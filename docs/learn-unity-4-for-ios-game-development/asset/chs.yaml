  \ Xcode 中花费大量时间在此！\n\n注册获批后，你即可访问 iTunes Connect 网站及 Apple 开发者网站上的配置门户，完成本章所述的移动设备配置与应用提交流程。\n\
  \n## 第 12 章 呈现：屏幕与图标\n\n现在 Angry Bots 的插曲告一段落，且 Unity iOS 项目构建与运行的基础知识已讲解完毕，是时候回归保龄球游戏并在\
  \ iOS 上运行了！\n\n从现在起，我会默认你通过真机构建与运行进行测试，但在多数情况下，你也可以使用 Unity Remote 在编辑器中测试，或直接在\
  \ iOS 模拟器中测试。\n\n**提示** 始终在 Unity 编辑器中进行部分测试是个好习惯，这能捕捉到真机测试中可能不会暴露的错误。若在真机上遇到诡异问题，请返回编辑器尝试调试。\n\
  \n本章重点在于让游戏在 iOS 设备上正确呈现，包括确保游戏以正确方向显示、所有游戏元素以合适分辨率出现在屏幕上——这是游戏可玩性的前提（连 Play 按钮都看不清或点不了，何谈开始游戏？）。\n\
  \n此外，除了提供应用名称和图标等必要属性，我们还将通过添加启动画面和熟悉的 iOS 活动指示器来优化细节，向玩家显示游戏正在加载。\n\n这些呈现细节看似仅关乎外观且易于实现，因此常被推迟到项目末尾（通常也确实如此）。但简单工作完全可以且应该提前完成——快速完成的任务能帮你进入开发节奏。当你加班加点赶工完成游戏时，最不想看到的就是那些本可尽早解决的未完成工作。\n\
  \n况且，打包体验至关重要。事实上，在制作桌面软件时，我习惯从安装程序开始设计，因为这是客户的第一触点。对于 iOS 应用，客户首先看到的是应用图标和名称，启动时则看到启动画面。这些将塑造客户对应用的初步印象——它究竟是精致之作还是业余出品。而你作为应用的第一位用户，若能像打包成品一样从一开始就包装好项目，不仅会对项目更有信心，也能更清晰地构想应用形态。更何况，你永远不知道何时需要演示它！\n\
  \n对应的 Unity 项目可在`http://learnunity4.com/`在线获取。按惯例，我建议手动输入脚本而非直接复制在线项目中的代码。但项目文件中的某些纹理将用于图标和启动画面，因此请从第\
  \ 12 章的在线项目中，将`Textures`文件夹内的额外文件复制到保龄球项目的`Textures`文件夹中（记住，你可以将文件拖拽至 Project 视图中）。你将获得三个不同分辨率的\
  \ Fugu Games 启动纹理、一个显示本书封面的启动画面，以及一个图标纹理（图 12-1）。\n\n![9781430248750_Fig12-01.jpg](img/9781430248750_Fig12-01.jpg)\n\
  \n图 12-1 从`http://learnunity4.com/`复制的本章纹理\n\n### 保龄球 iOS 版\n\n在 Unity 编辑器中，打开项目向导（`File`菜单下的`Open\
  \ Project`），选择我们在第 9 章中最后使用的保龄球项目（即在切换到 Angry Bots 之前的版本）。你现在应该已熟悉切换构建目标的操作流程。\n\
  \n打开构建设置窗口（`File`菜单下的`Build Settings`），选择 iOS 作为构建目标，点击`Switch Platform`按钮。\n\n\
  如果你已从第 9 章安装了 Necromancer GUI，切换构建目标至 iOS 后，控制台视图会出现一些脚本错误——因为该包中的测试脚本未使用`#pragma\
  \ strict`且缺少某些类型声明。只需从 Project 视图中删除`GUITestScript.js`，或将所有内容包裹在`#if !UNITY_IPHONE`中即可快速解决（若进一步修复代码——为函数参数添加`:int`类型声明——则可获额外加分）。删除脚本会禁用\
  \ Necromancer GUI 测试场景，但`GUISkin`仍可在暂停菜单中使用。本章的所有改动无论是否使用 Necromancer GUI 均可正常运行（但截图展示的是更美观的\
  \ Necromancer GUI）。\n\n资源重新导入完成后，进入`Edit`菜单，在`Settings`下选择`Player`，在 Inspector 视图中打开\
  \ Player Settings。在跨平台设置（Cross-Platform Settings）中填写公司名称和产品名称（应用名称）。选择 iOS 选项卡显示\
  \ iOS Player Settings，并填写应用的 bundle ID（图 12-2）。\n\n![9781430248750_Fig12-02.jpg](img/9781430248750_Fig12-02.jpg)\n\
  \n图 12-2 Fugu Bowl 的 Player Settings\n\n\n\n`HyperBowl`的原始版本和 iOS 版本都是竖屏游戏（事实也证明竖屏模式最适合实现下一章中介绍的滑动滚球控制），因此我们将该游戏限制为竖屏模式（以及倒置竖屏模式，因为\
  \ iPad 需要这种对称性）。\n\n因此，需要在玩家设置中将`Orientation`属性设为`Auto Rotation`，并且仅选中`Portrait`和`Portrait\
  \ Upside Down`选项（图 12-3）。\n\n![9781430248750_Fig12-03.jpg](img/9781430248750_Fig12-03.jpg)\n\
  \n图 12-3. Fugu Bowl 的分辨率和呈现设置\n\n#### 缩放 GUI\n\n现在我们已准备就绪，可以构建并运行了。如果在低分辨率 iOS 设备（即\
  \ iPhone 3GS，屏幕为 320×480 像素）上运行，游戏的初始屏幕看起来还不错。但在任何新款设备上（屏幕分辨率至少是原来的两倍），暂停菜单会显得非常小，小到难以阅读甚至难以点击单个按钮。例如，图\
  \ 12-4 显示了在 iPhone 4 的 640×960 屏幕上暂停菜单的样子。\n\n![9781430248750_Fig12-04.jpg](img/9781430248750_Fig12-04.jpg)\n\
  \n图 12-4. 暂停菜单在高分辨率屏幕上显得很小\n\n要缩放 GUI，首先需要确定要使用的缩放因子，即当前屏幕宽度除以你最初目标屏幕宽度。GUI 在 320×480\
  \ 像素的 iPhone 3GS 上看起来没问题，因此我们假设目标基础屏幕宽度为 320。所以，如果我们实际运行在 iPhone 4 上（例如 640×960\
  \ 像素），就需要将 GUI 放大两倍。\n\n下一步是应用缩放因子。这在 UnityGUI 中可以通过设置静态变量`GUI.matrix`来实现，该变量是一个*变换矩阵*。在计算机图形学中，变换矩阵包含并应用了平移（位置变化）、旋转和缩放。\n\
  \n实际上，`Transform`组件的局部位置、旋转和缩放对应的是该`GameObject`的一个 4×4 变换矩阵。而世界位置、旋转和缩放则是通过组合（相乘）一个`GameObject`的所有父`GameObject`的变换矩阵计算得出的。在过去，你在计算机图形编程中需要自行编写这些线性代数代码。现在你可以让游戏引擎帮你隐藏这些细节，但这里你将略窥门径。\n\
  \n#### 缩放记分板\n\n我们从记分板开始，因为这部分相对简单一些，只需对`FuguBowlScoreboard`脚本进行代码清单 12-1 所示的修改。新增了一个名为`baseScreenWidth`的变量，用于指定基础屏幕宽度，默认为\
  \ iPhone 3GS 的 320 像素宽度。该变量是公开的，因此你可以在检视面板中调整它。\n\n然后，在`OnGUI`函数的开头（这样它就会在任何 GUI\
  \ 渲染之前生效），用两行代码构建缩放矩阵并将其赋值给`GUI.matrix`。\n\n代码清单 12-1.  FuguBowlScoreboard.js 脚本中添加了缩放功能\n\
  \n```\nvar baseScreenWidth:float = 320.0;\n\nfunction OnGUI() {\n#if UNITY_IPHONE\n\
  \        var guiScale:float = Screen.width/baseScreenWidth;\n        GUI.matrix\
  \ = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale, guiScale,\
  \ 1));\n#endif\n```\n\n新代码仅适用于 iOS（尽管它在任何平台上都能工作），因此新代码行被包裹在`#if UNITY_IPHONE`和`#endif`之间。`UNITY_IPHONE`是一个内置预处理器定义，仅当构建目标为\
  \ iOS 时才会被定义（你也可以使用`UNITY_IOS`）。最终结果是，额外的代码仅在 iOS 中变为可执行代码，如果你构建到其他目标平台，这些代码基本上会消失（我们没有对`baseScreenWidth`这样做，因为即使构建目标改变，我们也不想丢失其在检视面板中的设置）。\n\
  \n在这两行实际代码中，第一行根据`Screen.width`（当前屏幕宽度）和`baseScreenWidth`（GUI 编码时预设的渲染屏幕宽度）计算需要缩放\
  \ GUI 的比例。结果赋给局部变量`guiScale`。\n\n你可能想知道为什么我们将`baseScreenWidth`声明为`float`而不是`int`。原因如下：`Screen.width`是一个`int`，如果你用`int`除以`int`，编译器会假设你想要一个`int`结果。例如，将\
  \ 640（iPhone 4）除以 320 得到 2，这样没问题。但如果你在 iPad 2 上运行，需要将 768 除以 320，结果会向下取整为 2，这在某些情况下就错了。但只要运算中的其中一个数字是`float`，编译器就会将整个运算视为浮点计算。\n\
  \n**注意**  在进行运算时，如果你提供的是`int`输入却期望得到`float`结果，请务必小心。这是一个常见的错误来源。\n\n计算结果传递给`Matrix4x4.TRS`调用，该函数会构建一个包含平移、旋转和缩放的\
  \ 4x4 矩阵。平移量为`Vector3.zero`（x、y 和 z 均为 0），旋转量为`Quaternion.identity`（单位四元数表示无旋转），缩放量由一个`Vector3`表示。基于屏幕尺寸的缩放因子应用于\
  \ x 和 y 方向，z 轴保持未缩放状态，因为该方向指向屏幕内部。\n\n#### 缩放暂停菜单\n\n缩放暂停菜单的过程几乎完全相同。让我们在`FuguPause`脚本的`OnGUI`函数开头添加相同的`baseScreenWidth`公共变量和设置`GUI.matrix`的代码（代码清单\
  \ 12-2）。\n\n代码清单 12-2.  FuguPause.js 中缩放暂停菜单\n\n```\nvar baseScreenWidth:float =\
  \ 320.0;\n\nfunction OnGUI () {\n        if (IsGamePaused()) {\n               \
  \  #if UNITY_IPHONE\n                 var guiScale:float = Screen.width/baseScreenWidth;\n\
  \                 GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity,\
  \ Vector3(guiScale, guiScale, 1));\n                 #endif\n                 if\
  \ (skin != null) {\n                         GUI.skin = skin;\n                \
  \ } else {\n                         GUI.color = hudColor;\n                 }\n\
  \                 switch (currentPage) {\n                         case Page.Main:\
  \ ShowPauseMenu(); break;\n                         case Page.Options: ShowOptions();\
  \ break;\n                         case Page.Credits: ShowCredits(); break;\n  \
  \               }\n        }\n}\n```\n\n不过，还需要做一处修改。`BeginPage`函数使用`Screen.width`来居中\
  \ GUI，因此你需要改用`baseScreenWidth`。代码清单 12-3 展示了此项代码更改。\n\n代码清单 12-3.  修改后的 BeginPage\
  \ 函数，使其与缩放后的 GUI 配合工作\n\n```\nfunction BeginPage(width:int,height:int) {\n#if !UNITY_IPHONE\n\
  \         GUILayout.BeginArea(Rect((screenWidth-width)/2,menutop,width,height));\n\
  #else\n         GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));\n\
  #endif\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n注意到我们使用了`#if\
  \ !UNITY_IPHONE`。感叹号表示“非”，因此第一行实际代码适用于除 iOS 以外的任何构建目标，而另一行仅适用于 iOS。我们也可以颠倒两行代码的顺序，并以`#if\
  \ UNITY_IPHONE`开头。\n\n在此过程中，我们还应该从暂停菜单中移除“退出”按钮，因为苹果会拒绝任何带有退出选项的应用。`FuguPause`脚本的`ShowPauseMenu`函数中的“退出”按钮已通过检查`UNITY_WEBPLAYER`预处理定义，从\
  \ Unity Web 播放器构建中排除，因此我们只需添加对`UNITY_IPHONE`的检查即可（清单 12-4）。\n\n*清单 12-4. 从`FuguPause.js`的\
  \ iOS 构建中排除“退出”按钮*\n\n```\nfunction ShowPauseMenu() {\n        BeginPage(150,300);\n\
  \        if (GUILayout.Button (\"Play\")) {\n                 UnPauseGame();\n \
  \       }\n        if (GUILayout.Button (\"Options\")) {\n                 currentPage\
  \ = Page.Options;\n        }\n        if (GUILayout.Button (\"Credits\")) {\n  \
  \               currentPage = Page.Credits;\n        }\n#if !UNITY_IPHONE && !UNITY_WEBPLAYER\n\
  \        if (GUILayout.Button (\"Quit\")) {\n                 Application.Quit();\n\
  \        }\n#endif\n        EndPage();\n}\n```\n\n“退出”按钮仅在构建时包含在`#if !UNITY_IPHONE\
  \ && !UNITY_WEBPLAYER`中，当构建目标不是 iOS*且*不是 Web 播放器时，该条件为真。现在构建游戏时，你应该能看到暂停菜单在设备（或\
  \ iOS 模拟器）上运行，并根据屏幕分辨率缩放，并且缺少“退出”按钮，如图 12-5 中的 iPhone 4 截图所示。\n\n![9781430248750_Fig12-05.jpg](img/9781430248750_Fig12-05.jpg)\n\
  \n图 12-5. 缩放后的暂停菜单\n\n### 设置图标\n\n默认情况下，你的应用图标将是 Unity 徽标。图 12-6 展示了 Unity Technologies\
  \ 在 App Store 上发布的几个演示应用的图标。除了`Angry Bots`，其他应用都使用默认的 Unity 图标，尽管是旧版本的图标，因为它们是使用\
  \ Unity 3 构建的（在撰写本文时尚未更新）。\n\n![9781430248750_Fig12-06.jpg](img/9781430248750_Fig12-06.jpg)\n\
  \n图 12-6. 带有默认 Unity 图标的应用\n\n图 12-6 也展示了如果我们现在构建`Fugu Bowl`应用的图标。它看起来略有不同，因为它是用\
  \ Unity 4 发布的，并且还带有苹果自动应用的光泽，因为我们没有在 iOS Player Settings 中选择`Prerendered Icon`。\n\
  \n要自定义图标，你可以将任何纹理拖拽到 Player Settings 的`Default Icon`字段中。让我们使用`Textures`文件夹中的`Icon1024`纹理，该纹理从本章的项目`http://learnunity4.com/`复制而来。我经常在文件名中指明原始纹理尺寸（在本例中为\
  \ 1024x1024 纹理），这样可以节省分配图标和启动屏幕纹理的大量时间。\n\n由于你将纹理用作图标，因此应适当调整导入设置。\n\n在 Project\
  \ View 中选择`Icon1024`纹理，然后在 Inspector 视图中，将`Texture Type`设置为`GUI`而不是`Texture`（图 12-7）。这将防止\
  \ Unity 应用适用于 3D 模型纹理但不适用于 GUI 显示的设置。例如，用于模型的纹理的尺寸应为 2 的幂次方，如 256 × 256 或 512 ×\
  \ 512，因为图形硬件喜欢以这种方式工作，并且纹理无论如何都会围绕模型拉伸。但通常，GUI 纹理应保持其原始分辨率，因为它们通常根据预期的显示尺寸调整（通常不是\
  \ 2 的幂次方分辨率）。你可以将`Texture Type`切换到`Advanced`来比较`Texture`和`GUI`预设纹理类型的基础设置，即选择`Texture`然后切换到`Advanced`，然后选择`GUI`再切换到`Advanced`。在`Advanced`模式下，你可以覆盖任何预设值，以便更精细地控制导入设置。\n\
  \n![9781430248750_Fig12-07.jpg](img/9781430248750_Fig12-07.jpg)\n\n图 12-7. 图标纹理的导入设置\n\
  \n**提示** 如果你要将纹理用于两个不同的目的，请复制它，以便为每个目的应用不同的导入设置。\n\n在`Texture Type`区域下方，指定了纹理的最大尺寸和压缩级别。如果使用了压缩纹理作为图标，Unity\
  \ 将在构建时生成警告，正确指出压缩纹理作为图标可能看起来不好。因此，选择`Default`标签，以便这些设置适用于所有平台（除非被覆盖），将`Max Size`设置为`1024`以避免缩放纹理，并将`Format`设置为`TrueColor`以获得全彩色分辨率且无压缩。点击`Apply`以调整后的设置重新导入纹理，底部的`Preview`将反映新的格式、尺寸和内存使用情况。\n\
  \n现在将图标纹理拖拽到 Player Settings 中`Cross Platform`区域的`Default Icon`字段。检查 iOS Settings\
  \ 的`Icon`折叠区域（图 12-8）。只要未选中`Override for iPhone`复选框，`Default Icon`的自动缩放版本将出现在所有其他图标尺寸中（图\
  \ 12-8）。\n\n![9781430248750_Fig12-08.jpg](img/9781430248750_Fig12-08.jpg)\n\n图 12-8.\
  \ Player Settings 中`Default Icon`缩放为不同图标尺寸\n\n各种图标尺寸对应于不同 iOS 设备的屏幕分辨率：\n\n- 57\
  \ × 57：第四代之前的任何 iPhone 或 iPod touch（iPhone 3GS 或第三代 iPod touch）\n- 114 × 114：第四代及之后的\
  \ iPod touch 和 iPhone\n- 72 × 72：原始 iPad、iPad 2 和 iPad Mini\n- 144 × 144：“新”iPad（或我喜欢称之为\
  \ iPad 3）\n\n理想情况下，应为每种尺寸定制一个图标，在这种情况下，你需要勾选`Override`复选框，然后将图标的各个版本拖拽到相应的框中。任何未填充的框将使用`Default\
  \ Icon`。但 Unity 在缩小纹理方面做得很好（缩小远优于放大），因此我经常重复使用我上传到 iTunes Connect 应用描述的同一 1024 ×\
  \ 1024 纹理。\n\n**提示** 如果你未对 iTunes Connect 和 Player Settings 使用相同的图标文件，请确保各种图标至少彼此相似。我曾因应用在\
  \ iTunes Connect 上的图标与设备上显示的应用图标不相似而被拒绝。\n\n我建议你始终选择`Prerendered Icon`选项，以避免苹果自动添加光泽。\n\
  \n除了可选的光泽外，从 Xcode 执行的构建部分还会自动圆角化图标并添加投影。所以不要自己处理这些！保持图标方形、尖角且无特殊边框。\n\n\n\n###\
  \ 设置启动画面（专业版）\n\n所有 iOS 应用在启动时都会显示一个静态的“启动”画面。与默认的应用图标类似，Unity 构建的应用中的默认启动画面会显示\
  \ Unity 徽标（图 12-9）。\n\n![9781430248750_Fig12-09.jpg](img/9781430248750_Fig12-09.jpg)\n\
  \n*图 12-9. 默认的 Unity 启动画面*\n\n如果你使用的是 Unity iOS Basic 版本，则只能使用默认的启动画面。但如果你使用的是 Unity\
  \ iOS Pro 版本，则可以像自定义应用图标一样，提供自己的启动画面。\n\n“启动图像”折叠菜单位于 iOS 设置中“图标”折叠菜单的下方，与图标选择类似，它提供了适用于各种\
  \ iOS 屏幕以及纵向和横向两种方向的多分辨率插槽（图 12-10）：\n\n*   *移动设备启动画面*：适用于第四代之前的 iPod touch 或 iPhone（即\
  \ iPhone 4），分辨率为 320 × 480\n*   *iPhone 3.5 英寸/Retina*：适用于 iPhone 4、iPhone 4S 和第四代\
  \ iPod touch 的 Retina 显示屏，分辨率为 640 × 960\n*   *iPhone 4 英寸/Retina*：适用于 iPhone 5\
  \ 和第五代 iPod touch，分辨率为 640 × 1136\n*   *iPad 纵向*：适用于初代 iPad 和 iPad 2，分辨率为 768 ×\
  \ 1024\n*   *iPad 横向*：适用于初代 iPad 和 iPad 2，分辨率为 1004 × 768\n*   *高分辨率 iPad 纵向*：适用于新\
  \ iPad（iPad 3）的 Retina 显示屏\n*   *高分辨率 iPad 横向*：适用于新 iPad（iPad 3）的 Retina 显示屏\n\n\
  ![9781430248750_Fig12-10.jpg](img/9781430248750_Fig12-10.jpg)\n\n*图 12-10。不同屏幕分辨率和方向下的启动画面*\n\
  \nUnity 并没有一个默认的启动画面可以自动调整大小以适应所有启动分辨率，因此你必须根据你的游戏将使用的分辨率和方向，填充相应的启动画面框。由于在“分辨率和演示”设置中仅选择了纵向和纵向上下颠倒方向（以及自动旋转），因此只需要分配纵向启动画面。与图标一样，启动画面可以是任何纹理，Unity\
  \ 会根据需要缩放它们，但使用已经是目标尺寸的纹理可以获得最佳效果。你应该使用适合你的公司和游戏的内容。\n\n**注意：** Apple 建议启动画面看起来像游戏的实际画面，但通常只显示公司徽标。就我个人而言，我认为显示一个像无响应的游戏画面一样的画面会令人困惑。\n\
  \n将每个启动画面纹理从“纹理”文件夹拖入“播放器设置”中匹配的启动画面框（图 12-10）：将 `Fugu320x480` 拖入“移动设备启动画面”，将 `Fugu640x960`\
  \ 拖入“iPhone 3.5 英寸/Retina”，将 `Fugu1536x2048` 拖入“高分辨率 iPad 纵向”。“iPhone 4 英寸/Retina”需要一个纹理，因此将最接近的匹配项\
  \ `Fugu640x960` 拖入其中。而 `Fugu1536x2048` 可用于“iPad 纵向”。\n\n#### 第二个启动画面\n\n虽然你不能在 Unity\
  \ iOS Basic 中更改启动画面，但你可以制作一个在内置启动画面之后立即显示的启动画面。你只需要创建一个场景，在屏幕上显示启动纹理几秒钟，然后加载第一个游戏场景。如果你希望拥有多个启动画面，这对于\
  \ Unity iOS Pro 也很有用。例如，在 HyperBowl 中，我在内置启动画面中显示了一些 HyperBowl 艺术作品，然后在第二个启动画面中显示了我的\
  \ Fugu Games 徽标。\n\n##### 创建启动场景\n\n从“文件”菜单调用“新建场景”命令，创建一个新的空场景。将其保存为 `Splash`。调出“构建设置”窗口，点击“添加当前”将新场景添加到你的构建中。它将出现在场景列表的底部，因此将其拖到顶部。其场景索引现在应该显示为\
  \ 0，这意味着它是第一个加载的场景（图 12-11）。\n\n![9781430248750_Fig12-11.jpg](img/9781430248750_Fig12-11.jpg)\n\
  \n*图 12-11。添加了启动场景的构建设置*\n\n##### 创建启动画面\n\n显示全屏纹理的最简单方法是使用 `GUITexture`。在启动场景中，转到“游戏对象”菜单中的“创建其他”子菜单，选择“GUI\
  \ 纹理”（图 12-12）。\n\n![9781430248750_Fig12-12.jpg](img/9781430248750_Fig12-12.jpg)\n\
  \n*图 12-12。创建一个 GUI 纹理*\n\n将生成的 `GameObject` 重命名为 `Screen`，并在“检视视图”中检查它。新创建的 `GUITexture`\
  \ 在屏幕中央显示一个 Unity 水印（图 12-13）。与 UnityGUI 不同，`GUITexture` 使用归一化屏幕坐标：x 和 y 的范围从 0\
  \ 到 1，其中 0,0 是屏幕的左上角，1,1 是右下角，因此将 x 和 y 都设置为 0.5 表示纹理在屏幕上居中。\n\n![9781430248750_Fig12-13.jpg](img/9781430248750_Fig12-13.jpg)\n\
  \n*图 12-13。默认的 GUI 纹理*\n\n让我们用我们的启动纹理替换水印纹理。将“项目视图”中“纹理”文件夹下的 `LearnUnityCover`\
  \ 纹理拖入 `GUITexture` 组件的“纹理”字段。为了使纹理拉伸铺满整个屏幕，将缩放更改为 1,1,1，并将所有 `Pixel Inset` 值设置为\
  \ 0（图 12-14）。\n\n![9781430248750_Fig12-14.jpg](img/9781430248750_Fig12-14.jpg)\n\
  \n*图 12-14。全屏 GUI 纹理*\n\n现在，如果你运行游戏，你会看到启动纹理拉伸填满屏幕。在设备或 iOS 模拟器上运行时，它将出现在内置启动画面之后（图\
  \ 12-15）。\n\n![9781430248750_Fig12-15.jpg](img/9781430248750_Fig12-15.jpg)\n\n*图\
  \ 12-15。全尺寸的二级启动画面*\n\n##### 加载下一个场景\n\n作为启动画面，此场景应停留几秒钟，然后开始加载游戏场景。像任何真实的游戏关卡一样，该场景可以使用一个主逻辑脚本，因此创建一个新的\
  \ JavaScript，将其命名为 `FuguSplash`，并添加代码清单 12-5 的内容。\n\n*代码清单 12-5。FuguSplash.js 中的等待并加载代码*\n\
  \n```javascript\nvar waitTime:float=2; // 秒\nvar level:String;     // 要加载的场景名称\n\
  \nfunction Start() {\n        yield WaitForSeconds(waitTime);\n        Application.LoadLevel(level);\n\
  }\n```\n\n有两个可以在“检视视图”中自定义的公共变量：加载下一个场景之前的等待时间（以秒为单位）和要加载的场景名称。`Start` 函数非常简单；它等待内置协程\
  \ `WaitForSeconds` 完成，传入指定的等待时间，然后调用 `Application.LoadLevel` 加载你指定的关卡。在此过程中，当前场景将被卸载，因此启动画面将消失。\n\
  \n让我们将脚本添加到启动场景中。创建一个空的 `GameObject`，将其命名为 `Splash`，并将 `FuguSplash` 脚本附加到它上面。然后在“检视视图”中，在“关卡”字段中输入保龄球场景的名称（图\
  \ 12-16）。现在，如果你在编辑器或 iOS 构建中运行游戏，启动画面将显示几秒钟，然后保龄球场景就会出现。\n\n![9781430248750_Fig12-16.jpg](img/9781430248750_Fig12-16.jpg)\n\
  \n*图 12-16。添加到启动场景的 FuguSplash 脚本*\n\n关于 `WaitForSeconds` 的几句话；它很方便，但你可以实现自己的版本。代码清单\
  \ 12-6 显示了一个假设的实现。\n\n*代码清单 12-6。WaitForSeconds 的一种实现*\n\n\n```csharp\nfunction\
  \ WaitForSeconds(waitTime:float) {\n        var startTime:float = Time.time;\n \
  \       while (waitTime > Time.time-startTime) {\n                 yield;\n    \
  \    }\n}\n```\n\n注意，指定的等待时间是游戏时间而非真实世界时间，因此`WaitForSeconds`在游戏暂停且游戏时间停止时无实用价值。但若需按真实秒数等待，可使用假设实现的`WaitForSeconds`，将`Time.time`替换为`Time.realtimeSinceStartup`（返回游戏启动以来的真实世界秒数）（清单\
  \ 12-7）。\n\n清单 12-7.  `WaitForSeconds`的实时版本\n\n```csharp\nfunction WaitForSecondsRealtime(waitTime:float)\
  \ {\n        var startTime:float = Time.realtimeSinceStartup;\n        while (waitTime\
  \ > Time.realtimeSinceStartup-startTime) {\n                 yield;\n        }\n\
  }\n```\n\n### 显示活动指示器\n\n当某些操作需要耗时执行时，最好能有某种加载指示器。对于初始场景加载，有一种便捷方式可显示 iOS 应用中常见的旋转指示器。在玩家设置（Player\
  \ Settings）的“分辨率与演示”折叠面板底部的“显示加载指示器”选项中，选择一个活动指示器样式即可启用该功能（图 12-17）。由于启动画面提供的是偏白色背景，灰色（Gray）是最佳样式（其他样式为白色）。\n\
  \n![9781430248750_Fig12-17.jpg](img/9781430248750_Fig12-17.jpg)\n\n图 12-17. 玩家设置中选中灰色显示加载指示器\n\
  \n现在，当你在 iOS 构建版本中运行游戏时，将看到灰色活动指示器在内置启动画面上旋转。\n\n### 编写活动指示器脚本\n\n能在其他场景（尤其在加载其他关卡时）使用活动指示器将非常理想。幸运的是，Unity\
  \ 通过`Handheld`类中的静态函数提供了活动指示器的脚本接口。我们只需编写一个调用这些函数来启动和停止活动指示器的脚本。新建一个名为`FuguSpinner`的\
  \ JavaScript 文件，并将清单 12-8 的内容添加到脚本中。\n\n清单 12-8.  在`FuguSpinner.js`中启动和停止活动指示器\n\
  \n```csharp\n#pragma strict\n\n#if UNITY_IPHONE\nfunction Start() {\n        DontDestroyOnLoad(this.gameObject);\n\
  \        Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);\n\
  \        Handheld.StartActivityIndicator();\n}\n\nfunction OnLevelWasLoaded() {\n\
  \        Handheld.StopActivityIndicator();\n        Destroy(gameObject);\n}\n#endif\n\
  ```\n\n在`Start`回调中，调用`Handheld.SetActivityIndicatorStyle`指定活动指示器的外观。可用的选项由`iOSActivityIndicatorStyle`枚举表示，与玩家设置中的加载指示器选项匹配。我们选择`iOSActivityIndicatorStyle.WhiteLarge`，因为我们知道第二个启动画面主要是黑色背景。\n\
  \n调用`Handheld.StartActivityIndicator`可使活动指示器在屏幕中央显示。Unity 脚本参考文档对`Handheld.StartActivityIndicator`的说明指出，活动指示器将在当前帧之后激活，因此在调用`Application.LoadLevel`前，至少需要`yield`一帧。否则，指示器只有在加载新关卡后才会出现，这违背了激活指示器的初衷。这里我们无需担心此问题，因为`FuguSplash`脚本在加载下一场景前会进行若干秒的`yield`。\n\
  \n然而，即使新场景被`FuguSplash`加载后，活动指示器仍会继续旋转。为在场景加载完成后停止活动指示器，此脚本必须能在场景加载过程中保持存活，因此在`Start`函数开头调用了`DontDestroyOnLoad`，并将此脚本所附加的游戏对象传递给它。这确保了该游戏对象（以及此脚本）在加载下一场景时得以存活。\n\
  \n由于游戏对象在场景加载过程中存活，我们可以确保新场景加载完成后会调用`MonoBehaviour`回调`OnLevelWasLoaded`。此处是调用`Handheld.StopActivityIndicator`关闭活动指示器的理想位置。此时，脚本及其附加的游戏对象不再需要，因此对游戏对象调用了`Destroy`。\n\
  \n**提示**   不再需要对象时将其销毁是一个好习惯。除了释放空间外，还能避免最坏情况：当你循环回到对象最初创建的场景时，最终会得到同一对象的两个版本！\n\
  \n请注意，`DontDestroyOnLoad`和`Destroy`都是`Object`类中的静态函数，因此正如我们在第 7 章中调用`Instantiate`时那样，这里不显式调用`Object.Destroy`（或为避免与.NET\
  \ 中`System.Object`类名冲突而使用`UnityEngine.Object.Destroy`），而是隐式调用`this.Destroy`，因为`this`是一个`Object`。\n\
  \n将`FuguSpinner`脚本附加到场景中名为 Spinner 的新游戏对象上。现在在设备上构建并运行，活动指示器将出现在启动画面中央，并在下一场景加载完成后消失（图\
  \ 12-18）。\n\n![9781430248750_Fig12-18.jpg](img/9781430248750_Fig12-18.jpg)\n\n图\
  \ 12-18. 带有活动指示器的第二个启动画面\n\n## 进一步探索\n\n现在，我们的 iOS 保龄球游戏看起来像真正的应用了！它具有图标、启动画面（或两个）、启动画面上旋转的活动指示器、以竖屏方向运行，并且图形能适配屏幕，包括\
  \ UnityGUI 记分板和暂停菜单。甚至菜单在 iOS 中也能自动工作，按钮能响应屏幕点触。虽然还不能完全说游戏玩法也是如此，但我们将在下一章实现触摸屏游戏控制。\n\
  \n#### 参考手册\n\n我们再次在玩家设置中花费了一些时间（现在制作 iOS 构建版本时，玩家设置成为反复出现的主题），因此值得回顾关于玩家设置的参考手册文档。\n\
  \n本章只使用了一个新组件：用于启动画面图像的`GUITexture`组件。`GUITexture`及其父类`GUIElement`与 UnityGUI 无关（事实上，在\
  \ UnityGUI 出现之前，`GUITexture`及其兄弟`GUIText`是最接近用户界面元素的东西）。\n\n本章主要致力于图标和启动画面图像，这些图像应使用\
  \ GUI 预设导入设置导入，该设置在资产组件部分的`Texture2D`文档中有说明。\n\n#### 脚本参考\n\n本章介绍的唯一 UnityGUI 新特性是`GUI`类中的`matrix`变量。撰写本文时，该变量的脚本参考页面几乎为空白，但`GUIUtility`类有一些文档更完善的函数，包括`ScaleAroundPivot`，该函数可作为设置`GUI.matrix`的替代方案（实际上，它是一个内部设置`GUI.matrix`的辅助函数）。\n\
  \n我们只使用了`Matrix4x4.TRS`构造函数，但关于`Matrix4x4`的脚本参考文档质量不错，解释了 Unity 中矩阵的用法，并列举了许多类函数，当你需要开始处理矩阵时，这些函数会很有用。\n\
  ```\n\n\n# 在第 8 章介绍游戏结束状态时，已经引入了`yield`指令`WaitForSeconds`，它被证明能方便地在特定秒数后显示启动画面。我们借此机会探讨了`WaitForSeconds`的假设性实现，并比较了静态`Time`变量`Time.time`和`Time.realTimeSinceStartup`。当暂停菜单弹出、游戏时间暂停时，这两者的区别至关重要。\n\
  \n我们调用静态的`Application`函数`LoadLevel`来从启动场景过渡到保龄球场景，但也可以调用该函数的异步版本`Application.LoadLevelAsync`。作为一个异步函数，它在加载新场景时不会暂停\
  \ Unity，因此，在等待新场景加载完成的过程中，你实际上可以让启动场景中发生任何事情。\n\n正如我们使用`Handheld`类中的活动指示器函数所演示的那样，你可以通过调用`DontDestroyOnLoad`让物体在场景加载中存活下来，并在不再需要时调用`Destroy`来销毁它们。这两者都是`Object`类中的静态函数，由于`Object`类是场景中所有物体的父类，因此它始终值得一读。\n\
  \n为了显示和隐藏活动指示器，我们调用了`Handheld`类中的`StartActivityIndicator`和`StopActivityIndicator`函数。请参阅关于活动指示器函数的文档，了解在执行场景加载之前需要执行\
  \ yield 的原因。`iOSActivityIndicatorStyle`枚举列出了可用的活动指示器样式。\n\n`Handheld`类值得一读，因为它包含了所有可脚本化编写的\
  \ Unity 移动端功能（iOS 特有功能除外）。例如，`Handheld`类有一个静态的`PlayFullScreenMovie`函数，可以播放本地存储或从网站流式传输的电影，这也是创建酷炫启动画面的另一种可能性。该函数的脚本参考页面详细介绍了支持的视频格式以及如何控制电影播放器（在撰写本文时，它基于原生的\
  \ iOS 电影播放器`MPMoviePlayerController`）。\n\n#### iOS 开发者库\n\n随着我们探索 Unity iOS 功能，iOS\
  \ 开发者库中越来越多的文档变得相关。请记住，这些文档既可以在 Apple 开发者网站（`http://developer.apple.com/`）上找到，也可以在\
  \ Xcode Organizer 窗口中找到。\n\n在 iOS 开发者库的`用户体验`主题中，有一份值得通篇阅读的文档，那就是 Apple 的《iOS 人机界面指南》。这份指南最初可追溯至最早的\
  \ Mac，曾是用户界面最佳实践的黄金标准。此后，该指南被分成了 Mac 和 iOS 两个版本，但即使仅仅是为了避免应用被拒，你也应该阅读 iOS 版本。与本章节相关的是，《自定义图标和图像创建指南》列出了创建应用图标和启动画面（在\
  \ Apple 的术语中称为`launch images`）的要求和建议。\n\n许多专门针对移动端或 iOS 的 Unity 类都有对应的 Objective-C\
  \ 版本。例如，由 Unity 的`Handheld`类控制的活动指示器，在 Objective-C 中是通过`UIActivityIndicatorView`类来访问的，该类同样可以在`用户体验`主题下的`窗口与视图`部分找到。\n\
  \n#### 资源商店\n\n来自 DFT Games 的过渡管理器可在 Unity 资源商店免费获取，它提供了比本章所述更复杂的启动画面行为，包括屏幕淡入淡出以及使用多个屏幕。我在所有应用中都使用了这个过渡管理器。\n\
  \n#### 书籍\n\nJosh Clark 的《*Tapworthy: Designing Great Apps*》这本书说服了我放弃自动图标光泽，并始终在\
  \ Unity Player Settings 中选择“Prerendered Icon”。这本书也是对应用设计的总体优秀论述。\n\n关于线性代数的教科书有很多（甚至在`http://wikipedia.org/`上还有一篇内容详尽的`matrix`文章），但任何计算机图形学书籍都会包含矩阵数学的基础内容。例如，《Real-Time\
  \ Rendering》（`http://realtimerendering.com/`）中就有一个关于《一些线性代数》的附录。\n\n# 第 13 章\n\n\
  ## 处理设备输入\n\n虽然我们的保龄球游戏已经在 iOS 上运行了起来，但它尚未达到可玩的状态，因为我们没有任何有效的玩家控制。这便引出了输入处理的问题——这可能是桌面游戏与移动游戏之间最显著的区别。\n\
  \niOS 游戏不能读取鼠标或键盘，而必须使用其设备传感器之一，通常是触摸屏（点击和滑动）或加速度计（摇晃和倾斜）。我们将选择触摸屏输入来控制保龄球，但也会利用加速度计做一些晃动检测，并稍微摆弄一下设备摄像头。\n\
  \n本章项目文件位于`http://learnunity4.com/`，其中包含了本章引入的脚本更改，没有添加其他资源。本书余下部分也是如此。从现在开始，全是脚本编写了！\n\
  \n### 触摸屏\n\nUnityGUI 在 iOS 上已经能良好地配合触摸屏工作，因此，如果你现在在设备上构建并运行保龄球游戏，或者在编辑器中使用 Unity\
  \ Remote 进行测试，你可以通过点击按钮来操作初始菜单。当你点击暂停菜单上的“Play”按钮时，保龄球会落下。到目前为止，一切顺利。\n\n但保龄球的控制呢？`Input.GetAxis`在屏幕上滑动时确实会返回值，但结果很可能不是你想要的（在旧版\
  \ Unity iOS 中，`Input.GetAxis`甚至完全不起作用）。无论如何，我们首先需要定义在 iOS 版保龄球游戏中控制将如何工作。\n\n####\
  \ 滑动球\n\n对于“Fugu Bowl”，我们将采用我在“HyperBowl”中使用的触摸屏控制方式。玩家通过沿某个方向在屏幕上滑动，来将球推向那个方向。在屏幕上向上滑动会将球向前推，向下滑动会将球向后推，向左滑动会让球向左滚动，向右滑动则让球向右滚动。\n\
  \n滑动控制方案与鼠标控制非常相似，因此我们可以在现有的`FuguBowlForce`脚本框架内进行修改。打开该脚本，添加一些新的公共变量`swipepowerx`和`swipepowery`，这样我们就可以像调整鼠标控制那样调整滑动力度（代码清单\
  \ 13-1）。\n\n代码清单 13-1。`FuguBowlForce.js`中滑动控制的调整变量\n\n```\nvar swipepowerx:float\
  \ = 0.1;\nvar swipepowery:float = 0.08;\n```\n\n我们添加了新变量，而没有重用`mousepowerx`和`mousepowery`，这样我们就可以在独立平台和\
  \ iOS 构建目标之间切换，而不会干扰每个平台的力度调整值。两个平台的属性都会显示在检视面板中（图 13-1）。\n\n![9781430248750_Fig13-01.jpg](img/9781430248750_Fig13-01.jpg)\n\
  \n图 13-1。`FuguBowlForce.js`中桌面端和 iOS 端的控制调整\n\n最大的变化是我们的`CalcForce`函数，它被我们的`Update`回调每帧调用一次。在\
  \ iOS 上，`CalcForce`不再调用静态函数`Input.GetAxis`来检查鼠标移动了多少，而是调用静态函数`Input.GetTouch`来检测滑动。`UNITY_IPHONE`预处理定义确保新代码只存在于\
  \ iOS 平台，而旧代码则用于其他所有平台（代码清单 13-2）。\n\n代码清单 13-2。在`FuguBowlForce.js`中检测滑动\n\n\n\n\
  ```csharp\nfunction CalcForce() {\n        var deltatime:float = Time.deltaTime;\n\
  #if UNITY_IPHONE\n        if (Input.touchCount > 0) {\n                // 获取自上一帧以来手指的移动距离\n\
  \                var touch:Touch = Input.GetTouch(0);\n                if (touch.phase\
  \ == TouchPhase.Moved) {\n                         var touchPositionDelta:Vector2\
  \ = touch.deltaPosition;\n                         forcey = swipepowery*touchPositionDelta.y/deltatime;\n\
  \                         forcex = swipepowerx*touchPositionDelta.x/deltatime;\n\
  \                }\n        }\n#else\n        forcey = mousepowery*Input.GetAxis(\"\
  Mouse Y\")/deltatime;\n        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/deltatime;\n\
  #endif\n}\n\n```\n\n与 `Input.GetAxis` 类似，`Input.GetTouch` 返回自上一帧以来注册的信息，因此您可以在 `CalcForce`\
  \ 中调用它，而 `CalcForce` 由 `Update` 调用，即每帧调用一次。\n\n`Input.GetTouch` 返回一个 `Touch` 类型的结构体，该结构体描述了触摸事件：手指是被按下、抬起还是移动，如果移动了，则包含移动的像素数。\n\
  \n我们目前处理的是多点触摸屏幕，因此 `Input.GetTouch` 有一个参数，它是一个整数，指示要返回最新的 `Input.Touch` 事件中的哪一个。触摸事件的数量可通过静态变量\
  \ `Input.touchCount` 获取，因此我们可以通过如下循环来处理所有触摸事件：\n\n```csharp\nfor (var i:int=0; i\
  \ < Input.touchCount; ++i) {\n        var touch:Touch = Input.GetTouch(i);\n// 在此处编写你的处理代码\n\
  }\n```\n\n但为了简单起见，我们只关注一根手指，所以只需检查是否存在一个或多个 `Touch` 事件，如果存在，则检查第一个：\n\n```csharp\n\
  if (Input.touchCount > 0) {\n        var touch:Touch = Input.GetTouch(0);\n```\n\
  \n`Touch` 事件可以表示不同的手指动作：按下、抬起或拖动。这可以通过检查 `Touch` 对象的 phase 属性来判断，该属性是一个 `TouchPhase`\
  \ 枚举。我们只关注表示手指在屏幕上拖动的 `Touch` 事件，因此检查触摸阶段是否为 `TouchPhase.Moved`：\n\n```csharp\n\
  if (touch.phase == TouchPhase.Moved) {\n```\n\n如果是，则计算推动保龄球所需的力。这与鼠标控制类似，但不是乘以 `Input.GetAxis`，而是乘以\
  \ `Touch` 事件的 `deltaPosition` 属性，该属性表示手指在屏幕上拖动的像素数：\n\n```csharp\nvar touchPositionDelta:Vector2\
  \ = touch.deltaPosition;\nforcey = powery*touchPositionDelta.y/deltatime;\nforcex\
  \ = powerx*touchPositionDelta.x/deltatime;\n```\n\n请注意，`deltaPosition` 属性是一个 `Vector2`，它与\
  \ `Vector3` 类似，但只有 x 和 y 属性，没有 z 值。\n\n现在，如果您在编辑器中点击“播放”并使用 Unity Remote 进行测试，或者在设备上执行“生成并运行”，球将朝着您滑动的方向滚动。\n\
  \n包含触摸屏功能的完整 `FuguBowlForce` 脚本可从 `http://learnuninty4.com/` 上本章的项目中获取。\n\n### 点击球体\n\
  \n尽管我们的保龄球游戏不关心滑动操作在屏幕上的位置，但许多游戏需要检测特定的 `GameObject` 是否被触摸。在桌面和 Web 平台上，可以通过 `OnMouseDown`、`OnMouseUp`\
  \ 和 `OnMouseOver` 等回调函数来检测带有 `Collider` 组件的 `GameObject` 上的鼠标事件。例如，脚本中的 `OnMouseDown`\
  \ 回调会在鼠标点击脚本的 `GameObject`（更准确地说，是 `GameObject` 的 `Collider` 组件）时被调用。\n\n**注意**\
  \   `OnMouse` 回调也适用于带有 `GUIText` 和 `GUITexture` 组件的 `GameObject`。在 UnityGUI 引入之前，这是\
  \ Unity 中最接近内置 GUI 系统的功能。\n\n为了演示 `OnMouse` 回调的工作原理，创建一个名为 `FuguDebugOnMouse` 的新\
  \ JavaScript 文件，并将其附加到球体 `GameObject` 上（图 13-2）。\n\n![9781430248750_Fig13-02.jpg](img/9781430248750_Fig13-02.jpg)\n\
  \n图 13-2. 附加了 `FuguDebugOnMouse` 脚本的球体\n\n然后将 代码清单 13-3 的内容添加到脚本中。\n\n代码清单 13-3.\
  \  在 `FuguDebugMouse.js` 中检测鼠标点击\n\n```csharp\n#pragma strict\n\nfunction OnMouseDown\
  \ () {\n        Debug.Log(\"GameObject \"+ gameObject.name + \" was touched\");\n\
  }\n```\n\n现在脚本中包含一个 `OnMouseDown` 回调，它会记录一条关于 `GameObject` 被触摸的消息。当您在编辑器中运行游戏并点击球体时，调试消息将出现在控制台视图中（图\
  \ 13-3）。\n\n![9781430248750_Fig13-03.jpg](img/9781430248750_Fig13-03.jpg)\n\n图 13-3.\
  \ 演示 `OnMouseDown` 回调的调试消息\n\nUnity iOS 会在响应触摸事件时调用 `OnMouse` 回调，除非没有明确的映射关系。例如，当鼠标悬停在\
  \ `GameObject` 上时调用的 `OnMouseOver`，其对应的触摸等效操作是什么？但当一个 `GameObject` 被点击时调用 `OnMouseDown`（当手指停止触摸屏幕时调用\
  \ `OnMouseUp`）是合理的。实际情况也确实如此，如果您在编辑器中通过 Unity Remote 再次运行游戏，或者在设备上执行“生成并运行”，您会看到相同的结果。无论哪种情况，点击球体都会产生与鼠标点击时相同的调试消息。\n\
  \n尽管 `OnMouse` 回调可以用于触摸操作（至少在一定程度上）非常方便，但了解如何实现自己的点击物体检测也很有用。这简单直接，只需结合检查点击操作和从屏幕位置沿相机方向向\
  \ 3D 世界发射射线即可。*射线投射* 是寻找射线与第一个相交物体的过程（您可能还记得高中数学知识，射线有起点和方向，就像一支箭）。\n\n为了演示，让我们创建一个名为\
  \ `FuguTap` 的新 JavaScript 文件，将其附加到主摄像头上（图 13-4），并将 代码清单 13-4 的内容添加到脚本中。\n\n![9781430248750_Fig13-04.jpg](img/9781430248750_Fig13-04.jpg)\n\
  \n图 13-4. 附加了 `FuguOnTap` 脚本的主摄像头\n\n代码清单 13-4.  模拟 `OnMouseDown` 事件的脚本\n\n```csharp\n\
  #pragma strict\n\n#if UNITY_IPHONE\nfunction Update () {\n                for (var\
  \ i = 0; i < Input.touchCount; ++i) {\n                         if (Input.GetTouch(i).phase\
  \ == TouchPhase.Began) {\n                                 var ray:Ray = camera.ScreenPointToRay\
  \ (Input.GetTouch(i).position);\n                                 var hit:RaycastHit;\n\
  \                                 if (Physics.Raycast (ray,hit,camera.far,camera.cullingMask))\
  \ { hit.collider.SendMessage(\"OnTap\",SendMessageOptions.DontRequireReceiver);\n\
  \                                 }\n                         }\n              \
  \  }\n}\n#endif\n```\n\n整个脚本由一个 `Update` 回调组成，该回调遍历上一帧中注册的所有触摸事件。但在此情况下，只关注点击的开始阶段，因此只考虑处于\
  \ `TouchPhase.Began` 阶段的触摸事件。提取每个此类触摸事件的屏幕坐标，并将其传递给 Camera 函数 `ScreenPointToRay`，以形成一个\
  \ `Ray`，该射线从屏幕位置开始，沿相机方向投射到 3D 世界中。\n\n\n\n`Ray`被作为第一个参数传递给静态函数`Physics.Raycast`，以检查该`Ray`是否与任何游戏对象的碰撞体组件相交。如果存在第一个交点，则相关信息会通过作为第二个参数传入的`RayCastHit`结构体返回。第三个参数是射线投射的距离，第四个参数是用于测试相交的图层集合。通过将相机远平面距离作为射线投射距离，并将相机剔除遮罩（可见图层集合）作为用于相交测试的图层集合，可以限制射线投射的可能结果。\n\
  \n如果对`Physics.Raycast`的调用返回`true`（表示存在相交），则检索相交的碰撞体组件，并对其调用`SendMessage`以在附加的脚本中调用`OnTap`回调（对一个组件调用`SendMessage`等同于对该组件的游戏对象调用`SendMessage`）。\n\
  \n注意，对`SendMessage`的调用包含一个可选的第二个参数`SendMessageOptions.DontRequireReceiver`。如果没有该参数，当消息被发送到没有匹配函数（或本例中没有`OnTap`函数）的游戏对象时，Unity\
  \ 会报告错误。\n\n整个`Update`回调被包裹在`#ifdef UNITY_IPHONE`中，因为它仅用于 iOS 触摸屏输入。同样，你现在可以使用`UNITY_IPHONE`将`OnMouseDown`回调重命名为`OnTap`，以便由`FuguOnTap`脚本调用（清单\
  \ 13-5）。\n\n清单 13-5. FuguDebugOnMouse 脚本，为 iOS 提供备用回调名称\n\n```csharp\n#pragma strict\n\
  if !UNITY_IPHONE\nfunction OnMouseDown () {\n#else\nfunction OnTap () {\n#endif\n\
  \        Debug.Log(\"GameObject \"+ gameObject.name + \" was touched\");\n}\n```\n\
  \n现在，如果你再次运行游戏并点击球，你仍然会看到调试信息，但它将来自`FuguOnTap`发送的`OnTap`消息。\n\n### 加速度计\n\n每台 iOS\
  \ 设备都有一个加速度计，用于测量三个不同方向的加速度。这三个值可以在静态变量`Input.accelerometer`中查看，它是一个`Vector3`。\n\
  \n`x`值对应于设备屏幕上从左到右的加速度。`y`值代表设备屏幕上从上到下的加速度，`z`值则是从设备正面到背面的加速度。从 Unity 4 开始，加速度计的值会根据设备方向进行调整，因此如果你以横向模式持有设备，加速度计的`x`值仍然从左到右变化。\n\
  \n#### 调试加速度计\n\n一个古老而有效理解代码工作原理的方法是打印输出。让我们创建一个名为`FuguDebugAccel`的新 JavaScript\
  \ 脚本，并将其附加到保龄球场景中一个名为`DebugAccel`的新游戏对象上。按照清单 13-6 所示，将`Update`函数添加到该脚本中。\n\n清单\
  \ 13-6. 打印加速度计值的代码\n\n```csharp\nfunction Update () {\n        Debug.Log(\"accel\
  \ x: \"+Input.acceleration.x+\" y: \"+Input.acceleration.y+\"                  \
  \                                                                              \
  \                 z: \"+Input.acceleration.z);\n}\n```\n\n`Update`函数获取`x`、`y`和`z`的加速度计值，并将它们拼接成一个可读的字符串。如果你在\
  \ Unity 编辑器（使用 Unity Remote）中进行测试，`Debug.Log`会将该字符串发送到控制台视图；如果你在 iOS 模拟器或真机上运行，则会发送到\
  \ Xcode 调试区域。\n\n尝试倾斜设备并观察这些值如何变化。例如，图 13-5 所示的`Debug.Log`输出结果是设备平放在桌子上时得到的。`x`和`y`值接近\
  \ 0，而`z`值接近-1。如果设备翻转过来，`z`值将接近 1。\n\n![9781430248750_Fig13-05.jpg](img/9781430248750_Fig13-05.jpg)\n\
  \n图 13-5. 加速度计值的 Debug.Log 输出\n\n加速度值的单位是重力加速度。静止状态下，每个加速度计值的范围是-1 到 1，其中 1 代表一个完整的地球重力（9.8\
  \ 米/秒²）。现在尝试摇晃设备。你应该会看到数值上下波动。\n\n### 检测摇晃\n\n我们的 iOS 暂停菜单存在一个问题：我们无法使用 ESC 键暂停，因为\
  \ iOS 设备上没有 ESC 键（尽管 Android 设备通常有一个行为类似 ESC 键的返回键）。\n\n通过简单地在`OnGUI`函数内添加一个`GUI.Button`调用，可以轻松地在`FuguPause`脚本中向屏幕添加一个暂停按钮：\n\
  \n```csharp\nif (GUI.Button(Rect(0,0,100,50), \"Pause\") { PauseGame(); }\n```\n\
  \n然而，我不喜欢在游戏过程中屏幕上出现按钮，尤其是在像 iPhone 这样的小屏幕上。所以，让我们利用 iOS 设备提供的备用输入方式，通过摇晃设备来暂停。\n\
  \n从之前打印加速度计值的练习中，我们看到摇晃设备会导致`Input.acceleration`的`x`、`y`或`z`值中至少有一个向上或向下急剧变化。因此，我们可以通过检查是否有任何值远大于\
  \ 1 或远小于-1（例如）来判断是否发生了摇晃。但不必非常精确，我们可以只计算向量大小的平方：\n\n```csharp\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
  ```\n\n获取`Vector3`的`sqrMagnitude`比获取`magnitude`更快，因为向量的模长是`x² + y² + z²`的平方根，使用平方根操作相对昂贵（还记得高中时学习手工计算平方根吗？）。\n\
  \n所以，让我们开始在`FuguPause`脚本中添加一个用于摇晃阈值的公共变量：\n\n```csharp\nvar shakeThreshold:float\
  \ = 5;\n```\n\n现在你可以在检视面板（图 13-6）中调整该属性，使其对摇晃更敏感或更不敏感。\n\n![9781430248750_Fig13-06.jpg](img/9781430248750_Fig13-06.jpg)\n\
  \n图 13-6. 在检视面板中调整“摇晃暂停”阈值\n\n接下来，添加对`Input.acceleration`的检查，作为 ESC 键检查的`UNITY_IPHONE`版本替代方案（清单\
  \ 13-7）。\n\n清单 13-7. 在 FuguPause.js 中添加“摇晃暂停”功能\n\n```csharp\nvar shakeThreshold:float\
  \ = 5;\n\nfunction Update() {\n#if UNITY_IPHONE\n        if (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
  #else\n        if (Input.GetKeyDown(KeyCode.escape))\n#endif\n        {\n      \
  \          switch (currentPage) {\n                case Page.None: PauseGame();\
  \ break;       // 如果暂停菜单未显示，则暂停\n                case Page.Main: UnPauseGame();\
  \ break; // 如果主暂停菜单正在显示，则取消暂停\n                default: currentPage = Page.Main;\
  \     // 任何子页面都返回主页面\n                }\n        }\n}\n```\n\n这就完成了。现在，当你使用 Unity\
  \ Remote 或在设备上进行测试时，摇晃设备将暂停游戏！增强后的`FuguPause`脚本（仅添加了两行新代码！）位于本书项目文件中，可从 `http://learnunity4.com/`\
  \ 获取。\n\n### 摄像头\n\n尽管 Unity 对 iOS 摄像头的内置支持不多，但 Unity 确实为将网络摄像头视频读取到纹理中提供了跨平台支持。\n\
  \n#### 读取网络摄像头\n\n\n\nUnity 有一种特殊的纹理（如 `Texture2D`，它是 `Texture` 的子类）叫做 `WebCamTexture`，用于显示来自连接硬件摄像头的视频。它支持多个平台，包括\
  \ iOS。让我们试试看。创建一个名为 `FuguWebCam` 的 JavaScript 脚本，并添加 Listing 13-8 中给出的 `Start` 函数。`Start`\
  \ 函数创建一个 `WebCamTexture`，将其纹理分配给脚本所挂载 `GameObject` 的材质，然后调用 `Play` 开始从摄像头视频更新纹理。\n\
  \nListing 13-8. 在 `FuguWebCam.js` 中播放 `WebCamTexture`\n\n```\nfunction Start ()\
  \ {\nvar webcamTexture:WebCamTexture = WebCamTexture();\nrenderer.material.mainTexture\
  \ = webcamTexture;\nwebcamTexture.Play();\n}\n```\n\n现在将脚本挂载到 `Ball` 游戏对象上。如果在编辑器中点击播放，你会看到来自\
  \ Mac 摄像头的视频显示在球上。如果你在设备上构建并运行，你会看到同样的效果，只是使用的是设备摄像头。Figure 13-7 是我在 iPod touch\
  \ 上运行游戏时的截图，当时正将摄像头对准我的白板。\n\n![9781430248750_Fig13-07.jpg](img/9781430248750_Fig13-07.jpg)\n\
  \nFigure 13-7. 渲染在保龄球上的 `WebCamTexture`\n\n**进一步探索**\n\n总的来说，为保龄球游戏实现触摸屏输入并不需要太多工作（与前一章节中的打包工作相比），尽管在实际开发中，你会花大量时间测试和调整游戏控制，直到它恰到好处。无论如何，通过“晃动暂停”功能，保龄球游戏的功能性移植已经完成。换句话说，iOS\
  \ 版本的游戏现在已经可以玩了！\n\n尽管在这个游戏中设备摄像头没有实际用途，但我们确实使用 Unity 的 `WebCamTexture` 类激活了它，以在保龄球上渲染视频纹理。这有点噱头，但游戏开发很大程度上就是学习！尤其是在\
  \ iOS 上，有很多机会尝试各种不同的控制方案和输入传感器。\n\n**脚本参考**\n\n本章中介绍的所有 Unity 功能几乎都是“`Input`”类的成员。实际上，脚本参考中关于\
  \ `Input` 的文档包含了对 iOS 输入功能的概述。\n\n在阅读完 `Input` 类的概述后，你应该阅读本章中使用的每个函数的页面，特别是“`Input.GetTouch`”（及其相关的“`Touch`”结构体），其中包含展示如何遍历每一帧中所有\
  \ `Touch` 事件的代码示例；以及“`Input.acceleration`”，其中包含展示如何检查每一帧加速度值的代码示例。\n\n需要记住的一点是，加速度计每帧可能生成多个值。在大多数情况下，每帧只采样一次\
  \ `Input.accelerometer` 就足够了，但如果需要更精细的采样，你可以访问 `Input.accelerationEventCount` 和\
  \ `Input.accelerationEvents` 变量来获取所有加速度事件。\n\n`Input` 类提供了对其他 iOS 传感器的访问。静态变量 `Input.gyro`、`Input.compass`\
  \ 和 `Input.location` 分别返回来自陀螺仪、指南针和定位服务的数据。除了记录这些变量的页面外，你还应该查看这些变量所属类的页面：“`Gyroscope`”、“`Compass`”和“`LocationServices`”类。文档虽简略，但你可以在各个类的函数中找到代码示例。静态变量\
  \ `Input.compensateSensors` 控制是否针对屏幕方向调整加速度计、陀螺仪和指南针数据。\n\n除了测试对象选择，射线投射在游戏和图形中也被大量使用，因此你应该熟悉“`Physics.Raycast`”的页面，它包含几个代码示例。例如，在《HyperBowl》中，我使用射线投射来防止主摄像机低于地面，并设置游戏对象的初始位置刚好停在地面上。在这两种情况下，我都从游戏对象位置向下向地面进行射线投射，并检查结果距离。\n\
  \n最后，我们介绍了 `WebCamTexture` 类的使用。“`WebCamTexture`”页面包含很多内容，但请点击其 `Play`、`Stop` 和\
  \ `Pause` 函数（你最常用的函数）的链接，在这些页面中找到代码示例。同时请查看“`WebCamTexture`”构造函数的链接。该页面列出了一系列构造函数，允许你自定义不同分辨率下的纹理大小。\n\
  \n**iOS 开发者库**\n\n除了阅读 Unity 脚本参考，甚至在此之前，阅读 iOS 参考库是一个好主意，这样你就能知道有哪些 iOS 功能可以通过\
  \ Unity 暴露出来，以及 Unity 类和方法如何映射到对应的 iOS 功能。\n\n你可以在 `http://developer.apple.com/library`\
  \ 或通过 Xcode Organizer 查看 iOS 参考库，无需登录。从那里选择“Guides”选项卡并浏览指南，特别是以下内容：\n\n- “Event\
  \ Handling Guide” 提供了触摸事件的概述（与 Unity 的 `Input.GetTouch` 和 `Touch` 类相关）以及运动事件的概述（与\
  \ `Input.acceleration` 和其他 Input 加速度计变量相关）。\n- 指南“Camera Programming Topics for\
  \ iOS”描述了由 Prime31 Etcetera 插件使用的 `UIImagePickerController` 类。\n- “AV Foundation\
  \ Programming Guide”描述了很可能被用于 Unity 中 `WebCamTexture` 类的视频捕获功能。\n\n**Asset Store**\n\
  \nUnity 的 `Input` 类使我们能够访问基本的触摸信息，但它不提供对 iOS 手势识别器的访问，这些识别器可以检测更高级别的“手势”，如滑动和捏合。Asset\
  \ Store 再次解围，提供了第三方包来实现高级手势检测。我使用 `Finger Gestures` 包，它有一个很好的回调系统，用于检测和处理各种手势。\n\
  \n例如，在《HyperBowl》中，我希望当玩家捏合屏幕（两个手指在屏幕上靠拢）时弹出暂停菜单。使用 `Finger Gestures` 包，只需在暂停菜单脚本中添加一个手势回调：\n\
  \n```\nfunction OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {\n    PauseGame();\n\
  }\n```\n\n然后在 `Start` 或 `Awake` 函数中添加一行代码，将该回调添加到该手势的 `FingerGestures` 回调列表中：\n\n\
  ```\nFingerGestures.OnPinchEnd += OnGesturePinchEnd;\n```\n\nUnity 并不提供对 iOS 中所有可用功能的脚本访问，而这正是插件发挥作用的地方。Unity\
  \ 插件系统允许你添加访问“原生”代码的新脚本函数。因此，一般来说，如果你能用 C、C++ 或 Objective-C 编写某些代码，你就能为其创建一个 Unity\
  \ 插件。例如，在 Unity Asset Store 中，你会发现围绕移动广告 SDK 构建的插件，以及用于访问 iOS 功能的插件。\n\n插件安装在 `Assets/Plugins`\
  \ 文件夹中，正如我们之前提到的，这是一个存储必须在其他任何脚本之前加载的脚本的好地方。它们通常还需要在 Xcode 中手动集成步骤，例如向 `Info.plist`\
  \ 文件添加条目或安装额外的代码库（这会阻止从 Unity 直接构建并运行——你必须先构建，修改 Xcode 项目，然后从 Xcode 运行）。此外，多个插件安装在同一\
  \ Unity 项目中总存在冲突的风险。\n\n这就是我喜欢使用 Prime31 Studios 在 `http://prime31.com/unity` 提供的插件的原因。\n\
  \n\n```markdown\n它们提供了大量可在同一 Unity 项目中共存的插件，所有 Xcode 修改均由 Unity 后处理器脚本执行，因此从 Unity\
  \ 构建并运行（Build and Run）仍将正常工作，无需在 Xcode 中手动操作。例如，Asset Store 上提供的 Prime31 Etcetera\
  \ 插件包含一系列杂项功能，包括通过一次函数调用访问 iOS 照片库和设备相机，如下所示：\n\n```\nEtceteraBinding.promptForPhoto(1.0);\n\
  ```\n\n图 13-8 中的截图显示了在我的 Fugu Maze 应用中出现的提示（我使用照片选择器让玩家自定义迷宫墙壁纹理）。如果你想尝试一下，请从 App\
  \ Store 下载 Fugu Maze Free，或下载一个免费的 HyperBowl 球道（我使用照片选择器来自定义保龄球纹理）。\n\n![9781430248750_Fig13-08.jpg](img/9781430248750_Fig13-08.jpg)\n\
  \n图 13-8. iPad 上的 Prime31 Etcetera 插件照片选择器\n\n另一个提供额外设备输入的 Prime31 插件是 iCade 插件（仅在\
  \ Prime31 网站上提供）。iCade 是一种复古风格街机柜，通过蓝牙连接为 iOS 设备提供摇杆输入。iCade 本质上模拟的是蓝牙键盘，因此任何使用\
  \ iCade 插件的代码都与键盘控制代码类似。如果我们在保龄球代码的`CalcForce`函数中添加 iCade 控制代码，它看起来会像 列表 13-9 中的代码片段（此示例实际取自\
  \ HyperBowl）。\n\n列表 13-9. 使用 Prime31 iCade 插件向`CalcForce`添加的 iCade 代码\n\n```\nvar\
  \ yinput:float = 0;\nif (iCadeBinding.state.JoystickUp) yinput = 1;\nif (iCadeBinding.state.JoystickDown)\
  \ yinput = -1;\nvar xinput:float = 0;\nif (iCadeBinding.state.JoystickLeft) xinput\
  \ = 1;\nif (iCadeBinding.state.JoystickRight) xinput = -1;\nvar deltatime:float\
  \ = Time.deltaTime;\nforcey += iCadePowery*yinput/deltatime;\nforcex += iCadePowerx*xinput/deltatime;\n\
  ```\n\n就像我们在检查四个不同按键是否被按下一样，我们正在检查摇杆是否向四个方向之一移动。摇杆的灵敏度并不比这更高。\n\niCade 的产品信息位于 Ion\
  \ Audio 网站：`http://www.ionaudio.com/products/details/icade`，而 ThinkGeek 博客列出了一些兼容\
  \ iCade 的游戏（`http://www.thinkgee.com/product/e762/`）。如果你的设备能在 iCade 上运行，请务必联系该博客，让你的应用被收录！\n\
  \n"
- "# 第 14 章 Game Center：排行榜与成就\n\n现在我们已经拥有一个可玩的 iOS 游戏，是时候添加一些锦上添花的功能了。我们将从当前热门趋势——社交游戏开始，这至少包括将高分收集到全局*排行榜*上，并以*成就*奖励玩家。\n\
  \n幸运的是，Unity 提供了针对 Apple Game Center 社交游戏平台的脚本接口。作为 iOS 用户，你很可能玩过许多向 Game Center\
  \ 提交分数和成就的游戏，也许你已经使用过 iOS 自带的 Game Center 应用来查看游戏推荐、添加其他玩家为“好友”，或向这些朋友发起挑战。我们将通过为应用注册\
  \ Game Center 排行榜和几个成就，并添加必要的脚本来将这些分数和成就提交到 Game Center，从而将 Fugu Bowl 加入到这些游戏的行列中。\n\
  \n和前面几章一样，如果你中途加入，可以从`http://learnunity4.com/`下载并打开本章的 Unity 项目，但请注意该网站上的项目不包含来自\
  \ Standard Assets 或 Asset Store 的任何资源包。不过就本章而言，该项目已准备就绪，可以运行并演示其与 Game Center 的集成。\n\
  \n到目前为止，对 Fugu Bowl 的所有 iOS 修改都可以使用 Unity Remote 或 iOS 模拟器进行测试，并且不需要 Apple Developer\
  \ 会员资格。但这种免费体验到此为止，因为将 Game Center 功能集成到应用中需要在 iTunes Connect 上为应用配置 Game Center。如果此时你还没有\
  \ Apple Developer 会员资格，你可以先通读本章和下一章（下一章涉及 iAd，也需要在 iTunes Connect 上进行一些设置），等准备就绪后再回来操作。\n\
  \n### 在 iTunes Connect 上设置 Game Center\n\n要在 iTunes Connect 中为保龄球游戏设置 Game Center，首先需要将应用添加到\
  \ iTunes Connect，重复我们在 Angry Bots 演示中演练过的步骤。假设你已是注册的 Apple Developer，请访问`http://itunesconnect.apple.com/`，点击“管理应用”（Manage\
  \ Apps），然后添加 Fuga Bowl（记住提前准备一些截图，同样按照我们在 Angry Bots 中演练的步骤进行）。对于 App Store 图标，请使用我们在\
  \ Player Settings 中设置为应用图标的同一个`Icon1024.jpg`文件。当然，你需要选择你自己的应用标识符。完成后，点击你刚创建的应用的“查看详情”（View\
  \ Details）以查看应用信息页面（图 14-1）。\n\n![9781430248750_Fig14-01.jpg](img/9781430248750_Fig14-01.jpg)\n\
  \n图 14-1. iTunes Connect 中应用信息页面的顶部\n\n在 iTunes Connect 中设置好 Fugu Bowl 后，点击应用信息页面右上角的“管理\
  \ Game Center”（Manage Game Center）按钮，调出该应用的 Game Center 管理页面。\n\n#### 添加排行榜\n\n\
  Game Center 管理页面有三个功能：它允许你将应用移入一个 Game Center 群组，管理此游戏的排行榜，以及管理此游戏的成就（图 14-2 显示了页面顶部和前两个选项，成就位于下方）。\n\
  \n![9781430248750_Fig14-02.jpg](img/9781430248750_Fig14-02.jpg)\n\n图 14-2. iTunes\
  \ Connect 中管理 Game Center 页面的顶部\n\n将应用放入 Game Center 群组允许该应用与其他应用共享排行榜和成就。例如，HyperBowl\
  \ 有六条保龄球道，每条都有其自己的排行榜。每条球道也可作为免费的广告支持应用提供。通过使用 Game Center 群组，同一个排行榜在免费球道和其对应的完整付费应用之间共享。因此，在免费\
  \ HyperBowl Classic 球道中获得高分和一些成就的玩家在购买完整游戏后仍然可以看到该分数和那些成就，而从开发者的角度来看，这很好地增加了排行榜中显示的玩家人数。由于我们目前只处理一个游戏，所以无需担心群组问题（你可以在以后随时将应用移入群组）。\n\
  \n#### 创建单个排行榜\n\n通过点击“添加排行榜”（Add Leaderboard）按钮创建一个新排行榜。这将打开一个窗口，提供创建“单个排行榜”（Single\
  \ Leaderboard）或“组合排行榜”（Combined Leaderboard）的选项（图 14-3）。组合排行榜合并了来自多个排行榜的结果。再次以 HyperBowl\
  \ 为例，该游戏的组合排行榜列出了来自六条球道排行榜的高分。\n\n![9781430248750_Fig14-03.jpg](img/9781430248750_Fig14-03.jpg)\n\
  \n图 14-3. 在 iTunes Connect 中选择排行榜类型\n\n你可以在需要时稍后添加组合排行榜。实际上，图 14-3 显示“组合排行榜”选项是灰显的，直到你实际拥有可以组合的排行榜。因此，现在只需选择“单个排行榜”，这将带你进入一个页面，你可以在其中填写排行榜信息（图\
  \ 14-4）。\n```\n\n\n![9781430248750_Fig14-04.jpg](img/9781430248750_Fig14-04.jpg)\
  \ 图 14-4. 在 iTunes Connect 中创建排行榜\n\n排行榜引用名称是排行榜在 iTunes Connect 中显示的名称。我喜欢用全大写的单词作为引用名称，这样能立刻明白它不会在其他地方使用，比如用作代码中的\
  \ ID 或显示文本。`Leaderboard ID` 是将在代码中被引用的标识符。将它设为应用程序 ID 的变体（不必完全匹配）会很方便，这样当你看到`Leaderboard\
  \ ID`时，就能立刻知道该排行榜属于哪个应用。这也有助于确保 ID 的唯一性。\n\n接下来的三个字段用于提供关于提交到排行榜的得分信息。为**得分格式类型**选择`Integer`（例如，保龄球得分永远不会是\
  \ 200.5），并指定**排序顺序**为从高到低，这意味着得分越高越好，排行榜应按降序显示得分。最后，将可能的得分范围指定为 0 到 300，这样 Game\
  \ Center 就不会显示该范围之外的任何分数（有一段时间，如果玩家提前退出游戏，HyperBowl 会提交-1 的分数）。\n\n**添加语言**\n\n\
  在你刚填写的字段下方是**排行榜本地化**部分。*本地化*是使程序适应世界上不同地区（或*区域设置*）的过程，主要涉及指定用户界面在不同语言中应使用哪些文本。你需要为此列表至少添加一种语言，因此点击**添加语言**按钮以调出相应的表单（图\
  \ 14-5）。\n\n![9781430248750_Fig14-05.jpg](img/9781430248750_Fig14-05.jpg) 图 14-5.\
  \ 在 iTunes Connect 中为排行榜添加本地化\n\n将此本地化的**语言**指定为英语，并将此语言下排行榜的**名称**指定为 High Scores。这是在\
  \ Game Center 应用或标准 Game Center 排行榜显示中查看此排行榜时将显示的名称。\n\n**得分格式**指定了得分的显示方式。保龄球得分永远不会超过\
  \ 300，因此用逗号还是小数点来分隔数字组并不重要。**得分格式后缀**也不是必需的，但如果提供了，可以使用`Point`作为单数后缀，`Points`作为复数后缀。\n\
  \n对于与排行榜**名称**一同显示的图像，你可以再次从项目的`Textures`文件夹中选择`Icon1024.jpg`文件（与应用描述图标类似，iTunes\
  \ Connect 要求 Game Center 图标为 1024×1024 的图像）。理想情况下，你应该为每个排行榜定制不同的图标。\n\n当此**语言**的设置保存后，该**语言**将列在该排行榜页面的**本地化**部分中（图\
  \ 14-6）。\n\n![9781430248750_Fig14-06.jpg](img/9781430248750_Fig14-06.jpg) 图 14-6.\
  \ 在 iTunes Connect 中保存的排行榜本地化\n\n现在，当你返回到此应用的 Game Center 管理页面时，排行榜会被列出，但工作尚未完成。你必须回到应用描述页面（返回此应用的**应用信息**页面，然后点击**查看详情**按钮）。在该页面的底部附近，点击**启用\
  \ Game Center** 按钮（图 14-7）。\n\n![9781430248750_Fig14-07.jpg](img/9781430248750_Fig14-07.jpg)\
  \ 图 14-7. 在 iTunes Connect 中启用 Game Center\n\n然后点击**编辑**按钮，会弹出一个对话框，允许你选择为此应用定义的所有新排行榜（图\
  \ 14-8）。\n\n![9781430248750_Fig14-08.jpg](img/9781430248750_Fig14-08.jpg) 图 14-8.\
  \ 在 iTunes Connect 中启用排行榜\n\n通常，你会希望添加所有显示的排行榜，除了那些计划用于未来发布的排行榜。\n\n**设置成就**\n\n\
  现在你有了排行榜，是时候处理成就了。成就的可能性是丰富多彩的。在 HyperBowl 中，成就的授予基于补中、全中、连续全中、打出完美比赛（300 分），甚至在玩家完成一局完整比赛时为每条球道都授予成就。对于\
  \ Fugu Bowl，让我们只定义获得补中和全中的成就，因为 FuguBowl 脚本已经能检测到这些情况。\n\n添加成就的过程与添加排行榜类似。在 iTunes\
  \ Connect 中，回到此应用的**Game Center** 页面（图 14-9）。\n\n![9781430248750_Fig14-09.jpg](img/9781430248750_Fig14-09.jpg)\
  \ 图 14-9. iTunes Connect 中的添加成就部分\n\n在你点击**添加排行榜**的部分下方（现在那里有一个由刚创建的排行榜组成的排行榜列表），你会看到**成就**部分。点击**添加成就**按钮以调出添加成就页面（图\
  \ 14-10）。\n\n![9781430248750_Fig14-10.jpg](img/9781430248750_Fig14-10.jpg) 图 14-10.\
  \ 在 iTunes Connect 中添加成就信息\n\n与排行榜类似，成就有一个在 iTunes Connect 中使用的**引用名称**和一个将在脚本中被引用以指代此成就的**ID**。让我们使用`FUGUBOWLSPARE`作为引用名称，并将`.spare`附加到应用程序\
  \ ID 上以形成**成就 ID**（同样，不必精确匹配——这只是一种惯例）。\n\n在名称和 ID 字段下方，指定一个**点数值**，即成就完成后 Game\
  \ Center 奖励给玩家的点数。对于获得补中，我们选择 10 个点。\n\n> **提示** 此游戏中分配给成就的总点数不能超过 1000，因此最好提前规划好你计划在游戏中添加的所有成就，并确保在这个预算内合理分配点数。\n\
  \n在**点数值**字段下方是两个“是或否”选项。*隐藏*指定成就是否可以在获得之前向玩家显示。*可多次获得*指定成就是否可以多次获得（每次都会获得点数）。如果你为此选项选择了“是”，那么玩家每次补中都会获得十分，而不仅仅是第一次补中时获得十分（图\
  \ 14-11）。\n\n![9781430248750_Fig14-11.jpg](img/9781430248750_Fig14-11.jpg) 图 14-11.\
  \ 在 iTunes Connect 中为成就添加本地化\n\n与排行榜类似，成就需要在**本地化**部分添加一种**语言**。点击**添加语言**按钮会弹出一个窗口，你可以在其中指定语言（英语）、成就的**标题**（Spare）、一个**获得前描述**（在成就获得前显示）以及一个**获得后描述**（在成就获得后显示）（图\
  \ 14-12）。\n\n![9781430248750_Fig14-12.jpg](img/9781430248750_Fig14-12.jpg) 图 14-12.\
  \ 在 iTunes Connect 中保存的成就本地化\n\n同样，为简便起见，我们选择项目`Textures`文件夹中的`Icon1024.jpg`图像作为成就图标，但在一个完善的游戏中，你可能为每个成就准备不同的图标。当你点击**保存**时，新的**语言**将列在**成就本地化**部分中。\n\
  \n\n以下是按照您的要求，将给定英文文本翻译成符合规范的中文 Markdown 文档：\n\n```markdown\n在“成就”（Achievement）页面上点击“保存”（Save），该成就现在将列在“Game\
  \ Center 管理”页面上。重复该过程，创建一个用于“全中”（rolling a strike）的成就。制作“全中”成就的唯一区别在于，您将使用不同的引用名称和\
  \ ID，并且奖励 20 分而不是 10 分。此外，您还应该提供不同的“已获得”和“未获得”成就描述。完成后，再次访问“应用描述”（App Description）页面（在您添加排行榜时，Game\
  \ Center 已在该页面启用），然后点击“成就”（Achievements）部分上方的“编辑”（Edit）按钮，以添加可用的成就。\n\n至此，您已经在 Game\
  \ Center 中设置了一个排行榜和两个成就。现在，是时候回到脚本编写工作了！\n\n### 集成 Game Center\n\nUnity 通过`Social`类中的静态函数提供对\
  \ Game Center 的访问，该类为社交游戏平台提供通用接口。原则上，您甚至可以无需大幅更改代码即可访问其他社交游戏网络，但目前，`Social`仅支持\
  \ Game Center。\n\n我们的游戏将调用`Social`类中的函数来连接 Game Center 并提交成就和分数。我们可以将这些调用直接放入游戏控制器脚本中，但通过创建一个新脚本，我们可以最大限度地减少代码膨胀并最大限度地提高代码可重用性。\n\
  \n在“项目视图”（Project View）中，创建一个新的 JavaScript 文件，将其放置在“脚本”（Scripts）文件夹中，并命名为`FuguGameCenter`（图\
  \ 14-13）。\n\n![9781430248750_Fig14-13.jpg](img/9781430248750_Fig14-13.jpg)\n\n图\
  \ 14-13. 创建一个新的`FuguGameCenter.js`脚本\n\n#### 初始化 Game Center\n\n在新的`FuguGameCenter`脚本中，我们将\
  \ Game Center 初始化代码放在`Start`回调函数中（清单 14-1），以便在脚本启用时立即进行初始化。`Start`回调函数的主体被包裹在`#ifdef\
  \ UNITY_IPHONE`中，这样任何非 iOS 构建都会将该回调视为空。\n\n清单 14-1.  `FuguGameCenter.js`中的 Game\
  \ Center 初始化\n\n```js\nimport UnityEngine.SocialPlatforms.GameCenter;\nvar showAchievementBanners:boolean\
  \ = true;\n\nfunction Start() {\n    #if UNITY_IPHONE\n        Social.localUser.Authenticate\
  \ (function (success) {\n            if (success && showAchievementBanners) {\n\
  \                GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
  \                Debug.Log (\"Authenticated \"+Social.localUser.userName);\n   \
  \         } else {\n                Debug.Log (\"Failed to authenticate \"+Social.localUser.userName);\n\
  \            }\n        });\n    #endif\n}\n```\n\n函数`Social.authenticate`执行玩家的\
  \ Game Center 登录（必要时会提示玩家输入登录信息），并接受一个回调函数作为参数。当 Game Center 报告一个`true`或`false`结果（表示操作是否成功）时，该值会被传递给回调函数。与我们之前定义函数（通过单独的名称定义）不同，为了方便，我们直接将函数定义作为参数传递，而不指定名称。以这种方式传递的函数被称为*匿名函数*。我们的匿名回调函数根据`success`值调用`Debug.Log`并输出一条消息。这为我们提供了一种简单的方法来在测试时检查登录是否失败。\n\
  \n该回调函数还可以选择性地激活成就横幅，这些横幅是短暂显示的成就已获得的通知。此 Game Center 功能在 iOS 5 中引入，因此该功能通常被称为 iOS\
  \ 5 风格的成就通知横幅。我个人很喜欢看到它们，但这关乎个人偏好，因此我们有一个公共布尔变量`showAchievementBanners`，我们可以在“检查器视图”（Inspector\
  \ View）中勾选或取消勾选它。\n\n如果回调函数收到值为`true`的身份验证成功结果，并且`showAchievementBanners`也为`true`，那么回调函数会调用静态函数`GameCenterPlatform.ShowDefaultAchievementCompletionBanner`，该函数接受一个`true`或`false`参数来打开或关闭横幅，并接受一个成功的回调函数作为参数。成就横幅功能不被视为跨平台特性，这就是为什么该功能未在`Social`类中公开，而必须从`GameCenterPlatform`类中访问的原因。该类位于`UnityEngine.SocialPlatforms.GameCenter`命名空间中，因此我们在脚本顶部导入该命名空间，以避免在引用`GameCenterPlatform`时输入完整的命名空间名称。\n\
  \n#### 提交成就\n\n提交成就只需要调用静态函数`Social.ReportProgress`即可。但该函数也需要一个成功的回调函数，而且我们首先应该检查玩家是否已实际登录到\
  \ Game Center。为了避免在每个提交成就的代码片段中都重复这些操作，我们将为`Social.ReportProgress`在`FuguGameCenter`脚本中添加一个包装函数（清单\
  \ 14-2）。\n\n清单 14-2.  在`FuguGameCenter.js`中提交成就\n\n```js\nstatic function Achievement(name:String,progress:double)\
  \ {\n    #if UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n     \
  \       Social.ReportProgress(name,progress, function(success) {\n             \
  \   if (success) {\n                    Debug.Log(\"Achievement \"+name+\" reported\
  \ successfully\");\n                } else {\n                    Debug.Log(\"Failed\
  \ to report achievement \"+name);\n                }\n            } );\n       \
  \ }\n    #endif\n}\n```\n\n这个我们将调用`Achievement`的包装函数是一个静态函数，因此可以从任何脚本中以`FuguGameCenter.Achievement`的形式调用它。它接受一个成就\
  \ ID 和一个进度数值（范围为 0-100），并将它们连同成功的回调函数一起传递给`Social.ReportProgress`，该回调函数会使用`Debug.Log`打印结果。\n\
  \n**注意**：成就进度是以`double`类型传递的，而不是`int`或`float`，这仅仅是遵循 Game Center 的期望。`double`是一个双精度浮点数（`float`是单精度浮点数）。包括\
  \ Unity 在内的游戏引擎通常使用单精度浮点数。\n\n但首先，`Achievement`会检查`Social.localUser.authenticated`，看在调用`Social.ReportProgress`之前玩家是否已登录到\
  \ Game Center。\n\n#### 提交分数\n\n向 Game Center 排行榜提交分数的代码看起来与提交成就的代码几乎相同（清单 14-3）。\n\
  \n清单 14-3.  在`FuguGameCenter.js`中提交分数\n\n```js\nstatic function Score(name:String,score:double)\
  \ {\n    #if UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n     \
  \       Social.ReportScore (score, name, function(success) {\n                if\
  \ (success) {\n                    Debug.Log(\"Posted \"+score+\" on leaderboard\
  \ \"+name);\n                } else {\n                    Debug.Log(\"Failed to\
  \ post \"+score+\" on leaderboard \"+name);\n                }\n            } );\n\
  \        }\n    #endif\n}\n```\n\n静态函数`FuguGameCenter.Score`与静态函数`FuguGameCenter.Achievement`之间的唯一区别在于，一个调用`Social.ReportScore`，另一个调用`Social.ReportProgress`。当然，它们的`Debug.Log`消息也不同，并且`Social.ReportScore`接受的是排行榜\
  \ ID 和分数，而不是成就 ID 和进度数值。\n\n### 完整脚本\n\n现在，您拥有了一个非常精简的 Game Center 包装脚本，其中包含一个`Start`回调、一个公共变量以及几个供其他脚本使用的静态函数。\n\
  ```\n\n\n# FuguGameCenter 集成\n\n完整的 `FuguGameCenter` 脚本可在本章项目的 [`learnunity4.com/`](http://learnunity4.com/)\
  \ 中获取。\n\n### 附加脚本\n\n由于 Game Center 的初始化是在 `FuguGameCenter.js` 的 `Start` 回调中进行的，因此必须将该脚本附加到场景中的某个\
  \ `GameObject` 上。请确保已打开保龄球场景，创建一个空 `GameObject`，将其命名为 `GameCenter`，然后将 `FuguGameCenter`\
  \ 脚本拖放到该对象上。该脚本只有一个可以在检视面板中调整的属性，即是否显示 iOS 5 风格的成就横幅（图 14-14）。\n\n![9781430248750_Fig14-14.jpg](img/9781430248750_Fig14-14.jpg)\n\
  \n图 14-14 场景中的 `FuguGameCenter` 脚本\n\n你也可以将 `FuguGameCenter` 脚本附加到启动场景中的某个 `GameObject`\
  \ 上，因为无论该脚本是否附加到任何场景中，其中定义的静态函数都可以被调用。将脚本放在启动场景中的好处是可以更早地初始化 Game Center，但如果 `FuguGameCenter`\
  \ 脚本与将要调用它的脚本（本例中为 `FuguBowl` 脚本）位于同一场景中，则会更清晰易懂。\n\n### 集成游戏\n\n尽管 `FuguGameCenter`\
  \ 脚本负责处理 Game Center 的初始化，并提供了报告分数和成就的静态函数，但你仍然需要让 `FuguBowl` 脚本去调用这些静态函数。幸运的是，这部分非常简单。\n\
  \n#### 提交成就\n\n到目前为止，我们已经设置了两个成就：一个用于补中，另一个用于全中。现在游戏需要在发生补中和全中时进行报告（至少是第一次）。这正是将游戏控制器组织为状态机所带来的巨大优势。游戏中已经存在补中状态和全中状态，因此我们只需在其中添加对\
  \ `FuguGameCenter.Achievement` 函数的调用即可（代码清单 14-4）。\n\n代码清单 14-4 在 `FuguBowl.js`\
  \ 中提交成就\n\n```javascript\nvar spareAchievementID:String = \"com.technicat.fugubowl.spare\"\
  ;\nvar strikeAchievementID:String = \"com.technicat.fugubowl.strike\";\n\nfunction\
  \ StateSpare() {\n       FuguGameCenter.Achievement(spareAchievementID,100);\n \
  \      state=\"StateNextBall\";\n}\n\nfunction StateStrike() {\n       FuguGameCenter.Achievement(strikeAchievementID,100);\n\
  \       state = \"StateNextBall\";\n}\n```\n\n不要硬编码传递给 `FuguGameCenter.Achievement`\
  \ 的成就 ID（因为你的成就 ID 很可能与我的不同），而是为补中和全中声明公共变量，以便你可以在检视面板中自定义它们。\n\n#### 提交分数\n\n提交最终游戏分数与提交成就类似。我们已经在游戏结束状态使用\
  \ `Debug.Log` 打印了最终分数，因此这里很自然地可以提交最终分数给 Game Center（代码清单 14-5）。\n\n代码清单 14-5 在 `FuguBowl.js`\
  \ 中提交游戏分数\n\n```javascript\nvar leaderboardID:String = \"com.technicat.fugubowl.highscore\"\
  ;\n\nfunction StateGameOver() {\n       Debug.Log(\"Final Score: \"+player.GetScore(9));\n\
  \       FuguGameCenter.Score(leaderboardID,player.GetScore(9));\n       yield WaitForSeconds(gameOverTime);\n\
  \       state=\"StateNewGame\";\n}\n```\n\n同样，排行榜 ID 被声明为一个公共变量，因此可以在检视面板中自定义（图\
  \ 14-15）。\n\n![9781430248750_Fig14-15.jpg](img/9781430248750_Fig14-15.jpg)\n\n图\
  \ 14-15 `FuguBowl` 脚本中自定义的 Game Center ID\n\n这对我们的游戏控制器代码来说只是一个很小的改动，仅增加了两行代码（而且本可以合并为一行），所以我就不再列出整个\
  \ `FuguBowl` 脚本了，但修改后的脚本当然可以在本章项目的 `http://learnunity4.com/` 中找到。\n\n### 测试游戏\n\n\
  在应用程序发布到 App Store 之前，成就和排行榜仅存在于 Game Center 沙箱中。沙箱本质上是 Game Center 的另一个平行宇宙，拥有自己的用户\
  \ ID、排行榜和成就数据。当一个正在开发中的应用程序（尚未获得 App Store 批准的版本）尝试连接到 Game Center 时，系统会提示玩家登录或创建一个沙箱账户。外部世界将看不到你在测试会话中获得的任何分数和成就，因为它们只记录在沙箱中。\n\
  \n**提示**：如果你似乎卡在了 Game Center 的沙箱版本或非沙箱版本中，请尝试打开 iOS 的 Game Center 应用，然后退出登录（点击你的\
  \ Apple ID）。\n\n当你在 iOS 模拟器或设备上（而非编辑器内）构建并运行 Fugu Bowl，并完成一整个游戏后，你应该能在排行榜上看到一个分数，并且如果你打出了全中或补中，最多还能看到两个成就。此时，Fugu\
  \ Bowl 应该会出现在 Game Center 应用中（图 14-16），当你点击它时，你将看到已提交的分数和成就（图 14-17）。\n\n![9781430248750_Fig14-16.jpg](img/9781430248750_Fig14-16.jpg)\n\
  \n图 14-16 Fugu Bowl 在 Game Center 沙箱版本中列出\n\n![9781430248750_Fig14-17.jpg](img/9781430248750_Fig14-17.jpg)\n\
  \n图 14-17 Game Center 沙箱中的测试结果\n\n分数和成就并不总是能可靠或及时地在 Game Center 中显示，尤其是在沙箱中测试时，因此请检查\
  \ Xcode 的调试区域，确认 Game Center 操作是否成功（记住，我们在所有 `FuguGameCenter` 函数中都添加了日志功能）。\n\n\
  ### 在游戏内显示 Game Center\n\n尽管 Game Center 应用的成就和排行榜界面看起来相当不错，但保龄球游戏的玩家可能不会费心去查看 Game\
  \ Center 应用，甚至可能根本不知道它的存在。理想情况下，玩家应该能够直接在游戏内查看排行榜和成就。因此，让我们在 `FuguPause` 脚本的主暂停菜单中添加几个按钮来实现此目的（代码清单\
  \ 14-6）。\n\n代码清单 14-6 在 `FuguPause.js` 中添加显示成就和最高分的按钮\n\n```javascript\nfunction\
  \ ShowPauseMenu() {\n       BeginPage(150,300);\n       if (GUILayout.Button (\"\
  Play\")) {\n               UnPauseGame();\n       }\n        if (GUILayout.Button\
  \ (\"Options\")) {\n               currentPage = Page.Options;\n       }\n     \
  \   if (GUILayout.Button (\"Credits\")) {\n               currentPage = Page.Credits;\n\
  \       }\n#if UNITY_IPHONE\n       if (GUILayout.Button (\"High Scores\")) {\n\
  \               Social.ShowLeaderboardUI();\n       }\n       if (GUILayout.Button\
  \ (\"Achievements\")) {\n               Social.ShowAchievementsUI();\n       }\n\
  #endif\n#if !UNITY_IPHONE && !UNITY_WEBPLAYER\n        if (GUILayout.Button (\"\
  Quit\")) {\n               Application.Quit();\n       }\n#endif\n        EndPage();\n\
  }\n```\n\n这两个按钮的代码被包裹在 `#if UNITY_IPHONE` 中，因此它们只会在 iOS 构建版本中显示。按钮标签分别为“最高分”和“成就”（图\
  \ 14-18）。\n\n![9781430248750_Fig14-18.jpg](img/9781430248750_Fig14-18.jpg)\n\n图\
  \ 14-18\n\n\n\n带有排行榜和成就按钮的暂停菜单\n\n`Social` 类提供了查询 Game Center 排行榜和成就信息的功能，可用于构建自定义显示界面。但更简单的方法是直接调用\
  \ `Social.ShowLeaderboardUI` 和 `Social.ShowAchievementsUI` 函数，分别调出标准的 Game Center\
  \ 排行榜和成就展示界面。因此，高分按钮调用 `Social.ShowLeaderboardUI`，而 `成就` 按钮调用 `Social.ShowAchievementsUI`。\n\
  \n当你运行 Fugu Bowl 并成功连接到 Game Center，然后点击新的 Game Center 按钮之一时，会显示标准的 Game Center\
  \ 界面。图 14-19 展示了点击“成就”按钮后的结果。\n\n![9781430248750_Fig14-19.jpg](img/9781430248750_Fig14-19.jpg)\n\
  \n图 14-19. 使用 `Social.ShowAchievementsUI` 显示的游戏内成就\n\n其显示效果与 Game Center 应用类似，但更为简单。例如，游戏内显示不需要那些将视图切换到\
  \ Game Center 应用其他部分的所有导航按钮。此外，iPad 版本的显示效果差异很大，因为 iPad 拥有更大的屏幕空间。\n\n你可能认为我们应该在\
  \ `FuguGameCenter` 中为这两个调用添加封装函数，但这些函数非常简单，没有必要这么做。它们不接受成功回调函数作为参数，并且事先检查 `Social.localUser.authenticated`\
  \ 也非必要。事实上，最好不要检查，因为如果当前没有 Game Center 登录状态，`Social.ShowLeaderboardUI` 和 `Social.ShowAchievementsUI`\
  \ 都会向玩家发出用户友好的提示。\n\n与游戏控制器代码的更改一样，增强后的暂停菜单只需增加几行代码，因此这里不完整重列 `FuguPause.js` 的代码。修改后的脚本位于本章的项目文件中，可从\
  \ `http://learnunity4.com/` 获取。\n\n## 进一步探索\n\n这是效率较高的脚本编写章节之一。只需几行代码，我们的游戏就能连接到\
  \ Game Center、提交成就和分数、并通过暂停菜单展示成就和排行榜！\n\n大部分工作都花在了 iTunes Connect 上的 Game Center\
  \ 设置上。即便如此，为保龄球游戏设计排行榜和成就集也相当直接，因为其规则和传统定义得非常明确。如果你设计一款新游戏，很可能会需要思考游戏中需要哪些排行榜和成就，并且可能应该在设计过程的早期就考虑这个问题。\n\
  \n#### 脚本参考\n\n本章几乎专门使用了“Social”类来访问本章所用的 Game Center 功能。该类的“脚本参考”页面解释了它在封装对 Game\
  \ Center 以及其他潜在社交游戏平台（尽管目前 Game Center 是唯一的一个）的访问中所扮演的角色。\n\n我们只使用了报告分数和成就以及显示结果所需的最少函数集：访问\
  \ `Social.localUser` 以连接到 Game Center，调用 `Social.ReportProgress` 和 `Social.ReportScore`\
  \ 分别提交成就和分数，以及调用 `Social.ShowAchievementsUI` 和 `Social.ShowLeaderboardUI` 以调出 Game\
  \ Center 展示玩家成就和游戏排行榜的界面。`Social` 类的文档列出了其他几个函数，这些函数允许更精细的控制，例如，从 Game Center 检索信息以填充自定义的排行榜显示。\n\
  \n我们绕过了 `Social`，直接访问了 `GameCenterPlatform` 类来调用其 `showDefaultAchievementsCompletionBanner`\
  \ 函数，从而启用了 iOS 5 风格的成就横幅。\n\n`GameCenterPlatform` 类的页面说明了它所在的命名空间，并包含一些关于 Game Center\
  \ 沙箱的说明。\n\n#### iOS 开发者库\n\niTunes Connect 开发者指南中的 Game Center 章节是设置成就和排行榜的权威来源。该指南可在\
  \ iOS 开发者库（可在 `http://developer.apple.com/library/ios` 或 Xcode Organizer 中找到）中找到。\n\
  \nGame Center 的内部工作原理在 iOS 开发者库中“网络与互联网”主题下的“Game Center 编程指南”中有详细说明。Game Center\
  \ 中可以集成到应用程序中的部分（与 Apple 运营的服务器部分相对）实际上被称为 Game Kit，并且还支持网络多人游戏。\n\n#### 资源商店\n\n\
  Game Center 并非 iOS 上唯一可用的社交游戏平台。许多平台都来了又走（如 OpenFeint、Agon Online），但仍有一些其他选择。在其“服务”类别下，资源商店提供了\
  \ PlayHaven (`http://playhaven.com/`) 和 Swarm (`http://swarmconnect.com/`) 的插件，两者都提供排行榜、成就和其他社交游戏功能。另一个来自\
  \ Hippo Games 的 Game Center 插件，列在“脚本/集成”类别下。\n\n在 Unity 内置 Game Center 支持之前，Prime31\
  \ Studios 提供了一个 Game Center 插件，该插件在 `http://prime31.com/` 上仍然可用（但不在资源商店中），对于需要 Unity\
  \ 未提供某些功能的开发者来说，这是一个选择。例如，Prime31 插件包含一个发布成就挑战的功能（这是 iOS 6 的一项功能）。Prime31 还提供了一个用于多人游戏支持的\
  \ Game Kit 插件，该插件可在资源商店中找到。\n\n## 第 15 章：iAd：横幅广告和插页广告\n\n坦率地说，在如今这个免费增值的时代，让很多人为应用付费并不容易。因此，一种替代方案是整合广告。iAd\
  \ 并非唯一可用的移动广告产品，但它是 iOS 官方的广告服务，向开发者支付 70% 的收入，这与付费应用销售的份额相同。而且，方便的是，Unity 为 iAd\
  \ 提供了脚本支持。在本章中，我们将把 iAd 提供的两种广告类型——横幅广告和插页式（全屏）广告——整合到我们的保龄球游戏中。\n\n`http://learnunity4.com/`\
  \ 上本章的项目文件包含了本章开发的 iAd 脚本，足以演示 iAd 功能。但是，即使你从该项目开始以避免手动添加脚本，你仍然需要在 iTunes Connect\
  \ 中启用 iAd。\n\n### iTunes Connect\n\n与 Game Center 类似，除了在脚本中调用 Unity 的 iAd 函数外，你还需要在\
  \ iTunes Connect 上为我们的应用启用 iAd。除了“管理应用”页面外，iTunes Connect 还有另外两个与 iAd 相关的页面：“合同、银行和税务”页面以及“iAd\
  \ 网络”页面（图 15-1）。\n\n![9781430248750_Fig15-01.jpg](img/9781430248750_Fig15-01.jpg)\n\
  \n图 15-1. iTunes Connect 上与 iAd 相关的页面\n\n#### 签署合同\n\n你需要访问的第一个页面是“合同、银行和税务”页面，以便同意\
  \ Apple 的 iAd 合同，就像你必须同意付费销售合同才能开始对应用收费一样。\n\n一旦 iAd 合同处理完毕，如 图 15-2 所示，你就可以为各个应用启用\
  \ iAd 了。\n\n![9781430248750_Fig15-02.jpg](img/9781430248750_Fig15-02.jpg)\n\n图 15-2.\
  \ 在 iTunes Connect 上列出的已完成的 iAd 网络合同\n\n#### 启用 iAd\n\n就像你对 Game Center 所做的那样，通过进入\
  \ iTunes Connect 的“管理应用”页面，选择 Fugu Bowl，并访问其“应用信息”页面，为 Fugu Bowl 启用 iAd。\n\n\n\n\
  在右上角，与 Game Center 按钮同一区域，是管理 iAd Network 按钮（图 15-3）。  \n![9781430248750_Fig15-03.jpg](img/9781430248750_Fig15-03.jpg)\
  \  \n图 15-3。iTunes Connect 中应用信息页面的顶部区域\n\n点击管理 iAd Network 按钮，开始启用 iAd 的流程。这比启用\
  \ Game Center 简单得多。无需设置排行榜或成就，只需点击启用 iAd Network 按钮即可（图 15-4）。  \n![9781430248750_Fig15-04.jpg](img/9781430248750_Fig15-04.jpg)\
  \  \n图 15-4。在 iTunes Connect 上启用 iAd\n\n与 Game Center 一样，iAd 只能在应用的**新版本**被添加到 iTunes\
  \ Connect 之后、且在该版本被批准和发布之前，才能启用或禁用。iAd 的更改将影响即将发布的版本，并且无法更改已在 App Store 上的应用的 iAd\
  \ 状态。\n\n**提示**  \n我曾有应用因截图包含测试广告而被拒绝，因此你可能需要在启用 iAd 之前为你的应用截图。\n\n现在，我们的应用在服务器端已启用了\
  \ iAd，你只需将 iAd 代码添加到应用本身即可。\n\n### 添加横幅广告\n\n让我们先为保龄球游戏添加一个横幅广告。与仅适用于 iPad 的插页式广告不同，横幅广告适用于所有设备。坦率地说，横幅广告更容易集成到游戏中。你只需要在屏幕顶部或底部预留一些空间。\n\
  \n**提示**  \n在设计应用时就应考虑将广告置于何处，而不是事后才考虑。\n\n### 创建脚本\n\n类似于上一章我们为初始化 Game Center\
  \ 创建脚本的方式，让我们编写一个脚本来实例化并放置一个横幅广告。在项目视图中创建一个新的 JavaScript 文件，将其放在 Scripts 文件夹中，并命名为\
  \ `FuguAdBanner`（图 15-5）。  \n![9781430248750_Fig15-05.jpg](img/9781430248750_Fig15-05.jpg)\
  \  \n图 15-5。创建 FuguAdBanner 脚本\n\n然后编辑该脚本，并将代码清单 15-1 的内容添加到其中。\n\n代码清单 15-1。FuguAdBanner.js\
  \ 的完整代码清单\n\n```\n#pragma strict\n\npublic var showOnTop:boolean = true; // 横幅在屏幕顶部或底部\n\
  public var dontDestroy:boolean = false; // 为下一个场景保留此游戏对象\n\n#if UNITY_IPHONE\n\n\
  // 不要将其设为局部变量，否则它会被垃圾回收\nprivate var banner:ADBannerView;\n\nfunction Start () {\n\
  \        if (dontDestroy) {\n                GameObject.DontDestroyOnLoad(gameObject);\
  \ // 跨场景保持广告存活\n        }\n        Debug.Log(\"正在创建 iAd 横幅\");\n        banner =\
  \ new ADBannerView();\n        banner.autoSize = true;\n        banner.autoPosition\
  \ = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n        while (!banner.loaded\
  \ && banner.error == null) {\n                yield;\n        }\n        if (banner.error\
  \ == null) {\n                Debug.Log(\"iAd 横幅已显示\");\n                banner.Show();\n\
  \        } else {\n                Debug.Log(\"iAd 横幅错误: \"+banner.error.description);\n\
  \                banner = null;\n        }\n}\n#endif\n```\n\n`FuguAdBanner` 中的代码与\
  \ `AdBannerView` 的脚本参考示例类似。`Start` 回调会创建一个 `AdBannerView` 实例，并在 `while` 循环中等待，要么等待横幅加载完成（由\
  \ `AdBannerView` 的 `loaded` 变量指示），要么等待错误发生（由 `AdBannerView` 中的 `error` 变量指示）。`while`\
  \ 循环调用 `yield` 以避免阻塞游戏的其余部分运行。\n\n如果发生错误，错误消息会通过 `Debug.Log` 记录下来。\n\n如果横幅加载成功，则会立即通过调用\
  \ `AdBannerView` 的 `Show` 函数显示广告。你可以随时调用广告的 `Show` 和 `Hide` 方法，但对于横幅广告，最简单的方式是让它一直显示。\n\
  \n#### 变量\n\n为了给脚本提供一定的灵活性和可复用性，让我们添加几个公共布尔变量，它们将在检视视图中显示为复选框。`ShowOnTop` 变量通过相应地传递枚举值\
  \ `AdPosition.Top` 或 `AdPosition.Bottom`，来决定横幅是显示在屏幕顶部还是底部（仅有的两个选项）。iAd 横幅会自动调整大小以横跨屏幕。\n\
  \n如果另一个变量 `DontDestroy` 为 `true`，则我们调用静态函数 `GameObject.DontDestroyOnLoad`，并传入脚本所附加的游戏对象。这样做可以在加载另一个关卡时保持该游戏对象存活，因此如果你有多个场景，则无需在每个场景中都添加一个\
  \ `AdBanner` 游戏对象。\n\n**注意**  \n在稍后会被再次加载的场景中调用 `GameObject.DontDestroyOnLoad` 可能会导致重复的游戏对象。\n\
  \n例如，如果你将 `AdBanner` 游戏对象放在启动场景中而不是保龄球场景中，将 `dontDestroy` 设置为 `true` 将使横幅广告在加载保龄球场景时持续存在，而不会被销毁。\n\
  \n#### 垃圾回收\n\n谈到销毁的对象，请注意我们在 `Start` 函数外部声明了 `banner` 变量，虽然看起来它本可以在内部声明。通常，最好在尽可能小的作用域内声明变量，但在这种情况下，你需要\
  \ `ADBannerView` 的生命周期与该游戏对象的生命周期一致。如果你在 `Start` 函数内部将 `banner` 声明为变量，那么当 `Start`\
  \ 函数返回后，就不会再有任何对 `ADBannerView` 对象的引用，该对象可能会随时被销毁以释放其占用的内存，并且广告也会随之消失。\n\n这种回收过程被称为*垃圾回收*（GC），因为那些无法被代码访问到的对象实际上就是垃圾。对于场景中的对象（基本上所有类继承自\
  \ `UnityEngine.Object` 的对象）来说，GC 不是问题，因为只要它们在场景中，就存在一个对它们的隐式引用。通常，这些对象必须通过调用 `UnityEngine.Object`\
  \ 类的静态 `Destroy` 函数来显式清理。\n\n### 附加脚本\n\n要将 `FuguAdBanner` 脚本添加到保龄球场景，请确保该场景已打开，在层次视图中创建一个新的游戏对象，将其命名为\
  \ `AdBanner`，然后将 `FuguAdBanner` 脚本拖到它上面（图 15-6）。  \n![9781430248750_Fig15-06.jpg](img/9781430248750_Fig15-06.jpg)\
  \  \n图 15-6。已添加到场景中的 FuguAdBanner 脚本\n\n因为我们的记分板在屏幕顶部，横幅广告最好放在底部，所以取消勾选 `Show On\
  \ Top`。并且由于 `AdBanner` 游戏对象放置在保龄球场景中，而该场景不会加载任何其他场景，因此是否调用 `DontDestroyOnLoad` 实际上无关紧要，但我们也保持\
  \ `DontDestroy` 为未勾选状态。\n\n### 测试脚本\n\n在编辑器中运行游戏时，iAd 不会显示，但你可以通过在 iOS 模拟器或设备上运行游戏来测试它。在应用未被批准之前，它只会显示测试广告，如图\
  \ 15-7 所示。  \n![9781430248750_Fig15-07.jpg](img/9781430248750_Fig15-07.jpg)  \n\
  图 15-7。一个测试 iAd 横幅\n\n如果广告没有出现，请检查 Xcode 调试区域，查看 `FuguAdBanner` 脚本输出的 `Debug.Log`\
  \ 错误消息。但如果没有错误消息，则无需担心。\n\n\n\n有时广告需要一段时间才会显示，有时 iAd 服务器未能提供广告，此时调试区域会显示*无库存*消息。即使应用已通过审核，通常也会延迟一段时间后\
  \ iAd 才会真正激活。在此期间，用户会看到测试广告，但同样不必惊慌！\n\n### 添加插屏广告\n\n现在我们准备尝试插屏广告。由于插屏广告是全屏广告，因此处理方式必须与横幅广告不同。当插屏广告出现时，必须先将其关闭才能继续游戏，就像关闭模态对话框一样。因此，插屏广告通常策略性地放置在游戏的过渡节点（interstitial\
  \ 意为“间隙之间”）。没人希望游戏正酣时突然弹出全屏广告！为此，我们将插屏广告放在初始场景中，这样它就会（如果出现的话）在保龄球场景加载之前显示。\n\n同样，我们首先创建一个名为\
  \ `FuguAdInterstitial`（图 15-8）的新 JavaScript 文件。添加代码清单 15-2 的内容。\n\n![9781430248750_Fig15-08.jpg](img/9781430248750_Fig15-08.jpg)\n\
  \n图 15-8. 创建 `FuguAdInterstitial` 脚本\n\n代码清单 15-2.  `FuguAdInterstitial.js` 的完整代码\n\
  \n```\n#pragma strict\n\nvar waitTime:float = 2.0;\n\n#if UNITY_IPHONE\nprivate\
  \ var ad:ADInterstitialAd = null;\n\nfunction Start() {\n        if (iPhone.generation\
  \ == iPhoneGeneration.iPad1Gen ||\n                iPhone.generation == iPhoneGeneration.iPad2Gen\
  \ ||\n                iPhone.generation == iPhoneGeneration.iPad3Gen ||\n      \
  \          iPhone.generation == iPhoneGeneration.iPad4Gen ||\n                iPhone.generation\
  \ == iPhoneGeneration.iPadMini1Gen ||\n                iPhone.generation == iPhoneGeneration.iPadUnknown)\
  \ {\n                ad = new ADInterstitialAd();\n                var startTime\
  \ = Time.time;\n                while (!ad.loaded && ad.error == null && Time.time-startTime<waitTime)\
  \ {\n                        yield;\n                }\n                if (ad.loaded\
  \ && ad.error == null) {\n                        Debug.Log(\"iAd page shown\");\n\
  \                        ad.Present();\n                }  else {\n            \
  \            if (ad.error != null) {\n                                Debug.Log(\"\
  iAd page error: \"+ad.error.description);\n                        }  else {\n \
  \                               Debug.Log(\"iAd page timed out\");\n           \
  \             }\n                        ad = null;\n                }\n       \
  \ }\n}\n#endif\n```\n\n由于插屏广告仅在 iPad 上可用，因此 `Start` 函数要做的第一件事就是检查当前是否运行在 iPad 上。遗憾的是，没有简洁的测试方法，但你可以检查\
  \ `iPhone.generation` 的静态变量，看其值是否与某个 iPad 型号匹配，每个型号都在 `iPhoneGeneration` 枚举中定义了对应的值。\n\
  \n测试 `iPhone.generation` 的方式展示了 `iPhoneGeneration` 枚举中的 iPad 值，但它的缺点在于，当未来版本的 Unity\
  \ 为新 iPad 型号添加新值时，需要同步更新。另一种方法（根据你的观点，可能更健壮也可能更取巧）是将 `enum` 值转换为字符串，并检查其是否以“iPad”开头，如下所示：`if(iPhone.generation.ToString().StartsWith(\"\
  iPad\"))`。\n\n在完成 iPad 检查后，代码与 `FuguAdBanner` 脚本类似。这里我们使用的是 Unity 的 `ADInterstitialAd`\
  \ 类，而不是 `ADBannerView` 类。如同 `FuguAdBanner` 处理 `ADBannerView` 一样，代码实例化了一个 `ADInterstitialAd`，并在一个\
  \ `while-yield` 循环中等待 `ADInterstitialAd` 加载成功或加载失败并报错。\n\n但我们不希望无限期等待，尤其是当这可能会延迟游戏开始时，因此我们还设置了在特定时间\
  \ `waitTime` 过后停止等待。\n\n`waitTime` 以秒为单位，并被声明为公共变量，以便在检视面板中调整。在循环开始前，将当前游戏时间（可通过静态变量\
  \ `Time.time` 获取，同样以秒为单位）保存到局部变量 `startTime` 中。该循环除了检查广告是否加载成功或报错外，还会检查 `Time.time`\
  \ 减去 `startTime` 是否仍然小于 `waitTime`。\n\n当 `while` 循环终止时，如果广告已成功加载，则使用 `ADInterstitialAd.Present`\
  \ 函数（本质上与 `ADBannerView` 使用的 `Show` 函数相同）显示广告。如果加载失败，则通过 `Debug.Log` 记录一条“iAd page\
  \ has timed out”消息。\n\n### 附加脚本\n\n有了 `FuguAdInterstitial` 脚本，我们就可以将其添加到场景中了。如前所述，我们将把它添加到初始场景中，因此让我们切换到该场景（在项目视图中双击初始场景文件）。然后创建一个空的\
  \ `GameObject` 并命名为 `AdPage`（你也可以命名为 `AdInterstitial`，但何不取个更容易输入的名字）。将 `FuguAdInterstitial`\
  \ 脚本拖拽到 `AdPage` `GameObject` 上（图 15-9）。\n\n![9781430248750_Fig15-09.jpg](img/9781430248750_Fig15-09.jpg)\n\
  \n图 15-9. 将 `FuguAdInterstitial` 脚本添加到初始场景\n\n### 测试脚本\n\n现在可以运行了。与横幅广告一样，在编辑器中运行时不会看到任何广告，但在\
  \ iOS 模拟器或设备上测试时，应该会在初始画面显示期间看到全屏广告（图 15-10）。与横幅广告类似，不能保证 iAd 服务器一定会发送广告，但如果发送了，在应用发布到\
  \ App Store 之前，它将是一个测试广告。\n\n![9781430248750_Fig15-10.jpg](img/9781430248750_Fig15-10.jpg)\n\
  \n图 15-10. 在 iOS 模拟器上测试插屏 iAd\n\n### 跟踪广告收入\n\n与应用销售收入一样，iAd 收入也通过 iTunes Connect\
  \ 报告，具体在 iAd 网络页面链接下，如图 15-1 所示。iAd 网络页面顶部以图表形式显示所有应用的 iAd 收入（图 15-11）。\n\n![9781430248750_Fig15-11.jpg](img/9781430248750_Fig15-11.jpg)\n\
  \n图 15-11. iAd 收入\n\n收入图表下方是一个启用 iAd 的应用列表，包括已上线和仍处于测试广告状态的应用（图 15-12）。\n\n![9781430248750_Fig15-12.jpg](img/9781430248750_Fig15-12.jpg)\n\
  \n图 15-12. iAd 收入页面上的应用列表\n\n点击列表中的某个应用会进入一个类似页面，仅显示该应用的收入。该页面还按国家/地区细分广告收入，并提供编辑应用描述（广告商所见）以及指定不希望出现在自身广告中的竞争对手公司和应用的选项。\n\
  \n## 延伸探索\n\n本章是迄今为止最短的一章，这是一件好事。这意味着我们的游戏功能已经完备，并且添加广告非常简单。即使是在 iTunes Connect\
  \ 上的设置也并不复杂！但在实践中，你可能需要考虑在何处以及何时放置广告，尤其是插屏广告，并且越早设计越好。\n\n#### 脚本参考\n\n本章中我们仅用少量代码就实现了许多功能。使用\
  \ iAds 只需要两个类：`ADBannerView` 和 `ADInterstitialAd`，而在典型的应用中，你通常只会使用其中一个类（同时使用横幅广告和插屏广告就太多了！）。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n这两个类的页面都包含脚本示例。`iPhone`\
  \ 类包含所有 iOS 特有的内容（许多以前 iOS 特有的内容现在也适用于 Android，并且已归入 `Handheld` 类）。例如，我们检查静态变量 `iPhone.generation`\
  \ 来确定我们是否在 iPad 上运行。查看 `iPhoneGeneration` 枚举的页面以了解 Unity 能够识别的 iOS 硬件集是很有必要的。\n\n\
  #### iOS 开发者库\n\nUnity 的 `ADBannerView` 和 `ADInterstitialAd` 类对应于 Objective-C 中的同名类。iOS\
  \ 开发者库中的 iAd 编程指南描述了这些类，并提供了大量关于如何有效部署横幅广告和插屏广告的细节。\n\n面向开发者和广告商的 iAd 通用信息可在 `http://developer.apple.com/iad`\
  \ 上找到。\n\n#### 资源商店\n\niAd 并非您应用内广告的唯一选择。一旦您开始发布应用，您很可能会开始收到来自众多移动广告商客户经理的电子邮件。事实上，iAd\
  \ 最初是 Quattro Wireless 的产品，之后苹果收购了该公司以获取其广告产品。第三方广告商通常拥有自己的 iOS SDK，因此需要 Unity 插件才能访问该\
  \ SDK。其中一些 SDK 可在资源商店的“服务”类别下找到，包括 PlayHaven 和 Inneractive。\n\n## 资源商店之外\n\n与他们的\
  \ Game Center 插件一样，Prime31 Studios 在 Unity 引入其 iAd 脚本支持之前就提供了一个 iAd 插件。Prime31 为许多其他广告服务提供插件，包括\
  \ AdMob、AdWhirl、MobClix 等等，可在 `http://prime31.com/` 上找到。\n\nKiip (`http://kiip.com/`)\
  \ 为广告提供了一种有趣的变体。启用了 Kiip 的应用会提供类似横幅广告但以成就形式呈现的优惠券。他们的 Unity 插件可在 GitHub 上找到，地址是\
  \ `http://github.com/kiip`。\n\n# 第 16 章\n\n## 优化\n\n与 Donald Knuth 那句广为引用的名言“过早优化是万恶之源”一致，我将优化这一主题留到了本书的末尾。在本章中，我们将优化我们的保龄球应用，并介绍该过程的前置步骤：设定性能目标并测量当前性能。本章节的项目文件位于\
  \ `http://learnunity4.com/`，其中包含本章开发的优化脚本和优化辅助脚本。\n\n### 选择你的目标\n\n有句老话说：“快、好、或便宜，三选二。”这通常是优化中的情况。在质量、空间和速度之间，你通常最多只能以牺牲第三者为代价，实现其中两者。\n\
  \n#### 帧率\n\n在开始优化之前，你应该先设定目标帧率。iOS 设备每秒刷新屏幕 60 次，但默认情况下，Unity iOS 构建尝试达到每秒 30 帧（fps）。将目标帧率设为设备刷新率的一半对设备电池的要求较低，并且\
  \ 30 fps 比 60 fps 容易实现得多。我们的保龄球游戏很简单，所以如果你愿意做出一些妥协，应该能够达到 60 fps。\n\n始终追求最高可能的帧率似乎是显而易见的事，但如果游戏频繁地在\
  \ 30 fps 和 60 fps 之间切换，这种不连续性可能比稳定在 30 fps 运行更让人分心。不过，在性能分析之前，以 60 fps 为目标（开始）是合理的，这样你可以看到峰值性能，然后如果需要的话再降低它。\n\
  \n### 创建脚本\n\n在 Unity 编辑器中无法设置目标帧率，但幸运的是，你可以通过在脚本中设置静态变量 `Application.targetFrameRate`\
  \ 来调整目标帧率。因此，让我们创建一个新的 JavaScript 脚本，将其放入 Scripts 文件夹，并命名为 `FuguFrameRate`（图 16-1）。\n\
  \n![9781430248750_Fig16-01.jpg](img/9781430248750_Fig16-01.jpg)\n\n图 16-1. 在 Scripts\
  \ 文件夹中添加脚本\n\n这将是一个非常简短的脚本，包含一个公共变量和一个仅有一行代码的 `Start` 回调（代码清单 16-1）。\n\n代码清单 16-1.\
  \  `FuguFrameRate.js`的完整脚本\n\n```\n#pragma strict\n\npublic var frameRate:int =\
  \ 60;\n\nfunction Start() {\n        Application.targetFrameRate = frameRate;\n\
  }\n```\n\n该脚本通过将静态变量 `Application.targetFrameRate` 的值更改为 `frameRate` 的值来设置目标帧率，`frameRate`\
  \ 是一个公共变量，因此可以在检视视图中进行调整。由于 iOS 设备的屏幕刷新率均为 60 fps，这是您能达到的最佳帧率，因此也是 `frameRate` 的合理默认值。\n\
  \n### 挂载脚本\n\n要使用 `FuguFrameRate` 脚本，必须将其添加到一个场景中，以便在游戏启动时执行其 `Start` 回调。因此，让我们在保龄球场景中创建一个空的游戏对象，将其命名为\
  \ `FrameRate`，然后将 `FuguFrameRate` 脚本拖拽到它上面（图 16-2）。\n\n![9781430248750_Fig16-02.jpg](img/9781430248750_Fig16-02.jpg)\n\
  \n图 16-2. 保龄球场景中包含帧率脚本\n\n这个脚本被添加到了我们的保龄球场景中，但你完全可以将它添加到我们的启动画面场景中，因为 `Application.targetFrameRate`\
  \ 只需要设置一次，并且即使在加载新场景时，它也会保持该值。我们当前的启动画面场景实际上什么都没做，所以使用 Unity 默认的 30 fps 运行就可以了。\n\
  \n然而，如果启动画面场景要显示很酷的动画，你可能希望将其设置为 60 fps，在这种情况下，你还需要将帧率脚本添加到该场景中。实际上，如果启动画面场景在 60\
  \ fps 下效果最佳，而保龄球场景在 30 fps 下运行更流畅（而不是在 30 fps 和 60 fps 之间抖动），那么你需要将帧率脚本添加到两个场景中，在启动画面场景中将目标帧率设为\
  \ 60 fps，在保龄球场景中设为 30 fps。\n\n### 空间目标\n\n除了帧率，你还应该为应用大小设定一个目标。你必须与用户安装的歌曲、照片、视频以及所有其他应用竞争\
  \ iOS 设备上的空间。更小的占用空间使用户更容易决定保留你的应用。\n\n更小的应用下载时间也更短，加载速度更快（包括应用加载和关卡加载）。尤其重要的是，App\
  \ Store 限制通过蜂窝网络下载的应用大小不得超过 50MB。你不想错过冲动购买的机会，所以 50MB 是一个不错的应用大小目标。这个限制比 App Store\
  \ 原先的 20MB 限制容易达到得多，但任何包含大量内容的应用仍然很容易超过这个大小（有六个球道的 HyperBowl 大约是 40MB）。\n\n### 性能分析\n\
  \n在开始优化之前，你需要知道要优化什么。这就是性能分析的用武之地，即获取关于游戏性能的信息。你可以选择从编辑器中显示的统计信息，到对应用本身进行性能分析，甚至编写一些你自己的性能测量代码。\n\
  \n#### 游戏视图统计信息\n\n在编辑器中，你可以使用游戏视图中的统计信息覆盖层（图 16-3）立即访问场景的性能相关信息。\n\n![9781430248750_Fig16-03.jpg](img/9781430248750_Fig16-03.jpg)\n\
  \n图 16-3. 游戏视图统计信息覆盖层\n\n当你点击“播放”时，你会看到这些统计信息在游戏运行期间实时更新。这些信息很方便，但它不能替代对实际应用进行性能分析。\n\
  \n### 构建日志\n\n最小化应用尺寸已不像过去那么重要，那时超过 20MB 意味着应用只能通过 Wi-Fi 下载到设备上，而不能通过 3G 无线网络。\n\
  \n\n\n现在的限制放宽到了 50MB，但这对于大型游戏来说依然很容易达到。更小的体积意味着更快的下载速度，并且能让更多用户将你的应用安装到剩余存储空间有限的设备上（我自己的\
  \ iPad 总是很快就装满了）。你可以在构建后查看 `Editor` 日志，来了解应用中各类资源的占用情况，如代码清单 16-2 所示。\n\n代码清单 16-2.\
  \ `Editor Log` 中的构建信息\n\n```\nTextures      5.2 mb      16.9%\nMeshes        17.4\
  \ kb     0.1%\nAnimations    0.0 kb      0.0%\nSounds        21.2 mb     69.1%\n\
  Shaders       0.0 kb      0.0%\nOther Assets  19.1 kb     0.1%\nLevels        10.7\
  \ kb     0.0%\nScripts       175.2 kb    0.6%\nIncluded DLLs 4.1 mb      13.3%\n\
  File headers  16.6 kb     0.1%\nComplete size 30.6 mb     100.0%\nUsed Assets, sorted\
  \ by uncompressed size:\n 21.1 mb         69.0% Assets/Assets/Free/Assets/Sci-Fi_Ambiences/Sci-fi_AmbienceLoop1.wav\n\
  \ 4.0 mb          13.1% Assets/Textures/LearnUnityCover.jpg\n 170.8 kb        0.5%\
  \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_up.tif\n 170.8 kb     \
  \   0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_right.tif\n 170.8\
  \ kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_left.tif\n\
  \ 170.8 kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_front.tif\n\
  \ 170.8 kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_back.tif\n\
  \ 170.8 kb        0.5% Assets/Standard Assets/Light Flares/Sources/Textures/50mmflare.psd\n\
  \ 170.8 kb        0.5% Assets/Barrel/Barrel_D.tga\n 31.2 kb         0.1% Assets/Assets/Free/Assets/8Bit/Coin_Pick_Up_03.wav\n\
  \ 17.4 kb         0.1% Assets/Barrel/Barrel.fbx\n 17.3 kb         0.1% Assets/Substances_Free/Wood_Planks_01.sbsar\n\
  \ 10.8 kb         0.0% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_down.tif\n\
  \ 1.0 kb          0.0% Assets/Prefabs/BarrelPin.prefab\n 0.6 kb          0.0% Assets/Standard\
  \ Assets/Light Flares/50mm Zoom.flare\n 0.3 kb          0.0% Assets/Standard Assets/Skyboxes/Sunny3\
  \ Skybox.mat\n```\n\n该日志按资源类型（纹理、音频、网格、脚本）列出了应用大小的细分情况，并且包含了构建中使用的各个资源列表。遗憾的是，其大小贡献是基于未压缩尺寸，而非最终的压缩后资源大小，但它仍然能让你了解哪些资源占据了最多空间。\n\
  \n该日志还提供了一种方法，可以通过 `Console` 应用中便捷的搜索字段来找出项目中哪些资源被使用、哪些未被使用。例如，Fugu Bowl 的所有纹理都在\
  \ `Textures` 文件夹中，因此要检查这些纹理中哪些被使用、哪些可以从项目中移除，请选择 `Console View` 菜单中的 `Editor Log`，这会启动\
  \ `Console` 应用并选中 `Editor` 日志（图 16-4）。\n\n![9781430248750_Fig16-04.jpg](img/9781430248750_Fig16-04.jpg)\n\
  \n图 16-4. 使用 `Console` 应用的搜索字段过滤构建日志\n\n在搜索框中输入 `Textures` 来过滤显示内容。然后你可以将结果列表与 `Project\
  \ View` 中的 `Textures` 文件夹进行比较，看看 `Project View` 中是否有任何内容没有出现在构建中。\n\n### 运行内置分析器\n\
  \n在 Unity iOS 构建生成其 Xcode 项目后，你可以选择激活内置分析器，它会报告类似于 `Game View` 中 `Stats` 覆盖层的信息。要激活内置分析器（在\
  \ Unity 文档中也称为内部分析器），请在 Xcode 项目中找到 `Classes` 文件夹下列出的头文件 `iPhone_Profiler.h`，并将\
  \ `ENABLE_INTERNAL_PROFILER` 的值从 `0` 改为 `1`（图 16-5）。\n\n![9781430248750_Fig16-05.jpg](img/9781430248750_Fig16-05.jpg)\n\
  \n图 16-5. Unity Xcode 项目中的内置分析器开关\n\n现在，当你点击 `Play` 时，应用将重新编译并启用内置分析器，游戏运行时，Xcode\
  \ 的调试区域将每 30 帧显示一次统计数据，如代码清单 16-3 所示。\n\n代码清单 16-3. 第四代 iPod Touch 上的内置分析器输出\n\n\
  ```\niPhone Unity internal profiler stats:\ncpu-player>    min: 39.8   max: 63.2\
  \   avg: 58.0\ncpu-ogles-drv> min:  2.1   max:  3.7   avg:  2.4\ncpu-present>  \
  \ min:  0.7   max:  6.6   avg:  1.8\nframetime>     min: 47.7   max: 72.2   avg:\
  \ 64.5\ndraw-call #>   min:  40    max:  40    avg:  40     | batched:     0\ntris\
  \ #>        min:  5544  max:  5544  avg:  5544   | batched:     0\nverts #>    \
  \   min:  4358  max:  4358  avg:  4358   | batched:     0\nplayer-detail> physx:\
  \  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  0.0 render: 58.0 fixed-update-count:\
  \ 0 .. 0\nmono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>\
  \   used heap: 405504 allocated heap: 524288  max number of collections: 0 collection\
  \ total duration:  0.0\n```\n\n首先需要关注的数字是 `frametime`，它表示一帧的总耗时，单位是毫秒。如果你在 60 fps\
  \ 下运行，那么 `frametime` 的平均值应该在 16.7 ms 左右。如果 `frametime` 高于 34，那么你甚至达不到 30 fps。`frametime`\
  \ 下面的那一行也非常重要，因为它往往对 `frametime` 有重大影响。绘制调用是不同的绘图操作。通常，每个渲染的网格都会产生一个绘制调用，而在此基础上添加的灯光和阴影可能会增加更多的绘制调用。\n\
  \n`player-detail` 对顶部 `cpu-player` 行所列的时间进行了细分。`player-detail` 的时间分配在 `physx`（物理）、`animation`（动画）、`culling`（剔除不需要渲染的对象）、`skinning`（更新动画角色的蒙皮位置）、`batching`（合并具有相同材质的网格，以便通过一次绘制调用进行渲染）、`rendering`（渲染）和固定更新计数之间。\n\
  \n代码清单 16-3 中的分析结果来自第四代 iPod touch，显示 `frametime` 远未达到 30 fps，更不用说 16 fps 了，并且 `player-detail`\
  \ 中渲染时间占据了主导地位。众所周知，对性能影响很大的一个因素是动态阴影，因此让我们在灯光中禁用阴影（图 16-6）。\n\n![9781430248750_Fig16-06.jpg](img/9781430248750_Fig16-06.jpg)\n\
  \n图 16-6. 从保龄球场景灯光中禁用阴影\n\n然后再次 `Build and Run`，开始一个新的分析会话（代码清单 16-4）。\n\n代码清单 16-4.\
  \ 移除阴影后的内置分析器输出\n\n```\niPhone Unity internal profiler stats:\ncpu-player>    min:\
  \  5.0   max:  7.6   avg:  5.7\ncpu-ogles-drv> min:  3.1   max:  7.0   avg:  3.7\n\
  cpu-present>   min: 14.4   max: 42.9   avg: 28.1\ncpu-waits-gpu> min: 14.4   max:\
  \ 42.9   avg: 28.1\nmsaa-resolve>  min:  0.0   max:  0.0   avg:  0.0\nframetime>\
  \     min: 28.5   max: 55.5   avg: 39.5\ndraw-call #>   min:  29    max:  29   \
  \ avg:  29     | batched:    10\ntris #>        min:  4584  max:  4584  avg:  4584\
  \   | batched:  3420\nverts #>       min:  3712  max:  3712  avg:  3712   | batched:\
  \  2750\nplayer-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0\
  \ batching:  1.9 render:  3.1 fixed-update-count: 0 .. 0\nmono-scripts>  update:\
  \  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>   used heap: 401408 allocated\
  \ heap: 524288  max number of collections: 0 collection total duration:  0.0\n```\n\
  \n如果你没有运行 Unity iOS Pro，或者出于性能原因早些时候关闭了阴影，那么你已经达到了这个状态。无论如何，结果是显著的。\n\n\n\n关闭阴影能显著减少绘制调用，帧时间和渲染时间也有所降低，尽管帧率仍低于\
  \ 30 FPS。\n\n运行编辑器分析器（专业版）\n\n内置分析器能让您大致了解游戏性能的瓶颈所在（例如，是绘制调用、物理计算还是脚本执行）。但要精确找出占用帧时间的具体原因，仍然有些像猜谜。Unity\
  \ Pro 用户可以使用 Unity 编辑器自带的 `Profiler`。分析器可以记录在编辑器中运行游戏的性能，或者远程分析，从测试设备捕获性能数据。要分析在测试设备上运行的保龄球游戏，您需要在构建设置中勾选`Development\
  \ Build`选项，这将启用`Autoconnect Profiler`选项（图 16-7）。\n\n![9781430248750_Fig16-07.jpg](img/9781430248750_Fig16-07.jpg)\n\
  \n图 16-7。启用自动连接分析器进行构建\n\n执行构建并运行，分析器窗口应该会自动出现，并对设备上运行的游戏进行一次分析会话（图 16-8）。\n\n![9781430248750_Fig16-08.jpg](img/9781430248750_Fig16-08.jpg)\n\
  \n图 16-8。分析器窗口\n\n最顶部的栏显示中央处理器（CPU）使用率。这个特定的分析资料显示我们徘徊在 30 FPS 左右。下方的区域显示了按函数调用划分的\
  \ CPU 使用情况细分（图 16-9）。\n\n![9781430248750_Fig16-09.jpg](img/9781430248750_Fig16-09.jpg)\n\
  \n图 16-9。CPU 使用率的分析器细分\n\n您可以展开这些项目以查看嵌套的函数调用。图 16-9 表明我们在 UnityGUI 函数上花费了大量时间，包括记分板和暂停菜单（此分析资料是在显示暂停菜单时截取的）。\n\
  \n手动连接分析器\n\n如果由于某种原因分析器没有自动启动，可以通过窗口菜单调出分析器（图 16-10）。\n\n![9781430248750_Fig16-10.jpg](img/9781430248750_Fig16-10.jpg)\n\
  \n图 16-10。用于显示分析器的窗口菜单项\n\n分析器实际上是一个视图，这就是为什么它列在窗口菜单的其他视图中。但是，就像资源商店一样，分析器占用了太多屏幕空间，最好让它单独显示在浮动窗口中。\n\
  \n一旦分析器窗口弹出，它将自动开始记录编辑器中的游戏（即使游戏并未实际运行），因此请点击记录按钮停止它。然后在活跃分析器窗口中选择您的 iOS 测试设备（图\
  \ 16-11），再次点击记录按钮开始分析。\n\n![9781430248750_Fig16-11.jpg](img/9781430248750_Fig16-11.jpg)\n\
  \n图 16-11。选择 iOS 设备作为活跃分析器\n\n添加帧率显示\n\n仅为了查看帧率而启用内置分析器或通过网络连接到编辑器分析器并不方便。这时，屏幕上显示的帧率显示就派上用场了。您可以躺在沙发上看电视并测试游戏时（至少我是这么做的）切换它。\n\
  \n对于屏幕上的帧率显示，您可以使用像保龄球记分板那样的 UnityGUI 标签。然而，还有另一种在屏幕上显示 2D 文本的方法，即使用`GUIText`组件。您可以通过菜单栏的游戏对象菜单，或层级视图中的创建菜单，创建一个已附加`GUIText`组件的游戏对象（图\
  \ 16-12）。\n\n![9781430248750_Fig16-12.jpg](img/9781430248750_Fig16-12.jpg)\n\n图\
  \ 16-12。创建一个 GUIText 游戏对象\n\n让我们继续创建那个`GUIText`游戏对象，并将其命名为 FPS（图 16-13）。\n\n![9781430248750_Fig16-13.jpg](img/9781430248750_Fig16-13.jpg)\n\
  \n图 16-13。带 GUIText 组件的 FPS 游戏对象\n\n与我们用于次要启动画面的`GUITexture`类似，`GUIText`在屏幕上的位置由归一化坐标定义，其中左下角为\
  \ (0,0)，右上角为 (1,1)，通过游戏对象的变换组件的 x 和 y 值指定。将我们帧率显示的 x 和 y 位置分别设为-0.1，使其靠近左下角，并将文本值从`GUIText`改为\
  \ FPS。\n\n无需自定义字体，因为帧率显示仅用于开发，并且您不会在发布的应用程序中激活它（尽管在 HyperBowl 中，用户可以激活帧率显示，以便他们报告性能问题）。默认大小值为\
  \ 0，表示使用字体导入设置中指定的字号，但这太小了，让我们将其设置为一个合理的大尺寸，比如 40。在此期间，`GUIText`在游戏视图中是可见的，因此您可以看到大小变化的效果（图\
  \ 16-14）。\n\n![9781430248750_Fig16-14.jpg](img/9781430248750_Fig16-14.jpg)\n\n图\
  \ 16-14。带有 GUIText 的游戏视图\n\n正如`GUITexture`比 UnityGUI 更便于显示静态纹理（无需编写脚本），`GUIText`是比\
  \ UnityGUI 更直接的显示静态文本的方式。但是，帧率显示确实需要通过设置`GUIText`实例的`text`变量来更改文本。现在让我们实现帧率显示脚本。创建一个新脚本，将其放置在`Scripts`文件夹中，并命名为`FuguFPS`（图\
  \ 16-15）。\n\n![9781430248750_Fig16-15.jpg](img/9781430248750_Fig16-15.jpg)\n\n图\
  \ 16-15。创建一个新的 FuguFPS.js 脚本\n\n然后将代码清单 16-5 中的`Update`函数添加到脚本中。脚本的`Update`回调函数使用计算出的帧率设置`GUIText`的`text`变量。计算很简单，基于`Time.deltaTime`（最近的帧时间）。通常，每秒帧数会计算为\
  \ `1 / Time.deltaTime`，但由于`Time.deltaTime`被`Time.timeScale`缩放，您可以通过使用`Time.timeScale\
  \ / Time.deltaTime`来轻松考虑这一点。\n\n`GUIText`中的`text`变量是一个`String`变量，因此您需要通过调用数字的`ToString`函数将帧值转换为`String`（每个内置类型都有`ToString`函数）。然后附加“`FPS`”，这样您就不会疑惑屏幕上的两个数字是什么了！\n\
  \n代码清单 16-5。完整的帧率显示脚本 FuguFPS.js\n\n```javascript\n#pragma strict\n\nfunction Update()\
  \ {\n    if (Time.deltaTime > 0) {\n        var fps : float = Time.timeScale / Time.deltaTime;\n\
  \        guiText.text  = fps.ToString(\"f0\") + \"FPS\";\n    }\n}\n```\n\n现在将脚本附加到\
  \ FPS 游戏对象。当您在编辑器中点击播放时，您应该会看到帧率显示在不同数字之间闪烁。当您执行构建并运行到测试设备时，您应该会看到帧率显示与在内置分析器和专业版分析器中获取的数字相对应（图\
  \ 16-16）。\n\n![9781430248750_Fig16-16.jpg](img/9781430248750_Fig16-16.jpg)\n\n图\
  \ 16-16。在测试设备上运行的帧率显示\n\n请记住，在发布此应用程序之前，您应该停用 FPS 游戏对象！\n\n\n\n### 优化设置\n\n正确的优化方式是系统性地从最大的瓶颈入手，在每一阶段对改进进行性能分析，直至达成目标。但为了在本章中介绍多种优化步骤，我们将快速依次执行一系列操作。\n\
  \n#### 质量设置\n\n首先，我们来调整与优化工作相关的全局设置。最可能影响性能的设置是**质量设置**，它控制着游戏的视觉质量（图 16-17）。\n\n\
  ![9781430248750_Fig16-17.jpg](img/9781430248750_Fig16-17.jpg)\n\n图 16-17. 优化质量设置\n\
  \n我们追求的是速度，因此将当前的 iOS 质量设置为**最快**，然后在此基础上进行调整。对于当前的灯光设置，零像素光源是可以接受的。如果你使用了聚光灯，那么缺乏像素光的问题会很明显。\n\
  \n你并不想强制所有纹理都使用半分辨率。依靠纹理导入设置来逐例限制分辨率，能带来更大的灵活性。因此，我们将纹理质量设置为**全分辨率**。\n\n同样，你还需要将各向异性纹理的设置从**无**改为**逐纹理**。各向异性纹理可以补偿因倾斜视角观看而导致的失真，例如，这对于赛车游戏中道路纹理来说就很合适。与纹理分辨率类似，各向异性也可以在纹理的导入设置中进行调整。\n\
  \n多重采样抗锯齿（全屏平滑）是一项耗资源的操作，因为你完全可以预料到，全屏逐像素运算本身就很昂贵。\n\n你的游戏中没有粒子系统，因此**柔和粒子**设置无关紧要，但它同样是一项逐像素运算（这类特性通常被称为**受限于填充率**）。\n\
  \n阴影功能已禁用，因此其下方的所有阴影参数均不相关。但如果启用了阴影，两个关键属性是**阴影分辨率**和**阴影距离**。这两个属性都会影响阴影的解析度；提高阴影分辨率自然能获得更清晰的阴影，但代价是消耗更多内存来存储更大的阴影贴图；缩短相机视锥体可以提升深度缓冲精度，类似地，缩短阴影距离也能减少对大型阴影贴图纹理的需求。降低阴影分辨率可以节省空间，但会导致阴影更加锯齿化；而缩短阴影距离则可能减少阴影中涉及的物体数量。\n\
  \n#### 物理管理器\n\n刚体在静止时会进入休眠状态，以避免不必要的物理计算。“静止”意味着刚体的运动和旋转都已停止。你可以在**物理管理器**（图 16-18）中指定**休眠速度**和**休眠角速度**的阈值，该管理器位于**编辑**菜单的**设置**部分下。\n\
  \n![9781430248750_Fig16-18.jpg](img/9781430248750_Fig16-18.jpg)\n\n图 16-18. 优化物理管理器\n\
  \n在物理管理器的底部，你还可以指定哪些层级的游戏对象可以相互碰撞。这在我们的保龄球游戏中没有影响，因为所有碰撞对象都位于**默认**层级。但为了演示这一点，我们修改碰撞表格，只允许**默认**层级中的游戏对象与同一层级中的其他游戏对象碰撞。\n\
  \n#### 时间管理器\n\n由于物理更新以固定时间间隔进行，你可以通过增加**时间管理器**（图 16-19）中的**固定时间步长**来减少物理计算时间。理想情况下，应在不降低物理模拟精度的前提下，将固定时间步长尽可能设置得高一些。现在，我们将固定时间步长从\
  \ 0.02 增加到 0.03。\n\n![9781430248750_Fig16-19.jpg](img/9781430248750_Fig16-19.jpg)\n\
  \n图 16-19. 优化时间管理器\n\n紧邻**固定时间步长**下方的属性也与物理更新相关：**最大允许时间步长**。该值限制了每帧可用于物理更新的时间上限。这可以防止出现失控情况：固定更新占用大量时间，导致帧时间增加，进而在下一帧中引发更多固定更新，如此恶性循环。降低**最大允许时间步长**可以最小化\
  \ `FixedUpdate` 对帧时间的影响，但存在降低物理模拟精度风险。\n\n#### 音频管理器\n\n音频的播放方式也涉及优化权衡。在**音频管理器**（图\
  \ 16-20）中，你可以指定音频延迟，即声音播放前允许的延迟时间。\n\n![9781430248750_Fig16-20.jpg](img/9781430248750_Fig16-20.jpg)\n\
  \n图 16-20. 优化音频管理器\n\n对于需要声音快速响应的游戏（例如我们保龄球游戏中的碰撞音效），选择**最佳延迟**（即最低延迟）是合适的。\n\n\
  #### 玩家设置\n\n**玩家设置**对优化效果有很大影响。在**分辨率与显示设置**中，我们选择了最高的原生屏幕分辨率，并且为**显示缓冲区**选择了最高的每像素\
  \ 32 位色彩分辨率（图 16-21）。如果取消勾选此框，显示缓冲区将使用每像素 16 位，这可能会导致一些颜色条带现象。因此，我们选择以占用更多内存为代价来换取更高的视觉保真度。\n\
  \n![9781430248750_Fig16-21.jpg](img/9781430248750_Fig16-21.jpg)\n\n图 16-21. 优化玩家设置中的分辨率和显示\n\
  \n我们将**深度缓冲区**保留为默认的每像素 16 位，但如果该精度不足以防止深度冲突（即一个紧贴另一个物体的对象穿透显现的情况），你可以将其提高到每像素 24\
  \ 位，这同样能提升视觉质量，但会使用更多内存。\n\n**其他设置**部分充满了优化选项，且并非只限于标记为“优化”的区域内（图 16-22）。\n\n![9781430248750_Fig16-22.jpg](img/9781430248750_Fig16-22.jpg)\n\
  \n图 16-22. 优化玩家设置中的其他设置\n\n#### 静态批处理（专业版）\n\n正如我在首次性能分析环节中指出的，绘制调用通常对性能有很大影响。**静态批处理**（仅\
  \ Unity iOS 专业版用户可用）通过在构建时合并可以在同一次绘制调用中一起渲染的网格，来减少绘制调用。要合并网格，其游戏对象必须在检视面板中标记为**静态**，并且它们必须共享相同的材质或材质集。\n\
  \n静态批处理是一个非常灵活的系统；它会记住每个游戏对象的独立身份，因此一个拥有静态批处理网格的游戏对象仍然可以随意被停用，并且仍然会接受剔除处理。\n\n我们的保龄球游戏只有一个静态网格——地面，因此启用静态批处理在这里不会产生任何效果。总的来说，静态批处理能显著提升性能，但代价是消耗更多内存，因为它实质上会复制每个被批处理的网格。\n\
  \n#### 动态批处理\n\n下一个选项，**动态批处理**，对专业版和非专业版用户都可用，并且在运行时进行。与静态批处理类似，它要求网格在合并前共享材质，但动态批处理可以处理移动中的对象，因为它每帧都会检查是否需要重新批处理对象。例如，我们游戏中的保龄球瓶可以被批处理，因为它们显然都使用了相同的材质。毕竟，它们都是由同一个预制件实例化而来的。\n\
  \n\n\n然而，保龄球无法与任何球瓶或球道表面进行批处理。批处理确实需要一些时间，这也是它会出现在内置性能分析器中的原因，但就像静态批处理一样，它通常能显著提升性能。\n\
  \n#### 加速计频率\n`加速计频率`默认设置为每秒 60 个样本。你可以将该频率降低到 15 来节省一些处理时间，这对于我们的摇动检测代码来说已经足够了。如果在应用中根本不使用加速计，请将其设置为\
  \ 0。\n\n#### 剥离级别 (Pro)\nUnity Pro 用户可以选择应用 iOS 剥离。有三个循序渐进的级别可供选择：`字符串程序集`、`剥离字节码`和`使用微型\
  \ mscorlib`。我们选择最后一项，这是最积极的优化方案，并且包含了前两项。`微型 mscorlib` 是核心 Mono 库的一个自定义精简版本，可能与您导入的其他\
  \ .NET 库不兼容，但对于这个游戏来说这不是问题。\n\n#### 脚本调用优化\n`脚本调用优化`级别决定了如何执行对本机代码的调用。默认设置`慢速且安全`会产生额外开销，因此我们将其设置为`快速但无异常`。正如标签所示，此设置速度更快，但如果本机代码抛出异常（本质上是一个期望由调用代码处理的错误），则会失败。\n\
  \n#### 优化网格数据\n`优化网格数据`选项会在构建时移除任何不必要的每个顶点网格信息。如果网格未使用凹凸贴图着色器，则可以移除切线；如果网格使用了无光照着色器，则可以移除法线。这能节省空间并有利于批处理，因为批处理会复制所有这些网格数据。当然，如果您打算在运行时通过脚本将网格的着色器更改为需要比原始着色器更多顶点信息的着色器，则不应使用此选项。\n\
  \n### 优化游戏对象\n在调整了`质量设置`、`物理管理器`和`时间管理器`之后，我们准备调整单个游戏对象。\n\n#### 摄像机（Camera）\n摄像机是优化的焦点（无意冒犯），因为它们决定了渲染什么以及如何渲染。摄像机视锥体自动提供了一种优化来源。任何完全位于视锥体之外的游戏对象对摄像机来说都是不可见的，因此不会尝试渲染该游戏对象。这种优化被称为*视锥体剔除*，并且同样有利于动画和粒子系统。当没有人能看到动画或粒子时，系统就无需播放动画或模拟粒子。\n\
  \n**提示** 渲染一个游戏对象最快的方式就是完全不渲染它。\n\n因此，调整摄像机的视锥体使其包含场景中更少的对象是一种优化方法。你可以通过降低视野来缩小视锥体，也可以通过减小远距离值来缩短视锥体，使远平面更靠近摄像机（图\
  \ 16-23）。\n\n![9781430248750_Fig16-23.jpg](img/9781430248750_Fig16-23.jpg)\n\n图\
  \ 16-23. 优化主摄像机\n\n例如，考虑到保龄球地面要小得多，主摄像机中远平面值的默认值 1000 就有些过度了。将远距离值设置为 100 仍然可以使所有物体可见（Unity\
  \ 的天空盒方便地独立于视锥体可见）。\n\n最小化远平面值的另一个好处是，在渲染时可以在深度缓冲区中存储一个更小范围的值。这避免了 Z 轴冲突的问题，即由于深度缓冲区数值精度有限，一个几乎位于另一个物体后面的物体似乎会穿透前面的物体。\n\
  \n另一种从摄像机渲染中剔除游戏对象的方法是，指定其只渲染位于其剔除遮罩中某些特定层级集合内的游戏对象。\n\n这实际上是一个正确性的问题——你需要确保摄像机只渲染它应该渲染的内容，而不是，比如说，已经由单独的\
  \ HUD 摄像机渲染的 HUD 元素。但这确实会影响性能。我曾经遇到过一个 bug，主摄像机无意中渲染了 GUI 元素，但由于它们距离较远，我并没有注意到。\n\
  \n每个摄像机还有一个 `eventMask` 变量，类似于它的剔除遮罩（或者等价地，它的 `cullingMask` 变量），但与指定摄像机渲染哪些层级不同，`eventMask`\
  \ 决定了哪些层级接收来自摄像机的 `onMouse` 事件。最小化 `eventMask` 中存在的层级可以减少 `onMouse` 处理的额外开销，但由于它在检视面板中不可见，因此必须通过脚本来设置该变量。\n\
  \n最后一个摄像机优化是指定渲染路径。iOS 上有两种可用的渲染路径：顶点光照和前向渲染（延迟渲染不适用于移动平台）。前向渲染比顶点光照更灵活、更强大。例如，顶点光照路径无法显示凹凸贴图。但在本章中，我们积极追求高帧率，所以我们将渲染路径设置为顶点光照。\n\
  \n#### 灯光（Lights）\n我们已经禁用了光照上的阴影（除了那些本来就没有阴影的非 Pro 用户），这是一个巨大的性能改进，因为它减少了绘制调用。光照也已经受到了质量设置的影响，该设置指定了无像素灯光并禁用了阴影（图\
  \ 16-24）。\n\n![9781430248750_Fig16-24.jpg](img/9781430248750_Fig16-24.jpg)\n\n图\
  \ 16-24. 优化光照\n\n但我们还可以对光照进行一些类似于摄像机 tweaks 的额外调整。与摄像机一样，光照有一个指定的范围，我们可以将其最小化以减少被照亮的游戏对象数量。光照也有一个剔除遮罩，与主摄像机的情况一样，可以将其设置为默认层级，但通过明智地分配层级，你可以减少不必要被照亮的游戏对象。\n\
  \n#### 球瓶\n为了追求速度，我们选择了最简单的光照和最简单的渲染路径。你也可以简化你为每个网格使用的着色器。保龄球瓶构成了我们场景中的大部分物体，所以我们首先修改\
  \ BarrelPin 预制体（图 16-25）。\n\n![9781430248750_Fig16-25.jpg](img/9781430248750_Fig16-25.jpg)\n\
  \n图 16-25. 优化 BarrelPin 预制体\n\n在项目视图中，选择预制体中的 Barrel 游戏对象，然后在检视面板中点击着色器选择器。有很多比\
  \ Bumped Specular 更简单的着色器；使用少于两种材质的着色器通常更快，而顶点光照将比任何像素着色器更高效。甚至有一组专门为移动设备实现的着色器，包括\
  \ `Mobile/Vertex Lit`。但有一种着色器更适合我们的情况，即专门为仅与方向光一起使用而实现的 `Mobile/Vertex Lit` 着色器。所以我们选择那个，`Mobile/Vertex\
  \ Lit (Only Directional Light)`。\n\n#### 地面\n地面游戏对象有一些组件属性可以进行优化调整（图 16-26）。从 MeshRenderer\
  \ 组件开始，我们启用了`投射阴影`和`接收阴影`选项。虽然我们在光照和质量设置中禁用了阴影，但你应该留意每个对象的设置，以防将来启用阴影。如果启用了阴影，你会希望在地面上投射阴影，所以`接收阴影`应该启用。但是因为我们不期望地面投射阴影（至少不会投射到我们能看到的东西上），所以让我们禁用`投射阴影`选项。就性能而言，投射阴影的对象越少越好。\n\
  \n\n\n`9781430248750_Fig16-26.jpg` 图 16-26. 优化地板\n\n现在转向物理方面，这里还有另一个优化机会。虽然我们已经为保龄球瓶和保龄球使用了基本碰撞体，但我们的地板仍在使用`MeshCollider`组件。由于地板是一个平坦的方形表面，你可以改用`BoxCollider`。替换过程很简单：当你为地板添加`BoxCollider`组件时（无论是通过检视器视图中的“添加组件”按钮，还是菜单栏上的“组件”菜单），Unity\
  \ 会询问你是否要替换现有的`MeshCollider`（选择“是”），新的`BoxCollider`组件将自动调整大小以适配地板网格。\n\n与保龄球瓶一样，你也可以将着色器从相对复杂的\
  \ Bumped Specular 着色器更改为`Mobile/VertexLit (Only Directional Lights)`，就像我们对保龄球瓶预制体所做的那样。但地板是个特例，因为它很平坦。其表面的光照是均匀的。因此，你可以使用`Unlit\
  \ Texture`着色器，完全避免任何光照计算。\n\n#### 球体\n\n我们将优化的最后一个游戏对象是球体。它已经在使用`SphereCollider`组件，所以我们要更改的只有着色器。和保龄球瓶一样，球体也会移动，因此我们使用一个光照着色器，具体来说，就选用我们为保龄球瓶选择的同一个`Mobile/VertexLit\
  \ (Only Directional Light)`着色器。但是，球体当前使用的是创建时自动分配的默认漫反射材质，而你无法更改该材质的着色器。因此，你需要为球体分配一个不同的材质。\n\
  \n你可以用创建其他类型资源相同的方式来创建新材质。在项目视图中，调出创建菜单并选择“材质”（图 16-27）。\n\n`![9781430248750_Fig16-27.jpg](img/9781430248750_Fig16-27.jpg)`\n\
  \n图 16-27. 创建新材质\n\n将新材质放入 Materials 文件夹中，并将其命名为 Ball。选中它（图 16-28），然后在检视器视图中调整其着色器，选择`Mobile/VertexLit\
  \ (Directional Light)`。\n\n`![9781430248750_Fig16-28.jpg](img/9781430248750_Fig16-28.jpg)`\n\
  \n图 16-28. 为新材质设置着色器\n\n接着将 Ball 材质拖拽到 Ball 游戏对象上，这样就好了（图 16-29）。\n\n`![9781430248750_Fig16-29.jpg](img/9781430248750_Fig16-29.jpg)`\n\
  \n图 16-29. 优化球体\n\n如果没有提供纹理，上述两个`Mobile/VertexLit`着色器都会显示白色。如果你希望球体具有白色以外的颜色，则应使用标准的\
  \ Vertex Lit 着色器，该着色器允许你指定主颜色和高光（光泽）颜色。\n\n### 优化资源\n\n人们很容易忽略一点：在导入资源时可以完成大量优化工作，并且你可以通过每个资源的导入设置来控制这一点。\n\
  \n#### 纹理\n\n我们的纹理已经以合理的默认设置导入了，但让我们看看几个纹理，以便理解这些设置。在项目视图中，我们查看 Textures 文件夹，比较一下我们在第\
  \ 3 章示例场景中使用的猫纹理（图 16-30）和我们在第 12 章中用于次级启动画面的纹理（图 16-31）。猫纹理使用了对应“纹理”预设的导入设置，而启动画面纹理则使用了“GUI”预设的导入设置。在这两种情况下，从预设切换到“高级”都会显示该预设的具体设置。\n\
  \n`![9781430248750_Fig16-30.jpg](img/9781430248750_Fig16-30.jpg)`\n\n图 16-30. 纹理的导入设置\n\
  \n`![9781430248750_Fig16-31.jpg](img/9781430248750_Fig16-31.jpg)`\n\n图 16-31. GUITexture\
  \ 的导入设置\n\n“纹理”和“GUI”预设之间有两个主要区别：“纹理”启用了 Mip Mapping（多级渐远纹理映射），而“GUI”启用了 sRGB 旁路选项。mipmapping\
  \ 中的 *mip* 代表短语 *multim in parvo*，意为“小中见大”。Mipmap 是纹理预先计算好的较小版本，当纹理相对于摄像机靠近或远离时，可以提供更平滑的视觉质量和过渡效果。\n\
  \n滤镜类型决定了如何从纹理中的像素（或 *texel*）进行计算以用于渲染。对于点过滤，从最接近所需尺寸的 mip 级别中选择纹素。双线性过滤从最接近的较小\
  \ mip 级别中对其周围的纹素进行平均，而三线性过滤则结合了最接近的较大 mip 级别和最接近的较小 mip 级别的双线性过滤结果。点采样是最简单、最快的滤镜，而三线性过滤则是最消耗资源的。双线性过滤是折中方案，也是合理的默认选项。\n\
  \n尽管会增加内存使用量，但 Mipmapping 通常是合适的。除了改善纹理显示效果外，mipmapping 还允许图形处理器使用较小版本的纹理，这有助于提升性能。对于在\
  \ GUI（例如 UnityGUI 或 GUITexture）中使用的纹理，通常只在一种尺寸下查看，理想情况下是纹理的原始尺寸，因此 mipmapping 是不必要的。对于启动画面来说尤其如此，特别是当它甚至没有被加载到场景中时。\n\
  \n**提示** 对于具有锐利细节的纹理（例如用作街道标志的纹理），最好使用点采样，甚至完全禁用 mipmapping，以避免纹理模糊。\n\n各向异性（方向依赖）过滤级别用于补偿纹理相对于摄像机倾斜的情况，例如赛车游戏中的路面。在这些情况下，在两个方向上均匀地对纹理进行过滤看起来可能不正确。对于场景中的常规纹理，应根据具体情况选择各向异性级别。对于\
  \ GUI 纹理（从摄像机正面观看），不需要各向异性过滤。\n\n通常，纹理在导入时会考虑伽马空间，即屏幕的非线性色彩空间。一般来说，这对于 GUI 纹理来说并非必需，因此在这些情况下，会选中“旁路\
  \ sRGB”选项。如果效果不太对劲，可以尝试两个选项。\n\n对于 mipmapping，纹理必须是正方形，且边长是 2 的幂（POT），因为 mip 级别是通过连续对半缩小生成的。例如，一个\
  \ 256 × 256 的纹理将拥有 128 × 128、64 × 64 等 mip 级别。即使是不使用 mipmapping 的纹理，使用 POT 尺寸也是有益的，因为图形硬件最终使用这种尺寸。大多数为游戏设计的纹理都采用\
  \ POT 尺寸，但如果不是，纹理导入设置可以自动将纹理缩放至最接近的 POT 尺寸。\n\n对于 GUI 纹理，通常不希望这样。我们的启动画面将其 POT 缩放设置为“无”，生成的预览显示其原始尺寸和\
  \ NPOT（非 2 的幂）。如果你尝试将其用作场景中的常规纹理，Unity 会在控制台视图中发出警告，指出你以非 GUI 方式使用了 NPOT 纹理，并会导致性能损失。\n\
  \n纹理的最大尺寸和压缩级别列在预设设置中，并且独立于预设进行指定。对于常规纹理，默认的 1024 最大尺寸是合理的（2048 × 2048 是所有设备支持的最大尺寸），但应根据具体情况选择。例如，如果一个大纹理只有一种颜色，你最好将其做成一个\
  \ 2 × 2 的纹理。\n\n\n\n如果一个纹理仅用于屏幕上较小或较远的网格，那么就没有必要将其设为大型纹理。对于启动画面，我们将最大尺寸设置为`2048`，这样就不会将纹理缩放至小于\
  \ iPad Retina 屏幕的尺寸。\n\n**提示**：将最大缩放设置为最大允许值，并将压缩级别设置为`TrueColor`，可以在导入设置的预览区域中查看纹理的原始格式。\n\
  \n对于常规纹理，默认的压缩级别`4-bit PVRTC`（PowerVR 纹理压缩）是合理的。细节较少的纹理可以使用更高效的`2-bit PVRTC`。与`mipmapping`一样，纹理压缩可以减少纹理映射占用的内存，而图形处理器对`PVRTC`的支持则能提供额外的性能优势。同样与`mipmapping`类似的是，细节特别丰富的纹理可能会因压缩而质量严重下降，在这种情况下，保留未压缩的`16-bit`或未压缩的`TrueColor`（`24-bit`）纹理可能效果更好。对于`GUI`纹理，出于这个原因，你可能不希望压缩纹理；或者对于在玩家设置中指定的启动画面，应保持其原始格式不变。\n\
  \n#### 音频\n\n我们在`Audio Manager`中调整了`DSP Buffer Size`，以使碰撞音效响应更快，这虽然会增加一些处理开销，但能降低延迟。与纹理类似，你也可以调整`AudioClips`的导入设置。与纹理使用分为`3D`和`GUI`两大类类似，声音也分为`2D`和`3D`两种：`3D`声音与`GameObjects`（或至少是`3D`世界中的位置）关联，而`2D`声音则用于环境音或音乐（例如我们在第\
  \ 5 章舞蹈场景中添加的歌曲）。\n\n我们来比较一下保龄球音效中的两个例子：保龄球瓶碰撞音效（图 16-32）和保龄球滚动音效（图 16-33）。这两种声音都源自世界中的某个位置，并且会相对于主摄像机移动（更准确地说，是相对于附加在主摄像机上的`AudioListener`组件移动）。因此，它们在导入设置中都被标记为`3D`声音。`3D`声音应为单声道，而非立体声。幸运的是，这两个声音的原始音频文件都是单声道的，因此你无需选择`Force\
  \ to mono`。\n\n![图 16-32：优化保龄球瓶碰撞音效的导入设置](img/9781430248750_Fig16-32.jpg)\n\n图 16-32\n\
  \n![图 16-33：优化保龄球滚动音效的导入设置](img/9781430248750_Fig16-33.jpg)\n\n图 16-33\n\n碰撞音效文件较小，因此我们将其保持未压缩状态，以避免解压缩处理，并最大化播放质量。滚动音效文件较大，因此对其进行压缩并保留在内存中。由于这是唯一的压缩音效，并且`iOS`硬件支持随时解码一个压缩音效，因此不会产生任何软件解码开销。不过，如果场景中还播放环境音或音乐，这些文件可能会大得多，你应该优先压缩它们。\n\
  \n**提示**：导入未压缩的音效，以便在编辑器中灵活决定压缩哪些音效。除非你找到了比`Unity`压缩工具质量更高的压缩工具，否则没有必要导入压缩音频。\n\n\
  选择压缩后，无间隙循环选项会变为可用。这会强制压缩程序处理音频片段的结尾，使其能够无缝循环，这正是你需要的，因为你希望以循环方式播放此声音。\n\n对于压缩音频，除了`Uncompress\
  \ on load`和`Compressed in memory`之外，还有另一个加载选项：`Stream from disc`。\n\n从磁盘流式传输会有一些额外开销，但对于连续播放多首歌曲的场景来说，这是一个不错的选择，因为将所有歌曲都保存在内存中往往代价高昂。\n\
  \n#### 网格\n\n大多数影响优化的`Mesh Import Settings`（图 16-34）主要影响内存使用。\n\n![图 16-34：优化网格的导入设置](img/9781430248750_Fig16-34.jpg)\n\
  \n图 16-34\n\n首先是`Mesh Compression`，它通过降低数值精度（即用于表示顶点、法线、纹理坐标和切线的位数）来减少网格占用的空间和内存。这也会降低视觉质量，因此最好进行试验，找到不会影响外观的最大压缩级别。可用的压缩级别有低、中、高和无。默认设置为无。\n\
  \n在`Mesh Compression`下方是`Read/Write Enabled`。该选项默认开启，会创建一份可修改的网格副本。但如果你没有任何读取或写入网格变量（如顶点和法线）的脚本（通常你并不需要），则可以关闭此选项。\n\
  \n`Optimize Mesh`（不要与`Player Settings`中的`Mesh Optimization`选项混淆）通过优化网格三角形列表的排列方式来提升性能。\n\
  \n如果你不打算使用`Mesh Collider`，请关闭`Generate Colliders`。事实上，作为一条规则，最好保持此选项关闭，因为需要时可以手动添加`Mesh\
  \ Collider`，但通常更倾向于添加一个或多个原始碰撞体。\n\n如果你知道该网格的着色器不需要法线或切线，可以分别将`Normals`和`Tangents`选项设置为`none`。但如果在`Player\
  \ Settings`中选择了`Mesh Optimization`，未使用的顶点数据会在构建时自动移除。\n\n### 优化脚本\n\n常规的代码优化技巧同样适用于`Unity`脚本。例如，我们之前提到过，应调用`Vector3`的`magnitudeSquared`函数而不是`magnitude`，以避免其内部的平方根运算。但在以下章节中，我将介绍一些不太明显的优化脚本性能的方法，或使用脚本来提升整体性能。\n\
  \n### 缓存`GetComponent`\n\n通常情况下，如果你要多次计算某个值（无论是数学表达式、函数调用的结果，还是访问某个实例或静态变量的值，该变量内部可能实际上在执行函数调用），最好将该值赋给一个变量。\n\
  \n我们在脚本中访问的`Component`快捷变量（如`transform`、`audio`和`rigidbody`）就是这样的例子。每次访问这些变量时，都会调用`GetComponent`，在附加到`GameObject`的所有`Component`中搜索匹配类型的组件。\n\
  \n因此，任何时候你需要在脚本中多次引用一个`Component`快捷变量时，无论是多次列出，还是在`Update`等回调函数中重复引用，尤其是在一个迭代次数很多的循环中引用该变量时，都应该提前将`Component`赋给一个变量。清单\
  \ 16-6 展示了如何将此优化应用于我们的`FuguReset`脚本。\n\n清单 16-6. 在`FuguReset.js`中缓存`Component`快捷变量\n\
  \n```javascript\n#pragma strict\n\nprivate var startPos:Vector3;\nprivate var startRot:Vector3;\n\
  \n// 为了性能\nprivate var trans:Transform = null;\nprivate var body:Rigidbody = null;\n\
  \nfunction Awake() {\n        // 缓存 Transform 引用\n        trans = transform;\n \
  \       body = rigidbody;\n        // 保存此 GameObject 的初始位置和旋转\n        startPos\
  \ = trans.\n```\n\n\n\n`localPosition`；`startRot = trans.localEulerAngles; }`\n\
  ```\nfunction ResetPosition() { \n    // 恢复到初始位置\n    trans.localPosition = startPos;\
  \ \n    trans.localEulerAngles = startRot; \n    // 确保停止所有物理运动\n    if (body !=\
  \ null) { \n        body.velocity = Vector3.zero; \n        body.angularVelocity\
  \ = Vector3.zero; \n    } \n}\n```\n\n原始版本的 `FuguReset.js` 引用了两个组件快捷变量：`transform`\
  \ 和 `rigidbody`。因此，我们添加了两个私有变量 `trans` 和 `body` 来引用这些组件，并在 `Awake` 回调中初始化 `trans`\
  \ 和 `body`。\n\n这种清理方法适用于我们很多脚本，因为我们会经常引用 `transform`、`rigidbody` 和 `audio`。我不会列出所有修改后的代码，但更新后的脚本已包含在\
  \ `http://learnunity4.com/` 上本章的项目文件中。\n\n#### UnityGUI\n\n详细的分析结果显示，UnityGUI 占用了我们帧时间的很大一部分。UnityGUI\
  \ 中一个性能瓶颈是使用 `GUILayout` 自动布局 GUI 元素所带来的开销。我们在记分板中没有使用 `GUILayout`，因此可以在 `FuguBowlScoreboard`\
  \ 脚本中（清单 16-7）添加一个 `Awake` 回调，将 `useGUILayout` 设置为 false。\n\n清单 16-7。在 `FuguBowlScoreboard.js`\
  \ 中将 `useGUILayout` 设置为 false\n\n```\nfunction Awake() { \n    useGUILayout = false;\
  \ \n}\n```\n\n暂停菜单仍然使用了 `GUILayout`，但由于菜单只在游戏暂停时出现，不会影响游戏玩法，因此其性能问题不那么重要。\n\n####\
  \ 运行时静态批处理（专业版）\n\n动态批处理可以合并那些在构建时因移动或恰好是在游戏运行时创建而不适合静态批处理的相似网格。但动态批处理需要不断更新批处理信息，这就是分析结果中显示批处理时间的原因。如果被批处理的对象是一起移动的，或者它们没有移动但是在运行时实例化的，那么这种重新批处理似乎是一种浪费。此外，由于批处理会占用内存，因此动态批处理的数量有上限（Unity\
  \ 文档目前说明是 30000 个顶点，但这个数字可能会变化）。\n\n幸运的是，有一个名为 `StaticBatchingUtility` 的类（在 Unity\
  \ 专业版和 Unity iOS 专业版中可用），它允许你通过调用 `Combine` 函数在运行时执行静态批处理。清单 16-8 展示了一个非常简单的脚本，它只是在脚本的\
  \ `GameObject` 上调用了 `StaticBatchingUtility.Combine`。\n\n清单 16-8。用于对对象层次结构进行静态批处理的脚本\n\
  \n```\n#pragma strict \n\nfunction Start() { \n    StaticBatchingUtility.Combine(gameObject);\
  \ \n}\n```\n\n虽然简单，但这个脚本功能完整。例如，在旋转立方体场景中，如果我们将此脚本拖拽到带有两个子立方体的主旋转立方体上（并禁用了子立方体的单独旋转脚本），那么当场景开始播放时，所有三个立方体将被静态批处理在一起。被批处理的\
  \ `GameObjects` 不必处于同一个层次结构中。`StaticBatchingUtility.Combine` 是一个重载函数，另一个版本接受两个参数：一个要批处理在一起的\
  \ `GameObjects` 数组，以及一个被指定为父对象的 `GameObject`。\n\n#### 共享材质\n\n要进行批处理——无论是静态、动态还是通过调用\
  \ `StaticBatchingUtility.Combine`——被批处理的网格必须共享相同的材质或材质集合。但特别是在动态批处理中，你需要小心，如果修改材质，不要破坏这种共享。\n\
  \n例如，清单 16-9 中的脚本通过不断改变材质的纹理偏移量来动画其纹理。\n\n这会产生一个滚动纹理的效果；在 HyperBowl 中，此脚本用于为滚动霓虹灯招牌、天空中飘移的云朵以及流动的水体制作纹理动画。然而，当脚本通过调用其\
  \ `SetTextureOffset` 函数修改材质时，如果原始材质恰好是共享的，则会创建一个新的材质。\n\n清单 16-9。用于动画材质纹理坐标偏移量的脚本\n\
  \n```\n#pragma strict \n\nvar speed:Vector2; \nvar materialIndex:int=0; \n\nprivate\
  \ var offset:Vector2; \nprivate var material:Material; \n\nfunction Start() { \n\
  \    offset=new Vector2(0,0); \n    material = renderer.materials[materialIndex];\
  \ \n} \n\nfunction Update () { \n    var dtime:float = Time.deltaTime; \n    offset.x=(offset.x+speed.x*dtime)%1.0f;\
  \ \n    offset.y=(offset.y+speed.y*dtime)%1.0f; \n    material.SetTextureOffset(\"\
  _MainTex\",offset); \n}\n```\n\n当然，这是有道理的。如果你使用相同的材质创建了两个 `GameObjects`，并且决定通过修改其中一个的材质来改变其外观，你通常不希望对另一个\
  \ `GameObject` 也做同样的修改。\n\n然而，如果你要对所有共享该材质的 `GameObjects` 应用相同的一致的动画，那么就没有理由停止共享该材质。因此，你可以修改脚本，使其访问\
  \ `MeshRenderer` 的 `sharedMaterials` 变量，而不是 `materials` 变量。访问 `sharedMaterials`（或者如果假设\
  \ `GameObject` 上只有一个材质，则访问 `sharedMaterial`）意味着你真的想要更改共享材质并避免创建新的材质，从而保持批处理的资格。为了处理共享和非共享材质两种情况，我们添加一个公共变量，允许你指定动画是否会破坏材质共享，并用该值来决定是修改\
  \ `renderer.materials` 还是 `renderer.sharedMaterials`（清单 16-10）。\n\n清单 16-10。带有共享材质选项的纹理动画脚本\n\
  \n```\n#pragma strict \n\nvar speed:Vector2; \nvar materialIndex:int=0; \n\nvar\
  \ shared:boolean = true; \n\nprivate var offset:Vector2; \nprivate var material:Material;\
  \ \n\nfunction Start() { \n    offset=new Vector2(0,0); \n    if (shared) { \n \
  \       material = renderer.sharedMaterials[materialIndex]; \n    } else { \n  \
  \      material = renderer.materials[materialIndex]; \n    } \n} \n\nfunction Update\
  \ () { \n    var dtime:float = Time.deltaTime; \n    offset.x=(offset.x+speed.x*dtime)%1.0f;\
  \ \n    offset.y=(offset.y+speed.y*dtime)%1.0f; \n    material.SetTextureOffset(\"\
  _MainTex\",offset); \n}\n```\n\n此外，在使用此脚本对共享材质进行动画时，还有一个虽然不是那么重要但可用的优化。每个使用相同材质的\
  \ `GameObject` 都运行相同的纹理动画脚本是多余的；只需要一个脚本实例就足以驱动所有人的动画。\n\n#### 最小化垃圾回收\n\n在上一章开发\
  \ iAd 横幅脚本时，我提到了自动内存管理，指出你必须保持对广告对象的引用以防止它被垃圾回收，并且应该移除引用以允许垃圾回收器回收该对象使用的空间。在最坏的情况下，如果你不断地创建对象且从不允许它们被垃圾回收（假设你将对象添加到一个\
  \ `Array` 中但从不移除，因此它们始终被引用），最终你会耗尽内存。\n\n垃圾回收会在游戏中引入明显的停顿。最小化这些停顿的最有效方法是最小化垃圾回收的需求，这可以通过最小化最终被回收器回收的对象数量来实现。\n\
  \n\n\n一种技巧是将对象保存在 *`pool`* 中以便重用，而不是让它们被垃圾回收。你也可以通过调用`System.GC.Collect`来显式地调用收集器。例如，你可以在保龄球游戏控制器的`Awake`回调中添加该调用，以确保在游戏开始前进行一次垃圾回收，这将立即清理上一个场景留下的所有未使用对象（清单\
  \ 16-11）。\n\n清单 16-11. 在`FuguBowl.js`中添加对垃圾回收器的调用\n\n```\nfunction Awake() {\n \
  \       player = new FuguBowlPlayer();\n        CreatePins();\n        System.GC.Collect();\n\
  }\n```\n\n**离线优化**\n\n到目前为止，我们所做的所有更改都是快速优化，你可以立即通过测试运行和分析来查看它们的效果。Unity 还集成了一些商业场景预处理工具，可以极大提升性能：`Beast`\
  \ 和 `Umbra`。这些工具在本章中不会使用，因为它们的设置和运行可能需要相当长的时间，而且坦率地说，它们对我们简单的场景作用不大。但我将在以下小节中简要介绍它们。\n\
  \n**Beast**\n\n在不产生严重性能损失的情况下添加高质量实时照明是很困难的。每个额外的逐像素光源都会产生更多的绘制调用，阴影代价高昂，且最终的视觉质量不如桌面端，更不用说离线渲染的计算机生成场景了。`Beast`\
  \ 通过生成光照贴图（一种预计算并“烘焙”到纹理中的照明）解决了这两个问题。当然，一切都是有代价的——除了设置和烘焙时间外，光照贴图场景最终会产生额外的大纹理，占用更多内存，增加应用程序大小，并延长场景加载时间。\n\
  \n要为当前场景生成光照贴图，你首先必须将所有不移动的游戏对象（包括灯光）标记为静态，因为你只能为固定的灯光和表面预计算照明。光照贴图作为第二层纹理叠加在网格上，因此你很可能需要重新导入静态网格，并选中“`Generate\
  \ Lightmap UVs`”选项以创建第二组纹理坐标。然后，从编辑器菜单栏的“`Window`”菜单中调出“`Lightmapping`”窗口（图 16-35）。\n\
  \n![9781430248750_Fig16-35.jpg](img/9781430248750_Fig16-35.jpg)\n\n图 16-35. 光照贴图窗口\n\
  \n在该窗口中，你可以在“`Object`”面板中调整每个对象的光照贴图属性，然后切换到“`Bake`”面板以设置光照贴图属性并启动光照贴图烘焙。\n\n请注意，Unity\
  \ iOS 上不支持双光照贴图，因为该功能需要延迟光照，因此单光照贴图是唯一选项，动态和静态照明将无法很好地混合，尤其是在阴影方面。\n\n**Umbra (Pro)**\n\
  \n我之前提到过，每个摄像机都会执行视锥体剔除，忽略任何位于摄像机视锥体之外的游戏对象。不熟悉实时计算机图形学的人可能会认为被遮挡的对象（即被其他对象挡住视线的对象）也会被剔除，但事实并非如此。视锥体内的所有对象都会被渲染，深度缓冲用于逐像素确定哪个对象在另一个对象的前面。确定一个对象是否位于视锥体之外是一个相对直接的计算，但确定哪些对象被遮挡则需要一些预处理。这正是\
  \ Unity 集成 `Umbra` 作为遮挡剔除工具的作用所在。\n\n为场景添加遮挡剔除的过程与光照贴图类似。你需要将不移动的对象标记为静态，然后从 Unity\
  \ 编辑器菜单栏的“`Window`”菜单中调出“`Occlusion Culling`”窗口（图 16-36）。\n\n![9781430248750_Fig16-36.jpg](img/9781430248750_Fig16-36.jpg)\n\
  \n图 16-36. 遮挡剔除窗口\n\n在那里，你可以在“`Object`”选项卡中调整每个对象的遮挡剔除设置，然后在“`Bake`”选项卡中指定遮挡剔除设置并烘焙遮挡剔除数据。\n\
  \n**最终分析结果**\n\n现在你已经完成了对项目的优化，是时候再次分析游戏了（清单 16-12），尽管如果你想有条不紊地进行，应该在每次更改后都运行一次分析以查看其效果。\n\
