  绿色圆点表示应用已在 App Store 上线，红色表示被拒绝。黄色有多种含义，但通常表示应用尚未上传。对于已上线且有更新已提交或正在进行中的应用，会同时列出两种状态。当然，如果这是您的第一个应用，则不会列出任何应用。


  #### 选择应用类型


  点击“添加新应用”后，下一页（图 11-15）会要求您选择应用类型：适用于 App Store 的 iOS 应用或适用于 Mac App Store 的 Mac
