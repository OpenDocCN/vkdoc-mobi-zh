  \ 16.6 毫秒，刚刚好是 60 fps。目标达成！此分析结果是在第四代 iPod touch（相当于 iPhone 4）上运行的，因此根据你的设备，结果可能会有所不同。\n\
  \n`player-detail` 一行表明帧时长主要由批处理和渲染主导，因此图形是剩余的瓶颈，再在脚本优化上花费更多时间并不明智。如果你认为 30 fps 也不错，那么你处于一个可以添加更多内容和功能的良好状态。\n\
  \n**进一步探索**\n\n在本章开头，我引用了过早优化的风险，即在让程序运行之前就使事情复杂化。但是，你应该从开发之初就牢记性能目标。从简单开始（Unity\
  \ 文档建议在 iPhone 3GS 上渲染不超过 40000 个顶点），让程序运行起来，优化到满足性能目标，继续添加内容和功能，并在游戏性能低于目标时停下来优化。并且要记住分析并优化瓶颈。优化只占你帧时长\
  \ 10% 的部分，而忽略占 50% 的部分，是毫无益处的。\n\n**Unity 手册**\n\n在 Unity 手册中，“`Getting Started\
  \ with iOS Development`”部分有多个关于“`Optimizing Performance in iOS`”的页面，涵盖了为优化构建而调整的“`Player\
  \ Settings`”、内置分析器的描述以及优化构建大小。\n\n“`Advanced`”部分记录了 Unity Pro 附带的 `Profiler`，以及前面提到的离线优化功能：光照贴图和遮挡剔除。“`Advanced`”部分还包括许多其他与优化相关的页面：“`Optimizing\
  \ Graphics Performance`”、“`Reducing File Size`”、“`Automatic Memory Management`”（垃圾回收）和“`Shadows`”（特别是“`Shadow\
  \ Performance`”）。关于“`Asset Bundles`”和“`Loading Resources`”的页面解释了资产如何被下载并按需加载到场景中，这是一种可用于管理安装后应用程序大小的技术。\n\
  \n**参考手册**\n\n参考手册描述了我们优化过的所有组件和资源类型。\n\n\n\n# 排版后的内容\n\n在这些组件中，我们调整了`Camera`的视锥体和平截头体可视掩码（visibility\
  \ mask），也调整了 Light 的剔除掩码和剔除距离，同时禁用了它的阴影；最小化了每个`MeshFilter`的阴影投射和接收者数量，简化了每个`MeshRenderer`的着色器，并将一个`MeshCollider`替换为`BoxCollider`。我们检查了组件引用的各种资源类型的导入设置：`Texture2D`、`AudioClip`和`Mesh`。参考手册也记录了我们自定义的设置管理器，包括`QualitySettings`、`PhysicsManager`、`TimeManager`和`AudioManager`。我们还使用了`GUIText`组件（它是我们用于启动画面的`GUITexture`的同类组件）来显示帧率。\n\
  \n#### 脚本参考\n\n脚本参考中的`Scripting Overview`部分有一个`Performance Optimization`页面，提供了一些关于如何编写更快脚本的技巧。本章学到的一个新函数是`StaticBatchingUtility`类中的静态函数`Combine`（`Combine`是该类中唯一的函数），我们调用它来在运行时批量处理一组游戏对象的层次结构。本章学到的一个新变量是`MonoBehaviour`类中的`useGUILayout`变量，当设置为\
  \ true 时，它通过告诉 UnityGUI 系统当前的`OnGUI`回调不会使用`GUILayout`函数执行任何自动布局，从而提升性能。\n\n所有设置管理器都有对应的类，因此可以通过脚本查询和设置其配置。尽管除渲染设置外的所有设置管理器在整个游戏过程中（而非按场景）处于活动状态，但脚本访问允许我们为每个场景调整设置。例如，我们可以为每个场景定义一个质量级别，并为每个场景添加一个脚本来加载相应的质量级别。本章讨论的设置管理器对应的类包括`QualitySettings`、`AudioSettings`、`PhysicsManager`和`Timemanager`。\n\
  \n我们还使用了`Time`类，评估了其`timeScale`和`deltaTime`变量，并设置了`GUIText`的`text`变量，以便进行基本的帧率显示。\n\
  \n#### 资源商店\n\n资源商店列出了一些性能分析系统（搜索`profiler`）和一些对象池系统（搜索`pool`），例如 PoolManager、Smart\
  \ Pool 和 Pooling Manager。最后一个来自 DFT Games，是免费的。\n\n#### 网络资源\n\nUnity 维基百科位于`http://wiki.unity3d.com/`，其`Tips,\
  \ Tricks and Tools`部分提供了一些性能技巧，以及几个与性能相关的脚本。特别是，`FramesPerSecond`页面列出了一些比我们在本章创建的更复杂的帧率显示脚本（例如，它们通过一系列帧计算帧率以获得更稳定的显示）。\n\
  \nUmbra 遮挡剔除系统由 Umbra Software 开发，网址为`http://umbrasoftware.com/`。Beast 光照贴图系统是 Autodesk\
  \ 的产品，产品页面位于`http://gameware.autodesk.com/beast`。\n\n#### 书籍\n\n我已经多次提到《实时渲染》（`http://realtimerendering.com`），但它与本章的图形优化确实非常相关。仅关于\
  \ Mipmap 的处理就值得一读。\n\n## 第 17 章：接下来去哪里？\n\n现在，您已经完成了对 Unity 和 Unity iOS 开发的介绍——从下载和安装\
  \ Unity，到在 Unity 编辑器中开发一个简单的保龄球游戏，再到让它在 iOS 上运行，最后优化它以获得不错的性能。虽然并未涵盖每一个 Unity 功能或游戏开发主题（这本书可能会变成一套多卷百科全书！），但我将以一章的“进一步探索”作为结尾。\n\
  \n### 更多脚本知识\n\n我们只是浅尝了 Unity 脚本的皮毛，不仅涉及提供的各种脚本语言和广泛的 Unity 类集，还包括可以编写脚本的内容。\n\n\
  #### 编辑器脚本\n\n如果您觉得 Unity 编辑器中缺少某些功能，很有可能可以通过编写编辑器脚本来添加该功能。这些脚本同样使用 JavaScript、C#或\
  \ Boo 编写，但它们位于项目视图的 Editor 文件夹中。编辑器脚本通过一组编辑器类（在脚本参考的`Editor Classes`部分有文档说明）可以访问编辑器\
  \ GUI、项目设置和项目资源。\n\n例如，让我们在 Unity 编辑器菜单栏上创建一个菜单，其中包含用于激活和停用整个游戏对象层次结构的命令。换句话说，这些命令会调用层次结构中每个游戏对象的`SetActive`，相当于在检视面板中点击每个游戏对象的复选框。\n\
  \n在 Unity 4 之前，每个游戏对象只有一个`active`状态，由检视面板中的活动复选框和游戏对象变量`active`表示。但从 Unity 4 开始，检视面板中的复选框代表游戏对象的**本地活动状态**，可通过脚本调用`SetActive`设置，并从游戏对象变量`activeSelf`读取。而全局或“真正”的活动状态则取决于其所有父对象是否也处于本地活动状态。因此，确保层次结构中的所有游戏对象都处于本地活动状态后，就可以通过切换根游戏对象的活动状态来停用整个组。手动点击所有这些复选框既繁琐又容易出错，因此一个执行此操作的单一命令将非常有用，尤其是对于将项目升级到\
  \ Unity 4 的开发者而言。\n\n创建编辑器脚本的过程与创建用于场景的脚本相同，只是编辑器脚本必须放置在 Editor 文件夹中。因此，让我们在项目视图中创建一个新的\
  \ JavaScript，命名为`FuguEditor`，并将其放置在 Editor 文件夹中（图 17-1）。\n\n![9781430248750_Fig17-01.jpg](img/9781430248750_Fig17-01.jpg)\n\
  \n图 17-1. 创建新的编辑器脚本\n\n现在，将清单 17-1 中的代码添加到脚本中。\n\n清单 17-1. FuguEditor.js 的完整代码清单\n\
  \n```\n#pragma strict\n\n@MenuItem (\"FuguGames/ActivateRecursively\")\nstatic function\
  \ ActivateRecursively() {\n        if (Selection.activeGameObject !=null) {\n  \
  \              SetActiveRecursively(Selection.activeGameObject,true);\n        }\n\
  }\n\n@MenuItem (\"FuguGames/DeactivateRecursively\")\nstatic function DeactivateRecursively()\
  \ {\n        if (Selection.activeGameObject !=null) {\n                SetActiveRecursively(Selection.activeGameObject,false);\n\
  \        }\n}\n\nstatic function SetActiveRecursively(obj:GameObject,val:boolean)\
  \ {\n        obj.SetActive(val);\n        for (var i:int=0; i<obj.transform.GetChildCount();\
  \ ++i) {\n                SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);\n\
  \        }\n}\n\n@MenuItem (\"FuguGames/ActivateRecursively\", true)\n@MenuItem\
  \ (\"FuguGames/DeactivateRecursively\", true)\nstatic function ValidateGameObject()\
  \ {\n        return (Selection.activeGameObject !=null);\n}\n```\n\n代码行`@MenuItem\
  \ (\"FuguGames/ActivateRecursively\")`向编辑器菜单栏的 FuguGames 菜单添加了一个`ActivateRecursively`项，如果菜单尚未创建，则会创建该菜单。`@MenuItem`行后面的函数会在选择该菜单项时被调用。`ActivateRecursively`检查编辑器中是否已选中一个游戏对象，如果选中，则将游戏对象和值`true`传递给函数`SetActiveRecursively`。而`SetActiveRecursively`会为层次结构中的每个游戏对象调用`SetActive`，并传入值\
  \ true。\n\n之后，一个类似的代码块向菜单添加了`DeactivateRecursively`项，区别仅在于名称不同，以及在传递给`SetActiveRecursively`时传入\
  \ false 而不是 true。\n\n\n\n尽管你可以在调用 `SetActiveRecursively` 之前检查某个对象是否被选中，但从用户界面设计的角度来看，更好的做法是在菜单项不会产生任何效果时将其禁用。你可以通过再次列出\
  \ `MenuItem` 属性来实现这一点，但这次需要额外添加一个 `true` 参数，该参数表示下一个函数是一个静态函数，只有当菜单项应处于激活状态时才会返回\
  \ `true`。`ActivateRecursively` 和 `DeactivateRecursively` 都使用 `ValidateGameObject`（该函数仅检查编辑器中是否选中了某个\
  \ `GameObject`）来决定菜单项是应可用还是应置灰。\n\n一旦此脚本编译完成，新菜单应如图 Figure 17-2 所示（可能会有延迟）。\n\n\
  ![9781430248750_Fig17-02.jpg](img/9781430248750_Fig17-02.jpg)\n\nFigure 17-2. 使用编辑器脚本添加到菜单栏的菜单\n\
  \n这个示例只具有极少的用户界面，仅包含一些菜单项，但编辑器脚本可以使用 UnityGUI 函数创建新的窗口和用户界面（实际上，编辑器本身就是用 UnityGUI\
  \ 实现的，这就是为什么偶尔的编辑器错误会在控制台视图中显示为 UnityGUI 错误）。编辑器脚本还可用于批处理、导入后的资源后期处理，或者构建前的场景预处理。我有一些简单的编辑器脚本，它们可以删除构建文件、显示\
  \ `GameObject` 统计信息，甚至调用 macOS 的 `say` 命令，这样我就能和自己对话了。\n\n## C\\#\n\n本书中我一直专注于使用\
  \ Unity 的 JavaScript 作为脚本语言，因为，嗯，我必须选一个。但说真的，JavaScript 在 Unity 文档中的示例代码确实更多（尽管差距正在缩小），并且对于\
  \ JavaScript 和 Flash 开发者来说可能更熟悉。JavaScript 也比 C# 更简洁，至少对于小型脚本来说是这样。只需比较一下在项目视图中通过“创建”菜单生成的空\
  \ JavaScript 脚本 (Listing 17-2) 和 C# 脚本 (Listing 17-3) 即可。\n\nListing 17-2. 新创建的\
  \ JavaScript 脚本\n\n```javascript\n#pragma strict\n\nfunction Start () {\n\n}\n\n\
  function Update () {\n\n}\n```\n\nListing 17-3. 新创建的 C# 脚本\n\n```csharp\nusing UnityEngine;\n\
  using System.Collections;\n\npublic class NewBehaviourScript : MonoBehaviour {\n\
  \n        // Use this for initialization\n        void Start () {\n\n        }\n\
  \n        // Update is called once per frame\n        void Update () {\n\n     \
  \   }\n}\n```\n\n在 C# 脚本中，类声明是显式的，你必须确保类名与脚本名匹配。在 C# 脚本顶部，显式导入了 Unity 脚本中常用的两个命名空间：`UnityEngine`\
  \ 和 `System.Collections`——而在 JavaScript 中，它们是隐式导入的。\n\n很多 JavaScript 代码只需少量修改即可在\
  \ C# 中运行，但二者存在一些语法差异：变量声明以 `<type> <name>` 开头，而不是 `var <name>:<type>`。函数的定义方式相同，但以返回类型和名称开头，而不是以\
  \ `function` 开头。没有必要在 C# 文件中添加 `#pragma strict`，因为 C# 本身就是强类型语言。\n\n对于小型脚本来说，JavaScript\
  \ 更为便捷，但对于大规模的 Unity 开发而言，C# 可以说是更实用的选择，因为它是一种文档更完善的语言，并作为最流行的 Mono 或 .NET 语言经过了工业级的测试。此外，许多\
  \ Unity 扩展包都是用 C# 编写的（其中包括 Prime31 插件、EZGUI 和 NGUI），而在 Unity 中混用 JavaScript 和 C#\
  \ 会很不方便；如果你的 JavaScript 代码引用了 C# 脚本，这些脚本必须放在 Plugins 或 Standard Assets 文件夹中，以便它们更早地加载。\n\
  \n使用 C# 的另一个原因是 Unity 4 中对 C# 增加了命名空间支持。这一特性使你可以省去为类名添加前缀以避免冲突的做法。例如，Listing 17-4\
  \ 展示了 `FuguFrameRate` 脚本的 C# 版本，其中类是在命名空间声明中定义的。\n\nListing 17-4. `FuguFrameRate`\
  \ 脚本的 C# 版本\n\n```csharp\nusing UnityEngine;\nusing System.Collections;\n\nnamespace\
  \ Fugu {\n\n   sealed public class FrameRate : MonoBehaviour {\n\n        public\
  \ int frameRate = 60;\n\n        void Awake () {\n               Application.targetFrameRate\
  \ = frameRate;\n        }\n\n   }\n\n} // 结束命名空间\n```\n\n由于该类位于命名空间 `Fugu` 内部，你可以安全地将该类简称为\
  \ `FrameRate`，并将脚本命名为 `FrameRate` 以匹配。如果你需要从另一个脚本中引用此类，则必须使用完全限定名 `Fugu.FrameRate`，除非你在脚本顶部添加了\
  \ `using Fugu;` 语句。C# 允许你选择性地在类定义前加上 `sealed`，这表示该类不打算被继承。如果你试图定义 `FrameRate` 的子类，将会产生编译器错误。Java\
  \ 程序员会识别出这与 Java 中的 `final` 声明相同。\n\n在 C# 中，协程必须显式地返回 `IEnumerator` 类型（该类型位于 `System.Collections`\
  \ 命名空间中，这也是始终导入该命名空间很方便的原因）。尽管 Unity 会在新创建的 C# 脚本中自动添加一个返回 `void` 的 `Start` 回调，但可以通过将返回类型从\
  \ `void` 改为 `IEnumerator`，将这个 `Start` 回调变成一个协程。但改变回调的返回类型似乎有点奇怪，因此我更喜欢将协程移出 `Start`\
  \ 回调，并使用 `StartCoroutine` 来调用协程，就像我在 `FuguAdBanner` 脚本的 C# 版本中所做的那样 (Listing 17-5)。\n\
  \n`StartCoroutine` 可以从任何回调中调用，因此这种技术的优势在于提供了一种统一的调用协程的方式，使得无需直接使用回调作为协程（也无需记住哪些回调可以用作协程）。这种实践在\
  \ JavaScript 中同样适用。\n\nListing 17-5. `FuguAdBanner` 脚本的 C# 版本\n\n```csharp\nusing\
  \ UnityEngine;\nusing System.Collections;\n\nnamespace Fugu {\npublic class AdBanner\
  \ : MonoBehaviour {\n\n        public bool showOnTop = true;\n        public bool\
  \ dontDestroy = true;\n\n        private ADBannerView banner = null;\n\n       \
  \ void Start() {\n               StartCoroutine (StartBanner());\n        }\n\n\
  \        private IEnumerator StartBanner () {\n               if (dontDestroy) {\n\
  \                       GameObject.DontDestroyOnLoad(gameObject);\n            \
  \   }\n               banner = new ADBannerView();\n               banner.autoSize\
  \ = true;\n               banner.autoPosition = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n\
  \               while (!banner.loaded && banner.error == null) {\n             \
  \          yield return null;\n               }\n               if (banner.error\
  \ == null) {\n                       banner.Show();\n               } else {\n \
  \                      banner = null;\n               }\n        }\n}\n} // 结束命名空间\n\
  ```\n\n你也不能像在 JavaScript 中那样在协程内直接调用 `yield`。在 C# 中，你需要调用 `yield return null` 来实现与一帧等效的暂停。\n\
  \n另一个区别是匿名函数的语法。在我们的 `FuguGameCenter` 脚本中，我以 `function(success:boolean) {...}` 的形式传递了未命名的成功或失败函数，但在\
  \ C# 中，匿名函数被称为 *lambda 函数*（这一术语源自 Lisp 语言，它使用 `(lambda (success) ...)`），并以 `(bool\
  \ success) => {` 的形式指定。\n\n\n[内容]\n清单 17-6 展示了`FuguGameCenter`脚本的 C#版本。\n\n**清单\
  \ 17-6. `FuguGameCenter`的 C#版本**\n\n```\nusing UnityEngine;\nusing System.Collections;\n\
  \nusing UnityEngine.SocialPlatforms.GameCenter;\n\nnamespace Fugu {\n         \n\
  \   sealed public class GameCenter : MonoBehaviour {\n\n        public bool showAchievementBanners\
  \ = true;\n\n        // 初始化时使用\n        void Start () {\n#if UNITY_IPHONE\n    \
  \    Social.localUser.Authenticate ( (bool success) => {\n        if (success &&\
  \ showAchievementBanners) {\n                GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
  \                        Debug.Log (\"认证成功 \"+Social.localUser.userName);\n    \
  \    }\n                else {\n                        Debug.Log (\"认证失败 \"+Social.localUser.userName);\n\
  \                }\n        }\n    );\n#endif\n        }\n                \n   \
  \     \n        static public void Achievement(string name,double score) {\n#if\
  \ UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n                Social.ReportProgress(name,score,\
  \ (bool success) => {\n                        if (success) {\n                \
  \                Debug.Log(\"成就 \"+name+\" 报告成功\");\n                        } \
  \ else {\n                                Debug.Log(\"报告成就失败 \"+name);\n       \
  \                 }\n                } );\n        }\n#endif\n}\n\n        static\
  \ public void Score(string name,long score) {\n#if UNITY_IPHONE\n        if (Social.localUser.authenticated)\
  \ {\n                 Social.ReportScore (score, name, (bool success) => {\n   \
  \                     if (success) {\n                                Debug.Log(\"\
  在排行榜 \"+name+\" 上发布了 \"+score);\n                        }  else {\n           \
  \                     Debug.Log(\"在排行榜 \"+name+\" 上发布 \"+score+\" 失败\");\n     \
  \                   }\n                } );\n        }\n#endif\n}\n        \n  \
  \ }\n}\n```\n\n最后，你可能最怀念 JavaScript 的一点是，可以轻松修改 Transform 组件中的`Vector3`值。清单 17-7\
  \ 展示了一行简单的 JavaScript 代码，用于修改 Transform 组件位置中的`x`分量。\n\n**清单 17-7. 在 JavaScript\
  \ 中修改 Transform 的`Vector3`**\n\n```\nfunction Start () {\n        transform.position.x=0;\n\
  }\n```\n\n这行代码在 C#中会产生编译器错误（图 17-3），因为`Vector3`是一个结构体（struct），而不是类（class），因此是值类型，而非引用类型。它在\
  \ JavaScript 中能正常运行是一种便利（尽管会带来误导，因为它会让`Vector3`看起来像一个类，而不是结构体）。\n\n![9781430248750_Fig17-03.jpg](img/9781430248750_Fig17-03.jpg)\n\
  \n**图 17-3. 在 C#中修改 Transform 的`Vector3`时出现的错误信息**\n\n由于`Vector3`是结构体，你不必担心垃圾回收器需要清理大量未使用的`Vector3`实例，因为实际上并不存在这些实例。但这意味着在\
  \ C#中，如果你想修改 Transform 组件的位置，就必须创建一个新的`Vector3`，如清单 17-8 所示。\n\n**清单 17-8. 在 C#中修改\
  \ Transform 的有效方法**\n\n```\nvoid Start () {\n        transform.position = new Vector3(0,transform.position.y,transform.position.z);\n\
  }\n```\n\n注意，在 C#中，你必须在`Vector3`构造函数前指定`new`，而在 JavaScript 中则是可选的。这是 JavaScript\
  \ 的一个小便利（这类便利通常被称为*语法糖*），但 C#的优势在于允许你以类似于定义类的方式来定义自己的结构体。在 JavaScript 中，你可以使用结构体，但无法定义新的结构体。\n\
  \nAndrew Stellman 和 Jennifer Greene 的《Head First C#》（O'Reilly）是一本很好的 C#入门书籍，但有经验的程序员可以通过《C#\
  \ in a Nutshell》系列（同样由 O'Reilly 出版）快速上手 C#。特别是 Java 程序员会发现 C#很熟悉（尽管名称如此，C#与 C 或\
  \ C++并无关联，除非算上远亲关系）。\n\n### 脚本执行顺序\n\n在结束脚本主题之前，还有一个问题值得提及：指定脚本之间的执行顺序。如果你查看保龄球游戏中用于控制主摄像头的`SmoothFollow`脚本，会发现摄像头位置不是在`Update`回调中更新，而是在`LateUpdate`回调中更新。`LateUpdate`与`Update`一样在每一帧被调用，但一帧中所有的`LateUpdate`调用都在所有`Update`调用完成后进行。`SmoothFollow`在`LateUpdate`中计算摄像头位置，以便考虑其目标在`Update`回调中发生的任何位置变化。\n\
  \n在游戏引擎中同时使用`Update`和`LateUpdate`回调是一种常见技术，但它的作用有限。如果你希望一个游戏对象在另一个游戏对象的`LateUpdate`之后更新怎么办？抱歉，没有`LateLateUpdate`回调！但\
  \ Unity 确实有一个更通用的解决方案，即**脚本执行顺序设置**，可以通过“编辑”菜单的“项目设置”子菜单打开（图 17-4）。\n\n![9781430248750_Fig17-04.jpg](img/9781430248750_Fig17-04.jpg)\n\
  \n**图 17-4. 打开脚本执行顺序设置**\n\n脚本执行顺序设置也可以通过在选择脚本时，单击检查器视图中显示的“执行顺序”按钮来打开。无论哪种方式，脚本执行顺序设置都会在检查器视图中显示为一个\
  \ MonoManager（图 17-5），其列表中最初仅包含一项“默认时间”。\n\n![9781430248750_Fig17-05.jpg](img/9781430248750_Fig17-05.jpg)\n\
  \n**图 17-5. 检查器视图中的脚本执行顺序设置**\n\n由于`SmoothFollow`使用了`LateUpdate`，你无需进行任何更改，但假设你想确保`SmoothFollow`脚本在所有其他脚本之后运行其`Update`回调。你需要点击脚本执行顺序设置右下角的加号（`+`）按钮，并从弹出的菜单中选择`SmoothFollow`脚本。默认情况下，`SmoothFollow`脚本会出现在脚本执行顺序设置中“默认时间”的下方，这意味着`SmoothFollow`将在所有其他脚本之后运行。\n\
  \n然后，你可能决定让游戏控制器脚本`FuguBowl`在除`SmoothFollow`之外的所有其他脚本之后运行（例如，因为它会持续检查保龄球的位置）。那么，再次点击`+`按钮添加`FuguBowl`脚本，然后使用左侧的拖动手柄，将`FuguBowl`拖动到`SmoothFollow`上方但位于“默认时间”下方，最终列表如图\
  \ 17-6 所示。任何拖动到“默认时间”上方的脚本都会在所有其他脚本之前执行。\n\n![9781430248750_Fig17-06.jpg](img/9781430248750_Fig17-06.jpg)\n\
  \n**图 17-6. 指定`FuguBowl.js`和`SmoothFollow.js`的执行顺序**\n\n点击脚本右侧的减号（`-`）按钮，可以将该脚本从脚本执行顺序设置中移除。\n\
  \n### 插件\n\n前面多次提到第三方插件，有些可在资源商店中找到，还有许多来自 Prime31 Studios。但如果你恰好熟悉 C、C++或 Objective-C，你可以编写自己的插件，无论是为了访问更多设备功能，还是为了利用用\
  \ C、C++或 Objective-C 编写的库。除了包含原生库外，插件还需要额外的 Unity 包装脚本。\n[/内容]\n\n\n# 该过程记录在 Unity\
  \ 手册的“高级”部分中的“插件”页面上。\n\n### 跟踪应用\n\n尽管 iTunes Connect 提供了下载和销售数据（而且图表比曾经唯一的 `.csv`\
  \ 报告更容易阅读），但仍有几个第三方产品可以跟踪应用销售情况以及其他数据，如应用排名和评论。\n\n`App Annie`（`http://appannie.com/`）和\
  \ `AppFigures`（`http://appfigures.com/`）是两款较流行的基于网络的产品，它们都能在账户设置时你提供 iTunes Connect\
  \ 登录信息后，自动每日从 iTunes Connect 下载应用数据。两者都提供漂亮的销售数据图表展示，并发送每日应用统计摘要邮件。`App Annie` 目前免费（技术上处于测试阶段），而\
  \ `AppFigures` 则收取费用。\n\n图 17-7 显示了 `App Annie` 一个月内 Fugu Bowl 下载量的图表。更新下载量叠加在销售下载量之上。更新线会出现峰值，与\
  \ FuguBowl 的更新发布相对应。\n\n![9781430248750_Fig17-07.jpg](img/9781430248750_Fig17-07.jpg)\n\
  \n图 17-7。`App Annie` 销售图表\n\n`AppViz`（`http://appviz.com/`）是一款 OS X 应用程序，它实现相同的功能，但会将数据下载到你的\
  \ Mac 上，并提供多种图表，包括按地域划分的销售额（图 17-8）。`AppViz` 并非免费，但价格不高，我认为它物有所值。\n\n![9781430248750_Fig17-08.jpg](img/9781430248750_Fig17-08.jpg)\n\
  \n图 17-8。`AppViz` 地域视图\n\n你无需拘泥于只使用这些产品中的一种。我使用 `AppViz` 来确保本地保存了所有应用销售数据，并且我喜欢它多样的图表和\
  \ App Store 评论下载功能。我使用 `AppAnnie` 是因为它能自动发送包含每日销售数据、排名显示（在 `AppViz` 中下载所有排名数据需要很长时间）的电子邮件报告，而且\
  \ `App Annie` 支持一些 Android 应用商店。此外，它还是免费的！\n\n**提示** 从 `AppViz`，你可以导出所有已下载的数据，然后将这些数据导入到其他产品中，比如\
  \ `App Annie`。由于苹果只在 iTunes Connect 上提供一年的应用销售数据，这是确保你始终可以将应用完整销售历史导入到销售跟踪产品中的一种方法。\n\
  \n### 促销代码\n\n我已经描述了如何在应用在 App Store 获批后下载促销代码，但我没有解释如何使用它们。其实有很多选择。几乎每个应用评测网站都会接受促销代码与评测请求。`Touch\
  \ Arcade`（`http://toucharcade.com/`）就是这样一个网站，但它也有一个非常活跃的论坛，供开发者发放促销代码。而 `AppGiveaway`（`http://appgiveaway.com/`）会开展促销活动，在设定时间段内发放促销代码。这比自己亲手发放要方便得多，尽管你也应该自己发放。保存促销代码清单也是推动应用更新的一个充分理由，因为每次更新你都能获得\
  \ 50 个全新的代码。\n\n### 更多变现方式\n\n考虑到每年需要支付苹果开发者费用和 Unity 许可证费用（如果你决定使用 Pro 许可证），你很可能希望至少能赚回这笔钱。除了\
  \ iAd 和第三方移动广告服务外，还有其他变现策略。\n\n#### 应用内购买\n\n除了应用销售和 iAd 之外，苹果还为 iOS 提供了另一条收入渠道：一个名为\
  \ `Storekit` 的应用内购买（IAP）系统。Unity iOS 没有为 IAP 提供脚本接口，但 Prime31 Studios 在其产品中提供了一个\
  \ `Storekit` 插件。\n\nUnity 手册提供了一些关于如何下载和激活通过 IAP 购买的额外内容的提示，而 iTunes Connect 文档则解释了如何设置应用内购买。\n\
  \n#### 资源商店\n\n我在我的应用中使用了几十个免费和付费的资源商店包，你肯定会发现资源商店对你的项目很有用。但资源商店也是另一个自助发布产品和创收的地方（Unity\
  \ 会抽取 30% 的佣金，和苹果在 App Store 上一样）。你也可以在资源商店上免费发布资源包，以获得认可或作为对社区的贡献（在本书的例子中，我当然也利用了这种慷慨）。\n\
  \n方便的是，资源商店的提交是在 Unity 编辑器内，使用从资源商店（名称很贴切）下载的“资源商店工具”完成的。你可以提交项目中任何资源的集合——音频、纹理、模型、脚本、插件，甚至整个项目本身。\n\
  \n**提示** 使用预处理器指令确保在切换构建目标时不会出现编译器错误，如果你使用了 Unity Pro 功能，请添加一个自定义的 `UNITY_PRO` 预处理器指令，这样\
  \ Unity Basic 用户就不会出现问题。\n\n与向 App Store 提交类似，向资源商店提交的大部分工作涉及创建截图、图标、应用描述和商店艺术作品。关于如何成为资源商店卖家的说明，请访问\
  \ `http://unity3d.com/asset-store`。\n\n### 为 Android 开发\n\nUnity Android 需要额外的许可证，其\
  \ Indie 和 Pro 结构与 Unity iOS 相同。好消息是，本书中几乎所有为 Unity iOS 开发的内容都可以很好地用于 Unity Android。不出所料，`iPhone`\
  \ 类中的任何内容在 Android 上也不可用（例如，我们用来检查设备类型的变量 `iPhone.generation`），但 `Input` 类中适用于 iOS\
  \ 的所有内容在 Android 上的工作方式也相同，包括触摸屏和加速度计功能。\n\n`Game Center` 和 iAd 是苹果的技术，因此这些功能在 Android\
  \ 上不可用，但未来 `Social`、`ADBanner` 和 `ADInterstialAd` 类可能会在 Android 上支持等效的功能。Prime31\
  \ Studio 和其他供应商提供了 Unity Android 插件，以提供对设备功能和移动服务的更多访问，例如 `AdMob` 移动广告服务。\n\nAndroid\
  \ 的构建和提交流程也有所不同。Android 不需要 Xcode，而是需要安装 Android SDK。你仍然可以从 Unity 编辑器调用“构建并运行”，但\
  \ Unity Android 不是为应用构建 Xcode 项目，而是直接构建可执行的应用（一个 `APK` 文件）。与 iOS 开发不同，Android 开发可以针对多个应用商店。特别是\
  \ Google Play，它没有审批流程，因此是快速自助发布的好途径，也是被苹果拒绝的应用的一个有用后备渠道。\n\n### 合同工作\n\n在开发下一个热门应用的同时，独立开发者通常会通过接合同工作来支付日常开销。潜在客户可以在\
  \ Unity 论坛的“付费工作”主题、`http://unity3dwork.com/` 甚至像 `http://odesk.com/` 这样的通用承包商网站上找到。一些市场专门从事移动应用开发，例如\
  \ `http://apptank.com/` 和 `http://theymakeapps.com/`。\n\n如果你正在寻找全职游戏开发工作，无论是否涉及\
  \ Unity，使用 Unity 开发游戏的经验，更不用说拥有自助发布游戏的 portfolios，都会对你有所帮助。\n\n### 结语\n\n现在我已经写到了最后，希望你已经准备好并兴奋地开始制作你自己的\
  \ Unity iOS 应用。如果说我希望你能从本书中学到一点，那就是你可以从简单的东西开始，并不断在上面构建，直到它变得有趣。不要成为那种想把一个大型多人在线（MMO）游戏作为第一个项目的人！\n\
  \n\n\n请记得持续学习并参与 Unity 社区，在 Unity 论坛和 Unity 问答网站上贡献与求助，同时别忘了查阅 Unity 维基。向社区推广你的作品是没问题的（Unity\
  \ 论坛中有“展示”版块），也可以请他人帮忙宣传，但切记要礼尚往来！\n\n在我用 Unity iOS 开发自己项目的过程中，意外结识了一群开发者。我们能够互相安慰、庆祝并分享宝贵的技巧。我不打算一一列举他们的名字，但你可以在我推特关注列表中找到他们：`@fugugames`。顺便说一句，Twitter\
  \ 是与 Unity 开发者进行更私人层面交流的另一个好途径。我也通过 Twitter 与许多客户沟通，并且成功为我的游戏设置了 Facebook 产品页面（尤其是\
  \ `HyperBowl`）。虽然应用客户有时以毒舌著称，但我发现他们大多数人都很支持并同情我们独立开发者，而且如果我们允许他们参与，他们也会很热情地成为这个过程的一部分。事实上，我从中受益良多：得到了大量免费的\
  \ QA 测试和一些本地化（翻译）帮助，更不用说许多反馈了。所以，快设置好你的 Twitter 和 Facebook 粉丝专页，开始交流吧！\n\n最重要的是，享受乐趣。其他任何回报都是额外的奖励！\n\
