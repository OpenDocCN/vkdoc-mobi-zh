  ## 进一步探索


  本章似乎涵盖了大量内容（绝非双关）来创建一个简单的静态场景，但在此过程中，我们探索了许多基本的 Unity 概念，特别是组件与游戏对象之间的关系。因此，你现在拥有了一个包含凹凸贴图和纹理的立方体场景，该立方体由一个带有光晕的点光源照亮，并被天空盒包围。该场景中的资源是从本地文件、Unity
  标准资源和 Unity 资源商店导入的。由于主相机上附加了 `MouseOrbit` 脚本，场景也并非完全静止。脚本编写将在本书中扮演主导角色，从下一章开始，我们将超越静态场景。


  在继续之前，休息一下，回顾一下 Unity 官方文档中关于目前已使用功能的部分，哪怕只是为了熟悉在哪里可以找到这些文档，以便将来参考。


  #### Unity 手册


  Unity 手册的 Unity 基础部分主要与上一章相关，描述了用户界面，但该部分确实有一个“创建场景”页面。更相关的是“构建场景”部分，它描述了游戏对象、组件和脚本之间的关系，如何使用检查器视图编辑组件属性，以及如何在场景视图中导航和移动游戏对象——这些内容在本章中都已涵盖。灯光和相机也做了讲解。本节列出但本书不会使用的一个功能是地形引擎（它在
  Unity iOS 中可用，但速度较慢）。不过，地形是一个重要且令人印象深刻的 Unity 功能，值得一读。“资源导入与创建”部分描述了本章中使用的资源类型：网格、材质、纹理和脚本。导入资源的过程以及资源商店也在该部分做了说明。



  '
- "# 我们尚未达到拥有可玩性的阶段，但“创建游戏玩法”章节中有一个关于“变换”的页面，正如我们所见，即便是为了放置静态游戏对象，理解变换也是基础。\n\n####\
  \ 参考手册\n\n相较于 Unity 手册，参考手册的讲解更为深入，它详细描述了每个组件，解释了其属性并记录了组件的使用方法。参考手册还记录了资源类型，并对游戏对象进行了说明。\n\
  \n通常来说，你应该为你使用的每个组件和资源类型阅读参考手册。请记住，在检视面板中每个组件上都有一个帮助图标，点击后会跳转到对应的参考手册页面。与 Unity\
  \ 手册一样，参考手册不仅可以通过 Unity 帮助菜单访问，还可以在 Unity 网站的“学习”标签页下找到（可直接通过 `http://docs.unity3d.com/`\
  \ 访问）。参考手册的“设置管理器”部分包含一个关于渲染设置的页面，本章中的天空盒正是在此处分配的。“变换组件”部分自然只列出了一个组件，即变换组件，它附加于每个游戏对象之上。\n\
  \n“网格组件”部分则更有趣，它描述了任何带有网格的游戏对象（例如本章中创建的立方体）所必需的 MeshFilter 和 MeshRenderer 组件。“渲染组件”部分则更加丰富，其中介绍了摄像机组件及其相关的\
  \ GUILayer 组件和 FlareLayer。灯光组件也在此处进行了说明。尽管资源并非真正的组件，但参考手册有一个名为“资源组件”的部分，列出了各种资源类。在本章中，光晕、材质、网格和\
  \ Texture2D 被整合到了场景中（请记住，天空盒本质上是一种材质）。\n\n最有趣的阅读内容是“内置着色器指南”部分，它详细（并配有图片）介绍了所有内置着色器，从简单快速的到非常华丽的。本章中的立方体最初使用默认的漫反射着色器，后来替换为高级的凹凸贴图镜面反射着色器。如本章所述，着色器实际上是一个程序，因此如果你找不到满足需求的内置着色器，可以按照“着色器参考”部分中的示例和说明自行编写。\n\
  \n#### 资源商店\n\n本章开启了本书中从 Unity 资源商店使用免费资源的实践。我建议定期浏览资源商店，以查看最新发布的内容。除了免费的纹理、模型和脚本外，还有许多价格合理的资源包，可以为你节省大量时间和工作。资源商店也可以通过常规网页浏览器在\
  \ `http://assetstore.unity3d.com/` 查看（但无法购买或下载任何资源）。\n\n#### 计算机图形学\n\n计算机图形学是一个庞大而复杂的研究领域。本章涉及了\
  \ 3D 模型、纹理、凹凸贴图、光晕、天空盒，而这仅仅是个开始。因此，非常值得进一步阅读关于基础（和高级）计算机图形学的资料，例如由 Tomas Akenine-Möller、Eric\
  \ Haines 和 Naty Hoffman 编写的广受欢迎且内容全面的《实时渲染》一书。Mark Haigh-Hutchinson 的《实时摄像机》则是一本专门探讨虚拟摄像机及其控制方案的专著。\n\
  \n我不会涉及创建可导入 Unity 的资源的具体过程，但 Luke Ahearn 有两本书可能对你有所帮助：《3D 游戏纹理：使用 Photoshop 创建专业游戏美术》和《3D\
  \ 游戏环境：创建专业的 3D 游戏世界》。从 Wes McDermott 的《使用 Unity 为 iPhone 创建 3D 游戏美术》这个书名，你就能看出它是本书的合适补充读物。\n\
  \n## 第 4 章：让它动起来：为立方体编写脚本\n\n既然你已经知道如何通过放置游戏对象来构建静态 3D 场景，那么是时候通过为游戏对象添加运动来让场景变得动态且更有趣了。毕竟，一个\
  \ 3D 图形场景固然不错，但一个带有动画的 3D 图形场景才能更胜一筹！\n\n不过，使用动画数据并非移动游戏对象的唯一方式。让游戏对象具备物理属性，它就会在碰撞和作用力（包括重力）的作用下移动。脚本也可以通过改变游戏对象变换组件中的位置和/或旋转值来移动它。实际上，任何移动游戏对象的方法——无论是动画、物理还是脚本——最终都会改变变换组件，而该组件始终代表游戏对象的位置、旋转和缩放。\n\
  \n本章将重点介绍如何通过脚本移动游戏对象，演示如何旋转上一章创建的静态立方体，甚至介绍如何使用开源 iTween 库实现补间动画。在此过程中，我将介绍 Unity\
  \ 脚本系统的基本概念和工具（编辑和调试）。\n\n你将编写的脚本可在 `http://learnunity4.com/` 上本章对应的项目文件中找到，但我建议你从头开始创建它们。只有当你亲自输入代码时，你才最有可能理解代码是如何工作（以及为何不工作）的。\n\
  \n### 整理资源\n\n在项目视图中，当资源按类型分区时，查看和浏览起来会更加方便。因此，在开始添加脚本之前，现在是个很好的时机来整理项目，并为脚本和纹理创建一些文件夹。\n\
  \n如果你上一章结束后未打开 Unity 编辑器，请启动它，并确保已加载上一章的项目并打开了立方体场景。然后点击项目视图左上角的“创建”按钮（图 4-1），弹出一个菜单，显示可以添加到项目中的新资源类型（或者，你也可以右键单击项目视图并选择“创建”子菜单）。在菜单中选择“文件夹”项，一个名为“新文件夹”的文件夹会出现在项目视图中。将此文件夹重命名为“Textures”，并将上一章导入的任何纹理（例如我的猫咪照片）拖入其中。虽然你目前还没有创建任何脚本，但也请一并创建一个“Scripts”文件夹。\n\
  \n![9781430248750_Fig04-01.jpg](img/9781430248750_Fig04-01.jpg)\n\n图 4-1. 在项目视图中创建\
  \ Textures 文件夹\n\n### 创建脚本\n\n选择新添加的“Scripts”文件夹，然后同样从项目视图的“创建”菜单中，选择“JavaScript”（图\
  \ 4-2）。一个名为“New Behaviour”（美国读者，你们得习惯这个英式拼写）的脚本将出现在“Scripts”文件夹中。如果你不小心将新脚本文件创建在了“Scripts”文件夹之外，只需将脚本拖入该文件夹即可。\n\
  \n**注意** 尽管项目视图的“创建”菜单中显示的是“Javascript”（仅首字母大写），但我将按“JavaScript”来称呼它，这是官方的大小写形式，也用于\
  \ Unity 文档中（谁知道呢，Unity 的某个更新随时可能修正菜单的拼写）。此外，本书将使用“a JavaScript”来指代一个脚本，而不是更准确但说起来更拗口的“a\
  \ JavaScript script”。\n\n![9781430248750_Fig04-02.jpg](img/9781430248750_Fig04-02.jpg)\n\
  \n图 4-2. 创建 JavaScript 文件\n\n由于这个新文件是一个 JavaScript，它带有`.js`扩展名。项目视图不显示文件扩展名，但从其图标可以辨别脚本的语言（图\
  \ 4-3）。如果脚本被选中，其完整名称会显示在项目视图底部的行中。\n\n![9781430248750_Fig04-03.jpg](img/9781430248750_Fig04-03.jpg)\n\
  \n\n\n图 4-3. 新脚本的项目视图\n\n**为脚本命名**\n\n对于脚本来说，`New Behaviour` 并不是一个有意义的名称，因此首要任务是给它取一个新名字。一个显而易见的选择是\
  \ `Rotate`，因为该脚本的最终目的是旋转方块。但使用过于通用的名称可能会导致冲突（Unity 会报错）：即使两个同名脚本位于不同文件夹中，也会发生冲突。这是因为每个脚本都会定义一个新类（具体来说是\
  \ `MonoBehaviour` 的子类），而你不能拥有两个同名类。\n\n一种解决方法是使用标准前缀为每个脚本命名（这很像 Objective-C 类以 `NS`\
  \ 开头，回溯到 OS X 的 NextStep 起源）。这是第三方 Unity 用户界面包常用的技巧。如果每个人都把自己的按钮类命名为 `Button`，它们就无法共存！\n\
  \n**注意**   C# 脚本可以选择将类划分到命名空间以避免名称冲突。本书几乎全程使用 JavaScript，但在第 17 章中提供了 C# 脚本和命名空间的示例。\n\
  \n有时，如果脚本专属于某个游戏，我会使用游戏名称作为脚本名称前缀（在 HyperBowl 中，我有许多以 `Hyper` 开头的脚本）。不过，我通常将脚本名称前缀设为\
  \ `Fugu`，对应我的游戏品牌 Fugu Games。本书将沿用这一惯例，因此请将新脚本命名为 `FuguRotate`（图 4-3）。当然，通常你可以自由选择自己的脚本命名规范。\n\
  \n**脚本的结构**\n\n如果在项目视图中选择 `FuguRotate` 脚本，检查器视图会显示其源代码（至少是能够容纳在检查器视图显示范围内的代码）（图\
  \ 4-4）。\n\n![9781430248750_Fig04-04.jpg](img/9781430248750_Fig04-04.jpg)\n\n图 4-4.\
  \ 新脚本的检查器视图\n\n如检查器视图所示，Unity 创建新脚本时会包含三个项目（代码清单 4-1）。\n\n代码清单 4-1.  新脚本的内容\n\n\
  ```\n#pragma strict\n\nfunction Start () {\n}\n\nfunction Update () {\n}\n```\n\n\
  脚本的第一行 `#pragma strict` 指示脚本编译器：所有变量都必须有类型声明，或至少其类型能被编译器轻松推断。这并非 Unity 桌面构建的强制要求，但\
  \ Unity iOS 构建必须满足，因此最好养成这个习惯。\n\n**注意**   本书中所有完整的脚本代码清单都以 `#pragma strict` 开头。任何不包含该行的代码都仅是脚本的摘录部分。\n\
  \n脚本中的两个函数是回调函数，由 Unity 游戏引擎在游戏中的特定时刻调用。`Start` 函数在该脚本首次被启用时调用。组件并非完全 `enabled`，除非其依附的游戏对象也处于活动状态。因此，如果游戏对象在场景中初始处于活动状态且附带了已启用的脚本，则该脚本的\
  \ `Start` 函数会在场景开始播放时被调用。否则，`Start` 函数要等到脚本被启用（通过设置脚本组件的 `enabled` 变量）且游戏对象被激活（通过调用游戏对象的\
  \ `SetActive` 函数）后才会被调用。\n\n与 `Start` 函数（在脚本组件的生命周期中最多只调用一次）不同，`Update` 函数每帧都会调用一次（即在\
  \ Unity 渲染当前场景之前调用一次）。与 `Start` 函数类似，`Update` 仅在脚本（完全）启用时被调用，且 `Update` 的第一次调用发生在\
  \ `Start` 函数被唯一一次调用之后。因此，`Start` 函数非常适合执行 `Update` 函数所需的任何初始化工作。\n\n**附加脚本**\n\n\
  \n\n与项目视图中的其他资源一样，脚本在被添加到场景中之前（具体来说是作为游戏对象的组件）不会产生任何效果。最终，我们希望 `FuguRotate` 脚本能让立方体旋转，因此将其从项目视图拖拽到层级视图中的立方体游戏对象上。检查器视图现在会显示该脚本已作为组件附加到立方体上（图\
  \ 4-5）。\n\n![9781430248750_Fig04-05.jpg](img/9781430248750_Fig04-05.jpg)\n\n图 4-5。附加到立方体上的\
  \ FuguRotate 脚本\n\nUnity 通常提供两种，有时甚至三种方法来执行同一操作。例如，你也可以通过在立方体的检查器视图中点击“添加组件”按钮，然后从弹出的菜单中选择\
  \ `FuguRotate` 脚本，来将该脚本附加到立方体上。或者，你也可以将 `FuguRotate` 脚本拖拽到“添加组件”按钮下方的区域（但如果按钮下方显示的空间不足，这操作起来会比较困难）。\n\
  \n### 编辑脚本\n\n现在该填充脚本内容了。在项目视图中选中 `FuguRotate` 脚本，然后在检查器视图中点击“打开”按钮调出脚本编辑器。在项目视图中双击该脚本，或者从脚本的右键菜单中选择“打开”，也同样有效。Unity\
  \ 默认的脚本编辑器是 MonoDevelop 的一个定制版本，这是一个专为 Mono 定制的代码编辑器和调试器，而 Mono 是支撑 Unity 脚本系统的开源框架（图\
  \ 4-6）。\n\n![9781430248750_Fig04-06.jpg](img/9781430248750_Fig04-06.jpg)\n\n图 4-6。MonoDevelop\
  \ 编辑器\n\n如果你更喜欢使用其他脚本编辑器，可以通过调出 Unity 偏好设置窗口，选择“外部工具”选项卡，然后浏览并选择你偏好的应用程序来更改默认设置（图\
  \ 4-7）。虽然 Unitron 已不再受官方支持，但仍包含在 Unity 安装包中，它是一个可选方案。不过脚本本质上是文本文件，因此任何文本编辑器都可以用作脚本编辑器。例如，作为一名老派程序员，我喜欢使用\
  \ Aquamacs，它是 Emacs 的 OS X 版本。\n\n![9781430248750_Fig04-07.jpg](img/9781430248750_Fig04-07.jpg)\n\
  \n图 4-7。选择不同的脚本编辑器\n\n现有的 `FuguRotate` 脚本不会执行任何可见操作，因为其回调函数都是空的，花括号之间没有代码。让我们从在\
  \ `Start` 和 `Update` 函数中添加一些追踪代码开始，以演示这些回调函数何时被调用（列表 4-2）。\n\n列表 4-2. 包含 Debug.Log\
  \ 调用的 FuguRotate.js\n\n```\nfunction Start () {\n        Debug.Log(\"Start called\
  \ on GameObject \"+gameObject.name);\n}\nfunction Update () {\n        Debug.Log(\"\
  Update called at time \"+Time.time);\n}\n```\n\nUnity 的 MonoDevelop 一个很酷的功能是代码自动补全。例如，图\
  \ 4-8 展示了当你输入 `Time.t` 时，MonoDevelop 会弹出一个属于 `Time` 类的函数和变量列表，并查找以 \"t\" 开头的项。\n\
  \n![9781430248750_Fig04-08.jpg](img/9781430248750_Fig04-08.jpg)\n\n图 4-8。MonoDevelop\
  \ 中的自动补全\n\n### 理解脚本\n\n现在 `FuguRotate` 脚本正在执行一些操作，让我们尝试理解这些操作的含义。`Start` 和 `Update`\
  \ 都调用了 `Debug.Log` 函数来向控制台视图打印消息。`Log` 是定义在 `Debug` 类中的一个静态函数，这意味着你可以通过在函数名前指定其类名来调用它，而不是通过对象来调用（定义在类中的函数也称为*方法*）。\n\
  \n**注意**   静态函数和变量也称为*类*函数和变量，因为它们与类本身相关联，而不是与该类的实例相关联。\n\n变量 `gameObject` 引用了此组件（脚本）所附加到的那个游戏对象（在本例中是立方体），并且每个游戏对象都有一个\
  \ `name` 变量，用于引用该游戏对象的名称（在本例中是“Cube”）。`+` 运算符可用于连接两个字符串（它不再仅仅用于加法），因此 `Start` 函数将打印\
  \ `\"Start called on GameObject\"` 后跟游戏对象的名称。\n\n类似地，`Update` 函数调用了 `Debug.Log`，将\
  \ `\"Update called at time\"` 与静态变量 `Time.time` 的值连接起来。`Time.time` 保存了自游戏开始以来经过的时间（以秒为单位）（在\
  \ Unity 编辑器中运行时，指点击“播放”按钮后的时间）。`Time.time` 的类型是 `float`（一种浮点数，可以表示非整数值），但 `+` 运算符会在拼接前将数字转换为\
  \ `String`。\n\n### 阅读脚本参考\n\n除了自动补全，MonoDevelop 的另一个便捷功能是能够调出任何 Unity 类、函数或变量的脚本参考文档。在脚本中点击\
  \ `Debug.Log` 调用开头的 `Debug`，然后按下 Command+'，将会在浏览器窗口中打开 `Debug` 类的脚本参考文档。点击 `Log`\
  \ 则会打开 `Debug.Log` 函数的具体文档。\n\n**提示**   每当你遇到不熟悉的 Unity 类、函数或变量时，你应该做的第一件事就是阅读关于它的脚本参考文档。\n\
  \n脚本参考文档可以在 Unity 的帮助菜单中找到（图 4-9）。\n\n![9781430248750_Fig04-09.jpg](img/9781430248750_Fig04-09.jpg)\n\
  \n图 4-9。从帮助菜单调出脚本参考\n\n脚本参考文档包含了所有 Unity 类及其函数和变量的文档（图 4-10）。我发现，在脚本参考文档中查找任意 Unity\
  \ 类、函数或变量的最快方法是在搜索框中输入其名称。当 MonoDevelop 不确定你在查找哪个具体定义时，Command+' 实际上会执行那个搜索。例如，在\
  \ `FuguRotate` 脚本中对 `Start` 执行 Command+'，将会出现一个关于 `Start` 的搜索结果列表。\n\n![9781430248750_Fig04-10.jpg](img/9781430248750_Fig04-10.jpg)\n\
  \n图 4-10。脚本参考\n\n然而，点击脚本参考左侧的“运行时类”将会提供完整的类列表，并带有缩进，以便清晰地显示类层次结构（即，哪些类是其他类的子类）（图\
  \ 4-11）。一些类，例如 `Debug` 和 `Time`，是静态类，这意味着它们只包含静态函数和变量（Unity 中没有不位于类中的函数），并且没有理由对它们进行子类化。\n\
  \n![9781430248750_Fig04-11.jpg](img/9781430248750_Fig04-11.jpg)\n\n图 4-11。运行时类的类层次结构\n\
  \n然而，大多数类充当的是对象的类型。场景中的立方体是 `GameObject` 类的一个实例。而 `GameObject` 是 `Object` 的一个子类，这意味着它继承了\
  \ `Object` 所有文档中记载的变量和函数。从概念上讲，用面向对象的术语来说，立方体*是一个* `GameObject`，因此也*是一个* `Object`。将此与\
  \ `GameObject` 和 `Component` 之间的关系进行对比。立方体*是一个* `GameObject`，并且它*有一个* `MeshFilter`（而\
  \ `MeshFilter` *有一个* `Mesh`）。\n\n\n\n从运行时类列表中可以看出，场景中几乎所有的东西都是 `Object` 的子类，包括 `GameObject`\
  \ 和 `Component`。许多 `Component` 子类，包括 `Light` 和 `Camera`，同时也是 `Behaviour` 的子类，`Behaviour`\
  \ 是一种可以被启用或禁用的组件（正如它们在检视面板中的复选框所示）。然而，有些组件并非如此，比如 `Transform`，它是 `Component` 的直接子类（中间没有其他类），并且不能被禁用（检视面板中没有复选框）。\n\
  \n每个脚本实际上都是 `MonoBehaviour` 的子类，而 `MonoBehaviour` 是 `Behaviour` 的子类（因此你可以启用和禁用脚本）。因此，`FuguRotate`\
  \ 脚本定义了一个名为 `FuguRotate` 的 `MonoBehaviour` 子类。这个类声明在 JavaScript 中是隐式的，不过你也可以将其显式声明，如列表\
  \ 4-3 所示。\n\n列表 4-3.  一个带有显式类声明的 FuguRotate.js 版本\n\n```\n#pragma strict\n\nclass\
  \ FuguRotate extends MonoBehaviour {\n\nfunction Start () {\n                var\
  \ object:GameObject = null;\n                Debug.Log(\"Start called on GameObject\
  \ \"+object.name);\n        }\n\nfunction Update () {\n                Debug.Log(\"\
  Update called at time \"+Time.time);\n        }\n\n}\n```\n\n### 运行脚本\n\n规范的编程在很大程度上类似于你在学校学到的科学方法。你应该对事物如何运作有一个大致的理论，假设你的代码应该做什么，然后准备通过运行实验来验证这个假设。换句话说，是时候运行你的代码，看看它是否按你预期的方式运行了。当你点击“播放”时，由\
  \ `Debug.Log` 发出的消息将显示在控制台视图中（图 4-12）。\n\n![9781430248750_Fig04-12.jpg](img/9781430248750_Fig04-12.jpg)\n\
  \n图 4-12. 追踪 Start 和 Update 回调函数\n\n如果代码的行为不符合你的预期，那么就该修正你对它工作原理的假设了。这或许算是一点小小的安慰，但调试代码本身就是一次学习经历！\n\
  \n### 调试脚本\n\n当然，你的代码不可能会在输入后就是完美的。相反，它通常需要经过几轮调试。错误基本上有两种类型：一种是甚至在尝试运行游戏之前就会出现的编译错误，另一种是在游戏运行过程中出现的运行时错误。\n\
  \n#### 编译错误\n\n每次保存脚本时，它都会自动被编译（从源代码转换为实际运行的代码格式）。脚本中妨碍成功编译的错误会以红色显示在 Unity 编辑器的底部以及控制台视图中。\n\
  \n双击编辑器底部的错误消息将调出控制台视图中对应的消息，而双击控制台视图中的消息将打开脚本编辑器，并将光标定位在有问题的代码行上。即使没有这种便利性，错误消息也会列出出错代码的文件名和行号，因此可以手动找到它。\n\
  \n例如，如果你在 `Update` 函数中将 `Time.time` 误输入为 `Time.tim`，那么当你尝试保存脚本时，就会立即出现一条错误消息（图 4-13）。方便的是，Unity\
  \ 通常能很好地建议你可能想要输入的内容（尽管计算机通常不擅长“执行我的意图，而非我所说的”）。\n\n![9781430248750_Fig04-13.jpg](img/9781430248750_Fig04-13.jpg)\n\
  \n图 4-13. 脚本编译错误\n\n#### 运行时错误\n\n与编译错误类似，运行时错误也会显示在控制台视图中。为了演示，请将 `Start` 函数中对\
  \ `gameObject` 的引用替换为对名为 `object` 的局部变量的引用（列表 4-4）。局部变量是在函数声明内部声明的，因此只能在函数的作用域内访问。在此例中，`object`\
  \ 被初始化为 `null`，这意味着它没有引用任何实际的 GameObject，并且从未被赋予任何 GameObject。当你点击“播放”时，当脚本尝试引用该\
  \ GameObject 的名称时，就会产生一个错误（图 4-14）。\n\n列表 4-4.  包含空引用错误的 FuguRotate.js 中的 Start\
  \ 函数\n\n```\nfunction Start () {\n        var object:GameObject = null;\n      \
  \  Debug.Log(\"Start called on GameObject \"+object.name);\n} \n```\n\n![9781430248750_Fig04-14.jpg](img/9781430248750_Fig04-14.jpg)\n\
  \n图 4-14. 脚本运行时错误\n\n#### 使用 MonoDevelop 进行调试\n\n我仍然主要依靠调用 `Debug.Log`（再次使用老派方法）并检查控制台视图中的错误消息来进行调试。但现代程序员更习惯使用更复杂的调试工具。事实证明，MonoDevelop\
  \ 也提供了一个功能完备的调试器，并且已针对 Unity 进行了定制。要启用 MonoDevelop 调试，请从 Assets 菜单中选择 Sync MonoDevelop\
  \ Project 命令（图 4-15）。\n\n![9781430248750_Fig04-15.jpg](img/9781430248750_Fig04-15.jpg)\n\
  \n图 4-15. 同步 MonoDevelop 项目以开始调试\n\nSync MonoDevelop Project 命令会更新与此 Unity 项目对应的\
  \ MonoDevelop 项目文件，然后打开 MonoDevelop 项目解决方案文件。如果 MonoDevelop 没有自动打开该解决方案文件，你可以从 MonoDevelop\
  \ 的“文件”菜单中打开它，或者在 Finder 中双击该解决方案文件（图 4-16 中高亮显示的文件）。\n\n![9781430248750_Fig04-16.jpg](img/9781430248750_Fig04-16.jpg)\n\
  \n图 4-16. MonoDevelop 项目文件\n\n加载 MonoDevelop 解决方案后，通过从 MonoDevelop 的“运行”菜单中选择“附加到进程”来启用调试（图\
  \ 4-17）。\n\n![9781430248750_Fig04-17.jpg](img/9781430248750_Fig04-17.jpg)\n\n图 4-17.\
  \ MonoDevelop 的“附加到进程”命令\n\n然后在弹出的进程列表中选择 Unity Editor（图 4-18）。\n\n![9781430248750_Fig04-18.jpg](img/9781430248750_Fig04-18.jpg)\n\
  \n图 4-18. 将 MonoDevelop 附加到 Unity 编辑器\n\n再次点击“播放”，这次 MonoDevelop 不仅会显示发生错误的代码行，还会显示具体的错误类型（`NullReferenceException`）以及相关的信息，比如堆栈跟踪，这对于确定导致错误的函数调用链非常有用（图\
  \ 4-19）。\n\n![9781430248750_Fig04-19.jpg](img/9781430248750_Fig04-19.jpg)\n\n图 4-19.\
  \ 附加了 Unity 编辑器时的 MonoDevelop 错误详情\n\n在调试模式下，Unity 编辑器无法响应，因此当一次调试运行结束时，请从 MonoDevelop\
  \ 的“运行”菜单中选择“分离”以分离 Unity 编辑器进程（图 4-20）。“分离”命令也可以作为 MonoDevelop 工具栏上的一个按钮使用。\n\n\
  ![9781430248750_Fig04-20.jpg](img/9781430248750_Fig04-20.jpg)\n\n图 4-20. 从 MonoDevelop\
  \ 分离 Unity 编辑器进程\n\n让我们通过将变量 `object` 的初始值从 `null` 更改为脚本的 GameObject 来修复这个空引用问题（列表\
  \ 4-5）。\n\n\n\n"
- "# 清单 4-5 包含空引用修复的 `FuguRotate.js` 中的 Start 函数\n\n```\nfunction Start () {\n   \
  \     var object:GameObject = this.gameObject;\n        Debug.Log(\"Start called\
  \ on GameObject \"+object.name);\n}\n```\n\n对 `this.gameObject` 的引用等价于只写 `gameObject`。变量\
  \ `this` 始终指向当前对象，也就是这个脚本组件（在某些其他编程语言中，`self` 的用法与之相同）。有时候我喜欢像 `gameObject` 这样的变量前显式加上\
  \ `this.` 前缀，以表明我引用的是一个实例变量，也就是在类中定义的、既不属于函数局部变量也不属于静态变量的变量，因此类的每个实例都有自己的副本。\n\n\
  现在脚本在 `Start` 函数中应该不会报错了（你可以在 Unity 编辑器中点击 Play 来确认）。但你仍然可以通过添加断点，让执行在 MonoDevelop\
  \ 中的任意一行停止。在 `Update` 函数的某一行左侧点击，该行旁边就会出现一个断点指示符（图 4-21）。\n\n![9781430248750_Fig04-21.jpg](img/9781430248750_Fig04-21.jpg)\n\
  \n图 4-21 在 MonoDevelop 中添加断点\n\n现在，当你调用“附加到进程”，连接到 Unity 编辑器，并在 Unity 编辑器中点击 Play\
  \ 后，执行会在你的 `Update` 函数处停止，就像那里出现了错误一样（图 4-22）。当 MonoDevelop 在调试模式下暂停执行时，你可以检查堆栈跟踪，并通过其他方式检查运行时环境。例如，图\
  \ 4-22 展示了在监视面板中输入 `gameObject` 然后在 `FuguRotate Update` 回调的断点处暂停的结果。`gameObject`\
  \ 的当前值是 Cube GameObject，现在可以检查其成员变量了。\n\n![9781430248750_Fig04-22.jpg](img/9781430248750_Fig04-22.jpg)\n\
  \n图 4-22 执行在断点处暂停\n\n一旦你检查完断点处的运行时状态，在“运行”菜单中有一个“继续”选项，可以执行到下一个断点或错误。“运行”菜单中还有“逐过程”（继续执行到本函数中的下一行代码）、“逐语句”（继续执行到本行代码所调用的任何函数的第一行代码）或“跳出”（继续执行直到退出此函数）命令，这样你就可以逐行执行脚本了。所有这些命令在“运行”菜单中都显示了键盘快捷键，并且也作为工具栏上的按钮可用。\n\
  \n## 让它旋转\n\n既然你已经熟悉了脚本以及如何附加、编辑和调试它们，现在我们可以让这个脚本实现最终目标——旋转立方体。\n\n#### 旋转变换组件\n\
  \n在运行时移动一个 GameObject 需要更改其变换组件。具体到旋转 GameObject，则需要更改其变换组件中的旋转值。用清单 4-6 中的代码替换\
  \ `FuguRotate` 脚本的内容即可实现。\n\n清单 4-6 在 `Update` 中包含旋转代码的 `FuguRotate.js` 脚本\n\n```\n\
  #pragma strict\nvar speed:float = 10.0; // 控制旋转速度\nfunction Start () {\n       \
  \ var object:GameObject = this.gameObject;\n        Debug.Log(\"Start called on\
  \ GameObject \"+object.name);\n}\n\n// 围绕物体的 Y 轴旋转\nfunction Update () {\n     \
  \   //Debug.Log(\"Update called at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
  }\n```\n\n让我们来逐行分析新代码。首先，任何以 `//` 开头的行都是注释，不会作为代码执行。这是一种在不从文件中删除代码行的情况下将其停用的便捷方式。注释也可以放在\
  \ `/*` 和 `*/` 之间，这对多行注释很有用。\n\n**注意** 有些人认为代码应该写得足够好，能自解释，但一个基本的经验法则是：如果代码的意图不明显，就添加注释。我浪费过很多时间试图回忆当初为何那样写代码。\n\
  \n`speed` 变量控制物体旋转的速度，由于它被声明为一个公共实例变量，因此在检视面板中可作为可调属性使用。\n\n你也可以只输入 `var speed=10.0`\
  \ 而不是 `var speed:float=10.0`，因为编译器可以推断出 `speed` 的类型必须是 `float`，因为它由一个浮点数初始化（这被称为*类型推断*）。但最好尽可能清晰，这不仅是为了\
  \ Unity 编译器，也是为了任何阅读代码的人，包括你自己！\n\n`speed` 变量在 `Update` 函数中使用，该函数调用了 `Transform`\
  \ 类中定义的 `Rotate` 函数。`Rotate` 函数以一个 `Vector3` 作为参数，并将其 `x`、`y`、`z` 值解释为欧拉角（围绕 GameObject\
  \ 的 X、Y、Z 轴旋转的度数）。向量表示方向和大小，但在游戏引擎中，常用向量数据结构来表示欧拉角。\n\n**注意** 电影《神偷奶爸》对向量的定义很不错：“我叫向量。这是一个数学术语，用一个带有方向和大小（magnitude）的箭头表示。向量！那就是我，因为我犯下的罪行既带有方向，又带有大小。噢耶！”\n\
  \n`Vector3.up` 是一个便捷定义的 `Vector3`，其值为 `(0,1,0)`，因此 `Update` 函数是围绕 Y 轴旋转 `speed *\
  \ Time.deltaTime` 度。`Time.deltaTime` 是自上一帧以来经过的时间（以秒为单位），因此实际上，你正在以每秒 `speed` 度的速度旋转。在\
  \ `Update` 回调中，你几乎总是希望将任何连续变化乘以 `Time.deltaTime`，这样你的游戏行为就不会因帧率差异而波动。如果省略了乘以 `Time.deltaTime`\
  \ 这一步，`FuguRotate` 脚本在运行速度慢两倍的机器上，物体旋转的速度也会慢两倍。\n\n如预期的那样，`speed` 变量会出现在检视面板中，并且你可以编辑它（图\
  \ 4-23）。\n\n![9781430248750_Fig04-23.jpg](img/9781430248750_Fig04-23.jpg)\n\n图 4-23\
  \ 带有可调节速度的 `FuguRotate` 脚本的检视面板\n\n如果你点击 Play，现在 Cube 会以适中的速度旋转，并且变换组件中 Y 旋转值的连续变化会显示在检视面板中。你可以在检视面板中编辑\
  \ `FuguRotate` 脚本的 Speed 值来降低或提高旋转速度。\n\n#### 其他旋转方式\n\n`Transform.Rotate` 是一个很好的例子，说明了你应该为你遇到的每个函数阅读脚本参考文档。原来\
  \ `Transform.Rotate` 是一个*重载*函数，意味着它有带有不同参数的多个变体。\n\n**注意** 在描述函数声明时使用术语*参数*，在运行时传递相同值时使用*实参*，但这是一个微妙的区别。通常，参数和实参可以互换使用而不会引起混淆。\n\
  \n`Transform.Rotate` 的文档列出了它可以接受的几种参数组合。除了接受一个 `Vector3` 来指定旋转轴和一个角度（以度为单位）之外，`Transform.Rotate`\
  \ 还可以分别接受 X、Y 和 Z 轴的旋转量。清单 4-7 展示了我们 `Update` 函数的另一种写法，它只传入了 X、Y 和 Z 轴的旋转量。\n\n\
  清单 4-7 接受 X、Y 和 Z 角度旋转的 `Transform.Rotate` 版本\n\n```\nfunction Update () {\n   \
  \     transform.Rotate(0,speed*Time.deltaTime,0);\n}\n```\n\n或者，X、Y 和 Z 轴的旋转量可以打包成一个\
  \ `Vector3`，如清单 4-8 所示。\n\n\n\n清单 4-8.  `Transform.Rotate` 中以 `Vector3` 形式指定旋转角度的版本\n\
  \n```\nfunction Update () {\n        transform.Rotate(Vector3(0,speed*Time.deltaTime,0));\n\
  }\n```\n\n尽管向量有精确的数学定义，但 Unity 遵循 3D 应用程序接口中的常见做法，即复用其向量数据结构来表示任何包含 x、y、z 值的内容。例如，如果你阅读脚本参考页面中关于\
  \ `Transform` 的内容（建议阅读），你会看到它的 `position`、`rotation` 和 `scale` 都是 `Vector3` 值。\n\
  \n#### 在世界空间中旋转\n\n每个 `Transform.Rotate` 变体也都有一个可选参数，其默认值为 `Space.Self`。这指定了旋转是围绕变换（也就是游戏对象）的局部轴进行的，这些局部轴对应着在场景视图中选定游戏对象时看到的轴手柄。如果指定\
  \ `Space.World`，如清单 4-9 所示，则旋转将围绕世界轴（以 0,0,0 为中心的 x、y、z 轴）进行。\n\n清单 4-9. 围绕世界轴旋转\n\
  \n```\nfunction Update () {\n        transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);\n\
  }\n```\n\n#### 补间旋转\n\n随时间稳定地改变游戏对象的变换很简单，但对于更复杂的运动，例如在特定时间段内将游戏对象从一个位置平滑地移动到另一个位置，其编码可能会更复杂、工作量更大。这正是\
  \ Flash 程序员使用 ActionScript `Tween` 类来处理的情况。虽然 Unity 没有内置的 `Tween` 类，但有 Flash 背景的\
  \ Unity 用户会高兴地了解到，有多个第三方解决方案可用。\n\n我在 HyperBowl 游戏中使用的补间包叫做 `iTween`。该游戏中有大约 200\
  \ 个 `iTween` 动画。一个使用示例：在投出一次全中后，3D 的 “STRIKE” 文字通过 `iTween` 脚本控制，使得字母逐个滑入屏幕，轻微上下浮动，然后在旋转中飞离屏幕。\n\
  \n方便的是，`iTween` 可以在资源商店中找到。在第 3 章中，我们在资源商店窗口中搜索过资源包，但这次，我们使用项目视图中的搜索功能。在搜索框中输入 `\"\
  itween\"`，然后点击面包屑导航中的“资源商店”链接。`iTween` 会出现在免费资源结果中（图 4-24）。\n\n![9781430248750_Fig04-24.jpg](img/9781430248750_Fig04-24.jpg)\n\
  \n图 4-24. 在资源商店中搜索 iTween\n\n**提示** 图 4-24 显示了项目视图中的视图菜单，允许在“单列布局”和“双列布局”之间切换。“双列布局”是\
  \ Unity 4 的新功能，但“单列布局”仍然很好用，特别是在项目视图中执行搜索而不是使用左侧面板进行导航时。\n\n在项目视图中选择 `iTween`，该资源包的描述将显示在检视视图中（图\
  \ 4-25），同时还提供导入该资源包或在资源商店窗口中预览完整描述的选项。继续操作，点击“导入资源包”按钮。\n\n![9781430248750_Fig04-25.jpg](img/9781430248750_Fig04-25.jpg)\n\
  \n图 4-25. 资源商店中 iTween 的检视视图\n\n安装完成后，项目视图中显示的 `iTween` 包含示例文件和文档文件，但整个 `iTween`\
  \ 代码库是一个位于 `iTween` ![image](img/arrow.jpg) `Plugins` 文件夹中的单个脚本（图 4-26）。\n\n![9781430248750_Fig04-26.jpg](img/9781430248750_Fig04-26.jpg)\n\
  \n图 4-26. iTween 的项目视图\n\n如图 4-26 所示，`iTween` 是一个 C# 脚本，其文件扩展名为 `.cs`。JavaScript\
  \ 可以调用 C# 脚本中的函数和引用其中的变量，但前提是这些 C# 脚本位于几个指定的特殊文件夹中，这些文件夹会被优先加载。其中之一是 `Assets` ![image](img/arrow.jpg)\
  \ `Plugins` 文件夹，因此你可以直接将 `iTween` ![image](img/arrow.jpg) `Plugins` 文件夹向上拖一级，放到\
  \ `Assets` 目录下。\n\n为了体验一下 `iTween`，将清单 4-10 中的第三行代码添加到 `FuguRotate` 脚本的 `Start`\
  \ 函数中。这一行代码启动了一个旋转补间，按照从左到右的参数顺序，在 2 秒内围绕局部 y 轴旋转 1 个 360 度的倍数，在达到目标旋转角度时缓动进入，当旋转反向反弹回来时缓动退出。\n\
  \n另外，使用 `/*` 和 `*/` 注释掉 `Update` 函数，这样就不会有两段旋转代码相互争夺控制权。\n\n清单 4-10.  在 Start 函数中调用\
  \ iTween 的 FuguRotate.js\n\n```\n#pragma strict\nvar speed:float = 10.0; // 控制旋转速度\n\
  \nfunction Start () {\n        var object:GameObject = this.gameObject;\n      \
  \  Debug.Log(\"Start called on GameObject \"+object.name);\n        iTween.RotateBy(gameObject,\
  \ iTween.Hash(\"y\", 1, \"time\", 2, \"easeType\", \"easeInOutBack\", \"loopType\"\
  , \"pingPong\"));\n}\n\n// 围绕对象的 y 轴旋转\n/*\nfunction Update () {\n        //Debug.Log(\"\
  Update called at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
  }\n*/\n```\n\n#### 立方体的子对象\n\n一个场景中只有一个立方体并不有趣，所以让我们通过添加更多立方体来让它稍微有趣一些。你可以像创建第一个立方体那样重复创建新立方体。或者，你也可以通过复制现有立方体来节省时间（选中该立方体，然后在“编辑”菜单上调用“复制”命令，或使用\
  \ `Command+D` 键盘快捷键）。但让我们借此机会了解一下预制件。\n\n#### 制作预制件\n\n**预制件**是一种特殊类型的资源，用于克隆游戏对象。随后可以使用该预制件创建该游戏对象的相同副本。从这个意义上说，Unity\
  \ 的预制件就像预制房屋，但更好。如果你对预制件的一个实例进行更改，可以使该更改自动传播到该预制件的所有其他实例。\n\n首先，为了保持资源组织的整洁，在项目视图中创建一个名为\
  \ `Prefabs` 的新文件夹。然后，在选中 `Prefabs` 文件夹的情况下，点击项目视图“创建”菜单中的“预制件”，在该文件夹中创建一个空的预制件。然后，你可以通过将层级视图中的立方体拖到这个空预制件上来填充它。\n\
  \n或者，你也可以不用先创建空预制件，而是直接将立方体拖入 `Prefabs` 文件夹，系统会自动创建一个预制件，并以原始游戏对象的名字命名（图 4-27）。\n\
  \n![9781430248750_Fig04-27.jpg](img/9781430248750_Fig04-27.jpg)\n\n图 4-27. 立方体预制件的项目视图\n\
  \n现在，每当你想要创建一个与原始立方体游戏对象外观完全相同的新立方体时，都可以将该预制件拖入层级视图。但是，与其在场景中放置多个独立的立方体，不如让我们添加一些立方体作为现有立方体的子对象。将预制件直接拖到层级视图中的立方体上两次，现在你会在立方体下方看到两个新的立方体。在检视视图（图\
  \ 4-28）中，你可以看到新立方体与原始立方体完全相同，具有相同的组件和组件属性。让我们将新的立方体命名为 `child1` 和 `child2`（顺便说一下，现在是尝试检视视图“锁定”功能的好时机，这样你可以同时检查两个游戏对象）。\n\
  \n\n\n![9781430248750_Fig04-28.jpg](img/9781430248750_Fig04-28.jpg)\n\n图 4-28. 编辑子立方体\n\
  \n作为 Cube 的子对象，在 Inspector 视图中显示的 `child1` 和 `child2` 的位置是相对于其父对象 Cube 的。这意味着，如果某个子立方体的位置为\
  \ `(0,0,0)`，则它与其父对象的位置完全相同。因此，让我们将 `child1` 和 `child2` 的位置分别设置为 `(2,0,0)` 和 `(-2,0,0)`。现在，这两个子立方体像卫星立方体一样与父对象\
  \ Cube 保持间距（图 4-29）。\n\n![9781430248750_Fig04-29.jpg](img/9781430248750_Fig04-29.jpg)\n\
  \n图 4-29. Cube 及其子立方体的场景视图\n\n在点击 Play 之前，将 `FuguRotate` 脚本修改为简单的 `transform.Rotate`\
  \ 调用（代码清单 4-11）。现在当你点击 Play 时，主 Cube 会像以前一样旋转，子立方体则像车轮的辐条一样跟随旋转。子立方体也会绕自己的轴旋转，因为它们各自运行着自己的\
  \ `FuguRotate` 脚本副本（如果你在 `Transform.Rotate` 调用中使用了 `Space.World`，所有三个立方体都将围绕同一个世界原点旋转）。\n\
  \n代码清单 4-11.  FuguRotate.js 恢复为在 Update 中进行旋转\n\n```\n#pragma strict\nvar speed:float\
  \ = 10.0; // controls how fast we rotate\n\nfunction Start () {\n        var object:GameObject\
  \ = this.gameObject;\n        Debug.Log(\"Start called on GameObject \"+object.name);\n\
  \        //iTween.RotateBy(gameObject, iTween.Hash(\"y\", 1, \"time\", 2, \"easeType\"\
  , \"easeInOutBack\", \"loopType\", \"pingPong\"));\n}\n\n// rotate around the object's\
  \ y axis\nfunction Update () {\n        //Debug.Log(\"Update called at time \"+Time.time);\n\
  \        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n}\n```\n\n将 `child2`\
  \ 的 `FuguRotate` 脚本中的 Speed 属性从 10 改为 50，点击 Play，你将看到该立方体比其他立方体旋转得更快。你也可以对 `child1`\
  \ 进行同样的修改，但想象一下，如果你要修改 50 个立方体，那将非常繁琐！这正是预制件的强大之处。选中 `child2`，然后在 GameObject 菜单中调用“将更改应用到预制件”命令（图\
  \ 4-30）。\n\n![9781430248750_Fig04-30.jpg](img/9781430248750_Fig04-30.jpg)\n\n图 4-30.\
  \ 将更改应用到预制件\n\n现在，`child1` 再次与 `child2` 完全相同（除了名称和位置——Unity 合理地假设你不希望预制件的每个实例在这些方面都相同）。当你点击\
  \ Play 时，子立方体现在都以更快的相同速度旋转。\n\n#### 断开预制件\n\n但主 Cube 由于旋转速度的更新也旋转得更快了。如果这不是你想要的结果，你可以将\
  \ Cube 的 Speed 改回 10，然后为了确保子立方体的更改不会传播到主 Cube，你可以选中主 Cube 并在 GameObject 菜单中选择“断开预制件实例”命令（图\
  \ 4-31）。\n\n![9781430248750_Fig04-31.jpg](img/9781430248750_Fig04-31.jpg)\n\n图 4-31.\
  \ 断开预制件实例\n\n现在，Cube 与预制件不再有任何关联，对子立方体的任何更改都不会传播到 Cube。\n\n### 进一步探索\n\n通过添加简单的脚本化运动，场景已从漂亮且静态演变为漂亮且动态。我们将在下一章通过动画和声音进一步提升场景效果，但你现阶段达到的主要里程碑确实是学习如何创建、编辑和调试脚本。从现在到本书结束，你将不断添加脚本，所以请习惯这一点！\n\
  \n#### Unity 手册\n\nUnity 手册的“构建场景”部分有两页与本章工作相关——一页是关于“预制件”的描述，另一页是对“组件-脚本关系”的解释。\n\
  \n本章介绍的一种新资源类型（除了预制件）就是脚本。“资源导入与创建”部分中关于“使用脚本”的页面介绍了我们旋转脚本所涵盖的基本概念：创建脚本、将其附加到 GameObject、输出到\
  \ Console 视图（使用 `print` 函数而非你用的 `Debug.Log`）、声明变量，甚至在 `Update` 函数中应用旋转。\n\n值得再次提及“变换”页面，因为我们的旋转脚本就是用来修改变换的。该页面还描述了父–子\
  \ GameObject 关系——这在技术上是变换之间的关系，但由于 GameObject 和变换之间存在一一对应关系，因此将这种关联理解为 Hierarchy\
  \ 视图中显示的 GameObject 之间的链接会更容易理解。\n\n本章我们涉足了一个高级主题——“调试”。这部分介绍了 Console 视图、MonoDevelop\
  \ 调试器，以及在文件系统中查找日志文件的位置。\n\n#### 脚本参考手册\n\n到目前为止，我已经提到了 Unity 官方文档的三个主要部分中的两个——Unity\
  \ 手册和参考手册。第三部分是脚本参考手册。本章是我们首次涉足脚本编写，因此脚本参考手册中“脚本概述”部分的所有内容都值得一读。“运行时类”列表阐明了 Unity\
  \ 类之间的继承关系。之后，我建议你随时使用该页面上的搜索框，只要你在脚本中看到任何不认识的内容（即使认识，如果你还没读过相关文档也可以搜一下）。\n\n####\
  \ 资源商店\n\n我们从资源商店下载了 iTween，但 iTween 用户还应访问 Bob Berkebile 的官方 iTween 网站，那里有全面的文档和演示项目，网址是\
  \ `http://itween.pixelplacement.com/`。\n\n尽管 iTween 很流行，并且是 Unity 最早的补间动画包之一，但目前已有多种补间动画实现可供使用（只需在资源商店中搜索“tween”），包括\
  \ Holoville 的 HOTween（文档同样可在 `http://holoville.com/hotween/` 找到），以及 Prime31 Studio\
  \ 的 GOKit（源代码托管在 GitHub 上，`http://github.com/prime31/GoKit`）。\n\n#### 脚本编写\n\n虽然我们在本书中只使用\
  \ JavaScript，但 Unity 领域既有大量 JavaScript 也有大量 C#，因此你应该对两者都熟悉起来。Andrew Stellman 和 Jennifer\
  \ Greene 合著的《Head First C#》是一本非常出色的可视化 C# 入门教程，循序渐进。\n\n由于 C# 是微软为其 .NET 框架创建的一部分，因此可以在微软开发者网络（MSDN）上通过搜索\
  \ C# 找到官方 C# 文档和其他资源，网址为 `http://msdn.microsoft.com/`。\n\n在浏览 MSDN 时，也请搜索 .NET 文档，因为\
  \ Unity 的脚本引擎是使用 Mono 实现的，而 Mono 是 .NET 的一个开源版本。官方 Mono 网站是 `http://mono-project.org/`\n\
  \n你可能不需要担心另一种 Unity 脚本语言 Boo（我至今还没在实际项目中见过 Boo 脚本），但如果你好奇，官方 Boo 网站是 `http://boo.codehaus.org/`。\n\
  \n把两个程序员放在一个房间里，如果他们有什么可争论的，那一定是编码规范。我的经验法则是遵循我所编码的官方语言和框架的约定。这是一个有着有趣名称的枯燥话题。\n\
  \n例如，Unity 在其命名规则中混合使用了驼峰命名法和帕斯卡命名法（或者按照它们自身的命名规则，称为 `camelCase` 和 `PascalCase`）。你可以在\
  \ Wikipedia 上搜索“camel case”了解更多。\n\n\n\n"
- '# 括号放置及其他


  括号的位置也是一个常见的争论点。我在这里使用的惯例（也是 Unity 所使用的，至少在创建新脚本模板时）被称为埃及风格，根据 Jeff Atwood（StackExchange
  的名人）在他广受欢迎的博客 Coding Horror（`http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html`）上的说法。这篇文章还将对类名应用标准前缀的做法称为“Smurf
  命名”。


  '
