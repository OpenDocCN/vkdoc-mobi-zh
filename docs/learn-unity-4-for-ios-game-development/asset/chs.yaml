  ### 上传图标与截图


  最后，你需要在此上传之前准备好的图标和截图（图 11-21）。图标尺寸必须为 1024 × 1024 像素，并且应与你构建在应用内的图标一致，否则应用可能会被苹果拒绝。




  ![9781430248750_Fig11-21.jpg](img/9781430248750_Fig11-21.jpg)


