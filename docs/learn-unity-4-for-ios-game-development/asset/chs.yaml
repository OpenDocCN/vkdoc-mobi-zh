  ### 重置摄像机\n\n主摄像机上的`MouseOrbit`脚本不适合保龄球游戏，所以你可以禁用该脚本。更好的做法是，直接从主摄像机上移除该脚本：在层级视图中选中主摄像机，然后在检视视图中，右键点击`MouseOrbit`组件并选择“移除组件”（图\
  \ 6-11）。\n\n![9781430248750_Fig06-11.jpg](img/9781430248750_Fig06-11.jpg)\n\n**图\
  \ 6-11.** 从主摄像机上移除`MouseOrbit`脚本\n\n趁此机会，将主摄像机的位置设为(0,1,-5)，旋转设为(0,0,0)。现在你应该能看到一个漂亮的地板和天空，没有太多其他东西了（图\
  \ 6-12）。\n\n![9781430248750_Fig06-12.jpg](img/9781430248750_Fig06-12.jpg)\n\n**图\
  \ 6-12.** 固定主摄像机后的游戏视图\n\n### 制作一个球\n\n现在场景中有了天空盒、灯光、光晕和地板，以及一个固定视角的主摄像机。是时候添加保龄球了。\n\
  \n#### 创建一个球体\n\n到目前为止，本书使用了两种基本游戏对象：平面和立方体。对于球体，还有一个完美的基本体：球体（Sphere）。与平面和立方体一样，可以从菜单栏“GameObject”菜单的“Create”子菜单中选择球体，但也可以通过层级视图左上角的“Create”按钮来实例化球体（图\
  \ 6-13）。\n\n![9781430248750_Fig06-13.jpg](img/9781430248750_Fig06-13.jpg)\n\n**图\
  \ 6-13.** 创建球体\n\n从“Create”菜单中选择“Sphere”后，层级视图中会出现一个名为“Sphere”的新游戏对象。在层级视图中选中球体游戏对象，以便在检视视图中查看它（图\
  \ 6-14）。\n\n![9781430248750_Fig06-14.jpg](img/9781430248750_Fig06-14.jpg)\n\n**图\
  \ 6-14.** 球的检视视图\n\n与立方体和平面基本体一样，球体游戏对象包含一个`MeshFilter`组件、一个`MeshRenderer`组件，以及一个与基本体形状相同的碰撞器组件（这里是一个`SphereCollider`）。首先，本着精心命名游戏对象的精神，将“Sphere”的名称改为“Ball”（球），以明确这个游戏对象是保龄球。然后将球的位置设为(0,1,0)，这会将球的中心置于地板上方\
  \ 1 米处。由于球的半径是 0.5 米（图 6-14 中显示的`SphereCollider Radius`是一个很好的提示），这会让球和地板之间留出一些间隙。当你点击播放时，球会悬浮在地板上方（图\
  \ 6-15）。\n\n![9781430248750_Fig06-15.jpg](img/9781430248750_Fig06-15.jpg)\n\n**图\
  \ 6-15.** 悬浮在空中的球\n\n当然，这是符合预期的。就像之前创建的所有其他东西——地板、立方体，甚至舞蹈角色——球会移动到或被放置在指定的位置。\n\
  \n#### 让它落下\n\n为了让球因重力而下落并响应其他力，必须赋予球物理属性。通过添加一个`Rigidbody`组件，可以使游戏对象具有物理特性。\n\n\
  **注意**   大多数游戏物理被称为*刚体模拟*，这大致如其字面意思——模拟形状不变的坚硬物体如何对作用力和碰撞做出反应。保龄球非常适合刚体模拟。而一团木薯布丁则不然。\n\
  \n\n\n要添加刚体（`Rigidbody`）组件到球体（`Ball`）上，请在层级视图中选择球体，然后在菜单栏的**组件**菜单中，选择**物理**子菜单，再选择`Rigidbody`（图\
  \ 6-16）。你也可以点击检视面板底部的**添加组件**按钮来添加`Rigidbody`组件。\n\n![9781430248750_Fig06-16.jpg](img/9781430248750_Fig06-16.jpg)\n\
  \n图 6-16. 为球体添加`Rigidbody`组件\n\n现在，检视面板会显示一个附加到球体上的`Rigidbody`组件（图 6-17）。\n\n![9781430248750_Fig06-17.jpg](img/9781430248750_Fig06-17.jpg)\n\
  \n图 6-17. 带有`Rigidbody`组件的球体的检视面板\n\n大多数`Rigidbody`属性可以使用其默认值，但对于一个保龄球来说，1 千克的质量稍微轻了点。让我们将其设置为\
  \ 5，因为 5 千克大致接近保龄球的重量范围。\n\n**阻力**（空气阻力）和**角阻力**（旋转时受到的阻力）的最小值可以接受。没有理由增加阻力，除非你是在水下打保龄球。\n\
  \n使用**使用重力**属性指定球体会响应重力。如果该复选框未选中，那么球体的行为将如同在零重力环境中一样（太空保龄球！）。\n\n**运动学**属性用于移动和碰撞但不响应力的游戏对象（例如，电梯平台）。任何带有碰撞器组件并会移动的游戏对象也应该附加`Rigidbody`组件。如果移动并非来自物理引擎，而是来自脚本或动画，那么它应该是一个运动学刚体。\n\
  \n**注意**   不应通过直接更改其变换组件来移动运动学刚体，这会导致糟糕的性能。相反，应通过在游戏对象的`Rigidbody`组件上调用`Rigidbody.MovePosition`和`Rigidbody.MoveRotation`函数来移动它。\n\
  \n**插值**属性允许平滑游戏对象的运动（这会消耗计算资源）。\n\n同样，**碰撞检测**属性可提供改进的碰撞检测，特别是对于快速移动的游戏对象（同样会消耗计算资源）。\n\
  \n**约束**属性可以限制游戏对象在响应力时的移动方式。例如，可以将游戏对象限制为仅沿一个平面或仅沿一个方向移动。\n\n适当设置`Rigidbody`组件属性后，再次点击**播放**。现在球体会下落，更棒的是，它会落在地板上！（图\
  \ 6-18）。\n\n![9781430248750_Fig06-18.jpg](img/9781430248750_Fig06-18.jpg)\n\n图 6-18.\
  \ 球体落在地板上的游戏视图\n\n顺便说一下，默认的重力是标准地球重力，大约为 9.8 米/秒²。这可以在`PhysicsManager`中进行自定义（图 6-19），通过**编辑**菜单下的**项目设置**子菜单即可找到。\n\
  \n![9781430248750_Fig06-19.jpg](img/9781430248750_Fig06-19.jpg)\n\n图 6-19. `PhysicsManager`\n\
  \n`PhysicsManager`的**重力**属性是一个向量（具体来说，如果你从脚本中访问`PhysicsManager`，它是一个`Vector3`），其唯一的非零值在\
  \ y 方向上（且为负值，因此力是向下的）。因此，你不仅可以改变重力，例如设置为月球重力，甚至可以改变其方向！如果将 y 值从-9.81 改为 9.81，球体将向上掉落；如果将重力向量从(0,-9.81,0)改为(1,0,0)，球体将以\
  \ 1 米/秒²的速度侧向掉落。如果你想要失重状态，设置重力为(0,0,0)即可。\n\n### 自定义碰撞\n\n碰撞器组件为游戏对象提供碰撞形状。如果你在检视面板中检查球体和地板，你会发现每个对象都自动附加了一个形状与其网格匹配的碰撞器组件。地板带有一个`MeshCollider`组件，它始终与游戏对象的网格匹配；而球体带有一个`SphereCollider`组件，它始终是球形的。当你选择球体或地板时，场景视图不仅会高亮显示游戏对象的网格，还会高亮显示其碰撞器组件的形状。你可以使用场景视图中的**Gizmos**菜单来切换碰撞器\
  \ gizmo 的显示。\n\n在基本游戏对象和基本碰撞器之间几乎存在一对一的关系（这里“基本”指的是内置在 Unity 中，并且形状简单，这对性能有好处）。不过也有例外。例如，你可以从游戏对象菜单创建一个基本的圆柱体游戏对象，但没有可用的圆柱体形状的碰撞器。相反，如果你创建一个圆柱体，它会自动使用`CapsuleCollider`组件。\n\
  \n`MeshCollider`是一个特殊情况。自动跟随关联网格的形状听起来不错，但这仅适用于静态（即非移动）游戏对象。任何正在移动或可能移动的对象都应使用基本碰撞器或基本碰撞器的集合（更多内容见下一章）。`MeshCollider`如果要与其他网格碰撞器碰撞，还必须启用其**凸起**属性（复选框）。\n\
  \n#### 物理材质\n\n碰撞器组件决定了两个游戏对象在何时发生碰撞，但检测到碰撞后实际会发生什么？一个游戏对象会从另一个上弹开吗？如果是，弹开多少？球体会在地板上滑动、滚动还是粘住？这就是碰撞器组件的**材质**属性发挥作用的地方。这个属性名有点误导，因为碰撞器组件的材质与网格渲染器组件用来确定网格表面外观的材质不同。相反，碰撞器组件使用物理材质来确定碰撞表面的碰撞属性。拼写有点奇怪，但你可以将物理材质理解为*物理材料*或*物理材质*。\n\
  \n**注意**   与程序化材质不同，`PhysicMaterial`类不是`Material`的子类。\n\n碰撞器组件的**材质**属性默认为`PhysicsManager`中的**默认材质**属性（图\
  \ 6-19），该属性为无。要自定义其碰撞行为，碰撞器组件必须分配一个物理材质。\n\n#### 标准物理材质\n\n你可以从头开始在项目视图的**创建**菜单中创建新的物理材质，但\
  \ Unity 在其标准资源中方便地提供了各种物理材质的包。从菜单栏的**资源**菜单中选择**导入包**，然后选择**物理材质**（图 6-20）。\n\n\
  ![9781430248750_Fig06-20.jpg](img/9781430248750_Fig06-20.jpg)\n\n图 6-20. 从标准资产中导入物理材质\n\
  \n在项目视图中，新的物理材质将出现在一个名为**物理材质**的标准资产子文件夹中（图 6-21）。\n\n![9781430248750_Fig06-21.jpg](img/9781430248750_Fig06-21.jpg)\n\
  \n图 6-21. 来自标准资产的物理材质的项目视图\n\n#### 物理材质的剖析\n\n选择各种物理材质并在检视面板中比较它们的值。例如，查看**弹球**和**冰**物理材质之间的差异（图\
  \ 6-22）。\n\n![9781430248750_Fig06-22.jpg](img/9781430248750_Fig06-22.jpg)\n\n图 6-22.\
  \ 弹球和冰物理材质的比较\n\n\n\n请注意，`Ice`的摩擦力值特别低。`动态摩擦力`是一个物体在另一个物体上滑动时产生的摩擦力。`静摩擦力`则是物体静止在另一个物体上所受到的摩擦力。摩擦力的范围是\
  \ 0-1，其中 0 表示无摩擦，1 表示完全无法滑动。`Ice`的`弹性`值也为 0，这很合理，因为冰本身不会弹跳。而`弹性物理材质`则具有最大的`弹性`值，即\
  \ 1。\n\n当两个带有不同`物理材质`的`游戏对象`发生碰撞时会发生什么？它们的`摩擦力`和`弹性`值会分别根据`摩擦力组合`和`弹力组合`的值进行合并。`Bouncy`的`摩擦力组合`值表明：当它与另一个`物理材质`碰撞或滑动时，所使用的摩擦力是两个摩擦材质数值的平均值。而`Bouncy`的`弹力组合`值则指定：将会使用这两个`物理材质`中最大的弹力值（由于`Bouncy`本身已有最大弹力值\
  \ 1，因此结果始终会是这个值）。\n\n你可能会想，如果两个`物理材质`的组合值不同（例如`Bouncy`和`Ice`），会使用哪一个呢？嗯，截至撰写本文时，这其实并没有官方的正式文档说明，但优先级顺序从低到高似乎是：`平均`、`相乘`、`最小值`和`最大值`。因此，如果`Bouncy`和`Ice`发生碰撞，结果将是`最小值`摩擦力，即`Ice`的`0.1`摩擦力，以及`最大值`弹力，即`Bouncy`的`1`弹力。这正是我们所预期的结果！\n\
  \n在`物理材质`的`检视面板`中显示的最后三个属性支持各向异性摩擦力，这意味着在不同方向上具有不同的摩擦力值。如果`摩擦力方向`属性被填充了一个非零向量，那么次级的静态和动态摩擦力将在该方向上生效。对于木质纹理的`地板`，你可以指定一个沿着木材纹理方向的次级摩擦力方向，并沿着该方向设置较低的静态和动态摩擦力值。\n\
  \n## 应用`物理材质`\n\n你可以将任意标准`物理材质`拖放到`地板`和`球体`的`碰撞器`的`材质`字段中，或者点击`碰撞器`的`材质`字段右侧的小圆圈，从弹出窗口中选择（见图\
  \ 6-23）。你也可以将`物理材质`从`项目视图`拖放到`检视面板`中的`游戏对象`上，这样`物理材质`就会出现在正确的位置，即`碰撞器`组件的`材质`字段中。\n\
  \n![9781430248750_Fig06-23.jpg](img/9781430248750_Fig06-23.jpg)\n\n图 6-23. 为`球体`添加`弹性物理材质`\n\
  \n现在，请尝试在`地板`和`球体`上使用不同的`物理材质`。为`球体`选择`弹性物理材质`，为`地板`选择`金属`材质。然后点击`播放`，观看`球体`弹跳、弹跳再弹跳；接着将`球体`的材质切换为`Ice`，观看`球体`砰的一声落地。\n\
  \n除了在`碰撞器`组件中来回切换不同的`物理材质`，你也可以直接调整`物理材质`本身。例如，你可以在`项目视图`中选中`弹性物理材质`，然后在`检视面板`中编辑其属性。但由于这些`物理材质`属于`标准资源`包，如果你重新导入该包（无论是意外还是因升级而有意为之），它们可能会被替换。此外，如果一个`物理材质`被多个`游戏对象`使用，更改其属性将会影响到所有这些`游戏对象`。\n\
  \n这里一个干净且安全的解决方案是，为每一个需要`物理材质`的`游戏对象`创建一个新的。从概念上讲，当某个对象需要一个独特的`材质`时，你同样会期望它有一个独特的`物理材质`。或者换句话说，一个独特的表面应该拥有它自己的`材质`和`物理材质`。例如，`球体`和`地板`应各自拥有自己的`物理材质`，而所有的保龄球瓶（将在下一章中创建）则应共享同一个`物理材质`。\n\
  \n## 创建新的`物理材质`\n\n在创建新的`物理材质`之前，出于组织目的，你应该创建一个文件夹来存放它们。在`项目视图`的左侧面板中选择顶层`Assets`文件夹，然后使用`项目视图`中的`创建`菜单，创建一个新文件夹并将其命名为“Physics”（这个名字比“PhysicMaterials”更短，拼写也更不奇怪）。\n\
  \n你可以使用`项目视图`中的`创建`菜单创建一个全新的`物理材质`，然后在`检视面板`中填充新`物理材质`的所有属性。但是，你可以通过从`标准资源`中复制一个`物理材质`来节省一些工作量，最好复制一个与你想要的效果接近的材质。鉴于`地板`采用的是木质`材质`，从`标准资源`中的`木材物理材质`入手会比较方便。在`项目视图`中选中`木材物理材质`，然后从`编辑`菜单中调用`复制`命令（或使用键盘快捷键`Command+D`）来复制一份。\n\
  \n将复制的`木材物理材质`拖放到`项目视图`中新创建的`Physics`文件夹中，并将其重命名为“Floor”，因为你将把它应用于你的`地板`游戏对象。然后，再复制一份`Floor\
  \ 物理材质`，并将其命名为`Ball`（图 6-24），因为你将把它应用于你的`球体`游戏对象。\n\n![9781430248750_Fig06-24.jpg](img/9781430248750_Fig06-24.jpg)\n\
  \n图 6-24. 自定义`物理材质`\n\n现在，`地板`和`球体`各有了一份`物理材质`。要将这些`物理材质`用于它们对应的`游戏对象`，请将`Floor\
  \ 物理材质`拖放到`层级视图`中的`地板`游戏对象上，并将`Ball 物理材质`拖放到`球体`游戏对象上（你可能需要检查`检视面板`中两个`游戏对象`，以确认`物理材质`已出现在`碰撞器`的`材质`字段中）。现在，你可以开始调整`物理材质`的属性了。\n\
  \n正如预期的那样，`木材物理材质`的值已经适合木地板，所以你可以保持原样。但你想调整`球体物理材质`，因此选中`Ball 物理材质`，并按照图 6-25 所示设置其值。\n\
  \n![9781430248750_Fig06-25.jpg](img/9781430248750_Fig06-25.jpg)\n\n图 6-25. `球体物理材质`的调整后数值\n\
  \n`球体`不应该在`地板`上弹跳（或者在你后续添加保龄球瓶时，也不应弹离它们），所以将`弹性`值设置为 0，并将`弹力组合`设置为`最小值`，这将确保`球体`无论与什么碰撞都完全不会弹跳。然后，将`动态摩擦力`和`静摩擦力`值设置为\
  \ 1，并将`摩擦力组合`设置为`最大值`，这样`球体`在静止或滚动时始终具有最大摩擦力。最大的摩擦力值确保了`球体`滚动而非滑动。\n\n现在，当你点击`播放`时，`球体`应该会直接落在`地板`上，然后停止，不再弹跳。\n\
  \n### 让它滚动起来\n\n为了让球滚动起来，你需要为游戏添加一些控制（实际上，这样它才能成为一款游戏）。原版街机游戏`HyperBowl`是由一个真实保龄球控制的，该球充当一个大轨迹球。旋转这个球会使得游戏中的球产生旋转（这导致在尝试在旧金山的山坡上打保龄球时，玩家的身体会产生滑稽的动作）。\n\
  \n\n\n当然，建立一个空气支撑的保龄球外设超出了本书的范围，但 PC 版的`HyperBowl`提供了基于鼠标的控制方式：推动鼠标会向该方向给球施加一个旋转力。只需一个脚本就能相当直接地实现这种控制。\n\
  \n创建脚本\n\n在项目视图中选择`Scripts`文件夹，使用项目视图左上角的创建按钮新建一个 JavaScript 脚本，并将其命名为`FuguForce`，因为您将用它向球施加一个力（我很想为了寿司的寓意把它命名为`FuguRoll`，但我不希望名字暗示我们正在施加一个力矩，即旋转力而非线性力）。然后将`FuguForce`脚本拖拽到层级视图中的球（`Ball`）上，这样一旦您向脚本中添加一些代码，就可以准备测试了。\n\
  \n更新：收集输入\n\n试图通过计算旋转和平移（位置变化）来模拟球的滚动会非常复杂，这涉及到与地板和球瓶的碰撞检测及响应，还要考虑重力、摩擦力和反弹……所有物理引擎已经完成的计算。不让\
  \ Unity 物理系统来处理这方面的工作将是一种浪费。\n\n因为球已经有一个刚体组件（`Rigidbody Component`），它已经是一个受重力等力影响、并会响应碰撞（包括与地板的碰撞）的物理对象。所以，滚动球所需要的就是一个推力。推力的大小取决于输入，在我们的设计中，输入就是鼠标的移动。\n\
  \n**注意**  原始的、非 Unity 版本的`HyperBowl`向保龄球施加了一个力矩（旋转力），使其旋转。Unity 确实有一个用于向刚体施加力矩的脚本函数`Rigidbody.AddTorque`，但我发现，在\
  \ Unity 中通过使用`Rigidbody.AddForce`施加线性力来滚动球效果更好。\n\n鼠标移动以及一般的输入，可以在每一帧进行检查，因此输入收集代码和相应推力的计算应该放在脚本的`Update`回调函数中，如列表\
  \ 6-1 所示。将该列表中的代码复制到`FuguForce`脚本中。\n\n列表 6-1.`FuguForce.js`中的`Update`回调函数\n\n```\n\
  #pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float = 1.0;\n\nprivate\
  \ var forcex:float=0.0;\nprivate var forcey:float=0.0;\n\nfunction Update() {\n\
  \        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n     \
  \   forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n```\n\n\
  脚本以变量`mousepowerx`和`mousepowery`开始，用于缩放施加到球上的力。`mousepowerx`影响左右移动鼠标所产生的力，而`mousepowery`影响前后移动鼠标所产生的力。这些变量是公开的，因此可以在检查器视图（`Inspector\
  \ View`）中调整它们。\n\n最终计算出的力存储在私有变量`forcex`和`forcey`中，它们也分别对应于左右和前后方向的鼠标移动。\n\n**提示**  始终在变量声明中指定初始值是一个好习惯。这会使代码的含义更清晰，并避免因对初始值的错误假设而导致错误（C\
  \ 和 C++程序员尤其知道要警惕未初始化变量带来的神秘错误）。\n\n`Update`回调函数就是根据`mousepowerx`、`mousepowery`和鼠标移动来计算`forcex`和`forcey`的地方。在\
  \ Unity 中，使用`Input`类来查询输入。例如，可以通过检查静态变量`Input.mousePosition`来获取鼠标位置，因此鼠标移动可以通过在每次`Update`调用中保存鼠标位置，并将当前位置与上一帧保存的位置进行比较来确定。\n\
  \n但是，更高级的`Input.GetAxis`函数已经完成了这项工作。`Input.GetAxis`根据传递给函数的参数，为鼠标、摇杆或键盘的左右或前后移动返回一个从-1\
  \ 到 1 的值。\n\n在`Update`回调函数中，调用了`Input.GetAxis(\"Mouse X\")`来获取上一帧发生的左右鼠标移动，并调用了`Input.GetAxis(\"\
  Mouse Y\")`来获取前后移动。在考虑了帧期间经过的时间（我们的老朋友`Time.deltaTime`）并乘以缩放因子`mousepowerx`和`mousepowery`之后，结果分别赋值给了变量`forcex`和`forcey`。\n\
  \n将这段代码放入`FuguForce`脚本后，您可以在球的检查器视图中看到公开的`mousepower`变量（图 6-26）。\n\n![9781430248750_Fig06-26.jpg](img/9781430248750_Fig06-26.jpg)\n\
  \n图 6-26. 带有`FuguForce.js`脚本的球\n\n当您点击播放时，您仍然无法控制球，因为您还没有添加实际的推球代码。但是，如果您在检查器视图菜单中选择调试选项，私有变量`forcex`和`forcey`将会显示出来，并且当您移动鼠标时，您可以看到它们的变化。\n\
  \n`FixedUpdate`：使用力\n\n影响物理的函数，包括`Rigidbody.AddForce`，应该在`FixedUpdate`回调函数中调用。与每一帧调用一次且可能花费任意时间的`Update`回调函数不同，`FixedUpdate`回调函数在每个固定的时间步长过去后执行。为了获得良好效果，物理模拟需要以固定间隔运行，通常比`Update`更频繁。物理计算之间的可变间隔会导致行为变化以及物理更新之间的长时间延迟。在\
  \ Unity 中，这个时间步长在时间管理器（`TimeManager`）中设置（图 6-27），该管理器位于编辑菜单的项目设置子菜单中。\n\n![9781430248750_Fig06-27.jpg](img/9781430248750_Fig06-27.jpg)\n\
  \n图 6-27. 时间管理器\n\n`FixedUpdate`回调函数在这些物理更新间隔被调用（我把`FixedUpdate`视为`PhysicsUpdate`，把固定时间步长视为物理时间步长），因此这是任何对物理模拟的更改（特别是对刚体的任何操作）应该发生的地方。\n\
  \n由于推动球的力已经在`Update`回调函数中计算好了，`FixedUpdate`回调函数只需要在球的刚体组件上调用`Rigidbody.AddForce`来应用这些值即可（列表\
  \ 6-2）。\n\n列表 6-2.`FuguForce.js`中的`FixedUpdate`回调函数\n\n```\nfunction FixedUpdate()\
  \ {\n        rigidbody.AddForce(forcex,0,forcey);\n}\n```\n\n在变量`rigidbody`上调用了刚体函数`AddForce`，`rigidbody`是一个组件变量，它始终引用此游戏对象的刚体组件。`GameObject`类也有一个`rigidbody`变量，因此引用`gameObject.rigidbody`是等效的。\n\
  \n传递给`RigidBody.AddForce`的三个值分别是力的 x、y 和 z 分量，因为力有方向和大小，所以它是一个向量。力的方向是世界空间中的，从本游戏主摄像机的视角来看，x\
  \ 是左右方向，z 是前后方向。因此，`forcex`被传递给 x 参数，`forcey`被传递给 z 参数。这些控制不会上下推动球，只会向前和侧向推动，所以\
  \ y 参数传递了 0。\n\n\n\n**注意**  请务必查阅`RigidBody.AddForce`的脚本参考页面。这是一个重载函数，其中一种变体将力作为`Vector3`接收，而非三个独立的数字。此外，这两种变体都接受一个可选参数，可以指定应用于`Rigidbody`的值是除力以外的量——可以是加速度、冲量或速度的瞬时变化。\n\
  \n现在，当你点击“播放”并移动鼠标时，球会朝该方向滚动。尝试在“检查器视图”中更改`mousepowerx`和`mousepowery`的值，以获得你想要的滚动响应速度。\n\
  \n### 它在滚动吗？\n\n你可能会注意到，如果在球下落时移动鼠标，实际上可以在球还在空中时就推动它，这看起来不太对劲。移动鼠标只应在球处于某个表面上时才能使其滚动。\n\
  \n幸运的是，Unity 提供了回调函数，每个都以`OnCollision`为前缀，这些函数在`GameObject`与另一个`GameObject`发生碰撞以及接触停止时被调用。每个回调函数都接受一个参数，即一个`Collision`对象，其中包含有关碰撞的信息，例如对涉及到的另一个`GameObject`的引用。\n\
  \n`FuguForce`脚本可以通过检查碰撞的`GameObject`的名称是否为“Floor”（使用`GameObject name`变量）来判断它是否是地板。但通常来说，更好的做法是，通过标签来查找和识别`GameObject`（使用`GameObject\
  \ tag`变量），这样效率更高。如果你选择地板`GameObject`并在“检查器视图”中检查它，可以在左上角看到它带有默认标签“Untagged”。要将`GameObject`的标签更改为“Floor”，首先必须通过从`GameObject`的标签菜单中选择“添加标签”来创建“Floor”标签（图\
  \ 6-28）。\n\n![9781430248750_Fig06-28.jpg](img/9781430248750_Fig06-28.jpg)\n\n图 6-28.\
  \ 添加新标签\n\n这会调出“检查器视图”中的标签管理器。标签管理器用于管理标签和层。标签用于标识`GameObject`，因此你几乎可以创建无限数量的标签。而层用于标记`GameObject`组，最多可以定义\
  \ 32 个层，因为它们被实现为 32 位数字中的位。这使得指定层的组合变得方便，例如在摄像机和灯光的剔除遮罩属性中。\n\n要创建一个名为“Floor”的新标签，只需在标签管理器的第一个空标签字段中输入“Floor”（图\
  \ 6-29）。然后再次在“层级视图”中选择“Floor”`GameObject`，再次点击“检查器视图”中的“Tag”菜单，新的“Floor”标签即可供选择。\n\
  \n![9781430248750_Fig06-29.jpg](img/9781430248750_Fig06-29.jpg)\n\n图 6-29. 标签管理器\n\
  \n现在，可以在`FuguForce`脚本中添加碰撞回调，以检查球是否在地板上（清单 6-3）。\n\n清单 6-3.  FuguForce.js 中的碰撞回调\n\
  \n```\nprivate var isRolling:boolean=false;\nprivate var floorTag:String = \"Floor\"\
  ;\n\nfunction OnCollisionEnter(collider:Collision) {\n        if (collider.gameObject.tag\
  \ == floorTag) {\n                isRolling = true;\n        }\n}\n\nfunction OnCollisionStay(collider:Collision)\
  \ {\n        if (collider.gameObject.tag == floorTag) {\n                isRolling\
  \ = true;\n        }\n}\n\nfunction OnCollisionExit(collider:Collision) {\n    \
  \    if (collider.gameObject.tag == floorTag) {\n                isRolling = false;\n\
  \        }\n}\n```\n\n添加了两个私有变量。第一个变量`isRolling`在球位于地板上时为 true。第二个变量`floorTag`是分配给地板的标签。\n\
  \n**提示**  为标签定义一个变量可以避免在多个位置拼写该标签（并避免难以调试的拼写错误），并且如果稍后更改了标签名称，只需更新该变量即可。三个碰撞回调中的每一个都会通过检查碰撞`GameObject`的标签来判断球与之碰撞的`GameObject`是否是地板。如果该`GameObject`不是地板，则碰撞回调不执行任何操作。\n\
  \n当球与另一个`GameObject`碰撞时，Unity 会调用`OnCollisionEnter`回调，因此该函数将`isRolling`设置为 true。相反，当球与`GameObject`之间的接触停止时，Unity\
  \ 会调用`OnCollisionExit`，在这种情况下，`isRolling`被设置为 false。\n\n同时，当球与`GameObject`保持接触时，会调用`OnCollisionStay`，因此它也能确保`isRolling`保持为\
  \ true。现在，在向球施加推力之前，`FixedUpdate`回调可以检查`isRolling`是否为 true，这表明球在地板上（清单 6-4）。\n\n\
  清单 6-4.  在 FuguForce.js 的 `FixedUpdate` 中添加滚动检查\n\n```\nfunction FixedUpdate() {\n\
  \        if (isRolling) {\n                rigidbody.AddForce(forcex,0,forcey);\n\
  \        }\n}\n```\n\n### 限制速度\n\n最后，作为一点优化，球控制脚本可以在推动球之前检查球的速度，避免由于现有速度、帧率和输入值的某种异常组合而导致球最终滚动得远比预期快得多的情况（清单\
  \ 6-5）。\n\n清单 6-5.  在 FuguForce.js 的 `FixedUpdate` 中添加速度检查\n\n```\nvar maxVelocitySquared:float=400.0;\n\
  \nfunction FixedUpdate() {\n        if (isRolling && rigidbody.velocity.sqrMagnitude<maxVelocitySquared)\
  \ {\n                rigidbody.AddForce(forcex,0,forcey);\n        }\n}\n```\n\n\
  这是一个非常简单的更改，只需要添加一个变量`maxVelocitySquared`来保存我们的最大速度值，实际上是最大速度值的平方。然后`FixedUpdate`除了检查球是否在地板上之外，还会检查球速度的平方大小是否低于`maxVelocitySquared`。换句话说，`FixedUpdate`检查的是球速度的平方。\n\
  \n`Rigidbody`的`velocity`变量是一个`Vector3`，它又有一个`magnitude`变量，可以给出`Vector3`的长度。但是求`Vector3`的长度涉及平方根运算（还记得高中数学中的勾股定理吗？），而平方根需要更多的计算。因此，无论何时需要比较两个`Vector3`的长度，都应该比较它们长度的平方。\n\
  \n### 完整脚本\n\n清单 6-6 展示了到目前为止编写的球控制器脚本`FuguForce.js`的完整清单，可在`http://learnunity4.com/`上的第\
  \ 6 章项目中找到。\n\n清单 6-6.  FuguForce.js 的完整清单\n\n```\n#pragma strict\n\nvar mousepowerx:float\
  \ = 1.0;\nvar mousepowery:float = 1.0;\n\nvar maxvelocity:float=400.0;\n\nprivate\
  \ var forcey:float=0.0;\nprivate var forcex:float=0.0;\n\nprivate var isRolling:boolean=false;\n\
  private var floorTag:String = \"Floor\";\n\nvar maxVelocitySquared:float=400.0;\n\
  \nfunction Update() {\n        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
  \        forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n\n\
  function FixedUpdate() {\n        if (isRolling && rigidbody.velocity.sqrMagnitude<maxVelocitySquared)\
  \ {\n                rigidbody.AddForce(forcex,0,forcey);\n        }\n}\nfunction\
  \ OnCollisionEnter(collider:Collision) {\n        if (collider.gameObject.tag ==\
  \ floorTag) {\n                isRolling = true;\n        }\n}\n```\n\n\n\n```\n\
  function OnCollisionStay(collider:Collision) {  \n    if (collider.gameObject.tag\
  \ == floorTag) {  \n        isRolling = true;  \n    }  \n}  \n\nfunction OnCollisionExit(collider:Collision)\
  \ {  \n    if (collider.gameObject.tag == floorTag) {  \n        isRolling = false;\
  \  \n    }  \n}  \n```\n\n"
- '# 成为球


  球的控制效果目前相当不错，但当球滚向远方时，主摄像机却静止不动。这是一个明显的缺陷，因为任何像样的 3D 游戏都需要某种形式的摄像机移动。在《超级保龄球》中，主摄像机在你滚动时会跟随球，但始终朝向同一方向（朝向球瓶）。实际上，Unity
  在标准资源中已经提供了摄像机跟随脚本。该脚本包已在第 3 章中从标准资源导入，以获取 `MouseOrbit` 脚本。跟随脚本也位于脚本包的 Camera Scripts
  文件夹中，名为 `SmoothFollow`（图 6-30）。


  ![9781430248750_Fig06-30.jpg](img/9781430248750_Fig06-30.jpg)


  图 6-30. 标准资源中的摄像机脚本


  将 `SmoothFollow` 脚本从项目视图拖拽到层级视图中的主摄像机上。然后在层级视图中选择主摄像机，这样你就可以在检视视图中编辑 `SmoothFollow`
  脚本的属性（图 6-31）。


  ![9781430248750_Fig06-31.jpg](img/9781430248750_Fig06-31.jpg)


  图 6-31. 带有 SmoothFollow 脚本的主摄像机检视视图


  主摄像机应跟随球，所以将层级视图中的 Ball 游戏对象拖拽到检视视图中 `SmoothFollow` 脚本的 Target 字段。


  至于其他 `SmoothFollow` 属性，设置 Distance 为 2，这将使主摄像机保持在球后方 2 米处跟随；设置 Height 为 1，使摄像机保持在球上方
  1 米处，而不是紧跟在它后面。Height Damping 设置为 2，允许主摄像机在跟随球的高度时有轻微的上下弹动；Rotation Damping 设置为
  0，确保主摄像机始终保持在球的后方，不会左右摆动。


  现在点击播放，当你滚动时，你就在滚动并跟随着！


  '
- '# 进一步探索


  现在我们有了真正游戏玩法的雏形。虽然它还不是一个完整的保龄球游戏，但它包含了物理（球在地板上滚动）、交互控制（推动球）和摄像机移动（跟随球）。在游戏开发中，每个特性都是丰富的主题，但我们将在下一章中更深入地探讨物理，包括保龄球瓶的添加和基于碰撞的音效。届时，游戏看起来会更像一个保龄球游戏！


  #### Unity 手册


  在“资源导入与创建”部分，关于“程序化材质”的页面（你在地板上使用过）简要介绍了 Substance 存档格式，并概述了用于创建和分析程序化材质的工具。


  在“创建游戏玩法”部分，关于“输入”的页面描述了 `Input` 类及其 `GetAxis` 函数（在本章实现的 `FuguForce` 脚本中使用），并列出了传递给该函数的摇杆和键盘值。该页面的下半部分描述了适用于
  iOS 的 `Input` 函数和变量，你可以阅读这部分作为本书关于 iOS 输入章节的预览。


  本章主要讨论物理，因此“物理”页面是最值得阅读的。它列出了所有碰撞器类型，包括本章中使用的 SphereCollider、BoxCollider 和 MeshCollider
  组件。该页面描述了刚体（球）和静态碰撞器（地板）之间的区别，以及物理材质及其属性如何影响碰撞行为。


  #### 参考手册


  在“资源组件”部分，关于“程序化材质资源”的页面解释了你在项目视图和检视视图中看到的程序化材质内容。


  在“物理组件”部分，详细列出了所有可用的碰撞器，以及可用的关节（包括铰链和弹簧）、恒力和布料组件（Unity iOS 不支持布料）。


  本章引入了一个新的设置管理器：“标签管理器”，用于为地板创建新标签。


  在“脚本概念”部分，标题为“什么是标签？”的页面详细说明了如何创建标签并将其应用于游戏对象，并提供了一个示例，展示如何在运行时使用标签查找游戏对象。


  关于“刚体休眠”的页面解释了刚体在静止时如何“进入休眠”状态。这是一个很好的优化，可以减少不必要的物理计算。


  #### 脚本参考


  在运行时类列表中，“MonoBehaviour”类的页面列出了本章介绍的碰撞回调函数：`OnCollisionEnter`、`OnCollisionStay`
  和 `OnCollisionExit`。


  我们查询了 `Collision` 类以获取碰撞信息：相对速度、碰撞到的游戏对象。还有其他数据可用，例如实际接触点。


  本章介绍了 `Rigidbody` 组件，这个类的脚本参考页面值得通读。它的变量很大程度上对应检视视图中可用的属性，除了你用来推动球的 `AddForce` 函数外，还有许多相关函数：`AddRelativeForce`、`AddTorque`、`AddRelativeTorque`、`AddExplosionForce`、`AddForceAtPosition`。


  `Component` 有几个变量，它们是引用附加到游戏对象上的其他组件的快捷方式。在本书迄今为止创建的两个脚本中，`FuguRotate` 脚本引用了 `transform`
  变量，`FuguForce` 脚本引用了 `rigidbody` 变量。Component 的变量与 `GameObject` 中的同类变量相对应。


  我们使用的 `Input` 类中的一个函数是 `Input.GetAxis`。如果你计划制作任何桌面或网页游戏，你会想了解用于查询键盘、鼠标和摇杆的各种函数。该页面还列出了适用于移动应用程序的
  `Input` 函数。


  #### 网络资源


  Unity 中的物理实现基于较旧版本（2.x）的 PhysX 引擎。该引擎最初由 NovodeX 开发，被 Ageia 收购后与硬件物理加速器捆绑在一起，现在是
  nVidia 的产品。最新版本（3.x）可在 nVidia 开发者专区获取（`https://developer.nvidia.com/physx`）。值得一看
  PhysX 软件开发工具包，以便更好地理解 Unity 物理组件和脚本函数所依赖的物理引擎特性。


  Unity 网站（`http://unity3d.com/`）上相当新的“学习”部分包含大量物理教程，涵盖了本章讨论的大部分内容以及下一章将要讨论的内容。


  ## 第 7 章：开始保龄球吧！高级物理


  到目前为止，我们已拥有了一个保龄球游戏的雏形，或者至少是 Unity 编辑器中的一个场景，玩家可以在其中让球在地板上滚动。但如果没有至少保龄球瓶，游戏看起来就不像保龄球游戏。本章将弥补这一点，并涉及更多
  Unity 物理知识，包括刚体（球和球瓶之间）之间的碰撞以及复合碰撞器（以适应保龄球瓶的形状）。在此基础上，我们还将添加基于碰撞的音效，让游戏听起来也像保龄球游戏。




  '
- "# 这项附加功能需要新建几个脚本，你可以在 `http://learnunity4.com/` 上找到本章对应的 Unity 项目。不过，用于保龄球瓶的球瓶模型、球瓶碰撞音效和球滚动音效均从资源商店免费获取，并未包含在在线项目中。\n\
  \n### 加长球道\n\n在向保龄球场景（该场景应已在 Unity 编辑器中打开，保持上一章的状态）添加保龄球瓶之前，我们需要更大的滚动空间。在层级视图中选择\
  \ `Floor`，然后在检视面板（图 7-1）中将 X、Y、Z 的 `Scale` 均设为 10。\n\n![9781430248750_Fig07-01.jpg](img/9781430248750_Fig07-01.jpg)\n\
  \n图 7-1. 放大后的 `Floor` 游戏对象，缩放系数为 10\n\n**提示** 出于性能考虑，最好避免在变换组件中直接修改缩放（对于导入的模型，应在导入设置中修改缩放）。如果必须修改缩放，请确保沿三个轴均匀缩放。\n\
  \n现在 `Floor` 变大了十倍（高度除外，因为平面本身没有高度）。但 `Floor` 上的纹理也被拉伸了，导致木板显得特别宽。为抵消这一效果，你需要将 `Floor`\
  \ 的主纹理和法线纹理的平铺系数也乘以 10，这样每个方向的新平铺系数变为 50，木板纹理就能恢复原状。\n\n### 制作保龄球瓶\n\n现在有了滚动空间，可以添加球瓶了。在没有现成保龄球瓶模型的情况下，你可以用胶囊体基本几何体制作一个简化版的球瓶。\n\
  \n从层级视图的创建菜单中选择胶囊体（图 7-2）。胶囊体与其他基本几何体一样，也可以通过菜单栏的 GameObject 菜单创建。\n\n![9781430248750_Fig07-02.jpg](img/9781430248750_Fig07-02.jpg)\n\
  \n图 7-2. 创建胶囊体\n\n将生成的游戏对象命名为 `Pin`。要创建十个球瓶，你可以将 `Pin` 复制九次，但就像在立方体场景中克隆立方体那样，更好的做法是先制作一个预制件。这样，对单个球瓶所做的任何修改都可以应用到全部十个球瓶上。\n\
  \n现在，将 `Pin` 拖拽到项目视图的预制件文件夹中，以创建预制件（图 7-3）。\n\n![9781430248750_Fig07-03.jpg](img/9781430248750_Fig07-03.jpg)\n\
  \n图 7-3. 项目视图中的 `Pin` 预制件\n\n但如果将九个预制件副本拖入场景并手动放置，会既繁琐又容易出错。这种任务非常适合用脚本来实现！因此，我们计划使用脚本和\
  \ `Pin` 预制件在游戏中生成所有球瓶。这种情况下，场景中的 `Pin` 游戏对象就是多余的，所以请将其删除（在层级视图中选择该游戏对象，然后通过编辑菜单的删除命令或快捷键\
  \ Command+Delete 执行删除）。\n\n### 制作游戏控制器\n\n除了生成球瓶，保龄球游戏肯定还需要更多脚本来实现游戏规则和游戏流程。事实上，任何不太简单的游戏都可以从单一的游戏控制器脚本中受益，该脚本负责实现游戏的整体流程。因此，我们计划将球瓶创建作为保龄球游戏控制器的第一个动作。\n\
  \n### 创建脚本\n\n在项目视图中新建一个 JavaScript，将其放入 Scripts 文件夹，并命名为 `FuguBowl`（我们将遵循惯例：用游戏本身的名字来命名游戏控制器脚本）。然后添加代码清单\
  \ 7-1 中的代码，其中包含几个变量、一个 `CreatePins` 函数，以及一个调用 `CreatePins` 函数的 `Awake` 回调。\n\n代码清单\
  \ 7-1 FuguBowl.js 中的球瓶实例化代码\n\n```\n#pragma strict\n\nvar pin:GameObject; // 要实例化的球瓶预制件\n\
  var pinPos:Vector3 = Vector3(0,1,20); // 球瓶架的位置\n\nvar pinDistance = 1.5; // 球瓶之间的初始距离\n\
  var pinRows = 4; // 球排行数\n\nprivate var pins:Array;\n\nfunction Awake () {\n   \
  \     CreatePins();\n}\n\nfunction CreatePins() {\n        pins = new Array();\n\
  \        var offset = Vector3.zero;\n        for (var row=0; row<pinRows; ++row)\
  \ {\n                offset.z+=pinDistance;\n                offset.x=-pinDistance*row/2;\n\
  \                for (var n=0; n<=row; ++n) {\n                         pins.push(Instantiate(pin,\
  \ pinPos+offset, Quaternion.identity));\n                         offset.x+=pinDistance;\n\
  \                }\n\n}\n}\n```\n\n`CreatePins` 函数首先创建一个 `Array`，它类似于用方括号表示的内置数组，但大小可调，因此可以随着元素的添加而增长，随着元素的移除而收缩。然后函数循环遍历指定的行数，并在每一行中实例化数量递增的球瓶：第一行有一个，第二行有两个，依此类推。因此，当有四行时，最终你会得到如图所示的十个球瓶三角形排列！\n\
  \n#### 实例化球瓶\n\n`Instantiate` 函数接收一个对象、位置和旋转作为参数，在指定的位置和旋转（在世界空间中，而非局部空间）创建一个相同的对象。`Instantiate`\
  \ 会复制整个对象层级，因此如果对象是一个带有子游戏对象的游戏对象，那么整个层级都会被复制。如果对象是一个组件，那么该组件的游戏对象以及该游戏对象的所有子对象都会被复制。\n\
  \n如果原始游戏对象已在场景中，则调用 `Instantiate` 类似于选择原始游戏对象并通过编辑菜单的重复命令（或 Command+D）进行复制。如果原始对象是预制件（就像本例这样），则调用\
  \ `Instantiate` 类似于将预制件拖入场景以创建新的游戏对象。\n\n位置是一个 `Vector3`，旋转则以 `Quaternion`（四元数）而非欧拉角的形式传入。四元数并不是一种直观的旋转表示方式（四元数是具有三个虚部的复数），但它们比欧拉角有一些优势（例如更自然的插值），因此\
  \ Unity 在内部使用它们。在本例中，传入静态变量 `Quaternion.identity` 表示不进行任何旋转（相当于欧拉角旋转为 0,0,0）。\n\n\
  **注意** 四元数也有 x、y、z 值（还有一个 w 值），因此要小心不要将其与欧拉角混淆。特别要注意，`Transform` 组件中的 `rotation`\
  \ 和 `localRotation` 变量是 `Quaternion` 类型的值。欧拉角则存储在 `eulerAngles` 和 `localEulerAngles`\
  \ 变量中。\n\n`Instantiate` 是 `Object` 类的静态函数。脚本中对 `Instantiate` 的调用等同于调用 `this.Instantiate`，其中\
  \ `this` 是脚本组件。而 `Component` 是 `Object` 的子类，因此编译器知道你在调用 `Object.Instantiate`。`Instantiate`\
  \ 也是一个重载函数，其中一种变体只接受一个参数：要克隆的对象。新实例化的对象将出现在与原始对象相同的位置并具有相同的旋转。\n\n#### 命名空间\n\n\
  通常，我更倾向于显式调用 `Object.Instantiate`，以表明 `Instantiate` 是 `Object` 类中的静态函数，不需要在 `Object`\
  \ 的实际实例上调用（如果那样做，它将被称作*实例函数*）。然而，在脚本中写出 `Object.Instantiate` 会导致控制台视图报错：*“Instantiate”不是“Object”的成员*（图\
  \ 7-4）。\n\n![9781430248750_Fig07-04.jpg](img/9781430248750_Fig07-04.jpg)\n\n图 7-4.\
  \ 引用（错误）`Object` 类的编译器错误\n\n\n\n问题在于 Mono 中定义了另一个 `Object` 类。该类作为其他 Mono 类的超类，就像\
  \ Unity 的 `Object` 类是最多 Unity 类的超类（至少是那些可以存在于场景中的类）。编译器认为你引用的是 Mono 的 `Object` 类，而不是\
  \ Unity 的类。这正是我们一直试图通过使用（希望是）唯一前缀来命名类来避免的问题。诸如 `Object` 和 `Button` 这样的有用类名很可能被许多不同的开发者使用。\n\
  \n但是，Unity 和 Mono 版本的 `Object` 如何共存？答案是命名空间。Unity 定义的每个类都在 `UnityEngine` 命名空间中，而\
  \ Mono 版本的 `Object` 定义在 `System` 命名空间中。每个类的完全限定名称是类名前加上命名空间名称，因此 Unity 的 `Object`\
  \ 类实际上是 `UnityEngine.Object`，而 Mono 的 `Object` 是 `System.Object`。对 Unity 类的引用很少包含\
  \ `UnityEngine` 前缀，因为 JavaScript 会隐式导入该命名空间（相当于在脚本顶部添加“`import UnityEngine`”）。这意味着编译器在尝试确定类定义位置时，会在\
  \ `UnityEngine` 命名空间中查找。不幸的是，JavaScript 也会隐式导入 `System` 命名空间，并且 `Object` 首先解析为 `System.Object`。因此，对\
  \ `Object.Instantiate` 的调用会产生与对 `System.Object.Instantiate` 调用相同的错误，因为 `System.Object`\
  \ 类没有定义 `Instantiate` 函数。但是，对 `UnityEngine.Object.Instantiate` 的调用则完全正常。所以要记住，任何时候对\
  \ `Instantiate` 的调用实际上都是对 `UnityEngine.Object.Instantiate` 的调用！\n\n顺便说一句，在 C# 脚本中，`Object`\
  \ 类不会出现这种混淆，因为它们不会自动导入 `System` 命名空间。而且，虽然 JavaScript 目前还不允许声明新的命名空间，但 C# 从 Unity\
  \ 4 开始就支持这一功能。\n\n### `Awake`\n\n`Awake` 函数是一个与 `Start` 非常相似的脚本回调。与 `Start` 一样，`Awake`\
  \ 仅在 GameObject 首次激活时调用一次。与 `Start` 不同，无论脚本是否启用，都会调用 `Awake`。并且 `Awake` 总是在 `Start`\
  \ 之前调用。\n\n**注意** 最初，`Awake` 在 GameObject 被加载到场景或创建后立即调用，无论 GameObject 是否激活。这种行为与预制件配合不佳，因此才有了当前的行为，即\
  \ `Awake` 类似于早期的 `Start` 回调。在这种情况下，你可以使用 `Awake` 或 `Start`，但我喜欢用 `Awake` 进行初始化，用\
  \ `Start` 来主动启动脚本的行为。\n\n#### 创建 GameObject\n\n要让游戏控制器脚本运行，它必须附加到场景中的 GameObject\
  \ 上。虽然 `FuguBowl.js` 可以附加到现有的 GameObject（如主摄像机），但创建一个新的 GameObject 更为干净。这个 GameObject\
  \ 可以以一种明确指示游戏控制器脚本已附加的方式来命名，并且你不必担心该 GameObject 在用于其他目的时会被停用。按照这个策略，在层级视图中创建一个新的\
  \ GameObject，将其命名为 `FuguBowl`（与它将持有的脚本同名），然后将 `FuguBowl` 脚本拖到 FuguBowl GameObject\
  \ 上（图 7-5）。\n\n![9781430248750_Fig07-05.jpg](img/9781430248750_Fig07-05.jpg)\n\n\
  图 7-5. 附加了 `FuguBowl.js` 的游戏控制器 GameObject\n\n`FuguBowl` 脚本的大多数属性可以保留默认值，但你需要将项目视图中的\
  \ Pin 预制件拖到 `FuguBowl` 脚本的 Pin 字段中。现在点击播放，所有十个保龄球瓶就会出现（图 7-6）。\n\n![9781430248750_Fig07-06.jpg](img/9781430248750_Fig07-06.jpg)\n\
  \n图 7-6. 放置了瓶子的保龄球场景\n\n但是，当你将球投向球瓶时，球只会从它们身上弹开，因为这些球瓶虽然有碰撞器组件，但却是静态的 GameObject。与球一样，每个球瓶也必须拥有刚体组件才能对作用力做出反应。可以通过组件菜单将刚体组件添加到\
  \ Pin 预制件上，但这次让我们尝试另一种方法。在项目视图中选择 Pin 预制件，然后在检查器视图中单击“添加组件”按钮。在弹出的菜单中，在“物理”下选择“刚体”（或者你可以在弹出菜单的搜索字段中输入“rigidbody”来找到该选项）。无论你选择哪种方式，现在\
  \ Pin 预制件上应该有一个刚体组件（图 7-7）。\n\n![9781430248750_Fig07-07.jpg](img/9781430248750_Fig07-07.jpg)\n\
  \n图 7-7. 带有刚体的保龄球瓶预制件\n\n与地板和球的碰撞器组件一样，Pin 预制件应该有自己的物理材质。创建合适物理材质的一个快速方法是复制用于球的物理材质，因此在项目视图中选择“物理”文件夹中的\
  \ Ball 物理材质，使用“编辑”菜单或 Command+D 进行复制，并将新的物理材质命名为 `Pin`（图 7-8）。\n\n![9781430248750_Fig07-08.jpg](img/9781430248750_Fig07-08.jpg)\n\
  \n图 7-8. 用于 Pin 预制件的物理材质\n\n由于保龄球瓶应该像球一样滚动良好，将“动态摩擦力”和“静态摩擦力”值保留为 1（以避免滚动时打滑），并将“摩擦力组合”值保留为“最大值”。然而，与球不同的是，保龄球瓶应该具有相当的弹性，因此将“弹性”设置为\
  \ 0.5，并将“弹性组合”值设置为“平均值”（考虑到它所碰撞对象的弹性）。最后，将 Pin 物理材质分配给 Pin 预制件。在项目视图中选择 Pin 预制件，然后在检查器视图中，单击碰撞器组件“物理材质”字段右侧的圆圈，然后从弹出选择器中选择\
  \ Pin 物理材质（图 7-9）。\n\n![9781430248750_Fig07-09.jpg](img/9781430248750_Fig07-09.jpg)\n\
  \n图 7-9. 将 Pin 物理材质分配给 Pin 预制件\n\n现在，当你点击播放并将球滚向球瓶时，它们会被撞倒并四处弹跳滚动，如图 7-10 所示。\n\n\
  ![9781430248750_Fig07-10.jpg](img/9781430248750_Fig07-10.jpg)\n\n图 7-10. 与每个都带有刚体的球瓶发生碰撞\n\
  \n#### 继续游戏\n\n每次测试滚动都必须停止游戏并再次点击播放，这相当繁琐。而且，当球滚出地板时，你只能眼睁睁看着球无限下落。因此，让我们让球、主摄像机和球瓶在球滚出地板边缘时重置。\n\
  \n##### 使其可重置\n\n首先，你需要一个能将 GameObject 恢复到其初始位置和旋转的脚本（不能忘记旋转——如果一个球瓶被击倒，你需要将其重置为初始直立方向）。创建一个新的\
  \ JavaScript，命名为 `FuguReset`，内容如 列表 7-2 所示。\n\n列表 7-2.  在 `FuguReset.js` 中恢复 GameObject\
  \ 位置\n\n```\n#pragma strict\n\nprivate var startPos:Vector3;\nprivate var startRot:Vector3;\n\
  \nfunction Awake() {\n        // 保存此 GameObject 的初始位置和旋转\n        startPos = transform.localPosition;\n\
  \        startRot = transform.localEulerAngles;\n}\n```\n\n\n```csharp\nfunction\
  \ ResetPosition() {\n        // 回到初始位置\n        transform.localPosition = startPos;\n\
  \        transform.localEulerAngles = startRot;\n        // 确保停止所有物理运动\n       \
  \ if (rigidbody != null) {\n                rigidbody.velocity = Vector3.zero;\n\
  \                rigidbody.angularVelocity = Vector3.zero;\n        }\n}\n```\n\n\
  `Awake` 函数会将游戏对象的位置和旋转保存到几个变量中，而 `ResetPosition` 函数则会将游戏对象恢复到这些设置。`ResetPosition`\
  \ 还会检查游戏对象是否拥有 `Rigidbody`。如果有，该函数将阻止其移动或旋转。\n\n`FuguReset` 脚本应附加到每个在重新开始游戏时需要重置位置（可能还有旋转）的游戏对象上。此列表包括球、球瓶和主摄像机。首先，将\
  \ `FuguReset` 脚本拖拽到层级视图中的主摄像机和球游戏对象上。然后，在项目视图中选择 Pin 预设体，在检查器视图中点击“添加组件”按钮，添加 `FuguReset`\
  \ 脚本（图 7-11）。\n\n![9781430248750_Fig07-11.jpg](img/9781430248750_Fig07-11.jpg)\n\
  \n图 7-11。将 FuguReset 脚本附加到 Pin 预设体\n\n现在，球、球瓶和主摄像机在游戏开始时记录其初始位置和旋转，并且你已经准备好了一个 `ResetPosition`\
  \ 函数，可以调用它来将它们恢复到这些初始位置和旋转。\n\n### 发送消息\n\n通常，从一个游戏对象上附加的脚本调用另一个游戏对象上附加脚本中的函数会有些棘手。这需要在一个游戏对象上调用\
  \ `GetComponent` 来获取脚本，然后引用该脚本来调用函数。\n\n但在简单情况下（例如，当你不关心函数的返回值时），Unity 允许你通过使用 `GameObject`\
  \ 类中的 `SendMessage` 或 `BroadcastMessage` 函数向游戏对象发送消息来调用函数。接收消息（包含要调用的函数名称）的游戏对象会将消息传递给任何可能拥有该函数的附加脚本。\n\
  \n让我们在游戏控制器脚本中添加一些函数，用于发送 `ResetPosition` 消息（清单 7-3）。\n\n清单 7-3. FuguBowl.js 中发送\
  \ ResetPosition 消息的函数\n\n```csharp\nvar ball:GameObject; // 保龄球\n\nfunction ResetBall()\
  \ {\n        ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n\
  \        for (var pin:GameObject in pins) {\n                pin.BroadcastMessage(\"\
  ResetPosition\");\n        }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"\
  ResetPosition\");\n}\n\nfunction ResetEverything() {\n        ResetBall();\n   \
  \     ResetPins();\n        ResetCamera();\n}\n```\n\n附加代码以一个指向球的公共变量开始。脚本已经拥有了一个引用所有保龄球的\
  \ `pin` 数组，而主摄像机总是可以通过静态变量 `Camera.main` 引用，因此脚本现在可以访问所有需要重置的游戏对象。`ResetCamera`\
  \ 和 `ResetBall` 函数调用 `SendMessage` 来向各自的目标游戏对象发送 `ResetPosition` 消息。在这些游戏对象附加的脚本中定义的每个\
  \ `ResetPosition` 函数都会被调用。具体来说，由于主摄像机和球附加了 `FuguReset` 脚本，该脚本中的 `ResetPosition`\
  \ 函数将响应此消息。\n\n`ResetPins` 函数略有不同，它调用 `BroadcastMessage` 来发送 `ResetPosition` 消息。`BroadcastMessage`\
  \ 的行为与 `SendMessage` 相同，不同之处在于该消息还会传播到原始接收对象的任何子游戏对象。在本章稍后部分，当我们替换一些将其 Rigidbody\
  \ 附加到子游戏对象的球瓶时，这将非常有用。\n\n`ResetPins` 会在控制台中生成一条关于 *Implicit downcast from ‘Object’\
  \ to ‘UnityEngine.GameObject’* 的警告（图 7-12）。\n\n![9781430248750_Fig07-12.jpg](img/9781430248750_Fig07-12.jpg)\n\
  \n图 7-12。隐式向下转换警告的控制台视图\n\n出现该警告是因为 `Array` 被定义为包含 `Object` 类型元素，但每个元素都被视为 `GameObject`。这看似合理，因为\
  \ `GameObject` 是 `Object` 的子类，但就编译器所知，这不一定成立。你可以通过向脚本添加 `#pragma downcast` 来消除此警告，这基本上告诉编译器：“相信我。”\n\
  \n### 检查落沟球\n\n当球滚落地板的边缘时，这基本上是一个落沟球，因为此时已经没有希望到达球瓶了。因此，当这种情况发生时，肯定需要重置游戏。可以通过在每一帧检查球的\
  \ y 位置是否低于某个水平高度来实现落沟球检测。这可以通过在 `FuguBowl` 脚本中添加清单 7-4 中的公共变量 `sunkHeight` 和 `Update`\
  \ 回调来实现。\n\n清单 7-4. FuguBowl.js 中用于检测落沟球的 Update 回调\n\n```csharp\nvar sunkHeight:float\
  \ = -10.0; // 我们称之为落沟球的全局 y 位置\n\nfunction Update() {\n        if (ball.transform.position.y<sunkHeight)\
  \ {\n                ResetEverything();\n        }\n}\n```\n\n变量 `sunkHeight` 指定球必须下降到的\
  \ y 位置，以触发重置一切。某些情况下 `sunkHeight` 的默认值是低于零的一段距离，这样玩家可以在重置前有时间看到球下落。`Update` 回调在每一帧检查球的\
  \ y 位置是否低于 `sunkHeight`。如果是，则会调用 `ResetEverything`，向球、主摄像机和球瓶发送所有 `ResetPosition`\
  \ 消息。在点击“播放”进行测试之前，你需要通过将层级视图中的球游戏对象拖拽到 `FuguBowl` 脚本的 Ball 字段中来分配脚本中的 `ball` 公共变量（图\
  \ 7-13）。\n\n![9781430248750_Fig07-13.jpg](img/9781430248750_Fig07-13.jpg)\n\n图 7-13。FuguBowl.js\
  \ 中支持重置球的游戏控制器属性\n\n现在，当球滚落地板边缘时，球、主摄像机和球瓶应该会立即弹回到它们的起始位置。实现连续游戏！\n\n### 完整清单\n\n\
  完整的游戏控制器脚本见清单 7-5。\n\n清单 7-5. FuguBowl.js 的完整清单\n\n```csharp\n#pragma strict\n#pragma\
  \ downcast\n\nvar pin:GameObject;                   // 要实例化的球瓶预设体\nvar pinPos:Vector3\
  \ = Vector3(0,1,20); // 放置球瓶架的位置\nvar pinDistance = 1.5;                // 球瓶之间的初始距离\n\
  var pinRows = 4;                      // 球排行数\n\nvar ball:GameObject;          \
  \        // 保龄球\nvar sunkHeight:float = -10.0;\n\nprivate var pins:Array;\n\nfunction\
  \ Awake () {\n        CreatePins();\n}\n```\n\n\n### 桶式保龄球\n\n`Capsules`（胶囊体）无论是在外观还是碰撞形状上，都只能充当非常简陋的保龄球瓶。真正的保龄球瓶模型会好得多，但遗憾的是，在资源商店里搜索保龄球瓶一无所获（尽管如果某个供应商决定填补这个空白，情况随时可能改变）。不过，资源商店里还有很多其他模型，只要我们灵活变通，就能找到替代保龄球瓶的方案。事实证明，那里有好几套桶模型资源包，所以我们就用桶来作为备选方案中的保龄球瓶。\n\
  \n#### 挑选桶\n\n在资源商店里搜索\"barrel\"，会发现几套免费的桶模型资源包（图 7-14）。\n\n![9781430248750_Fig07-14.jpg](img/9781430248750_Fig07-14.jpg)\n\
  \n图 7-14。资源商店中的免费桶模型\n\n任何免费资源包都能用，但来自 Universal Image 的 Barrel 资源包（其资源商店图标中显示三个桶）已经预设了预制件，所以我们就下载这个包。从资源商店的描述以及导入包后的项目视图中可以看到，Barrel\
  \ 资源包组织得井井有条，包含一个名为 Barrel 的文件夹，里面装有 Barrel 预制件和 Barrel 模型（图 7-15）。\n\n![9781430248750_Fig07-15.jpg](img/9781430248750_Fig07-15.jpg)\n\
  \n图 7-15。Barrel 资源包的项目视图\n\n这两个资源在项目视图中看起来很相似，但点击预制件时，项目视图底部会显示完整文件名`Barrel.prefab`；而点击\
  \ Barrel 模型时，则显示`Barrel.FBX`，表明它是一个导入的 FBX 文件（Autodesk 使用的 3D 格式）。\n\n#### 制作预制件\n\
  \n我们需要一个 Barrel 预制件来替换简单的 Pin 预制件，但应避免修改原始 Barrel 预制件（再次导入 Barrel 资源包会覆盖我们的更改）。要制作自己的\
  \ Barrel 预制件副本，选中该预制件，按 Command+D（或从 Edit 菜单中选择 Duplicate），然后将副本拖入 Prefabs 文件夹。接着将其重命名为`BarrelPin`，因为它是一个桶，我们要把它当作保龄球瓶来用（图\
  \ 7-16）。\n\n![9781430248750_Fig07-16.jpg](img/9781430248750_Fig07-16.jpg)\n\n图 7-16。Barrel\
  \ 预制件的副本\n\n选中`BarrelPin`预制件的子`GameObject`，使其显示在检视视图中。目前存在`MeshFilter`组件和`MeshRenderer`组件，但要将此预制件用作保龄球瓶，它还需要一个`Collider`组件和一个`Rigidbody`组件，这样保龄球瓶（桶）才会受重力影响，并能相互碰撞，以及与球和地板碰撞。该预制件还需要附加一个`FuguReset`脚本，用于处理游戏控制器发送的`ResetPosition`消息。\n\
  \n目前，我们先处理`Rigidbody`组件和`FuguReset`脚本，暂缓添加`Collider`组件，因为匹配桶的形状会有些复杂。选中预制件后，可以从菜单栏的\
  \ Component 菜单中选择 Rigidbody，或者点击检视视图底部的 Add Component 按钮，从出现的菜单中选择 Rigidbody（图 7-17）。\n\
  \n![9781430248750_Fig07-17.jpg](img/9781430248750_Fig07-17.jpg)\n\n图 7-17。向 Barrel\
  \ 预制件添加 Rigidbody 和`FuguReset`脚本\n\n在新附加的`Rigidbody`组件中，将 Mass（质量）设置为 2（千克）。对于一个金属桶来说，这相当轻，但如果球不能不太费力地击倒作为保龄球瓶的桶，游戏就不好玩了。在游戏中，趣味性比真实感更重要！\n\
  \n可以通过将`FuguReset`脚本拖入检视视图，或者使用 AddComponent 按钮将其添加到预制件中。\n\n#### 使用预制件\n\n要用`BarrelPin`预制件替换简单的胶囊体型\
  \ Pin，在层级视图中选中`FuguBowl` GameObject，使其组件显示在检视视图中，然后将`BarrelPin`预制件拖入`FuguBowl`脚本的\
  \ Pin 字段，替换掉最初使用的 Pin 预制件（图 7-18）。现在点击 Play，会出现十个桶，而不是十个胶囊体。但它们会立刻掉穿地板，因为保龄球瓶还没有\
  \ Collider 组件！\n\n![9781430248750_Fig07-18.jpg](img/9781430248750_Fig07-18.jpg)\n\
  \n图 7-18。使用`BarrelPin`预制件作为保龄球瓶\n\n#### 添加碰撞体\n\n我们不能再回避了。是时候处理`BarrelPin`的碰撞问题了。为了能在场景视图中直观地看到`BarrelPin`及其碰撞形状，先将`BarrelPin`预制件拖入层级视图，临时将其放置在场景中。放置后，展开`BarrelPin`\
  \ GameObject 并选中子`Barrel` GameObject，使其显示在检视视图中，按 F 键调用 Frame Selected（框架选中），将`Barrel`居中显示在场景视图中。同时，将查看选项（场景视图左上角的下拉菜单）从\
  \ Textured（纹理）切换为 Wireframe（线框），以便更容易看到网格和碰撞体组件的形状。\n\n遗憾的是，Component 菜单中没有列出桶形的原始碰撞体（`CylinderCollider`（圆柱碰撞体）会很完美，但它并不存在）。虽然`MeshCollider`（网格碰撞体）可以贴合桶的形状，但由于性能问题，`MeshCollider`不适用于物理\
  \ GameObject。Component 菜单中最接近的形状是`CapsuleCollider`（胶囊碰撞体）。所以，我们先在`Barrel` GameObject\
  \ 上添加一个 Capsule Collider，看看贴合度如何。\n\n虽然 Unity 在添加`Collider`组件时会尝试将其大小调整为适配 GameObject\
  \ 的网格，但本例中贴合度并不理想，这主要是因为，从 Transform 组件中的旋转参数可以看出，这个 GameObject 绕其 x 轴旋转了 90 度。如果没有这个旋转，桶会是侧躺的，但这个旋转也影响了\
  \ Collider 组件的朝向。为了调整旋转，将 Capsule Collider 的轴切换为 z 轴。之后，将半径设为 2，高度设为 6，就能使`CapsuleCollider`与桶更加匹配（图\
  \ 7-19）。\n\n![9781430248750_Fig07-19.jpg](img/9781430248750_Fig07-19.jpg)\n\n图 7-19。向\
  \ Barrel 添加`CapsuleCollider`\n\n胶囊体在侧面与桶的形状匹配得相当好，但在顶部和底部则不然，这些部位应该是平面，而不仅仅是胶囊体的端点。对于平面，`BoxColliders`（盒型碰撞体）显然是更好的选择。因此，在这种情况下，需要将多个碰撞体组件组合成一个*复合碰撞体*。\n\
  \n```js\nfunction CreatePins() {\n        pins = new Array();\n        var offset\
  \ = Vector3.zero;\n        for (var row=0; row<pinRows; ++row) {\n             \
  \   offset.z+=pinDistance;\n                offset.x=-pinDistance*row/2;\n     \
  \           for (var n=0; n<=row; ++n) {\n                         pins.push(Instantiate(pin,\
  \ pinPos+offset, Quaternion.identity));\n                         offset.x+=pinDistance;\n\
  \                }\n\n}\n}\n\nfunction Update() {\n        if (ball.transform.position.y<sunkHeight)\
  \ {\n                ResetEverything();\n        }\n}\n\nfunction ResetBall() {\n\
  \        ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n   \
  \     for (var pin:GameObject in pins) {\n                pin.BroadcastMessage(\"\
  ResetPosition\");\n        }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"\
  ResetPosition\");\n}\n\nfunction ResetEverything() {\n        ResetBall();\n   \
  \     ResetPins();\n        ResetCamera();\n}\n```\n\n\n\n### 添加复合碰撞体\n\nUnity 允许一个\
  \ `GameObject` 上存在多个 `Collider` 组件，但这些 `Collider` 必须是不同类型的。例如，不能将两个 `BoxCollider`\
  \ 组件附加到同一个 `GameObject` 上。然而，可以通过将每个原始类型的 `Collider` 组件附加到其自己的 `GameObject` 上，并将所有这些\
  \ `GameObject` 设为 `Rigidbody` 的 `GameObject` 的子级，从而将它们组合成一个复合碰撞体。这就是我们为“桶”（Barrel）组合一个\
  \ `CapsuleCollider` 组件和一个 `BoxCollider` 组件所采用的方法。为了容纳这两个 `Collider` 组件，在层级视图中为 `Barrel`\
  \ 创建两个子 `GameObject`，并根据其形状分别命名为 `box` 和 `capsule`（图 7-20）。\n\n![9781430248750_Fig07-20.jpg](img/9781430248750_Fig07-20.jpg)\n\
  \n图 7-20。用于复合碰撞体的子 GameObject\n\n与其从头创建一个新的 `CapsuleCollider` 组件，不如利用 `Barrel` GameObject\
  \ 上已经正确定向和调整大小的现有 `CapsuleCollider` 组件，通过复制该组件来实现。选择 `Barrel` GameObject，在检查器视图中，右键点击\
  \ `CapsuleCollider` 组件并选择 `Copy Component`（图 7-21）。\n\n![9781430248750_Fig07-21.jpg](img/9781430248750_Fig07-21.jpg)\n\
  \n图 7-21。复制一个组件\n\n然后再次选择 `capsule` GameObject，在检查器视图中右键点击其变换（Transform）组件，在弹出菜单中选择\
  \ `Paste Component As New`（图 7-22）。现在，`capsule` GameObject 拥有一个与之前为 `Barrel` GameObject\
  \ 创建的完全相同的 `CapsuleCollider` 组件，因此我们不再需要原来的那个了。选择 `Barrel` GameObject，右键点击刚刚复制过的\
  \ `CapsuleCollider` 组件，在弹出菜单中选择 `Remove Component` 来移除该 `CapsuleCollider` 组件。现在，`Barrel`\
  \ 的层级结构中应该只有一个 `CapsuleCollider` 组件了。\n\n![9781430248750_Fig07-22.jpg](img/9781430248750_Fig07-22.jpg)\n\
  \n图 7-22。粘贴一个组件\n\n现在将注意力转向 `BoxCollider` 组件。你可以使用组件菜单将其直接添加到 `box` GameObject 上，但如果你将\
  \ `BoxCollider` 组件添加到 `Barrel` GameObject 上，Unity 会自动为你将 `BoxCollider` 适配网格（Mesh）的大小。因此，让我们重复之前处理\
  \ `CapsuleCollider` 组件的过程，只不过这次换成 `BoxCollider`。选中 `Barrel` GameObject，使用组件菜单或 `AddComponent`\
  \ 按钮添加一个 `BoxCollider` 组件。在场景视图中，你可以看到 `BoxCollider` 包裹住了 `Barrel`（图 7-23）。\n\n\
  ![9781430248750_Fig07-23.jpg](img/9781430248750_Fig07-23.jpg)\n\n图 7-23。一个围绕 Barrel\
  \ 自动调整大小的 BoxCollider\n\n`BoxCollider` 从网格的顶部延伸到底部是可以接受的，因为这样可以在两端获得两个平坦的碰撞表面。但\
  \ `BoxCollider` 延伸到 Barrel 的弯曲部分之外就不太好了。通过在检查器视图中将其 `Size` 的 `x` 和 `y` 值降低到 `2.5`（请记住，Barrel\
  \ 是旋转过的）来减小 `BoxCollider` 的宽度。从场景视图的俯视图视角（点击场景万向节（Scene Gizmo）的 `y` 轴），你可以看到 `BoxCollider`\
  \ 现在正好位于桶的内部（图 7-24）。\n\n![9781430248750_Fig07-24.jpg](img/9781430248750_Fig07-24.jpg)\n\
  \n图 7-24。BoxCollider 适配在 Barrel 内部的俯视图\n\n既然已经将 `BoxCollider` 调整到理想大小，重复处理 `CapsuleCollider`\
  \ 的过程——在检查器视图中右键点击 `BoxCollider`，选择 `Copy Component`，选择 `box` GameObject，在检查器视图中右键点击其变换组件，选择\
  \ `Paste Component As New`。并且不要忘记返回 `Barrel` 上的 `BoxCollider` 组件，右键点击它并选择 `Remove\
  \ Component`。选中 `Barrel`，你应该能在场景视图中看到两个 `Collider` 组件同时显示，它们比单独使用任何一个 `Collider`\
  \ 组件都能更好地近似 Barrel 的形状（图 7-25）。\n\n![9781430248750_Fig07-25.jpg](img/9781430248750_Fig07-25.jpg)\n\
  \n图 7-25。显示的复合碰撞体中的两个碰撞体\n\n#### 更新预制件\n\n最后，既然 Barrel 已经准备就绪，在游戏对象菜单中，选择 `Apply\
  \ Changes To Prefab`（图 7-26）。\n\n![9781430248750_Fig07-26.jpg](img/9781430248750_Fig07-26.jpg)\n\
  \n图 7-26。将更改应用到 `BarrelPin` 预制件\n\n**提示** 建议执行 `Save Project` 或 `Save Scene`（这会隐式地执行\
  \ `Save Project`），以确保预制件的更改被真正保存。项目更改会在 Unity 正常退出时保存，但如果异常退出，则一切皆有可能。\n\n预制件更新后，场景中不再需要\
  \ `Barrel` GameObject，可以将其移除（`Command+Delete` 或从编辑（Edit）菜单中选择 `Delete`）。现在当你点击 `Play`\
  \ 时，桶不再会从地板掉下去，而且，如图 7-27 所示，当你滚向它们时，它们会被撞倒！\n\n![9781430248750_Fig07-27.jpg](img/9781430248750_Fig07-27.jpg)\n\
  \n图 7-27。撞击到桶上\n\n#### 复杂碰撞体（HyperBowl）\n\n为 `BarrelPin` 预制件创建的复合碰撞体仍相对简单，仅由两个原始\
  \ `Collider` 组件组成。根据所需近似的形状，复合碰撞体可以复杂得多。作为更真实的保龄球瓶的例子，可以看看 HyperBowl（图 7-28）。\n\n\
  ![9781430248750_Fig07-28.jpg](img/9781430248750_Fig07-28.jpg)\n\n图 7-28。HyperBowl\
  \ 保龄球瓶的复合碰撞体\n\nHyperBowl 中保龄球瓶的复合碰撞体由六个原始碰撞体组成：一个 `BoxCollider` 用于提供底部平面，一个 `CapsuleCollider`\
  \ 用于瓶颈，以及四个大小不一的 `SphereCollider` 用于填充瓶身和瓶顶。\n\n### 添加音效\n\n我们的保龄球游戏看起来不错了，但非常安静！你可以添加背景音乐或环境音效，例如舞蹈场景中的循环音乐。但保龄球游戏确实需要基于碰撞的音效，例如球的滚动声和每个球瓶的碰撞声。\n\
  \n#### 获取音效\n\n首先，我们需要找到一些声音文件。再次访问资源商店（Asset Store），导航到声音（Sound）类别，然后进入音效（Sound\
  \ Effects (FX)）子类别（图 7-29）。\n\n![9781430248750_Fig07-29.jpg](img/9781430248750_Fig07-29.jpg)\n\
  \n图 7-29。资源商店中免费音效的搜索结果\n\nBleep Blop Audio 的 Free SFX Package 提供了多种多样的音频剪辑，让我们下载这个资源包。这些文件会出现在项目视图（Project\
  \ View）中名为 `Assets` 的文件夹里，该文件夹位于你的 `Assets` 文件夹内（向资源商店提交资源包有点复杂，所以这种文件组织方式可能不是故意的）。\n\
  \n#### 添加滚动音效\n\n可以随意选择并播放各种声音，方法是在检查器视图中选中它们并点击 `Play` 按钮。但现在，我们将使用 `Sci-Fi Ambiences`\
  \ 声音作为球的滚动音效。这个声音作为球滚动音效并不完美，但它在这个资源包中是唯一适合循环播放的 `AudioClip`（图 7-30）。\n\n\n\n![9781430248750_Fig07-30.jpg](img/9781430248750_Fig07-30.jpg)\n\
  \n图 7-30. 用于球滚动声音的 `AudioClip`\n\n将 `AudioClip` 拖拽到层级视图中的球 `GameObject` 上，并选中球。检查器视图应显示一个自动创建的新\
  \ `AudioSource` 组件，该组件引用了 `AudioClip`（图 7-31）。\n\n![9781430248750_Fig07-31.jpg](img/9781430248750_Fig07-31.jpg)\n\
  \n图 7-31. 带有 `AudioSource` 的球的检查器视图\n\n滚动声音将由脚本控制，不会自动播放，因此请确保取消选中 **Play on Awake**\
  \ 复选框。但是，当滚动声音播放时，它应持续播放直到被告知停止，因此应选中 **Loop** 复选框。\n\n`AudioClip` 是一个 3D 声音，如 `AudioSource`\
  \ 组件中 `AudioClip` 名称下方所示。这意味着声音会随着 `AudioSource` 组件和 `AudioListener` 组件（附加在主摄像机上）之间的距离而衰减。衰减由\
  \ `AudioSource` 组件底部显示的图形指定。您可以通过选择 **Volume Rolloff** 选项并指定 **Min Distance** 来调整衰减，**Min\
  \ Distance** 指定了衰减开始的距离。如果 `AudioListener` 与 `AudioSource` 的距离小于 **Min Distance**，则声音完全不会衰减。或者，您也可以通过拖动曲线上的手柄来直接操纵衰减曲线。\n\
  \n**提示** 如果您在听到`AudioSource`声音时遇到问题，请尝试从一个较高的 **Min Distance** 开始，以确保你能听到其最大音量，然后根据需要调整\
  \ **Min Distance** 和衰减曲线。\n\n播放滚动声音的脚本将附加到球上。创建一个新的 JavaScript 文件，将其放置在 Scripts\
  \ 文件夹中，并命名为 `FuguBallSound`。然后将清单 7-6 的内容添加到脚本中。\n\n清单 7-6. 用于球滚动声音的 `FuguBallSound.js`\
  \ 脚本\n\n```\n#pragma strict\n\nvar minSpeed:float = 1.0;\nprivate var sqrMinSpeed:float\
  \ = 0;\n\nfunction Awake() {\n        sqrMinSpeed = minSpeed*minSpeed;\n}\n\nfunction\
  \ OnCollisionStay(collider:Collision) {\n        if (collider.gameObject.tag ==\
  \ \"Floor\") {\n                if (rigidbody.velocity.sqrMagnitude>sqrMinSpeed)\
  \ {\n                         if (!audio.isPlaying) {\n                        \
  \         audio.Play();\n                         }\n                }  else {\n\
  \                         if (audio.isPlaying) {\n                             \
  \    audio.Stop();\n                         }\n                }\n        }\n}\n\
  \nfunction OnCollisionExit(collider:Collision) {\n        if (collider.gameObject.tag\
  \ == \"Floor\") {\n                if (audio.isPlaying) {\n                    \
  \     audio.Stop();\n                }\n        }\n}\n```\n\n该脚本与 `FuguForce` 脚本有一些相似之处，因为两个脚本都使用碰撞回调来跟踪球的滚动状态，并通过检查碰撞\
  \ `GameObject` 的标签来判断是否为地板。`FuguBallSound` 只使用了 `OnCollision` 回调中的两个：`OnCollisionStay`\
  \ 和 `OnCollisionExit`。没有实现 `OnCollisionEnter`，因为那会与 `OnCollisionStay` 重复（`FuguForce`\
  \ 脚本其实也不需要 `OnCollisionEnter`）。脚本的两个碰撞回调都引用了此组件的 `audio` 变量，这等同于此组件所属 `GameObject`\
  \ 的 `audio` 变量，并引用了附加的 `AudioSource`。\n\n当球在地板上时，`OnCollisionStay` 会检查球是否以高于最低速度的速度移动，该最低速度在公共变量\
  \ `minSpeed` 中指定，以便在检查器视图中进行调整。脚本实际上比较的是球速的平方与 `minSpeed` 的平方，以避免平方根计算的计算开销。如果球在地板上且移动得足够快，并且球的\
  \ `AudioSource` 尚未播放其 `AudioClip`，则脚本会开始播放 `AudioClip`。如果球的速度降得足够低，滚动声音将停止。\n\n\
  `OnCollisionExit` 的工作更简单，它只需要检查音频是否正在播放，如果是，则停止播放音频。换句话说，如果球因弹起或滚落而失去与地板的接触，则滚动声音停止。\n\
  \n将脚本拖拽到层级视图中的球上（图 7-32），然后单击“播放”进行测试。当球滚动时，滚动声音应该变得可闻，而当球静止时，声音应该停止。\n\n![9781430248750_Fig07-32.jpg](img/9781430248750_Fig07-32.jpg)\n\
  \n图 7-32. 附加到球 `GameObject` 上的 `FuguBallSound` 脚本\n\n### 添加保龄球瓶碰撞声音\n\n现在准备好处理保龄球瓶的声音了。这里我们使用来自\
