    \n[Figure 7-13](#9781430248750_Ch07.xhtml#_Fig13). Game controller properties\
    \ in FuguBowl.js to support resetting the ball\n\nNow when the Ball rolls off\
    \ the Floor, the Ball, Main Camera and pins should pop right back into their beginning\
