  trans: 'Figure 3-39. 新导入纹理的**项目视图**


    选择纹理并在**检查器视图**（Figure 3-40）中检查其导入设置。默认的纹理类型 `Texture` 是预设类型，通常适用于应用在模型上的纹理。如果存在未应用的导入设置，`Apply`
    按钮会处于启用状态，需要点击该按钮（否则 Unity 会在尝试使用纹理时提示你）。


    ![9781430248750_Fig03-40.jpg](img/9781430248750_Fig03-40.jpg)


    Figure 3-40. 已导入纹理的**检查器视图**


    请注意底部的预览面板如何总结纹理的导入大小和格式。原始图像文件未做任何更改，因此导入文件实际上会创建一个适合我们目标平台的原始副本。你完全不必担心会搞乱原始资源。实际上，你随时可以在项目视图中右键单击它并选择
    `Reimport` 来重新开始。


    **注意**   我们一直泛称 *texture* 且未大写。实际上存在一个 `Texture` 类，它是所有纹理类型的父类，但通过导入图片文件创建的纹理资源，其实际类名是
    `Texture2D`（`Texture` 的其他子类包括 `Texture3D`、`MovieTexture` 和 `RenderTexture`）。


    要将纹理应用到立方体上，请在层级视图中将纹理拖到立方体上。这会自动创建一个使用该纹理的材质，并将该材质应用到立方体上，替换掉之前的材质（Figure 3-41）。


    ![9781430248750_Fig03-41.jpg](img/9781430248750_Fig03-41.jpg)


    Figure 3-41. 应用到立方体的纹理


    在项目视图中，你现在可以看到新创建的材质被放置在纹理旁的一个 Materials 文件夹中。现在，如果你再次点击“播放”，立方体看起来就很酷了！（Figure
    3-42）。


    ![9781430248750_Fig03-42.jpg](img/9781430248750_Fig03-42.jpg)


    Figure 3-42. 带有纹理的立方体的**游戏视图**


    ## 逛逛资源商店


    Unity 的标准资源中并没有内置纹理库（尽管各种包中使用了大量纹理）。不过，Unity 资源商店作为一个提供 Unity 就绪资源的市场，有若干免费的纹理包。方便的是，资源商店已集成到
    Unity 编辑器中。在 **Window** 菜单下（Figure 3-43），选择 **Asset Store** 项。


    ![9781430248750_Fig03-43.jpg](img/9781430248750_Fig03-43.jpg)


    Figure 3-43. 从 **Window** 菜单中选择 **Asset Store**


    这将打开资源商店窗口并显示其首页（Figure 3-44），页面列出了最新发布（包括付费和免费）的资源、分类以及精选项目。


    ![9781430248750_Fig03-44.jpg](img/9781430248750_Fig03-44.jpg)


    Figure 3-44. Unity 资源商店


    我们来寻找一些免费的纹理。点击页面右上部分的 **Textures & Materials** 分类，然后选择左侧 **Sort By** 部分中的 **Price**（Figure
    3-45）。


    ![9781430248750_Fig03-45.jpg](img/9781430248750_Fig03-45.jpg)


    Figure 3-45. 资源商店上的免费纹理


    这里有很多不错的候选资源，但如果向下滚动，你应该能找到我最喜欢的免费纹理库——**Free ArtskillZ Texture Pack**。点击它以查看完整的产品页面（Figure
    3-46）。页面包含产品描述、截图、单个文件列表以及用户评价。


    ![9781430248750_Fig03-46.jpg](img/9781430248750_Fig03-46.jpg)


    Figure 3-46. 资源商店上的 **Free ArtskillZ Texture Pack**


    ## 导入纹理


    点击 `Import` 按钮，你会看到与导入内置 Unity 资源时相同的导入窗口。继续操作，导入所有内容。


    现在，你会在项目视图中找到所有这些纹理，它们被分类到三个文件夹中（Figure 3-47）。


    ![9781430248750_Fig03-47.jpg](img/9781430248750_Fig03-47.jpg)


    Figure 3-47. ArtskillZ 纹理的**项目视图**


    带有蓝色图标的纹理是法线贴图，并在其纹理类型字段中标注为 Normal map。法线贴图可以模拟出非平坦表面的视觉效果（有时会使用术语 *bump map*，尽管在技术上并不完全相同）。


    ## 应用纹理


    首先，我们尝试 `ScifiPanel01` 纹理。将其拖到立方体上，Unity 会自动创建一个以该纹理命名的新材质，并将此材质应用到立方体上。但我们想使用与该纹理配套的法线贴图，因此，在检查器视图中使用材质的着色器选择器，将着色器更改为
    `Bumped Specular`。此着色器接受一个名为 Normalmap 的第二纹理，并有一个用于控制 Shininess 属性的滑动条（需要注意的是，该滑块向左移动时数值趋向
    1，向右移动时趋向 0）。将法线贴图纹理 `ScifiPanel01_n` 拖到 Normalmap 字段中（Figure 3-48）。


    ![9781430248750_Fig03-48.jpg](img/9781430248750_Fig03-48.jpg)


    Figure 3-48. 应用到立方体的 Scifi 纹理


    点击“播放”，你现在会看到带有纹理的立方体（Figure 3-49）。


    ![9781430248750_Fig03-49.jpg](img/9781430248750_Fig03-49.jpg)


    Figure 3-49. 应用了高光凹凸贴图纹理的立方体的**游戏视图**


    你也可以使用项目视图中的搜索字段来搜索免费纹理。在后续章节中，当我们用到更多资源商店包时，将会使用该选项。


    ## 进一步探索


    本章似乎涵盖了大量内容（绝非双关）来创建一个简单的静态场景，但在此过程中，我们探索了许多基本的 Unity 概念，特别是组件与游戏对象之间的关系。因此，你现在拥有了一个包含凹凸贴图和纹理的立方体场景，该立方体由一个带有光晕的点光源照亮，并被天空盒包围。该场景中的资源是从本地文件、Unity
    标准资源和 Unity 资源商店导入的。由于主相机上附加了 `MouseOrbit` 脚本，场景也并非完全静止。脚本编写将在本书中扮演主导角色，从下一章开始，我们将超越静态场景。


    在继续之前，休息一下，回顾一下 Unity 官方文档中关于目前已使用功能的部分，哪怕只是为了熟悉在哪里可以找到这些文档，以便将来参考。


    ### Unity 手册


    Unity 手册的 Unity 基础部分主要与上一章相关，描述了用户界面，但该部分确实有一个“创建场景”页面。更相关的是“构建场景”部分，它描述了游戏对象、组件和脚本之间的关系，如何使用检查器视图编辑组件属性，以及如何在场景视图中导航和移动游戏对象——这些内容在本章中都已涵盖。灯光和相机也做了讲解。本节列出但本书不会使用的一个功能是地形引擎（它在
    Unity iOS 中可用，但速度较慢）。不过，地形是一个重要且令人印象深刻的 Unity 功能，值得一读。“资源导入与创建”部分描述了本章中使用的资源类型：网格、材质、纹理和脚本。导入资源的过程以及资源商店也在该部分做了说明。'
- fmt: '# We haven’t arrived at a point where we have gameplay, but the “Creating
    Gameplay” section has a page on “Transforms,” which as we saw is fundamental to
    understand even just for placing static GameObjects.


    ## Reference Manual


    Getting more in depth than the Unity Manual, the Reference Manual describes each
    Component in detail, explaining its properties and documenting the use of the
    Component. The Reference Manual also documents the asset types and gives an explanation
    of GameObject.


    As a rule, you should read the Reference Manual documentation for every Component
    and asset type you use. Remember, there is a Help icon on each Component in the
    Inspector View that will bring up the appropriate Reference Manual page when you
    click it. Like the Unity Manual, the Reference Manual is available not just from
    the Unity Help menu but also on the Unity web site under the Learn tab (which
    can be reached directly at `http://docs.unity3d.com/`). The “Settings Manager”
    section of the Reference Manual includes a page on the Render Settings, which
    is where the Skybox in this chapter was assigned. The “Transform Components” section
    lists just one Component, naturally, the Transform Component, which is attached
    to every GameObject.


    The “Mesh Components” section is more interesting, as it describes both the MeshFilter
    and MeshRenderer Components necessary for any GameObject with Mesh, such as the
    Cube created in this chapter. The “Rendering Components” section is more bountiful,
    yet, featuring the Camera Component and its associated GUILayer Component and
    FlareLayer. The Light Component is also documented here. Although assets aren’t
    really Components, the Reference Manual has a section titled “Asset Components,”
    which lists the various asset classes. In this chapter, Flare, Material, Mesh
    and Texture2D were incorporated into the scene (remember that Skybox is really
    a Material).


    The most fun reading is in the section titled “Built-In Shader Guide,” which describes
    in detail (and with pictures) all of the built-in shaders, ranging from the simple
    and fast to very fancy. The Cube in this chapter started out with the default
    Diffuse shader and was replaced with a deluxe Specular Bump Map shader. As mentioned
    in this chapter, a shader is really a program, so if you can’t find a built-in
    shader that suits your needs, you can write your own by following the examples
    and instructions in the “Shader Reference” section.


    ## Asset Store


    This chapter begins our book-long practice of using free assets from the Unity
    Asset Store. I recommend browsing the Asset Store regularly to check the latest
    releases. Besides the free textures, models, and scripts, there are plenty of
    reasonably priced packages that can save you a lot of time and work. The Asset
    Store can also be viewed with a regular web browser at `http://assetstore.unity3d.com/`
    (but without the ability to purchase or download any assets).


    ## Computer Graphics


    Computer graphics is a huge and intricate area of study. This chapter worked with
    3D models, textures, bump maps, light flares, skyboxes, and we’re just getting
    started. So it’s well worth reading up on basic (and advanced) computer graphics,
    such as the popular and comprehensive text *Real-Time Rendering*, by Tomas Akenine-Möller,
    Eric Haines, and Naty Hoffman. Mark Haigh-Hutchinson’s *Real-Time Cameras* is
    an entire book devoted to the subject of virtual Cameras and their control schemes.


    I won’t be covering the process of creating assets that can be imported into Unity,
    but Luke Ahearn has two books that may be generally helpful: *3D Game Textures:
    Create Professional Game Art Using Photoshop* and *3D Game Environments: Create
    Professional 3D Game Worlds.* And you can tell from the title of Wes McDermott’s
    *Creating 3D Game Art for the iPhone with Unity* that it’s an appropriate complementary
    text for this book.


    # Chapter 4: Making It Move: Scripting the Cube


    Now that you know how to construct a static 3D scene by placing GameObjects, it’s
    time to make the scene dynamic, and more interesting, by adding movement to GameObjects
    while the game is played. After all, a 3D graphics scene is nice, but an animated
    3D graphics scene is even better!


    But applying animation data isn’t the only way to move a GameObject. Making a
    GameObject physical will cause it to move in response to collisions and forces,
    including gravity. And a script can also move a GameObject by changing the position
    and/or rotation values in its Transform Component. In fact, any method for moving
    a GameObject, whether it’s animation, physics, or a script, ultimately changes
    the Transform Component, which always represents the position, rotation and scale
    of the GameObject.


    This chapter will focus on moving GameObjects by scripting, demonstrating how
    to rotate the formerly static Cube created in the previous chapter and even introducing
    tween-style animations implemented with the open-source iTween library. In the
    process, I’ll present basic concepts and tools (editing and debugging) of the
    Unity scripting system.


    The scripts you’ll be writing are available on `http://learnunity4.com/` in the
    project for this chapter, but I recommend creating them from scratch. You have
    the best chance of understanding how code works (and doesn’t work) when you type
    it in yourself.


    ## Organize the Assets


    It’s easier to view and browse assets in the Project View when they’re partitioned
    by type. So before you start adding scripts, this is a good time to get organized
    and create some folders for the scripts and textures in the project.


    Launch the Unity Editor, if you don’t already have it open from the previous chapter,
    and make sure you have the project from the previous chapter loaded and the cube
    scene open. Then click the Create button in the top left of the Project View ([Figure
    4-1](#9781430248750_Ch04.xhtml#Fig1)) to bring up a menu of new assets that you
    can add to the project (alternatively, you can right-click in the Project View
    and select the Create submenu). Select the Folder item in the menu, and a folder
    titled New Folder will appear in the Project View. Rename the folder to Textures
    and drag any textures into it that you imported in the previous chapter (like
    my cat photo). Although you haven’t created any scripts, yet, go ahead and create
    a Scripts folder, too.


    ![9781430248750_Fig04-01.jpg](images/9781430248750_Fig04-01.jpg)


    [Figure 4-1](#9781430248750_Ch04.xhtml#_Fig1). Creating a Textures folder in the
    Project View


    ## Create the Script


    Select the newly-added Scripts folder and then, also from the Create menu of the
    Project View, select JavaScript ([Figure 4-2](#9781430248750_Ch04.xhtml#Fig2)).
    A script called `New Behaviour` (U.S. readers, you’ll just have to get used to
    the British spelling) will appear in the Scripts folder. If you accidentally created
    the new script file outside the Scripts folder, just drag the script into the
    folder.


    **Note**   Although the Create menu in the Project View lists “Javascript,” with
    just the first letter capitalized, I’ll pretend it says “JavaScript,” which is
    the official capitalization and used in the Unity documentation (who knows, a
    Unity update may fix the menu spelling at any time). Also, this book will use
    the phrase “a JavaScript” to refer to a script, instead of the more correct but
    clumsier-to-say “a JavaScript script.”


    ![9781430248750_Fig04-02.jpg](images/9781430248750_Fig04-02.jpg)


    [Figure 4-2](#9781430248750_Ch04.xhtml#_Fig2). Creating a JavaScript


    Since this new file is a JavaScript, it has a `.js` extension. The Project View
    does not display filename extensions, but the language of the script is evident
    from its icon ([Figure 4-3](#9781430248750_Ch04.xhtml#Fig3)). And if the script
    is selected, its full name is shown in the line at the bottom of the Project View.


    ![9781430248750_Fig04-03.jpg](images/9781430248750_Fig04-03.jpg)'
