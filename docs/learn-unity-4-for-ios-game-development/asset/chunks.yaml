- fmt: '`[9781430248750_Fig16-26.jpg](images/9781430248750_Fig16-26.jpg)` [Figure
    16-26](#9781430248750_Ch16.xhtml#_Fig26). Optimizing the Floor


    Turning to physics, there is another opportunity for optimization. Although we
    have primitive colliders for the bowling pins and bowling ball, our Floor has
    a `MeshCollider` Component. Because the Floor is a flat and square surface, you
    could use a `BoxCollider` instead. Replacing it is a simple process: when you
    add a `BoxCollider` Component to the Floor, either using the Add Component button
    in the Inspector View or the Component menu on the menu bar, Unity asks if you
    want to replace the existing `MeshCollider` (say yes), and the new `BoxCollider`
    Component will automatically be sized to fit the Floor mesh.


    As with the bowling pins, you could also change the shader from the fairly complex
    Bumped Specular shader to `Mobile/VertexLit (Only Directional Lights)`, as we
    did with our bowling pin prefab. But the floor is a special case because it’s
    flat. The lighting across its surface is uniform. So you can use the `Unlit Texture`
    shader and avoid any lighting calculations at all.


    ## Ball


    The last GameObject we will optimize is the Ball. It’s already using a `SphereCollider`
    Component, so the one thing we’ll change is the shader. Like the bowling pins,
    the Ball is going to move, so let’s use a lit shader, in particular the same `Mobile/VertexLit
    (Only Directional Light)` shader that we selected for the pins. However, the Ball
    is currently using the default diffuse Material that was automatically assigned
    when you created the Ball, and you can’t change the shader on that Material. So
    you’ll need to assign a different Material to the Ball.


    You can create a new Material in the same way you created the other types of assets.
    In the Project View, bring up the Create menu and select Material ([Figure 16-27](#9781430248750_Ch16.xhtml#Fig27)).


    `![9781430248750_Fig16-27.jpg](images/9781430248750_Fig16-27.jpg)`


    [Figure 16-27](#9781430248750_Ch16.xhtml#_Fig27). Creating a new Material


    Place the new Material in the Materials folder and name it Ball. Select it ([Figure
    16-28](#9781430248750_Ch16.xhtml#Fig28)), and in the Inspector View you can adjust
    its shader, selecting `Mobile/VertexLit (Directional Light)`.


    `![9781430248750_Fig16-28.jpg](images/9781430248750_Fig16-28.jpg)`


    [Figure 16-28](#9781430248750_Ch16.xhtml#_Fig28). Setting the shader for a new
    Material


    Then drag the Ball material onto the Ball GameObject, and you’re all set ([Figure
    16-29](#9781430248750_Ch16.xhtml#Fig29)).


    `![9781430248750_Fig16-29.jpg](images/9781430248750_Fig16-29.jpg)`


    [Figure 16-29](#9781430248750_Ch16.xhtml#_Fig29). Optimizing the Ball


    Both of the `Mobile/VertexLit` shaders will display a white color if no texture
    is supplied. If you want the ball to have a color other than white, you would
    use the standard Vertex Lit shader, which allows you to specify a Main Color and
    Specular (shininess) Color.


    ## Optimize Assets


    It’s easy to overlook the fact that a lot of optimization can take place when
    the asset is imported, and you have control over this in the Import Settings for
    each asset.


    ### Textures


    Our textures are already imported with reasonable default settings, but let’s
    look at a couple of textures so we can understand those settings. In the Project
    View, let’s look in the Textures folder and compare the cat texture we used for
    the example scene in Chapter 3 ([Figure 16-30](#9781430248750_Ch16.xhtml#Fig30))
    and the texture we used for the secondary splash screen in Chapter 12 ([Figure
    16-31](#9781430248750_Ch16.xhtml#Fig31)). The cat texture used the Import Settings
    corresponding to the Texture preset, while the splash texture used the Import
    Settings of the GUI preset. In both cases, switching from the preset to Advanced
    reveals the specific settings of the preset.


    `![9781430248750_Fig16-30.jpg](images/9781430248750_Fig16-30.jpg)`


    [Figure 16-30](#9781430248750_Ch16.xhtml#_Fig30). Import Settings for a texture


    `![9781430248750_Fig16-31.jpg](images/9781430248750_Fig16-31.jpg)`


    [Figure 16-31](#9781430248750_Ch16.xhtml#_Fig31). Import Settings for a GUITexture


    There are two major differences between the Texture and GUI presets: Texture has
    Mip Mapping enabled, while GUI has the sRGB bypass option enabled. The *mip* in
    mipmapping stands for the phrase *multim in parvo*, meaning “many in little.”
    Mipmaps are precomputed smaller versions of the texture that provide a smoother
    visual quality and transition as the texture comes nearer or farther away from
    the Camera.


    The filter type determines how a pixel from the texture (or *texel*) is calculated
    for rendering purposes. For point filtering, the texel is chosen from the mip
    map closest to the desired size. Bilinear filtering averages the surrounding texels
    from the closest smaller mipmap, while trilinear filtering combines the bilinear
    filtering results from the closest larger mipmap and the closest smaller mipmap.
    Point sampling is the simplest and fastest filter, while trilinear filtering is
    the most expensive. Bilinear filtering is the middle ground and a reasonable default.


    Mipmapping is usually appropriate, despite the increased memory usage. Besides
    improving the texture display, mipmapping allows the graphics processor to work
    with a smaller version of the texture, which can improve performance. For a texture
    used in a GUI (e.g., UnityGUI or GUITexture), you’ll typically view the texture
    at just one size, and ideally at the texture’s original size, so mipmapping is
    unnecessary. That’s certainly true for the splash screen, especially when it isn’t
    even loaded into a scene.


    **Tip** For a texture with sharp details (e.g., one use as a street sign), it
    may be better to use point sampling or even disable mipmapping entirely to avoid
    blurring the texture.


    The anisotropic (directionally dependent) filtering level compensates for the
    case where a texture is tilted with respect to the Camera, such as the road surface
    in a racing game. In those cases, filtering uniformly across a texture in both
    directions may not look right. For regular textures in a scene, the anisotropic
    level should be chosen on a case-by-case basis. For GUI textures, which are viewed
    face on from the Camera, no anisotropic filtering is required.


    Normally, textures are imported taking into account gamma space, the nonlinear
    color space of screens. In general, this isn’t necessary for GUI textures, so
    in those cases, the bypass sRGB option is selected. If it doesn’t look quite right,
    try both options.


    For mipmapping, textures need to be square and have dimensions that are a power
    of two (POT), because mip maps are generated at successively halved dimensions.
    For example, a 256 × 256 texture would have mip maps at 128 × 128, 64 × 64, and
    so on. Even a non-mipmapped texture benefits from POT dimensions, because that’s
    what the graphics hardware ultimately uses. Most textures designed for games have
    POT dimensions, but if they don’t, the Texture imports settings can automatically
    size the texture to the nearest POT.


    For GUI textures, you usually don’t want this. Our splash screen has None set
    for its POT scaling, and the resulting preview displays its original dimensions
    and NPOT (Non-Power of Two). If you try to use it as a regular texture in the
    scene, Unity will issue a warning in the Console View that you’re using a NPOT
    texture in a non-GUI way and will incur a performance penalty.


    The max texture size and compression level of the texture are listed in the preset
    settings and are specified independently of the presets. For regular textures,
    the default Max Size of 1024 is reasonable (2048 × 2048 is the maximum supported
    by all devices), but it should be chosen on a case-by-case basis. For example,
    if a large texture has just one color, you might as well make it a 2 × 2 texture.'
