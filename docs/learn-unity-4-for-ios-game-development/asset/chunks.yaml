  trans: '

    ![9781430248750_Fig11-21.jpg](img/9781430248750_Fig11-21.jpg)


    图 11-21. 在 iTunes Connect 中上传应用图标和截图


    `iTunes Connect` 要求必须上传图标和至少一张截图，否则无法继续操作，尽管我们实际上需要为应用支持的每种屏幕类型（宽高比）都上传截图。如果一款
    Unity iOS 应用同时为 iPhone 和 iPad 构建，那么就需要为所有三类设备上传截图，大致对应 iPhone 4、iPhone 5 和 iPad。


    > **警告**   `iTunes Connect` 的超时时间很短。如果在此页面完成之前超时，整个应用描述会消失，你将不得不从头开始。这就是我们提前准备好图标和截图的原因。


    ## 为上传做准备


    填完上一节的数据，进入下一页后，我们几乎就完成了。此时应用的当前状态是**准备上传**（图 11-22）。


    ![9781430248750_Fig11-22.jpg](img/9781430248750_Fig11-22.jpg)


    图 11-22. 处于**准备上传**状态的应用


    在提交应用之前，必须先点击 **查看详情** 按钮，返回到版本信息页面（图 11-23）。


    ![9781430248750_Fig11-23.jpg](img/9781430248750_Fig11-23.jpg)


    图 11-23. iTunes Connect 中的 **准备上传二进制文件** 按钮


    该页面右上角现在出现了一个 **准备上传二进制文件** 按钮。点击它，`iTunes Connect` 会询问应用是否使用加密技术，这是出于出口法规的考虑（图
    11-24）。


    ![9781430248750_Fig11-24.jpg](img/9781430248750_Fig11-24.jpg)


    图 11-24. 在 iTunes Connect 中检查应用是否包含加密功能


    最后，`iTunes Connect` 会显示一条消息，提示你可以使用名为 `Application Loader` 的程序上传应用。忽略它——你可以在 `Xcode`
    中直接上传（而且这条消息本身也已过时）。之后，你会回到应用页面，此时应用状态显示为 **等待上传**（图 11-25）。


    > **警告**   **准备上传** 和 **等待上传** 的状态颜色难以区分，因此很容易忘记完成 **准备上传** 步骤。


    ![9781430248750_Fig11-25.jpg](img/9781430248750_Fig11-25.jpg)


    图 11-25. iTunes Connect 中处于 **等待上传** 状态的应用


    ## 提交应用


    现在你已准备好提交应用。返回 `Xcode`，选择你的项目和构建目标。在 **构建设置** 中，向下滚动并选择 **分发配置文件**（图 11-26）。


    ![9781430248750_Fig11-26.jpg](img/9781430248750_Fig11-26.jpg)


    图 11-26. 在 Xcode 中为 Release 构建选择分发配置文件


    从菜单栏的 **项目** 菜单中选择 **清理**，这将确保你用 **分发配置文件** 重新构建所有内容（图 11-27）。


    ![9781430248750_Fig11-27.jpg](img/9781430248750_Fig11-27.jpg)


    图 11-27. 在 Xcode 中归档前先清理构建


    接着选择 **归档**，这将为应用构建一个分发版本（图 11-28）。


    ![9781430248750_Fig11-28.jpg](img/9781430248750_Fig11-28.jpg)


    图 11-28. 在 Xcode 中归档构建以备分发


    构建完成后，**管理器** 窗口会弹出，显示应用并带有 **验证** 和 **分发** 按钮（图 11-29）。


    ![9781430248750_Fig11-29.jpg](img/9781430248750_Fig11-29.jpg)


    图 11-29. Xcode 管理器窗口中的归档分发构建

    '
- fmt: '这里有一个`Estimate Size`按钮。你的应用在App Store上架前会经过Apple处理，这会增加应用体积。点击此按钮能让你预估应用的最终大小。


    点击`Validate`按钮将检查应用是否会因各种构建或打包问题（例如，应用是使用开发描述文件而非分发描述文件构建的）而被立即拒绝。


    **提示** 我发现使用`Validate`按钮并不能节省时间，因为`Validate`报告的任何错误都会在应用提交过程中被迅速报告。总体而言，直接提交应用效率更高。


    点击`Distribution`按钮将启动应用提交流程，该流程由一系列弹出窗口组成（[Figure 11-30](#9781430248750_Ch11.xhtml#Fig30)）。


    ![9781430248750_Fig11-30.jpg](images/9781430248750_Fig11-30.jpg)


    [Figure 11-30](#9781430248750_Ch11.xhtml#_Fig30). 在Xcode Organizer中向App Store提交应用时的第一个弹出窗口


    第一个弹窗主要询问你希望对应用执行什么操作。默认选项`Submit to the iOS App Store`就是你需要的，所以直接点击`Next`，这将带你进入另一个弹窗，询问你要提交哪个应用以及你为该应用使用了哪个分发描述文件（[Figure
    11-31](#9781430248750_Ch11.xhtml#Fig31)）。


    ![9781430248750_Fig11-31.jpg](images/9781430248750_Fig11-31.jpg)


    [Figure 11-31](#9781430248750_Ch11.xhtml#_Fig31). 在Xcode Organizer中为应用提交选择应用和描述文件


    应用下拉列表包含了你在iTunes Connect上状态为`Waiting for Upload`的所有应用。选择你要提交的应用（如果它不在列表中，你可能忘记在iTunes
    Connect中为该应用点击`Ready to Upload`按钮）。


    在选择匹配的应用和分发描述文件并点击`Next`后，应用将被上传到Apple进行提交。如果一切顺利，最终屏幕将显示你的应用已提交到App Store（[Figure
    11-32](#9781430248750_Ch11.xhtml#Fig32)）。


    ![9781430248750_Fig11-32.jpg](images/9781430248750_Fig11-32.jpg)


    [Figure 11-32](#9781430248750_Ch11.xhtml#_Fig32). 在Xcode Organizer中成功提交应用


    然后就是等待Apple批准或拒绝应用。


    **提示** 提交后重新登录iTunes Connect并验证应用状态是否为`Waiting for Review`是一个好主意。即使应用二进制文件有效，审核也可能因例如缺少截图而被搁置。


    你最终会收到一封电子邮件，通知你应用已在App Store上可用、已被拒绝，或者Apple需要更多时间来审核。此回复通常会在提交后几周内到达，但我曾有过应用在24小时内被接受，或在两个月后被拒绝的经历。当审核期延长时，Apple通常会发送一封电子邮件，说明他们需要更多时间来审核你的应用。


    ## 为拒绝做好准备


    如果应用被拒绝，电子邮件将告知你返回iTunes Connect中的应用，点击`Resolution Center`按钮查看并选择性地回应拒绝原因，这些原因可能包括技术问题、崩溃Bug或违反Apple的App
    Store审核指南（在注册成为iOS开发者后，你可以在Apple开发者网站上阅读该指南）。


    如果你选择修改应用，你必须在再次上传前点击`Reject Binary`和`Ready for Upload`。如果你认为拒绝不合理，`Resolution
    Center`也允许你向App Review Board提出申诉。


    如果被接受，并且你在iTunes Connect中选择了自动发布选项，应用将很快出现在App Store上。否则，应用将处于`Pending Developer
    Release`状态，直到你登录iTunes Connect，点击应用的`View Details`，然后点击`Release this Version`按钮。


    ## 更新应用


    应用被批准后，你可以随时返回iTunes Connect中的应用页面，点击`View Details`来编辑应用描述，修改后的文本将在几小时内显示在App
    Store上。iTunes Connect页面还会显示一个`Add New Version`按钮。点击此按钮将引导你完成原始提交流程的简化版本，以提交应用更新。除了包ID（bundle
    ID）外，你可以更改几乎所有详细信息，但唯一需要更改的是增加包版本（bundle version）。


    **提示** 更新应用时，请记住同时增加iTunes Connect和Unity Player Settings中的包版本。


    请注意，包ID中以句点分隔的组成部分被视为数字而不是字符串，因此将版本`247`更新为`2.049`是（令人惊讶地）可以的，因为它比较的是数字`47`和`49`（[Figure
    11-33](#9781430248750_Ch11.xhtml#Fig33)）。


    ![9781430248750_Fig11-33.jpg](images/9781430248750_Fig11-33.jpg)


    [Figure 11-33](#9781430248750_Ch11.xhtml#_Fig33). 在iTunes Connect中成功将应用版本号从`2.47`升级到`2.049`


    但是，将版本`1.65`更新为`1.7`会比较数字`65`和`7`，这会导致提交错误消息（[Figure 11-34](#9781430248750_Ch11.xhtml#Fig34)）。


    ![9781430248750_Fig11-34.jpg](images/9781430248750_Fig11-34.jpg)


    [Figure 11-34](#9781430248750_Ch11.xhtml#_Fig34). 在Xcode Organizer中未能成功将应用版本号从`1.65`更新为`1.7`


    ## 跟踪销售情况


    应用的第一版本在App Store上架后，你可以通过登录iTunes Connect并点击`Payments and Financial Reports`链接来跟踪其下载量和收入（如果是付费应用）。结果页面会显示基于时间的销售图表、按国家/地区划分的销售明细以及生成报告的选项（[Figure
    11-35](#9781430248750_Ch11.xhtml#Fig35)）。


    ![9781430248750_Fig11-35.jpg](images/9781430248750_Fig11-35.jpg)


    [Figure 11-35](#9781430248750_Ch11.xhtml#_Fig35). iTunes Connect中的`Payment and
    Financial Reports`页面


    ## 发放促销代码


    对于应用的每个版本，Apple会提供50个促销代码，可用于在App Store免费下载应用（即使是免费应用也提供促销代码，尽管在这种情况下使用它们意义不大）。要获取应用的促销代码，请在iTunes
    Connect中点击该版本应用的`View Details`，然后点击右上角的`Promo Codes`按钮（[Figure 11-36](#9781430248750_Ch11.xhtml#Fig36)）。


    ![9781430248750_Fig11-36.jpg](images/9781430248750_Fig11-36.jpg)


    [Figure 11-36](#9781430248750_Ch11.xhtml#_Fig36). 在iTunes Connect中点击已上线应用的`View
    Details`


    在同意一项协议后，你将看到一个下载按钮和一个用于指定要下载代码数量的字段（[Figure 11-37](#9781430248750_Ch11.xhtml#Fig37)）。


    ![9781430248750_Fig11-37.jpg](images/9781430248750_Fig11-37.jpg)


    [Figure 11-37](#9781430248750_Ch11.xhtml#_Fig37). 用于输入要下载的促销代码数量的表单


    点击`Continue`后，你将看到一份管理代码使用的`App Store Volume Custom Code Agreement`，然后是一个用于下载代码的按钮。点击此按钮将下载一个包含你请求数量的文本文件（Listing
    11-1显示了一些示例促销代码），并且它将通过电子邮件向你发送一份你刚同意的协议副本（如果这听起来很别扭，它类似于Apple在确认复选框旁的措辞“同意该协议”）。


    **Listing 11-1.** 包含五个促销代码的促销代码文件


    ```

    XY9LJRKMN7JM

    TANFXAHR9EM9

    XP6TMAFFHFLT

    TXJ44ELTHETL

    F9W3WEK7JL4Y

    ```


    下载后，代码有效期28天，即使在此期间应用进行了更新。


    **提示** 由于代码的过期日期基于其下载日期，你可以根据需要从iTunes Connect下载代码来节省使用量，而不是一次性下载全部50个。'
  raw: 'Notice there is also an Estimate Size button. Your app will be processed by
    Apple before showing up on the App Store, which will increase the app size. Clicking
    this button will give you an idea what the final size of the app will be.


    Clicking the Validate button will check if the app would be immediately rejected
    for various build or packaging problems (e.g., if the app was built using a development
    profile instead of a distribution profile).


    **Tip**   I don’t find that using the Validate button saves me any time, since
    any errors reported by Validate are quickly reported by the app submission process
    anyway. Overall, it’s more efficient to just go ahead and submit the app.


    Clicking the Distribution button will initiate the app submission process, consisting
    of a series of pop ups ([Figure 11-30](#9781430248750_Ch11.xhtml#Fig30)).


    ![9781430248750_Fig11-30.jpg](images/9781430248750_Fig11-30.jpg)


    [Figure 11-30](#9781430248750_Ch11.xhtml#_Fig30). The first popup window when
    submitting an app to the App Store in the Xcode Organizer


    The first pop up basically asks what you want to do with this app. The default
    selection, Submit to the iOS App Store, is what you want, so just click Next,
    which brings you to another pop up that asks which app you’re submitting and what
    distribution provisioning profile you used for the app ([Figure 11-31](#9781430248750_Ch11.xhtml#Fig31)).


    ![9781430248750_Fig11-31.jpg](images/9781430248750_Fig11-31.jpg)


    [Figure 11-31](#9781430248750_Ch11.xhtml#_Fig31). The app and provisioning profile
    selection for an app submission in the Xcode Organizer


    The pull-down list of apps includes all your apps that are in Waiting for Upload
    status on iTunes Connect. Select the app that you''re submitting (and if it’s
    not in the list, you probably forgot to hit the Ready to Upload button for that
    app in iTunes Connect).


    After selecting the matching app and provisioning profile and then clicking Next,
    the app will be uploaded to Apple for submission. If all goes well, the final
    screen will say your app has been submitted to the App Store ([Figure 11-32](#9781430248750_Ch11.xhtml#Fig32)).


    ![9781430248750_Fig11-32.jpg](images/9781430248750_Fig11-32.jpg)


    [Figure 11-32](#9781430248750_Ch11.xhtml#_Fig32). A successful app submission
    in the Xcode Organizer


    Then it’s a matter of waiting for Apple to approve or reject it.


    **Tip**   It’s a good idea to log back into iTunes Connect after your submission
    and verify the app status is Waiting for Review. Even if the app binary is valid,
    the review may be held up because of a missing screenshot, for example.


    You’ll eventually receive an e-mail notifying you that the app is available on
    the App Store, that it’s been rejected, or that Apple needs more time to review
    it. This response usually arrives within a couple of weeks after submission, but
    I’ve had apps accepted within twenty-four hours or rejected after two months.
    When the review period is extended, Apple will typically send an e-mail stating
    they need more time to review your app.


    Be Prepared for Rejection


    If the app is rejected, then the e-mail will tell you to return to your app in
    iTunes Connect and click the Resolution Center button to view and optionally respond
    to the rejection reasons, which may include technical issues, crash bugs, or violations
    of Apple’s App Store Review Guidelines (which you can read on the Apple Developer
    Site after becoming an registered iOS Developer).


    If you elect to revise your app, you will have to click Reject Binary and Ready
    for Upload again before uploading. The Resolution Center also allows you to file
    an appeal to the App Review Board if you feel the rejection is unreasonable.


    If accepted, the app will appear shortly on the App Store if you selected the
    automatic release option in iTunes Connect. Otherwise, the app is placed in Pending
    Developer Release status until you log in to iTunes Connect, click View Details
    on the app, and click the Release this Version button.


    Update the App


    After an app has been approved, you can always return to the iTunes Connect page
    for the app and click View Details to edit the app description, and the modified
    text will show up on the App Store within a few hours. The iTunes Connect page
    will also display an Add New Version button. Clicking this will lead you through
    a condensed version of the original submission process to submit an update of
    the app. You can change nearly all the details except the bundle ID, but the only
    required change is an increment of the bundle version.


    **Tip**   When updating apps, remember to increment the bundle version both in
    iTunes Connect and in the Unity Player Settings.


    Note the period-separated components of the bundle ID are treated as numbers,
    rather than strings, so updating version 247 to 2.049 is (surprisingly) okay because
    it’s comparing the numbers 47 and 49 ([Figure 11-33](#9781430248750_Ch11.xhtml#Fig33)).


    ![9781430248750_Fig11-33.jpg](images/9781430248750_Fig11-33.jpg)


    [Figure 11-33](#9781430248750_Ch11.xhtml#_Fig33). Successfully upgrading the app
    version number from 2.47 to 2.049 in iTunes Connect


    But updating version 1.65 to 1.7 compares the numbers 65 and 7, which results
    in a submission error message ([Figure 11-34](#9781430248750_Ch11.xhtml#Fig34)).


    ![9781430248750_Fig11-34.jpg](images/9781430248750_Fig11-34.jpg)


    [Figure 11-34](#9781430248750_Ch11.xhtml#_Fig34). Unsuccessfully updating an app
    version number from 1.65 to 1.7 in the Xcode Organizer


    Track Sales


    After the first version of an app appears on the App Store, you can track its
    downloads and revenue (if it’s a paid app) by logging on to iTunes Connect and
    clicking the Payments and Financial Reports link. The resulting page displays
    a time-based graph of sales, a breakdown of sales per country, and the option
    to generate reports ([Figure 11-35](#9781430248750_Ch11.xhtml#Fig35)).


    ![9781430248750_Fig11-35.jpg](images/9781430248750_Fig11-35.jpg)


    [Figure 11-35](#9781430248750_Ch11.xhtml#_Fig35). The Payment and Financial Reports
    page in iTunes Connect


    Issue Promo Codes


    For each version of an app, Apple provides 50 promo codes that can be used to
    download the app free on the App Store (the promo codes are available even for
    free apps, although there’s not much point in using them in that case). To obtain
    the promo codes for an app, click View Details for that version of the app in
    iTunes Connect and then the Promo Codes button on the top right ([Figure 11-36](#9781430248750_Ch11.xhtml#Fig36)).


    ![9781430248750_Fig11-36.jpg](images/9781430248750_Fig11-36.jpg)


    [Figure 11-36](#9781430248750_Ch11.xhtml#_Fig36). Clicking View Details on a live
    app in iTunes Connect


    After agreeing to a contract, you’ll be presented with a download button and field
    to specify the number of codes to download ([Figure 11-37](#9781430248750_Ch11.xhtml#Fig37)).


    ![9781430248750_Fig11-37.jpg](images/9781430248750_Fig11-37.jpg)


    [Figure 11-37](#9781430248750_Ch11.xhtml#_Fig37). The entry form for the number
    of promo codes to download


    After clicking Continue, you’ll be presented with an App Store Volume Custom Code
    Agreement governing the use of the codes and then a download button for the codes.
    Clicking the button will download a text file with the number of codes you requested
    (Listing 11-1 shows some example promo codes) and it will e-mail you a copy of
    the agreement you just agreed to (if that sounds awkward, it’s similar to Apple’s
    phrase by the confirmation checkbox, “agree to the agreement”).


    **Listing 11-1.**  A Promo Code File with Five Promo Codes


    ```

    XY9LJRKMN7JM

    TANFXAHR9EM9

    XP6TMAFFHFLT

    TXJ44ELTHETL

    F9W3WEK7JL4Y

    ```


    Once downloaded, the codes are valid for 28 days, even if the app is updated in
    the meantime.


    **Tip**   Since the expiration date of the codes is based on their download dates,
    you can conserve the codes by only downloading them from iTunes Connect as needed,
    instead of all 50 at the same time.'
  trans: '

    这里有一个`Estimate Size`按钮。你的应用在 App Store 上架前会经过 Apple 处理，这会增加应用体积。点击此按钮能让你预估应用的最终大小。


    点击`Validate`按钮将检查应用是否会因各种构建或打包问题（例如，应用是使用开发描述文件而非分发描述文件构建的）而被立即拒绝。


    **提示** 我发现使用`Validate`按钮并不能节省时间，因为`Validate`报告的任何错误都会在应用提交过程中被迅速报告。总体而言，直接提交应用效率更高。


    点击`Distribution`按钮将启动应用提交流程，该流程由一系列弹出窗口组成（Figure 11-30）。


    ![9781430248750_Fig11-30.jpg](img/9781430248750_Fig11-30.jpg)


    Figure 11-30. 在 Xcode Organizer 中向 App Store 提交应用时的第一个弹出窗口


    第一个弹窗主要询问你希望对应用执行什么操作。默认选项`Submit to the iOS App Store`就是你需要的，所以直接点击`Next`，这将带你进入另一个弹窗，询问你要提交哪个应用以及你为该应用使用了哪个分发描述文件（Figure
    11-31）。


    ![9781430248750_Fig11-31.jpg](img/9781430248750_Fig11-31.jpg)


    Figure 11-31. 在 Xcode Organizer 中为应用提交选择应用和描述文件


    应用下拉列表包含了你在 iTunes Connect 上状态为`Waiting for Upload`的所有应用。选择你要提交的应用（如果它不在列表中，你可能忘记在
    iTunes Connect 中为该应用点击`Ready to Upload`按钮）。


    在选择匹配的应用和分发描述文件并点击`Next`后，应用将被上传到 Apple 进行提交。如果一切顺利，最终屏幕将显示你的应用已提交到 App Store（Figure
    11-32）。


    ![9781430248750_Fig11-32.jpg](img/9781430248750_Fig11-32.jpg)


    Figure 11-32. 在 Xcode Organizer 中成功提交应用


    然后就是等待 Apple 批准或拒绝应用。


    **提示** 提交后重新登录 iTunes Connect 并验证应用状态是否为`Waiting for Review`是一个好主意。即使应用二进制文件有效，审核也可能因例如缺少截图而被搁置。


    你最终会收到一封电子邮件，通知你应用已在 App Store 上可用、已被拒绝，或者 Apple 需要更多时间来审核。此回复通常会在提交后几周内到达，但我曾有过应用在
    24 小时内被接受，或在两个月后被拒绝的经历。当审核期延长时，Apple 通常会发送一封电子邮件，说明他们需要更多时间来审核你的应用。


    ## 为拒绝做好准备


    如果应用被拒绝，电子邮件将告知你返回 iTunes Connect 中的应用，点击`Resolution Center`按钮查看并选择性地回应拒绝原因，这些原因可能包括技术问题、崩溃
    Bug 或违反 Apple 的 App Store 审核指南（在注册成为 iOS 开发者后，你可以在 Apple 开发者网站上阅读该指南）。


    如果你选择修改应用，你必须在再次上传前点击`Reject Binary`和`Ready for Upload`。如果你认为拒绝不合理，`Resolution
    Center`也允许你向 App Review Board 提出申诉。


    如果被接受，并且你在 iTunes Connect 中选择了自动发布选项，应用将很快出现在 App Store 上。否则，应用将处于`Pending Developer
    Release`状态，直到你登录 iTunes Connect，点击应用的`View Details`，然后点击`Release this Version`按钮。


    ## 更新应用


    应用被批准后，你可以随时返回 iTunes Connect 中的应用页面，点击`View Details`来编辑应用描述，修改后的文本将在几小时内显示在 App
    Store 上。iTunes Connect 页面还会显示一个`Add New Version`按钮。点击此按钮将引导你完成原始提交流程的简化版本，以提交应用更新。除了包
    ID（bundle ID）外，你可以更改几乎所有详细信息，但唯一需要更改的是增加包版本（bundle version）。


    **提示** 更新应用时，请记住同时增加 iTunes Connect 和 Unity Player Settings 中的包版本。


    请注意，包 ID 中以句点分隔的组成部分被视为数字而不是字符串，因此将版本`247`更新为`2.049`是（令人惊讶地）可以的，因为它比较的是数字`47`和`49`（Figure
    11-33）。


    ![9781430248750_Fig11-33.jpg](img/9781430248750_Fig11-33.jpg)


    Figure 11-33. 在 iTunes Connect 中成功将应用版本号从`2.47`升级到`2.049`


    但是，将版本`1.65`更新为`1.7`会比较数字`65`和`7`，这会导致提交错误消息（Figure 11-34）。


    ![9781430248750_Fig11-34.jpg](img/9781430248750_Fig11-34.jpg)


    Figure 11-34. 在 Xcode Organizer 中未能成功将应用版本号从`1.65`更新为`1.7`


    ## 跟踪销售情况


    应用的第一版本在 App Store 上架后，你可以通过登录 iTunes Connect 并点击`Payments and Financial Reports`链接来跟踪其下载量和收入（如果是付费应用）。结果页面会显示基于时间的销售图表、按国家/地区划分的销售明细以及生成报告的选项（Figure
    11-35）。


    ![9781430248750_Fig11-35.jpg](img/9781430248750_Fig11-35.jpg)


    Figure 11-35. iTunes Connect 中的`Payment and Financial Reports`页面


    ## 发放促销代码


    对于应用的每个版本，Apple 会提供 50 个促销代码，可用于在 App Store 免费下载应用（即使是免费应用也提供促销代码，尽管在这种情况下使用它们意义不大）。要获取应用的促销代码，请在
    iTunes Connect 中点击该版本应用的`View Details`，然后点击右上角的`Promo Codes`按钮（Figure 11-36）。


    ![9781430248750_Fig11-36.jpg](img/9781430248750_Fig11-36.jpg)


    Figure 11-36. 在 iTunes Connect 中点击已上线应用的`View Details`


    在同意一项协议后，你将看到一个下载按钮和一个用于指定要下载代码数量的字段（Figure 11-37）。


    ![9781430248750_Fig11-37.jpg](img/9781430248750_Fig11-37.jpg)


    Figure 11-37. 用于输入要下载的促销代码数量的表单


    点击`Continue`后，你将看到一份管理代码使用的`App Store Volume Custom Code Agreement`，然后是一个用于下载代码的按钮。点击此按钮将下载一个包含你请求数量的文本文件（Listing
    11-1 显示了一些示例促销代码），并且它将通过电子邮件向你发送一份你刚同意的协议副本（如果这听起来很别扭，它类似于 Apple 在确认复选框旁的措辞“同意该协议”）。


    **Listing 11-1.** 包含五个促销代码的促销代码文件


    ```

    XY9LJRKMN7JM

    TANFXAHR9EM9

    XP6TMAFFHFLT

    TXJ44ELTHETL

    F9W3WEK7JL4Y

    ```


    下载后，代码有效期 28 天，即使在此期间应用进行了更新。


    **提示** 由于代码的过期日期基于其下载日期，你可以根据需要从 iTunes Connect 下载代码来节省使用量，而不是一次性下载全部 50 个。

