- fmt: '# Each Chapter Builds on the Previous One


    Each chapter in this book (with the exception of [Chapters 10](#9781430248750_Ch10.xhtml)
    and [11](#9781430248750_Ch11.xhtml) where the Angry Bots project stages a brief
    comeback) builds upon the project from the previous chapter. So by the end of
    this book, the simple static scene created in this chapter will have evolved into
    an optimized bowling game with sound and physics, running on iOS with leaderboards,
    achievements and ads. The project created in this chapter, along with the projects
    for each consecutive chapter, is available on `http://learnunity4.com/` but minus
    any assets from the Asset Store or Standard Packages.


    So without further ado, let’s get started!


    # Create a New Project


    If you still have the Unity Editor running from the previous chapter, create a
    new Unity project using the `New Project` item in the `File` menu ([Figure 3-1](#9781430248750_Ch03.xhtml#Fig1)).


    ![9781430248750_Fig03-01.jpg](images/9781430248750_Fig03-01.jpg)


    [Figure 3-1](#9781430248750_Ch03.xhtml#_Fig1). The `New Project` menu item


    The resulting `Project Wizard` ([Figure 3-2](#9781430248750_Ch03.xhtml#Fig2))
    is the same as the one we used when selecting `Open Project` in the previous chapter,
    but now it has the `Create New Project` tab selected. If you’re starting up a
    fresh Unity session and are presented with the `Project Wizard`, you can just
    click this tab to create a new project instead of opening an existing one.


    ![9781430248750_Fig03-02.jpg](images/9781430248750_Fig03-02.jpg)


    [Figure 3-2](#9781430248750_Ch03.xhtml#_Fig2). Creating a new project with the
    `Project Wizard`


    The `Project Wizard` prompts for the file name and location of the new project,
    defaulting to your home folder and the name `New Unity Project` (if the folder
    already exists, a number is appended, e.g., `New Unity Project 1`, or if that
    also exists then `New Unity Project 2`, and so forth). The `Set` button brings
    up a file chooser so you can browse for a directory location instead of typing
    it in.


    You can name the project as you please or just use the default for now. The Unity
    project itself doesn’t care about its name, so you can rename the project folder
    in the Finder later (just make sure you exit Unity or switch to another project
    first, to avoid wreaking havoc with your current session).


    **Tip** If you have a project that you want to keep around for a while, it’s a
    good idea to give it a meaningful name. More than once, I’ve discovered an old
    `New Unity Project` folder on my Mac and wondered if it was something important.


    The `Project Wizard` presents a list of Unity packages that we can immediately
    import into our new project. These are the Standard Assets that were installed
    with Unity in the previous chapter. You don’t need to select any right now, as
    you can always import what you need later.


    The Unity Editor will now appear, showing a new and empty project ([Figure 3-3](#9781430248750_Ch03.xhtml#Fig3)).
    The `Project View` displays no assets (you can confirm in the Finder that the
    `Assets` folder in your project contains no files), and the current scene is an
    untitled and unsaved scene consisting only of a `GameObject` named `Main Camera`.


    ![9781430248750_Fig03-03.jpg](images/9781430248750_Fig03-03.jpg)


    [Figure 3-3](#9781430248750_Ch03.xhtml#_Fig3). How a new Unity project looks in
    the Editor


    The first thing you should do is save and name this scene. The `Save Scene` option
    is found in the `File` menu ([Figure 3-4](#9781430248750_Ch03.xhtml#Fig4)) and
    has the same `Command+S` shortcut that is conventional with application save operations
    (you could think of scenes edited and managed by Unity as analogous to documents
    edited and managed by a word processing application).


    ![9781430248750_Fig03-04.jpg](images/9781430248750_Fig03-04.jpg)


    [Figure 3-4](#9781430248750_Ch03.xhtml#_Fig4). The `Save Scene` menu item


    The resulting chooser will provide the project’s `Assets` folder as the default
    location, which is fine; the scene is an asset and part of the project, so the
    scene file has to go in the `Assets` folder. A default name is not provided, so
    you need to provide one. Let’s call it `cube`, since this scene will just showcase
    a cube. The new scene will show up in the `Project View`, with a Unity icon ([Figure
    3-5](#9781430248750_Ch03.xhtml#Fig5)).


    ![9781430248750_Fig03-05.jpg](images/9781430248750_Fig03-05.jpg)


    [Figure 3-5](#9781430248750_Ch03.xhtml#_Fig5). The new scene in the `Project View`


    When you exit Unity or switch scenes or projects, Unity will prompt you to save
    the scene if there are unsaved changes (sometimes those changes are innocuous
    user interface changes, so don’t be alarmed). But it’s a good practice to save
    frequently, in case there’s a crash.


    The `File` menu also has a `Save Scene As` command that is similar to the `Save
    As` command of other applications. It lets you save the scene under a new name
    at any time, effectively making a copy of the scene.


    **Tip** Instead of using the `Save Scene As` command, it’s often simpler to select
    the scene file in the `Project View` and either rename (press `Return`) or duplicate
    (`Command+D`) the scene in the `Project View`.


    You might be wondering about the difference between `Save Scene` and `Save Project`
    in the `File` menu. `Save Project` saves any changes to the project but not the
    current scene, while `Save Scene` also saves any changes in the current scene,
    i.e., changes to the `GameObjects` in the scene or changes to per-scene settings
    (Render Settings). `Save Scene` is what you’ll want to use most of the time. `Save
    Project` is appropriate when you’ve made some changes to project settings or assets
    that you want to save but have scene changes you’re not ready to save or maybe
    even have a new scene open that you don’t want to save at all.


    # The Main Camera


    The `Hierarchy View` of the new scene lists just one `GameObject`, named `Main
    Camera`. Every new scene starts with that Camera `GameObject`, which acts as our
    eyes in the scene when we play the game. The `Main Camera` is special in that
    it’s easily accessible by scripts (it’s referenced by the variable `Camera.main`).


    ## Multiple Cameras


    The fact that the camera’s name is `Main Camera` might lead you to believe that
    multiple Cameras can exist in a scene, and you would be correct. It might seem
    strange to have multiple simultaneous viewpoints, but multiple Cameras make it
    possible to have a split-screen display or a window within the screen. Those usages
    aren’t actually supported in Unity for iOS (see the section “Viewport” below),
    but multiple Cameras are still useful for situations like rendering the game world
    with the `Main Camera` and rendering a user interface with another, effectively
    overlaying one set of `GameObjects` over another.


    ## Anatomy of a Camera


    Let’s select the `Main Camera` so we can see in the `Inspector View` what a Camera
    is made of ([Figure 3-6](#9781430248750_Ch03.xhtml#Fig6)).


    ![9781430248750_Fig03-06.jpg](images/9781430248750_Fig03-06.jpg)


    [Figure 3-6](#9781430248750_Ch03.xhtml#_Fig6). `Inspector View` of the `Main Camera`


    Starting from the top, you can see the name `Main Camera`. The check box to the
    left specifies whether this `GameObject` is active or inactive. If you uncheck
    the check box, the Camera is deactivated, indicated by a grayed-out appearance
    in the `Hierarchy View`, and you won’t see anything in the `Game View`. You can
    check the check box labeled `Static` on the right if you know this `GameObject`
    will never move. Marking `GameObjects` as static can facilitate optimization,
    although that rarely applies to Cameras.


    Below the name, you can see this `GameObject` has `MainCamera` as its tag, which
    is really what designates this `GameObject` as a `Main Camera`. The name is just
    for display purposes, so you could edit the name here in the `Inspector View`
    without any repercussions.'
