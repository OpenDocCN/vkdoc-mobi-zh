    He applied this knowledge to usage in Popper (`http://www.popper.org`), an interactive
    three-dimensional behavioral research platform by a Harward powered by Unity,
    Mathlab, and the ExitGames Photon platforms developed by Gayasoft.


    With the rise of serious games, Marc is currently focusing his and his company’s
    efforts to research options and technologies for the next generation of interactive
    and immersive experiences through Augmented Reality and Virtual Reality technologies
    (Metaio, OpenCV, Oculus Rift) and new forms of input (Razer Hydra, Leap Motion).


    Acknowledgments


    Before we get started, I’d like to give special mention to the people who helped
    me get started back in my Apple II days: my parents, who bought the Apple II that
    I ended up programming (and also a printer after they saw me typing out code listings
    on a typewriter—that junior high typing class really paid off!); my fellow high
    school Apple II programmers, Dave Lyons (now actually at Apple) and Cam Clarke
    (who made it to Silicon Valley but left us all too early); and Mr. Leaman, the
    programming teacher who let us hide out in the computer lab during pep rallies.
    That was time well spent.


    Introduction


    How I Met Unity


    Technically, I first started programming on a TRS-80 in my junior high school
    library, but really I just typed in the same BASIC code listing from a magazine
    every day until the librarian mentioned I could save the program on a cassette.
    I’m embarrassed to recall my first reaction when I heard the library had a computer:
    “What’s it good for?”


    A year later, I saw the light when I got my hands on an Apple II. After cracking
    open the user manual and learning how to draw graphics in BASIC, I was hooked.
    Soon I was writing Reversi games (one in BASIC, one in 6502 assembly) and even
    a 3D wireframe display program.


    In the intervening years I wandered the Windows wasteland and worked in small
    and large groups developing computer graphics and games. But fast forward to six
    years ago, when I happily got back into the Apple fold (now with Unix!) and attended
    my first Apple World Wide Developer Conference. Joachim Ante, one of the cofounders
    and the CTO of Unity Technologies, gave me an impromptu demo of Unity 1.5, and
    it was exactly what I’d been looking for—an inexpensive 3D game engine that ran
    on a Mac and was able to target multiple platforms, including Windows, Mac, and
    web browsers.


    So I bought a Unity 1.5 Indie license as soon as I returned home (this was when
    Unity Indie wasn’t free), later upgraded to Unity Pro, and was pleasantly surprised
    a couple of years later that Unity would support iOS. I love it when a plan comes
    together!


    In the meantime, my former employers at Hyper Entertainment granted me a license
    to port HyperBowl, a 3D arcade bowling game I worked on over ten years ago, to
    Unity and various platforms supported by Unity, so now I had a meaty project to
    work with, besides the smaller apps I’d been experimenting with.


    It took me six months to get the first version of the HyperBowl remake running
    as a Unity webplayer, with standalone Mac and PC executables, and on the iPhone
    (and by the way, also Android, Linux, and Flash). And really, I only spent three
    months using Unity if you subtract the time I spent figuring out how to extract
    the art and audio assets from the original game.


    With each new version of Unity, HyperBowl and my other games got faster and better-looking,
    utilized more iOS features and ran on more iOS devices (and, eventually, Android
    devices). I added capabilities using third-party plugins, a new pause menu, and
    even an entire new HyperBowl lane (level) with packages from the Unity Asset Store,
    which is conveniently integrated within the Unity Editor.


    This has all taken place with a development team of one (not counting all the
    work put into the original licensed assets), and I didn’t have to learn a single
    line of Objective-C or create my own art. In a sense, I feel like I’ve returned
    to my programming roots, working on my own projects for fun, and as a bonus, profit!
    Hopefully, I can distill my experience with Unity over the past six years (both
    mistakes and successes) into this book.


    About This Book


    With any game development book there’s the problem of trying to be all things
    to all people; there are plenty of areas in game development, Unity, and iOS that
    could easily take up whole books in themselves. This book is an introduction to
    developing games for iOS with Unity, so my goal is to get everyone acquainted
    with Unity and moving into Unity iOS development smoothly, following the same
    progression I’ve made over the years (but in less time!)'
