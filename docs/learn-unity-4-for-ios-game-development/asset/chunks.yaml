    \n图 4-22 执行在断点处暂停\n\n一旦你检查完断点处的运行时状态，在“运行”菜单中有一个“继续”选项，可以执行到下一个断点或错误。“运行”菜单中还有“逐过程”（继续执行到本函数中的下一行代码）、“逐语句”（继续执行到本行代码所调用的任何函数的第一行代码）或“跳出”（继续执行直到退出此函数）命令，这样你就可以逐行执行脚本了。所有这些命令在“运行”菜单中都显示了键盘快捷键，并且也作为工具栏上的按钮可用。\n\
    \n## 让它旋转\n\n既然你已经熟悉了脚本以及如何附加、编辑和调试它们，现在我们可以让这个脚本实现最终目标——旋转立方体。\n\n### 旋转变换组件\n\
    \n在运行时移动一个 GameObject 需要更改其变换组件。具体到旋转 GameObject，则需要更改其变换组件中的旋转值。用清单 4-6 中的代码替换\
    \ `FuguRotate` 脚本的内容即可实现。\n\n清单 4-6 在 `Update` 中包含旋转代码的 `FuguRotate.js` 脚本\n\n\
    ```\n#pragma strict\nvar speed:float = 10.0; // 控制旋转速度\nfunction Start () {\n\
    \        var object:GameObject = this.gameObject;\n        Debug.Log(\"Start called\
    \ on GameObject \"+object.name);\n}\n\n// 围绕物体的 Y 轴旋转\nfunction Update () {\n\
    \        //Debug.Log(\"Update called at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n```\n\n让我们来逐行分析新代码。首先，任何以 `//` 开头的行都是注释，不会作为代码执行。这是一种在不从文件中删除代码行的情况下将其停用的便捷方式。注释也可以放在\
    \ `/*` 和 `*/` 之间，这对多行注释很有用。\n\n**注意** 有些人认为代码应该写得足够好，能自解释，但一个基本的经验法则是：如果代码的意图不明显，就添加注释。我浪费过很多时间试图回忆当初为何那样写代码。\n\
    \n`speed` 变量控制物体旋转的速度，由于它被声明为一个公共实例变量，因此在检视面板中可作为可调属性使用。\n\n你也可以只输入 `var speed=10.0`\
    \ 而不是 `var speed:float=10.0`，因为编译器可以推断出 `speed` 的类型必须是 `float`，因为它由一个浮点数初始化（这被称为*类型推断*）。但最好尽可能清晰，这不仅是为了\
    \ Unity 编译器，也是为了任何阅读代码的人，包括你自己！\n\n`speed` 变量在 `Update` 函数中使用，该函数调用了 `Transform`\
    \ 类中定义的 `Rotate` 函数。`Rotate` 函数以一个 `Vector3` 作为参数，并将其 `x`、`y`、`z` 值解释为欧拉角（围绕 GameObject\
    \ 的 X、Y、Z 轴旋转的度数）。向量表示方向和大小，但在游戏引擎中，常用向量数据结构来表示欧拉角。\n\n**注意** 电影《神偷奶爸》对向量的定义很不错：“我叫向量。这是一个数学术语，用一个带有方向和大小（magnitude）的箭头表示。向量！那就是我，因为我犯下的罪行既带有方向，又带有大小。噢耶！”\n\
    \n`Vector3.up` 是一个便捷定义的 `Vector3`，其值为 `(0,1,0)`，因此 `Update` 函数是围绕 Y 轴旋转 `speed\
    \ * Time.deltaTime` 度。`Time.deltaTime` 是自上一帧以来经过的时间（以秒为单位），因此实际上，你正在以每秒 `speed`\
    \ 度的速度旋转。在 `Update` 回调中，你几乎总是希望将任何连续变化乘以 `Time.deltaTime`，这样你的游戏行为就不会因帧率差异而波动。如果省略了乘以\
    \ `Time.deltaTime` 这一步，`FuguRotate` 脚本在运行速度慢两倍的机器上，物体旋转的速度也会慢两倍。\n\n如预期的那样，`speed`\
    \ 变量会出现在检视面板中，并且你可以编辑它（图 4-23）。\n\n![9781430248750_Fig04-23.jpg](img/9781430248750_Fig04-23.jpg)\n\
    \n图 4-23 带有可调节速度的 `FuguRotate` 脚本的检视面板\n\n如果你点击 Play，现在 Cube 会以适中的速度旋转，并且变换组件中\
    \ Y 旋转值的连续变化会显示在检视面板中。你可以在检视面板中编辑 `FuguRotate` 脚本的 Speed 值来降低或提高旋转速度。\n\n### 其他旋转方式\n\
    \n`Transform.Rotate` 是一个很好的例子，说明了你应该为你遇到的每个函数阅读脚本参考文档。原来 `Transform.Rotate` 是一个*重载*函数，意味着它有带有不同参数的多个变体。\n\
    \n**注意** 在描述函数声明时使用术语*参数*，在运行时传递相同值时使用*实参*，但这是一个微妙的区别。通常，参数和实参可以互换使用而不会引起混淆。\n\
    \n`Transform.Rotate` 的文档列出了它可以接受的几种参数组合。除了接受一个 `Vector3` 来指定旋转轴和一个角度（以度为单位）之外，`Transform.Rotate`\
    \ 还可以分别接受 X、Y 和 Z 轴的旋转量。清单 4-7 展示了我们 `Update` 函数的另一种写法，它只传入了 X、Y 和 Z 轴的旋转量。\n\n\
    清单 4-7 接受 X、Y 和 Z 角度旋转的 `Transform.Rotate` 版本\n\n```\nfunction Update () {\n \
    \       transform.Rotate(0,speed*Time.deltaTime,0);\n}\n```\n\n或者，X、Y 和 Z 轴的旋转量可以打包成一个\
    \ `Vector3`，如清单 4-8 所示。\n"
- fmt: "[Listing 4-8.](#9781430248750_Ch04.xhtml#_list8)  Version of `Transform.Rotate`\
    \ That Takes Rotation in a `Vector3`\n\n```\nfunction Update () {\n        transform.Rotate(Vector3(0,speed*Time.deltaTime,0));\n\
    }\n```\n\nAlthough a vector has a precise mathematical definition, Unity follows\
    \ a common practice among 3D application programming interfaces of reusing its\
    \ vector data structure to represent anything that has x, y, and z values. For\
    \ example, if you read the Scripting Reference page on `Transform` (and you should),\
    \ you’ll see its `position`, `rotation`, and `scale` are all `Vector3` values.\n\
    \n### Rotate in World Space\n\nEach of the `Transform.Rotate` variations also\
    \ has an optional parameter, which defaults to `Space.Self`. This specifies that\
    \ the rotation takes place around the transform’s (and thus the GameObject’s)\
    \ local axes, which correspond to the axis handles you see in the Scene View when\
    \ the GameObject is selected. If you specify `Space.World`, as shown in [Listing\
    \ 4-9](#9781430248750_Ch04.xhtml#list9), the rotation takes place around the world\
    \ axes (the x, y, z axes centered at 0,0,0).\n\n[Listing 4-9.](#9781430248750_Ch04.xhtml#_list9)  Rotating\
    \ Around the World Axes\n\n```\nfunction Update () {\n        transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);\n\
    }\n```\n\n### Tween Rotation\n\nChanging a GameObject’s transform steadily over\
    \ time is straightforward, but the coding can be more involved and substantial\
    \ for more complicated motions, such as moving a GameObject from one position\
    \ to another smoothly over a certain period of time. This is the type of thing\
    \ that Flash programmers use the ActionScript `Tween` class for. Although Unity\
    \ doesn’t have a built-in `Tween` class, Unity users coming from a Flash background\
    \ will be happy to learn there are multiple third-party solutions.\n\nThe tween\
    \ package I use for HyperBowl is called `iTween`. I have around 200 `iTween` animations\
    \ in that game. A sample usage: After a strike is bowled, the 3D STRIKE text is\
    \ scripted with `iTween` so that the letters slide onto the screen one letter\
    \ a time, bob a bit, then fly off the screen while rotating.\n\nConveniently,\
    \ `iTween` is on the Asset Store. In [Chapter 3](#9781430248750_Ch03.xhtml), we\
    \ searched for packages in the Asset Store window, but this time, let’s use the\
    \ search function in the Project View. Type `\"itween\"` in the search box, and\
    \ click the Asset Store link in the breadcrumbs. `iTween` will show up in the\
    \ Free Assets results ([Figure 4-24](#9781430248750_Ch04.xhtml#Fig24)).\n\n![9781430248750_Fig04-24.jpg](images/9781430248750_Fig04-24.jpg)\n\
    \n[Figure 4-24](#9781430248750_Ch04.xhtml#_Fig24). Searching for iTween on the\
    \ Asset Store\n\n**Tip** [Figure 4-24](#9781430248750_Ch04.xhtml#Fig24) shows\
    \ the view menu in the Project View allows switching between One Column Layout\
    \ and Two Columns Layout. Two Columns Layout is new in Unity 4, but One Columns\
    \ Layout is still nice to have, particularly when performing a search in the Project\
    \ View instead of navigating with the left panel.\n\nSelect `iTween` in the Project\
    \ View and a description of the package will show up in the Inspector View ([Figure\
    \ 4-25](#9781430248750_Ch04.xhtml#Fig25)), along with options to import the package\
    \ or preview the full description in the Asset Store window. Go ahead and click\
    \ the Import package button.\n\n![9781430248750_Fig04-25.jpg](images/9781430248750_Fig04-25.jpg)\n\
    \n[Figure 4-25](#9781430248750_Ch04.xhtml#_Fig25). The Inspector View of the iTween\
    \ on the Asset Store\n\nThe resulting `iTween` installation shown in the Project\
    \ View includes sample and documentation files, but the entire `iTween` code library\
    \ is a single script located in the `iTween` ![image](images/arrow.jpg) `Plugins`\
    \ folder ([Figure 4-26](#9781430248750_Ch04.xhtml#Fig26)).\n\n![9781430248750_Fig04-26.jpg](images/9781430248750_Fig04-26.jpg)\n\
    \n[Figure 4-26](#9781430248750_Ch04.xhtml#_Fig26). Project view of iTween\n\n\
    As you can see in [Figure 4-26](#9781430248750_Ch04.xhtml#Fig26), `iTween` is\
    \ a C# script, with `.cs` as its filename extension. JavaScript can call functions\
    \ and refer to variables in C# scripts, but only if the C# scripts are located\
    \ in a few special folders that are designated to load before all other scripts.\
    \ One of those folders is `Assets` ![image](images/arrow.jpg) `Plugins`, so you\
    \ can just drag the `iTween` ![image](images/arrow.jpg) `Plugins` folder up a\
    \ level to just below `Assets`.\n\nTo get a flavor of `iTween`, add the third\
    \ line in [Listing 4-10](#9781430248750_Ch04.xhtml#list10) to the `Start` function\
    \ in the `FuguRotate` script. That line starts a rotation tween, and, following\
    \ the arguments in order from left to right, rotates around the local y axis 1\
    \ multiple of 360 degrees over 2 seconds, eases in as the target rotation is achieved,\
    \ and eases back out as the rotation bounces back in the other direction.\n\n\
    Also, use `/*` and `*/` to comment out the `Update` function so you don’t have\
    \ two pieces of rotation code fighting for control.\n\n[Listing 4-10.](#9781430248750_Ch04.xhtml#_list10)  FuguRotate.js\
    \ with iTween Called in the Start Function\n\n```\n#pragma strict\nvar speed:float\
    \ = 10.0; // controls how fast we rotate\n\nfunction Start () {\n        var object:GameObject\
    \ = this.gameObject;\n        Debug.Log(\"Start called on GameObject \"+object.name);\n\
    \        iTween.RotateBy(gameObject, iTween.Hash(\"y\", 1, \"time\", 2, \"easeType\"\
    , \"easeInOutBack\", \"loopType\", \"pingPong\"));\n}\n\n// rotate around the\
    \ object's y axis\n/*\nfunction Update () {\n        //Debug.Log(\"Update called\
    \ at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n*/\n```\n\n### Children of the Cube\n\nA scene with just one cube is not very\
    \ interesting, so let’s make it slightly more interesting by adding more cubes.\
    \ You could repeatedly create new cubes in the same manner as the first one. Or\
    \ you could save some time by duplicating the existing Cube (select the Cube and\
    \ then invoke the Duplicate command on the Edit menu or use the `Command+D` keyboard\
    \ shortcut). But let’s take this opportunity to learn about prefabs.\n\n### Making\
    \ Prefabs\n\nA *prefab* is a special type of asset created for cloning a GameObject.\
    \ The prefab can then be used to create identical copies of that GameObject. In\
    \ that sense, Unity prefabs are like prefabricated housing, but better. If you\
    \ make a change to one instance of a prefab, you can have that change automatically\
    \ propagate to all other instances of the prefab.\n\nFirst, in keeping with our\
    \ asset organization, create a new folder in the Project View named `Prefabs`.\
    \ Then, with the `Prefabs` folder selected, click Prefab on the Create menu in\
    \ the Project View to create an empty prefab in that folder. You can then fill\
    \ out the prefab by dragging the Cube from the Hierarchy View onto the empty prefab.\n\
    \nAlternatively, instead of starting with an empty prefab, you can just drag the\
    \ Cube directly into the `Prefabs` folder, and a prefab will automatically be\
    \ created and named after the original GameObject ([Figure 4-27](#9781430248750_Ch04.xhtml#Fig27)).\n\
    \n![9781430248750_Fig04-27.jpg](images/9781430248750_Fig04-27.jpg)\n\n[Figure\
    \ 4-27](#9781430248750_Ch04.xhtml#_Fig27). The Project View of the Cube prefab\n\
    \nYou can now drag the prefab into the Hierarchy View every time you want to create\
    \ a new cube that looks just like the original Cube GameObject. But instead of\
    \ having multiple independent cubes in the scene, let’s add some cubes as children\
    \ of the existing cube. Drag the prefab directly onto the Cube in the Hierarchy\
    \ View twice, and you’ll now have two new cubes underneath Cube. In the Inspector\
    \ View ([Figure 4-28](#9781430248750_Ch04.xhtml#Fig28)), you can see the new cubes\
    \ are identical to Cube, featuring the same Components and Component properties.\
    \ Let’s name the new cubes `child1` and `child2` (by the way, this is a good time\
    \ try out the Lock feature of the Inspector View, so you can inspect two GameObjects\
    \ at the same time)."
