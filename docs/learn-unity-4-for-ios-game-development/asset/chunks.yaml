    var pinDistance = 1.5;                // initial distance between pins

    var pinRows = 4;                      // number of pin rows


    var ball:GameObject;                  // the bowling ball

    var sunkHeight:float = -10.0;


    private var pins:Array;


    function Awake () {

            CreatePins();

