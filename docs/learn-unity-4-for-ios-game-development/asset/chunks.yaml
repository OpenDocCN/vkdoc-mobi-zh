    \ from MonoDevelop File menu or double-click the solution file in the Finder (the\
    \ highlighted file in [Figure 4-16](#9781430248750_Ch04.xhtml#Fig16)).\n\n![9781430248750_Fig04-16.jpg](images/9781430248750_Fig04-16.jpg)\n\
    \n[Figure 4-16](#9781430248750_Ch04.xhtml#_Fig16). MonoDevelop project files\n\
    \nWith the MonoDevelop solution loaded, enable debugging by selecting Attach to\
    \ Process from the MonoDevelop Run menu ([Figure 4-17](#9781430248750_Ch04.xhtml#Fig17)).\n\
    \n![9781430248750_Fig04-17.jpg](images/9781430248750_Fig04-17.jpg)\n\n[Figure\
    \ 4-17](#9781430248750_Ch04.xhtml#_Fig17). The MonoDevelop Attach to Process command\n\
    \nThen choose Unity Editor in the resulting process list ([Figure 4-18](#9781430248750_Ch04.xhtml#Fig18)).\n\
    \n![9781430248750_Fig04-18.jpg](images/9781430248750_Fig04-18.jpg)\n\n[Figure\
    \ 4-18](#9781430248750_Ch04.xhtml#_Fig18). Attaching MonoDevelop to the Unity\
    \ Editor\n\nClick Play, again, and this time MonoDevelop will show not only the\
    \ line of code where the error occurred, but also the specific type of error (`NullReferenceException`)\
    \ and associated information like the stack trace, which is useful in determining\
    \ what chain of function calls resulted in the error ([Figure 4-19](#9781430248750_Ch04.xhtml#Fig19)).\n\
    \n![9781430248750_Fig04-19.jpg](images/9781430248750_Fig04-19.jpg)\n\n[Figure\
    \ 4-19](#9781430248750_Ch04.xhtml#_Fig19). MonoDevelop error details with the\
    \ Unity Editor attached\n\nWhile in debugging mode, the Unity Editor is unresponsive,\
    \ so when you’re finished with a debugging run, select Detach from the Run menu\
    \ in MonoDevelop to detach the Unity Editor process ([Figure 4-20](#9781430248750_Ch04.xhtml#Fig20)).\
    \ The Detach command is also available as a button on the MonoDevelop toolbar.\n\
    \n![9781430248750_Fig04-20.jpg](images/9781430248750_Fig04-20.jpg)\n\n[Figure\
    \ 4-20](#9781430248750_Ch04.xhtml#_Fig20). Detaching the Unity Editor process\
    \ from MonoDevelop\n\nLet’s fix the null reference problem by changing the initial\
    \ value of the variable `object` from `null` to the script’s GameObject ([Listing\
    \ 4-5](#9781430248750_Ch04.xhtml#list5))."
  trans: "\n从运行时类列表中可以看出，场景中几乎所有的东西都是 `Object` 的子类，包括 `GameObject` 和 `Component`。许多\
    \ `Component` 子类，包括 `Light` 和 `Camera`，同时也是 `Behaviour` 的子类，`Behaviour` 是一种可以被启用或禁用的组件（正如它们在检视面板中的复选框所示）。然而，有些组件并非如此，比如\
    \ `Transform`，它是 `Component` 的直接子类（中间没有其他类），并且不能被禁用（检视面板中没有复选框）。\n\n每个脚本实际上都是\
    \ `MonoBehaviour` 的子类，而 `MonoBehaviour` 是 `Behaviour` 的子类（因此你可以启用和禁用脚本）。因此，`FuguRotate`\
    \ 脚本定义了一个名为 `FuguRotate` 的 `MonoBehaviour` 子类。这个类声明在 JavaScript 中是隐式的，不过你也可以将其显式声明，如列表\
    \ 4-3 所示。\n\n列表 4-3.  一个带有显式类声明的 FuguRotate.js 版本\n\n```\n#pragma strict\n\nclass\
    \ FuguRotate extends MonoBehaviour {\n\nfunction Start () {\n                var\
    \ object:GameObject = null;\n                Debug.Log(\"Start called on GameObject\
    \ \"+object.name);\n        }\n\nfunction Update () {\n                Debug.Log(\"\
    Update called at time \"+Time.time);\n        }\n\n}\n```\n\n## 运行脚本\n\n规范的编程在很大程度上类似于你在学校学到的科学方法。你应该对事物如何运作有一个大致的理论，假设你的代码应该做什么，然后准备通过运行实验来验证这个假设。换句话说，是时候运行你的代码，看看它是否按你预期的方式运行了。当你点击“播放”时，由\
    \ `Debug.Log` 发出的消息将显示在控制台视图中（图 4-12）。\n\n![9781430248750_Fig04-12.jpg](img/9781430248750_Fig04-12.jpg)\n\
    \n图 4-12. 追踪 Start 和 Update 回调函数\n\n如果代码的行为不符合你的预期，那么就该修正你对它工作原理的假设了。这或许算是一点小小的安慰，但调试代码本身就是一次学习经历！\n\
    \n## 调试脚本\n\n当然，你的代码不可能会在输入后就是完美的。相反，它通常需要经过几轮调试。错误基本上有两种类型：一种是甚至在尝试运行游戏之前就会出现的编译错误，另一种是在游戏运行过程中出现的运行时错误。\n\
    \n### 编译错误\n\n每次保存脚本时，它都会自动被编译（从源代码转换为实际运行的代码格式）。脚本中妨碍成功编译的错误会以红色显示在 Unity 编辑器的底部以及控制台视图中。\n\
    \n双击编辑器底部的错误消息将调出控制台视图中对应的消息，而双击控制台视图中的消息将打开脚本编辑器，并将光标定位在有问题的代码行上。即使没有这种便利性，错误消息也会列出出错代码的文件名和行号，因此可以手动找到它。\n\
    \n例如，如果你在 `Update` 函数中将 `Time.time` 误输入为 `Time.tim`，那么当你尝试保存脚本时，就会立即出现一条错误消息（图\
    \ 4-13）。方便的是，Unity 通常能很好地建议你可能想要输入的内容（尽管计算机通常不擅长“执行我的意图，而非我所说的”）。\n\n![9781430248750_Fig04-13.jpg](img/9781430248750_Fig04-13.jpg)\n\
    \n图 4-13. 脚本编译错误\n\n### 运行时错误\n\n与编译错误类似，运行时错误也会显示在控制台视图中。为了演示，请将 `Start` 函数中对\
    \ `gameObject` 的引用替换为对名为 `object` 的局部变量的引用（列表 4-4）。局部变量是在函数声明内部声明的，因此只能在函数的作用域内访问。在此例中，`object`\
    \ 被初始化为 `null`，这意味着它没有引用任何实际的 GameObject，并且从未被赋予任何 GameObject。当你点击“播放”时，当脚本尝试引用该\
    \ GameObject 的名称时，就会产生一个错误（图 4-14）。\n\n列表 4-4.  包含空引用错误的 FuguRotate.js 中的 Start\
    \ 函数\n\n```\nfunction Start () {\n        var object:GameObject = null;\n    \
    \    Debug.Log(\"Start called on GameObject \"+object.name);\n} \n```\n\n![9781430248750_Fig04-14.jpg](img/9781430248750_Fig04-14.jpg)\n\
    \n图 4-14. 脚本运行时错误\n\n### 使用 MonoDevelop 进行调试\n\n我仍然主要依靠调用 `Debug.Log`（再次使用老派方法）并检查控制台视图中的错误消息来进行调试。但现代程序员更习惯使用更复杂的调试工具。事实证明，MonoDevelop\
    \ 也提供了一个功能完备的调试器，并且已针对 Unity 进行了定制。要启用 MonoDevelop 调试，请从 Assets 菜单中选择 Sync MonoDevelop\
    \ Project 命令（图 4-15）。\n\n![9781430248750_Fig04-15.jpg](img/9781430248750_Fig04-15.jpg)\n\
    \n图 4-15. 同步 MonoDevelop 项目以开始调试\n\nSync MonoDevelop Project 命令会更新与此 Unity 项目对应的\
    \ MonoDevelop 项目文件，然后打开 MonoDevelop 项目解决方案文件。如果 MonoDevelop 没有自动打开该解决方案文件，你可以从\
    \ MonoDevelop 的“文件”菜单中打开它，或者在 Finder 中双击该解决方案文件（图 4-16 中高亮显示的文件）。\n\n![9781430248750_Fig04-16.jpg](img/9781430248750_Fig04-16.jpg)\n\
    \n图 4-16. MonoDevelop 项目文件\n\n加载 MonoDevelop 解决方案后，通过从 MonoDevelop 的“运行”菜单中选择“附加到进程”来启用调试（图\
    \ 4-17）。\n\n![9781430248750_Fig04-17.jpg](img/9781430248750_Fig04-17.jpg)\n\n\
    图 4-17. MonoDevelop 的“附加到进程”命令\n\n然后在弹出的进程列表中选择 Unity Editor（图 4-18）。\n\n![9781430248750_Fig04-18.jpg](img/9781430248750_Fig04-18.jpg)\n\
    \n图 4-18. 将 MonoDevelop 附加到 Unity 编辑器\n\n再次点击“播放”，这次 MonoDevelop 不仅会显示发生错误的代码行，还会显示具体的错误类型（`NullReferenceException`）以及相关的信息，比如堆栈跟踪，这对于确定导致错误的函数调用链非常有用（图\
    \ 4-19）。\n\n![9781430248750_Fig04-19.jpg](img/9781430248750_Fig04-19.jpg)\n\n\
    图 4-19. 附加了 Unity 编辑器时的 MonoDevelop 错误详情\n\n在调试模式下，Unity 编辑器无法响应，因此当一次调试运行结束时，请从\
    \ MonoDevelop 的“运行”菜单中选择“分离”以分离 Unity 编辑器进程（图 4-20）。“分离”命令也可以作为 MonoDevelop 工具栏上的一个按钮使用。\n\
    \n![9781430248750_Fig04-20.jpg](img/9781430248750_Fig04-20.jpg)\n\n图 4-20. 从 MonoDevelop\
    \ 分离 Unity 编辑器进程\n\n让我们通过将变量 `object` 的初始值从 `null` 更改为脚本的 GameObject 来修复这个空引用问题（列表\
    \ 4-5）。\n"
- fmt: "# [Listing 4-5.]( #9781430248750_Ch04.xhtml#_list5 ) Start Function in `FuguRotate.js`\
    \ with Null Reference Fix\n\n```\nfunction Start () {\n        var object:GameObject\
    \ = this.gameObject;\n        Debug.Log(\"Start called on GameObject \"+object.name);\n\
    }\n```\n\nThe reference to `this.gameObject` is equivalent to just `gameObject`.\
    \ The variable `this` always refers to the current object, which is this script\
    \ Component (in some other programming languages, `self` is used in the same way).\
    \ Sometimes I like to explicitly prefix variables like `gameObject` with `this.`\
    \ to make it clear that I’m referring to an instance variable, which is a variable\
    \ defined in the class that is not local to a function and not static, so each\
    \ instance of the class has its own copy.\n\nNow the script shouldn’t break in\
    \ the `Start` function (you can click Play in the Unity Editor to confirm). But\
    \ you can still make execution stop on any line in MonoDevelop by adding a breakpoint.\
    \ Click to the left of the line in the `Update` function, and a breakpoint indicator\
    \ will appear by the line ([Figure 4-21]( #9781430248750_Ch04.xhtml#Fig21 )).\n\
    \n![9781430248750_Fig04-21.jpg](images/9781430248750_Fig04-21.jpg)\n\n[Figure\
    \ 4-21]( #9781430248750_Ch04.xhtml#_Fig21 ). Adding a breakpoint in MonoDevelop\n\
    \nNow when you invoke Attach to Process, connect to the Unity Editor, and click\
    \ Play in the Unity Editor, execution will stop in your `Update` function just\
    \ as if there were an error there ([Figure 4-22]( #9781430248750_Ch04.xhtml#Fig22\
    \ )). When execution is halted in MonoDevelop while in debugging mode, you can\
    \ examine the stack trace and inspect the runtime environment in other ways. For\
    \ example, [Figure 4-22]( #9781430248750_Ch04.xhtml#Fig22 ) shows the result of\
    \ typing `gameObject` in the Watch panel and then halting at a breakpoint in the\
    \ `FuguRotate Update` callback. The current value of `gameObject` is the Cube\
    \ GameObject, which can now have its member variables examined.\n\n![9781430248750_Fig04-22.jpg](images/9781430248750_Fig04-22.jpg)\n\
    \n[Figure 4-22]( #9781430248750_Ch04.xhtml#_Fig22 ). Execution halted at a breakpoint\n\
    \nOnce you’re finished examining the runtime state at the breakpoint, you have\
    \ an option in the Run menu to Continue until the next breakpoint or error. The\
    \ Run menu also has commands to Step Over (continue until the next line of code\
    \ in this function), Step Into (continue until the first line of code any function\
    \ called by this line of code), or Step Out (continue until you’ve exited this\
    \ function), so you can step through your script one line at a time. All of these\
    \ commands have keyboard shortcuts shown in the Run menu and are also available\
    \ as buttons on the toolbar.\n\n## Make It Rotate\n\nNow that you’re familiar\
    \ with scripts and how to attach, edit, and debug them, we’re ready to make this\
    \ script do what we ultimately want—rotate the Cube.\n\n### Rotate the Transform\n\
    \nMoving a GameObject at runtime requires changing its Transform Component. Rotating\
    \ the GameObject specifically requires changing the rotation value in its Transform\
    \ Component. Replacing the contents of the `FuguRotate` script with the code in\
    \ [Listing 4-6]( #9781430248750_Ch04.xhtml#list6 ) will do the trick.\n\n[Listing\
    \ 4-6.]( #9781430248750_Ch04.xhtml#_list6 ) `FuguRotate.js` Script with Rotation\
    \ Code in `Update`\n\n```\n#pragma strict\nvar speed:float = 10.0; // controls\
    \ how fast we rotate\nfunction Start () {\n        var object:GameObject = this.gameObject;\n\
    \        Debug.Log(\"Start called on GameObject \"+object.name);\n}\n\n// rotate\
    \ around the object's y axis\nfunction Update () {\n        //Debug.Log(\"Update\
    \ called at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n```\n\nLet’s go though the new code. First, any line starting with `//` is\
    \ a comment and not executed as code. This is a convenient way to deactivate a\
    \ line of code without deleting it from the file. Comments can also be added within\
    \ `/*` and `*/`, which is useful for multiline comments.\n\n**Note** Some will\
    \ say code should be written well enough to be self-explanatory, but as a basic\
    \ rule of thumb, if the intent of the code is not obvious, add a comment. I’ve\
    \ wasted plenty of time trying to remember why I wrote some code the way I did.\n\
    \nThe `speed` variable controls how fast the object rotates, and since it’s declared\
    \ as a public instance variable, it’s available as an adjustable property in the\
    \ Inspector View.\n\nYou could have just typed `var speed=10.0` instead of `var\
    \ speed:float=10.0`, since the compiler can infer that `speed` must be of type\
    \ `float`, since it’s initialized with a floating point number (this is known\
    \ as *type inference*). But it’s better to be as clear as you can, not just for\
    \ the Unity compiler, but also for any human reading the code, including yourself!\n\
    \nThe variable `speed` is used in the `Update` function, which calls the `Rotate`\
    \ function defined in the `Transform` class. `Rotate` takes a `Vector3` as an\
    \ argument and interprets its `x`, `y`, `z` values as Euler angles (rotation,\
    \ in degrees, around the GameObject’s x, y, z axes). A vector represents a direction\
    \ and magnitude, but it’s common in game engines to use the vector data structure\
    \ to represent Euler angles.\n\n**Note** The movie *Despicable Me* has as good\
    \ a definition of vector as any: “I go by Vector. It’s a mathematical term, represented\
    \ by an arrow with both direction and magnitude. Vector! That’s me, because I\
    \ commit crimes with both direction and magnitude. Oh yeah!”\n\n`Vector3.up` is\
    \ a conveniently defined `Vector3` with values `(0,1,0)`, so the `Update` function\
    \ is rotating around the y axis by `speed * Time.deltaTime` degrees. `Time.deltaTime`\
    \ is the elapsed time since the last frame, in seconds, so, effectively, you’re\
    \ rotating by speed degrees per second. In `Update` callbacks, you almost always\
    \ want to multiply any continuous change by `Time.deltaTime` so that your game\
    \ behavior does not fluctuate with differences in frame rate. If the multiplication\
    \ by `Time.deltaTime` was omitted, the `FuguRotate` script would rotate objects\
    \ twice as slow on any machine that’s running two times slower.\n\nAs intended,\
    \ the variable `speed` shows up in the Inspector View and you can edit it ([Figure\
    \ 4-23]( #9781430248750_Ch04.xhtml#Fig23 )).\n\n![9781430248750_Fig04-23.jpg](images/9781430248750_Fig04-23.jpg)\n\
    \n[Figure 4-23]( #9781430248750_Ch04.xhtml#_Fig23 ). The Inspector View of the\
    \ `FuguRotate` script with adjustable speed\n\nIf you click Play, the Cube now\
    \ spins at a moderate rate, and continuous change in the Transform Component’s\
    \ y rotation value will be displayed in the Inspector View. You can edit the Speed\
    \ value of the `FuguRotate` script in the Inspector View to slow it down or speed\
    \ it up.\n\n### Other Ways to Rotate\n\n`Transform.Rotate` is a good example of\
    \ why you should read the Scripting Reference for every function you encounter.\
    \ It turns out `Transform.Rotate` is an *overloaded* function, meaning it has\
    \ variations with different parameters.\n\n**Note** The term *parameter* is used\
    \ when describing the function declaration and *argument* refers to the same value\
    \ when its passed at runtime, but it’s a subtle distinction. Parameter and argument\
    \ can usually be used interchangeably without confusion.\n\nThe documentation\
    \ for `Transform.Rotate` lists several combinations of arguments that it can take.\
    \ Instead of accepting a `Vector3` to rotate around and an angle (in degrees),\
    \ `Transform.Rotate` can take the `x`, `y`, and `z` axis rotations separately.\
    \ [Listing 4-7]( #9781430248750_Ch04.xhtml#list7 ) shows an alternative version\
    \ of our `Update` function that just passes in the `x`, `y`, and `z` rotations.\n\
    \n[Listing 4-7.]( #9781430248750_Ch04.xhtml#_list7 ) Version of `Transform.Rotate`\
    \ That Takes Rotation in x, y, and z Angles\n\n```\nfunction Update () {\n   \
    \     transform.Rotate(0,speed*Time.deltaTime,0);\n}\n```\n\nOr the `x`, `y`,\
    \ and `z` rotations can be packaged into a `Vector3`, as shown in [Listing 4-8](\
    \ #9781430248750_Ch04.xhtml#list8 )."
  raw: '[Listing 4-5.](#9781430248750_Ch04.xhtml#_list5)  Start Function in FuguRotate.js
    with Null Reference Fix


    ```

    function Start () {

            var object:GameObject = this.gameObject;

            Debug.Log("Start called on GameObject "+object.name);

    }

    ```


    The reference to `this.gameObject` is equivalent to just `gameObject`. The variable
    `this` always refers to the current object, which is this script Component (in
    some other programming languages, `self` is used in the same way). Sometimes I
    like to explicitly prefix variables like `gameObject` with `this.` to make it
    clear that I’m referring to an instance variable, which is a variable defined
    in the class that is not local to a function and not static, so each instance
    of the class has its own copy.


    Now the script shouldn’t break in the `Start` function (you can click Play in
    the Unity Editor to confirm). But you can still make execution stop on any line
    in MonoDevelop by adding a breakpoint. Click to the left of the line in the `Update`
    function, and a breakpoint indicator will appear by the line ([Figure 4-21](#9781430248750_Ch04.xhtml#Fig21)).


    ![9781430248750_Fig04-21.jpg](images/9781430248750_Fig04-21.jpg)


    [Figure 4-21](#9781430248750_Ch04.xhtml#_Fig21). Adding a breakpoint in MonoDevelop


    Now when you invoke Attach to Process, connect to the Unity Editor, and click
    Play in the Unity Editor, execution will stop in your `Update` function just as
    if there were an error there ([Figure 4-22](#9781430248750_Ch04.xhtml#Fig22)).
    When execution is halted in MonoDevelop while in debugging mode, you can examine
    the stack trace and inspect the runtime environment in other ways. For example,
    [Figure 4-22](#9781430248750_Ch04.xhtml#Fig22) shows the result of typing `gameObject`
    in the Watch panel and then halting at a breakpoint in the `FuguRotate Update`
    callback. The current value of `gameObject` is the Cube GameObject, which can
    now have its member variables examined.


    ![9781430248750_Fig04-22.jpg](images/9781430248750_Fig04-22.jpg)


    [Figure 4-22](#9781430248750_Ch04.xhtml#_Fig22). Execution halted at a breakpoint


    Once you’re finished examining the runtime state at the breakpoint, you have an
    option in the Run menu to Continue until the next breakpoint or error. The Run
    menu also has commands to Step Over (continue until the next line of code in this
    function), Step Into (continue until the first line of code any function called
    by this line of code), or Step Out (continue until you’ve exited this function),
    so you can step through your script one line at a time. All of these commands
    have keyboard shortcuts shown in the Run menu and are also available as buttons
    on the toolbar.


    Make It Rotate


    Now that you’re familiar with scripts and how to attach, edit, and debug them,
    we’re ready to make this script do what we ultimately want—rotate the Cube.


    Rotate the Transform


    Moving a GameObject at runtime requires changing its Transform Component. Rotating
    the GameObject specifically requires changing the rotation value in its Transform
    Component. Replacing the contents of the `FuguRotate` script with the code in
    [Listing 4-6](#9781430248750_Ch04.xhtml#list6) will do the trick.


    [Listing 4-6.](#9781430248750_Ch04.xhtml#_list6)  FuguRotate.js Script with Rotation
    Code in Update


    ```

    #pragma strict

    var speed:float = 10.0; // controls how fast we rotate

    function Start () {

            var object:GameObject = this.gameObject;

            Debug.Log("Start called on GameObject "+object.name);

    }


    // rotate around the object''s y axis

    function Update () {

            //Debug.Log("Update called at time "+Time.time);

            transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    ```


    Let’s go though the new code. First, any line starting with `//` is a comment
    and not executed as code. This is a convenient way to deactivate a line of code
    without deleting it from the file. Comments can also be added within `/*` and
    `*/`, which is useful for multiline comments.


    **Note**   Some will say code should be written well enough to be self-explanatory,
    but as a basic rule of thumb, if the intent of the code is not obvious, add a
    comment. I’ve wasted plenty of time trying to remember why I wrote some code the
    way I did.


    The `speed` variable controls how fast the object rotates, and since it’s declared
    as a public instance variable, it’s available as an adjustable property in the
    Inspector View.


    You could have just typed `var speed=10.0` instead of `var speed:float=10.0`,
    since the compiler can infer that speed must be of type float, since it’s initialized
    with a floating point number (this is known as *type inference*). But it’s better
    to be as clear as you can, not just for the Unity compiler, but also for any human
    reading the code, including yourself!


    The variable `speed` is used in the `Update` function, which calls the Rotate
    function defined in the Transform class. Rotate takes a `Vector3` as an argument
    and interprets its x,y,z values as Euler angles (rotation, in degrees, around
    the GameObject’s x,y,z axes). A vector represents a direction and magnitude, but
    it’s common in game engines to use the vector data structure to represent Euler
    angles.


    **Note**   The movie *Despicable Me* has as good a definition of vector as any:
    “I go by Vector. It’s a mathematical term, represented by an arrow with both direction
    and magnitude. Vector! That’s me, because I commit crimes with both direction
    and magnitude. Oh yeah!”


    `Vector3.up` is a conveniently defined `Vector3` with values (0,1,0), so the `Update`
    function is rotating around the y axis by speed `* Time.deltaTime` degrees. `Time.deltaTime`
    is the elapsed time since the last frame, in seconds, so, effectively, you’re
    rotating by speed degrees per second. In `Update` callbacks, you almost always
    want to multiply any continuous change by `Time.deltaTime` so that your game behavior
    does not fluctuate with differences in frame rate. If the multiplication by `Time.deltaTime
    was omitted`, the `FuguRotate` script would rotate objects twice as slow on any
    machine that’s running two times slower.


    As intended, the variable speed shows up in the Inspector View and you can edit
    it ([Figure 4-23](#9781430248750_Ch04.xhtml#Fig23)).


    ![9781430248750_Fig04-23.jpg](images/9781430248750_Fig04-23.jpg)


    [Figure 4-23](#9781430248750_Ch04.xhtml#_Fig23). The Inspector View of the FuguRotate
    script with adjustable speed


    If you click Play, the Cube now spins at a moderate rate, and continuous change
    in the Transform Component’s y rotation value will be displayed in the Inspector
    View. You can edit the Speed value of the FuguRotate script in the Inspector View
    to slow it down or speed it up.


    Other Ways to Rotate


    `Transform.Rotate` is a good example of why you should read the Scripting Reference
    for every function you encounter. It turns out `Transform.Rotate` is an *overloaded*
    function, meaning it has variations with different parameters.


    **Note**   The term *parameter* is used when describing the function declaration
    and *argument* refers to the same value when its passed at runtime, but it’s a
    subtle distinction. Parameter and argument can usually be used interchangeably
    without confusion.


    The documentation for `Transform.Rotate` lists several combinations of arguments
    that it can take. Instead of accepting a `Vector3` to rotate around and an angle
    (in degrees), `Transform.Rotate` can take the x, y, and z axis rotations separately.
    [Listing 4-7](#9781430248750_Ch04.xhtml#list7) shows an alternative version of
    our `Update` function that just passes in the x, y, and z rotations.


    [Listing 4-7.](#9781430248750_Ch04.xhtml#_list7)  Version of Transform.Rotate
    That Takes Rotation in x, y, and z Angles


    ```

    function Update () {

            transform.Rotate(0,speed*Time.deltaTime,0);

    }

    ```


    Or the x, y, and z rotations can be packaged into a `Vector3`, as shown in [Listing
    4-8](#9781430248750_Ch04.xhtml#list8).'
