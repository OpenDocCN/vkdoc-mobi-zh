    On the way, we’ll go through step-by-step project examples to learn the Unity
    Editor and how to incorporate graphics, audio, physics, and scripting to make
    games, and then we’ll move on to developing specifically for iOS. We’ll take advantage
    of free art and audio from the Unity Asset Store, so we won’t be creating 3D models
    or sound samples from scratch and can stay within the comfy confines of Unity
    (except when we have to dabble in Xcode when making iOS builds). We will, however,
    do plenty of scripting with Unity’s version of JavaScript. Our focus will be on
    using the built-in Unity script functions, but I’ll point you to Unity plugins
    and packages that provide further capability.


    You can find the source code on `Apress.com` at `http://www.apress.com/9781430248750`
    or on `http://learnunity4.com/`.


    ## Explore Further


    No one knows everything. That’s why a key to successful development is knowing
    how to find the tools, assets, information, and help you need. So at the end of
    each chapter, I’ll suggest some reading and resources for you to explore further.


    I’ll start here, with a recommendation of other worthwhile Unity books. Even on
    the same topic, it’s useful to read different books for their different takes
    on the subject. For example, Will Goldstone wrote one of the first Unity books,
    *Unity Game Development Essentials*, Sue Blackman’s *Beginning Unity 3D Development*
    is a hefty tome from an artist’s viewpoint that presents an adventure game, and
    Jeff Murray covers Unity iOS in *Game Development for iOS with Unity 3D*, using
    a kart racing game as an example.


    Since I waxed nostalgic on Apple computers, I should follow up with some Apple
    historical reading. *Revolution in the Valley* is a fun collection of Mac development
    anecdotes by Andy Hertzfeld. *iWoz* by Steve Wozniak is an interesting peek at
    early Apple history and at the Woz himself, and *Apple Design: The Work of the
    Apple Industrial Design Group* by Paul Kunkel portrays the lineup of classic Macs
    (and by classic, I mean everything before 1997).


    Although this book makes heavy use of example game projects, there won’t be much
    discussion on game design. But there’s certainly a lot of interesting reading
    on the subject. My favorite game design book is Richard Rouse’s *Game Design:
    Theory and Practice*, mostly a collection of interviews with famous game designers.
    And there’s a bounty of game design articles and blogs on the web site Gamasutra
    (`http://gamasutra.com/`).


    # Chapter 1: Getting Started


    Unity is a cross-platform 3D game development system developed by a company called
    Unity Technologies (originally named Over the Edge). What does it mean to call
    Unity cross-platform, exactly? Well, it’s cross-platform in the sense that the
    Unity Editor, the game creation and editing tool that is the centerpiece of Unity,
    runs on OS X and Windows. More impressively, Unity is cross-platform in the sense
    that from the Unity Editor we can build games for OS X, Windows, web browsers
    (using either Flash, Google Native client, or Unity’s browser plug-in), iOS, Android,
    and game consoles. And the list keeps growing (shortly before this book’s publication,
    Unity Technologies announced support for the BlackBerry 10)!


    As for 3D, Unity is a 3D game development system in the sense that Unity’s built-in
    graphics, sound, and physics engines all operate in 3D space, which is perfect
    for creating 3D games, but many successful 2D games have also been developed in
    Unity.


    This book describes the latest version of Unity as of this writing, which is Unity
    4.1.2, but Unity is a fast-moving target, with new features and user interface
    changes appearing even in minor releases (which are appearing more frequently,
    since Unity Technologies has introduced a faster incremental update schedule starting
    with Unity 4). This caveat applies to everything else, of course, including products,
    licenses, and prices from Unity, Apple, and third-party vendors.


    ## Prerequisites


    Before the fun part, learning how to use the Unity Editor and build games, you
    need to download Unity, install it, and activate a license. Although you’ll spend
    the first several chapters working with step-by-step examples in the Unity Editor
    and not get into iOS development until later (by the way, iOS originally stood
    for iPhone Operating System, but now includes the iPod Touch and iPad), it’s not
    a bad idea to get started on the iOS development prerequisites, too.


    ### Prepare Your Mac


    For iOS development, you’ll need a Mac running the Lion or Mountain Lion version
    of OS X (that is, version 10.7 and up). Unity 4 can still run on older versions
    of OS X, like Snow Leopard, but Lion and Mountain Lion are currently required
    to run the latest version of Xcode, the software tool required by Apple for iOS
    development. Typically, the latest or fairly recent version of Xcode is required
    to target the latest version of iOS.


    ### Register as an iOS Developer


    It’s worth visiting the Apple developer site to register as an iOS developer as
    soon as possible, since the approval process can take a while, particularly if
    you’re registering a company. First, you’ll need to register on the site as an
    Apple developer (free) and then log in and register as an iOS developer ($99 per
    year membership). This is required to deploy your apps on test devices and to
    submit those apps to the App Store.


    ### Download Xcode


    Although you won’t need Xcode until we reach the iOS portion of this book, you
    can download Xcode now from the Mac App Store (just search for “xcode”) or from
    the Apple developer site at `http://developer.apple.com/`. When you start building
    Unity iOS apps, I’ll go over the Xcode installation in more detail.


    ### Download Unity


    To obtain Unity, visit the Unity web site at `http://unity3d.com/` and go to the
    Download page. There you will find a download link for the latest version of Unity
    (at the moment, Unity 4.1.2) and also a link to the release notes (which are included
    with the installation). There is also a link to a list of older versions in case
    you need to roll back to a previous version of Unity for some reason.


    **Tip:** While you’re on the Unity web site, take a look around. Check out the
    demos, the FAQ, the feature comparisons among the various licenses, and the support
    links to the documentation, user forum, and other community support sites. You’ll
    certainly have to come back later, so you might as well figure out where everything
    is now!


    There is only one Unity application, with additional features and platform support
    activated by licenses. For example, the product name Unity iOS Pro specifies Unity
    with an added Unity Pro license and also a Unity iOS Pro license. I’ll elaborate
    on the various licenses a little bit later in this chapter when I introduce the
    License Management window in Unity.


    Unity version numbers are in the form major.minor.patch. So Unity 4.1.2 is Unity
    4.0 with an incremental upgrade to Unity 4.1, with a couple of bug fix updates.
    Major upgrades, such as Unity 3 to Unity 4, require a license upgrade purchase
    and may require changes to the project.


    **Tip:** In general, once a Unity project has been upgraded, it may become incompatible
    with older versions of Unity. So it’s a good idea to make a copy of your project
    before upgrading it, just in case you need to revert back to the previous version
    of Unity.


    To start the Unity installation process, click the download link (as of this writing,
    it’s a button labeled Download Unity 4.1.2). The file is around 1GB in size, so
    the download will take a while, but we’re on our way!


    ### Install Unity


    The Unity download file is a disk image (DMG file), which at this time is a file
    named `unity-4.1.2.dmg`. Once the file is downloaded, double-click it to see the
    disk image contents (Figure 1-1).


    ![9781430248750_Fig01-01.jpg](images/9781430248750_Fig01-01.jpg)


    *Figure 1-1. The Unity installer files*'
