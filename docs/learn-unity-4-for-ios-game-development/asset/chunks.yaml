- fmt: '### Development Provisioning Profiles


    Actually, once you have generated a development certificate, the Provisioning
    Portal will automatically generate a Team Provisioning Profile for you that uses
    the asterisk `*` as an app ID and thus matches any of your bundle IDs, which is
    a real convenience. But you can also generate any number of other development
    provisioning profiles with the same certificate and the app ID you specify.


    ### Distribution Provisioning Profiles


    Creating a distribution provisioning profile is similar to creating a development
    provisioning profile. You’ll need to create a distribution certificate and then
    a distribution provisioning profile associated with that certificate.


    **Tip** You can save a little time by reusing the same certificate request file
    to create both the development and distribution certificates.


    ### The Xcode Organizer


    When your development provisioning profiles are available, you can download them
    into Xcode. Bring up the Xcode Organizer window (from the Xcode Window menu),
    select Provisioning Profiles in the sidebar, and click the Refresh button on the
    lower right of the profiles list. After prompting you for your Apple developer
    login, the Organizer will retrieve and display all the provisioning profiles you''ve
    created in the Provisioning Portal.


    [Figure 11-3](#9781430248750_Ch11.xhtml#Fig3) shows all four of my provisioning
    profiles. Notice all the app IDs are prefixed with a number. That’s generated
    by the Provisioning Portal and called the *bundle seed ID*. For our purposes here,
    you can ignore it.


    ![9781430248750_Fig11-03.jpg](images/9781430248750_Fig11-03.jpg)


    [Figure 11-3](#9781430248750_Ch11.xhtml#_Fig3). Provisioning profiles listed in
    the Xcode Organizer


    The first provisioning profile, named La Petite Baguette Distribution, is a distribution
    provisioning profile that only matches an app called La Petite Baguette (a restaurant
    app). Notice that the app ID is fully specified, exactly matching the bundle ID
    for the La Petite Baguette app. Notice also that the provisioning profile has
    expired.


    The second profile, iOS Team Provisioning Profile, is a development provisioning
    profile automatically created by the Provisioning Portal. It matches any app’s
    bundle ID.


    The third profile, named techdev, is a development provisioning profile I created
    that will work with any of my apps, as it will match any bundle ID starting with
    `com.technicat`.


    The fourth profile is my sole distribution provisioning profile. It also matches
    any app that has a bundle ID starting with `com.technicat`.


    It’s not enough for the development provisioning profile to be in Xcode; it also
    has to be installed on your test devices. With a test device connected to your
    Mac and listed in the sidebar of the Xcode Organizer, just drag the profile from
    the Provisioning Profiles list to the device. To verify the profile is installed
    on the device, launch its Settings app, select the General category, and within
    that, select Profiles and see if the profile is listed there ([Figure 11-4](#9781430248750_Ch11.xhtml#Fig4)).


    ![9781430248750_Fig11-04.jpg](images/9781430248750_Fig11-04.jpg)


    [Figure 11-4](#9781430248750_Ch11.xhtml#_Fig4). Provisioning profiles on a test
    device


    Notice the expiration date. Certificates, and thus their associated provisioning
    profiles, expire after a year, at which point you’ll have to replace the expired
    profile with a new profile created with a new certificate.


    You can also create a new provisioning profile within the Xcode Organizer by clicking
    the + button on the lower left and then, after being prompted for a Provisioning
    Portal login, filling out the information as shown in [Figure 11-5](#9781430248750_Ch11.xhtml#Fig5).


    ![9781430248750_Fig11-05.jpg](images/9781430248750_Fig11-05.jpg)


    [Figure 11-5](#9781430248750_Ch11.xhtml#_Fig5). Creating a provisioning profile
    from the Xcode Organizer


    This is the same information you would provide in the Provisioning Portal to create
    a development provisioning profile. Once you have provided enough information
    (don’t forget to enter a name!), the Finish button will be enabled, and after
    clicking Finish, the new provisioning profile will show up in the list of all
    your provisioning profiles ([Figure 11-6](#9781430248750_Ch11.xhtml#Fig6)).


    ![9781430248750_Fig11-06.jpg](images/9781430248750_Fig11-06.jpg)


    [Figure 11-6](#9781430248750_Ch11.xhtml#_Fig6). A newly created provisioning profile
    in the Xcode Organizer


    If you happen to be working in Xcode and need to create a development provisioning
    profile, this is a convenient option. But I prefer to create my provisioning profiles
    directly in the Provisioning Portal, because requesting certificates, registering
    test devices, and creating distribution provisioning profiles have to take place
    there. And working directly in the Provisioning Portal avoids some flakiness I’ve
    encountered from time to time when managing provisioning profiles in the Organizer.


    ### Build and Run


    Now you’re ready to start testing your device. The process is exactly the same
    as building and running for the iOS Simulator, except first you will need to go
    to the Unity Player Settings and set the SDK Version to Device SDK instead of
    Simulator SDK ([Figure 11-7](#9781430248750_Ch11.xhtml#Fig7)).


    ![9781430248750_Fig11-07.jpg](images/9781430248750_Fig11-07.jpg)


    [Figure 11-7](#9781430248750_Ch11.xhtml#_Fig7). The Player Settings for a device
    build


    Before starting a build, because you’re building for real hardware, you should
    make sure the Target iOS Version is compatible with your test device (or vice
    versa), meaning the Target iOS Version should be at least as old as whatever version
    of iOS your test device is running. But really, it’s a deployment decision, too.
    Supporting older versions of iOS increases the potential number of customers,
    but may increase your support burden and prevent use of features available only
    in later versions of iOS. It turns out there is data on iOS hardware and versions
    currently running Unity-based apps, collected by Unity at `http://stats.unity3d.com/`.
    Any Unity app you create will contribute to this data, as long as the Submit HW
    Statistics option is selected in the Player Settings.


    You can perform a Build and Run, which is equivalent to performing a Build, manually
    opening the generated Xcode project by double-clicking the project file ([Figure
    11-8](#9781430248750_Ch11.xhtml#Fig8)), and then clicking the Run button in Xcode.


    ![9781430248750_Fig11-08.jpg](images/9781430248750_Fig11-08.jpg)


    [Figure 11-8](#9781430248750_Ch11.xhtml#_Fig8). An Xcode project generated by
    a Unity iOS build


    Either way, instead of building and running in the iOS Simulator, Xcode will build,
    install, and run on the connected test device.


    **Tip** It’s best to disable screen lock completely while using a device for testing.
    Initiating a run from Xcode will fail if the connected device has the screen locked.


    As with the iOS Simulator, any Unity debug text will show up in the Xcode debug
    area ([Figure 11-9](#9781430248750_Ch11.xhtml#Fig9)) instead of the Console View
    as in the Unity Editor.


    ![9781430248750_Fig11-09.jpg](images/9781430248750_Fig11-09.jpg)


    [Figure 11-9](#9781430248750_Ch11.xhtml#_Fig9). Xcode running an app on a test
    device


    **Note** The Xcode equivalent of views in the Unity Editor are called *areas*.
    Unlike views, Xcode areas are spelled in lowercase, e.g., the navigation area,
    the editor area and the debug area.


    You can also make use of the MonoDevelop debugger, although there''s more setup
    involved to debug an iOS app than a game running in the Unity Editor. To enable
    the app for remote debugging with MonoDevelop, select the Development Build option
    in the Build Settings window ([Figure 11-10](#9781430248750_Ch11.xhtml#Fig10)).
    After the Development Build option is enabled, the Script Debugging option becomes
    available, and you should select that, too.'
  raw: 'Actually, once you have generated a development certificate, the Provisioning
    Portal will automatically generate a Team Provisioning Profile for you that uses
    the asterisk * as an app ID and thus matches any of your bundle IDs, which is
    a real convenience. But you can also generate any number of other development
    provisioning profiles with the same certificate and the app ID you specify.


    Distribution Provisioning Profiles


    Creating a distribution provisioning profile is similar to creating a development
    provisioning profile. You’ll need to create a distribution certificate and then
    a distribution provisioning profile associated with that certificate.


    **Tip**   You can save a little time by reusing the same certificate request file
    to create both the development and distribution certificates.


    The Xcode Organizer


    When your development provisioning profiles are available, you can download them
    into Xcode. Bring up the Xcode Organizer window (from the Xcode Window menu),
    select Provisioning Profiles in the sidebar, and click the Refresh button on the
    lower right of the profiles list. After prompting you for your Apple developer
    login, the Organizer will retrieve and display all the provisioning profiles you''ve
    created in the Provisioning Portal.


    [Figure 11-3](#9781430248750_Ch11.xhtml#Fig3) shows all four of my provisioning
    profiles. Notice all the app IDs are prefixed with a number. That’s generated
    by the Provisioning Portal and called the *bundle seed ID*. For our purposes here,
    you can ignore it.


    ![9781430248750_Fig11-03.jpg](images/9781430248750_Fig11-03.jpg)


    [Figure 11-3](#9781430248750_Ch11.xhtml#_Fig3). Provisioning profiles listed in
    the Xcode Organizer


    The first provisioning profile, named La Petite Baguette Distribution, is a distribution
    provisioning profile that only matches an app called La Petite Baguette (a restaurant
    app). Notice that the app ID is fully specified, exactly matching the bundle ID
    for the La Petite Baguette app. Notice also that the provisioning profile has
    expired.


    The second profile, iOS Team Provisioning Profile, is a development provisioning
    profile automatically created by the Provisioning Portal. It matches any app’s
    bundle ID.


    The third profile, named techdev, is a development provisioning profile I created
    that will work with any of my apps, as it will match any bundle ID starting with
    `com.technicat`.


    The fourth profile is my sole distribution provisioning profile. It also matches
    any app that has a bundle ID starting with `com.technicat`.


    It’s not enough for the development provisioning profile to be in Xcode; it also
    has to be installed on your test devices. With a test device connected to your
    Mac and listed in the sidebar of the Xcode Organizer, just drag the profile from
    the Provisioning Profiles list to the device. To verify the profile is installed
    on the device, launch its Settings app, select the General category, and within
    that, select Profiles and see if the profile is listed there ([Figure 11-4](#9781430248750_Ch11.xhtml#Fig4)).


    ![9781430248750_Fig11-04.jpg](images/9781430248750_Fig11-04.jpg)


    [Figure 11-4](#9781430248750_Ch11.xhtml#_Fig4). Provisioning profiles on a test
    device


    Notice the expiration date. Certificates, and thus their associated provisioning
    profiles, expire after a year, at which point you’ll have to replace the expired
    profile with a new profile created with a new certificate.


    You can also create a new provisioning profile within the Xcode Organizer by clicking
    the + button on the lower left and then, after being prompted for a Provisioning
    Portal login, filling out the information as shown in [Figure 11-5](#9781430248750_Ch11.xhtml#Fig5).


    ![9781430248750_Fig11-05.jpg](images/9781430248750_Fig11-05.jpg)


    [Figure 11-5](#9781430248750_Ch11.xhtml#_Fig5). Creating a provisioning profile
    from the Xcode Organizer


    This is the same information you would provide in the Provisioning Portal to create
    a development provisioning profile. Once you have provided enough information
    (don’t forget to enter a name!), the Finish button will be enabled, and after
    clicking Finish, the new provisioning profile will show up in the list of all
    your provisioning profiles ([Figure 11-6](#9781430248750_Ch11.xhtml#Fig6)).


    ![9781430248750_Fig11-06.jpg](images/9781430248750_Fig11-06.jpg)


    [Figure 11-6](#9781430248750_Ch11.xhtml#_Fig6). A newly created provisioning profile
    in the Xcode Organizer


    If you happen to be working in Xcode and need to create a development provisioning
    profile, this is a convenient option. But I prefer to create my provisioning profiles
    directly in the Provisioning Portal, because requesting certificates, registering
    test devices, and creating distribution provisioning profiles have to take place
    there. And working directly in the Provisioning Portal avoids some flakiness I’ve
    encountered from time to time when managing provisioning profiles in the Organizer.


    Build and Run


    Now you’re ready to start testing your device. The process is exactly the same
    as building and running for the iOS Simulator, except first you will need to go
    to the Unity Player Settings and set the SDK Version to Device SDK instead of
    Simulator SDK ([Figure 11-7](#9781430248750_Ch11.xhtml#Fig7)).


    ![9781430248750_Fig11-07.jpg](images/9781430248750_Fig11-07.jpg)


    [Figure 11-7](#9781430248750_Ch11.xhtml#_Fig7). The Player Settings for a device
    build


    Before starting a build, because you’re building for real hardware, you should
    make sure the Target iOS Version is compatible with your test device (or vice
    versa), meaning the Target iOS Version should be at least as old as whatever version
    of iOS your test device is running. But really, it’s a deployment decision, too.
    Supporting older versions of iOS increases the potential number of customers,
    but may increase your support burden and prevent use of features available only
    in later versions of iOS. It turns out there is data on iOS hardware and versions
    currently running Unity-based apps, collected by Unity at `http://stats.unity3d.com/`
    Any Unity app you create will contribute to this data, as long as the Submit HW
    Statistics option is selected in the Player Settings.You can perform a Build and
    Run, which is equivalent to performing a Build, manually opening the generated
    Xcode project by double-clicking the project file ([Figure 11-8](#9781430248750_Ch11.xhtml#Fig8)),
    and then clicking the Run button in Xcode.


    ![9781430248750_Fig11-08.jpg](images/9781430248750_Fig11-08.jpg)


    [Figure 11-8](#9781430248750_Ch11.xhtml#_Fig8). An Xcode project generated by
    a Unity iOS build


    Either way, instead of building and running in the iOS Simulator, Xcode will build,
    install, and run on the connected test device.


    **Tip**   It’s best to disable screen lock completely while using a device for
    testing. Initiating a run from Xcode will fail if the connected device has the
    screen locked.


    As with the iOS Simulator, any Unity debug text will show up in the Xcode debug
    area ([Figure 11-9](#9781430248750_Ch11.xhtml#Fig9)) instead of the Console View
    as in the Unity Editor.


    ![9781430248750_Fig11-09.jpg](images/9781430248750_Fig11-09.jpg)


    [Figure 11-9](#9781430248750_Ch11.xhtml#_Fig9). Xcode running an app on a test
    device


    **Note**   The Xcode equivalent of views in the Unity Editor are called *areas*.
    Unlike views, Xcode areas are spelled in lowercase, e.g., the navigation area,
    the editor area and the debug area.


    You can also make use of the MonoDevelop debugger, although there''s more setup
    involved to debug an iOS app than a game running in the Unity Editor. To enable
    the app for remote debugging with MonoDevelop, select the Development Build option
    in the Build Settings window ([Figure 11-10](#9781430248750_Ch11.xhtml#Fig10)).
    After the Development Build option is enabled, the Script Debugging option becomes
    available, and you should select that, too.'
  trans: '

    ### 开发预置描述文件


    实际上，一旦你生成了开发证书，预置门户会自动为你生成一个团队预置描述文件，该文件使用星号 `*` 作为应用 ID，因此可以匹配你的任何 Bundle ID，这确实非常方便。但你也可以使用相同的证书和你指定的应用
    ID 来生成任意数量的其他开发预置描述文件。


    ### 分发预置描述文件


    创建分发预置描述文件与创建开发预置描述文件类似。你需要先创建一个分发证书，然后创建一个与该证书关联的分发预置描述文件。


    **提示** 重复使用同一个证书请求文件来创建开发证书和分发证书，可以节省一点时间。


    ### Xcode 管理器


    当你的开发预置描述文件可用时，你可以将它们下载到 Xcode 中。打开 Xcode 管理器窗口（从 Xcode 的“窗口”菜单），在侧边栏中选择“预置描述文件”，然后点击描述文件列表右下角的“刷新”按钮。在提示输入你的
    Apple 开发者登录信息后，管理器将检索并显示你在预置门户中创建的所有预置描述文件。


    图 11-3 显示了我的全部四个预置描述文件。注意所有应用 ID 都以数字为前缀。这是由预置门户生成的，称为*捆绑种子 ID*。就我们这里的目的而言，你可以忽略它。


    ![9781430248750_Fig11-03.jpg](img/9781430248750_Fig11-03.jpg)


    图 11-3. Xcode 管理器中列出的预置描述文件


    第一个预置描述文件，名为 La Petite Baguette Distribution，是一个分发预置描述文件，它仅匹配一个名为 La Petite Baguette（一个餐厅应用）的应用。注意应用
    ID 是完全指定的，与 La Petite Baguette 应用的 Bundle ID 精确匹配。还要注意该预置描述文件已过期。


    第二个描述文件，iOS Team Provisioning Profile，是由预置门户自动创建的开发预置描述文件。它匹配任何应用的 Bundle ID。


    第三个描述文件，名为 techdev，是我创建的一个开发预置描述文件，它将适用于我的任何应用，因为它能匹配任何以 `com.technicat` 开头的 Bundle
    ID。


    第四个描述文件是我唯一的分发预置描述文件。它也匹配任何 Bundle ID 以 `com.technicat` 开头的应用。


    仅仅将开发预置描述文件放在 Xcode 中还不够；它还必须安装到你的测试设备上。将测试设备连接到你的 Mac 并使其出现在 Xcode 管理器的侧边栏中后，只需将描述文件从“预置描述文件”列表拖放到设备上即可。要验证描述文件是否已安装到设备上，请启动设备的“设置”应用，选择“通用”类别，然后在其中选择“描述文件”，查看该描述文件是否列在其中（图
    11-4）。


    ![9781430248750_Fig11-04.jpg](img/9781430248750_Fig11-04.jpg)


    图 11-4. 测试设备上的预置描述文件


    注意过期日期。证书及其关联的预置描述文件会在一年后过期，届时你必须用使用新证书创建的新描述文件替换已过期的描述文件。


    你也可以在 Xcode 管理器中创建新的预置描述文件：点击左下角的 + 按钮，然后在提示输入预置门户登录信息后，填写如图 11-5 所示的信息。


    ![9781430248750_Fig11-05.jpg](img/9781430248750_Fig11-05.jpg)


    图 11-5. 从 Xcode 管理器创建预置描述文件


    这些信息与在预置门户中创建开发预置描述文件时提供的信息相同。一旦你提供了足够的信息（别忘了输入一个名称！），“完成”按钮将被启用，点击“完成”后，新的预置描述文件将出现在你所有预置描述文件的列表中（图
    11-6）。


    ![9781430248750_Fig11-06.jpg](img/9781430248750_Fig11-06.jpg)


    图 11-6. Xcode 管理器中一个新创建的预置描述文件


    如果你恰好在 Xcode 中工作并需要创建一个开发预置描述文件，这是一个便捷的选项。但我更倾向于直接在预置门户中创建我的预置描述文件，因为请求证书、注册测试设备和创建分发预置描述文件都必须在那里进行。并且直接在预置门户中操作可以避免我在管理器中管理预置描述文件时偶尔遇到的一些不稳定问题。


    ### 构建并运行


    现在你已经准备好开始在你的设备上测试了。这个过程与为 iOS 模拟器构建和运行完全相同，只是你首先需要进入 Unity 的游戏播放器设置，将 SDK 版本设置为
    Device SDK 而不是 Simulator SDK（图 11-7）。


    ![9781430248750_Fig11-07.jpg](img/9781430248750_Fig11-07.jpg)


    图 11-7. 设备构建的播放器设置


    在开始构建之前，因为你是为真实硬件进行构建，你应该确保目标 iOS 版本与你的测试设备兼容（反之亦然），这意味着目标 iOS 版本至少应与你的测试设备运行的
    iOS 版本相同或更早。但实际上，这也是一个部署决策。支持较旧版本的 iOS 可以增加潜在用户数量，但可能会增加你的支持负担，并阻止使用仅在较新版本 iOS
    中可用的功能。事实证明，Unity 在 `http://stats.unity3d.com/` 收集了关于当前运行基于 Unity 应用的 iOS 硬件和版本的数据。只要你创建的
    Unity 应用在播放器设置中选择了“提交硬件统计信息”选项，这些应用都将为此数据做出贡献。


    你可以执行“构建并运行”，这相当于先执行“构建”，然后通过双击项目文件手动打开生成的 Xcode 项目（图 11-8），再点击 Xcode 中的“运行”按钮。


    ![9781430248750_Fig11-08.jpg](img/9781430248750_Fig11-08.jpg)


    图 11-8. 由 Unity iOS 构建生成的 Xcode 项目


    无论哪种方式，Xcode 都不会在 iOS 模拟器中构建和运行，而是在连接的测试设备上构建、安装和运行。


    **提示** 使用设备进行测试时，最好完全禁用屏幕锁定。如果连接的设备锁屏，从 Xcode 启动运行将会失败。


    与 iOS 模拟器一样，任何 Unity 调试文本都会显示在 Xcode 调试区域（图 11-9）中，而不是像 Unity 编辑器中那样显示在控制台视图中。


    ![9781430248750_Fig11-09.jpg](img/9781430248750_Fig11-09.jpg)


    图 11-9. Xcode 在测试设备上运行应用


    **注意** Xcode 中与 Unity 编辑器视图等效的部分称为*区域*。与视图不同，Xcode 区域名称使用小写字母拼写，例如，导航区域、编辑器区域和调试区域。


    你也可以使用 MonoDevelop 调试器，尽管调试一个 iOS 应用比调试 Unity 编辑器中运行的游戏需要进行更多的设置。要启用应用以使用 MonoDevelop
    进行远程调试，请在构建设置窗口中选择“开发构建”选项（图 11-10）。启用“开发构建”选项后，“脚本调试”选项变为可用，你也应该选择它。

