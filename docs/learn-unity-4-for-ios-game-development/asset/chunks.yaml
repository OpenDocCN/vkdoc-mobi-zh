  trans: "\n在右上角，与 Game Center 按钮同一区域，是管理 iAd Network 按钮（图 15-3）。  \n![9781430248750_Fig15-03.jpg](img/9781430248750_Fig15-03.jpg)\
    \  \n图 15-3。iTunes Connect 中应用信息页面的顶部区域\n\n点击管理 iAd Network 按钮，开始启用 iAd 的流程。这比启用\
    \ Game Center 简单得多。无需设置排行榜或成就，只需点击启用 iAd Network 按钮即可（图 15-4）。  \n![9781430248750_Fig15-04.jpg](img/9781430248750_Fig15-04.jpg)\
    \  \n图 15-4。在 iTunes Connect 上启用 iAd\n\n与 Game Center 一样，iAd 只能在应用的**新版本**被添加到\
    \ iTunes Connect 之后、且在该版本被批准和发布之前，才能启用或禁用。iAd 的更改将影响即将发布的版本，并且无法更改已在 App Store\
    \ 上的应用的 iAd 状态。\n\n**提示**  \n我曾有应用因截图包含测试广告而被拒绝，因此你可能需要在启用 iAd 之前为你的应用截图。\n\n\
    现在，我们的应用在服务器端已启用了 iAd，你只需将 iAd 代码添加到应用本身即可。\n\n## 添加横幅广告\n\n让我们先为保龄球游戏添加一个横幅广告。与仅适用于\
    \ iPad 的插页式广告不同，横幅广告适用于所有设备。坦率地说，横幅广告更容易集成到游戏中。你只需要在屏幕顶部或底部预留一些空间。\n\n**提示** \
    \ \n在设计应用时就应考虑将广告置于何处，而不是事后才考虑。\n\n### 创建脚本\n\n类似于上一章我们为初始化 Game Center 创建脚本的方式，让我们编写一个脚本来实例化并放置一个横幅广告。在项目视图中创建一个新的\
    \ JavaScript 文件，将其放在 Scripts 文件夹中，并命名为 `FuguAdBanner`（图 15-5）。  \n![9781430248750_Fig15-05.jpg](img/9781430248750_Fig15-05.jpg)\
    \  \n图 15-5。创建 FuguAdBanner 脚本\n\n然后编辑该脚本，并将代码清单 15-1 的内容添加到其中。\n\n代码清单 15-1。FuguAdBanner.js\
    \ 的完整代码清单\n\n```\n#pragma strict\n\npublic var showOnTop:boolean = true; // 横幅在屏幕顶部或底部\n\
    public var dontDestroy:boolean = false; // 为下一个场景保留此游戏对象\n\n#if UNITY_IPHONE\n\
    \n// 不要将其设为局部变量，否则它会被垃圾回收\nprivate var banner:ADBannerView;\n\nfunction Start\
    \ () {\n        if (dontDestroy) {\n                GameObject.DontDestroyOnLoad(gameObject);\
    \ // 跨场景保持广告存活\n        }\n        Debug.Log(\"正在创建 iAd 横幅\");\n        banner\
    \ = new ADBannerView();\n        banner.autoSize = true;\n        banner.autoPosition\
    \ = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n        while (!banner.loaded\
    \ && banner.error == null) {\n                yield;\n        }\n        if (banner.error\
    \ == null) {\n                Debug.Log(\"iAd 横幅已显示\");\n                banner.Show();\n\
    \        } else {\n                Debug.Log(\"iAd 横幅错误: \"+banner.error.description);\n\
    \                banner = null;\n        }\n}\n#endif\n```\n\n`FuguAdBanner` 中的代码与\
    \ `AdBannerView` 的脚本参考示例类似。`Start` 回调会创建一个 `AdBannerView` 实例，并在 `while` 循环中等待，要么等待横幅加载完成（由\
    \ `AdBannerView` 的 `loaded` 变量指示），要么等待错误发生（由 `AdBannerView` 中的 `error` 变量指示）。`while`\
    \ 循环调用 `yield` 以避免阻塞游戏的其余部分运行。\n\n如果发生错误，错误消息会通过 `Debug.Log` 记录下来。\n\n如果横幅加载成功，则会立即通过调用\
    \ `AdBannerView` 的 `Show` 函数显示广告。你可以随时调用广告的 `Show` 和 `Hide` 方法，但对于横幅广告，最简单的方式是让它一直显示。\n\
    \n### 变量\n\n为了给脚本提供一定的灵活性和可复用性，让我们添加几个公共布尔变量，它们将在检视视图中显示为复选框。`ShowOnTop` 变量通过相应地传递枚举值\
    \ `AdPosition.Top` 或 `AdPosition.Bottom`，来决定横幅是显示在屏幕顶部还是底部（仅有的两个选项）。iAd 横幅会自动调整大小以横跨屏幕。\n\
    \n如果另一个变量 `DontDestroy` 为 `true`，则我们调用静态函数 `GameObject.DontDestroyOnLoad`，并传入脚本所附加的游戏对象。这样做可以在加载另一个关卡时保持该游戏对象存活，因此如果你有多个场景，则无需在每个场景中都添加一个\
    \ `AdBanner` 游戏对象。\n\n**注意**  \n在稍后会被再次加载的场景中调用 `GameObject.DontDestroyOnLoad`\
    \ 可能会导致重复的游戏对象。\n\n例如，如果你将 `AdBanner` 游戏对象放在启动场景中而不是保龄球场景中，将 `dontDestroy` 设置为\
    \ `true` 将使横幅广告在加载保龄球场景时持续存在，而不会被销毁。\n\n### 垃圾回收\n\n谈到销毁的对象，请注意我们在 `Start` 函数外部声明了\
    \ `banner` 变量，虽然看起来它本可以在内部声明。通常，最好在尽可能小的作用域内声明变量，但在这种情况下，你需要 `ADBannerView` 的生命周期与该游戏对象的生命周期一致。如果你在\
    \ `Start` 函数内部将 `banner` 声明为变量，那么当 `Start` 函数返回后，就不会再有任何对 `ADBannerView` 对象的引用，该对象可能会随时被销毁以释放其占用的内存，并且广告也会随之消失。\n\
    \n这种回收过程被称为*垃圾回收*（GC），因为那些无法被代码访问到的对象实际上就是垃圾。对于场景中的对象（基本上所有类继承自 `UnityEngine.Object`\
    \ 的对象）来说，GC 不是问题，因为只要它们在场景中，就存在一个对它们的隐式引用。通常，这些对象必须通过调用 `UnityEngine.Object` 类的静态\
    \ `Destroy` 函数来显式清理。\n\n### 附加脚本\n\n要将 `FuguAdBanner` 脚本添加到保龄球场景，请确保该场景已打开，在层次视图中创建一个新的游戏对象，将其命名为\
    \ `AdBanner`，然后将 `FuguAdBanner` 脚本拖到它上面（图 15-6）。  \n![9781430248750_Fig15-06.jpg](img/9781430248750_Fig15-06.jpg)\
    \  \n图 15-6。已添加到场景中的 FuguAdBanner 脚本\n\n因为我们的记分板在屏幕顶部，横幅广告最好放在底部，所以取消勾选 `Show\
    \ On Top`。并且由于 `AdBanner` 游戏对象放置在保龄球场景中，而该场景不会加载任何其他场景，因此是否调用 `DontDestroyOnLoad`\
    \ 实际上无关紧要，但我们也保持 `DontDestroy` 为未勾选状态。\n\n### 测试脚本\n\n在编辑器中运行游戏时，iAd 不会显示，但你可以通过在\
    \ iOS 模拟器或设备上运行游戏来测试它。在应用未被批准之前，它只会显示测试广告，如图 15-7 所示。  \n![9781430248750_Fig15-07.jpg](img/9781430248750_Fig15-07.jpg)\
    \  \n图 15-7。一个测试 iAd 横幅\n\n如果广告没有出现，请检查 Xcode 调试区域，查看 `FuguAdBanner` 脚本输出的 `Debug.Log`\
    \ 错误消息。但如果没有错误消息，则无需担心。\n"
- fmt: "Sometimes ads take a while to show up, and sometimes the iAd server fails\
    \ to provide an ad, in which case a *No inventory* message will appear in the\
    \ debug area. Even after an app is approved, there is typically a delay until\
    \ iAd is really activated. During that time, users will see test ads, but again,\
    \ don’t panic!\n\n## Add an Interstitial Ad\n\nNow we’re ready to try an interstitial\
    \ ad. Since interstitial ads are full-screen ads, we have to treat them differently\
    \ from banner ads. When an interstitial ad appears, it has to be dismissed before\
    \ the game can proceed, much like dismissing a modal dialog. For that reason,\
    \ interstitial ads are usually placed strategically at transition points in the\
    \ game (interstitial means in between). No one would like a full-page ad popping\
    \ up in the middle of a game! For this reason, let’s place our interstitial ad\
    \ in the splash scene, so it appears, if it appears, before the bowling scene\
    \ is loaded.\n\nAgain, let’s start by creating a new JavaScript, named `FuguAdInterstitial`\
    \ ([Figure 15-8](#9781430248750_Ch15.xhtml#Fig8)). Add the contents of [Listing\
    \ 15-2](#9781430248750_Ch15.xhtml#list2).\n\n![9781430248750_Fig15-08.jpg](images/9781430248750_Fig15-08.jpg)\n\
    \n[Figure 15-8](#9781430248750_Ch15.xhtml#_Fig8). Creating the `FuguAdInterstitial`\
    \ script\n\n[Listing 15-2.  ](#9781430248750_Ch15.xhtml#_list2)The Complete Listing\
    \ for `FuguAdInterstitial.js`\n\n```\n#pragma strict\n\nvar waitTime:float = 2.0;\n\
    \n#if UNITY_IPHONE\nprivate var ad:ADInterstitialAd = null;\n\nfunction Start()\
    \ {\n        if (iPhone.generation == iPhoneGeneration.iPad1Gen ||\n         \
    \       iPhone.generation == iPhoneGeneration.iPad2Gen ||\n                iPhone.generation\
    \ == iPhoneGeneration.iPad3Gen ||\n                iPhone.generation == iPhoneGeneration.iPad4Gen\
    \ ||\n                iPhone.generation == iPhoneGeneration.iPadMini1Gen ||\n\
    \                iPhone.generation == iPhoneGeneration.iPadUnknown) {\n      \
    \          ad = new ADInterstitialAd();\n                var startTime = Time.time;\n\
    \                while (!ad.loaded && ad.error == null && Time.time-startTime<waitTime)\
    \ {\n                        yield;\n                }\n                if (ad.loaded\
    \ && ad.error == null) {\n                        Debug.Log(\"iAd page shown\"\
    );\n                        ad.Present();\n                }  else {\n       \
    \                 if (ad.error != null) {\n                                Debug.Log(\"\
    iAd page error: \"+ad.error.description);\n                        }  else {\n\
    \                                Debug.Log(\"iAd page timed out\");\n        \
    \                }\n                        ad = null;\n                }\n  \
    \      }\n}\n#endif\n```\n\nBecause interstitial ads are only available on iPads,\
    \ the first thing to do in our `Start` function is check if its running on an\
    \ iPad. Unfortunately, there’s no succinct way to test for that, but you can check\
    \ the static variable of `iPhone.generation` and see if its value matches one\
    \ of the iPad models, each with a value defined in the `iPhoneGeneration` enumeration.\n\
    \nThe way you test `iPhone.generation` illustrates the iPad values of the `iPhoneGeneration`\
    \ enumeration, but it does have the disadvantage of requiring an update when future\
    \ versions of Unity add values to accommodate new iPad models. Another way to\
    \ do it, either more robust or a kludgy, depending on your viewpoint, would be\
    \ to convert the `enum` value to a string and check if it starts with “iPad,”\
    \ like this: `if(iPhone.generation.ToString().StartsWith(\"iPad\"))`.\n\nAfter\
    \ the iPad check, the code resembles the `FuguAdBanner` script. Instead of the\
    \ `ADBannerView` class, we have Unity’s `ADInterstitialAd` class. As `FuguAdBanner`\
    \ did with `ADBannerView`, the code instantiates an `ADInterstitialAd` and, within\
    \ a `while-yield` loop, waits for the `ADInterstitialAd` to load or fail with\
    \ an error.\n\nBut we don’t want to wait for an indeterminate duration, especially\
    \ if it’s going to delay the start of the game, so we also set it to stop waiting\
    \ after a certain amount of time, `waitTime`, has expired.\n\n`waitTime` is in\
    \ seconds and declared a public variable so it can be adjusted in the Inspector\
    \ View. Before the loop begins, the current game time, available in the static\
    \ variable `Time.time` (also in seconds), is saved in a local variable `startTime`.\
    \ The loop, along with checking if the ad has loaded or resulted in an error,\
    \ checks if `Time.time` minus `startTime` is still less than `waitTime`.\n\nWhen\
    \ the `while` loop terminates, the ad is displayed if it has loaded successfully,\
    \ using the `ADInterstitialAd.Present` function (essentially the same as the `Show`\
    \ function used for `ADBannerView`). If it hasn’t loaded successfully, an “iAd\
    \ page has timed out” message is logged with `Debug.Log`.\n\n## Attach the Script\n\
    \nWith our `FuguAdInterstitial` script in hand, we’re ready to add it to a scene.\
    \ As mentioned earlier, we’re going to add it to our splash scene, so let’s switch\
    \ to that scene (double-click the splash scene file in the Project View). Then\
    \ create an empty `GameObject` and name it `AdPage` (you could name it `AdInterstitial`,\
    \ but why not name it something easier to type). Drag the `FuguAdInterstitial`\
    \ script onto the `AdPage` `GameObject` ([Figure 15-9](#9781430248750_Ch15.xhtml#Fig9)).\n\
    \n![9781430248750_Fig15-09.jpg](images/9781430248750_Fig15-09.jpg)\n\n[Figure\
    \ 15-9](#9781430248750_Ch15.xhtml#_Fig9). Adding the `FuguAdInterstitial` script\
    \ to the splash scene\n\n## Test the Script\n\nNow we’re ready to roll. As with\
    \ banner ads, you won’t see any ads when running in the Editor, but when testing\
    \ on the iOS Simulator or on a device, you should see a full-page ad while the\
    \ splash screen is up ([Figure 15-10](#9781430248750_Ch15.xhtml#Fig10)). As with\
    \ banner ads again, there’s no guarantee that the iAd servers will send the ad,\
    \ but if it does, it will be a test ad until the app is released on the App Store.\n\
    \n![9781430248750_Fig15-10.jpg](images/9781430248750_Fig15-10.jpg)\n\n[Figure\
    \ 15-10](#9781430248750_Ch15.xhtml#_Fig10). Test interstitial iAd on the iOS Simulator\n\
    \n## Track Ad Revenues\n\nLike app sales revenue, iAd revenue is reported on iTunes\
    \ Connect, under the iAd Network page link, shown in [Figure 15-1](#9781430248750_Ch15.xhtml#Fig1).\
    \ The top of the iAd Network page displays a graph of iAd revenue for all your\
    \ apps ([Figure 15-11](#9781430248750_Ch15.xhtml#Fig11)).\n\n![9781430248750_Fig15-11.jpg](images/9781430248750_Fig15-11.jpg)\n\
    \n[Figure 15-11](#9781430248750_Ch15.xhtml#_Fig11). iAd revenue\n\nBelow the revenue\
    \ graph is a list of your iAd-enabled apps, both those that have gone live and\
    \ those that are still test ads ([Figure 15-12](#9781430248750_Ch15.xhtml#Fig12)).\n\
    \n![9781430248750_Fig15-12.jpg](images/9781430248750_Fig15-12.jpg)\n\n[Figure\
    \ 15-12](#9781430248750_Ch15.xhtml#_Fig12). An app listing on the iAd revenue\
    \ page\n\nClicking an app in the list brings up a similar page displaying revenue\
    \ just for that app. That page also displays ad revenue broken down by country\
    \ and provides options for editing the app description (what advertisers see)\
    \ and specifying competing companies and apps that you don’t want displayed in\
    \ your ads.\n\n## Explore Further\n\nThis chapter has been the shortest by far,\
    \ and that’s a good thing. It means our game is functionally complete and adding\
    \ ads is really simple. Even the setup on iTunes Connect wasn’t bad! In practice,\
    \ though, you may need to put some thought into where and when to place ads, especially\
    \ interstitial ads, and the earlier in the design process that takes place, the\
    \ better.\n\n## Scripting Reference\n\nWe managed to do a lot with just a little\
    \ code in this chapter. Only two classes were required to make use of iAds: `ADBannerView`\
    \ and `ADInterstitialAd`, and in a typical app you would only use one of those\
    \ classes (having both banner ads and interstitial ads is a bit much!)."
