    Bowling for Barrels


    Capsules make for very simplistic bowling pins, both in appearance and collision
    shape. A real bowling pin model would be much better, but, unfortunately, searching
    for bowling pins on the Asset Store turns up nothing (although that could change
    at any time if a vendor decides to fill the void). However, there are a lot of
    other models on the Asset Store, that, if we’re flexible, could act as bowling
    pin substitutes. It turns out there are several packages of barrel models, so
    we’ll go with barrels as pins for our backup plan.


    Pick a Barrel


    A search for barrel on the Asset Store reveals several free packages of barrel
    models ([Figure 7-14](#9781430248750_Ch07.xhtml#Fig14)).


    ![9781430248750_Fig07-14.jpg](images/9781430248750_Fig07-14.jpg)


