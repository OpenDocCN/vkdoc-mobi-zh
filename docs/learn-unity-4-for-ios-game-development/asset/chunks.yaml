- fmt: 'This time around, go straight to the Inspector View of the Plane ([Figure
    5-15](#9781430248750_Ch05.xhtml#Fig15)) and change its shader to `Bumped Specular`.
    Then drag a main texture and its associated bump (normal map) texture from the
    Free Artskillz Texture Pack (in the figure, I’ve chosen the `Floor03` and `Floor03_n`
    textures from the Fantasy folder of the pack).


    ![9781430248750_Fig05-15.jpg](images/9781430248750_Fig05-15.jpg)


    [Figure 5-15](#9781430248750_Ch05.xhtml#_Fig15). Editing the Plane position and
    material


    Now when you click `Play`, the skeleton is dancing on a floor! ([Figure 5-16](#9781430248750_Ch05.xhtml#Fig16)).


    ![9781430248750_Fig05-16.jpg](images/9781430248750_Fig05-16.jpg)


    [Figure 5-16](#9781430248750_Ch05.xhtml#_Fig16). The skeleton dancing on a textured
    Plane


    ## Add a Shadow (Pro)


    One of the Light Component properties discussed in [Chapter 3](#9781430248750_Ch03.xhtml)
    is `Shadow Type`. Now that the scene has a floor that shadows can be cast on,
    let’s try out this feature.


    **Note** Dynamic shadows (shadows that move according to the shadow caster’s movement)
    is a `Unity Pro` and `Unity iOS Pro` feature, so if you’re not running Unity Pro
    right now, you can still follow along with this exercise, but you won’t see the
    intended shadow.


    Select the Point Light (either in the Hierarchy View or Scene View), and in the
    Inspector View ([Figure 5-17](#9781430248750_Ch05.xhtml#Fig17)), change the `Shadow
    Type` from `None` to `Soft Shadows`. This provides shadows with a nice soft fuzzy
    border (the *penumbra* of the shadow), which looks better than the sharp borders
    of `Hard Shadows`.


    ![9781430248750_Fig05-17.jpg](images/9781430248750_Fig05-17.jpg)


    [Figure 5-17](#9781430248750_Ch05.xhtml#_Fig17). A Point Light converted to a
    Directional Light with Soft Shadows


    Now you should change the Type from `Point Light` to `Directional Light`. Point
    Lights can cast shadows, but only `Hard Shadows`, and only when rendering in `Deferred
    Mode`, which isn’t available in `Unity iOS`. Actually, `Soft Shadows` aren’t available
    in `Unity iOS` at all, but they look so good, let’s try them out here.


    Whereas a Point Light radiates light in all directions from a position, a Directional
    Light is treated as if it were infinitely far away, and thus its position doesn’t
    matter but its rotation does. So in the Transform Component, you can enter `0,0,0`
    for the position (which doesn’t really matter for a Directional Light, but it
    looks cleaner than having an arbitrary position), and `25,0,0` for the rotation,
    indicating the Light is rotated 25 degrees around the x axis. In other words,
    the Light is looking down 25 degrees from horizontal.


    Instead of entering a rotation, you could manually rotate the Light in the Scene
    View ([Figure 5-18](#9781430248750_Ch05.xhtml#Fig18)) by selecting the Light,
    clicking the Rotate tool in the button bar on the top left of the Unity Editor
    (third button from the left), and then dragging the circle representing x-axis
    rotation on the Light.


    ![9781430248750_Fig05-18.jpg](images/9781430248750_Fig05-18.jpg)


    [Figure 5-18](#9781430248750_Ch05.xhtml#_Fig18). Rotating a Directional Light
    in the Scene View


    There’s no reason to use the `Move` tool (second button from the left on the button
    bar), since the position of a Directional Light doesn’t matter, but it can help
    visualize what the Light is illuminating if you move it up and away so that it’s
    obviously pointing at the skeleton.


    **Tip** You can aim a Directional or Spot Light (or anything that can be aimed)
    in the same way you aimed the Main Camera at the Cube in [Chapter 3](#9781430248750_Ch03.xhtml).
    In this case, you would select the skeleton, press the `F` key to `Frame Selected`,
    click the leftmost button on the top left toolbar to enter the `Hand` tool mode
    in the Scene View, and then in the Scene View `alt+click+drag` until the Scene
    View camera is pointing the way you want the Light to point. Then select the Point
    Light and invoke `Align to View` from the GameObject menu.


    If you click `Play` at this point, you should see a shadow, but one with room
    for improvement, even with the `Strength` set to `1`. Unity uses a technique called
    *shadow maps* for generating shadows, where the shadow quality is dependent on
    the resolution of the shadow maps. The default setting for the shadow map resolution
    in the Light Component is `Use Quality Settings`, which you can override in the
    Inspector View. But let’s go to the Quality Settings, instead, by selecting `Project
    Settings > Quality` from the Edit menu ([Figure 5-19](#9781430248750_Ch05.xhtml#Fig19)).


    ![9781430248750_Fig05-19.jpg](images/9781430248750_Fig05-19.jpg)


    [Figure 5-19](#9781430248750_Ch05.xhtml#_Fig19). Selecting Quality Settings from
    the Edit menu


    The Quality Settings manager appears in the Inspector View ([Figure 5-20](#9781430248750_Ch05.xhtml#Fig20)),
    displaying a list of Quality Settings and the selected Quality Setting for each
    build platform. The default Quality Setting for desktop platforms is `Good`. Select
    that line in the platform-settings table so the individual settings for `Good`
    is displayed. The `Shadow` settings, in particular, control the shadow quality.
    So change the `Shadow Resolution` to `Very High Resolution` and also lower the
    `Shadow Distance` to `10`, since shorter shadow distances lead to better shadow
    resolution (but too short, and the shadow won’t render).


    ![9781430248750_Fig05-20.jpg](images/9781430248750_Fig05-20.jpg)


    [Figure 5-20](#9781430248750_Ch05.xhtml#_Fig20). The adjusted Quality Settings
    for Shadows


    Now when you click `Play`, you have a dancing shadow that should look pretty good!
    ([Figure 5-21](#9781430248750_Ch05.xhtml#Fig21)).


    ![9781430248750_Fig05-21.jpg](images/9781430248750_Fig05-21.jpg)


    [Figure 5-21](#9781430248750_Ch05.xhtml#_Fig21). The Game View of the skeleton
    with a shadow


    ## Add Music


    No dance demo would be complete without music. Fortunately, there’s plenty of
    free music available in the Asset Store. One music package I’ve used frequently
    is Gianmarco Leone’s General Music Set. If you enter `"general music"` in the
    Project View search field, all of the `AudioClips` in that package show up in
    the results ([Figure 5-22](#9781430248750_Ch05.xhtml#Fig22)). Click any one of
    them, and then import the package from the Inspector View.


    ![9781430248750_Fig05-22.jpg](images/9781430248750_Fig05-22.jpg)


    [Figure 5-22](#9781430248750_Ch05.xhtml#_Fig22). Searching for the General Music
    Set in the Asset Store


    After the `AudioClips` install in the Project View ([Figure 5-23](#9781430248750_Ch05.xhtml#Fig23)),
    select the `AudioClip` named `Caribbean Isle`. I think it’s got a nice beat, and
    you can dance to it. But you can decide for yourself by previewing the audio.
    In the Inspector View ([Figure 5-24](#9781430248750_Ch05.xhtml#Fig24)), click
    the `Play` button at the bottom, above the stereo waveform display, to listen
    to the `AudioClip`. While you’re there, since this `AudioClip` will be used essentially
    as background music, not a sound effect with a position, uncheck the `3D Sound`
    checkbox and click the `Apply` button to reimport the sound.


    ![9781430248750_Fig05-23.jpg](images/9781430248750_Fig05-23.jpg)


    [Figure 5-23](#9781430248750_Ch05.xhtml#_Fig23). The Project View of the General
    Music Set


    ![9781430248750_Fig05-24.jpg](images/9781430248750_Fig05-24.jpg)


    [Figure 5-24](#9781430248750_Ch05.xhtml#_Fig24). The Inspector View of an AudioClip


    Now you’re ready to add the `AudioClip` to the scene. Simply drag the `AudioClip`
    from the Project View into the Hierarchy View, and a same-named `GameObject` will
    automatically be created ([Figure 5-25](#9781430248750_Ch05.xhtml#Fig25)).


    ![9781430248750_Fig05-25.jpg](images/9781430248750_Fig05-25.jpg)


    [Figure 5-25](#9781430248750_Ch05.xhtml#_Fig25). Audio in the scene'
