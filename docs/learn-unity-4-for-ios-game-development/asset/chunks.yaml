- fmt: '# The codes no longer allow users to write reviews for the app on the App
    Store, but the codes are ideal for sending out to sites that host their own reviews.


    ## Explore Further


    Testing Unity iOS apps in the Unity Editor and in the iOS Simulator is convenient,
    but there’s no substitute for the real thing! The good news is that building for
    real hardware doesn''t change much on the Unity side (really, just setting the
    `SDK Version` to `Device SDK` in the `Player Settings`). The bad news is that
    you have to go through the entire Apple developer registration, Provisioning Portal
    setup for your test devices and provisioning profiles, and iTunes Connect setup
    for all your apps. In a sense, this is the chapter where you became an iOS developer!


    Now that we’ve got that out of the way, we can leave the Angry Bots project again
    and return to our bowling game and spend the remainder of this book adapting the
    game for iOS. However, we haven’t seen the last of iTunes Connect. We will use
    iTunes Connect later when we incorporate Game Center ([Chapter 14](#9781430248750_Ch14.xhtml))
    and iAd ([Chapter 15](#9781430248750_Ch15.xhtml)).


    ## Unity Manual


    Since the the simulator and device builds for Unity iOS involve nearly identical
    steps, the Unity Manual sections mentioned in the previous chapter also apply
    to this chapter. In addition, the “Getting Started in iOS Development” section
    of the Unity Manual has a page that briefly lists the steps required by Apple
    for submitting an app to the App Store, and the “Debugging” page in the “Advanced”
    section explains how to attach a MonoDevelop debugging session to a Unity iOS
    app running on a device.


    ## Apple Developer Site


    The road to all Apple developer information begins at the Apple Developer site
    (`http://developer.apple.com/`), so that should be your first stop. From there,
    you can find descriptions of the iOS Developer Program (and other Apple developer
    programs) and commence the registration process. Even before the registration
    is complete, you can explore the iOS Dev Center, which includes the iOS Developer
    Library, which in turn contains the iTunes Connect Developer Guide (listed under
    Languages and Utilities).


    **Tip** The documentation in the iOS Developer Library is also available in the
    Xcode Organizer. As you might gather from all the work that takes place in the
    Organizer (provisioning profiles, screenshots, app submissions), you''ll be spending
    a lot of your Xcode time there!


    Once your registration is approved, you can access the iTunes Connect site and
    the Provisioning Portal on the Apple Developer Site to complete the mobile provisioning
    and app submission steps covered in this chapter.


    Chapter 12


    ## Presentation: Screens and Icons


    Now that our Angry Bots break is over, and the basics of building and running
    a Unity iOS project have been covered, it’s time to resume our work on the bowling
    game and get it working on iOS!


    From this point on, I will generally assume you’re testing by building and running
    on a device, but in many cases you can test in the Editor with the Unity Remote
    or test in the iOS Simulator.


    **Tip** It’s a good idea to always do some testing in the Unity Editor to catch
    errors that might not show up when testing on a device. And if you run into a
    weird problem on a device, go back to the Editor and see if you can debug it there.


    This chapter focuses on making the game look right on an iOS device. This includes
    making sure the game shows up in the correct orientation and all the game elements
    show up at an appropriate resolution on the screen, which is a precursor to making
    the game playable (it’s hard to start playing when you can’t read or tap the Play
    button).


    Furthermore, besides providing required attributes such as the app name and icon,
    we’ll add some polish by including a splash screen and the familiar iOS activity
    indicator to indicate the game is loading.


    Some of these presentation details might seem to be cosmetic and easy enough to
    implement that they could be deferred until the end of a project (and typically
    they are), but easy work could and should be done early. Tasks that can be accomplished
    quickly help you get into a development groove. And when you’re working crunch-time
    hours trying to finish your game, the last thing you want to see is unfinished
    work you could have gotten out of the way early.


    Besides, packaging is important. In fact, when I’m creating desktop software,
    I like to start with the installer, because that is the first customer experience.
    For iOS apps, the customer first sees the app icon and name and then the splash
    screen while launching the app. This will form the customer’s first impression
    of whether the app is polished or amateurish. And you’re the first customer of
    your app. You’ll feel better about your project and have a clearer idea of what
    you want your app to be if it’s packaged like a finished product from the very
    beginning. And you never know when you’ll need to demo it!


    The corresponding Unity project is available online at `http://learnunity4.com/`,
    and, as usual, I recommend typing in the scripts rather than copying them from
    the online project. But there are some textures in the project files that will
    be used for the icon and splash screen, so, from the online project for [Chapter
    12](#9781430248750_Ch12.xhtml), copy the additional files in the `Textures` folder
    to the `Textures` folder into the `Textures` folder of your bowling project (remember,
    you can drag the files into the Project View). You should have three Fugu Games
    splash textures of different resolutions, one splash screen displaying a book
    cover (of this book), and an icon texture ([Figure 12-1](#9781430248750_Ch12.xhtml#Fig1)).


    ![9781430248750_Fig12-01.jpg](images/9781430248750_Fig12-01.jpg)


    [Figure 12-1](#9781430248750_Ch12.xhtml#_Fig1). The Textures for this chapter
    copied from `http://learnunity4.com/`


    ### Bowling for iOS


    In the Unity Editor, bring up the Project Wizard (`Open Project` in the `File`
    menu), and select the bowling project as you last left it in [Chapter 9](#9781430248750_Ch09.xhtml),
    before we switched to Angry Bots. You should now be familiar with the process
    of switching build targets.


    Bring up the Build Settings window (select `Build Settings` in the `File` menu),
    select iOS as the build target, and click the `Switch Platform` button.


    If you have the Necromancer GUI installed from [Chapter 9](#9781430248750_Ch09.xhtml),
    some script errors will appear in the Console View after switching the build target
    to iOS, because a test script in that package wasn’t written with `#pragma strict`
    and is missing some type declarations. This can be resolved quickly by just removing
    `GUITestScript.js` from the Project View or wrapping `#if !UNITY_IPHONE` around
    all its contents (bonus points for going in and fixing the code by appending `:int`
    to the function parameters). Removing the script will disable the Necromancer
    GUI test scene but otherwise the `GUISkin` is still usable in your pause menu.
    All of the changes introduced by this chapter will work with or without the Necromancer
    GUI (but the screenshots show the Necromancer GUI because it’s prettier).


    Once the asset reimport is complete, go to the `Edit` menu, and under `Settings`,
    select `Player` to bring up the Player Settings in the Inspector View. In the
    Cross-Platform Settings, fill in your Company Name and Product Name (the app name).
    Select the iOS tab to display the iOS Player Settings and fill in the bundle ID
    of the app ([Figure 12-2](#9781430248750_Ch12.xhtml#Fig2)).


    ![9781430248750_Fig12-02.jpg](images/9781430248750_Fig12-02.jpg)


    [Figure 12-2](#9781430248750_Ch12.xhtml#_Fig2). The Player Settings for Fugu Bowl'
