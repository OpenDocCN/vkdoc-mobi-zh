- fmt: "![9781430248750_Fig07-30.jpg](images/9781430248750_Fig07-30.jpg)\n\n[Figure\
    \ 7-30](#9781430248750_Ch07.xhtml#_Fig30). The `AudioClip` used for the Ball rolling\
    \ sound\n\nDrag the `AudioClip` to the Ball `GameObject` in the Hierarchy View\
    \ and select the Ball. The Inspector View should display a new `AudioSource` Component\
    \ that was automatically created to reference the `AudioClip` ([Figure 7-31](#9781430248750_Ch07.xhtml#Fig31)).\n\
    \n![9781430248750_Fig07-31.jpg](images/9781430248750_Fig07-31.jpg)\n\n[Figure\
    \ 7-31](#9781430248750_Ch07.xhtml#_Fig31). The Inspector View of the Ball with\
    \ an `AudioSource`\n\nThe rolling sound will be controlled by a script and not\
    \ played automatically, so make sure the **Play on Awake** checkbox is unchecked.\
    \ But when the rolling sound is played, it should continue playing until told\
    \ to stop, so the **Loop** checkbox should be checked.\n\nThe `AudioClip` is a\
    \ 3D sound, as indicated in the `AudioSource` Component below the `AudioClip`\
    \ name. That means the sound will attenuate with the distance between the `AudioSource`\
    \ Component and `AudioListener` Component (which is attached to the Main Camera).\
    \ The attenuation is specified by the graph shown at the bottom of the `AudioSource`\
    \ Component. You can adjust the attenuation by selecting among the **Volume Rolloff**\
    \ options and also specifying the **Min Distance**, which specifies at what distance\
    \ the attenuation begins. If the `AudioListener` is less than the **Min Distance**\
    \ from the `AudioSource`, then the sound is not attenuated at all. Or you can\
    \ directly manipulate the attenuation curve by dragging the handle along the curve.\n\
    \n**Tip** If you’re having trouble hearing an `AudioSource`, try starting with\
    \ a high **Min Distance** to be certain you’re hearing it at full volume and then\
    \ adjust the **Min Distance** and attenuation curve to your liking.\n\nThe script\
    \ to play the rolling sound will be attached to the Ball. Create a new JavaScript,\
    \ place it in the Scripts folder, and name it `FuguBallSound`. Then add the contents\
    \ of [Listing 7-6](#9781430248750_Ch07.xhtml#list6) to the script.\n\n[Listing\
    \ 7-6.](#9781430248750_Ch07.xhtml#_list6)  `FuguBallSound.js` Script for Ball\
    \ Rolling Sound\n\n```\n#pragma strict\n\nvar minSpeed:float = 1.0;\nprivate var\
    \ sqrMinSpeed:float = 0;\n\nfunction Awake() {\n        sqrMinSpeed = minSpeed*minSpeed;\n\
    }\n\nfunction OnCollisionStay(collider:Collision) {\n        if (collider.gameObject.tag\
    \ == \"Floor\") {\n                if (rigidbody.velocity.sqrMagnitude>sqrMinSpeed)\
    \ {\n                         if (!audio.isPlaying) {\n                      \
    \           audio.Play();\n                         }\n                }  else\
    \ {\n                         if (audio.isPlaying) {\n                       \
    \          audio.Stop();\n                         }\n                }\n    \
    \    }\n}\n\nfunction OnCollisionExit(collider:Collision) {\n        if (collider.gameObject.tag\
    \ == \"Floor\") {\n                if (audio.isPlaying) {\n                  \
    \       audio.Stop();\n                }\n        }\n}\n```\n\nThere is some similarity\
    \ with the `FuguForce` script, since both scripts keep track of when the Ball\
    \ is rolling using collision callbacks and checking the tag of the colliding `GameObject`\
    \ to see if it’s the Floor. `FuguBallSound` uses just two of the `OnCollision`\
    \ callbacks: `OnCollisionStay` and `OnCollisionExit`. `OnCollisionEnter` isn’t\
    \ implemented, as it would be redundant with `OnCollisionStay` (the `FuguForce`\
    \ script didn’t really need `OnCollisionEnter`, either). Both of the script’s\
    \ collision callbacks reference the `audio` variable of this Component, which\
    \ is equivalent to the `audio` variable of this Component’s `GameObject` and references\
    \ the attached `AudioSource`.\n\nWhen the Ball is on the Floor, `OnCollisionStay`\
    \ checks if the Ball is moving faster than a minimum speed, which is specified\
    \ in a public variable `minSpeed` so that it can be adjusted in the Inspector\
    \ View. The script actually compares the square of the Ball speed against the\
    \ square of `minSpeed` to avoid the computational expense of square root calculations.\
    \ If the Ball is on the Floor and moving fast enough, and if the Ball’s `AudioSource`\
    \ is not already playing its `AudioClip`, then the script starts playing the `AudioClip`.\
    \ If the Ball’s speed drops far enough, the rolling sound will stop.\n\nThe job\
    \ of `OnCollisionExit` is easier, as it just needs to check if audio is playing,\
    \ and if it is, then stop playing the audio. In other words, if the Ball loses\
    \ contact with the Floor because it bounced or rolled off, then the rolling sound\
    \ stops.\n\nDrag the script onto the Ball in the Hierarchy View ([Figure 7-32](#9781430248750_Ch07.xhtml#Fig32)),\
    \ and click Play to try it out. As the Ball rolls around, the rolling sound should\
    \ become audible, and the sound should cease when the Ball comes to rest.\n\n\
    ![9781430248750_Fig07-32.jpg](images/9781430248750_Fig07-32.jpg)\n\n[Figure 7-32](#9781430248750_Ch07.xhtml#_Fig32).\
    \ The `FuguBallSound` script attached to the Ball `GameObject`\n\n## Add a Pin\
    \ Collision Sound\n\nNow you’re ready for the pin sound. In place of a real bowling\
    \ pin sound, we’ll make do with the Coin_Pick_Up_03 sound from the Free SFX Pack\
    \ ([Figure 7-33](#9781430248750_Ch07.xhtml#Fig33)).\n\n![9781430248750_Fig07-33.jpg](images/9781430248750_Fig07-33.jpg)\n\
    \n[Figure 7-33](#9781430248750_Ch07.xhtml#_Fig33). The `AudioClip` used for Pin\
    \ collision sounds\n\nSelect the Pin prefab in the Project View and add an `AudioSource`\
    \ Component using the **Add Component** button at the bottom of the Inspector\
    \ view. Then click to the right of the `AudioClip` field of the `AudioSource`\
    \ Component to select the Coin_Pick_Up_03 `AudioClip`. And once again, uncheck\
    \ the **Play on Awake** checkbox or you’ll hear that sound play whenever the game\
    \ starts.\n\nSimilar to how the Ball rolling sound is played by a script attached\
    \ to the Ball, the Pin collision sounds will be played by a script attached to\
    \ each Pin. Create a new JavaScript, place it in the Scripts folder, and name\
    \ it `FuguPinSound`. Add the code in [Listing 7-7](#9781430248750_Ch07.xhtml#list7)\
    \ to the script.\n\n[Listing 7-7.](#9781430248750_Ch07.xhtml#_list7)  Generating\
    \ Pin Collision Sounds in `FuguPinSound.js`\n\n```\n#pragma strict\n\nvar minSpeed\
    \ = 0.01; // actually the square of the minSpeed\n\nfunction OnCollisionEnter(collider:Collision)\
    \ {\n        if (collider.relativeVelocity.sqrMagnitude > minSpeed) {\n      \
    \          if (collider.gameObject.tag != \"Pin\") {\n                       \
    \  audio.Play(); // hit anything besides another pin, play the sound\n       \
    \         }  else {\n                         // otherwise pin with lower ID gets\
    \ to play\n                         if (gameObject.GetInstanceID() < collider.gameObject.GetInstanceID())\
    \ {\n                                 audio.Play();\n                        \
    \ }\n                }\n        }\n}\n```\n\nThis script is different from `FuguBallSound`\
    \ in that it uses the `OnCollisionEnter` callback and not the `OnCollisionStay`\
    \ or `OnCollisionExit` callbacks. Again, there is a `minSpeed` variable that is\
    \ compared with the squared magnitude of a velocity. But this time the velocity\
    \ is the `relativeVelocity` variable of the Collision, since both the Pin and\
    \ whatever it’s colliding with (the Ball or another Pin) may both be moving."
  raw: '![9781430248750_Fig07-30.jpg](images/9781430248750_Fig07-30.jpg)


    [Figure 7-30](#9781430248750_Ch07.xhtml#_Fig30). The AudioClip used for the Ball
    rolling sound


    Drag the AudioClip to the Ball GameObject in the Hierarchy View and select the
    Ball. The Inspector View should display a new AudioSource Component that was automatically
    created to reference the AudioClip ([Figure 7-31](#9781430248750_Ch07.xhtml#Fig31)).


    ![9781430248750_Fig07-31.jpg](images/9781430248750_Fig07-31.jpg)


    [Figure 7-31](#9781430248750_Ch07.xhtml#_Fig31). The Inspector View of the Ball
    with an AudioSource


    The rolling sound will be controlled by a script and not played automatically,
    so make sure the Play on Awake checkbox is unchecked. But when the rolling sound
    is played, it should continue playing until told to stop, so the Loop checkbox
    should be checked.


    The AudioClip is a 3D sound, as indicated in the AudioSource Component below the
    AudioClip name. That means the sound will attenuate with the distance between
    the AudioSource Component and AudioListener Component (which is attached to the
    Main Camera). The attenuation is specified by the graph shown at the bottom of
    the AudioSource Component. You can adjust the attenuation by selecting among the
    Volume Rolloff options and also specifying the Min Distance, which specifies at
    what distance the attenuation begins. If the AudioListener is less than the Min
    Distance from the AudioSource, then the sound is not attenuated at all. Or you
    can directly manipulate the attenuation curve by dragging the handle along the
    curve.


    **Tip**   If you’re having trouble hearing an AudioSource, try starting with a
    high Min Distance to be certain you’re hearing it at full volume and then adjust
    the Min Distance and attenuation curve to your liking.The script to play the rolling
    sound will be attached to the Ball. Create a new JavaScript, place it in the Scripts
    folder, and name it `FuguBallSound`. Then add the contents of [Listing 7-6](#9781430248750_Ch07.xhtml#list6)
    to the script.


    [Listing 7-6.](#9781430248750_Ch07.xhtml#_list6)  FuguBallSound.js Script for
    Ball Rolling Sound


    ```

    #pragma strict


    var minSpeed:float = 1.0;

    private var sqrMinSpeed:float = 0;


    function Awake() {

            sqrMinSpeed = minSpeed*minSpeed;

    }


    function OnCollisionStay(collider:Collision) {

            if (collider.gameObject.tag == "Floor") {

                    if (rigidbody.velocity.sqrMagnitude>sqrMinSpeed) {

                             if (!audio.isPlaying) {

                                     audio.Play();

                             }

                    }  else {

                             if (audio.isPlaying) {

                                     audio.Stop();

                             }

                    }

            }

    }


    function OnCollisionExit(collider:Collision) {

            if (collider.gameObject.tag == "Floor") {

                    if (audio.isPlaying) {

                             audio.Stop();

                    }

            }

    }

    ```


    There is some similarity with the `FuguForce` script, since both scripts keep
    track of when the Ball is rolling using collision callbacks and checking the tag
    of the colliding GameObject to see if it’s the Floor. `FuguBallSound` uses just
    two of the `OnCollision` callbacks: `OnCollisionStay` and `OnCollisionExit`. `OnCollisionEnter`
    isn’t implemented, as it would be redundant with `OnCollisionStay` (the `FuguForce`
    script didn’t really need `OnCollisionEnter`, either). Both of the script’s collision
    callbacks reference the `audio` variable of this Component, which is equivalent
    to the `audio` variable of this Component’s GameObject and references the attached
    AudioSource.


    When the Ball is on the Floor, `OnCollisionStay` checks if the Ball is moving
    faster than a minimum speed, which is specified in a public variable `minSpeed`
    so that it can be adjusted in the Inspector View. The script actually compares
    the square of the Ball speed against the square of `minSpeed` to avoid the computational
    expense of square root calculations. If the Ball is on the Floor and moving fast
    enough, and if the Ball’s AudioSource is not already playing its AudioClip, then
    the script starts playing the AudioClip. If the Ball’s speed drops far enough,
    the rolling sound will stop.


    The job of `OnCollisionExit` is easier, as it just needs to check if audio is
    playing, and if it is, then stop playing the audio. In other words, if the Ball
    loses contact with the Floor because it bounced or rolled off, then the rolling
    sound stops.


    Drag the script onto the Ball in the Hierarchy View ([Figure 7-32](#9781430248750_Ch07.xhtml#Fig32)),
    and click Play to try it out. As the Ball rolls around, the rolling sound should
    become audible, and the sound should cease when the Ball comes to rest.


    ![9781430248750_Fig07-32.jpg](images/9781430248750_Fig07-32.jpg)


    [Figure 7-32](#9781430248750_Ch07.xhtml#_Fig32). The FuguBallSound script attached
    to the Ball GameObject


    Add a Pin Collision Sound


    Now you’re ready for the pin sound. In place of a real bowling pin sound, we’ll
    make do with the Coin_Pick_Up_03 sound from the Free SFX Pack ([Figure 7-33](#9781430248750_Ch07.xhtml#Fig33)).


    ![9781430248750_Fig07-33.jpg](images/9781430248750_Fig07-33.jpg)


    [Figure 7-33](#9781430248750_Ch07.xhtml#_Fig33). The AudioClip used for Pin collision
    sounds


    Select the Pin prefab in the Project View and add an AudioSource Component using
    the Add Component button at the bottom of the Inspector view. Then click to the
    right of the AudioClip field of the AudioSource Component to select the Coin_Pick_Up_03
    AudioClip. And once again, uncheck the Play on Awake checkbox or you’ll hear that
    sound play whenever the game starts.


    Similar to how the Ball rolling sound is played by a script attached to the Ball,
    the Pin collision sounds will be played by a script attached to each Pin. Create
    a new JavaScript, place it in the Scripts folder, and name it `FuguPinSound`.
    Add the code in [Listing 7-7](#9781430248750_Ch07.xhtml#list7) to the script.


    [Listing 7-7.](#9781430248750_Ch07.xhtml#_list7)  Generating Pin Collision Sounds
    in FuguPinSound.js


    ```

    #pragma strict


    var minSpeed = 0.01; // actually the square of the minSpeed


    function OnCollisionEnter(collider:Collision) {

            if (collider.relativeVelocity.sqrMagnitude > minSpeed) {

                    if (collider.gameObject.tag != "Pin") {

                             audio.Play(); // hit anything besides another pin, play
    the sound

                    }  else {

                             // otherwise pin with lower ID gets to play

                             if (gameObject.GetInstanceID() < collider.gameObject.GetInstanceID())
    {

                                     audio.Play();

                             }

                    }

            }

    }

    ```


    This script is different from `FuguBallSound` in that it uses the `OnCollisionEnter`
    callback and not the `OnCollisionStay` or `OnCollisionExit` callbacks. Again,
    there is a `minSpeed` variable that is compared with the squared magnitude of
    a velocity. But this time the velocity is the `relativeVelocity` variable of the
    Collision, since both the Pin and whatever it’s colliding with (the Ball or another
    Pin) may both be moving.'
