    # 这些代码不再允许用户在 App Store 上为应用撰写评论，但非常适合发送给那些拥有自主评论系统的网站。


    ## 深入探索


    在 Unity 编辑器和 iOS 模拟器中测试 Unity iOS 应用虽然便捷，但终究无法替代真机测试！好消息是，为真机硬件构建应用在 Unity 端几乎无需改动（只需在`Player
    Settings`中将`SDK Version`设置为`Device SDK`即可）。坏消息则是，你必须完成一整套 Apple 开发者注册流程，为测试设备设置配置门户（Provisioning
    Portal）和配置文件（Provisioning Profiles），并为所有应用配置 iTunes Connect。从某种意义上说，这一章标志着你正式成为
    iOS 开发者！


    既然这些流程已告一段落，我们可以暂时搁置 Angry Bots 项目，回到保龄球游戏，并用本书剩余篇幅将其适配至 iOS 平台。不过，我们与 iTunes
    Connect 的缘分尚未终结——后续在集成 Game Center（第 14 章）和 iAd（第 15 章）时还会用到它。


    ## Unity 手册


    由于 iOS 的模拟器与真机构建步骤几乎一致，上一章提及的 Unity 手册内容同样适用于本章。此外，Unity 手册中“iOS 开发入门”章节简要列出了
    Apple 提交应用至 App Store 所需步骤；而“高级”章节的“调试”页面则说明了如何将 MonoDevelop 调试会话挂载至设备上运行的 Unity
    iOS 应用。


    ## Apple 开发者网站


    所有 Apple 开发者信息的获取路径都始于 Apple 开发者网站（`http://developer.apple.com/`），因此它应是你的第一站。在此你可以找到
    iOS 开发者计划（及其他 Apple 开发者计划）的说明并启动注册流程。即便注册尚未完成，你也可先探索 iOS 开发中心（iOS Dev Center），其中包含
    iOS 开发者库（iOS Developer Library），而该库内又收录了 iTunes Connect 开发者指南（位于“语言与工具”分类下）。


    **提示** iOS 开发者库中的文档同样可在 Xcode Organizer 中获取。考虑到 Organizer 中涉及证书配置、截图、应用提交等大量操作，你将在
    Xcode 中花费大量时间在此！


    注册获批后，你即可访问 iTunes Connect 网站及 Apple 开发者网站上的配置门户，完成本章所述的移动设备配置与应用提交流程。


    ## 第 12 章 呈现：屏幕与图标


    现在 Angry Bots 的插曲告一段落，且 Unity iOS 项目构建与运行的基础知识已讲解完毕，是时候回归保龄球游戏并在 iOS 上运行了！


    从现在起，我会默认你通过真机构建与运行进行测试，但在多数情况下，你也可以使用 Unity Remote 在编辑器中测试，或直接在 iOS 模拟器中测试。


    **提示** 始终在 Unity 编辑器中进行部分测试是个好习惯，这能捕捉到真机测试中可能不会暴露的错误。若在真机上遇到诡异问题，请返回编辑器尝试调试。


    本章重点在于让游戏在 iOS 设备上正确呈现，包括确保游戏以正确方向显示、所有游戏元素以合适分辨率出现在屏幕上——这是游戏可玩性的前提（连 Play 按钮都看不清或点不了，何谈开始游戏？）。


    此外，除了提供应用名称和图标等必要属性，我们还将通过添加启动画面和熟悉的 iOS 活动指示器来优化细节，向玩家显示游戏正在加载。


    这些呈现细节看似仅关乎外观且易于实现，因此常被推迟到项目末尾（通常也确实如此）。但简单工作完全可以且应该提前完成——快速完成的任务能帮你进入开发节奏。当你加班加点赶工完成游戏时，最不想看到的就是那些本可尽早解决的未完成工作。


    况且，打包体验至关重要。事实上，在制作桌面软件时，我习惯从安装程序开始设计，因为这是客户的第一触点。对于 iOS 应用，客户首先看到的是应用图标和名称，启动时则看到启动画面。这些将塑造客户对应用的初步印象——它究竟是精致之作还是业余出品。而你作为应用的第一位用户，若能像打包成品一样从一开始就包装好项目，不仅会对项目更有信心，也能更清晰地构想应用形态。更何况，你永远不知道何时需要演示它！


    对应的 Unity 项目可在`http://learnunity4.com/`在线获取。按惯例，我建议手动输入脚本而非直接复制在线项目中的代码。但项目文件中的某些纹理将用于图标和启动画面，因此请从第
    12 章的在线项目中，将`Textures`文件夹内的额外文件复制到保龄球项目的`Textures`文件夹中（记住，你可以将文件拖拽至 Project 视图中）。你将获得三个不同分辨率的
    Fugu Games 启动纹理、一个显示本书封面的启动画面，以及一个图标纹理（图 12-1）。


    ![9781430248750_Fig12-01.jpg](img/9781430248750_Fig12-01.jpg)


    图 12-1 从`http://learnunity4.com/`复制的本章纹理


    ### 保龄球 iOS 版


    在 Unity 编辑器中，打开项目向导（`File`菜单下的`Open Project`），选择我们在第 9 章中最后使用的保龄球项目（即在切换到 Angry
    Bots 之前的版本）。你现在应该已熟悉切换构建目标的操作流程。


    打开构建设置窗口（`File`菜单下的`Build Settings`），选择 iOS 作为构建目标，点击`Switch Platform`按钮。


    如果你已从第 9 章安装了 Necromancer GUI，切换构建目标至 iOS 后，控制台视图会出现一些脚本错误——因为该包中的测试脚本未使用`#pragma
    strict`且缺少某些类型声明。只需从 Project 视图中删除`GUITestScript.js`，或将所有内容包裹在`#if !UNITY_IPHONE`中即可快速解决（若进一步修复代码——为函数参数添加`:int`类型声明——则可获额外加分）。删除脚本会禁用
    Necromancer GUI 测试场景，但`GUISkin`仍可在暂停菜单中使用。本章的所有改动无论是否使用 Necromancer GUI 均可正常运行（但截图展示的是更美观的
    Necromancer GUI）。


    资源重新导入完成后，进入`Edit`菜单，在`Settings`下选择`Player`，在 Inspector 视图中打开 Player Settings。在跨平台设置（Cross-Platform
    Settings）中填写公司名称和产品名称（应用名称）。选择 iOS 选项卡显示 iOS Player Settings，并填写应用的 bundle ID（图
    12-2）。


    ![9781430248750_Fig12-02.jpg](img/9781430248750_Fig12-02.jpg)


    图 12-2 Fugu Bowl 的 Player Settings

