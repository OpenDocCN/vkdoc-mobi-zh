    ![9781430248750_Fig01-05.jpg](img/9781430248750_Fig01-05.jpg)


    图 1-5. 激活 Unity 免费试用版


    Unity 的免费版本，即不含 Pro 功能的 Unity，官方名称仅为 Unity（尽管有时会被称为 Unity Basic，而由于它原本仅限年收入低于
    10 万美元的实体使用，我仍习惯称之为 Unity Indie），该版本不包含 Unity iOS。您可以先使用免费的 Unity 阅读本书中 iOS 章节之前的内容，之后再花费
    400 美元添加 Unity iOS，但请注意，Unity Pro 和 Unity iOS Pro 的功能将无法使用。


    需要明确的是，您的许可证决定了启用哪个 Unity 核心版本以及启用了哪些附加组件（如有）。核心产品与附加组件均提供非 Pro 和 Pro 版本，且必须获得
    Unity Pro 许可证才能使用任何附加组件的 Pro 版本。因此，使用非 Pro 版的 Unity iOS 进行开发需要花费 400 美元的 Unity
    许可证费用；而使用 Unity iOS Pro 进行开发则需要支付 1500 美元的 Unity Pro 费用和另外 1500 美元的 Unity iOS
    Pro 费用，总计 3000 美元。Unity Technologies 有时会提供折扣，尤其是在推出 Unity 的重大新版本时，当然价格也可能变动（毕竟，Unity
    Indie 曾售价 400 美元，现在已免费）。无论如何，免费试用版 Pro 许可证的存在意味着您暂时无需为此担心。


    欢迎使用 Unity！


    处理完许可证事宜后，Unity Editor 窗口便会打开，同时会弹出友好的“Welcome To Unity”窗口（图 1-6）。欢迎窗口会推荐一些入门资料供您查阅。您可以点击每个项目来打开相应资源。


    ![9781430248750_Fig01-06.jpg](img/9781430248750_Fig01-06.jpg)


    图 1-6. Unity 欢迎屏幕


    每次启动 Unity 时都会显示“Welcome”窗口，直到您取消选中窗口右下角的“Show at Startup”复选框。在取消选中之前，最好先浏览一下推荐资源，不过您之后随时可以通过
    Unity 的“Help”菜单（图 1-7）再次调出 Welcome 窗口。


    ![9781430248750_Fig01-07.jpg](img/9781430248750_Fig01-07.jpg)


    图 1-7. 从 Unity 的“Help”菜单调出欢迎屏幕


    ## 管理 Unity


    在正式开始使用 Unity 进行游戏开发之前，现在是个好时机来了解一下 Unity Editor 中的一些管理功能。


    ### 更换外观主题 (Pro)


    Unity Editor 提供两种外观主题：深色或浅色。如果您使用的是 Unity Pro，初始时看到的将是深色主题（图 1-8）；如果您使用的是非 Pro
    版 Unity，则只能看到浅色主题（图 1-9）。


    ![9781430248750_Fig01-08.jpg](img/9781430248750_Fig01-08.jpg)


    图 1-8. 使用 Pro（深色）主题的 Unity Editor


    ![9781430248750_Fig01-09.jpg](img/9781430248750_Fig01-09.jpg)


    图 1-9. 使用 Indie（浅色）主题的 Unity Editor


    在本书的其余部分，我将使用深色主题进行截图，但除了色调之外，用户界面并无差异。如果您使用的是 Unity Pro 并更喜欢浅色主题，可以在 Unity “Preferences”窗口中进行更换。首先，在
    Unity 菜单中选择“Preferences”（图 1-10）。


    ![9781430248750_Fig01-10.jpg](img/9781430248750_Fig01-10.jpg)


    图 1-10. Unity Editor 中的“Preferences”菜单项


    打开“Preferences”窗口后，您可以将主题从深色切换为浅色，或从浅色切换为深色（图 1-11）。这是 Unity Pro 独有的功能。如果您使用的是
    Unity Indie，则只能使用浅色主题。


    ![9781430248750_Fig01-11.jpg](img/9781430248750_Fig01-11.jpg)


    图 1-11. Unity Editor 中的“General Preferences”


    在“Preferences”窗口中，我建议您确保“Always Show Project Wizard”处于勾选状态。这样可以确保 Unity 在启动时弹出项目选择对话框，而不是自动打开最近打开的项目，后者可能很耗时，而且并不总是您想要的结果。尤其要避免在您尚未准备好时将项目意外升级到新版本的
    Unity。


    ### 更新许可证


    最终，您可能需要更新许可证，原因可能是您正在使用的免费试用版已过期，需要将许可证升级到 Pro 版本，需要添加其他构建平台，或者因为需要将许可证转移到另一台机器。此时，您可以在菜单栏上打开
    Unity 菜单并选择“Manage License”（图 1-12）。


    ![9781430248750_Fig01-12.jpg](img/9781430248750_Fig01-12.jpg)


    图 1-12. 从 Unity 菜单调出“License Management”窗口


    随后出现的“License Management”窗口为您提供了输入新序列号或归还当前机器许可证以便在其他机器上使用的选项（图 1-13）。


    ![9781430248750_Fig01-13.jpg](img/9781430248750_Fig01-13.jpg)


    图 1-13. “License Management”窗口


    单个 Unity 许可证可在两台机器上使用。在早期，Unity Editor 仅在 OS X 上运行时，一个 Unity 许可证仅适用于一台机器，但在 Unity
    Editor 添加 Windows 支持后，数量增加到了两台。


    ### 报告问题


    如果您长时间使用 Unity，肯定会遇到各种问题，无论是真实的还是想象中的错误。这并非对 Unity 的批评。3D 游戏引擎非常复杂，至少在内部是如此，而且其开发速度非常惊人（我从
    Unity 1.6 开始使用，当时它只能在 OS X 上运行，并且只能为 Windows 和 OS X 构建部署包）。错误不会自动修复，尤其当它们没有被报告时。这正是
    Unity Bug Reporter 的用武之地。正如我在介绍 Unity 安装文件时所提到的，Bug Reporter 位于 Unity 文件夹中，但通常是从
    Unity Editor 的“Help”菜单中启动的（图 1-14）。


    ![9781430248750_Fig01-14.jpg](img/9781430248750_Fig01-14.jpg)


    图 1-14. “Help”菜单中的“Report a Bug”选项


    **提示**   正如您在 Unity 安装文件列表中所见，`Bug Reporter` 是独立于 Unity Editor 的应用程序。因此，如果遇到阻止
    Unity Editor 正常启动的错误，您始终可以通过在 Finder 中双击该文件来直接启动 `Bug Reporter`。


    随后出现的 Bug Reporter 窗口（图 1-15）会提示您选择错误发生的位置（在 Unity Editor 中还是在 Unity Player 中，即已部署的构建版本）、错误发生的频率，以及一个电子邮件地址，Unity
    Technologies 将通过该地址回复有关此错误的处理情况。


    ![9781430248750_Fig01-15.jpg](img/9781430248750_Fig01-15.jpg)


    图 1-15. Unity Bug Reporter 窗口


    在此下方的窗口中央，是附件列表。Unity 会自动将当前项目添加到该列表中，您也可以包含补充文件，例如截图或日志文件。您可以从列表中移除当前项目，但通常应该包含该项目，以便
    Unity 支持团队能够重现问题。

