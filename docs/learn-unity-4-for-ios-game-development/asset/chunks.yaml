    \ // position to place rack of pins\nvar pinDistance = 1.5;                //\
    \ initial distance between pins\nvar pinRows = 4;                      // number\
    \ of pin rows\n\nvar ball:GameObject;                  // the bowling ball\nvar\
    \ sunkHeight:float = -10.0;\n\nprivate var pins:Array;\n\nfunction Awake () {\n\
    \        CreatePins();\n}\n```"
