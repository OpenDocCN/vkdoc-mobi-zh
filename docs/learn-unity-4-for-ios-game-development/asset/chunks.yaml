    # 同理，你应该在问题描述中提供足够详细的解释，以便 Unity 支持团队能够重现该不良行为，并理解为何它被视为不良行为。基本上，你要避免得到诸如“我们无法重现该问题”或“这不是错误，而是设计如此”之类的回复。


    提交错误报告后不久，你应该会收到 Unity Technologies 发送的电子邮件确认，其中包含一个案例编号以及 Unity 错误数据库中报告副本的链接，你可以通过该链接查看错误的处理状态。


    ## 检查更新


    如果运气好，你的错误报告会促成修复。如果运气更好，该修复将在下一次 Unity 更新中出现。你可以随时通过菜单栏的 `Window`（窗口）菜单中选择 `Check
    for Updates`（检查更新）命令来查看是否有新更新。打开的窗口会显示是否有可用更新（图 1-16）。


    ![9781430248750_Fig01-16.jpg](img/9781430248750_Fig01-16.jpg)


    图 1-16. Unity Editor 更新检查


    请注意 图 1-16 中显示的版本号是 Unity 4.1.2f1。后缀代表最细颗粒度的版本发布，包括紧急热修复。出于谨慎考虑，Unity Technologies
    通常不会将新发布的更新立即提供给 Editor Update Check（编辑器更新检查），因此如果你焦急地等待错误修复更新，也可以随时查看 Unity 官方网站。


    ## 深入探索


    我最喜欢的专业书籍，例如 Peter Van Der Linden 的 *Just Java*（一本面向非程序员、详细且通俗易懂的 Java 入门书），会在每章结尾通过讲述一则有趣的轶事、一点冷知识或相关历史来提供愉快的间歇。唉，我在本书中不会这样做。然而，我确实觉得简单的章节总结和回顾很乏味（作为读者，我总会跳过它们），而且我认为新
    Unity 开发者面临的主要挑战之一是，他们需要养成自行查找 Unity 信息的习惯，并且需要知道去哪里查找这些信息，而这并非总是易事！


    因此，在每一章（包括本章）的结尾，我会引导你查阅与你刚学到的主题相关的文档和其他资源，这样你就会知道在哪里找到权威且全面的信息来源，并在读完本书后能进行更深入的学习。我将重点介绍官方
    Unity 手册和 Unity 网站，但也会提及一些第三方资源。现在你已经安装了 Unity，在本书中使用它之前，不妨休息一下，浏览那些你之后一定会频繁使用的网站和参考文档。在需要之前就弄清楚在哪里可以找到所需内容，总是一个好主意。


    ## iOS 开发需求


    在本章开头，我提到最好尽快开始下载 Xcode 并注册苹果的 iOS Developer Program（iOS 开发者计划）。


    iOS 开发的需求，包括所需的硬件和 iOS Developer Program 的详细信息，都列在苹果的开发者支持页面上（`http://developer.apple.com/support`）。


    关于 Xcode 需求和下载 Xcode 的信息，可以在 `http://developer.apple.com/xcode` 找到。


    ## Unity 网站


    随着 Unity 功能和平台的增长，Unity 网站（`http://unity3d.com/`）也在不断发展。整个网站都值得浏览，但特别是关于 Unity
    的常规信息，可以查看 Unity 网站的 FAQ 部分（`http://unity3d.com/unity/faq`）。


    许可证激活流程和 License Management（许可证管理）窗口在 `http://unity3d.com/unity/activation` 有文档说明。本章提到了
    Unity 和 Unity iOS 的不同 Pro 版和非 Pro 版，但 `http://unity3d.com/unity/licenses` 的许可证比较表提供了更全面的功能表格及其在各种许可证下的可用性。Unity
    视频存档（`http://video.unity3d.com/`）中有许多教学视频，而且 Unity 最近在其网站上新增了一个 Learn（学习）选项卡，便于访问文档和教程。


    ## Unity 手册与参考文档


    Unity Help（帮助）菜单的顶部区域（图 1-17）列出了官方 Unity 文档，包括三个文档：Unity Manual（Unity 手册）、Reference
    Manual（参考手册）和 Scripting Reference（脚本参考）。虽然 Unity Manual 关于本章讨论的安装和许可流程的信息不多，但该手册在其他方面提供了关于使用
    Unity 的良好通用指导和概念解释。随着你在本书中创建和编写场景脚本，Reference Manual 和 Scripting Reference 将变得越来越重要。


    ![9781430248750_Fig01-17.jpg](img/9781430248750_Fig01-17.jpg)


    图 1-17. Help（帮助）菜单


    Unity Help 菜单项会打开本地安装的这些手册副本，但它们也可以在 Unity 网站的 Learn（学习）选项卡下找到。


    ## Unity 社区


    Unity Help 菜单中部的三个项目是官方 Unity 社区网站的链接。论坛（`http://forum.unity3d.com`）是用户可以提出任何与
    Unity 相关问题的场所（不过论坛设有版主）。


    Unity Answers 网站（`http://answers.unity3d.com/`）遵循 Stack Exchange 的格式，并对问题和答案进行了一定程度的质量控制。Unity
    Feedback 网站（`http://feedback.unity3d.com`）允许用户提交功能请求并对功能请求进行投票，无论是他们自己提交的还是其他人提交的。


    **提示**   尽管错误类型选择器将 Feature Request（功能请求）列为一种错误类型，但 Unity 鼓励所有人将功能请求提交到他们的 Feedback（反馈）网站。


    欢迎来到 Unity 社区！


    ---


    # 第 2 章：Unity 漫游


    现在你已经安装了 Unity，是时候熟悉 Unity Editor（Unity 编辑器）了。Editor（只要意思明确，我会交替使用 Unity、Unity
    Editor 和 Editor 这些术语）是你为一个或多个目标平台创建、测试和构建游戏的地方。Editor 对包含游戏中资源的单个 Unity 项目进行操作。


    本章将使用 Unity 自带安装的 Angry Bots 演示项目来介绍 Unity Editor。我不会在此深入探讨 Angry Bots 的内部工作原理，但它是一个方便的现成项目，你可以用它来熟悉
    Unity，甚至可以将 Angry Bots 构建为 OS X 应用以感受构建过程。希望这能让你在下一章学习如何从头创建新项目之前，先熟悉 Unity 的工作流程、用户界面以及各种文件类型。


    **提示**   在 OS X 中，文件扩展名默认是隐藏的，但任何从事开发工作的人都应该查看完整的文件名。为确保显示扩展名，请前往 Finder 偏好设置窗口的
    Advanced（高级）选项卡，勾选“显示所有文件扩展名”。


    ## 启动 Angry Bots

    '
- fmt: 'During the installation process of the previous chapter, an example Unity
    project called Angry Bots was installed in the `Users > Shared > Unity` folder.
    If you’re a longtime Unity user, you probably have some other projects left there
    from older versions of Unity. For example, [Figure 2-1](#9781430248750_Ch02.xhtml#Fig1)
    shows my Unity shared example folder. Besides the latest version of Angry Bots
    (the more recent ones have the corresponding Unity version in their file names),
    I still have the Star Trooper example project that came with Unity 2.


    ![9781430248750_Fig02-01.jpg](images/9781430248750_Fig02-01.jpg)


    [Figure 2-1](#9781430248750_Ch02.xhtml#_Fig1). The Unity shared folder of example
    projects


    ## Open the Angry Bots Project


    Unity will automatically open the Angry Bots demo project when you bring up the
    Unity Editor for the first time. If for some reason Unity doesn’t immediately
    open Angry Bots, or if you want to return to it later (as we will in Chapters
    10 and 11 where we will use Angry Bots to get acquainted with Unity iOS), select
    the `Open Project` item in the `File` menu on the Unity menu bar ([Figure 2-2](#9781430248750_Ch02.xhtml#Fig2)).


    ![9781430248750_Fig02-02.jpg](images/9781430248750_Fig02-02.jpg)


    [Figure 2-2](#9781430248750_Ch02.xhtml#_Fig2). The `Open Project` menu item


    The Project Wizard will appear (the same Project Wizard referred to by the `Always
    Show Project Wizard` item in the Preferences window). Select the AngryBots project
    from the list of recent projects in the Project Wizard (the same one that will
    show up every time you start Unity if you left the box checked) or click the `Open
    Other` button ([Figure 2-3](#9781430248750_Ch02.xhtml#Fig3)).


    ![9781430248750_Fig02-03.jpg](images/9781430248750_Fig02-03.jpg)


    [Figure 2-3](#9781430248750_Ch02.xhtml#_Fig3). Selecting Angry Bots from the `Open
    Project` wizard


    ## Open the Angry Bots Scene


    With the Angry Bots project open, the Unity Editor should now display the main
    scene of the project, named AngryBots. The title bar of the window should list
    the scene file, `AngryBots.unity`, followed by the project name and the target
    platform ([Figure 2-4](#9781430248750_Ch02.xhtml#Fig4)).


    ![9781430248750_Fig02-04.jpg](images/9781430248750_Fig02-04.jpg)


    [Figure 2-4](#9781430248750_Ch02.xhtml#_Fig4). The Angry Bots project opened with
    a new scene


    The scene name is displayed along the upper border of the Editor window, and the
    scene contents are reflected in the Hierarchy View, Scene View, and Game View.
    I’ll explain views in a bit and spend a good portion of this chapter going over
    each view in detail.


    A scene is the same as a level in a game (in fact, the Unity script function that
    loads a scene is called `Application.LoadLevel`). The purpose of the Unity Editor
    is to construct scenes, and thus it always has one scene open at a time.


    If the Editor doesn’t open an existing scene at startup, it will open a newly
    created scene, the same as if you had selected `New Scene` from the `File` menu
    on the Unity menu bar.


    If you’re not looking at the AngryBots scene right now, then select the `Open
    Scene` command in the `File` menu ([Figure 2-5](#9781430248750_Ch02.xhtml#Fig5)).


    ![9781430248750_Fig02-05.jpg](images/9781430248750_Fig02-05.jpg)


    [Figure 2-5](#9781430248750_Ch02.xhtml#_Fig5). The `Open Scene` menu item


    The resulting file chooser will start off in the top level of the project’s `Assets`
    folder, where you can select the AngryBots scene file ([Figure 2-6](#9781430248750_Ch02.xhtml#Fig6)).
    All scene files are displayed with a Unity icon and have the `.unity` filename
    extension.


    ![9781430248750_Fig02-06.jpg](images/9781430248750_Fig02-06.jpg)


    [Figure 2-6](#9781430248750_Ch02.xhtml#_Fig6). Selecting the AngryBots scene in
    the Load Scene chooser


    ## Play Angry Bots


    With the desired scene open, click the `Play` button at the center top of the
    Editor to start the game. The Game View will appear and display the running game,
    which can be played with standard keyboard and mouse controls ([Figure 2-7](#9781430248750_Ch02.xhtml#Fig7)).


    ![9781430248750_Fig02-07.jpg](images/9781430248750_Fig02-07.jpg)


    [Figure 2-7](#9781430248750_Ch02.xhtml#_Fig7). The Play mode in the Editor


    Use the `AWSD` keys to move forward, back, left, and right, respectively, move
    the mouse to look around, and press the `Esc` key to pause. Clicking the `Play`
    button again will stop the game and exit Play mode. The two buttons next to the
    `Play` button are used to pause and step through the game.


    ## Build Angry Bots


    During normal development, you would alternate between editing a scene and playing
    it.


    When you’re satisfied how the game plays in the Editor, then you’re ready to build
    the app for the target platform. You won’t start building for iOS until [Chapter
    10](#9781430248750_Ch10.xhtml), but to get a feel for the build process, go ahead
    and build an OS X app version of Angry Bots right now. Select the `Build Settings`
    item from the Unity `File` menu to bring up the `Build Settings` window ([Figure
    2-8](#9781430248750_Ch02.xhtml#Fig8)).


    ![9781430248750_Fig02-08.jpg](images/9781430248750_Fig02-08.jpg)


    [Figure 2-8](#9781430248750_Ch02.xhtml#_Fig8). Bringing up the `Build Settings`
    window


    The upper portion of the window lists the scenes to include in the build. Just
    the scene you have open should be checked. Any unchecked or unlisted scenes won’t
    be included in the build ([Figure 2-9](#9781430248750_Ch02.xhtml#Fig9)).


    ![9781430248750_Fig02-09.jpg](images/9781430248750_Fig02-09.jpg)


    [Figure 2-9](#9781430248750_Ch02.xhtml#_Fig9). The `Build Settings` for the Mac
    platform


    The default platform selected in the `Platform` list on the left is `PC, Mac &
    Linux Standalone`, matching the platform listed on the Editor title bar. The default
    specific `Target Platform` on the right is set as a Windows executable, but since
    you’re operating on a Mac, let’s set the `Target Platform` in the menu on the
    right to `Mac OS X`. Then click the `Switch Platform` button on the lower left.
    This will initiate a conversion of the project assets to formats suitable for
    use on a Mac. After the conversion is complete, the title bar of the Editor will
    update to reflect the new platform.


    Now you can click either the `Build` or `Build and Play` button in the `Build
    Settings` window. Clicking `Build` will generate an OS X app version of our game.
    Clicking `Build and Play` will do the same but also run the game, which just saves
    the effort of bringing up a Finder window and double-clicking the new app. Unity
    will prompt you for a file name and location for the app, defaulting to the top
    level of the project directory, which is fine ([Figure 2-10](#9781430248750_Ch02.xhtml#Fig10)).


    ![9781430248750_Fig02-10.jpg](images/9781430248750_Fig02-10.jpg)


    [Figure 2-10](#9781430248750_Ch02.xhtml#_Fig10). Saving an OS X app build


    When the build is complete, double-click the generated app to run the game. Or
    if you selected `Build and Run`, the game should start automatically. Unity-generated
    OS X apps start with a resolution-chooser window ([Figure 2-11](#9781430248750_Ch02.xhtml#Fig11)).


    ![9781430248750_Fig02-11.jpg](images/9781430248750_Fig02-11.jpg)


    [Figure 2-11](#9781430248750_Ch02.xhtml#_Fig11). Startup dialog for a Unity OS
    X app


    After selecting the desired resolution and clicking `Play!`, you’ll see a game
    window with the size you just specified. Now you have Angry Bots running in its
    own Mac window ([Figure 2-12](#9781430248750_Ch02.xhtml#Fig12)).


    ![9781430248750_Fig02-12.jpg](images/9781430248750_Fig02-12.jpg)


    [Figure 2-12](#9781430248750_Ch02.xhtml#_Fig12). Angry Bots as an OS X app Mac
    app


    ## The Editor Layout'
  raw: 'During the installation process of the previous chapter, an example Unity
    project called Angry Bots was installed in the Users ![image](images/arrow.jpg)
    Shared ![image](images/arrow.jpg) Unity folder. If you’re a longtime Unity user,
    you probably have some other projects left there from older versions of Unity.
    For example, [Figure 2-1](#9781430248750_Ch02.xhtml#Fig1) shows my Unity shared
    example folder. Besides the latest version of Angry Bots (the more recent ones
    have the corresponding Unity version in their file names), I still have the Star
    Trooper example project that came with Unity 2.


    ![9781430248750_Fig02-01.jpg](images/9781430248750_Fig02-01.jpg)


    [Figure 2-1](#9781430248750_Ch02.xhtml#_Fig1). The Unity shared folder of example
    projects


    Open the Angry Bots Project


    Unity will automatically open the Angry Bots demo project when you bring up the
    Unity Editor for the first time. If for some reason Unity doesn’t immediately
    open Angry Bots, or if you want to return to it later (as we will in Chapters
    10 and 11 where we will use Angry Bots to get acquainted with Unity iOS), select
    the Open Project item in the File menu on the Unity menu bar ([Figure 2-2](#9781430248750_Ch02.xhtml#Fig2)).


    ![9781430248750_Fig02-02.jpg](images/9781430248750_Fig02-02.jpg)


    [Figure 2-2](#9781430248750_Ch02.xhtml#_Fig2). The Open Project menu item


    The Project Wizard will appear (the same Project Wizard referred to by the Always
    Show Project Wizard item in the Preferences window). Select the AngryBots project
    from the list of recent projects in the Project Wizard (the same one that will
    show up every time you start Unity if you left the box checked) or click the Open
    Other button ([Figure 2-3](#9781430248750_Ch02.xhtml#Fig3)).


    ![9781430248750_Fig02-03.jpg](images/9781430248750_Fig02-03.jpg)


    [Figure 2-3](#9781430248750_Ch02.xhtml#_Fig3). Selecting Angry Bots from the Open
    Project wizard


    Open the Angry Bots Scene


    With the Angry Bots project open, the Unity Editor should now display the main
    scene of the project, named AngryBots. The title bar of the window should list
    the scene file, AngryBots.unity, followed by the project name and the target platform
    ([Figure 2-4](#9781430248750_Ch02.xhtml#Fig4)).


    ![9781430248750_Fig02-04.jpg](images/9781430248750_Fig02-04.jpg)


    [Figure 2-4](#9781430248750_Ch02.xhtml#_Fig4). The Angry Bots project opened with
    a new scene


    The scene name is displayed along the upper border of the Editor window, and the
    scene contents are reflected in the Hierarchy View, Scene View, and Game View.
    I’ll explain views in a bit and spend a good portion of this chapter going over
    each view in detail.


    A scene is the same as a level in a game (in fact, the Unity script function that
    loads a scene is called `Application.LoadLevel`). The purpose of the Unity Editor
    is to construct scenes, and thus it always has one scene open at a time.


    If the Editor doesn’t open an existing scene at startup, it will open a newly
    created scene, the same as if you had selected New Scene from the File menu on
    the Unity menu bar.


    If you’re not looking at the AngryBots scene right now, then select the Open Scene
    command in the File menu ([Figure 2-5](#9781430248750_Ch02.xhtml#Fig5)).


    ![9781430248750_Fig02-05.jpg](images/9781430248750_Fig02-05.jpg)


    [Figure 2-5](#9781430248750_Ch02.xhtml#_Fig5). The Open Scene menu item


    The resulting file chooser will start off in the top level of the project’s Assets
    folder, where you can select the AngryBots scene file ([Figure 2-6](#9781430248750_Ch02.xhtml#Fig6)).
    All scene files are displayed with a Unity icon and have the .unity filename extension.


    ![9781430248750_Fig02-06.jpg](images/9781430248750_Fig02-06.jpg)


    [Figure 2-6](#9781430248750_Ch02.xhtml#_Fig6). Selecting the AngryBots scene in
    the Load Scene chooser


    Play Angry Bots


    With the desired scene open, click the Play button at the center top of the Editor
    to start the game. The Game View will appear and display the running game, which
    can be played with standard keyboard and mouse controls ([Figure 2-7](#9781430248750_Ch02.xhtml#Fig7)).


    ![9781430248750_Fig02-07.jpg](images/9781430248750_Fig02-07.jpg)


    [Figure 2-7](#9781430248750_Ch02.xhtml#_Fig7). The Play mode in the Editor


    Use the AWSD keys to move forward, back, left, and right, respectively, move the
    mouse to look around, and press the Esc key to pause. Clicking the Play button
    again will stop the game and exit Play mode. The two buttons next to the Play
    button are used to pause and step through the game.


    Build Angry Bots


    During normal development, you would alternate between editing a scene and playing
    it.


    When you’re satisfied how the game plays in the Editor, then you’re ready to build
    the app for the target platform. You won’t start building for iOS until [Chapter
    10](#9781430248750_Ch10.xhtml), but to get a feel for the build process, go ahead
    andl build an OS X app version of Angry Bots right now. Select the Build Settings
    item from the Unity File menu to bring up the Build Settings window ([Figure 2-8](#9781430248750_Ch02.xhtml#Fig8)).


    ![9781430248750_Fig02-08.jpg](images/9781430248750_Fig02-08.jpg)


    [Figure 2-8](#9781430248750_Ch02.xhtml#_Fig8). Bringing up the Build Settings
    window


    The upper portion of the window lists the scenes to include in the build. Just
    the scene you have open should be checked. Any unchecked or unlisted scenes won’t
    be included in the build ([Figure 2-9](#9781430248750_Ch02.xhtml#Fig9)).


    ![9781430248750_Fig02-09.jpg](images/9781430248750_Fig02-09.jpg)


    [Figure 2-9](#9781430248750_Ch02.xhtml#_Fig9). The Build Settings for the Mac
    platform


    The default platform selected in the Platform list on the left is PC, Mac & Linux
    Standalone, matching the platform listed on the Editor title bar. The default
    specific Target Platform on the right is set as a Windows executable, but since
    you’re operating on a Mac, let’s set the Target Platform in the menu on the right
    to Mac OS X. Then click the Switch Platform button on the lower left. This will
    initiate a conversion of the project assets to formats suitable for use on a Mac.
    After the conversion is complete, the title bar of the Editor will update to reflect
    the new platform.


    Now you can click either the Build or Build and Play button in the Build Settings
    window. Clicking Build will generate an OS X app version of our game. Clicking
    Build and Play will do the same but also run the game, which just saves the effort
    of bringing up a Finder window and double-clicking the new app. Unity will prompt
    you for a file name and location for the app, defaulting to the top level of the
    project directory, which is fine ([Figure 2-10](#9781430248750_Ch02.xhtml#Fig10)).


    ![9781430248750_Fig02-10.jpg](images/9781430248750_Fig02-10.jpg)


    [Figure 2-10](#9781430248750_Ch02.xhtml#_Fig10). Saving an OS X app build


    When the build is complete, double-click the generated app to run the game. Or
    if you selected Build and Run, the game should start automatically. Unity-generated
    OS X apps start with a resolution-chooser window ([Figure 2-11](#9781430248750_Ch02.xhtml#Fig11)).


    ![9781430248750_Fig02-11.jpg](images/9781430248750_Fig02-11.jpg)


    [Figure 2-11](#9781430248750_Ch02.xhtml#_Fig11). Startup dialog for a Unity OS
    X app


    After selecting the desired resolution and clicking Play!, you’ll see a game window
    with the size you just specified. Now you have Angry Bots running in its own Mac
    window ([Figure 2-12](#9781430248750_Ch02.xhtml#Fig12)).


    ![9781430248750_Fig02-12.jpg](images/9781430248750_Fig02-12.jpg)


    [Figure 2-12](#9781430248750_Ch02.xhtml#_Fig12). Angry Bots as an OS X app Mac
    app


    The Editor Layout'
  trans: '

    在上一章的安装过程中，一个名为 Angry Bots 的示例 Unity 项目会被安装到 `Users > Shared > Unity` 文件夹中。如果你是一位长期使用
    Unity 的用户，那么你可能还有一些来自旧版本 Unity 的其他项目存放在那里。例如，图 2-1 展示了我本机的 Unity 共享示例文件夹。除了最新版本的
    Angry Bots（较新的版本会在文件名中包含对应的 Unity 版本号），我仍然保留了 Unity 2 自带的 Star Trooper 示例项目。


    ![9781430248750_Fig02-01.jpg](img/9781430248750_Fig02-01.jpg)


    图 2-1. Unity 示例项目共享文件夹


    ## 打开 Angry Bots 项目


    当你首次启动 Unity 编辑器时，Unity 会自动打开 Angry Bots 演示项目。如果由于某种原因 Unity 没有立即打开 Angry Bots，或者你想在之后重新打开它（正如我们将在第
    10 章和第 11 章中使用 Angry Bots 来熟悉 Unity iOS 那样），请在 Unity 菜单栏的 `File` 菜单中选择 `Open Project`
    项（图 2-2）。


    ![9781430248750_Fig02-02.jpg](img/9781430248750_Fig02-02.jpg)


    图 2-2. `Open Project` 菜单项


    此时将出现项目向导（与首选项窗口中的 `Always Show Project Wizard` 项所引用的项目向导相同）。从项目向导的最近项目列表中选择 AngryBots
    项目（如果你勾选了复选框，每次启动 Unity 时都会显示该列表），或者单击 `Open Other` 按钮（图 2-3）。


    ![9781430248750_Fig02-03.jpg](img/9781430248750_Fig02-03.jpg)


    图 2-3. 从 `Open Project` 向导中选择 Angry Bots


    ## 打开 Angry Bots 场景


    打开 Angry Bots 项目后，Unity 编辑器应显示项目的主场景，名为 AngryBots。窗口的标题栏应列出场景文件 `AngryBots.unity`，后跟项目名称和目标平台（图
    2-4）。


    ![9781430248750_Fig02-04.jpg](img/9781430248750_Fig02-04.jpg)


    图 2-4. 打开新场景后的 Angry Bots 项目


    场景名称显示在编辑器窗口的上边框处，场景内容则反映在层级视图、场景视图和游戏视图中。稍后我将解释这些视图，并在本章中用大量篇幅详细讲解每个视图。


    场景与游戏中的关卡是同一个概念（事实上，加载场景的 Unity 脚本函数名为 `Application.LoadLevel`）。Unity 编辑器的目的是构建场景，因此它一次总是只打开一个场景。


    如果编辑器在启动时没有打开现有场景，它将打开一个新建的场景，这与你在 Unity 菜单栏的 `File` 菜单中选择 `New Scene` 的效果相同。


    如果你当前没有看到 AngryBots 场景，请在 `File` 菜单中选择 `Open Scene` 命令（图 2-5）。


    ![9781430248750_Fig02-05.jpg](img/9781430248750_Fig02-05.jpg)


    图 2-5. `Open Scene` 菜单项


    弹出的文件选择器将从项目 `Assets` 文件夹的顶层开始，你可以在其中选择 AngryBots 场景文件（图 2-6）。所有场景文件都带有 Unity
    图标，并且具有 `.unity` 文件扩展名。


    ![9781430248750_Fig02-06.jpg](img/9781430248750_Fig02-06.jpg)


    图 2-6. 在加载场景选择器中选中 AngryBots 场景


    ## 运行 Angry Bots


    打开所需场景后，单击编辑器顶部中央的 `Play` 按钮即可开始游戏。游戏视图将出现并显示正在运行的游戏，可以使用标准键盘和鼠标控制进行游戏（图 2-7）。


    ![9781430248750_Fig02-07.jpg](img/9781430248750_Fig02-07.jpg)


    图 2-7. 编辑器中的播放模式


    分别使用 `AWSD` 键向前、向后、向左、向右移动，移动鼠标来环顾四周，按 `Esc` 键暂停。再次单击 `Play` 按钮将停止游戏并退出播放模式。`Play`
    按钮旁边的两个按钮用于暂停游戏和单步执行游戏。


    ## 构建 Angry Bots


    在正常的开发过程中，你会在编辑场景和播放场景之间交替进行。


    当你对游戏在编辑器中的运行效果感到满意时，就可以为目标平台构建应用程序了。我们直到第 10 章才开始构建 iOS 版本，但为了感受一下构建过程，现在就开始构建一个
    Angry Bots 的 OS X 应用程序版本。从 Unity 的 `File` 菜单中选择 `Build Settings` 项，调出 `Build Settings`
    窗口（图 2-8）。


    ![9781430248750_Fig02-08.jpg](img/9781430248750_Fig02-08.jpg)


    图 2-8. 调出 `Build Settings` 窗口


    窗口的上半部分列出了要包含在构建中的场景。你当前打开的那个场景应该被勾选。任何未勾选或未列出的场景都不会包含在构建中（图 2-9）。


    ![9781430248750_Fig02-09.jpg](img/9781430248750_Fig02-09.jpg)


    图 2-9. Mac 平台的 `Build Settings`


    左侧 `Platform` 列表中的默认平台为 `PC, Mac & Linux Standalone`，与编辑器标题栏列出的平台一致。右侧默认的特定 `Target
    Platform` 设置为 Windows 可执行文件，但由于你是在 Mac 上操作，让我们将右侧菜单中的 `Target Platform` 设置为 `Mac
    OS X`。然后点击左下角的 `Switch Platform` 按钮。这将启动项目资产到适合 Mac 使用的格式的转换。转换完成后，编辑器的标题栏将更新以反映新平台。


    现在，你可以单击 `Build Settings` 窗口中的 `Build` 或 `Build and Play` 按钮。单击 `Build` 将生成我们游戏的
    OS X 应用程序版本。单击 `Build and Play` 会执行相同操作，但同时会运行游戏，省去了打开访达窗口并双击新应用程序的麻烦。Unity 将提示你为应用程序输入文件名和位置，默认位置在项目目录的顶层，这就可以了（图
    2-10）。


    ![9781430248750_Fig02-10.jpg](img/9781430248750_Fig02-10.jpg)


    图 2-10. 保存 OS X 应用程序构建


    构建完成后，双击生成的应用程序即可运行游戏。或者，如果你选择了 `Build and Run`，游戏应该会自动启动。Unity 生成的 OS X 应用程序会先启动一个分辨率选择窗口（图
    2-11）。


    ![9781430248750_Fig02-11.jpg](img/9781430248750_Fig02-11.jpg)


    图 2-11. Unity OS X 应用程序的启动对话框


    选择所需分辨率并单击 `Play!` 后，你将看到一个刚指定大小的游戏窗口。现在，Angry Bots 正在其独立的 Mac 窗口中运行（图 2-12）。


    ![9781430248750_Fig02-12.jpg](img/9781430248750_Fig02-12.jpg)


    图 2-12. 作为 OS X 应用程序运行的 Angry Bots


    ## 编辑器布局

    '
- fmt: 'Now that you’ve got a feel for the Unity test-and-build workflow with the
    Angry Bots project, let’s take a closer look at the layout of the Unity Editor.
    The main window is divided into areas (I’m used to calling them panes, but I’ll
    call them areas since that’s the term used in Xcode). Each area holds one or more
    tabbed views. The currently displayed view for an area is selected by clicking
    the view’s tab. Views can be added, moved, removed, and resized, and the Editor
    supports switching among layouts, so a layout essentially is a specific arrangement
    of views. For example, the default layout of the main window ([Figure 2-13](#9781430248750_Ch02.xhtml#Fig13))
    has an area containing a Scene View ([Figure 2-14](#9781430248750_Ch02.xhtml#Fig14))
    and a Game View ([Figure 2-15](#9781430248750_Ch02.xhtml#Fig15)).


    **Note** The Unity documentation is somewhat inconsistent in naming views. It’s
    obvious from their names that the Game View and Scene View are views. But the
    Console and Inspector are also views. In this book, I’ll include View in all of
    their names to make clear they are all views and can be manipulated the same way.


    ![9781430248750_Fig02-13.jpg](images/9781430248750_Fig02-13.jpg)


    [Figure 2-13](#9781430248750_Ch02.xhtml#_Fig13). The default layout of the Unity
    Editor


    ![9781430248750_Fig02-14.jpg](images/9781430248750_Fig02-14.jpg)


    [Figure 2-14](#9781430248750_Ch02.xhtml#_Fig14). The Scene View selected in a
    multitabbed area


    ![9781430248750_Fig02-15.jpg](images/9781430248750_Fig02-15.jpg)


    [Figure 2-15](#9781430248750_Ch02.xhtml#_Fig15). The Game View selected in a multitabbed
    area


    ## Preset Layouts


    The default layout is just one of several preset layouts. Alternate layouts can
    be selected from the menu in the top right corner of the main window ([Figure
    2-16](#9781430248750_Ch02.xhtml#Fig16)). Go ahead and try them out. [Figures 2-17](#9781430248750_Ch02.xhtml#Fig17)
    through [2-20](#9781430248750_Ch02.xhtml#Fig20) show the resulting layouts.


    ![9781430248750_Fig02-16.jpg](images/9781430248750_Fig02-16.jpg)


    [Figure 2-16](#9781430248750_Ch02.xhtml#_Fig16). The Layout menu


    I’ll describe the individual types of views in more detail shortly, but for now
    note that the 2-by-3 layout ([Figure 2-17](#9781430248750_Ch02.xhtml#Fig17)) is
    an example of a layout where the Scene View and Game View are in separate areas
    instead of sharing the same one. The 4-split layout ([Figure 2-18](#9781430248750_Ch02.xhtml#Fig18))
    has four instances of the Scene View (reminiscent of tools used for computer-aided
    design), demonstrating that a layout is not restricted to one of each type of
    view.


    ![9781430248750_Fig02-17.jpg](images/9781430248750_Fig02-17.jpg)


    [Figure 2-17](#9781430248750_Ch02.xhtml#_Fig17). The 2-by-3 layout


    ![9781430248750_Fig02-18.jpg](images/9781430248750_Fig02-18.jpg)


    [Figure 2-18](#9781430248750_Ch02.xhtml#_Fig18). The 4-split layout


    ![9781430248750_Fig02-19.jpg](images/9781430248750_Fig02-19.jpg)


    [Figure 2-19](#9781430248750_Ch02.xhtml#_Fig19). The Tall layout


    ![9781430248750_Fig02-20.jpg](images/9781430248750_Fig02-20.jpg)


    [Figure 2-20](#9781430248750_Ch02.xhtml#_Fig20). The Wide layout


    ## Custom Layouts


    The preset layouts provide a variety of workspaces, but fortunately you’re not
    restricted to using them exactly as they are. Unity provides the flexibility to
    completely rearrange the Editor window as you like.


    ### Resize Areas


    For starters, you may notice while trying out the various preset layouts that
    some of the areas are too narrow, for example, in the left panel of the Wide layout
    ([Figure 2-20](#9781430248750_Ch02.xhtml#Fig20)). Fortunately, you can click the
    border of an area and drag it to resize the area.


    ### Move Views


    Even cooler, you can move views around. Dragging the tab of a view into another
    tab region will move the view there. And dragging the tab into a “docking” area
    will create a new area. For example, start with the Default layout, drag the Inspector
    tab to the right of the Hierarchy tab. Now the Inspector View shares the same
    area as the Hierarchy View. And then drag the Console tab into the bottom region
    of the Hierarchy/Inspector View. That effectively splits the area into two, the
    bottom half now containing the Console. The result should look like [Figure 2-21](#9781430248750_Ch02.xhtml#Fig21).


    ![9781430248750_Fig02-21.jpg](images/9781430248750_Fig02-21.jpg)


    [Figure 2-21](#9781430248750_Ch02.xhtml#_Fig21). A workspace customized with views
    moved


    ### Detach Views


    You can even drag a view outside the Editor window so that it resides in its own
    “floating” window, which can be treated just like any other area. Drag the Scene
    tab outside the Editor so it resides in a floating window, and then drag the Game
    tab into its tab region. The result should look like [Figure 2-22](#9781430248750_Ch02.xhtml#Fig22).
    Likewise, dragging a tab into a docking region of the floating window will add
    another area to the window.


    ![9781430248750_Fig02-22.jpg](images/9781430248750_Fig02-22.jpg)


    [Figure 2-22](#9781430248750_Ch02.xhtml#_Fig22). The list of views in the Windows
    menu


    **Tip** I like to detach the Game View into a floating window, since I normally
    don’t need to see it while I’m working in the Editor until I click Play, and this
    allows me to maximize the Game View to fill up to the entire screen.


    Floating windows are often covered up by other windows, so the Windows menu on
    the menu bar has menu items for making each view visible ([Figure 2-22](#9781430248750_Ch02.xhtml#Fig22)).
    Notice there is a keyboard shortcut for each, and there is also a Layouts submenu
    that is identical to the layout menu inside the Editor.


    ### Add and Remove Views


    You can also add and remove views in each area using the menu at the top right
    corner of the area ([Figure 2-23](#9781430248750_Ch02.xhtml#Fig23)). The Close
    Tab item removes the currently displayed view. The Add Tab item provides a list
    of new views for you to choose from.


    ![9781430248750_Fig02-23.jpg](images/9781430248750_Fig02-23.jpg)


    [Figure 2-23](#9781430248750_Ch02.xhtml#_Fig23). Adding a view to an area


    You may want to have different layouts for different target platforms, or different
    layouts for development vs. play testing, or even different layouts for different
    games. For example, I have a custom layout specifically for HyperBowl that preserves
    the Game View in a suitable portrait aspect ratio. It would be a hassle to manually
    reconfigure the Editor every time you start up Unity. Fortunately, you can name
    and save layouts by selecting the Save Layout option in the layout menu, which
    will prompt you for the new layout name ([Figure 2-24](#9781430248750_Ch02.xhtml#Fig24)).


    ![9781430248750_Fig02-24.jpg](images/9781430248750_Fig02-24.jpg)


    [Figure 2-24](#9781430248750_Ch02.xhtml#_Fig24). The Save Layout menu


    After saving, the new layout will be listed in the layout menu and also in the
    list of layouts available for deletion if you select Delete Layout ([Figure 2-25](#9781430248750_Ch02.xhtml#Fig25)).


    ![9781430248750_Fig02-25.jpg](images/9781430248750_Fig02-25.jpg)


    [Figure 2-25](#9781430248750_Ch02.xhtml#_Fig25). The Delete Layout menu


    If you’ve messed up or deleted the original layouts, you can select the Restore
    Factory Settings option in the area menu ([Figure 2-26](#9781430248750_Ch02.xhtml#Fig26)).
    This will also delete any custom layouts.


    ![9781430248750_Fig02-26.jpg](images/9781430248750_Fig02-26.jpg)


    [Figure 2-26](#9781430248750_Ch02.xhtml#_Fig26). The Restore Factory Settings
    prompt


    If you change a layout and haven’t saved the changes, you can always discard them
    by just reselecting that layout in the layout menu.


    ## The Inspector View'
  raw: 'Now that you’ve got a feel for the Unity test-and-build workflow with the
    Angry Bots project, let’s take a closer look at the layout of the Unity Editor.
    The main window is divided into areas (I’m used to calling them panes, but I’ll
    call them areas since that’s the term used in Xcode). Each area holds one or more
    tabbed views. The currently displayed view for an area is selected by clicking
    the view’s tab. Views can be added, moved, removed, and resized, and the Editor
    supports switching among layouts, so a layout essentially is a specific arrangement
    of views. For example, the default layout of the main window ([Figure 2-13](#9781430248750_Ch02.xhtml#Fig13))
    has an area containing a Scene View ([Figure 2-14](#9781430248750_Ch02.xhtml#Fig14))
    and a Game View ([Figure 2-15](#9781430248750_Ch02.xhtml#Fig15)).


    **Note**   The Unity documentation is somewhat inconsistent in naming views. It’s
    obvious from their names that the Game View and Scene View are views. But the
    Console and Inspector are also views. In this book, I’ll include View in all of
    their names to make clear they are all views and can be manipulated the same way.


    ![9781430248750_Fig02-13.jpg](images/9781430248750_Fig02-13.jpg)


    [Figure 2-13](#9781430248750_Ch02.xhtml#_Fig13). The default layout of the Unity
    Editor


    ![9781430248750_Fig02-14.jpg](images/9781430248750_Fig02-14.jpg)


    [Figure 2-14](#9781430248750_Ch02.xhtml#_Fig14). The Scene View selected in a
    multitabbed area


    ![9781430248750_Fig02-15.jpg](images/9781430248750_Fig02-15.jpg)


    [Figure 2-15](#9781430248750_Ch02.xhtml#_Fig15). The Game View selected in a multitabbed
    area


    Preset Layouts


    The default layout is just one of several preset layouts. Alternate layouts can
    be selected from the menu in the top right corner of the main window ([Figure
    2-16](#9781430248750_Ch02.xhtml#Fig16)). Go ahead and try them out. [Figures 2-17](#9781430248750_Ch02.xhtml#Fig17)
    through [2-20](#9781430248750_Ch02.xhtml#Fig20) show the resulting layouts.


    ![9781430248750_Fig02-16.jpg](images/9781430248750_Fig02-16.jpg)


    [Figure 2-16](#9781430248750_Ch02.xhtml#_Fig16). The Layout menu


    I’ll describe the individual types of views in more detail shortly, but for now
    note that the 2-by-3 layout ([Figure 2-17](#9781430248750_Ch02.xhtml#Fig17)) is
    an example of a layout where the Scene View and Game View are in separate areas
    instead of sharing the same one. The 4-split layout ([Figure 2-18](#9781430248750_Ch02.xhtml#Fig18))
    has four instances of the Scene View (reminiscent of tools used for computer-aided
    design), demonstrating that a layout is not restricted to one of each type of
    view.


    ![9781430248750_Fig02-17.jpg](images/9781430248750_Fig02-17.jpg)


    [Figure 2-17](#9781430248750_Ch02.xhtml#_Fig17). The 2-by-3 layout


    ![9781430248750_Fig02-18.jpg](images/9781430248750_Fig02-18.jpg)


    [Figure 2-18](#9781430248750_Ch02.xhtml#_Fig18). The 4-split layout


    ![9781430248750_Fig02-19.jpg](images/9781430248750_Fig02-19.jpg)


    Figure 2-19\. The Tall layout


    ![9781430248750_Fig02-20.jpg](images/9781430248750_Fig02-20.jpg)


    [Figure 2-20](#9781430248750_Ch02.xhtml#_Fig20). The Wide layout


    Custom Layouts


    The preset layouts provide a variety of workspaces, but fortunately you’re not
    restricted to using them exactly as they are. Unity provides the flexibility to
    completely rearrange the Editor window as you like.


    Resize Areas


    For starters, you may notice while trying out the various preset layouts that
    some of the areas are too narrow, for example, in the left panel of the Wide layout
    ([Figure 2-20](#9781430248750_Ch02.xhtml#Fig20)). Fortunately, you can click the
    border of an area and drag it to resize the area.


    Move Views


    Even cooler, you can move views around. Dragging the tab of a view into another
    tab region will move the view there. And dragging the tab into a “docking” area
    will create a new area. For example, start with the Default layout, drag the Inspector
    tab to the right of the Hierarchy tab. Now the Inspector View shares the same
    area as the Hierarchy View. And then drag the Console tab into the bottom region
    of the Hierarchy/Inspector View. That effectively splits the area into two, the
    bottom half now containing the Console. The result should look like [Figure 2-21](#9781430248750_Ch02.xhtml#Fig21).


    ![9781430248750_Fig02-21.jpg](images/9781430248750_Fig02-21.jpg)


    [Figure 2-21](#9781430248750_Ch02.xhtml#_Fig21). A workspace customized with views
    moved


    Detach Views


    You can even drag a view outside the Editor window so that it resides in its own
    “floating” window, which can be treated just like any other area. Drag the Scene
    tab outside the Editor so it resides in a floating window, and then drag the Game
    tab into its tab region. The result should look like [Figure 2-22](#9781430248750_Ch02.xhtml#Fig22).
    Likewise, dragging a tab into a docking region of the floating window will add
    another area to the window.


    ![9781430248750_Fig02-22.jpg](images/9781430248750_Fig02-22.jpg)


    [Figure 2-22](#9781430248750_Ch02.xhtml#_Fig22). The list of views in the Windows
    menu


    **Tip**   I like to detach the Game View into a floating window, since I normally
    don’t need to see it while I’m working in the Editor until I click Play, and this
    allows me to maximize the Game View to fill up to the entire screen.


    Floating windows are often covered up by other windows, so the Windows menu on
    the menu bar has menu items for making each view visible ([Figure 2-22](#9781430248750_Ch02.xhtml#Fig22)).
    Notice there is a keyboard shortcut for each, and there is also a Layouts submenu
    that is identical to the layout menu inside the Editor.


    Add and Remove Views


    You can also add and remove views in each area using the menu at the top right
    corner of the area ([Figure 2-23](#9781430248750_Ch02.xhtml#Fig23)). The Close
    Tab item removes the currently displayed view. The Add Tab item provides a list
    of new views for you to choose from.


    ![9781430248750_Fig02-23.jpg](images/9781430248750_Fig02-23.jpg)


    [Figure 2-23](#9781430248750_Ch02.xhtml#_Fig23). Adding a view to an area


    You may want to have different layouts for different target platforms, or different
    layouts for development vs. play testing, or even different layouts for different
    games. For example, I have a custom layout specifically for HyperBowl that preserves
    the Game View in a suitable portrait aspect ratio. It would be a hassle to manually
    reconfigure the Editor every time you start up Unity. Fortunately, you can name
    and save layouts by selecting the Save Layout option in the layout menu, which
    will prompt you for the new layout name ([Figure 2-24](#9781430248750_Ch02.xhtml#Fig24)).


    ![9781430248750_Fig02-24.jpg](images/9781430248750_Fig02-24.jpg)


    [Figure 2-24](#9781430248750_Ch02.xhtml#_Fig24). The Save Layout menu


    After saving, the new layout will be listed in the layout menu and also in the
    list of layouts available for deletion if you select Delete Layout ([Figure 2-25](#9781430248750_Ch02.xhtml#Fig25)).


    ![9781430248750_Fig02-25.jpg](images/9781430248750_Fig02-25.jpg)


    [Figure 2-25](#9781430248750_Ch02.xhtml#_Fig25). The Delete Layout menu


    If you’ve messed up or deleted the original layouts, you can select the Restore
    Factory Settings option in the area menu ([Figure 2-26](#9781430248750_Ch02.xhtml#Fig26)).
    This will also delete any custom layouts.


    ![9781430248750_Fig02-26.jpg](images/9781430248750_Fig02-26.jpg)


    [Figure 2-26](#9781430248750_Ch02.xhtml#_Fig26). The Restore Factory Settings
    prompt


    If you change a layout and haven’t saved the changes, you can always discard them
    by just reselecting that layout in the layout menu.


    The Inspector View'
  trans: '

    现在你已经通过 Angry Bots 项目对 Unity 的测试和构建工作流有了初步了解，接下来让我们更仔细地研究一下 Unity 编辑器的布局。主窗口被划分为多个区域（我习惯称之为窗格，但这里我称之为区域，因为这是
    Xcode 中使用的术语）。每个区域包含一个或多个标签视图。通过点击视图的标签，可以选定当前区域显示的内容。视图可以添加、移动、移除和调整大小，编辑器支持在布局之间切换，因此布局本质上就是视图的特定排列。例如，主窗口的默认布局（图
    2-13）包含一个区域，其中含有场景视图（图 2-14）和游戏视图（图 2-15）。


    **备注** Unity 文档在视图命名上有些不太一致。从名称上显而易见，游戏视图和场景视图是视图。但控制台和检视面板也是视图。在本书中，我会在所有视图名称中包含“视图”一词，以明确它们都是视图，并且可以以相同方式操作。


    ![9781430248750_Fig02-13.jpg](img/9781430248750_Fig02-13.jpg)


    图 2-13 Unity 编辑器的默认布局


    ![9781430248750_Fig02-14.jpg](img/9781430248750_Fig02-14.jpg)


    图 2-14 在多标签区域中选定的场景视图


    ![9781430248750_Fig02-15.jpg](img/9781430248750_Fig02-15.jpg)


    图 2-15 在多标签区域中选定的游戏视图


    ## 预设布局


    默认布局只是几种预设布局中的一种。可以从主窗口右上角的菜单中选择其他布局（图 2-16）。继续试试它们吧。图 2-17 到 2-20 展示了这些布局的效果。


    ![9781430248750_Fig02-16.jpg](img/9781430248750_Fig02-16.jpg)


    图 2-16 布局菜单


    稍后我会更详细地介绍各种类型的视图，但目前请注意，2×3 布局（图 2-17）是一种场景视图和游戏视图位于不同区域而非共享同一区域的布局示例。4-分割布局（图
    2-18）有四个场景视图实例（让人联想到计算机辅助设计工具），这说明布局并不限于每种类型只有一个视图。


    ![9781430248750_Fig02-17.jpg](img/9781430248750_Fig02-17.jpg)


    图 2-17 2×3 布局


    ![9781430248750_Fig02-18.jpg](img/9781430248750_Fig02-18.jpg)


    图 2-18 4-分割布局


    ![9781430248750_Fig02-19.jpg](img/9781430248750_Fig02-19.jpg)


    图 2-19 高布局


    ![9781430248750_Fig02-20.jpg](img/9781430248750_Fig02-20.jpg)


    图 2-20 宽布局


    ## 自定义布局


    预设布局提供了多种工作区，但幸运的是，你不必完全照搬使用。Unity 提供了灵活性，让你可以随心所欲地完全重新排列编辑器窗口。


    ### 调整区域大小


    首先，在尝试各种预设布局时，你可能会注意到某些区域太窄了，例如，宽布局（图 2-20）的左侧面板。幸运的是，你可以点击区域的边框并拖动来调整区域大小。


    ### 移动视图


    更酷的是，你可以移动视图。将视图的标签拖拽到另一个标签区域，即可将视图移动到那里。将标签拖拽到“停靠”区域则会创建一个新的区域。例如，从默认布局开始，将检视面板标签拖拽到层级标签的右侧。现在检视面板视图和层级视图共享同一区域。然后将控制台标签拖拽到层级/检视面板视图的底部区域。这会将区域有效地分成两部分，底部现在包含控制台。结果应该类似于
    图 2-21。


    ![9781430248750_Fig02-21.jpg](img/9781430248750_Fig02-21.jpg)


    图 2-21 移动视图后自定义的工作区


    ### 分离视图


    你甚至可以将视图拖拽到编辑器窗口之外，使其位于自己的“浮动”窗口中，该窗口可以像任何其他区域一样对待。将场景标签拖拽出编辑器，使其位于一个浮动窗口中，然后将游戏标签拖入该浮动窗口的标签区域。结果应该类似于
    图 2-22。同样，将标签拖拽到浮动窗口的停靠区域，将为该窗口添加另一个区域。


    ![9781430248750_Fig02-22.jpg](img/9781430248750_Fig02-22.jpg)


    图 2-22 窗口菜单中的视图列表


    **提示** 我喜欢将游戏视图分离到一个浮动窗口中，因为我在编辑器中工作时通常不需要看到它，直到我点击播放，这样我就可以最大化游戏视图使其填满整个屏幕。


    浮动窗口经常被其他窗口遮挡，因此菜单栏上的窗口菜单中包含每个视图可见性的菜单项（图 2-22）。注意每个视图都有键盘快捷键，还有一个布局子菜单，与编辑器内的布局菜单相同。


    ### 添加和移除视图


    您还可以使用区域右上角的菜单（图 2-23）在每个区域中添加和移除视图。关闭标签项用于移除当前显示的视图。添加标签项提供了一系列新视图供您选择。


    ![9781430248750_Fig02-23.jpg](img/9781430248750_Fig02-23.jpg)


    图 2-23 向区域添加视图


    您可能希望针对不同的目标平台使用不同的布局，或者针对开发与游戏测试使用不同的布局，甚至针对不同的游戏使用不同的布局。例如，我有一个专门用于 HyperBowl
    的自定义布局，它将游戏视图保持在合适的竖屏宽高比。每次启动 Unity 时手动重新配置编辑器会很麻烦。幸运的是，您可以通过在布局菜单中选择保存布局选项来命名和保存布局，系统会提示您输入新的布局名称（图
    2-24）。


    ![9781430248750_Fig02-24.jpg](img/9781430248750_Fig02-24.jpg)


    图 2-24 保存布局菜单


    保存后，新布局将列在布局菜单中，如果您选择删除布局（图 2-25），也会出现在可删除布局列表中。


    ![9781430248750_Fig02-25.jpg](img/9781430248750_Fig02-25.jpg)


    图 2-25 删除布局菜单


    如果您搞乱了或删除了原始布局，可以选择区域菜单中的恢复出厂设置选项（图 2-26）。这也会删除任何自定义布局。


    ![9781430248750_Fig02-26.jpg](img/9781430248750_Fig02-26.jpg)


    图 2-26 恢复出厂设置提示


    如果您更改了一个布局但尚未保存更改，您可以随时通过在布局菜单中重新选择该布局来放弃更改。


    ## 检视面板视图

    '
- fmt: '# The Inspector View


    The best view to describe in detail first is the `Inspector View`, since its function
    is to display information about objects selected in other views. It’s really more
    than an inspector, since it can typically be used to modify the selected item.


    The `Inspector View` is also used to display and adjust the various settings that
    can be brought up in the `Edit` menu. For example, you might notice that the `Assets`
    folder in the Angry Bots installation has a lot of files with a `.meta` extension,
    as shown in [Figure 2-27](#9781430248750_Ch02.xhtml#Fig27). In fact, there is
    one of these files for each asset file. Unity tracks the assets in a project using
    these meta files, which are in text format to facilitate use with version control
    systems like Perforce and Subversion (or newer distributed version control systems
    like Git and Mercurial).


    ![9781430248750_Fig02-27.jpg](images/9781430248750_Fig02-27.jpg)


    [Figure 2-27](#9781430248750_Ch02.xhtml#_Fig27). The meta files in the Angry Bots
    project


    But if you aren’t using a version control system (or if you are using the `Unity
    Asset Server`, which is a product from Unity Technologies and requires another
    license), you can turn off version control compatibility in the `Editor Settings`
    and get rid of those unsightly files. Bring up the `Editor Settings` by going
    to the `Edit` menu and selecting `Editor Settings` from the `Settings` submenu
    ([Figure 2-28](#9781430248750_Ch02.xhtml#Fig28)).


    ![9781430248750_Fig02-28.jpg](images/9781430248750_Fig02-28.jpg)


    [Figure 2-28](#9781430248750_Ch02.xhtml#_Fig28). Bringing up the `Editor Settings`


    Now the `Inspector View` displays the `Editor Settings`. If the project currently
    has meta files, then the `Version Control Mode` is set to `Meta Files` (and if
    you’re using the `Asset Server`, this option is set to `Asset Server`). To remove
    the meta files, set the `Version Control Mode` to `Disabled` ([Figure 2-29](#9781430248750_Ch02.xhtml#Fig29)).


    ![9781430248750_Fig02-29.jpg](images/9781430248750_Fig02-29.jpg)


    [Figure 2-29](#9781430248750_Ch02.xhtml#_Fig29). `Editor Settings` in the `Inspector
    View`


    With the `Version Control Mode` set to `Disabled`, Unity will remove the meta
    files ([Figure 2-30](#9781430248750_Ch02.xhtml#Fig30)). The asset tracking is
    now handled within binary files inside the `Library` folder of the project.


    ![9781430248750_Fig02-30.jpg](images/9781430248750_Fig02-30.jpg)


    [Figure 2-30](#9781430248750_Ch02.xhtml#_Fig30). The Angry Bots project folder
    minus the meta files


    **Note**: Unity Pro users who are using meta files for version control support
    also have the option of setting `Asset Serialization Mode` to `Force Text`. In
    that mode, Unity scene files are saved in a text-only YAML (YAML Ain’t Markup
    Language) format.


    Normally, the `Inspector View` displays the properties of the most recently selected
    object (when you bring up the `Editor Settings`, you really selected it). But
    sometimes you don’t want the `Inspector View` to change while you’re selecting
    other objects. In that case, you can pin the `Inspector View` to an object by
    selecting the `Lock` option in the menu at the top right of the view ([Figure
    2-31](#9781430248750_Ch02.xhtml#Fig31)).


    ![9781430248750_Fig02-31.jpg](images/9781430248750_Fig02-31.jpg)


    [Figure 2-31](#9781430248750_Ch02.xhtml#_Fig31). Locking the `Inspector View`


    # The Project View


    While the `Inspector View` can be thought of as the lowest-level view in the Editor,
    since it displays the properties of just a single object, the `Project View` can
    be considered the highest-level view ([Figure 2-32](#9781430248750_Ch02.xhtml#Fig32)).
    The `Project View` displays all of the assets available for your game, ranging
    from individual models, textures and scripts to the scene files which incorporate
    those assets. All of the project assets are files residing in the `Assets` folder
    of your project (so I actually think of the `Project View` as the `Assets View`).


    ![9781430248750_Fig02-32.jpg](images/9781430248750_Fig02-32.jpg)


    [Figure 2-32](#9781430248750_Ch02.xhtml#_Fig32). Top level of the `Project View`


    ## Switch Between One-Column and Two-Columns


    Before Unity 4, the `Project View` had only a one-column display. That option
    is still available in the menu for the `Project View` (click the little three-line
    icon at the top right of the view), so you can now switch between one and two
    columns.


    Notice how the `Project View` of Angry Bots project ([Figure 2-32](#9781430248750_Ch02.xhtml#Fig32))
    resembles how the project’s `Assets` folder looks in the Finder (see [Figure 2-30](#9781430248750_Ch02.xhtml#Fig30)).
    It actually looks more like a Windows file view, where you navigate the folder
    hierarchy in the panel on the left and view the contents of the selected folder
    in the right panel.


    ## Scale Icons


    The slider on the bottom scales the view in the right panel—a larger scale is
    nice for textures and smaller is better for items like scripts that don’t have
    interesting icons. This is a good reason to partition assets by asset type (i.e.,
    put all textures in a `Textures` folder, scripts in a `Script` folder, and so
    on). Chances are, a single-scale slider setting won’t be good for a mixture of
    asset types.


    ## Inspect Assets


    Selecting an asset on the right will display the properties of that asset in the
    `Inspector View`. For example, if you select a sound sample, the `Inspector View`
    displays information about the sound format, some of which you can change, like
    the compression, and it even lets you play the audio in the Editor ([Figure 2-33](#9781430248750_Ch02.xhtml#Fig33)).
    I’ll explain the sound properties in a later chapter, but for now feel free to
    select various types of assets in the `Project View` and see what shows up in
    the `Inspector View`.


    ![9781430248750_Fig02-33.jpg](images/9781430248750_Fig02-33.jpg)


    [Figure 2-33](#9781430248750_Ch02.xhtml#_Fig33). Inspecting a selected asset in
    the `Project View`


    ## Search for Assets


    In a large and complex project, it’s difficult to manually search for a particular
    asset. Fortunately, just as in the Finder, there is a search box that can be used
    to filter the results showing in the right panel of the `Project View`. In [Figure
    2-34](#9781430248750_Ch02.xhtml#Fig34), the `Project View` displays the result
    of searching for assets with `"add"` in their names.


    ![9781430248750_Fig02-34.jpg](images/9781430248750_Fig02-34.jpg)


    [Figure 2-34](#9781430248750_Ch02.xhtml#_Fig34). Searching for assets with `"add"`
    in the name


    The right panel displays the search results for everything under `Assets` (i.e.,
    all of our assets). The search can be narrowed further by selecting one of the
    subfolders in the left panel. For example, if you know you’re looking for a texture,
    and you’ve arranged your assets into subfolders by the type of asset, you can
    select the `Textures` folder to search ([Figure 2-35](#9781430248750_Ch02.xhtml#Fig35)).


    ![9781430248750_Fig02-35.jpg](images/9781430248750_Fig02-35.jpg)


    [Figure 2-35](#9781430248750_Ch02.xhtml#_Fig35). Searching assets in a folder


    Notice just below the search, there is a tab with the name of the folder that
    was selected. You can still click the `Assets` tab to the left to see the search
    results for all your assets, both locally and on the `Unity Asset Store`, which
    we’ll make copious use of in this book.


    You can also filter your search by asset type, using the menu immediately to the
    right of the search box. Instead of just searching in the `Textures` folder, you
    could have selected `Texture` as the asset type of interest ([Figure 2-36](#9781430248750_Ch02.xhtml#Fig36)).
    Notice how that resulted in `"t:Texture"` being added to the search box. The `"t:"`
    prefix indicates the search should be filtered by the following asset type. You
    could have just typed that in without using the menu.


    ![9781430248750_Fig02-36.jpg](images/9781430248750_Fig02-36.jpg)


    [Figure 2-36](#9781430248750_Ch02.xhtml#_Fig36). A search filtered by asset type'
  raw: 'The best view to describe in detail first is the Inspector View, since its
    function is to display information about objects selected in other views. It’s
    really more than an inspector, since it can typically be used to modify the selected
    item.


    The Inspector View is also used to display and adjust the various settings that
    can be brought up in the Edit menu. For example, you might notice that the Assets
    folder in the Angry Bots installation has a lot of files with a .meta extension,
    as shown in [Figure 2-27](#9781430248750_Ch02.xhtml#Fig27). In fact, there is
    one of these files for each asset file. Unity tracks the assets in a project using
    these meta files, which are in text format to facilitate use with version control
    systems like Perforce and Subversion (or newer distributed version control systems
    like Git and Mercurial).


    ![9781430248750_Fig02-27.jpg](images/9781430248750_Fig02-27.jpg)


    [Figure 2-27](#9781430248750_Ch02.xhtml#_Fig27). The meta files in the Angry Bots
    project


    But if you aren’t using a version control system (or if you are using the Unity
    Asset Server, which is a product from Unity Technologies and requires another
    license), you can turn off version control compatibility in the Editor Settings
    and get rid of those unsightly files. Bring up the Editor Settings by going to
    the Edit menu and selecting Editor Settings from the Settings submenu ([Figure
    2-28](#9781430248750_Ch02.xhtml#Fig28)).


    ![9781430248750_Fig02-28.jpg](images/9781430248750_Fig02-28.jpg)


    [Figure 2-28](#9781430248750_Ch02.xhtml#_Fig28). Bringing up the Editor Settings


    Now the Inspector View displays the Editor Settings. If the project currently
    has meta files, then the Version Control Mode is set to Meta Files (and if you’re
    using the Asset Server, this option is set to Asset Server). To remove the meta
    files, set the Version Control Mode to Disabled ([Figure 2-29](#9781430248750_Ch02.xhtml#Fig29)).


    ![9781430248750_Fig02-29.jpg](images/9781430248750_Fig02-29.jpg)


    [Figure 2-29](#9781430248750_Ch02.xhtml#_Fig29). Editor Settings in the Inspector
    View


    With the Version Control Mode set to Disabled, Unity will remove the meta files
    ([Figure 2-30](#9781430248750_Ch02.xhtml#Fig30)). The asset tracking is now handled
    within binary files inside the Library folder of the project.


    ![9781430248750_Fig02-30.jpg](images/9781430248750_Fig02-30.jpg)


    [Figure 2-30](#9781430248750_Ch02.xhtml#_Fig30). The Angry Bots project folder
    minus the meta files


    **Note**   Unity Pro users who are using meta files for version control support
    also have the option of setting Asset Serialization Mode to Force Text. In that
    mode, Unity scene files are saved in a text-only YAML (YAML Ain’t Markup Language)
    format.


    Normally, the Inspector View displays the properties of the most recently selected
    object (when you bring up the Editor Settings, you really selected it). But sometimes
    you don’t want the Inspector View to change while you’re selecting other objects.
    In that case, you can pin the Inspector View to an object by selecting the Lock
    option in the menu at the top right of the view ([Figure 2-31](#9781430248750_Ch02.xhtml#Fig31)).


    ![9781430248750_Fig02-31.jpg](images/9781430248750_Fig02-31.jpg)


    [Figure 2-31](#9781430248750_Ch02.xhtml#_Fig31). Locking the Inspector View


    The Project View


    While the Inspector View can be thought of as the lowest-level view in the Editor,
    since it displays the properties of just a single object, the Project View can
    be considered the highest-level view ([Figure 2-32](#9781430248750_Ch02.xhtml#Fig32)).
    The Project View displays all of the assets available for your game, ranging from
    individual models, textures and scripts to the scene files which incorporate those
    assets. All of the project assets are files residing in the Assets folder of your
    project (so I actually think of the Project View as the Assets View).


    ![9781430248750_Fig02-32.jpg](images/9781430248750_Fig02-32.jpg)


    [Figure 2-32](#9781430248750_Ch02.xhtml#_Fig32). Top level of the Project view


    Switch Between One-Column and Two-Columns


    Before Unity 4, the Project View had only a one-column display. That option is
    still available in the menu for the Project View (click the little three-line
    icon at the top right of the view), so you can now switch between one and two
    columns.


    Notice how the Project View of Angry Bots project ([Figure 2-32](#9781430248750_Ch02.xhtml#Fig32))
    resembles how the project’s Assets folder looks in the Finder (see [Figure 2-30](#9781430248750_Ch02.xhtml#Fig30)).
    It actually looks more like a Windows file view, where you navigate the folder
    hierarchy in the panel on the left and view the contents of the selected folder
    in the right panel.


    Scale Icons


    The slider on the bottom scales the view in the right panel—a larger scale is
    nice for textures and smaller is better for items like scripts that don’t have
    interesting icons. This is a good reason to partition assets by asset type (i.e.,
    put all textures in a Textures folders, scripts in a Script folder, and so on).
    Chances are, a single-scale slider setting won’t be good for a mixture of asset
    types.


    Inspect Assets


    Selecting an asset on the right will display the properties of that asset in the
    Inspector View. For example, if you select a sound sample, the Inspector View
    displays information about the sound format, some of which you can change, like
    the compression, and it even lets you play the audio in the Editor ([Figure 2-33](#9781430248750_Ch02.xhtml#Fig33)).
    I’ll explain the sound properties in a later chapter, but for now feel free to
    select various types of assets in the Project View and see what shows up in the
    Inspector View.


    ![9781430248750_Fig02-33.jpg](images/9781430248750_Fig02-33.jpg)


    [Figure 2-33](#9781430248750_Ch02.xhtml#_Fig33). Inspecting a selected asset in
    the Project View


    Search for Assets


    In a large and complex project, it’s difficult to manually search for a particular
    asset. Fortunately, just as in the Finder, there is a search box that can be used
    to filter the results showing in the right panel of the Project View. In [Figure
    2-34](#9781430248750_Ch02.xhtml#Fig34), the Project View displays the result of
    searching for assets with “add” in their names.


    ![9781430248750_Fig02-34.jpg](images/9781430248750_Fig02-34.jpg)


    [Figure 2-34](#9781430248750_Ch02.xhtml#_Fig34). Searching for assets with “add”
    in the name


    The right panel displays the search results for everything under Assets (i.e.,
    all of our assets). The search can be narrowed further by selecting one of the
    subfolders in the left panel. For example, if you know you’re looking for a texture,
    and you’ve arranged your assets into subfolders by the type of asset, you can
    select the Textures folder to search ([Figure 2-35](#9781430248750_Ch02.xhtml#Fig35)).


    ![9781430248750_Fig02-35.jpg](images/9781430248750_Fig02-35.jpg)


    [Figure 2-35](#9781430248750_Ch02.xhtml#_Fig35). Searching assets in a folder


    Notice just below the search, there is a tab with the name of the folder that
    was selected. You can still click the Assets tab to the left to see the search
    results for all your assets, both locally and on the Unity Asset Store, which
    we’ll make copious use of in this book.


    You can also filter your search by asset type, using the menu immediately to the
    right of the search box. Instead of just searching in the Textures folder, you
    could have selected Texture as the asset type of interest ([Figure 2-36](#9781430248750_Ch02.xhtml#Fig36)).
    Notice how that resulted in “t:Texture” being added to the search box. The “t:”
    prefix indicates the search should be filtered by the following asset type. You
    could have just typed that in without using the menu.


    ![9781430248750_Fig02-36.jpg](images/9781430248750_Fig02-36.jpg)


    [Figure 2-36](#9781430248750_Ch02.xhtml#_Fig36). A search filtered by asset type'
