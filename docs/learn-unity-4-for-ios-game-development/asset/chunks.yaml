- fmt: 'To import that script, go to the Assets menu and select the Import Package
    submenu. This is the same list of Standard Assets packages presented when we created
    a new project ([Figure 3-14](#9781430248750_Ch03.xhtml#Fig14)).


    ![9781430248750_Fig03-14.jpg](images/9781430248750_Fig03-14.jpg)


    [Figure 3-14](#9781430248750_Ch03.xhtml#_Fig14). Importing scripts from Standard
    Assets


    From this list, selecting Scripts will present a window displaying all the scripts
    in the Scripts package ([Figure 3-15](#9781430248750_Ch03.xhtml#Fig15)). The scripts
    ending in the `.js` extension are written in JavaScript and the ones ending in
    the `.cs` extension are written in C#. You can import just the *MouseOrbit* script
    or all of the scripts. It’s easy enough to delete unwanted assets later.


    ![9781430248750_Fig03-15.jpg](images/9781430248750_Fig03-15.jpg)


    [Figure 3-15](#9781430248750_Ch03.xhtml#_Fig15). The available Standard Assets
    scripts


    Now the scripts and their containing folders are displayed in the Project View
    ([Figure 3-16](#9781430248750_Ch03.xhtml#Fig16)). The Project View doesn’t list
    the `.js` extension of the file names, but you can see from the icons that they
    are JavaScripts, and selecting a script will display the full name on the line
    at the bottom of the Project View.


    ![9781430248750_Fig03-16.jpg](images/9781430248750_Fig03-16.jpg)


    [Figure 3-16](#9781430248750_Ch03.xhtml#_Fig16). Standard Assets scripts in the
    Project View


    If you select the *MouseOrbit* script in the Project View, the code in that script
    shows up in the Inspector View ([Figure 3-17](#9781430248750_Ch03.xhtml#Fig17)).


    ![9781430248750_Fig03-17.jpg](images/9781430248750_Fig03-17.jpg)


    [Figure 3-17](#9781430248750_Ch03.xhtml#_Fig17). The Inspector View of the MouseOrbit
    script


    ## Attach the Script


    Drag the *MouseOrbit* script onto the Main Camera GameObject in the Hierarchy
    View. That attaches the script onto the GameObject, so now if you select the Main
    Camera, the *MouseOrbit* script will show up as one of its Components ([Figure
    3-18](#9781430248750_Ch03.xhtml#Fig18)).


    ![9781430248750_Fig03-18.jpg](images/9781430248750_Fig03-18.jpg)


    [Figure 3-18](#9781430248750_Ch03.xhtml#_Fig18). The MouseOrbit script attached
    to the Main Camera


    The first property of the `MouseOrbit` Component is a reference to the `MouseOrbit`
    script (notice how Unity pretty-prints the Component type as `Mouse Orbit`, but
    don’t be fooled, it’s `MouseOrbit`!). You could actually change the script referenced
    by that property by dragging another one from the Project View into that field
    or by clicking the little circle on its right, which would pop up a list of available
    scripts to choose from (which right now are all the Standard Assets scripts you
    just imported).


    The script itself determines the properties that follow. Notice that each of those
    properties in the MouseOrbit Component corresponds to a public variable declared
    at the top of the MouseOrbit script (each line beginning with `var` is a public
    variable, while those starting with `private var` are private).


    **Tip** Selecting the Debug option in the Inspector View menu (top right corner)
    will display private variables as properties, too, which can be useful for debugging.
    Try it now and you’ll see the private variables `x` and `y` show up. The Debug
    option also adds diagnostic properties of built-in Components.


    The first property defined by the script is Target, which is the GameObject the
    Camera will orbit around. It defaults to nothing (or in the code, `null`), so
    if you click Play, there is nothing for the Camera to orbit around. To rectify
    that, drag the Cube from the Hierarchy View into the Target field ([Figure 3-19](#9781430248750_Ch03.xhtml#Fig19)).


    ![9781430248750_Fig03-19.jpg](images/9781430248750_Fig03-19.jpg)


    [Figure 3-19](#9781430248750_Ch03.xhtml#_Fig19). Assigning the Target property
    of the MouseOrbit script


    Now when you click the Play button, the Camera orbits the Cube as you move the
    mouse. While in Play mode, you can adjust the other properties until you find
    values you like. The Distance property is the distance maintained between the
    Camera and the Target. Changing it to 3 brings the Camera close enough to the
    Cube so it fills up the Game View ([Figure 3-20](#9781430248750_Ch03.xhtml#Fig20)).
    The `XSpeed` and `YSpeed` properties control how much the Camera orbits in relation
    to the mouse movement, and the `YMin Limit` and `YMax Limit` properties set the
    angle limits of the Camera’s up and down rotation.


    ![9781430248750_Fig03-20.jpg](images/9781430248750_Fig03-20.jpg)


    [Figure 3-20](#9781430248750_Ch03.xhtml#_Fig20). Testing the MouseOrbit script


    When you exit Play mode, the properties revert to the values they had before you
    entered Play mode. At that point it’s necessary to enter the desired values again.
    If you end up with property values that you don’t like, you can always start over
    by clicking the icon on the top right of the Component and selecting Reset to
    revert back to the default property values.


    ## Add a Light


    You’ve probably been thinking the Cube looks awfully dark. Well, let’s add a Light!
    Under the Create Other submenu of the GameObject menu, several types of Lights
    are listed ([Figure 3-21](#9781430248750_Ch03.xhtml#Fig21)). Let’s choose Point
    Light.


    ![9781430248750_Fig03-21.jpg](images/9781430248750_Fig03-21.jpg)


    [Figure 3-21](#9781430248750_Ch03.xhtml#_Fig21). Creating a Point Light


    The Point Light now appears in the Hierarchy View and the Scene View ([Figure
    3-22](#9781430248750_Ch03.xhtml#Fig22)), and you can see that its distinguishing
    component is a Light Component, with its Type set to Point. A Point Light only
    lights objects within its radius. So you should adjust its position or radius
    so that the cube will be lit. Here you can set its position to `5,5,5` (remember,
    the cube is at `0,0,0`) and set the radius to 10.


    ![9781430248750_Fig03-22.jpg](images/9781430248750_Fig03-22.jpg)


    [Figure 3-22](#9781430248750_Ch03.xhtml#_Fig22). The Inspector View of a Point
    Light


    ## Anatomy of a Light


    In the same way that a GameObject becomes a Camera when it has a Camera Component
    attached, a GameObject behaves as a Light when it has a Light Component attached.
    Like the Camera Component, the Light Component has several properties, which we’ll
    go over here in top-down order as shown in the Inspector View.


    ### Type


    The Type of a Light specifies whether it is a Point Light, Directional Light,
    Spot Light, or Area Light. Since this GameObject was created as a Point Light,
    it’s Type was automatically set to Point. In contrast to a Directional Light,
    which acts as a light source infinitely far away (it’s sometimes called an *infinite
    light*), a Point Light has a position (and is thus often known as a positional
    light) and radiates in every direction. A Spot Light also has a position, but
    radiates in a certain direction, like a cone. An Area Light is only used in generating
    light maps (lighting that is precalculated and “baked” into textures).


    ### Range


    The Range property for Point Lights specifies the radius of the Light. Only objects
    within the radius are affected by the Light.


    ### Color


    The Color property is the color emitted by the Light. Clicking the little color
    rectangle brings up a color chooser to assign this property.


    ### Intensity


    The Light Intensity ranges from 0 to 1, where 0 is unlit and 1 is maximum brightness.


    ### Shadow Type


    The Shadow Type property of a Light specifies whether it the Light projects shadows,
    and if so, whether they are Hard Shadows or Soft Shadows. Shadows are only available
    in Unity Pro and Unity iOS Pro and even then only for Directional and Point Lights
    (in Unity iOS Pro, only Directional Lights).


    ### Cookie


    Directional and Spot Lights can project a cookie texture onto a surface, typically
    to simulate a shadow.


