    \ game in FuguPause.js\n\n```\nfunction UnPauseGame() {\n       Time.timeScale\
    \ = savedTimeScale;\n       AudioListener.pause = false;\n       currentPage =\
    \ Page.None;\n}\n```\n\n`UnPauseGame` restores `Time.timeScale` to the value you\
    \ saved in the variables `savedTimeScale` by PauseGame, and sets `AudioListener.pause`\
    \ to false to reenable audio.\n\nTo see if the game is paused, you can just check\
    \ if `Time.timeScale` is 0\\. [Listing 9-6](#9781430248750_Ch09.xhtml#list6) shows\
    \ a little convenience function for that. Notice that it’s a static function,\
    \ so any script can call it as `FuguPause.IsGamePaused()`.\n\n[Listing 9-6](#9781430248750_Ch09.xhtml#_list6).  Checking\
    \ if the Game is Paused in FuguPause.js\n\n```\nstatic function IsGamePaused()\
    \ {\n       return Time.timeScale==0;\n}\n```\n\nIf the game is to start paused,\
    \ the `Start` callback should have a call to `PauseGame` ([Listing 9-7](#9781430248750_Ch09.xhtml#list7)).\
    \ Adding a public `boolean` variable `startPaused` and checking it before calling\
    \ `PauseGame` makes the initial pause optional.\n\n[Listing 9-7](#9781430248750_Ch09.xhtml#_list7).  Pausing\
    \ the Game in the Start Callback of FuguPause.js\n\n```\nvar startPaused:boolean\
    \ = true; // bring up the menu at game start\n\nfunction Start() {\n       if\
    \ (startPaused) {\n               PauseGame();\n       }\n}\n```\n\nSince the\
    \ default value for `startPaused` is true, if you click Play, the game will immediately\
    \ pause, showing the ball suspended in the air. And then you’re stuck, since there’s\
    \ no menu. There’s also no way to unpause then pause again, so let’s have the\
    \ Escape key (the key labeled ESC on the top left of most keyboards), toggle the\
    \ pause state. Input handling is usually performed in the `Update` callback, and\
    \ this is no exception ([Listing 9-8](#9781430248750_Ch09.xhtml#list8)).\n\n[Listing\
    \ 9-8](#9781430248750_Ch09.xhtml#_list8).  Handling the Escape Key in the Update\
    \ Callback of FuguPause.js\n\n```\nfunction Update() {\n       if (Input.GetKeyDown(\"\
    escape\"))\t{\n               switch (currentPage) {\n                      case\
    \ Page.None: PauseGame(); break;   // if not paused, then pause\n                      case\
    \ Page.Main: UnPauseGame(); break; // if paused, then unpause\n                      default:\
    \ currentPage = Page.Main;     // any subpage goes back to main page\n              \
    \ }\n       }\n}\n```\n\nThe first line checks if the ESC key has been pressed.\
    \ If so, then it calls `PauseGame`, unless the pause menu is already up. The function\
    \ also treats ESC as a back key, switching from a subpage to the main page or\
    \ from the main page to an unpaused state.\n\nCheck Time.DeltaTime\n\nSetting\
    \ `Time.timeScale` to 0 halts the advance of `Time.time`, so `Time.deltaTime`\
    \ is always 0\\. This works great for `Update` functions that multiple values\
    \ by `Time.deltaTime`, but dividing by `Time.deltaTime` when time is frozen results\
    \ in a division-by-zero error. There is such a case in the `Update` callback of\
    \ the `FuguForce` script, so before proceeding with the pause menu, that has to\
    \ be taken care of ([Listing 9-9](#9781430248750_Ch09.xhtml#list9)).\n\n[Listing\
    \ 9-9](#9781430248750_Ch09.xhtml#_list9).  Avoiding Divide-by-Zero in FuguForce.js\n\
    \n```\nfunction Update() {\n       forcex = 0;\n       forcey = 0;\n       if\
    \ (Time.deltaTime > 0) {\n               CalcForce();\n       }\n}\n\nfunction\
    \ CalcForce() {\n       var deltaTime:float = Time.deltaTime;\n       forcex =\
    \ mousepowerx*Input.GetAxis(\"Mouse X\")/deltaTime;\n       forcey = mousepowery*Input.GetAxis(\"\
    Mouse Y\")/deltaTime;\n}\n```"
  trans: "好的，作为高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n图 9-4. 暂停菜单的状态图\n\n\
    该图显示，玩家可以从游戏进行状态（或等效地，菜单不可见状态）进入主暂停菜单，并从那里进入制作人员屏幕、选项菜单或退出游戏。选项菜单又可以显示音频、图形、系统或统计面板，每一个都可以被列为状态，但为了简单起见，我们目前只将每个顶级菜单屏幕视为一个状态。\n\
    \n除了“退出”（可将其视为退出状态）之外，所有状态都可以转换回最初转换到它们的状态，这就是为什么每个转换箭头都是双向绘制的。这意味着玩家可以从主菜单进入选项菜单，再返回主菜单，然后从那里可以返回到正常的游戏模式。但是，例如，不会有从选项菜单直接返回到游戏的快捷方式。\n\
    \n## 创建脚本\n\n让我们通过在“项目”视图的“脚本”文件夹中创建一个新的 JavaScript 并将其命名为`FuguPause`来开始暂停菜单的实现（图\
    \ 9-5）。\n\n![9781430248750_Fig09-05.jpg](img/9781430248750_Fig09-05.jpg)\n\n图\
    \ 9-5. 创建`FuguPause.js`脚本\n\n现在，要将脚本添加到场景中，请在“层级”视图中创建一个新的 GameObject，将其命名为 PauseMenu，并将`FuguPause`脚本附加到\
    \ PauseMenu 游戏对象上。\n\n## 跟踪当前菜单页面\n\n在`FuguBowl`脚本中使用的使用协程实现状态机的技术不适用于 UnityGUI，因为所有\
    \ UnityGUI 函数都必须在`OnGUI`回调中调用。但状态图作为实现的基础仍然有用。对于初学者，我们可以专注于表示不同菜单屏幕的状态。让我们将它们称为“页面”，以区别于更通用的术语“屏幕”。这些菜单状态可以通过字符串或整数来区分，但当你有几个相关但不同的值时，枚举类型就很合适了。因此，让我们为菜单页面状态定义一个名为`Page`的`enum`，并定义一个名为`currentPage`的变量来跟踪当前正在显示的页面（列表\
    \ 9-3）。\n\n列表 9-3.  菜单页面的枚举\n\n```\nenum Page {\n       None, Main, Options, Credits\n\
    }\n\nprivate var currentPage:Page;\n```\n\n根据状态图，`enum`列出了无菜单（游戏正在运行）、主菜单页面、选项页面和制作人员页面的状态。由于变量`currentPage`是`Page`类型，因此只能为`Page.None`、`Page.Main`、`Page.Options`或`Page.Credits`这四个值之一赋值给该变量。\n\
    \n## 暂停游戏\n\n制作暂停菜单涉及解决两个问题：制作菜单和暂停游戏。我们将从暂停游戏开始。静态变量`Time.timeScale`指定模拟游戏时间的流逝速度，默认为\
    \ 1。将`Time.timeScale`设置为 0 会有效地暂停游戏，暂停物理、动画以及任何依赖于`Time.time`进展的其他内容。因此，让我们创建一个将`Time.timeScale`设置为\
    \ 0 的`PauseGame`函数（列表 9-4）。\n\n列表 9-4.  在`FuguPause.js`中暂停游戏的函数\n\n```\nprivate\
    \ var savedTimeScale:float;       // 暂停前的 Time.timeScale\n\nfunction PauseGame()\
    \ {\n       savedTimeScale = Time.timeScale; // 保存正常的时间缩放值\n       Time.timeScale\
    \ = 0;              // 暂停时间\n       AudioListener.pause = true;      // 暂停音乐\n\
    \       currentPage = Page.Main;         // 从主菜单页面开始\n}\n```\n\n`PauseGame`首先将当前的`Time.timeScale`保存到变量`savedTimeScale`中，以便我们可以在游戏恢复时恢复`Time.timeScale`（我们不应该假设游戏暂停时`Time.timeScale`为\
    \ 1）。\n\n`PauseGame`还将`AudioListener.pause`设置为 true，这会暂停任何正在播放的声音（如果你打算在菜单中播放声音，则不应这样做）。\n\
    \n最后，将`currentPage`变量设置为`Page.Main`，表示应该显示主暂停屏幕。\n\n通过反转所有这些操作来恢复游戏（列表 9-5）。\n\
    \n列表 9-5.  在`FuguPause.js`中恢复游戏的函数\n\n```\nfunction UnPauseGame() {\n       Time.timeScale\
    \ = savedTimeScale;\n       AudioListener.pause = false;\n       currentPage =\
    \ Page.None;\n}\n```\n\n`UnPauseGame`将`Time.timeScale`恢复为由`PauseGame`保存在变量`savedTimeScale`中的值，并将`AudioListener.pause`设置为\
    \ false 以重新启用音频。\n\n要查看游戏是否暂停，您可以检查`Time.timeScale`是否为 0。列表 9-6 显示了一个用于此目的的便捷函数。注意它是一个静态函数，因此任何脚本都可以通过`FuguPause.IsGamePaused()`调用它。\n\
    \n列表 9-6.  在`FuguPause.js`中检查游戏是否暂停\n\n```\nstatic function IsGamePaused() {\n\
    \       return Time.timeScale==0;\n}\n```\n\n如果游戏要一开始就暂停，`Start`回调应该调用`PauseGame`（列表\
    \ 9-7）。添加一个公共的`boolean`变量`startPaused`并在调用`PauseGame`之前检查它，可以使初始暂停变为可选。\n\n列表\
    \ 9-7.  在`FuguPause.js`的`Start`回调中暂停游戏\n\n```\nvar startPaused:boolean = true;\
    \ // 游戏开始时弹出菜单\n\nfunction Start() {\n       if (startPaused) {\n            \
    \   PauseGame();\n       }\n}\n```\n\n由于`startPaused`的默认值是 true，如果你点击“播放”，游戏会立即暂停，显示球悬浮在空中。然后你会卡住，因为没有菜单。也没有办法取消暂停然后再暂停，所以让我们让\
    \ Escape 键（大多数键盘左上角标有 ESC 的键）来切换暂停状态。输入处理通常在`Update`回调中执行，这里也不例外（列表 9-8）。\n\n\
    列表 9-8.  在`FuguPause.js`的`Update`回调中处理 Escape 键\n\n```\nfunction Update() {\n\
    \       if (Input.GetKeyDown(\"escape\"))\t{\n               switch (currentPage)\
    \ {\n                      case Page.None: PauseGame(); break;   // 如果未暂停，则暂停\n\
    \                      case Page.Main: UnPauseGame(); break; // 如果已暂停，则取消暂停\n\
    \                      default: currentPage = Page.Main;     // 任何子页面都返回到主页面\n\
    \               }\n       }\n}\n```\n\n第一行检查 ESC 键是否被按下。如果被按下，则调用`PauseGame`，除非暂停菜单已经显示。该函数还将\
    \ ESC 视为返回键，从子页面切换到主页面，或从主页面切换到未暂停状态。\n\n## 检查`Time.DeltaTime`\n\n将`Time.timeScale`设置为\
    \ 0 会停止`Time.time`的推进，因此`Time.deltaTime`始终为 0。这对于将多个值乘以`Time.deltaTime`的`Update`函数来说效果很好，但在时间冻结时除以`Time.deltaTime`会导致除以零的错误。`FuguForce`脚本的`Update`回调中就有这样一种情况，因此在继续处理暂停菜单之前，必须解决这个问题（列表\
    \ 9-9）。\n\n列表 9-9.  在`FuguForce.js`中避免除以零\n\n```\nfunction Update() {\n      \
    \ forcex = 0;\n       forcey = 0;\n       if (Time.deltaTime > 0) {\n        \
    \       CalcForce();\n       }\n}\n\nfunction CalcForce() {\n       var deltaTime:float\
    \ = Time.deltaTime;\n       forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/deltaTime;\n\
    \       forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/deltaTime;\n}\n```\n"
- fmt: "\n\nInstead of immediately dividing the rolling force values by `Time.deltaTime`,\
    \ now the `Update` callback checks that `Time.deltaTime` is not 0 before proceeding\
    \ with the force calculation, now moved into a `CalcForce` function. `Update`\
    \ always initializes the force values to 0 to ensure that no lingering force is\
    \ applied to the bowling ball while the game is paused.\n\n## Display the Menu\n\
    \nThe actual display of the pause menu, as with the scoreboard in the previous\
    \ section, must take place in an `OnGUI` callback function. Specifically, `OnGUI`\
    \ needs to check if the game is paused, and if so, then display the current menu\
    \ page ([Listing 9-10](#9781430248750_Ch09.xhtml#list10)).\n\n[Listing 9-10](#9781430248750_Ch09.xhtml#_list10).\
    \ The `OnGUI` Callback in `FuguPause.js`\n\n```\nfunction OnGUI () {\n       if\
    \ (IsGamePaused()) {\n               switch (currentPage) {\n                \
    \      case Page.Main: ShowPauseMenu(); break;\n                      case Page.Options:\
    \ ShowOptions(); break;\n                      case Page.Credits: ShowCredits();\
    \ break;\n               }\n       }\n}\n\nfunction ShowPauseMenu() { Debug.Log(\"\
    Main Pause\"); }\nfunction ShowOptions() { Debug.Log(\"Options\"); }\nfunction\
    \ ShowCredits() { Debug.Log(\"Credits\"); }\n```\n\nFor now, there are placeholders\
    \ for each of the page display functions, keeping the script in a runnable state\
    \ (i.e., without compilation errors) as you fill out each of the display functions\
    \ one at a time. It’s a good idea to place `Debug.Log` statements inside these\
    \ stub functions to verify they’re called when expected. For example, if you click\
    \ Play, you should see “`Main Pause`” appear in the Console View every time you\
    \ pause the game.\n\n## Automatic Layout\n\nFor the menu buttons that are stacked\
    \ vertically and centered in the screen, you can take advantage of the `GUILayout`\
    \ functions to avoid figuring out each `Rect` that would otherwise have to be\
    \ passed for each `GUI.Button`. Between calls to `GUILayout.BeginArea` and `GUILayout.EndArea`\
    \ you can make calls to create GUI Controls without passing a `Rect` to each one,\
    \ using the `GUILayout` versions of the GUI functions. The Controls will be automatically\
    \ placed and sized within the `Rect` that was passed to `GUILayout.BeginArea`.\
    \ Since all of the pause menu pages will be displayed the same way, let’s make\
    \ some convenience functions that wrap around the `GUILayout` functions ([Listing\
    \ 9-11](#9781430248750_Ch09.xhtml#list11)).\n\n[Listing 9-11](#9781430248750_Ch09.xhtml#_list11).\
    \ `GUILayout` Functions for Positioning Pages in `FuguPause.js`\n\n```\nvar menutop:int=25;\
    \ // y-coordinate for top of the menu\n\nfunction BeginPage(width:int,height:int)\
    \ {\n        GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));\n\
    }\n\nfunction EndPage() {\n       if (currentPage != Page.Main && GUILayout.Button(\"\
    Back\")) {\n               currentPage = Page.Main;\n       }\n       GUILayout.EndArea();\n\
    }\n```\n\nThe `BeginPage` function calls `GUILayout.BeginArea`, and the area is\
    \ specified by the width and height passed as arguments, horizontally centered\
    \ on the screen and with its top edge distance from the top of the screen specified\
    \ by the public variable `menutop`.\n\nThe `EndPage` function calls `GUILayout.EndArea`,\
    \ but before that, if the current page is not the main page, displays a Back button.\
    \ If that button is clicked, then the current page is set to the main page.\n\n\
    ## The Main Page\n\nNow we have all of the pieces to get a menu on the screen.\
    \ [Listing 9-12](#9781430248750_Ch09.xhtml#list12) shows a fleshed-out `ShowPauseMenu`\
    \ function.\n\n[Listing 9-12](#9781430248750_Ch09.xhtml#_list12). Function that\
    \ Displays the Pause Menu in `FuguPause.js`\n\n```\nfunction ShowPauseMenu() {\n\
    \       BeginPage(150,300);\n       if (GUILayout.Button (\"Play\")) {\n     \
    \          UnPauseGame();\n       }\n       if (GUILayout.Button (\"Options\"\
    )) {\n               currentPage = Page.Options;\n       }\n       if (GUILayout.Button\
    \ (\"Credits\")) {\n               currentPage = Page.Credits;\n       }\n#if\
    \ !UNITY_WEBPLAYER && !UNITY_EDITOR\n       if (GUILayout.Button (\"Quit\")) {\n\
    \               Application.Quit();\n       }\n#endif\n       EndPage();\n}\n\
    ```\n\nAll of the GUI code between `BeginPage` and `EndPage` effectively takes\
    \ place between `GUILayout.BeginArea` and `GUILayout.EndArea`, so you can use\
    \ the `GUILayout` versions of the GUI calls to create elements without passing\
    \ `Rects`. For example, instead of calling `GUI.Button` you could call `GUILayout.Button`.\
    \ Aside from the missing `Rect` parameter, the functions look otherwise identical.\n\
    \n`GUILayout.Button` is different from `GUILayout.Label` in that it returns true\
    \ or false depending on whether the button has been pressed. So each call to `GUILayout.Button`\
    \ takes place inside an `if` test and executes the appropriate statement if the\
    \ button has indeed been pressed.\n\nWhen you click Play, you’ll now see the main\
    \ menu, and the Play button in the menu should unpause the screen ([Figure 9-6](#9781430248750_Ch09.xhtml#Fig6)).\
    \ `Application.Quit` has no functionality in a Unity web player or in the Editor,\
    \ so that piece of code is surrounded by a test of the corresponding preprocessor\
    \ definitions `UNITY_WEBPLAYER` and `UNITY_EDITOR` to see if the build target\
    \ is a web player or if you’re running in the Editor. These definitions are evaluated\
    \ just before compilation takes place (hence the term “preprocessor”), so if `UNITY_WEBPLAYER`\
    \ is false and `UNITY_EDITOR` is false, the enclosed code is compiled. Otherwise,\
    \ it’s as if the code were never there.\n\n![9781430248750_Fig09-06.jpg](images/9781430248750_Fig09-06.jpg)\n\
    \n[Figure 9-6](#9781430248750_Ch09.xhtml#_Fig6). The main menu\n\nThe Credits\
    \ and Options buttons won’t do anything yet, because the `ShowCredits` and `ShowOptions`\
    \ functions are still empty shells. The Credits page is simpler, so let’s start\
    \ with that one.\n\n## The Credits Page\n\nMultiple credit entries can be stored\
    \ in a `String` array. A variable `credits` is defined for that, along with a\
    \ `ShowCredits` function to display the credits, in [Listing 9-13](#9781430248750_Ch09.xhtml#list13).\n\
    \n[Listing 9-13](#9781430248750_Ch09.xhtml#_list13). Function to Display the Credits\
    \ Page in `FuguPause.js`\n\n```\nvar credits:String[]=[\n       \"A Fugu Games\
    \ Production\",\n       \"Copyright (c) 2012 Technicat, LLC. All Rights Reserved.\"\
    ,\n       \"More information athttp://fugugames.com/\"] ;\n\nfunction ShowCredits()\
    \ {\n       BeginPage(300,300);\n       for (var credit in credits) {\n      \
    \         GUILayout.Label(credit);\n       }\n       EndPage();\n}\n```\n\nBecause\
    \ the variable `credits` is public, you can edit each of the credit entries and\
    \ add to the array or remove from it in the Inspector View.\n\nThe `ShowCredits`\
    \ function loops through the array of credits and displays each one in a UnityGUI\
    \ label ([Figure 9-7](#9781430248750_Ch09.xhtml#Fig7)). Notice that there is a\
    \ simple way to loop through the array using `in` instead of the usual habit of\
    \ iterating through a sequence of array indices. In this particular case, you\
    \ don’t need an index for anything else, so let’s go with the simpler method.\n\
    \n![9781430248750_Fig09-07.jpg](images/9781430248750_Fig09-07.jpg)\n\n[Figure\
    \ 9-7](#9781430248750_Ch09.xhtml#_Fig7). The Credits page\n\nLike the main menu,\
    \ you start with a call to `BeginPage` and end with `EndPage` so you’re operating\
    \ inside a `GUILayout` area (this time 300 × 300) and can use `GUILayout.Label`\
    \ instead of `GUI.Label`. `EndPage` ensures that there automatically is a Back\
    \ button. And remember, the `Update` callback also treats the ESC key as equivalent\
    \ to clicking the Back button.\n\n## The Options Page"
  raw: 'Instead of immediately dividing the rolling force values by `Time.deltaTime`,
    now the `Update` callback checks that `Time.deltaTime` is not 0 before proceeding
    with the force calculation, now moved into a `CalcForce` function. `Update` always
    initializes the force values to 0 to ensure that no lingering force is applied
    to the bowling ball while the game is paused.


    Display the Menu


    The actual display of the pause menu, as with the scoreboard in the previous section,
    must take place in an `OnGUI` callback function. Specifically, `OnGUI` needs to
    check if the game is paused, and if so, then display the current menu page ([Listing
    9-10](#9781430248750_Ch09.xhtml#list10)).


    [Listing 9-10](#9781430248750_Ch09.xhtml#_list10).  The OnGUI Callback in FuguPause.js


    ```

    function OnGUI () {

           if (IsGamePaused()) {

                   switch (currentPage) {

                          case Page.Main: ShowPauseMenu(); break;

                          case Page.Options: ShowOptions(); break;

                          case Page.Credits: ShowCredits(); break;

                   }

           }

    }


    function ShowPauseMenu() { Debug.Log("Main Pause"); }

    function ShowOptions() { Debug.Log("Options"); }

    function ShowCredits() { Debug.Log("Credits"); }

    ```


    For now, there are placeholders for each of the page display functions, keeping
    the script in a runnable state (i.e., without compilation errors) as you fill
    out each of the display functions one at a time. It’s a good idea to place `Debug.Log`
    statements inside these stub functions to verify they’re called when expected.
    For example, if you click Play, you should see “`Main Pause`” appear in the Console
    View every time you pause the game.


    Automatic Layout


    For the menu buttons that are stacked vertically and centered in the screen, you
    can take advantage of the `GUILayout` functions to avoid figuring out each Rect
    that would otherwise have to be passed for each `GUI.Button`. Between calls to
    `GUILayout.BeginArea` and `GUILayout.EndArea` you can make calls to create GUI
    Controls without passing a Rect to each one, using the `GUILayout` versions of
    the GUI functions. The Controls will be automatically placed and sized within
    the `Rect` that was passed to `GUILayout.BeginArea`. Since all of the pause menu
    pages will be displayed the same way, let’s make some convenience functions that
    wrap around the `GUILayout` functions ([Listing 9-11](#9781430248750_Ch09.xhtml#list11)).


    [Listing 9-11](#9781430248750_Ch09.xhtml#_list11).  GUILayout Functions for Positioning
    Pages in FuguPause.js


    ```

    var menutop:int=25; // y-coordinate for top of the menu


    function BeginPage(width:int,height:int) {

            GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));

    }


    function EndPage() {

           if (currentPage != Page.Main && GUILayout.Button("Back")) {

                   currentPage = Page.Main;

           }

           GUILayout.EndArea();

    }

    ```


    The `BeginPage` function calls `GUILayout.BeginArea`, and the area is specified
    by the width and height passed as arguments, horizontally centered on the screen
    and with its top edge distance from the top of the screen specified by the public
    variable `menutop`.


    The `EndPage` function calls `GUILayout.EndArea`, but before that, if the current
    page is not the main page, displays a Back button. If that button is clicked,
    then the current page is set to the main page.


    The Main Page


    Now we have all of the pieces to get a menu on the screen. [Listing 9-12](#9781430248750_Ch09.xhtml#list12)
    shows a fleshed-out `ShowPauseMenu` function.


    [Listing 9-12](#9781430248750_Ch09.xhtml#_list12).  Function that Displays the
    Pause Menu in FuguPause.js


    ```

    function ShowPauseMenu() {

           BeginPage(150,300);

           if (GUILayout.Button ("Play")) {

                   UnPauseGame();

           }

           if (GUILayout.Button ("Options")) {

                   currentPage = Page.Options;

           }

           if (GUILayout.Button ("Credits")) {

                   currentPage = Page.Credits;

           }

    #if !UNITY_WEBPLAYER && !UNITY_EDITOR

           if (GUILayout.Button ("Quit")) {

                   Application.Quit();

           }

    #endif

           EndPage();

    }

    ```


    All of the GUI code between `BeginPage` and `EndPage` effectively takes place
    between `GUILayout.BeginArea` and `GUILayout.EndArea`, so you can use the `GUILayout`
    versions of the GUI calls to create elements without passing Rects. For example,
    instead of calling `GUI.Button` you could call `GUILayout.Button`. Aside from
    the missing `Rect` parameter, the functions look otherwise identical.


    `GUILayout.Button` is different from `GUILayout.Label` in that it returns true
    or false depending on whether the button has been pressed. So each call to `GUILayout.Button`
    takes place inside an `if` test and executes the appropriate statement if the
    button has indeed been pressed.


    When you click Play, you’ll now see the main menu, and the Play button in the
    menu should unpause the screen ([Figure 9-6](#9781430248750_Ch09.xhtml#Fig6)).
    `Application.Quit` has no functionality in a Unity web player or in the Editor,
    so that piece of code is surrounded by a test of the corresponding preprocessor
    definitions `UNITY_WEBPLAYER` and `UNITY_EDITOR` to see if the build target is
    a web player or if you’re running in the Editor. These definitions are evaluated
    just before compilation takes place  (hence the term “preprocessor”), so if `UNITY_WEBPLAYER`
    is false and `UNITY_EDITOR` is false, the enclosed code is compiled. Otherwise,
    it’s as if the code were never there.


    ![9781430248750_Fig09-06.jpg](images/9781430248750_Fig09-06.jpg)


    [Figure 9-6](#9781430248750_Ch09.xhtml#_Fig6). The main menu


    The Credits and Options buttons won’t do anything yet, because the `ShowCredits`
    and `ShowOptions` functions are still empty shells. The Credits page is simpler,
    so let’s start with that one.


    The Credits Page


    Multiple credit entries can be stored in a `String` array. A variable `credits`
    is defined for that, along with a `ShowCredits` function to display the credits,
    in [Listing 9-13](#9781430248750_Ch09.xhtml#list13).


    [Listing 9-13](#9781430248750_Ch09.xhtml#_list13).  Function to Display the Credits
    Page in FuguPause.js


    ```

    var credits:String[]=[

           "A Fugu Games Production",

           "Copyright (c) 2012 Technicat, LLC. All Rights Reserved.",

           "More information athttp://fugugames.com/"] ;


    function ShowCredits() {

           BeginPage(300,300);

           for (var credit in credits) {

                   GUILayout.Label(credit);

           }

           EndPage();

    }

    ```


    Because the variable `credits` is public, you can edit each of the credit entries
    and add to the array or remove from it in the Inspector View.


    The `ShowCredits` function loops through the array of credits and displays each
    one in a UnityGUI label ([Figure 9-7](#9781430248750_Ch09.xhtml#Fig7)). Notice
    that there is a simple way to loop through the array using `in` instead of the
    usual habit of iterating through a sequence of array indices. In this particular
    case, you don’t need an index for anything else, so let’s go with the simpler
    method.


    ![9781430248750_Fig09-07.jpg](images/9781430248750_Fig09-07.jpg)


    [Figure 9-7](#9781430248750_Ch09.xhtml#_Fig7). The Credits page


    Like the main menu, you start with a call to `BeginPage` and end with `EndPage`
    so you’re operating inside a `GUILayout` area (this time 300 `×` 300) and can
    use `GUILayout.Label` instead of `GUI.Label`. `EndPage` ensures that there automatically
    is a Back button. And remember, the `Update` callback also treats the ESC key
    as equivalent to clicking the Back button.


    The Options Page'
  trans: "\n\n不再直接将滚动力的值除以 `Time.deltaTime`，现在的 `Update` 回调会在进行力计算之前先检查 `Time.deltaTime`\
    \ 是否不为 0，而力计算现已被移入 `CalcForce` 函数。`Update` 函数始终将力的值初始化为 0，以确保游戏暂停时不会对保龄球施加任何残留的力。\n\
    \n## 显示菜单\n\n与上一节中的记分板类似，暂停菜单的实际显示必须在 `OnGUI` 回调函数中进行。具体来说，`OnGUI` 需要检查游戏是否暂停，如果暂停，则显示当前菜单页面（代码清单\
    \ 9-10）。\n\n代码清单 9-10。`FuguPause.js` 中的 `OnGUI` 回调\n\n```\nfunction OnGUI () {\n\
    \       if (IsGamePaused()) {\n               switch (currentPage) {\n       \
    \               case Page.Main: ShowPauseMenu(); break;\n                    \
    \  case Page.Options: ShowOptions(); break;\n                      case Page.Credits:\
    \ ShowCredits(); break;\n               }\n       }\n}\n\nfunction ShowPauseMenu()\
    \ { Debug.Log(\"Main Pause\"); }\nfunction ShowOptions() { Debug.Log(\"Options\"\
    ); }\nfunction ShowCredits() { Debug.Log(\"Credits\"); }\n```\n\n目前，每个页面显示函数都只是占位符，这使得脚本在你逐个填充每个显示函数时，始终处于可运行状态（即没有编译错误）。一个很好的做法是在这些存根函数内放置\
    \ `Debug.Log` 语句，以验证它们是否在预期的时间被调用。例如，如果你点击播放，每次暂停游戏时，都应该在控制台视图中看到“`Main Pause`”出现。\n\
    \n## 自动布局\n\n对于垂直堆叠并居中显示在屏幕上的菜单按钮，你可以利用 `GUILayout` 函数，从而避免计算每个本应传递给 `GUI.Button`\
    \ 的 `Rect`。在 `GUILayout.BeginArea` 和 `GUILayout.EndArea` 的调用之间，你可以使用 GUI 函数的 `GUILayout`\
    \ 版本来创建 GUI 控件，而无需为每个控件传递 `Rect`。这些控件将自动在传递给 `GUILayout.BeginArea` 的 `Rect` 内进行放置和调整大小。由于所有暂停菜单页面都会以相同方式显示，让我们创建一些包装\
    \ `GUILayout` 函数的便捷函数（代码清单 9-11）。\n\n代码清单 9-11。`FuguPause.js` 中用于页面定位的 `GUILayout`\
    \ 函数\n\n```\nvar menutop:int=25; // 菜单顶部 y 坐标\n\nfunction BeginPage(width:int,height:int)\
    \ {\n        GUILayout.BeginArea(Rect((Screen.width-width)/2,menutop,width,height));\n\
    }\n\nfunction EndPage() {\n       if (currentPage != Page.Main && GUILayout.Button(\"\
    返回\")) {\n               currentPage = Page.Main;\n       }\n       GUILayout.EndArea();\n\
    }\n```\n\n`BeginPage` 函数调用 `GUILayout.BeginArea`，该区域由作为参数传入的宽度和高度指定，在屏幕上水平居中，其顶部边缘与屏幕顶部的距离由公共变量\
    \ `menutop` 指定。\n\n`EndPage` 函数调用 `GUILayout.EndArea`，但在此之前，如果当前页面不是主页面，则显示一个返回按钮。如果该按钮被点击，则当前页面被设置为主页面。\n\
    \n## 主页面\n\n现在我们已经拥有了在屏幕上显示菜单所需的所有部分。代码清单 9-12 展示了一个功能完备的 `ShowPauseMenu` 函数。\n\
    \n代码清单 9-12。`FuguPause.js` 中显示暂停菜单的函数\n\n```\nfunction ShowPauseMenu() {\n   \
    \    BeginPage(150,300);\n       if (GUILayout.Button (\"继续\")) {\n          \
    \     UnPauseGame();\n       }\n       if (GUILayout.Button (\"选项\")) {\n    \
    \           currentPage = Page.Options;\n       }\n       if (GUILayout.Button\
    \ (\"制作人员\")) {\n               currentPage = Page.Credits;\n       }\n#if !UNITY_WEBPLAYER\
    \ && !UNITY_EDITOR\n       if (GUILayout.Button (\"退出\")) {\n               Application.Quit();\n\
    \       }\n#endif\n       EndPage();\n}\n```\n\n位于 `BeginPage` 和 `EndPage` 之间的所有\
    \ GUI 代码实际上都是在 `GUILayout.BeginArea` 和 `GUILayout.EndArea` 之间执行的，因此你可以使用 GUI 调用的\
    \ `GUILayout` 版本来创建元素，而无需传递 `Rect`。例如，你可以调用 `GUILayout.Button` 而不是 `GUI.Button`。除了缺少\
    \ `Rect` 参数外，这些函数在其他方面看起来完全相同。\n\n`GUILayout.Button` 与 `GUILayout.Label` 的不同之处在于，它会根据按钮是否被按下来返回\
    \ true 或 false。因此，每次对 `GUILayout.Button` 的调用都位于一个 `if` 测试内部，如果按钮确实被按下，则执行相应的语句。\n\
    \n当你点击播放时，现在会看到主菜单，并且菜单中的“继续”按钮应该解除游戏的暂停状态（图 9-6）。`Application.Quit` 在 Unity 网页播放器或编辑器中没有任何功能，因此该代码段被包围在对相应预处理器定义\
    \ `UNITY_WEBPLAYER` 和 `UNITY_EDITOR` 的测试中，以查看构建目标是网页播放器还是你正在编辑器中运行。这些定义在编译之前就会被评估（因此称为“预处理器”），所以如果\
    \ `UNITY_WEBPLAYER` 为 false 且 `UNITY_EDITOR` 也为 false，则包含的代码会被编译。否则，就好像这段代码从未存在过一样。\n\
    \n![9781430248750_Fig09-06.jpg](img/9781430248750_Fig09-06.jpg)\n\n图 9-6。主菜单\n\
    \n“制作人员”和“选项”按钮暂时还不会有任何反应，因为 `ShowCredits` 和 `ShowOptions` 函数仍然是空壳。制作人员页面更简单，所以我们先从这个开始。\n\
    \n## 制作人员页面\n\n多条制作人员条目可以存储在一个 `String` 数组中。为此定义了一个变量 `credits`，以及一个用于显示制作人员信息的\
    \ `ShowCredits` 函数，如代码清单 9-13 所示。\n\n代码清单 9-13。`FuguPause.js` 中显示制作人员页面的函数\n\n\
    ```\nvar credits:String[]=[\n       \"河豚游戏工作室出品\",\n       \"版权所有 (c) 2012 Technicat,\
    \ LLC。保留所有权利。\",\n       \"更多信息请访问 http://fugugames.com/\"] ;\n\nfunction ShowCredits()\
    \ {\n       BeginPage(300,300);\n       for (var credit in credits) {\n      \
    \         GUILayout.Label(credit);\n       }\n       EndPage();\n}\n```\n\n由于变量\
    \ `credits` 是公共的，你可以在检视面板中编辑每一条制作人员信息，并可以向数组中添加或从中移除条目。\n\n`ShowCredits` 函数遍历制作人员数组，并在\
    \ UnityGUI 标签中显示每一条（图 9-7）。请注意，有一种简单的方法可以使用 `in` 来遍历数组，而不是通常的遍历一系列数组索引的习惯用法。在这种特殊情况下，你不需要为其他任何用途使用索引，所以让我们采用更简单的方法。\n\
    \n![9781430248750_Fig09-07.jpg](img/9781430248750_Fig09-07.jpg)\n\n图 9-7。制作人员页面\n\
    \n和主菜单一样，你以调用 `BeginPage` 开始，以 `EndPage` 结束，因此你在一个 `GUILayout` 区域（这次是 300 × 300）内操作，并且可以使用\
    \ `GUILayout.Label` 代替 `GUI.Label`。`EndPage` 确保自动有一个返回按钮。并且请记住，`Update` 回调也会将\
    \ ESC 键视为点击返回按钮。\n\n## 选项页面\n"
- fmt: "# Options Page\n\nThe `Options` page is quite a bit more involved than the\
    \ `Credits` page, as it features a toolbar implemented with four tabs: `Audio`,\
    \ `Graphics`, `Stats`, and `System`. [Listing 9-14](#9781430248750_Ch09.xhtml#list14)\
    \ shows the fleshed-out `ShowToolbar` function, with some supporting variables\
    \ and functions.\n\n[Listing 9-14](#9781430248750_Ch09.xhtml#_list14). The Options\
    \ Page in `FuguPause.js`\n\n```\nprivate var toolbarIndex:int=0; // current toolbar\
    \ selection\nprivate var toolbarStrings: String[]= [\"Audio\",\"Graphics\",\"\
    System\"]; // tabs\n\nfunction ShowOptions() {\n       BeginPage(300,300);\n \
    \      toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);\n    \
    \   switch (toolbarInt) {\n               case 0: ShowAudio(); break;\n      \
    \         case 1: ShowGraphics(); break;\n               case 2: ShowSystem();\
    \ break;\n       }\n       EndPage();\n}\n\nfunction ShowAudio() { Debug.Log(\"\
    ShowAudio\"); }\nfunction ShowGraphics() { Debug.Log(\"ShowGraphics\"); }\nfunction\
    \ ShowSystem() { Debug.Log(\"ShowSystem\"); }\n```\n\nAgain, everything in the\
    \ `ShowOptions` function is enclosed between calls to the `BeginPage` and `EndPage`\
    \ functions. The first line calls `GUILayout.Toolbar` to create a toolbar—a row\
    \ of buttons that acts as a tab or radio button—from a `String` array, where each\
    \ `String` is the label of the button. The function also takes an integer that\
    \ corresponds to a position in that array of strings. That is the button to make\
    \ currently active on the toolbar. But if you just had\n\n```\nGUILayout.Toolbar\
    \ (toolbarIndex, toolbarStrings);\n```\n\nthen `toolbarIndex` would never change\
    \ from its initial value (`0`), and even if you click another button, the next\
    \ time this is called (in the next invocation of `OnGUI`), the active button would\
    \ be set back to that value.\n\nBut `GUILayoutToolbar` returns an integer that\
    \ represents the currently active button, so you feed that value back into the\
    \ variable that you passed in, `toolbarIndex`.\n\n```\ntoolbarIndex = GUILayout.Toolbar\
    \ (toolbarIndex, toolbarStrings);\n```\n\nThus, `toolbarIndex` is `0` initially,\
    \ but if you click `Graphics`, it’ll change to `1`, and if you click `Controls`\
    \ it’ll change to `2`, and so on. Then there is a `switch` statement that checks\
    \ `toolbarIndex` and calls the display function that matches the selected button.\
    \ As with the main menu, we start with stub functions and implement them one by\
    \ one. Go ahead and click around, and you should see the corresponding function\
    \ names show up in the Console View, because that’s all you’ve told it to do!\n\
    \n## The Audio Panel\n\nWhen the Audio tab is selected, it will display a slider\
    \ for volume control ([Figure 9-8](#9781430248750_Ch09.xhtml#Fig8)).\n\n![9781430248750_Fig09-08.jpg](images/9781430248750_Fig09-08.jpg)\n\
    \n[Figure 9-8](#9781430248750_Ch09.xhtml#_Fig8). The Audio panel in the pause\
    \ menu\n\nAdding that slider to the `ShowAudio` function is actually pretty easy,\
    \ just one line. Well, two lines, since a slider with no label is a bit too mysterious\
    \ ([Listing 9-15](#9781430248750_Ch09.xhtml#list15)).\n\n[Listing 9-15](#9781430248750_Ch09.xhtml#_list15).\
    \ The Audio Panel in `FuguPause.js`\n\n```\nfunction ShowAudio() {\n       GUILayout.Label(\"\
    Volume\");\n       AudioListener.volume = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);\n\
    }\n```\n\nThe first line calls `GUILayout.Label`, which should be familiar by\
    \ now. The second line calls `GUILayout.HorizontalSlider`, which takes as arguments\
    \ the minimum value represented by the slider, the maximum value, and a value\
    \ that represents the current setting.\n\nThe slider reflects the value of `AudioListener.volume`,\
    \ which is the master volume of all sounds in Unity. So `AudioListener.volume`\
    \ is passed as the current value of the slider, and because `AudioListener.volume`\
    \ ranges from `0` to `1`, those values are passed as the minimum and maximum,\
    \ respectively. And, in order to register the slider value, the return value of\
    \ `GUILayout.Slider` is assigned back to `AudioListener.volume`. Otherwise, the\
    \ value of `AudioListener.volume` will never change and the slider won’t budge."
  raw: 'The Options page is quite a bit more involved than the Credits page, as it
    features a toolbar implemented with four tabs: Audio, Graphics, Stats, and System.
    [Listing 9-14](#9781430248750_Ch09.xhtml#list14) shows the fleshed-out `ShowToolbar`
    function, with some supporting variables and functions.


    [Listing 9-14](#9781430248750_Ch09.xhtml#_list14).  The Options Page in FuguPause.js


    ```

    private var toolbarIndex:int=0; // current toolbar selection

    private var toolbarStrings: String[]= ["Audio","Graphics","System"]; // tabs


    function ShowOptions() {

           BeginPage(300,300);

           toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);

           switch (toolbarInt) {

                   case 0: ShowAudio(); break;

                   case 1: ShowGraphics(); break;

                   case 2: ShowSystem(); break;

           }

           EndPage();

    }


    function ShowAudio() { Debug.Log("ShowAudio"); }

    function ShowGraphics() { Debug.Log("ShowGraphics"); }

    function ShowSystem() { Debug.Log("ShowSystem"); }

    ```


    Again, everything in the `ShowOptions` function is enclosed between calls to the
    `BeginPage` and `EndPage` functions. The first line calls `GUILayout.Toolbar`
    to create a toolbar—a row of buttons that acts as a tab or radio button—from a
    `String` array, where each `String` is the label of the button. The function also
    takes an integer that corresponds to a position in that array of strings. That
    is the button to make currently active on the toolbar. But if you just had


    ```


    GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    then `toolbarIndex` would never change from its initial value (0), and even if
    you click another button, the next time this is called (in the next invocation
    of OnGUI), the active button would be set back to that value.


    But `GUILayoutToolbar` returns an integer that represents the currently active
    button, so you feed that value back into the variable that you passed in, `toolbarIndex`.


    ```


    toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);

    ```


    Thus, `toolbarIndex` is 0 initially, but if you click Graphics, it’ll change to
    1, and if you click Controls it’ll change to 2, and so on. Then there is a switch
    statement that checks `toolbarIndex` and calls the display function that matches
    the selected button. As with the main menu, we start with stub functions and implement
    them on by one. Go ahead and click around, and you should see the corresponding
    function names show up in the Console View, because that’s all you’ve told it
    to do!


    The Audio Panel


    When the Audio tab is selected, it will display a slider for volume control ([Figure
    9-8](#9781430248750_Ch09.xhtml#Fig8)).


    ![9781430248750_Fig09-08.jpg](images/9781430248750_Fig09-08.jpg)


    [Figure 9-8](#9781430248750_Ch09.xhtml#_Fig8). The Audio panel in the pause menu


    Adding that slider the `ShowAudio` function is actually pretty easy, just one
    line. Well, two lines, since a slider with no label is a bit too mysterious ([Listing
    9-15](#9781430248750_Ch09.xhtml#list15)).


    [Listing 9-15](#9781430248750_Ch09.xhtml#_list15).  The Audio Panel in FuguPause.js


    ```

    function ShowAudio() {

           GUILayout.Label("Volume");

           AudioListener.volume = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);

    }

    ```


    The first line calls `GUILayout.Label`, which should be familiar by now. The second
    line calls `GUILayout.HorizontalSlider`, which takes as arguments the minimum
    value represented by the slider, the maximum value, and a value that represents
    the current setting.


    The slider reflects the value of `AudioListener.volume`, which is the master volume
    of all sounds in Unity. So `AudioListener.volume` is passed as the current value
    of the slider, and because `AudioListener.volume` ranges from 0 to 1, pass those
    values are passed as the minimum and maximum, respectively. And, in order to register
    the slider value, the return value of `GUILayout.Slider` is assigned to back `AudioListener.volume`.
    Otherwise, the value of `AudioListener.volume` will never change and the slider
    won’t budge.'
  trans: "\n# 选项页面\n\n`选项`页面比`积分`页面要复杂得多，因为它包含一个通过四个选项卡实现的工具栏：`音频`、`图形`、`统计`和`系统`。代码清单\
    \ 9-14 展示了完善后的`ShowToolbar`函数及其相关变量和函数。\n\n代码清单 9-14. `FuguPause.js`中的选项页面\n\n\
    ```\nprivate var toolbarIndex:int=0; // 当前工具栏选择\nprivate var toolbarStrings: String[]=\
    \ [\"Audio\",\"Graphics\",\"System\"]; // 选项卡\n\nfunction ShowOptions() {\n  \
    \     BeginPage(300,300);\n       toolbarIndex = GUILayout.Toolbar (toolbarIndex,\
    \ toolbarStrings);\n       switch (toolbarInt) {\n               case 0: ShowAudio();\
    \ break;\n               case 1: ShowGraphics(); break;\n               case 2:\
    \ ShowSystem(); break;\n       }\n       EndPage();\n}\n\nfunction ShowAudio()\
    \ { Debug.Log(\"ShowAudio\"); }\nfunction ShowGraphics() { Debug.Log(\"ShowGraphics\"\
    ); }\nfunction ShowSystem() { Debug.Log(\"ShowSystem\"); }\n```\n\n再次强调，`ShowOptions`函数中的所有代码都包裹在`BeginPage`和`EndPage`函数调用之间。第一行调用`GUILayout.Toolbar`，通过一个`String`数组创建了一个工具栏——即一行按钮，充当选项卡或单选按钮——其中每个`String`都是按钮的标签。该函数还接收一个整数，对应字符串数组中的位置。该整数用于指定当前在工具栏上处于激活状态的按钮。但如果仅写：\n\
    \n```\nGUILayout.Toolbar (toolbarIndex, toolbarStrings);\n```\n\n那么`toolbarIndex`将永远不会改变其初始值（`0`），即使你点击了其他按钮，下次调用该函数时（在`OnGUI`的下一次调用中），激活的按钮仍会被重置为该初始值。\n\
    \n但`GUILayoutToolbar`会返回一个代表当前激活按钮的整数，因此你可以将该返回值赋回给传入的变量`toolbarIndex`。\n\n```\n\
    toolbarIndex = GUILayout.Toolbar (toolbarIndex, toolbarStrings);\n```\n\n因此，`toolbarIndex`初始为`0`，但如果你点击`Graphics`，它会变为`1`；如果点击`Controls`，它会变为`2`，以此类推。接着是一个`switch`语句，它检查`toolbarIndex`并调用与所选按钮对应的显示函数。与主菜单类似，我们从存根函数开始，然后逐个实现。你可以尝试点击各个按钮，应该能看到对应的函数名称显示在控制台视图中，因为目前你只编写了这些功能！\n\
    \n## 音频面板\n\n当选中音频选项卡时，它会显示一个用于音量控制的滑块（图 9-8）。\n\n![9781430248750_Fig09-08.jpg](img/9781430248750_Fig09-08.jpg)\n\
    \n图 9-8. 暂停菜单中的音频面板\n\n在`ShowAudio`函数中添加该滑块实际上非常简单，只需一行代码。嗯，严格来说是两行，因为不带标签的滑块会显得过于神秘（代码清单\
    \ 9-15）。\n\n代码清单 9-15. `FuguPause.js`中的音频面板\n\n```\nfunction ShowAudio() {\n \
    \      GUILayout.Label(\"音量\");\n       AudioListener.volume = GUILayout.HorizontalSlider(AudioListener.volume,0.0,1.0);\n\
    }\n```\n\n第一行调用了`GUILayout.Label`，现在你应该已经很熟悉了。第二行调用了`GUILayout.HorizontalSlider`，它接收滑块代表的最小值、最大值以及代表当前设置的值作为参数。\n\
    \n该滑块反映的是`AudioListener.volume`的值，而这个值掌管着 Unity 中所有声音的总音量。因此，`AudioListener.volume`被作为滑块的当前值传入；又因为`AudioListener.volume`的取值范围是`0`到`1`，所以这两个值分别被用作最小值和最大值。并且，为了记录滑块的值，`GUILayout.Slider`的返回值被重新赋给了`AudioListener.volume`。否则，`AudioListener.volume`的值将永远不会改变，滑块也就无法移动。\n"
- fmt: "# The Graphics Panel\n\nThe Graphics panel will display the some of the same\
    \ graphics quality information shown by the Quality Settings of the Unity Editor\
    \ ([Figure 9-9](#9781430248750_Ch09.xhtml#Fig9)).\n\n![9781430248750_Fig09-09.jpg](images/9781430248750_Fig09-09.jpg)\n\
    \n[Figure 9-9](#9781430248750_Ch09.xhtml#_Fig9). Graphics options in the pause\
    \ menu\n\nThe two buttons at the bottom of the panel increase and decrease the\
    \ Quality Settings level. This panel doesn’t require any new UnityGUI controls\
    \ to implement this panel, but it does access the `QualitySettings` class ([Listing\
    \ 9-16](#9781430248750_Ch09.xhtml#list16)).\n\n[Listing 9-16](#9781430248750_Ch09.xhtml#_list16).\
    \ Function that Displays the Quality Settings\n\n```\nfunction ShowGraphics()\
    \ {\n       GUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);\n\
    \       GUILayout.Label(\"Pixel Light Count: \"+QualitySettings.pixelLightCount);\n\
    \       GUILayout.Label(\"Shadow Cascades: \"+QualitySettings.shadowCascades);\n\
    \       GUILayout.Label(\"Shadow Distance: \"+QualitySettings.shadowDistance);\n\
    \       GUILayout.Label(\"Soft Vegetation: \"+QualitySettings.softVegetation);\n\
    \       GUILayout.BeginHorizontal();\n       if (GUILayout.Button(\"Decrease\"\
    )) {\n               QualitySettings.DecreaseLevel();\n       }\n       if (GUILayout.Button(\"\
    Increase\")) {\n               QualitySettings.IncreaseLevel();\n       }\n  \
    \     GUILayout.EndHorizontal();\n}\n```\n\nThe `ShowGraphics` function is fairly\
    \ straightforward. It retrieves the current Quality Settings level, represented\
    \ as an integer, by calling `QualitySettings.GetQualityLevel`, and then uses that\
    \ integer as an index to the `QualitySettings.names` array to retrieve the name\
    \ of that Quality Setting. That name and several Quality Settings properties are\
    \ displayed in labels, and two buttons are placed at the bottom: one calling `QualitySettings.DecreaseLevel`\
    \ and the other calling `QualitySettings.IncreaseLevel`.\n\nThe two buttons allow\
    \ you to increase and decrease the Quality Settings level, within the range of\
    \ existing levels, and not only will you see the displayed Quality Settings information\
    \ change, you might see the graphical quality of the scene change before your\
    \ eyes, too, since it’s still being rendered every frame, even with the game time\
    \ paused.\n\n# The System Panel\n\nThe System panel displays information about\
    \ the hardware platform ([Figure 9-10](#9781430248750_Ch09.xhtml#Fig10)).\n\n\
    ![9781430248750_Fig09-10.jpg](images/9781430248750_Fig09-10.jpg)\n\n[Figure 9-10](#9781430248750_Ch09.xhtml#_Fig10).\
    \ The System panel in the pause menu\n\nAs in the Graphics page, the information\
    \ is displayed with labels, but whereas the Graphics page accesses the `QualitySettings`\
    \ class, the System panel accesses the `SystemInfo` class ([Listing 9-17](#9781430248750_Ch09.xhtml#list17)).\n\
    \n[Listing 9-17](#9781430248750_Ch09.xhtml#_list17). The System Panel in `FuguPause.js`\n\
    \n```\nfunction ShowSystem() {\n       GUILayout.Label(\"Graphics: \"+SystemInfo.graphicsDeviceName+\"\
    \ \"+\n       SystemInfo.graphicsMemorySize+\"MB\\n\"+\n       SystemInfo.graphicsDeviceVersion+\"\
    \\n\"+\n       SystemInfo.graphicsDeviceVendor);\n       GUILayout.Label(\"Shadows:\
    \ \"+ Available(SystemInfo.supportsShadows));\n       GUILayout.Label(\"Image\
    \ Effects: \"+Available(SystemInfo.supportsImageEffects));\n       GUILayout.Label(\"\
    Render Textures: \"+Available(SystemInfo.supportsRenderTextures));\n}\n```\n\n\
    The `SystemInfo` class provides information about the graphics hardware and its\
    \ capabilities, including some identifying information such as the device name\
    \ and the name of the vendor, its graphics memory size, and whether the hardware\
    \ supports some of the more advanced features, such as dynamic shadows, rendering\
    \ to a texture, or image effects (which requires rendering to a texture).\n\n\
    # Customize the GUI Color\n\nYou may have noticed the white text in the pause\
    \ menu is often difficult to read. One solution is to change the static variable\
    \ `GUI.color`, which tints the entire GUI with a `color` value ([Listing 9-18](#9781430248750_Ch09.xhtml#list18)).\n\
    \n[Listing 9-18](#9781430248750_Ch09.xhtml#_list18). GUI Color Customization in\
    \ `FuguPause.js`\n\n```\nvar hudColor:Color = Color.white;\n\nfunction OnGUI ()\
    \ {\n       if (IsGamePaused()) {\n               GUI.color = hudColor;\n    \
    \           switch (currentPage) {\n                      case Page.Main: ShowPauseMenu();\
    \ break;\n                      case Page.Options: ShowOptions(); break;\n   \
    \                   case Page.Credits: ShowCredits(); break;\n               }\n\
    \       }\n}\n```\n\nWe add a public variable `hudColor` to the `FuguPause` script\
    \ so a `color` can be chosen in the Inspector view. All UnityGUI operations, including\
    \ setting variables like `GUI.Color`, must take place within an `OnGUI` callback,\
    \ so the assignment to `GUI.color` is placed inside the `OnGUI` callback before\
    \ any of the GUI Controls are created (but after `IsGamePaused` is called, since\
    \ there’s no reason to set `GUI.Color` if there’s no GUI rendering). Note that\
    \ you can set `GUI.color` multiple times within `OnGUI` to change the color before\
    \ rendering various parts of the GUI.\n\nNow you can select a color in the Inspector\
    \ View ([Figure 9-11](#9781430248750_Ch09.xhtml#Fig11)) and see the resulting\
    \ GUI tint ([Figure 9-12](#9781430248750_Ch09.xhtml#Fig12)).\n\n![9781430248750_Fig09-11.jpg](images/9781430248750_Fig09-11.jpg)\n\
    \n[Figure 9-11](#9781430248750_Ch09.xhtml#_Fig11). Color selection for the pause\
    \ menu\n\n![9781430248750_Fig09-12.jpg](images/9781430248750_Fig09-12.jpg)\n\n\
    [Figure 9-12](#9781430248750_Ch09.xhtml#_Fig12). The pause menu with a custom\
    \ color\n\n# Customize the Skin\n\nThe default UnityGUI skin is pretty neutral,\
    \ and it’s hard to read the text, as you can see with the pause menu from the\
    \ previous section. With the scoreboard, you could change the text color by adjusting\
    \ the style passed to `GUI.Label`, but if you have a lot of GUI elements, that\
    \ can be a hassle.\n\nThat’s where UnityGUI skins come in. A *Skins* is a collections\
    \ of styles assigned to the various GUI elements. Applying a skin is easy—just\
    \ declare a public variable of type `GUISkin` and assign that skin to the variable\
    \ `GUI.skin`, within the `OnGUI` callback, similar to assigning a `GUI.Color`\
    \ ([Listing 9-19](#9781430248750_Ch09.xhtml#list19)).\n\n[Listing 9-19](#9781430248750_Ch09.xhtml#_list19).\
    \ Adding a `GUISkin` to the Pause Menu\n\n```\nvar skin:GUISkin;\n\nfunction OnGUI\
    \ () {\n       if (IsGamePaused()) {\n               if (skin != null) {\n   \
    \                   GUI.skin = skin;\n               } else {\n              \
    \        GUI.color = hudColor;\n               }\n               switch (currentPage)\
    \ {\n                      case Page.Main: ShowPauseMenu(); break;\n         \
    \             case Page.Options: ShowOptions(); break;\n                     \
    \ case Page.Credits: ShowCredits(); break;\n               }\n       }\n}\n```\n\
    \nYou can test this skin support with a really cool-looking free UnityGUI skin\
    \ from the Asset Store called the Necromancer GUI ([Figure 9-13](#9781430248750_Ch09.xhtml#Fig13)).\n\
    \n![9781430248750_Fig09-13.jpg](images/9781430248750_Fig09-13.jpg)\n\n[Figure\
    \ 9-13](#9781430248750_Ch09.xhtml#_Fig13). The Necromancer GUI on the Asset Store\n\
    \nDownload and import the Necromancer GUI, then drag its skin file (named Necromancer\
    \ GUI) into the Skin property that’s now in the Inspector View ([Figure 9-14](#9781430248750_Ch09.xhtml#Fig14)).\n\
    \n![9781430248750_Fig09-14.jpg](images/9781430248750_Fig09-14.jpg)\n\n[Figure\
    \ 9-14](#9781430248750_Ch09.xhtml#_Fig14). The Necromancer GUI\n\nThen click Play,\
    \ and you have a much more ornate pause menu. [Figure 9-15](#9781430248750_Ch09.xhtml#Fig15)\
    \ shows how the pause menu Graphics panel looks with the Necromancer GUI. Look\
    \ at all the pretty buttons!\n\n![9781430248750_Fig09-15.jpg](images/9781430248750_Fig09-15.jpg)\n\
    \n[Figure 9-15](#9781430248750_Ch09.xhtml#_Fig15). The Necromancer GUI skin in\
    \ action\n\n# The Complete Script"
  raw: 'The Graphics Panel


    The Graphics panel will display the some of the same graphics quality information
    shown by the Quality Settings of the Unity Editor ([Figure 9-9](#9781430248750_Ch09.xhtml#Fig9)).


    ![9781430248750_Fig09-09.jpg](images/9781430248750_Fig09-09.jpg)


    [Figure 9-9](#9781430248750_Ch09.xhtml#_Fig9). Graphics options in the pause menu


    The two buttons at the bottom of the panel increase and decrease the Quality Settings
    level. This panel doesn’t require any new UnityGUI controls to implement this
    panel, but it does access the `QualitySettings` class ([Listing 9-16](#9781430248750_Ch09.xhtml#list16)).


    [Listing 9-16](#9781430248750_Ch09.xhtml#_list16).  Function that Displays the
    Quality Settings


    ```

    function ShowGraphics() {

           GUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);

           GUILayout.Label("Pixel Light Count: "+QualitySettings.pixelLightCount);

           GUILayout.Label("Shadow Cascades: "+QualitySettings.shadowCascades);

           GUILayout.Label("Shadow Distance: "+QualitySettings.shadowDistance);

           GUILayout.Label("Soft Vegetation: "+QualitySettings.softVegetation);

           GUILayout.BeginHorizontal();

           if (GUILayout.Button("Decrease")) {

                   QualitySettings.DecreaseLevel();

           }

           if (GUILayout.Button("Increase")) {

                   QualitySettings.IncreaseLevel();

           }

           GUILayout.EndHorizontal();

    }

    ```


    The `ShowGraphics` function is fairly straightforward. It retrieves the current
    Quality Settings level, represented as an integer, by calling `QualitySettings.GetQualityLevel`,
    and then uses that integer as an index to the `QualitySettings.names` array to
    retrieve the name of that Quality Setting. That name and several Quality Settings
    properties are displayed in labels, and two buttons are placed at the bottom:
    one calling `QualitySettings.DecreaseLevel` and the other calling `QualitySettings.IncreaseLevel`.


    The two buttons allow you to increase and decrease the Quality Settings level,
    within the range of existing levels, and not only will you see the displayed Quality
    Settings information change, you might see the graphical quality of the scene
    change before your eyes, too, since it’s still being rendered every frame, even
    with the game time paused.


    The System Panel


    The System panel displays information about the hardware platform ([Figure 9-10](#9781430248750_Ch09.xhtml#Fig10)).


    ![9781430248750_Fig09-10.jpg](images/9781430248750_Fig09-10.jpg)


    [Figure 9-10](#9781430248750_Ch09.xhtml#_Fig10). The System panel in the pause
    menu


    As in the Graphics page, the information is displayed with labels, but whereas
    the Graphics page accesses the `QualitySettings` class, the System panel accesses
    the `SystemInfo` class ([Listing 9-17](#9781430248750_Ch09.xhtml#list17)).


    [Listing 9-17](#9781430248750_Ch09.xhtml#_list17).  The System Panel in FuguPause.js


    ```

    function ShowSystem() {

           GUILayout.Label("Graphics: "+SystemInfo.graphicsDeviceName+" "+

           SystemInfo.graphicsMemorySize+"MB\n"+

           SystemInfo.graphicsDeviceVersion+"\n"+

           SystemInfo.graphicsDeviceVendor);

           GUILayout.Label("Shadows: "+ Available(SystemInfo.supportsShadows));

           GUILayout.Label("Image Effects: "+Available(SystemInfo.supportsImageEffects));

           GUILayout.Label("Render Textures: "+Available(SystemInfo.supportsRenderTextures));

    }

    ```


    The `SystemInfo` class provides information about the graphics hardware and its
    capabilities, including some identifying information such as the device name and
    the name of the vendor, its graphics memory size, and whether the hardware supports
    some of the more advanced features, such as dynamic shadows, rendering to a texture,
    or image effects (which requires rendering to a texture).


    Customize the GUI Color


    You may have noticed the white text in the pause menu is often difficult to read.
    One solution is to change the static variable `GUI.color`, which tints the entire
    GUI with a `color` value ([Listing 9-18](#9781430248750_Ch09.xhtml#list18)).


    [Listing 9-18](#9781430248750_Ch09.xhtml#_list18).  GUI Color Customization in
    FuguPause.js


    ```

    var hudColor:Color = Color.white;


    function OnGUI () {

           if (IsGamePaused()) {

                   GUI.color = hudColor;

                   switch (currentPage) {

                          case Page.Main: ShowPauseMenu(); break;

                          case Page.Options: ShowOptions(); break;

                          case Page.Credits: ShowCredits(); break;

                   }

           }

    }

    ```


    We add a public variable `hudColor` to the `FuguPause` script so a `color` can
    be chosen in the Inspector view. All UnityGUI operations, including setting variables
    like `GUI.Color,` must take place within an `OnGUI` callback, so the assignment
    to `GUI.color` is placed inside the `OnGUI` callback before any of the GUI Controls
    are created (but after `IsGamePaused` is called, since there’s no reason to set
    `GUI.Color` if there’s no GUI rendering). Note that you can set `GUI.color` multiple
    times within `OnGUI` to change the color before rendering various parts of the
    GUI.


    Now you can select a color in the Inspector View ([Figure 9-11](#9781430248750_Ch09.xhtml#Fig11))
    and see the resulting GUI tint ([Figure 9-12](#9781430248750_Ch09.xhtml#Fig12)).


    ![9781430248750_Fig09-11.jpg](images/9781430248750_Fig09-11.jpg)


    [Figure 9-11](#9781430248750_Ch09.xhtml#_Fig11). Color selection for the pause
    menu


    ![9781430248750_Fig09-12.jpg](images/9781430248750_Fig09-12.jpg)


    [Figure 9-12](#9781430248750_Ch09.xhtml#_Fig12). The pause menu with a custom
    color


    Customize the Skin


    The default UnityGUI skin is pretty neutral, and it’s hard to read the text, as
    you can see with the pause menu from the previous section. With the scoreboard,
    you could change the text color by adjusting the style passed to `GUI.Label`,
    but if you have a lot of GUI elements, that can be a hassle.


    That’s where UnityGUI skins come in. A *Skins* is a collections of styles assigned
    to the various GUI elements. Applying a skin is easy—just declare a public variable
    of type `GUISkin` and assign that skin to the variable `GUI.skin`, within the
    `OnGUI` callback, similar to assigning a `GUI.Color` ([Listing 9-19](#9781430248750_Ch09.xhtml#list19)).


    [Listing 9-19](#9781430248750_Ch09.xhtml#_list19).  Adding a GUISkin to the Pause
    Menu


    ```

    var skin:GUISkin;


    function OnGUI () {

           if (IsGamePaused()) {

                   if (skin != null) {

                          GUI.skin = skin;

                   } else {

                          GUI.color = hudColor;

                   }

                   switch (currentPage) {

                          case Page.Main: ShowPauseMenu(); break;

                          case Page.Options: ShowOptions(); break;

                          case Page.Credits: ShowCredits(); break;

                   }

           }

    }

    ```


    You can test this skin support with a really cool-looking free UnityGUI skin from
    the Asset Store called the Necromancer GUI ([Figure 9-13](#9781430248750_Ch09.xhtml#Fig13)).


    ![9781430248750_Fig09-13.jpg](images/9781430248750_Fig09-13.jpg)


    [Figure 9-13](#9781430248750_Ch09.xhtml#_Fig13). The Necromancer GUI on the Asset
    Store


    Download and import the Necromancer GUI, then drag its skin file (named Necromancer
    GUI) into the Skin property that’s now in the Inspector View ([Figure 9-14](#9781430248750_Ch09.xhtml#Fig14)).


    ![9781430248750_Fig09-14.jpg](images/9781430248750_Fig09-14.jpg)


    [Figure 9-14](#9781430248750_Ch09.xhtml#_Fig14). The Necromancer GUI


    Then click Play, and you have a much more ornate pause menu. [Figure 9-15](#9781430248750_Ch09.xhtml#Fig15)
    shows how the pause menu Graphics panel looks with the Necromancer GUI. Look at
    all the pretty buttons!


    ![9781430248750_Fig09-15.jpg](images/9781430248750_Fig09-15.jpg)


    [Figure 9-15](#9781430248750_Ch09.xhtml#_Fig15). The Necromancer GUI skin in action


    The Complete Script'
  trans: "\n# 图形面板\n\n图形面板将显示与 Unity 编辑器质量设置（图 9-9）相同的部分图形质量信息。\n\n![9781430248750_Fig09-09.jpg](img/9781430248750_Fig09-09.jpg)\n\
    \n图 9-9. 暂停菜单中的图形选项\n\n面板底部的两个按钮用于提高和降低质量设置级别。该面板无需新的 UnityGUI 控件即可实现，但需要访问 `QualitySettings`\
    \ 类（清单 9-16）。\n\n清单 9-16. 显示质量设置的函数\n\n```\nfunction ShowGraphics() {\n      \
    \ GUILayout.Label(QualitySettings.names[QualitySettings.GetQualityLevel()]);\n\
    \       GUILayout.Label(\"Pixel Light Count: \"+QualitySettings.pixelLightCount);\n\
    \       GUILayout.Label(\"Shadow Cascades: \"+QualitySettings.shadowCascades);\n\
    \       GUILayout.Label(\"Shadow Distance: \"+QualitySettings.shadowDistance);\n\
    \       GUILayout.Label(\"Soft Vegetation: \"+QualitySettings.softVegetation);\n\
    \       GUILayout.BeginHorizontal();\n       if (GUILayout.Button(\"Decrease\"\
    )) {\n               QualitySettings.DecreaseLevel();\n       }\n       if (GUILayout.Button(\"\
    Increase\")) {\n               QualitySettings.IncreaseLevel();\n       }\n  \
    \     GUILayout.EndHorizontal();\n}\n```\n\n`ShowGraphics` 函数相当直观。它通过调用 `QualitySettings.GetQualityLevel`\
    \ 获取当前质量设置级别（以整数表示），然后将该整数作为索引，从 `QualitySettings.names` 数组中检索该质量设置的名称。该名称及若干质量设置属性会显示在标签中，底部放置了两个按钮：一个调用\
    \ `QualitySettings.DecreaseLevel`，另一个调用 `QualitySettings.IncreaseLevel`。\n\n这两个按钮允许你在现有级别范围内提高或降低质量设置级别。你不仅会看到显示的质量设置信息发生变化，还可能会亲眼目睹场景的图形质量改变——因为即使游戏时间暂停，场景仍在每帧渲染。\n\
    \n# 系统面板\n\n系统面板显示硬件平台的相关信息（图 9-10）。\n\n![9781430248750_Fig09-10.jpg](img/9781430248750_Fig09-10.jpg)\n\
    \n图 9-10. 暂停菜单中的系统面板\n\n与图形页面类似，信息通过标签显示，但图形页面访问的是 `QualitySettings` 类，而系统面板访问的是\
    \ `SystemInfo` 类（清单 9-17）。\n\n清单 9-17. `FuguPause.js` 中的系统面板\n\n```\nfunction\
    \ ShowSystem() {\n       GUILayout.Label(\"Graphics: \"+SystemInfo.graphicsDeviceName+\"\
    \ \"+\n       SystemInfo.graphicsMemorySize+\"MB\\n\"+\n       SystemInfo.graphicsDeviceVersion+\"\
    \\n\"+\n       SystemInfo.graphicsDeviceVendor);\n       GUILayout.Label(\"Shadows:\
    \ \"+ Available(SystemInfo.supportsShadows));\n       GUILayout.Label(\"Image\
    \ Effects: \"+Available(SystemInfo.supportsImageEffects));\n       GUILayout.Label(\"\
    Render Textures: \"+Available(SystemInfo.supportsRenderTextures));\n}\n```\n\n\
    `SystemInfo` 类提供图形硬件及其功能的信息，包括一些识别信息，如设备名称、供应商名称、图形内存大小，以及硬件是否支持某些更高级的功能（例如动态阴影、渲染到纹理或图像效果，后者需要渲染到纹理）。\n\
    \n# 自定义 GUI 颜色\n\n你可能注意到暂停菜单中的白色文本有时难以阅读。一种解决方法是更改静态变量 `GUI.color`，它能用 `color`\
    \ 值为整个 GUI 着色（清单 9-18）。\n\n清单 9-18. `FuguPause.js` 中的 GUI 颜色自定义\n\n```\nvar hudColor:Color\
    \ = Color.white;\n\nfunction OnGUI () {\n       if (IsGamePaused()) {\n      \
    \         GUI.color = hudColor;\n               switch (currentPage) {\n     \
    \                 case Page.Main: ShowPauseMenu(); break;\n                  \
    \    case Page.Options: ShowOptions(); break;\n                      case Page.Credits:\
    \ ShowCredits(); break;\n               }\n       }\n}\n```\n\n我们在 `FuguPause`\
    \ 脚本中添加了一个公共变量 `hudColor`，以便在检视面板中选择 `color`。所有 UnityGUI 操作（包括设置 `GUI.Color` 等变量）都必须在\
    \ `OnGUI` 回调中进行，因此对 `GUI.color` 的赋值放置在 `OnGUI` 回调内，在所有 GUI 控件创建之前（但在调用 `IsGamePaused`\
    \ 之后，因为如果没有 GUI 渲染，则无需设置 `GUI.Color`）。请注意，你可以在 `OnGUI` 中多次设置 `GUI.color`，以便在渲染\
    \ GUI 的不同部分之前更改颜色。\n\n现在你可以在检视面板中选择颜色（图 9-11），并看到由此产生的 GUI 色调（图 9-12）。\n\n![9781430248750_Fig09-11.jpg](img/9781430248750_Fig09-11.jpg)\n\
    \n图 9-11. 暂停菜单的颜色选择\n\n![9781430248750_Fig09-12.jpg](img/9781430248750_Fig09-12.jpg)\n\
    \n图 9-12. 使用自定义颜色的暂停菜单\n\n# 自定义皮肤\n\n默认的 UnityGUI 皮肤相当中性，且文本难以阅读，正如上一节暂停菜单所示。对于记分板，你可以通过调整传递给\
    \ `GUI.Label` 的样式来更改文本颜色，但如果 GUI 元素较多，这会很麻烦。\n\n这正是 UnityGUI 皮肤的用武之地。*皮肤*是分配给各种\
    \ GUI 元素的样式集合。应用皮肤很简单——只需声明一个 `GUISkin` 类型的公共变量，并在 `OnGUI` 回调中将该皮肤赋值给变量 `GUI.skin`，类似于赋值\
    \ `GUI.Color`（清单 9-19）。\n\n清单 9-19. 为暂停菜单添加 `GUISkin`\n\n```\nvar skin:GUISkin;\n\
    \nfunction OnGUI () {\n       if (IsGamePaused()) {\n               if (skin !=\
    \ null) {\n                      GUI.skin = skin;\n               } else {\n \
    \                     GUI.color = hudColor;\n               }\n              \
    \ switch (currentPage) {\n                      case Page.Main: ShowPauseMenu();\
    \ break;\n                      case Page.Options: ShowOptions(); break;\n   \
    \                   case Page.Credits: ShowCredits(); break;\n               }\n\
    \       }\n}\n```\n\n你可以使用资源商店中一款名为 Necromancer GUI 的炫酷免费 UnityGUI 皮肤来测试此皮肤支持（图\
    \ 9-13）。\n\n![9781430248750_Fig09-13.jpg](img/9781430248750_Fig09-13.jpg)\n\n\
    图 9-13. 资源商店中的 Necromancer GUI\n\n下载并导入 Necromancer GUI，然后将它的皮肤文件（名为 Necromancer\
    \ GUI）拖拽到检视面板中新增的 Skin 属性中（图 9-14）。\n\n![9781430248750_Fig09-14.jpg](img/9781430248750_Fig09-14.jpg)\n\
    \n图 9-14. Necromancer GUI\n\n然后点击播放，你将看到一个更加华丽的暂停菜单。图 9-15 展示了使用 Necromancer GUI\
    \ 时暂停菜单图形面板的外观。看看那些漂亮的按钮！\n\n![9781430248750_Fig09-15.jpg](img/9781430248750_Fig09-15.jpg)\n\
    \n图 9-15. 实际应用中的 Necromancer GUI 皮肤\n\n# 完整脚本\n"
- fmt: '# 游戏启动/暂停菜单与Unity iOS开发


    ## 启动/暂停菜单脚本


    最终完成的启动/暂停菜单脚本比记分板脚本要长得多，因此此处省略了完整代码。本章已展示了所有代码，完整的`FuguPause.js`脚本可在本章的项目文件中获取，项目地址为`http://learnunity4.com/`。


    ## 探索更深层次


    最终，记分板显示让我们的保龄球游戏成为了一款功能完整的保龄球游戏，而添加启动/暂停菜单则提供了玩家所期望的一些打磨效果！


    游戏GUI的添加不仅完成了保龄球游戏（在商业游戏项目中，这可能会被视为“第一个可玩”里程碑），同时也标志着我们对Unity中常用于3D游戏的基本功能介绍的结束。


    **提示** 虽然我将GUI开发留到了这一阶段的末尾（这在游戏开发中很常见，但很不幸），但最好在项目早期就纳入GUI设计。即使只是草拟菜单，也有助于明确预期的游戏模式和选项。


    ## 跨平台特性与iOS开发目标


    大多数情况下，尽管你一直仅在编辑器中修改和测试游戏，但这些功能都是跨平台的。现在，你可以将此游戏构建为网络播放器、Mac或Windows可执行文件，并且游戏在所有平台上的运行效果都一样（性能差异除外）。但本书的最终目标是让你进入iOS开发领域，因此，从下一章开始，本书的剩余部分将全部围绕Unity
    iOS展开。


    ## Unity手册


    Unity手册中“创建游戏玩法”部分的“游戏界面元素”链接指向了“GUI脚本编写指南”，这是一系列教程风格的页面，详细介绍了UnityGUI系统，从创建单个按钮到添加各种其他UnityGUI控件（如滑块和单选按钮），再到使用自动布局与固定布局、创建可复用的复合控件，以及通过样式和皮肤自定义GUI外观。


    “GUI脚本编写指南”还解释了如何使用UnityGUI自定义Unity编辑器。事实上，编辑器界面本身就是用UnityGUI实现的（这就解释了为什么有时你会在控制台视图中看到与你的代码无关的`OnGUI`错误信息）！


    ## 参考手册


    我简要提到了可以将除内置Unity字体之外的其他字体导入到Unity项目中，然后分配给UnityGUI样式和皮肤。参考手册在其资源组件部分有一个页面，更详细地描述了字体资源及其导入选项。


    ## 脚本参考


    自然，脚本参考中的运行时类列表包含了你所使用的UnityGUI函数的说明页面，首先是`MonoBehaviour`类中定义的`OnGUI`回调。


    在记分板和暂停菜单中使用的大多数UnityGUI函数都是用于创建各种UnityGUI控件的静态`GUI`和`GUILayout`函数，例如`GUI.Button`和`GUI.Label`。值得逐一查阅每个函数的脚本参考页面，这样你就能了解有哪些GUI控件可用，以及自定义变量如`GUI.color`和`GUI.skin`（还有其他的，比如用于自定义背景色）。`GUIStyle`和`GUISkin`也是类，你可以在脚本中随时更改它们的属性。


    除了`UnityGUI`类，暂停菜单中还使用了一些其他类。静态变量`Time.timeScale`被用于暂停和恢复游戏，调用了`Application.Quit`来退出游戏，并在选项页面中访问了`AudioListener`、`QualitySettings`和`SystemInfo`类。


    ## 资源商店


    Necromancer GUI在暂停菜单中看起来很棒，展示了精心制作的GUISkin能让UnityGUI变得多么美观，但资源商店上还有很多其他皮肤。它们与Necromancer
    GUI一起，都列在“纹理和材质”下的“GUI皮肤”分类中。该分类中包含了大量用于UnityGUI的皮肤，以及用于第三方GUI系统的皮肤，例如来自Above
    and Beyond Software（`http://anbsoft.com/`）的流行EZGUI，和来自Tasharen Entertainment（`http://tasharen.com`）的NGUI。


    这些第三方GUI系统可在“脚本”分类下的“GUI”子分类中找到，该子分类中充满了预先编写好的GUI，如小地图和菜单。事实上，本章实现的暂停菜单的一个版本可以在资源商店的“完整项目”部分中找到（名称为FuguPause）。


    资源商店在“纹理和材质”的“字体”分类下也有相当多的字体可供选择。但由于Unity可以导入TrueType和OpenType字体，你还可以访问网络上大量的免费字体网站，以及价格适中的字体库（我使用的是MacXWare字体库）。


    ---


    # 第10章 使用 Unity iOS


    恭喜！你现在已经拥有了一款保龄球游戏，它包含了通常构成3D游戏的基本功能：3D图形（当然）、物理效果、音效、玩家控制（保龄球）、摄像机运动以及图形用户界面。


    默认的构建目标显示在编辑器窗口的标题栏上，为PC、Mac和Linux独立平台。如果现在对保龄球项目进行OS X构建，游戏的运行效果将与在编辑器中基本相同。同样适用于Linux、Windows，甚至是网络播放器（不过网络播放器构建需要你先切换构建目标）。


    针对iOS则是另一回事。你现在可以将保龄球游戏的构建目标更改为iOS，并进行构建而不会出现任何编译器错误。但`FuguForce.js`中的保龄球控制是为鼠标输入设计的，因此需要更改。除了重新实现输入处理之外，将桌面PC游戏适配到移动设备（这个过程称为*移植*）通常还需要对设备显示进行调整，并做出妥协以达到足够的性能。


    此外，与桌面独立平台和网络播放器目标相比，构建iOS应用涉及更多的外部流程。由于Apple要求所有iOS应用都必须使用Xcode编译，Unity iOS通过首先生成一个Xcode项目来构建应用，然后由Xcode编译该项目以创建最终应用。而要在测试设备上实际运行应用并将应用提交到App
    Store，则需要一系列相当复杂的流程，以及加入Apple的iOS开发者计划。


    现在，让我们回到起点，暂时回归到本书开始时使用的Angry Bots演示项目。方便的是，Angry Bots无需修改即可在iOS上运行。如果你有iOS设备，请从App
    Store下载Angry Bots。在App Store搜索框中输入“unity technologies”可以快速找到Angry Bots应用，它将与Unity
    Technologies的其他应用一起出现（[图10-1](#9781430248750_Ch10.xhtml#Fig1)）。


    ![9781430248750_Fig10-01.jpg](images/9781430248750_Fig10-01.jpg)


    [图10-1](#9781430248750_Ch10.xhtml#_Fig1) App Store上Unity Technologies的示例应用


    除了Angry Bots，你还应该下载Unity Remote应用，它作为远程控制工具，用于在编辑器中测试Unity iOS游戏。顺便，你应该下载并尝试Unity
    Technologies的所有示例应用。其中许多应用已经很长时间没有更新，但它们确实提供了一些关于可以用Unity创建什么类型游戏的思路。'
  raw: 'The finalized start/pause menu script is significantly longer than the scoreboard
    script, so the complete listing is omitted here. All the code has been shown in
    this chapter, and the entire script `FuguPause.js` is available in the project
    for this chapter at `http://learnunity4.com/`.


    Explore Further


    Finally, the scoreboard display makes our bowling game a fully functional bowling
    game, and the addition of a start/pause menu provides some of the polish that
    players expect!


    The addition of the game GUI not only completes the bowling game (in a commercial
    game project, this might be considered a “first playable” milestone) but it also
    marks the end of our introduction to Unity’s basic features typically used in
    a 3D game.


    **Tip**   Although I left the GUI development to the end of this phase, which
    is unfortunately common in game development, it’s best to include GUI design early
    in the project. Even just sketching out the menus will help clarify the anticipated
    game modes and options.


    For the most part, although you’ve been modifying and testing the game solely
    in the Editor, these are cross-platform features. Right now, you could build this
    game as a web player or a Mac or Windows executable, and the game would run the
    same on all platforms, performance differences aside. But the ultimate goal of
    this book is to get you into iOS development, so, starting with the next chapter,
    the remainder of this book will be all about Unity iOS.


    Unity Manual


    The Game Interface Elements link in the “Creating Gameplay” section of the Unity
    Manual leads to the “GUI Scripting Guide,” which is a tutorial-style sequence
    of pages that goes through the UnityGUI system, from creating a single button
    to adding various other UnityGUI Controls such as sliders and radio buttons, use
    of automatic layout vs. fixed layout, creating reusable compound Controls, and
    customizing the GUI appearance with styles and skins.


    The “GUI Scripting Guide” also explains how you can customize the Unity Editor
    using UnityGUI. It turns out the Editor interface is actually implemented with
    UnityGUI (which explains why on occasion you may see an OnGUI error message in
    the Console View that is not related to any of your code)!


    Reference Manual


    I briefly mentioned how additional fonts besides the built-in Unity font can be
    imported into a Unity project and then assigned to UnityGUI styles and skins.
    The Reference Manual has a page in its Asset Components section describing the
    Font asset and its import options in more detail.


    Scripting Reference


    Naturally, the Runtime Classes list in the Scripting Reference includes pages
    describing the UnityGUI functions you’ve used, starting with the “OnGUI” callback
    defined in the “MonoBehaviour” class.


    Most of the UnityGUI functions used in both the scoreboard and pause menu are
    the static “GUI” and “GUILayout” functions used to create the various UnityGUI
    Controls, such as “GUI.Button” and “GUI.Label.” It’s worth going through the Scripting
    Reference pages for each of them so you know what GUI Controls are available,
    along with customization variables like “GUI.color” and “GUI.skin” (and there
    are others, e.g., to customize the background color). `GUIStyle` and `GUISkin`
    are classes too, and you can change their properties any time in a script.


    Besides the `UnityGUI` classes, a few others are used in the pause menu. The static
    variable “Time.timeScale” was set to pause and unpause the game, “Application.Quit”
    called to exit the game, and the “AudioListener,” “QualitySettings,” and “SystemInfo”
    classes accessed in the Options page.


    Asset Store


    The Necromancer GUI looked great in the pause menu, demonstrating how nice UnityGUI
    can look with a well-crafted GUISkin, but there are many others on the Asset Store.
    They’re all listed, along with the Necromancer GUI, in the “GUI Skins” category
    under “Textures and Materials.” That category is well populated with skins for
    UnityGUI and also skins for third-party GUI systems, such as the popular EZGUI
    from Above and Beyond Software (`http://anbsoft.com/`) and NGUI from Tasharen
    Entertainment (`http://tasharen.com`).


    Those third-party GUI systems are available under the “Scripting” category, in
    the well-populated “GUI” subcategory, which is filled with pre-scripted GUIs such
    as minimaps and menus. In fact, a version of the pause menu implemented in this
    chapter is on the Asset Store in the “Complete Projects” section (under the name
    FuguPause).


    The Asset Store also has a decent assortment of fonts listed under the “Fonts”
    category of “Textures and Materials.” But since Unity can import TrueType and
    OpenType fonts, a plethora of free font sites on the web is available to you,
    along with moderately priced font libraries (I use the MacXWare Font Library).


    Chapter     10


    Using Unity iOS


    Congratulations! You now have a bowling game incorporating the basic features
    that typically comprise a 3D game: 3D graphics (of course), physics, sound effects,
    player control (of the bowling ball), camera movement, and a graphical user interface.


    The default built target is listed on the title bar of the Editor window as PC,
    Mac and Linux Standalone. If you were to perform an OS X build of the bowling
    project right now, the game would run essentially the same as it does in the Editor.
    Same for Linux, Windows, and even a web player (although a web player build would
    require you to switch build targets first).


    Targeting iOS is another story. You could change the build target for the bowling
    game to iOS right now and build it without any compiler errors. But the bowling
    ball control in `FuguForce.js` is designed for mouse input, so that would have
    to change. Besides reimplementing the input handling, adapting desktop PC games
    to mobile devices (a process called *porting*) often requires adjustments for
    the device display and compromises to achieve adequate performance.


    Moreover, building an iOS app involves much more in the way of external procedures
    than the desktop standalone and web player targets. Due to Apple’s requirement
    that all iOS apps be compiled with Xcode, Unity iOS builds an app by first generating
    an Xcode project, which in turn is compiled by Xcode to create the final app.
    And to actually run the app on a test device and submit the app to the App Store,
    a rather complicated sequence of procedures is required, along with registration
    in Apple’s iOS Developer Program.


    For now, let’s go back to our roots, so to speak, and temporarily return to the
    Angry Bots demo project that we started with in this book. Conveniently, Angry
    Bots is ready to run on iOS without modification. If you have an iOS device, go
    ahead and download Angry Bots from the App Store. A quick way to find the Angry
    Bots app is to enter “unity technologies” in the App Store search field, and Angry
    Bots will appear, along with other apps from Unity Technologies ([Figure 10-1](#9781430248750_Ch10.xhtml#Fig1)).


    ![9781430248750_Fig10-01.jpg](images/9781430248750_Fig10-01.jpg)


    [Figure 10-1](#9781430248750_Ch10.xhtml#_Fig1). Example apps from Unity Technologies
    on the App Store


    Besides Angry Bots, you should also download the Unity Remote app, which acts
    as a remote control for testing a Unit iOS game in the Editor. While you’re at
    it, you should download and try all the example apps from Unity Technologies.
    Many of them have not been updated in a while, but they do provide an idea of
    what kinds of games can be created with Unity.'
