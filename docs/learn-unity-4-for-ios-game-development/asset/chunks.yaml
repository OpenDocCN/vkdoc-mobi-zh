- fmt: '### The Button to the Right of the Asset Type Menu


    The button to the right of the asset type menu is for filtering by label (you
    can assign a label to each asset in the Inspector View), which is also pretty
    handy for searching the Asset Store. And the rightmost button, the star, will
    save the current search in the Favorites section of the left panel.


    ### Operate on Assets


    Assets in the Project View can be manipulated very much like their corresponding
    files in the Finder.


    Double-clicking an asset will attempt to open a suitable program to view or edit
    the asset. This is equivalent to right-clicking the asset and selecting Open.
    Double-clicking a scene file will open the scene in this Unity Editor window,
    just as if you had selected Open Scene in the File menu.


    You can also rename, duplicate and delete, and drag files in and out of a folder
    just as you can in the Finder. Some of the operations are available in the Unity
    Edit menu and in a pop-up menu when you right-click on an asset. You’ll get some
    practice with that in the next few chapters.


    Likewise, in the next chapter you will work on adding assets to a project. That
    involves importing a file or importing a Unity package, using the Assets menu
    on the menu bar or just dragging files into the Assets folder of the project using
    the Finder.


    ### The Hierarchy View


    Every game engine has a top-level object called a *game object* or *entity* (CryEngine,
    for example) or something else (Second Life has prims) to represent anything that
    has a position, potential behavior, and a name to identify it. Unity game objects
    are instances of the class `GameObject`.


    **Note** In general, when we refer to a type of Unity object, we’ll use its class
    name to be precise and make clear how that object would be referenced in a script.


    The Hierarchy View is another representation of the current scene. While the Scene
    View is a 3D representation of the scene that you can work in as you would with
    a content creation tool, and the Game View shows the scene as it looks when playing
    the game, the Hierarchy View lists all the `GameObject`s in the scene in an easily
    navigable tree structure.


    ### Inspect Game Objects


    When you click a `GameObject` in the Hierarchy View, it becomes the current Editor
    selection and its Components are displayed in the Editor. Every `GameObject` has
    a `Transform Component`, which specifies its position, rotation, and scale, relative
    to its parent in the hierarchy (if you’re familiar with the math of 3D graphics,
    the `Transform Component` encapsulates the transformation matrix of the object).
    Some Components provide a function for the `GameObject` (e.g., a light is a `GameObject`
    with a Light Component attached). Other Components reference assets such as meshes,
    textures, and scripts. [Figure 2-37](#9781430248750_Ch02.xhtml#Fig37) shows the
    Components of the Player `GameObject` (in the Hierarchy View, the entire Player
    tree of `GameObject`s is displayed in blue because it’s linked to a prefab, a
    special type of asset that is used to clone a `GameObject` or group of `GameObject`s).


    ![9781430248750_Fig02-37.jpg](images/9781430248750_Fig02-37.jpg)


    [Figure 2-37](#9781430248750_Ch02.xhtml#_Fig37). Hierarchy View and Inspector
    View


    ### Parent and Child GameObjects


    Notice that many of the `GameObject`s are arranged in a hierarchy, hence the name
    of this view (in computer graphics, this is commonly known as a *scene graph*).
    Parenting makes sense for game objects that are conceptually grouped together.
    For example, when you want to move a car, you want the wheels to automatically
    move along with the car. So the wheels should be specified as children of the
    car, offset from the center of the car. When the wheels turn, they turn relative
    to the movement of the car. Parenting also allows us to activate or deactivate
    whole groups of game objects at one time.


    ### The Scene View


    Whereas the Hierarchy View allows you to create, inspect, and modify the `GameObject`s
    in the current scene, it doesn’t provide a way to visualize the scene. That’s
    where the Scene View comes in. The Scene View is similar to the interfaces of
    3D modeling applications. It lets you examine and modify the scene from any 3D
    vantage point and gives you an idea how the final product will look.


    ### Navigate the Scene


    If you’re not familiar with working in 3D space, it’s a straightforward extension
    from working in 2D. Instead of just working in a space with x and y axes and (x,y)
    coordinates, in 3D space you have an additional z axis and (x,y,z) coordinates.
    The x and z axes define the ground plane and y is pointing up (you can think of
    y as height).


    **Note** Some 3D applications and game engines use the z axis for height and the
    x and y axes for the ground plane, so when importing assets you might have to
    adjust (rotate) them.


    The viewpoint in 3D space is usually called the *camera*. Clicking the x, y, and
    z arrows of the multicolored Scene Gizmo in the upper right corner is a quick
    way of flipping the Scene View camera so that it faces along the respective axis.
    For example, clicking the y arrow gives you a top-down view of the scene ([Figure
    2-38](#9781430248750_Ch02.xhtml#Fig38)), and the text under the Scene Gizmo says
    “Top.”


    ![9781430248750_Fig02-38.jpg](images/9781430248750_Fig02-38.jpg)


    [Figure 2-38](#9781430248750_Ch02.xhtml#_Fig38). A top-down view in the Scene
    View


    The camera here is not the same as the Camera `GameObject` in the scene that is
    used during the game, so you don’t have to worry about messing up the game while
    you’re looking around in the Scene View.


    Clicking the box in the center of the Scene Gizmo toggles the camera projection
    between perspective, which renders objects smaller as they recede in the distance,
    and orthographic, which renders everything at their original size whether they
    are close or far. Perspective is more realistic and what you normally see in 3D
    games, but orthographic is often more convenient when designing (hence its ubiquity
    in computer-aided design applications). The little graphic preceding the text
    under the Scene Gizmo indicates the current projection.


    You can zoom in and out using the mouse scroll wheel or by selecting the Hand
    tool in the upper right toolbar of the Editor window and click-dragging the mouse
    while holding the Control key down. When the Hand tool is selected, you can also
    move the camera by click-dragging the view, and you can rotate (orbit) the camera
    by dragging the mouse while holding the Option (or Alt) key down, so you’re not
    restricted to just the axis camera angles, like in [Figure 2-39](#9781430248750_Ch02.xhtml#Fig39).


    ![9781430248750_Fig02-39.jpg](images/9781430248750_Fig02-39.jpg)


    [Figure 2-39](#9781430248750_Ch02.xhtml#_Fig39). A tilted perspective in the Scene
    View


    Notice that when you’re looking from an arbitrary angle, the text under the Scene
    Gizmo says Persp or Iso, depending on whether you’re using perspective or orthographic
    projection (Iso is short for isometric, which is the tilted orthographic view
    common in games like Starcraft and Farmville).


    The other buttons on the toolbar activate modes for moving, rotating, and scaling
    `GameObject`s. There’s no reason to change the Angry Bots scene, so those modes
    will be explained in more detail when you start creating new projects.


    **Tip** If you accidentally make a change to the scene, you can select Undo from
    the Edit menu. If you made a lot of changes you don’t want to keep, you can just
    decline to save this scene when you switch to another scene or exit Unity. In
    the meantime, note that you can still move the camera while in those modes, using
    alternate keyboard and mouse combinations. [Table 2-1](#9781430248750_Ch02.xhtml#Tab1)
    lists all the possible options.


    [Table 2-1](#9781430248750_Ch02.xhtml#_Tab1). Available Scene View Camera Controls


    ![image](images/Table2-1.jpg)'
