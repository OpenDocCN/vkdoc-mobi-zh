    whether the achievement can be shown to the player before it has been earned.
    *Achievable more than Once* specifies whether the achievement can be earned multiple
    times (with points awarded each time). If you selected Yes for this option, then
    the player would receive ten points for each spare, rather than just ten points
    for just the first time a spare was rolled ([Figure 14-11](#9781430248750_Ch14.xhtml#Fig11)).    ![9781430248750_Fig14-11.jpg](images/9781430248750_Fig14-11.jpg)    [Figure
    14-11](#9781430248750_Ch14.xhtml#_Fig11). Adding a localization for an achievement
    in iTunes Connect    Just like the leaderboard, the achievement needs a Language
    added in the Localization section. Clicking the Add Language button brings up
    a window where you can specify the language (English), Title of the achievement
    (Spare), a Pre-earned Description, which will be displayed for the achievement
    before it’s been earned, and an Earned Description, which is displayed for the
    achievement after it has been earned ([Figure 14-12](#9781430248750_Ch14.xhtml#Fig12)).    ![9781430248750_Fig14-12.jpg](images/9781430248750_Fig14-12.jpg)    [Figure
    14-12](#9781430248750_Ch14.xhtml#_Fig12). A saved localization for an achievement
    in iTunes Connect    Again, for expedience let’s choose the Icon1024.jpg image
    in our project Textures folder as the achievement icon, but in a polished game
    you may have a different icon for each achievement.    When you click Save, the
    new Language will be listed in the Achievement Localization section.'
  trans: '

    ![9781430248750_Fig14-04.jpg](img/9781430248750_Fig14-04.jpg) 图 14-4. 在 iTunes
    Connect 中创建排行榜


    排行榜引用名称是排行榜在 iTunes Connect 中显示的名称。我喜欢用全大写的单词作为引用名称，这样能立刻明白它不会在其他地方使用，比如用作代码中的
    ID 或显示文本。`Leaderboard ID` 是将在代码中被引用的标识符。将它设为应用程序 ID 的变体（不必完全匹配）会很方便，这样当你看到`Leaderboard
    ID`时，就能立刻知道该排行榜属于哪个应用。这也有助于确保 ID 的唯一性。


    接下来的三个字段用于提供关于提交到排行榜的得分信息。为**得分格式类型**选择`Integer`（例如，保龄球得分永远不会是 200.5），并指定**排序顺序**为从高到低，这意味着得分越高越好，排行榜应按降序显示得分。最后，将可能的得分范围指定为
    0 到 300，这样 Game Center 就不会显示该范围之外的任何分数（有一段时间，如果玩家提前退出游戏，HyperBowl 会提交-1 的分数）。


    **添加语言**


    在你刚填写的字段下方是**排行榜本地化**部分。*本地化*是使程序适应世界上不同地区（或*区域设置*）的过程，主要涉及指定用户界面在不同语言中应使用哪些文本。你需要为此列表至少添加一种语言，因此点击**添加语言**按钮以调出相应的表单（图
    14-5）。


    ![9781430248750_Fig14-05.jpg](img/9781430248750_Fig14-05.jpg) 图 14-5. 在 iTunes
    Connect 中为排行榜添加本地化


    将此本地化的**语言**指定为英语，并将此语言下排行榜的**名称**指定为 High Scores。这是在 Game Center 应用或标准 Game Center
    排行榜显示中查看此排行榜时将显示的名称。


    **得分格式**指定了得分的显示方式。保龄球得分永远不会超过 300，因此用逗号还是小数点来分隔数字组并不重要。**得分格式后缀**也不是必需的，但如果提供了，可以使用`Point`作为单数后缀，`Points`作为复数后缀。


    对于与排行榜**名称**一同显示的图像，你可以再次从项目的`Textures`文件夹中选择`Icon1024.jpg`文件（与应用描述图标类似，iTunes
    Connect 要求 Game Center 图标为 1024×1024 的图像）。理想情况下，你应该为每个排行榜定制不同的图标。


    当此**语言**的设置保存后，该**语言**将列在该排行榜页面的**本地化**部分中（图 14-6）。


    ![9781430248750_Fig14-06.jpg](img/9781430248750_Fig14-06.jpg) 图 14-6. 在 iTunes
    Connect 中保存的排行榜本地化


    现在，当你返回到此应用的 Game Center 管理页面时，排行榜会被列出，但工作尚未完成。你必须回到应用描述页面（返回此应用的**应用信息**页面，然后点击**查看详情**按钮）。在该页面的底部附近，点击**启用
    Game Center** 按钮（图 14-7）。


    ![9781430248750_Fig14-07.jpg](img/9781430248750_Fig14-07.jpg) 图 14-7. 在 iTunes
    Connect 中启用 Game Center


    然后点击**编辑**按钮，会弹出一个对话框，允许你选择为此应用定义的所有新排行榜（图 14-8）。


    ![9781430248750_Fig14-08.jpg](img/9781430248750_Fig14-08.jpg) 图 14-8. 在 iTunes
    Connect 中启用排行榜


    通常，你会希望添加所有显示的排行榜，除了那些计划用于未来发布的排行榜。


    **设置成就**


    现在你有了排行榜，是时候处理成就了。成就的可能性是丰富多彩的。在 HyperBowl 中，成就的授予基于补中、全中、连续全中、打出完美比赛（300 分），甚至在玩家完成一局完整比赛时为每条球道都授予成就。对于
    Fugu Bowl，让我们只定义获得补中和全中的成就，因为 FuguBowl 脚本已经能检测到这些情况。


    添加成就的过程与添加排行榜类似。在 iTunes Connect 中，回到此应用的**Game Center** 页面（图 14-9）。


    ![9781430248750_Fig14-09.jpg](img/9781430248750_Fig14-09.jpg) 图 14-9. iTunes Connect
    中的添加成就部分


    在你点击**添加排行榜**的部分下方（现在那里有一个由刚创建的排行榜组成的排行榜列表），你会看到**成就**部分。点击**添加成就**按钮以调出添加成就页面（图
    14-10）。


    ![9781430248750_Fig14-10.jpg](img/9781430248750_Fig14-10.jpg) 图 14-10. 在 iTunes
    Connect 中添加成就信息


    与排行榜类似，成就有一个在 iTunes Connect 中使用的**引用名称**和一个将在脚本中被引用以指代此成就的**ID**。让我们使用`FUGUBOWLSPARE`作为引用名称，并将`.spare`附加到应用程序
    ID 上以形成**成就 ID**（同样，不必精确匹配——这只是一种惯例）。


    在名称和 ID 字段下方，指定一个**点数值**，即成就完成后 Game Center 奖励给玩家的点数。对于获得补中，我们选择 10 个点。


    > **提示** 此游戏中分配给成就的总点数不能超过 1000，因此最好提前规划好你计划在游戏中添加的所有成就，并确保在这个预算内合理分配点数。


    在**点数值**字段下方是两个“是或否”选项。*隐藏*指定成就是否可以在获得之前向玩家显示。*可多次获得*指定成就是否可以多次获得（每次都会获得点数）。如果你为此选项选择了“是”，那么玩家每次补中都会获得十分，而不仅仅是第一次补中时获得十分（图
    14-11）。


    ![9781430248750_Fig14-11.jpg](img/9781430248750_Fig14-11.jpg) 图 14-11. 在 iTunes
    Connect 中为成就添加本地化


    与排行榜类似，成就需要在**本地化**部分添加一种**语言**。点击**添加语言**按钮会弹出一个窗口，你可以在其中指定语言（英语）、成就的**标题**（Spare）、一个**获得前描述**（在成就获得前显示）以及一个**获得后描述**（在成就获得后显示）（图
    14-12）。


    ![9781430248750_Fig14-12.jpg](img/9781430248750_Fig14-12.jpg) 图 14-12. 在 iTunes
    Connect 中保存的成就本地化


    同样，为简便起见，我们选择项目`Textures`文件夹中的`Icon1024.jpg`图像作为成就图标，但在一个完善的游戏中，你可能为每个成就准备不同的图标。当你点击**保存**时，新的**语言**将列在**成就本地化**部分中。

