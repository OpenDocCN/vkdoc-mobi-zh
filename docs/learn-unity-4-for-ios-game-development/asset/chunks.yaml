  trans: '

    例如，在图 11-16 中，我列出了修改后的 Angry Bots 项目（已更名为 Fugu Bots）的信息。通配符 ID `com.technicat.*`
    和后缀 `FuguBot` 与我在 Unity Player Settings 中设置的捆绑包 ID `com.technicat.FuguBot` 相匹配。


    ![9781430248750_Fig11-16.jpg](img/9781430248750_Fig11-16.jpg)


    图 11-16. 在 iTunes Connect 上指定应用名称和捆绑包 ID


    默认语言表示你为此应用提交的所有资源和描述将使用的主要语言。


    `SKU Number` 可以是任何你想要的字符串，但它必须在你所有的应用中保持唯一，并且当你在报告中看到它时，应能轻松识别出对应的应用。


    ## 上架时间与价格


    从“App Information”页面继续后，iTunes Connect 会要求你指定应用的价格以及你希望应用在 App Store 上架的时间（图 11-17）。


    ![9781430248750_Fig11-17.jpg](img/9781430248750_Fig11-17.jpg)


    图 11-17. 在 iTunes Connect 上设置应用上架时间与价格


    上架时间取决于苹果审核应用的进度。因此，如果你指定的上架日期是提交应用后的一周，而审核花费了两周，那么应用将在审核通过之日上架。如果你希望应用尽快上架，只需使用默认日期，即你输入此信息的当天。


    价格选项包括免费、$0.99、$1.99、$2.99 等。无需过分担心定价是否恰当，因为以后随时可以更改。


    接下来的页面是此流程中信息最为集中的环节。大部分应用信息都在此添加，幸运的是，这个庞大的表单被分成了若干部分。


    ## 版本、类别与版权


    第一部分是版本号、版权和分类信息（图 11-18）。


    ![9781430248750_Fig11-18.jpg](img/9781430248750_Fig11-18.jpg)


    图 11-18. 在 iTunes Connect 上设置应用版本、类别与版权信息


    版本号必须与 Unity Player Settings 中指定的版本号一致。


    版权字段应填写版权持有者的名称，通常是你个人或你的公司。请勿添加任何多余的“Copyright”字样；这些内容会在 App Store 中自动生成。


    请选择恰当的类别和子类别。你也可以选择一个次要类别来增加应用的曝光度。


    ## 应用评级


    “Rating”部分非常直接明了（图 11-19）。填写即可，所有选项都是必填项。


    ![9781430248750_Fig11-19.jpg](img/9781430248750_Fig11-19.jpg)


    图 11-19. 在 iTunes Connect 中设置应用内容评级


    如果评级与内容不匹配，至少在苹果看来如此，应用可能会被拒绝。例如，我曾尝试提交一个 Angry Bots 的版本，但被拒绝了，因为游戏包含射击元素（即使目标是一些愤怒的自动机器人），而根据苹果的规定，这属于“真实暴力”，应标记为“频繁/强烈”。


    ## 元数据


    对于营销推广而言，“Metadata”部分最为重要（图 11-20）。


    ![9781430248750_Fig11-20.jpg](img/9781430248750_Fig11-20.jpg)


    图 11-20. 在 iTunes Connect 中设置应用的产品描述


    此部分包括应用在 App Store 中显示时的描述，以及有助于应用在 App Store 搜索中被发现的**关键字**。


    ## 上传图标与截图


    最后，你需要在此上传之前准备好的图标和截图（图 11-21）。图标尺寸必须为 1024 × 1024 像素，并且应与你构建在应用内的图标一致，否则应用可能会被苹果拒绝。

    '
- fmt: '![9781430248750_Fig11-21.jpg](images/9781430248750_Fig11-21.jpg)


    [Figure 11-21](#9781430248750_Ch11.xhtml#_Fig21). Uploading the app icon and screenshots
    in iTunes Connect


    `iTunes Connect` will not allow us to proceed without uploading the icon and at
    least one screenshot, although we really need to upload a screenshot for each
    screen type (aspect ratio) that the app will run with. If a Unity iOS app is built
    for the iPhone and iPad, then we need to upload screenshots for all three categories,
    basically corresponding to the iPhone 4, iPhone 5, and iPad.


    > **Caution**   `iTunes Connect` will time out pretty quickly. If it times out
    before you complete this page, the entire app description disappears, and you’ll
    have to start over. That’s why we prepared the icon and screenshots beforehand.


    ## Prepare for Upload


    After filling out the data in the previous section and then advancing to the next
    page, we’re almost done. The app status is now **Prepare to Upload** ([Figure
    11-22](#9781430248750_Ch11.xhtml#Fig22)).


    ![9781430248750_Fig11-22.jpg](images/9781430248750_Fig11-22.jpg)


    [Figure 11-22](#9781430248750_Ch11.xhtml#_Fig22). The app in **Prepare for Upload**
    status


    Before you can submit your app you have to click the **View Details** button,
    which returns to the Version Information page ([Figure 11-23](#9781430248750_Ch11.xhtml#Fig23)).


    ![9781430248750_Fig11-23.jpg](images/9781430248750_Fig11-23.jpg)


    [Figure 11-23](#9781430248750_Ch11.xhtml#_Fig23). The **Ready to Upload Binary**
    button in iTunes Connect


    That page now has a **Ready to Upload Binary** button in the upper right. Click
    that and `iTunes Connect` will ask you if the app uses cryptography, for consideration
    of export laws ([Figure 11-24](#9781430248750_Ch11.xhtml#Fig24)).


    ![9781430248750_Fig11-24.jpg](images/9781430248750_Fig11-24.jpg)


    [Figure 11-24](#9781430248750_Ch11.xhtml#_Fig24). Checking if the app has encryption
    in iTunes Connect


    Finally, `iTunes Connect` will present you with a message saying you can upload
    the app using a program called `Application Loader`. Ignore that—you can upload
    the app directly from `Xcode` (and the message is obsolete anyway). After that,
    you’re back in the app page, now showing **Waiting for Upload** as the app’s status
    ([Figure 11-25](#9781430248750_Ch11.xhtml#Fig25)).


    > **Caution**   The status colors for **Prepare to Upload** and **Waiting for
    Upload** are indistinguishable, so it’s easy to forget to go through the **Prepare
    for Upload** steps.


    ![9781430248750_Fig11-25.jpg](images/9781430248750_Fig11-25.jpg)


    [Figure 11-25](#9781430248750_Ch11.xhtml#_Fig25). An app in **Waiting for Upload**
    status in iTunes Connect


    ## Submit the App


    Now you’re ready to submit your app. Go back to `Xcode` and select your project
    and the build target. In **Build Settings**, scroll down and select the **Distribution
    Provisioning Profile** ([Figure 11-26](#9781430248750_Ch11.xhtml#Fig26)).


    ![9781430248750_Fig11-26.jpg](images/9781430248750_Fig11-26.jpg)


    [Figure 11-26](#9781430248750_Ch11.xhtml#_Fig26). Selecting a distribution provisioning
    profile for a Release build in Xcode


    From the **Project** menu in the menu bar, select **Clean**, which will ensure
    that you rebuild everything with the **Distribution Provisioning Profile** ([Figure
    11-27](#9781430248750_Ch11.xhtml#Fig27)).


    ![9781430248750_Fig11-27.jpg](images/9781430248750_Fig11-27.jpg)


    [Figure 11-27](#9781430248750_Ch11.xhtml#_Fig27). Clean the build before archiving
    in Xcode


    Then select **Archive**, which will build a distribution version of the app ([Figure
    11-28](#9781430248750_Ch11.xhtml#Fig28)).


    ![9781430248750_Fig11-28.jpg](images/9781430248750_Fig11-28.jpg)


    [Figure 11-28](#9781430248750_Ch11.xhtml#_Fig28). Archiving a build for distribution
    in Xcode


    When the build is complete, the **Organizer** window will appear showing the app,
    with buttons to **Validate** and **Distribute** ([Figure 11-29](#9781430248750_Ch11.xhtml#Fig29)).


    ![9781430248750_Fig11-29.jpg](images/9781430248750_Fig11-29.jpg)


    [Figure 11-29](#9781430248750_Ch11.xhtml#_Fig29). An archived distribution build
    in the Xcode Organizer window'
