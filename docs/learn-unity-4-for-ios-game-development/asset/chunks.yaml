  trans: '

    带有排行榜和成就按钮的暂停菜单


    `Social` 类提供了查询 Game Center 排行榜和成就信息的功能，可用于构建自定义显示界面。但更简单的方法是直接调用 `Social.ShowLeaderboardUI`
    和 `Social.ShowAchievementsUI` 函数，分别调出标准的 Game Center 排行榜和成就展示界面。因此，高分按钮调用 `Social.ShowLeaderboardUI`，而
    `成就` 按钮调用 `Social.ShowAchievementsUI`。


    当你运行 Fugu Bowl 并成功连接到 Game Center，然后点击新的 Game Center 按钮之一时，会显示标准的 Game Center
    界面。图 14-19 展示了点击“成就”按钮后的结果。


    ![9781430248750_Fig14-19.jpg](img/9781430248750_Fig14-19.jpg)


    图 14-19. 使用 `Social.ShowAchievementsUI` 显示的游戏内成就


    其显示效果与 Game Center 应用类似，但更为简单。例如，游戏内显示不需要那些将视图切换到 Game Center 应用其他部分的所有导航按钮。此外，iPad
    版本的显示效果差异很大，因为 iPad 拥有更大的屏幕空间。


    你可能认为我们应该在 `FuguGameCenter` 中为这两个调用添加封装函数，但这些函数非常简单，没有必要这么做。它们不接受成功回调函数作为参数，并且事先检查
    `Social.localUser.authenticated` 也非必要。事实上，最好不要检查，因为如果当前没有 Game Center 登录状态，`Social.ShowLeaderboardUI`
    和 `Social.ShowAchievementsUI` 都会向玩家发出用户友好的提示。


    与游戏控制器代码的更改一样，增强后的暂停菜单只需增加几行代码，因此这里不完整重列 `FuguPause.js` 的代码。修改后的脚本位于本章的项目文件中，可从
    `http://learnunity4.com/` 获取。


    ## 进一步探索


    这是效率较高的脚本编写章节之一。只需几行代码，我们的游戏就能连接到 Game Center、提交成就和分数、并通过暂停菜单展示成就和排行榜！


    大部分工作都花在了 iTunes Connect 上的 Game Center 设置上。即便如此，为保龄球游戏设计排行榜和成就集也相当直接，因为其规则和传统定义得非常明确。如果你设计一款新游戏，很可能会需要思考游戏中需要哪些排行榜和成就，并且可能应该在设计过程的早期就考虑这个问题。


    ## 脚本参考


    本章几乎专门使用了“Social”类来访问本章所用的 Game Center 功能。该类的“脚本参考”页面解释了它在封装对 Game Center 以及其他潜在社交游戏平台（尽管目前
    Game Center 是唯一的一个）的访问中所扮演的角色。


    我们只使用了报告分数和成就以及显示结果所需的最少函数集：访问 `Social.localUser` 以连接到 Game Center，调用 `Social.ReportProgress`
    和 `Social.ReportScore` 分别提交成就和分数，以及调用 `Social.ShowAchievementsUI` 和 `Social.ShowLeaderboardUI`
    以调出 Game Center 展示玩家成就和游戏排行榜的界面。`Social` 类的文档列出了其他几个函数，这些函数允许更精细的控制，例如，从 Game
    Center 检索信息以填充自定义的排行榜显示。


    我们绕过了 `Social`，直接访问了 `GameCenterPlatform` 类来调用其 `showDefaultAchievementsCompletionBanner`
    函数，从而启用了 iOS 5 风格的成就横幅。


    `GameCenterPlatform` 类的页面说明了它所在的命名空间，并包含一些关于 Game Center 沙箱的说明。


    ## iOS 开发者库


    iTunes Connect 开发者指南中的 Game Center 章节是设置成就和排行榜的权威来源。该指南可在 iOS 开发者库（可在 `http://developer.apple.com/library/ios`
    或 Xcode Organizer 中找到）中找到。


    Game Center 的内部工作原理在 iOS 开发者库中“网络与互联网”主题下的“Game Center 编程指南”中有详细说明。Game Center
    中可以集成到应用程序中的部分（与 Apple 运营的服务器部分相对）实际上被称为 Game Kit，并且还支持网络多人游戏。


    ## 资源商店


    Game Center 并非 iOS 上唯一可用的社交游戏平台。许多平台都来了又走（如 OpenFeint、Agon Online），但仍有一些其他选择。在其“服务”类别下，资源商店提供了
    PlayHaven (`http://playhaven.com/`) 和 Swarm (`http://swarmconnect.com/`) 的插件，两者都提供排行榜、成就和其他社交游戏功能。另一个来自
    Hippo Games 的 Game Center 插件，列在“脚本/集成”类别下。


    在 Unity 内置 Game Center 支持之前，Prime31 Studios 提供了一个 Game Center 插件，该插件在 `http://prime31.com/`
    上仍然可用（但不在资源商店中），对于需要 Unity 未提供某些功能的开发者来说，这是一个选择。例如，Prime31 插件包含一个发布成就挑战的功能（这是
    iOS 6 的一项功能）。Prime31 还提供了一个用于多人游戏支持的 Game Kit 插件，该插件可在资源商店中找到。


    # 第 15 章：iAd：横幅广告和插页广告


    坦率地说，在如今这个免费增值的时代，让很多人为应用付费并不容易。因此，一种替代方案是整合广告。iAd 并非唯一可用的移动广告产品，但它是 iOS 官方的广告服务，向开发者支付
    70% 的收入，这与付费应用销售的份额相同。而且，方便的是，Unity 为 iAd 提供了脚本支持。在本章中，我们将把 iAd 提供的两种广告类型——横幅广告和插页式（全屏）广告——整合到我们的保龄球游戏中。


    `http://learnunity4.com/` 上本章的项目文件包含了本章开发的 iAd 脚本，足以演示 iAd 功能。但是，即使你从该项目开始以避免手动添加脚本，你仍然需要在
    iTunes Connect 中启用 iAd。


    ## iTunes Connect


    与 Game Center 类似，除了在脚本中调用 Unity 的 iAd 函数外，你还需要在 iTunes Connect 上为我们的应用启用 iAd。除了“管理应用”页面外，iTunes
    Connect 还有另外两个与 iAd 相关的页面：“合同、银行和税务”页面以及“iAd 网络”页面（图 15-1）。


    ![9781430248750_Fig15-01.jpg](img/9781430248750_Fig15-01.jpg)


    图 15-1. iTunes Connect 上与 iAd 相关的页面


    ### 签署合同


    你需要访问的第一个页面是“合同、银行和税务”页面，以便同意 Apple 的 iAd 合同，就像你必须同意付费销售合同才能开始对应用收费一样。


    一旦 iAd 合同处理完毕，如 图 15-2 所示，你就可以为各个应用启用 iAd 了。


    ![9781430248750_Fig15-02.jpg](img/9781430248750_Fig15-02.jpg)


    图 15-2. 在 iTunes Connect 上列出的已完成的 iAd 网络合同


    ### 启用 iAd


    就像你对 Game Center 所做的那样，通过进入 iTunes Connect 的“管理应用”页面，选择 Fugu Bowl，并访问其“应用信息”页面，为
    Fugu Bowl 启用 iAd。

