- fmt: '[Figure 3-39](#9781430248750_Ch03.xhtml#_Fig39). The Project View of a newly
    imported texture


    Select the texture and examine its Import Settings in the Inspector View ([Figure
    3-40](#9781430248750_Ch03.xhtml#Fig40)). The default Texture Type, `Texture`,
    is the preset type that is generally suitable for textures applied to models.
    If there are unapplied Import Settings, the `Apply` button is enabled and should
    be clicked (or Unity will prompt you to when it tries to use the texture).


    ![9781430248750_Fig03-40.jpg](images/9781430248750_Fig03-40.jpg)


    [Figure 3-40](#9781430248750_Ch03.xhtml#_Fig40). The Inspector View of an imported
    texture


    Notice how the Preview panel at the bottom summarizes the imported size and format
    of the Texture. The original image file has not been changed in any way, so importing
    the file effectively creates a duplicate of the original that is appropriate for
    our target platform. You never have to worry about messing up the original asset.
    In fact, you can always start over by right-clicking it in the Project View and
    selecting `Reimport`.


    **Note**   We’ve been using the term *texture* generically and without capitalization.
    There actually is a `Texture` class, that is the parent class of all types of
    textures, but the actual class name of the texture asset created by importing
    an image file is `Texture2D` (the other subclasses of `Texture` include `Texture3D`,
    `MovieTexture` and `RenderTexture`).


    To apply the texture to the Cube, drag the texture onto the Cube in the Hierarchy
    View. This automatically creates a Material using the texture and applies that
    Material to the Cube, replacing the previous Material that was there. ([Figure
    3-41](#9781430248750_Ch03.xhtml#Fig41)).


    ![9781430248750_Fig03-41.jpg](images/9781430248750_Fig03-41.jpg)


    [Figure 3-41](#9781430248750_Ch03.xhtml#_Fig41). A texture applied to the Cube


    In the Project View, you can now see the newly created Material is placed in a
    Materials folder located by the texture. Now if you click Play again, the Cube
    looks cool! ([Figure 3-42](#9781430248750_Ch03.xhtml#Fig42)).


    ![9781430248750_Fig03-42.jpg](images/9781430248750_Fig03-42.jpg)


    [Figure 3-42](#9781430248750_Ch03.xhtml#_Fig42). The Game View of the textured
    Cube


    ## Shop the Asset Store


    Unity doesn’t have a built-in texture library in Standard Assets (although there
    are many textures used in the various packages). However, the Unity Asset Store,
    a marketplace of Unity-ready assets, has several free texture packs. Conveniently,
    the Asset Store is integrated into the Unity Editor. Under the Window menu ([Figure
    3-43](#9781430248750_Ch03.xhtml#Fig43)), select the Asset Store item.


    ![9781430248750_Fig03-43.jpg](images/9781430248750_Fig03-43.jpg)


    [Figure 3-43](#9781430248750_Ch03.xhtml#_Fig43). Selecting the Asset Store from
    the Window menu


    This will bring up the Asset Store window and display the Asset Store front page
    ([Figure 3-44](#9781430248750_Ch03.xhtml#Fig44)), which lists the latest releases
    (both paid and free), categories, and featured items.


    ![9781430248750_Fig03-44.jpg](images/9781430248750_Fig03-44.jpg)


    [Figure 3-44](#9781430248750_Ch03.xhtml#_Fig44). The Unity Asset Store


    Let’s look for some free textures. Click the Textures & Materials category in
    the upper-right section of the page, and then select Price in the Sort By section
    on the left ([Figure 3-45](#9781430248750_Ch03.xhtml#Fig45)).


    ![9781430248750_Fig03-45.jpg](images/9781430248750_Fig03-45.jpg)


    [Figure 3-45](#9781430248750_Ch03.xhtml#_Fig45). Free textures on the Asset Store


    There are plenty of good candidates here, but if you scroll down, you should be
    able find to my favorite free texture library, the Free ArtskillZ Texture Pack.
    Click it to see the full product page ([Figure 3-46](#9781430248750_Ch03.xhtml#Fig46)).
    It includes the product description, screenshots, list of the individual files,
    and reviews.


    ![9781430248750_Fig03-46.jpg](images/9781430248750_Fig03-46.jpg)


    [Figure 3-46](#9781430248750_Ch03.xhtml#_Fig46). The Free ArtskillZ Texture Pack
    on the Asset Store


    ## Import the Texture


    Click the `Import` button, and you’ll see the same type of Import window that
    you saw when importing the built-in Unity assets. Go ahead and import everything.


    Now you’ll find all those textures in your Project View, separated into three
    folders categorizing them by genre ([Figure 3-47](#9781430248750_Ch03.xhtml#Fig47)).


    ![9781430248750_Fig03-47.jpg](images/9781430248750_Fig03-47.jpg)


    [Figure 3-47](#9781430248750_Ch03.xhtml#_Fig47). The Project View of the ArtskillZ
    Textures


    The textures displayed with blue icons are normal maps and are listed as such
    in their Texture Type fields. A normal map gives the illusion of a nonflat surface
    (sometimes the term *bump map* is used, although it’s not technically exactly
    the same).


    ## Apply the Texture


    For starters, we’ll try the `ScifiPanel01` Texture. Drag it to the Cube and Unity
    automatically creates a new Material named after the texture and applies that
    Material to the Cube. But we want to use the normal map that accompanies that
    texture, so use the Shader selector of the Material in the Inspector View to change
    the shader to `Bumped Specular`. This shader accepts a second texture labelled
    Normalmap and also has a slider to control the Shininess property (it should be
    noted that the slider moves left to approach 1 and right to approach 0). Drag
    the normal map texture, `ScifiPanel01_n`, into the Normalmap field ([Figure 3-48](#9781430248750_Ch03.xhtml#Fig48)).


    ![9781430248750_Fig03-48.jpg](images/9781430248750_Fig03-48.jpg)


    [Figure 3-48](#9781430248750_Ch03.xhtml#_Fig48). Scifi Texture applied to the
    Cube


    Click Play, and you’ll now see the textured Cube ([Figure 3-49](#9781430248750_Ch03.xhtml#Fig49)).


    ![9781430248750_Fig03-49.jpg](images/9781430248750_Fig03-49.jpg)


    [Figure 3-49](#9781430248750_Ch03.xhtml#_Fig49). The Game View of the Cube with
    a specular bump map texture


    You could have also searched for free textures using the search field in the Project
    View. We''ll use that option in ensuing chapters as we make use of more Asset
    Store packages.


    ## Explore Further


    This chapter may have seemed like it covered a lot of material (no pun intended)
    just to create a simple static scene, but a lot of basic Unity concepts were explored
    along the way, particularly the relationship between Components and GameObjects.
    As a result, now you have a scene with a bump-mapped and textured Cube, illuminated
    by a Point Light that’s sporting a Flare, and surrounded by a Skybox. The scene
    was populated with assets imported from local files, the Unity Standard Assets,
    and the Unity Asset Store. And the scene isn’t completely static, due to the `MouseOrbit`
    script attached to the Main Camera. Scripting will play a dominant role in this
    book, starting with the next chapter as we move beyond a static scene.


    Before moving on to that, take a break and go over the official Unity documentation
    on the features used so far, if only to get familiar with where to find this documentation
    for future reference.


    ### Unity Manual


    The Unity Basics section of the Unity Manual was mostly relevant to the previous
    chapter, describing the user interface, but that section does have a “Creating
    Scenes” page. More relevant is the “Building a Scene” section, which describes
    the relationship among GameObjects, Components, and scripts, how to use the Inspector
    View to edit Component properties, and how to navigate the Scene View and move
    GameObjects, all of which was covered in this chapter. Lights and Cameras are
    also explained. One feature listed in this section that won’t be used in this
    book is the Terrain Engine (it is available in Unity iOS but slow). Terrain is
    a significant and impressive Unity feature, though, so it’s worth a read.The “Asset
    Import and Creation” section describes the asset types used in this chapter: Meshes,
    Materials, textures and scripts. The process of importing assets and the Asset
    Store are also explained.'
