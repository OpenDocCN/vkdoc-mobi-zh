    Scene View Options


    The buttons lining the top of the Scene View provide display options to assist
    in your game development. Each button configures a view mode.


    The leftmost button sets the Draw mode. Normally, this mode is set to Textured,
    but if you want to see all the polygons, you can set it to Wireframe ([Figure
    2-41](#9781430248750_Ch02.xhtml#Fig41)).


    ![9781430248750_Fig02-41.jpg](images/9781430248750_Fig02-41.jpg)


    [Figure 2-41](#9781430248750_Ch02.xhtml#_Fig41). Wireframe display in the Scene
    view


    The next button sets the Render Paths, which controls whether the scene is colored
    normally or for diagnostics.


    The three buttons to the right of the Render Paths mode button are simple toggle
    buttons. They each pop up some mouse-over documentation (otherwise known as *tooltips*)
    when you let the mouse hover over them.


    The first of those controls the Scene Lighting mode. This toggles between using
    a default lighting scheme in the Scene View or the actual lights you’ve placed
    in the game.


    The middle button toggles the Game Overlay mode, whether the sky, lens flare,
    and fog effects are visible.


    And finally, there is the Audition Mode, which toggles sound on and off.


    Scene View Gizmos


    The Gizmos button on the right activates displays of diagnostic graphics associated
    with the Components. The Scene View in [Figure 2-42](#9781430248750_Ch02.xhtml#Fig42)
    shows several gizmos (not to be confused with the Scene Gizmo that controls the
    Scene View camera). By clicking the Gizmos button and checking the list of available
    gizmos, you can see those icons represent a Camera, a couple of AudioSources,
    and a few Lights.


    ![9781430248750_Fig02-42.jpg](images/9781430248750_Fig02-42.jpg)


    [Figure 2-42](#9781430248750_Ch02.xhtml#_Fig42). Gizmos in the Scene View


    You can select and deselect the various checkboxes in the Gizmos window to focus
    on the objects you’re interested in. The checkboxes at the top left toggles between
    a 3D display of the gizmos or just 2D icons. The adjacent slider controls the
    scale of the gizmos (so a quick way to hide all gizmos is to drag the scale slider
    all the way to the left).


    The Game View


    Now let’s go back to the Game View, which you encountered when playing Angry Bots
    in the Editor. Like the Hierarchy View and Scene View, the Game View depicts the
    current scene, but not for editing purposes. Instead, the Game View is intended
    for playing and debugging the game.


    The Game View appears automatically when you click the Play button at the top
    of the Unity Editor window. If there isn’t an existing Game View when you click
    Play, a new one is created. If the Game view is visible while the Editor is not
    in Play mode, it shows the game in its initial state (i.e., from the vantage of
    the initial Camera position).


    The Game View shows how the game will look and function when you actually deploy
    it, but there may be discrepancies from how it will look and behave on the final
    build target. One possible difference is the size and aspect ratio of the Game
    View. This can be changed using the menu at the top left of the view. [Figure
    2-43](#9781430248750_Ch02.xhtml#Fig43) shows what happens when you switch from
    the Free Aspect ratio, which adjusts to the dimensions of the view, to a 5:4 aspect
    ratio, which results in the scaling down the game display so that it fits within
    the area and maintains the chosen aspect ratio.


    ![9781430248750_Fig02-43.jpg](images/9781430248750_Fig02-43.jpg)


    [Figure 2-43](#9781430248750_Ch02.xhtml#_Fig43). The Game View


    Maximize on Play


    Clicking the Maximize on Play button will result in the Game View expanding to
    fill the entire Editor window when it is in the Play mode ([Figure 2-44](#9781430248750_Ch02.xhtml#Fig44)).
    If the view is detached from the Editor window, the button has no effect.


    ![9781430248750_Fig02-44.jpg](images/9781430248750_Fig02-44.jpg)


    [Figure 2-44](#9781430248750_Ch02.xhtml#_Fig44). Game View with Maximize on Play


    Stats


    The Stats button displays statistics about the scene ([Figure 2-45](#9781430248750_Ch02.xhtml#Fig45))
    that update as the game runs.


    ![9781430248750_Fig02-45.jpg](images/9781430248750_Fig02-45.jpg)


    [Figure 2-45](#9781430248750_Ch02.xhtml#_Fig45). Game View with Stats


    Game View Gizmos


    The Gizmos button activates displays of diagnostic graphics associated with the
    Components. The Game View in [Figure 2-46](#9781430248750_Ch02.xhtml#Fig46) shows
    two icons that are gizmos for lights. The light gizmo located at the player’s
    position also reveals the light radius (i.e., the area affected by the light).
    The list to the right of the Gizmos button allows you to select which gizmos you
    want displayed.


    ![9781430248750_Fig02-46.jpg](images/9781430248750_Fig02-46.jpg)


    [Figure 2-46](#9781430248750_Ch02.xhtml#_Fig46). The Game View with Gizmos


    Both the Game View and Scene View are both depictions of the current scene. A
    Unity project consists of one or more scenes, and the Unity Editor has one scene
    open at a time. Think of the project as a game and the scenes as levels (in fact,
    some Unity script functions that operate on scenes use “level” in their names).
    Unity GameObjects are made interesting by attaching Components, each of which
    provides some specific information or behavior. That’s where the Inspector View
    comes in. If you select a game object in the Hierarchy View or Scene View, the
    Inspector View will display its attached components.


    The Console View


    The remaining view in all the preset layouts, the Console View, is easy to ignore
    but it’s pretty useful ([Figure 2-47](#9781430248750_Ch02.xhtml#Fig47)).


    ![9781430248750_Fig02-47.jpg](images/9781430248750_Fig02-47.jpg)


    [Figure 2-47](#9781430248750_Ch02.xhtml#_Fig47). The Console View'
