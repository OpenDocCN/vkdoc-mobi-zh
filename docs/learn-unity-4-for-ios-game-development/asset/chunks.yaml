    script.


    [Listing 13-3](#9781430248750_Ch13.xhtml#_list3).  Detecting a Mouse Click in
    FuguDebugMouse.js


    ```

    #pragma strict


    function OnMouseDown () {

            Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


