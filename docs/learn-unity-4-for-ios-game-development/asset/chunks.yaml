- fmt: "On the top right, in the same section as the Game Center button, is the Manage\
    \ iAd Network button ([Figure 15-3](#9781430248750_Ch15.xhtml#Fig3)).  \n![9781430248750_Fig15-03.jpg](images/9781430248750_Fig15-03.jpg)\
    \  \n[Figure 15-3](#9781430248750_Ch15.xhtml#_Fig3). The top portion of the App\
    \ Information page in iTunes Connect\n\nClick the Manage iAd Network button to\
    \ start the process of enabling iAd. It’s much simpler than enabling the Game\
    \ Center. No leaderboards or achievements to set up, just click the Enable iAd\
    \ Network button ([Figure 15-4](#9781430248750_Ch15.xhtml#Fig4)).  \n![9781430248750_Fig15-04.jpg](images/9781430248750_Fig15-04.jpg)\
    \  \n[Figure 15-4](#9781430248750_Ch15.xhtml#_Fig4). Enabling iAd on iTunes Connect\n\
    \nLike Game Center, iAd can only be enabled or disabled for an app after a New\
    \ Version of the app has been added to iTunes Connect and before that version\
    \ has been approved and released. The iAd change will affect that upcoming version,\
    \ and there’s no way to change the iAd status of an app already on the App Store.\n\
    \n**Tip**  \nI’ve had apps rejected for having screenshots that showed test ads,\
    \ so you may want to take screenshots of your app before enabling iAd.\n\niAd\
    \ is now enabled for our app on the server side, and you just need to add the\
    \ code for iAd to the app itself.\n\n## Add a Banner Ad\n\nLet’s start by adding\
    \ a banner ad to our bowling game. Unlike, interstitial ads, which only run on\
    \ iPads, banner ads run on all devices. And frankly, banner ads are easier to\
    \ incorporate in a game. You just need to allocate some space at the top or bottom\
    \ of the screen.\n\n**Tip**  \nThink about where to incorporate ads when designing\
    \ the app, not as an afterthought.\n\n### Create the Script\n\nSimilar to how\
    \ we created a script in the previous chapter to initialize the Game Center, let’s\
    \ write a script to instantiate and place a banner ad. Create a new JavaScript\
    \ in the Project View, place it in the Scripts folder, and name it `FuguAdBanner`\
    \ ([Figure 15-5](#9781430248750_Ch15.xhtml#Fig5)).  \n![9781430248750_Fig15-05.jpg](images/9781430248750_Fig15-05.jpg)\
    \  \n[Figure 15-5](#9781430248750_Ch15.xhtml#_Fig5). Creating the FuguAdBanner\
    \ script\n\nThen edit the script and add the contents of [Listing 15-1](#9781430248750_Ch15.xhtml#list1)\
    \ to it.\n\n[Listing 15-1](#9781430248750_Ch15.xhtml#_list1). The Complete Listing\
    \ of FuguAdBanner.js\n\n```\n#pragma strict\n\npublic var showOnTop:boolean =\
    \ true; // banner on top or bottom of screen\npublic var dontDestroy:boolean =\
    \ false; // keep this GameObject around for next scene\n\n#if UNITY_IPHONE\n\n\
    // don't make this a local variable, or else it'll get garbage collected\nprivate\
    \ var banner:ADBannerView;\n\nfunction Start () {\n        if (dontDestroy) {\n\
    \                GameObject.DontDestroyOnLoad(gameObject); // keep ad alive across\
    \ scenes\n        }\n        Debug.Log(\"Creating iAd banner\");\n        banner\
    \ = new ADBannerView();\n        banner.autoSize = true;\n        banner.autoPosition\
    \ = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n        while (!banner.loaded\
    \ && banner.error == null) {\n                yield;\n        }\n        if (banner.error\
    \ == null) {\n                Debug.Log(\"iAd banner shown\");\n             \
    \   banner.Show();\n        } else {\n                Debug.Log(\"iAd banner error:\
    \ \"+banner.error.description);\n                banner = null;\n        }\n}\n\
    #endif\n```\n\nThe code in `FuguAdBanner` is similar to the Scripting Reference\
    \ example for `AdBannerView`. The `Start` callback creates an `AdBannerView` instance\
    \ and waits in a `while` loop for either the banner to load, indicated by the\
    \ `loaded` variable of the `AdBannerView`, or for an error to happen, indicated\
    \ by the `error` variable in `AdBannerView`. The `while` loop calls `yield` to\
    \ avoid blocking the rest of the game from running.\n\nIf there is an error, the\
    \ error message is logged with `Debug.Log`.\n\nIf the banner has loaded successfully,\
    \ the ad will immediately display by with a call to the `Show` function of `AdBannerView`.\
    \ You can call `Show` and `Hide` on the ad at any time, but with banner ads, the\
    \ easy thing to do is just leave it up.\n\n### The Variables\n\nTo provide some\
    \ flexibility and reuse of the script, let’s add a couple of public boolean variables,\
    \ which will show up as check boxes in the Inspector View. The `ShowOnTop` variable\
    \ determines whether the banner is displayed at the top or the bottom of the screen\
    \ (the only two options), by passing in the `enum` values `AdPosition.Top` or\
    \ `AdPosition.Bottom` accordingly. The iAd banners are automatically sized correctly\
    \ to stretch across the screen.\n\nIf the other variable, `DontDestroy`, is true,\
    \ then we call the static function `GameObject.DontDestroyOnLoad`, passing in\
    \ the GameObject the script is attached to. This keeps the GameObject alive if\
    \ another level is loaded, so if you have multiple scenes, you don’t have to add\
    \ an `AdBanner` GameObject to each one.\n\n**Caution**  \nCalling `GameObject.DontDestroyOnLoad`\
    \ in a scene that will be loaded again later can result in duplicate GameObjects.\n\
    \nFor example, if you place your `AdBanner` GameObject in the splash scene instead\
    \ of the bowling scene, setting `dontDestroy` to `true` will allow the banner\
    \ ad to persist through the load of the bowling scene without getting destroyed.\n\
    \n### Garbage Collection\n\nSpeaking of destroyed objects, notice that we declare\
    \ the `banner` variable outside the `Start` function, although it looks like it\
    \ could have been declared inside. Normally, it’s better to declare variables\
    \ within the narrowest scope possible, but in this case, you want the `ADBannerView`\
    \ to exist as long as this GameObject exists. If you declare `banner` as a variable\
    \ inside the `Start` function, then there is no reference to the `ADBannerView`\
    \ object after the `Start` function returns, and the object can be destroyed at\
    \ any time to free up the memory it’s taking up, and the ads will disappear as\
    \ soon as that happens.\n\nThis reclamation process is called *garbage collection*\
    \ (GC), as objects that are lying around with no way for code to access them are\
    \ effectively garbage. GC is not an issue for objects in the scene (basically\
    \ anything whose class is a subclass of `UnityEngine.Object`), because as long\
    \ as they are in the scene there is an implicit reference to them. Generally,\
    \ those objects have to be explicitly cleaned up with a call to the static `Destroy`\
    \ function of the `UnityEngine.Object` class.\n\n### Attach the Script\n\nTo add\
    \ the `FuguAdBanner` script to the bowling scene, make sure that scene is open,\
    \ create a new GameObject in the Hierarchy View, name it `AdBanner`, and drag\
    \ the `FuguAdBanner` script onto it ([Figure 15-6](#9781430248750_Ch15.xhtml#Fig6)).\
    \  \n![9781430248750_Fig15-06.jpg](images/9781430248750_Fig15-06.jpg)  \n[Figure\
    \ 15-6](#9781430248750_Ch15.xhtml#_Fig6). The FuguAdBanner script added to the\
    \ scene\n\nBecause we have our scoreboard at the top of the screen, the banner\
    \ ad is best left at the bottom, so leave `Show On Top` unchecked. And because\
    \ the `AdBanner` GameObject is placed in the bowling scene, which doesn’t load\
    \ any other scene, it doesn’t really matter whether you call `DontDestroyOnLoad`\
    \ or not, but let’s leave `DontDestroy` unchecked, too.\n\n### Test the Script\n\
    \nAn iAd won’t show up when running the game in the Editor, but you can test it\
    \ by running the game in the iOS Simulator or on a device. Until the app is approved,\
    \ it will show only test ads, as shown in [Figure 15-7](#9781430248750_Ch15.xhtml#Fig7).\
    \  \n![9781430248750_Fig15-07.jpg](images/9781430248750_Fig15-07.jpg)  \n[Figure\
    \ 15-7](#9781430248750_Ch15.xhtml#_Fig7). A test iAd banner\n\nIf an ad doesn’t\
    \ appear, check the Xcode debug area for the `Debug.Log` error messages emitted\
    \ by the `FuguAdBanner` script. But if there are no error messages, don’t worry."
