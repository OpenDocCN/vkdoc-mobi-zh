- fmt: "```csharp\nfunction WaitForSeconds(waitTime:float) {\n        var startTime:float\
    \ = Time.time;\n        while (waitTime > Time.time-startTime) {\n           \
    \      yield;\n        }\n}\n```\n\n注意，指定的等待时间是游戏时间而非真实世界时间，因此`WaitForSeconds`在游戏暂停且游戏时间停止时无实用价值。但若需按真实秒数等待，可使用假设实现的`WaitForSeconds`，将`Time.time`替换为`Time.realtimeSinceStartup`（返回游戏启动以来的真实世界秒数）（[清单12-7](#9781430248750_Ch12.xhtml#list7)）。\n\
    \n[清单12-7](#9781430248750_Ch12.xhtml#_list7).  `WaitForSeconds`的实时版本\n\n```csharp\n\
    function WaitForSecondsRealtime(waitTime:float) {\n        var startTime:float\
    \ = Time.realtimeSinceStartup;\n        while (waitTime > Time.realtimeSinceStartup-startTime)\
    \ {\n                 yield;\n        }\n}\n```\n\n## 显示活动指示器\n\n当某些操作需要耗时执行时，最好能有某种加载指示器。对于初始场景加载，有一种便捷方式可显示iOS应用中常见的旋转指示器。在玩家设置（Player\
    \ Settings）的“分辨率与演示”折叠面板底部的“显示加载指示器”选项中，选择一个活动指示器样式即可启用该功能（[图12-17](#9781430248750_Ch12.xhtml#Fig17)）。由于启动画面提供的是偏白色背景，灰色（Gray）是最佳样式（其他样式为白色）。\n\
    \n![9781430248750_Fig12-17.jpg](images/9781430248750_Fig12-17.jpg)\n\n[图12-17](#9781430248750_Ch12.xhtml#_Fig17).\
    \ 玩家设置中选中灰色显示加载指示器\n\n现在，当你在iOS构建版本中运行游戏时，将看到灰色活动指示器在内置启动画面上旋转。\n\n## 编写活动指示器脚本\n\
    \n能在其他场景（尤其在加载其他关卡时）使用活动指示器将非常理想。幸运的是，Unity通过`Handheld`类中的静态函数提供了活动指示器的脚本接口。我们只需编写一个调用这些函数来启动和停止活动指示器的脚本。新建一个名为`FuguSpinner`的JavaScript文件，并将[清单12-8](#9781430248750_Ch12.xhtml#list8)的内容添加到脚本中。\n\
    \n[清单12-8](#9781430248750_Ch12.xhtml#_list8).  在`FuguSpinner.js`中启动和停止活动指示器\n\n\
    ```csharp\n#pragma strict\n\n#if UNITY_IPHONE\nfunction Start() {\n        DontDestroyOnLoad(this.gameObject);\n\
    \        Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);\n\
    \        Handheld.StartActivityIndicator();\n}\n\nfunction OnLevelWasLoaded()\
    \ {\n        Handheld.StopActivityIndicator();\n        Destroy(gameObject);\n\
    }\n#endif\n```\n\n在`Start`回调中，调用`Handheld.SetActivityIndicatorStyle`指定活动指示器的外观。可用的选项由`iOSActivityIndicatorStyle`枚举表示，与玩家设置中的加载指示器选项匹配。我们选择`iOSActivityIndicatorStyle.WhiteLarge`，因为我们知道第二个启动画面主要是黑色背景。\n\
    \n调用`Handheld.StartActivityIndicator`可使活动指示器在屏幕中央显示。Unity脚本参考文档对`Handheld.StartActivityIndicator`的说明指出，活动指示器将在当前帧之后激活，因此在调用`Application.LoadLevel`前，至少需要`yield`一帧。否则，指示器只有在加载新关卡后才会出现，这违背了激活指示器的初衷。这里我们无需担心此问题，因为`FuguSplash`脚本在加载下一场景前会进行若干秒的`yield`。\n\
    \n然而，即使新场景被`FuguSplash`加载后，活动指示器仍会继续旋转。为在场景加载完成后停止活动指示器，此脚本必须能在场景加载过程中保持存活，因此在`Start`函数开头调用了`DontDestroyOnLoad`，并将此脚本所附加的游戏对象传递给它。这确保了该游戏对象（以及此脚本）在加载下一场景时得以存活。\n\
    \n由于游戏对象在场景加载过程中存活，我们可以确保新场景加载完成后会调用`MonoBehaviour`回调`OnLevelWasLoaded`。此处是调用`Handheld.StopActivityIndicator`关闭活动指示器的理想位置。此时，脚本及其附加的游戏对象不再需要，因此对游戏对象调用了`Destroy`。\n\
    \n**提示**   不再需要对象时将其销毁是一个好习惯。除了释放空间外，还能避免最坏情况：当你循环回到对象最初创建的场景时，最终会得到同一对象的两个版本！\n\
    \n请注意，`DontDestroyOnLoad`和`Destroy`都是`Object`类中的静态函数，因此正如我们在[第7章](#9781430248750_Ch07.xhtml)中调用`Instantiate`时那样，这里不显式调用`Object.Destroy`（或为避免与.NET中`System.Object`类名冲突而使用`UnityEngine.Object.Destroy`），而是隐式调用`this.Destroy`，因为`this`是一个`Object`。\n\
    \n将`FuguSpinner`脚本附加到场景中名为Spinner的新游戏对象上。现在在设备上构建并运行，活动指示器将出现在启动画面中央，并在下一场景加载完成后消失（[图12-18](#9781430248750_Ch12.xhtml#Fig18)）。\n\
    \n![9781430248750_Fig12-18.jpg](images/9781430248750_Fig12-18.jpg)\n\n[图12-18](#9781430248750_Ch12.xhtml#_Fig18).\
    \ 带有活动指示器的第二个启动画面\n\n## 进一步探索\n\n现在，我们的iOS保龄球游戏看起来像真正的应用了！它具有图标、启动画面（或两个）、启动画面上旋转的活动指示器、以竖屏方向运行，并且图形能适配屏幕，包括UnityGUI记分板和暂停菜单。甚至菜单在iOS中也能自动工作，按钮能响应屏幕点触。虽然还不能完全说游戏玩法也是如此，但我们将在下一章实现触摸屏游戏控制。\n\
    \n## 参考手册\n\n我们再次在玩家设置中花费了一些时间（现在制作iOS构建版本时，玩家设置成为反复出现的主题），因此值得回顾关于玩家设置的参考手册文档。\n\
    \n本章只使用了一个新组件：用于启动画面图像的`GUITexture`组件。`GUITexture`及其父类`GUIElement`与UnityGUI无关（事实上，在UnityGUI出现之前，`GUITexture`及其兄弟`GUIText`是最接近用户界面元素的东西）。\n\
    \n本章主要致力于图标和启动画面图像，这些图像应使用GUI预设导入设置导入，该设置在资产组件部分的`Texture2D`文档中有说明。\n\n## 脚本参考\n\
    \n本章介绍的唯一UnityGUI新特性是`GUI`类中的`matrix`变量。撰写本文时，该变量的脚本参考页面几乎为空白，但`GUIUtility`类有一些文档更完善的函数，包括`ScaleAroundPivot`，该函数可作为设置`GUI.matrix`的替代方案（实际上，它是一个内部设置`GUI.matrix`的辅助函数）。\n\
    \n我们只使用了`Matrix4x4.TRS`构造函数，但关于`Matrix4x4`的脚本参考文档质量不错，解释了Unity中矩阵的用法，并列举了许多类函数，当你需要开始处理矩阵时，这些函数会很有用。"
