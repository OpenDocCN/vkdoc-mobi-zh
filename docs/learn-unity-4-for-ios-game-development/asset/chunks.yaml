    another script, you would have to use the fully qualified name `Fugu.FrameRate`
    unless you added a `using Fugu;` statement at the top of the script.C# allows
    you to optionally prepend the class definition with `sealed`, which specifies
    that this class is not intended to be subclassed. A compiler error will result
    if you try to define a subclass of `FrameRate`. Java programmers will recognize
    this is the same as the Java `final` declaration.    In C#, coroutines must explicitly
    return type `IEnumerator` (which is in the `System.Collections` namespace and
    why it’s convenient to always import that namespace). Although Unity automatically
    adds a `Start` callback that returns void in newly created C# scripts, that `Start`
    callback can be turned into a coroutine by changing the return type from void
    to `IEnumerator`. But it seems kind of weird to change the return type of a callback,
    so I prefer to move the coroutine out of the `Start` callback and invoke the coroutine
    with `StartCoroutine`, as I did in the C# version of the `FuguAdBanner` script
    ([Listing 17-5](#9781430248750_Ch17.xhtml#list5)).    `StartCoroutine` can be
    called from any callback, so this technique has the advantage of providing a uniform
    way to invoke coroutines and makes it unnecessary to use callbacks directly as
    coroutines (and also makes it unnecessary to remember which callbacks can be used
    as coroutines). This is not a bad practice to apply in JavaScript, too.    [Listing
    17-5](#9781430248750_Ch17.xhtml#_list5).  A C# Version of the FuguAdBanner Script    ```
    using UnityEngine; using System.Collections;  namespace Fugu {  public class AdBanner
    : MonoBehaviour {                            public bool showOnTop = true;         public
    bool dontDestroy = true;                            private ADBannerView banner
    = null;                            void Start() {                 StartCoroutine
    (StartBanner());         }                            private IEnumerator StartBanner
    () {                 if (dontDestroy) {                         GameObject.DontDestroyOnLoad(gameObject);
                    }                 banner = new ADBannerView();                 banner.autoSize
    = true;                 banner.autoPosition = showOnTop ? ADPosition.Top : ADPosition.Bottom;
                    while (!banner.loaded && banner.error == null) {                         yield
    return null;                 }                 if (banner.error == null) {                         banner.Show();
                    }  else {                         banner = null;                 }
            } } } // end namespace ```    You also can’t just call `yield` within
    a coroutine as you did in JavaScript. In C#, you have to call `yield return null`
    to equivalently yield for a frame.    Another difference is the syntax of anonymous
    functions. In our `FuguGameCenter` script, I passed unnamed success or failure
    functions in the form of `function(success:boolean) {...}`, but in C#, anonymous
    functions are known as *lambda functions* (dating back to terminology from the
    Lisp language, which used `(lambda (success) ...)`) and is specified in the form
    `(bool success) => {.'
  trans: "\n尽管你可以在调用 `SetActiveRecursively` 之前检查某个对象是否被选中，但从用户界面设计的角度来看，更好的做法是在菜单项不会产生任何效果时将其禁用。你可以通过再次列出\
    \ `MenuItem` 属性来实现这一点，但这次需要额外添加一个 `true` 参数，该参数表示下一个函数是一个静态函数，只有当菜单项应处于激活状态时才会返回\
    \ `true`。`ActivateRecursively` 和 `DeactivateRecursively` 都使用 `ValidateGameObject`（该函数仅检查编辑器中是否选中了某个\
    \ `GameObject`）来决定菜单项是应可用还是应置灰。\n\n一旦此脚本编译完成，新菜单应如图 Figure 17-2 所示（可能会有延迟）。\n\n\
    ![9781430248750_Fig17-02.jpg](img/9781430248750_Fig17-02.jpg)\n\nFigure 17-2.\
    \ 使用编辑器脚本添加到菜单栏的菜单\n\n这个示例只具有极少的用户界面，仅包含一些菜单项，但编辑器脚本可以使用 UnityGUI 函数创建新的窗口和用户界面（实际上，编辑器本身就是用\
    \ UnityGUI 实现的，这就是为什么偶尔的编辑器错误会在控制台视图中显示为 UnityGUI 错误）。编辑器脚本还可用于批处理、导入后的资源后期处理，或者构建前的场景预处理。我有一些简单的编辑器脚本，它们可以删除构建文件、显示\
    \ `GameObject` 统计信息，甚至调用 macOS 的 `say` 命令，这样我就能和自己对话了。\n\n## C\\#\n\n本书中我一直专注于使用\
    \ Unity 的 JavaScript 作为脚本语言，因为，嗯，我必须选一个。但说真的，JavaScript 在 Unity 文档中的示例代码确实更多（尽管差距正在缩小），并且对于\
    \ JavaScript 和 Flash 开发者来说可能更熟悉。JavaScript 也比 C# 更简洁，至少对于小型脚本来说是这样。只需比较一下在项目视图中通过“创建”菜单生成的空\
    \ JavaScript 脚本 (Listing 17-2) 和 C# 脚本 (Listing 17-3) 即可。\n\nListing 17-2. 新创建的\
    \ JavaScript 脚本\n\n```javascript\n#pragma strict\n\nfunction Start () {\n\n}\n\
    \nfunction Update () {\n\n}\n```\n\nListing 17-3. 新创建的 C# 脚本\n\n```csharp\nusing\
    \ UnityEngine;\nusing System.Collections;\n\npublic class NewBehaviourScript :\
    \ MonoBehaviour {\n\n        // Use this for initialization\n        void Start\
    \ () {\n\n        }\n\n        // Update is called once per frame\n        void\
    \ Update () {\n\n        }\n}\n```\n\n在 C# 脚本中，类声明是显式的，你必须确保类名与脚本名匹配。在 C# 脚本顶部，显式导入了\
    \ Unity 脚本中常用的两个命名空间：`UnityEngine` 和 `System.Collections`——而在 JavaScript 中，它们是隐式导入的。\n\
    \n很多 JavaScript 代码只需少量修改即可在 C# 中运行，但二者存在一些语法差异：变量声明以 `<type> <name>` 开头，而不是 `var\
    \ <name>:<type>`。函数的定义方式相同，但以返回类型和名称开头，而不是以 `function` 开头。没有必要在 C# 文件中添加 `#pragma\
    \ strict`，因为 C# 本身就是强类型语言。\n\n对于小型脚本来说，JavaScript 更为便捷，但对于大规模的 Unity 开发而言，C# 可以说是更实用的选择，因为它是一种文档更完善的语言，并作为最流行的\
    \ Mono 或 .NET 语言经过了工业级的测试。此外，许多 Unity 扩展包都是用 C# 编写的（其中包括 Prime31 插件、EZGUI 和 NGUI），而在\
    \ Unity 中混用 JavaScript 和 C# 会很不方便；如果你的 JavaScript 代码引用了 C# 脚本，这些脚本必须放在 Plugins\
    \ 或 Standard Assets 文件夹中，以便它们更早地加载。\n\n使用 C# 的另一个原因是 Unity 4 中对 C# 增加了命名空间支持。这一特性使你可以省去为类名添加前缀以避免冲突的做法。例如，Listing\
    \ 17-4 展示了 `FuguFrameRate` 脚本的 C# 版本，其中类是在命名空间声明中定义的。\n\nListing 17-4. `FuguFrameRate`\
    \ 脚本的 C# 版本\n\n```csharp\nusing UnityEngine;\nusing System.Collections;\n\nnamespace\
    \ Fugu {\n\n   sealed public class FrameRate : MonoBehaviour {\n\n        public\
    \ int frameRate = 60;\n\n        void Awake () {\n               Application.targetFrameRate\
    \ = frameRate;\n        }\n\n   }\n\n} // 结束命名空间\n```\n\n由于该类位于命名空间 `Fugu` 内部，你可以安全地将该类简称为\
    \ `FrameRate`，并将脚本命名为 `FrameRate` 以匹配。如果你需要从另一个脚本中引用此类，则必须使用完全限定名 `Fugu.FrameRate`，除非你在脚本顶部添加了\
    \ `using Fugu;` 语句。C# 允许你选择性地在类定义前加上 `sealed`，这表示该类不打算被继承。如果你试图定义 `FrameRate`\
    \ 的子类，将会产生编译器错误。Java 程序员会识别出这与 Java 中的 `final` 声明相同。\n\n在 C# 中，协程必须显式地返回 `IEnumerator`\
    \ 类型（该类型位于 `System.Collections` 命名空间中，这也是始终导入该命名空间很方便的原因）。尽管 Unity 会在新创建的 C# 脚本中自动添加一个返回\
    \ `void` 的 `Start` 回调，但可以通过将返回类型从 `void` 改为 `IEnumerator`，将这个 `Start` 回调变成一个协程。但改变回调的返回类型似乎有点奇怪，因此我更喜欢将协程移出\
    \ `Start` 回调，并使用 `StartCoroutine` 来调用协程，就像我在 `FuguAdBanner` 脚本的 C# 版本中所做的那样 (Listing\
    \ 17-5)。\n\n`StartCoroutine` 可以从任何回调中调用，因此这种技术的优势在于提供了一种统一的调用协程的方式，使得无需直接使用回调作为协程（也无需记住哪些回调可以用作协程）。这种实践在\
    \ JavaScript 中同样适用。\n\nListing 17-5. `FuguAdBanner` 脚本的 C# 版本\n\n```csharp\nusing\
    \ UnityEngine;\nusing System.Collections;\n\nnamespace Fugu {\npublic class AdBanner\
    \ : MonoBehaviour {\n\n        public bool showOnTop = true;\n        public bool\
    \ dontDestroy = true;\n\n        private ADBannerView banner = null;\n\n     \
    \   void Start() {\n               StartCoroutine (StartBanner());\n        }\n\
    \n        private IEnumerator StartBanner () {\n               if (dontDestroy)\
    \ {\n                       GameObject.DontDestroyOnLoad(gameObject);\n      \
    \         }\n               banner = new ADBannerView();\n               banner.autoSize\
    \ = true;\n               banner.autoPosition = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n\
    \               while (!banner.loaded && banner.error == null) {\n           \
    \            yield return null;\n               }\n               if (banner.error\
    \ == null) {\n                       banner.Show();\n               } else {\n\
    \                       banner = null;\n               }\n        }\n}\n} // 结束命名空间\n\
    ```\n\n你也不能像在 JavaScript 中那样在协程内直接调用 `yield`。在 C# 中，你需要调用 `yield return null`\
    \ 来实现与一帧等效的暂停。\n\n另一个区别是匿名函数的语法。在我们的 `FuguGameCenter` 脚本中，我以 `function(success:boolean)\
    \ {...}` 的形式传递了未命名的成功或失败函数，但在 C# 中，匿名函数被称为 *lambda 函数*（这一术语源自 Lisp 语言，它使用 `(lambda\
    \ (success) ...)`），并以 `(bool success) => {` 的形式指定。\n"
- fmt: "[Listing 17-6](#9781430248750_Ch17.xhtml#list6) shows a C# version of the\
    \ `FuguGameCenter` script.\n\n**[Listing 17-6](#9781430248750_Ch17.xhtml#_list6).\
    \ C# Version of `FuguGameCenter`**\n\n```\nusing UnityEngine;\nusing System.Collections;\n\
    \nusing UnityEngine.SocialPlatforms.GameCenter;\n\nnamespace Fugu {\n        \
    \ \n   sealed public class GameCenter : MonoBehaviour {\n\n        public bool\
    \ showAchievementBanners = true;\n\n        // Use this for initialization\n \
    \       void Start () {\n#if UNITY_IPHONE\n        Social.localUser.Authenticate\
    \ ( (bool success) => {\n        if (success && showAchievementBanners) {\n  \
    \              GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
    \                        Debug.Log (\"Authenticated \"+Social.localUser.userName);\n\
    \        }\n                else {\n                        Debug.Log (\"Failed\
    \ to authenticate \"+Social.localUser.userName);\n                }\n        }\n\
    \    );\n#endif\n        }\n                \n        \n        static public\
    \ void Achievement(string name,double score) {\n#if UNITY_IPHONE\n        if (Social.localUser.authenticated)\
    \ {\n                Social.ReportProgress(name,score, (bool success) => {\n \
    \                       if (success) {\n                                Debug.Log(\"\
    Achievement \"+name+\" reported successfully\");\n                        }  else\
    \ {\n                                Debug.Log(\"Failed to report achievement\
    \ \"+name);\n                        }\n                } );\n        }\n#endif\n\
    }\n\n        static public void Score(string name,long score) {\n#if UNITY_IPHONE\n\
    \        if (Social.localUser.authenticated) {\n                 Social.ReportScore\
    \ (score, name, (bool success) => {\n                        if (success) {\n\
    \                                Debug.Log(\"Posted \"+score+\" on leaderboard\
    \ \"+name);\n                        }  else {\n                             \
    \   Debug.Log(\"Failed to post \"+score+\" on leaderboard \"+name);\n        \
    \                }\n                } );\n        }\n#endif\n}\n        \n   }\n\
    }\n```\n\nFinally, what you might miss about JavaScript the most is the ability\
    \ to easily modify the `Vector3` values in a Transform Component. [Listing 17-7](#9781430248750_Ch17.xhtml#list7)\
    \ shows a simple line of JavaScript that modifies just the `x` component of a\
    \ Transform Component’s position.\n\n**[Listing 17-7](#9781430248750_Ch17.xhtml#_list7).\
    \ Modifying a `Vector3` of a Transform in JavaScript**\n\n```\nfunction Start\
    \ () {\n        transform.position.x=0;\n}\n```\n\nThat line of code will generate\
    \ a compiler error in C# ([Figure 17-3](#9781430248750_Ch17.xhtml#Fig3)), because\
    \ `Vector3` is a struct, not a class, and thus a value type, not a reference type.\
    \ The fact that it works in JavaScript is a convenience (albeit a misleading one,\
    \ because it does make `Vector3` look like a class, not a struct).\n\n![9781430248750_Fig17-03.jpg](images/9781430248750_Fig17-03.jpg)\n\
    \n**[Figure 17-3](#9781430248750_Ch17.xhtml#_Fig3). Error message when modifying\
    \ a Transform’s `Vector3` in C#**\n\nBecause `Vector3` is a struct, you don’t\
    \ have to worry about the garbage collector having to clean up a bunch of unused\
    \ `Vector3` instances, since, well, there are no instances. But it does mean in\
    \ C# you have to create a new `Vector3` if you want to modify the Transform Component’s\
    \ position, as shown in [Listing 17-8](#9781430248750_Ch17.xhtml#list8).\n\n**[Listing\
    \ 17-8](#9781430248750_Ch17.xhtml#_list8). A Valid Way to Modify a Transform in\
    \ C#**\n\n```\nvoid Start () {\n        transform.position = new Vector3(0,transform.position.y,transform.position.z);\n\
    }\n```\n\nNotice how in C# you have to specify `new` before the `Vector3` constructor,\
    \ whereas in JavaScript that is optional. That is a minor convenience of JavaScript\
    \ (these types of conveniences are generally known as *syntactic sugar*), but\
    \ C# has the advantage of allowing you to define your own structs, in a manner\
    \ similar to how classes are defined. In JavaScript, you can use structs, but\
    \ there’s no way to define new ones.\n\nAndrew Stellman and Jennifer Greene’s\
    \ *Head First C#* (O’Reilly) is a good introduction to C#, but experienced programmers\
    \ can get a quick start in C# with the *C# in a Nutshell* series (also published\
    \ by O’Reilly). Java programmers in particular will find C# familiar (despite\
    \ the name, C# has no relation to C or C++, unless you count distant ancestors).\n\
    \n## Script Execution Order\n\nBefore leaving the topic of scripting, there’s\
    \ one more issue worth mentioning: specifying the order of execution among scripts.\
    \ If you look in the `SmoothFollow` script used to control the Main Camera in\
    \ the bowling game, you’ll see the Camera position is updated not in an `Update`\
    \ callback, but in a `LateUpdate` callback. `LateUpdate` is called in every frame\
    \ just like `Update`, but all `LateUpdate` calls in a frame take place after all\
    \ `Update` calls have completed. `SmoothFollow` calculates the Camera position\
    \ in `LateUpdate` so it takes into account any position change that’s taken place\
    \ in its target’s `Update` callback.\n\nHaving both `Update` and `LateUpdate`\
    \ callbacks is a common technique in game engines, but it can only go so far.\
    \ What if you want a GameObject to update after another GameObject’s `LateUpdate`?\
    \ Sorry, there’s no `LateLateUpdate` callback! But Unity does have a more general\
    \ solution, the Script Execution Order Settings, which can be brought up from\
    \ the Project Settings submenu of the Edit menu ([Figure 17-4](#9781430248750_Ch17.xhtml#Fig4)).\n\
    \n![9781430248750_Fig17-04.jpg](images/9781430248750_Fig17-04.jpg)\n\n**[Figure\
    \ 17-4](#9781430248750_Ch17.xhtml#_Fig4). Bringing up the Script Execution Order\
    \ Settings**\n\nThe Script Execution Order Settings can also be brought up by\
    \ clicking the Execution Order button displayed in the Inspector View when a script\
    \ is selected. Either way, the Script Execution Order Settings show up in the\
    \ Inspector View as a MonoManager ([Figure 17-5](#9781430248750_Ch17.xhtml#Fig5))\
    \ and has a list initially containing just one item, Default Time.\n\n![9781430248750_Fig17-05.jpg](images/9781430248750_Fig17-05.jpg)\n\
    \n**[Figure 17-5](#9781430248750_Ch17.xhtml#_Fig5). The Script Execution Order\
    \ Settings in the Inspector View**\n\nSince `SmoothFollow` uses `LateUpdate`,\
    \ you don’t have to make any changes, but let’s say you want to make sure the\
    \ `SmoothFollow` script runs its `Update` callback after all other scripts. You\
    \ would click the plus sign (`+`) button at the lower right of the Script Execution\
    \ Order Settings and select the `SmoothFollow` script from the resulting menu.\
    \ By default, the `SmoothFollow` script would appear in the Script Execution Order\
    \ Settings below the Default Time, meaning `SmoothFollow` will run after all other\
    \ scripts.\n\nAnd then you might decide that the game controller script, `FuguBowl`,\
    \ should run after every other script (since it’s constantly checking the bowling\
    \ position, for example) except for `SmoothFollow`. So again, you would click\
    \ the `+` button to add the `FuguBowl` script and then drag `FuguBowl`, using\
    \ the handle on the left, above `SmoothFollow` but below Default Time, resulting\
    \ in a list as shown in [Figure 17-6](#9781430248750_Ch17.xhtml#Fig6). Anything\
    \ dragged above Default Time would execute before all the other scripts.\n\n![9781430248750_Fig17-06.jpg](images/9781430248750_Fig17-06.jpg)\n\
    \n**[Figure 17-6](#9781430248750_Ch17.xhtml#_Fig6). Specifying the execution order\
    \ of `FuguBowl.js` and `SmoothFollow.js`**\n\nClicking the minus (`-`) button\
    \ on the right of a script will remove the script from the Script Execution Order\
    \ Settings.\n\n## Plugins\n\nMuch mention has been made of third-party plugins,\
    \ some available on the Asset Store, and many from Prime31 Studios. But if you\
    \ happen to be conversant in C, C++, or Objective-C, you can write your own plugins,\
    \ either to access more device functionality or to make use of libraries written\
    \ in C, C+, or Objective-C. Besides including the native library, plugins require\
    \ additional Unity wrapper scripts."
