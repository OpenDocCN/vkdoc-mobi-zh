    Unity iOS invokes the `OnMouse` callbacks in response to touch events, except
    in the cases where there’s no obvious mapping. For example, what’s the touch equivalent
    of `OnMouseOver`, which is called when the mouse hovers over a GameObject? But
    it makes sense to call `OnMouseDown` when a GameObject is tapped (and `OnMouseUp`
    when the finger stops touching the screen). And this is what happens, as you can
    see if you run the game again in the Editor with the Unity Remote or if you Build
    and Run on a device. In either case, tapping the Ball will produce the same debug
    message you saw when clicking it.


    Although it’s convenient that the `OnMouse` callbacks work for touches, at least
    to this extent, it’s useful to know how to implement your own tap-object detection.
    It’s a straightforward combination of checking for a tap and then performing a
    raycast from the screen position into the 3D world along the camera direction.
    *Raycasting* is the process of finding the first object that a ray intersects
    (as you may recall from high school math, a ray has a starting position and a
    direction, like an arrow).


    To demonstrate, let’s create a new JavaScript named `FuguTap`, attach it to the
