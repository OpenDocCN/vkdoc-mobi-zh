  trans: "\n# 排版后的文本\n\n所有 UnityGUI 控件都是通过调用`GUI`类（以及`GUILayout`类，但将在下一节中介绍）中的静态函数来创建的。`OnGUI`回调在列表\
    \ 9-1 中调用`GUI.Label`来绘制一个标签，传入一个`Rect`（矩形），指定标签绘制在 x,y 坐标为 5,100 的位置（UnityGUI\
    \ 的坐标系中，0,0 位于屏幕左上角），宽度和高度分别为 200 和 20 像素。第二个参数是要在标签中显示的文本。点击 Play，您应该会看到“This\
    \ is a label”显示在屏幕上。\n\n如果用户界面很复杂，将用户界面代码放在单个脚本回调中可能会很繁琐。但就这个简单的用户界面而言，`OnGUI`回调很方便，我们可以在此基础上构建一个极简的纯文本保龄球记分牌。让我们用列表\
    \ 9-2 的内容替换`FuguBowlScoreboard`中的单标签示例。\n\n列表 9-2. 保龄球记分牌\n\n```\n#pragma strict\n\
    \nvar style:GUIStyle; // customize the appearance\n\nfunction OnGUI() {\n    \
    \   for (var f:int=0; f<10; f++) {\n               var score:String=\"\";\n  \
    \             var roll1:int = FuguBowl.player.scores[f].ball1;\n             \
    \  var roll2:int = FuguBowl.player.scores[f].ball2;\n               var roll3:int\
    \ = FuguBowl.player.scores[f].ball3;\n               switch (roll1) {\n      \
    \                case -1: score += \" \"; break;\n                      case 10:\
    \ score +=\"X\"; break;\n                      default: score += roll1;\n    \
    \           }\n               score+=\"/\";\n               if (FuguBowl.player.IsSpare(f))\
    \ {\n                      score +=\"I\";\n               } else {\n         \
    \             switch (roll2) {\n                              case -1: score +=\
    \ \" \"; break;\n                              case 10: score +=\"X\"; break;\n\
    \                              default: score += roll2;\n                    \
    \  }\n               }\n               if (f==9) {\n                      score+=\"\
    /\";\n                      if (10==roll2+roll3) {\n                         \
    \     score +=\"I\";\n                      } else {\n                       \
    \       switch (roll3) {\n                                     case -1: score\
    \ += \" \"; break;\n                                     case 10: score +=\"X\"\
    ; break;\n                                     default: score += roll3;\n    \
    \                          }\n                      }\n               }\n    \
    \           GUI.Label(Rect(f*30+5,5,50,20),score,style);\n               var total:int=FuguBowl.player.GetScore(f);\n\
    \               if (total != -1) {\n                      GUI.Label(Rect(f*30+5,20,50,20),\"\
    \ \"+total,style);\n               }\n       }\n}\n```\n\n新的`OnGUI`回调遍历所有十个回合，查询`FuguBowlPlayer`以获取代表每个回合的`FuguBowlScore`。在循环的底部，会执行一次或两次对`GUI.Label`的调用。第一个`GUI.Label`显示该回合每球的得分，第二个`GUI.Label`绘制在第一个下方，如果可用则显示该回合的游戏总分。\n\
    \n循环中的大部分代码用于确定每个回合的每个球要显示什么。对于`ball1`，如果尚未投掷，则要显示的`String`只是一个空格。如果投掷了全中，则显示字母“X”。否则，显示数字分数（1-9）。\n\
    \n`ball2`与`ball1`类似，不同之处在于它还显示字母“I”来表示补中。通常，我会使用斜杠字符“/”来表示补中，但这里用它来分隔`ball1`、`ball2`和`ball3`的分数。\n\
    \n只有当回合是第十回合（索引 9）时，才会构建`ball3`的`String`。`ball3`与`ball2`相同，区别在于它检查的是`ball2`和`ball3`的补中组合，而不是`ball1`和`ball2`。\n\
    \n通过调用`FuguBowlPlayer`函数`GetScore`来检索回合总分，只要分数可用（即不为-1）就显示。每个`GUI.Label`的`Rect`基于其显示的回合在屏幕上从左上角开始递增偏移（图\
    \ 9-2）。\n\n![9781430248750_Fig09-02.jpg](img/9781430248750_Fig09-02.jpg)\n\n图\
    \ 9-2. 由 `FuguBowlScoreboard.js` 显示的保龄球记分牌\n\n图 9-2 展示了一个进行到第四回合第二球的游戏。第一球击倒了三个球瓶。前两个回合投出了全中，第三回合投出了补中（第一次投掷击倒五个球瓶，第二次投掷击倒五个）。第一回合的游戏总分为：全中的\
    \ 10 分，加上接下来两球击倒的球瓶数（第二回合全中的 10 分，再加上第三回合第一球的 5 分），共计 25 分。\n\n第二回合也是全中，因此它的得分是：全中的\
    \ 10 分，加上第三回合第一球的 5 分以及该回合第二球的 5 分，共计 20 分。将其加到第一回合的 25 分上，游戏总分为 45 分。\n\n第三回合是补中，所以同样得到\
    \ 10 分，但仅加上下一球（即 3 分），共计 13 分，将其加入前一个回合的游戏总分，总计 58 分。因此，我们的计分代码和记分牌代码运行正常！\n\n\
    ## 设置 GUI 样式\n\nGUI 控件的外观可以通过`GUIStyle`进行自定义，它是一个影响控件显示的属性集合。从概念上讲，这类似于级联样式表（CSS）用于格式化网页内容的方式。\n\
    \n每个创建 GUI 控件的 GUI 函数都是一个重载函数，有两种形式：一种使用默认的`GUIStyle`，另一种接受一个`GUIStyle`参数。最初的单标签示例仅使用了默认的`GUIStyle`，但记分牌使用了接受`GUIStyle`参数的`GUI.Label`版本，这提供了一种自定义记分牌外观的方法。\n\
    \n传递给`GUI.Label`的`GUIStyle`绑定到一个名为`style`的公共变量，这允许在 Inspector 视图中自定义`GUIStyle`。例如，由于记分牌完全是文本，您可以点击样式\
    \ Normal 子部分中的 Text Color 字段（相当于在脚本中访问`style.onNormal.textColor`）来打开颜色选择器并更改记分牌的颜色（图\
    \ 9-3）。\n\n![9781430248750_Fig09-03.jpg](img/9781430248750_Fig09-03.jpg)\n\n图\
    \ 9-3. `GUIStyle` 选项\n\n在众多其他`GUIStyle`属性中，有几个会影响 GUI 字体，默认使用 Unity 的内置字体 Arial。您可以通过将字体资源从\
    \ Project 视图拖到`GUIStyle`的 Font 字段（在脚本中，对应变量`style.font`）来更改字体。任何 TrueType、OpenType\
    \ 或 dfont 格式的字体都可以导入到 Unity 中。\n\n其他`GUIStyle`属性控制字体大小和样式（对于作为动态字体导入的字体资源）、文本对齐和自动换行。\n\
    \n富文本格式特别有趣，因为它为标签文本提供了类似 HTML 的标记。所以实际上，尽管脚本很简单，但您的样式自定义选项非常丰富！\n\n## 暂停菜单\n\n\
    与记分牌相比，开始/暂停菜单将需要更多的脚本编写，因此，首先需要进行设计。让我们创建一个主菜单和两个子菜单：一个用于游戏选项，一个用于显示游戏制作人员。选项菜单将有独立的音频、图形、系统和统计面板。逻辑虽然没有保龄球游戏控制器那么复杂，但这是另一个应该首先将设计草图绘制成状态图的示例（图\
    \ 9-4）。\n\n![9781430248750_Fig09-04.jpg](img/9781430248750_Fig09-04.jpg)\n"
- fmt: "[Figure 9-4](#9781430248750_Ch09.xhtml#_Fig4). A state diagram for a pause\
    \ menu\n\nThe diagram shows that the player can go from the game playing state\
    \ (or equivalently, the menu-invisible state) to the main pause menu, and from\
    \ there to a credits screen, an options menu, or quit the game. The options menu\
    \ in turn can display an audio, graphics, system, or statistics panel, each of\
    \ which could be listed as states, but for now, let’s keep it simple by just thinking\
    \ of each top-level menu screen as a state.\n\nAll states except for Quit (which\
    \ you can think of as the exit state) can transition back to the state that transitioned\
    \ to them in the first place, which is why each transition arrow is drawn bidirectionally.\
    \ This means the player can go from the main menu to the options menu and back\
    \ to the main menu, and from there can go back to the normal game play mode. But\
    \ there won’t be any shortcuts going from the options menu straight back to gameplay,\
    \ for example.\n\n## Create the Script\n\nLet’s start the pause menu implementation\
    \ by creating a new JavaScript in the Scripts folder of the Project View and name\
    \ it`FuguPause`([Figure 9-5](#9781430248750_Ch09.xhtml#Fig5)).\n\n![9781430248750_Fig09-05.jpg](images/9781430248750_Fig09-05.jpg)\n\
    \n[Figure 9-5](#9781430248750_Ch09.xhtml#_Fig5). Creating the`FuguPause.js`script\n\
    \nNow, to add the script to the scene, create a new GameObject in the Hierarchy\
    \ View, name it PauseMenu, and attach the`FuguPause`script to the PauseMenu GameObject.\n\
    \n## Track the Current Menu Page\n\nThe technique used in the`FuguBowl`script\
    \ of implementing a state machine with coroutines won’t work with UnityGUI, as\
    \ all of the UnityGUI functions must be called within an`OnGUI`callback. But the\
    \ state diagram is still useful as the basis for an implementation. For starters,\
    \ we can focus on the states that represent distinct menu screens. Let’s call\
    \ them “pages” to distinguish them from the more general term “screen.” These\
    \ menu states could be distinguished by strings or integers, but an enumeration\
    \ fits the bill when you have several related but distinct values. So let’s define\
    \ an`enum`called`Page`for the menu page states and a variable named`currentPage`to\
    \ track which page is currently being displayed ([Listing 9-3](#9781430248750_Ch09.xhtml#list3)).\n\
    \n[Listing 9-3](#9781430248750_Ch09.xhtml#_list3).  Enumerations for Menu Pages\n\
    \n```\nenum Page {\n       None,Main,Options,Credits\n}\n\nprivate var currentPage:Page;\n\
    ```\n\nFollowing the state diagram, the`enum`lists a state for no menu (the game\
    \ is playing), the main menu page, the options page, and the credits page. Because\
    \ the variable`currentPage`is of type`Page`, only the values`Page.None`,`Page.Main`,`Page.Options`,\
    \ or`Page.Credits`can be assigned to that variable.\n\n## Pause the Game\n\nMaking\
    \ a pause menu involves solving two problems: making a menu and making the game\
    \ pause. We’ll start with making the game pause. The static variable`Time.timeScale`specifies\
    \ how fast the simulated game time progresses and defaults to 1. Setting`Time.timeScale`to\
    \ 0 effectively pauses the game, suspending physics, animation and anything else\
    \ dependent on the advance of`Time.time`. So let’s make a`PauseGame`function that\
    \ sets`Time.timeScale`to 0 ([Listing 9-4](#9781430248750_Ch09.xhtml#list4)).\n\
    \n[Listing 9-4](#9781430248750_Ch09.xhtml#_list4).  A Function to Pause the Game\
    \ in`FuguPause.js`\n\n```\nprivate var savedTimeScale:float;       // Time.timeScale\
    \ before we pause\n\nfunction PauseGame() {\n       savedTimeScale = Time.timeScale;\
    \ // save normal time scale\n       Time.timeScale = 0;              // suspend\
    \ time\n       AudioListener.pause = true;      // suspend music\n       currentPage\
    \ = Page.Main;         // start with the main menu page\n}\n```\n\n`PauseGame`first\
    \ saves the current`Time.timeScale`in a variable`savedTimeScale` so we can restore`Time.timeScale`when\
    \ the game is unpaused (we shouldn’t assume`Time.timeScale`is 1 when the game\
    \ is paused).\n\n`PauseGame`also sets`AudioListener.pause`to true, which suspends\
    \ any playing sounds (you don’t want to do this if you’re going to play sounds\
    \ in the menu).\n\nFinally, the`currentPage`variable to the is set to`Page.Main`,\
    \ indicating the main pause screen should be displayed.\n\nThe game is unpaused\
    \ by reversing all of that ([Listing 9-5](#9781430248750_Ch09.xhtml#list5)).\n\
    \n[Listing 9-5](#9781430248750_Ch09.xhtml#_list5).  Function that Unpauses the\
    \ game in`FuguPause.js`\n\n```\nfunction UnPauseGame() {\n       Time.timeScale\
    \ = savedTimeScale;\n       AudioListener.pause = false;\n       currentPage =\
    \ Page.None;\n}\n```\n\n`UnPauseGame`restores`Time.timeScale`to the value you\
    \ saved in the variables`savedTimeScale`by`PauseGame`, and sets`AudioListener.pause`to\
    \ false to reenable audio.\n\nTo see if the game is paused, you can just check\
    \ if`Time.timeScale`is 0. [Listing 9-6](#9781430248750_Ch09.xhtml#list6) shows\
    \ a little convenience function for that. Notice that it’s a static function,\
    \ so any script can call it as`FuguPause.IsGamePaused()`.\n\n[Listing 9-6](#9781430248750_Ch09.xhtml#_list6).\
    \  Checking if the Game is Paused in`FuguPause.js`\n\n```\nstatic function IsGamePaused()\
    \ {\n       return Time.timeScale==0;\n}\n```\n\nIf the game is to start paused,\
    \ the`Start`callback should have a call to`PauseGame`([Listing 9-7](#9781430248750_Ch09.xhtml#list7)).\
    \ Adding a public`boolean`variable`startPaused`and checking it before calling`PauseGame`makes\
    \ the initial pause optional.\n\n[Listing 9-7](#9781430248750_Ch09.xhtml#_list7).\
    \  Pausing the Game in the`Start`Callback of`FuguPause.js`\n\n```\nvar startPaused:boolean\
    \ = true; // bring up the menu at game start\n\nfunction Start() {\n       if\
    \ (startPaused) {\n               PauseGame();\n       }\n}\n```\n\nSince the\
    \ default value for`startPaused`is true, if you click Play, the game will immediately\
    \ pause, showing the ball suspended in the air. And then you’re stuck, since there’s\
    \ no menu. There’s also no way to unpause then pause again, so let’s have the\
    \ Escape key (the key labeled ESC on the top left of most keyboards), toggle the\
    \ pause state. Input handling is usually performed in the`Update`callback, and\
    \ this is no exception ([Listing 9-8](#9781430248750_Ch09.xhtml#list8)).\n\n[Listing\
    \ 9-8](#9781430248750_Ch09.xhtml#_list8).  Handling the Escape Key in the`Update`Callback\
    \ of`FuguPause.js`\n\n```\nfunction Update() {\n       if (Input.GetKeyDown(\"\
    escape\"))\t{\n               switch (currentPage) {\n                      case\
    \ Page.None: PauseGame(); break;   // if not paused, then pause\n            \
    \          case Page.Main: UnPauseGame(); break; // if paused, then unpause\n\
    \                      default: currentPage = Page.Main;     // any subpage goes\
    \ back to main page\n               }\n       }\n}\n```\n\nThe first line checks\
    \ if the ESC key has been pressed. If so, then it calls`PauseGame`, unless the\
    \ pause menu is already up. The function also treats ESC as a back key, switching\
    \ from a subpage to the main page or from the main page to an unpaused state.\n\
    \n## Check`Time.DeltaTime`\n\nSetting`Time.timeScale`to 0 halts the advance of`Time.time`,\
    \ so`Time.deltaTime`is always 0. This works great for`Update`functions that multiple\
    \ values by`Time.deltaTime`, but dividing by`Time.deltaTime`when time is frozen\
    \ results in a division-by-zero error. There is such a case in the`Update`callback\
    \ of the`FuguForce`script, so before proceeding with the pause menu, that has\
    \ to be taken care of ([Listing 9-9](#9781430248750_Ch09.xhtml#list9)).\n\n[Listing\
    \ 9-9](#9781430248750_Ch09.xhtml#_list9).  Avoiding Divide-by-Zero in`FuguForce.js`\n\
    \n```\nfunction Update() {\n       forcex = 0;\n       forcey = 0;\n       if\
    \ (Time.deltaTime > 0) {\n               CalcForce();\n       }\n}\n\nfunction\
    \ CalcForce() {\n       var deltaTime:float = Time.deltaTime;\n       forcex =\
    \ mousepowerx*Input.GetAxis(\"Mouse X\")/deltaTime;\n       forcey = mousepowery*Input.GetAxis(\"\
    Mouse Y\")/deltaTime;\n}\n```"
