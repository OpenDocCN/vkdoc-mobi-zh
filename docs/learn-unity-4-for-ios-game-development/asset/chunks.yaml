- fmt: "如果一个纹理仅用于屏幕上较小或较远的网格，那么就没有必要将其设为大型纹理。对于启动画面，我们将最大尺寸设置为`2048`，这样就不会将纹理缩放至小于\
    \ iPad Retina 屏幕的尺寸。\n\n**提示**：将最大缩放设置为最大允许值，并将压缩级别设置为`TrueColor`，可以在导入设置的预览区域中查看纹理的原始格式。\n\
    \n对于常规纹理，默认的压缩级别`4-bit PVRTC`（PowerVR 纹理压缩）是合理的。细节较少的纹理可以使用更高效的`2-bit PVRTC`。与`mipmapping`一样，纹理压缩可以减少纹理映射占用的内存，而图形处理器对`PVRTC`的支持则能提供额外的性能优势。同样与`mipmapping`类似的是，细节特别丰富的纹理可能会因压缩而质量严重下降，在这种情况下，保留未压缩的`16-bit`或未压缩的`TrueColor`（`24-bit`）纹理可能效果更好。对于`GUI`纹理，出于这个原因，你可能不希望压缩纹理；或者对于在玩家设置中指定的启动画面，应保持其原始格式不变。\n\
    \n## 音频\n\n我们在`Audio Manager`中调整了`DSP Buffer Size`，以使碰撞音效响应更快，这虽然会增加一些处理开销，但能降低延迟。与纹理类似，你也可以调整`AudioClips`的导入设置。与纹理使用分为`3D`和`GUI`两大类类似，声音也分为`2D`和`3D`两种：`3D`声音与`GameObjects`（或至少是`3D`世界中的位置）关联，而`2D`声音则用于环境音或音乐（例如我们在第5章舞蹈场景中添加的歌曲）。\n\
    \n我们来比较一下保龄球音效中的两个例子：保龄球瓶碰撞音效（图16-32）和保龄球滚动音效（图16-33）。这两种声音都源自世界中的某个位置，并且会相对于主摄像机移动（更准确地说，是相对于附加在主摄像机上的`AudioListener`组件移动）。因此，它们在导入设置中都被标记为`3D`声音。`3D`声音应为单声道，而非立体声。幸运的是，这两个声音的原始音频文件都是单声道的，因此你无需选择`Force\
    \ to mono`。\n\n![图16-32：优化保龄球瓶碰撞音效的导入设置](images/9781430248750_Fig16-32.jpg)\n\n\
    [图16-32](#9781430248750_Ch16.xhtml#_Fig32)\n\n![图16-33：优化保龄球滚动音效的导入设置](images/9781430248750_Fig16-33.jpg)\n\
    \n[图16-33](#9781430248750_Ch16.xhtml#_Fig33)\n\n碰撞音效文件较小，因此我们将其保持未压缩状态，以避免解压缩处理，并最大化播放质量。滚动音效文件较大，因此对其进行压缩并保留在内存中。由于这是唯一的压缩音效，并且`iOS`硬件支持随时解码一个压缩音效，因此不会产生任何软件解码开销。不过，如果场景中还播放环境音或音乐，这些文件可能会大得多，你应该优先压缩它们。\n\
    \n**提示**：导入未压缩的音效，以便在编辑器中灵活决定压缩哪些音效。除非你找到了比`Unity`压缩工具质量更高的压缩工具，否则没有必要导入压缩音频。\n\
    \n选择压缩后，无间隙循环选项会变为可用。这会强制压缩程序处理音频片段的结尾，使其能够无缝循环，这正是你需要的，因为你希望以循环方式播放此声音。\n\n对于压缩音频，除了`Uncompress\
    \ on load`和`Compressed in memory`之外，还有另一个加载选项：`Stream from disc`。\n\n从磁盘流式传输会有一些额外开销，但对于连续播放多首歌曲的场景来说，这是一个不错的选择，因为将所有歌曲都保存在内存中往往代价高昂。\n\
    \n## 网格\n\n大多数影响优化的`Mesh Import Settings`（图16-34）主要影响内存使用。\n\n![图16-34：优化网格的导入设置](images/9781430248750_Fig16-34.jpg)\n\
    \n[图16-34](#9781430248750_Ch16.xhtml#_Fig34)\n\n首先是`Mesh Compression`，它通过降低数值精度（即用于表示顶点、法线、纹理坐标和切线的位数）来减少网格占用的空间和内存。这也会降低视觉质量，因此最好进行试验，找到不会影响外观的最大压缩级别。可用的压缩级别有低、中、高和无。默认设置为无。\n\
    \n在`Mesh Compression`下方是`Read/Write Enabled`。该选项默认开启，会创建一份可修改的网格副本。但如果你没有任何读取或写入网格变量（如顶点和法线）的脚本（通常你并不需要），则可以关闭此选项。\n\
    \n`Optimize Mesh`（不要与`Player Settings`中的`Mesh Optimization`选项混淆）通过优化网格三角形列表的排列方式来提升性能。\n\
    \n如果你不打算使用`Mesh Collider`，请关闭`Generate Colliders`。事实上，作为一条规则，最好保持此选项关闭，因为需要时可以手动添加`Mesh\
    \ Collider`，但通常更倾向于添加一个或多个原始碰撞体。\n\n如果你知道该网格的着色器不需要法线或切线，可以分别将`Normals`和`Tangents`选项设置为`none`。但如果在`Player\
    \ Settings`中选择了`Mesh Optimization`，未使用的顶点数据会在构建时自动移除。\n\n## 优化脚本\n\n常规的代码优化技巧同样适用于`Unity`脚本。例如，我们之前提到过，应调用`Vector3`的`magnitudeSquared`函数而不是`magnitude`，以避免其内部的平方根运算。但在以下章节中，我将介绍一些不太明显的优化脚本性能的方法，或使用脚本来提升整体性能。\n\
    \n### 缓存`GetComponent`\n\n通常情况下，如果你要多次计算某个值（无论是数学表达式、函数调用的结果，还是访问某个实例或静态变量的值，该变量内部可能实际上在执行函数调用），最好将该值赋给一个变量。\n\
    \n我们在脚本中访问的`Component`快捷变量（如`transform`、`audio`和`rigidbody`）就是这样的例子。每次访问这些变量时，都会调用`GetComponent`，在附加到`GameObject`的所有`Component`中搜索匹配类型的组件。\n\
    \n因此，任何时候你需要在脚本中多次引用一个`Component`快捷变量时，无论是多次列出，还是在`Update`等回调函数中重复引用，尤其是在一个迭代次数很多的循环中引用该变量时，都应该提前将`Component`赋给一个变量。清单16-6展示了如何将此优化应用于我们的`FuguReset`脚本。\n\
    \n[清单16-6](#9781430248750_Ch16.xhtml#_list6). 在`FuguReset.js`中缓存`Component`快捷变量\n\
    \n```javascript\n#pragma strict\n\nprivate var startPos:Vector3;\nprivate var\
    \ startRot:Vector3;\n\n// 为了性能\nprivate var trans:Transform = null;\nprivate var\
    \ body:Rigidbody = null;\n\nfunction Awake() {\n        // 缓存 Transform 引用\n \
    \       trans = transform;\n        body = rigidbody;\n        // 保存此 GameObject\
    \ 的初始位置和旋转\n        startPos = trans.\n```"
  raw: 'And if a texture is only used on a Mesh that is small or far away on screen,
    then there’s no reason to make it a big texture. For the splash screen, we set
    the Max Size to 2048 so we don’t scale the texture to be smaller than the iPad
    Retina screen.    **Tip**   Setting the max scale to the maximum allowable and
    the compression level to TrueColor allows you to see the original format of the
    texture in the preview area of the Import settings.    For a regular texture,
    the default compression level, 4-bit PVRTC (PowerVR Texture Compression), is reasonable.
    A texture with less detail may work with the more aggressive 2-bit PVRTC. As with
    mipmapping, texture compression reduces the memory taken by texture mapping, and
    the graphics processor support for PVRTC provides an additional performance advantage.
    And as with mipmapping, particularly detailed textures may be degraded too much
    by compression, in which case leaving the texture at uncompressed 16-bit or uncompressed
    TrueColor (24-bit) may be better. For GUI textures, you might not want to compress
    the texture for that reason, or in the case of the splash screen that we assign
    in the player settings, you should leave it alone in its native format.    Audio    We
    adjusted the DSP Buffer Size in the Audio Manager for more responsive collision
    sounds, lowering the latency at some processing expense. As with textures, you
    can also adjust the Import Settings for AudioClips. Analogous with having two
    general categories of texture usage, for 3D and GUI, you also have 2D and 3D sounds,
    where 3D sounds are associated with GameObjects, or at least a position in the
    3D world, while 2D sounds are used for ambient audio or music (like the song we
    added to our dance scene in Chapter 5).    Let’s compare a couple of our bowling
    sounds: the pin collision sound ([Figure 16-32](#9781430248750_Ch16.xhtml#Fig32))
    and the ball rolling sound ([Figure 16-33](#9781430248750_Ch16.xhtml#Fig33)).
    They’re both sounds that emanate from a position in the world and even move with
    respect to the Main Camera (or rather, more precisely, they move with respect
    to the AudioListener Component attached to the Main Camera). Thus, they’re both
    marked as 3D sounds in their Import Settings. 3D sounds should be mono, not stereo.
    Fortunately, the original audio files for both of these sounds are mono, so you
    don’t have to select Force to mono.    ![9781430248750_Fig16-32.jpg](images/9781430248750_Fig16-32.jpg)    [Figure
    16-32](#9781430248750_Ch16.xhtml#_Fig32). Optimizing Import Settings for the pin
    collision sound    ![9781430248750_Fig16-33.jpg](images/9781430248750_Fig16-33.jpg)    [Figure
    16-33](#9781430248750_Ch16.xhtml#_Fig33). Optimizing Import Settings for the ball
    rolling sound    The collision sound is fairly small, so let’s leave it uncompressed
    to avoid the processing involved in uncompressing the sound and to maximize the
    quality of the playback. The rolling sound is a larger sound file, so let’s compress
    it and leave it compressed in memory. Because this is the only compressed sound,
    and iOS has hardware support for decoding one compressed sound at any time, you’re
    not incurring any software decoding overhead. However, if you also had ambient
    sound or music playing in the scene, chances are that would be a much larger sound
    file and you would want to compress that instead.    **Tip**   Import uncompressed
    sounds to allow flexibility in deciding which sounds to compress in the Editor.
    There’s no reason to import compressed audio unless you’ve found a compression
    tool that gives you better quality than Unity’s compression.    With compression
    selected, the gapless looping option becomes available. That forces the compression
    to process the end of the audio clip so it can loop seamlessly, which is what
    you want, since you’re playing this sound in a loop.    For compressed audio,
    there is one other load option besides Uncompress on load and Compressed in memory:
    Stream from disc.


    There is some additional overhead in streaming from disc, but that’s a good option
    for a scene that plays multiple songs in succession, in which case it would be
    prohibitive to keep all of those songs in memory.    Meshes    Most of the Mesh
    Import Settings ([Figure 16-34](#9781430248750_Ch16.xhtml#Fig34)) that affect
    optimization have an impact principally on memory usage.    ![9781430248750_Fig16-34.jpg](images/9781430248750_Fig16-34.jpg)    [Figure
    16-34](#9781430248750_Ch16.xhtml#_Fig34). Optimizing Import Settings for a Mesh    The
    first is Mesh Compression, which reduces the amount of space and memory used for
    a mesh by reducing the numerical precision (i.e., number of bits used to represent
    the vertices, normals, texture coordinates, and tangents). This can also reduce
    the visual quality, so it’s best to experiment and find the maximum compression
    level that doesn’t degrade the appearance. The available levels are low, medium,
    high, and none. The default is none.    Listed below Mesh Compression is Read/Write
    Enabled. This is by default on, creating a copy of the Mesh that can be modified.
    But if you don’t have any scripts that read or write Mesh variables, such as vertices
    and normals, and you usually don’t need any, then you can leave this option off.    Optimize
    Mesh, not to be confused with the Mesh Optimization option in the Player Settings,
    offers some performance improvement by optimizing the arrangement of the Mesh’s
    triangle list.    Leave Generate Colliders off if you’re not going to use a Mesh
    Collider. In fact, it’s not a bad idea to leave this option off as a rule, because
    you can always add a Mesh Collider manually if you need one, but it’s often preferable
    to add one or more primitive Colliders instead.    If you know the shader for
    this Mesh will not require normals or tangents, you can set the Normals and Tangents
    options, respectively, to none. But if you have Mesh Optimization selected in
    the Player Settings, unused vertex data will be removed at build time anyway.    Optimize
    Scripts    The usual tips for optimizing code apply to scripting in Unity. For
    example, we’ve already made a point of calling the `magnitudeSquared` function
    of `Vector3` instead of `magnitude` to avoid its internal square root operation.
    But I’ll describe some of the less obvious ways to improve script performance
    or use scripts to improve performance in the following sections.    Cache GetComponent    In
    general, it’s a good idea to assign a value to a variable if you’re going to calculate
    that value more than once, whether it’s a math expression, the result of a function
    call, or even accessing the value of an instance or static variable, which might
    in fact be internally performing a function call.    This is the case with the
    `component` shortcut variables we’ve been accessing in our scripts like `transform`,
    `audio`, and `rigidbody`, each of which results in a call to `GetComponent` that
    searches among all the Components attached to the `GameObject` for a Component
    with the matching type.    So any time you’re going to reference a `Component`
    shortcut variable more than once in a script, whether it’s listed more than once
    in the script or referenced repeatedly in callback like `Update`, or especially
    if the shortcut is referenced in a loop with many iterations, you should assign
    the Component to a variable early on. [Listing 16-6](#9781430248750_Ch16.xhtml#list6)
    shows how to apply this optimization to our `FuguReset` script.    [Listing 16-6](#9781430248750_Ch16.xhtml#_list6).  Caching
    Component Shortcuts in FuguReset.js    ``` #pragma strict  private var startPos:Vector3;
    private var startRot:Vector3;  // for performance private var trans:Transform
    = null; private var body:Rigidbody = null;  function Awake() {         // cache
    the Transform reference         trans = transform;         body = rigidbody;         //
    save the initial position and rotation of this GameObject         startPos = trans.'
