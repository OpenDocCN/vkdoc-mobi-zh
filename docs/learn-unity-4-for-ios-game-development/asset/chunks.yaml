- fmt: 'However, the bowling ball cannot be batched with any of the pins or the bowling
    surface. Batching does take some time, which is why it shows up in the built-in
    profiler, but, like static batching, it generally is a big win for performance.


    ## Accelerometer Frequency

    The `Accelerometer Frequency` is set to 60 samples per second by default. You
    can save some processing time by lowering that frequency to 15, which is sufficient
    for our shake detection code. If you don''t use the accelerometer at all in an
    app, set it to 0.


    ## Stripping Level (Pro)

    Unity Pro users have the option to apply iOS Stripping. Three cumulative levels
    are available: `String Assemblies`, `Strip Bytecode`, and `Use micro mscorlib`.
    Let’s choose the latter, which is the most aggressive optimization and includes
    the other two. The `micro mscorlib` is a custom, slimmed down version of the core
    Mono library, which may be incompatible with additional .NET libraries you might
    import, but that''s not an issue for this game.


    ## Script Call Optimization

    The `Script Call Optimization` level determines how calls to native code are made.
    The default setting, `Slow and Safe`, incurs overhead, so let’s set it to `Fast
    with No Exceptions`. As the label signifies, this setting is faster but will fail
    if the native code throws an exception (essentially, an error that is expected
    to be handled by calling code).


    ## Optimize Mesh Data

    The `Optimize Mesh Data` option removes at build time any unnecessary per-vertex
    mesh information. If a mesh is not using a bump-map shader, then the tangents
    can be removed, and if the mesh is using an unlit shader, then normals can be
    removed. This saves space and facilitates batching, since batching copies all
    of those Mesh data. Of course, if you’re going to change the shader of a Mesh
    at runtime via script to a shader that requires more per-vertex information than
    the original shader, you shouldn’t use this option.


    ## Optimizing GameObjects

    After adjusting the `Quality Settings`, `Physics Manager`, and `Time Manager`,
    we’re ready to tweak individual GameObjects.


    ### Camera

    Cameras are a focal point (no pun intended) of optimization because they dictate
    what is rendered and how it is rendered. The Camera frustum automatically provides
    one source of optimization. Any GameObject that resides entirely outside the frustum
    is not visible to the Camera, so no attempt is made to render the GameObject.
    This optimization is called *frustum culling* and also benefits animation and
    particle systems. The system has no need to play an animation or simulate particles
    when there’s no one to see it.


    **Tip** The fastest way to render a GameObject is to not render it all.


    Therefore, adjusting the Camera’s frustum so it includes fewer objects in a scene
    is one source of optimization. You can narrow the frustum by lowering its field
    of view, and you can shorten the frustum by decreasing the far distance value,
    bringing the far plane closer to the Camera ([Figure 16-23](#9781430248750_Ch16.xhtml#Fig23)).


    ![9781430248750_Fig16-23.jpg](images/9781430248750_Fig16-23.jpg)


    [Figure 16-23](#9781430248750_Ch16.xhtml#_Fig23). Optimizing the Main Camera


    For example, the default value of 1000 for the far plane value in the Main Camera
    is overkill, considering the bowling Floor is much smaller. Setting the far value
    to 100 still leaves everything visible (Unity skyboxes are conveniently visible
    independent of the frustum).


    Minimizing the far plane value has the additional benefit of storing a smaller
    range of values in the depth buffer when rendering. This avoids the problem of
    z-fighting, where an object that is barely behind another seems to poke through
    the one in front because of the limited numerical precision in the depth buffer.


    Another way to cull GameObjects from rendering by a Camera is to specify that
    it renders only GameObjects in a certain set of layers, listed in its Culling
    mask.


    This is really a matter of correctness—you want to make sure the Camera is rendering
    only what it’s supposed to be rendering, and not, say, HUD elements that are already
    rendered by a separate HUD camera. But it does affect performance. I once had
    a bug where the Main Camera was unintentionally rendering GUI elements, but far
    enough in the distance that I didn’t notice it.


    Each Camera also has an `eventMask` variable that is similar to its Culling mask
    (or, equivalently, its `cullingMask` variable), but instead of specifying what
    layers are rendered by the Camera, the `eventMask` determines what layers receive
    `onMouse` events from the Camera. Minimizing the layers present in `eventMask`
    can reduce the overhead of `onMouse` processing, but as it''s not visible in the
    Inspector View, that variable has to be set from a script.


    The last Camera optimization to make is to specify the Render Path. There are
    two render paths available on iOS: Vertex Lit and Forward Rendering (Deferred
    Rendering is not available for mobile platforms). Forward Rendering is more flexible
    and powerful than Vertex Lit. For example, the Vertex Lit path won’t display bump-mapping.
    But in this chapter, we’re aggressively going for a high frame rate, so let’s
    set the render path to Vertex Lit.


    ### Lights

    We already disabled shadows on our Light (except for non-Pro users who didn’t
    have shadows in the first place), which is a big performance improvement because
    it reduces draw calls. And lighting is already influenced by the Quality Settings,
    which specify no pixel lights and disabled shadows ([Figure 16-24](#9781430248750_Ch16.xhtml#Fig24)).


    ![9781430248750_Fig16-24.jpg](images/9781430248750_Fig16-24.jpg)


    [Figure 16-24](#9781430248750_Ch16.xhtml#_Fig24). Optimizing the Light


    But we can perform some additional adjustments on the Light similar to our Camera
    tweaks. Like the Camera, Lights have a specified range, which we can minimize
    to reduce the number of lit GameObjects. Lights also have a Culling Mask, which,
    as in the case of the Main Camera, can be set to the Default layer, but with judicious
    assignment of layers you can reduce unnecessarily lit GameObjects.


    ### Pins

    In pursuit of speed, we’ve chosen the simplest lighting and the simplest render
    path. You can also simplify the shaders you’re using for each Mesh. The bowling
    pins comprise most of the objects in our scene, so let’s modify the BarrelPin
    prefab first ([Figure 16-25](#9781430248750_Ch16.xhtml#Fig25)).


    ![9781430248750_Fig16-25.jpg](images/9781430248750_Fig16-25.jpg)


    [Figure 16-25](#9781430248750_Ch16.xhtml#_Fig25). Optimizing the BarrelPin prefab


    In the Project View, select the Barrel GameObject in the prefab and click the
    Shader selector in the Inspector View. There are many simpler shaders than Bumped
    Specular; anything with less than two materials is likely to be faster, and Vertex
    Lit will be more efficient than any of the pixel shaders. There is even a set
    of shaders specifically implemented for mobile devices, including `Mobile/Vertex
    Lit`. But there’s one that is even better for our situation, a `Mobile/Vertex
    Lit` shader implemented specifically for use only with directional lights. So
    let’s choose that one, `Mobile/Vertex Lit (Only Directional Light)`.


    ### Floor

    The Floor GameObject has a few Component properties that can be tweaked for optimization
    ([Figure 16-26](#9781430248750_Ch16.xhtml#Fig26)). Starting with the MeshRenderer
    Component, we have the `Cast Shadows` and `Receive Shadows` options enabled. Although
    we have Shadows disabled in the Light and in the Quality Settings, you should
    pay attention to the per-object settings just in case you enable shadows in the
    future. If shadows were enabled, you would want shadows cast on the floor, so
    `Receive Shadows` should be enabled. But because we don’t expect the Floor to
    cast a shadow (at least not on anything we can see), let’s disable the `Cast Shadows`
    option. For performance, the fewer shadow casters, the better.'
