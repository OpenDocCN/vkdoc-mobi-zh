- fmt: '# Scripting Define Symbols


    `Scripting Define Symbols` allows you to define your own preprocessor definitions,
    just like the `UNITY_EDITOR` and `UNITY_WEBPLAYER` definitions referenced in the
    `FuguPause` script in the previous chapter. For example, if you had some code
    that calls some functions only available in Unity Pro, then you might wrap the
    code with `#if UNITY_PRO ... #endif` and then add `UNITY_PRO` to the `Scripting
    Define Symbols` in projects that are running with Unity Pro.


    Multiple definitions can be added using semicolons as a separator. If you also
    had a `USE_ADS` preprocessor definition to control whether ads are displayed,
    you might have `USE_ADS;UNITY_PRO` in the `Scripting Define Symbols` field.


    # Optimization Settings


    Some of the `Optimization` settings have nothing to do with optimization. The
    `Api Compatibility Level` (never mind the weird capitalization of API) specifies
    the version and extent of the `.NET` API you need. Usually you won’t need to change
    that.


    `AOT Compilation Options` refers to the ahead-of-time compilation that takes place
    during a Unity iOS build, as opposed to just-in-time (JIT) compilation. This is
    why `#pragma strict` is required in Unity iOS scripts. It gives the AOT compiler
    enough information to do its job.


    ## SDK Version


    The `SDK Version` has two options: `Device SDK` and `Simulator SDK`. When building
    for a test device or an app submission, covered in the next chapter, the default
    value of `Device SDK` is the correct choice, but in this chapter, `Simulator SDK`
    should be selected to run our game in the iOS Simulator.


    > **Note** `SDK Version` is an odd property name to distinguish between simulator
    and hardware builds, but it is a holdover from older versions of Unity iOS that
    required specifying the iOS SDK that was installed with Xcode.


    ## Target iOS Version


    The `Target iOS Version` specifies the minimum iOS version the app will run on.
    Leaving it on the default and minimum value, iOS 4.0, maximizes the number of
    compatible devices and thus potential customers. However, targeting any iOS SDK
    older than iOS 4.3 will result in a Unity warning of a potential App Store rejection
    ([Figure 10-21](#9781430248750_Ch10.xhtml#Fig21)).


    ![9781430248750_Fig10-21.jpg](images/9781430248750_Fig10-21.jpg)


    [Figure 10-21](#9781430248750_Ch10.xhtml#_Fig21). Warning when submitting with
    a Target SDK older than version 4.3


    This is only a potential Apple rejection issue if you happen to be upgrading an
    app already on the App Store that has support for ARMv6 processors, because Unity
    4 dropped ARMv6 support and only supports the newer ARMv7 family. As the Unity
    warning recommends, targeting iOS 4.3 or later is safe, because Apple also dropped
    ARMv6 support starting with iOS 4.3 (which means they also dropped support for
    devices older than the iPhone 3GS).


    > **Tip** When I first tried to submit ARMv7-only updates to the App Store (in
    2012), the apps were rejected, and eventually, targeting iOS 4.3 or later avoided
    that problem. Moreover, once an ARMv7-only update was approved on the App Store,
    I was able to target older versions of iOS again because I was no longer upgrading
    an ARMv6 app!


    ## Stripping Level, Script Call Optimization, and Optimize Mesh Data


    Finally, the `Stripping Level`, `Script Call Optimization`, and `Optimize Mesh
    Data` really are optimization settings, which will be covered among other optimization
    techniques in Chapter 16. But, briefly, `Stripping Level` is a Unity iOS Pro option
    that removes unused code (or if you’re unlucky, used code, which is why it’s optional),
    `Script Call Optimization` can speed up scripts by eliminating exception handling
    (exceptions, essentially, are errors or “exceptional” conditions that can be caught
    by calling code), and `Optimize Mesh Data` removes unused Mesh data (e.g., normals
    are not necessary when an unlit material is used).


    ## Summary of Player Settings


    As you can see, there are many options in the `Player Settings` that affect the
    appearance and performance of Unity iOS builds. After changing the `Player Settings`,
    it’s a good idea to save those changes by invoking `Save Project` or `Save Scene`
    (which implicitly performs a `Save Project`, too) from the `File` menu. Although
    many if not most of the `Player Settings` will be important at some point, the
    only change you have to make to get Angry Bots running on the iOS Simulator is
    setting the `Device SDK` to `Simulator SDK`.


    # Test with the iOS Simulator


    Now that you have Xcode installed and have the `Device SDK` set to `Simulator
    SDK`, you’re ready to build and run Angry Bots on the iOS Simulator. The `Build
    and Run` command in the `File` menu and the `Build and Run` button in the `Build
    Settings` window will perform the `Build` phase, generating an Xcode project,
    and then perform the `Run` phase, invoking a build-and-run within the Xcode project.
    Normally, that is pretty convenient, but when working with the iOS Simulator,
    you have more control over the iOS Simulator when performing the Xcode build-and-run
    manually from Xcode. So let’s bring up the `Build Settings` window again (from
    the `File` menu) and click the `Build` button.


    > **Tip** Before performing a build, check in the `Build Settings` window that
    you have the correct set of scenes included.


    Unity will bring up a `Save As` window prompting you for a location and file name
    of the soon-to-be-built Xcode project ([Figure 10-22](#9781430248750_Ch10.xhtml#Fig22)).


    ![9781430248750_Fig10-22.jpg](images/9781430248750_Fig10-22.jpg)


    [Figure 10-22](#9781430248750_Ch10.xhtml#_Fig22). Build prompt for location and
    name of the Xcode project


    It usually defaults to the top level of the Unity project folder. Let’s call the
    Xcode project `AngryIOS`.


    > **Caution** Be careful not to choose a build destination inside the `Assets`
    folder, or Unity will try to import an entire Xcode project as project assets.


    If this isn’t the first time you built this project at this location, Unity will
    detect that an Xcode project with that name already exists and will ask if you
    want to replace the project completely or append the project changes ([Figure
    10-23](#9781430248750_Ch10.xhtml#Fig23)).


    ![9781430248750_Fig10-23.jpg](images/9781430248750_Fig10-23.jpg)


    [Figure 10-23](#9781430248750_Ch10.xhtml#_Fig23). Build Append or Replace dialog
    box


    Appending is faster, but sometimes you need a fresh Xcode project. For example,
    if you change the bundle ID in the `Player Settings`, and definitely if you’ve
    upgraded either Unity or Xcode, you should build a new Xcode project.


    > **Tip** `Build and Run` from the `File` menu is not quite the same as the `Build
    and Run` button in the `Build Settings`. The command in the `File` menu assumes
    you want to append the build folder, if it already exists and doesn’t ask if you
    want to append or replace it. I prefer to stick with performing builds from the
    `Build Settings` window, so I always know what’s going on. I’ve had cases where
    I copied a project, and invoking `Build and Run` from the `File` menu still built
    to the original location!


    ## Performing the Build


    In any case, after clicking `Build`, a progress bar will display during the build
    ([Figure 10-24](#9781430248750_Ch10.xhtml#Fig24)). As with asset reimporting,
    this can take a while for a big project, and the Editor will be unresponsive during
    the build.


    ![9781430248750_Fig10-24.jpg](images/9781430248750_Fig10-24.jpg)


    [Figure 10-24](#9781430248750_Ch10.xhtml#_Fig24). The progress indicator during
    a build


    When the build is complete, an Xcode project folder will appear in the location
    you specified ([Figure 10-25](#9781430248750_Ch10.xhtml#Fig25)).


    ![9781430248750_Fig10-25.jpg](images/9781430248750_Fig10-25.jpg)


    [Figure 10-25](#9781430248750_Ch10.xhtml#_Fig25). An Xcode project folder generated
    by a Unity iOS build


    The Xcode project file is named `Unity-iPhone.xcodeproj` and is located in the
    Xcode project folder. Double-click that file to open the project in Xcode ([Figure
    10-26](#9781430248750_Ch10.xhtml#Fig26)).'
