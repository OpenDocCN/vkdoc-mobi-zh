- fmt: "在“成就”（Achievement）页面上点击“保存”（Save），该成就现在将列在“Game Center 管理”页面上。重复该过程，创建一个用于“全中”（rolling\
    \ a strike）的成就。制作“全中”成就的唯一区别在于，您将使用不同的引用名称和 ID，并且奖励 20 分而不是 10 分。此外，您还应该提供不同的“已获得”和“未获得”成就描述。完成后，再次访问“应用描述”（App\
    \ Description）页面（在您添加排行榜时，Game Center 已在该页面启用），然后点击“成就”（Achievements）部分上方的“编辑”（Edit）按钮，以添加可用的成就。\n\
    \n至此，您已经在 Game Center 中设置了一个排行榜和两个成就。现在，是时候回到脚本编写工作了！\n\n## 集成 Game Center\n\n\
    Unity 通过`Social`类中的静态函数提供对 Game Center 的访问，该类为社交游戏平台提供通用接口。原则上，您甚至可以无需大幅更改代码即可访问其他社交游戏网络，但目前，`Social`仅支持\
    \ Game Center。\n\n我们的游戏将调用`Social`类中的函数来连接 Game Center 并提交成就和分数。我们可以将这些调用直接放入游戏控制器脚本中，但通过创建一个新脚本，我们可以最大限度地减少代码膨胀并最大限度地提高代码可重用性。\n\
    \n在“项目视图”（Project View）中，创建一个新的 JavaScript 文件，将其放置在“脚本”（Scripts）文件夹中，并命名为`FuguGameCenter`（[图\
    \ 14-13](#9781430248750_Ch14.xhtml#Fig13)）。\n\n![9781430248750_Fig14-13.jpg](images/9781430248750_Fig14-13.jpg)\n\
    \n[图 14-13](#9781430248750_Ch14.xhtml#_Fig13). 创建一个新的`FuguGameCenter.js`脚本\n\n\
    ### 初始化 Game Center\n\n在新的`FuguGameCenter`脚本中，我们将 Game Center 初始化代码放在`Start`回调函数中（[清单\
    \ 14-1](#9781430248750_Ch14.xhtml#list1)），以便在脚本启用时立即进行初始化。`Start`回调函数的主体被包裹在`#ifdef\
    \ UNITY_IPHONE`中，这样任何非 iOS 构建都会将该回调视为空。\n\n[清单 14-1](#9781430248750_Ch14.xhtml#_list1).\
    \  `FuguGameCenter.js`中的 Game Center 初始化\n\n```js\nimport UnityEngine.SocialPlatforms.GameCenter;\n\
    var showAchievementBanners:boolean = true;\n\nfunction Start() {\n    #if UNITY_IPHONE\n\
    \        Social.localUser.Authenticate (function (success) {\n            if (success\
    \ && showAchievementBanners) {\n                GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
    \                Debug.Log (\"Authenticated \"+Social.localUser.userName);\n \
    \           } else {\n                Debug.Log (\"Failed to authenticate \"+Social.localUser.userName);\n\
    \            }\n        });\n    #endif\n}\n```\n\n函数`Social.authenticate`执行玩家的\
    \ Game Center 登录（必要时会提示玩家输入登录信息），并接受一个回调函数作为参数。当 Game Center 报告一个`true`或`false`结果（表示操作是否成功）时，该值会被传递给回调函数。与我们之前定义函数（通过单独的名称定义）不同，为了方便，我们直接将函数定义作为参数传递，而不指定名称。以这种方式传递的函数被称为*匿名函数*。我们的匿名回调函数根据`success`值调用`Debug.Log`并输出一条消息。这为我们提供了一种简单的方法来在测试时检查登录是否失败。\n\
    \n该回调函数还可以选择性地激活成就横幅，这些横幅是短暂显示的成就已获得的通知。此 Game Center 功能在 iOS 5 中引入，因此该功能通常被称为\
    \ iOS 5 风格的成就通知横幅。我个人很喜欢看到它们，但这关乎个人偏好，因此我们有一个公共布尔变量`showAchievementBanners`，我们可以在“检查器视图”（Inspector\
    \ View）中勾选或取消勾选它。\n\n如果回调函数收到值为`true`的身份验证成功结果，并且`showAchievementBanners`也为`true`，那么回调函数会调用静态函数`GameCenterPlatform.ShowDefaultAchievementCompletionBanner`，该函数接受一个`true`或`false`参数来打开或关闭横幅，并接受一个成功的回调函数作为参数。成就横幅功能不被视为跨平台特性，这就是为什么该功能未在`Social`类中公开，而必须从`GameCenterPlatform`类中访问的原因。该类位于`UnityEngine.SocialPlatforms.GameCenter`命名空间中，因此我们在脚本顶部导入该命名空间，以避免在引用`GameCenterPlatform`时输入完整的命名空间名称。\n\
    \n### 提交成就\n\n提交成就只需要调用静态函数`Social.ReportProgress`即可。但该函数也需要一个成功的回调函数，而且我们首先应该检查玩家是否已实际登录到\
    \ Game Center。为了避免在每个提交成就的代码片段中都重复这些操作，我们将为`Social.ReportProgress`在`FuguGameCenter`脚本中添加一个包装函数（[清单\
    \ 14-2](#9781430248750_Ch14.xhtml#list2)）。\n\n[清单 14-2](#9781430248750_Ch14.xhtml#_list2).\
    \  在`FuguGameCenter.js`中提交成就\n\n```js\nstatic function Achievement(name:String,progress:double)\
    \ {\n    #if UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n   \
    \         Social.ReportProgress(name,progress, function(success) {\n         \
    \       if (success) {\n                    Debug.Log(\"Achievement \"+name+\"\
    \ reported successfully\");\n                } else {\n                    Debug.Log(\"\
    Failed to report achievement \"+name);\n                }\n            } );\n\
    \        }\n    #endif\n}\n```\n\n这个我们将调用`Achievement`的包装函数是一个静态函数，因此可以从任何脚本中以`FuguGameCenter.Achievement`的形式调用它。它接受一个成就\
    \ ID 和一个进度数值（范围为 0-100），并将它们连同成功的回调函数一起传递给`Social.ReportProgress`，该回调函数会使用`Debug.Log`打印结果。\n\
    \n**注意**：成就进度是以`double`类型传递的，而不是`int`或`float`，这仅仅是遵循 Game Center 的期望。`double`是一个双精度浮点数（`float`是单精度浮点数）。包括\
    \ Unity 在内的游戏引擎通常使用单精度浮点数。\n\n但首先，`Achievement`会检查`Social.localUser.authenticated`，看在调用`Social.ReportProgress`之前玩家是否已登录到\
    \ Game Center。\n\n### 提交分数\n\n向 Game Center 排行榜提交分数的代码看起来与提交成就的代码几乎相同（[清单 14-3](#9781430248750_Ch14.xhtml#list3)）。\n\
    \n[清单 14-3](#9781430248750_Ch14.xhtml#_list3).  在`FuguGameCenter.js`中提交分数\n\n\
    ```js\nstatic function Score(name:String,score:double) {\n    #if UNITY_IPHONE\n\
    \        if (Social.localUser.authenticated) {\n            Social.ReportScore\
    \ (score, name, function(success) {\n                if (success) {\n        \
    \            Debug.Log(\"Posted \"+score+\" on leaderboard \"+name);\n       \
    \         } else {\n                    Debug.Log(\"Failed to post \"+score+\"\
    \ on leaderboard \"+name);\n                }\n            } );\n        }\n \
    \   #endif\n}\n```\n\n静态函数`FuguGameCenter.Score`与静态函数`FuguGameCenter.Achievement`之间的唯一区别在于，一个调用`Social.ReportScore`，另一个调用`Social.ReportProgress`。当然，它们的`Debug.Log`消息也不同，并且`Social.ReportScore`接受的是排行榜\
    \ ID 和分数，而不是成就 ID 和进度数值。\n\n### 完整脚本\n\n现在，您拥有了一个非常精简的 Game Center 包装脚本，其中包含一个`Start`回调、一个公共变量以及几个供其他脚本使用的静态函数。"
  raw: 'Click Save on the Achievement page, and the achievement will now be listed
    on the Game Center management page.    Repeat the process to create an achievement
    for rolling a strike. The only difference for a strike is that you’ll have a different
    reference name and ID, and you’ll award 20 points instead of ten. And you should
    provide different earned and pre-earned descriptions, too. When that’s done, visit
    the App Description page again, where Game Center was already enabled when you
    added a leaderboard, and click the Edit button above the Achievements section
    to add the available achievements.    At this point, you have a leaderboard and
    two achievements set up in Game Center. Now it’s time to get back to scripting!    Integrating
    Game Center    Unity provides access to Game Center through static functions in
    the `Social` class, which provides a general interface to social gaming platforms.
    In principle, you could access other social gaming networks without even changing
    (much) code, but at this time, `Social` only supports Game Center.    Our game
    will be making calls to functions in the `Social` class to connect to Game Center
    and submit achievements and scores. We could place all of those calls directly
    in our game controller script, but we can minimize code bloat and maximize code
    reusability by with a new script.    From the Project View, create a new JavaScript,
    place it in the Scripts folder, and name it FuguGameCenter ([Figure 14-13](#9781430248750_Ch14.xhtml#Fig13)).    ![9781430248750_Fig14-13.jpg](images/9781430248750_Fig14-13.jpg)    [Figure
    14-13](#9781430248750_Ch14.xhtml#_Fig13). Creating a new FuguGameCenter.js script    Initialize
    Game Center    In the new FuguGameCenter script, let’s place the Game Center initialization
    code in the `Start` callback ([Listing 14-1](#9781430248750_Ch14.xhtml#list1)),
    so the initialization will take place as soon as the script is enabled. The body
    of the `Start` callback is enclosed by an `#ifdef UNITY_IPHONE` so that any non-iOS
    build will treat the callback as empty.    [Listing 14-1](#9781430248750_Ch14.xhtml#_list1).  Game
    Center Initialization in FuguGameCenter.js    ``` import UnityEngine.SocialPlatforms.GameCenter;  var
    showAchievementBanners:boolean = true;  function Start() { #if UNITY_IPHONE         Social.localUser.Authenticate
    (function (success) {         if (success && showAchievementBanners) {         GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);
                    Debug.Log ("Authenticated "+Social.localUser.userName);         }
                    else {                          Debug.Log ("Failed to authenticate
    "+Social.localUser.userName);                 }         }); #endif } ```    The
    function `Social.authenticate` performs the Game Center login of the player (prompting
    the player for login information if necessary) and takes a callback function as
    an argument. When Game Center reports a true or false result, indicating if the
    operation was a success, that value is passed to the callback function. Instead
    of defining the callback function as we’ve defined all our functions so far, separate
    with its own name, for convenience we pass the function definition directly as
    the argument, without a name. Functions passed in this manner are called *anonymous
    functions*. Our anonymous callback calls `Debug.Log`with a message based on the
    success value. This gives us an easy way to check if the login has failed when
    we’re testing.    The callback also optionally activates achievement banners,
    which are briefly displayed notifications that an achievement has been awarded.
    This Game Center feature was introduced in iOS 5, so the feature is often referred
    to as iOS 5-style notification banners. I happen to like seeing them, but it’s
    a matter of preference, so we have a public boolean variable showAchievementBanners
    that we can select or deselect in the Inspector View.


    If the callback was passed true for the authentication success value and showAchievementBanners
    is true, then the callback calls the static function `GameCenterPlatform.ShowDefaultAchievementCompletionBanner`,
    which takes a true or false argument to turn the banners on or off, and also takes
    a success callback function as an argument.The achievement banner function is
    not considered a cross-platform feature, which is why the function is not exposed
    in the `Social` class and instead has to be accessed from the `GameCenterPlatform`
    class. That class is in the `UnityEngine.SocialPlatforms.GameCenter` namespace,
    so we import that namespace at the top of the script to avoid typing out the entire
    namespace name when referencing `GameCenterPlatform`.    Submit Achievements    Submitting
    an achievement is as simple as calling the static function `Social.ReportProgress`.
    But that function also takes a success callback function, and we should first
    check if the player is actually logged into Game Center. To avoid duplicating
    all that in every piece of code that submits an achievement, we’ll add a wrapper
    function for `Social.ReportProgress` to the `FuguGameCenter` script ([Listing
    14-2](#9781430248750_Ch14.xhtml#list2)).    [Listing 14-2](#9781430248750_Ch14.xhtml#_list2).  Submitting
    an Achievement in FuguGameCenter.js    ``` static function Achievement(name:String,progress:double)
    { #if UNITY_IPHONE         if (Social.localUser.authenticated) {               
    Social.ReportProgress(name,progress, function(success) {                       if
    (success) {                               Debug.Log("Achievement "+name+" reported
    successfully");                       }  else {                               Debug.Log("Failed
    to report achievement "+name);                       }                } );       
    } #endif } ```    This wrapper function which we’ll call `Achievement`, is a static
    function, so it can be called from any script as `FuguGameCenter.Achievement`.
    It takes an achievement ID and a progress number (in the range 0-100) and passes
    those along to `Social.ReportProgress`, along with a success callback that prints
    the result with Debug.Log.    **Note**   The achievement progress is passed in
    as a double, not an int or float, just because that is what Game Center expects.
    A double is a double-precision floating point number (float is a single-precision
    floating point number). Game engines, including Unity, typically stick with single
    floats.    But first, `Achievement` checks `Social.localUser.authenticated` to
    see if the player is logged into Game Center before calling Social.ReportProgress.    Submit
    Scores    The code for submitting a score to a Game Center leaderboard looks nearly
    identical to the code for submitting an achievement ([Listing 14-3](#9781430248750_Ch14.xhtml#list3)).    [Listing
    14-3](#9781430248750_Ch14.xhtml#_list3).  Submitting a Score in FuguGameCenter.js    ```
    static function Score(name:String,score:double) { #if UNITY_IPHONE         if
    (Social.localUser.authenticated) {                  Social.ReportScore (score,
    name, function(success) {                       if (success) {                               Debug.Log("Posted
    "+score+" on leaderboard "+name);                       }  else {                               Debug.Log("Failed
    to post "+score+" on leaderboard "+name);                       }               
    } );        } #endif } ```    The only difference between the static function
    `FuguGameCenter.Score` and the static function `FuguGameCenter.Achievement` is
    that one calls `Social.ReportScore` and one calls `Social.ReportProgress`. Off
    course, also, they have different `Debug.Log` messages and `Social.ReportScore`
    takes a leaderboard ID and score instead of an achievement ID and progress number.    The
    Complete Script    You now have a very trim Game Center wrapper script with just
    a `Start` callback, one public variable, and a couple of static functions for
    use from other scripts.'
  trans: "以下是按照您的要求，将给定英文文本翻译成符合规范的中文 Markdown 文档：\n\n```markdown\n在“成就”（Achievement）页面上点击“保存”（Save），该成就现在将列在“Game\
    \ Center 管理”页面上。重复该过程，创建一个用于“全中”（rolling a strike）的成就。制作“全中”成就的唯一区别在于，您将使用不同的引用名称和\
    \ ID，并且奖励 20 分而不是 10 分。此外，您还应该提供不同的“已获得”和“未获得”成就描述。完成后，再次访问“应用描述”（App Description）页面（在您添加排行榜时，Game\
    \ Center 已在该页面启用），然后点击“成就”（Achievements）部分上方的“编辑”（Edit）按钮，以添加可用的成就。\n\n至此，您已经在\
    \ Game Center 中设置了一个排行榜和两个成就。现在，是时候回到脚本编写工作了！\n\n## 集成 Game Center\n\nUnity 通过`Social`类中的静态函数提供对\
    \ Game Center 的访问，该类为社交游戏平台提供通用接口。原则上，您甚至可以无需大幅更改代码即可访问其他社交游戏网络，但目前，`Social`仅支持\
    \ Game Center。\n\n我们的游戏将调用`Social`类中的函数来连接 Game Center 并提交成就和分数。我们可以将这些调用直接放入游戏控制器脚本中，但通过创建一个新脚本，我们可以最大限度地减少代码膨胀并最大限度地提高代码可重用性。\n\
    \n在“项目视图”（Project View）中，创建一个新的 JavaScript 文件，将其放置在“脚本”（Scripts）文件夹中，并命名为`FuguGameCenter`（图\
    \ 14-13）。\n\n![9781430248750_Fig14-13.jpg](img/9781430248750_Fig14-13.jpg)\n\n\
    图 14-13. 创建一个新的`FuguGameCenter.js`脚本\n\n### 初始化 Game Center\n\n在新的`FuguGameCenter`脚本中，我们将\
    \ Game Center 初始化代码放在`Start`回调函数中（清单 14-1），以便在脚本启用时立即进行初始化。`Start`回调函数的主体被包裹在`#ifdef\
    \ UNITY_IPHONE`中，这样任何非 iOS 构建都会将该回调视为空。\n\n清单 14-1.  `FuguGameCenter.js`中的 Game\
    \ Center 初始化\n\n```js\nimport UnityEngine.SocialPlatforms.GameCenter;\nvar showAchievementBanners:boolean\
    \ = true;\n\nfunction Start() {\n    #if UNITY_IPHONE\n        Social.localUser.Authenticate\
    \ (function (success) {\n            if (success && showAchievementBanners) {\n\
    \                GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
    \                Debug.Log (\"Authenticated \"+Social.localUser.userName);\n \
    \           } else {\n                Debug.Log (\"Failed to authenticate \"+Social.localUser.userName);\n\
    \            }\n        });\n    #endif\n}\n```\n\n函数`Social.authenticate`执行玩家的\
    \ Game Center 登录（必要时会提示玩家输入登录信息），并接受一个回调函数作为参数。当 Game Center 报告一个`true`或`false`结果（表示操作是否成功）时，该值会被传递给回调函数。与我们之前定义函数（通过单独的名称定义）不同，为了方便，我们直接将函数定义作为参数传递，而不指定名称。以这种方式传递的函数被称为*匿名函数*。我们的匿名回调函数根据`success`值调用`Debug.Log`并输出一条消息。这为我们提供了一种简单的方法来在测试时检查登录是否失败。\n\
    \n该回调函数还可以选择性地激活成就横幅，这些横幅是短暂显示的成就已获得的通知。此 Game Center 功能在 iOS 5 中引入，因此该功能通常被称为\
    \ iOS 5 风格的成就通知横幅。我个人很喜欢看到它们，但这关乎个人偏好，因此我们有一个公共布尔变量`showAchievementBanners`，我们可以在“检查器视图”（Inspector\
    \ View）中勾选或取消勾选它。\n\n如果回调函数收到值为`true`的身份验证成功结果，并且`showAchievementBanners`也为`true`，那么回调函数会调用静态函数`GameCenterPlatform.ShowDefaultAchievementCompletionBanner`，该函数接受一个`true`或`false`参数来打开或关闭横幅，并接受一个成功的回调函数作为参数。成就横幅功能不被视为跨平台特性，这就是为什么该功能未在`Social`类中公开，而必须从`GameCenterPlatform`类中访问的原因。该类位于`UnityEngine.SocialPlatforms.GameCenter`命名空间中，因此我们在脚本顶部导入该命名空间，以避免在引用`GameCenterPlatform`时输入完整的命名空间名称。\n\
    \n### 提交成就\n\n提交成就只需要调用静态函数`Social.ReportProgress`即可。但该函数也需要一个成功的回调函数，而且我们首先应该检查玩家是否已实际登录到\
    \ Game Center。为了避免在每个提交成就的代码片段中都重复这些操作，我们将为`Social.ReportProgress`在`FuguGameCenter`脚本中添加一个包装函数（清单\
    \ 14-2）。\n\n清单 14-2.  在`FuguGameCenter.js`中提交成就\n\n```js\nstatic function Achievement(name:String,progress:double)\
    \ {\n    #if UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n   \
    \         Social.ReportProgress(name,progress, function(success) {\n         \
    \       if (success) {\n                    Debug.Log(\"Achievement \"+name+\"\
    \ reported successfully\");\n                } else {\n                    Debug.Log(\"\
    Failed to report achievement \"+name);\n                }\n            } );\n\
    \        }\n    #endif\n}\n```\n\n这个我们将调用`Achievement`的包装函数是一个静态函数，因此可以从任何脚本中以`FuguGameCenter.Achievement`的形式调用它。它接受一个成就\
    \ ID 和一个进度数值（范围为 0-100），并将它们连同成功的回调函数一起传递给`Social.ReportProgress`，该回调函数会使用`Debug.Log`打印结果。\n\
    \n**注意**：成就进度是以`double`类型传递的，而不是`int`或`float`，这仅仅是遵循 Game Center 的期望。`double`是一个双精度浮点数（`float`是单精度浮点数）。包括\
    \ Unity 在内的游戏引擎通常使用单精度浮点数。\n\n但首先，`Achievement`会检查`Social.localUser.authenticated`，看在调用`Social.ReportProgress`之前玩家是否已登录到\
    \ Game Center。\n\n### 提交分数\n\n向 Game Center 排行榜提交分数的代码看起来与提交成就的代码几乎相同（清单 14-3）。\n\
    \n清单 14-3.  在`FuguGameCenter.js`中提交分数\n\n```js\nstatic function Score(name:String,score:double)\
    \ {\n    #if UNITY_IPHONE\n        if (Social.localUser.authenticated) {\n   \
    \         Social.ReportScore (score, name, function(success) {\n             \
    \   if (success) {\n                    Debug.Log(\"Posted \"+score+\" on leaderboard\
    \ \"+name);\n                } else {\n                    Debug.Log(\"Failed\
    \ to post \"+score+\" on leaderboard \"+name);\n                }\n          \
    \  } );\n        }\n    #endif\n}\n```\n\n静态函数`FuguGameCenter.Score`与静态函数`FuguGameCenter.Achievement`之间的唯一区别在于，一个调用`Social.ReportScore`，另一个调用`Social.ReportProgress`。当然，它们的`Debug.Log`消息也不同，并且`Social.ReportScore`接受的是排行榜\
    \ ID 和分数，而不是成就 ID 和进度数值。\n\n### 完整脚本\n\n现在，您拥有了一个非常精简的 Game Center 包装脚本，其中包含一个`Start`回调、一个公共变量以及几个供其他脚本使用的静态函数。\n\
    ```"
- fmt: "# FuguGameCenter Integration\n\nThe `FuguGameCenter` script in its entirety\
    \ is available in the project for this chapter on [http://learnunity4.com/](http://learnunity4.com/).\n\
    \n## Attach the Script\n\nBecause the Game Center initialization takes place in\
    \ the `Start` callback of `FuguGameCenter.js`, the script has to be attached to\
    \ a `GameObject` in the scene. Make sure you have the bowling scene open, create\
    \ an empty `GameObject`, name it `GameCenter`, and drag the `FuguGameCenter` script\
    \ onto it. The script has just one property that you can tweak in the Inspector\
    \ View, the option to display iOS 5-style achievement banners ([Figure 14-14](#9781430248750_Ch14.xhtml#Fig14)).\n\
    \n![9781430248750_Fig14-14.jpg](images/9781430248750_Fig14-14.jpg)\n\n[Figure\
    \ 14-14](#9781430248750_Ch14.xhtml#_Fig14). The `FuguGameCenter` script in the\
    \ scene\n\nYou could have attached the `FuguGameCenter` script to a `GameObject`\
    \ in the splash scene instead, as the static functions defined in that file can\
    \ be called whether or not the script is attached in any scene. Placing the script\
    \ in the splash scene would have the advantage of initializing Game Center earlier,\
    \ but it is less confusing if the `FuguGameCenter` script is in the same scene\
    \ as the scripts that will call it (in this case, the `FuguBowl` script).\n\n\
    ## Integrate the Game\n\nAlthough the `FuguGameCenter` script takes care of Game\
    \ Center initialization and provides static functions to report scores and achievements,\
    \ you still need the `FuguBowl` script to call those static functions. Fortunately,\
    \ this part is really easy.\n\n### Submit Achievements\n\nSo far we’ve set up\
    \ two achievements, one for rolling a spare and the other a strike, so now the\
    \ game needs to report spares and strikes when they happen (at least the first\
    \ time). This is where organizing the game controller as a state machine really\
    \ pays off. There’s already a game state for a spare and a game state for a strike,\
    \ so let’s just add calls in them to the `FuguGameCenter.Achievement` function\
    \ ([Listing 14-4](#9781430248750_Ch14.xhtml#list4)).\n\n[Listing 14-4](#9781430248750_Ch14.xhtml#_list4).\
    \ Submitting Achievements in `FuguBowl.js`\n\n```javascript\nvar spareAchievementID:String\
    \ = \"com.technicat.fugubowl.spare\";\nvar strikeAchievementID:String = \"com.technicat.fugubowl.strike\"\
    ;\n\nfunction StateSpare() {\n       FuguGameCenter.Achievement(spareAchievementID,100);\n\
    \       state=\"StateNextBall\";\n}\n\nfunction StateStrike() {\n       FuguGameCenter.Achievement(strikeAchievementID,100);\n\
    \       state = \"StateNextBall\";\n}\n```\n\nInstead of hardcoding the achievement\
    \ IDs that are passed to `FuguGameCenter.Achievement` (your achievement IDs will\
    \ likely be different from mine), declare public variables for spare and strike\
    \ so you can customize them in the Inspector View.\n\n### Submit the Score\n\n\
    Submitting the final game score is similar to submitting achievements. We were\
    \ already printing the final score with `Debug.Log` in the game-over state, so\
    \ that’s an obvious place to submit the final score to Game Center ([Listing 14-5](#9781430248750_Ch14.xhtml#list5)).\n\
    \n[Listing 14-5](#9781430248750_Ch14.xhtml#_list5). Submitting a Game Score in\
    \ `FuguBowl.js`\n\n```javascript\nvar leaderboardID:String = \"com.technicat.fugubowl.highscore\"\
    ;\n\nfunction StateGameOver() {\n       Debug.Log(\"Final Score: \"+player.GetScore(9));\n\
    \       FuguGameCenter.Score(leaderboardID,player.GetScore(9));\n       yield\
    \ WaitForSeconds(gameOverTime);\n       state=\"StateNewGame\";\n}\n```\n\nAgain,\
    \ the leaderboard ID is declared as a public variable, so it can be customized\
    \ in the Inspector View ([Figure 14-15](#9781430248750_Ch14.xhtml#Fig15)).\n\n\
    ![9781430248750_Fig14-15.jpg](images/9781430248750_Fig14-15.jpg)\n\n[Figure 14-15](#9781430248750_Ch14.xhtml#_Fig15).\
    \ Custom Game Center IDs in the `FuguBowl` script\n\nThis was such a small change\
    \ to our game controller code, just two additional lines (and it could easily\
    \ have been one), so I won’t bother listing the entire `FuguBowl` script again,\
    \ but the modified script is of course available in the project for this chapter\
    \ at `http://learnunity4.com/`.\n\n## Test the Game\n\nUntil the app is released\
    \ on the App Store, the achievements and leaderboards are only available in the\
    \ Game Center Sandbox, which is basically an alternate universe for Game Center,\
    \ with its own user IDs and leaderboard and achievement data. When an app in development\
    \ (a version that has not been approved yet for the App Store) attempts to connect\
    \ to Game Center the player will be prompted to log in to or create a Sandbox\
    \ account, and the outside world won’t see any scores and achievements you earn\
    \ in the test session, since they are only recorded in the Sandbox.\n\n**Tip**:\
    \ If you seem to be stuck in the Sandbox version of Game Center or stuck in the\
    \ non-Sandbox version, try bringing up the iOS Game Center app and then logging\
    \ out (tap your Apple ID).\n\nWhen you build and run Fugu Bowl on the iOS Simulator\
    \ or on a device (but not in the Editor) and play a whole game, you should have\
    \ a score on the leaderboard and up to two achievements, if you bowled a strike\
    \ or a spare. At this point, Fugu Bowl should be visible in the Game Center app\
    \ ([Figure 14-16](#9781430248750_Ch14.xhtml#Fig16)), and when you tap on it, you’ll\
    \ see the scores and achievements that have been submitted ([Figure 14-17](#9781430248750_Ch14.xhtml#Fig17)).\n\
    \n![9781430248750_Fig14-16.jpg](images/9781430248750_Fig14-16.jpg)\n\n[Figure\
    \ 14-16](#9781430248750_Ch14.xhtml#_Fig16). Fugu Bowl listed in the Sandbox version\
    \ of Game Center\n\n![9781430248750_Fig14-17.jpg](images/9781430248750_Fig14-17.jpg)\n\
    \n[Figure 14-17](#9781430248750_Ch14.xhtml#_Fig17). Test results in the Game Center\
    \ Sandbox\n\nScores and achievements don’t always show up in Game Center in a\
    \ reliable or timely manner, particularly when testing in the Sandbox, so check\
    \ the Xcode debug area to see if Game Center operations succeeded (remember, we\
    \ added logging functions in all of the `FuguGameCenter` functions).\n\n## Show\
    \ Game Center In-Game\n\nAlthough the Game Center app’s display of the achievements\
    \ and leaderboard looks pretty nice, players of the bowling game might not bother\
    \ checking the Game Center app, or they might not even know about it. Ideally,\
    \ the player would be able to view the leaderboard and the achievements within\
    \ the game, so let’s add a couple buttons to the main pause menu in the `FuguPause`\
    \ script for that purpose ([Listing 14-6](#9781430248750_Ch14.xhtml#list6)).\n\
    \n[Listing 14-6](#9781430248750_Ch14.xhtml#_list6). Buttons to Show Achievements\
    \ and High Scores in `FuguPause.js`\n\n```javascript\nfunction ShowPauseMenu()\
    \ {\n       BeginPage(150,300);\n       if (GUILayout.Button (\"Play\")) {\n \
    \              UnPauseGame();\n       }\n        if (GUILayout.Button (\"Options\"\
    )) {\n               currentPage = Page.Options;\n       }\n        if (GUILayout.Button\
    \ (\"Credits\")) {\n               currentPage = Page.Credits;\n       }\n#if\
    \ UNITY_IPHONE\n       if (GUILayout.Button (\"High Scores\")) {\n           \
    \    Social.ShowLeaderboardUI();\n       }\n       if (GUILayout.Button (\"Achievements\"\
    )) {\n               Social.ShowAchievementsUI();\n       }\n#endif\n#if !UNITY_IPHONE\
    \ && !UNITY_WEBPLAYER\n        if (GUILayout.Button (\"Quit\")) {\n          \
    \     Application.Quit();\n       }\n#endif\n        EndPage();\n}\n```\n\nThe\
    \ code for those two buttons are wrapped with `#if UNITY_IPHONE`, so they will\
    \ only appear on iOS builds. They’re labeled High Scores and Achievements ([Figure\
    \ 14-18](#9781430248750_Ch14.xhtml#Fig18)).\n\n![9781430248750_Fig14-18.jpg](images/9781430248750_Fig14-18.jpg)\n\
    \n[Figure 14-18](#9781430248750_Ch14.xhtml#_Fig18)."
