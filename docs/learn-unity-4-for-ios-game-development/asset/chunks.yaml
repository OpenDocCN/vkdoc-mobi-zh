- fmt: '`Culling Mask`属性指定了光源将影响的层级。这与摄像机组件的`Culling Mask`决定摄像机可见对象的方式非常相似，光源的`Culling
    Mask`决定了哪些对象会被光源照亮。


    ### Flare


    `Flare`属性在分配了`Flare`资源后，会产生一个从此光源发出的镜头光晕效果。


    ### Draw Halo


    `Draw Halo`属性会在光源位置周围产生一个光晕效果。启用此属性时，将提供一个额外的光晕颜色属性。


    ### Render Mode


    光源的`Render Mode`指定该光源是`Important`、`Not Important`还是`Auto`，其中`Auto`表示其重要性会根据光源的亮度和当前的质量设置自动确定。光源的重要性决定了它是否被应用为像素光。像素光是实现阴影和`Cookie`等效果所必需的。


    ### Lightmapping


    `Lightmapping`属性决定此光源是用于动态光照、生成光照贴图，还是两者兼用。在这些示例中，你不会使用光照贴图（生成它们需要很长时间），因此`RealtimeOnly`或`Auto`对这些光源来说都没问题。


    ## 调整光源


    与摄像机一样，当你选中点光源并在检查器中打开其光源组件时，场景视图中会显示更多关于该光源的信息。对于点光源，会显示其半径，因此你可以看到哪些对象受到该光源的影响（[图3-23](#9781430248750_Ch03.xhtml#Fig23)）。为了使立方体受到点光源的影响，它必须在光源的半径内。但要记住，点光源从其位置向外辐射，因此你不能将点光源放在与立方体相同的位置，因为那样光源会从立方体内部辐射，无法照亮其外表面。


    ![9781430248750_Fig03-23.jpg](images/9781430248750_Fig03-23.jpg)


    [图3-23](#9781430248750_Ch03.xhtml#_Fig23) 点光源的场景视图


    你可以在检查器视图中单独调整光源属性，但也尝试使用场景视图。点击编辑器左上角按钮栏中的`Move`按钮（它是手形工具右侧带箭头的按钮）。现在选中点光源，场景视图会显示以光源为中心的箭头，对应光源的x、y、z轴。点击并拖动其中任意一个箭头，将沿相应轴移动光源。


    光源周围的圆圈勾勒出其范围。你可以通过点击并拖动圆圈内侧的小黄色矩形来调整范围。范围内的任何物体都会被光源照亮，而范围外的物体则不会受到光源影响。


    **警告：** 与点光源位置完全相同的物体不会受到该光源的影响。


    继续移动光源并根据需要调整其半径，确保立方体被照亮。现在单击`Play`按钮，立方体将被照亮，并且当你环绕立方体旋转摄像机时，光照会发生变化。


    ## 制作光晕


    目前，点光源本身在播放模式下是不可见的。光源的存在只能通过它照亮的游戏对象来体现。但是，如果你启用其光晕，就可以看到光源来自何处。在检查器视图中启用`Draw
    Halo`属性，同时点击`Color`属性来更改光源的颜色（[图3-24](#9781430248750_Ch03.xhtml#Fig24)）。


    ![9781430248750_Fig03-24.jpg](images/9781430248750_Fig03-24.jpg)


    [图3-24](#9781430248750_Ch03.xhtml#_Fig24) 选择光晕颜色


    这不仅会影响从物体反射的光的颜色，还会影响用于绘制光晕的颜色。你可以在场景视图中看到光晕（[图3-25](#9781430248750_Ch03.xhtml#Fig25)），并在点击`Play`时看到它（[图3-26](#9781430248750_Ch03.xhtml#Fig26)）。


    ![9781430248750_Fig03-25.jpg](images/9781430248750_Fig03-25.jpg)


    [图3-25](#9781430248750_Ch03.xhtml#_Fig25) 带有光晕的点光源的场景视图


    ![9781430248750_Fig03-26.jpg](images/9781430248750_Fig03-26.jpg)


    [图3-26](#9781430248750_Ch03.xhtml#_Fig26) 带有光晕的点光源的游戏视图


    ## 添加天空盒


    立方体看起来更有趣了，但背景仍然是空白的，所以让我们通过添加天空来增添一点活力。具体来说，你可以添加一个*天空盒*，它是由六张纹理描绘的天空，这些纹理构成了包围它的立方体的六个内表面。


    ### 导入天空盒


    你可以像导入摄像机脚本一样，从标准资源中导入天空盒。在`Assets`菜单的`Import Package`子菜单下，选择`Skyboxes`（[图3-27](#9781430248750_Ch03.xhtml#Fig27)）。


    ![9781430248750_Fig03-27.jpg](images/9781430248750_Fig03-27.jpg)


    [图3-27](#9781430248750_Ch03.xhtml#_Fig27) 从标准资源菜单导入天空盒


    弹出的导入窗口（[图3-28](#9781430248750_Ch03.xhtml#Fig28)）列出了一大堆天空盒。文件名的`.mat`扩展名表明天空盒实际上是一种*材质*，这是一种描述表面如何渲染的对象。天空盒是一种特殊的材质，因为它们不应用于网格，仅用于渲染天空。


    ![9781430248750_Fig03-28.jpg](images/9781430248750_Fig03-28.jpg)


    [图3-28](#9781430248750_Ch03.xhtml#_Fig28) 标准资源中的天空盒


    继续点击`Import`按钮。天空盒及其支持的纹理将出现在项目视图中（[图3-29](#9781430248750_Ch03.xhtml#Fig29)）。


    ![9781430248750_Fig03-29.jpg](images/9781430248750_Fig03-29.jpg)


    [图3-29](#9781430248750_Ch03.xhtml#_Fig29) 天空盒的项目视图


    ### 天空盒的构成


    为了更好地理解天空盒的构成，选择`Sunny3 Skybox`并在检查器视图中查看它（[图3-30](#9781430248750_Ch03.xhtml#Fig30)）。由于它是一种材质，天空盒具有一个着色器（一个指导图形硬件如何渲染多边形的程序）以及着色器的一些参数。通常（但并非总是如此），着色器的参数包括一个或多个纹理。在检查器视图中，你可以看到这个天空盒使用`RenderFX/Skybox`着色器、六张用于天空盒侧面的纹理，以及一种用于给这些纹理着色的颜色。


    ![9781430248750_Fig03-30.jpg](images/9781430248750_Fig03-30.jpg)


    [图3-30](#9781430248750_Ch03.xhtml#_Fig30) 天空盒的检查器视图


    ### 应用天空盒


    要将天空盒应用于场景，首先确保主摄像机的`Clear Flags`属性设置为`Skybox`。然后调出`Edit`菜单并选择`Render Settings`（[图3-31](#9781430248750_Ch03.xhtml#Fig31)）。


    ![9781430248750_Fig03-31.jpg](images/9781430248750_Fig03-31.jpg)


    [图3-31](#9781430248750_Ch03.xhtml#_Fig31) 选择`Render Settings`


    `Render Settings`是应用于整个场景的渲染属性，包括雾效、环境光和天空盒（[图3-32](#9781430248750_Ch03.xhtml#Fig32)）。


    ![9781430248750_Fig03-32.jpg](images/9781430248750_Fig03-32.jpg)


    [图3-32](#9781430248750_Ch03.xhtml#_Fig32) `Render Settings`


    **提示：** *如果你使用雾效，最好让雾的颜色与天空盒的色调颜色匹配。*


    请注意，你看到的`Render Settings`仅适用于当前打开的场景。如果你的项目中有多个场景，每个场景都有自己的`Render Settings`（否则，每个场景都会使用相同的天空盒）。


    将`Sunny3 Skybox`拖拽到`Skybox Material`字段中，你应该会在场景视图和游戏视图的背景中看到蔚蓝的天空和蓬松的白云（如果你厌倦了蓝天，可以尝试更改天空盒上的`Tint
    Color`）。'
  raw: 'The Culling Mask property specifies the layers that the Light will affect.
    Very much like how the Culling Mask of the Camera Component dictates what objects
    are visible to the Camera, the Culling Mask of the Light dictates what objects
    are lit by a Light.


    Flare


    The Flare property, when assigned a Flare asset, produces a lens flare effect
    emanating from thsi Light.


    Draw Halo


    The Draw Halo property produces a halo effect around the position of the Light.
    When this property is enabled, an additional property for the halo color is made
    available.


    Render Mode


    The Render Mode of a Light specifies whether the Light is Important, Not Important,
    or Auto, which means its importance is determined automatically, based on the
    Light’s brightness and the current Quality Settings. A Light’s importance determines
    whether it is applied as a pixel light or not. Pixel lights are required for effects
    like shadows and cookies.


    Lightmapping


    The Lightmapping property determines whether this Light is used for dynamic lighting,
    generating lightmaps, or both. You won’t be using lightmaps for these examples
    (they take a long time to generate), so RealtimeOnly or Auto will be fine for
    these Lights.


    Adjust the Light


    As with Cameras, when you have the Point Light selected and its Light Component
    open in the Inspector, more information about the Light is depicted in the Scene
    View. For a Point Light, the radius is displayed, so you can see what objects
    are affected by the Light ([Figure 3-23](#9781430248750_Ch03.xhtml#Fig23)). In
    order for the Cube to be affected by the Point Light, it must be within the Light’s
    radius. But remember, a Point Light radiates outward from its position, so you
    can’t have the Point Light at the same position as the Cube, because then the
    Light would be radiating from within the Cube and wouldn’t illuminate the Cube’s
    outer surface.


    ![9781430248750_Fig03-23.jpg](images/9781430248750_Fig03-23.jpg)


    [Figure 3-23](#9781430248750_Ch03.xhtml#_Fig23). The Scene View of a Point Light


    You can adjust the Light properties solely in the Inspector View, but try using
    the Scene View. Click the Move button in the button bar on the top left of the
    Editor (it’s the button with arrows directly right of the Hand tool). Now with
    the Point Light selected, the Scene View displays arrows centered at the Light
    that correspond to the x, y, and z axes of the Light. Click-dragging on any of
    those arrows will move the Light along the corresponding axis.


    The circles around the Light delineate the range of the Light. You can adjust
    the range by click-dragging the little yellow rectangles just inside the circles.
    Anything within the range is lit by the Light, and anything outside the range
    won’t be affected by the Light.


    **Warning**   An object in exactly the same position as a Point Light won’t be
    affected by that Light.


    Go ahead and move the Light and adjust its radius as necessary to make sure the
    Cube is lit. Now when you click the Play button, the Cube is lit, and the lighting
    varies as you orbit the Camera around the Cube.


    Make a Halo


    Right now the Point Light itself is invisible when you’re in Play mode. The Light’s
    presence is only evident through the GameObjects that it illuminates. However,
    you can see where the Light is coming from if you enable its halo. Enable the
    Draw Halo property in the Inspector View, and while you’re at it, click the Color
    property to change the Light’s color ([Figure 3-24](#9781430248750_Ch03.xhtml#Fig24)).


    ![9781430248750_Fig03-24.jpg](images/9781430248750_Fig03-24.jpg)


    [Figure 3-24](#9781430248750_Ch03.xhtml#_Fig24). Selecting a halo color


    This affects not only the color of the Light that is reflected off objects, but
    it’s also the color used to draw the halo. You can see the halo in the Scene View
    ([Figure 3-25](#9781430248750_Ch03.xhtml#Fig25)) and when you click Play ([Figure
    3-26](#9781430248750_Ch03.xhtml#Fig26)).


    ![9781430248750_Fig03-25.jpg](images/9781430248750_Fig03-25.jpg)


    [Figure 3-25](#9781430248750_Ch03.xhtml#_Fig25). The Scene View of a Point Light
    with a halo


    ![9781430248750_Fig03-26.jpg](images/9781430248750_Fig03-26.jpg)


    [Figure 3-26](#9781430248750_Ch03.xhtml#_Fig26). The Game View of a Point Light
    with a halo


    Add a Skybox


    The Cube is looking more interesting, but the background is still blank, so let’s
    liven it up a bit by adding a sky. Specifically, you can add a *skybox*, which
    is a sky depicted by six textures comprising the six faces of the inside of a
    cube that surrounds it.


    Import the Skybox


    You can import Skyboxes from the Standard Assets just like you did for the Camera
    scripts. Under the Import Package submenu of the Assets menu, select Skyboxes
    ([Figure 3-27](#9781430248750_Ch03.xhtml#Fig27)).


    ![9781430248750_Fig03-27.jpg](images/9781430248750_Fig03-27.jpg)


    [Figure 3-27](#9781430248750_Ch03.xhtml#_Fig27). Importing Skyboxes from the Standard
    Assets menu


    The resulting Import window ([Figure 3-28](#9781430248750_Ch03.xhtml#Fig28)) lists
    a whole bunch of Skyboxes. The .mat extension of the filenames indicates that
    Skyboxes are actually a kind of *material*, which is an object that describes
    how a surface is rendered. Skyboxes are sort of special-case Materials since they’re
    not applied to Meshes, just used for rendering the sky.


    ![9781430248750_Fig03-28.jpg](images/9781430248750_Fig03-28.jpg)


    [Figure 3-28](#9781430248750_Ch03.xhtml#_Fig28). Skyboxes in Standard Assets


    Go ahead and click the Import button. The Skyboxes and their supporting textures
    will appear in the Project View ([Figure 3-29](#9781430248750_Ch03.xhtml#Fig29)).


    ![9781430248750_Fig03-29.jpg](images/9781430248750_Fig03-29.jpg)


    [Figure 3-29](#9781430248750_Ch03.xhtml#_Fig29). The Project View of Skyboxes


    Anatomy of a Skybox


    To get a better idea of the a Skybox’s composition, select the Sunny3 Skybox and
    examine it in the Inspector View ([Figure 3-30](#9781430248750_Ch03.xhtml#Fig30)).
    Since it’s a Material, the Skybox has a shader, which is a program instructing
    the graphics hardware how a polygon should be rendered, along with some parameters
    for the shader. Usually (but not always), the parameters for a shader include
    one or more textures. In the Inspector View, you can see the Skybox uses a RenderFX/Skybox
    shader, six textures for the Skybox sides, and a color that tints those textures.


    ![9781430248750_Fig03-30.jpg](images/9781430248750_Fig03-30.jpg)


    [Figure 3-30](#9781430248750_Ch03.xhtml#_Fig30). The Inspector View of a Skybox


    Apply the Skybox


    To apply the Skybox to the scene, first make sure you have the Clear Flags property
    of the Main Camera set to Skybox. Then bring up the Edit menu and select Render
    Settings ([Figure 3-31](#9781430248750_Ch03.xhtml#Fig31)).


    ![9781430248750_Fig03-31.jpg](images/9781430248750_Fig03-31.jpg)


    [Figure 3-31](#9781430248750_Ch03.xhtml#_Fig31). Selecting the Render Settings


    The Render Settings are rendering properties that apply to the whole scene, including
    Fog, Ambient Light, and the Skybox ([Figure 3-32](#9781430248750_Ch03.xhtml#Fig32)).


    ![9781430248750_Fig03-32.jpg](images/9781430248750_Fig03-32.jpg)


    [Figure 3-32](#9781430248750_Ch03.xhtml#_Fig32). The Render Settings


    **Tip**   *If you use fog, it’s a good idea to make the fog color match the tint
    color of the Skybox.*


    Note that the Render Settings you see apply only to the currently open scene.
    If you have multiple scenes in your project, each has its own Render Settings
    (otherwise you’re stuck with the same Skybox in each scene).


    Drag the Sunny3 Skybox into the Skybox Material field, and you should see those
    blue skies and fluffy white clouds in the background of the Scene View and Game
    View (if you get tired of blue skies, try changing the Tint Color on the Skybox).'
  trans: '

    `Culling Mask` 属性指定了光源将影响的层级。这与摄像机组件的 `Culling Mask` 决定摄像机可见对象的方式非常相似，光源的 `Culling
    Mask` 决定了哪些对象会被光源照亮。


    ### Flare


    `Flare` 属性在分配了 `Flare` 资源后，会产生一个从此光源发出的镜头光晕效果。


    ### Draw Halo


    `Draw Halo` 属性会在光源位置周围产生一个光晕效果。启用此属性时，将提供一个额外的光晕颜色属性。


    ### Render Mode


    光源的 `Render Mode` 指定该光源是 `Important`、`Not Important` 还是 `Auto`，其中 `Auto` 表示其重要性会根据光源的亮度和当前的质量设置自动确定。光源的重要性决定了它是否被应用为像素光。像素光是实现阴影和
    `Cookie` 等效果所必需的。


    ### Lightmapping


    `Lightmapping` 属性决定此光源是用于动态光照、生成光照贴图，还是两者兼用。在这些示例中，你不会使用光照贴图（生成它们需要很长时间），因此 `RealtimeOnly`
    或 `Auto` 对这些光源来说都没问题。


    ## 调整光源


    与摄像机一样，当你选中点光源并在检查器中打开其光源组件时，场景视图中会显示更多关于该光源的信息。对于点光源，会显示其半径，因此你可以看到哪些对象受到该光源的影响（图
    3-23）。为了使立方体受到点光源的影响，它必须在光源的半径内。但要记住，点光源从其位置向外辐射，因此你不能将点光源放在与立方体相同的位置，因为那样光源会从立方体内部辐射，无法照亮其外表面。


    ![9781430248750_Fig03-23.jpg](img/9781430248750_Fig03-23.jpg)


    图 3-23 点光源的场景视图


    你可以在检查器视图中单独调整光源属性，但也尝试使用场景视图。点击编辑器左上角按钮栏中的 `Move` 按钮（它是手形工具右侧带箭头的按钮）。现在选中点光源，场景视图会显示以光源为中心的箭头，对应光源的
    x、y、z 轴。点击并拖动其中任意一个箭头，将沿相应轴移动光源。


    光源周围的圆圈勾勒出其范围。你可以通过点击并拖动圆圈内侧的小黄色矩形来调整范围。范围内的任何物体都会被光源照亮，而范围外的物体则不会受到光源影响。


    **警告：** 与点光源位置完全相同的物体不会受到该光源的影响。


    继续移动光源并根据需要调整其半径，确保立方体被照亮。现在单击 `Play` 按钮，立方体将被照亮，并且当你环绕立方体旋转摄像机时，光照会发生变化。


    ## 制作光晕


    目前，点光源本身在播放模式下是不可见的。光源的存在只能通过它照亮的游戏对象来体现。但是，如果你启用其光晕，就可以看到光源来自何处。在检查器视图中启用 `Draw
    Halo` 属性，同时点击 `Color` 属性来更改光源的颜色（图 3-24）。


    ![9781430248750_Fig03-24.jpg](img/9781430248750_Fig03-24.jpg)


    图 3-24 选择光晕颜色


    这不仅会影响从物体反射的光的颜色，还会影响用于绘制光晕的颜色。你可以在场景视图中看到光晕（图 3-25），并在点击 `Play` 时看到它（图 3-26）。


    ![9781430248750_Fig03-25.jpg](img/9781430248750_Fig03-25.jpg)


    图 3-25 带有光晕的点光源的场景视图


    ![9781430248750_Fig03-26.jpg](img/9781430248750_Fig03-26.jpg)


    图 3-26 带有光晕的点光源的游戏视图


    ## 添加天空盒


    立方体看起来更有趣了，但背景仍然是空白的，所以让我们通过添加天空来增添一点活力。具体来说，你可以添加一个*天空盒*，它是由六张纹理描绘的天空，这些纹理构成了包围它的立方体的六个内表面。


    ### 导入天空盒


    你可以像导入摄像机脚本一样，从标准资源中导入天空盒。在 `Assets` 菜单的 `Import Package` 子菜单下，选择 `Skyboxes`（图
    3-27）。


    ![9781430248750_Fig03-27.jpg](img/9781430248750_Fig03-27.jpg)


    图 3-27 从标准资源菜单导入天空盒


    弹出的导入窗口（图 3-28）列出了一大堆天空盒。文件名的 `.mat` 扩展名表明天空盒实际上是一种*材质*，这是一种描述表面如何渲染的对象。天空盒是一种特殊的材质，因为它们不应用于网格，仅用于渲染天空。


    ![9781430248750_Fig03-28.jpg](img/9781430248750_Fig03-28.jpg)


    图 3-28 标准资源中的天空盒


    继续点击 `Import` 按钮。天空盒及其支持的纹理将出现在项目视图中（图 3-29）。


    ![9781430248750_Fig03-29.jpg](img/9781430248750_Fig03-29.jpg)


    图 3-29 天空盒的项目视图


    ### 天空盒的构成


    为了更好地理解天空盒的构成，选择 `Sunny3 Skybox` 并在检查器视图中查看它（图 3-30）。由于它是一种材质，天空盒具有一个着色器（一个指导图形硬件如何渲染多边形的程序）以及着色器的一些参数。通常（但并非总是如此），着色器的参数包括一个或多个纹理。在检查器视图中，你可以看到这个天空盒使用
    `RenderFX/Skybox` 着色器、六张用于天空盒侧面的纹理，以及一种用于给这些纹理着色的颜色。


    ![9781430248750_Fig03-30.jpg](img/9781430248750_Fig03-30.jpg)


    图 3-30 天空盒的检查器视图


    ### 应用天空盒


    要将天空盒应用于场景，首先确保主摄像机的 `Clear Flags` 属性设置为 `Skybox`。然后调出 `Edit` 菜单并选择 `Render Settings`（图
    3-31）。


    ![9781430248750_Fig03-31.jpg](img/9781430248750_Fig03-31.jpg)


    图 3-31 选择 `Render Settings`


    `Render Settings` 是应用于整个场景的渲染属性，包括雾效、环境光和天空盒（图 3-32）。


    ![9781430248750_Fig03-32.jpg](img/9781430248750_Fig03-32.jpg)


    图 3-32 `Render Settings`


    **提示：** *如果你使用雾效，最好让雾的颜色与天空盒的色调颜色匹配。*


    请注意，你看到的 `Render Settings` 仅适用于当前打开的场景。如果你的项目中有多个场景，每个场景都有自己的 `Render Settings`（否则，每个场景都会使用相同的天空盒）。


    将 `Sunny3 Skybox` 拖拽到 `Skybox Material` 字段中，你应该会在场景视图和游戏视图的背景中看到蔚蓝的天空和蓬松的白云（如果你厌倦了蓝天，可以尝试更改天空盒上的
    `Tint Color`）。

