    Tap the Ball


    Although our bowling game doesn’t care where on the screen the swiping takes place,
    many games require the ability to detect if a specific GameObject has been touched.
    On desktop and web platforms, mouse events over GameObjects with Collider Components
    can be detected with callbacks such as `OnMouseDown`, `OnMouseUp`, and `OnMouseOver`.
    For example, the `OnMouseDown` callback in a script is invoked at the beginning
    of a mouse click that takes place over the script’s GameObject, or, rather, the
    GameObject’s Collider Component.


    **Note**   The `OnMouse` callbacks also work on GameObjects with GUIText and GUITexture
    Components. This was the closest thing to a built-in GUI system in Unity before
    UnityGUI was introduced.


    To demonstrate how the `OnMouse` callbacks work, create a new JavaScript named
    `FuguDebugOnMouse` and attach it to the Ball GameObject ([Figure 13-2](#9781430248750_Ch13.xhtml#Fig2)).


