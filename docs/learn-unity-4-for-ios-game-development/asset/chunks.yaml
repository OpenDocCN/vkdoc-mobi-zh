    Mapping enabled, while GUI has the sRGB bypass option enabled. The *mip* in mipmapping
    stands for the phrase *multim in parvo*, meaning “many in little.” Mipmaps are
    precomputed smaller versions of the texture that provide a smoother visual quality
    and transition as the texture comes nearer or farther away from the Camera.    The
    filter type determines how a pixel from the texture (or *texel*) is calculated
    for rendering purposes. For point filtering, the texel is chosen from the mip
    map closest to the desired size. Bilinear filtering averages the surrounding texels
    from the closest smaller mipmap, while trilinear filtering combines the bilinear
    filtering results from the closest larger mipmap and the closest smaller mipmap.
    Point sampling is the simplest and fastest filter, while trilinear filtering is
    the most expensive. Bilinear filtering is the middle ground and a reasonable default.    Mipmapping
    is usually appropriate, despite the increased memory usage. Besides improving
    the texture display, mipmapping allows the graphics processor to work with a smaller
    version of the texture, which can improve performance. For a texture used in a
    GUI (e.g., UnityGUI or GUITexture), you’ll typically view the texture at just
    one size, and ideally at the texture’s original size, so mipmapping is unnecessary.
    That’s certainly true for the splash screen, especially when it isn’t even loaded
    into a scene.    **Tip**   For a texture with sharp details (e.g., one use as
    a street sign), it may be better to use point sampling or even disable mipmapping
    entirely to avoid blurring the texture.    The anisotropic (directionally dependent)
    filtering level compensates for the case where a texture is tilted with respect
    to the Camera, such as the road surface in a racing game. In those cases, filtering
    uniformly across a texture in both directions may not look right. For regular
    textures in a scene, the anisotropic level should be chosen on a case-by-case
    basis. For GUI textures, which are viewed face on from the Camera, no anisotropic
    filtering is required.    Normally, textures are imported taking into account
    gamma space, the nonlinear color space of screens. In general, this isn’t necessary
    for GUI textures, so in those cases, the bypass sRGB option is selected. If it
    doesn’t look quite right, try both options.    For mipmapping, textures need to
    be square and have dimensions that are a power of two (POT), because mip maps
    are generated at successively halved dimensions. For example, a 256 × 256 texture
    would have mip maps at 128 × 128, 64 × 64, and so on. Even a non-mipmapped texture
    benefits from POT dimensions, because that’s what the graphics hardware ultimately
    uses. Most textures designed for games have POT dimensions, but if they don’t,
    the Texture imports settings can automatically size the texture to the nearest
    POT.    For GUI textures, you usually don’t want this. Our splash screen has None
    set for its POT scaling, and the resulting preview displays its original dimensions
    and NPOT (Non-Power of Two). If you try to use it as a regular texture in the
    scene, Unity will issue a warning in the Console View that you’re using a NPOT
    texture in a non-GUI way and will incur a performance penalty.    The max texture
    size and compression level of the texture are listed in the preset settings and
    are specified independently of the presets. For regular textures, the default
    Max Size of 1024 is reasonable (2048 × 2048 is the maximum supported by all devices),
    but it should be chosen on a case-by-case basis. For example, if a large texture
    has just one color, you might as well make it a 2 × 2 texture.'
  trans: '

    `9781430248750_Fig16-26.jpg` 图 16-26. 优化地板


    现在转向物理方面，这里还有另一个优化机会。虽然我们已经为保龄球瓶和保龄球使用了基本碰撞体，但我们的地板仍在使用`MeshCollider`组件。由于地板是一个平坦的方形表面，你可以改用`BoxCollider`。替换过程很简单：当你为地板添加`BoxCollider`组件时（无论是通过检视器视图中的“添加组件”按钮，还是菜单栏上的“组件”菜单），Unity
    会询问你是否要替换现有的`MeshCollider`（选择“是”），新的`BoxCollider`组件将自动调整大小以适配地板网格。


    与保龄球瓶一样，你也可以将着色器从相对复杂的 Bumped Specular 着色器更改为`Mobile/VertexLit (Only Directional
    Lights)`，就像我们对保龄球瓶预制体所做的那样。但地板是个特例，因为它很平坦。其表面的光照是均匀的。因此，你可以使用`Unlit Texture`着色器，完全避免任何光照计算。


    ## 球体


    我们将优化的最后一个游戏对象是球体。它已经在使用`SphereCollider`组件，所以我们要更改的只有着色器。和保龄球瓶一样，球体也会移动，因此我们使用一个光照着色器，具体来说，就选用我们为保龄球瓶选择的同一个`Mobile/VertexLit
    (Only Directional Light)`着色器。但是，球体当前使用的是创建时自动分配的默认漫反射材质，而你无法更改该材质的着色器。因此，你需要为球体分配一个不同的材质。


    你可以用创建其他类型资源相同的方式来创建新材质。在项目视图中，调出创建菜单并选择“材质”（图 16-27）。


    `![9781430248750_Fig16-27.jpg](img/9781430248750_Fig16-27.jpg)`


    图 16-27. 创建新材质


    将新材质放入 Materials 文件夹中，并将其命名为 Ball。选中它（图 16-28），然后在检视器视图中调整其着色器，选择`Mobile/VertexLit
    (Directional Light)`。


    `![9781430248750_Fig16-28.jpg](img/9781430248750_Fig16-28.jpg)`


    图 16-28. 为新材质设置着色器


    接着将 Ball 材质拖拽到 Ball 游戏对象上，这样就好了（图 16-29）。


    `![9781430248750_Fig16-29.jpg](img/9781430248750_Fig16-29.jpg)`


    图 16-29. 优化球体


    如果没有提供纹理，上述两个`Mobile/VertexLit`着色器都会显示白色。如果你希望球体具有白色以外的颜色，则应使用标准的 Vertex Lit 着色器，该着色器允许你指定主颜色和高光（光泽）颜色。


    ## 优化资源


    人们很容易忽略一点：在导入资源时可以完成大量优化工作，并且你可以通过每个资源的导入设置来控制这一点。


    ### 纹理


    我们的纹理已经以合理的默认设置导入了，但让我们看看几个纹理，以便理解这些设置。在项目视图中，我们查看 Textures 文件夹，比较一下我们在第 3 章示例场景中使用的猫纹理（图
    16-30）和我们在第 12 章中用于次级启动画面的纹理（图 16-31）。猫纹理使用了对应“纹理”预设的导入设置，而启动画面纹理则使用了“GUI”预设的导入设置。在这两种情况下，从预设切换到“高级”都会显示该预设的具体设置。


    `![9781430248750_Fig16-30.jpg](img/9781430248750_Fig16-30.jpg)`


    图 16-30. 纹理的导入设置


    `![9781430248750_Fig16-31.jpg](img/9781430248750_Fig16-31.jpg)`


    图 16-31. GUITexture 的导入设置


    “纹理”和“GUI”预设之间有两个主要区别：“纹理”启用了 Mip Mapping（多级渐远纹理映射），而“GUI”启用了 sRGB 旁路选项。mipmapping
    中的 *mip* 代表短语 *multim in parvo*，意为“小中见大”。Mipmap 是纹理预先计算好的较小版本，当纹理相对于摄像机靠近或远离时，可以提供更平滑的视觉质量和过渡效果。


    滤镜类型决定了如何从纹理中的像素（或 *texel*）进行计算以用于渲染。对于点过滤，从最接近所需尺寸的 mip 级别中选择纹素。双线性过滤从最接近的较小
    mip 级别中对其周围的纹素进行平均，而三线性过滤则结合了最接近的较大 mip 级别和最接近的较小 mip 级别的双线性过滤结果。点采样是最简单、最快的滤镜，而三线性过滤则是最消耗资源的。双线性过滤是折中方案，也是合理的默认选项。


    尽管会增加内存使用量，但 Mipmapping 通常是合适的。除了改善纹理显示效果外，mipmapping 还允许图形处理器使用较小版本的纹理，这有助于提升性能。对于在
    GUI（例如 UnityGUI 或 GUITexture）中使用的纹理，通常只在一种尺寸下查看，理想情况下是纹理的原始尺寸，因此 mipmapping 是不必要的。对于启动画面来说尤其如此，特别是当它甚至没有被加载到场景中时。


    **提示** 对于具有锐利细节的纹理（例如用作街道标志的纹理），最好使用点采样，甚至完全禁用 mipmapping，以避免纹理模糊。


    各向异性（方向依赖）过滤级别用于补偿纹理相对于摄像机倾斜的情况，例如赛车游戏中的路面。在这些情况下，在两个方向上均匀地对纹理进行过滤看起来可能不正确。对于场景中的常规纹理，应根据具体情况选择各向异性级别。对于
    GUI 纹理（从摄像机正面观看），不需要各向异性过滤。


    通常，纹理在导入时会考虑伽马空间，即屏幕的非线性色彩空间。一般来说，这对于 GUI 纹理来说并非必需，因此在这些情况下，会选中“旁路 sRGB”选项。如果效果不太对劲，可以尝试两个选项。


    对于 mipmapping，纹理必须是正方形，且边长是 2 的幂（POT），因为 mip 级别是通过连续对半缩小生成的。例如，一个 256 × 256 的纹理将拥有
    128 × 128、64 × 64 等 mip 级别。即使是不使用 mipmapping 的纹理，使用 POT 尺寸也是有益的，因为图形硬件最终使用这种尺寸。大多数为游戏设计的纹理都采用
    POT 尺寸，但如果不是，纹理导入设置可以自动将纹理缩放至最接近的 POT 尺寸。


    对于 GUI 纹理，通常不希望这样。我们的启动画面将其 POT 缩放设置为“无”，生成的预览显示其原始尺寸和 NPOT（非 2 的幂）。如果你尝试将其用作场景中的常规纹理，Unity
    会在控制台视图中发出警告，指出你以非 GUI 方式使用了 NPOT 纹理，并会导致性能损失。


    纹理的最大尺寸和压缩级别列在预设设置中，并且独立于预设进行指定。对于常规纹理，默认的 1024 最大尺寸是合理的（2048 × 2048 是所有设备支持的最大尺寸），但应根据具体情况选择。例如，如果一个大纹理只有一种颜色，你最好将其做成一个
    2 × 2 的纹理。

