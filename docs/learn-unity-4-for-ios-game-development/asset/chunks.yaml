    The fastest way to render a GameObject is to not render it all.    Therefore,
    adjusting the Camera’s frustum so it includes fewer objects in a scene is one
    source of optimization. You can narrow the frustum by lowering its field of view,
    and you can shorten the frustum by decreasing the far distance value, bringing
    the far plane closer to the Camera ([Figure 16-23](#9781430248750_Ch16.xhtml#Fig23)).    ![9781430248750_Fig16-23.jpg](images/9781430248750_Fig16-23.jpg)    [Figure
    16-23](#9781430248750_Ch16.xhtml#_Fig23). Optimizing the Main Camera    For example,
    the default value of 1000 for the far plane value in the Main Camera is overkill,
    considering the bowling Floor is much smaller. Setting the far value to 100 still
    leaves everything visible (Unity skyboxes are conveniently visible independent
    of the frustum).    Minimizing the far plane value has the additional benefit
    of storing a smaller range of values in the depth buffer when rendering. This
    avoids the problem of z-fighting, where an object that is barely behind another
    seems to poke through the one in front because of the limited numerical precision
    in the depth buffer.    Another way to cull GameObjects from rendering by a Camera
    is to specify that it renders only GameObjects in a certain set of layers, listed
    in its Culling mask.


    This is really a matter of correctness—you want to make sure the Camera is rendering
    only what it’s supposed to be rendering, and not, say, HUD elements that are already
    rendered by a separate HUD camera. But it does affect performance. I once had
    a bug where the Main Camera was unintentionally rendering GUI elements, but far
    enough in the distance that I didn’t notice it.    Each Camera also has an eventMask
    variable that is similar to its Culling mask (or, equivalently, its cullingMask
    variable), but instead of specifying what layers are rendered by the Camera, the
    eventMask determines what layers receive onMouse events from the Camera. Minimizing
    the layers present in eventMask can reduce the overhead of onMouse processing,
    but as it''s not visible in the Inspector View, that variable has to be set from
    a script.    The last Camera optimization to make is to specify the Render Path.
    There are two render paths available on iOS: Vertex Lit and Forward Rendering
    (Deferred Rendering is not available for mobile platforms). Forward Rendering
    is more flexible and powerful than Vertex Lit. For example, the Vertex Lit path
    won’t display bump-mapping. But in this chapter, we’re aggressively going for
    a high frame rate, so let’s set the render path to Vertex Lit.    Lights    We
    already disabled shadows on our Light (except for non-Pro users who didn’t have
    shadows in the first place), which is a big performance improvement because it
    reduces draw calls. And lighting is already influenced by the Quality Settings,
    which specify no pixel lights and disabled shadows ([Figure 16-24](#9781430248750_Ch16.xhtml#Fig24)).    ![9781430248750_Fig16-24.jpg](images/9781430248750_Fig16-24.jpg)    [Figure
    16-24](#9781430248750_Ch16.xhtml#_Fig24). Optimizing the Light    But we can perform
    some additional adjustments on the Light similar to our Camera tweaks. Like the
    Camera, Lights have a specified range, which we can minimize to reduce the number
    of lit GameObjects. Lights also have a Culling Mask, which, as in the case of
    the Main Camera, can be set to the Default layer, but with judicious assignment
    of layers you can reduce unnecessarily lit GameObjects.    Pins    In pursuit
    of speed, we’ve chosen the simplest lighting and the simplest render path. You
    can also simplify the shaders you’re using for each Mesh. The bowling pins comprise
    most of the objects in our scene, so let’s modify the BarrelPin prefab first ([Figure
    16-25](#9781430248750_Ch16.xhtml#Fig25)).    ![9781430248750_Fig16-25.jpg](images/9781430248750_Fig16-25.jpg)    [Figure
    16-25](#9781430248750_Ch16.xhtml#_Fig25). Optimizing the BarrelPin prefab    In
    the Project View, select the Barrel GameObject in the prefab and click the Shader
    selector in the Inspector View. There are many simpler shaders than Bumped Specular;
    anything with less than two materials is likely to be faster, and Vertex Lit will
    be more efficient than any of the pixel shaders. There is even a set of shaders
    specifically implemented for mobile devices, including Mobile/Vertex Lit. But
    there’s one that is even better for our situation, a Mobile/Vertex Lit shader
    implemented specifically for use only with directional lights. So let’s choose
    that one, Mobile/Vertex Lit (Only Directional Light).    Floor    The Floor GameObject
    has a few Component properties that can be tweaked for optimization ([Figure 16-26](#9781430248750_Ch16.xhtml#Fig26)).
    Starting with the MeshRenderer Component, we have the Cast Shadows and Receive
    Shadows options enabled. Although we have Shadows disabled in the Light and in
    the Quality Settings, you should pay attention to the per-object settings just
    in case you enable shadows in the future. If shadows were enabled, you would want
    shadows cast on the floor, so Receive Shadows should be enabled. But because we
    don’t expect the Floor to cast a shadow (at least not on anything we can see),
    let’s disable the Cast Shadows option. For performance, the fewer shadow casters,
    the better.    !'
  trans: '

    然而，保龄球无法与任何球瓶或球道表面进行批处理。批处理确实需要一些时间，这也是它会出现在内置性能分析器中的原因，但就像静态批处理一样，它通常能显著提升性能。


    ## 加速计频率

    `加速计频率`默认设置为每秒 60 个样本。你可以将该频率降低到 15 来节省一些处理时间，这对于我们的摇动检测代码来说已经足够了。如果在应用中根本不使用加速计，请将其设置为
    0。


    ## 剥离级别 (Pro)

    Unity Pro 用户可以选择应用 iOS 剥离。有三个循序渐进的级别可供选择：`字符串程序集`、`剥离字节码`和`使用微型 mscorlib`。我们选择最后一项，这是最积极的优化方案，并且包含了前两项。`微型
    mscorlib` 是核心 Mono 库的一个自定义精简版本，可能与您导入的其他 .NET 库不兼容，但对于这个游戏来说这不是问题。


    ## 脚本调用优化

    `脚本调用优化`级别决定了如何执行对本机代码的调用。默认设置`慢速且安全`会产生额外开销，因此我们将其设置为`快速但无异常`。正如标签所示，此设置速度更快，但如果本机代码抛出异常（本质上是一个期望由调用代码处理的错误），则会失败。


    ## 优化网格数据

    `优化网格数据`选项会在构建时移除任何不必要的每个顶点网格信息。如果网格未使用凹凸贴图着色器，则可以移除切线；如果网格使用了无光照着色器，则可以移除法线。这能节省空间并有利于批处理，因为批处理会复制所有这些网格数据。当然，如果您打算在运行时通过脚本将网格的着色器更改为需要比原始着色器更多顶点信息的着色器，则不应使用此选项。


    ## 优化游戏对象

    在调整了`质量设置`、`物理管理器`和`时间管理器`之后，我们准备调整单个游戏对象。


    ### 摄像机（Camera）

    摄像机是优化的焦点（无意冒犯），因为它们决定了渲染什么以及如何渲染。摄像机视锥体自动提供了一种优化来源。任何完全位于视锥体之外的游戏对象对摄像机来说都是不可见的，因此不会尝试渲染该游戏对象。这种优化被称为*视锥体剔除*，并且同样有利于动画和粒子系统。当没有人能看到动画或粒子时，系统就无需播放动画或模拟粒子。


    **提示** 渲染一个游戏对象最快的方式就是完全不渲染它。


    因此，调整摄像机的视锥体使其包含场景中更少的对象是一种优化方法。你可以通过降低视野来缩小视锥体，也可以通过减小远距离值来缩短视锥体，使远平面更靠近摄像机（图
    16-23）。


    ![9781430248750_Fig16-23.jpg](img/9781430248750_Fig16-23.jpg)


    图 16-23. 优化主摄像机


    例如，考虑到保龄球地面要小得多，主摄像机中远平面值的默认值 1000 就有些过度了。将远距离值设置为 100 仍然可以使所有物体可见（Unity 的天空盒方便地独立于视锥体可见）。


    最小化远平面值的另一个好处是，在渲染时可以在深度缓冲区中存储一个更小范围的值。这避免了 Z 轴冲突的问题，即由于深度缓冲区数值精度有限，一个几乎位于另一个物体后面的物体似乎会穿透前面的物体。


    另一种从摄像机渲染中剔除游戏对象的方法是，指定其只渲染位于其剔除遮罩中某些特定层级集合内的游戏对象。


    这实际上是一个正确性的问题——你需要确保摄像机只渲染它应该渲染的内容，而不是，比如说，已经由单独的 HUD 摄像机渲染的 HUD 元素。但这确实会影响性能。我曾经遇到过一个
    bug，主摄像机无意中渲染了 GUI 元素，但由于它们距离较远，我并没有注意到。


    每个摄像机还有一个 `eventMask` 变量，类似于它的剔除遮罩（或者等价地，它的 `cullingMask` 变量），但与指定摄像机渲染哪些层级不同，`eventMask`
    决定了哪些层级接收来自摄像机的 `onMouse` 事件。最小化 `eventMask` 中存在的层级可以减少 `onMouse` 处理的额外开销，但由于它在检视面板中不可见，因此必须通过脚本来设置该变量。


    最后一个摄像机优化是指定渲染路径。iOS 上有两种可用的渲染路径：顶点光照和前向渲染（延迟渲染不适用于移动平台）。前向渲染比顶点光照更灵活、更强大。例如，顶点光照路径无法显示凹凸贴图。但在本章中，我们积极追求高帧率，所以我们将渲染路径设置为顶点光照。


    ### 灯光（Lights）

    我们已经禁用了光照上的阴影（除了那些本来就没有阴影的非 Pro 用户），这是一个巨大的性能改进，因为它减少了绘制调用。光照也已经受到了质量设置的影响，该设置指定了无像素灯光并禁用了阴影（图
    16-24）。


    ![9781430248750_Fig16-24.jpg](img/9781430248750_Fig16-24.jpg)


    图 16-24. 优化光照


    但我们还可以对光照进行一些类似于摄像机 tweaks 的额外调整。与摄像机一样，光照有一个指定的范围，我们可以将其最小化以减少被照亮的游戏对象数量。光照也有一个剔除遮罩，与主摄像机的情况一样，可以将其设置为默认层级，但通过明智地分配层级，你可以减少不必要被照亮的游戏对象。


    ### 球瓶

    为了追求速度，我们选择了最简单的光照和最简单的渲染路径。你也可以简化你为每个网格使用的着色器。保龄球瓶构成了我们场景中的大部分物体，所以我们首先修改 BarrelPin
    预制体（图 16-25）。


    ![9781430248750_Fig16-25.jpg](img/9781430248750_Fig16-25.jpg)


    图 16-25. 优化 BarrelPin 预制体


    在项目视图中，选择预制体中的 Barrel 游戏对象，然后在检视面板中点击着色器选择器。有很多比 Bumped Specular 更简单的着色器；使用少于两种材质的着色器通常更快，而顶点光照将比任何像素着色器更高效。甚至有一组专门为移动设备实现的着色器，包括
    `Mobile/Vertex Lit`。但有一种着色器更适合我们的情况，即专门为仅与方向光一起使用而实现的 `Mobile/Vertex Lit` 着色器。所以我们选择那个，`Mobile/Vertex
    Lit (Only Directional Light)`。


    ### 地面

    地面游戏对象有一些组件属性可以进行优化调整（图 16-26）。从 MeshRenderer 组件开始，我们启用了`投射阴影`和`接收阴影`选项。虽然我们在光照和质量设置中禁用了阴影，但你应该留意每个对象的设置，以防将来启用阴影。如果启用了阴影，你会希望在地面上投射阴影，所以`接收阴影`应该启用。但是因为我们不期望地面投射阴影（至少不会投射到我们能看到的东西上），所以让我们禁用`投射阴影`选项。就性能而言，投射阴影的对象越少越好。

