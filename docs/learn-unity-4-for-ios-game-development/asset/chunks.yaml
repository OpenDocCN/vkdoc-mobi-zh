- fmt: '# Figure 6-4. Set the Light color to white


    Also, since the Point Light was actually changed to a Directional Light in the
    previous chapter to support soft shadows (for Unity Pro users), the name “Point
    Light” is misleading. This is a good time to change its name to just “Light,”
    which will keep your options open if you want to change its type again, later.


    ## Retile the Floor


    The shiny patterned floor from the dance scene doesn’t look much like a bowling
    lane, so let’s change its appearance. This is an opportunity to try out Unity’s
    support for procedural materials, which is based on Allegorithmic’s Substance
    technology. Procedural materials use textures generated from algorithms instead
    of image files. This allows a lot of variation in the materials by tweaking the
    texture-generation parameters and also potentially offers space savings, since
    the procedural materials don’t require loading image files as textures.


    Let’s try out a procedural material for the floor. Search for “substance” in the
    Asset Store window (the Project View searches among individual assets, so in this
    case it won’t bring up any Asset Store results). A number of free Substance packages
    from Allegorithmic will appear in the Asset Store window (Figure 6-5).


    ![9781430248750_Fig06-05.jpg](images/9781430248750_Fig06-05.jpg)


    **Figure 6-5.** The Asset Store results for “substance”


    The package we want is Eighteen Free Substances. Select and import that package,
    and 18 Substance archives (files with the `.sbsar` extension) will show up in
    the Project View in a `Substances_Free` folder (Figure 6-6). The Substance file
    that will provide a wood floor look is `Wood_Planks_01`, listed at the end.


    ![9781430248750_Fig06-06.jpg](images/9781430248750_Fig06-06.jpg)


    **Figure 6-6.** The Project View of the 18 Free Substances package


    Each Substance archive contains one or more `ProceduralMaterial` assets (`ProceduralMaterial`
    is a subclass of `Material`) and their supporting textures and scripts. Clicking
    the right arrow of the `Wood_Planks_01` icon will change it to a left arrow and
    expand to show the `ProceduralMaterial` of `Wood_Planks_01` followed by its associated
    textures (Figure 6-7).


    ![9781430248750_Fig06-07.jpg](images/9781430248750_Fig06-07.jpg)


    **Figure 6-7.** An expanded view of the `Wood_Planks_01` Substance archive


    The `Wood_Planks_01` ProceduralMaterial looks like a decent candidate for a bowling
    lane floor (at least better than our fantasy and sci-fi textures), so drag the
    `Wood_Planks_01` ProceduralMaterial (not the archive) to the Plane in the Hierarchy
    View. You can see in the Scene View that the Plane now has wood planks (Figure
    6-8).


    ![9781430248750_Fig06-08.jpg](images/9781430248750_Fig06-08.jpg)


    **Figure 6-8.** The Plane with the `Wood_Planks_01` procedural material


    The planks look overly large, but you can adjust how the textures (there’s a main
    texture and a normal map texture) stretch across the Plane by editing the UV scale
    fields of the textures. Select the Plane in the Hierarchy View, and in the Inspector
    View set the x and y Tiling values of both textures to 5 instead of 1 (Figure
    6-9).


    ![9781430248750_Fig06-09.jpg](images/9781430248750_Fig06-09.jpg)


    **Figure 6-9.** The Inspector View of the Plane with a procedural material


    Now the textures are tiled five times, where before you just had one (Figure 6-10).
    In the Inspector View, notice that you have a number of procedural properties
    you can play with to vary the appearance of the generated textures.


    ![9781430248750_Fig06-10.jpg](images/9781430248750_Fig06-10.jpg)


    **Figure 6-10.** The Plane with its Tiling values set to 5


    And as with the Light, while you have the Inspector View up, this is a good time
    to change the name in the top text field and rename the Plane to Floor, to make
    its function more obvious.


    ## Reset the Camera


    The `MouseOrbit` script attached to the Main Camera isn’t suitable for the bowling
    game, so you can disable that script. Better yet, remove the script entirely from
    the Main Camera by selecting the Main Camera in the Hierarchy View, and then in
    the Inspector View, right-click the `MouseOrbit` component and select Remove Component
    (Figure 6-11).


    ![9781430248750_Fig06-11.jpg](images/9781430248750_Fig06-11.jpg)


    **Figure 6-11.** Removing the `MouseOrbit` script from the Main Camera


    While you’re at it, set the Main Camera position to (0,1,-5) and its rotation
    to (0,0,0). Now you should be looking at a nice floor and sky and not much else
    (Figure 6-12).


    ![9781430248750_Fig06-12.jpg](images/9781430248750_Fig06-12.jpg)


    **Figure 6-12.** The Game View with a fixed Main Camera


    ## Make a Ball


    Now the scene has a Skybox, Light, Flare, and a Floor, and a Main Camera with
    a fixed viewpoint. It’s time to add the bowling ball.


    ### Make a Sphere


    Two primitive GameObjects have been used so far in this book: Plane and Cube.
    For a ball, there’s another primitive that’s perfect: Sphere. Like Plane and Cube,
    Sphere can be selected from the Create submenu of the GameObject menu on the menu
    bar, but a Sphere can also be instantiated using the Create button on the top
    left of the Hierarchy View (Figure 6-13).


    ![9781430248750_Fig06-13.jpg](images/9781430248750_Fig06-13.jpg)


    **Figure 6-13.** Creating a ball


    After selecting Sphere from the Create menu, a new GameObject named Sphere should
    be listed in the Hierarchy View. Select the Sphere GameObject in the Hierarchy
    View so it can be examined in the Inspector View (Figure 6-14).


    ![9781430248750_Fig06-14.jpg](images/9781430248750_Fig06-14.jpg)


    **Figure 6-14.** The Inspector View of the Ball


    Like the Cube and Plane primitives, the Sphere GameObject has a `MeshFilter` Component
    and a `MeshRenderer` Component, plus a Collider Component that is of the same
    shape as the primitive (in this case, a `SphereCollider`). First, in the spirit
    of meticulously naming GameObjects, change the name of the Sphere to Ball so it’s
    clear that this GameObject is the bowling ball. Then set the Ball position to
    (0,1,0), which places the center of the Ball 1 m above the Floor. Since the radius
    of the ball is 0.5 meters (the `SphereCollider Radius` shown in Figure 6-14 is
    a good hint), this gives some clearance between the Ball and Floor. And when you
    click Play, the Ball will hang in the air above the Floor (Figure 6-15).


    ![9781430248750_Fig06-15.jpg](images/9781430248750_Fig06-15.jpg)


    **Figure 6-15.** The Ball in the air


    This is as expected, of course. Just like everything else created so far—the floor,
    cubes, even the dancing character—the Ball will go or stay where it’s told.


    ### Make It Fall


    For the Ball to fall in response to gravity and respond to other forces, the Ball
    must be made physical. A GameObject is made physical by addding a `Rigidbody`
    Component.


    **Note**   Most game physics is known as *rigid body simulation*, which is pretty
    much what it sounds like—simulating how hard objects with nonchanging shapes react
    to forces and collision. A bowling ball is perfect for rigid body simulation.
    A blob of tapioca pudding, on the other hand, is not.'
