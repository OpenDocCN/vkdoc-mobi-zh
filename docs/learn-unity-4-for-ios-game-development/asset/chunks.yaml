- fmt: 'Notice how `Ice` has particularly low friction values. `Dynamic Friction`
    is the friction that occurs while one object is sliding over another. `Static
    Friction` is the friction of an object resting on the other. The range for friction
    is 0-1, where 0 is frictionless and 1 means no sliding at all. `Ice` also has
    a `Bounciness` value of 0, which makes sense, since ice doesn’t bounce. And the
    `Bouncy Physic Material` has the maximum `Bounciness` value of 1.


    What happens when a collision occurs between `GameObjects` with two different
    `Physic Materials`? Their `Friction` and `Bounciness` values are combined according
    to the `Friction Combine` and `Bounce Combine` values, respectively. The `Friction
    Combine` value for `Bouncy` indicates that when it collides or slides along another
    `PhysicMaterial`, the applied friction is the average of the friction values from
    the two materials. And the `Bounce Combine` value for `Bouncy` specifies that
    the maximum bounciness from the two `PhysicMaterials` will be used (and since
    `Bouncy` already has the maximum bounciness value of 1, that will always be the
    result).


    You might be wondering what happens if the two `PhysicMaterials` have different
    combine values, as do `Bouncy` and `Ice`. Which one will be used? Well, as of
    this writing, it’s not actually documented officially, but the precedence order,
    from low to high, appears to be `Average`, `Multiply`, `Minimum`, and `Maximum`.
    So if `Bouncy` and `Ice` collide, it will result in `Minimum` friction, which
    is the `Ice` friction at `0.1`, and `Maximum` bounciness, which is the `Bouncy`
    bounciness of `1`. Which is what we would expect!


    The last three properties shown in the `Inspector View` of the `PhysicMaterials`
    allow for anisotropic friction, meaning different friction values in different
    directions. If the `Friction Direction` property is filled in with a nonzero vector,
    then the secondary static and dynamic friction takes effect in that direction.
    For the wood-tiled `Floor`, you might specify a secondary friction direction that
    runs along the grain of the wood and lower static and dynamic friction values
    along that direction.


    ## Apply the `PhysicMaterial`


    You can drag any of these standard `PhysicMaterials` into the `Material` fields
    of the `Floor` and `Ball` `Colliders` or click the little circle on the right
    of the `Collider`’s `Material` field to select from a pop-up ([Figure 6-23](#9781430248750_Ch06.xhtml#Fig23)).
    Or you can drag the `PhysicMaterial` from the `Project View` onto the `GameObject`
    in the `Inspector View`, and the `PhysicMaterial` will show up in the right place,
    i.e., the `Material` field of the `Collider` `Component`.


    ![9781430248750_Fig06-23.jpg](images/9781430248750_Fig06-23.jpg)


    [Figure 6-23](#9781430248750_Ch06.xhtml#_Fig23). Adding a `Bouncy PhysicMaterial`
    to the `Ball`


    Go ahead and try out some different `PhysicMaterials` on the `Floor` and `Ball`.
    Choose the `Bouncy PhysicMaterial` for the `Ball` and `Metal` for the `Floor`.
    Then click `Play` and watch the `Ball` bound and bounce and bounce, then switch
    the `Ball` to `Ice`, and watch the `Ball` land with a thud.


    Instead of swapping different `PhysicMaterials` in and out of a `Collider` `Component`,
    you could adjust the `PhysicMaterials` themselves. For example, you could select
    the `Bouncy PhysicMaterial` in the `Project View` and then in the `Inspector View`
    edit the `PhysicMaterial` properties. But since those `PhysicMaterials` are in
    a `Standard Assets` package, they could get replaced if you ever reimport the
    package (either accidentally or deliberately if there is an upgrade). Also, if
    a `PhysicMaterial` is used by more than one `GameObject`, changing its properties
    would affect all of those `GameObjects`.


    The clean and safe solution here is to create a new `PhysicMaterial` for every
    `GameObject` that needs one. Conceptually, you would expect a unique `PhysicMaterial`
    anytime you also need a unique `Material`. Or, to put it another way, a unique
    surface would have its own `Material` and `PhysicMaterial`. For instance, the
    `Ball` and the `Floor` should each have its own `PhysicMaterial`, while all of
    the bowling pins (that you’ll create in the next chapter) should share the same
    `PhysicMaterial`.


    ## Make a New `PhysicMaterial`


    Before creating new `PhysicMaterials`, for organizational purposes, you should
    create a folder to contain them. Select the top level `Assets` folder in the left
    panel of the `Project View`, then using the `Create` menu in the `Project View`,
    create a new folder and name it “Physics” (it’s shorter and less oddly spelled
    than “PhysicMaterials”).


    You can make a brand new `PhysicMaterial` using the `Create` menu in the `Project
    View` and then fill in all the properties of the new `PhysicMaterial` in the `Inspector
    View`. But you can save yourself some work by copying a `PhysicMaterial` from
    `Standard Assets`, preferably one that is already close to what you want. Given
    that the `Floor` has a wood `Material`, it’s convenient to start with the `Wood
    PhysicMaterial` in `Standard Assets`. Make a copy of the `Wood PhysicMaterial`
    by selecting it in the `Project View` and invoking `Duplicate` from the `Edit`
    menu (or `Command+D` for the keyboard shortcut).


    Drag the copy of the `Wood PhysicMaterial` to your new `Physics` folder in the
    `Project View` and rename it “Floor,” since you’ll apply it to your `Floor` `GameObject`.
    Then `Duplicate` the `Floor PhysicMaterial` and name the new one `Ball` ([Figure
    6-24](#9781430248750_Ch06.xhtml#Fig24)), since you’ll apply that one to your `Ball`
    `GameObject`.


    ![9781430248750_Fig06-24.jpg](images/9781430248750_Fig06-24.jpg)


    [Figure 6-24](#9781430248750_Ch06.xhtml#_Fig24). Custom `PhysicMaterials`


    Now there’s a `PhysicMaterial` for the `Floor` and one for the `Ball`. To use
    these `PhysicMaterials` on their intended `GameObjects`, drag the `Floor PhysicMaterial`
    onto the `Floor` `GameObject` in the `Hierarchy View` and drag the `Ball PhysicMaterial`
    onto the `Ball` `GameObject` (you may want to check the two `GameObjects` in the
    `Inspector View` to verify the `PhysicMaterials` are showing up in the `Collider`
    `Material` fields). Now you’re ready to start tweaking the `PhysicMaterial` properties.


    As one would expect, the `Wood PhysicMaterial` already has values reasonable for
    a wood floor, so you can leave it alone. But you want to tweak the `Ball PhysicMaterial`,
    so select the `Ball PhysicMaterial` and set its values as shown in [Figure 6-25](#9781430248750_Ch06.xhtml#Fig25).


    ![9781430248750_Fig06-25.jpg](images/9781430248750_Fig06-25.jpg)


    [Figure 6-25](#9781430248750_Ch06.xhtml#_Fig25). Adjusted values for the `Ball
    PhysicMaterial`


    The `Ball` shouldn’t bounce on the `Floor` (or off the bowling pins when you add
    them later), so set the `Bounciness` value to 0 and `Bounce Combine` to `Minimum`,
    which will ensure that the `Ball` never bounces at all no matter what it collides
    with. Then set the `Dynamic` and `Static Friction` values to 1 and `Friction Combine`
    to `Maximum` so the `Ball` always has maximum friction whether it’s at rest or
    rolling. The maximum friction values ensure the `Ball` rolls instead of slides.


    Now when you click `Play`, the `Ball` should just drop on the `Floor` and come
    to rest without bouncing.


    ## Make It Roll


    To get the ball rolling, you’ll need to add some controls to the game (for it
    to be even a game, in fact). The original arcade version of `HyperBowl` was controlled
    by a real bowling ball that acted as a large trackball. Spinning that ball would
    impart a spin on the ball in the game (resulting in comical body movement while
    trying to bowl up the hills of San Francisco).'
