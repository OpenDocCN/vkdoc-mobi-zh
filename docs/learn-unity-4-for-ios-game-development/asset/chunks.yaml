    # 在第 8 章介绍游戏结束状态时，已经引入了`yield`指令`WaitForSeconds`，它被证明能方便地在特定秒数后显示启动画面。我们借此机会探讨了`WaitForSeconds`的假设性实现，并比较了静态`Time`变量`Time.time`和`Time.realTimeSinceStartup`。当暂停菜单弹出、游戏时间暂停时，这两者的区别至关重要。


    我们调用静态的`Application`函数`LoadLevel`来从启动场景过渡到保龄球场景，但也可以调用该函数的异步版本`Application.LoadLevelAsync`。作为一个异步函数，它在加载新场景时不会暂停
    Unity，因此，在等待新场景加载完成的过程中，你实际上可以让启动场景中发生任何事情。


    正如我们使用`Handheld`类中的活动指示器函数所演示的那样，你可以通过调用`DontDestroyOnLoad`让物体在场景加载中存活下来，并在不再需要时调用`Destroy`来销毁它们。这两者都是`Object`类中的静态函数，由于`Object`类是场景中所有物体的父类，因此它始终值得一读。


    为了显示和隐藏活动指示器，我们调用了`Handheld`类中的`StartActivityIndicator`和`StopActivityIndicator`函数。请参阅关于活动指示器函数的文档，了解在执行场景加载之前需要执行
    yield 的原因。`iOSActivityIndicatorStyle`枚举列出了可用的活动指示器样式。


    `Handheld`类值得一读，因为它包含了所有可脚本化编写的 Unity 移动端功能（iOS 特有功能除外）。例如，`Handheld`类有一个静态的`PlayFullScreenMovie`函数，可以播放本地存储或从网站流式传输的电影，这也是创建酷炫启动画面的另一种可能性。该函数的脚本参考页面详细介绍了支持的视频格式以及如何控制电影播放器（在撰写本文时，它基于原生的
    iOS 电影播放器`MPMoviePlayerController`）。


    ## iOS 开发者库


    随着我们探索 Unity iOS 功能，iOS 开发者库中越来越多的文档变得相关。请记住，这些文档既可以在 Apple 开发者网站（`http://developer.apple.com/`）上找到，也可以在
    Xcode Organizer 窗口中找到。


    在 iOS 开发者库的`用户体验`主题中，有一份值得通篇阅读的文档，那就是 Apple 的《iOS 人机界面指南》。这份指南最初可追溯至最早的 Mac，曾是用户界面最佳实践的黄金标准。此后，该指南被分成了
    Mac 和 iOS 两个版本，但即使仅仅是为了避免应用被拒，你也应该阅读 iOS 版本。与本章节相关的是，《自定义图标和图像创建指南》列出了创建应用图标和启动画面（在
    Apple 的术语中称为`launch images`）的要求和建议。


    许多专门针对移动端或 iOS 的 Unity 类都有对应的 Objective-C 版本。例如，由 Unity 的`Handheld`类控制的活动指示器，在
    Objective-C 中是通过`UIActivityIndicatorView`类来访问的，该类同样可以在`用户体验`主题下的`窗口与视图`部分找到。


    ## 资源商店


    来自 DFT Games 的过渡管理器可在 Unity 资源商店免费获取，它提供了比本章所述更复杂的启动画面行为，包括屏幕淡入淡出以及使用多个屏幕。我在所有应用中都使用了这个过渡管理器。


    ## 书籍


    Josh Clark 的《*Tapworthy: Designing Great Apps*》这本书说服了我放弃自动图标光泽，并始终在 Unity Player
    Settings 中选择“Prerendered Icon”。这本书也是对应用设计的总体优秀论述。


    关于线性代数的教科书有很多（甚至在`http://wikipedia.org/`上还有一篇内容详尽的`matrix`文章），但任何计算机图形学书籍都会包含矩阵数学的基础内容。例如，《Real-Time
    Rendering》（`http://realtimerendering.com/`）中就有一个关于《一些线性代数》的附录。


    # 第 13 章


    ## 处理设备输入


    虽然我们的保龄球游戏已经在 iOS 上运行了起来，但它尚未达到可玩的状态，因为我们没有任何有效的玩家控制。这便引出了输入处理的问题——这可能是桌面游戏与移动游戏之间最显著的区别。


    iOS 游戏不能读取鼠标或键盘，而必须使用其设备传感器之一，通常是触摸屏（点击和滑动）或加速度计（摇晃和倾斜）。我们将选择触摸屏输入来控制保龄球，但也会利用加速度计做一些晃动检测，并稍微摆弄一下设备摄像头。


    本章项目文件位于`http://learnunity4.com/`，其中包含了本章引入的脚本更改，没有添加其他资源。本书余下部分也是如此。从现在开始，全是脚本编写了！


    ### 触摸屏


    UnityGUI 在 iOS 上已经能良好地配合触摸屏工作，因此，如果你现在在设备上构建并运行保龄球游戏，或者在编辑器中使用 Unity Remote 进行测试，你可以通过点击按钮来操作初始菜单。当你点击暂停菜单上的“Play”按钮时，保龄球会落下。到目前为止，一切顺利。


    但保龄球的控制呢？`Input.GetAxis`在屏幕上滑动时确实会返回值，但结果很可能不是你想要的（在旧版 Unity iOS 中，`Input.GetAxis`甚至完全不起作用）。无论如何，我们首先需要定义在
    iOS 版保龄球游戏中控制将如何工作。


    #### 滑动球


    对于“Fugu Bowl”，我们将采用我在“HyperBowl”中使用的触摸屏控制方式。玩家通过沿某个方向在屏幕上滑动，来将球推向那个方向。在屏幕上向上滑动会将球向前推，向下滑动会将球向后推，向左滑动会让球向左滚动，向右滑动则让球向右滚动。


    滑动控制方案与鼠标控制非常相似，因此我们可以在现有的`FuguBowlForce`脚本框架内进行修改。打开该脚本，添加一些新的公共变量`swipepowerx`和`swipepowery`，这样我们就可以像调整鼠标控制那样调整滑动力度（代码清单
    13-1）。


    代码清单 13-1。`FuguBowlForce.js`中滑动控制的调整变量


    ```

    var swipepowerx:float = 0.1;

    var swipepowery:float = 0.08;

    ```


    我们添加了新变量，而没有重用`mousepowerx`和`mousepowery`，这样我们就可以在独立平台和 iOS 构建目标之间切换，而不会干扰每个平台的力度调整值。两个平台的属性都会显示在检视面板中（图
    13-1）。


    ![9781430248750_Fig13-01.jpg](img/9781430248750_Fig13-01.jpg)


    图 13-1。`FuguBowlForce.js`中桌面端和 iOS 端的控制调整


