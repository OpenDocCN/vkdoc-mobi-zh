    \ 用于球滚动声音的 `AudioClip`\n\n将 `AudioClip` 拖拽到层级视图中的球 `GameObject` 上，并选中球。检查器视图应显示一个自动创建的新\
    \ `AudioSource` 组件，该组件引用了 `AudioClip`（图 7-31）。\n\n![9781430248750_Fig07-31.jpg](img/9781430248750_Fig07-31.jpg)\n\
    \n图 7-31. 带有 `AudioSource` 的球的检查器视图\n\n滚动声音将由脚本控制，不会自动播放，因此请确保取消选中 **Play on Awake**\
    \ 复选框。但是，当滚动声音播放时，它应持续播放直到被告知停止，因此应选中 **Loop** 复选框。\n\n`AudioClip` 是一个 3D 声音，如\
    \ `AudioSource` 组件中 `AudioClip` 名称下方所示。这意味着声音会随着 `AudioSource` 组件和 `AudioListener`\
    \ 组件（附加在主摄像机上）之间的距离而衰减。衰减由 `AudioSource` 组件底部显示的图形指定。您可以通过选择 **Volume Rolloff**\
    \ 选项并指定 **Min Distance** 来调整衰减，**Min Distance** 指定了衰减开始的距离。如果 `AudioListener`\
    \ 与 `AudioSource` 的距离小于 **Min Distance**，则声音完全不会衰减。或者，您也可以通过拖动曲线上的手柄来直接操纵衰减曲线。\n\
    \n**提示** 如果您在听到`AudioSource`声音时遇到问题，请尝试从一个较高的 **Min Distance** 开始，以确保你能听到其最大音量，然后根据需要调整\
    \ **Min Distance** 和衰减曲线。\n\n播放滚动声音的脚本将附加到球上。创建一个新的 JavaScript 文件，将其放置在 Scripts\
    \ 文件夹中，并命名为 `FuguBallSound`。然后将清单 7-6 的内容添加到脚本中。\n\n清单 7-6. 用于球滚动声音的 `FuguBallSound.js`\
    \ 脚本\n\n```\n#pragma strict\n\nvar minSpeed:float = 1.0;\nprivate var sqrMinSpeed:float\
    \ = 0;\n\nfunction Awake() {\n        sqrMinSpeed = minSpeed*minSpeed;\n}\n\n\
    function OnCollisionStay(collider:Collision) {\n        if (collider.gameObject.tag\
    \ == \"Floor\") {\n                if (rigidbody.velocity.sqrMagnitude>sqrMinSpeed)\
    \ {\n                         if (!audio.isPlaying) {\n                      \
    \           audio.Play();\n                         }\n                }  else\
    \ {\n                         if (audio.isPlaying) {\n                       \
    \          audio.Stop();\n                         }\n                }\n    \
    \    }\n}\n\nfunction OnCollisionExit(collider:Collision) {\n        if (collider.gameObject.tag\
    \ == \"Floor\") {\n                if (audio.isPlaying) {\n                  \
    \       audio.Stop();\n                }\n        }\n}\n```\n\n该脚本与 `FuguForce`\
    \ 脚本有一些相似之处，因为两个脚本都使用碰撞回调来跟踪球的滚动状态，并通过检查碰撞 `GameObject` 的标签来判断是否为地板。`FuguBallSound`\
    \ 只使用了 `OnCollision` 回调中的两个：`OnCollisionStay` 和 `OnCollisionExit`。没有实现 `OnCollisionEnter`，因为那会与\
    \ `OnCollisionStay` 重复（`FuguForce` 脚本其实也不需要 `OnCollisionEnter`）。脚本的两个碰撞回调都引用了此组件的\
    \ `audio` 变量，这等同于此组件所属 `GameObject` 的 `audio` 变量，并引用了附加的 `AudioSource`。\n\n当球在地板上时，`OnCollisionStay`\
    \ 会检查球是否以高于最低速度的速度移动，该最低速度在公共变量 `minSpeed` 中指定，以便在检查器视图中进行调整。脚本实际上比较的是球速的平方与 `minSpeed`\
    \ 的平方，以避免平方根计算的计算开销。如果球在地板上且移动得足够快，并且球的 `AudioSource` 尚未播放其 `AudioClip`，则脚本会开始播放\
    \ `AudioClip`。如果球的速度降得足够低，滚动声音将停止。\n\n`OnCollisionExit` 的工作更简单，它只需要检查音频是否正在播放，如果是，则停止播放音频。换句话说，如果球因弹起或滚落而失去与地板的接触，则滚动声音停止。\n\
    \n将脚本拖拽到层级视图中的球上（图 7-32），然后单击“播放”进行测试。当球滚动时，滚动声音应该变得可闻，而当球静止时，声音应该停止。\n\n![9781430248750_Fig07-32.jpg](img/9781430248750_Fig07-32.jpg)\n\
    \n图 7-32. 附加到球 `GameObject` 上的 `FuguBallSound` 脚本\n\n## 添加保龄球瓶碰撞声音\n\n现在准备好处理保龄球瓶的声音了。这里我们使用来自\
    \ Free SFX Pack 的 Coin_Pick_Up_03 声音来代替真实的保龄球瓶撞击声（图 7-33）。\n\n![9781430248750_Fig07-33.jpg](img/9781430248750_Fig07-33.jpg)\n\
    \n图 7-33. 用于保龄球瓶碰撞声音的 `AudioClip`\n\n在项目视图中选择保龄球瓶预制件，并使用检查器视图底部的 **Add Component**\
    \ 按钮添加一个 `AudioSource` 组件。然后点击 `AudioSource` 组件中 `AudioClip` 字段右侧，选择 Coin_Pick_Up_03\
    \ `AudioClip`。同样，取消选中 **Play on Awake** 复选框，否则每次游戏开始时你都会听到那个声音播放。\n\n类似于球的滚动声音由附加到球上的脚本播放，保龄球瓶的碰撞声音将由附加到每个保龄球瓶上的脚本播放。创建一个新的\
    \ JavaScript 文件，将其放置在 Scripts 文件夹中，并命名为 `FuguPinSound`。将清单 7-7 中的代码添加到脚本中。\n\n\
    清单 7-7. 在 `FuguPinSound.js` 中生成保龄球瓶碰撞声音\n\n```\n#pragma strict\n\nvar minSpeed\
    \ = 0.01; // 实际上是 minSpeed 的平方\n\nfunction OnCollisionEnter(collider:Collision)\
    \ {\n        if (collider.relativeVelocity.sqrMagnitude > minSpeed) {\n      \
    \          if (collider.gameObject.tag != \"Pin\") {\n                       \
    \  audio.Play(); // 碰到了除另一个保龄球瓶以外的任何物体，播放声音\n                }  else {\n     \
    \                    // 否则，ID 较低的保龄球瓶负责播放\n                         if (gameObject.GetInstanceID()\
    \ < collider.gameObject.GetInstanceID()) {\n                                 audio.Play();\n\
    \                         }\n                }\n        }\n}\n```\n\n这个脚本与 `FuguBallSound`\
    \ 的不同之处在于，它使用了 `OnCollisionEnter` 回调，而不是 `OnCollisionStay` 或 `OnCollisionExit`\
    \ 回调。同样，有一个 `minSpeed` 变量与速度的平方值进行比较。但这次的速度是碰撞中的 `relativeVelocity` 变量，因为保龄球瓶和与之碰撞的物体（球或另一个保龄球瓶）可能都在移动。\n"
- fmt: '# Here it is assumed that each `Pin` has a tag named `Pin`, so you can test
    if the `Pin` is colliding with another `Pin`. If the `Pin` is not colliding with
    another `Pin`, then it must be getting hit by the `Ball` or is falling on the
    `Floor`, in which case the script plays the collision sound. If the `Pin` is getting
    hit by another `Pin`, then a decision has to be made which `Pin` gets to play
    the collision sound. Otherwise, they’ll both play the sound at the same time.
    A simple trick is used to arbitrate. Each `Object` in Unity has a unique ID number
    that can be retrieved by the `Object` function `GetInstanceID`. The rule used
    in the script is that the `Pin` with the lower ID number wins and gets to play
    the collision sound.


    To attach the `FuguPinSound` script to the `Pin` prefab, select the prefab in
    the Project View and use the Add Component button in the Inspector View to select
    the script. And while you have the `Pin` prefab in the Inspector View, set its
    tag to `Pin`, as the `FuguPinSound` script expects. In the same manner that the
    `Floor` tag was created and assigned to the `Floor` GameObject, select Add Tag
    in the Tag menu, add a tag named `Pin` in the TagManager (make sure you’re creating
    a new tag, not a new layer), and select the `Pin` prefab again so that you can
    use the Tag menu to choose the new `Pin` tag. This, by the way, is an example
    of how a tag can be used to identify a group of elements rather than uniquely
    naming one, like we did with the `Floor`.


    The `Barrel` GameObject in our `BarrelPin` prefab should now look like [Figure
    7-34](#9781430248750_Ch07.xhtml#Fig34) in the Inspector View.


    ![9781430248750_Fig07-34.jpg](images/9781430248750_Fig07-34.jpg)


    [Figure 7-34](#9781430248750_Ch07.xhtml#_Fig34). `AudioSource` and `FuguPinSound`
    script attached to the `BarrelPin` prefab


    Now when you click Play and bowl into the barrels, pleasant coin sounds chime
    in as the barrels bounce around!


    ## Explore Further


    The bowling game is starting to look like a bowling game at this point (whereas
    at the end of the previous chapter, we had at best what could be called a rolling
    game). But although the player can roll the ball around and knock down bowling
    pins, we still don’t have the rules of the game. Stay tuned for that in the next
    chapter, which will get much heavier into scripting. In fact, this chapter is
    sort of a turning point, trending to more and more scripting and less introduction
    of new Components. So from now on, you should be spending most of your time in
    the Scripting Reference of the Unity documentation.


    ### Scripting Reference


    The `Instantiate` function in the `Object` class was introduced to create the
    bowling pins at runtime. This is the function used to spawn GameObjects, typically
    from prefabs. In other games, you might use `Instantiate` to spawn anything from
    pickup items to NPC’s. The function is described in the “Scripting Overview” but
    its page in “Runtime Classes” has more detailed information.


    One new callback, `Awake`, was introduced as an alternative to the `Start` callback.
    The `MonoBehaviour` collision callbacks `OnCollisionEnter`, `OnCollisionStay`,
    and `OnCollisionExit` were introduced in the previous chapter but used again for
    rolling and collision sounds. The `Collision` class for information on collisions:
    relative velocity, the GameObject that was collided against. Other data such as
    the actual point of contact are also available.


    The page for the `Rigidbody` class is worth reading in its entirety. Its variables
    correspond largely to the properties available in the Inspector view, and besides
    the `AddForce` function you used to push the Ball, there are many related functions:
    `AddRelativeForce`, `AddTorque`, `AddRelativeTorque`, `AddExplosionForce`, `AddForceAtPosition`.


    The `Transform` class was used again, this time checking `Transform.position`
    to determine if the Ball had rolled off the Floor. Since Quaternions were mentioned,
    take a look at the `rotation` and `localRotation` variables in `Transform` and
    compare to the `eulerAngles` and `localEulerAngles` variables. From the `GameObject`
    class, the `SendMessage` and `BroadcastMessage` functions were used to invoke
    the `ResetPosition` functions in other GameObjects. There’s also a `SendMessageUpward`
    function that works like `BroadcastMessage`, except the message is sent up the
    GameObject’s hierarchy instead of down. The message functions are also defined
    in the `Component` class.


    `AudioSource` functions were used to play and stop AudioClips. Other functions
    are useful if you want to refine your sound code. For example, the HyperBowl rolling
    sound code changes the volume of the sound (using the `AudioSource.volume` variable)
    according to the ball’s velocity, which not only provides a nicer rolling sound
    but also a softer cutoff of the sound when stopping.


    ### Assets


    We saw the Asset Store has a bountiful selection of free barrel models and sound
    libraries. And there’s much more if you don’t restrict yourself to free assets.


    Although the Asset Store doesn’t yet have bowling pin models, it’s not hard to
    find some on 3D model marketplaces such as `http://Turbosquid.com/`. Free audio,
    including bowling sounds, are available on the Creative Common licensed `http://freesound.org/`.


    # Chapter 8: Let’s Play! Scripting the Game


    Our bowling game that has been taking shape over the past few chapters is starting
    to actually look like a bowling game! It has a bowling ball, bowling pins (or
    rather, the barrels added in the previous chapter), game controls, and game physics.
    But it’s still more a toy than a game, since it lacks game rules and scoring.
    That will be remedied in this chapter with a healthy dose of scripting. Most of
    that will take place in the game controller script, `FuguBowl.js`, which will
    be filled out with the complete logic for a bowling game laid out as states in
    a finite state machine (FSM). Just the scoring rules are complicated enough, so
    those will be encapsulated in a script named `FuguBowlPlayer.js`.


    The good news is that, for once, there are no added assets in this chapter besides
    the `FuguBowlPlayer` script. The bad news is that there’s a lot of new code to
    type in, particularly in the game controller script. Although it may be tempting
    to just copy the online version of the `FuguBowl` script from the project for
    this chapter at `http://learnunity4.com/`, it’ll be easier to get the hang of
    implementing game logic for future projects if you put it together from scratch,
    piece by piece (or in the case of an FSM, state by state). Same goes for the new
    `FuguBowlPlayer` script.


    ## The Game Rules


    First, let’s quickly go over the rules of bowling. A game consists of ten frames.
    In each frame, you have up to two balls to knock down all ten pins. If you knock
    down all ten with the first ball, it’s called a strike, and you advance to the
    next frame. If you knock down all ten pins with two balls, then it’s called a
    spare. In the tenth frame, if you get a spare or strike, then you’re awarded a
    bonus third (and final) ball.


    The final game score is the sum of the scores from each frame. The score for a
    frame is the number of pins knocked down in that frame, except when it’s a spare
    or strike. If it’s a spare, it’s the number of pins knocked down (ten), plus the
    number of pins knocked down with the next ball. If it’s a strike, it’s also ten,
    but added to the number of pins knocked down from the next two balls. So a “perfect”
    game, 12 consecutive strikes, results in a score of 300 (I leave that calculation
    as an exercise for the reader).


    ## Scoring the Game'
