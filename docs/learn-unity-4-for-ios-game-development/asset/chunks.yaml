    # 检查器视图


    最值得首先详细描述的视图是`检查器视图`，因为它的功能是显示在其他视图中选中的对象信息。它实际上不仅仅是一个检查器，通常还能用于修改选中的项目。


    `检查器视图`还用于显示和调整可通过`编辑`菜单调出的各种设置。例如，你可能会注意到，在 Angry Bots 项目的安装目录中，`Assets` 文件夹里有很多扩展名为
    `.meta` 的文件，如图 2-27 所示。实际上，每个资源文件都对应一个这样的文件。Unity 使用这些元文件来跟踪项目中的资源，这些文件采用文本格式，便于与
    Perforce 和 Subversion 等版本控制系统（或更新的分布式版本控制系统，如 Git 和 Mercurial）配合使用。


    ![9781430248750_Fig02-27.jpg](img/9781430248750_Fig02-27.jpg)


    图 2-27。Angry Bots 项目中的元文件


    但是，如果你没有使用版本控制系统（或者使用的是需要额外许可的 Unity Technologies 产品 `Unity 资源服务器`），你可以在`编辑器设置`中关闭版本控制兼容性，并移除那些碍眼的文件。通过进入`编辑`菜单，从`设置`子菜单中选择`编辑器设置`，即可调出`编辑器设置`（图
    2-28）。


    ![9781430248750_Fig02-28.jpg](img/9781430248750_Fig02-28.jpg)


    图 2-28。调出`编辑器设置`


    现在，`检查器视图`会显示`编辑器设置`。如果项目当前包含元文件，则`版本控制模式`设置为`元文件`（如果你使用的是`资源服务器`，此选项会设置为`资源服务器`）。要移除元文件，请将`版本控制模式`设置为`禁用`（图
    2-29）。


    ![9781430248750_Fig02-29.jpg](img/9781430248750_Fig02-29.jpg)


    图 2-29。`检查器视图`中的`编辑器设置`


    将`版本控制模式`设置为`禁用`后，Unity 将移除这些元文件（图 2-30）。资源追踪现在由项目`库`文件夹内的二进制文件处理。


    ![9781430248750_Fig02-30.jpg](img/9781430248750_Fig02-30.jpg)


    图 2-30。移除了元文件的 Angry Bots 项目文件夹


    **注意**：使用元文件进行版本控制的 Unity Pro 用户还可以选择将`资源序列化模式`设置为`强制文本`。在该模式下，Unity 场景文件将以纯文本的
    YAML（YAML Ain’t Markup Language）格式保存。


    通常，`检查器视图`显示的是最近选中的对象的属性（当你调出`编辑器设置`时，实际上是选中了它）。但有时，当你选择其他对象时，不希望`检查器视图`发生变化。在这种情况下，你可以通过选择视图右上角菜单中的`锁定`选项，将`检查器视图`固定到一个对象上（图
    2-31）。


    ![9781430248750_Fig02-31.jpg](img/9781430248750_Fig02-31.jpg)


    图 2-31。锁定`检查器视图`


    # 项目视图


    如果说`检查器视图`可以看作是编辑器中最低层级的视图（因为它只显示单个对象的属性），那么`项目视图`则可以看作是最高层级的视图（图 2-32）。`项目视图`显示项目中所有可用的资源，从单独的模型、纹理和脚本，到整合了这些资源的场景文件。所有项目资源都存放在项目`Assets`文件夹内的文件中（因此，我实际上将`项目视图`视为`资产视图`）。


    ![9781430248750_Fig02-32.jpg](img/9781430248750_Fig02-32.jpg)


    图 2-32。`项目视图`的顶层


    ## 在单列和双列之间切换


    在 Unity 4 之前，`项目视图`只有单列显示模式。该选项在`项目视图`的菜单中仍然可用（单击视图右上角的三横线图标），因此你现在可以在单列和双列之间切换。


    请注意，Angry Bots 项目的`项目视图`（图 2-32）看起来与 Finder 中项目的`Assets`文件夹（参见图 2-30）相似。实际上，它看起来更像
    Windows 的文件视图，你可以在左侧面板中浏览文件夹层次结构，并在右侧面板中查看所选文件夹的内容。


    ## 缩放图标


    底部的滑块可以缩放右侧面板的视图——较大的缩放比例适合查看纹理，而较小的缩放比例更适合查看脚本等没有有趣图标的项目。这也是按资源类型对资源进行分区（例如，将所有纹理放入`Textures`文件夹，将脚本放入`Script`文件夹等）的一个好理由。因为单一的缩放滑块设置很可能无法很好地适应混合的资源类型。


    ## 检查资源


    在右侧选择一个资源，将在`检查器视图`中显示该资源的属性。例如，如果你选择了一个音频样本，`检查器视图`会显示有关音频格式的信息，其中一些信息（如压缩设置）你可以更改，它甚至允许你在编辑器中播放音频（图
    2-33）。我将在后面的章节中解释音频属性，但你现在可以随意在`项目视图`中选择各种类型的资源，看看`检查器视图`中会显示什么。


    ![9781430248750_Fig02-33.jpg](img/9781430248750_Fig02-33.jpg)


    图 2-33。在`项目视图`中检查选中的资源


    ## 搜索资源


    在大型复杂项目中，手动查找特定资源非常困难。幸运的是，就像在 Finder 中一样，有一个搜索框可以用来过滤`项目视图`右侧面板中显示的结果。在图 2-34
    中，`项目视图`显示了搜索名称中包含`"add"`的资源的结果。


    ![9781430248750_Fig02-34.jpg](img/9781430248750_Fig02-34.jpg)


    图 2-34。搜索名称中包含`"add"`的资源


    右侧面板显示的是`Assets`下所有内容的搜索结果（即我们所有的资源）。通过在左侧面板中选择一个子文件夹，可以进一步缩小搜索范围。例如，如果你知道正在查找一个纹理，并且已经按资源类型将资源整理到子文件夹中，那么你可以选择`Textures`文件夹进行搜索（图
    2-35）。


    ![9781430248750_Fig02-35.jpg](img/9781430248750_Fig02-35.jpg)


    图 2-35。在文件夹中搜索资源


    请注意，搜索框下方有一个显示所选文件夹名称的选项卡。你仍然可以单击左侧的`Assets`选项卡，以查看所有资源的搜索结果，这包括本地资源和`Unity 资源商店`中的资源，我们将在本书中大量使用该商店。


    你还可以使用搜索框右侧的菜单，按资源类型过滤搜索。除了在`Textures`文件夹中搜索之外，你也可以选择将`Texture`作为感兴趣的资源类型（图 2-36）。请注意，这会导致`"t:Texture"`被添加到搜索框中。`"t:"`前缀表示搜索应按随后的资源类型进行过滤。你也可以直接输入该前缀，无需使用菜单。


    ![9781430248750_Fig02-36.jpg](img/9781430248750_Fig02-36.jpg)


    图 2-36。按资源类型过滤的搜索

