    ads is a bit much!).'
  trans: "\n有时广告需要一段时间才会显示，有时 iAd 服务器未能提供广告，此时调试区域会显示*无库存*消息。即使应用已通过审核，通常也会延迟一段时间后\
    \ iAd 才会真正激活。在此期间，用户会看到测试广告，但同样不必惊慌！\n\n## 添加插屏广告\n\n现在我们准备尝试插屏广告。由于插屏广告是全屏广告，因此处理方式必须与横幅广告不同。当插屏广告出现时，必须先将其关闭才能继续游戏，就像关闭模态对话框一样。因此，插屏广告通常策略性地放置在游戏的过渡节点（interstitial\
    \ 意为“间隙之间”）。没人希望游戏正酣时突然弹出全屏广告！为此，我们将插屏广告放在初始场景中，这样它就会（如果出现的话）在保龄球场景加载之前显示。\n\n\
    同样，我们首先创建一个名为 `FuguAdInterstitial`（图 15-8）的新 JavaScript 文件。添加代码清单 15-2 的内容。\n\n\
    ![9781430248750_Fig15-08.jpg](img/9781430248750_Fig15-08.jpg)\n\n图 15-8. 创建 `FuguAdInterstitial`\
    \ 脚本\n\n代码清单 15-2.  `FuguAdInterstitial.js` 的完整代码\n\n```\n#pragma strict\n\nvar\
    \ waitTime:float = 2.0;\n\n#if UNITY_IPHONE\nprivate var ad:ADInterstitialAd =\
    \ null;\n\nfunction Start() {\n        if (iPhone.generation == iPhoneGeneration.iPad1Gen\
    \ ||\n                iPhone.generation == iPhoneGeneration.iPad2Gen ||\n    \
    \            iPhone.generation == iPhoneGeneration.iPad3Gen ||\n             \
    \   iPhone.generation == iPhoneGeneration.iPad4Gen ||\n                iPhone.generation\
    \ == iPhoneGeneration.iPadMini1Gen ||\n                iPhone.generation == iPhoneGeneration.iPadUnknown)\
    \ {\n                ad = new ADInterstitialAd();\n                var startTime\
    \ = Time.time;\n                while (!ad.loaded && ad.error == null && Time.time-startTime<waitTime)\
    \ {\n                        yield;\n                }\n                if (ad.loaded\
    \ && ad.error == null) {\n                        Debug.Log(\"iAd page shown\"\
    );\n                        ad.Present();\n                }  else {\n       \
    \                 if (ad.error != null) {\n                                Debug.Log(\"\
    iAd page error: \"+ad.error.description);\n                        }  else {\n\
    \                                Debug.Log(\"iAd page timed out\");\n        \
    \                }\n                        ad = null;\n                }\n  \
    \      }\n}\n#endif\n```\n\n由于插屏广告仅在 iPad 上可用，因此 `Start` 函数要做的第一件事就是检查当前是否运行在\
    \ iPad 上。遗憾的是，没有简洁的测试方法，但你可以检查 `iPhone.generation` 的静态变量，看其值是否与某个 iPad 型号匹配，每个型号都在\
    \ `iPhoneGeneration` 枚举中定义了对应的值。\n\n测试 `iPhone.generation` 的方式展示了 `iPhoneGeneration`\
    \ 枚举中的 iPad 值，但它的缺点在于，当未来版本的 Unity 为新 iPad 型号添加新值时，需要同步更新。另一种方法（根据你的观点，可能更健壮也可能更取巧）是将\
    \ `enum` 值转换为字符串，并检查其是否以“iPad”开头，如下所示：`if(iPhone.generation.ToString().StartsWith(\"\
    iPad\"))`。\n\n在完成 iPad 检查后，代码与 `FuguAdBanner` 脚本类似。这里我们使用的是 Unity 的 `ADInterstitialAd`\
    \ 类，而不是 `ADBannerView` 类。如同 `FuguAdBanner` 处理 `ADBannerView` 一样，代码实例化了一个 `ADInterstitialAd`，并在一个\
    \ `while-yield` 循环中等待 `ADInterstitialAd` 加载成功或加载失败并报错。\n\n但我们不希望无限期等待，尤其是当这可能会延迟游戏开始时，因此我们还设置了在特定时间\
    \ `waitTime` 过后停止等待。\n\n`waitTime` 以秒为单位，并被声明为公共变量，以便在检视面板中调整。在循环开始前，将当前游戏时间（可通过静态变量\
    \ `Time.time` 获取，同样以秒为单位）保存到局部变量 `startTime` 中。该循环除了检查广告是否加载成功或报错外，还会检查 `Time.time`\
    \ 减去 `startTime` 是否仍然小于 `waitTime`。\n\n当 `while` 循环终止时，如果广告已成功加载，则使用 `ADInterstitialAd.Present`\
    \ 函数（本质上与 `ADBannerView` 使用的 `Show` 函数相同）显示广告。如果加载失败，则通过 `Debug.Log` 记录一条“iAd\
    \ page has timed out”消息。\n\n## 附加脚本\n\n有了 `FuguAdInterstitial` 脚本，我们就可以将其添加到场景中了。如前所述，我们将把它添加到初始场景中，因此让我们切换到该场景（在项目视图中双击初始场景文件）。然后创建一个空的\
    \ `GameObject` 并命名为 `AdPage`（你也可以命名为 `AdInterstitial`，但何不取个更容易输入的名字）。将 `FuguAdInterstitial`\
    \ 脚本拖拽到 `AdPage` `GameObject` 上（图 15-9）。\n\n![9781430248750_Fig15-09.jpg](img/9781430248750_Fig15-09.jpg)\n\
    \n图 15-9. 将 `FuguAdInterstitial` 脚本添加到初始场景\n\n## 测试脚本\n\n现在可以运行了。与横幅广告一样，在编辑器中运行时不会看到任何广告，但在\
    \ iOS 模拟器或设备上测试时，应该会在初始画面显示期间看到全屏广告（图 15-10）。与横幅广告类似，不能保证 iAd 服务器一定会发送广告，但如果发送了，在应用发布到\
    \ App Store 之前，它将是一个测试广告。\n\n![9781430248750_Fig15-10.jpg](img/9781430248750_Fig15-10.jpg)\n\
    \n图 15-10. 在 iOS 模拟器上测试插屏 iAd\n\n## 跟踪广告收入\n\n与应用销售收入一样，iAd 收入也通过 iTunes Connect\
    \ 报告，具体在 iAd 网络页面链接下，如图 15-1 所示。iAd 网络页面顶部以图表形式显示所有应用的 iAd 收入（图 15-11）。\n\n![9781430248750_Fig15-11.jpg](img/9781430248750_Fig15-11.jpg)\n\
    \n图 15-11. iAd 收入\n\n收入图表下方是一个启用 iAd 的应用列表，包括已上线和仍处于测试广告状态的应用（图 15-12）。\n\n![9781430248750_Fig15-12.jpg](img/9781430248750_Fig15-12.jpg)\n\
    \n图 15-12. iAd 收入页面上的应用列表\n\n点击列表中的某个应用会进入一个类似页面，仅显示该应用的收入。该页面还按国家/地区细分广告收入，并提供编辑应用描述（广告商所见）以及指定不希望出现在自身广告中的竞争对手公司和应用的选项。\n\
    \n## 延伸探索\n\n本章是迄今为止最短的一章，这是一件好事。这意味着我们的游戏功能已经完备，并且添加广告非常简单。即使是在 iTunes Connect\
    \ 上的设置也并不复杂！但在实践中，你可能需要考虑在何处以及何时放置广告，尤其是插屏广告，并且越早设计越好。\n\n## 脚本参考\n\n本章中我们仅用少量代码就实现了许多功能。使用\
    \ iAds 只需要两个类：`ADBannerView` 和 `ADInterstitialAd`，而在典型的应用中，你通常只会使用其中一个类（同时使用横幅广告和插屏广告就太多了！）。\n"
- fmt: "The pages for both of those classes have script examples. The `iPhone` class\
    \ contains anything that is specific to iOS (much of what used to be iOS-specific\
    \ is now also applicable to Android and is now in the `Handheld` class). For example,\
    \ we check the static variable `iPhone.generation` to find out if we’re running\
    \ on an iPad. It’s worth checking the page on the `iPhoneGeneration` enum to see\
    \ the set of iOS hardware recognized by Unity.\n\n## iOS Developer Library\n\n\
    The Unity `ADBannerView` and `ADInterstitialAd` classes correspond to same-named\
    \ classes in Objective-C. The iAd Programming Guide in the iOS Developer Library\
    \ describes those classes and provides a lot of details on how to effectively\
    \ deploy banner and interstitial ads.\n\nGeneral information about iAd for both\
    \ developers and advertisers is available on `http://developer.apple.com/iad`.\n\
    \n## Asset Store\n\niAd isn’t your only in-app advertising option. Once you start\
    \ releasing apps, you will probably start receiving e-mails from numerous account\
    \ managers at various mobile ad vendors. In fact, iAd originated as a product\
    \ of Quattro Wireless before Apple acquired that company to gain its advertising\
    \ product. Third-party ad vendors typically have their own iOS SDK and thus require\
    \ a Unity plugin to access that SDK. Some of these SDKs are available on the Asset\
    \ Store under the Services category, including PlayHaven and Inneractive.\n\n\
    ## Outside the Asset Store\n\nAs with their Game Center plugin, Prime31 Studios\
    \ offered an iAd plugin before Unity introduced their iAd scripting support. Prime31\
    \ offers plugins for many other advertising services, including AdMob, AdWhirl,\
    \ MobClix, and many more, available at `http://prime31.com/`.\n\nKiip (`http://kiip.com/`)\
    \ provides an interesting twist on ads. A Kiip-enabled app features coupons that\
    \ resemble banner ads but are presented like achievements. Their Unity plugin\
    \ is available on GitHub at `http://github.com/kiip`.\n\n# Chapter     16\n\n\
    ## Optimization\n\nConsistent with Donald Knuth’s much-ballyhooed quote that “premature\
    \ optimization is the root of all evil,” I’ve left the topic of optimization until\
    \ nearly the end of this book. In this chapter we'll optimize our bowling app\
    \ and go over the precursors to that process, establishing the target performance\
    \ and measuring the current performance. The project for this chapter on `http://learnunity4.com/`\
    \ contains the optimized scripts and optimization helper scripts developed in\
    \ this chapter.\n\n### Choose Your Target\n\nThere’s a saying, “Fast, good, or\
    \ cheap. Pick two.” That’s generally the case with optimization. Among quality,\
    \ space, and speed, you can often at best achieve two of the three, at the expense\
    \ of the third.\n\n### Frame Rate\n\nBefore you start optimizing, you should establish\
    \ your target frame rate. iOS devices refresh their screens 60 times per second,\
    \ but by default, Unity iOS builds attempt to achieve 30 frames per second (fps).\
    \ Targeting a frame rate at half the device refresh rate is less demanding on\
    \ the device battery, and 30 fps is a lot easier to achieve than 60 fps. Our bowling\
    \ game is simple, so you should be able to hit 60 fps if you’re willing to make\
    \ some compromises.\n\nIt might seem obvious to always target the highest possible\
    \ frame rate, but if a game switches frequently between 30 fps and 60 fps, the\
    \ discontinuity may be more distracting than just steadily running at 30 fps.\
    \ Nevertheless, it makes sense to start with a target of 60 fps before profiling,\
    \ so you can see your peak performance and then lower it later if you need to.\n\
    \n### Create the Script\n\nThere’s no way to set the target frame rate in the\
    \ Unity Editor, but fortunately, you can adjust the target frame rate in a script\
    \ by setting the static variable `Application.targetFrameRate`. So let’s create\
    \ a new JavaScript script, place it in the Scripts folder, and name it `FuguFrameRate`\
    \ ([Figure 16-1](#9781430248750_Ch16.xhtml#Fig1)).\n\n![9781430248750_Fig16-01.jpg](images/9781430248750_Fig16-01.jpg)\n\
    \n[Figure 16-1](#9781430248750_Ch16.xhtml#_Fig1). Adding a script in the Scripts\
    \ folder\n\nThis will be a really short script, with one public variable and a\
    \ `Start` callback containing just one line of code ([Listing 16-1](#9781430248750_Ch16.xhtml#list1)).\n\
    \n[Listing 16-1](#9781430248750_Ch16.xhtml#_list1).  Complete Script for `FuguFrameRate.js`\n\
    \n```\n#pragma strict\n\npublic var frameRate:int = 60;\n\nfunction Start() {\n\
    \        Application.targetFrameRate = frameRate;\n}\n```\n\nThe script sets the\
    \ target frame rate by changing the value of the static variable `Application.targetFrameRate`\
    \ to the value of `frameRate`, which is a public variable so it can be adjusted\
    \  in the Inspector View. Since iOS devices all have a screen refresh rate of\
    \ 60 fps, that’s the best frame rate you can achieve, and thus a reasonable default\
    \ value for `frameRate`.\n\n### Attach the Script\n\nTo utilize the `FuguFrameRate`\
    \ script, it has to be added to a scene so that its `Start` callback is executed\
    \ when the game starts. So let’s create an empty GameObject in the bowling scene,\
    \ name it `FrameRate`, and drag the `FuguFrameRate` script onto it ([Figure 16-2](#9781430248750_Ch16.xhtml#Fig2)).\n\
    \n![9781430248750_Fig16-02.jpg](images/9781430248750_Fig16-02.jpg)\n\n[Figure\
    \ 16-2](#9781430248750_Ch16.xhtml#_Fig2). Frame rate script included in the bowling\
    \ scene\n\nThis script was added to our bowling scene, but you could just as well\
    \ have added it to our splash scene instead, since `Application.targetFrameRate`\
    \ only needs to be set once and it stays at that value even when a new scene is\
    \ loaded. Our current splash scene doesn’t really do anything, so running at Unity’s\
    \ default 30 fps is fine.\n\nHowever, if the splash scene were to display a cool\
    \ animation, you might want to set it at 60 fps, and in that case, you would also\
    \ add the frame rate script to that scene. In fact, if the splash scene looked\
    \ best at 60 fps and the bowling scene ran more smoothly at 30 fps (rather than\
    \ jittering between 30 fps and 60 fps), you would add the frame rate script to\
    \ both scenes, setting the target frame rate to 60 fps in the splash scene and\
    \ 30 fps in the bowling scene.\n\n### Targeting Space\n\nBesides frame rate, you\
    \ should also set a goal for the app size. You have to compete for room on iOS\
    \ devices with songs, photos, videos, and all the other apps that users install.\
    \ A smaller footprint makes the decision easier for a user to keep your app.\n\
    \nA smaller app also downloads in less time and loads faster (both the app load\
    \ and level loads). Especially important, the App Store limits downloads over\
    \ cellular connections to apps under 50MB in size. You don’t want to miss out\
    \ on impulse buys, so 50MB is a good app size target. This constraint is much\
    \ easier to meet than the App Store’s original 20MB limit, but any app with significant\
    \ content can still easily exceed that size (HyperBowl, with six lanes, is around\
    \ 40MB).\n\n### Profile\n\nBefore you start optimizing, you need to know what\
    \ to optimize. That’s where profiling, obtaining performance information about\
    \ the game, comes in. You have options ranging from statistics displayed in the\
    \ Editor, to profiling the app itself, and even writing some of your own performance\
    \ measurement code.\n\n#### Game View Stats\n\nIn the Editor, you have immediate\
    \ access to performance-related information about the scene using the Stats overlay\
    \ in the Game View ([Figure 16-3](#9781430248750_Ch16.xhtml#Fig3)).\n\n![9781430248750_Fig16-03.jpg](images/9781430248750_Fig16-03.jpg)\n\
    \n[Figure 16-3](#9781430248750_Ch16.xhtml#_Fig3). The Game View statistics overlay\n\
    \nWhen you click Play, you’ll see these statistics update while the game is in\
    \ progress. This information is convenient, but it’s no substitute for profiling\
    \ the actual app.\n\n### The Build Log\n\nMinimizing your app size is not as important\
    \ as it used to be, when exceeding 20MB meant that an app could only be downloaded\
    \ onto a device over Wi-Fi, not 3G wireless."
