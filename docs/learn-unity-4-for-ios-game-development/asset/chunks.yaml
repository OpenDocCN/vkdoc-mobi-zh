    \n碰撞音效文件较小，因此我们将其保持未压缩状态，以避免解压缩处理，并最大化播放质量。滚动音效文件较大，因此对其进行压缩并保留在内存中。由于这是唯一的压缩音效，并且`iOS`硬件支持随时解码一个压缩音效，因此不会产生任何软件解码开销。不过，如果场景中还播放环境音或音乐，这些文件可能会大得多，你应该优先压缩它们。\n\
