    \ 类包含所有 iOS 特有的内容（许多以前 iOS 特有的内容现在也适用于 Android，并且已归入 `Handheld` 类）。例如，我们检查静态变量\
    \ `iPhone.generation` 来确定我们是否在 iPad 上运行。查看 `iPhoneGeneration` 枚举的页面以了解 Unity 能够识别的\
    \ iOS 硬件集是很有必要的。\n\n## iOS 开发者库\n\nUnity 的 `ADBannerView` 和 `ADInterstitialAd`\
    \ 类对应于 Objective-C 中的同名类。iOS 开发者库中的 iAd 编程指南描述了这些类，并提供了大量关于如何有效部署横幅广告和插屏广告的细节。\n\
    \n面向开发者和广告商的 iAd 通用信息可在 `http://developer.apple.com/iad` 上找到。\n\n## 资源商店\n\niAd\
    \ 并非您应用内广告的唯一选择。一旦您开始发布应用，您很可能会开始收到来自众多移动广告商客户经理的电子邮件。事实上，iAd 最初是 Quattro Wireless\
    \ 的产品，之后苹果收购了该公司以获取其广告产品。第三方广告商通常拥有自己的 iOS SDK，因此需要 Unity 插件才能访问该 SDK。其中一些 SDK\
    \ 可在资源商店的“服务”类别下找到，包括 PlayHaven 和 Inneractive。\n\n## 资源商店之外\n\n与他们的 Game Center\
    \ 插件一样，Prime31 Studios 在 Unity 引入其 iAd 脚本支持之前就提供了一个 iAd 插件。Prime31 为许多其他广告服务提供插件，包括\
    \ AdMob、AdWhirl、MobClix 等等，可在 `http://prime31.com/` 上找到。\n\nKiip (`http://kiip.com/`)\
    \ 为广告提供了一种有趣的变体。启用了 Kiip 的应用会提供类似横幅广告但以成就形式呈现的优惠券。他们的 Unity 插件可在 GitHub 上找到，地址是\
    \ `http://github.com/kiip`。\n\n# 第 16 章\n\n## 优化\n\n与 Donald Knuth 那句广为引用的名言“过早优化是万恶之源”一致，我将优化这一主题留到了本书的末尾。在本章中，我们将优化我们的保龄球应用，并介绍该过程的前置步骤：设定性能目标并测量当前性能。本章节的项目文件位于\
    \ `http://learnunity4.com/`，其中包含本章开发的优化脚本和优化辅助脚本。\n\n### 选择你的目标\n\n有句老话说：“快、好、或便宜，三选二。”这通常是优化中的情况。在质量、空间和速度之间，你通常最多只能以牺牲第三者为代价，实现其中两者。\n\
    \n### 帧率\n\n在开始优化之前，你应该先设定目标帧率。iOS 设备每秒刷新屏幕 60 次，但默认情况下，Unity iOS 构建尝试达到每秒 30\
    \ 帧（fps）。将目标帧率设为设备刷新率的一半对设备电池的要求较低，并且 30 fps 比 60 fps 容易实现得多。我们的保龄球游戏很简单，所以如果你愿意做出一些妥协，应该能够达到\
    \ 60 fps。\n\n始终追求最高可能的帧率似乎是显而易见的事，但如果游戏频繁地在 30 fps 和 60 fps 之间切换，这种不连续性可能比稳定在\
    \ 30 fps 运行更让人分心。不过，在性能分析之前，以 60 fps 为目标（开始）是合理的，这样你可以看到峰值性能，然后如果需要的话再降低它。\n\n\
    ### 创建脚本\n\n在 Unity 编辑器中无法设置目标帧率，但幸运的是，你可以通过在脚本中设置静态变量 `Application.targetFrameRate`\
    \ 来调整目标帧率。因此，让我们创建一个新的 JavaScript 脚本，将其放入 Scripts 文件夹，并命名为 `FuguFrameRate`（图 16-1）。\n\
    \n![9781430248750_Fig16-01.jpg](img/9781430248750_Fig16-01.jpg)\n\n图 16-1. 在 Scripts\
    \ 文件夹中添加脚本\n\n这将是一个非常简短的脚本，包含一个公共变量和一个仅有一行代码的 `Start` 回调（代码清单 16-1）。\n\n代码清单 16-1.\
    \  `FuguFrameRate.js`的完整脚本\n\n```\n#pragma strict\n\npublic var frameRate:int\
    \ = 60;\n\nfunction Start() {\n        Application.targetFrameRate = frameRate;\n\
    }\n```\n\n该脚本通过将静态变量 `Application.targetFrameRate` 的值更改为 `frameRate` 的值来设置目标帧率，`frameRate`\
    \ 是一个公共变量，因此可以在检视视图中进行调整。由于 iOS 设备的屏幕刷新率均为 60 fps，这是您能达到的最佳帧率，因此也是 `frameRate`\
    \ 的合理默认值。\n\n### 挂载脚本\n\n要使用 `FuguFrameRate` 脚本，必须将其添加到一个场景中，以便在游戏启动时执行其 `Start`\
    \ 回调。因此，让我们在保龄球场景中创建一个空的游戏对象，将其命名为 `FrameRate`，然后将 `FuguFrameRate` 脚本拖拽到它上面（图\
    \ 16-2）。\n\n![9781430248750_Fig16-02.jpg](img/9781430248750_Fig16-02.jpg)\n\n\
    图 16-2. 保龄球场景中包含帧率脚本\n\n这个脚本被添加到了我们的保龄球场景中，但你完全可以将它添加到我们的启动画面场景中，因为 `Application.targetFrameRate`\
    \ 只需要设置一次，并且即使在加载新场景时，它也会保持该值。我们当前的启动画面场景实际上什么都没做，所以使用 Unity 默认的 30 fps 运行就可以了。\n\
    \n然而，如果启动画面场景要显示很酷的动画，你可能希望将其设置为 60 fps，在这种情况下，你还需要将帧率脚本添加到该场景中。实际上，如果启动画面场景在\
    \ 60 fps 下效果最佳，而保龄球场景在 30 fps 下运行更流畅（而不是在 30 fps 和 60 fps 之间抖动），那么你需要将帧率脚本添加到两个场景中，在启动画面场景中将目标帧率设为\
    \ 60 fps，在保龄球场景中设为 30 fps。\n\n### 空间目标\n\n除了帧率，你还应该为应用大小设定一个目标。你必须与用户安装的歌曲、照片、视频以及所有其他应用竞争\
    \ iOS 设备上的空间。更小的占用空间使用户更容易决定保留你的应用。\n\n更小的应用下载时间也更短，加载速度更快（包括应用加载和关卡加载）。尤其重要的是，App\
    \ Store 限制通过蜂窝网络下载的应用大小不得超过 50MB。你不想错过冲动购买的机会，所以 50MB 是一个不错的应用大小目标。这个限制比 App Store\
    \ 原先的 20MB 限制容易达到得多，但任何包含大量内容的应用仍然很容易超过这个大小（有六个球道的 HyperBowl 大约是 40MB）。\n\n###\
    \ 性能分析\n\n在开始优化之前，你需要知道要优化什么。这就是性能分析的用武之地，即获取关于游戏性能的信息。你可以选择从编辑器中显示的统计信息，到对应用本身进行性能分析，甚至编写一些你自己的性能测量代码。\n\
    \n#### 游戏视图统计信息\n\n在编辑器中，你可以使用游戏视图中的统计信息覆盖层（图 16-3）立即访问场景的性能相关信息。\n\n![9781430248750_Fig16-03.jpg](img/9781430248750_Fig16-03.jpg)\n\
    \n图 16-3. 游戏视图统计信息覆盖层\n\n当你点击“播放”时，你会看到这些统计信息在游戏运行期间实时更新。这些信息很方便，但它不能替代对实际应用进行性能分析。\n\
    \n### 构建日志\n\n最小化应用尺寸已不像过去那么重要，那时超过 20MB 意味着应用只能通过 Wi-Fi 下载到设备上，而不能通过 3G 无线网络。\n"
- fmt: "Now the limit is a more generous 50MB, but this is still easy to reach if\
    \ you’ve got a big game, and smaller means faster downloads and more people can\
    \ fit your app into devices with less free storage (I always fill up my iPads\
    \ fairly quickly). You can see a breakdown of assets that went into your app by\
    \ checking the `Editor` log after a build, as shown in [Listing 16-2](#9781430248750_Ch16.xhtml#list2).\n\
    \n[Listing 16-2](#9781430248750_Ch16.xhtml#_list2). Build information in the `Editor\
    \ Log`\n\n```\nTextures      5.2 mb      16.9%\nMeshes        17.4 kb     0.1%\n\
    Animations    0.0 kb      0.0%\nSounds        21.2 mb     69.1%\nShaders      \
    \ 0.0 kb      0.0%\nOther Assets  19.1 kb     0.1%\nLevels        10.7 kb    \
    \ 0.0%\nScripts       175.2 kb    0.6%\nIncluded DLLs 4.1 mb      13.3%\nFile\
    \ headers  16.6 kb     0.1%\nComplete size 30.6 mb     100.0%\nUsed Assets, sorted\
    \ by uncompressed size:\n 21.1 mb         69.0% Assets/Assets/Free/Assets/Sci-Fi_Ambiences/Sci-fi_AmbienceLoop1.wav\n\
    \ 4.0 mb          13.1% Assets/Textures/LearnUnityCover.jpg\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_up.tif\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_right.tif\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_left.tif\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_front.tif\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_back.tif\n 170.8 kb        0.5%\
    \ Assets/Standard Assets/Light Flares/Sources/Textures/50mmflare.psd\n 170.8 kb        0.5%\
    \ Assets/Barrel/Barrel_D.tga\n 31.2 kb         0.1% Assets/Assets/Free/Assets/8Bit/Coin_Pick_Up_03.wav\n\
    \ 17.4 kb         0.1% Assets/Barrel/Barrel.fbx\n 17.3 kb         0.1% Assets/Substances_Free/Wood_Planks_01.sbsar\n\
    \ 10.8 kb         0.0% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_down.tif\n\
    \ 1.0 kb          0.0% Assets/Prefabs/BarrelPin.prefab\n 0.6 kb          0.0%\
    \ Assets/Standard Assets/Light Flares/50mm Zoom.flare\n 0.3 kb          0.0% Assets/Standard\
    \ Assets/Skyboxes/Sunny3 Skybox.mat\n```\n\nThe log lists a breakdown of your\
    \ app size by type of asset—textures, audio, meshes, scripts—and a list of the\
    \ individual assets that went into it. Unfortunately, the size contributions are\
    \ based on uncompressed sizes and not the final compressed asset sizes, but it\
    \ still gives you an idea of which assets are taking the most space.\n\nThe log\
    \ also provides a way to find out which assets in your project are used or not\
    \ used, via the handy search field in the `Console` app. For example, all the\
    \ textures for Fugu Bowl are in the `Textures` folder, so to check which of those\
    \ Textures are used and which ones can be removed from the project, select `Editor\
    \ Log` in the `Console View` menu, which should launch the `Console` app with\
    \ the `Editor` log selected ([Figure 16-4](#9781430248750_Ch16.xhtml#Fig4)).\n\
    \n![9781430248750_Fig16-04.jpg](images/9781430248750_Fig16-04.jpg)\n\n[Figure\
    \ 16-4](#9781430248750_Ch16.xhtml#_Fig4). Filtering the build log using the `Console`\
    \ app search field\n\nIn the search box type `Textures` to filter the display.\
    \ Then you can compare the resulting list with the `Textures` folder in the `Project\
    \ View` and see if there’s anything in the `Project View` that didn’t end up in\
    \ the build.\n\n## Run the Built-In Profiler\n\nAfter the Unity iOS build has\
    \ generated its Xcode project, you have the option of activating the built-in\
    \ profiler, which reports information similar to the `Stats` overlay in the `Game\
    \ View`. To activate the built-in profiler, also referred to in the Unity documentation\
    \ as the internal profiler, select the header file `iPhone_Profiler.h` in the\
    \ Xcode project, listed inside the `Classes` folder, and change the value of `ENABLE_INTERNAL_PROFILER`\
    \ from `0` to `1` ([Figure 16-5](#9781430248750_Ch16.xhtml#Fig5)).\n\n![9781430248750_Fig16-05.jpg](images/9781430248750_Fig16-05.jpg)\n\
    \n[Figure 16-5](#9781430248750_Ch16.xhtml#_Fig5). Built-in profiler switch in\
    \ the Unity Xcode project\n\nNow when you click `Play`, the app will recompile\
    \ with the built-in profiler enabled, and the debug area of Xcode will display\
    \ statistics, as shown in [Listing 16-3](#9781430248750_Ch16.xhtml#list3), after\
    \ every 30 frames while the game is running.\n\n[Listing 16-3](#9781430248750_Ch16.xhtml#_list3).\
    \ Built-In Profiler Output on a Fourth-Generation iPod Touch\n\n```\niPhone Unity\
    \ internal profiler stats:\ncpu-player>    min: 39.8   max: 63.2   avg: 58.0\n\
    cpu-ogles-drv> min:  2.1   max:  3.7   avg:  2.4\ncpu-present>   min:  0.7   max:\
    \  6.6   avg:  1.8\nframetime>     min: 47.7   max: 72.2   avg: 64.5\ndraw-call\
    \ #>   min:  40    max:  40    avg:  40     | batched:     0\ntris #>        min:\
    \  5544  max:  5544  avg:  5544   | batched:     0\nverts #>       min:  4358\
    \  max:  4358  avg:  4358   | batched:     0\nplayer-detail> physx:  0.0 animation:\
    \  0.0 culling  0.0 skinning:  0.0 batching:  0.0 render: 58.0 fixed-update-count:\
    \ 0 .. 0\nmono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>\
    \   used heap: 405504 allocated heap: 524288  max number of collections: 0 collection\
    \ total duration:  0.0\n```\n\nThe first number to look at in the profile is the\
    \ `frametime`, which is the total amount of time taken by a frame, in milliseconds.\
    \ If you’re running at 60 fps, you should see an average of around 16.7 ms for\
    \ the `frametime`. If the `frametime` is above 34, then you’re not even getting\
    \ 30 fps. The line below the `frametime` is pretty important, too, as it tends\
    \ to have a big impact on the `frametime`. Draw calls are distinct drawing operations.\
    \ Generally, each rendered mesh incurs a draw call, and lighting and shadows on\
    \ top of that can add more draw calls.\n\nThe `player-detail` breaks down the\
    \ time listed in the `cpu-player` line at the top. The `player-detail` time is\
    \ apportioned among `physx` (physics), `animation`, `culling` (determining objects\
    \ that don’t need to be rendered), `skinning` (updating the skin position on animated\
    \ characters), `batching` (combining meshes that have the same materials so they\
    \ are rendered with a single draw call), `rendering`, and the fixed update count.\n\
    \nThe profile results in [Listing 16-3](#9781430248750_Ch16.xhtml#list3), taken\
    \ on a fourth-generation iPod touch, show a `frametime` not even close to 30 fps,\
    \ much less 16 fps, and the `player-detail` is dominated by the render time. One\
    \ thing that is known to have a big performance impact is dynamic shadows, so\
    \ let’s disable shadows in our Light ([Figure 16-6](#9781430248750_Ch16.xhtml#Fig6)).\n\
    \n![9781430248750_Fig16-06.jpg](images/9781430248750_Fig16-06.jpg)\n\n[Figure\
    \ 16-6](#9781430248750_Ch16.xhtml#_Fig6). Disabling shadows from the bowling scene\
    \ Light\n\nThen `Build and Run` again to start a new profile session ([Listing\
    \ 16-4](#9781430248750_Ch16.xhtml#list4)).\n\n[Listing 16-4](#9781430248750_Ch16.xhtml#_list4).\
    \ Built-In Profiler Output After Removing Shadows\n\n```\niPhone Unity internal\
    \ profiler stats:\ncpu-player>    min:  5.0   max:  7.6   avg:  5.7\ncpu-ogles-drv>\
    \ min:  3.1   max:  7.0   avg:  3.7\ncpu-present>   min: 14.4   max: 42.9   avg:\
    \ 28.1\ncpu-waits-gpu> min: 14.4   max: 42.9   avg: 28.1 \nmsaa-resolve> min:\
    \  0.0   max:  0.0   avg:  0.0\nframetime>     min: 28.5   max: 55.5   avg: 39.5\n\
    draw-call #>   min:  29    max:  29    avg:  29     | batched:    10\ntris #>\
    \        min:  4584  max:  4584  avg:  4584   | batched:  3420\nverts #>     \
    \  min:  3712  max:  3712  avg:  3712   | batched:  2750\nplayer-detail> physx:\
    \  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  1.9 render:  3.1\
    \ fixed-update-count: 0 .. 0\nmono-scripts>  update:  0.2   fixedUpdate:  0.0\
    \ coroutines:  0.1\nmono-memory>   used heap: 401408 allocated heap: 524288  max\
    \ number of collections: 0 collection total duration:  0.0\n```\n\nIf you’re not\
    \ running Unity iOS Pro or you turned off shadows earlier for performance reasons,\
    \ then you’re already here. Anyway, the results are dramatic."
