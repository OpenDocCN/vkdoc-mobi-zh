    Image, that one displaying three barrels in its Asset Store icon, already has
    a prefab set up, so let’s download that package. From the Asset Store description,
    and from the Project View after you import the package, you can see the Barrel
    package is nicely organized, with a folder named Barrel that contains the Barrel
    prefab and the Barrel model ([Figure 7-15](#9781430248750_Ch07.xhtml#Fig15)).


    ![9781430248750_Fig07-15.jpg](images/9781430248750_Fig07-15.jpg)


