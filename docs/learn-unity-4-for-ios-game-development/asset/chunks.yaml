    in every frame just like `Update`, but all `LateUpdate` calls in a frame take
    place after all `Update` calls have completed. `SmoothFollow` calculates the Camera
    position in `LateUpdate` so it takes into account any position change that’s taken
    place in its target’s `Update` callback.    Having both `Update` and `LateUpdate`
    callbacks is a common technique in game engines, but it can only go so far. What
    if you want a GameObject to update after another GameObject’s `LateUpdate`? Sorry,
    there’s no `LateLateUpdate` callback! But Unity does have a more general solution,
    the Script Execution Order Settings, which can be brought up from the Project
    Settings submenu of the Edit menu ([Figure 17-4](#9781430248750_Ch17.xhtml#Fig4)).    ![9781430248750_Fig17-04.jpg](images/9781430248750_Fig17-04.jpg)    [Figure
    17-4](#9781430248750_Ch17.xhtml#_Fig4). Bringing up the Script Execution Order
    Settings    The Script Execution Order Settings can also be brought up by clicking
    the Execution Order button displayed in the Inspector View when a script is selected.
    Either way, the Script Execution Order Settings show up in the Inspector View
    as a MonoManager ([Figure 17-5](#9781430248750_Ch17.xhtml#Fig5)) and has a list
    initially containing just one item, Default Time.    ![9781430248750_Fig17-05.jpg](images/9781430248750_Fig17-05.jpg)    [Figure
    17-5](#9781430248750_Ch17.xhtml#_Fig5). The Script Execution Order Settings in
    the Inspector View    Since `SmoothFollow` uses `LateUpdate`, you don’t have to
    make any changes, but let’s say you want to make sure the `SmoothFollow` script
    runs its `Update` callback after all other scripts. You would click the plus sign
    (+) button at the lower right of the Script Execution Order Settings and select
    the `SmoothFollow` script from the resulting menu. By default, the `SmoothFollow`
    script would appear in the Script Execution Order Settings below the Default Time,
    meaning `SmoothFollow` will run after all other scripts.    And then you might
    decide that the game controller script, `FuguBowl`, should run after every other
    script (since it’s constantly checking the bowling position, for example) except
    for `SmoothFollow`. So again, you would click the + button to add the `FuguBowl`
    script and then drag `FuguBowl`, using the handle on the left, above `SmoothFollow`
    but below Default Time, resulting in a list as shown in [Figure 17-6](#9781430248750_Ch17.xhtml#Fig6).
    Anything dragged above Default Time would execute before all the other scripts.    ![9781430248750_Fig17-06.jpg](images/9781430248750_Fig17-06.jpg)    [Figure
    17-6](#9781430248750_Ch17.xhtml#_Fig6). Specifing the execution order of FuguBowl.js
    and SmoothFollow.js    Clicking the minus (-) button on the right of a script
    will remove the script from the Script Execution Order Settings.    Plugins    Much
    mention has been made of third-party plugins, some available on the Asset Store,
    and many from Prime31 Studios. But if you happen to be conversant in C, C++, or
    Objective-C, you can write your own plugins, either to access more device functionality
    or to make use of libraries written in C, C+, or Objective-C. Besides including
    the native library, plugins require additional Unity wrapper scripts.'
  trans: "[内容]\n清单 17-6 展示了`FuguGameCenter`脚本的 C#版本。\n\n**清单 17-6. `FuguGameCenter`的\
    \ C#版本**\n\n```\nusing UnityEngine;\nusing System.Collections;\n\nusing UnityEngine.SocialPlatforms.GameCenter;\n\
    \nnamespace Fugu {\n         \n   sealed public class GameCenter : MonoBehaviour\
    \ {\n\n        public bool showAchievementBanners = true;\n\n        // 初始化时使用\n\
    \        void Start () {\n#if UNITY_IPHONE\n        Social.localUser.Authenticate\
    \ ( (bool success) => {\n        if (success && showAchievementBanners) {\n  \
    \              GameCenterPlatform.ShowDefaultAchievementCompletionBanner(showAchievementBanners);\n\
    \                        Debug.Log (\"认证成功 \"+Social.localUser.userName);\n  \
    \      }\n                else {\n                        Debug.Log (\"认证失败 \"\
    +Social.localUser.userName);\n                }\n        }\n    );\n#endif\n \
    \       }\n                \n        \n        static public void Achievement(string\
    \ name,double score) {\n#if UNITY_IPHONE\n        if (Social.localUser.authenticated)\
    \ {\n                Social.ReportProgress(name,score, (bool success) => {\n \
    \                       if (success) {\n                                Debug.Log(\"\
    成就 \"+name+\" 报告成功\");\n                        }  else {\n                  \
    \              Debug.Log(\"报告成就失败 \"+name);\n                        }\n     \
    \           } );\n        }\n#endif\n}\n\n        static public void Score(string\
    \ name,long score) {\n#if UNITY_IPHONE\n        if (Social.localUser.authenticated)\
    \ {\n                 Social.ReportScore (score, name, (bool success) => {\n \
    \                       if (success) {\n                                Debug.Log(\"\
    在排行榜 \"+name+\" 上发布了 \"+score);\n                        }  else {\n         \
    \                       Debug.Log(\"在排行榜 \"+name+\" 上发布 \"+score+\" 失败\");\n \
    \                       }\n                } );\n        }\n#endif\n}\n      \
    \  \n   }\n}\n```\n\n最后，你可能最怀念 JavaScript 的一点是，可以轻松修改 Transform 组件中的`Vector3`值。清单\
    \ 17-7 展示了一行简单的 JavaScript 代码，用于修改 Transform 组件位置中的`x`分量。\n\n**清单 17-7. 在 JavaScript\
    \ 中修改 Transform 的`Vector3`**\n\n```\nfunction Start () {\n        transform.position.x=0;\n\
    }\n```\n\n这行代码在 C#中会产生编译器错误（图 17-3），因为`Vector3`是一个结构体（struct），而不是类（class），因此是值类型，而非引用类型。它在\
    \ JavaScript 中能正常运行是一种便利（尽管会带来误导，因为它会让`Vector3`看起来像一个类，而不是结构体）。\n\n![9781430248750_Fig17-03.jpg](img/9781430248750_Fig17-03.jpg)\n\
    \n**图 17-3. 在 C#中修改 Transform 的`Vector3`时出现的错误信息**\n\n由于`Vector3`是结构体，你不必担心垃圾回收器需要清理大量未使用的`Vector3`实例，因为实际上并不存在这些实例。但这意味着在\
    \ C#中，如果你想修改 Transform 组件的位置，就必须创建一个新的`Vector3`，如清单 17-8 所示。\n\n**清单 17-8. 在 C#中修改\
    \ Transform 的有效方法**\n\n```\nvoid Start () {\n        transform.position = new\
    \ Vector3(0,transform.position.y,transform.position.z);\n}\n```\n\n注意，在 C#中，你必须在`Vector3`构造函数前指定`new`，而在\
    \ JavaScript 中则是可选的。这是 JavaScript 的一个小便利（这类便利通常被称为*语法糖*），但 C#的优势在于允许你以类似于定义类的方式来定义自己的结构体。在\
    \ JavaScript 中，你可以使用结构体，但无法定义新的结构体。\n\nAndrew Stellman 和 Jennifer Greene 的《Head\
    \ First C#》（O'Reilly）是一本很好的 C#入门书籍，但有经验的程序员可以通过《C# in a Nutshell》系列（同样由 O'Reilly\
    \ 出版）快速上手 C#。特别是 Java 程序员会发现 C#很熟悉（尽管名称如此，C#与 C 或 C++并无关联，除非算上远亲关系）。\n\n## 脚本执行顺序\n\
    \n在结束脚本主题之前，还有一个问题值得提及：指定脚本之间的执行顺序。如果你查看保龄球游戏中用于控制主摄像头的`SmoothFollow`脚本，会发现摄像头位置不是在`Update`回调中更新，而是在`LateUpdate`回调中更新。`LateUpdate`与`Update`一样在每一帧被调用，但一帧中所有的`LateUpdate`调用都在所有`Update`调用完成后进行。`SmoothFollow`在`LateUpdate`中计算摄像头位置，以便考虑其目标在`Update`回调中发生的任何位置变化。\n\
    \n在游戏引擎中同时使用`Update`和`LateUpdate`回调是一种常见技术，但它的作用有限。如果你希望一个游戏对象在另一个游戏对象的`LateUpdate`之后更新怎么办？抱歉，没有`LateLateUpdate`回调！但\
    \ Unity 确实有一个更通用的解决方案，即**脚本执行顺序设置**，可以通过“编辑”菜单的“项目设置”子菜单打开（图 17-4）。\n\n![9781430248750_Fig17-04.jpg](img/9781430248750_Fig17-04.jpg)\n\
    \n**图 17-4. 打开脚本执行顺序设置**\n\n脚本执行顺序设置也可以通过在选择脚本时，单击检查器视图中显示的“执行顺序”按钮来打开。无论哪种方式，脚本执行顺序设置都会在检查器视图中显示为一个\
    \ MonoManager（图 17-5），其列表中最初仅包含一项“默认时间”。\n\n![9781430248750_Fig17-05.jpg](img/9781430248750_Fig17-05.jpg)\n\
    \n**图 17-5. 检查器视图中的脚本执行顺序设置**\n\n由于`SmoothFollow`使用了`LateUpdate`，你无需进行任何更改，但假设你想确保`SmoothFollow`脚本在所有其他脚本之后运行其`Update`回调。你需要点击脚本执行顺序设置右下角的加号（`+`）按钮，并从弹出的菜单中选择`SmoothFollow`脚本。默认情况下，`SmoothFollow`脚本会出现在脚本执行顺序设置中“默认时间”的下方，这意味着`SmoothFollow`将在所有其他脚本之后运行。\n\
    \n然后，你可能决定让游戏控制器脚本`FuguBowl`在除`SmoothFollow`之外的所有其他脚本之后运行（例如，因为它会持续检查保龄球的位置）。那么，再次点击`+`按钮添加`FuguBowl`脚本，然后使用左侧的拖动手柄，将`FuguBowl`拖动到`SmoothFollow`上方但位于“默认时间”下方，最终列表如图\
    \ 17-6 所示。任何拖动到“默认时间”上方的脚本都会在所有其他脚本之前执行。\n\n![9781430248750_Fig17-06.jpg](img/9781430248750_Fig17-06.jpg)\n\
    \n**图 17-6. 指定`FuguBowl.js`和`SmoothFollow.js`的执行顺序**\n\n点击脚本右侧的减号（`-`）按钮，可以将该脚本从脚本执行顺序设置中移除。\n\
    \n## 插件\n\n前面多次提到第三方插件，有些可在资源商店中找到，还有许多来自 Prime31 Studios。但如果你恰好熟悉 C、C++或 Objective-C，你可以编写自己的插件，无论是为了访问更多设备功能，还是为了利用用\
    \ C、C++或 Objective-C 编写的库。除了包含原生库外，插件还需要额外的 Unity 包装脚本。\n[/内容]"
- fmt: '# The process is documented on the “Plugins” page in the “Advanced” section
    of the Unity Manual.


    ## Tracking Apps


    Although iTunes Connect provides download and sales figures (and the graph is
    a lot easier to read than the `.csv` report, which once was the only option),
    there are several third-party products that track app sales and other data like
    app rankings and reviews.


    `App Annie` (`http://appannie.com/`) and `AppFigures` (`http://appfigures.com/`)
    are two of the more popular web-based products that both automatically perform
    daily downloads of app data from iTunes Connect (after you provide them your iTunes
    Connect log-in information during account set up). They both have nice graph presentations
    of the sales data and send daily email summaries of the app statistics. `App Annie`
    is currently free (technically in beta) while `AppFigures` charges a fee.


    [Figure 17-7](#9781430248750_Ch17.xhtml#Fig7) shows an `App Annie` graph of downloads
    over a month for Fugu Bowl. The number of downloads that are updates are overlaid
    over the downloads that are sales. There are spikes in the update line corresponding
    to releases of updates for FuguBowl.


    ![9781430248750_Fig17-07.jpg](images/9781430248750_Fig17-07.jpg)


    [Figure 17-7](#9781430248750_Ch17.xhtml#_Fig7). The `App Annie` sales graph


    `AppViz` (`http://appviz.com/`) is an OS X application that performs the same
    function but downloads the data onto your Mac and features a variety of graphs,
    including sales by geography ([Figure 17-8](#9781430248750_Ch17.xhtml#Fig8)).
    `AppViz` is not free but it doesn’t cost much and I think it’s well worth it.


    ![9781430248750_Fig17-08.jpg](images/9781430248750_Fig17-08.jpg)


    [Figure 17-8](#9781430248750_Ch17.xhtml#_Fig8). The `AppViz` geographic view


    There’s no reason to restrict yourself to just one of these products. I use `AppViz`
    to ensure I have all of my app sales data available locally and I like its variety
    of graphics and the App Store review downloads. I use `AppAnnie` for its automated
    e-mail reports of daily sales figures, rankings display (downloading of all that
    ranking data in `AppViz` takes a long time), and `App Annie` has support for some
    Android app stores. Also, it’s free!


    **Tip** From `AppViz`, you can export all the data you’ve downloaded and then
    import that data into another product like `App Annie`. Since Apple only makes
    a year’s worth of app sales data available on iTunes Connect, this is a way to
    ensure you can always import the entire sales history of an app into a sales tracking
    product.


    ## Promo Codes


    I have described how to download promo codes after an app is approved on the App
    Store, but I didn’t explain what to do with them. There are plenty of options.
    Nearly every app review site accepts promo codes with review requests. `Touch
    Arcade` (`http://toucharcade.com/`) is one of those sites, but it also has a very
    active forum where developers issue promo codes. And `AppGiveaway` (`http://appgiveaway.com/`)
    runs promotions where they hand out promo codes over a set period of time. This
    is a lot more convenient than handing them out yourself, although you should do
    that, too. Keeping an inventory of promo codes is also a good reason to crank
    out app updates, since you get a fresh batch of 50 codes with each update.


    ## More Monetization


    Given the yearly Apple developer fee and Unity license costs (if you decide to
    go with the Pro licenses), chances are you want to at least make that money back.
    Besides iAd and third-party mobile ad services, there are other monetization strategies.


    ### In-App Purchasing


    Apple offers one other revenue channel for iOS besides app sales and iAd: an in-app
    purchasing (IAP) system called `Storekit`. Unity iOS doesn’t have a script interface
    for IAP, but Prime31 Studios includes a `Storekit` plugin among its offerings.


    The Unity Manual has some tips for how you might download and activate additional
    content purchased with IAP, and the iTunes Connect documentation explains how
    to set up in-app purchases.


    ### Asset Store


    I use dozens of free and paid Asset Store packages in my apps, and you will surely
    find the Asset Store useful for your own projects. But the Asset Store is also
    another place to self-publish products and generate revenue (Unity takes a 30%
    cut, same as Apple does on the App Store). And you can release packages free on
    the Asset Store for recognition or as a contribution to the community (I’ve certainly
    taken advantage of that generosity for the examples in this book).


    Conveniently, Asset Store submissions are made from within the Unity Editor, using
    the Asset Store Tools downloaded from, aptly, the Asset Store. You can submit
    any collection of assets from a project—audio, textures, models, scripts, plugins,
    or even the entire project itself.


    **Tip** Use preprocessor directives to ensure there are no compiler errors when
    switching build targets, and add a custom `UNITY_PRO` preprocessor directive if
    you have Unity Pro features, so that Unity Basic users won’t have problems.


    Much of the work in an Asset Store submission, as with an App Store submission,
    involves creating screenshots, icons, app descriptions, and store artwork. The
    instructions for becoming a seller on the Asset Store are available at `http://unity3d.com/asset-store`.


    ## Developing for Android


    Unity Android requires an additional license, with the same Indie and Pro structure
    as for Unity iOS. The good news is that almost everything developed for Unity
    iOS in this book will work fine with Unity Android. Unsurprisingly, anything in
    the `iPhone` class is not available on Android either (e.g., the variable `iPhone.generation`,
    which we used to check the device type), but everything in the `Input` class that
    works for iOS also works the same on Android, including the touchscreen and accelerometer
    functions.


    `Game Center` and iAd are Apple technologies, so those features aren’t available
    on Android, but in the future, the `Social`, `ADBanner`, and `ADInterstialAd`
    classes might support equivalent offerings on Android. Prime31 Studio and other
    vendors offer Unity Android plugins to provide more access to device features
    and mobile services, such as the `AdMob` mobile ad service.


    The build and submission process is different for Android, too. Instead of Xcode,
    Android requires installation of the Android SDK. You can still invoke a Build
    and Run from the Unity Editor, but instead of building an Xcode project for the
    app, Unity Android directly builds the executable app (an `APK` file). And unlike
    iOS development, Android development can be targeted to a number of app stores.
    Google Play in particular has no approval process, so it’s a good avenue to self-publish
    quickly and a useful fallback channel for apps rejected by Apple.


    ## Contract Work


    While working on that next hit app, independent developers often keep the bills
    paid by taking contract work. Prospective clients can be found in the Paid Work
    topic of the Unity forum and on `http://unity3dwork.com/` and even general contractor
    web sites like `http://odesk.com/`. Some marketplaces specialize in mobile app
    development, such as `http://apptank.com/` and `http://theymakeapps.com/`.


    And if you’re looking for full-time game development work, whether it involves
    Unity or not, experience developing games with Unity, not to mention a portfolio
    of self-published games, can only help.


    ## Final Words


    Now I’ve come to the end, and hopefully you’re ready and excited to start making
    your own Unity iOS apps. If there’s one lesson that I hope you can take from this
    book, it’s that you can start with something simple and keep building on it until
    it turns into something interesting. Don’t be one of those people who want to
    start with a massively-multiplayer online (MMO) game as a first project!'
