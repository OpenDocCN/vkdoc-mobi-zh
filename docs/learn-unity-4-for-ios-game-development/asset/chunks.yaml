- fmt: '![9781430248750_Fig14-04.jpg](images/9781430248750_Fig14-04.jpg) [Figure 14-4](#9781430248750_Ch14.xhtml#_Fig4).
    Creating a leaderboard in iTunes Connect


    The Leaderboard Reference Name is the name displayed for the leaderboard within
    iTunes Connect. I like to use an entirely capitalized word for the reference name
    so I can tell immediately it’s not used anywhere else, e.g., as an ID or display
    text in code. The `Leaderboard ID` is the identifier that will be referenced in
    code. It’s convenient to make that a variation of the app ID (but it doesn’t have
    to match exactly), so when you see the `Leaderboard ID`, you can tell immediately
    which app the leaderboard belongs to. This also helps ensure that the ID is unique.


    The next three fields provide information about the scores submitted to the leaderboard.
    Choose `Integer` for the `Score Format Type` (you’ll never have a bowling score
    of 200.5, for example), and specify that the `Sort Order` is High to Low, meaning
    higher scores are better and the leaderboard should display the scores in descending
    order. Finally, indicate the range of possible scores as 0 to 300, so Game Center
    won’t display any score outside that range (for a while, I had HyperBowl submitting
    scores of -1 if the player quit the game prematurely).


    **Add a Language**


    Located below the fields you just filled out is the `Leaderboard Localization`
    section. *Localization* is the process of adapting a program for different regions
    of the world (or *locales*) and largely involves specifying which text should
    be used for the user interface in various languages. You need to add at least
    one language to this listing, so click the `Add Language` button to bring up the
    corresponding form ([Figure 14-5](#9781430248750_Ch14.xhtml#Fig5)).


    ![9781430248750_Fig14-05.jpg](images/9781430248750_Fig14-05.jpg) [Figure 14-5](#9781430248750_Ch14.xhtml#_Fig5).
    Adding localization for a leaderboard in iTunes Connect


    Specify the `Language` for this localization as English and the `Name` of the
    leaderboard in this language as High Scores. This is the name that will appear
    when viewing this leaderboard in the Game Center app or in a standard Game Center
    leaderboard display.


    The `Score Format` specifies how the scores are displayed. Bowling scores never
    exceed 300, so it doesn’t matter whether commas or decimal points separate groups
    of digits. A `Score Format Suffix` isn’t necessary, either, but if you did supply
    one, you might use `Point` as the Singular suffix and `Points` as the Plural.


    For the image, which is displayed with the leaderboard `Name`, you can choose
    the `Icon1024.jpg` file again from the project’s `Textures` folder (like the app
    description icon, iTunes Connect wants a 1024 × 1024 image for Game Center icons).
    Ideally you would have a different icon custom designed for each leaderboard.


    After the settings for this `Language` are saved, the `Language` will be listed
    in the `Localization` section of the page for this leaderboard ([Figure 14-6](#9781430248750_Ch14.xhtml#Fig6)).


    ![9781430248750_Fig14-06.jpg](images/9781430248750_Fig14-06.jpg) [Figure 14-6](#9781430248750_Ch14.xhtml#_Fig6).
    Saved localization for a leaderboard on iTunes Connect


    Now when you return to the Game Center management page for this app, the leaderboard
    will be listed, but you’re not done yet. You have to go back to the app description
    page (return to the `App Information` page for this app and click the `View Details`
    button). Near the bottom of the page, click the `Enable Game Center` button ([Figure
    14-7](#9781430248750_Ch14.xhtml#Fig7)).


    ![9781430248750_Fig14-07.jpg](images/9781430248750_Fig14-07.jpg) [Figure 14-7](#9781430248750_Ch14.xhtml#_Fig7).
    Enabling Game Center in iTunes Connect


    Then click the `Edit` button, which will bring up a dialog box that allows you
    to select any new leaderboards that have been defined for this app ([Figure 14-8](#9781430248750_Ch14.xhtml#Fig8)).


    ![9781430248750_Fig14-08.jpg](images/9781430248750_Fig14-08.jpg) [Figure 14-8](#9781430248750_Ch14.xhtml#_Fig8).
    Enabling leaderboards in iTunes Connect


    Usually, you will want to add all the leaderboards displayed, except for any that
    are intended for future releases.


    **Set Up Achievements**


    Now that you have a leaderboard, it’s time for achievements. The possibilities
    for achievements are plentiful. In HyperBowl, achievements are awarded for rolling
    spares, strikes, consecutive strikes, bowling a perfect game (300 points), even
    an achievement for each lane if the player completes a full game. For Fugu Bowl,
    let’s just define achievements for rolling a spare and rolling a strike, since
    the FuguBowl script already detects those situations.


    The process of adding achievements is similar to that of adding a leaderboard.
    In iTunes Connect, go back to the `Game Center` page for this app ([Figure 14-9](#9781430248750_Ch14.xhtml#Fig9)).


    ![9781430248750_Fig14-09.jpg](images/9781430248750_Fig14-09.jpg) [Figure 14-9](#9781430248750_Ch14.xhtml#_Fig9).
    The Add Achievement section in iTunes Connect


    Beneath the section where you clicked `Add Leaderboard` (where now there is a
    leaderboards list consisting of the leaderboard that was just created), you will
    see the `Achievements` section. Click the `Add Achievement` button to bring up
    the Add Achievements page ([Figure 14-10](#9781430248750_Ch14.xhtml#Fig10)).


    ![9781430248750_Fig14-10.jpg](images/9781430248750_Fig14-10.jpg) [Figure 14-10](#9781430248750_Ch14.xhtml#_Fig10).
    Adding achievement information in iTunes Connect


    Just like a leaderboard, an achievement has a `Reference Name` that is used within
    iTunes Connect and an `ID` that will be referenced from scripts to refer to this
    achievement. Let’s use `FUGUBOWLSPARE` for the reference name and append `.spare`
    to the app ID to form the `Achievement ID` (again, it doesn’t have to be exact—this
    is just a convention).


    Below the name and ID fields, specify a `Point Value`, which is the number of
    points that the Game Center awards to the player once this achievement has been
    completed. Let’s choose 10 points for rolling a spare.


    > **Tip** The total number of points allotted to achievements in this game cannot
    exceed 1000, so it’s a good idea to anticipate all the achievements you plan to
    add to a game and make sure you allocate points to them within that budget.


    Below the `Point Value` field are two Yes or No options. *Hidden* specifies whether
    the achievement can be shown to the player before it has been earned. *Achievable
    more than Once* specifies whether the achievement can be earned multiple times
    (with points awarded each time). If you selected `Yes` for this option, then the
    player would receive ten points for each spare, rather than just ten points for
    just the first time a spare was rolled ([Figure 14-11](#9781430248750_Ch14.xhtml#Fig11)).


    ![9781430248750_Fig14-11.jpg](images/9781430248750_Fig14-11.jpg) [Figure 14-11](#9781430248750_Ch14.xhtml#_Fig11).
    Adding a localization for an achievement in iTunes Connect


    Just like the leaderboard, the achievement needs a `Language` added in the `Localization`
    section. Clicking the `Add Language` button brings up a window where you can specify
    the language (English), `Title` of the achievement (Spare), a `Pre-earned Description`,
    which will be displayed for the achievement before it’s been earned, and an `Earned
    Description`, which is displayed for the achievement after it has been earned
    ([Figure 14-12](#9781430248750_Ch14.xhtml#Fig12)).


    ![9781430248750_Fig14-12.jpg](images/9781430248750_Fig14-12.jpg) [Figure 14-12](#9781430248750_Ch14.xhtml#_Fig12).
    A saved localization for an achievement in iTunes Connect


    Again, for expedience let’s choose the `Icon1024.jpg` image in our project `Textures`
    folder as the achievement icon, but in a polished game you may have a different
    icon for each achievement. When you click `Save`, the new `Language` will be listed
    in the `Achievement Localization` section.'
