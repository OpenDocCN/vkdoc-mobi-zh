    on the Barrel model displays Barrel.FBX, indicating it’s an imported FBX file
    (3D format used by Autodesk).


    Make a Prefab


    We need a Barrel prefab to replace the simple Pin prefab, but we should avoid
    modifying the original Barrel prefab (another import of the Barrel package would
    clobber our changes). To make our own copy of the Barrel prefab, select the prefab,
    press Command+D (or Duplicate from the Edit menu), and drag the copy of the prefab
    into the Prefabs folder. Then rename it to BarrelPin, since it’s a Barrel and
