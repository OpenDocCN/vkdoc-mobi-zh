  trans: '

    ![9781430248750_Fig10-26.jpg](img/9781430248750_Fig10-26.jpg)


    图 10-26. 启动 Unity iOS 项目后的 Xcode


    请注意，`iPad 6.0 Simulator` 显示在 Xcode 窗口的左上角。这是一个用于选择 Xcode 方案（即 Xcode 中构建规则的集合）的菜单。另一个可用的方案是
    `iPhone 6.0 Simulator`（图 10-27）。


    ![9781430248750_Fig10-27.jpg](img/9781430248750_Fig10-27.jpg)


    图 10-27. 选择 iPad 或 iPhone 模拟器


    从 Unity 中执行“生成并运行”操作会自动启动 iOS 模拟器，而不会先给你选择 iPad 或 iPhone 模拟器的机会。现在，让我们继续使用 iPad
    模拟器，并点击 Xcode 窗口左上角的 `Run` 按钮。`Run` 按钮实际上是一个“生成并运行”按钮，因为它会在尝试运行项目之前先编译项目（如果需要）。如果成功，将出现一个匹配
    iPad 屏幕尺寸的 iOS 模拟器窗口，并运行 Angry Bots（图 10-28）。


    ![9781430248750_Fig10-28.jpg](img/9781430248750_Fig10-28.jpg)


    图 10-28. 在 iOS 模拟器中运行 Angry Bots


    iOS 模拟器会将鼠标输入解释为触摸屏事件，因此你可以点击并拖动虚拟操纵杆来进行游戏。此外，iOS 模拟器的“硬件”菜单还可模拟其他设备事件（图 10-29）。


    ![9781430248750_Fig10-29.jpg](img/9781430248750_Fig10-29.jpg)


    图 10-29. iOS 模拟器选项


    例如，`Rotate Left` 和 `Rotate Right` 命令可模拟旋转设备方向（试一下，看看自动旋转的效果），而调用 `Home` 等同于按下设备的
    `Home` 按钮，这会使应用程序挂起或退出，并显示设备的主屏幕。应用程序图标应该会出现在那里，可以点击（模拟点击）以重新启动应用程序。“硬件”菜单还允许你选择不同的设备和
    iOS 版本来进行模拟。


    除了测试之外，iOS 模拟器还可用于截图，通过“工具”菜单中的 `Save Screen Shot` 命令即可（图 10-30）。调用该命令会立即将截图保存到桌面。App
    Store 要求提供应用程序所支持设备的截图，因此，例如，如果你需要 iPad 截图但没有 iPad 设备，iOS 模拟器就是获取该截图的便捷工具。


    ![9781430248750_Fig10-30.jpg](img/9781430248750_Fig10-30.jpg)


    图 10-30. iOS 模拟器中的 `Save Screen Shot` 命令


    iOS 模拟器窗口没有可操作的关闭按钮，但可以通过“iOS 模拟器”菜单中的 `Quit iOS Simulator` 命令或其键盘快捷键 `Command+Q`
    来退出模拟器（图 10-31）。


    ![9781430248750_Fig10-31.jpg](img/9781430248750_Fig10-31.jpg)


    图 10-31. 退出 iOS 模拟器


    iOS 模拟器在模拟 iOS 功能方面相当完整，包括 iAd 和 Game Center。所以，即使你没有可用于测试的 iOS 设备，仅使用 iOS 模拟器，你也仍然可以完成本书剩余的大部分内容。


    ## 进一步探索


    你可能会有似曾相识的感觉，因为我们最初使用 Angry Bots 演示作为第一个项目，现在又回到了这里。区别当然在于，现在我们是在为 iOS 构建项目。我们已经迈出了最初的几步：将构建目标更改为
    iOS，在 Unity 编辑器中配合 Unity Remote 进行测试，然后使用 Xcode 进行构建以在 iOS 模拟器中运行。下一步，构建项目以在真实的
    iOS 设备上运行，将在下一章中进行，之后我们将回到我们的常规编程——保龄球游戏。到那时，希望你能够熟悉构建流程，并专注于将游戏打造成一款 iOS 游戏！


    ### Unity 手册


    由于讨论又回到了 Angry Bots，因此 Unity 手册中第一个相关的部分自然是“Unity 基础”部分，特别是关于“发布构建”的页面。


    Unity 手册还包含几个专门关于 Unity iOS 的部分，尽管你可能需要点击手册顶部的 iPhone 图标才能使这些内容可见。“iOS 开发入门”部分在撰写本文时可能有些过时，但其关于“Unity
    Remote”的页面对于解释如何设置和操作该应用程序仍然很有用。


    关于 Unity iOS 的更多近期文档列在 Unity 手册的“高级”部分，包括关于“Unity Xcode 项目结构”的页面。熟悉生成的 Xcode 项目中的文件是个好主意，但除了在第
    16 章中启用内置性能分析器之外，你无需修改 Unity 生成的 Xcode 文件。


    ### 参考手册


    让 Angry Bots 能够成功构建的大部分工作在于，在“播放器设置”中填写适当的值。本章提供了 iOS 特定设置的简要概述，并且只有“默认方向”和“设备
    SDK”设置对于在 iOS 模拟器中运行至关重要，但“参考手册”中的“播放器设置”页面详述了各个跨平台和 iOS 特定的播放器设置，以及其他平台的设置。


    ### iOS 开发者库


    Xcode 的下载链接和文档可在 Apple 开发者网站的 Xcode 页面（`http://developer.apple.com/xcode`）上找到。使用
    Unity 进行 iOS 开发的一大优势是，你可以避免需要了解很多关于 Xcode 和 Objective-C 的知识。尽管如此，熟悉 Xcode 的操作并理解
    Objective-C 代码仍然会有所帮助。


    除了在其“帮助”菜单中可以找到的 Xcode 文档外，Xcode 网站 `http://developer.apple.com/xcode` 也提供了指向开发者文档的链接。在
    Xcode 主题下还有许多其他文章，其中许多也可以在 Xcode 的“帮助”菜单中找到，包括 Xcode 用户指南和 Xcode 基础帮助。


    iOS 开发者库将 Xcode 列在“主题”下，Xcode 主题中大部分相关的“IDE”部分都可以在 iOS 模拟器用户指南中找到。该指南内容详尽，包含多个章节，扩展了本书中关于
    iOS 模拟器的介绍，解释了如何从 Xcode 启动模拟器、如何操作模拟器以及如何调用模拟的设备输入。


    尽管 Unity 做了大量工作让你无需在 Xcode 中操作，并且在本章中你实际上只需点击 Xcode 中的 `Run` 按钮即可运行 iOS 模拟器，但还是建议你提前阅读一下该工具的相关资料，为下一章做好准备。在下一章中，你将学习如何构建并运行应用程序以进行测试，以及如何构建以提交到
    App Store。


    ## 第 11 章


    为真实设备构建：设备测试与应用程序提交


    运行 Angry Bots 的 iOS 版本竟然出奇地简单。只需将构建目标切换为 iOS，然后立即在编辑器中使用 Unity Remote 应用程序作为输入设备来玩游戏；或者，要在
    iOS 模拟器中运行该游戏，只需在“播放器设置”中将目标 SDK 设置为模拟器 SDK 并进行构建即可。

    '
- fmt: 'That might seem too easy to be the end of it, and it is. The next step is
    the painful part, building the Unity project so that it installs and runs on real
    iOS hardware. The Unity part of this procedure is easy, nearly identical to building
    a project to run on the iOS Simulator. But to install an app on a test device
    requires that the app be built with a mobile provisioning profile that is also
    installed in Xcode and on the test device. Before that, the profile has to be
    created in Apple’s Provisioning Portal using a development certificate associated
    with the test device and the app’s bundle ID. So before that, the test device
    and bundle ID have to be registered on the Provisioning Portal, and the development
    certificate has to be generated after creating a certificate request.


    And that’s just for testing. A similar process is required when building apps
    for submission to the App Store, but with a separate distribution provisioning
    profile and corresponding certificate. Furthermore, submitting an app to the App
    Store also requires adding the app to iTunes Connect, a separate web site for
    managing apps on the App Store.


    If dealing with provisioning profiles sounds like a hassle, you may be tempted
    to skip this chapter and return later. And in fact, the iOS adaptation of our
    bowling game in the next couple of chapters can be tested with the Unity Remote
    (for the input code in Chapter 13) and iOS Simulator (the icon, splash screen,
    and screen size set in Chapter 12), as we did with Angry Bots in the previous
    chapter. Plus, access to the Provisioning Portal and iTunes Connect, and the associated
    nonpublic documentation, requires membership in the iOS Developer Program, so
    if you haven’t acquired that yet, then you’ll have to wait anyway.


    But you will need an iOS Developer membership to set up Game Center leaderboards
    and achievements (which I will cover in Chapter 14) and an iAd banner and interstitial
    ads (which I will cover in Chapter 15), and the performance measurement (which
    I cover in Chapter 16) won’t be very interesting without it being able to run
    on real hardware. So at the very least, it’s best to get the iOS Developer registration
    process started as soon as possible!


    ## Register as an iOS Developer


    As you might expect, the Apple Developer web site (`http://developer.apple.com/`)
    is the place to find most of the official Apple developer resources (iTunes Connect
    is an exception), including all of the Apple developer programs—the Mac Developer
    Program, the Safari Developer Program, and the one we’re interested in, the iOS
    Developer Program. You can register in the iOS Developer Program as an individual
    or a company. Registering as an individual is fairly straightforward, as long
    as you have a credit card and are prepared to pay the $99 yearly fee. Signing
    up as a company requires the same, but it also requires an actual legal company
    entity and supporting information about the company, including a DUNS (Data Universal
    Numbering System) number, which is a unique identifier assigned to a company by
    Dun & Bradstreet. Both individual and company accounts have to be approved by
    Apple, but approval for company accounts can take longer than individual accounts
    (the approval for my company, Technicat, LLC, took three months).


    The only additional feature for company accounts is the ability for the account
    administrator to add team members, so in this book we’ll assume we’re working
    with an individual account or, equivalently, as the administrator of a company
    account.


    Once you’ve been approved as an iOS developer, you’ll have login access to the
    Apple developer site and also iTunes Connect (`http://itunesconnect.apple.com/`)
    using your Apple ID. iTunes Connect is the site where you manage all your apps
    that are on or being prepared for the App Store.


    But before working in iTunes Connect, we’ll be logging in to the Apple developer
    site and working in the Provisioning Portal to create development and distribution
    provisioning profiles, which are required for test and distribution builds, respectively.


    ## The Provisioning Portal


    Assuming you have an iOS Developer Membership (if not, you can skip this chapter
    and return later), log in to `http://developer.apple.com/` and enter the Provisioning
    Portal.


    **Note** The Apple developer site has several areas that you can log in to—the
    Member Center, iOS Dev Center, and Developer Forums—and you can reach the Provisioning
    Portal from either the Member Center or iOS Dev Center (at this time, the organization
    is a bit confusing).


    Detailed documentation is available on the site once you log in (the Provisioning
    Portal is one area where Apple doesn’t have much in the way of public screen-to-screen
    documentation), but I’ll briefly outline the steps that are involved and the information
    you need to provide.


    ### Register Test Devices


    A development provisioning profile is valid only for a specified set of test devices,
    so the first thing to do is register in the Provisioning Portal the iOS devices
    you want to use for testing. You will need to supply the unique device identifier
    (UDID) for each device. The UDID of a device can be found with iTunes or Xcode.
    In iTunes, when an iOS device is connected to your Mac, the UDID can be found
    by clicking the serial number of the device, which switches the serial number
    display to a UDID display. But that display cannot be copied and pasted, so a
    better option is to obtain the number from Xcode.


    When an iOS device is connected to your Mac, the UDID will show up in the Xcode
    Organizer window. To bring up the Organizer window in Xcode, launch Xcode if it’s
    not running already, then select Organizer from the Window menu (Figure 11-1).


    ![9781430248750_Fig11-01.jpg](images/9781430248750_Fig11-01.jpg)


    Figure 11-1. Bringing up the Organizer from the Xcode Window menu


    Once the Organizer window is up, all connected iOS devices should be listed in
    the left panel. Select the device you want to register for testing, and the device
    information, including the UDID, listed as the Identifier, will be displayed (Figure
    11-2).


    ![9781430248750_Fig11-02.jpg](images/9781430248750_Fig11-02.jpg)


    Figure 11-2. Obtaining a device ID from the Xcode Organizer


    You can then copy and paste the UDID into the Provisioning Portal to register
    your test device.


    ### Register App Identifiers


    Once you’ve registered your test devices, you need to register app identifiers,
    because each provisioning profile is only valid for a single app ID. An app ID
    corresponds to a bundle ID (the same one specified in the Unity Player Settings
    for your app) or matches many bundle IDs when it ends with an asterisk (then it’s
    called a wildcard app ID). For example, I registered an app ID `com.technicat.*`
    that I can use in a single provisioning profile for all my apps, such as `com.technicat.fugubowl`
    and `com.technicat.hyperbowl`.


    **Tip** Create a wildcard app ID that matches all or most of your bundle IDs,
    so you don’t have to create a new app ID for every bundle ID.


    ### Development Provisioning Profiles


    To create a development provisioning profile, you need to generate a development
    certificate that is associated with the profile. The Provisioning Portal has instructions
    on how to generate and upload a certificate request, which will in turn result
    in a new development certificate. Then you can create a development provisioning
    profile associated with that certificate.'
  raw: 'That might seem too easy to be the end of it, and it is. The next step is
    the painful part, building the Unity project so that it installs and runs on real
    iOS hardware. The Unity part of this procedure is easy, nearly identical to building
    a project to run on the iOS Simulator. But to install an app on a test device
    requires that the app be built with a mobile provisioning profile that is also
    installed in Xcode and on the test device. Before that, the profile has to be
    created in Apple’s Provisioning Portal using a development certificate associated
    with the test device and the app’s bundle ID. So before that, the test device
    and bundle ID have to be registered on the Provisioning Portal, and the development
    certificate has to be generated after creating a certificate request.


    And that’s just for testing. A similar process is required when building apps
    for submission to the App Store, but with a separate distribution provisioning
    profile and corresponding certificate. Furthermore, submitting an app to the App
    Store also requires adding the app to iTunes Connect, a separate web site for
    managing apps on the App Store.


    If dealing with provisioning profiles sounds like a hassle, you may be tempted
    to skip this chapter and return later. And in fact, the iOS adaptation of our
    bowling game in the next couple of chapters can be tested with the Unity Remote
    (for the input code in [Chapter 13](#9781430248750_Ch13.xhtml)) and iOS Simulator
    (the icon, splash screen, and screen size set in [Chapter 12](#9781430248750_Ch12.xhtml)),
    as we did with Angry Bots in the previous chapter. Plus, access to the Provisioning
    Portal and iTunes Connect, and the associated nonpublic documentation, requires
    membership in the iOS Developer Program, so if you haven’t acquired that yet,
    then you’ll have to wait anyway.


    But you will need an iOS Developer membership to set up Game Center leaderboards
    and achievements (which I will cover in [Chapter 14](#9781430248750_Ch14.xhtml))
    and an iAd banner and interstitial ads (which I will cover in [Chapter 15](#9781430248750_Ch15.xhtml)),
    and the performance measurement (which I cover in [Chapter 16](#9781430248750_Ch16.xhtml))
    won’t be very interesting without it being able to run on real hardware. So at
    the very least, it’s best to get the iOS Developer registration process started
    as soon as possible!


    Register as an iOS Developer


    As you might expect, the Apple Developer web site (`http://developer.apple.com/`)  is
    the place to find most of the official Apple developer resources (iTunes Connect
    is an exception), including all of the Apple developer programs—the Mac Developer
    Program, the Safari Developer Program, and the one we’re interested in, the iOS
    Developer Program.You can register in the iOS Developer Program as an individual
    or a company. Registering as an individual is fairly straightforward, as long
    as you have a credit card and are prepared to pay the $99 yearly fee. Signing
    up as a company requires the same, but it also requires an actual legal company
    entity and supporting information about the company, including a DUNS (Data Universal
    Numbering System) number, which is a unique identifier assigned to a company by
    Dun & Bradstreet. Both individual and company accounts have to be approved by
    Apple, but approval for company accounts can take longer than individual accounts
    (the approval for my company, Technicat, LLC, took three months).


    The only additional feature for company accounts is the ability for the account
    administrator to add team members, so in this book we’ll assume we’re working
    with an individual account or, equivalently, as the administrator of a company
    account.


    Once you’ve been approved as an iOS developer, you’ll have login access to the
    Apple developer site and and also iTunes Connect (`http://itunesconnect.apple.com/`)
    using your Apple ID. ITunes Connect is the site where you manage all your apps
    that are on or being prepared for the App Store.


    But before working in iTunes Connect, we’ll be logging in to the Apple developer
    site and working in the Provisioning Portal to create development and distribution
    provisioning profiles, which are required for test and distribution builds, respectively.


    The Provisioning Portal


    Assuming you have an iOS Developer Membership (if not, you can skip this chapter
    and return later), log in to `http://developer.apple.com/` and enter the Provisioning
    Portal.


    **Note**   The Apple developer site has several areas that you can log in to—the
    Member Center, iOS Dev Center, and Developer Forums—and you can reach the Provisioning
    Portal from either the Member Center or iOS Dev Center (at this time, the organization
    is a bit confusing).


    Detailed documentation is available on the site once you log in (the Provisioning
    Portal is one area where Apple doesn’t have much in the way of public screen-to-screen
    documentation), but I’ll briefly outline the steps that are involved and the information
    you need to provide.


    Register Test Devices


    A development provisioning profile is valid only for a specified set of test devices,
    so the first thing to do is register in the Provisioning Portal the iOS devices
    you want to use for testing. You will need to supply the unique device identifier
    (UDID) for each device. The UDID of a device can be found with iTunes or Xcode.
    In iTunes, when an iOS device is connected to your Mac, the UDID can be found
    by clicking the serial number of the device, which switches the serial number
    display to a UDID display. But that display cannot be copied and pasted, so a
    better option is to obtain the number from Xcode.


    When an iOS device is connected to your Mac, the UDID will show up in the Xcode
    Organizer window. To bring up the Organizer window in Xcode, launch Xcode if it’s
    not running already, then select Organizer from the Window menu ([Figure 11-1](#9781430248750_Ch11.xhtml#Fig1)).


    ![9781430248750_Fig11-01.jpg](images/9781430248750_Fig11-01.jpg)


    [Figure 11-1](#9781430248750_Ch11.xhtml#_Fig1). Bringing up the Organizer from
    the Xcode Window menu


    Once the Organizer window is up, all connected iOS devices should be listed in
    the left panel. Select the device you want to register for testing, and the device
    information, including the UDID, listed as the Identifier, will be displayed ([Figure
    11-2](#9781430248750_Ch11.xhtml#Fig2)).


    ![9781430248750_Fig11-02.jpg](images/9781430248750_Fig11-02.jpg)


    [Figure 11-2](#9781430248750_Ch11.xhtml#_Fig2). Obtaining a device ID from the
    Xcode Organizer


    You can then copy and paste the UDID into the Provisioning Portal to register
    your test device.


    Register App Identifiers


    Once you’ve registered your test devices, you need to register app identifiers,
    because each provisioning profile is only valid for a single app ID. An app ID
    corresponds to a bundle ID (the same one specified in the Unity Player Settings
    for your app) or matches many bundle IDs when it ends with an asterisk (then it’s
    called a *wildcard app ID*). For example, I registered an app ID com.technicat.*
    that I can use in a single provisioning profile for all my apps, such as `com.technicat.fugubowl`
    and `com.technicat.hyperbowl`.


    **Tip**   Create a wildcard app ID that matches all or most of your bundle IDs,
    so you don’t have to create a new app ID for every bundle ID.


    Development Provisioning Profiles


    To create a development provisioning profile, you need to generate a development
    certificate that is associated with the profile. The Provisioning Portal has instructions
    on how to generate and upload a certificate request, which will in turn result
    in a new development certificate. Then you can create a development provisioning
    profile associated with that certificate.'
  trans: '

    这看起来可能太简单了，以至于让人觉得不可能仅此而已，但事实确实如此。接下来的步骤才是令人头疼的部分：构建 Unity 项目，使其能够安装并在真实的 iOS
    硬件上运行。本流程中 Unity 的部分很简单，几乎与构建一个在 iOS 模拟器上运行的项目完全相同。但是，要将应用程序安装到测试设备上，需要使用移动设备预置描述文件来构建应用，该描述文件也必须安装在
    Xcode 和测试设备中。在此之前，必须使用与测试设备及应用包标识符相关联的开发证书，在苹果的预置门户中创建该描述文件。因此，在此之前，测试设备和包标识符必须在预置门户中注册，并且在创建证书签名请求之后生成开发证书。


    而这一切还仅仅是为了测试。在构建用于提交到 App Store 的应用时，也需要类似的流程，但使用的是独立的发布预置描述文件和相应的证书。此外，向 App
    Store 提交应用还需要将应用添加到 iTunes Connect，这是一个用于在 App Store 上管理应用的独立网站。


    如果处理预置描述文件听起来很麻烦，你可能会想跳过本章，稍后再回来看。事实上，我们保龄球游戏在接下来几章中的 iOS 适配，可以使用 Unity Remote（用于第
    13 章的输入代码）和 iOS 模拟器（第 12 章中设置的图标、启动画面和屏幕尺寸）进行测试，就像我们在上一章中对 Angry Bots 所做的那样。此外，访问预置门户和
    iTunes Connect 以及相关的非公开文档，需要成为 iOS 开发者计划的成员，所以如果你还没有获得该资格，那么无论如何你都得等待。


    但是，你需要 iOS 开发者会员资格才能设置 Game Center 排行榜和成就（我将在第 14 章中介绍），以及 iAd 横幅广告和插页式广告（我将在第
    15 章中介绍），而性能测量（我在第 16 章中介绍）如果不能在实际硬件上运行，也会变得索然无味。所以，至少，最好尽快开始 iOS 开发者注册流程！


    ## 注册成为 iOS 开发者


    正如你所料，苹果开发者网站 (`http://developer.apple.com/`) 是查找大多数官方苹果开发者资源（iTunes Connect 是个例外）的地方，包括所有苹果开发者计划——Mac
    开发者计划、Safari 开发者计划，以及我们感兴趣的 iOS 开发者计划。你可以以个人或公司身份注册 iOS 开发者计划。只要你有一张信用卡并准备好支付每年
    99 美元的费用，以个人身份注册就相当直接。以公司身份注册也需要这些，但它还需要一个实际的法律公司实体以及关于公司的支持信息，包括一个 DUNS（数据通用编号系统）号码，这是一个由邓白氏公司分配给公司的唯一标识符。个人和公司账户都必须经过苹果公司批准，但公司账户的批准时间可能比个人账户长（我的公司
    Technicat, LLC 的批准花了三个月）。


    公司账户唯一额外的功能是账户管理员可以添加团队成员，因此在本书中，我们将假设我们使用的是个人账户，或者等效地，作为公司账户的管理员。


    一旦你被批准成为 iOS 开发者，你就可以使用你的 Apple ID 登录访问苹果开发者网站以及 iTunes Connect (`http://itunesconnect.apple.com/`)。iTunes
    Connect 是管理你在 App Store 上或准备上架的所有应用的网站。


    但在 iTunes Connect 中工作之前，我们将登录苹果开发者网站，并在预置门户中工作，以创建开发和发布预置描述文件，这些文件分别用于测试和发布构建。


    ## 预置门户


    假设你拥有 iOS 开发者会员资格（如果没有，你可以跳过本章，稍后再回来），登录 `http://developer.apple.com/` 并进入预置门户。


    **注意** 苹果开发者网站有几个你可以登录的区域——会员中心、iOS 开发中心和开发者论坛——你可以从会员中心或 iOS 开发中心进入预置门户（目前，这种组织方式有点令人困惑）。


    一旦你登录，网站上会有详细的文档（预置门户是苹果没有太多公开的屏幕截图式文档的地方之一），但我会简要概述涉及的步骤以及你需要提供的信息。


    ### 注册测试设备


    开发预置描述文件仅对指定的测试设备集有效，因此首先要做的是在预置门户中注册你想要用于测试的 iOS 设备。你需要提供每台设备的唯一设备标识符（UDID）。设备的
    UDID 可以通过 iTunes 或 Xcode 找到。在 iTunes 中，当 iOS 设备连接到你的 Mac 时，可以通过点击设备的序列号来找到 UDID，点击会将序列号显示切换为
    UDID 显示。但该显示无法复制粘贴，因此更好的选择是从 Xcode 中获取该号码。


    当 iOS 设备连接到你的 Mac 时，UDID 会显示在 Xcode 管理器窗口中。要调出 Xcode 的管理器窗口，如果 Xcode 尚未运行，请启动它，然后从窗口菜单中选择管理器（图
    11-1）。


    ![9781430248750_Fig11-01.jpg](img/9781430248750_Fig11-01.jpg)


    图 11-1. 从 Xcode 窗口菜单调出管理器


    管理器窗口弹出后，所有已连接的 iOS 设备都应列在左侧面板中。选择你想要注册用于测试的设备，设备信息（包括 UDID，列为标识符）将显示出来（图 11-2）。


    ![9781430248750_Fig11-02.jpg](img/9781430248750_Fig11-02.jpg)


    图 11-2. 从 Xcode 管理器获取设备 ID


    然后，你可以将 UDID 复制并粘贴到预置门户中，以注册你的测试设备。


    ### 注册应用标识符


    注册完测试设备后，你需要注册应用标识符，因为每个预置描述文件仅对一个应用 ID 有效。应用 ID 对应一个包标识符（与你在 Unity 播放器设置中为应用指定的标识符相同），或者当它以星号结尾时匹配许多包标识符（这时它被称为通配符应用
    ID）。例如，我注册了一个应用 ID `com.technicat.*`，我可以在一个预置描述文件中将其用于我所有的应用，例如 `com.technicat.fugubowl`
    和 `com.technicat.hyperbowl`。


    **提示** 创建一个匹配你全部或大部分包标识符的通配符应用 ID，这样你就不必为每个包标识符都创建一个新的应用 ID。


    ### 开发预置描述文件


    要创建开发预置描述文件，你需要生成一个与该描述文件关联的开发证书。预置门户中有关于如何生成和上传证书签名请求的说明，这将最终生成一个新的开发证书。然后，你可以创建一个与该证书关联的开发预置描述文件。

