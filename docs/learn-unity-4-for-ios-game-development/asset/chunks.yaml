- fmt: "Both the original and iOS versions of `HyperBowl` are portrait-mode games\
    \ (and it turns out that portrait mode is best for the swipe-to-roll control that\
    \ will be implemented in the next chapter), so let’s restrict this game to portrait\
    \ mode (and portrait upside down, because that kind of symmetry is required on\
    \ the iPad).\n\nTherefore, set the `Orientation` property in the Player Settings\
    \ to `Auto Rotation`, with only the `Portrait` and `Portrait Upside Down` options\
    \ selected ([Figure 12-3](#9781430248750_Ch12.xhtml#Fig3)).\n\n![9781430248750_Fig12-03.jpg](images/9781430248750_Fig12-03.jpg)\n\
    \n[Figure 12-3](#9781430248750_Ch12.xhtml#_Fig3). The Resolution and Presentation\
    \ settings for Fugu Bowl\n\n## Scale the GUI\n\nWe now have enough set up to build\
    \ and run, and the initial screen of our game looks fine, if we run it on a low-resolution\
    \ iOS device (i.e., the iPhone 3GS), which has a 320 × 480 pixel screen. But on\
    \ any of the newer devices, all of which have at least double the screen resolution,\
    \ the pause menu looks really small, to the point where it’s difficult to read\
    \ or even tap an individual button. For example, [Figure 12-4](#9781430248750_Ch12.xhtml#Fig4)\
    \ shows the pause menu on the 640 × 960 screen of an iPhone 4.\n\n![9781430248750_Fig12-04.jpg](images/9781430248750_Fig12-04.jpg)\n\
    \n[Figure 12-4](#9781430248750_Ch12.xhtml#_Fig4). The pause menu looking tiny\
    \ on a high-resolution screen\n\nTo scale the GUI, you first need to figure out\
    \ the scaling factor you want to use, which is the current screen width divided\
    \ by the screen width you were originally targeting. The GUI looks alright on\
    \ the iPhone 3GS, at 320 × 480 pixels, so let’s say the base screen width we’re\
    \ targeting is 320. So if we’re actually running on an iPhone 4, for example,\
    \ at 640 × 960 pixels, we’ll have to scale up the GUI by a factor of two.\n\n\
    The next step is to apply the scaling factor. This can be done in UnityGUI by\
    \ setting the static variable `GUI.matrix`, which is a *transformation matrix*.\
    \ In computer graphics, a transformation matrix encompasses and applies a translation\
    \ (change of position), rotation, and scale.\n\nIn fact, the local position, rotation\
    \ and scale of a `Transform` Component corresponds to a 4 × 4 transformation matrix\
    \ for that `GameObject`. And the world position, rotation and scale are calculated\
    \ by combining (multiplying) all the transformation matrices of a `GameObject`’s\
    \ parent `GameObject`s. In the good old days, you had to include this linear algebra\
    \ code when programming in computer graphics. Now you can let the game engine\
    \ hide this from you, but you’re getting a little taste of it here.\n\n## Scale\
    \ the Scoreboard\n\nLet’s start with the scoreboard, because that’s a little bit\
    \ simpler, by making the modifications shown in [Listing 12-1](#9781430248750_Ch12.xhtml#list1)\
    \ to the `FuguBowlScoreboard` script. The addition is a variable named `baseScreenWidth`\
    \ that specify the base screen width, defaulting to the 320-pixel width of the\
    \ iPhone 3GS. The variable is public, so you have the option of adjusting it in\
    \ the Inspector View.\n\nThen, at the beginning of the `OnGUI` function, so it\
    \ takes effect before any GUI rendering takes place, two lines of code construct\
    \ the scaling matrix and assign it to `GUI.matrix`.\n\n[Listing 12-1](#9781430248750_Ch12.xhtml#_list1).  Scaling\
    \ Added to the FuguBowlScoreboard.js Script\n\n```\nvar baseScreenWidth:float\
    \ = 320.0;\n\nfunction OnGUI() {\n#if UNITY_IPHONE\n        var guiScale:float\
    \ = Screen.width/baseScreenWidth;\n        GUI.matrix = Matrix4x4.TRS (Vector3.zero,\
    \ Quaternion.identity, Vector3(guiScale, guiScale, 1));\n#endif\n```\n\nThe new\
    \ code is only intended for iOS (although it would work on any platform), so new\
    \ lines of code are wrapped between `#if UNITY_IPHONE` and `#endif`. `UNITY_IPHONE`\
    \ is a built-in preprocessor definition that is only defined when the build target\
    \ is iOS (you can also use `UNITY_IOS`). The end result is that the additional\
    \ code only turns into executing code for iOS and essentially disappears if you’re\
    \ building to any other target (we don’t do that for `baseScreenWidth` because\
    \ we don’t want to lose its Inspector View setting if the build target is changed).\n\
    \nOf the two lines of real code, the first calculates how much you need to scale\
    \ the GUI, based on `Screen.width`, the current screen width, and `baseScreenWidth`,\
    \ the screen width the GUI is coded to render on. The result is assigned to a\
    \ local variable `guiScale`.\n\nYou might have wondered why we declared `baseScreenWidth`\
    \ as a `float` instead of an `int`. Well, this is why: `Screen.width` is an `int`,\
    \ and if you divide an `int` by an `int`, then the compiler assumes you want the\
    \ result as an `int`, which works out okay if, for example, you’re dividing 640\
    \ (iPhone 4) by 320 and end up with 2. But if you’re running on an iPad 2, then\
    \ you would be dividing 768 by 320, and the result will round down to 2, which\
    \ is wrong in this case. But as long as one number in the operation is a `float`,\
    \ then the compiler will treat the whole thing as a floating point computation.\n\
    \n**Caution**   Watch out for operations where you’re supplying `int`s as inputs\
    \ and expecting `float` results. It’s a common source of errors.\n\nThe result\
    \ is passed to a call to `Matrix4x4.TRS`, which constructs a 4x4 matrix with a\
    \ translation, rotation and scale. The translation is `Vector3.zero` (x, y, and\
    \ z are 0), `Quaternion.identity` (the identity quaternion represents no rotation),\
    \ and a `Vector3` representing the scale. The scale factor based on the screen\
    \ size is applied in the x and y directions, and the z-axis is left unscaled since\
    \ that’s the direction pointing into the screen.\n\n## Scale the Pause Menu\n\n\
    Scaling the pause menu is almost exactly the same process. Let’s add the same\
    \ `baseScreenWidth` public variable and the same code to set `GUI.matrix` in the\
    \ beginning of the `OnGUI` function in the `FuguPause` script ([Listing 12-2](#9781430248750_Ch12.xhtml#list2)).\n\
    \n[Listing 12-2](#9781430248750_Ch12.xhtml#_list2).  Scaling the Pause Menu in\
    \ FuguPause.js\n\n```\nvar baseScreenWidth:float = 320.0;\n\nfunction OnGUI ()\
    \ {\n        if (IsGamePaused()) {\n                 #if UNITY_IPHONE\n      \
    \           var guiScale:float = Screen.width/baseScreenWidth;\n             \
    \    GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,\
    \ guiScale, 1));\n                 #endif\n                 if (skin != null)\
    \ {\n                         GUI.skin = skin;\n                 } else {\n  \
    \                       GUI.color = hudColor;\n                 }\n          \
    \       switch (currentPage) {\n                         case Page.Main: ShowPauseMenu();\
    \ break;\n                         case Page.Options: ShowOptions(); break;\n\
    \                         case Page.Credits: ShowCredits(); break;\n         \
    \        }\n        }\n}\n```\n\nHowever, one more alteration is required. The\
    \ `BeginPage` function centers the GUI using `Screen.width`, so you need to use\
    \ `baseScreenWidth` instead. [Listing 12-3](#9781430248750_Ch12.xhtml#list3) shows\
    \ this code change.\n\n[Listing 12-3](#9781430248750_Ch12.xhtml#_list3).  Modified\
    \ BeginPage Function to Work with Scaled GUI\n\n```\nfunction BeginPage(width:int,height:int)\
    \ {\n#if !UNITY_IPHONE\n         GUILayout.BeginArea(Rect((screenWidth-width)/2,menutop,width,height));\n\
    #else\n         GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));\n\
    #endif\n}\n```"
  raw: 'Both the original and iOS versions of HyperBowl are portrait-mode games (and
    it turns out that portrait mode is best for the swipe-to-roll control that will
    be implemented in the next chapter), so let’s restrict this game to portrait mode
    (and portrait upside down, because that kind of symmetry is required on the iPad).


    Therefore, set the Orientation property in the Player Settings to Auto Rotation,
    with only the Portrait and Portrait Upside Down options selected ([Figure 12-3](#9781430248750_Ch12.xhtml#Fig3)).


    ![9781430248750_Fig12-03.jpg](images/9781430248750_Fig12-03.jpg)


    [Figure 12-3](#9781430248750_Ch12.xhtml#_Fig3). The Resolution and Presentation
    settings for Fugu Bowl


    Scale the GUI


    We now have enough set up to build and run, and the initial screen of our game
    looks fine, if we run it on a low-resolution iOS device (i.e., the iPhone 3GS),
    which has a 320 × 480 pixel screen. But on any of the newer devices, all of which
    have at least double the screen resolution, the pause menu looks really small,
    to the point where it’s difficult to read or even tap an individual button. For
    example, [Figure 12-4](#9781430248750_Ch12.xhtml#Fig4) shows the pause menu on
    the 640 × 960 screen of an iPhone 4.


    ![9781430248750_Fig12-04.jpg](images/9781430248750_Fig12-04.jpg)


    [Figure 12-4](#9781430248750_Ch12.xhtml#_Fig4). The pause menu looking tiny on
    a high-resolution screen


    To scale the GUI, you first need to figure out the scaling factor you want to
    use, which is the current screen width divided by the screen width you were originally
    targeting. The GUI looks alright on the iPhone 3GS, at 320 × 480 pixels, so let’s
    say the base screen width we’re targeting is 320\. So if we’re actually running
    on an iPhone 4, for example, at 640 × 960 pixels, we’ll have to scale up the GUI
    by a factor of two.


    The next step is to apply the scaling factor. This can be done in UnityGUI by
    setting the static variable `GUI.matrix`, which is a *transformation matrix.*
    In computer graphics, a transformation matrix encompasses and applies a translation
    (change of position), rotation, and scale.


    In fact, the local position, rotation and scale of a Transform Component corresponds
    to a 4 × 4 transformation matrix for that GameObject. And the world position,
    rotation and scale are calculated by combining (multiplying) all the transformation
    matrices of a GameObject’s parent GameObjects. In the good old days, you had to
    include this linear algebra code when programming in computer graphics. Now you
    can let the game engine hide this from you, but you’re getting a little taste
    of it here.


    Scale the Scoreboard


    Let’s start with the scoreboard, because that’s a little bit simpler, by making
    the modifications shown in [Listing 12-1](#9781430248750_Ch12.xhtml#list1) to
    the `FuguBowlScoreboard` script. The addition is a variable named `baseScreenWidth`
    that specify the base screen width, defaulting to the 320-pixel width of the iPhone
    3GS. The variable is public, so you have the option of adjusting it in the Inspector
    View.


    Then, at the beginning of the `OnGUI` function, so it takes effect before any
    GUI rendering takes place, two lines of code construct the scaling matrix and
    assign it to `GUI.matrix`.


    [Listing 12-1](#9781430248750_Ch12.xhtml#_list1).  Scaling Added to the FuguBowlScoreboard.js
    Script


    ```

    var baseScreenWidth:float = 320.0;


    function OnGUI() {

    #if UNITY_IPHONE

            var guiScale:float = Screen.width/baseScreenWidth;

            GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,
    guiScale, 1));

    #endif

    ```


    The new code is only intended for iOS (although it would work on any platform),
    so new lines of code are wrapped between `#if UNITY_IPHONE` and `#endif`. `UNITY_IPHONE`
    is a built-in preprocessor definition that is only defined when the build target
    is iOS (you can also use `UNITY_IOS`). The end result is that the additional code
    only turns into executing code for iOS and essentially disappears if you’re building
    to any other target (we don’t do that for `baseScreenWidth` because we don’t want
    to lose its Inspector View setting if the build target is changed).


    Of the two lines of real code, the first calculates how much you need to scale
    the GUI, based on `Screen.width`, the current screen width, and `baseScreenWidth`,
    the screen width the GUI is coded to render on. The result is assigned to a local
    variable `guiScale`.


    You might have wondered why we declared `baseScreenWidth` as a `float` instead
    of an `int`. Well, this is why: `Screen.width` is an `int`, and if you divide
    an `int` by an `int`, then the compiler assumes you want the result as an `int`,
    which works out okay if, for example, you’re dividing 640 (iPhone 4) by 320 and
    end up with 2\. But if you’re running on an iPad 2, then you would be dividing
    768 by 320, and the result will round down to 2, which is wrong in this case.
    But as long as one number in the operation is a `float`, then the compiler will
    treat the whole thing as a floating point computation.


    **Caution**   Watch out for operations where you’re supplying ints as inputs and
    expecting float results. It’s a common source of errors.


    The result is passed to a call to `Matrix4x4.TRS`, which constructs a 4x4 matrix
    with a translation, rotation and scale. The translation is `Vector3.zero` (x,
    y, and z are 0), `Quaternion.identity` (the identity quaternion represents no
    rotation), and a `Vector3` representing the scale. The scale factor based on the
    screen size is applied in the x and y directions, and the z-axis is left unscaled
    since that’s the direction pointing into the screen.


    Scale the Pause Menu


    Scaling the pause menu is almost exactly the same process. Let’s add the same
    `baseScreenWidth` public variable and the same code to set `GUI.matrix` in the
    beginning of the `OnGUI` function in the FuguPause script ([Listing 12-2](#9781430248750_Ch12.xhtml#list2)).


    [Listing 12-2](#9781430248750_Ch12.xhtml#_list2).  Scaling the Pause Menu in FuguPause.js


    ```

    var baseScreenWidth:float = 320.0;


    function OnGUI () {

            if (IsGamePaused()) {

                     #if UNITY_IPHONE

                     var guiScale:float = Screen.width/baseScreenWidth;

                     GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity,
    Vector3(guiScale, guiScale, 1));

                     #endif

                     if (skin != null) {

                             GUI.skin = skin;

                     } else {

                             GUI.color = hudColor;

                     }

                     switch (currentPage) {

                             case Page.Main: ShowPauseMenu(); break;

                             case Page.Options: ShowOptions(); break;

                             case Page.Credits: ShowCredits(); break;

                     }

            }

    }

    ```


    However, one more alteration is required. The `BeginPage` function centers the
    GUI using `Screen.width`, so you need to use `baseScreenWidth` instead. [Listing
    12-3](#9781430248750_Ch12.xhtml#list3) shows this code change.


    [Listing 12-3](#9781430248750_Ch12.xhtml#_list3).  Modified BeginPage Function
    to Work with Scaled GUI


    ```

    function BeginPage(width:int,height:int) {

    #if !UNITY_IPHONE

             GUILayout.BeginArea(Rect((screenWidth-width)/2,menutop,width,height));

    #else

             GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));

    #endif

    }

    ```'
  trans: "\n`HyperBowl`的原始版本和 iOS 版本都是竖屏游戏（事实也证明竖屏模式最适合实现下一章中介绍的滑动滚球控制），因此我们将该游戏限制为竖屏模式（以及倒置竖屏模式，因为\
    \ iPad 需要这种对称性）。\n\n因此，需要在玩家设置中将`Orientation`属性设为`Auto Rotation`，并且仅选中`Portrait`和`Portrait\
    \ Upside Down`选项（图 12-3）。\n\n![9781430248750_Fig12-03.jpg](img/9781430248750_Fig12-03.jpg)\n\
    \n图 12-3. Fugu Bowl 的分辨率和呈现设置\n\n## 缩放 GUI\n\n现在我们已准备就绪，可以构建并运行了。如果在低分辨率 iOS 设备（即\
    \ iPhone 3GS，屏幕为 320×480 像素）上运行，游戏的初始屏幕看起来还不错。但在任何新款设备上（屏幕分辨率至少是原来的两倍），暂停菜单会显得非常小，小到难以阅读甚至难以点击单个按钮。例如，图\
    \ 12-4 显示了在 iPhone 4 的 640×960 屏幕上暂停菜单的样子。\n\n![9781430248750_Fig12-04.jpg](img/9781430248750_Fig12-04.jpg)\n\
    \n图 12-4. 暂停菜单在高分辨率屏幕上显得很小\n\n要缩放 GUI，首先需要确定要使用的缩放因子，即当前屏幕宽度除以你最初目标屏幕宽度。GUI 在\
    \ 320×480 像素的 iPhone 3GS 上看起来没问题，因此我们假设目标基础屏幕宽度为 320。所以，如果我们实际运行在 iPhone 4 上（例如\
    \ 640×960 像素），就需要将 GUI 放大两倍。\n\n下一步是应用缩放因子。这在 UnityGUI 中可以通过设置静态变量`GUI.matrix`来实现，该变量是一个*变换矩阵*。在计算机图形学中，变换矩阵包含并应用了平移（位置变化）、旋转和缩放。\n\
    \n实际上，`Transform`组件的局部位置、旋转和缩放对应的是该`GameObject`的一个 4×4 变换矩阵。而世界位置、旋转和缩放则是通过组合（相乘）一个`GameObject`的所有父`GameObject`的变换矩阵计算得出的。在过去，你在计算机图形编程中需要自行编写这些线性代数代码。现在你可以让游戏引擎帮你隐藏这些细节，但这里你将略窥门径。\n\
    \n## 缩放记分板\n\n我们从记分板开始，因为这部分相对简单一些，只需对`FuguBowlScoreboard`脚本进行代码清单 12-1 所示的修改。新增了一个名为`baseScreenWidth`的变量，用于指定基础屏幕宽度，默认为\
    \ iPhone 3GS 的 320 像素宽度。该变量是公开的，因此你可以在检视面板中调整它。\n\n然后，在`OnGUI`函数的开头（这样它就会在任何 GUI\
    \ 渲染之前生效），用两行代码构建缩放矩阵并将其赋值给`GUI.matrix`。\n\n代码清单 12-1.  FuguBowlScoreboard.js\
    \ 脚本中添加了缩放功能\n\n```\nvar baseScreenWidth:float = 320.0;\n\nfunction OnGUI() {\n\
    #if UNITY_IPHONE\n        var guiScale:float = Screen.width/baseScreenWidth;\n\
    \        GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity, Vector3(guiScale,\
    \ guiScale, 1));\n#endif\n```\n\n新代码仅适用于 iOS（尽管它在任何平台上都能工作），因此新代码行被包裹在`#if UNITY_IPHONE`和`#endif`之间。`UNITY_IPHONE`是一个内置预处理器定义，仅当构建目标为\
    \ iOS 时才会被定义（你也可以使用`UNITY_IOS`）。最终结果是，额外的代码仅在 iOS 中变为可执行代码，如果你构建到其他目标平台，这些代码基本上会消失（我们没有对`baseScreenWidth`这样做，因为即使构建目标改变，我们也不想丢失其在检视面板中的设置）。\n\
    \n在这两行实际代码中，第一行根据`Screen.width`（当前屏幕宽度）和`baseScreenWidth`（GUI 编码时预设的渲染屏幕宽度）计算需要缩放\
    \ GUI 的比例。结果赋给局部变量`guiScale`。\n\n你可能想知道为什么我们将`baseScreenWidth`声明为`float`而不是`int`。原因如下：`Screen.width`是一个`int`，如果你用`int`除以`int`，编译器会假设你想要一个`int`结果。例如，将\
    \ 640（iPhone 4）除以 320 得到 2，这样没问题。但如果你在 iPad 2 上运行，需要将 768 除以 320，结果会向下取整为 2，这在某些情况下就错了。但只要运算中的其中一个数字是`float`，编译器就会将整个运算视为浮点计算。\n\
    \n**注意**  在进行运算时，如果你提供的是`int`输入却期望得到`float`结果，请务必小心。这是一个常见的错误来源。\n\n计算结果传递给`Matrix4x4.TRS`调用，该函数会构建一个包含平移、旋转和缩放的\
    \ 4x4 矩阵。平移量为`Vector3.zero`（x、y 和 z 均为 0），旋转量为`Quaternion.identity`（单位四元数表示无旋转），缩放量由一个`Vector3`表示。基于屏幕尺寸的缩放因子应用于\
    \ x 和 y 方向，z 轴保持未缩放状态，因为该方向指向屏幕内部。\n\n## 缩放暂停菜单\n\n缩放暂停菜单的过程几乎完全相同。让我们在`FuguPause`脚本的`OnGUI`函数开头添加相同的`baseScreenWidth`公共变量和设置`GUI.matrix`的代码（代码清单\
    \ 12-2）。\n\n代码清单 12-2.  FuguPause.js 中缩放暂停菜单\n\n```\nvar baseScreenWidth:float\
    \ = 320.0;\n\nfunction OnGUI () {\n        if (IsGamePaused()) {\n           \
    \      #if UNITY_IPHONE\n                 var guiScale:float = Screen.width/baseScreenWidth;\n\
    \                 GUI.matrix = Matrix4x4.TRS (Vector3.zero, Quaternion.identity,\
    \ Vector3(guiScale, guiScale, 1));\n                 #endif\n                \
    \ if (skin != null) {\n                         GUI.skin = skin;\n           \
    \      } else {\n                         GUI.color = hudColor;\n            \
    \     }\n                 switch (currentPage) {\n                         case\
    \ Page.Main: ShowPauseMenu(); break;\n                         case Page.Options:\
    \ ShowOptions(); break;\n                         case Page.Credits: ShowCredits();\
    \ break;\n                 }\n        }\n}\n```\n\n不过，还需要做一处修改。`BeginPage`函数使用`Screen.width`来居中\
    \ GUI，因此你需要改用`baseScreenWidth`。代码清单 12-3 展示了此项代码更改。\n\n代码清单 12-3.  修改后的 BeginPage\
    \ 函数，使其与缩放后的 GUI 配合工作\n\n```\nfunction BeginPage(width:int,height:int) {\n#if\
    \ !UNITY_IPHONE\n         GUILayout.BeginArea(Rect((screenWidth-width)/2,menutop,width,height));\n\
    #else\n         GUILayout.BeginArea(Rect((baseScreenWidth-width)/2,menutop,width,height));\n\
    #endif\n}\n```\n"
- fmt: "注意到我们使用了`#if !UNITY_IPHONE`。感叹号表示“非”，因此第一行实际代码适用于除iOS以外的任何构建目标，而另一行仅适用于iOS。我们也可以颠倒两行代码的顺序，并以`#if\
    \ UNITY_IPHONE`开头。\n\n在此过程中，我们还应该从暂停菜单中移除“退出”按钮，因为苹果会拒绝任何带有退出选项的应用。`FuguPause`脚本的`ShowPauseMenu`函数中的“退出”按钮已通过检查`UNITY_WEBPLAYER`预处理定义，从Unity\
    \ Web播放器构建中排除，因此我们只需添加对`UNITY_IPHONE`的检查即可（[清单12-4](#9781430248750_Ch12.xhtml#list4)）。\n\
    \n*[清单12-4](#9781430248750_Ch12.xhtml#_list4). 从`FuguPause.js`的iOS构建中排除“退出”按钮*\n\
    \n```\nfunction ShowPauseMenu() {\n        BeginPage(150,300);\n        if (GUILayout.Button\
    \ (\"Play\")) {\n                 UnPauseGame();\n        }\n        if (GUILayout.Button\
    \ (\"Options\")) {\n                 currentPage = Page.Options;\n        }\n\
    \        if (GUILayout.Button (\"Credits\")) {\n                 currentPage =\
    \ Page.Credits;\n        }\n#if !UNITY_IPHONE && !UNITY_WEBPLAYER\n        if\
    \ (GUILayout.Button (\"Quit\")) {\n                 Application.Quit();\n    \
    \    }\n#endif\n        EndPage();\n}\n```\n\n“退出”按钮仅在构建时包含在`#if !UNITY_IPHONE\
    \ && !UNITY_WEBPLAYER`中，当构建目标不是iOS*且*不是Web播放器时，该条件为真。现在构建游戏时，你应该能看到暂停菜单在设备（或iOS模拟器）上运行，并根据屏幕分辨率缩放，并且缺少“退出”按钮，如[图12-5](#9781430248750_Ch12.xhtml#Fig5)中的iPhone\
    \ 4截图所示。\n\n![9781430248750_Fig12-05.jpg](images/9781430248750_Fig12-05.jpg)\n\
    \n[图12-5](#9781430248750_Ch12.xhtml#_Fig5). 缩放后的暂停菜单\n\n## 设置图标\n\n默认情况下，你的应用图标将是Unity徽标。[图12-6](#9781430248750_Ch12.xhtml#Fig6)展示了Unity\
    \ Technologies在App Store上发布的几个演示应用的图标。除了`Angry Bots`，其他应用都使用默认的Unity图标，尽管是旧版本的图标，因为它们是使用Unity\
    \ 3构建的（在撰写本文时尚未更新）。\n\n![9781430248750_Fig12-06.jpg](images/9781430248750_Fig12-06.jpg)\n\
    \n[图12-6](#9781430248750_Ch12.xhtml#_Fig6). 带有默认Unity图标的应用\n\n[图12-6](#9781430248750_Ch12.xhtml#Fig6)也展示了如果我们现在构建`Fugu\
    \ Bowl`应用的图标。它看起来略有不同，因为它是用Unity 4发布的，并且还带有苹果自动应用的光泽，因为我们没有在iOS Player Settings中选择`Prerendered\
    \ Icon`。\n\n要自定义图标，你可以将任何纹理拖拽到Player Settings的`Default Icon`字段中。让我们使用`Textures`文件夹中的`Icon1024`纹理，该纹理从本章的项目`http://learnunity4.com/`复制而来。我经常在文件名中指明原始纹理尺寸（在本例中为1024x1024纹理），这样可以节省分配图标和启动屏幕纹理的大量时间。\n\
    \n由于你将纹理用作图标，因此应适当调整导入设置。\n\n在Project View中选择`Icon1024`纹理，然后在Inspector视图中，将`Texture\
    \ Type`设置为`GUI`而不是`Texture`（[图12-7](#9781430248750_Ch12.xhtml#Fig7)）。这将防止Unity应用适用于3D模型纹理但不适用于GUI显示的设置。例如，用于模型的纹理的尺寸应为2的幂次方，如256\
    \ × 256或512 × 512，因为图形硬件喜欢以这种方式工作，并且纹理无论如何都会围绕模型拉伸。但通常，GUI纹理应保持其原始分辨率，因为它们通常根据预期的显示尺寸调整（通常不是2的幂次方分辨率）。你可以将`Texture\
    \ Type`切换到`Advanced`来比较`Texture`和`GUI`预设纹理类型的基础设置，即选择`Texture`然后切换到`Advanced`，然后选择`GUI`再切换到`Advanced`。在`Advanced`模式下，你可以覆盖任何预设值，以便更精细地控制导入设置。\n\
    \n![9781430248750_Fig12-07.jpg](images/9781430248750_Fig12-07.jpg)\n\n[图12-7](#9781430248750_Ch12.xhtml#_Fig7).\
    \ 图标纹理的导入设置\n\n**提示** 如果你要将纹理用于两个不同的目的，请复制它，以便为每个目的应用不同的导入设置。\n\n在`Texture Type`区域下方，指定了纹理的最大尺寸和压缩级别。如果使用了压缩纹理作为图标，Unity将在构建时生成警告，正确指出压缩纹理作为图标可能看起来不好。因此，选择`Default`标签，以便这些设置适用于所有平台（除非被覆盖），将`Max\
    \ Size`设置为`1024`以避免缩放纹理，并将`Format`设置为`TrueColor`以获得全彩色分辨率且无压缩。点击`Apply`以调整后的设置重新导入纹理，底部的`Preview`将反映新的格式、尺寸和内存使用情况。\n\
    \n现在将图标纹理拖拽到Player Settings中`Cross Platform`区域的`Default Icon`字段。检查iOS Settings的`Icon`折叠区域（[图12-8](#9781430248750_Ch12.xhtml#Fig8)）。只要未选中`Override\
    \ for iPhone`复选框，`Default Icon`的自动缩放版本将出现在所有其他图标尺寸中（[图12-8](#9781430248750_Ch12.xhtml#Fig8)）。\n\
    \n![9781430248750_Fig12-08.jpg](images/9781430248750_Fig12-08.jpg)\n\n[图12-8](#9781430248750_Ch12.xhtml#_Fig8).\
    \ Player Settings中`Default Icon`缩放为不同图标尺寸\n\n各种图标尺寸对应于不同iOS设备的屏幕分辨率：\n\n- 57 ×\
    \ 57：第四代之前的任何iPhone或iPod touch（iPhone 3GS或第三代iPod touch）\n- 114 × 114：第四代及之后的iPod\
    \ touch和iPhone\n- 72 × 72：原始iPad、iPad 2和iPad Mini\n- 144 × 144：“新”iPad（或我喜欢称之为iPad\
    \ 3）\n\n理想情况下，应为每种尺寸定制一个图标，在这种情况下，你需要勾选`Override`复选框，然后将图标的各个版本拖拽到相应的框中。任何未填充的框将使用`Default\
    \ Icon`。但Unity在缩小纹理方面做得很好（缩小远优于放大），因此我经常重复使用我上传到iTunes Connect应用描述的同一1024 × 1024纹理。\n\
    \n**提示** 如果你未对iTunes Connect和Player Settings使用相同的图标文件，请确保各种图标至少彼此相似。我曾因应用在iTunes\
    \ Connect上的图标与设备上显示的应用图标不相似而被拒绝。\n\n我建议你始终选择`Prerendered Icon`选项，以避免苹果自动添加光泽。\n\
    \n除了可选的光泽外，从Xcode执行的构建部分还会自动圆角化图标并添加投影。所以不要自己处理这些！保持图标方形、尖角且无特殊边框。"
  raw: 'Notice how we used `#if !UNITY_IPHONE`. The exclamation mark means *not*,
    so the first line of real code exists for any built target except iOS and the
    other line is just for iOS. We could have flipped the order of the two lines of
    code and started with `#if UNITY_IPHONE`.


    While we’re at it, we should remove the Quit button from the pause menu, as Apple
    rejects any app with a quit option. The Quit button in the ShowPauseMenu function
    of the `FuguPause` script is already excluded from Unity webplayer builds by checking
    the `UNITY_WEBPLAYER` preprocessor definition, so we can just add a check for
    `UNITY_IPHONE` ([Listing 12-4](#9781430248750_Ch12.xhtml#list4)).


    *[Listing 12-4](#9781430248750_Ch12.xhtml#_list4).  Excluded Quit Button from
    the iOS Build of FuguPause.js*


    ```

    function ShowPauseMenu() {

            BeginPage(150,300);

            if (GUILayout.Button ("Play")) {

                     UnPauseGame();

            }

            if (GUILayout.Button ("Options")) {

                     currentPage = Page.Options;

            }

            if (GUILayout.Button ("Credits")) {

                     currentPage = Page.Credits;

            }

    #if !UNITY_IPHONE && !UNITY_WEBPLAYER

            if (GUILayout.Button ("Quit")) {

                     Application.Quit();

            }

    #endif

            EndPage();

    }

    ```


    The Quit button is only included in the build #if !`UNITY_IPHONE && !UNITY_WEBPLAYER`,
    which is true when the build target is not iOS *and* not a webplayer. When you
    build the game now, you should see the pause menu running on a device (or the
    iOS Simulator) scaled up with the screen resolution and missing the Quit button,
    like the iPhone 4 screenshot in [Figure 12-5](#9781430248750_Ch12.xhtml#Fig5).


    ![9781430248750_Fig12-05.jpg](images/9781430248750_Fig12-05.jpg)


    [Figure 12-5](#9781430248750_Ch12.xhtml#_Fig5). The scaled pause menu


    Set the Icon


    By default, the icon for your app will be the Unity logo. [Figure 12-6](#9781430248750_Ch12.xhtml#Fig6)
    shows the icons for several demo apps published by Unity Technologies on the App
    Store. Aside from Angry Bots, they all have the default Unity icon, albeit an
    older one because they were built with Unity 3 (and at the time of this writing
    haven’t been updated).


    ![9781430248750_Fig12-06.jpg](images/9781430248750_Fig12-06.jpg)


    [Figure 12-6](#9781430248750_Ch12.xhtml#_Fig6). Apps with the default Unity icons


    [Figure 12-6](#9781430248750_Ch12.xhtml#Fig6) also shows the icon for our Fugu
    Bowl app if we were to build it right now. It looks a bit different because it’s
    published with Unity 4 and also has the gloss that is automatically applied by
    Apple, since we didn’t select Prerendered Icon in the iOS Player Settings.


    To customize the icon, you can drag any texture into the Default Icon field of
    the Player Settings. Let’s use the Icon1024 texture in the Textures folder, copied
    from the project for this chapter at `http://learnunity4.com/`. I often indicate
    the original texture size in the file name (a 1024x1024 texture in this case),
    which saves a lot of time in assigning icon and splash screen textures.


    Since you’re using the texture as an icon, you should adjust the import settings
    appropriately.


    Select the Icon1024 texture in the Project View, and then in the Inspector view,
    set the Texture Type to GUI instead of Texture ([Figure 12-7](#9781430248750_Ch12.xhtml#Fig7)).
    This will prevent Unity from applying settings that are suitable for textures
    with 3D models but not for GUI display. For example, textures used with models
    should have dimensions that are powers of 2, such as 256 × 256 or 512 × 512, because
    that’s what graphics hardware likes to operates with, and the textures are stretched
    around models, anyway. But, generally, GUI textures should stay at their original
    resolution, since they’re usually sized according to their intended display (which
    is usually not at a power of 2 resolution).You can switch the Texture Type to
    Advanced to compare the underlying settings of the Texture and GUI preset texture
    types, i.e., select Texture then switch to Advanced, then select GUI and switch
    to Advanced. And within Advanced, you can override any of the preset values for
    more control over the import settings.


    ![9781430248750_Fig12-07.jpg](images/9781430248750_Fig12-07.jpg)


    [Figure 12-7](#9781430248750_Ch12.xhtml#_Fig7). The import settings for the icon
    texture


    **Tip**   If you’re going to use a texture for two different purposes, duplicate
    it so you can apply different import settings for each.


    Below the Texture Type area is where texture maximum size and compression level
    is specified. Unity will generate a warning at build time if you have used a compressed
    texture as an icon, pointing out correctly that compressed textures may not look
    good as icons. So select the Default tab so these settings apply to all platforms
    unless overridden, set the Max Size as 1024 to avoid scaling the texture, and
    set Format to TrueColor for full color resolution and no compression. Click Apply
    to reimport the texture with the adjusted settings, and the Preview at the bottom
    will reflect the new format, size, and memory usage.


    Now drag the icon texture into the Default Icon field of the Player Settings in
    the Cross Platform area. Examine the Icon foldout of the iOS Settings ([Figure
    12-8](#9781430248750_Ch12.xhtml#Fig8)). As long as the Override for iPhone check
    box is not selected, automatically scaled versions of the Default Icon will appear
    for all the other icon sizes ([Figure 12-8](#9781430248750_Ch12.xhtml#Fig8)).


    ![9781430248750_Fig12-08.jpg](images/9781430248750_Fig12-08.jpg)


    [Figure 12-8](#9781430248750_Ch12.xhtml#_Fig8). The Default Icon scaled to different
    icon sizes in the Player Settings


    The various icon sizes correspond to the screen resolutions of the various iOS
    devices:


    *   57 × 57: Any iPhone or iPod touch preceding the fourth generation (the iPhone
    3GS or the third-generation iPod touch)

    *   114 × 114: Fourth generation and later iPod touch and iPhone

    *   72 × 72: The original iPad, iPad 2, and iPad Mini

    *   144 × 144: The “new” iPad (or as I like to call it, the iPad 3)


    Ideally, there would be an icon tailored for each size, in which case you would
    check mark the Override box, and then drag the various versions of your icon to
    each appropriate box. Any box that you leave unfilled with use the Default Icon.
    But Unity does a good job of scaling textures down (it is far preferable to scale
    down then up), so I often reuse the same 1024 × 1024 texture that I upload for
    the iTunes Connect app description.


    **Tip**   If you don’t use the same icon file for iTunes Connect and the Player
    Settings, make sure the various icons at least resemble each other. I’ve had an
    app rejected because its icon iTunes Connect did not resemble the app icon as
    displayed on a device.


    I recommend you always select the Prerendered Icon option to avoid the gloss that
    otherwise would be automatically added by Apple.


    Besides the optional shine, the portion of the build executed from Xcode also
    automatically rounds the corners of the icon and adds a drop shadow. So don’t
    do that yourself! Just keep it square with sharp corners and no special borders.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将根据您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n注意到我们使用了`#if !UNITY_IPHONE`。感叹号表示“非”，因此第一行实际代码适用于除\
    \ iOS 以外的任何构建目标，而另一行仅适用于 iOS。我们也可以颠倒两行代码的顺序，并以`#if UNITY_IPHONE`开头。\n\n在此过程中，我们还应该从暂停菜单中移除“退出”按钮，因为苹果会拒绝任何带有退出选项的应用。`FuguPause`脚本的`ShowPauseMenu`函数中的“退出”按钮已通过检查`UNITY_WEBPLAYER`预处理定义，从\
    \ Unity Web 播放器构建中排除，因此我们只需添加对`UNITY_IPHONE`的检查即可（清单 12-4）。\n\n*清单 12-4. 从`FuguPause.js`的\
    \ iOS 构建中排除“退出”按钮*\n\n```\nfunction ShowPauseMenu() {\n        BeginPage(150,300);\n\
    \        if (GUILayout.Button (\"Play\")) {\n                 UnPauseGame();\n\
    \        }\n        if (GUILayout.Button (\"Options\")) {\n                 currentPage\
    \ = Page.Options;\n        }\n        if (GUILayout.Button (\"Credits\")) {\n\
    \                 currentPage = Page.Credits;\n        }\n#if !UNITY_IPHONE &&\
    \ !UNITY_WEBPLAYER\n        if (GUILayout.Button (\"Quit\")) {\n             \
    \    Application.Quit();\n        }\n#endif\n        EndPage();\n}\n```\n\n“退出”按钮仅在构建时包含在`#if\
    \ !UNITY_IPHONE && !UNITY_WEBPLAYER`中，当构建目标不是 iOS*且*不是 Web 播放器时，该条件为真。现在构建游戏时，你应该能看到暂停菜单在设备（或\
    \ iOS 模拟器）上运行，并根据屏幕分辨率缩放，并且缺少“退出”按钮，如图 12-5 中的 iPhone 4 截图所示。\n\n![9781430248750_Fig12-05.jpg](img/9781430248750_Fig12-05.jpg)\n\
    \n图 12-5. 缩放后的暂停菜单\n\n## 设置图标\n\n默认情况下，你的应用图标将是 Unity 徽标。图 12-6 展示了 Unity Technologies\
    \ 在 App Store 上发布的几个演示应用的图标。除了`Angry Bots`，其他应用都使用默认的 Unity 图标，尽管是旧版本的图标，因为它们是使用\
    \ Unity 3 构建的（在撰写本文时尚未更新）。\n\n![9781430248750_Fig12-06.jpg](img/9781430248750_Fig12-06.jpg)\n\
    \n图 12-6. 带有默认 Unity 图标的应用\n\n图 12-6 也展示了如果我们现在构建`Fugu Bowl`应用的图标。它看起来略有不同，因为它是用\
    \ Unity 4 发布的，并且还带有苹果自动应用的光泽，因为我们没有在 iOS Player Settings 中选择`Prerendered Icon`。\n\
    \n要自定义图标，你可以将任何纹理拖拽到 Player Settings 的`Default Icon`字段中。让我们使用`Textures`文件夹中的`Icon1024`纹理，该纹理从本章的项目`http://learnunity4.com/`复制而来。我经常在文件名中指明原始纹理尺寸（在本例中为\
    \ 1024x1024 纹理），这样可以节省分配图标和启动屏幕纹理的大量时间。\n\n由于你将纹理用作图标，因此应适当调整导入设置。\n\n在 Project\
    \ View 中选择`Icon1024`纹理，然后在 Inspector 视图中，将`Texture Type`设置为`GUI`而不是`Texture`（图\
    \ 12-7）。这将防止 Unity 应用适用于 3D 模型纹理但不适用于 GUI 显示的设置。例如，用于模型的纹理的尺寸应为 2 的幂次方，如 256 ×\
    \ 256 或 512 × 512，因为图形硬件喜欢以这种方式工作，并且纹理无论如何都会围绕模型拉伸。但通常，GUI 纹理应保持其原始分辨率，因为它们通常根据预期的显示尺寸调整（通常不是\
    \ 2 的幂次方分辨率）。你可以将`Texture Type`切换到`Advanced`来比较`Texture`和`GUI`预设纹理类型的基础设置，即选择`Texture`然后切换到`Advanced`，然后选择`GUI`再切换到`Advanced`。在`Advanced`模式下，你可以覆盖任何预设值，以便更精细地控制导入设置。\n\
    \n![9781430248750_Fig12-07.jpg](img/9781430248750_Fig12-07.jpg)\n\n图 12-7. 图标纹理的导入设置\n\
    \n**提示** 如果你要将纹理用于两个不同的目的，请复制它，以便为每个目的应用不同的导入设置。\n\n在`Texture Type`区域下方，指定了纹理的最大尺寸和压缩级别。如果使用了压缩纹理作为图标，Unity\
    \ 将在构建时生成警告，正确指出压缩纹理作为图标可能看起来不好。因此，选择`Default`标签，以便这些设置适用于所有平台（除非被覆盖），将`Max Size`设置为`1024`以避免缩放纹理，并将`Format`设置为`TrueColor`以获得全彩色分辨率且无压缩。点击`Apply`以调整后的设置重新导入纹理，底部的`Preview`将反映新的格式、尺寸和内存使用情况。\n\
    \n现在将图标纹理拖拽到 Player Settings 中`Cross Platform`区域的`Default Icon`字段。检查 iOS Settings\
    \ 的`Icon`折叠区域（图 12-8）。只要未选中`Override for iPhone`复选框，`Default Icon`的自动缩放版本将出现在所有其他图标尺寸中（图\
    \ 12-8）。\n\n![9781430248750_Fig12-08.jpg](img/9781430248750_Fig12-08.jpg)\n\n\
    图 12-8. Player Settings 中`Default Icon`缩放为不同图标尺寸\n\n各种图标尺寸对应于不同 iOS 设备的屏幕分辨率：\n\
    \n- 57 × 57：第四代之前的任何 iPhone 或 iPod touch（iPhone 3GS 或第三代 iPod touch）\n- 114 ×\
    \ 114：第四代及之后的 iPod touch 和 iPhone\n- 72 × 72：原始 iPad、iPad 2 和 iPad Mini\n- 144\
    \ × 144：“新”iPad（或我喜欢称之为 iPad 3）\n\n理想情况下，应为每种尺寸定制一个图标，在这种情况下，你需要勾选`Override`复选框，然后将图标的各个版本拖拽到相应的框中。任何未填充的框将使用`Default\
    \ Icon`。但 Unity 在缩小纹理方面做得很好（缩小远优于放大），因此我经常重复使用我上传到 iTunes Connect 应用描述的同一 1024\
    \ × 1024 纹理。\n\n**提示** 如果你未对 iTunes Connect 和 Player Settings 使用相同的图标文件，请确保各种图标至少彼此相似。我曾因应用在\
    \ iTunes Connect 上的图标与设备上显示的应用图标不相似而被拒绝。\n\n我建议你始终选择`Prerendered Icon`选项，以避免苹果自动添加光泽。\n\
    \n除了可选的光泽外，从 Xcode 执行的构建部分还会自动圆角化图标并添加投影。所以不要自己处理这些！保持图标方形、尖角且无特殊边框。\n"
- fmt: "# Set the Splash Screen (Pro)\n\nAll iOS apps display a static “splash” screen\
    \ on startup. Like the default app icon, the default splash screen in a Unity-built\
    \ app shows the Unity logo ([Figure 12-9](#9781430248750_Ch12.xhtml#Fig9)).\n\n\
    ![9781430248750_Fig12-09.jpg](images/9781430248750_Fig12-09.jpg)\n\n*[Figure 12-9](#9781430248750_Ch12.xhtml#_Fig9).\
    \ The default Unity splash screen*\n\nIf you’re using Unity iOS Basic, you’re\
    \ stuck with the default splash screen. But if you’re using Unity iOS Pro, you\
    \ can supply your own splash screen in a manner similar to the way you customized\
    \ the app icon.\n\nThe Splash Image foldout is located beneath the Icon foldout\
    \ in the iOS Settings, and, as with the icon selection, it has slots for multiple\
    \ resolutions appropriate for the various iOS screens and also for both portrait\
    \ and landscape orientations ([Figure 12-10](#9781430248750_Ch12.xhtml#Fig10)):\n\
    \n* *Mobile splash screen*: 320 × 480 for any iPod touch or iPhone preceding the\
    \ fourth generation (i.e., the iPhone 4)\n* *iPhone 3.5”/Retina*: 640 × 960 for\
    \ the Retina display of the iPhone 4, iPhone 4S, and fourth generation iPod touches\n\
    * *iPhone 4”/Retina*: 640 × 1136 for the iPhone 5 and fifth-generation iPod touch\n\
    * *iPad Portrait*: 768 × 1024 for the original iPad and the iPad 2\n* *iPad Landscape*:\
    \ 1004 × 768 for the original iPad and the iPad 2\n* *High-Res. iPad Portrait*:\
    \ For the Retina display of the new iPad (the iPad 3)\n* *High-Res. iPad Landscape*:\
    \ For the Retina display of the new iPad (the iPad 3)\n\n![9781430248750_Fig12-10.jpg](images/9781430248750_Fig12-10.jpg)\n\
    \n*[Figure 12-10](#9781430248750_Ch12.xhtml#_Fig10). Splash screens for different\
    \ screen resolutions and orientations*\n\nThere is no single default splash screen\
    \ that Unity will automatically resize for all the splash resolutions, so you\
    \ have to populate the splash screen boxes for the resolutions and orientations\
    \ that your game will use. Since only Portrait and Portrait Upside Down orientations\
    \ (along with Auto Rotation) are selected in the Resolution and Presentation settings,\
    \ only the portrait splash screens need to be assigned. Like icons, the splash\
    \ screens can be any textures, and Unity will scale them as needed, but you’ll\
    \ get the best results with textures that are already the target size. You’ll\
    \ want to use something appropriate for your company and game.\n\n**Note:** Apple\
    \ recommends that the splash screen resemble an actual screen of your game, but\
    \ it’s typical to just present a company logo. Personally, I think it’s confusing\
    \ to have a screen that acts like an unresponsive game screen.\n\nDrag each splash\
    \ screen texture from the Textures folder into the matching Splash screen box\
    \ in the Player Settings ([Figure 12-10](#9781430248750_Ch12.xhtml#Fig10)): `Fugu320x480`\
    \ into Mobile Splash Screen, `Fugu640x960` into iPhone 3.5”/Retina, and `Fugu1536x2048`\
    \ into High Res. iPad Portrait. The iPhone 4”/Retina needs a texture, so drag\
    \ the closest match, `Fugu640x960` into it. And `Fugu1536x2048` can be used for\
    \ iPad Portrait.\n\n## A Second Splash Screen\n\nAlthough you can’t change the\
    \ splash screen in Unity iOS Basic, you can make a splash screen that appears\
    \ right after the built-in one. You just need to make a scene that displays the\
    \ splash texture on the screen for a few seconds and then loads the first game\
    \ scene. This can also be useful with Unity iOS Pro if you want to have more than\
    \ one splash screen. For example, in HyperBowl I have some HyperBowl artwork displayed\
    \ by the built-in splash screen and then my Fugu Games logo in the second splash\
    \ screen.\n\n### Create the Splash Scene\n\nInvoke the `New Scene` command from\
    \ the File menu to create a new empty scene. Save it as `Splash`. Bring up the\
    \ Build Settings window and click `Add Current` to add the new scene to your build.\
    \ It will appear at the bottom of the list of scenes, so drag it up to the top.\
    \ Its scene index should now display as 0, meaning it’s the first scene loaded\
    \ ([Figure 12-11](#9781430248750_Ch12.xhtml#Fig11)).\n\n![9781430248750_Fig12-11.jpg](images/9781430248750_Fig12-11.jpg)\n\
    \n*[Figure 12-11](#9781430248750_Ch12.xhtml#_Fig11). The Build Settings with a\
    \ splash scene added*\n\n### Create the Splash Screen\n\nThe easiest way to display\
    \ a full-screen texture is with a `GUITexture`. In the splash scene, go to the\
    \ `Create Other` submenu in the `GameObject` menu and choose `GUI Texture` ([Figure\
    \ 12-12](#9781430248750_Ch12.xhtml#Fig12)).\n\n![9781430248750_Fig12-12.jpg](images/9781430248750_Fig12-12.jpg)\n\
    \n*[Figure 12-12](#9781430248750_Ch12.xhtml#_Fig12). Creating a GUITexture*\n\n\
    Rename the resulting `GameObject` to `Screen` and examine it in the Inspector\
    \ View. The newly created `GUITexture` displays a Unity watermark centered in\
    \ the screen ([Figure 12-13](#9781430248750_Ch12.xhtml#Fig13)). Unlike UnityGUI,\
    \ `GUITexture` uses normalized screen coordinates: x and y range from 0 to 1,\
    \ where 0,0 is the top left corner of the screen and 1,1 is the bottom right,\
    \ so setting x and y to 0.5 each specifies that the texture is centered on the\
    \ screen.\n\n![9781430248750_Fig12-13.jpg](images/9781430248750_Fig12-13.jpg)\n\
    \n*[Figure 12-13](#9781430248750_Ch12.xhtml#_Fig13). A default GUITexture*\n\n\
    Let’s replace the watermark texture with our splash texture. Drag the `LearnUnityCover`\
    \ texture from the Textures folder in the Project View into the Texture field\
    \ of the `GUITexture` component. To make the texture stretch across the entire\
    \ screen, change the scale to 1,1,1 and set all the `Pixel Inset` values to 0\
    \ ([Figure 12-14](#9781430248750_Ch12.xhtml#Fig14)).\n\n![9781430248750_Fig12-14.jpg](images/9781430248750_Fig12-14.jpg)\n\
    \n*[Figure 12-14](#9781430248750_Ch12.xhtml#_Fig14). A full-screen GUITexture*\n\
    \nNow if you run the game, you’ll see the splash texture stretched to fill your\
    \ screen. When running on a device or the iOS Simulator, it will appear after\
    \ the built-in splash screen ([Figure 12-15](#9781430248750_Ch12.xhtml#Fig15)).\n\
    \n![9781430248750_Fig12-15.jpg](images/9781430248750_Fig12-15.jpg)\n\n*[Figure\
    \ 12-15](#9781430248750_Ch12.xhtml#_Fig15). The full-size secondary splash screen*\n\
    \n### Load the Next Scene\n\nAs a splash screen, this scene should stay up for\
    \ just a few seconds and then begin to load the game scene. Like any real game\
    \ level, this scene could use a main logic script, so create a new JavaScript,\
    \ name it `FuguSplash`, and add the contents of [Listing 12-5](#9781430248750_Ch12.xhtml#list5).\n\
    \n*[Listing 12-5](#9781430248750_Ch12.xhtml#_list5). Wait-and-Load code in FuguSplash.js*\n\
    \n```javascript\nvar waitTime:float=2; // in seconds\nvar level:String;     //\
    \ scene name to load\n\nfunction Start() {\n        yield WaitForSeconds(waitTime);\n\
    \        Application.LoadLevel(level);\n}\n```\n\nThere are two public variables\
    \ that can be customized in the Inspector View: the time (in seconds) to wait\
    \ before loading the next scene and the name of the scene to load. The `Start`\
    \ function is really simple; it waits for the built-in coroutine `WaitForSeconds`\
    \ to finish, passing in the specified wait time, and then it calls `Application.LoadLevel`\
    \ to load the level you specified. In the process, the current scene will be unloaded\
    \ so the splash screen will disappear.\n\nLet’s add the script to the splash scene.\
    \ Create an empty `GameObject`, name it `Splash`, and attach the `FuguSplash`\
    \ script to it. Then in the Inspector View, enter the name of the bowling scene\
    \ in the Level field ([Figure 12-16](#9781430248750_Ch12.xhtml#Fig16)). Now if\
    \ you run the game, either in the Editor or in an iOS build, the splash screen\
    \ will appear for a couple of seconds and then the bowling scene will appear.\n\
    \n![9781430248750_Fig12-16.jpg](images/9781430248750_Fig12-16.jpg)\n\n*[Figure\
    \ 12-16](#9781430248750_Ch12.xhtml#_Fig16). The FuguSplash script added to the\
    \ splash scene*\n\nJust a few words about `WaitForSeconds`; it is convenient,\
    \ but you could have implemented your own version. [Listing 12-6](#9781430248750_Ch12.xhtml#list6)\
    \ shows a hypothetical implementation.\n\n*[Listing 12-6](#9781430248750_Ch12.xhtml#_list6).\
    \ An Implementation of WaitForSeconds*"
  raw: 'Set the Splash Screen (Pro)


    All iOS apps display a static “splash” screen on startup. Like the default app
    icon, the default splash screen in a Unity-built app shows the Unity logo ([Figure
    12-9](#9781430248750_Ch12.xhtml#Fig9)).


    ![9781430248750_Fig12-09.jpg](images/9781430248750_Fig12-09.jpg)


    [Figure 12-9](#9781430248750_Ch12.xhtml#_Fig9). The default Unity splash screen


    If you’re using Unity iOS Basic, you’re stuck with the default splash screen.
    But if you’re using Unity iOS Pro, you can supply your own splash screen in a
    manner similar to the way you customized the app icon.


    The Splash Image foldout is located beneath the Icon foldout in the iOS Settings,
    and, as with the icon selection, it has slots for multiple resolutions appropriate
    for the various iOS screens and also for both portrait and landscape orientations
    ([Figure 12-10](#9781430248750_Ch12.xhtml#Fig10)):


    *   *Mobile splash screen*: 320 × 480 for any iPod touch or iPhone preceding the
    fourth generation (i.e., the iPhone 4)

    *   *iPhone 3.5”/Retina*: 640 × 960 for the Retina display of the iPhone 4, iPhone
    4S, and fourth generation iPod touches

    *   *iPhone 4”/Retina*: 640 × 1136 for the iPhone 5 and fifth-generation iPod
    touch

    *   *iPad Portrait*: 768 × 1024 for the original iPad and the iPad 2

    *   *iPad Landscape*: 1004 × 768 for the original iPad and the iPad 2

    *   *High-Res. iPad Portrait*: For the Retina display of the new iPad (the iPad
    3)

    *   *High-Res. iPad Landscape*: For the Retina display of the new iPad (the iPad
    3)


    ![9781430248750_Fig12-10.jpg](images/9781430248750_Fig12-10.jpg)


    [Figure 12-10](#9781430248750_Ch12.xhtml#_Fig10). Splash screens for different
    screen resolutions and orientations


    There is no single default splash screen that Unity will automatically resize
    for all the splash resolutions, so you have to populate the splash screen boxes
    for the resolutions and orientations that your game will use. Since only Portrait
    and Portrait Upside Down orientations (along with Auto Rotation) are selected
    in the Resolution and Presentation settings, only the portrait splash screens
    need to be assigned. Like icons, the splash screens can be any textures, and Unity
    will scale them as needed, but you’ll get the best results with textures that
    are already the target size. You’ll want to use something appropriate for your
    company and game.


    **Note**   Apple recommends that the splash screen resemble an actual screen of
    your game, but it’s typical to just present a company logo. Personally, I think
    it’s confusing to have a screen that acts like an unresponsive game screen.


    Drag each splash screen texture from the Textures folder into the matching Splash
    screen box in the Player Settings ([Figure 12-10](#9781430248750_Ch12.xhtml#Fig10)):
    Fugu320x480 into Mobile Splash Screen, Fugu640x960 into iPhone 3.5”/Retina, and
    Fugu1536x2048 into High Res. iPad Portrait. The iPhone 4”/Retina needs a texture,
    so drag the closest match, Fugu640x960 into it. And Fugu1536x2048 can be used
    for iPad Portrait.


    A Second Splash Screen


    Although you can’t change the splash screen in Unity iOS Basic, you can make a
    splash screen that appears right after the built-in one. You just need to make
    a scene that displays the splash texture on the screen for a few seconds and then
    loads the first game scene. This can also be useful with Unity iOS Pro if you
    want to have more than one splash screen. For example, in HyperBowl I have some
    HyperBowl artwork displayed by the built-in splash screen and then my Fugu Games
    logo in the second splash screen.


    Create the Splash Scene


    Invoke the New Scene command from the File menu to create a new empty scene. Save
    it as Splash. Bring up the Build Settings window and click Add Current to add
    the new scene to your build. It will appear at the bottom of the list of scenes,
    so drag it up to the top. Its scene index should now display as 0, meaning it’s
    the first scene loaded ([Figure 12-11](#9781430248750_Ch12.xhtml#Fig11)).


    ![9781430248750_Fig12-11.jpg](images/9781430248750_Fig12-11.jpg)


    [Figure 12-11](#9781430248750_Ch12.xhtml#_Fig11). The Build Settings with a splash
    scene added


    Create the Splash Screen


    The easiest way to display a full-screen texture is with a GUITexture. In the
    splash scene, go to the Create Other submenu in the GameObject menu and choose
    GUI Texture ([Figure 12-12](#9781430248750_Ch12.xhtml#Fig12)).


    ![9781430248750_Fig12-12.jpg](images/9781430248750_Fig12-12.jpg)


    [Figure 12-12](#9781430248750_Ch12.xhtml#_Fig12). Creating a GUITexture


    Rename the resulting GameObject to Screen and examine it in the Inspector View.
    The newly created GUITexture displays a Unity watermark centered in the screen
    ([Figure 12-13](#9781430248750_Ch12.xhtml#Fig13)). Unlike UnityGUI, GUITexture
    uses normalized screen coordinates: x and y range from 0 to 1, where 0,0 is the
    top left corner of the screen and 1,1 is the bottom right, so setting x and y
    to 0.5 each specifies that the texture is centered on the screen.


    ![9781430248750_Fig12-13.jpg](images/9781430248750_Fig12-13.jpg)


    [Figure 12-13](#9781430248750_Ch12.xhtml#_Fig13). A default GUITexture


    Let’s replace the watermark texture with our splash texture. Drag the LearnUnityCover
    texture from the Textures folder in the Project View into the Texture field of
    the GUITexture component. To make the texture stretch across the entire screen,
    change the scale to 1,1,1 and set all the Pixel Inset values to 0 ([Figure 12-14](#9781430248750_Ch12.xhtml#Fig14)).


    ![9781430248750_Fig12-14.jpg](images/9781430248750_Fig12-14.jpg)


    [Figure 12-14](#9781430248750_Ch12.xhtml#_Fig14). A full-screen GUITexture


    Now if you run the game, you’ll see the splash texture stretched to fill your
    screen. When running on a device or the iOS Simulator, it will appear after the
    built-in splash screen ([Figure 12-15](#9781430248750_Ch12.xhtml#Fig15)).


    ![9781430248750_Fig12-15.jpg](images/9781430248750_Fig12-15.jpg)


    [Figure 12-15](#9781430248750_Ch12.xhtml#_Fig15). The full-size secondary splash
    screen


    Load the Next Scene


    As a splash screen, this scene should stay up for just a few seconds and then
    begin to load the game scene. Like any real game level, this scene could use a
    main logic script, so create a new JavaScript, name it `FuguSplash`, and add the
    contents of [Listing 12-5](#9781430248750_Ch12.xhtml#list5).


    [Listing 12-5](#9781430248750_Ch12.xhtml#_list5).  Wait-and-Load code in FuguSplash.js


    ```

    var waitTime:float=2; // in seconds

    var level:String;     // scene name to load


    function Start() {

            yield WaitForSeconds(waitTime);

            Application.LoadLevel(level);

    }

    ```


    There are two public variables that can be customized in the Inspector View: the
    time (in seconds) to wait before loading the next scene and the name of the scene
    to load. The `Start` function is really simple; it waits for the built-in coroutine
    `WaitForSeconds` to finish, passing in the specified wait time, and then it calls
    `Application.LoadLevel` to load the level you specified. In the process, the current
    scene will be unloaded so the splash screen will disappear.


    Let’s add the script to the splash scene. Create an empty GameObject, name it
    Splash, and attach the `FuguSplash` script to it. Then in the Inspector View,
    enter the name of the bowling scene in the Level field ([Figure 12-16](#9781430248750_Ch12.xhtml#Fig16)).
    Now if you run the game, either in the Editor or in an iOS build, the splash screen
    will appear for a couple of seconds and then the bowling scene will appear.


    ![9781430248750_Fig12-16.jpg](images/9781430248750_Fig12-16.jpg)


    [Figure 12-16](#9781430248750_Ch12.xhtml#_Fig16). The FuguSplash script added
    to the splash scene


    Just a few words about `WaitForSeconds`; it is convenient, but you could have
    implemented your own version. [Listing 12-6](#9781430248750_Ch12.xhtml#list6)
    shows a hypothetical implementation.


