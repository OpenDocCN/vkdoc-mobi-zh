    # 图 6-4. 将灯光颜色设为白色


    此外，由于在上一章中为了支持软阴影（针对 Unity Pro 用户），点光源实际上被改成了方向光，因此“点光源”这个名称会带来误解。此时正好可以将其重命名为“灯光”，这样如果你之后又想改变灯光类型，也能保留选择的灵活性。


    ## 重新铺设地板


    舞厅场景中闪亮的地砖看起来不太像保龄球道，所以让我们改变它的外观。借此机会，可以尝试一下 Unity 基于 Allegorithmic 的 Substance
    技术对程序化材质的支持。程序化材质使用算法生成的纹理，而非图像文件。通过调整纹理生成参数，可以在材质上实现丰富的变化，同时还能节省空间，因为程序化材质无需加载图像文件作为纹理。


    让我们为地板尝试一种程序化材质。在资源商店窗口中搜索“substance”（项目视图是搜索单个资源，所以这里不会显示资源商店的搜索结果）。资源商店窗口中会显示一些来自
    Allegorithmic 的免费 Substance 素材包（图 6-5）。


    ![9781430248750_Fig06-05.jpg](img/9781430248750_Fig06-05.jpg)


    **图 6-5.** 资源商店中搜索“substance”的结果


    我们需要的是“Eighteen Free Substances”这个素材包。选中并导入该素材包后，项目视图中会出现一个`Substances_Free`文件夹，里面包含
    18 个 Substance 存档文件（扩展名为`.sbsar`）（图 6-6）。能提供木地板外观的 Substance 文件是列在末尾的`Wood_Planks_01`。


    ![9781430248750_Fig06-06.jpg](img/9781430248750_Fig06-06.jpg)


    **图 6-6.** 项目视图中显示的 18 个免费 Substance 素材包


    每个 Substance 存档包含一个或多个`ProceduralMaterial`资源（`ProceduralMaterial`是`Material`的子类），以及它们支持的纹理和脚本。点击`Wood_Planks_01`图标右侧的箭头，图标会变成左箭头，并展开显示`Wood_Planks_01`的`ProceduralMaterial`及其关联的纹理（图
    6-7）。


    ![9781430248750_Fig06-07.jpg](img/9781430248750_Fig06-07.jpg)


    **图 6-7.** `Wood_Planks_01` Substance 存档的展开视图


    `Wood_Planks_01`程序化材质看起来是保龄球道地板的不错候选（至少比我们那些奇幻和科幻纹理要好），所以将`Wood_Planks_01`程序化材质（不是存档文件）拖拽到层级视图中的平面（Plane）上。你可以在场景视图中看到平面现在有了木板纹理（图
    6-8）。


    ![9781430248750_Fig06-08.jpg](img/9781430248750_Fig06-08.jpg)


    **图 6-8.** 应用了`Wood_Planks_01`程序化材质的平面


    木板看起来过大，但你可以通过编辑纹理的 UV 缩放字段来调整纹理（有一个主纹理和一个法线贴图纹理）在平面上的拉伸方式。在层级视图中选中平面，然后在检视视图中将两个纹理的
    X 和 Y 平铺值都设为 5，而不是 1（图 6-9）。


    ![9781430248750_Fig06-09.jpg](img/9781430248750_Fig06-09.jpg)


    **图 6-9.** 应用了程序化材质的平面的检视视图


    现在纹理被平铺了五次，而之前只有一次（图 6-10）。在检视视图中，注意你有很多程序化属性可以调整，来改变生成纹理的外观。


    ![9781430248750_Fig06-10.jpg](img/9781430248750_Fig06-10.jpg)


    **图 6-10.** 平铺值设为 5 后的平面


    和灯光一样，既然已经打开了检视视图，现在正好可以修改顶部文本字段中的名称，将平面重命名为“Floor”（地板），使其功能更加明确。


    ## 重置摄像机


    主摄像机上的`MouseOrbit`脚本不适合保龄球游戏，所以你可以禁用该脚本。更好的做法是，直接从主摄像机上移除该脚本：在层级视图中选中主摄像机，然后在检视视图中，右键点击`MouseOrbit`组件并选择“移除组件”（图
    6-11）。


    ![9781430248750_Fig06-11.jpg](img/9781430248750_Fig06-11.jpg)


    **图 6-11.** 从主摄像机上移除`MouseOrbit`脚本


    趁此机会，将主摄像机的位置设为(0,1,-5)，旋转设为(0,0,0)。现在你应该能看到一个漂亮的地板和天空，没有太多其他东西了（图 6-12）。


    ![9781430248750_Fig06-12.jpg](img/9781430248750_Fig06-12.jpg)


    **图 6-12.** 固定主摄像机后的游戏视图


    ## 制作一个球


    现在场景中有了天空盒、灯光、光晕和地板，以及一个固定视角的主摄像机。是时候添加保龄球了。


    ### 创建一个球体


    到目前为止，本书使用了两种基本游戏对象：平面和立方体。对于球体，还有一个完美的基本体：球体（Sphere）。与平面和立方体一样，可以从菜单栏“GameObject”菜单的“Create”子菜单中选择球体，但也可以通过层级视图左上角的“Create”按钮来实例化球体（图
    6-13）。


    ![9781430248750_Fig06-13.jpg](img/9781430248750_Fig06-13.jpg)


    **图 6-13.** 创建球体


    从“Create”菜单中选择“Sphere”后，层级视图中会出现一个名为“Sphere”的新游戏对象。在层级视图中选中球体游戏对象，以便在检视视图中查看它（图
    6-14）。


    ![9781430248750_Fig06-14.jpg](img/9781430248750_Fig06-14.jpg)


    **图 6-14.** 球的检视视图


    与立方体和平面基本体一样，球体游戏对象包含一个`MeshFilter`组件、一个`MeshRenderer`组件，以及一个与基本体形状相同的碰撞器组件（这里是一个`SphereCollider`）。首先，本着精心命名游戏对象的精神，将“Sphere”的名称改为“Ball”（球），以明确这个游戏对象是保龄球。然后将球的位置设为(0,1,0)，这会将球的中心置于地板上方
    1 米处。由于球的半径是 0.5 米（图 6-14 中显示的`SphereCollider Radius`是一个很好的提示），这会让球和地板之间留出一些间隙。当你点击播放时，球会悬浮在地板上方（图
    6-15）。


    ![9781430248750_Fig06-15.jpg](img/9781430248750_Fig06-15.jpg)


    **图 6-15.** 悬浮在空中的球


    当然，这是符合预期的。就像之前创建的所有其他东西——地板、立方体，甚至舞蹈角色——球会移动到或被放置在指定的位置。


    ### 让它落下


    为了让球因重力而下落并响应其他力，必须赋予球物理属性。通过添加一个`Rigidbody`组件，可以使游戏对象具有物理特性。


    **注意**   大多数游戏物理被称为*刚体模拟*，这大致如其字面意思——模拟形状不变的坚硬物体如何对作用力和碰撞做出反应。保龄球非常适合刚体模拟。而一团木薯布丁则不然。

    '
- fmt: '要添加刚体（`Rigidbody`）组件到球体（`Ball`）上，请在层级视图中选择球体，然后在菜单栏的组件菜单中，选择物理子菜单，再选择`Rigidbody`（[图6-16](#9781430248750_Ch06.xhtml#Fig16)）。你也可以点击检视面板底部的添加组件按钮来添加`Rigidbody`组件。


    ![9781430248750_Fig06-16.jpg](images/9781430248750_Fig06-16.jpg)


    [图6-16](#9781430248750_Ch06.xhtml#_Fig16). 为球体添加`Rigidbody`组件


    现在，检视面板会显示一个附加到球体上的`Rigidbody`组件（[图6-17](#9781430248750_Ch06.xhtml#Fig17)）。


    ![9781430248750_Fig06-17.jpg](images/9781430248750_Fig06-17.jpg)


    [图6-17](#9781430248750_Ch06.xhtml#_Fig17). 带有`Rigidbody`组件的球体的检视面板


    大多数`Rigidbody`属性可以使用其默认值，但对于一个保龄球来说，1千克的质量稍微轻了点。让我们将其设置为5，因为5千克大致接近保龄球的重量范围。


    阻力（空气阻力）和角阻力（旋转时受到的阻力）的最小值可以接受。没有理由增加阻力，除非你是在水下打保龄球。


    使用重力属性指定球体会响应重力。如果该复选框未选中，那么球体的行为将如同在零重力环境中一样（太空保龄球！）。


    运动学属性用于移动和碰撞但不响应力的游戏对象（例如，电梯平台）。任何带有碰撞器组件并会移动的游戏对象也应该附加`Rigidbody`组件。如果移动并非来自物理引擎，而是来自脚本或动画，那么它应该是一个运动学刚体。


    **注意**   不应通过直接更改其变换组件来移动运动学刚体，这会导致糟糕的性能。相反，应通过在游戏对象的`Rigidbody`组件上调用`Rigidbody.MovePosition`和`Rigidbody.MoveRotation`函数来移动它。


    插值属性允许平滑游戏对象的运动（这会消耗计算资源）。


    同样，碰撞检测属性可提供改进的碰撞检测，特别是对于快速移动的游戏对象（同样会消耗计算资源）。


    约束属性可以限制游戏对象在响应力时的移动方式。例如，可以将游戏对象限制为仅沿一个平面或仅沿一个方向移动。


    适当设置`Rigidbody`组件属性后，再次点击播放。现在球体会下落，更棒的是，它会落在地板上！（[图6-18](#9781430248750_Ch06.xhtml#Fig18)）。


    ![9781430248750_Fig06-18.jpg](images/9781430248750_Fig06-18.jpg)


    [图6-18](#9781430248750_Ch06.xhtml#_Fig18). 球体落在地板上的游戏视图


    顺便说一下，默认的重力是标准地球重力，大约为9.8米/秒²。这可以在`PhysicsManager`中进行自定义（[图6-19](#9781430248750_Ch06.xhtml#Fig19)），通过编辑菜单下的项目设置子菜单即可找到。


    ![9781430248750_Fig06-19.jpg](images/9781430248750_Fig06-19.jpg)


    [图6-19](#9781430248750_Ch06.xhtml#_Fig19). `PhysicsManager`


    `PhysicsManager`的重力属性是一个向量（具体来说，如果你从脚本中访问`PhysicsManager`，它是一个`Vector3`），其唯一的非零值在y方向上（且为负值，因此力是向下的）。因此，你不仅可以改变重力，例如设置为月球重力，甚至可以改变其方向！如果将y值从-9.81改为9.81，球体将向上掉落；如果将重力向量从(0,-9.81,0)改为(1,0,0)，球体将以1米/秒²的速度侧向掉落。如果你想要失重状态，设置重力为(0,0,0)即可。


    自定义碰撞


    碰撞器组件为游戏对象提供碰撞形状。如果你在检视面板中检查球体和地板，你会发现每个对象都自动附加了一个形状与其网格匹配的碰撞器组件。地板带有一个`MeshCollider`组件，它始终与游戏对象的网格匹配；而球体带有一个`SphereCollider`组件，它始终是球形的。当你选择球体或地板时，场景视图不仅会高亮显示游戏对象的网格，还会高亮显示其碰撞器组件的形状。你可以使用场景视图中的Gizmos菜单来切换碰撞器gizmo的显示。


    在基本游戏对象和基本碰撞器之间几乎存在一对一的关系（这里“基本”指的是内置在Unity中，并且形状简单，这对性能有好处）。不过也有例外。例如，你可以从游戏对象菜单创建一个基本的圆柱体游戏对象，但没有可用的圆柱体形状的碰撞器。相反，如果你创建一个圆柱体，它会自动使用`CapsuleCollider`组件。


    `MeshCollider`是一个特殊情况。自动跟随关联网格的形状听起来不错，但这仅适用于静态（即非移动）游戏对象。任何正在移动或可能移动的对象都应使用基本碰撞器或基本碰撞器的集合（更多内容见下一章）。`MeshCollider`如果要与其他网格碰撞器碰撞，还必须启用其凸起属性（复选框）。


    物理材质


    碰撞器组件决定了两个游戏对象在何时发生碰撞，但检测到碰撞后实际会发生什么？一个游戏对象会从另一个上弹开吗？如果是，弹开多少？球体会在地板上滑动、滚动还是粘住？这就是碰撞器组件的材质属性发挥作用的地方。这个属性名有点误导，因为碰撞器组件的材质与网格渲染器组件用来确定网格表面外观的材质不同。相反，碰撞器组件使用物理材质来确定碰撞表面的碰撞属性。拼写有点奇怪，但你可以将物理材质理解为*物理材料*或*物理材质*。


    **注意**   与程序化材质不同，`PhysicMaterial`类不是`Material`的子类。


    碰撞器组件的材质属性默认为`PhysicsManager`中的默认材质属性（[图6-19](#9781430248750_Ch06.xhtml#Fig19)），该属性为无。要自定义其碰撞行为，碰撞器组件必须分配一个物理材质。


    标准物理材质


    你可以从头开始在项目视图的创建菜单中创建新的物理材质，但Unity在其标准资源中方便地提供了各种物理材质的包。从菜单栏的资源菜单中选择导入包，然后选择物理材质（[图6-20](#9781430248750_Ch06.xhtml#Fig20)）。


    ![9781430248750_Fig06-20.jpg](images/9781430248750_Fig06-20.jpg)


    [图6-20](#9781430248750_Ch06.xhtml#_Fig20). 从标准资产中导入物理材质


    在项目视图中，新的物理材质将出现在一个名为物理材质的标准资产子文件夹中（[图6-21](#9781430248750_Ch06.xhtml#Fig21)）。


    ![9781430248750_Fig06-21.jpg](images/9781430248750_Fig06-21.jpg)


    [图6-21](#9781430248750_Ch06.xhtml#_Fig21). 来自标准资产的物理材质的项目视图


    物理材质的剖析


    选择各种物理材质并在检视面板中比较它们的值。例如，查看弹球和冰物理材质之间的差异（[图6-22](#9781430248750_Ch06.xhtml#Fig22)）。


    ![9781430248750_Fig06-22.jpg](images/9781430248750_Fig06-22.jpg)


    [图6-22](#9781430248750_Ch06.xhtml#_Fig22). 弹球和冰物理材质的比较'
  raw: 'To add a Rigidbody Component to the Ball, select the Ball in the Hierarchy
    View, and then in the Component menu on the menu bar, choose the Physics submenu,
    then Rigidbody ([Figure 6-16](#9781430248750_Ch06.xhtml#Fig16)). You could also
    click the Add Component button on the bottom of the Inspector View to add a Rigidbody
    Component.


    ![9781430248750_Fig06-16.jpg](images/9781430248750_Fig06-16.jpg)


    [Figure 6-16](#9781430248750_Ch06.xhtml#_Fig16). Adding a Rigidbody Component
    to the Ball


    The Inspector View now shows a Rigidbody Component attached to the Ball ([Figure
    6-17](#9781430248750_Ch06.xhtml#Fig17)).


    ![9781430248750_Fig06-17.jpg](images/9781430248750_Fig06-17.jpg)


    [Figure 6-17](#9781430248750_Ch06.xhtml#_Fig17). The Inspector View of the Ball
    with a Rigidbody Component


    Most of the Rigidbody properties can be used with their default values, but a
    Mass of 1 kilogram is a bit light for a bowling ball. Let’s set it to 5, as 5
    kg is in the ballpark for a bowling ball weight.


    The minimal values for Drag (air resistance) and Angular Drag (the drag experienced
    from rotating) are fine. There’s no reason to increase drag unless, say you’re
    bowling underwater.


    The Use Gravity property specifies that the Ball will respond to gravitational
    force. If the checkbox is not checked, then the Ball will behave as if it were
    in a zero-G environment (Bowling in Space!).


    The Is Kinematic property is used for GameObjects that move and collide but don’t
    respond to forces (e.g., an elevator platform). Any GameObject with a Collider
    Component that is going to move should also have a Rigidbody Component attached,
    and if the movement is not from physics but from scripting or animation, then
    it should be a Kinematic Rigidbody.


    **Note**   A GameObject that is a Kinematic Rigidbody should not be moved by directly
    changing its Transform Component, as that results in horrible performance. Instead,
    it should be moved by calling the `Rigidbody.MovePosition` and `Rigidbody.MoveRotation`
    functions on the GameObject’s Rigidbody Component.


    The Interpolation property allows smoothing of the GameObject’s movement (at a
    computational cost).


    Likewise, the Collision Detection property provides improved collision detection,
    in particular for fast-moving GameObjects (again, at a computational cost).


    The Constraints property can limit how the GameObject can move in response to
    forces. For example, a GameObject can be limited to movement along one plane or
    even just one direction.


    With the Rigidbody Component properties appropriately set, click Play again. Now
    the Ball drops, and even better, it lands on the Floor! ([Figure 6-18](#9781430248750_Ch06.xhtml#Fig18)).


    ![9781430248750_Fig06-18.jpg](images/9781430248750_Fig06-18.jpg)


    [Figure 6-18](#9781430248750_Ch06.xhtml#_Fig18). The Game View of the Ball landing
    on the Floor


    The default gravitational force, by the way, is standard Earth gravity, approximately
    9.8 m/s². This can be customized in the PhysicsManager ([Figure 6-19](#9781430248750_Ch06.xhtml#Fig19)),
    available under the Project Settings submenu of the Edit menu.


    ![9781430248750_Fig06-19.jpg](images/9781430248750_Fig06-19.jpg)


    [Figure 6-19](#9781430248750_Ch06.xhtml#_Fig19). The PhysicsManager


    The Gravity property of the PhysicsManager is a vector (specifically, a `Vector3`
    if you access the PhysicsManager from a script), with the only nonzero value in
    the y direction (and negative, so the force is downward). Thus, not only could
    you change the gravitational force to, say, that of the Moon, you could even change
    its direction! If you change the y value from -9.81 to 9.81, the ball will fall
    upward, and if you change the gravitational vector from (0,-9.81,0) to (1,0,0),
    the Ball will fall sideways at 1 m/s². And if you want weightlessness, a gravitational
    force of (0,0,0) will do the trick.


    Customize Collision


    A Collider Component provide a GameObject with a collision shape. If you examine
    the Ball and Floor in the Inspector View, you’ll see each has a Collider Component
    that was automatically attached and has a shape matching its Mesh. The Floor has
    a MeshCollider Component, which always matches the GameObject’s Mesh, and the
    Ball has a SphereCollider Component, which always has a spherical shape. When
    you select the Ball or Floor, the Scene View highlights not only the Mesh of the
    GameObject but also the shape of its Collider Component. You can toggle the display
    of Collider gizmos using the Gizmos menu in the Scene View.


    There is almost a one-to-one correspondence among primitive GameObjects and primitive
    colliders (by “primitive” I mean it’s built in to Unity and also that the shape
    is simple, which is a good thing for performance). There are exceptions, though.
    For example, there is a primitive Cylinder GameObject that you can create from
    the GameObject menu but no available Collider in the shape of a cylinder. Instead,
    if you create a Cylinder, it automatically uses a CapsuleCollider Component.


    The MeshCollider is a special case. Automatically following the shape of the associated
    Mesh sounds good, but it’s only a good idea for static (i.e., nonmoving) GameObjects.
    Anything that is moving or might move should have a primitive collider or an aggregation
    of primitive colliders (more about that in the next chapter). A MeshCollider also
    has to have its Convex property (checkbox) enabled if it’s to collide with other
    Mesh Colliders.


    PhysicMaterials


    Collider Components dictate at what point two GameObjects will collide, but what
    actually happens when the collision is detected? Does one GameObject bounce off
    the other, and if so, by how much? Will the Ball slide or roll along the floor
    or just stick to it? That’s where the Material property of a Collider Component
    comes in. The property name is a little bit misleading, as the Material of a Collider
    Component isn’t the same Material used with MeshRenderer Components to determine
    the appearance of a Mesh surface. Instead, a Collider Component uses a PhysicMaterial
    to determine the collision properties of the the collision surface. The spelling
    is a little odd, but I think of a PhysicMaterial as a *physics material* or *physical
    material*.


    **Note**   Unlike ProceduralMaterial, the `PhysicMaterial` class is not a subclass
    of `Material`.


    The Material property for Collider Components defaults to the Default Material
    property in the PhysicsManager ([Figure 6-19](#9781430248750_Ch06.xhtml#Fig19)),
    which is None. To customize its collision behavior, a Collider Component has to
    have a PhysicMaterial assigned.


    Standard PhysicMaterials


    You can create a new PhysicMaterial from scratch from the Project View Create
    menu, but Unity conveniently provides a package of various PhysicMaterials in
    its Standard Assets. From the Assets menu on the menu bar, select Import Package
    and then Physic Materials ([Figure 6-20](#9781430248750_Ch06.xhtml#Fig20)).


    ![9781430248750_Fig06-20.jpg](images/9781430248750_Fig06-20.jpg)


    [Figure 6-20](#9781430248750_Ch06.xhtml#_Fig20). Importing PhysicMaterials from
    Standard Assets


    In the Project View, the new PhysicMaterials will show up in a Standard Assets
    subfolder named Physic Materials ([Figure 6-21](#9781430248750_Ch06.xhtml#Fig21)).


    ![9781430248750_Fig06-21.jpg](images/9781430248750_Fig06-21.jpg)


    [Figure 6-21](#9781430248750_Ch06.xhtml#_Fig21). The Project View of the PhysicMaterials
    from Standard Assets


    Anatomy of a PhysicMaterial


    Select among the various PhysicMaterials and compare their values in the Inspector
    View. For example, check out the differences between the Bouncy and Ice PhysicMaterials
    ([Figure 6-22](#9781430248750_Ch06.xhtml#Fig22)).


    ![9781430248750_Fig06-22.jpg](images/9781430248750_Fig06-22.jpg)


    [Figure 6-22](#9781430248750_Ch06.xhtml#_Fig22). Comparison of Bouncy and Ice
    PhysicMaterials'
  trans: '

    要添加刚体（`Rigidbody`）组件到球体（`Ball`）上，请在层级视图中选择球体，然后在菜单栏的**组件**菜单中，选择**物理**子菜单，再选择`Rigidbody`（图
    6-16）。你也可以点击检视面板底部的**添加组件**按钮来添加`Rigidbody`组件。


    ![9781430248750_Fig06-16.jpg](img/9781430248750_Fig06-16.jpg)


    图 6-16. 为球体添加`Rigidbody`组件


    现在，检视面板会显示一个附加到球体上的`Rigidbody`组件（图 6-17）。


    ![9781430248750_Fig06-17.jpg](img/9781430248750_Fig06-17.jpg)


    图 6-17. 带有`Rigidbody`组件的球体的检视面板


    大多数`Rigidbody`属性可以使用其默认值，但对于一个保龄球来说，1 千克的质量稍微轻了点。让我们将其设置为 5，因为 5 千克大致接近保龄球的重量范围。


    **阻力**（空气阻力）和**角阻力**（旋转时受到的阻力）的最小值可以接受。没有理由增加阻力，除非你是在水下打保龄球。


    使用**使用重力**属性指定球体会响应重力。如果该复选框未选中，那么球体的行为将如同在零重力环境中一样（太空保龄球！）。


    **运动学**属性用于移动和碰撞但不响应力的游戏对象（例如，电梯平台）。任何带有碰撞器组件并会移动的游戏对象也应该附加`Rigidbody`组件。如果移动并非来自物理引擎，而是来自脚本或动画，那么它应该是一个运动学刚体。


    **注意**   不应通过直接更改其变换组件来移动运动学刚体，这会导致糟糕的性能。相反，应通过在游戏对象的`Rigidbody`组件上调用`Rigidbody.MovePosition`和`Rigidbody.MoveRotation`函数来移动它。


    **插值**属性允许平滑游戏对象的运动（这会消耗计算资源）。


    同样，**碰撞检测**属性可提供改进的碰撞检测，特别是对于快速移动的游戏对象（同样会消耗计算资源）。


    **约束**属性可以限制游戏对象在响应力时的移动方式。例如，可以将游戏对象限制为仅沿一个平面或仅沿一个方向移动。


    适当设置`Rigidbody`组件属性后，再次点击**播放**。现在球体会下落，更棒的是，它会落在地板上！（图 6-18）。


    ![9781430248750_Fig06-18.jpg](img/9781430248750_Fig06-18.jpg)


    图 6-18. 球体落在地板上的游戏视图


    顺便说一下，默认的重力是标准地球重力，大约为 9.8 米/秒²。这可以在`PhysicsManager`中进行自定义（图 6-19），通过**编辑**菜单下的**项目设置**子菜单即可找到。


    ![9781430248750_Fig06-19.jpg](img/9781430248750_Fig06-19.jpg)


    图 6-19. `PhysicsManager`


    `PhysicsManager`的**重力**属性是一个向量（具体来说，如果你从脚本中访问`PhysicsManager`，它是一个`Vector3`），其唯一的非零值在
    y 方向上（且为负值，因此力是向下的）。因此，你不仅可以改变重力，例如设置为月球重力，甚至可以改变其方向！如果将 y 值从-9.81 改为 9.81，球体将向上掉落；如果将重力向量从(0,-9.81,0)改为(1,0,0)，球体将以
    1 米/秒²的速度侧向掉落。如果你想要失重状态，设置重力为(0,0,0)即可。


    ## 自定义碰撞


    碰撞器组件为游戏对象提供碰撞形状。如果你在检视面板中检查球体和地板，你会发现每个对象都自动附加了一个形状与其网格匹配的碰撞器组件。地板带有一个`MeshCollider`组件，它始终与游戏对象的网格匹配；而球体带有一个`SphereCollider`组件，它始终是球形的。当你选择球体或地板时，场景视图不仅会高亮显示游戏对象的网格，还会高亮显示其碰撞器组件的形状。你可以使用场景视图中的**Gizmos**菜单来切换碰撞器
    gizmo 的显示。


    在基本游戏对象和基本碰撞器之间几乎存在一对一的关系（这里“基本”指的是内置在 Unity 中，并且形状简单，这对性能有好处）。不过也有例外。例如，你可以从游戏对象菜单创建一个基本的圆柱体游戏对象，但没有可用的圆柱体形状的碰撞器。相反，如果你创建一个圆柱体，它会自动使用`CapsuleCollider`组件。


    `MeshCollider`是一个特殊情况。自动跟随关联网格的形状听起来不错，但这仅适用于静态（即非移动）游戏对象。任何正在移动或可能移动的对象都应使用基本碰撞器或基本碰撞器的集合（更多内容见下一章）。`MeshCollider`如果要与其他网格碰撞器碰撞，还必须启用其**凸起**属性（复选框）。


    ### 物理材质


    碰撞器组件决定了两个游戏对象在何时发生碰撞，但检测到碰撞后实际会发生什么？一个游戏对象会从另一个上弹开吗？如果是，弹开多少？球体会在地板上滑动、滚动还是粘住？这就是碰撞器组件的**材质**属性发挥作用的地方。这个属性名有点误导，因为碰撞器组件的材质与网格渲染器组件用来确定网格表面外观的材质不同。相反，碰撞器组件使用物理材质来确定碰撞表面的碰撞属性。拼写有点奇怪，但你可以将物理材质理解为*物理材料*或*物理材质*。


    **注意**   与程序化材质不同，`PhysicMaterial`类不是`Material`的子类。


    碰撞器组件的**材质**属性默认为`PhysicsManager`中的**默认材质**属性（图 6-19），该属性为无。要自定义其碰撞行为，碰撞器组件必须分配一个物理材质。


    ### 标准物理材质


    你可以从头开始在项目视图的**创建**菜单中创建新的物理材质，但 Unity 在其标准资源中方便地提供了各种物理材质的包。从菜单栏的**资源**菜单中选择**导入包**，然后选择**物理材质**（图
    6-20）。


    ![9781430248750_Fig06-20.jpg](img/9781430248750_Fig06-20.jpg)


    图 6-20. 从标准资产中导入物理材质


    在项目视图中，新的物理材质将出现在一个名为**物理材质**的标准资产子文件夹中（图 6-21）。


    ![9781430248750_Fig06-21.jpg](img/9781430248750_Fig06-21.jpg)


    图 6-21. 来自标准资产的物理材质的项目视图


    ### 物理材质的剖析


    选择各种物理材质并在检视面板中比较它们的值。例如，查看**弹球**和**冰**物理材质之间的差异（图 6-22）。


    ![9781430248750_Fig06-22.jpg](img/9781430248750_Fig06-22.jpg)


    图 6-22. 弹球和冰物理材质的比较

