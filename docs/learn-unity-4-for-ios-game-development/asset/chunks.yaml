    The Ball, pins, and Main Camera now record their original positions and rotations
    when the game starts and you have a `ResetPosition` function ready to call that
    will restore them to those original positions and rotations.


    Send a Message


    Normally, calling a function in a script attached to one GameObject from a script
    attached to another GameObject is a little bit tricky. It involves calling `GetComponent`
    on a GameObject to retrieve the script and then referencing that script to call
    the function.


    But in simple cases (e.g., when you don’t care about the return value of the function),
    Unity allows you to call functions by sending messages to GameObjects using either
    the `SendMessage` or `BroadcastMessage` function in the `GameObject` class. A
    GameObject receiving a message, which consists of the name of the function to
    call, will pass that message on to any attached script that might have that function.


    Let’s add some functions to our game controller script that will send `ResetPosition`
    messages ([Listing 7-3](#9781430248750_Ch07.xhtml#list3)).


    [Listing 7-3.](#9781430248750_Ch07.xhtml#_list3)  Functions to Send ResetPosition
    Messages in FuguBowl.js


    ```

    var ball:GameObject; // the bowling ball


    function ResetBall() {

            ball.SendMessage("ResetPosition");

    }


    function ResetPins() {

            for (var pin:GameObject in pins) {

                    pin.BroadcastMessage("ResetPosition");

            }

    }


    function ResetCamera() {

            Camera.main.SendMessage("ResetPosition");

    }


    function ResetEverything() {

            ResetBall();

            ResetPins();

            ResetCamera();

    }

    ```


    The additional code begins with a public variable that will refer to the Ball.
    The script already has a pins `Array` that references all of the bowling pins,
    and the Main Camera can always be referenced through the static variable `Camera.main`,
    so now the script can access every GameObject that it needs to reset.The functions
    `ResetCamera` and `ResetBall` call `SendMessage` to send the `ResetPosition` message
    to their respective target GameObjects. Every `ResetPosition` function defined
    in scripts attached to those GameObjects will be called. Specifically, since the
    Main Camera and the Ball have the `FuguReset` script attached, the `ResetPosition`
    function in that script will respond to the message.


    The `ResetPins` function is a little bit different in that it calls `BroadcastMessage`
    to send the `ResetPosition` message. `BroadcastMessage` behaves the same as `SendMessage`
    except that the message is also propagated to any child GameObjects of the original
    recipient GameObject. This will be useful later in this chapter when we swap in
    some pins that have their Rigidbodies attached to child GameObjects.


    ResetPins does generate a warning in the Console about an *Implicit downcast from
    ‘Object’ to ‘UnityEngine.GameObject’* ([Figure 7-12](#9781430248750_Ch07.xhtml#Fig12)).


    ![9781430248750_Fig07-12.jpg](images/9781430248750_Fig07-12.jpg)


    [Figure 7-12](#9781430248750_Ch07.xhtml#_Fig12). The Console View of an Implicit
    Downcast warning


    The warning appears because `Array` is defined to contain elements of type Object,
    but each element is treated as a `GameObject`. That’s plausible, since `GameObject`
    is a subclass of `Object`, but as far as the compiler knows, not necessarily true.
    You can remove the warning by adding `#pragma downcast` to the script, which basically
    tells the compiler, “trust me.”


    Check for Gutter Ball


    When the Ball rolls off the edge of the Floor, it’s essentially a gutter ball,
    since there’s no hope of reaching the pins at this point. So a reset of the game
    is definitely in order when this happens. The gutter ball can be implemented by
    checking in every frame whether the y position of the Ball has dropped below a
    certain level. That can be implemented by adding the public variable `sunkHeight`
    and `Update` callback in [Listing 7-4](#9781430248750_Ch07.xhtml#list4) to the
    `FuguBowl` script.


    [Listing 7-4.](#9781430248750_Ch07.xhtml#_list4)  Update Callback in FuguBowl.js
    to Test for Gutter Ball


    ```

    var sunkHeight:float = -10.0; // global y position which we call a gutterball


    function Update() {

            if (ball.transform.position.y<sunkHeight) {

                    ResetEverything();

            }

    }

    ```


    The variable `sunkHeight` specifies what y position the Ball has to fall below
    to reset everything. The default value at some of `sunkHeight` is some distance
    below zero so the players has some time to see the Ball fall before it resets.The
    `Update` callback checks every frame whether or not the Ball’s y position is below
    `sunkHeight`. If it is, `ResetEverything` is called, which sends out all the `ResetPosition`
    messages to the Ball, Main Camera, and pins. Before you click Play to test this,
    you need to assign the `ball` public variable in the script by dragging the Ball
    GameObject from the Hierarchy View into the Ball field of the `FuguBowl` script
    ([Figure 7-13](#9781430248750_Ch07.xhtml#Fig13)).


    ![9781430248750_Fig07-13.jpg](images/9781430248750_Fig07-13.jpg)


    [Figure 7-13](#9781430248750_Ch07.xhtml#_Fig13). Game controller properties in
    FuguBowl.js to support resetting the ball


    Now when the Ball rolls off the Floor, the Ball, Main Camera and pins should pop
    right back into their beginning positions. Continuous gameplay!


    The Complete Listing


    The complete game controller script is given in [Listing 7-5](#9781430248750_Ch07.xhtml#list5).


    [Listing 7-5.](#9781430248750_Ch07.xhtml#_list5)  . The Complete Listing for FuguBowl.js


