    # 括号放置及其他


    括号的位置也是一个常见的争论点。我在这里使用的惯例（也是 Unity 所使用的，至少在创建新脚本模板时）被称为埃及风格，根据 Jeff Atwood（StackExchange
    的名人）在他广受欢迎的博客 Coding Horror（`http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html`）上的说法。这篇文章还将对类名应用标准前缀的做法称为“Smurf
    命名”。


    # 第五章


    # 让我们跳舞吧！动画与声音


    在 Unity 中移动`GameObject`的三种方式中，对`Transform Component`的脚本控制已在上一章中介绍，而物理将在下一章开始的保龄球游戏示例中扮演重要角色。脚本化移动无处不在。例如，即使在即将到来的保龄球游戏中（该游戏严重依赖物理来控制模拟保龄球及其与地板和球瓶的碰撞），摄像机跟随行为也是通过修改其`Transform
    Component`的脚本来实现的（这与立方体场景中使用的`MouseOrbit`脚本非常相似）。不仅如此，每个移动的`GameObject`都会通过恢复其`Transform
    Component`中的值而在轮次和帧之间重置。


    在继续制作那个保龄球游戏之前，你将在本章中花更多时间构建现已完成的立方体场景，通过添加一个跳舞的角色动画来增强它，以便感受 Unity 的动画支持。没有音乐的舞蹈演示是不完整的，因此场景将包含循环音效。这仍然是一个非物理且只有轻度交互的场景，但希望在深入探讨大量物理知识（一个大话题，跨越两章）和更多脚本编写（一个更大的话题，涵盖本书剩余部分）之前，它能提供一个漂亮且有趣的方式来介绍
    Unity 的动画和音频支持。


    如果你不是专业人士，高质量的动画，特别是角色动画，并不容易创建。音乐也是如此。幸运的是，Unity Asset Store 上有大量的音乐和角色动画包，其中许多是免费的，包括本章中使用的`Skeletons
    Pack`和`General Music Set`。这些资源不包含在`http://learnunity4.com/`上对应的项目中，但如果你只是从这一点切入并且没有从上一章构建起立方体场景，该项目可以用作一个起点。


    ## 导入`Skeletons Pack`


    如上一章所示，你可以从 Project View 中搜索 Asset Store。在搜索字段中输入“skeleton”，来自`Skeletons Pack`的骨骼资源将显示在免费资源结果中（图
    5-1）。


    ![9781430248750_Fig05-01.jpg](img/9781430248750_Fig05-01.jpg)


    图 5-1. 针对`Skeletons Pack`的 Project View 搜索结果


    **提示**  Project View 中的搜索词会匹配项目中已导入以及可从 Asset Store 导入的单个资源，但 Asset Store 的搜索部分可以在
    Unity 偏好设置中禁用。


    选择骨骼资源并在 Inspector View 中确认该包确实是`Skeleton Pack`（图 5-2）。你可以点击`Import package`按钮立即导入`Skeleton
    Pack`，或者先点击`Open Asset Store`按钮在 Asset Store 窗口中查看完整描述，然后从那里导入该包。


    ![9781430248750_Fig05-02.jpg](img/9781430248750_Fig05-02.jpg)


    图 5-2. `Skeletons Pack`的 Inspector View


    无论你选择如何导入`Skeletons Pack`，安装后都会在 Project View 中添加一个`SkeletonData`文件夹，以及在`Prefabs`文件夹中添加几个预制件（图
    5-3）。


    ![9781430248750_Fig05-03.jpg](img/9781430248750_Fig05-03.jpg)


    图 5-3. `Skeletons Pack`预制件的 Project View


    ## 添加一个骨骼


    `Skeletons Pack`安装的四个预制件都具有相同的骨骼，但配备了不同的装备，例如剑和盾牌。然而，事实证明，带有武装骨骼的预制件在跳舞时看起来像是在砍自己的四肢，所以我们还是坚持使用`skeletonNormal`预制件，它只有光秃秃的骨骼。通过将`skeletonNormal`预制件拖入
    Hierarchy View，向场景中添加一个它的实例（图 5-4）。


    ![9781430248750_Fig05-04.jpg](img/9781430248750_Fig05-04.jpg)


    图 5-4. 带有激活的骨骼并使`Cubes`停用的立方体场景


    `skeletonNormal GameObject`具有一个引用骨骼动画数据的`Animation Component`。`skeletonNormal`还有两个子`GameObject`。一个名为`Bip01`，实际上是一个表示骨骼关节的`GameObject`层级结构。当骨骼运动时，手臂也随之运动，任何手部运动都相对于手臂，以此类推。这个骨骼层级结构让人想起“Dem
    Bones”这首歌——“大腿骨连接着髋骨……”


    另一个子`GameObject`，`skeleton`，是一个带有`SkinnedMeshRenderer Component`的`GameObject`。`SkinnedMeshRenderer`和`MeshRendererer`一样，是`Renderer`的子类。然而，`SkinnedMeshRenderer
    Component`渲染包裹在骨骼周围的网格，并随着骨骼关节的运动而跟随。该网格本质上形成了骨骼的皮肤，因此将这种网格映射到骨骼的过程通常被称为*蒙皮*。


    `skeletonNormal GameObject`还包含几个粒子效果，通过`ParticleEmitter Components`实现。粒子效果由许多微小的动画图元组成，非常适合创建火焰、爆炸、烟雾或任何类型的闪亮效果。


    **注意**  `Skeletons Pack`中包含的粒子效果适用于 Unity 的 Legacy 粒子系统，而不是 Unity 3.5 中引入的较新的
    Shuriken 粒子系统。Legacy 系统使用`ParticleEmitter Component`，而 Shuriken 使用`ParticleSystem
    Component`。


    ## 隐藏`Cubes`


    这个场景完全是关于跳舞的骨骼，所以你可以省去前两章中出现的`Cubes`。与其从场景中删除`Cubes`（通过选择它们并从 Edit 菜单中调用 Delete
    或使用 Command+Delete 快捷键），不如将它们停用，使其不可见、眼不见心不烦。在 Hierarchy View 中选择父级`Cube`，取消选中
    Inspector View 左上角的复选框，Hierarchy View 中的整个`Cubes`树将变为灰色，表示它们已处于非活动状态（图 5-4）。


    所有子级`Cubes`实际上都处于非活动状态，因为父级的活动状态会覆盖子级的状态。换句话说，一个`GameObject`只有在它自身标记为活动、其父级标记为活动、父级的父级也标记为活动等情况下，才*真正*处于活动状态。任何非活动的`GameObject`其`Components`都会被有效禁用。它的`Renderer
    Component`不再渲染，`Collider Component`不再碰撞，并且任何附加的脚本都不会调用其回调函数，`OnEnable`和`OnDisable`除外。


    ## 围绕骨骼旋转


    尽管`Cubes`已被停用，但主摄像机上的`MouseOrbit`脚本仍将主`Cube`作为其目标。主摄像机现在应该围绕骨骼旋转，因此在 Inspector
    View 中选择主摄像机，然后将`skeletonNormal GameObject`从 Hierarchy View 拖到`MouseOrbit`脚本的`Target`字段中（图
    5-5）。


    ![9781430248750_Fig05-05.jpg](img/9781430248750_Fig05-05.jpg)


    图 5-5. 主摄像机上的`MouseOrbit`脚本，目标为骨骼

    '
- fmt: 'Now when you click Play, the Main Camera orbits the skeleton as you move the
    mouse ([Figure 5-6](#9781430248750_Ch05.xhtml#Fig6)). As a bonus, since the skeleton
    prefab includes a particle effect, the skeleton appears to be standing amid a
    sparkly haze.


    ![9781430248750_Fig05-06.jpg](images/9781430248750_Fig05-06.jpg)


    [Figure 5-6](#9781430248750_Ch05.xhtml#_Fig6). The Game View of an idle skeleton


    ## Make the Skeleton Dance


    Right now the skeleton just shuffles around a little instead of dancing. If you
    select the `skeletonNormal` GameObject and examine it in the Inspector View, you
    can see the GameObject has an `Animation` Component with a field that references
    an “idle” AnimationClip ([Figure 5-7](#9781430248750_Ch05.xhtml#Fig7)).


    ![9781430248750_Fig05-07.jpg](images/9781430248750_Fig05-07.jpg)


    [Figure 5-7](#9781430248750_Ch05.xhtml#_Fig7). Changing the skeleton’s position
    and animation


    Notice also that the `Play Automatically` checkbox is checked, which is why the
    animation runs as soon as you click Play. This option would be unchecked if the
    animation is intended to be initiated by a script at some time during the game.


    To replace the idle AnimationClip with a dancing AnimationClip, click the circle
    to the right of “idle” to bring up the AnimationClip selection list ([Figure 5-8](#9781430248750_Ch05.xhtml#Fig8)).
    Select the AnimationClip named “dance.”


    ![9781430248750_Fig05-08.jpg](images/9781430248750_Fig05-08.jpg)


    [Figure 5-8](#9781430248750_Ch05.xhtml#_Fig8). An AnimationClip selection list


    Now when you click Play, the skeleton dances! ([Figure 5-9](#9781430248750_Ch05.xhtml#Fig9)).


    ![9781430248750_Fig05-09.jpg](images/9781430248750_Fig05-09.jpg)


    [Figure 5-9](#9781430248750_Ch05.xhtml#_Fig9). The dancing skeleton


    ## Make the Skeleton Dance Forever


    If you let the skeleton dance for a while, it eventually stops when the AnimationClip
    ends. But the AnimationClip can be set to loop. In the Inspector View of the `skeletonNormal`
    GameObject, click the reference to the dance AnimationClip in the `Animation`
    Component. The Project View will show the selected the AnimationClip and associated
    skeleton Mesh along with the skeleton’s other AnimationClips ([Figure 5-10](#9781430248750_Ch05.xhtml#Fig10)).


    ![9781430248750_Fig05-10.jpg](images/9781430248750_Fig05-10.jpg)


    [Figure 5-10](#9781430248750_Ch05.xhtml#_Fig10). Looping the animation


    The Inspector View displays a single stretch of animation data that’s split into
    the various AnimationClips. Select the dance clip in that list, and below, the
    `Wrap Mode` will display as `Default`. Change the `Wrap Mode` to `Loop` and click
    the `Apply` button (just below the `Wrap Mode` field).


    Now when you click Play again, the skeleton will dance, and dance, and dance.


    **Note:** This skeleton uses Unity’s Legacy animation system. You can verify this
    by clicking the `Rig` button shown in [Figure 5-10](#9781430248750_Ch05.xhtml#Fig10)
    and see that the `Legacy` check box is checked. Unity 4 introduced a new animation
    system called Mecanim, which, among other features, allows you to apply an animation
    to different skeletons (or avatars, as they are called in Mecanim).


    ## Watch the Hips


    Now that the skeleton is dancing properly, let’s improve the Main Camera view
    of the character. Notice how you seem to be looking at the character’s feet? That’s
    because the origin (or pivot point, as 3D modelers may know it) of the character
    is typically at the feet instead of the center of the model. This convention makes
    it easier to position the character so that its feet are correctly placed on the
    floor or ground.


    One way to have the Main Camera orbit around the midsection of the skeleton is
    to create a new GameObject for the MouseOrbit target and make it a child of the
    `skeletonNormal` GameObject. But `skeletonNormal` already has child GameObjects
    representing the bones of the skeleton. In fact, the hip bone, or rather the GameObject
    named `Bip01 Pelvis`, is perfect for the MouseOrbit target. Drag the `Bip01 Pelvis`
    GameObject into the `MouseOrbit Target` field and shorten the distance to 2 so
    that the skeleton fills up more of the screen when you play ([Figure 5-11](#9781430248750_Ch05.xhtml#Fig11)).
    Then when you click Play, in the Game View you’ll be looking at and orbiting the
    skeleton’s hips ([Figure 5-12](#9781430248750_Ch05.xhtml#Fig12)).


    ![9781430248750_Fig05-11.jpg](images/9781430248750_Fig05-11.jpg)


    [Figure 5-11](#9781430248750_Ch05.xhtml#_Fig11). The Inspector View of the Main
    Camera orbiting around the hips


    ![9781430248750_Fig05-12.jpg](images/9781430248750_Fig05-12.jpg)


    [Figure 5-12](#9781430248750_Ch05.xhtml#_Fig12). The Game View with the Main Camera
    looking at the hips


    By the way, you may have noticed that when you drag a GameObject into the Target
    field of the `MouseOrbit` script, the Inspector View appends (Transform) to the
    displayed GameObject name. If you examine the `MouseOrbit` script, you can see
    that the `target` variable is indeed declared to be of type `Transform`. Unity’s
    drag-and-drop system conveniently allows you to drag a GameObject from the Hierarchy
    View into a field of type `Transform` and automatically assigns the Transform
    Component of the GameObject to the variable.


    Other Components of a GameObject can be used as public variable types, too. But
    I like to keep the GameObject-Component relationship clear in my own scripts,
    so I stick to declaring variables as GameObjects in these situations and access
    the Components through the GameObjects.


    ## Add a Dance Floor


    The skeleton looks kind of strange dancing in the sky, so let’s give it a floor
    to dance on. You could make another Cube and scale it, but there’s a more suitable
    primitive GameObject that you can use—a Plane. Like the Cube, you can make a Plane
    from the Create submenu of the GameObject menu on the menu bar. But this time,
    try the Create button on the top left of the Hierarchy View ([Figure 5-13](#9781430248750_Ch05.xhtml#Fig13)).


    ![9781430248750_Fig05-13.jpg](images/9781430248750_Fig05-13.jpg)


    [Figure 5-13](#9781430248750_Ch05.xhtml#_Fig13). Creating a Plane using the Create
    menu in the Hierarchy View


    Note that all the items in the Create menu are available in the GameObject menu
    on the menu bar, but not all the items that can be created from the GameObject
    menu are available in the Hierarchy View Create menu.


    Now a Plane is listed in the Hierarchy View and displayed in the Scene View ([Figure
    5-14](#9781430248750_Ch05.xhtml#Fig14)). A Plane is like a flat Cube—it has a
    top and bottom but no sides and no height. If we change its x and z scale in its
    Transform Component, the Plane will stretch out, but changing the y scale (height)
    makes no difference.


    ![9781430248750_Fig05-14.jpg](images/9781430248750_Fig05-14.jpg)


    [Figure 5-14](#9781430248750_Ch05.xhtml#_Fig14). The Scene View of the new Plane


    Remember, the skeleton position was set to (0,0,0), and the skeleton’s origin
    is at the bottom, coinciding with the skeleton’s feet. Select the new Plane that’s
    now shown in the Hierarchy View, and then, in the Inspector View, set the Plane’s
    position also to (0,0,0), so that the floor is placed at the skeleton’s feet.
    Specifically, the y positions (height) of the feet and floor that have to match
    up.


    That’s a pretty bland-looking floor, which could benefit from a Material with
    a texture. The Free Artskillz Texture Pack is already imported and used for the
    Cube, so you might just as well use it here for the floor. With the cubes, you
    just dragged a texture onto the Cube in the Hierarchy View and then modified the
    resulting Material in the Inspector View.'
