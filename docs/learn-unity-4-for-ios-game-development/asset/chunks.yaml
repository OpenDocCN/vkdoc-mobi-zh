    # 我们尚未达到拥有可玩性的阶段，但“创建游戏玩法”章节中有一个关于“变换”的页面，正如我们所见，即便是为了放置静态游戏对象，理解变换也是基础。


    ## 参考手册


    相较于 Unity 手册，参考手册的讲解更为深入，它详细描述了每个组件，解释了其属性并记录了组件的使用方法。参考手册还记录了资源类型，并对游戏对象进行了说明。


    通常来说，你应该为你使用的每个组件和资源类型阅读参考手册。请记住，在检视面板中每个组件上都有一个帮助图标，点击后会跳转到对应的参考手册页面。与 Unity
    手册一样，参考手册不仅可以通过 Unity 帮助菜单访问，还可以在 Unity 网站的“学习”标签页下找到（可直接通过 `http://docs.unity3d.com/`
    访问）。参考手册的“设置管理器”部分包含一个关于渲染设置的页面，本章中的天空盒正是在此处分配的。“变换组件”部分自然只列出了一个组件，即变换组件，它附加于每个游戏对象之上。


    “网格组件”部分则更有趣，它描述了任何带有网格的游戏对象（例如本章中创建的立方体）所必需的 MeshFilter 和 MeshRenderer 组件。“渲染组件”部分则更加丰富，其中介绍了摄像机组件及其相关的
    GUILayer 组件和 FlareLayer。灯光组件也在此处进行了说明。尽管资源并非真正的组件，但参考手册有一个名为“资源组件”的部分，列出了各种资源类。在本章中，光晕、材质、网格和
    Texture2D 被整合到了场景中（请记住，天空盒本质上是一种材质）。


    最有趣的阅读内容是“内置着色器指南”部分，它详细（并配有图片）介绍了所有内置着色器，从简单快速的到非常华丽的。本章中的立方体最初使用默认的漫反射着色器，后来替换为高级的凹凸贴图镜面反射着色器。如本章所述，着色器实际上是一个程序，因此如果你找不到满足需求的内置着色器，可以按照“着色器参考”部分中的示例和说明自行编写。


    ## 资源商店


    本章开启了本书中从 Unity 资源商店使用免费资源的实践。我建议定期浏览资源商店，以查看最新发布的内容。除了免费的纹理、模型和脚本外，还有许多价格合理的资源包，可以为你节省大量时间和工作。资源商店也可以通过常规网页浏览器在
    `http://assetstore.unity3d.com/` 查看（但无法购买或下载任何资源）。


    ## 计算机图形学


    计算机图形学是一个庞大而复杂的研究领域。本章涉及了 3D 模型、纹理、凹凸贴图、光晕、天空盒，而这仅仅是个开始。因此，非常值得进一步阅读关于基础（和高级）计算机图形学的资料，例如由
    Tomas Akenine-Möller、Eric Haines 和 Naty Hoffman 编写的广受欢迎且内容全面的《实时渲染》一书。Mark Haigh-Hutchinson
    的《实时摄像机》则是一本专门探讨虚拟摄像机及其控制方案的专著。


    我不会涉及创建可导入 Unity 的资源的具体过程，但 Luke Ahearn 有两本书可能对你有所帮助：《3D 游戏纹理：使用 Photoshop 创建专业游戏美术》和《3D
    游戏环境：创建专业的 3D 游戏世界》。从 Wes McDermott 的《使用 Unity 为 iPhone 创建 3D 游戏美术》这个书名，你就能看出它是本书的合适补充读物。


    # 第 4 章：让它动起来：为立方体编写脚本


    既然你已经知道如何通过放置游戏对象来构建静态 3D 场景，那么是时候通过为游戏对象添加运动来让场景变得动态且更有趣了。毕竟，一个 3D 图形场景固然不错，但一个带有动画的
    3D 图形场景才能更胜一筹！


    不过，使用动画数据并非移动游戏对象的唯一方式。让游戏对象具备物理属性，它就会在碰撞和作用力（包括重力）的作用下移动。脚本也可以通过改变游戏对象变换组件中的位置和/或旋转值来移动它。实际上，任何移动游戏对象的方法——无论是动画、物理还是脚本——最终都会改变变换组件，而该组件始终代表游戏对象的位置、旋转和缩放。


    本章将重点介绍如何通过脚本移动游戏对象，演示如何旋转上一章创建的静态立方体，甚至介绍如何使用开源 iTween 库实现补间动画。在此过程中，我将介绍 Unity
    脚本系统的基本概念和工具（编辑和调试）。


    你将编写的脚本可在 `http://learnunity4.com/` 上本章对应的项目文件中找到，但我建议你从头开始创建它们。只有当你亲自输入代码时，你才最有可能理解代码是如何工作（以及为何不工作）的。


    ## 整理资源


    在项目视图中，当资源按类型分区时，查看和浏览起来会更加方便。因此，在开始添加脚本之前，现在是个很好的时机来整理项目，并为脚本和纹理创建一些文件夹。


    如果你上一章结束后未打开 Unity 编辑器，请启动它，并确保已加载上一章的项目并打开了立方体场景。然后点击项目视图左上角的“创建”按钮（图 4-1），弹出一个菜单，显示可以添加到项目中的新资源类型（或者，你也可以右键单击项目视图并选择“创建”子菜单）。在菜单中选择“文件夹”项，一个名为“新文件夹”的文件夹会出现在项目视图中。将此文件夹重命名为“Textures”，并将上一章导入的任何纹理（例如我的猫咪照片）拖入其中。虽然你目前还没有创建任何脚本，但也请一并创建一个“Scripts”文件夹。


    ![9781430248750_Fig04-01.jpg](img/9781430248750_Fig04-01.jpg)


    图 4-1. 在项目视图中创建 Textures 文件夹


    ## 创建脚本


    选择新添加的“Scripts”文件夹，然后同样从项目视图的“创建”菜单中，选择“JavaScript”（图 4-2）。一个名为“New Behaviour”（美国读者，你们得习惯这个英式拼写）的脚本将出现在“Scripts”文件夹中。如果你不小心将新脚本文件创建在了“Scripts”文件夹之外，只需将脚本拖入该文件夹即可。


    **注意** 尽管项目视图的“创建”菜单中显示的是“Javascript”（仅首字母大写），但我将按“JavaScript”来称呼它，这是官方的大小写形式，也用于
    Unity 文档中（谁知道呢，Unity 的某个更新随时可能修正菜单的拼写）。此外，本书将使用“a JavaScript”来指代一个脚本，而不是更准确但说起来更拗口的“a
    JavaScript script”。


    ![9781430248750_Fig04-02.jpg](img/9781430248750_Fig04-02.jpg)


    图 4-2. 创建 JavaScript 文件


    由于这个新文件是一个 JavaScript，它带有`.js`扩展名。项目视图不显示文件扩展名，但从其图标可以辨别脚本的语言（图 4-3）。如果脚本被选中，其完整名称会显示在项目视图底部的行中。


    ![9781430248750_Fig04-03.jpg](img/9781430248750_Fig04-03.jpg)

