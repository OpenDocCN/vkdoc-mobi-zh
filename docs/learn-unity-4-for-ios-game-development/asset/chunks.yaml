  trans: "\n请记得持续学习并参与 Unity 社区，在 Unity 论坛和 Unity 问答网站上贡献与求助，同时别忘了查阅 Unity 维基。向社区推广你的作品是没问题的（Unity\
    \ 论坛中有“展示”版块），也可以请他人帮忙宣传，但切记要礼尚往来！\n\n在我用 Unity iOS 开发自己项目的过程中，意外结识了一群开发者。我们能够互相安慰、庆祝并分享宝贵的技巧。我不打算一一列举他们的名字，但你可以在我推特关注列表中找到他们：`@fugugames`。顺便说一句，Twitter\
    \ 是与 Unity 开发者进行更私人层面交流的另一个好途径。我也通过 Twitter 与许多客户沟通，并且成功为我的游戏设置了 Facebook 产品页面（尤其是\
    \ `HyperBowl`）。虽然应用客户有时以毒舌著称，但我发现他们大多数人都很支持并同情我们独立开发者，而且如果我们允许他们参与，他们也会很热情地成为这个过程的一部分。事实上，我从中受益良多：得到了大量免费的\
    \ QA 测试和一些本地化（翻译）帮助，更不用说许多反馈了。所以，快设置好你的 Twitter 和 Facebook 粉丝专页，开始交流吧！\n\n最重要的是，享受乐趣。其他任何回报都是额外的奖励！\n\
