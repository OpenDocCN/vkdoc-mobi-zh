    [Figure 5-20](#9781430248750_Ch05.xhtml#_Fig20). The adjusted Quality Settings
    for Shadows


    Now when you click Play, you have a dancing shadow that should look pretty good!
    ([Figure 5-21](#9781430248750_Ch05.xhtml#Fig21)).


    ![9781430248750_Fig05-21.jpg](images/9781430248750_Fig05-21.jpg)


    [Figure 5-21](#9781430248750_Ch05.xhtml#_Fig21). The Game View of the skeleton
    with a shadow


    Add Music


    No dance demo would be complete without music. Fortunately, there’s plenty of
    free music available in the Asset Store. One music package I’ve used frequently
    is Gianmarco Leone’s General Music Set. If you enter “general music” in the Project
    View search field, all of the AudioClips in that package show up in the results
    ([Figure 5-22](#9781430248750_Ch05.xhtml#Fig22)). Click any one of them, and then
    import the package from the Inspector View.


    ![9781430248750_Fig05-22.jpg](images/9781430248750_Fig05-22.jpg)


    [Figure 5-22](#9781430248750_Ch05.xhtml#_Fig22). Searching for the General Music
    Set in the Asset Store


    After the AudioClips install in the Project View ([Figure 5-23](#9781430248750_Ch05.xhtml#Fig23)),
    select the AudioClip named Caribbean Isle. I think it’s got a nice beat, and you
    can dance to it. But you can decide for yourself by previewing the audio. In the
    Inspector View ([Figure 5-24](#9781430248750_Ch05.xhtml#Fig24)), click the Play
    button at the bottom, above the stereo waveform display, to listen to the AudioClip.
    While you’re there, since this AudioClip will be used essentially as background
    music, not a sound effect with a position, uncheck the 3D Sound checkbox and click
    the Apply button to reimport the sound.


    ![9781430248750_Fig05-23.jpg](images/9781430248750_Fig05-23.jpg)


    [Figure 5-23](#9781430248750_Ch05.xhtml#_Fig23). The Project View of the General
    Music Set


    ![9781430248750_Fig05-24.jpg](images/9781430248750_Fig05-24.jpg)


    [Figure 5-24](#9781430248750_Ch05.xhtml#_Fig24). The Inspector View of an AudioClip


    Now you’re ready to add the AudioClip to the scene. Simply drag the AudioClip
    from the Project View into the Hierarchy View, and a same-named GameObject will
    automatically be created ([Figure 5-25](#9781430248750_Ch05.xhtml#Fig25)).


    ![9781430248750_Fig05-25.jpg](images/9781430248750_Fig05-25.jpg)


    [Figure 5-25](#9781430248750_Ch05.xhtml#_Fig25). Audio in the scene'
  trans: '

    这次，直接进入平面的检查器视图（图 5-15），并将其着色器更改为`Bumped Specular`。然后从 Free Artskillz 纹理包中拖拽一个主纹理及其相关的凹凸贴图（法线贴图）纹理（图中我从该包的
    Fantasy 文件夹中选择了`Floor03`和`Floor03_n`纹理）。


    ![9781430248750_Fig05-15.jpg](img/9781430248750_Fig05-15.jpg)


    图 5-15. 编辑平面的位置和材质


    现在，点击`Play`，骨骼就会在地板上跳舞！（图 5-16）。


    ![9781430248750_Fig05-16.jpg](img/9781430248750_Fig05-16.jpg)


    图 5-16. 带有纹理的平面上跳舞的骨骼


    ## 添加阴影（专业版）


    第 3 章中讨论的光组件属性之一是`Shadow Type`。既然场景中现在有了可以投射阴影的地面，让我们来试试这个功能。


    **注** 动态阴影（根据阴影投射物移动而移动的阴影）是`Unity Pro`和`Unity iOS Pro`的功能，所以如果你当前没有运行 Unity Pro，仍然可以跟随本练习操作，只是看不到预期的阴影。


    选择点光源（在层级视图或场景视图中均可），然后在检查器视图中（图 5-17），将`Shadow Type`从`None`改为`Soft Shadows`。这能为阴影提供漂亮的、柔和的模糊边缘（阴影的*半影*），看起来比`Hard
    Shadows`硬边缘的效果更好。


    ![9781430248750_Fig05-17.jpg](img/9781430248750_Fig05-17.jpg)


    图 5-17. 点光源转换为带有柔和阴影的平行光


    现在你应该将类型从`Point Light`改为`Directional Light`。点光源可以投射阴影，但只能投射`Hard Shadows`，并且仅在`Deferred
    Mode`渲染时有效，而`Deferred Mode`在`Unity iOS`中不可用。实际上，`Soft Shadows`在`Unity iOS`中完全不可用，但它们看起来效果很好，所以这里我们还是尝试一下。


    点光源从一个位置向所有方向辐射光线，而平行光则被视为无限远，因此其位置无关紧要，但旋转角度很重要。因此，在变换组件中，可以将位置设为`0,0,0`（对于平行光来说位置无关紧要，但这样比随意设置一个位置更整洁），并将旋转设为`25,0,0`，表示光源绕
    x 轴旋转了 25 度。换句话说，光源从水平方向向下倾斜了 25 度。


    除了直接输入旋转角度，你也可以在场景视图（图 5-18）中手动旋转光源：选中光源，点击 Unity 编辑器左上角按钮栏中的旋转工具（左数第三个按钮），然后拖动光源上代表
    x 轴旋转的圆圈。


    ![9781430248750_Fig05-18.jpg](img/9781430248750_Fig05-18.jpg)


    图 5-18. 在场景视图中旋转平行光


    没有必要使用`Move`工具（按钮栏左数第二个按钮），因为平行光的位置无关紧要，但如果你将它向上并移远一些，使其明显指向骨骼，会有助于可视化光源照亮了什么。


    **提示** 你可以像第 3 章中让主摄像机对准立方体那样，来对准一个平行光或聚光灯（或任何可对准的物体）。在这种情况下，你可以先选中骨骼，按`F`键`Frame
    Selected`，点击左上角工具栏最左边的按钮进入场景视图的`Hand`工具模式，然后在场景视图中`alt+点击+拖拽`，直到场景视图的摄像机指向你希望光线指向的方向。然后选中点光源，并从
    GameObject 菜单中调用`Align to View`。


    如果此时点击`Play`，你应该能看到阴影，但即便将`Strength`设置为`1`，阴影仍有改进空间。Unity 使用一种称为*阴影贴图*的技术来生成阴影，阴影质量取决于阴影贴图的分辨率。光组件中阴影贴图分辨率的默认设置是`Use
    Quality Settings`，你可以在检查器视图中覆盖此设置。不过，我们还是通过从 Edit 菜单选择`Project Settings > Quality`来进入质量设置吧（图
    5-19）。


    ![9781430248750_Fig05-19.jpg](img/9781430248750_Fig05-19.jpg)


    图 5-19. 从 Edit 菜单选择 Quality Settings


    质量设置管理器会出现在检查器视图中（图 5-20），显示一个质量设置列表以及每个构建平台选中的质量设置。桌面平台的默认质量设置是`Good`。在平台设置表格中选中那一行，这样`Good`的具体设置就会显示出来。特别是`Shadow`设置控制了阴影质量。因此，将`Shadow
    Resolution`改为`Very High Resolution`，并将`Shadow Distance`降低到`10`，因为较短的阴影距离会产生更好的阴影分辨率（但如果太短，阴影将无法渲染）。


    ![9781430248750_Fig05-20.jpg](img/9781430248750_Fig05-20.jpg)


    图 5-20. 调整后的阴影质量设置


    现在，当你点击`Play`时，你会看到一个相当不错的跳舞阴影！（图 5-21）。


    ![9781430248750_Fig05-21.jpg](img/9781430248750_Fig05-21.jpg)


    图 5-21. 带有阴影的骨骼的游戏视图


    ## 添加音乐


    没有音乐的舞蹈演示是不完整的。幸运的是，资源商店（Asset Store）中有很多免费的音乐。我经常使用的一个音乐包是 Gianmarco Leone 的
    General Music Set。如果在项目视图搜索框中输入`"general music"`，该包中的所有`AudioClips`都会显示在结果中（图
    5-22）。点击其中任意一个，然后从检查器视图导入该包。


    ![9781430248750_Fig05-22.jpg](img/9781430248750_Fig05-22.jpg)


    图 5-22. 在资源商店中搜索 General Music Set


    在`AudioClips`安装到项目视图中后（图 5-23），选择名为`Caribbean Isle`的`AudioClip`。我认为它节拍不错，适合跳舞。但你可以通过预览音频自行决定。在检查器视图中（图
    5-24），点击底部的`Play`按钮（位于立体声波形显示之上），来试听这个`AudioClip`。既然这个`AudioClip`将主要用作背景音乐，而不是带有位置信息的音效，那么请取消勾选`3D
    Sound`复选框，并点击`Apply`按钮重新导入音效。


    ![9781430248750_Fig05-23.jpg](img/9781430248750_Fig05-23.jpg)


    图 5-23. General Music Set 的项目视图


    ![9781430248750_Fig05-24.jpg](img/9781430248750_Fig05-24.jpg)


    图 5-24. 一个 AudioClip 的检查器视图


    现在你已经准备好将`AudioClip`添加到场景中了。只需将`AudioClip`从项目视图拖拽到层级视图中，一个同名的`GameObject`就会自动创建（图
    5-25）。


    ![9781430248750_Fig05-25.jpg](img/9781430248750_Fig05-25.jpg)


    图 5-25. 场景中的音频

