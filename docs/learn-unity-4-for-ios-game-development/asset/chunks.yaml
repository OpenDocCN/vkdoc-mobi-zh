    # 这里假设每个`Pin`都有一个名为`Pin`的标签，因此你可以检测`Pin`是否与另一个`Pin`发生碰撞。如果`Pin`没有与其他`Pin`碰撞，那么它一定是被`Ball`击中或者掉落在`Floor`上，此时脚本会播放碰撞音效。如果`Pin`被另一个`Pin`击中，则需要决定哪个`Pin`来播放碰撞音效，否则它们会同时播放声音。这里使用了一个简单的技巧来进行仲裁。Unity
    中的每个`Object`都有一个唯一的 ID 编号，可以通过`Object`函数`GetInstanceID`获取。脚本中使用的规则是：ID 编号较低的`Pin`获胜，并播放碰撞音效。


    要将`FuguPinSound`脚本附加到`Pin`预制体上，请在项目视图中选中该预制体，然后在检查器视图中使用“添加组件”按钮选择脚本。当你在检查器视图中选中`Pin`预制体时，请将其标签设置为`Pin`，这与`FuguPinSound`脚本的预期一致。与创建`Floor`标签并分配给`Floor`游戏对象的方式相同，在标签菜单中选择“添加标签”，在标签管理器中添加一个名为`Pin`的标签（确保你创建的是一个新标签，而不是新层级），然后再次选中`Pin`预制体，以便通过标签菜单选择新的`Pin`标签。顺便提一下，这是一个如何用标签识别一组元素（而非像对`Floor`那样进行唯一命名）的示例。


    现在，我们`BarrelPin`预制体中的`Barrel`游戏对象在检查器视图中应该如图 7-34 所示。


    ![9781430248750_Fig07-34.jpg](img/9781430248750_Fig07-34.jpg)


    图 7-34. 附加到`BarrelPin`预制体上的`AudioSource`和`FuguPinSound`脚本


    现在，当你点击“播放”并让球滚向桶时，随着桶的弹跳，会有悦耳的硬币音效响起！


    ## 进一步探索


    此时，保龄球游戏已经开始有点保龄球的样子了（而在上一章结束时，我们最多只能称之为一个滚球游戏）。但是，尽管玩家可以让球滚动并击倒保龄球瓶，我们仍然没有游戏规则。敬请期待下一章，届时脚本编写将变得更加深入。事实上，本章是一个转折点，趋势是脚本内容越来越多，而新组件的介绍越来越少。因此从现在起，你应将大部分时间花在
    Unity 文档的“脚本参考”部分。


    ### 脚本参考


    `Object`类中的`Instantiate`函数被引入，用于在运行时创建保龄球瓶。这个函数通常用于从预制体生成游戏对象。在其他游戏中，你可能会使用`Instantiate`来生成任何东西，从可拾取物品到
    NPC。该函数在“脚本概述”中有描述，但“运行时类”中的相关页面提供了更详细的信息。


    一个新的回调函数`Awake`被引入，作为`Start`回调的替代方案。`MonoBehaviour`的碰撞回调函数`OnCollisionEnter`、`OnCollisionStay`和`OnCollisionExit`在上一章中介绍过，但本章再次用于滚动和碰撞音效。`Collision`类用于获取碰撞信息：相对速度、被碰撞的游戏对象。其他数据，如实际接触点，也可用。


    `Rigidbody`类的页面值得完整阅读。它的变量大致对应于检查器视图中可用的属性，除了你用来推动球的`AddForce`函数外，还有许多相关函数：`AddRelativeForce`、`AddTorque`、`AddRelativeTorque`、`AddExplosionForce`、`AddForceAtPosition`。


    `Transform`类再次被使用，这次是通过检查`Transform.position`来确定球是否滚出了 Floor。由于提到了四元数，请查看`Transform`中的`rotation`和`localRotation`变量，并将其与`eulerAngles`和`localEulerAngles`变量进行比较。在`GameObject`类中，`SendMessage`和`BroadcastMessage`函数被用于调用其他游戏对象中的`ResetPosition`函数。还有一个`SendMessageUpward`函数，其工作方式类似于`BroadcastMessage`，只是消息是向游戏对象的层级结构上层发送，而不是向下层发送。这些消息函数也在`Component`类中定义。


    `AudioSource`函数被用于播放和停止音频剪辑。如果你想优化声音代码，其他函数也很有用。例如，HyperBowl 的滚动声音代码会根据球的速度改变声音的音量（使用`AudioSource.volume`变量），这不仅提供了更好的滚动声音，而且在停止时能实现更柔和的音效切断。


    ### 资源


    我们看到资源商店提供了丰富的免费桶模型和声音库。如果不局限于免费资源，还有更多选择。


    尽管资源商店还没有保龄球瓶模型，但在 3D 模型市场上，如`http://Turbosquid.com/`，不难找到一些。包括保龄球音效在内的免费音频，可以在知识共享许可的`http://freesound.org/`上找到。


    # 第 8 章：开始游戏！编写游戏脚本


    经过前几章的塑造，我们的保龄球游戏已经开始看起来像一个真正的保龄球游戏了！它有了保龄球、保龄球瓶（或者说是上一章添加的桶）、游戏控制和游戏物理。但它仍然更像一个玩具而非游戏，因为它缺少游戏规则和计分系统。这些问题将在本章通过大量的脚本编写来解决。大部分工作将在游戏控制器脚本`FuguBowl.js`中完成，该脚本将包含一个以有限状态机（FSM）状态形式布局的完整保龄球游戏逻辑。仅计分规则就足够复杂，因此这些规则将被封装在一个名为`FuguBowlPlayer.js`的脚本中。


    好消息是，除了`FuguBowlPlayer`脚本之外，本章这次没有增加额外的资源。坏消息是，需要输入大量新代码，尤其是在游戏控制器脚本中。虽然你可能很想直接从本章项目的在线版本中复制`FuguBowl`脚本（网址为`http://learnunity4.com/`），但如果你从头开始，逐块（或者以
    FSM 的情况，逐个状态地）构建它，将更容易掌握为未来项目实现游戏逻辑的要领。新的`FuguBowlPlayer`脚本也是如此。


    ## 游戏规则


    首先，让我们快速回顾一下保龄球的规则。一局游戏由十轮组成。在每一轮中，你有两次投球机会来击倒全部十个球瓶。如果第一次投球就击倒了所有十个球瓶，这被称为“全中”，你将进入下一轮。如果通过两次投球击倒了全部十个球瓶，则被称为“补中”。在第十轮，如果你获得了补中或全中，你将获得一个额外的第三次（也是最后一次）投球机会。


    最终的游戏得分是每一轮得分之和。一轮的得分是该轮击倒的球瓶数，除非是全中或补中。如果是补中，则得分为击倒的球瓶数（十个）加上下一次投球击倒的球瓶数。如果是全中，同样得分为十，但要加上接下来两次投球击倒的球瓶数。因此，一场“完美”比赛，即连续
    12 个全中，总分为 300 分（我把这个计算留作读者的练习）。


    ## 游戏计分

    '
- fmt: '# `FuguBowl` 中的玩家与帧分数


    `FuguBowl`脚本已经定义了一个代表我们游戏的类，但将有风度分数的代码封装在一个玩家类中是合理的，因为从概念上讲存在一个玩家（并且可能有多个玩家，尽管在这个特定游戏中并非如此），而分数与玩家相关联。


    此外，保龄球的计分规则并不简单。将保龄球分数计算的代码放在一个单独的脚本中，不仅使游戏控制器脚本更小、更易读，而且还可以使分数代码在其他保龄球游戏中重用。


    首先，创建一个新的JavaScript，将其命名为`FuguBowlPlayer`，并放置在`Scripts`文件夹中（[图 8-1](#9781430248750_Ch08.xhtml#Fig1)）。


    ![9781430248750_Fig08-01.jpg](images/9781430248750_Fig08-01.jpg)


    [图 8-1](#9781430248750_Ch08.xhtml#_Fig1) 创建`FuguBowlPlayer`脚本


    ## 帧分数（Frame Score）


    在`FuguBowlPlayer`脚本中，在实现`FuguBowlPlayer`类之前，让我们从一个名为`FuguBowlScore`的支持类开始，该类表示单个保龄球帧的分数（[清单
    8-1](#9781430248750_Ch08.xhtml#list1)）。它足够小，并且本身不是一个`MonoBehaviour`（例如，没有`Start`或`Update`回调），因此将其添加到`FuguBowlPlayer`脚本中就可以了。


    [清单 8-1](#9781430248750_Ch08.xhtml#_list1) `FuguBowlPlayer.js`中的`FuguBowlScore`类


    ```

    class FuguBowlScore {

           var ball1:int; // 第一次投球击倒的球瓶数

           var ball2:int; // 第二次投球击倒的球瓶数

           var ball3:int; // 第三次投球击倒的球瓶数

           var total:int; // 该帧的总分（可能包含后续投球）


    function Clear() {

                   ball1 = -1;

                   ball2 = -1;

                   ball3 = -1;

                   total = -1;

           }


    function IsSpare():boolean {

                   // 不处理第三次投球时的补中

                   return !IsStrike() &&

                          (ball1 + ball2 == 10);

           }


    function IsStrike():boolean {

                  return ball1 == 10;

           }

    }

    ```


    `FuguBowlScore`类非常简单，不继承自任何其他类（它可以被定义为结构体而不是类，只是JavaScript不支持定义新的结构体）。该类包含实例变量，分别代表第一次投球、第二次投球以及（仅在第10帧中相关的）奖励球的分数。`FuguBowlScore`还有一个变量用于保存该帧的总分，如果当前帧是补中或全中，则该总分可能取决于后续投球的结果。


    每个变量都需要一种方法来指示其分数尚未计算。`ball1`、`ball2`和`ball3`的分数在该次投球完成之前是不可用的。总分在该帧的投球完成之前是不可用的，即使已完成，如果结果是补中或全中，分数仍然需要等到下一球或下两球投出后才能计算。


    将分数值保留为零是行不通的，因为当玩家没有击倒任何球瓶时，零是一个有效的分数。但投球不可能出现负数分数，因此使用`-1`作为分数尚未计算的指示符是可行的。`FuguBowlScore`中的`Clear`函数通过将所有变量设置为这个数字来初始化该帧。


    除了`Clear`函数之外，`FuguBowlScore`类还有另外两个成员函数。`IsStrike`如果该帧中投出了全中则返回`true`。这可以通过检查第一次投球击倒的球瓶数是否为十来轻松测试。`IsSpare`函数稍微复杂一些；如果第一次和第二次投球击倒的球瓶数之和为十，但仅当该帧中没有全中时（换句话说，不是第一次投球击倒十瓶且第二次投球击倒零瓶的情况），它才返回`true`。


    注意：在两个函数声明中添加了`:boolean`。这清楚地表明每个函数返回一个`boolean`值，尽管编译器可以从代码中推断出返回类型。


    ## 玩家分数（Player Score）


    定义了`FuguBowlScore`类之后，我们现在可以添加`FuguBowlPlayer`类，它将聚合所有帧的分数以得到游戏总分（[清单 8-2](#9781430248750_Ch08.xhtml#list2)）。与`FuguBowlScore`一样，`FuguBowlPlayer`类被显式声明，即使它与脚本文件同名，并且它不继承自`MonoBehaviour`（否则类声明会包含`extends
    MonoBehaviour`）。除了没有Unity回调函数之外，这意味着`FuguBowlPlayer`类不是`Component`的子类，因此该脚本不能附加到`GameObject`上。换句话说，`FuguBowlPlayer`脚本充当一个代码库，包含其他脚本使用的类。


    [清单 8-2](#9781430248750_Ch08.xhtml#_list2) `FuguBowlPlayer.js`中`FuguBowlPlayer`类的开始部分


    ```

    class FuguBowlPlayer {

           var scores:FuguBowlScore[]; // 游戏的全部10帧


    // 构造函数

           function FuguBowlPlayer() {

                  scores = new FuguBowlScore[10];

                  for (var i:int=0; i<scores.length; ++i) {

                          scores[i] = new FuguBowlScore();

                  }

                  ClearScore();

           }


    function ClearScore() {

                  for (var score:FuguBowlScore in scores) {

                          score.Clear();

                  }

           }


    function IsSpare(frame:int):boolean {

                  return scores[frame].IsSpare();

           }


    function IsStrike(frame:int):boolean {

                  return scores[frame].IsStrike();

           }

    }

    ```


    `FuguBowlPlayer`类自然包含关于玩家的信息，例如，可以有一个`String`变量用于存储玩家的名字。然而，就本书的目的而言，我们将仅限于跟踪玩家的保龄球得分。因此，该类只有一个实例变量`scores`，它是一个由`FuguBowlScore`对象组成的内置数组。数组中的每个`FuguBowlScore`元素代表保龄球游戏一帧的分数。


    **注意**：内置数组通过索引访问，就像`Array`类的实例一样（用于`FuguBowl.js`中的`pins`变量）。内置数组的访问速度比`Array`实例快得多，并且当声明为公共变量时，可以在Inspector视图中编辑。但是，与`Array`实例不同，内置数组在运行时无法调整大小。


    类定义中的函数`FuguBowlPlayer`与类同名，这意味着它是一个*构造函数（constructor）*，一个在创建该类的实例时调用的特殊函数。显式定义的构造函数并非总是必需的（`FuguBowlScore`就没有），甚至在`MonoBehaviour`中是禁止的。但在这种情况下，构造函数是必要的，因为每个新创建的`FuguBowlPlayer`都需要创建其`scores`数组。因此，`FuguBowlPlayer`构造函数创建一个包含十个条目的内置数组，声明为`FuguBowlScore`类型，并用新创建的`FuguBowlScore`实例填充该数组。


    构造函数还调用了一个函数`ClearScore`，该函数依次调用每个`FuguBowlScore`对象上的`Clear`，确保它们都从指示未登记任何分数的状态开始。`FuguBowlPlayer`类还有`IsSpare`和`IsStrike`函数，它们对指定的`FuguBowlScore`对象调用同名的函数，该对象通过传入的参数在`scores`数组中进行索引。由于数组索引从零开始，游戏的十帧由索引0-9表示。'
  raw: 'The `FuguBowl` script already defines a class that represents our game, but
    it makes sense to encapsulate the score code in a player class, since conceptually
    there is a player (and potentially more than one, although not in this particular
    game) and the score is associated with the player.


    Moreover, the scoring rules for bowling are not simple. Placing the code for bowling
    score calculation in a separate script not only keeps the game controller script
    smaller and more readable, but it also allows reuse of the score code for other
    bowling games.


    To begin, create a new JavaScript, name it `FuguBowlPlayer`, and place it in the
    Scripts folder ([Figure 8-1](#9781430248750_Ch08.xhtml#Fig1)).


    ![9781430248750_Fig08-01.jpg](images/9781430248750_Fig08-01.jpg)


    [Figure 8-1](#9781430248750_Ch08.xhtml#_Fig1). Creating the FuguBowlPlayer script


    The Frame Score


    In the `FuguBowlPlayer script`, before implementing the `FuguBowlPlayer` class,
    let’s start with a supporting class called `FuguBowlScore` that represents the
    score for a single bowling frame ([Listing 8-1](#9781430248750_Ch08.xhtml#list1)).
    It’s small enough and not a `MonoBehaviour` in its own right (no `Start` or `Update`
    callbacks, for example), so it’s fine to just add it to the `FuguBowlPlayer` script.


    [Listing 8-1.](#9781430248750_Ch08.xhtml#_list1)  The FuguBowlScore Class in FuguBowlPlayer.js


    ```

    class FuguBowlScore {

           var ball1:int; // pins down for ball 1

           var ball2:int; // pins down for ball 2

           var ball3:int; // pins down for ball 3

           var total:int; // total score for this frame (may include future rolls)


    function Clear() {

                   ball1 = -1;

                   ball2 = -1;

                   ball3 = -1;

                   total = -1;

           }


    function IsSpare():boolean {

                   // doesn''t handle spare on ball3

                   return !IsStrike() &&

                          (ball1 + ball2 == 10);

           }


    function IsStrike():boolean {

                  return ball1 == 10;

           }

    }

    ```


    The `FuguBowlScore` class is very simple and doesn’t inherit from any other class
    (it could well be defined as a struct instead of a class, except JavaScript doesn’t
    support defining new structs). The class includes instance variables that represent
    the score for the first ball rolled, the second ball, and (only relevant in the
    tenth frame), the bonus ball. `FuguBowlScore` also has a variable to hold the
    total score for the frame, which can depend on the result of future rolls if the
    current frame is a spare or strike.


    Each of the variables needs a way to indicate that its score hasn’t been calculated.
    The scores for `ball1`, `ball2`, and `ball3` aren’t available until that ball
    has been rolled. The total score isn’t available until the bowling for this frame
    is complete, and even then, if the result has been a spare or strike, the score
    still cannot be calculated until the next ball or two has been rolled.


    Leaving the score values as zero won’t work, since zero is a valid score when
    the player doesn’t knock down any pins. But there’s no way a negative score can
    be rolled, so -1 will work fine as an indicator a score has not been calculated,
    yet. The `Clear` function in `FuguBowlScore` initializes this frame by setting
    all the variables to this number.


    Besides the `Clear` function, the `FuguBowlScore` class has two other member functions.
    `IsStrike` returns true if there has been a strike rolled in this frame. That
    can be tested easily by seeing if the number of pins knocked down with the first
    ball is ten. The `IsSpare` function is only slightly more complex; it returns
    true if the sum of the pins knocked down by the first and second balls is ten,
    but only if there isn’t a strike in this frame (in other words, if you’re not
    adding ten pins from the first ball and zero pins from the second ball).


    Notice the `:boolean` that is added to the two function declarations. That makes
    it clear that each of these functions returns a `boolean` value, although the
    compiler can infer the return type from the code.


    The Player Score


    With the FuguBowlScore class defined, now we’re ready to add the `FuguBowlPlayer`
    class, which will aggregate the frame scores for the total game score ([Listing
    8-2](#9781430248750_Ch08.xhtml#list2)). As with `FuguBowlScore`, the `FuguBowlPlayer`
    class is declared explicitly, even though it has the same name as the script file,
    and it doesn’t inherit from `MonoBehaviour` (otherwise the class declaration would
    include `extends MonoBehaviour`). Besides not having any Unity callback functions,
    this means the `FuguBowlPlayer` class is not a subclass of `Component` and therefore
    the script can’t be attached to a GameObject. In other words, the `FuguBowlPlayer`
    script acts as a code library containing classes used by other scripts.


    [Listing 8-2.](#9781430248750_Ch08.xhtml#_list2)  The Beginnings of the FuguBowlPlayer
    Class in FuguBowlPlayer.js


    ```

    class FuguBowlPlayer {

           var scores:FuguBowlScore[]; // all 10 frames of the game


    // constructor

           function FuguBowlPlayer() {

                  scores = new FuguBowlScore[10];

                  for (var i:int=0; i<scores.length; ++i) {

                          scores[i] = new FuguBowlScore();

                  }

                  ClearScore();

           }


    function ClearScore() {

                  for (var score:FuguBowlScore in scores) {

                          score.Clear();

                  }

           }


    function IsSpare(frame:int):boolean {

                  return scores[frame].IsSpare();

           }


    function IsStrike(frame:int):boolean {

                  return scores[frame].IsStrike();

           }

    }

    ```


    The `FuguBowlPlayer` class naturally contains information about the player, and,
    for example, could have a `String` variable for the player’s name. However, for
    the purposes of this book, we’ll confine ourselves to tracking the player’s bowling
    score. Therefore, the class has just one instance variable, `scores`, which is
    a built-in array of `FuguBowlScore` objects. Each `FuguBowlScore` element in the
    array represents the score for one frame of the bowling game.


    **Note**   Built-in arrays are accessed with indices just like instances of the
    `Array` class (used for the pins variable in `FuguBowl.js`). Built-in arrays have
    much faster access than instances of `Array` and can be edited in the Inspector
    View when declared as public variables. However, built-in arrays, unlike instances
    of `Array`, are not resizable at runtime.


    The function `FuguBowlPlayer` within the class definition has the same name as
    the class, which means it’s a *constructor*, a special function called when an
    instance of this class is created. An explicitly defined constructor isn’t always
    necessary (`FuguBowlScore` doesn’t have one), and it is even prohibited within
    a `MonoBehaviour`. But a constructor is warranted in this case, because each newly
    created `FuguBowlPlayer` needs to have its *scores* array also created. So the
    `FuguBowlPlayer` constructor creates a built-in array of ten entries, declared
    to be of type `FuguBowlScore`, and fills the array with newly created `FuguBowlScore`
    instances.


    The constructor also calls a function `ClearScore`, which in turn calls `Clear`
    on each of the `FuguBowlScore` objects, ensuring they all start out indicating
    no score has been registered. The `FuguBowlPlayer` class also has `IsSpare` and
    `IsStrike` functions that call the same-named functions on the specified `FuguBowlScore`
    object, indexed in the scores array by the argument passed in. Since array indices
    begin at zero, the ten frames of a game are represented by the indices 0-9.'
  trans: "\n# `FuguBowl` 中的玩家与帧分数\n\n`FuguBowl`脚本已经定义了一个代表我们游戏的类，但将有风度分数的代码封装在一个玩家类中是合理的，因为从概念上讲存在一个玩家（并且可能有多个玩家，尽管在这个特定游戏中并非如此），而分数与玩家相关联。\n\
    \n此外，保龄球的计分规则并不简单。将保龄球分数计算的代码放在一个单独的脚本中，不仅使游戏控制器脚本更小、更易读，而且还可以使分数代码在其他保龄球游戏中重用。\n\
    \n首先，创建一个新的 JavaScript，将其命名为`FuguBowlPlayer`，并放置在`Scripts`文件夹中（图 8-1）。\n\n![9781430248750_Fig08-01.jpg](img/9781430248750_Fig08-01.jpg)\n\
    \n图 8-1 创建`FuguBowlPlayer`脚本\n\n## 帧分数（Frame Score）\n\n在`FuguBowlPlayer`脚本中，在实现`FuguBowlPlayer`类之前，让我们从一个名为`FuguBowlScore`的支持类开始，该类表示单个保龄球帧的分数（清单\
    \ 8-1）。它足够小，并且本身不是一个`MonoBehaviour`（例如，没有`Start`或`Update`回调），因此将其添加到`FuguBowlPlayer`脚本中就可以了。\n\
    \n清单 8-1 `FuguBowlPlayer.js`中的`FuguBowlScore`类\n\n```\nclass FuguBowlScore {\n\
    \       var ball1:int; // 第一次投球击倒的球瓶数\n       var ball2:int; // 第二次投球击倒的球瓶数\n\
    \       var ball3:int; // 第三次投球击倒的球瓶数\n       var total:int; // 该帧的总分（可能包含后续投球）\n\
    \nfunction Clear() {\n               ball1 = -1;\n               ball2 = -1;\n\
    \               ball3 = -1;\n               total = -1;\n       }\n\nfunction\
    \ IsSpare():boolean {\n               // 不处理第三次投球时的补中\n               return !IsStrike()\
    \ &&\n                      (ball1 + ball2 == 10);\n       }\n\nfunction IsStrike():boolean\
    \ {\n              return ball1 == 10;\n       }\n}\n```\n\n`FuguBowlScore`类非常简单，不继承自任何其他类（它可以被定义为结构体而不是类，只是\
    \ JavaScript 不支持定义新的结构体）。该类包含实例变量，分别代表第一次投球、第二次投球以及（仅在第 10 帧中相关的）奖励球的分数。`FuguBowlScore`还有一个变量用于保存该帧的总分，如果当前帧是补中或全中，则该总分可能取决于后续投球的结果。\n\
    \n每个变量都需要一种方法来指示其分数尚未计算。`ball1`、`ball2`和`ball3`的分数在该次投球完成之前是不可用的。总分在该帧的投球完成之前是不可用的，即使已完成，如果结果是补中或全中，分数仍然需要等到下一球或下两球投出后才能计算。\n\
    \n将分数值保留为零是行不通的，因为当玩家没有击倒任何球瓶时，零是一个有效的分数。但投球不可能出现负数分数，因此使用`-1`作为分数尚未计算的指示符是可行的。`FuguBowlScore`中的`Clear`函数通过将所有变量设置为这个数字来初始化该帧。\n\
    \n除了`Clear`函数之外，`FuguBowlScore`类还有另外两个成员函数。`IsStrike`如果该帧中投出了全中则返回`true`。这可以通过检查第一次投球击倒的球瓶数是否为十来轻松测试。`IsSpare`函数稍微复杂一些；如果第一次和第二次投球击倒的球瓶数之和为十，但仅当该帧中没有全中时（换句话说，不是第一次投球击倒十瓶且第二次投球击倒零瓶的情况），它才返回`true`。\n\
    \n注意：在两个函数声明中添加了`:boolean`。这清楚地表明每个函数返回一个`boolean`值，尽管编译器可以从代码中推断出返回类型。\n\n##\
    \ 玩家分数（Player Score）\n\n定义了`FuguBowlScore`类之后，我们现在可以添加`FuguBowlPlayer`类，它将聚合所有帧的分数以得到游戏总分（清单\
    \ 8-2）。与`FuguBowlScore`一样，`FuguBowlPlayer`类被显式声明，即使它与脚本文件同名，并且它不继承自`MonoBehaviour`（否则类声明会包含`extends\
    \ MonoBehaviour`）。除了没有 Unity 回调函数之外，这意味着`FuguBowlPlayer`类不是`Component`的子类，因此该脚本不能附加到`GameObject`上。换句话说，`FuguBowlPlayer`脚本充当一个代码库，包含其他脚本使用的类。\n\
    \n清单 8-2 `FuguBowlPlayer.js`中`FuguBowlPlayer`类的开始部分\n\n```\nclass FuguBowlPlayer\
    \ {\n       var scores:FuguBowlScore[]; // 游戏的全部 10 帧\n\n// 构造函数\n       function\
    \ FuguBowlPlayer() {\n              scores = new FuguBowlScore[10];\n        \
    \      for (var i:int=0; i<scores.length; ++i) {\n                      scores[i]\
    \ = new FuguBowlScore();\n              }\n              ClearScore();\n     \
    \  }\n\nfunction ClearScore() {\n              for (var score:FuguBowlScore in\
    \ scores) {\n                      score.Clear();\n              }\n       }\n\
    \nfunction IsSpare(frame:int):boolean {\n              return scores[frame].IsSpare();\n\
    \       }\n\nfunction IsStrike(frame:int):boolean {\n              return scores[frame].IsStrike();\n\
    \       }\n}\n```\n\n`FuguBowlPlayer`类自然包含关于玩家的信息，例如，可以有一个`String`变量用于存储玩家的名字。然而，就本书的目的而言，我们将仅限于跟踪玩家的保龄球得分。因此，该类只有一个实例变量`scores`，它是一个由`FuguBowlScore`对象组成的内置数组。数组中的每个`FuguBowlScore`元素代表保龄球游戏一帧的分数。\n\
    \n**注意**：内置数组通过索引访问，就像`Array`类的实例一样（用于`FuguBowl.js`中的`pins`变量）。内置数组的访问速度比`Array`实例快得多，并且当声明为公共变量时，可以在\
    \ Inspector 视图中编辑。但是，与`Array`实例不同，内置数组在运行时无法调整大小。\n\n类定义中的函数`FuguBowlPlayer`与类同名，这意味着它是一个*构造函数（constructor）*，一个在创建该类的实例时调用的特殊函数。显式定义的构造函数并非总是必需的（`FuguBowlScore`就没有），甚至在`MonoBehaviour`中是禁止的。但在这种情况下，构造函数是必要的，因为每个新创建的`FuguBowlPlayer`都需要创建其`scores`数组。因此，`FuguBowlPlayer`构造函数创建一个包含十个条目的内置数组，声明为`FuguBowlScore`类型，并用新创建的`FuguBowlScore`实例填充该数组。\n\
    \n构造函数还调用了一个函数`ClearScore`，该函数依次调用每个`FuguBowlScore`对象上的`Clear`，确保它们都从指示未登记任何分数的状态开始。`FuguBowlPlayer`类还有`IsSpare`和`IsStrike`函数，它们对指定的`FuguBowlScore`对象调用同名的函数，该对象通过传入的参数在`scores`数组中进行索引。由于数组索引从零开始，游戏的十帧由索引\
    \ 0-9 表示。\n"
- fmt: "**Note** 在某种意义上，`FuguBowlPlayer`类充当了`FuguBowlScore`类的包装器，这样其他脚本只需了解`FuguBowlPlayer`类即可。作为一种精雕细琢的练习，你可以提供更多的抽象，让`IsSpare`和`IsStrike`接受范围为1-10的帧索引，然后在将其用作数组索引之前先减1。\n\
    \n## 设置分数\n\n随着游戏的进行，每次掷球后都需要更新分数。我们计划在`FuguBowlPlayer`类中添加名为`SetBall1Score`、`SetBall2Score`和`SetBall3Score`（用于第十帧）的函数。与该类中的`IsSpare`和`IsStrike`函数类似，这些新增函数将帧索引作为参数。\n\
    \n每次掷球的分数可能会更新前一帧的总分（如果前一帧是补中或全中）。因此，首先我们需要在`FuguBowlPlayer`类中编写函数来执行这些更新，函数名为`SetSpareScore`（[清单8-3](#9781430248750_Ch08.xhtml#list3)）和`SetStrikeScore`（[清单8-4](#9781430248750_Ch08.xhtml#list4)）。\n\
    \n[清单8-3](#9781430248750_Ch08.xhtml#_list3) `FuguBowlPlayer`类中的`SetSpareScore`函数\n\
    \n```\nfunction SetSpareScore(frame:int) {\n       var framescore:FuguBowlScore\
    \ = scores[frame];\n       framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;\n\
    }\n```\n\n[清单8-4](#9781430248750_Ch08.xhtml#_list4) `FuguBowlPlayer`类中的`SetStrikeScore`函数\n\
    \n```\nfunction SetStrikeScore(frame:int) {\n       var framescore:FuguBowlScore\
    \ = scores[frame];\n       framescore.total = framescore.ball1;\n       framescore.total+=scores[frame+1].ball1;\n\
    \       if (frame < 8 && IsStrike(frame+1)) {\n              framescore.total+=scores[frame+2].ball1;\n\
    \       }  else {\n              framescore.total+=scores[frame+1].ball2;\n  \
    \     }\n}\n```\n\n`SetSpareScore`函数将总分设置为第一球和第二球得分之和（通常为10分），再加上下一次掷球的得分，即下一帧的第一球得分。\n\
    \n`SetStrikeScore`函数稍微复杂一些。它将总分设置为第一球得分（通常为10分）加上接下来两次掷球的得分，正常情况下，这包括下一帧的第一球和第二球得分。但如果下一帧也是全中，那么接下来的两次掷球则是下一帧的第一球以及下一帧之后那帧的第一球。\n\
    \n`SetSpareScore`和`SetStrikeScore`的使用在`SetBall1Score`的定义中进行了说明（[清单8-5](#9781430248750_Ch08.xhtml#list5)）。第一行将当前帧的`ball1`变量设置为击倒的瓶数，该瓶数作为函数的第二个参数传入。然后，如果当前帧不是第一帧，`SetBall1Score`会检查前一帧是否出现了补中。如果是这种情况，则前一帧正在等待本次掷球的结果来计算该帧的总分，因此会调用前一帧的`SetSpareScore`来执行最终计算。\n\
    \n[清单8-5](#9781430248750_Ch08.xhtml#_list5) `FuguBowlPlayer`类中的`SetBall1Score`函数\n\
    \n```\nfunction SetBall1Score(frame:int,pinsDown:int) {\n       scores[frame].ball1=pinsDown;\n\
    \       if (frame>0 && IsSpare(frame-1)) {\n              SetSpareScore(frame-1);\n\
    \       }\n       if (frame>1 && IsStrike(frame-1) && IsStrike(frame-2)) {\n \
    \             SetStrikeScore(frame-2);\n       }\n}\n```\n\n如果当前帧不是第一帧或第二帧，`SetBall1Score`会检查前两帧是否都是全中。如果是这种情况，那么这两帧中的第一帧正在等待本次掷球的结果来更新其总分，因此会调用该帧的`SetStrikeScore`。\n\
    \n请注意，`SetBall1Score`并未设置当前帧的总分。如果当前掷球不是全中，则该帧尚未结束；而如果当前掷球是全中，则需要在两次掷球之后才能更新该帧的总分（当然，是通过`SetStrikeScore`！）。\n\
    \n`SetBall2Score`函数（[清单8-6](#9781430248750_Ch08.xhtml#list6)）更为复杂，因为它需要处理更多情况。传递给函数的第二个参数是当前帧中到目前为止击倒的瓶数，因此`ball2`变量被设置为总击倒数减去第一球已经击倒的瓶数，但有一个特殊情况：第一球是全中时。\n\
    \n[清单8-6](#9781430248750_Ch08.xhtml#_list6) `FuguBowlPlayer`类中的`SetBall2Score`函数\n\
    \n```\nfunction SetBall2Score(frame:int,pinsDown:int) {\n       var framescore:FuguBowlScore\
    \ = scores[frame];\n       if (IsStrike(frame)) { // we must be in the final frame\n\
    \              framescore.ball2=pinsDown;\n       }  else {\n              framescore.ball2=pinsDown-framescore.ball1;\n\
    \       }\n       if (!IsSpare(frame) && !IsStrike(frame)) {\n              framescore.total=\
    \ pinsDown;\n       }\n       if (frame>0 && IsStrike(frame-1)) {\n          \
    \    SetStrikeScore(frame-1);\n       }\n}\n```\n\n通常情况下，如果第一球是全中，则跳过第二球，甚至不会调用`SetBall2Score`。但是，如果在第十帧的第一球出现全中，则会获得第二球的机会，并且`ball2`被设置为击倒的总瓶数，因为第一球全中后球瓶被重置了。\n\
    \n该帧的总分被设置为第一球和第二球的总和，除非是补中或全中的情况，在这两种情况下，需要分别等待一次或两次未来的掷球后才能确定总分。\n\n考虑到这是当前帧的第二球，并且补中只将下一帧的第一球加入其分数，因此本次掷球不可能对前一帧的补中分数产生影响。但是，如果前一帧是全中，则应该对那一帧调用`SetStrikeScore`，因为该帧一直在等待当前帧的第一球和第二球来完成其总分计算。\n\
    \n`SetBall3Score`函数（[清单8-7](#9781430248750_Ch08.xhtml#list7)）是一个特殊情况，因为第三球只可能发生在第十帧，而且只有第一球或第二球是全中，或者前两球是补中时才会出现。当调用`SetBall3Score`时，如果`ball2`是全中或完成了补中（这两种情况下，球瓶会在第三球前重置），则该函数将`ball3`变量设置为击倒的瓶数。否则，必须是第一球是全中而第二球不是全中的情况，因此`ball3`被设置为击倒的总瓶数减去第二球击倒的瓶数。\n\
    \n[清单8-7](#9781430248750_Ch08.xhtml#_list7) `FuguBowlPlayer`类中的`SetBall3Score`函数\n\
    \n```\nfunction SetBall3Score(frame:int,pinsDown:int) {\n       var framescore:FuguBowlScore\
    \ = scores[frame];\n       if (IsStrike(frame) && framescore.ball2 <10) {\n  \
    \            framescore.ball3 = pinsDown - framescore.ball2;\n       }  else {\n\
    \              framescore.ball3 = pinsDown; // spare or two strikes\n       }\n\
    \       framescore.total = framescore.ball1+framescore.ball2+framescore.ball3;}\n\
    ```\n\n## 获取分数"
  raw: '**Note**   In a sense, the `FuguBowlPlayer` class acts as a wrapper around
    the `FuguBowlScore` class so that other scripts need only know about the `FuguBowlPlayer`
    class. As an exercise in polish, you could provide more abstraction by having
    `IsSpare` and `IsStrike` accept frame indices in the range 1-10 and then subtract
    1 before using them as array indices.


    Setting the Score


    As the game progresses, the score has to be updated after each roll of the ball.
    Let’s plan on adding functions named `SetBall1Score`, `SetBall2Score`, and `SetBall3Score`
    (for the tenth frame) to the `FuguBowlPlayer` class. Like the `IsSpare` and `IsStrike`
    functions in that class, the additional functions will take a frame index as an
    argument.


    The score for each roll of the ball potentially updates the total score for a
    previous frame if it had a strike or spare. So first we’ll need functions to perform
    those updates in the `FuguBowlPlayer` class, named `SetSpareScore` ([Listing 8-3](#9781430248750_Ch08.xhtml#list3))
    and `SetStrikeScore` ([Listing 8-4](#9781430248750_Ch08.xhtml#list4)).


    [Listing 8-3.](#9781430248750_Ch08.xhtml#_list3)  The SetSpareScore Function in
    the FuguBowlPlayer Class


    ```

    function SetSpareScore(frame:int) {

           var framescore:FuguBowlScore = scores[frame];

           framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;

    }

    ```


    [Listing 8-4.](#9781430248750_Ch08.xhtml#_list4)  The SetStrikeScore Function
    in the FuguBowlPlayer Class


    ```

    function SetStrikeScore(frame:int) {

           var framescore:FuguBowlScore = scores[frame];

           framescore.total = framescore.ball1;

           framescore.total+=scores[frame+1].ball1;

           if (frame < 8 && IsStrike(frame+1)) {

                  framescore.total+=scores[frame+2].ball1;

           }  else {

                  framescore.total+=scores[frame+1].ball2;

           }

    }

    ```


    The `SetSpare` function sets the total score to the sum of the first and second
    ball scores (which should always be ten), plus the score from the next roll, which
    is the first ball of the next frame.


    The `SetStrike` function is a little more complicated. It sets the total score
    to the score from the first ball (which should be ten) plus the scores from the
    next two rolls, which normally consists of the first and second balls from the
    next frame. But if the next frame is a strike, then the next two rolls are the
    first ball from the next frame and the first ball from the frame after that.


    The use of `SetSpareScore` and `SetStrikeScore` is illustrated in the definition
    of `SetBall1Score` ([Listing 8-5](#9781430248750_Ch08.xhtml#list5)). The first
    line sets the `ball1` variable of the frame with the number of pins knocked down,
    which is passed in as the second argument of the function. Then, if the current
    frame is not the first frame, `SetBall1Score` checks if a spare had been rolled
    in the previous frame. If that’s the case, then the previous frame is waiting
    for the results of the this roll to calculate the frame’s total score, and `SetSpareScore`
    is called on that frame to perform that final calculation.


    [Listing 8-5.](#9781430248750_Ch08.xhtml#_list5)  The SetBall1Score Function in
    the FuguBowlPlayer Class


    ```

    function SetBall1Score(frame:int,pinsDown:int) {

           scores[frame].ball1=pinsDown;

           if (frame>0 && IsSpare(frame-1)) {

                  SetSpareScore(frame-1);

           }

           if (frame>1 && IsStrike(frame-1) && IsStrike(frame-2)) {

                  SetStrikeScore(frame-2);

           }

    }

    ```


    If the current frame is not the first or second frame, then `SetBal1Score` checks
    if strikes have been rolled in the previous two frames, in which case the first
    of those frames is waiting for the result of this roll to update its total score,
    and `SetStrikeScore` is called for that frame.


    Notice `SetBall1Score` doesn’t set the total score for the current frame. If the
    current roll is not a strike, then the frame isn’t over, yet, and if the current
    roll is a strike, then two more rolls have to take place before the total for
    this frame can be updated (via `SetStrikeScore`, of course!).


    The `SetBall2Score` function ([Listing 8-6](#9781430248750_Ch08.xhtml#list6))
    is more complicated, since it has more cases to handle. As the second argument
    passed into the function is the number of pins knocked down so far in the frame,
    the `ball2` variable is set to the number of pins down minus whatever was already
    knocked down for the first ball, except for the special case where the first ball
    is a strike.


    [Listing 8-6.](#9781430248750_Ch08.xhtml#_list6)  SetBall2Score Function in the
    FuguBowlPlayer Class


    ```

    function SetBall2Score(frame:int,pinsDown:int) {

           var framescore:FuguBowlScore = scores[frame];

           if (IsStrike(frame)) { // we must be in the final frame

                  framescore.ball2=pinsDown;

           }  else {

                  framescore.ball2=pinsDown-framescore.ball1;

           }

           if (!IsSpare(frame) && !IsStrike(frame)) {

                  framescore.total= pinsDown;

           }

           if (frame>0 && IsStrike(frame-1)) {

                  SetStrikeScore(frame-1);

           }

    }

    ```


    Normally, if the first ball is a strike, the second ball is skipped and `SetBall2Score`
    wouldn’t even be called. But if a strike occurs on the first roll of the tenth
    frame, then the second ball is awarded, and `ball2` is set to the total number
    of pins knocked down, because the pins were reset after the strike in the first
    roll.


    The total score for this frame is set to the sum of the first and second balls,
    except in the case of a spare or strike, in which case one or two future rolls,
    respectively, have to take place before the total can be resolved.


    Given that this is the second roll of the frame, and a spare only adds the first
    roll of the next frame to its score, there’s no way this roll can contribute to
    a spare score from the previous frame. However, if the  previous frame had a strike,
    calling `SetStrikeScore` that frame is warranted what that frame, since it’s been
    waiting for the first and second rolls of this frame to complete its total.


    The function `SetBall3Score` ([Listing 8-7](#9781430248750_Ch08.xhtml#list7))
    is a special case, as a third roll can only occur in the tenth frame, and even
    then only if there was a strike with the first or second ball or a spare with
    the first two balls. When `SetBall3Score` is called, the function sets the `ball3`
    variable with the number of pins down if `ball2` was a strike or completed a spare,
    the two cases where the pins get reset before the third ball. Otherwise, there
    must have been a strike in the first frame and a something other than a strike
    in the second, so `ball3` is set to the number of pins down minus the pins knocked
    down by the second ball.


    [Listing 8-7.](#9781430248750_Ch08.xhtml#_list7)  The SetBall3Score Function in
    the FuguBowlPlayer Class


    ```

    function SetBall3Score(frame:int,pinsDown:int) {

           var framescore:FuguBowlScore = scores[frame];

           if (IsStrike(frame) && framescore.ball2 <10) {

                  framescore.ball3 = pinsDown - framescore.ball2;

           }  else {

                  framescore.ball3 = pinsDown; // spare or two strikes

           }

           framescore.total = framescore.ball1+framescore.ball2+framescore.ball3;}

    ```


    Getting the Score'
  trans: "\n**注意** 在某种意义上，`FuguBowlPlayer`类充当了`FuguBowlScore`类的包装器，这样其他脚本只需了解`FuguBowlPlayer`类即可。作为一种精雕细琢的练习，你可以提供更多的抽象，让`IsSpare`和`IsStrike`接受范围为\
    \ 1-10 的帧索引，然后在将其用作数组索引之前先减 1。\n\n## 设置分数\n\n随着游戏的进行，每次掷球后都需要更新分数。我们计划在`FuguBowlPlayer`类中添加名为`SetBall1Score`、`SetBall2Score`和`SetBall3Score`（用于第十帧）的函数。与该类中的`IsSpare`和`IsStrike`函数类似，这些新增函数将帧索引作为参数。\n\
    \n每次掷球的分数可能会更新前一帧的总分（如果前一帧是补中或全中）。因此，首先我们需要在`FuguBowlPlayer`类中编写函数来执行这些更新，函数名为`SetSpareScore`（清单\
    \ 8-3）和`SetStrikeScore`（清单 8-4）。\n\n清单 8-3 `FuguBowlPlayer`类中的`SetSpareScore`函数\n\
    \n```\nfunction SetSpareScore(frame:int) {\n       var framescore:FuguBowlScore\
    \ = scores[frame];\n       framescore.total = framescore.ball1+framescore.ball2+scores[frame+1].ball1;\n\
    }\n```\n\n清单 8-4 `FuguBowlPlayer`类中的`SetStrikeScore`函数\n\n```\nfunction SetStrikeScore(frame:int)\
    \ {\n       var framescore:FuguBowlScore = scores[frame];\n       framescore.total\
    \ = framescore.ball1;\n       framescore.total+=scores[frame+1].ball1;\n     \
    \  if (frame < 8 && IsStrike(frame+1)) {\n              framescore.total+=scores[frame+2].ball1;\n\
    \       }  else {\n              framescore.total+=scores[frame+1].ball2;\n  \
    \     }\n}\n```\n\n`SetSpareScore`函数将总分设置为第一球和第二球得分之和（通常为 10 分），再加上下一次掷球的得分，即下一帧的第一球得分。\n\
    \n`SetStrikeScore`函数稍微复杂一些。它将总分设置为第一球得分（通常为 10 分）加上接下来两次掷球的得分，正常情况下，这包括下一帧的第一球和第二球得分。但如果下一帧也是全中，那么接下来的两次掷球则是下一帧的第一球以及下一帧之后那帧的第一球。\n\
    \n`SetSpareScore`和`SetStrikeScore`的使用在`SetBall1Score`的定义中进行了说明（清单 8-5）。第一行将当前帧的`ball1`变量设置为击倒的瓶数，该瓶数作为函数的第二个参数传入。然后，如果当前帧不是第一帧，`SetBall1Score`会检查前一帧是否出现了补中。如果是这种情况，则前一帧正在等待本次掷球的结果来计算该帧的总分，因此会调用前一帧的`SetSpareScore`来执行最终计算。\n\
    \n清单 8-5 `FuguBowlPlayer`类中的`SetBall1Score`函数\n\n```\nfunction SetBall1Score(frame:int,pinsDown:int)\
    \ {\n       scores[frame].ball1=pinsDown;\n       if (frame>0 && IsSpare(frame-1))\
    \ {\n              SetSpareScore(frame-1);\n       }\n       if (frame>1 && IsStrike(frame-1)\
    \ && IsStrike(frame-2)) {\n              SetStrikeScore(frame-2);\n       }\n\
    }\n```\n\n如果当前帧不是第一帧或第二帧，`SetBall1Score`会检查前两帧是否都是全中。如果是这种情况，那么这两帧中的第一帧正在等待本次掷球的结果来更新其总分，因此会调用该帧的`SetStrikeScore`。\n\
    \n请注意，`SetBall1Score`并未设置当前帧的总分。如果当前掷球不是全中，则该帧尚未结束；而如果当前掷球是全中，则需要在两次掷球之后才能更新该帧的总分（当然，是通过`SetStrikeScore`！）。\n\
    \n`SetBall2Score`函数（清单 8-6）更为复杂，因为它需要处理更多情况。传递给函数的第二个参数是当前帧中到目前为止击倒的瓶数，因此`ball2`变量被设置为总击倒数减去第一球已经击倒的瓶数，但有一个特殊情况：第一球是全中时。\n\
    \n清单 8-6 `FuguBowlPlayer`类中的`SetBall2Score`函数\n\n```\nfunction SetBall2Score(frame:int,pinsDown:int)\
    \ {\n       var framescore:FuguBowlScore = scores[frame];\n       if (IsStrike(frame))\
    \ { // we must be in the final frame\n              framescore.ball2=pinsDown;\n\
    \       }  else {\n              framescore.ball2=pinsDown-framescore.ball1;\n\
    \       }\n       if (!IsSpare(frame) && !IsStrike(frame)) {\n              framescore.total=\
    \ pinsDown;\n       }\n       if (frame>0 && IsStrike(frame-1)) {\n          \
    \    SetStrikeScore(frame-1);\n       }\n}\n```\n\n通常情况下，如果第一球是全中，则跳过第二球，甚至不会调用`SetBall2Score`。但是，如果在第十帧的第一球出现全中，则会获得第二球的机会，并且`ball2`被设置为击倒的总瓶数，因为第一球全中后球瓶被重置了。\n\
    \n该帧的总分被设置为第一球和第二球的总和，除非是补中或全中的情况，在这两种情况下，需要分别等待一次或两次未来的掷球后才能确定总分。\n\n考虑到这是当前帧的第二球，并且补中只将下一帧的第一球加入其分数，因此本次掷球不可能对前一帧的补中分数产生影响。但是，如果前一帧是全中，则应该对那一帧调用`SetStrikeScore`，因为该帧一直在等待当前帧的第一球和第二球来完成其总分计算。\n\
    \n`SetBall3Score`函数（清单 8-7）是一个特殊情况，因为第三球只可能发生在第十帧，而且只有第一球或第二球是全中，或者前两球是补中时才会出现。当调用`SetBall3Score`时，如果`ball2`是全中或完成了补中（这两种情况下，球瓶会在第三球前重置），则该函数将`ball3`变量设置为击倒的瓶数。否则，必须是第一球是全中而第二球不是全中的情况，因此`ball3`被设置为击倒的总瓶数减去第二球击倒的瓶数。\n\
    \n清单 8-7 `FuguBowlPlayer`类中的`SetBall3Score`函数\n\n```\nfunction SetBall3Score(frame:int,pinsDown:int)\
    \ {\n       var framescore:FuguBowlScore = scores[frame];\n       if (IsStrike(frame)\
    \ && framescore.ball2 <10) {\n              framescore.ball3 = pinsDown - framescore.ball2;\n\
    \       }  else {\n              framescore.ball3 = pinsDown; // spare or two\
    \ strikes\n       }\n       framescore.total = framescore.ball1+framescore.ball2+framescore.ball3;}\n\
    ```\n\n## 获取分数\n"
- fmt: "虽然用户界面的实现将在下一章进行，但我们应该确保`FuguBowlPlayer`类支持分数显示。在现实生活或电脑游戏中，典型的保龄球记分板会显示每一帧中每次投球的分数，这与`FuguBowlScore`类中的`ball1`、`ball2`和`ball3`变量完美匹配。此外，保龄球记分板通常会有特殊标记来表示每一帧中的补中或全中，`FuguBowlPlayer`类中的`IsSpare`和`IsStrike`函数可以满足这一需求。\n\
    \n然而，虽然`FuguBowlScore`有一个表示该帧总分的`total`变量，但保龄球记分板通常显示的是该帧的*比赛总分*，即截止到该帧（含该帧）的累积总分。例如，[图8-2](#9781430248750_Ch08.xhtml#Fig2)展示了在投完两帧后，HyperBowl记分板的显示效果。\n\
    \n![9781430248750_Fig08-02.jpg](images/9781430248750_Fig08-02.jpg)\n\n[图8-2](#9781430248750_Ch08.xhtml#_Fig2).\
    \ HyperBowl 记分板\n\n第一帧显示第一次和第二次投球的分数以及所得总分。第二帧显示其第一次投球的分数以及第二次投球补中的标记。第二帧显示的比赛总分是来自第一帧的比赛总分加上第二帧的额外帧总分。\n\
    \n这个例子为实现一个返回某帧比赛总分的函数提供了思路。[清单8-8](#9781430248750_Ch08.xhtml#list8)展示了添加到`FuguBowlPlayer`类中的这样一个函数`GetScore`的代码。如果指定的帧是游戏的第一帧，`GetScore`返回该帧的总分。如果该帧的总分为`-1`（表示尚不可用），那么`GetScore`返回`-1`以表示该帧的比赛总分尚不可用。\n\
    \n[清单8-8.](#9781430248750_Ch08.xhtml#_list8) FuguBowlPlayer 类中的 GetScore 函数\n\n\
    ```\nfunction GetScore(frame:int):int {\n       if (frame==0 || scores[frame].total==-1)\
    \ {\n              return scores[frame].total;\n       }  else {\n           \
    \   var prev:int = GetScore(frame-1);\n              if (prev==-1) {\n       \
    \               return -1;\n              }  else {\n                      return\
    \ scores[frame].total+prev;\n              }\n       }\n}\n```\n\n但如果帧总分可用且该帧不是第一帧，则将该帧总分与来自前一帧的比赛总分相加，除非前一帧的比赛总分尚不可用。如果前一帧的比赛总分不可用，则同样返回`-1`。\n\
    \n前一帧的比赛总分是通过对该帧调用`GetScore`获得的，而该调用又会对其前一帧调用`GetScore`，直到到达第一帧。`GetScore`是一个*递归函数*的例子，即调用自身的函数。无限递归被避免，因为最终`GetScore`会到达其*基准情况*，即总是会返回的第一帧。\n\
    \n### 完整清单\n\n`FuguBowlScore`脚本的完整清单过于冗长，不便在此展示（长达四页），但其所有内容均已在本书此部分展示。整个脚本`FuguBowlScore.js`可在`http://learnunity4.com/`上本章的项目中获取。\n\
    \n如果你想用`http://learnunity4.com/`上的版本替换脚本，请在访达中执行替换操作（即，将文件拖放或粘贴到此项目的Scripts文件夹中）。通常，能够简单地将文件从访达拖放到项目视图中非常方便，但在这种情况下，Unity会重命名新文件以避免覆盖原始文件。\n\
    \n如果你的意图是替换原始脚本，请勿自行重命名，因为场景中的任何引用仍会引用该新名称下的脚本。相反，如果你想保留一份副本，请复制原始脚本（在访达中或使用Unity编辑器“编辑”菜单中的“复制”命令）。\n\
    \n### 创建 FuguBowlPlayer\n\n`FuguBowlPlayer`类现已准备就绪，可以投入使用。由于该脚本未附加到任何GameObject（也不能附加，因为`FuguBowlPlayer`不是`MonoBehaviour`），因此必须在运行时实例化`FuguBowlPlayer`。自然的位置是在`FuguBowl`脚本的`Awake`回调中进行，该回调已在实例化保龄球瓶（[清单8-9](#9781430248750_Ch08.xhtml#list9)）。\n\
    \n[清单8-9.](#9781430248750_Ch08.xhtml#_list9) 在 FuguBowl.js 中创建 FuguBowlPlayer\n\
    \n```\nstatic var player:FuguBowlPlayer = null;\n\nfunction Awake() {\n      \
    \ player = new FuguBowlPlayer();\n       CreatePins();\n}\n```\n\n增强后的`Awake`回调会创建一个新的`FuguBowlPlayer`实例，并将其赋值给变量`player`，该变量被声明为静态变量，以便从`FuguBowl`脚本外部轻松访问（为下一章记分板实现做准备）。\n\
    \n为了支持多名玩家，`player`变量可能改为一个`FuguBowlPlayer`数组（一个可调整大小的`Array`，而非内置数组，以适应不同数量的玩家），并且可能存在一些封装函数，如`GetPlayer`和`GetNumberOfPlayers`。但就本书而言，我们将保持简洁，专注于单人游戏。\n\
    \n### 球瓶状态\n\n现在，`FuguBowl`脚本除了保龄球瓶和球之外，还有一个对`FuguBowlPlayer`的引用。但要调用`FuguBowlPlayer`的分数函数，`FuguBowl`必须传入已击倒的球瓶数量。与其在`FuguBowl`中添加代码来判断球瓶是否倒下，更简洁的做法是在附加到每个球瓶的脚本中编写该代码。这样，`FuguBowl`只需询问每个球瓶是否倒下，而无需了解球瓶的内部工作原理。\n\
    \n对于这个新的球瓶脚本，创建一个新的JavaScript，命名为`FuguPinStatus`，并将其放在Scripts文件夹中（[图8-3](#9781430248750_Ch08.xhtml#Fig3)）。\n\
    \n![9781430248750_Fig08-03.jpg](images/9781430248750_Fig08-03.jpg)\n\n[图8-3](#9781430248750_Ch08.xhtml#_Fig3).\
    \ 创建 FuguPinStatus.js 脚本\n\n接下来，将[清单8-10](#9781430248750_Ch08.xhtml#list10)的内容添加到该脚本中。\n\
    \n[清单8-10.](#9781430248750_Ch08.xhtml#_list10) FuguPinStatus.js 的清单\n\n```\n#pragma\
    \ strict\n\nvar knockedAngle:float = 45.0;\n\nprivate var initialAngles:Vector3;\n\
    \nfunction Awake () {\n       initialAngles = transform.localEulerAngles;\n}\n\
    \nfunction IsKnockedOver() {\n       return Mathf.Abs(transform.localEulerAngles.x-initialAngles.x)>knockedAngle\
    \ ||\n       Mathf.Abs(transform.localEulerAngles.y-initialAngles.y)>knockedAngle\
    \ ||\n               Mathf.Abs(transform.localEulerAngles.z-initialAngles.z)>knockedAngle;\n\
    }\n```\n\n脚本中的`Awake`回调将GameObject的初始旋转保存在私有变量`initialAngles`中，以供后续比较。函数`IsKnockedOver`根据球瓶绕任何轴的旋转角度是否超过`knockedAngle`变量中指定的度数来返回`true`或`false`。\n\
    \n在项目视图中，选择BarrelPin预制件中的Barrel GameObject，并使用检查器视图中的“添加组件”按钮来附加FuguPinStatus脚本（[图8-4](#9781430248750_Ch08.xhtml#Fig4)）。\n\
    \n![9781430248750_Fig08-04.jpg](images/9781430248750_Fig08-04.jpg)\n\n[图8-4](#9781430248750_Ch08.xhtml#_Fig4).\
    \ 附加到 Barrel 球瓶预制件上的 FuguPinStatus 脚本"
  raw: 'Although implementation of a user interface will take place in the next chapter,
    we should make sure the `FuguBowlPlayer` class supports a score display. A typical
    bowling scoreboard, in real life or in a computer game, displays the score for
    each roll in each frame, which matches perfectly with the `ball1`, `ball2`, and
    `ball3` variables in the `FuguBowlScore` class. Furthermore, a bowling scoreboard
    typically has special markings to indicate a spare or strike in each frame, which
    the `IsSpare` and `IsStrike` functions in the `FuguBowlPlayer` class can accommodate.


    However, while `FuguBowlScore` has a total variable that represents the total
    score for the frame, a bowling scoreboard usually shows the *game total* score
    for that frame, i.e., the total cumulative score up to and including that frame.
    For example, [Figure 8-2](#9781430248750_Ch08.xhtml#Fig2) shows how the scoreboard
    in HyperBowl looks after bowling two frames.


    ![9781430248750_Fig08-02.jpg](images/9781430248750_Fig08-02.jpg)


    [Figure 8-2](#9781430248750_Ch08.xhtml#_Fig2). The HyperBowl scoreboard


    The first frame displays the scores for the first and second roll and the resulting
    total. The second frame displays the score for its first roll and the mark for
    a spare on the second roll. The game total score displayed in the second frame
    is the game total score from the first frame plus the additional frame total score
    from the second frame.


    This example provides a clue on how to implement a function that returns the game
    total score for a frame. [Listing 8-8](#9781430248750_Ch08.xhtml#list8) shows
    the code for such a function, `GetScore`, added to the `FuguBowlPlayer` class.
    If the specified frame is the first frame of the game, `GetScore` returns the
    frame total score. And if the frame total score is -1, meaning not yet available,
    then `GetScore` returns -1 to indicate the game total score is not yet available
    for that frame.


    [Listing 8-8.](#9781430248750_Ch08.xhtml#_list8)  The GetScore Function in the
    FuguBowlPlayer Class


    ```

    function GetScore(frame:int):int {

           if (frame==0 || scores[frame].total==-1) {

                  return scores[frame].total;

           }  else {

                  var prev:int = GetScore(frame-1);

                  if (prev==-1) {

                          return -1;

                  }  else {

                          return scores[frame].total+prev;

                  }

           }

    }

    ```


    But if the frame total is available and the frame is not the first frame, then
    the frame total is added to the game total from the previous frame, unless that
    game total is not yet available. If the game total is not available from the previous
    frame, then, again, -1 is returned.


    The game total from the previous frame is acquired by calling `GetScore` on that
    frame, which in turn will call `GetScore` on the frame before it, until the first
    frame is reached. `GetScore` is an example of a *recursive function*, which is
    a function that calls itself. Infinite recursion is avoided because eventually
    `GetScore` arrives at its *base case*, the first frame, which will always return.


    The Complete Listing


    The complete listing for the `FuguBowlScore` script is too unwieldy to show here
    (it spans four pages), but all of its contents have been shown in this section.
    The entire script, `FuguBowlScore.js,` is available in the project for this chapter
    on `http://learnunity4.com/`.


    If you want to replace a script with the version from `http://learnunity4.com/`,
    perform the replacement in the Finder (i.e., drag or paste the file into the Scripts
    folder of this project). Normally, the ability to just drag a file from the Finder
    into the Project View is really convenient, but in this case Unity will rename
    the new file to avoid clobbering the original.


    And don’t rename the original script yourself, if your intent is to replace it,
    since any references in the scene will still refer to that script under the new
    name. Rather, duplicate the original script (either in the Finder or using Duplicate
    from the Edit menu in the Unity Editor), if you want to keep a copy.


    Creating a FuguBowlPlayer


    The `FuguBowlPlayer` class is now all set and ready to use. Since the script is
    not attached to a GameObject (and can’t be, since `FuguBowlPlayer` is not a `MonoBehaviour`),
    a `FuguBowlPlayer` has to be instantiated at runtime. The natural place to do
    this is in the `FuguBowl` script’s `Awake` callback, which is already instantiating
    the bowling pins ([Listing 8-9](#9781430248750_Ch08.xhtml#list9)).


    [Listing 8-9.](#9781430248750_Ch08.xhtml#_list9)  Creating a FuguBowlPlayer in
    FuguBowl.js


    ```

    static var player:FuguBowlPlayer = null;


    function Awake() {

           player = new FuguBowlPlayer();

           CreatePins();

    }

    ```


    The augmented `Awake` callback creates a new `FuguBowlPlayer` instance and assigns
    it to the variable `player`, which is declared a static variable for easy access
    from outside the `FuguBowl` script (looking ahead to the scoreboard implementation
    in the next chapter).


    To support multiple players, the variable `player` might instead be an `Array`
    of `FuguBowlPlayer` (a resizable `Array` instead of a built-in array, to accommodate
    different numbers of players), and there might be some encapsulating functions
    like `GetPlayer` and `GetNumberOfPlayers`. But for the purposes of this book,
    we’ll keep things simple and focus on a single-player game.


    The Pin Status


    The `FuguBowl` script now has a a reference to a `FuguBowlPlayer` in addition
    to the bowling pins and ball. But to call the `FuguBowlPlayer` score functions,
    `FuguBowl` must pass in the number of pins that have been knocked down. Rather
    than adding code to `FuguBowl` to figure out whether a pin is down, it’s cleaner
    to write that code in a script attached to each pin. Then `FuguBowl` can just
    ask each pin if it’s down and doesn’t have to know about the inner workings of
    the pins.


    For this new pin script, create a new JavaScript, name it `FuguPinStatus`, and
    place it in the Scripts folder ([Figure 8-3](#9781430248750_Ch08.xhtml#Fig3)).


    ![9781430248750_Fig08-03.jpg](images/9781430248750_Fig08-03.jpg)


    [Figure 8-3](#9781430248750_Ch08.xhtml#_Fig3). Create a FuguPinStatus.js script


    Next, add the contents of [Listing 8-10](#9781430248750_Ch08.xhtml#list10) to
    the script.


    [Listing 8-10.](#9781430248750_Ch08.xhtml#_list10)  Listing for FuguPinStatus.js


    ```

    #pragma strict


    var knockedAngle:float = 45.0;


    private var initialAngles:Vector3;


    function Awake () {

           initialAngles = transform.localEulerAngles;

    }


    function IsKnockedOver() {

           return Mathf.Abs(transform.localEulerAngles.x-initialAngles.x)>knockedAngle
    ||

           Mathf.Abs(transform.localEulerAngles.y-initialAngles.y)>knockedAngle ||

                   Mathf.Abs(transform.localEulerAngles.z-initialAngles.z)>knockedAngle;

    }

    ```


    The Awake callback in the script saves the GameObject’s initial rotation in the
    private variable `initialAngles` for comparison later. The function `IsKnockedOver`
    returns true or false depending on whether the pin’s rotation around any axis
    has changed by more than the number of degrees specified in the `knockedAngle`
    variable.


    In the Project View, select the Barrel GameObject in the BarrelPin prefab and
    use the Add Component button in the Inspector View to attach the FuguPinStatus
    script ([Figure 8-4](#9781430248750_Ch08.xhtml#Fig4)).


    ![9781430248750_Fig08-04.jpg](images/9781430248750_Fig08-04.jpg)


    [Figure 8-4](#9781430248750_Ch08.xhtml#_Fig4). The FuguPinStatus script attached
    to the Barrel pin prefab'
  trans: "```markdown\n\n虽然用户界面的实现将在下一章进行，但我们应该确保`FuguBowlPlayer`类支持分数显示。在现实生活或电脑游戏中，典型的保龄球记分板会显示每一帧中每次投球的分数，这与`FuguBowlScore`类中的`ball1`、`ball2`和`ball3`变量完美匹配。此外，保龄球记分板通常会有特殊标记来表示每一帧中的补中或全中，`FuguBowlPlayer`类中的`IsSpare`和`IsStrike`函数可以满足这一需求。\n\
    \n然而，虽然`FuguBowlScore`有一个表示该帧总分的`total`变量，但保龄球记分板通常显示的是该帧的*比赛总分*，即截止到该帧（含该帧）的累积总分。例如，图\
    \ 8-2 展示了在投完两帧后，HyperBowl 记分板的显示效果。\n\n![9781430248750_Fig08-02.jpg](img/9781430248750_Fig08-02.jpg)\n\
    \n图 8-2. HyperBowl 记分板\n\n第一帧显示第一次和第二次投球的分数以及所得总分。第二帧显示其第一次投球的分数以及第二次投球补中的标记。第二帧显示的比赛总分是来自第一帧的比赛总分加上第二帧的额外帧总分。\n\
    \n这个例子为实现一个返回某帧比赛总分的函数提供了思路。清单 8-8 展示了添加到`FuguBowlPlayer`类中的这样一个函数`GetScore`的代码。如果指定的帧是游戏的第一帧，`GetScore`返回该帧的总分。如果该帧的总分为`-1`（表示尚不可用），那么`GetScore`返回`-1`以表示该帧的比赛总分尚不可用。\n\
    \n清单 8-8. FuguBowlPlayer 类中的 GetScore 函数\n\n```\nfunction GetScore(frame:int):int\
    \ {\n       if (frame==0 || scores[frame].total==-1) {\n              return scores[frame].total;\n\
    \       }  else {\n              var prev:int = GetScore(frame-1);\n         \
    \     if (prev==-1) {\n                      return -1;\n              }  else\
    \ {\n                      return scores[frame].total+prev;\n              }\n\
    \       }\n}\n```\n\n但如果帧总分可用且该帧不是第一帧，则将该帧总分与来自前一帧的比赛总分相加，除非前一帧的比赛总分尚不可用。如果前一帧的比赛总分不可用，则同样返回`-1`。\n\
    \n前一帧的比赛总分是通过对该帧调用`GetScore`获得的，而该调用又会对其前一帧调用`GetScore`，直到到达第一帧。`GetScore`是一个*递归函数*的例子，即调用自身的函数。无限递归被避免，因为最终`GetScore`会到达其*基准情况*，即总是会返回的第一帧。\n\
    \n### 完整清单\n\n`FuguBowlScore`脚本的完整清单过于冗长，不便在此展示（长达四页），但其所有内容均已在本书此部分展示。整个脚本`FuguBowlScore.js`可在`http://learnunity4.com/`上本章的项目中获取。\n\
    \n如果你想用`http://learnunity4.com/`上的版本替换脚本，请在访达中执行替换操作（即，将文件拖放或粘贴到此项目的 Scripts 文件夹中）。通常，能够简单地将文件从访达拖放到项目视图中非常方便，但在这种情况下，Unity\
    \ 会重命名新文件以避免覆盖原始文件。\n\n如果你的意图是替换原始脚本，请勿自行重命名，因为场景中的任何引用仍会引用该新名称下的脚本。相反，如果你想保留一份副本，请复制原始脚本（在访达中或使用\
    \ Unity 编辑器“编辑”菜单中的“复制”命令）。\n\n### 创建 FuguBowlPlayer\n\n`FuguBowlPlayer`类现已准备就绪，可以投入使用。由于该脚本未附加到任何\
    \ GameObject（也不能附加，因为`FuguBowlPlayer`不是`MonoBehaviour`），因此必须在运行时实例化`FuguBowlPlayer`。自然的位置是在`FuguBowl`脚本的`Awake`回调中进行，该回调已在实例化保龄球瓶（清单\
    \ 8-9）。\n\n清单 8-9. 在 FuguBowl.js 中创建 FuguBowlPlayer\n\n```\nstatic var player:FuguBowlPlayer\
    \ = null;\n\nfunction Awake() {\n       player = new FuguBowlPlayer();\n     \
    \  CreatePins();\n}\n```\n\n增强后的`Awake`回调会创建一个新的`FuguBowlPlayer`实例，并将其赋值给变量`player`，该变量被声明为静态变量，以便从`FuguBowl`脚本外部轻松访问（为下一章记分板实现做准备）。\n\
    \n为了支持多名玩家，`player`变量可能改为一个`FuguBowlPlayer`数组（一个可调整大小的`Array`，而非内置数组，以适应不同数量的玩家），并且可能存在一些封装函数，如`GetPlayer`和`GetNumberOfPlayers`。但就本书而言，我们将保持简洁，专注于单人游戏。\n\
    \n### 球瓶状态\n\n现在，`FuguBowl`脚本除了保龄球瓶和球之外，还有一个对`FuguBowlPlayer`的引用。但要调用`FuguBowlPlayer`的分数函数，`FuguBowl`必须传入已击倒的球瓶数量。与其在`FuguBowl`中添加代码来判断球瓶是否倒下，更简洁的做法是在附加到每个球瓶的脚本中编写该代码。这样，`FuguBowl`只需询问每个球瓶是否倒下，而无需了解球瓶的内部工作原理。\n\
    \n对于这个新的球瓶脚本，创建一个新的 JavaScript，命名为`FuguPinStatus`，并将其放在 Scripts 文件夹中（图 8-3）。\n\
    \n![9781430248750_Fig08-03.jpg](img/9781430248750_Fig08-03.jpg)\n\n图 8-3. 创建 FuguPinStatus.js\
    \ 脚本\n\n接下来，将清单 8-10 的内容添加到该脚本中。\n\n清单 8-10. FuguPinStatus.js 的清单\n\n```\n#pragma\
    \ strict\n\nvar knockedAngle:float = 45.0;\n\nprivate var initialAngles:Vector3;\n\
    \nfunction Awake () {\n       initialAngles = transform.localEulerAngles;\n}\n\
    \nfunction IsKnockedOver() {\n       return Mathf.Abs(transform.localEulerAngles.x-initialAngles.x)>knockedAngle\
    \ ||\n       Mathf.Abs(transform.localEulerAngles.y-initialAngles.y)>knockedAngle\
    \ ||\n               Mathf.Abs(transform.localEulerAngles.z-initialAngles.z)>knockedAngle;\n\
    }\n```\n\n脚本中的`Awake`回调将 GameObject 的初始旋转保存在私有变量`initialAngles`中，以供后续比较。函数`IsKnockedOver`根据球瓶绕任何轴的旋转角度是否超过`knockedAngle`变量中指定的度数来返回`true`或`false`。\n\
    \n在项目视图中，选择 BarrelPin 预制件中的 Barrel GameObject，并使用检查器视图中的“添加组件”按钮来附加 FuguPinStatus\
    \ 脚本（图 8-4）。\n\n![9781430248750_Fig08-04.jpg](img/9781430248750_Fig08-04.jpg)\n\
    \n图 8-4. 附加到 Barrel 球瓶预制件上的 FuguPinStatus 脚本\n\n```"
- fmt: "在查询每个球瓶是否被击倒之前，`FuguBowl`脚本需要先找到这些球瓶。如果`Array`中填充的是基于胶囊体的`Pin`预制体，那么遍历`pins`变量中的每个`GameObject`即可；但当`Array`中包含的是`BarrelPin`的`GameObject`时，作为真实球瓶的`Barrel`游戏对象是这些`BarrelPin`游戏对象的子对象。\n\
    \n幸运的是，在[第7章](#9781430248750_Ch07.xhtml)中，我们为所有“真实”球瓶（即实际移动的、带有`Rigidbody`和`Mesh`的`GameObject`）添加了`Pin`标签。这使我们能够使用静态函数`GameObject.FindGameObjectsWithTag`来获取所有真实球瓶的数组。该操作应在`FuguBowl`脚本的`CreatePins`函数末尾执行，即所有球瓶实例化完成之后（见[清单\
    \ 8-11](#9781430248750_Ch08.xhtml#list11)）。这些被打上标签的球瓶被赋值给一个私有变量`pinBodies`。\n\n\
    [清单 8-11.](#9781430248750_Ch08.xhtml#_list11)  在`FuguBowl.js`中声明并设置`pinBodies`变量\n\
    \n```\nprivate var pinBodies:GameObject[]; // the real physical pins\n\nfunction\
    \ CreatePins() {\n       pins = new Array();\n       var offset = Vector3.zero;\n\
    \       for (var row=0; row<pinRows; ++row) {\n              offset.z+=pinDistance;\n\
    \              offset.x=-pinDistance*row/2;\n              for (var n=0; n<=row;\
    \ ++n) {\n                      pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));\n\
    \                      offset.x+=pinDistance;\n              }\n       }\n   \
    \    pinBodies = GameObject.FindGameObjectsWithTag(\"Pin\");\n}\n```\n\n被击倒的球瓶数量由`GetPinsDown`函数计算（见[清单\
    \ 8-12](#9781430248750_Ch08.xhtml#list12)）。该函数遍历`pinObjects`数组，对每个`IsKnockedOver`函数返回`true`的球瓶，递增局部变量`pinsDown`。循环结束后，返回`pinsDown`计数器的值。\n\
    \n[清单 8-12.](#9781430248750_Ch08.xhtml#_list12)  `FuguBowl.js`中的`GetPinsDown`函数\n\
    \n```\nfunction GetPinsDown():int {\n       var pinsDown:int = 0;\n       for\
    \ (var pin:GameObject in pinBodies) {\n              if (pin.GetComponent(FuguPinStatus).IsKnockedOver())\
    \ {\n                      ++pinsDown;\n              }\n       }\n       return\
    \ pinsDown;\n}\n```\n\n除了统计被击倒的球瓶，我们还可以移除它们——就像真实保龄球馆中被击倒的球瓶会被清走一样。`RemoveDownedPins`函数（见[清单\
    \ 8-13](#9781430248750_Ch08.xhtml#list13)）遍历`pinBodies`列表，并对每个`IsKnockedDown`返回`true`的球瓶调用`SetActive(false)`。调用`SetActive(false)`等同于在检视面板中取消选中`GameObject`左上角的复选框。每个被击倒的球瓶虽未完全从场景中移除，但会变为不可见且不参与碰撞。\n\
    \n[清单 8-13.](#9781430248750_Ch08.xhtml#_list13)  `FuguBowl.js`中的`RemovePins`函数\n\
    \n```\nfunction RemoveDownedPins() {\n       for (var pin:GameObject in pinBodies)\
    \ {\n              if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {\n  \
    \                    pin.SetActive(false);\n              }\n       }\n}\n```\n\
    \n当然，被停用的球瓶需要在某个时刻重新激活。现有的`ResetPins`函数（见[清单 8-14](#9781430248750_Ch08.xhtml#list14)）是一个合适的位置，因为当为新的一局准备将球瓶复位到初始位置时，会调用`ResetPins`。\n\
    \n[清单 8-14.](#9781430248750_Ch08.xhtml#list14)  `FuguBowl.js`中的`ResetPins`函数\n\
    \n```\nfunction ResetPins() {\n       for (var pin:GameObject in pinBodies) {\n\
    \              pin.SetActive(true);\n              pin.SendMessage(\"ResetPosition\"\
    );\n       }\n}\n```\n\n实际上，现在遍历`pins`数组的循环可以被替换为遍历`pinBodies`。在循环内部，对每个球瓶调用`SetActive(true)`（以防它之前被停用），并且可以用`SendMessage`替代`BroadcastMessage`，因为`pinBodies`中的每个球瓶都已知挂载了`FuguReset`脚本。\n\
    \n## 游戏逻辑\n\n我强烈建议在尝试编写游戏逻辑之前，先以有限状态机（FSM）的形式勾勒出游戏框架。有限状态机将程序表示为一系列有限的状态。FSM在任何时刻都处于一个状态，并在状态之间进行转换。\n\
    \n> **注意**：术语“状态机”通常指代FSM，但从技术上讲，状态机的范围很广，从最简单、能力最弱的自动机类别FSM，一直到具有无限内存和潜在无限状态数量的图灵机。\n\
    \n一旦你将游戏可视化表示为FSM，你就能确信可以将其编码实现。反之，如果你无法将游戏流程可视化为FSM，那你可能只是有一个模糊的想法，还没有准备好去实现它！\n\
    \n### 设计FSM\n\n要勾勒出FSM，请思考游戏将经历的所有状态。所有FSM都有一个初始状态，在本例中是新游戏的开始。玩家从第一局的第一球开始，滚动球，当滚动结束时，会得到一次全中、一次补中或一个常规分数。然后玩家进入同一局的第二球，或进入新一局的第一球，并重复此过程。如果玩家在第二球，流程与上述相同，只是转换条件变为：要么回到新一局的第一球，要么（在第十局且玩家投出全中或补中时）可能进入第三球。所有十局完成后，FSM转换到`GameOver`状态，该状态可能循环回到新游戏。\n\
    \n[图 8-5](#9781430248750_Ch08.xhtml#Fig5) 展示了上述状态机可能的样子。\n\n![9781430248750_Fig08-05.jpg](images/9781430248750_Fig08-05.jpg)\n\
    \n[图 8-5.](#9781430248750_Ch08.xhtml#_Fig5) 保龄球游戏的状态机\n\n第一次就完全画对并不重要。通常，当你勾勒出程序流程并开始编写脚本时，你会意识到遗漏了什么或发现了更好的方法，然后回头调整最初的设计。这就像我的一位教授关于构造证明所说的那样——完成一个证明的过程是混乱的，但之后你会回头去清理它，并假装从一开始就是这么计划的！\n\
    \n严格来说，FSM没有记忆，因此一个真正完整的保龄球状态机将包含大量重复的状态（针对三个球和所有十局）。但包含数百个状态的状态机很难理解，这在很大程度上违背了其目的。我们不必对此过于教条，所以假设存在一些变量来追踪当前正在进行的局数和玩家正在投掷的球数。\n\
    \n### 追踪游戏状态\n\n在`FuguBowl`脚本中定义的用于追踪当前局数和当前球的变量如[清单 8-15](#9781430248750_Ch08.xhtml#list15)所示。\n\
    \n[清单 8-15.](#9781430248750_Ch08.xhtml#_list15)  `FuguBowl.js`中追踪当前局数和球的变量\n\n\
    ```\nprivate var frame:int; // current frame, ranges for 0-9 (representing 1-10)\n\
    private var roll:Roll; // the current roll in the current frame\n\nenum Roll {\n\
    \       Ball1,\n       Ball2,\n       Ball3\n}\n```\n\n变量`frame`使用`int`类型追踪当前局数，取值范围是0到9（代表第1到第10局），因为该数字将作为数组索引传递给`FuguBowlPlayer`函数。"
  raw: 'Before querying each pin to see if it’s been knocked over, the `FuguBowl`
    script needs to find the pins. Querying each GameObject in the variable pins would
    work if the `Array` is filled with the capsule-based Pin prefab but when the Array
    is full of BarrelPin GameObjects, the Barrel GameObjects that act as the real
    pins are children of those BarrelPin GameObjects.


    Fortunately, in [Chapter 7](#9781430248750_Ch07.xhtml) we tagged all the “real”
    pins, the GameObjects with Rigidbodies and Meshes that actually move, with the
    tag Pin. This makes it possible to retrieve an array of all the real pins using
    the static function `GameObject.FindGameObjectsWithTag`. That should take place
    at the end of the `CreatePins` function in the `FuguBowl` script, after all the
    pins have been instantiated ([Listing 8-11](#9781430248750_Ch08.xhtml#list11)).
    The tagged pins are assigned to a private variable `pinBodies`.


    [Listing 8-11.](#9781430248750_Ch08.xhtml#_list11)  Declaring and Setting the
    pinBodies Variable in FuguBowl.js


    ```

    private var pinBodies:GameObject[]; // the real physical pins


    function CreatePins() {

           pins = new Array();

           var offset = Vector3.zero;

           for (var row=0; row<pinRows; ++row) {

                  offset.z+=pinDistance;

                  offset.x=-pinDistance*row/2;

                  for (var n=0; n<=row; ++n) {

                          pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));

                          offset.x+=pinDistance;

                  }


    }

           pinBodies = GameObject.FindGameObjectsWithTag("Pin");

    }

    ```


    The number of pins that have been knocked down are counted by the function `GetPinsDown`
    function ([Listing 8-12](#9781430248750_Ch08.xhtml#list12)) that loops through
    the `pinObjects` array, incrementing a local variable `pinsDown` for each pin
    whose `IsKnockedOver` function returns true. After the loop is complete, the value
    of the `pinsDown` counter is returned.


    [Listing 8-12.](#9781430248750_Ch08.xhtml#_list12)  The GetPinsDown Function in
    FuguBowl.js


    ```

    function GetPinsDown():int {

           var pinsDown:int = 0;

           for (var pin:GameObject in pinBodies) {

                  if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

                          ++pinsDown;

                  }

           }

           return pinsDown;

    }

    ```


    Besides counting pins that have been knocked down, we can remove them, like the
    way real pins get scraped away after getting knocked down in a real bowling alley.
    The function `RemoveDownedPins` ([Listing 8-13](#9781430248750_Ch08.xhtml#list13))
    loops through the `pinBodies` list and calls `SetActive(false)` on each one that
    returns true for `IsKnockedDown`. Calling `SetActive(false)` is equivalent to
    unchecking the checkbox on the top left of a GameObject in the Inspector View.
    Each pin that is knocked down, while not getting completely removed form the scene,
    is made invisible and does not collide.


    [Listing 8-13.](#9781430248750_Ch08.xhtml#_list13)  The RemovePins Function in
    FuguBowl.js


    ```

    function RemoveDownedPins() {

           for (var pin:GameObject in pinBodies) {

                  if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {

                          pin.SetActive(false);

                  }

           }

    }

    ```


    Of course, deactivated pins need to be reactivated at some point. The existing
    `ResetPins` function ([Listing 8-14](#9781430248750_Ch08.xhtml#list14)) is a good
    place to do that, since `ResetPins` is called when restoring the pins to their
    original positions in preparation for bowling a new frame.


    [Listing 8-14.](#9781430248750_Ch08.xhtml#_list14)  ResetPins Function in FuguBowl.js


    ```

    function ResetPins() {

           for (var pin:GameObject in pinBodies) {

                  pin.SetActive(true);

                  pin.SendMessage("ResetPosition");

           }

    }

    ```


    In fact, now the loop through the pins `Array` can be replaced with a loop through
    `pinBodies`. Within the loop, `SetActive(true)` is called on each pin in case
    it was deactivated and `SendMessage` can replace `BroadcastMessage` because each
    pin in `pinBodies` is known to have the `FuguReset` script attached.


    The Game Logic


    I highly recommend sketching out a game as an finite state machine (FSM) before
    attempting to code the game logic. A finite state machine represents a program
    as, surprise, a finite set of states. An FSM is in one state at any time and transitions
    from state to state.


    **Note**   The term state machine often refers to an FSM, but technically there
    is a whole range of state machines ranging from the FSM, the simplest and least-powerful
    class of automata, up to the Turing Machine, which has infinite memory and a potentially
    infinite number of states.


    Once you have your game visualized as an FSM, you can be confident that you can
    code it. Conversely, if you can’t visualize your game flow as an FSM, you probably
    just have a vague idea that you’re not yet ready to implement it!


    Design the FSM


    To sketch out the FSM, think of all the states that the game will go through.
    All FSMs have an initial state, which in this case is the beginning of a new game.
    The player starts out in the first frame with the first ball, starts rolling the
    ball, and when finished rolling, has a strike, a spare, or a regular score. Then
    the player moves onto either the second ball or back to the first in a new frame,
    and the process is repeated. If the player is on the second ball, the flow is
    the same except for the transition back to the first ball of a new frame or possibly
    the third ball if this is the tenth frame and a the player rolled a strike or
    spare. After all ten frames have been completed, the FSM transitions to the GameOver
    state, which may cycle back to a new game.


    [Figure 8-5](#9781430248750_Ch08.xhtml#Fig5) shows how the state machine just
    described might look.


    ![9781430248750_Fig08-05.jpg](images/9781430248750_Fig08-05.jpg)


    [Figure 8-5](#9781430248750_Ch08.xhtml#_Fig5). A state machine for bowling


    It’s not important to get it exactly right the first time. Typically, when you
    sketch out the flow of a program and then start scripting, you’ll realize you
    forgot something or there’s a better way, and then you go back and adjust your
    original design. It’s like what one of my professors said about constructing proofs—it’s
    a messy process completing one, but then you go back and clean it up and pretend
    that’s how you planned it in the first place!


    Technically, an FSM doesn’t have memory, so a really complete state machine for
    bowling would have a lot of duplicated states for all three balls and even all
    ten frames. But a state machine with a few hundred states would be hard to understand,
    which would largely defeat its purpose. We don’t have to be purists about this,
    so let’s assume there are variables tracking the current frame that’s being played
    and which ball the player is rolling.


    Tracking the Game


    The variables defined in the FuguBowl script to track the current frame and current
    ball are shown in [Listing 8-15](#9781430248750_Ch08.xhtml#list15).


    [Listing 8-15.](#9781430248750_Ch08.xhtml#_list15)  The Variables in FuguBowl.js
    that Track the Current Frame and Ball


    ```

    private var frame:int; // current frame, ranges for 0-9 (representing 1-10)

    private var roll:Roll; // the current roll in the current frame


    enum Roll {

           Ball1,

           Ball2,

           Ball3

    }

    ```


    The variable `frame` tracks the current frame with an `int`, ranging from 0-9
    instead of 1-10 because that number will be used as an array index when it’s passed
    to the `FuguBowlPlayer` functions.'
  trans: "\n在查询每个球瓶是否被击倒之前，`FuguBowl`脚本需要先找到这些球瓶。如果`Array`中填充的是基于胶囊体的`Pin`预制体，那么遍历`pins`变量中的每个`GameObject`即可；但当`Array`中包含的是`BarrelPin`的`GameObject`时，作为真实球瓶的`Barrel`游戏对象是这些`BarrelPin`游戏对象的子对象。\n\
    \n幸运的是，在第 7 章中，我们为所有“真实”球瓶（即实际移动的、带有`Rigidbody`和`Mesh`的`GameObject`）添加了`Pin`标签。这使我们能够使用静态函数`GameObject.FindGameObjectsWithTag`来获取所有真实球瓶的数组。该操作应在`FuguBowl`脚本的`CreatePins`函数末尾执行，即所有球瓶实例化完成之后（见清单\
    \ 8-11）。这些被打上标签的球瓶被赋值给一个私有变量`pinBodies`。\n\n清单 8-11.  在`FuguBowl.js`中声明并设置`pinBodies`变量\n\
    \n```\nprivate var pinBodies:GameObject[]; // the real physical pins\n\nfunction\
    \ CreatePins() {\n       pins = new Array();\n       var offset = Vector3.zero;\n\
    \       for (var row=0; row<pinRows; ++row) {\n              offset.z+=pinDistance;\n\
    \              offset.x=-pinDistance*row/2;\n              for (var n=0; n<=row;\
    \ ++n) {\n                      pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));\n\
    \                      offset.x+=pinDistance;\n              }\n       }\n   \
    \    pinBodies = GameObject.FindGameObjectsWithTag(\"Pin\");\n}\n```\n\n被击倒的球瓶数量由`GetPinsDown`函数计算（见清单\
    \ 8-12）。该函数遍历`pinObjects`数组，对每个`IsKnockedOver`函数返回`true`的球瓶，递增局部变量`pinsDown`。循环结束后，返回`pinsDown`计数器的值。\n\
    \n清单 8-12.  `FuguBowl.js`中的`GetPinsDown`函数\n\n```\nfunction GetPinsDown():int\
    \ {\n       var pinsDown:int = 0;\n       for (var pin:GameObject in pinBodies)\
    \ {\n              if (pin.GetComponent(FuguPinStatus).IsKnockedOver()) {\n  \
    \                    ++pinsDown;\n              }\n       }\n       return pinsDown;\n\
    }\n```\n\n除了统计被击倒的球瓶，我们还可以移除它们——就像真实保龄球馆中被击倒的球瓶会被清走一样。`RemoveDownedPins`函数（见清单\
    \ 8-13）遍历`pinBodies`列表，并对每个`IsKnockedDown`返回`true`的球瓶调用`SetActive(false)`。调用`SetActive(false)`等同于在检视面板中取消选中`GameObject`左上角的复选框。每个被击倒的球瓶虽未完全从场景中移除，但会变为不可见且不参与碰撞。\n\
    \n清单 8-13.  `FuguBowl.js`中的`RemovePins`函数\n\n```\nfunction RemoveDownedPins()\
    \ {\n       for (var pin:GameObject in pinBodies) {\n              if (pin.GetComponent(FuguPinStatus).IsKnockedOver())\
    \ {\n                      pin.SetActive(false);\n              }\n       }\n\
    }\n```\n\n当然，被停用的球瓶需要在某个时刻重新激活。现有的`ResetPins`函数（见清单 8-14）是一个合适的位置，因为当为新的一局准备将球瓶复位到初始位置时，会调用`ResetPins`。\n\
    \n清单 8-14.  `FuguBowl.js`中的`ResetPins`函数\n\n```\nfunction ResetPins() {\n    \
    \   for (var pin:GameObject in pinBodies) {\n              pin.SetActive(true);\n\
    \              pin.SendMessage(\"ResetPosition\");\n       }\n}\n```\n\n实际上，现在遍历`pins`数组的循环可以被替换为遍历`pinBodies`。在循环内部，对每个球瓶调用`SetActive(true)`（以防它之前被停用），并且可以用`SendMessage`替代`BroadcastMessage`，因为`pinBodies`中的每个球瓶都已知挂载了`FuguReset`脚本。\n\
    \n## 游戏逻辑\n\n我强烈建议在尝试编写游戏逻辑之前，先以有限状态机（FSM）的形式勾勒出游戏框架。有限状态机将程序表示为一系列有限的状态。FSM 在任何时刻都处于一个状态，并在状态之间进行转换。\n\
    \n> **注意**：术语“状态机”通常指代 FSM，但从技术上讲，状态机的范围很广，从最简单、能力最弱的自动机类别 FSM，一直到具有无限内存和潜在无限状态数量的图灵机。\n\
    \n一旦你将游戏可视化表示为 FSM，你就能确信可以将其编码实现。反之，如果你无法将游戏流程可视化为 FSM，那你可能只是有一个模糊的想法，还没有准备好去实现它！\n\
    \n### 设计 FSM\n\n要勾勒出 FSM，请思考游戏将经历的所有状态。所有 FSM 都有一个初始状态，在本例中是新游戏的开始。玩家从第一局的第一球开始，滚动球，当滚动结束时，会得到一次全中、一次补中或一个常规分数。然后玩家进入同一局的第二球，或进入新一局的第一球，并重复此过程。如果玩家在第二球，流程与上述相同，只是转换条件变为：要么回到新一局的第一球，要么（在第十局且玩家投出全中或补中时）可能进入第三球。所有十局完成后，FSM\
    \ 转换到`GameOver`状态，该状态可能循环回到新游戏。\n\n图 8-5 展示了上述状态机可能的样子。\n\n![9781430248750_Fig08-05.jpg](img/9781430248750_Fig08-05.jpg)\n\
    \n图 8-5. 保龄球游戏的状态机\n\n第一次就完全画对并不重要。通常，当你勾勒出程序流程并开始编写脚本时，你会意识到遗漏了什么或发现了更好的方法，然后回头调整最初的设计。这就像我的一位教授关于构造证明所说的那样——完成一个证明的过程是混乱的，但之后你会回头去清理它，并假装从一开始就是这么计划的！\n\
    \n严格来说，FSM 没有记忆，因此一个真正完整的保龄球状态机将包含大量重复的状态（针对三个球和所有十局）。但包含数百个状态的状态机很难理解，这在很大程度上违背了其目的。我们不必对此过于教条，所以假设存在一些变量来追踪当前正在进行的局数和玩家正在投掷的球数。\n\
    \n### 追踪游戏状态\n\n在`FuguBowl`脚本中定义的用于追踪当前局数和当前球的变量如清单 8-15 所示。\n\n清单 8-15.  `FuguBowl.js`中追踪当前局数和球的变量\n\
    \n```\nprivate var frame:int; // current frame, ranges for 0-9 (representing 1-10)\n\
    private var roll:Roll; // the current roll in the current frame\n\nenum Roll {\n\
    \       Ball1,\n       Ball2,\n       Ball3\n}\n```\n\n变量`frame`使用`int`类型追踪当前局数，取值范围是\
    \ 0 到 9（代表第 1 到第 10 局），因为该数字将作为数组索引传递给`FuguBowlPlayer`函数。\n"
- fmt: "变量`roll`用来记录球的当前轮次，原本也可以声明为`int`类型，并采用0-2或1-3的数字来表示一局中的三种可能球况。但使用`enum`（*枚举*的缩写）更为清晰，它本质上允许你定义一个新类型，其值取自一组命名值中的一个。因此`roll`被声明为`Roll`类型，这是一个包含`Ball1`、`Ball2`或`Ball3`的枚举。\n\
    \n顺便提一下，至此我们已经遇到了几种不同类型的类别：基本类型如`int`和`boolean`、包含其他类型的内置数组、像`Roll`这样的枚举、像`Vector3`这样的结构体，以及像`GameObject`、`Component`和`FuguBowlPlayer`这样的类。在这些类别中，类和数组是*引用类型*，这意味着不同变量可以引用同一类型的同一个实例，并且对该实例的修改将通过每个引用该实例的变量可见。\n\
    \n## 启动状态机\n\n好了，现在你已经勾勒出状态机的草图，接下来该如何编写代码呢？FSM（有限状态机）非常有用，以至于一些游戏引擎（包括CryEngine、虚幻引擎和Second\
    \ Life）都在其脚本中内置了对它的支持。不幸的是，Unity并不支持，但既然这是软件问题，总有很多方法可以自行实现FSM支持。\n\n一种方法是在`Update`函数中放置一个大的条件语句，根据当前所处的状态执行不同的操作（我们可能会使用一个枚举来定义这些不同的状态）。然而，这种方法往往会导致`Update`函数变得臃肿不堪。事实上，由于[第7章](#9781430248750_Ch07.xhtml)中添加到`FuguBowl`脚本的`Update`回调将被我们即将添加的状态机所取代，你现在就应该从`FuguBowl`脚本中删除该回调。\n\
    \n另一种创建FSM的方法（我曾尝试过一段时间）是用一个挂载了多个脚本的`GameObject`来表示状态机，其中每个脚本代表一个状态。每当当前状态退出时，该脚本会禁用自身并启用下一个脚本或状态。这种方法很有吸引力，因为每个脚本或状态都有自己的`Update`函数和其他回调。但我发现，如果整个FSM包含在单个脚本中，我的状态机更容易理解和处理。\n\
    \n因此，我最终决定使用*协程*来实现状态机。协程是一种函数，可以通过调用`yield`（该函数即使在尚未执行完毕时，也会*暂时*交出控制权）来在某一帧或多帧中暂停自身。你可以将每个状态实现为一个协程，当状态退出时该协程返回。在状态中，协程执行该状态下应发生的任何操作，但会反复进行`yield`，以免阻塞Unity的其余部分（包括渲染器和物理系统）运行。在返回之前，协程会指定它将转换到的下一个状态。\n\
    \n并非所有回调都能用作协程。例如，`Awake`不能用作协程，`Update`也不能，但`Start`可以`yield`，因此它可以充当FSM控制器（[清单8-16](#9781430248750_Ch08.xhtml#list16)）。\n\
    \n[清单8-16.](#9781430248750_Ch08.xhtml#_list16)  `FuguBowl.js`中运行状态机的`Start`回调\n\
    \n```\nprivate var state:String;\n\nfunction Start() {\n       state=\"StateNewGame\"\
    ;\n       while (true) {\n              Debug.Log(\"State \"+state);\n       \
    \       yield StartCoroutine(state);\n              yield;\n       }\n}\n```\n\
    \n当前状态的名称（即实现该状态的协程的名称）以`String`类型保存在名为`state`的私有变量中。`Start`回调无限循环，反复使用`state`的值调用`StartCoroutine`来调用协程。`Start`在对`StartCoroutine`的调用上执行`yield`，以便它一直等待，直到状态协程执行完毕，然后再启动一个具有下一个`state`值的协程。\n\
    \n无法保证被调用的协程一定会`yield`，因此`Start`在循环中额外添加了一个`yield`以确保万无一失，这样在状态之间至少发生一次`yield`，从而给游戏引擎的其余部分提供运行机会。\n\
    \n作为调试辅助手段，`Start`在执行每个状态协程之前都会调用`Debug.Log`（[图8-6](#9781430248750_Ch08.xhtml#Fig6)）。这是在测试游戏时跟踪状态机进度的一种便捷方式。\n\
    \n![9781430248750_Fig08-06.jpg](images/9781430248750_Fig08-06.jpg)\n\n[图8-6](#9781430248750_Ch08.xhtml#_Fig6)。状态机调试跟踪的控制台视图\n\
    \n## 各状态\n\n按照惯例，我们将在所有状态协程的名称前加上前缀`State`，以表明这些函数是状态机中的状态。\n\n### StateNewGame\n\
    \n保龄球状态机的初始状态是`StateNewGame`（[清单8-17](#9781430248750_Ch08.xhtml#list17)），它通过清除玩家的分数并将当前局索引设置为0来开始一局新游戏，指明玩家正在进行游戏的第一局。\n\
    \n[清单8-17.](#9781430248750_Ch08.xhtml#_list17)  `FuguBowl.js`中的`StateNewGame`\n\
    \n```\nfunction StateNewGame() {\n       player.ClearScore();\n       frame =\
    \ 0;\n       state=\"StateBall1\";\n}\n```\n\n在返回（实际上是退出状态）之前，`StateNewGame`指定下一个状态为`StateBall1`，即玩家开始滚动该局第一球的状态。\n\
    \n### StateBall1\n\n`StateBall1`（[清单8-18](#9781430248750_Ch08.xhtml#list18)）采取的第一个动作是重置球瓶、球以及主摄像机的位置。这在第一次进入该状态时（即游戏开始时）并非必要，但当玩家完成一局投球并转换回此状态时，所有物体都需要放置到其起始位置和旋转角度（可能被击倒的球瓶其旋转角度会发生变化）。\n\
    \n[清单8-18.](#9781430248750_Ch08.xhtml#_list18)  `FuguBowl.js`中开始滚动第一球的状态\n\n```\n\
    function StateBall1() {\n       ResetEverything(); // 重置球瓶、摄像机和球\n       roll\
    \ = Roll.Ball1;\n       state=\"StateRolling\";\n}\n```\n\n执行重置后，此状态将`roll`变量设置为`Roll.Ball1`，表示玩家正在滚动该局的第一球。最后，此状态转换到`StateRolling`，即球正在向球瓶滚去时所处的状态。\n\
    \n### StateBall2\n\n与`StateBall1`类似，`StateBall2`（[清单8-19](#9781430248750_Ch08.xhtml#list19)）首先重置球和主摄像机。\n\
    \n[清单8-19.](#9781430248750_Ch08.xhtml#_list19)  `FuguBowl.js`中开始滚动第二球的状态\n\n```\n\
    function StateBall2() {\n       ResetBall();\n       ResetCamera();\n       if\
    \ (GetPinsDown()==10) {\n              ResetPins();\n       }  else {\n      \
    \        RemoveDownedPins();\n       }\n       roll = Roll.Ball2;\n       state=\"\
    StateRolling\";\n}\n```\n\n如果玩家到达此点，通常意味着该局的第一球没有形成全倒，现在是时候尝试击倒剩余的球瓶了，但在清理上一轮击倒的球瓶之后。但如果所有球瓶都已倒下，那一定是第十局中的特殊情况：一次全倒之后再进行两次投球，此时需要重置球瓶。\n\
    \n在退出该状态之前，`roll`被设置为`Roll.Ball2`，并且与`StateBall1`一样，下一个状态设置为`StateRolling`。\n\n\
    ### StateBall3"
  raw: 'The variable `roll` tracks the current roll of the ball and could also have
    been declared an `int`, choosing a convention where the numbers 0-2 or 1-3 represent
    the three possible balls in a frame. But it’s cleaner to define an `enum` (short
    for *enumeration*), which essentially allows you to define a new type where the
    value is one from a list of named values. So roll is declared to be of type `Roll`,
    which is an enum with values `Ball1`, `Ball2`, or `Ball3`.


    By the way, at this point we’ve encountered several different categories of types:
    primitive types like `int` and `boolean`, built-in arrays that contain other types,
    enums like `Roll`, structs like `Vector3`, and classes like `GameObject`, `Component`,
    and `FuguBowlPlayer`. Of these categories, classes and arrays are *reference types*,
    meaning different variables can reference the same instance of that type, and
    modifications to the instance will be visible through every variable referencing
    that instance.


    Starting the State Machine


    Okay, now that you’ve sketched out the state machine, how do you go about coding
    it? FSMs are useful enough that some game engines, including CryEngine, Unreal,
    and Second Life, have built-in support for in their scripts. Unfortunately, Unity
    doesn’t, but since this is software, there are a variety of ways to homebrew some
    FSM support.


    One way is to have essentially a big conditional statement inside the `Update`
    function that performs different actions depending on which state it’s in (and
    we’d probably use an enum to define those different states). However, that method
    tends to result in unwieldy `Update` functions. In fact, because because the `Update`
    callback added to the `FuguBowl` script in [Chapter 7](#9781430248750_Ch07.xhtml)
    will be obviated by the state machine we’re about to add, you should delete that
    callback from the `FuguBowl` script right now.


    Another way to create an FSM, which I tried for a while, is to represent a state
    machine with a GameObject that has several scripts attached, where each script
    represents a state. Whenever the current state is exited, that script would disable
    itself and enable the next script or state. This method is appealing, since each
    script or state has its own `Update` function and other callbacks. But I find
    my state machines easier to understand and work with if the entire FSM is contained
    in a single script.


    So, ultimately I’ve settled on implementing state machines with *coroutines*,
    which are functions that can suspend themselves for one or more frames at a time
    by calling `yield`(the function is *yielding* control temporarily even though
    it hasn’t finished executing). You can implement each state as a coroutine that
    returns when the state is exited. While in the state, the coroutine performs whatever
    action is supposed to take place during that state, but repeatedly yielding so
    it doesn’t block the rest of Unity (including the renderer and physics) from running.
    And before returning, the coroutine specifies the next state it will transition
    to.


    Some, but not all, callbacks can be used as coroutines. For example, `Awake` cannot
    be used as a coroutine, nor `Update`, but `Start` can yield and thus can act as
    an FSM controller ([Listing 8-16](#9781430248750_Ch08.xhtml#list16)).


    [Listing 8-16.](#9781430248750_Ch08.xhtml#_list16)  Start Callback Running State
    Machine in FuguBowl.js


    ```

    private var state:String;


    function Start() {

           state="StateNewGame";

           while (true) {

                  Debug.Log("State "+state);

                  yield StartCoroutine(state);

                  yield;

           }

    }

    ```


    The name of the current state, which is the name of the coroutine implementing
    that state, is held as a `String` in a private variable named `state`. The `Start`
    callback loops endlessly, repeatedly calling `StartCoroutine` with the value of
    `state` to invoke the coroutine. `Start` yields on the call to `StartCoroutine`
    so that it waits until the state coroutine has finished executing before starting
    a coroutine with the next value of state.


    There’s no guarantee the coroutines called will yield at all, so `Start` includes
    an extra yield in the loop for good measure to make sure at least one yield occurs
    between states and gives the rest of the game engine an opportunity to work.


    As a debugging aid, `Start` calls `Debug.Log` before executing each state coroutine
    ([Figure 8-6](#9781430248750_Ch08.xhtml#Fig6)). This is a convenient way to trace
    the state machine progress when testing the game.


    ![9781430248750_Fig08-06.jpg](images/9781430248750_Fig08-06.jpg)


    [Figure 8-6](#9781430248750_Ch08.xhtml#_Fig6). The Console View of a state machine
    debug trace


    The States


    As a convention, we’ll prefix all of the state coroutines with `State` to indicate
    those functions are states in a state machine.


    StateNewGame


    The initial state of the bowling state machine is `StateNewGame` ([Listing 8-17](#9781430248750_Ch08.xhtml#list17)),
    which starts a new game by clearing the player’s score and setting the current
    frame index to 0, specifying the player is currently bowling the first frame of
    the game.


    [Listing 8-17.](#9781430248750_Ch08.xhtml#_list17)  StateNewGame in FuguBowl.js


    ```

    function StateNewGame() {

           player.ClearScore();

           frame = 0;

           state="StateBall1";

    }

    ```


    Before returning (effectively, exiting the state), `StateNewGame` specifies the
    next state is `StateBall1`, which is the state where the player begins rolling
    the first ball of the frame.


    StateBall1


    The first action `StateBall1` ([Listing 8-18](#9781430248750_Ch08.xhtml#list18))
    takes is to reset the positions of the pins, Ball, and also the Main Camera. This
    isn’t really necessary the first time the state is entered, i.e., the beginning
    of the game, but when the player finishes bowling a frame and transitions back
    to this state, everything needs to be placed in its starting position and rotation
    (pins that may be knocked over will have their rotations changed).


    [Listing 8-18.](#9781430248750_Ch08.xhtml#_list18)  The State to Start Rolling
    the First Ball in FuguBowl.js


    ```

    function StateBall1() {

           ResetEverything(); // reset pins, camera and ball

           roll = Roll.Ball1;

           state="StateRolling";

    }

    ```


    After performing the reset, this state sets the roll variable to `Roll.Ball1`,
    indicating the player is rolling the first ball of the frame. Finally, this state
    transitions to `StateRolling`, the state occupied while the ball is rolling toward
    the pins.


    StateBall2


    Like `StateBall1`, `StateBall2` ([Listing 8-19](#9781430248750_Ch08.xhtml#list19))
    starts by resetting the Ball and Main Camera.


    [Listing 8-19.](#9781430248750_Ch08.xhtml#_list19)  The State to Commence Rolling
    the Second Ball in FuguBowl.js


    ```

    function StateBall2() {

           ResetBall();

           ResetCamera();

           if (GetPinsDown()==10) {

                  ResetPins();

           }  else {

                  RemoveDownedPins();

           }

           roll = Roll.Ball2;

           state="StateRolling";

    }

    ```


    If the player has reached this point, normally it means the first ball of the
    frame didn’t result in a strike, and now it’s time to try knocking down the remaining
    pins, after cleaning up the downed pins from the previous roll. But if all the
    pins are down, it must be that special case in the tenth frame where a strike
    then results in two more rolls, and the pins are reset.


    Before exiting the state, roll is set to `Roll.Ball2`, and as with `StateBall1`,
    the next state is set to `StateRolling`.


