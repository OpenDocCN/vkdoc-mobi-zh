  trans: "\n`Ray`被作为第一个参数传递给静态函数`Physics.Raycast`，以检查该`Ray`是否与任何游戏对象的碰撞体组件相交。如果存在第一个交点，则相关信息会通过作为第二个参数传入的`RayCastHit`结构体返回。第三个参数是射线投射的距离，第四个参数是用于测试相交的图层集合。通过将相机远平面距离作为射线投射距离，并将相机剔除遮罩（可见图层集合）作为用于相交测试的图层集合，可以限制射线投射的可能结果。\n\
    \n如果对`Physics.Raycast`的调用返回`true`（表示存在相交），则检索相交的碰撞体组件，并对其调用`SendMessage`以在附加的脚本中调用`OnTap`回调（对一个组件调用`SendMessage`等同于对该组件的游戏对象调用`SendMessage`）。\n\
    \n注意，对`SendMessage`的调用包含一个可选的第二个参数`SendMessageOptions.DontRequireReceiver`。如果没有该参数，当消息被发送到没有匹配函数（或本例中没有`OnTap`函数）的游戏对象时，Unity\
    \ 会报告错误。\n\n整个`Update`回调被包裹在`#ifdef UNITY_IPHONE`中，因为它仅用于 iOS 触摸屏输入。同样，你现在可以使用`UNITY_IPHONE`将`OnMouseDown`回调重命名为`OnTap`，以便由`FuguOnTap`脚本调用（清单\
    \ 13-5）。\n\n清单 13-5. FuguDebugOnMouse 脚本，为 iOS 提供备用回调名称\n\n```csharp\n#pragma\
    \ strict\nif !UNITY_IPHONE\nfunction OnMouseDown () {\n#else\nfunction OnTap ()\
    \ {\n#endif\n        Debug.Log(\"GameObject \"+ gameObject.name + \" was touched\"\
    );\n}\n```\n\n现在，如果你再次运行游戏并点击球，你仍然会看到调试信息，但它将来自`FuguOnTap`发送的`OnTap`消息。\n\n##\
    \ 加速度计\n\n每台 iOS 设备都有一个加速度计，用于测量三个不同方向的加速度。这三个值可以在静态变量`Input.accelerometer`中查看，它是一个`Vector3`。\n\
    \n`x`值对应于设备屏幕上从左到右的加速度。`y`值代表设备屏幕上从上到下的加速度，`z`值则是从设备正面到背面的加速度。从 Unity 4 开始，加速度计的值会根据设备方向进行调整，因此如果你以横向模式持有设备，加速度计的`x`值仍然从左到右变化。\n\
    \n## 调试加速度计\n\n一个古老而有效理解代码工作原理的方法是打印输出。让我们创建一个名为`FuguDebugAccel`的新 JavaScript\
    \ 脚本，并将其附加到保龄球场景中一个名为`DebugAccel`的新游戏对象上。按照清单 13-6 所示，将`Update`函数添加到该脚本中。\n\n\
    清单 13-6. 打印加速度计值的代码\n\n```csharp\nfunction Update () {\n        Debug.Log(\"accel\
    \ x: \"+Input.acceleration.x+\" y: \"+Input.acceleration.y+\"                \
    \                                                                            \
    \                     z: \"+Input.acceleration.z);\n}\n```\n\n`Update`函数获取`x`、`y`和`z`的加速度计值，并将它们拼接成一个可读的字符串。如果你在\
    \ Unity 编辑器（使用 Unity Remote）中进行测试，`Debug.Log`会将该字符串发送到控制台视图；如果你在 iOS 模拟器或真机上运行，则会发送到\
    \ Xcode 调试区域。\n\n尝试倾斜设备并观察这些值如何变化。例如，图 13-5 所示的`Debug.Log`输出结果是设备平放在桌子上时得到的。`x`和`y`值接近\
    \ 0，而`z`值接近-1。如果设备翻转过来，`z`值将接近 1。\n\n![9781430248750_Fig13-05.jpg](img/9781430248750_Fig13-05.jpg)\n\
    \n图 13-5. 加速度计值的 Debug.Log 输出\n\n加速度值的单位是重力加速度。静止状态下，每个加速度计值的范围是-1 到 1，其中 1 代表一个完整的地球重力（9.8\
    \ 米/秒²）。现在尝试摇晃设备。你应该会看到数值上下波动。\n\n## 检测摇晃\n\n我们的 iOS 暂停菜单存在一个问题：我们无法使用 ESC 键暂停，因为\
    \ iOS 设备上没有 ESC 键（尽管 Android 设备通常有一个行为类似 ESC 键的返回键）。\n\n通过简单地在`OnGUI`函数内添加一个`GUI.Button`调用，可以轻松地在`FuguPause`脚本中向屏幕添加一个暂停按钮：\n\
    \n```csharp\nif (GUI.Button(Rect(0,0,100,50), \"Pause\") { PauseGame(); }\n```\n\
    \n然而，我不喜欢在游戏过程中屏幕上出现按钮，尤其是在像 iPhone 这样的小屏幕上。所以，让我们利用 iOS 设备提供的备用输入方式，通过摇晃设备来暂停。\n\
    \n从之前打印加速度计值的练习中，我们看到摇晃设备会导致`Input.acceleration`的`x`、`y`或`z`值中至少有一个向上或向下急剧变化。因此，我们可以通过检查是否有任何值远大于\
    \ 1 或远小于-1（例如）来判断是否发生了摇晃。但不必非常精确，我们可以只计算向量大小的平方：\n\n```csharp\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
    ```\n\n获取`Vector3`的`sqrMagnitude`比获取`magnitude`更快，因为向量的模长是`x² + y² + z²`的平方根，使用平方根操作相对昂贵（还记得高中时学习手工计算平方根吗？）。\n\
    \n所以，让我们开始在`FuguPause`脚本中添加一个用于摇晃阈值的公共变量：\n\n```csharp\nvar shakeThreshold:float\
    \ = 5;\n```\n\n现在你可以在检视面板（图 13-6）中调整该属性，使其对摇晃更敏感或更不敏感。\n\n![9781430248750_Fig13-06.jpg](img/9781430248750_Fig13-06.jpg)\n\
    \n图 13-6. 在检视面板中调整“摇晃暂停”阈值\n\n接下来，添加对`Input.acceleration`的检查，作为 ESC 键检查的`UNITY_IPHONE`版本替代方案（清单\
    \ 13-7）。\n\n清单 13-7. 在 FuguPause.js 中添加“摇晃暂停”功能\n\n```csharp\nvar shakeThreshold:float\
    \ = 5;\n\nfunction Update() {\n#if UNITY_IPHONE\n        if (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
    #else\n        if (Input.GetKeyDown(KeyCode.escape))\n#endif\n        {\n    \
    \            switch (currentPage) {\n                case Page.None: PauseGame();\
    \ break;       // 如果暂停菜单未显示，则暂停\n                case Page.Main: UnPauseGame();\
    \ break; // 如果主暂停菜单正在显示，则取消暂停\n                default: currentPage = Page.Main;\
    \     // 任何子页面都返回主页面\n                }\n        }\n}\n```\n\n这就完成了。现在，当你使用 Unity\
    \ Remote 或在设备上进行测试时，摇晃设备将暂停游戏！增强后的`FuguPause`脚本（仅添加了两行新代码！）位于本书项目文件中，可从 `http://learnunity4.com/`\
    \ 获取。\n\n## 摄像头\n\n尽管 Unity 对 iOS 摄像头的内置支持不多，但 Unity 确实为将网络摄像头视频读取到纹理中提供了跨平台支持。\n\
    \n### 读取网络摄像头\n"
- fmt: "Unity 有一种特殊的纹理（如 `Texture2D`，它是 `Texture` 的子类）叫做 `WebCamTexture`，用于显示来自连接硬件摄像头的视频。它支持多个平台，包括\
    \ iOS。让我们试试看。创建一个名为 `FuguWebCam` 的 JavaScript 脚本，并添加 [Listing 13-8](#9781430248750_Ch13.xhtml#list8)\
    \ 中给出的 `Start` 函数。`Start` 函数创建一个 `WebCamTexture`，将其纹理分配给脚本所挂载 `GameObject` 的材质，然后调用\
    \ `Play` 开始从摄像头视频更新纹理。\n\n[Listing 13-8](#9781430248750_Ch13.xhtml#_list8). 在\
    \ `FuguWebCam.js` 中播放 `WebCamTexture`\n\n```\nfunction Start () {\nvar webcamTexture:WebCamTexture\
    \ = WebCamTexture();\nrenderer.material.mainTexture = webcamTexture;\nwebcamTexture.Play();\n\
    }\n```\n\n现在将脚本挂载到 `Ball` 游戏对象上。如果在编辑器中点击播放，你会看到来自 Mac 摄像头的视频显示在球上。如果你在设备上构建并运行，你会看到同样的效果，只是使用的是设备摄像头。[Figure\
    \ 13-7](#9781430248750_Ch13.xhtml#Fig7) 是我在 iPod touch 上运行游戏时的截图，当时正将摄像头对准我的白板。\n\
    \n![9781430248750_Fig13-07.jpg](images/9781430248750_Fig13-07.jpg)\n\n[Figure\
    \ 13-7](#9781430248750_Ch13.xhtml#_Fig7). 渲染在保龄球上的 `WebCamTexture`\n\n**进一步探索**\n\
    \n总的来说，为保龄球游戏实现触摸屏输入并不需要太多工作（与前一章节中的打包工作相比），尽管在实际开发中，你会花大量时间测试和调整游戏控制，直到它恰到好处。无论如何，通过“晃动暂停”功能，保龄球游戏的功能性移植已经完成。换句话说，iOS\
    \ 版本的游戏现在已经可以玩了！\n\n尽管在这个游戏中设备摄像头没有实际用途，但我们确实使用 Unity 的 `WebCamTexture` 类激活了它，以在保龄球上渲染视频纹理。这有点噱头，但游戏开发很大程度上就是学习！尤其是在\
    \ iOS 上，有很多机会尝试各种不同的控制方案和输入传感器。\n\n**脚本参考**\n\n本章中介绍的所有 Unity 功能几乎都是“`Input`”类的成员。实际上，脚本参考中关于\
    \ `Input` 的文档包含了对 iOS 输入功能的概述。\n\n在阅读完 `Input` 类的概述后，你应该阅读本章中使用的每个函数的页面，特别是“`Input.GetTouch`”（及其相关的“`Touch`”结构体），其中包含展示如何遍历每一帧中所有\
    \ `Touch` 事件的代码示例；以及“`Input.acceleration`”，其中包含展示如何检查每一帧加速度值的代码示例。\n\n需要记住的一点是，加速度计每帧可能生成多个值。在大多数情况下，每帧只采样一次\
    \ `Input.accelerometer` 就足够了，但如果需要更精细的采样，你可以访问 `Input.accelerationEventCount`\
    \ 和 `Input.accelerationEvents` 变量来获取所有加速度事件。\n\n`Input` 类提供了对其他 iOS 传感器的访问。静态变量\
    \ `Input.gyro`、`Input.compass` 和 `Input.location` 分别返回来自陀螺仪、指南针和定位服务的数据。除了记录这些变量的页面外，你还应该查看这些变量所属类的页面：“`Gyroscope`”、“`Compass`”和“`LocationServices`”类。文档虽简略，但你可以在各个类的函数中找到代码示例。静态变量\
    \ `Input.compensateSensors` 控制是否针对屏幕方向调整加速度计、陀螺仪和指南针数据。\n\n除了测试对象选择，射线投射在游戏和图形中也被大量使用，因此你应该熟悉“`Physics.Raycast`”的页面，它包含几个代码示例。例如，在《HyperBowl》中，我使用射线投射来防止主摄像机低于地面，并设置游戏对象的初始位置刚好停在地面上。在这两种情况下，我都从游戏对象位置向下向地面进行射线投射，并检查结果距离。\n\
    \n最后，我们介绍了 `WebCamTexture` 类的使用。“`WebCamTexture`”页面包含很多内容，但请点击其 `Play`、`Stop`\
    \ 和 `Pause` 函数（你最常用的函数）的链接，在这些页面中找到代码示例。同时请查看“`WebCamTexture`”构造函数的链接。该页面列出了一系列构造函数，允许你自定义不同分辨率下的纹理大小。\n\
    \n**iOS 开发者库**\n\n除了阅读 Unity 脚本参考，甚至在此之前，阅读 iOS 参考库是一个好主意，这样你就能知道有哪些 iOS 功能可以通过\
    \ Unity 暴露出来，以及 Unity 类和方法如何映射到对应的 iOS 功能。\n\n你可以在 `http://developer.apple.com/library`\
    \ 或通过 Xcode Organizer 查看 iOS 参考库，无需登录。从那里选择“Guides”选项卡并浏览指南，特别是以下内容：\n\n- “Event\
    \ Handling Guide” 提供了触摸事件的概述（与 Unity 的 `Input.GetTouch` 和 `Touch` 类相关）以及运动事件的概述（与\
    \ `Input.acceleration` 和其他 Input 加速度计变量相关）。\n- 指南“Camera Programming Topics for\
    \ iOS”描述了由 Prime31 Etcetera 插件使用的 `UIImagePickerController` 类。\n- “AV Foundation\
    \ Programming Guide”描述了很可能被用于 Unity 中 `WebCamTexture` 类的视频捕获功能。\n\n**Asset Store**\n\
    \nUnity 的 `Input` 类使我们能够访问基本的触摸信息，但它不提供对 iOS 手势识别器的访问，这些识别器可以检测更高级别的“手势”，如滑动和捏合。Asset\
    \ Store 再次解围，提供了第三方包来实现高级手势检测。我使用 `Finger Gestures` 包，它有一个很好的回调系统，用于检测和处理各种手势。\n\
    \n例如，在《HyperBowl》中，我希望当玩家捏合屏幕（两个手指在屏幕上靠拢）时弹出暂停菜单。使用 `Finger Gestures` 包，只需在暂停菜单脚本中添加一个手势回调：\n\
    \n```\nfunction OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {\n    PauseGame();\n\
    }\n```\n\n然后在 `Start` 或 `Awake` 函数中添加一行代码，将该回调添加到该手势的 `FingerGestures` 回调列表中：\n\
    \n```\nFingerGestures.OnPinchEnd += OnGesturePinchEnd;\n```\n\nUnity 并不提供对 iOS\
    \ 中所有可用功能的脚本访问，而这正是插件发挥作用的地方。Unity 插件系统允许你添加访问“原生”代码的新脚本函数。因此，一般来说，如果你能用 C、C++\
    \ 或 Objective-C 编写某些代码，你就能为其创建一个 Unity 插件。例如，在 Unity Asset Store 中，你会发现围绕移动广告\
    \ SDK 构建的插件，以及用于访问 iOS 功能的插件。\n\n插件安装在 `Assets/Plugins` 文件夹中，正如我们之前提到的，这是一个存储必须在其他任何脚本之前加载的脚本的好地方。它们通常还需要在\
    \ Xcode 中手动集成步骤，例如向 `Info.plist` 文件添加条目或安装额外的代码库（这会阻止从 Unity 直接构建并运行——你必须先构建，修改\
    \ Xcode 项目，然后从 Xcode 运行）。此外，多个插件安装在同一 Unity 项目中总存在冲突的风险。\n\n这就是我喜欢使用 Prime31 Studios\
    \ 在 `http://prime31.com/unity` 提供的插件的原因。"
  raw: 'Unity has a special kind of texture (like `Texture2D`, a subclass of `Texture`)
    called `WebCamTexture` that displays video from an attached hardware camera. It
    works on multiple platforms, including iOS. Let’s give it a try. Create a JavaScript
    called `FuguWebCam` and add the `Start` function given in [Listing 13-8](#9781430248750_Ch13.xhtml#list8).
    The `Start` function creates a `WebCamTexture`, assigns the texture to the Material
    of the GameObject you’ve attached the script to, and then calls Play to start
    updating the texture from the camera video.


    [Listing 13-8](#9781430248750_Ch13.xhtml#_list8).  Playing a WebCamTexture in
    FuguWebCam.js


    ```

    function Start () {

    var webcamTexture:WebCamTexture = WebCamTexture();

    renderer.material.mainTexture = webcamTexture;

    webcamTexture.Play();

    }

    ```


    Now attach the script to the Ball GameObject. If you click Play in the Editor
    you’ll see video from the Mac camera appear on the ball. And if you Build and
    Run on a device, you’ll see the same thing, only using the device camera. [Figure
    13-7](#9781430248750_Ch13.xhtml#Fig7) is a screenshot of the game on my iPod touch
    as I’m pointing the camera at my whiteboard.


    ![9781430248750_Fig13-07.jpg](images/9781430248750_Fig13-07.jpg)


    [Figure 13-7](#9781430248750_Ch13.xhtml#_Fig7). A WebCamTexture rendered on the
    bowling ball


    Explore Further


    All in all, it didn’t take much work (compared to the packaging effort in the
    previous chapter) to implement touchscreen input for the bowling game, although
    in practice you’ll spend a lot of time testing and adjusting controls for a game
    to get it just right. In any case, with the shake-to-pause feature, the functional
    port of the bowling game is complete. In other words, the iOS version game is
    now playable!


    And despite the fact there isn’t a real use for the device camera in this game,
    we did activate it using Unity’s `WebCamTexture` class to render a video texture
    on the bowling ball. Gimmicky, but game development is very much about learning!
    Especially in iOS, there’s an opportunity to play around with a lot of different
    control schemes and input sensors.


    Scripting Reference


    Almost all the Unity features introduced in this chapter are members of the “Input”
    class. In fact, the Scripting Reference documentation on `Input` includes an overview
    of the iOS input features.


    After reading the overview of the `Input` class, you should read the pages for
    each of the functions used in this chapter, in particular “Input.GetTouch” (and
    the associated “Touch” struct), which has code samples showing how to loop through
    all the `Touch` events in each frame, and “Input.acceleration”, which has code
    samples showing how to check acceleration values in every frame.


    One thing to keep in mind, the accelerometer can generate multiple values per
    frame. For most cases, it should be sufficient to just sample `Input.accelerometer`
    once per frame, but if finer-grained sampling is required, you can access the
    variables `Input.accelerationEventCount` and `Input.accelerationEvents` to obtain
    all acceleration events.


    The `Input` class provides access to other iOS sensors. The static variables “Input.gyro”,
    “Input.compass” and “Input.location” return data from the gyroscope, compass and
    location services, respectively. In addition to the pages documenting those variables,
    you should check out the pages on the classes of those variables: “Gyroscope”,
    “Compass” and “LocationServices” classes`. The documentation is sparse, but you
    can find code samples in the individual class functions. The static variable “Input.compensateSensors”
    controls whether the accelerometer, gyroscope and compass data are adjusted for
    the screen orientation.`


    ````Besides testing object selection, raycasting is used a lot in games and graphics,
    so you should familiarize yourself with the page on “Physics.Raycast”, which has
    several code examples. For example, in HyperBowl, I use raycasting to keep the
    Main Camera from dipping below the ground and to set the initial positions of
    GameObjects to rest just on top of the ground. In both cases, I raycast down from
    the GameObject position toward the ground and check the resulting distance.Finally,
    we covered the use of the `WebCamTexture` class. The page on “WebCamTexture” has
    a lot of stuff, but click the links to its Play, Stop, and Pause functions (the
    functions you’d most commonly use) to find code samples on each of those pages.
    Also check out the link to the “WebCamTexture” constructor. That page lists a
    variety of constructors that allow you to customize the texture size for different
    resolutions.    iOS Developer Library    It’s a good idea to read the iOS Reference
    Library in addition to, or even before, reading the Unity Script Reference, so
    you’ll know what iOS capabilities are available to be exposed through Unity and
    how Unity classes and functions map to their iOS counterparts.    You can view
    the iOS Reference Library, no login required, at `http://developer.apple.com/library`
    or from the Xcode Organizer, and from there select the Guides tab and browse the
    guides, in particular the following:    The “Event Handling Guide” provides an
    overview of touch events, which relate to Unity’s `Input.GetTouch` and the `Touch`
    class, and motion events, which relate to `Input.acceleration` and the other Input
    accelerometer variables.    The guide “Camera Programming Topics for iOS” describes
    the `UIImagePickerController` class used by the Prime31 Etcetera plug-ins.    The
    “AV Foundation Programming Guide” describes the video capture functions most likely
    used for the `WebCamTexture` class in Unity.    Asset Store    The Unity `Input`
    class gives us access to basic touch information, but it doesn’t provide access
    to the iOS Gesture Recognizers, which detect higher level “gestures,” such as
    swiping and pinching. The Asset Store comes to the rescue again, offering third-party
    packages that provide high-level gesture detection. I use the Finger Gestures
    package, which has a nice callback system for detecting and handling various gestures.    For
    example, in HyperBowl I wanted the pause menu to come up when the player pinches
    the screen (two fingers on the screen coming together). With the Finger Gestures
    package, it just involves adding a callback for the gesture in the pause menu
    script:    ```    function OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {         PauseGame();
    } ```    and then a line in the `Start` or `Awake` function that adds the callback
    to the `FingerGestures` callback list for that gesture:    ```    FingerGestures.OnPinchEnd
    += OnGesturePinchEnd; ```    Unity doesn’t provide script access to everything
    available in iOS, and that’s where plugins come in. The Unity plugin system allows
    you to add new script functions that access “native” code. So, generally speaking,
    if you can code something in C, C++, or Objective-C, you can make a Unity plugin
    for it. For example, in the Unity Asset Store, you’ll find there are plug-ins
    built around mobile ad SDKs and plugins for accessing iOS features.    Plugins
    are installed in the Assets/Plugins folder, which, as we mentioned before, is
    a good place to store scripts that have to be loaded before any other scripts.
    They also often require manual integration steps in Xcode, like adding entries
    to the `Info.plist` file or installing additional code libraries (preventing Build
    and Run from Unity—you have to Build, modify the Xcode project, then Run from
    Xcode). And then there’s always the risk that multiple plugins installed in the
    same Unity project will have conflicts.    That’s why I like to use the plug-ins
    provided by Prime31 Studios at `http://prime31.com/unity`.'
  trans: "\nUnity 有一种特殊的纹理（如 `Texture2D`，它是 `Texture` 的子类）叫做 `WebCamTexture`，用于显示来自连接硬件摄像头的视频。它支持多个平台，包括\
    \ iOS。让我们试试看。创建一个名为 `FuguWebCam` 的 JavaScript 脚本，并添加 Listing 13-8 中给出的 `Start`\
    \ 函数。`Start` 函数创建一个 `WebCamTexture`，将其纹理分配给脚本所挂载 `GameObject` 的材质，然后调用 `Play`\
    \ 开始从摄像头视频更新纹理。\n\nListing 13-8. 在 `FuguWebCam.js` 中播放 `WebCamTexture`\n\n```\n\
    function Start () {\nvar webcamTexture:WebCamTexture = WebCamTexture();\nrenderer.material.mainTexture\
    \ = webcamTexture;\nwebcamTexture.Play();\n}\n```\n\n现在将脚本挂载到 `Ball` 游戏对象上。如果在编辑器中点击播放，你会看到来自\
    \ Mac 摄像头的视频显示在球上。如果你在设备上构建并运行，你会看到同样的效果，只是使用的是设备摄像头。Figure 13-7 是我在 iPod touch\
    \ 上运行游戏时的截图，当时正将摄像头对准我的白板。\n\n![9781430248750_Fig13-07.jpg](img/9781430248750_Fig13-07.jpg)\n\
    \nFigure 13-7. 渲染在保龄球上的 `WebCamTexture`\n\n**进一步探索**\n\n总的来说，为保龄球游戏实现触摸屏输入并不需要太多工作（与前一章节中的打包工作相比），尽管在实际开发中，你会花大量时间测试和调整游戏控制，直到它恰到好处。无论如何，通过“晃动暂停”功能，保龄球游戏的功能性移植已经完成。换句话说，iOS\
    \ 版本的游戏现在已经可以玩了！\n\n尽管在这个游戏中设备摄像头没有实际用途，但我们确实使用 Unity 的 `WebCamTexture` 类激活了它，以在保龄球上渲染视频纹理。这有点噱头，但游戏开发很大程度上就是学习！尤其是在\
    \ iOS 上，有很多机会尝试各种不同的控制方案和输入传感器。\n\n**脚本参考**\n\n本章中介绍的所有 Unity 功能几乎都是“`Input`”类的成员。实际上，脚本参考中关于\
    \ `Input` 的文档包含了对 iOS 输入功能的概述。\n\n在阅读完 `Input` 类的概述后，你应该阅读本章中使用的每个函数的页面，特别是“`Input.GetTouch`”（及其相关的“`Touch`”结构体），其中包含展示如何遍历每一帧中所有\
    \ `Touch` 事件的代码示例；以及“`Input.acceleration`”，其中包含展示如何检查每一帧加速度值的代码示例。\n\n需要记住的一点是，加速度计每帧可能生成多个值。在大多数情况下，每帧只采样一次\
    \ `Input.accelerometer` 就足够了，但如果需要更精细的采样，你可以访问 `Input.accelerationEventCount`\
    \ 和 `Input.accelerationEvents` 变量来获取所有加速度事件。\n\n`Input` 类提供了对其他 iOS 传感器的访问。静态变量\
    \ `Input.gyro`、`Input.compass` 和 `Input.location` 分别返回来自陀螺仪、指南针和定位服务的数据。除了记录这些变量的页面外，你还应该查看这些变量所属类的页面：“`Gyroscope`”、“`Compass`”和“`LocationServices`”类。文档虽简略，但你可以在各个类的函数中找到代码示例。静态变量\
    \ `Input.compensateSensors` 控制是否针对屏幕方向调整加速度计、陀螺仪和指南针数据。\n\n除了测试对象选择，射线投射在游戏和图形中也被大量使用，因此你应该熟悉“`Physics.Raycast`”的页面，它包含几个代码示例。例如，在《HyperBowl》中，我使用射线投射来防止主摄像机低于地面，并设置游戏对象的初始位置刚好停在地面上。在这两种情况下，我都从游戏对象位置向下向地面进行射线投射，并检查结果距离。\n\
    \n最后，我们介绍了 `WebCamTexture` 类的使用。“`WebCamTexture`”页面包含很多内容，但请点击其 `Play`、`Stop`\
    \ 和 `Pause` 函数（你最常用的函数）的链接，在这些页面中找到代码示例。同时请查看“`WebCamTexture`”构造函数的链接。该页面列出了一系列构造函数，允许你自定义不同分辨率下的纹理大小。\n\
    \n**iOS 开发者库**\n\n除了阅读 Unity 脚本参考，甚至在此之前，阅读 iOS 参考库是一个好主意，这样你就能知道有哪些 iOS 功能可以通过\
    \ Unity 暴露出来，以及 Unity 类和方法如何映射到对应的 iOS 功能。\n\n你可以在 `http://developer.apple.com/library`\
    \ 或通过 Xcode Organizer 查看 iOS 参考库，无需登录。从那里选择“Guides”选项卡并浏览指南，特别是以下内容：\n\n- “Event\
    \ Handling Guide” 提供了触摸事件的概述（与 Unity 的 `Input.GetTouch` 和 `Touch` 类相关）以及运动事件的概述（与\
    \ `Input.acceleration` 和其他 Input 加速度计变量相关）。\n- 指南“Camera Programming Topics for\
    \ iOS”描述了由 Prime31 Etcetera 插件使用的 `UIImagePickerController` 类。\n- “AV Foundation\
    \ Programming Guide”描述了很可能被用于 Unity 中 `WebCamTexture` 类的视频捕获功能。\n\n**Asset Store**\n\
    \nUnity 的 `Input` 类使我们能够访问基本的触摸信息，但它不提供对 iOS 手势识别器的访问，这些识别器可以检测更高级别的“手势”，如滑动和捏合。Asset\
    \ Store 再次解围，提供了第三方包来实现高级手势检测。我使用 `Finger Gestures` 包，它有一个很好的回调系统，用于检测和处理各种手势。\n\
    \n例如，在《HyperBowl》中，我希望当玩家捏合屏幕（两个手指在屏幕上靠拢）时弹出暂停菜单。使用 `Finger Gestures` 包，只需在暂停菜单脚本中添加一个手势回调：\n\
    \n```\nfunction OnGesturePinchEnd(pos1:Vector2,pos2:Vector2) {\n    PauseGame();\n\
    }\n```\n\n然后在 `Start` 或 `Awake` 函数中添加一行代码，将该回调添加到该手势的 `FingerGestures` 回调列表中：\n\
    \n```\nFingerGestures.OnPinchEnd += OnGesturePinchEnd;\n```\n\nUnity 并不提供对 iOS\
    \ 中所有可用功能的脚本访问，而这正是插件发挥作用的地方。Unity 插件系统允许你添加访问“原生”代码的新脚本函数。因此，一般来说，如果你能用 C、C++\
    \ 或 Objective-C 编写某些代码，你就能为其创建一个 Unity 插件。例如，在 Unity Asset Store 中，你会发现围绕移动广告\
    \ SDK 构建的插件，以及用于访问 iOS 功能的插件。\n\n插件安装在 `Assets/Plugins` 文件夹中，正如我们之前提到的，这是一个存储必须在其他任何脚本之前加载的脚本的好地方。它们通常还需要在\
    \ Xcode 中手动集成步骤，例如向 `Info.plist` 文件添加条目或安装额外的代码库（这会阻止从 Unity 直接构建并运行——你必须先构建，修改\
    \ Xcode 项目，然后从 Xcode 运行）。此外，多个插件安装在同一 Unity 项目中总存在冲突的风险。\n\n这就是我喜欢使用 Prime31 Studios\
    \ 在 `http://prime31.com/unity` 提供的插件的原因。\n"
- fmt: '它们提供了大量可在同一 Unity 项目中共存的插件，所有 Xcode 修改均由 Unity 后处理器脚本执行，因此从 Unity 构建并运行（Build
    and Run）仍将正常工作，无需在 Xcode 中手动操作。例如，Asset Store 上提供的 Prime31 Etcetera 插件包含一系列杂项功能，包括通过一次函数调用访问
    iOS 照片库和设备相机，如下所示：


    ```

    EtceteraBinding.promptForPhoto(1.0);

    ```


    [Figure 13-8](#9781430248750_Ch13.xhtml#Fig8) 中的截图显示了在我的 Fugu Maze 应用中出现的提示（我使用照片选择器让玩家自定义迷宫墙壁纹理）。如果你想尝试一下，请从
    App Store 下载 Fugu Maze Free，或下载一个免费的 HyperBowl 球道（我使用照片选择器来自定义保龄球纹理）。


    ![9781430248750_Fig13-08.jpg](images/9781430248750_Fig13-08.jpg)


    [Figure 13-8](#9781430248750_Ch13.xhtml#_Fig8). iPad 上的 Prime31 Etcetera 插件照片选择器


    另一个提供额外设备输入的 Prime31 插件是 iCade 插件（仅在 Prime31 网站上提供）。iCade 是一种复古风格街机柜，通过蓝牙连接为 iOS
    设备提供摇杆输入。iCade 本质上模拟的是蓝牙键盘，因此任何使用 iCade 插件的代码都与键盘控制代码类似。如果我们在保龄球代码的`CalcForce`函数中添加
    iCade 控制代码，它看起来会像 [Listing 13-9](#9781430248750_Ch13.xhtml#list9) 中的代码片段（此示例实际取自
    HyperBowl）。


    [Listing 13-9](#9781430248750_Ch13.xhtml#_list9). 使用 Prime31 iCade 插件向`CalcForce`添加的
    iCade 代码


    ```

    var yinput:float = 0;

    if (iCadeBinding.state.JoystickUp) yinput = 1;

    if (iCadeBinding.state.JoystickDown) yinput = -1;

    var xinput:float = 0;

    if (iCadeBinding.state.JoystickLeft) xinput = 1;

    if (iCadeBinding.state.JoystickRight) xinput = -1;

    var deltatime:float = Time.deltaTime;

    forcey += iCadePowery*yinput/deltatime;

    forcex += iCadePowerx*xinput/deltatime;

    ```


    就像我们在检查四个不同按键是否被按下一样，我们正在检查摇杆是否向四个方向之一移动。摇杆的灵敏度并不比这更高。


    iCade 的产品信息位于 Ion Audio 网站：`http://www.ionaudio.com/products/details/icade`，而
    ThinkGeek 博客列出了一些兼容 iCade 的游戏（`http://www.thinkgee.com/product/e762/`）。如果你的设备能在
    iCade 上运行，请务必联系该博客，让你的应用被收录！


    # 第14章 Game Center：排行榜与成就


    现在我们已经拥有一个可玩的 iOS 游戏，是时候添加一些锦上添花的功能了。我们将从当前热门趋势——社交游戏开始，这至少包括将高分收集到全局*排行榜*上，并以*成就*奖励玩家。


    幸运的是，Unity 提供了针对 Apple Game Center 社交游戏平台的脚本接口。作为 iOS 用户，你很可能玩过许多向 Game Center
    提交分数和成就的游戏，也许你已经使用过 iOS 自带的 Game Center 应用来查看游戏推荐、添加其他玩家为“好友”，或向这些朋友发起挑战。我们将通过为应用注册
    Game Center 排行榜和几个成就，并添加必要的脚本来将这些分数和成就提交到 Game Center，从而将 Fugu Bowl 加入到这些游戏的行列中。


    和前面几章一样，如果你中途加入，可以从`http://learnunity4.com/`下载并打开本章的 Unity 项目，但请注意该网站上的项目不包含来自
    Standard Assets 或 Asset Store 的任何资源包。不过就本章而言，该项目已准备就绪，可以运行并演示其与 Game Center 的集成。


    到目前为止，对 Fugu Bowl 的所有 iOS 修改都可以使用 Unity Remote 或 iOS 模拟器进行测试，并且不需要 Apple Developer
    会员资格。但这种免费体验到此为止，因为将 Game Center 功能集成到应用中需要在 iTunes Connect 上为应用配置 Game Center。如果此时你还没有
    Apple Developer 会员资格，你可以先通读本章和下一章（下一章涉及 iAd，也需要在 iTunes Connect 上进行一些设置），等准备就绪后再回来操作。


    ## 在 iTunes Connect 上设置 Game Center


    要在 iTunes Connect 中为保龄球游戏设置 Game Center，首先需要将应用添加到 iTunes Connect，重复我们在 Angry
    Bots 演示中演练过的步骤。假设你已是注册的 Apple Developer，请访问`http://itunesconnect.apple.com/`，点击“管理应用”（Manage
    Apps），然后添加 Fuga Bowl（记住提前准备一些截图，同样按照我们在 Angry Bots 中演练的步骤进行）。对于 App Store 图标，请使用我们在
    Player Settings 中设置为应用图标的同一个`Icon1024.jpg`文件。当然，你需要选择你自己的应用标识符。完成后，点击你刚创建的应用的“查看详情”（View
    Details）以查看应用信息页面（[Figure 14-1](#9781430248750_Ch14.xhtml#Fig1)）。


    ![9781430248750_Fig14-01.jpg](images/9781430248750_Fig14-01.jpg)


    [Figure 14-1](#9781430248750_Ch14.xhtml#_Fig1). iTunes Connect 中应用信息页面的顶部


    在 iTunes Connect 中设置好 Fugu Bowl 后，点击应用信息页面右上角的“管理 Game Center”（Manage Game Center）按钮，调出该应用的
    Game Center 管理页面。


    ### 添加排行榜


    Game Center 管理页面有三个功能：它允许你将应用移入一个 Game Center 群组，管理此游戏的排行榜，以及管理此游戏的成就（[Figure
    14-2](#9781430248750_Ch14.xhtml#Fig2) 显示了页面顶部和前两个选项，成就位于下方）。


    ![9781430248750_Fig14-02.jpg](images/9781430248750_Fig14-02.jpg)


    [Figure 14-2](#9781430248750_Ch14.xhtml#_Fig2). iTunes Connect 中管理 Game Center
    页面的顶部


    将应用放入 Game Center 群组允许该应用与其他应用共享排行榜和成就。例如，HyperBowl 有六条保龄球道，每条都有其自己的排行榜。每条球道也可作为免费的广告支持应用提供。通过使用
    Game Center 群组，同一个排行榜在免费球道和其对应的完整付费应用之间共享。因此，在免费 HyperBowl Classic 球道中获得高分和一些成就的玩家在购买完整游戏后仍然可以看到该分数和那些成就，而从开发者的角度来看，这很好地增加了排行榜中显示的玩家人数。由于我们目前只处理一个游戏，所以无需担心群组问题（你可以在以后随时将应用移入群组）。


    ### 创建单个排行榜


    通过点击“添加排行榜”（Add Leaderboard）按钮创建一个新排行榜。这将打开一个窗口，提供创建“单个排行榜”（Single Leaderboard）或“组合排行榜”（Combined
    Leaderboard）的选项（[Figure 14-3](#9781430248750_Ch14.xhtml#Fig3)）。组合排行榜合并了来自多个排行榜的结果。再次以
    HyperBowl 为例，该游戏的组合排行榜列出了来自六条球道排行榜的高分。


    ![9781430248750_Fig14-03.jpg](images/9781430248750_Fig14-03.jpg)


    [Figure 14-3](#9781430248750_Ch14.xhtml#_Fig3). 在 iTunes Connect 中选择排行榜类型


    你可以在需要时稍后添加组合排行榜。实际上，[Figure 14-3](#9781430248750_Ch14.xhtml#Fig3) 显示“组合排行榜”选项是灰显的，直到你实际拥有可以组合的排行榜。因此，现在只需选择“单个排行榜”，这将带你进入一个页面，你可以在其中填写排行榜信息（[Figure
    14-4](#9781430248750_Ch14.xhtml#Fig4)）。'
  raw: 'They provide a large variety of plugins that can coexist in the same Unity
    project, and all Xcode modifications are performed by a Unity postprocessor script,
    so Build and Run from Unity will still work and no messing around in Xcode is
    required.    For example, the Prime31 Etcetera plugin, available on the Asset
    Store, has a bunch of assorted features, including access to the iOS Photos gallery
    and the device camera, with one function call, like this:    ```    EtceteraBinding.promptForPhoto(1.0);
    ```    The screenshot in [Figure 13-8](#9781430248750_Ch13.xhtml#Fig8) shows the
    resulting prompt in my Fugu Maze app (where I use the photo chooser to allow players
    to customize the maze wall texture). If you want to try it out, download Fugu
    Maze Free from the App Store or one of the free HyperBowl lanes (I use the photo
    chooser to customize the bowling ball texture).    ![9781430248750_Fig13-08.jpg](images/9781430248750_Fig13-08.jpg)    [Figure
    13-8](#9781430248750_Ch13.xhtml#_Fig8). The Prime31 Etcetera plug-in photo chooser
    on an iPad    Another Prime31 plugin that makes available additional device input
    is the iCade plugin (only available on the Prime31 web site). The iCade is a retro-style
    arcade cabinet that provides joystick input to iOS devices through a Bluetooth
    connection. The iCade essentially pretends it’s a Bluetooth keyboard, so any code
    using the iCade plugin is similar to the code for keyboard controls. If we added
    code for iCade controls to the `CalcForce` function of our bowling ball code,
    it would look something like the snippet in [Listing 13-9](#9781430248750_Ch13.xhtml#list9)
    (this sample is actually taken from HyperBowl).    [Listing 13-9](#9781430248750_Ch13.xhtml#_list9).  iCade
    Additions to CalcForce Using the Prime31 iCade Plug-In    ``` var yinput:float
    = 0; if (iCadeBinding.state.JoystickUp) yinput = 1; if (iCadeBinding.state.JoystickDown)
    yinput = -1; var xinput:float = 0; if (iCadeBinding.state.JoystickLeft) xinput
    = 1; if (iCadeBinding.state.JoystickRight) xinput = -1; var deltatime:float =
    Time.deltaTime; forcey += iCadePowery*yinput/deltatime; forcex += iCadePowerx*xinput/deltatime;
    ```    Just as if we’re checking if four different keys were pressed, we’re checking
    if the joystick is moved in any of four directions. The joysticks aren’t any more
    sensitive than that.    The product information for the iCade is on the Ion Audio
    site at `http://www.ionaudio.com/products/details/icade`, and the ThinkGeek blog
    lists some of the games that work with the iCade (`http://www.thinkgee.com/product/e762/`).
    If you get your devices running on the iCade, be sure to contact that blog to
    have your app listed!    Chapter     14    Game Center: Leaderboards and Achievements    Now
    that we have a playable iOS game, it’s time to add some bells and whistles. We’ll
    start with one of the hot trends, social gaming, which, at the minimum, involves
    collecting high scores onto a global *leaderboard* and rewarding players with
    *achievements*.    Lucky for us, Unity provides a script interface to Apple’s
    Game Center social gaming platform. As an iOS user, you’ve most likely played
    many games that submit scores and achievements to Game Center, and maybe you’ve
    used the Game Center app included with iOS to view game recommendations, to “friend”
    other players, or to issue challenges to those friends. We’ll add Fugu Bowl to
    the ranks of those games by registering a Game Center leaderboard and a couple
    of achievements for the app and making the necessary script additions to submit
    those scores and achievements to Game Center.    As in previous chapters, if you’re
    coming in late, you can download and open the Unity project for this chapter from
    `http://learnunity4.com/`, keeping in mind the projects on that web site don’t
    include any packages from Standard Assets or the Asset Store. But for the purposes
    of this chapter, the project is ready to run and demonstrate its integration with
    Game Center.


    So far, all of the iOS modifications to Fugu Bowl have been testable with the
    Unity Remote or iOS Simulator, and an Apple Developer membership hasn’t been necessary.
    But the free ride is over, since integrating Game Center functionality into an
    app requires configuring Game Center for the app on iTunes Connect. If you still
    don’t have an Apple Developer membership at this point, you can just read through
    this chapter and the next (which deals with iAds and also requires some set up
    on iTunes Connect), and then return here when you’re ready.    Set Up Game Center
    on iTunes Connect    To set up Game Center for the bowling game in iTunes Connect,
    you first need to add the app to iTunes Connect, repeating the steps we rehearsed
    with the Angry Bots demo. Assuming you’re a registered Apple Developer, go to
    `http://itunesconnect.apple.com/`, click Manage Apps, and add Fugu Bowl (remember
    to prepare some screenshots in advance, again as we rehearsed with Angry Bots).
    For the App Store icon, use the same Icon1024.jpg file we set as the app icon
    in the Player Settings. You’ll need to choose your own app identifier, of course.
    When you’re finished, click View Details for the app you’ve just created to see
    the App Information page ([Figure 14-1](#9781430248750_Ch14.xhtml#Fig1)).    ![9781430248750_Fig14-01.jpg](images/9781430248750_Fig14-01.jpg)    [Figure
    14-1](#9781430248750_Ch14.xhtml#_Fig1). The top portion of the App Information
    page in iTunes Connect    Once Fugu Bowl is set up in iTunes Connect, bring up
    the Game Center management page for the app buy clicking the Manage Game Center
    button at the top right of the App Information page.    Add a Leaderboard    The
    Game Center management page has three functions: it allows you to move the app
    into a Game Center group, manage the leaderboards for this game, and manage achievements
    for this game ([Figure 14-2](#9781430248750_Ch14.xhtml#Fig2) shows the top of
    the page and the first two options, achievements are below).    ![9781430248750_Fig14-02.jpg](images/9781430248750_Fig14-02.jpg)    [Figure
    14-2](#9781430248750_Ch14.xhtml#_Fig2). The top portion of the Manage Game Center
    page in iTunes Connect    Placing an app in a Game Center group allows the app
    to share leaderboards and achievements with other apps. As an example, HyperBowl
    has six bowling lanes, each with its own leaderboard. Each lane is also available
    as a free ad-supported app. Using Game Center groups, the same leaderboard is
    shared between the free lane and its equivalent in the full-paid app. So a player
    who attained a high score and some achievements in the free HyperBowl Classic
    lane will still see that score and those achievements after buying the full game,
    and from the developer’s point of view, it nicely augments the number of players
    shown in the leaderboard. Because we’re just dealing with one game for now, there’s
    no need to worry about groups (you can always move the app to a group later).    Create
    a Single Leaderboard    Create a new leaderboard by clicking the Add Leaderboard
    button. That brings up a window that presents the options to create a Single Leaderboard
    or a Combined Leaderboard ([Figure 14-3](#9781430248750_Ch14.xhtml#Fig3)). The
    latter combines the results from several leaderboards. Using HyperBowl as an example
    again, the combined leaderboard for that game lists high scores from the leaderboards
    for each of the six lanes.    ![9781430248750_Fig14-03.jpg](images/9781430248750_Fig14-03.jpg)    [Figure
    14-3](#9781430248750_Ch14.xhtml#_Fig3). Selecting a leaderboard type in iTunes
    Connect    You can always add a Combined Leaderboard later when it’s merited.
    In fact, [Figure 14-3](#9781430248750_Ch14.xhtml#Fig3) shows the Combined Leaderboard
    option is dimmed until you actually have leaderboards that can be combined. So
    for now, just start by selecting Single Leaderboard, which will bring you to a
    page where you can fill out the leaderboard information ([Figure 14-4](#9781430248750_Ch14.xhtml#Fig4)).'
