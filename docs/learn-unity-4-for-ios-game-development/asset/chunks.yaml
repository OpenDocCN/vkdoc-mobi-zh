    \n图 7-11。将 FuguReset 脚本附加到 Pin 预设体\n\n现在，球、球瓶和主摄像机在游戏开始时记录其初始位置和旋转，并且你已经准备好了一个\
    \ `ResetPosition` 函数，可以调用它来将它们恢复到这些初始位置和旋转。\n\n## 发送消息\n\n通常，从一个游戏对象上附加的脚本调用另一个游戏对象上附加脚本中的函数会有些棘手。这需要在一个游戏对象上调用\
    \ `GetComponent` 来获取脚本，然后引用该脚本来调用函数。\n\n但在简单情况下（例如，当你不关心函数的返回值时），Unity 允许你通过使用\
    \ `GameObject` 类中的 `SendMessage` 或 `BroadcastMessage` 函数向游戏对象发送消息来调用函数。接收消息（包含要调用的函数名称）的游戏对象会将消息传递给任何可能拥有该函数的附加脚本。\n\
    \n让我们在游戏控制器脚本中添加一些函数，用于发送 `ResetPosition` 消息（清单 7-3）。\n\n清单 7-3. FuguBowl.js 中发送\
    \ ResetPosition 消息的函数\n\n```csharp\nvar ball:GameObject; // 保龄球\n\nfunction ResetBall()\
    \ {\n        ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n\
    \        for (var pin:GameObject in pins) {\n                pin.BroadcastMessage(\"\
    ResetPosition\");\n        }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"\
    ResetPosition\");\n}\n\nfunction ResetEverything() {\n        ResetBall();\n \
    \       ResetPins();\n        ResetCamera();\n}\n```\n\n附加代码以一个指向球的公共变量开始。脚本已经拥有了一个引用所有保龄球的\
    \ `pin` 数组，而主摄像机总是可以通过静态变量 `Camera.main` 引用，因此脚本现在可以访问所有需要重置的游戏对象。`ResetCamera`\
    \ 和 `ResetBall` 函数调用 `SendMessage` 来向各自的目标游戏对象发送 `ResetPosition` 消息。在这些游戏对象附加的脚本中定义的每个\
    \ `ResetPosition` 函数都会被调用。具体来说，由于主摄像机和球附加了 `FuguReset` 脚本，该脚本中的 `ResetPosition`\
    \ 函数将响应此消息。\n\n`ResetPins` 函数略有不同，它调用 `BroadcastMessage` 来发送 `ResetPosition` 消息。`BroadcastMessage`\
    \ 的行为与 `SendMessage` 相同，不同之处在于该消息还会传播到原始接收对象的任何子游戏对象。在本章稍后部分，当我们替换一些将其 Rigidbody\
    \ 附加到子游戏对象的球瓶时，这将非常有用。\n\n`ResetPins` 会在控制台中生成一条关于 *Implicit downcast from ‘Object’\
    \ to ‘UnityEngine.GameObject’* 的警告（图 7-12）。\n\n![9781430248750_Fig07-12.jpg](img/9781430248750_Fig07-12.jpg)\n\
    \n图 7-12。隐式向下转换警告的控制台视图\n\n出现该警告是因为 `Array` 被定义为包含 `Object` 类型元素，但每个元素都被视为 `GameObject`。这看似合理，因为\
    \ `GameObject` 是 `Object` 的子类，但就编译器所知，这不一定成立。你可以通过向脚本添加 `#pragma downcast` 来消除此警告，这基本上告诉编译器：“相信我。”\n\
    \n## 检查落沟球\n\n当球滚落地板的边缘时，这基本上是一个落沟球，因为此时已经没有希望到达球瓶了。因此，当这种情况发生时，肯定需要重置游戏。可以通过在每一帧检查球的\
    \ y 位置是否低于某个水平高度来实现落沟球检测。这可以通过在 `FuguBowl` 脚本中添加清单 7-4 中的公共变量 `sunkHeight` 和 `Update`\
    \ 回调来实现。\n\n清单 7-4. FuguBowl.js 中用于检测落沟球的 Update 回调\n\n```csharp\nvar sunkHeight:float\
    \ = -10.0; // 我们称之为落沟球的全局 y 位置\n\nfunction Update() {\n        if (ball.transform.position.y<sunkHeight)\
    \ {\n                ResetEverything();\n        }\n}\n```\n\n变量 `sunkHeight`\
    \ 指定球必须下降到的 y 位置，以触发重置一切。某些情况下 `sunkHeight` 的默认值是低于零的一段距离，这样玩家可以在重置前有时间看到球下落。`Update`\
    \ 回调在每一帧检查球的 y 位置是否低于 `sunkHeight`。如果是，则会调用 `ResetEverything`，向球、主摄像机和球瓶发送所有 `ResetPosition`\
    \ 消息。在点击“播放”进行测试之前，你需要通过将层级视图中的球游戏对象拖拽到 `FuguBowl` 脚本的 Ball 字段中来分配脚本中的 `ball`\
    \ 公共变量（图 7-13）。\n\n![9781430248750_Fig07-13.jpg](img/9781430248750_Fig07-13.jpg)\n\
    \n图 7-13。FuguBowl.js 中支持重置球的游戏控制器属性\n\n现在，当球滚落地板边缘时，球、主摄像机和球瓶应该会立即弹回到它们的起始位置。实现连续游戏！\n\
    \n## 完整清单\n\n完整的游戏控制器脚本见清单 7-5。\n\n清单 7-5. FuguBowl.js 的完整清单\n\n```csharp\n#pragma\
    \ strict\n#pragma downcast\n\nvar pin:GameObject;                   // 要实例化的球瓶预设体\n\
    var pinPos:Vector3 = Vector3(0,1,20); // 放置球瓶架的位置\nvar pinDistance = 1.5;    \
    \            // 球瓶之间的初始距离\nvar pinRows = 4;                      // 球排行数\n\nvar\
    \ ball:GameObject;                  // 保龄球\nvar sunkHeight:float = -10.0;\n\n\
    private var pins:Array;\n\nfunction Awake () {\n        CreatePins();\n}\n```"
- fmt: "# Bowling for Barrels\n\n`Capsules` make for very simplistic bowling pins,\
    \ both in appearance and collision shape. A real bowling pin model would be much\
    \ better, but, unfortunately, searching for bowling pins on the Asset Store turns\
    \ up nothing (although that could change at any time if a vendor decides to fill\
    \ the void). However, there are a lot of other models on the Asset Store, that,\
    \ if we’re flexible, could act as bowling pin substitutes. It turns out there\
    \ are several packages of barrel models, so we’ll go with barrels as pins for\
    \ our backup plan.\n\n## Pick a Barrel\n\nA search for barrel on the Asset Store\
    \ reveals several free packages of barrel models ([Figure 7-14](#9781430248750_Ch07.xhtml#Fig14)).\n\
    \n![9781430248750_Fig07-14.jpg](images/9781430248750_Fig07-14.jpg)\n\n[Figure\
    \ 7-14](#9781430248750_Ch07.xhtml#_Fig14). Free barrels on the Asset Store\n\n\
    Any of the free packages will work fine, but the Barrel package from Universal\
    \ Image, that one displaying three barrels in its Asset Store icon, already has\
    \ a prefab set up, so let’s download that package. From the Asset Store description,\
    \ and from the Project View after you import the package, you can see the Barrel\
    \ package is nicely organized, with a folder named Barrel that contains the Barrel\
    \ prefab and the Barrel model ([Figure 7-15](#9781430248750_Ch07.xhtml#Fig15)).\n\
    \n![9781430248750_Fig07-15.jpg](images/9781430248750_Fig07-15.jpg)\n\n[Figure\
    \ 7-15](#9781430248750_Ch07.xhtml#_Fig15). The Project View of the Barrel package\n\
    \nThe two assets look similar in the Project View, but clicking on the prefab\
    \ shows the full filename `Barrel.prefab` at the bottom of the Project View, while\
    \ clicking on the Barrel model displays `Barrel.FBX`, indicating it’s an imported\
    \ FBX file (3D format used by Autodesk).\n\n## Make a Prefab\n\nWe need a Barrel\
    \ prefab to replace the simple Pin prefab, but we should avoid modifying the original\
    \ Barrel prefab (another import of the Barrel package would clobber our changes).\
    \ To make our own copy of the Barrel prefab, select the prefab, press Command+D\
    \ (or Duplicate from the Edit menu), and drag the copy of the prefab into the\
    \ Prefabs folder. Then rename it to `BarrelPin`, since it’s a Barrel and we’re\
    \ using it as a bowling pin ([Figure 7-16](#9781430248750_Ch07.xhtml#Fig16)).\n\
    \n![9781430248750_Fig07-16.jpg](images/9781430248750_Fig07-16.jpg)\n\n[Figure\
    \ 7-16](#9781430248750_Ch07.xhtml#_Fig16). Copy of the Barrel prefab\n\nSelect\
    \ the child `GameObject` of the `BarrelPin` prefab so that it is displayed in\
    \ the Inspector View. A `MeshFilter` Component and `MeshRenderer` Component are\
    \ present, but to use this prefab as a bowling pin, it needs a `Collider` Component\
    \ and `Rigidbody` Component so the pins (barrels) are subject to gravity and can\
    \ collide with each other, the Ball, and the Floor. The prefab also needs a `FuguReset`\
    \ script attached to handle the `ResetPosition` messages sent by the game controller.\n\
    \nFor now, let’s take care of the `Rigidbody` Component and `FuguReset` script\
    \ and defer adding the `Collider` Component, as matching the barrel shape will\
    \ be somewhat involved. With the prefab selected, you choose Rigidbody from the\
    \ Component menu on the menu bar, or you can click the Add Component button at\
    \ the bottom of the Inspector View and choose Rigidbody from the resulting menu\
    \ ([Figure 7-17](#9781430248750_Ch07.xhtml#Fig17)).\n\n![9781430248750_Fig07-17.jpg](images/9781430248750_Fig07-17.jpg)\n\
    \n[Figure 7-17](#9781430248750_Ch07.xhtml#_Fig17). Adding a Rigidbody and `FuguReset`\
    \ script to the Barrel prefab\n\nIn the newly attached `Rigidbody` Component,\
    \ set the Mass to 2 (kg). That’s pretty light for a metal barrel, but the game\
    \ won’t be fun if the Ball can’t knock down the barrels-as-pins without too much\
    \ trouble. In games, fun trumps reality!\n\nThe `FuguReset` script can added to\
    \ the prefab by dragging the script into the Inspector View or also by using the\
    \ AddComponent button.\n\n## Use the Prefab\n\nTo replace the simple capsule-shaped\
    \ Pin with the `BarrelPin` prefab, select the `FuguBowl` GameObject in the Hierarchy\
    \ View so that it’s Components display in the Inspector View, and then drag the\
    \ `BarrelPin` prefab into the Pin field of the `FuguBowl` script, replacing Pin\
    \ prefab we started with ([Figure 7-18](#9781430248750_Ch07.xhtml#Fig18)). Now\
    \ when you click Play, ten barrels will appear instead of ten capsules. But they\
    \ will immediately fall through the Floor, because the pins don’t have Collider\
    \ Components, yet!\n\n![9781430248750_Fig07-18.jpg](images/9781430248750_Fig07-18.jpg)\n\
    \n[Figure 7-18](#9781430248750_Ch07.xhtml#_Fig18). Using the `BarrelPin` prefab\
    \ as the bowling pin\n\n## Add a Collider\n\nWe can’t avoid it any longer. It’s\
    \ time to take care of the `BarrelPin` collision. So that we can visualize the\
    \ `BarrelPin` and it’s collision shape in the Scene View, temporarily place the\
    \ `BarrelPin` prefab in the scene by dragging the prefab into the Hierarchy View.\
    \ Once there, open the `BarrelPin` GameObject and select the child `Barrel` GameObject\
    \ so that it is displayed in the Inspector View, and press the F key to invoke\
    \ the Frame Selected, which will center the `Barrel` in the Scene View. Also,\
    \ change the viewing options (top left pull-down menu in the Scene View) from\
    \ Textured to Wireframe, so the Mesh and Collider Component’s shape can be seen\
    \ more easily.\n\nUnfortunately, the Component menu doesn’t list any primitive\
    \ colliders that are barrel-shaped (a `CylinderCollider` would be perfect, but\
    \ it doesn’t exist), and although a `MeshCollider` would conform to the shape\
    \ of the barrel, `MeshColliders` are not appropriate for physical GameObjects\
    \ because of performance issues. The closest matching shape in the Components\
    \ menu is the `CapsuleCollider`. So let’s start with a Capsule Collider on our\
    \ `Barrel` GameObject and see how well it fits.\n\nAlthough Unity tries to size\
    \ a `Collider` Component to fit the GameObject’s Mesh when the `Collider` Component\
    \ is added, in this case the fit isn’t very good, largely because, as you can\
    \ see from the rotation in the Transform Component, this GameObject is rotated\
    \ 90 degrees around its x axis. Without that rotation, the barrel is lying on\
    \ its side, but the rotation also affects the orientation of the Collier Component.\
    \ To adjust for the rotation, switch the axis of the Capsule Collider to the z\
    \ axis. After that, setting the radius to 2 and height to 6 will produce a much\
    \ closer match between `CapsuleCollider` and the Barrel ([Figure 7-19](#9781430248750_Ch07.xhtml#Fig19)).\n\
    \n![9781430248750_Fig07-19.jpg](images/9781430248750_Fig07-19.jpg)\n\n[Figure\
    \ 7-19](#9781430248750_Ch07.xhtml#_Fig19). Adding a `CapsuleCollider` to the Barrel\n\
    \nThe Capsule matches the Barrel shape pretty well around the side but not on\
    \ the top and bottom, which should have flat surfaces instead of just the endpoints\
    \ the capsule. For flat surfaces, `BoxColliders` are the obvious choice. So this\
    \ is a situation where you want to combine multiple Collider Components into a\
    \ *compound collider*.\n\n```js\nfunction CreatePins() {\n        pins = new Array();\n\
    \        var offset = Vector3.zero;\n        for (var row=0; row<pinRows; ++row)\
    \ {\n                offset.z+=pinDistance;\n                offset.x=-pinDistance*row/2;\n\
    \                for (var n=0; n<=row; ++n) {\n                         pins.push(Instantiate(pin,\
    \ pinPos+offset, Quaternion.identity));\n                         offset.x+=pinDistance;\n\
    \                }\n\n}\n}\n\nfunction Update() {\n        if (ball.transform.position.y<sunkHeight)\
    \ {\n                ResetEverything();\n        }\n}\n\nfunction ResetBall()\
    \ {\n        ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n\
    \        for (var pin:GameObject in pins) {\n                pin.BroadcastMessage(\"\
    ResetPosition\");\n        }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"\
    ResetPosition\");\n}\n\nfunction ResetEverything() {\n        ResetBall();\n \
    \       ResetPins();\n        ResetCamera();\n}\n```"
