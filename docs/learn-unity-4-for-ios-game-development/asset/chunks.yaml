- fmt: '[Figure 4-3](#9781430248750_Ch04.xhtml#_Fig3). The Project View of the new
    script


    **Name the Script**


    `New Behaviour` is not a very meaningful name for a script, so the first order
    of business is to give it a new name. An obvious choice is `Rotate`, since the
    eventual purpose of the script is to rotate the Cube. But with overly general
    names, you can run into a conflict (Unity will report an error) if there are two
    scripts with the same name, even if they reside in different folders. This is
    because each script defines a new class (a subclass of `MonoBehaviour`, to be
    specific), and you can’t have two classes with the same name.


    One approach is to name each script with a standard prefix (much like how Objective-C
    classes start with `NS`, harkening back to the NextStep origins of OS X). This
    is a common technique adopted by third-party Unity user interface packages. If
    everyone names their button class `Button`, they can’t coexist!


    **Note**   C# scripts have the option of partitioning classes among namespaces
    to avoid name clashes. This book uses JavaScript nearly all the way through, but
    examples of C# scripts and namespaces are provided in [Chapter 17](#9781430248750_Ch17.xhtml).


    Sometimes, I use the game name as a script name prefix, if the script is specific
    to the game (in HyperBowl, I have a lot of scripts that start with `Hyper`). However,
    I usually prefix my script names with `Fugu`, corresponding to my game brand,
    Fugu Games. This book will stick with that convention, so go ahead and name the
    new script `FuguRotate` ([Figure 4-3](#9781430248750_Ch04.xhtml#Fig3)). Of course,
    in general, you’re free to choose your own script name convention.


    **Anatomy of a Script**


    If you select the `FuguRotate` script in the Project View, the Inspector View
    displays the source code, or at least as much as will fit in the Inspector View
    display ([Figure 4-4](#9781430248750_Ch04.xhtml#Fig4)).


    ![9781430248750_Fig04-04.jpg](images/9781430248750_Fig04-04.jpg)


    [Figure 4-4](#9781430248750_Ch04.xhtml#_Fig4). The Inspector View of the new script


    As the Inspector View shows, when Unity creates a new script, it includes three
    items ([Listing 4-1](#9781430248750_Ch04.xhtml#list1)).


    [Listing 4-1.](#9781430248750_Ch04.xhtml#_list1)  The Contents of a New Script


    ```

    #pragma strict


    function Start () {

    }


    function Update () {

    }

    ```


    The top line of the script, `#pragma strict`, instructs the script compiler that
    all variables have type declarations, or at least have types that are easily inferred
    by the compiler. This is not a requirement for Unity desktop builds, but it is
    required for Unity iOS, so you might as well make a habit of it.


    **Note**   All of the complete script listings in this book start with `#pragma
    strict`.   Any code that doesn’t include that line is only an excerpt from a script.


    The two functions in the script are callbacks, which are called by the Unity game
    engine at well-defined moments in the game. The `Start` function is called when
    this script is first enabled. A Component is not completely `enabled` unless the
    GameObject it’s attached to is also active. So if a GameObject is initially active
    in a scene and it has an enabled script attached, then the `Start` function of
    that script is called when the scene starts playing. Otherwise, the `Start` function
    is not called until the script is enabled (by setting the `enabled` variable of
    the script Component) and the GameObject is made active (by calling the `SetActive`
    function of the GameObject).


    In contrast to the `Start` function, which is only called at most once in the
    lifetime of a script Component, the `Update` function is called every frame (i.e.,
    once before each time Unity renders the current scene). Like the `Start` function,
    `Update` is only called when the script is (completely) enabled, and the first
    call to `Update` happens after the one and only call to `Start`. Thus, the `Start`
    function is useful for performing any initialization needed by the `Update` function.


