    a good chance you can add the feature by writing Editor scripts. These are scripts
    also written in JavaScript, C#, or Boo, but they’re located in the Editor folder
    in the Project View. Editor scripts have access to the Editor GUI, project settings,
    and project assets via a set of Editor classes, documented in the Scripting Reference
    under “Editor Classes.”    As an example, let’s create a menu on the Unity Editor
    menu bar with commands for activating and deactivating an entire hierarchy of
    GameObjects. In other words, the commands call `SetActive` on every GameObject
    in the hierarchy and is equivalent to clicking the checkbox of each GameObject
    in the Inspector View.    Before Unity 4, each GameObject just had one `active`
    state represented by the active checkbox in the Inspector View and the GameObject
    variable active. But starting with Unity 4, that checkbox in the Inspector View
    represents the local active state of the  GameObject, settable in a script by
    calling`SetActive` and read from the GameObject variable `activeSelf`. The global
    or “really” active state that depends on all its parents also being locally active.
    Thus, ensuring all GameObjects in a hierarchy are locally active allows you to
    deactivate the entire group by toggling the active state of the root GameObject.
    Clicking all those checkboxes by hand can be laborious and error-prone, so a single
    command to perform that operation would be a boon, especially for developers upgrading
    projects to Unity 4.    The process of creating an Editor script is the same as
    creating a script intended for use in a scene, except the Editor script has to
    be located in the Editor folder. So let’s create a new JavaScript in the Project
    View, name it `FuguEditor`, and place it in the Editor folder ([Figure 17-1](#9781430248750_Ch17.xhtml#Fig1)).    ![9781430248750_Fig17-01.jpg](images/9781430248750_Fig17-01.jpg)    [Figure
    17-1](#9781430248750_Ch17.xhtml#_Fig1). Creating a new Editor script    Now add
    the code in [Listing 17-1](#9781430248750_Ch17.xhtml#list1) to the script.    [Listing
    17-1](#9781430248750_Ch17.xhtml#_list1).  The Complete listing for FuguEditor.js    ```
    #pragma strict  @MenuItem ("FuguGames/ActivateRecursively") static function ActivateRecursively()
    {         if (Selection.activeGameObject !=null) {                 SetActiveRecursively(Selection.activeGameObject,true);
            } }  @MenuItem ("FuguGames/DeactivateRecursively") static function DeactivateRecursively()
    {         if (Selection.activeGameObject !=null) {                 SetActiveRecursively(Selection.activeGameObject,false);
            } }  static function SetActiveRecursively(obj:GameObject,val:boolean)
    {         obj.SetActive(val);         for (var i:int=0; i<obj.transform.GetChildCount();
    ++i) {                 SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);
            } }  @MenuItem ("FuguGames/ActivateRecursively", true) @MenuItem ("FuguGames/DeactivateRecursively",
    true) static function ValidateGameObject() {         return (Selection.activeGameObject
    !=null); } ```    The line `@MenuItem ("FuguGames/ActivateRecursively")` adds
    an `ActivateRecursively` item to the FuguGames menu on the Editor menu bar, creating
    the menu if it hadn’t already been created. The function following the `@MenuItem`
    line is invoked when that menu item is selected. `ActivateRecursively` checks
    if a GameObject has been selected in the Editor, and, if so, then it passes that
    GameObject to the function `SetActiveRecursively` along with the value `true`.
    `SetActiveRecursively in turn calls SetActive` with the passed value true call
    for each GameObject in the hierarchy.    After that, a similar block of code adds
    a `DeactivateRecursively` item to the menu, differing only in name and in passing
    false instead of true to `SetActiveRecursively.'
  trans: "\n# 排版后的内容\n\n在这些组件中，我们调整了`Camera`的视锥体和平截头体可视掩码（visibility mask），也调整了 Light\
    \ 的剔除掩码和剔除距离，同时禁用了它的阴影；最小化了每个`MeshFilter`的阴影投射和接收者数量，简化了每个`MeshRenderer`的着色器，并将一个`MeshCollider`替换为`BoxCollider`。我们检查了组件引用的各种资源类型的导入设置：`Texture2D`、`AudioClip`和`Mesh`。参考手册也记录了我们自定义的设置管理器，包括`QualitySettings`、`PhysicsManager`、`TimeManager`和`AudioManager`。我们还使用了`GUIText`组件（它是我们用于启动画面的`GUITexture`的同类组件）来显示帧率。\n\
    \n## 脚本参考\n\n脚本参考中的`Scripting Overview`部分有一个`Performance Optimization`页面，提供了一些关于如何编写更快脚本的技巧。本章学到的一个新函数是`StaticBatchingUtility`类中的静态函数`Combine`（`Combine`是该类中唯一的函数），我们调用它来在运行时批量处理一组游戏对象的层次结构。本章学到的一个新变量是`MonoBehaviour`类中的`useGUILayout`变量，当设置为\
    \ true 时，它通过告诉 UnityGUI 系统当前的`OnGUI`回调不会使用`GUILayout`函数执行任何自动布局，从而提升性能。\n\n所有设置管理器都有对应的类，因此可以通过脚本查询和设置其配置。尽管除渲染设置外的所有设置管理器在整个游戏过程中（而非按场景）处于活动状态，但脚本访问允许我们为每个场景调整设置。例如，我们可以为每个场景定义一个质量级别，并为每个场景添加一个脚本来加载相应的质量级别。本章讨论的设置管理器对应的类包括`QualitySettings`、`AudioSettings`、`PhysicsManager`和`Timemanager`。\n\
    \n我们还使用了`Time`类，评估了其`timeScale`和`deltaTime`变量，并设置了`GUIText`的`text`变量，以便进行基本的帧率显示。\n\
    \n## 资源商店\n\n资源商店列出了一些性能分析系统（搜索`profiler`）和一些对象池系统（搜索`pool`），例如 PoolManager、Smart\
    \ Pool 和 Pooling Manager。最后一个来自 DFT Games，是免费的。\n\n## 网络资源\n\nUnity 维基百科位于`http://wiki.unity3d.com/`，其`Tips,\
    \ Tricks and Tools`部分提供了一些性能技巧，以及几个与性能相关的脚本。特别是，`FramesPerSecond`页面列出了一些比我们在本章创建的更复杂的帧率显示脚本（例如，它们通过一系列帧计算帧率以获得更稳定的显示）。\n\
    \nUmbra 遮挡剔除系统由 Umbra Software 开发，网址为`http://umbrasoftware.com/`。Beast 光照贴图系统是\
    \ Autodesk 的产品，产品页面位于`http://gameware.autodesk.com/beast`。\n\n## 书籍\n\n我已经多次提到《实时渲染》（`http://realtimerendering.com`），但它与本章的图形优化确实非常相关。仅关于\
    \ Mipmap 的处理就值得一读。\n\n# 第 17 章：接下来去哪里？\n\n现在，您已经完成了对 Unity 和 Unity iOS 开发的介绍——从下载和安装\
    \ Unity，到在 Unity 编辑器中开发一个简单的保龄球游戏，再到让它在 iOS 上运行，最后优化它以获得不错的性能。虽然并未涵盖每一个 Unity\
    \ 功能或游戏开发主题（这本书可能会变成一套多卷百科全书！），但我将以一章的“进一步探索”作为结尾。\n\n## 更多脚本知识\n\n我们只是浅尝了 Unity\
    \ 脚本的皮毛，不仅涉及提供的各种脚本语言和广泛的 Unity 类集，还包括可以编写脚本的内容。\n\n### 编辑器脚本\n\n如果您觉得 Unity 编辑器中缺少某些功能，很有可能可以通过编写编辑器脚本来添加该功能。这些脚本同样使用\
    \ JavaScript、C#或 Boo 编写，但它们位于项目视图的 Editor 文件夹中。编辑器脚本通过一组编辑器类（在脚本参考的`Editor Classes`部分有文档说明）可以访问编辑器\
    \ GUI、项目设置和项目资源。\n\n例如，让我们在 Unity 编辑器菜单栏上创建一个菜单，其中包含用于激活和停用整个游戏对象层次结构的命令。换句话说，这些命令会调用层次结构中每个游戏对象的`SetActive`，相当于在检视面板中点击每个游戏对象的复选框。\n\
    \n在 Unity 4 之前，每个游戏对象只有一个`active`状态，由检视面板中的活动复选框和游戏对象变量`active`表示。但从 Unity 4 开始，检视面板中的复选框代表游戏对象的**本地活动状态**，可通过脚本调用`SetActive`设置，并从游戏对象变量`activeSelf`读取。而全局或“真正”的活动状态则取决于其所有父对象是否也处于本地活动状态。因此，确保层次结构中的所有游戏对象都处于本地活动状态后，就可以通过切换根游戏对象的活动状态来停用整个组。手动点击所有这些复选框既繁琐又容易出错，因此一个执行此操作的单一命令将非常有用，尤其是对于将项目升级到\
    \ Unity 4 的开发者而言。\n\n创建编辑器脚本的过程与创建用于场景的脚本相同，只是编辑器脚本必须放置在 Editor 文件夹中。因此，让我们在项目视图中创建一个新的\
    \ JavaScript，命名为`FuguEditor`，并将其放置在 Editor 文件夹中（图 17-1）。\n\n![9781430248750_Fig17-01.jpg](img/9781430248750_Fig17-01.jpg)\n\
    \n图 17-1. 创建新的编辑器脚本\n\n现在，将清单 17-1 中的代码添加到脚本中。\n\n清单 17-1. FuguEditor.js 的完整代码清单\n\
    \n```\n#pragma strict\n\n@MenuItem (\"FuguGames/ActivateRecursively\")\nstatic\
    \ function ActivateRecursively() {\n        if (Selection.activeGameObject !=null)\
    \ {\n                SetActiveRecursively(Selection.activeGameObject,true);\n\
    \        }\n}\n\n@MenuItem (\"FuguGames/DeactivateRecursively\")\nstatic function\
    \ DeactivateRecursively() {\n        if (Selection.activeGameObject !=null) {\n\
    \                SetActiveRecursively(Selection.activeGameObject,false);\n   \
    \     }\n}\n\nstatic function SetActiveRecursively(obj:GameObject,val:boolean)\
    \ {\n        obj.SetActive(val);\n        for (var i:int=0; i<obj.transform.GetChildCount();\
    \ ++i) {\n                SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);\n\
    \        }\n}\n\n@MenuItem (\"FuguGames/ActivateRecursively\", true)\n@MenuItem\
    \ (\"FuguGames/DeactivateRecursively\", true)\nstatic function ValidateGameObject()\
    \ {\n        return (Selection.activeGameObject !=null);\n}\n```\n\n代码行`@MenuItem\
    \ (\"FuguGames/ActivateRecursively\")`向编辑器菜单栏的 FuguGames 菜单添加了一个`ActivateRecursively`项，如果菜单尚未创建，则会创建该菜单。`@MenuItem`行后面的函数会在选择该菜单项时被调用。`ActivateRecursively`检查编辑器中是否已选中一个游戏对象，如果选中，则将游戏对象和值`true`传递给函数`SetActiveRecursively`。而`SetActiveRecursively`会为层次结构中的每个游戏对象调用`SetActive`，并传入值\
    \ true。\n\n之后，一个类似的代码块向菜单添加了`DeactivateRecursively`项，区别仅在于名称不同，以及在传递给`SetActiveRecursively`时传入\
    \ false 而不是 true。\n"
- fmt: "Although you can check if an object is selected before calling `SetActiveRecursively`,\
    \ it’s better user interface design to deactivate a menu item if it’s not going\
    \ to have any effect. You can add this by listing the `MenuItem` attributes again,\
    \ but this time with an additional `true` argument, which indicates the next function\
    \ is a static function that returns `true` only if the menu item should be active.\
    \ Both `ActivateRecursively` and `DeactivateRecursively` use `ValidateGameObject`,\
    \ which just checks if a `GameObject` is selected in the Editor, to decide if\
    \ the menu item should be available or grayed out.\n\nOnce this script has been\
    \ compiled, the new menu should appear as shown in [Figure 17-2](#9781430248750_Ch17.xhtml#Fig2)\
    \ (there may be a delay).\n\n![9781430248750_Fig17-02.jpg](images/9781430248750_Fig17-02.jpg)\n\
    \n[Figure 17-2](#9781430248750_Ch17.xhtml#_Fig2). A menu added to the menu bar\
    \ using an Editor script\n\nThis example has minimal user interface, just some\
    \ menu items, but Editor scripts can create new windows and user interfaces using\
    \ UnityGUI functions (and the Editor is actually implemented in UnityGUI, which\
    \ is why occasional Editor errors show up as UnityGUI errors in the Console View).\
    \ Editor scripts can also be used for batch processing, postprocessing assets\
    \ after import, or preprocessing scenes before a build. I have simple Editor scripts\
    \ that remove build files, show `GameObject` statistics, and even call the OS\
    \ X `say` command so I can talk to myself.\n\n## C\\#\n\nI’ve focused on using\
    \ Unity’s JavaScript as the scripting language in this book because, well, I had\
    \ to pick one. But seriously, JavaScript does have more example code in the Unity\
    \ documentation (although the gap is closing) and will likely look more familiar\
    \ to JavaScript and Flash developers. JavaScript is also more succinct than C#,\
    \ at least for small scripts. Just compare the empty JavaScript ([Listing 17-2](#9781430248750_Ch17.xhtml#list2))\
    \ and C# script ([Listing 17-3](#9781430248750_Ch17.xhtml#list3)) generated by\
    \ the Create menu in the Project View.\n\n[Listing 17-2](#9781430248750_Ch17.xhtml#_list2).\
    \ A Newly Created JavaScript Script\n\n```javascript\n#pragma strict\n\nfunction\
    \ Start () {\n\n}\n\nfunction Update () {\n\n}\n```\n\n[Listing 17-3](#9781430248750_Ch17.xhtml#_list3).\
    \ A Newly Created C# Script\n\n```csharp\nusing UnityEngine;\nusing System.Collections;\n\
    \npublic class NewBehaviourScript : MonoBehaviour {\n\n        // Use this for\
    \ initialization\n        void Start () {\n\n        }\n\n        // Update is\
    \ called once per frame\n        void Update () {\n\n        }\n}\n```\n\nIn the\
    \ C# script, the class declaration is explicit and you have to ensure that the\
    \ class name matches the script name. At the top of the C# script, two namespaces\
    \ that are commonly used in Unity scripts, `UnityEngine` and `System.Collections`,\
    \ are explicitly imported—in JavaScript, they are implicitly imported.\n\nA lot\
    \ of JavaScript code will run in C# with little modification, but there are some\
    \ syntactic differences: variables declarations begin with `<type> <name>` instead\
    \ of `var <name>:<type>`. Functions are defined the same way, starting with the\
    \ return type and name instead of starting with `function`. There’s no reason\
    \ to add `#pragma strict` to a C# file because C# is already strictly typed.\n\
    \nFor small scripts, JavaScript is more convenient, but for large-scale Unity\
    \ development, C# is arguably the more practical choice, given that it’s a better-documented\
    \ language with industrial-strength testing as the most popular Mono or .NET language.\
    \ Furthermore, many Unity extension packages are written in C# (the Prime31 plugins,\
    \ EZGUI, and NGUI among them), and mixing JavaScript and C# in Unity is inconvenient;\
    \ if you have JavaScript code referencing C# scripts, those scripts must be placed\
    \ in the Plugins or Standard Assets folders so they load earlier.\n\nAnother reason\
    \ to use C# is the addition of namespace support for C# in Unity 4. This feature\
    \ allows you to dispense with prefixing class names to avoid conflicts. For example,\
    \ [Listing 17-4](#9781430248750_Ch17.xhtml#list4) shows a C# version of our `FuguFrameRate`\
    \ script, where the class is defined within a namespace declaration.\n\n[Listing\
    \ 17-4](#9781430248750_Ch17.xhtml#_list4). A C# Version of the `FuguFrameRate`\
    \ Script\n\n```csharp\nusing UnityEngine;\nusing System.Collections;\n\nnamespace\
    \ Fugu {\n\n   sealed public class FrameRate : MonoBehaviour {\n\n        public\
    \ int frameRate = 60;\n\n        void Awake () {\n               Application.targetFrameRate\
    \ = frameRate;\n        }\n\n   }\n\n} // end namespace\n```\n\nBecause the class\
    \ is inside the namespace `Fugu`, you can safely call the class just `FrameRate`\
    \ and name the script `FrameRate` to match. If you had to refer to this class\
    \ from another script, you would have to use the fully qualified name `Fugu.FrameRate`\
    \ unless you added a `using Fugu;` statement at the top of the script. C# allows\
    \ you to optionally prepend the class definition with `sealed`, which specifies\
    \ that this class is not intended to be subclassed. A compiler error will result\
    \ if you try to define a subclass of `FrameRate`. Java programmers will recognize\
    \ this is the same as the Java `final` declaration.\n\nIn C#, coroutines must\
    \ explicitly return type `IEnumerator` (which is in the `System.Collections` namespace\
    \ and why it’s convenient to always import that namespace). Although Unity automatically\
    \ adds a `Start` callback that returns `void` in newly created C# scripts, that\
    \ `Start` callback can be turned into a coroutine by changing the return type\
    \ from `void` to `IEnumerator`. But it seems kind of weird to change the return\
    \ type of a callback, so I prefer to move the coroutine out of the `Start` callback\
    \ and invoke the coroutine with `StartCoroutine`, as I did in the C# version of\
    \ the `FuguAdBanner` script ([Listing 17-5](#9781430248750_Ch17.xhtml#list5)).\n\
    \n`StartCoroutine` can be called from any callback, so this technique has the\
    \ advantage of providing a uniform way to invoke coroutines and makes it unnecessary\
    \ to use callbacks directly as coroutines (and also makes it unnecessary to remember\
    \ which callbacks can be used as coroutines). This is not a bad practice to apply\
    \ in JavaScript, too.\n\n[Listing 17-5](#9781430248750_Ch17.xhtml#_list5). A C#\
    \ Version of the `FuguAdBanner` Script\n\n```csharp\nusing UnityEngine;\nusing\
    \ System.Collections;\n\nnamespace Fugu {\npublic class AdBanner : MonoBehaviour\
    \ {\n\n        public bool showOnTop = true;\n        public bool dontDestroy\
    \ = true;\n\n        private ADBannerView banner = null;\n\n        void Start()\
    \ {\n               StartCoroutine (StartBanner());\n        }\n\n        private\
    \ IEnumerator StartBanner () {\n               if (dontDestroy) {\n          \
    \             GameObject.DontDestroyOnLoad(gameObject);\n               }\n  \
    \             banner = new ADBannerView();\n               banner.autoSize = true;\n\
    \               banner.autoPosition = showOnTop ? ADPosition.Top : ADPosition.Bottom;\n\
    \               while (!banner.loaded && banner.error == null) {\n           \
    \            yield return null;\n               }\n               if (banner.error\
    \ == null) {\n                       banner.Show();\n               } else {\n\
    \                       banner = null;\n               }\n        }\n}\n} // end\
    \ namespace\n```\n\nYou also can’t just call `yield` within a coroutine as you\
    \ did in JavaScript. In C#, you have to call `yield return null` to equivalently\
    \ yield for a frame.\n\nAnother difference is the syntax of anonymous functions.\
    \ In our `FuguGameCenter` script, I passed unnamed success or failure functions\
    \ in the form of `function(success:boolean) {...}`, but in C#, anonymous functions\
    \ are known as *lambda functions* (dating back to terminology from the Lisp language,\
    \ which used `(lambda (success) ...)`) and is specified in the form `(bool success)\
    \ => {`."
