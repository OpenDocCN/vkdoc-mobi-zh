    \ 编辑子立方体\n\n作为 Cube 的子对象，在 Inspector 视图中显示的 `child1` 和 `child2` 的位置是相对于其父对象 Cube\
    \ 的。这意味着，如果某个子立方体的位置为 `(0,0,0)`，则它与其父对象的位置完全相同。因此，让我们将 `child1` 和 `child2` 的位置分别设置为\
    \ `(2,0,0)` 和 `(-2,0,0)`。现在，这两个子立方体像卫星立方体一样与父对象 Cube 保持间距（图 4-29）。\n\n![9781430248750_Fig04-29.jpg](img/9781430248750_Fig04-29.jpg)\n\
