  trans: "\n变量`roll`用来记录球的当前轮次，原本也可以声明为`int`类型，并采用 0-2 或 1-3 的数字来表示一局中的三种可能球况。但使用`enum`（*枚举*的缩写）更为清晰，它本质上允许你定义一个新类型，其值取自一组命名值中的一个。因此`roll`被声明为`Roll`类型，这是一个包含`Ball1`、`Ball2`或`Ball3`的枚举。\n\
    \n顺便提一下，至此我们已经遇到了几种不同类型的类别：基本类型如`int`和`boolean`、包含其他类型的内置数组、像`Roll`这样的枚举、像`Vector3`这样的结构体，以及像`GameObject`、`Component`和`FuguBowlPlayer`这样的类。在这些类别中，类和数组是*引用类型*，这意味着不同变量可以引用同一类型的同一个实例，并且对该实例的修改将通过每个引用该实例的变量可见。\n\
    \n## 启动状态机\n\n好了，现在你已经勾勒出状态机的草图，接下来该如何编写代码呢？FSM（有限状态机）非常有用，以至于一些游戏引擎（包括 CryEngine、虚幻引擎和\
    \ Second Life）都在其脚本中内置了对它的支持。不幸的是，Unity 并不支持，但既然这是软件问题，总有很多方法可以自行实现 FSM 支持。\n\n\
    一种方法是在`Update`函数中放置一个大的条件语句，根据当前所处的状态执行不同的操作（我们可能会使用一个枚举来定义这些不同的状态）。然而，这种方法往往会导致`Update`函数变得臃肿不堪。事实上，由于第\
    \ 7 章中添加到`FuguBowl`脚本的`Update`回调将被我们即将添加的状态机所取代，你现在就应该从`FuguBowl`脚本中删除该回调。\n\n\
    另一种创建 FSM 的方法（我曾尝试过一段时间）是用一个挂载了多个脚本的`GameObject`来表示状态机，其中每个脚本代表一个状态。每当当前状态退出时，该脚本会禁用自身并启用下一个脚本或状态。这种方法很有吸引力，因为每个脚本或状态都有自己的`Update`函数和其他回调。但我发现，如果整个\
    \ FSM 包含在单个脚本中，我的状态机更容易理解和处理。\n\n因此，我最终决定使用*协程*来实现状态机。协程是一种函数，可以通过调用`yield`（该函数即使在尚未执行完毕时，也会*暂时*交出控制权）来在某一帧或多帧中暂停自身。你可以将每个状态实现为一个协程，当状态退出时该协程返回。在状态中，协程执行该状态下应发生的任何操作，但会反复进行`yield`，以免阻塞\
    \ Unity 的其余部分（包括渲染器和物理系统）运行。在返回之前，协程会指定它将转换到的下一个状态。\n\n并非所有回调都能用作协程。例如，`Awake`不能用作协程，`Update`也不能，但`Start`可以`yield`，因此它可以充当\
    \ FSM 控制器（清单 8-16）。\n\n清单 8-16.  `FuguBowl.js`中运行状态机的`Start`回调\n\n```\nprivate\
    \ var state:String;\n\nfunction Start() {\n       state=\"StateNewGame\";\n  \
    \     while (true) {\n              Debug.Log(\"State \"+state);\n           \
    \   yield StartCoroutine(state);\n              yield;\n       }\n}\n```\n\n当前状态的名称（即实现该状态的协程的名称）以`String`类型保存在名为`state`的私有变量中。`Start`回调无限循环，反复使用`state`的值调用`StartCoroutine`来调用协程。`Start`在对`StartCoroutine`的调用上执行`yield`，以便它一直等待，直到状态协程执行完毕，然后再启动一个具有下一个`state`值的协程。\n\
    \n无法保证被调用的协程一定会`yield`，因此`Start`在循环中额外添加了一个`yield`以确保万无一失，这样在状态之间至少发生一次`yield`，从而给游戏引擎的其余部分提供运行机会。\n\
    \n作为调试辅助手段，`Start`在执行每个状态协程之前都会调用`Debug.Log`（图 8-6）。这是在测试游戏时跟踪状态机进度的一种便捷方式。\n\n\
    ![9781430248750_Fig08-06.jpg](img/9781430248750_Fig08-06.jpg)\n\n图 8-6。状态机调试跟踪的控制台视图\n\
    \n## 各状态\n\n按照惯例，我们将在所有状态协程的名称前加上前缀`State`，以表明这些函数是状态机中的状态。\n\n### StateNewGame\n\
    \n保龄球状态机的初始状态是`StateNewGame`（清单 8-17），它通过清除玩家的分数并将当前局索引设置为 0 来开始一局新游戏，指明玩家正在进行游戏的第一局。\n\
    \n清单 8-17.  `FuguBowl.js`中的`StateNewGame`\n\n```\nfunction StateNewGame() {\n\
    \       player.ClearScore();\n       frame = 0;\n       state=\"StateBall1\";\n\
    }\n```\n\n在返回（实际上是退出状态）之前，`StateNewGame`指定下一个状态为`StateBall1`，即玩家开始滚动该局第一球的状态。\n\
    \n### StateBall1\n\n`StateBall1`（清单 8-18）采取的第一个动作是重置球瓶、球以及主摄像机的位置。这在第一次进入该状态时（即游戏开始时）并非必要，但当玩家完成一局投球并转换回此状态时，所有物体都需要放置到其起始位置和旋转角度（可能被击倒的球瓶其旋转角度会发生变化）。\n\
    \n清单 8-18.  `FuguBowl.js`中开始滚动第一球的状态\n\n```\nfunction StateBall1() {\n       ResetEverything();\
    \ // 重置球瓶、摄像机和球\n       roll = Roll.Ball1;\n       state=\"StateRolling\";\n}\n\
    ```\n\n执行重置后，此状态将`roll`变量设置为`Roll.Ball1`，表示玩家正在滚动该局的第一球。最后，此状态转换到`StateRolling`，即球正在向球瓶滚去时所处的状态。\n\
    \n### StateBall2\n\n与`StateBall1`类似，`StateBall2`（清单 8-19）首先重置球和主摄像机。\n\n清单 8-19.\
    \  `FuguBowl.js`中开始滚动第二球的状态\n\n```\nfunction StateBall2() {\n       ResetBall();\n\
    \       ResetCamera();\n       if (GetPinsDown()==10) {\n              ResetPins();\n\
    \       }  else {\n              RemoveDownedPins();\n       }\n       roll =\
    \ Roll.Ball2;\n       state=\"StateRolling\";\n}\n```\n\n如果玩家到达此点，通常意味着该局的第一球没有形成全倒，现在是时候尝试击倒剩余的球瓶了，但在清理上一轮击倒的球瓶之后。但如果所有球瓶都已倒下，那一定是第十局中的特殊情况：一次全倒之后再进行两次投球，此时需要重置球瓶。\n\
    \n在退出该状态之前，`roll`被设置为`Roll.Ball2`，并且与`StateBall1`一样，下一个状态设置为`StateRolling`。\n\n\
    ### StateBall3\n"
- fmt: '说话间就来到了第十帧，这是唯一出现`StateBall3`（[代码清单 8-20](#9781430248750_Ch08.xhtml#list20)）的情况，因为这是玩家唯一能投三次的一帧。


    [代码清单 8-20](#9781430248750_Ch08.xhtml#_list20)  FuguBowl.js 中开始投掷第三球的 State


    ```javascript

    function StateBall3() {

           ResetBall();

           ResetCamera();

           if (GetPinsDown()==10) {

                  ResetPins();

           }  else {

                  RemoveDownedPins();

           }

           roll = Roll.Ball3;

           state="StateRolling";

    }

    ```


    `StateBall3`与`StateBall2`一样，会重置球；如果在这一帧的前两次投球中击倒了十个瓶（即补中或连续两次全中），它还会重置所有球瓶。否则，就清除前一次投球击倒的球瓶。同样，此状态将投球变量设置为`Roll.Ball3`，并转换到`StateRolling`状态。


    **StateRolling**


    `StateRolling`（[代码清单 8-21](#9781430248750_Ch08.xhtml#list21)）或多或少实现了前一章创建但本章开头已被弃用的`Update`函数的功能。该状态每帧都会暂停，不做任何事，只等待球控制应该停止的时刻。


    [代码清单 8-21](#9781430248750_Ch08.xhtml#_list21)  FuguBowl.js 中投球状态的代码


    ```javascript

    function StateRolling() {

           while (true) {

                  if (ball.transform.position.z>pinPos.z) {

                          state = "StateRolledPast";

                          return;

                  }

                  if (ball.transform.position.y<sunkHeight) {

                          state = "StateGutterBall";

                          return;

                  }

                  yield;

           }

    }

    ```


    有两种情况表明投球确实结束了。一种是球滚出了地板的边缘，这基本上与正常保龄球比赛中的洗沟球情况相同；另一种是球已经滚到了球瓶附近（如果不放弃控制，游戏会变得太简单；你可以像巨型卡车一样在球瓶间来回穿梭！）。


    检测洗沟球很容易。与现已删除的`Update`回调中一样，此状态会检查球的 y 位置是否低于`sunkHeight`变量指定的值。如果是，则转换到洗沟球状态。另一种情况也几乎同样简单，即检查球的
    z 位置是否超过了第一个球瓶的 z 位置。本质上，该状态是在检查球是否到达了从左到右横跨地板、放置着球瓶的“球瓶线”。如果到达了，则转换到`StateRolledPast`状态。


    实际上，我们在绘制有限状态机时并没有考虑加入`StateGutterBall`和`StateRolledPast`，但这没什么大不了的。现在，你可以直接插入这些状态，替换掉之前从`StateRolling`到`StateRollOver`的直接转换。


    **StateRolledPast**


    当球滚得足够远并到达球瓶时，会进入`StateRolledPast`状态（[代码清单 8-22](#9781430248750_Ch08.xhtml#list22)）。该状态通过禁用球和主摄像机的控制来“放开”球。


    [代码清单 8-22](#9781430248750_Ch08.xhtml#_list22)  FuguBowl.js 中球到达球瓶时进入的状态


    ```javascript

    function StateRolledPast() {

           var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

           if (follow != null) {

                  follow.enabled = false;

           }

           ball.GetComponent(FuguForce).enabled = false;

           yield WaitForSeconds(5);

           state = "StateRollOver";

    }

    ```


    为了禁用主摄像机的`SmoothFollow`脚本，该状态通过`Camera`类中的静态变量`main`访问主摄像机，并在该`GameObject`上调用`GetComponent`，传入`SmoothFollow`作为要获取的组件的类名。这将返回附加到主摄像机上的`SmoothFollow`脚本。然后，该脚本被赋值给一个名为`follow`的局部变量。


    `follow`变量被声明为`Behaviour`类型，它是`Component`的直接子类。`Behaviour`可以通过设置其`enabled`变量来启用或禁用。`follow`本可以声明为更具体的类，比如`MonoBehaviour`（`Behaviour`的子类，也是任何可附加到`GameObject`的脚本的父类）甚至`SmoothFollow`（`SmoothFollow`脚本的最具体类），因为所有这些类都从`Behaviour`继承了`enabled`变量。但是，选择最适合的最通用类可以提供最大的灵活性。例如，如果你将`follow`声明为`SmoothFollow`类型，而后又决定使用不同的摄像机控制脚本，你就必须调整`follow`的类型声明。


    **提示**   对于类型声明，请使用实现了你所需函数和变量的最通用类。


    不将`follow`声明为`SmoothFollow`类型的另一个原因是，在`http://learnunity4.com/`上可用的本项目版本不包含任何资源商店或标准资源包，包括`SmoothFollow`脚本。在项目中引用不存在的`SmoothFollow`类会导致编译器错误。


    这就是为什么将`"SmoothFollow"`作为字符串传递给`GetComponent`的原因，这样直到运行时调用`GetComponent`时才用它来查找类，此时`GetComponent`会返回`null`。试图访问`null`上的`enabled`变量会导致错误，因此该状态首先检查`follow`是否为`null`，然后再尝试禁用它。附加在球上的`FuguForce`脚本以类似的方式禁用，通过在球上调用`GetComponent`来获取`FuguForce`脚本，然后将其`enabled`变量设置为`false`。但是，与主摄像机和`SmoothFollow`脚本不同，因为我们确信球上附加了`FuguForce`脚本，所以在禁用该脚本之前无需进行空值检查测试。


    此外，`GetComponent`是一个重载函数，一个版本接受`String`参数，另一个版本直接接受类。因此，不是将`"FuguForce"`传递给`GetComponent`，而是直接传递类`FuguForce`。这样，如果类名拼写错误（例如`GetComponent(FuguFource)`），就会产生编译器错误。


    传入拼写错误的类名`String`（例如`GetComponent("FuguFource")`），在编译时不会导致错误，这乍听起来是件好事，但最好能尽早发现问题。在运行时，对`GetComponent`的调用会返回`null`，如果代码期望非`null`结果，则可能导致崩溃；或者只会产生令人恼火的调试过程，因为你不知道为什么那个脚本没有按预期被禁用。


    **提示**   尽可能让编译器帮你做错误检查。


    在某个时刻，`SmoothFollow`和`FuguForce`脚本必须重新启用。自然的位置是在`ResetCamera`和`ResetBall`函数（[代码清单
    8-23](#9781430248750_Ch08.xhtml#list23)）中，因为当一轮投球结束，主摄像机和球分别被重置以开始下一轮投球时，会调用这些函数。


    [代码清单 8-23](#9781430248750_Ch08.xhtml#_list23)  FuguBowl.js 中的 ResetBall 和 ResetCamera
    函数


    ```javascript

    function ResetBall() {

           ball.GetComponent(FuguForce).enabled = true;

           ball.SendMessage("ResetPosition");

    }

    function ResetCamera() {

           var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

           if (follow != null) {

                  follow.enabled = true;

           }

           Camera.main.SendMessage("ResetPosition");

    }

    ```


    在`ResetBall`和`ResetCamera`函数中，启用脚本组件的代码与禁用脚本的代码相同，只是将`enabled`变量设置为`true`。'
  raw: 'And speaking of the tenth frame, that’s the only case where `StateBall3` ([Listing
    8-20](#9781430248750_Ch08.xhtml#list20)) occurs, since that’s the only frame in
    which the player can roll three times.


    [Listing 8-20.](#9781430248750_Ch08.xhtml#_list20)  The State to Start Rolling
    the Third Ball in FuguBowl.js


    ```

    function StateBall3() {

           ResetBall();

           ResetCamera();

           if (GetPinsDown()==10) {

                  ResetPins();

           }  else {

                  RemoveDownedPins();

           }

           roll = Roll.Ball3;

           state="StateRolling";

    }

    ```


    `StateBall3`, just like `StateBall2`, resets the ball and if you knocked down
    ten pins from the previous rolls in the frame (either a spare or two strikes),
    it will reset the pins. Otherwise, the downed pins from the previous roll are
    cleaned up. Again, the state sets the roll variable, to `Roll.Ball3`, and transitions
    to `StateRolling`.


    StateRolling


    `StateRolling` ([Listing 8-21](#9781430248750_Ch08.xhtml#list21)) more or less
    fulfills the `Update` function created in the previous chapter and discarded earlier
    in this one. The state yields every frame, doing nothing except waiting until
    the Ball control should cease.


    [Listing 8-21.](#9781430248750_Ch08.xhtml#_list21)  The State for Rolling the
    Ball in FuguBowl.js


    ```

    function StateRolling() {

           while (true) {

                  if (ball.transform.position.z>pinPos.z) {

                          state = "StateRolledPast";

                          return;

                  }

                  if (ball.transform.position.y<sunkHeight) {

                          state = "StateGutterBall";

                          return;

                  }

                  yield;

           }

    }

    ```


    There are two cases where this roll is definitely done. Either the Ball rolls
    off the edge of the Floor, which is basically the same situation as a gutter ball
    in a normal bowling game, or when you’ve rolled up to the pins (if you don’t relinquish
    control, the game’s too easy; you can roll back and forth among the pins like
    a monster truck!).


    Detecting a gutter ball is easy. As in the now-removed `Update` callback, this
    state checks if the ball has fallen below the y position specified in the `sunkHeight`
    variable. If so, transition to the gutter ball state. The other case is nearly
    as simple, checking if the ball’s z position has passed the first pin’s z position.
    Essentially, the state is checking if the ball has reached the “pin line” stretching
    left to right across the floor where that pin is placed. If it has, then transition
    to `StateRolledPast`.


    We actually didn’t consider having `StateGutterBall` and `StateRolledPast` when
    we sketched out our FSM, but it’s not a big deal. You can now just insert those
    states in place of the formerly direct transition between `StateRolling` and `StateRollOver`.


    StateRolledPast


    After rolling far enough to reach the pins, the `StateRolledPast` state is entered
    ([Listing 8-22](#9781430248750_Ch08.xhtml#list22)). This state “lets go” of the
    Ball by disabling the Ball and Main Camera controls.


    [Listing 8-22.](#9781430248750_Ch08.xhtml#_list22)  The State Entered when Reaching
    the Pins in FuguBowl.js


    ```

    function StateRolledPast() {

           var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

           if (follow != null) {

                  follow.enabled = false;

           }

           ball.GetComponent(FuguForce).enabled = false;

           yield WaitForSeconds(5);

           state = "StateRollOver";

    }

    ```


    To disable the Main Camera `SmoothFollow script`, the state accesses the Main
    Camera through the static variable `main` in the Camera class and calls `GetComponent`
    on that GameObject, passing in `SmoothFollow` as the class of the Component to
    be retrieved. That returns the `SmoothFollow` script that’s attached to the Main
    Camera. The script is then assigned to a local variable named `follow`.


    The `follow` variable is declared to be of type `Behaviour`, which is a direct
    subclass of `Component`. A `Behaviour` can be enabled or disabled by setting its
    `enabled` variable. `follow` could instead have been declared as a more specific
    class like `MonoBehaviour` (a subclass of `Behaviour` and the parent class of
    any script that can be attached to a GameObject) or even `SmoothFollow`, the most
    specific class of the`SmoothFollow` script, because all of those classes inherit
    the `enabled` variable from `Behaviour`. But choosing the most general class that’s
    suitable provides the most flexibility. For example, if you declared `follow`
    to be of type `SmoothFollow` and then later opted to use a different Camera control
    script, you would have to adjust the type declaration for `follow`.


    **Tip**   For type declarations, use the most general class that implements the
    functions and variables you need.


    Another reason not to declare `follow` to be of type `SmoothFollow` is that the
    version of this project available on `http://learnunity4.com/` doesn’t include
    any Asset Store or Standard Assets packages, including the `SmoothFollow` script.
    Referencing the `SmoothFollow` class when it’s not available in the project will
    result in a compiler error.


    This is the reason why “`SmoothFollow`” is passed to `GetComponent` as a String,
    so that it’s not used to find a class until `GetComponent` is called at runtime,
    at which point `GetComponent` returns null. Attempting to access the `enabled`
    variable on null will result in an error, so the state first checks if `follow`
    is null before attempting to disable it. The `FuguForce` script attached to the
    Ball is disabled in a similar manner, by calling `GetComponent` on the Ball to
    retrieve the `FuguForce` script and then settings its `enabled` variable to false.
    But, unlike the Main Camera and the `SmoothFollow` script, because we’re certain
    the Ball has a `FuguForce` script attached, there’s no need to perform a null
    check test before disabling the script.


    Furthermore, `GetComponent` is an overloaded function with one version taking
    a `String` argument and the other taking a class directly. So instead of passing
    the `"FuguForce"` to `GetComponent`, the class `FuguForce` is passed directly.
    This way, a compiler error will result if the class name is misspelled (e.g.,
    `GetComponent(FuguFource)`).


    Passing in a misspelled `String` name of a class (e.g., `GetComponent("FuguFource")`),
    won’t result in an error at compile time, which may at first sound like a good
    thing, but it’s better to catch problems early. At runtime, that call to `GetComponent`
    will return null, which could result in a crash if the code is expecting a non-null
    result, or just produce aggravating debugging sessions, as you wonder why that
    script isn’t getting disabled as you expect.


    **Tip**   Let the compiler do your error checking whenever possible.


    At some point, the `SmoothFollow` and `FuguForce` scripts have to be reenabled.
    The natural place to do that is in the `ResetCamera` and `ResetBall` functions
    ([Listing 8-23](#9781430248750_Ch08.xhtml#list23)), as they get called when a
    roll is over and the Main Camera and Ball, respectively, are reset to start another
    roll.


    [Listing 8-23.](#9781430248750_Ch08.xhtml#_list23)  ResetBall and ResetCamera
    Functions in FuguBowl.js


    ```

    function ResetBall() {

           ball.GetComponent(FuguForce).enabled = true;

           ball.SendMessage("ResetPosition");

    }

    function ResetCamera() {

           var follow:Behaviour = Camera.main.GetComponent("SmoothFollow");

           if (follow != null) {

                  follow.enabled = true;

           }

           Camera.main.SendMessage("ResetPosition");

    }

    ```


    In both the `ResetBall` and `ResetCamera` functions, the code to enable the script
    Component is the same one used to disable the script, except the `enabled` variable
    is set to true.'
  trans: "\n说话间就来到了第十帧，这是唯一出现`StateBall3`（代码清单 8-20）的情况，因为这是玩家唯一能投三次的一帧。\n\n代码清单 8-20  FuguBowl.js\
    \ 中开始投掷第三球的 State\n\n```javascript\nfunction StateBall3() {\n       ResetBall();\n\
    \       ResetCamera();\n       if (GetPinsDown()==10) {\n              ResetPins();\n\
    \       }  else {\n              RemoveDownedPins();\n       }\n       roll =\
    \ Roll.Ball3;\n       state=\"StateRolling\";\n}\n```\n\n`StateBall3`与`StateBall2`一样，会重置球；如果在这一帧的前两次投球中击倒了十个瓶（即补中或连续两次全中），它还会重置所有球瓶。否则，就清除前一次投球击倒的球瓶。同样，此状态将投球变量设置为`Roll.Ball3`，并转换到`StateRolling`状态。\n\
    \n**StateRolling**\n\n`StateRolling`（代码清单 8-21）或多或少实现了前一章创建但本章开头已被弃用的`Update`函数的功能。该状态每帧都会暂停，不做任何事，只等待球控制应该停止的时刻。\n\
    \n代码清单 8-21  FuguBowl.js 中投球状态的代码\n\n```javascript\nfunction StateRolling() {\n\
    \       while (true) {\n              if (ball.transform.position.z>pinPos.z)\
    \ {\n                      state = \"StateRolledPast\";\n                    \
    \  return;\n              }\n              if (ball.transform.position.y<sunkHeight)\
    \ {\n                      state = \"StateGutterBall\";\n                    \
    \  return;\n              }\n              yield;\n       }\n}\n```\n\n有两种情况表明投球确实结束了。一种是球滚出了地板的边缘，这基本上与正常保龄球比赛中的洗沟球情况相同；另一种是球已经滚到了球瓶附近（如果不放弃控制，游戏会变得太简单；你可以像巨型卡车一样在球瓶间来回穿梭！）。\n\
    \n检测洗沟球很容易。与现已删除的`Update`回调中一样，此状态会检查球的 y 位置是否低于`sunkHeight`变量指定的值。如果是，则转换到洗沟球状态。另一种情况也几乎同样简单，即检查球的\
    \ z 位置是否超过了第一个球瓶的 z 位置。本质上，该状态是在检查球是否到达了从左到右横跨地板、放置着球瓶的“球瓶线”。如果到达了，则转换到`StateRolledPast`状态。\n\
    \n实际上，我们在绘制有限状态机时并没有考虑加入`StateGutterBall`和`StateRolledPast`，但这没什么大不了的。现在，你可以直接插入这些状态，替换掉之前从`StateRolling`到`StateRollOver`的直接转换。\n\
    \n**StateRolledPast**\n\n当球滚得足够远并到达球瓶时，会进入`StateRolledPast`状态（代码清单 8-22）。该状态通过禁用球和主摄像机的控制来“放开”球。\n\
    \n代码清单 8-22  FuguBowl.js 中球到达球瓶时进入的状态\n\n```javascript\nfunction StateRolledPast()\
    \ {\n       var follow:Behaviour = Camera.main.GetComponent(\"SmoothFollow\");\n\
    \       if (follow != null) {\n              follow.enabled = false;\n       }\n\
    \       ball.GetComponent(FuguForce).enabled = false;\n       yield WaitForSeconds(5);\n\
    \       state = \"StateRollOver\";\n}\n```\n\n为了禁用主摄像机的`SmoothFollow`脚本，该状态通过`Camera`类中的静态变量`main`访问主摄像机，并在该`GameObject`上调用`GetComponent`，传入`SmoothFollow`作为要获取的组件的类名。这将返回附加到主摄像机上的`SmoothFollow`脚本。然后，该脚本被赋值给一个名为`follow`的局部变量。\n\
    \n`follow`变量被声明为`Behaviour`类型，它是`Component`的直接子类。`Behaviour`可以通过设置其`enabled`变量来启用或禁用。`follow`本可以声明为更具体的类，比如`MonoBehaviour`（`Behaviour`的子类，也是任何可附加到`GameObject`的脚本的父类）甚至`SmoothFollow`（`SmoothFollow`脚本的最具体类），因为所有这些类都从`Behaviour`继承了`enabled`变量。但是，选择最适合的最通用类可以提供最大的灵活性。例如，如果你将`follow`声明为`SmoothFollow`类型，而后又决定使用不同的摄像机控制脚本，你就必须调整`follow`的类型声明。\n\
    \n**提示**   对于类型声明，请使用实现了你所需函数和变量的最通用类。\n\n不将`follow`声明为`SmoothFollow`类型的另一个原因是，在`http://learnunity4.com/`上可用的本项目版本不包含任何资源商店或标准资源包，包括`SmoothFollow`脚本。在项目中引用不存在的`SmoothFollow`类会导致编译器错误。\n\
    \n这就是为什么将`\"SmoothFollow\"`作为字符串传递给`GetComponent`的原因，这样直到运行时调用`GetComponent`时才用它来查找类，此时`GetComponent`会返回`null`。试图访问`null`上的`enabled`变量会导致错误，因此该状态首先检查`follow`是否为`null`，然后再尝试禁用它。附加在球上的`FuguForce`脚本以类似的方式禁用，通过在球上调用`GetComponent`来获取`FuguForce`脚本，然后将其`enabled`变量设置为`false`。但是，与主摄像机和`SmoothFollow`脚本不同，因为我们确信球上附加了`FuguForce`脚本，所以在禁用该脚本之前无需进行空值检查测试。\n\
    \n此外，`GetComponent`是一个重载函数，一个版本接受`String`参数，另一个版本直接接受类。因此，不是将`\"FuguForce\"`传递给`GetComponent`，而是直接传递类`FuguForce`。这样，如果类名拼写错误（例如`GetComponent(FuguFource)`），就会产生编译器错误。\n\
    \n传入拼写错误的类名`String`（例如`GetComponent(\"FuguFource\")`），在编译时不会导致错误，这乍听起来是件好事，但最好能尽早发现问题。在运行时，对`GetComponent`的调用会返回`null`，如果代码期望非`null`结果，则可能导致崩溃；或者只会产生令人恼火的调试过程，因为你不知道为什么那个脚本没有按预期被禁用。\n\
    \n**提示**   尽可能让编译器帮你做错误检查。\n\n在某个时刻，`SmoothFollow`和`FuguForce`脚本必须重新启用。自然的位置是在`ResetCamera`和`ResetBall`函数（代码清单\
    \ 8-23）中，因为当一轮投球结束，主摄像机和球分别被重置以开始下一轮投球时，会调用这些函数。\n\n代码清单 8-23  FuguBowl.js 中的\
    \ ResetBall 和 ResetCamera 函数\n\n```javascript\nfunction ResetBall() {\n      \
    \ ball.GetComponent(FuguForce).enabled = true;\n       ball.SendMessage(\"ResetPosition\"\
    );\n}\nfunction ResetCamera() {\n       var follow:Behaviour = Camera.main.GetComponent(\"\
    SmoothFollow\");\n       if (follow != null) {\n              follow.enabled =\
    \ true;\n       }\n       Camera.main.SendMessage(\"ResetPosition\");\n}\n```\n\
    \n在`ResetBall`和`ResetCamera`函数中，启用脚本组件的代码与禁用脚本的代码相同，只是将`enabled`变量设置为`true`。\n"
- fmt: "# After disabling both the `FuguForce` and `SmoothFollow` scripts\n\n`StateRolledPast`\
    \ waits five seconds before transitioning to the next state, `StateRollOver`,\
    \ allowing time for the Ball to roll into the pins (or past the pins). A `while`\
    \ loop that calls `yield` until the desired amount of time has passed (by checking\
    \ `Time.time`) would do the trick, but it’s much more convenient to call `yield`\
    \ on the function `WaitForSeconds`, which takes a number of seconds as an argument\
    \ (in `StateRolledPast`, the number of seconds is hardcoded to 5, but it could\
    \ easily be a public variable to allow customization). As a result, the coroutine\
    \ `StateRolledPast` will essentially pause (without blocking execution in the\
    \ rest of Unity) until the given time has elapsed.\n\n## `StateGutterBall`\n\n\
    The gutter ball state is a lot simpler than `StateRolledPast`. It just transitions\
    \ directly to `StateRollOver` ([Listing 8-24](#9781430248750_Ch08.xhtml#list24)).\n\
    \n[Listing 8-24.](#9781430248750_Ch08.xhtml#_list24)  The State for a Gutter Ball\
    \ in FuguBowl.js\n\n```\nfunction StateGutterBall() {\n       state = \"StateRollOver\"\
    ;\n}\n```\n\nAlthough it seems `StateRolling` could transition directly to `StateRollOver`\
    \ instead of passing through `StateGutterBall`, inclusion of `StateGutterBall`\
    \ provides some symmetry with `StateRolledPast`. And in a polished bowling game,\
    \ you would most likely implement some kind of feedback that you rolled a gutter\
    \ ball. For example, in HyperBowl, animated letters spelling out “Gutter” fly\
    \ across the screen ([Figure 8-7](#9781430248750_Ch08.xhtml#Fig7)), and this animation\
    \ takes place in `StateGutterBall`.\n\n![9781430248750_Fig08-07.jpg](images/9781430248750_Fig08-07.jpg)\n\
    \n[Figure 8-7](#9781430248750_Ch08.xhtml#_Fig7). Animated text for a gutter ball\
    \ in HyperBowl\n\nThose letters are animated with iTween, by the way. You aren’t\
    \ limited to visual feedback either. In my Fugu Bowl app on the App Store, `StateGutterBall`\
    \ plays the sound of kids booing!\n\n## `StateRollOver`\n\nWhen the roll of the\
    \ ball is deemed complete (the Ball has guttered by rolling off the Floor or has\
    \ reached the pin line), the FSM enters `StateRollOver` ([Listing 8-25](#9781430248750_Ch08.xhtml#list25)),\
    \ which wraps up the current roll by figuring out what was scored.\n\n[Listing\
    \ 8-25.](#9781430248750_Ch08.xhtml#_list25)  The State for the End of a Roll in\
    \ FuguBowl.js\n\n```\nfunction StateRollOver() {\n       var pinsDown:int = GetPinsDown();\n\
    \       switch (roll) {\n              case Roll.Ball1: player.SetBall1Score(frame,pinsDown);\
    \ break;\n              case Roll.Ball2: player.SetBall2Score(frame,pinsDown);\
    \ break;\n              case Roll.Ball3: player.SetBall3Score(frame,pinsDown);\
    \ break;\n       }\n       if (roll == Roll.Ball1 && player.IsStrike(frame)) {\n\
    \              state = \"StateStrike\";\n              return;\n       }\n   \
    \    if (roll == Roll.Ball2 && player.IsSpare(frame)) {\n              state =\
    \ \"StateSpare\";\n              return;\n       }\n       state = \"StateKnockedSomeDown\"\
    ;\n}\n```\n\nThis state first ascertains how many pins are down by calling the\
    \ `GetPinsDown` function. That number is passed to the appropriate `FuguBowlPlayer`\
    \ scoring function, based on whether this is the first, second or third ball,\
    \ so the score for this roll is recorded. The next state depends on the result\
    \ of the roll, whether it was a strike (which can only happen on the first ball),\
    \ a spare (which can only happen on the second ball), or any other result (`StateKnockedSomeDown`\
    \ isn’t a great name, considering we might have knocked down zero pins, but I\
    \ like it better than `StateNotSpareOrStrike`).\n\n## `StateSpare`, `StateStrike`,\
    \ and `StateKnockedSomeDown`\n\nLike the gutter ball state, the states for bowling\
    \ a strike, a spare, and anything else have no actions except for transitioning\
    \ to the next state ([Listing 8-26](#9781430248750_Ch08.xhtml#list26)).\n\n[Listing\
    \ 8-26.](#9781430248750_Ch08.xhtml#_list26)  `StateSpare`, `StateStrike`, and\
    \ `StateKnockedSomeDown` in FuguBowl.js\n\n```\nfunction StateSpare() {\n    \
    \   state=\"StateNextBall\";\n}\n\nfunction StateStrike() {\n       state = \"\
    StateNextBall\";\n}\n\nfunction StateKnockedSomeDown() {\n       state=\"StateNextBall\"\
    ;\n}\n```\n\nAll three of these states transition to `StateNextBall`, so it’s\
    \ tempting to consider these states redundant and remove them entirely. But for\
    \ a complete bowling game you might initiate some kind of feedback in each of\
    \ these states, like congratulatory audio and graphics for bowling a strike. I\
    \ mentioned that Fugu Bowl on the App Store emits a booing sound during a gutter\
    \ ball. The same app utters a cheer when a strike is bowled, and this happens\
    \ in `StateStrike`. And HyperBowl displays animated “SPARE” and “STRIKE” text\
    \ in `StateSpare` and `StateStrike`, respectively.\n\n## `StateNextBall`\n\n`StateNextBall`\
    \ is the most complicated state so far ([Listing 8-27](#9781430248750_Ch08.xhtml#list27)),\
    \ because most of the bowling rules kick in here. This is where you must decide\
    \ whether you’re rolling another ball in this frame or advancing to the next frame.\n\
    \n[Listing 8-27.](#9781430248750_Ch08.xhtml#_list27)  The State for Transitioning\
    \ to the Next Ball in FuguBowl.js\n\n```\nfunction StateNextBall() {\n       if\
    \ (frame == 9) { // last frame\n              switch (roll) {\n              \
    \        case Roll.Ball1: // always has a second roll\n                      \
    \ state = \"StateBall2\";\n                       break;\n                   \
    \   case Roll.Ball2: // bonus roll if we got a spare or strike\n             \
    \                 if (player.IsSpare(frame) || player.IsStrike(frame)) {\n   \
    \                                  state = \"StateBall3\";\n                 \
    \             }  else {\n                                     state = \"StateGameOver\"\
    ;\n                              }\n                              break;\n   \
    \                   case Roll.Ball3:\n                              state = \"\
    StateGameOver\";\n                              break;\n              }\n    \
    \          // all other frames\n       }  else if (roll == Roll.Ball1 && !player.IsStrike(frame))\
    \ {\n                              state = \"StateBall2\";\n                 \
    \     }  else {\n                              ++frame;\n                    \
    \          state = \"StateBall1\";\n                      }\n       }\n```\n\n\
    The tenth frame in particular is complex, because you have to check for the end\
    \ of the game and could potentially have three rolls. So let’s first look at the\
    \ bottom portion of the code, which applies to the first nine frames. If you just\
    \ finished rolling `Ball1` and didn’t get a strike, then the next state is `StateBall2`.\
    \ Otherwise, you must have rolled `Ball2` or got a strike, so either way, the\
    \ next state is `StateBall1`, and you increment your frame index. In the tenth\
    \ frame, you always roll at least twice, so if you just rolled `Ball1`, you set\
    \ the next state to `StateBall2`. If you just rolled `Ball2`, and the result is\
    \ a spare or strike, then you set the next state to `StateBall3`, otherwise you\
    \ go to the game-over state. And of course if you just rolled `Ball3`, that’s\
    \ the last possible roll, and you go to the game-over state.\n\n## `StateGameOver`\n\
    \nFinally, you’re reached the end-of-game state, `StateGameOver` ([Listing 8-28](#9781430248750_Ch08.xhtml#list28)).\n\
    \n[Listing 8-28.](#9781430248750_Ch08.xhtml#_list28)  The Game Over State in FuguBowl.js\n\
    \n```\nfunction StateGameOver() {\n       Debug.Log(\"Final Score: \"+player.GetScore(9));\n\
    \       state=\"StateNewGame\";\n}\n```\n\nIn lieu of a fancy user interface (the\
    \ UnityGUI system will be introduced in the next chapter), let’s take the opportunity\
    \ to print out the final score in the Console View using the function `Debug.Log`.\
    \ The final score is retrieved by calling the `FuguBowlPlayer` function `GetScore`\
    \ with the array index 9, which indicates you want the total score tallied in\
    \ the tenth frame."
  raw: 'After disabling both the `FuguForce` and `SmoothFollow` scripts, `StateRolledPast`
    waits five seconds before transitioning to the next state, `StateRollOver`, allowing
    time for the Ball to roll into the pins (or past the pins). A `while` loop that
    calls `yield` until the desired amount of time has passed (by checking `Time.time`)
    would do the trick, but it’s much more convenient to call `yield` on the function
    `WaitForSeconds`, which takes a number of seconds as an argument (in `StateRolledPast`,
    the number of seconds is hardcoded to 5, but it could easily be a public variable
    to allow customization). As a result, the coroutine `StateRolledPast` will essentially
    pause (without blocking execution in the rest of Unity) until the given time has
    elapsed.


    StateGutterBall


    The gutter ball state is a lot simpler than `StateRolledPast`. It just transitions
    directly to `StateRollOver` ([Listing 8-24](#9781430248750_Ch08.xhtml#list24)).


    [Listing 8-24.](#9781430248750_Ch08.xhtml#_list24)  The State for a Gutter Ball
    in FuguBowl.js


    ```

    function StateGutterBall() {

           state = "StateRollOver";

    }

    ```


    Although it seems `StateRolling` could transition directly to `StateRollOver`
    instead of passing through `StateGutterBall`, inclusion of StateGutterBall provides
    some symmetry with `StateRolledPast`. And in a polished bowling game, you would
    most likely implement some kind of feedback that you rolled a gutter ball. For
    example, in HyperBowl, animated letters spelling out “Gutter” fly across the screen
    ([Figure 8-7](#9781430248750_Ch08.xhtml#Fig7)), and this animation takes place
    in `StateGutterBall`.


    ![9781430248750_Fig08-07.jpg](images/9781430248750_Fig08-07.jpg)


    [Figure 8-7](#9781430248750_Ch08.xhtml#_Fig7). Animated text for a gutter ball
    in HyperBowl


    Those letters are animated with iTween, by the way. You aren’t limited to visual
    feedback either. In my Fugu Bowl app on the App Store, `StateGutterBall` plays
    the sound of kids booing!


    StateRollOver


    When the roll of the ball is deemed complete (the Ball has guttered by rolling
    off the Floor or has reached the pin line), the FSM enters `StateRollOver` ([Listing
    8-25](#9781430248750_Ch08.xhtml#list25)), which wraps up the current roll by figuring
    out what was scored.


    [Listing 8-25.](#9781430248750_Ch08.xhtml#_list25)  The State for the End of a
    Roll in FuguBowl.js


    ```

    function StateRollOver() {

           var pinsDown:int = GetPinsDown();

           switch (roll) {

                  case Roll.Ball1: player.SetBall1Score(frame,pinsDown); break;

                  case Roll.Ball2: player.SetBall2Score(frame,pinsDown); break;

                  case Roll.Ball3: player.SetBall3Score(frame,pinsDown); break;

           }

           if (roll == Roll.Ball1 && player.IsStrike(frame)) {

                  state = "StateStrike";

                  return;

           }

           if (roll == Roll.Ball2 && player.IsSpare(frame)) {

                  state = "StateSpare";

                  return;

           }

           state = "StateKnockedSomeDown";

    }

    ```


    This state first ascertains how many pins are down by calling the `GetPinsDown`
    function. That number is passed to the appropriate `FuguBowlPlayer` scoring function,
    based on whether this is the first, second or third ball, so the score for this
    roll is recorded. The next state depends on the result of the roll, whether it
    was a strike (which can only happen on the first ball), a spare (which can only
    happen on the second ball), or any other result (`StateKnockedSomeDown` isn’t
    a great name, considering we might have knocked down zero pins, but I like it
    better than `StateNotSpareOrStrike`).


    StateSpare, StateStrike, and StateKnockedSomeDown


    Like the gutter ball state, the states for bowling a strike, a spare, and anything
    else have no actions except for transitioning to the next state ([Listing 8-26](#9781430248750_Ch08.xhtml#list26)).


    [Listing 8-26.](#9781430248750_Ch08.xhtml#_list26)  StateSpare, StateStrike, and
    StateKnockedSomeDown in FuguBowl.js


    ```

    function StateSpare() {

           state="StateNextBall";

    }


    function StateStrike() {

           state = "StateNextBall";

    }


    function StateKnockedSomeDown() {

           state="StateNextBall";

    }

    ```


    All three of these states transition to `StateNextBall`, so it’s tempting to consider
    these states redundant and remove them entirely. But for a complete bowling game
    you might initiate some kind of feedback in each of these states, like congratulatory
    audio and graphics for bowling a strike. I mentioned that Fugu Bowl on the App
    Store emits a booing sound during a gutter ball. The same app utters a cheer when
    a strike is bowled, and this happens in `StateStrike`. And HyperBowl displays
    animated “SPARE” and “STRIKE” text in `StateSpare` and `StateStrike`, respectively.


    StateNextBall


    `StateNextBall` is the most complicated state so far ([Listing 8-27](#9781430248750_Ch08.xhtml#list27)),
    because most of the bowling rules kick in here. This is where you must decide
    whether you’re rolling another ball in this frame or advancing to the next frame.


    [Listing 8-27.](#9781430248750_Ch08.xhtml#_list27)  The State for Transitioning
    to the Next Ball in FuguBowl.js


    ```

    function StateNextBall() {

           if (frame == 9) { // last frame

                  switch (roll) {

                          case Roll.Ball1: // always has a second roll

                           state = "StateBall2";

                           break;

                          case Roll.Ball2: // bonus roll if we got a spare or strike

                                  if (player.IsSpare(frame) || player.IsStrike(frame))
    {

                                         state = "StateBall3";

                                  }  else {

                                         state = "StateGameOver";

                                  }

                                  break;

                          case Roll.Ball3:

                                  state = "StateGameOver";

                                  break;

                  }

                  // all other frames

           }  else if (roll == Roll.Ball1 && !player.IsStrike(frame)) {

                                  state = "StateBall2";

                          }  else {

                                  ++frame;

                                  state = "StateBall1";

                          }

           }

    ```


    The tenth frame in particular is complex, because you have to check for the end
    of the game and could potentially have three rolls. So let’s first look at the
    bottom portion of the code, which applies to the first nine frames. If you just
    finished rolling `Ball1` and didn’t get a strike, then the next state is `StateBall2`.
    Otherwise, you must have rolled `Ball2` or got a strike, so either way, the next
    state is `StateBall1`, and you increment your frame index. In the tenth frame,
    you always roll at least twice, so if you just rolled `Ball1`, you set the next
    state to `StateBall2`. If you just rolled `Ball2`, and the result is a spare or
    strike, then you set the next state to `StateBall3`, otherwise you go to the game-over
    state. And of course if you just rolled `Ball3`, that’s the last possible roll,
    and you go to the game-over state.


    StateGameOver


    Finally, you’re reached the end-of-game state, `StateGameOver` ([Listing 8-28](#9781430248750_Ch08.xhtml#list28)).


    [Listing 8-28.](#9781430248750_Ch08.xhtml#_list28)  The Game Over State in FuguBowl.js


    ```

    function StateGameOver() {

           Debug.Log("Final Score: "+player.GetScore(9));

           state="StateNewGame";

    }

    ```


    In lieu of a fancy user interface (the UnityGUI system will be introduced in the
    next chapter), let’s take the opportunity to print out the final score in the
    Console View using the function `Debug.Log`. The final score is retrieved by calling
    the `FuguBowlPlayer` function `GetScore` with the array index 9, which indicates
    you want the total score tallied in the tenth frame.'
  trans: "\n# 禁用 `FuguForce` 和 `SmoothFollow` 脚本后\n\n`StateRolledPast` 会等待五秒钟，然后转换到下一个状态\
    \ `StateRollOver`，以便让球有时间滚入球瓶（或滚过球瓶）。用一个调用 `yield` 的 `while` 循环，通过检查 `Time.time`\
    \ 来等待所需时间过去，可以实现这一效果，但更方便的做法是在函数 `WaitForSeconds` 上调用 `yield`，该函数以秒数作为参数（在 `StateRolledPast`\
    \ 中，秒数被硬编码为 5，但可以轻松改为公共变量以实现自定义）。因此，协程 `StateRolledPast` 实际上会暂停（不会阻塞 Unity 其他部分的执行），直到指定的时间过去。\n\
    \n## `StateGutterBall`\n\n洗沟球状态比 `StateRolledPast` 简单得多。它直接转换到 `StateRollOver`（清单\
    \ 8-24）。\n\n清单 8-24.  FuguBowl.js 中洗沟球的状态\n\n```\nfunction StateGutterBall() {\n\
    \       state = \"StateRollOver\";\n}\n```\n\n尽管看似 `StateRolling` 可以直接转换到 `StateRollOver`\
    \ 而不是经过 `StateGutterBall`，但包含 `StateGutterBall` 为 `StateRolledPast` 提供了一定的对称性。在一个完善的保龄球游戏中，您很可能会实现某种反馈，告诉玩家滚出了洗沟球。例如，在\
    \ HyperBowl 中，动画字母拼出“Gutter”飞过屏幕（图 8-7），这个动画就在 `StateGutterBall` 中发生。\n\n![9781430248750_Fig08-07.jpg](img/9781430248750_Fig08-07.jpg)\n\
    \n图 8-7.  HyperBowl 中洗沟球的动画文本\n\n顺便提一下，这些字母是用 iTween 制作动画的。您也不仅限于视觉反馈。在我上架 App\
    \ Store 的 Fugu Bowl 应用中，`StateGutterBall` 会播放孩子们的嘘声！\n\n## `StateRollOver`\n\n\
    当球的滚动被认为结束时（球滚离地板形成洗沟，或到达球瓶线），FSM 进入 `StateRollOver`（清单 8-25），通过计算得分来结束当前这一投。\n\
    \n清单 8-25.  FuguBowl.js 中一投结束的状态\n\n```\nfunction StateRollOver() {\n       var\
    \ pinsDown:int = GetPinsDown();\n       switch (roll) {\n              case Roll.Ball1:\
    \ player.SetBall1Score(frame,pinsDown); break;\n              case Roll.Ball2:\
    \ player.SetBall2Score(frame,pinsDown); break;\n              case Roll.Ball3:\
    \ player.SetBall3Score(frame,pinsDown); break;\n       }\n       if (roll == Roll.Ball1\
    \ && player.IsStrike(frame)) {\n              state = \"StateStrike\";\n     \
    \         return;\n       }\n       if (roll == Roll.Ball2 && player.IsSpare(frame))\
    \ {\n              state = \"StateSpare\";\n              return;\n       }\n\
    \       state = \"StateKnockedSomeDown\";\n}\n```\n\n这个状态首先通过调用 `GetPinsDown`\
    \ 函数确定有多少球瓶倒下。然后根据这是第一次、第二次还是第三次投球，将该数字传递给相应的 `FuguBowlPlayer` 计分函数，以记录此投的得分。下一个状态取决于投球结果：是全中（只能发生在第一次投球）、补中（只能发生在第二次投球），还是其他结果（`StateKnockedSomeDown`\
    \ 这个名字不算完美，考虑到可能一球未中，但我认为它比 `StateNotSpareOrStrike` 更好）。\n\n## `StateSpare`、`StateStrike`\
    \ 和 `StateKnockedSomeDown`\n\n与洗沟球状态类似，全中、补中以及其他结果的状态除了转换到下一个状态外，没有其他动作（清单 8-26）。\n\
    \n清单 8-26.  FuguBowl.js 中的 `StateSpare`、`StateStrike` 和 `StateKnockedSomeDown`\n\
    \n```\nfunction StateSpare() {\n       state=\"StateNextBall\";\n}\n\nfunction\
    \ StateStrike() {\n       state = \"StateNextBall\";\n}\n\nfunction StateKnockedSomeDown()\
    \ {\n       state=\"StateNextBall\";\n}\n```\n\n这三个状态都转换到 `StateNextBall`，因此很容易让人觉得这些状态多余，可以完全移除。但对于一个完整的保龄球游戏，您可能会在每个状态中触发某种反馈，比如全中时的祝贺音效和图形。我提到过，App\
    \ Store 上的 Fugu Bowl 在洗沟球时会发出嘘声。同一个应用在全中时会发出欢呼声，这发生在 `StateStrike` 中。而 HyperBowl\
    \ 则在 `StateSpare` 和 `StateStrike` 中分别显示动画文本“SPARE”和“STRIKE”。\n\n## `StateNextBall`\n\
    \n`StateNextBall` 是目前为止最复杂的状态（清单 8-27），因为大多数保龄球规则都在这里生效。在这里，您必须决定是在当前格继续投下一球，还是前进到下一格。\n\
    \n清单 8-27.  FuguBowl.js 中转换到下一投的状态\n\n```\nfunction StateNextBall() {\n      \
    \ if (frame == 9) { // 最后一格\n              switch (roll) {\n                 \
    \     case Roll.Ball1: // 始终有第二次投球\n                       state = \"StateBall2\"\
    ;\n                       break;\n                      case Roll.Ball2: // 如果补中或全中，则有奖励投球\n\
    \                              if (player.IsSpare(frame) || player.IsStrike(frame))\
    \ {\n                                     state = \"StateBall3\";\n          \
    \                    }  else {\n                                     state = \"\
    StateGameOver\";\n                              }\n                          \
    \    break;\n                      case Roll.Ball3:\n                        \
    \      state = \"StateGameOver\";\n                              break;\n    \
    \          }\n              // 所有其他格\n       }  else if (roll == Roll.Ball1 &&\
    \ !player.IsStrike(frame)) {\n                              state = \"StateBall2\"\
    ;\n                      }  else {\n                              ++frame;\n \
    \                             state = \"StateBall1\";\n                      }\n\
    \       }\n```\n\n特别是第十格很复杂，因为您需要检查游戏是否结束，并且可能有三投。所以让我们先看代码的底部部分，它适用于前九格。如果您刚完成\
    \ `Ball1` 的投球且没有全中，那么下一个状态是 `StateBall2`。否则，您一定投了 `Ball2` 或得了全中，因此无论哪种情况，下一个状态都是\
    \ `StateBall1`，并且增加格索引。在第十格中，您至少会投两次，所以如果您刚投了 `Ball1`，则将下一个状态设为 `StateBall2`。如果您刚投了\
    \ `Ball2`，并且结果是补中或全中，则将下一个状态设为 `StateBall3`，否则进入游戏结束状态。当然，如果您刚投了 `Ball3`，那是最后一投，您进入游戏结束状态。\n\
    \n## `StateGameOver`\n\n最后，您到达了游戏结束状态 `StateGameOver`（清单 8-28）。\n\n清单 8-28.  FuguBowl.js\
    \ 中的游戏结束状态\n\n```\nfunction StateGameOver() {\n       Debug.Log(\"Final Score:\
    \ \"+player.GetScore(9));\n       state=\"StateNewGame\";\n}\n```\n\n代替花哨的用户界面（UnityGUI\
    \ 系统将在下一章介绍），让我们借此机会使用函数 `Debug.Log` 在控制台视图中打印出最终得分。最终得分通过调用 `FuguBowlPlayer`\
    \ 函数 `GetScore` 并传入数组索引 9 来获取，这表示您想要第十格中计算的总分。\n"
- fmt: "# Chapter 9\n\n## The Game GUI\n\nOver the past several chapters, we’ve put\
    \ together a fairly complete bowling game with 3D graphics, physics, sound, player\
    \ controls, and automatic camera movement. The game has almost every category\
    \ of feature expected in a 3D game except for one: a graphical user interface\
    \ (GUI). In particular, the bowling game should have a scoreboard, and games usually\
    \ have a menu that shows up at the beginning of the game and when the game is\
    \ paused.\n\n**Tip**   I have had an iOS game rejected by Apple for not having\
    \ a pause menu, so I do recommend including one, if only for that reason.\n\n\
    In this chapter, we’ll implement both a scoreboard and start/pause menu with Unity’s\
    \ built-in GUI system, known as UnityGUI (you can tell how long a Unity feature\
    \ has been around by the coolness of its name—more recent features have names\
    \ like Shuriken, Mecanim, and Beast).\n\nThe scoreboard and pause menu scripts\
    \ are available in the project for this chapter on `http://learnunity4.com/`,\
    \ but, to iterate a point ad nauseam, entering the code line by line and function\
    \ by function provides the best learning experience!\n\n## The Scoreboard\n\n\
    In a complete bowling game, this is the place to put up a “Game Over” message,\
    \ submit the score to a leaderboard, and any other action appropriate at the end\
    \ of a game (in HyperBowl, the `Application.LoadLevel` function is called to switch\
    \ to a scene displaying the score and present a trophy). But for now, let’s just\
    \ transition back to `StateNewGame` and start a new game.\n\n### The Complete\
    \ Listing\n\nThe overhauled `FuguBowl` script is much larger even than the `FuguBowlPlayer`\
    \ script, so the entire listing for `FuguBowl.js` isn’t shown here. The complete\
    \ script is available on `http://learnunity4.com/` and all its contents have been\
    \ presented in this section, piece by piece (or mostly, state by state).\n\n###\
    \ Explore Further\n\nThis chapter was a change of pace, concentrating solely on\
    \ scripting. Most of that scripting was added to the game controller script, `FuguBowl.js`,\
    \ in the form of a state machine, but scoring code was incorporated in a new script,\
    \ `FuguBowlPlayer.js`.\n\nIf you’re tired of writing big chunks of code and long\
    \ for the little script snippets that we started with, you just have to endure\
    \ writing one more big script in the next chapter, for the user interface. And,\
    \ as a counterpart for the scoring code added in this chapter, the next one includes\
    \ a small additional script to display a scoreboard.\n\n### Unity Manual\n\nState\
    \ machines are useful not only for game control logic but also for anything that\
    \ can be represented as going through different states (simple examples: a light\
    \ is on or off, a weapon is locked and loaded, a door is open or closed). State\
    \ machines are particularly useful for animation (walking, running, throwing)\
    \ which is why the new Mecanim animation system does have its own FSM capability.\
    \ This is described in the Unity Manual, under “The Mecanim Animation System”\
    \ section, in “Animation State Machines.”\n\n### Scripting Reference\n\nThe major\
    \ scripting technique introduced in this chapter was the use of coroutines, specifically\
    \ to implement an FSM in the `FuguBowl` script. The “Scripting Overview” section\
    \ of the Scripting Reference has a page on “Coroutines and Yield,” that provides\
    \ a basic explanation and some examples.\n\nThe classes related to coroutines\
    \ include `Coroutine` and `WaitForSeconds` (both of them inherit from `YieldInstruction`).\
    \ The one function we used is the `StartCoroutine` function of `MonoBehaviour`.\
    \ The documentation page for each `MonoBehaviour` callback specifies whether the\
    \ callback can be used as a coroutine (as we saw, `Start` can, but `Awake`, `Update`,\
    \ and `FixedUpdate` cannot).\n\nThe added code in the `FuguBowl` script also had\
    \ frequent cause to access Components, so the page on “Accessing Components” is\
    \ relevant. That page lists the `Component` and `GameObject` variables that can\
    \ be used to access commonly attached Components and also provides examples on\
    \ how to call the function `GetComponent` (either on a `Component` or a `GameObject`)\
    \ to access Components, including scripts.\n\n### Asset Store\n\nSeveral more\
    \ sophisticated FSM frameworks are available on the Asset Store. A search for\
    \ “fsm” in the Asset Store window brings up several, including a popular visual\
    \ programming package called Playmaker, developed by Huton Games at `http://hutongames.com/`.\n\
    \n### On the Web\n\nWikipedia (`http://wikipedia.org/`) has an extensive description\
    \ of bowling and its scoring rules. Just search for “bowling” on the site. And\
    \ if you search for “state machine” you’ll find an article that explains probably\
    \ more than you’ll ever want to know about FSM’s!\n\nI mentioned some game engines\
    \ have FSM’s built into their scripting system. It’s interesting to compare them\
    \ and see how FSM’s are implemented in those systems. For example, CryEngine has\
    \ a state-switching mechanism built into its Lua scripts. Visit the CryEngine\
    \ 3 Free SDK site (`http://freesdk.dev.net/`) and search for “state” to find an\
    \ article on “Entity States.”\n\nI worked on a CryEngine-based virtual world called\
    \ Blue Mars, which heavily utilized that FSM support. Visit the Blue Mars wiki\
    \ (`http://create.bluemars.com/`) and search for “entity script” to see the introductory\
    \ examples (I actually started that wiki entry five years ago!)\n\nAnd even the\
    \ most well-known virtual world, Second Life, has FSM support. Search for “state”\
    \ on the Second Life wiki (`http://wiki.secondlife.com`) to see how states are\
    \ defined using the Linden Scripting Language (LSL).\n\n## The Scoreboard\n\n\
    Let’s start off with the scoreboard because it’s a simpler case than the menu.\
    \ The scoreboard only needs to display, with no interaction required. As described\
    \ in the previous chapter, a typical bowling scoreboard will show the results\
    \ for each frame (i.e., the first and second ball, and possibly third, in the\
    \ tenth frame), and also the total score up to that frame. We won’t do anything\
    \ fancy here, just display the scores with text by drawing the scoreboard as a\
    \ sequence of labels, with each label displaying the score for that frame as text.\n\
    \n### Create the Script\n\nLet’s get started by creating a `GameObject` with a\
    \ scoreboard script attached (this should be a familiar process by now). In the\
    \ Project View, create a new JavaScript in the Scripts folder and name it `FuguBowlScoreboard`\
    \ ([Figure 9-1](#9781430248750_Ch09.xhtml#Fig1)).\n\n![9781430248750_Fig09-01.jpg](images/9781430248750_Fig09-01.jpg)\n\
    \n[Figure 9-1](#9781430248750_Ch09.xhtml#_Fig1). Creating the FuguBowlScoreboard\
    \ script\n\nNext, create a new `GameObject` in the Hierarchy View, name it Scoreboard,\
    \ and attach the `FuguBowlScoreboard` script to it.\n\nNow you’re ready to add\
    \ UnityGUI code to the `FuguBowlScoreboard` script. If you’ve developed user interfaces\
    \ with other GUI systems, you’ll probably find UnityGUI a bit unusual. Instead\
    \ of creating and placing GUI objects that have callbacks responding to events\
    \ like button clicks, UnityGUI Controls are created inside `OnGUI` callback functions,\
    \ which are called every frame (actually a few times a frame). To demonstrate\
    \ quickly how UnityGUI works, place the contents of [Listing 9-1](#9781430248750_Ch09.xhtml#list1)\
    \ in the `FuguBowlScoreboard` script.\n\n[Listing 9-1](#9781430248750_Ch09.xhtml#_list1).\
    \  Testing a Simple UnityGUI Label in FuguBowlScoreboard.js\n\n```\n#pragma strict\n\
    \nfunction OnGUI() {\n    GUI.Label(Rect(5,100,200,20),\"This is a label\");\n\
    }\n```"
