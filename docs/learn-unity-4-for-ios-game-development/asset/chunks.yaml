    the local y axis 1 multiple of 360 degrees over 2 seconds, eases in as the target
    rotation is achieved, and eases back out as the rotation bounces back in the other
    direction.


    Also, use `/*` and `*/` to comment out the `Update` function so you don’t have
    two pieces of rotation code fighting for control.


    [Listing 4-10.](#9781430248750_Ch04.xhtml#_list10)  FuguRotate.js with iTween
    Called in the Start Function


    ```

    #pragma strict

    var speed:float = 10.0; // controls how fast we rotate


    function Start () {

            var object:GameObject = this.gameObject;

            Debug.Log("Start called on GameObject "+object.name);

            iTween.RotateBy(gameObject, iTween.Hash("y", 1, "time", 2, "easeType",
    "easeInOutBack", "loopType", "pingPong"));

    }


    // rotate around the object''s y axis

    /*

    function Update () {

            //Debug.Log("Update called at time "+Time.time);

            transform.Rotate(Vector3.up*speed*Time.deltaTime);

    }

    */

    ```


    Children of the Cube


    A scene with just one cube is not very interesting, so let’s make it slightly
    more interesting by adding more cubes. You could repeatedly create new cubes in
    the same manner as the first one. Or you could save some time by duplicating the
    existing Cube (select the Cube and then invoke the Duplicate command on the Edit
    menu or use the Command+D keyboard shortcut). But let’s take this opportunity
    to learn about prefabs.


    Making Prefabs


    A *prefab* is a special type of asset created for cloning a GameObject. The prefab
    can then be used to create identical copies of that GameObject. In that sense,
    Unity prefabs are like prefabricated housing, but better. If you make a change
    to one instance of a prefab, you can have that change automatically propagate
    to all other instances of the prefab.


    First, in keeping with our asset organization, create a new folder in the Project
    View named Prefabs. Then, with the Prefabs folder selected, click Prefab on the
    Create menu in the Project View to create an empty prefab in that folder. You
    can then fill out the prefab by dragging the Cube from the Hierarchy View onto
    the empty prefab.


    Alternatively, instead of starting with an empty prefab, you can just drag the
    Cube directly into the Prefabs folder, and a prefab will automatically be created
    and named after the original GameObject ([Figure 4-27](#9781430248750_Ch04.xhtml#Fig27)).


    ![9781430248750_Fig04-27.jpg](images/9781430248750_Fig04-27.jpg)


    [Figure 4-27](#9781430248750_Ch04.xhtml#_Fig27). The Project View of the Cube
    prefab


    You can now drag the prefab into the Hierarchy View every time you want to create
    a new cube that looks just like the original Cube GameObject. But instead of having
    multiple independent cubes in the scene, let’s add some cubes as children of the
    existing cube. Drag the prefab directly onto the Cube in the Hierarchy View twice,
    and you’ll now have two new cubes underneath Cube. In the Inspector View ([Figure
    4-28](#9781430248750_Ch04.xhtml#Fig28)), you can see the new cubes are identical
    to Cube, featuring the same Components and Component properties. Let’s name the
    new cubes child1 and child2 (by the way, this is a good time try out the Lock
    feature of the Inspector View, so you can inspect two GameObjects at the same
    time).'
  trans: "\n清单 4-8.  `Transform.Rotate` 中以 `Vector3` 形式指定旋转角度的版本\n\n```\nfunction\
    \ Update () {\n        transform.Rotate(Vector3(0,speed*Time.deltaTime,0));\n\
    }\n```\n\n尽管向量有精确的数学定义，但 Unity 遵循 3D 应用程序接口中的常见做法，即复用其向量数据结构来表示任何包含 x、y、z 值的内容。例如，如果你阅读脚本参考页面中关于\
    \ `Transform` 的内容（建议阅读），你会看到它的 `position`、`rotation` 和 `scale` 都是 `Vector3` 值。\n\
    \n### 在世界空间中旋转\n\n每个 `Transform.Rotate` 变体也都有一个可选参数，其默认值为 `Space.Self`。这指定了旋转是围绕变换（也就是游戏对象）的局部轴进行的，这些局部轴对应着在场景视图中选定游戏对象时看到的轴手柄。如果指定\
    \ `Space.World`，如清单 4-9 所示，则旋转将围绕世界轴（以 0,0,0 为中心的 x、y、z 轴）进行。\n\n清单 4-9. 围绕世界轴旋转\n\
    \n```\nfunction Update () {\n        transform.Rotate(Vector3.up,speed*Time.deltaTime,Space.World);\n\
    }\n```\n\n### 补间旋转\n\n随时间稳定地改变游戏对象的变换很简单，但对于更复杂的运动，例如在特定时间段内将游戏对象从一个位置平滑地移动到另一个位置，其编码可能会更复杂、工作量更大。这正是\
    \ Flash 程序员使用 ActionScript `Tween` 类来处理的情况。虽然 Unity 没有内置的 `Tween` 类，但有 Flash 背景的\
    \ Unity 用户会高兴地了解到，有多个第三方解决方案可用。\n\n我在 HyperBowl 游戏中使用的补间包叫做 `iTween`。该游戏中有大约 200\
    \ 个 `iTween` 动画。一个使用示例：在投出一次全中后，3D 的 “STRIKE” 文字通过 `iTween` 脚本控制，使得字母逐个滑入屏幕，轻微上下浮动，然后在旋转中飞离屏幕。\n\
    \n方便的是，`iTween` 可以在资源商店中找到。在第 3 章中，我们在资源商店窗口中搜索过资源包，但这次，我们使用项目视图中的搜索功能。在搜索框中输入\
    \ `\"itween\"`，然后点击面包屑导航中的“资源商店”链接。`iTween` 会出现在免费资源结果中（图 4-24）。\n\n![9781430248750_Fig04-24.jpg](img/9781430248750_Fig04-24.jpg)\n\
    \n图 4-24. 在资源商店中搜索 iTween\n\n**提示** 图 4-24 显示了项目视图中的视图菜单，允许在“单列布局”和“双列布局”之间切换。“双列布局”是\
    \ Unity 4 的新功能，但“单列布局”仍然很好用，特别是在项目视图中执行搜索而不是使用左侧面板进行导航时。\n\n在项目视图中选择 `iTween`，该资源包的描述将显示在检视视图中（图\
    \ 4-25），同时还提供导入该资源包或在资源商店窗口中预览完整描述的选项。继续操作，点击“导入资源包”按钮。\n\n![9781430248750_Fig04-25.jpg](img/9781430248750_Fig04-25.jpg)\n\
    \n图 4-25. 资源商店中 iTween 的检视视图\n\n安装完成后，项目视图中显示的 `iTween` 包含示例文件和文档文件，但整个 `iTween`\
    \ 代码库是一个位于 `iTween` ![image](img/arrow.jpg) `Plugins` 文件夹中的单个脚本（图 4-26）。\n\n![9781430248750_Fig04-26.jpg](img/9781430248750_Fig04-26.jpg)\n\
    \n图 4-26. iTween 的项目视图\n\n如图 4-26 所示，`iTween` 是一个 C# 脚本，其文件扩展名为 `.cs`。JavaScript\
    \ 可以调用 C# 脚本中的函数和引用其中的变量，但前提是这些 C# 脚本位于几个指定的特殊文件夹中，这些文件夹会被优先加载。其中之一是 `Assets`\
    \ ![image](img/arrow.jpg) `Plugins` 文件夹，因此你可以直接将 `iTween` ![image](img/arrow.jpg)\
    \ `Plugins` 文件夹向上拖一级，放到 `Assets` 目录下。\n\n为了体验一下 `iTween`，将清单 4-10 中的第三行代码添加到 `FuguRotate`\
    \ 脚本的 `Start` 函数中。这一行代码启动了一个旋转补间，按照从左到右的参数顺序，在 2 秒内围绕局部 y 轴旋转 1 个 360 度的倍数，在达到目标旋转角度时缓动进入，当旋转反向反弹回来时缓动退出。\n\
    \n另外，使用 `/*` 和 `*/` 注释掉 `Update` 函数，这样就不会有两段旋转代码相互争夺控制权。\n\n清单 4-10.  在 Start\
    \ 函数中调用 iTween 的 FuguRotate.js\n\n```\n#pragma strict\nvar speed:float = 10.0;\
    \ // 控制旋转速度\n\nfunction Start () {\n        var object:GameObject = this.gameObject;\n\
    \        Debug.Log(\"Start called on GameObject \"+object.name);\n        iTween.RotateBy(gameObject,\
    \ iTween.Hash(\"y\", 1, \"time\", 2, \"easeType\", \"easeInOutBack\", \"loopType\"\
    , \"pingPong\"));\n}\n\n// 围绕对象的 y 轴旋转\n/*\nfunction Update () {\n        //Debug.Log(\"\
    Update called at time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n*/\n```\n\n### 立方体的子对象\n\n一个场景中只有一个立方体并不有趣，所以让我们通过添加更多立方体来让它稍微有趣一些。你可以像创建第一个立方体那样重复创建新立方体。或者，你也可以通过复制现有立方体来节省时间（选中该立方体，然后在“编辑”菜单上调用“复制”命令，或使用\
    \ `Command+D` 键盘快捷键）。但让我们借此机会了解一下预制件。\n\n### 制作预制件\n\n**预制件**是一种特殊类型的资源，用于克隆游戏对象。随后可以使用该预制件创建该游戏对象的相同副本。从这个意义上说，Unity\
    \ 的预制件就像预制房屋，但更好。如果你对预制件的一个实例进行更改，可以使该更改自动传播到该预制件的所有其他实例。\n\n首先，为了保持资源组织的整洁，在项目视图中创建一个名为\
    \ `Prefabs` 的新文件夹。然后，在选中 `Prefabs` 文件夹的情况下，点击项目视图“创建”菜单中的“预制件”，在该文件夹中创建一个空的预制件。然后，你可以通过将层级视图中的立方体拖到这个空预制件上来填充它。\n\
    \n或者，你也可以不用先创建空预制件，而是直接将立方体拖入 `Prefabs` 文件夹，系统会自动创建一个预制件，并以原始游戏对象的名字命名（图 4-27）。\n\
    \n![9781430248750_Fig04-27.jpg](img/9781430248750_Fig04-27.jpg)\n\n图 4-27. 立方体预制件的项目视图\n\
    \n现在，每当你想要创建一个与原始立方体游戏对象外观完全相同的新立方体时，都可以将该预制件拖入层级视图。但是，与其在场景中放置多个独立的立方体，不如让我们添加一些立方体作为现有立方体的子对象。将预制件直接拖到层级视图中的立方体上两次，现在你会在立方体下方看到两个新的立方体。在检视视图（图\
    \ 4-28）中，你可以看到新立方体与原始立方体完全相同，具有相同的组件和组件属性。让我们将新的立方体命名为 `child1` 和 `child2`（顺便说一下，现在是尝试检视视图“锁定”功能的好时机，这样你可以同时检查两个游戏对象）。\n"
- fmt: "![9781430248750_Fig04-28.jpg](images/9781430248750_Fig04-28.jpg)\n\n[Figure\
    \ 4-28](#9781430248750_Ch04.xhtml#_Fig28). Editing the child cubes\n\nAs children\
    \ of Cube, the positions of `child1` and `child2` displayed in the Inspector View\
    \ are relative to the position of their parent, Cube. Which means if a child cube\
    \ has position `(0,0,0)`, it is in the exact same position as its parent. So let’s\
    \ set the positions of `child1` and `child2` to `(2,0,0)` and `(-2,0,0)`. The\
    \ two child cubes now are spaced out from their parent Cube like satellite cubes\
    \ ([Figure 4-29](#9781430248750_Ch04.xhtml#Fig29)).\n\n![9781430248750_Fig04-29.jpg](images/9781430248750_Fig04-29.jpg)\n\
    \n[Figure 4-29](#9781430248750_Ch04.xhtml#_Fig29). Scene view of the Cube and\
    \ its child cubes\n\nBefore you click Play, change the `FuguRotate` script to\
    \ the simple `transform.Rotate` call ([Listing 4-11](#9781430248750_Ch04.xhtml#list11)).\
    \ Now when you click Play, the main Cube rotates as before, and the child cubes\
    \ follow around like the spokes in a wheel. The child cubes also spin around their\
    \ own axes since they’re running their own copies of the `FuguRotate` script (all\
    \ three cubes would rotate around the same world origin if you had supplied `Space.World`\
    \ in the `Transform.Rotate` call).\n\n[Listing 4-11.](#9781430248750_Ch04.xhtml#_list11)\
    \  FuguRotate.js Reverted to Rotation in Update\n\n```\n#pragma strict\nvar speed:float\
    \ = 10.0; // controls how fast we rotate\n\nfunction Start () {\n        var object:GameObject\
    \ = this.gameObject;\n        Debug.Log(\"Start called on GameObject \"+object.name);\n\
    \        //iTween.RotateBy(gameObject, iTween.Hash(\"y\", 1, \"time\", 2, \"easeType\"\
    , \"easeInOutBack\", \"loopType\", \"pingPong\"));\n}\n\n// rotate around the\
    \ object's y axis\nfunction Update () {\n        //Debug.Log(\"Update called at\
    \ time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n```\n\nChange the `FuguRotate` Speed property for `child2` from 10 to 50, click\
    \ Play, and you will see that cube spins faster than the others. You can easily\
    \ make the same change in `child1`, but imagine if you had 50 cubes to change.\
    \ That would be tedious! This is where the power of prefabs comes in. Select `child2`\
    \ and then invoke Apply Changes To Prefab in the GameObject menu ([Figure 4-30](#9781430248750_Ch04.xhtml#Fig30)).\n\
    \n![9781430248750_Fig04-30.jpg](images/9781430248750_Fig04-30.jpg)\n\n[Figure\
    \ 4-30](#9781430248750_Ch04.xhtml#_Fig30). Applying changes to a prefab\n\nNow\
    \ `child1` is identical to `child2` again (except for the name and position, which\
    \ Unity reasonably assumes you don’t want the same in every instance of the prefab).\
    \ When you click Play, the child cubes are now spinning at the same faster speed.\n\
    \n### Breaking Prefabs\n\nBut the main Cube is also spinning faster due to the\
    \ updated rotation speed. If that isn’t what you intended, you can change the\
    \ Cube’s Speed back to 10, and then to ensure that you don’t propagate changes\
    \ in the child cubes to the main Cube, you can select the main Cube and invoke\
    \ Break Prefab Instance in the GameObject menu ([Figure 4-31](#9781430248750_Ch04.xhtml#Fig31)).\n\
    \n![9781430248750_Fig04-31.jpg](images/9781430248750_Fig04-31.jpg)\n\n[Figure\
    \ 4-31](#9781430248750_Ch04.xhtml#_Fig31). Breaking a Prefab Instance\n\nNow the\
    \ Cube no longer has a relation to the prefab, and any change to the child cubes\
    \ will not be propagated to the Cube.\n\n### Explore Further\n\nThe scene has\
    \ evolved from pretty and static to pretty and dynamic, merely with the addition\
    \ of simple scripted movement. We’ll jazz up the scene some more in the next chapter\
    \ with animation and sound, but the major milestone you’ve reached at this point\
    \ really is learning how to create, edit and debug scripts. From now until the\
    \ end of the book, you’ll be adding scripts, so get used to it!\n\n### Unity Manual\n\
    \nThe “Building Scenes” section of the Unity Manual has two pages relevant to\
    \ the work in this chapter—a description of “Prefabs” and an explanation of the\
    \ “Component-Script Relationship.”\n\nThe one new type of asset introduced in\
    \ this chapter (besides prefabs) is the script. The page in the “Asset Import\
    \ and Creation” section on “Using Scripts” introduces the basic concepts covered\
    \ in our rotation script—creating a script, attaching it to a GameObject, printing\
    \ to the Console View (using the `print` function instead of `Debug.Log` as you\
    \ did), declaring a variable, and even applying a rotation in the `Update` function.\n\
    \nIt’s worth mentioning the page on “Transforms” again, since our rotation script\
    \ is in the business of modifying Transforms. That page also describes the parent–child\
    \ GameObject relationship, which technically is among Transforms, but since there’s\
    \ a one-to-one relationship between GameObjects and Transforms, it’s less confusing\
    \ to think of the linkage among GameObjects, as displayed in the Hierarchy view.\n\
    \nWe dipped into one Advanced topic in this chapter—“Debugging.” This section\
    \ describes the Console View, the MonoDevelop debugger, and where to find Log\
    \ files on your file system.\n\n### Scripting Reference\n\nI’ve mentioned two\
    \ of the three main pieces of official Unity documentation so far—the Unity Manual\
    \ and the Reference Manual. The third piece is the Scripting Reference. This chapter\
    \ presented our first foray into scripting, so everything in the “Scripting Overview”\
    \ section of the Scripting Reference is worth reading at this point. The list\
    \ of “Runtime Classes” illuminates the inheritance relationship among the Unity\
    \ classes. After that, I recommend making frequent use of the search box on that\
    \ page anytime you see anything in a script you don’t recognize (or even if you\
    \ do recognize it, if you haven’t read its documentation).\n\n### Asset Store\n\
    \nWe downloaded iTween from the Asset Store, but iTween users should also visit\
    \ Bob Berkebile’s official iTween web site with comprehensive documentation and\
    \ demo projects on `http://itween.pixelplacement.com/`.\n\nAlthough iTween is\
    \ popular and one of the first tween packages for Unity, at this point several\
    \ tween implementations are available (just search for “tween” in the Asset Store),\
    \ including Holoville’s HOTween, documented and also available on `http://holoville.com/hotween/`,\
    \ and Prime31 Studio’s GOKit, source code available on GitHub, `http://github.com/prime31/GoKit`.\n\
    \n### Scripting\n\nAlthough we’re only working with JavaScript in this book, there’s\
    \ enough JavaScript and C# out in the Unity world that you should get comfortable\
    \ with both. The book *Head First C#* by Andrew Stellman and Jennifer Greene is\
    \ a great visual step-by-step introduction to C#.\n\nAnd since C# was created\
    \ by Microsoft as part of its .NET framework, the official C# documentation and\
    \ other resources can be found by searching for C# on the Microsoft Developer\
    \ Network (MSDN) at `http://msdn.microsoft.com/`.\n\nWhile you’re on MSDN, search\
    \ also for .NET documentation, as the Unity scripting engine is implemented with\
    \ Mono, which is an open source version of .NET. The official Mono web site is\
    \ `http://mono-project.org/`\n\nYou probably don’t need to worry about Boo, the\
    \ other Unity scripting language (I have yet to see a Boo script in the wild),\
    \ but if you’re curious, the official Boo web site is `http://boo.codehaus.org/`.\n\
    \nPut two programmers together in a room, and if there’s anything they’ll fight\
    \ about, it’s coding conventions. My rule of thumb is to go along with the convention\
    \ of the official language and framework that I’m coding in. It’s a dull topic\
    \ with fun names.\n\nFor example, Unity uses a combination of camel case and Pascal\
    \ case in its capitalization rules (or `camelCase` and `PascalCase`, if we apply\
    \ the conventions to themselves). You can look up “camel case” on Wikipedia."
