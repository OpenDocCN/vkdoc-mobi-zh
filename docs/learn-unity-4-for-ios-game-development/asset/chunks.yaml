    \ 3D 游戏都需要某种形式的摄像机移动。在《超级保龄球》中，主摄像机在你滚动时会跟随球，但始终朝向同一方向（朝向球瓶）。实际上，Unity 在标准资源中已经提供了摄像机跟随脚本。该脚本包已在第\
    \ 3 章中从标准资源导入，以获取 `MouseOrbit` 脚本。跟随脚本也位于脚本包的 Camera Scripts 文件夹中，名为 `SmoothFollow`（图\
    \ 6-30）。\n\n![9781430248750_Fig06-30.jpg](img/9781430248750_Fig06-30.jpg)\n\n\
    图 6-30. 标准资源中的摄像机脚本\n\n将 `SmoothFollow` 脚本从项目视图拖拽到层级视图中的主摄像机上。然后在层级视图中选择主摄像机，这样你就可以在检视视图中编辑\
    \ `SmoothFollow` 脚本的属性（图 6-31）。\n\n![9781430248750_Fig06-31.jpg](img/9781430248750_Fig06-31.jpg)\n\
    \n图 6-31. 带有 SmoothFollow 脚本的主摄像机检视视图\n\n主摄像机应跟随球，所以将层级视图中的 Ball 游戏对象拖拽到检视视图中\
    \ `SmoothFollow` 脚本的 Target 字段。\n\n至于其他 `SmoothFollow` 属性，设置 Distance 为 2，这将使主摄像机保持在球后方\
    \ 2 米处跟随；设置 Height 为 1，使摄像机保持在球上方 1 米处，而不是紧跟在它后面。Height Damping 设置为 2，允许主摄像机在跟随球的高度时有轻微的上下弹动；Rotation\
    \ Damping 设置为 0，确保主摄像机始终保持在球的后方，不会左右摆动。\n\n现在点击播放，当你滚动时，你就在滚动并跟随着！\n\n# 进一步探索\n\
    \n现在我们有了真正游戏玩法的雏形。虽然它还不是一个完整的保龄球游戏，但它包含了物理（球在地板上滚动）、交互控制（推动球）和摄像机移动（跟随球）。在游戏开发中，每个特性都是丰富的主题，但我们将在下一章中更深入地探讨物理，包括保龄球瓶的添加和基于碰撞的音效。届时，游戏看起来会更像一个保龄球游戏！\n\
    \n## Unity 手册\n\n在“资源导入与创建”部分，关于“程序化材质”的页面（你在地板上使用过）简要介绍了 Substance 存档格式，并概述了用于创建和分析程序化材质的工具。\n\
    \n在“创建游戏玩法”部分，关于“输入”的页面描述了 `Input` 类及其 `GetAxis` 函数（在本章实现的 `FuguForce` 脚本中使用），并列出了传递给该函数的摇杆和键盘值。该页面的下半部分描述了适用于\
    \ iOS 的 `Input` 函数和变量，你可以阅读这部分作为本书关于 iOS 输入章节的预览。\n\n本章主要讨论物理，因此“物理”页面是最值得阅读的。它列出了所有碰撞器类型，包括本章中使用的\
    \ SphereCollider、BoxCollider 和 MeshCollider 组件。该页面描述了刚体（球）和静态碰撞器（地板）之间的区别，以及物理材质及其属性如何影响碰撞行为。\n\
    \n## 参考手册\n\n在“资源组件”部分，关于“程序化材质资源”的页面解释了你在项目视图和检视视图中看到的程序化材质内容。\n\n在“物理组件”部分，详细列出了所有可用的碰撞器，以及可用的关节（包括铰链和弹簧）、恒力和布料组件（Unity\
    \ iOS 不支持布料）。\n\n本章引入了一个新的设置管理器：“标签管理器”，用于为地板创建新标签。\n\n在“脚本概念”部分，标题为“什么是标签？”的页面详细说明了如何创建标签并将其应用于游戏对象，并提供了一个示例，展示如何在运行时使用标签查找游戏对象。\n\
    \n关于“刚体休眠”的页面解释了刚体在静止时如何“进入休眠”状态。这是一个很好的优化，可以减少不必要的物理计算。\n\n## 脚本参考\n\n在运行时类列表中，“MonoBehaviour”类的页面列出了本章介绍的碰撞回调函数：`OnCollisionEnter`、`OnCollisionStay`\
    \ 和 `OnCollisionExit`。\n\n我们查询了 `Collision` 类以获取碰撞信息：相对速度、碰撞到的游戏对象。还有其他数据可用，例如实际接触点。\n\
    \n本章介绍了 `Rigidbody` 组件，这个类的脚本参考页面值得通读。它的变量很大程度上对应检视视图中可用的属性，除了你用来推动球的 `AddForce`\
    \ 函数外，还有许多相关函数：`AddRelativeForce`、`AddTorque`、`AddRelativeTorque`、`AddExplosionForce`、`AddForceAtPosition`。\n\
    \n`Component` 有几个变量，它们是引用附加到游戏对象上的其他组件的快捷方式。在本书迄今为止创建的两个脚本中，`FuguRotate` 脚本引用了\
    \ `transform` 变量，`FuguForce` 脚本引用了 `rigidbody` 变量。Component 的变量与 `GameObject`\
    \ 中的同类变量相对应。\n\n我们使用的 `Input` 类中的一个函数是 `Input.GetAxis`。如果你计划制作任何桌面或网页游戏，你会想了解用于查询键盘、鼠标和摇杆的各种函数。该页面还列出了适用于移动应用程序的\
    \ `Input` 函数。\n\n## 网络资源\n\nUnity 中的物理实现基于较旧版本（2.x）的 PhysX 引擎。该引擎最初由 NovodeX 开发，被\
    \ Ageia 收购后与硬件物理加速器捆绑在一起，现在是 nVidia 的产品。最新版本（3.x）可在 nVidia 开发者专区获取（`https://developer.nvidia.com/physx`）。值得一看\
    \ PhysX 软件开发工具包，以便更好地理解 Unity 物理组件和脚本函数所依赖的物理引擎特性。\n\nUnity 网站（`http://unity3d.com/`）上相当新的“学习”部分包含大量物理教程，涵盖了本章讨论的大部分内容以及下一章将要讨论的内容。\n\
    \n# 第 7 章：开始保龄球吧！高级物理\n\n到目前为止，我们已拥有了一个保龄球游戏的雏形，或者至少是 Unity 编辑器中的一个场景，玩家可以在其中让球在地板上滚动。但如果没有至少保龄球瓶，游戏看起来就不像保龄球游戏。本章将弥补这一点，并涉及更多\
    \ Unity 物理知识，包括刚体（球和球瓶之间）之间的碰撞以及复合碰撞器（以适应保龄球瓶的形状）。在此基础上，我们还将添加基于碰撞的音效，让游戏听起来也像保龄球游戏。\n"
- fmt: "# This additional functionality will require the construction of several new\
    \ scripts, available in the Unity project for this chapter on `http://learnunity4.com/`\
    \ However, the barrel model used for the bowling pins and the audio for pin collisions\
    \ and the ball rolling sound are taken (free) from the Asset Store and not included\
    \ in the online project.\n\n## Lengthen the Lane\n\nBefore adding bowling pins\
    \ to the bowl scene, which should be open in the Unity Editor as we left it in\
    \ the previous chapter, we need some more room to roll. Select the `Floor` in\
    \ the Hierarchy View, and in the Inspector View ([Figure 7-1](#9781430248750_Ch07.xhtml#Fig1))\
    \ set `Scale` to 10 for X, Y, and Z.\n\n![9781430248750_Fig07-01.jpg](images/9781430248750_Fig07-01.jpg)\n\
    \n[Figure 7-1](#9781430248750_Ch07.xhtml#_Fig1). The larger `Floor` GameObject,\
    \ scaled up by a factor of 10\n\n**Tip** For performance reasons, it’s best to\
    \ avoid changing the scale in the Transform Component (for imported models, change\
    \ the scale in the Import Settings, instead). And if you have to change the scale,\
    \ change it uniformly along all three axes.\n\nThe `Floor` is now ten times larger\
    \ (except in height, since a Plane has zero height). But the textures on the `Floor`\
    \ are also stretched, resulting in some really wide planks. To compensate, you\
    \ should also adjust the Tiling for the `Floor`’s Main and Normalmap textures\
    \ by a factor of 10, which results in a new Tiling factor of 50 in each direction\
    \ and the wooden planks looking as they originally did.\n\n## Make Some Pins\n\
    \nNow that there’s room to roll, it’s time to add the pins. In lieu of a bowling\
    \ pin model, you can make a simplistic version of a bowling pin with the Capsule\
    \ primitive.\n\nSelect Capsule from the Create menu of the Hierarchy View ([Figure\
    \ 7-2](#9781430248750_Ch07.xhtml#Fig2)). Capsule, like the other primitive models,\
    \ is also available in the GameObject menu on the menu bar.\n\n![9781430248750_Fig07-02.jpg](images/9781430248750_Fig07-02.jpg)\n\
    \n[Figure 7-2](#9781430248750_Ch07.xhtml#_Fig2). Creating a Capsule\n\nName the\
    \ resulting GameObject `Pin`. To create ten pins, you could duplicate the `Pin`\
    \ nine times, but in the same way the Cube was cloned in the cube scene, it’s\
    \ better to make a prefab first. This way, any changes you make to a single pin\
    \ can be applied to all ten of the pins.\n\nSo go ahead and drag the `Pin` into\
    \ the Prefabs folder in the Project View to create the prefab ([Figure 7-3](#9781430248750_Ch07.xhtml#Fig3)).\n\
    \n![9781430248750_Fig07-03.jpg](images/9781430248750_Fig07-03.jpg)\n\n[Figure\
    \ 7-3](#9781430248750_Ch07.xhtml#_Fig3). The `Pin` prefab in the Project View\n\
    \nBut dragging nine copies of the prefab into the scene and manually placing them\
    \ would be laborious and error-prone. A task fitting that description is a good\
    \ candidate for implementing in a script! So plan on spawning all of the pins\
    \ in the game using a script and the `Pin` prefab. In that case, the `Pin` GameObject\
    \ in the scene is redundant, so delete it (by selecting the GameObject in the\
    \ Hierarchy View and invoking Delete from the Edit menu or the keyboard shortcut\
    \ Command+Delete).\n\n## Make a Game Controller\n\nBesides spawning the pins,\
    \ the bowling game will surely require more scripting to implement the rules of\
    \ the game and the playing sequence. In fact, any game that’s not really simple\
    \ can benefit from having a single game controller script that implements the\
    \ the overall flow of the game. So let’s plan on implementing the pin creation\
    \ as the first action in the bowling game controller.\n\n### Create the Script\n\
    \nIn the Project View, create a new JavaScript, place it in the Scripts folder,\
    \ and name it `FuguBowl` (we’ll follow a convention of naming the game controller\
    \ script after the game itself). Then add the code in [Listing 7-1](#9781430248750_Ch07.xhtml#list1),\
    \ which consists of a few variables, a `CreatePins` function, and an `Awake` callback\
    \ that calls the `CreatePins` function.\n\n[Listing 7-1.](#9781430248750_Ch07.xhtml#_list1)\
    \ Pin Instantiation Code in FuguBowl.js\n\n```\n#pragma strict\n\nvar pin:GameObject;\
    \ // pin prefab to instantiate\nvar pinPos:Vector3 = Vector3(0,1,20); // position\
    \ to place rack of pins\n\nvar pinDistance = 1.5; // initial distance between\
    \ pins\nvar pinRows = 4; // number of pin rows\n\nprivate var pins:Array;\n\n\
    function Awake () {\n        CreatePins();\n}\n\nfunction CreatePins() {\n   \
    \     pins = new Array();\n        var offset = Vector3.zero;\n        for (var\
    \ row=0; row<pinRows; ++row) {\n                offset.z+=pinDistance;\n     \
    \           offset.x=-pinDistance*row/2;\n                for (var n=0; n<=row;\
    \ ++n) {\n                         pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));\n\
    \                         offset.x+=pinDistance;\n                }\n\n}\n}\n\
    ```\n\nThe `CreatePins` function first creates an `Array`, which is similar to\
    \ the built-in array denoted by brackets, but with adjustable size, so it can\
    \ grow as you add elements and shrink as you remove them. The function then loops\
    \ through the number of rows specified and in each row instantiates an increasing\
    \ number of pins: row one has one pin, row two has two pins, and so on. Thus when\
    \ you have four rows, you end up with a triangle of ten pins as desired!\n\n###\
    \ Instantiate Pins\n\nThe `Instantiate` function takes an Object, position, and\
    \ rotation as arguments to create an identical Object at the specified position\
    \ and rotation (in world space, not local space). `Instantiate` copies the entire\
    \ Object hierarchy, so if the Object is a GameObject with child GameObjects, then\
    \ the entire hierarchy is copied. If the Object is a Component, then the GameObject\
    \ of that Component and all of that GameObject’s children are copied.\n\nIf the\
    \ original GameObject is already in the scene, then calling `Instantiate` is similar\
    \ to selecting the original GameObject and invoking `Duplicate` on it from the\
    \ Edit menu (or Command+D). If the original object is a prefab, as is the case\
    \ here, then calling `Instantiate` is similar to dragging the prefab into the\
    \ scene to create a new GameObject.\n\nThe position is a `Vector3` and the rotation\
    \ is passed in as a `Quaternion` instead of an Euler angle. A quaternion is not\
    \ a very intuitive representation of rotations (quaternions are complex numbers\
    \ with three imaginary components), but they have some advantages over Euler angles\
    \ (e.g., more natural interpolation) and thus are used internally by Unity. In\
    \ this case, passing in the static variable `Quaternion.identity` specifies that\
    \ no rotation takes place (same as a rotation of 0,0,0 in Euler angles).\n\n**Caution**\
    \ Quaternions also have x,y,z values (and one more, w) so be careful about confusing\
    \ them with Euler angles. In particular, note that the `rotation` and `localRotation`\
    \ variables in the `Transform` Component are `Quaternion` values. The Euler angles\
    \ are stored in the variables `eulerAngles` and `localEulerAngles`.\n\n`Instantiate`\
    \ is a static function of the `Object` class. The call to `Instantiate` in the\
    \ script is equivalent to calling `this.Instantiate`, where `this` is the script\
    \ Component. And `Component` is a subclass of `Object`, so the compiler knows\
    \ you’re calling `Object.Instantiate`. `Instantiate` is also an overloaded function,\
    \ with a variation that takes just one argument: the Object to clone. The newly\
    \ instantiated Object will appear at the same position and with the same rotation\
    \ as the original Object.\n\n### Namespaces\n\nNormally I’d prefer to explicitly\
    \ call `Object.Instantiate` to make it clear that `Instantiate` is a static function\
    \ in the `Object` class and doesn’t have to be called on an actual instance of\
    \ `Object` (in which case it would be termed an *instance function*). However,\
    \ spelling out `Object.Instantiate` in the script results in the Console View\
    \ error message: *‘Instantiate’ is not a member of ‘Object’* ([Figure 7-4](#9781430248750_Ch07.xhtml#Fig4)).\n\
    \n![9781430248750_Fig07-04.jpg](images/9781430248750_Fig07-04.jpg)\n\n[Figure\
    \ 7-4](#9781430248750_Ch07.xhtml#_Fig4). A compiler error referencing the (wrong)\
    \ `Object` class"
  raw: 'This additional functionality will require the construction of several new
    scripts, available in the Unity project for this chapter on `http://learnunity4.com/`
    However, the barrel model used for the bowling pins and the audio for pin collisions
    and the ball rolling sound are taken (free) from the Asset Store and not included
    in the online project.


    Lengthen the Lane


    Before adding bowling pins to the bowl scene, which should be open in the Unity
    Editor as we left it in the previous chapter, we need some more room to roll.
    Select the Floor in the Hierarchy View, and in the Inspector View ([Figure 7-1](#9781430248750_Ch07.xhtml#Fig1))
    set Scale to 10 for X, Y, and Z.


    ![9781430248750_Fig07-01.jpg](images/9781430248750_Fig07-01.jpg)


    [Figure 7-1](#9781430248750_Ch07.xhtml#_Fig1). The larger Floor GameObject, scaled
    up by a factor of 10


    **Tip**   For performance reasons, it’s best to avoid changing the scale in the
    Transform Component (for imported models, change the scale in the Import Settings,
    instead). And if you have to change the scale, change it uniformly along all three
    axes.


    The Floor is now ten times larger (except in height, since a Plane has zero height).
    But the textures on the Floor are also stretched, resulting in some really wide
    planks. To compensate, you should also adjust the Tiling for the Floor’s Main
    and Normalmap textures by a factor of 10, which results in a new Tiling factor
    of 50 in each direction and the wooden planks looking as they originally did.


    Make Some Pins


    Now that there’s room to roll, it’s time to add the pins. In lieu of a bowling
    pin model, you can make a simplistic version of a bowling pin with the Capsule
    primitive.


    Select Capsule from the Create menu of the Hierarchy View ([Figure 7-2](#9781430248750_Ch07.xhtml#Fig2)).
    Capsule, like the other primitive models, is also available in the GameObject
    menu on the menu bar.


    ![9781430248750_Fig07-02.jpg](images/9781430248750_Fig07-02.jpg)


    [Figure 7-2](#9781430248750_Ch07.xhtml#_Fig2). Creating a Capsule


    Name the resulting GameObject Pin. To create ten pins, you could duplicate the
    Pin nine times, but in the same way the Cube was cloned in the cube scene, it’s
    better to make a prefab first. This way, any changes you make to a single pin
    can be applied to all ten of the pins.


    So go ahead and drag the Pin into the Prefabs folder in the Project View to create
    the prefab ([Figure 7-3](#9781430248750_Ch07.xhtml#Fig3)).


    ![9781430248750_Fig07-03.jpg](images/9781430248750_Fig07-03.jpg)


    [Figure 7-3](#9781430248750_Ch07.xhtml#_Fig3). The Pin prefab in the Project View


    But dragging nine copies of the prefab into the scene and manually placing them
    would be laborious and error-prone. A task fitting that description is a good
    candidate for implementing in a script! So plan on spawning all of the pins in
    the game using a script and the Pin prefab. In that case, the Pin GameObject in
    the scene is redundant, so delete it (by selecting the GameObject in the Hierarchy
    View and invoking Delete from the Edit menu or the keyboard shortcut Command+Delete).


    Make a Game Controller


    Besides spawning the pins, the bowling game will surely require more scripting
    to implement the rules of the game and the playing sequence. In fact, any game
    that’s not really simple can benefit from having a single game controller script
    that implements the the overall flow of the game. So let’s plan on implementing
    the pin creation as the first action in the bowling game controller.


    Create the Script


    In the Project View, create a new JavaScript, place it in the Scripts folder,
    and name it `FuguBowl` (we’ll follow a convention of naming the game controller
    script after the game itself). Then add the code in [Listing 7-1](#9781430248750_Ch07.xhtml#list1),
    which consists of a few variables, a `CreatePins` function, and an Awake callback
    that calls the `CreatePins` function.


    [Listing 7-1.](#9781430248750_Ch07.xhtml#_list1)  Pin Instantiation Code in FuguBowl.js


    ```

    #pragma strict


    var pin:GameObject; // pin prefab to instantiate

    var pinPos:Vector3 = Vector3(0,1,20); // position to place rack of pins


    var pinDistance = 1.5; // initial distance between pins

    var pinRows = 4; // number of pin rows


    private var pins:Array;


    function Awake () {

            CreatePins();

    }


    function CreatePins() {

            pins = new Array();

            var offset = Vector3.zero;

            for (var row=0; row<pinRows; ++row) {

                    offset.z+=pinDistance;

                    offset.x=-pinDistance*row/2;

                    for (var n=0; n<=row; ++n) {

                             pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));

                             offset.x+=pinDistance;

                    }


    }

    }

    ```


    The `CreatePins` function first creates an `Array`, which is similar to the built-in
    array denoted by brackets, but with adjustable size, so it can grow as you add
    elements and shrink as you remove them. The function then loops through the number
    of rows specified and in each row instantiates an increasing number of pins: row
    one has one pin, row two has two pins, and so on. Thus when you have four rows,
    you end up with a triangle of ten pins as desired!


    Instantiate Pins


    The `Instantiate` function takes an Object, position, and rotation as arguments
    to create an identical Object at the specified position and rotation (in world
    space, not local space). `Instantiate` copies the entire Object hierarchy, so
    if the Object is a GameObject with child GameObjects, then the entire hierarchy
    is copied. If the Object is a Component, then the GameObject of that Component
    and all of that GameObject’s children are copied.


    If the original GameObject is already in the scene, then calling `Instantiate`
    is similar to selecting the original GameObject and invoking Duplicate on it from
    the Edit menu (or Command+D). If the original object is a prefab, as is the case
    here, then calling `Instantiate` is similar to dragging the prefab into the scene
    to create a new GameObject.


    The position is a `Vector3` and the rotation is passed in as a `Quaternion` instead
    of an Euler angle. A quaternion is not a very intuitive representation of rotations
    (quaternions are complex numbers with three imaginary components), but they have
    some advantages over Euler angles (e.g., more natural interpolation) and thus
    are used internally by Unity. In this case, passing in the static variable `Quaternion.identity`
    specifies that no rotation takes place (same as a rotation of 0,0,0 in Euler angles).


    **Caution**  Quaternions also have x,y,z values (and one more, w) so be careful
    about confusing them with Euler angles. In particular, note that the `rotation`
    and `localRotation` variables in the `Transform` Component are `Quaternion` values.
    The Euler angles are stored in the variables `eulerAngles` and `localEulerAngles`.


    `Instantiate` is a static function of the `Object` class. The call to `Instantiate`
    in the script is equivalent to calling `this.Instantiate`, where `this` is the
    script Component. And `Component` is a subclass of `Object`, so the compiler knows
    you’re calling `Object.Instantiate`. `Instantiate` is also an overloaded function,
    with a variation that takes just one argument: the Object to clone. The newly
    instantiated Object will appear at the same position and with the same rotation
    as the original Object.


    Namespaces


    Normally I’d prefer to explicitly call `Object.Instantiate` to make it clear that
    `Instantiate` is a static function in the `Object` class and doesn’t have to be
    called on an actual instance of `Object` (in which case it would be termed an
    *instance function*). However, spelling out `Object.Instantiate` in the script
    results in the Console View error message: *‘Instantiate’ is not a member of ‘Object’*
    ([Figure 7-4](#9781430248750_Ch07.xhtml#Fig4)).


    ![9781430248750_Fig07-04.jpg](images/9781430248750_Fig07-04.jpg)


    [Figure 7-4](#9781430248750_Ch07.xhtml#_Fig4). A compiler error referencing the
    (wrong) Object class'
  trans: "\n# 这项附加功能需要新建几个脚本，你可以在 `http://learnunity4.com/` 上找到本章对应的 Unity 项目。不过，用于保龄球瓶的球瓶模型、球瓶碰撞音效和球滚动音效均从资源商店免费获取，并未包含在在线项目中。\n\
    \n## 加长球道\n\n在向保龄球场景（该场景应已在 Unity 编辑器中打开，保持上一章的状态）添加保龄球瓶之前，我们需要更大的滚动空间。在层级视图中选择\
    \ `Floor`，然后在检视面板（图 7-1）中将 X、Y、Z 的 `Scale` 均设为 10。\n\n![9781430248750_Fig07-01.jpg](img/9781430248750_Fig07-01.jpg)\n\
    \n图 7-1. 放大后的 `Floor` 游戏对象，缩放系数为 10\n\n**提示** 出于性能考虑，最好避免在变换组件中直接修改缩放（对于导入的模型，应在导入设置中修改缩放）。如果必须修改缩放，请确保沿三个轴均匀缩放。\n\
    \n现在 `Floor` 变大了十倍（高度除外，因为平面本身没有高度）。但 `Floor` 上的纹理也被拉伸了，导致木板显得特别宽。为抵消这一效果，你需要将\
    \ `Floor` 的主纹理和法线纹理的平铺系数也乘以 10，这样每个方向的新平铺系数变为 50，木板纹理就能恢复原状。\n\n## 制作保龄球瓶\n\n\
    现在有了滚动空间，可以添加球瓶了。在没有现成保龄球瓶模型的情况下，你可以用胶囊体基本几何体制作一个简化版的球瓶。\n\n从层级视图的创建菜单中选择胶囊体（图\
    \ 7-2）。胶囊体与其他基本几何体一样，也可以通过菜单栏的 GameObject 菜单创建。\n\n![9781430248750_Fig07-02.jpg](img/9781430248750_Fig07-02.jpg)\n\
    \n图 7-2. 创建胶囊体\n\n将生成的游戏对象命名为 `Pin`。要创建十个球瓶，你可以将 `Pin` 复制九次，但就像在立方体场景中克隆立方体那样，更好的做法是先制作一个预制件。这样，对单个球瓶所做的任何修改都可以应用到全部十个球瓶上。\n\
    \n现在，将 `Pin` 拖拽到项目视图的预制件文件夹中，以创建预制件（图 7-3）。\n\n![9781430248750_Fig07-03.jpg](img/9781430248750_Fig07-03.jpg)\n\
    \n图 7-3. 项目视图中的 `Pin` 预制件\n\n但如果将九个预制件副本拖入场景并手动放置，会既繁琐又容易出错。这种任务非常适合用脚本来实现！因此，我们计划使用脚本和\
    \ `Pin` 预制件在游戏中生成所有球瓶。这种情况下，场景中的 `Pin` 游戏对象就是多余的，所以请将其删除（在层级视图中选择该游戏对象，然后通过编辑菜单的删除命令或快捷键\
    \ Command+Delete 执行删除）。\n\n## 制作游戏控制器\n\n除了生成球瓶，保龄球游戏肯定还需要更多脚本来实现游戏规则和游戏流程。事实上，任何不太简单的游戏都可以从单一的游戏控制器脚本中受益，该脚本负责实现游戏的整体流程。因此，我们计划将球瓶创建作为保龄球游戏控制器的第一个动作。\n\
    \n### 创建脚本\n\n在项目视图中新建一个 JavaScript，将其放入 Scripts 文件夹，并命名为 `FuguBowl`（我们将遵循惯例：用游戏本身的名字来命名游戏控制器脚本）。然后添加代码清单\
    \ 7-1 中的代码，其中包含几个变量、一个 `CreatePins` 函数，以及一个调用 `CreatePins` 函数的 `Awake` 回调。\n\n\
    代码清单 7-1 FuguBowl.js 中的球瓶实例化代码\n\n```\n#pragma strict\n\nvar pin:GameObject; //\
    \ 要实例化的球瓶预制件\nvar pinPos:Vector3 = Vector3(0,1,20); // 球瓶架的位置\n\nvar pinDistance\
    \ = 1.5; // 球瓶之间的初始距离\nvar pinRows = 4; // 球排行数\n\nprivate var pins:Array;\n\n\
    function Awake () {\n        CreatePins();\n}\n\nfunction CreatePins() {\n   \
    \     pins = new Array();\n        var offset = Vector3.zero;\n        for (var\
    \ row=0; row<pinRows; ++row) {\n                offset.z+=pinDistance;\n     \
    \           offset.x=-pinDistance*row/2;\n                for (var n=0; n<=row;\
    \ ++n) {\n                         pins.push(Instantiate(pin, pinPos+offset, Quaternion.identity));\n\
    \                         offset.x+=pinDistance;\n                }\n\n}\n}\n\
    ```\n\n`CreatePins` 函数首先创建一个 `Array`，它类似于用方括号表示的内置数组，但大小可调，因此可以随着元素的添加而增长，随着元素的移除而收缩。然后函数循环遍历指定的行数，并在每一行中实例化数量递增的球瓶：第一行有一个，第二行有两个，依此类推。因此，当有四行时，最终你会得到如图所示的十个球瓶三角形排列！\n\
    \n### 实例化球瓶\n\n`Instantiate` 函数接收一个对象、位置和旋转作为参数，在指定的位置和旋转（在世界空间中，而非局部空间）创建一个相同的对象。`Instantiate`\
    \ 会复制整个对象层级，因此如果对象是一个带有子游戏对象的游戏对象，那么整个层级都会被复制。如果对象是一个组件，那么该组件的游戏对象以及该游戏对象的所有子对象都会被复制。\n\
    \n如果原始游戏对象已在场景中，则调用 `Instantiate` 类似于选择原始游戏对象并通过编辑菜单的重复命令（或 Command+D）进行复制。如果原始对象是预制件（就像本例这样），则调用\
    \ `Instantiate` 类似于将预制件拖入场景以创建新的游戏对象。\n\n位置是一个 `Vector3`，旋转则以 `Quaternion`（四元数）而非欧拉角的形式传入。四元数并不是一种直观的旋转表示方式（四元数是具有三个虚部的复数），但它们比欧拉角有一些优势（例如更自然的插值），因此\
    \ Unity 在内部使用它们。在本例中，传入静态变量 `Quaternion.identity` 表示不进行任何旋转（相当于欧拉角旋转为 0,0,0）。\n\
    \n**注意** 四元数也有 x、y、z 值（还有一个 w 值），因此要小心不要将其与欧拉角混淆。特别要注意，`Transform` 组件中的 `rotation`\
    \ 和 `localRotation` 变量是 `Quaternion` 类型的值。欧拉角则存储在 `eulerAngles` 和 `localEulerAngles`\
    \ 变量中。\n\n`Instantiate` 是 `Object` 类的静态函数。脚本中对 `Instantiate` 的调用等同于调用 `this.Instantiate`，其中\
    \ `this` 是脚本组件。而 `Component` 是 `Object` 的子类，因此编译器知道你在调用 `Object.Instantiate`。`Instantiate`\
    \ 也是一个重载函数，其中一种变体只接受一个参数：要克隆的对象。新实例化的对象将出现在与原始对象相同的位置并具有相同的旋转。\n\n### 命名空间\n\n\
    通常，我更倾向于显式调用 `Object.Instantiate`，以表明 `Instantiate` 是 `Object` 类中的静态函数，不需要在 `Object`\
    \ 的实际实例上调用（如果那样做，它将被称作*实例函数*）。然而，在脚本中写出 `Object.Instantiate` 会导致控制台视图报错：*“Instantiate”不是“Object”的成员*（图\
    \ 7-4）。\n\n![9781430248750_Fig07-04.jpg](img/9781430248750_Fig07-04.jpg)\n\n图\
    \ 7-4. 引用（错误）`Object` 类的编译器错误\n"
- fmt: "问题在于 Mono 中定义了另一个 `Object` 类。该类作为其他 Mono 类的超类，就像 Unity 的 `Object` 类是最多 Unity\
    \ 类的超类（至少是那些可以存在于场景中的类）。编译器认为你引用的是 Mono 的 `Object` 类，而不是 Unity 的类。这正是我们一直试图通过使用（希望是）唯一前缀来命名类来避免的问题。诸如\
    \ `Object` 和 `Button` 这样的有用类名很可能被许多不同的开发者使用。\n\n但是，Unity 和 Mono 版本的 `Object` 如何共存？答案是命名空间。Unity\
    \ 定义的每个类都在 `UnityEngine` 命名空间中，而 Mono 版本的 `Object` 定义在 `System` 命名空间中。每个类的完全限定名称是类名前加上命名空间名称，因此\
    \ Unity 的 `Object` 类实际上是 `UnityEngine.Object`，而 Mono 的 `Object` 是 `System.Object`。对\
    \ Unity 类的引用很少包含 `UnityEngine` 前缀，因为 JavaScript 会隐式导入该命名空间（相当于在脚本顶部添加“`import\
    \ UnityEngine`”）。这意味着编译器在尝试确定类定义位置时，会在 `UnityEngine` 命名空间中查找。不幸的是，JavaScript 也会隐式导入\
    \ `System` 命名空间，并且 `Object` 首先解析为 `System.Object`。因此，对 `Object.Instantiate` 的调用会产生与对\
    \ `System.Object.Instantiate` 调用相同的错误，因为 `System.Object` 类没有定义 `Instantiate` 函数。但是，对\
    \ `UnityEngine.Object.Instantiate` 的调用则完全正常。所以要记住，任何时候对 `Instantiate` 的调用实际上都是对\
    \ `UnityEngine.Object.Instantiate` 的调用！\n\n顺便说一句，在 C# 脚本中，`Object` 类不会出现这种混淆，因为它们不会自动导入\
    \ `System` 命名空间。而且，虽然 JavaScript 目前还不允许声明新的命名空间，但 C# 从 Unity 4 开始就支持这一功能。\n\n\
    ### `Awake`\n\n`Awake` 函数是一个与 `Start` 非常相似的脚本回调。与 `Start` 一样，`Awake` 仅在 GameObject\
    \ 首次激活时调用一次。与 `Start` 不同，无论脚本是否启用，都会调用 `Awake`。并且 `Awake` 总是在 `Start` 之前调用。\n\n\
    **注意** 最初，`Awake` 在 GameObject 被加载到场景或创建后立即调用，无论 GameObject 是否激活。这种行为与预制件配合不佳，因此才有了当前的行为，即\
    \ `Awake` 类似于早期的 `Start` 回调。在这种情况下，你可以使用 `Awake` 或 `Start`，但我喜欢用 `Awake` 进行初始化，用\
    \ `Start` 来主动启动脚本的行为。\n\n### 创建 GameObject\n\n要让游戏控制器脚本运行，它必须附加到场景中的 GameObject\
    \ 上。虽然 `FuguBowl.js` 可以附加到现有的 GameObject（如主摄像机），但创建一个新的 GameObject 更为干净。这个 GameObject\
    \ 可以以一种明确指示游戏控制器脚本已附加的方式来命名，并且你不必担心该 GameObject 在用于其他目的时会被停用。按照这个策略，在层级视图中创建一个新的\
    \ GameObject，将其命名为 `FuguBowl`（与它将持有的脚本同名），然后将 `FuguBowl` 脚本拖到 FuguBowl GameObject\
    \ 上（[图 7-5](#9781430248750_Ch07.xhtml#Fig5)）。\n\n![9781430248750_Fig07-05.jpg](images/9781430248750_Fig07-05.jpg)\n\
    \n[图 7-5](#9781430248750_Ch07.xhtml#_Fig5). 附加了 `FuguBowl.js` 的游戏控制器 GameObject\n\
    \n`FuguBowl` 脚本的大多数属性可以保留默认值，但你需要将项目视图中的 Pin 预制件拖到 `FuguBowl` 脚本的 Pin 字段中。现在点击播放，所有十个保龄球瓶就会出现（[图\
    \ 7-6](#9781430248750_Ch07.xhtml#Fig6)）。\n\n![9781430248750_Fig07-06.jpg](images/9781430248750_Fig07-06.jpg)\n\
    \n[图 7-6](#9781430248750_Ch07.xhtml#_Fig6). 放置了瓶子的保龄球场景\n\n但是，当你将球投向球瓶时，球只会从它们身上弹开，因为这些球瓶虽然有碰撞器组件，但却是静态的\
    \ GameObject。与球一样，每个球瓶也必须拥有刚体组件才能对作用力做出反应。可以通过组件菜单将刚体组件添加到 Pin 预制件上，但这次让我们尝试另一种方法。在项目视图中选择\
    \ Pin 预制件，然后在检查器视图中单击“添加组件”按钮。在弹出的菜单中，在“物理”下选择“刚体”（或者你可以在弹出菜单的搜索字段中输入“rigidbody”来找到该选项）。无论你选择哪种方式，现在\
    \ Pin 预制件上应该有一个刚体组件（[图 7-7](#9781430248750_Ch07.xhtml#Fig7)）。\n\n![9781430248750_Fig07-07.jpg](images/9781430248750_Fig07-07.jpg)\n\
    \n[图 7-7](#9781430248750_Ch07.xhtml#_Fig7). 带有刚体的保龄球瓶预制件\n\n与地板和球的碰撞器组件一样，Pin\
    \ 预制件应该有自己的物理材质。创建合适物理材质的一个快速方法是复制用于球的物理材质，因此在项目视图中选择“物理”文件夹中的 Ball 物理材质，使用“编辑”菜单或\
    \ Command+D 进行复制，并将新的物理材质命名为 `Pin`（[图 7-8](#9781430248750_Ch07.xhtml#Fig8)）。\n\
    \n![9781430248750_Fig07-08.jpg](images/9781430248750_Fig07-08.jpg)\n\n[图 7-8](#9781430248750_Ch07.xhtml#_Fig8).\
    \ 用于 Pin 预制件的物理材质\n\n由于保龄球瓶应该像球一样滚动良好，将“动态摩擦力”和“静态摩擦力”值保留为 1（以避免滚动时打滑），并将“摩擦力组合”值保留为“最大值”。然而，与球不同的是，保龄球瓶应该具有相当的弹性，因此将“弹性”设置为\
    \ 0.5，并将“弹性组合”值设置为“平均值”（考虑到它所碰撞对象的弹性）。最后，将 Pin 物理材质分配给 Pin 预制件。在项目视图中选择 Pin 预制件，然后在检查器视图中，单击碰撞器组件“物理材质”字段右侧的圆圈，然后从弹出选择器中选择\
    \ Pin 物理材质（[图 7-9](#9781430248750_Ch07.xhtml#Fig9)）。\n\n![9781430248750_Fig07-09.jpg](images/9781430248750_Fig07-09.jpg)\n\
    \n[图 7-9](#9781430248750_Ch07.xhtml#_Fig9). 将 Pin 物理材质分配给 Pin 预制件\n\n现在，当你点击播放并将球滚向球瓶时，它们会被撞倒并四处弹跳滚动，如图\
    \ [7-10](#9781430248750_Ch07.xhtml#Fig10) 所示。\n\n![9781430248750_Fig07-10.jpg](images/9781430248750_Fig07-10.jpg)\n\
    \n[图 7-10](#9781430248750_Ch07.xhtml#_Fig10). 与每个都带有刚体的球瓶发生碰撞\n\n### 继续游戏\n\n\
    每次测试滚动都必须停止游戏并再次点击播放，这相当繁琐。而且，当球滚出地板时，你只能眼睁睁看着球无限下落。因此，让我们让球、主摄像机和球瓶在球滚出地板边缘时重置。\n\
    \n#### 使其可重置\n\n首先，你需要一个能将 GameObject 恢复到其初始位置和旋转的脚本（不能忘记旋转——如果一个球瓶被击倒，你需要将其重置为初始直立方向）。创建一个新的\
    \ JavaScript，命名为 `FuguReset`，内容如 [列表 7-2](#9781430248750_Ch07.xhtml#list2) 所示。\n\
    \n[列表 7-2.](#9781430248750_Ch07.xhtml#_list2)  在 `FuguReset.js` 中恢复 GameObject\
    \ 位置\n\n```\n#pragma strict\n\nprivate var startPos:Vector3;\nprivate var startRot:Vector3;\n\
    \nfunction Awake() {\n        // 保存此 GameObject 的初始位置和旋转\n        startPos = transform.localPosition;\n\
    \        startRot = transform.localEulerAngles;\n}\n```"
  raw: 'The problem here is that there is another `Object` class defined in Mono.
    That class acts as the superclass of other Mono classes, just like the Unity `Object`
    class is the superclass of most Unity classes (at least the ones that can exist
    in a scene). The compiler thinks you’re referring to the Mono `Object` class instead
    of the Unity class. This is the issue we’ve been trying to avoid by naming classes
    with a (hopefully) unique prefix. Useful class names like `Object` and `Button`
    are likely to be used by many different developers.


    But how can the Unity and Mono versions of `Object` coexist? The answer is namespaces.
    Every class defined by Unity is in the `UnityEngine` namespace, whereas the Mono
    version of `Object` is defined in the `System` namespace. The fully qualified
    name of every class is the class name preceded by the namespace name, so the Unity
    `Object` class is really `UnityEngine.Object` and the Mono `Object` is `System.Object`.
    References to Unity classes rarely include the `UnityEngine` prefix, because JavaScript
    implicitly imports that namespace (equivalent to adding “`import UnityEngine`”
    at the top of the script). This means the compiler will look in the `UnityEngine`
    namespace when it’s trying to figure out where a class is defined. Unfortunately,
    JavaScript also implicitly imports the `System` namespace and `Object` resolves
    to `System.Object` first. So a call to `Object.Instantiate` generates the the
    same error as a call to `System.Object.Instantiate`, since there is no `Instantiate`
    function defined for the `System.Object` class. But a call to `UnityEngine.Object.Instantiate`
    works just fine. So just know that any time any call to just plain `Instantiate`
    is really a call to `UnityEngine.Object.Instantiate`!


    By the way, there is no such confusion with the `Object` class in C# scripts,
    as they do not automatically import the `System` namespace. And although JavaScript
    doesn’t yet allow declarations of new namespaces, C# does have that support beginning
    with Unity 4.


    Awake


    The `Awake` function is a script callback very similar to `Start`. Like `Start`,
    `Awake` is called just once, when the GameObject is first made active. Unlike
    `Start`, `Awake` is called regardless of whether the script is enabled. And `Awake`
    is always called before `Start`.


    **Note**   Originally, `Awake` was called as soon as the GameObject was loaded
    into a scene or created, regardless of whether the GameObject was active. This
    behavior didn’t work well with prefabs, hence the current behavior where `Awake`
    resembles an earlier `Start` callback.You could use either `Awake` or `Start`
    in this case, but I like to use `Awake` for initialization and `Start` for actively
    commencing the script’s behavior.


    Create the GameObject


    For the game controller script to run, it has to be attached to a GameObject in
    the scene. Although `FuguBowl.js` could be attached to an existing GameObject,
    like the Main Camera, it’s cleaner to create a new GameObject. The GameObject
    can be named in a way that clearly indicates the game controller script is attached,
    and you don’t have to worry about the GameObject getting deactivated while it’s
    being used for other purposes.Going with that strategy, create a new GameObject
    in the Hierarchy View, name it FuguBowl, same as the script it will hold, and
    drag the `FuguBowl` script onto the FuguBowl GameObject ([Figure 7-5](#9781430248750_Ch07.xhtml#Fig5)).


    ![9781430248750_Fig07-05.jpg](images/9781430248750_Fig07-05.jpg)


    [Figure 7-5](#9781430248750_Ch07.xhtml#_Fig5). The game controller GameObject
    with FuguBowl.js attached


    Most of the properties of the `FuguBowl` script can be left at their default values,
    but you do need to drag the Pin prefab from the Project View into the Pin field
    of the `FuguBowl` script. Now click Play, and all ten bowling pins appear ([Figure
    7-6](#9781430248750_Ch07.xhtml#Fig6)).


    ![9781430248750_Fig07-06.jpg](images/9781430248750_Fig07-06.jpg)


    [Figure 7-6](#9781430248750_Ch07.xhtml#_Fig6). The bowling with pins


    But as you bowl into the pins, the Ball just bounces off them since the pins have
    Collider Components but are static GameObjects. Like the Ball, each pin has to
    have a Rigidbody Component in order to react to forces. A Rigidbody Component
    can be added to the Pin prefab from the Component menu, but this time, let’s try
    it another way. Select the Pin prefab in the Project View and then in the Inspector
    View click the Add Component button. In the resulting pop-up, under Physics select
    Rigidbody (or you can find that selection by typing “rigidbody” in the search
    field of the pop-up). Whichever way you choose, there should now be a Rigidbody
    Component on the Pin prefab ([Figure 7-7](#9781430248750_Ch07.xhtml#Fig7)).


    ![9781430248750_Fig07-07.jpg](images/9781430248750_Fig07-07.jpg)


    [Figure 7-7](#9781430248750_Ch07.xhtml#_Fig7). The bowling pin prefab with a Rigidbody


    Like the Floor and Ball Collider Components, the Pin prefab should have its own
    PhysicMaterial. A quick way to create a suitable PhysicMaterial is to copy the
    one used for the Ball, so select the Ball PhysicMaterial in your Physics folder
    in the Project View, duplicate it using the Edit menu or Command+D, and name the
    new PhysicMaterial Pin ([Figure 7-8](#9781430248750_Ch07.xhtml#Fig8)).


    ![9781430248750_Fig07-08.jpg](images/9781430248750_Fig07-08.jpg)


    [Figure 7-8](#9781430248750_Ch07.xhtml#_Fig8). A PhysicMaterial for the Pin prefab


    Since the bowling pins should roll just as well as the Ball, leave the Dynamic
    and Static Friction values at 1 (to avoid slippage while rolling), and leave the
    Fiction Combine value at Maximum. Unlike the Ball, however, the bowling pins should
    be fairly bouncy, so set the Bounciness to 0.5 and the Bounce Combine value to
    Average (taking in account the bounciness of whatever it’s bouncing against).Finally,
    it’s time to assign the Pin PhysicMaterial to the Pin prefab. Select the Pin prefab
    in the Project View, and then in the Inspector View, click the circle to the right
    of the PhysicMaterial field of the Collider Component and select the Pin PhysicMaterial
    from the pop-up chooser ([Figure 7-9](#9781430248750_Ch07.xhtml#Fig9)).


    ![9781430248750_Fig07-09.jpg](images/9781430248750_Fig07-09.jpg)


    [Figure 7-9](#9781430248750_Ch07.xhtml#_Fig9). Assigning the Pin PhysicMaterial
    to the Pin prefab


    Now when you click Play and roll the Ball into the pins, they get knocked around,
    as shown in [Figure 7-10](#9781430248750_Ch07.xhtml#Fig10), bouncing and rolling!


    ![9781430248750_Fig07-10.jpg](images/9781430248750_Fig07-10.jpg)


    [Figure 7-10](#9781430248750_Ch07.xhtml#_Fig10). Collision with pins that each
    have a Rigidbody


    Keep Playing


    It’s rather tiresome to have to stop the game and click Play again every time
    you want to test a roll. And when the Ball rolls off the Floor, you’re stuck watching
    the Ball fall indefinitely. So let’s have the Ball, Main Camera, and pins reset
    if the Ball rolls off the edge of the Floor.


    Make It Resettable


    First, you need a script that will restore a GameObject to its initial position
    and rotation (can’t forget rotation—if a pin is knocked down you want to reset
    it to its initial standing orientation). Create a new JavaScript, call it `FuguReset`,
    with the contents of [Listing 7-2](#9781430248750_Ch07.xhtml#list2).


    [Listing 7-2.](#9781430248750_Ch07.xhtml#_list2)  Restoring a GameObject position
    in FuguReset.js


    ```

    #pragma strict


    private var startPos:Vector3;

    private var startRot:Vector3;


    function Awake() {

            // save the initial position and rotation of this GameObject

            startPos = transform.localPosition;

            startRot = transform.localEulerAngles;

    }'
