    ## Send a Message\n\nNormally, calling a function in a script attached to one\
    \ GameObject from a script attached to another GameObject is a little bit tricky.\
    \ It involves calling `GetComponent` on a GameObject to retrieve the script and\
    \ then referencing that script to call the function.\n\nBut in simple cases (e.g.,\
    \ when you don’t care about the return value of the function), Unity allows you\
    \ to call functions by sending messages to GameObjects using either the `SendMessage`\
    \ or `BroadcastMessage` function in the `GameObject` class. A GameObject receiving\
    \ a message, which consists of the name of the function to call, will pass that\
    \ message on to any attached script that might have that function.\n\nLet’s add\
    \ some functions to our game controller script that will send `ResetPosition`\
    \ messages ([Listing 7-3](#9781430248750_Ch07.xhtml#list3)).\n\n[Listing 7-3.](#9781430248750_Ch07.xhtml#_list3)\
    \  Functions to Send ResetPosition Messages in FuguBowl.js\n\n```csharp  \nvar\
    \ ball:GameObject; // the bowling ball\n\nfunction ResetBall() {\n        ball.SendMessage(\"\
    ResetPosition\");\n}\n\nfunction ResetPins() {\n        for (var pin:GameObject\
    \ in pins) {\n                pin.BroadcastMessage(\"ResetPosition\");\n     \
    \   }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"ResetPosition\"\
    );\n}\n\nfunction ResetEverything() {\n        ResetBall();\n        ResetPins();\n\
    \        ResetCamera();\n}\n```\n\nThe additional code begins with a public variable\
    \ that will refer to the Ball. The script already has a pins `Array` that references\
    \ all of the bowling pins, and the Main Camera can always be referenced through\
    \ the static variable `Camera.main`, so now the script can access every GameObject\
    \ that it needs to reset. The functions `ResetCamera` and `ResetBall` call `SendMessage`\
    \ to send the `ResetPosition` message to their respective target GameObjects.\
    \ Every `ResetPosition` function defined in scripts attached to those GameObjects\
    \ will be called. Specifically, since the Main Camera and the Ball have the `FuguReset`\
    \ script attached, the `ResetPosition` function in that script will respond to\
    \ the message.\n\nThe `ResetPins` function is a little bit different in that it\
    \ calls `BroadcastMessage` to send the `ResetPosition` message. `BroadcastMessage`\
    \ behaves the same as `SendMessage` except that the message is also propagated\
    \ to any child GameObjects of the original recipient GameObject. This will be\
    \ useful later in this chapter when we swap in some pins that have their Rigidbodies\
    \ attached to child GameObjects.\n\n`ResetPins` does generate a warning in the\
    \ Console about an *Implicit downcast from ‘Object’ to ‘UnityEngine.GameObject’*\
    \ ([Figure 7-12](#9781430248750_Ch07.xhtml#Fig12)).\n\n![9781430248750_Fig07-12.jpg](images/9781430248750_Fig07-12.jpg)\n\
    \n[Figure 7-12](#9781430248750_Ch07.xhtml#_Fig12). The Console View of an Implicit\
    \ Downcast warning\n\nThe warning appears because `Array` is defined to contain\
    \ elements of type `Object`, but each element is treated as a `GameObject`. That’s\
    \ plausible, since `GameObject` is a subclass of `Object`, but as far as the compiler\
    \ knows, not necessarily true. You can remove the warning by adding `#pragma downcast`\
    \ to the script, which basically tells the compiler, “trust me.”\n\n## Check for\
    \ Gutter Ball\n\nWhen the Ball rolls off the edge of the Floor, it’s essentially\
    \ a gutter ball, since there’s no hope of reaching the pins at this point. So\
    \ a reset of the game is definitely in order when this happens. The gutter ball\
    \ can be implemented by checking in every frame whether the y position of the\
    \ Ball has dropped below a certain level. That can be implemented by adding the\
    \ public variable `sunkHeight` and `Update` callback in [Listing 7-4](#9781430248750_Ch07.xhtml#list4)\
    \ to the `FuguBowl` script.\n\n[Listing 7-4.](#9781430248750_Ch07.xhtml#_list4)\
    \  Update Callback in FuguBowl.js to Test for Gutter Ball\n\n```csharp  \nvar\
    \ sunkHeight:float = -10.0; // global y position which we call a gutterball\n\n\
    function Update() {\n        if (ball.transform.position.y<sunkHeight) {\n   \
    \             ResetEverything();\n        }\n}\n```\n\nThe variable `sunkHeight`\
    \ specifies what y position the Ball has to fall below to reset everything. The\
