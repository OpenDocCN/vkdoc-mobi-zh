    # 添加复合碰撞体


    Unity 允许一个 `GameObject` 上存在多个 `Collider` 组件，但这些 `Collider` 必须是不同类型的。例如，不能将两个 `BoxCollider`
    组件附加到同一个 `GameObject` 上。然而，可以通过将每个原始类型的 `Collider` 组件附加到其自己的 `GameObject` 上，并将所有这些
    `GameObject` 设为 `Rigidbody` 的 `GameObject` 的子级，从而将它们组合成一个复合碰撞体。这就是我们为“桶”（Barrel）组合一个
    `CapsuleCollider` 组件和一个 `BoxCollider` 组件所采用的方法。为了容纳这两个 `Collider` 组件，在层级视图中为 `Barrel`
    创建两个子 `GameObject`，并根据其形状分别命名为 `box` 和 `capsule`（图 7-20）。


    ![9781430248750_Fig07-20.jpg](img/9781430248750_Fig07-20.jpg)


    图 7-20。用于复合碰撞体的子 GameObject


    与其从头创建一个新的 `CapsuleCollider` 组件，不如利用 `Barrel` GameObject 上已经正确定向和调整大小的现有 `CapsuleCollider`
    组件，通过复制该组件来实现。选择 `Barrel` GameObject，在检查器视图中，右键点击 `CapsuleCollider` 组件并选择 `Copy
    Component`（图 7-21）。


    ![9781430248750_Fig07-21.jpg](img/9781430248750_Fig07-21.jpg)


    图 7-21。复制一个组件


    然后再次选择 `capsule` GameObject，在检查器视图中右键点击其变换（Transform）组件，在弹出菜单中选择 `Paste Component
    As New`（图 7-22）。现在，`capsule` GameObject 拥有一个与之前为 `Barrel` GameObject 创建的完全相同的
    `CapsuleCollider` 组件，因此我们不再需要原来的那个了。选择 `Barrel` GameObject，右键点击刚刚复制过的 `CapsuleCollider`
    组件，在弹出菜单中选择 `Remove Component` 来移除该 `CapsuleCollider` 组件。现在，`Barrel` 的层级结构中应该只有一个
    `CapsuleCollider` 组件了。


    ![9781430248750_Fig07-22.jpg](img/9781430248750_Fig07-22.jpg)


    图 7-22。粘贴一个组件


    现在将注意力转向 `BoxCollider` 组件。你可以使用组件菜单将其直接添加到 `box` GameObject 上，但如果你将 `BoxCollider`
    组件添加到 `Barrel` GameObject 上，Unity 会自动为你将 `BoxCollider` 适配网格（Mesh）的大小。因此，让我们重复之前处理
    `CapsuleCollider` 组件的过程，只不过这次换成 `BoxCollider`。选中 `Barrel` GameObject，使用组件菜单或 `AddComponent`
    按钮添加一个 `BoxCollider` 组件。在场景视图中，你可以看到 `BoxCollider` 包裹住了 `Barrel`（图 7-23）。


    ![9781430248750_Fig07-23.jpg](img/9781430248750_Fig07-23.jpg)


    图 7-23。一个围绕 Barrel 自动调整大小的 BoxCollider


    `BoxCollider` 从网格的顶部延伸到底部是可以接受的，因为这样可以在两端获得两个平坦的碰撞表面。但 `BoxCollider` 延伸到 Barrel
    的弯曲部分之外就不太好了。通过在检查器视图中将其 `Size` 的 `x` 和 `y` 值降低到 `2.5`（请记住，Barrel 是旋转过的）来减小 `BoxCollider`
    的宽度。从场景视图的俯视图视角（点击场景万向节（Scene Gizmo）的 `y` 轴），你可以看到 `BoxCollider` 现在正好位于桶的内部（图
    7-24）。


    ![9781430248750_Fig07-24.jpg](img/9781430248750_Fig07-24.jpg)


    图 7-24。BoxCollider 适配在 Barrel 内部的俯视图


    既然已经将 `BoxCollider` 调整到理想大小，重复处理 `CapsuleCollider` 的过程——在检查器视图中右键点击 `BoxCollider`，选择
    `Copy Component`，选择 `box` GameObject，在检查器视图中右键点击其变换组件，选择 `Paste Component As New`。并且不要忘记返回
    `Barrel` 上的 `BoxCollider` 组件，右键点击它并选择 `Remove Component`。选中 `Barrel`，你应该能在场景视图中看到两个
    `Collider` 组件同时显示，它们比单独使用任何一个 `Collider` 组件都能更好地近似 Barrel 的形状（图 7-25）。


    ![9781430248750_Fig07-25.jpg](img/9781430248750_Fig07-25.jpg)


    图 7-25。显示的复合碰撞体中的两个碰撞体


    ## 更新预制件


    最后，既然 Barrel 已经准备就绪，在游戏对象菜单中，选择 `Apply Changes To Prefab`（图 7-26）。


    ![9781430248750_Fig07-26.jpg](img/9781430248750_Fig07-26.jpg)


    图 7-26。将更改应用到 `BarrelPin` 预制件


    **提示** 建议执行 `Save Project` 或 `Save Scene`（这会隐式地执行 `Save Project`），以确保预制件的更改被真正保存。项目更改会在
    Unity 正常退出时保存，但如果异常退出，则一切皆有可能。


    预制件更新后，场景中不再需要 `Barrel` GameObject，可以将其移除（`Command+Delete` 或从编辑（Edit）菜单中选择 `Delete`）。现在当你点击
    `Play` 时，桶不再会从地板掉下去，而且，如图 7-27 所示，当你滚向它们时，它们会被撞倒！


    ![9781430248750_Fig07-27.jpg](img/9781430248750_Fig07-27.jpg)


    图 7-27。撞击到桶上


    ## 复杂碰撞体（HyperBowl）


    为 `BarrelPin` 预制件创建的复合碰撞体仍相对简单，仅由两个原始 `Collider` 组件组成。根据所需近似的形状，复合碰撞体可以复杂得多。作为更真实的保龄球瓶的例子，可以看看
    HyperBowl（图 7-28）。


    ![9781430248750_Fig07-28.jpg](img/9781430248750_Fig07-28.jpg)


    图 7-28。HyperBowl 保龄球瓶的复合碰撞体


    HyperBowl 中保龄球瓶的复合碰撞体由六个原始碰撞体组成：一个 `BoxCollider` 用于提供底部平面，一个 `CapsuleCollider`
    用于瓶颈，以及四个大小不一的 `SphereCollider` 用于填充瓶身和瓶顶。


    ## 添加音效


    我们的保龄球游戏看起来不错了，但非常安静！你可以添加背景音乐或环境音效，例如舞蹈场景中的循环音乐。但保龄球游戏确实需要基于碰撞的音效，例如球的滚动声和每个球瓶的碰撞声。


    ### 获取音效


    首先，我们需要找到一些声音文件。再次访问资源商店（Asset Store），导航到声音（Sound）类别，然后进入音效（Sound Effects (FX)）子类别（图
    7-29）。


    ![9781430248750_Fig07-29.jpg](img/9781430248750_Fig07-29.jpg)


    图 7-29。资源商店中免费音效的搜索结果


    Bleep Blop Audio 的 Free SFX Package 提供了多种多样的音频剪辑，让我们下载这个资源包。这些文件会出现在项目视图（Project
    View）中名为 `Assets` 的文件夹里，该文件夹位于你的 `Assets` 文件夹内（向资源商店提交资源包有点复杂，所以这种文件组织方式可能不是故意的）。


    ### 添加滚动音效


    可以随意选择并播放各种声音，方法是在检查器视图中选中它们并点击 `Play` 按钮。但现在，我们将使用 `Sci-Fi Ambiences` 声音作为球的滚动音效。这个声音作为球滚动音效并不完美，但它在这个资源包中是唯一适合循环播放的
    `AudioClip`（图 7-30）。

