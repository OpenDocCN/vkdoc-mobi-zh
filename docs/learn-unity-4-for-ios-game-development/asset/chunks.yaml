    function WaitForSeconds(waitTime:float) {

            var startTime:float = Time.time;

            while (waitTime > Time.time-startTime) {

                     yield;

            }

    }

    ```


    Note that the specified wait time is game time, not real-world time, so `WaitForSeconds`
    isn’t useful, for example, while the game is paused and game time is stopped.
    But if you need to wait in real seconds, you can use the hypothetical implementation
    of `WaitForSeconds` and replace `Time.time` with `Time.realtimeSinceStartup`,
    which returns the time in real-world seconds since the game was started ([Listing
    12-7](#9781430248750_Ch12.xhtml#list7)).


    [Listing 12-7](#9781430248750_Ch12.xhtml#_list7).  A Real-Time Version of WaitForSeconds


    ```

    function WaitForSecondsRealtime(waitTime:float) {

            var startTime:float = Time.realtimeSinceStartup;

            while (waitTime > Time.realtimeSinceStartup-startTime) {

                     yield;

            }

    }

    ```


    Display the Activity Indicator


    When something is taking a while, it’s nice to have some kind of loading indicator.
    For the initial scene load, there’s a convenient way to display the iOS spinner
    that you often see in apps as an activity indicator. You can enable this by choosing
    one of the activity indicator styles for Show Loading Indicator at the bottom
    of the Resolution and Presentation foldout in the Player Settings ([Figure 12-17](#9781430248750_Ch12.xhtml#Fig17)).
    Given the splash screen is providing a mostly white background, Gray is the best
    style (the other styles are white).


    ![9781430248750_Fig12-17.jpg](images/9781430248750_Fig12-17.jpg)


    [Figure 12-17](#9781430248750_Ch12.xhtml#_Fig17). The Player Settings with Gray
    Show Loading Indicator selected


    Now when you run the game in an iOS build, you’ll see the Gray activity indicator
    spinning on the built-in splash screen.


    Script the Activity Indicator


    It would be nice to use the activity indicator elsewhere, especially when loading
    other levels. Fortunately, Unity has a scripting interface for the activity indicator,
    in the form of static functions in the Handheld class. We just need a script that
    calls those functions to start and stop the activity indicator. Create a new JavaScript
    called `FuguSpinner` and add the contents of [Listing 12-8](#9781430248750_Ch12.xhtml#list8)
    to the script.


    [Listing 12-8](#9781430248750_Ch12.xhtml#_list8).  Starting and Stopping an Activity
    Indicator in FuguSpinner.js


    ```

    #pragma strict


    #if UNITY_IPHONE

    function Start() {

            DontDestroyOnLoad(this.gameObject);

            Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);

            Handheld.StartActivityIndicator();

    }


    function OnLevelWasLoaded() {

            Handheld.StopActivityIndicator();

            Destroy(gameObject);

    }

    #endif

    ```


    In the Start callback, the call to `Handheld.SetActivityIndicatorStyle` specifies
    the appearance of the activity indicator. The available options, represented by
    the iOSActivityIndicatorStyle enum, match the Loading Indicator options available
    in the Player Settings. We’ll choose iOSActivityIndicatorStyle.WhiteLarge, since
    we know the secondary splash screen has a mostly black background.


    The call to `Handheld.StartActivityIndicator` makes the activity indicator visible
    in the center of the screen. The Unity Scripting Reference documentation for `Handheld.StartActivityIndicator`
    says that the activity indicator will be activated after the current frame, so
    you need to `yield` at least a frame before calling `Application.LoadLevel`. Otherwise,
    the indicator won’t appear until after the new level is loaded, which defeats
    the purpose of activating the indicator in the first place. We don’t have to worry
    about that, here, because we know the `FuguSplash` script is yielding for some
    number of seconds before loading the next scene.


    However, the activity indicator will keeps going even after the new scene is loaded
    by `FuguSplash`. To stop the activity indicator after the scene has finished loading,
    this script has to survive the scene load, which is why `DontDestroyOnLoad` is
    called at the beginning of the `Start` function, passing it the GameObject this
    script is attached to. This ensures the GameObject, and thus this script, survives
    when the next scene is loaded.


    Because the GameObject survives the scene load, we can be assured the `MonoBehaviour`
    callback `OnLevelWasLoaded` is called after the new scene has finished loading.
    This is a perfect place to turn off the activity indicator with a call to `Handheld.StopActivityIndicator`.
    At this point, the script and the GameObject it’s attached to aren’t needed, anymore,
    so `Destroy` is called on the GameObject.


    **Tip**   It’s a good practice to destroy objects when you don’t need them anymore.
    Besides freeing up space, you want to avoid the worst case where you loop back
    into the scene where the object was originally created, and then you end up with
    two versions of the same object!


    Note that `DontDestroyOnLoad` and `Destroy` are both static functions in the `Object`
    class, so just as we called `Instantiate` in [Chapter 7](#9781430248750_Ch07.xhtml),
    instead of calling `Object.Destroy`, for example (or `UnityEngine.Object.Destroy`
    to avoid the name clash with `System.Object` class in .NET), here you’re implicitly
    calling `this.Destroy`, which works because this is an `Object`.


    Attach the `FuguSpinner` script to a new GameObject in the scene, called Spinner.
    Now when you Build and Run on a device, the activity indicator appears in the
    center of the splash image and disappears after the next scene has loaded ([Figure
    12-18](#9781430248750_Ch12.xhtml#Fig18)).


    ![9781430248750_Fig12-18.jpg](images/9781430248750_Fig12-18.jpg)


    [Figure 12-18](#9781430248750_Ch12.xhtml#_Fig18). Secondary splash screen with
    an activity indicator


    Explore Further


    Now our bowling game for iOS looks like a real app! It has an icon, a splash screen
    (or two), an activity indicator spinning away on the splash screen, it runs in
    portrait orientation, and the graphics scale to fit the screen including the UnityGUI
    scoreboard and pause menu. The menu is even automatically functional in iOS, with
    its buttons responding to taps on the screen. We can’t quite say that about the
    actual gameplay, but we’ll implement touchscreen game controls in the next chapter.


    Reference Manual


    Once again, we’ve spent some time in the Player Settings (a recurring theme now
    that we’re making iOS builds), so the Reference Manual documentation on the Player
    Settings is worth a review.


    We used just one new Component in this chapter, a GUITexture Component for our
    splash screen image. `GUITexture` and its parent class `GUIElement` have no relation
    to UnityGUI (in fact, GUITexture and its sibling GUIText were the closest things
    to user interface elements before UnityGUI arrived).


    This chapter was devoted largely to icon and splash screen images, which should
    all be imported using the GUI preset import settings, which are documented fo
    Texture2D in the Asset Components section.


    Scripting Reference


    The one new UnityGUI feature introduced in this chapter was the “matrix” variable
    in the “GUI” class. At the time of this writing, the Scripting Reference page
    for that variable is nearly blank, but the “GUIUtility” class has some better-documented
    functions, including “ScaleAroundPivot”, which can be used as an alternative to
    setting `GUI.matrix` (in fact, it is a helper function that sets `GUI.matrix`
    internally.


    We only used the “Matrix4x4.TRS” constructor, but the Scripting Reference documentation
    on “Matrix4x4” is not bad, explaining how matrices are used in Unity and listing
    many class functions that will be useful if you ever have to start messing around
    with matrices.'
  trans: "```csharp\nfunction WaitForSeconds(waitTime:float) {\n        var startTime:float\
    \ = Time.time;\n        while (waitTime > Time.time-startTime) {\n           \
    \      yield;\n        }\n}\n```\n\n注意，指定的等待时间是游戏时间而非真实世界时间，因此`WaitForSeconds`在游戏暂停且游戏时间停止时无实用价值。但若需按真实秒数等待，可使用假设实现的`WaitForSeconds`，将`Time.time`替换为`Time.realtimeSinceStartup`（返回游戏启动以来的真实世界秒数）（清单\
    \ 12-7）。\n\n清单 12-7.  `WaitForSeconds`的实时版本\n\n```csharp\nfunction WaitForSecondsRealtime(waitTime:float)\
    \ {\n        var startTime:float = Time.realtimeSinceStartup;\n        while (waitTime\
    \ > Time.realtimeSinceStartup-startTime) {\n                 yield;\n        }\n\
    }\n```\n\n## 显示活动指示器\n\n当某些操作需要耗时执行时，最好能有某种加载指示器。对于初始场景加载，有一种便捷方式可显示 iOS 应用中常见的旋转指示器。在玩家设置（Player\
    \ Settings）的“分辨率与演示”折叠面板底部的“显示加载指示器”选项中，选择一个活动指示器样式即可启用该功能（图 12-17）。由于启动画面提供的是偏白色背景，灰色（Gray）是最佳样式（其他样式为白色）。\n\
    \n![9781430248750_Fig12-17.jpg](img/9781430248750_Fig12-17.jpg)\n\n图 12-17. 玩家设置中选中灰色显示加载指示器\n\
    \n现在，当你在 iOS 构建版本中运行游戏时，将看到灰色活动指示器在内置启动画面上旋转。\n\n## 编写活动指示器脚本\n\n能在其他场景（尤其在加载其他关卡时）使用活动指示器将非常理想。幸运的是，Unity\
    \ 通过`Handheld`类中的静态函数提供了活动指示器的脚本接口。我们只需编写一个调用这些函数来启动和停止活动指示器的脚本。新建一个名为`FuguSpinner`的\
    \ JavaScript 文件，并将清单 12-8 的内容添加到脚本中。\n\n清单 12-8.  在`FuguSpinner.js`中启动和停止活动指示器\n\
    \n```csharp\n#pragma strict\n\n#if UNITY_IPHONE\nfunction Start() {\n        DontDestroyOnLoad(this.gameObject);\n\
    \        Handheld.SetActivityIndicatorStyle(iOSActivityIndicatorStyle.WhiteLarge);\n\
    \        Handheld.StartActivityIndicator();\n}\n\nfunction OnLevelWasLoaded()\
    \ {\n        Handheld.StopActivityIndicator();\n        Destroy(gameObject);\n\
    }\n#endif\n```\n\n在`Start`回调中，调用`Handheld.SetActivityIndicatorStyle`指定活动指示器的外观。可用的选项由`iOSActivityIndicatorStyle`枚举表示，与玩家设置中的加载指示器选项匹配。我们选择`iOSActivityIndicatorStyle.WhiteLarge`，因为我们知道第二个启动画面主要是黑色背景。\n\
    \n调用`Handheld.StartActivityIndicator`可使活动指示器在屏幕中央显示。Unity 脚本参考文档对`Handheld.StartActivityIndicator`的说明指出，活动指示器将在当前帧之后激活，因此在调用`Application.LoadLevel`前，至少需要`yield`一帧。否则，指示器只有在加载新关卡后才会出现，这违背了激活指示器的初衷。这里我们无需担心此问题，因为`FuguSplash`脚本在加载下一场景前会进行若干秒的`yield`。\n\
    \n然而，即使新场景被`FuguSplash`加载后，活动指示器仍会继续旋转。为在场景加载完成后停止活动指示器，此脚本必须能在场景加载过程中保持存活，因此在`Start`函数开头调用了`DontDestroyOnLoad`，并将此脚本所附加的游戏对象传递给它。这确保了该游戏对象（以及此脚本）在加载下一场景时得以存活。\n\
    \n由于游戏对象在场景加载过程中存活，我们可以确保新场景加载完成后会调用`MonoBehaviour`回调`OnLevelWasLoaded`。此处是调用`Handheld.StopActivityIndicator`关闭活动指示器的理想位置。此时，脚本及其附加的游戏对象不再需要，因此对游戏对象调用了`Destroy`。\n\
    \n**提示**   不再需要对象时将其销毁是一个好习惯。除了释放空间外，还能避免最坏情况：当你循环回到对象最初创建的场景时，最终会得到同一对象的两个版本！\n\
    \n请注意，`DontDestroyOnLoad`和`Destroy`都是`Object`类中的静态函数，因此正如我们在第 7 章中调用`Instantiate`时那样，这里不显式调用`Object.Destroy`（或为避免与.NET\
    \ 中`System.Object`类名冲突而使用`UnityEngine.Object.Destroy`），而是隐式调用`this.Destroy`，因为`this`是一个`Object`。\n\
    \n将`FuguSpinner`脚本附加到场景中名为 Spinner 的新游戏对象上。现在在设备上构建并运行，活动指示器将出现在启动画面中央，并在下一场景加载完成后消失（图\
    \ 12-18）。\n\n![9781430248750_Fig12-18.jpg](img/9781430248750_Fig12-18.jpg)\n\n\
    图 12-18. 带有活动指示器的第二个启动画面\n\n## 进一步探索\n\n现在，我们的 iOS 保龄球游戏看起来像真正的应用了！它具有图标、启动画面（或两个）、启动画面上旋转的活动指示器、以竖屏方向运行，并且图形能适配屏幕，包括\
    \ UnityGUI 记分板和暂停菜单。甚至菜单在 iOS 中也能自动工作，按钮能响应屏幕点触。虽然还不能完全说游戏玩法也是如此，但我们将在下一章实现触摸屏游戏控制。\n\
    \n## 参考手册\n\n我们再次在玩家设置中花费了一些时间（现在制作 iOS 构建版本时，玩家设置成为反复出现的主题），因此值得回顾关于玩家设置的参考手册文档。\n\
    \n本章只使用了一个新组件：用于启动画面图像的`GUITexture`组件。`GUITexture`及其父类`GUIElement`与 UnityGUI 无关（事实上，在\
    \ UnityGUI 出现之前，`GUITexture`及其兄弟`GUIText`是最接近用户界面元素的东西）。\n\n本章主要致力于图标和启动画面图像，这些图像应使用\
    \ GUI 预设导入设置导入，该设置在资产组件部分的`Texture2D`文档中有说明。\n\n## 脚本参考\n\n本章介绍的唯一 UnityGUI 新特性是`GUI`类中的`matrix`变量。撰写本文时，该变量的脚本参考页面几乎为空白，但`GUIUtility`类有一些文档更完善的函数，包括`ScaleAroundPivot`，该函数可作为设置`GUI.matrix`的替代方案（实际上，它是一个内部设置`GUI.matrix`的辅助函数）。\n\
    \n我们只使用了`Matrix4x4.TRS`构造函数，但关于`Matrix4x4`的脚本参考文档质量不错，解释了 Unity 中矩阵的用法，并列举了许多类函数，当你需要开始处理矩阵时，这些函数会很有用。\n\
    ```"
- fmt: '# The `yield` instruction `WaitForSeconds` was already introduced in [Chapter
    8](#9781430248750_Ch08.xhtml) for the game over state, and it turns out to be
    convenient for displaying a splash screen a certain number of seconds. We took
    this opportunity to explore hypothetical implementations of `WaitForSeconds` and
    compare the static `Time` variables `Time.time` and `Time.realTimeSinceStartup`.
    It’s an important distinction when the pause menu is up and game time is suspended.


    We called the static `Application` function `LoadLevel` to transition from the
    splash scene to the bowling scene, but we also could have called an asynchronous
    version of the function, `Application.LoadLevelAsync`. As an asynchronous function,
    it doesn’t suspend Unity while it’s loading a new scene, so, really, you could
    have anything happen in the splash scene while waiting for the new scene to finish
    loading.


    As demonstrated with our use of the activity indicator functions in the `Handheld`
    class, you can make Objects survive across scenes loads by calling `DontDestroyOnLoad`
    on them and `Destroy` them when they’re not needed anymore. These are both static
    functions in the `Object` class, which is always worth reading up on since it’s
    the parent class of everything that can be in a scene.


    To display and hide the activity indicator, we called the `StartActivityIndicator`
    and `StopActivityIndicator` functions in the `Handheld` class. See the documentation
    on the activity indicator functions about the necessity to yield before performing
    a scene load. `iOSActivityIndicatorStyle` enumeration for a list of the available
    activity indicator styles.


    The `Handheld` class is worth a looking over, as it contains all the scriptable
    Unity mobile features (except those specific to iOS). For example, the `Handheld`
    class has a static `PlayFullScreenMovie` function that can play a movie from local
    storage or streamed from a web site, which is another possibility for a cool-looking
    splash scene. The Scripting Reference page for that function has details on the
    supported video formats and how to control the movie player (based, at the time
    of this writing, on the native iOS movie player, `MPMoviePlayerController`).


    ## iOS Developer Library


    As we explore Unity iOS features, more and more of the documentation in the iOS
    Developer Library is relevant. Remember, that documentation is available both
    on the Apple Developer site (`http://developer.apple.com/`) and from the Xcode
    Organizer window.


    One document worth reading in its entirety, found in the `User Experience` topic
    of the iOS Developer Library, is Apple’s iOS Human Interface Guidelines. The original
    guidelines dating back to the original Mac were the gold standard in user interface
    best practices. Since then, the guidelines have been split into Mac and iOS versions,
    but you should read the iOS version if only to avoid app rejections. Related to
    this chapter, the Custom Icon and Image Creation Guidelines lists requirements
    and recommendations for creating app icons and splash screens (known as `launch
    images` in their terminology).


    Many Unity classes that are mobile-specific or iOS-specific will have an Objective-C
    counterpart. For example, the activity indicator controlled by Unity’s `Handheld`
    class is accessed in Objective-C via the `UIActivityIndicatorView` class, also
    found in the User Experience topic in the Windows and Views section.


    ## Asset Store


    The Transitions Manager from DFT Games, available free on the Unity Asset Store,
    provides more sophisticated introductory screen behavior than what has been described
    in this chapter, including fading the screen in and out and using multiple screens.
    I use the Transitions Manager in all my apps.


    ## Books


    Josh Clark’s *Tapworthy: Designing Great Apps* is the book that convinced me to
    eschew automatic icon gloss and always select Prerendered Icon in the Unity Player
    Settings. It’s also a good treatment of app design in general.


    There are plenty of textbooks on linear algebra (and even a hefty `matrix` article
    on `http://wikipedia.org/`), but any computer graphics book will have a primer
    on matrix math. For example, Real-Time Rendering (`http://realtimerendering.com/`)
    has an appendix on `Some Linear Algebra`.


    # Chapter 13


    ## Handling Device Input


    Although our bowling game is up and running on iOS, it’s not quite in a playable
    state, because we don’t have any working player controls. Which brings us to the
    issue of input handling, perhaps the most obvious difference between desktop and
    mobile games.


    Instead of reading the mouse or keyboard, an iOS game has to use one of its device
    sensors, typically the touchscreen (tapping and swiping) or accelerometer (shaking
    and tilting). We’ll opt for touchscreen input to control the bowling ball, but
    we’ll do some shake detection with the accelerometer and play with the device
    camera a little bit, too.


    The project for this chapter on `http://learnunity4.com/` has the script changes
    introduced in this chapter, and no other assets are added. This is true for the
    remainder of this book. It’s all scripting from here on out!


    ### The Touch Screen


    UnityGUI already works with the touchscreen in iOS, so if you Build and Run our
    bowling game on a device right now, or test it with the Unity Remote in the Editor,
    you can operate the initial menu by tapping the buttons. When you tap the Play
    button on the pause menu, the bowling ball drops. So far, so good.


    But what about the bowling ball control? `Input.GetAxis` does return values when
    swiping on the screen, but the results are unlikely to be exactly what you want
    (in older versions of Unity iOS, `Input.GetAxis` was not functional at all). In
    any case, we need to first define how the control will work in the iOS version
    of the bowling game.


    #### Swipe the Ball


    For Fugu Bowl, we’ll adopt the touchscreen control that I use for HyperBowl. The
    player pushes the ball in a certain direction by swiping along the screen in that
    direction. Swiping up on the screen will push the ball forward, swiping down will
    push the ball back, swiping left will roll it left, and swiping right will roll
    it right.


    The swipe control scheme is similar enough to the mouse controls that we can work
    within the framework of the existing `FuguBowlForce` script. Bring up that script
    and add some new public variables, `swipepowerx` and `swipepowery`, so we can
    adjust the swipe power, just like we did with the mouse control ([Listing 13-1](#9781430248750_Ch13.xhtml#list1)).


    [Listing 13-1](#9781430248750_Ch13.xhtml#_list1). Adjustment Variables for Swipe
    Control in `FuguBowlForce.js`


    ```

    var swipepowerx:float = 0.1;

    var swipepowery:float = 0.08;

    ```


    We added new variables instead of reusing `mousepowerx` and `mousepowery` so that
    we can switch between the standalone and iOS build targets without clobbering
    the power adjustment values for each platform. The properties for both will always
    show up in the Inspector View ([Figure 13-1](#9781430248750_Ch13.xhtml#Fig1)).


    ![9781430248750_Fig13-01.jpg](images/9781430248750_Fig13-01.jpg)


    [Figure 13-1](#9781430248750_Ch13.xhtml#_Fig1). Control adjustments for both desktop
    and iOS in `FuguBowlForce.js`


    The big change is our `CalcForce` function, which gets called by our `Update`
    callback once per frame. On iOS, instead of calling the static function `Input.GetAxis`
    to see how much the mouse has been moved, `CalcForce` calls the static function
    `Input.GetTouch` to check for swipes. The `UNITY_IPHONE` preprocessor definition
    makes sure the new code exists only on iOS and the old code on any other platform
    ([Listing 13-2](#9781430248750_Ch13.xhtml#list2)).


    [Listing 13-2](#9781430248750_Ch13.xhtml#_list2). Detecting Swipes in `FuguBowlForce.js`'
