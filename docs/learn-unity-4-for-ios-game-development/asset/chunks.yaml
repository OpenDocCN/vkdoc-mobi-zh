- fmt: 'For example, in [Figure 11-16](#9781430248750_Ch11.xhtml#Fig16), I have the
    info for our modified Angry Bots project, renamed Fugu Bots. The wildcard ID `com.technicat.*`
    and suffix `FuguBot` matches the bundle ID `com.technicat.FuguBot` I have in the
    Unity Player Settings.


    ![9781430248750_Fig11-16.jpg](images/9781430248750_Fig11-16.jpg)


    [Figure 11-16](#9781430248750_Ch11.xhtml#_Fig16). Specifying the app name and
    bundle ID on iTunes Connect


    The default language indicates the primary language you’ll be using for all the
    assets and descriptions you’re submitting with this app.


    The `SKU Number` can be anything you want, but it has to be unique among your
    apps and should be readily identifiable with your app if you see it in reports.


    ## Availability and Price


    Upon continuing from the `App Information` page, iTunes Connect will ask you to
    specify the price of the app and when you would like the app to become available
    on the App Store ([Figure 11-17](#9781430248750_Ch11.xhtml#Fig17)).


    ![9781430248750_Fig11-17.jpg](images/9781430248750_Fig11-17.jpg)


    [Figure 11-17](#9781430248750_Ch11.xhtml#_Fig17). Setting the app availability
    and price on iTunes Connect


    The availability is contingent on when Apple approves the app, so if you specify
    an availability date one week from the day the app is submitted and the approval
    takes two weeks, then it will be made available on the approval date. If you want
    the app released as soon as possible, just use the default date, which is the
    day you’re entering this information.


    The prices range from free to $.99 to $1.99 to $2.99 and so on. There’s no need
    to worry too much about charging the right price, it can be changed anytime later.


    The next page is the kitchen sink of this process. Most of the app information
    is added here, and, fortunately, this huge form is broken into sections.


    ## Version, Category, and Copyright


    The first section is the version number, copyright, and category information ([Figure
    11-18](#9781430248750_Ch11.xhtml#Fig18)).


    ![9781430248750_Fig11-18.jpg](images/9781430248750_Fig11-18.jpg)


    [Figure 11-18](#9781430248750_Ch11.xhtml#_Fig18). The app version, category, and
    copyright information on iTunes Connect


    The version number must match the version number specified in the Unity Player
    Settings.


    The copyright field should be filled in with the name of the copyright holder,
    normally you or your company. Don’t add any extraneous Copyright text; that will
    be added automatically in the App Store.


    Select the appropriate category and subcategories. You might as well also select
    a secondary category to increase the exposure of your app.


    ## Rate the App


    The `Rating` section is pretty straightforward ([Figure 11-19](#9781430248750_Ch11.xhtml#Fig19)).
    Fill it out, it’s all mandatory.


    ![9781430248750_Fig11-19.jpg](images/9781430248750_Fig11-19.jpg)


    [Figure 11-19](#9781430248750_Ch11.xhtml#_Fig19). Setting the app content rating
    in iTunes Connect


    If the ratings don’t match the content, at least in Apple’s eyes, the app may
    be rejected. For example, I tried submitting a version of Angry Bots and had the
    app rejected because the game has shooting, albeit against irate automata, and
    according to Apple that qualifies as Realistic Violence that should be marked
    as Frequent/Intense.


    ## Metadata


    The `Metadata` section is the most important for marketing ([Figure 11-20](#9781430248750_Ch11.xhtml#Fig20)).


    ![9781430248750_Fig11-20.jpg](images/9781430248750_Fig11-20.jpg)


    [Figure 11-20](#9781430248750_Ch11.xhtml#_Fig20). The product description for
    the app in iTunes Connect


    This section includes the description of your app as it will appear on the App
    Store and keywords that help your app show up in searches on the App Store.


    ## Upload the Icon and Screenshots


    Finally, this is where you upload the icon and screenshots you prepared earlier
    ([Figure 11-21](#9781430248750_Ch11.xhtml#Fig21)). The icon must be 1024 × 1024
    and resemble the app icons that are built into the app or the app may get rejected
    by Apple.'
