    请注意，`Ice`的摩擦力值特别低。`动态摩擦力`是一个物体在另一个物体上滑动时产生的摩擦力。`静摩擦力`则是物体静止在另一个物体上所受到的摩擦力。摩擦力的范围是
    0-1，其中 0 表示无摩擦，1 表示完全无法滑动。`Ice`的`弹性`值也为 0，这很合理，因为冰本身不会弹跳。而`弹性物理材质`则具有最大的`弹性`值，即
    1。


    当两个带有不同`物理材质`的`游戏对象`发生碰撞时会发生什么？它们的`摩擦力`和`弹性`值会分别根据`摩擦力组合`和`弹力组合`的值进行合并。`Bouncy`的`摩擦力组合`值表明：当它与另一个`物理材质`碰撞或滑动时，所使用的摩擦力是两个摩擦材质数值的平均值。而`Bouncy`的`弹力组合`值则指定：将会使用这两个`物理材质`中最大的弹力值（由于`Bouncy`本身已有最大弹力值
    1，因此结果始终会是这个值）。


    你可能会想，如果两个`物理材质`的组合值不同（例如`Bouncy`和`Ice`），会使用哪一个呢？嗯，截至撰写本文时，这其实并没有官方的正式文档说明，但优先级顺序从低到高似乎是：`平均`、`相乘`、`最小值`和`最大值`。因此，如果`Bouncy`和`Ice`发生碰撞，结果将是`最小值`摩擦力，即`Ice`的`0.1`摩擦力，以及`最大值`弹力，即`Bouncy`的`1`弹力。这正是我们所预期的结果！


    在`物理材质`的`检视面板`中显示的最后三个属性支持各向异性摩擦力，这意味着在不同方向上具有不同的摩擦力值。如果`摩擦力方向`属性被填充了一个非零向量，那么次级的静态和动态摩擦力将在该方向上生效。对于木质纹理的`地板`，你可以指定一个沿着木材纹理方向的次级摩擦力方向，并沿着该方向设置较低的静态和动态摩擦力值。


    ## 应用`物理材质`


    你可以将任意标准`物理材质`拖放到`地板`和`球体`的`碰撞器`的`材质`字段中，或者点击`碰撞器`的`材质`字段右侧的小圆圈，从弹出窗口中选择（见图 6-23）。你也可以将`物理材质`从`项目视图`拖放到`检视面板`中的`游戏对象`上，这样`物理材质`就会出现在正确的位置，即`碰撞器`组件的`材质`字段中。


    ![9781430248750_Fig06-23.jpg](img/9781430248750_Fig06-23.jpg)


    图 6-23. 为`球体`添加`弹性物理材质`


    现在，请尝试在`地板`和`球体`上使用不同的`物理材质`。为`球体`选择`弹性物理材质`，为`地板`选择`金属`材质。然后点击`播放`，观看`球体`弹跳、弹跳再弹跳；接着将`球体`的材质切换为`Ice`，观看`球体`砰的一声落地。


    除了在`碰撞器`组件中来回切换不同的`物理材质`，你也可以直接调整`物理材质`本身。例如，你可以在`项目视图`中选中`弹性物理材质`，然后在`检视面板`中编辑其属性。但由于这些`物理材质`属于`标准资源`包，如果你重新导入该包（无论是意外还是因升级而有意为之），它们可能会被替换。此外，如果一个`物理材质`被多个`游戏对象`使用，更改其属性将会影响到所有这些`游戏对象`。


    这里一个干净且安全的解决方案是，为每一个需要`物理材质`的`游戏对象`创建一个新的。从概念上讲，当某个对象需要一个独特的`材质`时，你同样会期望它有一个独特的`物理材质`。或者换句话说，一个独特的表面应该拥有它自己的`材质`和`物理材质`。例如，`球体`和`地板`应各自拥有自己的`物理材质`，而所有的保龄球瓶（将在下一章中创建）则应共享同一个`物理材质`。


    ## 创建新的`物理材质`


    在创建新的`物理材质`之前，出于组织目的，你应该创建一个文件夹来存放它们。在`项目视图`的左侧面板中选择顶层`Assets`文件夹，然后使用`项目视图`中的`创建`菜单，创建一个新文件夹并将其命名为“Physics”（这个名字比“PhysicMaterials”更短，拼写也更不奇怪）。


    你可以使用`项目视图`中的`创建`菜单创建一个全新的`物理材质`，然后在`检视面板`中填充新`物理材质`的所有属性。但是，你可以通过从`标准资源`中复制一个`物理材质`来节省一些工作量，最好复制一个与你想要的效果接近的材质。鉴于`地板`采用的是木质`材质`，从`标准资源`中的`木材物理材质`入手会比较方便。在`项目视图`中选中`木材物理材质`，然后从`编辑`菜单中调用`复制`命令（或使用键盘快捷键`Command+D`）来复制一份。


    将复制的`木材物理材质`拖放到`项目视图`中新创建的`Physics`文件夹中，并将其重命名为“Floor”，因为你将把它应用于你的`地板`游戏对象。然后，再复制一份`Floor
    物理材质`，并将其命名为`Ball`（图 6-24），因为你将把它应用于你的`球体`游戏对象。


    ![9781430248750_Fig06-24.jpg](img/9781430248750_Fig06-24.jpg)


    图 6-24. 自定义`物理材质`


    现在，`地板`和`球体`各有了一份`物理材质`。要将这些`物理材质`用于它们对应的`游戏对象`，请将`Floor 物理材质`拖放到`层级视图`中的`地板`游戏对象上，并将`Ball
    物理材质`拖放到`球体`游戏对象上（你可能需要检查`检视面板`中两个`游戏对象`，以确认`物理材质`已出现在`碰撞器`的`材质`字段中）。现在，你可以开始调整`物理材质`的属性了。


    正如预期的那样，`木材物理材质`的值已经适合木地板，所以你可以保持原样。但你想调整`球体物理材质`，因此选中`Ball 物理材质`，并按照图 6-25 所示设置其值。


    ![9781430248750_Fig06-25.jpg](img/9781430248750_Fig06-25.jpg)


    图 6-25. `球体物理材质`的调整后数值


    `球体`不应该在`地板`上弹跳（或者在你后续添加保龄球瓶时，也不应弹离它们），所以将`弹性`值设置为 0，并将`弹力组合`设置为`最小值`，这将确保`球体`无论与什么碰撞都完全不会弹跳。然后，将`动态摩擦力`和`静摩擦力`值设置为
    1，并将`摩擦力组合`设置为`最大值`，这样`球体`在静止或滚动时始终具有最大摩擦力。最大的摩擦力值确保了`球体`滚动而非滑动。


    现在，当你点击`播放`时，`球体`应该会直接落在`地板`上，然后停止，不再弹跳。


    ## 让它滚动起来


    为了让球滚动起来，你需要为游戏添加一些控制（实际上，这样它才能成为一款游戏）。原版街机游戏`HyperBowl`是由一个真实保龄球控制的，该球充当一个大轨迹球。旋转这个球会使得游戏中的球产生旋转（这导致在尝试在旧金山的山坡上打保龄球时，玩家的身体会产生滑稽的动作）。

    '
- fmt: "当然，建立一个空气支撑的保龄球外设超出了本书的范围，但PC版的`HyperBowl`提供了基于鼠标的控制方式：推动鼠标会向该方向给球施加一个旋转力。只需一个脚本就能相当直接地实现这种控制。\n\
    \n创建脚本\n\n在项目视图中选择`Scripts`文件夹，使用项目视图左上角的创建按钮新建一个JavaScript脚本，并将其命名为`FuguForce`，因为您将用它向球施加一个力（我很想为了寿司的寓意把它命名为`FuguRoll`，但我不希望名字暗示我们正在施加一个力矩，即旋转力而非线性力）。然后将`FuguForce`脚本拖拽到层级视图中的球（`Ball`）上，这样一旦您向脚本中添加一些代码，就可以准备测试了。\n\
    \n更新：收集输入\n\n试图通过计算旋转和平移（位置变化）来模拟球的滚动会非常复杂，这涉及到与地板和球瓶的碰撞检测及响应，还要考虑重力、摩擦力和反弹……所有物理引擎已经完成的计算。不让Unity物理系统来处理这方面的工作将是一种浪费。\n\
    \n因为球已经有一个刚体组件（`Rigidbody Component`），它已经是一个受重力等力影响、并会响应碰撞（包括与地板的碰撞）的物理对象。所以，滚动球所需要的就是一个推力。推力的大小取决于输入，在我们的设计中，输入就是鼠标的移动。\n\
    \n**注意**  原始的、非Unity版本的`HyperBowl`向保龄球施加了一个力矩（旋转力），使其旋转。Unity确实有一个用于向刚体施加力矩的脚本函数`Rigidbody.AddTorque`，但我发现，在Unity中通过使用`Rigidbody.AddForce`施加线性力来滚动球效果更好。\n\
    \n鼠标移动以及一般的输入，可以在每一帧进行检查，因此输入收集代码和相应推力的计算应该放在脚本的`Update`回调函数中，如[列表6-1](#9781430248750_Ch06.xhtml#list1)所示。将该列表中的代码复制到`FuguForce`脚本中。\n\
    \n[列表6-1.](#9781430248750_Ch06.xhtml#_list1)`FuguForce.js`中的`Update`回调函数\n\n```\n\
    #pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float = 1.0;\n\n\
    private var forcex:float=0.0;\nprivate var forcey:float=0.0;\n\nfunction Update()\
    \ {\n        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
    \        forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n\
    ```\n\n脚本以变量`mousepowerx`和`mousepowery`开始，用于缩放施加到球上的力。`mousepowerx`影响左右移动鼠标所产生的力，而`mousepowery`影响前后移动鼠标所产生的力。这些变量是公开的，因此可以在检查器视图（`Inspector\
    \ View`）中调整它们。\n\n最终计算出的力存储在私有变量`forcex`和`forcey`中，它们也分别对应于左右和前后方向的鼠标移动。\n\n**提示**  始终在变量声明中指定初始值是一个好习惯。这会使代码的含义更清晰，并避免因对初始值的错误假设而导致错误（C和C++程序员尤其知道要警惕未初始化变量带来的神秘错误）。\n\
    \n`Update`回调函数就是根据`mousepowerx`、`mousepowery`和鼠标移动来计算`forcex`和`forcey`的地方。在Unity中，使用`Input`类来查询输入。例如，可以通过检查静态变量`Input.mousePosition`来获取鼠标位置，因此鼠标移动可以通过在每次`Update`调用中保存鼠标位置，并将当前位置与上一帧保存的位置进行比较来确定。\n\
    \n但是，更高级的`Input.GetAxis`函数已经完成了这项工作。`Input.GetAxis`根据传递给函数的参数，为鼠标、摇杆或键盘的左右或前后移动返回一个从-1到1的值。\n\
    \n在`Update`回调函数中，调用了`Input.GetAxis(\"Mouse X\")`来获取上一帧发生的左右鼠标移动，并调用了`Input.GetAxis(\"\
    Mouse Y\")`来获取前后移动。在考虑了帧期间经过的时间（我们的老朋友`Time.deltaTime`）并乘以缩放因子`mousepowerx`和`mousepowery`之后，结果分别赋值给了变量`forcex`和`forcey`。\n\
    \n将这段代码放入`FuguForce`脚本后，您可以在球的检查器视图中看到公开的`mousepower`变量（[图6-26](#9781430248750_Ch06.xhtml#Fig26)）。\n\
    \n![9781430248750_Fig06-26.jpg](images/9781430248750_Fig06-26.jpg)\n\n[图6-26](#9781430248750_Ch06.xhtml#_Fig26).\
    \ 带有`FuguForce.js`脚本的球\n\n当您点击播放时，您仍然无法控制球，因为您还没有添加实际的推球代码。但是，如果您在检查器视图菜单中选择调试选项，私有变量`forcex`和`forcey`将会显示出来，并且当您移动鼠标时，您可以看到它们的变化。\n\
    \n`FixedUpdate`：使用力\n\n影响物理的函数，包括`Rigidbody.AddForce`，应该在`FixedUpdate`回调函数中调用。与每一帧调用一次且可能花费任意时间的`Update`回调函数不同，`FixedUpdate`回调函数在每个固定的时间步长过去后执行。为了获得良好效果，物理模拟需要以固定间隔运行，通常比`Update`更频繁。物理计算之间的可变间隔会导致行为变化以及物理更新之间的长时间延迟。在Unity中，这个时间步长在时间管理器（`TimeManager`）中设置（[图6-27](#9781430248750_Ch06.xhtml#Fig27)），该管理器位于编辑菜单的项目设置子菜单中。\n\
    \n![9781430248750_Fig06-27.jpg](images/9781430248750_Fig06-27.jpg)\n\n[图6-27](#9781430248750_Ch06.xhtml#_Fig27).\
    \ 时间管理器\n\n`FixedUpdate`回调函数在这些物理更新间隔被调用（我把`FixedUpdate`视为`PhysicsUpdate`，把固定时间步长视为物理时间步长），因此这是任何对物理模拟的更改（特别是对刚体的任何操作）应该发生的地方。\n\
    \n由于推动球的力已经在`Update`回调函数中计算好了，`FixedUpdate`回调函数只需要在球的刚体组件上调用`Rigidbody.AddForce`来应用这些值即可（[列表6-2](#9781430248750_Ch06.xhtml#list2)）。\n\
    \n[列表6-2.](#9781430248750_Ch06.xhtml#_list2)`FuguForce.js`中的`FixedUpdate`回调函数\n\
    \n```\nfunction FixedUpdate() {\n        rigidbody.AddForce(forcex,0,forcey);\n\
    }\n```\n\n在变量`rigidbody`上调用了刚体函数`AddForce`，`rigidbody`是一个组件变量，它始终引用此游戏对象的刚体组件。`GameObject`类也有一个`rigidbody`变量，因此引用`gameObject.rigidbody`是等效的。\n\
    \n传递给`RigidBody.AddForce`的三个值分别是力的x、y和z分量，因为力有方向和大小，所以它是一个向量。力的方向是世界空间中的，从本游戏主摄像机的视角来看，x是左右方向，z是前后方向。因此，`forcex`被传递给x参数，`forcey`被传递给z参数。这些控制不会上下推动球，只会向前和侧向推动，所以y参数传递了0。"
  raw: 'Of course, building an air-supported bowling ball peripheral is outside the
    scope of this book, but the PC version of HyperBowl provided a mouse-based version
    of this control, in which pushing the mouse would impart a spin on the ball in
    that direction. This control is fairly straightforward to implement with just
    a single script.


    Create the Script


    Select the Scripts folder in the Project View, create a new JavaScript using the
    Create button on the top left of the Project View, and name the new script `FuguForce`,
    since you’ll be using it to apply a force to the Ball (I’m tempted to call it
    `FuguRoll` for the sushi connotation, but I don’t want the name to imply that
    we’re applying a torque, a rotational rather than a linear force). Then drag the
    `FuguForce` script onto the Ball in the Hierarchy View, so you’ll be ready to
    test it as soon as you add some code to the script.


    Update: Gather Input


    Attempting to calculate rotations and translations (changes in position) to simulate
    rolling the Ball would be complicated, involving collision detection and responses
    with the floor and pins, taking in account gravity and friction and bouncing…all
    the calculations that the physics engine already does. It would be a waste not
    to leave that aspect up to the Unity physics system.


    And because the Ball already has a Rigidbody Component, it is already a physical
    object subject to forces, including gravity, and responding to collisions, including
    the Floor. So all that’s needed to roll the Ball is a push. How much of a push
    depends on the input, which, in our design, is the movement of the mouse.


    **Note**   The original, non-Unity version of HyperBowl applied a torque (rotational
    force) to the bowling ball, effectively spinning it. Unity does have a script
    function to apply torque to a Rigidbody, `Rigidbody.AddTorque`, but I’ve found
    that it works better in Unity to roll the ball by pushing it with a linear force
    using `Rigidbody.AddForce`.


    The mouse movement, and input in general, can be checked every frame, so the input
    gathering code and computation of the corresponding push should go in the `Update`
    callback of the script, as shown in [Listing 6-1](#9781430248750_Ch06.xhtml#list1).
    Copy that listing into the `FuguForce` script.


    [Listing 6-1.](#9781430248750_Ch06.xhtml#_list1)  Update Callback in FuguForce.js


    ```

    #pragma strict

    var mousepowerx:float = 1.0;

    var mousepowery:float = 1.0;


    private var forcex:float=0.0;

    private var forcey:float=0.0;


    function Update() {

            forcex = mousepowerx*Input.GetAxis("Mouse X")/Time.deltaTime;

            forcey = mousepowery*Input.GetAxis("Mouse Y")/Time.deltaTime;

    }

    ```


    The script begins with variables `mousepowerx` and `mousepowery` used to scale
    force applied the Ball. `mousepowerx` affects the force resulting from moving
    the mouse left or right, and `mousepowery` affects the force resulting from moving
    the mouse forward and backware. The variables are public so they can be adjusted
    in the Inspector View.


    The final calculated force is stored in the private variables `forcex` and `forcey`,
    also corresponding to left-right and forward-backward mouse movement, respectively.


    **Tip**   It’s a good idea to always specify an initial value for variables in
    their declarations. That makes the meaning of the code more clear and avoids errors
    due to wrong assumptions about the initial values (C and C++ programmers especially
    know to be wary of mystery bugs from uninitialized variables).


    The `Update` callback is where forcex and forcey are calculated from `mousepowerx`
    and `mousepowery` and the mouse movement. Input in Unity is queried using the
    `Input` class. For example, the mouse position can be checked by examining the
    static variable `Input.mousePosition`, so the mouse movement could be ascertained
    by saving the mouse position in each Update call and comparing the current position
    with the saved position from the previous frame.


    But the higher-level `Input.GetAxis` function does that work, already. `Input.Getaxis`
    returns a value from -1 to 1 for left-right or forward-backward movement from
    a mouse, joystick, or keyboard, depending on the argument passed to the function.


    In the Update callback, `Input.GetAxis("Mouse X")` is called to obtain the left-right
    mouse movement and `Input.GetAxis("Mouse Y") is called` for the front-back movement
    that occurred over the previous frame. The results are assigned to the variables
    `forcex` and `forcey`, respectively, after taking into account how much time elapsed
    during the frame (our old friend `Time.deltaTime`) and multiplying by scaling
    factors `mousepowerx` and `mousepowery`.


    With this code in the `FuguForce` script, you can see the public mousepower variables
    show up in the Inspector View of the Ball ([Figure 6-26](#9781430248750_Ch06.xhtml#Fig26)).


    ![9781430248750_Fig06-26.jpg](images/9781430248750_Fig06-26.jpg)


    [Figure 6-26](#9781430248750_Ch06.xhtml#_Fig26). The Ball with the FuguForce.js
    script


    And when you click Play, you still don’t have any control over the Ball, since
    you haven’t added the actual ball-pushing code yet. However, if you select the
    Debug option in the Inspector View menu, the private `forcex` and `forcey` variables
    will display, and you can see them change as you move the mouse.


    FixedUpdate: Use the Force


    Functions that affect physics, including `Rigidbody.AddForce`, should be invoked
    in the `FixedUpdate` callback. Unlike the `Update` callback, which is called once
    per frame and can take any amount of time, the `FixedUpdate` callback takes place
    after every fixed time step has elapsed. For good results, physics simulations
    need to run at a fixed interval, typically with more frequency than `Update`.
    Varying intervals between physics computations can result in varying behavior
    and long lags between physics updates. In Unity, this time step is set in the
    TimeManager ([Figure 6-27](#9781430248750_Ch06.xhtml#Fig27)), which is available
    in the Project Settings submenu of the Edit menu.


    ![9781430248750_Fig06-27.jpg](images/9781430248750_Fig06-27.jpg)


    [Figure 6-27](#9781430248750_Ch06.xhtml#_Fig27). The TimeManager


    The `FixedUpdate` callback is called at these physics update intervals (I think
    of `FixedUpdate` really as `PhysicsUpdate` and the Fixed Timestep as the Physics
    Timestep), so this is where any change to the physics simulation should take place,
    especially any action on a Rigidbody.


    Since the force for pushing the Ball is already calculated in the Update callback,
    the `FixedUpdate` callback just needs to apply those values in a call to `Rigidbody.AddForce`
    on the Ball’s Rigidbody Component ([Listing 6-2](#9781430248750_Ch06.xhtml#list2)).


    [Listing 6-2.](#9781430248750_Ch06.xhtml#_list2)  FixedUpdate Callback in FuguForce.js


    ```

    function FixedUpdate() {

            rigidbody.AddForce(forcex,0,forcey);

    }

    ```


    The Rigidbody function `AddForce` is called on the variable `rigidbody`, which
    is a Component variable that always references the Rigidbody Component or this
    GameObject. The `GameObject` class also has a `rigidbody` variable, so a reference
    to `gameObject.rigidbody``would be equivalent`.


    The three values passed to `RigidBody.AddForce` are the x, y, and z values of
    the force, which is a vector since it has direction and magnitude. The direction
    of the force is in world space, and from the viewpoint of the Main Camera in this
    game, x is left-right and z is forward-backward. So `forcex` is passed in for
    the x argument and `forcey` for the z argument. The controls don’t push the Ball
    up ro down, just forward and sideways, so 0 is passed in as the y argument.'
  trans: "\n当然，建立一个空气支撑的保龄球外设超出了本书的范围，但 PC 版的`HyperBowl`提供了基于鼠标的控制方式：推动鼠标会向该方向给球施加一个旋转力。只需一个脚本就能相当直接地实现这种控制。\n\
    \n创建脚本\n\n在项目视图中选择`Scripts`文件夹，使用项目视图左上角的创建按钮新建一个 JavaScript 脚本，并将其命名为`FuguForce`，因为您将用它向球施加一个力（我很想为了寿司的寓意把它命名为`FuguRoll`，但我不希望名字暗示我们正在施加一个力矩，即旋转力而非线性力）。然后将`FuguForce`脚本拖拽到层级视图中的球（`Ball`）上，这样一旦您向脚本中添加一些代码，就可以准备测试了。\n\
    \n更新：收集输入\n\n试图通过计算旋转和平移（位置变化）来模拟球的滚动会非常复杂，这涉及到与地板和球瓶的碰撞检测及响应，还要考虑重力、摩擦力和反弹……所有物理引擎已经完成的计算。不让\
    \ Unity 物理系统来处理这方面的工作将是一种浪费。\n\n因为球已经有一个刚体组件（`Rigidbody Component`），它已经是一个受重力等力影响、并会响应碰撞（包括与地板的碰撞）的物理对象。所以，滚动球所需要的就是一个推力。推力的大小取决于输入，在我们的设计中，输入就是鼠标的移动。\n\
    \n**注意**  原始的、非 Unity 版本的`HyperBowl`向保龄球施加了一个力矩（旋转力），使其旋转。Unity 确实有一个用于向刚体施加力矩的脚本函数`Rigidbody.AddTorque`，但我发现，在\
    \ Unity 中通过使用`Rigidbody.AddForce`施加线性力来滚动球效果更好。\n\n鼠标移动以及一般的输入，可以在每一帧进行检查，因此输入收集代码和相应推力的计算应该放在脚本的`Update`回调函数中，如列表\
    \ 6-1 所示。将该列表中的代码复制到`FuguForce`脚本中。\n\n列表 6-1.`FuguForce.js`中的`Update`回调函数\n\n\
    ```\n#pragma strict\nvar mousepowerx:float = 1.0;\nvar mousepowery:float = 1.0;\n\
    \nprivate var forcex:float=0.0;\nprivate var forcey:float=0.0;\n\nfunction Update()\
    \ {\n        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n\
    \        forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n\
    ```\n\n脚本以变量`mousepowerx`和`mousepowery`开始，用于缩放施加到球上的力。`mousepowerx`影响左右移动鼠标所产生的力，而`mousepowery`影响前后移动鼠标所产生的力。这些变量是公开的，因此可以在检查器视图（`Inspector\
    \ View`）中调整它们。\n\n最终计算出的力存储在私有变量`forcex`和`forcey`中，它们也分别对应于左右和前后方向的鼠标移动。\n\n**提示**  始终在变量声明中指定初始值是一个好习惯。这会使代码的含义更清晰，并避免因对初始值的错误假设而导致错误（C\
    \ 和 C++程序员尤其知道要警惕未初始化变量带来的神秘错误）。\n\n`Update`回调函数就是根据`mousepowerx`、`mousepowery`和鼠标移动来计算`forcex`和`forcey`的地方。在\
    \ Unity 中，使用`Input`类来查询输入。例如，可以通过检查静态变量`Input.mousePosition`来获取鼠标位置，因此鼠标移动可以通过在每次`Update`调用中保存鼠标位置，并将当前位置与上一帧保存的位置进行比较来确定。\n\
    \n但是，更高级的`Input.GetAxis`函数已经完成了这项工作。`Input.GetAxis`根据传递给函数的参数，为鼠标、摇杆或键盘的左右或前后移动返回一个从-1\
    \ 到 1 的值。\n\n在`Update`回调函数中，调用了`Input.GetAxis(\"Mouse X\")`来获取上一帧发生的左右鼠标移动，并调用了`Input.GetAxis(\"\
    Mouse Y\")`来获取前后移动。在考虑了帧期间经过的时间（我们的老朋友`Time.deltaTime`）并乘以缩放因子`mousepowerx`和`mousepowery`之后，结果分别赋值给了变量`forcex`和`forcey`。\n\
    \n将这段代码放入`FuguForce`脚本后，您可以在球的检查器视图中看到公开的`mousepower`变量（图 6-26）。\n\n![9781430248750_Fig06-26.jpg](img/9781430248750_Fig06-26.jpg)\n\
    \n图 6-26. 带有`FuguForce.js`脚本的球\n\n当您点击播放时，您仍然无法控制球，因为您还没有添加实际的推球代码。但是，如果您在检查器视图菜单中选择调试选项，私有变量`forcex`和`forcey`将会显示出来，并且当您移动鼠标时，您可以看到它们的变化。\n\
    \n`FixedUpdate`：使用力\n\n影响物理的函数，包括`Rigidbody.AddForce`，应该在`FixedUpdate`回调函数中调用。与每一帧调用一次且可能花费任意时间的`Update`回调函数不同，`FixedUpdate`回调函数在每个固定的时间步长过去后执行。为了获得良好效果，物理模拟需要以固定间隔运行，通常比`Update`更频繁。物理计算之间的可变间隔会导致行为变化以及物理更新之间的长时间延迟。在\
    \ Unity 中，这个时间步长在时间管理器（`TimeManager`）中设置（图 6-27），该管理器位于编辑菜单的项目设置子菜单中。\n\n![9781430248750_Fig06-27.jpg](img/9781430248750_Fig06-27.jpg)\n\
    \n图 6-27. 时间管理器\n\n`FixedUpdate`回调函数在这些物理更新间隔被调用（我把`FixedUpdate`视为`PhysicsUpdate`，把固定时间步长视为物理时间步长），因此这是任何对物理模拟的更改（特别是对刚体的任何操作）应该发生的地方。\n\
    \n由于推动球的力已经在`Update`回调函数中计算好了，`FixedUpdate`回调函数只需要在球的刚体组件上调用`Rigidbody.AddForce`来应用这些值即可（列表\
    \ 6-2）。\n\n列表 6-2.`FuguForce.js`中的`FixedUpdate`回调函数\n\n```\nfunction FixedUpdate()\
    \ {\n        rigidbody.AddForce(forcex,0,forcey);\n}\n```\n\n在变量`rigidbody`上调用了刚体函数`AddForce`，`rigidbody`是一个组件变量，它始终引用此游戏对象的刚体组件。`GameObject`类也有一个`rigidbody`变量，因此引用`gameObject.rigidbody`是等效的。\n\
    \n传递给`RigidBody.AddForce`的三个值分别是力的 x、y 和 z 分量，因为力有方向和大小，所以它是一个向量。力的方向是世界空间中的，从本游戏主摄像机的视角来看，x\
    \ 是左右方向，z 是前后方向。因此，`forcex`被传递给 x 参数，`forcey`被传递给 z 参数。这些控制不会上下推动球，只会向前和侧向推动，所以\
    \ y 参数传递了 0。\n"
- fmt: "**Note**  Be sure to check the Scripting Reference page on `RigidBody.AddForce`.\
    \ It is an overloaded function with a variation that takes the force as a `Vector3`\
    \ instead of three separate numbers. Also, both variations take an optional argument\
    \ that can specify the value applied to the `Rigidbody` is a quantity besides\
    \ force—either acceleration, an impulse, or an instantaneous change in velocity.\n\
    \nNow when you click Play and move your mouse, the Ball rolls in that direction.\
    \ Try changing the `mousepowerx` and `mousepowery` values in the Inspector View\
    \ to get the roll responsiveness you want.\n\n## Is It Rolling?\n\nYou might notice\
    \ that if you move the mouse while the Ball is falling, you can actually push\
    \ the Ball while it’s still in the air, which doesn’t seem right. Moving the mouse\
    \ should only roll the Ball when it’s on a surface.\n\nFortunately, Unity has\
    \ callback functions, each prefixed by `OnCollision`, that are called when a `GameObject`\
    \ collides with another `GameObject` and when the contact ceases. Each of the\
    \ callbacks takes one argument, a `Collision` object which contains information\
    \ about the collision, such as a reference to the other `GameObject` that was\
    \ involved.\n\nThe `FuguForce` script could check if the colliding `GameObject`\
    \ is the Floor by checking if it’s name is “Floor” (using the `GameObject name`\
    \ variable). But in general it’s a better practice and more efficient to find\
    \ and identify `GameObjects` by their tags (using the `GameObject tag` variable).\
    \ If you select the Floor `GameObject` and examine it in the Inspector View, you\
    \ can see in the upper left it has the default tag Untagged. To change the `GameObject`’s\
    \ tag to Floor, the Floor tag must first be created by selecting Add Tag from\
    \ the Tag menu of the `GameObject` ([Figure 6-28](#9781430248750_Ch06.xhtml#Fig28)).\n\
    \n![9781430248750_Fig06-28.jpg](images/9781430248750_Fig06-28.jpg)\n\n[Figure\
    \ 6-28](#9781430248750_Ch06.xhtml#_Fig28). Adding a new Tag\n\nThis brings up\
    \ the TagManager in the Inspector View. The TagManager manages tags and layers.\
    \ Tags are used to identify `GameObjects`, so you can create practically an unlimited\
    \ number of them. Layers, on the other hand, are used to label groups of `GameObjects`,\
    \ and at most 32 layers can be defined, since they are implemented as bits in\
    \ a 32-bit number. This makes it convenient to specify combinations of layers,\
    \ for example, in the Culling Mask properties of Cameras and Lights.\n\nTo create\
    \ a new tag named Floor, just type “Floor” into the first empty tag field in the\
    \ TagManager ([Figure 6-29](#9781430248750_Ch06.xhtml#Fig29)). Then select the\
    \ Floor `GameObject` in the Hierarchy View again, click the Tag menu in the Inspector\
    \ View again, and the new Floor tag is available for selection.\n\n![9781430248750_Fig06-29.jpg](images/9781430248750_Fig06-29.jpg)\n\
    \n[Figure 6-29](#9781430248750_Ch06.xhtml#_Fig29). The TagManager\n\nNow the `FuguForce`\
    \ script can be augmented with collision callbacks to see if the Ball is on the\
    \ Floor ([Listing 6-3](#9781430248750_Ch06.xhtml#list3)).\n\n[Listing 6-3.](#9781430248750_Ch06.xhtml#_list3)\
    \  Collision Callbacks in FuguForce.js\n\n```\nprivate var isRolling:boolean=false;\n\
    private var floorTag:String = \"Floor\";\n\nfunction OnCollisionEnter(collider:Collision)\
    \ {\n        if (collider.gameObject.tag == floorTag) {\n                isRolling\
    \ = true;\n        }\n}\n\nfunction OnCollisionStay(collider:Collision) {\n  \
    \      if (collider.gameObject.tag == floorTag) {\n                isRolling =\
    \ true;\n        }\n}\n\nfunction OnCollisionExit(collider:Collision) {\n    \
    \    if (collider.gameObject.tag == floorTag) {\n                isRolling = false;\n\
    \        }\n}\n```\n\nTwo private variables are added. The first variable, `isRolling`,\
    \ is true when the Ball is on the Floor. The second variable, `floorTag`, is the\
    \ tag assigned to the Floor.\n\n**Tip**  Defining a variable for the tag avoids\
    \ having to spell out the tag in multiple locations (and avoids hard-to-debug\
    \ spelling errors), and if the name of the tag is changed later, only the variable\
    \ needs to be updated. Each of the three collision callbacks checks if the `GameObject`\
    \ the Ball collided against is the Floor by checking the tag of the tag of the\
    \ colliding `GameObject`. If the `GameObject` is not the Floor, then the collision\
    \ callback doesn’t do anything.\n\nThe `OnCollisionEnter` callback is called by\
    \ Unity when the Ball collides with another `GameObject`, so that function sets\
    \ `isRolling` to true. Conversely, `OnCollisionExit` is called by Unity when contact\
    \ ceases between the Ball and a `GameObject`, and in that case `isRolling` is\
    \ set to false.\n\nIn the meantime, `OnCollisionStay` is called while the Ball\
    \ stays in contact with a `GameObject`, so it also ensures that `isRolling` stays\
    \ true. Now the `FixedUpdate` callback can check if `isRolling` is true, indicating\
    \ that the Ball is on the Floor, before applying a push to the Ball ([Listing\
    \ 6-4](#9781430248750_Ch06.xhtml#list4)).\n\n[Listing 6-4.](#9781430248750_Ch06.xhtml#_list4)\
    \  Add a Rolling Check in `FixedUpdate` of FuguForce.js\n\n```\nfunction FixedUpdate()\
    \ {\n        if (isRolling) {\n                rigidbody.AddForce(forcex,0,forcey);\n\
    \        }\n}\n```\n\n## Limit the Speed\n\nFinally, as a bit of polish, the ball\
    \ control script can check the Ball’s speed before pushing the Ball, avoiding\
    \ cases where the Ball ends up rolling much faster than we intended, due to some\
    \ freak combination of existing velocity, frame rate, and input values ([Listing\
    \ 6-5](#9781430248750_Ch06.xhtml#list5)).\n\n[Listing 6-5.](#9781430248750_Ch06.xhtml#_list5)\
    \  Add a Speed Check in `FixedUpdate` of FuguForce.js\n\n```\nvar maxVelocitySquared:float=400.0;\n\
    \nfunction FixedUpdate() {\n        if (isRolling && rigidbody.velocity.sqrMagnitude<maxVelocitySquared)\
    \ {\n                rigidbody.AddForce(forcex,0,forcey);\n        }\n}\n```\n\
    \nThis is a pretty simple change, requiring only the addition of a variable `maxVelocitySquared`\
    \ to hold our maximum velocity value, actually the square of the maximum velocity\
    \ value. Then `FixedUpdate`, in addition to checking if the Ball is on the Floor,\
    \ also checks if the Ball if the squared magnitude of the Ball’s velocity is below\
    \ `maxVelocitySquared`. In other words, `FixedUpdate` is checking the square of\
    \ the Ball’s speed.\n\nThe `velocity` variable of `Rigidbody` is a `Vector3`,\
    \ which in turn has a `magnitude` variable that gives you the length of the `Vector3`.\
    \ But finding the length of a `Vector3` involves a square root operation (remember\
    \ the Pythagorean theorem from high school geometry?), and square roots require\
    \ more computation. So whenever you need to compare the length of two `Vector3`s,\
    \ you should instead compare the square of their lengths.\n\n## The Complete Script\n\
    \n[Listing 6-6](#9781430248750_Ch06.xhtml#list6) presents the complete listing\
    \ for the Ball controller script, `FuguForce.js`, put together so far, available\
    \ in the [Chapter 6](#9781430248750_Ch06.xhtml) project on `http://learnunity4.com/`.\n\
    \n[Listing 6-6.](#9781430248750_Ch06.xhtml#_list6)  Complete Listing of FuguForce.js\n\
    \n```\n#pragma strict\n\nvar mousepowerx:float = 1.0;\nvar mousepowery:float =\
    \ 1.0;\n\nvar maxvelocity:float=400.0;\n\nprivate var forcey:float=0.0;\nprivate\
    \ var forcex:float=0.0;\n\nprivate var isRolling:boolean=false;\nprivate var floorTag:String\
    \ = \"Floor\";\n\nvar maxVelocitySquared:float=400.0;\n\nfunction Update() {\n\
    \        forcex = mousepowerx*Input.GetAxis(\"Mouse X\")/Time.deltaTime;\n   \
    \     forcey = mousepowery*Input.GetAxis(\"Mouse Y\")/Time.deltaTime;\n}\n\nfunction\
    \ FixedUpdate() {\n        if (isRolling && rigidbody.velocity.sqrMagnitude<maxVelocitySquared)\
    \ {\n                rigidbody.AddForce(forcex,0,forcey);\n        }\n}\nfunction\
    \ OnCollisionEnter(collider:Collision) {\n        if (collider.gameObject.tag\
    \ == floorTag) {\n                isRolling = true;\n        }\n}\n```"
  raw: '**Note**   Be sure to check the Scripting Reference page on `RigidBody.AddForce`.
    It is an overloaded function with a variation that takes the force as a `Vector3`
    instead of three separate numbers. Also, both variations take an optional argument
    that can specify the value applied to the Rigidbody is a quantity besides force—either
    acceleration, an impulse, or an instantaneous change in velocity.


    Now when you click Play and move your mouse, the Ball rolls in that direction.
    Try changing the `mousepowerx` and `mousepowery` values in the Inspector View
    to get the roll responsiveness you want.


    Is It Rolling?


    You might notice that if you move the mouse while the Ball is falling, you can
    actually push the Ball while it’s still in the air, which doesn’t seem right.
    Moving the mouse should only roll the Ball when it’s on a surface.


    Fortunately, Unity has callback functions, each prefixed by `OnCollision`, that
    are called when a GameObject collides with another GameObject and when the contact
    ceases. Each of the callbacks takes one argument, a `Collision` object which contains
    information about the collision, such as a reference to the other GameObject that
    was involved.


    The `FuguForce` script could check if the colliding GameObject is the Floor by
    checking if it’s name is “Floor” (using the GameObject `name` variable). But in
    general it’s a better practice and more efficient to find and identify GameObjects
    by their tags (using the GameObject `tag` variable). If you select the Floor GameObject
    and examine it in the Inspector View, you can see in the upper left it has the
    default tag Untagged. To change the GameObject’s tag to Floor, the Floor tag must
    first be created by selecting Add Tag from the Tag menu of the GameObject ([Figure
    6-28](#9781430248750_Ch06.xhtml#Fig28)).


    ![9781430248750_Fig06-28.jpg](images/9781430248750_Fig06-28.jpg)


    [Figure 6-28](#9781430248750_Ch06.xhtml#_Fig28). Adding a new Tag


    This brings up the TagManager in the Inspector View. The TagManager manages tags
    and layers. Tags are used to identify GameObjects, so you can create practically
    an unlimited number of them. Layers, on the other hand, are used to label groups
    of GameObjects, and at most 32 layers can be defined, since they are implemented
    as bits in a 32-bit number. This makes it convenient to specify combinations of
    layers, for example, in the Culling Mask properties of Cameras and Lights.


    To create a new tag named Floor, just type “Floor” into the first empty tag field
    in the TagManager ([Figure 6-29](#9781430248750_Ch06.xhtml#Fig29)). Then select
    the Floor GameObject in the Hierarchy View again, click the Tag menu in the Inspector
    View again, and the new Floor tag is available for selection.


    ![9781430248750_Fig06-29.jpg](images/9781430248750_Fig06-29.jpg)


    [Figure 6-29](#9781430248750_Ch06.xhtml#_Fig29). The TagManager


    Now the `FuguForce` script can be augmented with collision callbacks to see if
    the Ball is on the Floor ([Listing 6-3](#9781430248750_Ch06.xhtml#list3)).


    [Listing 6-3.](#9781430248750_Ch06.xhtml#_list3)  Collision Callbacks in FuguForce.js


    ```

    private var isRolling:boolean=false;

    private var floorTag:String = "Floor";


    function OnCollisionEnter(collider:Collision) {

            if (collider.gameObject.tag == floorTag) {

                    isRolling = true;

            }

    }


    function OnCollisionStay(collider:Collision) {

            if (collider.gameObject.tag == floorTag) {

                    isRolling = true;

            }

    }


    function OnCollisionExit(collider:Collision) {

            if (collider.gameObject.tag == floorTag) {

                    isRolling = false;

            }

    }

    ```


    Two private variables are added. The first variable, `isRolling``,` is true when
    the Ball is on the Floor. The second variable, `floorTag`, is the tag assigned
    to the Floor.


    **Tip**  Defining a variable for the tag avoids having to spell out the tag in
    multiple locations (and avoids hard-to-debug spelling errors), and if the name
    of the tag is changed later, only the variable needs to be updated. Each of the
    three collision callbacks checks if the GameObject the Ball collided against is
    the Floor by checking the tag of the tag of the colliding GameObject. If the GameObject
    is not the Floor, then the collision callback doesn’t do anything.


    The `OnCollisionEnter` callback is called by Unity when the Ball collides with
    another GameObject, so that function sets `isRolling` to true. Conversely, `OnCollisionExit`
    is called by Unity when contact ceases between the Ball and a GameObject, and
    in that case `isRolling` is set to false.


    In the meantime, `OnCollisionStay` is called while the Ball stays in contact with
    a GameObject, so it also ensures that `isRolling` stays true.Now the `FixedUpdate`
    callback can check if `isRolling` is true, indicating that the Ball is on the
    Floor, before applying a push to the Ball ([Listing 6-4](#9781430248750_Ch06.xhtml#list4)).


    [Listing 6-4.](#9781430248750_Ch06.xhtml#_list4)  Add a Rolling Check in FixedUpdate
    of FuguForce.js


    ```

    function FixedUpdate() {

            if (isRolling) {

                    rigidbody.AddForce(forcex,0,forcey);

            }

    }

    ```


    Limit the Speed


    Finally, as a bit of polish, the ball control script can check the Ball’s speed
    before pushing the Ball, avoiding cases where the Ball ends up rolling much faster
    than we intended, due to some freak combination of existing velocity, frame rate,
    and input values ([Listing 6-5](#9781430248750_Ch06.xhtml#list5)).


    [Listing 6-5.](#9781430248750_Ch06.xhtml#_list5)  Add a Speed Check in FixedUpdate
    of FuguForce.js


    ```

    var maxVelocitySquared:float=400.0;


    function FixedUpdate() {

            if (isRolling && rigidbody.velocity.sqrMagnitude<maxVelocitySquared) {

                    rigidbody.AddForce(forcex,0,forcey);

            }

    }

    ```


    This is a pretty simple change, requiring only the addition of a variable `maxVelocitySquared``to
    hold our maximum velocity value, actually the square of the maximum velocity value`.
    Then `FixedUpdate`, in addition to checking if the Ball is on the Floor, also
    checks if the Ball if the squared magnitude of the Ball’s velocity is below `maxVelocitySquared`.
    In other words, `FixedUpdate` is checking the square of the Ball’s speed.


    The `velocity` variable of Rigidbody is a `Vector3`, which in turn has a `magnitude`
    variable that gives you the length of the `Vector3`. But finding the length of
    a `Vector3` involves a square root operation (remember the Pythagorean theorem
    from high school geometry?), and square roots require more computation. So whenever
    you need to compare the length of two `Vector3`’s, you should instead compare
    the square of their lengths.


    The Complete Script


    [Listing 6-6](#9781430248750_Ch06.xhtml#list6) presents the complete listing for
    the Ball controller script, `FuguForce`.js, put together so far, available in
    the [Chapter 6](#9781430248750_Ch06.xhtml) project on `http://learnunity4.com/`.


    [Listing 6-6.](#9781430248750_Ch06.xhtml#_list6)  Complete Listing of FuguForce.js


    ```

    #pragma strict


    var mousepowerx:float = 1.0;

    var mousepowery:float = 1.0;


    var maxvelocity:float=400.0;


    private var forcey:float=0.0;

    private var forcex:float=0.0;


    private var isRolling:boolean=false;

    private var floorTag:String = "Floor";


