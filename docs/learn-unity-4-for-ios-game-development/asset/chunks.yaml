- fmt: '# Select the Caribbean Isle GameObject


    Select the `Caribbean Isle` GameObject and you will see in the Inspector View
    that it has an `AudioSource` Component. Among its properties is a reference to
    the `Caribbean Isle AudioClip` (described as a 2D sound since you unchecked its
    3D sound checkbox), and a `Play On Awake` checkbox. That specifies the sound will
    start playing as soon as the scene starts playing. You should check the `Loop`
    checkbox too, so the song will keep playing over and over, just like the dancing
    animation.


    Now when you click Play, you have a real music dance party!


    ## Explore Further


    Thus ends our dalliance with dancing skeletons. For the rest of this book, you’ll
    be concentrating on developing a bowling game with mostly physics-based motion.
    But you should already feel a sense of accomplishment, having spent the past three
    chapters evolving a simple static cube scene into a musical dancing skeleton scene,
    complete with fancy graphics features like particle effects and dynamic shadows.
    But fancy features tend to be expensive features in terms of performance, so use
    them judiciously!


    ### Unity Manual


    The “Asset Import and Creation” section covers the two new types of assets introduced
    in this chapter: audio and animation. The page titled “Audio Files” lists the
    audio formats recognized by Unity and describes the `AudioClip` asset that results
    from importing an audio file. In earlier chapters, we just dipped our toes into
    the “Creating Gameplay” section of the Unity Manual, but now we’ve gone deeper,
    adding content described in the pages “Particles,” “Legacy Animation System,”
    and “Sound.” Also, the “Mecanim Animation System” is the future of Unity animation,
    so it’s worthwhile to read up on that.


    Dynamic shadows is a big topic. The “Advanced” section of the Unity Manual has
    an extensive treatment on “Shadows in Unity”, which covers “Directional Shadows,”
    “Troubleshooting Shadows,” and “Shadow Size Computation.”


    ### Reference Manual


    The “Animation Components” section of the Reference Manual has pages on the `Animation`
    Component and `Animation Clip` asset used by the Legacy animation system. This
    section also includes several pages on Components used in the new Mecanim animation
    system.


    The “Audio” section lists the audio Components needed to add music to the dancing
    scene constructed in this chapter: `AudioListener` (normally automatically attached
    to the Main Camera) and `AudioSource` (attached to the sound source). In addition,
    the section lists “Audio Filter Components (PRO Only)” that can add effects like
    echo, for example.


    The “Effects” section has a page on the new Shuriken particle system and multiple
    pages on the Legacy particle system.


    The Reference Manual also documents the various Settings Managers, including the
    one for “Quality Settings,” which you used to adjust your shadow quality, but
    it also affects other visual quality elements, such as lighting and particles.


    ### Asset Store


    The Asset Store not only offers a lot of music in the Audio category, much of
    it free, but also provides scripts for playing music. If you want to play more
    than one song in your dance scene, you could write a script that plays a fixed
    or random sequence of songs, using the Unity functions defined in the `AudioSource`
    class (to play and stop music) and `AudioListener` class (to control the volume).
    But it’s easier to just download, for example, the Free Jukebox script from the
    Asset Store (or Jukebox Pro if you’re willing to part with a few dollars).


    ### Computer Graphics


    I mentioned the book *Real-Time Rendering* at the end of [Chapter 3](#9781430248750_Ch03.xhtml),
    and it merits a recommendation again for the computer graphics topics you encountered
    in this chapter: animation, particle effects, and dynamic shadows. There are many
    books just on character animation, including those on the content-creation side
    for professional animators, such as George Maestri’s *Digital Character Animation*.


    # Chapter 6: Let’s Roll! Physics and Controls


    At last, we’re ready to begin the main Unity project for this book, a bowling
    game in the style of HyperBowl, an arcade/attraction game I worked on over ten
    years ago and ported to Unity just a few years ago. HyperBowl has a unique be-the-ball
    gameplay where the player constantly rolls the ball around a 3D environment to
    reach the pins. The bowling game constructed in this book will be much simpler
    but feature the same style of control.


    Even a simple bowling game like this one is a significant project. It will incorporate
    physics, input handling, camera control, collision sounds, game rules, a score
    display, and a start/pause menu. And that’s even before performing any adaptation
    for iOS. This chapter just focuses on getting a ball to roll around and will require
    some physics setup but only a single script for the ball control.


    The script is available in the project for this chapter on `http://learnunity4.com/`
    But it’s a fairly simple script and developed incrementally throughout this chapter,
    so it’s best to follow along, implementing it from scratch.


    ## Make a New Scene


    The dance scene in the previous chapter was really a modification of the original
    cube scene we started with in [Chapter 3](#9781430248750_Ch03.xhtml), so we didn’t
    have to create the entire scene from scratch again. The skybox, light and floor
    would be useful in the bowling game, so by the same token we could continue modifying
    the cube scene and deactivate or remove the skeleton and music before adding content
    for the bowling game. But there’s no rule saying we can have only one scene in
    a project, so let’s leave the cube/dance scene intact and just make a copy of
    it to use as the beginnings of the bowling scene.


    From the previous chapter, you should have the Unity Editor still open to the
    dance (cube) scene. The quickest way to start working with a copy of this scene
    is to select `Save Scene As` in the File menu ([Figure 6-1](#9781430248750_Ch06.xhtml#Fig1)).


    ![9781430248750_Fig06-01.jpg](images/9781430248750_Fig06-01.jpg)


    [Figure 6-1](#9781430248750_Ch06.xhtml#_Fig1). Saving the scene as a new scene


    This will be a bowling scene, so let’s name it “bowl” ([Figure 6-2](#9781430248750_Ch06.xhtml#Fig2)).


    ![9781430248750_Fig06-02.jpg](images/9781430248750_Fig06-02.jpg)


    [Figure 6-2](#9781430248750_Ch06.xhtml#_Fig2). The bowl scene saved at the top
    level of Assets


    **Note**: To be consistent with the asset organization system, scenes would go
    into a Scenes folder, but if I have just one or a few scenes, I often just leave
    them saved at the top level of the Asset folder.


    Instead of using `Save Scene As`, you could have duplicated the scene by selecting
    it in the Project View and invoking `Duplicate` from the Edit menu (or the keyboard
    shortcut `Command+D`), then renamed the new scene and then switched to it by double-clicking
    the scene file.


    ### Delete GameObjects


    Now you can clean out anything from the scene that’s not needed for bowling without
    fear of mangling the dance scene. So instead of deactivating the skeleton, just
    delete it by selecting the skeleton GameObject in the Hierarchy View and using
    the `Delete` command from the Edit menu (or the `Command+Delete` keyboard shortcut).
    Also delete the Cube hierarchy and `Caribbean Isle` GameObject ([Figure 6-3](#9781430248750_Ch06.xhtml#Fig3)),
    as cubes and music won’t be necessary for bowling, either.


    ![9781430248750_Fig06-03.jpg](images/9781430248750_Fig06-03.jpg)


    [Figure 6-3](#9781430248750_Ch06.xhtml#_Fig3). Deleting unneeded GameObjects from
    the bowling scene


    ### Adjust the Light


    Once again, a little housekeeping is in order before starting work on a new scene.
    Let’s start with the color of the Light. Beginning with white lights until all
    the assets are in the scene allows you to see everything in its full original
    colors. So let’s change the Light color to white by clicking in its Color field
    and selecting white in the color chooser ([Figure 6-4](#9781430248750_Ch06.xhtml#Fig4)).


    ![9781430248750_Fig06-04.jpg](images/9781430248750_Fig06-04.jpg)'
