    ![9781430248750_Fig03-07.jpg](images/9781430248750_Fig03-07.jpg)


    [Figure 3-7](#9781430248750_Ch03.xhtml#_Fig7). The Camera frustum in the Scene
    View


    The Scene View also displays a Camera Preview in the lower right corner. This
    is what the Camera would render right now, which is also what the Game View would
    display right now (you can take a look at the Game View right now to confirm).
    There’s nothing visible in this scene yet, but this will be a handy feature later.


    Note that the frustum outline and the Camera Preview only display when the Camera
    is selected and the Camera Component in the Inspector View is open (every Component
    in the Inspector View can be opened or closed by clicking the little triangle
    in the upper left). This is generally true of any Component that has an extra
    graphic display in the Scene View. Opening and closing the Component in the Inspector
    View will toggle that display.


    The alternative to perspective is orthographic, which has no foreshortening and
    thus is appropriate for 2D games, isometric games user interfaces, and HUDs. The
    only Camera property specific to orthographic mode is the orthographic projection
    size, which is the half-height of the orthographic view in world units.


    Viewport


    The Viewport of (0,0,1,1) indicates the Camera covers the whole screen. The numbers
    are normalized screen coordinates, meaning the coordinates across the width and
    height of the screen range from 0 to 1\. For a split screen or a window within
    the screen, you would have multiple Cameras, each with different viewports, (0,0,1,.5)
    covers half of the screen. However, Unity iOS doesn’t support viewports that don’t
    cover the full screen.


    Depth


    Depth is another property useful when there are multiple Cameras in the scene.
    During each rendering update, the Cameras will perform their rendering passes
    in the order of their depth values, lowest to highest. So if you had a second
    Camera for viewing an HUD, for example, you might specify that the Main Camera
    has a depth of 0 and the HUD Camera a depth of 1 to ensure the game world renders
    first and the game HUD renders on top of that.


    Rendering Path


    The Rendering Path determines how the scene is rendered. Each Camera can have
    its own Rendering Path or default to the one specified in the Player Settings.
    Vertex Lit is the simplest but fastest path, Forward Rendering supports more advanced
    graphics, and Deferred is the fanciest but slowest and not available in Unity
    iOS.


    Target Texture (Pro)'
  trans: '

    # 当前游戏对象的层菜单


    当前游戏对象的层菜单位于右侧。与使用名称进行描述、使用标签进行识别不同，层（Layers）用于对游戏对象进行分组。你可以将这些层想象成类似 Photoshop
    中的图层。注意不要将此层菜单与编辑器窗口右上角的“层”菜单混淆（不幸的是，在默认布局中，它们彼此相邻）。右上角的“层”菜单控制着哪些游戏对象在场景视图中可见（它实际上应该位于场景视图中）。


    # 变换组件


    与其他所有游戏对象一样，主摄像机拥有一个**变换（Transform）组件**，用于指定该游戏对象的位置、旋转和缩放比例。缩放比例对于摄像机而言没有意义，但位置和旋转属性允许你放置和瞄准摄像机。


    单击组件右上角的小问号图标。这将在网页浏览器窗口中打开变换组件的参考手册文档。


    **提示** 每次遇到新组件时，你应该做的第一件事就是查阅文档。


    每个组件的参考手册页面都会描述该组件的属性并解释其用法。每个参考手册页面还包含一个指向该组件对应脚本参考页面的链接，详细说明了如何从脚本中访问该组件。


    # 摄像机组件


    **摄像机（Camera）组件**是使此游戏对象成为摄像机的关键。严格来说，主摄像机是一个拥有`Camera`组件的游戏对象——该组件是组件的一个子类。但为了方便，我们可以说主摄像机是一个“摄像机”（因为这是它的功能），而使用“摄像机组件”来明确我们讨论的是该组件。


    同样，点击此组件的问号图标将打开相应的参考手册页面，列出摄像机组件的属性。但我将在此处（按检查器视图中自上而下的顺序）简要介绍它们。


    ## 清除标志


    `清除标志（Clear Flags）`属性指定摄像机在每次渲染通道开始时如何初始化颜色缓冲区和深度缓冲区。颜色缓冲区包含摄像机渲染的像素，而深度缓冲区则保存每个像素到摄像机的距离（通过这种方式，它决定新绘制的像素是否应替换该位置的先前像素）。


    -   固定颜色（Solid Color）：表示颜色缓冲区将被清除为指定的颜色——这基本上用作背景色，同时深度缓冲区也会被清除。

    -   天空盒（Skybox）：同样会清除深度缓冲区，并在背景中渲染指定的天空盒纹理（如果没有提供天空盒，则默认为固定颜色）。

    -   仅深度（Depth Only）：保持颜色缓冲区不变，仅清除深度缓冲区。这在添加一个在主摄像机之后渲染并覆盖其结果的摄像机时很有用，例如，在游戏世界的渲染之上渲染用户界面或
    HUD（抬头显示）。在这种情况下，你不希望第二个摄像机在渲染前清屏。


    ## 剔除遮罩


    这正是层（Layers）的实用性所在。`剔除遮罩（Culling Mask）`指定了此摄像机将渲染哪些层。换句话说，只有当游戏对象的层被包含在摄像机的`剔除遮罩`中时，该对象才对摄像机可见。


    默认值为`Everything`，对应所有层。但例如，如果你有一个 HUD 摄像机，你可以为所有 HUD 游戏对象定义一个 HUD 层，然后将 HUD 摄像机的`剔除遮罩`设置为仅渲染
    HUD 层。接着，将主摄像机的`剔除遮罩`设置为包含除 HUD 层之外的所有层。


    ## 投影


    默认情况下，摄像机设置为使用透视投影（perspective projection），正如我在上一章描述场景视图时提到的，这意味着物体离摄像机越远，看起来越小（这种效果称为*透视缩短（foreshortening）*）。在此模式下，摄像机具有一个类似于四棱锥（不包括锥体底面）的视景体，从摄像机位置沿视线方向发出。这个视景体被称为*视锥体（frustum）*，由视野（FOV）、近平面和远平面定义。


    视野类似于真实世界摄像机的视场角。FOV 是以度为单位表示的垂直视角。水平视角则由 FOV 和摄像机的宽高比共同隐式定义。近平面和远平面分别指定了屏幕在摄像机前方多远的位置，以及视锥体底座的距离。任何在视锥体之外的东西对摄像机都是不可见的。


    为了更好地了解视锥体的外观，可以看看场景视图。图 3-7 展示了当你按下场景 Gizmo 上的 y 轴箭头，将视角切换到俯视图时，主摄像机视锥体的样子。按下
    F 键（编辑菜单中“Frame Selected”命令的快捷键）将主摄像机居中显示在场景视图中，然后缩小直到你能看到整个视锥体。你还应该取消选中`Gizmos`菜单中的`3D
    Gizmos`复选框，这样当您缩小时，摄像机图标就不会缩小到看不见。


    ![9781430248750_Fig03-07.jpg](img/9781430248750_Fig03-07.jpg)


    图 3-7. 场景视图中的摄像机视锥体


    场景视图的右下角还会显示一个摄像机预览。这就是摄像机此时会渲染的内容，也就是游戏视图此时会显示的内容（你现在可以查看游戏视图来确认）。这个场景中还看不到任何东西，但稍后这将是一个很方便的功能。


    请注意，视锥体轮廓和摄像机预览仅在摄像机被选中且检查器视图中的摄像机组件处于展开状态时显示（检查器视图中的每个组件都可以通过单击左上角的小三角形来展开或折叠）。这对于任何在场景视图中具有额外图形显示的组件来说通常是成立的。在检查器视图中展开或折叠组件将切换该显示。


    透视投影的替代方案是正交投影（orthographic），它没有透视缩短效果，因此适用于 2D 游戏、等距游戏、用户界面和 HUD。正交模式下特有的摄像机属性是正交投影大小（Size），即正交视图在世界单位中的半高。


    ## 视口


    视口（Viewport）为`(0,0,1,1)`表示摄像机覆盖整个屏幕。这些数字是归一化的屏幕坐标，意味着屏幕宽度和高度上的坐标范围是从 0 到 1。对于分屏或屏幕内的窗口，你需要多个摄像机，每个摄像机设置不同的视口。例如，`(0,0,1,.5)`覆盖一半屏幕。然而，Unity
    iOS 不支持不覆盖全屏的视口。


    ## 深度


    当场景中存在多个摄像机时，深度（Depth）是另一个有用的属性。在每次渲染更新期间，摄像机将按照其深度值从小到大依次执行渲染通道。因此，举例来说，如果你有用于查看
    HUD 的第二个摄像机，你可以指定主摄像机的深度为 0，HUD 摄像机的深度为 1，以确保游戏世界先渲染，游戏 HUD 渲染在其之上。


    ## 渲染路径


    `渲染路径（Rendering Path）`决定了场景的渲染方式。每个摄像机可以拥有自己的`渲染路径`，或默认使用在播放器设置中指定的路径。`顶点光照（Vertex
    Lit）`是最简单但最快的路径，`正向渲染（Forward Rendering）`支持更高级的图形，而`延迟渲染（Deferred）`是最华丽但最慢的，且在
    Unity iOS 中不可用。


    ## 目标纹理（专业版）

