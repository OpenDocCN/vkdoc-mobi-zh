    Shortly after submitting a bug report, you should receive an e-mail confirmation
    from Unity Technologies with a case number and a link to a copy of the report
    in the Unity bug database, which you can check to see the status of the bug.


    Check for Updates


    If you’re lucky, your bug report will result in a fix. And if you’re really lucky,
    that fix will show up in the next Unity update. You can always check if there’s
    a new update by selecting the Check for Updates command from the Window menu on
    the menu bar. The resulting window will display whether or not an update is available
    ([Figure 1-16](#9781430248750_Ch01.xhtml#Fig16)).


