    \ `Input.touchCount` 获取，因此我们可以通过如下循环来处理所有触摸事件：\n\n```csharp\nfor (var i:int=0;\
    \ i < Input.touchCount; ++i) {\n        var touch:Touch = Input.GetTouch(i);\n\
    // 在此处编写你的处理代码\n}\n```\n\n但为了简单起见，我们只关注一根手指，所以只需检查是否存在一个或多个 `Touch` 事件，如果存在，则检查第一个：\n\
    \n```csharp\nif (Input.touchCount > 0) {\n        var touch:Touch = Input.GetTouch(0);\n\
    ```\n\n`Touch` 事件可以表示不同的手指动作：按下、抬起或拖动。这可以通过检查 `Touch` 对象的 phase 属性来判断，该属性是一个 `TouchPhase`\
    \ 枚举。我们只关注表示手指在屏幕上拖动的 `Touch` 事件，因此检查触摸阶段是否为 `TouchPhase.Moved`：\n\n```csharp\n\
    if (touch.phase == TouchPhase.Moved) {\n```\n\n如果是，则计算推动保龄球所需的力。这与鼠标控制类似，但不是乘以\
    \ `Input.GetAxis`，而是乘以 `Touch` 事件的 `deltaPosition` 属性，该属性表示手指在屏幕上拖动的像素数：\n\n```csharp\n\
    var touchPositionDelta:Vector2 = touch.deltaPosition;\nforcey = powery*touchPositionDelta.y/deltatime;\n\
    forcex = powerx*touchPositionDelta.x/deltatime;\n```\n\n请注意，`deltaPosition` 属性是一个\
    \ `Vector2`，它与 `Vector3` 类似，但只有 x 和 y 属性，没有 z 值。\n\n现在，如果您在编辑器中点击“播放”并使用 Unity\
    \ Remote 进行测试，或者在设备上执行“生成并运行”，球将朝着您滑动的方向滚动。\n\n包含触摸屏功能的完整 `FuguBowlForce` 脚本可从\
    \ `http://learnuninty4.com/` 上本章的项目中获取。\n\n## 点击球体\n\n尽管我们的保龄球游戏不关心滑动操作在屏幕上的位置，但许多游戏需要检测特定的\
    \ `GameObject` 是否被触摸。在桌面和 Web 平台上，可以通过 `OnMouseDown`、`OnMouseUp` 和 `OnMouseOver`\
    \ 等回调函数来检测带有 `Collider` 组件的 `GameObject` 上的鼠标事件。例如，脚本中的 `OnMouseDown` 回调会在鼠标点击脚本的\
    \ `GameObject`（更准确地说，是 `GameObject` 的 `Collider` 组件）时被调用。\n\n**注意**   `OnMouse`\
    \ 回调也适用于带有 `GUIText` 和 `GUITexture` 组件的 `GameObject`。在 UnityGUI 引入之前，这是 Unity\
    \ 中最接近内置 GUI 系统的功能。\n\n为了演示 `OnMouse` 回调的工作原理，创建一个名为 `FuguDebugOnMouse` 的新 JavaScript\
    \ 文件，并将其附加到球体 `GameObject` 上（图 13-2）。\n\n![9781430248750_Fig13-02.jpg](img/9781430248750_Fig13-02.jpg)\n\
    \n图 13-2. 附加了 `FuguDebugOnMouse` 脚本的球体\n\n然后将 代码清单 13-3 的内容添加到脚本中。\n\n代码清单 13-3.\
    \  在 `FuguDebugMouse.js` 中检测鼠标点击\n\n```csharp\n#pragma strict\n\nfunction OnMouseDown\
    \ () {\n        Debug.Log(\"GameObject \"+ gameObject.name + \" was touched\"\
    );\n}\n```\n\n现在脚本中包含一个 `OnMouseDown` 回调，它会记录一条关于 `GameObject` 被触摸的消息。当您在编辑器中运行游戏并点击球体时，调试消息将出现在控制台视图中（图\
    \ 13-3）。\n\n![9781430248750_Fig13-03.jpg](img/9781430248750_Fig13-03.jpg)\n\n\
    图 13-3. 演示 `OnMouseDown` 回调的调试消息\n\nUnity iOS 会在响应触摸事件时调用 `OnMouse` 回调，除非没有明确的映射关系。例如，当鼠标悬停在\
    \ `GameObject` 上时调用的 `OnMouseOver`，其对应的触摸等效操作是什么？但当一个 `GameObject` 被点击时调用 `OnMouseDown`（当手指停止触摸屏幕时调用\
    \ `OnMouseUp`）是合理的。实际情况也确实如此，如果您在编辑器中通过 Unity Remote 再次运行游戏，或者在设备上执行“生成并运行”，您会看到相同的结果。无论哪种情况，点击球体都会产生与鼠标点击时相同的调试消息。\n\
    \n尽管 `OnMouse` 回调可以用于触摸操作（至少在一定程度上）非常方便，但了解如何实现自己的点击物体检测也很有用。这简单直接，只需结合检查点击操作和从屏幕位置沿相机方向向\
    \ 3D 世界发射射线即可。*射线投射* 是寻找射线与第一个相交物体的过程（您可能还记得高中数学知识，射线有起点和方向，就像一支箭）。\n\n为了演示，让我们创建一个名为\
    \ `FuguTap` 的新 JavaScript 文件，将其附加到主摄像头上（图 13-4），并将 代码清单 13-4 的内容添加到脚本中。\n\n![9781430248750_Fig13-04.jpg](img/9781430248750_Fig13-04.jpg)\n\
    \n图 13-4. 附加了 `FuguOnTap` 脚本的主摄像头\n\n代码清单 13-4.  模拟 `OnMouseDown` 事件的脚本\n\n```csharp\n\
    #pragma strict\n\n#if UNITY_IPHONE\nfunction Update () {\n                for\
    \ (var i = 0; i < Input.touchCount; ++i) {\n                         if (Input.GetTouch(i).phase\
    \ == TouchPhase.Began) {\n                                 var ray:Ray = camera.ScreenPointToRay\
    \ (Input.GetTouch(i).position);\n                                 var hit:RaycastHit;\n\
    \                                 if (Physics.Raycast (ray,hit,camera.far,camera.cullingMask))\
    \ { hit.collider.SendMessage(\"OnTap\",SendMessageOptions.DontRequireReceiver);\n\
    \                                 }\n                         }\n            \
    \    }\n}\n#endif\n```\n\n整个脚本由一个 `Update` 回调组成，该回调遍历上一帧中注册的所有触摸事件。但在此情况下，只关注点击的开始阶段，因此只考虑处于\
    \ `TouchPhase.Began` 阶段的触摸事件。提取每个此类触摸事件的屏幕坐标，并将其传递给 Camera 函数 `ScreenPointToRay`，以形成一个\
    \ `Ray`，该射线从屏幕位置开始，沿相机方向投射到 3D 世界中。\n"
- fmt: "`Ray`被作为第一个参数传递给静态函数`Physics.Raycast`，以检查该`Ray`是否与任何游戏对象的碰撞体组件相交。如果存在第一个交点，则相关信息会通过作为第二个参数传入的`RayCastHit`结构体返回。第三个参数是射线投射的距离，第四个参数是用于测试相交的图层集合。通过将相机远平面距离作为射线投射距离，并将相机剔除遮罩（可见图层集合）作为用于相交测试的图层集合，可以限制射线投射的可能结果。\n\
    \n如果对`Physics.Raycast`的调用返回`true`（表示存在相交），则检索相交的碰撞体组件，并对其调用`SendMessage`以在附加的脚本中调用`OnTap`回调（对一个组件调用`SendMessage`等同于对该组件的游戏对象调用`SendMessage`）。\n\
    \n注意，对`SendMessage`的调用包含一个可选的第二个参数`SendMessageOptions.DontRequireReceiver`。如果没有该参数，当消息被发送到没有匹配函数（或本例中没有`OnTap`函数）的游戏对象时，Unity会报告错误。\n\
    \n整个`Update`回调被包裹在`#ifdef UNITY_IPHONE`中，因为它仅用于iOS触摸屏输入。同样，你现在可以使用`UNITY_IPHONE`将`OnMouseDown`回调重命名为`OnTap`，以便由`FuguOnTap`脚本调用（[清单\
    \ 13-5](#9781430248750_Ch13.xhtml#list5)）。\n\n[清单 13-5](#9781430248750_Ch13.xhtml#_list5).\
    \ FuguDebugOnMouse 脚本，为iOS提供备用回调名称\n\n```csharp\n#pragma strict\nif !UNITY_IPHONE\n\
    function OnMouseDown () {\n#else\nfunction OnTap () {\n#endif\n        Debug.Log(\"\
    GameObject \"+ gameObject.name + \" was touched\");\n}\n```\n\n现在，如果你再次运行游戏并点击球，你仍然会看到调试信息，但它将来自`FuguOnTap`发送的`OnTap`消息。\n\
    \n## 加速度计\n\n每台iOS设备都有一个加速度计，用于测量三个不同方向的加速度。这三个值可以在静态变量`Input.accelerometer`中查看，它是一个`Vector3`。\n\
    \n`x`值对应于设备屏幕上从左到右的加速度。`y`值代表设备屏幕上从上到下的加速度，`z`值则是从设备正面到背面的加速度。从Unity 4开始，加速度计的值会根据设备方向进行调整，因此如果你以横向模式持有设备，加速度计的`x`值仍然从左到右变化。\n\
    \n## 调试加速度计\n\n一个古老而有效理解代码工作原理的方法是打印输出。让我们创建一个名为`FuguDebugAccel`的新JavaScript脚本，并将其附加到保龄球场景中一个名为`DebugAccel`的新游戏对象上。按照[清单\
    \ 13-6](#9781430248750_Ch13.xhtml#list6)所示，将`Update`函数添加到该脚本中。\n\n[清单 13-6](#9781430248750_Ch13.xhtml#_list6).\
    \ 打印加速度计值的代码\n\n```csharp\nfunction Update () {\n        Debug.Log(\"accel x:\
    \ \"+Input.acceleration.x+\" y: \"+Input.acceleration.y+\"                   \
    \                                                                            \
    \                  z: \"+Input.acceleration.z);\n}\n```\n\n`Update`函数获取`x`、`y`和`z`的加速度计值，并将它们拼接成一个可读的字符串。如果你在Unity编辑器（使用Unity\
    \ Remote）中进行测试，`Debug.Log`会将该字符串发送到控制台视图；如果你在iOS模拟器或真机上运行，则会发送到Xcode调试区域。\n\n\
    尝试倾斜设备并观察这些值如何变化。例如，[图 13-5](#9781430248750_Ch13.xhtml#Fig5) 所示的`Debug.Log`输出结果是设备平放在桌子上时得到的。`x`和`y`值接近0，而`z`值接近-1。如果设备翻转过来，`z`值将接近1。\n\
    \n![9781430248750_Fig13-05.jpg](images/9781430248750_Fig13-05.jpg)\n\n[图 13-5](#9781430248750_Ch13.xhtml#_Fig5).\
    \ 加速度计值的 Debug.Log 输出\n\n加速度值的单位是重力加速度。静止状态下，每个加速度计值的范围是-1到1，其中1代表一个完整的地球重力（9.8米/秒²）。现在尝试摇晃设备。你应该会看到数值上下波动。\n\
    \n## 检测摇晃\n\n我们的iOS暂停菜单存在一个问题：我们无法使用ESC键暂停，因为iOS设备上没有ESC键（尽管Android设备通常有一个行为类似ESC键的返回键）。\n\
    \n通过简单地在`OnGUI`函数内添加一个`GUI.Button`调用，可以轻松地在`FuguPause`脚本中向屏幕添加一个暂停按钮：\n\n```csharp\n\
    if (GUI.Button(Rect(0,0,100,50), \"Pause\") { PauseGame(); }\n```\n\n然而，我不喜欢在游戏过程中屏幕上出现按钮，尤其是在像iPhone这样的小屏幕上。所以，让我们利用iOS设备提供的备用输入方式，通过摇晃设备来暂停。\n\
    \n从之前打印加速度计值的练习中，我们看到摇晃设备会导致`Input.acceleration`的`x`、`y`或`z`值中至少有一个向上或向下急剧变化。因此，我们可以通过检查是否有任何值远大于1或远小于-1（例如）来判断是否发生了摇晃。但不必非常精确，我们可以只计算向量大小的平方：\n\
    \n```csharp\nif (Input.acceleration.sqrMagnitude>shakeThreshold)\n```\n\n获取`Vector3`的`sqrMagnitude`比获取`magnitude`更快，因为向量的模长是`x²\
    \ + y² + z²`的平方根，使用平方根操作相对昂贵（还记得高中时学习手工计算平方根吗？）。\n\n所以，让我们开始在`FuguPause`脚本中添加一个用于摇晃阈值的公共变量：\n\
    \n```csharp\nvar shakeThreshold:float = 5;\n```\n\n现在你可以在检视面板（[图 13-6](#9781430248750_Ch13.xhtml#Fig6)）中调整该属性，使其对摇晃更敏感或更不敏感。\n\
    \n![9781430248750_Fig13-06.jpg](images/9781430248750_Fig13-06.jpg)\n\n[图 13-6](#9781430248750_Ch13.xhtml#_Fig6).\
    \ 在检视面板中调整“摇晃暂停”阈值\n\n接下来，添加对`Input.acceleration`的检查，作为ESC键检查的`UNITY_IPHONE`版本替代方案（[清单\
    \ 13-7](#9781430248750_Ch13.xhtml#list7)）。\n\n[清单 13-7](#9781430248750_Ch13.xhtml#_list7).\
    \ 在 FuguPause.js 中添加“摇晃暂停”功能\n\n```csharp\nvar shakeThreshold:float = 5;\n\nfunction\
    \ Update() {\n#if UNITY_IPHONE\n        if (Input.acceleration.sqrMagnitude>shakeThreshold)\n\
    #else\n        if (Input.GetKeyDown(KeyCode.escape))\n#endif\n        {\n    \
    \            switch (currentPage) {\n                case Page.None: PauseGame();\
    \ break;       // 如果暂停菜单未显示，则暂停\n                case Page.Main: UnPauseGame();\
    \ break; // 如果主暂停菜单正在显示，则取消暂停\n                default: currentPage = Page.Main;\
    \     // 任何子页面都返回主页面\n                }\n        }\n}\n```\n\n这就完成了。现在，当你使用Unity\
    \ Remote或在设备上进行测试时，摇晃设备将暂停游戏！增强后的`FuguPause`脚本（仅添加了两行新代码！）位于本书项目文件中，可从 `http://learnunity4.com/`\
    \ 获取。\n\n## 摄像头\n\n尽管Unity对iOS摄像头的内置支持不多，但Unity确实为将网络摄像头视频读取到纹理中提供了跨平台支持。\n\n\
    ### 读取网络摄像头"
  raw: 'The `Ray` is passed in as the first argument to the static function `Physics.Raycast`
    to see if the `Ray` intersects a Collider Component of any GameObject. Information
    about the first intersection, if any, is returned in the `RayCastHit` struct that
    is passed in as the second argument. The third argument is the raycast distance,
    and the fourth argument is the set of layers that will be tested for intersection.
    You restrict the possible raycast results by supplying the Camera far plane distance
    as the raycast distance and the Camera culling mask (set of visible layers) as
    the set of layers to test for intersection.


    If the call to `Physics.Raycast` returns true, meaning there’s been an intersection,
    then you retrieve the intersecting Collider Component and call `SendMessage` on
    it to invoke `OnTap` callbacks in attached scripts (calling `SendMessage` on a
    Component is equivalent to calling `SendMessage` on the Component’s GameObject).


    Notice that the call to `SendMessage` includes an optional second argument, `SendMessageOptions.DontRequireReceiver`.
    Without that argument, Unity will report an error if the message is sent to a
    GameObject that doesn’t have any matching functions, or, in this case, any `OnTap`
    functions.


    The entire `Update` callback is wrapped in a `#ifdef UNITY_IPHONE`, because it’s
    only intended for iOS touchscreen input. Likewise, you can now use `UNITY_IPHONE`
    to rename the `OnMouseDown` callback to `OnTap`, so it will be called by the `FuguOnTap`
    script ([Listing 13-5](#9781430248750_Ch13.xhtml#list5)).


    [Listing 13-5](#9781430248750_Ch13.xhtml#_list5).  The FuguDebugOnMouse Script
    with an Alternate Callback Name for iOS


    ```

    #pragma strict

    if !UNITY_IPHONE

    function OnMouseDown () {

    #else

    function OnTap () {

    #endif

            Debug.Log("GameObject "+ gameObject.name + " was touched");

    }

    ```


    Now if you run the game again and tap the Ball, you’ll still see the debug message,
    but it will result from the `OnTap` messages sent from `FuguOnTap`.


    The Accelerometer


    Every iOS device has an accelerometer that measures acceleration in three different
    directions. The three values can be examined in the static variable `Input.accelerometer`,
    which is a Vector3.


    The x value corresponds to acceleration that runs left to right along the face
    of the device. The y value represents the acceleration running from top to bottom
    along the face of the device, and the z value is the acceleration from the front
    to the back of the device. Starting with Unity 4, the accelerometer values are
    adjusted for the device orientation, so if you’re holding the device in landscape
    mode, the accelerometer x values still run from left to right.


    Debug the Accelerometer


    A time-honored way to figure out how code works is to print stuff out. Let’s create
    a new JavaScript called `FuguDebugAccel` and attach it to a new GameObject named
    DebugAccel in the bowling scene. Add the `Update` function as shown in [Listing
    13-6](#9781430248750_Ch13.xhtml#list6) to the script.


    [Listing 13-6](#9781430248750_Ch13.xhtml#_list6).  Code to Print Out Accelerometer
    Values


    ```

    function Update () {

            Debug.Log("accel x: "+Input.acceleration.x+" y: "+Input.acceleration.y+"                                                                        
    z: "+Input.acceleration.z);

    }

    ```


    The `Update` function takes the x, y, and z accelerometer values and concatenates
    them into a somewhat readable String. Debug.Log sends that `String` to the Console
    View if you’re testing in the Unity Editor (with the Unity Remote) or to the Xcode
    debug area if you’re running in the iOS Simulator or on a device.


    Try tilting the device around and see how the values change. For example, the
    `Debug.Log` output shown in [Figure 13-5](#9781430248750_Ch13.xhtml#Fig5) results
    from placing the device flat on a table. The x and y values are nearly 0 and the
    z value is close to −1\. If the device is flipped upside down it would be close
    to 1.


    ![9781430248750_Fig13-05.jpg](images/9781430248750_Fig13-05.jpg)


    [Figure 13-5](#9781430248750_Ch13.xhtml#_Fig5). Debug.Log output of accelerometer
    values


    The acceleration values are in units of gravity. At rest, each accelerometer value
    ranges from −1 to 1, where 1 is full earth gravity (9.8 meters per second squared).
    Now try shaking the device. You should see the numbers spike up and down.


    Detect Shakes


    An issue with our pause menu on iOS is that we can’t pause with the ESC key, since
    there’s no ESC key on our devices (although Android devices typically have a Back
    button that behaves like an ESC key).


    It’s straightforward to add a pause button to the screen to `FuguPause` script
    by just adding a `GUI.Button` call inside the `OnGUI` function:


    ```


    if (GUI.Button(Rect(0,0,100,50), "Pause") { PauseGame(); }

    ```


    However, I don’t like to have buttons on the screen during gameplay, especially
    on really small screens like the iPhone. So let’s take advantage of the alternate
    input that iOS devices can provide and pause by shaking the device.


    From our previous exercise in printout out accelerometer values, we saw that shaking
    the device causes at least one of the x, y, or z values of `Input.acceleration`
    to spike up or down. So we can check for a shake by checking if any of the values
    are much larger than 1 or much less than −1, for example. But we don’t have to
    be very exact, so we can just take the square of the magnitude (length) of the
    vector:


    ```


    if (Input.acceleration.sqrMagnitude>shakeThreshold)

    ```


    Getting the `sqrMagnitude` of the `Vector3` is faster than getting the `magnitude`,
    since the magnitude of a vector is the square root of x² + y² + z², and this way
    you avoid the square root operation, which is relatively expensive (remember learning
    to calculate square roots by hand in high school?).


    So let’s start by adding a public variable for the shake threshold to the `FuguPause`
    script:


    ```


    var shakeThreshold:float = 5;

    ```


    Now you can tweak that property in the Inspector View ([Figure 13-6](#9781430248750_Ch13.xhtml#Fig6))
    and make it more or less sensitive to shakes.


    ![9781430248750_Fig13-06.jpg](images/9781430248750_Fig13-06.jpg)


    [Figure 13-6](#9781430248750_Ch13.xhtml#_Fig6). Adjusting the shake -to-pause
    threshold in the Inspector View


    Next, add the check of `Input.acceleration` as a `UNITY_IPHONE` replacement for
    the check of the ESC key ([Listing 13-7](#9781430248750_Ch13.xhtml#list7)).


    [Listing 13-7](#9781430248750_Ch13.xhtml#_list7).  Adding Shake to Pause in the
    FuguPause.js


    ```

    var shakeThreshold:float = 5;


    function Update() {

    #if UNITY_IPHONE

            if (Input.acceleration.sqrMagnitude>shakeThreshold)

    #else

            if (Input.GetKeyDown(KeyCode.escape))

    #endif

            {

                    switch (currentPage) {

                    case Page.None: PauseGame(); break;       // if the pause menu
    is not displayed, then pause

                    case Page.Main: UnPauseGame(); break; // if the main pause menu
    is displaying,                                                                                        then
    unpause

                    default: currentPage = Page.Main;     // any subpage goes back
    to main page

                    }

            }

    }

    ```


    That’s all you need. Now when you test with the Unity Remote or on a device, shaking
    the device will pause the game! The augmented `FuguPause` script (just two lines
    of new code!) is in the project for this chapter on `http://learnunity4.com/`.


    The Camera


    Although Unity doesn’t have much built-in support for iOS cameras, Unity does
    have cross-platform support for reading webcam video into a texture.


