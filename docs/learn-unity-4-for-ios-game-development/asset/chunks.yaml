    | batched:     0 tris #>        min:  5544  max:  5544  avg:  5544   | batched:    
    0 verts #>       min:  4358  max:  4358  avg:  4358   | batched:     0 player-detail>
    physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  0.0 render:
    58.0 fixed-update-count: 0 .. 0 mono-scripts>  update:  0.2   fixedUpdate:  0.0
    coroutines:  0.1 mono-memory>   used heap: 405504 allocated heap: 524288  max
    number of collections: 0 collection total duration:  0.0 ```    The first number
    to look at in the profile is the frametime, which is the total amount of time
    taken by a frame, in milliseconds. If you’re running at 60 fps, you should see
    an average of around 16.7 ms for the frametime. If the frametime is above 34,
    then you’re not even getting 30 fps. The line below the frametime is pretty important,
    too, as it tends to have a big impact on the frametime. Draw calls are distinct
    drawing operations. Generally, each rendered mesh incurs a draw call, and lighting
    and shadows on top of that can add more draw calls.    The player-detail breaks
    down the time listed in the cpu-player line at the top. The player-detail time
    is apportioned among physx (physics), animation, culling (determining objects
    that don’t need to be rendered), skinning (updating the skin position on animated
    characters), batching (combining meshes that have the same materials so they are
    rendered with a single draw call), rendering, and the fixed update count.    The
    profile results in [Listing 16-3](#9781430248750_Ch16.xhtml#list3), taken on a
    fourth-generation iPod touch, show a frametime not even close to 30 fps, much
    less 16 fps, and the player-detail is dominated by the render time. One thing
    that is known to have a big performance impact is dynamic shadows, so let’s disable
    shadows in our Light ([Figure 16-6](#9781430248750_Ch16.xhtml#Fig6)).    ![9781430248750_Fig16-06.jpg](images/9781430248750_Fig16-06.jpg)    [Figure
    16-6](#9781430248750_Ch16.xhtml#_Fig6). Disabling shadows from the bowling scene
    Light    Then Build and Run again to start a new profile session ([Listing 16-4](#9781430248750_Ch16.xhtml#list4)).    [Listing
    16-4](#9781430248750_Ch16.xhtml#_list4).  Built-In Profiler Output After Removing
    Shadows    ``` iPhone Unity internal profiler stats: cpu-player>    min:  5.0  
    max:  7.6   avg:  5.7 cpu-ogles-drv> min:  3.1   max:  7.0   avg:  3.7 cpu-present>  
    min: 14.4   max: 42.9   avg: 28.1 cpu-waits-gpu> min: 14.4   max: 42.9   avg:
    28.1  msaa-resolve> min:  0.0   max:  0.0   avg:  0.0 frametime>     min: 28.5  
    max: 55.5   avg: 39.5 draw-call #>   min:  29    max:  29    avg:  29     | batched:    10
    tris #>        min:  4584  max:  4584  avg:  4584   | batched:  3420 verts #>      
    min:  3712  max:  3712  avg:  3712   | batched:  2750 player-detail> physx:  0.0
    animation:  0.0 culling  0.0 skinning:  0.0 batching:  1.9 render:  3.1 fixed-update-count:
    0 .. 0 mono-scripts>  update:  0.2   fixedUpdate:  0.0 coroutines:  0.1 mono-memory>  
    used heap: 401408 allocated heap: 524288  max number of collections: 0 collection
    total duration:  0.0 ```    If you’re not running Unity iOS Pro or you turned
    off shadows earlier for performance reasons, then you’re already here. Anyway,
    the results are dramatic.'
  trans: "\n现在的限制放宽到了 50MB，但这对于大型游戏来说依然很容易达到。更小的体积意味着更快的下载速度，并且能让更多用户将你的应用安装到剩余存储空间有限的设备上（我自己的\
    \ iPad 总是很快就装满了）。你可以在构建后查看 `Editor` 日志，来了解应用中各类资源的占用情况，如代码清单 16-2 所示。\n\n代码清单\
    \ 16-2. `Editor Log` 中的构建信息\n\n```\nTextures      5.2 mb      16.9%\nMeshes  \
    \      17.4 kb     0.1%\nAnimations    0.0 kb      0.0%\nSounds        21.2 mb\
    \     69.1%\nShaders       0.0 kb      0.0%\nOther Assets  19.1 kb     0.1%\n\
    Levels        10.7 kb     0.0%\nScripts       175.2 kb    0.6%\nIncluded DLLs\
    \ 4.1 mb      13.3%\nFile headers  16.6 kb     0.1%\nComplete size 30.6 mb   \
    \  100.0%\nUsed Assets, sorted by uncompressed size:\n 21.1 mb         69.0% Assets/Assets/Free/Assets/Sci-Fi_Ambiences/Sci-fi_AmbienceLoop1.wav\n\
    \ 4.0 mb          13.1% Assets/Textures/LearnUnityCover.jpg\n 170.8 kb       \
    \ 0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_up.tif\n 170.8 kb\
    \        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_right.tif\n\
    \ 170.8 kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_left.tif\n\
    \ 170.8 kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_front.tif\n\
    \ 170.8 kb        0.5% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_back.tif\n\
    \ 170.8 kb        0.5% Assets/Standard Assets/Light Flares/Sources/Textures/50mmflare.psd\n\
    \ 170.8 kb        0.5% Assets/Barrel/Barrel_D.tga\n 31.2 kb         0.1% Assets/Assets/Free/Assets/8Bit/Coin_Pick_Up_03.wav\n\
    \ 17.4 kb         0.1% Assets/Barrel/Barrel.fbx\n 17.3 kb         0.1% Assets/Substances_Free/Wood_Planks_01.sbsar\n\
    \ 10.8 kb         0.0% Assets/Standard Assets/Skyboxes/Textures/Sunny3/Sunny3_down.tif\n\
    \ 1.0 kb          0.0% Assets/Prefabs/BarrelPin.prefab\n 0.6 kb          0.0%\
    \ Assets/Standard Assets/Light Flares/50mm Zoom.flare\n 0.3 kb          0.0% Assets/Standard\
    \ Assets/Skyboxes/Sunny3 Skybox.mat\n```\n\n该日志按资源类型（纹理、音频、网格、脚本）列出了应用大小的细分情况，并且包含了构建中使用的各个资源列表。遗憾的是，其大小贡献是基于未压缩尺寸，而非最终的压缩后资源大小，但它仍然能让你了解哪些资源占据了最多空间。\n\
    \n该日志还提供了一种方法，可以通过 `Console` 应用中便捷的搜索字段来找出项目中哪些资源被使用、哪些未被使用。例如，Fugu Bowl 的所有纹理都在\
    \ `Textures` 文件夹中，因此要检查这些纹理中哪些被使用、哪些可以从项目中移除，请选择 `Console View` 菜单中的 `Editor Log`，这会启动\
    \ `Console` 应用并选中 `Editor` 日志（图 16-4）。\n\n![9781430248750_Fig16-04.jpg](img/9781430248750_Fig16-04.jpg)\n\
    \n图 16-4. 使用 `Console` 应用的搜索字段过滤构建日志\n\n在搜索框中输入 `Textures` 来过滤显示内容。然后你可以将结果列表与\
    \ `Project View` 中的 `Textures` 文件夹进行比较，看看 `Project View` 中是否有任何内容没有出现在构建中。\n\n\
    ## 运行内置分析器\n\n在 Unity iOS 构建生成其 Xcode 项目后，你可以选择激活内置分析器，它会报告类似于 `Game View` 中 `Stats`\
    \ 覆盖层的信息。要激活内置分析器（在 Unity 文档中也称为内部分析器），请在 Xcode 项目中找到 `Classes` 文件夹下列出的头文件 `iPhone_Profiler.h`，并将\
    \ `ENABLE_INTERNAL_PROFILER` 的值从 `0` 改为 `1`（图 16-5）。\n\n![9781430248750_Fig16-05.jpg](img/9781430248750_Fig16-05.jpg)\n\
    \n图 16-5. Unity Xcode 项目中的内置分析器开关\n\n现在，当你点击 `Play` 时，应用将重新编译并启用内置分析器，游戏运行时，Xcode\
    \ 的调试区域将每 30 帧显示一次统计数据，如代码清单 16-3 所示。\n\n代码清单 16-3. 第四代 iPod Touch 上的内置分析器输出\n\
    \n```\niPhone Unity internal profiler stats:\ncpu-player>    min: 39.8   max:\
    \ 63.2   avg: 58.0\ncpu-ogles-drv> min:  2.1   max:  3.7   avg:  2.4\ncpu-present>\
    \   min:  0.7   max:  6.6   avg:  1.8\nframetime>     min: 47.7   max: 72.2  \
    \ avg: 64.5\ndraw-call #>   min:  40    max:  40    avg:  40     | batched:  \
    \   0\ntris #>        min:  5544  max:  5544  avg:  5544   | batched:     0\n\
    verts #>       min:  4358  max:  4358  avg:  4358   | batched:     0\nplayer-detail>\
    \ physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0 batching:  0.0 render:\
    \ 58.0 fixed-update-count: 0 .. 0\nmono-scripts>  update:  0.2   fixedUpdate:\
    \  0.0 coroutines:  0.1\nmono-memory>   used heap: 405504 allocated heap: 524288\
    \  max number of collections: 0 collection total duration:  0.0\n```\n\n首先需要关注的数字是\
    \ `frametime`，它表示一帧的总耗时，单位是毫秒。如果你在 60 fps 下运行，那么 `frametime` 的平均值应该在 16.7 ms 左右。如果\
    \ `frametime` 高于 34，那么你甚至达不到 30 fps。`frametime` 下面的那一行也非常重要，因为它往往对 `frametime`\
    \ 有重大影响。绘制调用是不同的绘图操作。通常，每个渲染的网格都会产生一个绘制调用，而在此基础上添加的灯光和阴影可能会增加更多的绘制调用。\n\n`player-detail`\
    \ 对顶部 `cpu-player` 行所列的时间进行了细分。`player-detail` 的时间分配在 `physx`（物理）、`animation`（动画）、`culling`（剔除不需要渲染的对象）、`skinning`（更新动画角色的蒙皮位置）、`batching`（合并具有相同材质的网格，以便通过一次绘制调用进行渲染）、`rendering`（渲染）和固定更新计数之间。\n\
    \n代码清单 16-3 中的分析结果来自第四代 iPod touch，显示 `frametime` 远未达到 30 fps，更不用说 16 fps 了，并且\
    \ `player-detail` 中渲染时间占据了主导地位。众所周知，对性能影响很大的一个因素是动态阴影，因此让我们在灯光中禁用阴影（图 16-6）。\n\
    \n![9781430248750_Fig16-06.jpg](img/9781430248750_Fig16-06.jpg)\n\n图 16-6. 从保龄球场景灯光中禁用阴影\n\
    \n然后再次 `Build and Run`，开始一个新的分析会话（代码清单 16-4）。\n\n代码清单 16-4. 移除阴影后的内置分析器输出\n\n\
    ```\niPhone Unity internal profiler stats:\ncpu-player>    min:  5.0   max:  7.6\
    \   avg:  5.7\ncpu-ogles-drv> min:  3.1   max:  7.0   avg:  3.7\ncpu-present>\
    \   min: 14.4   max: 42.9   avg: 28.1\ncpu-waits-gpu> min: 14.4   max: 42.9  \
    \ avg: 28.1\nmsaa-resolve>  min:  0.0   max:  0.0   avg:  0.0\nframetime>    \
    \ min: 28.5   max: 55.5   avg: 39.5\ndraw-call #>   min:  29    max:  29    avg:\
    \  29     | batched:    10\ntris #>        min:  4584  max:  4584  avg:  4584\
    \   | batched:  3420\nverts #>       min:  3712  max:  3712  avg:  3712   | batched:\
    \  2750\nplayer-detail> physx:  0.0 animation:  0.0 culling  0.0 skinning:  0.0\
    \ batching:  1.9 render:  3.1 fixed-update-count: 0 .. 0\nmono-scripts>  update:\
    \  0.2   fixedUpdate:  0.0 coroutines:  0.1\nmono-memory>   used heap: 401408\
    \ allocated heap: 524288  max number of collections: 0 collection total duration:\
    \  0.0\n```\n\n如果你没有运行 Unity iOS Pro，或者出于性能原因早些时候关闭了阴影，那么你已经达到了这个状态。无论如何，结果是显著的。\n"
- fmt: "关闭阴影能显著减少绘制调用，帧时间和渲染时间也有所降低，尽管帧率仍低于30 FPS。\n\n运行编辑器分析器（专业版）\n\n内置分析器能让您大致了解游戏性能的瓶颈所在（例如，是绘制调用、物理计算还是脚本执行）。但要精确找出占用帧时间的具体原因，仍然有些像猜谜。Unity\
    \ Pro 用户可以使用 Unity 编辑器自带的 `Profiler`。分析器可以记录在编辑器中运行游戏的性能，或者远程分析，从测试设备捕获性能数据。要分析在测试设备上运行的保龄球游戏，您需要在构建设置中勾选`Development\
    \ Build`选项，这将启用`Autoconnect Profiler`选项（[图16-7](#9781430248750_Ch16.xhtml#Fig7)）。\n\
    \n![9781430248750_Fig16-07.jpg](images/9781430248750_Fig16-07.jpg)\n\n[图16-7](#9781430248750_Ch16.xhtml#_Fig7)。启用自动连接分析器进行构建\n\
    \n执行构建并运行，分析器窗口应该会自动出现，并对设备上运行的游戏进行一次分析会话（[图16-8](#9781430248750_Ch16.xhtml#Fig8)）。\n\
    \n![9781430248750_Fig16-08.jpg](images/9781430248750_Fig16-08.jpg)\n\n[图16-8](#9781430248750_Ch16.xhtml#_Fig8)。分析器窗口\n\
    \n最顶部的栏显示中央处理器（CPU）使用率。这个特定的分析资料显示我们徘徊在30 FPS左右。下方的区域显示了按函数调用划分的CPU使用情况细分（[图16-9](#9781430248750_Ch16.xhtml#Fig9)）。\n\
    \n![9781430248750_Fig16-09.jpg](images/9781430248750_Fig16-09.jpg)\n\n[图16-9](#9781430248750_Ch16.xhtml#_Fig9)。CPU使用率的分析器细分\n\
    \n您可以展开这些项目以查看嵌套的函数调用。[图16-9](#9781430248750_Ch16.xhtml#Fig9)表明我们在UnityGUI函数上花费了大量时间，包括记分板和暂停菜单（此分析资料是在显示暂停菜单时截取的）。\n\
    \n手动连接分析器\n\n如果由于某种原因分析器没有自动启动，可以通过窗口菜单调出分析器（[图16-10](#9781430248750_Ch16.xhtml#Fig10)）。\n\
    \n![9781430248750_Fig16-10.jpg](images/9781430248750_Fig16-10.jpg)\n\n[图16-10](#9781430248750_Ch16.xhtml#_Fig10)。用于显示分析器的窗口菜单项\n\
    \n分析器实际上是一个视图，这就是为什么它列在窗口菜单的其他视图中。但是，就像资源商店一样，分析器占用了太多屏幕空间，最好让它单独显示在浮动窗口中。\n\n\
    一旦分析器窗口弹出，它将自动开始记录编辑器中的游戏（即使游戏并未实际运行），因此请点击记录按钮停止它。然后在活跃分析器窗口中选择您的iOS测试设备（[图16-11](#9781430248750_Ch16.xhtml#Fig11)），再次点击记录按钮开始分析。\n\
    \n![9781430248750_Fig16-11.jpg](images/9781430248750_Fig16-11.jpg)\n\n[图16-11](#9781430248750_Ch16.xhtml#_Fig11)。选择iOS设备作为活跃分析器\n\
    \n添加帧率显示\n\n仅为了查看帧率而启用内置分析器或通过网络连接到编辑器分析器并不方便。这时，屏幕上显示的帧率显示就派上用场了。您可以躺在沙发上看电视并测试游戏时（至少我是这么做的）切换它。\n\
    \n对于屏幕上的帧率显示，您可以使用像保龄球记分板那样的UnityGUI标签。然而，还有另一种在屏幕上显示2D文本的方法，即使用`GUIText`组件。您可以通过菜单栏的游戏对象菜单，或层级视图中的创建菜单，创建一个已附加`GUIText`组件的游戏对象（[图16-12](#9781430248750_Ch16.xhtml#Fig12)）。\n\
    \n![9781430248750_Fig16-12.jpg](images/9781430248750_Fig16-12.jpg)\n\n[图16-12](#9781430248750_Ch16.xhtml#_Fig12)。创建一个GUIText游戏对象\n\
    \n让我们继续创建那个`GUIText`游戏对象，并将其命名为FPS（[图16-13](#9781430248750_Ch16.xhtml#Fig13)）。\n\
    \n![9781430248750_Fig16-13.jpg](images/9781430248750_Fig16-13.jpg)\n\n[图16-13](#9781430248750_Ch16.xhtml#_Fig13)。带GUIText组件的FPS游戏对象\n\
    \n与我们用于次要启动画面的`GUITexture`类似，`GUIText`在屏幕上的位置由归一化坐标定义，其中左下角为 (0,0)，右上角为 (1,1)，通过游戏对象的变换组件的x和y值指定。将我们帧率显示的x和y位置分别设为-0.1，使其靠近左下角，并将文本值从`GUIText`改为FPS。\n\
    \n无需自定义字体，因为帧率显示仅用于开发，并且您不会在发布的应用程序中激活它（尽管在HyperBowl中，用户可以激活帧率显示，以便他们报告性能问题）。默认大小值为0，表示使用字体导入设置中指定的字号，但这太小了，让我们将其设置为一个合理的大尺寸，比如40。在此期间，`GUIText`在游戏视图中是可见的，因此您可以看到大小变化的效果（[图16-14](#9781430248750_Ch16.xhtml#Fig14)）。\n\
    \n![9781430248750_Fig16-14.jpg](images/9781430248750_Fig16-14.jpg)\n\n[图16-14](#9781430248750_Ch16.xhtml#_Fig14)。带有GUIText的游戏视图\n\
    \n正如`GUITexture`比UnityGUI更便于显示静态纹理（无需编写脚本），`GUIText`是比UnityGUI更直接的显示静态文本的方式。但是，帧率显示确实需要通过设置`GUIText`实例的`text`变量来更改文本。现在让我们实现帧率显示脚本。创建一个新脚本，将其放置在`Scripts`文件夹中，并命名为`FuguFPS`（[图16-15](#9781430248750_Ch16.xhtml#Fig15)）。\n\
    \n![9781430248750_Fig16-15.jpg](images/9781430248750_Fig16-15.jpg)\n\n[图16-15](#9781430248750_Ch16.xhtml#_Fig15)。创建一个新的FuguFPS.js脚本\n\
    \n然后将[代码清单16-5](#9781430248750_Ch16.xhtml#list5)中的`Update`函数添加到脚本中。脚本的`Update`回调函数使用计算出的帧率设置`GUIText`的`text`变量。计算很简单，基于`Time.deltaTime`（最近的帧时间）。通常，每秒帧数会计算为\
    \ `1 / Time.deltaTime`，但由于`Time.deltaTime`被`Time.timeScale`缩放，您可以通过使用`Time.timeScale\
    \ / Time.deltaTime`来轻松考虑这一点。\n\n`GUIText`中的`text`变量是一个`String`变量，因此您需要通过调用数字的`ToString`函数将帧值转换为`String`（每个内置类型都有`ToString`函数）。然后附加“`FPS`”，这样您就不会疑惑屏幕上的两个数字是什么了！\n\
    \n[代码清单16-5](#9781430248750_Ch16.xhtml#_list5)。完整的帧率显示脚本FuguFPS.js\n\n```javascript\n\
    #pragma strict\n\nfunction Update() {\n    if (Time.deltaTime > 0) {\n       \
    \ var fps : float = Time.timeScale / Time.deltaTime;\n        guiText.text  =\
    \ fps.ToString(\"f0\") + \"FPS\";\n    }\n}\n```\n\n现在将脚本附加到FPS游戏对象。当您在编辑器中点击播放时，您应该会看到帧率显示在不同数字之间闪烁。当您执行构建并运行到测试设备时，您应该会看到帧率显示与在内置分析器和专业版分析器中获取的数字相对应（[图16-16](#9781430248750_Ch16.xhtml#Fig16)）。\n\
    \n![9781430248750_Fig16-16.jpg](images/9781430248750_Fig16-16.jpg)\n\n[图16-16](#9781430248750_Ch16.xhtml#_Fig16)。在测试设备上运行的帧率显示\n\
    \n请记住，在发布此应用程序之前，您应该停用FPS游戏对象！"
  raw: 'Turning off shadows significantly reduces draw calls, and the frametime and
    render time are lower, although the frame rate is still below 30 fps.    Run the
    Editor Profiler (Pro)    The built-in profiler gives you a general idea of the
    bottlenecks in your game’s performance—whether it’s draw calls, physics computation,
    or script execution, for example. But it’s still a bit of a guessing game figuring
    out exactly what’s taking up the frametime. Unity Pro users have the luxury of
    using the Profiler included in the Unity Editor. The Profiler can record the performance
    of a game run in the Editor or profile remotely, capturing performance data from
    a test device. To profile our bowling game running on a test device, you need
    to check the Development Build option in the Build Settings, which will enable
    the Autoconnect Profiler option ([Figure 16-7](#9781430248750_Ch16.xhtml#Fig7)).    ![9781430248750_Fig16-07.jpg](images/9781430248750_Fig16-07.jpg)    [Figure
    16-7](#9781430248750_Ch16.xhtml#_Fig7). Building with Autoconnect Profiler enabled    Perform
    a Build and Run, and the Profiler window should appear automatically, running
    a profiling session of the game running on the device ([Figure 16-8](#9781430248750_Ch16.xhtml#Fig8)).    ![9781430248750_Fig16-08.jpg](images/9781430248750_Fig16-08.jpg)    [Figure
    16-8](#9781430248750_Ch16.xhtml#_Fig8). The Profiler window    The topmost bar
    displays the computer processing unit (CPU) usage. This particular profile indicates
    we’re hovering around 30 fps. The area below shows a breakdown of the CPU usage
    by function calls ([Figure 16-9](#9781430248750_Ch16.xhtml#Fig9)).    ![9781430248750_Fig16-09.jpg](images/9781430248750_Fig16-09.jpg)    [Figure
    16-9](#9781430248750_Ch16.xhtml#_Fig9). The Profiler breakdown of CPU usage    You
    can expand the items to reveal the nested function calls. [Figure 16-9](#9781430248750_Ch16.xhtml#Fig9)
    indicates we’re spending a lot of time in our UnityGUI functions, both the scoreboard
    and pause menu (this profile is taken with the pause menu up).    Manually Connect
    the Profiler    If for some reason the profiler doesn’t start automatically, the
    Profiler can be brought up from the Window menu ([Figure 16-10](#9781430248750_Ch16.xhtml#Fig10)).    ![9781430248750_Fig16-10.jpg](images/9781430248750_Fig16-10.jpg)    [Figure
    16-10](#9781430248750_Ch16.xhtml#_Fig10). The Window menu item to display the
    Profiler    The Profiler is actually a view, which is why it’s listed among the
    other views in the Window menu. But, like the Asset Store, the Profiler takes
    up so much screen space it is best left by itself in a floating window .    Once
    the Profiler window is up, it will automatically start recording the game in the
    Editor (even if the game is not actually running), so click the Record button
    to stop it. Then select your iOS test device in the Active Profiler window ([Figure
    16-11](#9781430248750_Ch16.xhtml#Fig11)) and click the Record button again to
    start profiling.    ![9781430248750_Fig16-11.jpg](images/9781430248750_Fig16-11.jpg)    [Figure
    16-11](#9781430248750_Ch16.xhtml#_Fig11). Selecting an iOS device as the Active
    Profiler    Add a Frame Rate Display    Enabling the built-in profiler or attaching
    to the Editor Profiler over the network is inconvenient just to see the frame
    rate. That’s where an on-screen frame rate display would come in handy. You could
    just toggle it on while you’re lying on the sofa watching TV and play testing
    your game (at least that’s what I do).    For an on-screen frame rate display,
    you could use a UnityGUI label like we did with the bowling scoreboard. However,
    there’s another way to display 2D text on screen, using the GUIText Component.
    You can create a GameObject with a GUIText Component already attached using the
    GameObject menu on the menu bar, or the Create menu in the Hierarchy View ([Figure
    16-12](#9781430248750_Ch16.xhtml#Fig12)).    ![9781430248750_Fig16-12.jpg](images/9781430248750_Fig16-12.


    jpg)    [Figure 16-12](#9781430248750_Ch16.xhtml#_Fig12). Creating a GUIText GameObject    Let’s
    go ahead and create that GUIText GameObject and name it FPS ([Figure 16-13](#9781430248750_Ch16.xhtml#Fig13)).    ![9781430248750_Fig16-13.jpg](images/9781430248750_Fig16-13.jpg)    [Figure
    16-13](#9781430248750_Ch16.xhtml#_Fig13). The FPS GameObject with a GUIText Component    Like
    the GUITexture we used for our secondary splash screen, GUIText is positioned
    on the screen in normalized coordinates, where the bottom left corner is 0,0 and
    the top right is 1,1, specified in the Transform x and y values of the GameObject.
    Set the x and y positions of our frame rate display to -.1 each, placing it near
    the bottom left corner, and change the text value from GUIText to FPS.    Don’t
    bother customizing the font because the frame rate display is only for development
    use and you won’t activate it in the released app (although in HyperBowl, the
    frame rate display can be activated by users so they can report performance issues).
    The default size value of 0 indicates the font size specified in the font’s import
    setting is used, but that’s pretty small, so let’s set it to a reasonably large
    size, 40. All this time, the GUIText is visible in the Game View, so you can see
    the effect of the size changes ([Figure 16-14](#9781430248750_Ch16.xhtml#Fig14)).    ![9781430248750_Fig16-14.jpg](images/9781430248750_Fig16-14.jpg)    [Figure
    16-14](#9781430248750_Ch16.xhtml#_Fig14). The Game View with a GUIText    Just
    as GUITexture is more convenient for displaying static textures than UnityGUI,
    requiring no scripting, GUIText is a more straightforward way to display static
    text on the screen than UnityGUI. But the frame rate display does need to change
    the text by setting the `text` variable in the `GUIText` instance. Let’s implement
    our frame rate display script now. Create a new script, place it in the Scripts
    folder, and name it `FuguFPS` ([Figure 16-15](#9781430248750_Ch16.xhtml#Fig15)).    ![9781430248750_Fig16-15.jpg](images/9781430248750_Fig16-15.jpg)    [Figure
    16-15](#9781430248750_Ch16.xhtml#_Fig15). Creating a new FuguFPS.js script    Then
    add the `Update` function in [Listing 16-5](#9781430248750_Ch16.xhtml#list5) to
    the script. The script’s `Update` callback sets the `text` variable, of `GUIText`
    with the calculated frame rate. The calculation is simplistic, based on `Time.delta
    time`, the most recent frametime. Normally, frames per second would be calculated
    as `1/Time.deltaTime`, but since `Time.deltaTime` is scaled by `Time.timeScale`,
    you can easily take that into account by using `Time.timeScale/Time.deltaTime`.    The
    text variable in GUIText is a `String` variable, so you need to convert the frame
    value to a `String` by calling the number’s `ToString` function (every built-in
    type has a `ToString` function). And then append the “`FPS`” so you won’t wonder
    what those two numbers are on the screen!    [Listing 16-5](#9781430248750_Ch16.xhtml#_list5).  The
    Complete Frame Rate Display Script FuguFPS.js    ``` #pragma strict  function
    Update() {         if (Time.deltaTime>0) {                 var fps:float = Time.timeScale/Time.deltaTime;
                    guiText.text  = fps.ToString("f0")+"FPS";         } } ```    Now
    attach the script to the FPS GameObject. When you click Play in the Editor, you
    should see the frame rate display flicker among different numbers. And when you
    perform a Build and Run to a test device, you should see the frame rate display
    correspond to the numbers you got in the built-in and Pro profilers ([Figure 16-16](#9781430248750_Ch16.xhtml#Fig16)).    ![9781430248750_Fig16-16.jpg](images/9781430248750_Fig16-16.jpg)    [Figure
    16-16](#9781430248750_Ch16.xhtml#_Fig16). A frame rate display running on a test
    device    Just remember, you should deactivate the FPS GameObject before you release
    this app!'
  trans: "\n关闭阴影能显著减少绘制调用，帧时间和渲染时间也有所降低，尽管帧率仍低于 30 FPS。\n\n运行编辑器分析器（专业版）\n\n内置分析器能让您大致了解游戏性能的瓶颈所在（例如，是绘制调用、物理计算还是脚本执行）。但要精确找出占用帧时间的具体原因，仍然有些像猜谜。Unity\
    \ Pro 用户可以使用 Unity 编辑器自带的 `Profiler`。分析器可以记录在编辑器中运行游戏的性能，或者远程分析，从测试设备捕获性能数据。要分析在测试设备上运行的保龄球游戏，您需要在构建设置中勾选`Development\
    \ Build`选项，这将启用`Autoconnect Profiler`选项（图 16-7）。\n\n![9781430248750_Fig16-07.jpg](img/9781430248750_Fig16-07.jpg)\n\
    \n图 16-7。启用自动连接分析器进行构建\n\n执行构建并运行，分析器窗口应该会自动出现，并对设备上运行的游戏进行一次分析会话（图 16-8）。\n\n\
    ![9781430248750_Fig16-08.jpg](img/9781430248750_Fig16-08.jpg)\n\n图 16-8。分析器窗口\n\
    \n最顶部的栏显示中央处理器（CPU）使用率。这个特定的分析资料显示我们徘徊在 30 FPS 左右。下方的区域显示了按函数调用划分的 CPU 使用情况细分（图\
    \ 16-9）。\n\n![9781430248750_Fig16-09.jpg](img/9781430248750_Fig16-09.jpg)\n\n\
    图 16-9。CPU 使用率的分析器细分\n\n您可以展开这些项目以查看嵌套的函数调用。图 16-9 表明我们在 UnityGUI 函数上花费了大量时间，包括记分板和暂停菜单（此分析资料是在显示暂停菜单时截取的）。\n\
    \n手动连接分析器\n\n如果由于某种原因分析器没有自动启动，可以通过窗口菜单调出分析器（图 16-10）。\n\n![9781430248750_Fig16-10.jpg](img/9781430248750_Fig16-10.jpg)\n\
    \n图 16-10。用于显示分析器的窗口菜单项\n\n分析器实际上是一个视图，这就是为什么它列在窗口菜单的其他视图中。但是，就像资源商店一样，分析器占用了太多屏幕空间，最好让它单独显示在浮动窗口中。\n\
    \n一旦分析器窗口弹出，它将自动开始记录编辑器中的游戏（即使游戏并未实际运行），因此请点击记录按钮停止它。然后在活跃分析器窗口中选择您的 iOS 测试设备（图\
    \ 16-11），再次点击记录按钮开始分析。\n\n![9781430248750_Fig16-11.jpg](img/9781430248750_Fig16-11.jpg)\n\
    \n图 16-11。选择 iOS 设备作为活跃分析器\n\n添加帧率显示\n\n仅为了查看帧率而启用内置分析器或通过网络连接到编辑器分析器并不方便。这时，屏幕上显示的帧率显示就派上用场了。您可以躺在沙发上看电视并测试游戏时（至少我是这么做的）切换它。\n\
    \n对于屏幕上的帧率显示，您可以使用像保龄球记分板那样的 UnityGUI 标签。然而，还有另一种在屏幕上显示 2D 文本的方法，即使用`GUIText`组件。您可以通过菜单栏的游戏对象菜单，或层级视图中的创建菜单，创建一个已附加`GUIText`组件的游戏对象（图\
    \ 16-12）。\n\n![9781430248750_Fig16-12.jpg](img/9781430248750_Fig16-12.jpg)\n\n\
    图 16-12。创建一个 GUIText 游戏对象\n\n让我们继续创建那个`GUIText`游戏对象，并将其命名为 FPS（图 16-13）。\n\n![9781430248750_Fig16-13.jpg](img/9781430248750_Fig16-13.jpg)\n\
    \n图 16-13。带 GUIText 组件的 FPS 游戏对象\n\n与我们用于次要启动画面的`GUITexture`类似，`GUIText`在屏幕上的位置由归一化坐标定义，其中左下角为\
    \ (0,0)，右上角为 (1,1)，通过游戏对象的变换组件的 x 和 y 值指定。将我们帧率显示的 x 和 y 位置分别设为-0.1，使其靠近左下角，并将文本值从`GUIText`改为\
    \ FPS。\n\n无需自定义字体，因为帧率显示仅用于开发，并且您不会在发布的应用程序中激活它（尽管在 HyperBowl 中，用户可以激活帧率显示，以便他们报告性能问题）。默认大小值为\
    \ 0，表示使用字体导入设置中指定的字号，但这太小了，让我们将其设置为一个合理的大尺寸，比如 40。在此期间，`GUIText`在游戏视图中是可见的，因此您可以看到大小变化的效果（图\
    \ 16-14）。\n\n![9781430248750_Fig16-14.jpg](img/9781430248750_Fig16-14.jpg)\n\n\
    图 16-14。带有 GUIText 的游戏视图\n\n正如`GUITexture`比 UnityGUI 更便于显示静态纹理（无需编写脚本），`GUIText`是比\
    \ UnityGUI 更直接的显示静态文本的方式。但是，帧率显示确实需要通过设置`GUIText`实例的`text`变量来更改文本。现在让我们实现帧率显示脚本。创建一个新脚本，将其放置在`Scripts`文件夹中，并命名为`FuguFPS`（图\
    \ 16-15）。\n\n![9781430248750_Fig16-15.jpg](img/9781430248750_Fig16-15.jpg)\n\n\
    图 16-15。创建一个新的 FuguFPS.js 脚本\n\n然后将代码清单 16-5 中的`Update`函数添加到脚本中。脚本的`Update`回调函数使用计算出的帧率设置`GUIText`的`text`变量。计算很简单，基于`Time.deltaTime`（最近的帧时间）。通常，每秒帧数会计算为\
    \ `1 / Time.deltaTime`，但由于`Time.deltaTime`被`Time.timeScale`缩放，您可以通过使用`Time.timeScale\
    \ / Time.deltaTime`来轻松考虑这一点。\n\n`GUIText`中的`text`变量是一个`String`变量，因此您需要通过调用数字的`ToString`函数将帧值转换为`String`（每个内置类型都有`ToString`函数）。然后附加“`FPS`”，这样您就不会疑惑屏幕上的两个数字是什么了！\n\
    \n代码清单 16-5。完整的帧率显示脚本 FuguFPS.js\n\n```javascript\n#pragma strict\n\nfunction\
    \ Update() {\n    if (Time.deltaTime > 0) {\n        var fps : float = Time.timeScale\
    \ / Time.deltaTime;\n        guiText.text  = fps.ToString(\"f0\") + \"FPS\";\n\
    \    }\n}\n```\n\n现在将脚本附加到 FPS 游戏对象。当您在编辑器中点击播放时，您应该会看到帧率显示在不同数字之间闪烁。当您执行构建并运行到测试设备时，您应该会看到帧率显示与在内置分析器和专业版分析器中获取的数字相对应（图\
    \ 16-16）。\n\n![9781430248750_Fig16-16.jpg](img/9781430248750_Fig16-16.jpg)\n\n\
    图 16-16。在测试设备上运行的帧率显示\n\n请记住，在发布此应用程序之前，您应该停用 FPS 游戏对象！\n"
- fmt: '# Optimize Settings


    The proper way to optimize is to methodically go through the bottlenecks starting
    with the largest, profiling the improvements at each stage until you achieve your
    target. But for the purposes of getting through a number of optimization procedures
    in this chapter, we''ll plow through a bunch of them in sequence.


    ## Quality Settings


    Let’s start by tweaking the global settings that relate to our optimization effort.
    The settings that are most likely to affect performance are the Quality Settings,
    which control the visual quality of the game ([Figure 16-17](#9781430248750_Ch16.xhtml#Fig17)).


    ![9781430248750_Fig16-17.jpg](images/9781430248750_Fig16-17.jpg)


    [Figure 16-17](#9781430248750_Ch16.xhtml#_Fig17). Optimizing the Quality Settings


    We’re going for speed, so set the current iOS quality to Fastest and then adjust
    the settings from there. Zero pixel lights is fine for the lighting set up. If
    you had a spotlight, then the lack of a pixel light would be obvious.


    You don’t want to force all textures to half resolution though. Relying on the
    Texture Import settings to limit the resolution on a case-by-case basis gives
    you more flexibility. So let’s set the Texture Quality to Full Res.


    Similarly, you''ll want to change the setting for Anisotropic Textures from none
    to per-texture. Anisotropic Texture are textures that compensate for being viewed
    at an angle, which is appropriate for a texture used for a road in a racing game,
    for example. Like texture resolution, anisotropy can be adjusted for a Texture
    in its Import Settings.


    Multisample Anti Aliasing (full-screen smoothing) is an expensive operation, as
    you would expect a full-screen per-pixel operation would be.


    You don’t have any particle systems in this game, so the Soft Particles setting
    doesn’t matter, but it’s another pixel-dominated operation (these types of features
    are often called fill-rate limited).


    Shadows are disabled, so all the shadow parameters below it are irrelevant, but
    if shadows were enabled, the two key properties are the Shadow Resolution and
    Shadow Distance. Both properties affect the shadow’s resolution; increasing the
    Shadow Resolution naturally allows for a more sharply defined shadow at the expense
    of more memory consumed for a larger shadow map, and much like the improved depth
    buffer precision of a shortened Camera frustum, a shorter Shadow Distance reduces
    the need for a large shadow map texture. Reducing the Shadow Resolution saves
    space while introducing more jaggy shadows, while reducing the Shadow Distance
    potentially reduces the number of objects involve in the shadows.


    ## Physics Manager


    Rigidbodies go to sleep when they’re at rest to avoid unnecessary physics computation.
    “At rest” means the Rigidbody’s motion has stopped moving and rotating. You can
    specify the threshold for the Sleep Velocity and Sleep Angular Velocity in the
    Physics Manager ([Figure 16-18](#9781430248750_Ch16.xhtml#Fig18)), available under
    the Settings portion of the Edit menu.


    ![9781430248750_Fig16-18.jpg](images/9781430248750_Fig16-18.jpg)


    [Figure 16-18](#9781430248750_Ch16.xhtml#_Fig18). Optimizing the Physics Manager


    At the bottom of the Physics Manager, you can also specify which layers of GameObjects
    can collide with one another. This doesn’t make a difference with our bowling
    game, because all of our colliding objects are in the Default layer. But to demonstrate
    this point, let’s modify the collision table to only allow GameObjects in the
    Default layer to collide with other GameObjects in the Default layer.


    ## Time Manager


    Because the physics updates take place at fixed intervals, you can reduce physics
    computation time by increasing the fixed timestep in the Time Manager ([Figure
    16-19](#9781430248750_Ch16.xhtml#Fig19)). Ideally, the fixed timestep should be
    set as high as possible without degrading the physics simulation. For now, we’ll
    increase the fixed timestep from 0.02 to 0.03.


    ![9781430248750_Fig16-19.jpg](images/9781430248750_Fig16-19.jpg)


    [Figure 16-19](#9781430248750_Ch16.xhtml#_Fig19). Optimizing the Time Manager


    The property immediately below Fixed Timestep is also related to physics updates:
    Maximum Allowed Timestep. This value caps how much time can be spent on physics
    updates in each frame. This prevents the runaway situation where the fixed updates
    take up a lot of time and increase the frametime, thus including more fixed updates
    in the next frame and so on. Lowering the Maximum Allowed Timestep minimizes the
    `FixedUpdate` impact on the frametime but risks degrading the physics simulation.


    ## Audio Manager


    There is also an optimization tradeoff in how the audio is played. In the Audio
    Manager ([Figure 16-20](#9781430248750_Ch16.xhtml#Fig20)), you can specify the
    audio latency, which is how much delay is allowed before the sound is played.


    ![9781430248750_Fig16-20.jpg](images/9781430248750_Fig16-20.jpg)


    [Figure 16-20](#9781430248750_Ch16.xhtml#_Fig20). Optimizing the Audio Manager


    For games where responsive sound is important (e.g., the collision sounds in our
    bowling game), selecting Best latency (i.e., lowest latency) is appropriate.


    ## Player Settings


    The Player Settings can have a great effect on optimization. In the Resolution
    and Presentation Settings, we opted for the highest native screen resolution,
    and we also have the maximum 32-bit per-pixel color resolution selected for the
    Display Buffer ([Figure 16-21](#9781430248750_Ch16.xhtml#Fig21)). If the box is
    unchecked, the display buffer uses 16 bits for each pixel, which can result in
    some color banding. Thus we’re going for more visual fidelity at the expense of
    taking up more memory.


    ![9781430248750_Fig16-21.jpg](images/9781430248750_Fig16-21.jpg)


    [Figure 16-21](#9781430248750_Ch16.xhtml#_Fig21). Optimizing the Resolution and
    Presentation in Player Settings


    Let’s leave the Depth Buffer at the default 16 bits per pixel, but if that precision
    is not enough to prevent z-fighting (the case where an object close behind another
    pokes through), you can raise it to 24 bits per pixel, again improving visual
    quality but using more memory.


    The Other Settings section is filled with optimization options, and not just in
    the portion labelled Optimization ([Figure 16-22](#9781430248750_Ch16.xhtml#Fig22)).


    ![9781430248750_Fig16-22.jpg](images/9781430248750_Fig16-22.jpg)


    [Figure 16-22](#9781430248750_Ch16.xhtml#_Fig22). Optimizing Other Settings in
    Player Settings


    ## Static Batching (Pro)


    As I pointed out in the first profiling session, draw calls tend to have a big
    impact on performance. Static batching, only available to Unity iOS Pro users,
    reduces draw calls by combining meshes at build time that can be rendered together
    in the same draw call. For meshes to be combined, their GameObjects must be marked
    as static in the Inspector view and they must share the same material or set of
    materials.


    Static batching is a very flexible system; it remembers the distinct identity
    of each GameObject, so a GameObject with a statically batched mesh can still be
    deactivated at will and is still subject to culling.


    Our bowling game only has one static mesh, the Floor, so enabling static batching
    won’t make any difference here. In general, static batching provides a good performance
    boost but at the expense of taking up more memory, because it essentially copies
    each batched mesh.


    ## Dynamic Batching


    The next option, dynamic batching, is available to both Pro and non-Pro users
    and takes place at runtime. Like static batching, it requires meshes to share
    materials before they can be combined, but dynamic batching can handle moving
    objects, because it checks every frame if it needs to rebatch objects. For example,
    the bowling pins in our game can be batched because they all obviously have the
    same material. They were instantiated from the same prefab, after all.'
  raw: 'Optimize Settings    The proper way to optimize is to methodically go through
    the bottlenecks starting with the largest, profiling the improvements at each
    stage until you achieve your target. But for the purposes of getting through a
    number of optimization procedures in this chapter, we''ll plow through a bunch
    of them in sequence.    Quality Settings    Let’s start by tweaking the global
    settings that relate to our optimization effort. The settings that are most likely
    to affect performance are the Quality Settings, which control the visual quality
    of the game ([Figure 16-17](#9781430248750_Ch16.xhtml#Fig17)).    ![9781430248750_Fig16-17.jpg](images/9781430248750_Fig16-17.jpg)    [Figure
    16-17](#9781430248750_Ch16.xhtml#_Fig17). Optimizing the Quality Settings    We’re
    going for speed, so set the current iOS quality to Fastest and then adjust the
    settings from there. Zero pixel lights is fine for the lighting set up. If you
    had a spotlight, then the lack of a pixel light would be obvious.    You don’t
    want to force all textures to half resolution though. Relying on the Texture Import
    settings to limit the resolution on a case-by-case basis gives you more flexibility.
    So let’s set the Texture Quality to Full Res.    Similarly, you''ll want to change
    the setting for Anisotropic Textures from none to per-texture. Anisotropic Texture
    are textures that compensate for being viewed at an angle, which is appropriate
    for a texture used for a road in a racing game, for example. Like texture resolution,
    anisotropy can be adjusted for a Texture in its Import Settings.    Multisample
    Anti Aliasing (full-screen smoothing) is an expensive operation, as you would
    expect a full-screen per-pixel operation would be.    You don’t have any particle
    systems in this game, so the Soft Particles setting doesn’t matter, but it’s another
    pixel-dominated operation (these types of features are often called fill-rate
    limited).    Shadows are disabled, so all the shadow parameters below it are irrelevant,
    but if shadows were enabled, the two key properties are the Shadow Resolution
    and Shadow Distance. Both properties affect the shadow’s resolution; increasing
    the Shadow Resolution naturally allows for a more sharply defined shadow at the
    expense of more memory consumed for a larger shadow map, and much like the improved
    depth buffer precision of a shortened Camera frustum, a shorter Shadow Distance
    reduces the need for a large shadow map texture. Reducing the Shadow Resolution
    saves space while introducing more jaggy shadows, while reducing the Shadow Distance
    potentially reduces the number of objects involve in the shadows.    Physics Manager    Rigidbodies
    go to sleep when they’re at rest to avoid unnecessary physics computation. “At
    rest” means the Rigidbody’s motion has stopped moving and rotating. You can specify
    the threshold for the Sleep Velocity and Sleep Angular Velocity in the Physics
    Manager ([Figure 16-18](#9781430248750_Ch16.xhtml#Fig18)), available under the
    Settings portion of the Edit menu.    ![9781430248750_Fig16-18.jpg](images/9781430248750_Fig16-18.jpg)    [Figure
    16-18](#9781430248750_Ch16.xhtml#_Fig18). Optimizing the Physics Manager    At
    the bottom of the Physics Manager, you can also specify which layers of GameObjects
    can collide with one another. This doesn’t make a difference with our bowling
    game, because all of our colliding objects are in the Default layer. But to demonstrate
    this point, let’s modify the collision table to only allow GameObjects in the
    Default layer to collide with other GameObjects in the Default layer.    Time
    Manager    Because the physics updates take place at fixed intervals, you can
    reduce physics computation time by increasing the fixed timestep in the Time Manager
    ([Figure 16-19](#9781430248750_Ch16.xhtml#Fig19)). Ideally, the fixed timestep
    should be set as high as possible without degrading the physics simulation. For
    now, we’ll increase the fixed timestep from 0.02 to 0.03.    !


    [9781430248750_Fig16-19.jpg](images/9781430248750_Fig16-19.jpg)    [Figure 16-19](#9781430248750_Ch16.xhtml#_Fig19).
    Optimizing the Time Manager    The property immediately below Fixed Timestep is
    also related to physics updates: Maximum Allowed Timestep. This value caps how
    much time can be spent on physics updates in each frame. This prevents the runaway
    situation where the fixed updates take up a lot of time and increase the frametime,
    thus including more fixed updates in the next frame and so on. Lowering the Maximum
    Allowed Timestep minimizes the `FixedUpdate` impact on the frametime but risks
    degrading the physics simulation.    Audio Manager    There is also an optimization
    tradeoff in how the audio is played. In the Audio Manager ([Figure 16-20](#9781430248750_Ch16.xhtml#Fig20)),
    you can specify the audio latency, which is how much delay is allowed before the
    sound is played.    ![9781430248750_Fig16-20.jpg](images/9781430248750_Fig16-20.jpg)    [Figure
    16-20](#9781430248750_Ch16.xhtml#_Fig20). Optimizing the Audio Manager    For
    games where responsive sound is important (e.g., the collision sounds in our bowling
    game), selecting Best latency (i.e., lowest latency) is appropriate.    Player
    Settings    The Player Settings can have a great effect on optimization. In the
    Resolution and Presentation Settings, we opted for the highest native screen resolution,
    and we also have the maximum 32-bit per-pixel color resolution selected for the
    Display Buffer ([Figure 16-21](#9781430248750_Ch16.xhtml#Fig21)). If the box is
    unchecked, the display buffer uses 16 bits for each pixel, which can result in
    some color banding. Thus we’re going for more visual fidelity at the expense of
    taking up more memory.    ![9781430248750_Fig16-21.jpg](images/9781430248750_Fig16-21.jpg)    [Figure
    16-21](#9781430248750_Ch16.xhtml#_Fig21). Optimizing the Resolution and Presentation
    in Player Settings    Let’s leave the Depth Buffer at the default 16 bits per
    pixel, but if that precision is not enough to prevent z-fighting (the case where
    an object close behind another pokes through), you can raise it to 24 bits per
    pixel, again improving visual quality but using more memory.    The Other Settings
    section is filled with optimization options, and not just in the portion labelled
    Optimization ([Figure 16-22](#9781430248750_Ch16.xhtml#Fig22)).    ![9781430248750_Fig16-22.jpg](images/9781430248750_Fig16-22.jpg)    [Figure
    16-22](#9781430248750_Ch16.xhtml#_Fig22). Optimizing Other Settings in Player
    Settings    Static Batching (Pro)    As I pointed out in the first profiling session,
    draw calls tend to have a big impact on performance. Static batching, only available
    to Unity iOS Pro users, reduces draw calls by combining meshes at build time that
    can be rendered together in the same draw call. For meshes to be combined, their
    GameObjects must be marked as static in the Inspector view and they must share
    the same material or set of materials.    Static batching is a very flexible system;
    it remembers the distinct identity of each GameObject, so a GameObject with a
    statically batched mesh can still be deactivated at will and is still subject
    to culling.    Our bowling game only has one static mesh, the Floor, so enabling
    static batching won’t make any difference here. In general, static batching provides
    a good performance boost but at the expense of taking up more memory, because
    it essentially copies each batched mesh.    Dynamic Batching    The next option,
    dynamic batching, is available to both Pro and non-Pro users and takes place at
    runtime. Like static batching, it requires meshes to share materials before they
    can be combined, but dynamic batching can handle moving objects, because it checks
    every frame if it needs to rebatch objects. For example, the bowling pins in our
    game can be batched because they all obviously have the same material. They were
    instantiated from the same prefab, after all.'
  trans: '

    # 优化设置


    正确的优化方式是系统性地从最大的瓶颈入手，在每一阶段对改进进行性能分析，直至达成目标。但为了在本章中介绍多种优化步骤，我们将快速依次执行一系列操作。


    ## 质量设置


    首先，我们来调整与优化工作相关的全局设置。最可能影响性能的设置是**质量设置**，它控制着游戏的视觉质量（图 16-17）。


    ![9781430248750_Fig16-17.jpg](img/9781430248750_Fig16-17.jpg)


    图 16-17. 优化质量设置


    我们追求的是速度，因此将当前的 iOS 质量设置为**最快**，然后在此基础上进行调整。对于当前的灯光设置，零像素光源是可以接受的。如果你使用了聚光灯，那么缺乏像素光的问题会很明显。


    你并不想强制所有纹理都使用半分辨率。依靠纹理导入设置来逐例限制分辨率，能带来更大的灵活性。因此，我们将纹理质量设置为**全分辨率**。


    同样，你还需要将各向异性纹理的设置从**无**改为**逐纹理**。各向异性纹理可以补偿因倾斜视角观看而导致的失真，例如，这对于赛车游戏中道路纹理来说就很合适。与纹理分辨率类似，各向异性也可以在纹理的导入设置中进行调整。


    多重采样抗锯齿（全屏平滑）是一项耗资源的操作，因为你完全可以预料到，全屏逐像素运算本身就很昂贵。


    你的游戏中没有粒子系统，因此**柔和粒子**设置无关紧要，但它同样是一项逐像素运算（这类特性通常被称为**受限于填充率**）。


    阴影功能已禁用，因此其下方的所有阴影参数均不相关。但如果启用了阴影，两个关键属性是**阴影分辨率**和**阴影距离**。这两个属性都会影响阴影的解析度；提高阴影分辨率自然能获得更清晰的阴影，但代价是消耗更多内存来存储更大的阴影贴图；缩短相机视锥体可以提升深度缓冲精度，类似地，缩短阴影距离也能减少对大型阴影贴图纹理的需求。降低阴影分辨率可以节省空间，但会导致阴影更加锯齿化；而缩短阴影距离则可能减少阴影中涉及的物体数量。


    ## 物理管理器


    刚体在静止时会进入休眠状态，以避免不必要的物理计算。“静止”意味着刚体的运动和旋转都已停止。你可以在**物理管理器**（图 16-18）中指定**休眠速度**和**休眠角速度**的阈值，该管理器位于**编辑**菜单的**设置**部分下。


    ![9781430248750_Fig16-18.jpg](img/9781430248750_Fig16-18.jpg)


    图 16-18. 优化物理管理器


    在物理管理器的底部，你还可以指定哪些层级的游戏对象可以相互碰撞。这在我们的保龄球游戏中没有影响，因为所有碰撞对象都位于**默认**层级。但为了演示这一点，我们修改碰撞表格，只允许**默认**层级中的游戏对象与同一层级中的其他游戏对象碰撞。


    ## 时间管理器


    由于物理更新以固定时间间隔进行，你可以通过增加**时间管理器**（图 16-19）中的**固定时间步长**来减少物理计算时间。理想情况下，应在不降低物理模拟精度的前提下，将固定时间步长尽可能设置得高一些。现在，我们将固定时间步长从
    0.02 增加到 0.03。


    ![9781430248750_Fig16-19.jpg](img/9781430248750_Fig16-19.jpg)


    图 16-19. 优化时间管理器


    紧邻**固定时间步长**下方的属性也与物理更新相关：**最大允许时间步长**。该值限制了每帧可用于物理更新的时间上限。这可以防止出现失控情况：固定更新占用大量时间，导致帧时间增加，进而在下一帧中引发更多固定更新，如此恶性循环。降低**最大允许时间步长**可以最小化
    `FixedUpdate` 对帧时间的影响，但存在降低物理模拟精度风险。


    ## 音频管理器


    音频的播放方式也涉及优化权衡。在**音频管理器**（图 16-20）中，你可以指定音频延迟，即声音播放前允许的延迟时间。


    ![9781430248750_Fig16-20.jpg](img/9781430248750_Fig16-20.jpg)


    图 16-20. 优化音频管理器


    对于需要声音快速响应的游戏（例如我们保龄球游戏中的碰撞音效），选择**最佳延迟**（即最低延迟）是合适的。


    ## 玩家设置


    **玩家设置**对优化效果有很大影响。在**分辨率与显示设置**中，我们选择了最高的原生屏幕分辨率，并且为**显示缓冲区**选择了最高的每像素 32 位色彩分辨率（图
    16-21）。如果取消勾选此框，显示缓冲区将使用每像素 16 位，这可能会导致一些颜色条带现象。因此，我们选择以占用更多内存为代价来换取更高的视觉保真度。


    ![9781430248750_Fig16-21.jpg](img/9781430248750_Fig16-21.jpg)


    图 16-21. 优化玩家设置中的分辨率和显示


    我们将**深度缓冲区**保留为默认的每像素 16 位，但如果该精度不足以防止深度冲突（即一个紧贴另一个物体的对象穿透显现的情况），你可以将其提高到每像素 24
    位，这同样能提升视觉质量，但会使用更多内存。


    **其他设置**部分充满了优化选项，且并非只限于标记为“优化”的区域内（图 16-22）。


    ![9781430248750_Fig16-22.jpg](img/9781430248750_Fig16-22.jpg)


    图 16-22. 优化玩家设置中的其他设置


    ## 静态批处理（专业版）


    正如我在首次性能分析环节中指出的，绘制调用通常对性能有很大影响。**静态批处理**（仅 Unity iOS 专业版用户可用）通过在构建时合并可以在同一次绘制调用中一起渲染的网格，来减少绘制调用。要合并网格，其游戏对象必须在检视面板中标记为**静态**，并且它们必须共享相同的材质或材质集。


    静态批处理是一个非常灵活的系统；它会记住每个游戏对象的独立身份，因此一个拥有静态批处理网格的游戏对象仍然可以随意被停用，并且仍然会接受剔除处理。


    我们的保龄球游戏只有一个静态网格——地面，因此启用静态批处理在这里不会产生任何效果。总的来说，静态批处理能显著提升性能，但代价是消耗更多内存，因为它实质上会复制每个被批处理的网格。


    ## 动态批处理


    下一个选项，**动态批处理**，对专业版和非专业版用户都可用，并且在运行时进行。与静态批处理类似，它要求网格在合并前共享材质，但动态批处理可以处理移动中的对象，因为它每帧都会检查是否需要重新批处理对象。例如，我们游戏中的保龄球瓶可以被批处理，因为它们显然都使用了相同的材质。毕竟，它们都是由同一个预制件实例化而来的。

