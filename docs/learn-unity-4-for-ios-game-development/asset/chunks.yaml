    Material and decide you want to alter the appearance of one by modifying its Material,
    you don’t necessarily want to make the same change to the other GameObject.    However,
    if you’re going to apply the same animation to all the GameObjects that are sharing
    the Material, then there’s no reason to stop sharing the Material. So you can
    modify the script to access the `sharedMaterials` variable of the `MeshRenderer`
    instead of the materials variable. Accessing `sharedMaterials` (or `sharedMaterial`
    if you assume only one Material on the GameObject) means you really do want to
    change the shared Material and avoids creating a new one, thus preserving eligibility
    for batching. To handle both shared and nonshared Material cases, let’s add a
    public variable that allows you to specify whether the animation breaks Material
    sharing, and let’s use that value to determine whether to modify `renderer.materials`
    or `renderer.sharedMaterials` ([Listing 16-10](#9781430248750_Ch16.xhtml#list10)).    [Listing
    16-10](#9781430248750_Ch16.xhtml#_list10).  Texture Animation Script with Option
    to Share Material    ``` #pragma strict  var speed:Vector2; var materialIndex:int=0;  var
    shared:boolean = true;  private var offset:Vector2; private var material:Material;  function
    Start() {         offset=new Vector2(0,0);         if (shared) {                 material
    = renderer.sharedMaterials[materialIndex];         } else {                 material
    = renderer.materials[materialIndex];         } }  function Update () {         var
    dtime:float = Time.deltaTime;         offset.x=(offset.x+speed.x*dtime)%1.0f;
            offset.y=(offset.y+speed.y*dtime)%1.0f;         material.SetTextureOffset("_MainTex",offset);
    } ```    An additional, although less significant, optimization is available when
    using this script to animate a shared Material. It would be redundant for every
    GameObject with the same Material to run the same texture animation script; just
    one instance of the script is sufficient to drive the animation for everyone.    Minimize
    Garbage Collection    I alluded to automatic memory management when we developed
    our iAd banner script in the previous chapter, noting that you have to keep a
    reference to the ad object to keep it from getting garbage collected, and you
    should remove the reference to allow the garbage collector to reclaim the space
    used by the object. In the worst case, if you’re constantly creating objects and
    never allowing them to be garbage collected (let’s say you’ve added the objects
    to an Array and never remove them, so they’re always referenced), you’ll eventually
    run out of memory.    Garbage collections can introduce noticeable pauses into
    a game. The most effective way to minimize those pauses is to minimize the necessity
    for garbage collection, and that can be accomplished by minimizing the number
    of objects that are eventually reclaimed by the collector.'
  trans: "\n`localPosition`；`startRot = trans.localEulerAngles; }`\n```\nfunction\
    \ ResetPosition() { \n    // 恢复到初始位置\n    trans.localPosition = startPos; \n \
    \   trans.localEulerAngles = startRot; \n    // 确保停止所有物理运动\n    if (body != null)\
    \ { \n        body.velocity = Vector3.zero; \n        body.angularVelocity = Vector3.zero;\
    \ \n    } \n}\n```\n\n原始版本的 `FuguReset.js` 引用了两个组件快捷变量：`transform` 和 `rigidbody`。因此，我们添加了两个私有变量\
    \ `trans` 和 `body` 来引用这些组件，并在 `Awake` 回调中初始化 `trans` 和 `body`。\n\n这种清理方法适用于我们很多脚本，因为我们会经常引用\
    \ `transform`、`rigidbody` 和 `audio`。我不会列出所有修改后的代码，但更新后的脚本已包含在 `http://learnunity4.com/`\
    \ 上本章的项目文件中。\n\n## UnityGUI\n\n详细的分析结果显示，UnityGUI 占用了我们帧时间的很大一部分。UnityGUI 中一个性能瓶颈是使用\
    \ `GUILayout` 自动布局 GUI 元素所带来的开销。我们在记分板中没有使用 `GUILayout`，因此可以在 `FuguBowlScoreboard`\
    \ 脚本中（清单 16-7）添加一个 `Awake` 回调，将 `useGUILayout` 设置为 false。\n\n清单 16-7。在 `FuguBowlScoreboard.js`\
    \ 中将 `useGUILayout` 设置为 false\n\n```\nfunction Awake() { \n    useGUILayout =\
    \ false; \n}\n```\n\n暂停菜单仍然使用了 `GUILayout`，但由于菜单只在游戏暂停时出现，不会影响游戏玩法，因此其性能问题不那么重要。\n\
    \n## 运行时静态批处理（专业版）\n\n动态批处理可以合并那些在构建时因移动或恰好是在游戏运行时创建而不适合静态批处理的相似网格。但动态批处理需要不断更新批处理信息，这就是分析结果中显示批处理时间的原因。如果被批处理的对象是一起移动的，或者它们没有移动但是在运行时实例化的，那么这种重新批处理似乎是一种浪费。此外，由于批处理会占用内存，因此动态批处理的数量有上限（Unity\
    \ 文档目前说明是 30000 个顶点，但这个数字可能会变化）。\n\n幸运的是，有一个名为 `StaticBatchingUtility` 的类（在 Unity\
    \ 专业版和 Unity iOS 专业版中可用），它允许你通过调用 `Combine` 函数在运行时执行静态批处理。清单 16-8 展示了一个非常简单的脚本，它只是在脚本的\
    \ `GameObject` 上调用了 `StaticBatchingUtility.Combine`。\n\n清单 16-8。用于对对象层次结构进行静态批处理的脚本\n\
    \n```\n#pragma strict \n\nfunction Start() { \n    StaticBatchingUtility.Combine(gameObject);\
    \ \n}\n```\n\n虽然简单，但这个脚本功能完整。例如，在旋转立方体场景中，如果我们将此脚本拖拽到带有两个子立方体的主旋转立方体上（并禁用了子立方体的单独旋转脚本），那么当场景开始播放时，所有三个立方体将被静态批处理在一起。被批处理的\
    \ `GameObjects` 不必处于同一个层次结构中。`StaticBatchingUtility.Combine` 是一个重载函数，另一个版本接受两个参数：一个要批处理在一起的\
    \ `GameObjects` 数组，以及一个被指定为父对象的 `GameObject`。\n\n## 共享材质\n\n要进行批处理——无论是静态、动态还是通过调用\
    \ `StaticBatchingUtility.Combine`——被批处理的网格必须共享相同的材质或材质集合。但特别是在动态批处理中，你需要小心，如果修改材质，不要破坏这种共享。\n\
    \n例如，清单 16-9 中的脚本通过不断改变材质的纹理偏移量来动画其纹理。\n\n这会产生一个滚动纹理的效果；在 HyperBowl 中，此脚本用于为滚动霓虹灯招牌、天空中飘移的云朵以及流动的水体制作纹理动画。然而，当脚本通过调用其\
    \ `SetTextureOffset` 函数修改材质时，如果原始材质恰好是共享的，则会创建一个新的材质。\n\n清单 16-9。用于动画材质纹理坐标偏移量的脚本\n\
    \n```\n#pragma strict \n\nvar speed:Vector2; \nvar materialIndex:int=0; \n\nprivate\
    \ var offset:Vector2; \nprivate var material:Material; \n\nfunction Start() {\
    \ \n    offset=new Vector2(0,0); \n    material = renderer.materials[materialIndex];\
    \ \n} \n\nfunction Update () { \n    var dtime:float = Time.deltaTime; \n    offset.x=(offset.x+speed.x*dtime)%1.0f;\
    \ \n    offset.y=(offset.y+speed.y*dtime)%1.0f; \n    material.SetTextureOffset(\"\
    _MainTex\",offset); \n}\n```\n\n当然，这是有道理的。如果你使用相同的材质创建了两个 `GameObjects`，并且决定通过修改其中一个的材质来改变其外观，你通常不希望对另一个\
    \ `GameObject` 也做同样的修改。\n\n然而，如果你要对所有共享该材质的 `GameObjects` 应用相同的一致的动画，那么就没有理由停止共享该材质。因此，你可以修改脚本，使其访问\
    \ `MeshRenderer` 的 `sharedMaterials` 变量，而不是 `materials` 变量。访问 `sharedMaterials`（或者如果假设\
    \ `GameObject` 上只有一个材质，则访问 `sharedMaterial`）意味着你真的想要更改共享材质并避免创建新的材质，从而保持批处理的资格。为了处理共享和非共享材质两种情况，我们添加一个公共变量，允许你指定动画是否会破坏材质共享，并用该值来决定是修改\
    \ `renderer.materials` 还是 `renderer.sharedMaterials`（清单 16-10）。\n\n清单 16-10。带有共享材质选项的纹理动画脚本\n\
    \n```\n#pragma strict \n\nvar speed:Vector2; \nvar materialIndex:int=0; \n\nvar\
    \ shared:boolean = true; \n\nprivate var offset:Vector2; \nprivate var material:Material;\
    \ \n\nfunction Start() { \n    offset=new Vector2(0,0); \n    if (shared) { \n\
    \        material = renderer.sharedMaterials[materialIndex]; \n    } else { \n\
    \        material = renderer.materials[materialIndex]; \n    } \n} \n\nfunction\
    \ Update () { \n    var dtime:float = Time.deltaTime; \n    offset.x=(offset.x+speed.x*dtime)%1.0f;\
    \ \n    offset.y=(offset.y+speed.y*dtime)%1.0f; \n    material.SetTextureOffset(\"\
    _MainTex\",offset); \n}\n```\n\n此外，在使用此脚本对共享材质进行动画时，还有一个虽然不是那么重要但可用的优化。每个使用相同材质的\
    \ `GameObject` 都运行相同的纹理动画脚本是多余的；只需要一个脚本实例就足以驱动所有人的动画。\n\n## 最小化垃圾回收\n\n在上一章开发\
    \ iAd 横幅脚本时，我提到了自动内存管理，指出你必须保持对广告对象的引用以防止它被垃圾回收，并且应该移除引用以允许垃圾回收器回收该对象使用的空间。在最坏的情况下，如果你不断地创建对象且从不允许它们被垃圾回收（假设你将对象添加到一个\
    \ `Array` 中但从不移除，因此它们始终被引用），最终你会耗尽内存。\n\n垃圾回收会在游戏中引入明显的停顿。最小化这些停顿的最有效方法是最小化垃圾回收的需求，这可以通过最小化最终被回收器回收的对象数量来实现。\n"
- fmt: "一种技巧是将对象保存在 *`pool`* 中以便重用，而不是让它们被垃圾回收。你也可以通过调用`System.GC.Collect`来显式地调用收集器。例如，你可以在保龄球游戏控制器的`Awake`回调中添加该调用，以确保在游戏开始前进行一次垃圾回收，这将立即清理上一个场景留下的所有未使用对象（[清单\
    \ 16-11](#9781430248750_Ch16.xhtml#list11)）。\n\n[清单 16-11](#9781430248750_Ch16.xhtml#_list11).\
    \ 在`FuguBowl.js`中添加对垃圾回收器的调用\n\n```\nfunction Awake() {\n        player = new\
    \ FuguBowlPlayer();\n        CreatePins();\n        System.GC.Collect();\n}\n\
    ```\n\n**离线优化**\n\n到目前为止，我们所做的所有更改都是快速优化，你可以立即通过测试运行和分析来查看它们的效果。Unity 还集成了一些商业场景预处理工具，可以极大提升性能：`Beast`\
    \ 和 `Umbra`。这些工具在本章中不会使用，因为它们的设置和运行可能需要相当长的时间，而且坦率地说，它们对我们简单的场景作用不大。但我将在以下小节中简要介绍它们。\n\
    \n**Beast**\n\n在不产生严重性能损失的情况下添加高质量实时照明是很困难的。每个额外的逐像素光源都会产生更多的绘制调用，阴影代价高昂，且最终的视觉质量不如桌面端，更不用说离线渲染的计算机生成场景了。`Beast`\
    \ 通过生成光照贴图（一种预计算并“烘焙”到纹理中的照明）解决了这两个问题。当然，一切都是有代价的——除了设置和烘焙时间外，光照贴图场景最终会产生额外的大纹理，占用更多内存，增加应用程序大小，并延长场景加载时间。\n\
    \n要为当前场景生成光照贴图，你首先必须将所有不移动的游戏对象（包括灯光）标记为静态，因为你只能为固定的灯光和表面预计算照明。光照贴图作为第二层纹理叠加在网格上，因此你很可能需要重新导入静态网格，并选中“`Generate\
    \ Lightmap UVs`”选项以创建第二组纹理坐标。然后，从编辑器菜单栏的“`Window`”菜单中调出“`Lightmapping`”窗口（[图 16-35](#9781430248750_Ch16.xhtml#Fig35)）。\n\
    \n![9781430248750_Fig16-35.jpg](images/9781430248750_Fig16-35.jpg)\n\n[图 16-35](#9781430248750_Ch16.xhtml#_Fig35).\
    \ 光照贴图窗口\n\n在该窗口中，你可以在“`Object`”面板中调整每个对象的光照贴图属性，然后切换到“`Bake`”面板以设置光照贴图属性并启动光照贴图烘焙。\n\
    \n请注意，Unity iOS 上不支持双光照贴图，因为该功能需要延迟光照，因此单光照贴图是唯一选项，动态和静态照明将无法很好地混合，尤其是在阴影方面。\n\
    \n**Umbra (Pro)**\n\n我之前提到过，每个摄像机都会执行视锥体剔除，忽略任何位于摄像机视锥体之外的游戏对象。不熟悉实时计算机图形学的人可能会认为被遮挡的对象（即被其他对象挡住视线的对象）也会被剔除，但事实并非如此。视锥体内的所有对象都会被渲染，深度缓冲用于逐像素确定哪个对象在另一个对象的前面。确定一个对象是否位于视锥体之外是一个相对直接的计算，但确定哪些对象被遮挡则需要一些预处理。这正是\
    \ Unity 集成 `Umbra` 作为遮挡剔除工具的作用所在。\n\n为场景添加遮挡剔除的过程与光照贴图类似。你需要将不移动的对象标记为静态，然后从 Unity\
    \ 编辑器菜单栏的“`Window`”菜单中调出“`Occlusion Culling`”窗口（[图 16-36](#9781430248750_Ch16.xhtml#Fig36)）。\n\
    \n![9781430248750_Fig16-36.jpg](images/9781430248750_Fig16-36.jpg)\n\n[图 16-36](#9781430248750_Ch16.xhtml#_Fig36).\
    \ 遮挡剔除窗口\n\n在那里，你可以在“`Object`”选项卡中调整每个对象的遮挡剔除设置，然后在“`Bake`”选项卡中指定遮挡剔除设置并烘焙遮挡剔除数据。\n\
    \n**最终分析结果**\n\n现在你已经完成了对项目的优化，是时候再次分析游戏了（[清单 16-12](#9781430248750_Ch16.xhtml#list12)），尽管如果你想有条不紊地进行，应该在每次更改后都运行一次分析以查看其效果。\n\
    \n[清单 16-12](#9781430248750_Ch16.xhtml#_list12). 优化后的内置分析结果\n\n```\niPhone Unity\
    \ internal profiler stats: cpu-player>    min:  5.0   max:  9.7   avg:  6.1 cpu-ogles-drv>\
    \ min:  3.4   max:  7.4   avg:  4.2 cpu-present>   min:  0.9   max: 10.5   avg:\
    \  4.2 cpu-waits-gpu> min:  0.9   max: 10.5   avg:  4.2  msaa-resolve> min:  0.0\
    \   max:  0.0   avg:  0.0 frametime>     min: 13.5   max: 22.1   avg: 16.6 draw-call\
    \ #>   min:  30    max:  30    avg:  30     | batched:    10 tris #>        min:\
    \  4592  max:  4592  avg:  4592   | batched:  3420 verts #>       min:  3728 \
    \ max:  3728  avg:  3728   | batched:  2750 player-detail> physx:  0.0 animation:\
    \  0.0 culling  0.0 skinning:  0.0 batching:  2.2 render:  3.4 fixed-update-count:\
    \ 0 .. 0 mono-scripts>  update:  0.1   fixedUpdate:  0.0 coroutines:  0.0 mono-memory>\
    \   used heap: 389120 allocated heap: 524288  max number of collections: 0 collection\
    \ total duration:  0.0\n```\n\n分析结果显示平均帧时长为 16.6 毫秒，刚刚好是 60 fps。目标达成！此分析结果是在第四代\
    \ iPod touch（相当于 iPhone 4）上运行的，因此根据你的设备，结果可能会有所不同。\n\n`player-detail` 一行表明帧时长主要由批处理和渲染主导，因此图形是剩余的瓶颈，再在脚本优化上花费更多时间并不明智。如果你认为\
    \ 30 fps 也不错，那么你处于一个可以添加更多内容和功能的良好状态。\n\n**进一步探索**\n\n在本章开头，我引用了过早优化的风险，即在让程序运行之前就使事情复杂化。但是，你应该从开发之初就牢记性能目标。从简单开始（Unity\
    \ 文档建议在 iPhone 3GS 上渲染不超过 40000 个顶点），让程序运行起来，优化到满足性能目标，继续添加内容和功能，并在游戏性能低于目标时停下来优化。并且要记住分析并优化瓶颈。优化只占你帧时长\
    \ 10% 的部分，而忽略占 50% 的部分，是毫无益处的。\n\n**Unity 手册**\n\n在 Unity 手册中，“`Getting Started\
    \ with iOS Development`”部分有多个关于“`Optimizing Performance in iOS`”的页面，涵盖了为优化构建而调整的“`Player\
    \ Settings`”、内置分析器的描述以及优化构建大小。\n\n“`Advanced`”部分记录了 Unity Pro 附带的 `Profiler`，以及前面提到的离线优化功能：光照贴图和遮挡剔除。“`Advanced`”部分还包括许多其他与优化相关的页面：“`Optimizing\
    \ Graphics Performance`”、“`Reducing File Size`”、“`Automatic Memory Management`”（垃圾回收）和“`Shadows`”（特别是“`Shadow\
    \ Performance`”）。关于“`Asset Bundles`”和“`Loading Resources`”的页面解释了资产如何被下载并按需加载到场景中，这是一种可用于管理安装后应用程序大小的技术。\n\
    \n**参考手册**\n\n参考手册描述了我们优化过的所有组件和资源类型。"
  raw: 'One technique is to keep objects in a *pool* so they can be reused, instead
    of letting them get garbage collected.    You can also explicitly invoke the collector
    by calling `System.GC.Collect`. For example, you can add that call to the `Awake`
    callback in our bowling game controller to make sure a garbage collection takes
    place before the game starts, which will immediately clean up any unused objects
    left over from the previous scene ([Listing 16-11](#9781430248750_Ch16.xhtml#list11)).    [Listing
    16-11](#9781430248750_Ch16.xhtml#_list11).  Adding a Call to the Garbage Collector
    in FuguBowl.js    ``` function Awake() {         player = new FuguBowlPlayer();
            CreatePins();         System.GC.Collect(); } ```    Optimize Offline    All
    of the changes we’ve made so far are quick optimizations that you can immediately
    try out with a test run and profile to see their effect. Unity also integrates
    some commercial scene preprocessing tools that can greatly improve performance:
    Beast and Umbra. These won’t be used in this chapter because they can take quite
    a while to set up and run, and frankly, they won’t do much for our simple scene.
    But I’ll describe them briefly in the following sections.    Beast    It’s difficult
    to add high-quality, real-time lighting without a heavy performance penalty. Each
    additional pixel light generates more draw calls, shadows are expensive, and the
    resulting visual quality is not as good as on the desktop much less a computer-generated
    scene that has been rendered offline. Beast solves both problems by generating
    lightmaps, which is precalculated lighting that is “baked” into textures. Of course,
    nothing is free—besides the set up and baking time, the lightmapped scene ends
    up with additional large textures that take up more memory, increase the app size,
    and lengthen the scene loading time.    To generate lightmaps for the current
    scene, you would first have to mark all the nonmoving GameObjects, including Lights,
    as static, because you can only precalculate lighting for fixed lights and surfaces.
    A lightmap is layered as a second texture over the mesh, so most likely, you would
    have to reimport your static meshes with the Generate Lightmap UVs option selected
    to create that second set of texture coordinates. Then you would bring up the
    Lightmapping window from the Window menu on the Editor menu bar ([Figure 16-35](#9781430248750_Ch16.xhtml#Fig35)).    ![9781430248750_Fig16-35.jpg](images/9781430248750_Fig16-35.jpg)    [Figure
    16-35](#9781430248750_Ch16.xhtml#_Fig35). Lightmapping window    In that window,
    you can adjust the lightmapping properties for each object in the Object pane,
    then switch to the Bake pane to set the lightmapping properties and initiate the
    lightmapping.    Note that dual lightmaps are unavailable on Unity iOS, because
    that feature requires deferred lighting, so single lightmaps is the only option
    and dynamic and static lighting won’t mix as well, especially with shadows.    Umbra
    (Pro)    I mentioned how each Camera performs frustum culling, ignoring any GameObject
    that lies outside the Camera’s view volume. Those not familiar with real-time
    computer graphics might assume that an obscured object (i.e., blocked from view
    by another) is also culled, but that’s not the case. All objects within the frustum
    are rendered, and the depth buffer is used to determine on a pixel-by-pixel basis
    which object is in front of another. Determining whether an object is positioned
    outside the frustum is a relatively straightforward calculation, but determining
    which objects are occluded requires some preprocessing. That’s where Unity’s integrating
    of Umbra as an occlusion culling tool comes in.    Adding occlusion culling to
    the scene is similar to the process of lightmapping the scene. You would mark
    nonmoving objects as static and then bring up the Occlusion Culling window from
    the Window menu on the Unity Editor menu bar ([Figure 16-36](#9781430248750_Ch16.xhtml#Fig36)).    !


    [9781430248750_Fig16-36.jpg](images/9781430248750_Fig16-36.jpg)    [Figure 16-36](#9781430248750_Ch16.xhtml#_Fig36).
    Occlusion Culling window    From there, you can adjust per-object occlusion culling
    settings in the Object tab, and then in the Bake tab specify the occlusion culling
    settings and then bake the occlusion culling data.    Final Profile    Now that
    you’ve completed an optimization pass through our project, it’s time to profile
    the game again ([Listing 16-12](#9781430248750_Ch16.xhtml#list12)), although if
    you want to be methodical, you should run a profile after each change to see its
    effect.    [Listing 16-12](#9781430248750_Ch16.xhtml#_list12).  Built-In Profile
    Results After Optimizations    ``` iPhone Unity internal profiler stats: cpu-player>    min:  5.0  
    max:  9.7   avg:  6.1 cpu-ogles-drv> min:  3.4   max:  7.4   avg:  4.2 cpu-present>  
    min:  0.9   max: 10.5   avg:  4.2 cpu-waits-gpu> min:  0.9   max: 10.5   avg:  4.2
     msaa-resolve> min:  0.0   max:  0.0   avg:  0.0 frametime>     min: 13.5   max:
    22.1   avg: 16.6 draw-call #>   min:  30    max:  30    avg:  30     | batched:    10
    tris #>        min:  4592  max:  4592  avg:  4592   | batched:  3420 verts #>      
    min:  3728  max:  3728  avg:  3728   | batched:  2750 player-detail> physx:  0.0
    animation:  0.0 culling  0.0 skinning:  0.0 batching:  2.2 render:  3.4 fixed-update-count:
    0 .. 0 mono-scripts>  update:  0.1   fixedUpdate:  0.0 coroutines:  0.0 mono-memory>  
    used heap: 389120 allocated heap: 524288  max number of collections: 0 collection
    total duration:  0.0 ```    The profile lists an average frametime of 16.6 ms,
    which is just about 60 fps. Target achieved! This profile was run on a fourth-generation
    iPod touch (equivalent to an iPhone 4), so depending on your device, your mileage
    may vary.    The player-detail line indicates the frametime is dominated by batching
    and rendering, so graphics is the remaining bottleneck and any more time spent
    on script optimization would not be time well spent. And if you decided that 30
    fps isn’t so bad, then you’re in a good situation to add more content and features.    Explore
    Further    I began this chapter by citing the perils of optimizing too early,
    at the risk of complicating things before you even got something working. But
    you should keep your performance target in mind from the very beginning of development.
    Start simple (the Unity documentation recommends rendering no more than 40,000
    vertices on the iPhone 3GS), get something working, optimize enough to meet your
    performance target, continue adding content and functionality, and stop and optimize
    every time the game’s performance falls below your target. And remember to profile
    and optimize the bottlenecks. It will do you no good to optimize something that’s
    taking 10% of your frametime and leave alone something else that’s taking 50%.    Unity
    Manual    In the Unity Manual, the section “Getting Started with iOS Development”
    has several pages on “Optimizing Performance in iOS,” covering the “Player Settings”
    we adjusted to optimize builds, description of the built-in profiler, and optimizing
    the build size.    The “Advanced” section documents the Profiler available with
    Unity Pro and also the offline optimization features mentioned: lightmapping and
    occlusion culling. The “Advanced” section includes many other pages related to
    optimization: “Optimizing Graphics Performance,” “Reducing File Size,” “Automatic
    Memory Management” (garbage collection), and “Shadows” (in particular, “Shadow
    Performance”). The pages on “Asset Bundles” and “Loading Resources” explain how
    assets can be downloaded and brought into a scene on demand, which is a technique
    that can be used to manage the installed app size.    Reference Manual    The
    Reference Manual describes all the Components and Asset types we optimized.'
  trans: "\n一种技巧是将对象保存在 *`pool`* 中以便重用，而不是让它们被垃圾回收。你也可以通过调用`System.GC.Collect`来显式地调用收集器。例如，你可以在保龄球游戏控制器的`Awake`回调中添加该调用，以确保在游戏开始前进行一次垃圾回收，这将立即清理上一个场景留下的所有未使用对象（清单\
    \ 16-11）。\n\n清单 16-11. 在`FuguBowl.js`中添加对垃圾回收器的调用\n\n```\nfunction Awake() {\n\
    \        player = new FuguBowlPlayer();\n        CreatePins();\n        System.GC.Collect();\n\
    }\n```\n\n**离线优化**\n\n到目前为止，我们所做的所有更改都是快速优化，你可以立即通过测试运行和分析来查看它们的效果。Unity 还集成了一些商业场景预处理工具，可以极大提升性能：`Beast`\
    \ 和 `Umbra`。这些工具在本章中不会使用，因为它们的设置和运行可能需要相当长的时间，而且坦率地说，它们对我们简单的场景作用不大。但我将在以下小节中简要介绍它们。\n\
    \n**Beast**\n\n在不产生严重性能损失的情况下添加高质量实时照明是很困难的。每个额外的逐像素光源都会产生更多的绘制调用，阴影代价高昂，且最终的视觉质量不如桌面端，更不用说离线渲染的计算机生成场景了。`Beast`\
    \ 通过生成光照贴图（一种预计算并“烘焙”到纹理中的照明）解决了这两个问题。当然，一切都是有代价的——除了设置和烘焙时间外，光照贴图场景最终会产生额外的大纹理，占用更多内存，增加应用程序大小，并延长场景加载时间。\n\
    \n要为当前场景生成光照贴图，你首先必须将所有不移动的游戏对象（包括灯光）标记为静态，因为你只能为固定的灯光和表面预计算照明。光照贴图作为第二层纹理叠加在网格上，因此你很可能需要重新导入静态网格，并选中“`Generate\
    \ Lightmap UVs`”选项以创建第二组纹理坐标。然后，从编辑器菜单栏的“`Window`”菜单中调出“`Lightmapping`”窗口（图 16-35）。\n\
    \n![9781430248750_Fig16-35.jpg](img/9781430248750_Fig16-35.jpg)\n\n图 16-35. 光照贴图窗口\n\
    \n在该窗口中，你可以在“`Object`”面板中调整每个对象的光照贴图属性，然后切换到“`Bake`”面板以设置光照贴图属性并启动光照贴图烘焙。\n\n\
    请注意，Unity iOS 上不支持双光照贴图，因为该功能需要延迟光照，因此单光照贴图是唯一选项，动态和静态照明将无法很好地混合，尤其是在阴影方面。\n\n\
    **Umbra (Pro)**\n\n我之前提到过，每个摄像机都会执行视锥体剔除，忽略任何位于摄像机视锥体之外的游戏对象。不熟悉实时计算机图形学的人可能会认为被遮挡的对象（即被其他对象挡住视线的对象）也会被剔除，但事实并非如此。视锥体内的所有对象都会被渲染，深度缓冲用于逐像素确定哪个对象在另一个对象的前面。确定一个对象是否位于视锥体之外是一个相对直接的计算，但确定哪些对象被遮挡则需要一些预处理。这正是\
    \ Unity 集成 `Umbra` 作为遮挡剔除工具的作用所在。\n\n为场景添加遮挡剔除的过程与光照贴图类似。你需要将不移动的对象标记为静态，然后从 Unity\
    \ 编辑器菜单栏的“`Window`”菜单中调出“`Occlusion Culling`”窗口（图 16-36）。\n\n![9781430248750_Fig16-36.jpg](img/9781430248750_Fig16-36.jpg)\n\
    \n图 16-36. 遮挡剔除窗口\n\n在那里，你可以在“`Object`”选项卡中调整每个对象的遮挡剔除设置，然后在“`Bake`”选项卡中指定遮挡剔除设置并烘焙遮挡剔除数据。\n\
    \n**最终分析结果**\n\n现在你已经完成了对项目的优化，是时候再次分析游戏了（清单 16-12），尽管如果你想有条不紊地进行，应该在每次更改后都运行一次分析以查看其效果。\n\
    \n清单 16-12. 优化后的内置分析结果\n\n```\niPhone Unity internal profiler stats: cpu-player>\
    \    min:  5.0   max:  9.7   avg:  6.1 cpu-ogles-drv> min:  3.4   max:  7.4  \
    \ avg:  4.2 cpu-present>   min:  0.9   max: 10.5   avg:  4.2 cpu-waits-gpu> min:\
    \  0.9   max: 10.5   avg:  4.2  msaa-resolve> min:  0.0   max:  0.0   avg:  0.0\
    \ frametime>     min: 13.5   max: 22.1   avg: 16.6 draw-call #>   min:  30   \
    \ max:  30    avg:  30     | batched:    10 tris #>        min:  4592  max:  4592\
    \  avg:  4592   | batched:  3420 verts #>       min:  3728  max:  3728  avg: \
    \ 3728   | batched:  2750 player-detail> physx:  0.0 animation:  0.0 culling \
    \ 0.0 skinning:  0.0 batching:  2.2 render:  3.4 fixed-update-count: 0 .. 0 mono-scripts>\
    \  update:  0.1   fixedUpdate:  0.0 coroutines:  0.0 mono-memory>   used heap:\
    \ 389120 allocated heap: 524288  max number of collections: 0 collection total\
    \ duration:  0.0\n```\n\n分析结果显示平均帧时长为 16.6 毫秒，刚刚好是 60 fps。目标达成！此分析结果是在第四代 iPod\
    \ touch（相当于 iPhone 4）上运行的，因此根据你的设备，结果可能会有所不同。\n\n`player-detail` 一行表明帧时长主要由批处理和渲染主导，因此图形是剩余的瓶颈，再在脚本优化上花费更多时间并不明智。如果你认为\
    \ 30 fps 也不错，那么你处于一个可以添加更多内容和功能的良好状态。\n\n**进一步探索**\n\n在本章开头，我引用了过早优化的风险，即在让程序运行之前就使事情复杂化。但是，你应该从开发之初就牢记性能目标。从简单开始（Unity\
    \ 文档建议在 iPhone 3GS 上渲染不超过 40000 个顶点），让程序运行起来，优化到满足性能目标，继续添加内容和功能，并在游戏性能低于目标时停下来优化。并且要记住分析并优化瓶颈。优化只占你帧时长\
    \ 10% 的部分，而忽略占 50% 的部分，是毫无益处的。\n\n**Unity 手册**\n\n在 Unity 手册中，“`Getting Started\
    \ with iOS Development`”部分有多个关于“`Optimizing Performance in iOS`”的页面，涵盖了为优化构建而调整的“`Player\
    \ Settings`”、内置分析器的描述以及优化构建大小。\n\n“`Advanced`”部分记录了 Unity Pro 附带的 `Profiler`，以及前面提到的离线优化功能：光照贴图和遮挡剔除。“`Advanced`”部分还包括许多其他与优化相关的页面：“`Optimizing\
    \ Graphics Performance`”、“`Reducing File Size`”、“`Automatic Memory Management`”（垃圾回收）和“`Shadows`”（特别是“`Shadow\
    \ Performance`”）。关于“`Asset Bundles`”和“`Loading Resources`”的页面解释了资产如何被下载并按需加载到场景中，这是一种可用于管理安装后应用程序大小的技术。\n\
    \n**参考手册**\n\n参考手册描述了我们优化过的所有组件和资源类型。\n"
- fmt: "# 排版后的内容\n\nAmong those Components, we tweaked the `Camera` frustum and visibility\
    \ mask, also adjusted the culling mask and distance for the Light in addition\
    \ to disabling its shadow, minimized the number of shadow casters and receivers\
    \ per `MeshFilter`, simplified the shaders for each `MeshRenderer`, and replaced\
    \ a `MeshCollider` with a `BoxCollider`. We looked over the Import Settings for\
    \ the various Asset types referenced by the Components: `Texture2D`, `AudioClip`,\
    \ and `Mesh`. The Reference Manual also documents the Settings Managers we customized,\
    \ including the `QualitySettings`, `PhysicsManager`, `TimeManager`, and `AudioManager`.\
    \ We also used the `GUIText` Component, sibling of the `GUITexture` we use for\
    \ a splash screen, for our frame rate display.\n\n## Scripting Reference\n\nThe\
    \ `Scripting Overview` section of the Scripting Reference has a `Performance Optimization`\
    \ page with some tips on how to write faster scripts. The one new function we\
    \ learned in this chapter is the static function `Combine` in the `StaticBatchingUtility`\
    \ class (`Combine` is the only function in that class), which we called to batch\
    \ a hierarchy of GameObjects at runtime. The one new variable we learned in this\
    \ chapter is the `useGUILayout` variable in the `MonoBehaviour` class, which when\
    \ set to true provides a performance increase by telling the UnityGUI system that\
    \ the current `OnGUI` callback will not be performing any automatic layout using\
    \ the `GUILayout` functions.\n\nThe Settings Managers all have corresponding classes\
    \ so that their settings can be queried and set with scripts. Even though all\
    \ of the Settings Managers except Render Settings are active for the entire game\
    \ and not per scene, script access allows us to adjust settings for each scene.\
    \ For example, we might define a Quality Level for each scene and add a script\
    \ to each scene that loads the appropriate Quality Level. The classes corresponding\
    \ to the Settings Managers discussed in this chapter include `QualitySettings`,\
    \ `AudioSettings`, `PhysicsManager`, and `Timemanager`.\n\nWe also used the `Time`\
    \ class, evaluating its `timeScale` and `deltaTime` variables and setting the\
    \ `text` variable of a `GUIText` for our rudimentary frame rate display.\n\n##\
    \ Asset Store\n\nThe Asset Store lists a few profiling systems (search for `profiler`)\
    \ and some object pooling systems (search for `pool`), such as PoolManager, Smart\
    \ Pool and Pooling Manager. That last one, from DFT Games, is free.\n\n## On the\
    \ Web\n\nThe Unity wiki at `http://wiki.unity3d.com/` has some performance tips\
    \ under its `Tips, Tricks and Tools` section and several performance-related scripts.\
    \ In particular, the `FramesPerSecond` page lists several frame-rate display scripts\
    \ more sophisticated than the one we created in this chapter (for example, they\
    \ calculate the frame rate from a series of frames for a steadier display).\n\n\
    The Umbra occlusion culling system is developed by Umbra Software at `http://umbrasoftware.com/`.\
    \ The Beast lightmapping system is an Autodesk product with a product page at\
    \ `http://gameware.autodesk.com/beast`.\n\n## Books\n\nI've mentioned Real-Time\
    \ Rendering (`http://realtimerendering.com`) a couple of times, already, but it's\
    \ really really relevant to the graphics optimizations in this chapter. Just the\
    \ treatment on mipmapping is a good read.\n\n# Chapter 17: Where to Go from Here?\n\
    \nYou've now completed this introduction to Unity and Unity iOS development, from\
    \ downloading and installing Unity, to developing a simple bowling game in the\
    \ Unity Editor, to getting it to run on iOS, and finally optimizing it to run\
    \ with decent performance. Although not every Unity feature or game development\
    \ topic was covered (this book would start to resemble a multivolume encyclopedia\
    \ set!), I'll wrap up with a chapter's worth of Explore Further.\n\n## More Scripting\n\
    \nWe just scratched the surface with Unity scripting, not only in the variety\
    \ of scripting languages offered and the extensive set of Unity classes, but also\
    \ what can be scripted.\n\n### Editor Scripts\n\nIf you feel there's something\
    \ missing in the Unity Editor, there's a good chance you can add the feature by\
    \ writing Editor scripts. These are scripts also written in JavaScript, C#, or\
    \ Boo, but they're located in the Editor folder in the Project View. Editor scripts\
    \ have access to the Editor GUI, project settings, and project assets via a set\
    \ of Editor classes, documented in the Scripting Reference under `Editor Classes`.\n\
    \nAs an example, let's create a menu on the Unity Editor menu bar with commands\
    \ for activating and deactivating an entire hierarchy of GameObjects. In other\
    \ words, the commands call `SetActive` on every GameObject in the hierarchy and\
    \ is equivalent to clicking the checkbox of each GameObject in the Inspector View.\n\
    \nBefore Unity 4, each GameObject just had one `active` state represented by the\
    \ active checkbox in the Inspector View and the GameObject variable `active`.\
    \ But starting with Unity 4, that checkbox in the Inspector View represents the\
    \ local active state of the GameObject, settable in a script by calling `SetActive`\
    \ and read from the GameObject variable `activeSelf`. The global or \"really\"\
    \ active state that depends on all its parents also being locally active. Thus,\
    \ ensuring all GameObjects in a hierarchy are locally active allows you to deactivate\
    \ the entire group by toggling the active state of the root GameObject. Clicking\
    \ all those checkboxes by hand can be laborious and error-prone, so a single command\
    \ to perform that operation would be a boon, especially for developers upgrading\
    \ projects to Unity 4.\n\nThe process of creating an Editor script is the same\
    \ as creating a script intended for use in a scene, except the Editor script has\
    \ to be located in the Editor folder. So let's create a new JavaScript in the\
    \ Project View, name it `FuguEditor`, and place it in the Editor folder ([Figure\
    \ 17-1](#9781430248750_Ch17.xhtml#Fig1)).\n\n![9781430248750_Fig17-01.jpg](images/9781430248750_Fig17-01.jpg)\n\
    \n[Figure 17-1](#9781430248750_Ch17.xhtml#_Fig1). Creating a new Editor script\n\
    \nNow add the code in [Listing 17-1](#9781430248750_Ch17.xhtml#list1) to the script.\n\
    \n[Listing 17-1](#9781430248750_Ch17.xhtml#_list1). The Complete listing for FuguEditor.js\n\
    \n```\n#pragma strict\n\n@MenuItem (\"FuguGames/ActivateRecursively\")\nstatic\
    \ function ActivateRecursively() {\n        if (Selection.activeGameObject !=null)\
    \ {\n                SetActiveRecursively(Selection.activeGameObject,true);\n\
    \        }\n}\n\n@MenuItem (\"FuguGames/DeactivateRecursively\")\nstatic function\
    \ DeactivateRecursively() {\n        if (Selection.activeGameObject !=null) {\n\
    \                SetActiveRecursively(Selection.activeGameObject,false);\n   \
    \     }\n}\n\nstatic function SetActiveRecursively(obj:GameObject,val:boolean)\
    \ {\n        obj.SetActive(val);\n        for (var i:int=0; i<obj.transform.GetChildCount();\
    \ ++i) {\n                SetActiveRecursively(obj.transform.GetChild(i).gameObject,val);\n\
    \        }\n}\n\n@MenuItem (\"FuguGames/ActivateRecursively\", true)\n@MenuItem\
    \ (\"FuguGames/DeactivateRecursively\", true)\nstatic function ValidateGameObject()\
    \ {\n        return (Selection.activeGameObject !=null);\n}\n```\n\nThe line `@MenuItem\
    \ (\"FuguGames/ActivateRecursively\")` adds an `ActivateRecursively` item to the\
    \ FuguGames menu on the Editor menu bar, creating the menu if it hadn't already\
    \ been created. The function following the `@MenuItem` line is invoked when that\
    \ menu item is selected. `ActivateRecursively` checks if a GameObject has been\
    \ selected in the Editor, and, if so, then it passes that GameObject to the function\
    \ `SetActiveRecursively` along with the value `true`. `SetActiveRecursively` in\
    \ turn calls `SetActive` with the passed value true call for each GameObject in\
    \ the hierarchy.\n\nAfter that, a similar block of code adds a `DeactivateRecursively`\
    \ item to the menu, differing only in name and in passing false instead of true\
    \ to `SetActiveRecursively`."
