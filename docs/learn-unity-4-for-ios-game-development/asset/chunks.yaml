    Add a Collider


    We can’t avoid it any longer. It’s time to take care of the BarrelPin collision.
    So that we can visualize the BarrelPin and it’s collision shape in the Scene View,
    temporarily place the BarrelPin prefab in the scene by dragging the prefab into
    the Hierarchy View. Once there, open the BarrelPin GameObject and select the child
    Barrel GameObject so that it is displayed in the Inspector View, and press the
    F key to invoke the Frame Selected, which will center the Barrel in the Scene
    View. Also, change the viewing options (top left pull-down menu in the Scene View)
    from Textured to Wireframe, so the Mesh and Collider Component’s shape can be
    seen more easily.Unfortunately, the Component menu doesn’t list any primitive
    colliders that are barrel-shaped (a CylinderCollider would be perfect, but it
    doesn’t exist), and although a MeshCollider would conform to the shape of the
    barrel, MeshColliders are not appropriate for physical GameObjects because of
    performance issues. The closest matching shape in the Components menu is the CapsuleCollider.
    So let’s start with a Capsule Collider on our Barrel GameObject and see how well
    it fits.


    Although Unity tries to size a Collider Component to fit the GameObject’s Mesh
    when the Collider Component is added, in this case the fit isn’t very good, largely
    because, as you can see from the rotation in the Transform Component, this GameObject
    is rotated 90 degrees around its x axis. Without that rotation, the barrel is
    lying on its side, but the rotation also affects the orientation of the Collier
    Component. To adjust for the rotation, switch the axis of the Capsule Collider
    to the z axis. After that, setting the radius to 2 and height to 6 will produce
    a much closer match between CapsuleCollider and the Barrel ([Figure 7-19](#9781430248750_Ch07.xhtml#Fig19)).


    ![9781430248750_Fig07-19.jpg](images/9781430248750_Fig07-19.jpg)


    [Figure 7-19](#9781430248750_Ch07.xhtml#_Fig19). Adding a CapsuleCollider to the
    Barrel


    The Capsule matches the Barrel shape pretty well around the side but not on the
    top and bottom, which should have flat surfaces instead of just the endpoints
    the capsule. For flat surfaces, BoxColliders are the obvious choice. So this is
    a situation where you want to combine multiple Collider Components into a *compound
    collider*.'
  trans: "\n# 桶式保龄球\n\n`Capsules`（胶囊体）无论是在外观还是碰撞形状上，都只能充当非常简陋的保龄球瓶。真正的保龄球瓶模型会好得多，但遗憾的是，在资源商店里搜索保龄球瓶一无所获（尽管如果某个供应商决定填补这个空白，情况随时可能改变）。不过，资源商店里还有很多其他模型，只要我们灵活变通，就能找到替代保龄球瓶的方案。事实证明，那里有好几套桶模型资源包，所以我们就用桶来作为备选方案中的保龄球瓶。\n\
    \n## 挑选桶\n\n在资源商店里搜索\"barrel\"，会发现几套免费的桶模型资源包（图 7-14）。\n\n![9781430248750_Fig07-14.jpg](img/9781430248750_Fig07-14.jpg)\n\
    \n图 7-14。资源商店中的免费桶模型\n\n任何免费资源包都能用，但来自 Universal Image 的 Barrel 资源包（其资源商店图标中显示三个桶）已经预设了预制件，所以我们就下载这个包。从资源商店的描述以及导入包后的项目视图中可以看到，Barrel\
    \ 资源包组织得井井有条，包含一个名为 Barrel 的文件夹，里面装有 Barrel 预制件和 Barrel 模型（图 7-15）。\n\n![9781430248750_Fig07-15.jpg](img/9781430248750_Fig07-15.jpg)\n\
    \n图 7-15。Barrel 资源包的项目视图\n\n这两个资源在项目视图中看起来很相似，但点击预制件时，项目视图底部会显示完整文件名`Barrel.prefab`；而点击\
    \ Barrel 模型时，则显示`Barrel.FBX`，表明它是一个导入的 FBX 文件（Autodesk 使用的 3D 格式）。\n\n## 制作预制件\n\
    \n我们需要一个 Barrel 预制件来替换简单的 Pin 预制件，但应避免修改原始 Barrel 预制件（再次导入 Barrel 资源包会覆盖我们的更改）。要制作自己的\
    \ Barrel 预制件副本，选中该预制件，按 Command+D（或从 Edit 菜单中选择 Duplicate），然后将副本拖入 Prefabs 文件夹。接着将其重命名为`BarrelPin`，因为它是一个桶，我们要把它当作保龄球瓶来用（图\
    \ 7-16）。\n\n![9781430248750_Fig07-16.jpg](img/9781430248750_Fig07-16.jpg)\n\n\
    图 7-16。Barrel 预制件的副本\n\n选中`BarrelPin`预制件的子`GameObject`，使其显示在检视视图中。目前存在`MeshFilter`组件和`MeshRenderer`组件，但要将此预制件用作保龄球瓶，它还需要一个`Collider`组件和一个`Rigidbody`组件，这样保龄球瓶（桶）才会受重力影响，并能相互碰撞，以及与球和地板碰撞。该预制件还需要附加一个`FuguReset`脚本，用于处理游戏控制器发送的`ResetPosition`消息。\n\
    \n目前，我们先处理`Rigidbody`组件和`FuguReset`脚本，暂缓添加`Collider`组件，因为匹配桶的形状会有些复杂。选中预制件后，可以从菜单栏的\
    \ Component 菜单中选择 Rigidbody，或者点击检视视图底部的 Add Component 按钮，从出现的菜单中选择 Rigidbody（图\
    \ 7-17）。\n\n![9781430248750_Fig07-17.jpg](img/9781430248750_Fig07-17.jpg)\n\n\
    图 7-17。向 Barrel 预制件添加 Rigidbody 和`FuguReset`脚本\n\n在新附加的`Rigidbody`组件中，将 Mass（质量）设置为\
    \ 2（千克）。对于一个金属桶来说，这相当轻，但如果球不能不太费力地击倒作为保龄球瓶的桶，游戏就不好玩了。在游戏中，趣味性比真实感更重要！\n\n可以通过将`FuguReset`脚本拖入检视视图，或者使用\
    \ AddComponent 按钮将其添加到预制件中。\n\n## 使用预制件\n\n要用`BarrelPin`预制件替换简单的胶囊体型 Pin，在层级视图中选中`FuguBowl`\
    \ GameObject，使其组件显示在检视视图中，然后将`BarrelPin`预制件拖入`FuguBowl`脚本的 Pin 字段，替换掉最初使用的 Pin\
    \ 预制件（图 7-18）。现在点击 Play，会出现十个桶，而不是十个胶囊体。但它们会立刻掉穿地板，因为保龄球瓶还没有 Collider 组件！\n\n\
    ![9781430248750_Fig07-18.jpg](img/9781430248750_Fig07-18.jpg)\n\n图 7-18。使用`BarrelPin`预制件作为保龄球瓶\n\
    \n## 添加碰撞体\n\n我们不能再回避了。是时候处理`BarrelPin`的碰撞问题了。为了能在场景视图中直观地看到`BarrelPin`及其碰撞形状，先将`BarrelPin`预制件拖入层级视图，临时将其放置在场景中。放置后，展开`BarrelPin`\
    \ GameObject 并选中子`Barrel` GameObject，使其显示在检视视图中，按 F 键调用 Frame Selected（框架选中），将`Barrel`居中显示在场景视图中。同时，将查看选项（场景视图左上角的下拉菜单）从\
    \ Textured（纹理）切换为 Wireframe（线框），以便更容易看到网格和碰撞体组件的形状。\n\n遗憾的是，Component 菜单中没有列出桶形的原始碰撞体（`CylinderCollider`（圆柱碰撞体）会很完美，但它并不存在）。虽然`MeshCollider`（网格碰撞体）可以贴合桶的形状，但由于性能问题，`MeshCollider`不适用于物理\
    \ GameObject。Component 菜单中最接近的形状是`CapsuleCollider`（胶囊碰撞体）。所以，我们先在`Barrel` GameObject\
    \ 上添加一个 Capsule Collider，看看贴合度如何。\n\n虽然 Unity 在添加`Collider`组件时会尝试将其大小调整为适配 GameObject\
    \ 的网格，但本例中贴合度并不理想，这主要是因为，从 Transform 组件中的旋转参数可以看出，这个 GameObject 绕其 x 轴旋转了 90 度。如果没有这个旋转，桶会是侧躺的，但这个旋转也影响了\
    \ Collider 组件的朝向。为了调整旋转，将 Capsule Collider 的轴切换为 z 轴。之后，将半径设为 2，高度设为 6，就能使`CapsuleCollider`与桶更加匹配（图\
    \ 7-19）。\n\n![9781430248750_Fig07-19.jpg](img/9781430248750_Fig07-19.jpg)\n\n\
    图 7-19。向 Barrel 添加`CapsuleCollider`\n\n胶囊体在侧面与桶的形状匹配得相当好，但在顶部和底部则不然，这些部位应该是平面，而不仅仅是胶囊体的端点。对于平面，`BoxColliders`（盒型碰撞体）显然是更好的选择。因此，在这种情况下，需要将多个碰撞体组件组合成一个*复合碰撞体*。\n\
    \n```js\nfunction CreatePins() {\n        pins = new Array();\n        var offset\
    \ = Vector3.zero;\n        for (var row=0; row<pinRows; ++row) {\n           \
    \     offset.z+=pinDistance;\n                offset.x=-pinDistance*row/2;\n \
    \               for (var n=0; n<=row; ++n) {\n                         pins.push(Instantiate(pin,\
    \ pinPos+offset, Quaternion.identity));\n                         offset.x+=pinDistance;\n\
    \                }\n\n}\n}\n\nfunction Update() {\n        if (ball.transform.position.y<sunkHeight)\
    \ {\n                ResetEverything();\n        }\n}\n\nfunction ResetBall()\
    \ {\n        ball.SendMessage(\"ResetPosition\");\n}\n\nfunction ResetPins() {\n\
    \        for (var pin:GameObject in pins) {\n                pin.BroadcastMessage(\"\
    ResetPosition\");\n        }\n}\n\nfunction ResetCamera() {\n        Camera.main.SendMessage(\"\
    ResetPosition\");\n}\n\nfunction ResetEverything() {\n        ResetBall();\n \
    \       ResetPins();\n        ResetCamera();\n}\n```\n"
- fmt: '# Add a Compound Collider


    Unity allows more than one `Collider` Component on a `GameObject`, but they have
    to be different types of `Colliders`. For example, two `BoxCollider` Components
    cannot be attached to the same `GameObject`. However, an arbitrary set of primitive
    `Collider` Components can be combined into a compound collider by attaching each
    of the `Collider` Components to its own `GameObject` and making all of those `GameObjects`
    children of the `Rigidbody`''s `GameObject`. This is the approach we’ll take in
    combining a `CapsuleCollider` Component and a `BoxCollider` Component for the
    `Barrel`. To hold those two `Collider` Components, create two child `GameObjects`
    of the `Barrel` in the Hierarchy View and name them `box` and `capsule` for their
    respective shapes ([Figure 7-20](#9781430248750_Ch07.xhtml#Fig20)).


    ![9781430248750_Fig07-20.jpg](images/9781430248750_Fig07-20.jpg)


    [Figure 7-20](#9781430248750_Ch07.xhtml#_Fig20). Child GameObjects for a compound
    collider


    Rather than create a new `CapsuleCollider` Component from scratch, let’s take
    advantage of the `CapsuleCollider` Component that’s already oriented and sized
    properly on the `Barrel` GameObject by copying that Component. Select the `Barrel`
    GameObject, and in the Inspector View, right-click on the `CapsuleCollider` Component
    and select `Copy Component` ([Figure 7-21](#9781430248750_Ch07.xhtml#Fig21)).


    ![9781430248750_Fig07-21.jpg](images/9781430248750_Fig07-21.jpg)


    [Figure 7-21](#9781430248750_Ch07.xhtml#_Fig21). Copying a Component


    Then select the `capsule` GameObject again, right-click its Transform Component
    in the Inspector View, and in the pop-up menu select `Paste Component As New`
    ([Figure 7-22](#9781430248750_Ch07.xhtml#Fig22)). The `capsule` GameObject now
    has a `CapsuleCollider` Component just like the one created for the `Barrel` GameObject,
    so we don’t need the original one, anymore. Select the `Barrel` GameObject, right-click
    on the `CapsuleCollider` Component that you just copied, and select `Remove Component`
    in the pop-up menu to remove the `CapsuleCollider` Component. There should be
    just one `CapsuleCollider` Component in the `Barrel` hierarchy, now.


    ![9781430248750_Fig07-22.jpg](images/9781430248750_Fig07-22.jpg)


    [Figure 7-22](#9781430248750_Ch07.xhtml#_Fig22). Pasting a Component


    Let’s turn our attention to the `BoxCollider` Component. You could add it directly
    to the `box` GameObject using the Component menu, but if you add the `BoxCollider`
    Component to the `Barrel` GameObject, instead, then Unity will do the work for
    you in sizing the `BoxCollider` to the Mesh. So let’s repeat the process you went
    through with the `CapsuleCollider` Component, only this time with a `BoxCollider`.
    With the `Barrel` GameObject selected, add a `BoxCollider` Component using the
    Component menu or the `AddComponent` button. In the Scene View, you can see the
    `BoxCollider` encompasses the `Barrel` ([Figure 7-23](#9781430248750_Ch07.xhtml#Fig23)).


    ![9781430248750_Fig07-23.jpg](images/9781430248750_Fig07-23.jpg)


    [Figure 7-23](#9781430248750_Ch07.xhtml#_Fig23). A BoxCollider automatically sized
    around the Barrel


    It’s fine that the `BoxCollider` extends from the top to bottom of the Mesh, since
    it’s desirable to have two flat collision surfaces on both ends. But it’s not
    so desirable to have the `BoxCollider` extending outside the curved portion of
    the Barrel. Decrease the width of the `BoxCollider` by lowering its `x` and `y`
    values of its `Size` in the Inspector View (remember, the Barrel is rotated) to
    `2.5`. From the top-down vantage of the Scene View (click the `y` axis of the
    Scene Gizmo), you can see the `BoxCollider` now fits inside the barrel ([Figure
    7-24](#9781430248750_Ch07.xhtml#Fig24)).


    ![9781430248750_Fig07-24.jpg](images/9781430248750_Fig07-24.jpg)


    [Figure 7-24](#9781430248750_Ch07.xhtml#_Fig24). Top-down view of a BoxCollider
    fitting within the Barrel


    Now that you have the `BoxCollider` sized the way you want it, repeat the process
    for the `CapsuleCollider`—right-click the `BoxCollider` in the Inspector View,
    select `Copy Component`, select the `box` GameObject, right-click its Transform
    Component in the Inspector view, select `Paste Component As New`. And don’t forget
    to go back to the `BoxCollider` Component on the `Barrel`, right-click it to `Remove
    Component`. With the `Barrel` selected, you should see both `Collider` Components
    displayed in the Scene View, providing a better approximation of the Barrel shape
    than either of the `Collider` Components individually ([Figure 7-25](#9781430248750_Ch07.xhtml#Fig25)).


    ![9781430248750_Fig07-25.jpg](images/9781430248750_Fig07-25.jpg)


    [Figure 7-25](#9781430248750_Ch07.xhtml#_Fig25). Both colliders in a compound
    collider on display


    ## Update the Prefab


    Finally, now that the Barrel is ready to go, select `Apply Changes To Prefab`
    in the GameObject menu ([Figure 7-26](#9781430248750_Ch07.xhtml#Fig26)).


    ![9781430248750_Fig07-26.jpg](images/9781430248750_Fig07-26.jpg)


    [Figure 7-26](#9781430248750_Ch07.xhtml#_Fig26). Applying changes to the `BarrelPin`
    prefab


    **Tip** It’s a good idea to perform a `Save Project` or `Save Scene` (which implicitly
    performs a `Save Project`), to make sure prefab changes are really saved. Project
    changes are saved when Unity exits normally, but if it exits abnormally, all bets
    are off.


    With the prefab updated, the `Barrel` GameObject is no longer needed in the scene
    and can be removed (`Command+Delete` or choose `Delete` from the Edit menu). Now
    when you click `Play`, the barrels no longer fall through the Floor, and, as shown
    in [Figure 7-27](#9781430248750_Ch07.xhtml#Fig27), they tumble when you roll into
    them!


    ![9781430248750_Fig07-27.jpg](images/9781430248750_Fig07-27.jpg)


    [Figure 7-27](#9781430248750_Ch07.xhtml#_Fig27). Bowling into Barrels


    ## A Complex Collider (HyperBowl)


    The compound collider created for the `BarrelPin` prefab is still fairly simple,
    consisting of just two primitive `Collider` Components. Compound colliders can
    be much more complex, depending on the shape they’re approximating. As an example
    of a more realistic bowling pin, take a look at HyperBowl ([Figure 7-28](#9781430248750_Ch07.xhtml#Fig28)).


    ![9781430248750_Fig07-28.jpg](images/9781430248750_Fig07-28.jpg)


    [Figure 7-28](#9781430248750_Ch07.xhtml#_Fig28). A compound collider for HyperBowl
    bowling pin


    The compound collider for a bowling pin in HyperBowl consists of six primitive
    colliders: a `BoxCollider` to provide a flat surface at the bottom, a `CapsuleCollider`
    for the neck of the pin, and four `SphereColliders` of various size to fill out
    the body and top of the pin.


    ## Add Sounds


    Our bowling game is starting to look good, but it’s awfully quiet! You could add
    background music or ambient sound like the looping music to in the dance scene.
    But a bowling game really should have collision-based sounds, such as a rolling
    sound for the Ball and collision sounds for each pin.


    ### Get Sounds


    First, we need to find some sound files. Once again, let’s visit the Asset Store,
    navigating to the Sound category and then the Sound Effects (FX) subcategory ([Figure
    7-29](#9781430248750_Ch07.xhtml#Fig29)).


    ![9781430248750_Fig07-29.jpg](images/9781430248750_Fig07-29.jpg)


    [Figure 7-29](#9781430248750_Ch07.xhtml#_Fig29). Asset Store search results for
    free Sound FX


    The Free SFX Package from Bleep Blop Audio lists a good variety of audio clips,
    so let’s download that package. The files show up in a Project View folder named
    `Assets` inside your `Assets` folder (submitting packages to the Asset Store is
    a little tricky so that file organization was probably unintentional).


    ### Add a Rolling Sound


    Feel free to play the various sounds by selecting them and clicking the `Play`
    button in the Inspector View. But for now we’ll use the `Sci-Fi Ambiences` sound
    for the Ball rolling sound. It’s not a great ball-rolling sound, but it’s the
    only `AudioClip` in this package that’s suitable for looping ([Figure 7-30](#9781430248750_Ch07.xhtml#Fig30)).'
  raw: 'Add a Compound Collider


    Unity allows more than one Collider Component on a GameObject, but they have to
    be different types of Colliders. For example, two BoxCollider Components cannot
    be attached to the same GameObject. However, an arbitrary set of primitive Collider
    Components can be combined into a compound collider by attaching each of the Collider
    Components to its own GameObject and making all of those GameObjects children
    of the Rigidbody’s GameObject.This is the approach we’ll take in combining a CapsuleCollider
    Component and a BoxCollider Component for the Barrel. To hold those two Collider
    Components, create two child GameObjects of the Barrel in the Hierarchy View and
    name them box and capsule for their respective shapes ([Figure 7-20](#9781430248750_Ch07.xhtml#Fig20)).


    ![9781430248750_Fig07-20.jpg](images/9781430248750_Fig07-20.jpg)


    [Figure 7-20](#9781430248750_Ch07.xhtml#_Fig20). Child GameObjects for a compound
    collider


    Rather than create a new CapsuleCollider Component from scratch, let’s take advantage
    of the CapsuleCollider Component that’s already oriented and sized properly on
    the Barrel GameObject by copying that Component. Select the Barrel GameObject,
    and in the Inspector View, right-click on the CapsuleCollider Component and select
    Copy Component ([Figure 7-21](#9781430248750_Ch07.xhtml#Fig21)).


    ![9781430248750_Fig07-21.jpg](images/9781430248750_Fig07-21.jpg)


    [Figure 7-21](#9781430248750_Ch07.xhtml#_Fig21). Copying a Component


    Then select the capsule GameObject again, right-click its Transform Component
    in the Inspector View, and in the pop-up menu select Paste Component As New ([Figure
    7-22](#9781430248750_Ch07.xhtml#Fig22)). The capsule GameObject now has a CapsuleCollider
    Component just like the one created for the Barrel GameObject, so we don’t need
    the original one, anymore. Select the Barrel GameObject, right-click on the CapsuleCollider
    Component that you just copied, and select Remove Component in the pop-up menu
    to remove the CapsuleCollider Component. There should be just one CapsuleCollider
    Component in the Barrel hierarchy, now.


    ![9781430248750_Fig07-22.jpg](images/9781430248750_Fig07-22.jpg)


    [Figure 7-22](#9781430248750_Ch07.xhtml#_Fig22). Pasting a Component


    Let’s turn our attention to the BoxCollider Component. You could add it directly
    to the box GameObject using the Component menu, but if you add the BoxCollider
    Component to the Barrel GameObject, instead, then Unity will do the work for you
    in sizing the BoxCollider to the Mesh.So let’s repeat the process you went through
    with the CapsuleCollider Component, only this time with a BoxCollider. With the
    Barrel GameObject selected, add a BoxCollider Component using the Component menu
    or the AddComponent button. In the Scene View, you can see the BoxCollider encompasses
    the Barrel ([Figure 7-23](#9781430248750_Ch07.xhtml#Fig23)).


    ![9781430248750_Fig07-23.jpg](images/9781430248750_Fig07-23.jpg)


    [Figure 7-23](#9781430248750_Ch07.xhtml#_Fig23). A BoxCollider automatically sized
    around the Barrel


    It’s fine that the BoxCollider extends from the top to bottom of the Mesh, since
    it’s desirable to have two flat collision surfaces on both ends. But it’s not
    so desirable to have the BoxCollider extending outside the curved portion of the
    Barrel. Decrease the width of the BoxCollider by lowering its x and y values of
    its Size in the Inspector View (remember, the Barrel is rotated) to 2.5\. From
    the top-down vantage of the Scene View (click the y axis of the Scene Gizmo),
    you can see the BoxCollider now fits inside the barrel ([Figure 7-24](#9781430248750_Ch07.xhtml#Fig24)).


    ![9781430248750_Fig07-24.jpg](images/9781430248750_Fig07-24.jpg)


    [Figure 7-24](#9781430248750_Ch07.xhtml#_Fig24). Top-down view of a BoxCollider
    fitting within the Barrel


    Now that you have the BoxCollider sized the way you want it, repeat the process
    for the CapsuleCollider—right-click the BoxCollider in the Inspector View, select
    Copy Component, select the box GameObject, right-click its Transform Component
    in the Inspector view, select Paste Component As New. And don’t forget to go back
    to the BoxCollider Component on the Barrel, right-click it to Remove Component.
    With the Barrel selected, you should see both Collider Components displayed in
    the Scene View, providing a better approximation of the Barrel shape than either
    of the Collider Components individually ([Figure 7-25](#9781430248750_Ch07.xhtml#Fig25)).


    ![9781430248750_Fig07-25.jpg](images/9781430248750_Fig07-25.jpg)


    [Figure 7-25](#9781430248750_Ch07.xhtml#_Fig25). Both colliders in a compound
    collider on display


    Update the Prefab


    Finally, now that the Barrel is ready to go, select Apply Changes To Prefab in
    the GameObject menu ([Figure 7-26](#9781430248750_Ch07.xhtml#Fig26)).


    ![9781430248750_Fig07-26.jpg](images/9781430248750_Fig07-26.jpg)


    [Figure 7-26](#9781430248750_Ch07.xhtml#_Fig26). Applying changes to the BarrelPin
    prefab


    **Tip**   It’s a good idea to perform a Save Project or Save Scene (which implicitly
    performs a Save Project), to make sure prefab changes are really saved. Project
    changes are saved when Unity exits normally, but if it exits abnormally, all bets
    are off.


    With the prefab updated, the Barrel GameObject is no longer needed in the scene
    and can be removed (Command+Delete or choose Delete from the Edit menu). Now when
    you click Play, the barrels no longer fall through the Floor, and, as shown in
    [Figure 7-27](#9781430248750_Ch07.xhtml#Fig27), they tumble when you roll into
    them!


    ![9781430248750_Fig07-27.jpg](images/9781430248750_Fig07-27.jpg)


    [Figure 7-27](#9781430248750_Ch07.xhtml#_Fig27). Bowling into Barrels


    A Complex Collider (HyperBowl)


    The compound collider created for the BarrelPin prefab is still fairly simple,
    consisting of just two primitive Collider Components. Compound colliders can be
    much more complex, depending on the shape they’re approximating. As an example
    of a more realistic bowling pin, take a look at HyperBowl ([Figure 7-28](#9781430248750_Ch07.xhtml#Fig28)).


    ![9781430248750_Fig07-28.jpg](images/9781430248750_Fig07-28.jpg)


    [Figure 7-28](#9781430248750_Ch07.xhtml#_Fig28). A compound collider for HyperBowl
    bowling pin


    The compound collider for a bowling pin in HyperBowl consists of six primitive
    colliders: a BoxCollider to provide a flat surface at the bottom, a CapsuleCollider
    for the neck of the pin, and four SphereColliders of various size to fill out
    the body and top of the pin.


    Add Sounds


    Our bowling game is starting to look good, but it’s awfully quiet! You could add
    background music or ambient sound like the looping music to in the dance scene.
    But a bowling game really should have collision-based sounds, such as a rolling
    sound for the Ball and collision sounds for each pin.


    Get Sounds


    First, we need to find some sound files. Once again, let’s visit the Asset Store,
    navigating to the Sound category and then the Sound Effects (FX) subcategory ([Figure
    7-29](#9781430248750_Ch07.xhtml#Fig29)).


    ![9781430248750_Fig07-29.jpg](images/9781430248750_Fig07-29.jpg)


    [Figure 7-29](#9781430248750_Ch07.xhtml#_Fig29). Asset Store search results for
    free Sound FX


    The Free SFX Package from Bleep Blop Audio lists a good variety of audio clips,
    so let’s download that package. The files show up in a Project View folder named
    Assets inside your Assets folder (submitting packages to the Asset Store is a
    little tricky so that file organization was probably unintentional).


    Add a Rolling Sound


    Feel free to play the various sounds by selecting them and clicking the Play button
    in the Inspector View. But for now we’ll use the Sci-Fi Ambiences sound for the
    Ball rolling sound. It’s not a great ball-rolling sound, but it’s the only AudioClip
    in this package that’s suitable for looping ([Figure 7-30](#9781430248750_Ch07.xhtml#Fig30)).'
