    \ time \"+Time.time);\n        transform.Rotate(Vector3.up*speed*Time.deltaTime);\n\
    }\n```\n\n将 `child2` 的 `FuguRotate` 脚本中的 Speed 属性从 10 改为 50，点击 Play，你将看到该立方体比其他立方体旋转得更快。你也可以对\
    \ `child1` 进行同样的修改，但想象一下，如果你要修改 50 个立方体，那将非常繁琐！这正是预制件的强大之处。选中 `child2`，然后在 GameObject\
    \ 菜单中调用“将更改应用到预制件”命令（图 4-30）。\n\n![9781430248750_Fig04-30.jpg](img/9781430248750_Fig04-30.jpg)\n\
    \n图 4-30. 将更改应用到预制件\n\n现在，`child1` 再次与 `child2` 完全相同（除了名称和位置——Unity 合理地假设你不希望预制件的每个实例在这些方面都相同）。当你点击\
    \ Play 时，子立方体现在都以更快的相同速度旋转。\n\n### 断开预制件\n\n但主 Cube 由于旋转速度的更新也旋转得更快了。如果这不是你想要的结果，你可以将\
    \ Cube 的 Speed 改回 10，然后为了确保子立方体的更改不会传播到主 Cube，你可以选中主 Cube 并在 GameObject 菜单中选择“断开预制件实例”命令（图\
    \ 4-31）。\n\n![9781430248750_Fig04-31.jpg](img/9781430248750_Fig04-31.jpg)\n\n\
    图 4-31. 断开预制件实例\n\n现在，Cube 与预制件不再有任何关联，对子立方体的任何更改都不会传播到 Cube。\n\n### 进一步探索\n\n\
    通过添加简单的脚本化运动，场景已从漂亮且静态演变为漂亮且动态。我们将在下一章通过动画和声音进一步提升场景效果，但你现阶段达到的主要里程碑确实是学习如何创建、编辑和调试脚本。从现在到本书结束，你将不断添加脚本，所以请习惯这一点！\n\
    \n### Unity 手册\n\nUnity 手册的“构建场景”部分有两页与本章工作相关——一页是关于“预制件”的描述，另一页是对“组件-脚本关系”的解释。\n\
    \n本章介绍的一种新资源类型（除了预制件）就是脚本。“资源导入与创建”部分中关于“使用脚本”的页面介绍了我们旋转脚本所涵盖的基本概念：创建脚本、将其附加到\
    \ GameObject、输出到 Console 视图（使用 `print` 函数而非你用的 `Debug.Log`）、声明变量，甚至在 `Update`\
    \ 函数中应用旋转。\n\n值得再次提及“变换”页面，因为我们的旋转脚本就是用来修改变换的。该页面还描述了父–子 GameObject 关系——这在技术上是变换之间的关系，但由于\
    \ GameObject 和变换之间存在一一对应关系，因此将这种关联理解为 Hierarchy 视图中显示的 GameObject 之间的链接会更容易理解。\n\
    \n本章我们涉足了一个高级主题——“调试”。这部分介绍了 Console 视图、MonoDevelop 调试器，以及在文件系统中查找日志文件的位置。\n\n\
    ### 脚本参考手册\n\n到目前为止，我已经提到了 Unity 官方文档的三个主要部分中的两个——Unity 手册和参考手册。第三部分是脚本参考手册。本章是我们首次涉足脚本编写，因此脚本参考手册中“脚本概述”部分的所有内容都值得一读。“运行时类”列表阐明了\
    \ Unity 类之间的继承关系。之后，我建议你随时使用该页面上的搜索框，只要你在脚本中看到任何不认识的内容（即使认识，如果你还没读过相关文档也可以搜一下）。\n\
    \n### 资源商店\n\n我们从资源商店下载了 iTween，但 iTween 用户还应访问 Bob Berkebile 的官方 iTween 网站，那里有全面的文档和演示项目，网址是\
    \ `http://itween.pixelplacement.com/`。\n\n尽管 iTween 很流行，并且是 Unity 最早的补间动画包之一，但目前已有多种补间动画实现可供使用（只需在资源商店中搜索“tween”），包括\
    \ Holoville 的 HOTween（文档同样可在 `http://holoville.com/hotween/` 找到），以及 Prime31 Studio\
    \ 的 GOKit（源代码托管在 GitHub 上，`http://github.com/prime31/GoKit`）。\n\n### 脚本编写\n\n\
    虽然我们在本书中只使用 JavaScript，但 Unity 领域既有大量 JavaScript 也有大量 C#，因此你应该对两者都熟悉起来。Andrew\
    \ Stellman 和 Jennifer Greene 合著的《Head First C#》是一本非常出色的可视化 C# 入门教程，循序渐进。\n\n由于\
    \ C# 是微软为其 .NET 框架创建的一部分，因此可以在微软开发者网络（MSDN）上通过搜索 C# 找到官方 C# 文档和其他资源，网址为 `http://msdn.microsoft.com/`。\n\
    \n在浏览 MSDN 时，也请搜索 .NET 文档，因为 Unity 的脚本引擎是使用 Mono 实现的，而 Mono 是 .NET 的一个开源版本。官方\
    \ Mono 网站是 `http://mono-project.org/`\n\n你可能不需要担心另一种 Unity 脚本语言 Boo（我至今还没在实际项目中见过\
    \ Boo 脚本），但如果你好奇，官方 Boo 网站是 `http://boo.codehaus.org/`。\n\n把两个程序员放在一个房间里，如果他们有什么可争论的，那一定是编码规范。我的经验法则是遵循我所编码的官方语言和框架的约定。这是一个有着有趣名称的枯燥话题。\n\
    \n例如，Unity 在其命名规则中混合使用了驼峰命名法和帕斯卡命名法（或者按照它们自身的命名规则，称为 `camelCase` 和 `PascalCase`）。你可以在\
    \ Wikipedia 上搜索“camel case”了解更多。\n"
- fmt: '# Bracket Placement and Beyond


    括号的位置也是一个常见的争论点。我在这里使用的惯例（也是Unity所使用的，至少在创建新脚本模板时）被称为埃及风格，根据Jeff Atwood（StackExchange的名人）在他广受欢迎的博客Coding
    Horror（`http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html`）上的说法。这篇文章还将对类名应用标准前缀的做法称为“Smurf命名”。


    # 第五章


    # 让我们跳舞吧！动画与声音


    在Unity中移动`GameObject`的三种方式中，对`Transform Component`的脚本控制已在上一章中介绍，而物理将在下一章开始的保龄球游戏示例中扮演重要角色。脚本化移动无处不在。例如，即使在即将到来的保龄球游戏中（该游戏严重依赖物理来控制模拟保龄球及其与地板和球瓶的碰撞），摄像机跟随行为也是通过修改其`Transform
    Component`的脚本来实现的（这与立方体场景中使用的`MouseOrbit`脚本非常相似）。不仅如此，每个移动的`GameObject`都会通过恢复其`Transform
    Component`中的值而在轮次和帧之间重置。


    在继续制作那个保龄球游戏之前，你将在本章中花更多时间构建现已完成的立方体场景，通过添加一个跳舞的角色动画来增强它，以便感受Unity的动画支持。没有音乐的舞蹈演示是不完整的，因此场景将包含循环音效。这仍然是一个非物理且只有轻度交互的场景，但希望在深入探讨大量物理知识（一个大话题，跨越两章）和更多脚本编写（一个更大的话题，涵盖本书剩余部分）之前，它能提供一个漂亮且有趣的方式来介绍Unity的动画和音频支持。


    如果你不是专业人士，高质量的动画，特别是角色动画，并不容易创建。音乐也是如此。幸运的是，Unity Asset Store上有大量的音乐和角色动画包，其中许多是免费的，包括本章中使用的`Skeletons
    Pack`和`General Music Set`。这些资源不包含在`http://learnunity4.com/`上对应的项目中，但如果你只是从这一点切入并且没有从上一章构建起立方体场景，该项目可以用作一个起点。


    ## 导入`Skeletons Pack`


    如上一章所示，你可以从Project View中搜索Asset Store。在搜索字段中输入“skeleton”，来自`Skeletons Pack`的骨骼资源将显示在免费资源结果中（[图5-1](#9781430248750_Ch05.xhtml#Fig1)）。


    ![9781430248750_Fig05-01.jpg](images/9781430248750_Fig05-01.jpg)


    [图 5-1](#9781430248750_Ch05.xhtml#_Fig1). 针对`Skeletons Pack`的Project View搜索结果


    **提示**  Project View中的搜索词会匹配项目中已导入以及可从Asset Store导入的单个资源，但Asset Store的搜索部分可以在Unity偏好设置中禁用。


    选择骨骼资源并在Inspector View中确认该包确实是`Skeleton Pack`（[图5-2](#9781430248750_Ch05.xhtml#Fig2)）。你可以点击`Import
    package`按钮立即导入`Skeleton Pack`，或者先点击`Open Asset Store`按钮在Asset Store窗口中查看完整描述，然后从那里导入该包。


    ![9781430248750_Fig05-02.jpg](images/9781430248750_Fig05-02.jpg)


    [图 5-2](#9781430248750_Ch05.xhtml#_Fig2). `Skeletons Pack`的Inspector View


    无论你选择如何导入`Skeletons Pack`，安装后都会在Project View中添加一个`SkeletonData`文件夹，以及在`Prefabs`文件夹中添加几个预制件（[图5-3](#9781430248750_Ch05.xhtml#Fig3)）。


    ![9781430248750_Fig05-03.jpg](images/9781430248750_Fig05-03.jpg)


    [图 5-3](#9781430248750_Ch05.xhtml#_Fig3). `Skeletons Pack`预制件的Project View


    ## 添加一个骨骼


    `Skeletons Pack`安装的四个预制件都具有相同的骨骼，但配备了不同的装备，例如剑和盾牌。然而，事实证明，带有武装骨骼的预制件在跳舞时看起来像是在砍自己的四肢，所以我们还是坚持使用`skeletonNormal`预制件，它只有光秃秃的骨骼。通过将`skeletonNormal`预制件拖入Hierarchy
    View，向场景中添加一个它的实例（[图5-4](#9781430248750_Ch05.xhtml#Fig4)）。


    ![9781430248750_Fig05-04.jpg](images/9781430248750_Fig05-04.jpg)


    [图 5-4](#9781430248750_Ch05.xhtml#_Fig4). 带有激活的骨骼并使`Cubes`停用的立方体场景


    `skeletonNormal GameObject`具有一个引用骨骼动画数据的`Animation Component`。`skeletonNormal`还有两个子`GameObject`。一个名为`Bip01`，实际上是一个表示骨骼关节的`GameObject`层级结构。当骨骼运动时，手臂也随之运动，任何手部运动都相对于手臂，以此类推。这个骨骼层级结构让人想起“Dem
    Bones”这首歌——“大腿骨连接着髋骨……”


    另一个子`GameObject`，`skeleton`，是一个带有`SkinnedMeshRenderer Component`的`GameObject`。`SkinnedMeshRenderer`和`MeshRendererer`一样，是`Renderer`的子类。然而，`SkinnedMeshRenderer
    Component`渲染包裹在骨骼周围的网格，并随着骨骼关节的运动而跟随。该网格本质上形成了骨骼的皮肤，因此将这种网格映射到骨骼的过程通常被称为*蒙皮*。


    `skeletonNormal GameObject`还包含几个粒子效果，通过`ParticleEmitter Components`实现。粒子效果由许多微小的动画图元组成，非常适合创建火焰、爆炸、烟雾或任何类型的闪亮效果。


    **注意**  `Skeletons Pack`中包含的粒子效果适用于Unity的Legacy粒子系统，而不是Unity 3.5中引入的较新的Shuriken粒子系统。Legacy系统使用`ParticleEmitter
    Component`，而Shuriken使用`ParticleSystem Component`。


    ## 隐藏`Cubes`


    这个场景完全是关于跳舞的骨骼，所以你可以省去前两章中出现的`Cubes`。与其从场景中删除`Cubes`（通过选择它们并从Edit菜单中调用Delete或使用Command+Delete快捷键），不如将它们停用，使其不可见、眼不见心不烦。在Hierarchy
    View中选择父级`Cube`，取消选中Inspector View左上角的复选框，Hierarchy View中的整个`Cubes`树将变为灰色，表示它们已处于非活动状态（[图5-4](#9781430248750_Ch05.xhtml#Fig4)）。


    所有子级`Cubes`实际上都处于非活动状态，因为父级的活动状态会覆盖子级的状态。换句话说，一个`GameObject`只有在它自身标记为活动、其父级标记为活动、父级的父级也标记为活动等情况下，才*真正*处于活动状态。任何非活动的`GameObject`其`Components`都会被有效禁用。它的`Renderer
    Component`不再渲染，`Collider Component`不再碰撞，并且任何附加的脚本都不会调用其回调函数，`OnEnable`和`OnDisable`除外。


    ## 围绕骨骼旋转


    尽管`Cubes`已被停用，但主摄像机上的`MouseOrbit`脚本仍将主`Cube`作为其目标。主摄像机现在应该围绕骨骼旋转，因此在Inspector
    View中选择主摄像机，然后将`skeletonNormal GameObject`从Hierarchy View拖到`MouseOrbit`脚本的`Target`字段中（[图5-5](#9781430248750_Ch05.xhtml#Fig5)）。


    ![9781430248750_Fig05-05.jpg](images/9781430248750_Fig05-05.jpg)


    [图 5-5](#9781430248750_Ch05.xhtml#_Fig5). 主摄像机上的`MouseOrbit`脚本，目标为骨骼'
  raw: 'Bracket placement is also a common source of contention. The convention I
    use here (and by Unity, at least when creating the template for new scripts) is
    called Egyptian style, according to Jeff Atwood (of StackExchange fame) on his
    popular blog Coding Horror (`http://www.codinghorror.com/blog/2012/07/new-programming-jargon.html`).
    The article also terms the practice of applying a standard prefix to class names
    “Smurf naming.”


    Chapter     5


    Let’s Dance! Animation and Sound


    Of the three ways to move GameObjects in Unity, scripted control of the Transform
    Component was covered in the previous chapter, and physics will play a significant
    role in the bowling game example initiated in the next chapter. Scripted movement
    is ubiquitous. For example, even in the upcoming bowling game, which relies heavily
    on physics to control and simulate the bowling ball and its collision with the
    floor and bowling pins, the Camera following behavior is implemented by a script
    that modifies its Transform Component (much like the MouseOrbit script used in
    the cube scene). Not only that, every moving GameObject is reset between rolls
    and frames by restoring the values in its Transform Component.


    Before proceeding on to that bowling game, you’ll spend a little more time in
    this chapter building on the cube scene constructed so far, enhancing it with
    a dancing character animation to get a feel for Unity’s animation support. And
    it wouldn’t be a dance demo without music, so the scene will incorporate looping
    sound. It will still be a non-physical and only mildly interactive scene, but
    hopefully it will provide a pretty and entertaining way to introduce Unity’s animation
    and audio support before delving into a lot of physics (a big topic, spanning
    two chapters) and even more scripting (a bigger topic, spanning the rest of this
    book).


    Quality animations, particularly character animations, are not easy to create
    if you’re not a professional. The same goes for music. Fortunately, there are
    plenty of music and character animation packs on the Unity Asset Store, many of
    them free, including the Skeletons Pack and General Music Set used in this chapter.
    Those assets are not included in the corresponding project on `http://learnunity4.com/`,
    but that project can be used as a starting point if you’re just jumping in at
    this point and don’t have the cube scene constructed from the previous chapter.


    Import the Skeletons Pack


    As demonstrated in the previous chapter, you can search the Asset Store from within
    the Project View. Type “skeleton” in the search field, and the skeleton asset
    from the Skeletons Pack will show up in the Free Assets results ([Figure 5-1](#9781430248750_Ch05.xhtml#Fig1)).


    ![9781430248750_Fig05-01.jpg](images/9781430248750_Fig05-01.jpg)


    [Figure 5-1](#9781430248750_Ch05.xhtml#_Fig1). The Project View search results
    for the Skeletons Pack


    **Tip**   Search terms in the Project View are matched against individual assets
    already imported in the project and available for import from the Asset Store,
    but the Asset Store portion of the search can be disabled in the Unity Preferences.


    Select the skeleton asset and confirm in the Inspector View that the package is
    indeed the Skeleton Pack ([Figure 5-2](#9781430248750_Ch05.xhtml#Fig2)). You can
    click the Import package button to import the Skeleton Pack immediately, or you
    can click the Open Asset Store button to see the full description in the Asset
    Store window first and import the package from there.


    ![9781430248750_Fig05-02.jpg](images/9781430248750_Fig05-02.jpg)


    [Figure 5-2](#9781430248750_Ch05.xhtml#_Fig2). The Inspector View of the Skeletons
    Pack


    However you choose to import the Skeletons Pack, the installation will add a SkeletonData
    folder in the Project View along with several prefabs in the Prefabs folder ([Figure
    5-3](#9781430248750_Ch05.xhtml#Fig3)).


    ![9781430248750_Fig05-03.jpg](images/9781430248750_Fig05-03.jpg)


    [Figure 5-3](#9781430248750_Ch05.xhtml#_Fig3). The Project View of the Skeletons
    Pack prefabs


    Add a Skeleton


    The four prefabs installed by the Skeletons Pack all have the same skeleton but
    sport different gear, such as a sword and shield. However, it turns out the prefabs
    with armed skeletons look like they’re chopping their own limbs off when dancing,
    so let’s just stick with the skeletonNormal prefab, which has just the bare bones
    (ha!) skeleton. Add an instance of the skeletonNormal prefab to the scene by dragging
    that prefab into the Hierarchy View ([Figure 5-4](#9781430248750_Ch05.xhtml#Fig4)).


    ![9781430248750_Fig05-04.jpg](images/9781430248750_Fig05-04.jpg)


    [Figure 5-4](#9781430248750_Ch05.xhtml#_Fig4). The cube scene with the skeleton
    active and the Cubes deactivated


    The skeletonNormal GameObject has an Animation Component that references the animation
    data of the skeleton. skeletonNormal also has two child GameObjects. One, named
    Bip01, is actually a hierarchy of GameObjects that represents the bones of the
    skeleton. As the skeleton moves, so does the arm, and any hand movement is relative
    to the arm, and so on. The skeleton hierarchy is reminiscent of the “Dem Bones”
    song—“The thigh bone’s connected to the hip bone . . .”


    The other child GameObject, skeleton, is a GameObject with a SkinnedMeshRenderer
    Component. `SkinnedMeshRenderer`, like `MeshRendererer`, is a subclass of `Renderer`.
    However, the SkinnedMeshRenderer Component renders the Mesh that wraps around
    the skeleton and follows its joints as they move. The Mesh essentially forms the
    skin around a skeleton, so the process of mapping such a Mesh to a skeleton is
    often called *skinning*.


    The skeletonNormal GameObject also contains a couple of particle effects, implemented
    with ParticleEmitter Components. Particle effects consist of many tiny animated
    primitives and are great for creating flames, explosions, smoke, or any kind of
    sparkly effects.


    **Note**   The particle effects included in the Skeletons Pack work with Unity’s
    Legacy particle system, not the newer Shuriken particle system introduced in Unity
    3.5\. The Legacy system uses the ParticleEmitter Component, while Shuriken uses
    the ParticleSystem Component.


    Hide the Cubes


    This scene is all about the dancing skeleton, so you can dispense with the Cubes
    that featured in the previous two chapters. Instead of deleting the Cubes from
    the scene (by selecting them and invoking Delete from the Edit menu or using the
    Command+Delete shortcut), they can be made invisible, out of sight and out of
    mind, by deactivating them. Select the parent Cube in the Hierarchy View, uncheck
    the top-left check box in the Inspector View, and the entire tree of Cubes in
    the Hierarchy View is now grayed out to indicate they are inactive ([Figure 5-4](#9781430248750_Ch05.xhtml#Fig4)).


    All the child Cubes are effectively inactive because the parent’s active status
    overrides the children’s. In other words, a GameObject is *really* active only
    if it’s marked as active and its parent is marked as active and its parent’s parent
    is marked as active, and so on. Any inactive GameObject has its Components effectively
    disabled. Its Renderer Component no longer renders, its Collider Component no
    longer collides, and any attached scripts do not have their callbacks called,
    with the exception of `OnEnable` and `OnDisable`.


    Orbit the Skeleton


    Although the Cubes are deactivated, the `MouseOrbit` script on the Main Camera
    still has the main Cube as its target. The Main Camera should now orbit the skeleton,
    so select the Main Camera in the Inspector View and then drag the skeletonNormal
    GameObject from the Hierarchy View into the Target field of the MouseOrbit script
    ([Figure 5-5](#9781430248750_Ch05.xhtml#Fig5)).


    ![9781430248750_Fig05-05.jpg](images/9781430248750_Fig05-05.jpg)


    [Figure 5-5](#9781430248750_Ch05.xhtml#_Fig5). The MouseOrbit script on the Main
    Camera with a skeleton target'
