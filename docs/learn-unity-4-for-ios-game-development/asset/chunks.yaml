- fmt: '![9781430248750_Fig01-05.jpg](images/9781430248750_Fig01-05.jpg)


    [Figure 1-5](#9781430248750_Ch01.xhtml#_Fig5). Activating a free Unity trial


    The free version of Unity, which is Unity without the Pro features and is officially
    called just Unity (although sometimes it’s referred to as Unity Basic, and I still
    call it Unity Indie, since it’s only supposed to be used by entities making less
    than $100,000 a year), doesn’t include Unity iOS. You can still start with free
    Unity for the portion of this book leading up to the iOS chapters and then add
    Unity iOS for $400, but keep in mind the Unity Pro and Unity iOS Pro features
    won’t be available.


    To clarify, your license determines which core version of Unity is enabled and
    which add-ons, if any, are enabled. The core product and the add-ons are available
    in non-Pro and Pro versions, and Unity Pro must be licensed for any Pro version
    of the add-ons to be licensed. So, developing with the non-Pro version of Unity
    iOS will cost you $400 in Unity licenses, but developing with Unity iOS Pro will
    cost $1,500 for Unity Pro and another $1,500 for Unity iOS Pro, for a grand total
    of $3,000. Unity Technologies sometimes offers discounts, especially when they’re
    introducing a new major version of Unity, and prices can change, of course (after
    all, Unity Indie used to cost $400 and now it’s free). In any case, the availability
    of the free trial Pro license means you don’t have to worry about that immediately.


    Welcome to Unity!


    After you get the licensing taken care of, the Unity Editor window will appear
    with a friendly “Welcome To Unity” window appearing on top ([Figure 1-6](#9781430248750_Ch01.xhtml#Fig6)).
    The welcome window suggests some resources you should look at to get started.
    You can click each item to bring up that resource.


    ![9781430248750_Fig01-06.jpg](images/9781430248750_Fig01-06.jpg)


    [Figure 1-6](#9781430248750_Ch01.xhtml#_Fig6). The Unity Welcome screen


    The Welcome window will appear every time you start up Unity until you uncheck
    the “Show at Startup” check box in the lower right corner of the window. It’s
    a good idea to look at the suggested resources before doing that, although you
    can always bring up the Welcome window again using the Unity Help menu ([Figure
    1-7](#9781430248750_Ch01.xhtml#Fig7)).


    ![9781430248750_Fig01-07.jpg](images/9781430248750_Fig01-07.jpg)


    [Figure 1-7](#9781430248750_Ch01.xhtml#_Fig7). Bringing up the Welcome screen
    from the Unity Help menu


    ## Manage Unity


    Before getting into actual game development with Unity, this is a good time to
    look at some of the administrative features in the Unity Editor.


    ### Change Skins (Pro)


    The Unity Editor appears in one of two skins, Dark or Light. If you’re using Unity
    Pro, you’ll initially see the Dark skin ([Figure 1-8](#9781430248750_Ch01.xhtml#Fig8)),
    and if you’re using the non-Pro version of Unity, you’ll only see the Light skin
    ([Figure 1-9](#9781430248750_Ch01.xhtml#Fig9)).


    ![9781430248750_Fig01-08.jpg](images/9781430248750_Fig01-08.jpg)


    [Figure 1-8](#9781430248750_Ch01.xhtml#_Fig8). The Unity Editor with the Pro (Dark)
    skin


    ![9781430248750_Fig01-09.jpg](images/9781430248750_Fig01-09.jpg)


    [Figure 1-9](#9781430248750_Ch01.xhtml#_Fig9). The Unity Editor using the Indie
    (Light) skin


    For the rest of this book, I use the Dark skin for screenshots, but aside from
    the hue, there is no difference in the user interface. If you’re using Unity Pro
    and prefer the Light skin, you can change skins in the Unity Preferences window.
    First select Preferences in the Unity menu ([Figure 1-10](#9781430248750_Ch01.xhtml#Fig10)).


    ![9781430248750_Fig01-10.jpg](images/9781430248750_Fig01-10.jpg)


    [Figure 1-10](#9781430248750_Ch01.xhtml#_Fig10). The Preferences menu item in
    the Unity Editor


    Now with the Preferences window up, you can change the skin from Dark to Light
    or Light to Dark ([Figure 1-11](#9781430248750_Ch01.xhtml#Fig11)). This is a Unity
    Pro-only feature. If you’re using Unity Indie, you’re stuck with the Light skin.


    ![9781430248750_Fig01-11.jpg](images/9781430248750_Fig01-11.jpg)


    [Figure 1-11](#9781430248750_Ch01.xhtml#_Fig11). General Preferences in the Unity
    Editor


    While you’re in the Preferences window, I recommend making sure “Always Show Project
    Wizard” is checked. That will ensure Unity brings up the project selection dialog
    when it starts up, instead of automatically opening the most recently opened project,
    which can be time-consuming and is not always what you want. In particular, you
    don’t want to accidentally upgrade a project to a new version of Unity before
    you’re ready.


    ### Update the License


    Eventually, you may need to update your license, either because you’re using the
    free trial and it has expired, to upgrade your license to Pro versions, to add
    another build platform, or because you need to switch your license to a different
    machine. At that point, you can bring up the Unity menu on the menu bar and select
    Manage License ([Figure 1-12](#9781430248750_Ch01.xhtml#Fig12)).


    ![9781430248750_Fig01-12.jpg](images/9781430248750_Fig01-12.jpg)


    [Figure 1-12](#9781430248750_Ch01.xhtml#_Fig12). Bringing up the License Management
    window from the Unity menu


    The resulting License Management window gives you the option of entering a new
    serial number or returning the license for this machine so you can use it for
    another ([Figure 1-13](#9781430248750_Ch01.xhtml#Fig13)).


    ![9781430248750_Fig01-13.jpg](images/9781430248750_Fig01-13.jpg)


    [Figure 1-13](#9781430248750_Ch01.xhtml#_Fig13). The License Management window


    A single Unity license can be used on two machines. In its early years, when the
    Unity Editor only ran on OS X, a Unity license was only good for one machine,
    but the number was increased to two after Windows support for the Unity Editor
    was added.


    ### Report Problems


    If you use Unity for a significant period of time, you’ll certainly encounter
    bugs, real or imagined. That’s not a knock on Unity. The 3D game engines are very
    complicated, at least internally, and the pace of their development is remarkable
    (I started with Unity 1.6 when it only ran on OS X and only deployed builds for
    Windows and OS X). Bugs don’t fix themselves, especially when they’re not reported.
    That’s where the Unity Bug Reporter comes in. As I mentioned when going over the
    Unity installation files, the Bug Reporter is available in the Unity folder but
    normally is launched from the Help menu in the Unity Editor ([Figure 1-14](#9781430248750_Ch01.xhtml#Fig14)).


    ![9781430248750_Fig01-14.jpg](images/9781430248750_Fig01-14.jpg)


    [Figure 1-14](#9781430248750_Ch01.xhtml#_Fig14). The Report a Bug option in the
    Help menu


    **Tip**   The `Bug Reporter`, as you can see in the list of files in the Unity
    installation, is a separate application from the Unity Editor. So if you encounter
    a bug that prevents the Unity Editor from starting up properly, you can always
    launch the `Bug Reporter` directly by double-clicking that file in the Finder.


    The resulting Bug Reporter window ([Figure 1-15](#9781430248750_Ch01.xhtml#Fig15)),
    prompts you to select where the bug occurs (in the Unity Editor or in the Unity
    Player, i.e., a deployed build), the frequency of the bug’s occurrence, and an
    e-mail address to which Unity Technologies will send responses about this bug.


    ![9781430248750_Fig01-15.jpg](images/9781430248750_Fig01-15.jpg)


    [Figure 1-15](#9781430248750_Ch01.xhtml#_Fig15). The Unity Bug Reporter window


    Below that, in the middle of the window, is the list of attachments. Unity automatically
    starts off this list with the current project, and you might include supplemental
    files like screenshots or log files. You can remove the current project from this
    list, but normally you should include the project so that Unity support can reproduce
    the problem.'
