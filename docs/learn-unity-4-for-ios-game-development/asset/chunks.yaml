    Explore Further


    This chapter was a change of pace, concentrating solely on scripting. Most of
    that scripting was added to the game controller script, `FuguBowl.js`, in the
    form of a state machine, but scoring code was incorporated in a new script, `FuguBowlPlayer.js`.


    If you’re tired of writing big chunks of code and long for the little script snippets
    that we started with, you just have to endure writing one more big script in the
    next chapter, for the user interface. And, as a counterpart for the scoring code
    added in this chapter, the next one includes a small additional script to display
    a scoreboard.


    Unity Manual


    State machines are useful not only for game control logic but also for anything
    that can be represented as going through different states (simple examples: a
    light is on or off, a weapon is locked and loaded, a door is open or closed).
    State machines are particularly useful for animation (walking, running, throwing)
    which is why the new Mecanim animation system does have its own FSM capability.
    This is described in the Unity Manual, under “The Mecanim Animation System” section,
    in “Animation State Machines.”


    Scripting Reference


    The major scripting technique introduced in this chapter was the use of coroutines,
    specifically to implement an FSM in the `FuguBowl` script. The “Scripting Overview”
    section of the Scripting Reference has a page on “Coroutines and Yield,” that
    provides a basic explanation some examples.


    The classes related to coroutines include `"Coroutine"` and `"WaitForSeconds"`
    (both of them inherit from `"YieldInstruction"`). The one function we used is
    the `"StartCoroutine"` function of `"MonoBehaviour"`. The documentation page for
    each `MonoBehavior`, callback specifies whether the callback can be used as a
    coroutine (as we saw, `"Start"` can, but `"Awake"`, `"Update"`, and `"FixedUpdate"`
    cannot).


    The added code in the `FuguBowl` script also had frequent cause to access Components,
    so the page on “Accessing Components” is relevant. That page lists the “Component”
    and “GameObject” variables that can be used to access commonly attached Components
    and also provides examples on how to call the function “GetComponent” (either
    on a `Component` or a `GameObject`) to access Components, including scripts.


    Asset Store


    Several more sophisticated FSM frameworks are available on the Asset Store. A
    search for “fsm” in the Asset Store window brings up several, including a popular
    visual programming package called Playmaker, developed by Huton Games at `http://hutongames.com/`.


    On the Web


    Wikipedia (`http://wikipedia.org/`) has an extensive description of bowling and
    its scoring rules. Just search for “bowling” on the site. And if you search for
    “state machine” you’ll find an article that explains probably more than you’ll
    ever want to know about FSM’s!


    I mentioned some game engines have FSM’s built into their scripting system. It’s
    interesting to compare them and see how FSM’s are implemented in those systems.
    For example, CryEngine has a state-switching mechanism built into its Lua scripts.
    Visit the CryEngine 3 Free SDK site (`http://freesdk.dev.net/`) and search for
    “state” to find an article on “Entity States.”


    I worked on a CryEngine-based virtual world called Blue Mars, which heavily utilized
    that FSM support. Visit the Blue Mars wiki (`http://create.bluemars.com/`) and
    search for “entity script” to see the introductory examples (I actually started
    that wiki entry five years ago!)


    And even the most well-known virtual world, Second Life, has FSM support. Search
    for “state” on the Second Life wiki (`http://wiki.secondlife.com`) to see how
    states are defined using the Linden Scripting Language (LSL).


    Chapter     9


    The Game GUI


    Over the past several chapters, we’ve put together a fairly complete bowling game
    with 3D graphics, physics, sound, player controls, and automatic camera movement.
    The game has almost every category of feature expected in a 3D game except for
    one: a graphical user interface (GUI). In particular, the bowling game should
    have a scoreboard, and games usually have a menu that shows up at the beginning
    of the game and when the game is paused.


    **Tip**   I have had an iOS game rejected by Apple for not having a pause menu,
    so I do recommend including one, if only for that reason.


    In this chapter, we’ll implement both a scoreboard and start/pause menu with Unity’s
    built-in GUI system, known as UnityGUI (you can tell how long a Unity feature
    has been around by the coolness of its name—more recent features have names like
    Shuriken, Mecanim, and Beast).


    The scoreboard and pause menu scripts are available in the project for this chapter
    on `http://learnunity4.com/`, but, to iterate a point ad nauseam, entering the
    code line by line and function by function provides the best learning experience!


    The Scoreboard


    Let’s start off with the scoreboard because it’s a simpler case than the menu.
    The scoreboard only needs to display, with no interaction required. As described
    in the previous chapter, a typical bowling scoreboard will show the results for
    each frame (i.e., the first and second ball, and possibly third, in the tenth
    frame), and also the total score up to that frame. We won’t do anything fancy
    here, just display the scores with text by drawing the scoreboard as a sequence
    of labels, with each label displaying the score for that frame as text.


    Create the Script


    Let’s get started by creating a GameObject with a scoreboard script attached (this
    should be a familiar process by now). In the Project View, create a new JavaScript
    in the Scripts folder and name it `FuguBowlScoreboard` ([Figure 9-1](#9781430248750_Ch09.xhtml#Fig1)).


    ![9781430248750_Fig09-01.jpg](images/9781430248750_Fig09-01.jpg)


    [Figure 9-1](#9781430248750_Ch09.xhtml#_Fig1). Creating the FuguBowlScoreboard
    script


    Next, create a new GameObject in the Hierarchy View, name it Scoreboard, and attach
    the `FuguBowlScoreboard` script to it.


    Now you’re ready to add UnityGUI code to the `FuguBowlScoreboard` script. If you’ve
    developed user interfaces with other GUI systems, you’ll probably find UnityGUI
    a bit unusual. Instead of creating and placing GUI objects that have callbacks
    responding to events like button clicks, UnityGUI Controls are created inside
    `OnGUI` callback functions, which are called every frame (actually a few times
    a frame). To demonstrate quickly how UnityGUI works, place the contents of [Listing
    9-1](#9781430248750_Ch09.xhtml#list1) in the `FuguBowlScoreboard` script.


    [Listing 9-1](#9781430248750_Ch09.xhtml#_list1).  Testing a Simple UnityGUI Label
    in FuguBowlScoreboard.js


    ```

    #pragma strict


    function OnGUI() {

           GUI.Label(Rect(5,100,200,20),"This is a label");

    }

    ```'
  trans: "\n# 第 9 章\n\n## 游戏图形界面\n\n在过去的几章里，我们已经构建了一个相当完整的保龄球游戏，包含了 3D 图形、物理引擎、音效、玩家控制和自动摄像机移动。这款游戏几乎涵盖了\
    \ 3D 游戏所预期的所有功能类别，唯独缺少一项：图形用户界面（GUI）。具体来说，保龄球游戏应该有一个计分板，而且游戏通常还应该有一个在游戏开始和暂停时显示的菜单。\n\
    \n**提示**   我曾有一款 iOS 游戏因为缺少暂停菜单而被苹果公司拒绝，所以，即便只是为了应付审核，我也建议你加入一个。\n\n在本章中，我们将使用\
    \ Unity 内置的 GUI 系统（称为 UnityGUI）来实现计分板和开始/暂停菜单。你可以通过名称的酷炫程度来判断一个 Unity 功能的历史长短——较新的功能有诸如\
    \ Shuriken、Mecanim 和 Beast 这样的名字。\n\n本章项目的计分板和暂停菜单脚本可在 `http://learnunity4.com/`\
    \ 上找到，但再次不厌其烦地重申，一行一行、一个函数一个函数地亲自输入代码才能提供最佳的学习体验！\n\n## 计分板\n\n在完整的保龄球游戏中，这里会展示“游戏结束”信息、将分数提交到排行榜，以及执行游戏结束时其他合适的操作（在\
    \ HyperBowl 中，会调用 `Application.LoadLevel` 函数切换到显示分数的场景并展示一个奖杯）。但就目前而言，我们只需跳转回\
    \ `StateNewGame` 状态并开始一场新游戏即可。\n\n### 完整代码清单\n\n改造后的 `FuguBowl` 脚本甚至比 `FuguBowlPlayer`\
    \ 脚本还要大得多，因此这里不展示 `FuguBowl.js` 的完整代码。完整的脚本可以在 `http://learnunity4.com/` 上找到，其所有内容都已在本节中逐一（或者更准确地说，是逐个状态）介绍过了。\n\
    \n### 进一步探索\n\n本章的节奏有所变化，主要专注于脚本编写。大部分脚本是以状态机的形式添加到游戏控制器脚本 `FuguBowl.js` 中的，而计分代码则整合到了一个名为\
    \ `FuguBowlPlayer.js` 的新脚本中。\n\n如果你已经厌倦了编写大段代码，并怀念我们开始时那些短小的脚本片段，那么你只需再忍耐一下，在下一章中编写另一个关于用户界面的较大脚本。并且，作为本章添加的计分代码的对应部分，下一章将包含一个额外的小型脚本来显示计分板。\n\
    \n### Unity 手册\n\n状态机不仅可用于游戏控制逻辑，还可用于任何可以表示为经历不同状态的事物（简单例子：灯是开或关、武器已上膛、门是开或关）。状态机对于动画（行走、奔跑、投掷）尤其有用，这就是为什么新的\
    \ Mecanim 动画系统拥有自己的有限状态机能力。这在 Unity 手册的“Mecanim 动画系统”部分的“动画状态机”中有描述。\n\n### 脚本参考\n\
    \n本章引入的主要脚本技术是协程的使用，具体来说是用于在 `FuguBowl` 脚本中实现一个有限状态机。脚本参考的“脚本概述”部分有一个关于“协程与 Yield”的页面，提供了基本解释和一些示例。\n\
    \n与协程相关的类包括 `Coroutine` 和 `WaitForSeconds`（两者都继承自 `YieldInstruction`）。我们使用的唯一函数是\
    \ `MonoBehaviour` 的 `StartCoroutine` 函数。每个 `MonoBehaviour` 回调的文档页面都指明了该回调是否可以用作协程（正如我们所看到的，`Start`\
    \ 可以，但 `Awake`、`Update` 和 `FixedUpdate` 不行）。\n\n`FuguBowl` 脚本中添加的代码也频繁需要访问组件，因此关于“访问组件”的页面是相关的。该页面列出了可用于访问常用附加组件的\
    \ `Component` 和 `GameObject` 变量，并提供了关于如何调用 `GetComponent` 函数（可以在 `Component` 或\
    \ `GameObject` 上调用）来访问组件（包括脚本）的示例。\n\n### 资源商店\n\n资源商店上有几个更复杂的有限状态机框架。在资源商店窗口中搜索“fsm”会出现几个，其中包括一个由\
    \ Huton Games 开发的流行可视化编程包 Playmaker，网址是 `http://hutongames.com/`。\n\n### 网上资源\n\
    \n维基百科（`http://wikipedia.org/`）对保龄球及其计分规则有详细的描述。只需在网站上搜索“bowling”即可。如果你搜索“state\
    \ machine”，你会找到一篇文章，它所解释的内容可能比你想要了解的关于有限状态机的知识还要多！\n\n我提到过一些游戏引擎在其脚本系统中内置了有限状态机。比较它们并了解有限状态机在这些系统中是如何实现的是很有趣的。例如，CryEngine\
    \ 在其 Lua 脚本中内置了一种状态切换机制。访问 CryEngine 3 免费 SDK 网站（`http://freesdk.dev.net/`）并搜索“state”即可找到一篇关于“实体状态”的文章。\n\
    \n我曾参与开发了一个基于 CryEngine 的虚拟世界，名为 Blue Mars，它大量利用了那种有限状态机支持。访问 Blue Mars 维基（`http://create.bluemars.com/`）并搜索“entity\
    \ script”以查看入门示例（实际上，我是在五年前开始编写那个维基条目的！）\n\n甚至是最著名的虚拟世界 Second Life 也支持有限状态机。在\
    \ Second Life 维基（`http://wiki.secondlife.com`）上搜索“state”，以了解如何使用林登脚本语言定义状态。\n\n\
    ## 计分板\n\n我们从计分板开始，因为它比菜单更简单。计分板只需要显示内容，无需交互。如前一章所述，一个典型的保龄球计分板会显示每一局的结果（即，第一球和第二球，以及在第十局中可能的第三球），以及截止到该局的总分。我们在这里不做什么花哨的东西，只是通过将计分板绘制为一系列标签来显示分数，每个标签以文本形式显示该局的分数。\n\
    \n### 创建脚本\n\n让我们开始创建一个附加了计分板脚本的 `GameObject`（现在这应该是一个熟悉的流程了）。在项目视图中，在 Scripts\
    \ 文件夹中创建一个新的 JavaScript 文件，并将其命名为 `FuguBowlScoreboard`（图 9-1）。\n\n![9781430248750_Fig09-01.jpg](img/9781430248750_Fig09-01.jpg)\n\
    \n图 9-1. 创建 FuguBowlScoreboard 脚本\n\n接下来，在层级视图中创建一个新的 `GameObject`，命名为 Scoreboard，并将\
    \ `FuguBowlScoreboard` 脚本附加到它上面。\n\n现在你已准备好向 `FuguBowlScoreboard` 脚本添加 UnityGUI\
    \ 代码了。如果你曾使用过其他 GUI 系统开发用户界面，你可能会觉得 UnityGUI 有点不寻常。UnityGUI 控件不是在 `OnGUI` 回调函数外部创建和放置并使其具有响应按钮点击等事件的回调，而是在\
    \ `OnGUI` 回调函数内部创建的，该函数每帧都会被调用（实际上每帧会调用几次）。为了快速演示 UnityGUI 的工作原理，请将代码清单 9-1 的内容放入\
    \ `FuguBowlScoreboard` 脚本中。\n\n代码清单 9-1. 在 FuguBowlScoreboard.js 中测试一个简单的 UnityGUI\
    \ 标签\n\n```\n#pragma strict\n\nfunction OnGUI() {\n    GUI.Label(Rect(5,100,200,20),\"\
    This is a label\");\n}\n```\n"
- fmt: "# 排版后的文本\n\n所有UnityGUI控件都是通过调用`GUI`类（以及`GUILayout`类，但将在下一节中介绍）中的静态函数来创建的。`OnGUI`回调在[列表9-1](#9781430248750_Ch09.xhtml#list1)中调用`GUI.Label`来绘制一个标签，传入一个`Rect`（矩形），指定标签绘制在x,y坐标为5,100的位置（UnityGUI的坐标系中，0,0位于屏幕左上角），宽度和高度分别为200和20像素。第二个参数是要在标签中显示的文本。点击Play，您应该会看到“This\
    \ is a label”显示在屏幕上。\n\n如果用户界面很复杂，将用户界面代码放在单个脚本回调中可能会很繁琐。但就这个简单的用户界面而言，`OnGUI`回调很方便，我们可以在此基础上构建一个极简的纯文本保龄球记分牌。让我们用[列表9-2](#9781430248750_Ch09.xhtml#list2)的内容替换`FuguBowlScoreboard`中的单标签示例。\n\
    \n[列表 9-2](#9781430248750_Ch09.xhtml#_list2). 保龄球记分牌\n\n```\n#pragma strict\n\n\
    var style:GUIStyle; // customize the appearance\n\nfunction OnGUI() {\n      \
    \ for (var f:int=0; f<10; f++) {\n               var score:String=\"\";\n    \
    \           var roll1:int = FuguBowl.player.scores[f].ball1;\n               var\
    \ roll2:int = FuguBowl.player.scores[f].ball2;\n               var roll3:int =\
    \ FuguBowl.player.scores[f].ball3;\n               switch (roll1) {\n        \
    \              case -1: score += \" \"; break;\n                      case 10:\
    \ score +=\"X\"; break;\n                      default: score += roll1;\n    \
    \           }\n               score+=\"/\";\n               if (FuguBowl.player.IsSpare(f))\
    \ {\n                      score +=\"I\";\n               } else {\n         \
    \             switch (roll2) {\n                              case -1: score +=\
    \ \" \"; break;\n                              case 10: score +=\"X\"; break;\n\
    \                              default: score += roll2;\n                    \
    \  }\n               }\n               if (f==9) {\n                      score+=\"\
    /\";\n                      if (10==roll2+roll3) {\n                         \
    \     score +=\"I\";\n                      } else {\n                       \
    \       switch (roll3) {\n                                     case -1: score\
    \ += \" \"; break;\n                                     case 10: score +=\"X\"\
    ; break;\n                                     default: score += roll3;\n    \
    \                          }\n                      }\n               }\n    \
    \           GUI.Label(Rect(f*30+5,5,50,20),score,style);\n               var total:int=FuguBowl.player.GetScore(f);\n\
    \               if (total != -1) {\n                      GUI.Label(Rect(f*30+5,20,50,20),\"\
    \ \"+total,style);\n               }\n       }\n}\n```\n\n新的`OnGUI`回调遍历所有十个回合，查询`FuguBowlPlayer`以获取代表每个回合的`FuguBowlScore`。在循环的底部，会执行一次或两次对`GUI.Label`的调用。第一个`GUI.Label`显示该回合每球的得分，第二个`GUI.Label`绘制在第一个下方，如果可用则显示该回合的游戏总分。\n\
    \n循环中的大部分代码用于确定每个回合的每个球要显示什么。对于`ball1`，如果尚未投掷，则要显示的`String`只是一个空格。如果投掷了全中，则显示字母“X”。否则，显示数字分数（1-9）。\n\
    \n`ball2`与`ball1`类似，不同之处在于它还显示字母“I”来表示补中。通常，我会使用斜杠字符“/”来表示补中，但这里用它来分隔`ball1`、`ball2`和`ball3`的分数。\n\
    \n只有当回合是第十回合（索引9）时，才会构建`ball3`的`String`。`ball3`与`ball2`相同，区别在于它检查的是`ball2`和`ball3`的补中组合，而不是`ball1`和`ball2`。\n\
    \n通过调用`FuguBowlPlayer`函数`GetScore`来检索回合总分，只要分数可用（即不为-1）就显示。每个`GUI.Label`的`Rect`基于其显示的回合在屏幕上从左上角开始递增偏移（[图\
    \ 9-2](#9781430248750_Ch09.xhtml#Fig2)）。\n\n![9781430248750_Fig09-02.jpg](images/9781430248750_Fig09-02.jpg)\n\
    \n[图 9-2](#9781430248750_Ch09.xhtml#_Fig2). 由 `FuguBowlScoreboard.js` 显示的保龄球记分牌\n\
    \n[图 9-2](#9781430248750_Ch09.xhtml#Fig2) 展示了一个进行到第四回合第二球的游戏。第一球击倒了三个球瓶。前两个回合投出了全中，第三回合投出了补中（第一次投掷击倒五个球瓶，第二次投掷击倒五个）。第一回合的游戏总分为：全中的10分，加上接下来两球击倒的球瓶数（第二回合全中的10分，再加上第三回合第一球的5分），共计25分。\n\
    \n第二回合也是全中，因此它的得分是：全中的10分，加上第三回合第一球的5分以及该回合第二球的5分，共计20分。将其加到第一回合的25分上，游戏总分为45分。\n\
    \n第三回合是补中，所以同样得到10分，但仅加上下一球（即3分），共计13分，将其加入前一个回合的游戏总分，总计58分。因此，我们的计分代码和记分牌代码运行正常！\n\
    \n## 设置GUI样式\n\nGUI控件的外观可以通过`GUIStyle`进行自定义，它是一个影响控件显示的属性集合。从概念上讲，这类似于级联样式表（CSS）用于格式化网页内容的方式。\n\
    \n每个创建GUI控件的GUI函数都是一个重载函数，有两种形式：一种使用默认的`GUIStyle`，另一种接受一个`GUIStyle`参数。最初的单标签示例仅使用了默认的`GUIStyle`，但记分牌使用了接受`GUIStyle`参数的`GUI.Label`版本，这提供了一种自定义记分牌外观的方法。\n\
    \n传递给`GUI.Label`的`GUIStyle`绑定到一个名为`style`的公共变量，这允许在Inspector视图中自定义`GUIStyle`。例如，由于记分牌完全是文本，您可以点击样式Normal子部分中的Text\
    \ Color字段（相当于在脚本中访问`style.onNormal.textColor`）来打开颜色选择器并更改记分牌的颜色（[图 9-3](#9781430248750_Ch09.xhtml#Fig3)）。\n\
    \n![9781430248750_Fig09-03.jpg](images/9781430248750_Fig09-03.jpg)\n\n[图 9-3](#9781430248750_Ch09.xhtml#_Fig3).\
    \ `GUIStyle` 选项\n\n在众多其他`GUIStyle`属性中，有几个会影响GUI字体，默认使用Unity的内置字体Arial。您可以通过将字体资源从Project视图拖到`GUIStyle`的Font字段（在脚本中，对应变量`style.font`）来更改字体。任何TrueType、OpenType或dfont格式的字体都可以导入到Unity中。\n\
    \n其他`GUIStyle`属性控制字体大小和样式（对于作为动态字体导入的字体资源）、文本对齐和自动换行。\n\n富文本格式特别有趣，因为它为标签文本提供了类似HTML的标记。所以实际上，尽管脚本很简单，但您的样式自定义选项非常丰富！\n\
    \n## 暂停菜单\n\n与记分牌相比，开始/暂停菜单将需要更多的脚本编写，因此，首先需要进行设计。让我们创建一个主菜单和两个子菜单：一个用于游戏选项，一个用于显示游戏制作人员。选项菜单将有独立的音频、图形、系统和统计面板。逻辑虽然没有保龄球游戏控制器那么复杂，但这是另一个应该首先将设计草图绘制成状态图的示例（[图\
    \ 9-4](#9781430248750_Ch09.xhtml#Fig4)）。\n\n![9781430248750_Fig09-04.jpg](images/9781430248750_Fig09-04.jpg)"
  raw: 'All UnityGUI Controls are created with calls to static functions in the `GUI`
    class (and also `GUILayout`, but I’ll get to that in the next section). The `OnGUI`
    callback of [Listing 9-1](#9781430248750_Ch09.xhtml#list1) calls `GUI.Label` to
    draw a label, passing in a `Rect` (rectangle) that specifies the label is to be
    drawn at x,y coordinates 5,100 (the coordinate system for UnityGUI has 0,0 at
    the top left of the screen) and with a width and height of 200 and 20 pixels,
    respectively. The second argument is the text to display in the label. Click Play
    and you should see “This is a label” appear on the screen.


    Placing user interface code in a single script callback can be cumbersome if the
    user interface is complex. But for this simple user interface, the `OnGUI` callback
    is convenient, and we can expand on it to form a no-frills text-based bowling
    scoreboard. Let’s replace the single-label example in `FuguBowlScoreboard` with
    the contents of [Listing 9-2](#9781430248750_Ch09.xhtml#list2).


    [Listing 9-2](#9781430248750_Ch09.xhtml#_list2).  A Bowling Scoreboard


    ```

    #pragma strict


    var style:GUIStyle; // customize the appearance


    function OnGUI() {

           for (var f:int=0; f<10; f++) {

                   var score:String="";

                   var roll1:int = FuguBowl.player.scores[f].ball1;

                   var roll2:int = FuguBowl.player.scores[f].ball2;

                   var roll3:int = FuguBowl.player.scores[f].ball3;

                   switch (roll1) {

                          case -1: score += " "; break;

                          case 10: score +="X"; break;

                          default: score += roll1;

                   }

                   score+="/";

                   if (FuguBowl.player.IsSpare(f)) {

                          score +="I";

                   } else {

                          switch (roll2) {

                                  case -1: score += " "; break;

                                  case 10: score +="X"; break;

                                  default: score += roll2;

                          }

                   }

                   if (f==9) {

                          score+="/";

                          if (10==roll2+roll3) {

                                  score +="I";

                          } else {

                                  switch (roll3) {

                                         case -1: score += " "; break;

                                         case 10: score +="X"; break;

                                         default: score += roll3;

                                  }

                          }

                   }

                   GUI.Label(Rect(f*30+5,5,50,20),score,style);

                   var total:int=FuguBowl.player.GetScore(f);

                   if (total != -1) {

                          GUI.Label(Rect(f*30+5,20,50,20)," "+total,style);

                   }

           }

    }

    ```


    The new `OnGUI` callback loops through all ten frames, querying the `FuguBowlPlayer`
    for the `FuguBowlScore` representing each frame. At the bottom of the loop, one
    or two calls to `GUI.Label` are issued. The first `GUI.Label` displays the score
    for each ball of the frame, and the second `GUI.Label` is drawn below the first,
    displaying the game total score for that frame if it is available.


    Most of the code in the loop is devoted to figuring out what to display for each
    ball of the frame. For `ball1`, if it has not been rolled, yet, then the `String`
    to display is just a space. If a strike has been rolled, then the letter ‘X’ is
    displayed. Otherwise, display the numeric score (1–9).


    `ball2` is similar to `ball1`, except it also displays the letter ‘I’ for a spare.
    Normally, I would use the slash character ‘/’ for a spare, but that is used here
    to separate the scores for `ball1`, `ball2`, and `ball3`.


    The `String` for `ball3` is constructed only if the frame is the tenth frame (index
    9). `ball3` is the same as `ball2`, except it checks for a spare combining `ball2`
    and `ball3` instead of `ball1` and `ball2`.


    The frame total score is retrieved just by calling the `FuguBowlPlayer` function
    `GetScore` and is displayed as long as long as the score is available, i.e., not
    −1\. The `Rect` for each `GUI.Label` is offset from the top left of the screen
    by an increment based on the frame the `GUI.Label` is displaying ([Figure 9-2](#9781430248750_Ch09.xhtml#Fig2)).


    ![9781430248750_Fig09-02.jpg](images/9781430248750_Fig09-02.jpg)


    [Figure 9-2](#9781430248750_Ch09.xhtml#_Fig2). A bowling scoreboard displayed
    by FuguBowlScoreboard.js


    [Figure 9-2](#9781430248750_Ch09.xhtml#Fig2) shows a game on the second ball of
    the fourth frame. Three pins have been knocked down on the first ball. Strikes
    have been rolled on the first two frames and a spare on the third (five pins on
    the first roll and five on the second).The game total for the first frame is 10
    for the strike plus the pins knocked down by the next two balls, which is 10 for
    the second strike and then 5 for the first ball in the third frame, for a total
    of 25.


    The second frame also has a strike, so it’s 10 plus 5 for the first ball of the
    third frame and 5 for the second ball of that frame, for a total of 20\. Add that
    to the 25 from the first frame, for a game total of 45.


    The third frame has a spare, so it’s 10 again, but with just the next ball added,
    which is 3, for a total of 13, and add it to the game total from the previous
    frame, that’s 58\. So our scoring code and scoreboard code works!


    Style the GUI


    The appearance of a GUI Control can be customized with a GUIStyle, which is a
    collection of properties that affect the display of the Control. Conceptually,
    it’s similar to how Cascading Style Sheets (CSS) are used in formatting web content.


    Each GUI function that creates a GUI Control is an overloaded function that comes
    in two flavors: one that uses the default GUIStyle and one that takes a GUIStyle
    argument. The initial single-label example just used the default GUIStyle, but
    the scoreboard uses the version of `GUI.Label` that takes a GUIStyle argument,
    which provides a way to customize the scoreboard’s appearance.


    The GUIStyle passed to the `GUI.Label` is bound to a public variable named `style`
    *,* which allows customization of the GUIStyle in the Inspector View. For example,
    since the scoreboard is all text, you can click the Text Color field in the Normal
    subsection of the style (equivalent to accessing style.`onNormal.textColor` in
    the script) to bring up a color chooser and change the color of the scoreboard
    ([Figure 9-3](#9781430248750_Ch09.xhtml#Fig3)).


    ![9781430248750_Fig09-03.jpg](images/9781430248750_Fig09-03.jpg)


    [Figure 9-3](#9781430248750_Ch09.xhtml#_Fig3). GUIStyle options


    Among the many other GUIStyle properties, several affect the GUI font, which defaults
    to Unity’s built-in font, Arial. You can change the font by dragging a Font asset
    from the Project View into the Font field of the GUIStyle (in the script, that
    would be the variable `style.font`). Any font in TrueType, OpenType, or dfont
    format can be imported into Unity.


    Other GUIStyle properties control the font size and style (for Font assets imported
    as dynamic fonts), text alignment, and word wrap.


    Rich text format is particularly interesting, as it provides for HTML-like markup
    in the label text. So really, although the script is simple, your style customization
    options are plentiful!


    The Pause Menu


    Compared with the scoreboard, a start/pause menu will take considerably more scripting,
    so, first, a design is in order. Let’s create a main menu and two submenus: one
    for game options and one to display the game credits. The options menu will have
    distinct panels for audio, graphics, system, and stats. The logic is not as complicated
    as for the bowling game controller, but it’s another example where you should
    first sketch out the design as a state diagram ([Figure 9-4](#9781430248750_Ch09.xhtml#Fig4)).


