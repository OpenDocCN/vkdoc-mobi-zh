- fmt: "Like other assets in the Project View, a script has no effect until you add\
    \ it to the scene, specifically as a Component of a GameObject. Ultimately, you\
    \ want the `FuguRotate` script to rotate the Cube, so drag it from the Project\
    \ View onto the Cube GameObject in the Hierarchy View. The Inspector View now\
    \ shows the script is attached to the Cube as a Component ([Figure 4-5](#9781430248750_Ch04.xhtml#Fig5)).\n\
    \n![9781430248750_Fig04-05.jpg](images/9781430248750_Fig04-05.jpg)\n\n[Figure\
    \ 4-5](#9781430248750_Ch04.xhtml#_Fig5). The FuguRotate script attached to the\
    \ Cube\n\nUnity often offers two, and sometimes three, ways to perform the same\
    \ operation. For example, you could also have attached the `FuguRotate` script\
    \ to the Cube by clicking the Add Component button in the Inspector View of the\
    \ Cube and then selecting the `FuguRotate` script from the resulting menu. Or\
    \ you could have dragged the `FuguRotate` script into the area below the Add Component\
    \ button (but that’s difficult if there isn’t much space displayed below the button).\n\
    \n## Edit the Script\n\nNow it’s time to fill out the script. Select the `FuguRotate`\
    \ script in the Project View, and then in the Inspector View click the Open button\
    \ to bring up the script editor. Double-clicking the script in the Project View,\
    \ or selecting Open from the right-click menu on the script will work, too. The\
    \ default script editor for Unity is a customized version of MonoDevelop, a code\
    \ editor and debugger tailored for Mono, the open source framework underlying\
    \ Unity’s scripting system ([Figure 4-6](#9781430248750_Ch04.xhtml#Fig6)).\n\n\
    ![9781430248750_Fig04-06.jpg](images/9781430248750_Fig04-06.jpg)\n\n[Figure 4-6](#9781430248750_Ch04.xhtml#_Fig6).\
    \ The MonoDevelop editor\n\nIf you prefer to use another script editor, you can\
    \ change the default by bringing up the Unity Preferences window, selecting the\
    \ External Tools tab, and then browsing for the application of your choice ([Figure\
    \ 4-7](#9781430248750_Ch04.xhtml#Fig7)). Unitron, no longer officially supported\
    \ but still included in the Unity installation, is an option, but scripts are\
    \ text files, so any text editor can be used as a script editor. For example,\
    \ as an old school programmer, I like to use Aquamacs, an OS X version of Emacs.\n\
    \n![9781430248750_Fig04-07.jpg](images/9781430248750_Fig04-07.jpg)\n\n[Figure\
    \ 4-7](#9781430248750_Ch04.xhtml#_Fig7). Choosing a different script editor\n\n\
    The `FuguRotate` script as it stands won’t do anything noticeable, since the callback\
    \ functions are empty, having no code between their brackets. Let’s start off\
    \ with some tracing code in the `Start` and `Update` functions to demonstrate\
    \ when those callbacks are invoked ([Listing 4-2](#9781430248750_Ch04.xhtml#list2)).\n\
    \n[Listing 4-2.](#9781430248750_Ch04.xhtml#_list2)  FuguRotate.js with Calls to\
    \ Debug.Log\n\n```\nfunction Start () {\n        Debug.Log(\"Start called on GameObject\
    \ \"+gameObject.name);\n}\nfunction Update () {\n        Debug.Log(\"Update called\
    \ at time \"+Time.time);\n}\n```\n\nOne cool feature of Unity’s MonoDevelop is\
    \ its code autocompletion. For example, [Figure 4-8](#9781430248750_Ch04.xhtml#Fig8)\
    \ shows that as you type `Time.t`, MonoDevelop pops up a list of functions and\
    \ variables that are members of the `Time` class and looks for one that starts\
    \ with “t.”\n\n![9781430248750_Fig04-08.jpg](images/9781430248750_Fig04-08.jpg)\n\
    \n[Figure 4-8](#9781430248750_Ch04.xhtml#_Fig8). Autocompletion in MonoDevelop\n\
    \n## Understand the Script\n\nNow that the `FuguRotate` script is doing something,\
    \ let’s try to understand what that is. Both `Start` and `Update` call the function\
    \ `Debug.Log` to print messages to the Console View. `Log` is a static function\
    \ defined in the `Debug` class, meaning you can call that function by specifying\
    \ its class name before the function name, instead of an object (functions defined\
    \ in classes are also called *methods*).\n\n**Note**   Static functions and variables\
    \ are also called *class* functions and variables, since they are associated with\
    \ a class instead of instances of that class.\n\nThe variable `gameObject` references\
    \ the GameObject this component (the script) is attached to (in this case, the\
    \ Cube), and every GameObject also has a `name` variable that references the name\
    \ of this GameObject (in this case, “Cube”). The `+` operator can be used to concatenate\
    \ two strings (it’s not just for addition, anymore), so the `Start` function will\
    \ print `\"Start called on GameObject\"` followed by the name of the GameObject.\n\
    \nSimilarly, the `Update` function calls `Debug.Log`, concatenating `\"Update\
    \ called at time\"` with the value of the static variable `Time.time`, which holds\
    \ the time elapsed (in seconds) since the game started (in the case of running\
    \ from the Unity Editor, when you click the Play button). `Time.time` is of type\
    \ `float` (a floating point number, which can represent non-integer values), but\
    \ the `+` operator will convert the number to a `String` before appending it.\n\
    \n## Read the Scripting Reference\n\nBesides autocompletion, another handy feature\
    \ of MonoDevelop is the ability to bring up the Scripting Reference documentation\
    \ for any Unity class, function, or variable. Clicking on `Debug` at the beginning\
    \ of a `Debug.Log` call in the script and pressing Command+’ will bring up the\
    \ Scripting Reference documentation for the `Debug` class in a browser window.\
    \ Clicking on `Log` will bring up the specific documentation for the `Debug.Log`\
    \ function.\n\n**Tip**   Every time you see a Unity class, function, or variable\
    \ you’re not familiar with, the first thing you should do is read the Script Reference\
    \ documentation on it.\n\nThe Scripting Reference is available in the Unity Help\
    \ menu ([Figure 4-9](#9781430248750_Ch04.xhtml#Fig9)).\n\n![9781430248750_Fig04-09.jpg](images/9781430248750_Fig04-09.jpg)\n\
    \n[Figure 4-9](#9781430248750_Ch04.xhtml#_Fig9). Bringing up the Scripting Reference\
    \ from the Help menu\n\nThe Scripting Reference contains documentation for all\
    \ Unity classes plus their functions and variables ([Figure 4-10](#9781430248750_Ch04.xhtml#Fig10)).\
    \ I find the fastest way to look up an arbitrary Unity class, function, or variable\
    \ in the Scripting Reference is to type it in the search box. Command+’ in MonoDevelop\
    \ effectively performs that search when it doesn’t know exactly what definition\
    \ you’re looking for. For example, perform Command+’ on `Start` in the `FuguRotate`\
    \ script and a list of search results for `Start` will appear.\n\n![9781430248750_Fig04-10.jpg](images/9781430248750_Fig04-10.jpg)\n\
    \n[Figure 4-10](#9781430248750_Ch04.xhtml#_Fig10). The Scripting Reference\n\n\
    However, clicking Runtime Classes on the left of the Scripting Reference will\
    \ give you the entire list of classes, indented so the class hierarchy (i.e.,\
    \ which classes are subclasses of others) is apparent ([Figure 4-11](#9781430248750_Ch04.xhtml#Fig11)).\
    \ Some classes, such as `Debug` and `Time`, are static classes, meaning they contain\
    \ only static functions and variables (there are no Unity functions that don’t\
    \ reside in a class) and there’s no reason to subclass them.\n\n![9781430248750_Fig04-11.jpg](images/9781430248750_Fig04-11.jpg)\n\
    \n[Figure 4-11](#9781430248750_Ch04.xhtml#_Fig11). The class hierarchy of runtime\
    \ classes\n\nMost classes, however, act as types of objects. The Cube in the scene\
    \ is an instance of the class `GameObject`. And `GameObject` is a subclass of\
    \ `Object`, meaning it inherits all of the documented variables and functions\
    \ of `Object`. Conceptually, and in object-oriented parlance, the Cube *is a*\
    \ `GameObject` and thus also *is an* `Object`. Contrast this with the relationship\
    \ between `GameObject` and `Component`. The Cube *is a* `GameObject` and it *has\
    \ a* `MeshFilter` (which *has a* `Mesh`)."
  raw: 'Like other assets in the Project View, a script has no effect until you add
    it to the scene, specifically as a Component of a GameObject. Ultimately, you
    want the `FuguRotate` script to rotate the Cube, so drag it from the Project View
    onto the Cube GameObject in the Hierarchy View. The Inspector View now shows the
    script is attached to the Cube as a Component ([Figure 4-5](#9781430248750_Ch04.xhtml#Fig5)).


    ![9781430248750_Fig04-05.jpg](images/9781430248750_Fig04-05.jpg)


    [Figure 4-5](#9781430248750_Ch04.xhtml#_Fig5). The FuguRotate script attached
    to the Cube


    Unity often offers two, and sometimes three, ways to perform the same operation.
    For example, you could also have attached the `FuguRotate` script to the Cube
    by clicking the Add Component button in the Inspector View of the Cube and then
    selecting the `FuguRotate` script from the resulting menu. Or you could have dragged
    the `FuguRotate` script into the area below the Add Component button (but that’s
    difficult if there isn’t much space displayed below the button).


    Edit the Script


    Now it’s time to fill out the script. Select the `FuguRotate` script in the Project
    View, and then in the Inspector View click the Open button to bring up the script
    editor. Double-clicking the script in the Project View, or selecting Open from
    the right-click menu on the script will work, too. The default script editor for
    Unity is a customized version of MonoDevelop, a code editor and debugger tailored
    for Mono, the open source framework underlying Unity’s scripting system ([Figure
    4-6](#9781430248750_Ch04.xhtml#Fig6)).


    ![9781430248750_Fig04-06.jpg](images/9781430248750_Fig04-06.jpg)


    [Figure 4-6](#9781430248750_Ch04.xhtml#_Fig6). The MonoDevelop editor


    If you prefer to use another script editor, you can change the default by bringing
    up the Unity Preferences window, selecting the External Tools tab, and then browsing
    for the application of your choice ([Figure 4-7](#9781430248750_Ch04.xhtml#Fig7)).
    Unitron, no longer officially supported but still included in the Unity installation,
    is an option, but scripts are text files, so any text editor can be used as a
    script editor. For example, as an old school programmer, I like to use Aquamacs,
    an OS X version of Emacs.


    ![9781430248750_Fig04-07.jpg](images/9781430248750_Fig04-07.jpg)


    [Figure 4-7](#9781430248750_Ch04.xhtml#_Fig7). Choosing a different script editor


    The `FuguRotate` script as it stands won’t do anything noticeable, since the callback
    functions are empty, having no code between their brackets. Let’s start off with
    some tracing code in the `Start` and `Update` functions to demonstrate when those
    callbacks are invoked ([Listing 4-2](#9781430248750_Ch04.xhtml#list2)).


    [Listing 4-2.](#9781430248750_Ch04.xhtml#_list2)  FuguRotate.js with Calls to
    Debug.Log


    ```

    function Start () {

            Debug.Log("Start called on GameObject "+gameObject.name);

    }

    function Update () {

            Debug.Log("Update called at time "+Time.time);

    }

    ```


    One cool feature of Unity’s MonoDevelop is its code autocompletion. For example,
    [Figure 4-8](#9781430248750_Ch04.xhtml#Fig8) shows that as you type `Time.t`,
    MonoDevelop pops up a list of functions and variables that are members of the
    `Time` class and looks for one that starts with “t.”


    ![9781430248750_Fig04-08.jpg](images/9781430248750_Fig04-08.jpg)


    [Figure 4-8](#9781430248750_Ch04.xhtml#_Fig8). Autocompletion in MonoDevelop


    Understand the Script


    Now that the `FuguRotate` script is doing something, let’s try to understand what
    that is. Both `Start` and Update call the function `Debug.Log` to print messages
    to the Console View. `Log` is a static function defined in the `Debug` class,
    meaning you can call that function by specifying its class name before the function
    name, instead of an object (functions defined in classes are also called *methods*).


    **Note**   Static functions and variables are also called *class* functions and
    variables, since they are associated with a class instead of instances of that
    class.


    The variable `gameObject` references the GameObject this component (the script)
    is attached to (in this case, the Cube), and every GameObject also has a `name`
    variable that references the name of this GameObject (in this case, “Cube”). The
    `+` operator can be used to concatenate two strings (it’s not just for addition,
    anymore), so the `Start` function will print `"Start called on GameObject"` followed
    by the name of the GameObject.


    Similarly, the `Update` function calls `Debug.Log`, concatenating `"Update called
    at time"` with the value of the static variable `Time.time, which` holds the time
    elapsed (in seconds) since the game started (in the case of running from the Unity
    Editor, when you click the Play button). `Time.time` is of type `float` (a floating
    point number, which can represent non-integer values), but the `+` operator will
    convert the number to a `String` before appending it.


    Read the Scripting Reference


    Besides autocompletion, another handy feature of MonoDevelop is the ability to
    bring up the Scripting Reference documentation for any Unity class, function,
    or variable. Clicking on `Debug` at the beginning of a `Debug.Log` call in the
    script and pressing Command+’ will bring up the Scripting Reference documentation
    for the `Debug` class in a browser window. Clicking on `Log` will bring up the
    specific documentation for the `Debug.Log` function.


    **Tip**   Every time you see a Unity class, function, or variable you’re not familiar
    with, the first thing you should do is read the Script Reference documentation
    on it.


    The Scripting Reference is available in the Unity Help menu ([Figure 4-9](#9781430248750_Ch04.xhtml#Fig9)).


    ![9781430248750_Fig04-09.jpg](images/9781430248750_Fig04-09.jpg)


    [Figure 4-9](#9781430248750_Ch04.xhtml#_Fig9). Bringing up the Scripting Reference
    from the Help menu


    The Scripting Reference contains documentation for all Unity classes plus their
    functions and variables ([Figure 4-10](#9781430248750_Ch04.xhtml#Fig10)). I find
    the fastest way to look up an arbitrary Unity class, function, or variable in
    the Scripting Reference is to type it in the search box. Command+’ in MonoDevelop
    effectively performs that search when it doesn’t know exactly what definition
    you’re looking for. For example, perform Command+’ on `Start` in the `FuguRotate`
    script and a list of search results for `Start` will appear.


    ![9781430248750_Fig04-10.jpg](images/9781430248750_Fig04-10.jpg)


    [Figure 4-10](#9781430248750_Ch04.xhtml#_Fig10). The Scripting Reference


    However, clicking Runtime Classes on the left of the Scripting Reference will
    give you the entire list of classes, indented so the class hierarchy (i.e., which
    classes are subclasses of others) is apparent ([Figure 4-11](#9781430248750_Ch04.xhtml#Fig11)).
    Some classes, such as `Debug` and `Time`, are static classes, meaning they contain
    only static functions and variables (there are no Unity functions that don’t reside
    in a class) and there’s no reason to subclass them.


    ![9781430248750_Fig04-11.jpg](images/9781430248750_Fig04-11.jpg)


    [Figure 4-11](#9781430248750_Ch04.xhtml#_Fig11). The class hierarchy of runtime
    classes


    Most classes, however, act as types of objects. The Cube in the scene is an instance
    of the class `GameObject`. And `GameObject` is a subclass of `Object`, meaning
    it inherits all of the documented variables and functions of `Object`. Conceptually,
    and in object-oriented parlance, the Cube *is a* `GameObject` and thus also *is
    an* `Object`. Contrast this with the relationship between `GameObject` and `Component`.
    The Cube *is a* `GameObject` and it *has a* `MeshFilter` (which *has a* `Mesh`).'
  trans: "\n与项目视图中的其他资源一样，脚本在被添加到场景中之前（具体来说是作为游戏对象的组件）不会产生任何效果。最终，我们希望 `FuguRotate`\
    \ 脚本能让立方体旋转，因此将其从项目视图拖拽到层级视图中的立方体游戏对象上。检查器视图现在会显示该脚本已作为组件附加到立方体上（图 4-5）。\n\n![9781430248750_Fig04-05.jpg](img/9781430248750_Fig04-05.jpg)\n\
    \n图 4-5。附加到立方体上的 FuguRotate 脚本\n\nUnity 通常提供两种，有时甚至三种方法来执行同一操作。例如，你也可以通过在立方体的检查器视图中点击“添加组件”按钮，然后从弹出的菜单中选择\
    \ `FuguRotate` 脚本，来将该脚本附加到立方体上。或者，你也可以将 `FuguRotate` 脚本拖拽到“添加组件”按钮下方的区域（但如果按钮下方显示的空间不足，这操作起来会比较困难）。\n\
    \n## 编辑脚本\n\n现在该填充脚本内容了。在项目视图中选中 `FuguRotate` 脚本，然后在检查器视图中点击“打开”按钮调出脚本编辑器。在项目视图中双击该脚本，或者从脚本的右键菜单中选择“打开”，也同样有效。Unity\
    \ 默认的脚本编辑器是 MonoDevelop 的一个定制版本，这是一个专为 Mono 定制的代码编辑器和调试器，而 Mono 是支撑 Unity 脚本系统的开源框架（图\
    \ 4-6）。\n\n![9781430248750_Fig04-06.jpg](img/9781430248750_Fig04-06.jpg)\n\n图\
    \ 4-6。MonoDevelop 编辑器\n\n如果你更喜欢使用其他脚本编辑器，可以通过调出 Unity 偏好设置窗口，选择“外部工具”选项卡，然后浏览并选择你偏好的应用程序来更改默认设置（图\
    \ 4-7）。虽然 Unitron 已不再受官方支持，但仍包含在 Unity 安装包中，它是一个可选方案。不过脚本本质上是文本文件，因此任何文本编辑器都可以用作脚本编辑器。例如，作为一名老派程序员，我喜欢使用\
    \ Aquamacs，它是 Emacs 的 OS X 版本。\n\n![9781430248750_Fig04-07.jpg](img/9781430248750_Fig04-07.jpg)\n\
    \n图 4-7。选择不同的脚本编辑器\n\n现有的 `FuguRotate` 脚本不会执行任何可见操作，因为其回调函数都是空的，花括号之间没有代码。让我们从在\
    \ `Start` 和 `Update` 函数中添加一些追踪代码开始，以演示这些回调函数何时被调用（列表 4-2）。\n\n列表 4-2. 包含 Debug.Log\
    \ 调用的 FuguRotate.js\n\n```\nfunction Start () {\n        Debug.Log(\"Start called\
    \ on GameObject \"+gameObject.name);\n}\nfunction Update () {\n        Debug.Log(\"\
    Update called at time \"+Time.time);\n}\n```\n\nUnity 的 MonoDevelop 一个很酷的功能是代码自动补全。例如，图\
    \ 4-8 展示了当你输入 `Time.t` 时，MonoDevelop 会弹出一个属于 `Time` 类的函数和变量列表，并查找以 \"t\" 开头的项。\n\
    \n![9781430248750_Fig04-08.jpg](img/9781430248750_Fig04-08.jpg)\n\n图 4-8。MonoDevelop\
    \ 中的自动补全\n\n## 理解脚本\n\n现在 `FuguRotate` 脚本正在执行一些操作，让我们尝试理解这些操作的含义。`Start` 和 `Update`\
    \ 都调用了 `Debug.Log` 函数来向控制台视图打印消息。`Log` 是定义在 `Debug` 类中的一个静态函数，这意味着你可以通过在函数名前指定其类名来调用它，而不是通过对象来调用（定义在类中的函数也称为*方法*）。\n\
    \n**注意**   静态函数和变量也称为*类*函数和变量，因为它们与类本身相关联，而不是与该类的实例相关联。\n\n变量 `gameObject` 引用了此组件（脚本）所附加到的那个游戏对象（在本例中是立方体），并且每个游戏对象都有一个\
    \ `name` 变量，用于引用该游戏对象的名称（在本例中是“Cube”）。`+` 运算符可用于连接两个字符串（它不再仅仅用于加法），因此 `Start`\
    \ 函数将打印 `\"Start called on GameObject\"` 后跟游戏对象的名称。\n\n类似地，`Update` 函数调用了 `Debug.Log`，将\
    \ `\"Update called at time\"` 与静态变量 `Time.time` 的值连接起来。`Time.time` 保存了自游戏开始以来经过的时间（以秒为单位）（在\
    \ Unity 编辑器中运行时，指点击“播放”按钮后的时间）。`Time.time` 的类型是 `float`（一种浮点数，可以表示非整数值），但 `+`\
    \ 运算符会在拼接前将数字转换为 `String`。\n\n## 阅读脚本参考\n\n除了自动补全，MonoDevelop 的另一个便捷功能是能够调出任何\
    \ Unity 类、函数或变量的脚本参考文档。在脚本中点击 `Debug.Log` 调用开头的 `Debug`，然后按下 Command+'，将会在浏览器窗口中打开\
    \ `Debug` 类的脚本参考文档。点击 `Log` 则会打开 `Debug.Log` 函数的具体文档。\n\n**提示**   每当你遇到不熟悉的 Unity\
    \ 类、函数或变量时，你应该做的第一件事就是阅读关于它的脚本参考文档。\n\n脚本参考文档可以在 Unity 的帮助菜单中找到（图 4-9）。\n\n![9781430248750_Fig04-09.jpg](img/9781430248750_Fig04-09.jpg)\n\
    \n图 4-9。从帮助菜单调出脚本参考\n\n脚本参考文档包含了所有 Unity 类及其函数和变量的文档（图 4-10）。我发现，在脚本参考文档中查找任意\
    \ Unity 类、函数或变量的最快方法是在搜索框中输入其名称。当 MonoDevelop 不确定你在查找哪个具体定义时，Command+' 实际上会执行那个搜索。例如，在\
    \ `FuguRotate` 脚本中对 `Start` 执行 Command+'，将会出现一个关于 `Start` 的搜索结果列表。\n\n![9781430248750_Fig04-10.jpg](img/9781430248750_Fig04-10.jpg)\n\
    \n图 4-10。脚本参考\n\n然而，点击脚本参考左侧的“运行时类”将会提供完整的类列表，并带有缩进，以便清晰地显示类层次结构（即，哪些类是其他类的子类）（图\
    \ 4-11）。一些类，例如 `Debug` 和 `Time`，是静态类，这意味着它们只包含静态函数和变量（Unity 中没有不位于类中的函数），并且没有理由对它们进行子类化。\n\
    \n![9781430248750_Fig04-11.jpg](img/9781430248750_Fig04-11.jpg)\n\n图 4-11。运行时类的类层次结构\n\
    \n然而，大多数类充当的是对象的类型。场景中的立方体是 `GameObject` 类的一个实例。而 `GameObject` 是 `Object` 的一个子类，这意味着它继承了\
    \ `Object` 所有文档中记载的变量和函数。从概念上讲，用面向对象的术语来说，立方体*是一个* `GameObject`，因此也*是一个* `Object`。将此与\
    \ `GameObject` 和 `Component` 之间的关系进行对比。立方体*是一个* `GameObject`，并且它*有一个* `MeshFilter`（而\
    \ `MeshFilter` *有一个* `Mesh`）。\n"
- fmt: "From the Runtime Classes list, you can see that just about everything that\
    \ can be in a scene is a subclass of `Object`, including `GameObject` and `Component`.\
    \ Many `Component` subclasses, including `Light` and `Camera`, are also subclasses\
    \ of `Behaviour`, which is a Component that can be enabled or disabled (as evidenced\
    \ by their checkboxes in the Inspector View). Some are not, though, like `Transform`,\
    \ which is a direct subclass (no intervening classes) of Component and cannot\
    \ be disabled (no checkbox in the Inspector View).\n\nEach script is actually\
    \ a subclass of `MonoBehaviour`, which is a subclass of `Behaviour` (so you can\
    \ enable and disable scripts). Thus, the `FuguRotate` script defines a subclass\
    \ of `MonoBehaviour` called `FuguRotate`. This class declaration is implicit in\
    \ JavaScript, although you could make it explicit, as shown in [Listing 4-3](#9781430248750_Ch04.xhtml#list3).\n\
    \n[Listing 4-3.](#9781430248750_Ch04.xhtml#_list3)  A Version of FuguRotate.js\
    \ with an Explicit Class Declaration\n\n```\n#pragma strict\n\nclass FuguRotate\
    \ extends MonoBehaviour {\n\nfunction Start () {\n                var object:GameObject\
    \ = null;\n                Debug.Log(\"Start called on GameObject \"+object.name);\n\
    \        }\n\nfunction Update () {\n                Debug.Log(\"Update called\
    \ at time \"+Time.time);\n        }\n\n}\n```\n\n## Run the Script\n\nProper programming\
    \ is a lot like the scientific method you learned in school. You should have a\
    \ general theory on how things work, hypothesize about what your code should be\
    \ doing, and then you’re ready to run an experiment to validate that hypothesis.\
    \ In other words, it’s time to run your code and see if it does what you expect.\
    \ When you click Play, the messages emitted by `Debug.Log` will show up in the\
    \ Console View ([Figure 4-12](#9781430248750_Ch04.xhtml#Fig12)).\n\n![9781430248750_Fig04-12.jpg](images/9781430248750_Fig04-12.jpg)\n\
    \n[Figure 4-12](#9781430248750_Ch04.xhtml#_Fig12). Tracing the Start and Update\
    \ callbacks\n\nIf the code doesn’t behave as you expect, it is time to revise\
    \ your theory on what it’s doing. This may be a small consolation, but debugging\
    \ your code is a learning experience!\n\n## Debug the Script\n\nOf course, your\
    \ code will not be perfect as soon as you type it in. On the contrary, usually\
    \ it will require several iterations of debugging. There are basically two types\
    \ of errors: compilation errors that appear even before you try to run the game,\
    \ and runtime errors that occur while the game is playing.\n\n### Compilation\
    \ Errors\n\nEvery time a script is saved, it’s automatically compiled (converted\
    \ from the source code to the code format that actually runs). Errors in the script\
    \ that prevent successful compilation will appear in red at the bottom of the\
    \ Unity Editor and in the Console View.\n\nDouble-clicking the error message at\
    \ the bottom of the Editor will bring up the corresponding message in the Console\
    \ View, and double-clicking the message in the Console View will bring up the\
    \ script editor with the cursor located at the offending line of code. Even without\
    \ that convenience, the error message will list the file name and line number\
    \ of the offending code, so it can be found manually.\n\nFor example, if you had\
    \ typed `Time.tim` instead of `Time.time` in the `Update` function, an error message\
    \ would have appeared as soon as you tried to save the script ([Figure 4-13](#9781430248750_Ch04.xhtml#Fig13).)\
    \ Conveniently, Unity will often do a decent job of suggesting what you may have\
    \ intended to type (although generally computers aren’t good at “do what I mean,\
    \ not what I say”).\n\n![9781430248750_Fig04-13.jpg](images/9781430248750_Fig04-13.jpg)\n\
    \n[Figure 4-13](#9781430248750_Ch04.xhtml#_Fig13). A script compilation error\n\
    \n### Runtime Errors\n\nLike compilation errors, runtime errors also show up in\
    \ the Console View. To demonstrate, replace the reference to `gameObject` in your\
    \ `Start` function with a reference to a local variable named `object`([Listing\
    \ 4-4](#9781430248750_Ch04.xhtml#list4)). A local variable is declared within\
    \ a function declaration, and therefore is only accessible within the scope of\
    \ the function. In this case, `object` is initialized as `null`, meaning it’s\
    \ not referring to any actual GameObject, and is never assigned any GameObject.\
    \ When you click Play, an error results when the script tries to reference the\
    \ name of the GameObject ([Figure 4-14](#9781430248750_Ch04.xhtml#Fig14)).\n\n\
    [Listing 4-4.](#9781430248750_Ch04.xhtml#_list4)  Start Function in FuguRotate.js\
    \ with a Null Reference Error\n\n```\nfunction Start () {\n        var object:GameObject\
    \ = null;\n        Debug.Log(\"Start called on GameObject \"+object.name);\n}\
    \ \n```\n\n![9781430248750_Fig04-14.jpg](images/9781430248750_Fig04-14.jpg)\n\n\
    [Figure 4-14](#9781430248750_Ch04.xhtml#_Fig14). A script runtime error\n\n###\
    \ Debug with MonoDevelop\n\nI still perform most of my debugging by calling `Debug.Log`\
    \ (old school, again) and examining error messages in the Console View. But modern\
    \ programmers are accustomed to more sophisticated debugging tools. It turns out\
    \ that MonoDevelop also provides a full-featured debugger that’s been customized\
    \ to work with Unity. To enable debugging with MonoDevelop, select the Sync MonoDevelop\
    \ Project command from the Assets menu ([Figure 4-15](#9781430248750_Ch04.xhtml#Fig15)).\n\
    \n![9781430248750_Fig04-15.jpg](images/9781430248750_Fig04-15.jpg)\n\n[Figure\
    \ 4-15](#9781430248750_Ch04.xhtml#_Fig15). Sync MonoDevelop Project to start debugging\n\
    \nThe Sync MonoDevelop Project command updates the MonoDevelop project files corresponding\
    \ to this Unity project and then opens the MonoDevelop project solution file.\
    \ If MonoDevelop doesn’t automatically open that solution file, you can open it\
    \ from MonoDevelop File menu or double-click the solution file in the Finder (the\
    \ highlighted file in [Figure 4-16](#9781430248750_Ch04.xhtml#Fig16)).\n\n![9781430248750_Fig04-16.jpg](images/9781430248750_Fig04-16.jpg)\n\
    \n[Figure 4-16](#9781430248750_Ch04.xhtml#_Fig16). MonoDevelop project files\n\
    \nWith the MonoDevelop solution loaded, enable debugging by selecting Attach to\
    \ Process from the MonoDevelop Run menu ([Figure 4-17](#9781430248750_Ch04.xhtml#Fig17)).\n\
    \n![9781430248750_Fig04-17.jpg](images/9781430248750_Fig04-17.jpg)\n\n[Figure\
    \ 4-17](#9781430248750_Ch04.xhtml#_Fig17). The MonoDevelop Attach to Process command\n\
    \nThen choose Unity Editor in the resulting process list ([Figure 4-18](#9781430248750_Ch04.xhtml#Fig18)).\n\
    \n![9781430248750_Fig04-18.jpg](images/9781430248750_Fig04-18.jpg)\n\n[Figure\
    \ 4-18](#9781430248750_Ch04.xhtml#_Fig18). Attaching MonoDevelop to the Unity\
    \ Editor\n\nClick Play, again, and this time MonoDevelop will show not only the\
    \ line of code where the error occurred, but also the specific type of error (`NullReferenceException`)\
    \ and associated information like the stack trace, which is useful in determining\
    \ what chain of function calls resulted in the error ([Figure 4-19](#9781430248750_Ch04.xhtml#Fig19)).\n\
    \n![9781430248750_Fig04-19.jpg](images/9781430248750_Fig04-19.jpg)\n\n[Figure\
    \ 4-19](#9781430248750_Ch04.xhtml#_Fig19). MonoDevelop error details with the\
    \ Unity Editor attached\n\nWhile in debugging mode, the Unity Editor is unresponsive,\
    \ so when you’re finished with a debugging run, select Detach from the Run menu\
    \ in MonoDevelop to detach the Unity Editor process ([Figure 4-20](#9781430248750_Ch04.xhtml#Fig20)).\
    \ The Detach command is also available as a button on the MonoDevelop toolbar.\n\
    \n![9781430248750_Fig04-20.jpg](images/9781430248750_Fig04-20.jpg)\n\n[Figure\
    \ 4-20](#9781430248750_Ch04.xhtml#_Fig20). Detaching the Unity Editor process\
    \ from MonoDevelop\n\nLet’s fix the null reference problem by changing the initial\
    \ value of the variable `object` from `null` to the script’s GameObject ([Listing\
    \ 4-5](#9781430248750_Ch04.xhtml#list5))."
