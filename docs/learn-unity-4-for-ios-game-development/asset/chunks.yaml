    \ code, but the updated scripts are available in the project files for this chapter\
    \ on `http://learnunity4.com/`.\n\n## UnityGUI\n\nThe detailed profile results\
    \ indicate that UnityGUI takes up a significant portion of our frametime. One\
    \ source of slowdown in UnityGUI is the overhead of using `GUILayout` to automatically\
    \ place GUI elements. We don’t use `GUILayout` in the scoreboard, so you can add\
    \ an `Awake` callback which sets `useGUILayout` to false in the `FuguBowlScoreboard`\
    \ script ([Listing 16-7](#9781430248750_Ch16.xhtml#list7)).\n\n[Listing 16-7](#9781430248750_Ch16.xhtml#_list7).\
    \ Setting `useGUILayout` to False in `FuguBowlScoreboard.js`\n\n``` \nfunction\
    \ Awake() { \n    useGUILayout = false; \n} \n```\n\nThe pause menu still uses\
    \ `GUILayout`, but because the menu is only up when the game is paused and won’t\
    \ affect gameplay, its performance is less of a concern.\n\n## Runtime Static\
    \ Batching (Pro)\n\nDynamic batching can combine similar meshes that weren’t candidates\
    \ for static batching at build time because they’re moving or happened to be created\
    \ during the game. But dynamic batching has to constantly update the batching,\
    \ which is why the batching time is listed in the profile results. This rebatching\
    \ seems like a waste if the batched objects are moving together or if they are\
    \ not moving but were instantiated at runtime. Also, since batching takes memory,\
    \ there is an upper limit on the amount of dynamic batching that will occur (the\
    \ Unity documentation currently says 30,000 vertices, but that is subject to change).\n\
    \nFortunately, there is a class called `StaticBatchingUtility` (in Unity Pro and\
    \ Unity iOS Pro) that allows you to perform static batching at runtime by calling\
    \ a `Combine` function. [Listing 16-8](#9781430248750_Ch16.xhtml#list8) shows\
    \ a really simple script that just calls `StaticBatchingUtility.Combine` on the\
    \ script’s `GameObject`.\n\n[Listing 16-8](#9781430248750_Ch16.xhtml#_list8).\
    \ Script for Statically Batching an Object Hierarchy\n\n``` \n#pragma strict \n\
    \nfunction Start() { \n    StaticBatchingUtility.Combine(gameObject); \n} \n```\n\
    \nAlthough simple, the script is fully functional. For example, in the rotating\
    \ cube scene, if we dragged this script onto the main rotating Cube that has two\
    \ child cubes (and disabled the individual rotation scripts of the child cubes),\
    \ all three cubes would be statically batched together when the scene starts playing.\
    \ The batched `GameObjects` don’t have to be in a hierarchy together. `StaticBatchingUtility.Combine`\
    \ is an overloaded function, and with another version it takes two arguments:\
    \ an array of `GameObjects` to batch together and a `GameObject` designated as\
    \ the parent.\n\n## Share Materials\n\nFor batching to take place, whether statically,\
    \ dynamically, or through a call to `StaticBatchingUtility.Combine`, the Meshes\
    \ to be batched must share the same Material or set of Materials. But for dynamic\
    \ batching in particular, you need to be careful that you don’t break that sharing\
    \ if you modify the Material.\n\nFor example, the script in [Listing 16-9](#9781430248750_Ch16.xhtml#list9)\
    \ animates the texture of a Material by constantly changing its texture offsets.\n\
    \nThis provides a scrolling texture effect; in HyperBowl, this script is used\
    \ to animate textures for scrolling neon signs, drifting clouds in the sky, and\
    \ flowing water. However, when the script modifies the Material by calling its\
    \ `SetTextureOffset` function, a new Material is created if the original Material\
    \ happens to be shared.\n\n[Listing 16-9](#9781430248750_Ch16.xhtml#_list9). Script\
    \ That Animates the Texture Coordinate Offsets of a Material\n\n``` \n#pragma\
    \ strict \n\nvar speed:Vector2; \nvar materialIndex:int=0; \n\nprivate var offset:Vector2;\
    \ \nprivate var material:Material; \n\nfunction Start() { \n    offset=new Vector2(0,0);\
    \ \n    material = renderer.materials[materialIndex]; \n} \n\nfunction Update\
    \ () { \n    var dtime:float = Time.deltaTime; \n    offset.x=(offset.x+speed.x*dtime)%1.0f;\
    \ \n    offset.y=(offset.y+speed.y*dtime)%1.0f; \n    material.SetTextureOffset(\"\
    _MainTex\",offset); \n} \n```\n\nThis makes sense, of course. If you create two\
    \ `GameObjects` with the same Material and decide you want to alter the appearance\
    \ of one by modifying its Material, you don’t necessarily want to make the same\
    \ change to the other `GameObject`.\n\nHowever, if you’re going to apply the same\
    \ animation to all the `GameObjects` that are sharing the Material, then there’s\
    \ no reason to stop sharing the Material. So you can modify the script to access\
    \ the `sharedMaterials` variable of the `MeshRenderer` instead of the `materials`\
    \ variable. Accessing `sharedMaterials` (or `sharedMaterial` if you assume only\
    \ one Material on the `GameObject`) means you really do want to change the shared\
    \ Material and avoids creating a new one, thus preserving eligibility for batching.\
    \ To handle both shared and nonshared Material cases, let’s add a public variable\
    \ that allows you to specify whether the animation breaks Material sharing, and\
    \ let’s use that value to determine whether to modify `renderer.materials` or\
    \ `renderer.sharedMaterials` ([Listing 16-10](#9781430248750_Ch16.xhtml#list10)).\n\
    \n[Listing 16-10](#9781430248750_Ch16.xhtml#_list10). Texture Animation Script\
    \ with Option to Share Material\n\n``` \n#pragma strict \n\nvar speed:Vector2;\
    \ \nvar materialIndex:int=0; \n\nvar shared:boolean = true; \n\nprivate var offset:Vector2;\
    \ \nprivate var material:Material; \n\nfunction Start() { \n    offset=new Vector2(0,0);\
    \ \n    if (shared) { \n        material = renderer.sharedMaterials[materialIndex];\
    \ \n    } else { \n        material = renderer.materials[materialIndex]; \n  \
    \  } \n} \n\nfunction Update () { \n    var dtime:float = Time.deltaTime; \n \
    \   offset.x=(offset.x+speed.x*dtime)%1.0f; \n    offset.y=(offset.y+speed.y*dtime)%1.0f;\
    \ \n    material.SetTextureOffset(\"_MainTex\",offset); \n} \n```\n\nAn additional,\
    \ although less significant, optimization is available when using this script\
    \ to animate a shared Material. It would be redundant for every `GameObject` with\
    \ the same Material to run the same texture animation script; just one instance\
    \ of the script is sufficient to drive the animation for everyone.\n\n## Minimize\
    \ Garbage Collection\n\nI alluded to automatic memory management when we developed\
    \ our iAd banner script in the previous chapter, noting that you have to keep\
    \ a reference to the ad object to keep it from getting garbage collected, and\
    \ you should remove the reference to allow the garbage collector to reclaim the\
    \ space used by the object. In the worst case, if you’re constantly creating objects\
    \ and never allowing them to be garbage collected (let’s say you’ve added the\
    \ objects to an `Array` and never remove them, so they’re always referenced),\
    \ you’ll eventually run out of memory.\n\nGarbage collections can introduce noticeable\
    \ pauses into a game. The most effective way to minimize those pauses is to minimize\
    \ the necessity for garbage collection, and that can be accomplished by minimizing\
    \ the number of objects that are eventually reclaimed by the collector."
