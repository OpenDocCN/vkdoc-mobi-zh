    Take Screenshots


    iTunes Connect will also ask you for screenshots in three sizes: matching the
    iPhone 4 (640 × 960 or 960 × 640), iPhone 5 (640 × 1136 or 1136 × 640), and iPad
    (768 × 1024 or 1024 × 768 or double that for the new iPad). That’s assuming you
    selected iPhone + iPad as the supported hardware in the Unity Player Settings.
    If you only selected iPhone, then you don’t need to supply the iPad screenshot,
    and if you only selected iPad, then you only need to supply the iPad screenshot.


    There are three fairly convenient ways to take screenshots: using the iOS Simulator,
    from a device using the Xcode Organizer window, and on the device itself by pressing
    some buttons.


    Taking screenshots with the iOS Simulator is easy. Use the Screenshot command
    in the Edit menu, and the resulting screenshot is saved on the Desktop. It may
    be inconvenient to use the iOS Simulator if your game does not play well with
    the limited iOS Simulator input. But if you don’t have an iPhone 4 and 5 series,
    plus an iPad, this is one way to get screenshots.


    Taking Xcode screenshots is almost as simple. With a device attached to your Mac,
    select the Screenshots panel of the device as it appears in the Xcode Organizer
    window (all attached devices will display with a green dot).


    Then click the New Screenshot button on the lower right when you see a screen
    you like, as you play your game on the test device. The screenshot will appear
    in the Screenshots panel ([Figure 11-12](#9781430248750_Ch11.xhtml#Fig12)), and
    you can drag any screenshot from there (the smaller preview on the left or the
    big one on the right) to the Desktop for easy access.


    ![9781430248750_Fig11-12.jpg](images/9781430248750_Fig11-12.jpg)


    [Figure 11-12](#9781430248750_Ch11.xhtml#_Fig12). Taking device screenshots in
    the Xcode Organizer


    Otherwise, if you need to access them in the Finder, the screenshots are in the
    Library ![image](images/arrow.jpg) ApplicationSupport ![image](images/arrow.jpg)
    Developer ![image](images/arrow.jpg) Shared ![image](images/arrow.jpg) Screenshots
    folder.


    **Tip**   OS X normally hides the Library folder. You can unhide it by opening
    the Terminal application and entering `chflags nohidden ∼/Library`.


    My favorite way to take a screenshot is directly on the device by pressing the
    Home and Power buttons simultaneously. The resulting screenshot is saved to Photos
    on the device, which can later be synced to iPhoto on the Mac and accessible in
    the Finder from there. This method allows me to take screenshots at my leisure,
    and anywhere I want, like on the sofa, instead of being tethered to a Mac. And
    it’s easier to quickly take a screenshot at a propitious moment than trying to
    grab a mouse and quickly click the New Screenshot button in the Xcode Organizer.


    Add an App on iTunes Connect


    Now that you’ve got your icon and screenshots ready, you can start adding your
    app information to iTunes Connect. Log in to `http://itunesconnect.apple.com/`
    and you’ll see the main menu, as shown in [Figure 11-13](#9781430248750_Ch11.xhtml#Fig13).


    ![9781430248750_Fig11-13.jpg](images/9781430248750_Fig11-13.jpg)


    [Figure 11-13](#9781430248750_Ch11.xhtml#_Fig13). The main menu in iTunes Connect


    Click Manage Your Applications to get started. Now you’ll see a list of apps that
    you’ve already added and an Add New App button. [Figure 11-14](#9781430248750_Ch11.xhtml#Fig14)
    shows this page in my iTunes Connect account, displaying some of my apps, each
    with a version number and a dot that is color coded according to the app’s status.


    ![9781430248750_Fig11-14.jpg](images/9781430248750_Fig11-14.jpg)


    [Figure 11-14](#9781430248750_Ch11.xhtml#_Fig14). Add or manage apps in iTunes
    Connect


    A green dot means the app is live on the App Store, and red means it has been
    rejected. Yellow has all kinds of meanings, but often means the app has not been
    uploaded yet. An app that is already live and has an update submitted or in progress
    will list the status of both. If this is your first app, of course, no apps will
    be listed.


    Select App Type


    When you click Add New App, the next page ([Figure 11-15](#9781430248750_Ch11.xhtml#Fig15))
    asks you to select an app type, either an iOS App for the App Store or a Mac OS
    X app for the Mac App Store.


    ![9781430248750_Fig11-15.jpg](images/9781430248750_Fig11-15.jpg)


    [Figure 11-15](#9781430248750_Ch11.xhtml#_Fig15). Selecting the new app type in
    iTunes Connect


    Clicking iOS App will bring up a series of web pages, each with a form to fill
    out, and advance to the next page or form by clicking the Continue button.


    App Information


    After selecting iOS as the app type, you’ll be presented with a page for entering
    the app name and bundle ID. These should match the Product Name and bundle ID
    specified in the Player Settings of the Unity Editor. The list of bundle IDs is
    taken from the list of app IDs you added to the Provisioning Portal. If you added
    a wildcard app ID, you can select that and then the suffix of the specific bundle
    ID for the app you’re adding.'
  trans: '

    ![9781430248750_Fig11-10.jpg](img/9781430248750_Fig11-10.jpg)


    图 11-10. 创建启用脚本调试的开发构建


    远程调试在与 Xcode 交互时存在问题，包括断点后无法恢复运行，因此请先执行“构建并运行”将应用程序安装到测试设备上。在 Xcode 中单击“停止”以终止测试运行，然后手动在设备上重新启动应用程序（即像平常启动应用一样点击应用图标）。最后，在
    MonoDevelop 中执行“附加到进程”，但不要附加到 Unity 编辑器，而是附加到测试设备（图 11-11）。


    ![9781430248750_Fig11-11.jpg](img/9781430248750_Fig11-11.jpg)


    图 11-11. 将 MonoDevelop 调试器附加到 iOS 播放器


    当您对设备测试感到满意后，就可以将应用提交到 App Store 了。这不需要在 Unity 中进行任何更改；只需在 Xcode 中使用分发配置文件（而非开发配置文件）重新构建应用即可。但首先，您需要在
    iTunes Connect 中为应用创建一个 App Store 条目。在创建 iTunes Connect 条目之前，您需要准备好一些 App Store
    用图。


    ## 准备 App Store 用图


    您需要为 App Store 准备两种图形：应用图标和一组针对您所支持的所有设备的截图。iTunes Connect 在闲置一段时间后容易自动登出并丢失所有更改，因此不建议在登录状态下折腾创建图标和截图。


    ### 创建图标


    iTunes Connect 会要求提供一个 1024 × 1024 像素的应用图标（`.png` 或 `.jpeg` 格式），该图标将随 App Store
    中的应用描述一起显示。如果您在创建应用图标时早有规划，那直接使用即可。否则，您需要在进入 iTunes Connect 之前创建好它。


    理想情况下，您应该请专业图标设计师来创建图标，但如果资金和美术技能都不足，可以像我在紧急情况下所做的那样——从 Unity 编辑器的游戏视图中截取一张大图，并将其缩放到
    1024 × 1024。从大图缩小效果更好。将较小的现有图标放大通常效果不佳，Apple 也不鼓励这样做，尽管这种情况可能很常见，因为在不久之前，应用提交时上传的还是
    512 × 512 的图标。


    **注意** 如果 App Store 图标与设备上显示的任何应用图标不匹配，Apple 可能会拒绝该应用。因此，如果您为 App Store 创建了一个全新的
    1024 × 1024 图标，应在 Unity 的 Player Settings 中将其设置为默认图标。


    ### 截取屏幕截图


    iTunes Connect 还会要求您提供三种尺寸的截图：适配 iPhone 4（640 × 960 或 960 × 640）、iPhone 5（640
    × 1136 或 1136 × 640）和 iPad（768 × 1024 或 1024 × 768，新 iPad 则为以上尺寸的两倍）。前提是您在 Unity
    的 Player Settings 中选择了 iPhone + iPad 作为支持的硬件。如果只选择了 iPhone，则无需提供 iPad 截图；如果只选择了
    iPad，则只需提供 iPad 截图。


    截图有三种相当便捷的方法：使用 iOS 模拟器、通过 Xcode Organizer 窗口从设备截取，以及在设备上按按钮截取。


    使用 iOS 模拟器截图很简单。使用“编辑”菜单中的“截图”命令，截图将保存到桌面上。如果您的游戏在 iOS 模拟器受限的输入方式下运行不佳，使用模拟器可能不方便。但如果您没有
    iPhone 4、iPhone 5 系列以及 iPad，这是获取截图的一种方法。


    使用 Xcode 截图几乎同样简单。将设备连接到 Mac 后，在 Xcode Organizer 窗口中选择设备的“截图”面板（所有已连接设备都会显示绿色圆点）。


    然后在测试设备上运行游戏时，当看到喜欢的画面，点击右下角的“新建截图”按钮。截图将显示在“截图”面板中（图 11-12），您可以将任意截图从该处（左侧的小预览图或右侧的大图）拖到桌面上，以便轻松访问。


    ![9781430248750_Fig11-12.jpg](img/9781430248750_Fig11-12.jpg)


    图 11-12. 在 Xcode Organizer 中截取设备截图


    另外，如果您需要在 Finder 中访问这些截图，它们位于“资源库”![image](img/arrow.jpg)“应用程序支持”![image](img/arrow.jpg)“开发者”![image](img/arrow.jpg)“共享”![image](img/arrow.jpg)“截图”文件夹中。


    **提示** OS X 通常隐藏“资源库”文件夹。您可以通过打开“终端”应用程序并输入 `chflags nohidden ~/Library` 来取消隐藏。


    我最喜欢的截图方式是直接在设备上同时按下“主屏幕”按钮和“电源”按钮。截图会保存到设备的“照片”中，之后可以同步到 Mac 上的 iPhoto，并可在 Finder
    中访问。这种方法可以让我在任何地方（比如沙发上）悠闲地截图，而无需一直连接着 Mac。而且，在关键时刻快速截图，比试图抓住鼠标并迅速点击 Xcode Organizer
    中的“新建截图”按钮要容易得多。


    ## 在 iTunes Connect 中添加应用


    现在您已经准备好了图标和截图，可以开始在 iTunes Connect 中添加应用信息了。登录 `http://itunesconnect.apple.com/`，您会看到主菜单，如图
    11-13 所示。


    ![9781430248750_Fig11-13.jpg](img/9781430248750_Fig11-13.jpg)


    图 11-13. iTunes Connect 主菜单


    点击“管理您的应用”开始操作。现在您会看到已添加的应用列表以及一个“添加新应用”按钮。图 11-14 显示了我的 iTunes Connect 账户中的这个页面，列出了我的一些应用，每个应用都带有版本号和一个根据应用状态颜色编码的圆点。


    ![9781430248750_Fig11-14.jpg](img/9781430248750_Fig11-14.jpg)


    图 11-14. 在 iTunes Connect 中添加或管理应用


    绿色圆点表示应用已在 App Store 上线，红色表示被拒绝。黄色有多种含义，但通常表示应用尚未上传。对于已上线且有更新已提交或正在进行中的应用，会同时列出两种状态。当然，如果这是您的第一个应用，则不会列出任何应用。


    ### 选择应用类型


    点击“添加新应用”后，下一页（图 11-15）会要求您选择应用类型：适用于 App Store 的 iOS 应用或适用于 Mac App Store 的 Mac
    OS X 应用。


    ![9781430248750_Fig11-15.jpg](img/9781430248750_Fig11-15.jpg)


    图 11-15. 在 iTunes Connect 中选择新应用类型


    点击“iOS 应用”将弹出一系列网页，每个页面都有一个表格需要填写，单击“继续”按钮可进入下一页或下一个表格。


    ### 应用信息


    选择 iOS 作为应用类型后，您将看到一个用于输入应用名称和 Bundle ID 的页面。这些应与 Unity 编辑器 Player Settings 中指定的产品名称和
    Bundle ID 匹配。Bundle ID 列表取自您在 Provisioning Portal 中添加的应用 ID 列表。如果您添加了通配符应用 ID，可以选择该
    ID，然后输入您所添加应用的特定 Bundle ID 的后缀。

