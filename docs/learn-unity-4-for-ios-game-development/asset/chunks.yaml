    它们提供了大量可在同一 Unity 项目中共存的插件，所有 Xcode 修改均由 Unity 后处理器脚本执行，因此从 Unity 构建并运行（Build
    and Run）仍将正常工作，无需在 Xcode 中手动操作。例如，Asset Store 上提供的 Prime31 Etcetera 插件包含一系列杂项功能，包括通过一次函数调用访问
    iOS 照片库和设备相机，如下所示：


    ```

    EtceteraBinding.promptForPhoto(1.0);

    ```


    图 13-8 中的截图显示了在我的 Fugu Maze 应用中出现的提示（我使用照片选择器让玩家自定义迷宫墙壁纹理）。如果你想尝试一下，请从 App Store
    下载 Fugu Maze Free，或下载一个免费的 HyperBowl 球道（我使用照片选择器来自定义保龄球纹理）。


    ![9781430248750_Fig13-08.jpg](img/9781430248750_Fig13-08.jpg)


    图 13-8. iPad 上的 Prime31 Etcetera 插件照片选择器


    另一个提供额外设备输入的 Prime31 插件是 iCade 插件（仅在 Prime31 网站上提供）。iCade 是一种复古风格街机柜，通过蓝牙连接为 iOS
    设备提供摇杆输入。iCade 本质上模拟的是蓝牙键盘，因此任何使用 iCade 插件的代码都与键盘控制代码类似。如果我们在保龄球代码的`CalcForce`函数中添加
    iCade 控制代码，它看起来会像 列表 13-9 中的代码片段（此示例实际取自 HyperBowl）。


    列表 13-9. 使用 Prime31 iCade 插件向`CalcForce`添加的 iCade 代码


    ```

    var yinput:float = 0;

    if (iCadeBinding.state.JoystickUp) yinput = 1;

    if (iCadeBinding.state.JoystickDown) yinput = -1;

    var xinput:float = 0;

    if (iCadeBinding.state.JoystickLeft) xinput = 1;

    if (iCadeBinding.state.JoystickRight) xinput = -1;

    var deltatime:float = Time.deltaTime;

    forcey += iCadePowery*yinput/deltatime;

    forcex += iCadePowerx*xinput/deltatime;

    ```


    就像我们在检查四个不同按键是否被按下一样，我们正在检查摇杆是否向四个方向之一移动。摇杆的灵敏度并不比这更高。


    iCade 的产品信息位于 Ion Audio 网站：`http://www.ionaudio.com/products/details/icade`，而
    ThinkGeek 博客列出了一些兼容 iCade 的游戏（`http://www.thinkgee.com/product/e762/`）。如果你的设备能在
    iCade 上运行，请务必联系该博客，让你的应用被收录！


    # 第 14 章 Game Center：排行榜与成就


    现在我们已经拥有一个可玩的 iOS 游戏，是时候添加一些锦上添花的功能了。我们将从当前热门趋势——社交游戏开始，这至少包括将高分收集到全局*排行榜*上，并以*成就*奖励玩家。


    幸运的是，Unity 提供了针对 Apple Game Center 社交游戏平台的脚本接口。作为 iOS 用户，你很可能玩过许多向 Game Center
    提交分数和成就的游戏，也许你已经使用过 iOS 自带的 Game Center 应用来查看游戏推荐、添加其他玩家为“好友”，或向这些朋友发起挑战。我们将通过为应用注册
    Game Center 排行榜和几个成就，并添加必要的脚本来将这些分数和成就提交到 Game Center，从而将 Fugu Bowl 加入到这些游戏的行列中。


    和前面几章一样，如果你中途加入，可以从`http://learnunity4.com/`下载并打开本章的 Unity 项目，但请注意该网站上的项目不包含来自
    Standard Assets 或 Asset Store 的任何资源包。不过就本章而言，该项目已准备就绪，可以运行并演示其与 Game Center 的集成。


    到目前为止，对 Fugu Bowl 的所有 iOS 修改都可以使用 Unity Remote 或 iOS 模拟器进行测试，并且不需要 Apple Developer
    会员资格。但这种免费体验到此为止，因为将 Game Center 功能集成到应用中需要在 iTunes Connect 上为应用配置 Game Center。如果此时你还没有
    Apple Developer 会员资格，你可以先通读本章和下一章（下一章涉及 iAd，也需要在 iTunes Connect 上进行一些设置），等准备就绪后再回来操作。


    ## 在 iTunes Connect 上设置 Game Center


    要在 iTunes Connect 中为保龄球游戏设置 Game Center，首先需要将应用添加到 iTunes Connect，重复我们在 Angry
    Bots 演示中演练过的步骤。假设你已是注册的 Apple Developer，请访问`http://itunesconnect.apple.com/`，点击“管理应用”（Manage
    Apps），然后添加 Fuga Bowl（记住提前准备一些截图，同样按照我们在 Angry Bots 中演练的步骤进行）。对于 App Store 图标，请使用我们在
    Player Settings 中设置为应用图标的同一个`Icon1024.jpg`文件。当然，你需要选择你自己的应用标识符。完成后，点击你刚创建的应用的“查看详情”（View
    Details）以查看应用信息页面（图 14-1）。


    ![9781430248750_Fig14-01.jpg](img/9781430248750_Fig14-01.jpg)


    图 14-1. iTunes Connect 中应用信息页面的顶部


    在 iTunes Connect 中设置好 Fugu Bowl 后，点击应用信息页面右上角的“管理 Game Center”（Manage Game Center）按钮，调出该应用的
    Game Center 管理页面。


    ### 添加排行榜


    Game Center 管理页面有三个功能：它允许你将应用移入一个 Game Center 群组，管理此游戏的排行榜，以及管理此游戏的成就（图 14-2 显示了页面顶部和前两个选项，成就位于下方）。


    ![9781430248750_Fig14-02.jpg](img/9781430248750_Fig14-02.jpg)


    图 14-2. iTunes Connect 中管理 Game Center 页面的顶部


    将应用放入 Game Center 群组允许该应用与其他应用共享排行榜和成就。例如，HyperBowl 有六条保龄球道，每条都有其自己的排行榜。每条球道也可作为免费的广告支持应用提供。通过使用
    Game Center 群组，同一个排行榜在免费球道和其对应的完整付费应用之间共享。因此，在免费 HyperBowl Classic 球道中获得高分和一些成就的玩家在购买完整游戏后仍然可以看到该分数和那些成就，而从开发者的角度来看，这很好地增加了排行榜中显示的玩家人数。由于我们目前只处理一个游戏，所以无需担心群组问题（你可以在以后随时将应用移入群组）。


    ### 创建单个排行榜


    通过点击“添加排行榜”（Add Leaderboard）按钮创建一个新排行榜。这将打开一个窗口，提供创建“单个排行榜”（Single Leaderboard）或“组合排行榜”（Combined
    Leaderboard）的选项（图 14-3）。组合排行榜合并了来自多个排行榜的结果。再次以 HyperBowl 为例，该游戏的组合排行榜列出了来自六条球道排行榜的高分。


    ![9781430248750_Fig14-03.jpg](img/9781430248750_Fig14-03.jpg)


    图 14-3. 在 iTunes Connect 中选择排行榜类型


    你可以在需要时稍后添加组合排行榜。实际上，图 14-3 显示“组合排行榜”选项是灰显的，直到你实际拥有可以组合的排行榜。因此，现在只需选择“单个排行榜”，这将带你进入一个页面，你可以在其中填写排行榜信息（图
    14-4）。

