    Be the Ball


    The Ball control works pretty well at this point, but the Main Camera just sits
    there while the Ball rolls off into the distance. This is a glaring deficiency,
    as any decent 3D game has some kind of camera movement. In HyperBowl, the Main
    Camera follows the ball as you roll, but always facing the same direction (toward
    the pins). It turns out Unity has a Camera follow script in Standard Assets. The
    Scripts package was already imported from Standard Assets in [Chapter 3](#9781430248750_Ch03.xhtml)
    to obtain the `MouseOrbit` script. The follow script is also located in the Camera
    Scripts folder of the Scripts package and called `SmoothFollow` ([Figure 6-30](#9781430248750_Ch06.xhtml#Fig30)).


    ![9781430248750_Fig06-30.jpg](images/9781430248750_Fig06-30.jpg)


    [Figure 6-30](#9781430248750_Ch06.xhtml#_Fig30). The Camera scripts in Standard
    Assets


    Drag the `SmoothFollow` script from the Project View onto the Main Camera in the
    Hierarchy View. Then select the Main Camera in the Hierarchy View so you can edit
    the `SmoothFollow` script properties in the Inspector View ([Figure 6-31](#9781430248750_Ch06.xhtml#Fig31)).


    ![9781430248750_Fig06-31.jpg](images/9781430248750_Fig06-31.jpg)


    [Figure 6-31](#9781430248750_Ch06.xhtml#_Fig31). The Inspector View of the Main
    Camera with the SmoothFollow script


    The Main Camera should follow the Ball, so drag the Ball GameObject from the Hierarchy
    View into the `SmoothFollow` script’s Target field in the Inspector View.


    As for the other `SmoothFollow` properties, set the Distance to 2, which will
    leave the Main Camera trailing 2 meter behind the Ball, and Height to 1, so the
    Camera stays 1 meter above the Ball instead of following right behind it. Height
    Damping of 2 allows the Main Camera to spring up and down a bit while following
    the Ball’s height, and a Rotation Damping of 0 ensures the Main Camera will always
    stay behind the Ball and not swing around to the left or right.


    Now click Play, and as you roll around, you’re rolling and following!


    Explore Further


    Now we have the beginnings of real gameplay. It’s not a complete bowling game,
    yet, but it has physics (a ball rolling on a floor), interactive control (pushing
    the ball), and camera movement (following the ball). Each of those features are
    rich topics in game development, but in particular we’ll be digging deeper into
    physics in the next chapter with the addition bowling pins and collision-based
    sound effects. Then the game will look a lot more like a bowling game!


