- fmt: 'Another way to incorporate a Skybox into a scene is to add a `Skybox` Component
    to the Main Camera and assign the Skybox Material to that Component. That Skybox
    would override any Skybox assigned in the Render Settings. The only reason to
    use a `Skybox` Component is if you have multiple Cameras that have different Skyboxes.


    ### Add a Flare


    There’s an obvious analogy between Unity Cameras and, well, real cameras. That
    analogy can be stretched with the addition of Flares, which simulate lens flares,
    which are actually technical imperfections in camera lenses but used as effects
    by filmmakers (you may have seen quite a few, for example, in *Firefly* and J.
    J. Abrams’s *Star Trek*).


    #### Import Flares


    As with Skyboxes, Unity provides some built-in Flares in Standard Assets. Go to
    the `Assets` menu under `Import Package` submenu and choose `Light Flares` ([Figure
    3-33](#9781430248750_Ch03.xhtml#Fig33)).


    ![9781430248750_Fig03-33.jpg](images/9781430248750_Fig03-33.jpg)


    [Figure 3-33](#9781430248750_Ch03.xhtml#_Fig33). The `Assets` menu item for importing
    Flares


    The package import window ([Figure 3-34](#9781430248750_Ch03.xhtml#Fig34)) reveals
    each Flare file has a `.flare` extension and contains a flare Material and a texture
    (notice that Unity conveniently supports `.psd` files for textures).


    ![9781430248750_Fig03-34.jpg](images/9781430248750_Fig03-34.jpg)


    [Figure 3-34](#9781430248750_Ch03.xhtml#_Fig34). Flares in Standard Assets


    Once the package is imported, the Flares show up in the Project View, represented
    by icons that resemble lens flares ([Figure 3-35](#9781430248750_Ch03.xhtml#Fig35)).


    ![9781430248750_Fig03-35.jpg](images/9781430248750_Fig03-35.jpg)


    [Figure 3-35](#9781430248750_Ch03.xhtml#_Fig35). The Project View of Flares from
    Standard Assets


    #### Apply the Flare


    Let’s use the `50-mm Zoom` Flare (that happens to be one of my favorites as it
    stretches farther along the Flare direction than the others). Drag that Flare
    into the Point Light’s `Flare` field ([Figure 3-36](#9781430248750_Ch03.xhtml#Fig36)).


    ![9781430248750_Fig03-36.jpg](images/9781430248750_Fig03-36.jpg)


    [Figure 3-36](#9781430248750_Ch03.xhtml#_Fig36). The Point Light with a Flare
    assigned


    Now you can see the Flare in the Scene View emanating from the same position as
    the Point Light, and it looks even better when you click Play and orbit the Camera
    around the Cube ([Figure 3-37](#9781430248750_Ch03.xhtml#Fig37)). It’s a very
    cool effect!


    ![9781430248750_Fig03-37.jpg](images/9781430248750_Fig03-37.jpg)


    [Figure 3-37](#9781430248750_Ch03.xhtml#_Fig37). The Game View with a Flare


    A more flexible way to incorporate a Flare into the scene is to create a `GameObject`
    with a `LensFlare` Component and assign a Flare to that Component. This method
    allows placement and alignment of a Flare independent of any Light and provides
    additional brightness and color adjustment of the Flare.


    ### Textures


    Our scene is beginning to look pretty good, now that we have a Skybox and a Light
    with a halo and Flare, but the Cube still looks drab. It’s really the only thing
    left that doesn’t have a texture, but that is easily fixed!


    #### Import a Texture


    Just about any image file (`.jpeg`, `.png`, `.tiff`, `.psd`) on your Mac can be
    imported as a texture by invoking the `Import Asset` command in the `Assets` menu
    ([Figure 3-38](#9781430248750_Ch03.xhtml#Fig38)) and selecting the image file
    in the resulting chooser.


    ![9781430248750_Fig03-38.jpg](images/9781430248750_Fig03-38.jpg)


    [Figure 3-38](#9781430248750_Ch03.xhtml#_Fig38). Importing a new asset


    For this example, I’ve chosen a cat picture from my Photos directory, where it
    was stored by iPhoto. Feel free to use this file by downloading it from `http://learnunity4.com/`
    (it’s in this chapter’s project, under the `Textures` folder). But if you have
    any image on your Mac in one of the supported file formats, that will be fine.
    After importing the image file, the resulting texture will appear in the Project
    View ([Figure 3-39](#9781430248750_Ch03.xhtml#Fig39)).


    ![9781430248750_Fig03-39.jpg](images/9781430248750_Fig03-39.jpg)'
