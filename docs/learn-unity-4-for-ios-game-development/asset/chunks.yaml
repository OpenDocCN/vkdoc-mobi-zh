    Scores in FuguPause.js    ``` function ShowPauseMenu() {        BeginPage(150,300);
           if (GUILayout.Button ("Play")) {                UnPauseGame();        }
            if (GUILayout.Button ("Options")) {                currentPage = Page.Options;
           }         if (GUILayout.Button ("Credits")) {                currentPage
    = Page.Credits;        } #if UNITY_IPHONE        if (GUILayout.Button ("High Scores"))
    {                Social.ShowLeaderboardUI();        }        if (GUILayout.Button
    ("Achievements")) {                Social.ShowAchievementsUI();        } #endif
    #if !UNITY_IPHONE && !UNITY_WEBPLAYER         if (GUILayout.Button ("Quit")) {
                   Application.Quit();        } #endif         EndPage(); } ```    The
    code for those two buttons are wrapped with `#if UNITY_IPHONE`, so they will only
    appear on iOS builds. They’re labeled High Scores and Achievements ([Figure 14-18](#9781430248750_Ch14.xhtml#Fig18)).    ![9781430248750_Fig14-18.jpg](images/9781430248750_Fig14-18.jpg)    [Figure
    14-18](#9781430248750_Ch14.xhtml#_Fig18).'
  trans: "\n# FuguGameCenter 集成\n\n完整的 `FuguGameCenter` 脚本可在本章项目的 [`learnunity4.com/`](http://learnunity4.com/)\
    \ 中获取。\n\n## 附加脚本\n\n由于 Game Center 的初始化是在 `FuguGameCenter.js` 的 `Start` 回调中进行的，因此必须将该脚本附加到场景中的某个\
    \ `GameObject` 上。请确保已打开保龄球场景，创建一个空 `GameObject`，将其命名为 `GameCenter`，然后将 `FuguGameCenter`\
    \ 脚本拖放到该对象上。该脚本只有一个可以在检视面板中调整的属性，即是否显示 iOS 5 风格的成就横幅（图 14-14）。\n\n![9781430248750_Fig14-14.jpg](img/9781430248750_Fig14-14.jpg)\n\
    \n图 14-14 场景中的 `FuguGameCenter` 脚本\n\n你也可以将 `FuguGameCenter` 脚本附加到启动场景中的某个 `GameObject`\
    \ 上，因为无论该脚本是否附加到任何场景中，其中定义的静态函数都可以被调用。将脚本放在启动场景中的好处是可以更早地初始化 Game Center，但如果 `FuguGameCenter`\
    \ 脚本与将要调用它的脚本（本例中为 `FuguBowl` 脚本）位于同一场景中，则会更清晰易懂。\n\n## 集成游戏\n\n尽管 `FuguGameCenter`\
    \ 脚本负责处理 Game Center 的初始化，并提供了报告分数和成就的静态函数，但你仍然需要让 `FuguBowl` 脚本去调用这些静态函数。幸运的是，这部分非常简单。\n\
    \n### 提交成就\n\n到目前为止，我们已经设置了两个成就：一个用于补中，另一个用于全中。现在游戏需要在发生补中和全中时进行报告（至少是第一次）。这正是将游戏控制器组织为状态机所带来的巨大优势。游戏中已经存在补中状态和全中状态，因此我们只需在其中添加对\
    \ `FuguGameCenter.Achievement` 函数的调用即可（代码清单 14-4）。\n\n代码清单 14-4 在 `FuguBowl.js`\
    \ 中提交成就\n\n```javascript\nvar spareAchievementID:String = \"com.technicat.fugubowl.spare\"\
    ;\nvar strikeAchievementID:String = \"com.technicat.fugubowl.strike\";\n\nfunction\
    \ StateSpare() {\n       FuguGameCenter.Achievement(spareAchievementID,100);\n\
    \       state=\"StateNextBall\";\n}\n\nfunction StateStrike() {\n       FuguGameCenter.Achievement(strikeAchievementID,100);\n\
    \       state = \"StateNextBall\";\n}\n```\n\n不要硬编码传递给 `FuguGameCenter.Achievement`\
    \ 的成就 ID（因为你的成就 ID 很可能与我的不同），而是为补中和全中声明公共变量，以便你可以在检视面板中自定义它们。\n\n### 提交分数\n\n\
    提交最终游戏分数与提交成就类似。我们已经在游戏结束状态使用 `Debug.Log` 打印了最终分数，因此这里很自然地可以提交最终分数给 Game Center（代码清单\
    \ 14-5）。\n\n代码清单 14-5 在 `FuguBowl.js` 中提交游戏分数\n\n```javascript\nvar leaderboardID:String\
    \ = \"com.technicat.fugubowl.highscore\";\n\nfunction StateGameOver() {\n    \
    \   Debug.Log(\"Final Score: \"+player.GetScore(9));\n       FuguGameCenter.Score(leaderboardID,player.GetScore(9));\n\
    \       yield WaitForSeconds(gameOverTime);\n       state=\"StateNewGame\";\n\
    }\n```\n\n同样，排行榜 ID 被声明为一个公共变量，因此可以在检视面板中自定义（图 14-15）。\n\n![9781430248750_Fig14-15.jpg](img/9781430248750_Fig14-15.jpg)\n\
    \n图 14-15 `FuguBowl` 脚本中自定义的 Game Center ID\n\n这对我们的游戏控制器代码来说只是一个很小的改动，仅增加了两行代码（而且本可以合并为一行），所以我就不再列出整个\
    \ `FuguBowl` 脚本了，但修改后的脚本当然可以在本章项目的 `http://learnunity4.com/` 中找到。\n\n## 测试游戏\n\
    \n在应用程序发布到 App Store 之前，成就和排行榜仅存在于 Game Center 沙箱中。沙箱本质上是 Game Center 的另一个平行宇宙，拥有自己的用户\
    \ ID、排行榜和成就数据。当一个正在开发中的应用程序（尚未获得 App Store 批准的版本）尝试连接到 Game Center 时，系统会提示玩家登录或创建一个沙箱账户。外部世界将看不到你在测试会话中获得的任何分数和成就，因为它们只记录在沙箱中。\n\
    \n**提示**：如果你似乎卡在了 Game Center 的沙箱版本或非沙箱版本中，请尝试打开 iOS 的 Game Center 应用，然后退出登录（点击你的\
    \ Apple ID）。\n\n当你在 iOS 模拟器或设备上（而非编辑器内）构建并运行 Fugu Bowl，并完成一整个游戏后，你应该能在排行榜上看到一个分数，并且如果你打出了全中或补中，最多还能看到两个成就。此时，Fugu\
    \ Bowl 应该会出现在 Game Center 应用中（图 14-16），当你点击它时，你将看到已提交的分数和成就（图 14-17）。\n\n![9781430248750_Fig14-16.jpg](img/9781430248750_Fig14-16.jpg)\n\
    \n图 14-16 Fugu Bowl 在 Game Center 沙箱版本中列出\n\n![9781430248750_Fig14-17.jpg](img/9781430248750_Fig14-17.jpg)\n\
    \n图 14-17 Game Center 沙箱中的测试结果\n\n分数和成就并不总是能可靠或及时地在 Game Center 中显示，尤其是在沙箱中测试时，因此请检查\
    \ Xcode 的调试区域，确认 Game Center 操作是否成功（记住，我们在所有 `FuguGameCenter` 函数中都添加了日志功能）。\n\n\
    ## 在游戏内显示 Game Center\n\n尽管 Game Center 应用的成就和排行榜界面看起来相当不错，但保龄球游戏的玩家可能不会费心去查看\
    \ Game Center 应用，甚至可能根本不知道它的存在。理想情况下，玩家应该能够直接在游戏内查看排行榜和成就。因此，让我们在 `FuguPause`\
    \ 脚本的主暂停菜单中添加几个按钮来实现此目的（代码清单 14-6）。\n\n代码清单 14-6 在 `FuguPause.js` 中添加显示成就和最高分的按钮\n\
    \n```javascript\nfunction ShowPauseMenu() {\n       BeginPage(150,300);\n    \
    \   if (GUILayout.Button (\"Play\")) {\n               UnPauseGame();\n      \
    \ }\n        if (GUILayout.Button (\"Options\")) {\n               currentPage\
    \ = Page.Options;\n       }\n        if (GUILayout.Button (\"Credits\")) {\n \
    \              currentPage = Page.Credits;\n       }\n#if UNITY_IPHONE\n     \
    \  if (GUILayout.Button (\"High Scores\")) {\n               Social.ShowLeaderboardUI();\n\
    \       }\n       if (GUILayout.Button (\"Achievements\")) {\n               Social.ShowAchievementsUI();\n\
    \       }\n#endif\n#if !UNITY_IPHONE && !UNITY_WEBPLAYER\n        if (GUILayout.Button\
    \ (\"Quit\")) {\n               Application.Quit();\n       }\n#endif\n      \
    \  EndPage();\n}\n```\n\n这两个按钮的代码被包裹在 `#if UNITY_IPHONE` 中，因此它们只会在 iOS 构建版本中显示。按钮标签分别为“最高分”和“成就”（图\
    \ 14-18）。\n\n![9781430248750_Fig14-18.jpg](img/9781430248750_Fig14-18.jpg)\n\n\
    图 14-18\n"
- fmt: 'Pause menu with buttons for the leaderboard and achievements


    The `Social` class provides functions to query Game Center for leaderboard and
    achievements information that can be used to construct custom displays. But it’s
    easier to just call the functions `Social.ShowLeaderboardUI` and `Social.ShowAchievementsUI`
    to bring up the standard Game Center presentation of leaderboards and achievements,
    respectively. So the High Scores button calls `Social.ShowLeaderboardUI` and the
    `Achievements` button calls `Social.ShowAchievementsUI`.


    When you run Fugu Bowl and connect successfully to Game Center and tap one of
    the new Game Center buttons, a standard Game Center interface appears. [Figure
    14-19](#9781430248750_Ch14.xhtml#Fig19) shows the results of tapping on the Achievements
    button.


    ![9781430248750_Fig14-19.jpg](images/9781430248750_Fig14-19.jpg)


    [Figure 14-19](#9781430248750_Ch14.xhtml#_Fig19). In-game achievements displayed
    with `Social.ShowAchievementsUI`


    The display is similar to the one in the Game Center app but simpler. For example,
    the in-game display doesn’t need all the navigation buttons that switch its view
    to other portions of the Game Center app. Also, the iPad version of this display
    is much different because the iPad has a lot more screen space to work with.


    You might think we should have added wrapper functions for these two calls in
    `FuguGameCenter`, but these functions are so simple there’s no real need to. They
    don’t take success callback functions as arguments, and it’s not necessary to
    check `Social.localUser.authenticated` beforehand. In fact, it’s better not to,
    as both `Social.ShowLeaderboardUI` and `Social.ShowAchievementsUI` will provide
    a user-friendly alert to the player if there is no current Game Center login.


    As with the change to the game controller code, the enhanced pause menu only required
    a couple of additional lines and doesn’t warrant a complete relisting of `FuguPause.js`
    here. The modified script is in the project files for this chapter at `http://learnunity4.com/`.


    ## Explore Further


    This has been one of the more efficient scripting chapters. With just a few lines
    of code, our game is now connecting to Game Center, submitting achievements and
    scores, and displaying the achievements and the leaderboard from the pause menu!


    The bulk of the work was spent in the Game Center setup on iTunes Connect. Even
    there, designing the leaderboard and set of achievements for a bowling game is
    straightforward, since the rules and traditions are so well-defined. Chances are,
    if you design a new game, you’ll have to put some thought into what leaderboards
    and achievements you want in your game, and you should probably think about that
    early in the design process.


    ## Scripting Reference


    This chapter used the “Social” class almost exclusively to access the Game Center
    features used in this chapter. The Scripting Reference page for that class explains
    its role in encapsulating access to Game Center and potentially other social gaming
    platforms (although for now, Game Center is the only one).


    We made do with the minimum set of functions required to report scores and achievements
    and display the results: accessing `Social.localUser` to connect to Game Center,
    calling `Social.ReportProgress` and `Social.ReportScore` to submit achievements
    and scores, respectively, and calling `Social.ShowAchievementsUI` and `Social.ShowLeaderboardUI`
    to bring up the Game Center display for the player’s achievements and game’s leaderboards.
    The documentation for the `Social` class lists several other functions that allow
    finer-grained control, for example, to retrieve information from Game Center to
    populate a custom leaderboard display.


    We bypassed `Social` and accessed the `GameCenterPlatform` class directly to invoke
    its `showDefaultAchievementsCompletionBanner` function, enabling iOS 5-style achievement
    banners.


    The page for the `GameCenterPlatform` class explains what namespace it’s in and
    includes some notes on the Game Center Sandbox.


    ## iOS Developer Library


    The Game Center chapter of the iTunes Connect Developer Guide is the definitive
    source on setting up achievements and leaderboards. The Guide is available within
    the iOS Developer Library (available on `http://developer.apple.com/library/ios`
    or in the Xcode Organizer).


    The inner workings of Game Center are explained in the Game Center Programming
    Guide in the iOS Developer Library, under the “Networking and Internet” topic.
    The portion of the Game Center that can be integrated into apps, as opposed to
    the server portion operated by Apple, is actually called Game Kit and also features
    support for networked multiplayer gaming.


    ## Asset Store


    Game Center isn’t the only social gaming platform available for iOS. Many have
    come and gone (OpenFeint, Agon Online), but there are still some other options.
    Under its Services category, the Asset Store offers plug-ins for PlayHaven (`http://playhaven.com/`)
    and Swarm (`http://swarmconnect.com/`), both offering leaderboards, achievements,
    and other social gaming features. Another Game Center plugin, from Hippo Games,
    is listed under Scripting/Integration.


    Before Unity had built-in Game Center support, Prime31 Studios provided a Game
    Center plugin, which is still available at `http://prime31.com/` (but not on the
    Asset Store) and is an option for developers who need some features not provided
    by Unity. For example, the Prime31 plugin includes a function for issuing achievement
    challenges (a feature of iOS 6). Prime31 also offers a Game Kit plugin for multiplayer
    gaming support that is on the Asset Store.


    # Chapter 15: iAd: Banner Ads and Interstitial Ads


    Frankly, in these freemium days, it’s not easy to get a lot of people to pay for
    an app. So an alternative is to incorporate ads. iAd is not the only mobile ad
    product available, but it is the official ad service for iOS, paying developers
    70% of revenue, the same as the revenue share for paid app sales. And, conveniently,
    Unity has scripting support for iAd. In this chapter we’ll incorporate the two
    ad types offered by iAd—banner ads and interstitial (full-screen) ads—into our
    bowling game.


    The project project for this chapter on `http://learnunity4.com/` includes the
    iAd scripts developed in this chapter and is sufficient to demonstrate iAd functionality.
    However, even if you start with the that project to avoid adding the scripts by
    hand, you’ll still need to enable iAd in iTunes Connect.


    ## iTunes Connect


    As with Game Center, you need to enable iAd for our app on iTunes Connect in addition
    to calling Unity’s iAd functions from scripts. Besides the Manage Apps page, iTunes
    Connect has two other pages relevant to iAd: the Contract, Banking and Taxes page
    and the iAd Network page ([Figure 15-1](#9781430248750_Ch15.xhtml#Fig1)).


    ![9781430248750_Fig15-01.jpg](images/9781430248750_Fig15-01.jpg)


    [Figure 15-1](#9781430248750_Ch15.xhtml#_Fig1). The iAd-related pages on iTunes
    Connect


    ### Sign the Contract


    The first page you need to visit is the Contracts, Banking and Taxes page, so
    you can agree to Apple’s iAd contract, in the same way you had to agree to the
    paid sales contract to start charging for apps.


    Once the iAd contract has been processed, as shown in [Figure 15-2](#9781430248750_Ch15.xhtml#Fig2),
    you’re ready to enable iAd for individual apps.


    ![9781430248750_Fig15-02.jpg](images/9781430248750_Fig15-02.jpg)


    [Figure 15-2](#9781430248750_Ch15.xhtml#_Fig2). A completed iAd Network contract
    listed on iTunes Connect


    ### Enable iAd


    Just as you did with Game Center, enable iAd for Fugu Bowl by going to the Manage
    Apps page in iTunes Connect, selecting Fugu Bowl, and visiting its App Information
    page.'
