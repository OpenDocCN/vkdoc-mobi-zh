- fmt: '# By the same token, you should fill in the problem description with a detailed
    enough explanation that Unity support would know how to replicate the undesired
    behavior and understand why it’s undesired. Basically, you want to avoid responses
    in the mode of “We can’t reproduce the problem” and “This is not a bug. It’s by
    design.”


    Shortly after submitting a bug report, you should receive an e-mail confirmation
    from Unity Technologies with a case number and a link to a copy of the report
    in the Unity bug database, which you can check to see the status of the bug.


    ## Check for Updates


    If you’re lucky, your bug report will result in a fix. And if you’re really lucky,
    that fix will show up in the next Unity update. You can always check if there’s
    a new update by selecting the `Check for Updates` command from the `Window` menu
    on the menu bar. The resulting window will display whether or not an update is
    available ([Figure 1-16](#9781430248750_Ch01.xhtml#Fig16)).


    ![9781430248750_Fig01-16.jpg](images/9781430248750_Fig01-16.jpg)


    [Figure 1-16](#9781430248750_Ch01.xhtml#_Fig16). The Unity Editor Update Check


    Notice the version number displayed in [Figure 1-16](#9781430248750_Ch01.xhtml#Fig16)
    is Unity 4.1.2f1. The suffix represents the most granular releases, including
    emergency hot fixes. Out of some caution, Unity Technologies usually doesn’t make
    newly released updates immediately available to the Editor Update Check, so if
    you’re waiting anxiously for a bug-fix update, you can always check the Unity
    web site, too.


    ## Explore Further


    My favorite technical books, like Peter Van Der Linden’s *Just Java* (a very detailed
    but easygoing introduction to Java for nonprogrammers), provide a nice break at
    the end of each chapter by reciting an interesting anecdote, a bit of trivia,
    or some relevant history. Alas, I won’t be doing that in this book. However, I
    do find simple chapter summaries and recaps dull (I always skip them as a reader),
    and I feel one of the major challenges facing new Unity developers is that they
    need to get in the habit of finding Unity information on their own, and they need
    to know where to find that information, which isn’t always easy!


    Therefore, at the end of each chapter, and including this one, I’ll direct you
    to documentation and other resources related to the topics you just learned, so
    you’ll know where to find the definitive and comprehensive information sources
    and can take things further when you’ve finished this book. I’ll focus on the
    official Unity manuals and the Unity web site but also mention some third-party
    resources. So now that you have Unity installed, before putting it to use in this
    book, take a break and browse the web sites and reference documentation that you
    will surely be utilizing heavily from now on. It’s always a good idea to figure
    out where to find what you need, before you need it!


    ## iOS Development Requirements


    At the beginning of this chapter, I mentioned it’s a good idea to get the ball
    rolling on downloading Xcode and registering for Apple’s iOS Developer Program.


    Requirements for iOS development, including required hardware and details about
    the iOS Developer Program, are listed on Apple’s developer support page (`http://developer.apple.com/support`).


    Information about Xcode requirements and downloading Xcode can be found at `http://developer.apple.com/xcode`.


    ## The Unity Web Site


    Along with the growth of Unity features and platforms, the Unity web site (`http://unity3d.com/`)
    has grown, too. It’s all worth browsing, but in particular, for general information
    about Unity, check out the FAQ section on the Unity web site (`http://unity3d.com/unity/faq`).


    The license activation process and License Management window are documented on
    `http://unity3d.com/unity/activation`. This chapter mentioned the distinct Pro
    and non-Pro versions of Unity and Unity iOS, but the license comparison table
    at `http://unity3d.com/unity/licenses` provides a more comprehensive table of
    features and their availability for the various licenses. Many instructional videos
    are available on the Unity Video archive (`http://video.unity3d.com/`) and Unity
    has recently introduced a Learn tab on their web site for easy access to documentation
    and tutorials.


    ## Unity Manuals and References


    The top section of the Unity Help menu ([Figure 1-17](#9781430248750_Ch01.xhtml#Fig17))
    lists the official Unity documentation consisting of three documents: the Unity
    Manual, the Reference Manual, and the Scripting Reference. Although the Unity
    Manual doesn’t have much information on the installation and licensing procedure
    discussed in this chapter, the manual otherwise provides good general instruction
    and conceptual explanations on using Unity. The Reference Manual and Scripting
    Reference will become increasingly important as you create and script scenes throughout
    this book.


    ![9781430248750_Fig01-17.jpg](images/9781430248750_Fig01-17.jpg)


    [Figure 1-17](#9781430248750_Ch01.xhtml#_Fig17). The Help menu


    The Unity Help menu items bring up the locally installed copies of those manuals,
    but they are also available under the Learn tab of the Unity web site.


    ## The Unity Community


    The first three items in the middle of the Unity Help menu are links to the official
    Unity community sites. The forum (`http://forum.unity3d.com`) is where users can
    bring up just about anything related to Unity (the forum does have moderators,
    though).


    The Unity Answers site (`http://answers.unity3d.com/`) follows the format of Stack
    Exchange and provides some quality control over questions and answers. The Unity
    Feedback site (`http://feedback.unity3d.com`) allows users to post feature requests
    and vote on feature requests, whether they’re their own or posted by someone else.


    **Tip**   Although the bug type selector offers Feature Request as a Type of Bug,
    Unity encourages everyone to submit feature requests to their Feedback site.


    Welcome to the Unity community!


    ---


    # Chapter 2: A Unity Tour


    Now that you have Unity installed, it’s time to get acquainted with the Unity
    Editor. The Editor (I’ll use the terms Unity, Unity Editor, and Editor interchangeably,
    as long as the meaning is clear) is where you create, test, and build a game for
    one or more target platforms. The Editor operates on a single Unity project containing
    assets included in a game.


    This chapter will introduce the Unity Editor using the Angry Bots demo project
    that is installed with Unity. I won’t delve into the inner workings of Angry Bots
    here, but it’s a convenient ready-made project you can use to get acquainted with
    Unity, even to the point of building Angry Bots as an OS X app to get a feel for
    the build process. Hopefully, this will get you comfortable with Unity’s workflow,
    user interface, and various file types before learning how to create a new project
    from scratch in the next chapter.


    **Tip**   Filename extensions are hidden by default in OS X, but anyone performing
    any kind of development should be looking at complete filenames. To ensure extensions
    are displayed, go to the Advanced tab in the Finder Preferences window and check
    “Show all filename extensions.”


