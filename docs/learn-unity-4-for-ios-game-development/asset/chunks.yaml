- fmt: '# The Layer Menu for This GameObject


    The Layer menu for this GameObject is on the right. While names are used for description
    and tags for identification, layers are used to group GameObjects. You can think
    of these layers sort of like Photoshop layers. This Layer menu should not be confused
    with the Layers menu at the top right of the Editor window (they are unfortunately
    close to each other in the Default layout). The Layers menu at the top right controls
    which GameObjects are visible in the Scene View (it really should be located in
    the Scene View).


    # The Transform Component


    Like every other GameObject, the Main Camera has a Transform Component that specifies
    the position, rotation, and scale of the GameObject. Scale is meaningless for
    Cameras, but the position and rotation allow you to place and point the Camera.


    Click the little question mark icon on the top right of the Component. That will
    bring up the Reference Manual documentation for the Transform Component in a web
    browser window.


    **Tip** Every time you encounter a new Component, the first thing you should do
    is check the documentation.


    The Reference Manual page for each Component describes the properties of the Component
    and explains the usage of the Component. Each Reference Manual page also features
    a link to the corresponding Script Reference page for the Component, detailing
    how to access the Component from within a script.


    # The Camera Component


    The Camera Component is what makes this GameObject a Camera. To be perfectly precise,
    Main Camera is a GameObject that has a Component which specifically is a subclass
    of Component called `Camera`. But it’s convenient to say Main Camera is a Camera
    (since that is its function), and say Camera Component to make clear that we’re
    talking about the Component.


    Again, clicking on the question mark icon of this Component will bring up the
    corresponding Reference Manual page, listing the Camera Component properties.
    But I’ll go through them briefly here, in top-down order as they’re displayed
    in the Inspector View.


    ## Clear Flags


    The Clear Flags property specifies how the Camera initializes the color and depth
    buffers at the beginning of each rendering pass. The color buffer contains the
    pixels the Camera renders, and the depth buffer holds the distance from the Camera
    of each pixel (this is how it determines if a newly drawn pixel should replace
    the previous pixel at that location).


    - `Solid Color` indicates the color buffer will be cleared to the specified color,
    essentially using it as a background color, and the depth buffer will be cleared.

    - `Skybox` also clears the depth buffer and renders the specified Skybox textures
    in the background (defaulting to `Solid Color` if no Skybox is supplied).

    - `Depth Only` leaves the color buffer alone and only clears the depth buffer.
    This is useful when adding a Camera that renders after the Main Camera and over
    its results, e.g., to render a user interface or HUD (heads-up display) over the
    rendering of the game world. In that case, you don’t want the second Camera to
    clear the screen before rendering.


    ## Culling Mask


    This is where the usefulness of Layers becomes apparent. The `Culling Mask` specifies
    which Layers are rendered by the Camera. In other words, a GameObject will only
    be visible to the Camera if its Layer is included in the Camera’s `Culling Mask`.


    The default, `Everything`, corresponds to all Layers, but, for example, if you
    had an HUD Camera, you might define an HUD Layer for all your HUD GameObjects
    and set the `Culling Mask` for the HUD Camera to only render the HUD Layer. And
    then you would set the `Culling Mask` of the Main Camera to include everything
    except the HUD Layer.


    ## Projection


    By default, the Camera is set to use a perspective projection, which as I mentioned
    in describing the Scene View in the previous chapter, means objects are smaller
    as they recede from the Camera (the effect is called *foreshortening*). In this
    mode, the Camera has a viewing volume resembling a four-sided pyramid (not counting
    the base of the pyramid) emanating from the Camera position in the view direction.
    This viewing volume is called a *frustum* and is defined by a Field of View (FOV),
    near and far plane.


    The Field of View is analogous to the FOV of a real-world camera. The FOV is the
    vertical viewing angle, in degrees. The horizontal viewing angle is implicitly
    defined by the combination of the FOV and the aspect ratio of the Camera. The
    near and far planes specify how far the screen is in front of the Camera and how
    far away the base of the frustum is. Nothing outside the frustum is visible to
    the Camera.


    To get a better idea of how the frustum looks, take a look at the Scene View.
    [Figure 3-7](#9781430248750_Ch03.xhtml#Fig7) shows how the frustum of the Main
    Camera looks when you press the y-axis arrow on the Scene Gizmo, changing the
    vantage to a top-down view. Press the F key (shortcut for the Frame Selected command
    in the Edit menu) to center the Main Camera in the Scene View, then zoom out until
    you can see the entire frustum. You should also uncheck the `3D Gizmos` check
    box in the `Gizmos` menu so that the Camera icon doesn’t shrink to nothingness
    when you zoom out.


    ![9781430248750_Fig03-07.jpg](images/9781430248750_Fig03-07.jpg)


    [Figure 3-7](#9781430248750_Ch03.xhtml#_Fig7). The Camera frustum in the Scene
    View


    The Scene View also displays a Camera Preview in the lower right corner. This
    is what the Camera would render right now, which is also what the Game View would
    display right now (you can take a look at the Game View right now to confirm).
    There’s nothing visible in this scene yet, but this will be a handy feature later.


    Note that the frustum outline and the Camera Preview only display when the Camera
    is selected and the Camera Component in the Inspector View is open (every Component
    in the Inspector View can be opened or closed by clicking the little triangle
    in the upper left). This is generally true of any Component that has an extra
    graphic display in the Scene View. Opening and closing the Component in the Inspector
    View will toggle that display.


    The alternative to perspective is orthographic, which has no foreshortening and
    thus is appropriate for 2D games, isometric games user interfaces, and HUDs. The
    only Camera property specific to orthographic mode is the orthographic projection
    size, which is the half-height of the orthographic view in world units.


    ## Viewport


    The Viewport of `(0,0,1,1)` indicates the Camera covers the whole screen. The
    numbers are normalized screen coordinates, meaning the coordinates across the
    width and height of the screen range from 0 to 1. For a split screen or a window
    within the screen, you would have multiple Cameras, each with different viewports.
    `(0,0,1,.5)` covers half of the screen. However, Unity iOS doesn’t support viewports
    that don’t cover the full screen.


    ## Depth


    Depth is another property useful when there are multiple Cameras in the scene.
    During each rendering update, the Cameras will perform their rendering passes
    in the order of their depth values, lowest to highest. So if you had a second
    Camera for viewing an HUD, for example, you might specify that the Main Camera
    has a depth of 0 and the HUD Camera a depth of 1 to ensure the game world renders
    first and the game HUD renders on top of that.


    ## Rendering Path


    The `Rendering Path` determines how the scene is rendered. Each Camera can have
    its own `Rendering Path` or default to the one specified in the Player Settings.
    `Vertex Lit` is the simplest but fastest path, `Forward Rendering` supports more
    advanced graphics, and `Deferred` is the fanciest but slowest and not available
    in Unity iOS.


    ## Target Texture (Pro)'
