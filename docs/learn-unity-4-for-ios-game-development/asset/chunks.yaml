  trans: '

    # 脚本定义符号


    `Scripting Define Symbols` 允许你定义自己的预处理器定义，就像上一章 `FuguPause` 脚本中引用的 `UNITY_EDITOR`
    和 `UNITY_WEBPLAYER` 定义一样。例如，如果你有一些代码调用了仅适用于 Unity Pro 的某些函数，那么你可以将这些代码包裹在 `#if
    UNITY_PRO ... #endif` 中，然后在运行 Unity Pro 的项目的 `Scripting Define Symbols` 中添加 `UNITY_PRO`。


    可以使用分号作为分隔符来添加多个定义。如果你还有一个 `USE_ADS` 预处理器定义来控制广告是否显示，你可以在 `Scripting Define Symbols`
    字段中写入 `USE_ADS;UNITY_PRO`。


    # 优化设置


    一些 `Optimization`（优化）设置实际上与优化无关。`Api Compatibility Level`（不用在意 API 奇怪的字母大小写）指定了您所需的
    `.NET` API 的版本和范围。通常你不需要更改它。


    `AOT Compilation Options` 指的是在 Unity iOS 构建期间发生的提前编译（ahead-of-time compilation），这与即时（JIT）编译相对。这就是为什么
    Unity iOS 脚本中需要 `#pragma strict` 的原因。它为 AOT 编译器提供了足够的信息来完成其工作。


    ## SDK 版本


    `SDK Version` 有两个选项：`Device SDK`（设备 SDK）和 `Simulator SDK`（模拟器 SDK）。在下一章中会提到的，为测试设备或应用提交进行构建时，默认值
    `Device SDK` 是正确的选择，但在本章中，应选择 `Simulator SDK` 以便在 iOS 模拟器中运行我们的游戏。


    > **注意** `SDK Version` 这个属性名称用于区分模拟器和硬件构建，这有点奇怪，但它是旧版 Unity iOS 的遗留用法，当时需要指定随
    Xcode 安装的 iOS SDK。


    ## 目标 iOS 版本


    `Target iOS Version` 指定了应用可运行的最低 iOS 版本。保留其默认和最低值 iOS 4.0，可以最大化兼容设备的数量，从而增加潜在用户。然而，如果目标
    iOS SDK 版本低于 iOS 4.3，Unity 将会发出可能导致应用商店审核被拒的警告（图 10-21）。


    ![9781430248750_Fig10-21.jpg](img/9781430248750_Fig10-21.jpg)


    图 10-21. 提交时目标 SDK 版本低于 4.3 的警告


    这只是一个潜在的苹果拒绝问题，仅当你碰巧要更新一个已在 App Store 上架、并支持 ARMv6 处理器的应用时才会出现，因为 Unity 4 已放弃
    ARMv6 支持，仅支持更新的 ARMv7 系列。正如 Unity 警告所建议的，将目标版本设为 iOS 4.3 或更高是安全的，因为苹果也从 iOS 4.3
    开始放弃了 ARMv6 支持（这意味着他们也放弃了对早于 iPhone 3GS 的设备的支持）。


    > **提示** 当我第一次尝试向 App Store 提交仅支持 ARMv7 的更新时（2012 年），应用被拒了，最后，将目标版本设为 iOS 4.3
    或更高版本才避免了这个问题。此外，一旦仅支持 ARMv7 的更新在 App Store 上获得批准，我就能够再次将目标版本设为更早的 iOS 版本，因为我不再需要更新一个支持
    ARMv6 的应用了！


    ## 剥离级别、脚本调用优化和优化网格数据


    最后，`Stripping Level`（剥离级别）、`Script Call Optimization`（脚本调用优化）和 `Optimize Mesh
    Data`（优化网格数据）确实是优化设置，这些将在第 16 章与其他优化技术一同介绍。不过，简要地说，`Stripping Level` 是 Unity iOS
    Pro 的一个选项，用于移除未使用的代码（如果不走运，也可能移除正在使用的代码，这也是为什么它是可选的），`Script Call Optimization`
    通过消除异常处理（异常本质上是可被调用代码捕获的错误或“异常”情况）来加速脚本执行，而 `Optimize Mesh Data` 则移除未使用的网格数据（例如，使用无光照材质时不需要法线）。


    ## 玩家设置总结


    如你所见，`Player Settings` 中有许多选项会影响 Unity iOS 构建的外观和性能。更改 `Player Settings` 后，最好通过
    `File` 菜单中的 `Save Project` 或 `Save Scene`（此操作也会隐式执行 `Save Project`）来保存这些更改。虽然
    `Player Settings` 中的许多（如果不是大部分）设置在某些时候都很重要，但要让 Angry Bots 在 iOS 模拟器上运行，你唯一需要做的更改就是将
    `Device SDK` 设置为 `Simulator SDK`。


    # 使用 iOS 模拟器测试


    现在你已经安装了 Xcode，并将 `Device SDK` 设置为 `Simulator SDK`，你就可以在 iOS 模拟器上构建并运行 Angry Bots
    了。`File` 菜单中的 `Build and Run` 命令和 `Build Settings` 窗口中的 `Build and Run` 按钮都会执行
    `Build` 阶段，生成一个 Xcode 项目，然后执行 `Run` 阶段，在 Xcode 项目中调用构建和运行操作。通常情况下，这非常方便，但在使用 iOS
    模拟器时，如果你手动在 Xcode 中执行构建和运行，你将能更好地控制 iOS 模拟器。那么，让我们再次打开 `Build Settings` 窗口（从 `File`
    菜单），然后点击 `Build` 按钮。


    > **提示** 在执行构建之前，请在 `Build Settings` 窗口中检查是否包含了正确的场景集合。


    Unity 会弹出一个 `Save As` 窗口，提示你选择即将构建的 Xcode 项目的位置和文件名（图 10-22）。


    ![9781430248750_Fig10-22.jpg](img/9781430248750_Fig10-22.jpg)


    图 10-22. 构建提示：选择 Xcode 项目的位置和名称


    它通常默认指向 Unity 项目文件夹的顶层。让我们将这个 Xcode 项目命名为 `AngryIOS`。


    > **警告** 注意不要选择 `Assets` 文件夹内的构建目标位置，否则 Unity 会尝试将整个 Xcode 项目作为项目资源导入。


    如果这不是你第一次在此位置构建此项目，Unity 将检测到已存在同名 Xcode 项目，并询问你是要完全替换该项目还是追加项目更改（图 10-23）。


    ![9781430248750_Fig10-23.jpg](img/9781430248750_Fig10-23.jpg)


    图 10-23. 构建追加或替换对话框


    追加速度更快，但有时你需要一个全新的 Xcode 项目。例如，如果你更改了 `Player Settings` 中的 bundle ID，或者（绝对需要如此）升级了
    Unity 或 Xcode，你应该构建一个新的 Xcode 项目。


    > **提示** `File` 菜单中的 `Build and Run` 与 `Build Settings` 中的 `Build and Run` 按钮并不完全相同。`File`
    菜单中的命令会假定你要追加构建文件夹（如果已存在），并且不会询问你是追加还是替换它。我更喜欢坚持使用 `Build Settings` 窗口执行构建，这样我总能知道发生了什么。我之前就遇到过这种情况：我复制了一个项目，然后从
    `File` 菜单调用 `Build and Run`，结果它仍然构建到了原始位置！


    ## 执行构建


    无论如何，点击 `Build` 后，构建过程中会显示一个进度条（图 10-24）。与资源重新导入一样，对于大型项目，这可能需要一些时间，并且在构建期间编辑器将无响应。


    ![9781430248750_Fig10-24.jpg](img/9781430248750_Fig10-24.jpg)


    图 10-24. 构建过程中的进度指示器


    构建完成后，一个 Xcode 项目文件夹将出现在你指定的位置（图 10-25）。


    ![9781430248750_Fig10-25.jpg](img/9781430248750_Fig10-25.jpg)


    图 10-25. Unity iOS 构建生成的 Xcode 项目文件夹


    Xcode 项目文件名为 `Unity-iPhone.xcodeproj`，位于 Xcode 项目文件夹中。双击该文件可在 Xcode 中打开该项目（图 10-26）。

    '
- fmt: '![9781430248750_Fig10-26.jpg](images/9781430248750_Fig10-26.jpg)


    [Figure 10-26](#9781430248750_Ch10.xhtml#_Fig26). Xcode launched with a Unity
    iOS project


    Notice how `iPad 6.0 Simulator` is displayed at the top left of the Xcode window.
    That is a menu for selecting the Xcode scheme, which is a collection of build
    rules in Xcode. The other available scheme is `iPhone 6.0 Simulator` ([Figure
    10-27](#9781430248750_Ch10.xhtml#Fig27)).


    ![9781430248750_Fig10-27.jpg](images/9781430248750_Fig10-27.jpg)


    [Figure 10-27](#9781430248750_Ch10.xhtml#_Fig27). Selecting the iPad or iPhone
    simulator


    Performing a Build and Run from Unity would have launched the iOS Simulator automatically
    without first giving you a chance to choose between the iPad and iPhone simulators.
    For now, let’s stay with the iPad simulator and click the `Run` button at the
    top left of the Xcode window. The `Run` button is really a Build and Run button,
    as it compiles the project if necessary before attempting to run it. If successful,
    an iOS Simulator window matching the screen size of an iPad will appear, running
    Angry Bots ([Figure 10-28](#9781430248750_Ch10.xhtml#Fig28)).


    ![9781430248750_Fig10-28.jpg](images/9781430248750_Fig10-28.jpg)


    [Figure 10-28](#9781430248750_Ch10.xhtml#_Fig28). Angry Bots running in the iOS
    Simulator


    The iOS Simulator will interpret mouse input as touch-screen events, so you can
    click and drag on the virtual joysticks to play. In addition, the Hardware menu
    for the iOS Simulator simulates other device events ([Figure 10-29](#9781430248750_Ch10.xhtml#Fig29)).


    ![9781430248750_Fig10-29.jpg](images/9781430248750_Fig10-29.jpg)


    [Figure 10-29](#9781430248750_Ch10.xhtml#_Fig29). iOS Simulator options


    For example, the `Rotate Left` and `Rotate Right` commands simulate rotating the
    device orientation (try it out and see the autorotation in action), and invoking
    `Home` is the same as pressing the device `Home` button on a device, which will
    suspend or exit the app and display the Home screen of the device. The app icon
    should be there and can be clicked (simulated tap) to restart the app. The Hardware
    menu also allows you to select different devices and iOS versions to simulate.


    Besides testing, the iOS Simulator is useful for taking screenshots, via the `Save
    Screen Shot` command in the Tools menu ([Figure 10-30](#9781430248750_Ch10.xhtml#Fig30)).
    Invoking that command immediately saves the screenshot to the Desktop. The App
    Store requires screenshots for the devices your app supports, so if you need an
    iPad screenshot, for example, and you don’t have an iPad, the iOS Simulator is
    a convenient tool for getting that screenshot.


    ![9781430248750_Fig10-30.jpg](images/9781430248750_Fig10-30.jpg)


    [Figure 10-30](#9781430248750_Ch10.xhtml#_Fig30). The `Save Screen Shot` command
    in the iOS Simulator


    The iOS Simulator window doesn’t have an operable close button, but the Simulator
    can be exited by the `Quit iOS Simulator` command in the iOS Simulator menu or
    its keyboard shortcut `Command+Q` ([Figure 10-31](#9781430248750_Ch10.xhtml#Fig31)).


    ![9781430248750_Fig10-31.jpg](images/9781430248750_Fig10-31.jpg)


    [Figure 10-31](#9781430248750_Ch10.xhtml#_Fig31). Exiting the iOS Simulator


    The iOS Simulator is fairly complete at simulating iOS features, including iAd
    and Game Center. So if you don’t have an iOS device available for testing, you
    can still get through the most of the rest of this book just using the iOS Simulator.


    ## Explore Further


    You might be experiencing deja vu, because we started with the Angry Bots demo
    as our first project and now we’ve returned. The difference of course is now we’re
    building the project for iOS. We’ve taken baby steps, changing the build target
    to iOS, testing in the Unity Editor with Unity Remote, and then building with
    Xcode to run in the iOS Simulator. The next step, building to run on a real iOS
    device, will take place in the next chapter, and then we’ll return to our regular
    programming, the bowling game. By then, hopefully, you’ll be comfortable with
    the build process and can concentrate on making the game an iOS game!


    ### Unity Manual


    Because the discussion has returned to Angry Bots, it’s fitting that the first
    relevant section in the Unity Manual is the “Unity Basics” section, specifically
    the page on “Publishing Builds.”


    The Unity Manual also includes several sections specifically about Unity iOS,
    although you may have to click the iPhone icon at the top of the manual to make
    that content visible. The section “Getting Started with iOS Development” is somewhat
    out of date as of this writing, but its page on the “Unity Remote” is still useful
    to explain how to set up and operate that app.


    More recent documentation on Unity iOS is listed in the “Advanced” section of
    the Unity Manual, including a page on the “Structure of a Unity Xcode Project.”
    It’s a good idea to become familiar with the files in the generated Xcode project,
    but you won’t be messing with the Xcode files generated by Unity, except to enable
    the built-in profiler when you get to [Chapter 16](#9781430248750_Ch16.xhtml).


    ### Reference Manual


    Most of the work in getting Angry Bots to build consisted of filling in appropriate
    values in the Player Settings. This chapter provided a cursory overview of the
    iOS-specific settings, and only the Default Orientation and Device SDK settings
    are important for running in the iOS Simulator, but the “Player Settings” page
    in the Reference Manual details each of the individual cross-platform and iOS-specific
    Player Settings, along with the settings for other platforms.


    ### iOS Developer Library


    Download links and documentation for Xcode are available on the Xcode page at
    the Apple Developer site (`http://developer.apple.com/xcode`). One of the great
    things about using Unity for iOS development is that you can avoid needing to
    know much about Xcode and Objective-C. But still, learning your way around Xcode
    and understanding Objective-C code can only help.


    In addition to the Xcode documentation you can find under its Help menu, there
    are links to developer documentation from the Xcode web site `http://developer.apple.com/xcode`.
    There are many other articles listed under the Xcode topic, and many are also
    available in the Xcode Help menu, including the Xcode User Guide and Xcode Basics
    Help.


    The iOS Developer Library Lists Xcode under Topics, and most of the relevant “IDE”
    section of the Xcode topic can be found in the iOS Simulator User Guide. The guide
    is extensive, featuring multiple chapters that expand on the introduction in this
    book to the iOS Simulator, explaining how to launch the simulator from Xcode,
    how to operate the simulator, and how to invoke simulated device input.


    Although, Unity does a lot to shield you from working in Xcode, and in this chapter
    you literally just had to click the `Run` button in Xcode to run the iOS Simulator,
    it’s a good idea to read up on the tool in preparation for the next chapter, where
    you’ll learn how to build and run our app for testing and build for submission
    to the App Store.


    ## Chapter 11


    Building for Real: Device Testing and App Submission


    Running an iOS version of Angry Bots turned out to be amazingly easy. It was just
    a matter of switching the build target to iOS, then immediately playing the game
    in the Editor using the Unity Remote app as the input device, or, to run the game
    in the iOS Simulator, performing a build with the Target SDK set to Simulator
    SDK in the Player Settings.'
