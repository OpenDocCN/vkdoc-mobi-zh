- fmt: '# 信息、警告和错误消息显示在控制台视图中


    信息、警告和错误消息显示在`Console View`（控制台视图）中。错误消息显示为红色，警告消息显示为黄色，信息消息显示为白色。从列表中选择一条消息，会在下方区域显示更详细的信息。此外，`Unity
    Editor`（Unity 编辑器）底部的单行区域会显示最新的`Console`消息，因此即使`Console`视图不可见，您也始终可以看到有消息被记录。


    **提示**：警告消息很容易被忽略，但忽略它们可能会带来风险。这些警告之所以存在，通常表明某些问题需要解决。如果您让警告不断累积，就难以在真正重要的警告出现时及时发现它们。


    控制台可能会很快变得杂乱。您可以通过`Console View`顶部的左侧三个按钮来管理这些杂乱信息。`Clear`（清除）切换按钮用于删除所有消息。`Collapse`（折叠）切换按钮用于合并相似的消息。`Clear
    on Play`（播放时清除）切换按钮会在编辑器进入播放模式时删除所有消息。


    `Error Pause`（错误暂停）按钮会使编辑器在遇到错误消息时暂停，具体来说，当脚本调用`Log.LogError`时。


    在编辑器中操作时，日志消息会记录到`Editor log`（编辑器日志）中，而从 Unity 构建的可执行文件生成的消息则会定向到`Player log`（播放器日志）。从视图菜单（点击`Console
    View`右上角的小图标）中选择`Open Player Log`（打开播放器日志）或`Open Editor Log`（打开编辑器日志），会以文本文件或在`Console`应用程序中打开这些日志（参见
    [图 2-48](#9781430248750_Ch02.xhtml#Fig48)）。


    ![9781430248750_Fig02-48.jpg](images/9781430248750_Fig02-48.jpg)


    [图 2-48](#9781430248750_Ch02.xhtml#_Fig48) Mac Console 应用程序中的 Unity 日志


    # 进一步探索


    本次 Unity 导览以及 Angry Bots 演示的试玩到此结束。从下一章开始，您将从零开始创建 Unity 项目，以学习游戏引擎的功能。但这不会是您最后一次见到
    Angry Bots，我们将在[第 10 章](#9781430248750_Ch10.xhtml)和[第 11 章](#9781430248750_Ch11.xhtml)中再次回到该项目，重复这一过程来介绍
    Unity iOS 开发。在此之前，从下一章开始，您将从头开始创建 Unity 项目，并探索通用的、大多是跨平台的 Unity 游戏引擎功能。


    从现在开始，有许多官方 Unity 资源可以扩展我将要涵盖的主题。


    ## Unity 手册


    如您所见，Unity 的用户界面非常丰富，我们几乎还远未覆盖其全部内容。现在是认真阅读 Unity 手册的好时机，无论是通过 Unity 编辑器内部（欢迎屏幕或帮助菜单），还是通过
    Unity 网站（`http://unity3d.com/`）上“文档”部分的“学习”选项卡。当您想查询某些内容或仅阅读关于 Unity 的知识而无需运行
    Unity 编辑器时，网页版非常方便。


    本章所涵盖的大部分内容都与 Unity 手册中“Unity 基础知识”部分的主题相匹配，特别是“学习界面”、“自定义工作区”、“发布构建”和“Unity 热键”等部分（尽管我认为更好的参考方法是直接查看菜单中列出的键盘快捷键）。


    我还提前涉及了 Unity 手册的“高级”部分，并谈到了 Unity 对版本控制的支持。Unity 手册中关于“在 Unity 中使用外部版本控制”的页面对此有更深入的介绍。


    ## 教程


    除了“文档”部分，Unity 网站的“学习”选项卡还包含一个“教程”部分，其中提供了一系列丰富的“编辑器入门”视频。顾名思义，这些视频介绍了 Unity 编辑器，事实上，这套视频涵盖了本章讨论的大部分内容，包括最重要视图（`Game
    View`（游戏视图）、`Scene View`（场景视图）、`Hierarchy View`（层级视图）、`Inspector View`（检视视图）和`Project
    View`（项目视图））的描述，甚至包括发布构建的过程。


    ## 版本控制


    虽然我仅在解释如何移除 meta 文件的背景下简短地讨论了版本控制，但该主题值得稍加深入讨论，因为 VCS 对软件开发至关重要（当您第一次丢失项目或无法回忆起哪个更改导致游戏出错时，您就会意识到这一点！）。如果您已经有偏好的
    VCS，您可能想将其与 Unity 一起使用；如果您尚未使用任何 VCS，那么您可能需要考虑使用它，至少是为了在需要回滚时保留项目的旧版本，并具备检查版本间差异的能力。


    在版本控制系统中，`Perforce` 是游戏工作室中流行的商业工具，而 `Subversion` (`svn`) 作为一种开源选项拥有悠久的历史。如今，像
    `Git` 和 `Mercurial` 这样的分布式版本控制系统正成为一种趋势。我在 `Bitbucket` (`http://bitbucket.org/`)
    上使用 `Mercurial` 管理我的内部项目，并在 `GitHub` 上发布公共项目，包括本书的项目 (`http://learnunity4.com/`)。


    说 Unity VCS 支持与具体产品无关，实际上是说 Unity 在 Unity 编辑器中并没有集成任何特定的版本控制系统（尽管在撰写本文时，`Perforce`
    和 `Subversion` 的集成正在进行中）。meta 文件以及面向 Unity Pro 用户的 YAML 场景文件，只是提供了与常用于源代码的文本导向型版本控制系统更好的兼容性。您仍然需要在
    Unity 外部自行运行 VCS 操作。顺便提一下，您可以在 `http://yaml.org/` 上找到关于 YAML 的更多信息。


    同时，我发现使用 GitHub 网站上提供的 Mac GitHub 应用程序以及 Bitbucket 网站上的 Sourcetree 应用程序非常方便。


    正如我在解释编辑器首选项中“版本控制模式”选项时提到的，Unity 还提供了一款专门为 Unity 设计的 VCS，称为 Unity Asset Server。它需要购买
    Unity 团队许可证。


    # 第三章 制作场景


    玩 Angry Bots 很有趣，但本书是关于用 Unity 制作游戏，而不是玩 Unity 游戏！终于，是时候开始游戏开发了。从一无所有开始，最终打造出一个可玩的游戏，这是一段漫长的旅程，而现在正是起点。在本章中，您将从
    Unity 编辑器中的一个空场景开始，并用 3D 环境的基本构建块来填充它：模型、纹理、灯光、天空盒和摄像机。


    游戏开发者（尤其是预算有限的开发者）面临的挑战之一是如何获取这些构建块。Unity 编辑器提供了一些基本的模型，任何图像都可以用作纹理（按照互联网的传统，我将提供一张我的猫的图片作为示例纹理）。并且，正如[第
    1 章](#9781430248750_Ch01.xhtml)中提到的，Unity 安装包中包含一组标准资源包，您可以随时将其导入到项目中。然而，仅靠这些资源所能达到的效果是有限的。


    幸运的是，Unity Technologies 的团队认识到了这一需求，并创建了 `Asset Store`（资源商店），这是一个 Unity 就绪资源的在线市场，其商店界面直接集成在
    Unity 编辑器中。事实证明，其中很多资源都是免费的，因此我们将利用这一点，将其中一些免费资源整合到本章创建的 Unity 项目中。'
  raw: 'Informational, warning, and error messages appear in the Console View. Errors
    are in red, warnings in yellow, and informational messages in white. Selecting
    a message from the list displays it with more detail in the lower area. Also,
    the single-line area at the bottom of the Unity Editor displays the most recent
    Console message, so you can always see that a message has been logged even if
    the Console view is not visible.


    **Tip**   Warning messages are easy to ignore, but you ignore them at your peril.
    They are there for a reason and usually indicate something has to be resolved.
    And if you let warnings accumulate, it’s difficult to notice when a really important
    warning shows up.


    The Console can get cluttered pretty quickly. You can manage that clutter with
    the leftmost three buttons on top of the Console View. The Clear toggle button
    removes all the messages. The Collapse toggle button combines similar messages.
    The Clear on Play toggle will remove all messages each time the Editor enters
    Play mode.


    The Error Pause button will cause the Editor to halt on an error message, specifically
    when a script calls a Log.LogError.


    While operating in the Editor, log messages end up in the Editor log, while messages
    generated from a Unity-built executable are directed to the Player log. Selecting
    Open Player Log or Open Editor Log from the view menu (click the little icon at
    the top right of the Console View) will bring up those logs, either in a text
    file or in the Console app ([Figure 2-48](#9781430248750_Ch02.xhtml#Fig48)).


    ![9781430248750_Fig02-48.jpg](images/9781430248750_Fig02-48.jpg)


    [Figure 2-48](#9781430248750_Ch02.xhtml#_Fig48). The Unity logs in the Mac Console
    app


    Explore Further


    We’ve come to the end of this Unity tour and our play time with Angry Bots demo.
    Beginning with the next chapter, you’ll be creating Unity projects from scratch
    to learn the game engine features. But this won’t be the last you’ll see of Angry
    Bots, as we’ll return to that project in [Chapters 10](#9781430248750_Ch10.xhtml)
    and [11](#9781430248750_Ch11.xhtml), repeating this process to introduce Unity
    iOS development. Until then, starting with the next chapter, you’ll be creating
    Unity projects from scratch and exploring general and mostly cross-platform Unity
    game engine features.


    And from this point on, there are plenty of official Unity resources that expand
    on the topics I will be covering.


    Unity Manual


    As you can see, there’s a lot of Unity user interface, and we’ve hardly covered
    it all. This is a good time to get serious about reading the Unity Manual, either
    from within the Unity Editor (the Welcome screen or the Help menu) or on the Unity
    web site (`http://unity3d.com/`) under the Learn tab in the “Documentation” section.
    The web version is pretty handy when you want to look something up or just read
    about Unity without having a Unity Editor running nearby.


    Most of what was covered in this chapter matches topics in the “Unity Basics”
    section of the Unity Manual, particular the sections on “Learning the Interface,”
    “Customizing Your Workspace,” “Publishing Builds,” and “Unity Hotkeys” (although
    I think a better reference is just to check the keyboard shortcuts listed in the
    menus).


    I did jump ahead into the “Advanced” section of the Unity Manual and touch on
    Unity’s support for version control. That’s covered more in depth with the Unity
    Manual’s page on “Using External Version Control with Unity.”


    Tutorials


    Besides the “Documentation” section, the Learn tab on the Unity web site also
    includes a “Tutorials” section that features an extensive set of Beginning Editor
    videos. As the name implies, these videos provide an introduction to the Unity
    Editor, and in fact the set of videos cover much of what was discussed in this
    chapter, including descriptions of the most important views (the Game View, Scene
    View, Hiearchy View, Inspector View and Project View) and even the process of
    publishing a build.


    Version Control


    Although I only discussed version control briefly, in the context of explaining
    how to remove meta files, that topic is worth a little more discussion, since
    a VCS is so important to software development (which you’ll realize the first
    time you lose your project or can’t remember what change you made that broke your
    game!). If you already have a favorite VCS, you may want to use it with Unity,
    and if you haven’t been using one, then you may want to consider it if only to
    keep old versions of your project around in case you need to roll back, with the
    ability to check differences between versions.


    Among version control systems, Perforce is a popular commercial tool used in game
    studios, and Subversion (svn) has a long history as an open source option. These
    days, distributed version control systems like Git and Mercurial are trending.
    I use Mercurial on Bitbucket (`http://bitbucket.org/`) for my internal projects
    and post public projects on GitHub, including the projects for this book (`http://learnunity4.com/`).


    To say Unity VCS support is product agnostic is really another way of saying Unity
    doesn’t have any particular version control system integrated into the Unity Editor
    (although Perforce and Subversion integration is in-progress at the time of this
    writing). The meta files, and YAML scene files for Unity Pro users, simply provide
    better compatibility with text-oriented version control systems that are commonly
    used for source code. You still have to run the VCS operations yourself outside
    of Unity. You can find out more about YAML, by the way, on `http://yaml.org/`


    In the meantime, I find it convenient to use the Mac GitHub app provided on the
    GitHub web site and similarly Sourcetree for Bitbucket, also available on that
    web site.


    And as I mentioned while explaining the options for Version Control Mode in the
    Editor Preferences, Unity also offers a VCS designed specifically for Unity called
    the Unity Asset Server. It requires the purchase of a Unity Team License.


    Chapter     3


    Making a Scene


    Playing Angry Bots was fun, but this book is about making games in Unity, not
    playing games in Unity! Finally, it’s time to get started in game development.
    It’s a long journey starting from nothing and ending up with a playable game,
    and this is the beginning. In this chapter, you’ll start with an empty scene in
    the Unity Editor and populate it with the basic building blocks of a 3D environment:
    models, textures, lights, a sky, and a camera.


    One of the challenges facing a game developer, especially one on a limited budget,
    is how to obtain these building blocks. The Unity Editor provides some primitive
    models, and any image can be used as a texture (in the tradition of the Internet,
    I’ll provide you a picture of my cat as a sample texture). And, as mentioned in
    [Chapter 1](#9781430248750_Ch01.xhtml), the Unity installation includes a set
    of Standard Assets that can be imported into your project at any time. All of
    that can only take you so far, though.


    Fortunately, the folks at Unity Technologies recognized this need and created
    the Asset Store, an online marketplace of Unity-ready assets with its storefront
    integrated directly into the Unity Editor. It turns out that a lot of these assets
    are free, so we’ll take advantage of that fact and incorporate some of these free
    assets into the Unity project created in this chapter.'
