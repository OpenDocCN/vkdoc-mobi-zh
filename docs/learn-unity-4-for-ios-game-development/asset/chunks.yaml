- fmt: 'Regardless of the graphics quality, you are now able to play Angry Bots on
    an iOS device, although you’re really still playing in the Editor and just using
    the device as a controller. The touchscreen input is sent back to the Unity Editor
    over Wi-Fi and received by the game running in Play mode, so you still have all
    the debugging features of the Unity Editor at your disposal during the test run.
    It’s the best of both worlds!


    ## Install Xcode


    At some point you have to leave the comforts of the Unity Editor and really start
    building for iOS. All iOS apps have to be built through Xcode, Apple’s official
    iOS development tool (and also their official OS X development tool), which is
    why a Unity iOS build first generates an Xcode project, which in turn is built
    by Xcode to create the app. Xcode is available free from the Apple Developer Site
    but conveniently also available on the Mac App Store. Search for `xcode` on the
    Mac App Store and click the Free button to download ([Figure 10-15](#9781430248750_Ch10.xhtml#Fig15)).


    ![9781430248750_Fig10-15.jpg](images/9781430248750_Fig10-15.jpg)


    [Figure 10-15](#9781430248750_Ch10.xhtml#_Fig15). Xcode on the Mac App Store


    After installation, you should see the Xcode application in your Applications
    folder. Now you’re ready to start performing iOS builds from Unity!


    ## Customize the Player Settings


    Unity iOS builds invariably require customization of the Player Settings in the
    Unity Editor (the Unity Player, as opposed the Unity Editor, is the deployed version
    of the Unity engine). Select `Player Settings` under the `Edit` menu, or click
    the `Player Settings` button in the Build window, and the `Player Settings` will
    show up in the Inspector View ([Figure 10-16](#9781430248750_Ch10.xhtml#Fig16)).


    ![9781430248750_Fig10-16.jpg](images/9781430248750_Fig10-16.jpg)


    [Figure 10-16](#9781430248750_Ch10.xhtml#_Fig16). Selecting the Player Settings


    The `Player Settings` are partitioned into Cross-Platform Settings at the top
    and Per-Platform Settings below. The only two Cross-Platform Settings that affect
    an iOS build are the Product Name and Default Icon, which provide the app name
    and icon, respectively, that appear on the device.


    The Company Name, Default Cursor, and Cursor Hotspot properties are only used
    in desktop and web player builds, although you might as well provide the appropriate
    Company Name or your name, just so it’s there in the project. If you’re wondering
    why the Cross-Platform Settings aren’t entirely cross-platform, keep in mind Unity
    started out supporting just the web and desktop platforms, iOS support came a
    few years later (and Android support, even later).


    Because we’re only interested in the iOS Player Settings now, click the Per-Platform
    Settings tab that somewhat resembles an iPhone to see the Settings for iOS ([Figure
    10-17](#9781430248750_Ch10.xhtml#Fig17)).


    ![9781430248750_Fig10-17.jpg](images/9781430248750_Fig10-17.jpg)


    [Figure 10-17](#9781430248750_Ch10.xhtml#_Fig17). Player Settings for iOS


    The `Player Settings` are plentiful, so they are organized into several foldouts:
    Resolution and Presentation, Icon, Splash Image, and the catch-all Other Settings.
    [Chapter 12](#9781430248750_Ch12.xhtml) is devoted to presentation issues, including
    the Icon and Splash Image settings, so for now, we’ll focus on the Resolution
    and Presentation and Other Settings.


    ### Resolution and Presentation


    Most of the Resolution and Presentation settings have reasonable defaults ([Figure
    10-18](#9781430248750_Ch10.xhtml#Fig18)), but I recommend always changing the
    Default Orientation from Landscape Left to Auto Rotation, since Apple requires
    iPad apps to autorotate, meaning the display is rotated automatically to stay
    upright. The other Default Orientation choices are Landscape Right, Portrait,
    or Portrait Upside Down.


    ![9781430248750_Fig10-18.jpg](images/9781430248750_Fig10-18.jpg)


    [Figure 10-18](#9781430248750_Ch10.xhtml#_Fig18). Resolution and Presentation
    in the Player Settings for iOS


    If Auto Rotation is selected, then the Allowed Orientations for Auto Rotation
    are displayed. Because Angry Bots is intended only to run in a landscape mode,
    select Landscape Left and Landscape Right. As a result, Angry Bots will flip between
    Landscape Left and Landscape Right as the device is turned around, but never to
    a portrait mode.


    The Use Animated Autorotation option specifies whether the display visibly rotates
    or just switches instantly. I always opt for the animated rotation because it
    looks cool. The status bar options specify whether the iOS status bar is visible
    when the app launches, and if visible, in what style. The 32-bit display buffer
    dictates the color resolution. If this option is not selected, then 16-bit color
    is used.


    **Note**   The 32-bit display buffer option is marked with an asterisk. Any setting
    marked with an asterisk is shared among other mobile platforms, namely Android.


    The Show Loading Indicator controls whether the iOS activity indicator, the little
    spinning graphic at the center of the screen, appears when the app launches. This
    setting is also covered among presentation options in [Chapter 12](#9781430248750_Ch12.xhtml).


    ### Other Settings


    It so happens that many important settings are collected under the generically
    titled Other Settings ([Figure 10-19](#9781430248750_Ch10.xhtml#Fig19)). The static
    and dynamic batching options under the Rendering settings are really optimization
    options, affecting whether and when Meshes are automatically combined for performance
    reasons. That will be discussed among optimization techniques in [Chapter 16](#9781430248750_Ch16.xhtml).


    ![9781430248750_Fig10-19.jpg](images/9781430248750_Fig10-19.jpg)


    [Figure 10-19](#9781430248750_Ch10.xhtml#_Fig19). Other Settings in the Player
    Settings for iOS


    There are two settings in the Identification section: the Bundle Identifier and
    the Bundle Version. They are not important for running in the iOS Simulator, but
    when it comes time for app submission, these settings must match the corresponding
    information for the app specified in iTunesConnect (covered as part of the app
    submission process in the next chapter).


    The bundle ID is a unique identifier for your app, typically expressed like a
    URL in reverse. For example, all of my apps have bundle IDs of the form `com.technicat.<appname>`,
    so I would change `com.unity.angryBots` to `com.technicat.angryBots`.


    The bundle version is the same app version number displayed for the app on the
    App Store. It’s usually formatted as two numbers, `<major>.<minor>`, or sometimes
    three, `<major>.<minor>.<revision>`. This number has to be incremented every time
    you submit an update for your app on the App Store.


    Under Configuration, most of the settings have reasonable defaults, but you do
    need to decide whether your app will run on iPhones, iPads, or both by selecting
    the Target Device. Most 3D apps generally run well on a variety of screen aspect
    ratios, at least better than 2D apps, but iPhones and iPod Touches have narrower
    screens than iPads. And sometimes, for business reasons, you might want to release
    an app only for the iPad or only for the iPhone.


    For Target Resolution, Native is usually what you want ([Figure 10-20](#9781430248750_Ch10.xhtml#Fig20)).
    It’s equivalent to Best Quality, while Best Performance specifies a lower screen
    resolution (not available on the iPhone 3GS and its iPod touch counterpart, as
    they have the lowest-resolution screens). The remaining options are fixed iPhone-only
    and iPad-only resolutions.


    ![9781430248750_Fig10-20.jpg](images/9781430248750_Fig10-20.jpg)


    [Figure 10-20](#9781430248750_Ch10.xhtml#_Fig20). The Target Resolution options
    in the Player Settings for iOS'
