  trans: '

    图 4-3. 新脚本的项目视图


    **为脚本命名**


    对于脚本来说，`New Behaviour` 并不是一个有意义的名称，因此首要任务是给它取一个新名字。一个显而易见的选择是 `Rotate`，因为该脚本的最终目的是旋转方块。但使用过于通用的名称可能会导致冲突（Unity
    会报错）：即使两个同名脚本位于不同文件夹中，也会发生冲突。这是因为每个脚本都会定义一个新类（具体来说是 `MonoBehaviour` 的子类），而你不能拥有两个同名类。


    一种解决方法是使用标准前缀为每个脚本命名（这很像 Objective-C 类以 `NS` 开头，回溯到 OS X 的 NextStep 起源）。这是第三方
    Unity 用户界面包常用的技巧。如果每个人都把自己的按钮类命名为 `Button`，它们就无法共存！


    **注意**   C# 脚本可以选择将类划分到命名空间以避免名称冲突。本书几乎全程使用 JavaScript，但在第 17 章中提供了 C# 脚本和命名空间的示例。


    有时，如果脚本专属于某个游戏，我会使用游戏名称作为脚本名称前缀（在 HyperBowl 中，我有许多以 `Hyper` 开头的脚本）。不过，我通常将脚本名称前缀设为
    `Fugu`，对应我的游戏品牌 Fugu Games。本书将沿用这一惯例，因此请将新脚本命名为 `FuguRotate`（图 4-3）。当然，通常你可以自由选择自己的脚本命名规范。


    **脚本的结构**


    如果在项目视图中选择 `FuguRotate` 脚本，检查器视图会显示其源代码（至少是能够容纳在检查器视图显示范围内的代码）（图 4-4）。


    ![9781430248750_Fig04-04.jpg](img/9781430248750_Fig04-04.jpg)


    图 4-4. 新脚本的检查器视图


    如检查器视图所示，Unity 创建新脚本时会包含三个项目（代码清单 4-1）。


    代码清单 4-1.  新脚本的内容


    ```

    #pragma strict


    function Start () {

    }


    function Update () {

    }

    ```


    脚本的第一行 `#pragma strict` 指示脚本编译器：所有变量都必须有类型声明，或至少其类型能被编译器轻松推断。这并非 Unity 桌面构建的强制要求，但
    Unity iOS 构建必须满足，因此最好养成这个习惯。


    **注意**   本书中所有完整的脚本代码清单都以 `#pragma strict` 开头。任何不包含该行的代码都仅是脚本的摘录部分。


    脚本中的两个函数是回调函数，由 Unity 游戏引擎在游戏中的特定时刻调用。`Start` 函数在该脚本首次被启用时调用。组件并非完全 `enabled`，除非其依附的游戏对象也处于活动状态。因此，如果游戏对象在场景中初始处于活动状态且附带了已启用的脚本，则该脚本的
    `Start` 函数会在场景开始播放时被调用。否则，`Start` 函数要等到脚本被启用（通过设置脚本组件的 `enabled` 变量）且游戏对象被激活（通过调用游戏对象的
    `SetActive` 函数）后才会被调用。


    与 `Start` 函数（在脚本组件的生命周期中最多只调用一次）不同，`Update` 函数每帧都会调用一次（即在 Unity 渲染当前场景之前调用一次）。与
    `Start` 函数类似，`Update` 仅在脚本（完全）启用时被调用，且 `Update` 的第一次调用发生在 `Start` 函数被唯一一次调用之后。因此，`Start`
    函数非常适合执行 `Update` 函数所需的任何初始化工作。


    **附加脚本**

