    # 该过程记录在 Unity 手册的“高级”部分中的“插件”页面上。


    ## 跟踪应用


    尽管 iTunes Connect 提供了下载和销售数据（而且图表比曾经唯一的 `.csv` 报告更容易阅读），但仍有几个第三方产品可以跟踪应用销售情况以及其他数据，如应用排名和评论。


    `App Annie`（`http://appannie.com/`）和 `AppFigures`（`http://appfigures.com/`）是两款较流行的基于网络的产品，它们都能在账户设置时你提供
    iTunes Connect 登录信息后，自动每日从 iTunes Connect 下载应用数据。两者都提供漂亮的销售数据图表展示，并发送每日应用统计摘要邮件。`App
    Annie` 目前免费（技术上处于测试阶段），而 `AppFigures` 则收取费用。


    图 17-7 显示了 `App Annie` 一个月内 Fugu Bowl 下载量的图表。更新下载量叠加在销售下载量之上。更新线会出现峰值，与 FuguBowl
    的更新发布相对应。


    ![9781430248750_Fig17-07.jpg](img/9781430248750_Fig17-07.jpg)


    图 17-7。`App Annie` 销售图表


    `AppViz`（`http://appviz.com/`）是一款 OS X 应用程序，它实现相同的功能，但会将数据下载到你的 Mac 上，并提供多种图表，包括按地域划分的销售额（图
    17-8）。`AppViz` 并非免费，但价格不高，我认为它物有所值。


    ![9781430248750_Fig17-08.jpg](img/9781430248750_Fig17-08.jpg)


    图 17-8。`AppViz` 地域视图


    你无需拘泥于只使用这些产品中的一种。我使用 `AppViz` 来确保本地保存了所有应用销售数据，并且我喜欢它多样的图表和 App Store 评论下载功能。我使用
    `AppAnnie` 是因为它能自动发送包含每日销售数据、排名显示（在 `AppViz` 中下载所有排名数据需要很长时间）的电子邮件报告，而且 `App Annie`
    支持一些 Android 应用商店。此外，它还是免费的！


    **提示** 从 `AppViz`，你可以导出所有已下载的数据，然后将这些数据导入到其他产品中，比如 `App Annie`。由于苹果只在 iTunes Connect
    上提供一年的应用销售数据，这是确保你始终可以将应用完整销售历史导入到销售跟踪产品中的一种方法。


    ## 促销代码


    我已经描述了如何在应用在 App Store 获批后下载促销代码，但我没有解释如何使用它们。其实有很多选择。几乎每个应用评测网站都会接受促销代码与评测请求。`Touch
    Arcade`（`http://toucharcade.com/`）就是这样一个网站，但它也有一个非常活跃的论坛，供开发者发放促销代码。而 `AppGiveaway`（`http://appgiveaway.com/`）会开展促销活动，在设定时间段内发放促销代码。这比自己亲手发放要方便得多，尽管你也应该自己发放。保存促销代码清单也是推动应用更新的一个充分理由，因为每次更新你都能获得
    50 个全新的代码。


    ## 更多变现方式


    考虑到每年需要支付苹果开发者费用和 Unity 许可证费用（如果你决定使用 Pro 许可证），你很可能希望至少能赚回这笔钱。除了 iAd 和第三方移动广告服务外，还有其他变现策略。


    ### 应用内购买


    除了应用销售和 iAd 之外，苹果还为 iOS 提供了另一条收入渠道：一个名为 `Storekit` 的应用内购买（IAP）系统。Unity iOS 没有为
    IAP 提供脚本接口，但 Prime31 Studios 在其产品中提供了一个 `Storekit` 插件。


    Unity 手册提供了一些关于如何下载和激活通过 IAP 购买的额外内容的提示，而 iTunes Connect 文档则解释了如何设置应用内购买。


    ### 资源商店


    我在我的应用中使用了几十个免费和付费的资源商店包，你肯定会发现资源商店对你的项目很有用。但资源商店也是另一个自助发布产品和创收的地方（Unity 会抽取 30%
    的佣金，和苹果在 App Store 上一样）。你也可以在资源商店上免费发布资源包，以获得认可或作为对社区的贡献（在本书的例子中，我当然也利用了这种慷慨）。


    方便的是，资源商店的提交是在 Unity 编辑器内，使用从资源商店（名称很贴切）下载的“资源商店工具”完成的。你可以提交项目中任何资源的集合——音频、纹理、模型、脚本、插件，甚至整个项目本身。


    **提示** 使用预处理器指令确保在切换构建目标时不会出现编译器错误，如果你使用了 Unity Pro 功能，请添加一个自定义的 `UNITY_PRO` 预处理器指令，这样
    Unity Basic 用户就不会出现问题。


    与向 App Store 提交类似，向资源商店提交的大部分工作涉及创建截图、图标、应用描述和商店艺术作品。关于如何成为资源商店卖家的说明，请访问 `http://unity3d.com/asset-store`。


    ## 为 Android 开发


    Unity Android 需要额外的许可证，其 Indie 和 Pro 结构与 Unity iOS 相同。好消息是，本书中几乎所有为 Unity iOS
    开发的内容都可以很好地用于 Unity Android。不出所料，`iPhone` 类中的任何内容在 Android 上也不可用（例如，我们用来检查设备类型的变量
    `iPhone.generation`），但 `Input` 类中适用于 iOS 的所有内容在 Android 上的工作方式也相同，包括触摸屏和加速度计功能。


    `Game Center` 和 iAd 是苹果的技术，因此这些功能在 Android 上不可用，但未来 `Social`、`ADBanner` 和 `ADInterstialAd`
    类可能会在 Android 上支持等效的功能。Prime31 Studio 和其他供应商提供了 Unity Android 插件，以提供对设备功能和移动服务的更多访问，例如
    `AdMob` 移动广告服务。


    Android 的构建和提交流程也有所不同。Android 不需要 Xcode，而是需要安装 Android SDK。你仍然可以从 Unity 编辑器调用“构建并运行”，但
    Unity Android 不是为应用构建 Xcode 项目，而是直接构建可执行的应用（一个 `APK` 文件）。与 iOS 开发不同，Android 开发可以针对多个应用商店。特别是
    Google Play，它没有审批流程，因此是快速自助发布的好途径，也是被苹果拒绝的应用的一个有用后备渠道。


    ## 合同工作


    在开发下一个热门应用的同时，独立开发者通常会通过接合同工作来支付日常开销。潜在客户可以在 Unity 论坛的“付费工作”主题、`http://unity3dwork.com/`
    甚至像 `http://odesk.com/` 这样的通用承包商网站上找到。一些市场专门从事移动应用开发，例如 `http://apptank.com/`
    和 `http://theymakeapps.com/`。


    如果你正在寻找全职游戏开发工作，无论是否涉及 Unity，使用 Unity 开发游戏的经验，更不用说拥有自助发布游戏的 portfolios，都会对你有所帮助。


    ## 结语


    现在我已经写到了最后，希望你已经准备好并兴奋地开始制作你自己的 Unity iOS 应用。如果说我希望你能从本书中学到一点，那就是你可以从简单的东西开始，并不断在上面构建，直到它变得有趣。不要成为那种想把一个大型多人在线（MMO）游戏作为第一个项目的人！

    '
- fmt: "Remember to keep learning and participate in the Unity community, both contributing\
    \ and asking for help on the Unity forum and on the Unity Answers site, and don’t\
    \ forget to check the Unity wiki. It’s fine to promote your work to the community\
    \ (there is a Showcase topic in the Unity forum) and ask others to spread the\
    \ word, but remember to return the favor!\n\nAs an unintended result of working\
    \ on my own projects with Unity iOS, I’ve met a population of developers with\
    \ whom I can commiserate and celebrate and trade valuable tips. I won’t try to\
    \ list them all, but you can find them on my twitter follow list at `@fugugames`.\
    \ Twitter, by the way, is another great way to interact with other Unity developers,\
    \ on a more personal level. I’ve communicated with many customers over twitter,\
    \ also, and have had some success with setting up Facebook product pages for my\
    \ games (in particular, `HyperBowl`). Although app customers can be legendarily\
    \ snarky, I’ve found most of them are supportive and sympathetic of us independent\
    \ developers and are enthused to be part of the process if we let them. In fact,\
    \ I’ve benefited from a lot of free QA and some localization (translation) help,\
    \ not to mention a lot feedback. So, set up those twitter feeds and Facebook fan\
    \ pages and start talking!\n\nAbove all, have fun. Any other reward is a bonus!\n\
