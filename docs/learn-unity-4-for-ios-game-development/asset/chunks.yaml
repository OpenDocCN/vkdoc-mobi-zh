    这些第三方 GUI 系统可在“脚本”分类下的“GUI”子分类中找到，该子分类中充满了预先编写好的 GUI，如小地图和菜单。事实上，本章实现的暂停菜单的一个版本可以在资源商店的“完整项目”部分中找到（名称为
    FuguPause）。


    资源商店在“纹理和材质”的“字体”分类下也有相当多的字体可供选择。但由于 Unity 可以导入 TrueType 和 OpenType 字体，你还可以访问网络上大量的免费字体网站，以及价格适中的字体库（我使用的是
    MacXWare 字体库）。


    ---


    # 第 10 章 使用 Unity iOS


    恭喜！你现在已经拥有了一款保龄球游戏，它包含了通常构成 3D 游戏的基本功能：3D 图形（当然）、物理效果、音效、玩家控制（保龄球）、摄像机运动以及图形用户界面。


    默认的构建目标显示在编辑器窗口的标题栏上，为 PC、Mac 和 Linux 独立平台。如果现在对保龄球项目进行 OS X 构建，游戏的运行效果将与在编辑器中基本相同。同样适用于
    Linux、Windows，甚至是网络播放器（不过网络播放器构建需要你先切换构建目标）。


    针对 iOS 则是另一回事。你现在可以将保龄球游戏的构建目标更改为 iOS，并进行构建而不会出现任何编译器错误。但`FuguForce.js`中的保龄球控制是为鼠标输入设计的，因此需要更改。除了重新实现输入处理之外，将桌面
    PC 游戏适配到移动设备（这个过程称为*移植*）通常还需要对设备显示进行调整，并做出妥协以达到足够的性能。


    此外，与桌面独立平台和网络播放器目标相比，构建 iOS 应用涉及更多的外部流程。由于 Apple 要求所有 iOS 应用都必须使用 Xcode 编译，Unity
    iOS 通过首先生成一个 Xcode 项目来构建应用，然后由 Xcode 编译该项目以创建最终应用。而要在测试设备上实际运行应用并将应用提交到 App Store，则需要一系列相当复杂的流程，以及加入
    Apple 的 iOS 开发者计划。


    现在，让我们回到起点，暂时回归到本书开始时使用的 Angry Bots 演示项目。方便的是，Angry Bots 无需修改即可在 iOS 上运行。如果你有
    iOS 设备，请从 App Store 下载 Angry Bots。在 App Store 搜索框中输入“unity technologies”可以快速找到
    Angry Bots 应用，它将与 Unity Technologies 的其他应用一起出现（图 10-1）。


    ![9781430248750_Fig10-01.jpg](img/9781430248750_Fig10-01.jpg)


    图 10-1 App Store 上 Unity Technologies 的示例应用


    除了 Angry Bots，你还应该下载 Unity Remote 应用，它作为远程控制工具，用于在编辑器中测试 Unity iOS 游戏。顺便，你应该下载并尝试
    Unity Technologies 的所有示例应用。其中许多应用已经很长时间没有更新，但它们确实提供了一些关于可以用 Unity 创建什么类型游戏的思路。

    '
- fmt: '# Working with the iOS Build Target in Unity


    Once you install `Angry Bots` from the App Store onto your iOS device and play
    the game, notice how the game features on-screen virtual joysticks (Figure 10-2)
    for player movement and weapon fire that, up until now, we haven’t seen in `Angry
    Bots`.


    ![9781430248750_Fig10-02.jpg](images/9781430248750_Fig10-02.jpg)


    *Figure 10-2. The iOS version of Angry Bots with virtual joysticks*


    Although the iOS version of `Angry Bots` has different controls, it’s built from
    the same version of `Angry Bots` installed with Unity. So we’ll defer the iOS
    conversion work on our bowling game and spend these next couple of chapters getting
    reacquainted with `Angry Bots` so we can focus on the Unity iOS build and test
    process. In this chapter, specifically, you’ll learn how to test the Unity iOS
    version of `Angry Bots` with the Unity Remote and with the iOS Simulator in Xcode.


    ## Bring Back the Angry Bots


    Returning to `Angry Bots`, select `Open Project` from the `File` menu, and `Angry
    Bots` should be listed among the recent projects (Figure 10-3).


    ![9781430248750_Fig10-03.jpg](images/9781430248750_Fig10-03.jpg)


    *Figure 10-3. Angry Bots listed among recent projects*


    If `Angry Bots` is not listed, then click the `Open Other` button and look for
    `Angry Bots` under the Unity demo folder, `Users` ![image](images/arrow.jpg) `Shared`
    ![image](images/arrow.jpg) `Unity` (Figure 10-4).


    ![9781430248750_Fig10-04.jpg](images/9781430248750_Fig10-04.jpg)


    *Figure 10-4. Opening the Angry Bots project*


    Now that we’re back in `Angry Bots`, let’s change the build target to iOS. Bring
    up the `Build Settings` window using the `Build Settings` command in the `File`
    menu. The available build targets are shown in the `Platforms` list on the left,
    with a Unity icon indicating the current build target, which should be `PC, Mac
    & Linux Standalone` (Figure 10-5).


    ![9781430248750_Fig10-05.jpg](images/9781430248750_Fig10-05.jpg)


    *Figure 10-5. Build settings with the default target platform*


    To build the game for iOS, select `iOS` in the `Platform` list and then click
    the `Switch Platform` button on the lower left to reimport the project assets
    in the proper formats for iOS. A progress dialog box will appear while the reimporting
    process is taking place (Figure 10-6).


    ![9781430248750_Fig10-06.jpg](images/9781430248750_Fig10-06.jpg)


    *Figure 10-6. The progress bar for reimporting assets while switching build targets*


    Projects with a lot of assets can take a while to reimport, and the Editor will
    be unresponsive during that period. But once the assets have been converted, the
    `Build Settings` will display the Unity icon next to `iOS` in the `Platform` list,
    indicating that iOS is now the build target (Figure 10-7).


    ![9781430248750_Fig10-07.jpg](images/9781430248750_Fig10-07.jpg)


    *Figure 10-7. Build Settings with iOS as the build target*


    Notice also that the `Switch Platform` button is now dimmed when you select `iOS`,
    indicating that the asset conversion has taken place.


    > **Tip:** If you select `iOS` but neglect to click the `Switch Platform` button,
    the project assets will still be converted automatically the first time you perform
    a build. However, it’s best to convert the project assets immediately so you can
    examine and test the game within the Editor and catch platform-specific issues
    earlier.


    And yet another indication that the build target is now iOS, the title bar of
    the Editor window, which formerly displayed `PC, Mac & Linux Standalone`, now
    sports `iPhone, iPod Touch and iPad` (Figure 10-8).


    ![9781430248750_Fig10-08.jpg](images/9781430248750_Fig10-08.jpg)


    *Figure 10-8. The Unity Editor window with iOS as the build target*


    Now that `Angry Bots` is configured for iOS, let’s open the `AngryBots` scene,
    if it’s not already open (and it probably isn’t, because you switched from the
    bowling project to the `Angry Bots` project).


    > **Note:** When switching from one project to another, Unity tries to open a
    scene with the same name as the open scene in the previous project. If no such
    scene exists, the Editor will open a new scene, just as if you had selected `New
    Scene` in the `File` menu.


    The `AngryBots` scene file is at the top level of the `Assets` folder (Figure
    10-9), so you can double-click that file in the `Project View` to open the scene,
    as an alternative to using the `Open Scene` command in the `File` menu.


    ![9781430248750_Fig10-09.jpg](images/9781430248750_Fig10-09.jpg)


    *Figure 10-9. The Project View of the AngryBots scene file*


    And yet another clue that the current build target is iOS: the screen size menu
    at the top left of the `Game View` now lists iOS device resolutions (Figure 10-10).


    ![9781430248750_Fig10-10.jpg](images/9781430248750_Fig10-10.jpg)


    *Figure 10-10. iOS screen resolutions in the Game View*


    Moreover, when you click `Play`, the same virtual joysticks featured on the version
    from the App Store are now visible (Figure 10-11).


    ![9781430248750_Fig10-11.jpg](images/9781430248750_Fig10-11.jpg)


    *Figure 10-11. Playing Angry Bots in the Editor with virtual joysticks*


    Unfortunately, although you can watch the bots in `Angry Bots` move around, you
    can’t actually play the game, since the mouse and keyboard controls are deactivated,
    and the code is waiting for touch-screen input to operate the virtual joysticks.
    But no worries, there is a way to provide touchscreen input while testing in the
    Editor!


    ## Test with the Unity Remote


    Unity has provided a very cool solution for in-Editor testing of Unity iOS projects
    in the form of the `Unity Remote` app, which runs on an iOS device and relays
    touchscreen and accelerometer data from that device over Wi-Fi to the Unity Editor.
    If you don’t have an iOS device, you can skip this section and still get some
    testing done using the iOS Simulator, described in the next section.


    `Unity Remote` can be found on the App Store in the same way as the `Angry Bots`
    app, by entering `"unity technologies"` in the App Store search box (Figure 10-1).
    Entering `"unity remote"` works, too (Figure 10-12).


    ![9781430248750_Fig10-12.jpg](images/9781430248750_Fig10-12.jpg)


    *Figure 10-12. The Unity Remote app on the App Store*


    Once `Unity Remote` is installed on your iOS device, make sure the device is on
    the same Wi-Fi network as your Mac that’s running Unity. When you launch `Unity
    Remote`, the screen should display the name of that Mac (Figure 10-13). Select
    that computer, and if Unity is not in `Play` mode, the `Unity Remote` screen will
    just wait, displaying a reminder for you to click `Play` in the Unity Editor.


    ![9781430248750_Fig10-13.jpg](images/9781430248750_Fig10-13.jpg)


    *Figure 10-13. Computer selection in the Unity Remote app*


    When the Unity Editor is in `Play` mode, the graphics in the `Game View` will
    also appear in `Unity Remote`, and you can play the game on your device, using
    its touchscreen! It will look a bit coarse, because Unity is sending copies of
    the game screen over Wi-Fi to the device. You can improve the performance by minimizing
    the resolution of the `Game View` in the Unity Editor (Figure 10-14).


    ![9781430248750_Fig10-14.jpg](images/9781430248750_Fig10-14.jpg)


    *Figure 10-14. Minimized device resolution in the Game View*'
