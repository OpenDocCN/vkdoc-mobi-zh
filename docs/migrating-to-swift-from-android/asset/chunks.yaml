  trans: "\n```  \n\"app_name\" = \"HelloAndroid\";  \n\"action_settings\" = \"设置\"\
    ;  \n\"hello_world\" = \"你好，世界！\";  \n\"hello_buttn\" = \"你好...\";  \n\"name_hint\"\
    \ = \"输入名称，例如：你\";  \n```\n\n3.  要从 `Localizable.strings` 文件中读取字符串，请使用 `NSLocalizedString(...)`\
    \ 方法通过键来获取字符串，如代码清单 4-2 所示。\n\n***代码清单 4-2*** 从 iOS 的 `Localizable.strings` 文件读取字符串\n\
    \n```  \n// hello_world\" = \"Hello world!\";  \nvar str = NSLocalizedString(\"\
    hello_world\", comment: \"\")  \nprintln(str) // Hello world!  \n```\n\n将字符串外部化到一个文本文件中后，你可以将这些文本翻译成不同的语言，这是实现\
    \ I18N（国际化）的常见流程。虽然我不打算详细介绍本地化/I18N，但其概念和过程实际上与 Android 中的相同。\n\n## 常用 UI 组件\n\
    \nUI 组件是应用程序用户界面中可交互的软件控制组件，例如按钮、文本字段等。你可以创建包含合适 UI 组件的屏幕，用于与用户交互、收集用户信息和/或向用户展示信息。\n\
    \niOS 的 `UIKit` 框架提供了丰富的系统 UI 组件，你可以在故事板中“绘制”它们。你还可以将它们作为 `IBOutlet` 属性“连接”到 Swift\
    \ 类，这样你的代码就可以直接使用视图对象、更新其属性或调用组件方法，以实现动态的应用程序行为。\n\n本节其余内容将介绍常见的 iOS UI 组件，并将其与\
    \ Android 中的对应组件进行比较。继续使用之前创建的 `CommonWidgets` 项目，执行以下操作：\n\n1.  故事板中已经有一个与 `ViewController`\
    \ 类配对的故事板场景。这个场景的高度不足以容纳你将要添加的所有组件。为了让你能看到要添加到该场景的所有组件，将 `Simulated Metrics`（模拟度量）的大小改为\
    \ `Freeform`（自由格式），并将其设置得足够长，以便你可以在故事板中看到所有组件。\n2.  从故事板中选择 **View Controller**（视图控制器），然后在\
    \ **Size Inspector**（尺寸检查器）中，将 `Simulated Size`（模拟尺寸）改为 `Freeform`（自由格式），并将尺寸设为\
    \ `320x1500`（图 4-5），以给视图提供足够的高度来开始操作。\n\n![9781484204375_Fig04-05.jpg](img/9781484204375_Fig04-05.jpg)\n\
    \n图 4-5 在故事板中将 `Simulated Metrics`（模拟度量）大小改为 `Freeform`（自由格式）\n\n稍后，你将在最后将整个屏幕包裹在滚动视图中，这样你就可以上下滚动视图了。\n\
    \n**注意** 一开始不必为每个组件实现自动布局。在设置 `UIScrollView` 时，自动布局约束会变得混乱。相反，应该在你设置好滚动视图**之后**再实现自动布局约束。\n\
    \n## UILabel\n\n**安卓类比**\n`android.widget.TextView`.\n\n你通常使用 `UILabel` 来绘制一行或多行静态文本，例如用于标识\
    \ UI 其他部分的文本。\n\n以 Android 应用为线框图，向 iOS 的 `CommonWidgets` 应用添加一个 `UILabel`：\n\n\
    1.  选择 `Main.storyboard`，从 **Object Library**（对象库）中拖拽一个 `UILabel` 到根视图 `View`\
    \ 上，如图 4-6 所示。拖动组件将 `UILabel` 定位到 **Size Inspector**（尺寸检查器）中所示的位置。\n\n![9781484204375_Fig04-06.jpg](img/9781484204375_Fig04-06.jpg)\n\
    \n图 4-6 调整 `UILabel` 的大小和位置\n\n2.  在 **Attributes Inspector**（属性检查器）中更新 `UILabel`\
    \ 属性，如图 4-7 所示：\n    1.  文本：**我的简单文本标签**\n    2.  对齐方式：居中\n    3.  其他属性（**阴影**、**自动缩小**等）也可以随意调整。\n\
    \n![9781484204375_Fig04-07.jpg](img/9781484204375_Fig04-07.jpg)\n\n图 4-7 更新 `UILabel`\
    \ 属性\n\n3.  打开 **Assistant Editor**（辅助编辑器），在 **Connections Inspector**（连接检查器）中将\
    \ `IBOutlet` 连接到你的代码，这样你就可以通过编程方式更新 `UILabel`。**Attributes Inspector**（属性检查器）中的大多数属性都可以在运行时通过\
    \ `IBOutlet mLabel` 属性进行修改，如代码清单 4-3 所示。\n\n***代码清单 4-3*** `UILabel` 属性\n\n```\
    \  \n...  \n@IBOutlet weak var mLabel: UILabel!  \noverride func viewDidLoad()\
    \ {  \n  super.viewDidLoad()  \n  // 在加载视图后进行任何额外的设置...  \n  self.initLabel()\
    \  \n}  \n\nfunc initLabel() {  \n  self.mLabel.text = \"我的简单文本标签\"  \n  self.mLabel.textColor\
    \ = UIColor.darkTextColor()  \n  self.mLabel.textAlignment = NSTextAlignment.Center\
    \  \n  self.mLabel.shadowColor = UIColor.lightGrayColor()  \n  self.mLabel.shadowOffset\
    \ = CGSize(width: 2, height: -2)  \n}  \n...  \n```\n\n构建并运行 `CommonWidgets` 应用，查看\
    \ `UILabel` 的实际效果（图 4-8）。\n\n![9781484204375_Fig04-08.jpg](img/9781484204375_Fig04-08.jpg)\n\
    \n图 4-8 一个简单的 iOS `UILabel` 外观和感觉\n\n## UITextField\n\n**安卓类比**\n单行 `EditText`。\n\
    \n在 iOS 中，`UITextField` 接受单行用户输入，并在用户输入为空时显示占位符文本。通过示例学习，执行以下操作以在 `CommonWidgets`\
    \ 项目中使用 `UITextField`。\n\n1.  选择 `Main.storyboard`，从 **Object Library**（对象库）中拖拽一个\
    \ `UITextField` 到根视图 `View` 上，如图 4-9 所示。将 `UITextField` 放置在 `UILabel` 的正下方。\n\n\
    ![9781484204375_Fig04-09.jpg](img/9781484204375_Fig04-09.jpg)\n\n图 4-9 改变 `UILabel`\
    \ 的大小和位置\n\n2.  在 **Attributes Inspector**（属性检查器）中更新其属性，如图 4-10 所示：\n    1.  占位符：**提示：单行文本输入**\n\
    \    2.  按 **Attributes Inspector**（属性检查器）中的提示填写其他属性。\n\n![9781484204375_Fig04-10.jpg](img/9781484204375_Fig04-10.jpg)\n\
    \n图 4-10 在属性检查器中定义 `UITextField`\n\n3.  打开 **Assistant Editor**（辅助编辑器），在 **Connections\
    \ Inspector**（连接检查器）中将以下出口连接到你的代码，如代码清单 4-4 所示：\n    1.  将 `IBOutlet` 连接到 `mTextField`\
    \ 属性，这样你就可以通过编程方式更新 `UITextField`。\n    2.  将 `delegate`（委托）出口连接到 `ViewController`\
    \ 类，以便 `UITextField` 向其委托对象发送消息。\n    3.  在 `ViewController` 中实现 `UITextFieldDelegate`\
    \ 协议。代码清单 4-4 展示了按下返回键时关闭键盘的常见方法。\n\n***代码清单 4-4*** `UITextFieldDelegate`\n\n\
    ```  \nclass ViewController: UIViewController, UITextFieldDelegate {  \n  ...\
    \  \n  @IBOutlet weak var mTextField: UITextField!  \n\n  // 当按下 'return' 键时调用。返回\
    \ false 则忽略。  \n  func textFieldShouldReturn(textField: UITextField!) -> Bool\
    \ {  \n    textField.resignFirstResponder()  \n    return true  \n  }  \n  ...\
    \  \n```\n\n**注意** `UITextFieldDelegate` 中还定义了其他方法。![image](img/flower.jpg)- 在编辑器中点击该符号可调出类的定义。我通常会查看方法签名，但不会死记硬背。\n\
    \n构建并运行 `CommonWidgets` 应用，查看 `UITextField` 的实际效果。\n\n## UITextView\n\n**安卓类比**\n\
    多行 `EditText`。\n\n在 iOS 中，`UITextView` 接受并显示多行文本。通过示例学习，执行以下操作以在 `CommonWidgets`\
    \ 项目中使用 `UITextView`。\n\n1.  选择 `Main.storyboard`，从 **Object Library**（对象库）中拖拽一个\
    \ `UITextView` 到根视图 `view` 上，如图 4-11 所示。将组件放置在 `UITextField` 的正下方。\n\n![9781484204375_Fig04-11.jpg](img/9781484204375_Fig04-11.jpg)\n\
    \n图 4-11 改变 `UILabel` 的大小和位置\n"
- fmt: "### 2. 在**Attributes Inspector**中更新其属性：\n   1. **Text**: **multiple lines**\n\
    \   2. 查看其**Attributes Inspector**。许多属性与`UITextField`类似，但不完全相同（例如，没有`Placeholder`）。\n\
    3. 打开**Assistant Editor**，并在**Connections Inspector**中将`IBOutlet`连接到代码中的`mTextView`，以便以编程方式更新`UITextView`。添加一个方法`logText(...)`，该方法将文本打印到`UITextView`。稍后您将使用它（参见[Listing\
    \ 4-5](#9781484204375_Ch04.xhtml#list5)）。\n\n[***Listing 4-5***](#9781484204375_Ch04.xhtml#_list5).\
    \ `UILabel`属性\n\n```\nclass ViewController: UIViewController ... {\n  ...\n  @IBOutlet\
    \ weak var mTextView: UITextView!\n  func logText(text : String) {\n    self.mTextView.text\
    \ = self.mTextView.text + \"\\n\" + text\n\n// to make sure the last line is visible\n\
    \    var count = self.mTextView.text.utf16Count // string length\n    self.mTextView.scrollRangeToVisible(NSMakeRange(count,\
    \ 0))\n  }\n  ...\n```\n\n`UITextView`可以包含由换行符分隔的多行文本。您将无法像通常对`UITextField`那样关闭键盘。通常，您会使用另一个控件——例如，如果您有一个保存按钮，您可以使用它来触发`View.resignFirstResponder()`，从而关闭键盘。\n\
    \n---\n\n### UIButton\n\n#### Android类比\n\n`android.widget.Button`。\n\n在iOS中，`UIButton`（常见的`Button`控件小部件）会拦截触摸事件并向委托发送操作消息。要通过示例学习，请在`CommonWidgets`项目中执行以下操作：\n\
    \n1. 选择`Main.storyboard`，从 **Object Library** 拖动一个`UIButton`到根`View`，并将该`UIButton`放置在文本视图正下方，如图[Figure\
    \ 4-12](#9781484204375_Ch04.xhtml#Fig12)所示。\n\n![9781484204375_Fig04-12.jpg](images/9781484204375_Fig04-12.jpg)\n\
    \n[Figure 4-12](#9781484204375_Ch04.xhtml#_Fig12). `UIButton`位置和属性\n\n2. 在**Attributes\
    \ Inspector**中更新其属性（参见[Figure 4-12](#9781484204375_Ch04.xhtml#Fig12)）：\n   1.\
    \ 就像Android的`Button`一样，大多数`Button`属性都与按钮状态相关联。首先选择**State Config**：**Default**\n\
    \   2. Title：**Action Button**\n   * Image：**sample**\n   * 其余属性保持如图[Figure 4-12](#9781484204375_Ch04.xhtml#Fig12)所示。\n\
    3. 打开**Assistant Editor**，并在**Connections Inspector**中将`IBOutlet`和`IBAction`连接到您的代码中，如[Listing\
    \ 4-6](#9781484204375_Ch04.xhtml#list6)所示。\n\n[***Listing 4-6***](#9781484204375_Ch04.xhtml#_list6).\
    \ `IBOutlet`和实现`IBAction`\n\n``` \nclass ViewController: UIViewController, UITextFieldDelegate\
    \ {\n  ...\n  @IBOutlet weak var mButton: UIButton!\n  @IBAction func doButtonTouchDown(sender:\
    \ AnyObject) {\n    println(self.mButton.titleForState(UIControlState.Normal))\n\
    \    self.mButton.setTitle(\"Click me!\", forState: UIControlState.Normal)\n \
    \   self.logText(\"Button clicked\")\n  }\n  ... \n```\n\n构建并运行`CommonWidgets`应用以确认一切正常。当按钮被按下时，它会简单地在`UITextView`中记录\"\
    `Button clicked`\"文本（参见[Figure 4-13](#9781484204375_Ch04.xhtml#Fig13)）。\n\n![9781484204375_Fig04-13.jpg](images/9781484204375_Fig04-13.jpg)\n\
    \n[Figure 4-13](#9781484204375_Ch04.xhtml#_Fig13). 在`UITextView`中点击按钮\n\n---\n\
    \n### UISegmentedControl\n\n#### Android类比\n\n`android.widget.RadioGroup`。\n\n\
    在iOS中，`UISegmentedControl`提供紧密相关但互斥的选择。在Android中，`RadioGroup`提供相同的选项，但在我看来，Android的外观和感觉更像是桌面应用或网页风格。要通过示例展示和学习，请在`CommonWidgets`应用中执行以下操作：\n\
    \n1. 选择`Main.storyboard`，从 **Object Library** 拖动一个`UISegmentedControl`到按钮下方的根`View`中，如图[Figure\
    \ 4-14](#9781484204375_Ch04.xhtml#Fig14)所示。\n\n![9781484204375_Fig04-14.jpg](images/9781484204375_Fig04-14.jpg)\n\
    \n[Figure 4-14](#9781484204375_Ch04.xhtml#_Fig14). `UISegmentedControl`大小和位置\n\
    \n2. 在**Attributes Inspector**中更新其属性（参见[Figure 4-15](#9781484204375_Ch04.xhtml#Fig15)）：\n\
    \   1. Style：**Bar**\n   2. Segments：**3**\n   3. Title：分别为每个分段设置为 **First**、**Second**\
    \ 和 **Third**。\n   4. 可选地，您可以为每个分段分配一个 **Image** 而不是 **Title**。\n   5. 您可以勾选 **Selected**\
    \ 分段（例如，**Segment 0**）。\n\n![9781484204375_Fig04-15.jpg](images/9781484204375_Fig04-15.jpg)\n\
    \n[Figure 4-15](#9781484204375_Ch04.xhtml#_Fig15). `UISegmentedControl`属性\n\n\
    3. 打开**Assistant Editor**，并在**Connections Inspector**中将`IBOutlet`和`IBAction`连接到您的代码。通常，您会针对`Value\
    \ Changed`事件实现`IBAction`以捕获选择（参见[Listing 4-7](#9781484204375_Ch04.xhtml#list7)）。\n\
    \n[***Listing 4-7***](#9781484204375_Ch04.xhtml#_list7). `UISegmentControl IBOutlet`和实现`IBAction`\n\
    \n``` \nclass ViewController: ...{\n  ...\n  @IBOutlet weak var mSegmentedControl:\
    \ UISegmentedControl!\n  @IBAction func doScValueChanged(sender: AnyObject) {\n\
    \    var idx = self.mSegmentedControl.selectedSegmentIndex\n    self.logText(\"\
    segment \\(idx)\")\n  }\n  ... \n```\n\n构建并运行`CommonWidgets`应用以查看`UISegmentedControl`的实际效果。每个分段都有一个从零开始的索引（参见[Figure\
    \ 4-16](#9781484204375_Ch04.xhtml#Fig16)）。\n\n![9781484204375_Fig04-16.jpg](images/9781484204375_Fig04-16.jpg)\n\
    \n[Figure 4-16](#9781484204375_Ch04.xhtml#_Fig16). `UISegmentedControl`零基索引\n\n\
    ---\n\n### UISlider\n\n#### Android类比\n\n`android.widget.SeekBar`。\n\niOS的`UISlider`允许用户在给定值范围内调整数值。用户向左或向右拖动滑块来设置值。滑块的交互性使其成为设置强度级别（如音量、亮度或色彩饱和度）的理想选择。\n\
    \n要将Android的`SeekBar`转换为iOS的`UISlider`，请执行以下操作：\n\n1. 选择`Main.storyboard`，从`Object\
    \ Library`拖动一个`UISlider`，并将其放置在`UISegmentedControl`下方，如图[Figure 4-17](#9781484204375_Ch04.xhtml#Fig17)所示。\n\
    \n![9781484204375_Fig04-17.jpg](images/9781484204375_Fig04-17.jpg)\n\n[Figure\
    \ 4-17](#9781484204375_Ch04.xhtml#_Fig17). 更新`UISlider`属性\n\n2. 在**Attributes\
    \ Inspector**中更新其属性（参见[Figure 4-17](#9781484204375_Ch04."
