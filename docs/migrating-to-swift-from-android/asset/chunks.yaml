    \ resources for different screen sizes.\n\nWhile Auto Layout provides an effective\
    \ way to implement responsive UX for various screen sizes, it may not utilize\
    \ the valuable mobile-screen real estate in the most efficient ways. For example,\
    \ it is fairly common to portray landscape view different from portrait due to\
    \ different aspect ratios, or to have tablet-specific UX design, and so forth.\n\
    \nPrior to iOS 8, you generally implemented two storyboards, one for iPhone and\
    \ one for iPad. The concept is very similar to Android alternative-layout resources\
    \ for different screen sizes. Beginning with iOS 8, **Size Classes** were introduced\
    \ to solve this common programming issue by using the abstract presentations of\
    \ device sizes in terms of horizontal widths and vertical heights. The current\
    \ iOS devices can be classified as shown in [Table 3-1](#9781484204375_Ch03.xhtml#Tab1).\n\
    \n[Table 3-1](#9781484204375_Ch03.xhtml#_Tab1). iOS Device Size Classes\n\n![image](images/Table3-1.jpg)\n\
    \nYou can provide all the implementation for all size classes all in one storyboard!"
  raw: "[Figure 3-4](#9781484204375_Ch03.xhtml#_Fig4). Using **Horizontal Center in\
    \ Container** on the `TextField` in Auto Layout editor\n\n3.  Use **Vertical Center\
    \ in Container** to create a y-alignment constraint (see [Figure 3-5](#9781484204375_Ch03.xhtml#Fig5)):\n\
    \    1.  From the Xcode top menu bar, select **Editor ![image](images/arrow.jpg)\
    \ Align ![image](images/arrow.jpg) Vertical Center in Container**.\n    2.  In\
    \ the **Attributes Inspector** in the **Utility** area, to position the `TextField`\
    \ at the one-sixth of the view height instead of half, you can apply a **Multiplier**\
    \ of 3.\n\n![9781484204375_Fig03-05.jpg](images/9781484204375_Fig03-05.jpg)\n\n\
    [Figure 3-5](#9781484204375_Ch03.xhtml#_Fig5). Creating constraint y-alignment\
    \ constraint using a multiplier\n\n**Note**  Use Multiplier or Constant to offset\
    \ the second item position:\n\n(first item center position) == (second item center)\
    \ * multiplier + constant\n\n4.  Select **Resolve Auto Layout issue ![image](images/arrow.jpg)\
    \ Update Frames** as shown in [Figure 3-6](#9781484204375_Ch03.xhtml#Fig6).\n\n\
    ![9781484204375_Fig03-06.jpg](images/9781484204375_Fig03-06.jpg)\n\n[Figure 3-6](#9781484204375_Ch03.xhtml#_Fig6).\
    \ Using **Update Frames** to reposition the UI widgets based on constraints\n\n\
    5.  Select the **Hello World!** label and click the **Pin** button to add multiple\
    \ constraints for appropriate spacing and widgets height as shown in [Figure 3-7](#9781484204375_Ch03.xhtml#Fig7):\n\
    \    1.  Pin the **Top** space to the nearest widget, the `TextField`, with `48.5`\
    \ pixels.\n    2.  Pin both **Leading** and **Trailing** spaces to the nearest\
    \ widget, its parent `View`, with `60` pixels.\n    3.  Pin its **Height** to\
    \ be `21` pixels.\n\n![9781484204375_Fig03-07.jpg](images/9781484204375_Fig03-07.jpg)\n\
    \n[Figure 3-7](#9781484204375_Ch03.xhtml#_Fig7). Spacing **Hello World!** label\
    \ relative to its neighbors\n\n**Note**  The combined constraints need to make\
    \ sense without ambiguity. You can set priority to each individual constraint.\
    \ However, if you start using priority to resolve conflicts, you might want to\
    \ think about using fewer constraints for your purpose.\n\n6.  Select the `Hello...`\
    \ button. You can align it similar to the `TextField`:\n    1.  Use **Horizontal\
    \ Center in Container** to create an x-alignment constraint.\n    2.  Use **Vertical\
    \ Center in Container** to create a y-alignment constraint with **Multiplier**\
    \ to be `0.75`.\n\nUsing the Auto Layout with responsive UX designs immediately\
    \ provides proper landscape layout. [Figure 3-8](#9781484204375_Ch03.xhtml#Fig8)\
    \ shows the previews in both landscape and portrait modes for iPhone 4-inch and\
    \ 3.5-inch modes. Click the **+** icon (see the pointer in [Figure 3-8](#9781484204375_Ch03.xhtml#Fig8))\
    \ to add multiple previews for different devices.\n\n![9781484204375_Fig03-08.jpg](images/9781484204375_Fig03-08.jpg)\n\
    \n[Figure 3-8](#9781484204375_Ch03.xhtml#_Fig8). Auto Layout with responsive UX\
    \ design\n\nSize Classes\n\nANDROID ANALOGY\n\nProvide alternative layout resources\
    \ for different screen sizes.\n\nWhile Auto Layout provides an effective way to\
    \ implement responsive UX for various screen sizes, it may not utilize the valuable\
    \ mobile-screen real estate in the most efficient ways. For example, it is fairly\
    \ common to portray landscape view different from portrait due to different aspect\
    \ ratios, or to have tablet-specific UX design, and so forth.\n\nPrior to iOS\
    \ 8, you generally implemented two storyboards, one for iPhone and one for iPad.\
    \ The concept is very similar to Android alternative-layout resources for different\
    \ screen sizes. Beginning with iOS 8, **Size Classes** were introduced to solve\
    \ this common programming issue by using the abstract presentations of device\
    \ sizes in terms of horizontal widths and vertical heights. The current iOS devices\
    \ can be classified as shown in [Table 3-1](#9781484204375_Ch03.xhtml#Tab1).\n\
    \n[Table 3-1](#9781484204375_Ch03.xhtml#_Tab1). iOS Device Size Classes\n\n![image](images/Table3-1.jpg)\n\
    \nYou can provide all the implementation for all size classes all in one storyboard!"
  trans: "[内容]\n图 3-4. 在自动布局编辑器中，对 `TextField` 使用**容器内水平居中**。\n\n3.  使用**容器内垂直居中**创建\
    \ Y 轴对齐约束（参见图 3-5）：\n    1.  在 Xcode 顶部菜单栏中，选择 **编辑器 ![image](img/arrow.jpg) 对齐\
    \ ![image](img/arrow.jpg) 容器内垂直居中**。\n    2.  在**工具区**的**属性检查器**中，要将 `TextField`\
    \ 置于视图高度的六分之一处（而非一半），可以将**乘数**设置为 3。\n\n![9781484204375_Fig03-05.jpg](img/9781484204375_Fig03-05.jpg)\n\
    \n图 3-5. 使用乘数创建 Y 轴对齐约束\n\n**注意** 使用乘数或常量来偏移第二个元素的位置：\n\n`（第一个元素中心位置）==（第二个元素中心）*\
    \ 乘数 + 常量`\n\n4.  选择**解决自动布局问题 ![image](img/arrow.jpg) 更新框架**，如图 3-6 所示。\n\n![9781484204375_Fig03-06.jpg](img/9781484204375_Fig03-06.jpg)\n\
    \n图 3-6. 使用**更新框架**根据约束重新定位 UI 控件\n\n5.  选中“Hello World!”标签，点击**固定**按钮，为适合的间距和控件高度添加多个约束，如图\
    \ 3-7 所示：\n    1.  将**顶部**间距固定到最近的控件 `TextField`，值为 `48.5` 像素。\n    2.  将**前导**和**尾部**间距都固定到最近的控件（其父视图\
    \ `View`），值为 `60` 像素。\n    3.  将其**高度**固定为 `21` 像素。\n\n![9781484204375_Fig03-07.jpg](img/9781484204375_Fig03-07.jpg)\n\
    \n图 3-7. 设置“Hello World!”标签相对于相邻元素的间距\n\n**注意** 合并后的约束必须合理且无歧义。你可以为每个单独的约束设置优先级。然而，如果你开始使用优先级来解决冲突，可能需要考虑使用更少的约束来实现目标。\n\
    \n6.  选中 `Hello...` 按钮。可以像 `TextField` 一样对其对齐：\n    1.  使用**容器内水平居中**创建 X 轴对齐约束。\n\
    \    2.  使用**容器内垂直居中**创建 Y 轴对齐约束，并将**乘数**设置为 `0.75`。\n\n结合响应式用户体验设计使用自动布局，可以立即获得合适的横屏布局。图\
    \ 3-8 展示了 iPhone 4 英寸和 3.5 英寸模式下横屏和竖屏的预览效果。点击 **+** 图标（参见图 3-8 中的指针），可以为不同设备添加多个预览。\n\
    \n![9781484204375_Fig03-08.jpg](img/9781484204375_Fig03-08.jpg)\n\n图 3-8. 响应式用户体验设计的自动布局\n\
    \n## 尺寸类别\n\n**安卓类似概念**\n\n为不同屏幕尺寸提供备选布局资源。\n\n虽然自动布局为不同屏幕尺寸实现响应式用户体验提供了一种有效方法，但它可能无法以最高效的方式利用宝贵的移动屏幕空间。例如，由于不同的宽高比，横屏视图通常与竖屏不同，或者需要特定于平板电脑的用户体验设计等等。\n\
    \n在 iOS 8 之前，通常需要实现两个 Storyboard，一个用于 iPhone，一个用于 iPad。这一概念与 Android 针对不同屏幕尺寸的备用布局资源非常相似。从\
    \ iOS 8 开始，引入了**尺寸类别**，通过使用水平宽度和垂直高度的抽象表示来描述设备尺寸，从而解决了这一常见的编程问题。当前 iOS 设备可以分类如下表\
    \ 3-1 所示。\n\n表 3-1. iOS 设备尺寸类别\n\n![image](img/Table3-1.jpg)\n\n你可以将所有尺寸类别的实现都放在一个\
    \ Storyboard 中！\n[/内容]"
- fmt: "回想一下iOS的`HelloMobile`应用——它只在iPhone竖屏模式下工作（参见[图2-14](#9781484204375_Ch02.xhtml#Fig14)），并且禁用了“尺寸等级”（Size\
    \ Classes）功能。现在你应该启用尺寸等级来演示其用法。请执行以下操作：\n\n1. 如[图3-9](#9781484204375_Ch03.xhtml#Fig9)所示，在**文件检查器**（File\
    \ Inspector）中（通过顶部两个指针指示的位置访问），启用**使用尺寸等级**（Use Size Classes，底部指针）。\n\n![9781484204375_Fig03-09.jpg](images/9781484204375_Fig03-09.jpg)\n\
    \n[图3-9](#9781484204375_Ch03.xhtml#_Fig9). 启用使用尺寸等级\n\n2. 使用**助理编辑器**（Assistant\
    \ Editor）预览iPhone和iPad屏幕。尺寸等级一开始可能会让人不知所措，但我发现预览功能非常有帮助（参见[图3-10](#9781484204375_Ch03.xhtml#Fig10)）。\n\
    \    1. 场景被转换为最具适应性的尺寸等级：(`wAny hAny`)。自动布局约束也在此尺寸等级中保留。你可以立即看到iPad场景按预期工作。\n\n\
    ![9781484204375_Fig03-10.jpg](images/9781484204375_Fig03-10.jpg)\n\n[图3-10](#9781484204375_Ch03.xhtml#_Fig10).\
    \ 尺寸等级预览\n\n3. 点击**尺寸等级**控件来选择尺寸等级（参见[图3-11](#9781484204375_Ch03.xhtml#Fig11)）。\n\
    \    1. 将鼠标悬停，可以看到高亮和标题的变化。与[表3-1](#9781484204375_Ch03.xhtml#Tab1)进行比较，你可以选择针对特定尺寸等级的行和列。默认是**任意宽度\
    \ | 任意高度**（Any Width | Any Height），它最开始适用于所有尺寸等级。\n\n![9781484204375_Fig03-11.jpg](images/9781484204375_Fig03-11.jpg)\n\
    \n[图3-11](#9781484204375_Ch03.xhtml#_Fig11). 使用尺寸等级选择器选择特定的尺寸等级\n\n4. 要为iPhone横屏场景提供特定布局，请选择**紧凑宽度\
    \ | 紧凑高度**（Compact Width | Compact Height），如[图3-12](#9781484204375_Ch03.xhtml#Fig12)所示。\n\
    \n![9781484204375_Fig03-12.jpg](images/9781484204375_Fig03-12.jpg)\n\n[图3-12](#9781484204375_Ch03.xhtml#_Fig12).\
    \ 横屏模式下的iPhone使用**紧凑宽度 | 紧凑高度**\n\n5. 为了演示强大的尺寸等级功能，请为紧凑-紧凑尺寸等级重新开始。从顶部菜单栏中，依次选择**编辑器**（Editor）![image](images/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**清除视图控制器中的约束**（Clear Constraints in View Controller）。这只会清除所选尺寸等级中的自动布局约束；你可以看到约束仍然存在，但已变为灰色。\n\
    6. 拖曳控件以重新定位它们，快速构思即可——你不需要精确对齐（参见[图3-13](#9781484204375_Ch03.xhtml#Fig13)）。\n\
    \    1. 既然你正在为横屏模式下的iPhone显式提供自定义布局，你其实可以精确地绘制位置，然后通过从顶部菜单栏依次选择**编辑器**（Editor）![image](images/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**重置为视图控制器中的建议约束**（Reset to Suggested Constraints in View\
    \ Controller），让故事板完成其余工作。\n    2. 如果你尝试了上一步，请再次选择**清除视图控制器中的约束**（Clear Constraints\
    \ in View Controller），以便为创建自动布局约束提供一个干净的起点。\n\n![9781484204375_Fig03-13.jpg](images/9781484204375_Fig03-13.jpg)\n\
    \n[图3-13](#9781484204375_Ch03.xhtml#_Fig13). 紧凑高度（iPhone横屏模式）的双面视图\n\n7. 对于`TextField`，添加以下自动布局约束：\n\
    \    1. 使用**容器中水平居中**（Horizontal Center in Container）创建一个X轴对齐约束，**倍率**（Multiplier）设置为**2**。\n\
    \    2. 使用**容器中垂直居中**（Vertical Center in Container）创建一个Y轴对齐约束，**倍率**（Multiplier）设置为**1.5**。\n\
    \    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](images/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n    4. 要更新现有约束，可以从故事板导航器中选择约束，或者先在场景中选择控件，然后看到并点击故事板场景中的引导线。使用**实用工具**（Utility）区域中的**属性检查器**（Attributes\
    \ Inspector）（参见[图3-14](#9781484204375_Ch03.xhtml#Fig14)）来更新任何约束属性。\n\n![9781484204375_Fig03-14.jpg](images/9781484204375_Fig03-14.jpg)\n\
    \n[图3-14](#9781484204375_Ch03.xhtml#_Fig14). 更新自动布局约束\n\n8. 对于`Label`，按照步骤7中的相同方式添加以下自动布局约束：\n\
    \    1. 使用**容器中水平居中**（Horizontal Center in Container）创建一个X轴对齐约束，**倍率**（Multiplier）设置为**2**。\n\
    \    2. 使用**容器中垂直居中**（Vertical Center in Container）创建一个Y轴对齐约束，**倍率**（Multiplier）设置为**0.75**。\n\
    \    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](images/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n9. 对于`Button`，按照步骤7中的相同方式添加以下自动布局约束：\n\
    \    1. 使用**容器中水平居中**（Horizontal Center in Container）创建一个X轴对齐约束，**倍率**（Multiplier）设置为**0.67**。\n\
    \    2. 使用**容器中垂直居中**（Vertical Center in Container）创建一个Y轴对齐约束，**倍率**（Multiplier）设置为**1**。\n\
    \    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](images/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n\n预览中的所有设备类别看起来都符合预期（[图3-15](#9781484204375_Ch03.xhtml#Fig15)）。\n\
    \n![9781484204375_Fig03-15.jpg](images/9781484204375_Fig03-15.jpg)\n\n[图3-15](#9781484204375_Ch03.xhtml#_Fig15).\
    \ 在故事板编辑器中预览的设备类别\n\n你可以运行所有模拟器中的应用来查看实际效果。iPhone 4s模拟器如[图3-16](#9781484204375_Ch03.xhtml#Fig16)所示。\n\
    \n![9781484204375_Fig03-16.jpg](images/9781484204375_Fig03-16.jpg)\n\n[图3-16](#9781484204375_Ch03.xhtml#_Fig16).\
    \ iPhone4s竖屏和横屏尺寸等级\n\n## 内容视图控制器\n\n### Android类比\n\n`Fragment`。\n\n内容视图控制器参与者与内容视图配对（参见[**图3-1**](#9781484204375_Ch03.xhtml#Fig1)）。在iOS和Android编程范式中，内容视图通常静态创建（即通过`layout.xml`或故事板）。内容视图控制器类管理内容视图，通过向用户传递信息并与之交互来呈现用户界面的动态行为。你通常在Android中继承`Fragment`来创建你的内容视图控制器。在iOS中，你创建一个继承自`UIViewController`的类以达到相同目的。\n\
    \n你的主要内容视图控制器任务是：\n\n*   与其自身的内容视图配对\n*   保持对内容视图中UI控件的对象引用\n*   实现响应控件事件的方法。\n\
    \n在iOS中，你通常使用故事板编辑器将UI控件或事件连接到你的代码，以简化这些常见的编程任务。\n\n## 与内容视图配对\n\n### Android类比\n\
    \n在`Fragment.onCreateView(...)`中填充`layout.xml`文件。\n\n在iOS中，你通常首先为你的应用创建一个故事板（就像iOS的`HelloMobile`项目）。通常，对于每个故事板场景（内容视图），你创建一个继承自`UIViewController`的Swift类与之配对。\n\
    \niOS的`HelloMobile`项目尚未完成：它只渲染了初始屏幕，但当你点击`Hello...`按钮时什么也不做。你需要一个能够履行此职责的功能性内容视图控制器。**单视图应用**（Single\
    \ View Application）模板已经为你配对了一个控制器类：`ViewController.swift`。为了完整演示这个主题，请勿使用此类；而是执行以下操作来创建我们自己的类：\n\
    \n1. 为新的Swift类创建一个新文件：\n\n   1. 右键点击**导航器**（Navigator）区域中的`HelloMobile`文件夹，然后依次选择**新建文件...**（New\
    \ File ...）![image](images/arrow.jpg)**iOS** ![image](images/arrow.jpg)**源**（Source）![image](images/arrow.jpg)**Swift文件**（Swift\
    \ File）（参见[图2-3](#9781484204375_Ch02.xhtml#Fig3)）。\n     2. 将文件保存为`HelloViewController.swift`。\n\
    \     3. 创建继承自`UIViewController`的`HelloViewController`类，如[代码清单3-1](#9781484204375_Ch03.xhtml#list1)所示。\n\
    \n[***代码清单3-1***](#9781484204375_Ch03.xhtml#_list1). `HelloViewController`类框架"
  raw: "Recall the iOS `HelloMobile` app—it only works in iPhone portrait mode (see\
    \ [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14)) and it disabled the Size Classes\
    \ feature. Now you should enable Size classes to demonstrate its use. Do the following:\n\
    \n1.  As shown in [Figure 3-9](#9781484204375_Ch03.xhtml#Fig9), enable the **Use\
    \ Size Classes** (bottom pointer) in the **File Inspector** (accessed as shown\
    \ by the top two pointers).\n\n![9781484204375_Fig03-09.jpg](images/9781484204375_Fig03-09.jpg)\n\
    \n[Figure 3-9](#9781484204375_Ch03.xhtml#_Fig9). Enabling Use Size Classes\n\n\
    2.  Use **Assistant Editor** to preview iPhone and iPad screens. Size Classes\
    \ could be overwhelming in the beginning, but I found the previews very helpful\
    \ (see [Figure 3-10](#9781484204375_Ch03.xhtml#Fig10)).\n    1.  The scenes are\
    \ converted to the most adaptive size class: (`wAny hAny`). The Auto Layout constraints\
    \ are also preserved in this size class. You immediately get the iPad scene working\
    \ as expected.\n\n![9781484204375_Fig03-10.jpg](images/9781484204375_Fig03-10.jpg)\n\
    \n[Figure 3-10](#9781484204375_Ch03.xhtml#_Fig10). Size Classes preview\n\n3.\
    \  Click the **Size Class** control to select the size class (see [Figure 3-11](#9781484204375_Ch03.xhtml#Fig11)).\n\
    \    1.  Hover your mouse to see the highlight and title changes. Comparing with\
    \ [Table 3-1](#9781484204375_Ch03.xhtml#Tab1), you can select the appropriate\
    \ row and column that targets specific size classes. The default is **Any Width\
    \ | Any Height**, which is applied to all the size classes to start with.\n\n\
    ![9781484204375_Fig03-11.jpg](images/9781484204375_Fig03-11.jpg)\n\n[Figure 3-11](#9781484204375_Ch03.xhtml#_Fig11).\
    \ Using the size class selector to select a specific size class\n\n4.  To provide\
    \ a specific layout for an iPhone landscape scene, select the **Compact Width\
    \ | Compact Height** as shown in [Figure 3-12](#9781484204375_Ch03.xhtml#Fig12).\n\
    \n![9781484204375_Fig03-12.jpg](images/9781484204375_Fig03-12.jpg)\n\n[Figure\
    \ 3-12](#9781484204375_Ch03.xhtml#_Fig12). **Compact Width | Compact Height**\
    \ for iPhones in landscape\n\n5.  To demonstrate the powerful Size Class feature,\
    \ start fresh for the compact-compact size class. From the top menu bar, select\
    \ **Clear Constraints in View Controller** from **Editor ![image](images/arrow.jpg)\
    \ Resolve Auto Layout Issues**. This only clears the Auto Layout constraints in\
    \ the selected size class; you can see the constraints still there but grayed\
    \ out.\n6.  Drag the widgets to reposition them, just to get a quick idea—you\
    \ don’t need to be precise (see [Figure 3-13](#9781484204375_Ch03.xhtml#Fig13)).\n\
    \    1.  Since you are providing a custom layout explicitly for iPhones in landscape,\
    \ you actually can draw the positions precisely and let storyboard do the rest\
    \ by choosing **Reset to Suggested Constraints in View Controller** in the top\
    \ menu bar from **Editor ![image](images/arrow.jpg) Resolve Auto Layout Issues**.\n\
    \    2.  If you tried the preceding step, select **Clear Constraints in View Controller**\
    \ again to have a clean start for creating Auto Layout constraints.\n\n![9781484204375_Fig03-13.jpg](images/9781484204375_Fig03-13.jpg)\n\
    \n[Figure 3-13](#9781484204375_Ch03.xhtml#_Fig13). Two-sided view for compact\
    \ height (iPhone landscape mode)\n\n7.  For the `TextField`, add the following\
    \ Auto Layout constraints:\n    1.  Use **Horizontal Center in Container** to\
    \ create an x-alignment constraint with **Multiplier**, **2**.\n    2.  Use **Vertical\
    \ Center in Container** to create a y-alignment constraint with **Multiplier**,\
    \ **1.5**.\n    3.  From the top menu bar, select Update Frame at **Editor ![image](images/arrow.jpg)\
    \ Resolve Auto Layout Issues**.\n    4.  To update the existing constraints, either\
    \ select the constraint from the storyboard navigator, or select the widget on\
    \ the scene first to see and click on the guided line in the storyboard scene.\
    \ Use **Attributes Inspector** in the **Utility** area (see [Figure 3-14](#9781484204375_Ch03.xhtml#Fig14))\
    \ to update any constraint attribute.\n\n![9781484204375_Fig03-14.jpg](images/9781484204375_Fig03-14.jpg)\n\
    \n[Figure 3-14](#9781484204375_Ch03.xhtml#_Fig14). Updating the Auto Layout constraint\n\
    \n8.  For the `Label`, add the following Auto Layout constraints in the same way\
    \ as in step 7:\n    1.  Use **Horizontal Center in Container** to create an x-alignment\
    \ constraint with **Multiplier, 2**.\n    2.  Use **Vertical Center in Container**\
    \ to create a y-alignment constraint with **Multiplier, 0.75**.\n    3.  From\
    \ the top menu bar, select **Update Frame** at **Editor ![image](images/arrow.jpg)\
    \ Resolve Auto Layout Issues**.\n9.  For the `Button`, add the following Auto\
    \ Layout constraints in the same way as in step 7:\n    1.  Use **Horizontal Center\
    \ in Container** to create an x-alignment constraint with **Multiplier, 0.67**.\n\
    \    2.  Use **Vertical Center in Container** to create a y-alignment constraint\
    \ with **Multiplier, 1**.\n    3.  From the top menu bar, select **Update Frame**\
    \ at **Editor ![image](images/arrow.jpg) Resolve Auto Layout Issues**.\n\nAll\
    \ the device classes in previews look good as expected ([Figure 3-15](#9781484204375_Ch03.xhtml#Fig15)).\n\
    \n![9781484204375_Fig03-15.jpg](images/9781484204375_Fig03-15.jpg)\n\n[Figure\
    \ 3-15](#9781484204375_Ch03.xhtml#_Fig15). Device classes previewed in the storyboard\
    \ editor\n\nYou can run the app in all emulators to see the work in action. The\
    \ iPhone 4s emulator is shown in [Figure 3-16](#9781484204375_Ch03.xhtml#Fig16).\n\
    \n![9781484204375_Fig03-16.jpg](images/9781484204375_Fig03-16.jpg)\n\n[Figure\
    \ 3-16](#9781484204375_Ch03.xhtml#_Fig16). iPhone4s portrait and landscape size\
    \ class\n\nContent View Controller\n\nANDROID ANALOGY\n\nFragment.\n\nThe Content\
    \ View Controller participant pairs with a content view (see [**Figure 3-1**](#9781484204375_Ch03.xhtml#Fig1)).\
    \ In both the iOS and Android programming paradigms, the content view normally\
    \ is created statically (i.e., by `layout.xml` or storyboard). The Content View\
    \ Controller class manages the content view to present the dynamic behavior of\
    \ the user interface by conveying information to and interacting with users. You\
    \ normally subclass `Fragment` to create your Content View Controllers in Android.\
    \ In iOS, you create a class subclassing from `UIViewController` for the same\
    \ purpose.\n\nYour primary Content View Controller tasks are:\n\n*   Pair with\
    \ its own content view\n*   Keep object references to the UI widgets in content\
    \ view\n*   Implement methods to respond to widget events.\n\nIn iOS, you normally\
    \ use the storyboard editor to connect the UI widgets or events to your code to\
    \ facilitate these common programming tasks.\n\nPair with Content View\n\nANDROID\
    \ ANALOGY\n\nInflate the `layout.xml` file in `Fragment.onCreateView(...)`.\n\n\
    In iOS, you normally create a storyboard for your apps first (like the iOS `HelloMobile`\
    \ project). Generally, for every storyboard scene (content view), you create a\
    \ Swift class subclassed from `UIViewController` to pair with it.\n\nThe iOS `HelloMobile`\
    \ project is not completed yet: it only renders the initial screen but does not\
    \ do anything when you click on the `Hello...` button. You need a functional Content\
    \ View Controller that can fulfill this responsibility. The **Single View Application**\
    \ Template pairs a controller class for you already: `ViewController.swift`. To\
    \ demonstrate the whole subject, don’t use this class; instead, do the following\
    \ to create our own class:\n\n1.  Create a new file for a new Swift class:\n\n\
    1.  Right-click on the `HelloMobile` folder in the **Navigator** area, then select\
    \ **New File ... ![image](images/arrow.jpg) iOS ![image](images/arrow.jpg) Source\
    \ ![image](images/arrow.jpg) Swift File** (see [Figure 2-3](#9781484204375_Ch02.xhtml#Fig3)).\n\
    \    2.  Save the file as `HelloViewController.swift`.\n    3.  Create the `HelloViewController`\
    \ class subclassed from `UIViewController` as shown in [Listing 3-1](#9781484204375_Ch03.xhtml#list1).\n\
    \n[***Listing 3-1***](#9781484204375_Ch03.xhtml#_list1). `HelloViewController`\
    \ Class Skeleton"
  trans: "\n回想一下 iOS 的`HelloMobile`应用——它只在 iPhone 竖屏模式下工作（参见图 2-14），并且禁用了“尺寸等级”（Size\
