  trans: "\n`Main.storyboard`，从**Object Library**拖动一个`UIImageView`到`view`，并将其放置在`UIProgressView`下方，如\
    \ Figure 4-25 所示。  \n3.  在**Attributes Inspector**中更新其属性：  \n    1.  Image：**pdf**\
    \  \n    2.  Mode：**Aspect Fit**  \n    3.  其他选择如 Figure 4-25 所示。  \n\n![9781484204375_Fig04-25.jpg](img/9781484204375_Fig04-25.jpg)\
    \  \nFigure 4-25. `UIImageView`属性  \n\n4.  打开**Assistant Editor**，在**Connections\
    \ Inspector**中将`IBOutlet`连接到代码。Listing 4-12 演示了一个简单的`setImage(...)`方法，该方法将`UIImage`对象赋值给`UIImageView`。\
    \  \n\n***[Listing 4-12]***. `UISwitch` `IBOutlet`  \n```  \nclass ViewController:\
