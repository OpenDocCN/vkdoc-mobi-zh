    4-28](#9781484204375_Ch04.xhtml#_Fig28). `UIBarButtonItem` attributes           3.  Open
    **Assistant Editor** and connect the `IBAction` in the `UIBarButtonItem` **Connections
    Inspector** to your code (see [Listing 4-13](#9781484204375_Ch04.xhtml#list13)).    [***Listing
    4-13***](#9781484204375_Ch04.xhtml#_list13). `UIBarButtonItem IBOutlet` and `IBAction`    ```
    class ViewController: ...{   ...   @IBAction func doBarButtonAction(sender: AnyObject)
    {     println(">>doBarButtonAction")   }   ... ```    Action Sheet    ANDROID
    ANALOGY    Context Menu or `android.widget.PopupMenu`.    In Android, the `Context
    Menu` is a floating menu that appears when the user right-clicks an element. The
    operations and look and feel establish a strong relationship to the context that
    originates the operations. On the iPad, you may safely choose `UIPopoverController`
    (see [Chapter 3](#9781484204375_Ch03.xhtml), `UIPopoverController`) to present
    the list of selections, which on the iPhone is automatically presented as full
    screen.    If you don’t want to use full screen, perhaps for a smaller selection,
    you can also choose `UIActionSheet`, which is presented as popover for iPad, in
