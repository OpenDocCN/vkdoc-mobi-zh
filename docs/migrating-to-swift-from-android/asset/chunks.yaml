  trans: "\n1.  启动 Xcode，并使用通常的**单视图应用**模板创建一个新应用，并将其命名为 `MasterDetail`。\n    1. \
    \ 你会获得一个 `ViewController` 类，该类已与 `Main.storyboard` 中的一个场景配对。请使用这个配对作为详情视图屏幕。\n\
    2.  创建主列表故事板场景，并绘制一条连线（Segue）来连接两个场景。图 3-38 展示了故事板的最终效果。\n    1.  从**对象库**中拖拽一个\
    \ `UITableViewController`，并将其放置在故事板编辑器中。\n    2.  创建一个从 `UITableViewController`\
    \ 指向详情视图控制器的“手动连线”（Manual Segue），过渡类型为“显示”（Show）（参见图 3-25）。务必为连线设置一个标识符，例如 `detail`（参见图\
    \ 3-24）。\n3.  在 `UITableViewController` 场景中选择“表格视图单元格”（Table View Cell），然后打开**属性检查器**进行配置（参见图\
    \ 3-38 中的指示）：\n    1.  样式：选择 `Basic`（或选择其他样式以在编辑器中查看其效果）。\n    2.  标识符：输入 `mycell`。务必为其设置一个标识符。你需要用它来创建可重用的单元格，就像\
    \ Android 中的循环列表项（recycled list item）一样。\n    3.  附件：选择 `Detail`。\n    4.  可选地，你可以添加一个\
    \ `image` 来显示左侧的图标。\n\n![9781484204375_Fig03-38.jpg](img/9781484204375_Fig03-38.jpg)\n\
    \n图 3-38。`TableViewCell` 属性\n\n4.  将 `UITableViewController` 嵌入到导航控制器中（参见导航栈中的图\
    \ 3-33）。你通常会使用导航栈模式来实现屏幕转换。\n5.  在导航控制器的**属性检查器**中勾选**是初始场景**（参见图 3-39），以使导航控制器成为此应用的起始视图控制器。\n\
    \n![9781484204375_Fig03-39.jpg](img/9781484204375_Fig03-39.jpg)\n\n图 3-39。`MasterDetail`\
    \ 故事板\n\n6.  在 `ViewController.swift` 文件中创建一个 `MasterTableViewController` Swift\
    \ 类，如代码清单 3-6 所示。\n    1.  让 `MasterTableViewController` 继承自 `UITableViewController`。\n\
    \    2.  在**身份检查器**中将这个 `MasterTableViewController` 类与“表格视图控制器”场景关联起来（参见图 3-17）。\n\
    \n***代码清单 3-6***。`MasterListTableViewController` 类\n\n```\nclass MasterTableViewController\
    \ : UITableViewController {\n  // TODO\n}\n```\n\n**注意** 在 Swift 中，类不需要放在自己的文件中。我将它放在已有的\
    \ `ViewController.swift` 文件里，并没有什么特别的原因。如果你习惯了 Java 的方式，可以创建一个新文件来存放这个类。\n\n`UITableViewDataSource`\n\
    \n安卓类比\n\n`android.widget.Adapter`\n\n为了填充表格视图中的项目，你需要实现一个“数据源”（Data Source）：通过重写在\
    \ `UITableViewDataSource` 协议中定义的方法，为 `TableViewCell` 提供数据（见代码清单 3-7）。请在 `MasterDetail`\
    \ 项目中执行以下操作：\n\n1.  实现 `tableView(tableView, numberOfRowsInSection)` 方法，返回 `tableView`\
    \ 中项目的数量。\n2.  实现 `tableView(tableView, cellForRowAtIndexPath)` 方法，返回 `tableViewCell`\
    \ 实例。\n\n***代码清单 3-7***。实现 `UITableViewDataSource` 协议\n\n```\nclass MasterTableViewController\
    \ : UITableViewController {\n  var items = [\"item 1\", \"item 2\", \"item 3\"\
    ]\n\noverride func tableView(tableView: UITableView, numberOfRowsInSection section:\
    \ Int) -> Int {\n    return self.items.count\n  }\n\noverride func tableView(tableView:\
    \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
    \ {\n    var cell = tableView.dequeueReusableCellWithIdentifier(\"mycell\") as\
    \ UITableViewCell\n    cell.textLabel.text = self.items[indexPath.row]\n    return\
    \ cell\n  }\n}\n```\n\n**注意** 使用 `dequeueReusableCellWithIdentifier(...)` 来实现视图的复用。这是处理大量项目时节省内存的非常常见的模式，iOS\
    \ 通过提供这个方法使其变得简单。请确保你在故事板中指定了单元格标识符。\n\n`UITableViewDelegate`\n\n安卓类比\n\n`ListFragment.onListItemClick(...)`\n\
    \n为了处理表格视图项目选中事件，请重写 `UITableViewDelegate.tableView(tableView, didSelectRowAtIndexPath)`\
    \ 方法（见代码清单 3-8）：\n\n1.  实现 `UITableViewDelegate.didSelectRowAtIndexPath(...)`\
    \ 来执行连线（segue）。\n2.  实现一个 `prepareForSegue(...)` 回调，将数据传递给详情视图控制器（详细参见 **代码清单\
    \ 3-5**）。\n\n***代码清单 3-8***。实现 `UITableViewDelegate`\n\n```\n    class MasterTableViewController\
    \ : UITableViewController {\n      ...\n      override func tableView(tableView:\
    \ UITableView, didSelectRowAtIndexPath indexPath: NSIndexPath) {\n        self.performSegueWithIdentifier(\"\
    detail\", sender: indexPath.row)\n      }\n\noverride func prepareForSegue(segue:\
    \ UIStoryboardSegue, sender: AnyObject?) {\n        var destVc = segue.destinationViewController\
    \ as UIViewController\n        destVc.navigationItem.title = self.items[sender\
    \ as Int]\n      }\n    ```\n\n3.  若要添加或删除项目，你需要显式刷新表格视图：\n    1.  将一个**栏按钮项**拖拽到导航栏上，并绘制一个\
    \ `IBAction` 来创建 `doAdd()` 方法（图 3-40）。\n\n![9781484204375_Fig03-40.jpg](img/9781484204375_Fig03-40.jpg)\n\
    \n图 3-40。导航栏右侧按钮\n\n2.  当点击“添加”按钮时，为了实现添加项目，请按代码清单 3-9 所示实现 `doAdd()` 方法。请确保在主线程中调用\
    \ `TableView.reloadData()` 来刷新表格视图，就像 Android 中 `notifyDataSetChanged()` 所做的那样。\n\
    \n***代码清单 3-9***。刷新表格视图\n\n```\n    class MasterTableViewController : UITableViewController\
    \ {\n      var items = [\"item 1\", \"item 2\", \"item 3\"]\n\n@IBAction func\
    \ doAdd(sender: AnyObject) {\n        self.items.append(\"item \\(self.items.count\
    \ + 1)\")\n        self.tableView.reloadData()\n      }\n      ...\n    ```\n\n\
    构建并运行（![image](img/flower.jpg)+R）这个应用，即可实时看到 `MasterDetail` iOS 应用的效果（参见图 3-41）。\n\
    \n![9781484204375_Fig03-41.jpg](img/9781484204375_Fig03-41.jpg)\n\n图 3-41。iOS\
    \ 中的 `MasterDetail` 应用屏幕\n\n`UITableView`\n\n安卓类比\n\n`android.widget.ListView`\n\
    \n就像 Android 的 `ListFragment` 类（它是一个包含 `ListView` 的 `Fragment`）一样，`UITableViewController`\
    \ 是一个常规的 `UIViewController`，其中预置了一个 `tableView`。你将面临同样的选择：是否使用 `UITableViewController`，这可以为你简化一些代码（依我看，实际上简化得并不多）。更多时候，我会选择执行以下操作，而不是使用\
    \ `UITableViewController`：\n"
- fmt: "1.  In storyboard, create a regular View Controller with `TableView`:\n  \
    \  1.  Add a regular `ViewController` scene.\n    2.  Add a `TableView` to the\
    \ scene. This gives you more flexibility (i.e., to draw the table view at any\
    \ location).\n    3.  Connect the table view to an `IBOutlet` (see [Figure 3-20](#9781484204375_Ch03.xhtml#Fig20)\
    \ for details).\n    4.  Select the `TableView` and connect `delegate` and `dataSource`\
    \ outlets to the `ViewController` in **Connection Inspector**.\n2.  Create a Swift\
    \ class to pair with the content view:\n    1.  Subclass from the regular `UIViewController`\
    \ class.\n    2.  Implement `UITableViewDataSource` and `UITableViewDelegate`\
    \ protocols.\n\nThe previous `MasterTableViewController` is essentially equivalent\
    \ to the code in [Listing 3-10](#9781484204375_Ch03.xhtml#list10), and you still\
    \ implement the same methods declared in `UITableViewDataSource` and `UITableViewDelegate`.\n\
    \n[***Listing 3-10***](#9781484204375_Ch03.xhtml#_list10). Explicitly Implement\
    \ Table View Protocols\n\n```\nclass MasterTableViewController : UIViewController,\
    \ UITableViewDataSource, UITableViewDelegate {\n  @IBOutlet weak var tableView:\
    \ UITableView!\n  ...\n```\n\n## UITableViewCell\n\n**ANDROID ANALOGY**\n\n`R.id.simple_list_item_1`\
    \ from Android SDK, or create custom list item layout.\n\nSimilar to Android list-view\
    \ item usages, you get some free types of `UITableViewCell` that you can select\
    \ from iOS SDK. Previously in the `MasterDetail` project, we selected the **Basic**\
    \ style, which gives you one `textLabel` in the Table View cell (see [Figure 3-38](#9781484204375_Ch03.xhtml#Fig38)).\
    \ **Right Details**, **Left Details**, or **Subtitle** styles all give you a second\
    \ label called `detailedTextLabel`. You can also set a left image icon and other\
    \ `TableViewCell` attributes as shown in [Figure 3-38](#9781484204375_Ch03.xhtml#Fig38).\n\
    \nYou may programmatically configure `TableViewCell` using the `tableView(cellForRowAtIndexPath:)`\
    \ method. [Listing 3-11](#9781484204375_Ch03.xhtml#list11) shows a typical example:\n\
    \n[***Listing 3-11***](#9781484204375_Ch03.xhtml#_list11). `TableViewCell` Properties\n\
    \n```\noverride func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n  var cell = ...\n  cell.textLabel.text =\
    \ self.items[indexPath.row]\n  cell.detailTextLabel.text = \"some detail label\"\
    \n  cell.imageView.image = UIImage(named: \"pointer.png\")\n  cell.accessoryType\
    \ = UITableViewCellAccessoryType.DetailButton\n  return cell\n}\n```\n\nYou can\
    \ also choose “**Custom**” style, and draw the cell freely using storyboard; you\
    \ will do so in the next section.\n\n## UICollectionView\n\n**ANDROID ANALOGY**\n\
    \n`GridView`.\n\nIn Android, `GridView` is just a variant of the master-detail\
    \ drilldown pattern using a different UI widget to show the master list. However,\
    \ on tablets or large-screen devices, `GridView` is widely used due to greater\
    \ space efficiencies that use multiple columns to organize the master list items,\
    \ rather than a simple one-dimensional list. On iOS platforms, `UICollectionView`\
    \ comes to the rescue.\n\nIt would be a shame if you didn’t try this variant right\
    \ now, because it is a really useful widget that takes very little extra effort.\
    \ The key is the `UICollectionView` class.\n\n**Note** You can also use `UICollectionViewController`,\
    \ which contains a `UICollectionView` that occupies the whole scene by default.\
    \ Same choice: `UITableViewController` versus `UITableView`, which we discussed\
    \ earlier (see “`UITableView`” section).\n\nThe `MasterDetail` project you created\
    \ fits comfortably on an iPhone, but when it is running in iPad, it feels like\
    \ the space is not being utilized efficiently. Create a new Xcode project using\
    \ `UICollectionView` to demonstrate the usage:\n\n1.  Launch Xcode and create\
    \ a new application using the usual **Single View Application** template. Name\
    \ it `MasterGridDetail`.\n    1.  You get a scene in the `Main.storyboard` and\
    \ a `ViewController` class pair.\n    2.  Rename the class to `MasterViewController`\
    \ in both the `ViewController.swift` file and as the custom class name of the\
    \ view controller scene (see [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)).\n\
    \    3.  Drag a `Collection View` from the **Object Library** and drop it onto\
    \ the `MasterViewController` scene. Let it take up the whole space and pin **zero**\
    \ spacing to Superview in all four directions from the Xcode menu bar at **Editor\
    \ ![image](images/arrow.jpg) Pin ![image](images/arrow.jpg) ...** .\n    4.  Embed\
    \ the `MasterViewController` controller in the Navigation Controller (see [Figure\
    \ 3-33](#9781484204375_Ch03.xhtml#Fig33))\n2.  Select the `Collection View` in\
    \ storyboard to create connections in **Connections Inspector** as shown in [Figure\
    \ 3-42](#9781484204375_Ch03.xhtml#Fig42):\n    1.  Connect `dataSource` and `delegate`\
    \ outlets to the `MasterViewController`.\n    2.  Open **Assistant Editor** and\
    \ connect **New Referencing Outlet** to `MasterViewController` property. Name\
    \ it `mCollectionView`.\n\n![9781484204375_Fig03-42.jpg](images/9781484204375_Fig03-42.jpg)\n\
    \n[Figure 3-42](#9781484204375_Ch03.xhtml#_Fig42). `Collection View` `dataSource`,\
    \ `delegate`, and `IBOutlet` connections\n\n3.  Draw your own custom collection\
    \ view cell in storyboard:\n    1.  In **Attributes Inspector**, assign **Collection\
    \ Reusable View Cell Identifier** a value (i.e., `mycell`). There are some attributes\
    \ you can change safely in the **Attributes Inspector**, such as the **white**\
    \ background color.\n    2.  To change the size of the cell, select the parent\
    \ collection view and change the cell size to **150 × 150** in **Size Inspector**.\
    \ [Figure 3-43](#9781484204375_Ch03.xhtml#Fig43) shows other measurements that\
    \ you can set.\n\n![9781484204375_Fig03-43.jpg](images/9781484204375_Fig03-43.jpg)\n\
    \n[Figure 3-43](#9781484204375_Ch03.xhtml#_Fig43). Size Inspector\n\n3.  Add a\
    \ Label to the cell, make the font size bigger (i.e., **30**), center alignment,\
    \ and add Auto Layout constraints as shown in [Figure 3-44](#9781484204375_Ch03.xhtml#Fig44).\n\
    \n![9781484204375_Fig03-44.jpg](images/9781484204375_Fig03-44.jpg)\n\n[Figure\
    \ 3-44](#9781484204375_Ch03.xhtml#_Fig44). Drawing the collection view cell\n\n\
    4.  Create a custom Swift class for the collection view cell. [Listing 3-12](#9781484204375_Ch03.xhtml#list12)\
    \ shows the `SimpleCollectionViewCell` class:\n\n    1.  Create a swift class,\
    \ `SimpleCollectionViewCell`, subclassed from `UICollectionViewCell`.\n    2.\
    \  Select the collection view cell in storyboard and assign the `SimpleCollectionViewCell`\
    \ class in **Identity Inspector**.\n    3.  Open the **Assistant Editor** with\
    \ the `SimpleCollectionViewCell` class. In the **Connections Inspector**, connect\
    \ the **Referencing Outlet** to create an `IBOutlet`, and name it `textLabel`.\n\
    \n[***Listing 3-12***](#9781484204375_Ch03.xhtml#_list12). `SimpleCollectionViewCell`\
    \ class\n\n```\nclass SimpleCollectionViewCell : UICollectionViewCell {\n  @IBOutlet\
    \ weak var textLabel: UILabel!\n}\n```\n\n5.  Create the detail view controller\
    \ scene in storyboard as shown [Figure 3-45](#9781484204375_Ch03.xhtml#Fig45):\n\
    \    1.  Add a regular view controller from the **Object Library**.\n    2.  Create\
    \ a manual segue from the Master View Controller scene to the detailed view controller\
    \ with a `Show` transition type (see [Figure 3-25](#9781484204375_Ch03.xhtml#Fig25)).\
    \ Always enter a storyboard segue **Identifier** (i.e., `detail`).\n\n![9781484204375_Fig03-45.jpg](images/9781484204375_Fig03-45.jpg)\n\
    \n[Figure 3-45](#9781484204375_Ch03.xhtml#_Fig45). Creating the detail view controller\
    \ in `MasterDetail` storyboard"
  raw: "1.  In storyboard, create a regular View Controller with `TableView`:\n  \
    \  1.  Add a regular `ViewController` scene.\n    2.  Add a `TableView` to the\
    \ scene. This gives you more flexibility (i.e., to draw the table view at any\
    \ location).\n    3.  Connect the table view to an `IBOutlet` (see [Figure 3-20](#9781484204375_Ch03.xhtml#Fig20)\
    \ for details).\n    4.  Select the `TableView` and connect `delegate` and `dataSource`\
    \ outlets to the `ViewController` in **Connection Inspector**.\n2.  Create a Swift\
    \ class to pair with the content view:\n    1.  Subclass from the regular `UIViewController`\
    \ class.\n    2.  Implement `UITableViewDataSource` and `UITableViewDelegate`\
    \ protocols.\n\nThe previous `MasterTableViewController` is essentially equivalent\
    \ to the code in [Listing 3-10](#9781484204375_Ch03.xhtml#list10), and you still\
    \ implement the same methods declared in `UITableViewDataSource` and `UITableViewDelegate`.\n\
    \n[***Listing 3-10***](#9781484204375_Ch03.xhtml#_list10). Explicitly Implement\
    \ Table View Protocols\n\n```\nclass MasterTableViewController : UIViewController,\
    \ UITableViewDataSource, UITableViewDelegate {\n  @IBOutlet weak var tableView:\
    \ UITableView!\n  ...\n```\n\nUITableViewCell\n\nANDROID ANALOGY\n\n`R.id.simple_list_item_1`\
    \ from Android SDK, or create custom list item layout.\n\nSimilar to Android list-view\
    \ item usages, you get some free types of `UITableViewCell` that you can select\
    \ from iOS SDK. Previously in the `MasterDetail` project, we selected the **Basic**\
    \ style, which gives you one `textLabel` in the Table View cell (see [Figure 3-38](#9781484204375_Ch03.xhtml#Fig38)).\
    \ **Right Details**, **Left Details**, or **Subtitle** styles all give you a second\
    \ label called `detailedTextLabel`. You can also set a left image icon and other\
    \ `TableViewCell` attributes as shown in [Figure 3-38](#9781484204375_Ch03.xhtml#Fig38).\n\
    \nYou may programmatically configure `TableViewCell` using the `tableView(cellForRowAtIndexPath)`\
    \ method. [Listing 3-11](#9781484204375_Ch03.xhtml#list11) shows a typical example:\n\
    \n[***Listing 3-11***](#9781484204375_Ch03.xhtml#_list11). `TableViewCell` Properties\n\
    \n```\noverride func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n  var cell = ...\n  cell.textLabel.text = self.items[indexPath.row]\n\
      cell.detailTextLabel.text = \"some detail label\"\n  cell.imageView.image = UIImage(named:\
    \ \"pointer.png\")\n  cell.accessoryType = UITableViewCellAccessoryType.DetailButton\n\
      return cell\n}\n```\n\nYou can also choose “**Custom**” style, and draw the\
    \ cell freely using storyboard; you will do so in the next section.\n\nUICollectionView\n\
    \nANDROID ANALOGY\n\n`GridView`.\n\nIn Android, `GridView` is just a variant of\
    \ the master-detail drilldown pattern using a different UI widget to show the\
    \ master list. However, on tablets or large-screen devices, `GridView` is widely\
    \ used due to greater space efficiencies that use multiple columns to organize\
    \ the master list items, rather than a simple one-dimensional list. On iOS platforms,\
    \ `UICollectionView` comes to the rescue.\n\nIt would be a shame if you didn’t\
    \ try this variant right now, because it is a really useful widget that takes\
    \ very little extra effort. The key is the `UICollectionView` class.\n\n**Note**  You\
    \ can also use `UICollectionViewController`, which contains a `UICollectionView`\
    \ that occupies the whole scene by default. Same choice: `UITableViewController`\
    \ versus `UITableView`, which we discussed earlier (see “`UITableView`” section).\n\
    \nThe `MasterDetail` project you created fits comfortably on an iPhone, but when\
    \ it is running in iPad, it feels like the space is not being utilized efficiently.\
    \ Create a new Xcode project using `UICollectionView` to demonstrate the usage:\n\
    \n1.  Launch Xcode and create a new application using the usual **Single View\
    \ Application** template. Name it `MasterGridDetail`.\n    1.  You get a scene\
    \ in the `Main.storyboard` and a `ViewController` class pair.\n    2.  Rename\
    \ the class to `MasterViewController` in both the `ViewController.swift` file\
    \ and as the custom class name of the view controller scene (see [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)).\n\
    \    3.  Drag a `Collection View` from the **Object Library** and drop it onto\
    \ the `MasterViewController` scene. Let it take up the whole space and pin **zero**\
    \ spacing to Superview in all four directions from the Xcode menu bar at **Editor\
    \ ![image](images/arrow.jpg) Pin ![image](images/arrow.jpg) ...** .\n    4.  Embed\
    \ the `MasterViewController` controller in the Navigation Controller (see [Figure\
    \ 3-33](#9781484204375_Ch03.xhtml#Fig33))\n2.  Select the `Collection View` in\
    \ storyboard to create connections in **Connections Inspector** as shown in [Figure\
    \ 3-42](#9781484204375_Ch03.xhtml#Fig42):\n    1.  Connect `dataSource` and `delegate`\
    \ outlets to the `MasterViewController`.\n    2.  Open **Assistant Editor** and\
    \ connect **New Referencing Outlet** to `MasterViewController` property. Name\
    \ it `mCollectionView`.\n\n![9781484204375_Fig03-42.jpg](images/9781484204375_Fig03-42.jpg)\n\
    \n[Figure 3-42](#9781484204375_Ch03.xhtml#_Fig42). `Collection View dataSource`,\
    \ `delegate`, and `IBOutlet` connections\n\n3.  Draw your own custom collection\
    \ view cell in storyboard:\n    1.  In **Attributes Inspector**, assign **Collection\
    \ Reusable View Cell Identifier** a value (i.e., `mycell`). There are some attributes\
    \ you can change safely in the **Attributes Inspector**, such as the **white**\
    \ background color.\n    2.  To change the size of the cell, select the parent\
    \ collection view and change the cell size to **150 × 150** in **Size Inspector**.\
    \ [Figure 3-43](#9781484204375_Ch03.xhtml#Fig43) shows other measurements that\
    \ you can set.\n\n![9781484204375_Fig03-43.jpg](images/9781484204375_Fig03-43.jpg)\n\
    \n[Figure 3-43](#9781484204375_Ch03.xhtml#_Fig43). Size Inspector\n\n3.  Add a\
    \ Label to the cell, make the font size bigger (i.e., **30**), center alignment,\
    \ and add Auto Layout constraints as shown in [Figure 3-44](#9781484204375_Ch03.xhtml#Fig44).\n\
    \n![9781484204375_Fig03-44.jpg](images/9781484204375_Fig03-44.jpg)\n\n[Figure\
    \ 3-44](#9781484204375_Ch03.xhtml#_Fig44). Drawing the collection view cell\n\n\
    4.  Create a custom Swift class for the collection view cell. [Listing 3-12](#9781484204375_Ch03.xhtml#list12)\
    \ shows the `SimpleCollectionViewCell` class:\n\n1.  Create a swift class, `SimpleCollectionViewCell`,\
    \ subclassed from `UICollectionViewCell`.\n    2.  Select the collection view\
    \ cell in storyboard and assign the `SimpleCollectionViewCell` class in **Identity\
    \ Inspector**.\n    3.  Open the **Assistant Editor** with the `SimpleCollectionViewCell`\
    \ class. In the **Connections Inspector**, connect the **Referencing Outlet**\
    \ to create an `IBOutlet`, and name it `textLabel`.\n\n[***Listing 3-12***](#9781484204375_Ch03.xhtml#_list12).\
    \ `SimpleCollectionViewCell` class\n\n```\n    class SimpleCollectionViewCell\
    \ : UICollectionViewCell {\n      @IBOutlet weak var textLabel: UILabel!\n   \
    \ }\n    ```\n\n5.  Create the detail view controller scene in storyboard as shown\
    \ [Figure 3-45](#9781484204375_Ch03.xhtml#Fig45):\n    1.  Add a regular view\
    \ controller from the **Object Library**.\n    2.  Create a manual segue from\
    \ the Master View Controller scene to the detailed view controller with a `Show`\
    \ transition type (see [Figure 3-25](#9781484204375_Ch03.xhtml#Fig25)). Always\
    \ enter a storyboard segue **Identifier** (i.e., `detail`).\n\n![9781484204375_Fig03-45.jpg](images/9781484204375_Fig03-45.jpg)\n\
    \n[Figure 3-45](#9781484204375_Ch03.xhtml#_Fig45). Creating the detail view controller\
    \ in `MasterDetail` storyboard"
  trans: "\n1.  在故事板中，创建一个带有`TableView`的常规视图控制器：\n    1.  添加一个常规的`ViewController`场景。\n\
    \    2.  向场景中添加一个`TableView`。这能为你提供更大的灵活性（例如，可在任意位置绘制表格视图）。\n    3.  将该表格视图连接到一个`IBOutlet`（详见图\
    \ 3-20）。\n    4.  选中`TableView`，并在**连接检查器（Connection Inspector）**中，将`delegate`和`dataSource`出口连接到`ViewController`。\n\
    2.  创建一个 Swift 类来与内容视图配对：\n    1.  继承自常规的`UIViewController`类。\n    2.  实现`UITableViewDataSource`和`UITableViewDelegate`协议。\n\
    \n之前的`MasterTableViewController`本质上等同于代码清单 3-10 中的代码，你仍然需要实现`UITableViewDataSource`和`UITableViewDelegate`中声明的那些方法。\n\
    \n***代码清单 3-10***. 显式实现表格视图协议\n\n```\nclass MasterTableViewController : UIViewController,\
    \ UITableViewDataSource, UITableViewDelegate {\n  @IBOutlet weak var tableView:\
    \ UITableView!\n  ...\n```\n\n## UITableViewCell\n\n**Android 类比**\n\n使用 Android\
    \ SDK 中的 `R.id.simple_list_item_1`，或创建自定义列表项布局。\n\n与 Android 列表视图项的使用类似，你可以从 iOS\
    \ SDK 中选择一些免费的`UITableViewCell`类型。在之前的`MasterDetail`项目中，我们选择了**基本（Basic）**样式，这种样式会在表格视图单元格中提供一个`textLabel`（参见图\
    \ 3-38）。**右侧详情（Right Details）**、**左侧详情（Left Details）**或**副标题（Subtitle）**样式都会提供第二个标签，名为`detailedTextLabel`。你还可以设置左侧图像图标以及`TableViewCell`的其他属性，如图\
    \ 3-38 所示。\n\n你可以通过`tableView(cellForRowAtIndexPath:)`方法以编程方式配置`TableViewCell`。代码清单\
    \ 3-11 展示了一个典型示例：\n\n***代码清单 3-11***. `TableViewCell`属性\n\n```\noverride func\
    \ tableView(tableView: UITableView, cellForRowAtIndexPath indexPath: NSIndexPath)\
    \ -> UITableViewCell {\n  var cell = ...\n  cell.textLabel.text = self.items[indexPath.row]\n\
    \  cell.detailTextLabel.text = \"some detail label\"\n  cell.imageView.image =\
    \ UIImage(named: \"pointer.png\")\n  cell.accessoryType = UITableViewCellAccessoryType.DetailButton\n\
    \  return cell\n}\n```\n\n你也可以选择“**自定义（Custom）**”样式，并使用故事板自由绘制单元格；下一节你将进行此操作。\n\
    \n## UICollectionView\n\n**Android 类比**\n\n`GridView`。\n\n在 Android 中，`GridView`只是主从钻取模式的一种变体，它使用不同的\
    \ UI 控件来展示主列表。然而，在平板或大屏设备上，`GridView`被广泛使用，因为它通过多列来组织主列表项，而非简单的一维列表，从而提高了空间利用率。在\
    \ iOS 平台上，`UICollectionView`正好能解决这个问题。\n\n如果你现在不尝试这种变体，那将是一种遗憾，因为它是一个非常实用的控件，并且几乎不需要额外花费什么精力。关键就在于`UICollectionView`类。\n\
    \n**注意** 你也可以使用`UICollectionViewController`，它默认包含一个占据整个场景的`UICollectionView`。这与我们之前讨论过的`UITableViewController`和`UITableView`的选择类似（参见“`UITableView`”部分）。\n\
    \n你创建的`MasterDetail`项目在 iPhone 上运行自如，但在 iPad 上运行时，会感觉空间没有被有效利用。创建一个使用`UICollectionView`的新\
    \ Xcode 项目来演示其用法：\n\n1.  启动 Xcode，并使用常规的**单视图应用（Single View Application）**模板创建一个新应用。将其命名为`MasterGridDetail`。\n\
    \    1.  你会得到`Main.storyboard`中的一个场景和一个`ViewController`类对。\n    2.  在`ViewController.swift`文件以及视图控制器场景的自定义类名中，将类重命名为`MasterViewController`（参见图\
    \ 3-17）。\n    3.  从**对象库（Object Library）**中拖拽一个`Collection View`，并将其放到`MasterViewController`场景上。让它占据整个空间，并通过\
    \ Xcode 菜单栏的**Editor ![image](img/arrow.jpg) Pin ![image](img/arrow.jpg) ...**\
    \ 将其到父视图（Superview）四个方向的间距都固定为**零**。\n    4.  将`MasterViewController`控制器嵌入导航控制器中（参见图\
    \ 3-33）。\n2.  选中故事板中的`Collection View`，在**连接检查器（Connections Inspector）**中创建连接，如图\
    \ 3-42 所示：\n    1.  将`dataSource`和`delegate`出口连接到`MasterViewController`。\n   \
    \ 2.  打开**助理编辑器（Assistant Editor）**，将**新建引用出口（New Referencing Outlet）**连接到`MasterViewController`的属性。将其命名为`mCollectionView`。\n\
    \n![9781484204375_Fig03-42.jpg](img/9781484204375_Fig03-42.jpg)\n\n图 3-42. `Collection\
    \ View`的`dataSource`、`delegate`和`IBOutlet`连接\n\n3.  在故事板中绘制你自己的自定义集合视图单元格：\n \
    \   1.  在**属性检查器（Attributes Inspector）**中，为**集合可重用视图单元格标识符（Collection Reusable\
    \ View Cell Identifier）**赋值（例如`mycell`）。你可以在**属性检查器**中安全地更改一些属性，比如**白色**背景色。\n\
    \    2.  要更改单元格的大小，请选中父级集合视图，并在**尺寸检查器（Size Inspector）**中将单元格大小更改为**150 × 150**。图\
    \ 3-43 显示了其他可以设置的尺寸参数。\n\n![9781484204375_Fig03-43.jpg](img/9781484204375_Fig03-43.jpg)\n\
    \n图 3-43. 尺寸检查器\n\n3.  向单元格添加一个标签，将字号调大（例如**30**），居中对齐，并添加自动布局约束，如图 3-44 所示。\n\
    \n![9781484204375_Fig03-44.jpg](img/9781484204375_Fig03-44.jpg)\n\n图 3-44. 绘制集合视图单元格\n\
    \n4.  为集合视图单元格创建一个自定义 Swift 类。代码清单 3-12 展示了`SimpleCollectionViewCell`类：\n\n  \
    \  1.  创建一个 Swift 类`SimpleCollectionViewCell`，继承自`UICollectionViewCell`。\n   \
    \ 2.  在故事板中选中集合视图单元格，并在**身份检查器（Identity Inspector）**中为其分配`SimpleCollectionViewCell`类。\n\
    \    3.  打开与`SimpleCollectionViewCell`类关联的**助理编辑器**。在**连接检查器**中，连接**引用出口（Referencing\
    \ Outlet）**以创建一个`IBOutlet`，并将其命名为`textLabel`。\n\n***代码清单 3-12***. `SimpleCollectionViewCell`类\n\
    \n```\nclass SimpleCollectionViewCell : UICollectionViewCell {\n  @IBOutlet weak\
    \ var textLabel: UILabel!\n}\n```\n\n5.  在故事板中创建详情视图控制器场景，如图 3-45 所示：\n    1.\
    \  从**对象库**中添加一个常规视图控制器。\n    2.  使用**Show**过渡类型，从主视图控制器场景到详情视图控制器创建一个手动转场（参见图\
    \ 3-25）。务必为故事板转场设置一个**标识符（Identifier）**（例如`detail`）。\n\n![9781484204375_Fig03-45.jpg](img/9781484204375_Fig03-45.jpg)\n\
    \n图 3-45. 在`MasterDetail`故事板中创建详情视图控制器\n"
- fmt: "6. `MasterViewController` must implement `UICollectionViewDataSource` and\
    \ `UICollectionViewDelegate` protocols (see [Listing 3-13](#9781484204375_Ch03.xhtml#list13)):\n\
    \   1. Implement `numberOfSectionsInCollectionView(collectionView:)` to return\
    \ the section number; it defaults to `1` if not implemented.\n   2. Implement\
    \ `collectionView(collectionView:, numberOfItemsInSection:)` to return number\
    \ of items in each section.\n   3. Implement `collectionView(collectionView:,\
    \ cellForItemAtIndexPath:)` to return the collection view cell instance.\n   4.\
    \ Implement `collectionView(collectionView:, didSelectItemAtIndexPath:)` to respond\
    \ to cell selection.\n\n[***Listing 3-13***](#9781484204375_Ch03.xhtml#_list13).\
    \ `UICollectionViewDataSource` and `UICollectionViewDelegate` Protocols\n\n```\n\
    class MasterViewController : UIViewController, UICollectionViewDataSource, UICollectionViewDelegate\
    \ {\n  ...\n  // implement UICollectionViewDataSource\n  var items = [\"item 1\"\
    , \"item 2\", \"item 3\", \"item 4\", \"item 5\", \"item 6\", \"item 7\"]\n  func\
    \ collectionView(collectionView: UICollectionView, numberOfItemsInSection section:\
    \ Int) -> Int {\n    return self.items.count\n  }\n\n// The cell that is returned\
    \ must be retrieved from a call to -dequeueReusableCellWithReuseIdentifier:forIndexPath:\n\
    \  func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\
    \ indexPath: NSIndexPath) -> UICollectionViewCell {\n    var cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"\
    cell\", forIndexPath: indexPath) as SimpleCollectionViewCell\n    cell.textLabel.text\
    \ = self.items[indexPath.row]\n    cell.backgroundColor = (indexPath.row % 2 ==\
    \ 0) ? UIColor.whiteColor() : UIColor.lightGrayColor()\n    return cell\n  }\n\
    \nfunc numberOfSectionsInCollectionView(collectionView: UICollectionView)\n  ->\
    \ Int {\n    return 1\n  }\n\n// implement UICollectionViewDelegate\n  func collectionView(collectionView:\
    \ UICollectionView, didSelectItemAtIndexPath indexPath: NSIndexPath) {\n    self.performSegueWithIdentifier(\"\
    detail\", sender: self)\n  }\n}\n```\n\nBoth `TableView` and `CollectionView`\
    \ are very versatile. You should look into the data source and delegate protocols\
    \ to see the rich options offered to developers. Build and run the `MasterGridDetail`\
    \ iOS app to see your code live in action as shown in [Figure 3-46](#9781484204375_Ch03.xhtml#Fig46).\n\
    \n![9781484204375_Fig03-46.jpg](images/9781484204375_Fig03-46.jpg)\n\n[Figure\
    \ 3-46](#9781484204375_Ch03.xhtml#_Fig46). Collection view\n\n## Navigation Tabs\n\
    \n### ANDROID ANALOGY\n\n#### Actionbar Navigation Tabs\n\nNavigation tabs are\
    \ another popular UX design pattern. Apple’s iOS Human Interface Guidelines suggest\
    \ using a tab bar to give users access to different perspectives on the same set\
    \ of data or on different subtasks related to the overall function of your app.\
    \ Each navigation tab is associated with a view controller. When the user selects\
    \ a specific tab, the associated view controller presents its own content view.\n\
    \nIn Android, you normally use `Actionbar`. [Figure 3-47](#9781484204375_Ch03.xhtml#Fig47)\
    \ shows an example; let’s translate it to iOS.\n\n![9781484204375_Fig03-47.jpg](images/9781484204375_Fig03-47.jpg)\n\
    \n[Figure 3-47](#9781484204375_Ch03.xhtml#_Fig47). Android `TabbedApp`\n\nThe\
    \ key in iOS is the Container View Controller, `UITabBarController` class. You\
    \ can use it as is most of the time. If you want to keep some application states\
    \ in the Container View Controller, simply subclass from it.\n\n### Implementing\
    \ Navigation Tabs\n\nThe following instructions walk you through the steps you\
    \ normally take to implement navigation tabs:\n\n1. Launch Xcode to create a new\
    \ app using **Single View Application** template, and name it `TabbedApp`.\n \
    \  1. You get an empty scene in the `Main.storyboard` and a `ViewController` class.\n\
    \   2. Rename the class to `FirstViewController` in both the `ViewController.swift`\
    \ file and the class name in **Identity Inspector** for the storyboard scene.\n\
    \   3. Draw the content view in the storyboard scene using the Android app as\
    \ your wireframe.\n2. You need the second content view and view controller pair.\n\
    \   1. You can copy, paste, and modify from the `FirstViewController` class. [Listing\
    \ 3-14](#9781484204375_Ch03.xhtml#list14) shows the `SecondViewController` class.\n\
    \n[***Listing 3-14***](#9781484204375_Ch03.xhtml#_list14). `SecondViewController`\
    \ Class\n\n```\nclass SecondViewController: UIViewController {\n  ...\n}\n```\n\
    \n3. You can copy, paste, and modify the storyboard scene in the storyboard editor,\
    \ too. Don’t forget to update the class name in **Identify Inspector**. [Figure\
    \ 3-48](#9781484204375_Ch03.xhtml#Fig48) shows that the storyboard has the Screen\
    \ One and Screen Two scenes.\n\n![9781484204375_Fig03-48.jpg](images/9781484204375_Fig03-48.jpg)\n\
    \n[Figure 3-48](#9781484204375_Ch03.xhtml#_Fig48). First and second scenes in\
    \ `TabbedApp`\n\n4. Add a Container View Controller, `UITabBarController`, which\
    \ will be responsible for managing the two content view controllers.\n   1. Embed\
    \ both storyboard scenes in a `TabBarController`: multiselect both storyboard\
    \ scenes (press and hold the ![image](images/flower.jpg) key for multiselect)\
    \ and select the command from **Editor ![image](images/arrow.jpg) Embed In ![image](images/arrow.jpg)\
    \ Tab Bar Controller** in the Xcode menu bar (see [Figure 3-49](#9781484204375_Ch03.xhtml#Fig49)).\n\
    \n![9781484204375_Fig03-49.jpg](images/9781484204375_Fig03-49.jpg)\n\n[Figure\
    \ 3-49](#9781484204375_Ch03.xhtml#_Fig49). Embed content views in Tab Bar Controller\
    \ (the result on the right)\n\nThe app is not complete yet, but you actually can\
    \ run it now to see the app live (see [Figure 3-50](#9781484204375_Ch03.xhtml#Fig50)).\n\
    \n![9781484204375_Fig03-50.jpg](images/9781484204375_Fig03-50.jpg)\n\n[Figure\
    \ 3-50](#9781484204375_Ch03.xhtml#_Fig50). `TabbedApp` draft\n\n## UITabBarController\n\
    \nAs you can see from previous work (see [Figure 3-49](#9781484204375_Ch03.xhtml#Fig49)),\
    \ a bottom tab bar comes with `UITabBarController`. Each tab bar item is associated\
    \ with a content view controller. By selecting a tab bar item, the `UITabBarController`\
    \ automatically presents the selected content view controller.\n\n### Add/Remove\
    \ a Tab Bar Item\n\n`UITabBarController` maintains an array of references to its\
    \ child view controllers. In its **Connections Inspector**, you can draw a view\
    \ controller’s outlet in the Triggered Segues section to add the child view controllers\
    \ to the `UITabBarController.viewControllers` array property. You can write code\
    \ to add or remove the child view controller in the runtime, too.\n\n### Update\
    \ the Look and Feel of the Tab Bar Items\n\nYou should assign a `title` and an\
    \ `image` to the tab bar items. When a `UIViewController` is added to a tab bar\
    \ controller, the `UIViewController.tabBarItem` property represents the tab bar\
    \ item in the tab bar. You assign appropriate values in the tab bar item’s **Attributes\
    \ Inspector**. In the runtime, you use code to update the `text` and `image` by\
    \ setting appropriate `tabBarItem` properties. Previously, [Figure 3-50](#9781484204375_Ch03.xhtml#Fig50)\
    \ shows two tab bar items with the same label and without an icon image. Do the\
    \ following to give our `TabbedApp` a better look:\n\n1. System provides a set\
    \ of common tab bar items (**System Item** in **Attributes Inspector**). Use them\
    \ when possible for consistent platform convention. Select the **Featured** system\
    \ item for Screen One (see [Figure 3-51](#9781484204375_Ch03.xhtml#Fig51)).\n\n\
    ![9781484204375_Fig03-51.jpg](images/9781484204375_Fig03-51.jpg)\n\n[Figure 3-51](#9781484204375_Ch03.xhtml#_Fig51).\
    \ Adding the **Featured** System Item to Screen One"
  raw: "6.  `MasterViewController` must implement `UICollectionViewDataSource` and\
    \ `UICollectionViewDelegate` protocols (see [Listing 3-13](#9781484204375_Ch03.xhtml#list13)):\n\
    \    1.  Implement `numberOfSectionsInCollectionView(collectionView`) to return\
    \ the section number; it defaults to `1` if not implemented.\n    2.  Implement\
    \ `collectionView(collectionView, numberOfItemsInSection)` to return number of\
    \ items in each section.\n    3.  Implement `collectionView(collectionView, cellForItemAtIndexPath)`\
    \ to return the collection view cell instance.\n    4.  Implement `collectionView(collectionView,\
    \ didSelectItemAtIndexPath)` to respond to cell selection.\n\n[***Listing 3-13***](#9781484204375_Ch03.xhtml#_list13).\
    \ `UICollectionViewDataSource` and `UICollectionViewDelegate` Protocols\n\n```\n\
    class MasterViewController : UIViewController, UICollectionViewDataSource, UICollectionViewDelegate\
    \ {\n  ...\n  // implement UICollectionViewDataSource\n  var items = [\"item 1\"\
    , \"item 2\", \"item 3\", \"item 4\", \"item 5\", \"item 6\", \"item 7\"]\n  func\
    \ collectionView(collectionView: UICollectionView, numberOfItemsInSection section:\
    \ Int) -> Int {\n    return self.items.count\n  }\n\n// The cell that is returned\
    \ must be retrieved from a call to -dequeueReusableCellWithReuseIdentifier:forIndexPath:\n\
      func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\
    \ indexPath: NSIndexPath) -> UICollectionViewCell {\n    var cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"\
    cell\", forIndexPath: indexPath) as SimpleCollectionViewCell\n    cell.textLabel.text\
    \ = self.items[indexPath.row]\n    cell.backgroundColor = (indexPath.row % 2 ==\
    \ 0) ? UIColor.whiteColor() : UIColor.lightGrayColor()\n    return cell\n  }\n\
    \nfunc numberOfSectionsInCollectionView(collectionView: UICollectionView)\n  ->\
    \ Int {\n    return 1\n  }\n\n// implement UICollectionViewDelegate\n  func collectionView(collectionView:\
    \ UICollectionView, didSelectItemAtIndexPath indexPath: NSIndexPath) {\n    self.performSegueWithIdentifier(\"\
    detail\", sender: self)\n  }\n}\n```\n\nBoth `TableView` and `CollectionView`\
    \ are very versatile. You should look into the data source and delegate protocols\
    \ to see the rich options offered to developers. Build and run the `MasterGridDetail`\
    \ iOS app to see your code live in action as shown in [Figure 3-46](#9781484204375_Ch03.xhtml#Fig46).\n\
    \n![9781484204375_Fig03-46.jpg](images/9781484204375_Fig03-46.jpg)\n\n[Figure\
    \ 3-46](#9781484204375_Ch03.xhtml#_Fig46). Collection view\n\nNavigation Tabs\n\
    \nANDROID ANALOGY\n\nActionbar Navigation Tabs.\n\nNavigation tabs are another\
    \ popular UX design pattern. Apple’s iOS Human Interface Guidelines suggest using\
    \ a tab bar to give users access to different perspectives on the same set of\
    \ data or on different subtasks related to the overall function of your app. Each\
    \ navigation tab is associated with a view controller. When the user selects a\
    \ specific tab, the associated view controller presents its own content view.\n\
    \nIn Android, you normally use **Actionbar**. [Figure 3-47](#9781484204375_Ch03.xhtml#Fig47)\
    \ shows an example; let’s translate it to iOS.\n\n![9781484204375_Fig03-47.jpg](images/9781484204375_Fig03-47.jpg)\n\
    \n[Figure 3-47](#9781484204375_Ch03.xhtml#_Fig47). Android `TabbedApp`\n\nThe\
    \ key in iOS is the Container View Controller, `UITabBarController` class. You\
    \ can use it as is most of the time. If you want to keep some application states\
    \ in the Container View Controller, simply subclass from it.\n\nImplementing Navigation\
    \ Tabs\n\nThe following instructions walk you through the steps you normally take\
    \ to implement navigation tabs:\n\n1.  Launch Xcode to create a new app using\
    \ **Single View Application** template, and name it `TabbedApp`.\n    1.  You\
    \ get an empty scene in the `Main.storyboard` and a `ViewController` class.\n\
    \    2.  Rename the class to `FirstViewController` in both the `ViewController.swift`\
    \ file and the class name in **Identity Inspector** for the storyboard scene.\n\
    \    3.  Draw the content view in the storyboard scene using the Android app as\
    \ your wireframe.\n2.  You need the second content view and view controller pair.\n\
    \    1.  You can copy, paste, and modify from the `FirstViewController` class.\
    \ [Listing 3-14](#9781484204375_Ch03.xhtml#list14) shows the `SecondViewController`\
    \ class.\n\n[***Listing 3-14***](#9781484204375_Ch03.xhtml#_list14). `SecondViewController`\
    \ Class\n\n```\n        class SecondViewController: UIViewController {\n     \
    \     ...\n        }\n        ```\n\n2.  You can copy, paste, and modify the storyboard\
    \ scene in the storyboard editor, too. Don’t forget to update the class name in\
    \ **Identify Inspector**. [Figure 3-48](#9781484204375_Ch03.xhtml#Fig48) shows\
    \ that the storyboard has the Screen One and Screen Two scenes.\n\n![9781484204375_Fig03-48.jpg](images/9781484204375_Fig03-48.jpg)\n\
    \n[Figure 3-48](#9781484204375_Ch03.xhtml#_Fig48). First and second scenes in\
    \ `TabbedApp`\n\n3.  Add a Container View Controller, `UITabBarController`, which\
    \ will be responsible for managing the two content view controllers.\n    1. \
    \ Embed both storyboard scenes in a `TabBarController`: multiselect both storyboard\
    \ scenes (press and hold the ![image](images/flower.jpg) key for multiselect)\
    \ and select the command from **Editor ![image](images/arrow.jpg) Embed In ![image](images/arrow.jpg)\
    \ Tab Bar Controller** in the Xcode menu bar (see [Figure 3-49](#9781484204375_Ch03.xhtml#Fig49)).\n\
    \n![9781484204375_Fig03-49.jpg](images/9781484204375_Fig03-49.jpg)\n\n[Figure\
    \ 3-49](#9781484204375_Ch03.xhtml#_Fig49). Embed content views in Tab Bar Controller\
    \ (the result on the right)\n\nThe app is not complete yet, but you actually can\
    \ run it now to see the app live (see [Figure 3-50](#9781484204375_Ch03.xhtml#Fig50)).\n\
    \n![9781484204375_Fig03-50.jpg](images/9781484204375_Fig03-50.jpg)\n\n[Figure\
    \ 3-50](#9781484204375_Ch03.xhtml#_Fig50). `TabbedApp` draft\n\nUITabBarController\n\
    \nAs you can see from previous work (see [Figure 3-49](#9781484204375_Ch03.xhtml#Fig49)),\
    \ a bottom tab bar comes with `UITabBarController`. Each tab bar item is associated\
    \ with a content view controller. By selecting a tab bar item, the `UITabBarController`\
    \ automatically presents the selected content view controller.\n\nAdd/Remove a\
    \ Tab Bar Item\n\n`UITabBarController` maintains an array of references to its\
    \ child view controllers. In its **Connections Inspector**, you can draw a view\
    \ controller’s outlet in the Triggered Segues section to add the child view controllers\
    \ to the `UITabBarController.viewControllers` array property. You can write code\
    \ to add or remove the child view controller in the runtime, too.\n\nUpdate the\
    \ Look and Feel of the Tab Bar Items\n\nYou should assign a `title` and an `image`\
    \ to the tab bar items. When a `UIViewController` is added to a tab bar controller,\
    \ the `UIViewController.tabBarItem` property represents the tab bar item in the\
    \ tab bar. You assign appropriate values in the tab bar item’s **Attributes Inspector**.\
    \ In the runtime, you use code to update the `text` and `image` by setting appropriate\
    \ `tabBarItem` properties. Previously, [Figure 3-50](#9781484204375_Ch03.xhtml#Fig50)\
    \ shows two tab bar items with the same label and without an icon image. Do the\
    \ following to give our `TabbedApp` a better look:\n\n1.  System provides a set\
    \ of common tab bar items (**System Item** in **Attributes Inspector**). Use them\
    \ when possible for consistent platform convention. Select the **Featured** system\
    \ item for Screen One (see [Figure 3-51](#9781484204375_Ch03.xhtml#Fig51)).\n\n\
    ![9781484204375_Fig03-51.jpg](images/9781484204375_Fig03-51.jpg)\n\n[Figure 3-51](#9781484204375_Ch03.xhtml#_Fig51).\
    \ Adding the **Featured** System Item to Screen One"
  trans: "\n6. `MasterViewController` 必须实现 `UICollectionViewDataSource` 和 `UICollectionViewDelegate`\
    \ 协议（参见列表 3-13）：\n   1. 实现 `numberOfSectionsInCollectionView(collectionView:)`\
    \ 方法以返回分区数；若未实现则默认为 `1`。\n   2. 实现 `collectionView(collectionView:, numberOfItemsInSection:)`\
    \ 方法以返回每个分区中的项目数。\n   3. 实现 `collectionView(collectionView:, cellForItemAtIndexPath:)`\
    \ 方法以返回集合视图的单元格实例。\n   4. 实现 `collectionView(collectionView:, didSelectItemAtIndexPath:)`\
    \ 方法以响应单元格的选中事件。\n\n***列表 3-13***. `UICollectionViewDataSource` 和 `UICollectionViewDelegate`\
    \ 协议\n\n```\nclass MasterViewController : UIViewController, UICollectionViewDataSource,\
    \ UICollectionViewDelegate {\n  ...\n  // 实现 UICollectionViewDataSource\n  var\
    \ items = [\"item 1\", \"item 2\", \"item 3\", \"item 4\", \"item 5\", \"item\
    \ 6\", \"item 7\"]\n  func collectionView(collectionView: UICollectionView, numberOfItemsInSection\
    \ section: Int) -> Int {\n    return self.items.count\n  }\n\n// 返回的单元格必须通过调用\
    \ -dequeueReusableCellWithReuseIdentifier:forIndexPath: 方法获取\n  func collectionView(collectionView:\
    \ UICollectionView, cellForItemAtIndexPath indexPath: NSIndexPath) -> UICollectionViewCell\
    \ {\n    var cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"cell\"\
    , forIndexPath: indexPath) as SimpleCollectionViewCell\n    cell.textLabel.text\
    \ = self.items[indexPath.row]\n    cell.backgroundColor = (indexPath.row % 2 ==\
    \ 0) ? UIColor.whiteColor() : UIColor.lightGrayColor()\n    return cell\n  }\n\
    \nfunc numberOfSectionsInCollectionView(collectionView: UICollectionView)\n  ->\
    \ Int {\n    return 1\n  }\n\n// 实现 UICollectionViewDelegate\n  func collectionView(collectionView:\
    \ UICollectionView, didSelectItemAtIndexPath indexPath: NSIndexPath) {\n    self.performSegueWithIdentifier(\"\
    detail\", sender: self)\n  }\n}\n```\n\n`TableView` 和 `CollectionView` 都非常灵活。你应该深入了解数据源和委托协议，看看它们为开发者提供了哪些丰富的选项。构建并运行\
    \ `MasterGridDetail` iOS 应用，即可实时体验你的代码效果，如图 3-46 所示。\n\n![9781484204375_Fig03-46.jpg](img/9781484204375_Fig03-46.jpg)\n\
    \n图 3-46. 集合视图\n\n## 导航标签\n\n### Android 类比\n\n#### 操作栏导航标签\n\n导航标签是另一种流行的用户体验设计模式。苹果的\
    \ iOS 人机界面指南建议使用标签栏，让用户可以访问同一数据集的不同视角，或访问与应用程序整体功能相关的不同子任务。每个导航标签都与一个视图控制器关联。当用户选中某个特定标签时，关联的视图控制器会呈现其自己的内容视图。\n\
    \n在 Android 中，通常使用 `Actionbar`。图 3-47 展示了一个示例；让我们将其翻译到 iOS 平台。\n\n![9781484204375_Fig03-47.jpg](img/9781484204375_Fig03-47.jpg)\n\
    \n图 3-47. Android `TabbedApp`\n\n在 iOS 中，关键在于容器视图控制器 `UITabBarController` 类。大多数情况下你可以直接使用它。如果你想在容器视图控制器中保留一些应用状态，只需从其子类化即可。\n\
    \n### 实现导航标签\n\n以下说明将指导你完成实现导航标签通常所需的步骤：\n\n1. 启动 Xcode，使用 **Single View Application**\
    \ 模板创建一个新应用，并将其命名为 `TabbedApp`。\n   1. 在 `Main.storyboard` 中获得一个空场景以及一个 `ViewController`\
    \ 类。\n   2. 在 `ViewController.swift` 文件和故事板场景的 **Identity Inspector** 中，将类名重命名为\
    \ `FirstViewController`。\n   3. 以 Android 应用为线框图，在故事板场景中绘制内容视图。\n2. 你需要第二个内容视图和视图控制器对。\n\
    \   1. 你可以从 `FirstViewController` 类中复制、粘贴并进行修改。列表 3-14 展示了 `SecondViewController`\
    \ 类。\n\n***列表 3-14***. `SecondViewController` 类\n\n```\nclass SecondViewController:\
    \ UIViewController {\n  ...\n}\n```\n\n3. 你也可以在故事板编辑器中复制、粘贴并修改故事板场景。别忘了在 **Identity\
    \ Inspector** 中更新类名。图 3-48 展示了故事板中包含屏幕一和屏幕二两个场景。\n\n![9781484204375_Fig03-48.jpg](img/9781484204375_Fig03-48.jpg)\n\
    \n图 3-48. `TabbedApp` 中的第一个和第二个场景\n\n4. 添加一个容器视图控制器 `UITabBarController`，它将负责管理这两个内容视图控制器。\n\
    \   1. 将两个故事板场景嵌入到一个 `TabBarController` 中：多选这两个故事板场景（按住 ![image](img/flower.jpg)\
    \ 键进行多选），然后在 Xcode 菜单栏中选择 **Editor ![image](img/arrow.jpg) Embed In ![image](img/arrow.jpg)\
    \ Tab Bar Controller** 命令（参见图 3-49）。\n\n![9781484204375_Fig03-49.jpg](img/9781484204375_Fig03-49.jpg)\n\
    \n图 3-49. 将内容视图嵌入标签栏控制器（右侧为结果）\n\n这个应用尚未完成，但实际上你现在就可以运行它，看看它的实时效果（参见图 3-50）。\n\
    \n![9781484204375_Fig03-50.jpg](img/9781484204375_Fig03-50.jpg)\n\n图 3-50. `TabbedApp`\
    \ 草稿\n\n## UITabBarController\n\n从之前的工作中（参见图 3-49），你可以看到 `UITabBarController`\
    \ 自带了一个底部标签栏。每个标签栏项都与一个内容视图控制器关联。通过选中一个标签栏项，`UITabBarController` 会自动呈现选中的内容视图控制器。\n\
    \n### 添加/移除标签栏项\n\n`UITabBarController` 维护着一个对其子视图控制器引用的数组。在其 **Connections Inspector**\
    \ 中，你可以在 Triggered Segues 部分绘制视图控制器的插座，以将子视图控制器添加到 `UITabBarController.viewControllers`\
    \ 数组属性中。你也可以编写代码在运行时添加或移除子视图控制器。\n\n### 更新标签栏项的外观和感觉\n\n你应该为标签栏项分配 `title` 和 `image`\
    \ 属性。当一个 `UIViewController` 被添加到标签栏控制器时，`UIViewController.tabBarItem` 属性代表标签栏中的该项。你可以在标签栏项的\
    \ **Attributes Inspector** 中分配适当的值。在运行时，你可以通过设置相应的 `tabBarItem` 属性来更新 `text` 和\
    \ `image`。之前图 3-50 显示两个标签栏项具有相同的标签且没有图标图像。请执行以下操作来改善我们的 `TabbedApp` 的外观：\n\n1.\
    \ 系统提供了一组常见的标签栏项（**Attributes Inspector** 中的 **System Item**）。尽可能使用它们以保持平台一致性。为屏幕一选择\
    \ **Featured** 系统项（参见图 3-51）。\n\n![9781484204375_Fig03-51.jpg](img/9781484204375_Fig03-51.jpg)\n\
    \n图 3-51. 为屏幕一添加 **Featured** 系统项\n"
- fmt: "2.  For Screen Two, select **Custom** to supply your own tab bar item **Title**\
    \ and **Image icon** (see [Figure 3-52](#9781484204375_Ch03.xhtml#Fig52)).\n \
    \   1.  Enter the Title (e.g., **Two**).\n    2.  Create an image icon in `images.xcassets`\
    \ (i.e., `tab1`), and drop a transparent PNG with size about **25 × 25** (max\
    \ **48 × 32**). The icon color is not required, as only the alpha channel is to\
    \ be rendered.\n\n![9781484204375_Fig03-52.jpg](images/9781484204375_Fig03-52.jpg)\n\
    \n[Figure 3-52](#9781484204375_Ch03.xhtml#_Fig52). Custom tab item with `badgeValue`\n\
    \n**Note** iOS is very picky about the right image specs. See the online reference\
    \ for image specs: `https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/IconMatrix.html`.\n\
    \n3.  Enter the Image name (e.g., `tab1`).\n    4.  You may enter a **badge**\
    \ (e.g., **New**), which will appear on the upper right corner of the icon. Frequently,\
    \ it is set programmatically in the runtime using the `UITabBarItem.badgeValue`\
    \ property.\n\n### Handle Runtime Behavior\n\nTo respond to the runtime behavior\
    \ programmatically, just like most of the `UIKit` widgets, you implement a delegate\
    \ protocol: `UITabBarDelegate`. Continue with the `TabbedApp` to learn the common\
    \ tasks for handling `UITabBarDelegate` runtime events.\n\n1.  Create a custom\
    \ tab bar controller to handle runtime behaviors as shown in [Listing 3-15](#9781484204375_Ch03.xhtml#list15):\n\
    \n    1.  Create a `SimpleTabBarController` class subclassing from `UITabBarController`.\n\
    \    2.  Declare `SimpleTabBarController` to implement `UITabBarControllerDelegate`\
    \ protocol.\n    3.  In storyboard, select the tab bar controller and assign the\
    \ `SimpleTabBarController` class in the **Identity Inspector**.\n\n[***Listing\
    \ 3-15***](#9781484204375_Ch03.xhtml#_list15). `SimpleTabBarController` Class\n\
    \n```\n    class SimpleTabBarController : UITabBarController, UITabBarControllerDelegate\
    \ {\n      override func viewDidLoad() {\n        super.viewDidLoad()\n      \
    \  // Do any additional setup after loading the view ...\n        self.delegate\
    \ = self\n      }\n\n    func tabBarController(tabBarController: UITabBarController,\n\
    \      shouldSelectViewController viewController: UIViewController) -> Bool {\n\
    \        // you may do something and return true\n        // Or, return false\
    \ to not to select viewController\n        return true\n      }\n\n    func tabBarController(tabBarController:\
    \ UITabBarController,\n      didSelectViewController viewController: UIViewController)\
    \ {\n        // you may do something\n      }\n    }\n    ```\n\n2.  Each child\
    \ content view controller can access `UIViewController.tabBarController` and `UIViewController.tabBarItem`\
    \ properties. [Listing 3-16](#9781484204375_Ch03.xhtml#list16) shows how to change\
    \ the second tab’s `badgeValue` from the `FirstViewController`.\n\n[***Listing\
    \ 3-16***](#9781484204375_Ch03.xhtml#_list16). Change `badgeValue` of Other `tabBarItem`\n\
    \n```\n(self.tabBarController!.viewControllers![1] as UIViewController).tabBarItem.badgeValue\
    \ = \"Zzz\"\n```\n\nBy the way, the tab bar is located on the bottom screen in\
    \ iOS instead of at the top in Android. In general, platform-specific UX guidelines\
    \ should never be overlooked. Keep the navigation bar on the bottom in iOS, which\
    \ is where most iOS users expect it.\n\n### Swipe Views\n\nThe Carousel is a popular\
    \ UX pattern commonly used in many platforms, including desktop and web apps.\
    \ On mobile platforms, you use this pattern with swipe gestures to display content,\
    \ page by page. It allows the user to move from item to item efficiently. With\
    \ animated transitions, it offers a more enjoyable viewing experience. Both iOS\
    \ and Android provide framework classes, as well as a project creation template\
    \ to promote this navigation UX pattern.\n\nIn Android, you normally use the `ViewPager`\
    \ widget. [Figure 3-53](#9781484204375_Ch03.xhtml#Fig53) shows the Android `SwipeViews`\
    \ app that was created using the ADT Swipe View template:\n\n*   The container\
    \ Activity has a `ViewPager` to show the swipeable views from a fragment layout.\n\
    *   It has one fragment that contains a label that represents the page content.\n\
    *   The pager adapter creates the fragment with content for each page.\n\n![9781484204375_Fig03-53.jpg](images/9781484204375_Fig03-53.jpg)\n\
    \n[Figure 3-53](#9781484204375_Ch03.xhtml#_Fig53). Android `SwipeViews` app\n\n\
    You will port this to iOS. Use the Android app or layout file (see [Figure 3-54](#9781484204375_Ch03.xhtml#Fig54))\
    \ as the wireframe to construct the storyboard scenes to start with.\n\n![9781484204375_Fig03-54.jpg](images/9781484204375_Fig03-54.jpg)\n\
    \n[Figure 3-54](#9781484204375_Ch03.xhtml#_Fig54). Android `layout.xml` file\n\
    \n1.  Launch Xcode to create a new project using the usual **Single View Application**\
    \ template, and name it `SwipeViews`.\n2.  Rename the existing class `ViewController`\
    \ to `ParentViewController` in both the `ViewController.swift` file and the custom\
    \ class name in the **Identity Inspector** of the view controller’s storyboard\
    \ scene.\n3.  Drag and drop a `UIView` onto the storyboard scene from **Object\
    \ Library**:\n    1.  Open the storyboard **Assistant Editor** and create an `IBOutlet`\
    \ in **Connections Inspector** by connecting the referencing outlet to the paired\
    \ view controller, and name it `mPageView`.\n    2.  Add Auto Layout constraints\
    \ to **pin** the edges to nearest neighbors and set the background to be light\
    \ gray, as shown in the final storyboard (see [Figure 3-55](#9781484204375_Ch03.xhtml#Fig55)).\n\
    \n![9781484204375_Fig03-55.jpg](images/9781484204375_Fig03-55.jpg)\n\n[Figure\
    \ 3-55](#9781484204375_Ch03.xhtml#_Fig55). `Main.storyboard` in `SwipeViews` project\n\
    \n4.  You need another content view–view controller pair for the page content.\n\
    \    1.  Create a new `PageContentViewController` class (see [Listing 3-17](#9781484204375_Ch03.xhtml#list17)).\n\
    \n[***Listing 3-17***](#9781484204375_Ch03.xhtml#_list17). Two Classes in `ViewController.swift`\
    \ File\n\n```\n        import UIKit\n        class ParentViewController : UIViewController\
    \ {\n          @IBOutlet weak var mPageView: UIView!\n\n    override func viewDidLoad()\
    \ {\n            super.viewDidLoad()\n          }\n\n    override func didReceiveMemoryWarning()\
    \ {\n            super.didReceiveMemoryWarning()\n            // Dispose of any\
    \ resources that can be recreated.\n          }\n        }\n\n    class PageContentViewController:\
    \ UIViewController {\n          @IBOutlet weak var textLabel : UILabel\n     \
    \   }\n        ```\n\n2.  Draw the second storyboard scene (see the screen on\
    \ the right in [Figure 3-55](#9781484204375_Ch03.xhtml#Fig55)). Make sure you\
    \ give the Page Content View controller a **storyboard ID** (e.g., `PageContentViewController`).\
    \ You need the ID to programmatically load a controller from storyboard.\n\nNothing\
    \ is new yet; just draw two storyboard scenes with the view controllers to start\
    \ with. You may build and run the app to make sure it contains no errors. Unlike\
    \ previous Navigation Stack or Tab patterns to which you can draw segues for view\
    \ controller transitions, you need to write code to complete the app, which you\
    \ will do next.\n\n### UIPageViewController\n\n**ANDROID ANALOGY**\n\n`ViewPager`.\n\
    \nThe key to implementing the swipe view pattern in iOS is the `UIPageViewController`\
    \ class, which uses the same data source pattern: implement a data source that\
    \ is responsible for providing content views populated with data. Continue with\
    \ the following steps in the `SwipeViews` Xcode project:\n\n1.  Modify the `PageContentViewController`\
    \ class so it can receive data and present the three simple screens (see [Listing\
    \ 3-18](#9781484204375_Ch03.xhtml#list18)).\n\n[***Listing 3-18***](#9781484204375_Ch03.xhtml#_list18).\
    \ Add `data` and `pageNo` Properties\n\n```\n    class PageContentViewController:\
    \ UIViewController {\n\n    @IBOutlet weak var textLabel : UILabel\n\n    var\
    \ data = \"\"\n      var pageNo = 0\n\n    override func viewDidLoad() {\n   \
    \     self.textLabel.text = data\n      }\n    }\n    ```"
