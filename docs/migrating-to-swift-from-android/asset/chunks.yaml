- fmt: "xhtml), such as the master list details drill-down, navigation patterns, basic\
    \ UI widgets, saving data, and using remote services. You started by using the\
    \ storyboard to create MVC components and using storyboard segues to connect the\
    \ View Controller together. The result was a set of connected View Controllers.\n\
    \nYou continued to drill down into each class, one by one, starting by translating\
    \ all the members’ declarations for all the classes first. Then, you drilled down\
    \ into each method. Translating expressions in each method was generally straightforward.\
    \ Using a global find-and-replace makes this type of translation quick and fun.\
    \ When you encounter platform-specific SDK or topics, use this book’s Table of\
    \ Contents to find the instructions that will guide you through your porting efforts.\n\
    \nAs you port an app, you will start to see more searchable and replaceable patterns.\
    \ I use the Xcode editor’s `Find and Replace All` one click at a time, so that\
    \ I can have a quick read on the code being replaced. Learning is the main objective\
    \ in your early iOS journey. Reading, typing, and debugging the code seems the\
    \ best way to learn a new programming language.\n\nAlthough the `RentalROI` app\
    \ is not complicated enough to show you more advanced topics that are not included\
    \ in this book, the porting steps remain the same: you always break the app down\
    \ into the smallest porting components possible—a single line of expression, a\
    \ method, or sometimes an entire class or even a common use case. This porting\
    \ strategy always works for me.\n\n# Index\n\n![images](images/sq.jpg)  A, B,\
    \ C\n\n- [Animations](#9781484204375_Ch04.xhtml#cXXX.193)\n\n![images](images/sq.jpg) D,\
