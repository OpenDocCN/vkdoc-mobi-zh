    \ Name it: `Localizable.strings`.\n\n2. Copy the content in Android `res/values/strings.xml`\
    \ to the iOS `Localizable.strings` file. The translation is straightforward, as\
    \ shown in [Listing 5-6](#9781484204375_Ch05.xhtml#list6).\n\n[***Listing 5-6***](#9781484204375_Ch05.xhtml#_list6).\
    \ Externalized Text Translation\n\n```\n\"app_name\" = \"RentalROI\";\n\"label_schedule\"\
    \ = \"Schedule\";\n\"label_property\" = \"Property\";\n\"label_Amortization\"\
