  trans: "\nxhtml），例如主列表详情下钻、导航模式、基本 UI 组件、数据保存以及远程服务的使用。你首先通过故事板创建 MVC 组件，并利用故事板转场连接各个视图控制器，最终得到一组相互关联的视图控制器。\n\
    \n接着，你逐一深入每个类，首先翻译所有类的全部成员声明。然后，你进一步深入到每个方法中。翻译每个方法内的表达式通常很直接。使用全局查找与替换功能可以让这类翻译工作变得快速有趣。当遇到特定平台的\
    \ SDK 或主题时，请使用本书的目录查找相关指导，这些指导将引导你完成移植工作。\n\n在移植应用的过程中，你会发现更多可搜索和可替换的模式。我每次只使用\
    \ Xcode 编辑器的`查找和全部替换`功能，这样我就能快速浏览被替换的代码。在你早期的 iOS 学习之旅中，学习是主要目标。阅读、编写和调试代码似乎是学习一门新编程语言的最佳方式。\n\
    \n尽管 `RentalROI` 应用不够复杂，无法向你展示本书未涉及的更高级主题，但移植步骤是相同的：你总是将应用分解成尽可能小的移植组件——一行表达式、一个方法，有时甚至是一个完整的类，或者一个常见的用例。这种移植策略对我来说总是有效的。\n\
