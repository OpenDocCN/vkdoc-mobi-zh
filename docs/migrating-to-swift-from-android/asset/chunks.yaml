    \ (see [Figure 4-21](#9781484204375_Ch04.xhtml#Fig21)).\n\n[***Listing 4-10***](#9781484204375_Ch04.xhtml#_list10).\
    \ `UIActivityIndicatorView` `IBOutlet`\n\n``` class ViewController: ...{\n  ...\n\
