    \ I was very happy with myself when I felt I’d created an Android app without\
    \ knowing anything! Hey, there’s nothing wrong with making yourself happy, right?\n\
    \nXcode offers the same thing. The objective of this section is to show you how\
    \ to create an iOS app as quickly as possible. Hold any programming questions\
    \ so you can finish the project as fast as you can. For now, complete the following\
    \ steps:\n\n1.  Launch Xcode if you haven’t launched it yet.\n2.  Select **Create\
    \ a new Xcode project** from the **Welcome to Xcode** screen (see [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3)).\
    \ [Figure 1-4](#9781484204375_Ch01.xhtml#Fig4) shows the prompt that asks you\
    \ to choose a template for your project:\n    1.  In the left panel of [Figure\
    \ 1-4](#9781484204375_Ch01.xhtml#Fig4), select **iOS ![image](images/arrow.jpg)\
    \ Application**.\n    2.  In the right panel of [Figure 1-4](#9781484204375_Ch01.xhtml#Fig4),\
    \ you may choose any of the templates. Just for fun, choose **Game**.\n    3.\
    \  Click the **Next** button.\n\n![9781484204375_Fig01-04.jpg](images/9781484204375_Fig01-04.jpg)\n\
    \n[Figure 1-4](#9781484204375_Ch01.xhtml#_Fig4). Choose a template"
  trans: "\n# 面向 iOS 开发者的 Android 迁移指南\n\n2009 年初，通过重复相同的移植流程，我将一款 Windows 移动应用翻译成了我的第一个\
    \ iOS 应用。这开启了我的 iOS 编程之旅，后来很自然地尝试将其移植到 Android 平台。大多数移动应用都与平台无关。当你为 iOS 或 Android\
    \ 完整地完成解决方案后，所有业务和技术问题都已得到验证，其他交付成果和项目工件也已经可以重用。如果不将其移植到另一个平台，那将是一种浪费。今年早些时候，我写了我的第一本书《面向\
    \ iOS 开发者的 Android 迁移指南》，来分享我的信念和经验。在 Swift 于 2014 年全球开发者大会（WWDC）上推出后，我决定写这本书，因为\
    \ Java 和 Swift 之间的相似性使得移植方法更加简单，同时相同的投资回报率分析仍然成立。\n\n本书的主要目标是帮助经验丰富的 Android 开发者轻松进入原生\
    \ iOS–Swift 移动开发领域。这比你想象的要容易，而本书将通过 Android 的类比和映射指南，使其变得更加简单。你可以立即将常见的移动用例转换为\
    \ iOS。\n\n## 本书适合谁？\n\n本书专为希望利用其移动知识，并在 iOS 移动平台上发布移动应用的 Android 开发者而编写。本书将使用你熟悉的\
    \ Android 术语，向你展示常见的 iOS 编程主题和框架，而无需冗长的解释，因为作为 Android 开发者，你已经了解这些移动主题。\n\n##\
    \ 本书的组织方式\n\n在第一部分中，你将快速让 iOS 的 `Xcode` 集成开发环境（`IDE`）启动并运行。你将得到指导，创建教程项目，这些项目将成为你的移植示例项目。我相信这是你在学习编程主题的同时获得实践经验的最佳方式。\n\
    \n本书的第二部分将向你展示如何规划和构建你的 iOS 应用：通过创建故事板并将应用分解为模型-视图-控制器（MVC）类。你将能够重用大部分现有的软件工件，并根据其\
    \ Android 对应部分设计其余部分。接下来会介绍常见的移动主题，包括用户界面、数据管理以及与远程服务的网络连接。完成第二部分后，你将能够创建具有丰富\
    \ UI 组件的简单但有意义的 iOS 应用，并能在本地和远程处理常见的 CRUD（创建、读取、更新、删除）操作。\n\n最后，第三部分将带你通过一个案例研究，将一个完整的\
    \ iOS 应用移植到 Android。它会回顾如何使用 第二部分 主题中的映射指南。你也可以使用本书的目录来帮助查找所需的移植指南。\n\n完成这段旅程后，你将能够使用\
    \ `Xcode` 和 Swift 有效地将你现有的 Android 应用移植到 iOS。\n\n---\n\n# 第一部分：准备你的工具\n\n工欲善其事，必先利其器。对于创建软件来说，这也是非常正确的。`Xcode`\
    \ 是用于编写、编译、调试和构建 iOS 应用程序代码的集成开发环境（`IDE`）。本章的第一部分将指导你完成安装和启动步骤。本书中的所有主题都附带示例代码。你需要使用\
    \ `Xcode` 来学习这些示例项目，并且你也会使用 `Xcode` 来创建世界级的 iOS 应用。\n\n对于 iOS 编程，Swift 是为 iOS\
    \ 8 发布的最新、最强大的编程语言。本部分的章节将为你提供足够的 Swift 知识，以便你能阅读和编写示例代码。你会发现学习 Swift 是对你使用 Java\
    \ 的一个非常自然的延伸，你一定会很自然地将本书中的代码当作你自己的代码来使用。\n\n---\n\n# 第 1 章：搭建开发环境\n\n看到应用运行比阅读源代码更有趣，而且仅靠阅读书籍是无法获得实际编程经验的。让我们先让开发环境启动并运行，这样你就可以使用它——并在此过程中学习\
    \ iOS 的 Swift 编程。\n\n## Xcode 和 iOS SDK\n\n**ANDROID 类比**\n\nAndroid 开发者工具（用于\
    \ Eclipse 的 `ADT` 插件或 Android Studio）。\n\n`Xcode` 是用于构建 iOS 应用的完整工具集。它是一个集成开发环境（`IDE`），可帮助你构建、测试、调试和打包你的\
    \ iOS 应用。它是免费的，但你必须在运行 Mac OS X Mavericks 或更高版本的英特尔 Mac 上使用。在本书中，你将使用最新的 `Xcode`\
    \ 6 版本。\n\n### 从 Mac App Store 安装\n\n`Xcode` 在 Mac App Store 中分发，它会自动为你处理下载和安装。只需单击一下即可开始下载和安装\
    \ `Xcode`，你将获得编译器、代码编辑器、iOS SDK、调试器、设备模拟器以及创建 iOS 应用所需的一切。图 1-1 展示了 Mac App Store\
    \ 应用中的 `Xcode`。\n\n![9781484204375_Fig01-01.jpg](img/9781484204375_Fig01-01.jpg)\n\
    \n图 1-1。Mac App Store 中的 Xcode\n\n你需要做的就是从 Mac App Store 安装最新的 `Xcode`。完成安装后，继续从\
    \ **Applications** 文件夹启动 `Xcode`。将其保留在 Mac OS Dock 中，以便随时启动。\n\n第一次启动 `Xcode`\
    \ 时，它会立即提示你安装所需的组件（参见图 1-2）。单击 **Install** 完成 `Xcode` 的安装。\n\n![9781484204375_Fig01-02.jpg](img/9781484204375_Fig01-02.jpg)\n\
    \n图 1-2。安装所需的组件\n\n安装完成所需的组件后，你应该会看到图 1-3 中的截图。你的 iOS IDE `Xcode` 已准备就绪！\n\n![9781484204375_Fig01-03.jpg](img/9781484204375_Fig01-03.jpg)\n\
    \n图 1-3。欢迎使用 Xcode\n\n### 使用模板创建 iOS 项目\n\n**ANDROID 类比**\n\n`ADT` 中的 **新的 Android\
    \ 应用项目** 模板。\n\n你已经有了合适的工具；现在，难道你不想看看一些实际操作——比如创建一个 iOS 应用并看到它运行？我也想！这样做也是为了确保你的\
    \ `IDE` 工作正常。\n\n实际上，当我完全不知道如何创建 Android 移动应用时，我就使用了 `ADT` 的 **新的 Android 应用项目**\
    \ 模板创建了我的第一个 Android 应用。我当时只想快点看到一些东西运行起来。是的，`ADT` 很好地为我做到了这一点。当我感觉自己在不了解任何知识的情况下创建了一个\
    \ Android 应用时，我对自己非常满意！嘿，让自己开心没有错，对吧？\n\n`Xcode` 也提供了同样的功能。本节的目标是向你展示如何尽快创建一个\
    \ iOS 应用。先保留所有编程问题，以便你能尽快完成项目。现在，请完成以下步骤：\n\n1. 如果尚未启动 `Xcode`，请启动它。\n2. 从 **欢迎使用\
    \ Xcode** 屏幕中选择 **创建新的 Xcode 项目**（参见图 1-3）。图 1-4 显示了提示你为项目选择模板的界面：\n   1. 在图 1-4\
    \ 的左侧面板中，选择 **iOS ![image](img/arrow.jpg) Application**。\n   2. 在图 1-4 的右侧面板中，你可以选择任何一个模板。为有趣起见，选择\
    \ **Game**。\n   3. 单击 **Next** 按钮。\n\n![9781484204375_Fig01-04.jpg](img/9781484204375_Fig01-04.jpg)\n\
    \n图 1-4。选择一个模板\n"
- fmt: "### 3. [Figure 1-5](#9781484204375_Ch01.xhtml#Fig5) depicts the basic project\
    \ info that requires you to fill in the following:\n   1. *Product Name*: This\
    \ is the app name. Name your project `LessonOne`.\n   2. *Organization Name*:\
    \ Optional; for example, **Your organization** or any name you choose.\n   3.\
    \ *Organization Identifier*: Together with the product name, the *organization\
    \ identifier* should uniquely identify your app. Reverse domain name is recommended\
    \ (e.g., `com.yourdomain.xxx`).\n   4. *Language*, *Game Technology*, and *Device*:\
    \ You don’t need to change these settings.\n   5. Click the **Next** button when\
    \ done.\n   6. Select a folder in which to save your `LessonOne` project.\n\n\
    ![9781484204375_Fig01-05.jpg](images/9781484204375_Fig01-05.jpg)\n\n[Figure 1-5](#9781484204375_Ch01.xhtml#_Fig5).\
    \ iOS project options\n\nThat is it! You just created an iOS project, the `LessonOne`\
    \ project as shown in [Figure 1-6](#9781484204375_Ch01.xhtml#Fig6).\n\n![9781484204375_Fig01-06.jpg](images/9781484204375_Fig01-06.jpg)\n\
    \n[Figure 1-6](#9781484204375_Ch01.xhtml#_Fig6). `LessonOne` project in Xcode\
    \ Project Navigator\n\nThe `LessonOne` project can be seen on the left-hand side\
    \ panel as shown in [Figure 1-6](#9781484204375_Ch01.xhtml#Fig6); this is the\
    \ **Project Navigator** in the navigation area. Just as when you use ADT project\
    \ creation templates, the Xcode project template creates the project folder, the\
    \ application source code, and all the resources for building the `LessonOne`\
    \ apps.\n\n## Build the Project\n\n**ANDROID ANALOGY**\n\nThe Eclipse ADT Build\
    \ action keyboard shortcut on the Mac is the same as the build command in Xcode:\
    \ `Command+B` (`z+B`). In Windows the Eclipse build shortcut is `Control+B`.\n\
    \nTo build and compile the Xcode project, use the Build action, which is located\
    \ in the Xcode menubar **![image](images/arrow.jpg) Product ![image](images/arrow.jpg)\
    \ Build** (or `z+B`). You will get used to using the `z+B` keyboard shortcut a\
    \ lot because Xcode doesn’t automatically build your code, unlike Eclipse ADT,\
    \ which builds it automatically by default.\n\n## Launch the App\n\nThe `LessonOne`\
    \ project should have no errors. You can launch the app and see it run on an iOS\
    \ emulator. The emulator is a very important piece of any IDE. Unlike ADT, there\
    \ is no need to mess with something like AVD Manager to create an emulator. All\
    \ the emulators are right there in Xcode and you can launch the `LessonOne` project\
    \ onto the selected device, including the iOS emulator, with a click on the triangle\
    \ button in the upper left corner as shown in [Figure 1-6](#9781484204375_Ch01.xhtml#Fig6).\n\
    \nAlternatively, you may use an Xcode keyboard shortcut key for the Run action,\
    \ `Command+R` (`z+R`), to launch the app. You should see your `LessonOne` app\
    \ running on the iPhone emulator as shown in [Figure 1-7](#9781484204375_Ch01.xhtml#Fig7).\n\
    \n![9781484204375_Fig01-07.jpg](images/9781484204375_Fig01-07.jpg)\n\n[Figure\
    \ 1-7](#9781484204375_Ch01.xhtml#_Fig7). `LessonOne` app in Emulator\n\nPlay with\
    \ the app, and then select other emulators from the device emulator selector (see\
    \ the pointer in [Figure 1-6](#9781484204375_Ch01.xhtml#Fig6)). A mouse-click\
    \ event on an emulator is equivalent to a touch event, and three-finger movement\
    \ on the trackpad is equivalent to touch-drag on a physical iOS screen. If you\
    \ don’t have a particular device yet, definitely play with the emulator to get\
    \ familiar with the emulated iOS devices.\n\n**Tip** To change to landscape or\
    \ portrait orientation, press `z+left arrow` or `right arrow` to rotate the emulator.\n\
    \nThe iOS emulators are way better than AVD—very robust and responsive, and they\
    \ behave just like real devices. For learning Swift programming for iOS, the emulator\
    \ actually is better, as iOS developers use emulators much more frequently than\
    \ Android developers. In this book, you are not required to run apps on a physical\
    \ iOS device; for that you would need to be a registered iOS developer and an\
    \ iOS device. You can save the $99 iOS developer membership fee until you are\
    \ ready to submit your first app to the App Store or if your app requires certain\
    \ features not available in the emulator (e.g., the camera or certain sensors).\
    \ For now, if your app is launched and running on an iOS emulator, your mission\
    \ is completed!\n\n## Summary\n\nBy installing Xcode 6, you immediately have a\
    \ fully functional IDE ready to create iOS apps without hassle. This chapter walked\
    \ you through the basic project-creation tasks in Xcode 6, using an iOS project\
    \ template to start your first iOS project. This chapter also showed you how to\
    \ build and run your iOS app in iOS emulators. You haven’t written any code yet,\
    \ but your tool is working and verified. You will learn more and gain hands-on\
    \ programming experience from the guided exercises in the following chapters.\n\
    \n# Chapter 2\n\n## iOS Programming Basics\n\nCreating mobile apps for both iOS\
    \ and Android is fun and rewarding. With Xcode in place, you are ready to write\
    \ code, build, and run iOS apps now. Objective-C had been the primary programming\
    \ language for iOS apps until Swift was officially announced at the 2014 Apple\
    \ Worldwide Developers Conference. If you’re just starting to learn iOS programming,\
    \ you should go with Swift because there is no reason to choose the old way and\
    \ miss the latest and great features. Your next steps should be learning the fundamentals\
    \ of the following:\n\n* The Swift programming language\n* The anatomy of the\
    \ iOS project and the Xcode storyboard editor\n\nThe purpose of this chapter is\
    \ to get you comfortable with reading the Swift code in this book. To achieve\
    \ this goal, you will be creating a `HelloSwift` project while learning **Swift\
    \ programming language** highlights.\n\nYou will create another Xcode iOS project\
    \ in the second part of the chapter. All iOS apps have a user interface (UI).\
    \ You normally start by creating the UI using the most important Xcode tool, **Storyboard\
    \ Editor,** which draws the UI widgets and components and connects them to your\
    \ code. You also will see the typical iOS project structures and components while\
    \ creating this iOS app. You may not need to understand everything about the iOS\
    \ framework in the beginning, but the first storyboard lesson should be “just\
    \ enough” for you to feel the different programming paradigm. Later, the materials\
    \ in [Chapters 3](#9781484204375_Ch03.xhtml) and [4](#9781484204375_Ch04.xhtml)\
    \ continue with step-by-step instructions for common programming tasks and framework\
    \ topics. Follow these mapping instructions, and the ideas will more easily stick\
    \ with you as you get a broader picture of the whole app.\n\n## The Swift Language\
    \ in a Nutshell\n\nSwift, the newest programming language for creating iOS apps,\
    \ has many similar rules and aspects of language syntax to Java. I am very confident\
    \ that learning the Swift language won’t be the highest hurdle for you; Java or\
    \ C# developers will pick up Swift code naturally. Just to give you a quick preview,\
    \ [Table 2-1](#9781484204375_Ch02.xhtml#Tab1) depicts a quick Java-to-Swift comparison:\n\
    \n[Table 2-1](#9781484204375_Ch02.xhtml#_Tab1). Java-to-Swift Language Syntax\
    \ Comparison in an Absolute Nutshell\n\n![image](images/Table2-1.jpg)"
