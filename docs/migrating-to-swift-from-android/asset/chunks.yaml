    interest\" = \"Interest\";\n\"escrow\" = \"Escrow\";\n\"addlPayment\" = \"Add'l\
    \ Payment\";\n\"mortgageBalance\" = \"Mortgage Balance\";\n\"equity\" = \"Equity\"\
    ;\n\"cashInvest\" = \"Cash Investment\";\n\"roi\" = \"ROI\";\n```\n\n2. Generally,\
    \ you reuse or recreate digital assets from your Android project. In this app,\
    \ you only have one: the application icon, `ic_launcher.png`.\n\n1. Create `ic_launcher120.png`,\
    \ `ic_launcher180.png`, `ic_launcher76.png`, and `ic_launcher152.png` from the\
    \ Android project `res/xxhdpi/ic_launcher.png` file.\n2. Select `Images.xcassets`\
    \ and `AppIcon` in the Xcode asset catalog and drag the four files you just made\
    \ as shown in [Figure 5-10](#9781484204375_Ch05.xhtml#Fig10): `ic_launcher120.png`\
    \ for iPhone 2x, `ic_launcher180.png` for iPhone 3x, `ic_launcher76.png` for iPad\
    \ 1x and `ic_launcher152.png` for iPad 2x. The image resolution must match exactly\
    \ or Xcode will give you warnings.\n\n![9781484204375_Fig05-10.jpg](images/9781484204375_Fig05-10.jpg)\n\
    \n[Figure 5-10](#9781484204375_Ch05.xhtml#_Fig10). Xcode project `AppIcon`\n\n\
    If the Android app contains resources for I18N, you want to port them to the iOS\
    \ app as well.\n\n## Java Class to Swift Class\n\nNow, you have all the matching\
    \ classes in your Xcode iOS project. Your next step is to break each class into\
    \ more pieces, porting Android methods to iOS methods. Again, I use a top-down\
    \ approach in each class: port the member signatures first, and try to defer the\
    \ internal implementations as late as possible. For your convenience, you may\
    \ use [Table 5-1](#9781484204375_Ch05.xhtml#Tab1) as a step-by-step guide. You\
    \ will find that the information in the table is common sense after one or more\
    \ exercises, but I think it makes translation efforts more systematic.\n\n[Table\
    \ 5-1](#9781484204375_Ch05.xhtml#_Tab1). Class Porting Steps\n\n| Step | Instructions\
    \ |\n| --- | --- |\n| 1. | For each class, copy the contents of the Java counterpart\
    \ to Swift. |\n| 2. | Translate Java fields to Swift Stored Properties. For Java\
    \ static constants, translate them to Swift inner `struct static` variables. |\n\
    | 3. | Translate the method declarations to Swift. Preserve signatures as much\
    \ as possible except those that are life cycle methods.a. Keep the Java impl as\
    \ Swift comments. They are perfect and tested logics.b. Translate Android life\
    \ cycle methods signature to iOS counterparts including constructors.c. Preserve\
    \ utility methods signatures. |\n\nSteps 1 and 2 are straightforward. Step 3 is\
    \ the key to break the class into smaller pieces: methods. After you run down\
    \ all the classes with [Table 5-1](#9781484204375_Ch05.xhtml#Tab1), all the classes\
    \ should have callable method skeletons.\n\nYou can start to translate the commented\
    \ Java code to Swift in each method one by one (see “Java Methods to Swift Methods”\
    \ later in this chapter).\n\nFor your convenience, [Table 5-2](#9781484204375_Ch05.xhtml#Tab2)\
    \ recaps the member declarations mappings that you will surely encounter in this\
    \ step.\n\n[Table 5-2](#9781484204375_Ch05.xhtml#_Tab2). Member declarations in\
    \ Java and Swift\n\n| Languages | Java | Swift |\n| --- | --- | --- |\n| **Variables**\
    \ | `String aName` | `var aName: String` |\n| **Class variable** | `static ...`\
    \ | static var in inner struct |\n| **Method declaration** | `String aMethod(int\
    \ a)` | `func aMethod(a: Int) -> String` |\n| **Class method** | `static ...`\
    \ | `class func ...` |\n| **Constructor** | `ClassName(...)` | `init(...)` |\n\
    | **Android Context** | `Activity, Context` | Remove them. |\n\n## Model Class:\
    \ RentalProperty\n\nA great deal of the translation effort involves converting\
    \ the general Java-to-Swift language programming rules (see [Table 2-1](#9781484204375_Ch02.xhtml#Tab1)).\
    \ Your immediate goal is to port the counterpart Java class `RentalProperty` members\
    \ to Swift without renaming them. For methods, focus on signatures by commenting\
    \ all the implementation code. Follow the class porting steps in [Table 5-1](#9781484204375_Ch05.xhtml#Tab1)\
    \ to port `RentalProperty.java` to Swift:\n\n1. To start, copy the whole `RentalProperty.java`\
    \ class to the `RentalProperty.swift` file. You will get a *lot* of errors. These\
    \ compilations errors are your free guidance.\n2. Next, define the classes. A\
    \ general rule of thumb: keep any signature including class name. The caller and\
    \ callee will just connect without glitches in later steps. Delete or comment\
    \ out pure Java things, i.e., `implements Serializable` (see [Listing 5-7](#9781484204375_Ch05.xhtml#list7)).\n\
    \n[***Listing 5-7***](#9781484204375_Ch05.xhtml#_list7). `RentalProperty.swift`\
    \ Class Declaration\n\n```\npublic class RentalProperty /* implements Serializable\
    \ */ {\n// private static final long serialVersionUID = 1L;\n  ...\n}\n```\n\n\
    3. Translate Java fields to Swift:\n\n**Tip** Java: `String mProperty;` => Swift:\
    \ `var mProperty: String` Or, `var mProperty = \"\"  // use type inference when\
    \ possible`\n\n1. Java fields to Swift Stored Properties (see [Listing 5-8](#9781484204375_Ch05.xhtml#list8)).\n\
    2. Java `static` variables to Swift inner `struct static` variables.\n\n[***Listing\
    \ 5-8***](#9781484204375_Ch05.xhtml#_list8). `RentalProperty.swift` Stored Properties\n\
    \n```\npublic class RentalProperty /* implements Serializable */ {\n  ...\n  //\
    \ private double purchasePrice;\n  // private double loanAmt;\n  // private double\
    \ interestRate;\n  // private int numOfTerms;\n  // private double escrow;\n \
    \ // private double extra;\n  // private double expenses;\n  // private double\
    \ rent;\n  var purchasePrice = 0.0;\n  var loanAmt = 0.0;\n  var interestRate\
    \ = 5.0;\n  var numOfTerms = 30;\n  var escrow = 0.0;\n  var extra = 0.0;\n  var\
    \ expenses = 0.0;\n  var rent = 0.0;\n\n  // public static final String KEY_AMO_SAVED\
    \ = \"KEY_AMO_SAVED\";\n  // public static final String KEY_PROPERTY = \"KEY_PROPERTY\"\
    ;\n  // private static final String PREFS_NAME = \"MyPrefs\";\n  // private static\
    \ final int MODE = Context.MODE_PRIVATE;\n  // MODE_WORLD_WRITEABLE\n  // private\
    \ static RentalProperty _sharedInstance = null;\n  struct MyStatic {\n    static\
    \ let KEY_AMO_SAVED = \"KEY_AMO_SAVED\";\n    static let KEY_PROPERTY = \"KEY_PROPERTY\"\
    ;\n    private static let PREFS_NAME = \"MyPrefs\";\n    private static let MODE\
    \ = 0; // probably Android thing\n    private static var _sharedInstance = RentalProperty()\n\
    \  }\n  ...\n}\n```\n\n4. Translate the method declarations to Swift, as shown\
    \ in [Listing 5-9](#9781484204375_Ch05.xhtml#list9)."
