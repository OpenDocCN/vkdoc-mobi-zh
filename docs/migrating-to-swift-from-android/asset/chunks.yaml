    \ with a spinning wheel in Android. To port the Android indeterminate `ProgressBar`\
    \ to iOS, do the following in the `CommonWidgets` iOS app:\n\n1.  Select `Main.storyboard`,\
    \ drag a `UIActivityIndicatorView` from `Object Library`, and position it left-aligned\
    \ and below the `UISlider` (see [Figure 4-19](#9781484204375_Ch04.xhtml#Fig19)).\n\
    \n    ![9781484204375_Fig04-19.jpg](images/9781484204375_Fig04-19.jpg)\n\n   \
    \ [Figure 4-19](#9781484204375_Ch04.xhtml#_Fig19). `UIActivityIndicatorView` attributes\n\
    \n2.  Update its attribute in **Attributes Inspector** as shown in [Figure 4-19](#9781484204375_Ch04.xhtml#Fig19):\n\
    \    1.  Style: **Gray**\n    2.  Color: **Default**\n    3.  Behavior: both `Animating`\
    \ and `Hides When Stopped` are commonly enabled.\n\n3.  Open **Assistant Editor**\
    \ and connect `IBOutlet` in **Connections Inspector** to your code so that you\
