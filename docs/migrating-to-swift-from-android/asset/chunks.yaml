    is frequently used to provide quick access to frequently used actions. It is particularly
    common in desktop and Android platforms. Although there is no such similarly named
    feature in the iOS SDK, `UIBarButtonItem` in `UIToolbar` or `UINavigationBar`
    serves a similar purpose as the Android menu system: quick access.    You might
    also encounter the Android context and popup menus. Again, there is no such menu
    system in iOS, but I will show you my iOS choices for porting purposes.    UIBarButtonItem    ANDROID
    ANALOGY    Options Menu or Action Items in ActionBar.    iOS and Android provides
    widgets for quick access. In iOS, you commonly use `UIBarButtonItem` in the navigation
    bar for a limited number of action buttons that can fit into the fixed space.
    On the iPhone, you may create a bottom bar, `UIToolbar`, if all of the buttons
    in `UIBarButtonItem` don’t fit on the navigation bar.    To learn and show the
    `UIBarButtonItem` in the navigation bar and toolbar by example, do the following
    in the `CommonWidgets` project:    1.  Drag a `UINavigationBar` from **Object
    Library** to the `view` and position it on top of the view. Often, it is simpler
    to add a `NavigationController` by selecting the **View Controller** in storyboard,
    and from the Xcode menu bar select **Editor** ![image](images/arrow.jpg) **Embed
    In** ![image](images/arrow.jpg) **Navigation Controller**. [Figure 4-27](#9781484204375_Ch04.xhtml#Fig27)
    depicts the operation results in a new **Navigation Controller** scene and a **Navigation
    Item** in the existing **View Controller** scene:     1.  Multi-select all the
    widgets in the scene and reposition them to make room for the top bar.     2.  Update
    Navigation Item attributes in **Attributes Inspector** (e.g., enter Title: **CommonWidgets**).


    ![9781484204375_Fig04-27.jpg](images/9781484204375_Fig04-27.jpg)                    [Figure
    4-27](#9781484204375_Ch04.xhtml#_Fig27). Navigation Controller and Navigation
    Bar           2.  Double-click the Navigation Bar to select it, and drag-and-drop
