    \ : mActivityIndicator.startAnimating()\n  }\n  ...\n```\n\nBuild and run the\
    \ `CommonWidgets` app to see the iOS animated activity indicator. You will call\
    \ the `toggleActivityIndicator()` method later.\n\n# \\`UIProgressView\\`\n\n\
    ### ANDROID ANALOGY\n\n`android.widget.ProgressBar` horizontal style.\n\nTo show\
