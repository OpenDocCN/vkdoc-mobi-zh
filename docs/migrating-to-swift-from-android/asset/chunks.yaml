    \n## RESTFul Service using HTTP\n\nMost of the RESTFul services support HTTP/HTTPS\
    \ protocols. Since the RESTFul services are supposed to be agnostic to client\
    \ apps, it is not surprising that your Android code most likely can be translated\
    \ nicely to the iOS platform if it consumes the same RESTFul services. To retrieve\
    \ data from most RESTFul services, it is similar to how browsers use HTTP `GET`\
    \ to fetch a remote HTML file. You can use HTTP `GET` to fetch an HTML document\
    \ from mobile apps, too—or it can fetch any data, such as raw bytes, an XML or\
    \ JSON document, and so forth.\n\nTo submit user input, you will very often use\
    \ HTML `Form` to submit form data from an HTML page to HTTP servers. The form\
    \ data is transmitted using the HTTP `POST` method. This is very common in iOS\
    \ and Android apps as well. Technically speaking, you can also send a query string\
    \ to an HTTP server using the HTTP `GET` method, just as some web pages do. In\
    \ this case, you can simply build the URL with query strings and use the HTTP\
    \ `GET` method to send data to your server. It is a design decision that you will\
    \ make by understanding usages and conventions of `GET` versus `POST`. The key\
    \ is to design the interface so both your mobile clients and the server can understand\
    \ it.\n\n### NSURLConnection\n\nANDROID ANALOGY\n`HttpURLConnection`.\n\nTo interface\
    \ with HTTP protocol in iOS, you can use the `NSURLConnection` class to send `GET`\
    \ and `POST` URL requests. The API is fairly similar to Android's `HttpUrlConnection`.\n\
    \nContinue with the `RestClient` project and add code to send HTTP requests by\
    \ doing the following:\n\n1.  Implement the `IBAction doGet()` method to send\
    \ the HTTP `GET` request and to get data from the HTTP response (see [Listing\
    \ 4-30](#9781484204375_Ch04.xhtml#list30)):\n    1.  Create an `NSMutableURLRequest`\
    \ object.\n\n        **Note** You commonly escape/encode the URL path or query\
    \ string just like you normally do using `URLEncoder` in Android.\n\n    2.  Set\
    \ HTTP method to GET.\n\n        **Note** An HTTP method is case-sensitive according\
    \ to HTTP protocol specs.\n\n    3.  Set the `accept` header, which is commonly\
    \ used for content negotiation (e.g., `text/html`, `json/application`, etc.)."
