  trans: "\n# `UISlider`（参见图 4-17）\n\n1.  数值范围：最小值**0**，最大值**100**。\n2.  最小值和最大值**图像**。\n\
    3.  最小值与最大值轨道**色调**。\n4.  你可以禁用**持续更新**。\n\n3.  打开**助理编辑器**，在**连接检视器**中将`IBOutlet`和`IBAction`连接到你的代码。通常，你会为`Value\
    \ Changed`事件实现`IBAction`来捕获选择值（参见代码清单 4-8）。\n\n***代码清单 4-8*** `UISlider IBOutlet`\
    \ 与 `IBAction` 的实现\n\n``` class ViewController: ...{\n  ...\n  @IBOutlet weak\
    \ var mSlider: UISlider!\n  @IBAction func doSliderValueChanged(sender: AnyObject)\
    \ {\n    var value = self.mSlider.value\n    self.logText(\"slider: \\(value)\"\
    )\n  }\n  ...\n```\n\n构建并运行`CommonWidgets`应用，观察`UISlider`的实际效果。当你拖动滑块上的圆点时，其数值会持续打印在`UITextView`中（参见图\
    \ 4-18）。\n\n![9781484204375_Fig04-18.jpg](img/9781484204375_Fig04-18.jpg)\n\n\
    图 4-18 `UISlider` 数值更新\n\n# `UIActivityIndicatorView`\n\n### ANDROID 对应组件\n\n\
    `android.widget.ProgressBar` 默认样式。\n\n在 iOS 中，`UIActivityIndicatorView` 用于显示任务或其他进行中操作的“忙碌”状态指示器。这相当于\
    \ Android 中带旋转轮的不确定进度`ProgressBar`。要将 Android 的不确定进度`ProgressBar`移植到 iOS，请在 `CommonWidgets`\
    \ iOS 应用中执行以下操作：\n\n1.  选择 `Main.storyboard`，从`对象库`中拖出一个`UIActivityIndicatorView`，将其放置在`UISlider`下方并左对齐（参见图\
    \ 4-19）。\n\n    ![9781484204375_Fig04-19.jpg](img/9781484204375_Fig04-19.jpg)\n\
    \n    图 4-19 `UIActivityIndicatorView` 属性\n\n2.  在**属性检视器**中更新其属性，如图 4-19 所示：\n\
    \    1.  样式：**灰色**\n    2.  颜色：**默认**\n    3.  行为：通常同时启用`动画`和`停止时隐藏`。\n\n3.  打开**助理编辑器**，在**连接检视器**中将`IBOutlet`连接到你的代码，以便启用或禁用活动指示器，如代码清单\
    \ 4-9 所示。\n\n***代码清单 4-9*** `UIActivityIndicatorView IBOutlet`\n\n``` class ViewController:\
    \ ...{\n  ...\n  @IBOutlet weak var mActivityIndicator: UIActivityIndicatorView!\n\
    \  func toggleActivityIndicator() {\n    var isAnimating = mActivityIndicator.isAnimating()\n\
    \    isAnimating ? mActivityIndicator.stopAnimating() : mActivityIndicator.startAnimating()\n\
    \  }\n  ...\n```\n\n构建并运行`CommonWidgets`应用，观察 iOS 动画活动指示器。你稍后将调用`toggleActivityIndicator()`方法。\n\
    \n# `UIProgressView`\n\n### ANDROID 对应组件\n\n`android.widget.ProgressBar` 水平样式。\n\
    \n要显示具有已知持续时间的任务进度，请使用`UIProgressView`来指示任务的完成程度。这使用户能够更好地预估任务还需多久完成。要将 Android\
    \ 的水平`ProgressBar`移植到 iOS 的`UIProgressView`，请执行以下操作：\n\n1.  选择 `Main.storyboard`，从`对象库`中拖出一个`UIProgressView`，将其放置在活动指示器下方并左对齐，如图\
    \ 4-20 所示。\n\n    ![9781484204375_Fig04-20.jpg](img/9781484204375_Fig04-20.jpg)\n\
    \n    图 4-20 `UIActivityIndicatorView` 属性\n\n2.  在**属性检视器**中更新其属性（参见图 4-20）：\n\
    \    1.  样式：**默认（或条形）**\n    2.  进度：**0.5**（取值范围在**0.0**到**1.0**之间）\n    3.  进度色调：**紫色**\n\
    \    4.  轨道色调：**黄色**\n\n3.  打开**助理编辑器**，在**连接检视器**中将`IBOutlet`连接到你的代码，以便通过编程方式更新`UIProgressView`。修改`UISlider`的委托方法`doSliderValueChanged(...)`，如代码清单\
    \ 4-10 所示，从而直观地看到进度变化（参见图 4-21）。\n\n***代码清单 4-10*** `UIActivityIndicatorView`\
    \ `IBOutlet`\n\n``` class ViewController: ...{\n  ...\n  @IBAction func doSliderValueChanged(sender:\
    \ AnyObject) {\n    ...\n    self.updateProgress(value/100)\n  }\n  ...\n  @IBOutlet\
    \ weak var mProgressView: UIProgressView!\n  func updateProgress(value: Float)\
    \ {\n    self.mProgressView.progress = value\n  }\n  ...\n```\n\n![9781484204375_Fig04-21.jpg](img/9781484204375_Fig04-21.jpg)\n\
    \n图 4-21 `UIProgressView` 动态更新\n\n构建并运行`CommonWidgets`应用，观察 iOS `UIProgressView`\
    \ 的实际效果（参见图 4-21）。\n\n# `UISwitch`\n\n### ANDROID 对应组件\n\n`android.widget.Switch`、`Checkbox`\
    \ 或 `ToggleButton`。\n\n开关类控件在呈现互斥选项时非常用户友好。在 Android 中，你可以使用 `CheckBox`、`ToggleButton`\
    \ 或 `Switch`，它们都能实现预期功能，只是外观和感觉有所不同。\n\n在 iOS 中，使用 `UISwitch` 允许用户通过切换或拖动滑块在两个状态之间改变数值。\n\
    \n通过示例学习 `UISwitch`，请执行以下操作：\n\n1.  选择 `Main.storyboard`，从`对象库`中拖出一个 `UISwitch`。将其放置在\
    \ `UIActivityIndicatorView` 的右侧（参见图 4-22）。\n\n    ![9781484204375_Fig04-22.jpg](img/9781484204375_Fig04-22.jpg)\n\
    \n    图 4-22 `UIActivityIndicatorView`\n\n2.  在**属性检视器**中更新其属性（参见图 4-22）：\n  \
    \  1.  状态：**开启**\n    2.  你可以安全地更改其他属性。\n\n3.  打开**助理编辑器**，在**连接检视器**中将 `IBOutlet`\
    \ 和 `IBAction` 连接到你的代码。通常，你会为 `Value Changed` 事件实现 `IBAction` 来捕获选择值（参见代码清单 4-11）。\n\
    \n***代码清单 4-11*** `UISwitch` `IBOutlet`\n\n``` class ViewController: ...{\n  ...\n\
    \  @IBOutlet var mSwitch: UISwitch!\n  @IBAction func doSwitchValueChanged(sender:\
    \ AnyObject) {\n    var isOn = self.mSwitch.on\n    self.toggleActivityIndicator()\n\
    \  }\n  ...\n```\n\n构建并运行应用，切换 `UISwitch` 以观察活动指示器动画的变化（参见图 4-23）。\n\n![9781484204375_Fig04-23.jpg](img/9781484204375_Fig04-23.jpg)\n\
    \n图 4-23 iOS `UISwitch` 的外观和感觉\n\n# `UIImageView`\n\n### ANDROID 对应组件\n\n`android.widget.ImageView`。\n\
    \n在 iOS 中，`UIImageView` 用于显示单张图片或一系列图片以制作简单的图形动画。对于像 `CommonWidgets` 应用这样的简单用法，你只需在故事板中指定图片源和渲染图片所需的属性即可。\n\
    \n通过示例学习 iOS `UIImageView`，请执行以下操作：\n\n1.  `UIImageView` 现在可以渲染基于矢量的图片！这是 Xcode\
    \ 6 的新特性。我只知道 PDF 的第一页能被很好地渲染。你当然可以使用位图图片来完成此练习，或者为 PDF 文件创建新的图片集，如图 4-24 中的指示所示：\n\
    \    1.  选择 **Images.xcassets** 并添加一个 `新图片集`。命名为 `pdf`。\n    2.  在**属性检视器**中将类型设置为**矢量**。\n\
    \    3.  将 PDF 文件拖入通用插槽，如图 4-24 所示。无需提供 2x 或 3x 图片。\n\n    ![9781484204375_Fig04-24.](img/9781484204375_Fig04-24.)\n"
- fmt: "`Main.storyboard`，从**Object Library**拖动一个`UIImageView`到`view`，并将其放置在`UIProgressView`下方，如[Figure\
    \ 4-25](#9781484204375_Ch04.xhtml#Fig25)所示。  \n3.  在**Attributes Inspector**中更新其属性：\
    \  \n    1.  Image：**pdf**  \n    2.  Mode：**Aspect Fit**  \n    3.  其他选择如[Figure\
    \ 4-25](#9781484204375_Ch04.xhtml#Fig25)所示。  \n\n![9781484204375_Fig04-25.jpg](images/9781484204375_Fig04-25.jpg)\
    \  \n[Figure 4-25](#9781484204375_Ch04.xhtml#_Fig25). `UIImageView`属性  \n\n4.\
    \  打开**Assistant Editor**，在**Connections Inspector**中将`IBOutlet`连接到代码。[Listing\
    \ 4-12](#9781484204375_Ch04.xhtml#list12)演示了一个简单的`setImage(...)`方法，该方法将`UIImage`对象赋值给`UIImageView`。\
    \  \n\n***[Listing 4-12]***. `UISwitch` `IBOutlet`  \n```  \nclass ViewController:\
    \ ...{  \n  ...  \n  @IBOutlet weak var mImageView: UIImageView!  \n  func setImage(name:\
    \ String) {  \n    self.mImageView.image = UIImage(named: name)  \n  }  \n  ...\
    \  \n```  \n\n如[Figure 4-25](#9781484204375_Ch04.xhtml#Fig25)所示，需要掌握的属性很少。然而，当涉及到创建`UIImage`以及优化大小和性能时，你需要深入研究`UIImage`类，了解如何从不同来源构建`UIImage`实例。实际上，iOS框架中有些主要处理图像，比如Quartz\
    \ 2D或OpenGL。如果你了解Android OpenGL ES，你绝对可以利用现有知识并探索对应的iOS OpenGL框架。如果你有图形编辑背景，Quartz\
    \ 2D提供了非常丰富的图形API，能够支持你完成iOS图形编辑任务。  \n\n你可以构建并运行`CommonWidgets` iOS应用，查看`UIImageView`的实际效果，如[Figure\
    \ 4-26](#9781484204375_Ch04.xhtml#Fig26)所示。  \n\n![9781484204375_Fig04-26.jpg](images/9781484204375_Fig04-26.jpg)\
    \  \n[Figure 4-26](#9781484204375_Ch04.xhtml#_Fig26). iPhone 5上的`UIImageView`\
    \  \n\n## 菜单  \n\n菜单经常用于提供对常用操作的快速访问。它在桌面和Android平台上尤其常见。虽然iOS SDK中没有类似命名的功能，但`UIToolbar`或`UINavigationBar`中的`UIBarButtonItem`与Android菜单系统有着相似的目的：快速访问。\
    \  \n\n你可能还会遇到Android上下文菜单和弹出菜单。同样，iOS中没有这样的菜单系统，但我会展示我为了移植而选择的iOS方案。  \n\n###\
    \ UIBarButtonItem  \n\n**ANDROID类比**：选项菜单或ActionBar中的操作项。  \n\niOS和Android提供了用于快速访问的控件。在iOS中，通常会在导航栏中使用`UIBarButtonItem`，以放置有限数量的操作按钮，这些按钮可以适应固定空间。在iPhone上，如果导航栏无法容纳`UIBarButtonItem`中的所有按钮，可以创建一个底部栏`UIToolbar`。\
    \  \n\n要在`CommonWidgets`项目中通过示例学习并展示`UIBarButtonItem`在导航栏和工具栏中的使用，请执行以下操作：  \n\
    \n1.  从**Object Library**拖动一个`UINavigationBar`到`view`，并将其放置在视图顶部。通常，更简单的方法是在故事板中选择**View\
    \ Controller**，然后从Xcode菜单栏中选择**Editor** ![image](images/arrow.jpg) **Embed In**\
    \ ![image](images/arrow.jpg) **Navigation Controller**，从而添加一个`NavigationController`。[Figure\
    \ 4-27](#9781484204375_Ch04.xhtml#Fig27)描述了操作结果，它会在现有**View Controller**场景中产生一个新的**Navigation\
    \ Controller**场景和一个**Navigation Item**：  \n    1.  多选场景中的所有控件，并重新定位它们，为顶部栏腾出空间。\
    \  \n    2.  在**Attributes Inspector**中更新**Navigation Item**属性（例如，输入标题：**CommonWidgets**）。\
    \  \n\n![9781484204375_Fig04-27.jpg](images/9781484204375_Fig04-27.jpg)  \n[Figure\
    \ 4-27](#9781484204375_Ch04.xhtml#_Fig27). Navigation Controller和Navigation Bar\
    \  \n\n2.  双击**Navigation Bar**将其选中，然后从**Object Library**拖放一个`UIBarButtonItem`到**Navigation\
    \ Bar**的右侧，以添加一个`rightBarButtonItem`（参见[Figure 4-28](#9781484204375_Ch04.xhtml#Fig28)）。从选择项中为那些常见操作选择一个`Identifier`。或者输入一个标题，例如`Action`，如[Figure\
    \ 4-28](#9781484204375_Ch04.xhtml#Fig28)所示。  \n\n![9781484204375_Fig04-28.jpg](images/9781484204375_Fig04-28.jpg)\
    \  \n[Figure 4-28](#9781484204375_Ch04.xhtml#_Fig28). `UIBarButtonItem`属性  \n\n\
    3.  打开**Assistant Editor**，在`UIBarButtonItem`的**Connections Inspector**中将`IBAction`连接到代码（参见[Listing\
    \ 4-13](#9781484204375_Ch04.xhtml#list13)）。  \n\n***[Listing 4-13]***. `UIBarButtonItem\
    \ IBOutlet`和`IBAction`  \n```  \nclass ViewController: ...{  \n  ...  \n  @IBAction\
    \ func doBarButtonAction(sender: AnyObject) {  \n    println(\">>doBarButtonAction\"\
    )  \n  }  \n  ...  \n```  \n\n## 操作表  \n\n**ANDROID类比**：上下文菜单或`android.widget.PopupMenu`。\
    \  \n\n在Android中，`Context Menu`是一个浮动菜单，当用户右键单击元素时出现。其操作和外观与触发操作的上下文建立了紧密联系。在iPad上，你可以安全地选择`UIPopoverController`（参见[第3章](#9781484204375_Ch03.xhtml)，`UIPopoverController`）来呈现选项列表，而在iPhone上，它会自动全屏呈现。\
    \  \n\n如果你不想使用全屏，或许是为了更小的选择，你也可以选择`UIActionSheet`，它在iPad上以弹出视图形式呈现，在iPhone上则以从屏幕底部弹出的表单形式呈现。\
    \  \n\n关键的SDK类是`UIAlertController`，它在[第3章](#9781484204375_Ch03.xhtml)中用于警告对话框（参见[Listing\
    \ 3-22](#9781484204375_Ch04.xhtml#list22)）。要通过示例学习iOS的操作表，请修改之前的`doBarButtonAction(...)\
    \ IBAction`方法，如[Listing 4-14](#9781484204375_Ch04.xhtml#list14)所示：  \n\n1.  创建一个`UIAlertController`实例，样式为`UIAlertControllerStyle.ActionSheet`。\
    \  \n2.  你可以使用`Title`或`Message`来建立与原始上下文的视觉联系。  \n3.  通常，会有一个红色破坏性`UIAlertAction`用于删除或移除，它通过`UIAlertActionStyle.Destructive`样式指定。\
    \  \n\n***[Listing 4-14]***. 使用`ActionSheet`样式的`UIAlertController`  \n```  \n\
    class ViewController: ...{  \n  ...  \n  @IBAction func doBarButtonAction(sender:\
    \ AnyObject) {  \n    println(\">>doBarButtonDone: \")  \n\n    var actionSheet\
    \ = UIAlertController(title: \"Action (from bar button item)\", message: \"Choose\
    \ an Action\", preferredStyle: UIAlertControllerStyle.ActionSheet)  \n\n    //\
    \ add action buttons  \n    var actionCancel = UIAlertAction(title: \"Cancel\"\
    , style: UIAlertActionStyle.Cancel,  \n      handler: {action in  \n      // do\
    \ nothing  \n      })  \n\n    var actionNormal1 = UIAlertAction(title: \"Action\
    \ 1\", style: UIAlertActionStyle.Default,  \n      handler: {action in  \n   \
    \     println(\">>actionNormal1\")  \n      })  \n\n    var actionNormal2 = UIAlertAction(title:\
    \ \"Action 2\", style: UIAlertActionStyle.Default,  \n      handler: {action in\
    \  \n        println(\">>actionNormal2\")  \n      })  \n\n    var actionDestruct\
    \ = UIAlertAction(title: \"Destruct\", style: UIAlertActionStyle.Destructive,\
    \  \n      handler: {action in  \n        println(\">>actionDestruct\")  \n  \
    \    })  \n\n    actionSheet.addAction(actionCancel) // always the last one  \n\
    \    actionSheet.addAction(actionNormal1)  \n    actionSheet.addAction(actionNormal2)\
    \  \n    actionSheet.addAction(actionDestruct)  \n\n    // UIViewController API\
    \ to presend viewController  \n    self.  \n```"
