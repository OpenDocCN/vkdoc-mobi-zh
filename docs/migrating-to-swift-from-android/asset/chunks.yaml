    \ Size Classes，底部指针）。\n\n![9781484204375_Fig03-09.jpg](img/9781484204375_Fig03-09.jpg)\n\
    \n图 3-9. 启用使用尺寸等级\n\n2. 使用**助理编辑器**（Assistant Editor）预览 iPhone 和 iPad 屏幕。尺寸等级一开始可能会让人不知所措，但我发现预览功能非常有帮助（参见图\
    \ 3-10）。\n    1. 场景被转换为最具适应性的尺寸等级：(`wAny hAny`)。自动布局约束也在此尺寸等级中保留。你可以立即看到 iPad\
    \ 场景按预期工作。\n\n![9781484204375_Fig03-10.jpg](img/9781484204375_Fig03-10.jpg)\n\n\
    图 3-10. 尺寸等级预览\n\n3. 点击**尺寸等级**控件来选择尺寸等级（参见图 3-11）。\n    1. 将鼠标悬停，可以看到高亮和标题的变化。与表\
    \ 3-1 进行比较，你可以选择针对特定尺寸等级的行和列。默认是**任意宽度 | 任意高度**（Any Width | Any Height），它最开始适用于所有尺寸等级。\n\
    \n![9781484204375_Fig03-11.jpg](img/9781484204375_Fig03-11.jpg)\n\n图 3-11. 使用尺寸等级选择器选择特定的尺寸等级\n\
    \n4. 要为 iPhone 横屏场景提供特定布局，请选择**紧凑宽度 | 紧凑高度**（Compact Width | Compact Height），如图\
    \ 3-12 所示。\n\n![9781484204375_Fig03-12.jpg](img/9781484204375_Fig03-12.jpg)\n\n\
    图 3-12. 横屏模式下的 iPhone 使用**紧凑宽度 | 紧凑高度**\n\n5. 为了演示强大的尺寸等级功能，请为紧凑-紧凑尺寸等级重新开始。从顶部菜单栏中，依次选择**编辑器**（Editor）![image](img/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**清除视图控制器中的约束**（Clear Constraints in View Controller）。这只会清除所选尺寸等级中的自动布局约束；你可以看到约束仍然存在，但已变为灰色。\n\
    6. 拖曳控件以重新定位它们，快速构思即可——你不需要精确对齐（参见图 3-13）。\n    1. 既然你正在为横屏模式下的 iPhone 显式提供自定义布局，你其实可以精确地绘制位置，然后通过从顶部菜单栏依次选择**编辑器**（Editor）![image](img/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**重置为视图控制器中的建议约束**（Reset to Suggested Constraints in View\
    \ Controller），让故事板完成其余工作。\n    2. 如果你尝试了上一步，请再次选择**清除视图控制器中的约束**（Clear Constraints\
    \ in View Controller），以便为创建自动布局约束提供一个干净的起点。\n\n![9781484204375_Fig03-13.jpg](img/9781484204375_Fig03-13.jpg)\n\
    \n图 3-13. 紧凑高度（iPhone 横屏模式）的双面视图\n\n7. 对于`TextField`，添加以下自动布局约束：\n    1. 使用**容器中水平居中**（Horizontal\
    \ Center in Container）创建一个 X 轴对齐约束，**倍率**（Multiplier）设置为**2**。\n    2. 使用**容器中垂直居中**（Vertical\
    \ Center in Container）创建一个 Y 轴对齐约束，**倍率**（Multiplier）设置为**1.5**。\n    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](img/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n    4. 要更新现有约束，可以从故事板导航器中选择约束，或者先在场景中选择控件，然后看到并点击故事板场景中的引导线。使用**实用工具**（Utility）区域中的**属性检查器**（Attributes\
    \ Inspector）（参见图 3-14）来更新任何约束属性。\n\n![9781484204375_Fig03-14.jpg](img/9781484204375_Fig03-14.jpg)\n\
    \n图 3-14. 更新自动布局约束\n\n8. 对于`Label`，按照步骤 7 中的相同方式添加以下自动布局约束：\n    1. 使用**容器中水平居中**（Horizontal\
    \ Center in Container）创建一个 X 轴对齐约束，**倍率**（Multiplier）设置为**2**。\n    2. 使用**容器中垂直居中**（Vertical\
    \ Center in Container）创建一个 Y 轴对齐约束，**倍率**（Multiplier）设置为**0.75**。\n    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](img/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n9. 对于`Button`，按照步骤 7 中的相同方式添加以下自动布局约束：\n\
    \    1. 使用**容器中水平居中**（Horizontal Center in Container）创建一个 X 轴对齐约束，**倍率**（Multiplier）设置为**0.67**。\n\
    \    2. 使用**容器中垂直居中**（Vertical Center in Container）创建一个 Y 轴对齐约束，**倍率**（Multiplier）设置为**1**。\n\
    \    3. 从顶部菜单栏中，依次选择**编辑器**（Editor）![image](img/arrow.jpg)**解决自动布局问题**（Resolve\
    \ Auto Layout Issues）下的**更新帧**（Update Frame）。\n\n预览中的所有设备类别看起来都符合预期（图 3-15）。\n\
    \n![9781484204375_Fig03-15.jpg](img/9781484204375_Fig03-15.jpg)\n\n图 3-15. 在故事板编辑器中预览的设备类别\n\
    \n你可以运行所有模拟器中的应用来查看实际效果。iPhone 4s 模拟器如图 3-16 所示。\n\n![9781484204375_Fig03-16.jpg](img/9781484204375_Fig03-16.jpg)\n\
    \n图 3-16. iPhone4s 竖屏和横屏尺寸等级\n\n## 内容视图控制器\n\n### Android 类比\n\n`Fragment`。\n\n\
    内容视图控制器参与者与内容视图配对（参见**图 3-1**）。在 iOS 和 Android 编程范式中，内容视图通常静态创建（即通过`layout.xml`或故事板）。内容视图控制器类管理内容视图，通过向用户传递信息并与之交互来呈现用户界面的动态行为。你通常在\
    \ Android 中继承`Fragment`来创建你的内容视图控制器。在 iOS 中，你创建一个继承自`UIViewController`的类以达到相同目的。\n\
    \n你的主要内容视图控制器任务是：\n\n*   与其自身的内容视图配对\n*   保持对内容视图中 UI 控件的对象引用\n*   实现响应控件事件的方法。\n\
    \n在 iOS 中，你通常使用故事板编辑器将 UI 控件或事件连接到你的代码，以简化这些常见的编程任务。\n\n## 与内容视图配对\n\n### Android\
    \ 类比\n\n在`Fragment.onCreateView(...)`中填充`layout.xml`文件。\n\n在 iOS 中，你通常首先为你的应用创建一个故事板（就像\
    \ iOS 的`HelloMobile`项目）。通常，对于每个故事板场景（内容视图），你创建一个继承自`UIViewController`的 Swift 类与之配对。\n\
    \niOS 的`HelloMobile`项目尚未完成：它只渲染了初始屏幕，但当你点击`Hello...`按钮时什么也不做。你需要一个能够履行此职责的功能性内容视图控制器。**单视图应用**（Single\
    \ View Application）模板已经为你配对了一个控制器类：`ViewController.swift`。为了完整演示这个主题，请勿使用此类；而是执行以下操作来创建我们自己的类：\n\
    \n1. 为新的 Swift 类创建一个新文件：\n\n   1. 右键点击**导航器**（Navigator）区域中的`HelloMobile`文件夹，然后依次选择**新建文件...**（New\
    \ File ...）![image](img/arrow.jpg)**iOS** ![image](img/arrow.jpg)**源**（Source）![image](img/arrow.jpg)**Swift\
    \ 文件**（Swift File）（参见图 2-3）。\n     2. 将文件保存为`HelloViewController.swift`。\n   \
    \  3. 创建继承自`UIViewController`的`HelloViewController`类，如代码清单 3-1 所示。\n\n***代码清单\
    \ 3-1***. `HelloViewController`类框架\n"
- fmt: "```\nimport UIKit\nclass HelloViewController: UIViewController {\n  // TODO\n\
    }\n```\n\n2.  Pair the storyboard scene with the `HelloViewController` class (see\
    \ [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)):\n    1.  Select `Main.storyboard`\
    \ to open the storyboard editor.\n    2.  Select the view controller in the storyboard\
    \ scene and open the **Identity Inspector** in the **Utility** area.\n    3. \
    \ Enter `HelloViewController` in the **Custom Class** field to pair the storyboard\
    \ scene with the `HelloViewController` class.\n\n![9781484204375_Fig03-17.jpg](images/9781484204375_Fig03-17.jpg)\n\
    \n[Figure 3-17](#9781484204375_Ch03.xhtml#_Fig17). **Identity Inspector** to pair\
    \ with view controller\n\nSpecifying the custom class in **Identity Inspector**\
    \ is all you need to pair with the content view controller.\n\n## Interact with\
    \ Content View\n\n**ANDROID ANALOGY** In the Fragment view controller class, `rootView.findViewById(...)`\
    \ to get the object reference. Register event listener using the `setOnXxxListener(...)`\
    \ methods.\n\nGenerally in both Android and iOS, you create UI widgets in a content\
    \ view and your content view controller code updates the widget’s states or interacts\
    \ with users at runtime. In iOS, you use **Connections Inspector** to create `IBOutlet`\
    \ and `IBAction` to facilitate this common programming task by drawing connections\
    \ to your code in the Swift class:\n\n*   `IBOutlet`: the view controller property\
    \ that is connect to the widgets in the storyboard scene.\n*   `IBAction`: the\
    \ view controller method that is called when the widget events occur.\n\nThe following\
    \ walks you through the steps to connect the UI widgets and delegates action events\
    \ to your controller class:\n\n1.  Select `Main.storyboard` to open the storyboard\
    \ editor.\n    1.  Open the storyboard **Assistant Editor**. The `HelloViewController`\
    \ class should automatically open in the assistant editor.\n    2.  Sometimes\
    \ the right file may not be opened automatically in the **Assistant Editor**,\
    \ so you may need to select the right file manually (see [Figure 3-18](#9781484204375_Ch03.xhtml#Fig18)).\n\
    \n![9781484204375_Fig03-18.jpg](images/9781484204375_Fig03-18.jpg)\n\n[Figure\
    \ 3-18](#9781484204375_Ch03.xhtml#_Fig18). Selecting a file manually in **Assistant\
    \ Editor**\n\n2.  Select the `TextField` in the storyboard scene (the left pointer\
    \ in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19)), and open the **Connections\
    \ Inspector** (the right pointer in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19))\
    \ as shown in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19) (make sure the **Utility**\
    \ Area is unfolded).\n\n![9781484204375_Fig03-19.jpg](images/9781484204375_Fig03-19.jpg)\n\
    \n[Figure 3-19](#9781484204375_Ch03.xhtml#_Fig19). Opening the **Connections Inspector**\n\
    \n3.  Create an `IBOutlet` for the `TextField` in the storyboard scene (see [Figure\
    \ 3-20](#9781484204375_Ch03.xhtml#Fig20)).\n    1.  Drag the circle next to **New\
    \ Referencing Outlet** with three fingers (or hold the left trackpad button at\
    \ the same time) and drop it inside the class. You should see the line from the\
    \ circle as shown in [Figure 3-20](#9781484204375_Ch03.xhtml#Fig20).\n    2. \
    \ Enter the connection name (i.e., `mTextField`). This creates a property in the\
    \ Swift class.\n\n![9781484204375_Fig03-20.jpg](images/9781484204375_Fig03-20.jpg)\n\
    \n[Figure 3-20](#9781484204375_Ch03.xhtml#_Fig20). `IBOutlet` in **Connections\
    \ Inspector**\n\n4.  Repeat steps 2 and 3 to create `mLabel` and `mButton IBOutlets`.\n\
    5.  Create an `IBAction` for the button touch down events.\n    1.  Drag the circle\
    \ next to **Touch Down** in **Sent Events** section and drop it inside the Swift\
    \ class (see [Figure 3-21](#9781484204375_Ch03.xhtml#Fig21)).\n\n![9781484204375_Fig03-21.jpg](images/9781484204375_Fig03-21.jpg)\n\
    \n[Figure 3-21](#9781484204375_Ch03.xhtml#_Fig21). Creating an `IBAction` in the\
    \ **Connections Inspector**\n\n2.  Enter the method name: i.e., `onButtonTouchDown`.\
    \ This creates a method stub in the Swift class.\n    3.  Add the Say-Hello code\
    \ to complete the `IBAction` method implementation in `HelloViewController.swift`\
    \ as shown in [Listing 3-2](#9781484204375_Ch03.xhtml#list2).\n\n[***Listing 3-2***](#9781484204375_Ch03.xhtml#_list2).\
    \ `HelloViewController` with `IBOutlet` and `IBAction`\n\n```\nimport UIKit\n\n\
    class HelloViewController: UIViewController {\n\n@IBOutlet weak var mTextField:\
    \ UITextField!\n@IBOutlet weak var mLabel: UILabel!\n@IBOutlet weak var mButton:\
    \ UIButton!\n\n@IBAction func onButtonTouchDown(sender: AnyObject) {\n    var\
    \ str = mTextField.text\n    mLabel.text = \"Hello \\(str)!\"\n  }\n}\n```\n\n\
    This completes the whole `HelloMobile` iOS app. You can run the project in all\
    \ iOS simulators to see the code in action.\n\nYou’re almost done with the MVC\
    \ topics. Just one more small lecture before we get into more fun stuff: `UIViewController`\
    \ lifecycle events.\n\n## UIViewController Life Cycle\n\n**ANDROID ANALOGY** Fragment\
    \ life cycle.\n\nSimilar to the Android `Fragment` class, lifecycle callbacks\
    \ are called at various points when a content view is being rendered. Certain\
    \ tasks need to be performed in certain states to ensure the content view is rendered\
    \ smoothly. This applies to both iOS and Android. The iOS lifecycle concept may\
    \ not be a beginner topic, but it is easy for Android developers to pick up because\
    \ the purpose is the same: they want to perform certain computing tasks at the\
    \ right time, with which Android developers are already familiar.\n\nIn Android,\
    \ the lifecycle events are described as the states of the view controller itself.\
    \ In iOS, these lifecycle events are directly related to the content view events,\
    \ so you actually can visualize the effects better because they are directly related\
    \ to the view-rendering process.\n\nImplementing these view events is essentially\
    \ the same as writing your `Fragment` lifecycle callback methods: you can choose\
    \ to override these inherited system methods to receive timely callbacks if you\
    \ wish.\n\n### viewDidLoad\n\n**ANDROID ANALOGY** `Fragment.onCreate()` and `onCreateView()`.\n\
    \niOS system calls the `viewDidLoad()` method when the view controller loads its\
    \ content view from the storyboard scene. You commonly put the initialization\
    \ code here.\n\n### viewWillAppear\n\n**ANDROID ANALOGY** `onStart()`.\n\niOS\
    \ system calls the `viewWillAppear()` method when the view is about to appear.\
    \ Generally, you can safely translate the Android `onStart()` into this method.\n\
    \n### viewDidAppear\n\n**ANDROID ANALOGY** `onResume()`.\n\niOS system calls the\
    \ `viewDidAppear()` method when the view becomes visible. Generally, you can safely\
    \ translate the Android `onResume()` into this method.\n\n### viewWillDisappear\n\
    \n**ANDROID ANALOGY** `onPause()`.\n\nThe system calls the `viewWillDisappear()`\
    \ method when the content view is about to become invisible—for example, leaving\
    \ for another storyboard scene. This is usually where you should commit any changes\
    \ that should be persisted beyond the current user session (because the user might\
    \ not come back).\n\n### viewDidDisappear\n\n**ANDROID ANALOGY** `onStop()`.\n\
    \nThe system calls the `viewDidDisappear()` method when the content view is not\
    \ visible.\n\nWhen implementing these lifecycle events, you almost always will\
    \ want to call the corresponding `super.viewXXX()`, just like Android.\n\n## Screen\
    \ Navigation Patterns\n\nYou commonly use multiple screens to convey hierarchical\
    \ information to and interact with users. Considering the relatively small mobile\
    \ screens, it is even more crucial that you use well-known navigation patterns\
    \ to make mobile apps more predictable. A consistent and predictable navigation\
    \ pattern guides users to complete a task with multiple screens. Efficient navigation\
    \ is one of the cornerstones of a well-designed app.\n\nThis section will focus\
    \ on the most common screen navigation patterns supported in both iOS and Android.\n\
    \n### Storyboard Segue"
