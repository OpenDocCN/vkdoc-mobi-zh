    \ iPhone 上，如果导航栏无法容纳`UIBarButtonItem`中的所有按钮，可以创建一个底部栏`UIToolbar`。  \n\n要在`CommonWidgets`项目中通过示例学习并展示`UIBarButtonItem`在导航栏和工具栏中的使用，请执行以下操作：\
    \  \n\n1.  从**Object Library**拖动一个`UINavigationBar`到`view`，并将其放置在视图顶部。通常，更简单的方法是在故事板中选择**View\
