  trans: "\n- **文件检查器：** 在 Xcode 中显示实际文件标识和文档类型选项。\n- **快速帮助检查器：** 显示参考文档。\n- **标识检查器：**\
    \ 显示来自 SDK 的 Swift 类或与故事板中项目关联的自定义类。\n- **属性检查器：** 这是我们现在的主要关注点。你会看到不同小部件有不同的属性。\n\
    - **尺寸检查器：** 显示小部件所在的矩形区域。\n- **连接检查器：** 允许你绘制到视图控制器的连接。我稍后会讨论这一点（参见第 3 章中的“与内容视图交互”）。\n\
    \n![9781484204375_Fig02-10.jpg](img/9781484204375_Fig02-10.jpg)\n\n图 2-10。从对象库中选择\
    \ UI 组件\n\n现在是时候让你熟悉 Xcode 的故事板功能了。iOS 的 `HelloMobile` 项目看起来还不同于对应的 Android 应用；它只在\
    \ `Main.storyboard` 文件中有一个屏幕，而且是空的。对应的 Android 布局文件有三个 UI 小部件：`EditText`、`TextView`\
    \ 和一个 hello `Button`。\n\n首先，你将实现 `HelloMobile` iOS 应用的用户界面。Xcode 故事板为此任务提供了所需的一切。\n\
    \n## 对象库和属性检查器\n\n**Android 类比：** 从 ADT 图形布局编辑器的面板视图中拖放 UI 小部件，并在布局文件中设置小部件属性。\n\
    \n你需要向内容视图中添加三个 UI 小部件，就像对应的 Android 应用一样，步骤如下：\n\n1.  在**项目导航器**中选择 `Main.storyboard`\
    \ 文件。图 2-10 描绘了**编辑器**区域中的故事板编辑器。目前只有一个屏幕，称为故事板场景。\n2.  在**实用工具**区域中，从库选择器栏选择**对象库**。你可以在这里找到用于组成故事板的\
    \ UI 小部件和元素。\n3.  （可选）为了给故事板编辑器腾出更多空间，你可以通过选择切换按钮来隐藏**导航器**和**调试**区域，如图 2-10 所示。\n\
    4.  我将在第 3 章中讨论尺寸等级，这是 iOS 8 的一个重要新特性。目前，请禁用它：在**实用工具**区域的**文件检查器**中取消选中**使用尺寸等级**，如图\
    \ 2-11 所示。这将为你提供一个更好的所见即所得的故事板编辑器。\n\n![9781484204375_Fig02-11.jpg](img/9781484204375_Fig02-11.jpg)\n\
    \n图 2-11。在文件检查器中禁用尺寸等级\n\n5.  要将 UI 小部件添加到故事板场景，请从**对象库**中找到所需的 UI 小部件，并将其拖到故事板场景中的现有视图上。Android\
    \ 和 iOS 屏幕都必须有一个根视图，任何视图元素都应该添加到父视图中。这就形成了父子视图层级。\n    1.  你必须先选择父视图（参见图 2-11\
    \ 中的指针），然后才能将 `TextField` 元素放置到其上。\n    2.  你可以浏览并从**对象库**中选择 UI 小部件。列表很长，因此底部的搜索栏对于找到正确的小部件非常有用。输入\
    \ iOS 小部件的名称，如图 2-10 所示，或者输入你猜测的名称，尽可能多地输入字符。\n\n**提示** 你需要的 iOS 小部件称为 `TextField`、`Label`\
    \ 和 `Button`。\n\n3.  要定位新添加的 `TextField`，请将其拖到你想要的位置。Xcode 会给出引导线，指示小部件何时位于某些常见关注位置，例如居中，或与其他任何小部件对齐（参见图\
    \ 2-12）。\n\n![9781484204375_Fig02-12.jpg](img/9781484204375_Fig02-12.jpg)\n\n\
    图 2-12。引导线\n\n4.  图 2-13 显示了添加到故事板场景的三个简单 UI 小部件。\n\n![9781484204375_Fig02-13.jpg](img/9781484204375_Fig02-13.jpg)\n\
    \n图 2-13。三个简单的 UI 小部件\n\n6.  就像在 Android 中一样，Swift 中 UI 小部件的属性会影响小部件的外观、感觉和行为，你可以直观地更改它们。你可以在位于**实用工具**区域的**属性检查器**中找到并修改这些属性。要使\
    \ `TextField` 类似于 Android 对应的小部件，请修改以下属性：\n    1.  字体大小：`System 24`\n    2.  占位符（即\
    \ `android:hint`）：\"`输入姓名，例如：你`\"\n    3.  对齐方式：`居中`\n    4.  `TextField` 有很多属性。浏览一下，你应该能够毫不费力地将它们与你通常在\
    \ Android `EditText` 中使用的对应属性联系起来。\n    5.  切换到**尺寸检查器**视图，将宽度更改为 `200`。你需要拖动\
    \ `TextField` 以将其水平居中放置。\n7.  要使 `Label` 小部件类似于 Android 对应的 `TextView`，请修改以下属性：\n\
    \    1.  文本：例如， \"`Hello World!`\"\n    2.  字体：例如， `System 20` 或 `Headline`\n\
    \    3.  对齐方式：`居中`\n    4.  行数：`1`\n    5.  切换到**尺寸检查器**，将宽度更改为 `200`。你需要拖动标签以将其水平居中放置。\n\
    8.  要使 `Button` 小部件类似于 Android 对应的小部件，请修改以下属性：\n    1.  文本：\"`Hello World!`\"\n\
    \    2.  标题：\"`Hello ...`\"\n9.  要在 Xcode 中预览你的故事板，请在工具栏上选择**助理编辑器**按钮，然后在助理编辑器中选择**预览**，如图\
    \ 2-14 所示。\n\n![9781484204375_Fig02-14.jpg](img/9781484204375_Fig02-14.jpg)\n\n\
    图 2-14。添加到故事板的三个简单小部件\n\n纵向模式的外观和感觉对于我们当前的目的来说已经足够接近了：使用故事板直观地组成内容视图，而无需编写一行代码。iOS\
    \ 的 `HelloMobile` 尚未完成：`Hello ...` 按钮并未显示 “Hello...” 字样，而且横向模式也尚不可接受。这两个都是重要主题，在第\
    \ 3 章中有各自的章节。\n\n在这个练习中，我只是想让你快速浏览一下 Xcode 的故事板编辑器。Xcode 工作区看起来与 Eclipse 有很大不同。花点时间熟悉\
    \ Xcode 工作区，包括故事板编辑器、**实用工具**区域、选择器工具栏等。Xcode 故事板是一个非常重要的工具，它在创建 iOS 应用时将极大地影响你的生产效率。\n\
    \n## 总结\n\n从表面上看，本章中你实际上学到了很多东西。我们从讨论 Swift 与 Java 语言的对比开始，了解它们的相似之处，然后我们回顾了 Swift\
    \ 语言主题以突出新的语言特性。然而，本书的其余部分将侧重于 iOS 编程，而不是 Swift 语言。代码将注重可读性，而不是使用新技巧来追求简洁。你阅读本书其余部分的所有\
    \ Swift 代码肯定不会有问题。不过，迟早你会需要 Swift 编程语言的参考文档，该文档可在 iTunes 上免费获取（`https://itunes.apple.com/us/book/swift-programming-language/id881256329`）。\n\
    \n你使用 Xcode 创建了一个 `HelloMobile` iOS 项目，以便可视化典型的 iOS 应用结构，从而能够直观地理解。你还初步体验了 Xcode\
    \ 故事板，它非常重要，你将在每个 iOS 应用中用到它，包括本书中的所有示例项目——所以请准备好反复接触故事板。\n\n## 第二部分\n\n### 移植路线图\n"
- fmt: "\nIn Part II, you will plan and structure your iOS apps following the iOS\
    \ thinking process, which can be explained in Android vocabulary using the common\
    \ top-down design approach. After you finish Part II, you will be able to create\
    \ simple but meaningful iOS apps with rich UI components, and to handle common\
    \ CRUD operations locally and remotely.\n\nYour migrating-to-Swift roadmap follows\
    \ the common top-down approach, with translation guidelines in lower-level implementation\
    \ using your comfortable Android vocabulary, which you can then relate to the\
    \ mobile functions that you normally do in Android.\n\nPart II shows you the common\
    \ screen-navigation patterns that you normally encounter in your Android apps,\
    \ and how to carry out the same tasks in iOS apps. Not only do you get a high-level\
    \ runnable iOS storyboard; you also get Android-like MVC structured classes that\
    \ are mapped to the counterpart Swift classes. The rest of Part II provides instructions\
    \ on how to convert the common mobile implementation tasks from Android SDK to\
    \ iOS SDK—including UI, saving data, networking, and so forth—that are widely\
    \ used in almost any Android GUI app. Again, after completing Part II, you will\
    \ be capable of creating iOS apps that are simple but meaningful.\n\n## Chapter\
    \ 3: Structure Your App\n\nTo implement your software, you will make design decisions\
    \ based on how you’d like to structure your app in terms of organizing your code\
    \ into classes. To decide your iOS app structure up front, the top-down approach\
    \ and model-view-controller (MVC) design pattern are recommended and actually\
    \ embedded in the iOS SDK and tools. MVC is also implicitly embedded in Android\
    \ SDK (with different vocabularies), and if you are used to the top-down approach\
    \ for creating your Android apps, where you design the application workflow prior\
    \ to detailing each individual screen, it is even easier for you to switch your\
    \ programming thinking process between iOS and Android.\n\nIn this first step,\
    \ you are aiming at class-level mapping from the Android counterparts. I will\
    \ discuss MVC first, followed by how to create the iOS storyboard in Xcode. With\
    \ the guided screen navigation patterns, your iOS storyboard naturally breaks\
    \ your iOS apps into MVC components that can be mapped from their Android counterparts.\n\
    \n### Model-View-Controller\n\n**ANDROID ANALOGY**\n\n- **Content view**: Layout\
    \ files\n- **Content view controller**: `Fragment` class\n- **Delegate**: Java\
    \ event listener\n- **Container view controller**: the `Activity` class that coordinates\
    \ the child `Fragments` in it\n\nMVC immediately breaks the GUI app into three\
    \ layers. The iOS MVC design pattern specifies that a GUI application consists\
    \ of a data **model**, a presentation **view**, and **controller** layers, as\
    \ shown in [Figure 3-1](#9781484204375_Ch03.xhtml#Fig1).\n\n![9781484204375_Fig03-01.jpg](images/9781484204375_Fig03-01.jpg)\n\
    \n[Figure 3-1](#9781484204375_Ch03.xhtml#_Fig1). The iOS MVC design pattern\n\n\
    Although there seem to be no explicit MVC vocabularies defined in the Android\
    \ SDK, it implicitly enforces separating content view from the content view controller\
    \ in terms of Layout files and `Fragment` classes.\n\nIn iOS, you explicitly use\
    \ the MVC vocabularies: content view and content view controller. You naturally\
    \ break down your iOS app into MVC classes, starting with creating a storyboard\
    \ prototype using the Xcode storyboard editor.\n\nUnless your app only has one\
    \ screen, you need to decide how to implement navigations and screen transitions\
    \ among multiple view controllers. You need an optional MVC participant: Container\
    \ View Controller. In Android, there seems to be no explicit framework class that\
    \ does the work for you. However, the parent-child relationship between `Activity`\
    \ and `Fragment` makes the parent `Activity` a natural candidate for the Container\
    \ View Controller participant. In practice, I use the parent `Activity` to manage\
    \ the child `Fragments`, including for navigation code.\n\nIn iOS, the SDK provides\
    \ several Container View Controllers for screen navigation; you simply choose\
    \ the appropriate Container View Controller class and let the iOS framework facilitate\
    \ the tasks for you.\n\nI’ll start with content view and content view controller,\
    \ then talk about the Container View Controller next.\n\n### Content View\n\n\
    **ANDROID ANALOGY**\n\nAndroid Layout file.\n\nA content view provides a visible\
    \ area so that users can interact with the app. The content view defines how to\
    \ render itself with contents and can interact with user actions. To create content\
    \ views in iOS, use Xcode **storyboard**.\n\nRecall that in the iOS `HelloMobile`\
    \ app, you drew the UI widgets in the storyboard scene in a very similar fashion\
    \ to what you normally do in ADT: drag and drop the widgets to draw them on the\
    \ parent view. However, this iOS content view is not adaptive to other device\
    \ types and screen orientations yet. You can easily observe the landscape problem\
    \ in the **Assistant Editor** previews (see [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14)).\
    \ Creating adaptive content views for various screen sizes is a common task in\
    \ both iOS and Android. In Android, you achieve this via alternative layout resources\
    \ and layout managers. In iOS, you essentially use iOS platform features for the\
    \ same purposes:\n\n- **Auto Layout**: This works best with responsive UX designs\
    \ that are agnostic/adaptive to screens sizes.\n- **Size classes**: These provide\
    \ ultimate flexibility for customizing the screens for different screen sizes.\n\
    \n#### Auto Layout\n\n**ANDROID ANALOGY**\n\n```\nRelativeLayout.\n```\n\nYou\
    \ can think of iOS Auto Layout as Android `RelativeLayout`: you position each\
    \ UI widget by aligning or spacing it relative to neighbors or the parent view.\n\
    \nThe three widgets in the current iOS `HelloMobile` project are not positioned\
    \ properly in landscape mode (see [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14)).\
    \ Use iOS Auto Layout to fix this while learning its uses.\n\nWhile extremely\
    \ powerful, some Xcode editors or operations are collapsed in the menus and could\
    \ be difficult to locate for a beginner. [Figure 3-2](#9781484204375_Ch03.xhtml#Fig2)\
    \ depicts some quick tips:\n\n- If you cannot find any editor or navigator, go\
    \ to **View ![image](images/arrow.jpg) ...** in the Xcode top menu bar.\n- Auto\
    \ Layout operations are grouped in **Editor ![image](images/arrow.jpg) ...** in\
    \ the Xcode top menu bar.\n- There are four small buttons in the bottom toolbar\
    \ of the storyboard editor. They offer quick Auto Layout operations and give you\
    \ some visual hints of what they are.\n- **Assistant Editor** that you will use\
    \ next.\n- The view selector in the **Utility** area allows you to switch between\
    \ several inspectors. You will use them a lot in the next chapter, too.\n\n![9781484204375_Fig03-02.jpg](images/9781484204375_Fig03-02.jpg)\n\
    \n[Figure 3-2](#9781484204375_Ch03.xhtml#_Fig2). Storyboard Auto Layout operations\
    \ in Xcode\n\nContinue working on the `HelloMobile` project. Do the following:\n\
    \n1. Storyboard **Preview** in **Assistant Editor** is extremely useful for immediately\
    \ seeing any changes for the selected storyboard scene:\n    1. Select the `main.storyboard`\
    \ file and open **Assistant Editor** (see the right pointer in [Figure 3-3](#9781484204375_Ch03.xhtml#Fig3)).\n\
    \    2. Click the **Assistant** menu button to select Preview (see the left pointer\
    \ in [Figure 3-3](#9781484204375_Ch03.xhtml#Fig3)).\n\n![9781484204375_Fig03-03.jpg](images/9781484204375_Fig03-03.jpg)\n\
    \n[Figure 3-3](#9781484204375_Ch03.xhtml#_Fig3). Two steps to reach the Xcode\
    \ storyboard Preview\n\n2. **Horizontal Center** the `TextField` **in Container**\
    \ to create an x-alignment constraint as shown in [Figure 3-4](#9781484204375_Ch03.xhtml#Fig4):\n\
    \    1. Select the `TextField` in the storyboard editor.\n    2. In the Xcode\
    \ top menu bar, select **Editor ![image](images/arrow.jpg) Align ![image](images/arrow.jpg)\
    \ Horizontal Center in Container**.\n\n![9781484204375_Fig03-04.jpg](images/9781484204375_Fig03-04.jpg)\n"
  raw: "In Part II, you will plan and structure your iOS apps following the iOS thinking\
    \ process, which can be explained in Android vocabulary using the common top-down\
    \ design approach. After you finish Part II, you will be able to create simple\
    \ but meaningful iOS apps with rich UI components, and to handle common CRUD operations\
    \ locally and remotely.\n\nYour migrating-to-Swift roadmap follows the common\
    \ top-down approach, with translation guidelines in lower-level implementation\
    \ using your comfortable Android vocabulary, which you can then relate to the\
    \ mobile functions that you normally do in Android.\n\nPart II shows you the common\
    \ screen-navigation patterns that you normally encounter in your Android apps,\
    \ and how to carry out the same tasks in iOS apps. Not only do you get a high-level\
    \ runnable iOS storyboard; you also get Android-like MVC structured classes that\
    \ are mapped to the counterpart Swift classes. The rest of Part II provides instructions\
    \ on how to convert the common mobile implementation tasks from Android SDK to\
    \ iOS SDK—including UI, saving data, networking, and so forth—that are widely\
    \ used in almost any Android GUI app. Again, after completing Part II, you will\
    \ be capable of creating iOS apps that are simple but meaningful.\n\nChapter    3\n\
    \nStructure Your App\n\nTo implement your software, you will make design decisions\
    \ based on how you’d like to structure your app in terms of organizing your code\
    \ into classes. To decide your iOS app structure up front, the top-down approach\
    \ and model-view-controller (MVC) design pattern are recommended and actually\
    \ embedded in the iOS SDK and tools. MVC is also implicitly embedded in Android\
    \ SDK (with different vocabularies), and if you are used to the top-down approach\
    \ for creating your Android apps, where you design the application workflow prior\
    \ to detailing each individual screen, it is even easier for you to switch your\
    \ programming thinking process between iOS and Android.\n\nIn this first step,\
    \ you are aiming at class-level mapping from the Android counterparts. I will\
    \ discuss MVC first, followed by how to create the iOS storyboard in Xcode. With\
    \ the guided screen navigation patterns, your iOS storyboard naturally breaks\
    \ your iOS apps into MVC components that can be mapped from their Android counterparts.\n\
    \nModel-View-Controller\n\nANDROID ANALOGY\n\n*   **Content view**: Layout files\n\
    *   **Content view controller**: Fragment class\n*   **Delegate**: Java event\
    \ listener\n*   **Container view controller**: the Activity class that coordinates\
    \ the child Fragments in it\n\nMVC immediately breaks the GUI app into three layers.\
    \ The iOS MVC design pattern specifies that a GUI application consists of a data\
    \ **model**, a presentation **view**, and **controller** layers, as shown in [Figure\
    \ 3-1](#9781484204375_Ch03.xhtml#Fig1).\n\n![9781484204375_Fig03-01.jpg](images/9781484204375_Fig03-01.jpg)\n\
    \n[Figure 3-1](#9781484204375_Ch03.xhtml#_Fig1). The iOS MVC design pattern\n\n\
    Although there seem to be no explicit MVC vocabularies defined in the Android\
    \ SDK, it implicitly enforces separating content view from the content view controller\
    \ in terms of Layout files and `Fragment` classes.\n\nIn iOS, you explicitly use\
    \ the MVC vocabularies: content view and content view controller. You naturally\
    \ break down your iOS app into MVC classes, starting with creating a storyboard\
    \ prototype using the Xcode storyboard editor.\n\nUnless your app only has one\
    \ screen, you need to decide how to implement navigations and screen transitions\
    \ among multiple view controllers. You need an optional MVC participant: Container\
    \ View Controller. In Android, there seems to be no explicit framework class that\
    \ does the work for you. However, the parent-child relationship between `Activity`\
    \ and `Fragment` makes the parent `Activity` a natural candidate for the Container\
    \ View Controller participant. In practice, I use the parent `Activity` to manage\
    \ the child `Fragments`, including for navigation code.\n\nIn iOS, the SDK provides\
    \ several Container View Controllers for screen navigation; you simply choose\
    \ the appropriate Container View Controller class and let the iOS framework facilitate\
    \ the tasks for you.\n\nI’ll start with content view and content view controller,\
    \ then talk about the Container View Controller next.\n\nContent View\n\nANDROID\
    \ ANALOGY\n\nAndroid Layout file.\n\nA content view provides a visible area so\
    \ that users can interact with the app. The content view defines how to render\
    \ itself with contents and can interact with user actions. To create content views\
    \ in iOS, use Xcode **storyboard**.\n\nRecall that in the iOS `HelloMobile` app,\
    \ you drew the UI widgets in the storyboard scene in a very similar fashion to\
    \ what you normally do in ADT: drag and drop the widgets to draw them on the parent\
    \ view. However, this iOS content view is not adaptive to other device types and\
    \ screen orientations yet. You can easily observe the landscape problem in the\
    \ **Assistant Editor** previews (see [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14)).\
    \ Creating adaptive content views for various screen sizes is a common task in\
    \ both iOS and Android. In Android, you achieve this via alternative layout resources\
    \ and layout managers. In iOS, you essentially use iOS platform features for the\
    \ same purposes:\n\n*   *Auto Layout*: This works best with responsive UX designs\
    \ that are agnostic/adaptive to screens sizes.\n*   *Size classes*: These provide\
    \ ultimate flexibility for customizing the screens for different screen sizes.\n\
    \nAuto Layout\n\nANDROID ANALOGY\n\n```\nRelativeLayout.\n```\n\nYou can think\
    \ of iOS Auto Layout as Android `RelativeLayout`: you position each UI widget\
    \ by aligning or spacing it relative to neighbors or the parent view.\n\nThe three\
    \ widgets in the current iOS `HelloMobile` project are not positioned properly\
    \ in landscape mode (see [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14)). Use\
    \ iOS Auto Layout to fix this while learning its uses.\n\nWhile extremely powerful,\
    \ some Xcode editors or operations are collapsed in the menus and could be difficult\
    \ to locate for a beginner. [Figure 3-2](#9781484204375_Ch03.xhtml#Fig2) depicts\
    \ some quick tips:\n\n*   If you cannot find any editor or navigator, go to **View\
    \ ![image](images/arrow.jpg) ...** in the Xcode top menu bar.\n*   Auto Layout\
    \ operations are grouped in **Editor ![image](images/arrow.jpg) ...** in the Xcode\
    \ top menu bar.\n*   There are four small buttons in the bottom toolbar of the\
    \ storyboard editor. They offer quick Auto Layout operations and give you some\
    \ visual hints of what they are.\n*   **Assistant Editor** that you will use next.\n\
    *   The view selector in the **Utility** area allows you to switch between several\
    \ inspectors. You will use them a lot in the next chapter, too.\n\n![9781484204375_Fig03-02.jpg](images/9781484204375_Fig03-02.jpg)\n\
    \n[Figure 3-2](#9781484204375_Ch03.xhtml#_Fig2). Storyboard Auto Layout operations\
    \ in Xcode\n\nContinue working on the `HelloMobile` project. Do the following:\n\
    \n1.  Storyboard **Preview** in **Assistant Editor** is extremely useful for immediately\
    \ seeing any changes for the selected storyboard scene:\n    1.  Select the `main.storyboard`\
    \ file and open **Assistant Editor** (see the right pointer in [Figure 3-3](#9781484204375_Ch03.xhtml#Fig3)).\n\
    \    2.  Click the **Assistant** menu button to select Preview (see the left pointer\
    \ in [Figure 3-3](#9781484204375_Ch03.xhtml#Fig3)).\n\n![9781484204375_Fig03-03.jpg](images/9781484204375_Fig03-03.jpg)\n\
    \n[Figure 3-3](#9781484204375_Ch03.xhtml#_Fig3). Two steps to reach the Xcode\
    \ storyboard Preview\n\n2.  **Horizontal Center** the `TextField` **in Container**\
    \ to create an x-alignment constraint as shown in [Figure 3-4](#9781484204375_Ch03.xhtml#Fig4):\n\
    \    1.  Select the `TextField` in the storyboard editor.\n    2.  In the Xcode\
    \ top menu bar, select **Editor ![image](images/arrow.jpg) Align ![image](images/arrow.jpg)\
    \ Horizontal Center in Container**.\n\n![9781484204375_Fig03-04.jpg](images/9781484204375_Fig03-04.jpg)"
  trans: "\n\n在第二部分，你将按照 iOS 的思维过程来规划和构建 iOS 应用，这一过程可以借助常见的自顶向下的设计方法，用 Android 术语加以解释。完成第二部分后，你将能够创建具有丰富\
    \ UI 组件且简单但有意义的 iOS 应用，并能处理本地及远程的常见 CRUD 操作。\n\n你的迁移至 Swift 路线图遵循常见的自顶向下方法，在涉及底层实现时会使用你熟悉的\
    \ Android 术语提供翻译指南，这样你就能将其与你通常在 Android 中执行的移动端功能联系起来。\n\n第二部分展示了你在 Android 应用中常见的屏幕导航模式，以及如何在\
    \ iOS 应用中执行相同的任务。你不仅会得到一个可运行的高级 iOS 故事板，还会获得类似 Android MVC 结构的类，这些类与对应的 Swift\
    \ 类相映射。第二部分的剩余部分提供了如何将常见的移动端实现任务从 Android SDK 转换到 iOS SDK 的指南——包括 UI、数据保存、网络等——这些任务几乎在所有\
    \ Android GUI 应用中广泛使用。再次强调，完成第二部分后，你将能够创建简单但有意义的 iOS 应用。\n\n## 第 3 章：构建你的应用\n\n\
    为了实现你的软件，你需要根据如何将代码组织成类来构建应用结构，并据此做出设计决策。为了提前确定你的 iOS 应用结构，推荐使用自顶向下的方法和模型-视图-控制器（MVC）设计模式，而它们实际上已内置于\
    \ iOS SDK 和工具中。MVC 也隐式地内置于 Android SDK 中（使用不同的词汇），如果你习惯使用自顶向下的方法创建 Android 应用——先设计应用程序工作流程，再细化每个屏幕——那么在\
    \ iOS 和 Android 之间切换编程思维过程对你来说会更加容易。\n\n在这第一步中，你的目标是实现与 Android 对应类在类级别的映射。我将首先讨论\
    \ MVC，然后介绍如何在 Xcode 中创建 iOS 故事板。借助引导式的屏幕导航模式，你的 iOS 故事板会自然地将 iOS 应用分解为 MVC 组件，这些组件可以与\
    \ Android 中的对应组件进行映射。\n\n### 模型-视图-控制器\n\n**Android 类比**\n\n- **内容视图**：布局文件\n\
    - **内容视图控制器**：`Fragment` 类\n- **委托**：Java 事件监听器\n- **容器视图控制器**：协调其中子 `Fragment`\
    \ 的 `Activity` 类\n\nMVC 立即将 GUI 应用分为三层。iOS MVC 设计模式规定，一个 GUI 应用由数据**模型**、呈现**视图**和**控制器**层组成，如图\
    \ 3-1 所示。\n\n![9781484204375_Fig03-01.jpg](img/9781484204375_Fig03-01.jpg)\n\n\
    图 3-1。iOS MVC 设计模式\n\n虽然在 Android SDK 中似乎没有明确定义 MVC 词汇，但它通过布局文件和 `Fragment` 类隐式地强制将内容视图与内容视图控制器分离。\n\
    \n在 iOS 中，你显式地使用 MVC 词汇：内容视图和内容视图控制器。你自然地将 iOS 应用分解为 MVC 类，首先使用 Xcode 故事板编辑器创建一个故事板原型。\n\
    \n除非你的应用只有一个屏幕，否则你需要决定如何在多个视图控制器之间实现导航和屏幕切换。你需要一个可选的 MVC 参与者：容器视图控制器。在 Android\
    \ 中，似乎没有明确的框架类能为你完成这项工作。然而，`Activity` 和 `Fragment` 之间的父子关系使得父 `Activity` 自然成为容器视图控制器参与者的候选者。在实践中，我使用父\
    \ `Activity` 来管理子 `Fragment`，包括处理导航代码。\n\n在 iOS 中，SDK 提供了几个用于屏幕导航的容器视图控制器；你只需选择合适的容器视图控制器类，让\
    \ iOS 框架为你简化这些任务。\n\n我将从内容视图和内容视图控制器开始，然后讨论容器视图控制器。\n\n### 内容视图\n\n**Android 类比**\n\
    \nAndroid 布局文件。\n\n内容视图提供一个可见区域，使用户能够与应用交互。内容视图定义了如何渲染自身内容，并能响应用户操作。要在 iOS 中创建内容视图，请使用\
    \ Xcode **故事板**。\n\n回想一下，在 iOS `HelloMobile` 应用中，你以与在 ADT 中非常相似的方式在故事板场景中绘制 UI\
    \ 小部件：拖放小部件以在父视图上绘制它们。然而，这个 iOS 内容视图尚未适应其他设备类型和屏幕方向。你可以很容易地在**辅助编辑器**预览中观察到横屏问题（见图\
    \ 2-14）。为各种屏幕尺寸创建自适应内容视图是 iOS 和 Android 中的常见任务。在 Android 中，你通过备选布局资源和布局管理器来实现这一点。在\
    \ iOS 中，你主要使用 iOS 平台特性来实现相同的目的：\n\n- **自动布局**：这在与屏幕尺寸无关/自适应的响应式 UX 设计中效果最佳。\n\
    - **尺寸类别**：为针对不同屏幕尺寸定制屏幕提供了最大的灵活性。\n\n#### 自动布局\n\n**Android 类比**\n\n```\nRelativeLayout。\n\
    ```\n\n你可以将 iOS 自动布局视为 Android 的 `RelativeLayout`：通过与相邻部件或父视图对齐或留空来定位每个 UI 小部件。\n\
    \n当前的 iOS `HelloMobile` 项目中的三个小部件在横屏模式下位置不正确（见图 2-14）。在学习其用法的同时，使用 iOS 自动布局来解决这个问题。\n\
    \n虽然自动布局非常强大，但某些 Xcode 编辑器或操作隐藏在菜单中，初学者可能难以找到。图 3-2 提供了一些快速提示：\n\n- 如果你找不到任何编辑器或导航器，请前往\
    \ Xcode 顶部菜单栏中的 **View ![image](img/arrow.jpg) ...**。\n- 自动布局操作分组在 Xcode 顶部菜单栏的\
    \ **Editor ![image](img/arrow.jpg) ...** 中。\n- 故事板编辑器的底部工具栏中有四个小按钮。它们提供快速的自动布局操作，并给你一些视觉提示。\n\
    - **辅助编辑器**是你接下来要使用的。\n- **实用工具**区域中的视图选择器允许你在多个检查器之间切换。你将在下一章中大量使用它们。\n\n![9781484204375_Fig03-02.jpg](img/9781484204375_Fig03-02.jpg)\n\
    \n图 3-2。Xcode 中的故事板自动布局操作\n\n继续处理 `HelloMobile` 项目。执行以下操作：\n\n1. **辅助编辑器**中的故事板**预览**对于立即查看所选故事板场景的任何更改非常有用：\n\
    \    1. 选择 `main.storyboard` 文件并打开**辅助编辑器**（见图 3-3 中的右侧指针）。\n    2. 点击**辅助**菜单按钮选择预览（见图\
    \ 3-3 中的左侧指针）。\n\n![9781484204375_Fig03-03.jpg](img/9781484204375_Fig03-03.jpg)\n\
    \n图 3-3。到达 Xcode 故事板预览的两个步骤\n\n2. 将 `TextField` **在容器中水平居中**，以创建一个 x 轴对齐约束，如图\
    \ 3-4 所示：\n    1. 在故事板编辑器中选择 `TextField`。\n    2. 在 Xcode 顶部菜单栏中，选择 **Editor ![image](img/arrow.jpg)\
    \ Align ![image](img/arrow.jpg) Horizontal Center in Container**。\n\n![9781484204375_Fig03-04.jpg](img/9781484204375_Fig03-04.jpg)\n\
    \n"
