    ![9781484204375_Fig04-29.jpg](img/9781484204375_Fig04-29.jpg)  \n\n图 4-29. 使用\
    \ `ActionSheet` 样式的 `UIAlertController`  \n\n`android.widget.PopupMenu` 会锚定到一个视图上。在\
    \ iOS 中，你可以通过使用 iOS 的 `UIPopoverController` 来呈现一个 `UITableViewController` 从而实现相同的效果。这在\
    \ iPad 上是完美的弹窗翻译，在 iPhone 上则是一个全屏的表格视图。或者，你也可以使用 iOS 的 `ActionSheet` 样式来避免 iPhone\
    \ 上全屏的 `UITableView`。  \n\n## `UIPickerView`  \n\n**安卓类比**  \n\n`android.widget.Spinner`。\
    \  \n\n在 iOS 中，`UIPickerView` 会显示一组可供用户选择的值。它提供了一种快速方式，可以从一个类似转轮的列表中选取一个值，该列表会显示全部或部分选项。\
    \  \n\n在传统的桌面应用或网页中，通常使用的是下拉列表，或安卓中的 `android.widget.Spinner`，来实现这一目的，但有一个细微的区别：它们只显示选中的值，而其他选项是折叠起来的。\
    \  \n\niOS 的 `UIPickerView` 使用与 `UITableView DataSource` 相同的模式来提供选项。通过实例学习，请向我们的\
    \ `CommonWidgets` 应用添加一个 `UIPickerView` 组件，并执行以下操作：  \n\n1.  选择 `Main.storyboard`，然后从\
    \ **对象库** 拖拽一个 `UIPickerView`。将其放置在 `UIImageView` 下方（参见图 4-30）。  \n\n    ![9781484204375_Fig04-30.jpg](img/9781484204375_Fig04-30.jpg)\
    \  \n\n    图 4-30. 放置 `UIPickerView`  \n\n2.  打开 **助手编辑器**，并在 **连接检查器** 中建立 `UIPickerView`\
    \ 的 outlet 连接到你的代码（参见图 4-31）：  \n    1.  将 `IBOutlet` 连接到你的代码。  \n    2.  将 `delegate`\
    \ 和 `dataSource` 出口连接到 `ViewController` 类（就像 `UITableView` 或任何使用 `Data Source`\
    \ 的组件一样）。  \n\n    ![9781484204375_Fig04-31.jpg](img/9781484204375_Fig04-31.jpg)\
    \  \n\n    图 4-31. 连接 `UIPickerView` 的出口  \n\n3.  要实现 `UIPickerView` 的代理和数据源，请声明\
    \ `ViewController` 类实现 `UIPickerViewDelegate` 和 `UIPickerViewDataSource` 协议，如代码清单\
    \ 4-15 所示。  \n\n    ***代码清单 4-15***. `UIPickerView IBOutlet`  \n\n    ```swift\n\
    \    class ViewController: ..., UIPickerViewDelegate, UIPickerViewDataSource {\n\
    \      ...\n      @IBOutlet weak var mPickerView: UIPickerView!\n      // 返回要显示的“列”数。\n\
    \      func numberOfComponentsInPickerView(pickerView: UIPickerView) -> Int {\n\
    \        return 2\n      }\n\n      // 返回每个组件中的行数。\n      func pickerView(pickerView:\
    \ UIPickerView, numberOfRowsInComponent component: Int) -> Int {\n        return\
    \ 10\n      }\n\n      func pickerView(pickerView: UIPickerView, titleForRow row:\
    \ Int, forComponent component: Int) -> String! {\n        return \"(\\(component),\
    \ \\(row))\"\n      }\n\n      func pickerView(pickerView: UIPickerView, didSelectRow\
    \ row: Int, inComponent component: Int) {\n        println(\"\\(self.mPickerView.selectedRowInComponent(0))\"\
    ) // 选择前\n        println(\"\\(self.mPickerView.selectedRowInComponent(1))\")\n\
    \        println(\"(\\(component), \\(row))\") // 当前选择\n      }\n      ...\n \
    \   }\n    ```\n\n构建并运行应用，即可看到 iOS `UIPickerView` 的实际效果。iPhone 模拟器对于你目前添加的所有组件来说太小了。你需要一个类似安卓的\
    \ `ScrollView`（稍后将会实现）。现在可以先在 iPad 模拟器中运行（参见图 4-32）。  \n\n![9781484204375_Fig04-32.jpg](img/9781484204375_Fig04-32.jpg)\
    \  \n\n图 4-32. iPad 模拟器中的 `UIPickerView`  \n\n请注意，如果在 iPad 模拟器中运行应用时，其外观像是一个放大的\
    \ iPhone，并且所有组件只是简单地放大，那么你的项目部署信息可能被设置成了仅限 **iPhone**。请在 **部署信息** 下将部署设备更改为 **通用**，如图\
    \ 4-33 中的指针所示。  \n\n![9781484204375_Fig04-33.jpg](img/9781484204375_Fig04-33.jpg)\
    \  \n\n图 4-33. 在部署信息中将设备更改为通用  \n\n## 播放视频  \n\n**安卓类比**  \n\n`android.widget.VideoView`。\
    \  \n\n与安卓类似，iOS SDK 提供了一个易于使用的 API 来播放来自 URL 的视频资源。要播放全屏视频，你可以使用 `MPMoviePlayerViewController`\
    \ 类，该类已内置了合适的内容视图和媒体播放器控件。你只需要呈现整个视图控制器即可。下面的方法（见代码清单 4-16）演示了最简单的用法：  \n\n1.\
    \  实现 `useMoviePlayerViewController()` 方法，该方法在 `MPMoviePlayerViewController` 视图控制器中播放视频（参见代码清单\
    \ 4-16）：  \n    1.  使用 URL 创建一个实例。和安卓一样，它可以链接到远程视频源。iOS 支持 HTTP 实时流协议（HLS）。你也可以为捆绑内容创建一个文件\
    \ URL，如代码清单 4-16 中注释掉的代码所示。如同在安卓中一样，请确保视频格式是被支持的。MPEG4 QuickTime 格式具有很好的通用性，HLS\
    \ 则适合渐进式加载。  \n    2.  `MPMoviePlayerViewController` 包含一个 `MPMoviePlayerController`\
    \ 属性，这是播放视频的核心类。几乎所有定制都是通过该属性完成的。稍后你将用到这个类。  \n\n2.  之前你在一个 `ActionSheet` 中实现了两个操作（参见图\
    \ 4-29）。使用 `操作 1` 按钮来触发 `useMoviePlayerViewController()` 方法（参见代码清单 4-16）。  \n\n\
    \    ***代码清单 4-16***. `useMoviePlayerViewController`  \n\n    ```swift\n    import\
    \ MediaPlayer\n    ...\n    class ViewController: ...{\n      ...\n      @IBAction\
    \ func doBarButtonAction(sender: AnyObject) {\n        ...\n        var actionNormal1\
    \ = UIAlertAction(title: \"Action 1\", style: UIAlertActionStyle.Default,\n  \
    \        handler: {action in\n            println(\">>actionNormal1\")\n            self.useMpMoviePlayerViewController()\n\
    \          })\n        ...\n      }\n      ...\n      func useMpMoviePlayerViewController()\
    \ {\n    //    var filepath = NSBundle.mainBundle().pathForResource(\"sample.mp4\"\
    , ofType: nil)\n    //    var fileUrl = NSURL(fileURLWithPath: filepath)\n   \
    \ //    var pvc = MPMoviePlayerViewController(contentURL: fileUrl)\n\n        var\
    \ contentUrl = NSURL(string: \"http://devimages.apple.com/iphone/samples/bipbop/gear3/prog_index.m3u8\"\
    )\n        var pvc = MPMoviePlayerViewController(contentURL: contentUrl)\n\n \
    \       pvc.moviePlayer.shouldAutoplay = false;\n        pvc.moviePlayer.repeatMode\
    \ = MPMovieRepeatMode.One\n\n        self.presentViewController(pvc, animated:\
    \ true, completion: nil)\n      }\n      ...\n    }\n    ```\n\n3.  要以非全屏模式播放视频，请直接使用\
    \ `MPMoviePlayerController` 在一个 `View` 组件中播放视频：  \n    1.  选择 `Main.storyboard`，从\
    \ **对象库** 拖拽一个 `UIView`，并将其放置在 `UIPickerView` 下方，如图 4-34 所示。这就是显示视频的观看区域。  \n\n\
