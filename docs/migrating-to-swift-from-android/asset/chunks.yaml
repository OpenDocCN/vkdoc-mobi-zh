    Control Flow


    Similar to Java, in Swift you use `if` and `switch` to make conditionals, and
    use `for-in`, `for`, `while`, and `do-while` to make loops. Parentheses around
    the condition or loop variable are optional. Braces around the body are required.
    [Listing 2-13](#9781484204375_Ch02.xhtml#list13) demonstrates the following common
    control flow usages:


    *   `for-loop`

    *   `for-in`

    *   `while-loop`


    [***Listing 2-13***](#9781484204375_Ch02.xhtml#_list13). Control Flows


    ```

    for (var idx = 0; idx < 10; idx++) { // optional parenthesis

      println("for-loop: \(idx)")

    }


    for item in [1,2,3,4,5] { // or for item in 1...5

      println("for-in: \(item)")

    }

    for c in "HelloSwift" { // loop thru characters

      print(c)

    }


    for (key, value) in colorDictionary {

      println("for-in dictionary:\(key) - \(value)")

    }


    // while-loop, or do-while that run at least once

    var idx = 0

    while idx < colors.count {

      println("while-loop:  \(colors[idx])")

      idx++

    }

    ```


    Switch


    In Swift, the **switch cases** can be any types in addition to `int` primitive
    data. [Listing 2-14](#9781484204375_Ch02.xhtml#list14) shows the following improved
    control flow `switch` usages in Swift:


    *   Combined cases and always break implicitly

    *   Cases with ranges

    *   Cases with tuples


    [***Listing 2-14***](#9781484204375_Ch02.xhtml#_list14). Improved Switch


    ```

    var condition = "red"

    switch condition {

    case "red", "green", "blue": // combined cases

      println("\(condition) is a prime color")

      // always break implicitly (no follow thru)

    case "RED", "GREEN", "BLUE":

      println("\(condition) is a prime color in uppercase")

    default: // not optional anymore

      println("\(condition) is not prime color")

    }


    var range = 9 // by range

    switch range {

    case 0:

      println("zero")

    case 0...9:

      println("one-digit number")

    case 10...99:

      println("two-digit number")

    case 10...999: // first hit first

      println("three-digit number")

    default:

      println("four or more digits")

    }


    var coord = (0, 1)

    switch coord { // by tuples

    case (0...Int.max, 0...Int.max):

      println("1st quad")

    case (Int.min...0, 0...Int.max):

      println("2nd quad")

    case (Int.min...0, Int.min...0):

      println("3rd quad")

    case (0...Int.max, Int.min...0):

      println("4th quad")

    default:

      println("on axis")

    }

    ```


    A `switch` can bind the matched value within its local scope. You can specify
    a `where` clause to test the condition, too. [Listing 2-15](#9781484204375_Ch02.xhtml#list15)
    demonstrates both value bindings.


    [***Listing 2-15***](#9781484204375_Ch02.xhtml#_list15). Temporary Value Binding
    and Using `where` Clause


    ```

    var rect = (10, 10)

    switch rect {

    case let (w, h) where w == h:

      println("\((w, h)) is a square")

    default:

      println("rectangle but not square")

    }

    ```


    Enumerations


    You use enum to define a common type for a group of related values. After the
    enumeration is defined, you use it just as a Swift type that is type safe. [Listing
    2-16](#9781484204375_Ch02.xhtml#list16) shows the following common enum usages:


    *   Enum with or without raw values

    *   Enum associated with values


    [***Listing 2-16***](#9781484204375_Ch02.xhtml#_list16). Common Enum usages


    ```

    enum DayOfWeek { // raw value is optional

      case SUNDAY, MONDAY, TUESDAY, WEDNESDAY,

      THURSDAY, FRIDAY, SATURDAY

    }


    var aDay = DayOfWeek.SUNDAY

    switch aDay {

    case DayOfWeek.SATURDAY, DayOfWeek.SUNDAY:

      println("\(aDay) is weekend")

    default:

      println("\(aDay) is weekday")

    }


    enum DayOfWeek2 :  String { // assign raw value

      case SUNDAY = "Sun", MONDAY = "Mon", TUESDAY = "Tue",

      WEDNESDAY = "Wed", THURSDAY = "Thu", FRIDAY = "Fri", SATURDAY = "Sat"

    }


    var aDay2 = DayOfWeek2.SUNDAY

    switch aDay2 {

    case DayOfWeek2.SATURDAY, DayOfWeek2.SUNDAY:

      println("\(aDay2.rawValue) is weekend")

    default:

      println("\(aDay2.rawValue) is weekday")

    }


    // associated values

    enum Color {

      case RGB(Int, Int, Int)

      case HSB(Float, Float, Float)

    }


    var aColor = Color.RGB(255, 0, 0)

    switch aColor {

    case var Color.RGB(r, g, b):

      println("R: \(r) G: \(g) B: \(b) ")

    default:

      println("")

    }

    ```


    Functions


    Swift functions are declared with the `func` keyword. Unlike Java methods, the
    parameter and return type are declared after the type name. Here are the typical
    Swift function usages you most likely will encounter (see [Listing 2-17](#9781484204375_Ch02.xhtml#list17)):'
  trans: "```swift\n// 在 if 和 while 的局部作用域中使用可选绑定\nif var myInt = intStr.toInt() {\n\
    \  // myInt 已被自动解包\n  println(\"已解包且处于局部作用域：\\(myInt)\")\n}\n```\n\n## 隐式解包可选类型\n\
    \n针对某些变量在赋值后总会拥有值的情况，可以将变量声明为隐式解包可选类型，用 `!` 代替 `?` 作为后缀。例如：`var delegate: MyDelegate!`\n\
    \n前面描述的所有可选类型用法在此均适用。你可以将其视为可选类型，但无需强制解包。在 iOS 框架中，此类用法常见于那些在其他地方（例如由调用方）初始化的属性。尤其值得注意的是，iOS\
    \ 框架中广泛嵌入了代理属性。这些代理被声明为隐式解包可选类型，但其值通常由调用方赋值。再举一例，UI 控件通常在 Storyboard 编辑器中绘制，并以\
    \ `IBOutlet` 属性的形式连接到代码中。这些 `IBOutlet` 属性也被声明为隐式解包可选类型。在此仅作简要说明，因为后续内容中你会频繁遇到这些用法。\n\
    \n## 元组\n\n元组将多个值组合成一个复合值。这似乎是 Java 开发者（以及使用 C#、Objective-C、C/C++ 等语言的开发者）一直期待的有用特性。例如，无需创建类或结构体（Swift\
    \ 也支持结构体）即可传递或返回值。代码清单 2-11 展示了最常见的元组用法。\n\n***代码清单 2-11***. 常见元组用法\n\n```swift\n\
    var xyz  = (x: 0, y: 0, z: 0)\nprintln(\"xyz \\(xyz) x 为: \\(xyz.x)\\ty 为: \\\
    (xyz.y)\\tz 为: \\(xyz.z)\")\n\n// 或解构元组\nvar xy : (Int, Int) = (1, 1) // 或简写为\
    \ var xy = (1, 1)\nvar (a, b) = xy\nprintln(\"xy \\(xy) x 为: \\(a)\\ty 为: \\(b)\"\
    )\n\nfunc httpResponse() -> (rc: Int, status: String) {\n  return (200, \"OK\"\
    )\n}\n\nvar resp = httpResponse()\nprintln(\"响应为: \\(resp.rc)\\t\\(resp.status)\"\
    )\n```\n\n## 集合\n\nJAVA 类比\n\n`java.lang.ArrayList` 和 `HashMap`。\n\n`Array` 和\
    \ `Dictionary` 是 Swift 的两种集合类型。代码清单 2-12 展示了常见用法，包括以下内容：\n\n*   初始化\n*   使用下标语法访问和修改元素\n\
    *   常用集合 API\n\n***代码清单 2-12***. 常见的 `Array` 和 `Dictionary` 用法\n\n```swift\n//\
    \ 集合\nvar emptyArray = Array<String>() // 或 [String]()\nvar emptyDict = Dictionary<Int,\
    \ String>() // [Int: String]()\nvar colors = [\"red\", \"green\", \"blue\"]\n\
    var colorDictionary = [\"r\" : \"red\", \"g\" : \"green\", \"b\" : \"blue\"]\n\
    colors.append(\"alpha\") // 或: colors += \"alpha\"\ncolorDictionary[\"a\"] = colors[3]\n\
    colors.insert(\"pink\", atIndex: 2)\ncolors.removeAtIndex(2)\nprintln(colors.isEmpty\
    \ ? \"empty\" : \"\\(colors.count)\")\n```\n\n常量 `Dictionary` 或 `Array` 是不可变的，意味着不允许添加或删除元素，也不能修改现有项。而变量\
    \ `Dictionary` 或 `Array` 则是可变的。\n\n## 控制流\n\n与 Java 类似，在 Swift 中可以使用 `if` 和 `switch`\
    \ 进行条件判断，使用 `for-in`、`for`、`while` 和 `do-while` 实现循环。条件或循环变量两边的括号是可选的。代码块的花括号是必须的。代码清单\
    \ 2-13 演示了以下常见的控制流用法：\n\n*   `for-loop`\n*   `for-in`\n*   `while-loop`\n\n***代码清单\
    \ 2-13***. 控制流\n\n```swift\nfor (var idx = 0; idx < 10; idx++) { // 括号可选\n  println(\"\
    for-loop: \\(idx)\")\n}\n\nfor item in [1,2,3,4,5] { // 或 for item in 1...5\n\
    \  println(\"for-in: \\(item)\")\n}\nfor c in \"HelloSwift\" { // 遍历字符\n  print(c)\n\
    }\n\nfor (key, value) in colorDictionary {\n  println(\"for-in 字典:\\(key) - \\\
    (value)\")\n}\n\n// while-loop, 或至少执行一次的 do-while\nvar idx = 0\nwhile idx < colors.count\
    \ {\n  println(\"while-loop:  \\(colors[idx])\")\n  idx++\n}\n```\n\n## Switch\n\
    \n在 Swift 中，switch 的 case 除了可以使用 `int` 基本数据类型，还可以是任何类型。代码清单 2-14 展示了 Swift 中改进的\
    \ `switch` 控制流用法：\n\n*   合并 case 且隐式包含 break\n*   使用区间范围的 case\n*   使用元组的 case\n\
    \n***代码清单 2-14***. 改进的 Switch\n\n```swift\nvar condition = \"red\"\nswitch condition\
    \ {\ncase \"red\", \"green\", \"blue\": // 合并 case\n  println(\"\\(condition)\
    \ 是一种原色\")\n  // 总是隐式 break（不继续执行）\ncase \"RED\", \"GREEN\", \"BLUE\":\n  println(\"\
    \\(condition) 是大写形式的原色\")\ndefault: // 不再是可选的\n  println(\"\\(condition) 不是原色\"\
    )\n}\n\nvar range = 9 // 使用区间范围\nswitch range {\ncase 0:\n  println(\"零\")\ncase\
    \ 0...9:\n  println(\"一位数字\")\ncase 10...99:\n  println(\"两位数字\")\ncase 10...999:\
    \ // 第一个匹配即结束\n  println(\"三位数字\")\ndefault:\n  println(\"四位或更多数字\")\n}\n\nvar\
    \ coord = (0, 1)\nswitch coord { // 使用元组\ncase (0...Int.max, 0...Int.max):\n \
    \ println(\"第一象限\")\ncase (Int.min...0, 0...Int.max):\n  println(\"第二象限\")\ncase\
    \ (Int.min...0, Int.min...0):\n  println(\"第三象限\")\ncase (0...Int.max, Int.min...0):\n\
    \  println(\"第四象限\")\ndefault:\n  println(\"在坐标轴上\")\n}\n```\n\n`switch` 可以在其局部作用域内绑定匹配的值。您也可以指定\
    \ `where` 子句来测试条件。代码清单 2-15 演示了这两种值绑定方式。\n\n***代码清单 2-15***. 临时值绑定与使用 `where`\
    \ 子句\n\n```swift\nvar rect = (10, 10)\nswitch rect {\ncase let (w, h) where w\
    \ == h:\n  println(\"\\((w, h)) 是一个正方形\")\ndefault:\n  println(\"矩形但不是正方形\")\n\
    }\n```\n\n## 枚举\n\n您使用 enum 为一组相关的值定义通用类型。枚举定义后，可以像使用任何 Swift 类型一样安全地使用它。代码清单\
    \ 2-16 展示了常见的枚举用法：\n\n*   带或不带原始值的枚举\n*   关联值的枚举\n\n***代码清单 2-16***. 常见枚举用法\n\n\
    ```swift\nenum DayOfWeek { // 原始值是可选的\n  case SUNDAY, MONDAY, TUESDAY, WEDNESDAY,\n\
    \  THURSDAY, FRIDAY, SATURDAY\n}\n\nvar aDay = DayOfWeek.SUNDAY\nswitch aDay {\n\
    case DayOfWeek.SATURDAY, DayOfWeek.SUNDAY:\n  println(\"\\(aDay) 是周末\")\ndefault:\n\
    \  println(\"\\(aDay) 是工作日\")\n}\n\nenum DayOfWeek2 :  String { // 分配原始值\n  case\
    \ SUNDAY = \"Sun\", MONDAY = \"Mon\", TUESDAY = \"Tue\",\n  WEDNESDAY = \"Wed\"\
    , THURSDAY = \"Thu\", FRIDAY = \"Fri\", SATURDAY = \"Sat\"\n}\n\nvar aDay2 = DayOfWeek2.SUNDAY\n\
    switch aDay2 {\ncase DayOfWeek2.SATURDAY, DayOfWeek2.SUNDAY:\n  println(\"\\(aDay2.rawValue)\
    \ 是周末\")\ndefault:\n  println(\"\\(aDay2.rawValue) 是工作日\")\n}\n\n// 关联值\nenum\
    \ Color {\n  case RGB(Int, Int, Int)\n  case HSB(Float, Float, Float)\n}\n\nvar\
    \ aColor = Color.RGB(255, 0, 0)\nswitch aColor {\ncase var Color.RGB(r, g, b):\n\
    \  println(\"R: \\(r) G: \\(g) B: \\(b) \")\ndefault:\n  println(\"\")\n}\n```\n\
    \n## 函数\n\nSwift 函数使用 `func` 关键字声明。与 Java 方法不同，参数和返回类型在类型名称之后声明。以下是您最可能遇到的典型 Swift\
    \ 函数用法（参见代码清单 2-17）："
- fmt: "# Swift 编程语言特性\n\n## 元组（Tuples）\n\n- **元组**：您可以返回多个值而无需创建`struct`或`class`（参见[清单\
    \ 2-11](#9781484204375_Ch02.xhtml#list11)）。\n- **外部参数名**：应将外部参数名视为函数签名的一部分。所有\
    \ iOS Objective-C SDK API 都以外部参数名的方式移植到 Swift。\n- **默认参数值**：此特性不仅提供了默认值，而且在许多情况下使方法重载比方法链更容易。\n\
    - **可变参数**：方法参数的可变长度，无需使用`Array`类型。\n- **函数参数**默认是常量——这与 Java 规则不同。\n- **Swift\
    \ 函数**是引用类型。就像使用类类型一样，您可以将函数作为函数参数传递，或将其作为函数返回类型返回。在实践中，您会更频繁地使用闭包表达式。\n- **闭包表达式**是\
    \ Swift 中定义的三种**闭包**类型之一。它是一个未命名的自包含代码块，可以作为函数参数传递。第二种闭包类型是这里提到的全局函数，它实际上是闭包的一种特殊情况。第三种闭包类型称为嵌套函数，在函数内部声明，本书中未使用。\n\
    \n[***清单 2-17***](#9781484204375_Ch02.xhtml#_list17). 函数用法\n\n```\nfunc doWork(parm\
    \ : String) -> String { // simple form\n  return \"TODO: \" + parm\n}\nprintln(doWork(\"\
    Swift\"))\n\n// External parameter names is part of the func signature\nfunc doWork2(name\
    \ parm : String) -> String {\n// arg = arg.uppercaseString; // error: constant\
    \ parm\n  return \"TODO: \" + parm\n}\nprintln(doWork2(name: \"Swift\"))\n\n//\
    \ use # to indicate same name for internal and external\nfunc doWork3(#name: String)\
    \ -> String {\n  return \"TODO: \" + name\n}\nprintln(doWork3(name: \"Swift\"\
    ))\n\n// With default parm value, it also implies #, same external name\nfunc\
    \ doWork4(name: String = \"Swift\") -> String {\n  return \"TODO: \" + name\n\
    }\nprintln(doWork4()) // default parm value\n\n// parm is constant by default\
    \ unless declaring it with var\nfunc doWork5(var name: String = \"Swift\") ->\
    \ String {\n  name = name.uppercaseString;\n  return \"TODO: \" + name;\n}\n\n\
    // variadic parms\nfunc sumNumbers(parms : Int...) -> Int {\n  var sum = 0\n \
    \ for number in parms {\n    sum += number\n  }\n  return sum\n}\nprintln(sumNumbers(2,5,8))\n\
    \n// func is a type, can be used for parm or return type.\nfunc separateByAnd(p1:\
    \ String, p2: String) -> String {\n  return p1 + \" and \" + p2\n}\nfunc printTwoString(p1:\
    \ String, p2: String, format: (String, String)->String) {\n  println(format(p1,\
    \ p2))\n}\nprintTwoString(\"Horse\", \"Carrot\", separateByAnd)\n\n// closure\
    \ expression is unnamed func\nprintTwoString(\"Horse\", \"Carrot\",\n  {(p1: String,\
    \ p2: String) -> String in\n    return p1 + \" and \" + p2\n  })\nprintTwoString(\"\
    Horse\", \"Carrot\",\n  {p1, p2 in // type inferences\n    return p1 + \" and\
    \ \" + p2\n  })\nprintTwoString(\"Horse\", \"Carrot\",\n  { // Inference and shorthanded\
    \ parm names, $0, $1 ...\n    return $0 + \" and \" + $1\n  })\n```\n\n您可能一开始可以不用大多数简写选项，但对于\
    \ iOS 编程，您绝对需要习惯外部参数名，因为它们在 iOS 框架中被大量使用。\n\n## 类（Class）\n\nSwift 类包含与 Java 类相似的元素。最简单的类似\
    \ Java 的类形式如[清单 2-18](#9781484204375_Ch02.xhtml#list18)所示。\n\n[***清单 2-18***](#9781484204375_Ch02.xhtml#_list18).\
    \ 简单的类似 Java 的 Swift 类\n\n```\nclass SimpleClass {\n  var mProperty : Int = 0\
    \ // public int mProperty ...\n  var mConstant : String = \"MyKey\" // public\
    \ String ...\n  func myMethod(name: String) -> Void { println(name)}\n}\n```\n\
    \n## 属性（Property）\n\nJava 字段可以映射到 Swift 属性，如前面的[清单 2-18](#9781484204375_Ch02.xhtml#list18)所示；它们被称为**存储属性**。在\
    \ Swift 中，属性可以比 Java 字段做更多事情。[清单 2-19](#9781484204375_Ch02.xhtml#list19)演示了以下\
    \ Swift 属性的用法：\n\n- **存储属性**：Java 字段。\n- **计算属性**：用于派生值。\n- **属性观察器**：可选代码块，用于响应属性值的变化。\n\
    - **类型属性**：类似于 Java 类变量，但存储类型属性目前尚不支持 Swift 的`class`类型。由于现在支持`struct`类型属性，您可以选择定义内部`struct`作为移植\
    \ Java 静态变量的变通方法。\n\n[***清单 2-19***](#9781484204375_Ch02.xhtml#_list19). Swift\
    \ 类属性\n\n```\nclass MyClass {\n  var width = 10, height = 10 // stored properties\n\
    \n// computed properties, can have set as well\n  var size : Int {\n    get {\n\
    \      return width * height\n    }\n  }\n\nvar size2 : Int { // readonly, shorthanded\n\
    \    return width * height\n  }\n\n// property observer\n  var depth : Int = 10\
    \ {\n    willSet {\n      println(\"depth (\\(depth)) will be set to \\(newValue)\"\
    )\n    }\n    didSet {\n      println(\"depth (\\(depth)) was be set from \\(oldValue)\"\
    )\n    }\n  }\n\n// Swift class Type property,\n  class var MyComputedTypeProperty\
    \ : String {\n    return \"Only computed Type property is supported\"\n  }\n\n\
    // use inner struct stored Type property as a workaround\n  struct MyStatic {\n\
    \    static let MyConst = \"final static in Java\"\n    static var MyVar: String?\n\
    \  }\n}\n\nprintln(MyClass.MyStatic.MyConst)\nMyClass.MyStatic.MyVar = \"class\
    \ var in Java\"\nprintln(MyClass.MyStatic.MyVar)\n```\n\n## 方法（Method）\n\n方法是在类型上下文（即类）中定义的函数。它们仍然是前面描述的函数（参见[清单\
    \ 2-17](#9781484204375_Ch02.xhtml#list17)）。您可以像 Java 一样定义实例方法或类方法。[清单 2-20](#9781484204375_Ch02.xhtml#list20)展示了以下典型的方法用法：\n\
    \n- 方法声明隐式强制使用外部名称，但第一个参数除外。这与全局函数不同（参见“函数”部分）。所有 iOS Objective-C 方法都使用此约定移植到\
    \ Swift。\n- 使用`class func`声明类类型方法，或使用`static func`在结构体或枚举类型中声明类型方法。\n\n[***清单\
    \ 2-20***](#9781484204375_Ch02.xhtml#_list20). 常见方法用法\n\n```\nclass MyClass {\n\
    \n///////// methods copied from Listing 2-17 //////////\n  func doWork(parm :\
    \ String) -> String { // just like func\n    return \"TODO: \" + parm\n  }\n\n\
    // default parm value, always imply externl parm name\n  func doWork2(name: String\
    \ = \"Swift\") -> String {\n    return \"TODO: \" + name\n  }\n\n// func is a\
    \ type, can be used for parm or return type, etc.\n  func separateByAnd(p1: String,\
    \ p2: String) -> String {\n    return p1 + \" and \" + p2\n  }\n\nfunc printTwoString(p1:String,\
    \ p2:String, format:(String, String)->String) {\n    println(format(p1, p2))\n\
    \  }\n\n// Type methods, aka Java class static method\n  class func DoWork(parm\
    \ : String) -> String {\n    return \"TODO: (Just like Java class static method)\"\
    \ + parm\n  }\n}\n\nvar c = MyClass()\nprintln(c.doWork(\"Swift\"))\nprintln(c.doWork2())\
    \ // default parm value\nprintln(c.doWork2(name: \"Swift\")) // external name\
    \ enforced\n\n// closure is unnamed func\nc.printTwoString(\"Horse\", p2: \"Carrot\"\
    , format: c.separateByAnd)\n// Inference and shorthanded parm names apply to method,\
    \ too.\nc.printTwoString(\"Apple\", p2: \"Orange\", format: {\n  return $0 + \"\
    \ and \" + $1\n  })\n\nMyClass.DoWork(\"Swift Type method\")\n```\n\n## 引用类型与值类型\n\
    \n就像在 Java 中一样，引用类型是通过引用传递的（实例的引用被复制到另一个变量），而值类型是通过复制传递的（整个值类型实例被复制到另一个内存空间）。但是，您确实需要注意某些差异："
  raw: '*   *Tuples*: You can return multiple values without creating a `struct` or
    `class` (see [Listing 2-11](#9781484204375_Ch02.xhtml#list11)).

    *   *External parameter names*: You should treat external parameter names as part
    of the function signature. All of the iOS Objective-C SDK APIs are ported to Swift
    with external parameter names.

    *   *Default parameter values*: Not only does this feature provide a default value,
    but it also makes method overloading easier in many situations, as opposed to
    method chaining.

    *   *Variadic parameters*: Variable length of the method parameters without using
    `Array` type.

    *   *Function parameters* are constant by default—this is different from Java
    rules.

    *   *Swift Functions* are of a reference type. Just as you can with a class type,
    you can pass functions as function parameters or return them as function return
    types. In practice, you would use closure expressions more frequently.

    *   *Closure expression* is one of the three types of **Closure** defined in Swift.
    It is an unnamed self-contained block of code that can be passed as a function
    parameter. The second type of closure is the global function mentioned right here,
    which is actually a special case of closure. The third type of closure is called
    a nested function declared inside a function, which is not used in this book.


    [***Listing 2-17***](#9781484204375_Ch02.xhtml#_list17). Function Usages


    ```

    func doWork(parm : String) -> String { // simple form

      return "TODO: " + parm

    }

    println(doWork("Swift"))


    // External parameter names is part of the func signature

