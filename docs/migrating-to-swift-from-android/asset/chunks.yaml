- fmt: "# Migrating to Android for iOS Developers\n\nIn early 2009, by repeating the\
    \ same porting process, I created my first iOS app by translating a Windows mobile\
    \ app. That started my iOS programming journey, and later it was a no-brainer\
    \ for me to try porting to Android. Most mobile apps are platform agnostic. When\
    \ you have the whole solution completed for either iOS or Android, all the business\
    \ and technical issues have been verified and the other deliverables and project\
    \ artifacts are already reusable. It would be a waste not to port it to the other\
    \ platform. Earlier this year, I wrote my first book, *Migrating to Android for\
    \ iOS Developers*, to share my beliefs and experiences. After Swift was introduced\
    \ at Worldwide Developers Conference (WWDC) 2014, I decided to write this book\
    \ because the similarity between Java and Swift makes the porting method even\
    \ easier while the same ROI analysis remains true.\n\nThe primary objective of\
    \ this book is to help experienced Android developers leap into native iOS–Swift\
    \ mobile development. It is easier than you think, and this book will make it\
    \ even easier with Android analogies and mapping guidelines. You can immediately\
    \ translate common mobile use cases to iOS.\n\n## Who Is This Book For?\n\nThis\
    \ book is specifically written for Android developers who want to take advantage\
    \ of their mobile knowledge and make mobile applications available on the iOS\
    \ mobile platform. The book will show you the common iOS programming subjects\
    \ and frameworks using your familiar Android vocabularies without lengthy explanations,\
    \ because you already know these mobile subjects from being an Android developer.\n\
    \n## How This Book Is Organized\n\nIn [Part I](#9781484204375_FM_7_Part1.xhtml),\
    \ you will get the iOS `Xcode` integrated development environment (`IDE`) up and\
    \ running in no time. You will be guided in creating tutorial projects that will\
    \ become your porting sample projects. I believe this is the best way for you\
    \ to get hands-on experience while learning programming topics.\n\n[Part II](#9781484204375_FM_8_Part2.xhtml)\
    \ of this book shows you how to plan and structure your iOS apps: by creating\
    \ a storyboard and breaking the app into model-view-controller (MVC) classes.\
    \ You will be able to reuse most of the existing software artifacts and design\
    \ the rest from their Android counterparts. The common mobile topics are followed,\
    \ including user interface, managing data, and networking with remote services.\
    \ After you finish [Part II](#9781484204375_FM_8_Part2.xhtml), you will be able\
    \ to create simple but meaningful iOS apps with rich UI components, and to handle\
    \ common CRUD (create, read, update, delete) operations locally and remotely.\n\
    \nLast, [Part III](#9781484204375_FM_9_Part3.xhtml) walks you through a case study\
    \ that ports a complete iOS app to Android. It recaps how to use mapping guidelines\
    \ from the topics in [Part II](#9781484204375_FM_8_Part2.xhtml). You can also\
    \ use the book's table of contents to help find the porting guidelines as needed.\n\
    \nWhen you complete this journey, you will be able to use `Xcode` and Swift to\
    \ effectively port your existing Android apps to iOS.\n\n---\n\n# Part I: Prepare\
    \ Your Tools\n\nA handy tool makes a handy person. This is very true for creating\
    \ software, too. `Xcode` is the integrated development environment (`IDE`) for\
    \ writing, compiling, debugging, and building code for iOS application development.\
    \ The first part of the chapter walks you through the installation and steps for\
    \ getting it up and running. All the topics in this book come with sample code.\
    \ You will need to use `Xcode` to learn from these sample projects, and you will\
    \ use `Xcode` to create world-class iOS apps, too.\n\nFor iOS programming, Swift\
    \ is the latest and greatest programming language released for iOS 8. The chapters\
    \ in this part will give you enough knowledge to read and write the sample code\
    \ in Swift. You will find learning Swift a very natural extension from your use\
    \ of Java, and you will surely feel comfortable using the code from this book\
    \ as your own code.\n\n---\n\n# Chapter 1: Setting Up the Development Environment\n\
    \nIt is more fun to see apps run than to read the source code, and you cannot\
    \ get hands-on programming experience by just reading books. Let's get the development\
    \ environment up and running first so you can use it—and learn Swift programming\
    \ for iOS along the way.\n\n## Xcode and the iOS SDK\n\n**ANDROID ANALOGY**\n\n\
    The Android Developer Tools (`ADT` plug-in for Eclipse or Android Studio.\n\n\
    `Xcode` is the complete toolset for building iOS apps. It is an integrated development\
    \ environment (`IDE`) that helps you build, test, debug, and package your iOS\
    \ apps. It is free but you must have an Intel-based Mac running Mac OS X Mavericks\
    \ or later. You will use the latest `Xcode`, version 6, throughout this book.\n\
    \n### Installing from the Mac App Store\n\n`Xcode` is distributed in the Mac App\
    \ Store, which takes care of the download and install for you. With a single click\
    \ to start the download and installation of `Xcode`, you get the compilers, code\
    \ editor, iOS SDK, debugger, device emulators, and everything you need to create\
    \ iOS apps. [Figure 1-1](#9781484204375_Ch01.xhtml#Fig1) shows `Xcode` in the\
    \ Mac App Store app.\n\n![9781484204375_Fig01-01.jpg](images/9781484204375_Fig01-01.jpg)\n\
    \n[Figure 1-1](#9781484204375_Ch01.xhtml#_Fig1). Xcode in Mac App Store\n\nAll\
    \ you need to do is install the latest `Xcode` from the Mac App Store. After completing\
    \ the installation, go ahead and launch `Xcode` from the **Applications** folder.\
    \ Keep it in the Mac OS Dock so that you can launch it at any time.\n\nThe first\
    \ time you launch `Xcode`, it immediately prompts you to install the required\
    \ components (see [Figure 1-2](#9781484204375_Ch01.xhtml#Fig2)). Click **Install**\
    \ to complete the `Xcode` installation.\n\n![9781484204375_Fig01-02.jpg](images/9781484204375_Fig01-02.jpg)\n\
    \n[Figure 1-2](#9781484204375_Ch01.xhtml#_Fig2). Install the required components\n\
    \nAfter the required components are installed, you should see the screenshot in\
    \ [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3). Your iOS IDE, `Xcode`, is ready!\n\
    \n![9781484204375_Fig01-03.jpg](images/9781484204375_Fig01-03.jpg)\n\n[Figure\
    \ 1-3](#9781484204375_Ch01.xhtml#_Fig3). Welcome to Xcode\n\n### Create an iOS\
    \ Project Using the Template\n\n**ANDROID ANALOGY**\n\n**New Android Application\
    \ Project** template in `ADT`.\n\nYou've got the right tool; now, wouldn't you\
    \ like to see some real action—like creating an iOS app and seeing it run? I'd\
    \ like that, too! You want to do this to ensure your `IDE` is working properly\
    \ as well.\n\nI actually created my very first Android app using the `ADT` **New\
    \ Android Application Project** template when I had no idea how to create Android\
    \ mobile apps. All I wanted was to see something running in no time. Yep, `ADT`\
    \ did it for me nicely. I was very happy with myself when I felt I'd created an\
    \ Android app without knowing anything! Hey, there's nothing wrong with making\
    \ yourself happy, right?\n\n`Xcode` offers the same thing. The objective of this\
    \ section is to show you how to create an iOS app as quickly as possible. Hold\
    \ any programming questions so you can finish the project as fast as you can.\
    \ For now, complete the following steps:\n\n1. Launch `Xcode` if you haven't launched\
    \ it yet.\n2. Select **Create a new Xcode project** from the **Welcome to Xcode**\
    \ screen (see [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3)). [Figure 1-4](#9781484204375_Ch01.xhtml#Fig4)\
    \ shows the prompt that asks you to choose a template for your project:\n   1.\
    \ In the left panel of [Figure 1-4](#9781484204375_Ch01.xhtml#Fig4), select **iOS\
    \ ![image](images/arrow.jpg) Application**.\n   2. In the right panel of [Figure\
    \ 1-4](#9781484204375_Ch01.xhtml#Fig4), you may choose any of the templates. Just\
    \ for fun, choose **Game**.\n   3. Click the **Next** button.\n\n![9781484204375_Fig01-04.jpg](images/9781484204375_Fig01-04.jpg)\n\
    \n[Figure 1-4](#9781484204375_Ch01.xhtml#_Fig4). Choose a template"
