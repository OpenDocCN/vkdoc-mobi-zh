    Remote Service    A typical client-server solution hosts information on the server
    side, while client apps either fetch data from the server and present it to users
    in meaningful ways, or collect data from the users to submit to the server. You
    probably hear the buzzwords “mobile commerce” or “m-commerce” a lot nowadays.
    To describe them in simple terms, mobile apps fetch product items from a server
    and then submit the purchase orders to the server via the Internet. From a mobile-apps
    programming perspective, this is really not new at all. It is still a client-server
    programming topic using HTTP `GET`/`POST`, which is what most of the e-commerce
    web sites do.    I will talk about JSON messages and RESTful services for mobile
    apps specifically because of their popularity versus traditional SOAP-based web
    services.    Perform Network Operations in Background    For apps with a user
    interface, you want to perform I/O tasks or network-related code in the background,
    and do UI updates in the UI main thread. Otherwise, the app appears to the user
    to lag because the UI thread is blocked, waiting for the task to finish. This
    principle applies to iOS, Android, and probably any UI platforms. The Android
    SDK provides the convenient `android.os.AsyncTask` class to perform tasks in a
    background thread and hook back to the UI main thread when the background task
    is completed. Generally, when interfacing with a remote server, you want to fetch
    data in the background thread. When the remote data is received, your UI code
    presents the data on the screen.    To show how to achieve the same objectives
    in iOS, you will create a simple iOS app, as shown in [Figure 4-46](#9781484204375_Ch04.xhtml#Fig46),
    to demonstrate some basic RESTFul client code that consumes remote RESTFul services:    *   When
    the `GET` or `POST` button is selected, the app sends HTTP `GET` or `POST` to
    the server in a background thread. *   When the HTTP response is received, the
    app renders the data on the user interface.    ![9781484204375_Fig04-46.jpg](images/9781484204375_Fig04-46.jpg)    [Figure
    4-46](#9781484204375_Ch04.xhtml#_Fig46). The iOS `RestClient` app    Create a
    new Xcode project to have a fresh start.    1.  Launch Xcode, use the **Single
    View Application** template, and name the project `RestClient`. 2.  Draw your
    storyboard with the following widgets (see [Figure 4-47](#9781484204375_Ch04.xhtml#Fig47)):     1.  A
    `UIButton` to invoke HTTP `GET`     2.  A `UIButton` to invoke HTTP `POST`     3.


    A `UITextField` to take user input     4.  A `UIWebView` to render the HTTP response          ![9781484204375_Fig04-47.jpg](images/9781484204375_Fig04-47.jpg)                    [Figure
    4-47](#9781484204375_Ch04.xhtml#_Fig47). `RestClient` storyboard           3.  Connect
    storyboard outlets to your code (see [Listing 4-29](#9781484204375_Ch04.xhtml#list29)):     1.  Connect
    the `GET` button `Touch Down` event to your `doGet()IBAction` method.     2.  Connect
    the `POST` button `Touch Down` event to your `doPost()IBAction` method.     3.  Connect
    the `UITextField` delegate outlet to `ViewController` class.     4.  Connect the
    `UIWebView` delegate to `ViewController` class.     5.  Connect the text field
    `New Referencing Outlet` to the `ViewController mTextField IBOutlet` property     6.  Connect
    the webview `New Referencing Outlet` to the `ViewController mWebView IBOutlet`
    property    [***Listing 4-29***](#9781484204375_Ch04.xhtml#_list29). `RestClient`
    Preparation Code    ``` class ViewController: UIViewController, UITextFieldDelegate,
    UIWebViewDelegate {    @IBOutlet weak var mWebView: UIWebView!   @IBOutlet weak
    var mTextField: UITextField!    override func viewDidLoad() {     super.viewDidLoad()
        // Do any additional setup after loading the view ...   }    func textFieldShouldReturn(textField:
    UITextField!) -> Bool {     textField.resignFirstResponder();     return true
      }    @IBAction func doGet(sender: AnyObject) {   }    @IBAction func doPost(sender:
    AnyObject) {   } } ```    Nothing is new yet, just the repeated storyboard tasks
    and the process of connecting the outlets to your code with the method stubs.
    You will fill the main topics in these stubs next.    RESTFul Service using HTTP    Most
    of the RESTFul services support HTTP/HTTPS protocols. Since the RESTFul services
    are supposed to be agnostic to client apps, it is not surprising that your Android
    code most likely can be translated nicely to the iOS platform if it consumes the
    same RESTFul services. To retrieve data from most RESTFul services, it is similar
    to how browsers use HTTP `GET` to fetch a remote HTML file. You can use HTTP `GET`
    to fetch an HTML document from mobile apps, too—or it can fetch any data, such
    as raw bytes, an XML or JSON document, and so forth.    To submit user input,
    you will very often use HTML `Form` to submit form data from an HTML page to HTTP
    servers. The form data is transmitted using the HTTP `POST` method. This is very
    common in iOS and Android apps as well. Technically speaking, you can also send
    a query string to an HTTP server using the HTTP `GET` method, just as some web
    pages do. In this case, you can simply build the URL with query strings and use
    the HTTP `GET` method to send data to your server. It is a design decision that
    you will make by understanding usages and conventions of `GET` versus `POST`.
    The key is to design the interface so both your mobile clients and the server
    can understand it.    NSURLConnection    ANDROID ANALOGY    `HttpURLConnection`.    To
    interface with HTTP protocol in iOS, you can use the `NSURLConnection` class to
    send `GET` and `POST` URL requests. The API is fairly similar to Android’s `HttpUrlConnection`.    Continue
    with the `RestClient` project and add code to send HTTP requests by doing the
    following:    1.  Implement the `IBAction doGet()` method to send the HTTP `GET`
    request and to get data from the HTTP response (see [Listing 4-30](#9781484204375_Ch04.xhtml#list30)):     1.  Create
    an `NSMutableURLRequest` object.                  **Note**  You commonly escape/encode
    the URL path or query string just like you normally do using `URLEncoder` in Android.                       2.  Set
    HTTP method to GET.                  **Note**  An HTTP method is case-sensitive
    according to HTTP protocol specs.                       3.  Set the `accept` header,
    which is commonly used for content negotiation (e.g., `text/html, json/application,`
    etc.).'
