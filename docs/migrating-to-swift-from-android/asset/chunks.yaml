  trans: "\nSwift 还定义了**文件**和**模块**访问控制：`private`、`public` 和 `internal`。虽然它们与 Java\
    \ 中的对应概念含义不同，但如果你将每个类定义在单独的文件中，`private`/`public` 访问控制的使用方式是一致的。默认的 `internal`\
    \ 访问控制在同一项目的任何文件中也是公开的，但在导入到其他项目时不可见。Swift 的 `internal` 控制对于创建框架项目（而非应用模块）更为实用。\n\
    \n## 使用 Xcode 的 HelloSwift\n\n我不会正式地描述其用法和语法规则，而是让你亲自创建一个 `HelloSwift` Xcode 项目，并自行编写来自表\
    \ 2-1 的代码清单。你还将执行以下常见的 Xcode 编程任务：创建类、构建并运行项目，以及使用调试器。\n\n### 创建 Swift 命令行项目\n\
