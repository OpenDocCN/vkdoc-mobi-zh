    \ and Using Remote Service\n\nA typical client-server solution hosts information\
    \ on the server side, while client apps either fetch data from the server and\
    \ present it to users in meaningful ways, or collect data from the users to submit\
    \ to the server. You probably hear the buzzwords “mobile commerce” or “m-commerce”\
    \ a lot nowadays. To describe them in simple terms, mobile apps fetch product\
    \ items from a server and then submit the purchase orders to the server via the\
    \ Internet. From a mobile-apps programming perspective, this is really not new\
    \ at all. It is still a client-server programming topic using HTTP `GET`/`POST`,\
    \ which is what most of the e-commerce web sites do.\n\nI will talk about JSON\
    \ messages and RESTful services for mobile apps specifically because of their\
    \ popularity versus traditional SOAP-based web services.\n\n### Perform Network\
    \ Operations in Background\n\nFor apps with a user interface, you want to perform\
    \ I/O tasks or network-related code in the background, and do UI updates in the\
    \ UI main thread. Otherwise, the app appears to the user to lag because the UI\
    \ thread is blocked, waiting for the task to finish. This principle applies to\
    \ iOS, Android, and probably any UI platforms. The Android SDK provides the convenient\
    \ `android.os.AsyncTask` class to perform tasks in a background thread and hook\
    \ back to the UI main thread when the background task is completed. Generally,\
    \ when interfacing with a remote server, you want to fetch data in the background\
    \ thread. When the remote data is received, your UI code presents the data on\
    \ the screen.\n\nTo show how to achieve the same objectives in iOS, you will create\
    \ a simple iOS app, as shown in [Figure 4-46](#9781484204375_Ch04.xhtml#Fig46),\
    \ to demonstrate some basic RESTFul client code that consumes remote RESTFul services:\n\
    \n*   When the `GET` or `POST` button is selected, the app sends HTTP `GET` or\
    \ `POST` to the server in a background thread.\n*   When the HTTP response is\
    \ received, the app renders the data on the user interface.\n\n![9781484204375_Fig04-46.jpg](images/9781484204375_Fig04-46.jpg)\n\
    \n[Figure 4-46](#9781484204375_Ch04.xhtml#_Fig46). The iOS `RestClient` app\n\n\
