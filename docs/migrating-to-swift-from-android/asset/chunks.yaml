    你可以构建并运行`CommonWidgets` iOS 应用，查看`UIImageView`的实际效果，如 Figure 4-26 所示。  \n\n![9781484204375_Fig04-26.jpg](img/9781484204375_Fig04-26.jpg)\
    \  \nFigure 4-26. iPhone 5 上的`UIImageView`  \n\n## 菜单  \n\n菜单经常用于提供对常用操作的快速访问。它在桌面和\
    \ Android 平台上尤其常见。虽然 iOS SDK 中没有类似命名的功能，但`UIToolbar`或`UINavigationBar`中的`UIBarButtonItem`与\
    \ Android 菜单系统有着相似的目的：快速访问。  \n\n你可能还会遇到 Android 上下文菜单和弹出菜单。同样，iOS 中没有这样的菜单系统，但我会展示我为了移植而选择的\
    \ iOS 方案。  \n\n### UIBarButtonItem  \n\n**ANDROID 类比**：选项菜单或 ActionBar 中的操作项。\
