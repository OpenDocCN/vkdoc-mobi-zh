    the same way you do in Android.     3.  To parse JSON content or create a JSON
    object, `NSJSONSerialization` is your friend. You want to convert the JSON object
    to `NSDictionary` or the JSON array to `NSArray`.    [***Listing 4-31***](#9781484204375_Ch04.xhtml#_list31).
    HTTP `POST`    ``` @IBAction func doPost(sender: AnyObject) {   var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(
           NSCharacterSet.URLQueryAllowedCharacterSet())   var queryString = "echo="
    + text;   var formData = queryString.dataUsingEncoding(NSUTF8StringEncoding)!
      var urlRequest = NSMutableURLRequest(URL: NSURL(string: URL_TEST)!)   urlRequest.HTTPMethod
    = "POST"   urlRequest.HTTPBody = formData    urlRequest.setValue("application/json",
    forHTTPHeaderField: "accept")    NSURLConnection.sendAsynchronousRequest(urlRequest,
        queue: NSOperationQueue.mainQueue(),     completionHandler: {(resp: NSURLResponse!,
    data: NSData!, error: NSError!) -> Void in       println(resp.MIMEType)       println(NSString(data:
    data, encoding: NSUTF8StringEncoding))        var json = NSJSONSerialization.JSONObjectWithData(data,
    options:           NSJSONReadingOptions.AllowFragments, error: nil) as NSDictionary
          self.mWebView.loadHTMLString(json["echo"] as String, baseURL: nil)     })
    }) } ```    **Note**  `SERVER_URL = "``http://pdachoice.com/ras/service/echo``"`
    is a simple web service that echoes back the path parameter. Desktop browsers
    are fully capable of rendering plain text as well as HTML documents. You can use
    a desktop browser to verify the data from the server.    Build and run the `RestClient`
    project and enter **"Hi you!"** to see the live app in action. The simple echo
    service with the `GET` method actually responded in HTML format, `<html><body><h1>Hi
    you!</h1></body></html>`, which is rendered as shown in [Figure 4-48](#9781484204375_Ch04.xhtml#Fig48).    ![9781484204375_Fig04-48.jpg](images/9781484204375_Fig04-48.


    jpg)    [Figure 4-48](#9781484204375_Ch04.xhtml#_Fig48). `RestClient doGet` and
    `doPost` responses    Summary    This chapter introduced the most common programming
    component mappings from Android to iOS:    *   User interface and UI widgets *   Persistent
    storage options *   Network and remote services with JSON    Many meaningful apps
    only ever deal with the components discussed herein. This chapter listed all the
    viable mappings with step-by-step instructions on how to translate Android components
    to their iOS counterparts. You will see how to apply these guidelines to build
    a simple but complete utility app from start to finish next.    Part     III    Pulling
    it All Together    Previously, you have covered many discrete Android-to-iOS mapping
    topics. They are purposely self-contained with very few classes in the individual
    Xcode projects so they can serve as independent sample projects. In the real programming
    world, it is the combination of features and use cases that makes your app useful
    and entertaining. You will definitely need to apply more than one mapping guideline
    to complete a meaningful app.    To walk you through the whole porting process,
    you will port a fully functioning Android app from start to finish by applying
    the mapping topics from Part II:    1.  Create the runnable storyboard using the
    counterpart live Android app as the wireframe. 2.  Port the Android classes and
    classes’ member signatures to Swift first. Preserve any signatures if possible.
    3.  Fill in the blanks one method at a time. The caller, receivers, and “dots”
    mostly will just connect to each other without any glitch by blindly translating
    the Java statements or expressions to Swift at the method level.    Nothing will
    really be new here; you will systematically repeat the same top-down development
    approach you have been taking, and implement one piece at a time.    Chapter    5    Recap
    with a Case Study    Thus far in this book, you have covered many discrete Android-to-iOS
    mapping topics and created more than 10 Xcode projects. Those mapping topics were
    purposely implemented in individual Xcode projects with very few classes. In [Chapter
    3](#9781484204375_Ch03.xhtml), you learned the top-down development approach using
    the storyboard to break the whole app into MVC-oriented content view and View
    Controller pairs. In [Chapter 4](#9781484204375_Ch04.xhtml), you learned how to
    port smaller individual components from the counterpart Android app, piece by
    piece. However, all those topics were designed to be self-contained without dependencies
    so they can serve as independent instructions.    In the real programming world,
    it is the combination of features and use cases that makes your app useful and
    entertaining. You will surely need more than one mapping guideline to complete
    a meaningful app. In this chapter, you are going to port an existing Android app
    from start to finish using the mapping topics from [Chapters 3](#9781484204375_Ch03.xhtml)
    and [4](#9781484204375_Ch04.xhtml). Nothing will be new; you are still going to
    repeat the same top-down development approach as you have been using, and implement
    one piece at a time.    Perhaps there is one thing new that I have not yet mentioned
    explicitly: which piece should go first, and then what goes next. For any app,
    including the Android apps from which you are porting, you must go through the
    same thinking process. If you remember how you created the Android apps you are
    porting, that will be a great start because it will make your porting tasks to
    iOS more efficient. Otherwise, you will use the same thinking process that you
    normally use: decide the dependencies among the pieces and try to reduce the dependencies
    along the way. After all, there is really no absolutely right or wrong way. This
    is off our porting topic, but I think you will begin to understand my thinking
    process in this final exercise.'
  trans: "\n**注意** 我们的示例回声服务支持 `\"text/html\"`、`\"text/plain\"` 和 `\"application/json\"\
    ` 内容类型。为了直观地展示内容协商，我选择使用 `UIWebView` 控件来渲染服务器响应，并指定了 `\"text/html\"`。通常，`\"application/json\"\
    ` 更适用于数据交换。\n\n4.  `NSURLConnection.sendAsynchronousRequest` 发送异步 HTTP 请求，并在 UI\
    \ 主线程的 `completionHandler` 闭包中接收 HTTP 响应。\n\n***列表 4-30***。HTTP `GET`\n\n```\n\
    \        let URL_TEST = \"http://pdachoice.com/ras/service/echo/\"\n        @IBAction\
    \ func doGet(sender: AnyObject) {\n          var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(NSCharacterSet.URLPathAllowedCharacterSet())\n\
    \          var url = URL_TEST + text\n          var urlRequest = NSMutableURLRequest(URL:\
    \ NSURL(string: url)!)\n            urlRequest.HTTPMethod = \"GET\"\n        \
    \    urlRequest.setValue(\"text/html\", forHTTPHeaderField: \"accept\")\n\n  \
    \        NSURLConnection.sendAsynchronousRequest(urlRequest, queue: NSOperationQueue.mainQueue(),\n\
    \            completionHandler: {(resp: NSURLResponse!, data: NSData!, error:\
    \ NSError!) -> Void in\n              self.mWebView.loadData(data, MIMEType: resp.MIMEType,\
    \ textEncodingName: resp.textEncodingName, baseURL: nil)\n            })\n   \
    \       }\n```\n\n2.  实现 `IBAction doPost()` 方法，用于发送 HTTP `POST` 请求，将数据发送到服务器并接收\
    \ HTTP 响应（请参阅列表 4-31）。与发送 HTTP `GET` 几乎相同，您使用 `NSURLConnection.sendAsynchronousRequest`\
    \ 发送异步 HTTP 消息，区别在于将 HTTP 方法设置为 `POST`：\n\n    1.  确保将 HTTP `method` 设置为 `POST`。\n\
    \    2.  `POST` 数据格式与查询字符串相同，但您需要对其进行编码以放入 HTTP `Body` 中，方法与在 Android 中相同。\n \
    \   3.  要解析 JSON 内容或创建 JSON 对象，`NSJSONSerialization` 是您的得力助手。您需要将 JSON 对象转换为 `NSDictionary`，或将\
    \ JSON 数组转换为 `NSArray`。\n\n***列表 4-31***。HTTP `POST`\n\n```\n@IBAction func doPost(sender:\
    \ AnyObject) {\n  var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(\n\
    \       NSCharacterSet.URLQueryAllowedCharacterSet())\n  var queryString = \"\
    echo=\" + text;\n  var formData = queryString.dataUsingEncoding(NSUTF8StringEncoding)!\n\
    \  var urlRequest = NSMutableURLRequest(URL: NSURL(string: URL_TEST)!)\n  urlRequest.HTTPMethod\
    \ = \"POST\"\n  urlRequest.HTTPBody = formData\n\n  urlRequest.setValue(\"application/json\"\
    , forHTTPHeaderField: \"accept\")\n\n  NSURLConnection.sendAsynchronousRequest(urlRequest,\n\
    \    queue: NSOperationQueue.mainQueue(),\n    completionHandler: {(resp: NSURLResponse!,\
    \ data: NSData!, error: NSError!) -> Void in\n      println(resp.MIMEType)\n \
    \     println(NSString(data: data, encoding: NSUTF8StringEncoding))\n\n      var\
    \ json = NSJSONSerialization.JSONObjectWithData(data, options:\n          NSJSONReadingOptions.AllowFragments,\
    \ error: nil) as NSDictionary\n      self.mWebView.loadHTMLString(json[\"echo\"\
    ] as String, baseURL: nil)\n    })\n})\n```\n\n**注意** `SERVER_URL = \"http://pdachoice.com/ras/service/echo\"\
    ` 是一个简单的 Web 服务，用于回显路径参数。桌面浏览器完全能够渲染纯文本以及 HTML 文档。您可以使用桌面浏览器来验证来自服务器的数据。\n\n构建并运行\
    \ `RestClient` 项目，然后输入 **\"Hi you!\"** 以查看实际运行的应用程序。使用 `GET` 方法的简单回声服务实际上以 HTML\
    \ 格式响应：`<html><body><h1>Hi you!</h1></body></html>`，其渲染效果如图 4-48 所示。\n\n![9781484204375_Fig04-48.jpg](img/9781484204375_Fig04-48.jpg)\n\
    \n图 4-48。`RestClient doGet` 和 `doPost` 响应\n\n## 总结\n\n本章介绍了从 Android 到 iOS 最常见的编程组件映射：\n\
    \n*   用户界面和 UI 控件\n*   持久化存储选项\n*   网络与基于 JSON 的远程服务\n\n许多有意义的应用程序仅涉及本文讨论的组件。本章列出了所有可行的映射，并提供了关于如何将\
    \ Android 组件转换为对应 iOS 组件的逐步指导。接下来，您将了解如何应用这些指南，从头到尾构建一个简单但完整的实用工具应用程序。\n\n## 第三部分\n\
    \n## 整合所有内容\n\n之前，您已经了解了许多独立的 Android 到 iOS 映射主题。这些主题特意设计为自包含的，且各个 Xcode 项目中的类非常少，以便它们可以作为独立的示例项目。在真实的编程世界中，正是功能与用例的结合才使您的应用程序既实用又有趣。您肯定需要应用多个映射指南才能完成一个有意义的应用程序。\n\
    \n为了引导您完成整个移植过程，您将通过应用第二部分的映射主题，从头到尾移植一个功能完整的 Android 应用程序：\n\n1.  使用对应的可运行的 Android\
    \ 应用程序作为线框图，创建可运行的故事板。\n2.  首先将 Android 类和类成员签名移植到 Swift。如果可能，请保留任何签名。\n3.  一次一个方法地填补空白。调用者、接收者和“点”大多会毫无障碍地相互连接，只需在方法级别盲目地将\
    \ Java 语句或表达式翻译为 Swift 即可。\n\n这里不会有任何真正的新内容；您将系统地重复您一直在使用的自顶向下的开发方法，并逐一实现各个部分。\n\
    \n## 第五章\n\n## 案例研究回顾\n\n到目前为止，本书中您已经了解了许多独立的 Android 到 iOS 映射主题，并创建了超过 10 个 Xcode\
    \ 项目。这些映射主题特意在单独的 Xcode 项目中实现，且类非常少。在第 3 章中，您学习了使用故事板进行自顶向下开发的方法，将整个应用程序分解为面向\
    \ MVC 的内容视图和视图控制器对。在第 4 章中，您学习了如何逐个地将较小的独立组件从对应的 Android 应用程序移植过来。然而，所有这些主题都被设计为自包含且无依赖关系，以便它们可以作为独立的指导。\n\
    \n在真实的编程世界中，正是功能与用例的结合才使您的应用程序既实用又有趣。您肯定需要应用多个映射指南才能完成一个有意义的应用程序。在本章中，您将使用第 3\
    \ 章和第 4 章的映射主题，从头到尾移植一个现有的 Android 应用程序。没有新内容；您仍然会重复使用之前一直在用的自顶向下开发方法，并逐一实现各个部分。\n\
    \n也许有一件事情我还没有明确提及：应该先处理哪一部分，然后再处理哪一部分。对于任何应用程序，包括您正在移植的 Android 应用程序，您都必须经历相同的思考过程。如果您还记得创建您正在移植的\
    \ Android 应用程序的过程，那将是一个很好的开始，因为它将使您的 iOS 移植任务更高效。否则，您将使用平常的思考过程：确定各部分之间的依赖关系，并尝试在此过程中减少依赖关系。毕竟，绝对正确或错误的方法是不存在的。这超出了我们的移植主题，但我相信通过这最后的练习，您会开始理解我的思考过程。\n"
- fmt: "# Porting an Android App to iOS\n\nAgain, to show and learn by example, your\
    \ goal is to port an Android app, `RentalROI`, to iOS. [Figure 5-1](#9781484204375_Ch05.xhtml#Fig1)\
    \ shows the Android app you’re porting.\n\n![9781484204375_Fig05-01.jpg](images/9781484204375_Fig05-01.jpg)\n\
    \n[Figure 5-1](#9781484204375_Ch05.xhtml#_Fig1). Android `RentalROI` screens\n\
    \nThis Android app performs the following tasks:\n\n- Every time a user enters\
    \ new rental property parameters, user input is saved using `SharedPreferences`.\n\
    - The amortization schedule is calculated on the remote server. The Android client\
    \ simply calls the remote service to get the amortization schedules and stores\
    \ the data locally.\n- If a saved amortization schedule exists, the app uses it\
    \ instead of making a remote service call.\n\nYou will port this Android app to\
    \ iOS and preserve the design decisions already made.\n\n> **Note** This is just\
    \ for exercise purposes. It would be better to calculate the amortization schedules\
    \ locally without using the remote service—then you wouldn’t need to persist the\
    \ result.\n\nYou can download the ADT project from `http://pdachoice.com/bookassets/RentalROI-adt.zip`.\n\
    \nFirst, you’ll create a new Xcode project using the `Single View Application`\
    \ template, and give it the same name as the Android app: `RentalROI`. You will\
    \ be following the same porting approaches you used in [Chapters 3](#9781484204375_Ch03.xhtml)\
    \ (“Structure Your App”) and 4 (“Implement Piece by Piece”).\n\n## Structure Your\
    \ App\n\nYour first step is to create the Xcode storyboard as instructed in [Chapter\
    \ 3](#9781484204375_Ch03.xhtml):\n\n- Draw the storyboard scenes for each content\
    \ view and connect UI widgets to the custom `UIViewController` that pairs with\
    \ the storyboard scenes.\n- Choose a navigation pattern and connect storyboard\
    \ scenes together with segues.\n\nThis will result in a runnable iOS app with\
    \ all the content views and the view controller classes’ skeletons connected using\
    \ the appropriate screen navigation pattern.\n\n### Draw Storyboard Scenes\n\n\
    You can clearly see four content views in [Figure 5-1](#9781484204375_Ch05.xhtml#Fig1),\
    \ and you will need to draw four storyboard scenes in `Main.storyboard`. You should\
    \ use the counterpart ADT project as your live wireframe to create the iOS storyboard:\n\
    \n1. In no particular order, let’s start with the simplest one, the `EditTextViewFragment`\
    \ in the counterpart ADT project. The content view layout has only one `EditText`\
    \ in the counterpart ADT project. You want to add a `UITextField` to the storyboard\
    \ scene (see [Chapter 4](#9781484204375_Ch04.xhtml), “`UITextField`” for the detailed\
    \ instructions).\n\n   1. Drag a `UITextField` from **Object Library** to the\
    \ `View`, and update its attributes in the **Attributes Inspector** as shown in\
    \ [Figure 5-2](#9781484204375_Ch05.xhtml#Fig2).\n\n      ![9781484204375_Fig05-02.jpg](images/9781484204375_Fig05-02.jpg)\n\
    \n      [Figure 5-2](#9781484204375_Ch05.xhtml#_Fig2). `EditTextView` storyboard\
    \ scene\n\n   2. Center it vertically and add some space to the leading and trailing\
    \ spaces (e.g., `20`).\n   3. Create a bare-bones Swift `EditTextViewController`\
    \ class that extends from `UIViewController` (see [Listing 5-1](#9781484204375_Ch05.xhtml#list1)).\n\
    \   4. To pair with the storyboard scene, enter the custom class name in the **Identity\
    \ Inspector**.\n   5. In the **Connections Inspector**, connect the `delegate`\
    \ outlet and `New Referencing Outlet` to your code.\n\n      ***Listing 5-1***.\
    \ `EditTextViewController`\n\n      ```\n      import UIKit\n\n      class EditTextViewController:\
    \ UIViewController, UITextFieldDelegate {\n          @IBOutlet weak var mEditText:\
    \ UITextField!\n      }\n      ```\n\n2. Continue drawing the next content view\
    \ in no particular order (e.g., the Property screen). In the Android counterpart\
    \ `RentalPropertyViewFragment` class, I used `ListFragment` to achieve the L&F.\n\
    \n   In iOS, your natural choice is `UITableViewController` (see [Chapter 3](#9781484204375_Ch03.xhtml),\
    \ “`UITableViewController`” for the detailed instructions).\n\n   1. Drag a `UITableViewController`\
    \ from the **Object Library** and drop it onto the storyboard editor to create\
    \ a storyboard scene.\n   2. Select the Table View and update the `Style` attribute\
    \ to `Grouped` in **Attributes Inspector** (see [Figure 5-3](#9781484204375_Ch05.xhtml#Fig3)).\n\
    \n      ![9781484204375_Fig05-03.jpg](images/9781484204375_Fig05-03.jpg)\n\n \
    \     [Figure 5-3](#9781484204375_Ch05.xhtml#_Fig3). Creating a Table View scene\n\
    \n   3. Select the Table View Cell and update the attributes in **Attributes Inspector**\
    \ (see [Figure 5-4](#9781484204375_Ch05.xhtml#Fig4)):\n      - Style: Select **Right\
    \ Detail**.\n      - Identifier: Enter `aCell`.\n\n      ![9781484204375_Fig05-04.jpg](images/9781484204375_Fig05-04.jpg)\n\
    \n      [Figure 5-4](#9781484204375_Ch05.xhtml#_Fig4). Right Detail, Table View\
    \ Cell\n\n   4. Create a bare-bones Swift `RentalPropertyViewController` class\
    \ that extends from `UITableViewController` (see [Listing 5-2](#9781484204375_Ch05.xhtml#list2)).\
    \ To pair with the storyboard scene, enter the custom class name in the **Identity\
    \ Inspector**.\n\n      ***Listing 5-2***. `RentalPropertyViewController`\n\n\
    \      ```\n      import UIKit\n      class RentalPropertyViewController: UITableViewController\
    \ {\n\n      }\n      ```\n\n3. Continue drawing the next content view in no particular\
    \ order (e.g., the Amortization screen). The counterpart Android `AmortizationViewFragment`\
    \ is a standard `ListFragment`. Again, in iOS your natural choice for this is\
    \ `UITableViewController`.\n\n   1. Drag a `UITableViewController` from **Object\
    \ Library** and drop it onto the storyboard editor to create a storyboard scene.\n\
    \   2. Select the Table View Cell. In the **Attributes Inspector**, update the\
    \ following attributes:\n      - Style: Select **Subtitle**.\n      - Identifier:\
    \ Enter `aCell`.\n   3. Create a bare-bones Swift `AmortizationViewController`\
    \ class that extends from `UITableViewController` (see [Listing 5-3](#9781484204375_Ch05.xhtml#list3)).\n\
    \   4. To pair with the storyboard scene, enter the custom class name in the **Identity\
    \ Inspector**.\n\n      ***Listing 5-3***. `AmortizationViewController`\n\n  \
    \    ```\n      import UIKit\n      class AmortizationViewController: UITableViewController\
    \ {\n\n      }\n      ```\n\n4. Move on to draw the last content view, Monthly\
    \ Details. The counterpart Android `MonthlyTermViewFragment` layout looks like\
    \ a `ListView` but actually was implemented with two `TextViews` and a decorated\
    \ divider `View` for each line. You can translate these Android widgets piece\
    \ by piece to iOS, or you can choose to use `UITableView` as in Step 2. In iOS,\
    \ there is actually a better choice: using `UITableViewController` with static\
    \ cells, each static cell for each line.\n\n   1. Drag a `UITableViewController`\
    \ from `Object Library` and drop it onto the storyboard editor to create a storyboard\
    \ scene.\n   2. Select the Table View to update the attributes in the **Attributes\
    \ Inspector** as shown in [Figure 5-5](#9781484204375_Ch05.xhtml#Fig5).\n    \
    \  - Content: Select **Static Cells**.\n      - Sections: `2`\n      - Style:\
    \ Select **Grouped**.\n\n      ![9781484204375_Fig05-05.jpg](images/9781484204375_Fig05-05.jpg)\n\
    \n      [Figure 5-5](#9781484204375_Ch05.xhtml#_Fig5). Static Cells Table View\n\
    \n4. The Monthly Details screen contains `Mortgage Payment` and `Investment` sections."
