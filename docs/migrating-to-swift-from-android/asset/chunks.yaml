    \n就像在 Java 中一样，引用类型是通过引用传递的（实例的引用被复制到另一个变量），而值类型是通过复制传递的（整个值类型实例被复制到另一个内存空间）。但是，您确实需要注意某些差异："
- fmt: "- 与 Java 类似，自定义类是引用类型。基本类型、结构体和枚举是值类型。\n- 与 Java 不同，一些常用的数据类型是值类型，包括`String`、`Dictionary`和`Array`（它们在\
    \ Swift 中不是类）。这非常好，但一开始可能会让你感到惊讶。\n- 由于`Dictionary`和`Array`是值类型，它们在赋值时会被复制。如果包含的条目也是值类型，它们会被深拷贝。\n\
    - 你会遇到 Swift 的`NSString`、`NSArray`和`NSDictionary`，因为它们是从对应的 Objective-C Foundation\
    \ 框架类直接移植过来的。它们都被实现为类，因此是引用类型。\n\n## iOS 项目结构\n\n大多数 GUI 应用程序不仅仅由编程源代码组成；例如，一个典型的\
    \ iOS 项目包含 Swift 或 Objective-C 源代码、库、故事板文件、图像或多媒体等非代码应用程序资源、应用程序信息属性`Info.plist`文件等等。Xcode\
    \ 会编译并构建整个项目，并将应用程序所需的所有工件打包到一个扩展名为`.app`的归档文件中，然后使用相应的签名证书对`.app`文件进行签名。\n\n\
    让我们将一个简单的`HelloMobile` ADT 项目迁移到 Xcode，以便你能直观地了解典型 iOS 应用程序中的这些软件工件。图 2-7 中的 Android\
    \ 应用程序是使用 ADT 的**创建 Android 项目**模板创建的：\n\n- 它只有一个屏幕：一个 Java Fragment 类和一个布局文件。\n\
    - 在这个屏幕上，有一个`EditText`用于接收用户输入。当点击 **Hello...** 按钮时，它会在一个`TextView`上显示问候语。\n\n\
    ![9781484204375_Fig02-07.jpg](images/9781484204375_Fig02-07.jpg)\n\n图 2-7. `HelloMobile`，Android\
    \ 版本\n\n要创建`HelloMobile` iOS 应用程序，启动 Xcode 并执行以下步骤：\n\n1.  从 **Welcome to Xcode**\
    \ 启动屏幕中选择 **Create a new Xcode project**（见图 1-3）。或者，你可以从 Xcode 的顶部菜单栏中选择 **File**\
    \ ![image](images/arrow.jpg) **New** ![image](images/arrow.jpg) **Project**`...`。\n\
    2.  选择 **iOS Application**，然后选择 **Single View Application** 作为项目模板（见图 2-8）。\n\n\
    ![9781484204375_Fig02-08.jpg](images/9781484204375_Fig02-08.jpg)\n\n图 2-8. Single\
    \ View Application 模板\n\n3.  填写以下字段以完成新项目的创建：\n    1.  *Product Name*：`HelloMobile`\n\
    \    2.  *Organization Name*：例如，`PdaChoice`\n    3.  *Organization Identifier*：例如，`com.liaollc`\n\
    \    4.  *Language*：`Swift`\n    5.  完成后点击 **Next** 按钮。\n    6.  选择一个文件夹来保存你的`HelloMobile`项目。\n\
    \n基础版的`HelloMobile` iOS 项目已创建，并出现在 Xcode 的 **Project Navigator** 区域中（见图 2-9）。\n\
    \n![9781484204375_Fig02-09.jpg](images/9781484204375_Fig02-09.jpg)\n\n图 2-9. `HelloMobile`项目\n\
    \n它立即可运行。让我们检查一下 Xcode 项目中构成 iOS 应用程序的典型软件工件：\n\n- `.swift`文件中的 Swift 类。有两个类：\n\
    \n    a. `AppDelegate.swift`：每个 iOS 应用程序都必须有一个`AppDelegate`类。类似于`android.app.Application`，如果你的程序不需要追踪全局应用程序状态，则无需修改此文件。\n\
    \n    b. `ViewController.swift`：有一个与内容视图配对的`ViewController`类。其预期用途与 Android 项目中的\
    \ Android Fragment 类相同：作为内容视图的内容视图控制器。\n\n- 扩展名为`.storyboard`的`Main.storyboard`文件：\n\
    \n    a. 通常，你会为每个内容视图创建一个故事板场景，并且只对所有内容视图使用一个故事板文件，以便你能够直观地实现它们之间的链接。\n\n- `Images.xcassets`。这是你将图像资源放入所谓“资源目录”的地方：\n\
    \n    b. 开发人员应为每种设备配置提供不同的资源。这与在 Android 中提供替代资源的目的一致。\n\n    a. 截至目前，PNG 和 JPEG\
    \ 图像格式都受支持。使用资源目录并非必须。你可以将任何资源文件拖入 Xcode 项目（你可能想自己创建一个文件夹来组织它们）。\n\n- `Info.plist`文件。此文件描述了应用程序的配置方式以及系统需要了解的必需功能：\n\
    \n    a. 最好的 Android 类比是`AndroidManifest.xml`文件，但并不完全相同。你可以快速浏览此文件，以了解 Xcode 需要了解的关于应用程序的配置和设置。Xcode\
    \ 最初以 XML 格式创建它，你可以直接编辑。\n\n- 与必须遵循 ADT 项目文件夹结构的 ADT 项目不同，你可以按任何方式组织你的项目结构。例如，我通常会手动创建类似\
    \ Java 包的文件夹来组织我的 Swift 类，并创建一个`res`文件夹来组织任何资源文件，包括`Images.xcassets`。\n\n    a.\
    \ 在 Xcode 中，文件夹可以是浅蓝色的实际文件夹（例如，`Images.xcassets`文件夹）。\n\n    b. Xcode 中的文件夹也可以只是一个标签，称为**group**，颜色为黄色（例如，`HelloMobile`、`Supporting\
    \ Files`等）。它们的实际位置可能在任何物理子文件夹中，但你无需关心。\n\n- Xcode 6 会自动为你主要的项目创建一个单元测试目标。它包含一个`TestCase`类框架，你可以在其中编写单元测试代码。虽然你不会在本书中使用此功能，但它实际上非常有用。\n\
    - **Project Settings** 和 **Target Settings** 指示 Xcode 如何编译和构建项目。要显示 Project Settings，请在\
    \ Xcode 的 **Project Navigator** 区域中选择顶级应用程序名称（见图 2-9）。Project Settings 编辑器会显示在\
    \ **Editor** 区域中：\n\n    a. 对于这个简单的项目，你不需要修改任何东西。但你应该快速浏览编辑器，以大致了解 Xcode 编译和构建可执行文件所需的内容。\n\
    \niOS 应用程序尚未完成，但它已具备典型 iOS 应用程序应有的一切。\n\n## Xcode 故事板\n\n**Android 类比**\n\nADT\
    \ 中没有类似故事板的功能。你可以使用 Graphic Layout Editor 一次在一个布局文件中创建一个内容视图。\n\n使用 Xcode 的故事板功能来直观地组合应用程序的用户界面。顾名思义，它不仅能创建独立的屏幕和\
    \ UI 小部件，还能让你将整个应用程序组合成一个故事板。由于 iOS 应用程序都是 GUI 应用程序，此工具将通过以下操作极大地决定你创建 iOS 应用程序的生产力：\n\
    \n- 从 **Object Library** 中拖放 **View Controller** 来创建一个内容视图，称为故事板 **Scene**。\n\
    - 从 **Object Library** 中拖放 UI 小部件到故事板 **Scene**（内容视图）上，并适当定位小部件。\n- 实现 Auto Layout，使\
    \ UI 小部件和内容视图灵活适应各种屏幕尺寸，类似于 Android 的相对布局管理器。\n- 为不同设备的特定 **size classes** 实现特定的内容视图。\n\
    - 通过 **outlets** 将 UI 小部件链接到视图控制器的属性，并编写代码响应 UI 小部件事件。\n- 你甚至可以在故事板编辑器中绘制视图控制器的转场。\n\
    \n**Utility** 区域中还有其他子视图，你可以从顶部的选择器工具栏中选择。所有这些都很重要；你应该花点时间熟悉它们（见图 2-10）。"
  raw: "*   Similar to Java, your custom classes are reference types. Primitives,\
    \ structs, and enums are value types.\n*   Unlike Java, some of the frequently\
    \ used data types are value types, including `String`, `Dictionary` and `Array`\
    \ (they are not classes in Swift). This is very nice, but may surprise you in\
    \ the beginning.\n*   Since `Dictionary` and `Array` are value types, they are\
    \ copied during assignment. The contained items are also deep-copied if they are\
    \ value types.\n*   You will encounter the Swift `NSString`, `NSArray`, and `NSDictionary`\
    \ because they are directly ported from counterpart Objective-C Foundation framework\
    \ classes. They are all implemented as classes, and are thus reference types.\n\
    \niOS Project Anatomy\n\nMost GUI apps are composed of more than programming source\
    \ code; for example, a typical iOS project contains Swift or Objective-C source\
    \ code, libraries, storyboard files, images or multimedia non-code application\
    \ resources, an application-information property `Info.plist` file, and so forth.\
    \ Xcode compiles and builds the whole project and bundles all the artifacts required\
    \ for an app into an archive file with an `.app` file extension, and signs the\
    \ `.app` file with the appropriate signing certificate.\n\nLet’s translate a simple\
    \ `HelloMobile` ADT project to Xcode so that you can visualize these software\
    \ artifacts in a typical iOS app. The Android app in [Figure 2-7](#9781484204375_Ch02.xhtml#Fig7)\
    \ was created using the ADT **Create Android Project** template:\n\n*   It only\
    \ has one screen: one Java Fragment class and one layout file.\n*   On this screen,\
    \ it has an `EditText` to take user input. When the **Hello...** button is pressed,\
    \ it shows a greeting on a `TextView`.\n\n![9781484204375_Fig02-07.jpg](images/9781484204375_Fig02-07.jpg)\n\
    \n[Figure 2-7](#9781484204375_Ch02.xhtml#_Fig7). `HelloMobile`, Android version\n\
    \nTo create the `HelloMobile` iOS app, start Xcode and proceed with the following\
    \ steps:\n\n1.  Select **Create a new Xcode project** (See [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3))\
    \ from the **Welcome to Xcode** launch screen. Or, you can select **File ![image](images/arrow.jpg)\
    \ New ![image](images/arrow.jpg) Project** `...` from Xcode’s top menu bar.\n\
    2.  Select **iOS Application**, then choose **Single View Application** as the\
    \ project template (see [Figure 2-8](#9781484204375_Ch02.xhtml#Fig8)).\n\n![9781484204375_Fig02-08.jpg](images/9781484204375_Fig02-08.jpg)\n\
    \n[Figure 2-8](#9781484204375_Ch02.xhtml#_Fig8). Single View Application template\n\
    \n3.  Complete the following fields to finish the new-project creation:\n    1.\
    \  *Product Name*: `HelloMobile`\n    2.  *Organization Name*: for example, `PdaChoice`\n\
    \    3.  *Organization Identifier*: for example, `com.liaollc`\n    4.  Language:\
    \ `Swift`\n    5.  Click the **Next** button when done.\n    6.  Select a folder\
    \ to save your `HelloMobile` project.\n\nThe bare-bones `HelloMobile` iOS project\
    \ is created and it now appears in the Xcode **Project Navigator** area (see [Figure\
    \ 2-9](#9781484204375_Ch02.xhtml#Fig9)).\n\n![9781484204375_Fig02-09.jpg](images/9781484204375_Fig02-09.jpg)\n\
    \n[Figure 2-9](#9781484204375_Ch02.xhtml#_Fig9). `HelloMobile` project\n\nIt is\
    \ immediately runnable. Let’s examine the typical iOS software artifacts in an\
    \ Xcode project, which comprise the iOS app:\n\n*   Swift classes in `.swift`\
    \ files. There are two classes:\n\na.    `AppDelegate.swift`: Each iOS app must\
    \ have one `AppDelegate` class. Similar to `android.app.Application`, you don’t\
    \ need to modify this file if your program doesn’t need to track the global application\
    \ state.\n\nb.    `ViewController.swift`: There is a `ViewController` class paired\
    \ with the content view. The intended purpose is the same as the Android Fragment\
    \ class in an Android project: the content view controller for the content view.\n\
    \n*   `Main.storyboard` file with `.storyboard` file extension:\n\na.    You commonly\
    \ create one storyboard scene per content view and use only one storyboard file\
    \ for all content views so you can visually implement the linkages among them.\n\
    \n*   `Images.xcassets`. This is where you put your image assets, in what is called\
    \ the assets catalog:\n\nb.    Developers should provide different assets for\
    \ each device configuration. This is done for the same purpose as providing alternative\
    \ resources in Android.\n\na.    PNG and JPEG image formats are both supported\
    \ as of this writing. Using the assets catalog is not a must. You may drop any\
    \ resource files into the Xcode project. (You may want to create a folder to organize\
    \ them yourself.)\n\n*   `Info.plist` file. This file describes how the app is\
    \ configured and the required capabilities the system needs to know:\n\na.    The\
    \ best Android analogy is the `AndroidManifest.xml` file, but not exactly. You\
    \ may glance through this file to get a feel for the configurations and settings\
    \ that Xcode needs to know about the app. Xcode initially creates it in XML format,\
    \ which you can edit directly.\n\n*   Unlike ADT projects that must follow the\
    \ ADT project-folder structure, you can organize your project structure any way\
    \ you want. For example, normally I manually create Java-package-like folders\
    \ to organize my Swift classes and create a `res` folder to organize any resources\
    \ files, including the `Images.xcassets`.\n\na.    In Xcode, the folder can be\
    \ a actual folder of a light-blue color (e.g., the `Images.xcassets` folder).\n\
    \nb.    Folders in Xcode can also be just a tag, called a **group**, with a yellow\
    \ color (e.g., `HelloMobile`, `Supporting Files`, etc.). Their actual location\
    \ could be in any of the physical subfolders, but you should not care.\n\n*  \
    \ Xcode 6 automatically creates a unit test target for your primary project. It\
    \ contains a `TestCase` class skeleton in which you can write your unit test code.\
    \ Although you will not use this feature in this book, it is actually very useful.\n\
    *   **Project Settings** and **Target Settings** instruct Xcode how to compile\
    \ and build the projects. To show the Project Settings, select the top-level application\
    \ name in the Xcode **Project Navigator** area (see [Figure 2-9](#9781484204375_Ch02.xhtml#Fig9)).\
    \ The Project Settings editor shows in the **Editor** area:\n\na.    For this\
    \ simple project, you don’t need to modify anything. But you should glance through\
    \ the editor to get a quick idea of what Xcode requires to compile and build the\
    \ executable.\n\nThe iOS app is not completed yet, but it has everything a typical\
    \ iOS app should have.\n\nXcode Storyboard\n\nANDROID ANALOGY\n\nThere is no storyboard-like\
    \ feature in ADT. You use the Graphic Layout Editor to create one content view\
    \ in one layout file at a time.\n\nUse the Xcode Storyboarding feature to visually\
    \ compose the UI for your app. As its name implies, not only does it create individual\
    \ screens and UI widgets, but it also lets you compose the whole app as one storyboard.\
    \ Since iOS apps are all GUI apps, this tool will greatly determine your productivity\
    \ in creating iOS apps through the following actions:\n\n*   Drag and drop **View\
    \ Controller** from the **Object Library** to create a content view, called a\
    \ Storyboard **Scene**.\n*   Drag and drop UI widgets from the **Object Library**\
    \ onto the Storyboard **Scene** (content view), and position the widget appropriately.\n\
    *   Implement Auto Layout to make the UI widgets and content view flexible and\
    \ adaptive for various screen sizes, similar to the Android relative layout manager.\n\
    *   Implement specific content views for specific **size classes** of different\
    \ devices.\n*   Link the UI widgets to the properties of the view controller via\
    \ **outlets**, and write code to respond to UI widget events.\n*   You can even\
    \ draw the view controller transitions all within the storyboard editor.\n\nThere\
    \ are other subviews in the **Utility** area that you can select from the top\
    \ selector tool bar. All of them are important; you should take a moment to get\
    \ familiar with them (see [Figure 2-10](#9781484204375_Ch02.xhtml#Fig10)):"
  trans: "\n- 与 Java 类似，自定义类是引用类型。基本类型、结构体和枚举是值类型。\n- 与 Java 不同，一些常用的数据类型是值类型，包括`String`、`Dictionary`和`Array`（它们在\
    \ Swift 中不是类）。这非常好，但一开始可能会让你感到惊讶。\n- 由于`Dictionary`和`Array`是值类型，它们在赋值时会被复制。如果包含的条目也是值类型，它们会被深拷贝。\n\
    - 你会遇到 Swift 的`NSString`、`NSArray`和`NSDictionary`，因为它们是从对应的 Objective-C Foundation\
    \ 框架类直接移植过来的。它们都被实现为类，因此是引用类型。\n\n## iOS 项目结构\n\n大多数 GUI 应用程序不仅仅由编程源代码组成；例如，一个典型的\
    \ iOS 项目包含 Swift 或 Objective-C 源代码、库、故事板文件、图像或多媒体等非代码应用程序资源、应用程序信息属性`Info.plist`文件等等。Xcode\
    \ 会编译并构建整个项目，并将应用程序所需的所有工件打包到一个扩展名为`.app`的归档文件中，然后使用相应的签名证书对`.app`文件进行签名。\n\n\
    让我们将一个简单的`HelloMobile` ADT 项目迁移到 Xcode，以便你能直观地了解典型 iOS 应用程序中的这些软件工件。图 2-7 中的 Android\
    \ 应用程序是使用 ADT 的**创建 Android 项目**模板创建的：\n\n- 它只有一个屏幕：一个 Java Fragment 类和一个布局文件。\n\
    - 在这个屏幕上，有一个`EditText`用于接收用户输入。当点击 **Hello...** 按钮时，它会在一个`TextView`上显示问候语。\n\n\
    ![9781484204375_Fig02-07.jpg](img/9781484204375_Fig02-07.jpg)\n\n图 2-7. `HelloMobile`，Android\
    \ 版本\n\n要创建`HelloMobile` iOS 应用程序，启动 Xcode 并执行以下步骤：\n\n1.  从 **Welcome to Xcode**\
    \ 启动屏幕中选择 **Create a new Xcode project**（见图 1-3）。或者，你可以从 Xcode 的顶部菜单栏中选择 **File**\
    \ ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg) **Project**`...`。\n\
    2.  选择 **iOS Application**，然后选择 **Single View Application** 作为项目模板（见图 2-8）。\n\n\
    ![9781484204375_Fig02-08.jpg](img/9781484204375_Fig02-08.jpg)\n\n图 2-8. Single\
    \ View Application 模板\n\n3.  填写以下字段以完成新项目的创建：\n    1.  *Product Name*：`HelloMobile`\n\
    \    2.  *Organization Name*：例如，`PdaChoice`\n    3.  *Organization Identifier*：例如，`com.liaollc`\n\
    \    4.  *Language*：`Swift`\n    5.  完成后点击 **Next** 按钮。\n    6.  选择一个文件夹来保存你的`HelloMobile`项目。\n\
    \n基础版的`HelloMobile` iOS 项目已创建，并出现在 Xcode 的 **Project Navigator** 区域中（见图 2-9）。\n\
    \n![9781484204375_Fig02-09.jpg](img/9781484204375_Fig02-09.jpg)\n\n图 2-9. `HelloMobile`项目\n\
    \n它立即可运行。让我们检查一下 Xcode 项目中构成 iOS 应用程序的典型软件工件：\n\n- `.swift`文件中的 Swift 类。有两个类：\n\
    \n    a. `AppDelegate.swift`：每个 iOS 应用程序都必须有一个`AppDelegate`类。类似于`android.app.Application`，如果你的程序不需要追踪全局应用程序状态，则无需修改此文件。\n\
    \n    b. `ViewController.swift`：有一个与内容视图配对的`ViewController`类。其预期用途与 Android 项目中的\
    \ Android Fragment 类相同：作为内容视图的内容视图控制器。\n\n- 扩展名为`.storyboard`的`Main.storyboard`文件：\n\
    \n    a. 通常，你会为每个内容视图创建一个故事板场景，并且只对所有内容视图使用一个故事板文件，以便你能够直观地实现它们之间的链接。\n\n- `Images.xcassets`。这是你将图像资源放入所谓“资源目录”的地方：\n\
    \n    b. 开发人员应为每种设备配置提供不同的资源。这与在 Android 中提供替代资源的目的一致。\n\n    a. 截至目前，PNG 和 JPEG\
    \ 图像格式都受支持。使用资源目录并非必须。你可以将任何资源文件拖入 Xcode 项目（你可能想自己创建一个文件夹来组织它们）。\n\n- `Info.plist`文件。此文件描述了应用程序的配置方式以及系统需要了解的必需功能：\n\
    \n    a. 最好的 Android 类比是`AndroidManifest.xml`文件，但并不完全相同。你可以快速浏览此文件，以了解 Xcode 需要了解的关于应用程序的配置和设置。Xcode\
    \ 最初以 XML 格式创建它，你可以直接编辑。\n\n- 与必须遵循 ADT 项目文件夹结构的 ADT 项目不同，你可以按任何方式组织你的项目结构。例如，我通常会手动创建类似\
    \ Java 包的文件夹来组织我的 Swift 类，并创建一个`res`文件夹来组织任何资源文件，包括`Images.xcassets`。\n\n    a.\
    \ 在 Xcode 中，文件夹可以是浅蓝色的实际文件夹（例如，`Images.xcassets`文件夹）。\n\n    b. Xcode 中的文件夹也可以只是一个标签，称为**group**，颜色为黄色（例如，`HelloMobile`、`Supporting\
    \ Files`等）。它们的实际位置可能在任何物理子文件夹中，但你无需关心。\n\n- Xcode 6 会自动为你主要的项目创建一个单元测试目标。它包含一个`TestCase`类框架，你可以在其中编写单元测试代码。虽然你不会在本书中使用此功能，但它实际上非常有用。\n\
    - **Project Settings** 和 **Target Settings** 指示 Xcode 如何编译和构建项目。要显示 Project Settings，请在\
    \ Xcode 的 **Project Navigator** 区域中选择顶级应用程序名称（见图 2-9）。Project Settings 编辑器会显示在\
    \ **Editor** 区域中：\n\n    a. 对于这个简单的项目，你不需要修改任何东西。但你应该快速浏览编辑器，以大致了解 Xcode 编译和构建可执行文件所需的内容。\n\
    \niOS 应用程序尚未完成，但它已具备典型 iOS 应用程序应有的一切。\n\n## Xcode 故事板\n\n**Android 类比**\n\nADT\
    \ 中没有类似故事板的功能。你可以使用 Graphic Layout Editor 一次在一个布局文件中创建一个内容视图。\n\n使用 Xcode 的故事板功能来直观地组合应用程序的用户界面。顾名思义，它不仅能创建独立的屏幕和\
    \ UI 小部件，还能让你将整个应用程序组合成一个故事板。由于 iOS 应用程序都是 GUI 应用程序，此工具将通过以下操作极大地决定你创建 iOS 应用程序的生产力：\n\
    \n- 从 **Object Library** 中拖放 **View Controller** 来创建一个内容视图，称为故事板 **Scene**。\n\
    - 从 **Object Library** 中拖放 UI 小部件到故事板 **Scene**（内容视图）上，并适当定位小部件。\n- 实现 Auto Layout，使\
    \ UI 小部件和内容视图灵活适应各种屏幕尺寸，类似于 Android 的相对布局管理器。\n- 为不同设备的特定 **size classes** 实现特定的内容视图。\n\
    - 通过 **outlets** 将 UI 小部件链接到视图控制器的属性，并编写代码响应 UI 小部件事件。\n- 你甚至可以在故事板编辑器中绘制视图控制器的转场。\n\
    \n**Utility** 区域中还有其他子视图，你可以从顶部的选择器工具栏中选择。所有这些都很重要；你应该花点时间熟悉它们（见图 2-10）。\n"
- fmt: "- **File Inspector:** Shows you the actual file identity and document type\
    \ options in Xcode.\n- **Quick Help Inspector:** Shows you the reference doc.\n\
    - **Identity Inspector:** Shows you the Swift class from SDK or your custom class\
    \ that is associated with the item in the storyboard.\n- **Attributes Inspector:**\
    \ This is our primary interest now. You will see different attributes for different\
    \ widgets.\n- **Size Inspector:** Shows you the rectangular area in which the\
    \ widget is located.\n- **Connections Inspector:** Lets you draw the connection\
    \ to the view controller. I will discuss this later (see \"Interact with Content\
    \ View\" in [Chapter 3](#9781484204375_Ch03.xhtml)).\n\n![9781484204375_Fig02-10.jpg](images/9781484204375_Fig02-10.jpg)\n\
    \n[Figure 2-10](#9781484204375_Ch02.xhtml#_Fig10). Select UI components from Object\
    \ Library\n\nNow is the time for you to get familiar with Xcode Storyboarding\
    \ feature. The iOS `HelloMobile` project doesn’t look like the counterpart Android\
    \ app yet; it only has one screen in the `Main.storyboard` file, which is empty.\
    \ The counterpart Android layout file has three UI widgets: `EditText`, `TextView`,\
    \ and a hello `Button`.\n\nFirst you will Implement the user interface of the\
    \ `HelloMobile` iOS app. Xcode storyboard provides everything you need for this\
    \ mission.\n\n## Object Library and Attributes Inspector\n\n**ANDROID ANALOGY:**\
    \ Drag and drop the UI widgets from Palette View in the ADT Graphical Layout Editor\
    \ and set the widget attributes in the layout file.\n\nYou need to add three UI\
    \ widgets to the content view, just as in the counterpart Android app, using the\
    \ following steps:\n\n1.  Select the `Main.storyboard` file in the **Project Navigator**.\
    \ [Figure 2-10](#9781484204375_Ch02.xhtml#Fig10) depicts the storyboard editor\
    \ in the **Editor** area. Currently, there is only one screen, known as a storyboard\
    \ scene.\n2.  Select the **Object Library** from the Library selector bar in the\
    \ **Utility** area. This is where you can find the UI widgets and elements to\
    \ compose the storyboard.\n3.  Optionally, to make more room for your storyboard\
    \ editor, you may hide the **Navigator** and **Debug** areas by selecting the\
    \ toggle buttons, as indicated in [Figure 2-10](#9781484204375_Ch02.xhtml#Fig10).\n\
    4.  I will talk about size class, an important new iOS 8 feature, in [Chapter\
    \ 3](#9781484204375_Ch03.xhtml). For now, disable it: uncheck **Use Size Classes**\
    \ in the **File Inspector** of the **Utility** area, as shown in [Figure 2-11](#9781484204375_Ch02.xhtml#Fig11).\
    \ This will give you a better WYSIWYG storyboard editor.\n\n![9781484204375_Fig02-11.jpg](images/9781484204375_Fig02-11.jpg)\n\
    \n[Figure 2-11](#9781484204375_Ch02.xhtml#_Fig11). Disable Size Classes in File\
    \ Inspector\n\n5.  To add the UI widget to storyboard scene, find the desired\
    \ UI widget from **Object Library** and drag it to the existing View in the Storyboard\
    \ scene. Both Android and iOS screens must have one root view, and any view element\
    \ should be added to a parent view. This forms the parent-child view hierarchy.\n\
    \    1.  You must select the parent view (see pointer in [Figure 2-11](#9781484204375_Ch02.xhtml#Fig11))\
    \ first so you can drop the `TextField` element onto it.\n    2.  You may browse\
    \ and select the UI widgets from **Object Library**. The list is long, so the\
    \ search bar on the bottom is very useful for finding the right widget. Type the\
    \ name of the iOS widget, as shown in [Figure 2-10](#9781484204375_Ch02.xhtml#Fig10),\
    \ or just type in your best guess as many characters as needed.\n\n**Tip** The\
    \ iOS widgets you need are called `TextField`, `Label`, and `Button`.\n\n3.  To\
    \ position the newly added `TextField`, drag it to where you want it to be. Xcode\
    \ gives you guide lines to show you when the widgets are at certain positions\
    \ of the common interests, such as in the center, or aligned to any other widgets\
    \ (see [Figure 2-12](#9781484204375_Ch02.xhtml#Fig12)).\n\n![9781484204375_Fig02-12.jpg](images/9781484204375_Fig02-12.jpg)\n\
    \n[Figure 2-12](#9781484204375_Ch02.xhtml#_Fig12). Guide lines\n\n4.  [Figure\
    \ 2-13](#9781484204375_Ch02.xhtml#Fig13) shows the three simple UI widgets added\
    \ to the storyboard scene.\n\n![9781484204375_Fig02-13.jpg](images/9781484204375_Fig02-13.jpg)\n\
    \n[Figure 2-13](#9781484204375_Ch02.xhtml#_Fig13). Three simple UI widgets\n\n\
    6.  Just as in Android, the attributes of UI widgets in Swift affect the look,\
    \ feel, and behavior of the widgets, and you can change them visually. You can\
    \ find and modify these attributes in the **Attributes Inspector** located in\
    \ the **Utility** area. To make the `TextField` like the Android counterpart,\
    \ modify the following attributes:\n    1.  Font size: `System 24`\n    2.  Placeholder\
    \ (a.k.a. `android:hint`): \"`Enter a Name, e.g., You`\"\n    3.  Alignment: `center`\n\
    \    4.  `TextField` has a handful of attributes. Glance through them and you\
    \ should have no problem relating them to the counterpart attributes you normally\
    \ use in Android `EditText`.\n    5.  Switch to **Size Inspector** view and change\
    \ the width to `200`. You will need to drag the `TextField` to reposition it to\
    \ center horizontally.\n7.  To make the `Label` widget like the Android counterpart\
    \ `TextView`, modify the following attributes:\n    1.  Text: for example, \"\
    `Hello World!`\"\n    2.  Font: for example, `System 20` or `Headline`\n    3.\
    \  Alignment: `center`\n    4.  Lines: `1`\n    5.  Switch to the **Size Inspector**\
    \ and change the width to `200`. You will need to drag the label to reposition\
    \ it to center horizontally.\n8.  To make the `Button` widget like the Android\
    \ counterpart, modify the following attributes:\n    1.  Text: \"`Hello World!`\"\
    \n    2.  Title: \"`Hello ...`\"\n9.  To preview your storyboard in Xcode, select\
    \ the **Assistant Editor** button on the toolbar and select **Preview** in the\
    \ Assistant Editor, as shown in [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14).\n\
    \n![9781484204375_Fig02-14.jpg](images/9781484204375_Fig02-14.jpg)\n\n[Figure\
    \ 2-14](#9781484204375_Ch02.xhtml#_Fig14). Three simple widgets added to storyboard\n\
    \nThe look and feel in portrait mode is close enough for our purposes: using a\
    \ storyboard to visually compose the content view without writing a single line\
    \ of code. The iOS `HelloMobile` is not completed yet: the `Hello ...` button\
    \ doesn’t read \"Hello...\", and the landscape mode is not acceptable yet. Both\
    \ are important topics and have their own sections in [Chapter 3](#9781484204375_Ch03.xhtml).\n\
    \nIn this exercise, I just wanted to give you a quick look of the Xcode storyboard\
    \ editor. The Xcode workspace seems quite different from Eclipse. Spend a moment\
    \ to get familiar with the Xcode workspace, including the storyboard editor, the\
    \ **Utility** area, selector tool bar, and so forth. Xcode storyboarding is a\
    \ very important tool that will greatly influence your productivity when creating\
    \ iOS apps.\n\n## Summary\n\nOn the surface, you actually learned about a lot\
    \ of things in this chapter. You started with a discussion of Swift–Java language\
    \ comparisons to learn their similarities, then you went over Swift language topics\
    \ to highlight the new language features. However, the rest of the book will focus\
    \ on iOS programming instead of the Swift language. The code will address readability\
    \ as opposed to being concise using new tricks. You surely won’t have a problem\
    \ reading all the Swift code in the rest of the book. Sooner or later, though,\
    \ you will need the reference document to the Swift programming language, which\
    \ is available free in iTunes (`https://itunes.apple.com/us/book/swift-programming-language/id881256329`).\n\
    \nYou created a `HelloMobile` iOS project using Xcode to visualize a typical iOS\
    \ application structure so you can visualize. You also got your first taste of\
    \ the Xcode storyboard, which is very important and which you will use for every\
    \ iOS app, including all the sample projects in this book—so plan on revisiting\
    \ the storyboard repeatedly.\n\n## Part II\n\n### A Roadmap for Porting"
