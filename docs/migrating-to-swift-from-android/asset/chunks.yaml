    \ 和 iOS 警告对话框。在 iOS 上，你使用 `UIAlertController`。两者的基本用法几乎相同，唯一的区别是 Android 的 `AlertDialog`\
    \ 多了一个标题图标。\n\n![9781484204375_Fig03-58.jpg](img/9781484204375_Fig03-58.jpg)\n\
