    \ 代码清单 4-20 所示。\n\n   ***代码清单 4-20***. 将 `contentView` 边缘固定到屏幕/根视图边缘\n\n   ```\n\
    \   class ViewController: ... {\n       ...\n       @IBOutlet var mContainer:\
    \ UIView!\n       override func viewDidLoad() {\n       ...\n       var leftConstraint\
    \ = NSLayoutConstraint(\n                   item: self. mContainer,\n        \
    \    attribute: NSLayoutAttribute.Leading,\n            relatedBy: NSLayoutRelation(rawValue:\
    \ 0)!,\n               toItem: self.view,\n            attribute: NSLayoutAttribute.Leading,\n\
