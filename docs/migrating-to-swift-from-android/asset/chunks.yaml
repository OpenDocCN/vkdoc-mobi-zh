  trans: "```swift\nvar actionOk = UIAlertAction(title: \"Ok\",\n    style: UIAlertActionStyle.Default,\
    \ handler: {action in\n        println((alert.textFields[0] as UITextField).text)\n\
    \      })\n\nalert.addAction(actionCancel)\n    alert.addAction(actionOk)\n\n\
    // 添加文本字段\n    alert.addTextFieldWithConfigurationHandler({textField in\n    \
    \  // 配置 UITextField\n      textField.backgroundColor = UIColor.yellowColor()\n\
    \      textField.placeholder = \"enter text, i.e., Do Ra Me\"\n      })\n\n//\
    \ UIViewController 用于展示视图控制器的 API\n    self.presentViewController(alert, animated:\
    \ true, completion: nil)\n}\n```\n\n`UIAlertController` 内的所有内容都是通过编程方式创建的。图 3-59\
    \ 展示了 `UIAlertController` 代码的实际运行效果。\n\n![9781484204375_Fig03-59.jpg](img/9781484204375_Fig03-59.jpg)\n\
    \n图 3-59. iOS `UIAlertController`\n\n## UIPopoverController\n\n**Android 类比**\n\
    \n`DialogFragment`.\n\n在 iPad 等大屏幕 iOS 设备上，您可以使用 `PopoverController` 将常规的 `viewController`\
    \ 作为弹出层呈现。该弹出层可以锚定在特定位置，以便将显示的对话框与呈现上下文关联起来。在 iPhone 等紧凑型尺寸类别的设备上，弹出控制器会自动回退到常规的全屏视图控制器。您也可以利用故事板编辑器来绘制内容视图和转场，而无需编写代码。\n\
    \n以下步骤演示了 `Dialogs` 项目中的 `PopoverController`：\n\n1.  为弹出层添加一个新的故事板场景。\n    1.\
    \  创建一个 `GreenViewController` 类，如代码清单 3-23 所示，并在故事板中绘制一个视图控制器场景。通过在**身份检查器**中指定类名来与其匹配。\n\
    \n***代码清单 3-23***. `GreenViewController` 类\n\n```swift\n        class GreenViewController\
    \ : UIViewController {\n          @IBAction func doDone(sender: AnyObject) {\n\
    \            // 执行某些操作并关闭\n            self.dismissViewControllerAnimated(true,\
    \ completion:nil)\n          }\n        }\n```\n\n2.  将视图控制器嵌入到导航控制器中（通过 Xcode\
    \ 菜单栏的**编辑器 ![image](img/arrow.jpg) 嵌入于**），以利用导航栏标题或任何导航控制器的功能。\n    3.  在导航控制器的**属性检查器**中，将**模拟的尺寸**更改为**自由形式**，然后在**尺寸检查器**中将**模拟的尺寸**更改为\
    \ **250 × 300**。\n    4.  在导航控制器的**身份检查器**中，指定故事板 ID，例如 `nav`。如果您想直接从故事板实例化一个视图控制器实例，始终需要该\
    \ ID（请参见代码清单 3-24）。\n    5.  通常您会在内容视图中绘制有意义的控件。为简单起见，请使用**属性检查器**将 `GreenViewController`\
    \ 视图的**背景**属性更改为**绿色**。\n    6.  在 `GreenViewController` 的导航栏右侧绘制一个 `BarButtonItem`，并将**发送操作**插座连接到\
    \ `GreenViewController` 中的 `IBAction` 方法，如代码清单 3-23 所示。图 3-60 展示了完成后的故事板。\n\n\
    ![9781484204375_Fig03-60.jpg](img/9781484204375_Fig03-60.jpg)\n\n图 3-60. Dialogs\
    \ 故事板完成图\n\n2.  要展示 `GreenViewController`，请从呈现的 `ViewController` 绘制一个手动转场到 `GreenViewController`\
    \ 的父级导航控制器。在**属性检查器**中指定转场属性值，如图 3-61 所示。\n\n![9781484204375_Fig03-61.jpg](img/9781484204375_Fig03-61.jpg)\n\
    \n图 3-61. 属性检查器中的故事板转场属性\n\n1.  标识符：`mypopover`。\n    2.  转场类型：`Present As Popover`。\n\
    \    3.  方向：`上`（您可以尝试其他值）。\n    4.  锚定插座：将插座拖拽到呈现的视图控制器中的 `Popup` 按钮上。\n3.  要执行\
    \ `mypopover` 手动转场，请更新 `ViewController.doPopup(...) IBAction` 方法，如代码清单 3-24 所示。请注意，注释掉的代码通过编程方式展示了一个\
    \ `UIPopoverController`，而未使用故事板转场。\n\n***代码清单 3-24***. 执行 `mypopover` 手动转场\n\n\
    ```swift\n    // 在 ViewController 类中\n    @IBAction func doPopup(sender: AnyObject)\
    \ {\n      self.performSegueWithIdentifier(\"mypopover\", sender: nil)\n\n// var\
    \ nav = self.storyboard.instantiateViewControllerWithIdentifier(\"nav\") as UIViewController\n\
    \    // var popover = UIPopoverController(contentViewController: nav)\n    //\
    \ popover.delegate = self;\n    // popover.popoverContentSize = nav.view.bounds.size\n\
    \    // popover.presentPopoverFromRect(self.mPopupButton.frame, inView: self.view,\
    \ permittedArrowDirections: UIPopoverArrowDirection.Up, animated: true)\n    }\n\
    ```\n\n4.  您可以通过点击呈现的视图控制器内部但位于 `GreenViewController` 内容视图之外的任意位置来关闭弹出层。要以编程方式关闭弹出层，请实现\
    \ `GreenViewController.doDone(...)` 以调用 `dismissViewControllerAnimated(...)`，如代码清单\
    \ 3-23 所示。\n\n您可以构建并运行 Xcode 的 `Dialogs` 项目，查看 `UIPopoverController` 代码的实际运行效果。在\
    \ iPad 上，`UIPopoverController` 呈现为弹出对话框，而相同的代码在 iPhone 等紧凑型尺寸类别的设备上则呈现为全屏模态屏幕，如图\
    \ 3-62 所示。\n\n![9781484204375_Fig03-62.jpg](img/9781484204375_Fig03-62.jpg)\n\n\
    图 3-62. iPad 与 iPhone 上 `UIPopoverController` 代码的运行结果\n\n## 提示消息 (Toasts)\n\n\
    为了给用户提供快速反馈，并使其自动消失，您通常在 Android 应用中使用 Toast。iOS 中没有类似 Android 的 Toast 控件。我非常喜欢这个功能，但它放在\
    \ iOS 上可能会显得有点 Android 风格。您始终可以通过定时器以编程方式创建一个带有淡入淡出效果的小型视图区域。\n\n## 总结\n\n要将 Android\
    \ 应用移植到 iOS，首先要使用对应的 Android 应用作为线框来创建故事板场景，以自然地将您的应用自上而下地分解为结构化的 MVC 项目。结果会得到一组内容视图-视图控制器对，它们映射到\
    \ Android 中对应的布局-片段对。\n\n接下来，为了实现屏幕导航模式，您需要绘制故事板转场来连接故事板场景。您还需要从 SDK 中选择合适的容器视图控制器（例如\
    \ `UINavigationController`）来辅助屏幕切换。iOS 和 Android 之间其余的内容视图和视图控制器映射关系就简单了。您将在第\
    \ 4 章中深入了解每个屏幕的细节。\n\n# 第 4 章\n\n## 逐片实现\n\n在上一章中，您从 iOS 故事板入手，使用导航模式打下了基础。结果得到了一系列连接在一起的\
    \ `UIViewController` 类，这些类设置在一个 MVC 框架中，映射到 Android 中的对应片段。\n\n在本章中，您将逐一实现每个视图-控制器对，并包含已存在于对应\
    \ Android `Fragment` 和布局文件中的详细用户界面和业务逻辑。您还将重点关注以下常见的从 iOS 到 Android 的编程任务映射：\n\
    \n*   用户界面和常用 UI 控件\n*   持久化存储选项\n*   使用 JSON 的网络和远程服务\n\n## 用户界面\n```"
- fmt: "All those storyboard scenes that you implemented using the screen navigation\
    \ patterns in [Chapter 3](#9781484204375_Ch03.xhtml) were intentionally very simple.\
    \ Obviously, a useful mobile app provides rich content and offers better functionality\
    \ to gracefully interact with users. The user interface will certainly play an\
    \ important role in the overall user experience.\n\nThe techniques and vocabularies\
    \ for creating meaningful user interfaces for iOS are definitely different from\
    \ those for Android. UI components are normally platform dependent. You just need\
    \ to know the usages of the UI widgets and where to look up the platform-specific\
    \ widget specifications.\n\nOn the other hand, there are similarities among many\
    \ UI frameworks. Both iOS and Android view blocks are structured as a view container\
    \ (view/parent) model, which has been in the industry for a long time. In iOS,\
    \ `UIView` is an object that draws something on the screen with which the user\
    \ can interact. A `UIView` is also a container that holds other `UIView` objects\
    \ to define the hierarchical layout of the UI.\n\nThe view container model appears\
    \ similar to Android but with differences in how to position a UI widget within\
    \ its parent view or relative to siblings. Android uses **layout managers**, whereas\
    \ iOS uses **auto layout**.\n\n## `UIView`\n\nThe `UIView` object is the basic\
    \ building block for UI components. It is the base class for all widgets, such\
    \ as common widgets like `UIButton` and `UILabel`. It is also used as the parent\
    \ container view.\n\n**ANDROID ANALOGY**\n\n`android.view.View` or `android.view.ViewGroup`.\n\
    \nA visible `UIView` occupies a rectangular area on the screen and is responsible\
    \ for drawing and event handling. The `UIViewController` class has a root view\
    \ defined in the `UIViewController.view` property that is inherited by all the\
    \ view controllers. All UI widgets are special types of `UIView` that have attributes\
    \ for the intended look, feel, and behaviors. When drawing the view elements in\
    \ storyboard, they are added to the parent view, and you use the storyboard view\
    \ **Inspectors** to visually edit the view properties.\n\nAll the iOS UI widgets\
    \ inherit from `UIView`. You can set the inherited `UIView` attributes in the\
    \ storyboard view **Attributes Inspector**. For example, [Figure 4-1](#9781484204375_Ch04.xhtml#Fig1)\
    \ depicts the `View` section in the **Attributes Inspector** for any UI widgets.\n\
    \n![9781484204375_Fig04-01.jpg](images/9781484204375_Fig04-01.jpg)\n\n[Figure\
    \ 4-1](#9781484204375_Ch04.xhtml#_Fig1). View section of Attributes Inspector\n\
    \nAt runtime, you can programmatically update these properties of the `UIView`\
    \ object. `UIView` is the ultimate super class of all the widgets. It offers a\
    \ fairly rich API for developers to implement a number of UI related responsibilities:\n\
    \n*   rendering content\n*   layout and manage subviews\n*   event handling\n\
    *   animations\n\nThe rest of the chapter demonstrates the common attributes or\
    \ APIs that you most likely will encounter or that are just good to know beforehand.\
    \ Before diving into common iOS UI widgets from the iOS SDK, I want to talk about\
    \ an important related topic, **Application Resources**, which will be used by\
    \ UI widgets as well as many other common programming tasks.\n\n## Application\
    \ Resources\n\n**ANDROID ANALOGY**\n\n`Android Application Resources`\n\nMost\
    \ GUI apps are composed of more than programming code—they require other resources,\
    \ such as images and externalized strings. In iOS, you will encounter similar\
    \ tasks for how to provide different assets for different device configurations.\
    \ This will demonstrate how to implement two common use cases in Xcode: the Assets\
    \ Catalog and externalizing strings.\n\n### Assets Catalog\n\nAndroid developers\
    \ must be familiar with the concept of providing alternative resources for images.\
    \ This section will show you how in iOS. As usual, create a new Xcode project\
    \ and do the following:\n\n1.  Launch Xcode, use the `Single View Application`\
    \ template, and name the project `CommonWidgets`. The project comes with one Asset\
    \ Catalog, `Images.xcassets`, that already contains the `AppIcon` set as shown\
    \ in [Figure 4-2](#9781484204375_Ch04.xhtml#Fig2) (left pointer). The editor shows\
    \ you the icons and pixel resolutions for different device types. Toggle the **iOS\
    \ 6.1 and Prior Sizes** check box (right pointer in [Figure 4-2](#9781484204375_Ch04.xhtml#Fig2))\
    \ to see the differences in the editor.\n\n![9781484204375_Fig04-02.jpg](images/9781484204375_Fig04-02.jpg)\n\
    \n[Figure 4-2](#9781484204375_Ch04.xhtml#_Fig2). `AppIcon` set in `Images.xcassets`\n\
    \n2.  You can recreate the icons from the Android counterpart, `res/drawable-xxhdpi/ic_launcher.png`,\
    \ with the different image resolutions specified in the editor. Drag and drop\
    \ the appropriate image files on the guided squares. [Figure 4-3](#9781484204375_Ch04.xhtml#Fig3)\
    \ depicts the result.\n\n![9781484204375_Fig04-03.jpg](images/9781484204375_Fig04-03.jpg)\n\
    \n[Figure 4-3](#9781484204375_Ch04.xhtml#_Fig3). Recreating Android icons in iOS\
    \ with `Images.xcassets`\n\n3.  To add an image asset, click the **Add** `(+)`\
    \ button and select **New Image Set** as shown in [Figure 4-4](#9781484204375_Ch04.xhtml#Fig4):\n\
    \    1.  Use the **Attributes Inspector** to select the type of devices you want\
    \ to provide.\n    2.  You may choose to supply the image set by selecting the\
    \ **Universal** size class or device-specific types. Either way, 1x, 2x, and 3x\
    \ should cover all the iOS devices now.\n    3.  Select the image with 1x resolution\
    \ and drop it on the right spot (as shown by the pointer under **sample** in [Figure\
    \ 4-4](#9781484204375_Ch04.xhtml#Fig4)). Repeat the step for 2x and 3x images.\n\
    \    4.  Give the Image Set a name (e.g., `sample`). The name is the identifier\
    \ to access the image from your code or from storyboard.\n\n![9781484204375_Fig04-04.jpg](images/9781484204375_Fig04-04.jpg)\n\
    \n[Figure 4-4](#9781484204375_Ch04.xhtml#_Fig4). Adding an image set in `Images.xcassets`\n\
    \nYou have created two image assets. The first, `AppIcon`, is used for the launch\
    \ icon on the home screen by default. The other one, `sample`, can be used by\
    \ your code or any widgets in storyboard. You can use the `sample` icon in later\
    \ exercises.\n\n**Note** You can use your favorite image editor to create the\
    \ images, or download them from `www.pdachoice.com/bookassets`.\n\n### Externalize\
    \ Strings\n\nGenerally, you store string texts in external files. Both Android\
    \ and iOS actually read externalized strings in a similar manner. In Android,\
    \ the string files are stored in `res/values/strings.xml` in XML format. In iOS,\
    \ they are stored in `\"key\" = \"value\";` format in `.strings` files.\n\nTo\
    \ translate the externalized strings from your Android project to an iOS project,\
    \ do the following:\n\n1.  Create a new file anywhere in your Xcode project. For\
    \ example, to create a new file in `\"Supporting Files\"` folder first, and do\
    \ ![image](images/flower.jpg)+N (shortcut key for **New File**).\n    1.  In the\
    \ **Choose a template** screen, select **iOS** ![image](images/arrow.jpg) **Resource**\
    \ ![image](images/arrow.jpg) **Strings File.**\n    2.  Save as `Localizable.strings`.\
    \ This is the default file name used by the iOS API.\n2.  You may copy and comment\
    \ out the Android counterpart `strings.xml` file into your iOS `Localizable.strings`\
    \ to start with. [Listing 4-1](#9781484204375_Ch04.xhtml#list1) translates a simple\
    \ Android `string.xml` to iOS.\n\n[***Listing 4-1***](#9781484204375_Ch04.xhtml#_list1).\
    \ Translation from Android `strings.xml` to iOS `Localizable.strings`\n\n```\n\
    \    /*\n    ==== copied from HelloAndroid Android project ===\n    <resources>\n\
    \n<string name=\"app_name\">HelloAndroid</string>\n     <string name=\"action_settings\"\
    >Settings</string>\n     <string name=\"hello_world\">Hello world!</string>\n\
    \     <string name=\"hello_buttn\">Hello ...</string>\n     <string name=\"name_hint\"\
    >Enter a Name, i.e, You</string>\n\n</resources>\n    */"
