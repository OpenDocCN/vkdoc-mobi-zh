    \  }\n  ...\n  @IBOutlet weak var mProgressView: UIProgressView!\n  func updateProgress(value:\
    \ Float) {\n    self.mProgressView.progress = value\n  }\n  ...\n```\n\n![9781484204375_Fig04-21.jpg](images/9781484204375_Fig04-21.jpg)\n\
    \n[Figure 4-21](#9781484204375_Ch04.xhtml#_Fig21). `UIProgressView` update in\
    \ action\n\nBuild and run the `CommonWidgets` app to visualize iOS `UIProgressView`\
    \ in action (see [Figure 4-21](#9781484204375_Ch04.xhtml#Fig21)).\n\n# \\`UISwitch\\\
    `\n\n### ANDROID ANALOGY\n\n`android.widget.Switch`, `Checkbox`, or `ToggleButton`.\n\
    \nThe switch-like widgets are user friendly for presenting mutually exclusive\
    \ choices. In Android, you may use `CheckBox`, `ToggleButton`, or `Switch`. All\
    \ are capable for the intended purpose with different L&F.\n\nIn iOS, you use\
    \ `UISwitch` to allow a user to change values by toggling or dragging the thumb\
    \ between two states.\n\nTo learn `UISwitch` by example, do the following:\n\n\
    1.  Select `Main.storyboard` and drag a `UISwitch` from `Object Library`. Position\
    \ it to the right of `UIActivityIndicatorView` (see [Figure 4-22](#9781484204375_Ch04.xhtml#Fig22)).\n\
    \n    ![9781484204375_Fig04-22.jpg](images/9781484204375_Fig04-22.jpg)\n\n   \
    \ [Figure 4-22](#9781484204375_Ch04.xhtml#_Fig22). `UIActivityIndicatorView`\n\
    \n2.  Update its attribute in **Attributes Inspector** (see [Figure 4-22](#9781484204375_Ch04.xhtml#Fig22)):\n\
    \    1.  State: **On**\n    2.  You may change any other attributes safely.\n\n\
    3.  Open **Assistant Editor** and connect `IBOutlet` and `IBAction` in **Connections\
    \ Inspector** to your code. You will often implement `IBAction` for the `Value\
    \ Changed` event to capture the selections (see [Listing 4-11](#9781484204375_Ch04.xhtml#list11)).\n\
    \n[***Listing 4-11***](#9781484204375_Ch04.xhtml#_list11). `UISwitch` `IBOutlet`\n\
    \n``` class ViewController: ...{\n  ...\n  @IBOutlet var mSwitch: UISwitch!\n\
    \  @IBAction func doSwitchValueChanged(sender: AnyObject) {\n    var isOn = self.mSwitch.on\n\
    \    self.toggleActivityIndicator()\n  }\n  ...\n```\n\nBuild and run the app\
    \ and toggle the `UISwitch` to see the activity indicator’s animation changes\
    \ (see [Figure 4-23](#9781484204375_Ch04.xhtml#Fig23)).\n\n![9781484204375_Fig04-23.jpg](images/9781484204375_Fig04-23.jpg)\n\
    \n[Figure 4-23](#9781484204375_Ch04.xhtml#_Fig23). iOS `UISwitch` look and feel\n\
    \n# \\`UIImageView\\`\n\n### ANDROID ANALOGY\n\n`android.widget.ImageView`.\n\n\
    In iOS, `UIImageView` displays one image or a series of images for simple graphic\
    \ animations. For a simple usage like the `CommonWidgets` app, all you need to\
    \ do is specify the image source and the attributes in storyboard for how you\
    \ want to render the image.\n\nTo learn iOS `UIImageView` by example, do the following:\n\
    \n1.  `UIImageView` can now render vector-based images! This is a new feature\
    \ in Xcode 6. I only know that the first page of a PDF is rendered nicely. You\
    \ can definitely use a bitmap image for this exercise, or create a new image set\
    \ for a PDF file, as shown by the pointers in [Figure 4-24](#9781484204375_Ch04.xhtml#Fig24):\n\
    \    1.  Select **Images.xcassets** to add a `New Image Set`. Name it `pdf`.\n\
    \    2.  Set the Type to **Vectors** in the **Attributes Inspector**.\n    3.\
    \  Drag a PDF file to the universal slot as shown in [Figure 4-24](#9781484204375_Ch04.xhtml#Fig24).\
    \ There is no need to provide 2x or 3x images.\n\n    ![9781484204375_Fig04-24.](images/9781484204375_Fig04-24.)"
