  trans: "\n### 3. 图 1-5 展示了需要填写的基本项目信息，具体如下：\n   1. *产品名称*：这是应用名称。请将项目命名为 `LessonOne`。\n\
    \   2. *组织名称*：可选；例如：**您的组织**或您选择的任意名称。\n   3. *组织标识符*：与产品名称一起，*组织标识符*应能唯一标识您的应用。建议使用反向域名（例如\
    \ `com.yourdomain.xxx`）。\n   4. *语言*、*游戏技术*和*设备*：无需更改这些设置。\n   5. 完成后点击**下一步**按钮。\n\
    \   6. 选择一个用于保存 `LessonOne` 项目的文件夹。\n\n![9781484204375_Fig01-05.jpg](img/9781484204375_Fig01-05.jpg)\n\
    \n图 1-5. iOS 项目选项\n\n就是这样！您刚刚创建了一个 iOS 项目——`LessonOne` 项目，如图 1-6 所示。\n\n![9781484204375_Fig01-06.jpg](img/9781484204375_Fig01-06.jpg)\n\
    \n图 1-6. Xcode 项目导航器中的 `LessonOne` 项目\n\n`LessonOne` 项目可在左侧面板中看到，如图 1-6 所示；这就是导航区域中的**项目导航器**。就像您使用\
    \ ADT 项目创建模板一样，Xcode 项目模板会创建项目文件夹、应用程序源代码以及构建 `LessonOne` 应用所需的所有资源。\n\n## 构建项目\n\
    \n**安卓类比**\n\n在 Mac 上，Eclipse ADT 构建操作的键盘快捷键与 Xcode 中的构建命令相同：`Command+B`（`z+B`）。在\
    \ Windows 中，Eclipse 的构建快捷键是 `Control+B`。\n\n要构建和编译 Xcode 项目，请使用构建操作，该操作位于 Xcode\
    \ 菜单栏 **![image](img/arrow.jpg) 产品 ![image](img/arrow.jpg) 构建**（或 `z+B`）。您会习惯频繁使用\
    \ `z+B` 键盘快捷键，因为 Xcode 不会像 Eclipse ADT 默认自动构建代码那样自动构建您的代码。\n\n## 启动应用\n\n`LessonOne`\
    \ 项目应该没有错误。您可以启动该应用，并在 iOS 模拟器上查看其运行情况。模拟器是任何 IDE 中非常重要的部分。与 ADT 不同，无需像 AVD 管理器那样创建模拟器。所有模拟器都直接位于\
    \ Xcode 中，您可以将 `LessonOne` 项目启动到选定的设备（包括 iOS 模拟器）上，只需点击左上角的三角形按钮，如图 1-6 所示。\n\n\
    或者，您可以使用 Xcode 的运行操作键盘快捷键 `Command+R`（`z+R`）来启动应用。您应该能看到 `LessonOne` 应用在 iPhone\
    \ 模拟器上运行，如图 1-7 所示。\n\n![9781484204375_Fig01-07.jpg](img/9781484204375_Fig01-07.jpg)\n\
    \n图 1-7. 模拟器中的 `LessonOne` 应用\n\n尝试使用该应用，然后从设备模拟器选择器中选择其他模拟器（请参见图 1-6 中的指针）。在模拟器上的鼠标单击事件相当于触摸事件，而在触控板上的三指移动相当于在实际\
    \ iOS 屏幕上的触摸拖拽。如果你目前还没有特定设备，请务必尝试使用模拟器，以熟悉模拟的 iOS 设备。\n\n**提示** 要切换为横屏或竖屏方向，请按\
    \ `z+左箭头` 或 `右箭头` 来旋转模拟器。\n\niOS 模拟器比 AVD 好得多——非常稳定且响应迅速，它们的行为就像真实设备一样。对于学习 iOS\
    \ 的 Swift 编程来说，模拟器实际上更好，因为 iOS 开发者比 Android 开发者更频繁地使用模拟器。在本书中，您不需要在实际的 iOS 设备上运行应用；要做到这一点，您需要成为注册的\
    \ iOS 开发者并拥有一台 iOS 设备。您可以省下 99 美元的 iOS 开发者会员费，直到您准备向 App Store 提交第一个应用，或者您的应用需要模拟器不具备的某些功能（例如相机或某些传感器）时再考虑。目前，如果您的应用已启动并在\
    \ iOS 模拟器上运行，您的任务就完成了！\n\n## 总结\n\n通过安装 Xcode 6，您立即拥有一个功能完备的 IDE，可以轻松创建 iOS 应用。本章引导您完成了\
    \ Xcode 6 中的基本项目创建任务，使用 iOS 项目模板启动了您的第一个 iOS 项目。本章还向您展示了如何在 iOS 模拟器中构建和运行 iOS\
    \ 应用。您尚未编写任何代码，但您的工具已正常工作且经过验证。您将在后续章节的引导练习中学习更多内容并获得动手编程经验。\n\n# 第 2 章\n\n##\
    \ iOS 编程基础\n\n为 iOS 和安卓创建移动应用既有趣又有回报。有了 Xcode，您现在可以编写代码、构建并运行 iOS 应用了。在 Swift\
    \ 于 2014 年苹果全球开发者大会上正式发布之前，Objective-C 一直是 iOS 应用的主要编程语言。如果您刚开始学习 iOS 编程，应该选择\
    \ Swift，因为没有理由选择旧方式而错过最新、最强大的功能。您的下一步应该是学习以下基础知识：\n\n* Swift 编程语言\n* iOS 项目结构和\
    \ Xcode 故事板编辑器\n\n本章的目的是让您熟悉本书中的 Swift 代码。为了实现这一目标，您将创建一个 `HelloSwift` 项目，同时学习\
    \ **Swift 编程语言**的重点内容。\n\n在本章的第二部分，您将创建另一个 Xcode iOS 项目。所有 iOS 应用都有一个用户界面（UI）。您通常首先使用最重要的\
    \ Xcode 工具——**故事板编辑器**创建 UI，该工具用于绘制 UI 控件和组件，并将它们连接到您的代码。在创建此 iOS 应用的过程中，您还将看到典型的\
    \ iOS 项目结构和组件。一开始您可能不需要了解 iOS 框架的所有内容，但第一堂故事板课程应“刚好足够”让您感受到不同的编程范式。之后，第 3 章 和\
    \ 第 4 章 中的内容将继续提供常见编程任务和框架主题的逐步指导。按照这些对应说明操作，当您对整个应用有了更全面的了解时，这些概念将更容易被记住。\n\n\
    ## Swift 语言概要\n\nSwift 是用于创建 iOS 应用的最新编程语言，它在语言语法方面与 Java 有许多相似的规则和方面。我非常有信心，学习\
    \ Swift 语言不会成为您最大的障碍；Java 或 C# 开发者可以自然地掌握 Swift 代码。为了让您快速预览，表 2-1 展示了 Java 到 Swift\
    \ 的快速对比：\n\n表 2-1. Java 到 Swift 语言语法简要对比\n\n![image](img/Table2-1.jpg)\n"
- fmt: "Swift also defines **file** and the **module** access control: `private`,\
    \ `public`, and `internal`. Although they have different meanings from their Java\
    \ counterparts, if you define each class in its own file, the `private`/`public`\
    \ access controls can be used the same way. The default `internal` access control\
    \ is also public to any file in the same project, but is not visible when being\
    \ imported to other projects. The Swift `internal` control is more useful for\
    \ creating framework projects as opposed to app modules.\n\n## HelloSwift with\
    \ Xcode\n\nInstead of my describing the uses and syntax rules in a formal way,\
    \ you are going to create a `HelloSwift` Xcode project and write the code listing\
    \ from [Table 2-1](#9781484204375_Ch02.xhtml#Tab1) yourself. You will also perform\
    \ the following common Xcode programming tasks: create a class, build and run\
    \ a project, and use the debugger.\n\n### Create a Swift Command-Line Project\n\
    \nLet’s create a command-line Swift program, because it is really simple and you\
    \ can focus on the Swift language subjects without being sidetracked by other\
    \ questions.\n\nFollow these instructions to proceed:\n\n1.  Launch Xcode 6 if\
    \ it is not running. You should see the **Welcome to Xcode** launch screen as\
    \ shown in [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3). Select **Create a new\
    \ Xcode Project** (see [Figure 1-3](#9781484204375_Ch01.xhtml#Fig3)). Alternatively,\
    \ you may do the same by selecting **File → Project...** from the Xcode menu bar.\n\
    2.  Choose **OS X → Application → Command Line Tool** as shown in the **Choose\
    \ a template for your new project** screen (see [Figure 2-1](#9781484204375_Ch02.xhtml#Fig1)).\n\
    \n![9781484204375_Fig02-01.jpg](images/9781484204375_Fig02-01.jpg)\n\n[Figure\
    \ 2-1](#9781484204375_Ch02.xhtml#_Fig1). Choosing an Xcode template\n\n3.  Follow\
    \ the same on-screen instruction that you used to create the `LessonOne` project\
    \ (see [Chapter 1](#9781484204375_Ch01.xhtml), “Create an iOS Project Using the\
    \ Template”) to finish creating the new project with the template:\n    - **Product\
    \ Name**: `HelloSwift`\n    - **Organization Name**: for example, `PdaChoice`\n\
    \    - **Organization Identifier**: for example, `com.liaollc`\n    - **Language**:\
    \ `Swift`\n    - Click the **Next** button when done.\n    - Select a folder in\
    \ which to save your `HelloSwift` project.\n\nThe `HelloSwift` project appears\
    \ in the **Project Navigator** area (see [Figure 2-2](#9781484204375_Ch02.xhtml#Fig2)).\n\
    \n![9781484204375_Fig02-02.jpg](images/9781484204375_Fig02-02.jpg)\n\n[Figure\
    \ 2-2](#9781484204375_Ch02.xhtml#_Fig2). Creating the `HelloSwift` project\n\n\
    The command-line template creates the `main.swift` file for you. This is the entry\
    \ point of the program, just like the `main(...)` in Java. You will be writing\
    \ code in `main.swift` to demonstrate common object-oriented code.\n\n[Figure\
    \ 2-2](#9781484204375_Ch02.xhtml#Fig2) shows that the typical Xcode workspace\
    \ contains three areas from left to right and a top toolbar. Inside each area,\
    \ there are subviews that you may switch to using the selector bars.\n\n- The\
    \ **Project Navigator** area is on the left. Similar to Eclipse Project Explorer,\
    \ this is where you can see the whole project structure and select the file that\
    \ you want to edit. There are other views in this area; for example, you can enable\
    \ Search view by selecting the Search icon in the selector bar.\n    - The **Source\
    \ Editor** area in the middle shows the selected file in its editor, in which\
    \ you can edit the file, writing your code or modifying project settings depending\
    \ on the file selected. The **Console** and **Variable** views are inside the\
    \ **Debug** area. Most likely you will want to show them during debugging sessions.\
    \ You can hide or show them by clicking the toggle buttons on the top and bottom\
    \ toolbars.\n    - The **Utility** area on the right contains several **Inspector**\
    \ views that allow you to edit attributes of the whole file or the item selected\
    \ in the **Source Editor**. Depending on the type of files you select, different\
    \ types of Inspectors will be available in the top selector bar. For example,\
    \ you will have more Inspectors showing in the selector bar if you are editing\
    \ a screen or UI widgets. The bottom of the area is called **Libraries**. Use\
    \ the selector bar to select one of the Library views. You can drag and drop items\
    \ from **Libraries** to the appropriate editor to visually modify file content.\
    \ You will use the **Object Library** a lot to compose UIs visually.\n\nClick\
    \ on any of the icons on the selector bars, or hover your mouse over the pointer\
    \ in [Figure 2-2](#9781484204375_Ch02.xhtml#Fig2), to see the hover text tips\
    \ in the workspace, to get yourself familiar with Xcode workspace. The subviews\
    \ appear more condensed than those in Eclipse, but essentially Xcode is a tool\
    \ for the same purpose: editing project files and compiling, building, debugging,\
    \ and running the executables. You will use it repeatedly throughout the book.\n\
    \n### Create a Swift Class\n\nTo create a new Swift class, you can create it in\
    \ the existing `main.swift` file, or follow the Java convention to create it in\
    \ its own file as shown in the following steps:\n\n4.  Expand the newly created\
    \ `HelloSwift` project, right-click the `HelloSwift` folder to bring up the folder\
    \ context menu (see [Figure 2-3](#9781484204375_Ch02.xhtml#Fig3)), and select\
    \ **New File...**\n    1.  Choose **iOS → Source** from the left panel and select\
    \ **Swift File** from the right panel in the **Choose a template for your new\
    \ file** screen.\n    2.  Save the file and name it `MobileDeveloper.swift`. The\
    \ file should appear in your project.\n\n![9781484204375_Fig02-03.jpg](images/9781484204375_Fig02-03.jpg)\n\
    \n[Figure 2-3](#9781484204375_Ch02.xhtml#_Fig3). Create a Swift class from the\
    \ folder context menu\n\n5.  Enter the code in [Listing 2-1](#9781484204375_Ch02.xhtml#list1)\
    \ in the `MobileDeveloper.swift` file to create the `MobileDeveloper` Swift class.\n\
    \n[***Listing 2-1***](#9781484204375_Ch02.xhtml#_list1). Declare `MobileDeveloper`\
    \ Class\n\n```\nclass MobileDeveloper {\n\n}\n```\n\n**Note**  Unlike Java, a\
    \ Swift class doesn’t implicitly inherit from any class. It can be the base class\
    \ on its own.\n\n6.  Create a property called `name` by declaring a variable inside\
    \ the class (see [Listing 2-2](#9781484204375_Ch02.xhtml#list2)). This is called\
    \ a **stored property** in Swift, where the variable type is inferred by the assigned\
    \ value (known as **type inference** in Swift).\n\n[***Listing 2-2***](#9781484204375_Ch02.xhtml#_list2).\
    \ Stored Property in Swift\n\n```\nclass MobileDeveloper {\n    var name = \"\"\
    \ // var type is String inferred by the value\n}\n```\n\n**Note**  Semicolon (`;`)\
    \ is optional for terminating a statement.\n\n### Create a Swift Protocol\n\n\
    **JAVA ANALOGY**\n\nThe Java interface defines object obligations.\n\nIn object-oriented\
    \ programming (OOP), it is important to define a set of behaviors that are expected\
    \ of certain objects. In Java, you declare an **interface**; in Swift, you declare\
    \ a **protocol**.\n\nCreate a Swift protocol called `Programmer` by doing the\
    \ following:"
