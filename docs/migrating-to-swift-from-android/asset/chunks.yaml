    \ 2-6](#9781484204375_Ch02.xhtml#Fig6) depicts the Playground: you write code\
    \ in the left panel and the right panel renders the result immediately.\n\n![9781484204375_Fig02-06.jpg](images/9781484204375_Fig02-06.jpg)\n\
    \n[Figure 2-6](#9781484204375_Ch02.xhtml#_Fig6). Xcode Playground\n\nJAVA ANALOGY\n\
    \nJava scratchpad.\n\nVariables and Constants\n\nYou declare a variable using\
    \ the `var` keyword, and you use `let` to declare constants. While Java variables\
    \ are always defined within the enclosing brackets, Swift variables are global\
    \ if defined not within enclosing brackets. The following code snippet (see [Listing\
    \ 2-7](#9781484204375_Ch02.xhtml#list7)) depicts usage of Swift variables:\n\n\
    [***Listing 2-7***](#9781484204375_Ch02.xhtml#_list7). Common variables usages\n\
    \n```\nvar GlobalVar : String = \"Global Variable\"; // global scope\n\nclass\
    \ MyClass {\n  var mProperty : String = \"\"; // class scope\n  let mConstant\
    \ : Int = 0; // constant\n\nfunc myMethod(arg : String) {\n    var aVar : String\
    \ = \"\"; // local variable in method scope\n    let aConstant = 1;\n  }\n}\n\
    ```\n\nType Safety and Type Inference\n\nBoth Java and Swift are type-safe languages.\
