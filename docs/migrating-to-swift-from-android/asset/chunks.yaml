    About the Author


    ![9781484204375_unFM-01.jpg](images/9781484204375_unFM-01.jpg)


    **Sean Liao** (PMP®) started his first mobile app on a PalmOS PDA app in 2000\.
    He hasn’t missed any major mobile evolutions. He has written mobile code for PalmOS,
    JavaME, Microsoft .NET CF, and BlackBerry, and he also has some Nokia Symbian
    experience. He has been a seasoned Java solution architect since 1998.


    In 2009, Sean started programming in iOS, and then began programming in Android
    the same year by following the same porting strategy, based on years of hands-on
    mobile programming experience. Currently, Sean is primarily engaged in creating
    iOS apps and porting them to Android as a bonus.


    About the Technical Reviewer


    ![9781484204375_unFM-02.jpg](images/9781484204375_unFM-02.jpg)


    **Alex Decker** is a mobile application developer specializing in enterprise applications.
    He graduated from the University of Illinois and currently lives with his wife
    in California.


    Acknowledgments


    Looking back on the journey of this book-writing experience, I realize clearly
    now that I never would have started it without the encouragement from my lovely
    wife, Lily, and I never would have completed it without her support. My two little
    princesses, Megan and Melanie, also really motivated me. As I was writing the
    book they would come by repeatedly to ask me silly questions, like, “Can I help
    you, Daddy? Daddy, will the book be this thick? Daddy, can your book be my bedtime
    story? Will you play with me more after you finish it?”


    I knew I would never give up.


    Special thanks to my publisher, who had faith in this topic, and the editors,
    who never stopped making the book better. Their professional services and guidance
    are unparalleled. I am really grateful to have had the Apress publishing and editorial
    teams with me at all times.


    Introduction


    In 2000, I started my first PalmOS mobile app for an inventory-tracking project.
    The initial project was a full-staffed team effort that consisted of mobile developers,
    SAP consultants, supply-chain subject matter experts, middleware developers, QA
    testers, architects, business sponsors, and so forth. JavaME came up strong in
    2002, followed by Pocket PC/Windows Mobile. I did several mobile projects in which
    I converted mobile apps to the Pocket PC platform by blindly translating JavaME
    code to C# .NETCF mobile code. These “translation” efforts prolonged the whole
    product life cycle. The project achieved higher ROI as the product life extended,
    because the extra cost of translating mobile code was surprisingly low. Ever since
    then, I have been translating front-end mobile apps among JavaME, BlackBerry,
    and Windows Mobile platforms.'
