    \ Editor**，在 **Connections Inspector** 中将 `IBOutlet` 连接到你的代码中的 `mVideoView` 属性。\n\
    \n3. 为 `MPMoviePlayerController` 实例创建一个存储属性，以允许用户浏览、播放或停止播放。\n4. 在 `viewDidLoad(...)`\
