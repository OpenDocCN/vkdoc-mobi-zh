    More About the Swift Language\n\nA lot of Java syntax and conventional coding\
    \ approaches would work just fine in Swift. However, Swift does have some pretty\
    \ neat features of its own, so it’s worth taking a quick look at them now.\n\n\
    To go through this section, it is best to use the new Xcode feature called **Playgrounds**.\
    \ Launch Xcode and select **Get Started with a playground**. You can write any\
