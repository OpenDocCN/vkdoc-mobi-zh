    to the `View`, and update its attributes in the **Attributes Inspector** as shown
    in [Figure 5-2](#9781484204375_Ch05.xhtml#Fig2).                  ![9781484204375_Fig05-02.jpg](images/9781484204375_Fig05-02.jpg)                                    [Figure
    5-2](#9781484204375_Ch05.xhtml#_Fig2). `EditTextView` storyboard scene                       2.  Center
