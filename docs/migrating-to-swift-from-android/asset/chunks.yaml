    \ and process actually are the same as in Android.  \n\n## Common UI Widgets \
    \ \n\nUI widgets are the interactive software-control components in the application’s\
    \ UI, such as buttons, text fields, and so forth. You create screens to contain\
    \ the appropriate UI widgets to interact with users, to collect information from\
    \ users, and/or to display information to users.  \n\nThe iOS `UIKit` framework\
    \ provides rich system UI widgets that you “draw” in storyboard. You also “connect”\
    \ them to the Swift class as `IBOutlet` properties so that your code can directly\
    \ use the view object, update its attributes, or invoke the widget methods to\
    \ provide dynamic application behaviors.  \n\nThe rest of this section introduces\
    \ the common iOS UI widgets and compares them with their Android counterparts.\
    \ Continuing with the `CommonWidgets` created previously, do the following:  \n\
    \n1.  The storyboard already has a storyboard scene that pairs with the `ViewController`\
    \ class. This scene won’t be tall enough for all the widgets you’re going to add.\
