    5-10](#9781484204375_Ch05.xhtml#_Fig10). Xcode project `AppIcon`    If the Android
    app contains resources for I18N, you want to port them to the iOS app as well.    Java
    Class to Swift Class    Now, you have all the matching classes in your Xcode iOS
    project. Your next step is to break each class into more pieces, porting Android
    methods to iOS methods. Again, I use a top-down approach in each class: port the
    member signatures first, and try to defer the internal implementations as late
    as possible. For your convenience, you may use [Table 5-1](#9781484204375_Ch05.xhtml#Tab1)
    as a step-by-step guide. You will find that the information in the table is common
    sense after one or more exercises, but I think it makes translation efforts more
    systematic.    [Table 5-1](#9781484204375_Ch05.xhtml#_Tab1). Class Porting Steps     |
    Step | Instructions | | --- | --- | | 1. | For each class, copy the contents of
    the Java counterpart to Swift. | | 2. | Translate Java fields to Swift Stored
    Properties. For Java static constants, translate them to Swift inner `struct static`
    variables. | | 3. | Translate the method declarations to Swift. Preserve signatures
    as much as possible except those that are life cycle methods.a. Keep the Java
    impl as Swift comments. They are perfect and tested logics.b. Translate Android
    life cycle methods signature to iOS counterparts including constructors.c. Preserve
    utility methods signatures. |    Steps 1 and 2 are straightforward. Step 3 is
    the key to break the class into smaller pieces: methods. After you run down all
    the classes with [Table 5-1](#9781484204375_Ch05.xhtml#Tab1), all the classes
    should have callable method skeletons.


    You can start to translate the commented Java code to Swift in each method one
    by one (see “Java Methods to Swift Methods” later in this chapter).    For your
