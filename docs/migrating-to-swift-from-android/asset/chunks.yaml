    \n[Figure 3-59](#9781484204375_Ch03.xhtml#_Fig59). iOS `UIAlertController`\n\n\
    ## UIPopoverController\n\n**ANDROID ANALOGY**\n\n`DialogFragment`.\n\nOn iOS devices\
    \ with large screens such as the iPad, you can use `PopoverController` to present\
    \ a regular `viewController` as a popover. The popover can be anchored at a given\
    \ position to associate the presented dialog with the presenting context. On devices\
    \ with compact size classes such as the iPhone, the popover controller automatically\
    \ falls back to the regular full-screen view controller. You can also take advantage\
    \ of the storyboard editor to draw the content views and segue instead of writing\
    \ code.\n\nThe following steps demonstrate the `PopoverController` in the `Dialogs`\
    \ project:\n\n1.  Add a new storyboard scene for the popover.\n    1.  Create\
    \ a `GreenViewController` class as shown in [Listing 3-23](#9781484204375_Ch03.xhtml#list23)\
    \ and draw a view controller scene in storyboard to pair with it by specifying\
    \ the class name in **Identity Inspector**.\n\n[***Listing 3-23***](#9781484204375_Ch03.xhtml#_list23).\
    \ `GreenViewController` Class\n\n```swift\n        class GreenViewController :\
    \ UIViewController {\n          @IBAction func doDone(sender: AnyObject) {\n \
    \           // do something and dismiss\n            self.dismissViewControllerAnimated(true,\
    \ completion:nil)\n          }\n        }\n```\n\n2.  Embed the view controller\
    \ in a Navigation Controller (**Editor ![image](images/arrow.jpg) Embed in** from\
    \ the Xcode menu bar) to take advantage of the navigation bar title, or any Navigation\
    \ Controller features.\n    3.  In the Navigation Controller **Attributes Inspector**,\
    \ change the **Simulated Metrics Size** to **Freeform**, and then change the **Simulated\
    \ Size** to **250 × 300** in the **Size Inspector**.\n    4.  In the Navigation\
    \ Controller **Identity Inspector**, specify the Storyboard ID, i.e., `nav`. You\
    \ always need the ID if you want to instantiate a view controller instance directly\
    \ from a storyboard (see [Listing 3-24](#9781484204375_Ch03.xhtml#list24)).\n\
    \    5.  You normally draw meaningful contents in content view. For simplicity,\
    \ use the **Attributes Inspector** to change the `GreenViewController` view’s\
    \ **Background** attribute to be **Green**.\n    6.  Draw a `BarButtonItem` on\
    \ the right side of navigation bar in the `GreenViewController`, and connect the\
    \ **Send Actions** outlet to the `IBAction` method in `GreenViewController` as\
    \ shown in [Listing 3-23](#9781484204375_Ch03.xhtml#list23). [Figure 3-60](#9781484204375_Ch03.xhtml#Fig60)\
    \ depicts the completed storyboard.\n\n![9781484204375_Fig03-60.jpg](images/9781484204375_Fig03-60.jpg)\n\
    \n[Figure 3-60](#9781484204375_Ch03.xhtml#_Fig60). Dialogs storyboard completion\n\
    \n2.  To present the `GreenViewController`, draw a Manual Segue from the presenting\
    \ `ViewController` to the parent Navigation Controller of `GreenViewController`.\
    \ Specify the segue attributes value as shown in **Attributes Inspector** in [Figure\
    \ 3-61](#9781484204375_Ch03.xhtml#Fig61).\n\n![9781484204375_Fig03-61.jpg](images/9781484204375_Fig03-61.jpg)\n\
    \n[Figure 3-61](#9781484204375_Ch03.xhtml#_Fig61). Storyboard segue attributes\
    \ in the Attributes Inspector\n\n1.  Identifier: `mypopover`.\n    2.  Segue type:\
    \ `Present As Popover`.\n    3.  Direction: `Up` (you may play with other values).\n\
    \    4.  Anchor outlet: Drag the outlet to the `Popup` button in the presenting\
    \ view controller.\n3.  To perform the `mypopover` Manual Segue, update the `ViewController.doPopup(...)\
    \ IBAction` method as shown in [Listing 3-24](#9781484204375_Ch03.xhtml#list24).\
    \ Note that the commented code programmatically presents a `UIPopoverController`\
    \ without using the storyboard segue.\n\n[***Listing 3-24***](#9781484204375_Ch03.xhtml#_list24).\
    \ Perform the `mypopover` Manual Segue\n\n```swift\n    // In ViewController class\n\
    \    @IBAction func doPopup(sender: AnyObject) {\n      self.performSegueWithIdentifier(\"\
    mypopover\", sender: nil)\n\n// var nav = self.storyboard.instantiateViewControllerWithIdentifier(\"\
    nav\") as UIViewController\n    // var popover = UIPopoverController(contentViewController:\
    \ nav)\n    // popover.delegate = self;\n    // popover.popoverContentSize = nav.view.bounds.size\n\
    \    // popover.presentPopoverFromRect(self.mPopupButton.frame, inView: self.view,\
    \ permittedArrowDirections: UIPopoverArrowDirection.Up, animated: true)\n    }\n\
    ```\n\n4.  You may dismiss the popover by tapping anywhere inside the presenting\
    \ view controller but outside the `GreenViewController` content view. To dismiss\
    \ the popover programmatically, implement `GreenViewController.doDone(...)` to\
    \ call the `dismissViewControllerAnimated(...)` as shown in [Listing 3-23](#9781484204375_Ch03.xhtml#list23).\n\
    \nYou can build and run the Xcode `Dialogs` project to see the `UIPopoverController`\
    \ code live in action. The `UIPopoverController` is rendered as a popup dialog\
    \ on an iPad, while the same code renders a full-screen modal screen in compact-sized\
    \ classes such as the iPhone, as shown in [Figure 3-62](#9781484204375_Ch03.xhtml#Fig62).\n\
    \n![9781484204375_Fig03-62.jpg](images/9781484204375_Fig03-62.jpg)\n\n[Figure\
    \ 3-62](#9781484204375_Ch03.xhtml#_Fig62). The results of the `UIPopoverController`\
    \ code on the iPad vs. the iPhone\n\n## Toasts\n\nFor giving users quick feedback,\
    \ which dismisses automatically, you normally use Toast in Android apps. There\
    \ is no Android-like Toast widget in iOS. I really like it, but it probably would\
    \ look Android-ish on iOS. You can always create a small view area with fade-in\
    \ and fade-out effects programmatically with a timer.\n\n## Summary\n\nTo port\
    \ Android to an iOS app, first create storyboard scenes using the counterpart\
    \ Android app as the wireframe to break your app naturally into a structured MVC\
    \ project in a top-down fashion. The result is a set of content view–view controller\
    \ pairs that map to the Android counterpart layout-fragment pairs.\n\nNext, to\
    \ implement the screen navigation patterns, you draw storyboard segues to connect\
    \ storyboard scenes. You also choose the appropriate container view controller\
    \ (i.e., `UINavigationController`) from SDK to facilitate the screen transitions.\
    \ The remaining content view and view controller mappings between iOS and Android\
    \ are trivial. You will dive into the details of each screen in [Chapter 4](#9781484204375_Ch04.xhtml).\n\
    \n# Chapter 4\n\n## Implement Piece by Piece\n\nIn the previous chapter, you started\
    \ with iOS storyboard to lay down the groundwork using navigation patterns. It\
    \ resulted in a set of connected `UIViewController` classes set in an MVC framework\
    \ that mapped to Android counterpart fragments.\n\nIn this chapter, you are going\
    \ to implement each view-controller pair, one piece at a time, with a detailed\
    \ user interface and business logic that should already be present in the counterpart\
    \ Android `Fragment` and the layout file. You will also focus on the following\
    \ common programming-task mappings from iOS to Android:\n\n*   User interface\
    \ and common UI widgets\n*   Persistent storage options\n*   Network and remote\
    \ services with JSON\n\n## User Interface"
