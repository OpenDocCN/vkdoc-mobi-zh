    \ 3 是关键，用于将类分解为更小的单元：方法。当你按照表 5-1 完成所有类的处理后，所有类都应包含可调用的方法骨架。\n\n接下来，你可以逐一将注释掉的\
    \ Java 代码翻译为 Swift（参见本章后续的“Java 方法到 Swift 方法”）。\n\n为了方便起见，表 5-2 总结了你在此步骤中一定会遇到的成员声明映射关系。\n\
    \n表 5-2. Java 和 Swift 中的成员声明\n\n| 语言 | Java | Swift |\n| --- | --- | --- |\n|\
    \ **变量** | `String aName` | `var aName: String` |\n| **类变量** | `static ...` |\
    \ 内部 struct 中的 static var |\n| **方法声明** | `String aMethod(int a)` | `func aMethod(a:\
    \ Int) -> String` |\n| **类方法** | `static ...` | `class func ...` |\n| **构造函数**\
    \ | `ClassName(...)` | `init(...)` |\n| **Android Context** | `Activity, Context`\
    \ | 删除它们。 |\n\n## 模型类：RentalProperty\n\n大量翻译工作涉及将常规的 Java 到 Swift 语言编程规则（参见表 2-1）进行转换。你的直接目标是将对应的\
    \ Java 类 `RentalProperty` 的成员移植到 Swift，且不重命名它们。对于方法，通过注释掉所有实现代码，专注于签名。按照表 5-1\
    \ 中的类移植步骤，将 `RentalProperty.java` 移植到 Swift：\n\n1. 首先，将整个 `RentalProperty.java`\
    \ 类复制到 `RentalProperty.swift` 文件中。你会得到大量错误。这些编译错误就是免费的指导。\n2. 接下来，定义类。一般经验法则：保留所有签名，包括类名。调用者和被调用者将在后续步骤中无缝连接。删除或注释掉纯\
    \ Java 的内容，例如 `implements Serializable`（见代码清单 5-7）。\n\n***代码清单 5-7***. `RentalProperty.swift`\
