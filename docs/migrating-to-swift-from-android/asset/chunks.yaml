    \n图 3-56。iOS `SwipeViews` 应用\n\n## 对话框\n\n通常，使用对话框 UX 模式是为了给移动用户提供快速反馈，或请求用户对选择进行简单确认。对话框通常显示在当前屏幕之上，同时当前屏幕保持部分可见或变暗。这种视觉效果旨在在不丢失当前上下文的情况下，吸引更多用户注意力。\n\
    \n创建一个 Xcode 项目来演示对话框的用法和常见编程任务：\n\n1. 启动 Xcode，使用 **Single View Application**\
    \ 模板创建一个新项目，将其命名为 `Dialogs`。\n2. 在故事板场景中绘制两个 `Button` 控件，标题分别设置为 `Alert` 和 `Popup`，如图\
    \ 图 3-57 所示。\n\n![9781484204375_Fig03-57.jpg](img/9781484204375_Fig03-57.jpg)\n\
    \n图 3-57。`Dialogs` 故事板\n\n3. 打开故事板的 **Assistant Editor**，并在 **Connections Inspector**\
    \ 中连接 **Send Event ![image](img/arrow.jpg) Touch Down** 出口，为两个按钮在配对的 `ViewController`\
    \ 类中创建 `IBAction` 方法（参见列表 3-21 中的 `doAlert(...)` 和 `doPopup(...)`）。\n\n***列表 3-21***。为\
    \ Alert 和 Popup 按钮创建 `IBAction` 方法\n\n```\nimport UIKit\nclass ViewController:\
    \ UIViewController, UIAlertViewDelegate {\n  ...\n  @IBAction func doAlert(sender:\
    \ AnyObject) {\n    // TODO\n  }\n  @IBAction func doPopup(sender: AnyObject)\
    \ {\n    // TODO\n  }\n}\n```\n\n这些内容对你来说应该并不陌生，但这个 `Dialogs` Xcode 项目可以让你重温对话框相关主题。\n\
