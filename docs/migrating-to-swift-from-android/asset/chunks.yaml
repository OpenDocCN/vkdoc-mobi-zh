  trans: "\n# 将 Android 应用移植到 iOS\n\n同样，为了通过实例进行展示和学习，您的目标是将 Android 应用 `RentalROI`\
    \ 移植到 iOS。图 5-1 展示了您要移植的 Android 应用。\n\n![9781484204375_Fig05-01.jpg](img/9781484204375_Fig05-01.jpg)\n\
    \n图 5-1. Android `RentalROI` 界面\n\n此 Android 应用执行以下任务：\n\n- 用户每次输入新的租赁房产参数时，用户输入都会使用\
    \ `SharedPreferences` 进行保存。\n- 摊销计划在远程服务器上计算。Android 客户端只需调用远程服务来获取摊销计划，并将数据存储在本地。\n\
    - 如果存在已保存的摊销计划，应用将直接使用它，而无需再调用远程服务。\n\n您需要将此 Android 应用移植到 iOS，并保留已有的设计决策。\n\n\
    > **注意** 这仅用于练习目的。更好的做法是在本地计算摊销计划，而无需使用远程服务——这样您就不需要持久化结果了。\n\n您可以从 `http://pdachoice.com/bookassets/RentalROI-adt.zip`\
    \ 下载 ADT 项目。\n\n首先，您将使用 `Single View Application` 模板创建一个新的 Xcode 项目，并为其指定与 Android\
    \ 应用相同的名称：`RentalROI`。您将遵循与您在第 3 章（“构建应用结构”）和第 4 章（“逐一实现”）中使用的相同的移植方法。\n\n## 构建应用结构\n\
    \n您的第一步是按照第 3 章中的指导创建 Xcode 故事板：\n\n- 为每个内容视图绘制故事板场景，并将 UI 控件连接至与故事板场景配对的 `UIViewController`\
    \ 自定义类。\n- 选择导航模式，并使用 Segue 将故事板场景连接在一起。\n\n这将生成一个可运行的 iOS 应用，其中包含所有内容视图以及使用适当屏幕导航模式连接起来的视图控制器类骨架。\n\
    \n### 绘制故事板场景\n\n您可以在图 5-1 中清晰地看到四个内容视图，您需要在 `Main.storyboard` 中绘制四个故事板场景。您应该使用对应的\
    \ ADT 项目作为动态线框图来创建 iOS 故事板：\n\n1.  无特定顺序，让我们从最简单的开始，即对应 ADT 项目中的 `EditTextViewFragment`。对应\
    \ ADT 项目中，内容视图布局仅包含一个 `EditText`。您需要向故事板场景添加一个 `UITextField`（详细说明请参见第 4 章，“`UITextField`”）。\n\
    \n    1.  将一个 `UITextField` 从 **对象库** 拖到 `View` 上，并按照图 5-2 所示在 **属性检查器** 中更新其属性。\n\
    \n        ![9781484204375_Fig05-02.jpg](img/9781484204375_Fig05-02.jpg)\n\n  \
    \      图 5-2. `EditTextView` 故事板场景\n\n    2.  将其垂直居中，并在前导和尾随间距中添加一些空间（例如 `20`）。\n\
    \    3.  创建一个继承自 `UIViewController` 的 Swift 基础类 `EditTextViewController`（参见代码清单\
    \ 5-1）。\n    4.  为了与故事板场景配对，在 **身份检查器** 中输入自定义类名。\n    5.  在 **连接检查器** 中，将 `delegate`\
    \ 出口和 `New Referencing Outlet` 连接到您的代码。\n\n        ***代码清单 5-1***. `EditTextViewController`\n\
    \n        ```\n        import UIKit\n\n        class EditTextViewController: UIViewController,\
    \ UITextFieldDelegate {\n            @IBOutlet weak var mEditText: UITextField!\n\
    \        }\n        ```\n\n2.  继续绘制下一个内容视图，顺序不限（例如，房产界面）。在 Android 对应的 `RentalPropertyViewFragment`\
    \ 类中，我使用了 `ListFragment` 来实现外观与体验。\n\n    在 iOS 中，您的自然选择是 `UITableViewController`（详细说明请参见第\
    \ 3 章，“`UITableViewController`”）。\n\n    1.  将一个 `UITableViewController` 从 **对象库**\
    \ 拖拽到故事板编辑器中，以创建一个故事板场景。\n    2.  选择 Table View，并在 **属性检查器** 中将 `Style` 属性更新为\
    \ `Grouped`（参见图 5-3）。\n\n        ![9781484204375_Fig05-03.jpg](img/9781484204375_Fig05-03.jpg)\n\
    \n        图 5-3. 创建 Table View 场景\n\n    3.  选择 Table View Cell，并在 **属性检查器** 中更新属性（参见图\
    \ 5-4）：\n        - Style: 选择 **Right Detail**。\n        - Identifier: 输入 `aCell`。\n\
    \n        ![9781484204375_Fig05-04.jpg](img/9781484204375_Fig05-04.jpg)\n\n  \
    \      图 5-4. Right Detail, Table View Cell\n\n    4.  创建一个继承自 `UITableViewController`\
    \ 的 Swift 基础类 `RentalPropertyViewController`（参见代码清单 5-2）。为了与故事板场景配对，在 **身份检查器**\
    \ 中输入自定义类名。\n\n        ***代码清单 5-2***. `RentalPropertyViewController`\n\n    \
    \    ```\n        import UIKit\n        class RentalPropertyViewController: UITableViewController\
    \ {\n\n        }\n        ```\n\n3.  继续绘制下一个内容视图，顺序不限（例如，摊销界面）。对应的 Android `AmortizationViewFragment`\
    \ 是一个标准的 `ListFragment`。同样，在 iOS 中您的自然选择是 `UITableViewController`。\n\n    1. \
    \ 将一个 `UITableViewController` 从 **对象库** 拖拽到故事板编辑器中，以创建一个故事板场景。\n    2.  选择 Table\
    \ View Cell。在 **属性检查器** 中，更新以下属性：\n        - Style: 选择 **Subtitle**。\n       \
    \ - Identifier: 输入 `aCell`。\n    3.  创建一个继承自 `UITableViewController` 的 Swift 基础类\
    \ `AmortizationViewController`（参见代码清单 5-3）。\n    4.  为了与故事板场景配对，在 **身份检查器** 中输入自定义类名。\n\
    \n        ***代码清单 5-3***. `AmortizationViewController`\n\n        ```\n      \
    \  import UIKit\n        class AmortizationViewController: UITableViewController\
    \ {\n\n        }\n        ```\n\n4.  继续绘制最后一个内容视图——月度详情。对应的 Android `MonthlyTermViewFragment`\
    \ 布局看起来像 `ListView`，但实际上是用两个 `TextView` 和一个带有装饰的分隔线 `View` 实现的。您可以逐个将这些 Android\
    \ 控件转换为 iOS，或者像第 2 步那样选择使用 `UITableView`。在 iOS 中，实际上有一个更好的选择：使用带有静态单元格的 `UITableViewController`，每行对应一个静态单元格。\n\
    \n    1.  将一个 `UITableViewController` 从 `Object Library` 拖拽到故事板编辑器中，以创建一个故事板场景。\n\
    \    2.  选择 Table View，在 **属性检查器** 中按照图 5-5 所示更新属性。\n        - Content: 选择 **Static\
    \ Cells**。\n        - Sections: `2`\n        - Style: 选择 **Grouped**。\n\n    \
    \    ![9781484204375_Fig05-05.jpg](img/9781484204375_Fig05-05.jpg)\n\n       \
    \ 图 5-5. 静态单元格 Table View\n\n4.  月度详情界面包含 `Mortgage Payment` 和 `Investment` 两个部分。\n"
- fmt: "You need to update the section title and add Table View Cells to both sections\
    \ as shown in [Figure 5-6](#9781484204375_Ch05.xhtml#Fig6).\n\n![9781484204375_Fig05-06.jpg](images/9781484204375_Fig05-06.jpg)\n\
    \n[Figure 5-6](#9781484204375_Ch05.xhtml#_Fig6). Two sections in the Monthly Details\
    \ screen\n\n1. To update the section title, select the **Table View Section**\
    \ and update the `Header` attributes in **Attributes Inspector:**\n   - Section\
    \ 1: `Mortgage Payment`\n   - Section 2: `Investment`\n2. Since all of the Table\
    \ View Cells in this view are designed to have the same style, it is easier just\
    \ to create one and duplicate it. You may keep the first Table View Cell and delete\
    \ the rest.\n3. Select the Table View Cell and update the **Style** to **Right\
    \ Detail**.\n4. Select the `Mortgage Payment` section and update number of Rows\
    \ to `6`.\n5. You need three Table View Cells for Section 2. You may repeat the\
    \ preceding steps, or copy and paste in the storyboard editor.\n6. Update all\
    \ the Table View Cell titles as shown in the counterpart Android content view.\n\
    7. Create a bare-bones Swift `MonthlyTermViewController` class that extends from\
    \ `UITableViewController`. To pair with the storyboard scene, enter the custom\
    \ class name in the **Identity Inspector**.\n8. Open the **Assistant Editor**\
    \ and connect the first Table View Cell left text label and each Table View Cell\
    \ right detail label, respectively, to your code’s `IBOutlet` properties as shown\
    \ in [Listing 5-4](#9781484204375_Ch05.xhtml#list4).\n\n[***Listing 5-4***](#9781484204375_Ch05.xhtml#_list4).\
    \ `MonthlyTermViewController IBOutlet` Properties\n\n```swift\nimport UIKit\n\n\
    class MonthlyTermViewController : UITableViewController {\n    @IBOutlet weak\
    \ var mPaymentNo: UILabel!\n    @IBOutlet weak var mTotalPmt: UILabel!\n    @IBOutlet\
    \ weak var mPrincipal: UILabel!\n    @IBOutlet weak var mInterest: UILabel!\n\
    \    @IBOutlet weak var mEscrow: UILabel!\n    @IBOutlet weak var mAddlPmt: UILabel!\n\
    \    @IBOutlet weak var mBalance: UILabel!\n    @IBOutlet weak var mEquity: UILabel!\n\
    \    @IBOutlet weak var mCashInvested: UILabel!\n    @IBOutlet weak var mRoi:\
    \ UILabel!\n}\n```\n\n[Figure 5-7](#9781484204375_Ch05.xhtml#Fig7) depicts the\
    \ storyboard scenes translated from the Android counterparts.\n\n![9781484204375_Fig05-07.jpg](images/9781484204375_Fig05-07.jpg)\n\
    \n[Figure 5-7](#9781484204375_Ch05.xhtml#_Fig7). Four `RentalROI` scenes\n\n##\
    \ Choose a Screen Navigation Pattern\n\nWhen choosing appropriate navigation pattern(s),\
    \ you will naturally get a very good idea by playing with the Android app from\
    \ which you’re porting. Sometimes you may need more than one pattern, such as\
    \ a Navigation Stack plus Navigation Tabs. In this `RentalROI` app, you want to\
    \ be able go back to a previous scene from the Monthly Details to Amortization\
    \ List to Property Detail screens. The popular Navigation Stack navigation pattern\
    \ is prefect for this intended behavior (see [Chapter 3](#9781484204375_Ch03.xhtml),\
    \ “Navigation Stack”). For going to and from the Edit Text scene, you can choose\
    \ a different navigation pattern that shows a stronger relationship to the originating\
    \ context. Dialog or the iOS Popover is the choice (see [Chapter 3](#9781484204375_Ch03.xhtml),\
    \ “`UIPopoverController`”).\n\nYour immediate mission is to add the navigation\
    \ patterns and draw storyboard segues to connect all the storyboard scenes to\
    \ one another. [Figure 5-8](#9781484204375_Ch05.xhtml#Fig8) shows the final storyboard\
    \ with all the scenes connected.\n\n![9781484204375_Fig05-08.jpg](images/9781484204375_Fig05-08.jpg)\n\
    \n[Figure 5-8](#9781484204375_Ch05.xhtml#_Fig8). `RentalROI` connected scenes\n\
    \nContinue with the storyboard tasks by doing the following (see [Chapter 3](#9781484204375_Ch03.xhtml),\
    \ “Storyboard Segue” for step-by-step instructions):\n\n1. Select `RentalPropertyViewController`\
    \ in the storyboard editor and embed it in a `UINavigationController` (see [Figure\
    \ 3-33](#9781484204375_Ch03.xhtml#Fig33) in [Chapter 3](#9781484204375_Ch03.xhtml),\
    \ “`UINavigationController`” for detailed instructions).\n   1. Make sure `Is\
    \ Initial View Controller` is checked in the Navigation Controller **Attributes\
    \ Inspector**.\n   2. Select the Navigation Item in the `RentalPropertyViewController`\
    \ to update the `Title` attribute to `Property` in **Attributes Inspector**.\n\
    \   3. Add a right `BarButtonItem` to the `Property` Navigation Item in `RentalPropertyViewController`.\
    \ Also update the button `Title` attribute to `Schedule` in the `BarButtonItem`\
    \ **Attributes Inspector**.\n   4. Connect the `Schedule BarButtonItem` action\
    \ outlet in **Connections Inspector** to your code, such as `doSchedule(...)`.\n\
    2. Connect a Manual Segue from `RentalPropertyViewController` to `AmortizationViewController`.\n\
    \   1. Segue: `Show` (e.g., `Push`).\n   2. Identifier: `AmortizationTable`.\n\
    3. Connect a Manual Segue from `RentalPropertyViewController` to `EditTextViewController`.\n\
    \   1. Segue: `Present As Popover`.\n   2. Identifier: `EditText`.\n   3. Anchor:\
    \ `Table View`.\n   4. Directions: none (uncheck all).\n4. Connect a Manual Segue\
    \ from `AmortizationViewController` to `MonthlyTermViewController`.\n   1. Segue:\
    \ `Show` (e.g., `Push`).\n   2. Identifier: `MonthlyTerm`.\n5. Add Navigation\
    \ Item to `AmortizationViewController` and `MonthlyTermViewController` as shown\
    \ in [Figure 5-8](#9781484204375_Ch05.xhtml#Fig8).\n   1. Drag `Navigation Item`\
    \ from **Object Libraries** and drop it onto the controller in the storyboard\
    \ document outline.\n   2. Update the Navigation Item `Title` respectively (e.g.,\
    \ `Amortization` and `Payment`).\n6. Since you are not showing the `EditTextViewController`\
    \ with the navigation pattern, `EditTextViewController` doesn’t have a Navigation\
    \ Item for `Title` or `BarButtonItem` like the rest of the storyboard scenes.\
    \ You may either draw a `UINavigationBar` from **Object Libraries**, or more commonly,\
    \ you can simply embed it in another `UINavigationController`.\n   1. Select the\
    \ view controller and select **Editor ![image](images/arrow.jpg) Embedded In ![image](images/arrow.jpg)\
    \ Navigation Controller** from the Xcode **Editor** menu.\n   2. Add a right `BarButtonItem`.\
    \ Update the `Title` attribute to be `Save` and connect the action outlet to your\
    \ code, such as `doSave(...)`.\n   3. Add a left `BarButtonItem`. Update the `Title`\
    \ attribute to be `Cancel` and connect the action outlet to your code, such as\
    \ `doCancel(...)`.\n\nYou should have a storyboard with all scenes connected with\
    \ segues as shown in [Figure 5-8](#9781484204375_Ch05.xhtml#Fig8).\n\n## Implement\
    \ Piece by Piece\n\nLet’s take a look at the pieces you have now. [Figure 5-9](#9781484204375_Ch05.xhtml#Fig9)\
    \ shows the structures of both projects side by side.\n\n![9781484204375_Fig05-09.jpg](images/9781484204375_Fig05-09.jpg)\n\
    \n[Figure 5-9](#9781484204375_Ch05.xhtml#_Fig9). Android and iOS `RentalROI` project\
    \ structures\n\nThe iOS `ViewController` classes are in place and mapped one-to-one\
    \ with the Android counterpart `Fragments`. There is one model class, `RentalProperty`,\
    \ not in the iOS project yet. Let’s create a Swift class skeleton for the `RentalProperty`\
    \ model class (see [Listing 5-5](#9781484204375_Ch05.xhtml#list5)) first.\n\n\
    [***Listing 5-5***](#9781484204375_Ch05.xhtml#_list5). `RentalProperty.swift`\
    \ Skeleton\n\n```swift\nimport Foundation\n\npublic class RentalProperty {\n\n\
    }\n```\n\n## Application Resources\n\nSame as Android apps, most iOS apps need\
    \ images or digital assets to dress up the whole app. Also, you definitely want\
    \ to port the externalized text to iOS. Do the following to port the application\
    \ resources (see [Chapter 4](#9781484204375_Ch04.xhtml), “Application Resources”)\
    \ from the Android counterpart to iOS:\n\n1. Translate the Android `strings.xml`\
    \ to iOS:\n   1. In Xcode, select the `Supporting Files` folder to create a new\
    \ file (![image](images/flower.jpg)+N) in it, and follow the on-screen instructions\
    \ to select **iOS"
