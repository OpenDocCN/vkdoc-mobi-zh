    You may get by with not using most of the shorthand options at first, but for
    iOS programming, you definitely will need to get used to the external parameter
    names, because they are used heavily in iOS frameworks.


    Class


    Swift classes contain similar elements to Java classes. The simplest Java-like
    class form can be depicted as shown in [Listing 2-18](#9781484204375_Ch02.xhtml#list18).


    [***Listing 2-18***](#9781484204375_Ch02.xhtml#_list18). Simple Java-Like Swift
    Class


    ```

    class SimpleClass {

      var mProperty : Int = 0 // public int mProperty ...

      var mConstant : String = "MyKey" // public String ...

      func myMethod(name: String) -> Void { println(name)}

    }

    ```


    Property


    Java fields can be mapped to Swift properties as shown previously in [Listing
    2-18](#9781484204375_Ch02.xhtml#list18); they are called **stored properties**.
    In Swift, properties can do more than Java fields. [Listing 2-19](#9781484204375_Ch02.xhtml#list19)
    demonstrates the following Swift property usages:


    *   *Stored property*: Java field.

    *   *Computed property*: For derived values.

    *   *Property observer*: Optional coding block that responds to changes in a property
    value.

    *   *Type property*: Similar to a Java class variable, but the stored type property
    is not supported in the Swift `class` type yet. Since `struct` type property is
    now supported, you may choose to define an inner `struct` for porting Java static
    variables as a workaround for now.


    [***Listing 2-19***](#9781484204375_Ch02.xhtml#_list19). Swift Class Property


    ```

    class MyClass {

      var width = 10, height = 10 // stored properties


    // computed properties, can have set as well

      var size : Int {

        get {

          return width * height

        }

      }


    var size2 : Int { // readonly, shorthanded

        return width * height

      }


    // property observer

      var depth : Int = 10 {

        willSet {

          println("depth (\(depth)) will be set to \(newValue)")

        }

        didSet {

          println("depth (\(depth)) was be set from \(oldValue)")

        }

      }


    // Swift class Type property,

      class var MyComputedTypeProperty : String {

        return "Only computed Type property is supported"

      }


    // use inner struct stored Type property as a workaround

      struct MyStatic {

        static let MyConst = "final static in Java"

        static var MyVar: String?

      }

    }


    println(MyClass.MyStatic.MyConst)

    MyClass.MyStatic.MyVar = "class var in Java"

    println(MyClass.MyStatic.MyVar)

    ```


    Method


    Methods are functions defined inside a type context (i.e., a class). They are
    still functions as described previously (see [Listing 2-17](#9781484204375_Ch02.xhtml#list17)).
    You can define instance methods or class methods just as Java does. [Listing 2-20](#9781484204375_Ch02.xhtml#list20)
    shows the following typical method usages:


    *   Method declarations enforce external names implicitly, except for the first
    parameter. This is different from the global function (see the “Functions” section).
    All iOS Objective-C methods are ported to Swift using this convention.

    *   Use `class func` to declare class type methods, or `static func` to declare
    type methods in struct or enum types.


    [***Listing 2-20***](#9781484204375_Ch02.xhtml#_list20). Common Method Usages


    ```

    class MyClass {


    ///////// methods copied from Listing 2-17 //////////

      func doWork(parm : String) -> String { // just like func

        return "TODO: " + parm

      }


    // default parm value, always imply externl parm name

      func doWork2(name: String = "Swift") -> String {

        return "TODO: " + name

      }


    // func is a type, can be used for parm or return type, etc.

      func separateByAnd(p1: String, p2: String) -> String {

        return p1 + " and " + p2

      }


    func printTwoString(p1:String, p2:String, format:(String, String)->String) {

        println(format(p1, p2))

      }


    // Type methods, aka Java class static method

      class func DoWork(parm : String) -> String {

        return "TODO: (Just like Java class static method)" + parm

      }

    }


    var c = MyClass()

    println(c.doWork("Swift"))

    println(c.doWork2()) // default parm value

    println(c.doWork2(name: "Swift")) // external name enforced


    // closure is unnamed func

    c.printTwoString("Horse", p2: "Carrot", format: c.separateByAnd)

    // Inference and shorthanded parm names apply to method, too.

    c.printTwoString("Apple", p2: "Orange", format: {

      return $0 + " and " + $1

      })


    MyClass.DoWork("Swift Type method")

    ```


    Reference Type vs. Value Types


    Just as in Java, reference types are passed by reference (the reference to the
    instance is copied to another variable) and values types are passed by copy (the
    whole value type instance is copied to another memory space). However, you do
    need to pay attention to certain differences:'
