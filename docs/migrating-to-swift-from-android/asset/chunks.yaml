    \  \n\nRecall the `doAmortization()` method — it performs remote operations in\
    \ the background, then updates the UI when data is returned. The Android counterpart\
    \ uses `AsyncTask` and `HttpURLConnection` to accomplish this task (see [Listing\
    \ 5-25](#9781484204375_Ch05.xhtml#list25)). In iOS, use the instructions in the\
