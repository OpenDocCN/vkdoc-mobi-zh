    \ the `Simulated Metrics` size to `Freeform` and make it long enough so you can\
    \ see all the widgets in storyboard.  \n2.  Select the **View Controller** from\
    \ storyboard, and in **Size Inspector**, change `Simulated Size` to `Freeform`,\
    \ and make the size `320x1500` ([Figure 4-5](#9781484204375_Ch04.xhtml#Fig5))\
