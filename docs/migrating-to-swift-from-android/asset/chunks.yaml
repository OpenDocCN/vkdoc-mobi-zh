    \ 4-35）。\n\n![9781484204375_Fig04-35.jpg](img/9781484204375_Fig04-35.jpg)\n\n\
    图 4-35. 在 iPad 模拟器中全屏播放视频与嵌入播放视频\n\n## WebView\n\n### ANDROID ANALOGY\n\n`android.widget.WebView`。\n\
    \n你可以在几乎所有主流移动平台（包括 iOS、Android、BlackBerry 和 Windows Phone）的移动应用中显示丰富的 HTML 内容。这使你能够将\
    \ Web 内容作为移动应用的一部分来交付。一种常见场景是，当你希望在你的应用中提供需要频繁更新的信息，并且希望将内容托管在线上作为网页时。更进一步，Web\
    \ 内容不必是远程的；你可以将网页内容与原生应用打包在一起。这使得 Web 开发人员能够利用他们的 Web 开发技能，创建所谓的混合型应用。\n\n借助 HTML5\
    \ 和 CSS3 的新特性，许多 Web 开发人员正在创建有意义且具有交互性的 Web 应用，这正在缩短原生应用与移动 Web 应用之间的差距。在 iOS\
    \ 中，关键的 SDK 类是 `UIWebView`，它支持许多 HTML5 和 CSS3 特性（例如 `Offline Cache` 和 `WebSocket`\
    \ 等）。\n\n例如，以下步骤演示了使用 `UIWebView` 的常见任务：\n\n1. 选择 `Main.storyboard`，从 **Object\
    \ Library** 中拖拽一个 `UIWebView`，并将其放置在视频 `View` 下方（参见图 4-36）。在 **Attributes Inspector**\
    \ 中设置其属性；通常设置为 **Scales Page To Fit**。\n\n   ![9781484204375_Fig04-36.jpg](img/9781484204375_Fig04-36.jpg)\n\
    \n   图 4-36. iOS `UIWebView` 在 Connections Inspector 中的属性\n\n2. 像往常一样，打开 **Assistant\
    \ Editor** 并在 **Connections Inspector** 中将以下 Outlet 连接到你的代码（参见图 4-36）：\n   1.\
    \ 连接 `IBOutlet`，以便你可以在代码中使用该控件。\n   2. 连接 `delegate` Outlet，以便你的代码可以拦截 `UIWebView`\
    \ 的生命周期事件。\n\n3. 列表 4-18 演示了常用于 `UIWebView` 的编程代码。\n   1. 使用 `loadRequest(...)`\
    \ 加载 URL。你也可以创建一个文件 URL 来加载本地 HTML 文件。\n   2. 使用 `loadHTMLString(...)` 渲染简单的字符串文本。\n\
    \   3. 虽然此处未演示，但你也可以使用 `loadData(...)` 来渲染通常通过 `NSURLConnection` 从远程内容获取的 `NSData`，我将在后面的\
    \ “`NSURLConnection`” 章节中演示这一点。\n\n***列表 4-18***. 用于加载 URL 或字符串文本的 `UIWebView`\
    \ 代码\n\n```swift\nclass ViewController: ... {\n    ...\n    override func viewDidLoad()\
    \ {\n        ...\n        //    self.showWebPage(url: \"http://pdachoice.com/me/webview\"\
    )\n        self.showWebPage(htmlString: \"<H1>Hello UIWebView</H1>\")\n    }\n\
    \    ...\n    @IBOutlet weak var mWebView: UIWebView!\n    func showWebPage(#url:\
    \ String) {\n        var req = NSURLRequest(URL: NSURL(string: url)!)\n      \
    \  self.mWebView.loadRequest(req)\n    }\n\n    func showWebPage(#htmlString:\
    \ String) {\n        self.mWebView.loadHTMLString(htmlString, baseURL: nil)\n\
    \    }\n    ...\n}\n```\n\n4. 要拦截 `UIWebView` 的生命周期事件，请实现 `UIWebViewDelegate`\
    \ 协议，如列表 4-19 所示。\n\n***列表 4-19***. `UIWebViewDelegate` 协议\n\n```swift\nclass\
    \ ViewController: ... , UIWebViewDelegate{\n    ...\n    func webView(webView:\
    \ UIWebView, shouldStartLoadWithRequest request: NSURLRequest, navigationType:\
    \ UIWebViewNavigationType) -> Bool {\n        // do something, like re-direct\
    \ or intercept etc.\n        return true; // false to stop http request\n    }\n\
    \    func webViewDidStartLoad(webView: UIWebView) {\n        // do something,\
    \ e.g., start UIActivityViewIndicator\n        self.mActivityIndicator.startAnimating()\n\
    \    }\n    func webViewDidFinishLoad(webView: UIWebView) {\n        // do something,\
    \ e.g., stop  UIActivityViewIndicator\n        self.mActivityIndicator.stopAnimating()\n\
    \    }\n    func webView(webView: UIWebView, didFailLoadWithError error: NSError)\
    \ {\n        // do something, i.e., show error alert\n        self.mActivityIndicator.stopAnimating()\n\
    \        var alert = UIAlertController(title: \"Error\", message: error.localizedDescription,\
    \ preferredStyle: UIAlertControllerStyle.Alert)\n        alert.addAction(UIAlertAction(title:\
    \ \"Close\", style: UIAlertActionStyle.Cancel, handler: nil))\n        self.presentViewController(alert,\
    \ animated: true, completion: nil)\n    }\n    ...\n}\n```\n\n构建并运行应用，查看 iOS `UIWebView`\
    \ 的实际效果。现在，即使是 iPad Air 的屏幕也显得太小了（参见图 4-37）。你需要一个类似 Android 的 `ScrollView`，接下来你将实现它。\n\
    \n![9781484204375_Fig04-37.jpg](img/9781484204375_Fig04-37.jpg)\n\n图 4-37. iPad\
    \ Air 模拟器中的 `UIWebView`\n\n## ScrollView\n\n### ANDROID ANALOGY\n\n`android.widget.ScrollView`。\n\
    \n由于移动设备屏幕尺寸较小，`ScrollView` 对于显示比物理显示屏更大的内容视图非常有用。要在 iOS 中实现这一点，你需要使用 `UIScrollView`。\n\
    \n要使 `UIScrollView` 与自动布局配合使用，更简单的方法是首先将所有控件包裹在一个容器视图中，这将使你能够像往常使用自动布局一样在容器视图中布局控件。\n\
    \n以下步骤演示了如何在 `CommonWidgets` 应用中通常使用 iOS `UIScrollView` 的操作方法：\n\n1. 选择根 `View`\
    \ 中的所有控件，从 Xcode 菜单栏中选择 **Embed In** ![image](img/arrow.jpg) **View**，将这些通用控件嵌入到一个\
    \ `View` 中（参见图 4-38），并将此 Storyboard 标签更改为 `containerView`。\n\n   ![9781484204375_Fig04-38.jpg](img/9781484204375_Fig04-38.jpg)\n\
    \n   图 4-38. 将所有控件嵌入到一个 `View` 中\n\n2.\n"
- fmt: "1. Change **View Controller Simulated Size** to **Fixed**. The storyboard\
    \ scene becomes shorter, with some widgets left out of the screen as shown in\
    \ [Figure 4-39](#9781484204375_Ch04.xhtml#Fig39).\n\n   ![9781484204375_Fig04-39.jpg](images/9781484204375_Fig04-39.jpg)\n\
    \   [Figure 4-39](#9781484204375_Ch04.xhtml#_Fig39). Change scene to Fixed size\n\
    \n2. With the container, you can scroll the `containerView` as a whole by embedding\
    \ the `containerView` in `UIScrollView`. Select `containerView` first and embed\
    \ it in a scroll view as shown in [Figure 4-40](#9781484204375_Ch04.xhtml#Fig40)\
    \ (**Menubar** ![image](images/arrow.jpg) **Editor** ![image](images/arrow.jpg)\
    \ **Embed In** ![image](images/arrow.jpg) **Scroll View**).\n\n   ![9781484204375_Fig04-40.jpg](images/9781484204375_Fig04-40.jpg)\n\
    \   [Figure 4-40](#9781484204375_Ch04.xhtml#_Fig40). Embed `containerView` in\
    \ a scroll view\n\n3. Open the **Add New Constraints** popup and pin the `UIScrollView`\
    \ edges to the edge of the super view with zero spacing, and update the Frame\
    \ (see [Figure 4-41](#9781484204375_Ch04.xhtml#Fig41)).\n\n   ![9781484204375_Fig04-41.jpg](images/9781484204375_Fig04-41.jpg)\n\
    \   [Figure 4-41](#9781484204375_Ch04.xhtml#_Fig41). Set the `UIScrollView` position\n\
    \n4. The preceding operation shifts the `contentView`. In `contentView` **Size\
    \ Inspector**, reposition the `contentView` at `(0,0)` with size `600` (do **not**\
    \ change the height).\n\n5. The auto layout constraints are repurposed for calculating\
    \ the scrolling position. You have to create auto layout constraints to pin the\
    \ edges to the parent `UIScrollView` with zero spacing (see [Figure 4-42](#9781484204375_Ch04.xhtml#Fig42)).\n\
    \n   ![9781484204375_Fig04-42.jpg](images/9781484204375_Fig04-42.jpg)\n   [Figure\
    \ 4-42](#9781484204375_Ch04.xhtml#_Fig42). `contentView` pinned to `UIScrollView`\
    \ with zero spacing\n\n6. To make the `containerView` adaptive to size classes,\
    \ create constraints that align the widget to the parent’s leading and trailing\
    \ edges. Currently, you cannot use storyboard to draw auto layout for this, so\
    \ you have to write code as shown in [Listing 4-20](#9781484204375_Ch04.xhtml#list20).\n\
    \n   [***Listing 4-20***](#9781484204375_Ch04.xhtml#_list20). Pin `contentView`\
    \ Edges to Screen/Root View Edges\n\n   ```\n   class ViewController: ... {\n\
    \       ...\n       @IBOutlet var mContainer: UIView!\n       override func viewDidLoad()\
    \ {\n       ...\n       var leftConstraint = NSLayoutConstraint(\n           \
    \        item: self. mContainer,\n            attribute: NSLayoutAttribute.Leading,\n\
    \            relatedBy: NSLayoutRelation(rawValue: 0)!,\n               toItem:\
    \ self.view,\n            attribute: NSLayoutAttribute.Leading,\n           multiplier:\
    \ 1.0,\n             constant: 0)\n         self.view.addConstraint(leftConstraint)\n\
    \n         var rightConstraint = NSLayoutConstraint(\n                   item:\
    \ self. mContainer,\n            attribute: NSLayoutAttribute.Trailing,\n    \
    \        relatedBy: NSLayoutRelation(rawValue: 0)!,\n               toItem: self.view,\n\
    \            attribute: NSLayoutAttribute.Trailing,\n           multiplier: 1.0,\n\
    \             constant: 0)\n         self.view.addConstraint(rightConstraint)\n\
    \n       }\n       ...\n   ```\n\n7. You can also set the other widgets for auto\
    \ layout so they adapt to different size classes. Build and run the app to see\
    \ iOS `UIScrollView` in action. You should be able to see all the widgets by scrolling\
    \ the view up and down (see [Figure 4-43](#9781484204375_Ch04.xhtml#Fig43)).\n\
    \n   ![9781484204375_Fig04-43.jpg](images/9781484204375_Fig04-43.jpg)\n   [Figure\
    \ 4-43](#9781484204375_Ch04.xhtml#_Fig43). `CommonWidgets` with scrollable view\n\
    \n## Animations\n\nBack in the old days, I cared a lot less about animation effects,\
    \ but I think the evolution of iOS definitely raised the bar. In iOS, you can\
    \ animate `UIView` properties using the simple `UIView` animation API.\n\nTo learn\
    \ by example, modify the existing `UISegmentedControl.doScValueChanged(...)` method\
    \ as shown in [Listing 4-21](#9781484204375_Ch04.xhtml#list21) to create some\
    \ animation effects using the `UIView.animateWithDuration(...)` method.\n\n[***Listing\
    \ 4-21***](#9781484204375_Ch04.xhtml#_list21). `UIView.animateWithDuration(...)`\n\
    \n```\n... @IBAction func doScValueChanged(sender: AnyObject) {\n    var idx =\
    \ self.mSegmentedControl.selectedSegmentIndex\n    self.logText(\"segment \\(idx)\"\
    )\n    let center = self.mButton.center\n    UIView.animateWithDuration(1, animations:\
    \ { action in\n        self.mButton.center = CGPoint(x: center.x, y: center.y\
    \ / (idx + 1))\n        self.mButton.alpha = 1 / (idx + 1)\n        }, completion:\
    \ { action in\n            UIView.animateWithDuration(1, delay: 0, usingSpringWithDamping:\
    \ 0.5, initialSpringVelocity: 0.5, options: UIViewAnimationOptions.CurveEaseInOut,\
    \ animations: { action in\n                self.mButton.center = center\n    \
    \            }, completion: {  action in\n                    // do nothing\n\
    \                })\n        })\n}\n...\n```\n\nThe `UIView.animateWithDuration(...)`\
    \ has several overloaded variants that all work the same way. You can animate\
    \ the following `UIView` properties by modifying them inside the animation block:\n\
    \n* `frame` for the viewing area,\n* `center` for position,\n* `transform` for\
    \ scale and rotation,\n* `alpha` for transparency, and\n* `backgroundColor`.\n\
    \n## Save Data\n\nSaving data is an essential programming task in almost all common\
    \ programming platforms. In addition to transactional data, most of the mobile\
    \ apps also save application states and user preferences so that users can resume\
    \ their tasks later. Both iOS and Android provide several persistent storage options.\
    \ The iOS SDK offers the following choices:\n\n* `User Defaults System` storage\n\
    * `File` storage\n* `CoreData` framework and `SQLite` database (not covered in\
    \ this book)\n\nBefore diving into the first two options, you will create an Xcode\
    \ project so that you can write code and visualize how these options work.\n\n\
    1. Launch Xcode, use the **Single View Application** template, and name the project\
    \ `SaveData`.\n\n2. Create a Navigation Bar with an `UIBarButtonItem` (see [Figure\
    \ 4-44](#9781484204375_Ch04.xhtml#Fig44)):\n\n   1. Select the **View Controller**\
    \ in storyboard, and from the Xcode menu bar, select **Editor** ![image](images/arrow.jpg)\
    \ **Embed In** ![image](images/arrow.jpg) **Navigation Controller**.\n   2. In\
    \ the Navigation Item **Attributes Inspector**, enter a Title of **SaveData**.\n\
    \   3. Drag a `BarButtonItem` from **Object Library** and drop it onto the Navigation\
    \ Item in the **View Controller** scene. Update the Bar Item `Title` in **Attributes\
    \ Inspector** to be **Delete**.\n   4. Select the `Bar Button Item` and open **Assistant\
    \ Editor** to connect the selector outlet to your code. Name the `IBAction` **doDelete**.\n\
    \n   ![9781484204375_Fig04-44.jpg](images/9781484204375_Fig04-44.jpg)\n   [Figure\
    \ 4-44](#9781484204375_Ch04.xhtml#_Fig44). `SaveData` project storyboard\n\n3.\
    \ Create a `UITextField` to get user input as shown in [Figure 4-44](#9781484204375_Ch04.xhtml#Fig44):\n\
    \n   1. Drag a `UITextField` onto the **View Controller** scene. In the **Attributes\
    \ Inspector**, enter the placeholder, `\"Please save my inputs !!!\"`.\n   2.\
    \ Add auto layout constraints to center the `UITextField` in the `View`.\n\n4.\
    \ Open **Assistant Editor**, and in the `UITextField` **Connections Inspector**\
    \ connect the following outlets to your code:\n\n   1. Connect `Referencing Outlet`\
    \ to `IBOutlet` property, `mTextField`.\n   2. Connect `delegate` to your `ViewController`\
    \ class.\n\n5. Implement `UITextFieldDelegate` protocol in the `ViewController`\
    \ class and create the stubs that will trigger the retrieve, save, and delete\
    \ code as shown in [Listing 4-22](#9781484204375_Ch04.xhtml#list22):\n\n   1.\
    \ Load the saved data in `ViewController.viewDidLoad()`.\n   2. Save the user\
    \ input when the Return key is pressed."
