    \ in the storyboard scene and open the **Identity Inspector** in the **Utility**\
    \ area.\n    3.  Enter `HelloViewController` in the **Custom Class** field to\
    \ pair the storyboard scene with the `HelloViewController` class.\n\n![9781484204375_Fig03-17.jpg](images/9781484204375_Fig03-17.jpg)\n\
    \n[Figure 3-17](#9781484204375_Ch03.xhtml#_Fig17). **Identity Inspector** to pair\
    \ with view controller\n\nSpecifying the custom class in **Identity Inspector**\
    \ is all you need to pair with the content view controller.\n\nInteract with Content\
    \ View\n\nANDROID ANALOGY\n\nIn the Fragment view controller class,\n\n`rootView.findViewById(...)`\
    \ to get the object reference.\n\nRegister event listener using the `setOnXxxListener(...)`\
    \ methods.\n\nGenerally in both Android and iOS, you create UI widgets in a content\
    \ view and your content view controller code updates the widget’s states or interacts\
    \ with users at runtime. In iOS, you use **Connections Inspector** to create `IBOutlet`\
    \ and `IBAction` to facilitate this common programming task by drawing connections\
    \ to your code in the Swift class:\n\n*   `IBOutlet`: the view controller property\
    \ that is connect to the widgets in the storyboard scene.\n*   `IBAction`: the\
    \ view controller method that is called when the widget events occur.\n\nThe following\
    \ walks you through the steps to connect the UI widgets and delegates action events\
    \ to your controller class:\n\n1.  Select `Main.storyboard` to open the storyboard\
    \ editor.\n    1.  Open the storyboard **Assistant Editor**. The `HelloViewController`\
    \ class should automatically open in the assistant editor.\n    2.  Sometimes\
    \ the right file may not be opened automatically in the **Assistant Editor**,\
    \ so you may need to select the right file manually (see [Figure 3-18](#9781484204375_Ch03.xhtml#Fig18)).\n\
    \n![9781484204375_Fig03-18.jpg](images/9781484204375_Fig03-18.jpg)\n\n[Figure\
    \ 3-18](#9781484204375_Ch03.xhtml#_Fig18). Selecting a file manually in **Assistant\
    \ Editor**\n\n2.  Select the `TextField` in the storyboard scene (the left pointer\
    \ in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19)), and open the **Connections\
    \ Inspector** (the right pointer in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19))\
    \ as shown in [Figure 3-19](#9781484204375_Ch03.xhtml#Fig19) (make sure the **Utility**\
    \ Area is unfolded).\n\n![9781484204375_Fig03-19.jpg](images/9781484204375_Fig03-19.jpg)\n\
    \n[Figure 3-19](#9781484204375_Ch03.xhtml#_Fig19). Opening the **Connections Inspector**\n\
    \n3.  Create an `IBOutlet` for the `TextField` in the storyboard scene (see [Figure\
    \ 3-20](#9781484204375_Ch03.xhtml#Fig20)).\n    1.  Drag the circle next to **New\
    \ Referencing Outlet** with three fingers (or hold the left trackpad button at\
    \ the same time) and drop it inside the class. You should see the line from the\
    \ circle as shown in [Figure 3-20](#9781484204375_Ch03.xhtml#Fig20).\n    2. \
    \ Enter the connection name (i.e., `mTextField`). This creates a property in the\
    \ Swift class.\n\n![9781484204375_Fig03-20.jpg](images/9781484204375_Fig03-20.jpg)\n\
    \n[Figure 3-20](#9781484204375_Ch03.xhtml#_Fig20). `IBOutlet` in **Connections\
    \ Inspector**\n\n4.  Repeat steps 2 and 3 to create `mLabel` and `mButton IBOutlets`.\n\
    5.  Create an `IBAction` for the button touch down events.\n    1.  Drag the circle\
    \ next to **Touch Down** in **Sent Events** section and drop it inside the Swift\
    \ class (see [Figure 3-21](#9781484204375_Ch03.xhtml#Fig21)).\n\n![9781484204375_Fig03-21.jpg](images/9781484204375_Fig03-21.jpg)\n\
    \n[Figure 3-21](#9781484204375_Ch03.xhtml#_Fig21). Creating an `IBAction` in the\
    \ **Connections Inspector**\n\n2.  Enter the method name: i.e., `onButtonTouchDown`.\
    \ This creates a method stub in the Swift class.\n    3.  Add the Say-Hello code\
    \ to complete the `IBAction` method implementation in `HelloViewController.swift`\
    \ as shown in [Listing 3-2](#9781484204375_Ch03.xhtml#list2).\n\n[***Listing 3-2***](#9781484204375_Ch03.xhtml#_list2).\
    \ `HelloViewController` with `IBOutlet` and `IBAction`\n\n```\n        import\
    \ UIKit\n\nclass HelloViewController: UIViewController {\n\n@IBOutlet weak var\
    \ mTextField: UITextField!\n          @IBOutlet weak var mLabel: UILabel!\n  \
    \        @IBOutlet weak var mButton: UIButton!\n\n@IBAction func onButtonTouchDown(sender:\
    \ AnyObject) {\n            var str = mTextField.text\n            mLabel.text\
    \ = \"Hello \\(str)!\"\n          }\n        }\n        ```\n\nThis completes\
    \ the whole `HelloMobile` iOS app. You can run the project in all iOS simulators\
    \ to see the code in action.\n\nYou’re almost done with the MVC topics. Just one\
    \ more small lecture before we get into more fun stuff: `UIViewController` lifecycle\
    \ events.\n\nUIViewController Life Cycle\n\nANDROID ANALOGY\n\nFragment life cycle.\n\
    \nSimilar to the Android `Fragment` class, lifecycle callbacks are called at various\
    \ points when a content view is being rendered. Certain tasks need to be performed\
    \ in certain states to ensure the content view is rendered smoothly. This applies\
    \ to both iOS and Android. The iOS lifecycle concept may not be a beginner topic,\
    \ but it is easy for Android developers to pick up because the purpose is the\
    \ same: they want to perform certain computing tasks at the right time, with which\
    \ Android developers are already familiar.\n\nIn Android, the lifecycle events\
    \ are described as the states of the view controller itself. In iOS, these lifecycle\
    \ events are directly related to the content view events, so you actually can\
    \ visualize the effects better because they are directly related to the view-rendering\
    \ process.\n\nImplementing these view events is essentially the same as writing\
    \ your `Fragment` lifecycle callback methods: you can choose to override these\
    \ inherited system methods to receive timely callbacks if you wish.\n\nviewDidLoad\n\
    \nANDROID ANALOGY\n\n`Fragment.onCreate()` and `onCreateView()`.\n\niOS system\
    \ calls the `viewDidLoad()` method when the view controller loads its content\
    \ view from the storyboard scene. You commonly put the initialization code here.\n\
    \nviewWillAppear\n\nANDROID ANALOGY\n\n`onStart()`.\n\niOS system calls the `viewWillAppear()`\
    \ method when the view is about to appear. Generally, you can safely translate\
    \ the Android `onStart()` into this method.\n\nviewDidAppear\n\nANDROID ANALOGY\n\
    \n`onResume()`.\n\niOS system calls the `viewDidAppear()` method when the view\
    \ becomes visible. Generally, you can safely translate the Android `onResume()`\
    \ into this method.\n\nviewWillDisappear\n\nANDROID ANALOGY\n\n`onPause()`.\n\n\
    The system calls the `viewWillDisappear()` method when the content view is about\
    \ to become invisible—for example, leaving for another storyboard scene. This\
    \ is usually where you should commit any changes that should be persisted beyond\
    \ the current user session (because the user might not come back).\n\nviewDidDisappear`()`\n\
    \nANDROID ANALOGY\n\n`onStop()`.\n\nThe system calls the `viewDidDisappear()`\
    \ method when the content view is not visible.\n\nWhen implementing these lifecycle\
    \ events, you almost always will want to call the corresponding `super.viewXXX()`,\
    \ just like Android.\n\nScreen Navigation Patterns\n\nYou commonly use multiple\
    \ screens to convey hierarchical information to and interact with users. Considering\
    \ the relatively small mobile screens, it is even more crucial that you use well-known\
    \ navigation patterns to make mobile apps more predictable. A consistent and predictable\
    \ navigation pattern guides users to complete a task with multiple screens. Efficient\
    \ navigation is one of the cornerstones of a well-designed app.\n\nThis section\
    \ will focus on the most common screen navigation patterns supported in both iOS\
    \ and Android.\n\nStoryboard Segue"
  trans: "```swift\nimport UIKit\nclass HelloViewController: UIViewController {\n\
    \  // TODO\n}\n```\n\n2.  将故事板场景与 `HelloViewController` 类配对（参见图 3-17）：\n    1.\
    \  选择 `Main.storyboard` 以打开故事板编辑器。\n    2.  在故事板场景中选择视图控制器，然后在**工具**区打开**身份检查器**。\n\
    \    3.  在**自定义类**字段中输入 `HelloViewController`，将故事板场景与 `HelloViewController` 类配对。\n\
    \n![9781484204375_Fig03-17.jpg](img/9781484204375_Fig03-17.jpg)\n\n图 3-17. **身份检查器**，用于与视图控制器配对\n\
    \n在**身份检查器**中指定自定义类，即可完成与内容视图控制器的配对。\n\n## 与内容视图交互\n\n**Android 类比** 在 Fragment\
    \ 视图控制器类中，使用 `rootView.findViewById(...)` 获取对象引用。使用 `setOnXxxListener(...)` 方法注册事件监听器。\n\
    \n通常在 Android 和 iOS 中，你会在内容视图中创建 UI 控件，然后由内容视图控制器代码在运行时更新控件状态或与用户交互。在 iOS 中，你可以使用**连接检查器**创建\
    \ `IBOutlet` 和 `IBAction`，通过将连接拖拽到 Swift 类中的代码来简化这一常见编程任务：\n\n*   `IBOutlet`：连接到故事板场景中控件的视图控制器属性。\n\
    *   `IBAction`：当控件事件发生时被调用的视图控制器方法。\n\n以下步骤将引导你完成 UI 控件的连接，并将操作事件委派给控制器类：\n\n\
    1.  选择 `Main.storyboard` 以打开故事板编辑器。\n    1.  打开故事板的**辅助编辑器**。`HelloViewController`\
    \ 类应自动在辅助编辑器中打开。\n    2.  有时**辅助编辑器**可能不会自动打开正确的文件，因此你可能需要手动选择正确的文件（参见图 3-18）。\n\
    \n![9781484204375_Fig03-18.jpg](img/9781484204375_Fig03-18.jpg)\n\n图 3-18. 在**辅助编辑器**中手动选择文件\n\
    \n2.  在故事板场景中选择 `TextField`（图 3-19 中的左侧指针），然后打开**连接检查器**（图 3-19 中的右侧指针），如图 3-19\
    \ 所示（确保**工具**区域已展开）。\n\n![9781484204375_Fig03-19.jpg](img/9781484204375_Fig03-19.jpg)\n\
    \n图 3-19. 打开**连接检查器**\n\n3.  为故事板场景中的 `TextField` 创建一个 `IBOutlet`（参见图 3-20）。\n\
    \    1.  用三根手指（或同时按住左触控板按钮）拖拽**新建引用插座**旁边的圆圈，并将其拖放到类内部。你应该会看到如图 3-20 所示的从圆圈引出的连线。\n\
    \    2.  输入连接名称（例如 `mTextField`）。这将在 Swift 类中创建一个属性。\n\n![9781484204375_Fig03-20.jpg](img/9781484204375_Fig03-20.jpg)\n\
    \n图 3-20. **连接检查器**中的 `IBOutlet`\n\n4.  重复步骤 2 和 3，创建 `mLabel` 和 `mButton` 的 `IBOutlet`。\n\
    5.  为按钮的按下事件创建一个 `IBAction`。\n    1.  拖拽**已发送事件**部分中**按下**旁边的圆圈，并将其拖放到 Swift 类内部（参见图\
    \ 3-21）。\n\n![9781484204375_Fig03-21.jpg](img/9781484204375_Fig03-21.jpg)\n\n\
    图 3-21. 在**连接检查器**中创建 `IBAction`\n\n2.  输入方法名称：例如 `onButtonTouchDown`。这会在 Swift\
    \ 类中创建一个方法存根。\n    3.  在 `HelloViewController.swift` 中添加 Say-Hello 代码以完成 `IBAction`\
    \ 方法的实现，如代码清单 3-2 所示。\n\n***代码清单 3-2***. 包含 `IBOutlet` 和 `IBAction` 的 `HelloViewController`\n\
    \n```\nimport UIKit\n\nclass HelloViewController: UIViewController {\n\n@IBOutlet\
    \ weak var mTextField: UITextField!\n@IBOutlet weak var mLabel: UILabel!\n@IBOutlet\
    \ weak var mButton: UIButton!\n\n@IBAction func onButtonTouchDown(sender: AnyObject)\
    \ {\n    var str = mTextField.text\n    mLabel.text = \"Hello \\(str)!\"\n  }\n\
    }\n```\n\n至此，整个 `HelloMobile` iOS 应用就完成了。你可以在所有 iOS 模拟器中运行该项目，查看代码的实际效果。\n\n关于\
    \ MVC 的内容你已基本掌握。在我们进入更有趣的内容之前，还有一个小讲座：`UIViewController` 的生命周期事件。\n\n## UIViewController\
    \ 生命周期\n\n**Android 类比** Fragment 生命周期。\n\n与 Android 的 `Fragment` 类类似，在内容视图渲染过程中的不同时间点会调用生命周期回调。某些任务需要在特定状态下执行，以确保内容视图能够流畅渲染。这一点同时适用于\
    \ iOS 和 Android。iOS 生命周期概念可能不是初学者的主题，但对于 Android 开发者来说很容易掌握，因为其目的相同：他们都希望在正确的时间执行特定的计算任务，Android\
    \ 开发者对此已经非常熟悉。\n\n在 Android 中，生命周期事件被描述为视图控制器本身的状态。而在 iOS 中，这些生命周期事件直接与内容视图事件相关，因此你实际上可以更好地可视化其效果，因为它们与视图渲染过程直接相关。\n\
    \n实现这些视图事件本质上与编写 `Fragment` 生命周期回调方法相同：你可以选择重写这些继承自系统的方法，以便在需要时接收及时的回调。\n\n###\
    \ viewDidLoad\n\n**Android 类比** `Fragment.onCreate()` 和 `onCreateView()`。\n\n\
    当视图控制器从故事板场景加载其内容视图时，iOS 系统会调用 `viewDidLoad()` 方法。通常你会在这里放置初始化代码。\n\n### viewWillAppear\n\
    \n**Android 类比** `onStart()`。\n\n当视图即将出现时，iOS 系统会调用 `viewWillAppear()` 方法。一般来说，你可以放心地将\
    \ Android 的 `onStart()` 映射到该方法。\n\n### viewDidAppear\n\n**Android 类比** `onResume()`。\n\
    \n当视图变为可见时，iOS 系统会调用 `viewDidAppear()` 方法。一般来说，你可以放心地将 Android 的 `onResume()`\
    \ 映射到该方法。\n\n### viewWillDisappear\n\n**Android 类比** `onPause()`。\n\n当内容视图即将变为不可见时（例如，转移到另一个故事板场景），系统会调用\
    \ `viewWillDisappear()` 方法。这通常是提交任何需要在当前用户会话之后持久保存的更改的地方（因为用户可能不会回来）。\n\n### viewDidDisappear\n\
    \n**Android 类比** `onStop()`。\n\n当内容视图不可见时，系统会调用 `viewDidDisappear()` 方法。\n\n在实现这些生命周期事件时，你几乎总是需要调用相应的\
    \ `super.viewXXX()`，就像在 Android 中一样。\n\n## 屏幕导航模式\n\n你通常会使用多个屏幕来向用户传递分层信息并与用户交互。考虑到移动设备屏幕相对较小，使用众所周知的导航模式来使移动应用更具可预测性就显得更为重要。一致且可预测的导航模式能够引导用户通过多个屏幕完成一项任务。高效的导航是设计精良的应用的基石之一。\n\
    \n本节将重点介绍 iOS 和 Android 都支持的最常见的屏幕导航模式。\n\n### 故事板转场"
- fmt: "Segue，发音为“seg-way”，是故事板中一种连接类型，用于指定从一个场景到另一个场景的转场。例如，你可以创建一个在触发操作时立即执行的`Action\
    \ Segue`。更常见的是，你会在故事板中创建一个`Manual Segue`，并编写逻辑来执行它。根据其转场类型，segue可能需要一个容器视图控制器。例如，要实现典型的导航堆栈转场，你需要在\
    \ iOS 中使用`Navigation Controller`。\n\n以下步骤将引导你完成故事板 segue 的创建过程：\n\n1.  使用**Single\
    \ View Application**创建一个新的 Xcode 项目，产品名称为`Segues`。（具体步骤请参见[第2章](#9781484204375_Ch02.xhtml)，“iOS\
    \ 项目结构”）\n2.  在故事板编辑器中打开`Main.storyboard`。完成后应如图 [Figure 3-22](#9781484204375_Ch03.xhtml#Fig22)\
    \ 所示。\n    1.  向现有场景添加两个`Button`部件：一个用于`Action Segue`，另一个用于`Manual Segue`。\n \
    \   2.  从**Object Library**中拖拽两个`ViewControllers`到故事板上，以添加两个故事板场景。分别给每个场景添加一个`UILabel`，标题分别为**“From\
    \ Action Segue”**和**“From Manual Segue”**。\n\n![9781484204375_Fig03-22.jpg](images/9781484204375_Fig03-22.jpg)\n\
    \n[Figure 3-22](#9781484204375_Ch03.xhtml#_Fig22). `Segues`准备\n\n3.  从`Action\
    \ Segue`按钮创建一个指向**From Action Segue**场景的`Action Segue`。\n    1.  选择`Action Segue`按钮，并在**Utility**区域打开**Connections\
    \ Inspector**。\n    2.  将**Triggered Segue**部分的`action`插座拖拽到**From Action Segue**视图控制器，如图\
    \ [Figure 3-23](#9781484204375_Ch03.xhtml#Fig23) 所示。\n\n![9781484204375_Fig03-23.jpg](images/9781484204375_Fig03-23.jpg)\n\
    \n[Figure 3-23](#9781484204375_Ch03.xhtml#_Fig23). 创建一个 Action Segue\n\n3.  选择**Show**作为转场类型。\n\
    4.  选择这个 segue（参见 [Figure 3-24](#9781484204375_Ch03.xhtml#Fig24) 中的指针），并在 segue\
    \ 的**Attributes Inspector**中为其**Identifier**输入名称（即`actionSegue`），如图 [Figure 3-24](#9781484204375_Ch03.xhtml#Fig24)\
    \ 所示。\n\n![9781484204375_Fig03-24.jpg](images/9781484204375_Fig03-24.jpg)\n\n\
    [Figure 3-24](#9781484204375_Ch03.xhtml#_Fig24). 选择 segue 并设置属性\n\n5.  从呈现控制器创建一个指向**From\
    \ Manual Segue**视图控制器的`Manual Segue`，如图 [Figure 3-25](#9781484204375_Ch03.xhtml#Fig25)\
    \ 所示：\n    1.  选择呈现的视图控制器，并在**Utility**区域打开**Connections Inspector**。\n    2.\
    \  将**Manual Triggered Segue**部分的圆圈（插座）拖拽到**From Manual Segue**视图控制器。\n    3.\
    \  选择**Show**作为转场类型。\n    4.  选择这个 segue，并在 segue 的**Attributes Inspector**中为其**Identifier**输入名称（即`manualSegue`）。\n\
    \n![9781484204375_Fig03-25.jpg](images/9781484204375_Fig03-25.jpg)\n\n[Figure\
    \ 3-25](#9781484204375_Ch03.xhtml#_Fig25). 创建一个 Manual Segue\n\n6.  设置`Manual\
    \ Segue`，使其在`Manual Segue`按钮被选中时通过编程方式执行：\n    1.  在`ViewController`类中创建一个名为`onManualSegueTouchDown`的`IBAction`。\n\
    \    2.  在`onManualSegueTouchDown(...)`方法中，使用 [Listing 3-3](#9781484204375_Ch03.xhtml#list3)\
    \ 中的代码来执行手动 segue。\n\n[***Listing 3-3***](#9781484204375_Ch03.xhtml#_list3). 执行\
    \ Manual Segue\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n\
    \  @IBAction func onManualSegueTouchDown(sender: AnyObject) {\n    self.performSegueWithIdentifier(\"\
    manualSegue\", sender: sender)\n  }\n}\n```\n\n在不同的模拟器中运行应用，以查看这些 segue 在不同尺寸类别中的工作方式。自\
    \ iOS 8 起，segue 会以自适应方式呈现给尺寸类别。\n\n### 使用 Segue 传递数据\n\n故事板 segue 通过绘制 segue 连接来轻松便捷地执行屏幕转场。你甚至不需要为`Action\
    \ Segue`编写一行代码。然而，你通常需要将数据从呈现视图控制器传递到被呈现视图控制器，这是故事板 segue 本身无法单独完成的。\n\n以下步骤演示了在\
    \ Xcode `Segues`项目中，从呈现视图控制器向被呈现视图控制器传递数据的传统 iOS 方式：\n\n1.  创建一个带有接收数据属性的`PresentedViewController`类。[Listing\
    \ 3-4](#9781484204375_Ch03.xhtml#list4) 在`viewDidLoad()`方法中简单地打印接收到的数据。\n\n  \
    \  1.  在**Identity Inspector**中指定`PresentedViewController`类，以将其与**From Action\
    \ Segue**故事板场景配对（详见 [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)）。\n    2. \
    \ 同样将**From Manual Segue**故事板场景与`PresentedViewController`类配对。\n    3.  添加一个属性`data`，用于接收来自呈现视图控制器的数据。\n\
    \n[***Listing 3-4***](#9781484204375_Ch03.xhtml#_list4). 用于从 Presenting View Controller\
    \ 接收数据的 Data 属性\n\n```\n    import UIKit\n    class PresentedViewController: UIViewController\
    \ {\n      var data: String?\n      override func viewDidLoad() {\n        if\
    \ let tmp = data {\n          println(\"received data: \\(tmp)\")\n        }\n\
    \      }\n      ...\n    }\n```\n\n2.  系统会在源视图控制器中调用`prepareForSegue(...)`方法。你需要实现此方法来接收回调。为了从源视图控制器`ViewController`传递数据，请像\
    \ [Listing 3-5](#9781484204375_Ch03.xhtml#list5) 那样重写`prepareForSegue`方法。\n\n\
    [***Listing 3-5***](#9781484204375_Ch03.xhtml#_list5). Presenting View Controller\
    \ 重写`prepareForSegue`\n\n```\noverride func prepareForSegue(segue: UIStoryboardSegue,\
    \ sender: AnyObject?)\n{\n  var identifier = segue.identifier\n  var destVc =\
    \ (segue.destinationViewController as PresentedViewController)\n  destVc.data\
    \ = \"some data from presenting vc \\(identifier)\"\n}\n```\n\n### 容器视图控制器\n\n\
    #### Android 类比\n\n`Activity`是子`Fragment`的父级。\n\n在 iOS 中，屏幕导航主要通过故事板 segue 和来自\
    \ SDK 的容器视图控制器类来实现，这些类促进了屏幕导航。你可以创建这些系统容器视图控制器的子类，但通常你可以直接使用它们。\n\n#### 导航堆栈\n\
    \n#### Android 类比\n\n`FragmentManager`回退栈。\n\n**导航堆栈**广泛用于管理屏幕转场，特别适用于显示信息层级，例如主从下钻列表。要显示下一个屏幕，将下一个视图控制器推入导航堆栈。要返回到上一个屏幕，从导航堆栈中弹出上一个视图控制器。\n\
    \n创建一个具有操作栏的简单 Android 应用的 iOS 版本，如图 [Figure 3-26](#9781484204375_Ch03.xhtml#Fig26)\
    \ 所示。这个简单的 Android 应用执行以下操作：\n\n*   它有三个内容视图。\n*   它使用`FragmentManager` API 创建用于屏幕转场的片段事务。\n\
    *   设备返回按钮会自动从回退栈中移除`FragmentTransaction`。\n*   你可能使用了片段动画 API 来实现滑入和滑出动画。\n\n\
    ![9781484204375_Fig03-26.jpg](images/9781484204375_Fig03-26.jpg)\n\n[Figure 3-26](#9781484204375_Ch03.xhtml#_Fig26).\
    \ 包含三个屏幕的 Android `NavigationStack` 应用\n\n在 iOS 中，你需要使用带有`UINavigationController`容器视图控制器绘制合适的\
    \ storyboard segue，以实现此导航堆栈模式。让我们创建一个新的 Xcode 项目来演示 iOS 方式。"
  raw: "Segue, pronounced “seg-way”, is a type of a connection in storyboard that\
    \ specifies transitions from one scene to another. For instance, you can create\
    \ an Action Segue that is performed immediately when the action is triggered.\
    \ More frequently, you will create a Manual Segue in storyboard and write logics\
    \ to perform the segue. Depending on its transition type, the segue may require\
    \ a Container View Controller. For example, to implement the typical navigation\
    \ stack transitions, you will need a Navigation Controller in iOS.\n\nThe following\
    \ steps will walk you through the steps of a storyboard segue:\n\n1.  Create a\
    \ new Xcode project using **Single View Application** with a product name of `Segues`.\
    \ (See [Chapter 2](#9781484204375_Ch02.xhtml), “iOS Project Anatomy” for step-by-step\
    \ instructions)\n2.  Open `Main.storyboard` in the storyboard editor. It should\
    \ look like [Figure 3-22](#9781484204375_Ch03.xhtml#Fig22) when done.\n    1.\
    \  Add two `Button` widgets to the existing scene: one for Action Segue and the\
    \ other for Manual Segue.\n    2.  Drop two `ViewControllers` onto the storyboard\
    \ from **Object Library** to add two storyboard scenes. Add a `UILabel` to each\
    \ scene with titles **“From Action Segue”** and **“From Manual Segue,”** respectively.\n\
    \n![9781484204375_Fig03-22.jpg](images/9781484204375_Fig03-22.jpg)\n\n[Figure\
    \ 3-22](#9781484204375_Ch03.xhtml#_Fig22). `Segues` preparation\n\n3.  Create\
    \ an Action Segue from the `Action Segue` Button to the **From Action Segue**\
    \ scene.\n    1.  Select the `Action Segue` Button and open the **Connections\
    \ Inspector** in the **Utility** area.\n    2.  Drag the `action` outlet in the\
    \ **Triggered Segue** section to **From Action Segue** view controller as shown\
    \ in [Figure 3-23](#9781484204375_Ch03.xhtml#Fig23).\n\n![9781484204375_Fig03-23.jpg](images/9781484204375_Fig03-23.jpg)\n\
    \n[Figure 3-23](#9781484204375_Ch03.xhtml#_Fig23). Creating an Action Segue\n\n\
    3.  Select **Show** for transition type.\n4.  Select the segue (see the pointer\
    \ in [Figure 3-24](#9781484204375_Ch03.xhtml#Fig24)) and enter the name of the\
    \ segue **Identifier** in the segue **Attributes Inspector** (i.e., `actionSegue`),\
    \ as shown in [Figure 3-24](#9781484204375_Ch03.xhtml#Fig24).\n\n![9781484204375_Fig03-24.jpg](images/9781484204375_Fig03-24.jpg)\n\
    \n[Figure 3-24](#9781484204375_Ch03.xhtml#_Fig24). Selecting the segue and setting\
    \ up the attributes\n\n5.  Create a Manual Segue from the presenting controller\
    \ to the **From Manual Segue** view controller as shown in [Figure 3-25](#9781484204375_Ch03.xhtml#Fig25):\n\
    \    1.  Select the presenting View Controller and open the **Connections Inspector**\
    \ in the **Utility** area.\n    2.  Drag the circle (outlet) in the **Manual Triggered\
    \ Segue** section to the **From Manual Segue** view controller.\n    3.  Select\
    \ **Show** for transition type.\n    4.  Select the segue and enter the name of\
    \ the segue **Identifier** in the segue **Attributes Inspector** (i.e., `manualSegue`).\n\
    \n![9781484204375_Fig03-25.jpg](images/9781484204375_Fig03-25.jpg)\n\n[Figure\
    \ 3-25](#9781484204375_Ch03.xhtml#_Fig25). Creating a Manual Segue\n\n6.  Set\
    \ up `Manual Segue` to be performed programmatically when the `Manual Segue` button\
    \ is selected:\n    1.  Create an `IBAction` to `ViewController` class with the\
    \ name `onManualSegueTouchDown`.\n    2.  In the `onManualSegueTouchDown(...)`\
    \ method, use the code in [Listing 3-3](#9781484204375_Ch03.xhtml#list3) to perform\
    \ the manual segue.\n\n[***Listing 3-3***](#9781484204375_Ch03.xhtml#_list3).\
    \ Performing the Manual Segue\n\n```\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n  @IBAction func onManualSegueTouchDown(sender: AnyObject) {\n    self.performSegueWithIdentifier(\"\
    manualSegue\", sender: sender)\n  }\n}\n```\n\nRun the app in different emulators\
    \ to see these segues work in different size classes. Since iOS 8, the segues\
    \ are presented in an adaptive manner to the size classes.\n\nPass Data with a\
    \ Segue\n\nThe storyboard segues perform screen transitions nice and easy by drawing\
    \ the segue connections. You don’t even need a line of code for an Action Segue.\
    \ However, you normally will need to pass data from the presenting view controller\
    \ to the presented view controller, which cannot be done alone by the storyboard\
    \ segue itself.\n\nThe following steps demonstrate the conventional iOS way to\
    \ pass data from the presenting view controller to the presented view controller\
    \ in the Xcode `Segues` project:\n\n1.  Create a `PresentedViewController` class\
    \ with a property to receive data. [Listing 3-4](#9781484204375_Ch03.xhtml#list4)\
    \ simply prints the received data in the `viewDidLoad()` method.\n\n1.  Specify\
    \ the `PresentedViewController` class in the **Identity Inspector** to pair with\
    \ the **From Action Segue** storyboard scene (see [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)\
    \ for details).\n    2.  Pair the **From Manual Segue** storyboard scene with\
    \ the `PresentedViewController` class as well.\n    3.  Add a property, `data`,\
    \ to receive the data from the presenting view controller.\n\n[***Listing 3-4***](#9781484204375_Ch03.xhtml#_list4).\
    \ Data Property to Receive Data from Presenting View Controller\n\n```\n    import\
    \ UIKit\n    class PresentedViewController: UIViewController {\n      var data:\
    \ String?\n      override func viewDidLoad() {\n        if let tmp = data {\n\
    \          println(\"received data: \\(tmp)\")\n        }\n      }\n      ...\n\
    \    }\n    ```\n\n2.  The system invokes a `prepareForSegue`(...) method in the\
    \ source view controller. You need to implement this method to receive the callback.\
    \ To pass data from the source view controller, `ViewController`, override the\
    \ `prepareForSegue` method as shown in [Listing 3-5](#9781484204375_Ch03.xhtml#list5).\n\
    \n[***Listing 3-5***](#9781484204375_Ch03.xhtml#_list5). Presenting View Controller\
    \ Override `prepareForSegue`\n\n```\noverride func prepareForSegue(segue: UIStoryboardSegue,\
    \ sender: AnyObject?)\n{\n  var identifier = segue.identifier\n  var destVc = (segue.destinationViewController\
    \ as PresentedViewController)\n  destVc.data = \"some data from presenting vc\
    \ \\(identifier)\"\n}\n```\n\nContainer View Controller\n\nANDROID ANALOGY\n\n\
    Activity is the parent of child Fragments.\n\nIn iOS, screen navigations are primarily\
    \ implemented by storyboard segues and the Container View Controller classes from\
    \ SDK that facilitate the screen navigations. You may create subclasses from these\
    \ system container view controllers, but normally you can just use them as is.\n\
    \nNavigation Stack\n\nANDROID ANALOGY\n\n`FragmentManager` back stack.\n\nThe\
    \ **Navigation Stack** is widely used to manage screen transitions, and particularly\
    \ for displaying information hierarchy, such as a master drilldown list. To show\
    \ the next screen, push the next view controller into the navigation stack. To\
    \ go back to the previous screen, pop out the previous view controller in the\
    \ navigation stack.\n\nCreate an iOS version of the following simple Android app\
    \ that has an action bar, as shown in [Figure 3-26](#9781484204375_Ch03.xhtml#Fig26).\
    \ This simple Android app does the following:\n\n*   It has three content views.\n\
    *   It uses `FragmentManager` API to create fragment transaction for screen transitions.\n\
    *   The device back button automatically removes the `FragmentTransaction` from\
    \ back stack.\n*   You probably used the Fragment Animation API to implement the\
    \ slide-in and slide-out animations.\n\n![9781484204375_Fig03-26.jpg](images/9781484204375_Fig03-26.jpg)\n\
    \n[Figure 3-26](#9781484204375_Ch03.xhtml#_Fig26). The Android  `NavigationStack`\
    \ app with three screens\n\nIn iOS, you draw appropriate storyboard segues with\
    \ the `UINavigationController` Container View Controller to accomplish this navigation\
    \ stack pattern. Let’s create a new Xcode project to demonstrate the iOS way."
  trans: "\nSegue，发音为“seg-way”，是故事板中一种连接类型，用于指定从一个场景到另一个场景的转场。例如，你可以创建一个在触发操作时立即执行的`Action\
    \ Segue`。更常见的是，你会在故事板中创建一个`Manual Segue`，并编写逻辑来执行它。根据其转场类型，segue 可能需要一个容器视图控制器。例如，要实现典型的导航堆栈转场，你需要在\
    \ iOS 中使用`Navigation Controller`。\n\n以下步骤将引导你完成故事板 segue 的创建过程：\n\n1.  使用**Single\
    \ View Application**创建一个新的 Xcode 项目，产品名称为`Segues`。（具体步骤请参见第 2 章，“iOS 项目结构”）\n\
    2.  在故事板编辑器中打开`Main.storyboard`。完成后应如图 Figure 3-22 所示。\n    1.  向现有场景添加两个`Button`部件：一个用于`Action\
    \ Segue`，另一个用于`Manual Segue`。\n    2.  从**Object Library**中拖拽两个`ViewControllers`到故事板上，以添加两个故事板场景。分别给每个场景添加一个`UILabel`，标题分别为**“From\
    \ Action Segue”**和**“From Manual Segue”**。\n\n![9781484204375_Fig03-22.jpg](img/9781484204375_Fig03-22.jpg)\n\
    \nFigure 3-22. `Segues`准备\n\n3.  从`Action Segue`按钮创建一个指向**From Action Segue**场景的`Action\
    \ Segue`。\n    1.  选择`Action Segue`按钮，并在**Utility**区域打开**Connections Inspector**。\n\
    \    2.  将**Triggered Segue**部分的`action`插座拖拽到**From Action Segue**视图控制器，如图 Figure\
    \ 3-23 所示。\n\n![9781484204375_Fig03-23.jpg](img/9781484204375_Fig03-23.jpg)\n\n\
    Figure 3-23. 创建一个 Action Segue\n\n3.  选择**Show**作为转场类型。\n4.  选择这个 segue（参见 Figure\
    \ 3-24 中的指针），并在 segue 的**Attributes Inspector**中为其**Identifier**输入名称（即`actionSegue`），如图\
    \ Figure 3-24 所示。\n\n![9781484204375_Fig03-24.jpg](img/9781484204375_Fig03-24.jpg)\n\
    \nFigure 3-24. 选择 segue 并设置属性\n\n5.  从呈现控制器创建一个指向**From Manual Segue**视图控制器的`Manual\
    \ Segue`，如图 Figure 3-25 所示：\n    1.  选择呈现的视图控制器，并在**Utility**区域打开**Connections\
    \ Inspector**。\n    2.  将**Manual Triggered Segue**部分的圆圈（插座）拖拽到**From Manual Segue**视图控制器。\n\
    \    3.  选择**Show**作为转场类型。\n    4.  选择这个 segue，并在 segue 的**Attributes Inspector**中为其**Identifier**输入名称（即`manualSegue`）。\n\
    \n![9781484204375_Fig03-25.jpg](img/9781484204375_Fig03-25.jpg)\n\nFigure 3-25.\
    \ 创建一个 Manual Segue\n\n6.  设置`Manual Segue`，使其在`Manual Segue`按钮被选中时通过编程方式执行：\n\
    \    1.  在`ViewController`类中创建一个名为`onManualSegueTouchDown`的`IBAction`。\n    2.\
    \  在`onManualSegueTouchDown(...)`方法中，使用 Listing 3-3 中的代码来执行手动 segue。\n\n***Listing\
    \ 3-3***. 执行 Manual Segue\n\n```\nimport UIKit\nclass ViewController: UIViewController\
    \ {\n  @IBAction func onManualSegueTouchDown(sender: AnyObject) {\n    self.performSegueWithIdentifier(\"\
    manualSegue\", sender: sender)\n  }\n}\n```\n\n在不同的模拟器中运行应用，以查看这些 segue 在不同尺寸类别中的工作方式。自\
    \ iOS 8 起，segue 会以自适应方式呈现给尺寸类别。\n\n### 使用 Segue 传递数据\n\n故事板 segue 通过绘制 segue 连接来轻松便捷地执行屏幕转场。你甚至不需要为`Action\
    \ Segue`编写一行代码。然而，你通常需要将数据从呈现视图控制器传递到被呈现视图控制器，这是故事板 segue 本身无法单独完成的。\n\n以下步骤演示了在\
    \ Xcode `Segues`项目中，从呈现视图控制器向被呈现视图控制器传递数据的传统 iOS 方式：\n\n1.  创建一个带有接收数据属性的`PresentedViewController`类。Listing\
    \ 3-4 在`viewDidLoad()`方法中简单地打印接收到的数据。\n\n    1.  在**Identity Inspector**中指定`PresentedViewController`类，以将其与**From\
    \ Action Segue**故事板场景配对（详见 Figure 3-17）。\n    2.  同样将**From Manual Segue**故事板场景与`PresentedViewController`类配对。\n\
    \    3.  添加一个属性`data`，用于接收来自呈现视图控制器的数据。\n\n***Listing 3-4***. 用于从 Presenting View\
    \ Controller 接收数据的 Data 属性\n\n```\n    import UIKit\n    class PresentedViewController:\
    \ UIViewController {\n      var data: String?\n      override func viewDidLoad()\
    \ {\n        if let tmp = data {\n          println(\"received data: \\(tmp)\"\
    )\n        }\n      }\n      ...\n    }\n```\n\n2.  系统会在源视图控制器中调用`prepareForSegue(...)`方法。你需要实现此方法来接收回调。为了从源视图控制器`ViewController`传递数据，请像\
    \ Listing 3-5 那样重写`prepareForSegue`方法。\n\n***Listing 3-5***. Presenting View Controller\
    \ 重写`prepareForSegue`\n\n```\noverride func prepareForSegue(segue: UIStoryboardSegue,\
    \ sender: AnyObject?)\n{\n  var identifier = segue.identifier\n  var destVc =\
    \ (segue.destinationViewController as PresentedViewController)\n  destVc.data\
    \ = \"some data from presenting vc \\(identifier)\"\n}\n```\n\n### 容器视图控制器\n\n\
    #### Android 类比\n\n`Activity`是子`Fragment`的父级。\n\n在 iOS 中，屏幕导航主要通过故事板 segue 和来自\
    \ SDK 的容器视图控制器类来实现，这些类促进了屏幕导航。你可以创建这些系统容器视图控制器的子类，但通常你可以直接使用它们。\n\n#### 导航堆栈\n\
    \n#### Android 类比\n\n`FragmentManager`回退栈。\n\n**导航堆栈**广泛用于管理屏幕转场，特别适用于显示信息层级，例如主从下钻列表。要显示下一个屏幕，将下一个视图控制器推入导航堆栈。要返回到上一个屏幕，从导航堆栈中弹出上一个视图控制器。\n\
    \n创建一个具有操作栏的简单 Android 应用的 iOS 版本，如图 Figure 3-26 所示。这个简单的 Android 应用执行以下操作：\n\n\
    *   它有三个内容视图。\n*   它使用`FragmentManager` API 创建用于屏幕转场的片段事务。\n*   设备返回按钮会自动从回退栈中移除`FragmentTransaction`。\n\
    *   你可能使用了片段动画 API 来实现滑入和滑出动画。\n\n![9781484204375_Fig03-26.jpg](img/9781484204375_Fig03-26.jpg)\n\
    \nFigure 3-26. 包含三个屏幕的 Android `NavigationStack` 应用\n\n在 iOS 中，你需要使用带有`UINavigationController`容器视图控制器绘制合适的\
    \ storyboard segue，以实现此导航堆栈模式。让我们创建一个新的 Xcode 项目来演示 iOS 方式。\n"
- fmt: "1.  Create a new Xcode project using iOS **Single View Application** template\
    \ (see [chapter 2](#9781484204375_Ch02.xhtml), “iOS Project Anatomy”). Name it\
    \ `NavigationStack`.\n2.  Select `Main.storyboard` to open the storyboard in the\
    \ **Editor** area. It has one scene already.\n3.  Add two more content view (scenes):\
    \ drag `ViewController` from **Object Library** onto the storyboard twice. [Figure\
    \ 3-27](#9781484204375_Ch03.xhtml#Fig27) depicts the storyboard containing three\
    \ scenes.\n\n![9781484204375_Fig03-27.jpg](images/9781484204375_Fig03-27.jpg)\n\
    \n[Figure 3-27](#9781484204375_Ch03.xhtml#_Fig27). Three storyboard scenes in\
    \ the `NavigationStack` project\n\n4.  Use the counterpart Android Screen One\
    \ layout to guide you as you update the first storyboard scene:\n    1.  Add a\
    \ `Label` from the **Object Library**. Change its font size to **30** and text\
    \ to “`Screen One`”, and center its alignment with the **Attributes Inspector**\
    \ in the **Utility** area.\n    2.  Add Auto Layout constraints to center the\
    \ label as shown in [Figure 3-28](#9781484204375_Ch03.xhtml#Fig28).\n\n![9781484204375_Fig03-28.jpg](images/9781484204375_Fig03-28.jpg)\n\
    \n[Figure 3-28](#9781484204375_Ch03.xhtml#_Fig28). Screen One label with center\
    \ constraints\n\n3.  Add the `Next` button with the right and bottom space constraints\
    \ to anchor the position as shown in [Figure 3-29](#9781484204375_Ch03.xhtml#Fig29).\n\
    \n![9781484204375_Fig03-29.jpg](images/9781484204375_Fig03-29.jpg)\n\n[Figure\
    \ 3-29](#9781484204375_Ch03.xhtml#_Fig29). `Next` button with alignment constraints\n\
    \n5.  Repeat step 4 to add a **“Screen Two”** Label and the `Next` button to the\
    \ **Screen Two** scene.\n6.  Repeat step 4 to add a **“Screen Three”** Label to\
    \ the **Screen Three** scene. [Figure 3-30](#9781484204375_Ch03.xhtml#Fig30) shows\
    \ the UI widgets added to storyboard.\n\n![9781484204375_Fig03-30.jpg](images/9781484204375_Fig03-30.jpg)\n\
    \n[Figure 3-30](#9781484204375_Ch03.xhtml#_Fig30). Three scenes with widgets in\
    \ `NavigationStack` project\n\n7.  Create an Action Segue from the `Next` button\
    \ in Screen One to the Screen Two scene, and another Action Segue from the `Next`\
    \ button in Screen Two to the Screen Three scene.\n\n[Figure 3-31](#9781484204375_Ch03.xhtml#Fig31)\
    \ shows the results of the storyboard. Run the app to see what is working and\
    \ what is not working yet. Nothing is new yet, just repeated steps that create\
    \ storyboard scenes, UI widgets, Auto Layout constraints, and segues that connect\
    \ them together.\n\n![9781484204375_Fig03-31.jpg](images/9781484204375_Fig03-31.jpg)\n\
    \n[Figure 3-31](#9781484204375_Ch03.xhtml#_Fig31). `NavigationStack` storyboard\n\
    \n## `UINavigationController`\n\n**ANDROID ANALOGY**\n\n`FragmentTransaction`\
    \ Back Stack\n\nThe only missing piece in this iOS project is a way to show the\
    \ appropriate child view controller in the typical push and pop fashions. In iOS,\
    \ the `UINavigationController` manages the push and pop screen navigation stack\
    \ behaviors. It also provides a navigation bar that has a default back button,\
    \ a title in the center, and an optional right button (see [Figure 3-32](#9781484204375_Ch03.xhtml#Fig32)).\n\
    \n![9781484204375_Fig03-32.jpg](images/9781484204375_Fig03-32.jpg)\n\n[Figure\
    \ 3-32](#9781484204375_Ch03.xhtml#_Fig32). The `UINavigationController` navigation\
    \ bar\n\nAll you need to do is to set up a `UINavigationController` that associates\
    \ its root view controller with the first scene:\n\n*   Add a Navigation Controller\
    \ from **Object Library**.\n*   Connect the root view controller segue (in **Connections\
    \ Inspector**) to the first view controller.\n\nYou can accomplish both in one\
    \ simple storyboard operation: embed the Screen One view controller in a Navigation\
    \ Controller as shown in the following steps:\n\n1.  Select Screen One View Controller\
    \ from the storyboard.\n2.  In the Xcode menu bar, select **Editor ![image](images/arrow.jpg)\
    \ Embed In ![image](images/arrow.jpg) Navigation Controller** as shown in [Figure\
    \ 3-33](#9781484204375_Ch03.xhtml#Fig33).\n\n![9781484204375_Fig03-33.jpg](images/9781484204375_Fig03-33.jpg)\n\
    \n[Figure 3-33](#9781484204375_Ch03.xhtml#_Fig33). Creating a Navigation Controller\n\
    \n3.  This creates a Navigation Controller and connects the root view controller\
    \ segue to the Screen One view controller (see [Figure 3-34](#9781484204375_Ch03.xhtml#Fig34)).\n\
    \    1.  The Navigation Controller has a `NavigationBar`.\n    2.  The root view\
    \ controller automatically gets a `NavigationItem` where you can add a center\
    \ `title` and a `rightBarButtonItem`.\n\n![9781484204375_Fig03-34.jpg](images/9781484204375_Fig03-34.jpg)\n\
    \n[Figure 3-34](#9781484204375_Ch03.xhtml#_Fig34). Navigation Controller scene\
    \ and root view controller connection\n\n4.  Select the `NavigationItem` in Screen\
    \ One to add `title` text (i.e., Navigation Stack), as shown in [Figure 3-35](#9781484204375_Ch03.xhtml#Fig35).\n\
    \    1.  The title on the `NavigationBar` also affects the **Back** button title.\
    \ iOS automatically updates the button `title` attribute to reflect where the\
    \ **Back** button is going. The button text defaults to `Back` if the `title`\
    \ is not assigned in the view.\n\n![9781484204375_Fig03-35.jpg](images/9781484204375_Fig03-35.jpg)\n\
    \n[Figure 3-35](#9781484204375_Ch03.xhtml#_Fig35). Title on the Navigation Item\n\
    \n**Note**  The title on the Android Action bar is meant for the App identity.\
    \ The iOS navigation bar title is more meant for the screen title.\n\n5.  Optional:\
    \ The `title` and the `rightBarButtonItem` need to be installed on `NavigationItem`\
    \ as you seen in previous step. If you want to set the `title` attribute or the\
    \ `rightBarButtonItem` to Screen Two or Three, you need to add a `NavigationItem`\
    \ to Screen Two or Three view controller first.\n\n**Note**  The title can be\
    \ derived from the view controller title when **Navigation Item** is not being\
    \ configured.\n\nBuild and run the app to see the live app in action (see [Figure\
    \ 3-36](#9781484204375_Ch03.xhtml#Fig36)).\n\n![9781484204375_Fig03-36.jpg](images/9781484204375_Fig03-36.jpg)\n\
    \n[Figure 3-36](#9781484204375_Ch03.xhtml#_Fig36). The final `NavigationStack`\
    \ app\n\n## Master List with Details Drilldown\n\n**ANDROID ANALOGY**\n\n`ListView`\
    \ and `GridView`.\n\nMany apps need to display a list of items that users can\
    \ tap to view more detailed information. They present a master list of items first,\
    \ and the user selects one item to drill into.\n\nThis is probably one of the\
    \ most common mobile navigation patterns. Both Android and iOS provide guidelines\
    \ and offer system APIs to promote consistency by making the implementation easy\
    \ for developers. In fact, both Xcode and ADT supply project templates for creating\
    \ apps with this UX pattern.\n\nIn ADT, you can get the following master-detail\
    \ app using the ADT **Master/Detail Flow** template. Initially, it presents the\
    \ master list with three items. The app shows the detailed screen with the selected\
    \ item content. You will port this app (see [Figure 3-37](#9781484204375_Ch03.xhtml#Fig37))\
    \ to the iOS platform.\n\n![9781484204375_Fig03-37.jpg](images/9781484204375_Fig03-37.jpg)\n\
    \n[Figure 3-37](#9781484204375_Ch03.xhtml#_Fig37). Android master list detailed\
    \ drilldown\n\n## `UITableViewController`\n\n**ANDROID ANALOGY**\n\nThe implementation\
    \ concept appears very similar with different vocabularies:\n\n*   `ListFragment`\
    \ = `UITableViewController`\n*   List View = Table View\n*   List View Item =\
    \ Table View Cell\n*   List Adapter = Data Source\n\nEven the adapter/data source\
    \ implementations are sort of similar, too.\n\nTo port this Android app to iOS,\
    \ you need two storyboard scenes: one for the master list and the other for the\
    \ detailed content view. To have a fresh start, create a new iOS project:"
  raw: "1.  Create a new Xcode project using iOS **Single View Application** template\
    \ (see [chapter 2](#9781484204375_Ch02.xhtml), “iOS Project Anatomy”). Name it\
    \ `NavigationStack`.\n2.  Select `Main.storyboard` to open the storyboard in the\
    \ **Editor** area. It has one scene already.\n3.  Add two more content view (scenes):\
    \ drag `ViewController` from **Object Library** onto the storyboard twice. [Figure\
    \ 3-27](#9781484204375_Ch03.xhtml#Fig27) depicts the storyboard containing three\
    \ scenes.\n\n![9781484204375_Fig03-27.jpg](images/9781484204375_Fig03-27.jpg)\n\
    \n[Figure 3-27](#9781484204375_Ch03.xhtml#_Fig27). Three storyboard scenes in\
    \ the `NavigationStack` project\n\n4.  Use the counterpart Android Screen One\
    \ layout to guide you as you update the first storyboard scene:\n    1.  Add a\
    \ `Label` from the **Object Library**. Change its font size to **30** and text\
    \ to “`Screen One`”, and center its alignment with the **Attributes Inspector**\
    \ in the **Utility** area.\n    2.  Add Auto Layout constraints to center the\
    \ label as shown in [Figure 3-28](#9781484204375_Ch03.xhtml#Fig28).\n\n![9781484204375_Fig03-28.jpg](images/9781484204375_Fig03-28.jpg)\n\
    \n[Figure 3-28](#9781484204375_Ch03.xhtml#_Fig28). Screen One label with center\
    \ constraints\n\n3.  Add the `Next` button with the right and bottom space constraints\
    \ to anchor the position as shown in [Figure 3-29](#9781484204375_Ch03.xhtml#Fig29).\n\
    \n![9781484204375_Fig03-29.jpg](images/9781484204375_Fig03-29.jpg)\n\n[Figure\
    \ 3-29](#9781484204375_Ch03.xhtml#_Fig29). `Next` button with alignment constraints\n\
    \n5.  Repeat step 4 to add a **“Screen Two”** Label and the `Next` button to the\
    \ **Screen Two** scene.\n6.  Repeat step 4 to add a **“Screen Three”** Label to\
    \ the **Screen Three** scene. [Figure 3-30](#9781484204375_Ch03.xhtml#Fig30) shows\
    \ the UI widgets added to storyboard.\n\n![9781484204375_Fig03-30.jpg](images/9781484204375_Fig03-30.jpg)\n\
    \n[Figure 3-30](#9781484204375_Ch03.xhtml#_Fig30). Three scenes with widgets in\
    \ `NavigationStack` project\n\n7.  Create an Action Segue from the `Next` button\
    \ in Screen One to the Screen Two scene, and another Action Segue from the `Next`\
    \ button in Screen Two to the Screen Three scene.\n\n[Figure 3-31](#9781484204375_Ch03.xhtml#Fig31)\
    \ shows the results of the storyboard. Run the app to see what is working and\
    \ what is not working yet. Nothing is new yet, just repeated steps that create\
    \ storyboard scenes, UI widgets, Auto Layout constraints, and segues that connect\
    \ them together.\n\n![9781484204375_Fig03-31.jpg](images/9781484204375_Fig03-31.jpg)\n\
    \n[Figure 3-31](#9781484204375_Ch03.xhtml#_Fig31). `NavigationStack` storyboard\n\
    \nUINavigationController\n\nANDROID ANALOGY\n\n`FragmentTransaction` Back Stack\n\
    \nThe only missing piece in this iOS project is a way to show the appropriate\
    \ child view controller in the typical push and pop fashions. In iOS, the `UINavigationController`\
    \ manages the push and pop screen navigation stack behaviors. It also provides\
    \ a navigation bar that has a default back button, a title in the center, and\
    \ an optional right button (see [Figure 3-32](#9781484204375_Ch03.xhtml#Fig32)).\n\
    \n![9781484204375_Fig03-32.jpg](images/9781484204375_Fig03-32.jpg)\n\n[Figure\
    \ 3-32](#9781484204375_Ch03.xhtml#_Fig32). The `UINavigationController` navigation\
    \ bar\n\nAll you need to do is to set up a `UINavigationController` that associates\
    \ its root view controller with the first scene:\n\n*   Add a Navigation Controller\
    \ from **Object Library**.\n*   Connect the root view controller segue (in **Connections\
    \ Inspector**) to the first view controller.\n\nYou can accomplish both in one\
    \ simple storyboard operation: embed the Screen One view controller in a Navigation\
    \ Controller as shown in the following steps:\n\n1.  Select Screen One View Controller\
    \ from the storyboard.\n2.  In the Xcode menu bar, select **Editor ![image](images/arrow.jpg)\
    \ Embed In ![image](images/arrow.jpg) Navigation Controller** as shown in [Figure\
    \ 3-33](#9781484204375_Ch03.xhtml#Fig33).\n\n![9781484204375_Fig03-33.jpg](images/9781484204375_Fig03-33.jpg)\n\
    \n[Figure 3-33](#9781484204375_Ch03.xhtml#_Fig33). Creating a Navigation Controller\n\
    \n3.  This creates a Navigation Controller and connects the root view controller\
    \ segue to the Screen One view controller (see [Figure 3-34](#9781484204375_Ch03.xhtml#Fig34)).\n\
    \    1.  The Navigation Controller has a `NavigationBar`.\n    2.  The root view\
    \ controller automatically gets a `NavigationItem` where you can add a center\
    \ `title` and a `rightBarButtonItem`.\n\n![9781484204375_Fig03-34.jpg](images/9781484204375_Fig03-34.jpg)\n\
    \n[Figure 3-34](#9781484204375_Ch03.xhtml#_Fig34). Navigation Controller scene\
    \ and root view controller connection\n\n4.  Select the `NavigationItem` in Screen\
    \ One to add `title` text (i.e., Navigation Stack), as shown in [Figure 3-35](#9781484204375_Ch03.xhtml#Fig35).\n\
    \    1.  The title on the `NavigationBar` also affects the **Back** button title.\
    \ iOS automatically updates the button `title` attribute to reflect where the\
    \ **Back** button is going. The button text defaults to `Back` if the `title`\
    \ is not assigned in the view.\n\n![9781484204375_Fig03-35.jpg](images/9781484204375_Fig03-35.jpg)\n\
    \n[Figure 3-35](#9781484204375_Ch03.xhtml#_Fig35). Title on the Navigation Item\n\
    \n**Note**  The title on the Android Action bar is meant for the App identity.\
    \ The iOS navigation bar title is more meant for the screen title.\n\n5.  Optional:\
    \ The `title` and the `rightBarButtonItem` need to be installed on `NavigationItem`\
    \ as you seen in previous step. If you want to set the `title` attribute or the\
    \ `rightBarButtonItem` to Screen Two or Three, you need to add a `NavigationItem`\
    \ to Screen Two or Three view controller first.\n\n**Note**  The title can be\
    \ derived from the view controller title when **Navigation Item** is not being\
    \ configured.\n\nBuild and run the app to see the live app in action (see [Figure\
    \ 3-36](#9781484204375_Ch03.xhtml#Fig36)).\n\n![9781484204375_Fig03-36.jpg](images/9781484204375_Fig03-36.jpg)\n\
    \n[Figure 3-36](#9781484204375_Ch03.xhtml#_Fig36). The final `NavigationStack`\
    \ app\n\nMaster List with Details Drilldown\n\nANDROID ANALOGY\n\n`ListView` and\
    \ `GridView`.\n\nMany apps need to display a list of items that users can tap\
    \ to view more detailed information. They present a master list of items first,\
    \ and the user selects one item to drill into.\n\nThis is probably one of the\
    \ most common mobile navigation patterns. Both Android and iOS provide guidelines\
    \ and offer system APIs to promote consistency by making the implementation easy\
    \ for developers. In fact, both Xcode and ADT supply project templates for creating\
    \ apps with this UX pattern.\n\nIn ADT, you can get the following master-detail\
    \ app using the ADT **Master/Detail Flow** template. Initially, it presents the\
    \ master list with three items. The app shows the detailed screen with the selected\
    \ item content. You will port this app (see [Figure 3-37](#9781484204375_Ch03.xhtml#Fig37))\
    \ to the iOS platform.\n\n![9781484204375_Fig03-37.jpg](images/9781484204375_Fig03-37.jpg)\n\
    \n[Figure 3-37](#9781484204375_Ch03.xhtml#_Fig37). Android master list detailed\
    \ drilldown\n\nUITableViewController\n\nANDROID ANALOGY\n\nThe implementation\
    \ concept appears very similar with different vocabularies:\n\n*   `ListFragment`\
    \ = `UITableViewController`\n*   List View = Table View\n*   List View Item =\
    \ Table View Cell\n*   List Adapter = Data Source\n\nEven the adapter/data source\
    \ implementations are sort of similar, too.\n\nTo port this Android app to iOS,\
    \ you need two storyboard scenes: one for the master list and the other for the\
    \ detailed content view. To have a fresh start, create a new iOS project:"
  trans: "\n1.  使用 iOS **单视图应用（Single View Application）**模板创建一个新的 Xcode 项目（参见第 2 章“iOS\
    \ 项目剖析”）。将其命名为 `NavigationStack`。\n2.  选择 `Main.storyboard` 以在**编辑器（Editor）**区域打开故事板。其中已包含一个场景。\n\
    3.  再添加两个内容视图（场景）：从**对象库（Object Library）**中拖动 `ViewController` 到故事板上两次。图 3-27\
    \ 展示了包含三个场景的故事板。\n\n![9781484204375_Fig03-27.jpg](img/9781484204375_Fig03-27.jpg)\n\
    \n图 3-27. `NavigationStack` 项目中的三个故事板场景\n\n4.  参照对应的 Android Screen One 布局，指导你更新第一个故事板场景：\n\
    \    1.  从**对象库（Object Library）**中添加一个`标签（Label）`。将其字体大小改为**30**，文字设为“`Screen\
    \ One`”，并通过**工具区（Utility area）**的**属性检查器（Attributes Inspector）**居中对齐。\n    2.\
    \  添加自动布局约束以居中标签，如图 3-28 所示。\n\n![9781484204375_Fig03-28.jpg](img/9781484204375_Fig03-28.jpg)\n\
    \n图 3-28. 带有居中约束的 Screen One 标签\n\n3.  添加带右部和底部空间约束的`下一步（Next）`按钮以固定位置，如图 3-29\
    \ 所示。\n\n![9781484204375_Fig03-29.jpg](img/9781484204375_Fig03-29.jpg)\n\n图 3-29.\
    \ 带对齐约束的`下一步（Next）`按钮\n\n5.  重复步骤 4，向**Screen Two**场景添加一个**“Screen Two”**标签和`下一步（Next）`按钮。\n\
    6.  重复步骤 4，向**Screen Three**场景添加一个**“Screen Three”**标签。图 3-30 显示了添加到故事板的 UI 组件。\n\
    \n![9781484204375_Fig03-30.jpg](img/9781484204375_Fig03-30.jpg)\n\n图 3-30. `NavigationStack`\
    \ 项目中带有组件的三个场景\n\n7.  创建一个从 Screen One 的`下一步（Next）`按钮到 Screen Two 场景的 Action Segue，以及另一个从\
    \ Screen Two 的`下一步（Next）`按钮到 Screen Three 场景的 Action Segue。\n\n图 3-31 展示了故事板的结果。运行应用，查看哪些功能正常、哪些还不正常。目前还没有新内容，只是重复了创建故事板场景、UI\
    \ 组件、自动布局约束以及连接它们的转场（Segue）的步骤。\n\n![9781484204375_Fig03-31.jpg](img/9781484204375_Fig03-31.jpg)\n\
    \n图 3-31. `NavigationStack` 故事板\n\n## `UINavigationController`\n\n**Android 类比**\n\
    \n`FragmentTransaction` 返回栈\n\n这个 iOS 项目中唯一缺失的部分是一种以典型的推入（push）和弹出（pop）方式来显示合适子视图控制器的方法。在\
    \ iOS 中，`UINavigationController` 管理推入和弹出屏幕的导航栈行为。它还提供了一个导航栏，其中包含默认的后退按钮、居中的标题以及可选的右侧按钮（参见图\
    \ 3-32）。\n\n![9781484204375_Fig03-32.jpg](img/9781484204375_Fig03-32.jpg)\n\n\
    图 3-32. `UINavigationController` 导航栏\n\n你只需要设置一个 `UINavigationController`，并将其根视图控制器与第一个场景关联：\n\
    \n*   从**对象库（Object Library）**中添加一个导航控制器（Navigation Controller）。\n*   将根视图控制器转场（在**连接检查器（Connections\
    \ Inspector）**中）连接到第一个视图控制器。\n\n你可以通过一个简单的故事板操作同时完成这两件事：将 Screen One 视图控制器嵌入到导航控制器中，步骤如下：\n\
    \n1.  从故事板中选择 Screen One 视图控制器。\n2.  在 Xcode 菜单栏中，依次选择**编辑器（Editor）![image](img/arrow.jpg)\
    \ 嵌入于（Embed In）![image](img/arrow.jpg) 导航控制器（Navigation Controller）**，如图 3-33\
    \ 所示。\n\n![9781484204375_Fig03-33.jpg](img/9781484204375_Fig03-33.jpg)\n\n图 3-33.\
    \ 创建导航控制器\n\n3.  这将创建一个导航控制器，并将根视图控制器转场连接到 Screen One 视图控制器（参见图 3-34）。\n    1.\
    \  导航控制器有一个`导航栏（NavigationBar）`。\n    2.  根视图控制器会自动获得一个`导航项（NavigationItem）`，你可以在其中添加居中的`标题（title）`和\
    \ `rightBarButtonItem`。\n\n![9781484204375_Fig03-34.jpg](img/9781484204375_Fig03-34.jpg)\n\
    \n图 3-34. 导航控制器场景与根视图控制器的连接\n\n4.  选择 Screen One 中的 `NavigationItem`，添加`标题（title）`文本（例如\
    \ Navigation Stack），如图 3-35 所示。\n    1.  导航栏上的`标题`也会影响**返回（Back）**按钮的标题。iOS 会自动更新按钮的\
    \ `title` 属性，以反映**返回**按钮的目的地。如果视图中未分配 `title`，按钮文本默认为`Back`。\n\n![9781484204375_Fig03-35.jpg](img/9781484204375_Fig03-35.jpg)\n\
    \n图 3-35. 导航项上的标题\n\n**注**  Android 操作栏上的标题主要用于应用标识。iOS 导航栏的标题则更倾向于表示屏幕标题。\n\n\
    5.  可选：如你在上一步中所见，需要在 `NavigationItem` 上安装 `title` 和 `rightBarButtonItem`。如果你想为\
    \ Screen Two 或 Screen Three 设置 `title` 属性或 `rightBarButtonItem`，则需要先在 Screen Two\
    \ 或 Screen Three 视图控制器中添加一个 `NavigationItem`。\n\n**注**  当**导航项（Navigation Item）**未配置时，标题可以从视图控制器标题中派生。\n\
    \n构建并运行应用，查看应用的实际运行效果（参见图 3-36）。\n\n![9781484204375_Fig03-36.jpg](img/9781484204375_Fig03-36.jpg)\n\
    \n图 3-36. 最终的 `NavigationStack` 应用\n\n## 主-详情列表（Master List with Details Drilldown）\n\
    \n**Android 类比**\n\n`ListView` 和 `GridView`。\n\n许多应用需要显示一个项目列表，用户可以点击这些项目查看更详细的信息。它们首先呈现一个主列表，用户选择一个项目后进入详情页面。\n\
    \n这可能是最常用的移动导航模式之一。Android 和 iOS 都提供了相关指南和系统 API，通过简化开发者的实现来促进一致性。事实上，Xcode 和\
    \ ADT 都提供了用于创建具有这种用户体验模式的应用的项目模板。\n\n在 ADT 中，你可以使用 ADT 的**主/详情流（Master/Detail\
    \ Flow）**模板创建以下主-详情应用。最初，它呈现包含三个项目的主列表。应用随后显示包含所选项目内容的详情屏幕。你将把此应用（参见图 3-37）移植到\
    \ iOS 平台。\n\n![9781484204375_Fig03-37.jpg](img/9781484204375_Fig03-37.jpg)\n\n\
    图 3-37. Android 主列表详情下钻\n\n## `UITableViewController`\n\n**Android 类比**\n\n实现概念非常相似，只是使用的术语不同：\n\
    \n*   `ListFragment` = `UITableViewController`\n*   列表视图 = 表视图（Table View）\n*\
    \   列表视图项 = 表视图单元格（Table View Cell）\n*   列表适配器 = 数据源（Data Source）\n\n甚至适配器/数据源的实现也有些类似。\n\
    \n要将这个 Android 应用移植到 iOS，你需要两个故事板场景：一个用于主列表，另一个用于详情内容视图。为了重新开始，创建一个新的 iOS 项目：\n"
- fmt: "1.  Launch Xcode and create a new application using the usual **Single View\
    \ Application** template, and name it `MasterDetail`.\n    1.  You get a `ViewController`\
    \ class that already pairs with a scene in `Main.storyboard`. Use this pair for\
    \ the detail view screen.\n2.  Create the master list storyboard scene and draw\
    \ a segue to connect the two scenes. [Figure 3-38](#9781484204375_Ch03.xhtml#Fig38)\
    \ depicts the result of the storyboard work.\n    1.  Drag the `UITableViewController`\
    \ from the **Object Library**, and drop it in the storyboard editor.\n    2. \
    \ Create a Manual Segue from the `UITableViewController` to the detailed view\
    \ controller with the `Show` transition type (see [Figure 3-25](#9781484204375_Ch03.xhtml#Fig25)).\
    \ Always give the segue an identifier, such as `detail` (see [Figure 3-24](#9781484204375_Ch03.xhtml#Fig24)).\n\
    3.  Select the Table View Cell in the `UITableViewController` scene and open the\
    \ **Attribute Inspector** to configure the Table View Cell (see pointers in [Figure\
    \ 3-38](#9781484204375_Ch03.xhtml#Fig38)):\n    1.  Style: Select `Basic` (or\
    \ others to see what they are in the editor).\n    2.  Identifier: Enter `mycell`.\
    \ Always give it an identifier. You need it to create reusable cells, just as\
    \ the Android recycled list item does.\n    3.  Accessory: Select `Detail`.\n\
    \    4.  Optionally, you may add an `image` that shows the icon on the left.\n\
    \n![9781484204375_Fig03-38.jpg](images/9781484204375_Fig03-38.jpg)\n\n[Figure\
    \ 3-38](#9781484204375_Ch03.xhtml#_Fig38). `TableViewCell` attributes\n\n4.  Embed\
    \ the `UITableViewController` in a Navigation Controller (see [Figure 3-33](#9781484204375_Ch03.xhtml#Fig33)\
    \ in Navigation Stack). You normally use a Navigation Stack pattern for the screen\
    \ transitions.\n5.  Check the **Is the Initial Scene** in the Navigation Controller\
    \ **Attributes Inspector** (see [Figure 3-39](#9781484204375_Ch03.xhtml#Fig39))\
    \ to make the Navigation Controller the starting view controller of this app.\n\
    \n![9781484204375_Fig03-39.jpg](images/9781484204375_Fig03-39.jpg)\n\n[Figure\
    \ 3-39](#9781484204375_Ch03.xhtml#_Fig39). `MasterDetail` storyboard\n\n6.  Create\
    \ a `MasterTableViewController` Swift class in the `ViewController.swift` file\
    \ as shown in [Listing 3-6](#9781484204375_Ch03.xhtml#list6).\n    1.  Subclass\
    \ `MasterTableViewController` from `UITableViewController`.\n    2.  Pair this\
    \ `MasterTableViewController` class with the Table View Controller scene in the\
    \ **Identity Inspector** (see [Figure 3-17](#9781484204375_Ch03.xhtml#Fig17)).\n\
    \n[***Listing 3-6***](#9781484204375_Ch03.xhtml#_list6). `MasterListTableViewController`\
    \ Class\n\n```\nclass MasterTableViewController : UITableViewController {\n  //\
    \ TODO\n}\n```\n\n**Note** In Swift, the class doesn’t need to be in its own file.\
    \ I choose to put in it the existing `ViewController.swift` file for no particular\
    \ reason. If you are used to the Java way, you may create a new file to host this\
    \ class.\n\n`UITableViewDataSource`\n\nANDROID ANALOGY\n\n`android.widget.Adapter`.\n\
    \nTo populate the items in the Table View, you implement a Data Source: provide\
    \ the `TableViewCell` with data by overriding the methods defined in the `UITableViewDataSource`\
    \ protocol (see [Listing 3-7](#9781484204375_Ch03.xhtml#list7)). Do the following\
    \ in the `MasterDetail` project:\n\n1.  Implement `tableView(tableView,numberOfRowsInSection)`\
    \ to return number of items in the `tableView`.\n2.  Implement `tableView(tableView,\
    \ cellForRowAtIndexPath)` to return the `tableViewCell` instance.\n\n[***Listing\
    \ 3-7***](#9781484204375_Ch03.xhtml#_list7). Implement `UITableViewDataSource`\
    \ Protocol\n\n```\nclass MasterTableViewController : UITableViewController {\n\
      var items = [\"item 1\", \"item 2\", \"item 3\"]\n\noverride func tableView(tableView:\
    \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return self.items.count\n\
      }\n\noverride func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\
    \ NSIndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCellWithIdentifier(\"\
    mycell\") as UITableViewCell\n    cell.textLabel.text = self.items[indexPath.row]\n\
        return cell\n  }\n}\n```\n\n**Note** Use `dequeueReusableCellWithIdentifier(...)`\
    \ to implement recycled views. This is a very common pattern for saving memory\
    \ with a large amount of items, and iOS makes it easy by offering this method.\
    \ Make sure you assign a cell identifier in storyboard.\n\n`UITableViewDelegate`\n\
    \nANDROID ANALOGY\n\n`ListFragment.onListItemClick(...)`.\n\nTo handle Table View\
    \ item selected events, override the `UITableViewDelegate.tableView(tableView,\
    \ didSelectRowAtIndexPath)` method (see [Listing 3-8](#9781484204375_Ch03.xhtml#list8)):\n\
    \n1.  Implement `UITableViewDelegate.didSelectRowAtIndexPath(...)` to perform\
    \ segues\n2.  Implement a `prepareForSegue(...)` callback to pass data to the\
    \ detail view controller (see **[Listing 3-5](#9781484204375_Ch03.xhtml#list5)**\
    \ for details).\n\n[***Listing 3-8***](#9781484204375_Ch03.xhtml#_list8). Implementing\
    \ `UITableViewDelegate`\n\n```\n    class MasterTableViewController : UITableViewController\
    \ {\n      ...\n      override func tableView(tableView: UITableView, didSelectRowAtIndexPath\
    \ indexPath: NSIndexPath) {\n        self.performSegueWithIdentifier(\"detail\"\
    , sender: indexPath.row)\n      }\n\noverride func prepareForSegue(segue: UIStoryboardSegue,\
    \ sender: AnyObject?) {\n        var destVc = segue.destinationViewController\
    \ as UIViewController\n        destVc.navigationItem.title = self.items[sender\
    \ as Int]\n      }\n    ```\n\n3.  To add or delete items, you need to explicitly\
    \ refresh the table view:\n    1.  Drag and drop a **Bar Button Item** to the\
    \ navigation bar and draw an `IBAction` to create the `doAdd()` method ([Figure\
    \ 3-40](#9781484204375_Ch03.xhtml#Fig40)).\n\n![9781484204375_Fig03-40.jpg](images/9781484204375_Fig03-40.jpg)\n\
    \n[Figure 3-40](#9781484204375_Ch03.xhtml#_Fig40). Navigation bar right button\n\
    \n2.  To add an item when the `Add` button is selected, implement the `doAdd()`\
    \ method as shown in [Listing 3-9](#9781484204375_Ch03.xhtml#list9). Make sure\
    \ you call `TableView.reloadData()` in the main thread to refresh the table view\
    \ just like the `notifyDataSetChanged()` does in Android.\n\n[***Listing 3-9***](#9781484204375_Ch03.xhtml#_list9).\
    \ Refresh Table View\n\n```\n    class MasterTableViewController : UITableViewController\
    \ {\n      var items = [\"item 1\", \"item 2\", \"item 3\"]\n\n@IBAction func\
    \ doAdd(sender: AnyObject) {\n        self.items.append(\"item \\(self.items.count\
    \ + 1)\")\n        self.tableView.reloadData()\n      }\n      ...\n    ```\n\n\
    Build and run (![image](images/flower.jpg)+R) the app to see the `MasterDetail`\
    \ iOS app live in action (see [Figure 3-41](#9781484204375_Ch03.xhtml#Fig41)).\n\
    \n![9781484204375_Fig03-41.jpg](images/9781484204375_Fig03-41.jpg)\n\n[Figure\
    \ 3-41](#9781484204375_Ch03.xhtml#_Fig41). `MasterDetail` app screens in iOS\n\
    \n`UITableView`\n\nANDROID ANALOGY\n\n`android.widget.ListView`.\n\nJust like\
    \ the Android `ListFragment` class, which is a `Fragment` containing a `ListView`,\
    \ `UITableViewController` is a regular `UIViewController` with a pre-wired `tableView`\
    \ in it. You will have the same choice to make: whether or not to use `UITableViewController`,\
    \ which simplifies some coding for you (actually not that much, IMO). More often,\
    \ I choose to do the following instead of using `UITableViewController`:"
