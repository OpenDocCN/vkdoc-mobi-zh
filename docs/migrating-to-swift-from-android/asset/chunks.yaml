    \ Xcode Playground\n\n### JAVA 类比\n\nJava 草稿本。\n\n## 变量和常量\n\n使用`var`关键字声明变量，使用`let`声明常量。Java\
    \ 变量总是在封闭的花括号内定义，而 Swift 变量如果在封闭的花括号外定义，则是全局变量。以下代码片段（参见[示例 2-7](#9781484204375_Ch02.xhtml#list7)）展示了\
    \ Swift 变量的用法：\n\n[***示例 2-7***](#9781484204375_Ch02.xhtml#_list7). 常见变量用法\n\n\
    ```\nvar GlobalVar : String = \"Global Variable\"; // 全局作用域\n\nclass MyClass {\n\
      var mProperty : String = \"\"; // 类作用域\n  let mConstant : Int = 0; // 常量\n\n\
    func myMethod(arg : String) {\n    var aVar : String = \"\"; // 方法作用域内的局部变量\n\
        let aConstant = 1;\n  }\n}\n```\n\n## 类型安全与类型推断\n\nJava 和 Swift 都是类型安全的语言。任何变量都必须用类型声明；编译器将帮助标记任何不匹配的类型。在\
    \ Swift 中，如果类型可以根据其值推断出来，则不需要显式声明类型。[示例 2-8](#9781484204375_Ch02.xhtml#list8)\
    \ 本质上与[示例 2-7](#9781484204375_Ch02.xhtml#list7) 完全相同。Swift 的类型推断功能鼓励开发者分配初始值，从而减少因未初始化数据导致的常见错误。\n\
    \n[***示例 2-8***](#9781484204375_Ch02.xhtml#_list8). 常见类型推断用法\n\n```\nvar GlobalVar\
    \ = \"Global Variable\"\n\nclass MyClass {\n  var mProperty = \"\"\n  let mConstant\
    \ = 0\n\nfunc myMethod(arg : String) {\n    var aVar = \"\";\n    let aConstant\
    \ = 1\n  }\n}\n```\n\n## 可选变量\n\n可选变量使用类型和后缀问号（`?`）声明，称为可选类型。这表示它所包含的值可能是缺失的（`nil`，相当于\
    \ Java 中的`null`），而不会是预期类型。例如，[示例 2-9](#9781484204375_Ch02.xhtml#list9) 展示了在 Swift\
    \ 和 Java 中将字符串转换为整数的区别。\n\n[***示例 2-9***](#9781484204375_Ch02.xhtml#_list9). Swift\
    \ 中的可选类型 vs. Java 中的异常处理\n\n```\n////// Java NumberFormatException\nString intStr\
    \ = \"123\"; // or \"xYz\"\nint myInt;\ntry {\n  myInt = Integer.parseInt(\"234\"\
    );\n} catch (NumberFormatException e) {\n  myInt = Integer.MAX_VALUE;\n}\n\n//////\
    \ Swift Optional Int\nvar intStr = \"123\"\nvar myInt : Int? = intStr.toInt()\
    \ // myInt 可以为 nil\n```\n\n可选类型通过鼓励开发者理解变量是否可能缺失，使 Swift 语言更类型安全、更健壮。[示例 2-10](#9781484204375_Ch02.xhtml#list10)\
    \ 展示了两种实用的 Swift 可选类型用法：\n\n*   **强制解包**，使用后缀感叹号（`!`）\n*   **可选绑定**\n\n[***示例\
    \ 2-10***](#9781484204375_Ch02.xhtml#_list10). Swift 可选 Int\n\n```\nvar intStr\
    \ = \"123\"\nvar myOptionalInt : Int? = intStr.toInt() // 可选 Int\nif myOptionalInt\
    \ != nil {\n  var myInt = myOptionalInt! // 解包 Int? 为 Int\n  println(\"unwrapped\
    \ Int: \\(myInt)\")\n}\n```"
