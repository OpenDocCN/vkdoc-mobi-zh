    \n[图 4-35](#9781484204375_Ch04.xhtml#_Fig35). 在 iPad 模拟器中全屏播放视频与嵌入播放视频\n\n## WebView\n\
    \n### ANDROID ANALOGY\n\n`android.widget.WebView`。\n\n你可以在几乎所有主流移动平台（包括 iOS、Android、BlackBerry\
    \ 和 Windows Phone）的移动应用中显示丰富的 HTML 内容。这使你能够将 Web 内容作为移动应用的一部分来交付。一种常见场景是，当你希望在你的应用中提供需要频繁更新的信息，并且希望将内容托管在线上作为网页时。更进一步，Web\
    \ 内容不必是远程的；你可以将网页内容与原生应用打包在一起。这使得 Web 开发人员能够利用他们的 Web 开发技能，创建所谓的混合型应用。\n\n借助 HTML5\
    \ 和 CSS3 的新特性，许多 Web 开发人员正在创建有意义且具有交互性的 Web 应用，这正在缩短原生应用与移动 Web 应用之间的差距。在 iOS\
    \ 中，关键的 SDK 类是 `UIWebView`，它支持许多 HTML5 和 CSS3 特性（例如 `Offline Cache` 和 `WebSocket`\
    \ 等）。\n\n例如，以下步骤演示了使用 `UIWebView` 的常见任务：\n\n1. 选择 `Main.storyboard`，从 **Object\
    \ Library** 中拖拽一个 `UIWebView`，并将其放置在视频 `View` 下方（参见[图 4-36](#9781484204375_Ch04.xhtml#Fig36)）。在\
    \ **Attributes Inspector** 中设置其属性；通常设置为 **Scales Page To Fit**。\n\n   ![9781484204375_Fig04-36.jpg](images/9781484204375_Fig04-36.jpg)\n\
    \n   [图 4-36](#9781484204375_Ch04.xhtml#_Fig36). iOS `UIWebView` 在 Connections\
    \ Inspector 中的属性\n\n2. 像往常一样，打开 **Assistant Editor** 并在 **Connections Inspector**\
    \ 中将以下 Outlet 连接到你的代码（参见[图 4-36](#9781484204375_Ch04.xhtml#Fig36)）：\n   1. 连接\
    \ `IBOutlet`，以便你可以在代码中使用该控件。\n   2. 连接 `delegate` Outlet，以便你的代码可以拦截 `UIWebView`\
    \ 的生命周期事件。\n\n3. [列表 4-18](#9781484204375_Ch04.xhtml#list18) 演示了常用于 `UIWebView`\
    \ 的编程代码。\n   1. 使用 `loadRequest(...)` 加载 URL。你也可以创建一个文件 URL 来加载本地 HTML 文件。\n \
    \  2. 使用 `loadHTMLString(...)` 渲染简单的字符串文本。\n   3. 虽然此处未演示，但你也可以使用 `loadData(...)`\
    \ 来渲染通常通过 `NSURLConnection` 从远程内容获取的 `NSData`，我将在后面的 “`NSURLConnection`” 章节中演示这一点。\n\
    \n[***列表 4-18***](#9781484204375_Ch04.xhtml#_list18). 用于加载 URL 或字符串文本的 `UIWebView`\
    \ 代码\n\n```swift\nclass ViewController: ... {\n    ...\n    override func viewDidLoad()\
    \ {\n        ...\n        //    self.showWebPage(url: \"http://pdachoice.com/me/webview\"\
    )\n        self.showWebPage(htmlString: \"<H1>Hello UIWebView</H1>\")\n    }\n\
    \    ...\n    @IBOutlet weak var mWebView: UIWebView!\n    func showWebPage(#url:\
    \ String) {\n        var req = NSURLRequest(URL: NSURL(string: url)!)\n      \
    \  self.mWebView.loadRequest(req)\n    }\n\n    func showWebPage(#htmlString:\
    \ String) {\n        self.mWebView.loadHTMLString(htmlString, baseURL: nil)\n\
    \    }\n    ...\n}\n```\n\n4. 要拦截 `UIWebView` 的生命周期事件，请实现 `UIWebViewDelegate`\
    \ 协议，如[列表 4-19](#9781484204375_Ch04.xhtml#list19) 所示。\n\n[***列表 4-19***](#9781484204375_Ch04.xhtml#_list19).\
    \ `UIWebViewDelegate` 协议\n\n```swift\nclass ViewController: ... , UIWebViewDelegate{\n\
    \    ...\n    func webView(webView: UIWebView, shouldStartLoadWithRequest request:\
    \ NSURLRequest, navigationType: UIWebViewNavigationType) -> Bool {\n        //\
    \ do something, like re-direct or intercept etc.\n        return true; // false\
    \ to stop http request\n    }\n    func webViewDidStartLoad(webView: UIWebView)\
    \ {\n        // do something, e.g., start UIActivityViewIndicator\n        self.mActivityIndicator.startAnimating()\n\
    \    }\n    func webViewDidFinishLoad(webView: UIWebView) {\n        // do something,\
    \ e.g., stop  UIActivityViewIndicator\n        self.mActivityIndicator.stopAnimating()\n\
    \    }\n    func webView(webView: UIWebView, didFailLoadWithError error: NSError)\
    \ {\n        // do something, i.e., show error alert\n        self.mActivityIndicator.stopAnimating()\n\
    \        var alert = UIAlertController(title: \"Error\", message: error.localizedDescription,\
    \ preferredStyle: UIAlertControllerStyle.Alert)\n        alert.addAction(UIAlertAction(title:\
    \ \"Close\", style: UIAlertActionStyle.Cancel, handler: nil))\n        self.presentViewController(alert,\
    \ animated: true, completion: nil)\n    }\n    ...\n}\n```\n\n构建并运行应用，查看 iOS `UIWebView`\
    \ 的实际效果。现在，即使是 iPad Air 的屏幕也显得太小了（参见[图 4-37](#9781484204375_Ch04.xhtml#Fig37)）。你需要一个类似\
    \ Android 的 `ScrollView`，接下来你将实现它。\n\n![9781484204375_Fig04-37.jpg](images/9781484204375_Fig04-37.jpg)\n\
    \n[图 4-37](#9781484204375_Ch04.xhtml#_Fig37). iPad Air 模拟器中的 `UIWebView`\n\n##\
    \ ScrollView\n\n### ANDROID ANALOGY\n\n`android.widget.ScrollView`。\n\n由于移动设备屏幕尺寸较小，`ScrollView`\
    \ 对于显示比物理显示屏更大的内容视图非常有用。要在 iOS 中实现这一点，你需要使用 `UIScrollView`。\n\n要使 `UIScrollView`\
    \ 与自动布局配合使用，更简单的方法是首先将所有控件包裹在一个容器视图中，这将使你能够像往常使用自动布局一样在容器视图中布局控件。\n\n以下步骤演示了如何在\
    \ `CommonWidgets` 应用中通常使用 iOS `UIScrollView` 的操作方法：\n\n1. 选择根 `View` 中的所有控件，从\
    \ Xcode 菜单栏中选择 **Embed In** ![image](images/arrow.jpg) **View**，将这些通用控件嵌入到一个 `View`\
    \ 中（参见[图 4-38](#9781484204375_Ch04.xhtml#Fig38)），并将此 Storyboard 标签更改为 `containerView`。\n\
    \n   ![9781484204375_Fig04-38.jpg](images/9781484204375_Fig04-38.jpg)\n\n   [图\
    \ 4-38](#9781484204375_Ch04.xhtml#_Fig38). 将所有控件嵌入到一个 `View` 中\n\n2."
