    [***Listing 4-22***](#9781484204375_Ch04.xhtml#_list22). `SaveData` `ViewController`\
    \  \n\n```swift\nclass ViewController: UIViewController, UITextFieldDelegate {\n\
    \  ...\n  let STORAGE_KEY = \"key\"\n  @IBOutlet weak var mTextField: UITextField!\n\
    \  override func viewDidLoad() {\n    ...\n    self.mTextField.text = self.retrieveUserInput()\n\
    \  }\n\n  @IBAction func doDelete(sender: AnyObject) {\n    self.deleteUserInput();\n\
    \  }\n\n  func textFieldShouldReturn(textField: UITextField!) -> Bool {\n    ...\n\
    \    self.saveUserInput(self.mTextField.text)\n    return true\n  }\n\n  func\
    \ saveUserInput(str: String) {\n    // TODO\n  }\n\n  func retrieveUserInput()\
    \ -> String? {\n    // TODO\n    return nil\n  }\n\n  func deleteUserInput() {\n\
    \    // TODO\n  }\n  ...\n}\n```\n\nNothing is new yet. Build and run the `SaveData`\
    \ project (see [Figure 4-45](#9781484204375_Ch04.xhtml#Fig45)).  \n\n![9781484204375_Fig04-45.jpg](images/9781484204375_Fig04-45.jpg)\
    \  \n\n[Figure 4-45](#9781484204375_Ch04.xhtml#_Fig45). The `SaveData` project\
    \ display  \n\nWithout completing the method stubs, this new project exhibits\
    \ a common problem that can be observed in the following three steps:  \n\n1.\
    \  Enter something in the input text field.  \n2.  Exit the app.  \n3.  Relaunch\
    \ the app. The previous input is gone!  \n\nFor typical app settings or user preferences,\
    \ users are not happy if they need to reenter them every time they launch the\
    \ app. The app needs to save the data and load it back when the app restarts.\
    \  \n\n## NSUserDefaults  \n\n**ANDROID ANALOGY**  \n`SharedPreferences`.  \n\n\
    Just like Android’s `SharedPreferences`, which saves key-value pairs of primitive\
    \ data types, you use the `NSUserDefaults` class to interface with iOS’s `User\
    \ Defaults system` for the same purpose. `NSUserDefaults` takes care of data caching\
    \ and syncing for developers. It is easy to use and its performance is already\
    \ optimized.  \n\nThe values to be managed in the iOS defaults system can be primitives\
    \ or the so-called property list object (e.g., `NSData`, `NSString`, `NSNumber`,\
    \ `NSDate`, `NSArray`, or `NSDictionary`). For `NSArray` and `NSDictionary` objects,\
    \ their contents must be property list objects as well.  \n\nContinue with the\
    \ `SaveData` project. You are going to fix the problem you just observed.  \n\n\
    1.  Create the convenient methods that save, retrieve, and delete data using the\
    \ `NSUserDefaults` API (see [Listing 4-23](#9781484204375_Ch04.xhtml#list23)):\
    \  \n\n    1.  Get the `NSUserDefaults` object.  \n    2.  You may accumulate\
    \ multiple updates and call `synchronize()` to send the batched updates to the\
    \ `defaults system` storage.  \n\n[***Listing 4-23***](#9781484204375_Ch04.xhtml#_list23).\
    \ Save, Retrieve, and Delete in `defaults system`  \n\n```swift\nclass ViewController:\
    \ UIViewController, UITextFieldDelegate {\n  ...\n  let userDefaults = NSUserDefaults.standardUserDefaults()\n\
    \  func saveUserdefault(data: AnyObject, forKey: String) {\n    userDefaults.setObject(data,\
    \ forKey: forKey)\n    userDefaults.synchronize()\n  }\n\n  func retrieveUserdefault(key:\
    \ String) -> String? {\n    var obj = userDefaults.stringForKey(key)\n    return\
    \ obj\n  }\n\n  func deleteUserDefault(key: String) {\n    self.userDefaults.removeObjectForKey(key)\n\
    \  }\n  ...\n}\n```\n\n2.  Earlier, you already created the stubs that are wired\
    \ to the right events. Call the convenient methods just created to complete the\
    \ persistent code (see [Listing 4-24](#9781484204375_Ch04.xhtml#list24)).  \n\n\
    [***Listing 4-24***](#9781484204375_Ch04.xhtml#_list24). Save, Retrieve, and Delete\
    \ using the `UserDefaults` system  \n\n```swift\nclass ViewController: UIViewController,\
    \ UITextFieldDelegate {\n  ...\n  func saveUserInput(str: String) {\n    self.saveUserdefault(str,\
    \ forKey: STORAGE_KEY)\n  }\n\n  func retrieveUserInput() -> String? {\n    return\
    \ self.retrieveUserdefault(STORAGE_KEY)\n  }\n\n  func deleteUserInput() {\n \
    \   self.deleteUserDefault(STORAGE_KEY)\n  }\n  ...\n}\n```\n\nRelaunch the `SaveData`\
    \ project and repeat the failed test case. You should no longer need to reenter\
    \ the name when reopening the app.  \n\n## File Storage  \n\nJust like Java, the\
    \ iOS SDK provides system APIs to interface with the file system. In iOS, you\
    \ commonly use the following API:  \n\n*   The `NSFileManager` class.  \n*   The\
    \ `NSString`, `NSArray`, `NSDictionary`, and `NSData` Foundation classes also\
    \ have convenient methods to store and retrieve themselves from file systems.\
    \  \n\n### NSFileManager  \n\n**ANDROID ANALOGY**  \n`java.io.File`.  \n\nIf you\
    \ need to perform any file-related tasks to manipulate `File` and `Directory`,\
    \ the `NSFileManager` class provides the API to do the work. You need to specify\
    \ the file path or file URL for the destination file and specify the `NSData`\
    \ object for the file contents.  \n\nTo show and to learn by example, use `NSFileManager`\
    \ to achieve the same save/retrieve/delete purpose.  \n\n1.  Create the convenient\
    \ methods that save, retrieve, and delete data using the `NSFileManager` API (see\
    \ [Listing 4-25](#9781484204375_Ch04.xhtml#list25)):  \n\n    1.  Get the `NSFileManager`\
    \ object.  \n    2.  Use `NSHomeDirectory().stringByAppendingPathComponent(...)`\
    \ to build the iOS file path.  \n    3.  `NSFileManager` deals with `NSData`,\
    \ which can be converted to common Foundation data types (e.g., String, array\
    \ and dictionary).  \n\n[***Listing 4-25***](#9781484204375_Ch04.xhtml#_list25).\
    \ Manage Data in files using `NSFileManager`  \n\n```swift\nclass ViewController:\
    \ UIViewController, UITextFieldDelegate {\n  ...\n  let fileMgr = NSFileManager.defaultManager()\n\
    \  func saveToFile(str: String, file: String) {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
    Documents\").stringByAppendingPathComponent(file)\n    var data = str.dataUsingEncoding(NSUTF8StringEncoding)\n\
    \    var ok = fileMgr.createFileAtPath(path, contents: data, attributes: nil)\n\
    \  }\n\n  func retrieveFromFile(file: String) -> String? {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
    Documents\").stringByAppendingPathComponent(file)\n    var data = fileMgr.contentsAtPath(path)\n\
    \    var str = NSString(data:data, encoding: NSUTF8StringEncoding)\n\n    return\
    \ str\n  }\n\n  func deleteFile(file: String) {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
    Documents\").stringByAppendingPathComponent(file)\n    var ok = fileMgr.removeItemAtPath(path,\
    \ error: nil)\n  }\n  ...\n}\n```\n\n**Note**  Each app can only write to certain\
    \ folders inside the application home (e.g., the `Documents` folder). As in Android,\
    \ the most common write error is probably trying to create a file in the wrong\
    \ place.  \n\n2.  Call the convenient methods just created to complete the persistent\
    \ code that uses `NSFileManager` (see [Listing 4-26](#9781484204375_Ch04.xhtml#list26)).\
    \  \n\n[***Listing 4-26***](#9781484204375_Ch04.xhtml#_list26). Save, Retrieve,\
    \ and Delete in File using `NSFileManager`  \n\n```swift\nclass ViewController:\
    \ UIViewController, UITextFieldDelegate {\n  ...\n  func saveUserInput(str: String)\
    \ {\n    //    self.saveUserdefault(str, forKey: STORAGE_KEY)\n    self.saveToFile(str,\
    \ file: STORAGE_KEY)\n  }\n\n  func retrieveUserInput() -> String? {\n    // \
    \   return self.retrieveUserdefault(STORAGE_KEY)\n    return self.retrieveFromFile(STORAGE_KEY)\n\
    \  }\n\n  func deleteUserInput() {\n    //    self.deleteUserDefault(STORAGE_KEY)\n\
    \    self.deleteFile(STORAGE_KEY)\n  }\n  ...\n}\n```\n\nMany Foundation data\
