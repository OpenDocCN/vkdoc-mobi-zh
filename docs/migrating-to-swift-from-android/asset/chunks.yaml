    \    1.  一个用于调用 HTTP `GET` 的 `UIButton`\n    2.  一个用于调用 HTTP `POST` 的 `UIButton`\n\
    \    3.  一个用于接收用户输入的 `UITextField`\n    4.  一个用于渲染 HTTP 响应的 `UIWebView`\n\n  \
    \      ![9781484204375_Fig04-47.jpg](img/9781484204375_Fig04-47.jpg)\n\n     \
    \   图 4-47. `RestClient` 故事板\n\n3.  将故事板输出口连接到代码（参见 代码清单 4-29）：\n    1.  将 `GET`\
    \ 按钮的 `Touch Down` 事件连接到 `doGet()` IBAction 方法。\n    2.  将 `POST` 按钮的 `Touch Down`\
    \ 事件连接到 `doPost()` IBAction 方法。\n    3.  将 `UITextField` 委托输出口连接到 `ViewController`\
    \ 类。\n    4.  将 `UIWebView` 委托连接到 `ViewController` 类。\n    5.  将文本字段的 `New Referencing\
    \ Outlet` 连接到 `ViewController mTextField IBOutlet` 属性。\n    6.  将网页视图的 `New Referencing\
    \ Outlet` 连接到 `ViewController mWebView IBOutlet` 属性。\n\n***代码清单 4-29***. `RestClient`\
    \ 准备代码\n\n```swift\nclass ViewController: UIViewController, UITextFieldDelegate,\
    \ UIWebViewDelegate {\n    @IBOutlet weak var mWebView: UIWebView!\n    @IBOutlet\
    \ weak var mTextField: UITextField!\n\n    override func viewDidLoad() {\n   \
    \     super.viewDidLoad()\n        // 在这里进行其他初始化设置...\n    }\n\n    func textFieldShouldReturn(textField:\
    \ UITextField!) -> Bool {\n        textField.resignFirstResponder();\n       \
    \ return true\n    }\n\n    @IBAction func doGet(sender: AnyObject) {\n    }\n\
    \n    @IBAction func doPost(sender: AnyObject) {\n    }\n}\n```\n\n这些内容并无新意，只是重复的故事板任务以及将输出口连接到带有方法存根的代码的过程。接下来，你将在这些存根中填充主要内容。\n\
    \n## 使用 HTTP 的 RESTFul 服务\n\n大多数 RESTFul 服务都支持 HTTP/HTTPS 协议。由于 RESTFul 服务应该与客户端应用无关，因此如果你的\
    \ Android 代码使用相同的 RESTFul 服务，那么它很可能可以顺利地移植到 iOS 平台。从大多数 RESTFul 服务获取数据的方式，与浏览器使用\
    \ HTTP `GET` 获取远程 HTML 文件类似。你也可以使用 HTTP `GET` 从移动应用获取 HTML 文档——或者获取任何数据，例如原始字节、XML\
    \ 或 JSON 文档等。\n\n要提交用户输入，你通常会使用 HTML `Form` 将表单数据从 HTML 页面提交到 HTTP 服务器。表单数据通过\
    \ HTTP `POST` 方法传输。这在 iOS 和 Android 应用中也非常常见。从技术上讲，你也可以使用 HTTP `GET` 方法向 HTTP\
    \ 服务器发送查询字符串，就像某些网页所做的那样。在这种情况下，你可以直接构建带查询字符串的 URL，并使用 HTTP `GET` 方法将数据发送到服务器。这是一个设计决策，你需要通过理解\
    \ `GET` 与 `POST` 的用法和约定来做出选择。关键在于设计接口，使移动客户端和服务器都能理解它。\n\n### NSURLConnection\n\
    \nAndroid 类比\n`HttpURLConnection`。\n\n要在 iOS 中与 HTTP 协议交互，你可以使用 `NSURLConnection`\
    \ 类来发送 `GET` 和 `POST` URL 请求。该 API 与 Android 的 `HttpUrlConnection` 非常相似。\n\n继续\
    \ `RestClient` 项目，通过以下步骤添加发送 HTTP 请求的代码：\n\n1.  实现 `IBAction doGet()` 方法，用于发送\
    \ HTTP `GET` 请求并从 HTTP 响应中获取数据（参见 代码清单 4-30）：\n    1.  创建一个 `NSMutableURLRequest`\
    \ 对象。\n\n        **注意** 你通常需要对 URL 路径或查询字符串进行转义/编码，就像在 Android 中使用 `URLEncoder`\
    \ 一样。\n\n    2.  将 HTTP 方法设置为 GET。\n\n        **注意** 根据 HTTP 协议规范，HTTP 方法是区分大小写的。\n\
    \n    3.  设置 `accept` 头部，通常用于内容协商（例如 `text/html`、`json/application` 等）。\n"
- fmt: "**Note**  Our sample echo service supports `\"text/html\"`, `\"text/plain\"\
    `, and `\"application/json\"` content types. To demonstrate the content negotiation\
    \ visually, I choose to use a `UIWebView` widget to render the server response\
    \ and specify the `\"text/html\"`. In general, `\"application/json\"` is more\
    \ suitable for data exchange.\n\n4.  `NSURLConnection.sendAsynchronousRequest`\
    \ sends asynchronous HTTP Request and receives the HTTP response in the `completionHandler`\
    \ closure in the UI main thread.\n\n[***Listing 4-30***](#9781484204375_Ch04.xhtml#_list30).\
    \ HTTP `GET`\n\n```\n        let URL_TEST = \"http://pdachoice.com/ras/service/echo/\"\
    \n        @IBAction func doGet(sender: AnyObject) {\n          var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(NSCharacterSet.URLPathAllowedCharacterSet())\n\
    \          var url = URL_TEST + text\n          var urlRequest = NSMutableURLRequest(URL:\
    \ NSURL(string: url)!)\n            urlRequest.HTTPMethod = \"GET\"\n        \
    \    urlRequest.setValue(\"text/html\", forHTTPHeaderField: \"accept\")\n\n  \
    \        NSURLConnection.sendAsynchronousRequest(urlRequest, queue: NSOperationQueue.mainQueue(),\n\
    \            completionHandler: {(resp: NSURLResponse!, data: NSData!, error:\
    \ NSError!) -> Void in\n              self.mWebView.loadData(data, MIMEType: resp.MIMEType,\
    \ textEncodingName: resp.textEncodingName, baseURL: nil)\n            })\n   \
    \       }\n```\n\n2.  Implement the `IBAction doPost()` method to send HTTP `POST`\
    \ to post data to the server and receive an HTTP response (see [Listing 4-31](#9781484204375_Ch04.xhtml#list31)).\
    \ Almost the same as sending HTTP `GET`, you use `NSURLConnection.sendAsynchronousRequest`\
    \ to send asynchronous HTTP messages, except you set the HTTP method to `POST`:\n\
    \n    1.  Make sure set the HTTP `method` is set to `POST`.\n    2.  `POST` data\
    \ has the same format as a query string, but you want to encode it to put in the\
    \ HTTP `Body`, the same way you do in Android.\n    3.  To parse JSON content\
    \ or create a JSON object, `NSJSONSerialization` is your friend. You want to convert\
    \ the JSON object to `NSDictionary` or the JSON array to `NSArray`.\n\n[***Listing\
    \ 4-31***](#9781484204375_Ch04.xhtml#_list31). HTTP `POST`\n\n```\n@IBAction func\
    \ doPost(sender: AnyObject) {\n  var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(\n\
    \       NSCharacterSet.URLQueryAllowedCharacterSet())\n  var queryString = \"\
    echo=\" + text;\n  var formData = queryString.dataUsingEncoding(NSUTF8StringEncoding)!\n\
    \  var urlRequest = NSMutableURLRequest(URL: NSURL(string: URL_TEST)!)\n  urlRequest.HTTPMethod\
    \ = \"POST\"\n  urlRequest.HTTPBody = formData\n\n  urlRequest.setValue(\"application/json\"\
    , forHTTPHeaderField: \"accept\")\n\n  NSURLConnection.sendAsynchronousRequest(urlRequest,\n\
    \    queue: NSOperationQueue.mainQueue(),\n    completionHandler: {(resp: NSURLResponse!,\
    \ data: NSData!, error: NSError!) -> Void in\n      println(resp.MIMEType)\n \
    \     println(NSString(data: data, encoding: NSUTF8StringEncoding))\n\n      var\
    \ json = NSJSONSerialization.JSONObjectWithData(data, options:\n          NSJSONReadingOptions.AllowFragments,\
    \ error: nil) as NSDictionary\n      self.mWebView.loadHTMLString(json[\"echo\"\
    ] as String, baseURL: nil)\n    })\n})\n```\n\n**Note**  `SERVER_URL = \"http://pdachoice.com/ras/service/echo\"\
    ` is a simple web service that echoes back the path parameter. Desktop browsers\
    \ are fully capable of rendering plain text as well as HTML documents. You can\
    \ use a desktop browser to verify the data from the server.\n\nBuild and run the\
    \ `RestClient` project and enter **\"Hi you!\"** to see the live app in action.\
    \ The simple echo service with the `GET` method actually responded in HTML format,\
    \ `<html><body><h1>Hi you!</h1></body></html>`, which is rendered as shown in\
    \ [Figure 4-48](#9781484204375_Ch04.xhtml#Fig48).\n\n![9781484204375_Fig04-48.jpg](images/9781484204375_Fig04-48.jpg)\n\
    \n[Figure 4-48](#9781484204375_Ch04.xhtml#_Fig48). `RestClient doGet` and `doPost`\
    \ responses\n\n## Summary\n\nThis chapter introduced the most common programming\
    \ component mappings from Android to iOS:\n\n*   User interface and UI widgets\n\
    *   Persistent storage options\n*   Network and remote services with JSON\n\n\
    Many meaningful apps only ever deal with the components discussed herein. This\
    \ chapter listed all the viable mappings with step-by-step instructions on how\
    \ to translate Android components to their iOS counterparts. You will see how\
    \ to apply these guidelines to build a simple but complete utility app from start\
    \ to finish next.\n\n## Part     III\n\n## Pulling it All Together\n\nPreviously,\
    \ you have covered many discrete Android-to-iOS mapping topics. They are purposely\
    \ self-contained with very few classes in the individual Xcode projects so they\
    \ can serve as independent sample projects. In the real programming world, it\
    \ is the combination of features and use cases that makes your app useful and\
    \ entertaining. You will definitely need to apply more than one mapping guideline\
    \ to complete a meaningful app.\n\nTo walk you through the whole porting process,\
    \ you will port a fully functioning Android app from start to finish by applying\
    \ the mapping topics from Part II:\n\n1.  Create the runnable storyboard using\
    \ the counterpart live Android app as the wireframe.\n2.  Port the Android classes\
    \ and classes’ member signatures to Swift first. Preserve any signatures if possible.\n\
    3.  Fill in the blanks one method at a time. The caller, receivers, and “dots”\
    \ mostly will just connect to each other without any glitch by blindly translating\
    \ the Java statements or expressions to Swift at the method level.\n\nNothing\
    \ will really be new here; you will systematically repeat the same top-down development\
    \ approach you have been taking, and implement one piece at a time.\n\n## Chapter    5\n\
    \n## Recap with a Case Study\n\nThus far in this book, you have covered many discrete\
    \ Android-to-iOS mapping topics and created more than 10 Xcode projects. Those\
    \ mapping topics were purposely implemented in individual Xcode projects with\
    \ very few classes. In [Chapter 3](#9781484204375_Ch03.xhtml), you learned the\
    \ top-down development approach using the storyboard to break the whole app into\
    \ MVC-oriented content view and View Controller pairs. In [Chapter 4](#9781484204375_Ch04.xhtml),\
    \ you learned how to port smaller individual components from the counterpart Android\
    \ app, piece by piece. However, all those topics were designed to be self-contained\
    \ without dependencies so they can serve as independent instructions.\n\nIn the\
    \ real programming world, it is the combination of features and use cases that\
    \ makes your app useful and entertaining. You will surely need more than one mapping\
    \ guideline to complete a meaningful app. In this chapter, you are going to port\
    \ an existing Android app from start to finish using the mapping topics from [Chapters\
    \ 3](#9781484204375_Ch03.xhtml) and [4](#9781484204375_Ch04.xhtml). Nothing will\
    \ be new; you are still going to repeat the same top-down development approach\
    \ as you have been using, and implement one piece at a time.\n\nPerhaps there\
    \ is one thing new that I have not yet mentioned explicitly: which piece should\
    \ go first, and then what goes next. For any app, including the Android apps from\
    \ which you are porting, you must go through the same thinking process. If you\
    \ remember how you created the Android apps you are porting, that will be a great\
    \ start because it will make your porting tasks to iOS more efficient. Otherwise,\
    \ you will use the same thinking process that you normally use: decide the dependencies\
    \ among the pieces and try to reduce the dependencies along the way. After all,\
    \ there is really no absolutely right or wrong way. This is off our porting topic,\
    \ but I think you will begin to understand my thinking process in this final exercise."
