    \        relatedBy: NSLayoutRelation(rawValue: 0)!,\n               toItem: self.view,\n\
    \            attribute: NSLayoutAttribute.Trailing,\n           multiplier: 1.0,\n\
    \             constant: 0)\n         self.view.addConstraint(rightConstraint)\n\
    \n       }\n       ...\n   ```\n\n7. 你还可以为其他控件设置自动布局，使它们适应不同的尺寸类别。构建并运行应用，体验 iOS\
    \ `UIScrollView` 的实际效果。你应该可以通过上下滚动视图来查看所有控件（参见 图 4-43）。\n\n   ![9781484204375_Fig04-43.jpg](img/9781484204375_Fig04-43.jpg)\n\
    \   图 4-43. 带有可滚动视图的 `CommonWidgets`\n\n## 动画\n\n在过去，我很少关注动画效果，但我认为 iOS 的发展无疑提高了门槛。在\
    \ iOS 中，你可以使用简单的 `UIView` 动画 API 来对 `UIView` 属性进行动画处理。\n\n为了通过示例学习，请修改现有的 `UISegmentedControl.doScValueChanged(...)`\
    \ 方法，如 代码清单 4-21 所示，使用 `UIView.animateWithDuration(...)` 方法创建一些动画效果。\n\n***代码清单\
    \ 4-21***. `UIView.animateWithDuration(...)`\n\n```\n... @IBAction func doScValueChanged(sender:\
    \ AnyObject) {\n    var idx = self.mSegmentedControl.selectedSegmentIndex\n  \
    \  self.logText(\"segment \\(idx)\")\n    let center = self.mButton.center\n \
    \   UIView.animateWithDuration(1, animations: { action in\n        self.mButton.center\
    \ = CGPoint(x: center.x, y: center.y / (idx + 1))\n        self.mButton.alpha\
    \ = 1 / (idx + 1)\n        }, completion: { action in\n            UIView.animateWithDuration(1,\
    \ delay: 0, usingSpringWithDamping: 0.5, initialSpringVelocity: 0.5, options:\
    \ UIViewAnimationOptions.CurveEaseInOut, animations: { action in\n           \
    \     self.mButton.center = center\n                }, completion: {  action in\n\
    \                    // 不执行任何操作\n                })\n        })\n}\n...\n```\n\
    \n`UIView.animateWithDuration(...)` 有多个重载变体，它们的工作方式相同。你可以通过在动画块内修改以下 `UIView`\
    \ 属性来为其添加动画效果：\n\n* `frame`：视图区域\n* `center`：位置\n* `transform`：缩放和旋转\n* `alpha`：透明度\n\
    * `backgroundColor`\n\n## 保存数据\n\n在几乎所有常见的编程平台上，保存数据都是一项基本编程任务。除了事务数据，大多数移动应用还会保存应用状态和用户偏好，以便用户稍后可以继续他们的任务。iOS\
    \ 和 Android 都提供了多种持久化存储选项。iOS SDK 提供了以下选择：\n\n* `用户默认系统`存储\n* `文件`存储\n* `CoreData`\
    \ 框架和 `SQLite` 数据库（本书未涉及）\n\n在深入探讨前两个选项之前，你需要创建一个 Xcode 项目，以便编写代码并可视化这些选项的工作方式。\n\
    \n1. 启动 Xcode，使用**单视图应用**模板，并将项目命名为 `SaveData`。\n\n2. 创建一个带有 `UIBarButtonItem`\
    \ 的导航栏（参见 图 4-44）：\n\n   1. 在故事板中选择**视图控制器**，然后在 Xcode 菜单栏中选择**编辑器** ![image](img/arrow.jpg)\
    \ **嵌入于** ![image](img/arrow.jpg) **导航控制器**。\n   2. 在导航项的**属性检查器**中，将标题设为 **SaveData**。\n\
    \   3. 从**对象库**中拖拽一个 `BarButtonItem`，并将其放置到**视图控制器**场景的导航项上。在**属性检查器**中将栏项的`标题`更新为\
    \ **Delete**。\n   4. 选中该`栏按钮项`，打开**助理编辑器**，将选择器出口连接到你的代码。将 `IBAction` 命名为 **doDelete**。\n\
    \n   ![9781484204375_Fig04-44.jpg](img/9781484204375_Fig04-44.jpg)\n   图 4-44.\
    \ `SaveData` 项目故事板\n\n3. 创建一个 `UITextField` 来获取用户输入，如图 4-44 所示：\n\n   1. 将一个 `UITextField`\
    \ 拖拽到**视图控制器**场景上。在**属性检查器**中，输入占位符文本 `\"请保存我的输入！！！\"`。\n   2. 添加自动布局约束，使 `UITextField`\
    \ 在视图中居中。\n\n4. 打开**助理编辑器**，在 `UITextField` 的**连接检查器**中，将以下出口连接到你的代码：\n\n   1.\
    \ 将`引用出口`连接到 `IBOutlet` 属性 `mTextField`。\n   2. 将 `delegate` 连接到你的 `ViewController`\
    \ 类。\n\n5. 在 `ViewController` 类中实现 `UITextFieldDelegate` 协议，并创建将触发检索、保存和删除代码的存根，如\
    \ 代码清单 4-22 所示：\n\n   1. 在 `ViewController.viewDidLoad()` 中加载已保存的数据。\n   2. 在按下\
    \ Return 键时保存用户输入。\n"
