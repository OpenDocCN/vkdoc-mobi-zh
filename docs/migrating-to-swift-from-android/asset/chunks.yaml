    attribute: NSLayoutAttribute.Trailing,            relatedBy: NSLayoutRelation(rawValue:
    0)!,               toItem: self.view,            attribute: NSLayoutAttribute.Trailing,           multiplier:
    1.0,             constant: 0)         self.view.addConstraint(rightConstraint)            }       ...     ```           8.  You
    can also set the other widgets for auto layout so they adapt to different size
    classes.    Build and run the app to see iOS `UIScrollView` in action. You should
    be able to see all the widgets by scrolling the view up and down (see [Figure
    4-43](#9781484204375_Ch04.xhtml#Fig43)).    ![9781484204375_Fig04-43.jpg](images/9781484204375_Fig04-43.jpg)    [Figure
    4-43](#9781484204375_Ch04.xhtml#_Fig43). `CommonWidgets` with scrollable view    Animations    Back
    in the old days, I cared a lot less about animation effects, but I think the evolution
    of iOS definitely raised the bar. In iOS, you can animate `UIView` properties
    using the simple `UIView` animation API.


    To learn by example, modify the existing `UISegmentedControl.doScValueChanged(...)`
    method as shown in [Listing 4-21](#9781484204375_Ch04.xhtml#list21) to create
    some animation effects using the `UIView.animateWithDuration(...)` method.    [***Listing
    4-21***](#9781484204375_Ch04.xhtml#_list21). `UIView.animateWithDuration(...)`    ```
    ... @IBAction func doScValueChanged(sender: AnyObject) {   var idx = self.mSegmentedControl.selectedSegmentIndex
      self.logText("segment \(idx)")   let center = self.mButton.center   UIView.animateWithDuration(1,
    animations: { action in     self.mButton.center = CGPoint(x: center.x, y: center.y
    / (idx + 1))     self.mButton.alpha = 1 / (idx + 1)     }, completion: { action
    in       UIView.animateWithDuration(1, delay: 0, usingSpringWithDamping: 0.5,
    initialSpringVelocity: 0.5, options: UIViewAnimationOptions.CurveEaseInOut, animations:
    { action in         self.mButton.center = center         }, completion: {  action
    in           // do nothing         })     }) } ... ```    The `UIView.animateWithDuration(...)`
    has several overloaded variants that all work the same way. You can animate the
    following `UIView` properties by modifying them inside the animation block:    *   `frame`
    for the viewing area, *   `center` for position, *   `transform` for scale and
    rotation, *   `alpha` for transparency, and *   `backgroundColor`.    Save Data    Saving
    data is an essential programming task in almost all common programming platforms.
    In addition to transactional data, most of the mobile apps also save application
    states and user preferences so that users can resume their tasks later. Both iOS
    and Android provide several persistent storage options. The iOS SDK offers the
    following choices:    *   `User Defaults System` storage *   `File` storage *   `CoreData`
    framework and `SQLite` database (not covered in this book)    Before diving into
    the first two options, you will create an Xcode project so that you can write
    code and visualize how these options work.    1.  Launch Xcode, use the **Single
    View Application** template, and name the project `SaveData`. 2.  Create a Navigation
    Bar with an `UIBarButtonItem` (see [Figure 4-44](#9781484204375_Ch04.xhtml#Fig44)):     1.  Select
    the **View Controller** in storyboard, and from the Xcode menu bar, select **Editor**
    ![image](images/arrow.jpg) **Embed In** ![image](images/arrow.jpg) **Navigation
    Controller**.     2.  In the Navigation Item **Attributes Inspector**, enter a
    Title of **SaveData**.     3.  Drag a `BarButtonItem` from **Object Library**
    and drop it onto the Navigation Item in the **View Controller** scene. Update
    the Bar Item `Title` in **Attributes Inspector** to be **Delete**.     4.  Select
    the `Bar Button Item` and open **Assistant Editor** to connect the selector outlet
    to your code. Name the `IBAction`**doDelete**.                  ![9781484204375_Fig04-44.jpg](images/9781484204375_Fig04-44.jpg)                                    [Figure
    4-44](#9781484204375_Ch04.xhtml#_Fig44). `SaveData` project storyboard                   3.  Create
    a `UITextField` to get user input as shown in [Figure 4-44](#9781484204375_Ch04.xhtml#Fig44):     1.  Drag
    a `UITextField` onto the **View Controller** scene. In the **Attributes Inspector**,
    enter the placeholder, `"Please save my inputs !!!"`.     2.  Add auto layout
    constraints to center the `UITextField` in the `View`. 4.  Open **Assistant Editor**,
    and in the `UITextField` **Connections Inspector** connect the following outlets
    to your code:     1.  Connect `Referencing Outlet` to `IBOutlet` property, `mTextField`.     2.  Connect
    `delegate` to your `ViewController` class. 5.  Implement `UITextFieldDelegate`
    protocol in the `ViewController` class and create the stubs that will triggers
    the retrieve, save, and delete code as shown in [Listing 4-22](#9781484204375_Ch04.xhtml#list22):     1.  Load
    the saved data in `ViewController.viewDidLoad()`.     2.  Save the user input
    when the Return key is pressed.'
