    \ in the Assistant Editor, as shown in [Figure 2-14](#9781484204375_Ch02.xhtml#Fig14).\n\
    \n![9781484204375_Fig02-14.jpg](images/9781484204375_Fig02-14.jpg)\n\n[Figure\
