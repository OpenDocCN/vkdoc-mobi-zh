    \  \n\n**ANDROID ANALOGY**  \n\n`android.widget.Spinner`.  \n\nIn iOS, `UIPickerView`\
    \ displays a set of values from which the user selects. It provides a quick way\
    \ to select one value from a spinning-wheel–like list that shows all or part of\
    \ the selections.  \n\nIn traditional desktop apps or web pages, you normally\
    \ see a drop-down list, or the `android.widget.Spinner` in Android, for this purpose,\
    \ except with one trivial difference: they only show the selected value with the\
    \ other choices folded.  \n\nThe iOS `UIPickerView` uses the same pattern as `UITableView\
    \ DataSource` to supply the items. To learn by example, add a `UIPickerView` widget\
    \ to our `CommonWidgets` app and do the following:  \n\n1.  Select `Main.storyboard`\
    \ and drag a `UIPickerView` from **Object Library**. Position it below the `UIImageView`\
    \ (see [Figure 4-30](#9781484204375_Ch04.xhtml#Fig30)).  \n\n    ![9781484204375_Fig04-30.jpg](images/9781484204375_Fig04-30.jpg)\
    \  \n\n    [Figure 4-30](#9781484204375_Ch04.xhtml#_Fig30). Placing the `UIPickerView`\
    \  \n\n2.  Open **Assistant Editor** and establish `UIPickerView` outlet connections\
    \ to your code in **Connections Inspector** (see [Figure 4-31](#9781484204375_Ch04.xhtml#Fig31)):\
    \  \n    1.  Connect `IBOutlet` to your code.  \n    2.  Connect `delegate` and\
    \ `dataSource` outlets to `ViewController` class (just like `UITableView` or any\
    \ widgets using `Data Source`).  \n\n    ![9781484204375_Fig04-31.jpg](images/9781484204375_Fig04-31.jpg)\
    \  \n\n    [Figure 4-31](#9781484204375_Ch04.xhtml#_Fig31). Connecting the `UIPickerView`\
    \ outlets  \n\n3.  To implement the `UIPickerView` delegate and data source, declare\
    \ the `ViewController` class to implement `UIPickerViewDelegate` and `UIPickerViewDataSource`\
    \ protocols as shown in [Listing 4-15](#9781484204375_Ch04.xhtml#list15).  \n\n\
    \    [***Listing 4-15***](#9781484204375_Ch04.xhtml#_list15). `UIPickerView IBOutlet`\
    \  \n\n    ```swift\n    class ViewController: ..., UIPickerViewDelegate, UIPickerViewDataSource\
    \ {\n      ...\n      @IBOutlet weak var mPickerView: UIPickerView!\n      //\
    \ returns the number of 'columns' to display.\n      func numberOfComponentsInPickerView(pickerView:\
    \ UIPickerView) -> Int {\n        return 2\n      }\n\n      // returns the #\
    \ of rows in each component..\n      func pickerView(pickerView: UIPickerView,\
    \ numberOfRowsInComponent component: Int) -> Int {\n        return 10\n      }\n\
    \n      func pickerView(pickerView: UIPickerView, titleForRow row: Int, forComponent\
    \ component: Int) -> String! {\n        return \"(\\(component), \\(row))\"\n\
    \      }\n\n      func pickerView(pickerView: UIPickerView, didSelectRow row:\
    \ Int, inComponent component: Int) {\n        println(\"\\(self.mPickerView.selectedRowInComponent(0))\"\
    ) // before selection\n        println(\"\\(self.mPickerView.selectedRowInComponent(1))\"\
    )\n        println(\"(\\(component), \\(row))\") // current selection\n      }\n\
    \      ...\n    }\n    ```\n\nBuild and run the app to see iOS `UIPickerView`\
    \ in action. The iPhone emulator is too small for all the widgets you have so\
