    \ [Figure 4-20](#9781484204375_Ch04.xhtml#_Fig20). `UIActivityIndicatorView` attributes\n\
    \n2.  Update its attributes in **Attributes Inspector** (see [Figure 4-20](#9781484204375_Ch04.xhtml#Fig20)):\n\
    \    1.  Style: **Default (or Bar)**\n    2.  Progress: **0.5** (between **0.0**\
    \ and **1.0**)\n    3.  Progress Tint: **Purple**.\n    4.  Track Tint: **Yellow**.\n\
    \n3.  Open **Assistant Editor** and connect `IBOutlet` in **Connections Inspector**\
    \ to your code so that you can update `UIProgressView` programmatically. Modify\
