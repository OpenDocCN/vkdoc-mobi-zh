  trans: "\n你在第 3 章中使用屏幕导航模式实现的所有故事板场景都故意设计得非常简单。显然，一款实用的移动应用需要提供丰富的内容，并具备更完善的功能来与用户优雅地交互。用户界面在整体用户体验中无疑扮演着重要角色。\n\
    \n为 iOS 创建有意义的用户界面的技术和术语与 Android 截然不同。UI 组件通常是平台相关的。你只需了解 UI 部件的用法，并知道在哪里查阅特定平台的部件规范即可。\n\
    \n另一方面，许多 UI 框架也存在相似之处。iOS 和 Android 的视图块都结构化为一种视图容器（视图/父视图）模型，这种模型在业界已存在很长时间。在\
    \ iOS 中，`UIView` 是一个在屏幕上绘制内容并允许用户与之交互的对象。`UIView` 也是一个容器，可以容纳其他 `UIView` 对象，以定义\
    \ UI 的层次化布局。\n\n这种视图容器模型与 Android 看起来很相似，但在如何将 UI 部件定位在其父视图中或相对于同级元素方面存在差异。Android\
    \ 使用**布局管理器**，而 iOS 使用**自动布局**。\n\n## `UIView`\n\n`UIView` 对象是 UI 组件的基本构建块。它是所有部件（如常见的\
    \ `UIButton` 和 `UILabel` 等部件）的基类。它也用作父容器视图。\n\n**Android 类比**\n\n`android.view.View`\
    \ 或 `android.view.ViewGroup`。\n\n一个可见的 `UIView` 在屏幕上占据一个矩形区域，负责绘制和事件处理。`UIViewController`\
    \ 类有一个在 `UIViewController.view` 属性中定义的根视图，该属性被所有视图控制器继承。所有 UI 部件都是 `UIView` 的特殊类型，具有预期的外观、感觉和行为属性。当在故事板中绘制视图元素时，它们会被添加到父视图中，你可以使用故事板视图**检查器**来直观地编辑视图属性。\n\
    \n所有 iOS UI 部件都继承自 `UIView`。你可以在故事板视图**属性检查器**中设置继承的 `UIView` 属性。例如，图 4-1 展示了任意\
    \ UI 部件在**属性检查器**中的 `View` 部分。\n\n![9781484204375_Fig04-01.jpg](img/9781484204375_Fig04-01.jpg)\n\
    \n图 4-1. 属性检查器的视图部分\n\n在运行时，你可以通过编程方式更新 `UIView` 对象的这些属性。`UIView` 是所有部件的终极超类。它为开发者提供了相当丰富的\
    \ API，以实现多种与 UI 相关的职责：\n\n*   渲染内容\n*   布局和管理子视图\n*   事件处理\n*   动画\n\n本章的其余部分将演示你很可能遇到或预先了解会有好处的常见属性或\
    \ API。在深入探讨 iOS SDK 中的常见 iOS UI 部件之前，我想讨论一个重要的相关主题——**应用资源**，UI 部件以及许多其他常见的编程任务都会用到它。\n\
    \n## 应用资源\n\n**Android 类比**\n\n`Android 应用资源`\n\n大多数 GUI 应用不仅由程序代码组成——它们还需要其他资源，例如图像和外部化的字符串。在\
    \ iOS 中，你将遇到类似的任务，即如何为不同的设备配置提供不同的资源。这将演示如何在 Xcode 中实现两个常见用例：素材目录和外部化字符串。\n\n\
    ### 素材目录\n\nAndroid 开发者一定很熟悉为图像提供替代资源的概念。本节将向你展示如何在 iOS 中实现。像往常一样，创建一个新的 Xcode\
    \ 项目并执行以下操作：\n\n1.  启动 Xcode，使用 `Single View Application` 模板，并将项目命名为 `CommonWidgets`。该项目附带一个素材目录\
    \ `Images.xcassets`，其中已包含如图 4-2（左侧指针）所示的 `AppIcon` 集。编辑器会显示不同设备类型的图标和像素分辨率。切换\
    \ **iOS 6.1 and Prior Sizes** 复选框（图 4-2 中的右侧指针）以查看编辑器中的差异。\n\n![9781484204375_Fig04-02.jpg](img/9781484204375_Fig04-02.jpg)\n\
    \n图 4-2. `Images.xcassets` 中的 `AppIcon` 集\n\n2.  你可以使用编辑器中指定的不同图像分辨率，从对应的 Android\
    \ 资源文件 `res/drawable-xxhdpi/ic_launcher.png` 重新创建图标。将适当的图像文件拖放到引导方块上。图 4-3 展示了结果。\n\
    \n![9781484204375_Fig04-03.jpg](img/9781484204375_Fig04-03.jpg)\n\n图 4-3. 使用 `Images.xcassets`\
    \ 在 iOS 中重新创建 Android 图标\n\n3.  要添加图像素材，请点击 **添加** `(+)` 按钮并选择 **New Image Set**，如图\
    \ 4-4 所示：\n    1.  使用**属性检查器**选择你要提供的设备类型。\n    2.  你可以选择通过选择 **Universal** 尺寸类别或设备特定类型来提供图像集。无论哪种方式，1x、2x\
    \ 和 3x 分辨率现在应能覆盖所有 iOS 设备。\n    3.  选择 1x 分辨率的图像并将其拖放到正确的位置（如图 4-4 中 **sample**\
    \ 下方的指针所示）。对 2x 和 3x 图像重复此步骤。\n    4.  为图像集命名（例如 `sample`）。该名称是从代码或故事板中访问图像的标识符。\n\
    \n![9781484204375_Fig04-04.jpg](img/9781484204375_Fig04-04.jpg)\n\n图 4-4. 在 `Images.xcassets`\
    \ 中添加图像集\n\n你已经创建了两个图像素材。第一个 `AppIcon` 默认用于主屏幕上的启动图标。另一个 `sample` 可用于你的代码或故事板中的任何部件。你可以在后续练习中使用\
    \ `sample` 图标。\n\n**注意** 你可以使用自己喜欢的图像编辑器创建图像，或从 `www.pdachoice.com/bookassets`\
    \ 下载。\n\n### 外部化字符串\n\n通常，你将字符串文本存储在外部文件中。Android 和 iOS 实际上以类似的方式读取外部化字符串。在 Android\
    \ 中，字符串文件以 XML 格式存储在 `res/values/strings.xml` 中。在 iOS 中，它们以 `\"key\" = \"value\"\
    ;` 格式存储在 `.strings` 文件中。\n\n要将外部化字符串从你的 Android 项目转换到 iOS 项目，请执行以下操作：\n\n1.  在你的\
    \ Xcode 项目中任意位置创建一个新文件。例如，首先在 `\"Supporting Files\"` 文件夹中创建一个新文件，然后按 ![image](img/flower.jpg)+N（**New\
    \ File** 的快捷键）。\n    1.  在 **Choose a template** 界面中，选择 **iOS** ![image](img/arrow.jpg)\
    \ **Resource** ![image](img/arrow.jpg) **Strings File**。\n    2.  另存为 `Localizable.strings`。这是\
    \ iOS API 使用的默认文件名。\n2.  你可以将对应的 Android `strings.xml` 文件复制并注释到你的 iOS `Localizable.strings`\
    \ 文件中，以此作为起点。代码清单 4-1 将简单的 Android `string.xml` 转换为 iOS。\n\n***代码清单 4-1***. 从\
    \ Android `strings.xml` 到 iOS `Localizable.strings` 的转换\n\n```\n    /*\n    ====\
    \ 从 HelloAndroid Android 项目复制 ===\n    <resources>\n\n<string name=\"app_name\"\
    >HelloAndroid</string>\n     <string name=\"action_settings\">Settings</string>\n\
    \     <string name=\"hello_world\">Hello world!</string>\n     <string name=\"\
    hello_buttn\">Hello ...</string>\n     <string name=\"name_hint\">Enter a Name,\
    \ i.e, You</string>\n\n</resources>\n    */\n"
