    in the iPad emulator    WebView    ANDROID ANALOGY    `android.widget.WebView`.    You
    can display rich HTML content in your mobile apps on almost all the popular mobile
    platforms, including iOS, Android, BlackBerry, and Windows phones. This enables
    you to deliver web content as part of your mobile apps. One common scenario is
    when you want to provide information in your app that needs to be updated frequently,
    and you want to host the content online as a web page. To take it one step further,
    the web content does not have to be remote; you can bundle the web page content
    with the native app. This enables web developers to leverage their web development
    skills and create so-called hybrid apps.    With new features from HTML5 and CSS3,
    many web developers are creating meaningful and interactive web apps that are
    shortening the gap between native apps and mobile web apps. In iOS, the key SDK
    class is `UIWebView`, and it does support many HTML5 and CSS3 features (e.g.,
    `Offline Cache` and `WebSocket`, etc.).    As an example, the following steps
    demonstrate common tasks using `UI``WebView`:    1.  Select `Main.storyboard`,
    drag a `UIWebView` from the **Object Library**, and position it below the video
    `View` (see [Figure 4-36](#9781484204375_Ch04.xhtml#Fig36)). Set its attributes
    in **Attributes Inspector**; it is commonly set **Scales Page To Fit**.          ![9781484204375_Fig04-36.jpg](images/9781484204375_Fig04-36.jpg)                    [Figure
    4-36](#9781484204375_Ch04.xhtml#_Fig36). iOS `UIWebView` attributes in the Connections
    Inspector           2.  As usual, open **Assistant Editor** and connect the following
    outlets in **Connections Inspector** to your code (see [Figure 4-36](#9781484204375_Ch04.xhtml#Fig36)):     1.  Connect
    `IBOutlet` so you can use the widget in your code.     2.  Connect the `delegate`
    outlet so your code can intercept `UIWebView` life-cycle events. 3.  [Listing
    4-18](#9781484204375_Ch04.


    xhtml#list18) demonstrates the programming code commonly used for `UI``WebView`.               1.  Use
    `loadRequest(...)` to load the URL. You can also create a file URL to load a local
    HTML file.     2.  Use `loadHTMLString(...)` to render simple string text.     3.  Although
    not demonstrated here, you can also use `loadData(...)` to render `NSData` that
    you normally get from remote contents using `NSURLConnection`, which I will demonstrate
    later in the "`NSURLConnection`" section.          [***Listing 4-18***](#9781484204375_Ch04.xhtml#_list18).
