  \ String) {\n    var path = ...\n    // 单条目字典，当然可以包含更多条目\n    var ser = NSDictionary(objects:\
  \ [str], forKeys: [KEY_JSON])\n    ser.writeToFile(path, atomically: true)\n}\n\n\
  func retrieveJsonFromFile(file: String) -> String? {\n    var path = ...\n    var\
  \ ser = NSDictionary(contentsOfFile: path)!\n    return ser[KEY_JSON] as String?\n\
  }\n```\n\n这在处理 JSON 消息时尤其有用，因为如今大多数远程消息都是 JSON 格式。\n\n通常，只有在纯文件系统操作（如检查文件属性或遍历目录中的文件）时，才需要直接使用\
  \ `NSFileManager`。\n\n## 网络与远程服务的使用\n\n典型的客户端-服务器解决方案将信息托管在服务器端，而客户端应用程序要么从服务器获取数据并以有意义的方式呈现给用户，要么收集用户数据并提交到服务器。你可能经常听到“移动商务”或“移动电商”这样的流行词。简单来说，移动应用程序从服务器获取商品信息，然后通过互联网将订单提交到服务器。从移动应用编程的角度来看，这其实并不新鲜。它仍然是一个使用\
  \ HTTP `GET`/`POST` 的客户端-服务器编程话题，大多数电子商务网站正是这样做的。\n\n关于 JSON 消息和 RESTful 服务，我将专门针对移动应用程序进行讨论，因为与传统的基于\
  \ SOAP 的 Web 服务相比，它们更受欢迎。\n\n### 在后台执行网络操作\n\n对于带有用户界面的应用程序，你应该在后台执行 I/O 任务或网络相关代码，并在\
  \ UI 主线程中更新界面。否则，由于 UI 线程被阻塞等待任务完成，用户会感觉应用卡顿。这一原则适用于 iOS、Android 以及几乎所有 UI 平台。Android\
  \ SDK 提供了方便的 `android.os.AsyncTask` 类，用于在后台线程执行任务，并在后台任务完成后回调到 UI 主线程。通常，在与远程服务器交互时，你需要在后台线程获取数据。当接收到远程数据后，你的\
  \ UI 代码会在屏幕上呈现数据。\n\n为了展示如何在 iOS 中实现相同目标，你将创建一个简单的 iOS 应用，如图 Figure 4-46 所示，以演示一些基本的使用远程\
  \ RESTFul 服务的客户端代码：\n\n*   当选择 `GET` 或 `POST` 按钮时，应用会在后台线程向服务器发送 HTTP `GET` 或 `POST`\
  \ 请求。\n*   当收到 HTTP 响应时，应用会在用户界面上渲染数据。\n\n![9781484204375_Fig04-46.jpg](img/9781484204375_Fig04-46.jpg)\n\
  \n图 4-46. iOS `RestClient` 应用\n\n新建一个 Xcode 项目，从头开始。\n\n1.  启动 Xcode，使用 **Single\
  \ View Application** 模板，并将项目命名为 `RestClient`。\n2.  使用以下控件绘制故事板（参见 Figure 4-47）：\n\
  \    1.  一个用于调用 HTTP `GET` 的 `UIButton`\n    2.  一个用于调用 HTTP `POST` 的 `UIButton`\n\
  \    3.  一个用于接收用户输入的 `UITextField`\n    4.  一个用于渲染 HTTP 响应的 `UIWebView`\n\n    \
  \    ![9781484204375_Fig04-47.jpg](img/9781484204375_Fig04-47.jpg)\n\n        图\
  \ 4-47. `RestClient` 故事板\n\n3.  将故事板输出口连接到代码（参见 代码清单 4-29）：\n    1.  将 `GET` 按钮的\
  \ `Touch Down` 事件连接到 `doGet()` IBAction 方法。\n    2.  将 `POST` 按钮的 `Touch Down` 事件连接到\
  \ `doPost()` IBAction 方法。\n    3.  将 `UITextField` 委托输出口连接到 `ViewController` 类。\n\
  \    4.  将 `UIWebView` 委托连接到 `ViewController` 类。\n    5.  将文本字段的 `New Referencing\
  \ Outlet` 连接到 `ViewController mTextField IBOutlet` 属性。\n    6.  将网页视图的 `New Referencing\
  \ Outlet` 连接到 `ViewController mWebView IBOutlet` 属性。\n\n***代码清单 4-29***. `RestClient`\
  \ 准备代码\n\n```swift\nclass ViewController: UIViewController, UITextFieldDelegate,\
  \ UIWebViewDelegate {\n    @IBOutlet weak var mWebView: UIWebView!\n    @IBOutlet\
  \ weak var mTextField: UITextField!\n\n    override func viewDidLoad() {\n     \
  \   super.viewDidLoad()\n        // 在这里进行其他初始化设置...\n    }\n\n    func textFieldShouldReturn(textField:\
  \ UITextField!) -> Bool {\n        textField.resignFirstResponder();\n        return\
  \ true\n    }\n\n    @IBAction func doGet(sender: AnyObject) {\n    }\n\n    @IBAction\
  \ func doPost(sender: AnyObject) {\n    }\n}\n```\n\n这些内容并无新意，只是重复的故事板任务以及将输出口连接到带有方法存根的代码的过程。接下来，你将在这些存根中填充主要内容。\n\
  \n### 使用 HTTP 的 RESTFul 服务\n\n大多数 RESTFul 服务都支持 HTTP/HTTPS 协议。由于 RESTFul 服务应该与客户端应用无关，因此如果你的\
  \ Android 代码使用相同的 RESTFul 服务，那么它很可能可以顺利地移植到 iOS 平台。从大多数 RESTFul 服务获取数据的方式，与浏览器使用\
  \ HTTP `GET` 获取远程 HTML 文件类似。你也可以使用 HTTP `GET` 从移动应用获取 HTML 文档——或者获取任何数据，例如原始字节、XML\
  \ 或 JSON 文档等。\n\n要提交用户输入，你通常会使用 HTML `Form` 将表单数据从 HTML 页面提交到 HTTP 服务器。表单数据通过 HTTP\
  \ `POST` 方法传输。这在 iOS 和 Android 应用中也非常常见。从技术上讲，你也可以使用 HTTP `GET` 方法向 HTTP 服务器发送查询字符串，就像某些网页所做的那样。在这种情况下，你可以直接构建带查询字符串的\
  \ URL，并使用 HTTP `GET` 方法将数据发送到服务器。这是一个设计决策，你需要通过理解 `GET` 与 `POST` 的用法和约定来做出选择。关键在于设计接口，使移动客户端和服务器都能理解它。\n\
  \n#### NSURLConnection\n\nAndroid 类比\n`HttpURLConnection`。\n\n要在 iOS 中与 HTTP 协议交互，你可以使用\
  \ `NSURLConnection` 类来发送 `GET` 和 `POST` URL 请求。该 API 与 Android 的 `HttpUrlConnection`\
  \ 非常相似。\n\n继续 `RestClient` 项目，通过以下步骤添加发送 HTTP 请求的代码：\n\n1.  实现 `IBAction doGet()`\
  \ 方法，用于发送 HTTP `GET` 请求并从 HTTP 响应中获取数据（参见 代码清单 4-30）：\n    1.  创建一个 `NSMutableURLRequest`\
  \ 对象。\n\n        **注意** 你通常需要对 URL 路径或查询字符串进行转义/编码，就像在 Android 中使用 `URLEncoder`\
  \ 一样。\n\n    2.  将 HTTP 方法设置为 GET。\n\n        **注意** 根据 HTTP 协议规范，HTTP 方法是区分大小写的。\n\
  \n    3.  设置 `accept` 头部，通常用于内容协商（例如 `text/html`、`json/application` 等）。\n\n\n\n\
  **注意** 我们的示例回声服务支持 `\"text/html\"`、`\"text/plain\"` 和 `\"application/json\"` 内容类型。为了直观地展示内容协商，我选择使用\
  \ `UIWebView` 控件来渲染服务器响应，并指定了 `\"text/html\"`。通常，`\"application/json\"` 更适用于数据交换。\n\
  \n4.  `NSURLConnection.sendAsynchronousRequest` 发送异步 HTTP 请求，并在 UI 主线程的 `completionHandler`\
  \ 闭包中接收 HTTP 响应。\n\n***列表 4-30***。HTTP `GET`\n\n```\n        let URL_TEST = \"http://pdachoice.com/ras/service/echo/\"\
  \n        @IBAction func doGet(sender: AnyObject) {\n          var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(NSCharacterSet.URLPathAllowedCharacterSet())\n\
  \          var url = URL_TEST + text\n          var urlRequest = NSMutableURLRequest(URL:\
  \ NSURL(string: url)!)\n            urlRequest.HTTPMethod = \"GET\"\n          \
  \  urlRequest.setValue(\"text/html\", forHTTPHeaderField: \"accept\")\n\n      \
  \    NSURLConnection.sendAsynchronousRequest(urlRequest, queue: NSOperationQueue.mainQueue(),\n\
  \            completionHandler: {(resp: NSURLResponse!, data: NSData!, error: NSError!)\
  \ -> Void in\n              self.mWebView.loadData(data, MIMEType: resp.MIMEType,\
  \ textEncodingName: resp.textEncodingName, baseURL: nil)\n            })\n     \
  \     }\n```\n\n2.  实现 `IBAction doPost()` 方法，用于发送 HTTP `POST` 请求，将数据发送到服务器并接收 HTTP\
  \ 响应（请参阅列表 4-31）。与发送 HTTP `GET` 几乎相同，您使用 `NSURLConnection.sendAsynchronousRequest`\
  \ 发送异步 HTTP 消息，区别在于将 HTTP 方法设置为 `POST`：\n\n    1.  确保将 HTTP `method` 设置为 `POST`。\n\
  \    2.  `POST` 数据格式与查询字符串相同，但您需要对其进行编码以放入 HTTP `Body` 中，方法与在 Android 中相同。\n   \
  \ 3.  要解析 JSON 内容或创建 JSON 对象，`NSJSONSerialization` 是您的得力助手。您需要将 JSON 对象转换为 `NSDictionary`，或将\
  \ JSON 数组转换为 `NSArray`。\n\n***列表 4-31***。HTTP `POST`\n\n```\n@IBAction func doPost(sender:\
  \ AnyObject) {\n  var text = self.mTextField.text.stringByAddingPercentEncodingWithAllowedCharacters(\n\
  \       NSCharacterSet.URLQueryAllowedCharacterSet())\n  var queryString = \"echo=\"\
  \ + text;\n  var formData = queryString.dataUsingEncoding(NSUTF8StringEncoding)!\n\
  \  var urlRequest = NSMutableURLRequest(URL: NSURL(string: URL_TEST)!)\n  urlRequest.HTTPMethod\
  \ = \"POST\"\n  urlRequest.HTTPBody = formData\n\n  urlRequest.setValue(\"application/json\"\
  , forHTTPHeaderField: \"accept\")\n\n  NSURLConnection.sendAsynchronousRequest(urlRequest,\n\
  \    queue: NSOperationQueue.mainQueue(),\n    completionHandler: {(resp: NSURLResponse!,\
  \ data: NSData!, error: NSError!) -> Void in\n      println(resp.MIMEType)\n   \
  \   println(NSString(data: data, encoding: NSUTF8StringEncoding))\n\n      var json\
  \ = NSJSONSerialization.JSONObjectWithData(data, options:\n          NSJSONReadingOptions.AllowFragments,\
  \ error: nil) as NSDictionary\n      self.mWebView.loadHTMLString(json[\"echo\"\
  ] as String, baseURL: nil)\n    })\n})\n```\n\n**注意** `SERVER_URL = \"http://pdachoice.com/ras/service/echo\"\
  ` 是一个简单的 Web 服务，用于回显路径参数。桌面浏览器完全能够渲染纯文本以及 HTML 文档。您可以使用桌面浏览器来验证来自服务器的数据。\n\n构建并运行\
  \ `RestClient` 项目，然后输入 **\"Hi you!\"** 以查看实际运行的应用程序。使用 `GET` 方法的简单回声服务实际上以 HTML\
  \ 格式响应：`<html><body><h1>Hi you!</h1></body></html>`，其渲染效果如图 4-48 所示。\n\n![9781484204375_Fig04-48.jpg](img/9781484204375_Fig04-48.jpg)\n\
  \n图 4-48。`RestClient doGet` 和 `doPost` 响应\n\n## 总结\n\n本章介绍了从 Android 到 iOS 最常见的编程组件映射：\n\
  \n*   用户界面和 UI 控件\n*   持久化存储选项\n*   网络与基于 JSON 的远程服务\n\n许多有意义的应用程序仅涉及本文讨论的组件。本章列出了所有可行的映射，并提供了关于如何将\
  \ Android 组件转换为对应 iOS 组件的逐步指导。接下来，您将了解如何应用这些指南，从头到尾构建一个简单但完整的实用工具应用程序。\n\n## 第三部分\n\
  \n## 整合所有内容\n\n之前，您已经了解了许多独立的 Android 到 iOS 映射主题。这些主题特意设计为自包含的，且各个 Xcode 项目中的类非常少，以便它们可以作为独立的示例项目。在真实的编程世界中，正是功能与用例的结合才使您的应用程序既实用又有趣。您肯定需要应用多个映射指南才能完成一个有意义的应用程序。\n\
  \n为了引导您完成整个移植过程，您将通过应用第二部分的映射主题，从头到尾移植一个功能完整的 Android 应用程序：\n\n1.  使用对应的可运行的 Android\
  \ 应用程序作为线框图，创建可运行的故事板。\n2.  首先将 Android 类和类成员签名移植到 Swift。如果可能，请保留任何签名。\n3.  一次一个方法地填补空白。调用者、接收者和“点”大多会毫无障碍地相互连接，只需在方法级别盲目地将\
  \ Java 语句或表达式翻译为 Swift 即可。\n\n这里不会有任何真正的新内容；您将系统地重复您一直在使用的自顶向下的开发方法，并逐一实现各个部分。\n\
