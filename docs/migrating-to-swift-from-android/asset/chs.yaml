  \ 模拟器中全屏播放视频与嵌入播放视频\n\n## WebView\n\n### ANDROID ANALOGY\n\n`android.widget.WebView`。\n\
  \n你可以在几乎所有主流移动平台（包括 iOS、Android、BlackBerry 和 Windows Phone）的移动应用中显示丰富的 HTML 内容。这使你能够将\
  \ Web 内容作为移动应用的一部分来交付。一种常见场景是，当你希望在你的应用中提供需要频繁更新的信息，并且希望将内容托管在线上作为网页时。更进一步，Web 内容不必是远程的；你可以将网页内容与原生应用打包在一起。这使得\
  \ Web 开发人员能够利用他们的 Web 开发技能，创建所谓的混合型应用。\n\n借助 HTML5 和 CSS3 的新特性，许多 Web 开发人员正在创建有意义且具有交互性的\
  \ Web 应用，这正在缩短原生应用与移动 Web 应用之间的差距。在 iOS 中，关键的 SDK 类是 `UIWebView`，它支持许多 HTML5 和 CSS3\
  \ 特性（例如 `Offline Cache` 和 `WebSocket` 等）。\n\n例如，以下步骤演示了使用 `UIWebView` 的常见任务：\n\n\
  1. 选择 `Main.storyboard`，从 **Object Library** 中拖拽一个 `UIWebView`，并将其放置在视频 `View` 下方（参见图\
  \ 4-36）。在 **Attributes Inspector** 中设置其属性；通常设置为 **Scales Page To Fit**。\n\n   ![9781484204375_Fig04-36.jpg](img/9781484204375_Fig04-36.jpg)\n\
  \n   图 4-36. iOS `UIWebView` 在 Connections Inspector 中的属性\n\n2. 像往常一样，打开 **Assistant\
  \ Editor** 并在 **Connections Inspector** 中将以下 Outlet 连接到你的代码（参见图 4-36）：\n   1. 连接\
  \ `IBOutlet`，以便你可以在代码中使用该控件。\n   2. 连接 `delegate` Outlet，以便你的代码可以拦截 `UIWebView`\
  \ 的生命周期事件。\n\n3. 列表 4-18 演示了常用于 `UIWebView` 的编程代码。\n   1. 使用 `loadRequest(...)`\
  \ 加载 URL。你也可以创建一个文件 URL 来加载本地 HTML 文件。\n   2. 使用 `loadHTMLString(...)` 渲染简单的字符串文本。\n\
  \   3. 虽然此处未演示，但你也可以使用 `loadData(...)` 来渲染通常通过 `NSURLConnection` 从远程内容获取的 `NSData`，我将在后面的\
  \ “`NSURLConnection`” 章节中演示这一点。\n\n***列表 4-18***. 用于加载 URL 或字符串文本的 `UIWebView` 代码\n\
  \n```swift\nclass ViewController: ... {\n    ...\n    override func viewDidLoad()\
  \ {\n        ...\n        //    self.showWebPage(url: \"http://pdachoice.com/me/webview\"\
  )\n        self.showWebPage(htmlString: \"<H1>Hello UIWebView</H1>\")\n    }\n \
  \   ...\n    @IBOutlet weak var mWebView: UIWebView!\n    func showWebPage(#url:\
  \ String) {\n        var req = NSURLRequest(URL: NSURL(string: url)!)\n        self.mWebView.loadRequest(req)\n\
  \    }\n\n    func showWebPage(#htmlString: String) {\n        self.mWebView.loadHTMLString(htmlString,\
  \ baseURL: nil)\n    }\n    ...\n}\n```\n\n4. 要拦截 `UIWebView` 的生命周期事件，请实现 `UIWebViewDelegate`\
  \ 协议，如列表 4-19 所示。\n\n***列表 4-19***. `UIWebViewDelegate` 协议\n\n```swift\nclass ViewController:\
  \ ... , UIWebViewDelegate{\n    ...\n    func webView(webView: UIWebView, shouldStartLoadWithRequest\
  \ request: NSURLRequest, navigationType: UIWebViewNavigationType) -> Bool {\n  \
  \      // do something, like re-direct or intercept etc.\n        return true; //\
  \ false to stop http request\n    }\n    func webViewDidStartLoad(webView: UIWebView)\
  \ {\n        // do something, e.g., start UIActivityViewIndicator\n        self.mActivityIndicator.startAnimating()\n\
  \    }\n    func webViewDidFinishLoad(webView: UIWebView) {\n        // do something,\
  \ e.g., stop  UIActivityViewIndicator\n        self.mActivityIndicator.stopAnimating()\n\
  \    }\n    func webView(webView: UIWebView, didFailLoadWithError error: NSError)\
  \ {\n        // do something, i.e., show error alert\n        self.mActivityIndicator.stopAnimating()\n\
  \        var alert = UIAlertController(title: \"Error\", message: error.localizedDescription,\
  \ preferredStyle: UIAlertControllerStyle.Alert)\n        alert.addAction(UIAlertAction(title:\
  \ \"Close\", style: UIAlertActionStyle.Cancel, handler: nil))\n        self.presentViewController(alert,\
  \ animated: true, completion: nil)\n    }\n    ...\n}\n```\n\n构建并运行应用，查看 iOS `UIWebView`\
  \ 的实际效果。现在，即使是 iPad Air 的屏幕也显得太小了（参见图 4-37）。你需要一个类似 Android 的 `ScrollView`，接下来你将实现它。\n\
  \n![9781484204375_Fig04-37.jpg](img/9781484204375_Fig04-37.jpg)\n\n图 4-37. iPad\
  \ Air 模拟器中的 `UIWebView`\n\n## ScrollView\n\n### ANDROID ANALOGY\n\n`android.widget.ScrollView`。\n\
  \n由于移动设备屏幕尺寸较小，`ScrollView` 对于显示比物理显示屏更大的内容视图非常有用。要在 iOS 中实现这一点，你需要使用 `UIScrollView`。\n\
  \n要使 `UIScrollView` 与自动布局配合使用，更简单的方法是首先将所有控件包裹在一个容器视图中，这将使你能够像往常使用自动布局一样在容器视图中布局控件。\n\
  \n以下步骤演示了如何在 `CommonWidgets` 应用中通常使用 iOS `UIScrollView` 的操作方法：\n\n1. 选择根 `View`\
  \ 中的所有控件，从 Xcode 菜单栏中选择 **Embed In** ![image](img/arrow.jpg) **View**，将这些通用控件嵌入到一个\
  \ `View` 中（参见图 4-38），并将此 Storyboard 标签更改为 `containerView`。\n\n   ![9781484204375_Fig04-38.jpg](img/9781484204375_Fig04-38.jpg)\n\
  \n   图 4-38. 将所有控件嵌入到一个 `View` 中\n\n2.\n\n\n\n1. 将**视图控制器模拟大小**更改为**固定**。故事板场景会变短，部分控件将移出屏幕，如图\
  \ 4-39 所示。\n\n   ![9781484204375_Fig04-39.jpg](img/9781484204375_Fig04-39.jpg)\n\
  \   图 4-39. 将场景更改为固定大小\n\n2. 借助容器，你可以通过将 `containerView` 嵌入到 `UIScrollView` 中，从而整体滚动\
  \ `containerView`。首先选中 `containerView`，然后将其嵌入到滚动视图中，如图 4-40 所示（**菜单栏** ![image](img/arrow.jpg)\
  \ **编辑器** ![image](img/arrow.jpg) **嵌入于** ![image](img/arrow.jpg) **滚动视图**）。\n\n\
  \   ![9781484204375_Fig04-40.jpg](img/9781484204375_Fig04-40.jpg)\n   图 4-40. 将\
  \ `containerView` 嵌入到滚动视图中\n\n3. 打开**添加新约束**弹出窗口，将 `UIScrollView` 的各个边缘以零间距固定到父视图的边缘，并更新框架（参见\
  \ 图 4-41）。\n\n   ![9781484204375_Fig04-41.jpg](img/9781484204375_Fig04-41.jpg)\n\
  \   图 4-41. 设置 `UIScrollView` 的位置\n\n4. 上一步操作会使 `contentView` 发生偏移。在 `contentView`\
  \ 的**大小检查器**中，将 `contentView` 重新定位到 `(0,0)`，大小为 `600`（**不要**更改高度）。\n\n5. 自动布局约束将用于计算滚动位置。你需要创建自动布局约束，将各个边缘以零间距固定到父级\
  \ `UIScrollView`（参见 图 4-42）。\n\n   ![9781484204375_Fig04-42.jpg](img/9781484204375_Fig04-42.jpg)\n\
  \   图 4-42. 将 `contentView` 以零间距固定到 `UIScrollView`\n\n6. 为了使 `containerView` 适应尺寸类别，需要创建将控件对齐到父级前导和尾随边缘的约束。目前，你无法使用故事板为此绘制自动布局，因此必须编写代码，如\
  \ 代码清单 4-20 所示。\n\n   ***代码清单 4-20***. 将 `contentView` 边缘固定到屏幕/根视图边缘\n\n   ```\n\
  \   class ViewController: ... {\n       ...\n       @IBOutlet var mContainer: UIView!\n\
  \       override func viewDidLoad() {\n       ...\n       var leftConstraint = NSLayoutConstraint(\n\
  \                   item: self. mContainer,\n            attribute: NSLayoutAttribute.Leading,\n\
  \            relatedBy: NSLayoutRelation(rawValue: 0)!,\n               toItem:\
  \ self.view,\n            attribute: NSLayoutAttribute.Leading,\n           multiplier:\
  \ 1.0,\n             constant: 0)\n         self.view.addConstraint(leftConstraint)\n\
  \n         var rightConstraint = NSLayoutConstraint(\n                   item: self.\
  \ mContainer,\n            attribute: NSLayoutAttribute.Trailing,\n            relatedBy:\
  \ NSLayoutRelation(rawValue: 0)!,\n               toItem: self.view,\n         \
  \   attribute: NSLayoutAttribute.Trailing,\n           multiplier: 1.0,\n      \
  \       constant: 0)\n         self.view.addConstraint(rightConstraint)\n\n    \
  \   }\n       ...\n   ```\n\n7. 你还可以为其他控件设置自动布局，使它们适应不同的尺寸类别。构建并运行应用，体验 iOS `UIScrollView`\
  \ 的实际效果。你应该可以通过上下滚动视图来查看所有控件（参见 图 4-43）。\n\n   ![9781484204375_Fig04-43.jpg](img/9781484204375_Fig04-43.jpg)\n\
  \   图 4-43. 带有可滚动视图的 `CommonWidgets`\n\n## 动画\n\n在过去，我很少关注动画效果，但我认为 iOS 的发展无疑提高了门槛。在\
  \ iOS 中，你可以使用简单的 `UIView` 动画 API 来对 `UIView` 属性进行动画处理。\n\n为了通过示例学习，请修改现有的 `UISegmentedControl.doScValueChanged(...)`\
  \ 方法，如 代码清单 4-21 所示，使用 `UIView.animateWithDuration(...)` 方法创建一些动画效果。\n\n***代码清单\
  \ 4-21***. `UIView.animateWithDuration(...)`\n\n```\n... @IBAction func doScValueChanged(sender:\
  \ AnyObject) {\n    var idx = self.mSegmentedControl.selectedSegmentIndex\n    self.logText(\"\
  segment \\(idx)\")\n    let center = self.mButton.center\n    UIView.animateWithDuration(1,\
  \ animations: { action in\n        self.mButton.center = CGPoint(x: center.x, y:\
  \ center.y / (idx + 1))\n        self.mButton.alpha = 1 / (idx + 1)\n        },\
  \ completion: { action in\n            UIView.animateWithDuration(1, delay: 0, usingSpringWithDamping:\
  \ 0.5, initialSpringVelocity: 0.5, options: UIViewAnimationOptions.CurveEaseInOut,\
  \ animations: { action in\n                self.mButton.center = center\n      \
  \          }, completion: {  action in\n                    // 不执行任何操作\n       \
  \         })\n        })\n}\n...\n```\n\n`UIView.animateWithDuration(...)` 有多个重载变体，它们的工作方式相同。你可以通过在动画块内修改以下\
  \ `UIView` 属性来为其添加动画效果：\n\n* `frame`：视图区域\n* `center`：位置\n* `transform`：缩放和旋转\n\
  * `alpha`：透明度\n* `backgroundColor`\n\n#### 保存数据\n\n在几乎所有常见的编程平台上，保存数据都是一项基本编程任务。除了事务数据，大多数移动应用还会保存应用状态和用户偏好，以便用户稍后可以继续他们的任务。iOS\
  \ 和 Android 都提供了多种持久化存储选项。iOS SDK 提供了以下选择：\n\n* `用户默认系统`存储\n* `文件`存储\n* `CoreData`\
  \ 框架和 `SQLite` 数据库（本书未涉及）\n\n在深入探讨前两个选项之前，你需要创建一个 Xcode 项目，以便编写代码并可视化这些选项的工作方式。\n\
  \n1. 启动 Xcode，使用**单视图应用**模板，并将项目命名为 `SaveData`。\n\n2. 创建一个带有 `UIBarButtonItem` 的导航栏（参见\
  \ 图 4-44）：\n\n   1. 在故事板中选择**视图控制器**，然后在 Xcode 菜单栏中选择**编辑器** ![image](img/arrow.jpg)\
