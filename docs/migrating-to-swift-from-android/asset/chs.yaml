  \n图 3-31. `NavigationStack` 故事板\n\n### `UINavigationController`\n\n**Android 类比**\n\
  \n`FragmentTransaction` 返回栈\n\n这个 iOS 项目中唯一缺失的部分是一种以典型的推入（push）和弹出（pop）方式来显示合适子视图控制器的方法。在\
  \ iOS 中，`UINavigationController` 管理推入和弹出屏幕的导航栈行为。它还提供了一个导航栏，其中包含默认的后退按钮、居中的标题以及可选的右侧按钮（参见图\
  \ 3-32）。\n\n![9781484204375_Fig03-32.jpg](img/9781484204375_Fig03-32.jpg)\n\n图 3-32.\
