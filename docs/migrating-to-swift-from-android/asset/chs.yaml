  ### Java 类到 Swift 类\n\n现在，你的 Xcode iOS 项目中已拥有所有匹配的类。下一步是将每个类进一步分解，将 Android 方法移植到\
  \ iOS 方法。再次强调，我对每个类采用自上而下的方法：先移植成员签名，并尽量将内部实现推迟到后面。为了方便起见，你可以参考表 5-1 作为逐步指南。经过一两次练习后，你会发现表中的信息已成为常识，但我认为它能使翻译工作更具系统性。\n\
  \n表 5-1. 类移植步骤\n\n| 步骤 | 说明 |\n| --- | --- |\n| 1. | 对于每个类，将 Java 对应的内容复制到 Swift\
  \ 中。 |\n| 2. | 将 Java 字段转换为 Swift 存储属性。对于 Java 静态常量，转换为 Swift 内部 `struct static`\
  \ 变量。 |\n| 3. | 将方法声明转换为 Swift。尽可能保留签名，生命周期方法除外。a. 将 Java 实现保留为 Swift 注释。它们是经过验证的完美逻辑。b.\
  \ 将 Android 生命周期方法签名转换为 iOS 对应的签名，包括构造函数。c. 保留工具方法的签名。 |\n\n步骤 1 和步骤 2 比较简单。步骤 3\
  \ 是关键，用于将类分解为更小的单元：方法。当你按照表 5-1 完成所有类的处理后，所有类都应包含可调用的方法骨架。\n\n接下来，你可以逐一将注释掉的 Java\
  \ 代码翻译为 Swift（参见本章后续的“Java 方法到 Swift 方法”）。\n\n为了方便起见，表 5-2 总结了你在此步骤中一定会遇到的成员声明映射关系。\n\
  \n表 5-2. Java 和 Swift 中的成员声明\n\n| 语言 | Java | Swift |\n| --- | --- | --- |\n| **变量**\
  \ | `String aName` | `var aName: String` |\n| **类变量** | `static ...` | 内部 struct\
  \ 中的 static var |\n| **方法声明** | `String aMethod(int a)` | `func aMethod(a: Int)\
  \ -> String` |\n| **类方法** | `static ...` | `class func ...` |\n| **构造函数** | `ClassName(...)`\
  \ | `init(...)` |\n| **Android Context** | `Activity, Context` | 删除它们。 |\n\n####\
