- "# 第 2 章\n\n## iOS 编程基础\n\n为 iOS 和安卓创建移动应用既有趣又有回报。有了 Xcode，您现在可以编写代码、构建并运行 iOS 应用了。在\
  \ Swift 于 2014 年苹果全球开发者大会上正式发布之前，Objective-C 一直是 iOS 应用的主要编程语言。如果您刚开始学习 iOS 编程，应该选择\
  \ Swift，因为没有理由选择旧方式而错过最新、最强大的功能。您的下一步应该是学习以下基础知识：\n\n* Swift 编程语言\n* iOS 项目结构和 Xcode\
  \ 故事板编辑器\n\n本章的目的是让您熟悉本书中的 Swift 代码。为了实现这一目标，您将创建一个 `HelloSwift` 项目，同时学习 **Swift\
  \ 编程语言**的重点内容。\n\n在本章的第二部分，您将创建另一个 Xcode iOS 项目。所有 iOS 应用都有一个用户界面（UI）。您通常首先使用最重要的\
  \ Xcode 工具——**故事板编辑器**创建 UI，该工具用于绘制 UI 控件和组件，并将它们连接到您的代码。在创建此 iOS 应用的过程中，您还将看到典型的\
  \ iOS 项目结构和组件。一开始您可能不需要了解 iOS 框架的所有内容，但第一堂故事板课程应“刚好足够”让您感受到不同的编程范式。之后，第 3 章 和 第\
  \ 4 章 中的内容将继续提供常见编程任务和框架主题的逐步指导。按照这些对应说明操作，当您对整个应用有了更全面的了解时，这些概念将更容易被记住。\n\n## Swift\
  \ 语言概要\n\nSwift 是用于创建 iOS 应用的最新编程语言，它在语言语法方面与 Java 有许多相似的规则和方面。我非常有信心，学习 Swift 语言不会成为您最大的障碍；Java\
  \ 或 C# 开发者可以自然地掌握 Swift 代码。为了让您快速预览，表 2-1 展示了 Java 到 Swift 的快速对比：\n\n表 2-1. Java\
  \ 到 Swift 语言语法简要对比\n\n![image](img/Table2-1.jpg)\n\n\n\nSwift 还定义了**文件**和**模块**访问控制：`private`、`public`\
  \ 和 `internal`。虽然它们与 Java 中的对应概念含义不同，但如果你将每个类定义在单独的文件中，`private`/`public` 访问控制的使用方式是一致的。默认的\
  \ `internal` 访问控制在同一项目的任何文件中也是公开的，但在导入到其他项目时不可见。Swift 的 `internal` 控制对于创建框架项目（而非应用模块）更为实用。\n\
  \n## 使用 Xcode 的 HelloSwift\n\n我不会正式地描述其用法和语法规则，而是让你亲自创建一个 `HelloSwift` Xcode 项目，并自行编写来自表\
  \ 2-1 的代码清单。你还将执行以下常见的 Xcode 编程任务：创建类、构建并运行项目，以及使用调试器。\n\n### 创建 Swift 命令行项目\n\n\
  我们来创建一个命令行 Swift 程序，因为它非常简单，你可以专注于 Swift 语言本身，而不被其他问题分散注意力。\n\n请按照以下说明操作：\n\n1.\
  \  如果 Xcode 6 未运行，请启动它。你应该会看到 **Welcome to Xcode** 启动界面，如图 1-3 所示。选择 **Create a\
  \ new Xcode Project**（见图 1-3）。或者，你也可以通过从 Xcode 菜单栏中选择 **File → Project...** 来执行相同操作。\n\
  2.  在 **Choose a template for your new project** 屏幕中（见图 2-1），选择 **OS X → Application\
  \ → Command Line Tool**。\n\n![9781484204375_Fig02-01.jpg](img/9781484204375_Fig02-01.jpg)\n\
  \n图 2-1. 选择 Xcode 模板\n\n3.  按照你创建 `LessonOne` 项目时使用的屏幕说明（见第 1 章，“使用模板创建 iOS 项目”）来完成使用该模板创建新项目：\n\
  \    - **Product Name（产品名称）**：`HelloSwift`\n    - **Organization Name（组织名称）**：例如\
  \ `PdaChoice`\n    - **Organization Identifier（组织标识符）**：例如 `com.liaollc`\n    -\
  \ **Language（语言）**：`Swift`\n    - 完成后点击 **Next（下一步）** 按钮。\n    - 选择一个文件夹来保存你的 `HelloSwift`\
  \ 项目。\n\n`HelloSwift` 项目会出现在 **Project Navigator（项目导航器）** 区域中（见图 2-2）。\n\n![9781484204375_Fig02-02.jpg](img/9781484204375_Fig02-02.jpg)\n\
  \n图 2-2. 创建 `HelloSwift` 项目\n\n命令行模板会自动为你创建 `main.swift` 文件。这是程序的入口点，类似于 Java 中的\
  \ `main(...)`。你将在 `main.swift` 中编写代码，以演示常见的面向对象代码。\n\n图 2-2 显示典型的 Xcode 工作区包含从左到右的三个区域和一个顶部工具栏。每个区域内都包含子视图，你可以使用选择栏进行切换。\n\
  \n-   **Project Navigator（项目导航器）** 区域位于左侧。类似于 Eclipse 的项目浏览器，在这里你可以看到整个项目结构，并选择要编辑的文件。该区域还有其他视图；例如，你可以通过在选择栏中选择搜索图标来启用搜索视图。\n\
  \    -   中间的 **Source Editor（源代码编辑器）** 区域会在其编辑器中显示所选择的文件，你可以在其中编辑文件、编写代码或根据所选文件修改项目设置。**Console（控制台）**\
  \ 和 **Variable（变量）** 视图位于 **Debug（调试）** 区域内。在调试会话期间，你很可能需要显示它们。你可以通过点击顶部和底部工具栏上的切换按钮来隐藏或显示它们。\n\
  \    -   右侧的 **Utility（工具）** 区域包含多个 **Inspector（检查器）** 视图，这些视图允许你编辑整个文件或 **Source\
  \ Editor** 中所选项的属性。根据所选文件类型的不同，顶部选择栏中将提供不同类型的检查器。例如，如果你正在编辑一个屏幕或 UI 部件，选择栏中会显示更多的检查器。该区域的底部称为\
  \ **Libraries（库）**。使用选择栏选择一个库视图。你可以从 **Libraries** 拖放项目到适当的编辑器，以可视化地修改文件内容。你将经常使用\
  \ **Object Library（对象库）** 来可视化地组合 UI。\n\n点击选择栏上的任意图标，或将鼠标悬停在图 2-2 中的指针上，即可查看工作区中的悬停文本提示，以便熟悉\
  \ Xcode 工作区。这些子视图比 Eclipse 中的更紧凑，但本质上 Xcode 是一个用于相同目的的工具：编辑项目文件以及编译、构建、调试和运行可执行文件。你将在这本书中反复使用它。\n\
  \n### 创建 Swift 类\n\n要创建一个新的 Swift 类，你可以在现有的 `main.swift` 文件中创建，或者按照 Java 惯例在其自己的文件中创建，如下步骤所示：\n\
  \n4.  展开新创建的 `HelloSwift` 项目，右键点击 `HelloSwift` 文件夹以调出文件夹上下文菜单（见图 2-3），然后选择 **New\
  \ File...**\n    1.  在 **Choose a template for your new file** 屏幕中，从左侧面板选择 **iOS\
  \ → Source**，然后从右侧面板选择 **Swift File**。\n    2.  保存文件并将其命名为 `MobileDeveloper.swift`。该文件应出现在你的项目中。\n\
  \n![9781484204375_Fig02-03.jpg](img/9781484204375_Fig02-03.jpg)\n\n图 2-3. 从文件夹上下文菜单创建\
  \ Swift 类\n\n5.  在 `MobileDeveloper.swift` 文件中输入代码清单 2-1 中的代码，以创建 `MobileDeveloper`\
  \ Swift 类。\n\n***代码清单 2-1***. 声明 `MobileDeveloper` 类\n\n```\nclass MobileDeveloper\
  \ {\n\n}\n```\n\n**注意** 与 Java 不同，Swift 类不会隐式继承任何类。它可以独立作为基类。\n\n6.  通过在类内部声明一个变量来创建一个名为\
  \ `name` 的属性（见代码清单 2-2）。这在 Swift 中称为**存储属性**，其中变量类型由所赋的值推断得出（在 Swift 中称为**类型推断**）。\n\
  \n***代码清单 2-2***. Swift 中的存储属性\n\n```\nclass MobileDeveloper {\n    var name = \"\
  \" // var 类型由该值推断为 String\n}\n```\n\n**注意** 分号 (`;`) 用于终止语句是可选的。\n\n### 创建 Swift\
  \ 协议\n\n**Java 类比**\n\nJava 接口定义了对象的职责。\n\n在面向对象编程（OOP）中，定义一组期望某些对象具备的行为非常重要。在 Java\
  \ 中，你声明一个**接口**；在 Swift 中，你声明一个**协议**。\n\n通过以下操作创建一个名为 `Programmer` 的 Swift 协议：\n\
  \n\n```markdown\n\n1. 右键点击`HelloSwift`文件夹，创建`Programmer.swift`文件。\n2. 在**Source\
  \ Editor**中，创建`Programmer`协议，其中包含方法`writeCode(...)`，如示例 2-3 所示。\n\n***示例 2-3***.\
  \ 声明`Programmer`协议\n\n```\n    protocol Programmer {\n      func writeCode(arg:\
  \ String) -> Void\n    }\n    ```\n\n### 实现协议\n\n#### JAVA 类比\n\n实现一个 Java 接口。\n\
  \n要遵守 Swift 协议中定义的预期行为，标记的类必须实现协议中定义的方法。要使`MobileDeveloper`类实现`Programmer`协议，请执行以下操作：\n\
  \n1. 修改`MobileDeveloper.swift`，并声明`MobileDeveloper`类实现`Programmer`协议，如示例 2-4 所示。\n\
  \n***示例 2-4***. 遵守`MobileDeveloper`协议\n\n```\n    class MobileDeveloper : Programmer\
  \ {\n      ...\n    }\n    ```\n\n**注意**：如果 Swift 类已有超类，请在它采纳的任何协议之前列出超类名称，后跟逗号（`,`）——例如，`class\
  \ MobileDeveloper : Person, Programmer`。\n\n2. 提供`writeCode(...)`方法的实现体，如示例 2-5\
  \ 所示。\n\n***示例 2-5***. 方法体\n\n```\n    class MobileDeveloper: Programmer {\n   \
  \   ...\n      func writeCode(arg: String) -> Void {\n        println(\"\\(self.name)\
  \ wrote: Hello, \\(arg)\")\n      }\n    }\n    ```\n\n**注意**：`\\(self.name)`在带引号的`String`字面量内部首先被计算。\n\
  \n### 使用 Swift 实例\n\n#### JAVA 类比\n\n```\nProgrammer you = new MobileDeveloper();\n\
  you.setName(\"You\");\nyou.writeCode(\"Java\");\n```\n\n你已经创建了一个 Swift `MobileDeveloper`类，并实现了`Programmer`的职责，这与在\
  \ Java 中的做法基本相同，只是语法上有些许差异。使用该类时，原则上与 Java 相同，即从发送者调用接收者中定义的方法。修改`HelloSwift/main.swift`，如示例\
  \ 2-6 所示。\n\n***示例 2-6***. Swift 入口文件`main.swift`\n\n```\nvar you = MobileDeveloper()\n\
  you.name = \"You\";\nyou.writeCode(\"Java\");\n```\n\n## Xcode 调试器\n\n了解如何在创建软件时使用调试器可以大大提高你的工作效率。请执行以下操作以查看\
  \ Xcode 调试器中的常见调试任务：\n\n1. 要设置**断点**，请点击 Xcode 代码编辑器中的行号。图 2-4 展示了在`main.swift`文件中设置的一个断点。\n\
  \n![9781484204375_Fig02-04.jpg](img/9781484204375_Fig02-04.jpg)\n\n图 2-4. 断点\n\n\
  **注意**：要打开 Xcode 编辑器中的行号，请转到 Xcode 顶部菜单栏并选择 **Xcode ![image](img/arrow.jpg) Preferences...\
  \ ![image](img/arrow.jpg) Text Editing ![image](img/arrow.jpg) Show Line Numbers**。那里还有其他方便的设置，你可能想要查看（例如，快捷键在\
  \ **Key Binding** 下定义）。\n\n2. 要运行`HelloSwift`项目，请点击左上角的三角形**运行**按钮，或按 **z**+R（参见图\
  \ 2-5）。\n\n![9781484204375_Fig02-05.jpg](img/9781484204375_Fig02-05.jpg)\n\n图 2-5.\
  \ Xcode 调试\n\n3. Swift 程序应该启动，然后在断点处停止，如图 2-5 所示。调试时，我通常根据需要打开或关闭以下子视图：\n    1.\
  \ 隐藏**导航**区域或切换到**调试导航器**以查看线程。\n    2. 显示**调试**区域，带有调试工具栏、**变量**和**控制台**视图。\n \
  \   3. 隐藏**实用工具**区域。\n\n**堆栈跟踪**、**变量检查器**、**输出控制台**和**调试**工具栏在大多数 IDE（包括 Xcode\
  \ 和 Eclipse）中都有相似的外观和感觉。\n\n这完成了你的`HelloSwift`应用程序练习。随着你阅读本书中的 iOS 项目，你将发现更多关于 Xcode\
  \ IDE 的生产力技巧。\n\n## 更多关于 Swift 语言\n\n很多 Java 语法和传统编码方法在 Swift 中也能很好地工作。然而，Swift\
  \ 也有自己的非常简洁的特性，所以现在值得快速了解一下。\n\n要学习本节内容，最好使用 Xcode 中名为 **Playgrounds** 的新功能。启动 Xcode\
  \ 并选择 **Get Started with a playground**。你可以编写任何你想要的代码片段，并立即看到结果或语法错误。图 2-6 展示了 Playground：你在左侧面板编写代码，右侧面板立即呈现结果。\n\
  \n![9781484204375_Fig02-06.jpg](img/9781484204375_Fig02-06.jpg)\n\n图 2-6. Xcode\
  \ Playground\n\n#### JAVA 类比\n\nJava 草稿本。\n\n## 变量和常量\n\n使用`var`关键字声明变量，使用`let`声明常量。Java\
  \ 变量总是在封闭的花括号内定义，而 Swift 变量如果在封闭的花括号外定义，则是全局变量。以下代码片段（参见示例 2-7）展示了 Swift 变量的用法：\n\
  \n***示例 2-7***. 常见变量用法\n\n```\nvar GlobalVar : String = \"Global Variable\"; //\
  \ 全局作用域\n\nclass MyClass {\n  var mProperty : String = \"\"; // 类作用域\n  let mConstant\
  \ : Int = 0; // 常量\n\nfunc myMethod(arg : String) {\n    var aVar : String = \"\"\
  ; // 方法作用域内的局部变量\n    let aConstant = 1;\n  }\n}\n```\n\n## 类型安全与类型推断\n\nJava 和\
  \ Swift 都是类型安全的语言。任何变量都必须用类型声明；编译器将帮助标记任何不匹配的类型。在 Swift 中，如果类型可以根据其值推断出来，则不需要显式声明类型。示例\
  \ 2-8 本质上与示例 2-7 完全相同。Swift 的类型推断功能鼓励开发者分配初始值，从而减少因未初始化数据导致的常见错误。\n\n***示例 2-8***.\
  \ 常见类型推断用法\n\n```\nvar GlobalVar = \"Global Variable\"\n\nclass MyClass {\n  var\
  \ mProperty = \"\"\n  let mConstant = 0\n\nfunc myMethod(arg : String) {\n    var\
  \ aVar = \"\";\n    let aConstant = 1\n  }\n}\n```\n\n## 可选变量\n\n可选变量使用类型和后缀问号（`?`）声明，称为可选类型。这表示它所包含的值可能是缺失的（`nil`，相当于\
  \ Java 中的`null`），而不会是预期类型。例如，示例 2-9 展示了在 Swift 和 Java 中将字符串转换为整数的区别。\n\n***示例 2-9***.\
  \ Swift 中的可选类型 vs. Java 中的异常处理\n\n```\n////// Java NumberFormatException\nString\
  \ intStr = \"123\"; // or \"xYz\"\nint myInt;\ntry {\n  myInt = Integer.parseInt(\"\
  234\");\n} catch (NumberFormatException e) {\n  myInt = Integer.MAX_VALUE;\n}\n\n\
  ////// Swift Optional Int\nvar intStr = \"123\"\nvar myInt : Int? = intStr.toInt()\
  \ // myInt 可以为 nil\n```\n\n可选类型通过鼓励开发者理解变量是否可能缺失，使 Swift 语言更类型安全、更健壮。示例 2-10 展示了两种实用的\
  \ Swift 可选类型用法：\n\n*   **强制解包**，使用后缀感叹号（`!`）\n*   **可选绑定**\n\n***示例 2-10***. Swift\
  \ 可选 Int\n\n```\nvar intStr = \"123\"\nvar myOptionalInt : Int? = intStr.toInt()\
  \ // 可选 Int\nif myOptionalInt != nil {\n  var myInt = myOptionalInt! // 解包 Int?\
  \ 为 Int\n  println(\"unwrapped Int: \\(myInt)\")\n}\n```\n\n```\n\n```swift\n//\
  \ 在 if 和 while 的局部作用域中使用可选绑定\nif var myInt = intStr.toInt() {\n  // myInt 已被自动解包\n\
  \  println(\"已解包且处于局部作用域：\\(myInt)\")\n}\n```\n\n## 隐式解包可选类型\n\n针对某些变量在赋值后总会拥有值的情况，可以将变量声明为隐式解包可选类型，用\
  \ `!` 代替 `?` 作为后缀。例如：`var delegate: MyDelegate!`\n\n前面描述的所有可选类型用法在此均适用。你可以将其视为可选类型，但无需强制解包。在\
  \ iOS 框架中，此类用法常见于那些在其他地方（例如由调用方）初始化的属性。尤其值得注意的是，iOS 框架中广泛嵌入了代理属性。这些代理被声明为隐式解包可选类型，但其值通常由调用方赋值。再举一例，UI\
  \ 控件通常在 Storyboard 编辑器中绘制，并以 `IBOutlet` 属性的形式连接到代码中。这些 `IBOutlet` 属性也被声明为隐式解包可选类型。在此仅作简要说明，因为后续内容中你会频繁遇到这些用法。\n\
  \n## 元组\n\n元组将多个值组合成一个复合值。这似乎是 Java 开发者（以及使用 C#、Objective-C、C/C++ 等语言的开发者）一直期待的有用特性。例如，无需创建类或结构体（Swift\
  \ 也支持结构体）即可传递或返回值。代码清单 2-11 展示了最常见的元组用法。\n\n***代码清单 2-11***. 常见元组用法\n\n```swift\n\
  var xyz  = (x: 0, y: 0, z: 0)\nprintln(\"xyz \\(xyz) x 为: \\(xyz.x)\\ty 为: \\(xyz.y)\\\
  tz 为: \\(xyz.z)\")\n\n// 或解构元组\nvar xy : (Int, Int) = (1, 1) // 或简写为 var xy = (1,\
  \ 1)\nvar (a, b) = xy\nprintln(\"xy \\(xy) x 为: \\(a)\\ty 为: \\(b)\")\n\nfunc httpResponse()\
  \ -> (rc: Int, status: String) {\n  return (200, \"OK\")\n}\n\nvar resp = httpResponse()\n\
  println(\"响应为: \\(resp.rc)\\t\\(resp.status)\")\n```\n\n## 集合\n\nJAVA 类比\n\n`java.lang.ArrayList`\
  \ 和 `HashMap`。\n\n`Array` 和 `Dictionary` 是 Swift 的两种集合类型。代码清单 2-12 展示了常见用法，包括以下内容：\n\
  \n*   初始化\n*   使用下标语法访问和修改元素\n*   常用集合 API\n\n***代码清单 2-12***. 常见的 `Array` 和 `Dictionary`\
  \ 用法\n\n```swift\n// 集合\nvar emptyArray = Array<String>() // 或 [String]()\nvar emptyDict\
  \ = Dictionary<Int, String>() // [Int: String]()\nvar colors = [\"red\", \"green\"\
  , \"blue\"]\nvar colorDictionary = [\"r\" : \"red\", \"g\" : \"green\", \"b\" :\
  \ \"blue\"]\ncolors.append(\"alpha\") // 或: colors += \"alpha\"\ncolorDictionary[\"\
  a\"] = colors[3]\ncolors.insert(\"pink\", atIndex: 2)\ncolors.removeAtIndex(2)\n\
  println(colors.isEmpty ? \"empty\" : \"\\(colors.count)\")\n```\n\n常量 `Dictionary`\
  \ 或 `Array` 是不可变的，意味着不允许添加或删除元素，也不能修改现有项。而变量 `Dictionary` 或 `Array` 则是可变的。\n\n##\
  \ 控制流\n\n与 Java 类似，在 Swift 中可以使用 `if` 和 `switch` 进行条件判断，使用 `for-in`、`for`、`while`\
  \ 和 `do-while` 实现循环。条件或循环变量两边的括号是可选的。代码块的花括号是必须的。代码清单 2-13 演示了以下常见的控制流用法：\n\n* \
  \  `for-loop`\n*   `for-in`\n*   `while-loop`\n\n***代码清单 2-13***. 控制流\n\n```swift\n\
  for (var idx = 0; idx < 10; idx++) { // 括号可选\n  println(\"for-loop: \\(idx)\")\n\
  }\n\nfor item in [1,2,3,4,5] { // 或 for item in 1...5\n  println(\"for-in: \\(item)\"\
  )\n}\nfor c in \"HelloSwift\" { // 遍历字符\n  print(c)\n}\n\nfor (key, value) in colorDictionary\
  \ {\n  println(\"for-in 字典:\\(key) - \\(value)\")\n}\n\n// while-loop, 或至少执行一次的\
  \ do-while\nvar idx = 0\nwhile idx < colors.count {\n  println(\"while-loop:  \\\
  (colors[idx])\")\n  idx++\n}\n```\n\n## Switch\n\n在 Swift 中，switch 的 case 除了可以使用\
  \ `int` 基本数据类型，还可以是任何类型。代码清单 2-14 展示了 Swift 中改进的 `switch` 控制流用法：\n\n*   合并 case\
  \ 且隐式包含 break\n*   使用区间范围的 case\n*   使用元组的 case\n\n***代码清单 2-14***. 改进的 Switch\n\
  \n```swift\nvar condition = \"red\"\nswitch condition {\ncase \"red\", \"green\"\
  , \"blue\": // 合并 case\n  println(\"\\(condition) 是一种原色\")\n  // 总是隐式 break（不继续执行）\n\
  case \"RED\", \"GREEN\", \"BLUE\":\n  println(\"\\(condition) 是大写形式的原色\")\ndefault:\
  \ // 不再是可选的\n  println(\"\\(condition) 不是原色\")\n}\n\nvar range = 9 // 使用区间范围\nswitch\
  \ range {\ncase 0:\n  println(\"零\")\ncase 0...9:\n  println(\"一位数字\")\ncase 10...99:\n\
  \  println(\"两位数字\")\ncase 10...999: // 第一个匹配即结束\n  println(\"三位数字\")\ndefault:\n\
  \  println(\"四位或更多数字\")\n}\n\nvar coord = (0, 1)\nswitch coord { // 使用元组\ncase (0...Int.max,\
  \ 0...Int.max):\n  println(\"第一象限\")\ncase (Int.min...0, 0...Int.max):\n  println(\"\
  第二象限\")\ncase (Int.min...0, Int.min...0):\n  println(\"第三象限\")\ncase (0...Int.max,\
  \ Int.min...0):\n  println(\"第四象限\")\ndefault:\n  println(\"在坐标轴上\")\n}\n```\n\n\
  `switch` 可以在其局部作用域内绑定匹配的值。您也可以指定 `where` 子句来测试条件。代码清单 2-15 演示了这两种值绑定方式。\n\n***代码清单\
  \ 2-15***. 临时值绑定与使用 `where` 子句\n\n```swift\nvar rect = (10, 10)\nswitch rect {\n\
  case let (w, h) where w == h:\n  println(\"\\((w, h)) 是一个正方形\")\ndefault:\n  println(\"\
  矩形但不是正方形\")\n}\n```\n\n## 枚举\n\n您使用 enum 为一组相关的值定义通用类型。枚举定义后，可以像使用任何 Swift 类型一样安全地使用它。代码清单\
  \ 2-16 展示了常见的枚举用法：\n\n*   带或不带原始值的枚举\n*   关联值的枚举\n\n***代码清单 2-16***. 常见枚举用法\n\n\
  ```swift\nenum DayOfWeek { // 原始值是可选的\n  case SUNDAY, MONDAY, TUESDAY, WEDNESDAY,\n\
  \  THURSDAY, FRIDAY, SATURDAY\n}\n\nvar aDay = DayOfWeek.SUNDAY\nswitch aDay {\n\
  case DayOfWeek.SATURDAY, DayOfWeek.SUNDAY:\n  println(\"\\(aDay) 是周末\")\ndefault:\n\
  \  println(\"\\(aDay) 是工作日\")\n}\n\nenum DayOfWeek2 :  String { // 分配原始值\n  case\
  \ SUNDAY = \"Sun\", MONDAY = \"Mon\", TUESDAY = \"Tue\",\n  WEDNESDAY = \"Wed\"\
  , THURSDAY = \"Thu\", FRIDAY = \"Fri\", SATURDAY = \"Sat\"\n}\n\nvar aDay2 = DayOfWeek2.SUNDAY\n\
  switch aDay2 {\ncase DayOfWeek2.SATURDAY, DayOfWeek2.SUNDAY:\n  println(\"\\(aDay2.rawValue)\
  \ 是周末\")\ndefault:\n  println(\"\\(aDay2.rawValue) 是工作日\")\n}\n\n// 关联值\nenum Color\
  \ {\n  case RGB(Int, Int, Int)\n  case HSB(Float, Float, Float)\n}\n\nvar aColor\
  \ = Color.RGB(255, 0, 0)\nswitch aColor {\ncase var Color.RGB(r, g, b):\n  println(\"\
  R: \\(r) G: \\(g) B: \\(b) \")\ndefault:\n  println(\"\")\n}\n```\n\n## 函数\n\nSwift\
  \ 函数使用 `func` 关键字声明。与 Java 方法不同，参数和返回类型在类型名称之后声明。以下是您最可能遇到的典型 Swift 函数用法（参见代码清单\
  \ 2-17）：\n\n## Swift 编程语言特性\n\n### 元组（Tuples）\n\n- **元组**：您可以返回多个值而无需创建`struct`或`class`（参见清单\
  \ 2-11）。\n- **外部参数名**：应将外部参数名视为函数签名的一部分。所有 iOS Objective-C SDK API 都以外部参数名的方式移植到\
  \ Swift。\n- **默认参数值**：此特性不仅提供了默认值，而且在许多情况下使方法重载比方法链更容易。\n- **可变参数**：方法参数的可变长度，无需使用`Array`类型。\n\
  - **函数参数**默认是常量——这与 Java 规则不同。\n- **Swift 函数**是引用类型。就像使用类类型一样，您可以将函数作为函数参数传递，或将其作为函数返回类型返回。在实践中，您会更频繁地使用闭包表达式。\n\
  - **闭包表达式**是 Swift 中定义的三种**闭包**类型之一。它是一个未命名的自包含代码块，可以作为函数参数传递。第二种闭包类型是这里提到的全局函数，它实际上是闭包的一种特殊情况。第三种闭包类型称为嵌套函数，在函数内部声明，本书中未使用。\n\
  \n***清单 2-17***. 函数用法\n\n```\nfunc doWork(parm : String) -> String { // simple form\n\
  \  return \"TODO: \" + parm\n}\nprintln(doWork(\"Swift\"))\n\n// External parameter\
  \ names is part of the func signature\nfunc doWork2(name parm : String) -> String\
  \ {\n// arg = arg.uppercaseString; // error: constant parm\n  return \"TODO: \"\
  \ + parm\n}\nprintln(doWork2(name: \"Swift\"))\n\n// use # to indicate same name\
  \ for internal and external\nfunc doWork3(#name: String) -> String {\n  return \"\
  TODO: \" + name\n}\nprintln(doWork3(name: \"Swift\"))\n\n// With default parm value,\
  \ it also implies #, same external name\nfunc doWork4(name: String = \"Swift\")\
  \ -> String {\n  return \"TODO: \" + name\n}\nprintln(doWork4()) // default parm\
  \ value\n\n// parm is constant by default unless declaring it with var\nfunc doWork5(var\
  \ name: String = \"Swift\") -> String {\n  name = name.uppercaseString;\n  return\
  \ \"TODO: \" + name;\n}\n\n// variadic parms\nfunc sumNumbers(parms : Int...) ->\
  \ Int {\n  var sum = 0\n  for number in parms {\n    sum += number\n  }\n  return\
  \ sum\n}\nprintln(sumNumbers(2,5,8))\n\n// func is a type, can be used for parm\
  \ or return type.\nfunc separateByAnd(p1: String, p2: String) -> String {\n  return\
  \ p1 + \" and \" + p2\n}\nfunc printTwoString(p1: String, p2: String, format: (String,\
  \ String)->String) {\n  println(format(p1, p2))\n}\nprintTwoString(\"Horse\", \"\
  Carrot\", separateByAnd)\n\n// closure expression is unnamed func\nprintTwoString(\"\
  Horse\", \"Carrot\",\n  {(p1: String, p2: String) -> String in\n    return p1 +\
  \ \" and \" + p2\n  })\nprintTwoString(\"Horse\", \"Carrot\",\n  {p1, p2 in // type\
  \ inferences\n    return p1 + \" and \" + p2\n  })\nprintTwoString(\"Horse\", \"\
  Carrot\",\n  { // Inference and shorthanded parm names, $0, $1 ...\n    return $0\
  \ + \" and \" + $1\n  })\n```\n\n您可能一开始可以不用大多数简写选项，但对于 iOS 编程，您绝对需要习惯外部参数名，因为它们在\
  \ iOS 框架中被大量使用。\n\n### 类（Class）\n\nSwift 类包含与 Java 类相似的元素。最简单的类似 Java 的类形式如清单 2-18\
  \ 所示。\n\n***清单 2-18***. 简单的类似 Java 的 Swift 类\n\n```\nclass SimpleClass {\n  var\
  \ mProperty : Int = 0 // public int mProperty ...\n  var mConstant : String = \"\
  MyKey\" // public String ...\n  func myMethod(name: String) -> Void { println(name)}\n\
  }\n```\n\n### 属性（Property）\n\nJava 字段可以映射到 Swift 属性，如前面的清单 2-18 所示；它们被称为**存储属性**。在\
  \ Swift 中，属性可以比 Java 字段做更多事情。清单 2-19 演示了以下 Swift 属性的用法：\n\n- **存储属性**：Java 字段。\n\
  - **计算属性**：用于派生值。\n- **属性观察器**：可选代码块，用于响应属性值的变化。\n- **类型属性**：类似于 Java 类变量，但存储类型属性目前尚不支持\
  \ Swift 的`class`类型。由于现在支持`struct`类型属性，您可以选择定义内部`struct`作为移植 Java 静态变量的变通方法。\n\n\
  ***清单 2-19***. Swift 类属性\n\n```\nclass MyClass {\n  var width = 10, height = 10\
  \ // stored properties\n\n// computed properties, can have set as well\n  var size\
  \ : Int {\n    get {\n      return width * height\n    }\n  }\n\nvar size2 : Int\
  \ { // readonly, shorthanded\n    return width * height\n  }\n\n// property observer\n\
  \  var depth : Int = 10 {\n    willSet {\n      println(\"depth (\\(depth)) will\
  \ be set to \\(newValue)\")\n    }\n    didSet {\n      println(\"depth (\\(depth))\
  \ was be set from \\(oldValue)\")\n    }\n  }\n\n// Swift class Type property,\n\
  \  class var MyComputedTypeProperty : String {\n    return \"Only computed Type\
  \ property is supported\"\n  }\n\n// use inner struct stored Type property as a\
  \ workaround\n  struct MyStatic {\n    static let MyConst = \"final static in Java\"\
  \n    static var MyVar: String?\n  }\n}\n\nprintln(MyClass.MyStatic.MyConst)\nMyClass.MyStatic.MyVar\
  \ = \"class var in Java\"\nprintln(MyClass.MyStatic.MyVar)\n```\n\n### 方法（Method）\n\
  \n方法是在类型上下文（即类）中定义的函数。它们仍然是前面描述的函数（参见清单 2-17）。您可以像 Java 一样定义实例方法或类方法。清单 2-20 展示了以下典型的方法用法：\n\
  \n- 方法声明隐式强制使用外部名称，但第一个参数除外。这与全局函数不同（参见“函数”部分）。所有 iOS Objective-C 方法都使用此约定移植到 Swift。\n\
  - 使用`class func`声明类类型方法，或使用`static func`在结构体或枚举类型中声明类型方法。\n\n***清单 2-20***. 常见方法用法\n\
  \n```\nclass MyClass {\n\n///////// methods copied from Listing 2-17 //////////\n\
  \  func doWork(parm : String) -> String { // just like func\n    return \"TODO:\
  \ \" + parm\n  }\n\n// default parm value, always imply externl parm name\n  func\
  \ doWork2(name: String = \"Swift\") -> String {\n    return \"TODO: \" + name\n\
  \  }\n\n// func is a type, can be used for parm or return type, etc.\n  func separateByAnd(p1:\
  \ String, p2: String) -> String {\n    return p1 + \" and \" + p2\n  }\n\nfunc printTwoString(p1:String,\
  \ p2:String, format:(String, String)->String) {\n    println(format(p1, p2))\n \
  \ }\n\n// Type methods, aka Java class static method\n  class func DoWork(parm :\
  \ String) -> String {\n    return \"TODO: (Just like Java class static method)\"\
  \ + parm\n  }\n}\n\nvar c = MyClass()\nprintln(c.doWork(\"Swift\"))\nprintln(c.doWork2())\
  \ // default parm value\nprintln(c.doWork2(name: \"Swift\")) // external name enforced\n\
  \n// closure is unnamed func\nc.printTwoString(\"Horse\", p2: \"Carrot\", format:\
  \ c.separateByAnd)\n// Inference and shorthanded parm names apply to method, too.\n\
  c.printTwoString(\"Apple\", p2: \"Orange\", format: {\n  return $0 + \" and \" +\
  \ $1\n  })\n\nMyClass.DoWork(\"Swift Type method\")\n```\n\n### 引用类型与值类型\n\n就像在\
  \ Java 中一样，引用类型是通过引用传递的（实例的引用被复制到另一个变量），而值类型是通过复制传递的（整个值类型实例被复制到另一个内存空间）。但是，您确实需要注意某些差异：\n\
  \n\n- 与 Java 类似，自定义类是引用类型。基本类型、结构体和枚举是值类型。\n- 与 Java 不同，一些常用的数据类型是值类型，包括`String`、`Dictionary`和`Array`（它们在\
  \ Swift 中不是类）。这非常好，但一开始可能会让你感到惊讶。\n- 由于`Dictionary`和`Array`是值类型，它们在赋值时会被复制。如果包含的条目也是值类型，它们会被深拷贝。\n\
  - 你会遇到 Swift 的`NSString`、`NSArray`和`NSDictionary`，因为它们是从对应的 Objective-C Foundation\
  \ 框架类直接移植过来的。它们都被实现为类，因此是引用类型。\n\n## iOS 项目结构\n\n大多数 GUI 应用程序不仅仅由编程源代码组成；例如，一个典型的\
  \ iOS 项目包含 Swift 或 Objective-C 源代码、库、故事板文件、图像或多媒体等非代码应用程序资源、应用程序信息属性`Info.plist`文件等等。Xcode\
  \ 会编译并构建整个项目，并将应用程序所需的所有工件打包到一个扩展名为`.app`的归档文件中，然后使用相应的签名证书对`.app`文件进行签名。\n\n让我们将一个简单的`HelloMobile`\
  \ ADT 项目迁移到 Xcode，以便你能直观地了解典型 iOS 应用程序中的这些软件工件。图 2-7 中的 Android 应用程序是使用 ADT 的**创建\
  \ Android 项目**模板创建的：\n\n- 它只有一个屏幕：一个 Java Fragment 类和一个布局文件。\n- 在这个屏幕上，有一个`EditText`用于接收用户输入。当点击\
  \ **Hello...** 按钮时，它会在一个`TextView`上显示问候语。\n\n![9781484204375_Fig02-07.jpg](img/9781484204375_Fig02-07.jpg)\n\
  \n图 2-7. `HelloMobile`，Android 版本\n\n要创建`HelloMobile` iOS 应用程序，启动 Xcode 并执行以下步骤：\n\
  \n1.  从 **Welcome to Xcode** 启动屏幕中选择 **Create a new Xcode project**（见图 1-3）。或者，你可以从\
  \ Xcode 的顶部菜单栏中选择 **File** ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg)\
  \ **Project**`...`。\n2.  选择 **iOS Application**，然后选择 **Single View Application**\
  \ 作为项目模板（见图 2-8）。\n\n![9781484204375_Fig02-08.jpg](img/9781484204375_Fig02-08.jpg)\n\
  \n图 2-8. Single View Application 模板\n\n3.  填写以下字段以完成新项目的创建：\n    1.  *Product Name*：`HelloMobile`\n\
  \    2.  *Organization Name*：例如，`PdaChoice`\n    3.  *Organization Identifier*：例如，`com.liaollc`\n\
  \    4.  *Language*：`Swift`\n    5.  完成后点击 **Next** 按钮。\n    6.  选择一个文件夹来保存你的`HelloMobile`项目。\n\
  \n基础版的`HelloMobile` iOS 项目已创建，并出现在 Xcode 的 **Project Navigator** 区域中（见图 2-9）。\n\n\
  ![9781484204375_Fig02-09.jpg](img/9781484204375_Fig02-09.jpg)\n\n图 2-9. `HelloMobile`项目\n\
  \n它立即可运行。让我们检查一下 Xcode 项目中构成 iOS 应用程序的典型软件工件：\n\n- `.swift`文件中的 Swift 类。有两个类：\n\n\
  \    a. `AppDelegate.swift`：每个 iOS 应用程序都必须有一个`AppDelegate`类。类似于`android.app.Application`，如果你的程序不需要追踪全局应用程序状态，则无需修改此文件。\n\
  \n    b. `ViewController.swift`：有一个与内容视图配对的`ViewController`类。其预期用途与 Android 项目中的\
  \ Android Fragment 类相同：作为内容视图的内容视图控制器。\n\n- 扩展名为`.storyboard`的`Main.storyboard`文件：\n\
  \n    a. 通常，你会为每个内容视图创建一个故事板场景，并且只对所有内容视图使用一个故事板文件，以便你能够直观地实现它们之间的链接。\n\n- `Images.xcassets`。这是你将图像资源放入所谓“资源目录”的地方：\n\
  \n    b. 开发人员应为每种设备配置提供不同的资源。这与在 Android 中提供替代资源的目的一致。\n\n    a. 截至目前，PNG 和 JPEG\
  \ 图像格式都受支持。使用资源目录并非必须。你可以将任何资源文件拖入 Xcode 项目（你可能想自己创建一个文件夹来组织它们）。\n\n- `Info.plist`文件。此文件描述了应用程序的配置方式以及系统需要了解的必需功能：\n\
