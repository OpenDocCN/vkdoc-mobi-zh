  \n图 2-13。三个简单的 UI 小部件\n\n6.  就像在 Android 中一样，Swift 中 UI 小部件的属性会影响小部件的外观、感觉和行为，你可以直观地更改它们。你可以在位于**实用工具**区域的**属性检查器**中找到并修改这些属性。要使\
