  \ 协议（参见列表 3-13）：\n   1. 实现 `numberOfSectionsInCollectionView(collectionView:)` 方法以返回分区数；若未实现则默认为\
  \ `1`。\n   2. 实现 `collectionView(collectionView:, numberOfItemsInSection:)` 方法以返回每个分区中的项目数。\n\
  \   3. 实现 `collectionView(collectionView:, cellForItemAtIndexPath:)` 方法以返回集合视图的单元格实例。\n\
  \   4. 实现 `collectionView(collectionView:, didSelectItemAtIndexPath:)` 方法以响应单元格的选中事件。\n\
  \n***列表 3-13***. `UICollectionViewDataSource` 和 `UICollectionViewDelegate` 协议\n\n\
  ```\nclass MasterViewController : UIViewController, UICollectionViewDataSource,\
  \ UICollectionViewDelegate {\n  ...\n  // 实现 UICollectionViewDataSource\n  var items\
  \ = [\"item 1\", \"item 2\", \"item 3\", \"item 4\", \"item 5\", \"item 6\", \"\
  item 7\"]\n  func collectionView(collectionView: UICollectionView, numberOfItemsInSection\
  \ section: Int) -> Int {\n    return self.items.count\n  }\n\n// 返回的单元格必须通过调用 -dequeueReusableCellWithReuseIdentifier:forIndexPath:\
  \ 方法获取\n  func collectionView(collectionView: UICollectionView, cellForItemAtIndexPath\
  \ indexPath: NSIndexPath) -> UICollectionViewCell {\n    var cell = collectionView.dequeueReusableCellWithReuseIdentifier(\"\
  cell\", forIndexPath: indexPath) as SimpleCollectionViewCell\n    cell.textLabel.text\
  \ = self.items[indexPath.row]\n    cell.backgroundColor = (indexPath.row % 2 ==\
  \ 0) ? UIColor.whiteColor() : UIColor.lightGrayColor()\n    return cell\n  }\n\n\
  func numberOfSectionsInCollectionView(collectionView: UICollectionView)\n  -> Int\
  \ {\n    return 1\n  }\n\n// 实现 UICollectionViewDelegate\n  func collectionView(collectionView:\
  \ UICollectionView, didSelectItemAtIndexPath indexPath: NSIndexPath) {\n    self.performSegueWithIdentifier(\"\
  detail\", sender: self)\n  }\n}\n```\n\n`TableView` 和 `CollectionView` 都非常灵活。你应该深入了解数据源和委托协议，看看它们为开发者提供了哪些丰富的选项。构建并运行\
