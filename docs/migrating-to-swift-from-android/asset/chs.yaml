  \ 草稿\n\n## UITabBarController\n\n从之前的工作中（参见图 3-49），你可以看到 `UITabBarController` 自带了一个底部标签栏。每个标签栏项都与一个内容视图控制器关联。通过选中一个标签栏项，`UITabBarController`\
  \ 会自动呈现选中的内容视图控制器。\n\n### 添加/移除标签栏项\n\n`UITabBarController` 维护着一个对其子视图控制器引用的数组。在其\
  \ **Connections Inspector** 中，你可以在 Triggered Segues 部分绘制视图控制器的插座，以将子视图控制器添加到 `UITabBarController.viewControllers`\
  \ 数组属性中。你也可以编写代码在运行时添加或移除子视图控制器。\n\n### 更新标签栏项的外观和感觉\n\n你应该为标签栏项分配 `title` 和 `image`\
  \ 属性。当一个 `UIViewController` 被添加到标签栏控制器时，`UIViewController.tabBarItem` 属性代表标签栏中的该项。你可以在标签栏项的\
  \ **Attributes Inspector** 中分配适当的值。在运行时，你可以通过设置相应的 `tabBarItem` 属性来更新 `text` 和 `image`。之前图\
  \ 3-50 显示两个标签栏项具有相同的标签且没有图标图像。请执行以下操作来改善我们的 `TabbedApp` 的外观：\n\n1. 系统提供了一组常见的标签栏项（**Attributes\
  \ Inspector** 中的 **System Item**）。尽可能使用它们以保持平台一致性。为屏幕一选择 **Featured** 系统项（参见图 3-51）。\n\
  \n![9781484204375_Fig03-51.jpg](img/9781484204375_Fig03-51.jpg)\n\n图 3-51. 为屏幕一添加\
  \ **Featured** 系统项\n\n\n\n2. 对于“屏幕 2”，选择**自定义**以提供你自己的标签栏项**标题**和**图像图标**（参见图 3-52）。\n\
  \    1.  输入标题（例如，**二**）。\n    2.  在 `images.xcassets` 中创建一个图像图标（例如 `tab1`），并拖入一个尺寸约为\
  \ **25 × 25**（最大 **48 × 32**）的透明 PNG 图片。图标颜色不作要求，因为仅需渲染其 alpha 通道。\n\n![9781484204375_Fig03-52.jpg](img/9781484204375_Fig03-52.jpg)\n\
  \n图 3-52. 带有 `badgeValue` 的自定义标签项\n\n**注** iOS 对图片规格要求非常严格。有关图片规格，请参阅在线参考：`https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/IconMatrix.html`。\n\
  \n3.  输入图像名称（例如，`tab1`）。\n    4.  你可以输入一个**标记**（例如，**新**），它将显示在图标右上角。通常情况下，这是在运行时通过\
  \ `UITabBarItem.badgeValue` 属性以编程方式设置的。\n\n### 处理运行时行为\n\n为了以编程方式响应运行时行为，与大多数 `UIKit`\
  \ 控件一样，你需要实现一个委托协议：`UITabBarDelegate`。继续使用 `TabbedApp` 来学习处理 `UITabBarDelegate`\
  \ 运行时事件的常见任务。\n\n1.  创建一个自定义标签栏控制器来处理运行时行为，如代码清单 3-15 所示：\n\n    1.  创建一个继承自 `UITabBarController`\
  \ 的 `SimpleTabBarController` 类。\n    2.  声明 `SimpleTabBarController` 实现 `UITabBarControllerDelegate`\
  \ 协议。\n    3.  在故事板中，选中标签栏控制器，然后在**身份检查器**中将 `SimpleTabBarController` 类赋值给它。\n\n\
  ***代码清单 3-15***. `SimpleTabBarController` 类\n\n```\n    class SimpleTabBarController\
  \ : UITabBarController, UITabBarControllerDelegate {\n      override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 加载视图后进行任何额外设置...\n        self.delegate\
  \ = self\n      }\n\n    func tabBarController(tabBarController: UITabBarController,\n\
  \      shouldSelectViewController viewController: UIViewController) -> Bool {\n\
  \        // 你可以执行某些操作并返回 true\n        // 或者，返回 false 以不选中该 viewController\n   \
  \     return true\n      }\n\n    func tabBarController(tabBarController: UITabBarController,\n\
  \      didSelectViewController viewController: UIViewController) {\n        // 你可以执行某些操作\n\
  \      }\n    }\n    ```\n\n2.  每个子内容视图控制器都可以访问 `UIViewController.tabBarController`\
  \ 和 `UIViewController.tabBarItem` 属性。代码清单 3-16 展示了如何从 `FirstViewController` 更改第二个标签的\
  \ `badgeValue`。\n\n***代码清单 3-16***. 更改其他 `tabBarItem` 的 `badgeValue`\n\n```\n(self.tabBarController!.viewControllers![1]\
  \ as UIViewController).tabBarItem.badgeValue = \"Zzz\"\n```\n\n顺带一提，在 iOS 中，标签栏位于屏幕底部，而非像\
  \ Android 那样在顶部。通常，特定平台的用户体验指南绝不可忽视。在 iOS 中保持导航栏在底部，这是大多数 iOS 用户期望的位置。\n\n### 滑动视图\n\
  \n轮播是一种流行的用户体验模式，常用于许多平台，包括桌面和 Web 应用。在移动平台上，你可以使用这种模式配合滑动手势来逐页显示内容。它允许用户在项目间高效切换。配合动画过渡，它提供了更愉悦的浏览体验。iOS\
  \ 和 Android 都提供了框架类以及项目创建模板来推广这种导航用户体验模式。\n\n在 Android 中，你通常使用 `ViewPager` 控件。图\
  \ 3-53 展示了使用 ADT 滑动视图模板创建的 Android `SwipeViews` 应用：\n\n*   容器 Activity 包含一个 `ViewPager`，用于显示来自片段布局的可滑动视图。\n\
  *   它包含一个片段，该片段包含一个表示页面内容的标签。\n*   分页适配器为每个页面创建带有内容的片段。\n\n![9781484204375_Fig03-53.jpg](img/9781484204375_Fig03-53.jpg)\n\
  \n图 3-53. Android `SwipeViews` 应用\n\n你将把这个移植到 iOS。使用 Android 应用或布局文件（参见图 3-54）作为线框图来构建初始的故事板场景。\n\
  \n![9781484204375_Fig03-54.jpg](img/9781484204375_Fig03-54.jpg)\n\n图 3-54. Android\
  \ `layout.xml` 文件\n\n1.  启动 Xcode，使用常用的**单视图应用**模板创建一个新项目，并命名为 `SwipeViews`。\n2.\
  \  将 `ViewController.swift` 文件中的现有类 `ViewController` 重命名为 `ParentViewController`，同时将该视图控制器在故事板场景中的自定义类名也在**身份检查器**中重命名。\n\
  3.  从**对象库**中拖放一个 `UIView` 到故事板场景上：\n    1.  打开故事板**助理编辑器**，在**连接检查器**中通过将引用插座连接到配对的视图控制器来创建一个\
  \ `IBOutlet`，并将其命名为 `mPageView`。\n    2.  添加自动布局约束，将其边缘**固定**到最近的邻居，并将背景设置为浅灰色，如最终故事板所示（参见图\
  \ 3-55）。\n\n![9781484204375_Fig03-55.jpg](img/9781484204375_Fig03-55.jpg)\n\n图 3-55.\
  \ `SwipeViews` 项目中的 `Main.storyboard`\n\n4.  你需要另一个用于页面内容的内容视图-视图控制器对。\n    1. \
  \ 创建一个新的 `PageContentViewController` 类（参见代码清单 3-17）。\n\n***代码清单 3-17***. `ViewController.swift`\
  \ 文件中的两个类\n\n```\n        import UIKit\n        class ParentViewController : UIViewController\
  \ {\n          @IBOutlet weak var mPageView: UIView!\n\n    override func viewDidLoad()\
  \ {\n            super.viewDidLoad()\n          }\n\n    override func didReceiveMemoryWarning()\
  \ {\n            super.didReceiveMemoryWarning()\n            // 处置任何可以重新创建的资源。\n\
  \          }\n        }\n\n    class PageContentViewController: UIViewController\
  \ {\n          @IBOutlet weak var textLabel : UILabel\n        }\n        ```\n\n\
  2.  绘制第二个故事板场景（参见图 3-55 右侧的屏幕）。确保给页面内容视图控制器一个**故事板 ID**（例如 `PageContentViewController`）。你需要这个\
  \ ID 来以编程方式从故事板加载一个控制器。\n\n目前还没有新内容；只需先绘制两个包含视图控制器的故事板场景。你可以构建并运行应用以确保没有错误。与之前可以通过绘制跳转线来进行视图控制器转换的导航堆栈或标签模式不同，你需要编写代码来完成应用，这将是下一步工作。\n\
  \n### UIPageViewController\n\n**ANDROID 类比**\n\n`ViewPager`。\n\n在 iOS 中实现滑动视图模式的关键是\
  \ `UIPageViewController` 类，它使用了相同的数据源模式：实现一个负责提供填充了数据的内容视图的数据源。继续在 `SwipeViews`\
  \ Xcode 项目中执行以下步骤：\n\n1.  修改 `PageContentViewController` 类，使其能够接收数据并呈现三个简单的屏幕（参见代码清单\
  \ 3-18）。\n\n***代码清单 3-18***. 添加 `data` 和 `pageNo` 属性\n\n```\n    class PageContentViewController:\
  \ UIViewController {\n\n    @IBOutlet weak var textLabel : UILabel\n\n    var data\
  \ = \"\"\n      var pageNo = 0\n\n    override func viewDidLoad() {\n        self.textLabel.text\
  \ = data\n      }\n    }\n    ```\n\n\n\n2. `UIPageViewController` 通过 `dataSource`\
  \ 和 `delegate` 协议工作。其父视图控制器 `ParentViewController` 是实现这些协议的合理选择（参见列表 3-19）。\n\n\
  1. `UIPageViewControllerDataSource` 负责提供当前内容视图控制器前后的内容视图控制器。\n2. `UIPageViewControllerDataSource`\
  \ 还定义了可选页面计数和页面选择指示器。\n3. `UIPageViewControllerDelegate` 定义了可选页面控制器事件回调函数。\n\n***列表\
  \ 3-19***。`ParentViewController` 实现 `dataSource` 和 `delegate` 协议\n\n```\nclass ParentViewController\
  \ : UIViewController,\nUIPageViewControllerDataSource, UIPageViewControllerDelegate\
  \ {\n\n...\n  // 实现数据源\n  let items = [\"Page: 1\", \"Page: 2\", \"Page: 3\"]\n\
  \  func pageViewController(pageViewController: UIPageViewController,\n  viewControllerBeforeViewController\
  \ viewController: UIViewController) ->\n  UIViewController? {\n\nvar pageNo = (viewController\
  \ as PageContentViewController).pageNo\n    if pageNo > 0 {\n      var vc = self.storyboard.instantiateViewControllerWithIdentifier(\"\
  PageContentViewController\")\n      as PageContentViewController\n      vc.data\
  \ = self.items[pageNo-1]\n      vc.pageNo = pageNo - 1\n      return vc\n    }\n\
  \nreturn nil\n  }\n\nfunc pageViewController(pageViewController: UIPageViewController,\n\
  \  viewControllerAfterViewController viewController: UIViewController) ->\n  UIViewController?\
  \ {\n\nvar pageNo = (viewController as PageContentViewController).pageNo\n    if\
  \ pageNo < self.items.count - 1 {\n      var vc = self.storyboard.instantiateViewControllerWithIdentifier(\"\
  PageContentViewController\")\n      as PageContentViewController\n      vc.data\
  \ = self.items[pageNo+1]\n      vc.pageNo = pageNo + 1\n      return vc\n    }\n\
  \nreturn nil\n  }\n\nfunc presentationCountForPageViewController(pageViewController:\
  \ UIPageViewController) -> Int {\n    return self.items.count\n  }\n  func presentationIndexForPageViewController(pageViewController:\
  \ UIPageViewController) -> Int {\n    return (pageViewController.viewControllers[0]\
  \ as PageContentViewController).pageNo\n  }\n\n}\n```\n\n3. 在 `ParentViewController\
  \ viewDidLoad()` 方法中，以下常规代码（参见列表 3-20）设置了 `UIPageViewController`：\n\n1. 初始化页面视图控制器。\n\
  2. 设置 `dataSource` 和 `delegate`。\n3. 设置第一个页面视图控制器。\n4. 建立父-子视图控制器层级结构。\n\n***列表\
  \ 3-20***。在 `viewDidLoad` 中设置 `UIPageViewController`\n\n```\nclass ParentViewController\
  \ : UIViewController, UIPageViewControllerDataSource, UIPageViewControllerDelegate\
  \ {\n\n@IBOutlet weak var mPageView: UIView\n  var mPageViewController: UIPageViewController\n\
  \noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 加载视图后执行任何额外设置，通常从\
  \ nib 文件开始\n\n// a. 初始化页面视图控制器、视图和手势\n    self.mPageViewController = UIPageViewController(transitionStyle:\n\
  \    UIPageViewControllerTransitionStyle.Scroll, navigationOrientation:\n    UIPageViewControllerNavigationOrientation.Horizontal,\
  \ options: nil)\n    self.mPageViewController.view.frame = self.mPageView.bounds\n\
  \    self.mPageView.gestureRecognizers = self.mPageViewController.gestureRecognizers\n\
  \n// b. 设置数据源和委托\n    self.mPageViewController.delegate = self\n    self.mPageViewController.dataSource\
  \ = self\n\n// c. 设置第一个页面\n    var vc = self.storyboard.instantiateViewControllerWithIdentifier(\"\
  PageContentViewController\")\n    as PageContentViewController\n    vc.data = self.items[0]\n\
  \    vc.pageNo = 0\n    self.mPageViewController.setViewControllers([vc], direction:\
  \ .Forward,\n    animated: false, completion: nil)\n\n// d. 建立父-子视图和视图控制器层级结构\n\
  \    self.mPageView.addSubview(self.mPageViewController.view)\n    self.addChildViewController(self.mPageViewController)\n\
  \    self.mPageViewController.didMoveToParentViewController(self)\n  }\n```\n\n\
  以上就是关于 `UIPageViewController` 类以及 iOS 中滑动视图导航模式的全部内容。构建并运行 iOS 的 `SwipeViews` 应用，即可实际查看代码的运行效果（参见图\
  \ 3-56）。\n\n![9781484204375_Fig03-56.jpg](img/9781484204375_Fig03-56.jpg)\n\n图 3-56。iOS\
  \ `SwipeViews` 应用\n\n## 对话框\n\n通常，使用对话框 UX 模式是为了给移动用户提供快速反馈，或请求用户对选择进行简单确认。对话框通常显示在当前屏幕之上，同时当前屏幕保持部分可见或变暗。这种视觉效果旨在在不丢失当前上下文的情况下，吸引更多用户注意力。\n\
  \n创建一个 Xcode 项目来演示对话框的用法和常见编程任务：\n\n1. 启动 Xcode，使用 **Single View Application** 模板创建一个新项目，将其命名为\
  \ `Dialogs`。\n2. 在故事板场景中绘制两个 `Button` 控件，标题分别设置为 `Alert` 和 `Popup`，如图 图 3-57 所示。\n\
  \n![9781484204375_Fig03-57.jpg](img/9781484204375_Fig03-57.jpg)\n\n图 3-57。`Dialogs`\
  \ 故事板\n\n3. 打开故事板的 **Assistant Editor**，并在 **Connections Inspector** 中连接 **Send\
  \ Event ![image](img/arrow.jpg) Touch Down** 出口，为两个按钮在配对的 `ViewController` 类中创建\
  \ `IBAction` 方法（参见列表 3-21 中的 `doAlert(...)` 和 `doPopup(...)`）。\n\n***列表 3-21***。为\
  \ Alert 和 Popup 按钮创建 `IBAction` 方法\n\n```\nimport UIKit\nclass ViewController: UIViewController,\
  \ UIAlertViewDelegate {\n  ...\n  @IBAction func doAlert(sender: AnyObject) {\n\
  \    // TODO\n  }\n  @IBAction func doPopup(sender: AnyObject) {\n    // TODO\n\
  \  }\n}\n```\n\n这些内容对你来说应该并不陌生，但这个 `Dialogs` Xcode 项目可以让你重温对话框相关主题。\n\n### UIAlertController\n\
  \n**Android 类比**：`AlertDialog`。\n\n图 3-58 并排展示了标准的 Android 和 iOS 警告对话框。在 iOS 上，你使用\
  \ `UIAlertController`。两者的基本用法几乎相同，唯一的区别是 Android 的 `AlertDialog` 多了一个标题图标。\n\n![9781484204375_Fig03-58.jpg](img/9781484204375_Fig03-58.jpg)\n\
  \n图 3-58。Android（左）与 iOS（右）警告对话框对比\n\n继续使用 Xcode 的 `Dialogs` 项目，添加以下代码来学习 `UIAlertController`\
  \ 的使用：\n\n1. 要显示如图 图 3-58 所示的 iOS 对话框，请在 `ViewController.doAlert(...)` 方法中添加以下代码（参见列表\
  \ 3-22）：\n   1. 创建一个 `UIAlertController` 实例。\n   2. 为对话框按钮添加 `UIAlertAction`。\n\
  \   3. 要提示用户输入，请向 `UIAlertController` 添加 `TextField`。\n   4. 使用常规的 `UIViewController`\
  \ API 将其作为视图控制器呈现。\n\n***列表 3-22***。呈现 `UIAlertController`\n\n```\n@IBAction func\
  \ doAlert(sender: AnyObject) {\n\nvar alert = UIAlertController(title: \"My title\"\
  , message: \"My message\", preferredStyle: UIAlertControllerStyle.Alert)\n\n// 添加操作按钮\n\
  \  var actionCancel = UIAlertAction(title: \"Cancel\", style: UIAlertActionStyle.Cancel,\n\
  \    handler: {action in\n        // 不执行任何操作\n      })\n```\n\n\n```swift\nvar actionOk\
  \ = UIAlertAction(title: \"Ok\",\n    style: UIAlertActionStyle.Default, handler:\
  \ {action in\n        println((alert.textFields[0] as UITextField).text)\n     \
  \ })\n\nalert.addAction(actionCancel)\n    alert.addAction(actionOk)\n\n// 添加文本字段\n\
  \    alert.addTextFieldWithConfigurationHandler({textField in\n      // 配置 UITextField\n\
  \      textField.backgroundColor = UIColor.yellowColor()\n      textField.placeholder\
  \ = \"enter text, i.e., Do Ra Me\"\n      })\n\n// UIViewController 用于展示视图控制器的 API\n\
  \    self.presentViewController(alert, animated: true, completion: nil)\n}\n```\n\
  \n`UIAlertController` 内的所有内容都是通过编程方式创建的。图 3-59 展示了 `UIAlertController` 代码的实际运行效果。\n\
  \n![9781484204375_Fig03-59.jpg](img/9781484204375_Fig03-59.jpg)\n\n图 3-59. iOS `UIAlertController`\n\
  \n## UIPopoverController\n\n**Android 类比**\n\n`DialogFragment`.\n\n在 iPad 等大屏幕 iOS\
  \ 设备上，您可以使用 `PopoverController` 将常规的 `viewController` 作为弹出层呈现。该弹出层可以锚定在特定位置，以便将显示的对话框与呈现上下文关联起来。在\
  \ iPhone 等紧凑型尺寸类别的设备上，弹出控制器会自动回退到常规的全屏视图控制器。您也可以利用故事板编辑器来绘制内容视图和转场，而无需编写代码。\n\n\
  以下步骤演示了 `Dialogs` 项目中的 `PopoverController`：\n\n1.  为弹出层添加一个新的故事板场景。\n    1.  创建一个\
  \ `GreenViewController` 类，如代码清单 3-23 所示，并在故事板中绘制一个视图控制器场景。通过在**身份检查器**中指定类名来与其匹配。\n\
  \n***代码清单 3-23***. `GreenViewController` 类\n\n```swift\n        class GreenViewController\
  \ : UIViewController {\n          @IBAction func doDone(sender: AnyObject) {\n \
  \           // 执行某些操作并关闭\n            self.dismissViewControllerAnimated(true, completion:nil)\n\
  \          }\n        }\n```\n\n2.  将视图控制器嵌入到导航控制器中（通过 Xcode 菜单栏的**编辑器 ![image](img/arrow.jpg)\
  \ 嵌入于**），以利用导航栏标题或任何导航控制器的功能。\n    3.  在导航控制器的**属性检查器**中，将**模拟的尺寸**更改为**自由形式**，然后在**尺寸检查器**中将**模拟的尺寸**更改为\
  \ **250 × 300**。\n    4.  在导航控制器的**身份检查器**中，指定故事板 ID，例如 `nav`。如果您想直接从故事板实例化一个视图控制器实例，始终需要该\
  \ ID（请参见代码清单 3-24）。\n    5.  通常您会在内容视图中绘制有意义的控件。为简单起见，请使用**属性检查器**将 `GreenViewController`\
  \ 视图的**背景**属性更改为**绿色**。\n    6.  在 `GreenViewController` 的导航栏右侧绘制一个 `BarButtonItem`，并将**发送操作**插座连接到\
  \ `GreenViewController` 中的 `IBAction` 方法，如代码清单 3-23 所示。图 3-60 展示了完成后的故事板。\n\n![9781484204375_Fig03-60.jpg](img/9781484204375_Fig03-60.jpg)\n\
  \n图 3-60. Dialogs 故事板完成图\n\n2.  要展示 `GreenViewController`，请从呈现的 `ViewController`\
  \ 绘制一个手动转场到 `GreenViewController` 的父级导航控制器。在**属性检查器**中指定转场属性值，如图 3-61 所示。\n\n![9781484204375_Fig03-61.jpg](img/9781484204375_Fig03-61.jpg)\n\
