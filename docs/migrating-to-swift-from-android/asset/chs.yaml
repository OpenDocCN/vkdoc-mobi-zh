  \ 区域中：\n\n    a. 对于这个简单的项目，你不需要修改任何东西。但你应该快速浏览编辑器，以大致了解 Xcode 编译和构建可执行文件所需的内容。\n\
  \niOS 应用程序尚未完成，但它已具备典型 iOS 应用程序应有的一切。\n\n## Xcode 故事板\n\n**Android 类比**\n\nADT 中没有类似故事板的功能。你可以使用\
  \ Graphic Layout Editor 一次在一个布局文件中创建一个内容视图。\n\n使用 Xcode 的故事板功能来直观地组合应用程序的用户界面。顾名思义，它不仅能创建独立的屏幕和\
  \ UI 小部件，还能让你将整个应用程序组合成一个故事板。由于 iOS 应用程序都是 GUI 应用程序，此工具将通过以下操作极大地决定你创建 iOS 应用程序的生产力：\n\
  \n- 从 **Object Library** 中拖放 **View Controller** 来创建一个内容视图，称为故事板 **Scene**。\n- 从\
