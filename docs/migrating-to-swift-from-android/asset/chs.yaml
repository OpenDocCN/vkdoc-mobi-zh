  \ Android 菜单系统有着相似的目的：快速访问。  \n\n你可能还会遇到 Android 上下文菜单和弹出菜单。同样，iOS 中没有这样的菜单系统，但我会展示我为了移植而选择的\
  \ iOS 方案。  \n\n### UIBarButtonItem  \n\n**ANDROID 类比**：选项菜单或 ActionBar 中的操作项。  \n\
  \niOS 和 Android 提供了用于快速访问的控件。在 iOS 中，通常会在导航栏中使用`UIBarButtonItem`，以放置有限数量的操作按钮，这些按钮可以适应固定空间。在\
