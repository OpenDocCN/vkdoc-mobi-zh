  \ `FirstViewController`。\n   3. 以 Android 应用为线框图，在故事板场景中绘制内容视图。\n2. 你需要第二个内容视图和视图控制器对。\n\
  \   1. 你可以从 `FirstViewController` 类中复制、粘贴并进行修改。列表 3-14 展示了 `SecondViewController`\
  \ 类。\n\n***列表 3-14***. `SecondViewController` 类\n\n```\nclass SecondViewController:\
  \ UIViewController {\n  ...\n}\n```\n\n3. 你也可以在故事板编辑器中复制、粘贴并修改故事板场景。别忘了在 **Identity\
  \ Inspector** 中更新类名。图 3-48 展示了故事板中包含屏幕一和屏幕二两个场景。\n\n![9781484204375_Fig03-48.jpg](img/9781484204375_Fig03-48.jpg)\n\
