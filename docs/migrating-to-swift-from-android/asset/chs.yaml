  )  \n  }  \n  ...  \n```  \n\n## 操作表  \n\n**ANDROID 类比**：上下文菜单或`android.widget.PopupMenu`。\
  \  \n\n在 Android 中，`Context Menu`是一个浮动菜单，当用户右键单击元素时出现。其操作和外观与触发操作的上下文建立了紧密联系。在 iPad\
  \ 上，你可以安全地选择`UIPopoverController`（参见第 3 章，`UIPopoverController`）来呈现选项列表，而在 iPhone\
  \ 上，它会自动全屏呈现。  \n\n如果你不想使用全屏，或许是为了更小的选择，你也可以选择`UIActionSheet`，它在 iPad 上以弹出视图形式呈现，在\
  \ iPhone 上则以从屏幕底部弹出的表单形式呈现。  \n\n关键的 SDK 类是`UIAlertController`，它在第 3 章中用于警告对话框（参见\
  \ Listing 3-22）。要通过示例学习 iOS 的操作表，请修改之前的`doBarButtonAction(...) IBAction`方法，如 Listing\
  \ 4-14 所示：  \n\n1.  创建一个`UIAlertController`实例，样式为`UIAlertControllerStyle.ActionSheet`。\
  \  \n2.  你可以使用`Title`或`Message`来建立与原始上下文的视觉联系。  \n3.  通常，会有一个红色破坏性`UIAlertAction`用于删除或移除，它通过`UIAlertActionStyle.Destructive`样式指定。\
  \  \n\n***[Listing 4-14]***. 使用`ActionSheet`样式的`UIAlertController`  \n```  \nclass\
  \ ViewController: ...{  \n  ...  \n  @IBAction func doBarButtonAction(sender: AnyObject)\
  \ {  \n    println(\">>doBarButtonDone: \")  \n\n    var actionSheet = UIAlertController(title:\
  \ \"Action (from bar button item)\", message: \"Choose an Action\", preferredStyle:\
  \ UIAlertControllerStyle.ActionSheet)  \n\n    // add action buttons  \n    var\
  \ actionCancel = UIAlertAction(title: \"Cancel\", style: UIAlertActionStyle.Cancel,\
  \  \n      handler: {action in  \n      // do nothing  \n      })  \n\n    var actionNormal1\
  \ = UIAlertAction(title: \"Action 1\", style: UIAlertActionStyle.Default,  \n  \
  \    handler: {action in  \n        println(\">>actionNormal1\")  \n      })  \n\
  \n    var actionNormal2 = UIAlertAction(title: \"Action 2\", style: UIAlertActionStyle.Default,\
  \  \n      handler: {action in  \n        println(\">>actionNormal2\")  \n     \
  \ })  \n\n    var actionDestruct = UIAlertAction(title: \"Destruct\", style: UIAlertActionStyle.Destructive,\
  \  \n      handler: {action in  \n        println(\">>actionDestruct\")  \n    \
  \  })  \n\n    actionSheet.addAction(actionCancel) // always the last one  \n  \
  \  actionSheet.addAction(actionNormal1)  \n    actionSheet.addAction(actionNormal2)\
  \  \n    actionSheet.addAction(actionDestruct)  \n\n    // UIViewController API\
  \ to presend viewController  \n    self.  \n```  \n\n\n\n`presentViewController(actionSheet,\
  \ animated: true, completion: nil)`  \n`}`  \n...  \n\n构建并运行 `CommonWidgets` 应用，以可视化\
  \ iOS 操作菜单（请参见图 4-29）。  \n\n![9781484204375_Fig04-29.jpg](img/9781484204375_Fig04-29.jpg)\
