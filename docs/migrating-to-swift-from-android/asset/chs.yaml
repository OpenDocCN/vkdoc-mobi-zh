  \ iOS 模拟器上运行，您的任务就完成了！\n\n## 总结\n\n通过安装 Xcode 6，您立即拥有一个功能完备的 IDE，可以轻松创建 iOS 应用。本章引导您完成了\
  \ Xcode 6 中的基本项目创建任务，使用 iOS 项目模板启动了您的第一个 iOS 项目。本章还向您展示了如何在 iOS 模拟器中构建和运行 iOS 应用。您尚未编写任何代码，但您的工具已正常工作且经过验证。您将在后续章节的引导练习中学习更多内容并获得动手编程经验。\n\
