  \n图 3-36. 最终的 `NavigationStack` 应用\n\n### 主-详情列表（Master List with Details Drilldown）\n\
  \n**Android 类比**\n\n`ListView` 和 `GridView`。\n\n许多应用需要显示一个项目列表，用户可以点击这些项目查看更详细的信息。它们首先呈现一个主列表，用户选择一个项目后进入详情页面。\n\
  \n这可能是最常用的移动导航模式之一。Android 和 iOS 都提供了相关指南和系统 API，通过简化开发者的实现来促进一致性。事实上，Xcode 和 ADT\
  \ 都提供了用于创建具有这种用户体验模式的应用的项目模板。\n\n在 ADT 中，你可以使用 ADT 的**主/详情流（Master/Detail Flow）**模板创建以下主-详情应用。最初，它呈现包含三个项目的主列表。应用随后显示包含所选项目内容的详情屏幕。你将把此应用（参见图\
  \ 3-37）移植到 iOS 平台。\n\n![9781484204375_Fig03-37.jpg](img/9781484204375_Fig03-37.jpg)\n\
  \n图 3-37. Android 主列表详情下钻\n\n### `UITableViewController`\n\n**Android 类比**\n\n实现概念非常相似，只是使用的术语不同：\n\
  \n*   `ListFragment` = `UITableViewController`\n*   列表视图 = 表视图（Table View）\n*  \
  \ 列表视图项 = 表视图单元格（Table View Cell）\n*   列表适配器 = 数据源（Data Source）\n\n甚至适配器/数据源的实现也有些类似。\n\
  \n要将这个 Android 应用移植到 iOS，你需要两个故事板场景：一个用于主列表，另一个用于详情内容视图。为了重新开始，创建一个新的 iOS 项目：\n\n\
  \n\n1.  启动 Xcode，并使用通常的**单视图应用**模板创建一个新应用，并将其命名为 `MasterDetail`。\n    1.  你会获得一个\
  \ `ViewController` 类，该类已与 `Main.storyboard` 中的一个场景配对。请使用这个配对作为详情视图屏幕。\n2.  创建主列表故事板场景，并绘制一条连线（Segue）来连接两个场景。图\
  \ 3-38 展示了故事板的最终效果。\n    1.  从**对象库**中拖拽一个 `UITableViewController`，并将其放置在故事板编辑器中。\n\
  \    2.  创建一个从 `UITableViewController` 指向详情视图控制器的“手动连线”（Manual Segue），过渡类型为“显示”（Show）（参见图\
  \ 3-25）。务必为连线设置一个标识符，例如 `detail`（参见图 3-24）。\n3.  在 `UITableViewController` 场景中选择“表格视图单元格”（Table\
  \ View Cell），然后打开**属性检查器**进行配置（参见图 3-38 中的指示）：\n    1.  样式：选择 `Basic`（或选择其他样式以在编辑器中查看其效果）。\n\
  \    2.  标识符：输入 `mycell`。务必为其设置一个标识符。你需要用它来创建可重用的单元格，就像 Android 中的循环列表项（recycled\
  \ list item）一样。\n    3.  附件：选择 `Detail`。\n    4.  可选地，你可以添加一个 `image` 来显示左侧的图标。\n\
  \n![9781484204375_Fig03-38.jpg](img/9781484204375_Fig03-38.jpg)\n\n图 3-38。`TableViewCell`\
  \ 属性\n\n4.  将 `UITableViewController` 嵌入到导航控制器中（参见导航栈中的图 3-33）。你通常会使用导航栈模式来实现屏幕转换。\n\
  5.  在导航控制器的**属性检查器**中勾选**是初始场景**（参见图 3-39），以使导航控制器成为此应用的起始视图控制器。\n\n![9781484204375_Fig03-39.jpg](img/9781484204375_Fig03-39.jpg)\n\
  \n图 3-39。`MasterDetail` 故事板\n\n6.  在 `ViewController.swift` 文件中创建一个 `MasterTableViewController`\
  \ Swift 类，如代码清单 3-6 所示。\n    1.  让 `MasterTableViewController` 继承自 `UITableViewController`。\n\
  \    2.  在**身份检查器**中将这个 `MasterTableViewController` 类与“表格视图控制器”场景关联起来（参见图 3-17）。\n\
  \n***代码清单 3-6***。`MasterListTableViewController` 类\n\n```\nclass MasterTableViewController\
  \ : UITableViewController {\n  // TODO\n}\n```\n\n**注意** 在 Swift 中，类不需要放在自己的文件中。我将它放在已有的\
  \ `ViewController.swift` 文件里，并没有什么特别的原因。如果你习惯了 Java 的方式，可以创建一个新文件来存放这个类。\n\n`UITableViewDataSource`\n\
  \n安卓类比\n\n`android.widget.Adapter`\n\n为了填充表格视图中的项目，你需要实现一个“数据源”（Data Source）：通过重写在\
  \ `UITableViewDataSource` 协议中定义的方法，为 `TableViewCell` 提供数据（见代码清单 3-7）。请在 `MasterDetail`\
  \ 项目中执行以下操作：\n\n1.  实现 `tableView(tableView, numberOfRowsInSection)` 方法，返回 `tableView`\
  \ 中项目的数量。\n2.  实现 `tableView(tableView, cellForRowAtIndexPath)` 方法，返回 `tableViewCell`\
  \ 实例。\n\n***代码清单 3-7***。实现 `UITableViewDataSource` 协议\n\n```\nclass MasterTableViewController\
  \ : UITableViewController {\n  var items = [\"item 1\", \"item 2\", \"item 3\"]\n\
  \noverride func tableView(tableView: UITableView, numberOfRowsInSection section:\
  \ Int) -> Int {\n    return self.items.count\n  }\n\noverride func tableView(tableView:\
  \ UITableView, cellForRowAtIndexPath indexPath: NSIndexPath) -> UITableViewCell\
  \ {\n    var cell = tableView.dequeueReusableCellWithIdentifier(\"mycell\") as UITableViewCell\n\
  \    cell.textLabel.text = self.items[indexPath.row]\n    return cell\n  }\n}\n\
  ```\n\n**注意** 使用 `dequeueReusableCellWithIdentifier(...)` 来实现视图的复用。这是处理大量项目时节省内存的非常常见的模式，iOS\
  \ 通过提供这个方法使其变得简单。请确保你在故事板中指定了单元格标识符。\n\n`UITableViewDelegate`\n\n安卓类比\n\n`ListFragment.onListItemClick(...)`\n\
