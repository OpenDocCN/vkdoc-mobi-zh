  \ 一样，iOS SDK 提供了与文件系统交互的系统 API。在 iOS 中，你通常使用以下 API：\n\n*   `NSFileManager` 类。\n\
  *   `NSString`、`NSArray`、`NSDictionary` 和 `NSData` 基础框架类也提供了便捷的方法来从文件系统中存储和检索自身。\n\
  \n#### NSFileManager\n\n**安卓类比**\n`java.io.File`.\n\n如果你需要执行任何与文件相关的任务来操作`文件`和`目录`，`NSFileManager`\
  \ 类提供了完成这些工作的 API。你需要为目标文件指定文件路径或文件 URL，并为文件内容指定 `NSData` 对象。\n\n为了通过示例进行展示和学习，使用\
  \ `NSFileManager` 来实现相同的保存/检索/删除目的。\n\n1.  创建使用 `NSFileManager` API 保存、检索和删除数据的便捷方法（见\
  \ 列表 4-25）：\n    1.  获取 `NSFileManager` 对象。\n    2.  使用 `NSHomeDirectory().stringByAppendingPathComponent(...)`\
  \ 构建 iOS 文件路径。\n    3.  `NSFileManager` 处理 `NSData`，而 `NSData` 可以转换为常见的基础框架数据类型（例如，字符串、数组和字典）。\n\
  \n***列表 4-25***. 使用 `NSFileManager` 管理文件中的数据\n\n```swift\nclass ViewController:\
  \ UIViewController, UITextFieldDelegate {\n  ...\n  let fileMgr = NSFileManager.defaultManager()\n\
  \  func saveToFile(str: String, file: String) {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
  Documents\").stringByAppendingPathComponent(file)\n    var data = str.dataUsingEncoding(NSUTF8StringEncoding)\n\
  \    var ok = fileMgr.createFileAtPath(path, contents: data, attributes: nil)\n\
  \  }\n\n  func retrieveFromFile(file: String) -> String? {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
  Documents\").stringByAppendingPathComponent(file)\n    var data = fileMgr.contentsAtPath(path)\n\
  \    var str = NSString(data:data, encoding: NSUTF8StringEncoding)\n\n    return\
  \ str\n  }\n\n  func deleteFile(file: String) {\n    var path = NSHomeDirectory().stringByAppendingPathComponent(\"\
  Documents\").stringByAppendingPathComponent(file)\n    var ok = fileMgr.removeItemAtPath(path,\
  \ error: nil)\n  }\n  ...\n}\n```\n\n**注意** 每个应用只能写入应用主目录内的特定文件夹（例如 `Documents`\
  \ 文件夹）。与 Android 类似，最常见的写入错误可能就是试图在错误的位置创建文件。\n\n2.  调用刚刚创建的便捷方法来完成使用 `NSFileManager`\
  \ 的持久化代码（见 列表 4-26）。\n\n***列表 4-26***. 使用 `NSFileManager` 在文件中保存、检索和删除\n\n```swift\n\
  class ViewController: UIViewController, UITextFieldDelegate {\n  ...\n  func saveUserInput(str:\
  \ String) {\n    //    self.saveUserdefault(str, forKey: STORAGE_KEY)\n    self.saveToFile(str,\
  \ file: STORAGE_KEY)\n  }\n\n  func retrieveUserInput() -> String? {\n    //   \
  \ return self.retrieveUserdefault(STORAGE_KEY)\n    return self.retrieveFromFile(STORAGE_KEY)\n\
  \  }\n\n  func deleteUserInput() {\n    //    self.deleteUserDefault(STORAGE_KEY)\n\
  \    self.deleteFile(STORAGE_KEY)\n  }\n  ...\n}\n```\n\n许多基础框架数据类型都包含与文件交互以保存和检索自身的便捷方法。列表\
  \ 4-27 展示了保存和检索字符串本身的代码：\n\n***列表 4-27***. 使用基础框架类 API 保存字符串\n\n```swift\n  func\
  \ saveToFile(str: String, file: String) {\n    var path = ...\n    var error: NSError?\n\
  \    str.\n```\n\n\n\n```swift\nwriteToFile(path, atomically: true, encoding: NSUTF8StringEncoding,\
  \ error: &error)\n}\nfunc retrieveFromFile(file: String) -> String? {\n    var path\
  \ = ...\n    var error: NSError?\n    var str = String(contentsOfFile: path, encoding:\
  \ NSUTF8StringEncoding, error: &error)\n    return str\n}\n```\n\n你可以在 `NSDictionary`、`NSArray`\
  \ 和 `NSData` 中找到相同的 `writeToFile(...)` 和 `constructor(...)` 方法，用于保存和检索自身。作为快速练习，代码清单\
  \ 4-28 与代码清单 4-27 实现相同的目的：\n\n***代码清单 4-28***. 使用 Foundation 类 API 保存字符串（而非使用 NSFileManager\
