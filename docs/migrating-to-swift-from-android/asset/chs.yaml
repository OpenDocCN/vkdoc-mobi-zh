  \n纵向模式的外观和感觉对于我们当前的目的来说已经足够接近了：使用故事板直观地组成内容视图，而无需编写一行代码。iOS 的 `HelloMobile` 尚未完成：`Hello\
  \ ...` 按钮并未显示 “Hello...” 字样，而且横向模式也尚不可接受。这两个都是重要主题，在第 3 章中有各自的章节。\n\n在这个练习中，我只是想让你快速浏览一下\
  \ Xcode 的故事板编辑器。Xcode 工作区看起来与 Eclipse 有很大不同。花点时间熟悉 Xcode 工作区，包括故事板编辑器、**实用工具**区域、选择器工具栏等。Xcode\
  \ 故事板是一个非常重要的工具，它在创建 iOS 应用时将极大地影响你的生产效率。\n\n## 总结\n\n从表面上看，本章中你实际上学到了很多东西。我们从讨论\
  \ Swift 与 Java 语言的对比开始，了解它们的相似之处，然后我们回顾了 Swift 语言主题以突出新的语言特性。然而，本书的其余部分将侧重于 iOS\
  \ 编程，而不是 Swift 语言。代码将注重可读性，而不是使用新技巧来追求简洁。你阅读本书其余部分的所有 Swift 代码肯定不会有问题。不过，迟早你会需要\
  \ Swift 编程语言的参考文档，该文档可在 iTunes 上免费获取（`https://itunes.apple.com/us/book/swift-programming-language/id881256329`）。\n\
  \n你使用 Xcode 创建了一个 `HelloMobile` iOS 项目，以便可视化典型的 iOS 应用结构，从而能够直观地理解。你还初步体验了 Xcode\
  \ 故事板，它非常重要，你将在每个 iOS 应用中用到它，包括本书中的所有示例项目——所以请准备好反复接触故事板。\n\n## 第二部分\n\n### 移植路线图\n\
  \n\n\n\n在第二部分，你将按照 iOS 的思维过程来规划和构建 iOS 应用，这一过程可以借助常见的自顶向下的设计方法，用 Android 术语加以解释。完成第二部分后，你将能够创建具有丰富\
  \ UI 组件且简单但有意义的 iOS 应用，并能处理本地及远程的常见 CRUD 操作。\n\n你的迁移至 Swift 路线图遵循常见的自顶向下方法，在涉及底层实现时会使用你熟悉的\
  \ Android 术语提供翻译指南，这样你就能将其与你通常在 Android 中执行的移动端功能联系起来。\n\n第二部分展示了你在 Android 应用中常见的屏幕导航模式，以及如何在\
  \ iOS 应用中执行相同的任务。你不仅会得到一个可运行的高级 iOS 故事板，还会获得类似 Android MVC 结构的类，这些类与对应的 Swift 类相映射。第二部分的剩余部分提供了如何将常见的移动端实现任务从\
  \ Android SDK 转换到 iOS SDK 的指南——包括 UI、数据保存、网络等——这些任务几乎在所有 Android GUI 应用中广泛使用。再次强调，完成第二部分后，你将能够创建简单但有意义的\
  \ iOS 应用。\n\n"
- "# 第 3 章：构建你的应用\n\n为了实现你的软件，你需要根据如何将代码组织成类来构建应用结构，并据此做出设计决策。为了提前确定你的 iOS 应用结构，推荐使用自顶向下的方法和模型-视图-控制器（MVC）设计模式，而它们实际上已内置于\
  \ iOS SDK 和工具中。MVC 也隐式地内置于 Android SDK 中（使用不同的词汇），如果你习惯使用自顶向下的方法创建 Android 应用——先设计应用程序工作流程，再细化每个屏幕——那么在\
  \ iOS 和 Android 之间切换编程思维过程对你来说会更加容易。\n\n在这第一步中，你的目标是实现与 Android 对应类在类级别的映射。我将首先讨论\
  \ MVC，然后介绍如何在 Xcode 中创建 iOS 故事板。借助引导式的屏幕导航模式，你的 iOS 故事板会自然地将 iOS 应用分解为 MVC 组件，这些组件可以与\
  \ Android 中的对应组件进行映射。\n\n## 模型-视图-控制器\n\n**Android 类比**\n\n- **内容视图**：布局文件\n- **内容视图控制器**：`Fragment`\
  \ 类\n- **委托**：Java 事件监听器\n- **容器视图控制器**：协调其中子 `Fragment` 的 `Activity` 类\n\nMVC 立即将\
  \ GUI 应用分为三层。iOS MVC 设计模式规定，一个 GUI 应用由数据**模型**、呈现**视图**和**控制器**层组成，如图 3-1 所示。\n\n\
  ![9781484204375_Fig03-01.jpg](img/9781484204375_Fig03-01.jpg)\n\n图 3-1。iOS MVC 设计模式\n\
  \n虽然在 Android SDK 中似乎没有明确定义 MVC 词汇，但它通过布局文件和 `Fragment` 类隐式地强制将内容视图与内容视图控制器分离。\n\
  \n在 iOS 中，你显式地使用 MVC 词汇：内容视图和内容视图控制器。你自然地将 iOS 应用分解为 MVC 类，首先使用 Xcode 故事板编辑器创建一个故事板原型。\n\
  \n除非你的应用只有一个屏幕，否则你需要决定如何在多个视图控制器之间实现导航和屏幕切换。你需要一个可选的 MVC 参与者：容器视图控制器。在 Android 中，似乎没有明确的框架类能为你完成这项工作。然而，`Activity`\
  \ 和 `Fragment` 之间的父子关系使得父 `Activity` 自然成为容器视图控制器参与者的候选者。在实践中，我使用父 `Activity` 来管理子\
  \ `Fragment`，包括处理导航代码。\n\n在 iOS 中，SDK 提供了几个用于屏幕导航的容器视图控制器；你只需选择合适的容器视图控制器类，让 iOS\
  \ 框架为你简化这些任务。\n\n我将从内容视图和内容视图控制器开始，然后讨论容器视图控制器。\n\n## 内容视图\n\n**Android 类比**\n\n\
  Android 布局文件。\n\n内容视图提供一个可见区域，使用户能够与应用交互。内容视图定义了如何渲染自身内容，并能响应用户操作。要在 iOS 中创建内容视图，请使用\
  \ Xcode **故事板**。\n\n回想一下，在 iOS `HelloMobile` 应用中，你以与在 ADT 中非常相似的方式在故事板场景中绘制 UI 小部件：拖放小部件以在父视图上绘制它们。然而，这个\
  \ iOS 内容视图尚未适应其他设备类型和屏幕方向。你可以很容易地在**辅助编辑器**预览中观察到横屏问题（见图 2-14）。为各种屏幕尺寸创建自适应内容视图是\
  \ iOS 和 Android 中的常见任务。在 Android 中，你通过备选布局资源和布局管理器来实现这一点。在 iOS 中，你主要使用 iOS 平台特性来实现相同的目的：\n\
  \n- **自动布局**：这在与屏幕尺寸无关/自适应的响应式 UX 设计中效果最佳。\n- **尺寸类别**：为针对不同屏幕尺寸定制屏幕提供了最大的灵活性。\n\
  \n### 自动布局\n\n**Android 类比**\n\n```\nRelativeLayout。\n```\n\n你可以将 iOS 自动布局视为 Android\
