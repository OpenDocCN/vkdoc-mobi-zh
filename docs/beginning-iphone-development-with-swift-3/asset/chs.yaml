  \ Four`按钮固定到底部和右侧\n\n![A329781_3_En_5_Fig39_HTML.jpg](img/A329781_3_En_5_Fig39_HTML.jpg)\n\
  \n图 5-39：将`Action One`按钮固定到顶部和右侧\n\n对于`Action Two`按钮，按住`Control`键向右拖拽，然后选择`Trailing\
  \ Space to Container Margin`，将其固定到容器的右侧，如图 5-41 所示。对`Action Three`按钮重复此操作。\n\n![A329781_3_En_5_Fig41_HTML.jpg](img/A329781_3_En_5_Fig41_HTML.jpg)\n\
