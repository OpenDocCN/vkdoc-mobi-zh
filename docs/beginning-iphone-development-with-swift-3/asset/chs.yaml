  \ Home 按钮切换到其他应用。这正是我们想要避免的状态。\n\n\n\n### 线程基础\n\n在开始实现解决方案之前，我们先回顾一些并发基础。这远非 iOS\
  \ 线程或通用线程的完整描述，我只想解释足够让你理解本章内容的知识点。大多数现代操作系统（当然包括 iOS）都支持执行线程的概念。每个进程可以包含多个并发运行的线程。如果只有一个处理器核心，操作系统会在所有执行线程之间切换，就像它在所有执行进程之间切换一样。如果有多个核心可用，线程就会像进程一样分布在这些核心上。\n\
  \n一个进程中的所有线程共享相同的可执行程序代码和相同的全局数据。每个线程还可以拥有一些专属数据。线程可以利用一种称为 `mutex`（互斥锁的简称）或锁的特殊结构，它可以确保特定的代码块不会被多个线程同时运行。当多个线程同时访问同一数据时，通过在一个线程更新值（即代码的临界区）时锁定其他线程，这对于确保正确的结果非常有用。\n\
  \n处理线程时的一个常见问题是代码的线程安全性。有些软件库在设计时就考虑了线程并发，并且它们的所有临界区都使用 `mutex` 得到了妥善保护。有些代码库则不是线程安全的。例如，在\
  \ Cocoa Touch 中，Foundation 框架通常被认为是线程安全的。然而，UIKit 框架（包含用于构建 GUI 应用程序的特定类，如 `UIApplication`、`UIView`\
  \ 及其所有子类等）在很大程度上是**不**线程安全的。（不过，某些 UIKit 功能（如绘图）被认为是线程安全的。）这意味着在运行的 iOS 应用程序中，所有涉及\
  \ `UIKit` 对象的方法调用都应在同一个线程（即通常所说的主线程）中执行。如果你从另一个线程访问 `UIKit` 对象，后果自负。你很可能会遇到看似无法解释的\
  \ bug（或者更糟，你本人都没遇到任何问题，但在你发布应用后，一些用户却会因此受到困扰）。\n\n**提示**\n\n关于线程安全的文章已经很多了。非常值得你花时间去深入研究并尽量消化。一个很好的起点就是\
  \ Apple 自己的文档。花几分钟阅读这个页面（它一定会有所帮助）：\n\n[`https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/Multithreading/ThreadSafetySummary/ThreadSafetySummary.html`](https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/Multithreading/ThreadSafetySummary/ThreadSafetySummary.html)\n\
  \n### 工作单元\n\n前面描述的线程模型的问题在于，对于普通程序员来说，编写无错误的多线程代码几乎是不可能的。这并非是对我们行业或普通程序员能力的批评；这只是一个观察结果。在跨多个线程同步数据和操作时，你的代码必须考虑到的复杂交互，对大多数人来说确实过于沉重。想象一下，只有\
  \ 5% 的人具备编写软件的能力。而在这 5% 的人中，只有一小部分真正能够胜任编写高强度的多线程应用程序。即使是那些成功做到这一点的人，也常常会建议他人不要效仿他们的做法。\n\
  \n幸运的是，还有其他选择。我们可以在不进行过多底层细节工作的情况下实现一些并发。就像我们能够将数据显示在屏幕上而无需直接操作显存，或者从磁盘读取数据而无需直接与磁盘控制器交互一样，我们也可以利用软件抽象，让我们的代码在多个线程上运行，而无需我们直接对线程做太多操作。\n\
  \nApple 鼓励我们使用的解决方案围绕这样一个理念：将长时间运行的任务拆分成工作单元，并将这些单元放入队列中等待执行。系统为我们管理队列，在多个线程上执行工作单元。我们不需要直接启动或管理后台线程，并且从通常涉及实现多线程应用程序的大量簿记工作中解放出来；系统为我们处理这些工作。\n\
  \n### GCD：底层队列\n\n这种将工作单元放入可在后台执行的队列，并由系统为你管理线程的思路，功能强大，并且极大地简化了许多需要并发的开发场景。GCD\
  \ 几年前首次出现在 OS X（现为 macOS）上，提供了实现这一点的基础架构。几年后，这项技术也引入了 iOS 平台。GCD 将一些伟大的概念——工作单元、无痛后台处理和自动线程管理——融入到\
  \ C 语言接口中，不仅可以在 Objective-C 中使用，还可以在 C、C++ 以及当然包括 Swift 中使用。更棒的是，Apple 已经将其 GCD\
  \ 的实现开源，因此它也可以移植到其他类 Unix 操作系统上。\n\nGCD 的一个关键概念是队列。系统提供了许多预定义的队列，包括一个保证始终在主线程上执行工作的队列。这对于非线程安全的\
  \ UIKit 来说非常完美。你也可以创建自己的队列——数量不限。GCD 队列严格遵循先进先出（FIFO）原则。添加到 GCD 队列的工作单元将始终按照它们放入队列的顺序开始执行。也就是说，它们可能不会以相同的顺序结束，因为\
  \ GCD 队列在可能的情况下会自动将其工作分布到多个线程上。\n\nGCD 访问一个在应用程序生命周期内重复使用的线程池。它会尝试维护与机器架构相适应的线程数量。当有工作要做时，它会通过利用更多的处理器核心自动利用更强大的机器。直到几年前，iOS\
  \ 设备都是单核的，所以这还不是什么大问题。但现在，随着过去几年发布的所有 iOS 设备都配备了多核处理器，GCD 变得真正实用了。\n\nGCD 使用闭包来封装要添加到队列的代码。在\
  \ Swift 中，闭包是语言中的一等公民——你可以将闭包赋值给变量、将其作为参数传递给方法，或者将其作为方法调用的结果返回。闭包相当于 Objective-C\
  \ 的 blocks 和其他编程语言（如 Python）中有时称为 lambda 的类似特性。与方法或函数非常相似，闭包可以接受一个或多个参数并指定返回值，尽管与\
  \ GCD 一起使用的闭包既不能接受参数，也不能返回值。要声明一个闭包变量，你只需将一些包裹在大括号中的代码赋值给它，并可选地带参数：\n\n```\n// 声明一个无参数、无返回值的闭包变量\
  \ \"loggerClosure\"\nlet loggerClosure = {\nprint(\"I'm just glad they didn't call\
  \ it a lambda\")\n}\n```\n\n你可以像调用函数一样执行这个闭包：\n\n```\n// 执行闭包，在控制台中产生一些输出。\nloggerClosure()\n\
  ```\n\n\n\n### 改进 SlowWorker\n\n为了理解如何将闭包与 GCD 结合使用，让我们重新审视 SlowWorker 的 `doWork()`\
  \ 方法。它当前看起来是这样的：\n\n```\n@IBAction func doWork(_ sender: AnyObject) {\nlet startTime\
  \ = NSDate()\nself.resultsTextView.text = \"\"\nlet fetchedData = self.fetchSomethingFromServer()\n\
  let processedData = self.processData(fetchedData)\nlet firstResult = self.calculateFirstResult(processedData)\n\
  let secondResult = self.calculateSecondResult(processedData)\nlet resultsSummary\
  \ =\n\"First: [\\(firstResult)]\\nSecond: [\\(secondResult)]\"\nself.resultsTextView.text\
  \ = resultsSummary\nlet endTime = NSDate()\nprint(\"Completed in \\(endTime.timeIntervalSince(startTime\
  \ as Date)) seconds\")\n}\n```\n\n我们可以通过将所有代码封装到一个闭包中，并将其传递给一个名为 `DispatchQueue`\
  \ 的 GCD 函数，让这个方法完全在后台运行。这个函数接受两个参数：一个 GCD 队列和要分配给该队列的闭包。请按照清单 15-2 中的更改，修改你本地的 `doWork()`\
  \ 副本。\n\n```\n@IBAction func doWork(sender: AnyObject) {\nlet startTime = NSDate()\n\
  resultsTextView.text = \"\"\nlet queue = DispatchQueue.global(qos: .default)\nqueue.async\
  \ {\nlet fetchedData = self.fetchSomethingFromServer()\nlet processedData = self.processData(fetchedData)\n\
  let firstResult = self.calculateFirstResult(processedData)\nlet secondResult = self.calculateSecondResult(processedData)\n\
  let resultsSummary =\n\"First: [\\(firstResult)]\\nSecond: [\\(secondResult)]\"\n\
  self.resultsTextView.text = resultsSummary\nlet endTime = NSDate()\nprint(\"Completed\
  \ in \\(endTime.timeIntervalSince(startTime as Date)) seconds\")\n}\n}\n清单 15-2.\n\
  使用 GCD 对 doWork 方法进行的修改\n```\n\n第一处更改的代码行通过使用 `DispatchQueue.global()` 函数，获取了一个始终可用的预存全局队列。该函数接受一个参数，让你指定优先级。如果你在参数中指定了不同的优先级，实际上会得到一个不同的全局队列，系统会以不同的方式对其进行优先级排序。目前，我们将坚持使用默认的全局队列。\n\
  \n然后，该队列连同闭包一起被传递给 `queue.async()` 函数。GCD 接收闭包并将其放入队列中，系统会安排它在后台线程上运行，并且与在主线程上运行时一样，一次执行一步。\n\
  \n请注意，我们在创建闭包之前定义了一个名为 `startTime` 的变量，然后在闭包末尾使用它的值。直觉上，这似乎说不通，因为当闭包被执行时，`doWork()`\
  \ 方法已经返回，因此 `startTime` 变量所指向的 `NSDate` 实例应该已经被释放了！这是理解闭包的一个关键点：如果闭包在执行过程中访问了“外部”的任何变量，那么在闭包创建时就会进行一些特殊设置，使其能够继续访问这些变量。这一切都由\
  \ Swift 编译器和运行时自动完成——你无需做任何特殊操作就能实现这一点。\n\n#### 别忘了那个主线程\n\n回到我们手头的项目，这里有一个问题：UIKit\
  \ 的线程安全性。请记住，从后台线程向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息是不允许的。实际上，如果你现在运行这个示例，大约十秒后，当闭包尝试更新文本视图时，你会在\
  \ Xcode 控制台中看到一个异常。幸运的是，GCD 也提供了一种处理方式。在闭包内部，我们可以调用另一个分派函数，将任务传回主线程。按照清单 15-3 所示，对你的\
  \ `doWork()` 版本再做一处修改。\n\n```\n@IBAction func doWork(sender: AnyObject) {\nlet startTime\
  \ = NSDate()\nresultsTextView.text = \"\"\nlet queue = DispatchQueue.global(attributes:\
  \ DispatchQueue.GlobalAttributes.qosDefault)\nqueue.async {\nlet fetchedData = self.fetchSomethingFromServer()\n\
  let processedData = self.processData(fetchedData)\nlet firstResult = self.calculateFirstResult(processedData)\n\
  let secondResult = self.calculateSecondResult(processedData)\nlet resultsSummary\
  \ =\n\"First: [\\(firstResult)]\\nSecond: [\\(secondResult)]\"\nDispatchQueue.main.async\
  \ {\nself.resultsTextView.text = resultsSummary\n}\nlet endTime = NSDate()\nprint(\"\
  Completed in \\(endTime.timeIntervalSince(startTime as Date)) seconds\")\n}\n}\n\
  清单 15-3.\n修改后的 doWork 方法\n```\n\n\n\n## 提供一些反馈\n\n如果你现在构建并运行应用，会发现它在某种程度上运行得更流畅了。按钮不再会在触摸后卡在突出显示状态，这或许能避免你反复点击。查看\
  \ Xcode 控制台日志，你会看到每次点击的结果，但只有最后一次点击的结果会显示在文本视图中。我们真正想做的，是增强图形用户界面，使用户按下按钮后，界面能立即更新以指示操作正在进行中。我们还希望在工作进行时禁用按钮，防止用户持续点击，从而在主线程之外产生越来越多的后台任务。为此，我们将在显示界面中添加一个\
  \ `UIActivityIndicatorView`。这个类提供了许多应用和网站中常见的旋转指示器。首先，在 `ViewController.swift` 文件顶部为其添加一个输出口：\n\
  \n```\n@IBOutlet var spinner : UIActivityIndicatorView!\n```\n\n接下来，打开 `Main.Storyboard`，在资源库中找到活动指示器视图，将其拖拽到按钮旁边的视图界面中。你需要添加布局约束来固定活动指示器相对于按钮的位置。一种方法是按住\
  \ Control 键从按钮拖拽到活动指示器，然后从弹出菜单中选择水平间距，以固定两者之间的水平距离；接着再次按住 Control 键拖拽并选择垂直居中，确保它们的中心垂直对齐。\n\
  \n选中活动指示器后，使用属性检查器勾选“停止时隐藏”复选框，这样旋转指示器只会在我们让它开始旋转时出现（没人希望界面上展示一个停转的指示器）。然后，按住 Control\
  \ 键从视图控制器图标拖拽到旋转指示器，连接输出口。保存修改。\n\n现在打开 `ViewController.swift`。我们首先要修改 `doWork()`\
  \ 方法，添加几行代码来管理用户点击按钮时以及工作完成时按钮和旋转指示器的显示状态。首先将按钮的 `enabled` 属性设为 `false`，这能阻止它响应任何点击，同时通过将按钮文本变灰并半透明来显示其禁用状态。接着，调用旋转指示器的\
  \ `startAnimating()` 方法让它开始旋转。在闭包末尾，我们重新启用按钮并停止旋转指示器，使其再次消失，如代码清单 15-4 所示。\n\n```\n\
  @IBAction func doWork(sender: AnyObject) {\n    let startTime = NSDate()\n    resultsTextView.text\
  \ = \"\"\n    startButton.isEnabled = false\n    spinner.startAnimating()\n    let\
  \ queue = DispatchQueue.global(qos: .default)\n    queue.async {\n        let fetchedData\
  \ = self.fetchSomethingFromServer()\n        let processedData = self.processData(fetchedData)\n\
  \        let firstResult = self.calculateFirstResult(processedData)\n        let\
  \ secondResult = self.calculateSecondResult(processedData)\n        let resultsSummary\
  \ =\n            \"First: [\\(firstResult)]\\nSecond: [\\(secondResult)]\"\n   \
  \     DispatchQueue.main.async {\n            self.resultsTextView.text = resultsSummary\n\
  \            self.startButton.isEnabled = true\n            self.spinner.stopAnimating()\n\
  \        }\n        let endTime = NSDate()\n        print(\"Completed in \\(endTime.timeIntervalSince(startTime\
  \ as Date)) seconds\")\n    }\n}\n```\n**代码清单 15-4.** 为 `doWork` 方法添加旋转指示器功能\n\n\
  构建并运行应用，点击按钮。尽管处理工作需要几秒钟，但用户不会感到无所适从。按钮已禁用，外观也符合禁用的状态。同时，动画旋转指示器让用户知道应用并没有真正卡住，并且预计会在某个时刻恢复正常。\n\
  \n## 并发闭包\n\n眼尖的人可能会注意到，经过这些调整后，我们实际上并没有改变算法基本顺序执行的布局（如果能把这一系列简单步骤称为算法的话）。我们所做的只是将方法中的一部分代码移到后台线程，然后在主线程中完成收尾工作。Xcode\
  \ 控制台的输出证明了这一点：这项工作仍然需要十秒才能完成，与开始时完全相同。问题在于 `calculateFirstResult()` 和 `calculateSecondResult()`\
  \ 方法彼此并不依赖，因此不需要按顺序调用。并发执行它们可以显著提升速度。\n\n幸运的是，GCD 提供了一种通过所谓的调度组来实现这一目标的方法。所有在组上下文内通过\
  \ `dispatch_group_async()` 函数异步调度的闭包，都会以最快速度被释放执行，如果可能的话，还会被分配到多个线程并发执行。我们还可以使用\
  \ `dispatch_group_notify()` 指定一个额外的闭包，该闭包会在组内所有闭包执行完毕后运行。\n\n对 `doWork` 方法进行最终修改，如代码清单\
  \ 15-5 所示。\n\n```\n@IBAction func doWork(_ sender: AnyObject) {\n    let startTime\
  \ = Date()\n    self.resultsTextView.text = \"\"\n    startButton.isEnabled = false\n\
  \    spinner.startAnimating()\n    let queue = DispatchQueue.global(qos: .default)\n\
  \    queue.async {\n        let fetchedData = self.fetchSomethingFromServer()\n\
  \        let processedData = self.processData(fetchedData)\n        var firstResult:\
  \ String!\n        var secondResult: String!\n        let group = DispatchGroup()\n\
  \        queue.async(group: group) {\n            firstResult = self.calculateFirstResult(processedData)\n\
  \        }\n        queue.async(group: group) {\n            secondResult = self.calculateSecondResult(processedData)\n\
  \        }\n        group.notify(queue: queue) {\n            let resultsSummary\
  \ = \"First: [\\(firstResult!)]\\nSecond: [\\(secondResult!)]\"\n            DispatchQueue.main.async\
  \ {\n                self.resultsTextView.text = resultsSummary\n              \
  \  self.startButton.isEnabled = true\n                self.spinner.stopAnimating()\n\
  \            }\n            let endTime = Date()\n            print(\"Completed\
  \ in \\(endTime.timeIntervalSince(startTime)) seconds\")\n        }\n    }\n}\n\
  ```\n**代码清单 15-5.** `doWork` 方法的最终版本\n\n这里的一个复杂之处在于，每个 `calculate` 方法都会返回一个我们需要获取的值，所以必须确保变量\
  \ `firstResult` 和 `secondResult` 能够从闭包中被赋值。为此，我们使用 `var` 而不是 `let` 来声明它们。然而，Swift\
  \ 要求闭包中引用的变量必须被初始化，因此以下声明是无效的：\n\n```\nvar firstResult: String\nvar secondResult:\
  \ String\n```\n\n当然，你可以通过为两个变量都赋予任意值来解决这个问题，但更方便的做法是在声明中添加 `!`，将它们声明为隐式解包可选值：\n\n\
  ```\nvar firstResult: String!\nvar secondResult: String!\n```\n\n现在，Swift 不再要求初始化，但我们需要确保两个变量在被最终读取时都有值。在这个例子中，我们可以确定这一点，因为变量在异步组的完成闭包中被读取，而到那时它们肯定已经被赋值了。完成这些修改后，再次构建并运行应用。你会发现努力没有白费。得益于同时运行两个计算操作，原本需要十秒的操作现在只需七秒。\n\
  \n\n\n显然，我们这个精心设计的示例效果最佳，因为这两个“计算”实际上除了让它们所在的线程休眠外，什么也不做。在真实的应用程序中，加速效果取决于正在执行的工作类型以及可用的资源。CPU\
  \ 密集型计算的性能仅在有多个 CPU 核心可用时才会受益于这种技术。随着未来 iOS 设备增加更多核心，这种性能提升几乎会自动实现。其他用途，例如同时从多个网络连接获取数据，即使只有一个\
  \ CPU 也能看到速度提升。\n\n如你所见，GCD 并非万能药。使用 GCD 并不会自动加速每个应用程序。但是，通过在应用程序中对速度至关重要的地方，或者在你发现应用程序对用户操作的响应存在延迟的地方，谨慎应用这些技术，你可以轻松地提供更好的用户体验，即使是在你无法改善实际性能的情况下。\n\
  \n## 后台处理\n\n处理并发的另一项重要技术是后台处理。这允许你的应用程序在后台运行——在某些情况下，甚至在用户按下 Home 键之后也能运行。\n\n\
  此功能不应与现代桌面操作系统的真正多任务处理混淆。在那些系统中，你启动的所有程序都会保留在系统 RAM 中，直到你明确退出它们（或直到操作系统需要释放一些空间并将其交换到磁盘）。iOS\
  \ 设备的内存仍然太小，无法很好地实现这一点。相反，这种后台处理旨在允许需要特定类型系统功能的应用程序在后台时以受限的方式继续运行。例如，如果你有一个播放网络电台音频流的应用程序，即使用户切换到另一个应用程序，iOS\
  \ 也会让该应用程序继续运行。除此之外，当你的应用程序正在播放音频时，它甚至会在 iOS 控制中心（从屏幕底部向上滑动时出现的半透明控制面板）中提供标准的暂停和音量控制。\n\
  \n假设你正在创建一个执行以下操作之一的应用程序：即使用户正在运行另一个应用程序也播放音频、请求连续的位置更新、响应一种特殊的推送请求以从服务器加载新数据，或者实现\
  \ IP 语音（VoIP）以让用户通过互联网发送和接收电话。在这每一种情况下，你都可以在你的应用程序的`Info.plist`文件中声明这种情况，系统将以特殊方式对待你的应用程序。这种用法虽然有趣，但可能不是本书大多数读者会立即着手处理的内容，因此我们在此不做深入探讨。\n\
  \n除了在后台运行应用程序，iOS 还包含在用户按下 Home 键后将应用程序置于挂起状态的能力。这种挂起执行状态在概念上类似于将你的 Mac 置于睡眠模式。应用程序的整个工作内存都保存在\
  \ RAM 中；只是在挂起状态下不执行。因此，切换回这样的应用程序是闪电般快速的。这并不限于特殊的应用程序。事实上，这是你用 Xcode 构建的任何应用程序的默认行为（尽管可以通过`Info.plist`文件中的另一个设置来禁用此功能）。要查看实际效果，请打开设备的“邮件”应用程序并深入查看一条消息。接下来，按下\
  \ Home 键，打开“备忘录”应用程序并选择一条笔记。现在双击 Home 键切换回“邮件”。你会发现没有任何可察觉的延迟；它就像一直在运行一样直接滑入到位。\n\
  \n对于大多数应用程序而言，这种自动挂起和恢复可能就是你所需要的一切。然而，在某些情况下，你的应用程序可能需要知道它即将被挂起以及刚刚被唤醒。系统通过`UIApplication`类提供了通知应用程序其执行状态变化的方式，该类为此目的提供了许多委托方法和通知。我将在本章后面向你展示如何使用它们。\n\
  \n当你的应用程序即将被挂起时，无论它是否属于特殊的后台应用类型，它都可以做一件事，即请求一点额外的后台运行时间。其目的是确保你的应用程序有足够的时间关闭任何打开的文件、网络资源等。我们很快就会看到一个这样的例子。\n\
  \n## 应用程序生命周期\n\n在我们深入探讨如何处理应用程序执行状态变化的具体细节之前，让我们先谈谈其生命周期中的各种状态：\n\n*   **未运行**：这是所有应用在刚刚重启的设备上的状态。在设备开机后任何时刻启动的应用程序，仅在特定条件下才会回到此状态：\n\
  \    *   如果其`Info.plist`包含`UIApplicationExitsOnSuspend`键（且其值设置为`YES`）\n    *   如果它之前处于挂起状态，而系统需要清理一些内存\n\
  \    *   如果在运行时崩溃\n*   **活跃**：这是应用程序显示在屏幕上时的正常运行状态。它可以接收用户输入并更新显示。\n*   **后台**：在此状态下，应用程序被给予一些时间来执行代码，但它不能直接访问屏幕或获取任何用户输入。当用户按下\
  \ Home 键时，所有应用程序都会短暂进入此状态；它们中的大多数会快速过渡到挂起状态。想要进行任何后台处理的应用程序会保持在此状态，直到它们再次变为活跃状态。\n\
  *   **挂起**：挂起的应用程序被冻结。这就是普通应用程序在后台状态短暂停留后发生的情况。应用程序在活跃时使用的所有内存都保持原样。如果用户将应用程序带回活跃状态，它将从上次中断的地方继续。另一方面，如果系统需要更多内存给当前活跃的应用程序，任何挂起的应用程序都可能被终止（并放回未运行状态），其内存被释放供其他用途。\n\
  *   **非活跃**：应用程序仅作为其他两个状态之间的临时休息站进入非活跃状态。应用程序能在非活跃状态停留一段时间的唯一情况是，用户正在处理系统提示（例如来电或短信提示）或用户已锁定屏幕。此状态基本上是一种不确定的状态。\n\
  \n\n\n### 状态变更通知\n\n为了管理这些状态之间的切换，`UIApplication` 定义了一些可由其委托实现的方法。除了委托方法之外，`UIApplication`\
  \ 还定义了一组配套的通知名称（见表 15-1）。这使得应用委托之外的其他对象也可以在应用状态发生变化时注册并接收通知。\n\n**表 15-1** 跟踪应用执行状态的委托方法及其对应的通知名称\n\
  \n| 委托方法 | 通知名称 |\n| --- | --- |\n| `application(_:didFinishLaunchingWithOptions:)`\
  \ | `UIApplicationDidFinishLaunching` |\n| `applicationWillResignActive()` | `UIApplicationWillResignActive`\
  \ |\n| `applicationDidBecomeActive()` | `UIApplicationDidBecomeActive` |\n| `applicationDidEnterBackground()`\
  \ | `UIApplicationDidEnterBackground` |\n| `applicationWillEnterForeground()` |\
  \ `UIApplicationWillEnterForeground` |\n| `applicationWillTerminate()` | `UIApplicationWillTerminate`\
  \ |\n\n请注意，每个方法都直接对应一个运行状态：活跃、非活跃和后台。每个委托方法（以及每个通知）仅在这些状态之一中被调用。最重要的状态切换发生在活跃状态与其他状态之间。某些切换，例如从后台切换到挂起状态，是完全没有通知的。下面我们来逐一讲解这些方法，并讨论它们的预期用途。\n\
  \n第一个方法 `application(_:didFinishLaunchingWithOptions:)` 我们在本书中已经见过多次。它是应用启动后直接执行应用级代码的主要方式。还有一个名为\
  \ `application(_:willFinishLaunchingWithOptions:)` 的类似方法，它会被首先调用，旨在用于那些使用了基于视图控制器的状态保存与恢复功能（这超出了本书的范围）的应用。该方法未在此表中列出，因为它不与状态变更相关联。\n\
  \n接下来的两个方法 `applicationWillResignActive()` 和 `applicationDidBecomeActive()` 在多种情况下都会被使用。如果用户按下主屏幕按钮，则会调用\
  \ `applicationWillResignActive()`。如果用户随后将应用重新调回前台，则会调用 `applicationDidBecomeActive()`。当用户接到电话时，也会发生相同顺序的事件。当应用首次启动时，也会调用\
  \ `applicationDidBecomeActive()`。总的来说，这一对方法标志着应用从活跃状态向非活跃状态的转换。它们是启用和禁用任何动画、应用内音频或与应用呈现给用户相关的其他项目的好地方。由于\
  \ `applicationDidBecomeActive()` 会在多种情况下被调用，您可能需要将一些初始化代码放在这里，而不是放在 `application(_:didFinishLaunchingWithOptions:)`\
  \ 中。请注意，不应在 `applicationWillResignActive()` 中假设应用即将被发送到后台；它可能只是一个暂时性的变化，最终会回到活跃状态。\n\
  \n在这些方法之后，我们看到了 `applicationDidEnterBackground()` 和 `applicationWillEnterForeground()`，它们的用法略有不同：用于处理确定要被发送到后台的应用。`applicationDidEnterBackground()`\
  \ 是您的应用应该释放所有以后可以重新创建的资源、保存所有用户数据、关闭网络连接等的地方。这也是如果您需要更多后台运行时间可以在此请求的地方，稍后我们会看到。如果您在\
  \ `applicationDidEnterBackground()` 中花费太多时间（超过大约五秒钟），系统会判断您的应用行为异常并终止它。您应该实现 `applicationWillEnterForeground()`\
  \ 来重新创建在 `applicationDidEnterBackground()` 中被拆除的内容，例如重新加载用户数据、重新建立网络连接等。请注意，当调用\
  \ `applicationDidEnterBackground()` 时，可以安全地假设 `applicationWillResignActive()` 也刚刚被调用过。同样，当调用\
  \ `applicationWillEnterForeground()` 时，可以假设 `applicationDidBecomeActive()` 也很快会被调用。\n\
  \n最后是 `applicationWillTerminate()`，您可能很少会用到它（甚至可能永远不会用到）。它仅当您的应用已经在后台，而系统因为某种原因决定跳过挂起状态直接终止应用时，才会被调用。\n\
  \n现在，您已经对应用状态切换有了基本的理论理解，让我们用一个简单的应用来验证这些知识，该应用所做的只是在每次调用这些方法时向 Xcode 的控制台日志写入一条消息。然后，我们将像用户那样以各种方式操作运行中的应用，观察发生了哪些状态切换。为了从这个示例中获得最佳效果，您需要一个\
  \ iOS 设备。如果没有，您可以使用模拟器并跳过那些需要设备的部分。\n\n## 创建 State Lab\n\n在 Xcode 中，基于 Single View\
  \ Application 模板创建一个新项目，并将其命名为 State Lab。至少在最初阶段，这个应用除了显示默认的白屏外，不会做任何其他事情。稍后，我们会让它做一些更有趣的事情，但目前，它生成的所有输出都将出现在\
  \ Xcode 控制台中。`AppDelegate.swift` 文件已经包含了我们感兴趣的所有方法。我们只需要添加一些日志记录，如粗体所示。请注意，为了简洁起见，我们也删除了这些方法中的注释，如代码清单\
  \ 15-6 所示。\n\n```\nfunc application(_ application: UIApplication,\ndidFinishLaunchingWithOptions\
  \ launchOptions: [NSObject: AnyObject]?) -> Bool {\nprint(#function)\nreturn true\n\
  }\nfunc applicationWillResignActive(_ application: UIApplication) {\nprint(#function)\n\
  }\nfunc applicationDidEnterBackground(_ application: UIApplication) {\nprint(#function)\n\
  }\nfunc applicationWillEnterForeground(_ application: UIApplication) {\nprint(#function)\n\
  }\nfunc applicationDidBecomeActive(_ application: UIApplication) {\nprint(#function)\n\
  }\nfunc applicationWillTerminate(_ application: UIApplication) {\nprint(#function)\n\
  }\n```\n\n**代码清单 15-6** `AppDelegate.swift` 中的日志记录方法\n\n您可能会好奇，在这些方法中传递给 `print()`\
  \ 函数的是什么值：字面量表达式 `#function` 会被求值为它出现所在的方法名称。这里，我们用它来获取当前方法名，而无需重新输入或将其复制粘贴到每个生命周期方法中。\n\
  \n\n\n### 探索执行状态\n\n现在构建并运行应用程序，查看控制台（`View ➤ Debug Area ➤ Activate Console`），你应该会看到类似如下的输出：\n\
  \n```\napplication(_:didFinishLaunchingWithOptions:)\napplicationDidBecomeActive\n\
  ```\n\n以及其他大量消息。你可以使用控制台输出下方的搜索字段来筛选观察到的内容。\n\n这里可以看到，应用程序已成功启动并进入了活跃（Active）状态。现在按下\
  \ Home 键（如果使用模拟器，则需要通过模拟器菜单选择 `Hardware ➤ Home` 或按键盘上的 `⇧⌘H`）。你应在控制台中看到以下内容：\n\n\
  ```\napplicationWillResignActive\napplicationDidEnterBackground\n```\n\n这两行显示了应用程序在两个状态间的实际转换：它首先变为非活跃（Inactive），然后进入后台（Background）。这里你无法看到的是，应用程序还会切换到第三种状态：挂起（Suspended）。请记住，你不会收到任何关于此状态变更的通知；这完全不受你控制。请注意，从某种意义上说，应用程序仍然存活，并且\
  \ Xcode 仍然与其连接，尽管它实际上并未获取任何 CPU 时间。通过点击应用图标重新启动来验证这一点，这应产生如下输出：\n\n```\napplicationWillEnterForeground\n\
  applicationDidBecomeActive\n```\n\n就这样，应用恢复运行。应用程序先前处于挂起（Suspended）状态，被唤醒至非活跃（Inactive）状态，然后最终再次变为活跃（Active）。那么，当应用程序真正被终止时会发生什么？再次按下\
  \ Home 键，你将看到：\n\n```\napplicationWillResignActive\napplicationDidEnterBackground\n\
  ```\n\n现在双击 Home 键（在模拟器中，按 `⇧⌘HH`——需要按两次 H 键）。应该会显示横向滚动的应用屏幕。在“状态实验室”的截图上向上滑动，直到它飞出屏幕，从而终止应用程序。你应该会看到类似如下的内容：\n\
  \n```\n2016-07-21 10:15:40.201746 temp[2825:864732] [Common] : Received exit event\n\
  applicationDidEnterBackground\napplicationWillTerminate\n```\n\n**提示**\n\n不要依赖 `applicationWillTerminate()`\
  \ 方法来保存应用程序的状态——而应在 `applicationDidEnterBackground()` 中执行此操作。\n\n这里还有一个值得探讨的有趣交互。即当系统显示一个警告对话框时，它会临时接管来自应用程序的输入流，并将其置于非活跃（Inactive）状态。只有在真实设备上（而非模拟器）运行时，才能使用内置的“信息”应用轻松触发此状态。像许多其他应用一样，“信息”应用可以从外部接收消息并以多种方式显示它们。\n\
  \n要了解这些是如何设置的，请在您的设备上运行“设置”应用，从列表中选择“通知”，然后从应用列表中选择“信息”应用。在 iOS 5 中首次亮相的热门“新”消息显示方式称为“横幅”。它的工作原理是在屏幕顶部显示一个小横幅，不会中断任何当前正在运行的应用。我们想要展示的是早已过时的“提醒”方法，它会在当前应用前显示一个模态面板，需要用户操作。在\
  \ **解锁时提醒样式** 标题下，选择“提醒”，以便“信息”应用恢复到 iOS 4 及更早版本的用户必须应对的那种令人讨厌的推送方式。\n\n现在回到您的电脑。在\
  \ Xcode 中，使用左上角的下拉菜单从模拟器切换到您的设备，然后点击“运行”按钮在您的设备上构建并运行应用程序。现在您需要做的就是从外部向您的设备发送一条消息。如果您的设备是\
  \ iPhone，您可以从另一部手机向其发送 SMS 短信。如果是 iPod touch 或 iPad，则仅限于 Apple 自己的 iMessage 通信，它适用于所有\
  \ iOS 设备以及 OS X 中的“信息”应用。找出适合您设置的方式，并通过 SMS 短信或 iMessage 向您的设备发送一条消息。当您的设备显示系统提醒（显示收到消息时），这将在\
  \ Xcode 控制台中显示：\n\n```\napplicationWillResignActive\n```\n\n请注意，我们的应用程序并未被发送到后台。它处于非活跃（Inactive）状态，并且仍然可以在系统提醒后面看到。如果该应用程序是游戏或正在运行任何视频、音频或动画，我们可能希望在此处暂停它们。\n\
  \n点击提醒上的 **关闭** 按钮，您将看到：\n\n```\napplicationDidBecomeActive\n```\n\n现在，让我们看看如果您决定回复消息会发生什么。向您的设备再发送一条消息，生成：\n\
  \n```\napplicationWillResignActive\n```\n\n这次，点击 **回复**，这会将您切换到“信息”应用。您应该会看到如下一系列活动：\n\
  \n```\napplicationDidBecomeActive\napplicationWillResignActive\napplicationDidEnterBackground\n\
  ```\n\n我们的应用程序迅速变为活跃（Active），再次变为非活跃（Inactive），最后进入后台（Background）（然后，悄悄地，变为挂起（Suspended））。\n\
  \n### 利用执行状态变化\n\n那么，我们应该从中得出什么结论？根据刚才的演示，在处理这些状态变化时，似乎有一个清晰的策略可以遵循：\n\n#### 活跃\
  \ ➤ 非活跃\n\n使用 `applicationWillResignActive()` / `UIApplicationWillResignActive`\
  \ 通知来“暂停”应用的显示。如果您的应用是游戏，您可能已经有办法以某种方式暂停游戏进程。对于其他类型的应用，请确保没有正在进行的要求用户输入的对时间敏感的任务，因为您的应用将在一段时间内无法接收任何用户输入。\n\
  \n#### 非活跃 ➤ 后台\n\n使用 `applicationDidEnterBackground()` / `UIApplicationDidEnterBackground`\
  \ 通知来释放那些在应用进入后台后无需保留的资源（例如缓存的图像或其他易于重新加载的数据），或者那些可能无法在后台状态下存活的资源（例如活跃的网络连接）。在这里清除多余的内存占用将使应用最终的挂起（Suspended）快照更小，从而降低应用被完全从\
  \ RAM 中清除的风险。您还应利用此机会保存任何有助于用户在下次应用重新启动时从上次离开的地方继续进行的应用数据。如果您的应用回到活跃（Active）状态，通常这并不重要；然而，如果它被清除并且必须重新启动，用户会感激能从相同的地方开始。\n\
  \n#### 后台 ➤ 非活跃\n\n使用 `applicationWillEnterForeground()` / `UIApplicationWillEnterForeground`\
  \ 通知来撤销您在从非活跃（Inactive）切换到后台（Background）时所做的一切。例如，您可以在此处重新建立持久的网络连接。\n\n\n\n\n####\
  \ 非活跃 ➤ 活跃\n\n使用 `applicationDidBecomeActive()`/`UIApplicationDidBecomeActive` 通知来撤销从活跃状态切换到非活跃状态时所做的一切。请注意，如果你的应用是游戏，这通常并不意味着直接从暂停状态跳转到游戏；你应该让用户自行决定。同时请记住，当应用被全新启动时，也会使用此方法和通知，因此你在此处执行的操作也必须适用于该场景。\n\
  \n对于非活跃 ➤ 后台状态转换，有一个特殊注意事项。它不仅在上文列表中拥有最长的描述，而且很可能是应用程序中代码量最大且耗时最多的状态转换，因为你的应用可能需要进行大量的账务记录工作。当此转换正在进行时，系统不会无限期地等待你保存数据。它只给你几秒钟时间。如果你的应用返回委托方法（并处理你已注册的任何通知）所需时间超过这个时限，那么你的应用将被强制从内存中清除，并进入\"\
  未运行\"状态。如果这看起来不公平，别担心，因为有解决方案。在处理委托方法或通知时，你可以请求系统在后台队列中为你执行一些额外工作，这能为你争取一些额外时间。\n\
  \n### 处理非活跃状态\n\n你的应用可能遇到的最简单的状态变化是从活跃状态切换到非活跃状态，然后再回到活跃状态。你可能还记得，当你的 iPhone 在运行应用时收到一条短信并显示给用户时，就会发生这种情况。在本节中，我们将让\
  \ State Lab 做一些视觉效果上引人注意的事，以便你能看到忽略这种状态变化会发生什么。接下来，我将展示如何修复它。\n\n我们还将向视图添加一个 `UILabel`，并使用\
  \ Core Animation 使其移动，这是在 iOS 中实现对象动画的一种非常巧妙的方式。\n\n首先在 `ViewController.swift` 中添加一个\
  \ `UILabel`：\n\n```\nclass ViewController: UIViewController {\nprivate var label:UILabel!\n\
  ```\n\n现在，当视图加载时设置标签。如下方代码清单 15-7 所示，修改 `viewDidLoad()` 方法。\n\n```\noverride func\
  \ viewDidLoad() {\nsuper.viewDidLoad()\n// 加载视图后的其他设置，通常来自 nib 文件\nlet bounds =\
  \ view.bounds\nlet labelFrame = CGRect(origin: CGPoint(x: bounds.origin.x, y: bounds.midY\
  \ - 50) , size: CGSize(width:  bounds.size.width, height: 100))\nlabel = UILabel(frame:\
  \ labelFrame)\nlabel.font = UIFont(name: \"Helvetica\", size:70)\nlabel.text = \"\
  Bazinga!\"\nlabel.textAlignment = NSTextAlignment.center\nlabel.backgroundColor\
  \ = UIColor.clear()\nview.addSubview(label)\n}\n代码清单 15-7\n我们修改后的 viewDidLoad 方法\n\
  ```\n\n这会将标签垂直居中于其父视图，并使其横向铺满父视图的整个宽度。接下来，让我们设置一些动画。我们将定义两个方法：一个用于将标签旋转到倒置位置：\n\n\
  ```\nfunc rotateLabelDown() {\nUIView.animate(withDuration: 0.5, animations: {\n\
  self.label.transform = CGAffineTransform(rotationAngle: CGFloat(M_PI))\n},\ncompletion:\
  \ {(Bool) -> Void in\nself.rotateLabelUp()\n}\n)\n}\n```\n\n另一个方法将其旋转回正常位置：\n\n\
  ```\nfunc rotateLabelUp() {\nUIView.animate(withDuration: 0.5, animations: {\nself.label.transform\
  \ = CGAffineTransform(rotationAngle: 0)\n},\ncompletion: {(Bool) -> Void in\nself.rotateLabelDown()\n\
  }\n)\n}\n```\n\n这值得稍作解释。`UIView` 定义了一个名为 `animate(withDuration: completion:)` 的类方法，用于设置动画。我们在动画闭包中设置的可动画属性不会立即作用于接收者。相反，Core\
  \ Animation 会平滑地将该属性从当前值过渡到我们指定的新值。这就是所谓的隐式动画，是 Core Animation 的主要特性之一。完成闭包让我们可以指定动画完成后会发生什么。请仔细注意此闭包的语法：\n\
  \n```\ncompletion: {(Bool) -> Void in\nif self.animate {\nself.rotateLabelDown()\n\
  }\n}\n```\n\n粗体代码是闭包的签名——它表示该闭包接收一个布尔参数，且不返回任何值。如果动画正常完成，该参数值为 `true`；如果动画被取消，则为\
  \ `false`。在此示例中，我们没有使用这个参数。\n\n因此，每个方法都将标签的 `transform` 属性设置为以弧度表示的特定旋转角度，并使用完成闭包来调用另一个方法，从而使文本无限期地来回动画显示。\n\
  \n最后，我们需要设置一种启动动画的方式。目前，我们将在 `viewDidLoad()` 末尾添加以下代码行来完成：\n\n```\nrotateLabelDown();\n\
  ```\n\n构建并运行应用。你应该会看到 \"Bazinga!\" 标签来回旋转，如图 15-4 所示。\n\n![A329781_3_En_15_Fig4_HTML.jpg](img/A329781_3_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4. State Lab 应用正在旋转标签\n\n\n\n\n为了测试从“活跃”到“非活跃”的转换，你确实需要再次在真机上运行应用，并从其他地方向它发送一条短信。在\
  \ iPhone 上构建并运行应用，你会看到动画在持续运行。现在向设备发送一条短信。当系统弹出消息提示时，你会看到动画依然在运行。这可能有点滑稽，但对用户来说可能很烦人。我们将使用应用程序状态转换通知，在这种情况下停止我们的动画。\n\
  \n我们的控制器类需要有一些内部状态来追踪在任何给定时间是否应该运行动画。为此，让我们向`ViewController`类添加一个属性：\n\n```\nclass\
  \ ViewController: UIViewController {\nprivate var label:UILabel!\nprivate var animate\
  \ = false\n```\n\n如你所见，应用程序状态的变化会通知给应用程序委托，但由于我们的类不是应用程序委托，我们不能仅仅实现委托方法并期望它们生效。相反，我们注册以在应用程序执行状态变化时接收通知。通过在`ViewController.swift`文件的`viewDidLoad`方法末尾添加以下代码来实现：\n\
  \n```\nlet center = NotificationCenter.default\ncenter.addObserver(self, selector:\
  \ #selector(ViewController.applicationWillResignActive),\nname: Notification.Name.UIApplicationWillResignActive,\
  \ object: nil)\ncenter.addObserver(self, selector: #selector(ViewController.applicationDidBecomeActive),\n\
  name: NSNotification.Name.UIApplicationDidBecomeActive, object: nil)\n```\n\n这样设置后，通知会在适当时间调用我们类中的方法。向`ViewController`类添加以下方法：\n\
  \n```\nfunc applicationWillResignActive() {\nprint(\"VC: \\(#function)\")\nanimate\
  \ = false\n}\nfunc applicationDidBecomeActive() {\nprint(\"VC: \\(#function)\")\n\
  animate = true\nrotateLabelDown()\n}\n```\n\n这些方法包含了与之前相同的方法日志记录，只是为了让你在 Xcode 控制台中看到这些方法的触发位置。我们添加了前缀`\"\
  VC: \"`，以区分此调用与委托中的类似调用（`VC`代表视图控制器）。第一个方法只是关闭了`animate`标志。第二个方法重新打开该标志，然后实际重新启动动画。为了使第一个方法生效，我们需要添加一些代码来检查`animate`标志，并且仅在启用时才继续运行动画：\n\
  \n```\nfunc rotateLabelUp() {\nUIView.animate(withDuration: 0.5, animations: {\n\
  self.label.transform = CGAffineTransform(rotationAngle: 0)\n},\ncompletion: {(Bool)\
  \ -> Void in\nif self.animate {\nself.rotateLabelDown()\n}\n}\n)\n}\n```\n\n我们将此代码添加到了`rotateLabelUp()`的完成块中（并且仅在那里），这样我们的动画只会在文本正立时停止。最后，由于我们现在在应用程序变为活跃时开始动画，并且这发生在启动之后，我们不再需要在`viewDidLoad()`中调用`rotateLabelDown()`，因此删除它：\n\
  \n```\noverride func viewDidLoad() {\nrotateLabelDown();\nlet center = NSNotificationCenter.default\n\
  ```\n\n现在再次构建并运行应用，你应该会看到它像以前一样在动画。再次向你的 iPhone 发送一条短信。这次，当系统提示出现时，你会看到背景中的动画在文本正立时立即停止。点击“关闭”按钮，动画将重新开始。\n\
  \n现在你已经看到了从“活跃”切换到“非活跃”再切换回来的简单情况处理方法。更大的任务，也许是更重要的任务，是处理切换到后台然后再返回前台的情况。\n\n###\
  \ 处理后台状态\n\n如前所述，切换到后台状态对于确保尽可能最佳的用户体验非常重要。这是你想释放任何可以轻松重新获取的资源（或者在你的应用静默时无论如何都会丢失的资源）并保存有关应用当前状态的信息的地方，所有这些都不应占用主线程超过五秒钟。\n\
  \n为了演示其中一些行为，我们将在几个方面扩展`State Lab`。首先，我们将在显示中添加一张图片，以便稍后我可以向你展示如何释放内存中的图片。然后，我将向你展示如何保存一些关于应用状态的信息，以便我们稍后可以轻松恢复它。最后，我将向你展示如何通过将所有这项工作放入后台队列来确保这些活动不会占用太多主线程时间。\n\
  \n\n\n### 进入后台时释放资源\n\n首先，将本书源码资源中“15 - Image”文件夹里的 `smiley.png` 添加到项目的 State Lab\
  \ 文件夹中。请务必勾选告知 Xcode 将文件复制到项目目录的复选框。不要将其添加到 `Assets.xcassets` 资源目录中，因为那会提供自动缓存功能，从而干扰我们将要实现的特定资源管理逻辑。\n\
  \n现在，让我们在 `ViewController.swift` 中为图片和图片视图添加属性：\n\n```\nclass ViewController: UIViewController\
  \ {\nprivate var label:UILabel!\nprivate var smiley:UIImage!\nprivate var smileyView:UIImageView!\n\
  private var animate = false\n```\n\n接下来，通过修改 `viewDidLoad()` 方法来设置图片视图并将其显示在屏幕上，如代码清单\
  \ 15-7 所示。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// 在此处添加任何视图加载后的额外设置，通常来自\
  \ nib 文件。\nlet bounds = view.bounds\nlet labelFrame = CGRect(origin: CGPoint(x:\
  \ bounds.origin.x, y: bounds.midY - 50) , size: CGSize(width:  bounds.size.width,\
  \ height: 100))\nlabel = UILabel(frame:labelFrame)\nlabel.font = UIFont(name:\"\
  Helvetica\", size:70)\nlabel.text = \"Bazinga!\"\nlabel.textAlignment = NSTextAlignment.center\n\
  label.backgroundColor = UIColor.clear()\n// smiley.png 尺寸为 84 x 84\nlet smileyFrame\
  \ = CGRect(x: bounds.midX - 42,\ny: bounds.midY/2 - 42, width: 84, height: 84)\n\
  smileyView = UIImageView(frame:smileyFrame)\nsmileyView.contentMode = UIViewContentMode.center\n\
  let smileyPath =\nBundle.main.pathForResource(\"smiley\", ofType: \"png\")!\nsmiley\
  \ = UIImage(contentsOfFile: smileyPath)\nsmileyView.image = smiley\nview.addSubview(smileyView)\n\
  view.addSubview(label)\nlet center = NotificationCenter.default\ncenter.addObserver(self,\
  \ selector: #selector(ViewController.applicationWillResignActive),\nname: NSNotification.Name.UIApplicationWillResignActive,\
  \ object: nil)\ncenter.addObserver(self, selector: #selector(ViewController.applicationDidBecomeActive),\n\
  name: NSNotification.Name.UIApplicationDidBecomeActive, object: nil)\n}\n代码清单 15-7.\n\
  修改后的 viewDidLoad 方法\n```\n\n构建并运行应用程序。你会看到屏幕顶部显示一个看起来非常开心的笑脸，如图 15-5 所示。\n\n![A329781_3_En_15_Fig5_HTML.jpg](img/A329781_3_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5.\nState Lab 应用程序在添加笑脸图标后旋转标签\n\n接下来，按下 Home 键将应用程序切换到后台，然后点击其图标再次启动它。你会看到，当应用程序恢复时，标签会按预期重新开始旋转。一切看似正常，但实际上我们并未像预期那样优化系统资源。请记住，当应用程序被挂起时，我们使用的资源越少，iOS\
  \ 完全终止我们应用的风险就越低。通过在我们有能力时从内存中清除任何易于重新创建的资源，我们就能增加应用驻留的机会，从而使重新启动时速度极快。\n\n让我们看看能对那个笑脸做些什么。我们非常希望在进入后台状态时释放该图片，并在从后台状态返回时重新创建它。为此，我们需要在\
  \ `viewDidLoad()` 内添加另外两个通知注册：\n\n```\ncenter.addObserver(self, selector: #selector(ViewController.applicationDidEnterBackground),\n\
  name: NSNotification.Name.UIApplicationDidEnterBackground, object: nil)\ncenter.addObserver(self,\
  \ selector: #selector(ViewController.applicationWillEnterForeground),\nname: NSNotification.Name.UIApplicationWillEnterForeground,\
  \ object: nil)\n```\n\n并且我们需要实现这两个新方法：\n\n```\nfunc applicationDidEnterBackground()\
  \ {\nprint(\"VC: \\(#function)\")\nself.smiley = nil;\nself.smileyView.image = nil;\n\
  }\nfunc applicationWillEnterForeground() {\nprint(\"VC: \\(__FUNCTION__)\")\nlet\
  \ smileyPath =\nBundle.main.path(forResource:\"smiley\", ofType:\"png\")!\nsmiley\
  \ = UIImage(contentsOfFile: smileyPath)\nsmileyView.image = smiley\n}\n```\n\n构建并运行应用程序，重复同样的步骤：将应用置于后台，再切换回前台。从用户的角度来看，行为应该大致相同。如果你想亲自验证这一过程是否真的发生，请注释掉\
  \ `applicationWillEnterForeground()` 方法中的内容，然后再次构建并运行应用。你会看到图片确实消失了。\n\n\n\n###\
  \ 进入后台时保存状态\n\n你已经了解了如何在进入后台状态时释放部分资源的示例，现在该考虑保存状态了。请记住，其核心理念是保存与用户当前操作相关的信息，这样即使你的应用随后从内存中清除，用户下次返回时仍能精准地接续之前的进度。\n\
  \n这里所讨论的状态类型实际上是针对应用整体而言的，而非特定视图。请不要将这与保存和恢复视图位置，或用户上次活跃时正在查看的应用界面屏幕相混淆——对此，iOS\
  \ 提供了状态保存与恢复机制，你可以在苹果网站上的《iOS 应用编程指南》（[`https://developer.apple.com/library/ios/documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/StrategiesforImplementingYourApp/StrategiesforImplementingYourApp.html`](https://developer.apple.com/library/ios/documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/StrategiesforImplementingYourApp/StrategiesforImplementingYourApp.html)）中了解详情。在此，我们考虑的是应用中那些你不想为其实现独立设置包的用户偏好。使用我们在第\
  \ 12 章中介绍的同一个`UserDefaults`API，你可以快速便捷地在应用内保存偏好设置，并在之后读取回来。当然，如果你的应用在视觉上并不复杂，或者你不想使用状态保存与恢复机制，你也可以将用于恢复其视觉状态的信息保存在用户偏好中。\n\
  \n《状态实验室》示例过于简单，没有实际的用户偏好设置，因此我们采取一个捷径，将一些应用特定的状态添加到其唯一的视图控制器中。在`ViewController.swift`中添加一个名为`index`的属性，以及一个分段控件：\n\
  \n```\nclass ViewController: UIViewController {\n    private var label:UILabel!\n\
  \    private var smiley:UIImage!\n    private var smileyView:UIImageView!\n    private\
  \ var segmentedControl:UISegmentedControl!\n    private var index = 0\n    private\
  \ var animate = false\n```\n\n我们将允许用户通过分段控件设置此属性的值，并将其保存到用户默认设置中。然后，我们将终止并重新启动应用，以演示我们可以恢复该属性的值。\n\
  \n接下来，转到`viewDidLoad()`方法的中间部分，在此处创建分段控件，并将其添加到视图中：\n\n```\nsmileyView.image = smiley\n\
  segmentedControl =\n    UISegmentedControl(items: [\"One\",\"Two\", \"Three\", \"\
  Four\"])\nsegmentedControl.frame = CGRect(x: bounds.origin.x + 20, y: 50,\n    \
  \                            width: bounds.size.width - 40, height: 30)\nsegmentedControl.addTarget(self,\
  \ action: #selector(ViewController.selectionChanged(_:)),\n                    \
  \       for: UIControlEvents.valueChanged)\nview.addSubview(segmentedControl)\n\
  view.addSubview(smileyView)\n```\n\n我们还使用了`addTarget(_:action:forControlEvents)`方法将分段控件连接到`selectionChanged()`方法上，这样当选中段发生改变时，该方法就会被调用。在`ViewController`类的实现中任意位置添加此方法的实现：\n\
  \n```\nfunc selectionChanged(_ sender:UISegmentedControl) {\n    index = segmentedControl.selectedSegmentIndex;\n\
  }\n```\n\n现在，每当用户更改选中的段时，`index`属性的值就会更新。\n\n构建并运行应用。你应该能看到分段控件，并能依次点击其段来选中它们。在此过程中，`index`属性的值会发生变化，尽管你实际上看不到这一过程。再次点击主页按钮将应用置于后台，调出任务管理器（双击主页按钮），杀死你的应用，然后重新启动它。当应用重新启动时，`index`属性将再次为零，并且没有选中的段。这就是我们接下来需要修复的问题。\n\
  \n保存`index`属性的值相当简单；我们只需要在`ViewController.swift`中的`applicationDidEnterBackground()`方法末尾添加一行代码即可：\n\
  \n```\nfunc applicationDidEnterBackground() {\n    print(\"VC: \\(#function)\")\n\
  \    self.smiley = nil;\n    self.smileyView.image = nil;\n    UserDefaults.standard.set(self.index,\n\
  \                              forKey:\"index\")\n}\n```\n\n但是，我们应该在哪里恢复该属性的值并用它来配置分段控件呢？此方法的逆方法`applicationWillEnterForeground()`并不是我们想要的。当该方法被调用时，应用已经在运行，设置仍然保持不变。相反，我们需要在新启动后进行设置时访问此值，这让我们回到了`viewDidLoad()`方法。将此处显示的粗体代码行添加到该方法中：\n\
  \n```\nview.addSubview(label)\nindex = UserDefaults.standard.integer(forKey: \"\
  index\")\nsegmentedControl.selectedSegmentIndex = index;\n```\n\n当应用首次启动时，用户默认设置中将不会保存任何值。在这种情况下，`integerForKey()`方法返回值零，这恰好是`index`属性的正确初始值。如果你想使用不同的初始值，可以将其注册为`index`键的默认值，如第\
  \ 12 章“注册默认值”中所述。\n\n现在构建并运行应用。你会立即发现一个区别——分段控件中的第一个段已被预选，因为其选中段索引已在`viewDidLoad()`方法中设置好了。现在触摸一个段，然后执行完整的后台-杀死-重启流程。瞧——索引值已经被恢复，因此分段控件中正确的段现在被选中了。\n\
  \n显然，我们在此展示的内容非常简单，但这一概念可以扩展到所有类型的应用状态。为了维持用户一种错觉——你的应用始终存在，只是在等待他们回来——你可以决定将这个方案实施到何种程度。\n\
  \n\n\n### 请求更多后台时间\n\n之前，我提到如果应用进入后台状态耗时过长，可能会被从内存中清除。例如，你的应用可能正在进行文件传输，中断它实在可惜；然而，试图劫持\
  \ `applicationDidEnterBackground()` 方法，让它在应用真正进入后台前完成工作，并非明智之举。相反，你应该将 `applicationDidEnterBackground()`\
  \ 作为向系统表明你还有额外工作需要完成的节点，然后启动一个代码块来实际执行该工作。假设系统有足够的可用 RAM，能在用户执行其他操作时将你的应用保留在内存中，那么系统会满足你的请求，并让应用继续运行一段时间。\n\
  \n我们通过一个简单的睡眠调用来演示这一点，而非实际的文件传输。我们再次使用新认识的好帮手 GCD，让 `applicationDidEnterBackground()`\
  \ 方法中的内容在一个独立的队列中执行。\n\n在 `ViewController.swift` 中，将 `applicationDidEnterBackground()`\
  \ 方法修改为如代码清单 15-8 所示。\n\n```\nfunc applicationDidEnterBackground() {\n    print(\"\
  VC: \\(#function)\")\n    UserDefaults.standard.set(self.index, forKey: \"index\"\
  )\n    let app = UIApplication.shared()\n    var taskId = UIBackgroundTaskInvalid\n\
  \    let id = app.beginBackgroundTask() {\n        print(\"后台任务超时，已被终止。\")\n   \
  \     app.endBackgroundTask(taskId)\n    }\n    taskId = id\n    if taskId == UIBackgroundTaskInvalid\
  \ {\n        print(\"未能启动后台任务！\")\n        return\n    }\n    DispatchQueue.global(qos:\
  \ .default).async {\n        print(\"启动后台任务，剩余\" +\n              \"\\(app.backgroundTimeRemaining)\
  \ 秒\")\n        self.smiley = nil;\n        self.smileyView.image = nil;\n     \
  \   // 模拟一个耗时过程（25 秒）\n        Thread.sleep(forTimeInterval: 25)\n        print(\"\
  结束后台任务，剩余\" +\n              \"\\(app.backgroundTimeRemaining) 秒\")\n        app.endBackgroundTask(taskId)\n\
  \    });\n}\n*代码清单 15-8.* 更新后的 `applicationDidEnterBackground` 方法\n```\n\n我们逐段分析这段代码。首先，我们获取共享的\
  \ `UIApplication` 实例，因为在此方法中会多次用到它。接着是以下部分：\n\n```\nvar taskId = UIBackgroundTaskInvalid\n\
  let id = app.beginBackgroundTask() {\n    print(\"后台任务超时，已被终止。\")\n    app.endBackgroundTask(taskId)\n\
  }\ntaskId = id\n```\n\n通过调用 `app.beginBackgroundTask()`，我们基本上是在告诉系统，我们需要更多时间来完成某些任务，并承诺完成后会通知系统。如果系统认为我们已经运行了太久并决定停止我们的后台任务，它可能会调用作为参数传入的闭包。调用\
  \ `app.beginBackgroundTask()` 会返回一个标识符，我们将其保存在局部变量 `taskId` 中（如果这对你的类设计更合适，你也可以将此值存储在视图控制器类的属性中）。\n\
  \n请注意，闭包以调用 `endBackgroundTask()` 结束，并传入了 `taskId`。这告诉系统，我们已经完成了之前请求额外时间的工作。务必平衡每次对\
  \ `app.beginBackgroundTask()` 的调用与相应的 `endBackgroundTask()` 调用，以便系统知道我们何时完成了工作。\n\
  \n> **注意:** 根据你的计算机背景知识，此处\"任务\"一词可能会让你联想到通常所说的\"进程\"，即一个包含多个线程的运行程序等。在这种情况下，请尽量忽略这种联想。此上下文中的\"\
  任务\"实际上仅指\"需要完成的事情\"。你在此处创建的任何任务都在仍在执行的应用内运行。\n\n接下来，我们执行以下操作：\n\n```\nif taskId\
  \ == UIBackgroundTaskInvalid {\n    print(\"未能启动后台任务！\")\n    return\n}\n```\n\n\
  如果之前对 `app.beginBackgroundTask()` 的调用返回了特殊值 `UIBackgroundTaskInvalid`，这意味着系统拒绝授予我们任何额外时间。在这种情况下，你可以尝试执行需要完成的任务中最快速的部分，并希望它能足够快地完成，以便应用在结束前不被终止。在较老设备（如不支持多任务的\
  \ iPhone 3G）上运行时，这更可能成为问题。不过在此示例中，我们只是简单地放行。接下来是实际执行工作的有趣部分：\n\n```\nDispatchQueue.global(qos:\
  \ .default).async {\n    print(\"启动后台任务，剩余\" +\n          \"\\(app.backgroundTimeRemaining)\
  \ 秒\")\n    self.smiley = nil;\n    self.smileyView.image = nil;\n    // 模拟一个耗时过程（25\
  \ 秒）\n    Thread.sleep(forTimeInterval: 25)\n    print(\"结束后台任务，剩余\" +\n       \
  \   \"\\(app.backgroundTimeRemaining) 秒\")\n    app.endBackgroundTask(taskId)\n\
  });\n```\n\n这段代码只是将原本方法中执行的工作放入后台队列中。但请注意，使用 `UserDefaults` 保存状态的代码并未移入此闭包中。这是因为无论\
  \ iOS 是否在应用进入后台时授予额外运行时间，保存该状态都非常重要。在闭包末尾，我们调用 `endBackgroundTask()` 来告知系统工作已完成。\n\
  \n完成这些设置后，构建并运行应用，然后按下 Home 键将应用置于后台。观察 Xcode 控制台，25 秒后，你将在输出中看到最终日志。此时应用的完整运行应产生如下控制台输出：\n\
  \n```\napplication(_:didFinishLaunchingWithOptions:)\napplicationDidBecomeActive\n\
  VC: applicationDidBecomeActive()\napplicationWillResignActive\nVC: applicationWillResignActive()\n\
  applicationDidEnterBackground\nVC: applicationDidEnterBackground()\n启动后台任务，剩余 179.808078499991\
  \ 秒\n结束后台任务，剩余 154.796897583336 秒\n```\n\n如你所见，系统在后台执行任务时给予的时间比在主线程中慷慨得多——在此示例中，它会给你几分钟时间来完成后台需要做的事情。如果你有任何正在进行的任务要处理，遵循此流程确实能帮上大忙。\n\
  \n请注意，我们仅使用了一个后台任务，但实际上你可以根据需要启用任意多个。例如，如果在后台时间有多个网络传输正在进行且需要完成，你可以为每个传输创建一个后台任务，并让它们在后台队列中继续运行。因此，你可以在可用时间内轻松让多个操作并行执行。\n\
  \n## 总结\n\n本章内容相当丰富，向你抛出了许多新概念。你发现了一个处理并发问题的新概念范式，无需再担心线程问题。还演示了如何确保你的应用在 iOS 多任务环境中良好运行。既然我们已经解决了一些棘手问题，接下来请进入下一章，重点讲解绘图相关内容。\n\
  \n\n\n"
- "# 16. 图形与绘图\n\n到目前为止，我们构建的所有应用界面都使用了 UIKit 框架中的视图和控件。利用 UIKit 可以完成许多工作，大量应用程序仅使用其预定义对象即可构建。然而，某些视觉元素（参见图\
  \ 16-1）需要超越 UIKit 标准组件提供的功能才能完整实现。\n\n![A329781_3_En_16_Fig1_HTML.jpg](img/A329781_3_En_16_Fig1_HTML.jpg)\n\
  \n**图 16-1.** 图形密集型应用可能需要比 UIKit 提供的更强大的绘图控制\n\n例如，有时应用需要具备自定义绘图能力。iOS 包含了 Core\
  \ Graphics 框架，使我们能够执行各种绘图任务。在本章中，我们将探索这个强大图形环境的一小部分。我们还将构建示例应用来演示 Core Graphics\
  \ 的关键特性，并解释其主要概念。\n\n## Quartz 2D\n\nCore Graphics 包含一套名为 Quartz 2D 的主要 API，它是一系列函数、数据类型和对象的集合，旨在让你直接在视图或内存中的图像上进行绘制。Quartz\
  \ 2D 将正在绘制的视图或图像作为虚拟画布。它遵循所谓的“画家模型”，这意味着绘图命令的施加方式与在画布上涂抹颜料非常相似。\n\n如果一位画家将整张画布涂成红色，然后将画布的下半部分涂成蓝色，那么画布将呈现为：如果蓝色颜料不透明，则上半红下半蓝；如果蓝色颜料半透明，则上半红下半紫。Quartz\
  \ 2D 的虚拟画布工作原理与此相同。如果你将整个视图绘成红色，然后将视图下半部分绘成蓝色，最终视图将呈现为上半红，下半要么是蓝色要么是紫色，具体取决于第二个绘图动作是完全不透明还是部分透明。每个绘图动作都会在之前所有绘图动作之上应用于画布。\n\
  \nQuartz 2D 提供多种线条、形状和图像绘制函数。虽然易于使用，但 Quartz 2D 仅限于二维绘图。我们将从 Quartz 2D 的基本工作原理开始，然后使用它构建一个简单的绘图应用。\n\
  \n## Quartz 2D 的绘图方法\n\n使用 Quartz 2D（简称 Quartz）时，我们通常会将 Swift 图形代码添加到执行绘图的视图中。例如，我们可以创建一个\
  \ `UIView` 的子类，并将 Quartz 函数调用添加到该类的 `draw(_ rect:)` 方法中。`draw(_ rect:)` 方法是 `UIView`\
  \ 类定义的一部分，每当视图需要重绘时，该方法都会被调用。如果你将 Quartz 代码插入 `draw(_ rect:)` 中，这些代码就会被执行，然后视图会进行重绘。\n\
  \n### Quartz 2D 的图形上下文\n\n在 Quartz 以及整个 Core Graphics 中，绘图发生在图形上下文中，通常简称为上下文。每个视图都包含一个关联的上下文。你可以获取当前上下文，使用该上下文进行各种\
  \ Quartz 绘图调用，然后让上下文将绘图渲染到视图上。你可以将这个上下文想象成一种画布。系统会为你提供一个默认上下文，其内容将显示在屏幕上。然而，你也可以创建自己的上下文，用于绘制那些不需要立即显示，而是保存起来供以后使用或用于其他目的的内容。我们将重点介绍使用默认上下文，我们可以通过在\
  \ `draw(_ rect:)` 中编写 `let context = UIGraphicsGetCurrentContext()` 来获取它。\n\n图形上下文的类型是\
  \ `CGContext`。这是 C 语言指针类型 `CGContextRef`（Core Graphics 中上下文的原生表示）的 Swift 映射。在前述代码中，上下文变量的实际推断类型是\
  \ `CGContext!`。它是可选类型，因为 C 语言调用理论上可能返回 `NULL`（虽然如果你只在保证存在当前上下文的地方使用 `UIGraphicsGetCurrentContext()`，它不会返回\
  \ `NULL`），并且它是隐式解包的，这样你就不必对上下文的每次引用都进行解包。\n\n注意\n\nCore Graphics 是一个 C 语言 API。你在本章中看到的所有以\
  \ `CG` 开头的函数都是 C 函数，而不是 Swift 函数。\n\n一旦你获得了图形上下文，就可以通过将该上下文传递给各种 Core Graphics 绘图函数来在其中进行绘制。例如，代码清单\
  \ 16-1 中的序列创建了一个描述简单线条的路径，然后绘制了该路径。\n\n```\ncontext?.setLineWidth(4.0)\ncontext?.setStrokeColor(UIColor.red.cgColor)\n\
  context?.moveTo(x: 10.0, y: 10.0)\ncontext?.addLineTo(x: 20.0, y: 20.0)\ncontext?.strokePath()\n\
  代码清单 16-1.\n在图形上下文中进行绘制\n```\n\n第一次调用指定，后续任何创建当前路径的绘图命令都应使用宽度为 4 点的画笔来执行。可以把这个理解为选择你即将用来绘画的画笔尺寸。在你使用不同数值再次调用此函数之前，在此上下文中绘制的所有线条宽度都将为\
  \ 4 点。接着，你指定描边颜色应为红色。在 Core Graphics 中，有两种颜色与绘图动作相关联：\n\n*   **描边颜色**用于绘制线条和形状的轮廓。\n\
  *   **填充颜色**用于填充形状。\n\n上下文关联了一支用于绘制线条的“隐形笔”。当执行绘图命令时，这支笔的移动会形成一条路径。当你调用 `.moveTo(x:\
  \ , y:)` 时，你会抬起这支虚拟笔，移动到指定位置，而实际上不绘制任何东西。接下来的任何操作，都将相对于你上次移动笔到的位置来执行。例如，在前面的例子中，我们首先将笔移动到\
  \ (10, 10)。下一个函数调用从当前笔的位置 (10, 10) 添加了一条线到指定位置 (20, 20)，而 (20, 20) 成为了笔的新位置。\n\n\
  在 Core Graphics 中绘图时，你并非在绘制实际可以看到的东西——至少不是立即可见。你是在创建一条路径，它可以是一个形状、一条线段或其他一些对象；然而，它本身不包含颜色或其他特征使其可见。这就像用隐形墨水写字。在你采取行动使其可见之前，你的路径是看不见的。因此，下一步是调用\
  \ `.strokePath()` 函数，它告诉 Quartz 绘制你已经构建好的路径。这个函数会使用我们之前设置的线宽和描边颜色，实际为路径着色（或“描绘”）并使其可见。\n\
  \n\n\n### 坐标系\n\n在代码清单 16-1 中，我们向`context!.moveTo(x:, y:)`和`context!.addLineTo(x:,\
  \ y:)`传递了一对浮点数作为参数。这些数字代表了 Core Graphics 坐标系中的位置。该坐标系中的位置通过其`x`和`y`坐标来表示，我们通常记作\
  \ (`x`, `y`)。上下文的左上角是 (0, 0)。向下移动时，`y`值增大。向右移动时，`x`值增大。这段代码的作用是从 (10, 10) 到 (20,\
  \ 20) 绘制一条对角线，效果将如图 16-2 所示。\n\n![A329781_3_En_16_Fig2_HTML.jpg](img/A329781_3_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2. 使用 Quartz 2D 坐标系绘制一条线\n\nQuartz 坐标系在 iOS 上可能有点令人困惑，因为它的垂直分量与许多图形库以及传统的笛卡尔坐标系是相反的。在其他系统中，例如\
  \ OpenGL 或 macOS 版本的 Quartz，(0, 0) 位于左下角；随着`y`坐标增加，你会向上下文或视图的顶部移动，如图 16-3 所示。\n\n\
  ![A329781_3_En_16_Fig3_HTML.jpg](img/A329781_3_En_16_Fig3_HTML.jpg)\n\n图 16-3. 在许多图形库中，包括\
  \ OpenGL，从 (10, 10) 到 (20, 20) 绘制会生成如下所示的线条，而非图 16-2 中的线条\n\n为了指定坐标系中的一个点，一些 Quartz\
  \ 函数需要两个浮点数作为参数。其他一些 Quartz 函数则要求将点嵌入到一个`CGPoint`中，这是一个包含两个浮点值`x`和`y`的结构体。为了描述视图或其他对象的大小，Quartz\
  \ 使用`CGSize`，这是一个同样包含两个浮点值的结构体：宽度和高度。Quartz 还声明了一种名为`CGRect`的数据类型，用于在坐标系中定义一个矩形。一个`CGRect`包含两个元素：一个名为`origin`的`CGPoint`，其`x`和`y`值用于标识矩形的左上角；以及一个名为`size`的`CGSize`，用于标识矩形的宽度和高度，如代码清单\
  \ 16-2 所示。\n\n```\nvar startingPoint = CGPoint(x: 1.0, y: 1.0)\nvar sizeOfrect =\
  \ CGSize(width: 10.0, height: 10.0)\nvar rectangle = CGRect(origin: startingPoint,\
  \ size: sizeOfrect)\n代码清单 16-2. 创建矩形\n```\n\n### 指定颜色\n\n绘图中一个重要的部分是颜色，因此理解颜色在 iOS\
  \ 中的运作方式至关重要。UIKit 提供了一个表示颜色的类：`UIColor`。你不能直接在 Core Graphics 调用中使用`UIColor`对象。然而，`UIColor`只是\
  \ Core Graphics 中一个名为`cgColor`的结构体的封装（这正是 Core Graphics 函数所需要的）。你可以通过使用`UIColor`实例的`cgColor`属性来获取`cgColor`引用，正如我们之前展示的那样：`context!.setStrokeColor(UIColor.red.cgColor)`。\n\
  \n我们通过一个名为`red`的类型方法获取了一个预定义`UIColor`实例的引用，然后获取了它的`cgColor`属性并将其传递给函数。如果你查阅`UIColor`类的文档，你会发现有几个便捷方法，比如`redColor()`，可以用来获取一些常用颜色的`UIColor`对象。\n\
  \n#### 关于 iOS 设备显示屏的一点色彩理论\n\n在现代计算机图形学中，屏幕上显示的任何颜色都基于一种称为**色彩模型**的东西以某种方式存储其数据。色彩模型（有时也称为**色彩空间**）只是一种将现实世界中的颜色表示为计算机可以使用的数字值的方法。一种常见的表示颜色的方法是使用四个分量：红色、绿色、蓝色和\
  \ Alpha。在 Quartz 中，这些值中的每一个都用`CGFloat`表示。这些值应始终介于 0.0 和 1.0 之间。\n\n> **注意：** 在 32\
  \ 位系统上，`CGFloat`是一个 32 位浮点数，因此直接映射到 Swift 的`Float`类型。然而，在 64 位系统上，它是一个 64 位值，对应于\
  \ Swift 的`Double`类型。在 Swift 代码中操作`CGFloat`值时要小心。\n\n红色、绿色和蓝色分量相对容易理解，因为它们代表了加色三原色，即\
  \ RGB 色彩模型，如图 16-4 所示。如果将这三种颜色的光以相等的比例混合，结果在人眼看来是白色或不同深浅的灰色，具体取决于混合光的强度。以不同比例组合这三种加色原色，可以得到各种不同的颜色，这被称为**色域**。\n\
  \n![A329781_3_En_16_Fig4_HTML.jpg](img/A329781_3_En_16_Fig4_HTML.jpg)\n\n图 16-4.\
  \ 构成 RGB 色彩模型的加色三原色的简单表示\n\n你可能学过三原色是红、黄、蓝，这被称为历史减色三原色，即 RYB 色彩模型。它在现代色彩理论中应用极少，几乎从未在计算机图形学中使用。RYB\
  \ 色彩模型的色域比 RGB 色彩模型有限得多，并且也不容易进行数学定义。就我们的目的而言，三原色是红、绿、蓝，而不是红、黄、蓝。\n\n除了红、绿、蓝之外，Quartz\
  \ 还使用了另一个颜色分量，称为 Alpha，它表示一种颜色的透明度。当一种颜色绘制在另一种颜色之上时，会使用 Alpha 来确定最终绘制的颜色。当 Alpha\
  \ 为 1.0 时，绘制的颜色是 100% 不透明的，会遮盖其下方的所有颜色。当 Alpha 值小于 1.0 时，下方的颜色会透出来并与上方的颜色混合。如果 Alpha\
  \ 为 0.0，则该颜色将完全不可见，其后面的任何内容都将完全显现出来。当使用 Alpha 分量时，色彩模型有时被称为 RGBA 色彩模型，尽管从技术上讲，Alpha\
  \ 并非颜色的真正组成部分；它只是定义了颜色在绘制时如何与其他颜色相互作用。\n\n#### 其他色彩模型\n\n尽管 RGB 模型是计算机图形学中最常用的，但它并非唯一的色彩模型。还有其他几种模型在使用，包括：\n\
  \n*   色调、饱和度、明度 (HSV)\n*   色调、饱和度、亮度 (HSL)\n*   青色、品红、黄色、黑色 (CMYK)，用于四色胶印\n*   灰度\n\
  \n其中一些模型还有不同版本，包括 RGB 色彩空间的几种变体。幸运的是，对于大多数操作，我们不需要担心所使用的颜色模型。我们只需在`UIColor`对象上调用`cgColor`，在大多数情况下，Core\
  \ Graphics 会处理任何必要的转换。\n\n### 在上下文中绘制图像\n\nQuartz 允许你直接将图像绘制到上下文中。这是另一个 UIKit 类\
  \ (`UIImage`) 的例子，你可以使用它作为处理 Core Graphics 数据结构 (`cgImage`) 的替代方案。`UIImage`类包含了将其图像绘制到当前上下文中的方法。你需要使用以下任一技术来标识图像在上下文中的显示位置：\n\
  \n*   通过指定一个`CGPoint`来标识图像的左上角\n*   通过指定一个`CGRect`来限定图像的框架，必要时会调整图像大小以适应框架\n\n你可以像代码清单\
  \ 16-3 所示，将`UIImage`绘制到当前上下文中。\n\n```\nvar image:UIImage  = UIImage() // 假设此对象存在并指向一个\
  \ UIImage 实例\nlet drawPoint = CGPoint(x: 100.0, y: 100.0)\nimage.draw(at: drawPoint)\n\
  代码清单 16-3. 将 UIImage 绘制到当前上下文\n```\n\n\n\n### 绘制形状：多边形、线条和曲线\n\nQuartz 提供了许多函数，让创建复杂形状变得更加容易。要绘制矩形或多边形，您无需计算角度、绘制线条或进行任何数学运算。只需调用一个\
  \ Quartz 函数即可为您完成工作。例如，要绘制椭圆，您只需定义椭圆需要适配的矩形，然后让 Core Graphics 来完成绘制，如代码清单 16-4 所示。\n\
  \n```\nlet startingPoint = CGPoint(x: 1.0, y: 1.0)\nlet sizeOfrect = CGSize(width:\
  \ 10.0, height: 10.0)\nlet theRect = CGRect(origin: startingPoint, size:sizeOfrect)\n\
  context!.addEllipse(inRect: theRect)\ncontext!.addRect(theRect)\n```\n\n**代码清单 16-4.**\
  \ 在当前图形上下文中绘制矩形\n\n矩形的绘制也使用类似的方法。Quartz 还提供了让您能够创建更复杂形状的方法，例如弧线和贝塞尔路径。\n\n**注意：**\
  \ 本章示例中不会涉及复杂形状。要了解更多关于 Quartz 中弧线和贝塞尔路径的信息，请查看 iOS 开发者中心 `http://developer.apple.com/documentation/GraphicsImaging/Conceptual/drawingwithquartz2d/`\
  \ 中的《Quartz 2D 编程指南》，或 Xcode 的在线文档。\n\n### Quartz 2D 工具集锦：图案、渐变和虚线模式\n\nQuartz 提供了相当令人印象深刻的一系列工具。例如，Quartz\
  \ 不仅支持用纯色填充多边形，还支持用渐变填充。此外，除了绘制实线外，它还可以使用各种虚线模式。请查看图 16-5 中的屏幕截图（来自 Apple 的 QuartzDemo\
  \ 示例代码），了解 Quartz 能为您做些什么。\n\n![A329781_3_En_16_Fig5_HTML.jpg](img/A329781_3_En_16_Fig5_HTML.jpg)\n\
  \n**图 16-5.** 来自 Apple 提供的 QuartzDemo 示例项目，展示了 Quartz 2D 的一些功能示例\n\n现在您已经基本了解了 Quartz\
  \ 的工作原理及其功能，让我们来尝试一下。\n\n## QuartzFun 应用程序\n\n在我们的下一个应用中，我们将构建一个简单的绘图程序（见图 16-6），使用\
  \ Quartz 来让您感受我们之前讨论的概念是如何结合在一起的。\n\n![A329781_3_En_16_Fig6_HTML.jpg](img/A329781_3_En_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 运行中的 QuartzFun 应用程序\n\n### 创建 QuartzFun 应用程序\n\n在 Xcode 中，使用“单视图应用程序”模板创建一个新项目，并将其命名为\
  \ `QuartzFun`。该模板已经为我们提供了一个应用程序委托和一个视图控制器。我们将在自定义视图中执行自定义绘制，因此还需要创建一个 `UIView` 的子类，并通过重写\
  \ `draw(_ rect:)` 方法在其中进行绘制。选中 `QuartzFun` 文件夹（当前包含应用委托和视图控制器文件的文件夹），按 ⌘N 调出新建文件助手，然后从\
  \ iOS 源部分选择“Cocoa Touch Class”。将新类命名为 `QuartzFunView`，并使其成为 `UIView` 的子类。\n\n我们将添加两个枚举——一个用于表示可以绘制的形状类型，另一个用于表示可用的颜色。此外，由于其中一种颜色选项是“随机”，我们还需要一个每次调用时都能返回随机颜色的方法。让我们从创建该方法和两个枚举开始。\n\
  \n#### 创建随机颜色\n\n我们可以定义一个返回随机颜色的全局函数，但更好的做法是将此函数作为 `UIColor` 类的扩展添加进来。打开 `QuartzFunView.swift`\
  \ 文件，并在顶部附近添加以下代码：\n\n```\n// Random color extension of UIColor\nextension UIColor\
  \ {\nclass func randomColor() -> UIColor {\nlet red = CGFloat(Double(arc4random_uniform(255))/255)\n\
  let green = CGFloat(Double(arc4random_uniform(255))/255)\nlet blue = CGFloat(Double(arc4random_uniform(255))/255)\n\
  return UIColor(red: red, green: green, blue: blue, alpha:1.0)\n}\n}\n```\n\n这段代码相当直接。对于每个颜色分量，我们使用\
  \ `arc4random_uniform()` 函数生成一个范围在 0 到 255 之间的随机浮点数。颜色的每个分量都需要在 0.0 到 1.0 之间，因此我们简单地将结果除以\
  \ 255。为什么是 255？iOS 上的 Quartz 2D 为每个颜色分量支持 256 种不同的强度，所以使用数字 255 可以确保我们有机会随机选择其中任何一种。最后，我们使用这三个随机分量来创建一种新颜色。我们将\
  \ alpha 值设置为 1.0，以确保所有生成的颜色都是不透明的。\n\n#### 定义形状和颜色枚举\n\n可能的形状和绘图颜色由枚举表示。将以下定义添加到\
  \ `QuartzFunView.swift` 文件中：\n\n```\nenum Shape : Int {\ncase line = 0, rect, ellipse,\
  \ image\n}\n// The color tab indices\nenum DrawingColor : Int {\ncase red = 0, blue,\
  \ yellow, green, random\n}\n```\n\n这两个枚举都派生自 `UInt`，因为稍后您将看到，我们需要使用原始枚举值来建立形状或颜色与分段控件中选中分段之间的映射关系。\n\
  \n\n\n### 实现 `QuartzFunView` 骨架\n\n由于我们将在 `UIView` 的子类中进行绘图操作，因此先为该类配置好所有必需的元素，但先不包含具体的绘图代码（这部分后续会添加）。首先，在\
  \ `QuartzFunView` 类中添加以下六个属性：\n\n```\n// 应用可设置的属性\nvar shape = Shape.line\nvar currentColor\
  \ = UIColor.red\nvar useRandomColor = false\n// 内部属性\nprivate let image = UIImage(named:\"\
  iphone\")\nprivate var firstTouchLocation = CGPoint.zero\nprivate var lastTouchLocation\
  \ = CGPoint.zero\n```\n\n`shape` 属性用于跟踪用户想要绘制的形状，`currentColor` 属性是用户选择的绘图颜色，而 `useRandomColor`\
  \ 属性在用户选择随机颜色绘图时将被设置为 `true`。这些属性都旨在供类外部使用（实际上，它们将由视图控制器使用）。\n\n接下来的三个属性仅由类的内部实现所需，因此被标记为\
  \ `private`。前两个属性将跟踪用户手指在屏幕上拖动时的位置。我们会将用户首次触摸屏幕时的位置存储在 `firstTouchLocation` 中，并将手指拖动期间以及拖动结束时的位置存储在\
  \ `lastTouchLocation` 中。我们的绘图代码将使用这两个变量来确定在何处绘制所需形状。`image` 属性保存了当用户选择底部工具栏最右侧的工具栏项时要在屏幕上绘制的图像，如图\
  \ 16-7 所示。\n\n![A329781_3_En_16_Fig7_HTML.jpg](img/A329781_3_En_16_Fig7_HTML.jpg)\n\
  \n图 16-7. 使用 QuartzFun 绘制 UIImage\n\n接下来进入具体的实现部分。首先添加几个方法，以响应用户的触摸操作。在属性声明之后，插入清单\
  \ 16-5 中的三个方法。\n\n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?)\
  \ {\nif let touch = touches.first {\nif useRandomColor {\ncurrentColor = UIColor.randomColor()\n\
  }\nfirstTouchLocation = touch.location(in: self)\nlastTouchLocation = firstTouchLocation\n\
  setNeedsDisplay()\n}\n}\noverride func touchesMoved(_ touches: Set, with event:\
  \ UIEvent?) {\nif let touch = touches.first {\nlastTouchLocation = touch.location(in:\
  \ self)\nsetNeedsDisplay()\n}\n}\noverride func touchesEnded(_ touches: Set, with\
  \ event: UIEvent?) {\nif let touch = touches.first {\nlastTouchLocation = touch.location(in:\
  \ self)\nsetNeedsDisplay()\n}\n}\n```\n\n清单 16-5. `QuartFunView.swift` 文件中的触摸方法\n\
  \n这三个方法继承自 `UIView`，而 `UIView` 又继承自其父类 `UIResponder`。通过重写它们，我们可以获知用户触摸屏幕的位置。它们的工作方式如下：\n\
  \n- `touchesBegan(_:withEvent:)` 在用户手指首次触摸屏幕时被调用。在该方法中，如果用户选择了随机颜色，我们会使用之前添加到 `UIColor`\
  \ 中的新 `randomColor` 方法来更改颜色。随后，我们存储当前触摸位置，以便知道用户首次触摸屏幕的位置，并通过在 `self` 上调用 `setNeedsDisplay()`\
  \ 来表明视图需要重绘。\n- `touchesMoved(_:withEvent:)` 在用户手指在屏幕上拖动期间被持续调用。这里我们只做一件事：将新位置存储到\
  \ `lastTouchLocation` 中，并告知屏幕需要重绘。\n- `touchesEnded(_:withEvent:)` 在用户手指离开屏幕时被调用。与\
  \ `touchesMoved(_:withEvent:)` 方法类似，我们只将最终位置存储到 `lastTouchLocation` 变量中，并表明视图需要重绘。\n\
  \n如果此处其余代码你尚未完全理解，不必担心。我们将在第 18 章详细讨论处理触摸操作的具体细节，以及 `touchesBegan(_:withEvent:)`、`touchesMoved(_:withEvent:)`\
  \ 和 `touchesEnded(_:withEvent:)` 方法的特定用途。\n\n等应用骨架搭建完成并运行后，我们会再回到这个类。目前被注释掉的 `draw(_\
  \ rect:)` 方法，正是我们将要完成应用实际绘图工作的地方，不过这部分代码我们还没编写。在添加绘图代码之前，让我们先完成应用的设置。\n\n\n\n####\
  \ 创建并连接输出口与操作\n\n在开始绘图之前，我们需要将分段控件添加到图形用户界面中，然后连接操作与输出口。单击 `Main.storyboard` 进行设置。首要任务是更改视图的类。在文档大纲中，展开场景及其包含的视图控制器项目，然后单击“View”项。按下\
  \ `⇧⌘3` 调出身份检查器，并将类从 `UIView` 更改为 `QuartzFunView`。\n\n现在，使用对象库查找一个分段控件，并将其拖到视图顶部、状态栏下方。将其放置在靠近中心的位置。不必过于精确，因为我们稍后会添加一个布局约束来使其居中。\n\
  \n选中分段控件后，调出属性检查器，将分段数从 2 更改为 5。依次双击每个分段，按从左到右的顺序将其标签改为“红色”、“蓝色”、“黄色”、“绿色”和“随机”。接下来应用布局约束。在文档大纲中，按住\
  \ Control 键从分段控件项拖到“Quartz Fun View”项，松开鼠标，按住 Shift 键，选择“垂直间距到顶部布局指南”和“容器中水平居中”，然后按\
  \ Return 键。在文档大纲中，选择视图控制器图标，然后返回故事板编辑器，点击“解析自动布局问题”按钮（位于“固定”按钮右侧），并选择“更新帧”。如果此选项未启用，请确保已在文档大纲中选中了视图控制器。现在分段控件应该已正确调整大小并定位，如图\
  \ 16-8 所示。\n\n![A329781_3_En_16_Fig8_HTML.jpg](img/A329781_3_En_16_Fig8_HTML.jpg)\n\
  \n图 16-8. 已正确标注并定位的颜色分段控件\n\n如果助理编辑器尚未打开，请将其打开，并从跳转栏中选择 `ViewController.swift`。现在，按住\
  \ Control 键从文档大纲中的分段控件拖到右侧的 `ViewController.swift` 文件中，位于类声明下方的那一行，松开鼠标创建一个新的输出口。将新输出口命名为\
  \ `colorControl`，其余选项保留默认值。您的类现在应如下所示：\n\n```\nclass ViewController: UIViewController\
  \ {\n@IBOutlet weak var colorControl: UISegmentedControl!\n```\n\n接下来，添加一个操作。在助理编辑器中打开\
  \ `ViewController.swift`，再次选择 `Main.storyboard`，然后按住 Control 键从分段控件拖到视图控制器文件中类定义的底部，直接位于右花括号上方。在弹出的窗口中，将连接类型更改为“Action”，名称设为\
  \ `changeColor`。该弹出窗口应默认使用“Value Changed”事件，这正是我们需要的。同时，将类型设置为 `UISegmentedControl`。\n\
  \n现在添加第二个分段控件，它将用于选择绘制的形状。从对象库中拖出一个分段控件，放到视图底部附近。在文档大纲中选中该分段控件，调出属性检查器，将分段数从 2 更改为\
  \ 4。然后依次双击每个分段，将四个分段的标题按顺序改为“线条”、“矩形”、“椭圆”和“图片”。接下来，我们需要添加布局约束来固定控件的大小和位置，就像我们对颜色选择控件所做的那样。以下是所需步骤：\n\
  \n1.  在文档大纲中，按住 Control 键从新分段控件项拖到“Quartz Fun View”项，松开鼠标。按住 Shift 键，选择“垂直间距到底部布局指南”和“容器中水平居中”，然后按\
  \ Return 键。\n2.  在文档大纲中，选择视图控制器图标，然后返回编辑器，点击“解析自动布局问题”按钮，并选择“更新帧”。\n\n完成后，再次在助理编辑器中打开\
  \ `ViewController.swift`，然后按住 Control 键从新分段控件拖到 `ViewController.swift` 的底部，创建另一个操作。将连接类型更改为“Action”，命名操作为\
  \ `changeShape`，类型更改为 `UISegmentedControl`，然后点击“Connect”。故事板现在应如图 16-9 所示。下一步，我们将实现操作方法。\n\
  \n![A329781_3_En_16_Fig9_HTML.jpg](img/A329781_3_En_16_Fig9_HTML.jpg)\n\n图 16-9.\
  \ 两个分段控件均已就位的故事板\n\n#### 实现操作方法\n\n保存故事板，然后可以关闭助理编辑器。现在选择 `ViewController.swift`，找到\
  \ Xcode 为您创建的 `changeColor()` 方法的存根实现，并添加列表 16-6 中的代码。\n\n```\n@IBAction func changeColor(_\
  \ sender: UISegmentedControl) {\nlet drawingColorSelection =\nDrawingColor(rawValue:\
  \ UInt(sender.selectedSegmentIndex))\nif let drawingColor = drawingColorSelection\
  \ {\nlet funView = view as! QuartzFunView\nswitch drawingColor {\ncase .red:\nfunView.currentColor\
  \ = UIColor.red\nfunView.useRandomColor = false\ncase .blue:\nfunView.currentColor\
  \ = UIColor.blue\nfunView.useRandomColor = false\ncase .yellow:\nfunView.currentColor\
  \ = UIColor.yellow\nfunView.useRandomColor = false\ncase .green:\nfunView.currentColor\
  \ = UIColor.green\nfunView.useRandomColor = false\ncase .random:\nfunView.useRandomColor\
  \ = true\n}\n}\n}\n列表 16-6. changeColor 方法位于 ViewController.swift 文件中\n\n```\n\n\
  这段代码相当直接。我们只需查看选择了哪个分段，并根据该选择创建一种新颜色作为当前绘图颜色。为了将分段控件的选中索引映射到对应颜色的枚举值，我们使用了接受原始值的枚举构造器：\n\
  \n```\nlet drawingColorSelection =\nDrawingColor(rawValue: UInt(sender.selectedSegmentIndex))\n\
  ```\n\n之后，我们设置 `currentColor` 属性，以便类知道绘图时应使用哪种颜色——除非选择了随机颜色。在这种情况下，我们将 `useRandomColor`\
  \ 属性设置为 `true`，这样用户每次开始新的绘图操作时都会选择一种新颜色（您可以在 `touchesBegan(_:withEvent:)` 方法中找到此代码，该方法我们在几页前已添加）。由于所有绘图代码都将位于视图本身中，因此该方法中无需执行其他操作。\n\
  \n接下来，找到现有的 `changeShape()` 方法实现，并添加以下代码：\n\n```\n@IBAction func changeShape(_ sender:\
  \ UISegmentedControl) {\nlet shapeSelection = Shape(rawValue: UInt(sender.selectedSegmentIndex))\n\
  if let shape = shapeSelection {\nlet funView = view as! QuartzFunView\nfunView.shape\
  \ = shape\ncolorControl.isHidden = shape == Shape.image\n}\n}\n```\n\n在该方法中，我们仅根据控件的选中分段设置形状类型。`Shape`\
  \ 枚举的四个元素对应于应用程序视图底部的四个工具栏分段。我们将形状设为与当前选中的分段相同，并根据是否选中“图片”分段来隐藏或显示颜色选择控件。\n\n通过编译并运行应用程序，确保一切正常。目前您还无法在屏幕上绘制形状，但分段控件应该能正常工作；当您点击底部控件中的“图片”分段时，颜色控件应会消失。\n\
  \n现在一切就绪，让我们开始绘图。\n\n### 添加 Quartz 2D 绘图代码\n\n我们已准备好添加执行绘图的代码。我们将绘制线条、一些形状和一张图片。我们将逐步进行，每次添加少量代码，然后运行应用程序查看代码效果。\n\
  \n\n\n#### 绘制线条\n\n首先执行最简单的绘制操作：绘制一条单独的线。选择 `QuartzFunView.swift`，并用列表 16-7 中所示的方法替换被注释掉的\
  \ `draw(_ rect: CGRect)` 方法。\n\n```\noverride func draw(_ rect: CGRect) {\nlet context\
  \ = UIGraphicsGetCurrentContext()\ncontext!.setLineWidth(2.0)\ncontext!.setStrokeColor(currentColor.cgColor)\n\
  switch shape {\ncase .line:\ncontext?.moveTo(x: firstTouchLocation.x,\ny: firstTouchLocation.y)\n\
  context?.addLineTo(x: lastTouchLocation.x,\ny: lastTouchLocation.y)\ncontext?.strokePath()\n\
  case .rect:\nbreak\ncase .ellipse:\nbreak\ncase .image:\nbreak\n}\n}\n```\n\n首先，我们获取当前图形上下文的引用，这将允许我们在\
  \ `QuartzFunView` 上进行绘制：\n\n```\nlet context = UIGraphicsGetCurrentContext()\n```\n\
  \n接下来，我们将线宽设置为 2.0，这意味着我们描边的任何线条宽度都是 2 点：\n\n```\ncontext!.setLineWidth(2.0)\n```\n\
  \n之后，我们设置描边线条的颜色。由于 `UIColor` 具有此函数所需的 `CGColor` 属性，因此我们使用 `currentColor` 属性的该属性来将正确的颜色传递给此函数。\n\
  \n```\ncontext!.setStrokeColor(currentColor.cgColor)\n```\n\n我们使用 `switch` 语句跳转到每种形状类型对应的合适代码中。如前所述，我们将从处理绘制线条的代码开始，使其正常工作，然后在逐步完成此示例的过程中，依次为每种形状添加代码：\n\
  \n```\nswitch shape {\ncase .line:\n```\n\n为了绘制一条线，我们告诉图形上下文从用户首次触摸的位置开始创建一个路径。请记住，我们在\
  \ `touchesBegan(_:withEvent:)` 方法中存储了该值，因此它始终反映最近一次触摸或拖动的起始点：\n\n```\ncontext?.moveTo(x:\
  \ firstTouchLocation.x,\ny: firstTouchLocation.y)\n```\n\n接下来，我们从该位置向用户最后一次触摸的位置绘制一条线。如果用户的手指仍与屏幕接触，`lastTouchLocation`\
  \ 包含手指的当前位置。如果用户不再触摸屏幕，`lastTouchLocation` 包含用户手指离开屏幕时的位置：\n\n```\ncontext?.addLineTo(x:\
  \ lastTouchLocation.x,\ny: lastTouchLocation.y)\n```\n\n此函数实际上并不绘制线条——它只是将该线条添加到上下文的当前路径中。为了使线条显示在屏幕上，我们需要对路径进行描边。此函数将使用我们先前设置的颜色和宽度对我们刚刚绘制的线条进行描边：\n\
  \n```\ncontext?.strokePath()\n```\n\n目前就是这样。至此，你应该能够再次编译并运行该应用。矩形、椭圆和图像形状选项无法工作，但你应该能够使用任意颜色选项正常绘制线条（参见图\
  \ 16-10）。\n\n![A329781_3_En_16_Fig10_HTML.jpg](img/A329781_3_En_16_Fig10_HTML.jpg)\n\
  \n我们应用中的线条绘制部分现已完成。此处，我们使用随机颜色进行绘制。\n\n#### 绘制矩形和椭圆\n\n让我们同时编写绘制矩形和椭圆的代码，因为 Quartz\
  \ 基本上以相同的方式实现这两个对象。按列表 16-8 所示修改现有的 `draw(_ rect:)` 方法。\n\n```\noverride func draw(_\
  \ rect: CGRect) {\nlet context = UIGraphicsGetCurrentContext()\ncontext?.setLineWidth(2.0)\n\
  context?.setStrokeColor(currentColor.cgColor)\ncontext?.setFillColor(currentColor.cgColor)\n\
  let currentRect = CGRect(x: firstTouchLocation.x,\ny: firstTouchLocation.y,\nwidth:\
  \ lastTouchLocation.x - firstTouchLocation.x,\nheight: lastTouchLocation.y - firstTouchLocation.y)\n\
  switch shape {\ncase .line:\ncontext?.moveTo(x: firstTouchLocation.x,\ny: firstTouchLocation.y)\n\
  context?.addLineTo(x: lastTouchLocation.x,\ny: lastTouchLocation.y)\ncontext?.strokePath()\n\
  case .rect:\ncontext?.addRect(currentRect)\ncontext?.drawPath(using: .fillStroke)\n\
  case .ellipse:\ncontext?.addEllipse(inRect: currentRect)\ncontext?.drawPath(using:\
  \ .fillStroke)\ncase .image:\nbreak\n}\n}\n```\n\n因为我们希望同时绘制椭圆和矩形的轮廓并填充其内部，所以我们添加了一个调用，以使用\
  \ `currentColor` 设置填充颜色：\n\n```\ncontext?.setFillColor(currentColor.cgColor)\n```\n\
  \n接下来，我们声明一个 `CGRect` 变量。我们在此处这样做是因为矩形和椭圆都是基于一个矩形绘制的。我们将使用 `currentRect` 来保存由用户拖拽所描述的矩形。请记住，一个\
  \ `CGRect` 有两个成员：`size` 和 `origin`。一个名为 `CGRect(x: y: width: height:)` 的函数允许我们通过指定构建矩形所需的值来创建一个\
  \ `CGRect`。创建矩形的代码相当直接。我们使用存储在 `firstTouchLocation` 中的点来创建原点。接着，我们通过计算两个 `x` 值之间和两个\
  \ `y` 值之间的差值来得出尺寸。请注意，根据拖拽的方向，一个或两个尺寸值可能最终为负数，但这没关系。一个具有负尺寸的 `CGRect` 将简单地在其原点的相反方向上渲染（负宽度向左；负高度向上）：\n\
  \n```\nlet currentRect = CGRect(x: firstTouchLocation.x,\ny: firstTouchLocation.y,\n\
  width: lastTouchLocation.x - firstTouchLocation.x,\nheight: lastTouchLocation.y\
  \ - firstTouchLocation.y)\n```\n\n一旦我们定义了这个矩形，绘制矩形或椭圆就变得非常简单，只需调用两个函数：一个在我们定义的 `CGRect`\
  \ 中绘制矩形或椭圆，另一个对其进行描边和填充：\n\n```\ncase .rect:\ncontext?.addRect(currentRect)\ncontext?.drawPath(using:\
  \ .fillStroke)\ncase .ellipse:\ncontext?.addEllipse(inRect: currentRect)\ncontext?.drawPath(using:\
  \ .fillStroke)\n```\n\n构建并运行你的应用。尝试使用矩形和椭圆工具，看看你是否喜欢它们。别忘了更改颜色，包括使用随机颜色。\n\n\n\n\
  #### 绘制图像\n\n作为最后一个技巧，我们来绘制一张图像。16-Image 文件夹中包含三张图片，分别命名为 `iphone.png`、`iphone@2x.png`\
  \ 和 `iphone@3x.png`，你可以将它们添加到项目的资源目录中。在项目导航器中选择 `Assets.xcassets` 在编辑器中打开，然后在访达中选中这三张图片，将它们拖拽到编辑器区域，即可在资源目录中创建一个名为\
  \ `iphone` 的新图片组。现在按照清单 16-9 所示，修改 `draw(_ rect: )` 方法。\n\n```\noverride func draw(_\
  \ rect: CGRect) {\nlet context = UIGraphicsGetCurrentContext()\ncontext?.setLineWidth(2.0)\n\
  context?.setStrokeColor(currentColor.cgColor)\ncontext?.setFillColor(currentColor.cgColor)\n\
  let currentRect = CGRect(x: firstTouchLocation.x,\ny: firstTouchLocation.y,\nwidth:\
  \ lastTouchLocation.x - firstTouchLocation.x,\nheight: lastTouchLocation.y - firstTouchLocation.y)\n\
  switch shape {\ncase .line:\ncontext?.moveTo(x: firstTouchLocation.x,\ny: firstTouchLocation.y)\n\
  context?.addLineTo(x: lastTouchLocation.x,\ny: lastTouchLocation.y)\ncontext?.strokePath()\n\
  case .rect:\ncontext?.addRect(currentRect)\ncontext?.drawPath(using: .fillStroke)\n\
  case .ellipse:\ncontext?.addEllipse(inRect: currentRect)\ncontext?.drawPath(using:\
  \ .fillStroke)\ncase .image:\nlet horizontalOffset = image!.size.width / 2\nlet\
  \ verticalOffset = image!.size.height / 2\nlet drawPoint =\nCGPoint(x: lastTouchLocation.x\
  \ - horizontalOffset,\ny: lastTouchLocation.y - verticalOffset)\nimage!.draw(at:\
  \ drawPoint)\n}\n}\n清单 16-9.\n我们修改后的用于处理图像的 `draw(_ rect: )` 方法\n```\n\n首先，我们需要计算图像的中心点，因为我们希望图像绘制在用户最后一次触摸点的中心位置。如果不进行此调整，图像的左上角将位于用户手指的位置，这同样也是一个可选方案。然后，我们通过从\
  \ `lastTouchLocation` 的 `x` 和 `y` 值中减去这些偏移量，来创建一个新的 `CGPoint`：\n\n```\nlet horizontalOffset\
  \ = image!.size.width / 2\nlet verticalOffset = image!.size.height / 2\nlet drawPoint\
  \ =\nCGPoint(x: lastTouchLocation.x - horizontalOffset,\ny: lastTouchLocation.y\
  \ - verticalOffset)\n```\n\n现在，我们让图像自行绘制。实现这一功能的代码行如下：\n\n```\nimage!.draw(at: drawPoint)\n\
  ```\n\n构建并运行应用程序，从分段控件中选择 Image，然后检查是否可以将图像放置到绘图画布上。为了增加一点趣味性，你可以用手指在屏幕上移动，观察图像是否跟随手指移动。\n\
  \n### 优化 QuartzFun 应用程序\n\n我们的应用程序已经实现了预期功能，但仍需考虑一些优化。在我们的这个小应用中，你可能不会察觉到性能下降；但在运行于较慢处理器上的更复杂应用中，你可能会发现一些卡顿。问题出现在\
  \ `QuartzFunView.swift` 文件中的 `touchesMoved(_:withEvent:)` 和 `touchesEnded(_:withEvent:)`\
  \ 方法里，这两个方法都包含以下代码行：\n\n```\nsetNeedsDisplay()\n```\n\n显然，这就是我们通知视图发生改变并需要重绘自身的方式。虽然这段代码可以工作，但即使只有微小变化，它也会导致整个视图被擦除并重绘。当我们准备拖拽出一个新形状时，确实需要擦除屏幕，但在拖拽过程中，我们并不希望每秒多次清空屏幕。\n\
  \n与其在拖拽过程中强制整个视图多次重绘，不如使用 `setNeedsDisplayInRect()` 方法。`setNeedsDisplayInRect()`\
  \ 是一个 `UIView` 方法，它仅标记视图区域中的一个矩形部分需要重新显示。通过使用此方法，我们可以只标记受当前绘图操作影响的视图部分需要重绘，从而更加高效。\n\
  \n我们需要重绘的不仅仅是 `firstTouchLocation` 与 `lastTouchLocation` 之间的矩形，还包括当前拖拽操作所覆盖的屏幕任何部分。如果用户触摸屏幕后胡乱涂画，但我们只重绘\
  \ `firstTouchLocation` 与 `lastTouchLocation` 之间的部分，那么屏幕上就会残留之前重绘时留下的许多我们不想保留的内容。\n\
  \n解决方案是在一个 `CGRect` 实例变量中跟踪特定拖拽操作所影响的整个区域。在 `touchesBegan(_:withEvent:)` 中，我们会将该实例变量重置为用户触摸的触点。然后，在\
  \ `touchesMoved(_:withEvent:)` 和 `touchesEnded(_:withEvent:)` 中，我们会使用一个 Core Graphics\
  \ 函数来获取当前矩形与已存储矩形的并集，并存储此结果矩形。接着，我们用它来指定视图中需要重绘的部分。这种方法可以让我们持续累加当前拖拽操作影响的区域。\n\n\
  目前，我们在 `draw(_ rect: )` 方法中计算当前矩形，用于绘制椭圆和矩形形状。我们将把这个计算移到新的方法中，以便在没有重复代码的情况下，在三个地方都能使用它。让我们来尝试一下。\n\
  \n为 `QuartzFunView` 类添加一个名为 `redrawRect` 的新属性：\n\n```\n// 内部属性\nprivate let image\
  \ = UIImage(named:\"iphone\")\nprivate var firstTouchLocation = CGPoint.zero\nprivate\
  \ var lastTouchLocation = CGPoint.zero\nprivate var redrawRect = CGRect.zero\n```\n\
  \n我们将使用这个属性来跟踪需要重绘的区域。我们还需要将当前重绘矩形的计算移到一个独立的方法中，你应该在 `QuartzFunView` 类的末尾添加此方法：\n\
  \n```\nfunc currentRect() -> CGRect {\nreturn CGRect(x: firstTouchLocation.x,\n\
  y: firstTouchLocation.y,\nwidth: lastTouchLocation.x - firstTouchLocation.x,\nheight:\
  \ lastTouchLocation.y - firstTouchLocation.y)\n}\n```\n\n现在，在 `draw(_ rect: )` 方法中，将所有对\
  \ `currentRect` 的引用改为 `currentRect()`，以便代码使用我们刚刚创建的新方法。接下来，按照清单 16-10 所示，删除我们计算\
  \ `currentRect` 的代码行。\n\n\n\n```swift\noverride func draw(_ rect: CGRect) {\n  \
  \  let context = UIGraphicsGetCurrentContext()\n    context?.setLineWidth(2.0)\n\
  \    context?.setStrokeColor(currentColor.cgColor)\n    context?.setFillColor(currentColor.cgColor)\n\
  \    switch shape {\n    case .line:\n        context?.moveTo(x: firstTouchLocation.x,\n\
  \                        y: firstTouchLocation.y)\n        context?.addLineTo(x:\
  \ lastTouchLocation.x,\n                           y: lastTouchLocation.y)\n   \
  \     context?.strokePath()\n    case .rect:\n        context?.addRect(currentRect())\n\
  \        context?.drawPath(using: .fillStroke)\n    case .ellipse:\n        context?.addEllipse(inRect:\
  \ currentRect())\n        context?.drawPath(using: .fillStroke)\n    case .image:\n\
  \        let horizontalOffset = image!.size.width / 2\n        let verticalOffset\
  \ = image!.size.height / 2\n        let drawPoint =\n            CGPoint(x: lastTouchLocation.x\
  \ - horizontalOffset,\n                    y: lastTouchLocation.y - verticalOffset)\n\
  \        image!.draw(at: drawPoint)\n    }\n}\n```\n**代码清单 16-10** 对 `draw(_ rect:)`\
  \ 的最终修改\n\n我们还需要对 `touchesBegan(_:withEvent:)`、`touchesEnded(_:withEvent:)` 和 `touchesMoved(_:withEvent:)`\
  \ 进行一些修改。我们将重新计算当前操作所影响的空间，并以此标记只需重绘视图的某一部分。请将现有的 `touchesEnded(_:withEvent:)` 和\
  \ `touchesMoved(_:withEvent:)` 方法替换为**代码清单 16-11** 所示的新版本。\n\n```swift\noverride\
  \ func touchesBegan(_ touches: Set, with event: UIEvent?) {\n    if let touch =\
  \ touches.first {\n        if useRandomColor {\n            currentColor = UIColor.randomColor()\n\
  \        }\n        firstTouchLocation = touch.location(in: self)\n        lastTouchLocation\
  \ = firstTouchLocation\n        redrawRect = CGRect.zero\n        setNeedsDisplay()\n\
  \    }\n}\noverride func touchesMoved(_ touches: Set, with event: UIEvent?) {\n\
  \    if let touch = touches.first {\n        lastTouchLocation = touch.location(in:\
  \ self)\n        if shape == .image {\n            let horizontalOffset = image!.size.width\
  \ / 2\n            let verticalOffset = image!.size.height / 2\n            redrawRect\
  \ = redrawRect.union(CGRect(x: lastTouchLocation.x - horizontalOffset,\n       \
  \                                           y: lastTouchLocation.y - verticalOffset,\n\
  \                                                  width: image!.size.width, height:\
  \ image!.size.height))\n        } else {\n            redrawRect = redrawRect.union(currentRect())\n\
  \        }\n        setNeedsDisplay(redrawRect)\n    }\n}\noverride func touchesEnded(_\
  \ touches: Set, with event: UIEvent?) {\n    if let touch = touches.first {\n  \
  \      lastTouchLocation = touch.location(in: self)\n        if shape == .image\
  \ {\n            let horizontalOffset = image!.size.width / 2\n            let verticalOffset\
  \ = image!.size.height / 2\n            redrawRect = redrawRect.union(CGRect(x:\
  \ lastTouchLocation.x - horizontalOffset,\n                                    \
  \              y: lastTouchLocation.y - verticalOffset,\n                      \
  \                            width: image!.size.width, height: image!.size.height))\n\
  \        } else {\n            redrawRect = redrawRect.union(currentRect())\n  \
  \      }\n        setNeedsDisplay(redrawRect)\n    }\n}\n```\n**代码清单 16-11** 更新后的触摸事件处理函数\n\
  \n再次构建并运行应用程序，查看最终效果。你很可能看不出任何差别，但通过仅增加几行代码，我们减少了重绘视图所需的工作量——无需擦除和重绘当前拖拽未影响的视图部分。像这样善待\
  \ iOS 设备宝贵的处理器周期，可以显著提升应用程序的性能，尤其是当应用变得愈发复杂时。\n\n> **注意：** 如果你想更深入地探索 Quartz 2D\
  \ 主题，不妨阅读杰克·纳廷、戴夫·伍尔德里奇和大卫·马克合著的《iPhone 开发者的 iPad 开发入门：掌握 iPad SDK》（Apress, 2010）。这本书涵盖了大量的\
  \ Quartz 2D 绘图知识。书中所有的绘图代码和解释也同时适用于 iPhone 和 iPad。\n\n## 本章小结\n\n在本章中，我们仅仅触及了 iOS\
  \ 绘图功能的皮毛。现在你应该对 Quartz 2D 相当熟悉了，只需偶尔查阅苹果文档，就能应对大部分绘图需求。\n\n现在，是时候进一步提升你的图形技能了，因为第\
  \ 17 章将向你介绍 Sprite Kit 框架——该框架在 iOS 7 中引入，能让你实现超高速的位图渲染，用于创建游戏或其他需要快速运动交互的内容。\n\n"
- "# 17. 使用 SpriteKit 开发简单游戏\n\n在 iOS 7 中，苹果推出了 SpriteKit，这是一个用于高性能 2D 图形渲染的框架。与 Core\
  \ Graphics（专注于使用画家模型绘制图形）或 Core Animation（专注于 GUI 元素属性的动画）不同，SpriteKit 专注于一个完全不同的领域——视频游戏——这是苹果在\
  \ iOS 时代首次涉足游戏编程的图形领域。它同时面向 iOS 7 和 OS X 10.9（Mavericks）发布，在这两个平台上提供相同的 API，因此为其中一个平台编写的应用程序可以轻松移植到另一个平台。尽管苹果此前从未提供过像\
  \ SpriteKit 这样的框架，但它与 Cocos2D 等各类开源库有着明显的相似之处。如果你过去使用过 Cocos2D 或类似工具，那么你会感到得心应手。\n\
  \nSpriteKit 并没有实现像 Core Graphics 那样灵活、通用的绘图系统——它没有绘制路径、渐变或填充颜色的方法。相反，它提供的是一个场景图（类似于\
  \ UIKit 的视图层级结构），能够变换每个图节点的位置、缩放和旋转，并且每个节点都能绘制自身。大部分绘制工作发生在 `SKSprite` 类（或其子类）的实例中，该类代表一个准备好显示在屏幕上的单一图形图像。\n\
  \n在本章中，我们将使用 SpriteKit 构建一个名为 TextShooter 的简单射击游戏。我们不使用预制图形，而是用文本片段来构建游戏对象，并通过一个专用于此目的的\
  \ `SKSprite` 子类来实现。采用这种方法，你无需从项目库或其他地方提取图形。我们将制作的应用程序在外观上很简单，但易于修改和使用。\n\n\n## 创建\
  \ TextShooter 应用\n\n在 Xcode 中，按下 `⌘N` 或选择 File ➤ New ➤ Project…，然后从 iOS 部分选择 Game\
  \ 模板。点击 Next，将项目命名为 `TextShooter`，设置 Devices 为 Universal，Game Technology 为 `SpriteKit`，然后创建项目。趁此机会，不妨简要了解一下其他可用的技术选项。`OpenGL\
  \ ES` 和 `Metal`（后者是 iOS 8 新增的技术）属于底层图形 API，能让你对图形硬件拥有近乎完全的控制，但使用起来比 `SpriteKit`\
  \ 困难得多。另外，不要选择 Integrate `GamePlayKit`，因为我们这里不会用到这个功能。`SpriteKit` 是一个 2D API，而 `SceneKit`（同样在\
  \ iOS 8 中引入）是一个可用于构建 3D 图形应用的工具包。阅读完本章后，如果你对 3D 游戏编程感兴趣，不妨查阅位于 [`https://developer.apple.com/library/prerelease/ios/documentation/SceneKit/Reference/SceneKit_Framework/index.html`](https://developer.apple.com/library/prerelease/ios/documentation/SceneKit/Reference/SceneKit_Framework/index.html)\
  \ 的 `SceneKit` 文档。\n\n如果现在运行 `TextShooter` 项目，你会看到默认的 `SpriteKit` 应用，如图 17-1 所示。初始时，你只会看到“Hello,\
  \ World”文本。如果你点击屏幕上的任意位置，文本会淡出，并出现一个旋转的图形，持续几秒钟。在本章中，我们将替换模板中的所有内容，逐步构建一个我们自己的简单应用。\n\
  \n![A329781_3_En_17_Fig1_HTML.jpg](img/A329781_3_En_17_Fig1_HTML.jpg)\n\n**图 17-1.**\
  \ 默认 SpriteKit 应用运行效果，屏幕中央显示了一些文本\n\n现在，让我们看看 Xcode 创建的项目。你会看到它包含一个标准的 `AppDelegate`\
  \ 类和一个名为 `GameViewController` 的小型视图控制器类，该类负责对 `SKView` 对象进行一些初始配置。这个从应用故事板加载的对象，将是显示我们所有\
  \ `SpriteKit` 内容的视图。以下是 `GameViewController viewDidLoad()` 方法中初始化 `SKView` 的代码：\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    if let view =\
  \ self.view as! SKView? {\n        // 从 'GameScene.sks' 加载 SKScene\n        if let\
  \ scene = SKScene(fileNamed: \"GameScene\") {\n            // 设置缩放模式为适应窗口缩放\n  \
  \          scene.scaleMode = .aspectFill\n            // 呈现场景\n            view.presentScene(scene)\n\
  \        }\n        view.ignoresSiblingOrder = true\n        view.showsFPS = true\n\
  \        view.showsNodeCount = true\n    }\n}\n```\n\n这段代码从故事板中获取 `SKView` 实例，并进行配置，使其在游戏运行时显示一些与性能相关的数值。`SpriteKit`\
  \ 应用由一组场景构成，这些场景由 `SKScene` 类表示。在使用 `SpriteKit` 开发时，你可能会为应用中每个视觉上独立的部分创建一个新的 `SKScene`\
  \ 子类。一个场景既可以代表一个快节奏的游戏显示界面，包含几十个在屏幕上来回动画的对象，也可以简单到只是一个开始菜单。在本章中，我们将看到 `SKScene`\
  \ 的多种用途。该模板生成了一个初始为空的场景，其类名为 `GameScene`。\n\n`SKView` 和 `SKScene` 之间的关系与我们在本书中一直使用的\
  \ `UIViewController` 类有一些相似之处。`SKView` 类的行为有点像 `UINavigationController`，从某种意义上说，它就像一块空白画布，仅为其他控制器管理对显示器的访问。不过，从这里开始，情况就有所不同了。与\
  \ `UINavigationController` 不同，`SKView` 管理的顶层对象并非 `UIViewController` 的子类，而是 `SKScene`\
  \ 的子类。`SKScene` 知道如何管理一个对象图，这些对象可以被显示、被物理引擎作用，等等。\n\n这个方法创建了初始场景：\n\n```\nif let\
  \ scene = SKScene(fileNamed: \"GameScene\") {\n```\n\n创建场景有两种方式——你可以以编程方式分配和初始化一个实例，也可以从\
  \ `SpriteKit` 场景文件中加载一个。Xcode 模板采用了后一种方法——它生成一个名为 `GameScene.sks` 的 `SpriteKit`\
  \ 场景文件，其中包含一个 `SKScene` 对象的归档副本。与大多数其他 `SpriteKit` 类一样，`SKScene` 遵循我们在第 13 章讨论过的\
  \ `NSCoder` 协议。`GameScene.sks` 文件只是一个标准归档，你可以使用 `NSKeyedUnarchiver` 和 `NSKeyedArchiver`\
  \ 类对其进行读写。不过，通常你会使用 `SKScene(fileNamed:)` 初始化方法，它会自动从归档中加载 `SKScene`，并将其初始化为调用它的具体子类的实例——在这个例子中，归档的\
  \ `SKScene` 数据被用来初始化 `GameScene` 对象。\n\n你可能会想，既然可以直接创建一个空的场景对象，为什么模板代码还要费劲从场景文件中加载呢？原因是\
  \ Xcode 的 `SpriteKit` 关卡设计器，它让你设计场景的方式，就像在 Interface Builder 中构建用户界面一样。设计好场景后，将其保存到场景文件，然后再次运行你的应用。这次，场景自然不再是空的，你应该能看到你在关卡设计器中创建的设计。加载初始场景后，你可以自由地以编程方式向其中添加其他元素。本章中我们将大量进行这种操作。或者，如果你觉得关卡设计器不好用，你也可以完全通过代码来构建所有场景。\n\
  \n如果你在项目导航器中选中 `GameScene.sks` 文件，Xcode 会在关卡设计器中打开它，如图 17-2 所示。\n\n![A329781_3_En_17_Fig2_HTML.jpg](img/A329781_3_En_17_Fig2_HTML.jpg)\n\
  \n**图 17-2.** Xcode SpriteKit 关卡设计器，显示了包含标签的初始 GameScene\n\n场景显示在编辑器区域中。其右侧是 SKNode\
  \ 检查器，你可以用它来设置在编辑器中选中的节点的属性。`SpriteKit` 场景元素都是节点——即 `SKNode` 类的实例。`SKScene` 本身是\
  \ `SKNode` 的子类。这里，选中了 `SKScene` 节点，因此 SKNode 检查器显示的是其属性。检查器下方，在右下角，是通常的 Xcode 对象库，它会被自动过滤，只显示你可以添加到\
  \ `SpriteKit` 场景中的对象类型。你可以通过将对象从库中拖放到编辑器上来设计场景。\n\n现在，让我们回到 `viewDidLoad` 方法的讨论上，并完成它。\n\
  \n```\n// 设置缩放模式为适应窗口缩放\nscene.scaleMode = .aspectFill\n```\n\n这是场景的 `scaleMode`\
  \ 属性，我们将其设置为 `.aspectFill`，即缩放每个维度，使得两个维度（宽、高）中较大的那个被选为基准。我们还可以选择 `.fill`、`.aspectFit`\
  \ 和 `.resizeFill`。它们具有以下特性：\n\n\n\n* `SKSceneScaleMode.aspectFill` 会缩放场景以填充屏幕，同时保持其宽高比。此模式确保`SKView`的每个像素都被覆盖，但会丢失场景的一部分——在本例中，场景的左右两侧被裁剪。场景的内容也会缩放，因此文字比原始场景中更小，但其相对于场景的位置得以保留。\n\
  * `SKSceneScaleMode.aspectFit` 也会保持场景的宽高比，但确保整个场景可见。结果是一个信箱视图，`SKView`的部分可见区域出现在场景内容的上方和下方。\n\
  * `SKSceneScaleMode.fill` 会沿两个轴缩放场景，使其恰好适应视图。这会确保场景中所有内容可见，但由于原始场景的宽高比未保留，可能会导致内容出现不可接受的扭曲。在这里，可以看到文字被水平压缩了。\n\
  * 最后，`SKSceneScaleMode.resizeFill` 将场景的左下角放置在视图的左下角，并保持其原始大小。\n\n这告诉我们的渲染系统，在显示场景时，我们并不关心父级与子级场景的关系：\n\
  \n```\nview.ignoresSiblingOrder = true\n```\n\n根据游戏的工作方式，你可能需要设置此项，以便遵循元素的适当堆叠顺序。此行代码用于运行动画场景切换：\n\
  \n```\nview.presentScene(scene)\n```\n\n当已有已呈现的场景时调用此方法，会导致新场景立即替换旧场景。本章稍后你将看到相关示例。在本例中，由于我们正在使初始场景可见，因此不存在过渡，所以使用`presentScene()`方法是可行的。\n\
  \n```\nview.showsFPS = true\nview.showsNodeCount = true\n```\n\n最后两行仅用于显示关于动画的一些信息，这些信息会显示在屏幕底部，如图\
  \ 17-3 所示。\n\n![A329781_3_En_17_Fig3_HTML.jpg](img/A329781_3_En_17_Fig3_HTML.jpg)\n\
  \n**图 17-3.** 视图中显示的动画附加信息\n\n### 初始场景自定义\n\n选择`GameScene`类。我们不需要 Xcode 模板生成的大部分代码，因此将其移除。首先，删除整个`didMoveToView()`方法。每当场景在`SKView`中呈现时，都会调用此方法，通常用于在场景可见之前进行最后的修改。接下来，修改`touchesBegan(_:withEvent:)`方法，只保留`for`循环和第一行代码。\n\
  \n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?) {\n/* Called\
  \ when a touch begins */\nfor touch in touches {\nlet location = touch.location(in:\
  \ self)\n}\n}\n```\n\n由于我们不打算从`GameScene.sks`加载场景，因此需要一个方法来创建一个包含初始内容的场景。我们还需要添加当前游戏关卡编号、玩家剩余生命数以及一个用于标识关卡是否完成的标志。修改`GameScene.swift`文件，如代码清单\
  \ 17-1 所示。\n\n```\nclass GameScene: SKScene {\nprivate var levelNumber: Int\nprivate\
  \ var playerLives: Int\nprivate var finished = false\nclass func scene(size:CGSize,\
  \ levelNumber:Int) -> GameScene {\nreturn GameScene(size: size, levelNumber: levelNumber)\n\
  }\noverride convenience init(size:CGSize) {\nself.init(size: size, levelNumber:\
  \ 1)\n}\ninit(size:CGSize, levelNumber:Int) {\nself.levelNumber = levelNumber\n\
  self.playerLives = 5\nsuper.init(size: size)\nbackgroundColor = SKColor.lightGray()\n\
  let lives = SKLabelNode(fontNamed: \"Courier\")\nlives.fontSize = 16\nlives.fontColor\
  \ = SKColor.black()\nlives.name = \"LivesLabel\"\nlives.text = \"Lives: \\(playerLives)\"\
  \nlives.verticalAlignmentMode = .top\nlives.horizontalAlignmentMode = .right\nlives.position\
  \ = CGPoint(x: frame.size.width,\ny: frame.size.height)\naddChild(lives)\nlet level\
  \ = SKLabelNode(fontNamed: \"Courier\")\nlevel.fontSize = 16\nlevel.fontColor =\
  \ SKColor.black()\nlevel.name = \"LevelLabel\"\nlevel.text = \"Level \\(levelNumber)\"\
  \nlevel.verticalAlignmentMode = .top\nlevel.horizontalAlignmentMode = .left\nlevel.position\
  \ = CGPoint(x: 0, y: frame.height)\naddChild(level)\n}\nrequired init?(coder aDecoder:\
  \ NSCoder) {\nlevelNumber = aDecoder.decodeInteger(forKey: \"level\")\nplayerLives\
  \ = aDecoder.decodeInteger(forKey: \"playerLives\")\nsuper.init(coder: aDecoder)\n\
  }\noverride func encode(with aCoder: NSCoder) {\naCoder.encode(Int(levelNumber),\
  \ forKey: \"level\")\naCoder.encode(playerLives, forKey: \"playerLives\")\n}\n}\n\
  ```\n**代码清单 17-1.** 对`GameScene.swift`的首次修改\n\n第一个方法`scene(size:levelNumber:)`提供了一个工厂方法，作为一步创建关卡并设置其关卡编号的简写。第二个方法`init()`覆盖了类的默认初始化器，将控制权传递给第三个方法（并传递一个关卡编号的默认值）。第三个方法在设置`levelNumber`和`playerLives`属性的初始值后，调用其超类实现中的指定初始化器。这可能看起来有点绕，但在你想向类添加新初始化器，同时仍使用类的指定初始化器时，这是一种常见模式。调用超类初始化器后，我们设置了场景的背景颜色。注意，这里我们使用的是名为`SKColor`的类，而不是`UIColor`。事实上，`SKColor`并不是一个真正的类；它是一个类型别名，在\
  \ iOS 应用中映射为`UIColor`，在 OS X 应用中映射为`NSColor`。这让我们能更轻松地在 iOS 和 OS X 之间移植游戏。\n\n\n\
  \n之后，我们创建了一个名为 `SKLabelNode` 类的两个实例。这是一个便捷类，其功能类似于 `UILabel`，允许我们在场景中添加文本，并让我们选择字体、设置文本值以及指定某些对齐方式。我们创建了一个标签用于在屏幕右上角显示生命数量，另一个标签则用于在屏幕左上角显示关卡编号。请仔细观察我们用于定位这些标签的代码。以下是设置生命值标签位置的代码：\n\
  \n```\nlives.position = CGPoint(x: frame.size.width,\ny: frame.size.height)\n```\n\
  \n如果你思考一下我们作为该标签位置传入的点，你可能会惊讶地发现我们传入了场景的高度。在 `UIKit` 中，将任何元素定位在 `UIView` 的高度处会将其置于该视图的底部；但在\
  \ Scene Kit 中，y 轴是翻转的——坐标原点位于场景的左下角，y 轴向上指。因此，场景高度的最大值反而对应于屏幕顶部的位置。那么标签的 x 坐标呢？我们将其设置为视图的宽度。如果你用\
  \ `UIView` 这样做，视图将会恰好位于屏幕右侧之外。这里没有发生这种情况，因为我们还做了以下操作：\n\n```\nlives.horizontalAlignmentMode\
  \ = .right\n```\n\n将 `SKLabelNode` 的 `horizontalAlignmentMode` 属性设置为 `SKLabelHorizontalAlignmentMode.right`，会将用于定位标签节点（实际上是名为\
  \ `position` 的属性）的基准点移动到文本的右侧。由于我们希望文本在屏幕上右对齐，因此我们需要将 `position` 属性的 x 坐标设置为场景的宽度。相比之下，`level`\
  \ 标签中的文本是左对齐的，我们通过将其 x 坐标设置为零来将其定位在场景的左边缘：\n\n```\nlevel.horizontalAlignmentMode\
  \ = .left\nlevel.position = CGPoint(x: 0, y: frame.height)\n```\n\n你还会看到我们给每个标签都赋予了一个名称。其工作方式类似于\
  \ `UIKit` 其他部分中的标签或标识符，这将使我们以后能够通过名称来检索这些标签。\n\n我们添加了 `init(coder:)` 和 `encode(with\
  \ aCoder:)` 方法，因为所有 SpriteKit 节点（包括 `SKScene`）都遵循 `NSCoding` 协议。这要求我们重写 `init(coder:)`，因此为了保持一致性，我们也实现了\
  \ `encode(with aCoder:)`，尽管在本应用程序中我们不会对场景对象进行归档。在我们创建的所有 `SKNode` 子类中，你都会看到相同的模式，尽管当子类没有自己的附加状态时，我们不会实现\
  \ `encode(with aCoder:)` 方法，因为基类版本已经完成了我们在此情况下所需的所有操作。\n\n现在选择 `GameViewController.swift`\
  \ 并对 `viewDidLoad` 方法进行以下修改：\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  let scene = GameScene(size: view.frame.size, levelNumber: 1)\n// 配置视图。\nlet skView\
  \ = self.view as! SKView\nskView.showsFPS = true\nskView.showsNodeCount = true\n\
  /* Sprite Kit 应用额外的优化以提高渲染性能 */\nskView.ignoresSiblingOrder = true\n/* 将缩放模式设置为按比例缩放以适应窗口\
  \ */\nscene.scaleMode = .aspectFill\nskView.presentScene(scene)\n}\n```\n\n我们不再从场景文件中加载场景，而是使用刚才添加到\
  \ `GameScene` 中的 `scene(size:levelNumber:)` 方法来创建并初始化场景，并使其与 `SKView` 大小相同。由于视图和场景大小相同，不再需要设置场景的\
  \ `scaleMode` 属性，因此你可以继续删除执行此操作的代码行。在 `GameViewController.swift` 文件的末尾附近，你会找到以下方法：\n\
  \n```\noverride func prefersStatusBarHidden() -> Bool {\nreturn true\n}\n```\n\n\
  这段代码会在我们的游戏运行时隐藏 iOS 状态栏。Xcode 模板包含此方法，因为隐藏状态栏通常是像这样的动作游戏所需要的。现在运行游戏。你会看到我们已有非常基础的结构，如图\
  \ 17-4 所示。\n\n![A329781_3_En_17_Fig4_HTML.jpg](img/A329781_3_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4.\n\n我们的游戏目前还没有多少趣味性，但至少它拥有高帧率。提示\n\n场景右下角的节点计数和帧率对于调试很有用，但你不会希望在发布游戏时它们还留在那里。你可以通过在\
  \ `GameViewController` 的 `viewDidLoad` 方法中将 `SKView` 的 `showsFPS` 和 `showsNodeCount`\
  \ 属性设置为 `false` 来关闭它们。还有一些其他 `SKView` 属性可以让你获取更多调试信息——有关详细信息，请参阅 API 文档。\n\n###\
  \ 玩家移动\n\n现在是时候添加一点交互性了。我们将创建一个代表玩家的新类。它将知道如何绘制自身，以及如何通过优美的动画移动到一个新位置。接下来，我们将把这个新类的一个实例插入到场景中，并编写一些代码，让玩家通过触摸屏幕来移动该对象。每个将要成为我们场景一部分的对象都必须继承自\
  \ `SKNode`，因此使用 Xcode 的“文件”菜单创建一个名为 `PlayerNode` 的新 Cocoa Touch 类，作为 `SKNode` 的子类。在创建的近乎空的\
  \ `PlayerNode.swift` 文件中，导入 `SpriteKit` 框架并添加以下代码：\n\n```\nimport SpriteKit\nclass\
  \ PlayerNode: SKNode {\noverride init() {\nsuper.init()\nname = \"Player \\(self)\"\
  \ninitNodeGraph()\n}\nrequired init?(coder aDecoder: NSCoder) {\nsuper.init(coder:\
  \ aDecoder)\n}\nprivate func initNodeGraph() {\nlet label = SKLabelNode(fontNamed:\
  \ \"Courier\")\nlabel.fontColor = SKColor.darkGray()\nlabel.fontSize = 40\nlabel.text\
  \ = \"v\"\nlabel.zRotation = CGFloat(M_PI)\nlabel.name = \"label\"\nself.addChild(label)\n\
  }\n}\n```\n\n我们的 `PlayerNode` 本身不显示任何内容，因为普通的 `SKNode` 无法自行绘制。相反，`init()` 方法设置了一个将执行实际绘制的子节点。这个子节点是\
  \ `SKLabelNode` 的另一个实例，就像我们为显示关卡编号和剩余生命数量而创建的那个一样。`SKLabelNode` 是 `SKNode` 的一个子类，它知道如何绘制自身。另一个这样的子类是\
  \ `SKSpriteNode`。我们没有为标签设置位置，这意味着其位置是坐标 (0, 0)。就像视图一样，每个 `SKNode` 都存在于一个从其父对象继承而来的坐标系中。将此节点的位置设为零意味着它将出现在屏幕上\
  \ `PlayerNode` 实例所在的位置。非零值实际上就是相对于该点的偏移量。\n\n我们还为标签设置了一个旋转值，这样它包含的小写字母 `\"v\"` 将以倒置的方式显示。旋转属性的名称\
  \ `zRotation` 可能看起来有些令人惊讶；然而，它只是指 SpriteKit 所使用的坐标系中的 z 轴。你在屏幕上只能看到 x 轴和 y 轴，但 z\
  \ 轴对于按显示顺序排列对象以及围绕其旋转非常有用。分配给 `zRotation` 的值需要以弧度为单位，而不是度数，因此我们给其赋值 `M_PI`，这是一个约等于\
  \ π 的常量。由于 π 弧度等于 180°，这正是我们所需要的。\n\n\n\n## 将玩家角色添加到场景中\n\n现在切换回 `GameScene.swift`。这里，我们要向场景中添加一个\
  \ `PlayerNode` 实例。首先添加一个属性来表示玩家节点：\n\n```\nprivate let playerNode: PlayerNode =\
  \ PlayerNode()\n```\n\n接着，在 `init(size:levelNumber:)` 方法的末尾添加以下加粗代码：\n\n```\nlevel.position\
  \ = CGPoint(x: 0, y: frame.height)\naddChild(level)\nplayerNode.position = CGPoint(x:\
  \ frame.midX,\ny: frame.height * 0.1)\naddChild(playerNode)\n```\n\n如果你现在构建并运行应用，应该会看到玩家角色出现在屏幕底部中间附近，如图\
  \ 17-5 所示。\n\n![A329781_3_En_17_Fig5_HTML.jpg](img/A329781_3_En_17_Fig5_HTML.jpg)\n\
  \n图 17-5. 添加了一个倒 V 形作为我们的玩家角色\n\n## 处理触摸：玩家移动\n\n接下来，我们要向 `touchesBegan(_:withEvent:)`\
  \ 方法中重新加入一些逻辑，这个方法之前我们几乎留空了。在 `GameScene.swift` 中插入如下所示的加粗代码行（添加此代码时会出现编译器错误，我们稍后会修复）：\n\
  \n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?) {\n/* 当触摸开始时调用\
  \ */\nfor touch in touches {\nlet location = touch.location(in: self)\nif location.y\
  \ < frame.height * 0.2 {\nlet target = CGPoint(x: location.x, y: playerNode.position.y)\n\
  playerNode.moveToward(target)\n}\n}\n}\n```\n\n上述代码段将屏幕底部五分之一区域内的任意触摸位置，作为玩家节点移动目标位置的依据，并指示玩家节点向该位置移动。编译器会报错，因为我们还没有定义玩家节点的\
  \ `moveToward()` 方法。所以，切换到 `PlayerNode.swift` 并添加该方法的实现：\n\n```\nfunc moveToward(_\
  \ location: CGPoint) {\nremoveAction(forKey: \"movement\")\nlet distance = pointDistance(position,\
  \ location)\nlet screenWidth = UIScreen.main.bounds.size.width\nlet duration = TimeInterval(2\
  \ * distance/screenWidth)\nrun(SKAction.move(to: location, duration: duration),\n\
  withKey:\"movement\")\n}\n```\n\n我们先跳过第一行，稍后再回来解释。这个方法比较新位置与当前位置，计算出距离和要移动的像素数量。接着，它利用一个数值常量来确定整体移动的速度，从而计算出移动所需的时间。最后，它创建一个\
  \ `SKAction` 来执行移动操作。`SKAction` 是 SpriteKit 的一部分，能够随时间对节点进行更改，让你轻松地让节点的位置、大小、旋转、透明度等属性产生动画效果。在此例中，我们创建了一个在特定时长内执行简单移动动画的动作，然后通过键\
  \ `\"movement\"` 将该动作分配给玩家节点。如你所见，这个键与该方法第一行中用于移除动作的键相同。我们通过移除任何已有相同键的动作来开始该方法，这样用户就能快速连续点击多个位置，而不会产生大量试图以不同方式移动的冲突动作。\n\
  \n## 几何计算\n\n现在你会注意到，我们引入了另一个问题，因为 Xcode 找不到名为 `pointDistance()` 的函数。这是我们的应用将用于执行点、向量和浮点数计算的几个简单几何函数之一。现在就来实现它。使用\
  \ Xcode 创建一个名为 `Geometry.swift` 的新 Swift 文件，并添加以下内容：\n\n```\nimport UIKit\n// 接收一个\
  \ CGVector 和一个 CGFloat。\n// 返回一个新的 CGFloat，其中 v 的每个分量都乘以了 m。\nfunc vectorMultiply(_\
  \ v: CGVector, _ m: CGFloat) -> CGVector {\nreturn CGVector(dx: v.dx * m, dy: v.dy\
  \ * m)\n}\n// 接收两个 CGPoint。\n// 返回表示从 p1 到 p2 方向的 CGVector。\nfunc vectorBetweenPoints(_\
  \ p1: CGPoint, _ p2: CGPoint) -> CGVector {\nreturn CGVector(dx: p2.x - p1.x, dy:\
  \ p2.y - p1.y)\n}\n// 接收一个 CGVector。\n// 返回一个包含向量长度的 CGFloat，使用勾股定理计算。\nfunc vectorLength(_\
  \ v: CGVector) -> CGFloat {\nreturn CGFloat(sqrtf(powf(Float(v.dx), 2) + powf(Float(v.dy),\
  \ 2)))\n}\n// 接收两个 CGPoint。返回它们之间的距离（CGFloat），使用勾股定理计算。\nfunc pointDistance(_ p1:\
  \ CGPoint, _ p2: CGPoint) -> CGFloat {\nreturn CGFloat(\nsqrtf(powf(Float(p2.x -\
  \ p1.x), 2) + powf(Float(p2.y - p1.y), 2)))\n}\n```\n\n这些是一些在众多游戏中常用的基本操作的简单实现：向量乘法、创建从一个点指向另一个点的向量，以及计算距离。现在构建并运行应用。当玩家的“飞船”出现后，点击屏幕底部任意位置，你会看到飞船向左或向右滑动到你点击的点。你可以在飞船到达目标之前再次点击，它会立即开始新的动画，移向新的位置。这很好，但如果玩家的飞船在运动时能更活泼一点，岂不是更好？\n\
  \n## 让飞船摇摆起来\n\n让我们通过添加另一个动画，让飞船在移动时产生一点摇摆。在 `PlayerNode` 的 `moveToward:` 方法中添加加粗代码行：\n\
  \n```\nfunc moveToward(_ location: CGPoint) {\nremoveAction(forKey: \"movement\"\
  )\nremoveAction(forKey: \"wobbling\")\nlet distance = pointDistance(position, location)\n\
  let screenWidth = UIScreen.main.bounds.size.width\nlet duration = TimeInterval(2\
  \ * distance/screenWidth)\nrun(SKAction.move(to: location, duration: duration),\n\
  withKey:\"movement\")\nlet wobbleTime = 0.3\nlet halfWobbleTime = wobbleTime/2\n\
  let wobbling = SKAction.sequence([\nSKAction.scaleX(to: 0.2, duration: halfWobbleTime),\n\
  SKAction.scaleX(to: 1.0, duration: halfWobbleTime)\n])\nlet wobbleCount = Int(duration/wobbleTime)\n\
  run(SKAction.repeat(wobbling, count: wobbleCount),\nwithKey:\"wobbling\")\n}\n```\n\
  \n我们刚才所做的与之前创建的移动动画类似，但在一些重要方面有所不同。对于基本移动，我们简单地计算了移动持续时间，然后一步到位地创建并运行了一个移动动作。这次则稍微复杂一些。首先，我们定义了一次“摇摆”的时间（飞船在移动过程中可能会摇摆多次，但整个过程中的摇摆频率保持一致）。摇摆本身包括首先将飞船沿\
  \ x 轴（即其宽度）缩放至正常大小的 2/10，然后再缩放回完整大小。每个步骤都是一个单独的动作，它们被打包在一起，构成另一种称为序列的动作，该动作会依次执行其中包含的所有动作。接下来，我们计算出在飞船移动的持续时间内，这个摇摆可以发生多少次，并将\
  \ `wobbling` 序列包裹在重复动作中，告诉它应该执行多少个完整的摇摆周期。并且，和之前一样，我们通过取消任何先前的摇摆动作来开始该方法，因为我们不希望出现冲突的摇摆动画。\n\
  \n现在运行应用。你会看到飞船在来回移动时愉快地摇摆着。看起来有点像在走路。\n\n\n\n### 创建你的敌人\n\n目前进展顺利，但这款游戏需要一些敌人让玩家射击。使用\
  \ Xcode 创建一个名为 `EnemyNode` 的新 Cocoa Touch 类，并将 `SKNode` 作为父类。我们暂时不会赋予敌人任何实际行为，但会为其添加外观。我们将使用与玩家相同的技术，用文字构建敌人的身体。显然，没有比字母\
  \ X 更具威慑力的字符了，所以我们的敌人将是一个由小写字母 x 组成的字母 X。请将以下代码添加到 `EnemyNode.swift` 中：\n\n```\n\
  import SpriteKit\nclass EnemyNode: SKNode {\n    override init() {\n        super.init()\n\
  \        name = \"Enemy \\(self)\"\n        initNodeGraph()\n    }\n    \n    required\
  \ init?(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\
  \    \n    private func initNodeGraph() {\n        let topRow = SKLabelNode(fontNamed:\
  \ \"Courier-Bold\")\n        topRow.fontColor = SKColor.brown()\n        topRow.fontSize\
  \ = 20\n        topRow.text = \"x x\"\n        topRow.position = CGPoint(x: 0, y:\
  \ 15)\n        addChild(topRow)\n        \n        let middleRow = SKLabelNode(fontNamed:\
  \ \"Courier-Bold\")\n        middleRow.fontColor = SKColor.brown()\n        middleRow.fontSize\
  \ = 20\n        middleRow.text = \"x\"\n        addChild(middleRow)\n        \n\
  \        let bottomRow = SKLabelNode(fontNamed: \"Courier-Bold\")\n        bottomRow.fontColor\
  \ = SKColor.brown()\n        bottomRow.fontSize = 20\n        bottomRow.text = \"\
  x x\"\n        bottomRow.position = CGPoint(x: 0, y: -15)\n        addChild(bottomRow)\n\
  \    }\n}\n```\n\n这里没有太多新内容；我们只是通过调整每个文字行位置的 y 值来添加多个“行”的文本。\n\n### 将敌人放入场景\n\n\
  现在，让我们通过修改 `GameScene.swift` 使一些敌人在场景中出现。首先，添加一个新属性来保存将加入当前关卡的敌人：\n\n```\nprivate\
  \ let enemies = SKNode()\n```\n\n你可能认为我们会使用 `Array<SKNode>` 来实现，但实际上直接用普通的 `SKNode`\
  \ 就非常适合。`SKNode` 可以容纳任意数量的子节点。而且由于我们需要将所有敌人添加到场景中，不如将它们全部存放在一个 `SKNode` 中以便访问。下一步是添加\
  \ `spawnEnemies()` 方法，如下所示：\n\n```\nprivate func spawnEnemies() {\n    let count\
  \ = Int(log(Float(levelNumber))) + levelNumber\n    for _ in 0..<count {\n     \
  \   let enemy = EnemyNode()\n        let size = frame.size;\n        let x = arc4random_uniform(UInt32(size.width\
  \ * 0.8))\n            + UInt32(size.width * 0.1)\n        let y = arc4random_uniform(UInt32(size.height\
  \ * 0.5))\n            + UInt32(size.height * 0.5)\n        enemy.position = CGPoint(x:\
  \ CGFloat(x), y: CGFloat(y))\n        enemies.addChild(enemy)\n    }\n}\n```\n\n\
  在 `init(size:levelNumber:)` 方法的末尾附近添加以下几行，将 `enemies` 节点添加到场景中，然后调用 `spawnEnemies`\
  \ 方法：\n\n```\naddChild(playerNode)\naddChild(enemies)\nspawnEnemies()\n```\n\n由于我们将\
  \ `enemies` 节点添加到了场景中，任何添加到 `enemies` 节点的子敌人节点也会出现在场景中。注意，我们使用了 `arc4random_uniform()`\
  \ 函数来获取敌人节点的 `x` 和 `y` 坐标的随机值。如果在使用随机数生成器之前先对其进行“搅动”，就能获得更不可预测的随机数。为此，打开 `AppDelegate.swift`，并在\
  \ `application(_:didFinishLaunchingWithOptions:)` 方法中添加以下加粗的行：\n\n```\nfunc application(application:\
  \ UIApplication,\n    didFinishLaunchingWithOptions launchOptions: [NSObject: AnyObject]?)\
  \ -> Bool {\n    // Override point for customization after application launch.\n\
  \    arc4random_stir()\n    return true\n}\n```\n\n现在构建并运行应用。你会看到一个可怕的敌人随机出现在屏幕的上半部分，如图\
  \ 17-6 所示。你是否希望自己能开枪射击它？\n\n![A329781_3_En_17_Fig6_HTML.jpg](img/A329781_3_En_17_Fig6_HTML.jpg)\n\
  \n图 17-6. 我相信你也会同意，这个由 X 组成的 X 实在是太该被射击了\n\n### 开始射击\n\n是时候实现游戏开发的下一步逻辑了：让玩家攻击敌人。我们希望玩家能够点击屏幕上方\
  \ 80% 的任意位置，向敌人发射子弹。我们将使用 SpriteKit 自带的物理引擎来移动玩家的子弹，并检测子弹与敌人何时发生碰撞。\n\n但首先，我们所说的物理引擎究竟是什么？简单来说，物理引擎是一个软件组件，它跟踪世界中多个物理对象（通常称为物理实体）及其所受到的作用力。它还能确保所有物体的运动方式符合现实物理规律。它可以考虑重力的影响、处理物体之间的碰撞（防止物体同时占据同一空间），甚至可以模拟摩擦力和弹性等物理特性。重要的是要理解，物理引擎通常与图形引擎是分开的。Apple\
  \ 提供了便捷的 API 让我们同时使用这两者，但它们在本质上是独立的。常见的做法是，显示中的某些对象（例如显示当前关卡编号和剩余生命值的标签）完全独立于物理引擎。同时，也可以创建具有物理实体但完全不显示任何内容的对象。\n\
  \n#### 定义物理类别\n\nSpriteKit 物理引擎允许我们做的事情之一，就是将对象分配到几个不同的物理类别中。物理类别是一种对相关对象进行分组的方式，以便物理引擎能以不同方式处理它们之间的碰撞。例如，在这个游戏中，我们将创建三个类别：一个用于敌人，一个用于玩家，一个用于玩家发射的导弹。我们当然希望物理引擎关注敌人与玩家导弹之间的碰撞，但可能希望它忽略玩家导弹与玩家自身之间的碰撞。使用物理类别可以轻松实现这一点。那么，让我们来创建所需的类别。按下\
  \ ⌘N 调出新建文件助手，在 iOS 来源部分选择 Swift 文件，然后点击下一步。将新文件命名为 `PhysicsCategories.swift` 并保存，然后将以下代码添加到其中：\n\
  \n```\nimport Foundation\nlet PlayerCategory: UInt32 = 1 << 1\nlet EnemyCategory:\
  \ UInt32 = 1 << 2\nlet PlayerMissileCategory: UInt32 = 1 << 3\n```\n\n这里我们声明了三个类别常量。注意，这些类别以位掩码形式工作，因此每个类别都必须是\
  \ 2 的幂。通过位移运算，我们可以轻松实现这一点。将它们设置为位掩码是为了简化物理引擎的 API。使用位掩码，我们可以通过逻辑“或”操作将多个值组合在一起。这使得我们可以通过一次\
  \ API 调用来告诉物理引擎如何处理多对不同节点之间的碰撞。我们很快就能看到实际效果。\n\n\n\n#### 创建 `BulletNode` 类\n\n打好基础之后，我们来创建一些子弹，这样就可以开始射击了。新建一个名为\
  \ `BulletNode` 的 Cocoa Touch 类，同样以 `SKNode` 作为其父类。首先导入 SpriteKit 框架，并添加一个属性来保存子弹的推力向量：\n\
  \n```swift\nimport SpriteKit\nclass BulletNode: SKNode {\nvar thrust: CGVector =\
  \ CGVector(dx: 0, dy: 0)\n}\n```\n\n接下来，我们实现 `init()` 方法。与本应用中其他 `init()` 方法一样，这里我们将为子弹创建对象图。它由一个单独的点组成。同时，我们通过创建并配置一个\
  \ `SKPhysicsBody` 实例并将其附着到 `self` 上，来为这个类配置物理属性。在这个过程中，我们告诉这个新 body 它属于哪个类别，以及应该检查哪些类别与这个对象的碰撞：\n\
  \n```swift\noverride init() {\nsuper.init()\nlet dot = SKLabelNode(fontNamed: \"\
  Courier\")\ndot.fontColor = SKColor.black()\ndot.fontSize = 40\ndot.text = \".\"\
  \naddChild(dot)\n\nlet body = SKPhysicsBody(circleOfRadius: 1)\nbody.isDynamic =\
  \ true\nbody.categoryBitMask = PlayerMissileCategory\nbody.contactTestBitMask =\
  \ EnemyCategory\nbody.collisionBitMask = EnemyCategory\nbody.fieldBitMask = GravityFieldCategory\n\
  body.mass = 0.01\n\nphysicsBody = body\nname = \"Bullet \\(self)\"\n}\n```\n\n我们还要添加\
  \ `init(coder aDecoder:)` 和 `encode(with aCoder:)` 方法：\n\n```swift\nrequired init?(coder\
  \ aDecoder: NSCoder) {\nsuper.init(coder: aDecoder)\nlet dx = aDecoder.decodeFloat(forKey:\
  \ \"thrustX\")\nlet dy = aDecoder.decodeFloat(forKey: \"thrustY\")\nthrust = CGVector(dx:\
  \ CGFloat(dx), dy: CGFloat(dy))\n}\n\noverride func encode(with aCoder: NSCoder)\
  \ {\nsuper.encode(with: aCoder)\naCoder.encode(Float(thrust.dx), forKey: \"thrustX\"\
  )\naCoder.encode(Float(thrust.dy), forKey: \"thrustY\")\n}\n```\n\n#### 应用物理效果\n\
  \n接下来，我们添加工厂方法，该方法创建一颗新子弹并赋予它一个推力向量，物理引擎将使用该向量将子弹推向目标：\n\n```swift\nclass func bullet(from\
  \ start: CGPoint, toward destination: CGPoint) -> BulletNode {\nlet bullet = BulletNode()\n\
  bullet.position = start\n\nlet movement = vectorBetweenPoints(start, destination)\n\
  let magnitude = vectorLength(movement)\nlet scaledMovement = vectorMultiply(movement,\
  \ 1/magnitude)\n\nlet thrustMagnitude = CGFloat(100.0)\nbullet.thrust = vectorMultiply(scaledMovement,\
  \ thrustMagnitude)\n\nbullet.run(SKAction.playSoundFileNamed(\"shoot.wav\",\nwaitForCompletion:\
  \ false))\nreturn bullet\n}\n```\n\n基本的计算相当简单。我们首先确定一个从起点位置指向目标位置的 `movement` 向量，然后确定它的\
  \ `magnitude`（长度）。将 `movement` 向量除以其 `magnitude` 会得到一个归一化的单位向量，这个向量指向与原始向量相同的方向，但长度恰好为一个单位（在这里的一个单位相当于屏幕上的一个“点”——例如，在\
  \ Retina 设备上是两个像素，在旧设备上是一个像素）。创建单位向量非常有用，因为我们可以将其乘以一个固定大小（此处为 100），从而确定一个均匀的强力推力向量，无论用户在屏幕上点击的位置有多远。\n\
  \n我们需要添加到此类的最后一段代码是以下方法，它将推力应用到物理体上。我们将在场景中每帧调用一次：\n\n```swift\nfunc applyRecurringForce()\
  \ {\nphysicsBody!.applyForce(thrust)\n}\n```\n\n#### 在场景中添加子弹\n\n现在切换到 `GameScene.swift`，将子弹添加到场景本身中。首先，添加另一个属性，将所有子弹包含在一个\
  \ `SKNode` 中，就像之前为敌人所做的那样：\n\n```swift\nprivate let playerBullets = SKNode()\n```\n\
  \n找到 `init(size:levelNumber:)` 方法中之前添加敌人的部分。那里也是设置 `playerBullets` 节点的位置。\n\n```swift\n\
  addChild(enemies)\nspawnEnemies()\naddChild(playerBullets)\n}\n```\n\n现在我们可以编写实际的导弹发射代码了。在\
  \ `touchesBegan(_:withEvent:)` 方法中添加这个 `else` 子句，这样屏幕上半部分的所有点击都会发射子弹，而不是移动飞船：\n\n\
  ```swift\n} else {\nlet bullet = BulletNode.bullet(from: playerNode.position, toward:\
  \ location)\nplayerBullets.addChild(bullet)\n}\n```\n\n这样就添加了子弹，但除非我们通过每帧施加推力来告诉它们移动，否则我们添加的子弹都不会真正移动。我们的场景中已经包含一个名为\
  \ `update()` 的空方法，它是作为项目模板的一部分添加的。如果 `update()` 方法不存在，请按如下所示添加。SpriteKit 每帧都会调用此方法，它是处理每帧所需游戏逻辑的理想位置。然而，我们并没有直接在该方法中更新所有子弹，而是将代码放在一个单独的方法中，然后从\
  \ `update()` 方法中调用它：\n\n```swift\noverride func update(_ currentTime: TimeInterval)\
  \ {\n/* 在每帧渲染前调用 */\nupdateBullets()\n}\n\nprivate func updateBullets() {\nvar bulletsToRemove:[BulletNode]\
  \ = []\n\nfor bullet in playerBullets.children as! [BulletNode] {\n// 移除任何移出屏幕的子弹\n\
  if !frame.contains(bullet.position) {\n// 标记子弹以待移除\nbulletsToRemove.append(bullet)\n\
  continue\n}\n// 对剩余子弹施加推力\nbullet.applyRecurringForce()\n}\nplayerBullets.removeChildren(in:\
  \ bulletsToRemove)\n}\n```\n\n在告诉每颗子弹施加其持续力之前，我们还会检查它是否仍在屏幕上。任何离开屏幕的子弹都会被放入一个临时数组中；随后，这些子弹会从\
  \ `playerBullets` 节点中被清除。请注意，这个两步过程是必要的，因为此方法中运行的 `for` 循环正在遍历 `playerBullets` 节点中的所有子节点。在遍历集合的同时对其进行修改绝不是一个好主意，这很容易导致崩溃。\n\
  \n现在构建并运行应用程序。你会看到，除了移动玩家的飞船，你还可以通过点击屏幕使其向上发射导弹（见图 17-7）。\n\n![A329781_3_En_17_Fig7_HTML.jpg](img/A329781_3_En_17_Fig7_HTML.jpg)\n\
  \n图 17-7. 发射子弹\n\n\n\n### 利用物理引擎攻击敌人\n\n我们的游戏仍缺少几个重要的游戏机制：敌人从未攻击我们，我们也无法通过射击消灭敌人。现在就来解决后者。我们要设计这样一个机制：射击敌人时，会将其从屏幕上的固定位置击飞。这一功能将主要借助物理引擎实现，并需要对`PlayerNode`、`EnemyNode`和`GameScene`进行修改。\n\
  \n首先，为尚未添加物理体的节点添加物理体。从`EnemyNode.swift`开始，在`init()`方法中添加以下代码行：\n\n```\ninitPhysicsBody()\n\
  ```\n\n现在添加实际设置物理体的代码。这与之前为`PlayerBullet`类编写的代码非常相似：\n\n```\nprivate func initPhysicsBody()\
  \ {\nlet body = SKPhysicsBody(rectangleOf: CGSize(width: 40, height: 40))\nbody.affectedByGravity\
  \ = false\nbody.categoryBitMask = EnemyCategory\nbody.contactTestBitMask = PlayerCategory\
  \ | EnemyCategory\nbody.mass = 0.2\nbody.angularDamping = 0\nbody.linearDamping\
  \ = 0\nbody.fieldBitMask = 0\nphysicsBody = body\n}\n```\n\n然后选择`PlayerNode.swift`，在该文件中也执行类似的操作。首先，在`init()`方法中添加以下代码行：\n\
  \n```\ninitPhysicsBody()\n```\n\n最后，添加新的`initPhysicsBody()`方法：\n\n```\nprivate func\
  \ initPhysicsBody() {\nlet body = SKPhysicsBody(rectangleOf: CGSize(width: 20, height:\
  \ 20))\nbody.affectedByGravity = false\nbody.categoryBitMask = PlayerCategory\n\
  body.contactTestBitMask = EnemyCategory\nbody.collisionBitMask = 0\nbody.fieldBitMask\
  \ = 0\nphysicsBody = body\n}\n```\n\n至此，你可以运行应用，发现子弹现在能够将敌人击飞至太空中。但你会发现这里存在一个问题：当游戏开始后，你将孤零零的敌人击飞到太空中，游戏就会陷入僵局。因此，现在是为游戏添加关卡管理功能的好时机。\n\
  \n### 完成关卡\n\n首先，在`GameScene.swift`中添加`updateEnemies()`方法。它的工作原理与之前添加的`updateBullets()`方法非常相似：\n\
  \n```\nprivate func updateEnemies() {\nvar enemiesToRemove:[EnemyNode] = []\nfor\
  \ node in enemies.children as! [EnemyNode] {\nif !frame.contains(node.position)\
  \ {\n// 标记需要移除的敌人\nenemiesToRemove.append(node)\n}\n}\nenemies.removeChildren(in:\
  \ enemiesToRemove)\n}\n```\n\n这段代码负责在敌人离开屏幕时，将其从关卡的`enemies`数组中移除。接下来修改`update()`方法，让它调用`updateEnemies()`以及一个尚未实现的新方法：\n\
  \n```\noverride func update(currentTime: CFTimeInterval) {\nif finished {\nreturn\n\
  }\nupdateBullets()\nupdateEnemies()\ncheckForNextLevel()\n}\n```\n\n我们在该方法开始时检查了`finished`属性。由于即将添加能够正式结束关卡的代码，我们需要确保在关卡完成后不再继续执行后续处理。然后，就像每帧检查是否有子弹或敌人离开屏幕一样，我们将在每帧调用`checkForNextLevel()`来检查当前关卡是否完成。接下来添加这个方法：\n\
  \n```\nprivate func checkForNextLevel() {\nif enemies.children.isEmpty {\ngoToNextLevel()\n\
  }\n}\n```\n\n#### 过渡到下一关\n\n`checkForNextLevel()`方法接着调用另一个尚未实现的方法。`goToNextLevel()`方法将当前关卡标记为已完成，在屏幕上显示一些文本告知玩家，然后启动下一关：\n\
  \n```\nprivate func goToNextLevel() {\nfinished = true\nlet label = SKLabelNode(fontNamed:\
  \ \"Courier\")\nlabel.text = \"Level Complete!\"\nlabel.fontColor = SKColor.blue()\n\
  label.fontSize = 32\nlabel.position = CGPoint(x: frame.size.width * 0.5,\ny: frame.size.height\
  \ * 0.5)\naddChild(label)\nlet nextLevel = GameScene(size: frame.size, levelNumber:\
  \ levelNumber + 1)\nnextLevel.playerLives = playerLives\nview!.presentScene(nextLevel,\
  \ transition:\nSKTransition.flipHorizontal(withDuration: 1.0))\n}\n```\n\n`goToNextLevel()`方法的后半部分会创建一个新的`GameScene`实例，并为其提供所需的所有初始值。然后，它告诉视图呈现新的场景，并使用过渡动画使切换更平滑。`SKTransition`类让我们可以从多种过渡样式中选择。运行应用并完成一个关卡，即可看到如图\
  \ 17-8 所示的效果。\n\n![A329781_3_En_17_Fig8_HTML.jpg](img/A329781_3_En_17_Fig8_HTML.jpg)\n\
  \n图 17-8. 关卡结束时的屏幕翻转过渡效果\n\n这里使用的过渡效果看起来就像是在水平翻转一张卡片，但还有许多其他过渡效果可供选择。有关更多可能性，请参阅`SKTransition`的文档。\n\
  \n\n\n## 自定义碰撞效果\n\n现在我们有了一个真正可玩的游戏。你可以通过将敌人向上击飞出屏幕来一关接一关地通关。这还不错，但确实没什么挑战性。我之前提到过，让敌人攻击玩家是缺失的游戏玩法之一，现在是时候实现它了。我们要让事情变得稍微困难一些：当敌人被撞到（无论是被子弹击中还是被其他敌人碰到）时会向下坠落。同时，我们希望被下落的敌人击中会扣除玩家一条命。你可能还注意到，子弹击中敌人后会蜿蜒绕过敌人并继续向上飞行，这看起来相当怪异。我们将通过在\
  \ `GameScene.swift` 中实现碰撞处理方法来解决所有这些问题。\n\n处理已检测碰撞的方法是 `SKPhysicsWorld` 类的一个委托方法。我们的场景默认拥有一个物理世界，但我们需要对其进行一些设置，它才会向我们报告任何信息。首先，最好让编译器知道我们将要实现一个委托协议，因此我们在\
  \ `GameScene` 类中添加如下声明：\n\n```\nclass GameScene: SKScene, SKPhysicsContactDelegate\
  \ {\n```\n\n我们还需要对物理世界进行一些配置（将重力设置得稍微温和一些），并告诉它谁是它的委托对象。为此，在 `init(size:levelNumber:)`\
  \ 方法的末尾添加以下粗体行：\n\n```\nphysicsWorld.gravity = CGVector(dx: 0, dy: -1)\nphysicsWorld.contactDelegate\
  \ = self\n```\n\n现在，我们已经将物理世界的 `contactDelegate` 设置为 `GameScene`，接下来可以实现相关的委托方法了。该方法的核心里程碑如下所示：\n\
  \n```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    if contact.bodyA.categoryBitMask\
  \ == contact.bodyB.categoryBitMask {\n        // 两个物体属于同一类别\n        let nodeA =\
  \ contact.bodyA.node!\n        let nodeB = contact.bodyB.node!\n        // 我们该如何处理这些节点？\n\
  \    } else {\n        var attacker: SKNode\n        var attackee: SKNode\n    \
  \    if contact.bodyA.categoryBitMask > contact.bodyB.categoryBitMask {\n      \
  \      // 物体 A 正在攻击物体 B\n            attacker = contact.bodyA.node!\n          \
  \  attackee = contact.bodyB.node!\n        } else {\n            // 物体 B 正在攻击物体\
  \ A\n            attacker = contact.bodyB.node!\n            attackee = contact.bodyA.node!\n\
  \        }\n        if attackee is PlayerNode {\n            playerLives -= 1\n\
  \        }\n        // 我们该如何处理攻击者和被攻击者？\n    }\n}\n```\n\n请继续添加这个方法，但如果你现在查看它，会发现它并没有做太多实际工作。事实上，该方法唯一具体的成果是，每当一个下落的敌人击中玩家的飞船时，减少玩家的生命数。但敌人还没有开始下落。\n\
  \n这个实现背后的思路是：查看两个碰撞的物体，判断它们是属于同一类别（这种情况下，它们彼此是“友军”）还是属于不同类别。如果属于不同类别，我们必须确定谁在攻击谁。如果你查看\
  \ `PhysicsCategories.swift` 中声明的类别顺序，会发现它们按照“攻击性”递增的顺序排列：`Player` 节点可以被 `Enemy`\
  \ 节点攻击，而 `Enemy` 节点又可以被具有 `PlayerMissile` 类别的节点（即 `BulletNode`）攻击。这意味着我们可以使用简单的大于比较来判断谁是这个场景中的“攻击者”。\n\
  \n为了简单和模块化，我们并不希望场景来决定每个物体应该如何应对被敌人攻击或被其他物体碰撞。更好的做法是将这些细节构建到受影响的节点类本身中。但是，正如你在这个方法中看到的，我们唯一确定的是每一方都有一个\
  \ `SKNode` 实例。与其编写一大串 `if`-`else` 语句来询问每个节点属于哪个 `SKNode` 子类，我们可以使用常规的多态性，让每个节点类以自己的方式处理问题。为了使其正常工作，我们必须在\
  \ `SKNode` 上添加一些方法，这些方法具有默认实现（不执行任何操作），并让我们的子类在适当的地方重写它们。这就需要用到类扩展。\n\n### 为 `SKNode`\
  \ 添加类扩展\n\n要为 `SKNode` 添加扩展，请右键单击 Xcode 项目导航器中的 TextShooter 文件夹，然后从弹出菜单中选择新建文件…。在助手中的\
  \ iOS 源代码部分，选择 Swift 文件，然后点击下一步。将文件命名为 `SKNode+Extra.swift`，然后点击创建。在编辑器中打开该文件并添加如下代码：\n\
  \n```\nimport SpriteKit\nextension SKNode {\n    func receiveAttacker(_ attacker:\
  \ SKNode, contact: SKPhysicsContact) {\n        // 默认实现不执行任何操作\n    }\n    func\
  \ friendlyBumpFrom(_ node: SKNode) {\n        // 默认实现不执行任何操作\n    }\n}\n```\n\n\
  现在回到 `GameScene.swift`，完成它在碰撞处理中的部分。回到 `didBegin(_ contact: )` 方法，添加实际执行工作的部分：\n\
  \n```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    if contact.bodyA.categoryBitMask\
  \ == contact.bodyB.categoryBitMask {\n        // 两个物体属于同一类别\n        let nodeA =\
  \ contact.bodyA.node!\n        let nodeB = contact.bodyB.node!\n        // 我们该如何处理这些节点？\n\
  \        nodeA.friendlyBumpFrom(nodeB)\n        nodeB.friendlyBumpFrom(nodeA)\n\
  \    } else {\n        var attacker: SKNode\n        var attackee: SKNode\n    \
  \    if contact.bodyA.categoryBitMask > contact.bodyB.categoryBitMask {\n      \
  \      // 物体 A 正在攻击物体 B\n            attacker = contact.bodyA.node!\n          \
  \  attackee = contact.bodyB.node!\n        } else {\n            // 物体 B 正在攻击物体\
  \ A\n            attacker = contact.bodyB.node!\n            attackee = contact.bodyA.node!\n\
  \        }\n        if attackee is PlayerNode {\n            playerLives -= 1\n\
  \        }\n        // 我们该如何处理攻击者和被攻击者？\n        attackee.receiveAttacker(attacker,\
  \ contact: contact)\n        playerBullets.removeChildren(in: [attacker])\n    \
  \    enemies.removeChildren(in: [attacker])\n    }\n}\n```\n\n我们在这里只添加了几行对新方法的调用。如果碰撞是“友军误伤”，比如两个敌人互相碰撞，我们会告诉每个敌人它受到了另一个敌人的友好碰撞。否则，在确定谁攻击了谁之后，我们告诉被攻击者它受到了另一个物体的攻击。最后，我们将攻击者从\
  \ `playerBullets` 节点和 `enemies` 节点中移除。我们告诉每个节点移除攻击者，尽管它只可能存在于其中之一，但这没关系。告诉一个节点移除它没有的子节点并不是错误——它只是没有任何效果。\n\
  \n### 为敌人添加自定义碰撞行为\n\n现在所有设置都已就绪，我们可以通过重写我们为 `SKNode` 添加的扩展方法，为节点实现一些具体的行为。选择 `EnemyNode.swift`\
  \ 并添加以下两个重写方法：\n\n```\noverride func friendlyBumpFrom(_ node: SKNode) {\n    physicsBody!.affectedByGravity\
  \ = true\n}\noverride func receiveAttacker(_ attacker: SKNode, contact: SKPhysicsContact)\
  \ {\n    physicsBody!.affectedByGravity = true\n    let force = vectorMultiply(attacker.physicsBody!.velocity,\
  \ contact.collisionImpulse)\n    let myContact = scene!.convert(contact.contactPoint,\
  \ to: self)\n    physicsBody!.applyForce(force, at: myContact)\n}\n```\n\n其中第一个方法\
  \ `friendlyBumpFrom()` 仅仅为受影响的敌人启用了重力。因此，如果一个敌人在运动中撞到了另一个敌人，第二个敌人会突然受到重力影响并开始向下坠落。\n\
  \n第二个方法 `receiveAttacker(_:contact:)` 在敌人被子弹击中时被调用。它首先为敌人启用重力。此外，它还利用传入的碰撞数据来确定碰撞发生的位置，并对该点施加一个力，从而在子弹发射的方向上给敌人一个额外的推力。\n\
  \n\n#### 显示玩家生命值\n\n再次运行游戏。你会发现可以射击敌人将其击倒。同时也会看到，任何被倒下的敌人撞到的其他敌人也会跟着倒下。\n\n> **注意**\n\
  >\n> 在每个关卡开始时，游戏世界会执行一步物理模拟，以确保没有物理体重叠。这在更高关卡中会产生一个有趣的副作用，因为随机放置的多个敌人重叠的概率会逐渐增加。一旦发生重叠，敌人会被立即移开以消除重叠，此时我们的碰撞处理代码会被触发，进而开启重力让它们坠落！这种表现并非我们最初设计游戏时有意为之，但它意外地让更高难度关卡逐渐变得更具挑战性，因此我们决定顺其自然。\n\
  \n如果玩家被坠落的敌人击中，生命值会减少，但……等等，它始终显示为 5！生命值显示仅在关卡创建时设置，之后从未更新。幸运的是，我们可以通过在`GameScene.swift`中为`playerLives`属性添加属性观察器来轻松修复，如下所示：\n\
  \n```swift\nprivate var playerLives: Int {\ndidSet {\nlet lives = childNode(withName:\
  \ \"LivesLabel\") as! SKLabelNode\nlives.text = \"Lives: \\(playerLives)\"\n}\n\
  }\n```\n\n上述代码使用我们之前在`init(size:levelNumber:)`方法中为标签指定的名称来查找该标签并设置新的文本值。再次运行游戏，你会发现当敌人不断砸向玩家时，生命值会逐渐减少至零。但游戏并未结束。经过多次被击中后，生命值会变为负数，如图\
  \ 17-9 所示。\n\n![A329781_3_En_17_Fig9_HTML.jpg](img/A329781_3_En_17_Fig9_HTML.jpg)\n\
  **图 17-9.** 由于没有游戏结束机制，生命值最终会变为负数\n\n出现这个问题的原因是我们还没有编写任何检测游戏结束的代码，即在玩家生命值归零时触发的逻辑。我们很快就会实现这一点，但首先让我们让屏幕上的碰撞效果更刺激一些。\n\
  \n### 用粒子效果增添趣味\n\nSpriteKit 的一大特色是内置了粒子系统。粒子系统在游戏中用于创建模拟烟雾、火焰、爆炸等视觉效果。目前，当我们的子弹击中敌人或敌人撞到玩家时，攻击对象只是简单地消失。让我们创建几个粒子系统来改善这一情况。\n\
  \n首先，按`⌘N`调出新建文件助手。在左侧选择 iOS 资源部分，然后在右侧选择 SpriteKit 粒子文件。点击下一步，在接下来的屏幕中选择`SparkKit`粒子模板。再次点击下一步，将该文件命名为`MissileExplosion.sks`。\n\
  \n#### 你的第一个粒子效果\n\n你会看到 Xcode 创建了粒子文件，并同时向项目中添加了一个名为`spark.png`的新资源。与此同时，整个 Xcode\
  \ 编辑区域会切换到新的粒子文件，并显示一个巨大的、带有动画效果的爆炸效果。我们不希望子弹击中敌人时出现如此夸张巨大的效果，因此需要重新配置它。定义该粒子动画的所有属性都可以在\
  \ SKNode 检查器中找到，按`Opt-Cmd-7`即可打开。图 17-10 展示了巨大的爆炸效果及其检查器。\n\n![A329781_3_En_17_Fig10_HTML.jpg](img/A329781_3_En_17_Fig10_HTML.jpg)\n\
  **图 17-10.** 右侧显示的参数定义了默认粒子的外观\n\n现在，针对子弹命中效果，我们将其设置为更小的爆炸。它将使用一套完全不同的参数，所有参数都可以在检查器中配置。首先，点击底部颜色渐变中的小色块并将其设置为黑色，以匹配游戏画面颜色。然后，将背景色改为白色，并将混合模式改为\
  \ Alpha。这时你会看到火焰喷泉变成了墨黑色。其余参数均为数值型。逐一修改它们，按照图 17-11 所示进行设置。在每一步调整中，你都会看到粒子效果随之变化，直到最终达到目标外观。\n\
  \n![A329781_3_En_17_Fig11_HTML.jpg](img/A329781_3_En_17_Fig11_HTML.jpg)\n**图 17-11.**\
  \ 这是我们想要的最终导弹爆炸粒子效果\n\n现在创建另一个粒子系统，同样使用 Spark 模板。将其命名为`EnemyExplosion.sks`，并按照图\
  \ 17-12 所示设置参数。\n\n![A329781_3_En_17_Fig12_HTML.jpg](img/A329781_3_En_17_Fig12_HTML.jpg)\n\
  **图 17-12.** 这是我们要创建的敌人爆炸效果。若你看到的本书是黑白版本，底部颜色渐变中选择的颜色是深红色\n\n### 在场景中添加粒子效果\n\n\
  现在让我们开始使用这些粒子。切换到`EnemyNode.swift`，并在`receiveAttacker(_:contact:)`方法底部添加如下粗体显示的代码：\n\
  \n```swift\noverride func receiveAttacker(_ attacker: SKNode, contact: SKPhysicsContact)\
  \ {\nphysicsBody!.affectedByGravity = true\nlet force = vectorMultiply(attacker.physicsBody!.velocity,\n\
  contact.collisionImpulse)\nlet myContact =\nscene!.convert(contact.contactPoint,\
  \ to: self)\nphysicsBody!.applyForce(force, at: myContact)\nlet path = Bundle.main.path(forResource:\
  \ \"MissileExplosion\",\nofType: \"sks\")\nlet explosion = NSKeyedUnarchiver.unarchiveObject(withFile:\
  \ path!)\nas! SKEmitterNode\nexplosion.numParticlesToEmit = 20\nexplosion.position\
  \ = contact.contactPoint\nscene!.addChild(explosion)\n}\n```\n\n运行游戏并射击一些敌人。你会看到每颗子弹击中敌人时都会产生漂亮的爆炸效果，如图\
  \ 17-13 所示。\n\n![A329781_3_En_17_Fig13_HTML.jpg](img/A329781_3_En_17_Fig13_HTML.jpg)\n\
  **图 17-13.** 子弹击中后的爆炸效果\n\n现在我们来处理敌人撞上玩家飞船的情况。选择`PlayerNode.swift`并添加以下方法：\n\n```swift\n\
  override func receiveAttacker(_ attacker: SKNode, contact: SKPhysicsContact) {\n\
  let path = Bundle.main.path (forResource: \"EnemyExplosion\",\nofType: \"sks\")\n\
  let explosion = NSKeyedUnarchiver.unarchiveObject(withFile: path!)\nas! SKEmitterNode\n\
  explosion.numParticlesToEmit = 50\nexplosion.position = contact.contactPoint\nscene!.addChild(explosion)\n\
  }\n```\n\n再次运行游戏。你会发现每次敌人撞到玩家时都会产生红色的爆炸效果，如图 17-14 所示。\n\n![A329781_3_En_17_Fig14_HTML.jpg](img/A329781_3_En_17_Fig14_HTML.jpg)\n\
  **图 17-14.** 敌机撞击玩家时的爆炸效果\n\n这些修改虽然简单，但显著提升了游戏的手感。现在当物体发生碰撞时，你会看到视觉反馈，并能直观地感受到事件的发生。\n\
  \n\n### 结束游戏\n\n如前所述，游戏中目前存在一个小问题。当生命值归零时，我们需要结束游戏。我们要做的是创建一个新的场景类，在游戏结束时进行切换。之前你见过我们在从一个关卡切换到下一个关卡时如何进行场景切换。这次类似，但使用了一个新类。因此，创建一个新的\
  \ iOS/Cocoa Touch 类。使用 `SKScene` 作为父类，并将新类命名为 `GameOverScene`。我们将从一个非常简单的实现开始，仅显示“游戏结束”文本，不做其他事情。通过将以下代码添加到\
  \ `GameOverScene.swift` 中来实现：\n\n```\nimport SpriteKit\nclass GameOverScene: SKScene\
  \ {\n    override init(size: CGSize) {\n        super.init(size: size)\n       \
  \ backgroundColor = SKColor.purple\n        let text = SKLabelNode(fontNamed: \"\
  Courier\")\n        text.text = \"Game Over\"\n        text.fontColor = SKColor.white\n\
  \        text.fontSize = 50\n        text.position = CGPoint(x: frame.size.width/2,\
  \ y: frame.size.height/2)\n        addChild(text)\n    }\n    required init?(coder\
  \ aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n}\n```\n\n现在，切换回\
  \ `GameScene.swift`。游戏结束时执行的基本操作由一个名为 `triggerGameOver()` 的新方法定义。这个方法中，我们会显示一个额外的爆炸效果，并触发现创建的另一个场景的切换：\n\
  \n```\nprivate func triggerGameOver() {\n    finished = true\n    let path = Bundle.main.path(forResource:\"\
  EnemyExplosion\", ofType: \"sks\")\n    let explosion = NSKeyedUnarchiver.unarchiveObject(withFile:\
  \ path!) as! SKEmitterNode\n    explosion.numParticlesToEmit = 200\n    explosion.position\
  \ = playerNode.position\n    scene!.addChild(explosion)\n    playerNode.removeFromParent()\n\
  \    let transition = SKTransition.doorsOpenVertical(withDuration: 1)\n    let gameOver\
  \ = GameOverScene(size: frame.size)\n    view!.presentScene(gameOver, transition:\
  \ transition)\n}\n```\n\n接下来，创建这个新方法，它将检查游戏是否结束，如果结束则调用 `triggerGameOver()`，并返回\
  \ `true` 表示游戏结束，返回 `false` 表示游戏仍在进行：\n\n```\nprivate func checkForGameOver() ->\
  \ Bool {\n    if playerLives == 0 {\n        triggerGameOver()\n        return true\n\
  \    }\n    return false\n}\n```\n\n最后，对现有的 `update()` 方法进行如下加粗所示的修改。它检查游戏结束状态，并且仅当游戏仍在进行时，才寻找可能的下一个关卡切换。否则，一个关卡中的最后一个敌人可能会消耗掉玩家的最后一条命，并同时触发两次场景切换。\n\
  \n```\noverride func update(_ currentTime: TimeInterval) {\n    /* Called before\
  \ each frame is rendered */\n    if finished {\n        return\n    }\n    updateBullets()\n\
  \    updateEnemies()\n    if (!checkForGameOver()) {\n        checkForNextLevel()\n\
  \    }\n}\n```\n\n现在再次运行游戏，让下方的敌人五次损坏你的飞船。你将看到游戏结束画面，如图 17-15 所示。\n\n![A329781_3_En_17_Fig15_HTML.jpg](img/A329781_3_En_17_Fig15_HTML.jpg)\n\
  \n图 17-15. 游戏结束画面\n\n### 创建 StartScene\n\n这就引出了另一个问题：游戏结束后我们能做什么？我们可以允许玩家点击屏幕重新开始游戏；但在考虑这个问题时，我突然想到一个想法：这个游戏难道不应该有一个某种形式的开始画面吗？这样玩家就不会在启动时立刻被扔进游戏中。而且游戏结束画面是否应该带你回到那里呢？当然，这两个问题的答案都是“是”。请继续创建另一个新的\
  \ iOS/Cocoa Touch 类，同样使用 `SKScene` 作为父类，这次将其命名为 `StartScene`。我们将制作一个超级简单的开始场景。它所做的全部事情就是显示一些文本，并在用户点击任意位置时开始游戏。将此处显示的所有代码添加到\
  \ `StartScene.swift` 中以完成此类：\n\n```\nimport SpriteKit\nclass StartScene: SKScene\
  \ {\n    override init(size: CGSize) {\n        super.init(size: size)\n       \
  \ backgroundColor = SKColor.green()\n        let topLabel = SKLabelNode(fontNamed:\
  \ \"Courier\")\n        topLabel.text = \"TextShooter\"\n        topLabel.fontColor\
  \ = SKColor.black()\n        topLabel.fontSize = 48\n        topLabel.position =\
  \ CGPoint(x: frame.size.width/2, y: frame.size.height * 0.7)\n        addChild(topLabel)\n\
  \        let bottomLabel = SKLabelNode(fontNamed: \"Courier\")\n        bottomLabel.text\
  \ = \"Touch anywhere to start\"\n        bottomLabel.fontColor = SKColor.black()\n\
  \        bottomLabel.fontSize = 20\n        bottomLabel.position = CGPoint(x: frame.size.width/2,\
  \ y: frame.size.height * 0.3)\n        addChild(bottomLabel)\n    }\n    required\
  \ init?(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\
  \    override func touchesBegan(_ touches: Set, with event: UIEvent?) {\n      \
  \  let transition = SKTransition.doorway(withDuration: 1.0)\n        let game =\
  \ GameScene(size:frame.size)\n        view!.presentScene(game, transition: transition)\n\
  \    }\n}\n```\n\n现在回到 `GameOverScene.swift`，以便让游戏结束场景切换至开始场景。添加以下代码：\n\n```\noverride\
  \ func didMove(to view: SKView) {\n    DispatchQueue.main.after(\n        when:\
  \ DispatchTime.now() + Double(3 * Int64(NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n\
  \        let transition = SKTransition.flipVertical(withDuration: 1)\n        let\
  \ start = StartScene(size: self.frame.size)\n        view.presentScene(start, transition:\
  \ transition)\n    }\n}\n```\n\n正如你之前所见，`didMoveToView()` 方法会在任何场景被放置到视图中后被调用。这里，我们简单地触发一个三秒的暂停，然后切换回开始场景。为了让所有场景能够正确地进行相互切换，还差最后一块拼图。我们需要修改应用程序的启动流程，使其不再直接跳入游戏，而是显示开始画面。这让我们回到\
  \ `GameViewController.swift`。在 `viewDidLoad()` 方法中，我们只需将创建一个场景类的代码替换为另一个即可：\n\n\
  ```\n/* Pick a size for the scene */\nlet scene = GameScene(size: view.frame.size,\
  \ levelNumber: 1)\n// Replace with:\nlet scene = StartScene(size: view.frame.size)\n\
  ```\n\n现在试一下。启动应用程序，你将看到开始画面。触摸屏幕，开始游戏，多次阵亡，最终你会来到游戏结束画面。等待几秒钟，你就会回到开始画面，如图 17-16\
  \ 所示。\n\n![A329781_3_En_17_Fig16_HTML.jpg](img/A329781_3_En_17_Fig16_HTML.jpg)\n\
  \n图 17-16. 游戏的开始画面\n\n\n\n### 添加音效\n\n我们一直在制作一款电子游戏，而电子游戏以嘈杂著称，但我们的游戏却完全静音。幸运的是，SpriteKit\
  \ 包含了极为易用的音频播放代码。在本章源代码的 `17 – Sound Effects` 文件夹中，你会发现预先准备好的音频文件：`enemyHit.wav`、`gameOver.wav`、`gameStart.wav`、`playerHit.wav`\
  \ 和 `shoot.wav`。将它们全部拖到 Xcode 的项目导航器中。\n\n现在，我们来为每种音效实现简单的播放功能。首先打开 `BulletNode.swift`，在\
  \ `bullet(from:toward:)` 方法的末尾，`return` 语句之前，添加以下加粗显示的代码：\n\n```\nbullet.run(SKAction.playSoundFileNamed(\"\
  shoot.wav\",\nwaitForCompletion: false))\n```\n\n接下来，切换到 `EnemyNode.swift`，在 `receiveAttacker(_:contact:)`\
  \ 方法的末尾添加以下几行代码：\n\n```\nrun(SKAction.playSoundFileNamed(\"enemyHit.wav\",\nwaitForCompletion:\
  \ false))\n```\n\n现在，在 `PlayerNode.swift` 中进行非常类似的操作，在 `receiveAttacker(_:contact:)`\
  \ 方法的末尾添加：\n\n```\nrun(SKAction.playSoundFileNamed(\"playerHit.wav\",\nwaitForCompletion:\
  \ false))\n```\n\n这些游戏内的音效目前已经足够了。现在可以运行游戏试试效果。我们相信你会同意，仅仅添加粒子和音效就能让游戏感觉好得多。\n\n\
  现在，让我们添加一些游戏开始和结束时的效果。在 `StartScene.swift` 中，在 `touchesBegan(_:withEvent:)` 方法的末尾添加以下代码：\n\
  \n```\nrun(SKAction.playSoundFileNamed(\"gameStart.wav\",\nwaitForCompletion: false))\n\
  ```\n\n最后，在 `GameScene.swift` 的 `triggerGameOver()` 方法末尾添加以下几行：\n\n```\nrun(SKAction.playSoundFileNamed(\"\
  gameOver.wav\",\nwaitForCompletion: false))\n```\n\n### 让游戏更难一点：力场\n\nSpriteKit\
  \ 最有趣的特性之一是在场景中放置力场的能力。一个力场具有类型、位置、作用区域以及若干其他指定其行为的属性。其理念是，当物体穿过由其 `region` 属性定义的力场影响范围时，该场会扰动物体的运动。你可以使用各种标准力场，只需创建并配置一个实例，然后将其添加到场景中即可。如果你雄心勃勃，甚至可以创建自定义力场。有关标准力场及其行为（包括重力场、电场、磁场和湍流）的列表，请查看\
  \ `SKFieldNode` 类的 API 文档。\n\n为了让游戏更有挑战性，我们将添加一些径向重力场到场景中。径向重力场的作用类似于一个集中在一点的大质量物体。当一个物体穿过径向重力场区域时，它会被偏转朝向（或离开，如果你想这样配置）该点，很像一颗足够靠近地球的流星飞过时所受的影响。我们将安排重力场作用于导弹，这样你就无法总是直接瞄准敌人并确保击中它了。让我们开始吧。\n\
  \n首先，我们需要在 `PhysicsCategories.swift` 中添加一个新类别。对该文件进行以下修改：\n\n```\nlet GravityFieldCategory:\
  \ UInt32 = 1 << 4\n```\n\n如果节点物理体中的 `fieldBitMask` 与力场的 `categoryBitMask` 存在任何共同类别，则该力场会作用于这个节点。默认情况下，物理体的\
  \ `fieldBitMask` 设置了所有类别，这意味着它将受到其范围内任何力场的影响。我们不希望玩家或敌人受到重力场的影响，因此需要通过添加以下代码来清除它们的\
  \ `fieldBitMask`，在 `EnemyNode.swift` 中：\n\n```\nprivate func initPhysicsBody() {\n\
  let body = SKPhysicsBody(rectangleOf: CGSize(width: 40, height: 40))\nbody.affectedByGravity\
  \ = false\nbody.categoryBitMask = EnemyCategory\nbody.contactTestBitMask = PlayerCategory\
  \ | EnemyCategory\nbody.mass = 0.2\nbody.angularDamping = 0\nbody.linearDamping\
  \ = 0\nbody.fieldBitMask = 0\nphysicsBody = body\n}\n```\n\n在 `PlayerNode.swift`\
  \ 中进行类似的更改：\n\n```\nprivate func initPhysicsBody() {\nlet body = SKPhysicsBody(rectangleOf:\
  \ CGSize(width: 20, height: 20))\nbody.affectedByGravity = false\nbody.categoryBitMask\
  \ = PlayerCategory\nbody.contactTestBitMask = EnemyCategory\nbody.collisionBitMask\
  \ = 0\nbody.fieldBitMask = 0\nphysicsBody = body\n}\n```\n\n即使我们不做任何操作，导弹节点也会响应重力场，因为它们的物理节点默认设置了所有力场类别，但显式设置会更清晰，因此对\
  \ `BulletNode.swift` 进行如下更改：\n\n```\noverride init() {\nsuper.init()\nlet dot =\
  \ SKLabelNode(fontNamed: \"Courier\")\ndot.fontColor = SKColor.black()\ndot.fontSize\
  \ = 40\ndot.text = \".\"\naddChild(dot)\nlet body = SKPhysicsBody(circleOfRadius:\
  \ 1)\nbody.isDynamic = true\nbody.categoryBitMask = PlayerMissileCategory\nbody.contactTestBitMask\
  \ = EnemyCategory\nbody.collisionBitMask = EnemyCategory\nbody.fieldBitMask = GravityFieldCategory\n\
  body.mass = 0.01\nphysicsBody = body\nname = \"Bullet \\(self)\"\n}\n```\n\n其余更改将在\
  \ `GameScene.swift` 文件中进行。我们将添加三个重力场，其中心点位于场景中心下方随机位置。就像我们处理导弹和敌人一样，我们将力场节点添加到一个父节点中，然后将该父节点添加到场景中。将父节点的定义添加为新的属性。\n\
  \n\n```swift\nclass GameScene: SKScene, SKPhysicsContactDelegate  {\nprivate var\
  \ levelNumber: Int\nprivate var playerLives: Int {\ndidSet {\nlet lives = childNode(withName:\
  \ \"LivesLabel\") as! SKLabelNode\nlives.text = \"Lives: \\(playerLives)\"\n}\n\
  }\nprivate var finished = false\nprivate let playerNode: PlayerNode = PlayerNode()\n\
  private let enemies = SKNode()\nprivate let playerBullets = SKNode()\nprivate let\
  \ forceFields = SKNode()\n```\n\n在`init(size:levelNumber:)`方法末尾，添加代码将`forceFields`节点添加到场景中，并创建实际的力场节点：\n\
  \n```swift\naddChild(forceFields)\ncreateForceFields()\nphysicsWorld.gravity = CGVector(dx:\
  \ 0, dy: -1)\nphysicsWorld.contactDelegate = self\n}\n```\n\n最后，添加`createForceFields()`方法的实现：\n\
  \n```swift\nprivate func createForceFields() {\nlet fieldCount = 3\nlet size = frame.size\n\
  let sectionWidth = Int(size.width)/fieldCount\nfor i in 0..<fieldCount {\nlet x\
  \ = CGFloat(UInt32(i * sectionWidth) +\narc4random_uniform(UInt32(sectionWidth)))\n\
  let y = CGFloat(arc4random_uniform(UInt32(size.height * 0.25))\n+ UInt32(size.height\
  \ * 0.25))\nlet gravityField = SKFieldNode.radialGravityField()\ngravityField.position\
  \ = CGPoint(x: x, y: y)\ngravityField.categoryBitMask = GravityFieldCategory\ngravityField.strength\
  \ = 4\ngravityField.falloff = 2\ngravityField.region = SKRegion(size: CGSize(width:\
  \ size.width * 0.3,\nheight: size.height * 0.1))\nforceFields.addChild(gravityField)\n\
  let fieldLocationNode = SKLabelNode(fontNamed: \"Courier\")\nfieldLocationNode.fontSize\
  \ = 16\nfieldLocationNode.fontColor = SKColor.red()\nfieldLocationNode.name = \"\
  GravityField\"\nfieldLocationNode.text = \"*\"\nfieldLocationNode.position = CGPoint(x:\
  \ x, y: y)\nforceFields.addChild(fieldLocationNode)\n}\n}\n```\n\n所有力场均由`SKFieldNode`类的实例表示。对于每种类型的场，`SKFieldNode`类都有一个工厂方法，用于创建该场类型的节点。这里，我们使用`radialGravityField()`方法创建了三个径向重力场实例。我们将它们放置在场景中心稍下方的一个带状区域内。`strength`和`falloff`属性控制重力场的强度以及随距离衰减的速度。`falloff`值为\
  \ 2 使得力与场节点到受物体距离的平方成反比，就像现实世界中一样。正值使场节点吸引其他物体。尝试不同的`strength`值（包括负值），观察效果的变化。我们还在与重力力场相同的位置创建了三个`SKLabelNode`，以便玩家可以看到它们的位置。这就是我们需要做的全部工作。构建并运行应用，观察当你的子弹飞近场景中的一个红色星号时会发生什么。\n\
  \n## 总结\n\n尽管`TextShooter`表面简单，但本章介绍的技术构成了使用 SpriteKit 进行各种游戏开发的基础。你学会了如何在多个节点类之间组织代码、使用节点图将对象分组等。你也初步体验了如何一次一个功能地构建这类游戏，并在此过程中探索每个步骤。当然，我们并未展示自己一路走来犯下的所有错误——即便如此，这本书已经超过\
  \ 800 页了——但即使算上这些错误，这个应用确实是从头开始构建的，大致按照本章所示的顺序，在短短几个小时内完成。\n\n一旦上手，SpriteKit 能让你在短时间内构建大量结构。如你所见，如果没有现成的图像，你可以使用基于文本的精灵。如果你想以后用真正的图形替换它们，也没有问题。一位早期读者甚至指出了一条中间路径：“与其在源代码的字符串中使用简单的\
  \ ASCII 文本，你可以通过 Apple 的字符查看器输入源插入表情符号字符。”将其实现作为留给读者的练习。\n\n"
- "# 18. 点按、触摸与手势\n\niPhone、iPod touch 和 iPad 的屏幕——清晰、明亮、触敏——是工程学的杰作。所有 iOS 设备通用的多点触控屏幕是该平台卓越可用性的关键因素之一。由于屏幕可以同时检测多个触摸并独立跟踪它们，应用程序能够检测到各种手势，赋予用户超越界面的强大能力。\n\
  \n假设你正在 Mail 应用中盯着要删除的一长串垃圾邮件。你可以逐一点击阅读，点击垃圾桶图标删除，然后等待下一封邮件下载，依次删除每一封。如果你想在删除前阅读每封邮件，这种方法最好。如果你有\
  \ iPhone 6s 或 iPhone 6s Plus，你甚至可以利用其 3D Touch 功能在不实际打开邮件的情况下预览。或者，在邮件列表中，你可以点击右上角的编辑按钮，点击每封邮件行进行标记，然后点击垃圾按钮删除所有标记的邮件。如果你不需要在删除前阅读每封邮件，这种方法最好。另一种方法是在列表中从右向左滑动某封邮件。该手势会为该邮件显示一个“更多”按钮和一个“删除”按钮。点击“删除”按钮，邮件即被删除。\n\
  \n这个例子只是多点触控屏幕所实现的众多手势之一。你可以在查看图片时捏合手指以缩小，或反向捏合以放大。在主屏幕上，长按图标可以进入“抖动模式”，从而从 iOS\
  \ 设备上删除应用；在 iPhone 6s 和 iPhone 6s 上，你可以调出一个支持 3D Touch 的应用的快捷方式列表。在本章中，我们将研究用于检测手势的底层架构。你将学习如何检测最常见的手势，以及如何创建和检测一个全新的手势。\n\
  \n\n## 多点触控术语\n\n在深入探讨架构之前，我们先介绍一些基本词汇。首先，手势是指从你用一个或多个手指触摸屏幕开始，直到手指离开屏幕为止所发生的任何一系列事件。无论耗时多久，只要有一根或多根手指保持接触屏幕，你就仍处于一个手势之中（除非有系统事件，例如来电，将其中断）。从某种意义上说，手势是一个动词，正在运行的应用程序可以监控用户的输入流，以判断是否有手势发生。手势通过一系列事件在系统中传递。当你与设备的多点触控屏幕交互时，便会生成事件。这些事件包含了有关所发生触摸或多次触摸的信息。\n\
  \n“触摸”一词指的是将手指放在屏幕上、在屏幕上拖动或从屏幕抬起手指。一个手势所涉及的触摸次数，等于同时放在屏幕上的手指数量。你实际上可以将全部五根手指都放在屏幕上，只要它们彼此之间不太靠近，iOS\
  \ 就能识别并追踪它们。实验表明，iPad 最多可同时处理 11 次触摸！这或许看起来有些夸张，但如果你正在开发一款多人游戏，多名玩家同时与屏幕交互时，这就很有用了。最新的\
  \ iOS 设备能够报告用户按压屏幕的力度，使得你可以实现依赖该信息的手势。\n\n当你用一根手指触摸屏幕然后立即抬起，且不移动手指时，就会发生一次点击。iOS\
  \ 设备会追踪点击的次数，并能告诉你用户是进行了双击、三击，甚至是二十次点击。例如，它处理了区分两次单击和一次双击所需的所有计时及其他工作。\n\n一个手势识别器对象知道如何监控用户生成的事件流，并识别出用户何时以匹配预定义手势的方式进行触摸和拖动。`UIGestureRecognizer`\
  \ 类及其各种子类可以帮助你在需要监控常见手势时，省去大量工作。该类封装了查找手势的工作，并且可以轻松应用于应用程序中的任何视图。\n\n在本章的第一部分，我们将了解当用户用一根或多根手指触摸屏幕时所报告的事件，以及如何追踪手指在屏幕上的移动。我们可以利用这些事件在自定义视图或应用程序委托中处理手势。接下来，我们将介绍\
  \ iOS SDK 自带的一些手势识别器，最后，你将看到如何构建自己的手势识别器。\n\n### 响应者链\n\n由于手势是通过事件在系统中传递，而事件又是通过响应者链传递，因此你需要了解响应者链的工作原理，才能妥善处理手势。如果你使用过\
  \ Cocoa for macOS（或之前的 OS X），你可能对响应者链的概念很熟悉，因为 Cocoa 和 Cocoa Touch 中使用了相同的基本机制。如果这是新知识，不用担心；我们将解释其工作原理。\n\
  \n#### 响应事件\n\n本书中多次提到过第一响应者，它通常是用户当前正在交互的对象。第一响应者是响应者链的起点，但它并非孤立存在。链中始终存在其他响应者。在正在运行的应用程序中，响应者链是一个能够响应用户事件的可变对象集合。任何以\
  \ `UIResponder` 作为其父类的类都是响应者。`UIView` 是 `UIResponder` 的子类，而 `UIControl` 是 `UIView`\
  \ 的子类，因此所有的视图和所有的控件都是响应者。`UIViewController` 也是 `UIResponder` 的子类，这意味着它是一个响应者，其所有子类，如\
  \ `UINavigationController` 和 `UITabBarController`，也都是响应者。因此，响应者之所以得名，是因为它们能够响应诸如屏幕触摸之类的系统生成事件。\n\
  \n如果一个响应者不处理某个特定事件（例如手势），它通常会将该事件向上传递给响应者链。如果链中的下一个对象响应了该特定事件，它通常会消耗该事件，从而阻止事件在响应者链中继续传递。在某些情况下，如果一个响应者只部分处理了一个事件，该响应者会执行某个操作，并将事件转发给链中的下一个响应者。不过，这并非通常情况。通常，当一个对象响应一个事件时，这就意味着该事件的终点。如果事件遍历了整个响应者链，且没有对象处理该事件，那么该事件就会被丢弃。\n\
  \n让我们更具体地看一下响应者链。一个事件首先会传递给 `UIApplication` 对象，该对象再将其传递给应用程序的 `UIWindow`。`UIWindow`\
  \ 通过选择一个初始响应者来处理事件。初始响应者的选择方式如下：\n\n*   对于触摸事件，`UIWindow` 对象会确定用户触摸的视图，然后将事件提供给为该视图或视图层次结构中任何更高级别视图注册的任何手势识别器。如果有任何手势识别器处理了该事件，事件便不再继续传递。如果没有，则初始响应者就是被触摸的视图，并且事件将被传递给它。\n\
  *   对于用户晃动设备（我们将在第 20 章中进一步介绍）或遥控设备生成的事件，该事件会传递给第一响应者。\n\n如果初始响应者不处理该事件，它会将事件传递给其父视图（如果有的话），或者如果该视图是视图控制器的视图，则传递给视图控制器。如果视图控制器不处理该事件，则它会通过视图层次结构向上传递到其父视图控制器（如果有的话）的响应者链中。\n\
  \n如果事件一路向上经过视图层次结构，却未被任何视图或控制器处理，则该事件会传递给应用程序的窗口。如果窗口不处理该事件，`UIApplication` 对象会将其传递给应用程序委托，前提是该委托是\
  \ `UIResponder` 的子类（如果你是从 Apple 的某个应用程序模板创建项目，通常情况就是如此）。最后，如果应用程序委托不是 `UIResponder`\
  \ 的子类或不处理该事件，那么该事件就会就此终结。\n\n这个过程之所以重要，原因有很多。首先，它控制了手势的处理方式。假设用户正在查看一个表格，并用手指在表格的一行上滑动。哪个对象来处理这个手势？如果滑动发生在作为表格视图单元格子视图的某个视图或控件内，那么该视图或控件将获得响应的机会。如果它不响应，则表格视图单元格有机会响应。在像\
  \ Mail 这样的应用程序中，滑动可用于删除邮件，表格视图单元格可能需要查看该事件以判断是否包含滑动手势。然而，大多数表格视图单元格并不响应手势。如果它们不响应，事件会向上传递到表格视图，然后继续向上传递到响应者链的其余部分，直到有对象响应该事件，或到达链的末端。\n\
  \n\n\n#### 转发事件：保持响应者链活跃\n\n让我们考虑一下邮件应用程序中的那个表格视图单元格。我们不知道 Apple 邮件应用的内部细节；不过，我们假设该表格视图单元格处理删除滑动操作，并且仅处理删除滑动。该表格视图单元格必须实现与接收触摸事件相关的方法（稍后讨论），以便它能检查该事件是否可以被解释为滑动手势的一部分。如果该事件与表格视图正在寻找的滑动操作匹配，那么表格视图单元格就会执行相应动作，事情就此结束；事件不再进一步传递。\n\
  \n如果该事件与表格视图单元格的滑动手势不匹配，那么表格视图单元格就有责任将该事件转发给响应者链中的下一个对象。如果它没有履行转发职责，那么表格视图以及链中更上层的其他对象将永远没有机会响应，应用程序也可能无法按用户预期的方式运行。该表格视图单元格可能会阻止其他视图识别手势。\n\
  \n每当你响应一个触摸事件时，都需要记住，你的代码并非在真空中运行。如果某个对象拦截了一个它不处理的事件，它需要手动将该事件传递下去。实现这一点的一种方法是在下一个响应者上调用相同的方法。我们在代码清单\
  \ 18-1 中看到了这样一个例子。\n\n```swift\nfunc respondToFictionalEvent(event: UIEvent) {\n\
  \    if shouldHandleEvent(event) {\n        handleEvent(event)\n    } else {\n \
  \       nextResponder().respondToFictionalEvent(event)\n    }\n}\n```\n\n*代码清单 18-1.\
  \ 将手势传递给其他地方处理*\n\n请注意，我们在下一个响应者上调用了相同的方法。这就是实现良好响应者链过程的方式。幸运的是，大多数时候，响应事件的方法也会消费该事件。然而，重要的是要知道，如果不是这种情况，你需要确保该事件被传递给响应者链中的下一个环节。\n\
  \n#### 多点触控架构\n\n既然我们已经简单讨论了响应者链，接下来让我们看看处理触摸的过程。正如我们之前指出的，触摸操作被嵌入在事件中，沿着响应者链传递。这意味着处理与多点触控屏幕任何交互的代码都需要包含在响应者链的某个对象中。通常，这意味着我们可以选择将代码嵌入到\
  \ `UIView` 的子类中，或者将代码嵌入到 `UIViewController` 中。那么，这段代码是属于视图还是视图控制器呢？\n\n如果视图需要根据用户的触摸对自己执行某些操作，那么代码很可能属于定义该视图的类。例如，许多控件类，如\
  \ `UISwitch` 和 `UISlider`，都会响应与触摸相关的事件。一个 `UISwitch` 可能想要根据触摸来打开或关闭自身。创建 `UISwitch`\
  \ 类的人将手势处理代码嵌入到类中，以便 `UISwitch` 能够响应触摸。然而，当被处理的手势影响的不仅仅是所触摸的对象时，手势代码通常应归属于相关的视图控制器类。例如，如果用户做一个手势触摸某一行，表示所有行都应该被删除，那么这个手势应该由视图控制器中的代码来处理。无论在哪种情况下，你响应触摸和手势的方式都是完全相同的，与代码所属的类无关。\n\
  \n#### 四种触摸通知方法\n\n有四种方法用于向响应者通知触摸事件。当用户首次触摸屏幕时，系统会寻找一个包含名为 `touchesBegan(_:withEvent:)`\
  \ 方法的响应者。为了获知用户何时开始一个手势或点击屏幕，可以在你的视图或视图控制器中实现这个方法。代码清单 18-2 展示了该方法可能的样子。\n\n```swift\n\
  override func touchesBegan(touches: Set, withEvent event: UIEvent?) {\n    if let\
  \ touch = touches.first {\n        let numTaps = touch.tapCount\n        let numTouches\
  \ = event?.allTouches()?.count\n    }\n    // 在这里做一些事情\n}\n```\n\n*代码清单 18-2. 发现手势或点击何时开始*\n\
  \n每当一根手指首次触摸屏幕时，就会分配一个新的 `UITouch` 对象来表示这根手指，并将其添加到与每个 `UIEvent` 一起传递的集合中，可以通过调用该事件的\
  \ `allTouches()` 方法来检索。所有后续报告同一手指活动的事件，在 `allTouches()` 集合中都将包含相同的 `UITouch` 实例（并且如果对应手指有新的活动需要报告，它也会出现在\
  \ `touches` 集合中），直到该手指从屏幕上移开。因此，要追踪任何特定手指的活动，你需要监控它的 `UITouch` 对象。\n\n你可以通过获取 `allTouches()`\
  \ 返回的对象数量，来确定当前按在屏幕上的手指数量。如果事件报告的触摸是某根手指一系列点击的一部分，你可以从该手指的 `UITouch` 对象的 `tapCount`\
  \ 属性获取点击次数。如果只有一根手指触摸屏幕，或者你不关心询问哪根手指，可以通过使用 `Set` 结构的 `first` 属性快速获取一个 `UITouch`\
  \ 对象进行查询。在前面的例子中，`numTaps` 值为 2 表示屏幕被至少一根手指快速连续点击了两次。类似地，`numTouches` 值为 2 表示用户有两根手指触摸屏幕。\n\
  \n并非 `touches` 或 `allTouches()` 集合中的所有对象都与实现此方法的视图或视图控制器相关。例如，一个表格视图单元格可能不关心其他行或导航栏中的触摸。你可以使用\
  \ `let myTouches = event?.touchesForView(self.view)` 从事件中获取落在特定视图内的触摸集合。\n\n每个 `UITouch`\
  \ 代表一根不同的手指，并且每根手指在屏幕上都位于不同的位置。你可以使用 `UITouch` 对象找出特定手指的位置。它甚至可以使用 `let point =\
  \ touch.locationInView(self.view) // point 的类型为 CGPoint` 将该点转换为视图的局部坐标系。\n\n当用户的手指在屏幕上移动时，你可以通过实现\
  \ `touchesMoved(_:withEvent:)` 来获得通知。在长时间的拖拽过程中，这个方法会被多次调用，每次你都会得到另一组触摸和另一个事件。除了能够从\
  \ `UITouch` 对象中获知每根手指的当前位置外，你还可以发现该触摸的先前位置，即上次调用 `touchesMoved(_:withEvent:)` 或\
  \ `touchesBegan(_:withEvent:)` 时手指的位置。\n\n当用户任何一根手指从屏幕上移开时，会调用另一个方法 `touchesEnded(_:withEvent:)`。当此方法被调用时，你就知道用户已完成了涉及该手指的某些交互。\n\
  \n响应者可能实现的最后一个与触摸相关的方法是：`touchesCancelled(_:withEvent:)`。当用户正在执行一系列操作，但中途发生某些事情中断了它（例如电话铃响）时，会调用此方法。在这里你可以进行任何必要的清理工作，以便可以重新开始一个新的手势。当此方法被调用时，对于当前这组触摸，`touchesEnded(_:withEvent:)`\
  \ 将不会被调用。\n\n\n\n## 创建 TouchExplorer 应用\n\n我们将构建一个小型应用，帮助您更直观地了解四个触摸相关响应方法的调用时机。在\
  \ Xcode 中，使用“单视图应用”模板创建一个新项目。将产品名称设置为 `TouchExplorer`，并在设备弹出菜单中选择 `Universal`。`TouchExplorer`\
  \ 会在每次调用触摸相关方法时，在屏幕上显示消息，指示触摸次数和点击次数。在支持 3D Touch 的设备上，它还会显示最近一次触摸事件中手指施加的压力，如图\
  \ 18-1 所示。\n\n![A329781_3_En_18_Fig1_HTML.jpg](img/A329781_3_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1.\n\n`TouchExplorer` 应用\n\n> **注意：** 尽管本章中的应用可以在模拟器上运行，但除非您在真实的 iOS 设备上运行，否则无法体验全部的多点触控或\
  \ 3D Touch 功能。3D Touch 需要 iPhone 6s 或 iPhone 6s Plus。\n\n本应用需要四个标签：一个用于指示最后调用的方法，一个用于报告当前的点击次数，一个用于报告触摸数量，最后一个用于\
  \ 3D Touch 压力值。单击 `ViewController.swift` 文件，并为视图控制器类添加四个输出口：\n\n```\nclass ViewController:\
  \ UIViewController {\n    @IBOutlet var messageLabel: UILabel!\n    @IBOutlet var\
  \ tapsLabel: UILabel!\n    @IBOutlet var touchesLabel: UILabel!\n    @IBOutlet var\
  \ forceLabel: UILabel!\n}\n```\n\n现在选择 `Main.storyboard` 来创建用户界面。您会看到所有此类新项目包含的常规空白视图。将一个标签拖到视图上，使用蓝色参考线将其放置在视图的左上角。按住\
  \ Option 键，从原始标签再拖出三个标签，将它们上下排列。这样您就获得了四个标签（参见图 18-1）。如果您想发挥创意，可以自由调整字体和颜色。完成后，选择最下方的标签，在属性检查器中将\
  \ `Lines` 属性设为 0，因为我们打算用它显示多行文本。\n\n接下来需要为标签设置自动布局约束。在文档大纲中，按住 Control 键从第一个标签拖拽到主视图并松开鼠标。按住\
  \ Shift 键选择 `Vertical Spacing to Top Layout Guide` 和 `Leading Space to Container\
  \ Margin`，然后按 Return 键。对另外三个标签重复相同操作。下一步是连接标签与输出口。按住 Control 键从“视图控制器”图标分别拖拽到四个标签，将最上面的标签连接到\
  \ `messageLabel` 输出口，第二个连接到 `tapsLabel`，第三个连接到 `touchesLabel`，最下面的连接到 `forceLabel`。最后，双击每个标签并按\
  \ Delete 键清除其文本。\n\n接下来，单击主视图背景或文档大纲中的“视图”图标，然后打开属性检查器（参见图 18-2）。在检查器的“视图”部分，确保“用户交互已启用”和“多点触控”都已勾选。如果“多点触控”未勾选，无论实际有多少根手指触摸屏幕，控制器类的触摸方法始终只会接收到一个触摸事件。\n\
  \n![A329781_3_En_18_Fig2_HTML.jpg](img/A329781_3_En_18_Fig2_HTML.jpg)\n\n图 18-2.\n\
  \n在视图属性中，“用户交互已启用”和“多点触控”都已勾选。\n\n完成后，切回 `ViewController.swift` 并做出修改，如代码清单 18-3\
  \ 所示。\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 加载视图后的其他初始设置（通常从\
  \ nib 文件加载）\n}\n\nprivate func updateLabelsFromTouches(_ touch: UITouch?, allTouches:\
  \ Set<UITouch>?) {\n    let numTaps = touch?.tapCount ?? 0\n    let tapsMessage\
  \ = \"检测到 \\(numTaps) 次点击\"\n    tapsLabel.text = tapsMessage\n\n    let numTouches\
  \ = allTouches?.count ?? 0\n    let touchMsg = \"检测到 \\(numTouches) 次触摸\"\n    touchesLabel.text\
  \ = touchMsg\n\n    if traitCollection.forceTouchCapability == .available {\n  \
  \      forceLabel.text = \"压力：\\(touch?.force ?? 0)\\n 最大压力：\\(touch?.maximumPossibleForce\
  \ ?? 0)\"\n    } else {\n        forceLabel.text = \"3D Touch 不可用\"\n    }\n}\n\n\
  override func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n  \
  \  messageLabel.text = \"触摸开始\"\n    updateLabelsFromTouches(touches.first, allTouches:\
  \ event?.allTouches())\n}\n\noverride func touchesCancelled(_ touches: Set<UITouch>,\
  \ with event: UIEvent?) {\n    messageLabel.text = \"触摸取消\"\n    updateLabelsFromTouches(touches.first,\
  \ allTouches: event?.allTouches())\n}\n\noverride func touchesEnded(_ touches: Set<UITouch>,\
  \ with event: UIEvent?) {\n    messageLabel.text = \"触摸结束\"\n    updateLabelsFromTouches(touches.first,\
  \ allTouches: event?.allTouches())\n}\n\noverride func touchesMoved(_ touches: Set<UITouch>,\
  \ with event: UIEvent?) {\n    messageLabel.text = \"检测到拖拽\"\n    updateLabelsFromTouches(touches.first,\
  \ allTouches: event?.allTouches())\n}\n```\n\n代码清单 18-3. 支持 `TouchExplorer` 的 `ViewController.swift`\
  \ 文件\n\n在这个控制器类中，我们实现了之前讨论的四个触摸相关方法。每个方法都会设置 `messageLabel`，让用户知道每个方法被调用的情况。接着，四个方法都调用\
  \ `updateLabelsFromTouches()` 来更新其他三个标签。`updateLabelsFromTouches()` 方法从当前触摸事件获取点击次数，通过检查接收到的触摸集合（取自\
  \ `UIEvent` 对象）的计数属性来确定触摸屏幕的手指数量，并用这些信息更新标签。它还获取并显示压力信息。让我们仔细看看这部分代码：\n\n```\nif\
  \ traitCollection.forceTouchCapability == .available {\n    forceLabel.text = \"\
  压力：\\(touch?.force ?? 0)\\n 最大压力：\n\\(touch?.maximumPossibleForce ?? 0)\"\n} else\
  \ {\n    forceLabel.text = \"3D Touch 不可用\"\n}\n```\n\n3D Touch 并非在所有设备上都可用，因此代码第一行使用\
  \ `UITraitCollection` 类的 `forceTouchCapability` 属性进行检查。每个视图控制器都有一个特征集合，这里我们使用应用中唯一视图控制器的特征集合进行检查。如果支持\
  \ 3D Touch，我们使用 `UITouch` 的 `force` 属性来了解用户当前按压屏幕的力度，并使用 `maximumPossibleForce`\
  \ 属性获取最大可能的压力值。如果 3D Touch 不可用，则直接显示提示信息。\n\n构建并运行应用。如果在模拟器中运行，请尝试反复点击屏幕以增加点击次数。您还可以尝试按住鼠标按钮并在视图中拖拽，以模拟触摸和拖拽操作。如果拥有支持\
  \ 3D Touch 的设备，请尝试以不同的力度按压，查看显示的压力数值。\n\n在 iOS 模拟器中，您可以按住 Option 键的同时点击并拖拽鼠标，来模拟双指捏合操作。您还可以模拟双指滑动：首先按住\
  \ Option 键模拟捏合，移动鼠标使代表虚拟手指的两个点相邻，然后同时按住 Shift 键（同时仍按住 Option 键）。按下 Shift 键会锁定两根手指的相对位置，使您能够执行滑动和其他双指手势。虽然无法执行需要三指或更多手指的手势，但通过\
  \ Option 和 Shift 键的组合，您可以在模拟器上完成大多数双指手势。\n\n\n\n如果你能在设备上运行这个程序，可以试试看同时能识别多少根手指的触摸。试着分别用一根、两根和三根手指拖动屏幕，再用单指或双指双击/三击屏幕，看看用两根手指点击时能否让点击计数增加。\n\
  \n请随意体验 `TouchExplorer` 应用，直到你对触控机制以及四种触摸方法的工作方式感到得心应手。准备好后，继续了解如何检测最常用的手势之一：滑动。\n\
  \n## 创建滑动检测应用\n\n我们将构建的应用功能很简单——仅检测水平和垂直方向的滑动。当你用手指从左向右、从右向左、从上向下或从下向上划过屏幕时，应用会在屏幕顶部显示一条持续数秒的提示信息（参见图\
  \ 18-3）。\n\n![A329781_3_En_18_Fig3_HTML.jpg](img/A329781_3_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3. 滑动检测应用可同时检测垂直和水平滑动\n\n## 使用触摸事件检测滑动\n\n检测滑动相对简单。我们将定义一个最小手势长度（以像素为单位），即用户滑动超过该距离才被视为有效滑动。同时定义一个允许偏差范围，即用户在滑动过程中偏离直线的最大距离仍能被识别为水平或垂直滑动。对角线通常不被视为滑动，但略微偏离水平或垂直方向的滑动仍会被识别。\n\
  \n当用户触摸屏幕时，我们会在变量中保存首次触摸的位置。随后在用户手指移动过程中，持续检测是否达到足够远的距离且足够笔直，从而判定为滑动。实际上，系统内置的手势识别器已能完美实现此功能，但我们将运用所学的触摸事件知识自行构建一个。现在开始动手吧。在\
  \ Xcode 中使用`Single View Application`模板创建新项目，将`Devices`设为`Universal`，项目名称命名为`Swipes`。单击`ViewController.swift`，在类中添加以下代码：\n\
  \n```\nclass ViewController: UIViewController {\n@IBOutlet var label: UILabel!\n\
  private var gestureStartPoint: CGPoint!\n```\n\n这段代码声明了一个标签插座变量，以及一个用于存储用户首次触摸位置的变量。\n\
  \n选择`Main.storyboard`打开进行编辑。确保视图控制器的视图已设置好——通过属性检查器勾选`User Interaction Enabled`和`Multiple\
  \ Touch`两个选项。从库中拖拽一个标签放到视图窗口的上部区域。将文本对齐方式设置为居中，并可根据需要调整其他文本属性以便于阅读。在文档大纲中，按住 Control\
  \ 键从标签拖拽到其父视图，松开鼠标后按住`Shift`键选择`Vertical Spacing to Top Layout Guide`和`Center Horizontally\
  \ in Container`，然后按`Return`。从`View Controller`图标拖拽连线到标签，连接到`label`插座变量。最后，双击标签并删除其文本内容。现在切换回`ViewController.swift`，更新代码为清单\
  \ 18-4 所示内容。\n\n```\nclass ViewController: UIViewController {\n@IBOutlet var label:\
  \ UILabel!\nprivate var gestureStartPoint: CGPoint!\nprivate static let minimumGestureLength\
  \ = Float(25.0)\nprivate static let maximumVariance = Float(5)\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 视图加载后的其他设置（通常来自 xib 文件）\n}\noverride func touchesBegan(_\
  \ touches: Set, with event: UIEvent?) {\nif let touch = touches.first {\ngestureStartPoint\
  \ = touch.location(in: self.view)\n}\n}\noverride func touchesMoved(_ touches: Set,\
  \ with event: UIEvent?) {\nif let touch = touches.first, gestureStartPoint = self.gestureStartPoint\
  \ {\nlet currentPosition = touch.location(in: self.view)\nlet deltaX = fabsf(Float(gestureStartPoint.x\
  \ - currentPosition.x))\nlet deltaY = fabsf(Float(gestureStartPoint.y - currentPosition.y))\n\
  if deltaX >= ViewController.minimumGestureLength\n&& deltaY = ViewController.minimumGestureLength\n\
  && deltaX <= ViewController.maximumVariance {\nlabel.text = \"检测到垂直滑动\"\nDispatchQueue.main.after(when:\
  \ DispatchTime.now() + Double(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n\
  self.label.text = \"\"\n}\n}\n}\n}\n}\n清单 18-4. 触摸应用中 ViewController.swift 文件的更新内容\n\
  \n我们先从`touchesBegan(_:withEvent:)`方法开始。这里只从`touches`集合中获取一个触摸对象并存储其触摸点。当前我们主要关注单指滑动，因此无需关心触摸的数量，直接获取集合中的第一个触摸点：\n\
  \n```\nif let touch = touches.first {\ngestureStartPoint = touch.location(in: self.view)\n\
  }\n```\n\n我们使用`touches`参数中的`UITouch`对象而非`UIEvent`中的对象，因为我们要跟踪触摸发生时的实时变化，而非所有活跃触摸的整体状态。在下一个方法`touchesMoved(_:withEvent:)`中，我们完成实际工作。首先获取用户手指的当前位置：\n\
  \n```\nif let touch = touches.first, gestureStartPoint = self.gestureStartPoint\
  \ {\nlet currentPosition = touch.location(in: self.view)\n```\n\n这里使用了`if let`语句的复合条件形式——同时确保当前存在触摸对象，且之前已存储手势起始点。实际应用中这两个条件通常都满足，但由于`touches.first`属性返回的是可选值（我们在本方法和`touchesBegan(_:withEvent:)`中都使用了该属性），我们必须进行这些检查，以防意外情况导致试图展开`nil`可选值而造成应用崩溃。\n\
  \n接下来，我们计算用户手指在水平和垂直方向上从起始点移动的距离。`fabsf()`是标准 C 数学库中的函数，用于返回浮点数的绝对值。这样我们可以直接计算差值而无需关心哪个值更大：\n\
  \n```\nlet deltaX = fabsf(Float(gestureStartPoint.x - currentPosition.x))\nlet deltaY\
  \ = fabsf(Float(gestureStartPoint.y - currentPosition.y))\n```\n\n得到两个差值后，我们检查用户是否在一个方向移动足够远，同时另一个方向移动未超过允许偏差。如果条件满足，则在标签中显示检测到水平或垂直滑动的提示。同时使用\
  \ GCD 的`DispatchQueue.main.after()`函数，在标签显示 2 秒后清除文本。这样用户可以多次练习滑动，无需担心标签显示的是之前的操作还是最新操作：\n\
  \n```\nif deltaX >= ViewController.minimumGestureLength\n&& deltaY = ViewController.minimumGestureLength\n\
  && deltaX <= ViewController.maximumVariance {\nlabel.text = \"检测到垂直滑动\"\nDispatchQueue.main.after(when:\
  \ DispatchTime.now() +\nDouble(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC))\
  \ {\nself.label.text = \"\"\n}\n}\n```\n\n构建并运行应用。如果发现点击拖动后没有可见效果，请耐心等待。尝试直接向下或水平直线拖动，直到掌握正确的滑动姿势。\n\
  \n\n\n### 自动手势识别\n\n我们刚刚用来检测滑动手势的操作并不算太差。所有复杂性都集中在 `touchesMoved(_:withEvent:)`\
  \ 方法中，但即使是那个方法也不算特别复杂。然而，有一种更简单的方法可以实现这一点。iOS 包含一个名为 `UIGestureRecognizer` 的类，它省去了监听所有事件来观察手指移动的麻烦。你无需直接使用\
  \ `UIGestureRecognizer`，而是创建其某个子类的实例，每个子类都设计用于识别特定类型的手势，例如轻扫、捏合、双击、三击等等。让我们看看如何修改\
  \ Swipes 应用，使其使用手势识别器，而不是我们手动编写的处理逻辑。和往常一样，你可能需要先复制一份 Swipes 项目文件夹，并以此为基础进行操作。在示例源代码归档文件中，你可以在\
  \ Swipes 2 文件夹中找到本应用的完整版本。\n\n首先，选中 `ViewController.swift`，删除 `touchesBegan(_:withEvent:)`\
  \ 和 `touchesMoved(_:withEvent:)` 这两个方法，因为不再需要它们，并在原位置添加几个新方法：\n\n```\nfunc reportHorizontalSwipe(_\
  \ recognizer:UIGestureRecognizer) {\n    label.text = \"Horizontal swipe detected\"\
  \n    DispatchQueue.main.after(when: DispatchTime.now() +\n        Double(Int64(2\
  \ * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n        self.label.text = \"\"\n \
  \   }\n}\nfunc reportVerticalSwipe(_ recognizer:UIGestureRecognizer) {\n    label.text\
  \ = \"Vertical swipe detected\"\n    DispatchQueue.main.after(when: DispatchTime.now()\
  \ +\n        Double(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n       \
  \ self.label.text = \"\"\n    }\n}\n```\n\n这些方法实现了轻扫手势提供的实际功能（如果可以这么称呼的话），就像之前的\
  \ `touchesMoved(_:withEvent:)` 方法一样，不同之处在于这里不再有任何检测实际滑动的代码。现在，将下面展示的新代码添加到 `viewDidLoad`\
  \ 方法中：\n\n```\nsuper.viewDidLoad()\n// Do any additional setup after loading the\
  \ view, typically from a nib.\nlet vertical = UISwipeGestureRecognizer(target: self,\
  \ action: \"reportVerticalSwipe:\")\nvertical.direction = [.up, .down]\nview.addGestureRecognizer(vertical)\n\
  let horizontal = UISwipeGestureRecognizer(target: self,\n    action: \"reportHorizontalSwipe:\"\
  )\nhorizontal.direction = [.left, .right]\nview.addGestureRecognizer(horizontal)\n\
  ```\n\n我们在这里所做的就是创建两个手势识别器——一个用于检测垂直方向的移动，另一个用于检测水平方向的移动。当其中任何一个识别到其配置的手势时，它就会调用\
  \ `reportVerticalSwipe()` 或 `reportHorizontalSwipe()` 方法，并相应地设置标签的文本。为了进一步清理代码，你还可以从\
  \ `ViewController.swift` 中删除 `gestureStartPoint` 属性的声明以及两个常量值。现在构建并运行应用，试试新的手势识别器。\n\
  \n从代码总行数来看，对于像这样的简单情况，这两种方法差别不大。但使用手势识别器的代码无疑更易于理解和编写。你完全不需要考虑计算手指随时间移动的问题，因为 `UISwipeGestureRecognizer`\
  \ 已经为你完成了这些。更棒的是，Apple 的手势识别系统是可扩展的，这意味着如果你的应用需要识别 Apple 识别器未涵盖的非常复杂的手势，你可以创建自己的识别器，并将复杂的代码（类似于我们之前看到的逻辑）封装在识别器类中，而不是污染你的视图控制器代码。本章稍后我们将构建一个这样的示例。与此同时，运行应用，你会看到它的行为与之前的版本完全相同。\n\
  \n### 实现多指轻扫\n\n在 Swipes 应用中，我们只关注单指轻扫，因此我们只获取了 `touches` 集合中的第一个对象来判断用户手指在滑动时的位置。如果你只对单指轻扫（最常用的轻扫类型）感兴趣，这种方法没问题。但如果你想处理双指或三指轻扫呢？在本书的早期版本中，我们用了大约\
  \ 50 行代码和相当的篇幅来解释如何通过跟踪多次触摸事件中的多个 `UITouch` 实例来实现这一点。现在有了手势识别器，这个问题已经解决了。`UISwipeGestureRecognizer`\
  \ 可以配置为识别任意数量的同时触摸。默认情况下，每个实例期望识别一根手指，但你可以对其进行配置，使其识别同时按压屏幕的任意数量的手指。每个实例只响应你指定的确切触摸次数，因此我们要做的就是在循环中创建一大堆手势识别器。\n\
  \n再复制一份 Swipes 项目文件夹来尝试这个功能——你可以在示例源代码归档文件的 Swipes 3 文件夹中找到完整版本。编辑 `ViewController.swift`，修改\
  \ `viewDidLoad` 方法，将其替换为下面所示的代码：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    for touchCount in 0..<5 {\n        let vertical = UISwipeGestureRecognizer(target:\
  \ self,\n            action: #selector(ViewController.reportVerticalSwipe(_:)))\n\
  \        vertical.direction = [.up, .down]\n        vertical.numberOfTouchesRequired\
  \ = touchCount\n        view.addGestureRecognizer(vertical)\n        let horizontal\
  \ = UISwipeGestureRecognizer(target: self,\n            action: #selector(ViewController.reportHorizontalSwipe(_:)))\n\
  \        horizontal.direction = [.left, .right]\n        horizontal.numberOfTouchesRequired\
  \ = touchCount\n        view.addGestureRecognizer(horizontal)\n    }\n}\n```\n\n\
  我们在这里所做的，是向视图添加 10 个不同的手势识别器——第一个识别单指垂直轻扫，第二个识别双指垂直轻扫，以此类推。当它们识别到各自的手势时，都会调用 `reportVerticalSwipe()`\
  \ 方法。第二组识别器处理水平轻扫，并调用 `reportHorizontalSwipe()` 方法。请注意，在真实应用中，你可能希望不同数量的手指在屏幕上滑动时触发不同的行为。使用手势识别器，你可以轻松做到这一点，只需让每个识别器调用不同的操作方法即可。\n\
  \n现在，我们只需通过添加一个方法来提供方便描述触摸次数的方式，然后在报告方法中使用它，如下所示，以更改日志输出。在 `ViewController` 类的底部，两个轻扫报告方法的上方，添加这个方法：\n\
  \n```\nfunc descriptionForTouchCount(_ touchCount:Int) -> String {\n    switch touchCount\
  \ {\n    case 1:\n        return \"单指\"\n    case 2:\n        return \"双指\"\n  \
  \  case 3:\n        return \"三指\"\n    case 4:\n        return \"四指\"\n    case\
  \ 5:\n        return \"五指\"\n    default:\n        return \"\"\n    }\n}\n```\n\n\
  接下来，按如下方式修改两个轻扫报告方法：\n\n```\nfunc reportHorizontalSwipe(_ recognizer:UIGestureRecognizer)\
  \ {\n    label.text = \"Horizontal swipe detected\"\n    let count = descriptionForTouchCount(recognizer.numberOfTouches())\n\
  \    label.text = \"检测到\\(count)水平轻扫\"\n    DispatchQueue.main.after(when: DispatchTime.now()\
  \ +\n        Double(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n       \
  \ self.label.text = \"\"\n    }\n}\nfunc reportVerticalSwipe(_ recognizer:UIGestureRecognizer)\
  \ {\n    label.text = \"Vertical swipe detected\"\n    let count = descriptionForTouchCount(recognizer.numberOfTouches())\n\
  \    label.text = \"检测到\\(count)垂直轻扫\"\n    DispatchQueue.main.after(when: DispatchTime.now()\
  \ +\n        Double(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\n       \
  \ self.label.text = \"\"\n    }\n}\n```\n\n\n\n构建并运行应用。你应该能够触发双指和三指滑动（两种方向均可），同时仍能触发单指滑动。如果你的手指较小，甚至可能触发四指或五指滑动。\n\
  \n**提示**\n\n在模拟器中，如果按住`Option`键，会出现一对代表两根手指的圆点。让它们靠近彼此，然后按住`Shift`键。这样会保持这两个圆点之间的相对位置不变，使你能够将这对“手指”在屏幕上移动。然后，点击并向下拖动屏幕，即可模拟双指滑动。\n\
  \n在使用多指滑动时，需要注意一点：你的手指不能靠得太近。如果两根手指非常接近，它们可能会被识别为单次触摸。正因如此，你不应该将四指或五指滑动用于任何重要的手势，因为很多人的手指较粗，无法有效地完成这些滑动操作。此外，在\
  \ iPad 上，系统层级默认开启了某些四指和五指手势，用于切换应用或返回主屏幕。这些手势可以在“设置”应用中关闭，但你最好还是不要在自己的应用中使用此类手势。\n\
  \n### 检测多次点击\n\n在`TouchExplorer`应用中，我们将点击次数打印到了屏幕上，因此你已经知道检测多次点击是多么简单。然而，实际情况并非看起来那么简单，因为你通常希望根据点击次数执行不同的操作。如果用户三次点击，你会分别收到三次通知：依次是单次点击、双击，最后是三次点击。如果你希望在双击时执行某个操作，而在三次点击时执行完全不同的操作，那么收到三次独立的通知可能会引发问题，因为你将首先收到双击通知，然后才收到三次点击通知。除非你编写巧妙的代码来应对这种情况，否则最终两个操作都会执行。幸运的是，苹果公司预见到了这种情况，并提供了一种机制，让多个手势识别器能够良好地协同工作，即使它们面对的是可能看似能触发其中任何一个的模糊输入。其基本思路是，你对某个手势识别器施加限制，告知它除非其他某个手势识别器未能触发其自身方法，否则不要触发其关联的方法。\n\
  \n这听起来有点抽象，我们把它具体化。点击手势由`UITapGestureRecognizer`类识别。可以配置一个点击识别器，使其在发生特定次数的点击时执行操作。假设我们有一个视图，希望为其定义当用户单击或双击时发生的不同操作。你可能从如下代码开始：\n\
  \n```\nlet singleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.singleTap))\n\
  singleTap.numberOfTapsRequired = 1\nsingleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(singleTap)\n\
  let doubleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.doubleTap))\n\
  doubleTap.numberOfTapsRequired = 2\ndoubleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(doubleTap)\n\
  ```\n\n这段代码的问题在于，两个识别器彼此不知道对方的存在，也无法知道用户的交互可能更适合另一个识别器。如果用户在上述代码的视图中双击，会调用`doDoubleTap()`方法，但同时也会调用`doSingleMethod()`方法——而且会调用两次！每次点击都会调用一次。\n\
  \n解决方法是创建一个失败要求。我们告诉`singleTap`，只有当`doubleTap`未能识别并响应用户输入时，它才应触发其操作，添加如下一行代码即可：\n\
  \n```\nsingleTap.require(toFail: doubleTap)\n```\n\n这意味着，当用户点击一次时，`singleTap`不会立即执行其工作。相反，`singleTap`会等待，直到它确定`doubleTap`已决定不再关注当前手势（例如，用户没有进行第二次点击）。我们将在下一个项目中进一步扩展这个概念。\n\
  \n在 Xcode 中，使用“Single View Application”模板创建一个新项目。将此项目命名为`Taps`，并使用“Devices”弹出菜单选择“Universal”。此应用将包含四个标签，分别用于告知我们何时检测到单击、双击、三击和四击（参见图\
  \ 18-4）。\n\n![A329781_3_En_18_Fig4_HTML.jpg](img/A329781_3_En_18_Fig4_HTML.jpg)\n\
  \n**图 18-4.** `Taps`应用能够检测最多连续四次点击\n\n我们需要这四个标签的插座变量，还需要为每种点击场景准备独立的方法，以模拟真实应用中的情况。我们还将包含一个用于清除文本字段的方法。打开`ViewController.swift`并将标签插座变量添加到类中：\n\
  \n```\nclass ViewController: UIViewController {\n@IBOutlet var singleLabel:UILabel!\n\
  @IBOutlet var doubleLabel:UILabel!\n@IBOutlet var tripleLabel:UILabel!\n@IBOutlet\
  \ var quadrupleLabel:UILabel!\n```\n\n\n\n保存文件并选择`Main.storyboard`来编辑 GUI。进入后，从库中添加四个标签到视图中，并将它们上下排列。在属性检查器中，将每个标签的文本对齐方式设置为居中。在文档结构中，按住\
  \ Control 键从顶部标签拖拽到其父视图并释放鼠标。按住 Shift 键并选择`Vertical Spacing to Top Layout Guide`和`Center\
  \ Horizontally in Container`，然后按回车键。对其余三个标签重复相同操作，以设置它们的自动布局约束。完成后，按住 Control 键从视图控制器图标拖拽到每个标签，并分别连接到`singleLabel`、`doubleLabel`、`tripleLabel`和`quadrupleLabel`。最后，确保双击每个标签并按删除键清除所有文本。现在选择`ViewController.swift`，并进行如列表\
  \ 18-5 所示的代码更改。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do\
  \ any additional setup after loading the view, typically from a nib.\nlet singleTap\
  \ = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.singleTap))\n\
  singleTap.numberOfTapsRequired = 1\nsingleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(singleTap)\n\
  let doubleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.doubleTap))\n\
  doubleTap.numberOfTapsRequired = 2\ndoubleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(doubleTap)\n\
  singleTap.require(toFail: doubleTap)\nlet tripleTap = UITapGestureRecognizer(target:\
  \ self,\naction: #selector(ViewController.tripleTap))\ntripleTap.numberOfTapsRequired\
  \ = 3\ntripleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(tripleTap)\n\
  doubleTap.require(toFail: tripleTap)\nlet quadrupleTap = UITapGestureRecognizer(target:\
  \ self,\naction: #selector(ViewController.quadrupleTap))\nquadrupleTap.numberOfTapsRequired\
  \ = 4\nquadrupleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(quadrupleTap)\n\
  tripleTap.require(toFail: quadrupleTap)\n}\nfunc singleTap() {\nshowText(\"Single\
  \ Tap Detected\", inLabel: singleLabel)\n}\nfunc doubleTap() {\nshowText(\"Double\
  \ Tap Detected\", inLabel: doubleLabel)\n}\nfunc tripleTap() {\nshowText(\"Triple\
  \ Tap Detected\", inLabel: tripleLabel)\n}\nfunc quadrupleTap() {\nshowText(\"Quadruple\
  \ Tap Detected\", inLabel: quadrupleLabel)\n}\nprivate func showText(_ text: String,\
  \ inLabel label: UILabel) {\nlabel.text = text\nDispatchQueue.main.after(when: DispatchTime.now()\
  \ +\nDouble(Int64(2 * NSEC_PER_SEC)) / Double(NSEC_PER_SEC)) {\nlabel.text = \"\"\
  \n}\n}\nListing 18-5.\nThe Taps App Changes to the ViewController.swift File\n```\n\
  \n四个轻击方法在此应用中仅用于设置四个标签之一，并使用`DispatchQueue.main.after()`在 2 秒后清除该标签。有趣的部分在于`viewDidLoad`方法中的操作。我们从一个简单的手势识别器开始，并将其附加到视图上：\n\
  \n```\nlet singleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.singleTap))\n\
  singleTap.numberOfTapsRequired = 1\nsingleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(singleTap)\n\
  ```\n\n请注意，我们同时设置了触发动作所需的轻击次数（在同一位置连续轻击）和触摸点数（同时触摸屏幕的手指数量）为 1。之后，我们设置了另一个轻击手势识别器来处理双击：\n\
  \n```\nlet doubleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.doubleTap))\n\
  doubleTap.numberOfTapsRequired = 2\ndoubleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(doubleTap)\n\
  singleTap.require(toFail: doubleTap)\n```\n\n这段代码与之前的代码非常相似，直到最后一行，我们为`singleTap`提供了额外的上下文。我们实际上是在告诉`singleTap`，它应该仅在另一个手势识别器（本例中为`doubleTap`）确定当前用户输入不是它所寻找的情况下触发其动作。\n\
  \n让我们思考这意味着什么。有了这两个轻击手势识别器，视图中的一次轻击会立即让`singleTap`认为：“嘿，这看起来像是针对我的。”同时，`doubleTap`会认为：“嘿，这看起来可能也是针对我的，但我需要再等一次轻击。”由于`singleTap`被设置为等待`doubleTap`的“失败”，它不会立即触发其动作方法；而是等待观察`doubleTap`的情况。\n\
  \n在第一次轻击之后，如果紧接着发生另一次轻击，`doubleTap`会说：“嘿，这完全是针对我的，”并触发其动作。此时，`singleTap`会意识到发生了什么并放弃该手势。另一方面，如果经过了一段特定时间（系统认为双击中两次轻击之间的最大时间间隔），`doubleTap`会放弃，`singleTap`会看到失败并最终触发其事件。方法的其余部分继续定义了三连击和四连击的手势识别器，并在每个点配置一个手势依赖于下一个手势的失败：\n\
  \n```\nlet tripleTap = UITapGestureRecognizer(target: self,\naction: #selector(ViewController.tripleTap))\n\
  tripleTap.numberOfTapsRequired = 3\ntripleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(tripleTap)\n\
  doubleTap.require(toFail: tripleTap)\nlet quadrupleTap = UITapGestureRecognizer(target:\
  \ self,\naction: #selector(ViewController.quadrupleTap))\nquadrupleTap.numberOfTapsRequired\
  \ = 4\nquadrupleTap.numberOfTouchesRequired = 1\nview.addGestureRecognizer(quadrupleTap)\n\
  tripleTap.require(toFail: quadrupleTap)\n```\n\n请注意，我们不需要显式地配置每个手势都依赖于更高轻击次数手势的失败。这种多重依赖关系自然而然地源于代码中建立的失败链。由于`singleTap`需要`doubleTap`失败，`doubleTap`需要`tripleTap`失败，而`tripleTap`需要`quadrupleTap`失败。由此扩展，`singleTap`需要所有其他手势都失败。\n\
  \n构建并运行应用。无论你进行单次、两次、三次还是四次轻击，在序列结束时你应该只看到一个标签显示。大约一秒半后，标签会自行清除，你可以再次尝试。\n\n\n\n\
  ### 检测捏合与旋转手势\n\n另一种常见手势是双指捏合。它在许多应用（例如移动版 Safari、邮件和照片）中用于让你放大（双指张开）或缩小（双指合拢）。借助`UIPinchGestureRecognizer`，检测捏合变得非常简单。它被称为连续手势识别器，因为在捏合过程中会反复调用其动作方法。手势进行时，识别器会经历多个状态。当手势被识别时，识别器处于`UIGestureRecognizerState.began`状态，其`scale`属性会被设置为初始值`1.0`；在后续手势过程中，状态变为`UIGestureRecognizerState.changed`，`scale`值会根据用户手指从起始位置移动的距离上下变化。我们将使用`scale`值来调整图像大小。最后，状态会变为`UIGestureRecognizerState.ended`。\n\
  \n另一种常见手势是双指旋转。它也是一个连续手势识别器，名为`UIRotationGestureRecognizer`。它有一个`rotation`属性，手势开始时默认为`0.0`，然后随着用户旋转手指，该值从`0.0`变化到`2.0\
  \ * PI`。在下一个例子中，我们将同时使用捏合和旋转手势。在 Xcode 中创建一个新项目，同样使用单视图应用模板，并将其命名为 PinchMe。首先，将示例源代码归档中`18\
  \ - Image`文件夹里的漂亮图片`yosemite-meadows.png`（或你喜欢的其他照片）拖放到项目中的`Assets.xcassets`。然后，对`ViewController.swift`文件进行清单\
  \ 18-6 所示的修改。\n\n```\nclass ViewController: UIViewController, UIGestureRecognizerDelegate\
  \ {\n    private var imageView: UIImageView!\n    private var scale = CGFloat(1)\n\
  \    private var previousScale = CGFloat(1)\n    private var rotation = CGFloat(0)\n\
  \    private var previousRotation = CGFloat(0)\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n        let image = UIImage(named: \"yosemite-meadows\"\
  )\n        imageView = UIImageView(image: image)\n        imageView.isUserInteractionEnabled\
  \ = true\n        imageView.center = view.center\n        view.addSubview(imageView)\n\
  \n        let pinchGesture = UIPinchGestureRecognizer(target: self,\n          \
  \  action: #selector(ViewController.doPinch(_:)))\n        pinchGesture.delegate\
  \ = self\n        imageView.addGestureRecognizer(pinchGesture)\n\n        let rotationGesture\
  \ = UIRotationGestureRecognizer(target: self,\n            action: #selector(ViewController.doRotate(_:)))\n\
  \        rotationGesture.delegate = self\n        imageView.addGestureRecognizer(rotationGesture)\n\
  \    }\n\n    func gestureRecognizer(_ gestureRecognizer: UIGestureRecognizer,\n\
  \        shouldRecognizeSimultaneouslyWith\n        otherGestureRecognizer: UIGestureRecognizer)\
  \ -> Bool {\n        return true\n    }\n\n    func transformImageView() {\n   \
  \     var t = CGAffineTransform(scaleX: scale * previousScale, y: scale * previousScale)\n\
  \        t = t.rotate(rotation + previousRotation)\n        imageView.transform\
  \ = t\n    }\n\n    func doPinch(_ gesture: UIPinchGestureRecognizer) {\n      \
  \  scale = gesture.scale\n        transformImageView()\n        if gesture.state\
  \ == .ended {\n            previousScale = scale * previousScale\n            scale\
  \ = 1\n        }\n    }\n\n    func doRotate(_ gesture: UIRotationGestureRecognizer)\
  \ {\n        rotation = gesture.rotation\n        transformImageView()\n       \
  \ if gesture.state == .ended {\n            previousRotation = rotation + previousRotation\n\
  \            rotation = 0\n        }\n    }\n}\n```\n\n首先，我们为当前和之前的缩放及旋转值定义了四个实例变量。之前的值是在之前触发并结束的手势识别器中获得的；我们还需要跟踪这些值，因为用于缩放的`UIPinchGestureRecognizer`和用于旋转的`UIRotationGestureRecognizer`总是从默认的`1.0`缩放和`0.0`旋转位置开始。接下来，在`viewDidLoad()`中，我们首先创建一个`UIImageView`用于捏合和旋转，将约塞米蒂图片加载到其中，并将其居中放置在主视图内。我们必须记得在图像视图上启用用户交互，因为`UIImageView`是少数默认禁用用户交互的\
  \ UIKit 类之一。\n\n```\nlet image = UIImage(named: \"yosemite-meadows\")\nimageView\
  \ = UIImageView(image: image)\nimageView.isUserInteractionEnabled = true\nimageView.center\
  \ = view.center\nview.addSubview(imageView)\n```\n\n接着，我们设置一个捏合手势识别器和一个旋转手势识别器。我们分别通过`doPinch()`和`doRotate()`方法告知它们在其手势被识别时通知我们。我们让两者都使用`self`作为其代理：\n\
  \n```\nlet pinchGesture = UIPinchGestureRecognizer(target: self,\n    action: #selector(ViewController.doPinch(_:)))\n\
  pinchGesture.delegate = self\nimageView.addGestureRecognizer(pinchGesture)\n\nlet\
  \ rotationGesture = UIRotationGestureRecognizer(target: self,\n    action: #selector(ViewController.doRotate(_:)))\n\
  rotationGesture.delegate = self\nimageView.addGestureRecognizer(rotationGesture)\n\
  ```\n\n在`gestureRecognizer(_:shouldRecognizeSimultaneouslyWith:)`方法（这是我们需要实现`UIGestureRecognizerDelegate`协议中的唯一方法）中，我们始终返回`true`，以允许我们的捏合和旋转手势协同工作；否则，先启动的手势识别器总是会阻止另一个：\n\
  \n```\nfunc gestureRecognizer(_ gestureRecognizer: UIGestureRecognizer,\n    shouldRecognizeSimultaneouslyWith\n\
  \    otherGestureRecognizer: UIGestureRecognizer) -> Bool {\n    return true\n}\n\
  ```\n\n接下来，我们实现一个辅助方法，用于根据手势识别器的当前缩放和旋转值来变换图像视图。请注意，我们将当前缩放乘以之前的缩放，并将当前旋转加上之前的旋转。这样，当新手势从默认的`1.0`缩放和`0.0`旋转开始时，我们可以根据先前完成的捏合和旋转进行调整。\n\
  \n```\nfunc transformImageView() {\n    var t = CGAffineTransform(scaleX: scale\
  \ * previousScale, y: scale * previousScale)\n    t = t.rotate(rotation + previousRotation)\n\
  \    imageView.transform = t\n}\n```\n\n最后，我们实现动作方法，这些方法从手势识别器获取输入，并更新图像视图的变换。在`doPinch()`和`doRotate()`中，我们首先提取新的`scale`或`rotation`值。接着，更新图像视图的变换。最后，如果手势识别器报告其手势已结束（`state`等于`UIGestureRecognizerState.ended`），我们将存储当前正确的缩放或旋转值，然后将当前的缩放或旋转值重置为默认的`1.0`缩放或`0.0`旋转：\n\
  \n```\nfunc doPinch(_ gesture: UIPinchGestureRecognizer) {\n    scale = gesture.scale\n\
  \    transformImageView()\n    if gesture.state == .ended {\n        previousScale\
  \ = scale * previousScale\n        scale = 1\n    }\n}\n\nfunc doRotate(_ gesture:\
  \ UIRotationGestureRecognizer) {\n    rotation = gesture.rotation\n    transformImageView()\n\
  \    if gesture.state == .ended {\n        previousRotation = rotation + previousRotation\n\
  \        rotation = 0\n    }\n}\n```\n\n这就是捏合和旋转检测的全部内容。构建并运行应用程序试试看。当你进行捏合和旋转操作时，你会看到图像随之响应（见图\
  \ 18-5）。如果你在模拟器上运行，请记住，你可以通过按住 Option 键，然后在模拟器窗口中用鼠标点击并拖拽来模拟捏合操作。\n\n![A329781_3_En_18_Fig5_HTML.jpg](img/A329781_3_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5. PinchMe 应用检测捏合和旋转手势。\n\n\n\n## 总结\n\n现在您应该已经了解了 iOS 用于向应用程序通知触摸、轻点和手势的机制。您还学习了如何检测最常用的\
  \ iOS 手势。我们还看到了几个使用全新 3D Touch 功能的基础示例。这方面的内容远不止我们在此所能涵盖——如需了解完整细节，请参考 Apple 关于该主题的文档，您可以在\
  \ [`developer.apple.com/library/ios/documentation/UserExperience/Conceptual/Adopting3DTouchOniPhone/`](https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/Adopting3DTouchOniPhone/)\
  \ 找到它。\n\niOS 用户界面在很大程度上依赖手势来提供易用性，因此在大多数 iOS 开发中，您都需要准备好掌握这些技术。在下一章中，我们将告诉您如何通过\
  \ Core Location 来确定您在世界上的位置。\n\n# 19. 确定位置\n\n每台 iOS 设备都具备通过名为 Core Location 的框架来确定其全球位置的能力。iOS\
  \ 还包含了 Map Kit 框架，它可以让您轻松创建一个实时交互式地图，显示您喜欢的任何位置，当然也包括用户的位置。在本章中，我们将使用这两个框架。实际上，Core\
  \ Location 可以利用三种技术来实现这一功能：GPS、蜂窝基站 ID 定位和 Wi-Fi 定位服务（WPS）。在这三种技术中，GPS 提供最精确的定位，但它不适用于第一代\
  \ iPhone、iPod touch 或仅支持 Wi-Fi 的 iPad。简而言之，任何至少具有 3G 数据连接的设备也都包含 GPS 单元。GPS 通过读取来自多颗卫星的微波信号来确定当前位置。\n\
  \n**注意：** Apple 使用一种名为辅助 GPS（即 A-GPS）的 GPS 版本。A-GPS 利用网络资源来帮助提升独立 GPS 的性能。其基本思想是，电信运营商在其网络上部署服务，移动设备会自动发现这些服务并从中收集一些数据。这使得移动设备能够比仅依赖\
  \ GPS 卫星时更快地确定其起始位置。\n\n蜂窝基站 ID 定位根据设备当前所连接蜂窝基站的实际物理位置，对当前位置进行粗略估算。由于每个基站可以覆盖相当大的区域，因此这里的误差范围相当大。蜂窝基站\
  \ ID 定位需要蜂窝无线电连接，因此仅适用于 iPhone（所有型号，包括初代）和任何具有 3G 数据连接的 iPad。WPS 选项利用附近 Wi-Fi 接入点的媒体访问控制（MAC）地址，通过引用已知服务提供商及其服务区域的大型数据库来猜测您的位置，但其误差可能达到一英里甚至更多。\n\
  \n这三种方法都会显著消耗电池电量，因此在使用 Core Location 时请牢记这一点。您的应用程序不应比绝对必要的频率更频繁地轮询位置。使用 Core Location\
  \ 时，您可以选择指定所需的精度。通过仔细指定您所需的最低精度级别，可以避免不必要的电池消耗。Core Location 所依赖的技术对您的应用程序是隐藏的。我们无需告诉\
  \ Core Location 是使用 GPS、三角测量还是 WPS。我们只需告诉它我们期望的精度，它将根据可用的技术自行决定哪种最适合满足我们的请求。\n\n\
  ## 位置管理器\n\nApple 提供了非常易于使用的 Core Location API。我们将使用的主要类是 `CLLocationManager`，通常称为位置管理器。要与\
  \ Core Location 交互，您需要创建一个位置管理器实例：\n\n```\nlet locationManager = CLLocationManager()\n\
  ```\n\n这将创建一个位置管理器的实例，但它实际上并不会开始轮询您的位置。您必须创建一个符合 `CLLocationManagerDelegate` 协议的对象，并将其分配为位置管理器的委托。当位置信息可用或发生变化时，位置管理器将调用委托方法。确定位置的过程可能需要一些时间——甚至几秒钟。\n\
  \n### 设置所需精度\n\n设置委托后，您还需要设置所需的精度。如前所述，请不要指定超出您绝对需要的精度级别。如果您正在编写的应用程序只需要知道手机所在的州或国家，请不要指定高精度。请记住，您对\
  \ Core Location 要求的精度越高，消耗的电量可能就越多。此外，请记住，无法保证您能获得所请求的精度级别。下面的示例展示了如何设置委托并请求特定的精度：\n\
  \n```\nlocationManager.delegate = self\nlocationManager.desiredAccuracy = kCLLocationAccuracyBest\n\
  ```\n\n精度使用 `CLLocationAccuracy` 值设置，该类型被定义为 `Double`。该值以米为单位，因此如果您指定 `desiredAccuracy`\
  \ 为 10，则您是在告诉 Core Location 希望它尽可能尝试在 10 米内确定当前位置。指定 `kCLLocationAccuracyBest`（如前所述）或指定\
  \ `kCLLocationAccuracyBestForNavigation`（此时它还会使用其他传感器数据）会告诉 Core Location 使用当前可用的最精确方法。此外，您还可以使用：`kCLLocationAccuracyNearestTenMeters`、`kCLLocationAccuracyHundredMeters`、`kCLLocationAccuracyKilometer`\
  \ 和 `kCLLocationAccuracyThreeKilometers`。\n\n### 设置距离过滤器\n\n默认情况下，位置管理器会通知委托设备位置的任何检测到的变化。通过指定距离过滤器，您是在告诉位置管理器不要通知您每一次变化，而是仅在位置变化超过一定数量时通知您。设置距离过滤器可以减少应用程序执行轮询的次数。距离过滤器同样以米为单位设置。指定距离过滤器为\
  \ 1000 告诉位置管理器，只有当 iPhone 从其先前报告的位置移动至少 1,000 米时，才通知其委托，例如 `locationManager.distanceFilter\
  \ = 1000`。\n\n如果您想将位置管理器恢复为不应用任何过滤器的默认设置，可以使用常量 `kCLDistanceFilterNone`，如下所示：\n\n\
  ```\nlocationManager.distanceFilter = kCLDistanceFilterNone\n```\n\n就像指定所需精度时一样，您应注意避免比实际需要更频繁地获取更新；否则会浪费电池电量。一个根据位置变化计算用户速度的速度表应用程序可能希望尽可能快地获得更新，但一个显示最近快餐店的应用程序则可以接受少得多的更新。\n\
  \n### 获取使用定位服务的权限\n\n在您的应用程序可以使用定位服务之前，您需要获得用户的许可。Core Location 提供几种不同的服务，其中一些可以在应用程序处于后台时使用——实际上，您甚至可以请求在应用程序未运行且发生某些事件时启动您的应用程序。根据应用程序的功能，可能只需要请求在用户使用您的应用程序时才能访问定位服务的权限，或者可能需要始终能够使用该服务。在编写应用程序时，您需要决定需要哪种类型的权限，并在启动所需的服务之前提出请求。您将在本章创建示例应用程序的过程中看到如何做到这一点。\n\
  \n\n\n### 启动定位管理器\n\n当你准备好开始轮询位置信息，并且已向用户请求访问定位服务后，你便告知定位管理器启动。它将自行运行，并在确定当前位置后调用委托方法。除非你告知其停止，否则每当它检测到超出当前距离过滤器的位置变化时，都会持续调用你的委托方法。以下是启动定位管理器的方法：\n\
  \n```\nlocationManager.startUpdatingLocation()\n```\n\n### 明智地使用定位管理器\n\n如果你仅需确定当前位置，而不需要持续更新，可以使用\
  \ `requestLocation()` 方法代替 `startUpdatingLocation()`。该方法会在确定用户位置后自动停止位置轮询。另一方面，如果确实需要轮询，请确保尽可能早地停止轮询。请记住，只要你在从定位管理器获取更新，就会耗费用户的电池电量。要告知定位管理器停止向其委托发送更新，可调用\
  \ `stopUpdatingLocation()`，如下所示：\n\n```\nlocationManager.stopUpdatingLocation()\n\
  ```\n\n如果你使用 `requestLocation()` 而非 `startUpdatingLocation()`，则无需调用此方法。\n\n## 定位管理器委托\n\
  \n定位管理器的委托必须遵循 `CLLocationManagerDelegate` 协议，该协议定义了若干方法，且所有方法均为可选方法。当用户授权使用定位服务的可用性发生变化时，定位管理器会调用其中一个方法；当它确定当前位置或检测到位置变化时，会调用另一个方法。当定位管理器遇到错误时，还会调用另一个方法。在本章的项目中，我们将实现所有这些委托方法。\n\
  \n### 获取位置更新\n\n当定位管理器想要将当前位置告知其委托时，它会调用 `locationManager(_:didUpdateLocations:)`\
  \ 方法。该方法接受两个参数：\n\n- 第一个参数引用调用该方法的定位管理器。\n- 第二个参数包含一个 `CLLocation` 对象数组，代表设备的当前位置以及可能的一些先前位置。如果在短时间内发生多次位置更新，它们可能会通过一次对该方法的调用同时报告。无论如何，最近的位置始终是该数组中的最后一项。\n\
  \n### 使用 CLLocation 获取纬度和经度\n\n位置信息通过 `CLLocation` 类的实例从定位管理器传递过来。该类提供了七个对你的应用可能有用的属性：\n\
  \n- `coordinate`\n- `horizontalAccuracy`\n- `altitude`\n- `verticalAccuracy`\n-\
  \ `floor`\n- `timestamp`\n- `description`\n\n纬度和经度存储在一个名为 `coordinate` 的属性中。要以度数形式获取纬度和经度，请使用代码清单\
  \ 19-2 中的代码。\n\n```\nlet latitude = theLocation.coordinate.latitude\nlet longitude\
  \ = theLocation.coordinate.longitude\n代码清单 19-2. 获取纬度和经度\n```\n\n`latitude` 和 `longitude`\
  \ 变量将被推断为 `CLLocationDegrees` 类型。`CLLocation` 对象还可以告诉你定位管理器对其纬度和经度计算结果的置信度。`horizontalAccuracy`\
  \ 属性描述了一个以 `coordinate` 为中心、以该值为半径的圆（以米为单位，与所有 Core Location 测量数据一致）。`horizontalAccuracy`\
  \ 的值越大，Core Location 对位置的确定性越低。非常小的半径则表示对确定的位置具有很高的置信度。\n\n你可以在“地图”应用中看到 `horizontalAccuracy`\
  \ 的图形化表示，如图 19-1 所示。当地图检测到你的位置时，其显示的圆圈便以 `horizontalAccuracy` 为半径。定位管理器认为你位于该圆的中心；如果你不在中心，也几乎肯定在圆圈内的某个地方。`horizontalAccuracy`\
  \ 为负值表示你由于某种原因无法信赖 `coordinate` 中的值。\n\n![A329781_3_En_19_Fig1_HTML.jpg](img/A329781_3_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1. “地图”应用使用 Core Location 来确定你的当前位置。外圈是水平精度的直观表示。\n\n`CLLocation` 对象还有一个名为\
  \ `altitude` 的属性，类型为 `CLLocationDistance`，它告诉你当前处于海平面以上（或以下）多少米：\n\n```\nlet altitude\
  \ = theLocation.altitude\n```\n\n每个 `CLLocation` 对象都维护着一个名为 `verticalAccuracy` 的属性，该属性表示\
  \ Core Location 对其海拔高度确定结果的置信度。`altitude` 中的值可能与实际值相差 `verticalAccuracy` 中的米数。如果\
  \ `verticalAccuracy` 值为负，则表明 Core Location 无法确定有效的海拔高度。\n\n`floor` 属性提供用户所在建筑内的楼层号。该值仅在能够提供此信息的建筑中有效，因此你不应依赖其可用性。\n\
  \n`CLLocation` 对象包含一个 `timestamp`，用于告知定位管理器进行位置确定的时间。\n\n除了这些属性外，`CLLocation` 还有一个有用的实例方法，可让你确定两个\
  \ `CLLocation` 对象之间的距离。该方法名为 `distanceFromLocation()`，返回值为 `CLLocationDistance`\
  \ 类型（实质上是一个 `Double`），因此你可以在算术计算中使用它，正如你将在我们即将创建的应用中看到的那样。以下是此方法的使用方式：\n\n```\n\
  let distance = fromLocation.distanceFromLocation(toLocation)\n```\n\n上述代码行返回两个 `CLLocation`\
  \ 对象 `fromLocation` 和 `toLocation` 之间的距离。返回的 `distance` 值包含大圆距离计算的结果，该计算忽略 `altitude`\
  \ 属性，并将两点的距离计算为仿佛它们都在海平面。对于大多数用途，大圆距离计算提供的信息已足够；但是，如果你希望在计算距离时考虑海拔高度，则需要自行编写代码。\n\
  \n**注**：如果你不确定大圆距离的含义，其概念是：地球表面任意两点之间的最短距离将沿着一条路径找到，若将该路径延伸，它将环绕地球一周：即一个“大圆”。最明显的大圆或许是你在地图上看到的那些：赤道和经线。然而，对于地球表面任意两点，都可以找到这样一个大圆。`CLLocation`\
  \ 执行的计算会考虑地球的曲率，确定两点沿此类路径的距离。如果不考虑曲率，你将得到连接两点的直线长度，这没什么用，因为该直线必然会穿过地球内部一定距离。\n\n\
  \n\n### 错误通知\n\n如果 Core Location 需要向你的应用程序报告错误，它会调用一个名为 `locationManager(_:didFailWithError:)`\
  \ 的代理方法。错误的一个可能原因是用户拒绝了定位服务访问权限，在这种情况下，该方法会携带错误代码 `CLError.Denied` 被调用。定位管理器支持的另一个常见错误代码是\
  \ `CLError.LocationUnknown`，它表示 Core Location 无法确定位置，但会继续尝试。虽然 `CLError.LocationUnknown`\
  \ 错误表明的问题可能只是暂时的，但 `CLError.Denied` 和其他错误可能意味着你的应用程序在当前会话的剩余时间内将无法访问 Core Location。\n\
  \n> **注意：** 模拟器无法确定你的当前位置，但你可以从模拟器的 **Debug➤ Location** 菜单中选一个位置（例如苹果总部，这是默认选项），或设置你自己的位置。\n\
  \n## 创建 WhereAmI 应用程序\n\n我们来构建一个小型应用，用于检测设备的当前位置以及程序运行期间走过的总距离。你可以在图 19-2 中看到该应用程序第一个版本的效果。\n\
  \n![A329781_3_En_19_Fig2_HTML.jpg](img/A329781_3_En_19_Fig2_HTML.jpg)\n\n图 19-2.\
  \ WhereAmI 应用程序运行界面\n\n在 Xcode 中，使用 **单视图应用（Single View Application）** 模板创建一个新项目，并将其命名为\
  \ `WhereAmI`。当项目窗口打开后，选择 `ViewController.swift`，并进行以下修改：\n\n```\nimport UIKit\n\
  import CoreLocation\nimport MapKit\nclass ViewController: UIViewController, CLLocationManagerDelegate\
  \ {\n```\n\n首先，注意我们已经导入了 Core Location 框架。Core Location 并不属于 `UIKit` 或 `Foundation`，因此我们需要手动导入它。接下来，我们让此类遵循\
  \ `CLLocationManagerDelegate` 协议，以便能够从定位管理器接收位置信息。\n\n现在添加以下属性声明：\n\n```\nprivate\
  \ let locationManager = CLLocationManager()\nprivate var previousPoint: CLLocation?\n\
  private var totalMovementDistance = CLLocationDistance(0)\n@IBOutlet var latitudeLabel:\
  \ UILabel!\n@IBOutlet var longitudeLabel: UILabel!\n@IBOutlet var horizontalAccuracyLabel:\
  \ UILabel!\n@IBOutlet var altitudeLabel: UILabel!\n@IBOutlet var verticalAccuracyLabel:\
  \ UILabel!\n@IBOutlet var distanceTraveledLabel: UILabel!\n@IBOutlet var mapView:MKMapView!\n\
  ```\n\n`locationManager` 属性保存了对我们将要使用的 `CLLocationManager` 实例的引用。`previousPoint`\
  \ 属性将跟踪上一次从定位管理器接收到的更新位置。这样，每当用户移动距离足够触发更新时，我们就可以将最新的移动距离累加到 `totalMovementDistance`\
  \ 属性中。其余属性是用于更新用户界面标签的插座变量。\n\n现在选择 `Main.storyboard`，开始创建用户界面。首先，在文档大纲中展开视图控制器层次结构，选择\
  \ **View** 项，然后在属性检查器中将其背景颜色更改为浅灰色。接下来，从对象库中拖一个 `UIView` 放到现有视图上，调整其位置和大小，使其覆盖主视图的底部区域。确保该视图的底部、左侧和右侧与灰色视图完全对齐。目标是创建如图\
  \ 19-2 所示的布局，其中你刚刚放置的视图是底部带有白色背景的那个。\n\n在文档大纲中，选择你刚刚添加的视图，按住 Control 键从该视图拖拽到其父视图并释放鼠标。在出现的弹出菜单中，按住\
  \ Shift 键并依次点击 **Leading Space to Container Margin**、**Trailing Space to Container\
  \ Margin** 和 **Vertical Spacing to Bottom Layout Guide**。这样可以将视图固定到位，但还没有设置其高度。要设置高度，在文档大纲中保持该视图被选中状态，点击\
  \ **Pin** 按钮。在弹出的菜单中，选中 **Height** 复选框，将高度设置为 **166**，将 **Update Frames** 设置为 **Items\
  \ of New Constraint**，然后点击 **Add 1 Constraint** 来设置高度。这样就完成了。\n\n接下来，我们要创建图 19-2\
  \ 中最右侧的一列标签。从对象库中拖一个标签放到白色视图顶部略靠下的位置。将其宽度调整为大约 80 点，并移动到靠近视图右边缘的位置。按住 Option 键向下拖动该标签五次，复制出一组堆叠的标签，如图\
  \ 19-2 所示。现在我们来固定这些标签相对于父视图的大小和位置。\n\n\n\n从文档大纲中最顶层的标签开始，按住 Control 键并从该标签拖拽到其父视图。松开鼠标。按住\
  \ Shift 键，选择`Top Space to Container`和`Trailing Space to Container`，然后按下 Return。要设置标签的大小，点击\
  \ Pin 按钮以打开“添加新约束”弹出菜单，勾选`Width`和`Height`复选框，输入`80`作为宽度、`21`作为高度（如果尚未设置），然后点击`Add\
  \ 2 Constraints`。现在你已经固定了顶部标签的大小和位置。对其余五个标签重复相同的过程。\n\n接下来，我们将添加第二列标签。从对象库中拖拽一个标签，将其放置在顶部标签的左侧，两者之间留出一个小水平间隙。拖拽标签的左侧，使其几乎到达白色视图的左边缘，然后在属性检查器中设置对齐方式，使标签文本右对齐。通过按住\
  \ Option 键向下拖拽，复制此标签五次，使每个副本与右侧对应的标签对齐，以形成图 19-3 中的布局。\n\n![A329781_3_En_19_Fig3_HTML.jpg](img/A329781_3_En_19_Fig3_HTML.jpg)\n\
  \n图 19-3. 我们的 UI 布局目标\n\n选择左列顶部的标签，按住 Control 键并从其左侧拖拽到白色视图的左侧。松开鼠标，在上下文菜单中选择`Leading\
  \ Space to Container`。接着，按住 Control 键从同一个标签拖拽到右列中对应的标签。松开鼠标打开上下文菜单，按住 Shift 键，选择`Horizontal\
  \ Spacing`和`Baseline`，然后按下 Return。对左列中的其他五个标签执行相同操作。最后，在文档大纲中选择视图控制器图标，点击“解决自动布局问题”按钮，如果可用则选择`Update\
  \ Frames`。\n\n我们快要完成了。现在需要将右列中的标签连接到视图控制器的插座。按住 Control 键从文档大纲中的黄色视图控制器图标拖拽到右列的顶部标签，然后松开鼠标。在出现的弹出窗口中，选择`latitudeLabel`。按住\
  \ Control 键从视图控制器图标拖拽到第二个标签，将其连接到`longitudeLabel`插座；拖拽到第三个标签，连接到`horizontalAccuracyLabel`；拖拽到第四个标签，连接到`altitudeLabel`；拖拽到第五个标签，连接到`verticalAccuracyLabel`；拖拽到最底部的标签，连接到`distanceTraveledLabel`插座。现在你已经连接了所有六个插座。\n\
  \n最后，清除右列所有标签中的文本，并将左列标签的文本修改为与图 19-3 一致：顶部标签的文本应为`Latitude:`，其下方一个应为`Longitude:`，以此类推。\n\
  \n现在让我们编写代码，在这些标签中显示一些有用的信息。选择`ViewController.swift`并在`viewDidLoad()`中插入以下几行，以配置位置管理器：\n\
  \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any\
  \ additional setup after loading the view, typically from a nib.\n    locationManager.delegate\
  \ = self\n    locationManager.desiredAccuracy = kCLLocationAccuracyBest\n    locationManager.requestWhenInUseAuthorization()\n\
  ```\n\n我们将控制器类指定为位置管理器的代理，将所需精度设置为最佳可用值，然后请求用户在使用应用程序时使用位置服务的权限。对于本示例的目的来说，这已经是足够的授权。要使用\
  \ Core Location 的一些更高级功能（这些功能超出了本书的范围），你可能需要通过调用`requestAlwaysAuthorization()`方法来请求随时使用\
  \ Core Location 的权限。\n\n> **注意**\n>\n> 在这个简单的示例中，授权请求是在应用程序启动时发出的，但 Apple 建议，在实际应用程序中，你应该延迟发出请求，直到实际需要使用位置服务时。原因在于，如果基于用户已请求的操作，用户更有可能同意你访问设备位置的需求；而如果应用程序（很可能是用户刚刚安装的）在启动时立即请求权限，用户同意的可能性较小。\n\
  \n当此应用程序首次运行时，iOS 将显示一个警报，询问用户是否应允许你的应用程序使用其位置。你需要提供一段简短文本，iOS 会将其包含在警报弹出窗口中，解释你的应用程序为何需要知道用户的位置。打开`Info.plist`文件，并在键`NSLocationWhenInUseUsageDescription`下添加你希望显示的文本（如果你需要在应用程序未主动使用时请求使用位置服务的权限，则文本应添加到键`NSLocationAlwaysUsageDescription`下）。对于本示例，可以使用类似于“此应用程序需要知道您的位置，以便在地图上更新您的坐标”的文本。\n\
  \n> **警告**\n>\n> 在早期版本的 iOS 中，提供文本来限定权限请求是可选的。从 iOS 8 开始，这变成了强制性的。如果你不提供任何文本，权限请求将不会被发出。\n\
  \n如果现在运行应用程序，你会看到 iOS 在权限请求中使用了你的文本，如图 19-4 所示。如果提示不出现，请确保你在`Info.plist`中正确拼写了键的名称。由于我们目前尚未完成应用程序，你暂时还看不到背景中的地图。但图\
  \ 19-4 会给你一个我们接下来要实现的效果的预览。\n\n![A329781_3_En_19_Fig4_HTML.jpg](img/A329781_3_En_19_Fig4_HTML.jpg)\n\
  \n图 19-4. 提示用户允许使用位置服务\n\n此提示仅在应用程序的生命周期中出现一次。无论用户是否允许你的应用程序使用位置服务，此请求都不会再重复出现，无论应用程序运行多少次。当然，这并不意味着用户无法改变主意。我们将在接下来的“更改位置服务权限”部分中对此进行更多说明。就测试而言，从\
  \ Xcode 重新运行应用程序不会影响用户已保存的响应——要获得干净的测试状态，你需要从模拟器或设备中删除应用程序。如果这样做，当你重新安装并重新启动应用程序时，iOS\
  \ 会再次提示权限。现在，对提示回复“允许”，然后继续编写我们的应用程序。\n\n你可能已经注意到，`viewDidLoad()`方法在调用`requestWhenInUseAuthorization()`之后并没有立即调用位置管理器的`startUpdatingLocation()`方法。事实上，这样做毫无意义，因为授权过程不会立即发生。在`viewDidLoad()`返回后的某个时刻，位置管理器代理的`locationManager(_:didChangeAuthorizationStatus:)`方法将被调用，并传入应用程序的授权状态。这可能是用户对权限请求弹出窗口的回复结果，也可能是应用程序上次执行时的已保存授权状态。无论如何，此方法是在你获得授权的情况下开始监听位置更新或请求用户位置的理想位置。将以下对该方法的实现添加到`ViewController.swift`文件中：\n\
  \n\n\n```swift\nfunc locationManager(_ manager: CLLocationManager,\ndidChangeAuthorization\
  \ status: CLAuthorizationStatus) {\nprint(\"授权状态已更改为 \\(status.rawValue)\")\nswitch\
  \ status {\ncase .authorizedAlways, .authorizedWhenInUse:\nlocationManager.startUpdatingLocation()\n\
  default:\nlocationManager.stopUpdatingLocation()\n}\n}\n```\n\n这段代码的逻辑是：如果获得了授权，就开始监听位置更新；如果未获得授权，则停止监听。既然只有在获得授权的情况下才会开始监听，那么如果未获得权限，调用\
  \ `stopUpdatingLocation()` 有什么意义呢？这是个好问题。之所以需要这段代码，是因为用户可以先授予你的应用使用 Core Location\
  \ 的权限，随后又撤销该权限。在这种情况下，我们就需要停止监听更新。有关更多信息，请参阅本章后面的“更改位置服务权限”。\n\n如果你的应用在没有获得权限的情况下尝试使用位置服务，或者在任何时候发生错误，位置管理器都会调用其委托的\
  \ `locationManager(_:didFailWithError:)` 方法。让我们将该方法的实现添加到视图控制器中：\n\n```swift\nfunc\
  \ locationManager(_ manager: CLLocationManager,\ndidFailWithError error: NSError)\
  \ {\nlet errorType = error.code == CLError.denied.rawValue\n? \"访问被拒绝\": \"错误 \\\
  (error.code)\"\nlet alertController = UIAlertController(title: \"位置管理器错误\",\nmessage:\
  \ errorType, preferredStyle: .alert)\nlet okAction = UIAlertAction(title: \"确定\"\
  , style: .cancel,\nhandler: { action in })\nalertController.addAction(okAction)\n\
  present(alertController, animated: true,\ncompletion: nil)\n}\n```\n\n在本示例中，当发生错误时，我们只是向用户发出警告。在实际应用中，你应使用更有意义的错误信息，并根据需要清理应用程序状态。\n\
  \n## 使用位置管理器更新\n\n现在，我们已经处理了获取使用用户位置权限的问题，接下来利用这些信息做点什么。在 `ViewController.swift`\
  \ 中插入委托的 `locationManager(_:didUpdateLocations:)` 方法的实现（参见清单 19-3）。\n\n```swift\n\
  func locationManager(_ manager: CLLocationManager, didUpdateLocations\nlocations:\
  \ [CLLocation]) {\nif let newLocation = locations.last {\nlet latitudeString = String(format:\
  \ \"%g\\u{00B0}\",\nnewLocation.coordinate.latitude)\nlatitudeLabel.text = latitudeString\n\
  let longitudeString = String(format: \"%g\\u{00B0}\",\nnewLocation.coordinate.longitude)\n\
  longitudeLabel.text = longitudeString\nlet horizontalAccuracyString = String(format:\"\
  %gm\",\nnewLocation.horizontalAccuracy)\nhorizontalAccuracyLabel.text = horizontalAccuracyString\n\
  let altitudeString = String(format:\"%gm\", newLocation.altitude)\naltitudeLabel.text\
  \ = altitudeString\nlet verticalAccuracyString = String(format:\"%gm\",\nnewLocation.verticalAccuracy)\n\
  verticalAccuracyLabel.text = verticalAccuracyString\nif newLocation.horizontalAccuracy\
  \ > 100 ||\nnewLocation.verticalAccuracy > 50 {\n// 精度半径过大，我们不使用它\nreturn\n}\nif\
  \ previousPoint == nil {\ntotalMovementDistance = 0\n} else {\nprint(\"移动距离: \"\
  \ +\n\"\\(newLocation.distance(from: previousPoint!))\")\ntotalMovementDistance\
  \ +=\nnewLocation.distance(from: previousPoint!)\n}\npreviousPoint = newLocation\n\
  let distanceString = String(format:\"%gm\", totalMovementDistance)\ndistanceTraveledLabel.text\
  \ = distanceString\n}\n}\n```\n\n在这个委托方法中，我们首先用 `locations` 参数传入的 `CLLocation` 对象中的值，更新图\
  \ 19-3 第二列中的前五个标签。该数组可能包含多次位置更新，但我们始终使用最后一项，它代表最新的信息。\n\n**注意**：经度和纬度都显示在包含看似神秘的\
  \ `\\u{00B0}` 的格式化字符串中。这是度数符号 (°) 的 Unicode 表示的十六进制值。将 ASCII 字符以外的任何内容直接放入源代码文件绝不是一个好主意，但在字符串中包含十六进制值则完全没问题，这也是我们在此处所做的。\n\
  \n接着，我们检查位置管理器给我们的数值的精度。高精度的数值表示位置管理器对位置不太确定，而负精度数值则表示该位置实际上是无效的。有些设备没有确定垂直位置所需的硬件。在这些设备以及模拟器上，`verticalAccuracy`\
  \ 属性将始终为 –1，因此我们不会排除具有此值的位置报告。精度值以米为单位，表示从我们获得的位置点向外的一个圆的半径，这意味着真实位置可能在该圆内的任何地方。我们的代码会检查这些数值是否可接受；如果不可接受，则直接从该方法返回，而不是继续对垃圾数据进行任何操作：\n\
  \n```swift\nif newLocation.horizontalAccuracy > 100 ||\nnewLocation.verticalAccuracy\
  \ > 50 {\n// 精度半径过大，我们不使用它\nreturn\n}\n```\n\n接下来，我们检查 `previousPoint` 是否为 `nil`。如果是，那么此次更新是我们在位置管理器中获得的第一个有效更新，因此我们将\
  \ `distanceFromStart` 属性归零。否则，我们将最新位置与上一个点的距离累加到总距离中。无论哪种情况，我们都会更新 `previousPoint`\
  \ 以包含当前位置：\n\n```swift\nif previousPoint == nil {\ntotalMovementDistance = 0\n}\
  \ else {\nprint(\"移动距离: \" +\n\"\\(newLocation.distance(from: previousPoint!))\"\
  )\ntotalMovementDistance +=\nnewLocation.distance(from: previousPoint!)\n}\npreviousPoint\
  \ = newLocation\n```\n\n之后，我们用从起点开始移动的总距离来填充最后一个标签。当此应用程序运行时，如果用户移动的距离足够远，以至于位置管理器能检测到变化，则**已移动距离：**字段将持续更新用户自应用程序启动以来所移动的距离：\n\
  \n```swift\nlet distanceString = String(format:\"%gm\", totalMovementDistance)\n\
  distanceTraveledLabel.text = distanceString\n```\n\n这就是全部内容了。Core Location 相当直观且易于使用。编译并运行应用程序，然后测试一下。如果你能在\
  \ iPhone 或 iPad 上运行该应用程序，不妨请其他人驾车，你带着运行中的应用程序兜一圈，观察随你移动而变化的数值。\n\n\n\n### 在地图上可视化你的移动轨迹\n\
  \n到目前为止我们所做的工作相当有趣，但如果能在地图上直观地看到我们的旅行路线，岂不是更好？幸运的是，iOS 提供了 Map Kit 框架来帮助我们实现这一点。Map\
  \ Kit 使用了与 Apple 地图应用相同的后端服务，这意味着它相当强大且不断改进。它包含一个用于显示地图的视图类，该视图能够响应用户手势，正如你对任何现代地图应用的期待一样。这个视图还允许我们为任何想要在地图上显示的坐标位置插入标注，默认情况下这些标注会显示为可触摸的“大头针”，点击后能显示更多信息。我们将扩展\
  \ WhereAmI 应用，使其能够在地图上显示用户的起始位置和当前位置。\n\n选择 `ViewController.swift`，并添加以下代码行来导入 Map\
  \ Kit 框架：\n\n```\nimport UIKit\nimport CoreLocation\nimport MapKit\n```\n\n现在，为将显示用户位置的地图视图添加一个新的属性声明：\n\
  \n接下来选择 `Main.storyboard` 来编辑视图。从对象库中拖拽一个地图视图，并将其放置到用户界面的上半部分。调整地图视图的大小，使其覆盖整个屏幕，包括我们之前添加的视图及其所有标签，然后选择\
  \ **Editor** ➤ **Arrange** ➤ **Send to Back**，将地图视图移动到其他视图的后面。\n\n> **提示**\n> 如果\
  \ **Send to Back** 选项不可用，你可以通过在文档大纲中将地图视图向上拖动来达到相同效果，使其在父级子列表中出现在包含标签的视图之前。\n\n\
  在文档大纲中，按住 Control 键从地图视图拖拽到其父视图，在上下文菜单中，按住 Shift 键并选择 **Leading Space to Container\
  \ Margin**、**Trailing Space to Container Margin**、**Vertical Spacing to Top Layout\
  \ Guide** 和 **Vertical Spacing to Bottom Layout Guide**，然后按 Return 键。\n\n现在地图视图已固定到位，但其底部部分被遮挡了。我们可以通过让底部的视图部分透明来解决这个问题。为此，在文档大纲中选择它，打开属性检查器，点击\
  \ **Background** 颜色编辑器，在弹出的选项中，选择 **Other…** 打开颜色选择器。选择白色背景，并将不透明度滑块移动到约 70%。最后，按住\
  \ Control 键从文档大纲中的视图控制器图标拖拽到地图视图，在弹出的选项中选择 `mapView`，将地图连接到其输出口。\n\n现在这些准备工作已经就绪，是时候编写一些代码让地图为我们工作了。在处理视图控制器所需的代码之前，我们需要建立一个模型类来表示我们的起始点。`MKMapView`\
  \ 是作为 MVC（模型-视图-控制器）架构中的视图部分构建的。如果我们有独立的类来表示地图上的标记，它的工作效果最佳。我们可以将模型对象传递给地图视图，地图视图将使用\
  \ Map Kit 框架中定义的协议查询它们的坐标、标题等信息。\n\n按下 `⌘N` 调出新建文件助手，在 iOS 源文件部分，选择 **Cocoa Touch\
  \ Class**。将类命名为 `Place`，并使其成为 `NSObject` 的子类。打开 `Place.swift` 并按下文所示进行修改。你需要导入 Map\
  \ Kit 框架，指定新类要遵循的协议，并按照列表 19-4 所示指定属性。\n\n```\nimport UIKit\nimport MapKit\nclass\
  \ Place: NSObject, MKAnnotation {\n    let title: String?\n    let subtitle: String?\n\
  \    var coordinate: CLLocationCoordinate2D\n    init(title:String, subtitle:String,\
  \ coordinate:CLLocationCoordinate2D) {\n        self.title = title\n        self.subtitle\
  \ = subtitle\n        self.coordinate = coordinate\n    }\n}\n列表 19-4.\nPlace.swift\
  \ 文件中的新 Place 类\n```\n\n这是一个相当“简单”的类，仅作为这些属性的容器。在实际例子中，你可能需要将真正的模型类作为标注显示在地图上，而\
  \ `MKAnnotation` 协议允许你将此功能添加到任何你自己的类中，而不会破坏任何现有的类层次结构。选择 `ViewController.swift`，并将以下两行粗体代码添加到\
  \ `locationManager(_:didChangeAuthorizationStatus:)` 方法中：\n\n```\nfunc locationManager(_\
  \ manager: CLLocationManager,\ndidChangeAuthorization status: CLAuthorizationStatus)\
  \ {\n    print(\"授权状态变更为 \\(status.rawValue)\")\n    switch status {\n    case .authorizedAlways,\
  \ .authorizedWhenInUse:\n        locationManager.startUpdatingLocation()\n     \
  \   mapView.showsUserLocation = true\n    default:\n        locationManager.stopUpdatingLocation()\n\
  \        mapView.showsUserLocation = false\n    }\n}\n```\n\n地图视图的 `showsUserLocation`\
  \ 属性正如你想象的那样：它省去了我们手动随用户移动而移动标记的麻烦，而是自动为我们绘制一个标记。它使用 Core Location 获取用户位置，并且仅在你的应用获得授权时才起作用；因此，我们在被告知拥有使用\
  \ Core Location 的权限时启用该属性，并在失去权限时再次禁用它。\n\n现在让我们重新审视 `locationManager(_:didUpdateLocations:)`\
  \ 方法。我们已经在其中添加了一些代码，用于检测接收到的第一个有效位置数据并建立我们的起始点。我们还将分配一个新的 `Place` 类实例。我们设置其属性并为其指定位置。我们还添加了当该位置标记显示时希望出现的标题和副标题。最后，我们将此对象传递给地图视图。我们还创建了一个\
  \ `MKCoordinateRegion` 实例，这是 Map Kit 中包含的一个结构体，用于告诉视图我们希望显示地图的哪个区域。`MKCoordinateRegion`\
  \ 使用我们新位置的坐标和一对方形区域距离（以米为单位，这里是 100, 100），指定了显示的地图部分的宽度和高度。我们也将此传递给地图视图，并告诉它动画化这一变化。所有这些都通过添加如下所示的粗体代码行来完成：\n\
  \n```\nif previousPoint == nil {\n    totalMovementDistance = 0\n    let start =\
  \ Place(title:\"起始点\",\n                      subtitle:\"这是我们出发的地方\",\n        \
  \              coordinate:newLocation.coordinate)\n    mapView.addAnnotation(start)\n\
  \    let region = MKCoordinateRegionMakeWithDistance(newLocation.coordinate,\n \
  \                                                   100, 100)\n    mapView.setRegion(region,\
  \ animated: true)\n} else {\n    print(\"移动距离: \" +\n          \"\\(newLocation.distance(from:\
  \ previousPoint!))\")\n    totalMovementDistance +=\n        newLocation.distance(from:\
  \ previousPoint!)\n}\n```\n\n现在，我们已经告诉地图视图有一个我们希望用户看到的标注（即一个可见的位置标记）。但它应该如何显示呢？地图视图通过询问其委托来决定每个标注应显示何种视图。在一个更复杂的应用中，委托机制会为我们工作。但在本例中，我们并没有设置委托，仅仅是因为对于我们的简单用例来说没有必要。与\
  \ `UITableView` 要求其数据源提供用于显示的单元格不同，`MKMapView` 采用了不同的策略：如果委托没有提供标注视图，它就会在地图上显示一个默认视图，即一个红色的“大头针”，点击它后会显示更多信息。\n\
  \n\n\n你还需要做最后一件事——让你的应用能够使用 Map Kit。为此，在项目导航器中选择项目，然后选择 WhereAmI 目标。在编辑器区域顶部，选择\
  \ Capabilities，找到 Maps 部分，并将右侧的选择开关从 OFF 拨到 ON。现在构建并运行你的应用，你会看到地图视图加载。一旦它获得有效的位置数据，你会看到它滚动到正确的位置，在你的起点放置一个图钉，并用一个发光的蓝点标记你的当前位置（参见图\
  \ 19-5）。对于几十行代码来说，这已经很不错了。\n\n![A329781_3_En_19_Fig5_HTML.jpg](img/A329781_3_En_19_Fig5_HTML.jpg)\n\
  \n图 19-5。\n\n红色图钉标记了我们的起始位置，蓝色圆点显示了我们已经移动了多远——在这个例子中，距离为零。\n\n**提示：** 如果你正在使用真机，并且地图没有缩放以显示你的当前位置，那是因为\
  \ Core Location 无法在 100 米范围内确定你的位置。启用 Wi-Fi 可能会有所帮助，这有时能提高 Core Location 的精度。\n\n\
  ### 更改位置服务权限\n\n当你的应用首次运行时，你希望用户会授予它使用位置服务的权限。无论你是否获得权限，你都不能假设情况不会改变。用户可以通过“设置”应用授予或撤销位置权限。你可以在模拟器上测试这一点。启动应用并授予自己使用\
  \ Core Location 的权限（如果你之前拒绝过权限，需要先删除并重新安装应用）。你应该能看到地图上你的位置。现在进入“设置”应用，选择“隐私”➤“定位服务”。屏幕顶部有一个开关，用于打开或关闭定位服务。将开关拨到\
  \ OFF，然后返回你的应用。你会看到地图不再显示你的位置。这是因为位置管理器调用了 `locationManager(_:didChangeAuthorizationStatus:)`\
  \ 方法，并传入了授权码 `CLAuthorizationStatus.denied`，作为响应，应用停止接收位置更新并告诉 Map Kit 停止跟踪用户的位置。现在返回“设置”应用，在“定位服务”中重新启用\
  \ Core Location，再回到你的应用；你会发现它又开始跟踪你的位置了。\n\n关闭“定位服务”并不是用户更改你应用使用 Core Location 权限的唯一方式。返回“设置”应用。在启用定位服务的开关下方，你会看到所有使用它的应用列表，包括\
  \ WhereAmI，如图 19-6 左侧所示。点击应用名称会进入另一个页面，在那里你可以允许或拒绝访问你的应用，如图 19-6 右侧所示。目前，应用可以在用户使用应用时使用定位服务。如果你点击“永不”，该权限就会被撤销，你可以通过返回应用来验证这一点。这表明，编写应用以使其能够检测并正确响应授权状态的变化非常重要。\n\
  \n![A329781_3_En_19_Fig6_HTML.jpg](img/A329781_3_En_19_Fig6_HTML.jpg)\n\n图 19-6。\n\
  \n更改 WhereAmI 应用的 Core Location 访问权限\n\n## 总结\n\n我们对 Core Location 和 Map Kit 的介绍到此结束。关于这两个框架，还有更多值得探索的内容。以下是一些重点：\n\
  \n* 对于不需要很高位置精度或更新频率的应用（如天气应用），可以使用显著位置变更服务，而不是通过 `startUpdatingLocation()` 方法紧密跟踪用户位置。如果可能，应尽量使用此服务，因为它可以显著降低功耗。\n\
  * 在带有磁力计的设备上，Core Location 可以报告用户的朝向。如果设备还有 GPS，它还可以报告用户移动的方向。\n* Core Location\
  \ 可以报告用户何时进入或离开应用定义的区域（定义为具有给定半径和圆心的圆），或者当应用处于 iBeacon 附近时。\n* 你可以使用 Geocoding 服务，在\
  \ Core Location 报告的坐标和用户友好的地标对象之间进行双向转换。除此之外，Map Kit 还提供了一个 API，允许你按名称或地址搜索位置。\n\
  * Core Location 会监控用户的移动，并能判断用户何时在某地停留一段时间。发生这种情况时，系统会认为用户正在“访问”该位置。当用户到达和离开被访问的位置时，你的应用可以收到通知。\n\
  \n有关所有这些功能的最佳信息来源是苹果的 \"Location and Maps Programming Guide\"。\n\n尽管底层技术相当复杂，但苹果提供了简单的接口来隐藏大部分复杂性，使得向你的应用添加与位置和地图相关的功能变得非常容易，这样你就可以知道用户在哪里，注意到他们何时移动，并在地图上标记他们的位置（以及任何其他位置）。说到移动，在下一章中，我们将探讨\
  \ iPhone 内置的加速度计。\n\n# 20. 设备方向和运动\n\niPhone、iPad 和 iPod touch 都包含一个内置的加速度计——这个微小的设备让\
  \ iOS 知道设备是如何被握持的，以及它是否在移动。iOS 使用加速度计来处理自动旋转，许多游戏也将其用作控制机制。加速度计还可用于检测摇晃和其他突然移动。随着\
  \ iPhone 4 的推出，这一功能得到了进一步扩展，它是第一款包含内置陀螺仪的 iPhone，可以让开发者确定设备绕每个轴的角度。现在，陀螺仪和加速度计已成为所有新款\
  \ iPad 和 iPod touch 的标准配置。在本章中，我们将探讨如何使用 Core Motion 框架在你的应用中访问陀螺仪和加速度计的值。\n\n\n\
  \n## 加速度计物理学\n\n加速度计通过感知特定方向上的惯性力大小，同时测量加速度和重力。iOS 设备中的加速度计是一个三轴组件，这意味着它能够检测三维空间中的运动或重力牵引。换句话说，你不仅可以利用加速度计判断设备当前如何被握持（就像自动旋转功能那样），还能知道它是否平放在桌面上，甚至判断屏幕是朝下还是朝上。加速度计以`g`力（`g`代表重力）为单位进行测量，因此加速度计返回`1.0`的值意味着在特定方向上感知到了`1g`的力，例如以下情况：\n\
  \n- 如果设备静止不动，地球引力将对其施加大约`1g`的力。\n- 如果设备完全直立，呈竖屏方向，它将检测并报告`y`轴上施加了约`1g`的力。\n- 如果设备以一定角度握持，这`1g`的力会根据握持方式分布在不同轴上。当设备呈\
  \ 45 度角握持时，`1g`的力将大致平均分布在两个轴上。\n\n通过寻找明显大于`1g`的加速度计数值，可以检测到突然的运动。在正常使用中，加速度计在任何轴上检测到的值通常不会显著超过`1g`。如果你摇晃、掉落或投掷设备，加速度计将检测到一个或多个轴上更大的力。\n\
  \n图 20-1 展示了加速度计所用三个轴的图形表示。请注意，加速度计对`y`坐标采用了更标准的约定：`y`值增加表示向上的力，这与 Quartz 2D 的坐标系（在第\
  \ 16 章讨论）相反。当你将加速度计作为与 Quartz 2D 配合使用的控制机制时，需要转换`y`坐标。而在使用 Sprite Kit（更可能的情况是你利用加速度计控制动画）时，则无需进行转换。\n\
  \n![A329781_3_En_20_Fig1_HTML.jpg](img/A329781_3_En_20_Fig1_HTML.jpg)\n\n**图 20-1.**\
  \ iPhone 加速度计的三维轴。左侧的 iPhone 正面视图显示了`x`和`y`轴，右侧的侧面视图显示了`z`轴\n\n## 使用陀螺仪检测旋转\n\n\
  我之前提到，目前所有设备都包含陀螺仪传感器，允许你读取描述设备绕其轴旋转的值。如果你觉得陀螺仪与加速度计的区别还不清楚，可以想象一部 iPhone 平放在桌子上。当你开始水平转动手机时，加速度计的值不会改变。这是因为作用于移动手机的力——本案例中，仅仅是沿`z`轴垂直向下的重力——并未发生变化。（实际上，情况比这复杂一些，你手部触碰手机的动作肯定会触发微小的加速度计响应。）然而，在同一运动中，设备的旋转值会发生变化——特别是`z`轴的旋转值。顺时针转动设备会产生负值，逆时针转动则产生正值。停止转动后，`z`轴的旋转值会归零。陀螺仪并非记录绝对的旋转值，而是实时报告设备旋转的变化。你将在本章的第一个示例中了解其工作原理。\n\
  \n## Core Motion 与运动管理器\n\n我们将使用 Core Motion 框架获取加速度计和陀螺仪的值。该框架除了其他功能外，还提供了`CMMotionManager`类，它充当了所有描述用户如何移动设备的数据的门户。应用程序创建一个`CMMotionManager`实例，然后以以下两种模式之一使用它：\n\
  \n- 它可以在发生运动时为你执行某些代码。\n- 它可以保持一个持续更新的结构，让你随时访问最新的数值。\n\n后一种方法为游戏和其他需要能够在游戏循环的每一轮中轮询设备当前状态的高度交互式应用程序提供了理想解决方案。我将向你展示如何实现这两种方法。请注意，`CMMotionManager`类实际上并不是单例，但你的应用程序应将其视为单例，并且每个应用只应创建一个此类实例。因此，如果你需要从应用的多个位置访问运动管理器，最好在应用程序委托中创建它，并从那里提供访问接口。\n\
  \n除了`CMMotionManager`类，Core Motion 还提供了其他几个类，例如`CMAccelerometerData`和`CMGyroData`，它们是简单的容器，应用程序可通过它们访问原始加速度计和陀螺仪信息；以及`CMDeviceMotion`类，它结合了加速度计和陀螺仪的测量值以及姿态信息——即设备是否平放、向上倾斜还是向左倾斜等等。在本章的示例中，我们将使用`CMDeviceMotion`类。\n\
  \n\n\n### 创建 MotionMonitor 应用程序\n\n前面提到过，运动管理器可以在一种模式下运行，即每次运动数据发生变化时，它会为你执行一些代码。大多数其他\
  \ Cocoa Touch 类通过让你连接到一个委托（delegate），当时间到来时该委托会收到一条消息来提供此类功能，但 Core Motion 的做法略有不同。`CMMotionManager`\
  \ 没有使用一组委托方法来通知我们发生了什么，而是允许你传入一个闭包（closure），以便在运动发生时执行。我们在本书中已经多次使用过闭包，现在你将看到该技术的另一种应用。\n\
  \n使用 Xcode 创建一个名为 MotionMonitor 的新 Single View Application 项目。这将是一个简单的应用程序，用于读取加速度计数据、陀螺仪数据（如果可用）以及姿态信息，然后将这些信息显示在屏幕上。\n\
  \n> **注意**  \n> 本章中的应用程序在模拟器上无法运行，因为模拟器没有加速度计。\n\n现在选择 `ViewController.swift` 文件并进行以下更改：\n\
  \n```\nclass ViewController: UIViewController {\n    @IBOutlet var gyroscopeLabel:\
  \ UILabel!\n    @IBOutlet var accelerometerLabel: UILabel!\n    @IBOutlet var attitudeLabel:\
  \ UILabel!\n}\n```\n\n这为我们提供了三个标签的插座，用于显示信息。这里不需要过多解释，只需保存更改即可。接下来，在 Interface Builder\
  \ 中打开 `Main.storyboard`。从库中拖出一个 `Label` 到视图中。调整标签大小，使其从屏幕左侧延伸到右侧，高度约为整个视图的三分之一，然后将标签顶部与顶部蓝色对齐线对齐。现在打开属性检查器，将\
  \ `Lines` 字段从 1 改为 0。`Lines` 属性用于指定标签中可能出现的文本行数，并提供一个硬性上限。如果将其设置为 0，则不应用限制，标签可以包含任意多行。\n\
  \n接下来，从库中拖出第二个标签，直接放在第一个标签下方。将其顶部与第一个标签的底部对齐，并将其两侧与屏幕的左右边缘对齐。将其调整到与第一个标签大致相同的高度。这里不需要太精确，因为我们将使用自动布局来控制标签的最终高度。拖出第三个标签，将其顶部边缘与第二个标签的底部边缘对齐，然后将其调整大小，使其底部边缘与屏幕底部边缘对齐，并将其两侧与屏幕的左右边缘对齐。将两个标签的\
  \ `Lines` 属性都设置为 0。\n\n现在让我们固定三个标签的位置和大小。在文档概览中，按住 Control 键从顶部标签拖到其父视图并释放鼠标。在弹出的菜单中，按住\
  \ Shift 键并选择 Leading Space to Container Margin、Vertical Spacing to Top Layout Guide\
  \ 和 Trailing Space to Container Margin，然后按 Return。按住 Control 键从第二个标签拖到父视图。在弹出的菜单中，按住\
  \ Shift 键并选择 Leading Space to Container Margin 和 Trailing Space to Container Margin，然后按\
  \ Return。按住 Control 键从第三个标签拖到 Main View，这次按住 Shift 键，选择 Leading Space to Container\
  \ Margin、Vertical Spacing to Bottom Layout Guide 和 Trailing Space to Container Margin。\n\
  \n现在所有三个标签都已固定到其父视图的边缘，让我们将它们相互连接起来。按住 Control 键从第二个标签拖到第一个标签，然后从弹出菜单中选择 Vertical\
  \ Spacing。按住 Control 键从第二个标签拖到第三个标签，做同样的操作。最后，我们需要确保这些标签具有相同的高度。为此，按住 Shift 键并单击所有三个标签，使其全部被选中。单击\
  \ Pin 按钮。在弹出的窗口中，选中 Equal Heights 复选框，然后按 Add 2 Constraints。单击 Resolve Auto Layout\
  \ Issues 按钮，然后单击 Update All Frames in View Controller。如果此选项不可用，请在文档大纲中选择 View Controller\
  \ 图标并重试。\n\n布局完成；现在让我们将标签连接到它们的插座。从文档大纲中的视图控制器图标按住 Control 键拖到顶部标签，释放鼠标，然后从弹出菜单中选择\
  \ `gyroscopeLabel`，将标签连接到其插座。对第二个标签做同样的操作，将其连接到 `accelerometerLabel`，第三个标签连接到 `attitudeLabel`。最后，双击每个标签并删除现有文本。这个简单的\
  \ GUI 就完成了，保存你的工作，准备编写一些代码。\n\n接下来，选择 `ViewController.swift`。现在到了有趣的部分。将代码清单 20-1\
  \ 中的代码添加到 `ViewController.swift` 文件中。\n\n```\nprivate let motionManager = CMMotionManager()\n\
  private let queue = OperationQueue()\n\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    // 加载视图后的任何额外设置，通常从 nib 文件加载。\n    if motionManager.isDeviceMotionAvailable\
  \ {\n        motionManager.deviceMotionUpdateInterval = 0.1\n        motionManager.startDeviceMotionUpdates(to:\
  \ queue) {\n            (motion: CMDeviceMotion?, error: NSError?) -> Void in\n\
  \            if let motion = motion {\n                let rotationRate = motion.rotationRate\n\
  \                let gravity = motion.gravity\n                let userAcc = motion.userAcceleration\n\
  \                let attitude = motion.attitude\n\n                let gyroscopeText\
  \ =\n                    String(format: \"旋转速率:\\n-----------------\\n\" +\n   \
  \                     \"x: %+.2f\\ny: %+.2f\\nz: %+.2f\\n\",\n                 \
  \       rotationRate.x, rotationRate.y, rotationRate.z)\n                let acceleratorText\
  \ =\n                    String(format: \"加速度:\\n---------------\\n\" +\n      \
  \                  \"重力 x: %+.2f\\t\\t 用户 x: %+.2f\\n\" +\n                    \
  \    \"重力 y: %+.2f\\t\\t 用户 y: %+.2f\\n\" +\n                        \"重力 z: %+.2f\\\
  t\\t 用户 z: %+.2f\\n\",\n                        gravity.x, userAcc.x, gravity.y,\n\
  \                        userAcc.y, gravity.z, userAcc.z)\n                let attitudeText\
  \ =\n                    String(format: \"姿态:\\n----------\\n\" +\n            \
  \            \"滚转角: %+.2f\\n 俯仰角: %+.2f\\n 偏航角: %+.2f\\n\",\n                  \
  \      attitude.roll, attitude.pitch, attitude.yaw)\n\n                DispatchQueue.main.async\
  \ {\n                    self.gyroscopeLabel.text = gyroscopeText\n            \
  \        self.accelerometerLabel.text = acceleratorText\n                    self.attitudeLabel.text\
  \ = attitudeText\n                }\n            }\n        }\n    }\n}\n```\n\n\
  **代码清单 20-1.** 将以下代码添加到 `ViewController.swift` 文件\n\n首先，我们导入 Core Motion 框架并向类中添加两个额外的属性：\n\
  \n```\nimport UIKit\nimport CoreMotion\n\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet var gyroscopeLabel: UILabel!\n    @IBOutlet var accelerometerLabel:\
  \ UILabel!\n    @IBOutlet var attitudeLabel: UILabel!\n\n    private let motionManager\
  \ = CMMotionManager()\n    private let queue = OperationQueue()\n```\n\n这段代码首先创建了一个\
  \ `CMMotionManager` 的实例，我们将用它来监控运动事件。然后代码创建了一个操作队列，它只是一个用于容纳待完成工作的容器。\n\n> **警告**\
  \  \n> 运动管理器需要一个队列，每次事件发生时，它都会将你要完成的工作单元（由你提供的闭包指定）放入该队列中。人们可能会想使用系统的默认队列来实现此目的，但\
  \ `CMMotionManager` 的文档明确警告不要这样做。问题是，默认队列最终可能会被这些事件塞满，从而难以处理其他关键的系统事件。\n\n\n```markdown\n\
  接下来，在`viewDidLoad`方法中，我们添加代码来请求设备运动更新，并在获取到陀螺仪、加速度计和姿态读数时更新标签。我们首先检查设备是否确实拥有提供运动信息所需的设备。到目前为止，所有已发布的手持\
  \ iOS 设备都具备此功能，但为了以防未来某些设备不具备，检查一下是值得的。接着，我们设置更新之间的时间间隔，以秒为单位指定。这里，我们要求十分之一秒的间隔。请注意，设置此值并不能保证我们能够以精确的速度接收更新。事实上，此设置实际上是一个上限，指定了运动管理器允许提供给我们的最佳速率。在实际中，它可能以更低的频率更新：\n\
  \n```\nif motionManager.isDeviceMotionAvailable {\n    motionManager.deviceMotionUpdateInterval\
  \ = 0.1\n}\n```\n\n接下来，我们告诉运动管理器开始报告设备运动更新。我们传入一个闭包，用于定义每次发生更新时将要执行的工作，以及该闭包将被排入执行队列的队列。在此例中，闭包接收一个`CMDeviceMotion`对象，该对象包含最新的运动数据，以及如果获取数据时发生错误则可能包含的`NSError`对象：\n\
  \n```\nmotionManager.startDeviceMotionUpdates(to: queue) {\n    (motion: CMDeviceMotion?,\
  \ error: NSError?) -> Void in\n}\n```\n\n接下来是闭包本身。它根据当前的运动值创建字符串，并将它们推送到标签中。我们不能直接在此处这样做，因为像`UILabel`这样的\
  \ UIKit 类通常只有在从主线程访问时才能正常工作。由于此代码的执行方式（从`NSOperationQueue`内部执行），我们根本无法知道将在哪个特定线程中执行。因此，我们使用`DispatchQueue.main.async`函数，在设置标签的`text`属性之前将控制权传递给主线程。\n\
  \n陀螺仪值通过传入闭包的`CMDeviceMotion`对象的`rotationRate`属性访问。`rotationRate`属性的类型是`RotationRate`，它只是一个包含三个`Float`值的简单`struct`，分别表示绕\
  \ x、y 和 z 轴的旋转速率。加速度计数据稍微复杂一些，因为 Core Motion 报告两个不同的值——重力加速度和用户施加力引起的任何额外加速度。您可以从`gravity`和`userAcceleration`属性获取这些值，这两个属性的类型都是`CMAcceleration`。`CMAcceleration`是另一个简单的`struct`，用于保存沿\
  \ x、y 和 z 轴的加速度。最后，设备姿态在`attitude`属性中报告，其类型为`CMAttitude`。我们将在运行应用程序时进一步讨论这个问题。\n\
  \n在尝试运行应用程序之前，还有一件事要做。我们将以多种方式移动和旋转设备，以查看`CMDeviceMotion`结构中的值与设备实际发生的情况之间的关联。在此过程中，我们不希望自动旋转启动。为了防止这种情况，请在项目导航器中选择项目，选择`MotionMonitor`目标，然后选择“通用”标签。在“部署信息”下的“设备方向”部分中，选择“纵向”，并确保未选择其他三个方向。这将应用程序锁定为仅纵向方向。现在在您的\
  \ iOS 设备上构建并运行您的应用程序，然后尝试一下，如图 [20-2] 所示。\n\n![A329781_3_En_20_Fig2_HTML.jpg](img/A329781_3_En_20_Fig2_HTML.jpg)\n\
  \n图 20-2. 在 iPhone 上运行的 MotionMonitor。不幸的是，如果您在模拟器中运行此应用程序，将无法获得任何有用的信息。\n\n当您以不同方式倾斜设备时，您将看到旋转速率、加速度计和姿态值如何调整到每个新位置，并且只要您保持设备稳定，这些值也将保持稳定。每当设备静止时，无论其处于何种方向，旋转值都将徘徊在零附近。当您旋转设备时，您将看到旋转值根据您绕其各个轴转动设备的方式而变化。当您停止移动设备时，这些值将始终回到零。稍后我们将更仔细地查看所有结果。\n\
  \n### 主动运动访问\n\n您已经了解了如何通过将`CMMotionManager`闭包传递给运动发生时被调用的方式来访问运动数据。这种事件驱动的运动处理对于普通的\
  \ Cocoa 应用程序来说已经足够好了，但有时它并不完全适合应用程序的特定需求。例如，交互式游戏通常有一个持续运行的循环，用于处理用户输入、更新游戏状态并重绘屏幕。在这种情况下，事件驱动的方法并不太合适，因为您需要实现一个对象，该对象等待运动事件，记住每个传感器报告的最新位置，并在必要时准备好将数据报告回主游戏循环。幸运的是，`CMMotionManager`有一个内置的解决方案。我们可以不使用传递闭包的方式，而是直接告诉它使用`startDeviceMotionUpdates()`方法激活传感器。一旦我们这样做，我们就可以随时直接从运动管理器读取值。\n\
  \n让我们更改我们的`MotionMonitor`应用程序以使用此方法，以便您了解其工作原理。首先，复制您的`MotionMonitor`项目文件夹，或者像我们在前面的示例中所做的那样将其压缩。\n\
  \n注意\n\n您可以在示例源代码的`MonitorMotion2`文件夹中找到此项目的完整版本。\n\n关闭打开的 Xcode 项目，然后打开新副本中的项目，直接进入`ViewController.swift`。第一步是删除`queue`属性，并添加一个新属性，即一个指向`NSTimer`的指针，该定时器将触发我们所有的显示更新：\n\
  \n```\nclass ViewController: UIViewController {\n    @IBOutlet var gyroscopeLabel:\
  \ UILabel!\n    @IBOutlet var accelerometerLabel: UILabel!\n    @IBOutlet var attitudeLabel:\
  \ UILabel!\n    private let motionManager = CMMotionManager()\n    private var updateTimer:\
  \ Timer!\n}\n```\n\n接下来，删除`viewDidLoad()`方法，因为我们不再需要它。我们将使用定时器每十分之一秒直接从运动管理器收集运动数据，而不是将其传递到闭包中。我们希望我们的定时器——以及运动管理器本身——仅在应用程序的视图实际显示时才处于活动状态。这样，我们将主游戏循环的使用率降至最低。我们可以通过实现`viewWillAppear()`和`viewDidDisappear()`方法来实现这一点，如清单\
  \ [20-2] 所示。\n\n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    if motionManager.isDeviceMotionAvailable {\n        motionManager.deviceMotionUpdateInterval\
  \ = 0.1\n        motionManager.startDeviceMotionUpdates()\n        updateTimer =\n\
  \            Timer.scheduledTimer(timeInterval: 0.1, target: self,\n           \
  \                      selector: #selector(ViewController.updateDisplay), userInfo:\
  \ nil, repeats: true)\n    }\n}\n\noverride func viewDidDisappear(_ animated: Bool)\
  \ {\n    super.viewDidDisappear(animated)\n    if motionManager.isDeviceMotionAvailable\
  \ {\n        motionManager.stopDeviceMotionUpdates()\n        updateTimer.invalidate()\n\
  \        updateTimer = nil\n    }\n}\n// 清单 20-2. 用于主动运动访问的 viewWillAppear 和 viewDidDisappear\
  \ 方法\n```\n\n`viewWillAppear()`中的代码调用运动管理器的`startDeviceMotionUpdates()`方法来启动设备运动信息，然后创建一个新的定时器并将其安排为每十分之一秒触发一次，调用我们尚未创建的`updateDisplay()`方法。在`viewDidDisappear()`下方添加清单\
  \ [20-3] 中的方法。\n```\n\n\n## 排版后的内容\n\n```swift\nfunc updateDisplay() {\n    if let\
  \ motion = motionManager.deviceMotion {\n        let rotationRate = motion.rotationRate\n\
  \        let gravity = motion.gravity\n        let userAcc = motion.userAcceleration\n\
  \        let attitude = motion.attitude\n        let gyroscopeText =\n         \
  \   String(format: \"Rotation Rate:\\n-----------------\\n\" +\n               \
  \ \"x: %+.2f\\ny: %+.2f\\nz: %+.2f\\n\",\n                rotationRate.x, rotationRate.y,\
  \ rotationRate.z)\n        let acceleratorText =\n            String(format: \"\
  Acceleration:\\n---------------\\n\" +\n                \"Gravity x: %+.2f\\t\\\
  tUser x: %+.2f\\n\" +\n                \"Gravity y: %+.2f\\t\\tUser y: %+.2f\\n\"\
  \ +\n                \"Gravity z: %+.2f\\t\\tUser z: %+.2f\\n\",\n             \
  \   gravity.x, userAcc.x, gravity.y,\n                userAcc.y, gravity.z, userAcc.z)\n\
  \        let attitudeText =\n            String(format: \"Attitude:\\n----------\\\
  n\" +\n                \"Roll: %+.2f\\nPitch: %+.2f\\nYaw: %+.2f\\n\",\n       \
  \         attitude.roll, attitude.pitch, attitude.yaw)\n        DispatchQueue.main.async\
  \ {\n            self.gyroscopeLabel.text = gyroscopeText\n            self.accelerometerLabel.text\
  \ = acceleratorText\n            self.attitudeLabel.text = attitudeText\n      \
  \  }\n    }\n}\n```\n\n**代码清单 20-3.** `updateDisplay()` 方法位于 `ViewController.swift`\
  \ 文件中\n\n这是之前版本示例中闭包代码的副本，不同之处在于`CMDeviceMotion`对象是直接从运动管理器获得的。注意`if let`表达式，它确保运动管理器返回的`CMDeviceMotion`值不是`nil`；这是必需的，因为定时器可能在运动管理器获取第一个数据样本之前触发。在你的设备上构建并运行该应用，你会看到它的行为与第一个版本完全相同。现在你已经了解了访问运动数据的两种方式。选择最适合你应用的方式。\n\
  \n### 陀螺仪与姿态结果\n\n陀螺仪测量设备绕 x、y 和 z 轴旋转的速率。请参考图 20-1 了解这些轴如何与设备机身相关联。首先，将设备平放在桌子上。当设备不动时，所有三个旋转速率都接近于零，你会看到横滚角（`roll`）、俯仰角（`pitch`）和偏航角（`yaw`）的值也接近于零。现在轻轻顺时针旋转设备。当你这样做时，你会看到绕\
  \ z 轴的旋转速率变为负值。旋转设备越快，旋转速率的绝对值就越大。\n\n当你停止旋转时，旋转速率将回到零，但偏航角不会。偏航角表示设备绕 z 轴从其初始静止位置旋转过的角度。如果你顺时针旋转设备，偏航角将通过负值减小，直到设备距其静止位置旋转\
  \ 180°，此时其值将在 -3 左右。如果你继续顺时针旋转设备，偏航角将跳转到略大于 +3 的值，然后当你将其旋转回初始位置时减小到零。如果你从逆时针旋转开始，同样的情况会发生，只是偏航角最初是正值。偏航角实际上是以弧度为单位测量的，而不是度。旋转\
  \ 180° 相当于旋转 π 弧度，这就是为什么偏航角的最大值约为 3（因为 π 略大于 3.14）。\n\n再次将设备平放在桌子上，握住顶部边缘并将其向上旋转，底部边缘留在桌子上。这是绕\
  \ x 轴的旋转，因此你会看到 x 旋转速率通过正值增加，直到你稳住设备，此时它回到零。现在查看俯仰角的值。它增加的量取决于你抬起设备顶部边缘的角度。如果你将设备完全抬起到垂直位置，俯仰角的值将在\
  \ 1.5 左右。与偏航角一样，俯仰角以弧度为单位测量，因此当设备垂直时，它旋转了 90°，即 π/2 弧度，略大于 1.5。如果你再次将设备放平并重复——但这次抬起底部边缘并将顶部留在桌子上——你正在执行绕\
  \ x 轴的逆时针旋转，你会看到负的旋转速率和负的俯仰角。\n\n最后，再次将设备平放在桌子上，抬起其左侧边缘，右侧边缘留在桌子上。这是绕 y 轴的旋转，你会看到这反映在\
  \ y 轴旋转速率中。你可以从横滚角的值中获得任何时刻的总旋转角度。当设备在其右侧边缘直立时，该值约为 1.5（实际上是 π/2）弧度，如果你将其正面朝下翻转，它将一直增加到\
  \ π 弧度；当然，你需要一张玻璃桌子才能看到这一点。\n\n总之，使用旋转速率来查看设备绕每个轴旋转的速度，使用偏航角、俯仰角和横滚角的值来获取设备相对于其起始方向绕这些轴的总旋转角度。\n\
  \n### 加速度计结果\n\n我之前提到过，iPhone 的加速度计检测沿三个轴的加速度；它使用两个`CMAcceleration`结构体提供此信息。每个`CMAcceleration`都有一个\
  \ x、y 和 z 字段，每个字段都包含一个浮点值。值为`0`意味着加速度计检测到该特定轴没有运动。正值或负值表示某个方向上的力。例如，y 的负值表示检测到向下的拉力，这可能表明手机正以纵向方向直立拿着。y\
  \ 的正值表示在相反方向上施加了某种力，这可能意味着手机倒着拿或手机正在向下移动。`CMDeviceMotion`对象分别报告由重力引起的沿每个轴的加速度以及由用户引起的任何附加力。\n\
  \n例如，如果你将设备平放，你会看到重力值沿 z 轴接近 -1，而用户加速度分量都接近于零。现在，如果你快速抬起设备，保持其水平，你会看到重力值大致保持不变，但沿\
  \ z 轴有正向的用户加速度。对于某些应用，区分重力和用户加速度值是有用的，而对于其他应用，你需要总加速度，你可以通过将`CMDeviceMotion`对象的`gravity`和`userAcceleration`属性的分量相加来获得。\n\
  \n牢记图 20-1 中的图示，让我们来看一下图 20-3 中的一些加速度计结果。该图显示了当设备处于给定姿态且不移动时，报告的重力加速度。请注意，在现实生活中，你几乎永远不会得到如此精确的值，因为加速度计足够灵敏，甚至可以感知到微小的运动，并且你通常会在所有三个轴上至少检测到一些微小的力。这是现实世界中的物理，而不是高中物理。\n\
  \n![A329781_3_En_20_Fig3_HTML.jpg](img/A329781_3_En_20_Fig3_HTML.jpg)\n\n**图 20-3.**\
  \ 不同设备方向下的理想化重力加速度值\n\n在第三方应用中，加速度计最常见的用途可能是作为游戏控制器。我们将在本章稍后创建一个使用加速度计进行输入的程序，但首先我们将看另一个常见的加速度计用途：检测摇动。\n\
  \n\n\n## 检测摇晃\n\n与手势类似，摇晃也可作为应用程序的一种输入形式。例如，苹果 iOS 示例代码项目中的绘图程序 GLPaint，允许用户通过摇晃\
  \ iOS 设备来擦除绘图，就像 Etch A Sketch 画板一样。检测摇晃相对简单，只需检查某一轴上的用户加速度绝对值是否超过设定阈值。在正常使用中，三个轴中有某个轴的值达到\
  \ 1.3g 左右并不罕见，但要想获得远超此数值的值，通常需要使用刻意施加的力。加速度计似乎无法记录超过 2.3g 的值（至少在我们的经验中如此），因此你可能不想将阈值设置得比这个更高。\n\
  \n要检测摇晃，你可以通过检查绝对值是否大于 1.5（轻微摇晃）或 2.0（剧烈摇晃），在 MotionMonitor 示例的运动管理器闭包中添加如下代码：\n\
  \n```\nlet userAcc = motion.userAcceleration\nif fabsf(Float(userAcc.x)) > 2.0\n\
  || fabsf(Float(userAcc.y)) > 2.0\n|| fabsf(Float(userAcc.z)) > 2.0 {\n// 在此处执行相应操作…\n\
  }\n```\n\n这段代码将检测任何轴上超过 2 个 g 力的运动。\n\n### 内置摇晃检测\n\n实际上，还有一种更简单的检测摇晃的方法——这种方法直接内置于响应者链中。类似于第\
  \ [18] 章中我们实现 `touchesBegan(_:withEvent:)` 等方法来获取触摸事件，iOS 也提供了三个类似的响应者方法来检测运动：\n\
  \n*   运动开始时，`motionBegan(_:withEvent:)` 方法会在第一响应者上被调用，然后沿响应者链传递，如第 [18] 章所述。\n*\
  \   运动结束时，会调用 `motionEnded(_:withEvent:)` 方法。\n*   如果在摇晃过程中有来电或其他中断事件发生，则会调用 `motionCancelled(_:withEvent:)`\
  \ 方法。\n\n这些方法的第一个参数是一个事件子类型，其中之一是 `UIEventSubtype.motionShake`。这意味着你实际上无需直接使用 `CMMotionManager`\
  \ 就能检测摇晃。你只需在视图或视图控制器中重写相应的运动感应方法，当用户摇晃手机时，这些方法就会被自动调用。除非你特别需要对摇晃手势进行更精细的控制，否则应使用内置的运动检测，而非前面描述的手动方法。不过，我认为我们应该向你展示手动方法的基础知识，以备你需要更精细的控制。\n\
  \n### Shake and Break 应用\n\n在本项目中，我们将编写一个检测摇晃的应用程序，然后让你的手机看起来和听起来像是因为摇晃而损坏。启动应用程序时，程序将显示一张类似\
  \ iPhone 主屏幕的图片，如图 20-4 所示。然而，如果用力摇晃手机，可怜的手机就会发出你绝不想从消费电子设备中听到的声音。更重要的是，你的屏幕将变成如图\
  \ 20-5 所示的样子。别担心，你只需触摸屏幕，即可将 iPhone 重置为之前完好无损的状态。\n\n![A329781_3_En_20_Fig5_HTML.jpg](img/A329781_3_En_20_Fig5_HTML.jpg)\n\
  \n图 20-5. 摇晃它会模拟碎裂的 iPhone 屏幕\n\n![A329781_3_En_20_Fig4_HTML.jpg](img/A329781_3_En_20_Fig4_HTML.jpg)\n\
  \n图 20-4. ShakeAndBreak 应用的初始界面看似无害\n\n在 Xcode 中使用“单视图应用”模板创建一个新项目。确保设备类型设置为 iPhone——与本书中的大多数其他示例不同，此示例仅适用于\
  \ iPhone，因为图像尺寸适用于 iPhone 6/6s 屏幕（如果你拥有 iPhone 6/6s Plus，它们也能较好地缩放）。当然，如果你创建额外的图像，也可以很轻松地将此项目扩展到\
  \ iPad。将新项目命名为 `ShakeAndBreak`。在示例源代码的“Images and Sounds”文件夹中，我们提供了此应用所需的两张图像和一个声音文件。在项目导航器中选中\
  \ `Assets.xcassets`，然后将图像 `Home.png` 和 `BrokenHome.png` 拖入其中。将 `glass.wav` 拖入项目导航器。\n\
  \n现在开始创建我们的视图控制器。我们需要创建一个指向图像视图的插座，以便更改显示的图像。单击 `ViewController.swift`，并向其中添加以下属性：\n\
  \n```\nclass ViewController: UIViewController {\n@IBOutlet var imageView: UIImageView!\n\
  ```\n\n保存文件。现在选择 `Main.storyboard`，在 Interface Builder 中编辑文件。将图像视图从库中拖到布局区域的视图上，并调整其大小以填充其父视图。在文档概览中，按住\
  \ Control 键从图像视图拖到其父视图，按住 Shift 键，在上下文菜单中选择“Leading Space to Container Margin”、“Trailing\
  \ Space to Container Margin”、“Vertical Spacing to Top Layout Guide”和“Vertical Spacing\
  \ to Bottom Layout Guide”，然后按 Return 键以锁定图像视图的大小和位置。最后，按住 Control 键从视图控制器图标拖到图像视图，并选择\
  \ `imageView` 插座，然后保存故事板。\n\n接下来，回到 `ViewController.swift` 文件。我们将为要显示的两张图像添加一些额外的属性，以跟踪当前是否显示了破碎的图像。我们还会添加一个音频播放器对象，用于播放玻璃破碎的声音。以下粗体行位于文件顶部附近：\n\
  \n```\nimport UIKit\nimport AVFoundation\nclass ViewController: UIViewController\
  \ {\n@IBOutlet var imageView: UIImageView!\nprivate var fixed: UIImage!\nprivate\
  \ var broken: UIImage!\nprivate var brokenScreenShowing = false\nprivate var crashPlayer:\
  \ AVAudioPlayer?\n```\n\n将以下代码添加到 `viewDidLoad()` 方法中：\n\n```\nif let url = Bundle(for:\
  \ type(of: self)).url(forResource:\"glass\", withExtension:\"wav\"){\ndo {\ncrashPlayer\
  \ = try AVAudioPlayer(contentsOf: url, fileTypeHint: AVFileTypeWAVE)\n} catch let\
  \ error as NSError {\nprint(\"音频错误！\\(error.localizedDescription)\")\n}\n}\nfixed\
  \ = UIImage(named: \"Home\")\nbroken = UIImage(named: \"HomeBroken\")\nimageView.image\
  \ = fixed\n```\n\n至此，我们已将 `url` 变量初始化为指向声音文件，并初始化了一个 `AVAudioPlayer` 实例（该类将播放声音）。然后我们加载了需要使用的两张图像，并将第一张显示出来。接下来，添加以下新方法：\n\
  \n\n\n```swift\noverride func motionEnded(_ motion: UIEventSubtype, with event:\
  \ UIEvent?) {\nif !brokenScreenShowing && motion == .motionShake {\nimageView.image\
  \ = broken;\ncrashPlayer?.play()\nbrokenScreenShowing = true;\n}\n}\n```\n\n该方法重写了\
  \ `UIResponder` 的 `motionEnded(_:withEvent:)` 方法，每当发生摇动时该方法就会被调用。在确认碎屏画面未显示且当前事件确实是摇动事件后，该方法会显示破碎图像并播放碎裂音效。\n\
  \n最后一个方法你应该已经非常熟悉了。当屏幕被触摸时它会触发。我们只需在该方法中将图像恢复为未破碎的屏幕，并将 `brokenScreenShowing` 重置为\
  \ `false`：\n\n```swift\noverride func touchesBegan(_ touches: Set, with event: UIEvent?)\
  \ {\nimageView.image = fixed\nbrokenScreenShowing = false\n}\n```\n\n构建并运行应用程序，尝试摇动你的设备。对于那些无法在\
  \ iOS 设备上运行该应用的用户，依然可以尝试。模拟器虽然不能模拟加速计硬件，但包含了模拟摇动事件的菜单项，因此同样可以在模拟器中运行。去尽情体验吧。完成之后，我们将学习如何将加速计用作游戏及其他程序的控制器。\n\
  \n## 加速计作为方向控制器\n\n开发者们常常使用加速计替代按钮来控制游戏中角色或物体的移动。例如在赛车游戏中，像转动方向盘一样旋转 iOS 设备可控制转向，前倾设备可加速，后倾设备可刹车。将加速计用作控制器的具体方式会因游戏机制的不同而差异很大。在最简单的场景中，你可能只需获取某个轴的值，乘以系数后加到被控物体的坐标上。而在物理模拟更逼真的复杂游戏中，则需要根据加速计返回的值来调整被控物体的速度。\n\
  \n将加速计用作控制器的一个棘手之处在于：委托方法并不能保证按照你指定的时间间隔回调。如果你让运动管理器每秒读取加速计 60 次，唯一能确定的是它每秒不会更新超过\
  \ 60 次。你无法保证每秒能获得 60 次均匀间隔的更新。因此，如果基于加速计输入进行动画处理，必须跟踪更新之间的时间间隔，并将其纳入方程中以计算物体的移动距离。\n\
  \n## 弹球应用\n\n在下一个项目中，我们将通过倾斜手机来在 iPhone 屏幕上移动精灵。这是一个使用加速计接收输入的极简示例。我们将使用 Quartz\
  \ 2D 来处理动画。\n\n注意\n\n通常来说，在处理需要流畅动画的游戏及其他程序时，建议使用 Sprite Kit、OpenGL ES 或 Metal。本应用之所以使用\
  \ Quartz 2D，是为了简化代码并减少与加速计使用无关的内容。\n\n在该应用中，当你倾斜 iPhone 时，弹珠会像在桌面上一样滚动，如图 20-6 所示。向左倾斜，弹珠会向左滚动；倾斜幅度越大，移动速度越快；倾斜回来时，它会减速并开始向反方向移动。\n\
  \n![A329781_3_En_20_Fig6_HTML.jpg](img/A329781_3_En_20_Fig6_HTML.jpg)\n\n图 20-6.\
  \ Ball 应用让你在屏幕上滚动弹珠\n\n在 Xcode 中，使用单视图应用模板创建新项目。将设备类型设为 Universal，并将项目命名为 Ball。在示例源代码的\
  \ Images and Sounds 文件夹中，你可以找到名为 `ball.png` 的图像。使用项目导航器将 `ball.png` 拖入 `Assets.xcassets`。\n\
  \n接着，在项目导航器中选择 Ball 项目，然后选择 Ball target 的 General 标签页。在 Deployment Info 下的 Device\
  \ Orientation 部分，选择 Portrait 并取消选中其他所有复选框（与本章前面为 `MotionMonitor` 应用所做的操作相同）。这将禁用默认的界面方向切换；我们希望滚动弹珠时，移动设备不会改变界面方向。\n\
  \n现在，单击 Ball 文件夹，选择 File ➤ New ➤ File... 从 iOS Source 部分选择 Cocoa Touch Class，然后点击\
  \ Next。将新类设为 `UIView` 的子类，命名为 `BallView`，然后点击 Create。稍后我们会回来编辑这个类。选择 `Main.storyboard`\
  \ 在 Interface Builder 中编辑文件。单击文档大纲中的 View 图标，使用身份检查器将视图的类从 `UIView` 改为 `BallView`。接着切换到属性检查器，将视图的\
  \ Background 设为浅灰色。最后，保存故事板。\n\n现在开始编辑 `ViewController.swift`。将代码清单 20-4 中的行添加到文件顶部。\n\
  \n```swift\nimport UIKit\nimport CoreMotion\nclass ViewController: UIViewController\
  \ {\n    private static let updateInterval = 1.0/60.0\n    private let motionManager\
  \ = CMMotionManager()\n    private let queue = OperationQueue()\n    \n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional\
  \ setup after loading the view, typically from a nib.\n        \n        motionManager.startDeviceMotionUpdates(to:\
  \ queue) {\n            (motionData: CMDeviceMotion?, error: NSError?) -> Void in\n\
  \            let ballView = self.view as! BallView\n            ballView.acceleration\
  \ = motionData!.gravity\n            \n            DispatchQueue.main.async {\n\
  \                ballView.update()\n            }\n        }\n    }\n}\n```\n\n\
  代码清单 20-4. 按所示内容修改 `ViewController.swift` 和其中的 `viewDidLoad` 方法\n\n注意\n\n输入此代码后，由于\
  \ `BallView` 尚未完成，你会看到编译错误。我们的大部分工作将在 `BallView` 类中完成。\n\n这里的 `viewDidLoad()` 方法与本章前面某些示例类似。主要区别在于我们使用了更高的更新间隔——每秒\
  \ 60 次。在告知运动管理器在有加速计更新时执行的回调闭包中，我们将加速度对象传递给视图。然后调用名为 `update` 的方法，该方法会根据加速度和自上次更新以来的时间间隔更新视图中弹珠的位置。由于该闭包可能在任意线程上执行，而\
  \ UIKit 对象（包括 `UIView`）的方法只能在主线程安全使用，因此我们再次强制 `update` 方法在主线程中调用。\n\n\n\n### 编写\
  \ Ball View\n\n选择 `BallView.swift` 文件。在这里，我们需要导入 `Core Motion` 框架，并添加控制器用来传递加速度值的属性，以及类实现中会用到的另外五个属性：\n\
  \n```\nimport UIKit\nimport CoreMotion\n\nclass BallView: UIView {\n    var acceleration\
  \ = CMAcceleration(x: 0, y: 0, z: 0)\n    private let image = UIImage(named: \"\
  ball\")!\n    private var currentPoint: CGPoint = CGPoint.zero\n    private var\
  \ ballXVelocity = 0.0\n    private var ballYVelocity = 0.0\n    private var lastUpdateTime\
  \ = Date()\n```\n\n让我们逐一审视这些属性，并说明各自的作用。`acceleration` 属性将保存最新的加速度值，这些值由控制器从设备运动更新中获取。接下来是一个\
  \ `UIImage`，它指向我们将在屏幕上移动的精灵图：\n\n```\nprivate let image = UIImage(named: \"ball\"\
  )!\n```\n\n`currentPoint` 属性将保存球的当前位置。我们将使用这个值以及它的上一个值（Swift 会自动为我们保留），来构建一个包含球新旧位置的更新矩形，从而使球在新位置绘制，并在旧位置擦除：\n\
  \n```\nprivate var currentPoint: CGPoint = CGPoint.zero\n```\n\n我们还有两个变量用来追踪球在当前二维空间中的速度。虽然这不是一个非常复杂的模拟，但我们希望球的移动方式能类似于真实球体。我们将在下一节计算球的运动。通过这些变量，我们将从加速度计获取加速度，并持续追踪球在两个轴上的速度。\n\
  \n```\nprivate var ballXVelocity = 0.0\nprivate var ballYVelocity = 0.0\n```\n\n\
  最后，`lastUpdateTime` 属性会在每次更新球的位置时被设置。我们将用它来根据两次更新之间的时间间隔和球的加速度计算速度变化。\n\n现在，让我们编写代码来绘制球并使其在屏幕上移动。首先，将清单\
  \ 20-5 所示的方法添加到 `BallView.swift` 文件中。\n\n```\noverride init(frame: CGRect) {\n \
  \   super.init(frame: frame)\n    commonInit()\n}\n\nrequired init?(coder aDecoder:\
  \ NSCoder) {\n    super.init(coder: aDecoder)\n    commonInit()\n}\n\nprivate func\
  \ commonInit() -> Void {\n    currentPoint = CGPoint(x: (bounds.size.width / 2.0)\
  \ +\n        (image.size.width / 2.0),\n        y: (bounds.size.height / 2.0) +\n\
  \        (image.size.height / 2.0))\n}\n```\n\n清单 20-5. 为 BallView 类添加 init 方法\n\
  \n`init?(coder:)` 和 `init(frame:)` 方法都会调用我们的 `commonInit()` 方法。在 storyboard 文件中创建的视图将通过\
  \ `initWithCoder()` 方法进行初始化。我们从两个初始化方法中都调用 `commonInit()` 方法，以确保我们的视图类既能通过代码安全创建，也能从\
  \ nib 文件中安全创建。对于任何可能被复用的视图类（比如这个炫酷的球滚动视图）来说，这样做都是很好的实践。现在，取消注释掉 `drawRect:` 方法，并给出这个简单的实现，以便在\
  \ `currentPoint` 处绘制球图像：\n\n```\noverride func draw(_ rect: CGRect) {\n    // Drawing\
  \ code\n    image.draw(at: currentPoint)\n}\n```\n\n接下来，将我们的 `update()` 方法添加到类末尾，如清单\
  \ 20-6 所示。\n\n```\nfunc update() -> Void {\n    let now = Date()\n    let secondsSinceLastDraw\
  \ = now.timeIntervalSince(lastUpdateTime)\n    ballXVelocity =\n        ballXVelocity\
  \ + (acceleration.x * secondsSinceLastDraw)\n    ballYVelocity =\n        ballYVelocity\
  \ - (acceleration.y * secondsSinceLastDraw)\n    \n    let xDelta = secondsSinceLastDraw\
  \ * ballXVelocity * 500\n    let yDelta = secondsSinceLastDraw * ballYVelocity *\
  \ 500\n    currentPoint = CGPoint(x: currentPoint.x + CGFloat(xDelta),\n       \
  \                    y: currentPoint.y + CGFloat(yDelta))\n    lastUpdateTime =\
  \ now\n}\n```\n\n清单 20-6. BallClass 类的 Update 方法\n\n最后，将清单 20-7 中的属性观察器添加到 `currentPoint`\
  \ 属性中。\n\n```\nvar currentPoint: CGPoint = CGPoint.zero {\n    didSet {\n      \
  \  var newX = currentPoint.x\n        var newY = currentPoint.y\n        \n    \
  \    if newX < 0 {\n            newX = 0\n            ballXVelocity = 0\n      \
  \  } else if newX > bounds.size.width - image.size.width {\n            newX = bounds.size.width\
  \ - image.size.width\n            ballXVelocity = 0\n        }\n        \n     \
  \   if newY < 0 {\n            newY = 0\n            ballYVelocity = 0\n       \
  \ } else if newY > bounds.size.height - image.size.height {\n            newY =\
  \ bounds.size.height - image.size.height\n            ballYVelocity = 0\n      \
  \  }\n        \n        currentPoint = CGPoint(x: newX, y: newY)\n        let currentRect\
  \ = CGRect(x: newX, y: newY,\n                                width: newX + image.size.width,\n\
  \                                height: newY + image.size.height)\n        let\
  \ prevRect = CGRect(x: oldValue.x, y: oldValue.y,\n                            width:\
  \ oldValue.x + image.size.width,\n                            height: oldValue.y\
  \ + image.size.height)\n        setNeedsDisplay(currentRect.union(prevRect))\n \
  \   }\n}\n```\n\n清单 20-7. currentProperty 属性观察器\n\n\n\n#### 计算球的运动\n\n我们的 `drawRect()`\
  \ 方法再简单不过了。我们只需在 `currentPoint` 中存储的位置上绘制球体图像。然而，`currentPoint` 的属性观察器是另一回事。当设置新位置时（来自稍后你会看到的\
  \ `update()` 方法），我们需要检查球体是否撞到了屏幕边缘，如果是，则停止其沿 x 轴或 y 轴的运动。我们通过实现一个属性观察器来实现这一点，从中我们可以访问属性的新值并修改它，而不会导致属性观察器被再次调用（否则会导致无限递归）。\n\
  \n我们首先获取球体的当前 x 和 y 坐标，并进行边界检查。如果球体的 `x` 或 `y` 位置小于 `0` 或大于屏幕的宽度或高度（考虑到图像的宽度和高度），则停止该方向上的加速度，并更改球体的坐标，使其出现在屏幕边缘：\n\
  \n```\nvar newX = currentPoint.x\nvar newY = currentPoint.y\nif newX < 0 {\n   \
  \ newX = 0\n    ballXVelocity = 0\n} else if newX > bounds.size.width - image.size.width\
  \ {\n    newX = bounds.size.width - image.size.width\n    ballXVelocity = 0\n}\n\
  if newY < 0 {\n    newY = 0\n    ballYVelocity = 0\n} else if newY > bounds.size.height\
  \ - image.size.height {\n    newY = bounds.size.height - image.size.height\n   \
  \ ballYVelocity = 0\n}\n```\n\n**提示：** 你是否希望球体更自然地撞击墙壁弹回，而不是直接停止？这很容易做到。只需将 `setCurrentPoint:`\
  \ 中当前读取的 `ballXVelocity = 0` 的两行改为 `ballXVelocity = -(ballXVelocity / 2.0)`。并将当前读取的\
  \ `ballYVelocity = 0` 的两行改为 `ballYVelocity = -(ballYVelocity / 2.0)`。通过这些更改，我们不是消除球体的速度，而是将其减半并设置为反方向。现在球体以一半的速度向相反方向移动。\n\
  \n在整个代码中，我们将球体的坐标保存在名为 `newX` 和 `newY` 的局部变量中。一旦我们在必要时修改了它的位置，我们就使用这些值来创建更新后的值并存储回属性中：\n\
  \n```\ncurrentPoint = CGPoint(x: newX, y: newY)\n```\n\n之后，我们根据图像大小计算两个 `CGRect`。一个矩形包含新图像将绘制的区域，另一个包含它上次绘制的区域。我们使用球体位置的先前值来计算第二个矩形，Swift\
  \ 会将其存储在一个名为 `oldValue` 的常量变量中。我们将使用这两个矩形来确保旧球体被擦除，同时新球体被绘制：\n\n```\nlet currentRect\
  \ = CGRect(x: newX, y: newY,\n                         width: newX + image.size.width,\n\
  \                         height: newY + image.size.height)\nlet prevRect = CGRect(x:\
  \ oldValue.x, y: oldValue.y,\n                      width: oldValue.x + image.size.width,\n\
  \                      height: oldValue.y + image.size.height)\n```\n\n最后，我们创建一个新矩形，它是我们刚计算的两个矩形的并集，并将其传递给\
  \ `setNeedsDisplay(currentRect:)`，以指示需要重绘的视图部分：\n\n```\nsetNeedsDisplay(currentRect.union(prevRect))\n\
  ```\n\n我们类中的最后一个实质性方法是 `update()`，它用于计算球体的正确新位置。该方法在其控制器类的加速度计方法将新的加速度对象传递给视图后被调用。首先，我们计算距离上次调用此方法已经过去了多长时间。`Date()`\
  \ 返回的 `NSDate` 实例表示当前时间。通过询问它与 `lastUpdateTime` 的时间间隔，我们得到一个数字，表示从现在到上次调用此方法之间的秒数：\n\
  \n```\nlet now = Date()\nlet secondsSinceLastDraw = now.timeIntervalSince(lastUpdateTime)\n\
  ```\n\n接下来，我们通过将当前加速度添加到当前速度来计算两个方向上的新速度。我们将加速度乘以 `secondsSinceLastDraw`，以使我们的加速度在不同时间保持一致。以相同角度倾斜手机将始终产生相同的加速度：\n\
  \n```\nballXVelocity = ballXVelocity + (acceleration.x * secondsSinceLastDraw)\n\
  ballYVelocity = ballYVelocity - (acceleration.y * secondsSinceLastDraw)\n```\n\n\
  之后，我们根据速度计算出上次调用该方法以来的实际像素变化。速度与经过时间的乘积乘以 500，以产生看起来自然的运动。如果我们不将其乘以某个值，加速度将会极其缓慢，仿佛球体陷在糖浆中一样：\n\
  \n```\nlet xDelta = secondsSinceLastDraw * ballXVelocity * 500\nlet yDelta = secondsSinceLastDraw\
  \ * ballYVelocity * 500\n```\n\n一旦我们知道像素变化，我们通过将当前位置添加到计算出的加速度来创建一个新点，并将其赋值给 `currentPoint`：\n\
  \n```\ncurrentPoint = CGPoint(x: currentPoint.x + CGFloat(xDelta),\n           \
  \            y: currentPoint.y + CGFloat(yDelta))\n```\n\n至此计算结束，剩下的就是用当前时间更新 `lastUpdateTime`：\n\
  \n```\nlastUpdateTime = now\n```\n\n现在构建并运行应用程序。如果一切顺利，应用程序将会启动，你应该能够通过倾斜手机来控制球体的运动。当球体到达屏幕边缘时，它应该停止。将手机向另一方向倾斜，它应该开始向另一方向滚动。\n\
  \n## 总结\n\n在本章中，我们确实通过物理引擎以及 iOS 的加速度计和陀螺仪看到了一些有趣的内容。我们创建了一个恶作剧应用来“弄坏”手机，并且了解了将加速度计作为控制设备的基础知识。加速度计和陀螺仪的应用可能性广泛且多样。在下一节中，我们将使用另一种\
  \ iOS 硬件：内置摄像头。\n\n# 21. 使用相机与访问照片\n\niPhone、iPad 和 iPod touch 都内置了摄像头，并配备“照片”应用帮助你管理拍摄的照片和视频（见图\
  \ 21-1），这应该不足为奇。你可能不知道的是，你的程序也可以使用内置摄像头拍照。你的应用程序还可以允许用户选择并查看设备上已存储的媒体。本章我们将探讨这两种能力。\n\
  \n![A329781_3_En_21_Fig1_HTML.jpg](img/A329781_3_En_21_Fig1_HTML.jpg)\n\n**图 21-1.**\
  \ 在本章中，我们将探索在自己的应用程序中访问 iPhone 摄像头和照片库\n\n### 使用图像选择器和 UIImagePickerController\n\
  \n由于 iOS 应用程序的沙箱机制，它们通常无法访问其沙箱之外的照片或其他数据。幸运的是，摄像头和媒体库都可以通过图像选择器供你的应用程序使用。\n\n\n\n\
  ### 使用图像选取器控制器\n\n顾名思义，图像选取器提供了一种机制，允许你从指定来源选择图像。当这个类首次在 iOS 中出现时，它仅用于图像。如今，你也可以用它来拍摄视频。通常，图像选取器会以图像和/或视频列表作为其来源，如图\
  \ 21-2（左侧）所示。不过，你也可以指定选取器将相机作为其来源，如图 21-2（右侧）所示。\n\n![A329781_3_En_21_Fig2_HTML.jpg](img/A329781_3_En_21_Fig2_HTML.jpg)\n\
  \n图 21-2. 图像选取器向用户展示其图片列表（左侧），允许用户在选取后对图片进行移动和缩放（右侧）\n\n我们通过一个名为 `UIImagePickerController`\
  \ 的控制器类来实现图像选取器界面。我们创建该类的一个实例，指定一个委托，指定其图像来源以及你是希望用户选取图像还是视频，然后将其呈现出来。图像选取器会控制设备，允许用户从现有媒体库中选择图片或视频。或者，用户也可以使用相机拍摄新的图片或视频。一旦用户做出选择，我们可以给她一个机会进行一些基本编辑，例如缩放或裁剪图像，或者修剪掉视频片段的一部分。所有这些行为都由\
  \ `UIImagePickerController` 实现，因此我们的工作量被最小化了。\n\n假设用户没有按下“取消”按钮，那么用户拍摄或从库中选择的图像或视频会传递给你的委托。无论用户是选择了媒体文件还是取消操作，你的委托都负责关闭\
  \ `UIImagePickerController`，以便用户能够返回到你的应用程序。\n\n创建 `UIImagePickerController` 极其简单。就像使用大多数类一样，你只需创建一个实例即可。不过，有一个注意事项：并非所有\
  \ iOS 设备都有相机，因此在创建 `UIImagePickerController` 实例之前，你需要检查你应用当前运行的设备是否支持你想要使用的图像来源。例如，在允许用户使用相机拍照之前，你应该确保程序运行在带有相机的设备上。你可以通过\
  \ `UIImagePickerController` 上的一个类方法来检查，如下所示：\n\n```swift\nif UIImagePickerController.isSourceTypeAvailable(.Camera)\
  \ {\n```\n\n在这个例子中，我们传递了 `UIImagePickerControllerSourceType.Camera` 来表示我们希望允许用户使用内置相机拍照或拍摄视频。如果指定的来源当前可用，方法\
  \ `isSourceTypeAvailable()` 会返回 `true`。除了 `UIImagePickerControllerSourceType.camera`\
  \ 之外，我们还可以指定另外两个值：\n\n* `UIImagePickerControllerSourceType.PhotoLibrary` 指定用户应从现有媒体库中选取图像或视频。该图像将被返回给你的委托。\n\
  * `UIImagePickerControllerSourceType.SavedPhotosAlbum` 指定用户将从现有照片库中选择图像，但选择范围将被限制在相机胶卷内。此选项可以在没有相机的设备上运行，尽管在这种设备上用处不大，但它仍然允许你选择拍摄过的任何屏幕截图。\n\
  \n在确保你程序运行的设备支持你想要使用的图像来源后，启动图像选取器的代码如清单 21-1 所示。\n\n```swift\nlet picker = UIImagePickerController()\n\
  picker.delegate = self\npicker.sourceType = UIImagePickerControllerSourceType.camera\n\
  picker.cameraDevice = UIImagePickerControllerCameraDevice.front\nself.present (picker,\
  \ animated:true, completion: nil)\n清单 21-1. 在视图控制器内部启动图像选取器\n```\n\n**提示：** 在拥有多个相机的设备上，你可以通过将\
  \ `cameraDevice` 属性设置为 `UIImagePickerControllerCameraDevice.front` 或 `UIImagePickerControllerCameraDevice.rear`\
  \ 来选择使用哪一个。要查明前置或后置相机是否可用，请结合使用相同的常量调用 `isCameraDeviceAvailable()` 方法。\n\n在创建并配置好\
  \ `UIImagePickerController` 之后，我们会使用类从 `UIView` 继承而来的方法 `self.present(_:animated:completion:)`\
  \ 来向用户呈现图像选取器，该方法作为视图控制器的方法被调用，这里我们使用 `self` 来引用该视图控制器。\n\n\n\n### 实现图像选择控制器代理\n\
  \n为了获知用户何时完成图像选择器的使用，你需要实现 `UIImagePickerControllerDelegate` 协议。该协议定义了两个方法：`imagePickerController(_:didFinishPickingMediaWithInfo:)`\
  \ 和 `imagePickerControllerDidCancel()`。\n\n当用户成功拍摄照片或视频，或从媒体库中选择项目时，会调用 `imagePickerController(_:didFinishPickingMediaWithInfo:)`\
  \ 方法。第一个参数是指向你之前创建的 `UIImagePickerController` 的指针。第二个参数返回一个字典，其中包含选中的照片或选中视频的 URL，以及可选的编辑信息（如果你在图像选择控制器中启用了编辑功能，并且用户确实进行了编辑）。该字典包含在键\
  \ `UIImagePickerControllerOriginalImage` 下存储的原始未编辑图像。代码清单 21-2 展示了一个获取原始图像的代理方法示例。\n\
  \n```\nfunc imagePickerController(picker: UIImagePickerController,\ndidFinishPickingMediaWithInfo\
  \ info: [String : AnyObject]) {\nlet selectedImage: UIImage? =\ninfo[UIImagePickerControllerEditedImage]\
  \ as? UIImage\nlet originalImage: UIImage? =\ninfo[UIImagePickerControllerOriginalImage]\
  \ as? UIImage\n// 对 selectedImage 和 originalImage 进行处理\npicker.dismiss(animated:\
  \ true, completion:nil)\n}\n代码清单 21-2.\n用于获取图像的代理方法\n```\n\n`editingInfo` 字典还会告知你在编辑过程中选择了整个图像的哪个部分，这通过存储在键\
  \ `UIImagePickerControllerCropRect` 下的 `NSValue` 对象来实现。你可以将这个 `NSValue` 实例转换为 `CGRect`，如代码清单\
  \ 21-3 所示。\n\n```\nlet cropValue:NSValue? = info[UIImagePickerControllerCropRect]\
  \ as? NSValue\nlet cropRect:CGRect? = cropValue?.cgRectValue()\n代码清单 21-3.\n将 NSValue\
  \ 转换为 CGRect\n```\n\n完成此转换后，`cropRect` 指定了编辑过程中选中的原始图像部分。如果你不需要此信息，忽略即可。\n\n**注意**\n\
  \n如果返回给代理的图像来自相机，则该图像不会自动存储在照片库中。如有必要，你的应用程序有责任保存该图像。\n\n另一个代理方法 `imagePickerControllerDidCancel()`\
  \ 会在用户决定取消流程（不拍摄或选择任何媒体）时被调用。当图像选择器调用此代理方法时，它只是通知你用户已完成选择器操作且未选择任何内容。\n\n`UIImagePickerControllerDelegate`\
  \ 协议中的这两个方法都被标记为可选，但实际上并非如此，原因如下：必须告知模态视图（如图像选择器）自行关闭。因此，即使你不需要在用户取消图像选择器时执行任何特定于应用程序的操作，你仍然需要关闭选择器。为了使程序正常运行，你的\
  \ `imagePickerControllerDidCancel()` 方法至少需要如下所示：\n\n```\nfunc imagePickerControllerDidCancel(picker:\
  \ UIImagePickerController) {\npicker.dismiss(true, completion:nil)\n}\n```\n\n在本章中，我们将构建一个应用程序，允许用户使用相机拍摄照片或视频。或者，用户可以从照片库中选择内容，然后将所选内容显示在屏幕上，如图\
  \ 21-3 所示。如果用户使用的设备没有相机，我们将隐藏“新照片或视频”按钮，并仅允许从照片库中选择。\n\n![A329781_3_En_21_Fig3_HTML.jpg](img/A329781_3_En_21_Fig3_HTML.jpg)\n\
  \n图 21-3. 我们的相机应用程序运行效果\n\n## 创建相机界面\n\n在 Xcode 中使用“单视图应用程序”模板创建一个新项目，并将应用程序命名为\
  \ `Camera`。首要任务是为该应用程序的视图控制器添加几个输出口。我们需要一个指向图像视图的输出口，以便用图像选择器返回的图像更新它。我们还需要一个指向“新照片或视频”按钮的输出口，以便在设备没有相机时隐藏该按钮。我们还需要两个动作方法：一个用于“新照片或视频”按钮，另一个让用户从照片库中选择现有图片。\n\
  \n```\nclass ViewController: UIViewController, UIImagePickerControllerDelegate,\n\
  UINavigationControllerDelegate {\n@IBOutlet var imageView: UIImageView!\n@IBOutlet\
  \ var takePictureButton: UIButton!\n```\n\n你可能首先注意到，我们实际上让类遵循了两个不同的协议：`UIImagePickerControllerDelegate`\
  \ 和 `UINavigationControllerDelegate`。由于 `UIImagePickerController` 是 `UINavigationController`\
  \ 的子类，我们必须让类遵循这两个协议。`UINavigationControllerDelegate` 中的方法是可选的。我们不需要其中任何一个来使用图像选择器；但是，我们必须遵循该协议，否则编译器稍后会报错。\n\
  \n你可能注意到的另一件事是，虽然我们添加了一个 `UIImageView` 类型的属性来显示选中的图像，但我们没有添加类似的属性来显示选中的视频。`UIKit`\
  \ 不包含任何像 `UIImageView` 这样可用于显示视频内容的公开类，因此我们将改用其他技术来显示视频。当我们讲到这一点时，我们将使用 `AVPlayerViewController`\
  \ 的实例，获取其 `view` 属性并将其插入到我们的视图层次结构中。这是一种非常不常见的视图控制器使用方法，但实际上是 Apple 认可的、在视图层次结构中显示视频的技术。\n\
  \n我们还将添加两个动作方法，用于连接我们的按钮。目前，我们仅创建空实现，以便 Interface Builder 能够看到它们。稍后我们将填充实际代码：\n\n\
  ```\n@IBAction func shootPictureOrVideo(sender: UIButton) {\n}\n@IBAction func selectExistingPictureOrVideo(sender:\
  \ UIButton) {\n}\n```\n\n我们要为此应用程序构建的布局非常简单——只是一个图像视图和两个按钮。完成的布局如图 21-4 所示。请以此作为工作指南。\n\
