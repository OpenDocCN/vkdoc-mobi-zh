  \ `Main.storyboard` 文件。\n\n\n\n#### 更新第一个视图控制器\n\n在 Xcode 中，选择 `FirstViewController.swift`，并在类的底部添加代码清单\
  \ 12-3 中的代码。\n\n```\nfunc refreshFields() {\n    let defaults = UserDefaults.standard\n\
  \    officerLabel.text = defaults.string(forKey: officerKey)\n    authorizationCodeLabel.text\
  \ = defaults.string(forKey: authorizationCodeKey)\n    rankLabel.text = defaults.string(forKey:\
  \ rankKey)\n    warpDriveLabel.text = defaults.bool(forKey: warpDriveKey)\n    ?\
  \ \"已启动\" : \"已禁用\"\n    warpFactorLabel.text = defaults.object(forKey: warpFactorKey)?.stringValue\n\
  \    favoriteTeaLabel.text = defaults.string(forKey: favoriteTeaKey)\n    favoriteCaptainLabel.text\
  \ = defaults.string(forKey: favoriteCaptainKey)\n    favoriteGadgetLabel.text =\
  \ defaults.string(forKey: favoriteGadgetKey)\n    favoriteAlienLabel.text = defaults.string(forKey:\
  \ favoriteAlienKey)\n}\n\noverride func viewWillAppear(_ animated: Bool) {\n   \
  \ super.viewWillAppear(animated)\n    refreshFields()\n}\n```\n\n这里的内容其实并不复杂，不会让你感到困惑。`refreshFields()`\
  \ 方法做了两件事：首先，它获取标准用户默认设置；其次，它使用我们在 `.plist` 文件中使用的相同键值，从用户默认设置中获取对应的对象，并设置所有标签的文本属性。请注意，对于\
  \ `warpFactorLabel`，我们在返回的对象上调用了 `string` 方法。我们的其他偏好设置大多是字符串，它们从用户默认设置中以 `String`\
  \ 对象的形式返回。然而，滑杆存储的偏好设置以 `NSNumber` 形式返回，但为了显示，我们需要字符串，因此我们对其调用了 `string` 方法，以获取它所包含值的字符串表示形式。\n\
  \n之后，我们重写了父类的 `viewWillAppear()` 方法，并在其中调用了 `refreshFields()` 方法。这会导致每当视图出现时——包括应用启动时以及用户从第二个标签页切换到第一个标签页时——显示的值都会更新。\n\
  \n现在运行应用程序。你应该会看到为第一个标签页构建的用户界面，其中大部分字段都填充了你之前在“设置”应用中输入的值。不过，有些字段会是空的。别担心，这不是一个\
  \ bug。信不信由你，这是正确的行为。你将在接下来的“注册默认值”部分看到原因以及如何修复它。\n\n### 从我们的应用中更改默认值\n\n既然主视图已经正常运行，现在我们来构建第二个标签页。如图\
