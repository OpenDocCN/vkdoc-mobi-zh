  \n图 7-22. 我们真的希望两个组件大小相等吗？注意长州名的截断\n\n幸运的是，还有另一个委托方法可以用来指示每个组件应该有多宽。将清单 7-11 中的方法添加到\
  \ `DependentComponentPickerViewController.swift` 的委托部分。你可以在图 7-23 中看到差异。\n\n![A329781_3_En_7_Fig23_HTML.jpg](img/A329781_3_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23. 调整选择器组件的宽度后，我们的 UI 在视觉上更加实用\n\n```swift\nfunc pickerView(_ pickerView:\
  \ UIPickerView, widthForComponent component: Int) -> CGFloat {\n    let pickerWidth\
  \ = pickerView.bounds.size.width\n    if component == zipComponent {\n        return\
  \ pickerWidth/3\n    } else {\n        return 2 * pickerWidth/3\n    }\n}\n```\n\
  清单 7-11. 设置选择器组件的宽度\n\n在该方法中，我们返回一个数值，表示每个组件应该有多少像素宽，选择器会尽力满足这个要求。我们选择将可用宽度的三分之二分配给州组件，其余部分给邮政编码组件。你可以尝试其他值，看看修改它们时组件之间的空间分布如何变化。保存、构建并运行；在“Dependent”选项卡上的选择器将看起来更像图\
  \ 7-5 所示的那个。\n\n至此，你应该对选择器和标签栏应用程序都比较熟悉了。关于选择器，我们还有一件事要做。\n\n## 使用自定义选择器创建一个简单游戏\n\
  \n接下来，我们将创建一个模拟老虎机。在继续之前，请回顾图 7-6，了解我们将要构建的内容。\n\n### 准备视图控制器\n\n首先，将以下代码添加到 `CustomPickerViewController.swift`\
  \ 中：\n\n```swift\nclass CustomPickerViewController: UIViewController,\n    UIPickerViewDelegate,\
  \ UIPickerViewDataSource {\n    private var images:[UIImage]!\n}\n```\n\n至此，我们仅在类中添加了一个属性，用于保存老虎机转轮上符号的图片数组。其余部分将在稍后完成。\n\
  \n\n### 构建视图\n\n尽管图 7-6 中的选择器看起来比我们之前构建的其他选择器要华丽得多，但我们在设计故事板时的实际差异非常小。所有额外工作都在控制器的委托方法中完成。\n\
  \n确保你已保存新源代码，然后在项目导航器中选择 `Main.storyboard`，并使用文档大纲选择自定义场景中的自定义图标来编辑 GUI。添加一个选择器视图，在其下方添加一个标签，再在标签下方添加一个按钮。将按钮命名为\
  \ `Spin`。\n\n选中标签后，打开属性检查器。将对齐方式设置为居中。然后点击文本颜色，将其设置为亮色。接下来，让文本稍微大一些。在检查器中找到字体设置，并点击其中的图标（看起来像小方框里的字母\
  \ T）弹出字体选择器。如果你愿意，这个控件可以让你从设备的标准系统字体切换到其他字体，或者直接更改字号。现在，只需将字号改为 48，并删除单词 `Label`，因为我们希望用户第一次获胜后才显示文本。选中标签后，点击\
  \ 编辑器 ➤ 适应内容大小，确保标签始终足够大以显示其内容。\n\n现在添加自动布局约束，使选择器、标签和按钮在水平方向上居中，并固定它们之间的垂直间距，以及标签与选择器、选择器与视图顶部之间的间距。你可能会发现，在添加标签的自动布局约束时，从文档大纲中拖动标签是最简单的方法，因为故事板上的标签是空的，很难找到。\n\
  \n完成后，将所有连接指向出口和操作。创建一个名为 `picker` 的新出口，将视图控制器连接到选择器视图；再创建一个名为 `winLabel` 的出口，将视图控制器连接到标签。同样，你会发现使用文档大纲中的标签比使用故事板上的标签更简单。接下来，将按钮的“Touch\
  \ Up Inside”事件连接到一个名为 `spin()` 的新操作方法。最后，确保连接选择器的委托和数据源。\n\n还有一件额外的事情需要做。选择选择器并打开属性检查器。你需要在视图设置中取消选中标记为“`User\
  \ Interaction Enabled`”的复选框，这样用户就无法手动更改转盘并作弊。完成所有这些操作后，保存你对故事板所做的更改。\n\n#### iOS\
  \ 设备支持的字体\n\n在使用 Interface Builder 中的字体面板设计 iOS 界面时需谨慎。属性检查器的字体选择器允许你从大量字体中分配，但并非所有\
  \ iOS 设备都拥有相同的字体集。例如，在撰写本文时，有几种字体在 iPad 上可用，但在 iPhone 或 iPod touch 上则不可用。你应该将字体选择限制在目标\
  \ iOS 设备上可用的字体系列之一。Jeff LaMarche 的优秀 iOS 博客上的这篇文章展示了如何以编程方式获取此列表：[`iphonedevelopment.blogspot.com/2010/08/fonts-and-font-families.html`](http://iphonedevelopment.blogspot.com/2010/08/fonts-and-font-families.html)。\n\
  \n简而言之，创建一个基于视图的应用程序，并将以下代码添加到应用程序委托的 `application(_: didFinishLaunchingWithOptions:)`\
  \ 方法中：\n\n```\nfor family in UIFont.familyNames() as [String] {\n    println(family)\n\
  \    for font in UIFont.fontNamesForFamilyName(family) {\n        println(\"\\t\\\
  (font)\")\n    }\n}\n```\n\n在相应的模拟器或设备上运行项目，可用的字体系列和字体将显示在项目控制台日志中。\n\n### 实现控制器\n\
  \n在实现此控制器时，我们有很多新内容要介绍。选择 `CustomPickerViewController.swift` 文件，然后开始填写 `spin()`\
  \ 方法的内容，如代码清单 7-12 所示。\n\n```\n@IBAction func spin(_ sender: UIButton) {\n    var\
  \ win = false\n    var numInRow = -1\n    var lastVal = -1\n    for i in 0..<5 {\n\
  \        let newValue = Int(arc4random_uniform(UInt32(images.count)))\n        if\
  \ newValue == lastVal {\n            numInRow += 1\n        } else {\n         \
  \   numInRow = 1\n        }\n        lastVal = newValue\n        picker.selectRow(newValue,\
  \ inComponent: i, animated: true)\n        picker.reloadComponent(i)\n        if\
  \ numInRow >= 3 {\n            win = true\n        }\n    }\n    winLabel.text =\
  \ win ? \"WINNER!\" : \" \"  // 注意引号间的空格\n}\n```\n\n**代码清单 7-12.** `spin()` 方法\n\
  \n> **注意**  \n> 一元递增（`foo++`）和递减（`foo--`）的常见用法在 Swift 3 中已被弃用，应分别使用 `+=` 和 `-=`。\n\
  \n将 `viewDidLoad()` 方法修改为代码清单 7-13 所示的内容。\n\n```\noverride func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    // 加载视图后的任何额外设置。\n    images = [\n        UIImage(named:\
  \ \"seven\")!,\n        UIImage(named: \"bar\")!,\n        UIImage(named: \"crown\"\
  )!,\n        UIImage(named: \"cherry\")!,\n        UIImage(named: \"lemon\")!,\n\
  \        UIImage(named: \"apple\")!\n    ]\n    winLabel.text = \" \" // 注意引号间的空格\n\
  \    arc4random_stir()\n}\n```\n\n**代码清单 7-13.** 修改 `viewDidLoad()` 以设置图像和标签\n\n\
  最后，将数据源和委托代码添加到类声明的末尾，位于结束花括号之前，如代码清单 7-14 所示。\n\n```\n// MARK:-\n// MARK: 选择器数据源方法\n\
  func numberOfComponents(in pickerView: UIPickerView) -> Int {\n    return 5\n}\n\
  func pickerView(_ pickerView: UIPickerView, numberOfRowsInComponent component: Int)\
  \ -> Int {\n    return images.count\n}\n// MARK:-\n// MARK: 选择器委托方法\nfunc pickerView(_\
  \ pickerView: UIPickerView, viewForRow row: Int, forComponent component: Int, reusing\
  \ view: UIView?) -> UIView {\n    let image = images[row]\n    let imageView = UIImageView(image:\
  \ image)\n    return imageView\n}\nfunc pickerView(_ pickerView: UIPickerView, rowHeightForComponent\
  \ component: Int) -> CGFloat {\n    return 64\n}\n```\n\n**代码清单 7-14.** 我们的数据源和委托方法\n\
  \n#### `spin` 方法\n\n当用户点击“Spin”按钮时，`spin()` 方法执行。在该方法中，我们首先声明一些变量，用于跟踪用户是否获胜。我们将使用\
  \ `win` 来记录是否找到了连续三个相同的值，如果找到则将其设置为 `true`。我们将使用 `numInRow` 来记录到目前为止连续相同值的数量。我们将使用\
  \ `lastVal` 记录前一个组件的值，以便将当前值与之前的值进行比较。我们将 `lastVal` 初始化为 -1，因为知道该值不会与任何真实值匹配：\n\n\
  ```\nvar win = false\nvar numInRow = -1\nvar lastVal = -1\n```\n\n接下来，我们遍历所有五个组件，并将每个组件设置为一个新的、随机生成的行选择。我们通过\
  \ `images` 数组获取计数来实现这一点，这是一种快捷方式，因为我们知道所有五列都使用相同数量的图像：\n\n```\nfor i in 0..<5 {\n\
  \    let newValue = Int(arc4random_uniform(UInt32(images.count)))\n```\n\n我们将新值与之前的值进行比较，如果匹配，则递增\
  \ `numInRow`。如果值不匹配，则将 `numInRow` 重置为 1。然后，我们将新值赋给 `lastVal`，以便在下一次循环中进行比较：\n\n\
  ```\nif newValue == lastVal {\n    numInRow += 1\n} else {\n    numInRow = 1\n}\n\
  lastVal = newValue\n```\n\n之后，我们将相应的组件设置为新值，并告知其以动画方式显示更改；我们通知选择器重新加载该组件：\n\n```\n\
  picker.selectRow(newValue, inComponent: i, animated: true)\npicker.reloadComponent(i)\n\
  ```\n\n每次循环中做的最后一件事是检查是否有了三个连续相同的值，如果是，则将 `win` 设置为 `true`：\n\n```\nif numInRow\
  \ >= 3 {\n    win = true\n}\n```\n\n循环完成后，我们设置标签，显示轮转是否获胜：\n\n```\nwinLabel.text\
  \ = win ? \"WINNER!\" : \" \"\n// 注意引号间的空格\n```\n\n\n\n#### `viewDidLoad()` 方法\n\
  \n首先，我们加载了六张不同的图片，这些图片在章节开头就已经添加到`Images.xcassets`中。我们通过`UIImage`类的便捷方法`imageNamed()`来实现：\n\
  \n```\nimages = [\nUIImage(named: \"seven\")!,\nUIImage(named: \"bar\")!,\nUIImage(named:\
  \ \"crown\")!,\nUIImage(named: \"cherry\")!,\nUIImage(named: \"lemon\")!,\nUIImage(named:\
  \ \"apple\")!\n]\n```\n\n接下来，在该方法中，我们确保标签（`label`）恰好包含一个空格。我们希望标签为空，但如果真的将其设为空，它会坍缩到零高度。通过包含一个空格，我们确保标签以正确的高度显示：\n\
  \n```\nwinLabel.text = \" \" // 注意引号之间的空格\n```\n\n最后，我们调用了`arc4random_stir()`函数来为随机数生成器播种，这样每次运行应用时就不会得到相同的随机数序列。\n\
  \n那么，这六张图片用来做什么呢？如果你向下滚动刚刚输入的代码，会发现两个数据源方法与之前几乎相同；然而，进一步查看委托方法，你会发现我们使用了完全不同的委托代码来为选择器提供数据。之前的代码返回的是一个字符串，而现在的代码返回的是一个`UIView`。\n\
  \n通过使用这种方法，我们可以向选择器提供任何可以绘制到`UIView`中的内容。当然，考虑到选择器的小尺寸，这里存在一些限制，并非所有内容都能正常工作且同时保持美观。但这种方法为我们提供了更大的自由度来展示内容，尽管需要稍多的工作量：\n\
  \n```\nfunc pickerView(_ pickerView: UIPickerView, viewForRow row: Int, forComponent\
  \ component: Int, reusing view: UIView?) -> UIView {\n    let image = images[row]\n\
  \    let imageView = UIImageView(image: image)\n    return imageView\n}\n```\n\n\
  该方法返回一个`UIImageView`对象，该对象用符号对应的图片之一进行了初始化。为此，我们先获取当前行符号的图片，然后创建并返回一个包含该符号的图片视图。对于比单个图片更复杂的视图，可以预先创建所有需要的视图（例如在`viewDidLoad()`中），然后在请求时将这些预先创建好的视图返回给选择器视图。但对于我们的简单情况，动态创建所需视图已经足够。\n\
  \n你已顺利完成了所有工作，现在可以进行测试了。因此，构建并运行应用，观察其效果（见图 7-24）。\n\n![A329781_3_En_7_Fig24_HTML.jpg](img/A329781_3_En_7_Fig24_HTML.jpg)\n\
  \n图 7-24.\n\n虽然不是最漂亮的老虎机应用，但它让你领略到了选择器的多功能性。\n\n### 游戏附加细节\n\n我们的游戏运行良好，特别是考虑到构建它所需的工作量之少。现在让我们通过一些额外改进来优化它。目前游戏存在两个需要处理的问题：\n\
  \n*   游戏太安静了。真正的老虎机并不安静，因此我们的也不应该安静。\n*   在转盘完成旋转之前，游戏就提示我们获胜了，这是一个小问题，但确实消除了期待感。要观察这一点，请再次运行应用。虽然很微妙，但标签确实在转盘停止旋转之前就出现了。\n\
  \n本书附带的项目存档中的`07 - Picker Sounds`文件夹包含两个声音文件：`crunch.wav`和`win.wav`。将这两个文件拖到项目的`Pickers`文件夹中。当用户点击“Spin”按钮时，我们将播放`crunch.wav`；当用户获胜时，播放`win.wav`。\n\
  \n要处理声音，我们需要访问 iOS 的 Audio Toolbox 类。在`CustomPickerViewController.swift`顶部现有`import`行的后面，插入以下`AudioToolbox`导入语句：\n\
  \n```\nimport UIKit\nimport AudioToolbox\n```\n\n接下来，我们需要添加一个指向按钮的出口（`outlet`）。在转盘旋转期间，我们将隐藏按钮。我们不希望在当前旋转完成之前用户再次点击按钮。将以下粗体代码行添加到`CustomPickerViewController.swift`中：\n\
  \n```\nclass CustomPickerViewController: UIViewController,\nUIPickerViewDelegate,\
  \ UIPickerViewDataSource {\n    private var images:[UIImage]!\n    @IBOutlet weak\
  \ var picker: UIPickerView!\n    @IBOutlet weak var winLabel: UILabel!\n    @IBOutlet\
  \ weak var button: UIButton!\n```\n\n输入上述代码并保存文件后，点击`Main.storyboard`来编辑图形界面。打开助理编辑器，确保它显示的是`CustomPickerViewController.swift`文件。从我们刚刚添加的`outlet`左侧的小圆点按住并拖动到\
  \ Storyboard 上的按钮，如图 7-25 所示。\n\n![A329781_3_En_7_Fig25_HTML.jpg](img/A329781_3_En_7_Fig25_HTML.jpg)\n\
  \n图 7-25.\n\n将按钮`outlet`连接到 Storyboard 画布上的按钮\n\n现在，我们需要在控制器类的实现中完成几件事。首先，我们需要一些实例变量来保存已加载声音的引用。再次打开`CustomPickerViewController.swift`，并添加以下新属性（以粗体显示）：\n\
  \n```\nclass CustomPickerViewController: UIViewController,\nUIPickerViewDelegate,\
  \ UIPickerViewDataSource {\n    private var images:[UIImage]!\n    @IBOutlet weak\
  \ var picker: UIPickerView!\n    @IBOutlet weak var winLabel: UILabel!\n    @IBOutlet\
  \ weak var button: UIButton!\n    private var winSoundID: SystemSoundID = 0\n  \
  \  private var crunchSoundID: SystemSoundID = 0\n```\n\n我们还需要向控制器类添加两个方法。将清单 7-12\
  \ 中的两个方法添加到`CustomPickerViewController.swift`文件中。\n\n```\nfunc showButton() {\n\
  \    button.isHidden = false\n}\nfunc playWinSound() {\n    if winSoundID == 0 {\n\
  \        let soundURL = Bundle.main.urlForResource(\n            \"win\", withExtension:\
  \ \"wav\")! as CFURL\n        AudioServicesCreateSystemSoundID(soundURL, &winSoundID)\n\
  \    }\n    AudioServicesPlaySystemSound(winSoundID)\n    winLabel.text = \"WINNER!\"\
  \n    DispatchQueue.main.after(when: .now() + 1.5) {\n        self.showButton()\n\
  \    }\n}\n```\n清单 7-12. 在老虎机游戏中隐藏旋转按钮并播放声音\n\n我们使用第一个方法来显示按钮。如前所述，当用户点击按钮时，我们需要隐藏它，因为如果转盘已经在旋转，那么在它们停止之前，再次旋转是没有意义的。\n\
  \n\n\n## 排版后的内容\n\n当用户获胜时，将调用第二个方法。首先，我们检查是否已经加载了胜利音效。`winSoundID` 和 `crunchSoundID`\
  \ 属性初始化为零，而已加载音效的有效标识符不为零，因此我们可以通过比较该标识符与零来检查音效是否已加载。要加载音效，我们首先向主包（main bundle）请求音效文件的路径，此处为\
  \ `win.wav`，这与我们为 Dependent 选择器视图加载属性列表时的操作相同。获取该资源的路径后，接下来的三行代码负责加载并播放音效文件。接着，我们将标签设置为\
  \ `WINNER!` 并调用 `showButton()` 方法；不过，我们使用一个名为 `DispatchQueue.main.after(when:)`\
  \ 的函数以特殊方式调用 `showButton()` 方法。这是一个非常便捷的函数，允许你在未来的某个时间点执行代码——在本例中，是一秒半之后，这将在通知用户结果之前，给转盘留出时间旋转到最终位置。该函数是一组实用函数中的一员，这组函数统称为\
  \ Grand Central Dispatch（简称 GCD），我将在第 15 章中讨论。\n\n**注意**\n\n你可能已经注意到我们调用 `AudioServicesCreateSystemSoundID()`\
  \ 函数的方式有些特别。该函数将 URL 作为其第一个参数，但它需要的并非 `NSURL` 实例。相反，它需要一个 `CFURL`（以前是 `CFURLRef`），这是一个指向\
  \ C 语言 Core Foundation 框架中某个结构的指针。`NSURL` 是 Foundation 框架的一部分，而 Foundation 框架是用\
  \ Objective-C 编写的。幸运的是，Core Foundation 中的许多 C 组件都与 Foundation 框架中对应的 Objective-C\
  \ 组件“桥接”了，因此 `CFURL` 在功能上等同于 `NSURL` 指针。这意味着在 Swift 或 Objective-C 中创建的某些类型的对象，只需使用\
  \ `as` 关键字将其转换为对应的 C 类型，即可与 C 的 API 一起使用。\n\n我们还需要对 `spin()` 方法进行一些修改。我们将编写代码以播放音效，并在玩家获胜时调用\
  \ `playWinSound` 方法。请对 `spin()` 方法进行以下修改，如代码清单 7-14 所示。\n\n```swift\n@IBAction func\
  \ spin(sender: AnyObject) {\n    var win = false\n    var numInRow = -1\n    var\
  \ lastVal = -1\n    for i in 0..= 3 {\n        win = true\n    }\n    if crunchSoundID\
  \ == 0 {\n        let soundURL = Bundle.main.urlForResource(\n            \"crunch\"\
  , withExtension: \"wav\")! as CFURL\n        AudioServicesCreateSystemSoundID(soundURL,\
  \ &crunchSoundID)\n    }\n    AudioServicesPlaySystemSound(crunchSoundID)\n    if\
  \ win {\n        DispatchQueue.main.after(when: .now() + 0.5) {\n            self.playWinSound()\n\
  \        }\n    } else {\n        DispatchQueue.main.after(when: .now() + 0.5) {\n\
  \            self.showButton()\n        }\n    }\n    button.isHidden = true\n \
  \   winLabel.text = \" \" // 注意引号之间的空格\n}\n```\n\n**代码清单 7-14.** 更新后的 `spin()` 方法以添加音效\n\
  \n首先，如有需要，我们加载“咔嚓”音效，就像之前处理胜利音效一样。现在播放“咔嚓”音效，让玩家知道转轮已经开始旋转。接着，我们不在一得知用户获胜就立即将标签设置为\
  \ `WINNER!`，而是采用一种巧妙的做法。我们调用刚刚创建的两个方法之一，但会在使用 `DispatchQueue.main.after(when:)`\
  \ 延迟一段时间后调用。如果用户获胜，我们会在半秒后调用 `playWinSound()` 方法，这样就能为转盘留出旋转到位的时间；否则，我们只需等待半秒，然后重新启用“旋转”按钮。在等待结果的同时，我们隐藏按钮并清空标签的文本。\n\
  \n现在大功告成，构建并运行应用程序，然后点击最后一个标签页，即可观看并听到这台老虎机的运行效果。点击“旋转”按钮应播放一段轻微的“咔嚓”音效，而获胜则应播放胜利音效。\n\
  \n## 总结\n\n到目前为止，你应该已经熟悉了标签栏应用程序和选择器视图的使用。在本章中，我们从零开始构建了一个功能完整的标签栏应用程序，它包含了五个不同的内容视图。我们练习了在不同配置下使用选择器视图，并创建了包含多个组件的选择器。我们甚至学会了如何让一个组件中的值依赖于另一个组件中所选的值。此外，我们还了解了如何让选择器显示图像而不仅仅是文本。\n\
  \n在此过程中，我们讨论了选择器视图的委托和数据源，并了解了如何加载图像、播放音效以及从属性列表创建字典。这一章内容较长，祝贺你顺利完成。在下一章中，我们将开始处理\
  \ iPhone 设备中最常见的元素之一：表视图。\n\n"
- "# 8. 表视图入门\n\n在接下来的几章中，我们将构建一些基于层级导航的应用程序，类似于 iOS 设备上自带的“邮件”应用程序。这类应用程序通常称为主从应用程序，允许用户深入嵌套的数据列表并编辑数据。但在构建这些类型的应用程序之前，我们需要掌握表视图的概念。\n\
  \n表视图为 iOS 设备提供了向用户显示数据列表的最常用机制。它们是高度可配置的对象，几乎可以按照你的需求呈现任何外观。“邮件”使用表视图来显示账户、文件夹和消息列表；然而，表视图并不仅限于显示文本数据。“设置”、“音乐”和“时钟”应用程序也使用了表视图，尽管这些应用程序的外观差异很大，如图\
  \ 8-1 所示。\n\n![A329781_3_En_8_Fig1_HTML.jpg](img/A329781_3_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 尽管外观各异，但“设置”、“音乐”和“时钟”应用程序都使用表视图来显示数据\n\n## 表视图基础\n\n表格显示数据列表，表格列表中的每一项称为一个行。iOS\
  \ 允许表格拥有无限数量的行，仅受可用内存量的限制，但表格仅有一列宽。\n\n### 表视图和表视图单元格\n\n表视图对象负责显示表格的数据，并作为 `UITableView`\
  \ 类的实例运行；表格中的每个可见行由 `UITableViewCell` 类的实例实现，如图 8-2 所示。\n\n![A329781_3_En_8_Fig2_HTML.jpg](img/A329781_3_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2.** 每个表视图都是 `UITableView` 的一个实例，每个可见行都是 `UITableViewCell` 的一个实例\n\n虽然表视图不负责存储所有表格数据，但它们只包含足以绘制当前可见行的数据。与选择器视图有些类似，表视图的配置数据来自遵循\
  \ `UITableViewDelegate` 协议的对象，而行数据来自遵循 `UITableViewDataSource` 协议的对象。我们将在本章稍后开发示例程序时看到这一切是如何运作的。\n\
  \n如前所述，所有表格都只包含单列。图 8-1 右侧显示的“时钟”应用程序，给人一种有两列的错觉，但实际情况并非如此——表中的每一行都由一个单一的 `UITableViewCell`\
  \ 表示。默认情况下，`UITableViewCell` 对象可以配置图片、一些文本以及一个可选的辅助图标（位于右侧的小图标），我们将在第 9 章中详细讨论。\n\
  \n你可以通过向 `UITableViewCell` 添加子视图来增加单元格中的数据量，有两种基本技术：1）在创建单元格时以编程方式添加子视图，或者，2）从故事板或\
  \ nib 文件加载子视图。你可以根据需要布置表视图单元格，包括所需的任何子视图。这使得单列限制远没有最初听起来那么受限。在本章中，我们将探讨如何使用这两种技术。\n\
  \n\n\n### 分组表格与普通表格\n\n表格视图有两种基本样式：\n\n- **分组**：分组表格视图包含一个或多个行区块。在每个区块内，所有行紧密排列形成紧凑的分组；但区块之间有明显可见的间隔，如图\
  \ 8-3 最左侧的图片所示。请注意，分组表格可以仅由一个分组构成。\n\n  ![A329781_3_En_8_Fig3_HTML.jpg](img/A329781_3_En_8_Fig3_HTML.jpg)\n\
  \n  图 8-3. 同一个表格视图以分组表格形式显示（左）；没有索引的普通表格（中）；以及带有索引的普通表格，也称为索引表格（右）\n\n- **普通**：普通表格视图（参见图\
  \ 8-3 中间）是默认样式，其区块之间略微更紧凑，每个区块的标题可按自定义样式进行修饰。当使用索引时，我们将此样式称为索引表格（参见图 8-3 右侧）。\n\n\
  如果你的数据源提供了必要信息，表格视图允许用户通过右侧显示的索引来浏览列表。\n\niOS 将表格划分为名为“区块”的分段。在分组表格中，每个区块在视觉上呈现为一个分组。在索引表格中，苹果将每个包含索引数据的分组称为一个区块。例如，在图\
  \ 8-3 所示的索引表格中，所有以 A 开头的名称会构成一个区块，以 B 开头的构成另一个区块，以此类推。\n\n> **注意**：尽管技术上可以为分组表格添加索引，但不应这样做。iOS\
  \ 人机界面指南明确指出，分组表格不应提供索引。\n\n## 实现一个简单的表格\n\n让我们通过一个最简单的表格视图示例来了解其工作原理。在第一个示例中，我们只显示一个文本值列表。\n\
  \n在 Xcode 中创建一个新项目。本章我们将回到“单视图应用程序”模板，因此选择该模板。将项目命名为 `Simple Table`，语言设置为 Swift，设备字段设置为\
  \ Universal，并确保未勾选“使用 Core Data”。\n\n### 设计视图\n\n在项目导航器中，展开顶层 `Simple Table` 项目和\
  \ `Simple Table` 文件夹。由于这个应用程序非常简单，我们不需要任何插座或动作。接着选择 `Main.storyboard` 来编辑故事板。如果视图窗口在布局区域中不可见，请在文档大纲中单击其图标以打开它。接下来，在对象库中查找表格视图（见图\
  \ 8-4），并将其拖拽到视图窗口中。\n\n![A329781_3_En_8_Fig4_HTML.jpg](img/A329781_3_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 将表格视图从库中拖拽到我们的主视图上\n\n将表格视图放置到视图控制器上，并将其大致对齐到父视图的中心。现在让我们添加自动布局约束，以确保无论屏幕尺寸如何，表格视图都能正确定位和调整大小。在文档大纲中选择表格，然后点击故事板编辑器右下角的图钉图标（见图\
  \ 8-5）。\n\n![A329781_3_En_8_Fig5_HTML.jpg](img/A329781_3_En_8_Fig5_HTML.jpg)\n\n\
  图 8-5. 固定表格视图，使其适应屏幕\n\n在弹出的窗口顶部，取消勾选“约束到边距”复选框，点击所有四条虚线，并将四个输入字段中的距离设置为零。这将把表格视图的四条边固定到其父视图的对应边上。为了应用约束，将“更新帧”更改为“新约束的项”，然后点击“添加\
  \ 4 个约束”按钮。表格应会调整大小以填满整个视图。\n\n在文档检查器中再次选择表格视图，按下 `⌥⌘6` 打开连接检查器。你会注意到表格视图可用的前两个连接与上一章中使用的选择器视图的前两个连接相同：`dataSource`\
  \ 和 `delegate`。从每个连接旁边的圆圈拖拽到文档大纲中的视图控制器图标，或故事板编辑器中视图控制器上方的图标。这将使我们的控制器类成为该表格的数据源和委托，如图\
  \ 8-6 所示。\n\n![A329781_3_En_8_Fig6_HTML.jpg](img/A329781_3_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 连接表格视图的 `dataSource` 和 `delegate` 插座\n\n接下来，我们将开始为表格视图编写 Swift 代码。\n\n\n\
  \n### 实现控制器\n\n如果你已经读过前几章，这里的内容会显得熟悉，甚至有些乏味。不过，由于有些读者会跳着读，我至少会在这些基础的早期章节中保持一致的风格。单击\
  \ `ViewController.swift`，并将代码清单 8-1 中的代码添加到类声明中。\n\n```\nclass ViewController: UIViewController,\n\
  UITableViewDataSource, UITableViewDelegate {\nprivate let dwarves = [\n\"Sleepy\"\
  , \"Sneezy\", \"Bashful\", \"Happy\",\n\"Doc\", \"Grumpy\", \"Dopey\",\n\"Thorin\"\
  , \"Dorin\", \"Nori\", \"Ori\",\n\"Balin\", \"Dwalin\", \"Fili\", \"Kili\",\n\"\
  Oin\", \"Gloin\", \"Bifur\", \"Bofur\",\n\"Bombur\"\n]\nlet simpleTableIdentifier\
  \ = \"SimpleTableIdentifier\"\n代码清单 8-1. 添加到类声明顶部以创建元素数组\n```\n\n在代码清单 8-1 中，我们让类遵循两个协议，以便它能够作为表格视图的数据源和委托，声明了一个数组用于保存将要显示在表格中的数据，以及一个即将用到的标识符。在实际应用中，数据会来自其他来源，例如文本文件、属性列表或\
  \ Web 服务。\n\n接下来，在文件末尾的闭合花括号上方添加代码清单 8-2 中的代码。\n\n```\n// MARK:-\n// MARK: 表格视图数据源方法\n\
  func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->\
  \ Int {\nreturn dwarves.count\n}\nfunc tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\nvar cell = tableView.dequeueReusableCell(withIdentifier:\
  \ simpleTableIdentifier)\nif (cell == nil) {\ncell = UITableViewCell(\nstyle: UITableViewCellStyle.default,\n\
  reuseIdentifier: simpleTableIdentifier)\n}\ncell?.textLabel?.text = dwarves[indexPath.row]\n\
  return cell!\n}\n代码清单 8-2. 表格视图的 dataSource 方法\n```\n\n这些方法属于 `UITableViewDataSource`\
  \ 协议。第一个方法 `tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int` 被表格用来询问某个分区中有多少行。正如你所料，默认分区数为 1，该方法会被调用来获取构成列表的单个分区中的行数。我们只需返回数组中元素的数量。\n\
  \n下一个方法可能需要一点解释，让我们更仔细地看一下：\n\n```\nfunc tableView(_ tableView: UITableView,\ncellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\n```\n\n当表格视图需要绘制某一行时，会调用这个方法。注意，该方法的第二个参数是一个\
  \ `NSIndexPath` 实例。`NSIndexPath` 是表格视图用来将分区索引和行索引封装到单个对象中的结构体。要从 `NSIndexPath` 中获取行索引或分区索引，只需访问其\
  \ `row` 属性或 `section` 属性，这两个属性都返回一个整型值。\n\n第一个参数 `tableView` 是对正在构建的表格的引用。这允许我们创建能够作为多个表格数据源的类。\n\
  \n表格视图一次只显示少数几行，但表格本身可以容纳更多的行。请记住，表格中的每一行都由 `UITableViewCell` 的一个实例表示，它是 `UIView`\
  \ 的子类，这意味着每一行都可以包含子视图。对于大型表格来说，如果表格试图为每一行都保留一个表格视图单元格实例，而不管该行当前是否正在显示，这会带来巨大的开销。幸运的是，表格并不是这样工作的。\n\
  \n相反，当表格视图单元格滚动出屏幕时，它们会被放入一个可重用单元格的队列中。如果系统内存不足，表格视图会丢弃队列中的单元格。但只要系统有足够的内存来容纳这些单元格，它就会保留它们，以备将来重用。\n\
  \n每当一个表格视图单元格滚出屏幕时，很可能另一个单元格正好从另一侧滚入屏幕。如果新行可以重用已经滚出屏幕的单元格之一，系统就可以避免不断创建和释放视图带来的开销。为了利用这种机制，我们将要求表格视图使用我们之前声明的标识符，提供给我们一个指定类型的、之前使用过的单元格。实际上，我们是在请求一个类型为\
  \ `simpleTableIdentifier` 的可重用单元格：\n\n```\nvar cell = tableView.dequeueReusableCell(withIdentifier:\
  \ simpleTableIdentifier)\n```\n\n在这个例子中，表格只使用了一种类型的单元格，但在更复杂的表格中，你可能需要根据单元格的内容或位置来格式化不同类型的单元格，在这种情况下，你需要为每种不同的单元格类型使用单独的表格单元格标识符。\n\
  \n现在，表格视图完全有可能没有任何备用单元格（例如，当它最初填充数据时），所以我们在调用后检查 `cell` 变量，看它是否为 `nil`。如果为 `nil`，我们手动创建一个新的表格视图单元格，使用相同的标识符字符串。在某个时刻，我们不可避免地会重用在这里创建的某个单元格，所以我们需要确保使用\
  \ `simpleTableIdentifier` 来创建它：\n\n```\nif (cell == nil) {\ncell = UITableViewCell(\n\
  style: UITableViewCellStyle.default,\nreuseIdentifier: simpleTableIdentifier)\n\
  }\n```\n\n对 `UITableViewCellStyle.default` 感到好奇？我们稍后会在研究表格视图单元格样式时详细了解它。\n\n现在我们有了一个可以返回给表格视图使用的表格视图单元格。所以，我们只需将想要显示的信息放入这个单元格即可。在表格的行中显示文本是一项非常常见的任务，因此表格视图单元格提供了一个名为\
  \ `textLabel` 的 `UILabel` 属性，我们可以设置它来显示字符串。这只需要从我们的 `dwarves` 数组中获取正确的字符串，并用它来设置单元格的\
  \ `textLabel`。\n\n然而，要获取正确的值，我们需要知道表格视图正在询问的是哪一行。我们从 `indexPath` 的 `row` 属性中获得这个信息。我们使用表格的行号从数组中获取对应的字符串，将其赋值给单元格的\
  \ `textLabel.text` 属性，然后返回该单元格：\n\n```\ncell?.textLabel?.text = dwarves[indexPath.row]\n\
  return cell!\n```\n\n编译并运行你的应用程序，你应该会看到数组值显示在表格视图中，如图 8-7 左侧所示。\n\n![A329781_3_En_8_Fig7_HTML.jpg](img/A329781_3_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7.** 显示 dwarves 数组的简单表格应用程序\n\n你可能想知道为什么在这行代码中需要所有 `?` 运算符：\n\n```\ncell?.textLabel?.text\
  \ = dwarves[indexPath.row]\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n---\n\n\n每个`?`运算符的使用都是 Swift 中可选链（optional chaining）的一个示例，它允许你编写紧凑的代码，即使必须调用可能为`nil`的对象引用的方法或访问其属性。第一个`?`运算符是必需的，因为对于编译器来说，`cell`可能是`nil`。原因是我们通过调用`dequeueReusableCellWithIdentifier()`方法获得它，该方法返回一个`UITableViewCell?`类型的值。当然，编译器没有考虑到我们显式检查了`nil`返回值，如果发现`nil`，则创建一个新的`UITableViewCell`对象，从而确保当我们到达这行代码时，`cell`实际上永远不会为`nil`。如果你查看`UITableViewCell`类的文档，会看到它的`textLabel`属性是`UILabel?`类型，因此它也可能为`nil`。同样，实际上不会出现这种情况，因为我们使用的是默认的`UITableViewCell`实例，它总是包含一个标签。自然，编译器不知道这一点，所以在解引用时我们使用了`?`运算符。这将是我们在\
  \ Swift 体验中经常遇到的情况。\n\n### 添加图片\n\n如果我们能在每一行添加一张图片，那将非常不错。你可能认为我们需要创建`UITableViewCell`的子类或添加子视图来实现。实际上，如果你能接受图片位于每行左侧，我们已经准备好了。默认的表格视图单元格完全可以处理这种情况。让我们看看它是如何工作的。\n\
  \n将示例源码归档中`08 - Star Image`文件夹中的`star.png`和`star2.png`文件拖拽到项目的`Assets.xcassets`中，如图\
  \ 8-8 所示。\n\n![A329781_3_En_8_Fig8_HTML.jpg](img/A329781_3_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8.** 将我们的图片添加到`Assets.xcassests`文件夹中\n\n我们将安排这些图标出现在表格视图的每一行上。我们只需要为每个图标创建一个`UIImage`，并在表格视图向数据源请求每行的单元格时，将其赋值给`UITableViewCell`。为此，在`ViewController.swift`文件中，修改`tableView(_:cellForRowAtIndexPath:)`方法，如代码清单\
  \ 8-3 所示。\n\n```\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath:\
  \ IndexPath) -> UITableViewCell {\n    var cell = tableView.dequeueReusableCell(withIdentifier:\
  \ simpleTableIdentifier)\n    if (cell == nil) {\n        cell = UITableViewCell(\n\
  \            style: UITableViewCellStyle.default,\n            reuseIdentifier:\
  \ simpleTableIdentifier)\n    }\n    let image = UIImage(named: \"star\")\n    cell?.imageView?.image\
  \ = image\n    let highlightedImage = UIImage(named: \"star2\")\n    cell?.imageView?.highlightedImage\
  \ = highlightedImage\n    cell?.textLabel?.text = dwarves[indexPath.row]\n    return\
  \ cell!\n}\n```\n\n**代码清单 8-3.** 我们为每个单元格添加图片的修改\n\n就是这样。每个单元格都有一个`UIImage`类型的`imageView`属性，它又具有名为`image`和`highlightedImage`的属性。`image`属性给出的图片出现在单元格文本的左侧，当单元格被选中时，如果提供了`highlightedImage`，则会被替换为该图片。你只需将单元格的`imageView.image`和`imageView.highlightedImage`属性设置为你想要显示的任何图片。\n\
  \n如果你现在编译并运行应用程序，应该会得到一个列表，每行左侧有一堆漂亮的蓝色小星星图标，如图 8-9 所示。如果你选择任何一行，会看到其图标从蓝色变为绿色，这是`star2.png`文件中图片的颜色。当然，我们可以为表格中的每一行包含不同的图片，或者，只需很少的精力，就可以为不同类别的小矮人使用不同的图标。\n\
  \n![A329781_3_En_8_Fig9_HTML.jpg](img/A329781_3_En_8_Fig9_HTML.jpg)\n\n**图 8-9.**\
  \ 我们使用了单元格的`imageView`属性为表格视图的每个单元格添加图片\n\n> **注意：** `UIImage`使用基于文件名的缓存机制，因此每次调用`UIImage(named:)`时，它不会加载新的`image`属性。相反，它会使用已缓存的版本。\n\
  \n### 使用表格视图单元格样式\n\n到目前为止，你对表格视图所做的操作都使用了默认的单元格样式，如图 8-9 所示，该样式由常量`UITableViewCellStyle.default`表示。但`UITableViewCell`类还包括其他几种预定义的单元格样式，让你可以轻松地为表格视图增加更多变化。这些单元格样式都使用了三种不同的单元格元素：\n\
  \n*   **图片：** 如果图片是指定样式的一部分，则图片显示在单元格文本的左侧。\n*   **文本标签：** 这是单元格的主要文本。对于到目前为止我们一直在使用的`UITableViewCellStyle.Default`样式，文本标签是单元格中唯一显示的文本。\n\
  *   **详细文本标签：** 这是单元格的次要文本，通常用作说明性注释或标签。\n\n要查看这些新样式添加的内容，在`ViewController.swift`中的`tableView(_:cellForRowAtIndexPath:)`方法里添加以下代码：\n\
  \n```\nif indexPath.row < 7 {\n    cell?.detailTextLabel?.text = \"Mr Disney\"\n\
  } else {\n    cell?.detailTextLabel?.text = \"Mr Tolkien\"\n}\n```\n\n将其放置在方法中`cell?.textLabel?.text\
  \ = dwarves[indexPath.row]`这一行之前。\n\n我们在这里所做的只是设置了单元格的详细文本。对于前七行，我们使用字符串`\"Mr. Disney\"\
  `，其余行使用字符串`\"Mr. Tolkien\"`。当你运行此代码时，每个单元格看起来和之前一样（见图 8-10）。这是因为我们使用的是`UITableViewCellStyle.default`样式，它不使用详细文本。\n\
  \n![A329781_3_En_8_Fig10_HTML.jpg](img/A329781_3_En_8_Fig10_HTML.jpg)\n\n**图 8-10.**\
  \ 默认单元格样式在一行中显示图片和文本标签\n\n现在像这样将`UITableViewCellStyle.default`改为`UITableViewCellStyle.subtitle`：\n\
  \n```\nif (cell == nil) {\n    cell = UITableViewCell(\n        style: UITableViewCellStyle.subtitle,\n\
  \        reuseIdentifier: simpleTableIdentifier)\n}\n```\n\n再次运行应用程序。使用副标题样式后，两个文本元素会上下排列显示，如图\
  \ 8-11 所示。\n\n![A329781_3_En_8_Fig11_HTML.jpg](img/A329781_3_En_8_Fig11_HTML.jpg)\n\
  \n**图 8-11.** 副标题样式在文本标签下方以较小的字母显示详细文本\n\n接下来，将`UITableViewCellStyle.subtitle`改为`UITableViewCellStyle.value1`，然后构建并再次运行。这种样式将文本标签和详细文本标签放在同一行，但位于单元格的相对两侧，如图\
  \ 8-12 所示。\n\n![A329781_3_En_8_Fig12_HTML.jpg](img/A329781_3_En_8_Fig12_HTML.jpg)\n\
  \n**图 8-12.** 样式`value1`将文本标签放在左侧（黑色字母），详细文本右对齐放在右侧\n\n最后，将`UITableViewCellStyle.value1`改为`UITableViewCellStyle.value2`。这种格式通常用于显示信息以及描述性标签。它不显示单元格的图标，而是将详细文本标签放在文本标签的左侧，如图\
  \ 8-13 所示。在此布局中，详细文本标签充当描述文本标签中数据类型的标签。\n\n![A329781_3_En_8_Fig13_HTML.jpg](img/A329781_3_En_8_Fig13_HTML.jpg)\n\
  \n**图 8-13.** 样式`value2`不显示图片，并以蓝色字母将详细文本标签放在文本标签的左侧\n\n既然你已经了解了可用的单元格样式，请继续操作，在继续之前改回`UITableViewCellStyle.default`样式。在本章后面，你将看到如何创建自定义的表格视图单元格。但在此之前，请确保你考虑过可用的单元格样式，看看其中是否有适合你需求的。\n\
  \n\n\n你可能已经注意到，我们将视图控制器同时设置为该表格视图的数据源和委托；但到目前为止，我们实际上还没有实现`UITableViewDelegate`协议中的任何方法。与选择器视图不同，较简单的表格视图不需要使用委托来执行其功能。数据源提供了绘制表格所需的全部数据。委托的目的是配置表格视图的外观并处理某些用户交互。现在我们来看看几个配置选项。在下一章中，我们还会讨论更多内容。\n\
  \n### 设置缩进级别\n\n委托可用于指定某些行应进行缩进。在文件`ViewController.swift`中，将以下方法添加到你的代码中：\n\n```\n\
  // MARK:-\n// MARK: Table View delegate Methods\nfunc tableView(_ tableView: UITableView,\
  \ indentationLevelForRowAt indexPath: IndexPath) -> Int {\nreturn indexPath.row\
  \ % 4\n}\n```\n\n该方法根据每行的行号设置其缩进级别；因此，第 0 行的缩进级别为 0，第 1 行的缩进级别为 1，依此类推。由于使用了 `%`\
  \ 运算符，第 4 行将回到缩进级别 0，然后循环开始。缩进级别只是一个整数，它告诉表格视图将该行向右移动一点。数字越大，该行缩进得越靠右。例如，你可以使用这种技术来表示某一行从属于另一行，就像邮件应用在表示子文件夹时所做的那样。\n\
  \n当你再次运行应用程序时，你会看到这些行按四个一组进行缩进，如图 8-14 所示。\n\n![A329781_3_En_8_Fig14_HTML.jpg](img/A329781_3_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14. 缩进的表格行\n\n### 处理行选择\n\n表格的委托有两个方法，允许你处理行选择。一个方法在行被选中之前调用，可用于阻止行的选中，甚至改变具体哪一行被选中。让我们实现这个方法，并指定第一行不可选择。将以下方法添加到`ViewController.swift`的末尾：\n\
  \n```\nfunc tableView(_ tableView: UITableView, willSelectRowAt indexPath: IndexPath)\
  \ -> IndexPath? {\nreturn indexPath.row == 0 ? nil : indexPath\n}\n```\n\n该方法接收到一个表示即将被选中项的`indexPath`。我们的代码检查即将被选中的是哪一行。如果是第一行（其索引始终为零），则返回`nil`以表示实际上不应选中任何行。否则，返回未修改的`indexPath`，以此表示允许进行选择。\n\
  \n在编译并运行之前，我们还要实现行被选中后调用的委托方法，这通常是你实际处理选择的地方。在下一章中，我们将使用此方法在主从应用中处理下钻操作，但在此章中，我们只会弹出一个提示框来显示已选中某行。将列表\
  \ 8-4 中的方法添加到`ViewController.swift`的末尾。\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ didSelectRowAt indexPath: IndexPath) {\nlet rowValue = dwarves[indexPath.row]\n\
  let message = \"You selected \\(rowValue)\"\nlet controller = UIAlertController(title:\
  \ \"Row Selected\",\nmessage: message, preferredStyle: .alert)\nlet action = UIAlertAction(title:\
  \ \"Yes I Did\",\nstyle: .default, handler: nil)\ncontroller.addAction(action)\n\
  present(controller, animated: true, completion: nil)\n}\n列表 8-4. 当用户点击某行时弹出警告框\n\
  ```\n\n添加此方法后，编译并运行应用，然后测试一下。例如，看看你是否能选中第一行（你应该无法选中），然后选择其他行之一。被选中的行应高亮显示。同时，你的警告框应该会弹出，告诉你选择了哪一行，而选中的行在背景中淡出，如图\
  \ 8-15 所示。\n\n![A329781_3_En_8_Fig15_HTML.jpg](img/A329781_3_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15. 在此示例中，第一行不可选择，当选择其他任何行时会显示警告框\n\n请注意，你还可以在传回索引路径之前对其进行修改，这将导致不同的行和/或分区被选中。你不常会这样做，因为更改用户的选择需要有非常充分的理由。在绝大多数使用`tableView(_:willSelectRowAtIndexPath:)`方法的情况下，你要么返回未修改的`indexPath`以允许选择，要么返回`nil`来禁止选择。如果你确实想要更改选中的行和/或分区，请使用`NSIndexPath(forRow:,\
  \ inSection:)`初始化器创建一个新的`NSIndexPath`对象并返回它。例如，列表 8-5 中的代码将确保如果你试图选中一个偶数行，实际上会选中紧随其后的下一行。\n\
  \n```\nfunc tableView(tableView: UITableView,\nwillSelectRowAtIndexPath indexPath:\
  \ NSIndexPath)\n-> NSIndexPath? {\nif indexPath.row == 0 {\nreturn nil\n} else if\
  \ (indexPath.row % 2 == 0){\nreturn NSIndexPath(row: indexPath.row + 1,\nsection:\
  \ indexPath.section)\n} else {\nreturn indexPath\n}\n}\n列表 8-5. 返回紧随其后的下一行\n```\n\
  \n\n\n### 更改字号与行高\n\n假设我们想要修改表格视图中使用的字号。大多数情况下，你不应覆盖默认字体，因为这是用户期望看到的。但有时确实有合理理由修改字体。请修改\
  \ `tableView(_:cellForRowAtIndexPath:)` 方法中的代码：\n\n```\nfunc tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    var\
  \ cell = tableView.dequeueReusableCell(withIdentifier: simpleTableIdentifier)\n\
  \    if (cell == nil) {\n        cell = UITableViewCell(\n            style: UITableViewCellStyle.default,\n\
  \            reuseIdentifier: simpleTableIdentifier)\n    }\n    let image = UIImage(named:\
  \ \"star\")\n    cell?.imageView?.image = image\n    let highlightedImage = UIImage(named:\
  \ \"star2\")\n    cell?.imageView?.highlightedImage = highlightedImage\n    if indexPath.row\
  \ < 7 {\n        cell?.detailTextLabel?.text = \"迪士尼先生\"\n    } else {\n       \
  \ cell?.detailTextLabel?.text = \"托尔金先生\"\n    }\n    cell?.textLabel?.text = dwarves[indexPath.row]\n\
  \    cell?.textLabel?.font = UIFont.boldSystemFont(ofSize: 50) // <- 添加此行\n    return\
  \ cell!\n}\n```\n\n现在运行应用，列表中的数值会以非常大的字号显示，但它们无法完全适配行高，如图 8-16 所示。\n\n![A329781_3_En_8_Fig16_HTML.jpg](img/A329781_3_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 更改绘制表格视图单元格使用的字体\n\n有几种方法可以解决这个问题。首先，我们可以告知表格其所有行应具有固定的高度。为此，需要设置其 `rowHeight`\
  \ 属性，如下所示：\n\n```\ntableView.rowHeight = 70\n```\n\n如果需要不同行具有不同高度，可以实现 `UITableViewDelegate`\
  \ 的 `tableView(_:heightForRowAtIndexPath:)` 方法。现在将此方法添加到你的控制器类中：\n\n```\nfunc tableView(_\
  \ tableView: UITableView, heightForRowAt indexPath: IndexPath) -> CGFloat {\n  \
  \  return indexPath.row == 0 ? 120 : 70\n}\n```\n\n我们刚刚告知表格视图将所有行的行高设置为 70 点，但第一行除外，它的高度会稍大一些。编译并运行，你的表格行现在应能更好地适配其内容，如图\
  \ 8-17 所示。\n\n![A329781_3_En_8_Fig17_HTML.jpg](img/A329781_3_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17. 使用委托更改行大小。注意第一行比其他行高得多\n\n委托还能处理更多任务，但其余大部分任务在你开始处理分层数据时才会派上用场，这将在下一章中讨论。要了解更多信息，请使用文档浏览器探索\
  \ `UITableViewDelegate` 协议，查看还有哪些其他方法可用。\n\n## 自定义表格视图单元格\n\n开箱即用的表格视图可以完成许多操作；但通常你会希望以\
  \ `UITableViewCell` 直接不支持的方式来格式化每行的数据。在这些情况下，有三种基本方法：一种是在创建单元格时通过编程方式向 `UITableViewCell`\
  \ 添加子视图；第二种是从 nib 文件加载单元格；第三种方法类似，但从故事板加载单元格。我们将在本章中介绍前两种技术，并在第 9 章中看到从故事板创建单元格的示例。\n\
  \n### 向表格视图单元格添加子视图\n\n为了展示如何使用自定义单元格，我们将创建一个包含另一个表格视图的新应用。在每行中，我们将显示两行信息以及两个标签，如图\
  \ 8-18 所示。我们的应用将显示一系列可能熟悉的计算机型号的名称和颜色。通过向表格视图单元格添加子视图，我们可以在同一行中同时显示这两类信息。\n\n![A329781_3_En_8_Fig18_HTML.jpg](img/A329781_3_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18. 向表格视图单元格添加子视图可实现多行显示\n\n## 实现自定义表格视图应用\n\n使用“单视图应用”模板创建一个新的 Xcode 项目。将项目命名为\
  \ `Table Cells`，并使用与上一个项目相同的设置。点击 `Main.storyboard` 以在 Interface Builder 中编辑 GUI。\n\
  \n向主视图添加一个表格视图，并使用“连接检查器”将其数据源设置为视图控制器，就像我们为“简单表格”应用所做的那样。然后，使用窗口底部的“固定”按钮为表格视图的边缘与其父视图及状态栏之间创建约束。实际上你可以使用与图\
  \ 8-5 中相同的设置，因为默认情况下，弹出窗口顶部输入框中指定的值即为表格视图与其四个方向上最近邻居之间的距离。最后，保存故事板。\n\n### 创建 `UITableViewCell`\
  \ 子类\n\n在此之前，我们使用的标准表格视图单元格已经为我们处理了单元格布局的所有细节。我们的控制器代码无需处理标签和图像放置位置等繁琐细节；我们只需将显示值传递给单元格即可。这使展示逻辑与控制器分离，是一种值得坚持的优秀设计。对于此项目，我们将创建一个自己的新单元格\
  \ `UITableViewCell` 子类，用于处理新布局的细节，从而使我们的控制器尽可能保持简单。\n\n\n\n### 添加新单元格\n\n在项目导航栏中选择`Table\
  \ Cells`文件夹，然后按下`⌘N`创建新文件。在弹出的助手窗口中，从`iOS Source`部分选择`Cocoa Touch Class`，然后点击`Next`。在接下来的屏幕上，将新类命名为`NameAndColorCell`，在`Subclass\
  \ of`下拉列表中选择`UITableViewCell`，保持`Also create XIB file`未选中状态，再次点击`Next`，在下一个屏幕上点击`Create`。\n\
  \n现在在项目导航栏中选择`NameAndColorCell.swift`，并添加以下代码：\n\n```\nclass NameAndColorCell: UITableViewCell\
  \ {\nvar name: String = \"\"\nvar color: String = \"\"\nvar nameLabel: UILabel!\n\
  var colorLabel: UILabel!\n```\n\n这里，我们在单元格的接口中添加了两个属性（`name`和`color`），控制器将使用它们向每个单元格传递值。我们还添加了一些其他属性，用于访问即将添加到单元格中的部分子视图。我们的单元格将包含四个子视图，其中两个是内容固定的标签，另外两个的内容将在每一行中变化。\n\
  \n这些就是我们需要添加的所有属性，接下来让我们继续代码部分。我们将重写表格视图单元格的`init(style:reuseIdentifier:)`初始化器，添加一些代码来创建显示所需的视图，如代码清单\
  \ 8-6 所示。\n\n```\noverride init(style: UITableViewCellStyle, reuseIdentifier: String?)\
  \ {\nsuper.init(style: style, reuseIdentifier: reuseIdentifier)\nlet nameLabelRect\
  \ = CGRect(x: 0, y: 5, width: 70, height: 15)\nlet nameMarker = UILabel(frame: nameLabelRect)\n\
  nameMarker.textAlignment = NSTextAlignment.right\nnameMarker.text = \"Name:\"\n\
  nameMarker.font = UIFont.boldSystemFont(ofSize: 12)\ncontentView.addSubview(nameMarker)\n\
  let colorLabelRect = CGRect(x: 0, y: 26, width: 70, height: 15)\nlet colorMarker\
  \ = UILabel(frame: colorLabelRect)\ncolorMarker.textAlignment = NSTextAlignment.right\n\
  colorMarker.text = \"Color:\"\ncolorMarker.font = UIFont.boldSystemFont(ofSize:\
  \ 12)\ncontentView.addSubview(colorMarker)\nlet nameValueRect = CGRect(x: 80, y:\
  \ 5, width: 200, height: 15)\nnameLabel = UILabel(frame: nameValueRect)\ncontentView.addSubview(nameLabel)\n\
  let colorValueRect = CGRect(x: 80, y: 25, width: 200, height: 15)\ncolorLabel =\
  \ UILabel(frame: colorValueRect)\ncontentView.addSubview(colorLabel)\n}\n代码清单 8-6.\n\
  我们的表格视图单元格的 init() 方法\n```\n\n这应该相当直观。我们创建了四个`UILabel`并将它们添加到表格视图单元格中。表格视图单元格已经有一个名为`contentView`的`UIView`子视图，用于分组所有子视图。因此，我们不是直接将标签作为子视图添加到表格视图单元格，而是添加到它的`contentView`中。\n\
  \n其中两个标签包含静态文本。标签`nameMarker`包含文本`Name:`，标签`colorMarker`包含文本`Color:`。这些是我们不会更改的标签。这两个标签都使用`NSTextAlignment.right`实现了右对齐文本。\n\
  \n我们将使用另外两个标签来显示每行特定的数据。请记住，我们之后需要某种方式来检索这些字段，因此我们在之前声明的属性中保留了对它们的引用。\n\n由于我们重写了表格视图单元格类的一个指定初始化器，Swift\
  \ 要求我们也提供`init(coder:)`初始化器的实现。在我们的示例应用程序中，这个初始化器永远不会被调用，所以只需添加这三行代码：\n\n```\nrequired\
  \ init?(coder aDecoder: NSCoder) {\nfatalError(\"init(coder:) has not been implemented\"\
  )\n}\n```\n\n在第 13 章中，我们将讨论这个初始化器以及为什么有时需要它。\n\n现在，让我们通过为`name`和`color`属性添加一些设置器逻辑来对`NameAndColorCell`类进行收尾工作。按如下方式更改这些属性的声明：\n\
  \n```\nvar name: String = \"\" {\ndidSet {\nif (name != oldValue) {\nnameLabel.text\
  \ = name\n}\n}\n}\nvar color: String = \"\" {\ndidSet {\nif (color != oldValue)\
  \ {\ncolorLabel.text = color\n}\n}\n}\n```\n\n这里我们所做的一切就是添加代码，以确保当`name`或`color`属性的值发生变化时，同一个自定义表格视图单元格中对应标签的`text`属性也会被设置为相同的值。\n\
  \n\n\n```markdown\n## 实现控制器代码\n\n现在，我们来设置一个简单的控制器，以便在新单元格中显示值。首先选择 `ViewController.swift`，并添加代码清单\
  \ 8-7 中的代码。\n\n```\nclass ViewController: UIViewController, UITableViewDataSource\
  \ {\nlet cellTableIdentifier = \"CellTableIdentifier\"\n@IBOutlet var tableView:UITableView!\n\
  let computers = [\n[\"Name\" : \"MacBook Air\", \"Color\" : \"Silver\"],\n[\"Name\"\
  \ : \"MacBook Pro\", \"Color\" : \"Silver\"],\n[\"Name\" : \"iMac\", \"Color\" :\
  \ \"Silver\"],\n[\"Name\" : \"Mac Mini\", \"Color\" : \"Silver\"],\n[\"Name\" :\
  \ \"Mac Pro\", \"Color\" : \"Black\"]\n]\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // 加载视图后执行任何额外的设置（通常从 nib 文件加载）\ntableView.register(NameAndColorCell.self,\nforCellReuseIdentifier:\
  \ cellTableIdentifier)\n}\n代码清单 8-7：在自定义单元格中显示值\n```\n\n我们让视图控制器遵循 `UITableViewDataSource`\
  \ 协议，并添加了一个单元格标识名称和一个字典数组。每个字典包含表格中一行的名称和颜色信息。该行的名称存储在字典的键 `Name` 下，颜色存储在键 `Color`\
  \ 下。我们还为表格视图添加了一个插座，因此需要在故事板中进行连接。选择 `Main.storyboard` 文件。在文档大纲中，从视图控制器图标按住 Control\
  \ 键拖动到表格视图图标。松开鼠标，在弹出的菜单中选择 `tableView`，将表格视图链接到插座。\n\n现在，将代码清单 8-8 中的代码添加到 `ViewController.swift`\
  \ 文件的末尾。\n\n```\n// MARK: -\n// MARK: 表格视图数据源方法\nfunc tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\nreturn computers.count\n}\nfunc\
  \ tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
  \ {\nlet cell = tableView.dequeueReusableCell(\nwithIdentifier: cellTableIdentifier,\
  \ for: indexPath)\nas! NameAndColorCell\nlet rowData = computers[indexPath.row]\n\
  cell.name = rowData[\"Name\"]!\ncell.color = rowData[\"Color\"]!\nreturn cell\n\
  }\n代码清单 8-8：我们的表格视图数据源方法\n```\n\n在前面的示例中，您已经见过这些方法——它们属于 `UITableViewDataSource`\
  \ 协议。我们重点看一下 `tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)`，因为这才是真正涉及新内容的地方。这里我们使用了一个有趣的特性：表格视图可以在需要时利用一种注册机制来创建新单元格。这意味着，只要我们已经注册了要在表格视图中使用的所有重用标识，就总能获取到可用的单元格。在前面的示例中，我们实现的出列方法也使用了注册机制，但如果传入的标识未注册，它会返回\
  \ `nil`。`nil` 返回值被用作一个信号，提示我们需要创建并填充一个新的 `UITableViewCell` 对象。而我们现在使用的方法永远不会返回 `nil`：\n\
  \n```\ndequeueReusableCell(\nwithIdentifier: cellTableIdentifier, for: indexPath)\n\
  ```\n\n那么，它是如何获取表格单元格对象的呢？它使用传入的标识作为键，在注册表中查找。我们在 `viewDidLoad` 方法中向注册表添加了一个条目，该条目映射到我们的表格单元格标识：\n\
  \n```\ntableView.register(NameAndColorCell.self,\nforCellReuseIdentifier: cellTableIdentifier)\n\
  ```\n\n如果传入一个未注册的标识会怎样？在这种情况下，`dequeueReusableCell` 方法会崩溃。崩溃听起来很糟糕，但在这里，它会是开发过程中立即就能发现的\
  \ bug。因此，我们不需要包含检查 `nil` 返回值的代码，因为这种情况永远不会发生。\n\n获取到新单元格后，我们使用传入的 `indexPath` 参数来确定表格请求的是哪一行的单元格，然后用该行值来获取对应行的正确字典。记住，字典有两个键/值对：一个用\
  \ `name`，另一个用 `color`：\n\n```\nlet rowData = computers[indexPath.row]\n```\n\n现在，剩下要做的就是使用我们在子类中定义的属性，用所选行的数据填充单元格：\n\
  \n```\ncell.name = rowData[\"Name\"]!\ncell.color = rowData[\"Color\"]!\n```\n\n\
  正如您之前看到的，设置这些属性会将值复制到表格视图单元格中的名称和颜色标签。\n\n构建并运行您的应用程序。您应该会看到一个表格行，每行有两行数据，如图 8-19\
  \ 所示。\n\n![A329781_3_En_8_Fig19_HTML.jpg](img/A329781_3_En_8_Fig19_HTML.jpg)\n\n\
  图 8-19：代码创建的自定义单元格的表格视图\n\n能够向表格视图单元格添加视图，比单独使用标准表格视图单元格提供了更大的灵活性，但以编程方式创建、定位和添加所有子视图可能会有些繁琐。天哪，如果我们能通过\
  \ Xcode 的 GUI 编辑工具以图形方式设计表格视图单元格，那该多好啊。嗯，我们很幸运。如前所述，您可以使用 Interface Builder 设计表格视图单元格，然后在创建新单元格时直接从故事板或\
  \ XIB 文件加载视图。\n\n### 从 XIB 文件加载 UITableViewCell\n\n我们将使用 Xcode 在 Interface Builder\
  \ 中提供的可视化布局功能，重新创建刚才用代码构建的相同双行界面。为此，我们将创建一个新的 XIB 文件，其中包含表格视图单元格，并使用 Interface Builder\
  \ 布局其视图。然后，当我们需要一个表示行的表格视图单元格时，只需加载 XIB 文件，并使用我们已在单元格类中定义的属性来设置名称和颜色。除了使用 Interface\
  \ Builder 的可视化布局外，我们还在其他几个地方简化了代码。在继续之前，您可能想复制一份 Table Cells 项目，以便在其中进行后续更改。像之前一样，退出\
  \ Xcode，然后压缩项目文件，并给它一个合适的名称以供参考。我将其命名为 `Table Cells Orig.zip`，表示它是最初的 Table Cells\
  \ 项目（见图 8-20）。\n\n![A329781_3_En_8_Fig20_HTML.jpg](img/A329781_3_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20：您可以压缩项目文件夹以创建版本基线，以便日后决定回溯时使用\n\n首先，我们将在 `NameAndColorCell.swift` 中对 `NameAndColorCell`\
  \ 类进行一些更改。第一步是将 `nameLabel` 和 `colorLabel` 属性标记为插座，以便我们能在 Interface Builder 中使用它们：\n\
  \n```\n@IBOutlet var nameLabel: UILabel!\n@IBOutlet var colorLabel: UILabel!\n```\n\
  \n现在，还记得我们在 `init(style: UITableViewCellStyle, reuseIdentifier: String?)` 中创建标签的那些设置吗？所有这些都可以删除了。实际上，您应该直接删除整个方法，因为所有这些设置现在都将在\
  \ Interface Builder 中完成。而且，由于我们不再重写任何基类初始化方法，您也可以删除 `init(coder:)` 方法。\n\n经过这些操作后，您得到的单元格类比之前更小巧、更简洁。它现在唯一真正的功能就是将数据传输到标签。现在，我们需要在\
  \ Interface Builder 中重新创建单元格及其标签。\n```\n\n\n### 在 Interface Builder 中设计表格视图单元格\n\
  \n在 Xcode 中右键点击 `Table Cells` 文件夹，从上下文菜单中选择 `New File…`。在新文件助手的左侧窗格中，点击 `User Interface`（确保选择的是\
