  \ 8-29 所示。\n\n![A329781_3_En_8_Fig29_HTML.jpg](img/A329781_3_En_8_Fig29_HTML.jpg)\n\
  \n图 8-29.\n\n连接我们的名称和颜色标签输出口\n\n## 使用新的表格视图单元格\n\n要使用我们设计的单元格，我们只需要对`ViewController.swift`中的`viewDidLoad()`方法进行一些相当简单的更改，如代码清单\
  \ 8-9 所示。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any\
  \ additional setup after loading the view, typically from a nib.\ntableView.register(NameAndColorCell.self,\n\
  forCellReuseIdentifier: cellTableIdentifier)\nlet xib = UINib(nibName: \"NameAndColorCell\"\
  , bundle: nil)\ntableView.register(xib,\nforCellReuseIdentifier: cellTableIdentifier)\n\
  tableView.rowHeight = 65\n}\n```\n\n代码清单 8-9.\n\n修改 `viewDidLoad()` 以使用我们的新单元格\n\
  \n正如它可以将类与重用标识符关联起来（如您在前一个示例中所见），表格视图可以跟踪哪些 nib 文件旨在与特定的重用标识符关联。这允许您使用类或 nib 文件为每个行类型注册一次单元格，而`dequeueReusableCell(_:forIndexPath:)`将始终提供一个随时可用的单元格。\n\
  \n就是这样。构建并运行。现在，您的双行表格单元格基于您的 Interface Builder 设计技巧，如图 8-30 所示。\n\n![A329781_3_En_8_Fig30_HTML.jpg](img/A329781_3_En_8_Fig30_HTML.jpg)\n\
  \n图 8-30.\n\n使用我们自定义单元格的结果\n\n## 分组和索引分区\n\n我们的下一个项目将探索表格的另一个基本方面。我们仍将使用单个表格视图——暂时没有层级结构——但我们将数据划分为多个分区。再次使用`Single\
  \ View Application`模板创建一个新的 Xcode 项目，这次将其命名为`Sections`。像往常一样，将`Language`设置为`Swift`，将`Devices`设置为`Universal`。\n\
  \n### 构建视图\n\n打开`Sections`文件夹，点击`Main.storyboard`来编辑文件。将一个表格视图拖放到`View`窗口上，就像我们之前做的那样，并添加我们在“表格单元格”示例中使用过的相同\
  \ Auto Layout 约束。然后按`⌥⌘6`并将`dataSource`连线连接到`View Controller`图标。\n\n接下来，确保表格视图被选中，并按`⌥⌘4`打开`Attributes\
  \ Inspector`。将表格视图的`Style`从`Plain`更改为`Grouped`，如图 8-31 所示。保存故事板。\n\n![A329781_3_En_8_Fig31_HTML.jpg](img/A329781_3_En_8_Fig31_HTML.jpg)\n\
  \n图 8-31.\n\n表格视图的`Attributes Inspector`，显示已选中`Grouped`的`Style`弹出菜单\n\n### 导入数据\n\
  \n这个项目需要相当多的数据。为了省去您几个小时的打字时间，我们提供了另一个属性列表供您制表之用。从本书示例源代码存档中的`08 - Sections Data`子文件夹中获取名为`sortednames.plist`的文件，并将其拖入\
  \ Xcode 中您的项目的`Sections`文件夹中。\n\n一旦`sortednames.plist`被添加到您的项目中，单击它以大致了解其内容，如图 8-32\
  \ 所示。它是一个包含字典的属性列表，字母表中的每个字母都有一个条目。每个字母下面是一个以该字母开头的名称列表。\n\n![A329781_3_En_8_Fig32_HTML.jpg](img/A329781_3_En_8_Fig32_HTML.jpg)\n\
  \n图 8-32.\n\n`sortednames.plist` 属性列表文件。字母 J 已展开，以便您了解其中一个字典的结构\n\n我们将使用这个属性列表中的数据来填充表格视图，为每个字母创建一个分区。\n\
  \n\n\n### 实现控制器\n\n单击 `ViewController.swift` 文件。使该类遵循 `UITableViewDataSource` 协议，添加一个表格单元格标识名称，并通过添加以下**加粗**代码来创建几个属性：\n\
  \n```\nclass ViewController: UIViewController, UITableViewDataSource {\n    let\
  \ sectionsTableIdentifier = \"SectionsTableIndentifier\"\n    var names: [String:\
  \ [String]]!\n    var keys: [String]!\n```\n\n再次选择 `Main.storyboard` 文件，然后调出助理编辑器。如果未显示，请使用跳转栏选择\
  \ `ViewController.swift` 文件。按住 Control 键从表格视图拖拽到助理编辑器，以在 `keys` 属性定义的**下方**为表格创建一个输出口：\n\
  \n```\n@IBOutlet weak var tableView: UITableView!\n```\n\n现在修改 `viewDidLoad()` 方法，如代码清单\
  \ 8-10 所示。\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    //\
  \ 加载视图后执行任何额外的设置，通常从 nib 文件加载。\n    tableView.register(UITableViewCell.self,\n \
  \       forCellReuseIdentifier: sectionsTableIdentifier)\n    let path = Bundle.main.path(forResource:\n\
  \        \"sortednames\", ofType: \"plist\")\n    let namesDict = NSDictionary(contentsOfFile:\
  \ path!)\n    names = namesDict as! [String: [String]]\n    keys = (namesDict!.allKeys\
  \ as! [String]).sorted()\n}\n代码清单 8-10.\n我们新建的 viewDidLoad 方法\n```\n\n这与您之前看到的大部分内容没有太大不同。之前，我们为一个字典和一个数组添加了属性声明。字典将保存所有数据，而数组将保存按字母顺序排序的区段。在\
  \ `viewDidLoad()` 方法中，我们首先使用声明的标识符注册了每行应显示的默认表格视图单元格类。之后，我们从添加到项目中的属性列表创建了一个 `NSDictionary`\
  \ 实例，并将其赋值给 `names` 属性，同时将其转换为适当的 Swift 字典类型。接下来，我们从字典中获取所有键并排序，得到一个包含字典中所有键值的、按字母顺序排列的有序数组。请记住，我们的数据使用字母作为键，因此该数组将包含\
  \ 26 个从 A 到 Z 排序的字母。我们将使用该数组来帮助我们跟踪各个区段。\n\n接下来，将代码清单 8-11 中的代码添加到 `ViewController.swift`\
  \ 文件的末尾。\n\n```\n// MARK: 表格视图数据源方法\nfunc numberOfSections(in tableView: UITableView)\
  \ -> Int {\n    return keys.count\n}\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n    let key = keys[section]\n    let nameSection = names[key]!\n\
  \    return nameSection.count\n}\nfunc tableView(_ tableView: UITableView, titleForHeaderInSection\
  \ section: Int) -> String? {\n    return keys[section]\n}\nfunc tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let\
  \ cell = tableView.dequeueReusableCell(withIdentifier: sectionsTableIdentifier,\
  \ for: indexPath)\n        as UITableViewCell\n    let key = keys[indexPath.section]\n\
  \    let nameSection = names[key]!\n    cell.textLabel?.text = nameSection[indexPath.row]\n\
  \    return cell\n}\n代码清单 8-11.\n表格视图的数据源方法\n```\n\n这些都是表格数据源方法。我们添加到类中的第一个方法指定了区段的数量。在之前的示例中我们没有实现这个方法，因为使用默认设置\
  \ 1 就足够了。这次，我们告诉表格视图，字典中的每个键对应一个区段：\n\n```\nfunc numberOfSectionsInTableView(tableView:\
  \ UITableView) -> Int {\n    return keys.count\n}\n```\n\n下一个方法计算特定区段中的行数。在之前的示例中，我们只有一个区段，因此直接返回数组中的行数即可。这次，我们需要按区段细分。这可以通过检索与当前区段对应的数组并返回该数组的计数来实现：\n\
  \n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int {\n    let key = keys[section]\n    let nameSection = names[key]!\n   \
  \ return nameSection.count\n}\n```\n\n方法 `tableView(_:titleForHeaderInSection:)`\
  \ 允许您为每个区段指定一个可选的标题。我们直接返回该分组的字母，也就是该分组的键：\n\n```\nfunc tableView(_ tableView: UITableView,\
  \ titleForHeaderInSection section: Int) -> String? {\n    return keys[section]\n\
  }\n```\n\n在 `tableView(_:cellForRowAtIndexPath:)` 方法中，我们需要使用索引路径中的区段和行属性，分别提取区段键和名称数组，然后据此确定要使用的值。区段编号会告诉我们从\
  \ `names` 字典中取出哪个数组，然后我们可以使用行号来确定使用该数组中的哪个值。该方法中的其他内容与本章前面构建的“表格单元格”应用程序中的版本基本相同。\n\
  \n构建并运行项目，请记住我们已将表格的“样式”更改为“分组”，因此最终我们得到了一个包含 26 个区段的分组表格，应如图 8-33 所示。\n\n![A329781_3_En_8_Fig33_HTML.jpg](img/A329781_3_En_8_Fig33_HTML.jpg)\n\
  \n图 8-33. 包含多个区段的分组表格\n\n作为对比，让我们将表格视图改回普通样式，看看包含多个区段的普通表格视图是什么样子。再次选择 `Main.storyboard`\
  \ 在 Interface Builder 中编辑文件。选择表格视图，并使用属性检查器将视图切换为“普通”。保存项目，然后构建并运行它——数据相同，但外观不同，如图\
  \ 8-34 所示。\n\n![A329781_3_En_8_Fig34_HTML.jpg](img/A329781_3_En_8_Fig34_HTML.jpg)\n\
  \n图 8-34. 包含区段的普通表格\n\n### 添加索引\n\n当前表格的一个问题是行数过多。列表中包含 2,000 个名字。您的食指在查找 Zachariah\
  \ 或 Zayne 时会非常疲劳，更不用说 Zoie 了。\n\n解决这个问题的一个方法是在表格视图的右侧添加一个索引。既然我们已经将表格视图样式改回了“普通”，那么实现起来就相对容易了，如图\
  \ 8-35 所示。将以下方法添加到 `ViewController.swift` 的底部，然后构建并运行应用程序。\n\n![A329781_3_En_8_Fig35_HTML.jpg](img/A329781_3_En_8_Fig35_HTML.jpg)\n\
  \n图 8-35. 为表格视图添加索引\n\n```\nfunc sectionIndexTitles(for tableView: UITableView)\
  \ -> [String]? {\n    return keys\n}\n```\n\n\n\n### 添加搜索栏\n\n索引很有用，但即便如此，我们的列表中仍有大量姓名。例如，如果我们想查看\
  \ Arabella 这个名字是否在列表中，即使使用了索引，我们也需要滚动一段时间。如果能允许用户通过指定搜索词来精简列表，使其更友好，那就太好了。嗯，这虽然需要多做一些工作，但也不算太多。我们将使用搜索控制器来实现一个标准的\
  \ iOS 搜索栏，如图 8-36 左侧所示。\n\n![A329781_3_En_8_Fig36_HTML.jpg](img/A329781_3_En_8_Fig36_HTML.jpg)\n\
  \n图 8-36. 在表格中添加了搜索栏的应用程序\n\n当用户在搜索栏中输入时，姓名列表会缩减到仅包含输入文本作为子串的那些姓名。此外，搜索栏还允许你定义范围按钮，可以用它们以某种方式限定搜索。我们将为搜索栏添加三个范围按钮——Short\
  \ 按钮将搜索限制为长度少于六个字符的姓名，Long 按钮将只考虑至少六个字符的姓名，而 All 按钮则包含搜索中的所有姓名。范围按钮仅在用户在搜索栏中输入时出现；你可以在图\
  \ 8-36 的右侧看到它们的使用效果。\n\n添加搜索功能相当简单。你只需要三样东西：\n\n- 一些要搜索的数据。在我们的例子中，就是姓名列表。\n- 一个用于显示搜索结果的视图控制器。这个视图控制器会临时替换提供数据的那个视图控制器。它可以以任何方式显示结果，但通常源数据是在表格中呈现的，而结果视图控制器会使用另一个看起来非常相似的表格，从而造成搜索只是过滤了原始表格的印象。不过，正如你将看到的，实际情况并非如此。\n\
  - 一个提供搜索栏并管理搜索结果在结果视图控制器中显示的 `UISearchController`。\n\n让我们从创建结果视图控制器的框架开始。我们将在表格中显示搜索结果，因此我们的结果视图控制器需要包含一个表格。我们可以像本章前面的示例那样，将一个视图控制器拖到故事板上并向其添加一个表格视图，但这次让我们尝试不同的做法。我们将使用一个\
  \ `UITableViewController`，它是一个嵌入了 `UITableView` 的视图控制器，并且预先配置为既是其表格视图的数据源也是其代理。在项目导航器中，右键单击\
  \ Sections 组，然后从弹出菜单中选择 New File…。在文件模板选择器中，从 iOS Source 组中选择 Cocoa Touch Class，然后按\
  \ Next。将新类命名为 `SearchResultsController`，并使其成为 `UITableViewController` 的子类。按 Next，选择新文件的位置，然后让\
  \ Xcode 创建它。\n\n在项目导航器中选择 `SearchResultsController.swift` 并对其进行如下修改：\n\n```\nclass\
  \ SearchResultsController: UITableViewController,\nUISearchResultsUpdating {\n```\n\
  \n我们将在这个视图控制器中实现搜索逻辑，因此我们使其遵循 `UISearchResultsUpdating` 协议，这允许我们将其指定为 `UISearchController`\
  \ 类的代理。正如你稍后将看到的，当用户在搜索栏中输入时，会调用此协议定义的单一方法来更新搜索结果。\n\n由于它将为我们实现搜索操作，`SearchResultsController`\
  \ 需要访问主视图控制器正在显示的姓名列表，因此我们需要为其提供属性，以便我们可以将姓名字典和用于在主视图控制器中显示的键列表传递给它。现在让我们将这些属性添加到\
  \ `SearchResultsController.swift` 中。你可能已经注意到，此文件已经包含了一些不完整的代码，这些代码提供了 `UITableViewDataSource`\
  \ 协议的部分实现，以及一些 `UITableViewController` 子类经常需要实现的其他方法的注释代码块。我们不会在这个示例中使用这些内容，因此请删除所有注释掉的代码和两个\
  \ `UITableViewDataSource` 方法，然后在文件顶部添加以下代码：\n\n```\nclass SearchResultsController:\
  \ UITableViewController, UISearchResultsUpdating  {\nlet sectionsTableIdentifier\
  \ = \"SectionsTableIdentifier\"\nvar names:[String: [String]] = [String: [String]]()\n\
  var keys: [String] = []\nvar filteredNames: [String] = []\n```\n\n我们添加了 `sectionsTableIdentifier`\
  \ 变量来保存此视图控制器中表格单元格的标识符。我们使用了与主视图控制器中相同的标识符，尽管我们可以使用任何名称。我们还添加了两个属性，它们将保存搜索时使用的姓名字典和键列表，以及另一个属性，该属性将保存对存储搜索结果的数组的引用。\n\
  \n接下来，在 `viewDidLoad()` 方法中添加一行代码，以将我们的表格单元格标识符注册到结果控制器的嵌入式表格视图中：\n\n```\noverride\
  \ func viewDidLoad() {\nsuper.viewDidLoad()\ntableView.register(UITableViewCell.self,\n\
  forCellReuseIdentifier: sectionsTableIdentifier)\n}\n```\n\n目前我们在结果视图控制器中需要做的就这些了，所以让我们暂时切换回主视图控制器并向其添加搜索栏。在项目导航器中选择\
  \ `ViewController.swift`，并在文件顶部添加一个属性来保存对 `UISearchController` 实例的引用，该实例将在此示例中为我们完成大部分繁重的工作：\n\
  \n```\nclass ViewController: UIViewController, UITableViewDataSource  {\nlet sectionsTableIdentifier\
  \ = \"SectionsTableIndentifier\"\nvar names: [String: [String]]!\nvar keys: [String]!\n\
  @IBOutlet weak var tableView: UITableView!\nvar searchController: UISearchController!\
  \   // ← 添加此行\n```\n\n接下来，修改 `viewDidLoad()` 方法来添加搜索控制器，如列表 8-12 所示。\n\n```\noverride\
  \ func viewDidLoad() {\nsuper.viewDidLoad()\n// 从 nib 加载视图后的任何其他设置。\ntableView.register(UITableViewCell.self,\n\
  forCellReuseIdentifier: sectionsTableIdentifier)\nlet path = Bundle.main.pathForResource(\n\
  \"sortednames\", ofType: \"plist\")\nlet namesDict = NSDictionary(contentsOfFile:\
  \ path!)\nnames = namesDict as! [String: [String]]\nkeys = (namesDict!.allKeys as!\
  \ [String]).sorted()\nlet resultsController = SearchResultsController()\nresultsController.names\
  \ = names\nresultsController.keys = keys\nsearchController =\nUISearchController(searchResultsController:\
  \ resultsController)\nlet searchBar = searchController.searchBar\nsearchBar.scopeButtonTitles\
  \ = [\"All\", \"Short\", \"Long\"]\nsearchBar.placeholder = \"Enter a search term\"\
  \nsearchBar.sizeToFit()\ntableView.tableHeaderView = searchBar\nsearchController.searchResultsUpdater\
  \ = resultsController\n}\n列表 8-12. 在 ViewController.swift 中的主 viewDidLoad 方法中添加搜索控制器\n\
  ```\n\n我们首先创建结果控制器并设置其 `names` 和 `keys` 属性。然后，我们创建 `UISearchController`，并向其传递对结果控制器的引用——当有搜索结果要显示时，`UISearchController`\
  \ 会展示这个视图控制器。\n\n\n```swift\nlet resultsController = SearchResultsController()\n\
  resultsController.names = names\nresultsController.keys = keys\nsearchController\
  \ =\nUISearchController(searchResultsController: resultsController)\n```\n\n接下来的三行代码获取并配置了由\
  \ `UISearchController` 创建的 `UISearchBar`，我们可以通过其 `searchBar` 属性来获取它：\n\n```swift\n\
  let searchBar = searchController.searchBar\nsearchBar.scopeButtonTitles = [\"全部\"\
  , \"短\", \"长\"]\nsearchBar.placeholder = \"输入搜索词\"\n```\n\n搜索栏的 `scopeButtonTitles`\
  \ 属性包含了要分配给其作用域按钮的名称。默认情况下，没有作用域按钮，但这里我们设置了本节前面讨论过的三个按钮的名称。我们还设置了一些占位符文本，让用户了解搜索栏的用途。你可以在图\
  \ 8-36 的左侧看到占位符文本。\n\n到目前为止，我们已经创建了 `UISearchController`，但尚未将其连接到用户界面。为此，我们获取搜索栏并将其安装为主视图控制器中表格的头部视图：\n\
  \n```swift\nsearchBar.sizeToFit()\ntableView.tableHeaderView = searchBar\n```\n\n\
  表格的头部视图由表格视图自动管理。它始终出现在第一个表格分区第一行之前。请注意，我们使用了 `sizeToFit()` 方法，为搜索栏赋予适合其内容的大小。我们这样做是为了让它获得正确的高度——此方法设置的宽度并不重要，因为表格视图会确保它拉伸到整个表格的宽度，并会在表格大小改变时（通常是由于设备旋转）自动调整其大小。\n\
  \n对 `viewDidLoad` 的最终修改是为 `UISearchController` 的 `searchResultsUpdater` 属性赋值，该属性的类型为\
  \ `UISearchResultsUpdating`：\n\n```swift\nsearchController.searchResultsUpdater\
  \ = resultsController\n```\n\n每当用户在搜索栏中输入内容时，`UISearchController` 会使用存储在其 `searchResultsUpdater`\
  \ 属性中的对象来更新搜索结果。如前所述，我们将在 `SearchResultsController` 类中处理搜索，这就是为什么我们需要让它遵守 `UISearchResultsUpdating`\
  \ 协议。\n\n这就是我们在主视图控制器中需要做的所有事情，以添加搜索栏并显示搜索结果。接下来，我们需要回到 `SearchResultsController.swift`，在那里有两个任务需要完成——添加实现搜索的代码以及为嵌入式表格视图添加\
  \ `UITableDataSource` 方法。\n\n让我们从搜索的代码开始。当用户在搜索栏中输入时，`UISearchController` 会调用其搜索结果更新器的\
  \ `updateSearchResultsForSearchController()` 方法，该方法就是我们的 `SearchResultsController`。在此方法中，我们需要从搜索栏获取搜索文本，并用它来构建\
  \ `filteredNames` 数组中的过滤名称列表。我们还将使用作用域按钮来限制搜索中包含的名称。在 `SearchResultsController.swift`\
  \ 顶部添加以下常量定义：\n\n```swift\nclass SearchResultsController: UITableViewController,\
  \ UISearchResultsUpdating {\n    private static let longNameSize = 6\n    private\
  \ static let shortNamesButtonIndex = 1\n    private static let longNamesButtonIndex\
  \ = 2\n```\n\n现在，将清单 8-13 中的代码添加到文件末尾。\n\n```swift\n    // MARK: UISearchResultsUpdating\
  \ 符合性\n    func updateSearchResults(for searchController: UISearchController) {\n\
  \        if let searchString = searchController.searchBar.text {\n            let\
  \ buttonIndex = searchController.searchBar.selectedScopeButtonIndex\n          \
  \  filteredNames.removeAll(keepingCapacity: true)\n            if !searchString.isEmpty\
  \ {\n                let filter: (String) -> Bool = { name in\n                \
  \    // 根据所选作用域按钮过滤长或短名称\n                    let nameLength = name.characters.count\n\
  \                    if (buttonIndex == SearchResultsController.shortNamesButtonIndex\n\
  \                        && nameLength >= SearchResultsController.longNameSize)\n\
  \                        || (buttonIndex == SearchResultsController.longNamesButtonIndex\n\
  \                        && nameLength < SearchResultsController.longNameSize) {\n\
  \                        return false\n                    }\n                 \
  \   let range = name.range(of: searchString, options: NSString.CompareOptions.caseInsensitive,\
  \ range: nil, locale: nil)\n                    //                    let range\
  \ = name.rangeOfString(searchString ,\n                    //                  \
  \                             options: NSString.CompareOptions.CaseInsensitiveSearch)\n\
  \                    return range != nil\n                }\n                for\
  \ key in keys {\n                    let namesForKey = names[key]!\n           \
  \         let matches = namesForKey.filter(filter)\n                    filteredNames\
  \ += matches\n                }\n            }\n        }\n        tableView.reloadData()\n\
  \    }\n}\n清单 8-13.\n我们的搜索结果代码\n```\n\n让我们逐段分析这段代码，看看它在做什么。首先，我们从搜索栏获取搜索字符串和所选作用域按钮的索引，然后清空过滤后的名称列表。我们仅在文本控件返回字符串时进行搜索；理论上，文本可能为\
  \ `nil`，因此我们将其余代码包裹在 `if let` 结构中：\n\n```swift\nif let searchString = searchController.searchBar.text\
  \ {\n    let buttonIndex = searchController.searchBar.selectedScopeButtonIndex\n\
  \    filteredNames.removeAll(keepingCapacity: true)\n```\n\n接下来，我们检查搜索字符串是否不为空——对于空搜索字符串，我们不显示任何匹配结果：\n\
  \n```swift\nif !searchString.isEmpty {\n```\n\n现在，我们定义一个闭包，用于将名称与搜索字符串进行匹配。该闭包将为\
  \ `names` 字典中的每个名称调用，接受一个名称（作为字符串），如果名称匹配则返回 `true`，不匹配则返回 `false`。我们首先检查名称长度是否与所选作用域按钮一致，如果不一致则返回\
  \ `false`：\n\n```swift\nlet filter: (String) -> Bool = { name in\n    // 根据所选作用域按钮过滤长或短名称\n\
  \    let nameLength = name.characters.count\n    if (buttonIndex == SearchResultsController.shortNamesButtonIndex\n\
  \        && nameLength >= SearchResultsController.longNameSize)\n        || (buttonIndex\
  \ == SearchResultsController.longNamesButtonIndex\n        && nameLength < SearchResultsController.longNameSize)\
  \ {\n        return false\n    }\n```\n\n如果名称通过了此测试，我们就在名称中查找搜索字符串作为子字符串。如果找到，则说明匹配：\n\
  \n```swift\n    let range = name.range(of: searchString, options:\n        NSString.CompareOptions.caseInsensitive,\n\
  \        range: nil, locale: nil)\n    return range != nil\n}\n```\n\n以上就是闭包中处理名称搜索所需的全部代码。接下来，我们遍历\
  \ `names` 字典中的所有键，每个键对应一个名称数组（例如键 A 映射到以字母 A 开头的名称，依此类推）。对于每个键，我们获取其名称数组，并使用闭包进行过滤。这样我们就得到了一个（可能为空的）匹配名称的过滤数组，并将其添加到\
  \ `filteredNames` 数组中：\n\n```swift\nfor key in keys {\n    let namesForKey = names[key]!\n\
  \    let matches = namesForKey.filter(filter)\n    filteredNames += matches\n}\n\
  ```\n\n在这段代码中，`namesForKey` 的类型为 `[String]`，包含与我们正在处理的键值对应的名称。我们使用 `Array` 的 `filter()`\
  \ 方法将闭包应用于 `namesToKey` 中的每个元素。结果是另一个仅包含匹配过滤条件的元素的数组——即仅包含与搜索文本和所选作用域按钮匹配的名称，然后将其添加到\
  \ `filteredNames` 中。\n\n\n一旦所有名称数组处理完毕，我们便获得了`filteredNames`数组中的完整匹配名称集。现在需要做的就是将它们显示在`SearchResultsController`的表格中。首先，告知表格需要重新显示其内容：\n\
  \n```\ntableView.reloadData()\n```\n\n我们需要表格视图在每一行显示`filteredNames`数组中的一个名称。为此，我们在`SearchResultsController`类中实现`UITableViewDataSource`协议的方法。回顾一下，`SearchResultsController`是`UITableViewController`的子类，因此它会自动充当其表格的数据源。将清单\
  \ 8-14 中的代码添加到`SearchResultsController.swift`中，位于`updateSearchResults`方法之上。\n\n\
  ```\n// MARK: Table View Data Source Methods\noverride func tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n    return filteredNames.count\n\
  }\n\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\n    let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ sectionsTableIdentifier)\n    cell!.textLabel?.text = filteredNames[indexPath.row]\n\
  \    return cell!\n}\n```\n*清单 8-14 我们的表格视图数据源方法*\n\n你现在可以运行应用程序并尝试过滤名称列表，如图 8-37\
  \ 所示。\n\n![A329781_3_En_8_Fig37_HTML.jpg](img/A329781_3_En_8_Fig37_HTML.jpg)\n\n\
  *图 8-37 添加了搜索栏的表格应用程序*\n\n### 视图调试\n\n`UISearchController`类在我们上一个示例中的两个表格之间切换做得很好——好到你可能很难相信这里竟然有切换发生。除了你已经看到的所有代码之外，还有几个视觉线索——搜索表格是普通表格，所以你不会看到像主表格中那样分组的名称。它也没有节索引。如果你想要更多证据，可以使用\
  \ Xcode 的一个巧妙功能：视图调试。它允许你拍摄运行中应用程序的视图层级快照，并在 Xcode 编辑器区域中检查它们。此功能在模拟器和真实设备上都可以使用。当你试图找出为什么某个视图似乎缺失或不在预期位置时，你可能会发现它非常有用。\n\
  \n让我们先来看看，当应用程序显示完整名称列表时，视图调试对我们应用程序的呈现。再次运行应用程序，在 Xcode 菜单栏中选择 **Debug** ➤ **View\
  \ Debugging** ➤ **Capture View Hierarchy**。Xcode 从模拟器或设备中获取视图层级并显示出来，如图 8-38 所示。\n\
  \n![A329781_3_En_8_Fig38_HTML.jpg](img/A329781_3_En_8_Fig38_HTML.jpg)\n\n*图 8-38\
  \ Sections 应用程序的视图层级*\n\n这看起来可能没什么用——我们看到的并不比在模拟器中多多少。要揭示视图层级，你需要旋转应用程序的图像，以便从侧面观察。为此，在编辑器区域中，在捕获图像左侧附近的位置点击鼠标，然后向右拖动。随着拖动，应用程序中的视图分层将显现出来。如果你旋转大约\
  \ 45 度，你会看到类似图 8-39 的效果。\n\n![A329781_3_En_8_Fig39_HTML.jpg](img/A329781_3_En_8_Fig39_HTML.jpg)\n\
  \n*图 8-39 检查应用程序的视图层级*\n\n如果你点击堆栈中的各个视图，你会看到顶部的跳转栏会发生变化，显示你点击的视图的类名及其所有祖先视图的类名。从后到前依次点击每个视图，以熟悉表格的构建方式。你应该能够找到视图控制器的主视图、表格视图本身、一些表格视图单元格、搜索栏、搜索栏索引，以及作为表格实现一部分的其他各种视图。\n\
  \n现在让我们看看在搜索过程中视图层级是什么样子。Xcode 会暂停你的应用程序以便你检查视图快照，所以首先通过点击 **Debug** ➤ **Continue**\
  \ 恢复执行。现在开始在应用程序的搜索栏中键入内容，并再次使用 **Debug** ➤ **View Debugging** ➤ **Capture View\
  \ Hierarchy** 捕获视图层级。当视图层级出现时，稍微旋转一下，你会看到类似于图 8-40 所示的内容。\n\n![A329781_3_En_8_Fig40_HTML.jpg](img/A329781_3_En_8_Fig40_HTML.jpg)\n\
  \n*图 8-40 搜索“Zoe”时的视图层级*\n\n现在非常清楚，确实有两个表格在使用。你可以看到位于视图堆栈底部的原始表格，而在其上方（即右侧），你可以看到属于搜索结果视图控制器的表格视图。就在那后面，有一层半透明的灰色视图覆盖在原始表格上——这是当你开始在搜索栏中键入时使原始表格变暗的视图。\n\
  \n可以稍微尝试一下编辑器区域底部的按钮——你可以使用它们打开或关闭自动布局约束的显示、将视图重置为之前显示的俯视图、以及放大和缩小。你还可以使用左侧的滑块更改视图之间的间距，并使用右侧的滑块移除层级顶部或底部的图层，以便看到它们后面的内容。视图调试是一个非常强大的工具。\n\
  \n## 总结\n\n这一章内容相当丰富，你学到了很多。你应该对平面表格的工作方式有了非常扎实的理解。你应该知道如何自定义表格和表格视图单元格，以及如何配置表格视图。你还了解了如何实现搜索栏，这是任何呈现大量数据的\
  \ iOS 应用程序中的关键工具。最后，你遇到了视图调试，这是 Xcode 一个非常有用的功能。请确保你完全理解我们在本章中做的所有事情，因为我们将在其基础上继续构建。\n\
  \n我们将在下一章继续研究表格视图。例如，你将学习如何使用它们来呈现分层数据。你还将看到如何创建内容视图，允许用户编辑在表格视图中选择的数据，以及如何在表格中呈现检查列表、在表格行中嵌入控件和删除行。\n\
  \n"
- "# 9. 向表格视图添加导航控制器\n\n在上一章中，我们学习了使用表格视图的基础知识。在本章中，我们将通过添加导航控制器来更进一步。\n\n表格视图和导航控制器协同工作，但严格来说，导航控制器并不需要表格视图才能运行。然而，在实际应用中，使用导航控制器时，通常至少会包含一个或多个表格，因为导航控制器的强大之处在于它能够轻松处理复杂的分层数据。在\
  \ iPhone 的小屏幕上，分层数据最好通过一系列表格视图来呈现。\n\n在本章中，我们将像在第 7 章中构建`Pickers`应用程序一样，逐步构建一个应用程序。当基本的导航控制器和根视图控制器工作正常后，我们将开始向层级中添加更多的控制器和层。我们创建的每个视图控制器都会强化表格使用或配置的某个方面：\n\
  \n*   如何从表格视图向下钻取到子表格视图\n*   如何从表格视图向下钻取到内容视图，在其中可以查看甚至编辑详细数据\n*   如何在表格视图中使用多个分区\n\
  *   如何使用编辑模式允许从表格视图中删除行\n*   如何使用编辑模式让用户重新排列表格视图中的行\n\n\n\n## 导航控制器基础\n\n构建层级化应用的主要工具\
  \ `UINavigationController`，其功能与 `UITabBarController` 类似，都用于管理并切换多个内容视图。两者主要区别在于：`UINavigationController`\
  \ 的子视图控制器以栈的形式组织，因此非常适合处理层级结构。\n\n如果你有软件开发经验且理解栈的概念，可以跳过下一节或快速浏览。但如果你是栈的新手，请继续阅读。幸运的是，栈是一个很容易理解的概念。\n\
  \n### 栈\n\n栈是一种常用的数据结构，遵循\"后进先出\"的原则。普通的 Pez 糖果盒（见图 9-1）就是栈的绝佳例子。你试过装填它吗？根据每个 Pez\
  \ 糖果盒附带的小说明书，只需几个简单步骤：首先，拆开 Pez 糖果包装；其次，将糖果盒头部向后仰以打开它；第三，拿起糖果柱，用食指和拇指紧紧捏住，将其插入打开的糖果盒中。\n\
  \n![A329781_3_En_9_Fig1_HTML.jpg](img/A329781_3_En_9_Fig1_HTML.jpg)\n\n图 9-1. Pez\
  \ 糖果盒体现了栈的简单实现\n\n还记得我们说过栈是后进先出吗？这也意味着先进后出。你第一个推入糖果盒的糖果将是最后一个弹出的。你最后一个推入的糖果则是第一个弹出的。计算机中的栈遵循相同规则：\n\
  \n- 向栈中添加对象称为\"压入\"（push）。你将一个对象压入栈中。\n- 压入栈的第一个对象称为栈底。\n- 最近压入栈的对象称为栈顶（在它被下一个压入的对象替换之前）。\n\
  - 从栈中移除对象称为\"弹出\"（pop）。当你从栈中弹出一个对象时，它总是最后压入的那个。反之，第一个压入栈的对象将总是最后一个被弹出的。\n\n### 控制器栈\n\
  \n导航控制器维护着一个视图控制器栈。设计控制器时，必须指定用户最先看到的视图。如前所述，该视图的控制器称为根视图控制器（简称根控制器），它成为导航控制器栈的栈底。当用户选择显示新视图时，另一个控制器会被压入栈中，其视图随即出现。我们将这些新视图控制器称为子控制器。在本章的\
  \ Fonts 应用中，就包含一个导航控制器和多个子控制器。\n\n在图 9-2 中，请注意导航栏居中显示的标题以及左侧的后退按钮。导航栏的标题会填充导航控制器栈中顶层视图控制器的\
  \ `title` 属性，而后退按钮的标题则显示上一个视图控制器的名称。后退按钮的功能类似于网页浏览器的后退按钮。当用户点击该按钮时，当前视图控制器会从栈中弹出，上一个视图变为当前视图。\n\
  \n![A329781_3_En_9_Fig2_HTML.jpg](img/A329781_3_En_9_Fig2_HTML.jpg)\n\n图 9-2. \"\
  设置\"应用使用了导航控制器。左上角的后退按钮将当前视图控制器从栈中弹出，返回上一层级。同时显示当前内容视图控制器的标题\n\n这种设计模式使我们能够迭代式地构建复杂的层级化应用，无需了解整个结构即可让一切正常运行。每个控制器只需知道其子控制器，这样当用户做出选择时，它就能将相应的新控制器对象压入栈中。通过这种方式，我们可以用许多小块构建大型应用，这正是本章将要实践的内容。\n\
  \n导航控制器是许多 iPhone 应用的核心；然而，对于 iPad 应用，导航控制器的角色则相对次要。Mail 应用就是一个典型例子，它使用层级化导航控制器让用户在各邮件服务器、文件夹和邮件之间导航。在\
  \ iPad 版的 Mail 中，导航控制器从不占据全屏，而是以侧边栏或覆盖主视图部分的临时视图形式出现。我们将在第 11 章中探讨这一点。\n\n## 字体：一个简单的字体浏览器\n\
  \n我们将构建的应用展示了与显示层级数据相关的大多数常见任务。应用启动后，会呈现一个包含 iOS 所有字体家族的列表，如图 9-3 所示。字体家族将紧密相关的字体（即彼此风格变体的字体，如\
  \ Helvetica、Helvetica-Bold、Helvetica-Oblique 等所有包含在 Helvetica 字体家族中的变体）归为一组。\n\n\
  ![A329781_3_En_9_Fig3_HTML.jpg](img/A329781_3_En_9_Fig3_HTML.jpg)\n\n图 9-3. 在我们的项目中，根视图控制器在每行右侧显示辅助图标。这种特定类型的辅助图标称为\"\
  展开指示符\"，提示用户触摸该行会深入到另一个视图\n\n选择此顶层视图中的任意行，都会将一个新的视图控制器压入导航控制器的栈中。每行最右侧的小图标称为辅助图标。这个特定的辅助图标（灰色箭头）显示一个展开指示符，让用户知道触摸该行会深入到另一个视图。\n\
  \n### 字体应用的子控制器\n\n在正式开始本章项目之前，让我们先了解将要使用的各个子控制器。\n\n#### 字体列表控制器\n\n触摸图 9-3 所示表格中的任意行，都会弹出图\
  \ 9-4 所示的子视图。\n\n![A329781_3_En_9_Fig4_HTML.jpg](img/A329781_3_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 字体应用的第一个子控制器实现了一个表格，其中每行包含一个详细展开按钮\n\n图 9-4 中每行右侧的辅助图标称为\"详细展开\"，其功能与我们之前看到的箭头不同。与展开指示符不同，详细展开按钮不仅提供图标，还作为一个用户可以独立点击的控件。这意味着你可以为某一行提供两个不同选项：一个操作在用户选中该行时触发，另一个在用户点击图标时触发。点击此辅助图标内的小信息按钮，应允许用户查看（或许还能编辑）当前行的更详细信息。同时，向右的箭头应提示用户，点击行的其他区域可以找到更深层的导航。\n\
  \n#### 字体大小视图控制器\n\n触摸图 9-4 所示表格中的任意行，都会弹出图 9-5 所示的子视图。\n\n![A329781_3_En_9_Fig5_HTML.jpg](img/A329781_3_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 字体大小视图控制器位于字体列表视图控制器下一层，每行以不同大小显示所选字体\n\n\n\n#### 使用披露指示器和详细信息披露按钮\n\n\
  以下是一些何时使用这些按钮的指南：\n\n-   若要为某行点击提供单一选择，如果点击该行只会跳转到更详细的视图，则不要使用附件图标。\n-   如果点击某行会跳转到一个列出更多项目（而非详细视图）的新视图，请用披露指示器（右箭头）标记该行。\n\
  -   若要为某行提供两个选择，请用详细信息披露指示器或详细信息按钮标记该行。这允许用户点击该行以进入新视图，或点击披露按钮以获取更多详细信息。\n\n####\
  \ 字体信息视图控制器\n\n我们的最后一个应用子控制器——也是唯一一个不是表格视图的控制器——会出现在（见图 9-6），当你在图 9-2 所示的字体列表视图控制器中点击任一行的信息图标时。\n\
  \n![A329781_3_En_9_Fig6_HTML.jpg](img/A329781_3_En_9_Fig6_HTML.jpg)\n\n**图 9-6.**\
  \ 字体应用中的最后一个视图控制器允许你以任意尺寸查看所选字体。\n\n此视图允许用户拖动滑块来调整所显示字体的大小。它还包含一个开关，允许用户指定此字体是否应列入用户的收藏夹。如果有任何字体被设为收藏，它们会出现在根视图控制器的一个单独分组中。\n\
  \n### 字体应用的骨架\n\nXcode 提供了一个非常合适的模板来创建基于导航的应用，当你需要创建层级应用时，很可能大部分时间都会用到它。不过，我们今天不打算使用那个模板。相反，我们将从头构建我们的基于导航的应用，以便我们了解所有组件是如何组合在一起的。我们还将一步步地构建，这样应该很容易跟上。\n\
  \n在 Xcode 中，按 ⌘⇧N 来创建一个新项目。从 iOS 模板列表中选择“单视图应用”，然后点击“下一步”继续。将产品名称设为 `Fonts`，语言设为\
  \ `Swift`，设备选择 `Universal`。确保未勾选“使用 Core Data”，点击“下一步”，并选择保存项目的位置。\n\n#### 设置导航控制器\n\
  \n我们现在将为我们的应用创建基本的导航结构。其核心将是一个 `UINavigationController`，用于管理用户可以在其间导航的视图控制器栈，以及一个显示我们将要展示的顶层列表行的\
  \ `UITableViewController`。事实证明，使用 Interface Builder 很容易创建这些。\n\n选择 `Main.storyboard`。该模板已经为我们创建了一个基本的视图控制器，但我们需要改用\
  \ `UINavigationController`，因此在编辑器区域或文档大纲中选择该视图控制器，并将其删除，使故事板保持空白。现在，使用对象库搜索 `UINavigationController`，并将一个实例拖入编辑区域。你会看到实际上得到了两个场景，而不是一个，类似于你在第\
  \ 7 章创建标签视图控制器时看到的情况。左侧是 `UINavigationController` 本身。选择此控制器，打开属性检查器，并在视图控制器部分勾选“初始视图控制器”，使其成为应用启动时显示的控制器。\n\
  \n`UINavigationController` 连接到了第二个场景，其中包含一个 `UITableViewController`。你会看到该表格的标题是\
  \ `Root View Controller`。点击文档大纲中的 `Root View Controller` 图标（位于表格视图下方的那一个，不是上方那一个），打开属性检查器，然后将标题设置为\
  \ `Fonts`。如果你在故事板中没有看到标题变化，说明你选错了 `Root View Controller` 图标。\n\n通过这种方式设置，我们得到了由导航控制器创建的视图，这是一个组合视图，包含两部分内容：屏幕顶部的导航栏（通常包含某种标题，左侧常有一个某种类型的返回按钮），以及导航控制器当前视图控制器想要显示的内容。在我们的例子中，显示区域的下半部分将由与导航控制器一起创建的表格视图填充。\n\
  \n我们将在后续内容中进一步了解如何控制导航控制器在导航栏中显示的内容。你也会理解导航控制器如何将焦点从一个下级视图控制器转移到另一个。现在，我们已经打下了足够的基础，可以开始定义我们自定义视图控制器将要做的事情了。\n\
  \n至此，应用骨架基本完成。你会看到一个关于为原型表格单元格设置复用标识符的警告，但我们现在可以忽略它。保存所有文件，然后构建并运行应用。如果一切顺利，应用应该会启动，并显示一个标题为\
  \ `Fonts` 的导航栏。你尚未给表格视图任何关于显示内容的信息，因此此时不会显示任何行，如图 9-7 所示。\n\n![A329781_3_En_9_Fig7_HTML.jpg](img/A329781_3_En_9_Fig7_HTML.jpg)\n\
  \n**图 9-7.** 不含任何数据的应用骨架。\n\n\n\n## 追踪喜爱的字体\n\n在本应用的几个地方，我们将让用户维护一个喜爱字体列表：允许他们添加所选字体、查看已选字体的完整列表，以及从列表中移除字体。为了以一致的方式管理这个列表，我们将创建一个新类来持有喜爱字体数组，并将其存储在用户对此应用的偏好设置中。你将在第\
  \ 12 章了解更多关于用户偏好的内容，但这里我们只涉及一些基础知识。\n\n首先创建一个新类。在项目导航栏中选择`Fonts`文件夹，然后按下⌘N 调出新建文件助手。从\
  \ iOS Source 部分选择`Swift File`，然后点击 Next。在接下来的界面中，将新文件命名为`FavoritesList.swift`，然后点击\
  \ Create。在项目导航栏中选择这个新文件，并添加代码清单 9-1 中所示的内容。\n\n```\nimport Foundation\nimport UIKit\n\
  class FavoritesList {\nstatic let sharedFavoritesList = FavoritesList()\nprivate(set)\
  \ var favorites:[String]\ninit() {\nlet defaults = UserDefaults.standard\nlet storedFavorites\
  \ = defaults.object(forKey: \"favorites\") as? [String]\nfavorites = storedFavorites\
  \ != nil ? storedFavorites! : []\n}\nfunc addFavorite(fontName: String) {\nif !favorites.contains(fontName)\
  \ {\nfavorites.append(fontName)\nsaveFavorites()\n}\n}\nfunc removeFavorite(fontName:\
  \ String) {\nif let index = favorites.index(of: fontName) {\nfavorites.remove(at:\
  \ index)\nsaveFavorites()\n}\n}\nprivate func saveFavorites() {\nlet defaults =\
  \ UserDefaults.standard\ndefaults.set(favorites, forKey: \"favorites\")\ndefaults.synchronize()\n\
  }\n}\n代码清单 9-1.\n我们的 FavoritesList 类文件\n```\n\n在上述代码片段中，我们声明了新类的 API。首先，我们声明了一个名为`sharedFavoritesList`的类属性，它返回该类的一个实例。无论这个方法被调用多少次，总会返回同一个实例。其设计理念是让`FavoritesList`以单例模式工作——我们不使用多个实例，而是在整个应用中只使用一个实例。\n\
  \n接下来，我们声明了一个属性来存放喜爱字体的名称。请密切关注这个数组的定义：\n\n```\nprivate(set) var favorites:[String]\n\
  ```\n\n`private(set)`限定符意味着该数组可以被类外部的代码读取，但只有类实现中的代码才能修改它。这正是我们想要的，因为我们需要该类的用户能够读取喜爱列表：\n\
  \n```\nlet favorites = FavoritesList.sharedFavoritesList.favorites  // 读取访问是允许的\n\
  ```\n\n但我们不希望以下两种操作被允许：\n\n```\nFavoritesList.sharedFavoritesList.favorites = []\
  \    // 不允许\nFavoritesList.sharedFavoritesList.favorites.append(\"Comic Sans MS\"\
  )    // 不允许\n```\n\n类的初始化方法负责设置`favorites`数组的初始内容：\n\n```\ninit() {\nlet defaults\
  \ = UserDefaults.standard\nlet storedFavorites = defaults.object(forKey: \"favorites\"\
  ) as? [String]\nfavorites = storedFavorites != nil ? storedFavorites! : []\n}\n\
  ```\n\n稍后你将看到，每当我们向此数组添加或移除内容时，都会将其内容保存到应用的用户默认设置中（第 12 章将详细讨论），以便应用重启后列表内容得以保留。在初始化方法中，我们检查是否有存储的喜爱列表，如果有，则用它来初始化`favorites`属性；如果没有，则直接将其设为空。\n\
  \n其余三个方法处理对`favorites`数组的添加和移除操作。其实现在这里无需过多解释。请注意，前两个方法都调用了`saveFavorites()`，该方法将更新后的值保存到用户默认设置中，使用的键（`favorites`）与初始化方法读取时使用的键相同。你将在第\
  \ 12 章了解更多关于其工作原理的内容；但现在，只需知道我们在这里使用的`UserDefaults (NSUserDefaults)`对象就像一种持久化的字典，我们放入其中的任何内容，下次查询时都会可用，即使应用已经停止并重启过。\n\
  \n**注意**\n\n在 Xcode 8 中，Apple 使许多以前的 NS- 对象在 Swift 中更易用；例如 `NSUserDefaults` 现在变成了\
  \ `UserDefaults`。\n\n\n\n### 创建根视图控制器\n\n现在让我们开始开发第一个视图控制器。在上一章中，我们使用简单的字符串数组来填充表格行。这里我们将采用类似的做法，但这次会使用\
  \ `UIFont` 类来获取字体家族列表，然后用这些字体家族的名称填充每一行。我们还将使用字体本身来显示字体名称，这样每一行都能包含该字体家族的一个小预览。\n\
  \n是时候为这个应用创建第一个控制器类了。模板为我们创建了一个视图控制器，但其名称 `ViewController` 并不实用，因为这个应用中将包含多个视图控制器。因此，首先在项目导航器中选择\
  \ `ViewController.swift`，按 Delete 键将其删除并移入废纸篓。接着，在项目导航器中选择 `Fonts` 文件夹，按 ⌘N 调出新文件助手。在\
  \ iOS 来源部分选择 Cocoa Touch Class，然后点击 Next。在下一个界面中，将新类命名为 `RootViewController`，并在子类（Subclass\
  \ of）中输入 `UITableViewController`。点击 Next，然后点击 Create 创建新类。在项目导航器中，选择 `RootViewController.swift`，并添加以下代码片段中的粗体行，以添加几个属性：\n\
  \n```swift\nclass RootViewController: UITableViewController {\n    private var familyNames:\
  \ [String]!\n    private var cellPointSize: CGFloat!\n    private var favoritesList:\
  \ FavoritesList!\n    private static let familyCell = \"FamilyName\"\n    private\
  \ static let favoritesCell = \"Favorites\"\n}\n```\n\n我们将在开始时为前三个属性赋值，然后在该类使用过程中在不同时机调用它们。`familyNames`\
  \ 数组将包含我们要显示的所有字体家族列表；`cellPointSize` 属性将包含我们希望在所有表格视图单元格中使用的字体大小；`favoritesList`\
  \ 将包含指向 `FavoritesList` 单例的指针。最后两个是常量，代表该控制器中表格视图单元格的标识符。\n\n通过将如代码清单 9-2 所示的粗体代码添加到\
  \ `viewDidLoad()` 中，来设置该类所有属性：\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    familyNames = (UIFont.familyNames() as [String]).sorted()\n    let preferredTableViewFont\
  \ =\n        UIFont.preferredFont(forTextStyle: UIFontTextStyleHeadline)\n    cellPointSize\
  \ = preferredTableViewFont.pointSize\n    favoritesList = FavoritesList.sharedFavoritesList\n\
  \    tableView.estimatedRowHeight = cellPointSize\n}\n```\n\n代码清单 9-2. `RootViewController.swift`\
  \ 文件中的 `viewDidLoad` 方法\n\n在代码清单 9-2 中，我们通过向 `UIFont` 类查询所有已知字体家族并排序结果数组来填充 `familyNames`。随后再次使用\
  \ `UIFont` 获取用于标题的首选字体。这里我们使用了 iOS 7 新增的功能，该功能采用用户可在“设置”应用中配置的字体大小设置。这种动态字体大小允许用户为系统范围的使用设置整体字体缩放比例。在此，我们使用该字体的\
  \ `pointSize` 属性来建立一个基准字体大小，该基准将用于此视图控制器的其他部分。最后，我们获取了收藏列表的单例对象，并设置了表格视图的 `estimatedRowHeight`\
  \ 属性，以大致指示表格行的高度。事实证明，只要设置了此属性，并将表格视图的 `rowHeight` 属性保留为其默认值 `UITableViewAutomaticDimension`，同时使用默认的表格视图单元格（或使用自动布局构建自定义表格视图单元格），表格就会根据单元格内容计算出每个单元格的正确大小。\n\
  \n在继续之前，让我们删除 `didReceiveMemoryWarning()` 方法，以及模板提供的所有表格视图委托或数据源方法——在该类中我们不会使用它们。\n\
  \n此视图控制器的设计思想是显示两个分区。第一个分区是所有可用字体家族的列表，每个家族都链接到该家族所有字体的列表。第二个分区用于收藏，仅包含一个条目，该条目将用户引导至其收藏字体的列表。但是，如果用户没有收藏（例如，首次启动应用时），我们宁愿完全不显示第二个分区，因为它只会将用户导向一个空列表。因此，我们需要在此类的剩余部分中做几件事来应对这种可能性。首先实现此方法，该方法在根视图控制器的视图显示在屏幕之前被调用：\n\
  \n```swift\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    tableView.reloadData()\n}\n```\n\n这样做的原因是，我们显示的内容集合可能在不同视图显示之间发生变化。例如，用户可能初始没有收藏，然后深入探索、查看某个字体并将其设为收藏，之后再返回根视图。此时，我们需要重新加载表格视图，以便第二个分区能够显示出来。\n\
  \n接下来，我们将实现一个在该类内部使用的实用方法。在通过数据源方法配置表格视图的几个环节中，我们需要能够确定要在单元格中显示哪个字体。我们将此功能放入一个独立的方法中，如代码清单\
  \ 9-3 所示。\n\n```swift\nfunc fontForDisplay(atIndexPath indexPath: NSIndexPath) ->\
  \ UIFont? {\n    if indexPath.section == 0 {\n        let familyName = familyNames[indexPath.row]\n\
  \        let fontName = UIFont.fontNames(forFamilyName: familyName).first\n    \
  \    return fontName != nil ?\n            UIFont(name: fontName!, size: cellPointSize)\
  \ : nil\n    } else {\n        return nil\n    }\n}\n```\n\n代码清单 9-3. 确定要显示的字体\n\
  \n此方法使用 `UIFont` 类查找指定字体家族的所有字体名称，然后获取该家族中的第一个字体名称。我们并不确定家族中第一个命名的字体是否最能代表整个家族，但这与其他猜测同样合理。如果该家族没有字体名称，则返回\
  \ `nil`。\n\n现在，让我们进入该视图控制器的核心代码：表格视图数据源方法。首先，来看分区的数量：\n\n```swift\noverride func\
  \ numberOfSections(in tableView: UITableView) -> Int {\n    return favoritesList.favorites.isEmpty\
  \ ? 1 : 2\n}\n```\n\n我们根据收藏列表来决定是否显示第二个分区。接下来，处理每个分区中的行数：\n\n```swift\noverride\
  \ func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->\
  \ Int {\n    // 返回分区中的行数。\n    return section == 0 ? familyNames.count : 1\n}\n\
  ```\n\n这也非常简单。我们只需根据分区编号来确定该分区是显示所有字体家族，还是显示一个指向收藏列表的链接单元格。现在我们再定义另一个方法，这是 `UITableViewDataSource`\
  \ 协议中的一个可选方法，用于指定每个分区的标题：\n\n```swift\noverride func tableView(_ tableView: UITableView,\
  \ titleForHeaderInSection section: Int) -> String? {\n    return section == 0 ?\
  \ \"所有字体家族\" : \"我的收藏字体\"\n}\n```\n\n这同样是一个直接的方法。它根据分区编号来确定使用哪个标题。每个表格视图数据源都必须实现的最后一个核心方法是配置每个单元格的方法，我们的实现如代码清单\
  \ 9-4 所示。\n\n\n\n```swift\noverride func tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\n    if indexPath.section == 0 {\n\
  \        // 字体名称列表\n        let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ RootViewController.familyCell, for: indexPath)\n        cell.textLabel?.font =\
  \ fontForDisplay(atIndexPath: indexPath)\n        cell.textLabel?.text = familyNames[indexPath.row]\n\
  \        cell.detailTextLabel?.text = familyNames[indexPath.row]\n        return\
  \ cell\n    } else {\n        // 收藏列表\n        return tableView.dequeueReusableCell(withIdentifier:\
  \ RootViewController.favoritesCell, for: indexPath)\n    }\n}\n```\n\n**列表 9-4.**\
  \ `cellForRow(atIndexPath:)` 函数\n\n创建这个类时，我们定义了两个不同的单元格标识符，用于从故事板加载两种不同的单元格原型（就像第\
  \ 8 章中从 nib 文件加载表格单元格一样）。我们还没有配置这些单元格原型，但很快就会配置。接下来，我们使用分区编号来决定当前 `indexPath` 应显示哪个单元格。如果单元格用于显示字体系列名称，则将系列名称同时放入\
  \ `textLabel` 和 `detailTextLabel`。我们还使用该系列中的一种字体（来自之前添加的 `fontForDisplay(atIndexPath:)`\
  \ 方法返回的字体）设置在文本标签中，这样字体系列名称会以字体本身显示，同时用标准系统字体显示较小的版本。\n\n### 初始故事板设置\n\n现在我们已经有一个应该能显示内容的视图控制器，接下来配置故事板使其生效。在项目导航器中选择\
  \ `Main.storyboard`。你会看到之前添加的导航控制器和表格视图控制器。首先需要配置的是表格视图控制器。默认情况下，控制器的类设置为 `UITableViewController`。我们需要将其改为根视图控制器类。在文档大纲的字体场景中，选择标有“字体”的黄色图标，然后使用身份检查器将视图控制器的类改为\
  \ `RootViewController`。\n\n现在需要做的其他配置是设置一对原型单元格，使其与代码中使用的单元格标识符匹配。起初，表格视图只有一个原型单元格。选中它并按\
  \ ⌘D 复制，你会看到现在有两个单元格。选择第一个，然后使用属性检查器将其样式设置为副标题（Subtitle），标识符设置为 `FamilyName`，辅助功能设置为披露指示器（Disclosure\
  \ Indicator）。接下来，选择第二个原型单元格，将其样式设置为基本（Basic），标识符设置为 `Favorites`，辅助功能设置为披露指示器。另外，双击单元格中显示的标题，将文本从“标题”改为“收藏”。\n\
  \n**提示：** 本示例中使用的原型单元格都是标准表格视图单元格样式。如果将样式设置为自定义（Custom），可以直接在单元格原型中设计单元格布局，就像第 8\
  \ 章在 nib 文件中创建单元格时那样。\n\n现在构建并运行这个应用，你应该会看到一个漂亮的字体列表。稍微滚动一下，你会发现并非所有字体生成的文本高度都相同，如图\
  \ 9-8 所示。所有单元格的高度都足够容纳其内容。如果你忘记为什么这样会起作用，请回顾本节前面我们添加到 `viewDidLoad()` 方法中的代码讨论。\n\
  \n![A329781_3_En_9_Fig8_HTML.jpg](img/A329781_3_En_9_Fig8_HTML.jpg)\n\n**图 9-8.**\
  \ 根视图控制器显示已安装的字体系列\n\n### 第一个子控制器：字体列表视图\n\n我们的应用目前只显示字体系列列表，没有更多功能。我们希望用户能够点击某个字体系列，查看其中包含的所有字体。因此，让我们创建一个新的视图控制器来管理字体列表。创建一个名为\
  \ `FontListViewController` 的新 Cocoa Touch 类，作为 `UITableViewController` 的子类。在项目导航器中，选择\
  \ `FontListViewController.swift`，并添加以下属性：\n\n```swift\nclass FontListViewController:\
  \ UITableViewController {\n    var fontNames: [String] = []\n    var showsFavorites:\
  \ Bool = false\n    private var cellPointSize: CGFloat!\n    private static let\
  \ cellIdentifier = \"FontName\"\n}\n```\n\n`fontNames` 属性用于告诉此视图控制器要显示什么内容。我们还创建了一个\
  \ `showsFavorites` 属性，用于让此视图控制器知道它是否在显示收藏列表（而不是仅显示某个系列中的字体列表），这在后面会用到。我们将使用 `cellPointSize`\
  \ 属性来保存显示每种字体的首选显示尺寸，再次使用 `UIFont` 来查找首选尺寸。最后，`cellIdentifier` 是该控制器中表格视图单元格使用的标识符。\n\
  \n要初始化 `cellPointSize` 属性并设置表格视图的估算行高，请将列表 9-5 中的代码添加到 `viewDidLoad()` 方法中。\n\n\
  ```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    let preferredTableViewFont\
  \ = UIFont.preferredFont(forTextStyle: UIFontTextStyleHeadline)\n    cellPointSize\
  \ = preferredTableViewFont.pointSize\n    tableView.estimatedRowHeight = cellPointSize\n\
  }\n```\n\n**列表 9-5.** `FontListViewController.swift` 的 `viewDidLoad` 方法\n\n接下来我们要做的是创建一个小的实用方法，用于选择每行要显示的字体，类似于\
  \ `RootViewController` 中的方法。不过这里有点不同。在这个视图控制器中，我们不是保存字体系列列表，而是在 `fontNames` 属性中保存字体名称列表。我们将使用\
  \ `UIFont` 类来获取每种命名字体，如下所示：\n\n```swift\nfunc fontForDisplay(atIndexPath indexPath:\
  \ NSIndexPath) -> UIFont {\n    let fontName = fontNames[indexPath.row]\n    return\
  \ UIFont(name: fontName, size: cellPointSize)!\n}\n```\n\n现在该以 `viewWillAppear()`\
  \ 实现的形式进行一个小补充了。在 `RootViewController` 中，我们实现了这个方法，以防收藏列表发生变化需要刷新。这里同样适用。这个视图控制器可能正在显示收藏列表，用户可能会切换到另一个视图控制器，更改收藏项（我们稍后会实现），然后返回这里。此时我们需要重新加载表格视图，这个方法的代码实现了这一功能，如列表\
  \ 9-6 所示。\n\n```swift\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    if showsFavorites {\n        fontNames = FavoritesList.sharedFavoritesList.favorites\n\
  \        tableView.reloadData()\n    }\n}\n```\n\n**列表 9-6.** 在内容可能变化时刷新视图\n\n基本思路是：在正常操作中，此视图控制器在显示之前会接收到一个字体名称列表，并且在该视图控制器存在的整个过程中，该列表保持不变。在一种特定情况下（我们稍后会看到），此视图控制器需要重新加载其字体列表。\n\
  \n继续往下，我们可以完全删除 `numberOfSectionsInTableView()` 方法。这里我们只有一个分区，省略该方法就相当于实现它并返回 1。接下来，我们实现另外两个主要的数据源方法，如列表\
  \ 9-7 所示。\n\n\n\n```swift\noverride func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n    // 返回该分区中的行数。\n    return fontNames.count\n}\noverride\
  \ func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->\
  \ UITableViewCell {\n    let cell =  tableView.dequeueReusableCell(\n        withIdentifier:\
  \ FontListViewController.cellIdentifier,\n        for: indexPath)\n    cell.textLabel?.font\
  \ = fontForDisplay(atIndexPath: indexPath)\n    cell.textLabel?.text = fontNames[indexPath.row]\n\
  \    cell.detailTextLabel?.text = fontNames[indexPath.row]\n    return cell\n}\n\
  ```\n\n代码清单 9-7：我们的数据源方法\n\n这两个方法实际上都不需要任何解释，因为它们与我们在`RootViewController`中使用的方法类似，但甚至更简单。\n\
  \n稍后我们将为该类添加更多内容，但首先我们想看看它的实际效果。为此，我们需要进一步配置故事板，然后对`RootViewController`进行一些修改。切换到`Main.storyboard`开始操作。\n\
  \n## 创建字体列表故事板\n\n当前故事板包含一个表视图控制器，用于显示字体家族列表，该控制器嵌入在导航控制器内。我们需要增加一层新的层级，以融入用于显示给定家族字体的视图控制器。在对象库中找到**表视图控制器**，将其拖出一个到编辑区域中，位于现有表视图控制器的右侧。选中新的表视图控制器，并使用标识检查器将其类设置为`FontListViewController`。选中表格中的原型单元格，打开属性检查器进行一些调整。将其样式改为副标题，标识符改为`FontName`，附件改为详细信息展开。使用详细信息展开附件将使该类型的行能够响应两种点击，从而用户可以根据点击附件还是行的其他部分来触发两种不同的操作。\n\
  \n要让一个视图控制器中的用户操作实例化并显示另一个视图控制器，一种方法是创建连接两者的**segue**。这对很多人来说可能是个陌生的词，所以我们先来解释一下：segue\
  \ 本质上意味着“过渡”。它有时被作家和电影制作人用来描述从一个段落或场景平滑过渡到下一个。苹果本可以直截了当地称之为过渡；但由于这个词在 UIKit API\
  \ 中其他地方已经出现，也许苹果决定使用一个不同的术语以避免混淆。这里我还应当提一下，“segue”这个词的发音与赛格威个人交通工具产品的名称完全相同（现在你知道为什么赛格威叫这个名字了）。\n\
  \n通常，segue 完全在 Interface Builder 中创建。其思路是，一个场景中的某个动作可以触发一个 segue 来加载并显示另一个场景。如果你使用导航控制器，segue\
  \ 可以自动将下一个控制器推送到导航堆栈上。我们将立即在我们的应用程序中使用这个功能。\n\n为了让根视图控制器中的单元格能够显示字体列表视图控制器，你需要创建几个连接这两个场景的\
  \ segue。只需从字体场景中两个原型单元格中的第一个开始，按住 Control 键拖动到新场景即可完成；当你拖动到新场景上方时，整个场景会高亮显示，表示它已准备好连接，如图\
  \ 9-9 所示。\n\n![A329781_3_En_9_Fig9_HTML.jpg](img/A329781_3_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9. 从字体列表控制器到字体名称控制器创建一个显示 segue\n\n松开鼠标按钮，在弹出的菜单中的“选择 Segue”部分选择“显示”。现在对另一个原型单元格执行相同操作。创建这些\
  \ segue 意味着，一旦用户点击这些单元格中的任何一个，连接另一端的视图控制器就会被分配并准备就绪。\n\n### 让根视图控制器为 Segue 做好准备\n\
  \n保存你的更改并切换回`RootViewController.swift`。注意，我们讨论的不是最新的类`FontListViewController`，而是它的“父”控制器。你需要在这里通过准备新的`FontListViewController`（由你刚刚创建的某个\
  \ segue 指定）进行显示，并向其传递需要显示的值，来响应用户在根表视图中的触摸操作。\n\n实际准备新视图控制器的工作是通过`prepareForSegue(_:sender:)`方法完成的。添加该方法的实现，如代码清单\
  \ 9-8 所示。\n\n```swift\n// MARK: - 导航\noverride func prepare(for segue: UIStoryboardSegue,\
  \ sender: AnyObject?) {\n    // 使用 [segue destinationViewController] 获取新视图控制器。\n\
  \    // 将选中的对象传递给新视图控制器。\n    let indexPath = tableView.indexPath(for: sender as!\
  \ UITableViewCell)!\n    let listVC = segue.destinationViewController as! FontListViewController\n\
  \    if indexPath.section == 0 {\n        // 字体名称列表\n        let familyName = familyNames[indexPath.row]\n\
  \        listVC.fontNames = (UIFont.fontNames(forFamilyName: familyName) as [String]).sorted()\n\
  \        listVC.navigationItem.title = familyName\n        listVC.showsFavorites\
  \ = false\n    } else {\n        // 收藏列表\n        listVC.fontNames = favoritesList.favorites\n\
  \        listVC.navigationItem.title = \"收藏\"\n        listVC.showsFavorites = true\n\
  \    }\n}\n```\n\n代码清单 9-8：准备显示新视图控制器\n\n该方法使用`sender`（被点击的`UITableViewCell`）来确定点击的是哪一行，并向\
  \ segue 请求其`destinationViewController`，即即将显示的`FontListViewController`实例。然后我们根据用户点击的是字体家族（分区\
  \ 0）还是收藏单元格（分区 1），向新视图控制器传递一些值。除了设置目标视图控制器的自定义属性外，我们还访问控制器的`navigationItem`属性来设置其标题。`navigationItem`属性是`UINavigationItem`的一个实例，这是一个\
  \ UIKit 类，包含有关任何给定视图控制器应在导航栏中显示什么内容的信息。\n\n现在运行应用程序。你会看到，点击任何字体家族的名称都会显示其包含的所有单个字体列表（见图\
  \ 9-10）。此外，你可以点击字体列表导航控制器标题中的“字体”标签，返回到其父控制器以选择其他字体。\n\n![A329781_3_En_9_Fig10_HTML.jpg](img/A329781_3_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 显示字体家族中包含的单个字体\n\n\n\n## 创建字体大小视图控制器\n\n然而，你会发现目前应用程序无法让你进一步操作。图 9-4 和图\
  \ 9-5 展示了额外的屏幕，让你能够以多种方式查看所选字体；目前我们尚未实现这些功能。但很快，我们就能做到了！让我们创建图 9-4 所示的视图，该视图可以同时显示多种字体大小。使用与创建\
  \ `FontListViewController` 相同的步骤，添加一个继承自 `UITableViewController` 的新视图控制器，并将其命名为\
  \ `FontSizesViewController`。该类从其父控制器所需获取的唯一参数是一个字体。我们还需要几个私有属性。\n\n首先，切换到 `FontSizesViewController.swift`，然后删除\
  \ `didReceiveMemoryWarning` 和 `numberOfSectionsInTableView:` 方法，以及底部所有被注释掉的方法。重申一遍，你不需要这些方法。现在，在类定义的顶部添加以下属性：\n\
  \n```\nimport UIKit\nclass FontSizesViewController: UITableViewController {\nvar\
  \ font: UIFont!\nprivate static let pointSizes: [CGFloat] = [\n9, 10, 11, 12, 13,\
  \ 14, 18, 24, 36, 48, 64, 72, 96, 144\n]\nprivate static let cellIdentifier = \"\
  FontNameAndSize\"\n```\n\n`font` 属性将由 `FontListViewController` 在将此视图控制器推送到导航控制器堆栈之前进行设置。`pointSizes`\
  \ 属性是一个字体点大小的数组，字体将按这些大小显示。我们还需要以下实用方法，该方法根据表格行索引获取指定大小的字体版本：\n\n```\nfunc fontForDisplay(atIndexPath\
  \ indexPath: NSIndexPath) -> UIFont {\nlet pointSize = FontSizesViewController.pointSizes[indexPath.row]\n\
  return font.withSize(pointSize)\n}\n```\n\n我们还需要设置表格视图的 `estimatedRowHeight` 属性，以便表格根据每一行的内容自动计算正确的行高。为此，请在\
  \ `viewDidLoad()` 方法中添加以下行：\n\n```\ntableView.estimatedRowHeight = FontSizesViewController.pointSizes[0]\n\
  ```\n\n实际上，我们给这个属性赋什么值并不重要，因此我们任意选择了表格需要显示的最小字体点大小。\n\n对于此视图控制器，我们将跳过允许我们指定要显示的分区数量的方法，因为我们打算只使用默认数量（1）。但是，我们必须实现用于指定行数和每个单元格内容的方法。这两个方法如代码清单\
  \ 9-9 所示。\n\n```\n// MARK: - 表格视图数据源\noverride func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\nreturn FontSizesViewController.pointSizes.count\n\
  }\noverride func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\nlet cell = tableView.dequeueReusableCell(\nwithIdentifier:\
  \ FontSizesViewController.cellIdentifier,\nfor: indexPath)\ncell.textLabel?.font\
  \ = fontForDisplay(atIndexPath: indexPath)\ncell.textLabel?.text = font.fontName\n\
  cell.detailTextLabel?.text =\n\"\\(FontSizesViewController.pointSizes[indexPath.row])\
  \ 点\"\nreturn cell\n}\n代码清单 9-9.\nFontSizeViewController 表格视图的 dataSource 方法\n```\n\
  \n这些方法中没有任何我们之前没见过的东西，所以让我们继续设置用户界面的 Storyboard。\n\n### 创建字体大小视图控制器的 Storyboard\n\
  \n回到 `Main.storyboard`，将另一个表格视图控制器拖入编辑区域。使用身份检查器将其类设置为 `FontSizesViewController`。你需要从其父控制器\
  \ `FontListViewController` 建立 segue 连接。因此，找到该控制器，按住 Control 键并从其原型单元格拖动到最新的视图控制器，然后在出现的弹出菜单的“选择\
  \ Segue”部分中选择“显示”。接下来，选择你刚刚添加的新场景中的原型单元格，然后使用属性检查器将其样式设置为“副标题”，并将其标识符设置为 `FontNameAndSize`。\n\
  \n### 实现字体大小视图控制器的 Prepare for Segue\n\n现在，就像上次我们扩展 Storyboard 的导航层次结构一样，我们需要跳转到父控制器，以便它能够配置其子控制器。这意味着我们需要转到\
  \ `FontListViewController.swift` 并实现 `prepareForSegue(_:sender:)` 方法，如代码清单 9-10\
  \ 所示。\n\n```\n// MARK: - 导航\noverride func prepare(for segue: UIStoryboardSegue,\
  \ sender: AnyObject?) {\n// 使用 [segue destinationViewController] 获取新的视图控制器。\n//\
  \ 将选中的对象传递给新的视图控制器。\nlet tableViewCell = sender as! UITableViewCell\nlet indexPath\
  \ = tableView.indexPath(for: tableViewCell)!\nlet font = fontForDisplay(atIndexPath:\
  \ indexPath)\nlet sizesVC =  segue.destinationViewController as! FontSizesViewController\n\
  sizesVC.title = font.fontName\nsizesVC.font = font\n}\n代码清单 9-10.\nFontListViewsController\
  \ 的 preparedForSeque 方法\n```\n\n这些代码现在看起来可能相当熟悉，所以我们不再赘述。\n\n运行应用程序，选择一个字体族，然后选择一个字体（通过点击任意行，但不要点击右侧的附件按钮），你现在将看到图\
  \ 9-11 所示的多尺寸列表。\n\n![A329781_3_En_9_Fig11_HTML.jpg](img/A329781_3_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11. 我们的多尺寸表格视图列表\n\n\n\n### 创建字体信息视图控制器\n\n我们即将创建的最后一个视图控制器如图 9-5 所示。它不是基于表格视图的，而是包含一个大的文本标签、一个用于设置字体大小的滑块，以及一个用于切换是否将当前使用的字体加入收藏列表的开关。在项目中以\
  \ `UIViewController` 为父类创建一个新的 Cocoa Touch 类，并将其命名为 `FontInfoViewController`。与本应用中大多数其他控制器一样，该控制器也需要由父控制器传入几个参数。通过在\
  \ `FontInfoViewController.swift` 中定义以下属性和四个输出口（用于构建用户界面）来实现这一点：\n\n```\nclass FontInfoViewController:\
  \ UIViewController {\n    var font: UIFont!\n    var favorite: Bool = false\n  \
  \  @IBOutlet weak var fontSampleLabel: UILabel!\n    @IBOutlet weak var fontSizeSlider:\
  \ UISlider!\n    @IBOutlet weak var fontSizeLabel: UILabel!\n    @IBOutlet weak\
  \ var favoriteSwitch: UISwitch!\n```\n\n接下来，实现 `viewDidLoad()` 方法以及两个分别由滑块和开关触发的操作方法，如列表\
  \ 9-10 所示。\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    //\
  \ 在此处进行加载后的其他设置。\n    fontSampleLabel.font = font\n    fontSampleLabel.text =\n\
  \        \"AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVv\"\n        + \"WwXxYyZz\
  \ 0123456789\"\n    fontSizeSlider.value = Float(font.pointSize)\n    fontSizeLabel.text\
  \ = \"\\(Int(font.pointSize))\"\n    favoriteSwitch.isOn = favorite\n}\n\n@IBAction\
  \ func slideFontSize(slider: UISlider) {\n    let newSize = roundf(slider.value)\n\
  \    fontSampleLabel.font = font.withSize(CGFloat(newSize))\n    fontSizeLabel.text\
  \ = \"\\(Int(newSize))\"\n}\n\n@IBAction func toggleFavorite(sender: UISwitch) {\n\
  \    let favoritesList = FavoritesList.sharedFavoritesList\n    if sender.isOn {\n\
  \        favoritesList.addFavorite(fontName: font.fontName)\n    } else {\n    \
  \    preferencesList.removeFavorite(fontName: font.fontName)\n    }\n}\n```\n\n\
  列表 9-10. 我们的 `viewDidLoad()`、`slider` 和 `switch` 方法\n\n这些方法都非常直观。`viewDidLoad()`\
  \ 方法根据所选字体设置显示内容；`slideFontSize()` 根据滑块的值更改 `fontSampleLabel` 标签中的字体大小；`toggleFavorite()`\
  \ 则根据开关的值将当前字体添加到收藏列表或从中移除。\n\n### 创建字体信息视图控制器的故事板\n\n现在回到 `Main.storyboard`，为本应用的最后一个视图控制器构建图形用户界面。使用对象库找到一个普通的视图控制器，将其拖入编辑区域，然后使用身份检查器将其类设置为\
  \ `FontInfoViewController`。接着，使用对象库找到更多对象并将其拖入新场景中。你需要三个标签、一个开关和一个滑块。粗略地将它们排列好，如图\
  \ 9-12 所示。暂时不必添加自动布局约束——我们稍后再做。\n\n![A329781_3_En_9_Fig12_HTML.jpg](img/A329781_3_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 标签、开关和滑块布局\n\n请注意，我们在上方标签之上留出了一些空间，因为最终那里会有一个导航栏。同时，我们希望上方标签能够跨多行显示长文本，但默认情况下标签只显示一行。要更改此设置，请选中该标签，打开属性检查器，将“行数”字段的值设置为\
  \ 0。\n\n图 9-12 还显示了下方的两个标签中更改后的文本。请自行进行相同的更改。这里看不到的是，我们使用了属性检查器将这两个标签的文本设置为右对齐。你也应该这样做，因为它们都有布局约束，本质上会将它们固定在右侧边缘。另外，选中底部的滑块，然后使用属性检查器将其最小值设置为\
  \ 1，最大值设置为 200。\n\n现在需要连接此图形用户界面的所有连线。首先选中视图控制器并打开连接检查器。当需要建立这么多连接时，该检查器提供的概览非常方便。通过将\
  \ `favoriteSwitch`、`fontSampleLabel`、`fontSizeLabel` 和 `fontSizeSlider` 旁边的小圆圈拖拽到场景中相应的对象上，为每个输出口建立连接。为了避免混淆，`fontSampleLabel`\
  \ 应连接到顶部的标签，`fontSizeLabel` 连接到右下角的标签，而 `favoriteSwitch` 和 `fontSizeSlider` 输出口则连接到它们唯一可去的地方。要连接操作方法与控件，可以继续使用连接检查器。在视图控制器的连接检查器的“已接收操作”部分，将\
  \ `slideFontSize:` 旁边的小圆圈拖拽到滑块上，松开鼠标按钮，然后在弹出的上下文菜单中选择“值已更改”。接下来，将 `toggleFavorite:`\
  \ 旁边的小圆圈拖拽到开关上，同样选择“值已更改”。连接完成后的状态应如图 9-13 所示。\n\n![A329781_3_En_9_Fig13_HTML.jpg](img/A329781_3_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13. 字体信息视图控制器故事板的完整连线\n\n这里还需要做一件事，就是创建一个转场，以便这个视图能够显示。请记住，当字体列表视图控制器显示时，用户点击详细信息附件（圆圈中的蓝色小“i”图标）就会显示此视图。因此，找到该控制器，按住\
  \ Control 键从其原型单元格拖拽到你正在编辑的新字体信息视图控制器上，并在弹出的上下文菜单的“附件操作”部分选择“显示”。注意，我们刚才说的是“附件操作”，而不是“选择转场”（见图\
  \ 9-14）。附件操作是用户在点击详细信息附件时触发的转场，而选择转场则是点击行内其他任意位置时触发的转场。我们之前已经将该单元格的选择转场设置为打开 `FontSizesViewController`。\n\
  \n![A329781_3_En_9_Fig14_HTML.jpg](img/A329781_3_En_9_Fig14_HTML.jpg)\n\n图 9-14.\
  \ 设置附件操作显示转场\n\n现在，通过点击行的不同部分可以触发两个不同的转场。由于这两个转场会呈现具有不同属性的不同视图控制器，我们需要一种方法来区分它们。幸运的是，代表转场的\
  \ `UIStoryboardSegue` 类提供了一种实现方法：我们可以像处理表格视图单元格一样使用标识符。\n\n你只需在编辑区域中选中一个转场，然后使用属性检查器设置其标识符。你可能需要稍微移动一下场景，以便能够看到从字体列表视图控制器右侧蜿蜒伸出的两个转场。选中指向字体大小视图控制器的那个转场，并将其标识符设置为\
  \ `ShowFontSizes`。接着，选中指向字体信息视图控制器的那个转场，并将其标识符设置为 `ShowFontInfo`，如图 9-15 所示。\n\n\
  ![A329781_3_En_9_Fig15_HTML.jpg](img/A329781_3_En_9_Fig15_HTML.jpg)\n\n图 9-15. 标识转场\n\
  \n\n\n#### 设置约束\n\n通过设置转场，Interface Builder 就能让我们的新场景像其他场景一样在导航控制器的上下文中使用，因此它会自动在顶部获得一个空白导航栏。现在视图的实际边界已就位，是时候设置约束了。这是一个相当复杂的视图，包含多个子视图，特别是靠近底部的位置，因此我们不能完全依赖系统的自动约束来为我们做正确的事情。我们将使用编辑区域底部的\
  \ `Pin` 按钮及其触发的弹出窗口来构建所需的大部分约束。\n\n从最顶部的标签开始。如果你把它放得太靠近顶部，先将其向下拖动，直到与导航栏保持舒适的距离。点击\
  \ `Pin`，然后在弹出窗口中，选择小方块上方、左侧和右侧的红色条——但不要选择下方的。现在点击底部的 **添加 3 个约束** 按钮。\n\n接下来，选择底部的滑块并点击\
  \ `Pin` 按钮。这次，选择小方块下方、左侧和右侧的红色条——但不要选择上方的。再次点击 **添加 3 个约束** 来放置它们。\n\n对于剩余的两个标签和开关，请遵循以下步骤：选择对象，点击\
  \ `Pin`，选择小方块下方和右侧的红色条，勾选 **宽度** 和 **高度** 复选框，最后点击 **添加 4 个约束**。为这三个对象设置这些约束会将它们绑定到右下角。\n\
  \n只需再设置一个约束。我们希望顶部的标签能够扩展以容纳其文本，但绝不要扩展到与底部视图重叠的程度。我们可以通过一个约束来实现这一点。按住 Control 键从顶部标签拖拽到\
  \ **添加到收藏** 标签，松开鼠标，然后从出现的上下文菜单中选择 **垂直间距**。接下来，点击新约束以选中它（这是一条连接两个标签的蓝色垂直条），然后打开\
  \ **属性检查器**，你将看到该约束的一些可配置属性。将 **关系** 弹出菜单更改为 **大于或等于**，然后将 **常量** 值设置为 `10`。这确保了扩展的顶部标签不会推过底部的其他视图。\n\
  \n### 适应多个转场的字体列表视图控制器\n\n现在回到咱们的老朋友 `FontListViewController.swift`。由于这个类现在能够触发到两个不同子视图控制器的转场，你需要调整\
  \ `prepareForSegue(_:sender:)` 方法，如代码清单 9-11 所示。\n\n```\n// MARK: - 导航\noverride\
  \ func prepare(for segue: UIStoryboardSegue, sender: AnyObject?) {\n    // 使用 [segue\
  \ destinationViewController] 获取新视图控制器。\n    // 将选中的对象传递给新视图控制器。\n    let tableViewCell\
  \ = sender as! UITableViewCell\n    let indexPath = tableView.indexPath(for: tableViewCell)!\n\
  \    let font = fontForDisplay(atIndexPath: indexPath)\n    if segue.identifier\
  \ == \"ShowFontSizes\" {\n        let sizesVC = segue.destinationViewController\
  \ as! FontSizesViewController\n        sizesVC.title = font.fontName\n        sizesVC.font\
  \ = font\n    } else {\n        let infoVC = segue.destinationViewController as!\
  \ FontInfoViewController\n        infoVC.title = font.fontName\n        infoVC.font\
  \ = font\n        infoVC.favorite = FavoritesList.sharedFavoritesList.favorites.contains(font.fontName)\n\
  \    }\n}\n```\n\n**代码清单 9-11.** 处理多个转场\n\n构建并运行应用程序，看看效果如何。选择一个包含多种字体的字体族（例如 Gill\
  \ Sans），然后点击任意一行字体的中间部分。你将看到之前见过的同一个列表，它以多种尺寸显示该字体。按下左上角的导航按钮（标记为 Gill Sans）返回，然后点击另一行；不过，这次要点击右侧显示详细附件的位置。这将调出最终的视图控制器，它显示该字体的一个示例，底部有一个滑块，可以让你选择任意大小。\n\
