  \n图 9-17. 显示“删除”按钮的收藏字体行\n\n### 实现拖拽重新排序\n\n我们要添加到字体列表的最后一个功能，是让用户只需上下拖拽即可重新排列他们的收藏。为了实现这一点，我们将向\
