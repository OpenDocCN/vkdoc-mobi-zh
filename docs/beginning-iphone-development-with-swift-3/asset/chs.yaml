  \n*图 11-5.* 横向模式下的默认主从应用。请注意此图与图 11-1 中显示的类似布局。\n\n### 故事板定义结构\n\n从一开始，您就会拥有一组相当复杂的视图控制器在运行：\n\
  \n- 一个分栏视图控制器，包含所有元素\n- 一个导航控制器，处理分栏左侧的内容\n- 一个主视图控制器（显示项目的主列表），位于导航控制器内部\n- 一个详情视图控制器，位于右侧\n\
  - 另一个导航控制器，作为右侧详情视图控制器的容器\n\n在我们使用的默认主从应用模板中，这些视图控制器是在主故事板文件中设置和互连的，而不是通过代码实现。除了进行\
  \ GUI 布局外，Interface Builder 还提供了一种连接不同组件的方式，而无需编写大量代码来建立关系。让我们查看项目的故事板，了解其设置方式。\n\
  \n选择 `Main.storyboard` 以在 Interface Builder 中打开它。这个故事板确实包含许多内容。为了获得最佳查看效果，您绝对需要打开文档大纲，如图\
  \ 11-6 所示。缩小视图也有助于您概览全局。\n\n![A329781_3_En_11_Fig6_HTML.jpg](img/A329781_3_En_11_Fig6_HTML.jpg)\n\
  \n*图 11-6.* 在 Interface Builder 中打开的 `Main.storyboard`。可以使用左侧的文档大纲最佳地查看此复杂的对象层次结构。\n\
  \n为了更好地了解这些控制器之间的关系，请打开连接检查器，然后依次点击每个视图控制器。以下是快速总结，说明您会发现的内容：\n\n- `UISplitViewController`\
  \ 通过称为 *master view controller* 和 *detail view controller* 的关系转场连接到两个 `UINavigationController`。这些用于告诉\
  \ `UISplitViewController`，左侧显示的窄条（主视图控制器）和较大的显示区域（详情视图控制器）该使用什么。\n- 通过主视图控制器转场链接的\
  \ `UINavigationController` 与其根视图控制器具有根视图控制器关系，该根视图控制器是由模板生成的 `MasterViewController`\
  \ 类。主视图控制器是 `UITableViewController` 的子类，您应该从第 9 章就熟悉它了。\n- 类似地，另一个 `UINavigationController`\
  \ 与详情视图控制器具有根视图控制器关系，该详情视图控制器是模板的 `DetailVIewController` 类。由模板生成的详情视图控制器是一个普通的 `UIViewController`\
  \ 子类，但您可以自由使用满足应用需求的任何视图控制器。\n- 从主视图控制器中的单元格到详情视图控制器有一个类型为 `showDetail` 的故事板转场。此转场会导致被点击单元格中的项目显示在详情视图中。稍后当我们更详细地查看主视图控制器时，还会有更多介绍。\n\
  \n至此，`Main.storyboard` 的内容提供了应用各个控制器如何互连的定义。在大多数使用故事板的情况下，这消除了大量代码，这通常是一件好事。\n\n\
  ### 代码定义功能\n\n将视图控制器的互连保留在故事板中的主要原因之一是，它们不会用不必要的配置信息来使源代码变得杂乱。剩下的只是定义实际功能的代码。让我们看看我们作为起点的内容。创建项目时，Xcode\
  \ 为我们定义了多个类。在我们开始进行任何更改之前，先来窥探一下每个类。\n\n\n\n#### `AppDelegate`\n\n首先是`AppDelegate.swift`，即应用委托。其源文件开头如代码清单\
  \ [11-1] 所示。\n\n```\nimport UIKit\n@UIApplicationMain\nclass AppDelegate: UIResponder,\
  \ UIApplicationDelegate, UISplitViewControllerDelegate {\nvar window: UIWindow?\n\
  func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:\
  \ [NSObject: AnyObject]?) -> Bool {\n// Override point for customization after application\
  \ launch.\nlet splitViewController = self.window!.rootViewController as! UISplitViewController\n\
  let navigationController = splitViewController.viewControllers[splitViewController.viewControllers.count-1]\
  \ as! UINavigationController\nnavigationController.topViewController!.navigationItem.leftBarButtonItem\
  \ = splitViewController.displayModeButtonItem()\nsplitViewController.delegate =\
  \ self\nreturn true\n}\nListing 11-1.\nAppDelegate.swift\n```\n\n先来看这段代码的最后一部分：\n\
  \n```\nsplitViewController.delegate = self;\n```\n\n这一行设置了`UISplitViewController`的`delegate`属性，使其指向应用委托本身。但为什么要在代码中建立这个连接，而不是直接在故事板中连接呢？毕竟，就在几段之前，你还被告知消除繁琐的代码（“将这个东西连接到那个东西”）是\
  \ XIB 和故事板的主要优势之一。而且我们已经在 Interface Builder 中多次连接过委托，为什么这里不行？\n\n要理解为什么使用故事板进行连接在这里行不通，你需要考虑故事板与\
  \ XIB 文件的区别。XIB 文件本质上是一个冻结的对象图。当你在运行的应用中加载 XIB 时，其中包含的对象都会“解冻”并实例化，包括文件中指定的所有互连。系统会逐一创建文件中每个对象的新实例，并连接所有输出口和对象之间的连接。然而，故事板的意义远不止于此。可以说，故事板中的每个场景大致对应一个\
  \ XIB 文件。当你添加描述场景如何通过 Segue 连接的元数据时，就构成了一个故事板。但与单个 XIB 不同，复杂的故事板通常不会一次性全部加载。相反，任何导致新场景被激活的活动，都会从故事板中加载该场景的冻结对象图。这意味着你在故事板中看到的对象不一定同时存在。\n\
  \n由于 Interface Builder 无法预知哪些场景会共存，它实际上禁止你从一个场景中的对象向另一个场景中的对象建立任何输出口或目标/动作连接。事实上，Segue\
  \ 是它允许你在场景之间建立的唯一连接。\n\n你可以亲自尝试。首先，在故事板中选择“Split View Controller”（你可以在“Split View\
  \ Controller Scene”的 Dock 中找到它）。然后打开“Connections Inspector”，尝试从`delegate`输出口拖拽连接到另一个视图控制器或对象。你可以在布局视图和列表视图中任意拖拽，但找不到任何会高亮显示的位置（高亮表示准备接受拖拽）。唯一建立这个连接的方式就是在代码中完成。总的来说，考虑到使用故事板消除了大量其他代码，这一点额外的代码只是很小的代价。\n\
  \n现在，让我们回到`application(_:didFinishLaunchingWithOptions:)`方法的开头部分：\n\n```\nlet splitViewController\
  \ = self.window!.rootViewController as! UISplitViewController\n```\n\n这行代码获取了窗口的`rootViewController`，也就是故事板中由自由浮动箭头指向的视图控制器。回顾图\
  \ [11-6]，你会看到箭头指向我们的`UISplitViewController`实例。接下来是这段代码：\n\n```\nlet navigationController\
  \ = splitViewController.viewControllers[splitViewController.viewControllers.count-1]\
  \ as! UINavigationController\n```\n\n在这一行，我们深入`UISplitViewController`的`viewControllers`数组。当从故事板加载分割视图时，该数组包含对导航控制器的引用，这些导航控制器包裹了主视图控制器和详细视图控制器。我们获取数组中的最后一个元素，它指向用于详细视图的`UINavigationController`。最后，我们看到：\n\
  \n```\nnavigationController.topViewController!.navigationItem.leftBarButtonItem\
  \ =\nsplitViewController.displayModeButtonItem()\n```\n\n这行代码将分割视图控制器的`displayModeButtonItem`分配给详细视图控制器的导航栏。`displayModeButtonItem`是一个由分割视图自身创建和管理的栏按钮。实际上，这段代码添加了你可以在图\
  \ [11-4] 左侧导航栏上看到的“Master”按钮。在 iPad 上，当设备处于竖屏模式且主视图控制器不可见时，分割视图会显示此按钮。当设备旋转为横屏或用户按下按钮使主视图控制器可见时，该按钮会被隐藏。\n\
  \n#### `MasterViewController`\n\n现在，让我们来看看`MasterViewController`，它负责控制包含应用导航的表格视图的设置。代码清单\
  \ [11-2] 显示了`MasterViewController.swift`文件顶部的代码。\n\n```\nimport UIKit\nclass MasterViewController:\
  \ UITableViewController {\nvar detailViewController: DetailViewController? = nil\n\
  var objects = [AnyObject]()\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // Do any additional setup after loading the view, typically from a nib.\nself.navigationItem.leftBarButtonItem\
  \ = self.editButtonItem()\nlet addButton = UIBarButtonItem(barButtonSystemItem:\
  \ .add, target: self, action: #selector(insertNewObject(_:)))\nself.navigationItem.rightBarButtonItem\
  \ = addButton\nif let split = self.splitViewController {\nlet controllers = split.viewControllers\n\
  self.detailViewController = (controllers[controllers.count-1] as! UINavigationController).topViewController\
  \ as? DetailViewController\n}\n}\nListing 11-2.\nMasterViewController.swift\n```\n\
  \n这里的主要关注点是`viewDidLoad()`方法。在前面的章节中，当你实现一个响应用户行选择的表格视图控制器时，通常会创建一个新的视图控制器并将其推入导航控制器的栈中。然而，在这个应用中，我们想要显示的视图控制器已经就位，并且每次用户在左侧做出选择时，它都会被重用。它就是故事板文件中包含的`DetailViewController`实例。在这里，我们获取了那个`DetailViewController`实例并将其保存在一个属性中，以备将来使用，尽管该属性在模板代码的其余部分并未使用。\n\
  \n`viewDidLoad()`方法还向工具栏添加了一个按钮。这就是你在图 [11-4] 和图 [11-5] 中看到的，位于主视图控制器导航栏右侧的“+”按钮。模板应用使用此按钮创建新条目并将其添加到主视图控制器的表格视图中。由于我们不需要在“Presidents”应用中使用这个按钮，我们稍后会删除这段代码。\n\
  \n该类模板中还包含几个其他方法，但目前无需担心。我们将在查看详细视图控制器之后，删除其中一些方法并重写其他方法。\n\n\n\n#### 详情视图控制器\n\n\
  `Xcode`为我们创建的最后一个类是`DetailViewController`，它负责实际显示用户在主视图控制器表格中选择的项目。以下是`DetailViewController.swift`中的内容，如代码清单\
  \ 11-3 所示。\n\n```swift\nimport UIKit\nclass DetailViewController: UIViewController\
  \ {\n    @IBOutlet weak var detailDescriptionLabel: UILabel!\n    func configureView()\
  \ {\n        // Update the user interface for the detail item.\n        if let detail\
  \ = self.detailItem {\n            if let label = self.detailDescriptionLabel {\n\
  \                label.text = detail.description\n            }\n        }\n   \
  \ }\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
  \ Do any additional setup after loading the view, typically from a nib.\n      \
  \  self.configureView()\n    }\n    override func didReceiveMemoryWarning() {\n\
  \        super.didReceiveMemoryWarning()\n        // Dispose of any resources that\
  \ can be recreated.\n    }\n    var detailItem: NSDate? {\n        didSet {\n  \
  \          // Update the view.\n            self.configureView()\n        }\n  \
  \  }\n}\n```\n*代码清单 11-3. `DetailViewController.swift`*\n\n`detailDescriptionLabel`属性是一个连接到故事板中标签的插座变量。在模板应用中，该标签仅显示`detailItem`属性中对象的描述。`detailItem`属性本身是视图控制器存储对用户在主视图控制器中选择的对象的引用的地方。其属性观察器（`didSet`块中的代码）在值更改后调用，它调用为我们生成的另一个方法`configureView()`。该方法仅调用详细对象的`description`方法，并使用结果设置故事板中标签的`text`属性：\n\
  \n```swift\nfunc configureView() {\n    // Update the user interface for the detail\
  \ item.\n    if let detail = self.detailItem {\n        if let label = self.detailDescriptionLabel\
  \ {\n            label.text = detail.description\n        }\n    }\n}\n```\n\n`description`方法由`NSObject`的每个子类实现。如果你的类未重写该方法，它会返回一个可能不太有用的默认值。但在模板代码中，详细对象都是`NSDate`类的实例，而`NSDate`对`description`方法的实现会以通用格式返回日期和时间。\n\
  \n### 主从模板应用的工作原理\n\n现在你已经了解了模板应用的所有组成部分，但可能仍不清楚其工作原理，因此我们运行它并查看实际效果。在 iPad 模拟器上运行应用，将设备旋转到横屏模式，使主视图控制器显示出来。可以看到详情视图控制器中的标签当前显示故事板中分配给它的默认文本。本节将探讨在主视图控制器中选择一个项目如何导致该文本发生变化。主视图控制器中目前没有任何项目。要解决此问题，请按导航栏右上角的`+`按钮几次。每次点击都会在控制器的表格视图中添加一个新项目，如图\
  \ 11-7 所示。\n\n![A329781_3_En_11_Fig7_HTML.jpg](img/A329781_3_En_11_Fig7_HTML.jpg)\n\
  \n*图 11-7. 在主视图控制器中选择并在详情视图控制器中显示项目的模板应用*\n\n主视图控制器表格中的所有项目都是日期。选择其中一个，详情视图中的标签会更新显示相同的日期。你已经看到了执行此操作的代码——它是`DetailViewController.swift`中的`configureView`方法，当详情视图控制器的`detailItem`属性存储新值时被调用。是什么导致`detailItem`属性被设置为新值？回顾图\
  \ 11-6 中的故事板。有一条转场将主视图控制器表格中的原型表格单元格链接到详情视图控制器。如果你点击此转场并打开属性检查器，你会看到这是一个标识符为`showDetail`的显示详情转场，如图\
  \ 11-8 所示。\n\n![A329781_3_En_11_Fig8_HTML.jpg](img/A329781_3_En_11_Fig8_HTML.jpg)\n\
  \n*图 11-8. 连接主视图控制器和详情视图控制器的显示详情转场*\n\n如第 9 章所述，链接到表格视图单元格的转场在选中该单元格时触发。因此，当你选中主视图控制器表格视图中的一行时，iOS\
  \ 会执行显示详情转场，并将导航控制器（包含详情视图控制器）作为转场目标。这会导致两件事发生：\n\n* 创建一个新的详情视图控制器实例，并将其视图添加到视图层次结构中。\n\
  * 调用主视图控制器中的`prepareForSegue(_:sender:)`方法。\n\n第一步确保详情视图控制器可见。在第二步中，主视图控制器需要以某种方式显示在主视图控制器中选择的对象。以下是`MasterViewController.swift`中的模板代码如何处理此问题，如代码清单\
  \ 11-4 所示。\n\n```swift\n// MARK: - Segues\noverride func prepare(for segue: UIStoryboardSegue,\
  \ sender: AnyObject?) {\n    if segue.identifier == \"showDetail\" {\n        if\
  \ let indexPath = self.tableView.indexPathForSelectedRow {\n            let object\
  \ = objects[indexPath.row] as! NSDate\n            let controller = (segue.destinationViewController\
  \ as! UINavigationController).topViewController as! DetailViewController\n     \
  \       controller.detailItem = object\n            controller.navigationItem.leftBarButtonItem\
  \ = self.splitViewController?.displayModeButtonItem()\n            controller.navigationItem.leftItemsSupplementBackButton\
  \ = true\n        }\n    }\n}\n```\n*代码清单 11-4. `MasterViewController.swift`文件的`prepare(forSegue:)`方法*\n\
  \n首先，检查转场标识符以确保是预期的转场，并获取视图控制器表格中选中对象的`NSDate`对象。接下来，主视图控制器从导致此方法被调用的转场的目标视图控制器的`topViewController`属性中找到`DetailViewController`实例。现在我们已经同时拥有了选中对象和详情视图控制器，只需设置详情视图控制器的`detailItem`属性即可更新详情视图。`prepare(forSegue:)`方法的最后两行将显示模式按钮添加到详情视图控制器的导航栏。当设备处于横屏模式时，这不起作用，因为显示模式按钮不可见，但如果旋转到竖屏方向，你会看到该按钮（即\
  \ Master 按钮）出现。\n\n现在你了解了主视图控制器中选中的项目如何显示在详情视图控制器中。虽然看起来这里发生的事情不多，但实际上在底层发生了大量工作，以确保在\
  \ iPad 和 iPhone 上都能在横屏和竖屏方向正确工作。分视图控制器的美妙之处在于它处理了所有细节，让你可以专注于如何实现自定义的主视图控制器和详情视图控制器。\n\
  \n以上是对 Xcode 主从应用模板提供的功能的概述。起初可能难以理解，但希望逐个部分介绍能帮助你理解所有部分是如何组合在一起的。\n\n\n\n## 添加总统数据\n\
  \n现在你已经了解了项目的基本布局，是时候填补空白，把模板应用变成你自己的作品了。首先打开本书的源代码归档文件夹，其中`11 – Presidents Data`文件夹内有一个名为`PresidentList.plist`的文件。将该文件拖入\
  \ Xcode 中项目的`Presidents`文件夹，以将其添加到项目中，并确保勾选“Copy items if needed”复选框让 Xcode 复制该文件。这个文件包含了迄今为止所有美国总统的信息，每位总统仅包含姓名和维基百科条目\
  \ URL。\n\n现在，让我们看看主视图控制器，以及需要如何修改它以正确处理总统数据。这将是一个简单的过程：加载总统列表、在表格视图中展示它们，并将 URL\
  \ 传递给详情视图以供显示。在`MasterViewController.swift`中，首先在类顶部添加以下粗体行，并删除划线行：\n\n```\nclass\
  \ MasterViewController: UITableViewController {\nvar detailViewController: DetailViewController?\
  \ = nil\nvar objects = [AnyObject]()\nvar presidents: [[String: String]]!\n```\n\
  \n接下来查看`viewDidLoad()`方法，这里的修改稍微复杂一些（但也不算太糟）。你需要添加几行代码来加载总统列表，然后删除设置工具栏中编辑和插入按钮的几行代码，如代码清单\
  \ 11-5 所示。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// 从 nib\
  \ 加载后执行任何额外的设置\nlet path = Bundle.main.path(forResource: \"PresidentList\", ofType:\
  \ \"plist\")\nlet presidentInfo = NSDictionary(contentsOfFile: path)!\npresidents\
  \ = presidentInfo[\"presidents\"]! as! [[String: String]]\nif let split = self.splitViewController\
  \ {\nlet controllers = split.viewControllers\nself.detailViewController = (controllers[controllers.count-1]\
  \ as! UINavigationController).topViewController as? DetailViewController\n}\n}\n\
  代码清单 11-5.\nMasterViewController.swift 中的 viewDidLoad 方法\n```\n\n这段代码起初可能有点令人困惑：\n\
  \n```\nlet path = Bundle.main.path(forResource:\"PresidentList\", ofType: \"plist\"\
  )!\nlet presidentInfo = NSDictionary(contentsOfFile: path)!\npresidents = presidentInfo[\"\
  presidents\"]! as! [[String: String]]\n```\n\n`Bundle.main.path(forResource:_:ofType:)`方法会获取`PresidentList.plist`文件的路径，然后将其内容加载到`NSDictionary`中。这个字典包含一个条目，键为`\"\
  presidents\"`。该条目的值是一个数组，每位总统对应一个`NSDictionary`；这些字典包含键值对，其中键和值都是字符串。我们将数组转换为正确的\
  \ Swift 类型`[[String: String]]`，并赋值给`presidents`变量。\n\n这个模板生成的类还包含一个名为`insertNewObject()`的方法，用于向`objects`数组添加条目。但我们连这个数组都不再有了，所以删除整个方法。\n\
  \n另外，我们还有一些处理表格行编辑功能的数据源方法。在这个应用中我们不打算允许任何行编辑，所以直接删除`canEditRowAt`和`commit(editingStyle:)`方法。\n\
  \n现在该处理主要的表格视图数据源方法了，根据我们的需求进行调整。首先修改告诉表格视图显示多少行的方法：\n\n```\noverride func tableView(_\
  \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\nreturn presidents.count\n\
  }\n```\n\n之后，修改`tableView(_:cellForRowAtIndexPath:)`方法，让每个单元格显示总统的姓名：\n\n```\noverride\
  \ func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->\
  \ UITableViewCell {\nlet cell = tableView.dequeueReusableCell(withIdentifier: \"\
  Cell\", for: indexPath)\nlet president = presidents[indexPath.row]\ncell.textLabel!.text\
  \ = president[\"name\"]\nreturn cell\n}\n```\n\n最后，修改`prepareForSegue(_:sender:)`方法，将选中总统的数据（如前所述，是一个`[String:\
  \ String]`类型的字典）传递给详情视图控制器，如代码清单 11-6 所示。\n\n```\n// MARK: - Segues\noverride func\
  \ prepare(for segue: UIStoryboardSegue, sender: AnyObject?) {\nif segue.identifier\
  \ == \"showDetail\" {\nif let indexPath = self.tableView.indexPathForSelectedRow\
  \ {\nlet object = presidents[indexPath.row]\nlet controller = (segue.destinationViewController\n\
  as! UINavigationController).topViewController as! DetailViewController\ncontroller.detailItem\
  \ = object\ncontroller.navigationItem.leftBarButtonItem =\nself.splitViewController?.displayModeButtonItem()\n\
  controller.navigationItem.leftItemsSupplementBackButton = true\n}\n}\n}\n代码清单 11-6.\n\
  prepare(forSegue:) 方法\n```\n\n> **注意**：如果`DetailViewController.swift`文件中模板生成的`detailItem`方法的类型是`NSDate`或类似类型，应将其改为`AnyObject?`以消除潜在错误。\n\
  \n主视图控制器的修改就到此为止。\n\n接下来，选择`Main.storyboard`，在文档大纲中点击 Master Scene 中的 Master 图标以选中主视图控制器（它是故事板顶部行右侧的那个），然后双击其标题栏，将\
  \ Master 替换为 Presidents，并保存故事板。\n\n此时，你可以构建并运行应用。切换到横屏模式以调出主视图控制器，显示总统列表，如图 11-9\
  \ 所示。点击总统姓名将在详情视图中显示一个不太有用的字符串。\n\n![A329781_3_En_11_Fig9_HTML.jpg](img/A329781_3_En_11_Fig9_HTML.jpg)\n\
  \n**图 11-9.** 应用的首次运行，主视图控制器中显示总统列表，但详情视图为空\n\n让我们通过让详情视图对其接收的数据做一些更有用的处理来完成这个示例。在`DetailViewContoller.swift`中添加以下粗体行，以创建一个用于显示所选总统维基百科页面的`webView`插座变量：\n\
  \n```\nclass DetailViewController: UIViewController {\n@IBOutlet weak var detailDescriptionLabel:\
  \ UILabel!\n@IBOutlet weak var webView: UIWebView!\n```\n\n接下来，向下滚动到`configureView()`方法，并将其替换为代码清单\
  \ 11-7 中的代码。\n\n```\nfunc configureView() {\n// 更新详情项的界面\nif let detail = self.detailItem\
  \ {\nif let label = self.detailDescriptionLabel {\nlet dict = detail as! [String:\
  \ String]\nlet urlString = dict[\"url\"]!\nlabel.text = urlString\nlet url = NSURL(string:\
  \ urlString)!\nlet request = URLRequest(url: url as URL)\nwebView.loadRequest(request)\n\
  let name = dict[\"name\"]!\ntitle = name\n}\n}\n}\n代码清单 11-7.\nconfigureView 方法\n\
  ```\n\n主视图控制器设置的`detailItem`是一个包含两个键值对的字典：键`name`存储总统姓名，键`url`提供总统维基百科页面的 URL。我们使用\
  \ URL 设置详情描述标签的文本，并构造一个`URLRequest`，供`UIWebView`加载页面。同时，我们使用姓名设置详情视图控制器的标题。当视图控制器作为`UINavigationController`中的容器时，其`title`属性值会显示在导航控制器的导航栏中。这样，我们的网页视图就能加载请求的页面了。\n\
  \n\n\n## 排版后的文档\n\n我们最后需要修改的文件是 `Main.storyboard`。打开它进行编辑，在右下角找到详情视图。首先处理 GUI 中的标签（其文本显示为“Detail\
  \ view content goes here”）。先选中该标签。你会发现，在文档大纲中“Detail Scene”部分选中该标签最为方便。选中标签后，将其拖动到窗口顶部。标签应该从左到右对齐蓝色参考线，并紧贴在导航栏下方（调整其大小以确保如此）。这个标签将被重新用于显示当前\
  \ URL。但在应用启动时，用户选择总统之前，我们希望这个字段能给用户一个操作提示。\n\n双击标签，将其文本改为 `Select a President`。你还应使用尺寸检查器确保标签的位置相对于其父视图的左右两侧以及顶部边缘都有约束，如图\
  \ 11-10 所示。如果需要调整这些约束，请使用前面描述的方法进行设置。通过选中标签，然后选择菜单中的 `Editor ➤ Resolve Auto Layout\
  \ Issues ➤ Reset to Suggested Constraints`，你几乎可以精确得到你想要的效果。\n\n![A329781_3_En_11_Fig10_HTML.jpg](img/A329781_3_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10. 尺寸检查器，显示“Select a President”标签的约束设置\n\n接下来，在对象库中找到 `UIWebView`，将其拖入你刚刚移动的标签下方的空间。放置好网页视图后，使用调整手柄使其填满标签下方视图的剩余部分。让它从左边延伸到右边，从标签底部下方的蓝色参考线一直延伸到窗口的最底部。现在使用尺寸检查器将网页视图约束到父视图的左侧、底部和右侧边缘，以及顶部边缘的标签。同样，你可以通过选择菜单中的\
  \ `Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints` 来精确获得所需效果。\n\
  \n现在在文档大纲中选择主视图控制器，并打开属性检查器。在“View Controller”部分，将标题从 `Master` 改为 `Presidents`。这将把详情视图控制器顶部的导航按钮标题改为更有用的内容。\n\
  \n我们还有最后一步要完成。为了连接你创建的网页视图的 outlet，请按住 Control 键从“Detail”图标（即文档大纲中“Detail Scene”图标正下方的那个）拖动到我们的新网页视图（文档大纲中标签下方的同一部分，或故事板中），并连接\
  \ `webView` outlet。保存你的更改。\n\n现在你可以构建并运行应用了。它会让你看到每位总统的维基百科条目，如图 11-11 所示。在两种方向之间旋转显示。你会看到，在详情视图控制器的些许帮助下，分屏视图控制器是如何为你处理一切事务的。\n\
  \n![A329781_3_En_11_Fig11_HTML.jpg](img/A329781_3_En_11_Fig11_HTML.jpg)\n\n图 11-11.\
  \ Presidents 应用，显示詹姆斯·麦迪逊的维基百科页面\n\n## 创建你自己的弹出框\n\n回到第 4 章，我们看到可以以类似卡通对话气泡的形式显示操作列表（见图\
  \ 4-29）。那个对话气泡是弹出框控制器（简称弹出框）的可视化表示。当操作列表由 `UIPopoverPresentationController` 呈现时，你会获得与操作列表一起创建的弹出框。事实证明，你可以使用同一个控制器来创建你自己的弹出框。\n\
  \n为了了解其工作原理，我们将添加一个弹出框，它由一个永久的工具栏项目激活（不同于 `UISplitView` 中那种设计为时隐时现的弹出框）。这个弹出框将显示一个包含语言列表的表格视图。如果用户从列表中选择一种语言，网页视图将加载当前已显示的任何维基百科条目，并使用新语言。这做起来相当简单，因为在维基百科中切换语言只需更改\
  \ URL 中包含国家代码的一小部分即可。图 11-3 展示了我们的目标。\n\n> **注意**  \n> 在这个示例中，我们使用 `UIPopoverPresentationController`\
  \ 来显示一个表格视图控制器，但不要因此产生误解——它也可以用来处理你想要的任何视图控制器内容的显示。我们在这个示例中坚持使用表格视图，因为它是一个常见的用例，易于用相对较少的代码展示，并且你应该已经相当熟悉它了。\n\
  \n首先，在 Xcode 中右键点击“Presidents”文件夹，从弹出菜单中选择 `New File…`。当助手出现时，从 iOS 源代码部分选择 `Cocoa\
  \ Touch Class`，然后点击“Next”。在下一个屏幕上，将新类命名为 `LanguageListController`，并从“Subclass of”字段中选择\
  \ `UITableViewController`。点击“Next”，仔细检查文件保存的位置，然后点击“Create”。\n\n`LanguageListController`\
  \ 将是一个非常标准的表格视图控制器类。它将显示一个项目列表，并通过一个指向详情视图控制器的指针，在选择发生时通知详情视图控制器。编辑 `LanguageListController.swift`，在类名下方添加如下三行代码：\n\
  \n```\nclass LanguageListController: UITableViewController {\n    weak var detailViewController:\
  \ DetailViewController? = nil\n    private let languageNames: [String] = [\"英语\"\
  , \"法语\", \"德语\", \"西班牙语\"]\n    private let languageCodes: [String] = [\"en\",\
  \ \"fr\", \"de\", \"es\"]\n```\n\n这些添加的内容定义了一个指向详情视图控制器的指针（我们将在详情视图控制器自身代码中，在即将显示语言列表时设置该指针），以及两个数组：一个包含要显示的值（英语、法语等），另一个包含用于根据所选语言构建\
  \ URL 的基础值（`en`、`fr` 等）。\n\n如果你是从本书的源代码存档（或电子书）中复制粘贴此代码到你的项目，或者自己输入时有些粗心，你可能没有注意到之前声明\
  \ `detailViewController` 属性时的一个重要区别。与大多数引用对象指针的属性不同，我们在这里使用 `weak` 而不是 `strong`\
  \ 来声明它。这样做是为了避免循环引用。\n\n\n\n什么是循环引用？循环引用是指两个或多个对象相互引用，形成一个环状结构。每个对象都阻止其他对象的内存被释放。大多数潜在的循环引用可以通过仔细考虑对象的创建方式来避免，通常需要弄清楚哪个对象\"\
  拥有\"另一个对象。从这个意义上说，`DetailViewController` 的实例拥有 `LanguageListController` 的实例，因为是\
  \ `DetailViewController` 实际创建了 `LanguageListController` 来完成某项工作。每当有一对对象需要相互引用时，通常我们会希望拥有者对象保留另一个对象，而另一个对象则明确不应保留其拥有者。由于我们使用苹果公司在\
  \ Xcode 4.2 中引入的 ARC 功能，编译器为我们完成了大部分工作。我们不需要关注释放和保留对象的细节，只需使用 `weak` 关键字（而非 `strong`）来声明一个指向我们不拥有的对象的属性即可。其余工作由\
  \ ARC 处理。\n\n接下来，向下滚动到 `viewDidLoad()` 方法，并添加以下设置代码：\n\n```\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\nclearsSelectionOnViewWillAppear = false\npreferredContentSize\
  \ = CGSize(width: 320, height: (languageCodes.count * 44))\ntableView.register(UITableViewCell.self,\
  \ forCellReuseIdentifier: \"Cell\")\n}\n```\n\n这里，我们定义了视图控制器的视图在弹出窗口中显示时的大小（我们知道它确实会显示在弹出窗口中）。如果不定义该大小，弹出窗口会垂直拉伸，几乎填满整个屏幕，即使它完全可以用更小的视图显示。最后，我们注册了一个默认的表格视图单元格类，如第\
  \ 8 章所述。\n\n再往下看，有几个 Xcode 模板生成的方法，其中没有特别有用的代码——只是一个警告和一些占位文本。让我们用实际内容替换它们：\n\n\
  ```\noverride func numberOfSections(in tableView: UITableView) -> Int {\nreturn\
  \ 1\n}\noverride func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\nreturn languageCodes.count\n}\n```\n\n现在实现 `tableView(_:cellForRow\
  \ atIndexPath:)` 方法，以获取一个单元格对象并将语言名称放入其中，如代码清单 11-8 所示。\n\n```\noverride func tableView(_\
  \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
  \ {\nlet cell = tableView.dequeueReusableCell(withIdentifier: \"Cell\", for: indexPath)\n\
  // 配置单元格...\ncell.textLabel!.text = languageNames[indexPath.row]\nreturn cell\n\
  }\n代码清单 11-8.\n为表格视图获取我们的单元格\n```\n\n接下来，实现 `tableView(_:didSelectRowAtIndexPath:)`，以便通过将语言选择传回详细视图控制器，并调用其\
  \ `dismissViewControllerAnimated(_:completion:)` 方法来关闭呈现的 `LanguageListController`，从而响应用户的手势：\n\
  \n```\noverride func tableView(_ tableView: UITableView, didSelectRowAt indexPath:\
  \ IndexPath) {\ndetailViewController?.languageString = languageCodes[indexPath.row]\n\
  dismiss(animated: true, completion: nil)\n}\n```\n\n注意\n\n`DetailViewController`\
  \ 实际上还没有 `languageString` 属性，因此你会看到编译器报错。我们很快就会处理这个问题。\n\n现在是时候对 `DetailViewController`\
  \ 进行修改，以显示弹出窗口，并在用户更改显示语言或选择不同总统时生成正确的 URL。首先，在 `DetailViewController.swift` 中 `UIWebView`\
  \ 声明的下方添加以下三行代码。\n\n```\nprivate var languageListController: LanguageListController?\n\
  private var languageButton: UIBarButtonItem?\nvar languageString = \"\"\n```\n\n\
  我们添加了一些属性，用于跟踪弹出窗口所需的 GUI 组件和用户选择的语言。我们现在要做的就是修复 `DetailViewController.swift`，使其能够处理语言弹出窗口和\
  \ URL 构建。\n\n首先添加一个函数，该函数接收一个指向 Wikipedia 页面的 URL 和一个两位字母的语言代码，然后返回一个将两者组合的 URL。稍后我们将在控制器代码的适当位置使用此函数，如代码清单\
  \ 11-9 所示。\n\n```\nprivate func modifyUrlForLanguage(url: String, language lang:\
  \ String?) -> String {\nvar newUrl = url\n// 我们这里依赖于特定的 Wikipedia URL 格式。这\n// 有点脆弱！\n\
  if let langStr = lang {\n// URL 类似于 https://en.wikipedia...\nlet range = NSMakeRange(8,\
  \ 2)\nif !langStr.isEmpty && (url as NSString).substring(with: range) != langStr\
  \ {\nnewUrl = (url as NSString).replacingCharacters(in: range,\nwith: langStr)\n\
  }\n}\nreturn newUrl\n}\n代码清单 11-9.\n获取特定语言 URL 的函数\n```\n\n我们的下一步是更新 `configureView()`\
  \ 方法。该方法将使用我们刚刚定义的函数，将传入的 URL 与选定的 `languageString` 组合，以生成正确的 URL，如代码清单 11-10 所示。\n\
  \n```\nfunc configureView() {\n// 为详细项更新用户界面。\nif let detail = self.detailItem {\n\
  if let label = self.detailDescriptionLabel {\nlet dict = detail as! [String: String]\n\
  //                let urlString = dict[\"url\"]!\nlet urlString = modifyUrlForLanguage(url:\
  \ dict[\"url\"]!, language: languageString)\nlabel.text = urlString\nlet url = URL(string:\
  \ urlString)!\nlet request = URLRequest(url: url )\nwebView.loadRequest(request)\n\
  let name = dict[\"name\"]!\ntitle = name\n}\n}\n}\n代码清单 11-10.\n为特定语言的 URL 更新 configureView\
  \ 方法\n```\n\n现在让我们更新 `viewDidLoad()` 方法。在这里，我们将创建一个 `UIBarButtonItem` 并将其放置到屏幕顶部的\
  \ `UINavigationItem` 中。该按钮在被点击时会调用控制器的 `showLanguagePopover()` 方法，我们将很快实现该方法，如代码清单\
  \ 11-11 所示。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// 从 nib\
  \ 加载视图后进行任何其他设置。\nself.configureView()\nlanguageButton = UIBarButtonItem(title:\
  \ \"选择语言\", style: .plain,\ntarget: self, action:\n#selector(DetailViewController.showLanguagePopover))\n\
  navigationItem.rightBarButtonItem = languageButton\n}\n代码清单 11-11.\n修改后的 viewDidLoad\
  \ 方法\n```\n\n接下来，我们为 `languageString` 属性实现一个属性观察器，当该属性的值发生改变时会被调用。该属性观察器调用 `configureView()`，以便重新生成包含所选语言的\
  \ URL 并加载新页面：\n\n```\nvar languageString = \"\" {\ndidSet {\nif languageString !=\
  \ oldValue {\nconfigureView()\n}\n}\n}\n```\n\n现在，让我们实现当用户点击“选择语言”按钮时调用的方法。简单来说，我们显示\
  \ `LanguageListController`，并在第一次显示时创建它。然后，我们获取其弹出窗口呈现控制器，并设置控制弹出窗口出现位置的属性。将此方法放置在\
  \ `viewDidLoad()` 方法之后，如代码清单 11-12 所示。\n\n```\nfunc showLanguagePopover() {\nif\
  \ languageListController == nil {\n// 首次使用时惰性创建\nlanguageListController = LanguageListController()\n\
  languageListController!.detailViewController = self\nlanguageListController!.modalPresentationStyle\
  \ = .popover\n}\npresent(languageListController!, animated: true, completion: nil)\n\
  if let ppc = languageListController?.popoverPresentationController {\nppc.barButtonItem\
  \ = languageButton\n}\n}\n代码清单 11-12.\nshowLanguagePopover 方法\n```\n\n\n\n### 方法概述\n\
  \n在方法的第一部分，我们检查是否已经创建了 `LanguageListController`。如果尚未创建，则创建一个实例，然后将其 `detailViewController`\
  \ 属性设置为指向自身。我们还将其 `modalPresentationStyle` 属性设置为 `.popover`。此属性决定了控制器以模态方式显示时的呈现方式。有几种可能的值，你可以在\
  \ `UIViewController` 类的文档页面中了解这些值。毫不奇怪，如果你希望控制器以弹出窗口形式呈现，则需要使用 `.popover` 值。\n\n\
  接下来，我们使用 `presentViewController(_:animated:completion:)` 方法使 `LanguageListController`\
  \ 可见，就像在第 4 章显示警告时那样。调用此方法并不会立即使控制器可见——`UIKit` 会在处理完按钮点击事件后执行此操作——但它确实会创建 `UIPopoverPresentationController`\
  \ 来管理控制器的弹出窗口。在弹出窗口出现之前，我们需要告诉 `UIKit` 它应该出现在哪里。在第 4 章中，我们通过设置 `UIPopoverPresentationController`\
  \ 的 `sourceRect` 和 `sourceView` 属性，使用此技术将弹出窗口放置在特定视图附近。在此示例中，我们希望弹出窗口出现在语言按钮附近，可以通过将对按钮的引用赋值给控制器的\
  \ `barButtonItem` 属性来实现这一点。\n\n现在，在 iPad 模拟器上运行示例，然后按下“选择语言”按钮。你将发现语言列表控制器以弹出窗口形式显示，如图\
  \ 11-12 所示。你应该能够使用语言弹出菜单选择四种可用语言中的任何一种，并观察 Web 视图更新以显示该语言版本的总统页面。\n\n![A329781_3_En_11_Fig12_HTML.jpg](img/A329781_3_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12.** 选择以不同语言加载页面\n\n从一种语言切换到另一种语言时，所选总统应保持不变。同样，从一个总统切换到另一个总统时，语言也应保持不变——但实际上并非如此。试试这个：选择一个总统，将语言更改为（例如）西班牙语，然后选择另一个总统。不幸的是，语言不再是西班牙语。\n\
  \n为什么会这样？“显示详情”转场每次被调用时都会创建一个新的详情视图控制器实例。这意味着语言设置（作为详情视图控制器的一个属性存储）每次选择新总统时都会丢失。为了解决这个问题，我们需要在主视图控制器中添加几行代码。打开\
  \ `MasterViewController.swift`，并对 `prepareForSegue` 方法进行列表 11-13 所示的更改。\n\n```\n\
  override func prepare(for segue: UIStoryboardSegue, sender: AnyObject?) {\n    if\
  \ segue.identifier == \"showDetail\" {\n        if let indexPath = self.tableView.indexPathForSelectedRow\
  \ {\n            let object = presidents[indexPath.row]\n            let controller\
  \ = (segue.destinationViewController as!\n                UINavigationController).topViewController\
  \ as! DetailViewController\n            if let oldController = detailViewController\
  \ {\n                controller.languageString = oldController.languageString\n\
  \            }\n            controller.detailItem = object\n            controller.navigationItem.leftBarButtonItem\
  \ =\n                self.splitViewController?.displayModeButtonItem()\n       \
  \     controller.navigationItem.leftItemsSupplementBackButton = true\n         \
  \   detailViewController = controller\n        }\n    }\n}\n```\n\n**列表 11-13.**\
  \ 更新后的 `prepareForSegue` 方法\n\n## 本章小结\n\n在本章中，你学习了分割视图控制器及其在创建主-从应用程序中的作用。你还了解到，一个包含多个相互关联视图控制器的复杂应用程序可以完全在\
  \ Interface Builder 中进行配置。尽管分割视图现在在所有设备上都可用，但在 iPhone 6/6s Plus 和 iPad 等更大屏幕空间上，它们可能仍然最有用。\n\
  \n"
- "# 12. 使用设置和默认值进行应用自定义\n\n除了最简单的应用之外，你可能会使用的应用通常都会包含一个偏好设置窗口，用户可以在其中设置应用特定的选项。在\
  \ macOS 上，你通常会在应用的菜单中找到“偏好设置…”菜单项。选择它会打开一个窗口，用户可以在其中输入和更改各种选项。iPhone 和 iPad 包含一个名为“设置”的专用应用程序，你可能之前使用过。在本章中，我们将向你展示如何为你的\
  \ iOS 应用向“设置”应用添加设置，以及如何从应用内部访问这些设置。\n\n## 设置 Bundle\n\n“设置”应用允许用户为任何包含设置 bundle\
  \ 的应用程序输入和更改偏好设置。设置 bundle 包含一组内置于应用中的文件，这些文件告诉“设置”应用应用希望从用户那里收集哪些偏好设置，如图 12-1 所示。“设置”应用充当\
  \ iOS 用户默认值机制的通用用户界面。用户默认值存储和检索应用的偏好设置。\n\n![A329781_3_En_12_Fig1_HTML.jpg](img/A329781_3_En_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 典型 iPhone 屏幕上的“设置”应用\n\n在 iOS 应用中，`NSUserDefaults` 类提供用户默认值服务。如果你在\
  \ macOS 上使用 Cocoa 编程过，你可能已经熟悉 `NSUserDefaults`，因为它是用于在 macOS 上存储和读取偏好设置的同一个类。你的应用使用\
  \ `NSUserDefaults` 通过键值对来读取和存储偏好设置数据，就像从字典中访问键控数据一样，不同之处在于 `NSUserDefaults` 数据会持久化到文件系统，而不是存储在内存中的对象实例中。在本章中，我们将创建一个应用，添加并配置一个设置\
  \ bundle，然后从“设置”应用以及从我们自己的应用内部访问和编辑这些偏好设置。\n\n由于“设置”应用提供了标准界面，你无需为应用的偏好设置设计自己的 UI。你创建一个描述应用可用设置的属性列表，然后“设置”应用会为你创建界面。沉浸式应用（例如游戏）通常应提供自己的偏好设置视图，这样用户无需退出应用即可进行更改。即使是实用工具和生产力应用，有时也可能希望用户在不离开应用的情况下更改偏好设置。我们还将向你展示如何直接在应用中收集用户的偏好设置，并将其存储在\
  \ iOS 的用户默认值中。\n\niOS 允许用户从应用程序切换到“设置”应用，更改偏好设置，然后再切换回仍在运行的应用。我们将在本章末尾介绍如何实现这一点。\n\
  \n\n\n## 舰桥控制应用\n\n在本章中，我们将构建一个简单的应用程序，用于管理模拟星舰舰桥的若干操作环节。首先，我们将创建一个设置束，当用户启动“设置”应用时，我们的“舰桥控制”应用会显示一个条目，如图\
  \ 12-2 所示。\n\n![A329781_3_En_12_Fig2_HTML.jpg](img/A329781_3_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2. “设置”应用在模拟器中显示我们“舰桥控制”应用的条目\n\n如果用户从图 12-2 的界面中选择我们的应用，“设置”应用将深入显示一个视图，其中包含与我们应用相关的偏好设置。“设置”应用使用文本字段、安全文本字段、开关和滑块来更新数值，如图\
  \ 12-3 所示。\n\n![A329781_3_En_12_Fig3_HTML.jpg](img/A329781_3_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 我们应用的主设置视图\n\n请注意，视图中有两个项目包含展开指示器。第一个是“级别”（Rank），它会将用户带到另一个显示该项目可用选项的表格视图。在该表格视图中，用户可以选择单个值，如图\
  \ 12-4 所示。\n\n![A329781_3_En_12_Fig4_HTML.jpg](img/A329781_3_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4. 从列表中选择单个偏好设置项\n\n“更多设置”展开指示器允许用户深入查看另一组偏好设置，如图 12-5 所示。这个子视图可以包含与主设置视图相同的控件类型，甚至可以包含它自己的子视图。“设置”应用使用导航控制器，之所以需要它，是因为它支持构建层级化的偏好设置视图。\n\
  \n![A329781_3_En_12_Fig5_HTML.jpg](img/A329781_3_En_12_Fig5_HTML.jpg)\n\n图 12-5.\
  \ 我们“舰桥控制”应用的子设置视图\n\n当用户启动“舰桥控制”时，它将显示在“设置”应用中收集的偏好设置列表，如图 12-6 所示。\n\n![A329781_3_En_12_Fig6_HTML.jpg](img/A329781_3_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6. 应用主视图向用户展示偏好设置列表\n\n为了演示如何从应用内部更新偏好设置，“舰桥控制”提供了第二个视图，用户可以直接在应用中更改其他偏好设置，如图\
  \ 12-7 所示。\n\n![A329781_3_En_12_Fig7_HTML.jpg](img/A329781_3_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7. “舰桥控制”允许从应用内部设置部分偏好设置\n\n### 创建舰桥控制项目\n\n在 Xcode 中，按下 ⇧⌘N 或选择“文件”➤“新建”➤“项目...”。当新项目向导出现时，在左侧窗格的\
  \ iOS 标题下选择“应用程序”，点击“标签页应用程序”图标，然后点击“下一步”。在下一个屏幕上，将项目命名为“Bridge Control”。将“设备”设置为“通用”，然后点击“下一步”按钮。最后，为项目选择位置并点击“创建”。\n\
  \n“舰桥控制”应用基于我们在第 7 章中使用的 `UITabBarController` 类。模板创建了两个标签页，这正是我们所需要的。每个标签页都需要一个图标。这些图标位于示例源代码存档中的“12\
  \ - 图像”文件夹中。在 Xcode 中，选择 `Assets.xcassets`，然后删除 Xcode 模板添加的第一个和第二个图像。现在，通过将“12 -\
  \ 图像”中的 `singleicon.imageset` 和 `doubleicon.imageset` 文件夹拖入编辑区域，来添加替换图像。\n\n接下来，我们将图标分配给它们的标签栏项目。选择\
  \ `Main.storyboard`。你会看到标签栏控制器及其两个标签页的子控制器：一个标记为“第一视图”，另一个标记为“第二视图”。选择第一个子控制器，然后点击其标签栏项目（当前显示一个正方形和标题“First”）。在属性检查器的“栏项目”部分，将“标题”更改为“Main”，并将“图像”更改为\
  \ `singleicon`，如图 12-8 所示。现在，选择第二个子控制器的标签栏项目，将标题从“Second”更改为“Settings”，并将图像从“second”更改为\
  \ `doubleicon`。目前对应用本身的工作已经足够了——在进一步操作之前，让我们先创建它的设置束。\n\n![A329781_3_En_12_Fig8_HTML.jpg](img/A329781_3_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8. 为第一个标签栏项目设置图标\n\n### 使用设置束\n\n“设置”应用使用每个应用的设置束内容来为该应用构建设置视图。如果某个应用没有设置束，那么“设置”应用就不会为其显示任何内容。每个设置束必须包含一个名为\
  \ `Root.plist` 的属性列表，用于定义根级偏好设置视图。这个属性列表必须遵循非常精确的格式，我们将在为应用设置束设置属性列表时讨论这一点。\n\n\
  当“设置”应用启动时，它会检查每个应用的设置束，并为每个包含设置束的应用添加一个设置分组。如果我们希望偏好设置包含任何子视图，我们需要向设置束添加属性列表，并为每个子视图在\
  \ `Root.plist` 中添加一个条目。你将在本章中看到如何具体实现。\n\n\n\n### 向项目添加设置捆绑包\n\n在项目导航器中，点击 Bridge\
  \ Control 文件夹，然后选择 文件 ➤ 新建 ➤ 文件… 或按下 `⌘N`。在左侧窗格中，选择 iOS 标题下的 资源，然后选择 设置捆绑包 图标（参见图\
  \ 12-9）。点击 下一步 按钮，保持默认名称 `Settings.bundle`，然后点击 创建。\n\n![A329781_3_En_12_Fig9_HTML.jpg](img/A329781_3_En_12_Fig9_HTML.jpg)\n\
  \n**图 12-9.** 向项目添加设置捆绑包\n\n现在，你应该能在项目窗口中看到一个名为 `Settings.bundle` 的新项目。展开 `Settings.bundle`\
  \ 项目。你应该会看到两个子项：一个名为 `en.lproj` 的文件夹，其中包含一个名为 `Root.strings` 的文件；另一个是 `Root.plist`。稍后在我们讨论将应用本地化为其他语言时，会再介绍\
  \ `en.lproj`。这里，我们将重点讨论 `Root.plist`。\n\n选择 `Root.plist` 并查看编辑器窗格。你看到的是 Xcode 属性列表编辑器，如图\
  \ 12-10 所示。\n\n![A329781_3_En_12_Fig10_HTML.jpg](img/A329781_3_En_12_Fig10_HTML.jpg)\n\
  \n**图 12-10.** 属性列表编辑器窗格中的 `Root.plist`。如果你的编辑窗格看起来略有不同，不必惊慌。只需在编辑窗格中按住 Control\
  \ 键并点击，然后从出现的上下文菜单中选择 **显示原始键/值**。\n\n请注意属性列表中项目的组织结构。属性列表本质上是字典，它存储项目类型和值，并使用键来检索它们，就像\
  \ `Dictionary` 一样。属性列表中可以放入几种不同类型的节点。布尔型、数据型、日期型、数字型和字符串型节点用于存储单个数据，但也有一些处理整个节点集合的方法。除了允许存储其他字典的\
  \ `Dictionary` 节点类型外，还有 `Array` 节点，它类似于数组，用于存储其他节点的有序列表。`Dictionary` 和 `Array` 类型是唯一可以包含其他节点的属性列表节点类型。\n\
  \n> **注：** 尽管你可以在 `Dictionary` 节点类型中使用大多数类型的对象作为键，但属性列表字典节点中的键必须是字符串。不过，你可以自由地使用任何节点类型作为值。\n\
  \n创建设置属性列表时，你需要遵循一个非常具体的格式。幸运的是，`Root.plist`（即你刚刚添加到项目中的设置捆绑包自带的属性列表）完全遵循这种格式。让我们来看一下。\n\
  \n在 `Root.plist` 编辑器窗格中，键的名称既可以以真实的“原始”形式显示，也可以以更易读的形式显示。我们非常喜欢尽可能看到事物的真实面貌，因此在编辑器中任意位置右键点击，并确保上下文菜单中的\
  \ **显示原始键/值** 选项处于勾选状态，如图 12-11 所示。我们接下来的讨论将使用所有键的真实名称，因此这一步很重要。\n\n![A329781_3_En_12_Fig11_HTML.jpg](img/A329781_3_En_12_Fig11_HTML.jpg)\n\
  \n**图 12-11.** 在属性列表编辑窗格中的任意位置右键点击或按住 Control 键点击，并确保 **显示原始键/值** 选项已勾选。这将确保属性列表编辑器中使用真实名称，使你的编辑体验更精确。\n\
  \n> **警告：** 无论是通过编辑其他文件还是退出 Xcode 来离开属性列表，都可能导致 **显示原始键/值** 选项被取消勾选。如果你的文本突然看起来有点不同，请再查看一下该菜单项，确保它已被勾选。\n\
  \n字典中的项目之一是 `StringsTable`。字符串表用于将你的应用翻译成另一种语言。我们将在第 22 章讨论本地化时介绍字符串的翻译。本章不会用到它，但请随意将它保留在项目中，因为它不会造成任何损害。除了\
  \ `StringsTable`，属性列表还包含一个名为 `PreferenceSpecifiers` 的节点，它是一个数组。这个数组节点用于保存一组字典节点，每个节点要么代表用户可修改的单个偏好项，要么代表用户可以深入查看的单个子视图。\n\
  \n点击 `PreferenceSpecifiers` 左侧的展开三角形来展开该节点。你会注意到，Xcode 的模板友好地提供了四个子节点，如图 12-12 所示。这些节点并不反映我们此示例中需要的偏好设置，因此请删除项目\
  \ 1、项目 2 和项目 3（依次选择每个项目并按下 **删除** 键），只保留项目 0。\n\n![A329781_3_En_12_Fig12_HTML.jpg](img/A329781_3_En_12_Fig12_HTML.jpg)\n\
  \n**图 12-12.** 编辑器窗格中的 `Root.plist`，这次展开了 `PreferenceSpecifiers`\n\n> **注：** 要在属性列表中选择一个项目，最好点击\
  \ **键** 列的任一侧，以避免弹出 **键** 列的下拉菜单。\n\n单击项目 0 但不要展开它。Xcode 属性列表编辑器允许你只需按下 **回车** 键即可添加行。当前的选中状态——包括选中了哪一行以及它是否展开——决定了新行将插入的位置。当选中一个未展开的数组或字典时，按下\
  \ **回车** 会在选中行之后添加一个同级节点。换句话说，它会在当前选择的同一层级添加另一个节点。如果你按下 **回车**（但现在不要这样做），你会在项目 0\
  \ 之后立即得到一个新行，称为项目 1。图 12-13 展示了按下 **回车** 创建新行的示例。注意出现的下拉菜单，它允许你指定该项目所代表的偏好描述符类型——稍后会有更多说明。\n\
  \n![A329781_3_En_12_Fig13_HTML.jpg](img/A329781_3_En_12_Fig13_HTML.jpg)\n\n**图 12-13.**\
  \ 我们选择了项目 0 并按下 **回车** 创建了一个新的同级行。注意出现的下拉菜单，它允许我们指定该项目所代表的偏好描述符类型\n\n现在展开项目 0，查看其包含的内容，如图\
  \ 12-14 所示。编辑器现在已准备好向选中的项目添加子节点。如果你在此刻按下 **回车**（同样，现在不要实际按下），你将在项目 0 内部得到一个新的第一个子行。\n\
  \n![A329781_3_En_12_Fig14_HTML.jpg](img/A329781_3_En_12_Fig14_HTML.jpg)\n\n**图 12-14.**\
  \ 当你展开项目 0 时，会发现一个键为 `Type` 的行和另一个键为 `Title` 的行。这表示一个标题为 `Group` 的组\n\n项目 0 内部的一个项目的键为\
  \ `Type`。`PreferenceSpecifiers` 数组中的每个属性列表节点都必须有一个包含此键的条目。`Type` 键告诉“设置”应用与该项目关联的数据类型。在项目\
  \ 0 中，`Type` 项目的值为 `PSGroupSpecifier`。这表示该项目代表一个新组的开始。之后的每个项目都将属于此组——直到下一个 `Type`\
  \ 为 `PSGroupSpecifier` 的项目。如果你回头看图 12-3，你会看到“设置”应用以分组表格的形式呈现应用设置。设置捆绑包属性列表中的 `PreferenceSpecifiers`\
  \ 数组中的项目 0 应始终是 `PSGroupSpecifier`，这样设置才会在一个新组中开始。这一点很重要，因为每个“设置”表格中至少需要一个组。\n\n\
  \n\n`Item 0` 中唯一的另一个条目键名为 `Title`，用于在正在启动的组上方设置一个可选的标题。现在仔细查看 `Item 0` 这一行本身，你会发现它实际显示为\
  \ `Item 0 (Group – Group)`。括号中的值分别代表 `Type` 项的值（第一个`Group`）和 `Title` 项的值（第二个 `Group`）。这是\
  \ Xcode 提供的一个便捷功能，让你能直观地扫描设置包的内容。\n\n如图 12-3 所示，我们将第一个组命名为 `General Info`。双击 `Title`\
  \ 旁边的值，将其从 `Group` 改为 `General Info`（见图 12-15）。输入新标题时，你可能会注意到 `Item 0` 发生轻微变化，现在显示为\
  \ `Item 0 (Group – General Info)` 以反映新标题。在“设置”应用中，标题会以大写形式显示，因此用户实际看到的是 `GENERAL\
  \ INFO`。这一点你可以在图 12-3 中看到。\n\n![A329781_3_En_12_Fig15_HTML.jpg](img/A329781_3_En_12_Fig15_HTML.jpg)\n\
  \n图 12-15.\n\n我们将 `Item 0` 组的标题从 `Group` 改为 `General Info`\n\n### 添加文本字段设置\n\n现在我们需要在这个数组中添加第二个条目，它将代表第一个实际的偏好设置字段。我们从创建一个简单的文本字段开始。如果你在编辑窗格中单击\
  \ `PreferenceSpecifiers` 行（请不要真的操作，继续阅读）并按 Return 键添加子项，新行会插入到列表的开头，这不是我们想要的结果。我们希望在数组末尾添加一行。\n\
  \n要添加行，请单击 `Item 0` 左侧的展开三角形将其折叠，然后选中 `Item 0` 并按 Return 键。这会在当前行之后创建一个新的同级行，如图\
  \ 12-16 所示。像往常一样，添加项目时会弹出一个下拉菜单，显示默认值为 `Text Field`。\n\n![A329781_3_En_12_Fig16_HTML.jpg](img/A329781_3_En_12_Fig16_HTML.jpg)\n\
  \n图 12-16.\n\n为 `Item 0` 添加新的同级行\n\n单击下拉菜单外的任意位置使其消失，然后展开 `Item 1` 旁边的展开三角形。你会看到它包含一个设置为\
  \ `PSTextFieldSpecifier` 的 `Type` 行。这个 `Type` 值用于告知“设置”应用，我们希望用户通过文本字段编辑此设置。它还包含\
  \ `Title` 和 `Key` 两个空行，如图 12-17 所示。\n\n![A329781_3_En_12_Fig17_HTML.jpg](img/A329781_3_En_12_Fig17_HTML.jpg)\n\
  \n图 12-17.\n\n展开后的文本字段项，显示了类型、标题和键\n\n选中 `Title` 行，然后双击“值”列的空白区域。输入 `Commanding\
  \ Officer` 设置 `Title` 值。这是显示在“设置”应用中的文字。\n\n接下来对 `Key` 行执行相同操作（不，这不是笔误，你确实在操作一个名为\
  \ `Key` 的键）。在值字段中输入 `officer`（注意首字母小写）。这是在存储此文本字段输入值时使用的键。\n\n还记得我们提到过的 `NSUserDefaults`\
  \ 吗？它允许你使用类似 `Dictionary` 的键来存储值。实际上，“设置”应用在为你保存每个偏好设置时也会做同样的事情。如果你给它一个键值 `foo`，那么在你后续的应用中，你可以请求\
  \ `foo` 的值，它会返回用户为该偏好设置输入的值。稍后我们将在应用中使用键值 `officer` 从用户默认设置中检索此设置。\n\n**注意**\n\n\
  我们的 `Title` 值为 `Commanding Officer`，而 `Key` 值为 `officer`。这种大小写差异很常见，这里我们甚至用多个单词作为显示标题，用单个单词作为键来加剧这种差异。`Title`\
  \ 是屏幕显示的内容，因此首字母 C 和 O 大写，单词之间加空格，都是合理的。`Key` 是我们用来从用户默认设置中检索偏好设置的文本字符串，因此全小写同样合理。我们能对\
  \ `Title` 使用全小写吗？当然可以。我们也能对 `Key` 使用全大写。只要在保存和检索时大小写一致，偏好设置键使用哪种命名规则并不重要。\n\n现在选中\
  \ `Item 1` 三个条目中的最后一个（键名为 `Key` 的那一行），按 Return 键向 `Item 1` 字典中添加另一个条目，设置其键名为 `AutocapitalizationType`。请注意，一旦你开始输入\
  \ `AutocapitalizationType`，Xcode 会给出匹配选项列表，你可以直接从列表中选择，无需完整输入。输入 `AutocapitalizationType`\
  \ 后，按 Tab 键或单击“值”列右侧的上下箭头图标打开列表，选择可用选项。选择 `Words`。这表示文本字段会自动将用户在此字段中输入的每个单词首字母大写。\n\
  \n创建最后一个新行，设置键名为 `AutocorrectionType`，值为 `No`。这将告知“设置”应用不要自动更正此文本字段中输入的值。在任何你希望文本字段使用自动更正的情况下，你可以将此行的值设置为\
  \ `Yes`。同样，当你开始输入 `AutocorrectionType` 时，Xcode 会显示匹配选项列表，并通过弹出窗口展示有效选项。\n\n完成上述操作后，你的属性列表应如图\
  \ 12-18 所示。\n\n![A329781_3_En_12_Fig18_HTML.jpg](img/A329781_3_En_12_Fig18_HTML.jpg)\n\
  \n图 12-18.\n\n`Root.plist` 中指定的已完成文本字段\n\n\n\n### 添加应用程序图标\n\n在尝试我们的新设置之前，先为项目添加一个应用程序图标。这一步你之前已经做过，所以步骤应该很熟悉。首先，保存你刚刚编辑的属性文件`Root.plist`。接下来，使用项目导航器选择`Assets.xcassets`条目，然后选择它包含的`AppIcon`条目。在那里，你会找到一组可以放置图标的拖放目标。\n\
  \n在访达中，首先导航到源代码存档，然后进入`12 - Images`文件夹。在 Xcode 的编辑器视图`Assets.xcassets`中，从上到下依次操作，将`12\
  \ - Images`文件夹中的文件拖放如下：\n\n*   将`Settings-iPhone@2x.png`和`Settings-iPhone@3x.png`分别拖放到左上角组的`2x`和`3x`插槽中。\n\
  *   将`Spotlight-iPhone@2x.png`和`Spotlight-iPhone@3x.png`分别拖放到右上角组的`2x`和`3x`插槽中。\n\
  *   将`AppIcon-iPhone@2x.png`和`AppIcon-iPhone@3x.png`拖放到第二行组的`2x`和`3x`插槽中。\n*   将`Settings-iPad.png`和`Settings-iPad@2x.png`拖放到第三行左侧组的`1x`和`2x`插槽中。\n\
  *   将`Spotlight-iPad.png`和`Spotlight-iPad@2x.png`拖放到第三行右侧组的`1x`和`2x`插槽中。\n*   将`AppIcon-iPad.png`和`AppIcon-iPad@2x.png`拖放到底部行组的`1x`和`2x`插槽中。\n\
  *   将`AppIcon-iPadPro.png`拖放到右下角的`iPad Pro`插槽中。\n\n执行这些操作时，请留意 Xcode 的活动视图：如果你将图像放错了插槽，会出现一个警告三角形。如果发生这种情况，请在继续之前修复问题。完成后，编辑器应如图\
  \ 12-19 所示。\n\n![A329781_3_En_12_Fig19_HTML.jpg](img/A329781_3_En_12_Fig19_HTML.jpg)\n\
  \n图 12-19. 为我们的应用程序添加设置和应用程序图标\n\n就是这样。通过选择`Product` ➤ `Run`来构建并运行应用程序。你还没有为应用程序构建任何图形用户界面，因此只会看到标签栏控制器的第一个标签。按下主页按钮（或在模拟器上按下`⌘⇧H`），然后点击“设置”应用程序的图标。向下滚动，你会找到我们应用程序的条目，它使用了之前添加的图标（见图\
  \ 12-2）。点击`Bridge Control`行。你将看到一个包含单个文本字段的简单设置视图，如图 12-20 所示。\n\n![A329781_3_En_12_Fig20_HTML.jpg](img/A329781_3_En_12_Fig20_HTML.jpg)\n\
  \n图 12-20. 添加一个组和一个文本字段后，“设置”应用程序中的根视图\n\n我们还没有完成，但你现在应该已经意识到为应用程序添加偏好设置是多么容易。让我们为根设置视图添加其余字段。我们首先要添加的是一个用于用户授权码的安全文本字段。\n\
  \n### 添加安全文本字段设置\n\n回到 Xcode，点击`Root.plist`返回到你的设置说明符（不要忘记开启“显示原始键/值”，假设 Xcode 的编辑区域已经重置了此设置）。折叠`Item\
  \ 0`和`Item 1`，然后选择`Item 1`。按下`⌘C`将其复制到剪贴板，然后按下`⌘V`粘贴回来。这将创建一个与`Item 1`完全相同的新`Item\
  \ 2`。展开新条目，将标题（`Title`）更改为`Authorization Code`，并将键（`Key`）更改为`authorizationCode`。请记住，`Title`是屏幕上标签显示的内容，而`Key`用于保存值。\n\
  \n接下来，给新条目再添加一个子项。请记住，项目的顺序无关紧要，因此可以将其直接放在你刚刚编辑的`Key`项下方。为此，选择`Key`/`authorizationCode`行，然后按回车键。\n\
  \n给新条目一个键（`Key`）`IsSecure`（注意大写开头的`I`），然后按`Tab`键。你会看到 Xcode 自动将类型（`Type`）更改为`Boolean`。现在将其值（`Value`）从`NO`更改为`YES`，这告诉“设置”应用程序该字段需要像密码字段一样隐藏用户的输入，而不是像普通文本字段那样。最后，将`AutocapitalizationType`更改为`None`。我们完成的`Item\
  \ 2`如图 12-21 所示。\n\n![A329781_3_En_12_Fig21_HTML.jpg](img/A329781_3_En_12_Fig21_HTML.jpg)\n\
  \n图 12-21. 我们完成的`Item 2`，一个设计用于接受`authorizationCode`的文本字段\n\n\n\n## 添加多值字段\n\n接下来我们要添加的是一个多值字段。这种字段类型会自动生成带有展开指示符的行。点击它，用户就可以向下钻取到另一个表格，并从中选择一行。折叠项目\
  \ 2，选中该行，然后按回车键添加项目 3。使用附加在键（Key）字段上的弹出菜单选择“多值”（Multi Value），然后点击展开三角形展开项目 3。\n\n\
  展开后的项目 3 已经包含了几行。其中有一行是类型（Type）行，其值被设置为 `PSMultiValueSpecifier`。找到标题（Title）行，将其值设置为“军衔”（Rank）。接着找到键（Key）行，将其值设置为\
  \ `rank`。接下来的部分有点棘手，所以我们先讨论一下再操作。\n\n我们将为项目 3 再添加两个子节点，但它们将是数组（Array）类型的节点，而不是字符串（String）类型的节点，具体如下：\n\
  \n-   一个名为“标题”（Titles）的数组，将保存用户可供选择的值列表。\n-   另一个名为“值”（Values）的数组，将保存存储在用户默认设置（User\
  \ Defaults）中的对应值列表。\n\n因此，如果用户选择了列表中的第一项（对应于 Titles 数组中的第一项），设置应用实际上会存储 Values 数组中的第一个值。这种\
  \ Titles 和 Values 的配对方式让您可以为用户显示友好的文本，但实际上存储的是其他内容，例如数字、日期或不同的字符串。这两个数组都是必需的。如果您希望它们内容相同，可以先创建一个数组，复制它，再粘贴回去，然后修改键（Key）名称，这样就能得到两个内容相同、但存储在不同键名下的数组。我们接下来就要这样做。\n\
  \n选中项目 3（保持展开状态），然后按回车键添加一个新子节点。您会看到，Xcode 再次识别出我们正在编辑的文件类型，甚至似乎预判了我们要做什么：新的子行已经将“键”（Key）设置为\
  \ Titles，并且被配置为数组类型，这正是我们想要的！按回车键结束对键（Key）字段的编辑，然后展开 Titles 行，再按回车键添加一个子节点。重复此操作五次，这样您总共会有六个子节点。所有六个节点都应设置为字符串（String）类型，并赋予以下值：准尉（Ensign）、中尉（Lieutenant）、上尉（Lieutenant\
  \ Commander）、少校（Commander）、上校（Captain）和准将（Commodore）。\n\n创建完所有六个节点并输入值后，折叠 Titles\
  \ 行并选中它。接着，按 ⌘C 复制它，再按 ⌘V 粘贴回来。这将创建一个键名为“Titles - 2”的新项目。双击键名“Titles - 2”，将其改为“Values”。\n\
  \n我们的多值字段就快完成了。字典里还有一个必需的值，那就是默认值。多值字段必须选中一行——且只能选中一行。因此，我们需要指定在未作任何选择时要使用的默认值；它必须对应于\
  \ Values 数组中的某一项（如果与 Titles 数组不同的话，则不要对应 Titles 数组的项）。在我们创建该项目时，Xcode 已经添加了一个“默认值”（`DefaultValue`）行，所以我们现在要做的只是将其值设置为“准尉”（Ensign）。现在就去操作吧。图\
  \ 12-22 展示了项目 3 的最终版本。\n\n![A329781_3_En_12_Fig22_HTML.jpg](img/A329781_3_En_12_Fig22_HTML.jpg)\n\
  \n图 12-22. 我们完成后的项目 3，这是一个多值字段，旨在让用户从六个可选值中选择一个\n\n让我们检查一下工作成果。保存属性列表，再次构建并运行应用程序。当您的应用启动后，按下\
  \ Home 键并启动“设置”应用。当您选择“Bridge Control”时，应该在根级视图上看到三个字段，如图 12-23 所示。随意操作一番，然后我们继续。\n\
  \n![A329781_3_En_12_Fig23_HTML.jpg](img/A329781_3_En_12_Fig23_HTML.jpg)\n\n图 12-23.\
  \ 我们的三个字段已经实现完成\n\n## 添加开关切换设置\n\n接下来需要从用户那里获取的是一个布尔值，用于指示我们的曲速引擎是否应该开启。为了在偏好设置中捕获布尔值，我们将通过在\
  \ `PreferenceSpecifiers` 数组中再添加一个类型为 `PSToggleSwitchSpecifier` 的项目，来告诉“设置”应用使用 `UISwitch`。\n\
  \n如果项目 3 当前是展开的，则折叠它，然后单击选中它。按回车键创建项目 4。使用下拉菜单选择“开关”（Toggle Switch），然后点击展开三角形展开项目\
  \ 4。您会看到已经有一个键为 Type、值为 `PSToggleSwitchSpecifier` 的子行。将空的 Title 行值设置为“曲速引擎”（Warp\
  \ Drive），并将 Key 行值设置为 `warp`。\n\n这个字典中还有一个必需项，即默认值。与多值设置类似，Xcode 已经为我们创建了一个“默认值”（`DefaultValue`）行。让我们默认开启曲速引擎，将\
  \ `DefaultValue` 行的值设置为 YES。图 12-24 展示了完成后的项目 4。\n\n![A329781_3_En_12_Fig24_HTML.jpg](img/A329781_3_En_12_Fig24_HTML.jpg)\n\
  \n图 12-24. 我们完成后的项目 4，一个用于开关曲速引擎的切换开关\n\n## 添加滑块设置\n\n接下来需要实现的是滑块。在“设置”应用中，滑块两端可以带小图片，但不能带标签。让我们把滑块放在一个带有标题头（header）的独立分组中，这样用户就能知道滑块的作用。首先折叠项目\
  \ 4。现在单击项目 4，然后按回车键创建新行。使用弹出菜单将新项目转换为“分组”（Group），然后点击该项目的展开三角形将其展开。您会看到 Type 已经设置为\
  \ `PSGroupSpecifier`。这将会告诉“设置”应用在此位置开始一个新的分组。双击 Title 行中的值，将其改为“曲速系数”（Warp Factor）。\n\
  \n折叠项目 5 并选中它，然后按回车键添加一个同级新行。使用弹出菜单将新项目改为“滑块”（Slider），这将指示“设置”应用使用 `UISlider` 来获取用户输入的该信息。展开项目\
  \ 6，将 Key 行的值设置为 `warpFactor`，以便“设置”应用知道存储此值时使用哪个键。\n\n我们将允许用户输入从 1 到 10 的值。我们将默认值设置为曲速\
  \ 5。滑块需要有最小值、最大值和起始值（即默认值）；所有这些值在属性列表中都必须存储为数字，而不是字符串。幸运的是，Xcode 已经为所有这些值创建了行。将\
  \ `DefaultValue` 行的值设置为 5，`MinimumValue` 行的值设置为 1，`MaximumValue` 行的值设置为 10。\n\n\
  如果您想测试滑块，现在就可以进行。我们将再进行一些自定义设置。如前所述，您可以在滑块两端各放置一张图片。让我们提供一些小图标，以表明将滑块向左移动会减速，向右移动会加速。\n\
  \n\n\n#### 向设置捆绑包添加图标\n\n在本节附带的项目归档的`12 - Images`文件夹中，你将找到名为`rabbit.png`和`turtle.png`的两个图标。我们需要将这两个图标都添加到设置捆绑包中。由于这些图像需要被“设置”应用使用，我们不能仅仅将它们放在`Bridge\
  \ Control`文件夹中；我们需要把它们放入设置捆绑包，这样“设置”应用才能访问它们。为此，我们需要在访达中打开设置捆绑包。在项目导航器中按住 Control\
  \ 键点击`Settings.bundle`图标，当上下文菜单出现时，选择`Show in Finder`（如图 12-25 所示），以在访达中显示该捆绑包。\n\
  \n![A329781_3_En_12_Fig25_HTML.jpg](img/A329781_3_En_12_Fig25_HTML.jpg)\n\n图 12-25.\
  \ `Settings.bundle` 上下文菜单\n\n请记住，捆绑包在访达中看起来像文件，但它们实际上是文件夹。当访达窗口打开显示`Settings.bundle`文件时，按住\
  \ Control 键点击该文件，并从出现的上下文菜单中选择`Show Package Contents`。这将在新的访达窗口中打开设置捆绑包。你应该会看到与\
  \ Xcode 中`Settings.bundle`里相同的两个项目。将`rabbit.png`和`turtle.png`这两个图标文件，从`12 - Images`文件夹复制到访达窗口中`Settings.bundle`包的内容里，放在`en.proj`和`Root.plist`旁边。你可以让这个窗口在访达中保持打开状态，因为我们很快还需要复制另一个文件。现在我们将回到\
  \ Xcode，并告诉滑块使用这两个图像。\n\n回到 Xcode，返回`Root.plist`，在`Item 6`下再添加两个子行。其中一个将键（Key）设为`MinimumValueImage`，值（Value）设为`turtle`。另一个将键设为`MaximumValueImage`，值设为`rabbit`。图\
  \ 12-26 显示了我们完成的`Item 6`。\n\n![A329781_3_En_12_Fig26_HTML.jpg](img/A329781_3_En_12_Fig26_HTML.jpg)\n\
  \n图 12-26. 完成的`Item 6`：一个带有乌龟和兔子图标的滑块，分别表示慢速和快速\n\n保存属性列表，然后构建并运行应用，确保一切按预期工作。你应该能够导航到“设置”应用，并找到等待你的滑块，其两端分别是困倦的乌龟和欢快的兔子，如图\
  \ 12-27 所示。\n\n![A329781_3_En_12_Fig27_HTML.jpg](img/A329781_3_En_12_Fig27_HTML.jpg)\n\
  \n图 12-27. 我们有文本字段、多值字段、一个切换开关和一个滑块\n\n#### 添加子设置视图\n\n我们将添加另一个偏好设置说明符，以告知“设置”应用我们想要显示一个子设置视图。此说明符会呈现一个带有展开指示符的行，当点击时，会将用户带到包含大量偏好设置的全新视图。\n\
  \n由于我们不希望这个新的偏好设置与滑块分在同一组，我们首先复制`Item 0`中的组说明符，并将其粘贴到`PreferenceSpecifiers`数组的末尾，为我们的子设置视图创建一个新组。在`Root.plist`中，折叠所有展开的项目，然后单击`Item\
  \ 0`选中它，并按`⌘C`将其复制到剪贴板。接下来，选择`Item 6`，然后按`⌘V`粘贴出一个新的`Item 7`。展开`Item 7`，双击键`Title`旁边的`Value`列，将其从`General\
  \ Info`更改为`Additional Info`。\n\n现在再次折叠`Item 7`。选中它并按`Return`键添加`Item 8`，这将是我们的实际子视图。点击展开三角形将其展开。找到`Type`行，将其值设为`PSChildPaneSpecifier`，然后将`Title`行的值设为`More\
  \ Settings`。我们需要为`Item 8`添加最后一行，这将告诉“设置”应用为`More Settings`视图加载哪个属性列表。添加另一个子行，将其键设为`File`（你可以通过将该组中最后一行的键从`Key`更改为`File`来实现），值设为`More`（见图\
  \ 12-28）。文件扩展名`.plist`是默认的，不得包含在内（如果包含了，“设置”应用将找不到`.plist`文件）。\n\n![A329781_3_En_12_Fig28_HTML.jpg](img/A329781_3_En_12_Fig28_HTML.jpg)\n\
  \n图 12-28. 完成的`Items 7`和`8`，设置了新的`Additional Info`设置组，并提供了指向文件`More.plist`的子窗格链接\n\
  \n我们正在向主偏好设置视图添加一个子视图。我们已配置设置捆绑包，以指示该子视图中的设置是在`More.plist`文件中指定的，因此我们需要将一个名为`More.plist`的文件添加到设置捆绑包中。我们无法在\
  \ Xcode 中向捆绑包添加新文件，并且属性列表编辑器的“保存”对话框也不允许我们保存到捆绑包中，因此我们需要创建一个新的属性列表，将其保存在别处，然后使用访达将其拖入`Settings.bundle`窗口。当你创建自己的子设置视图时，最简单的方法是复制一份`Root.plist`并为其命名，然后删除除第一个之外的所有现有偏好设置说明符，并为该新文件添加你需要的任何偏好设置说明符。为了省去这些麻烦，你可以从本书附带项目归档的`12\
  \ - Images`文件夹中获取`More.plist`文件，然后将其拖入我们之前打开的`Settings.bundle`窗口中，放在`Root.plist`旁边。\n\
  \n现在，我们的设置捆绑包已全部完成。请随意构建、运行和测试“设置”应用。你应该能够进入子视图并为所有其他字段设置值。请尽情尝试，如果想的话，还可以对属性列表进行更改。\n\
  \n**提示**\n\n我们已经介绍了几乎所有可用的配置选项（至少在撰写本文时）。你可以在 iOS 开发中心名为`Settings Application Schema\
  \ Reference`的文档中找到设置属性列表格式的完整文档。你可以从以下页面获取该文档以及大量其他有用的参考文档：[`http://developer.apple.com/library/ios/navigation/`](http://developer.apple.com/library/ios/navigation/)。\n\
  \n在继续之前，在 Xcode 的项目导航器中选择`Assets.xcassets`项目，然后将项目归档中`12 - Images`文件夹里的`rabbit.png`和`turtle.png`图标复制到编辑器区域的左侧。这将把这些图标作为新的图像资源添加到项目中，可供使用。我们将在应用程序中使用它们来显示当前设置的值。\n\
  \n你可能已经注意到，你刚刚添加的两个图标与之前添加到设置捆绑包中的完全相同。你可能想知道为什么我们将它们两次添加到 Xcode 项目中。请记住，iOS 应用程序无法读取其他应用程序沙盒中的文件。设置捆绑包不会成为我们应用沙盒的一部分——它会成为“设置”应用沙盒的一部分。由于我们还想在应用中使用这些图标，我们需要单独将它们添加到`Assets.xcassets`中，这样它们也会被复制到我们应用的沙盒中。\n\
  \n### 在应用程序中读取设置\n\n现在我们已经解决了问题的一半。用户可以使用“设置”应用声明他们的偏好设置，但我们如何从应用程序内部获取这些设置呢？事实证明，这是简单的一步。在我们编写代码检索设置之前，请打开“设置”应用，找到我们应用的设置，并为每个设置设置一个值，以便应用程序在我们即将创建的用户界面中有内容可以显示。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 检索用户设置\n\n我们将使用一个名为\
  \ `UserDefaults (NSUserDefaults)` 的类来访问用户的设置。`UserDefaults` 以单例模式实现，这意味着只有一个 `UserDefaults`\
  \ 实例来保存我们应用程序的设置。要访问该唯一实例，我们调用类方法 `standard`，如下所示：\n\n```\nlet defaults = UserDefaults.standard\n\
  ```\n\n一旦我们获得了标准用户默认项的指针，就可以像使用 `Dictionary` 一样使用它。要从其中获取一个值，我们可以调用 `object( forKey:\
  \ )`，该方法会返回一个对象，一个 `String` 或一个 `Foundation` 对象，例如 `Date (NSDate)` 或 `NSNumber`。如果我们想以标量形式（如\
  \ `int`、`float` 或 Boolean）检索该值，我们可以使用其他方法，例如 `int( forKey: )`、`float( forKey: )`\
  \ 或 `bool( forKey: )`。\n\n在您为此应用程序创建属性列表时，实际上是在一个 `.plist` 文件内部创建了一个 `PreferenceSpecifiers`\
  \ 数组。在“设置”应用程序中，其中一些说明符用于创建组，而另一些则用于创建供用户交互的界面对象。这些才是我们真正感兴趣的说明符，因为它们保存着真实设置数据的键。每个与用户设置绑定的说明符都有一个名为\
  \ `Key` 的 `Key`。花点时间回去检查一下。例如，我们滑块的 `Key` 的值为 `warpFactor`，而授权代码字段的 `Key` 为 `authorizationCode`。我们将使用这些键来检索用户设置。\n\
  \n我们不会在方法中直接使用字符串作为每个键，而是为这些值定义一些常量。这样，我们就可以在代码中使用这些常量，而不是内联字符串，从而避免因输入错误而带来的风险。我们将在单独的\
  \ Swift 文件中设置这些常量，因为稍后我们会在多个类中使用其中的一些常量。所以，在 Xcode 中，按下 `⌘N`，然后在文件创建窗口的 iOS 部分，选择\
  \ Source，然后选择 Swift File。按下 Next，将文件命名为 `Constants.swift` 并点击 Create。打开新创建的文件，并添加代码清单\
  \ 12-1 中的代码。\n\n```\nlet officerKey = \"officer\"\nlet authorizationCodeKey = \"\
  authorizationCode\"\nlet rankKey = \"rank\"\nlet warpDriveKey = \"warp\"\nlet warpFactorKey\
