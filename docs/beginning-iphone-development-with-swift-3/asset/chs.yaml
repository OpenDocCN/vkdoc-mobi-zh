  \n如果滑杆尚未被选中，请单击选中它，然后调出属性检查器。将最小值设置为 `1.00`，最大值设置为 `10.00`，当前值设置为 `5.00`。接着，为“最小图像”选择“乌龟”，为“最大图像”选择“兔子”。如果这些选项没有出现在弹出按钮中，请确保已将图像拖入\
