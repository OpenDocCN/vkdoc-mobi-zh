  \ 12-30 作为放置指南。\n\n接着，从库中拖出一个开关，将其放置在视图的右侧，与显示“曲速引擎”的标签相对。按住 Control 键，从“设置场景”顶部的视图控制器图标（黄色图标）拖到新开关上，并将其连接到\
  \ `engineSwitch` 输出口。接下来，在助理编辑器中打开 `SecondViewController`，按住 Control 键从开关拖到文件底部闭合花括号的上方。释放鼠标，创建一个名为\
  \ `onEngineSwitchTapped` 的动作，保持弹出窗口中其他所有选项的默认值不变。\n\n从库中拖出一个滑杆，将其放置在显示“曲速因子：”的标签下方。调整滑杆的大小，使其从左边缘的蓝色参考线延伸到右边缘的蓝色参考线。现在，按住\
  \ Control 键从“设置场景”顶部的视图控制器图标拖到滑杆上，并将其连接到 `warpFactorSlider` 输出口。接着，按住 Control 键从滑杆拖到\
