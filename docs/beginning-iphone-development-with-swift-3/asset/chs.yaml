  \ 我们的 Hello World 应用的新应用图标\n\n**注意**\n\n在我们学习本书的过程中，模拟器的主屏幕会因我们运行的示例应用图标而变得杂乱。如果你想从主屏幕清除旧应用，请从\
  \ iOS 模拟器的应用菜单中选择 iOS Simulator ➤ Reset Content and Settings…（重置内容和设置…）。\n\n\n\n\
  ## 启动屏幕\n\n当你启动应用程序时，可能已经注意到了加载过程中出现的白色启动屏幕。iOS 应用一直都有启动屏幕。由于将应用加载到内存需要一定时间（应用越大，耗时越长），该屏幕的作用是让用户尽快看到应用正在启动。在\
  \ iOS 8 之前，你可以提供一张图片（实际上可以是多张不同尺寸的图片）作为应用的启动屏幕。iOS 会加载正确的图片，并在加载应用其余部分之前立即显示它。从\
  \ iOS 8 开始，你仍然可以选择这种方式，但苹果现在强烈建议使用启动文件而非启动图片，如果你的应用仍需支持更早的版本，也可以同时使用启动图片。\n\n启动文件是一个包含启动屏幕用户界面的故事板。在运行\
  \ iOS 8 及更高版本的设备上，如果检测到启动文件，系统会优先使用它而不是启动图片。在项目导航器中查看，你会发现项目中已经存在一个启动文件——名为 `LaunchScreen.storyboard`。如果你在界面构建器中打开它，会看到它只包含一个空白视图，如图\
  \ 2-29 所示。\n\n![A329781_3_En_2_Fig29_HTML.jpg](img/A329781_3_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29. 我们应用的默认启动文件\n\n苹果希望你使用界面构建器自己构建启动屏幕，就像构建应用用户界面的其他部分一样。苹果建议不要尝试创建复杂或视觉上令人印象深刻的启动屏幕，因此我们将遵循这些指导原则。相反，我们只需在故事板上添加一个标签并更改主视图的背景颜色，这样你就可以将启动屏幕与应用本身区分开来。与之前一样，将一个标签拖到故事板上，将其文本改为\
  \ `Hello World`，然后使用属性检查器（见图 2-23）将字体更改为 `System Bold 32`。确保标签被选中，在 Xcode 菜单中点击\
  \ `Editor ➤ Size to Fit Content`。现在将标签居中在视图中，点击 `Editor ➤ Resolve Auto Layout Issues\
  \ ➤ Add Missing Constraints` 来添加布局约束，确保标签保持在该位置。接下来，通过在故事板或文档大纲中点击选择主视图，使用属性检查器更改其背景颜色。为此，找到标记为\
  \ `Background` 的控件并选择任何你喜欢的颜色——由于这是一本 Apress 的书，我选择了黄色。现在只需再次运行应用。你会看到启动屏幕出现，然后随着应用本身出现而淡出，如图\
  \ 2-30 所示。\n\n![A329781_3_En_2_Fig30_HTML.jpg](img/A329781_3_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30. `Hello World` 应用的黄色启动屏幕\n\n你可以在苹果的 iOS 人机界面指南文档中了解更多关于启动文件、启动图片和应用图标的信息，在线访问地址为\
  \ [`https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/LaunchImages.html`](https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/LaunchImages.html)。\n\
  \n## 在设备上运行应用\n\n在结束本章之前，我们还有一件事要做。让我们加载应用并在实际设备上运行它。第一步是使用充电线将 iOS 设备连接到 Mac。连接后，Xcode\
  \ 应该会识别设备并花一些时间读取其符号信息。你可能会在 Mac 和设备上看到安全提示，询问是否要让它们相互信任。等待 Xcode 完成从设备处理符号文件（检查活动视图确认），然后打开工具栏中的设备选择器。你应该会看到设备列在其中，如图\
  \ 2-31 所示。\n\n![A329781_3_En_2_Fig31_HTML.jpg](img/A329781_3_En_2_Fig31_HTML.jpg)\n\
  \n图 2-31. 设备和模拟器列表现在包括作者的 iPhone 6s\n\n选择设备并点击工具栏上的运行按钮，开始在其上安装和运行应用的过程。Xcode 会重新构建应用并在你的设备上运行它。然而，由于我使用的是\
  \ Xcode 8 的早期测试版，你可能会看到类似图 2-32 所示的提示。\n\n![A329781_3_En_2_Fig32_HTML.jpg](img/A329781_3_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32. 如果自动配置功能失败，你可能会看到此消息注意\n\n苹果在 Xcode 8 中对配置系统进行了改进，许多“修复问题”功能已经过时，过程更加无缝和成功。在这里，我们讨论这个问题是为了确保完成配置，让应用在我们的实际设备上运行。\n\
  \n在 iOS 设备上安装应用之前，应用必须拥有配置描述文件并进行签名。签名应用可以让设备识别应用的作者，并检查二进制文件在创建后是否被篡改。配置描述文件包含的信息告诉\
  \ iOS 应用需要哪些功能（例如 iCloud 访问）以及可以在哪些特定设备上运行。要签名应用，Xcode 需要证书和私钥。\n\n提示：你可以在苹果应用分发指南中的应用分发工作流程中阅读关于代码签名、配置描述文件、证书和私钥的内容，地址为\
  \ [`https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/AppDistributionGuide`](https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/AppDistributionGuide)。\n\
  \n在 iOS 开发的早期，你必须登录开发者计划帐户并手动创建这两项，然后注册你想要安装应用的测试设备。这是一个复杂且令人沮丧的过程。Xcode 7 经过改进已经足够智能，可以为你完成这些操作，而\
  \ Xcode 8 则进一步改进，因此当你只需要将应用放到设备上进行测试时，这一切都可以正常工作。在某些情况下，对于需要分发给特定用户的不同专用构建版本，我们可能需要自定义配置过程，但对于我们的学习过程，默认的、易于使用的机制已经足够。\n\
  \n可能会出现一些问题。首先，如果你看到消息说应用 ID 不可用，你需要选择另一个。应用 ID 基于项目名称和创建项目时选择的组织标识符（见图 2-4）。如果你使用了\
  \ `com.beginningiphone` 或其他已被他人注册的标识符，就会看到此消息。要修复它，打开项目导航器并选择项目树顶部的 `Hello World`\
  \ 节点。然后点击文档大纲中 `TARGETS` 部分下的 `Hello World` 节点。最后，点击编辑器区域顶部的 `General` 按钮（见图 2-33）。\n\
  \n\n\n## 排版后的文本\n\n![A329781_3_En_2_Fig33_HTML.jpg](img/A329781_3_En_2_Fig33_HTML.jpg)\n\
  \n**图 2-33.** 更改应用包标识符\n\nXcode 用于签名的 App ID 取自编辑器中的 `Bundle Identifier` 字段。你会看到其中包含你创建项目时选择的\
  \ `Organization Identifier`——该字段中高亮显示的部分如图 2-33 所示。选择其他值并尝试重新构建。最终，你需要找到一个尚未被使用的标识符。完成后，请记下它，并在创建新项目时务必使用该值填写\
  \ `Organization Identifier` 字段。只要正确完成一次，Xcode 就会记住它，因此你无需再次操作。\n\n另一个可能出错的情况如图 2-34\
  \ 所示。\n\n![A329781_3_En_2_Fig34_HTML.jpg](img/A329781_3_En_2_Fig34_HTML.jpg)\n\n\
  **图 2-34.** 在 iOS 9 或 10 中启动失败\n\n只有当你未注册开发者计划时，才会看到此消息。这意味着你的 iOS 设备不信任你运行用 Apple\
  \ ID 签名的应用程序。要解决此问题，请打开设备上的“设置”应用，然后转到 **通用** ➤ **描述文件**。你会进入一个页面，其中包含一个显示你 Apple\
  \ ID 的表格。点击该表格行，打开另一个页面，如图 2-35 所示。\n\n![A329781_3_En_2_Fig35_HTML.jpg](img/A329781_3_En_2_Fig35_HTML.jpg)\n\
  \n**图 2-35.** 在 iOS 9 及以上版本中，默认情况下，没有开发者计划成员资格的开发者不被信任\n\n## 本章小结\n\n我们应该对本节所取得的进展感到满意。虽然看起来我们并未完成太多工作，但实际上我们涵盖了很多内容。你了解了\
  \ iOS 项目模板，创建了一个应用程序，学习了关于 Xcode 8 的关键知识，开始使用 Interface Builder，学习了如何设置应用图标以及如何在模拟器和真实设备上运行应用程序。\n\
  \n然而，Hello World 程序严格来说是一个单向应用程序。我们向用户展示了一些信息，但从未接收他们的任何输入。在下一章中，我们将探讨如何从 iOS 设备用户那里获取输入，并根据该输入执行操作。\n\
  \n"
- "# 3. 基本用户交互\n\n我们的 Hello World 应用很好地介绍了如何使用 Xcode 和 Cocoa Touch 进行 iOS 开发，但它缺少一个关键功能——与用户交互的能力。如果无法接受用户输入，我们工作的实用性将受到严重限制。\n\
  \n在本章中，我们将编写一个稍微复杂一点的应用程序——它将包含两个按钮和一个标签（见图 3-1）。当用户点击任一按钮时，标签的文本会发生变化。这展示了创建交互式\
  \ iOS 应用所涉及的关键概念。我们还将了解 `NSAttributedString` 类，它允许你在许多 Cocoa Touch 视觉元素中使用样式化文本。\n\
  \n![A329781_3_En_3_Fig1_HTML.jpg](img/A329781_3_En_3_Fig1_HTML.jpg)\n\n**图 3-1.**\
  \ 在本章中，我们将开发这个简单的双按钮应用\n\n## MVC 范式\n\n即使你现在不了解 MVC，你最终也会了解。它代表模型-视图-控制器（MVC），是一种将构成\
  \ GUI 应用程序的代码进行划分的非常合乎逻辑的方式。如今，几乎所有面向对象的框架都建立在 MVC 之上，但很少有像 Cocoa Touch 那样严格遵守 MVC\
  \ 模型的。\n\nMVC 模式将所有功能划分为三个不同的类别：\n\n* **模型：** 持有应用程序数据的类。\n* **视图：** 由用户可以看到和交互的窗口、控件和其他元素组成。\n\
  * **控制器：** 将模型和视图绑定在一起的代码。它包含决定如何处理用户输入的应用程序逻辑。\n\nMVC 确保实现这三种类型代码的对象尽可能彼此不同。你创建的任何对象都应能轻易识别为属于这三个类别之一，并且几乎不包含或被归类为其他两个类别的功能。例如，实现按钮的对象不应包含处理按钮被点击时数据的代码，而实现银行账户的代码不应包含绘制表格以显示其交易记录的代码。\n\
  \nMVC 有助于确保最大程度的可重用性。实现通用按钮的类可以在任何应用程序中使用。而实现一个在点击时执行特定计算的按钮的类，则只能在其最初编写的应用程序中使用。\n\
  \n在编写 Cocoa Touch 应用程序时，你主要通过使用 Interface Builder 来创建视图组件，不过有时也会在代码中修改，甚至创建部分用户界面。\n\
  \n你通过编写 Swift 类来保存数据的方式创建模型。在本章的应用程序中，我们不会创建任何模型对象，因为我们不需要存储或保留数据。在后续章节中，随着我们的应用程序变得更加复杂，我们将引入模型对象。\n\
  \n控制器组件包含你创建且特定于你的应用程序的类。控制器是完全自定义的类，但通常它们作为 UIKit 框架中几个现有通用控制器类（如 `UIViewController`）的子类存在。通过继承这些现有类中的一个，你可以免费获得大量功能，无需重复造轮子。\n\
  \n随着我们对 Cocoa Touch 的深入，我们会很快发现 UIKit 框架的类是如何遵循 MVC 原则的。在开发过程中牢记这一概念，你将最终编写出更清晰、更易于维护的\
  \ Swift 代码。\n\n## 创建 ButtonFun 应用\n\n是时候创建我们的下一个 Xcode 项目了。我们将使用与上一章相同的模板：单视图应用程序。通过再次从这个简单模板开始，更容易看到视图和控制器对象是如何在\
  \ iOS 应用程序中协同工作的。我们将在后面的章节中使用其他一些模板。\n\n启动 Xcode 并选择 **文件** ➤ **新建** ➤ **项目…** 或按\
  \ ⌘N。选择 `Single View Application` 模板，然后点击 **Next**。\n\n你会看到与上一章相同的选项表。在 `Product\
  \ Name` 字段中，输入我们新应用程序的名称：**Button Fun**。`Organization Name`、`Company Identifier`\
  \ 和 `Language` 字段应该仍然包含你在上一章中使用的值，因此你可以保留它们不变。同样，我们将使用 Auto Layout 来创建一个适用于所有 iOS\
  \ 设备的应用程序，因此在 `Devices` 字段中，选择 `Universal`。图 3-2 显示了完整的选项表。\n\n![A329781_3_En_3_Fig2_HTML.jpg](img/A329781_3_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** 命名我们的项目并选择选项\n\n点击 **Next**。系统会提示你选择项目位置。你可以根据自己的偏好勾选或取消勾选 **Create\
  \ Git repository** 复选框。点击 **Create** 并将项目保存到你的书籍项目目录中。\n\n\n\n## ViewController（视图控制器）\n\
  \n在本章稍后部分，我们将像上一章一样，使用 Interface Builder 为应用程序设计视图（或用户界面）。在此之前，我们先查看并修改一些已创建的源代码文件。在开始修改之前，先看看系统为我们创建了哪些文件。在项目导航器中，`Button\
  \ Fun` 组应该已经展开；如果没有，请点击其旁边的展开三角形（见图 [3-3]）。\n\n![A329781_3_En_3_Fig3_HTML.jpg](img/A329781_3_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 项目导航器显示项目模板为我们创建的类文件\n\n`Button Fun` 组应包含两个源代码文件，以及主故事板文件、启动屏幕故事板文件、用于存放应用所需图片的资源目录（Asset\
  \ Catalog）和一个 `Info.plist` 文件（我们将在后续章节讨论）。这两个源代码文件实现了应用所需的类：应用程序代理（Application Delegate）和应用唯一视图的视图控制器。我们将在本章稍后部分查看应用程序代理。首先，我们来处理系统为我们创建的视图控制器类。\n\
  \n名为 `ViewController` 的控制器类管理着应用的视图。顾名思义，这个类就是一个视图控制器。在项目导航器中点击 `ViewController.swift`，查看视图控制器文件的内容（见\
  \ [3-1] 所示）。\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n  \
  \  override func viewDidLoad() {\n        super.viewDidLoad()\n        // 视图加载后（通常从\
  \ nib 文件）进行额外设置\n    }\n    override func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
  \        // 释放可重建的资源\n    }\n}\nListing 3-1. 模板生成的 ViewController 代码\n```\n\n由于是模板生成的，目前内容并不多。`ViewController`\
  \ 作为 `UIViewController` 的子类存在，后者是之前提到的通用控制器类之一。它是 `UIKit` 框架的一部分，通过继承这个类，我们获得了一系列内置功能。Xcode\
  \ 不知道应用具体需要什么功能，但它知道我们肯定会添加一些功能，因此创建了这个类，供我们自行编写具体的功能代码。\n\n## 输出口（Outlets）与操作（Actions）\n\
  \n在[第 2 章]中，我们使用 Xcode 的 Interface Builder 设计了一个简单的用户界面，并在[3-1]中看到了视图控制器类的框架。现在我们来讨论视图控制器类中的代码如何与故事板中的对象（如按钮、标签等）进行交互。控制器类可以通过一种称为输出口（Outlet）的特殊属性来引用故事板或\
  \ nib 文件中的对象。可以将输出口视为指向用户界面中某个对象的指针。例如，假设你在 Interface Builder 中创建了一个文本标签（和[第 2 章]中一样），并想通过代码更改标签的文本。通过声明一个输出口并将其连接到该标签对象，你就可以在代码中使用该输出口来更改标签显示的文本。我们将在本章稍后部分演示这一操作。\n\
  \n反过来，故事板或 nib 文件中的界面对象可以设置为触发控制器类中的特殊方法。这些特殊方法被称为操作方法（Action Methods），或简称为操作（Actions）。例如，你可以告诉\
  \ Interface Builder，当用户点击某个按钮时，应调用代码中的特定操作方法。你甚至可以指示 Interface Builder，当用户首次触摸按钮时调用一个操作方法，而当手指从按钮上抬起时则调用另一个不同的操作方法。\n\
  \nXcode 支持多种创建输出口和操作的方式。一种方式是在源代码中先指定它们，然后使用 Interface Builder 将它们与代码连接。但 Xcode\
  \ 的助理视图（Assistant View）提供了一种更快速、更直观的方法，让我们可以一步完成输出口和操作的创建与连接，我们很快就会看到这个过程。在开始建立连接之前，我们先更详细地讨论一下输出口和操作。输出口和操作是创建\
  \ iOS 应用时最基本的两个构建块，因此理解它们的含义和工作原理非常重要。\n\n### 输出口（Outlets）\n\n输出口是带有 `@IBOutlet`\
  \ 装饰标记的普通 Swift 属性。一个输出口看起来像这样：\n\n```\n@IBOutlet weak var myButton: UIButton!\n\
  ```\n\n这个例子定义了一个名为 `myButton` 的输出口，它可以设置为指向用户界面中的任意按钮。\n\nSwift 编译器看到 `@IBOutlet`\
  \ 装饰时并不会做任何特殊处理。它的唯一作用就是作为提示，告诉 Xcode 这是一个我们希望连接到故事板或 nib 文件中某个对象的属性。任何你创建并希望连接到故事板或\
  \ nib 文件中对象的属性，前面都必须加上 `@IBOutlet`。幸运的是，正如你将看到的，在 Xcode 中只需将对象拖拽到要链接的属性上，甚至只需拖拽到你想在其中创建新输出口的类中，即可创建输出口。\n\
  \n你可能会好奇，为什么 `myButton` 属性的声明以 `!` 结尾。Swift 要求所有属性在完成任何初始化器之前都必须完全初始化，除非该属性被声明为可选类型。当视图控制器从故事板加载时，其输出口属性的值会从故事板中保存的信息设置，但这发生在视图控制器的初始化器运行之后。因此，除非你显式地给它们赋假值（这不可取），否则输出口属性必须声明为可选类型。这样就提供了两种声明方式：使用\
  \ `!` 或 `?`，如 [3-2] 所示。\n\n```\n@IBOutlet weak var myButton1: UIButton?\n@IBOutlet\
  \ weak var myButton2: UIButton!\nListing 3-2. 声明可选变量的两种方式\n```\n\n一般来说，你会发现第二种方式更容易使用，因为之后在视图控制器的代码中使用时，无需显式地解包可选类型（见\
  \ [3-3]）。需要注意的是，如果使用第二种方式，你必须确保输出口被正确设置，并且后续不会变成 nil。\n\n```\nlet button1 = myButton1!\
  \   // 需要解包可选类型\nlet button2 = myButton2    // myButton2 是隐式解包可选类型\nListing 3-3.\
  \ 无需显式解包可选类型\n```\n\n> **注意**\n> 输出口属性声明中的 `weak` 说明符表示该属性不需要对按钮创建强引用。一旦没有更多的强引用指向对象，对象就会被自动释放。在这种情况下，按钮不会被释放，因为只要它仍然是用户界面的一部分，就会有一个强引用指向它。如果视图不再需要并在某个时刻从用户界面中移除，将属性引用设为弱引用可以允许释放发生。如果发生这种情况，属性引用会被设置为\
  \ `nil`。\n\n\n\n\n#### 操作\n\n简而言之，操作（actions）是指被标记了 `@IBAction` 装饰的方法，这告诉 Interface\
  \ Builder 该方法可以由故事板或 nib 文件中的控件触发。操作方法的声明通常如下所示：\n\n```\n@IBAction func doSomething(sender:\
  \ UIButton) {}\n```\n\n也可能是这样：\n\n```\n@IBAction func doSomething() {}\n```\n\n\
  方法的实际名称可以是您想要的任何名称，并且它必须不接收参数，或者只接收一个参数，该参数通常被称为 `sender`。当操作方法被调用时，`sender` 将包含一个指向调用它的对象的指针。例如，如果用户在点击按钮时触发了这个操作方法，那么\
  \ `sender` 将指向被点击的按钮。`sender` 参数的存在使得您可以通过单个操作方法响应多个控件，从而提供一种识别哪个控件调用了该操作方法的方式。\n\
  \n**提示**  \n实际上还有第三种不太常用的声明操作方法的方式，如下所示：\n\n```\n@IBAction func doSomething(sender:\
  \ UIButton,\nforEvent event: UIEvent) {}\n```\n\n如果您需要更多关于导致方法被调用的事件的信息，可以使用这种形式。我们将在下一章中详细讨论控件事件。\n\
  \n声明一个带有 `sender` 参数的操作方法然后忽略它并不会造成任何影响。您很可能会看到大量代码正是这样做的。在 Cocoa 和 NeXTSTEP 中，操作方法无论是否使用\
  \ `sender` 都必须接受它，因此许多 iOS 代码，尤其是早期的 iOS 代码，都是这样编写的。\n\n既然您已经理解了操作和插座变量的含义，那么在我们设计用户界面时，我们将看到它们是如何工作的。但首先，让我们来处理一些基本的代码整理工作。\n\
  \n### 简化视图控制器\n\n在项目导航器中单击 `ViewController.swift` 文件以打开其实现文件。如您所见，其中包含少量样板代码，形式为我们所选项目模板提供的\
  \ `viewDidLoad()` 和 `didReceiveMemoryWarning()` 方法。这些方法常用于 `UIViewController` 的子类，因此\
  \ Xcode 为我们提供了它们的桩实现。如果我们需要使用它们，只需将代码添加进去即可。然而，对于这个项目，我们不需要这两个桩实现，因此它们只是在占用空间并使代码更难以阅读。为了方便起见，我们将清除不需要的方法，所以请继续删除它们。完成后，您的文件应如列表\
  \ 3-4 所示。\n\n```\nimport UIKit\nclass ViewController: UIViewController {\n}\n列表\
  \ 3-4.\n我们简化的 ViewController.swift 文件\n```\n\n### 设计用户界面\n\n确保保存刚才所做的更改，然后单击 `Main.storyboard`\
  \ 使用 Interface Builder 打开应用程序的视图（见图 3-4）。正如您从上章所记得的，编辑器中显示的白色窗口代表应用程序唯一的一个视图。如果回头看图\
  \ 3-1，您可以看到我们需要向此视图添加两个按钮和一个标签。\n\n![A329781_3_En_3_Fig4_HTML.jpg](img/A329781_3_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.**  \n在 Xcode 的 Interface Builder 中打开的 Main.storyboard 进行编辑\n\n让我们花点时间思考一下我们的应用程序。我们将向用户界面添加两个按钮和一个标签，这个过程与我们上一章构建应用程序时添加标签的过程非常相似。然而，我们还需要插座变量和操作才能使应用程序具有交互性。\n\
  \n每个按钮都需要触发控制器上的一个操作方法。我们可以选择让每个按钮调用不同的操作方法；但由于它们将执行基本上相同的任务（更新标签的文本），我们将需要调用相同的操作方法。我们将使用前面讨论过的那个\
  \ `sender` 参数来区分这两个按钮。除了操作方法之外，我们还需要一个连接到标签的插座变量，以便能够更改标签显示的文本。\n\n我们将先添加按钮，然后放置标签，并在设计界面时创建相应的操作和插座变量。我们也可以手动声明操作和插座变量，然后将用户界面元素连接到它们，但\
  \ Xcode 可以为我们处理这些。\n\n\n### 添加按钮与操作方法\n\n首先，我们将向用户界面添加两个按钮。接着，让 Xcode 为我们创建一个空的操作方法，并将两个按钮都连接到该方法。用户轻点按钮时，我们在该方法中编写的任何代码都将被执行。\n\
  \n选择“视图”➜“实用工具”➜“显示对象库”，或按下 `^⌥⌘3` 打开对象库。在对象库的搜索框中输入 `UIButton`。（实际上，你只需输入前四个字符\
  \ `uibu` 即可缩小列表范围。你可以全部使用小写字母，省去按 `Shift` 键的麻烦。）输入完成后，对象库中应只显示一个项目：按钮（见图 3-5）。\n\
  \n![A329781_3_En_3_Fig5_HTML.jpg](img/A329781_3_En_3_Fig5_HTML.jpg)\n\n图 3-5. 对象库中显示的按钮\n\
  \n将按钮从库中拖出，放到编辑区域内的白色窗口上，将按钮添加到应用的视图中。将按钮置于视图左侧，利用将按钮移向视图左边缘时出现的垂直蓝色辅助线，使其与左边缘保持适当距离。对于垂直位置，使用水平蓝色辅助线将按钮置于视图的中部。如果这有帮助，你可以参考图\
  \ 3-1 作为放置指南。\n\n> **注意：** 在 Interface Builder 中移动对象时出现的小蓝色辅助线，是为了帮助你遵循 iOS 人机界面指南（HIG）。苹果为设计\
  \ iPhone 和 iPad 应用的人员提供了 HIG。HIG 告诉你应该如何——以及不应该如何——设计用户界面。你真的应该阅读它，因为它包含每个 iOS 开发者都需要了解的宝贵信息。你可以在\
  \ [`https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/`](https://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/)\
  \ 找到它。\n\n双击新添加的按钮。这将允许你编辑按钮的标题。将这个按钮的标题设置为 `Left`。\n\n选择“视图”➜“辅助编辑器”➜“显示辅助编辑器”，或按下\
  \ `⌥⌘⏎` 打开辅助编辑器。你也可以通过点击项目窗口右上角七个按钮组中间的编辑器按钮（见图 3-6）来显示或隐藏辅助编辑器。\n\n![A329781_3_En_3_Fig6_HTML.jpg](img/A329781_3_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 显示辅助编辑器切换按钮（双圆圈）\n\n辅助编辑器出现在编辑窗格的右侧，而编辑窗格继续显示 Interface Builder。辅助编辑器应自动显示\
  \ `ViewController.swift`，这是“拥有”当前视图的视图控制器的实现文件。\n\n> **提示：** 打开辅助编辑器后，你可能需要调整窗口大小以获得足够的操作空间。如果你使用的是较小屏幕（如\
  \ MacBook Air 的屏幕），你可能需要关闭实用工具视图和/或项目导航器，以便为有效使用辅助编辑器腾出空间（见图 3-7）。你可以通过项目窗口右上角的三个视图按钮轻松实现这一点（见图\
  \ 3-6）。\n\n![A329781_3_En_3_Fig7_HTML.jpg](img/A329781_3_En_3_Fig7_HTML.jpg)\n\n\
  图 3-7. 在较小显示器上，你可能需要关闭其他视图才能同时看到两个编辑窗口\n\nXcode 知道我们的视图控制器类负责显示故事板中的视图，因此辅助编辑器知道要向我们展示视图控制器类的实现，这是最可能连接操作和出口的地方。然而，如果它没有显示你想要的文件，你可以使用辅助编辑器顶部的跳转栏来修正。首先，找到跳转栏中标有\
  \ `Automatic` 的段并点击它。在出现的弹出菜单中，选择 Manual ➜ Button Fun ➜ Button Fun ➜ `ViewController.swift`。现在你应看到正确的文件。\n\
  \n接下来，让 Xcode 自动为我们创建一个新的操作方法，并将该操作与我们刚刚创建的按钮关联。我们将把这些定义添加到视图控制器的类扩展中。为此，首先点击你添加到故事板中的按钮，使其被选中。然后，按住键盘上的\
  \ `Control` 键，并从按钮点击并拖动到辅助编辑器中的源代码上。你应该会看到一条从按钮延伸到光标的蓝色线，如图 3-8 所示。这条蓝线允许我们将 IB\
  \ 中的对象连接到代码或其他对象。将光标移动到类定义内部，如图 3-8 所示，会出现一个弹出窗口，提示你释放鼠标按钮将为你插入一个出口、操作或出口集合。\n\n\
  ![A329781_3_En_3_Fig8_HTML.jpg](img/A329781_3_En_3_Fig8_HTML.jpg)\n\n图 3-8. 按住 Control\
  \ 键拖拽到源代码将让你选择创建出口、操作或出口集合\n\n> **注意：** 我们在本章中使用操作和出口，并在本书后面使用出口集合。出口集合允许你将多个同类型对象连接到一个数组属性，而不是为每个对象创建单独的属性。\n\
  \n要完成此连接，释放鼠标按钮，将出现一个浮动弹出窗口，如图 3-9 所示。\n\n![A329781_3_En_3_Fig9_HTML.jpg](img/A329781_3_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9. 按住 Control 键拖拽到源代码后出现的浮动弹出窗口\n\n此窗口允许你自定义新操作。在窗口中，点击标有 `Connection` 的弹出菜单，并将选项从\
  \ `Outlet` 改为 `Action`。这告诉 Xcode 我们要创建一个操作而不是出口（见图 3-10）。在 `Name` 字段中，输入 `buttonPressed`。完成后，不要按\
  \ `Return` 键。按下 `Return` 会确认我们的出口；我们还没有完全准备好。相反，请按下 `Tab` 键移动到 `Type` 字段，输入 `UIButton`，替换默认值\
  \ `AnyObject`。\n\n![A329781_3_En_3_Fig10_HTML.jpg](img/A329781_3_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10. 从 `Outlet` 更改为 `Action`\n\n`Type` 下面有两个字段，我们将保留其默认值。`Event` 字段让你指定何时调用该方法。默认值\
  \ `Touch Up Inside` 在用户从屏幕抬起手指时触发——当且仅当手指仍停留在按钮上时。这是按钮的标准事件。这给了用户重新考虑的机会。如果用户在抬起手指前将手指移离按钮，该方法将不会触发。\n\
  \n`Arguments` 字段让你选择可用于操作方法的三种不同方法签名。我们想要 `sender` 参数，以便能够分辨是哪个按钮调用了该方法。这是默认选项，因此我们保持原样。\n\
  \n按下 `Return` 键或点击 `Connect` 按钮，Xcode 将为你插入操作方法。辅助编辑器中的 `ViewController.swift` 文件现在应如代码清单\
  \ 3-5 所示。我们将回到这里编写当用户点击此按钮或我们稍后添加的按钮时需要执行的代码。\n\n\n\n```swift\nimport UIKit\nclass\
  \ ViewController: UIViewController {\n@IBAction func buttonPressed(_ sender: UIButton)\
  \ {\n}\n}\n```\n**代码清单 3-5**：已添加 `IBAction` 的 `ViewController.swift` 文件\n\n除了创建方法代码段，Xcode\
  \ 还将该按钮连接到了该方法，并将该信息存储在了故事板中。这意味着我们无需再做任何其他操作，即可让该按钮在应用运行时调用此方法。\n\n回到 `Main.storyboard`，再拖出另一个按钮，这次将其放置在屏幕右侧。蓝色参考线会像之前那样出现，帮助你将其与右边缘对齐，同时还会帮助你将该按钮与另一个按钮垂直对齐。放置好按钮后，双击它并将其名称改为\
  \ `Right`。\n\n**提示**  \n除了从对象库中拖出一个新对象，你也可以按住 `⌥` 键（Option 键）并拖出原始对象（本例中为 `Left`\
  \ 按钮）的副本。按住 `⌥` 键会告诉接口生成器复制你拖动的对象。\n\n这次，我们不想创建新的操作方法。相反，我们希望将这个按钮连接到刚才 Xcode 为我们创建的那个已有的方法。更改按钮名称后，按住\
  \ Control 键并点击该按钮，然后拖向助理编辑器中 `buttonPressed()` 方法代码的声明处。这次，当光标靠近 `buttonPressed()`\
  \ 时，该方法会高亮显示，并且你会看到一个灰色的弹出窗口，显示**连接操作**（见图 3-11）。如果没有立即看到，请移动鼠标直到它出现。看到弹出窗口后，松开鼠标按钮，Xcode\
  \ 就会将该按钮连接到操作方法。这样，当按钮被点击时，就会触发与另一个按钮相同的操作方法。\n\n![A329781_3_En_3_Fig11_HTML.jpg](img/A329781_3_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11**：拖向现有操作会将按钮连接到该操作\n\n## 添加标签和输出口\n\n在对象库中，在搜索框中输入 `lab` 来查找标签用户界面项（见图\
  \ 3-12）。将标签拖到用户界面上，位置在你之前放置的两个按钮上方某处。放置好后，使用调整大小手柄将标签从左边缘（由蓝色参考线指示）拉伸到右边缘。这样应该能为我们将要显示给用户的文本留出足够空间。\n\
  \n![A329781_3_En_3_Fig12_HTML.jpg](img/A329781_3_En_3_Fig12_HTML.jpg)\n\n**图 3-12**：标签在对象库中的显示样子\n\
  \n默认情况下，标签中的文本是左对齐的，但我们希望这个标签中的文本居中。选择**视图** ➤ **实用工具** ➤ **显示属性检查器**（或按 `⌥⌘4`）以调出属性检查器（见图\
  \ 3-13）。确保标签已选中，然后在属性检查器中找到**对齐**按钮。选择中间的**对齐**按钮来居中标签文本。\n\n![A329781_3_En_3_Fig13_HTML.jpg](img/A329781_3_En_3_Fig13_HTML.jpg)\n\
  \n**图 3-13**：使用属性检查器居中标签文本\n\n在用户点击按钮之前，我们希望标签是空白的，因此双击标签（以便选中文本）并按键盘上的**删除**按钮。这将删除当前分配给标签的文本。按\
  \ **Return** 键确认更改。即使未选中时你看不到标签，它仍然在那里。\n\n**提示**  \n如果你有不可见的用户界面元素（如空标签），并希望能够看到它们的位置，请从**编辑器**菜单中选择**画布**。接着，从弹出的子菜单中，开启**显示边界矩形**。如果你只是想选择一个看不到的元素，只需在文档大纲中点击它的图标即可。\n\
  \n最后，让我们为标签创建一个输出口。我们的操作方式与之前创建和连接操作方法完全相同。确保助理编辑器已打开并显示 `ViewController.swift`。如果需要切换文件，请使用助理编辑器上方跳转栏中的弹出菜单。\n\
  \n接下来，在界面生成器中选择标签，然后按住 Control 键从标签拖向头文件。拖动直到光标位于现有操作方法正上方。当看到类似图 3-14 的情况时，松开鼠标按钮，你会再次看到弹出窗口（如图\
  \ 3-9 所示）。\n\n![A329781_3_En_3_Fig14_HTML.jpg](img/A329781_3_En_3_Fig14_HTML.jpg)\n\
  \n**图 3-14**：连接 `UILabel` 输出口\n\n将**连接**保留为默认类型的**输出口**。我们想为这个输出口选择一个描述性的名称，以便在编写代码时记住它的用途。在**名称**字段中输入\
  \ `statusLabel`。将**类型**字段保留为 `UILabel`。最后一个名为**存储**的字段，可以保留默认值。\n\n按 **Return**\
  \ 键确认更改，Xcode 会将输出口属性插入到你的代码中。你的代码现在应该看起来像代码清单 3-6。\n\n```swift\nimport UIKit\n\
  class ViewController: UIViewController {\n@IBOutlet weak var statusLabel: UILabel!\n\
  @IBAction func buttonPressed(_ sender: UIButton) {\n}\n}\n```\n**代码清单 3-6**：将标签输出口添加到视图控制器\n\
  \n现在我们有了一个输出口，Xcode 已经神奇地将标签连接到了我们的输出口。这意味着如果我们对代码中的 `statusLabel` 进行任何更改，这些更改都会影响用户界面中的标签。例如，设置\
  \ `statusLabel` 的文本属性会更改显示给用户的文本。\n\n## 自动引用计数\n\n如果你熟悉 C 或 C++ 这类语言，在使用完后需要小心释放分配的内存，那么你可能会有些担忧，因为我们似乎一直在创建对象却没有销毁它们。\n\
  \n如今 Xcode 自带的 LLVM 编译器足够智能，能够使用一个名为**自动引用计数**（Automatic Reference Counting，ARC）的功能来为我们释放对象。\n\
  \nARC 仅适用于 Swift 对象和结构体，不适用于 Core Foundation 对象或使用 C 语言库函数（如 `malloc()`）分配的内存，并且有一些注意事项和陷阱可能会让你出错。但大多数情况下，担心内存管理已经成为了过去式。\n\
  \n要了解更多关于 ARC 的信息，请查看此 URL 上的 ARC 发布说明：\n\n[`developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/`](http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/)\n\
  \nARC 非常有用，但它并非魔法。你仍然应该理解 iOS 中内存管理的基本规则，以避免在使用 ARC 时遇到问题。要了解 iOS（和 macOS）的内存管理约定，请阅读此\
  \ URL 上的苹果**内存管理编程指南**：\n\n[`developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html`](https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html)\n\
  \n\n\n#### 编写操作方法\n\n到目前为止，我们已设计好用户界面，并连接了插座变量（outlets）和操作方法（actions）。剩下的工作就是利用这些操作方法和插座变量，在按下按钮时设置标签的文本。在项目导航器中单击`ViewController.swift`，在编辑器中打开它。找到\
  \ Xcode 先前为我们创建的空白`buttonPressed()`方法。\n\n为了区分两个按钮，我们将使用`sender`参数。通过 sender 获取被按下按钮的标题，然后基于该标题创建新字符串，并将其赋值为标签的文本。将`buttonPressed()`方法修改为清单\
  \ 3-7 所示的内容。\n\n```\n@IBAction func buttonPressed(sender: UIButton) {\nlet title\
  \ = sender.title(for: .selected)!\nlet text = \"\\(title) button pressed\"\nstatusLabel.text\
  \ = text\n}\n清单 3-7.\n完成操作方法\n```\n\n这相当直观。第一行使用`sender`获取被点击按钮的标题。由于按钮可能根据当前状态（尽管本例中没有）具有不同的标题，我们使用`UIControlState.selected`参数指定在按钮处于选中状态时获取其标题，因为用户通过点击使其处于选中状态。我们将在第\
  \ 4 章更详细地介绍控件状态。\n\n提示\n\n你或许注意到调用`title(for: )`方法时使用的参数是`.selected`，而不是`UIControlState.selected`。Swift\
  \ 已经知道该参数必须是`UIControlState`枚举中的某个值，因此我们可以省略枚举名称以减少输入。\n\n下一行通过将文本`button pressed`附加到上一行获取的标题来创建新字符串。因此，如果标题为“Left”的左侧按钮被点击，该行将创建内容为“Left\
  \ button pressed”的字符串。最后一行将新字符串赋值给标签的文本属性，这就是我们更改标签显示文本的方式。\n\n### 测试 ButtonFun\
  \ 应用\n\n选择“产品”➤“运行”。如果遇到任何编译或链接错误，请返回并对比您的代码修改与本教程中的修改。代码构建成功后，Xcode 将启动 iOS 模拟器并运行您的应用。如果在\
  \ iPhone 模拟器上运行并点击“Left”按钮，您将看到类似图 3-15 的结果。\n\n![A329781_3_En_3_Fig15_HTML.jpg](img/A329781_3_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15.\n\n在 iPhone 6s 上运行应用\n\n尽管一切看起来正常，但整体布局仍需调整。要了解原因，如图 3-16 所示，将活动方案更改为\
  \ iPhone SE 并再次运行应用。\n\n![A329781_3_En_3_Fig16_HTML.jpg](img/A329781_3_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16.\n\n更改方案（即执行目标），变为不同尺寸和形状的设备\n\n结果显示在图 3-17 中，暴露了问题。请注意，虽然左侧按钮仍然可用，但标签本身向右偏移了一些，而右侧按钮完全消失了。\n\
  \n![A329781_3_En_3_Fig17_HTML.jpg](img/A329781_3_En_3_Fig17_HTML.jpg)\n\n图 3-17.\n\
  \n使用不同的模拟设备时，我们的布局有些问题\n\n为了了解原因，在 Xcode 的界⾯构建器窗口下方，点击右侧按钮将其选中并查看轮廓，然后在下方的“View\
  \ As”中选择 iPhone SE，如图 3-18 所示。您可以看到，由于我们将布局设置为适用于屏幕尺寸较大的设备，当切换到较小设备时，部分控件在新的显示区域内发生了移动。\n\
  \n![A329781_3_En_3_Fig18_HTML.jpg](img/A329781_3_En_3_Fig18_HTML.jpg)\n\n图 3-18.\n\
  \n在屏幕区域较小的设备上查看布局时，右侧按钮发生位移，不再可见\n\n#### 使用自动布局修复问题\n\n左侧按钮位置正确，但标签和另一个按钮位置不对。在第\
  \ 2 章中，我们使用自动布局（Auto Layout）解决了类似问题。自动布局的核心思想是使用约束（constraints）来指定控件的放置方式。在本例中，我们希望实现以下效果：\n\
  \n*   “Left”按钮应垂直居中并靠近屏幕左边缘。\n*   “Right”按钮应垂直居中并靠近屏幕右边缘。\n*   标签应水平居中，并距屏幕顶部稍向下一些。\n\
  \n上述每条描述都包含两个约束——一个是水平约束，另一个是垂直约束。如果我们将这些约束应用于三个视图，自动布局将负责在任何屏幕上正确定位它们。那么具体如何操作呢？您可以在代码中通过创建`NSLayoutConstraint`类的实例来为视图添加自动布局约束。在某些情况下，这是实现正确布局的唯一方法，但在此例（以及本书的所有示例）中，您可以通过使用界⾯构建器来获得所需布局。界⾯构建器允许您通过拖拽和点击直观地添加约束。首先，在界⾯构建器窗口下的“View\
  \ As”中，重新选择 6s 作为设备，以便看到与之前一致的控件。将缩放比例设置为能够看到整个屏幕；我使用的是 75%。我们也将使用自动布局来修复其他设备配置的问题（见图\
  \ 3-19）。\n\n![A329781_3_En_3_Fig19_HTML.jpg](img/A329781_3_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19.\n\n我们将使用与初始相同的设备的自动布局，来配置所有其他设备类型\n\n我们先从定位标签开始。在项目导航器中选择`Main.storyboard`，打开文档大纲以显示视图层级。找到标记为“View”的图标。这代表视图控制器的主视图，我们需要相对于它来定位其他视图。如果“View”图标尚未展开，点击其展开三角形，显示两个按钮（标记为“Left”和“Right”）以及标签。按住\
  \ Control 键，将鼠标从标签拖拽到其父视图，如图 3-20 左侧所示。\n\n![A329781_3_En_3_Fig20_HTML.jpg](img/A329781_3_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20.\n\n使用自动布局约束定位标签\n\n通过将一个视图拖拽到另一个视图，您是在告诉界⾯构建器要在它们之间应用自动布局约束。释放鼠标后，将出现一个灰色弹出菜单，其中包含各种选项，如图\
  \ 3-20 右侧所示。此弹出菜单中的每个选项都是一个单独的约束。点击其中任何一个都将应用该约束，但我们知道需要对标签应用两个约束，而这两个约束都在弹出菜单中。要同时应用多个约束，您需要在选择时按住\
  \ Shift 键。因此，按住 Shift 键并点击“Center Horizontally in Container”和“Vertical Spacing to\
  \ Top Layout Guide”。要实际应用约束，请点击弹出菜单外部的任意位置或按回车键。执行此操作后，您创建的约束将出现在文档大纲的“Constraints”标题下，并同时在故事板中直观显示，如图\
  \ 3-21 所示。\n\n![A329781_3_En_3_Fig21_HTML.jpg](img/A329781_3_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21.\n\n已对标签应用了两个自动布局约束\n\n提示\n\n如果在添加约束时出错，可以通过在文档大纲或故事板中点击其表示，然后按 Delete\
  \ 键将其移除。\n\n\n\n你可能还会看到标签（label）有一个橙色的轮廓。Interface Builder 使用橙色来表示自动布局（Auto Layout）问题。Interface\
  \ Builder 以这种方式强调的典型问题有三种：\n\n*   你没有足够的约束来完全指定视图的位置或大小。\n*   视图的约束存在歧义——也就是说，它们没能唯一确定其大小或位置。\n\
  *   约束是正确的，但视图在运行时的位置和/或大小与 Interface Builder 中的不同。\n\n你可以通过点击活动视图（Activity View）中的黄色警告三角形，在问题导航器（Issue\
  \ Navigator）中查看解释，来了解更多关于该问题的信息（见图 3-21，最左侧）。如果你这样做，你会看到它显示“Status Label”的框架（Frame）在运行时将会不同——这是所列出的第三个问题。你可以通过让\
  \ Interface Builder 将标签移动到其正确的运行时位置并赋予其配置好的大小来消除此警告。为此，请查看故事板编辑器（storyboard editor）的右下侧。你会看到四个按钮，如图\
  \ 3-22 所示。\n\n![A329781_3_En_3_Fig22_HTML.jpg](img/A329781_3_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 故事板编辑器右下角的自动布局按钮\n\n你可以通过将鼠标悬停在按钮上来了解每个按钮的功能。最左边的按钮与`UIStackView`控件相关，我们将在第\
  \ 10 章讨论。从左到右，其他三个按钮的功能如下：\n\n1.  对齐（Align）按钮允许你将选中的视图相对于另一个视图对齐。如果你现在点击此按钮，你会看到一个包含各种对齐选项的弹出窗口。其中一个是“容器中水平居中”（Horizontal\
  \ Center in Container），这是一个你已经从文档大纲（Document Outline）应用于标签的约束。在 Interface Builder\
  \ 中，实现自动布局相关功能通常有多种方法。随着你阅读本书，你会看到完成最常见自动布局任务的替代方法。\n2.  固定（Pin）按钮的弹出窗口包含一些控件，允许你设置视图相对于其他视图的位置，并应用大小约束。例如，你可以设置一个约束，将一个视图的高度约束为与另一个视图相同。\n\
  3.  解决自动布局问题（Resolve Auto Layout Issues）按钮允许你纠正布局问题。你可以使用其弹出窗口中的菜单项，让 Interface\
  \ Builder 移除视图（或整个故事板）的所有约束，猜测哪些约束可能缺失、添加它们，并将一个或多个视图的框架调整到它们在运行时的样子。\n\n你可以通过在文档大纲或故事板中选择标签，然后点击解决自动布局问题按钮来修复标签的框架。此按钮的弹出窗口有两个相同的操作组（见图\
  \ 3-23）。\n\n![A329781_3_En_3_Fig23_HTML.jpg](img/A329781_3_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23. 解决自动布局问题按钮的弹出窗口提示\n\n如果弹出窗口中的项目都没有启用，请点击文档大纲中的标签以确保它被选中，然后重试。\n\n如果你从顶部组中选择一个操作，它仅应用于当前选中的视图，而底部组的操作则应用于视图控制器中的所有视图。在这种情况下，我们只需要修复一个标签的框架，所以点击弹出窗口顶部部分的“更新框架”（Update\
  \ Frames）。当你这样做时，橙色轮廓和活动视图中的警告三角形都会消失，因为标签现在拥有了它在运行时的位置和大小。实际上，标签已经缩小到零宽度，并在故事板中由一个小的空正方形表示，如图\
  \ 3-24 所示。\n\n![A329781_3_En_3_Fig24_HTML.jpg](img/A329781_3_En_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 修复其框架后，标签已缩小到零尺寸\n\n结果表明，这实际上正是我们希望看到的。许多 UIKit 提供的视图，包括`UILabel`，都能够让\
  \ Auto Layout 根据其实际内容设置其大小。它们通过计算其自然或固有内容大小（intrinsic content size）来实现这一点。在固有大小下，标签刚好足够宽、足够高，以完全包围其包含的文本。目前，这个标签没有内容，所以其固有内容大小在两个轴向上确实应该为零。当我们运行应用程序并点击其中一个按钮时，标签的文本被设置，其固有内容大小发生变化。当这种情况发生时，Auto\
  \ Layout 将自动调整标签大小，以便你可以看到所有文本。\n\n现在我们处理好了标签，接下来将修复两个按钮的位置。在故事板中选择左按钮，然后点击故事板编辑器右下角的对齐按钮（图\
  \ 3-22 中从左数第二个按钮）。我们希望按钮垂直居中，所以在弹出窗口中选择“容器中垂直居中”（Vertical Center in Container），然后点击“添加\
  \ 1 个约束”（Add 1 Constraint）（见图 3-25）。\n\n![A329781_3_En_3_Fig25_HTML.jpg](img/A329781_3_En_3_Fig25_HTML.jpg)\n\
  \n图 3-25. 使用对齐弹出窗口垂直居中视图\n\n我们需要对右按钮应用相同的约束，所以选择它并重复此过程。在你执行此操作时，Interface Builder\
  \ 发现了几个新问题，表现为故事板中的橙色轮廓和活动视图中的警告三角形。点击三角形以在问题导航器中查看警告的原因，如图 3-26 所示。\n\n![A329781_3_En_3_Fig26_HTML.jpg](img/A329781_3_En_3_Fig26_HTML.jpg)\n\
  \n图 3-26. Interface Builder 关于缺失约束的警告\n\nInterface Builder 警告我们，两个按钮的水平位置是不明确的。实际上，由于我们尚未设置任何约束来控制按钮的水平位置，这并不奇怪。\n\
  \n注意\n\n在设置 Auto Layout 约束时，出现此类警告是正常的。你应该利用它们来帮助设置一套完整的约束。完成布局过程后，你应该没有任何警告。本书中的大多数示例都包含设置布局约束的说明。在添加这些约束时，你通常会遇到警告，但如果你在完成所有步骤后仍有警告，则无需担心。在这种情况下，你可能漏掉了一步，执行步骤不正确，或者书中有错误。如果是后一种情况，请通过提交勘误到本书的页面[`www.apress.com`](http://www.apress.com)让我们知道。\n\
  \n\n\n我们希望左按钮与父视图左侧保持固定距离，右按钮与父视图右侧保持相同距离。我们可以从 **“Pin”** 按钮（图 3-22 中 **“Align”**\
  \ 按钮右侧的那个）的弹出菜单中设置这些约束。选中左按钮，点击 **“Pin”** 按钮打开其弹出菜单。在弹出菜单顶部，你会看到四个输入框，通过橙色虚线连接到一个小方块，如图\
  \ 3-27 左侧所示。这个小方块代表我们正在约束的按钮。四个输入框允许你设置按钮与其上方、下方、左侧和右侧最近邻居之间的距离。虚线表示尚未存在任何约束。对于左按钮，我们希望设置它与父视图左侧之间的固定距离，因此点击方块左侧的橙色虚线。点击后，虚线变为实线橙色线，表示现在已有要应用的约束。接下来，在左侧输入框中输入\
  \ `32`，设置左按钮到其父视图的距离。\n\n![A329781_3_En_3_Fig27_HTML.jpg](img/A329781_3_En_3_Fig27_HTML.jpg)\n\
  \n**图 3-27.** 使用 Pin 弹出菜单设置视图的水平位置\n\n要固定右按钮的位置，选中它，点击 **“Pin”** 按钮，点击方块右侧的橙色虚线（因为我们将此按钮固定到其父视图的右侧），在输入框中输入\
  \ `32`，然后点击 `Add 1 Constraint`。\n\n我们现在已经应用了所有需要的约束，但活动视图中可能仍有警告。如果你检查一下，会发现警告是因为按钮没有位于正确的运行时位置。要解决这个问题，我们再次使用\
  \ `Resolve Auto Layout Issues` 按钮。点击该按钮（最右侧的那个）打开其弹出菜单，然后从底部选项组中点击 `Update Frames`。我们使用底部选项组中的选项，因为我们需要调整视图控制器中所有视图的框架。\n\
  \n**提示**\n\n你可能会发现顶部选项组中没有可用的选项。如果出现这种情况，请选择文档大纲中的 **“View Controller”** 图标，然后重试。\n\
  \n警告现在应该消失，我们的布局终于完成了。在 iPhone 模拟器上运行应用程序。你会看到结果几乎与本章开头的图 3-1 相似。当你点击右侧按钮时，应显示此文本：`Right\
  \ button pressed.`。如果你随后点击左侧按钮，标签将变为 `Left button pressed.`。在 iPad 模拟器上运行此示例，你会发现布局仍然有效，尽管由于屏幕更宽，按钮之间的距离更大。这就是自动布局的强大之处。\n\
  \n**提示**\n\n在大屏幕模拟设备上运行应用程序时，你可能会发现无法一次性看到整个屏幕。你可以通过在 iOS 模拟器菜单中选择 `Window ➤ Scale`，然后选择适合你屏幕的缩放比例来解决此问题。\n\
  \n如果你回头查看图 3-1，会发现缺少一样东西。我们为最终结果展示的截图以粗体文本显示所选按钮的名称；然而，我们目前所做的只是显示一个普通字符串。我们稍后将使用\
  \ `NSAttributedString` 类来添加粗体效果。让我们看一下 Xcode 的另一个有用功能——**布局预览**。\n\n### 预览布局\n\n\
  返回 Xcode 并选择 `Main.storyboard`，然后打开助理编辑器（如果尚未显示，请参考图 3-6 了解操作方法）。在助理编辑器顶部跳转栏的左侧，你会看到当前选择是\
  \ `Automatic`（除非你已将其更改为 `Manual` 以选择助理编辑器要显示的文件）。点击打开此跳转栏段的弹出菜单，你会看到几个选项，最后一个选项是\
  \ `Preview`。当将光标悬停在 `Preview` 上时，会出现一个包含应用程序故事板名称的菜单。点击它，在预览编辑器中打开故事板。\n\n当预览编辑器打开时，你会看到应用程序在\
  \ iPhone 竖屏模式下的显示效果。这只是一个预览，因此它不会响应按钮点击，因此你不会看到标签。如果将鼠标移动到预览下方显示 `iPhone 6s` 的区域，会出现一个控件，允许你将手机旋转到横屏模式。你可以在图\
  \ 3-28 左侧看到该控件，以及点击它旋转手机后的结果。\n\n![A329781_3_En_3_Fig28_HTML.jpg](img/A329781_3_En_3_Fig28_HTML.jpg)\n\
  \n**图 3-28.** 预览 iPhone 在横屏模式下的布局\n\n使用自动布局，当我们旋转手机时，按钮会移动，使其保持垂直居中，并且与设备两侧的距离与竖屏方向相同。如果标签可见，你会看到它也处于正确位置。\n\
  \n我们还可以使用预览助理查看在另一台设备上运行应用程序时会发生什么。在预览助理的左下角（以及图 3-28 中），你会看到一个 `+` 图标。点击它以打开设备列表，然后选择\
  \ `iPhone SE` 将新预览添加到预览助理。如果你仍然无法看到所有内容，可以通过几种不同的方式缩放预览助理。最简单的方法是双击预览助理窗格——这会在全尺寸视图和更小的视图之间切换。如果你希望对缩放级别有更多控制，可以在触控板上使用捏合手势（遗憾的是，至少在撰写本文时，这在\
  \ Magic Mouse 上不受支持）。图 3-29 显示了两个 iPhone 预览，缩小后以适应我屏幕上的可用空间。同样，自动布局已将按钮安排到正确位置。旋转\
  \ iPhone SE 预览以查看布局在横屏模式下是否也有效。\n\n![A329781_3_En_3_Fig29_HTML.jpg](img/A329781_3_En_3_Fig29_HTML.jpg)\n\
  \n**图 3-29.** 同时在两台设备上预览布局\n\n**注意**\n\n在撰写本文时，预览助理未能正确显示 iPad 9.7 英寸和 12.9 英寸的预览布局。这很可能是由于\
  \ Xcode 8 测试版中的错误造成的。但是，在模拟器中运行它们显示它们工作正常。\n\n\n\n### 更改文本样式\n\n`NSAttributedString`\
  \ 类允许你为字符串附加格式化信息，例如字体和段落对齐方式。这些元数据可以应用于整个字符串，也可以对不同的部分应用不同的属性。如果你想象一下在文字处理器中如何对文本片段应用格式化，那么这基本上就是\
  \ `NSAttributedString` 的工作模型。大部分主要的 UIKit 控件都允许你使用属性字符串。对于像我们这里使用的 `UILabel` 来说，只需创建一个属性字符串，然后通过它的\
  \ `attributedText` 属性将其传递给标签即可。\n\n因此，选择 `ViewController.swift` 并更新 `buttonPressed()`\
  \ 方法，如代码清单 3-8 所示。\n\n```\nimport UIKit\n\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet weak var statusLabel: UILabel!\n    \n    @IBAction func buttonPressed(_\
  \ sender: UIButton) {\n        let title = sender.title(for: .selected)!\n     \
  \   let text = \"\\(title) button pressed\"\n        let styledText = NSMutableAttributedString(string:\
  \ text)\n        let attributes = [\n            NSFontAttributeName:\n        \
  \        UIFont.boldSystemFont(ofSize: statusLabel.font.pointSize)\n        ]\n\
  \        let nameRange = (text as NSString).range(of: title)\n        styledText.setAttributes(attributes,\
  \ range: nameRange)\n        statusLabel.attributedText = styledText\n    }\n}\n\
  ```\n\n*代码清单 3-8. 更新后的 `buttonPressed()` 方法，用于添加粗体字体特性*\n\n新代码首先做的事情是基于我们要显示的字符串创建一个属性字符串——具体来说，是一个\
  \ `NSMutableAttributedString` 实例。这里我们需要一个可变的属性字符串，因为我们想要更改它的属性。\n\n接下来，我们创建一个字典来存放要应用于字符串的属性。目前我们只有一个属性，所以这个字典只包含一个键值对。键\
  \ `NSFontAttributeName` 让我们可以为属性字符串的一部分指定一种字体。传入的值是粗体系统字体，其大小与标签当前使用的字体大小相同。从长远来看，以这种方式指定字体比按名称指定字体更灵活，因为系统总能合理地知道该用什么粗体字。\n\
  \n然后，我们请求文本字符串提供标题所在子字符串的范围（包含起始索引和长度）。我们使用这个范围将属性应用于属性字符串中与标题对应的部分，并将其传递给标签。让我们仔细看看定位标题字符串的那行代码：\n\
  \n```\nlet nameRange = (text as NSString).range(of: title)\n```\n\n注意，`text` 变量从\
  \ Swift 类型 `String` 被转换成了 Core Foundation 类型 `NSString`。这是必要的，因为 `String` 和 `NSString`\
  \ 都有一个名为 `range(of: String)` 的方法。我们需要调用 `NSString` 的方法来获取一个 `NSRange` 对象作为范围，因为下一行中的\
  \ `setAttributes()` 方法期望的就是这种类型。\n\n现在你可以点击“运行”按钮。你会看到应用用粗体文本显示了被点击按钮的名称，如图 3-1\
  \ 所示。\n\n## 检查应用委托\n\n现在我们的应用能运行了，在进入下一个主题之前，让我们花点时间看看我们尚未检查的源代码文件——`AppDelegate.swift`。这个文件实现了我们的应用委托。\n\
  \nCocoa Touch 广泛使用了委托，委托是负责代表另一个对象执行某些任务的对象。应用委托让我们可以在某些预定义的时间点代表 `UIApplication`\
  \ 类做一些事情。每个 iOS 应用都恰好有一个 `UIApplication` 实例，它负责应用的主运行循环并处理应用级别的功能，例如将输入路由到相应的控制器类。`UIApplication`\
  \ 是 UIKit 的一个标准部分；它主要在幕后工作，因此你通常无需担心它。\n\n在应用执行的某些明确定义的时间点，如果委托存在并实现了相应的方法，`UIApplication`\
  \ 就会调用其委托上的特定方法。例如，如果你有需要在程序退出前执行的代码，你应该在你的应用委托中实现 `applicationWillTerminate()`\
  \ 方法，并将终止代码放在那里。这种类型的委托允许你的应用实现行为，而无需继承 `UIApplication` 子类，甚至无需了解 `UIApplication`\
  \ 的内部工作原理。所有的 Xcode 模板都会为你创建一个应用委托，并安排它在应用启动时与 `UIApplication` 对象建立联系。\n\n在项目导航器中点击\
  \ `AppDelegate.swift`，查看项目模板提供的应用委托存根。前几行应该看起来像代码清单 3-9 所示。\n\n```\nimport UIKit\n\
  @UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate {\n  \
  \  var window: UIWindow?\n```\n\n*代码清单 3-9. 应用委托初始代码*\n\n以粗体高亮显示的代码表示这个类遵循一个名为 `UIApplicationDelegate`\
  \ 的协议。按住 ⌥ 键。你的光标应变为十字准线。移动光标使其悬停在 `UIApplicationDelegate` 字样上。你的光标会变成一个问号，并且 `UIApplicationDelegate`\
  \ 字样会像浏览器中的链接一样被高亮显示（见图 3-30）。\n\n![A329781_3_En_3_Fig30_HTML.jpg](img/A329781_3_En_3_Fig30_HTML.jpg)\n\
  \n*图 3-30.* 在 Xcode 中按住 ⌥ 键（Option 键）并将鼠标指向代码中的某个符号时，该符号会被高亮显示，光标会变成一个带问号的手型指针\n\
  \n在按住 ⌥ 键的同时点击这个链接。会打开一个小弹出窗口，显示 `UIApplicationDelegate` 协议的简要概述（见图 3-31）。\n\n![A329781_3_En_3_Fig31_HTML.jpg](img/A329781_3_En_3_Fig31_HTML.jpg)\n\
  \n*图 3-31.* 我们在源代码中按住 Option 键并点击 `UIApplicationDelegate` 时，Xcode 会弹出这个名为“快速帮助”面板的窗口，其中描述了该协议\n\
  \n向下滚动弹出窗口到底部，你会找到两个链接（见图 3-32）。\n\n![A329781_3_En_3_Fig32_HTML.jpg](img/A329781_3_En_3_Fig32_HTML.jpg)\n\
  \n*图 3-32.* 指向所选项目附加信息的链接\n\n注意这个新的弹出式文档窗口底部的两个链接；点击 **更多** 链接可查看此符号的完整文档，或点击 **声明于**\
  \ 链接可在头文件中查看符号的定义。同样的技巧也适用于类名和协议名，以及编辑器窗格中显示的方法名。只需按住 Option 键并点击一个单词，Xcode 就会在文档浏览器中搜索该单词。\n\
  \n\n\n学会快速查阅文档固然值得，但了解该协议的说明或许更为重要。在这里，你将找到应用委托可以实现的那些方法，以及这些方法会在何时被调用。花点时间阅读这些方法的描述，对你来说很可能是值得的。\n\
  \n回到项目导航器中，打开 `AppDelegate.swift` 查看应用委托的实现。它看起来应该类似于代码清单 3-10。\n\n```\nimport UIKit\n\
  @UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate {\nvar\
  \ window: UIWindow?\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
  \ launchOptions: [NSObject: AnyObject]?) -> Bool {\n// 应用启动后进行自定义设置的覆盖点。\nreturn\
  \ true\n}\nfunc applicationWillResignActive(_ application: UIApplication) {\n//\
  \ 当应用即将从活跃状态切换到非活跃状态时发送。这可能发生在某些类型的临时中断（例如来电或短信）时，或者当用户退出应用并开始过渡到后台状态时。\n// 使用此方法暂停正在进行的任务、禁用计时器并降低\
  \ OpenGL ES 帧率。游戏应使用此方法来暂停游戏。\n}\nfunc applicationDidEnterBackground(_ application:\
  \ UIApplication) {\n// 使用此方法释放共享资源、保存用户数据、使计时器失效，并存储足够的应用状态信息，以便在应用稍后终止时将其恢复到当前状态。\n\
  // 如果您的应用支持后台执行，当用户退出时，将调用此方法而不是 applicationWillTerminate：。\n}\nfunc applicationWillEnterForeground(_\
  \ application: UIApplication) {\n// 作为从后台到活跃状态转换的一部分被调用；在此处您可以撤消许多在进入后台时所做的更改。\n\
  }\nfunc applicationDidBecomeActive(_ application: UIApplication) {\n// 重新启动在应用处于非活跃状态时暂停（或尚未开始）的任何任务。如果应用之前在后台运行，可以选择刷新用户界面。\n\
  }\nfunc applicationWillTerminate(_ application: UIApplication) {\n// 当应用即将终止时调用。如果合适，请保存数据。另请参阅\
  \ applicationDidEnterBackground：。\n}\n}\n```\n代码清单 3-10. 我们的 `AppDelegate.swift`\
  \ 文件\n\n在文件顶部，你可以看到我们的应用委托实现了文档中涵盖的其中一个协议方法，名为 `application(_: didFinishLaunchingWithOptions:)`。正如你可能猜测的那样，此方法会在应用完成所有设置工作并准备好开始与用户交互时立即触发。它通常用于创建需要在运行应用的整个生命周期内存在的任何对象。\n\
  \n你将在本书后面看到更多相关内容，特别是在第 15 章中，我们将在那里更详细地讨论委托在应用生命周期中所扮演的角色。在结束本章之前，我们只是想给你提供一些关于应用委托的背景知识，并展示这一切是如何联系在一起的。\n\
  \n## 总结\n\n本章的简单应用向你介绍了 MVC、创建并连接输出口和操作、实现视图控制器以及使用应用委托。你学会了如何在按钮被点击时触发操作方法。并且你看到了如何在运行时更改标签的文本。尽管我们构建了一个非常简单的应用，但所使用的基本概念与\
  \ iOS 下所有控件（不仅仅是按钮）所基于的概念是相同的。事实上，本章中我们使用按钮和标签的方式，很大程度上与我们将在 iOS 下实现和交互的大多数标准控件的方式相同。\n\
  \n理解我们在本章中所做的一切以及我们这样做的原因至关重要。如果你不理解，请务必复习你不完全理解的部分。如果事情不是完全清楚，随着我们在本书后面创建更复杂的界面，你只会变得更加困惑。\n\
  \n在下一章中，我们将介绍一些其他标准的 iOS 控件。你还将学习如何使用警报来通知用户重要事件，以及如何使用操作表来指示用户在继续操作前需要做出选择。\n\n\
  \n\n"
- "# 4. 添加中级用户交互\n\n在第 3 章中，我们讨论了 MVC 并使用它构建了一个应用程序。你学习了 outlet 和 action，并将按钮控件连接到文本标签上。在本章中，我们将构建一个包含更广泛控件集的应用程序，以加深你对用户界面开发的熟悉程度，如图\
  \ 4-1 所示。\n\n![A329781_3_En_4_Fig1_HTML.jpg](img/A329781_3_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 本章项目通过组合多个新控件来提升你的 UI 技能\n\n我们将实现一个图像视图、一个滑块、两个不同的文本字段、一个分段控件、几个开关，以及一个看起来像\
  \ iOS 7 之前样式的 iOS 按钮。你将了解如何设置和检索各种控件的值。你将学习如何使用操作表强制用户做出选择，以及如何使用警报向用户提供重要的反馈。你还将了解控件状态以及如何使用可拉伸图像来改变按钮的外观。\n\
  \n由于本章的应用使用了如此多的不同用户界面元素，我们的工作方式将与之前两章略有不同。我们将把应用程序拆分成多个部分，一次实现一个部分。在 Xcode 和 iOS\
  \ 模拟器之间来回切换，我们将在进入下一部分之前测试每个部分。将构建复杂界面的过程分解为更小的组件，不仅使其不那么令人生畏，而且更接近你在构建自己的应用程序时所经历的实际过程。这种编码-编译-调试循环占据了软件开发人员日常工作的大部分时间。\n\
  \n我们的应用只使用了一个视图和控制器；但正如你在图 4-1 中所见，这个视图中的复杂性要高得多。\n\n屏幕顶部的 Logo 位于一个图像视图中，在这个应用中，它除了显示静态图像外什么都不做。我在\
  \ Logo 下方放置了两个文本字段：一个允许输入字母数字文本，另一个只允许输入数字。文本字段下方是一个滑块。当用户移动滑块时，它旁边标签的值会随之变化，始终反映滑块的当前值。\n\
  \n滑块下方是一个分段控件和两个开关。分段控件在其下方的空间内切换两种不同类型的控件。当应用程序首次启动时，分段控件下方会出现两个开关。改变任一开关的值会导致另一个开关的值也随之改变。虽然你在实际应用中不太可能这样做，但这演示了如何以编程方式更改控件的值，以及\
  \ Cocoa Touch 如何在无需你做任何工作的情况下对某些操作进行动画处理。\n\n图 4-2 展示了用户点击分段控件时发生的情况。开关消失，取而代之的是一个按钮。\n\
  \n![A329781_3_En_4_Fig2_HTML.jpg](img/A329781_3_En_4_Fig2_HTML.jpg)\n\n图 4-2. 点击左侧的分段控制器会显示一对开关。点击右侧则会显示一个按钮，如图所示\n\
  \n按下“Do Something”按钮会弹出一个操作表，询问用户是否真的打算按下该按钮（见图 4-3）。注意操作表现在是如何高亮显示并处于前景中，而其他控件则变暗。\n\
  \n![A329781_3_En_4_Fig3_HTML.jpg](img/A329781_3_En_4_Fig3_HTML.jpg)\n\n图 4-3. 操作表请求用户做出响应\n\
  \n这提供了一种标准方式来响应可能具有危险性或可能产生重大影响的输入，并给用户一个机会来阻止潜在问题的发生。如果选择了“Yes, I'm Sure!”，应用程序会显示一个警报，让用户知道一切正常（见图\
  \ 4-4）。\n\n![A329781_3_En_4_Fig4_HTML.jpg](img/A329781_3_En_4_Fig4_HTML.jpg)\n\n\
  图 4-4. 当重要事件发生时，警报会通知用户。我们的应用使用一个警报来确认一切正常\n\n## 主动、静态和被动控件\n\n界面控件以三种基本模式运行：主动、静态（或不活动）和被动。我们在上一章中使用的按钮是主动控件的典型示例。你按下它们，就会有事情发生——通常是你编写的\
  \ Swift 代码会执行。\n\n尽管你直接使用的许多控件会触发操作方法，但并非所有控件都以此方式工作。我们将在本应用中实现的图像视图除了在应用中显示图像外不做其他事情；虽然它可以配置为触发操作方法——但在这里，用户不会对它进行任何操作。标签和图像控件通常以此方式工作。\n\
  \n某些控件以被动模式运行，仅保存用户输入的值，直到你准备好使用它。这些控件不会触发操作方法，但用户可以与其交互并更改它们的值。被动控件的一个经典示例是网页上的文本字段。虽然可以创建当用户跳出字段时触发的验证代码，但绝大多数网页文本字段仅包含在用户单击提交按钮时提交给服务器的数据。文本字段本身通常不会触发任何代码，但当提交按钮被点击时，文本字段的数据会被传递给相关的\
  \ Swift 代码。\n\n在 iOS 设备上，大多数可用的控件在所有三种模式下都能工作，并且几乎所有的控件都可以根据你的需求在多种模式下工作。所有 iOS\
  \ 控件都是`UIControl`的子类，这使得它们能够触发操作方法。许多控件可以被动使用，并且所有控件都可以被设置为不活动或不可见。例如，使用一个控件可能会触发另一个不活动的控件变为活动状态。然而，某些控件（例如按钮）如果不在主动模式下用于触发代码，实际上没有太大用途。\n\
  \niOS 上的控件与 Mac 上的控件之间存在一些行为差异。以下是一些示例：\n\n- 由于多点触控界面，所有 iOS 控件都可以根据被触摸的方式触发多个操作。用户用手指在控件上滑动可能触发与轻点不同的操作。\n\
  - 你可以设置在用户按下按钮时触发一个操作，而在手指从按钮上抬起时触发另一个不同的操作。\n- 你可以让一个控件在单个事件上调用多个操作方法。例如，当用户在触摸按钮后抬起手指时，你可以让两个不同的操作方法在“Touch\
  \ Up Inside”事件上触发。\n\n**注意**：尽管在 iOS 上控件可以触发多个方法，但绝大多数情况下，你最好实现一个单一的操作方法来满足控件的特定使用需求。你通常不需要这种能力，但在\
  \ Interface Builder 中工作时最好记住这一点。在 Interface Builder 中将事件连接到操作，并不会断开同一控件上之前已连接的操作！这可能导致应用中出现令人惊讶的错误行为，即一个控件会触发多个操作方法。在\
  \ Interface Builder 中重新定位事件时请保持警惕，并确保在连接到新操作之前移除旧操作。\n\niOS 与 Mac 之间的另一个主要差异源于一个事实：通常\
  \ iOS 设备没有物理键盘。标准的 iOS 软件键盘实际上只是一个充满一系列按钮控件的视图，由系统为你管理。你的代码很可能永远不会直接与 iOS 键盘交互。\n\
  \n\n\n## 创建 Control Fun 应用\n\n打开 Xcode 并创建一个名为 `Control Fun` 的新项目。我们将再次使用**单视图应用**模板，因此按照前两章的步骤创建项目即可。\n\
  \n创建好项目后，我们先把要在图像视图中使用的图片准备好。图片必须先导入到 Xcode 中，才能在 Interface Builder 中使用，所以现在就来操作吧。在示例源代码归档的\
  \ `04 - Logos` 文件夹中，你会找到三个文件，分别命名为 `apress_logo.png`、`apress_logo@2x.png` 和 `apress_logo@3x.png`，它们是同一张图片的标准版和两个\
  \ Retina 版本。我们将把这三个文件全部添加到新项目的资源目录中，让应用在运行时决定使用哪一个。如果你更愿意使用自己选择的一组图片，请确保它们是 `.png`\
  \ 格式，且尺寸适合可用空间。小版本的高度应小于 100 像素，宽度最大为 300 像素，这样它才能在最窄的 iPhone 屏幕的视图顶部舒适地显示，而无需调整大小。较大的版本应分别为小版本的两倍和三倍大小。\n\
  \n在 Xcode 中，选择项目导航器中的 `Assets.xcassets`，然后在访达中打开 `04 - Logos` 文件夹并选中全部三张图片。接着，将图片拖拽到\
  \ Xcode 的编辑区域并松开鼠标。Xcode 会根据图片名称判断出你正在添加名为 `apress_logo` 的图片的三个版本，并为你完成其余工作（见图 4-5）。你会看到在编辑区域左侧列中，原先的\
  \ `AppIcon` 条目下方出现了一个 `apress_logo` 条目。现在，你可以在代码或 Interface Builder 中使用名称 `apress_logo`\
  \ 来引用这个图片集，运行时将会加载正确的版本。\n\n![A329781_3_En_4_Fig5_HTML.jpg](img/A329781_3_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 将我们的 apress_logo 图片添加到 Xcode 项目\n\n## 实现图像视图和文本字段\n\n将图片添加到项目后，下一步是在应用屏幕顶部实现五个界面元素：图像视图、两个文本字段和两个标签，如图\
  \ 4-6 所示。\n\n![A329781_3_En_4_Fig6_HTML.jpg](img/A329781_3_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 我们首先实现的图像视图、标签和文本字段\n\n### 添加图像视图\n\n在项目导航器中，点击 `Main.storyboard` 以在 Interface\
  \ Builder 中打开主故事板。你会看到熟悉的白色背景和一个可以布置应用界面的方形视图。与上一章一样，在 IB 窗口下方，选择 **iPhone 6s**\
  \ 作为我们的 **View As:** 选项。\n\n**注意：** 画布下方的这个区域是 Xcode 8 的新功能，称为**视图尺寸**，它允许我们选择在\
  \ IB 画布中查看当前场景的视图方式。\n\n如果对象库未打开，请选择 **View** ➤ **Utilities** ➤ **Show Object Library**\
  \ 将其打开。在列表中向下滚动约四分之一，找到 `ImageView`（见图 4-7），或者在搜索框中直接输入 `image`。请记住，对象库对应的是库面板顶部的第三个图标。\n\
  \n![A329781_3_En_4_Fig7_HTML.jpg](img/A329781_3_En_4_Fig7_HTML.jpg)\n\n图 4-7. Interface\
  \ Builder 对象库中的图像视图元素\n\n将一个图像视图拖拽到故事板编辑器的视图上，并将其放置在靠近视图顶部的位置，如图 4-8 所示。目前不必担心精确定位——我们将在下一节中进行调整。\n\
  \n![A329781_3_En_4_Fig8_HTML.jpg](img/A329781_3_En_4_Fig8_HTML.jpg)\n\n图 4-8. 向故事板添加\
  \ UIImageView\n\n选中图像视图后，按下 `⌥⌘4` 打开属性检查器。你应该会看到 `UIImageView` 类的可编辑选项。对我们图像视图来说，最重要的设置是检查器中顶部标有\
  \ **Image** 的选项。点击字段右侧的小箭头，会弹出一个菜单，列出可用的图片。这个列表包括你添加到项目资源目录中的所有图片。选择你之前添加的 `apress_logo`\
  \ 图片，它应该会显示在图像视图中，如图 4-9 所示。\n\n![A329781_3_En_4_Fig9_HTML.jpg](img/A329781_3_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9. 图像视图属性检查器。我们从检查器顶部的图片弹出菜单中选择了图片，图像视图随即显示了该图片\n\n\n\n### 调整图像视图大小\n\n我们使用的图像与其放置的图像视图尺寸并不相同。默认情况下，Xcode\
  \ 会缩放图像以完全填满其图像视图。属性检查器中的“Mode”设置（默认为“Scale To Fill”）就是这一操作的重要提示。虽然我们可以让应用保持这种状态，但通常最好在运行时之前完成所有必要的图像缩放，因为图像缩放会消耗时间和处理器周期。在本例中，我们完全不想进行任何缩放，因此让我们将图像视图的大小调整为图像的精确尺寸。首先，将“Mode”属性更改为“Center”，这表示图像不应缩放，并且应在分配给图像视图的任何空间中居中显示。现在，让图像视图适配图像的尺寸。为此，请确保图像视图处于选中状态，以便您能看到其轮廓和调整控制柄，然后按下\
  \ `⌘=` 或选择 Xcode 菜单中的 Editor ➤ Size to Fit Content。如果按下 `⌘=` 无效，或者“Size to Fit Content”呈灰色不可用状态，请重新选中图像视图，将其向侧面拖动一小段距离，然后重试。\n\
  \n**提示**\n\n如果在编辑区域选择某个项目时遇到困难，您可以点击左下角的小矩形图标打开文档大纲。现在，在文档大纲中单击您想要选中的项目，果然，该物品就会在编辑器中被选中。\n\
  \n要获取嵌套在另一个对象中的对象，请点击外层对象左侧的展开三角形以显示嵌套对象。在本例中，要选择图像视图，首先点击视图左侧的展开三角形。然后，当图像视图出现在文档大纲中时，点击它，它就会在编辑区域中被选中。\n\
  \n现在图像视图已调整大小，我们将其移回居中位置。您已经知道如何操作，因为我们在第 3 章中做过同样的事情。拖动图像视图直到它在水平方向上居中，点击编辑器区域右下角的“Align”图标，勾选“Horizontally\
  \ in Container”复选框，然后点击“Add 1 Constraint”。\n\n您可能会注意到，Interface Builder 显示了一些实线，这些线从一个视图的边缘延伸到其父视图的边缘（不要与拖动项目时显示的蓝色虚线混淆），或者从父视图的一侧延伸到另一侧。这些实线代表您已添加的约束。如果您点击刚刚添加的约束来选中它，您会发现它变成了一条贯穿主视图整个高度的实橙色线，如图\
  \ 4-10 所示。\n\n![A329781_3_En_4_Fig10_HTML.jpg](img/A329781_3_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10.\n\n一旦我们将图像视图调整为适合其图像的大小，我们就使用视图的蓝色参考线将其拖动到位，并创建一个约束来使其保持居中\n\n实线表示您已选中该约束。它为橙色这一事实意味着图像视图的位置和/或大小尚未完全确定，因此您需要添加更多约束。您可以通过点击活动视图中的橙色三角形来了解问题所在。在本例中，Xcode\
  \ 告诉我们，我们需要为图像视图设置一个垂直约束。您可以现在使用第 3 章中介绍的技术进行设置，或者等到本章后面我们为布局修复所有约束时再处理。\n\n**提示**\n\
  \n在 Interface Builder 中拖动和调整视图大小可能比较棘手。别忘了使用文档大纲，您可以通过点击编辑区域左下角的小矩形图标来打开它。在调整大小时，按住\
  \ `➤` 键，Interface Builder 会在屏幕上绘制一些有用的红色线条，从而更容易感知图像视图的位置。这个技巧在拖动时不起作用，因为按住 `➤`\
  \ 键会提示 Interface Builder 复制被拖动的对象。但是，如果您选择 Editor ➤ Canvas ➤ Show Bounds Rectangles，Interface\
  \ Builder 会在所有界面项目周围绘制线条，使其更容易看到。再次选择“Show Bounds Rectangles”可以关闭这些线条。\n\n### 设置视图属性\n\
  \n选中您的图像视图，然后将注意力转回属性检查器。检查器中“Image View”部分下方是“View”部分。您可能已经推断出，这里的模式是：特定于所选对象的属性显示在最顶部，其后是适用于所选对象父类的更通用属性。在本例中，`UIImageView`\
  \ 的父类是 `UIView`，因此下一部分简单地标记为“View”，它包含任何视图类都具有的属性。\n\n#### Mode 属性\n\n视图检查器中的第一个选项是一个标记为“Mode”的弹出菜单。“Mode”菜单定义了视图将如何显示其内容。如您所见，就图像视图而言，这决定了图像在视图内部的对齐方式以及是否缩放以适配。您可以随意尝试\
  \ `apress_logo` 的各种选项，但完成后请记得将其重置为“Center”。\n\n如前所述，选择任何会导致图像缩放的选项都可能会在运行时增加处理开销，因此最好尽可能避免这种情况，并在导入图像之前正确调整其大小。如果您想以多种尺寸显示同一张图像，通常最好在项目中拥有同一张图像的不同尺寸副本，而不是强制\
  \ iOS 设备在运行时进行缩放。当然，有时在运行时进行缩放是合适的，甚至是不可避免的；这是一条指导原则，而非硬性规定。\n\n#### Semantic 属性\n\
  \n紧挨在“Mode”下方，您会找到 `Semantic` 属性。此属性在 iOS 9 中添加，允许您指定在从右到左阅读顺序的区域设置（如希伯来语或阿拉伯语）中，视图应如何呈现。默认情况下，视图状态为“unspecified”（未指定），但您可以通过在此处选择合适的值来更改它。有关更多详细信息，请参阅\
  \ Xcode 文档中 `UIView` 类的 `semanticContentAttribute` 属性描述。\n\n#### Tag\n\n下一个项目“Tag”值得一提，尽管我们在本章中不会用到它。`UIView`\
  \ 的所有子类（包括所有视图和控件）都有一个名为 `tag` 的属性，它只是一个数值，您可以在此处或在代码中设置它。标签是供您使用的——系统不会设置或更改其值。如果您为控件或视图分配了一个标签值，那么除非您更改它，否则可以确信该标签将始终具有该值。\n\
  \n标签提供了一种简单、与语言无关的方式来识别界面中的对象。假设您有五个不同的按钮，每个都有不同的标签，并且您希望使用单个操作方法处理所有五个按钮。在这种情况下，您可能需要某种方法在调用您的操作方法时区分这些按钮。与标签不同，标记永远不会改变，因此如果您在\
  \ Interface Builder 中设置了标签值，您就可以将其作为一种快速可靠的方法，通过 `sender` 参数来检查哪个控件被传递到了操作方法中。\n\
  \n\n\n#### 交互复选框\n\n“交互”部分的两个复选框与用户交互相关。第一个复选框 `User Interaction Enabled`（启用用户交互）指定用户是否能够对此对象执行任何操作。对于大多数控件，此框应被勾选，因为若未勾选，控件将永远无法触发操作方法。然而，图像视图默认未勾选，因为它们通常仅用于显示静态信息。由于我们在此只是需要在屏幕上显示一张图片，因此无需开启此项。\n\
  \n第二个复选框是 `Multiple Touch`（多点触控），它决定了该控件是否能够接收多点触控事件。多点触控事件支持复杂手势，例如许多 iOS 应用中用于缩放的双指捏合手势。我们将在第\
  \ 18 章详细讨论手势和多点触控事件。由于此图像视图完全不接受用户交互，因此没有理由开启多点触控事件，所以请保持此复选框未勾选状态。\n\n#### Alpha\
  \ 值\n\n检查器中的下一项是 `Alpha`。使用 `Alpha` 时需小心，因为它定义了视图的透明程度——即其下方内容透过显示的可见度。它被定义为一个介于\
  \ `0.0` 和 `1.0` 之间的浮点数，其中 `0.0` 表示完全透明，`1.0` 表示完全不透明。如果你使用任何小于 `1.0` 的值，你的 iOS 设备将以一定的透明度绘制此视图，从而使其背后的任何对象都能透显出来。当值小于\
  \ `1.0` 时，即使视图背后没有有趣的内容，也会导致你的应用程序耗费处理器周期，将部分透明的视图与背后的空白区域进行合成。因此，除非你有非常充分的理由，否则不要将\
  \ `Alpha` 设置为 `1.0` 以外的值。\n\n#### 背景\n\n下一项是 `Background`（背景），它决定了视图的背景颜色。对于图像视图，只有当图像未填满其视图并出现上下黑边，或者图像的某些部分透明时，此设置才有意义。由于我们已经调整了视图大小以完美匹配图像，此设置将不会产生可见效果，因此我们可以保持其默认状态。\n\
  \n#### 色调\n\n下一个控件允许你为选中的视图指定一个色调颜色（tint color）。某些视图在绘制自身时会使用此颜色。我们将在本章稍后使用的分段控件会根据其色调颜色着色，但\
  \ `UIImageView` 不会。\n\n#### 绘制复选框\n\n在 `Tint`（色调）下方，你将看到一系列绘制（Drawing）复选框。第一个标记为\
  \ `Opaque`（不透明）。该复选框默认应处于勾选状态；如果未勾选，请点击勾选它。这会告诉 iOS，视图背后无需绘制任何内容，并允许 iOS 的绘制方法进行一些优化以加速绘制。\n\
  \n你可能会好奇，既然我们已经将 `Alpha` 值设置为 `1.0` 以表示不透明，为何还需要勾选 `Opaque` 复选框。Alpha 值适用于待绘制图像的各个部分；但如果图像未完全填满图像视图，或者由于\
  \ Alpha 通道的存在导致图像有孔洞，那么无论 `Alpha` 中设置的值如何，下层对象仍可能透显出来。通过勾选 `Opaque`，我们是在告诉 iOS：无论何种情况，此视图背后永远无需绘制，因此它无需在处理我们对象背后的事物上浪费处理时间。我们可以安全地勾选\
  \ `Opaque` 复选框，因为我们之前选择了 `Size To Fit`（大小适应内容），这会使图像视图与其包含的图像尺寸相匹配。\n\n`Hidden`（隐藏）复选框的功能正如你所想。若勾选，用户将无法看到此对象。隐藏对象有时很有用，如同你将在本章后面隐藏开关和按钮时所见；然而，在绝大多数情况下——包括现在——你希望此框保持未勾选状态。\n\
  \n下一个复选框 `Clears Graphics Context`（清除图形上下文）极少需要勾选。当勾选时，iOS 在实际绘制对象之前，会用透明黑色绘制该对象覆盖的整个区域。再次强调，出于性能考虑且很少需要用到，应将其关闭。请确保此复选框未被勾选（默认情况下可能是勾选状态）。\n\
  \n`Clip Subviews`（裁剪子视图）是一个有趣的选项。如果你的视图包含子视图，且这些子视图并未完全包含在其父视图的边界内，此复选框决定了子视图的绘制方式。如果勾选了\
  \ `Clip Subviews`，则仅绘制子视图中位于父视图边界内的部分。如果未勾选 `Clip Subviews`，子视图将被完整绘制，即使它们超出了父视图的边界。\n\
  \n`Clip Subviews` 默认未勾选。似乎默认行为应与实际情况相反，这样子视图就无法四处随意绘制。然而，从数学计算角度来看，计算裁剪区域并仅显示子视图的一部分是一种成本相对较高的操作；大多数情况下，子视图不会超出其父视图的边界。如果你确实因某种原因需要它，可以开启\
  \ `Clip Subviews`，但出于性能考虑，它默认是关闭的。\n\n本节最后一个复选框 `Autoresize Subviews`（自动调整子视图大小）告诉\
  \ iOS，如果此视图大小改变，则自动调整其所有子视图的大小。保持此框勾选，但由于我们不允许视图大小被调整，因此无论它是否勾选，实际上都无关紧要。\n\n####\
  \ 拉伸\n\n接下来你会看到一个标签仅为 `Stretching`（拉伸）的部分，它指的是矩形视图在屏幕上调整大小时被重新绘制的方式。其核心思想是，视图的整体内容并非均匀拉伸，而是可以保持视图的外边缘（例如按钮的斜边）的外观不变，即使中心部分被拉伸。\n\
  \n这里设置的四个浮点数让你可以指定矩形中哪些部分是可拉伸的，方法是指定视图左上角的一个点以及可拉伸区域的大小，所有值都以介于 `0.0` 和 `1.0` 之间的数字形式表示，代表占整个视图尺寸的比例。例如，如果你希望每条边有\
  \ 10% 的部分不可拉伸，你可以将 `X` 和 `Y` 都设置为 `0.1`，并将 `Width` 和 `Height` 都设置为 `0.8`。在这种情况下，我们将保持默认值：`X`\
  \ 和 `Y` 为 `0.0`，`Width` 和 `Height` 为 `1.0`。大多数情况下，你无需更改这些值。\n\n\n\n### 添加文本字段\n\n\
  视图图片完成后，接下来该添加文本字段了。从对象库中拖取一个文本字段，放到故事板上。利用蓝色参考线将其与右侧边距对齐，并放置在图片视图下方稍远一点的位置，如图 4-11\
  \ 所示。\n\n![A329781_3_En_4_Fig11_HTML.jpg](img/A329781_3_En_4_Fig11_HTML.jpg)\n\n\
  图 4-11.\n\n从库中拖出一个文本字段，放到视图上，位于图片视图正下方，并紧贴右侧的蓝色参考线。\n\n接下来，从库中拖出一个标签，然后拖到视图上，使其与视图左边距对齐，并与之前放置的文本字段在垂直方向上对齐。注意，当你移动标签时，会出现多条蓝色参考线，方便你通过标签的顶部、底部或中间位置与文本字段对齐。我们将使用基线来对齐标签和文本字段，在你拖拽到这些参考线的中间位置时，基线就会显示出来（参见图\
  \ 4-12）。\n\n![A329781_3_En_4_Fig12_HTML.jpg](img/A329781_3_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12.\n\n使用基线参考线对齐标签和文本字段。\n\n双击你刚刚放置的标签，将其文本从 `Label` 改为 `Name:`（注意标签末尾的冒号），然后按\
  \ `Enter` 键确认更改。\n\n接着，从库中再拖出一个文本字段到视图上，利用参考线将其放置在第一个文本字段下方，如图 4-13 所示。\n\n![A329781_3_En_4_Fig13_HTML.jpg](img/A329781_3_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13.\n\n添加第二个文本字段。\n\n添加完第二个文本字段后，从库中再取出一个标签，放在左侧已有标签的下方。再次使用中间的蓝色参考线将新标签与第二个文本字段对齐。双击新标签，将其文本改为\
  \ `Number:`（同样，别忘了加冒号）。\n\n现在，将底部文本字段的宽度向左扩展，使其紧挨着标签的右侧。为什么要从底部文本字段开始？因为我们希望两个文本字段宽度相同，而底部标签更长。\n\
  \n单击底部文本字段，向左拖动左侧的调整大小点，直到出现一条蓝色参考线，提示你已经到达应靠近标签的极限位置，如图 4-14 所示。这条参考线比较细微——高度仅与文本字段本身一致，所以请仔细查看。\n\
  \n![A329781_3_En_4_Fig14_HTML.jpg](img/A329781_3_En_4_Fig14_HTML.jpg)\n\n图 4-14.\n\
  \n扩展底部文本字段的宽度。\n\n现在，用同样的方式扩展顶部文本字段，使其与底部字段尺寸一致。同样，蓝色参考线会提供帮助，并且这次它会一直延伸到另一个文本字段，更容易发现。\n\
  \n文本字段部分基本完成，但还有一个小细节。回头看看图 4-1。你注意到 `Name:` 和 `Number:` 是右对齐的吗？目前，我们的标签都靠左对齐。要右对齐这两个标签的右侧，请点击\
  \ `Name:` 标签，按住 `⇧(Shift)` 键，再点击 `Number:` 标签，将两个标签同时选中。接下来，按 `⌥⌘4` 打开属性检查器，并确保\
  \ `Label` 部分已展开，以便查看标签的特定属性。如果未展开，点击标题右侧的 `Show` 按钮将其打开。现在，使用检查器中的 `Alignment` 控件，将这两个标签的内容设置为右对齐。然后，点击编辑区域底部的\
  \ `Pin` 图标，在弹出的菜单中勾选 `Equal Widths` 复选框，并点击 `Add 1 Constraint`，添加一个约束，确保这两个字段始终保持相同的宽度。此时，活动视图中会出现一个橙色警告三角形，问题导航器中也会出现一些布局警告。先忽略它们——我们稍后会修复。\n\
  \n完成后，界面的这一部分应该与图 4-1 非常相似。唯一的区别是每个文本字段中的浅灰色文本。我们现在就添加它。选中顶部文本字段（即 `Name:` 标签旁边的那个），按\
  \ `⌥⌘4` 打开属性检查器（见图 4-15）。文本字段是 iOS 中最复杂的控件之一，也是最常用的控件之一。让我们从检查器顶部开始查看设置。请确保你选中的是文本字段，而不是标签或其他元素。\n\
  \n![A329781_3_En_4_Fig15_HTML.jpg](img/A329781_3_En_4_Fig15_HTML.jpg)\n\n图 4-15.\n\
  \n显示默认值的文本字段检查器。\n\n\n\n## 文本字段检查器设置\n\n在第一个部分中，`Text`（文本）标签关联了两个输入字段，用于控制显示在文本字段中的文本。上方是一个弹出按钮，可让您在纯文本和富文本之间选择，富文本可以包含多种字体和其他属性。我们在第\
  \ 3 章的示例中使用了富文本为部分文本添加了粗体效果。现在，我们先将该弹出按钮设置为 Plain（纯文本）。紧接着，您可以设置文本字段的默认值。当您的应用程序启动时，在此处输入的任何内容都会显示在文本字段中，而不是一片空白。\n\
  \n接下来是一些用于设置字体和字体颜色的控件。我们将颜色保留为默认的黑色。请注意，颜色弹出菜单分为两部分，右侧允许您从一组预设颜色中选择，左侧则让您访问颜色选择器，以便更精确地指定颜色。\n\
  \n字体设置分为三个部分。右侧是一个控件，可让您逐点增加或减小文本字号。左侧允许您手动编辑字体名称或字号。您可以点击 T 形框图标，调出一个弹出窗口，用于设置各种字体属性。我们将字体保留默认设置\
  \ System 14.0（系统 14.0），或根据您的配置所设置的任何字号。\n\n在这些字段下方，有五个用于控制字段内文本对齐方式的按钮。我们将此设置保留为默认的左对齐（最左侧的按钮）。\n\
  \n在本节末尾，Placeholder（占位符）允许您指定一段文本，该文本会以灰色显示在文本字段内，但仅在字段为空值时可见。如果空间紧张，您可以使用占位符来代替向布局中添加标签（就像我们之前做的那样），或者用它来提示用户应在此文本字段中输入什么。请在我们当前选中的文本字段的占位符中，输入文本\
  \ `Type in a name`（输入一个名称），然后按 Enter 键确认更改。\n\n接下来的两个字段，Background（背景）和 Disabled（禁用），仅当您需要自定义文本字段的外观时才使用，在绝大多数情况下这是不必要的，实际上也是不建议的。用户期望文本字段有其特定的外观。我们将保留其默认设置。\n\
  \n接下来是四个标记为 Border Style（边框样式）的按钮。这些按钮允许您更改文本字段边缘的绘制方式。默认值（最右侧的按钮）会创建 iOS 应用程序中用户最习惯看到的普通文本字段样式。您可能想查看所有四种不同的样式，但完成后，请将此设置恢复为最右侧的按钮。\n\
  \n在边框设置下方是一个 Clear button（清除按钮）弹出菜单，允许您选择清除按钮何时出现。清除按钮是可能出现在文本字段右端的小 X 标记。清除按钮通常用于搜索字段以及您可能经常更改值的其他字段。它们通常不包含在用于持久化数据的文本字段中，因此请将其保留为默认的\
  \ Never appears（从不出现）。\n\n`Clear When Editing Begins`（开始编辑时清除）复选框指定了用户触摸此字段时会发生什么。如果勾选此框，该字段中先前存在的任何值都将被删除，用户将从空字段开始输入。如果未勾选此框，则之前的值将保留在字段中，用户可以对其进行编辑。请保持此框未勾选。\n\
  \n下一部分以一个控件开始，该控件允许您设置文本字段用于显示文本的最小字号。暂时将其保留为默认值。`Adjust to Fit`（自动调整）复选框指定了如果文本字段尺寸缩小，文本大小是否应缩小。自动调整将确保整个文本在视图中可见，即使文本通常过大而无法适应分配的空间。此复选框与最小字号设置协同工作。无论字段大小如何，文本都不会被调整为小于该最小字号。指定最小字号可以确保文本不会变得太小而难以阅读。\n\
  \n下一部分定义了当此文本字段被使用时，键盘的外观和行为。由于我们期望输入的是姓名，让我们将 Capitalization（自动大写）弹出菜单更改为 Words（单词）。这会导致每个单词的首字母自动大写，这通常是处理姓名时需要的效果。\n\
  \n接下来的四个弹出菜单——Correction（自动纠正）、Spell Checking（拼写检查）、Keyboard Type（键盘类型）和 Appearance（外观）——可以保留默认值。花点时间查看每个选项，了解这些设置的作用。\n\
  \n接下来是 Return Key（返回键）弹出菜单。返回键位于虚拟键盘的右下角，其标签会根据您所执行的操作而变化。例如，如果您在 Safari 的搜索字段中输入文本，它会显示\
  \ Search（搜索）。在我们这样的应用程序中，文本字段与其他控件共享屏幕，Done（完成）是合适的选择。在此处进行更改。\n\n如果勾选了 `Auto-enable\
  \ Return Key`（自动启用返回键）复选框，那么在文本字段中至少输入一个字符后，返回键才会被启用。请保持此框未勾选，因为我们允许文本字段保持为空，如果用户不想输入任何内容的话。\n\
  \n`Secure`（安全）复选框指定了输入的字符是否在文本字段中显示。如果文本字段被用作密码字段，您需要勾选此框。在我们的应用程序中，请保持此框未勾选。\n\n\
  下一部分（您可能需要向下滚动才能看到）允许您设置从 `UIControl` 继承的控件属性；但是，这些属性通常不适用于文本字段，并且除了 `Enabled`（启用）复选框之外，不会影响字段的外观。我们希望保持这些文本字段处于启用状态，以便用户可以与它们交互。请保留此部分的默认设置。\n\
  \n检查器中的最后一个部分，View（视图），应该看起来很熟悉。它与我们之前查看的图像视图检查器中的同名部分相同。这些是从 `UIView` 类继承的属性；由于所有控件都是\
  \ `UIView` 的子类，因此它们都共享此部分的属性。就像您之前对图像视图所做的那样，勾选 `Opaque`（不透明）复选框，并取消勾选 `Clears Graphics\
  \ Context`（清除图形上下文）和 `Clip Subviews`（裁剪子视图）——原因如前所述。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n#### 设置第二个文本字段的属性\n\n接下来，在故事板中单击下方文本字段（即`Number:`标签旁边的那个），然后返回属性检查器。在`占位符`字段中，输入`Type\
  \ in a number`，并确保`开始编辑时清除`未被勾选。再往下一点，点击`键盘类型`弹出菜单。由于我们希望用户只输入数字，而不是字母，因此选择`数字键盘`。在\
  \ iPhone 上，这可以确保用户看到的键盘只包含数字，这意味着他们将无法输入字母字符、符号或数字以外的任何内容。我们不需要为数字键盘设置`回车键`值，因为该样式的键盘没有`Return`键；因此，所有其他检查器设置可以保留为默认值。正如您之前所做的那样，勾选`不透明`复选框，并取消勾选`清除图形上下文`和`剪裁子视图`。在\
  \ iPad 上，选择`数字键盘`的效果是，当用户激活文本字段时，会弹出一个处于数字模式的全功能虚拟键盘，但用户可以切换回字母输入。这意味着在实际的应用程序中，您在处理`Number`字段的内容时，必须验证用户实际输入的是否是有效的数字。\n\
  \n> **提示**  \n> 如果您真的想阻止用户在文本字段中输入数字以外的任何内容，可以通过创建一个实现 `UITextViewDelegate` 协议中\
  \ `textView(_ textView: shouldChangeTextInRange: replacementText text:)` 方法的类，并将其设置为文本视图的委托来实现。具体细节并不复杂，但超出了本书的范围。\n\
  \n### 添加约束\n\n在继续之前，我们需要调整一些布局约束。当您在 Interface Builder 中将一个视图拖到另一个视图中时（就像我们刚才所做的），Xcode\
  \ 不会自动为其创建任何约束。布局系统需要一组完整的约束，因此在编译代码时，Xcode 会生成一组描述布局的默认约束。这些约束取决于每个对象在其父视图中的位置，如果它更靠近左边缘或右边缘，它将被固定到左侧或右侧。类似地，如果它更靠近顶部或底部边缘，它将被固定到顶部或底部。如果它在任一方向上居中，它通常会获得一个将其固定到中心的约束。\n\
  \n更复杂的是，Xcode 还可能应用自动约束，将每个新对象固定到同一父视图中的一个或多个“同级”对象。这种自动行为可能符合也可能不符合您的期望，因此通常情况下，最好在应用程序编译之前，在\
  \ Interface Builder 中创建一组完整的约束。在前两章中，我们通过一些示例进行了实践。\n\n让我们再看一下我们目前所处的位置。要查看任何特定视图的所有有效约束，可以尝试选择它并打开大小检查器。如果您选择任一文本字段，您会看到大小检查器显示一条消息，声称所选视图没有约束。实际上，我们一直在构建的这个\
  \ GUI 只有我们之前应用的约束，这些约束将图像视图和容器视图的水平中心绑定在一起，并使标签具有相同的大小。点击图像视图和标签，在检查器中查看这些约束。\n\n\
  我们真正需要的是一组完整的约束，以精确地告诉布局系统如何处理我们所有的视图和控件，就像在编译时得到的那样。幸运的是，这很容易实现。通过从容器视图的左上角内部向右下角拖动鼠标框选所有视图和控件。如果您开始拖动并发现视图开始移动，只需松开鼠标，在视图内部稍微移动一点，然后重试。当所有项目都被选中后，使用菜单执行`Editor\
  \ ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints`命令，从菜单的`All Views in View\
  \ Controller`部分。完成此操作后，您将看到我们所有的视图和控件现在都有一些蓝色的小棒将它们相互连接并连接到容器视图。每个小棒代表一个约束。现在创建这些约束而不是让\
  \ Xcode 在编译时创建它们的好处是，我们有机会在需要时修改每个约束。在本书中，我们将进一步探讨对约束可以执行的操作。\n\n> **提示**  \n> 将约束应用于视图控制器拥有的所有视图的另一种方法是在文档大纲中选择该视图控制器，然后选择`Editor\
  \ ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints`。\n\n此时，所有必要的约束都已就位，我们可以修复问题导航器中的布局警告。为此，在文档大纲中选择视图控制器，然后在\
  \ Xcode 菜单中点击`Editor ➤ Resolve Auto Layout Issues ➤ Update Frames`。布局警告应该会消失。\n\n\
  ### 创建并连接插座\n\n对于界面的这第一部分，剩下的就是创建和连接我们的插座。我们界面上的图像视图和标签不需要插座，因为我们不需要在运行时更改它们。然而，这两个文本字段将保存我们代码中需要使用到的数据，因此我们需要指向每个文本字段的插座。\n\
  \n正如您可能从上一章中记得的那样，Xcode 允许我们使用助理编辑器同时创建和连接插座，该编辑器应该已经打开（但如果尚未打开，请按照前面所述打开它）。\n\n\
  确保在项目导航器中选中了您的故事板文件。如果您的屏幕空间不大，您可能还想在这一步中选择`View ➤ Utilities ➤ Hide Utilities`来隐藏工具面板。在助理编辑器的跳转栏中，选择`Automatic`。您应该会看到\
  \ `ViewController.swift` 文件，如图 4-16 所示。\n\n![A329781_3_En_4_Fig16_HTML.jpg](img/A329781_3_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16. 打开助理编辑器后的故事板编辑区域。您可以在右侧看到助理编辑器，其中显示了来自 `ViewController.swift` 的代码。\n\n\
  让我们开始连接。从顶部文本字段按住 Control 键拖拽到 `ViewController.swift` 文件中，就在 `ViewController` 行的正下方。您应该会看到一个灰色的弹出窗口，上面写着\
  \ `Insert Outlet, Action, or Outlet Collection`（参见图 4-17）。松开鼠标按钮，您会看到与上一章中相同的弹出窗口。我们想要创建一个名为\
  \ `nameField` 的插座，因此，在`名称`字段中输入 `nameField`，然后按回车键或点击`连接`按钮。\n\n![A329781_3_En_4_Fig17_HTML.jpg](img/A329781_3_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17. 打开助理编辑器后，我们按住 Control 键拖拽到源代码上，以便同时创建 `nameField` 插座并将其连接到相应的文本字段。\n\n\
  现在，您在 `ViewController` 中有了一个名为 `nameField` 的属性，并且它已连接到顶部文本字段。对第二个文本字段执行相同操作，创建并连接到一个名为\
  \ `numberField` 的属性。完成此操作后，您的代码应如列表 4-1 所示。\n\n```\nclass ViewController: UIViewController\
  \ {\n@IBOutlet weak var nameField: UITextField!\n@IBOutlet weak var numberField:\
  \ UITextField!\n列表 4-1.\n我们已连接的文本字段\n```\n\n\n\n## 关闭键盘\n\n让我们来看看应用目前的工作效果，选择 产品\
  \ ➤ 运行。我们的应用应该会出现在 iOS 模拟器中。点击 `Name` 文本字段，传统的键盘应该会弹出来。\n\n**提示**  \n如果键盘没有出现，可能是模拟器被配置为连接了硬件键盘。要解决这个问题，请在\
  \ iOS 模拟器菜单中取消选中 Hardware ➤ Keyboard ➤ Connect Hardware Keyboard，然后重试。\n\n输入一个名字，然后点击\
  \ `Number` 字段。数字键盘应该会弹出，如图 4-18 所示。Cocoa Touch 仅仅通过向界面添加文本字段，就免费为我们提供了所有这些功能。\n\n\
  ![A329781_3_En_4_Fig18_HTML.jpg](img/A329781_3_En_4_Fig18_HTML.jpg)  \n图 4-18。当你点击文本字段或数字字段时，键盘会自动弹出\n\
  \n但有一个小问题。如何让键盘消失呢？直接试试看。你会发现什么都没发生。\n\n### 点击“完成”时关闭键盘\n\n由于键盘是基于软件的，而非实体键盘，我们需要额外几步操作来确保用户使用完毕后键盘能够消失。当用户点击文本键盘上的“完成”按钮时，会触发一个“Did\
  \ End On Exit”事件。当这种情况发生时，我们需要告知文本字段放弃控制权，以便键盘消失。为此，我们需要向我们的控制器类添加一个操作方法。\n\n在项目导航器中选择\
  \ `ViewController.swift`，并在文件底部、闭花括号之前添加列表 4-2 中的操作方法。\n\n```\n@IBAction func textFieldDoneEditing(sender:\
  \ UITextField) {\n    sender.resignFirstResponder()\n}\n```\n\n列表 4-2。点击“完成”时关闭键盘的方法\n\
  \n正如我们在第 2 章中看到的，第一响应者代表用户当前正在与之交互的控件。在我们的新方法中，我们告知我们的控件放弃第一响应者的身份，将这一角色交还给用户之前操作过的控件。当一个文本字段交出第一响应者状态时，与之关联的键盘就会消失。\n\
  \n保存 `ViewController.swift` 文件。让我们回到故事板，并安排从我们的两个文本字段触发此操作。\n\n在项目导航器中选择 `Main.storyboard`，单击选中\
  \ `Name` 文本字段，然后按 ⌥⌘6 调出连接检查器。这次，我们不需要上一章中使用的“Touch Up Inside”事件。相反，我们需要“Did End\
  \ On Exit”事件，因为当用户点击文本键盘上的“完成”按钮时，该事件将被触发。\n\n将“Did End On Exit”旁边的圆圈拖到故事板中的黄色 View\
  \ Controller 图标上（该图标位于你一直配置的视图上方的工具栏中），然后松开鼠标。会出现一个小的弹出菜单，其中包含我们刚刚添加的单个操作的名称。点击\
  \ `textFieldDoneEditing` 操作来选择它。如果你还打开了辅助编辑器，也可以通过将连接检查器中的圆圈拖到辅助编辑器中的 `textFieldDoneEditing()`\
  \ 方法来实现。对另一个文本字段重复此过程，保存更改，然后再次运行应用。\n\n当模拟器出现后，点击 `Name` 字段，输入一些内容，然后点击“完成”按钮。正如预期，键盘消失了，但\
  \ `Number` 字段怎么办呢？从图 4-18 中可以看到，数字键盘并没有“完成”按钮。\n\n并非所有键盘布局都包含“完成”按钮，包括数字键盘。我们可以强制用户点击\
  \ `Name` 字段然后点击“完成”，但这不太用户友好。而我们显然希望我们的应用是用户友好的。让我们看看如何处理这种情况。\n\n### 点击背景关闭键盘\n\
  \n苹果的 iPhone 应用允许在大多数文本字段中通过点击视图中没有活跃控件的任何地方来让键盘消失。让我们为我们的应用实现这个功能。\n\n答案可能因其简单而让你惊讶。我们的视图控制器包含一个从\
  \ `UIViewController` 继承而来的名为 `view` 的属性。这个 `view` 属性对应故事板中的主视图。`view` 属性指向一个 `UIView`\
  \ 实例，该实例充当用户界面中所有项目的容器。它有时被称为容器视图，因为它的主要目的仅仅是容纳其他视图和控件。本质上，容器视图提供了用户界面的背景。我们需要做的就是检测用户何时点击了它。正如你将在第\
  \ 18 章中看到的，有几种方法可以做到这一点。首先，`UIResponder` 类（`UIView` 派生自此类）中有一些方法，当用户将一根或多根手指放在视图上、移动手指或抬起手指时，这些方法会被调用。我们可以覆盖其中一个方法（特别是当用户从屏幕抬起手指时调用的那个方法）并在其中添加我们的代码。另一种方法是为容器视图添加一个手势识别器。手势识别器会监听用户与视图交互时生成的事件，并尝试弄清楚用户正在做什么。有几种不同的手势识别器对应不同的操作序列，正如你将在第\
  \ 18 章中看到的。我们需要使用的是轻点手势识别器，当用户将手指放在屏幕上，然后在相当短的时间内再次抬起时，它会发出一个事件信号。\n\n要使用手势识别器，你需要创建一个实例，配置它，将其链接到你要监视触摸事件的视图，并将其连接到视图控制器类中的一个操作方法。当手势被识别时，你的操作方法就会被调用。你可以通过代码创建和配置识别器，也可以在\
  \ Interface Builder 中完成。在这里，我们将使用 Interface Builder，因为它更简单。返回故事板，确保对象库可见，然后找到轻点手势识别器，将其拖到故事板上，并放到容器视图中。该识别器在运行时不可见，因此你在故事板中看不到它，但它会出现在文档大纲中，如图\
  \ 4-19 所示。\n\n![A329781_3_En_4_Fig19_HTML.jpg](img/A329781_3_En_4_Fig19_HTML.jpg)\
  \  \n图 4-19。文档大纲中的轻点手势识别器\n\n选择手势识别器后，你可以在属性检查器中看到其可配置的属性，如图 4-20 所示。\n\n![A329781_3_En_4_Fig20_HTML.jpg](img/A329781_3_En_4_Fig20_HTML.jpg)\
  \  \n图 4-20。轻点手势识别器的属性\n\n\n\n`Taps`字段指定了手势识别前需要的点击次数，而`Touches`字段控制需要几根手指点击。默认的单次单指点击正是我们所需的，因此保持这两个字段不变。其他属性也无需修改，我们只需要将识别器关联到一个操作方法上。为此，在助理编辑器中打开`ViewController.swift`，然后按住\
  \ Control 键从文档大纲中的识别器拖拽到`ViewController.swift`中结束花括号上方的那一行。当出现如图 4-16 所示的常见灰色弹出窗口时松开鼠标。在打开的弹出窗口中，将连接类型改为`Action`，方法名称改为`onTapGestureRecognized`，以便让\
  \ Xcode 添加操作方法并将其关联到手势识别器。每当用户点击主视图时，此方法都会被调用。我们只需添加关闭键盘的代码（如果键盘处于打开状态）。我们已经知道如何实现，因此将代码修改为清单\
  \ 4-3 所示。\n\n```swift\n@IBAction func onTapGestureRecognized(sender: AnyObject)\
  \ {\n    nameField.resignFirstResponder()\n    numberField.resignFirstResponder()\n\
  }\n```\n\n这段代码会告知两个文本字段：如果它们处于第一响应者状态，则放弃该状态。对非第一响应者的控件调用`resignFirstResponder()`是完全安全的，因此我们无需检查哪个是第一响应者，直接对两个文本字段都调用即可。再次构建并运行应用程序，这次键盘不仅会在点击“完成”按钮时消失，还会在你点击非活动控件的任何区域时消失——这正是用户期望的行为。\n\
  \n### 添加滑块和标签\n\n接下来，我们添加一个滑块和一个标签，目的是让标签显示的数值随滑块移动而变化。在项目导航器中选择`Main.storyboard`，以便向应用程序的用户界面添加更多组件。从对象库中拖出一个滑块，将其排列在“数字”文本字段下方，以右侧的蓝色参考线为停止点，并在滑块与底部文本字段之间留出一些间距。单击新添加的滑块将其选中，然后按下⌥⌘4\
  \ 返回属性检查器（如果尚未显示，如图 4-21 所示）。\n\n![A329781_3_En_4_Fig21_HTML.jpg](img/A329781_3_En_4_Fig21_HTML.jpg)\n\
  \n滑块允许你在给定范围内选择一个数值。使用检查器将最小值设为`1`，最大值设为`100`，当前值设为`50`。保持“连续事件更新”复选框为选中状态。这可以确保当滑块值变化时，事件会持续触发。\n\
  \n拖出一个标签，将其放置在滑块旁边，使用蓝色参考线使其在垂直方向上与滑块对齐，并且其左侧边缘与视图的左边距对齐（如图 4-22 所示）。\n\n![A329781_3_En_4_Fig22_HTML.jpg](img/A329781_3_En_4_Fig22_HTML.jpg)\n\
  \n双击新放置的标签，将其文本从`Label`改为`100`。这是滑块能容纳的最大值，我们可以用它来确定滑块的正确宽度。由于`100`比`Label`短，接口生成器会自动缩小标签，就像你拖拽了右侧中间的重置大小圆点一样。尽管有这种自动行为，你仍然可以自由调整标签的大小。如果你之后想让工具再次为你选择最佳尺寸，只需按下⌘=或选择“编辑器”➤“适配内容大小”。\n\
  \n接下来，调整滑块大小：单击滑块将其选中，然后向左拖拽左侧的重置大小手柄，直到蓝色参考线指示你已接近标签的右侧边缘为止。\n\n现在我们已经添加了两个控件，需要添加相应的自动布局约束。这次我们还是采用简单的方法：在文档大纲中选择“视图控制器”图标，然后点击“编辑器”➤“解决自动布局问题”➤“添加缺失的约束”。Xcode\
  \ 会调整约束，使其匹配屏幕上所有控件的位置。\n\n### 创建并连接操作和插座\n\n对于这两个控件，剩下要做的就是将它们连接到插座和操作——我们需要一个指向标签的插座，以便在滑块被使用时更新标签的值；同时还需要为滑块提供一个操作方法，以便在其值变化时调用。确保助理编辑器已打开并显示`ViewController.swift`，然后按住\
  \ Control 键从滑块拖拽到助理编辑器中`onTapGestureRecognized()`方法的下方。当弹出窗口出现时，将“连接”字段改为`Action`，在“名称”字段中输入`onSliderChanged`，将“类型”设置为`UISlider`，然后按回车键创建并连接操作。\n\
  \n接下来，按住 Control 键从新添加的标签（显示`100`的那个）拖拽到助理编辑器。这次，将其拖拽到文件顶部`numberField`属性声明的下方。当弹出窗口出现时，在“名称”文本字段中输入`sliderLabel`，然后按回车键创建并连接插座。\n\
  \n\n\n### 实现操作（Action）方法\n\n虽然 Xcode 已经创建并连接了我们的操作（Action）方法，但实际编写构成该方法的代码，使其按预期工作，仍需由我们完成。将\
  \ `onSliderChanged()` 方法修改为代码清单 4-4 所示的内容。\n\n```\n@IBAction func onSliderChanged(_\
  \ sender: UISlider) {\nsliderLabel.text = \"\\(lroundf(sender.value))\"\n}\n```\n\
  \n对 `lroundf()` 函数（属于标准 C 库的一部分）的调用，会获取滑块的当前值并将其四舍五入为最接近的整数。该行代码的其余部分将此值转换为包含该数字的字符串，并将其赋值给标签。\n\
  \n这处理了控制器对滑块移动的响应；但为了做到完全一致，我们需要确保在用户甚至还没有触摸滑块之前，标签就能显示正确的滑块数值。为此，请在 `viewDidLoad()`\
  \ 方法中添加以下代码行：`sliderLabel.text = \"50\"`。\n\n该方法在运行中的应用从故事板文件加载视图后、但在视图显示在屏幕上之前立即执行。我们添加的这行代码确保了用户第一时间就看到正确的起始值。\n\
  \n保存文件。接下来，按下 ⌘R 在 iOS 模拟器中构建并启动你的应用，然后尝试拖动滑块。当你移动滑块时，你应该会看到标签的文本实时变化。又一块拼图归位了。但是，如果你将滑块拖向左侧（使数值低于\
  \ 10）或一直拖到右侧（将数值设为 100），你会看到一个奇怪的现象。当标签显示单个数字时，其左侧会水平收缩；当显示三位数字时，则会水平扩展。现在，除了标签包含的文本之外，你实际上并看不到标签本身，所以你看不到它的大小变化，但你会看到滑块实际上在与标签一起改变大小，变得更小或更大。它（滑块）与标签保持着某种尺寸关系，确保两者之间的间距始终相同。\n\
  \n这仅仅是 Interface Builder 工作方式的一个副作用，它帮助你创建响应式且流畅的图形用户界面（GUI）。我们之前创建了一些默认约束，而你现在看到的正是其中一个约束在起作用。Interface\
  \ Builder 创建的其中一个约束保持了这些元素之间的水平距离恒定。\n\n让我们通过创建自己的约束来覆盖这种行为。回到 Xcode，在故事板中选择标签，点击故事板底部的“图钉”图标。在弹出的菜单中，勾选“宽度”复选框，然后点击“添加\
  \ 1 个约束”。这将创建一个新的高优先级约束，告诉布局系统：“不要乱动这个标签的宽度。”如果你现在按下 ⌘R 再次构建并运行，你会看到当你在滑块上来回拖动时，标签不再扩大和缩小。\n\
  \n在本书后续内容中，我们还会看到更多关于约束及其使用的示例。但现在，让我们先来看看如何实现开关。\n\n## 实现开关、按钮和分段控件\n\n让我们再次回到\
  \ Xcode；这种来回切换可能看起来有点奇怪，但在 Xcode 中，在源代码、故事板和 nib 文件之间来回跳转，并在开发过程中在 iOS 模拟器中测试你的应用，是相当常见的做法。\n\
  \n我们的应用将有两个开关，它们是只有两种状态（开和关）的小型控件。我们还将添加一个分段控件来隐藏和显示这些开关。除了这个控件，我们还会添加一个按钮，当分段控件的右侧被点击时，这个按钮会显示出来。\n\
  \n在故事板中，从对象库中拖出一个分段控件（见图 4-23），将其放置在视图窗口中，位置略低于滑块，并水平居中。\n\n![A329781_3_En_4_Fig23_HTML.jpg](img/A329781_3_En_4_Fig23_HTML.jpg)\n\
  \n图 4-23. 将分段控件放置到故事板上\n\n双击分段控件上的“First”字样，将标题从“First”改为“Switches”。完成此操作后，对另一个分段重复此过程，将其重命名为“Button”（见图\
  \ 4-24），然后将控件拖回其居中位置。\n\n![A329781_3_En_4_Fig24_HTML.jpg](img/A329781_3_En_4_Fig24_HTML.jpg)\n\
  \n图 4-24. 重命名分段控件中的分段\n\n### 添加两个带标签的开关\n\n接下来，从库中取出一个开关，将其放置在视图上，位于分段控件下方并紧靠左边距。然后拖出第二个开关，将其放置在紧靠右边距的位置，并与第一个开关垂直对齐，如图\
  \ 4-25 所示。\n\n![A329781_3_En_4_Fig25_HTML.jpg](img/A329781_3_En_4_Fig25_HTML.jpg)\n\
  \n图 4-25. 向视图添加开关\n\n提示：在 Interface Builder 中，按住 ⌥ 键并拖动对象会创建该对象的副本。当需要创建同一对象的多个实例时，从库中只拖出一个对象，然后按住\
  \ Option 键拖动出所需数量的副本，可能会更快。\n\n我们添加的三个新控件需要布局约束。这次，我们将手动添加约束。首先，选择分段控件，点击“对齐”图标，在弹出的菜单中勾选“在容器中水平居中”，然后点击“添加\
  \ 1 个约束”，使其与视图中心对齐。接下来，再次选择分段控件，按住 Control 键向上方微微拖动，直到主视图的背景变为蓝色。松开鼠标，在弹出的菜单中选择“垂直间距\
  \ - 顶部布局指南”，以固定分段控件到视图顶部的距离。\n\n现在让我们调整开关。按住 Control 键，从左侧开关开始，相对于该开关向左上方向对角拖动，然后松开鼠标。按住\
  \ Shift 键，在弹出的菜单中同时选择“前导空间 - 容器边距”和“垂直间距 - 顶部布局指南”，松开 Shift 键，然后按 Return 键或点击弹出菜单外的任意位置以应用约束。对另一个开关执行类似操作，但这次是向相对于该开关的右上方向拖动，并选择“尾随空间\
  \ - 容器边距”和“垂直间距 - 顶部布局指南”。当你通过拖动来应用约束时，Xcode 会根据你拖动的方向提供不同的选项。如果你水平拖动，你会得到可以让你将控件附着到其父视图左边距或右边距的选项；而如果你垂直拖动，Xcode\
  \ 会假定你想要设置控件相对于其父视图顶部或底部的位置。这里，每个开关我们需要一个水平约束和一个垂直约束，所以我们对角拖动以向 Xcode 表明这一点，并同时获得了水平和垂直选项。\n\
  \n\n\n### 连接并创建 Outlets 和 Actions\n\n在添加按钮之前，我们需要为两个开关创建 Outlets 并连接它们。接下来要添加的按钮实际上会覆盖在开关上方，使得从开关\
  \ Control-drag 到其他元素或反向操作变得困难，因此我们希望在添加按钮之前先处理好开关的连接。由于按钮和开关永远不会同时可见，将它们放置在同一个物理位置不会产生问题。\n\
  \n使用助手编辑器，从左侧开关 Control-drag 到 `ViewController.swift` 中最后一个 outlet 的下方。弹出提示时，将 outlet\
  \ 命名为 `leftSwitch`，然后按 Return 键。对另一个开关重复此操作，将其 outlet 命名为 `rightSwitch`。\n\n现在，单击选中左侧开关。再次\
  \ Control-drag 到助手编辑器。这次，拖到类声明末尾的大括号上方，然后松开。弹出提示时，将 Connection 字段改为 Action，将新的 action\
  \ 方法命名为 `onSwitchChanged()`，并将其 `sender` 参数的类型设置为 `UISwitch`。接下来，按 Return 键创建新的\
  \ action。现在对右侧开关重复此操作，但有一处改动：不要创建新的 action，而是将鼠标拖到刚刚创建的 `onSwitchChanged()` 方法上并连接到它。正如我们在上一章中所做的那样，我们将使用一个方法来处理两个开关。\n\
  \n最后，从分段控件 Control-drag 到助手编辑器，位置在 `onSwitchChanged()` 方法正下方。按照之前的操作，插入一个名为 `toggleControls()`\
  \ 的新 action 方法。这次，将其 `sender` 参数的类型设置为 `UISegmentedControl`。\n\n### 实现开关 Actions\n\
  \n保存故事板，然后向已在助手编辑器中打开的 `ViewController.swift` 中添加更多代码。找到 `onSwitchChanged()` 方法，将其修改为清单\
  \ 4-5 所示的内容。\n\n```\n@IBAction func onSwitchChanged(_ sender: UISwitch) {\nlet setting\
  \ = sender.isOn\nleftSwitch.setOn(setting, animated: true)\nrightSwitch.setOn(setting,\
  \ animated: true)\n}\n清单 4-5.\n我们新的 onSwitchChanged() 方法\n```\n\n当两个开关中的任何一个被点击时，`onSwitchChanged()`\
  \ 方法就会被调用。在该方法中，我们只需获取 `sender`（代表被按下的开关）的 `isOn` 属性值，并用该值来设置两个开关。这里的思路是，设置一个开关的值会同时改变另一个开关，从而使它们始终保持同步。\n\
  \n现在，`sender` 始终是 `leftSwitch` 或 `rightSwitch`，你可能会疑惑为什么我们要同时设置两者。我们这样做是出于实用性考虑，因为每次设置两个开关的值比判断哪个开关发起调用然后仅设置另一个开关要更省事。无论哪个开关调用了此方法，它本身已经被设置为正确的值，再次将其设置为相同的值不会产生任何影响。\n\
  \n#### 添加按钮\n\n接下来，回到 Interface Builder，从库中拖一个 Button 到你的视图上。将此按钮直接放置在左侧开关的正上方，使其与左边距对齐，并将其顶部边缘与两个开关的顶部边缘垂直对齐，如图\
  \ 4-26 所示。\n\n![A329781_3_En_4_Fig26_HTML.jpg](img/A329781_3_En_4_Fig26_HTML.jpg)\n\
  \n图 4-26. 在现有开关上方添加一个按钮\n\n现在，抓住按钮右侧中间的大小调整手柄，一直向右拖动，直到到达指示右边距的蓝色参考线。按钮应完全覆盖两个开关所占的空间，但由于默认按钮是透明的，你仍然可以看到开关（见图\
  \ 4-27）。\n\n![A329781_3_En_4_Fig27_HTML.jpg](img/A329781_3_En_4_Fig27_HTML.jpg)\n\
  \n图 4-27. 放置并调整大小后的按钮占据了两个开关所占的空间\n\n双击新添加的按钮，将其标题设置为 **Do Something**。\n\n该按钮需要\
  \ Auto Layout 约束。我们将其固定到主视图的顶部和两侧。从按钮向上 Control-drag，直到视图背景变为蓝色，然后松开鼠标，选择 **Vertical\
  \ Spacing to Top Layout Guide**。然后向左水平 Control-drag，直到主视图背景再次变为蓝色，选择 **Leading Space\
  \ to Container Margin**。只有将鼠标向左拖得足够远时，才会出现此选项，因此如果没看到，请重试，向左拖动直到鼠标超出按钮边界。最后，向右 Control-drag，直到主视图背景变为蓝色，然后选择\
  \ **Trailing Space to Container Margin**。现在运行应用程序，看看我们刚刚做了什么。\n\n#### 向按钮添加图片\n\n\
  如果你将正在运行的应用程序与图 4-2 进行比较，会立刻发现差异。你的 **Do Something** 按钮看起来不像图中的那样。这是因为从 iOS 7 开始，默认按钮显示非常简单的外观：它只是一段纯文本，没有轮廓、边框、背景颜色或其他装饰性特征。这很好地符合了\
  \ Apple 针对 iOS 7 及更高版本的设计指南，但在某些情况下你仍需要使用自定义按钮，因此我们将向你展示如何操作。\n\n你在 iOS 设备上看到的许多按钮都是使用图片绘制的。我们提供了在本书源代码存档的\
  \ **04 – Button Images** 文件夹中可用于此示例的图片。在 Xcode 的项目导航器中，选择 `Assets.xcassets`（与我们之前为\
  \ Apress 标志添加图片时使用的素材目录相同），然后将 **04 – Button Images** 文件夹中的两个图片直接拖入 Xcode 窗口的编辑区域中。这些图片被添加到你的项目中，并立即可供你的应用程序使用。\n\
  \n\n\n## 可拉伸图像\n\n如果查看刚添加的两个按钮图像，你会发现它们非常小，似乎太窄了，无法填满你在故事板中添加的按钮。这是因为这些图像设计为可拉伸的。恰好，UIKit\
  \ 可以拉伸图像，使其完美填充你想要的几乎任何尺寸。可拉伸图像是一个有趣的概念。可拉伸图像是一种可调整大小的图像，它知道如何智能地调整自身大小，从而保持正确的外观。对于这些按钮模板，我们不希望边缘与图像的其余部分均匀拉伸。边缘插图是图像中不应调整大小的部分（以像素为单位测量）。我们希望无论按钮尺寸如何，边缘的斜面都保持不变，因此需要指定每个边缘由多少非可拉伸空间构成。\n\
  \n在过去，这只能通过代码实现。你需要使用图形程序测量图像的像素边界，然后在代码中使用这些数值来设置边缘插图。Xcode 6 通过让你在资源目录中直观地“切片”任何图像，消除了这一需求！这就是我们接下来要做的。\n\
  \n在 Xcode 中选择 `Assets.xcassets` 资源目录，并在其中选择 `whiteButton`。在编辑区域的右下角，你会看到一个标有“显示切片”的按钮。单击它以启动切片过程，该过程首先会在你的图像正上方放置一个“开始切片”按钮。点击它。你会看到三个新按钮，让你选择是希望图像垂直、水平还是双向切片（因此可拉伸）。选择中间的按钮进行双向切片。Xcode\
  \ 会对图像进行快速分析，然后找到边缘周围似乎具有独特像素的部分，以及中间应可重复的垂直和水平切片。你会看到这些边界由虚线表示，如图 4-28 所示。如果你的图像比较复杂，可能需要调整这些边界（操作很简单，只需用鼠标拖动它们即可）；但对于这个图像，自动边缘插图将工作得很好。\n\
  \n![A329781_3_En_4_Fig28_HTML.jpg](img/A329781_3_En_4_Fig28_HTML.jpg)\n\n图 4-28.\
  \ 白色按钮的默认切片\n\n接下来，选择 `blueButton` 并对其执行相同的自动切片操作。现在是时候使用这些图形了。\n\n返回你一直在处理的故事板，单击“Do\
  \ Something”按钮。选中按钮后，按下 ⌥⌘4 打开属性检查器。在检查器中，使用“类型”弹出菜单将类型从“系统”更改为“自定义”。在检查器的“按钮”部分底部，你会看到可以为按钮指定图像和背景。我们将使用“背景”来显示可调整大小的图形，因此点击“背景”弹出菜单并选择\
  \ `whiteButton`。你会看到按钮现在显示白色图形，完美拉伸以覆盖整个按钮框架。\n\n我们想使用蓝色按钮定义此按钮高亮状态的外观，也就是按钮被按下时看到的状态。我们将在本章下一节中详细介绍控件状态；但现在，只需查看顶部第二个弹出菜单，标有“状态配置”。一个\
  \ `UIButton` 可以有多种状态，每种状态都有自己的文本和图像。目前我们配置的是默认状态，因此将此弹出菜单切换到“高亮”，以便配置该状态。你会看到“背景”弹出菜单已被清空；点击它以选择\
  \ `blueButton`——大功告成。\n\n### 控件状态\n\n每个 iOS 控件都有五种可能的控件状态，并且在任何时刻都处于且仅处于其中一种状态：\n\
  \n- **默认：** 最常见的是默认控件状态，即默认状态。这是控件未处于任何其他状态时的状态。\n- **聚焦：** 在基于焦点的导航系统中，当控件获得焦点时进入此状态。聚焦的控件会改变其外观以指示它具有焦点，并且此外观与控件在高亮或选中时的外观不同。与控件的进一步交互可能导致它也变得高亮或选中。\n\
  - **高亮：** 高亮状态是控件当前正被使用时的状态。对于按钮来说，这指的是用户手指放在按钮上的时候。\n- **选中：** 只有部分控件支持选中状态。它通常用于指示控件已开启或被选中。选中状态与高亮类似，但即使用户不再直接使用该控件，控件也可以保持选中状态。\n\
  - **禁用：** 当控件被关闭时，它们处于禁用状态，可以通过在 Interface Builder 中取消选中“已启用”复选框或设置控件的 `isEnabled`\
  \ 属性为 NO 来实现。\n\n某些 iOS 控件具有可根据其状态取不同值的属性。例如，通过为 `isDefault` 指定一个图像，为 `isHighlighted`\
  \ 指定另一个图像，我们告诉 iOS 在用户手指放在按钮上时使用一个图像，而在其他时间使用另一个图像。这基本上就是我们在故事板中为按钮配置两个不同背景状态时所做的事情。\n\
  \n注意\n\n在本书的早期版本中，有四种状态：`Normal`（正常）、`Highlighted`（高亮）、`Disabled`（禁用）和 `Selected`（选中），在\
  \ Objective-C 中的枚举值为 `UIControlStateNormal`、`UIControlStateHighlighted`、`UIControlStateEnabled`\
  \ 和 `UIControlStateSelected`。你可能会看到早于 Xcode 8 和 Swift 3 的旧版本引用了这些值。\n\n### 连接和创建按钮的\
  \ Outlet 和 Action\n\n从新按钮按住 Control 键拖动到助理编辑器，位于文件顶部部分中最后一个 outlet 的正下方。弹出窗口出现后，创建一个名为\
  \ `doSomethingButton` 的新 outlet。完成此操作后，再次从按钮按住 Control 键拖动到文件底部右大括号的上方。在那里，创建一个名为\
  \ `onButtonPressed()` 的动作方法，并将“类型”设置为 `UIButton`。\n\n如果你保存工作并尝试运行应用程序，你会看到分段控件将处于活动状态，但它不会执行任何特别有用的操作，因为我们还需要添加一些逻辑来让按钮和开关显示和隐藏。\n\
  \n我们还需要从一开始就将按钮标记为隐藏。我们之前不想这样做，因为那会使连接 outlet 和 action 变得更加困难。然而，既然我们已经完成了连接，现在就来隐藏按钮。当用户点击分段控件的右侧时，我们将显示按钮；但在应用程序启动时，我们希望按钮隐藏。在故事板中，选择按钮并按下\
  \ ⌥⌘4 以调出属性检查器。向下滚动到“视图”部分，然后点击“隐藏”复选框。按钮在 Interface Builder 中仍将可见。\n\n\n\n## 实现分段控件操作\n\
  \n保存故事板，将注意力重新聚焦到 `ViewController.swift` 上。找到 Xcode 为我们创建的 `toggleControls()` 方法，并添加代码清单\
  \ 4-6 中所示的新代码。\n\n```\n@IBAction func toggleControls(_ sender: UISegmentedControl)\
  \ {\nif sender.selectedSegmentIndex == 0 {  // 选中了“开关”\nleftSwitch.isHidden = false\n\
  rightSwitch.isHidden = false\ndoSomethingButton.isHidden = true\n} else {\nleftSwitch.isHidden\
  \ = true\nrightSwitch.isHidden = true\ndoSomethingButton.isHidden = false\n}\n}\n\
  代码清单 4-6.\n根据分段控件隐藏或显示开关\n```\n\n这段代码检查了 `sender` 的 `selectedSegmentIndex` 属性，该属性告诉我们当前选中了哪个分段。第一个分段名为\
  \ `switches`，其索引为 0。我们在注释中标注了这一点，这样以后回看代码时就能清楚意图。根据选中的分段，我们隐藏或显示相应的控件。\n\n在运行应用之前，让我们做一个小调整，使其看起来更美观一些。从\
  \ iOS 7 开始，Apple 引入了一些新的 GUI 设计范式。其中之一是屏幕顶部的状态栏变为透明，以便你的内容可以无缝地透过它显示。目前，那个黄色的 Apress\
  \ 图标在我们应用的白色背景上显得格外突兀，所以让我们将黄色背景扩展到覆盖整个视图。在 `Main.storyboard` 中，选择主内容视图（在文档大纲中标记为\
  \ View），然后按下 ⌥⌘4 打开属性检查器。点击标记为 Background 的颜色样本（当前显示为白色矩形），打开标准的 OS X 颜色选择器。该颜色选择器的一个功能是允许你选取屏幕上看到的任何颜色。打开颜色选择器后，点击右下角的吸管图标，打开一个放大镜。将放大镜拖到故事板中的\
  \ Apress 图像视图上，并在它悬停在图像黄色部分时点击。现在你应该能在颜色选择器中，吸管图标旁边看到 Apress 图像的背景色。要将其设置为主内容视图的背景色，请在文档大纲中选择主视图，然后点击颜色选择器中的黄色。完成后，关闭颜色选择器。\n\
  \n在屏幕上，你可能会发现背景和 Apress 图像的颜色略有不同，但在模拟器或真机上运行时，它们会一致。这些颜色在 Interface Builder 中看起来不同，是因为\
  \ macOS 会根据你使用的显示器自动调整颜色。在 iOS 设备和模拟器中，则不会出现这种情况。\n\n运行应用。你会看到黄色填充了整个屏幕，状态栏与应用内容之间没有明显的分界。如果你的应用没有需要全屏滚动的长内容，或其他需要在屏幕顶部使用导航栏或控件的内容，这可以成为一种很好的方式，呈现不受状态栏过多干扰的全屏内容。\n\
  \n如果你正确输入了所有代码，应该能够使用分段控件在按钮和一对开关之间切换。并且，如果你点击任一开关，另一个开关也会同步改变值。不过，按钮目前仍然没有功能。在实现它之前，我们需要讨论一下操作表和警告框。\n\
  \n## 实现操作表和警告框\n\n操作表和警告框都用于向用户提供反馈：\n\n*   操作表用于强制用户在两个或多个选项之间做出选择。在 iPhone 上，操作表从屏幕底部弹出，并显示一系列按钮（见图\
  \ 4-3）。在 iPad 上，你需要指定操作表相对于另一个视图（通常是按钮）的位置。用户只有在点击了其中一个按钮后，才能继续使用应用。操作表常用于确认潜在危险或不可逆的操作，例如删除对象。\n\
  *   警告框以屏幕中央的圆角矩形形式出现（见图 4-4）。与操作表类似，警告框会强制用户在做出响应后才能继续使用应用。警告框通常用于告知用户发生了重要或异常的情况。与操作表一样，警告框可以只显示一个按钮，但如果需要提供多个响应选项，你也可以显示多个按钮。\n\
  \n注意\n\n强制用户在选择后才能继续使用应用的视图被称为模态视图。\n\n\n\n### 显示操作列表\n\n切换到 `ViewController.swift`，我们将实现按钮的动作方法。首先，找到\
  \ Xcode 为你创建的空 `onButtonPressed()` 方法，然后添加代码清单 4-7 中的代码，以创建并显示操作列表。\n\n```\n@IBAction\
  \ func onButtonPressed(_ sender: UIButton) {\nlet controller = UIAlertController(title:\
  \ \"Are You Sure?\",\nmessage:nil, preferredStyle: .actionSheet)\nlet yesAction\
  \ = UIAlertAction(title: \"Yes, I'm sure!\",\nstyle: .destructive, handler: { action\
  \ in\nlet msg = self.nameField.text!.isEmpty\n? \"You can breathe easy, everything\
  \ went OK.\"\n: \"You can breathe easy, \\(self.nameField.text),\"\n+ \"everything\
  \ went OK.\"\nlet controller2 = UIAlertController(\ntitle:\"Something Was Done\"\
  ,\nmessage: msg, preferredStyle: .alert)\nlet cancelAction = UIAlertAction(title:\
  \ \"Phew!\",\nstyle: .cancel, handler: nil)\ncontroller2.addAction(cancelAction)\n\
  self.present(controller2, animated: true,\ncompletion: nil)\n})\nlet noAction =\
  \ UIAlertAction(title: \"No way!\",\nstyle: .cancel, handler: nil)\ncontroller.addAction(yesAction)\n\
  controller.addAction(noAction)\nif let ppc = controller.popoverPresentationController\
  \ {\nppc.sourceView = sender\nppc.sourceRect = sender.bounds\n}\npresent(controller,\
  \ animated: true, completion: nil)\n}\n代码清单 4-7.\n显示操作列表\n```\n\n我们到底做了什么？首先，在 `onButtonPressed()`\
  \ 动作方法中，我们分配并初始化了一个 `UIAlertController`，这是一个视图控制器子类，可以显示操作列表或警告框：\n\n```\nlet controller\
  \ = UIAlertController(title: \"Are You Sure?\",\nmessage:nil, preferredStyle: .actionSheet)\n\
  ```\n\n第一个参数是要显示的标题。请参考图 4-3，查看我们提供的标题将如何显示在操作列表的顶部。第二个参数是标题下方立即显示的消息，字体较小。在这个示例中，我们未使用消息，因此为该参数提供了值\
  \ `nil`。最后一个参数指定我们希望控制器显示警告框（值 `UIAlertControllerStyle.alert`）还是操作列表（`UIAlertControllerStyle.actionSheet`）。由于我们需要操作列表，因此在此处提供值\
  \ `UIAlertControllerStyle.actionSheet`。\n\n默认情况下，警告控制器不提供任何按钮——你需要为每个想要的按钮创建一个 `UIAlertAction`\
  \ 对象，并将其添加到控制器中。代码清单 4-8 显示了为操作列表创建两个按钮的代码部分。\n\n```\nlet yesAction = UIAlertAction(title:\
  \ \"Yes, I'm sure!\",\nstyle: .destructive, handler: { action in\n// 代码已省略 – 见下文。\n\
  })\nlet noAction = UIAlertAction(title: \"No way!\",\nstyle: .cancel, handler: nil)\n\
  代码清单 4-8.\n创建操作列表按钮\n```\n\n对于每个按钮，你可以指定标题、样式以及按下按钮时调用的处理程序。有三种可选择的样式：\n\n*   `UIAlertActionStyle.destructive`\
  \ 应在按钮触发破坏性、危险或不可逆操作（如删除或覆盖文件）时使用。使用此样式的按钮标题以红色粗体字体显示。\n*   `UIAlertActionStyle.default`\
  \ 用于普通按钮，例如确定按钮，当触发的操作不是破坏性时使用。标题以常规蓝色字体显示。\n*   `UIAlertStyle.cancel` 用于取消按钮。标题以蓝色粗体字体显示。\n\
  \n最后，将按钮添加到控制器中：\n\n```\n[controller addAction:yesAction];\n[controller addAction:noAction];\n\
  ```\n\n要使警告框或操作列表可见，你需要请求当前视图控制器呈现警告控制器。代码清单 4-9 展示了如何呈现操作列表。\n\n```\nif let ppc\
  \ = controller.popoverPresentationController {\nppc.sourceView = sender\nppc.sourceRect\
  \ = sender.bounds\n}\npresent(controller, animated: true, completion: nil)\n代码清单\
  \ 4-9.\n呈现操作列表\n```\n\n前四行通过获取警告控制器的弹出呈现控制器并设置其 `sourceView` 和 `sourceRect` 属性，配置了操作列表出现的位置。我们稍后会详细介绍这些属性。最后，通过调用视图控制器的\
  \ `present(_:animated:completion:)` 方法，并将警告控制器作为要呈现的控制器传递，使操作列表可见。当视图控制器被呈现时，其视图会临时替换呈现它的视图控制器的视图。对于警告视图控制器，操作列表或警告框会部分覆盖呈现视图控制器的视图；视图的其余部分被深色半透明背景覆盖，让你可以看到底层视图，但明确表明在解除呈现的视图控制器之前无法与之交互。\n\
  \n现在，让我们重新审视弹出呈现控制器的配置。在 iPhone 上，操作列表总是从屏幕底部弹出，如图 4-3 所示，但在 iPad 上，它显示在弹出窗口中——一个小的圆角矩形，带有一个指向另一个视图（通常是导致其出现的视图）的箭头。图\
  \ 4-29 展示了操作列表在 iPad Air 模拟器上的外观。\n\n![A329781_3_En_4_Fig29_HTML.jpg](img/A329781_3_En_4_Fig29_HTML.jpg)\n\
  \n图 4-29.\n在 iPad Air 上呈现的操作列表\n\n如你所见，弹出窗口的箭头指向“Do Something”按钮。这是因为我们将警告控制器的弹出呈现控制器的\
  \ `sourceView` 属性设置为指向该按钮，并将其 `sourceRect` 属性设置为按钮的边界，如代码清单 4-10 所示。\n\n```\nif\
  \ let ppc = controller.popoverPresentationController {\nppc.sourceView = sender\n\
  ppc.sourceRect = sender.bounds\n}\n代码清单 4-10.\n设置 sourceView 和 sourceRect 属性\n\n\
  注意 `if let` 结构——这是必要的，因为在 iPhone 上，警告控制器不会在弹出窗口中呈现操作列表，因此其 `popoverPresentationController`\
  \ 属性为 `nil`。\n\n在图 4-29 中，弹出窗口出现在源按钮下方，但如果你需要，可以通过设置弹出呈现控制器的 `permittedArrowDirections`\
  \ 属性来更改此位置，该属性是弹出窗口箭头允许方向的掩码。以下代码通过将此属性设置为 `UIPopoverArrowDirection.down`，将弹出窗口移动到源按钮上方，如代码清单\
  \ 4-11 所示。\n\n```\nif let ppc = controller.popoverPresentationController {\nppc.sourceView\
  \ = sender\nppc.sourceRect = sender.bounds\nppc.permittedArrowDirections = .down\n\
  }\n代码清单 4-11.\n设置弹出窗口的方向\n\n如果你比较图 4-29 和图 4-3，你会发现在 iPad 上缺少“No Way!”按钮。警告控制器在\
  \ iPad 上不使用样式为 `UIAlertStyle.cancel` 的按钮，因为用户习惯于通过点击弹出窗口外的任何位置来解除弹出窗口，而不执行任何操作。\n\
  \n\n\n### 显示警告框\n\n当用户按下`Yes, I’m Sure!`按钮时，我们希望弹出一个包含消息的警告框。当警告控制器中添加的按钮被按下时，操作列表（或警告框）会被关闭，并且按钮的处理程序块会接收到一个指向创建该按钮的`UIAlertAction`对象的引用。当`Yes,\
  \ I’m Sure!`按钮被按下时执行的代码如代码清单 4-12 所示。\n\n```\nlet yesAction = UIAlertAction(title:\
  \ \"Yes, I'm sure!\",\nstyle: .destructive, handler: { action in\nlet msg = self.nameField.text!.isEmpty\n\
  ? \"You can breathe easy, everything went OK.\"\n: \"You can breathe easy, \\(self.nameField.text),\"\
  \n+ \"everything went OK.\"\nlet controller2 = UIAlertController(\ntitle:\"Something\
  \ Was Done\",\nmessage: msg, preferredStyle: .alert)\nlet cancelAction = UIAlertAction(title:\
  \ \"Phew!\",\nstyle: .cancel, handler: nil)\ncontroller2.addAction(cancelAction)\n\
  self.present(controller2, animated: true,\ncompletion: nil)\n})\n代码清单 4-12.\n弹出警告消息\n\
  ```\n\n我们在处理程序块中做的第一件事是创建一个将显示给用户的新字符串。在实际的应用程序中，你应该在此处执行用户请求的任何处理。我们只是假装做了一些事情，并通过警告框通知用户。如果用户在顶部文本字段中输入了姓名，我们会获取该姓名，并将其用于将在警告框中显示的消息中。否则，我们只会生成一条通用消息来显示：\n\
  \n```\nlet msg = self.nameField.text!.isEmpty\n? \"You can breathe easy, everything\
  \ went OK.\"\n: \"You can breathe easy, \\(self.nameField.text),\"\n+ \" everything\
  \ went OK.\"\n```\n\n接下来的几行代码可能会让你觉得熟悉。警告视图和操作列表的创建和使用方式非常相似。我们总是从创建一个`UIAlertController`开始：\n\
  \n```\nlet controller2 = UIAlertController(\ntitle:\"Something Was Done\",\nmessage:\
  \ msg, preferredStyle: .alert)\n```\n\n同样，我们传入一个要显示的标题。这次，我们还传入了一条更详细的消息，也就是我们刚刚创建的字符串。最后一个参数是样式，我们将其设置为`UIAlertControllerStyle.alert`，因为我们想要一个警告框，而不是操作列表。接下来，我们为警告框的取消按钮创建一个`UIAlertAction`并将其添加到控制器中：\n\
  \n```\nlet cancelAction = UIAlertAction(title: \"Phew!\",\nstyle: .cancel, handler:\
  \ nil)\ncontroller2.addAction(cancelAction)\n```\n\n最后，我们通过展示警告视图控制器来让警告框出现：\n\n\
  ```\nself.present(controller2, animated: true, completion: nil)\n```\n\n你可以在图 4-4\
  \ 中看到由这段代码创建的警告框。你会注意到，我们的代码并没有尝试获取和配置警告控制器的弹出展示控制器。这是因为在 iPhone 和 iPad 上，警告框都会以屏幕中央的小圆角视图形式出现，因此没有需要配置的弹出展示控制器。\n\
  \n保存`ViewController.swift`文件，然后构建、运行并测试完成的应用程序。\n\n## 本章小结\n\n在这一长篇章节中，希望我们没有向你灌输太多新内容，但我们详细介绍了许多控件的使用，并展示了多种不同的实现细节。我们进一步练习了出口和操作的使用，了解了如何利用视图的层级特性来为你所用，并获得了更多添加\
  \ Auto Layout 约束的实践。你学习了控件状态和可拉伸图片。你还学习了如何使用操作列表和警告框。\n\n我们的 Control Fun 应用程序涉及了诸多内容。你可以随时返回去尝试各种操作。修改值、通过添加和修改代码进行实验，并观察\
  \ Interface Builder 中不同设置的效果。我们不可能带你了解 iOS 中所有控件的每一种排列组合，但你刚刚完成的这个应用程序是一个很好的起点，涵盖了大部分基础知识。\n\
  \n在下一章中，我们将探讨当用户将 iOS 设备从竖屏旋转到横屏或反之亦然时会发生什么。你可能很清楚，许多应用程序会根据用户握持设备的方式改变其显示内容，我们将向你展示如何在自己的应用程序中实现这一点。\n\
  \n"
- "# 5. 处理设备旋转\n\niPhone 和 iPad 在外形、适配性和功能方面展现了惊人的工程学设计。苹果工程师们想出了各种方法，将最大功能压缩到非常小巧优雅的包装中。其中一个例子就是这些设备可以在竖屏（窄高）或横屏（短宽）模式下使用，并且这种方向可以在运行时通过简单地旋转设备来改变。你可以在\
  \ iOS Safari 浏览器中看到这种自动旋转行为的一个示例，如图 5-1 所示。在本章中，我们将详细讨论旋转，首先概述自动旋转的来龙去脉，然后介绍在应用程序中实现该功能的不同方法。\n\
  \n![A329781_3_En_5_Fig1_HTML.jpg](img/A329781_3_En_5_Fig1_HTML.jpg)\n\n图 5-1. 与许多\
  \ iOS 应用程序一样，Mobile Safari 会根据其握持方式改变显示内容，以充分利用可用的屏幕空间\n\n在 iOS 8 之前，如果你想要设计一个既能在\
  \ iPhone 上运行又能在 iPad 上运行的应用程序，你需要创建一个包含 iPhone 布局的故事板，以及另一个包含 iPad 布局的故事板。在 iOS\
  \ 8 中，这一切都发生了变化，苹果在 UIKit 中添加了 API，并在 Xcode 中增加了工具，使得仅用一个故事板就能构建可以在任何设备上运行（或者用他们的术语来说，“适配”到任何设备）的应用程序。你仍然必须针对每种设备类型的不同外形因素进行精心设计，但现在你可以在一个地方完成所有工作。更棒的是，使用我们在第\
  \ 3 章中介绍的预览功能，你无需启动模拟器就能立即看到你的应用程序在任何设备上的显示效果。我们将在本章的第二部分探讨如何构建自适应应用程序布局。\n\n\n\n\
  ## 旋转机制\n\n在竖屏和横屏方向下运行的能力并非适用于所有应用。苹果的几款 iPhone 应用（如天气应用）仅支持单一方向。然而，iPad 应用则有所不同，苹果建议大多数应用（沉浸式应用如游戏除外）应支持所有方向，且苹果自身的大多数\
  \ iPad 应用在两种方向下都能良好运行。许多应用会利用方向变化来展示数据的不同视图。例如，邮件和备忘录应用在横屏时，会在左侧显示项目列表（文件夹、邮件或笔记），右侧显示所选项目；而在竖屏时，则让您专注于所选项目的详细信息。\n\
  \n对于 iPhone 应用，基本原则是：如果自动旋转能增强用户体验，就应将其添加到应用中。对于 iPad 应用，规则是：除非有充分理由不这样做，否则应添加自动旋转。幸运的是，苹果出色地隐藏了在\
  \ iOS 和 UIKit 中处理方向变化的复杂性，因此在您自己的 iOS 应用中实现这一行为变得相当容易。\n\n视图控制器授权图像进行旋转。如果用户旋转设备，当前活动的视图控制器会被询问是否可以切换到新方向（本章将介绍该操作）。如果视图控制器肯定回答，应用的窗口和视图便会旋转，并且窗口和视图会调整大小以适应新方向。\n\
  \n在 iPhone 和 iPod touch 上，以竖屏模式启动的视图高度大于宽度——您可以通过参阅第 1 章表 1-1 的“软件尺寸”列来查看任何给定设备的实际可用空间。但请注意，如果您的应用显示了状态栏（即屏幕顶部显示信号强度、时间、电池电量等信息的\
  \ 20 点宽的条，见图 5-1），那么应用可用的垂直屏幕空间会减少 20 点。\n\n当设备旋转到横屏模式时，垂直和水平尺寸互换。例如，在 iPhone 6/6s\
  \ 上运行的应用，竖屏时屏幕宽 375 点、高 667 点；横屏时则变为宽 667 点、高 375 点。同样需要再次指出，在 iPad 上，如果显示状态栏（大多数应用都会显示），应用的实际可用垂直空间会减少\
  \ 20 点。在 iPhone 上，自 iOS 8 起，状态栏在横屏时会隐藏。\n\n### 点、像素与 Retina 显示屏\n\n您可能想知道为什么我们讨论的是“点”而不是像素。本书较早的版本确实是以像素而非点来指代屏幕尺寸。这一变化的原因是苹果推出了\
  \ Retina 显示屏——这是苹果针对从 iPhone 4 及之后各代 iPhone、后续 iPod touch 以及新款 iPad 变体所配备的高分辨率屏幕的营销术语。再次回顾表\
  \ 1-1 可以看到，它使大多数型号的硬件屏幕分辨率翻倍，对于 iPhone 6/6s Plus 则几乎翻了三倍。\n\n幸运的是，在大多数情况下，我们无需为此做任何额外工作。在处理屏幕元素时，我们以点（而非像素）来指定尺寸和距离。对于旧款\
  \ iPhone、iPad、iPad 2 和 iPad mini 1，点与像素等价——1 点等于 1 像素。然而，在较新的苹果设备上，1 点相当于一个 4 像素的正方形（宽\
  \ 2 像素 × 高 2 像素），且 iPhone 5s（例如）的屏幕虽然实际宽度为 640 像素，但在逻辑上仍显示为 320 点宽。在 iPhone 6/6s\
  \ Plus 上，缩放因子为 3，因此每个点对应一个 9 像素的正方形。可以将其理解为一种“虚拟分辨率”，iOS 会自动将点映射到屏幕的物理像素上。我们将在第\
  \ 16 章对此进行更多讨论。\n\n在典型应用中，实际在屏幕上移动像素的大部分工作由 iOS 管理。我们的应用在此过程中的主要功能是确保所有元素在调整大小后的窗口中都能恰当排列并显示正常。\n\
  \n### 处理旋转\n\n要处理设备旋转，我们需要为构成界面的所有对象指定正确的约束。约束告诉 iOS，当控件所在的视图调整大小时，控件应如何表现。这与设备旋转有何关系？当设备旋转时，屏幕的尺寸（大致）互换——因此视图布局的可用区域大小发生了变化。\n\
  \n使用约束最简单的方法是在 Interface Builder (IB) 中进行配置。Interface Builder 允许您定义约束，这些约束描述了当父视图发生变化或其他视图移动时，GUI\
  \ 组件将如何重新定位和调整大小。我们在第 4 章中已经略有涉及，本章将进一步深入探讨约束这一主题。您可以将约束视为关于视图几何的方程式，而 iOS 视图系统本身则像一个“求解器”，会在必要时重新排列视图以满足这些方程式。您也可以在代码中添加约束，但本书不涵盖这一内容。\n\
  \n约束在 iOS 6 中被引入，但在 Mac 上存在的时间稍长。在 iOS 和 macOS 上，约束可以替代早期版本中使用的旧版“弹簧和支柱”系统。约束能够实现旧技术所能做到的一切，甚至更多。\n\
  \n## 创建我们的方向项目\n\n我们将创建一个简单的应用，向您展示如何选择应用支持的方向。在 Xcode 中创建一个新的 Single View Application\
  \ 项目，将其命名为 `Orientations`。从 `Devices` 弹出菜单中选择 `Universal`，并将其与其他项目保存在一起。\n\n在故事板中布局\
  \ GUI 之前，我们需要告知 iOS，我们的视图支持界面旋转。实际上有两种方法可以做到这一点：您可以创建一个应用范围的设置，该设置将成为所有视图控制器的默认值；您还可以进一步为每个单独的视图控制器调整设置。我们将从应用范围的设置开始，依次执行这两种操作。\n\
  \n\n\n### 应用级别的支持方向\n\n首先，我们需要明确应用支持哪些屏幕方向。当你的新建 Xcode 项目窗口出现时，它应该已经打开了你的项目设置。如果没有，请点击项目导航器中的最顶行（以你项目命名的行），然后确保你处于“通用”（General）标签页。在摘要中可用的选项里，你会看到一个名为“部署信息”（Deployment\
  \ Info）的区域，其中有一个“设备方向”（Device Orientation）部分（见图 5-2），带有一系列复选框。\n\n![A329781_3_En_5_Fig2_HTML.jpg](img/A329781_3_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 项目“通用”标签页显示了（以及其他内容）支持的设备方向\n\n这就是我们指定应用支持哪些方向的方式。这并不一定意味着每个视图都会使用所有选中的方向；但如果我们要在任何视图中支持某个方向，那么该方向必须在此处勾选。请注意，“上下颠倒”（Upside\
  \ Down）方向默认是关闭的。这是因为苹果不鼓励用户倒置手机，因为如果手机在该方向时有来电，用户必须将其旋转整整半圈才能接听。\n\n打开复选框上方的“设备”（Devices）下拉菜单（见图\
  \ 5-3），你将看到可以为 iPhone 和 iPad 分别配置允许的方向。如果你选择 iPad，你会发现所有四个复选框都被选中，因为 iPad 被设计为可以在任何方向使用。\n\
  \n![A329781_3_En_5_Fig3_HTML.jpg](img/A329781_3_En_5_Fig3_HTML.jpg)\n\n图 5-3. 你可以为\
  \ iPhone 和 iPad 配置不同的方向\n\n注意\n\n图 5-2 和 5-3 中显示的四个复选框实际上是向应用的 `Info.plist` 文件中添加和删除条目的快捷方式。如果你在项目导航器中单击\
  \ `Info.plist`，你应该会看到两个条目，名为 `Supported interface orientations` 和 `Supported interface\
  \ orientations (iPad)`，其子条目对应于当前选中的方向。在项目摘要中勾选或取消勾选这些复选框，实际上只是从这些数组中添加或移除项目。使用复选框更简单且不易出错，因此强烈建议使用复选框。不过，你应该了解它们的底层原理。\n\
  \n同样，我们将以 iPhone 6s 作为设备进行演示。现在，选中 `Main.storyboard`。在对象库中找到标签（Label），将其拖入你的视图中，放置在水平居中且靠近顶部的位置，如图\
  \ 5-4 所示。选中标签的文本，将其改为 `This way up`。更改文本可能会改变标签的位置，因此请再次拖动以使其水平居中。\n\n![A329781_3_En_5_Fig4_HTML.jpg](img/A329781_3_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4. 设置竖屏方向的标签\n\n在运行应用程序之前，我们需要添加 Auto Layout 约束来固定标签的位置。因此，按住 Control 键从标签向上拖动，直到包含视图的背景变为蓝色，然后松开鼠标。按住\
  \ Shift 键，在弹出的菜单中选择 `Vertical Spacing to Top Layout Guide` 和 `Center Horizontally\
  \ in Container`，然后按回车键。现在，按 `⌘R` 在 iPhone 模拟器中构建并运行这个简单的应用。当它在模拟器中启动后，尝试通过按 `⌘-Left\
  \ Arrow` 或 `⌘-Right Arrow` 旋转设备几次。你会看到整个视图（包括你添加的标签）会旋转到除上下颠倒外的所有方向，正如我们配置的那样。在\
  \ iPad 模拟器上运行它，确认它会旋转到所有四个可能的方向。\n\n我们已经明确了应用将支持的方向，但这并非需要做的全部。我们还可以为每个视图控制器指定一组可接受的方向，从而更精细地控制哪些方向在应用的不同部分生效。\n\
  \n\n\n### 逐控制器旋转支持\n\n下面让我们配置视图控制器，使其只允许接受一组较小的、不同的朝向。应用的全局配置为允许的朝向设定了一个绝对上限。例如，如果全局配置未包含倒置方向，那么没有任何视图控制器能强制系统将屏幕旋转为倒置。我们在视图控制器中所能做的，只是进一步限制可接受的朝向范围。\n\
  \n在项目导航器中，单击 `ViewController.swift`。这里我们将实现定义在 `UIViewController` 超类中的一个方法，该方法允许我们指定当前视图控制器接受全局朝向集合中的哪个子集：\n\
  \n```\noverride func supportedInterfaceOrientations() -> UIInterfaceOrientationMask\
  \ {\nreturn UIInterfaceOrientationMask(rawValue:\n(UIInterfaceOrientationMask.portrait.rawValue\n\
  | UIInterfaceOrientationMask.landscapeLeft.rawValue))\n}\n```\n\n该方法让我们返回一个指定可接受朝向的\
  \ `UIInterfaceOrientationMask`。调用此方法是 iOS 向视图控制器询问是否允许旋转到某一特定朝向的方式。在本例中，我们返回的值表示接受两种朝向：默认的竖屏朝向，以及将手机顺时针旋转\
  \ 90° 后（即手机左侧朝上）的朝向。我们使用布尔 `OR` 运算符（竖线符号）来组合这两种朝向掩码的原始值，然后用结果创建一个新的 `UIInterfaceOrientationMask`，来表示组合后的值。\n\
  \n`UIKit` 定义了以下朝向掩码，你可以使用 `OR` 运算符（如上例所示）按任意方式组合它们：\n\n- `UIInterfaceOrientationMask.portrait.rawValue`\n\
  - `UIInterfaceOrientationMask.landscapeLeft.rawValue`\n- `UIInterfaceOrientationMask.landscapeRight.rawValue`\n\
  - `UIInterfaceOrientationMask.portraitUpsideDown.rawValue`\n\n此外，还有一些针对常见使用场景的预定义组合。它们在功能上等效于你自己手动进行\
  \ `OR` 运算，但可以节省打字时间，并使代码更具可读性：\n\n- `UIInterfaceOrientationMask.landscape.rawValue`\n\
  - `UIInterfaceOrientationMask.all.rawValue`\n- `UIInterfaceOrientationMask.allButUpsideDown.rawValue`\n\
  \n当 iOS 设备改变朝向时，系统会调用当前活动视图控制器的 `supportedInterfaceOrientations()` 方法。根据返回的值是否包含新朝向，应用会决定是否旋转视图。由于每个视图控制器子类都可以实现不同的逻辑，因此同一个应用可以支持部分视图旋转而其他视图不旋转，或者某个视图控制器在特定条件下支持某些朝向。再次运行示例应用，并验证现在只能将模拟器旋转到\
  \ `supportedInterfaceOrientations()` 方法返回的那两个朝向。每个朝向后缀的 `.rawValue` 会返回该朝向的整数值，用于比较。\n\
  \n> **注意**  \n> 实际上你可以旋转设备，但视图本身不会旋转，因此除了选中的两个朝向外，标签依然会回到顶部。\n\n### 代码补全的实际应用\n\n\
  你有没有注意到，iPhone 上定义的系统常量总是这样设计：那些相互配合使用的值，都以相同的字母开头？`UIInterfaceOrientationMask.portrait`、`UIInterfaceOrientationMask.portraitUpsideDown`、`UIInterfaceOrientationMask.landscapeLeft`\
  \ 和 `UIInterfaceOrientationMask.landscapeRight` 全部以 `UIInterfaceOrientationMask`\
  \ 开头的原因之一，就是为了让你能利用 Xcode 的代码补全功能。\n\n你可能已经注意到，在输入时，Xcode 经常尝试补全你正在输入的单词。这就是代码补全的实际应用。\n\
  \n开发者不可能记住系统中所有定义的常量，但你可以记住常用组的共同开头。当你需要指定一个朝向时，只需输入 `UIInterfaceOrientationMask`（甚至只需输入\
  \ `UIInterf`），就会看到所有匹配项的列表弹出。（在 Xcode 的偏好设置中，你可以配置为仅在你按下 `Esc` 键时才弹出列表。）你可以使用方向键浏览出现的列表，并通过按下\
  \ `Tab` 或 `Return` 键进行选择。这比在文档或头文件中查找值要快得多。\n\n你可以随意尝试此方法，返回不同的朝向掩码组合。你可以强制系统将视图的显示限制在你的应用所需的朝向上，但不要忘记我们之前讨论过的全局配置。请记住，如果你没有在那里启用倒置方向（例如），那么无论其视图控制器的\
  \ `supportedInterfaceOrientations()` 方法如何声明，你的任何视图都不会以倒置方向显示。\n\n> **注意**  \n> iOS\
  \ 实际上支持两种不同类型的朝向。我们这里讨论的是界面朝向。还有一个独立但相关的概念叫设备朝向。设备朝向指定设备当前被手持的方式。界面朝向则是指屏幕上的视图如何旋转。如果你将标准\
  \ iPhone 倒置，设备朝向会是倒置，但界面朝向几乎总是其他三个之一，因为 iPhone 应用默认不支持竖屏倒置。\n\n\n\n## 创建布局项目\n\n\
  在 Xcode 中，基于“单视图应用程序”模板再新建一个项目，并将其命名为 `Layout`。选择 `Main.storyboard` 在 Interface\
  \ Builder 中编辑故事板。约束的一大优点是，它们用极少的代码就能实现很多功能。要了解其工作原理，请从库中将四个标签拖到你的视图上，并按照图 5-5 所示放置它们。使用蓝色虚线辅助线帮助你让每个标签靠近其对应的角落。在本例中，我们将使用\
  \ `UILabel` 类的实例来演示如何利用约束构建 GUI 布局，但相同的规则适用于许多 GUI 对象。\n\n![A329781_3_En_5_Fig5_HTML.jpg](img/A329781_3_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5. 向故事板中添加四个标签\n\n双击每个标签，并为每个标签指定一个标题，以便稍后能区分它们。我们将左上角标签命名为 `UL`，右上角标签命名为\
  \ `UR`，左下角标签命名为 `LL`，右下角标签命名为 `LR`。设置好每个标签的文本后，将它们全部拖到合适的位置，使其相对于容器视图的角落均匀对齐。\n\n\
  现在，既然我们尚未设置任何自动布局约束，让我们看看会发生什么。在 iPad Air 模拟器上构建并运行应用程序。模拟器启动后，你会发现只能看到左侧的标签——另外两个标签在屏幕右侧之外。此外，左下角的标签也不在它应在的位置——即屏幕的左下角。选择\
  \ **硬件** ➤ **向左旋转**，这将模拟将 iPad 旋转到横屏模式。你会发现现在可以看到左上角和右上角的标签，如图 5-6 所示。\n\n![A329781_3_En_5_Fig6a_HTML.jpg](img/A329781_3_En_5_Fig6a_HTML.jpg)![A329781_3_En_5_Fig6b_HTML.jpg](img/A329781_3_En_5_Fig6b_HTML.jpg)\n\
  \n图 5-6. 在未添加任何约束的情况下改变方向\n\n如你所见，情况看起来并不理想。旋转后，左上角的标签位于正确位置，但所有其他标签都放错了地方，有些甚至完全不可见！发生这种情况的原因是，每个对象都保持其相对于故事板中视图左上角的距离。我们真正想要的是，旋转后每个标签都能紧贴其最近的角落。右侧的标签应水平移动以适应视图的新宽度，底部的标签应垂直移动以适应新高度。幸运的是，我们可以轻松地在\
  \ Interface Builder 中设置约束，让这些变化自动发生。\n\n正如我们在前面章节中所见，Interface Builder 足够智能，可以检查这组对象并创建一组默认约束，这些约束将完全实现我们想要的效果。它使用一些经验法则来判断，如果我们将对象靠近边缘，我们可能希望将它们保持在那里。要让它应用这些规则，首先选中所有四个标签。你可以通过单击一个标签，然后按住\
  \ Shift 或 ⌘ 键并依次单击其他三个标签来完成此操作。全部选中后，从菜单中选择 **编辑器** ➤ **解决自动布局问题** ➤ **添加缺失的约束**（你会发现有两个同名菜单项——在本例中，因为我们已选中所有标签，你可以使用其中任意一个）。接下来，只需按下\
  \ **运行** 按钮在模拟器中启动应用程序，然后验证它是否正常工作。\n\n> **注意**：另一种轻松选中所有标签的方法是，在文档大纲中按住 Shift 键单击标签名称，如图\
  \ 5-7 所示。\n\n![A329781_3_En_5_Fig7_HTML.jpg](img/A329781_3_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7. 使用文档大纲视图（位于故事板画布左侧）有时可以更轻松地选择和处理多个 UI 对象\n\n知道这种方法有效是一回事，但要最有效地使用此类约束，理解其工作原理也非常重要。因此，让我们深入探讨一下。回到\
  \ Xcode，单击左上角的标签以选中它。你会注意到可以看到一些附着在该标签上的蓝色实线。这些蓝色实线不同于在屏幕上拖动对象时看到的蓝色虚线辅助线，如图 5-8\
  \ 所示。\n\n![A329781_3_En_5_Fig8_HTML.jpg](img/A329781_3_En_5_Fig8_HTML.jpg)\n\n图\
  \ 5-8. 蓝色实线表示为所选对象配置的约束\n\n每一条蓝色实线都代表一个约束。如果你现在按下 ⌥⌘5 打开大小检查器，你会看到它包含一个约束列表。图 5-9\
  \ 显示了 Xcode 在我的故事板中应用于 `UL` 标签的约束，但 Xcode 创建的约束取决于你精确放置标签的位置，因此你可能会看到不同的结果。\n\n\
  ![A329781_3_En_5_Fig9_HTML.jpg](img/A329781_3_En_5_Fig9_HTML.jpg)\n\n图 5-9. Xcode\
  \ 生成的四个约束，用于将标签固定在其父视图中\n\n在本例中，其中两个约束处理该标签相对于其父视图（即容器视图）的位置：它指定了前导间距（通常指右侧的间距）和顶部间距（即标签上方的间距）。当父视图大小发生变化时（例如设备旋转时），这些约束会使标签保持与父视图顶部和右侧边缘相同的距离。另外两个约束使该标签与另外两个标签对齐。检查其他每个标签，查看它们具有哪些约束，并确保你理解这些约束如何工作，以将四个标签固定在父视图的四角。\n\
  \n你应该知道，在文本书写和阅读方向是从右到左的语言中，“前导间距”位于右侧，因此如果用户为其设备选择了阿拉伯语等语言，添加尾随约束将导致 GUI 以相反方向布局。这实际上正是用户所期望的。而且这是自动的，因此你无需做任何特殊操作即可实现。\n\
  \n\n## 覆盖默认约束\n\n从库中抓取另一个标签，并将其拖到布局区域。这一次，不要将其移向角落，而是将其拖到视图的左边缘，让标签的左边缘与左侧其他标签的左边缘对齐，并在视图中垂直居中。虚线会帮助你完成操作。图\
  \ 5-10 展示了这一效果。\n\n![A329781_3_En_5_Fig10_HTML.jpg](img/A329781_3_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10. 放置左侧标签\n\n我们来添加一个新的约束，强制这个标签保持垂直居中。选中该标签，点击故事板下方的`Align`图标，在出现的弹出窗口中勾选`Vertically\
  \ in Container`，然后点击`Add 1 Constraint`。现在确保`Size Inspector`为显示状态（必要时可按⌥⌘5）。你会看到这个标签现在有了一条约束，将其中心\
  \ Y 值与其父视图的中心 Y 值对齐。该标签还需要一条水平约束。你可以通过确保标签已选中，然后在菜单的`All Views`部分选择`Editor ➤ Resolve\
  \ Auto Layout Issues ➤ Add Missing Constraints`来添加此约束。按⌘R 再次运行应用。旋转设备，你会发现所有标签现在都能完美地移动到不同设备类型下预期的位置。\n\
  \n现在，我们通过拖出一个新标签到视图右侧，使其右边缘与右侧的其他标签对齐，并在垂直方向上与左侧标签对齐，来完成我们的标签环。将这个标签的标题改为`Right`，然后稍微拖动它，确保其右边缘与其他两个标签的右边缘垂直对齐，以蓝色虚线作为参考。我们希望使用\
  \ Xcode 能提供的自动约束，因此选择`Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints`来生成它们。\n\
  \n构建并再次运行。再次旋转设备。你会看到所有标签都保持在屏幕上，并且彼此之间的位置正确（见图 5-11）。如果你旋转回来，它们应恢复到原始位置。这种技术对于你可能遇到的许多应用来说都非常有效。\n\
  \n![A329781_3_En_5_Fig11_HTML.jpg](img/A329781_3_En_5_Fig11_HTML.jpg)\n\n图 5-11.\
  \ 旋转后标签在新位置\n\n## 全宽标签\n\n我们将创建一些约束，确保我们的标签彼此保持相同的宽度，间距紧凑，即使在设备旋转时也能使它们横向延伸在视图顶部。图\
  \ 5-12 应该能让你了解我们要实现的效果。\n\n![A329781_3_En_5_Fig12_HTML.jpg](img/A329781_3_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12. 顶部标签在竖屏和横屏方向上都横跨显示器的整个宽度\n\n我们需要能够直观地验证是否得到了想要的结果——即每个标签都精确地居中于其所在的那一半屏幕。为了更容易判断我们是否做对了，让我们暂时为标签设置一个背景颜色。在故事板中，同时选中`UL`和`UR`标签，打开`Attributes\
  \ Inspector`，向下滚动到`View`部分。使用`Background`控件选择一个亮眼的颜色。你会看到每个标签（目前非常小）的框架都填充了你选择的颜色。\n\
  \n从`UL`标签的右边缘拖动其大小调整控件，将其拉到接近视图的水平中点。你不需要精确对齐，原因很快就会明了。完成此操作后，通过将`UR`标签的左边缘大小调整控件向左拖动来调整其大小，直到出现蓝色虚线参考线（如果没有看到参考线，只需合理拖动即可），它会告诉你标签到其左侧的推荐宽度。现在我们将添加一条约束，使这些标签保持相对位置。按住\
  \ Control 键从`UL`标签拖动，直到鼠标悬停在`UR`标签上，然后松开鼠标。在弹出的窗口中，选择`Horizontal Spacing`并按 Return\
  \ 键。该约束告诉布局系统将这些标签彼此相邻放置，并保持与当前相同的水平间距。构建并运行看看效果。你应该会看到类似图 5-13 的结果；较长的标签可能出现在左侧或右侧，具体取决于你的配置。\n\
  \n![A329781_3_En_5_Fig13_HTML.jpg](img/A329781_3_En_5_Fig13_HTML.jpg)\n\n图 5-13.\
  \ 标签横跨显示器，但分布不均匀\n\n方向对了，但还不是我们设想的样子。那么缺少什么呢？我们已经定义了约束来控制每个标签相对于其父视图的位置以及两个标签之间的允许距离，但我们没有对标签的大小做任何规定。这使得布局系统可以自由地以任何方式调整它们的大小（正如我们刚刚看到的，这可能会非常错误）。要解决这个问题，我们需要再添加一个约束。\n\
  \n确保`UL`标签被选中，然后按住 Shift 键（⇧）并点击`UR`标签。同时选中两个标签后，你可以创建一个影响它们两者的约束。点击故事板下方的`Pin`图标，在出现的弹出窗口中勾选`Equal\
  \ Widths`复选框（我们在第 3 章中见过），然后点击`Add 1 Constraint`。现在你会看到一个新的约束出现，如图 5-14 所示。你可能注意到标签下方出现了两条橙色线；这意味着故事板中标签的当前位置和大小与运行时看到的不匹配。要修复此问题，请选择`Document\
  \ Outline`中的`View`图标，然后在 Xcode 的菜单中选择`Editor ➤ Resolve Auto Layout Issues ➤ Update\
  \ Frames`。约束应变为蓝色，并且标签将自动调整大小，使它们的宽度相等。\n\n![A329781_3_En_5_Fig14_HTML.jpg](img/A329781_3_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14. 顶部标签现在通过约束实现了宽度相等\n\n如果此时再次运行，你应该会看到标签横跨整个屏幕，无论是在竖屏还是横屏方向（见图 5-12）。\n\n\
  在这个项目中，我们所有的标签都可见并且在多种方向下布局正确；然而，屏幕上还有很多未使用的空间。也许我们最好也设置另外两行标签来填充视图的宽度，或者允许标签的高度改变，以减少界面上的空白区域？你可以随意尝试这六个标签的约束，甚至添加一些其他约束。除了我们已经介绍的内容，你还会在点击故事板下方的`Pin`和`Align`图标时出现的弹出窗口中找到更多创建约束的操作。如果你最终创建的约束没有达到预期效果，你可以通过选中它并按`Delete`键来删除它，或者尝试在`Attributes\
  \ Inspector`中配置它。多练习，直到你对约束工作的基本原理感到得心应手。我们将在本书中持续使用约束，但如果你想要完整的详细信息，只需在 Xcode 文档窗口中搜索`Auto\
  \ Layout`即可。\n\n\n\n## 创建自适应布局\n\n我们刚刚创建的简单示例布局在竖屏和横屏方向下都能良好工作。它同样适用于屏幕尺寸不同的 iPhone\
  \ 和 iPad。正如我们之前提到的，处理设备旋转和创建在不同屏幕尺寸设备上工作的用户界面实际上是同一个问题——毕竟，从应用程序的角度来看，当设备旋转时，屏幕的有效尺寸发生了改变。在最简单的情况下，你可以通过设置\
  \ Auto Layout 约束来同时处理这两种情况，确保所有视图都按照预期定位和调整大小。然而，这并非总是可行。有些布局在设备竖屏时工作良好，但旋转到横屏后效果不佳；同样，有些设计适合\
  \ iPhone 却不适合 iPad。当出现这种情况时，除了为每种情况创建独立的设计外，你其实别无选择。在 iOS 8 之前，这意味着要么用代码实现整个布局，要么使用多个故事板，要么将两者结合。幸运的是，苹果公司已经使设计既能适应两种屏幕方向又能适应不同设备的自适应应用成为可能，且只需使用单个故事板。让我们来看看这是如何实现的。\n\
  \n### 创建 Restructure 应用程序\n\n首先，我们将设计一个在 iPhone 竖屏模式下工作良好，但在手机旋转或应用在 iPad 上运行时效果不佳的用户界面。然后，我们将学习如何使用\
  \ Interface Builder 调整设计，使其在所有场景下都能良好工作。\n\n像之前一样，新建一个 Single View 项目，并将其命名为 `Restructure`。我们将构建一个包含一个大内容区域和一组执行各种（虚构）操作的小按钮的\
  \ GUI。我们将按钮放置在屏幕底部，让内容区域占据剩余空间，如图 5-15 所示。\n\n![A329781_3_En_5_Fig15_HTML.jpg](img/A329781_3_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15.\n\n`Restructure` 应用的初始 GUI，iPhone 竖屏显示\n\n你可能注意到，本书中使用的苹果设备插图有不同的配置。有些插图（如图\
  \ 5-15）外观更接近“真实”设备，而其他一些（如图 5-11）则显得更基础。这些差异无需担忧，因为你在技术文档（包括苹果公司的文档）中很可能会遇到各种风格。\n\
  \n选择 `Main.storyboard` 开始编辑 GUI。由于我们并没有真正需要显示的有趣内容视图，我们只需使用一个彩色的大矩形。从对象库中拖拽一个 `UIView`\
  \ 到容器视图中。在它仍处于选中状态时，调整其大小使其填满可用空间的顶部区域，并在上方和两侧留出小边距，如图 5-15 所示。接下来，切换到属性检查器，使用 `Background`\
  \ 弹出菜单选择其他背景颜色。你可以选择任何你喜欢的颜色，只要不是白色，这样视图就能从背景中凸显出来。在示例源代码存档的故事板中，这个视图是绿色的，所以从现在起我们称它为绿色视图。\n\
  \n从对象库中拖拽一个按钮，将其放置在绿色视图下方空白区域的左下角。双击选择其标签中的文本，并将其改为 `Action One`。现在，按住 Option 键并拖拽该按钮三次，复制出三个副本，并将它们排列成两列，如图\
  \ 5-15 所示。你无需将它们完美对齐，因为我们将使用约束来最终确定它们的位置，但你应该尽量让两个按钮组离容器视图各自对应侧边的距离大致相等。将它们的标题分别改为\
  \ `Action Two`、`Action Three` 和 `Action Four`。另外，为每个按钮添加不同的背景色，以便于区分；我按顺序使用了红色、蓝色、橙色和黄色，但你可以选择任何你喜欢的颜色。如果你使用了像蓝色这样的深色背景色，最好同时将文本颜色调亮。最后，将绿色视图的下边缘向下拖动，直到它刚好触及第一行按钮。使用蓝色参考线将所有元素对齐，如图\
  \ 5-15 所示。\n\n\n\n现在我们来设置 Auto Layout 约束。首先选中绿色视图。我们要将它固定在主视图的顶部、左侧和右侧。但这仍然不足以完全约束它，因为还没有指定它的高度；稍后当我们固定好按钮后，我们会将其锚定到按钮顶部来解决这个问题。点击故事板编辑器右下角的\
  \ `Pin` 按钮。在弹出的窗口顶部，你会看到熟悉的四个输入框围绕一个小方块的布局。保持勾选 `Constrain to Margins`（约束到边距）复选框。点击小方块上方、左侧和右侧的红色虚线，将视图附着到其父视图的顶部、左侧和右侧（见图\
  \ 5-16）。点击 `Add 3 Constraints`（添加 3 个约束）。\n\n![A329781_3_En_5_Fig16_HTML.jpg](img/A329781_3_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16. 添加约束，将绿色视图固定到顶部、左侧和右侧\n\n现在，我们从 `Action One` 按钮开始，为按钮设置一个固定高度，如图 5-17\
  \ 所示。我使用 43 点的值，仅仅是因为创建按钮时它就是这个值。对于本例所要实现的目标（处理不同设备和方向），这个数值附近的任何值都应该没问题。然后对其他三个按钮重复此操作。\n\
  \n![A329781_3_En_5_Fig17_HTML.jpg](img/A329781_3_En_5_Fig17_HTML.jpg)\n\n图 5-17.\
  \ 为其中一个按钮设置高度值\n\n到目前为止，如果你操作正确，应该能在 `Document Outline`（文档大纲）中看到所有约束的结果，如图 5-18\
  \ 所示，其中我们可以看到四个按钮各自的高度，以及绿色视图的三个边。\n\n![A329781_3_En_5_Fig18_HTML.jpg](img/A329781_3_En_5_Fig18_HTML.jpg)\n\
  \n图 5-18. 你可以在 `Document Outline`（文档大纲）中随时查看约束设置进度\n\n接下来，通过从每个按钮分别按住 `Control`\
  \ 键拖拽到左下角和右下角，将左下角（`Action Two`）和右下角（`Action Four`）按钮固定到容器视图的底部角落。对于 `Action Two`，按住\
  \ `Shift` 键选择两个选项，如图 5-19 所示。\n\n![A329781_3_En_5_Fig19_HTML.jpg](img/A329781_3_En_5_Fig19_HTML.jpg)\n\
  \n图 5-19. 按住 `Control` 键向左下方拖拽，将 `Action Two` 按钮固定到容器视图的左下角\n\n执行类似操作，按住 `Control`\
  \ 键向右下方拖拽，为 `Action Four` 按钮设置 `Leading`（前导）和 `Vertical Spacing`（垂直间距），如图 5-20 所示。\n\
  \n![A329781_3_En_5_Fig20_HTML.jpg](img/A329781_3_En_5_Fig20_HTML.jpg)\n\n图 5-20.\
  \ 按住 `Control` 键向右下方拖拽，将 `Action Four` 按钮固定到容器视图的右下角\n\n接下来，按住 `Shift` 键选中所有四个按钮，点击\
  \ `Pin`（固定）图标，并设置所有宽度相等（见图 5-21）。请注意，我们尚未设置宽度，因此它们可能从很小到非常宽不等；但稍后我们会通过额外约束来解决这个问题。\n\
  \n![A329781_3_En_5_Fig21_HTML.jpg](img/A329781_3_En_5_Fig21_HTML.jpg)\n\n图 5-21.\
  \ 将所有按钮设置为等宽，尽管我们尚未在故事板中设置任何宽度值\n\n对于顶行的按钮 `Action One` 和 `Action Three`，分别按住 `Control`\
  \ 键向左和向右拖拽，以设置 `Leading Space to Container Margin`（容器前导边距）和 `Trailing Space to Container\
  \ Margin`（容器尾部边距）（见图 5-22）。这将 `Action One` 的左边缘和 `Action Three` 的右边缘绑定到视图边缘，从而设置了一个宽度锚点。\n\
  \n![A329781_3_En_5_Fig22a_HTML.jpg](img/A329781_3_En_5_Fig22a_HTML.jpg)![A329781_3_En_5_Fig22b_HTML.jpg](img/A329781_3_En_5_Fig22b_HTML.jpg)\n\
  \n图 5-22. 将 `Action One` 的左边缘和 `Action Three` 的右边缘设置到容器视图的边缘\n\n最后这两个约束将确保按钮宽度为绿色视图的一半且彼此匹配。按住\
  \ `Control` 键从 `Action One` 拖拽到 `Action Three`，设置 `Horizontal Spacing`（水平间距）。在 `Action\
  \ Two` 和 `Action Four` 之间执行相同操作，如图 5-23 所示。我们所做的是将边缘锚点设置为固定位置，即图 5-22 中容器的左边缘和右边缘。并且，如图\
  \ 5-21 所示，我们设置了按钮等宽。通过设置水平间距使同一行的按钮彼此紧贴，它们最终会在视图中心相接。由于绿色视图也被固定到了左右边缘，因此按钮也在绿色视图的中心相接。\n\
  \n![A329781_3_En_5_Fig23a_HTML.jpg](img/A329781_3_En_5_Fig23a_HTML.jpg)![A329781_3_En_5_Fig23b_HTML.jpg](img/A329781_3_En_5_Fig23b_HTML.jpg)\n\
  \n图 5-23. 将每行按钮在视图中心连接起来；这样默认会将每个按钮的宽度设置为视图宽度的一半\n\n只差最后几步，我们就可以在各种设备上测试我们的应用了。按住\
  \ `Control` 键从 `Action Three` 拖拽到 `Action Four`，设置 `Vertical Spacing`（垂直间距），就像刚才对行的\
  \ `Horizontal Spacing`（水平间距）所做的那样，如图 5-24 所示。在 `Action One` 和 `Action Two` 之间也执行相同操作。\n\
  \n![A329781_3_En_5_Fig24_HTML.jpg](img/A329781_3_En_5_Fig24_HTML.jpg)\n\n图 5-24.\
  \ 像处理按钮行一样设置同一列按钮之间的垂直间距\n\n最后，按住 `Control` 键在绿色视图和 `Action One` 按钮之间拖拽，设置间距，使绿色视图和顶行按钮相邻，如图\
  \ 5-25 所示。\n\n![A329781_3_En_5_Fig25_HTML.jpg](img/A329781_3_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25. 设置绿色视图与顶行按钮之间的间距\n\n现在，你应该能够选择任何全屏的 iPhone 或 iPad，无论是竖屏还是横屏，按钮都应保持其位置，如图\
  \ 5-26 所示。\n\n![A329781_3_En_5_Fig26a_HTML.jpg](img/A329781_3_En_5_Fig26a_HTML.jpg)![A329781_3_En_5_Fig26b_HTML.jpg](img/A329781_3_En_5_Fig26b_HTML.jpg)![A329781_3_En_5_Fig26c_HTML.jpg](img/A329781_3_En_5_Fig26c_HTML.jpg)\n\
  \n图 5-26. 选择竖屏方向的不同设备；布局应保持其定位\n\n在查看 Xcode 中的 `Issue Navigator`（问题导航器）时，还有一点值得注意：没有任何问题。通过系统地设置我们需要的约束，我们以最小的努力创建了一个布局。但不要期望一直这么容易。\n\
  \n最后要做的一件事：在继续之前，让我们在模拟器中构建并运行我们的项目，以确保它按预期工作。图 5-27 显示了两种 iPhone 6s 方向，而图 5-28\
  \ 显示了全屏 iPad Air 的两种方向。\n\n![A329781_3_En_5_Fig28a_HTML.jpg](img/A329781_3_En_5_Fig28a_HTML.jpg)![A329781_3_En_5_Fig28b_HTML.jpg](img/A329781_3_En_5_Fig28b_HTML.jpg)\n\
  \n图 5-28. iPad Air 的两种方向\n\n![A329781_3_En_5_Fig27a_HTML.jpg](img/A329781_3_En_5_Fig27a_HTML.jpg)![A329781_3_En_5_Fig27b_HTML.jpg](img/A329781_3_En_5_Fig27b_HTML.jpg)\n\
  \n图 5-27. iPhone 6s 的两种方向\n\n虽然这些看起来符合我们的预期，但它们并不是我们想要的结果。对于横屏的 iPhone，仍然是 `wC hC`\
  \ 配置，我们希望是一个单独的按钮列紧靠在右侧。对于任何方向的 iPad，`wR hR`，我们希望是一行单独的按钮位于视图底部。\n\n**注意**\n\n\n\
  \n## Auto Layout 配置中的宽高表示法\n\n记法`w- h-`指代的是所考虑配置的宽度和高度。为了简化，在 Auto Layout 中，这将被表示为\
  \ `C`（紧凑）或 `R`（常规），因此你会有以下选项：`wC hC`、`wC hR`、`wR hC` 和 `wR hR`。通过查看设备配置栏（Device\
  \ Configuration Bar），你可以看到这些如何应用于实际的 Apple 设备。\n\n### 设置 iPhone 横屏（wC hC）配置\n\n\
  我们将很快开始设置我们的 `wC hC` 横屏配置，但首先请保存你的工作，然后关闭 Xcode 项目。你只需点击 Xcode 窗口左上角的红色圆点即可关闭此项目。你不需要完全退出\
  \ Xcode。\n\n前往 Mac 上的访达（Finder），找到 `Restructure` 文件夹并创建一个压缩版本，如图 5-29 所示。这将创建我们项目的“主”副本，如果在后续的修改中出现问题，我们可以随时回到这个副本。\n\
  \n![A329781_3_En_5_Fig29_HTML.jpg](img/A329781_3_En_5_Fig29_HTML.jpg)\n\n图 5-29.\
  \ 创建项目当前状态的备份副本\n\n因为我们可能在后续工作中再次需要这样做，我将 `.zip` 文件重命名为 `RestructureBaseline`，如图\
  \ 5-30 所示，这样我就知道这是最初创建的项目，它能够以相同的方式在所有设备和方向上工作。\n\n![A329781_3_En_5_Fig30_HTML.jpg](img/A329781_3_En_5_Fig30_HTML.jpg)\n\
  \n图 5-30. 以唯一名称保存我们的基线项目\n\n首先，让我们创建 iPhone 横屏方向。选择 iPhone 6s 和横屏方向。在设备配置栏的右侧，点击`Vary\
  \ for Traits`，注意该栏会变为蓝色，如图 5-31 所示。在弹出的选项中，同时选择高度和宽度。你应该会再次在图 5-31 中看到，现在只显示 iPhone\
  \ 设备，并且仅限横屏方向。在这个特性变体中，我们将专门为这个配置开发我们的 UI。\n\n![A329781_3_En_5_Fig31_HTML.jpg](img/A329781_3_En_5_Fig31_HTML.jpg)\n\
  \n图 5-31. 为 iPhone 横屏配置创建 UI 的起点\n\n接下来——是的，这看起来可能有点吓人——点击所有五个 UI 元素（我们的绿色视图和四个按钮），然后按\
  \ Delete 键。不必太担心，因为你已经保存了项目并创建了一个压缩的基线版本，我们随时可以回到那个版本。如果你还没有做，现在去做可能是个好主意。完成后，你的画布将如你所料，像图\
  \ 5-32 所示。但是，如果你查看文档大纲（Document Outline），你仍然会看到这些元素，甚至约束条件。这是因为它们存在于基线配置中，而我们正在为我们的\
  \ `wC hC` 横屏配置创建一个新的配置或新的特性集合。\n\n![A329781_3_En_5_Fig32_HTML.jpg](img/A329781_3_En_5_Fig32_HTML.jpg)\n\
  \n图 5-32. 仅为 iPhone 横屏配置重新开始。注意，文档大纲中仍然显示了基线配置的所有 UI 元素和约束\n\n正如我们为基线所做的那样，拖拽一个\
  \ `UIView` 和四个按钮，并像之前一样为它们设置颜色和标题。将它们放置在如图 5-33 所示的近似位置，但暂时不要设置任何约束。\n\n![A329781_3_En_5_Fig33_HTML.jpg](img/A329781_3_En_5_Fig33_HTML.jpg)\n\
  \n图 5-33. 将新的 UI 元素拖到故事板上，并按图示大致定位\n\n在本节中，让我们让测量更精确一些。选择绿色视图。使用尺寸检查器（Size Inspector），将尺寸设置为\
  \ 500 × 340 点，如图 5-34 所示。宽度（500 点）是任意的；高度为 340，除以 4 得到 85，这正是我们将要设置的按钮高度。请注意，这不一定是一个约束，而是故事板上的外观。实际上，我们不希望绿色视图有任何固定尺寸，因为它会随着我们升级到\
  \ Plus 或降级到 SE 而变化。\n\n![A329781_3_En_5_Fig34_HTML.jpg](img/A329781_3_En_5_Fig34_HTML.jpg)\n\
  \n图 5-34. 设置绿色视图的尺寸\n\n\n\n选择绿色视图，并将其顶部、左侧和右侧固定到边缘，如图 5-35 所示。\n\n![A329781_3_En_5_Fig35_HTML.jpg](img/A329781_3_En_5_Fig35_HTML.jpg)\n\
  \n图 5-35：将绿色视图固定到顶部、左侧和右侧（横屏方向）\n\n接下来，我们将固定`Action One`按钮的宽度，但操作方式与之前略有不同。在`Action\
  \ One`按钮内部，按住`Control`键从红色边界内的一个点拖拽到另一个点（起点和终点均在红色边界内），然后松开。此时会弹出一个类似的弹出菜单（见图 5-36），在其中选择`Width`。现在，`Action\
  \ One`按钮的宽度应设置为 120 点，如图 5-37 所示。\n\n![A329781_3_En_5_Fig37_HTML.jpg](img/A329781_3_En_5_Fig37_HTML.jpg)\n\
  \n图 5-37：确认`Action One`按钮宽度设置为 120 点\n\n![A329781_3_En_5_Fig36_HTML.jpg](img/A329781_3_En_5_Fig36_HTML.jpg)\n\
  \n图 5-36：设置`Action One`按钮的宽度\n\n我们希望所有四个按钮具有相同的宽度和高度——宽度为 120 点，而高度则根据 iPhone 横屏时可用垂直区域动态调整。和之前一样，我们将通过设置列中按钮之间的间距来处理等高问题。现在，按住`Shift`键选中全部四个按钮，点击`Pin`图标，设置等宽和等高约束，如图\
  \ 5-38 所示。\n\n![A329781_3_En_5_Fig38_HTML.jpg](img/A329781_3_En_5_Fig38_HTML.jpg)\n\
  \n图 5-38：将所有四个按钮设置为等宽等高\n\n注意：你可能已经注意到，虽然我们有四个按钮，每个按钮有两个约束，但实际上添加的约束总数是 6。这是因为我们实际上是将三个按钮的等质量关系设置为与第四个按钮相同。\n\
  \n将`Action One`按钮固定到其容器视图的顶部和右侧（见图 5-39），并将`Action Four`按钮固定到右侧和底部（见图 5-40）。\n\n\
