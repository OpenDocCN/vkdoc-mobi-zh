  \n**图 5-64.** 通过使用不同设备类型运行模拟器并检查方向，验证一切是否按预期工作\n\n\n\n## 本章小结\n\n在本章中，我们涵盖了处理设备旋转的基础知识，包括深入学习如何使用全新的\
  \ Xcode 8 Auto Layout 以及设备配置栏下的特性编辑器。我们首先讨论了旋转的基本原理，以及当你在 Apple 设备上改变方向时会发生什么。我们的第一个项目\
  \ `Orientations` 展示了处理简单设备旋转以及保持标签定位的基础知识。在第二个项目 `Layout` 中，我们通过将标签放置到四个角以及左右边缘来处理旋转，从而加深了对标签定位的理解。\n\
  \n最后，在 `Restructure` 项目中，我们深入理解了如何使用 Auto Layout 来创建针对设备和方向的特定布局配置。由于你将在本书的剩余部分以及你的职业生涯中用到\
  \ Auto Layout，请确保在继续之前对其使用感到得心应手。虽然一开始可能会令人望而生畏，但通过练习，就像其他任何事情一样，它会变成你的第二天性——直到明年\
  \ Apple 做出改变。\n\n"
- "# 6. 创建多视图应用程序\n\n到目前为止，我们编写的应用程序都使用了单个视图控制器。虽然单视图应用通常能满足你的需求，但 iOS 平台的真正威力在于你能根据用户输入切换视图。多视图应用程序有几种不同的形式，但无论应用在屏幕上的外观如何，其底层机制的工作原理是相同的。在本章中，我们将通过从头构建自己的多视图应用，重点介绍多视图应用的结构以及交换内容视图的基础知识。通过编写我们自己的自定义控制器类，在两个不同的内容视图之间切换，我们将为利用\
  \ Apple 提供的各种多视图控制器打下坚实的基础。\n\n首先，让我们看看一些我们即将探索的新领域——多视图的例子。\n\n## 多视图应用的常见类型\n\n\
  严格来说，我们在之前的应用程序中已经处理过多个视图，因为按钮、标签和其他控件都是 `UIView` 的子类，并且它们都可以进入视图层级结构。但是，当 Apple\
  \ 在文档中使用术语“视图”时，它们指的是一个 `UIView` 或其一个子类，并且拥有一个对应的视图控制器。这类视图有时也被称为内容视图，因为它们是你应用程序内容的主要容器。\n\
  \n工具类应用提供了多视图应用外观的最简单示例。它主要关注单个视图，但同时提供第二个视图，通常用于配置应用程序或提供比主视图更详细的信息。iPhone 自带的\
  \ Stocks 应用就是一个很好的例子（见图 6-1）。点击右下角的按钮，视图会过渡到一个新视图，让你设置应用跟踪的股票列表。\n\n![A329781_3_En_6_Fig1_HTML.jpg](img/A329781_3_En_6_Fig1_HTML.jpg)\n\
  \n*图 6-1. iPhone 自带的 Stocks 应用提供了两个视图：一个用于显示数据，另一个用于配置股票列表*\n\niPhone 自带了几个标签栏应用，包括电话应用（见图\
  \ 6-2）和时钟应用。标签栏应用在屏幕底部显示一行按钮，称为标签栏。点击其中一个按钮会激活一个新的视图控制器，并显示一个新的视图。例如，在电话应用中，点击“通讯录”会显示与点击“拨号键盘”时不同的视图。\n\
  \n![A329781_3_En_6_Fig2_HTML.jpg](img/A329781_3_En_6_Fig2_HTML.jpg)\n\n*图 6-2. 电话应用提供了一个使用标签栏的多视图应用示例*\n\
  \n另一种常见的多视图应用类型使用基于导航的机制，其特点是使用一个导航控制器，通过导航栏来控制一系列层级化的视图，如设置应用所示（见图 6-3）。在“设置”中，你首先会看到一系列行，每一行对应一组设置或一个特定应用。触摸其中一行，你便会进入一个新视图，在那里你可以自定义某一组特定设置。某些视图会提供一个列表，允许你进一步深入。导航控制器会跟踪你深入的层级，并提供一个控件让你能返回到上一个视图。\n\
  \n![A329781_3_En_6_Fig3_HTML.jpg](img/A329781_3_En_6_Fig3_HTML.jpg)\n\n*图 6-3. iPhone\
  \ 的设置应用是一个使用导航栏的多视图应用的绝佳示例*\n\n例如，选择“声音”偏好设置会将你带到一个包含声音相关选项列表的视图。该视图的顶部显示一个导航栏，带有一个标记为“设置”的左箭头，如果你点击它，就会返回到上一个视图。在声音选项中，你会看到一个标有“铃声”的行。点击“铃声”，你会被带到一个新视图，其中包含一个铃声列表和一个导航栏，该导航栏可以带你回到主“声音”偏好设置视图，如图\
  \ 6-4 所示。当你想要呈现一个层级化的视图时，基于导航的应用提供了一种有用的机制。\n\n![A329781_3_En_6_Fig4_HTML.jpg](img/A329781_3_En_6_Fig4_HTML.jpg)\n\
  \n*图 6-4. 音乐应用同时使用了导航栏和标签栏*\n\n在 iPad 上，我们使用分屏视图实现大多数基于导航的应用，例如邮件应用。在分屏视图中，导航元素出现在屏幕左侧，而你选择查看或编辑的项目则出现在右侧。我们将在第\
  \ 11 章讨论分屏视图。\n\n由于视图本身本质上是层级化的，我们可能会在单个应用程序中组合使用不同的视图切换机制。例如，iPhone 的音乐应用使用一个标签栏来切换组织音乐的不同方式。同时，它也使用一个导航控制器及其关联的导航栏来让你基于所选方式进行音乐浏览。在图\
  \ 6-4 中，标签栏位于屏幕底部，而导航栏位于屏幕顶部。\n\n有些应用使用工具栏，它经常与标签栏混淆。标签栏从两个或多个选项中选择且仅选择一个选项。而工具栏包含按钮和某些其他控件，但这些项目之间不是互斥的。一个完美的例子是\
  \ Safari 浏览器主视图底部的工具栏，如图 6-5 所示。如果你将 Safari 浏览器视图底部的工具栏与电话或音乐应用底部的标签栏进行比较，你会发现它们很容易区分。标签栏有多个分段，恰好有一个（选中的那个）会以某种颜色高亮显示；但在工具栏上，通常每个可用的按钮都会被高亮显示。\n\
  \n![A329781_3_En_6_Fig5_HTML.jpg](img/A329781_3_En_6_Fig5_HTML.jpg)\n\n*图 6-5. 移动版\
  \ Safari 浏览器在底部设有一个工具栏，它像一个自由格式的栏，允许你包含各种控件*\n\n这些多视图应用类型中的每一种都使用了 UIKit 中一个特定的控制器类。标签栏接口使用\
  \ `UITabBarController` 类实现，而导航接口使用 `UINavigationController` 实现。我们将在接下来的几章中详细描述它们的用法。\n\
  \n\n\n## 多视图应用的架构\n\n本章将要构建的应用`View Switcher`（视图切换器）外观相当简洁，但就代码而言，它是我们目前处理过的最复杂的应用。`View\
  \ Switcher`由三个不同的控制器、一个故事板和一个应用委托组成。\n\n首次启动时，`View Switcher`会如图 6-6 所示出现，底部有一个包含单个按钮的工具栏。视图的其余部分显示蓝色背景和一个待按下的按钮。\n\
  \n![A329781_3_En_6_Fig6_HTML.jpg](img/A329781_3_En_6_Fig6_HTML.jpg)\n\n图 6-6. 当你首次启动`View\
  \ Switcher`应用时，你会看到一个带有按钮的蓝色视图，以及一个带有自身按钮的工具栏\n\n按下`Switch Views`（切换视图）按钮会导致背景变为黄色，并且按钮的标题也会改变，如图\
  \ 6-7 所示。\n\n![A329781_3_En_6_Fig7_HTML.jpg](img/A329781_3_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 按下`Switch Views`按钮会使蓝色视图翻转，露出黄色视图\n\n如果按下`Press Me`（按我）或`Press Me, Too`（也按我）按钮，会出现一个提示框，指明是哪个视图的按钮被按下了，如图\
  \ 6-8 所示。\n\n![A329781_3_En_6_Fig8_HTML.jpg](img/A329781_3_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8. 按下`Press Me`或`Press Me, Too`按钮会显示提示框\n\n虽然我们可以通过编写一个单视图应用来实现相同的功能，但我采用这种更复杂的方法是为了演示多视图应用的实际运作机制。在这个简单的应用中，有三个视图控制器在交互：一个控制蓝色视图，一个控制黄色视图，还有一个特殊的控制器，当按下`Switch\
  \ Views`按钮时，它会将另外两个控制器进行切换。\n\n在开始构建我们的应用之前，先来讨论一下 iOS 多视图应用是如何组合起来的。大多数多视图应用都使用相同的基本模式。\n\
  \n### 根控制器\n\n故事板在此处扮演关键角色，因为它包含了我们应用的所有视图和视图控制器。我们将创建一个故事板，其中包含一个控制器类的实例，该实例负责管理当前向用户显示的是哪个其他视图。我们称这个控制器为根控制器（如同“树的根”），因为它是用户看到的第一个控制器，也是应用加载时加载的控制器。这个根控制器通常充当`UINavigationController`或`UITabBarController`的实例，尽管它也可以是`UIViewController`的自定义子类。\n\
  \n在多视图应用中，根控制器会获取两个或更多其他视图，并根据用户的输入适时地将它们呈现给用户。例如，标签栏控制器会根据最后点击的标签栏项目来切换不同的视图和视图控制器。当用户在分层数据中进行深入和返回操作时，导航控制器也会执行同样的操作。\n\
  \n> **注意**: 根控制器为应用提供主要的视图控制器，因此它需要指定是否可以自动旋转到新的方向。然而，根控制器可能会将此类任务的责任传递给当前活动的控制器。\n\
  \n在多视图应用中，内容视图占据屏幕的大部分区域，每个内容视图都有其自身的视图控制器，其中包含输出口和操作。例如，在标签栏应用中，点击标签栏的操作会由标签栏控制器处理，但点击屏幕其他任何位置的操作则由当前显示的内容视图对应的控制器处理。\n\
  \n### 内容视图剖析\n\n在多视图应用中，每个视图控制器（Swift 代码）管理一个内容视图，而这些内容视图构成了应用用户界面的主体。总的来说，每一对这样的组合在故事板中被称为一个场景。每个场景由一个视图控制器和一个内容视图组成，内容视图可以是`UIView`或其子类的实例。虽然你可以在代码中而非使用\
  \ Interface Builder 来创建界面，但相关工具的强大、灵活和稳定性使得我们无需这样做。\n\n在这个项目中，我们将为每个内容视图创建一个新的控制器类。我们的根控制器管理一个内容视图，该视图包含一个位于屏幕底部的工具栏。然后，根控制器加载一个蓝色视图控制器，将蓝色内容视图作为子视图放置到根控制器视图中。当你按下根控制器的`Switch\
  \ Views`按钮（即工具栏中的按钮）时，根控制器会切换出蓝色视图控制器，并切换入一个黄色视图控制器，如果必要，它还会实例化该控制器。让我们构建这个项目，一切将变得更加清晰。\n\
  \n## 创建视图切换器应用\n\n要开始我们的项目，在 Xcode 中：选择 File（文件）➤ New（新建）➤ Project…（项目…）或按下`⌘` `N`。当模板选择表打开时，选择`Single\
  \ View Application`（单视图应用），然后点击 Next（下一步）。在助手的下一页，输入`View Switcher`作为产品名称，将 Language（语言）设置为\
  \ Swift，Devices（设备）弹出按钮设置为 Universal（通用）。一切设置正确后，点击 Next（下一步）继续。在下一个屏幕上，导航到你保存项目的位置，然后点击\
  \ Create（创建）按钮来创建一个新的项目目录。\n\n\n\n### 重命名视图控制器\n\n如您所见，单视图应用程序模板提供了应用程序委托、视图控制器和故事板。视图控制器类名为`ViewController`。在此应用程序中，我们将处理三个视图控制器，但大部分逻辑将位于主视图控制器中。它的任务是切换显示，使得始终展示另一个视图控制器的视图。为了使主视图控制器的角色更清晰，我们想给它一个更好的名称，例如`SwitchingViewController`。项目中有多处引用了视图控制器的类名。要更改其名称，我们需要更新所有这些位置。Xcode\
  \ 有一个名为**重构**的便捷功能可以帮我们完成此操作，但在我撰写本文时，我使用的 Xcode beta 版尚不支持对 Swift 项目进行重构。因此，我们将删除模板创建的控制器，并添加一个新的。\n\
  \n首先在项目导航器中选择`ViewController.swift`。右键单击它，然后从弹出菜单中选择**删除**（见图 6-9）。当系统提示时，选择将源文件移到废纸篓。\n\
  \n![A329781_3_En_6_Fig9_HTML.jpg](img/A329781_3_En_6_Fig9_HTML.jpg)\n\n图 6-9.  \n\
  删除模板视图控制器\n\n现在右键单击 View Switcher 组，然后选择**新建文件...**。在模板选择器中，从 iOS 源部分选择 **Cocoa\
  \ Touch 类**。将类命名为`SwitchingViewController`，并使其成为`UIViewController`的子类。确保未勾选“同时创建\
  \ XIB 文件”，因为我们稍后会将此控制器添加到故事板；同时确保语言设置为 Swift，如图 6-10 所示，然后点击“下一步”，接着点击“创建”。\n\n\
  ![A329781_3_En_6_Fig10_HTML.jpg](img/A329781_3_En_6_Fig10_HTML.jpg)\n\n图 6-10. \
  \ \n创建`SwitchingViewController`类\n\n现在我们有了新的视图控制器，需要将其添加到故事板中。在文档大纲中选择`Main.storyboard`以打开故事板进行编辑。您会看到模板已经为我们创建了一个视图控制器——我们只需将它链接到我们的`SwitchingViewController`类即可。在文档大纲中选择该视图控制器，然后打开身份检查器。在“自定义类”部分，将类从`UIViewController`更改为`SwitchingViewController`，如图\
  \ 6-11 所示。\n\n![A329781_3_En_6_Fig11_HTML.jpg](img/A329781_3_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11.  \n在故事板中更改视图控制器类\n\n现在，如果您检查文档大纲，应该会看到视图控制器的名称已更改为“Switching View Controller”，如图\
  \ 6-12 所示。\n\n![A329781_3_En_6_Fig12_HTML.jpg](img/A329781_3_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12.  \n文档大纲中的新视图控制器\n\n### 添加内容视图控制器\n\n我们需要另外两个视图控制器来显示内容视图。在项目导航器中，右键单击\
  \ View Switcher 组，然后选择**新建文件...**。在模板对话框中，从 iOS 源部分选择 **Cocoa Touch 类**，然后点击“下一步”。将新类命名为`BlueViewController`，使其成为`UIViewController`的子类，并确保未勾选“同时创建\
  \ XIB 文件”复选框。点击“下一步”，然后点击“创建”以保存新视图控制器的文件。重复此过程以创建第二个内容视图控制器，将其命名为`YellowViewController`。为了保持组织有序，您可能需要将这些文件移动到项目导航器中\
  \ View Switcher 文件夹下，如图 6-13 所示。\n\n![A329781_3_En_6_Fig13_HTML.jpg](img/A329781_3_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13.  \n您可能希望将新的 Swift 文件移动到 Xcode 项目导航器中 View Switcher 文件夹下\n\n### 修改`SwitchingViewController.swift`\n\
  \n`SwitchingViewController`类将需要一个操作方法来切换蓝色和黄色视图。我们不会创建任何输出口，但需要两个属性——分别对应我们将要换入换出的两个视图控制器。这些属性不需要是输出口，因为我们将在代码中创建视图控制器，而不是在故事板中。将以下属性声明添加到`SwitchingViewController.swift`中：\n\
  \n```\nprivate var blueViewController: BlueViewController!\nprivate var yellowViewController:\
  \ YellowViewController!\n```\n\n在类的末尾添加以下方法：\n\n```\n@IBAction func switchViews(sender:\
  \ UIBarButtonItem) {\n}\n```\n\n之前，我们通过从视图按住 Control 键拖拽到视图控制器的源代码来添加操作方法，但这里您会看到，我们也可以反过来操作，因为\
  \ Interface Builder 能够看到我们源代码中已经定义了的输出口和操作。现在我们已经声明了所需的方法，就可以在故事板中为此控制器设置最小的用户界面了。\n\
  \n\n\n### 使用工具栏构建视图\n\n现在我们需要为 `SwitchingViewController` 设置视图。提醒一下，这个视图控制器将是我们的根视图控制器——即应用程序启动时活跃的控制器。`SwitchingViewController`\
  \ 的内容视图将由一个位于屏幕底部的工具栏以及来自黄色或蓝色视图控制器的视图组成。它的职责是在蓝色视图和黄色视图之间切换，因此需要为用户提供一种改变视图的方式。为此，我们将使用一个带按钮的工具栏。现在就来构建这个工具栏吧。\n\
  \n在项目导航器中，选择 `Main.storyboard`。在 IB 编辑器视图中，你会看到我们的切换视图控制器。如图 6-14 所示，它目前是空白的，相当单调。这就是我们开始构建图形用户界面的地方。\n\
  \n![A329781_3_En_6_Fig14_HTML.jpg](img/A329781_3_En_6_Fig14_HTML.jpg)\n\n图 6-14.\
  \ 空的根视图控制器（切换视图控制器）Storyboard\n\n从库中抓取一个工具栏，将其拖到你的视图上，并放置在底部，使其看起来如图 6-15 所示。\n\n\
  ![A329781_3_En_6_Fig15_HTML.jpg](img/A329781_3_En_6_Fig15_HTML.jpg)\n\n图 6-15. 向根视图控制器的底部添加一个工具栏\n\
  \n我们希望无论视图尺寸如何，该工具栏都能保持拉伸并固定在内容视图的底部。为此，我们需要添加三个布局约束——一个将工具栏固定在视图底部，另外两个将其固定在视图的左侧和右侧。要实现这一点，请在文档大纲中选择该工具栏，点击\
  \ storyboard 下方工具栏上的 Pin 按钮，然后更改弹出窗口中的值，如图 6-16 所示。\n\n![A329781_3_En_6_Fig16_HTML.jpg](img/A329781_3_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. 将工具栏约束到其包含视图的底部、左侧和右侧\n\n取消选中 `Constrain to margins` 复选框，因为我们希望将工具栏相对于内容视图的边缘而不是其边缘附近的蓝色参考线进行定位。接下来，将距最近左侧、右侧和底部邻居的距离设置为零（如果你已正确定位工具栏，它们应该已经是零了）。在这种情况下，工具栏最近的邻居是内容视图。你可以通过单击某个距离框中的小箭头来查看这一点。它会打开一个弹出窗口，显示最近的邻居以及你相对于其放置工具栏的任何其他邻居；在这个例子中，没有其他邻居。为了指示这些距离约束应处于活动状态，请单击连接距离框与中心小方框的三条虚线红线，使其变为实线。最后，将\
  \ `Update Frames` 更改为 `Items of New Constraints`（这样工具栏在 storyboard 中的表示就会移动到其新的约束位置），并点击\
  \ `Add 3 Constraints`。\n\n现在，为了确保你走在正确的轨道上，请点击 Run 按钮，让此应用在 iOS 模拟器中启动。你应该会看到一个纯白色的应用启动，底部有一个浅灰色工具栏，其中包含一个单独的按钮。如果没有，请返回并重新检查你的步骤，看看遗漏了什么。旋转模拟器。验证工具栏是否固定在视图底部并横跨整个屏幕。如果情况并非如此，你需要修复刚刚应用于工具栏的约束。\n\
  \n### 将工具栏按钮连接到视图控制器\n\n你可以看到工具栏有一个按钮，我们将使用该按钮在不同的内容视图之间切换。双击 storyboard 中的按钮，如图\
  \ 6-17 所示，并将其标题更改为 `Switch Views`。按下 Return 键以确认更改。现在我们可以将工具栏按钮连接到 `SwitchingViewController`\
  \ 中的操作方法。不过，在此之前，你应该知道工具栏按钮与其他 iOS 控件不同。它们只支持单个目标动作，并且仅在某个明确界定的时刻触发该动作——这相当于其他 iOS\
  \ 控件上的 touch up inside 事件。\n\n![A329781_3_En_6_Fig17_HTML.jpg](img/A329781_3_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17. 将工具栏中的按钮标题更改为 Switch Views\n\n在 Interface Builder 中选择工具栏按钮可能有些棘手。最简单的方法是，在文档大纲中展开\
  \ `Switching View Controller` 图标，直到你看到现在标记为 `Switch Views` 的按钮，然后单击它。选择好 `Switch\
  \ Views` 按钮后，按住 Control 键从该按钮拖拽到场景顶部的黄色 `Switching View Controller` 图标，如图 6-18 所示。松开鼠标，从弹出窗口中选择\
  \ `switchViewsWithSender:` 动作。如果 `switchViewsWithSender:` 动作没有出现，而是显示了一个名为 `delegate`\
  \ 的 outlet，那么你很可能是从工具栏而不是按钮进行的 Control-拖拽。要修复此问题，请确保选中了按钮而不是工具栏，然后重新进行 Control-拖拽。\n\
  \n![A329781_3_En_6_Fig18_HTML.jpg](img/A329781_3_En_6_Fig18_HTML.jpg)\n\n图 6-18.\
  \ 将工具栏按钮连接到视图控制器类中的 `switchViewsWithSender:` 方法\n\n**注意：** 你可能已经注意到，当我们之前手动输入函数时，我们称之为\
  \ `switchViews`，但由于这是一个 Action，无论我们是否决定使用该参数，系统都会自动为我们添加 `sender` 参数。\n\n在这个场景中，我们还有一点需要指出，那就是\
  \ `SwitchingViewController` 的 `view` outlet。这个 outlet 已经连接到了场景中的视图。`view` outlet\
  \ 继承自父类 `UIViewController`，使得控制器能够访问它控制的视图。当我们创建项目时，Xcode 同时创建了控制器及其视图，并为我们连接好了它们。这就是我们需要做的全部工作，所以请保存你的工作。接下来，让我们开始在\
  \ `SwitchingViewController` 中编写实现代码。\n\n\n\n### 编写根视图控制器的实现\n\n在项目导航器中，选择 `SwitchingViewController.swift`，并修改\
  \ `viewDidLoad()` 方法，通过添加清单 6-1 所示的代码行来进行一些初始化设置。\n\n```\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 视图加载后执行额外的设置\nblueViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Blue\")\nas! BlueViewController\nblueViewController.view.frame = view.frame\n\
  switchViewController(from: nil, to: blueViewController)  // 辅助方法\n}\n清单 6-1.\n根视图控制器的\
  \ viewDidLoad 方法代码\n```\n\n**注**：将清单 6-1 所示的代码输入到 Swift 文件时，包含 `switchViewController`\
  \ 调用的那一行会出现错误。这是因为我们尚未编写该辅助方法，稍后我们将完成它。\n\n我们对 `viewDidLoad()` 的实现覆写了一个 `UIViewController`\
  \ 方法，该方法在故事板加载时被调用。我们如何得知这一点？按住 ⌥ 键（Option 键）并单击名为 `viewDidLoad()` 的方法，将会出现一个文档弹出窗口，如图\
  \ 6-19 所示。此外，你也可以选择“视图”➤“工具”➤“显示快速帮助检查器”，在快速帮助面板中查看类似信息。`viewDidLoad()` 在我们的父类 `UIViewController`\
  \ 中定义，旨在供那些需要在视图加载完成时收到通知的类进行覆写。\n\n![A329781_3_En_6_Fig19_HTML.jpg](img/A329781_3_En_6_Fig19_HTML.jpg)\n\
  \n**图 6-19.** 当你在 Option 键加单击 `viewDidLoad()` 方法名时出现的文档窗口\n\n此版本的 `viewDidLoad()`\
  \ 创建了一个 `BlueViewController` 实例。我们使用 `instantiateViewController(withIdentifier:)`\
  \ 方法，从包含我们根视图控制器的同一故事板中加载 `BlueViewController` 实例。要从故事板访问特定视图控制器，我们使用一个字符串作为标识符——在本例中是\
  \ `\"Blue\"`——稍后我们在配置故事板时进行设置。创建 `BlueViewController` 后，我们将此新实例分配给我们的 `blueViewController`\
  \ 属性：\n\n```\nblueViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Blue\")\nas! BlueViewController\n```\n\n接着，我们将蓝色视图控制器的视图框架设置为与开关视图控制器的内容视图相同，并切换到蓝色视图控制器，使其视图显示在屏幕上：\n\
  \n```\nblueViewController.view.frame = view.frame\nswitchViewController(from: nil,\
  \ to: blueViewController)\n```\n\n由于我们需要在多处执行视图控制器切换，实现此功能的代码位于辅助方法 `switchViewController(from:,\
  \ to:)` 中，我们稍后将编写它。\n\n现在，为什么我们不在此处也加载黄色视图控制器？我们迟早需要加载它，那么为什么不现在就加载呢？好问题。答案是用户可能永远不会点击“切换视图”按钮。用户可能只是使用应用程序启动时可见的视图，然后退出。在这种情况下，为什么要消耗资源来加载黄色视图及其控制器？相反，我们将在首次实际需要黄色视图时才加载它。这称为懒加载，是一种降低内存开销的标准方法。黄色视图的实际加载发生在\
  \ `switchViews()` 方法中。通过添加清单 6-2 所示的代码，填充你之前创建的此方法存根。\n\n```\n@IBAction func switchViews(sender:\
  \ UIBarButtonItem) {\n// 创建新的视图控制器（如果需要）\nif yellowViewController?.view.superview\
  \ == nil {\nif yellowViewController == nil {\nyellowViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Yellow\")\nas! YellowViewController\n}\n} else if blueViewController?.view.superview\
  \ == nil {\nif blueViewController == nil {\nblueViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Blue\")\nas! BlueViewController\n}\n}\n// 切换视图控制器\nif blueViewController !=\
  \ nil\n&& blueViewController!.view.superview != nil {\nyellowViewController.view.frame\
  \ = view.frame\nswitchViewController(from: blueViewController,\nto: yellowViewController)\n\
  } else {\nblueViewController.view.frame = view.frame\nswitchViewController(from:\
  \ yellowViewController,\nto: blueViewController)\n}\n}\n清单 6-2.\n我们的 switchViews\
  \ 实现\n```\n\n`switchViews()` 首先通过检查 `yellowViewController` 的 `view` 的父视图是否为 `nil`\
  \ 来判断正在交换进来的是哪个视图。如果以下两种情况之一成立，此检查结果将为 `true`：\n\n- 如果 `yellowViewController` 存在，但其视图未显示给用户，则该视图将没有父视图，因为它当前不在视图层次结构中，因此表达式结果将为\
  \ `true`。\n- 如果 `yellowViewController` 不存在（因为它尚未创建或已从内存中清除），表达式结果也将为 `true`。\n\n\
  然后，我们检查 `yellowViewController` 是否存在：\n\n```\nif yellowViewController?.view.superview\
  \ == nil {\n```\n\n如果结果为 `nil`，意味着不存在 `yellowViewController` 实例，因此我们需要创建一个。这可能是因为按钮首次被按下，或者系统内存不足导致其被清除。在这种情况下，我们需要像在\
  \ `viewDidLoad()` 方法中为 `BlueViewController` 所做的那样，创建一个 `YellowViewController` 实例：\n\
  \n```\nif yellowViewController == nil {\nyellowViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Yellow\")\nas! YellowViewController\n}\n```\n\n如果我们要切换至蓝色控制器，我们需要执行相同的检查，看它是否仍然存在（因为它可能已从内存中清除），如果不存在则创建它。这同样是相同的代码，只是引用蓝色控制器：\n\
  \n```\n} else if blueViewController?.view.superview == nil {\nif blueViewController\
  \ == nil {\nblueViewController =\nstoryboard?.instantiateViewController(withIdentifier:\
  \ \"Blue\")\nas! BlueViewController\n}\n}\n```\n\n此时，我们知道已经有一个视图控制器实例，要么我们之前已有一个，要么我们刚刚创建了它。然后，我们将视图控制器的框架设置为与开关视图控制器的内容视图匹配，接着使用我们的\
  \ `switchViewController(from:, to:)` 方法来实际执行切换，如清单 6-3 所示。\n\n```\n// 切换视图控制器\n\
  if blueViewController != nil\n&& blueViewController!.view.superview != nil {\nyellowViewController.view.frame\
  \ = view.frame\nswitchViewController(from: blueViewController,\nto: yellowViewController)\n\
  } else {\nblueViewController.view.frame = view.frame\nswitchViewController(from:\
  \ yellowViewController,\nto: blueViewController)\n}\n}\n清单 6-3.\n根据当前呈现的视图控制器切换视图控制器\n\
  ```\n\n`if` 语句的第一个分支在我们从蓝色视图控制器切换到黄色时执行，`else` 分支则相反。\n\n除了在从未点击“切换视图”按钮时不为黄色视图和控制器消耗资源外，懒加载还使我们能够释放当前未显示的视图以释放其内存。当内存低于系统确定的水平时，iOS\
  \ 会调用每个视图控制器继承自 `UIViewController` 的 `didReceiveMemoryWarning()` 方法。\n\n\n\n既然我们知道无论是哪个视图，下次向用户展示时都会重新加载，因此只要当前没有显示，我们就可以安全地释放任何一个控制器。为此，我们可以在现有的\
  \ `didReceiveMemoryWarning()` 方法中添加几行代码，如代码清单 6-4 所示。\n\n```\noverride func didReceiveMemoryWarning()\
  \ {\nsuper.didReceiveMemoryWarning()\n// 释放任何可以重新创建的资源\nif blueViewController !=\
  \ nil\n&& blueViewController!.view.superview == nil {\nblueViewController = nil\n\
  }\nif yellowViewController != nil\n&& yellowViewController!.view.superview == nil\
  \ {\nyellowViewController = nil\n}\n}\n代码清单 6-4.\n在低内存条件下安全释放不需要的控制器\n```\n\n这段新添加的代码会检查当前向用户显示的是哪个视图，然后通过将\
  \ `nil` 赋值给其属性来释放另一个视图对应的控制器。这将导致该控制器及其所控制的视图被解除分配，从而释放其内存。\n\n**提示：** 懒加载是 iOS\
  \ 资源管理的一个关键组成部分，你应当尽可能在任何地方实现它。在一个复杂的多视图应用中，负责任地清空内存中未使用的对象，可能成为应用表现良好与因内存不足而周期性崩溃之间的分水岭。\n\
  \n最终的难题是 `switchViewController(from:, to:)` 方法，它负责视图控制器的切换。切换视图控制器分为两步：首先，需要移除当前显示的控制器的视图；然后，需要添加新视图控制器的视图。但这还没完——我们还需要做一些清理工作。请添加该方法的实现，如代码清单\
  \ 6-5 所示。\n\n```\nprivate func switchViewController(from fromVC:UIViewController?,\n\
  to toVC:UIViewController?) {\nif fromVC != nil {\nfromVC!.willMove(toParentViewController:\
  \ nil)\nfromVC!.view.removeFromSuperview()\nfromVC!.removeFromParentViewController()\n\
  }\nif toVC != nil {\nself.addChildViewController(toVC!)\nself.view.insertSubview(toVC!.view,\
  \ at: 0)\ntoVC!.didMove(toParentViewController: self)\n}\n}\n代码清单 6-5.\nswitchViewController\
  \ 辅助方法\n```\n\n第一个代码块用于移除即将退出的视图控制器；但让我们先看第二个代码块，其中添加了即将进入的视图控制器。该代码块的第一行代码如下：\n\
  \n```\nself.addChildViewController(toVC!)\n```\n\n这行代码使即将进入的视图控制器成为切换视图控制器的子控制器。像\
  \ `SwitchingViewController` 这样管理其他视图控制器的视图控制器被称为容器视图控制器。标准类 `UITabBarController`\
  \ 和 `UINavigationController` 都是容器视图控制器，它们内部有代码执行与 `switchViewController(from:, to:)`\
  \ 方法类似的操作。将新视图控制器设为 `SwitchingViewController` 的子控制器，可以确保某些传递给根视图控制器的事件在必要时正确传递给子控制器——例如，确保旋转被正确处理。\n\
  \n接下来，子视图控制器的视图被添加到 `SwitchingViewController` 的视图中：\n\n```\nself.view.insertSubview(toVC!.view,\
  \ atIndex: 0)\n```\n\n请注意，该视图以索引零插入到 `SwitchingViewController` 的子视图列表中，这告诉 iOS 将此视图置于所有其他视图之后。将视图发送到底部，可以确保我们刚才在\
  \ Interface Builder 中创建的工具栏始终显示在屏幕上，因为我们将其内容视图插入到了它的后面。\n\n最后，我们通知即将进入的视图控制器，它已被添加为另一个控制器的子控制器：\n\
  \n```\ntoVC!.didMoveToParentViewController(self)\n```\n\n这是必要的，以防子视图控制器重写此方法，以便在其成为另一个控制器的子控制器时采取某些行动。\n\
  \n既然你已经了解了如何添加视图控制器，那么移除视图控制器从其父控制器的代码就更容易理解了——我们只需反转添加时所执行的每一步操作：\n\n```\nif fromVC\
  \ != nil {\nfromVC!.willMoveToParentViewController(nil)\nfromVC!.view.removeFromSuperview()\n\
  fromVC!.removeFromParentViewController()\n}\n```\n\n### 实现内容视图\n\n至此，代码已经完成，但我们还不能运行应用，因为故事板中还没有蓝色和黄色的内容控制器。这两个控制器非常简单，它们各自有一个由按钮触发的动作方法，并且都不需要任何输出口。这两个视图也几乎相同。事实上，它们非常相似，以至于本可以由同一个类来表示。我们选择将它们做成两个独立的类，因为大多数多视图应用都是这样构建的。\n\
  \n我们要实现的两个动作方法除了显示一个提醒框之外不做任何其他事情（就像我们在第 4 章的“Control Fun”应用中所做的那样），因此请继续向 `BlueViewController.swift`\
  \ 添加代码清单 6-6 中的方法。\n\n```\n@IBAction func blueButtonPressed(sender: UIButton) {\n\
  let alert = UIAlertController(title: \"蓝色视图按钮被按下\",\nmessage: \"你按下了蓝色视图上的按钮\",\n\
  preferredStyle: .alert)\nlet action = UIAlertAction(title: \"是的，我按了\", style: .default,\n\
  handler: nil)\nalert.addAction(action)\npresent(alert, animated: true, completion:\
  \ nil)\n}\n代码清单 6-6.\n按下蓝色控制器上的按钮将显示一个提醒框\n```\n\n保存文件。接下来，切换到 `YellowViewController.swift`，将代码清单\
  \ 6-7 中这个非常相似的方法添加到该文件，并同样保存。\n\n```\n@IBAction func yellowButtonPressed(sender:\
  \ UIButton) {\nlet alert = UIAlertController(title: \"黄色视图按钮被按下\",\nmessage: \"\
  你按下了黄色视图上的按钮\",\npreferredStyle: .alert)\nlet action = UIAlertAction(title: \"是的，我按了\"\
  , style: .default,\nhandler: nil)\nalert.addAction(action)\npresent(alert, animated:\
  \ true, completion: nil)\n}\n代码清单 6-7.\n按下黄色控制器上的按钮也会显示一个提醒框\n```\n\n接下来，选择 `Main.storyboard`\
  \ 在 Interface Builder 中将其打开，以便我们做一些修改。首先，我们需要为 `BlueViewController` 添加一个新的场景。到目前为止，我们处理的每个故事板都只包含一个控制器-视图配对，但故事板还有更多技巧，其中就包括容纳多个场景。从对象库中，拖出另一个视图控制器并将其放到现有控制器旁边的编辑区域。现在，你的故事板中有两个场景，每个场景都可以在应用运行时动态独立加载。在新场景顶部的一排图标中，单击黄色的视图控制器图标，然后按下\
  \ `⌥⌘3` 打开身份检查器。在自定义类部分，类菜单默认为 `UIViewController`；将其改为 `BlueViewController`，如图 6-20\
  \ 所示。\n\n![A329781_3_En_6_Fig20_HTML.jpg](img/A329781_3_En_6_Fig20_HTML.jpg)\n\n\
  **图 6-20.** 添加我们的新视图控制器并将其与 `BlueViewController` 类文件关联\n\n我们还需要为这个新视图控制器创建一个标识符，以便我们的代码能在故事板中找到它。在身份检查器中自定义类部分的正下方，你会看到一个故事板\
  \ ID 字段。点击该字段并输入 `Blue`，以匹配我们在代码中使用的值，如图 6-21 所示。\n\n![A329781_3_En_6_Fig21_HTML.jpg](img/A329781_3_En_6_Fig21_HTML.jpg)\n\
  \n**图 6-21.** 将蓝色视图控制器故事板的故事板 ID 设置为 `Blue`\n\n\n\n现在你拥有了两个场景。我们之前演示过如何配置应用在启动时加载这个故事板，但当时并未提及场景相关的内容。应用将如何决定显示这两个视图中的哪一个呢？答案在于指向第一个场景的大箭头，如图\
  \ 6-22 所示。这个箭头指向了故事板的默认场景，也就是应用启动时显示的界面。如果你想选择不同的默认场景，只需拖动箭头指向你想要的场景即可。\n\n![A329781_3_En_6_Fig22_HTML.jpg](img/A329781_3_En_6_Fig22_HTML.jpg)\n\
  \n图 6-22. 我们刚刚向故事板添加了第二个场景。大箭头指向默认场景\n\n在刚添加的新场景中，单击大正方形视图，然后按下 `⌥⌘4` 调出属性检查器。在检查器的视图部分，单击标注为“Background”的颜色选择器，使用弹出的颜色选择器将此视图的背景色更改为漂亮的蓝色调。对蓝色满意后，关闭颜色选择器。\n\
  \n从库中拖出一个按钮到视图上，使用参考线将其在视图内水平和垂直居中。我们希望确保按钮无论如何都能保持居中，因此为此添加两个约束。选中按钮后，单击 Storyboard\
  \ 下方的“Align”图标。在弹出窗口中，勾选“Horizontally in Container”和“Vertically in Container”，将“Update\
  \ Frames”改为“Items of New Constraints”，然后单击“Add 2 Constraints”（见图 6-23）。为了方便对齐，可能更适合将背景临时改回白色，完成后再改回蓝色。另外，由于蓝色背景，你可能想将按钮文本改为白色以更加醒目。\n\
  \n![A329781_3_En_6_Fig23_HTML.jpg](img/A329781_3_En_6_Fig23_HTML.jpg)\n\n图 6-23.\
  \ 将按钮对齐到视图中心\n\n双击按钮，将其标题改为“Press Me”。接下来，在按钮仍被选中的状态下，切换到连接检查器（按 `⌥⌘6`），从“Touch\
  \ Up Inside”事件拖拽到场景顶部的黄色“View Controller”图标，并连接到 `blueButtonPressedWithSender` 操作方法。\n\
  \n现在，轮到对 `YellowViewController` 执行几乎相同的操作集。从对象库中再拖出一个“View Controller”，放入编辑区域。不用担心场面变得拥挤；必要时你可以将这些场景堆叠在一起。在文档大纲中单击新场景的“View\
  \ Controller”图标，使用身份检查器将其类更改为 `YellowViewController`，并将 Storyboard ID 更改为“Yellow”。\n\
  \n接下来，选择 `YellowViewController` 的视图，切换到属性检查器。在那里，单击“Background”颜色选择器，选择黄色，然后关闭选择器。\n\
  \n接着，从库中拖出一个“Button”，使用参考线使其在视图中居中。使用“Align”图标弹出窗口创建约束，使其水平和垂直居中，就像上一个按钮一样。现在将其标题改为“Press\
  \ Me, Too”。在按钮仍被选中的状态下，使用连接检查器从“Touch Up Inside”事件拖拽到“View Controller”图标，并连接到 `yellowButtonPressedWithSender`\
  \ 操作方法。\n\n完成后，保存故事板，然后点击 Xcode 中的“Run”按钮启动应用，此时会显示全屏的蓝色视图。当你点击“Switch Views”按钮时，它会切换显示我们构建的黄色视图。再次点击它，则返回蓝色视图。如果你点击居中于蓝色或黄色视图上的按钮，将会出现一个带有消息的警告视图，指示哪个按钮被按下。这个警告表明，针对当前显示的视图，正确的控制器类已被调用。\n\
  \n两个视图之间的切换显得有些突兀，因此我们将为过渡添加动画效果，以给用户更好的视觉变化反馈。\n\n\n\n## 动画过渡\n\n`UIView` 提供了多个类方法，我们可以调用这些方法来指示视图之间的过渡应带有动画效果、指定应使用的过渡类型，以及设置过渡所需时长。\n\
  \n回到 `SwitchingViewController.swift` 文件中，修改 `switchViews()` 方法，如代码清单 6-8 所示。\n\n\
  ```\n@IBAction func switchViews(sender: UIBarButtonItem) {\n    // 如果需要，创建新的视图控制器\n\
  \    if yellowViewController?.view.superview == nil {\n        if yellowViewController\
  \ == nil {\n            yellowViewController =\n                storyboard?.instantiateViewController(withIdentifier:\
  \ \"Yellow\")\n                    as! YellowViewController\n        }\n    } else\
  \ if blueViewController?.view.superview == nil {\n        if blueViewController\
  \ == nil {\n            blueViewController =\n                storyboard?.instantiateViewController(withIdentifier:\
  \ \"Blue\")\n                    as! BlueViewController\n        }\n    }\n    UIView.beginAnimations(\"\
  View Flip\", context: nil)\n    UIView.setAnimationDuration(0.4)\n    UIView.setAnimationCurve(.easeInOut)\n\
  \    // 切换视图控制器\n    if blueViewController != nil\n        && blueViewController!.view.superview\
  \ != nil {\n        UIView.setAnimationTransition(.flipFromRight,\n            \
  \                          for: view, cache: true)\n        yellowViewController.view.frame\
  \ = view.frame\n        switchViewController(from: blueViewController,\n       \
  \                      to: yellowViewController)\n    } else {\n        UIView.setAnimationTransition(.flipFromLeft,\n\
  \                                      for: view, cache: true)\n        blueViewController.view.frame\
  \ = view.frame\n        switchViewController(from: yellowViewController,\n     \
  \                        to: blueViewController)\n    }\n    UIView.commitAnimations()\n\
  }\n```\n\n构建并运行此版本。当你点击 Switch Views 按钮时，旧视图将翻转以显示新视图，而不是直接切换显示。\n\n要告知 iOS 我们需要动画过渡，必须声明一个动画块并指定动画时长。动画块通过\
  \ `UIView` 的类方法 `presentViewController(_:animated:completion:)` 来声明，如下所示：\n\n```\n\
  UIView.beginAnimations(\"View Flip\", context: nil)\nUIView.setAnimationDuration(0.4)\n\
  ```\n\n`presentViewController(_:animated:completion:)` 接受两个参数。第一个是动画块标题。只有当你更直接地利用\
  \ Core Animation（此动画背后的框架）时，这个标题才会发挥作用。对于我们的目的，也可以使用 `nil`。第二个参数是一个指针，用于指定一个对象（或任何其他\
  \ C 数据类型），其地址将与这个动画块关联。我们可以在过渡期间添加一些自己的代码来运行，但这里不需要，因此我们将此参数设为 `nil`。我们还设置了动画的持续时间，这将告诉\
  \ `UIView` 动画应持续多长时间（以秒为单位）。\n\n之后，我们设置动画曲线，它决定了动画的时间节奏。默认的线性曲线会导致动画以恒定速度进行。我们在此设置的选项\
  \ `UIViewAnimationCurve.EaseInOut` 指定动画应开始缓慢，中间加速，最后再减速。这使动画看起来更自然，更少机械感：\n\n```\n\
  UIView.setAnimationCurve(.easeInOut)\n```\n\n接下来，我们需要指定要使用的过渡。目前，有五种 iOS 视图过渡可供使用：\n\
  \n*   `UIViewAnimationTransition.flipFromLeft`\n*   `UIViewAnimationTransition.flipFromRight`\n\
  *   `UIViewAnimationTransition.curlUp`\n*   `UIViewAnimationTransition.curlDown`\n\
  *   `UIViewAnimationTransition.none`\n\n根据切换的是哪个视图，我们选择了两种不同的效果。对一个过渡使用左翻转，对另一个过渡使用右翻转，可以使视图看起来来回翻转。值\
  \ `UIViewAnimationTransition.none` 会导致从一个视图控制器到另一个视图控制器的突然过渡。当然，如果你想要这种效果，就根本不需要费心创建动画块了。\n\
  \n缓存选项通过在动画开始时获取视图的快照来加速绘制，并使用该图像而不是在动画的每一步都重新绘制视图。除非视图的外观需要在动画过程中改变，否则应始终缓存动画：\n\
  \n```\nUIView.setAnimationTransition(.flipFromRight,\n                         \
  \     forView: view, cache: true)\n```\n\n当我们完成动画更改的指定后，在 `UIView` 上调用 `commitAnimations()`。从动画块开始到调用\
  \ `commitAnimations()` 之间的所有内容都将一起进行动画处理。\n\n得益于 Cocoa Touch 在底层对 Core Animation\
  \ 的使用，我们只需少量代码就能实现相当复杂的动画。\n\n## 小结\n\n现在，既然你已从零构建了一个多视图应用，你应该对多视图应用的组织方式有了很好的理解。虽然\
  \ Xcode 包含了最常见类型的多视图应用的项目模板，但我们需要理解这些类型应用的总体结构，以便能够自行从头构建它们。标准容器控制器（`UITabBarController`、`UINavigationController`\
  \ 和 `UIPageViewController`）是非常节省时间的工具，你应尽可能使用，但有时它们无法满足你的需求。\n\n在接下来的几章中，我们将继续构建多视图应用，以强化本章的概念，并让你感受更复杂的应用是如何构建的。在第\
  \ 7 章中，我们将构建一个标签栏应用。\n\n"
- "# 使用标签栏和选择器\n\n在上一章中，你构建了第一个多视图应用。在本章中，我们将构建另一个——这次创建一个完整的标签栏应用，包含五个不同的标签和五个不同的内容视图。构建此应用将强化我们在第\
  \ 6 章中涵盖的许多内容。我们将使用这五个内容视图来演示一种尚未涵盖的 iOS 控件类型：选择器视图，或简称为选择器。你可能对这个名称不熟悉，但如果你拥有 iPhone\
  \ 或 iPod touch 超过 10 分钟，几乎肯定使用过选择器。选择器包含带有可旋转拨盘的控件。你可以在日历应用中输入日期，或在时钟应用中设置计时器时使用它们，如图\
  \ 7-1 所示。在 iPad 上它并不那么常见，因为更大的显示屏允许你提供其他选择多个项目的方式，但即使在 iPad 上，日历应用也使用了它。\n\n![A329781_3_En_7_Fig1_HTML.jpg](img/A329781_3_En_7_Fig1_HTML.jpg)\n\
  \n选择器比我们目前看到的 iOS 控件稍微复杂一些；因此，它们值得更多关注。选择器可以配置为显示一个或多个拨盘。默认情况下，选择器显示文本列表，但它们也可以显示图像。\n\
  \n\n\n## 选择器应用\n\n本章的应用`Pickers`包含一个标签栏。在构建`Pickers`的过程中，你将修改默认的标签栏，使其拥有五个标签项，为每个标签项添加图标，然后创建一系列内容视图并将每个视图连接到一个标签。该应用的内容视图展示了五种不同的选择器：\n\
  \n*   **带图像的自定义选择器**：在第五个内容视图中，我将演示如何向选择器添加图像数据，我们将通过编写一个小游戏来实现，该游戏使用一个包含五个组件的选择器。Apple\
  \ 的文档将选择器的外观描述为有点像老虎机。因此，我们将创建一个老虎机，如图 7-6 所示。对于这个选择器，用户无法手动更改组件的值，但可以点击`Spin`按钮，使五个滚轮旋转到新的、随机选择的值。如果连续出现三个相同的图像，用户就获胜。\n\
  \n    ![A329781_3_En_7_Fig6_HTML.jpg](img/A329781_3_En_7_Fig6_HTML.jpg)\n\n    图\
  \ 7-6.  \n    我们的第五个组件选择器将选择器用作老虎机\n\n*   **带依赖组件的选择器**：在第四个内容视图中，我们将构建另一个包含两个组件的选择器。但这一次，右侧组件中显示的值会根据左侧组件中选择的值而变化。在我们的示例中，我们将在左侧组件中显示一个州列表，在右侧组件中显示该州的邮政编码列表，如图\
  \ 7-5 所示。\n\n    ![A329781_3_En_7_Fig5_HTML.jpg](img/A329781_3_En_7_Fig5_HTML.jpg)\n\
  \n    图 7-5.  \n    在此选择器中，一个组件依赖于另一个组件。当你在左侧组件中选择一个州时，右侧组件会变为该州的邮政编码列表\n\n*   **多组件选择器**：在第三个标签中，我们将创建一个包含两个独立滚轮的选择器。技术术语是选择器组件。这里，我们创建一个包含两个组件的选择器。你将看到如何通过向选择器提供两个独立的列表数据来使用数据源和代理（参见图\
  \ 7-4），每个列表都可以更改而不会影响另一个。\n\n    ![A329781_3_En_7_Fig4_HTML.jpg](img/A329781_3_En_7_Fig4_HTML.jpg)\n\
  \n    图 7-4.  \n    一个双组件选择器，显示反映我们选择的提示\n\n*   **单组件选择器**：第二个标签包含一个具有单列值的选择器，如图\
  \ 7-3 所示，其实现比日期选择器稍微复杂一些。你将学习如何通过使用代理和数据源来指定要在选择器中显示的值。\n\n    ![A329781_3_En_7_Fig3_HTML.jpg](img/A329781_3_En_7_Fig3_HTML.jpg)\n\
  \n    图 7-3.  \n    显示单列值的选择器\n\n*   **日期选择器**：我们将构建的第一个内容视图使用日期选择器，这是最容易实现的选择器类型（参见图\
  \ 7-2）。该视图还有一个按钮，点击它会显示一个提示，显示所选日期。\n\n    ![A329781_3_En_7_Fig2_HTML.jpg](img/A329781_3_En_7_Fig2_HTML.jpg)\n\
  \n    图 7-2.  \n    第一个标签显示一个日期选择器\n\n### 代理和数据源\n\n在开始构建应用之前，让我们看看是什么让选择器比我们目前使用的其他控件更复杂。除了日期选择器之外，你不能仅仅从对象库中抓取一个选择器，将其拖放到内容视图上并进行配置来使用它。你还需要为每个选择器提供代理和数据源。\n\
  \n我们已经使用过应用代理，其基本思想对于选择器来说是一样的。控件本身将几个任务委托给它的代理，其中最重要的是确定每个组件的每一行实际绘制什么。选择器会向代理请求一个字符串或一个视图，该视图将绘制在给定组件的指定位置上。选择器从代理那里获取数据。\n\
  \n除了代理之外，选择器还必须有一个数据源。数据源告诉选择器它将处理多少个组件，以及每个组件由多少行组成。数据源的工作方式与代理类似，其方法会在某些预定的时间被调用。没有数据源和代理，选择器就无法工作；事实上，它们甚至不会被绘制出来。\n\
  \n数据源和代理通常是同一个对象，并且存在于同一个实际的 Swift 文件中，通常是选择器所在视图的视图控制器。我们在本应用中采用了这种方法：我们应用中每个内容面板的视图控制器都将作为其选择器的数据源和代理。\n\
  \n**注意**\n\n经常出现的一个问题是，选择器数据源属于应用程序的模型、视图还是控制器部分？数据源听起来像是模型的一部分，但它实际上是控制器的一部分。数据源通常不是一个设计用来保存数据的对象。在简单的应用程序中，数据源可能持有数据，但其真正的工作是从模型中检索数据并将其传递给选择器。\n\
  \n## 创建选择器应用\n\n尽管 Xcode 为标签栏应用提供了模板，但我们将从头开始构建它。这不会增加太多额外工作，而且是很好的练习。\n\n创建一个新项目，再次选择`Single\
  \ View Application`模板，然后选择`Next`进入下一个屏幕。在`Product Name`字段中，输入`Pickers`。确保`Use Core\
  \ Data`复选框未被选中，并将`Language`设置为`Swift`，`Devices`弹出菜单设置为`Universal`。然后再次选择`Next`。Xcode\
  \ 会让你选择保存项目的文件夹。\n\n我们将引导你完成构建整个应用的过程；但在任何步骤中，如果你觉得自己可以挑战一下，提前推进，请尽管去做。如果你遇到困难，随时可以回来查看。\n\
  \n\n\n### 创建视图控制器\n\n在上一章中，我们创建了一个根视图控制器（简称“根控制器”）来管理应用其他视图的切换过程。这次我们将再次这样做，但无需创建自己的根视图控制器类。苹果提供了一个非常优秀的类来管理标签栏视图，因此我们只需使用\
  \ `UITabBarController` 的一个实例作为根控制器。首先，我们需要在 Xcode 中创建五个新类：根控制器将用来切换的五个视图控制器。展开项目导航器中的\
  \ `Pickers` 文件夹，你会看到 Xcode 为启动项目而创建的源代码文件。单击 `Pickers` 文件夹，然后按下 `⌘N` 或选择 **文件 ➤\
  \ 新建 ➤ 文件…**。\n\n选择 **iOS**，然后在新建文件助手左侧面板中选择 **Source**。接着，选择 **Cocoa Touch Class**\
  \ 图标，点击 **下一步** 继续。下一个屏幕允许你为新类命名。在“Class”字段中输入 `DatePickerViewController`。确保“Subclass\
  \ of”字段包含 `UIViewController`。确保 **同时创建 XIB 文件** 复选框未被选中，将语言设置为 **Swift**，然后点击 **下一步**。\n\
  \n系统会显示一个文件夹选择窗口，让你选择类文件的保存位置。选择 `Pickers` 目录，该目录已包含 `AppDelegate` 类及其他几个文件。同时确保“Group”弹出菜单中已选中\
  \ `Pickers` 文件夹，并且“Pickers”的目标复选框已被勾选。点击 **创建** 按钮后，`DatePickerViewcontroller.swift`\
  \ 文件将出现在 `Pickers` 文件夹中。\n\n重复以上步骤四次，分别使用名称 `SingleComponentPickerViewController`、`DoubleComponentPickerViewController`、`DependentComponentPickerViewController`\
  \ 和 `CustomPickerViewController`。完成所有这些操作后，`Pickers` 文件夹应包含所有视图控制器类文件，如图 7-7 所示。\n\
  \n![A329781_3_En_7_Fig7_HTML.jpg](img/A329781_3_En_7_Fig7_HTML.jpg)\n\n**图 7-7.**\
  \  \n创建五个视图控制器类后，项目导航器中应包含所有这些文件\n\n### 创建标签栏控制器\n\n现在，让我们创建标签栏控制器。项目模板已经包含一个名为\
  \ `ViewController` 的视图控制器，它是 `UIViewController` 的子类。要将其转换为标签栏控制器，我们只需更改其基类。打开 `ViewController.swift`\
  \ 并进行以下加粗显示的更改：\n\n```swift\nclass ViewController: UITabBarController {\n```\n\n\
  接下来，要在情节提要中设置标签栏控制器，请打开 `Main.storyboard`。模板添加了一个初始视图控制器，我们将替换它，因此在文档大纲或编辑区域中选中它，然后按\
  \ **Delete** 键将其删除。在对象库中，找到 **Tab Bar Controller** 并将其拖到编辑区域（见图 7-8）。\n\n![A329781_3_En_7_Fig8_HTML.jpg](img/A329781_3_En_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.**  \n将标签栏控制器从库中拖到画布上\n\n拖拽时，你会发现与之前要求你从对象库中拖出的其他控制器不同，这个控制器会一次性拉出三个完整的视图控制器对，它们之间都用曲线相互连接。这实际上不仅仅是一个标签栏控制器，它还包含了两个已经连接好并可直接使用的子控制器。\n\
  \n当你将标签栏控制器放到编辑区域后，情节提要中会添加三个新场景。如果展开左侧的文档视图，你将看到情节提要中所有场景的清晰概览（见图 7-8）。你还会看到连接标签栏控制器及其每个子控制器的曲线仍然存在。如果你移动场景，这些曲线会自动调整以保持连接，你可以随时自由移动。每个场景在情节提要中的屏幕位置不会影响应用运行时的外观。\n\
  \n这个标签栏控制器将成为我们的根控制器。提醒一下，根控制器控制着程序运行时用户首先看到的视图，并负责切换其他视图。由于我们将每个视图连接到标签栏中的一个标签，因此标签栏控制器作为根控制器是合乎逻辑的选择。我们需要告诉\
  \ iOS，当应用程序启动时，它应该从 `Main.storyboard` 中加载标签栏控制器。为此，在文档大纲中选择 **Tab Bar Controller**\
  \ 图标，打开属性检查器；然后在“视图控制器”部分，勾选 **Is Initial View Controller** 复选框。在视图控制器仍处于选中状态时，切换到标识检查器，并将类更改为\
  \ `ViewController`。\n\n标签栏可以使用图标来表示每个标签，因此我们应在编辑情节提要之前添加将要使用的图标。你可以在本书源代码归档的 `07\
  \ - ImageSets` 文件夹中找到一些合适的图标。`07 - ImageSets` 的每个子文件夹都包含三个图像（一个用于标准显示屏设备，两个用于 Retina\
  \ 设备）。在 Xcode 项目导航器中，选择 `Assets.xcassets`，然后将 `07 - ImageSets` 文件夹中的每个子文件夹拖到编辑区域左侧列中\
  \ `AppIcon` 的下方，将它们全部复制到项目中（见图 7-9）。\n\n![A329781_3_En_7_Fig9_HTML.jpg](img/A329781_3_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9.**  \n在 Xcode 中将图像拖到 `Assets.xcassets` 中的 `AppIcon` 下方\n\n如果你想自己制作图标，可以参考以下创建指南。使用的图标应为\
  \ 24 × 24 像素，并保存为 `.png` 格式。图标文件应具有透明背景。无需费心为图标着色以匹配标签栏的外观。与处理应用程序图标一样，iOS 会自动处理你的图像，使其看起来恰到好处。\n\
  \n\n\n24 × 24 像素的图像尺寸实际上适用于标准显示屏；对于 iPhone 4 及更高版本的 Retina 显示屏以及新款 iPad，你需要提供双倍尺寸的图像，否则图像会显得像素化。对于\
  \ iPhone 6/6s Plus，你需要提供原始尺寸三倍的图像。这非常简单：对于任意图像 `foo.png`，你还应提供名为 `foo@2x.png` 的双倍尺寸图像，以及名为\
  \ `foo@3x.png` 的三倍尺寸图像。调用 `UIImage(named:\"foo\")` 将自动返回适合当前设备的标准尺寸或双倍尺寸图像。\n\n\
  回到故事板中，你可以看到每个子视图控制器顶部显示类似“Item 1”的名称，并且在视图底部有一个单独的栏项目，其标签与标签栏中的内容匹配。我们最好从一开始就为这两个控制器设置正确的名称，因此选中\
  \ Item 1 视图控制器，然后在文档大纲中点击标记为 Item 1 的标签栏项目。打开属性检查器，你会看到一个用于设置栏项目标题的文本字段，当前包含文本 Item\
  \ 1。将该文本替换为 `Date`，然后按下 Enter 键。这会立即更改此视图控制器底部栏项目的文本，以及标签栏控制器中对应的标签栏项目。当你仍在检查器中时，点击图像弹出菜单并选择\
  \ `clockicon` 来设置图标。现在，对第二个子视图控制器重复相同的步骤，但将其命名为 `Single`，并为其栏项目使用 `singleicon` 图像。\n\
  \n下一步是完善我们的标签栏控制器，使其包含图 7-2 所示的五个标签。这五个标签中的每一个都将包含我们的一个选择器。我们要实现的方法是，除了与标签栏控制器一起添加的两个视图控制器外，再向故事板中添加三个视图控制器，然后将它们全部连接起来，以便标签栏控制器能够激活它们。首先，从对象库拖出一个普通的视图控制器，放到故事板上。接下来，按住\
  \ Control 键从标签栏控制器拖拽到新的视图控制器，松开鼠标按钮，然后从弹出的小窗口中的“关系转场”部分选择 `view controllers`。这告诉标签栏控制器它有了一个新的子控制器需要管理，因此标签栏会立即获得一个新项目。与之前其他控制器一样，你的新视图控制器会在其视图底部和文档大纲中获得一个栏项目。现在，按照之前概述的相同步骤，将这个最新视图控制器的栏项目命名为\
  \ `Double`，并使用 `doubleicon` 作为其图像。\n\n再拖出两个视图控制器，并按照前面所述的方式将它们连接到标签栏控制器。依次选中每个视图控制器的栏项目，将其中一个命名为\
  \ `Dependent`，并使用 `dependenticon` 作为其图像，将另一个命名为 `Custom`，并使用 `toolicon` 作为其图像。完成后，你应该有一个底部带有标签栏的视图控制器，以及五个已连接的视图控制器，如图\
  \ 7-10 所示。\n\n![A329781_3_En_7_Fig10_HTML.jpg](img/A329781_3_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10. 添加我们将通过根视图控制器中的标签栏访问的五个视图控制器\n\n现在，所有视图控制器都已就位，是时候从我们之前创建的集合中为每个视图控制器设置正确的控制器类了。这将使我们能够为每个控制器实现不同的功能。在文档大纲中，选中标记为\
  \ `Date` 的视图控制器，然后打开身份检查器。在检查器的“自定义类”部分，将类更改为 `DatePickerViewController`，然后按 Return\
  \ 或 Tab 键完成（参见图 7-11）。\n\n![A329781_3_En_7_Fig11_HTML.jpg](img/A329781_3_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11. 将我们的日期视图连接到其视图控制器\n\n对其余四个视图控制器重复相同的过程，顺序按照它们在标签栏控制器底部出现的顺序。你可以通过点击故事板中的每个视图控制器来依次选中它，确保点击控制器顶部包含控制器名称的栏。在每个视图控制器的身份检查器中，分别使用类名\
  \ `SingleComponentPickerViewController`、`DoubleComponentPickerViewController`、`DependentComponentPickerViewController`\
  \ 和 `CustomPickerViewController`。在进行下一项 GUI 编辑之前，请保存你的故事板文件。\n\n## 初始模拟器测试\n\n此时，标签栏和内容视图应该都已连接并正常工作。编译并运行，你的应用程序应该会启动一个功能正常的标签栏，如图\
  \ 7-12 所示。依次点击每个标签，每个标签都应该是可选的。\n\n![A329781_3_En_7_Fig12a_HTML.jpg](img/A329781_3_En_7_Fig12a_HTML.jpg)![A329781_3_En_7_Fig12b_HTML.jpg](img/A329781_3_En_7_Fig12b_HTML.jpg)\n\
  \n图 7-12. 包含五个空但可选的标签的应用程序\n\n现在内容视图中没有任何内容，所以变化不会很明显。实际上，除了高亮的标签栏项目外，你不会看到任何区别。但如果一切顺利，你的多视图应用程序的基本框架现在就已经建立并可以工作了。我们可以开始设计各个内容视图了。\n\
  \n**提示：** 如果点击某个标签时模拟器崩溃，很可能是你漏掉了某个步骤或出现了拼写错误。返回并确保连接正确，类名也都设置正确。\n\n如果你想加倍确认一切正常，可以在每个内容视图中添加不同的标签或其他对象，然后重新启动应用程序。在这种情况下，你应该会在选择不同标签时看到不同视图的内容发生变化。\n\
  \n\n\n### 实现日期选择器\n\n要实现日期选择器，我们需要一个输出口（outlet）和一个操作（action）。输出口用于获取日期选择器中的值，操作则由按钮触发，并弹出一个警告框来显示从选择器中获取的日期值。我们将在编辑\
  \ `Main.storyboard` 文件时，通过 Interface Builder 添加这两项。因此，如果该文件尚未显示在前台，请在项目导航器中选择它。\n\
  \n首先，我们需要在对象库中找到日期选择器（Date Picker），并将其拖拽到编辑区域的日期场景（Date Scene）中。点击文档大纲中的日期图标，将正确的视图控制器调至前台，然后从对象库中拖出日期选择器，将其放置在视图顶部，紧贴显示区域的上边缘。它覆盖状态栏是没问题的，因为此控件顶部内置了充足的垂直内边距，没有人会注意到。\n\
  \n现在，我们需要应用自动布局约束，以确保日期选择器在任何类型的设备上运行时，都能正确调整大小并处于合适位置。我们希望选择器在水平方向上居中，并锚定在视图顶部。同时，我们希望其大小基于内容自适应，因此需要添加三个约束。选中日期选择器后，首先在\
  \ Xcode 菜单栏中选择 **Editor ➤ Size to Fit Content**。如果该选项不可用，请轻微移动选择器后重试。接下来，点击故事板下方的\
  \ **Align** 按钮，勾选 **Horizontally in Container** 复选框，然后点击 **Add 1 Constraint**。点击\
  \ **Pin** 按钮（位于 **Align** 按钮旁边）。在弹出的提示框中，使用顶部的四个距离框，将选择器与上方视图边缘的距离设为零：在顶部输入框中输入\
  \ 0，使其下方的线条变为实线。在弹出框底部，将 **Update Frames** 设置为 **Items of New Constraints**，然后点击\
  \ **Add 1 Constraint**。日期选择器将调整大小并移动到正确位置，如图 7-13 所示。\n\n![A329781_3_En_7_Fig13_HTML.jpg](img/A329781_3_En_7_Fig13_HTML.jpg)\n\
  \n**图 7-13.** 日期选择器，已定位在其视图控制器视图的顶部\n\n如果尚未选中，请单击日期选择器，然后返回属性检查器。如图 7-14 所示，可以为日期选择器配置多个属性。我们将保持大部分值为默认值（但完成后可以随意尝试其他选项，看看它们的效果）。我们要做的唯一一件事是限制选择器的日期范围为合理的日期。找到标题为\
  \ **Constraints** 的部分，并勾选 **Minimum Date** 复选框。将其值保持为默认的 `1/1/1970`。同时勾选 **Maximum\
  \ Date** 复选框，并将该值设置为 `12/31/2200`。\n\n![A329781_3_En_7_Fig14_HTML.jpg](img/A329781_3_En_7_Fig14_HTML.jpg)\n\
  \n**图 7-14.** 日期选择器的属性检查器。设置最大日期，其余设置保持默认值\n\n现在，让我们将这个选择器连接到它的控制器。按下 **⌥⌘Enter**\
  \ 打开助理编辑器，并确保助理编辑器顶部的跳转栏设置为 **Automatic**。这样做应该会使 `DatePickerViewController.swift`\
  \ 显示在那里。接下来，**按住 Control 键拖拽** 从选择器到类声明和 `viewDidLoad()` 方法之间的空行，当出现 **Insert Outlet,\
  \ Action, or Outlet Collection** 提示时松开鼠标按钮。在松开后出现的弹出窗口中，确保 **Connection** 设置为 **Outlet**，在\
  \ **Name** 中输入 `datePicker`，然后按 **Enter** 创建输出口并将其连接到选择器。\n\n接下来，从库中获取一个按钮（Button），并将其放置在日期选择器下方一小段距离处。双击按钮，将其标题设置为\
  \ **选择**。我们希望此按钮水平居中，并与日期选择器保持固定的垂直距离。选中按钮后，点击故事板底部的 **Align** 按钮，勾选 **Horizontally\
  \ in Container** 复选框，然后点击 **Add 1 Constraint**。为了固定它们之间的距离，**按住 Control 键拖拽** 从按钮到日期选择器，然后松开鼠标。在出现的弹出窗口中，选择\
  \ **Vertical Spacing**。最后，点击故事板底部的 **Resolve Auto Layout Issues** 按钮，然后在弹出窗口的顶部区域点击\
  \ **Update Frames**（如果此选项不可用，则表示按钮已位于正确位置）。按钮应移动到正确位置，并且不再有任何自动布局警告。\n\n确保助理编辑器中仍然显示\
  \ `DatePickerViewController.swift`；如果没有显示，请使用跳转栏中的 **Manual** 选项定位并打开它。现在，**按住 Control\
  \ 键拖拽** 从按钮到助理视图中类末尾闭合花括号上方的行，直到看到 **Insert Outlet, Action, or Outlet Collection**\
  \ 提示出现。将 **Connection** 类型更改为 **Action**，将新操作命名为 `onButtonPressed`，然后按 **Enter**\
  \ 连接它。这样做会创建一个名为 `onButtonPressed()` 的空方法，您需要用代码清单 7-1 中的代码补全它。\n\n```\n@IBAction\
  \ func onButtonPressed(_ sender: UIButton) {\n    let date = datePicker.date\n \
  \   let message = \"您选择的日期和时间是 \\(date)\"\n    let alert = UIAlertController(\n\
  \        title: \"已选择的日期和时间\",\n        message: message,\n        preferredStyle:\
  \ .alert)\n    let action = UIAlertAction(\n        title: \"完全正确！\",\n        style:\
  \ .default,\n        handler: nil)\n    alert.addAction(action)\n    present(alert,\
  \ animated: true, completion: nil)\n}\n```\n\n**代码清单 7-1.** 我们的“选择”按钮操作代码\n\n在 `viewDidLoad()`\
  \ 方法中，我们创建一个新的 `NSDate` 对象。以这种方式创建的 `NSDate` 对象将保存当前日期和时间。然后，我们将 `datePicker` 设置为该日期，这确保了每次从故事板加载此视图时，选择器都会重置为当前日期和时间，参见代码清单\
  \ 7-2。\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 加载视图后执行任何其他设置。\n\
  \    let date = NSDate()\n    datePicker.setDate(date as Date, animated: false)\n\
  }\n```\n\n**代码清单 7-2.** 在 `viewDidLoad()` 方法中设置日期\n\n仅此而已。继续构建并运行，以确保日期选择器正常工作。如果一切顺利，您的应用程序在执行时应如图\
  \ 7-2 所示。如果您点击 **选择** 按钮，将弹出一个警告框，显示日期选择器中当前选定的日期和时间。\n\n> **注意：** 日期选择器不允许您指定秒数或时区。警告框会以格林威治标准时间（GMT）并包含秒数的形式显示时间。我们本可以添加一些代码来简化警告框中显示的字符串，但本章内容还不够长吗？如果您对自定义日期格式感兴趣，可以查看\
  \ `NSDateFormatter` 类。\n\n\n\n## 实现单组件选择器\n\n接下来这个选择器允许用户从值列表中进行选择。在本示例中，我们将使用一个数组来存储希望在选择器中显示的值。选择器本身并不持有任何数据，而是通过调用其数据源和委托的方法来获取需要显示的数据。选择器并不关心底层数据存储在何处，它只在需要时请求数据，而数据源和委托（在实践中通常是同一个对象）则协同提供这些数据。因此，数据既可以像本节所做的那样来自静态列表，也可以从文件或\
  \ URL 加载，甚至可以实时生成或计算。\n\n为了让选择器类能够向其控制器请求数据，我们必须确保该控制器实现了正确的方法。其中一项工作是在控制器的类定义中声明它将遵循两个协议。在项目导航器中，单击`SingleComponentPickerViewController.swift`文件。该控制器类将同时充当其选择器的数据源和委托，因此我们需要确保它符合这两个角色的协议。添加以下代码：\n\
  \n```swift\nclass SingleComponentPickerViewController: UIViewController,\nUIPickerViewDelegate,\
  \ UIPickerViewDataSource {\n```\n\n执行此操作后，你会在编辑器中看到一个错误提示。这是因为我们尚未实现所需的协议方法。稍后我们会完成这部分工作，所以暂时忽略这个错误。\n\
  \n### 构建视图\n\n再次选择`Main.storyboard`，因为现在要编辑标签栏中第二个标签的内容视图。在文档大纲中，单击“Single”图标，将视图控制器置于编辑器区域的前台。接着，从库中拖出一个选择器视图（参见图\
  \ 7-15），并将其添加到视图中，像之前处理日期选择器那样，紧贴视图顶部放置。\n\n![A329781_3_En_7_Fig15_HTML.jpg](img/A329781_3_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15. 将库中的选择器视图添加到第二个视图\n\n现在我们需要应用自动布局约束，以便选择器在任何设备上运行时都能正确调整大小和位置。我们希望选择器水平居中并固定在视图顶部，同时希望其大小根据内容自适应，因此需要添加三个约束。选中选择器后，首先从\
  \ Xcode 菜单栏中选择 Editor ➤ Size to Fit Content。如果该选项未启用，请稍微移动选择器后重试。接着，点击故事板下方的“Align”按钮，勾选“Horizontally\
  \ in Container”复选框，然后点击“Add 1 Constraint”。点击“Pin”按钮（位于“Align”按钮旁边）。在弹出的四个距离输入框中，将选择器与视图顶部边缘的距离设置为\
  \ 0（在顶部框中输入 0），然后点击下方虚线红色线条使其变为实线。在弹出窗口底部，将“Update Frames”设置为“Items of New Constraints”，然后点击“Add\
  \ 1 Constraint”。选择器将调整大小并移动到正确位置，如图 7-16 所示。\n\n![A329781_3_En_7_Fig16_HTML.jpg](img/A329781_3_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16. 选择器位于其视图控制器视图的顶部\n\n现在，我们将这个选择器连接到其控制器。操作步骤与之前的选择器视图相同：打开助理编辑器，设置跳转栏以显示`SingleComponentPickerViewController.swift`文件，从选择器按住\
  \ Control 键拖拽到`SingleComponentPickerViewController`类的顶部，创建一个名为`singlePicker`的插座变量。\n\
  \n接着，选中选择器，按下⌥⌘6 打开连接检查器。查看选择器视图可用的连接，你会发现前两项是`dataSource`和`delegate`。如果看不到这些插座变量，请确保你选中了选择器而不是`UIView`。从`dataSource`旁边的圆圈拖拽到故事板或文档大纲中场景顶部的视图控制器图标（见图\
  \ 7-17），然后从`delegate`旁边的圆圈拖拽到视图控制器图标。现在，选择器知道故事板中的`SingleComponentPickerViewController`类实例既是其数据源也是其委托，选择器将向该实例请求要显示的数据。换句话说，当选择器需要获取即将显示的数据信息时，它会向控制此视图的`SingleComponentPickerViewController`实例请求信息。\n\
  \n![A329781_3_En_7_Fig17_HTML.jpg](img/A329781_3_En_7_Fig17_HTML.jpg)\n\n图 7-17.\
  \ 将`dataSource`连接到视图控制器\n\n拖拽一个按钮到视图中，将其放置在选择器正下方。双击按钮并将其命名为“Select”。按 Return 键确认更改。在连接检查器中，从“Touch\
  \ Up Inside”旁边的圆圈拖拽到助理视图中的代码区域，在类定义的结束大括号上方松开，以创建新的操作方法。将此操作命名为`onButtonPressed`，你会看到\
  \ Xcode 自动填充了一个空方法。你刚刚看到了另一种向视图控制器添加操作方法并将其链接到源视图的方式。我们希望此按钮水平居中，并与日期选择器保持固定距离。选中按钮，点击故事板底部的“Align”按钮，勾选“Horizontally\
  \ in Container”复选框，然后点击“Add 1 Constraint”（见图 7-18）。\n\n![A329781_3_En_7_Fig18_HTML.jpg](img/A329781_3_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18. 将按钮水平居中于视图中\n\n为固定它们之间的距离，按住 Control 键从按钮拖拽到选择器，然后松开鼠标。在弹出的菜单中，选择“Vertical\
  \ Spacing”（见图 7-19）。最后，如果“问题检查器”中显示任何布局问题，请点击故事板底部的“Resolve Auto Layout Issues”按钮，然后点击弹出窗口顶部区域的“Update\
  \ Frames”（如果该选项未启用，说明按钮已处于正确位置）。按钮应移动到正确位置，且不再有任何自动布局警告。\n\n![A329781_3_En_7_Fig19_HTML.jpg](img/A329781_3_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19. 设置按钮到选择器的垂直间距\n\n\n\n### 实现数据源和代理\n\n为了让我们的控制器能够正常作为选择器的数据源和代理，我们将从一些你应已熟悉的代码开始，然后添加几个你从未见过的方法。\n\
  \n在项目导航器中单击`SingleComponentPickerViewController.swift`，并在类定义的顶部添加以下属性。这将为我们提供一个包含几个知名电影角色名称的数组：\n\
  \n```\n@IBOutlet weak var singlePicker: UIPickerView!\nprivate let characterNames\
  \ = [\n\"Luke\", \"Leia\", \"Han\", \"Chewbacca\", \"Artoo\",\n\"Threepio\", \"\
  Lando\"]\n```\n\n然后将`onButtonPressed()`方法修改为代码清单 7-3 所示的内容。\n\n```\n@IBAction func\
  \ onButtonPressed(_ sender: UIButton) {\nlet row = singlePicker.selectedRow(inComponent:\
  \ 0)\nlet selected = characterNames[row]\nlet title = \"You selected \\(selected)!\"\
  \nlet alert = UIAlertController(\ntitle: title,\nmessage: \"Thank you for choosing\"\
  ,\npreferredStyle: .alert)\nlet action = UIAlertAction(\ntitle: \"You're welcome\"\
  ,\nstyle: .default,\nhandler: nil)\nalert.addAction(action)\npresent(alert, animated:\
  \ true, completion: nil)\n}\n```\n\n正如我们之前所见，日期选择器包含我们需要获取的数据，但在这里，我们的常规选择器将此任务委托给了代理和数据源。`onButtonPressed()`方法需要向选择器询问选择了哪一行，然后从你的`pickerData`数组中抓取相应的数据。以下是询问选中行的方法：\n\
  \n```\nlet row = singlePicker.selectedRow(inComponent: 0)\n```\n\n注意，我们需要指定想要了解的是哪个组件。这个选择器中只有一个组件（即一个旋转轮），所以我们只需传入\
  \ 0，即第一个（也是唯一一个）组件的索引。\n\n在类声明中，我们创建了一个角色名称数组，以便为选择器提供数据。通常，你的数据会来自其他来源，比如属性列表或网络服务查询。像我们这样在代码中直接嵌入数组，如果需要更新此列表或希望将应用翻译成其他语言，就会给自己增加很大难度。但就演示目的而言，这是将数据存入数组最快、最简单的方法。尽管你通常不会这样创建数组，但你几乎总会在`viewDidLoad()`方法中配置某种对应用模型对象的访问方式，这样就不会每次选择器请求数据时都去访问磁盘或网络。\n\
  \n**提示**\n\n如果像我们刚才那样，不应该在代码中通过对象列表创建数组，那应该怎么做呢？将列表嵌入属性列表文件中，并将这些文件添加到你的项目中。属性列表文件可以在不重新编译源代码的情况下进行修改，这意味着这样做引入新\
  \ bug 的风险很小。你还可以为不同语言提供不同版本的列表，正如你将在第 22 章中看到的。我将在第 13 章中更详细地讨论属性列表。\n\n最后，在文件底部插入代码清单\
  \ 7-4 所示的代码。\n\n```\n// MARK:-\n// MARK: Picker Data Source Methods\nfunc numberOfComponents(in\
  \ pickerView: UIPickerView) -> Int {\nreturn 1\n}\nfunc pickerView(_ pickerView:\
  \ UIPickerView,\nnumberOfRowsInComponent component: Int) -> Int {\nreturn characterNames.count\n\
  }\n// MARK: Picker Delegate Methods\nfunc pickerView(_ pickerView: UIPickerView,\
  \ titleForRow row: Int, forComponent component: Int) -> String? {\nreturn characterNames[row]\n\
  }\n```\n\n实现选择器需要这三个方法。前两个方法来自`UIPickerViewDataSource`协议，并且是所有选择器（日期选择器除外）都必需的方法。这是第一个：\n\
  \n```\nfunc numberOfComponents(in pickerView: UIPickerView) -> Int {\nreturn 1\n\
  }\n```\n\n选择器可以有多个旋转轮（即组件），选择器通过这个方法询问它应该显示多少个组件。这次我们只想显示一个列表，所以返回值是 1。注意，一个`UIPickerView`作为参数传入。这个参数指向正在询问我们的选择器视图，这使得多个选择器可以由同一个数据源控制。在我们的例子中，我们知道只有一个选择器，因此可以安全地忽略这个参数，因为我们已经知道是哪个选择器在调用我们。\n\
  \n第二个数据源方法用于选择器询问某个给定组件有多少行数据：\n\n```\nfunc pickerView(_ pickerView: UIPickerView,\n\
  numberOfRowsInComponent component: Int) -> Int {\nreturn characterNames.count\n\
  }\n```\n\n同样，我们被告知是哪个选择器视图在询问，以及该选择器询问的是哪个组件。由于我们知道只有一个选择器和一个组件，我们就不去理会这两个参数，直接返回唯一数据数组中的对象个数。\n\
  \n### // Mark: 这是什么？？\n\n你有没有注意到`SingleComponentPickerViewController.swift`中的以下几行代码？\n\
