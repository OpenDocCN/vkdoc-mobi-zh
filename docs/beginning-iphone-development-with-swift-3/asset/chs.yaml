  \ 的动作。我们将在本章末尾使用此按钮。\n\n\n\n现在是时候添加自动布局约束了。首先，选择 `Main.storyboard`。在文档大纲中，按住 Control\
  \ 键从 Warp Engines 标签拖拽到其父视图，然后释放鼠标。按住 Shift 键，选择“Leading Space to Container Margin”和“Vertical\
