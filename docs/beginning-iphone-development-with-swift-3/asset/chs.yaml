  \ 我们的相机应用程序的故事板布局\n\n从库中拖拽两个按钮到故事板中的视图上。将它们上下放置，使底部按钮与底部蓝色参考线对齐。双击顶部按钮，将其标题设置为“新照片或视频”。现在双击底部按钮，将其标题设置为“从库中选取”。接下来，从库中拖拽一个图像视图，并将其放置在按钮上方。将图像视图展开，占据按钮上方视图的整个空间，如图\
  \ 21-3 之前所示。在属性检查器中，将图像视图的背景改为黑色，并将其模式设置为“宽高比适配”，这将使其能够调整图像大小以适合其边界，同时保持原始宽高比。\n\
  \n\n\n现在从 View Controller 图标按住 Control 键拖拽到图像视图，选择 `imageView` 插座变量。再次从 View Controller\
  \ 拖拽到 New Photo or Video 按钮，选择 `takePictureButton` 插座变量。接下来，选择 New Photo or Video\
  \ 按钮并打开连接检查器。从 Touch Up Inside 事件拖拽到 View Controller 图标，然后选择 `shootPictureOrVideo`:\
  \ 操作。现在点击 Pick from Library 按钮，从连接检查器的 Touch Up Inside 事件拖拽到 View Controller 图标，并选择\
  \ `selectExistingPictureOrVideo`: 操作。\n\n最后一步，照例是添加自动布局约束。首先在文档大纲中展开视图控制器，然后按如下方式添加约束：\n\
  \n1. 在文档大纲中，从 Pick from Library 按钮按住 Control 键拖拽到其父视图，然后松开鼠标。弹出窗口出现时，按住 Shift 键并选择\
  \ Container 中水平居中 和 底部布局指引垂直间距。\n2. 从 New Photo or Video 按钮按住 Control 键拖拽到 Pick\
  \ from Library 按钮，松开鼠标，选择垂直间距。\n3. 从 New Photo or Video 按钮按住 Control 键拖拽到其父视图，松开鼠标，按住\
  \ Shift 键，选择 Container 中水平居中。\n4. 从 New Photo or Video 按钮按住 Control 键拖拽到图像视图，选择垂直间距。\n\
  5. 从图像视图按住 Control 键拖拽到其父视图，使用 Shift 键选择 容器边距前导空间、容器边距尾随空间 和 顶部布局指引垂直间距。\n\n所有布局约束现在应该已就位，因此保存您的更改。\n\
  \n### 隐私选项\n\n由于我们计划使用摄像头，而该硬件受 iOS 保护，因此我们必须请求用户的许可才能使用。同样，由于我们计划拍摄视频，我们需要访问麦克风……除非我们只对无声电影感兴趣。此外，我们还需要访问照片库。幸运的是，只要我们正确地请求所需的权限，iOS\
  \ 会为我们处理大部分工作。为此，需要在 `Info.plist` 文件中添加几行内容。\n\n由于我们之前已经访问过属性列表几次，只需添加如图 21-5 所示的三个底部条目。最右侧列中的文本将作为请求使用特定资源的附加信息显示给用户。因此，表述清晰简洁会有所帮助。\n\
  \n![A329781_3_En_21_Fig5_HTML.jpg](img/A329781_3_En_21_Fig5_HTML.jpg)\n\n图 21-5.\
  \ 向 `Info.plist` 文件添加摄像头和麦克风的隐私选项\n\n当应用需要访问这三个资源之一时，会向用户显示一条类似图 21-6 所示的消息。\n\n\
  ![A329781_3_En_21_Fig6_HTML.jpg](img/A329781_3_En_21_Fig6_HTML.jpg)\n\n图 21-6. iOS\
  \ 会负责向用户发起请求，但您需要明确说明您的应用为何需要特定资源。\n\n### 实现摄像头视图控制器\n\n选择 `ViewController.swift`，我们还需要做一些更改。由于我们将允许用户选择性地拍摄视频，因此需要一个\
  \ `AVPlayerViewController` 实例的属性。另外两个属性用于跟踪最后选择的图像和视频，以及一个用于确定最后选择的是视频还是图像的字符串。我们还需要导入一些额外的框架来实现这一切。添加如下所示的粗体行：\n\
  \n```\nimport UIKit\nimport AVKit\nimport AVFoundation\nimport MobileCoreServices\n\
  class ViewController: UIViewController, UIImagePickerControllerDelegate,\nUINavigationControllerDelegate\
  \ {\n@IBOutlet var imageView: UIImageView!\n@IBOutlet var takePictureButton: UIButton!\n\
  var avPlayerViewController: AVPlayerViewController!\nvar image: UIImage?\nvar movieURL:\
  \ URL?\nvar lastChosenMediaType: String?\n```\n\n现在我们来增强 `viewDidLoad()` 方法，如果我们运行的设备没有摄像头，则隐藏\
  \ New Photo or Video 按钮。我们还要实现 `viewDidAppear()` 方法，让它调用 `updateDisplay()` 方法，我们稍后将实现该方法。首先，按清单\
  \ 21-4 所示，更改 `ViewController.swift` 文件中的 `viewDidLoad` 和 `viewDidAppear` 方法。\n\n\
  ```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
  \ after loading the view, typically from a nib.\nif !UIImagePickerController.isSourceTypeAvailable(\n\
  UIImagePickerControllerSourceType.camera) {\ntakePictureButton.isHidden = true\n\
  }\n}\noverride func viewDidAppear(_ animated: Bool) {\nsuper.viewDidAppear(animated)\n\
  updateDisplay()\n}\n```\n清单 21-4. 更新后的 `viewDidLoad` 和 `viewDidAppear` 方法\n\n理解\
  \ `viewDidLoad()` 和 `viewDidAppear()` 方法之间的区别很重要。前者仅在视图刚刚加载到内存时被调用。后者则在每次视图显示时被调用，这发生在启动时以及当我们显示另一个全屏视图（如图像选择器）后返回到控制器时。\n\
  \n接下来是三个实用方法，第一个是 `updateDisplay()` 方法。它由 `viewDidAppear()` 方法调用，该方法在视图首次创建时以及用户选择图像或视频并关闭图像选择器后被调用。由于这种双重用途，它需要进行一些检查以确定当前状态并相应地设置\
  \ GUI。将清单 21-5 中的代码添加到 `ViewController.swift` 文件的底部附近。\n\n```\nfunc updateDisplay()\
  \ {\nif let mediaType = lastChosenMediaType {\nif mediaType == kUTTypeImage as NSString\
  \ {\nimageView.image = image!\nimageView.isHidden = false\nif avPlayerViewController\
  \ != nil {\navPlayerViewController!.view.isHidden = true\n}\n} else if mediaType\
  \ == kUTTypeMovie as NSString {\nif avPlayerViewController == nil {\navPlayerViewController\
  \ = AVPlayerViewController()\nlet avPlayerView = avPlayerViewController!.view\n\
  avPlayerView?.frame = imageView.frame\navPlayerView?.clipsToBounds = true\nview.addSubview(avPlayerView!)\n\
  setAVPlayerViewLayoutConstraints()\n}\nif let url = movieURL {\nimageView.isHidden\
  \ = true\navPlayerViewController.player = AVPlayer(url: url)\navPlayerViewController!.view.isHidden\
  \ = false\navPlayerViewController!.player!.play()\n}\n}\n}\n}\n```\n清单 21-5. `updateDisplay`\
  \ 方法\n\n此方法根据用户选择的媒体类型显示正确的视图——照片显示图像视图，电影显示 AV 播放器。图像视图始终存在，但 AV 播放器仅在用户首次选择电影时创建并添加到用户界面中。每次选择电影时，我们都会创建一个使用电影文件\
  \ URL 初始化的 `AVPlayer` 实例，通过其 `player` 属性将其附加到 `AVPlayerViewController`，然后使用播放器的\
  \ `play()` 方法开始播放。\n\n\n\n当添加 AV 播放器时，我们需要确保它占据与图像视图相同的空间，并且需要添加布局约束，以确保即使设备旋转时也能保持这种情况。以下是添加布局约束的代码，如清单\
  \ 21-6 所示。\n\n```\nfunc setAVPlayerViewLayoutConstraints() {\n    let avPlayerView\
  \ = avPlayerViewController!.view\n    avPlayerView?.translatesAutoresizingMaskIntoConstraints\
  \ = false\n    let views = [\"avPlayerView\": avPlayerView!,\n                 \"\
  takePictureButton\": takePictureButton!]\n    view.addConstraints(NSLayoutConstraint.constraints(\n\
  \        withVisualFormat: \"H:|[avPlayerView]|\", options: .alignAllLeft,\n   \
  \     metrics:nil, views:views))\n    view.addConstraints(NSLayoutConstraint.constraints(\n\
  \        withVisualFormat: \"V:|[avPlayerView]-0-[takePictureButton]\",\n      \
  \  options: .alignAllLeft, metrics:nil, views:views))\n}\n```\n\n水平约束将视频播放器绑定到主视图的左右两侧，垂直约束将其链接到主视图顶部和“新照片或视频”按钮的顶部。\n\
  \n最后一个实用方法**`pickMediaFromSource()`**是我们两个操作方法都调用的方法。这个方法非常简单。它只是创建并配置一个图像选择器，使用传入的**`sourceType`**来确定是调出相机还是媒体库。我们通过将清单\
  \ 21-7 中的代码添加到**`ViewController.swift`**文件底部来实现这一点。\n\n```\nfunc pickMediaFromSource(_\
  \ sourceType: UIImagePickerControllerSourceType) {\n    let mediaTypes =\n     \
  \   UIImagePickerController.availableMediaTypes(for: sourceType)!\n    if UIImagePickerController.isSourceTypeAvailable(sourceType)\n\
  \        && mediaTypes.count > 0 {\n        let picker = UIImagePickerController()\n\
  \        picker.mediaTypes = mediaTypes\n        picker.delegate = self\n      \
  \  picker.allowsEditing = true\n        picker.sourceType = sourceType\n       \
  \ present(picker, animated: true, completion: nil)\n    } else {\n        let alertController\
  \ = UIAlertController(title:\"Error accessing media\",\n                       \
  \                         message: \"Unsupported media source.\",\n            \
  \                                    preferredStyle: UIAlertControllerStyle.alert)\n\
  \        let okAction = UIAlertAction(title: \"OK\",\n                         \
  \            style: UIAlertActionStyle.cancel, handler: nil)\n        alertController.addAction(okAction)\n\
  \        present(alertController, animated: true, completion: nil)\n    }\n}\n```\n\
  \n接下来，实现与按钮链接的操作方法：\n\n```\n@IBAction func shootPictureOrVideo(_ sender: UIButton)\
  \ {\n    pickMediaFromSource(UIImagePickerControllerSourceType.camera)\n}\n@IBAction\
  \ func selectExistingPictureOrVideo(_ sender: UIButton) {\n    pickMediaFromSource(UIImagePickerControllerSourceType.photoLibrary)\n\
  }\n```\n\n每个方法都简单地调用了**`pickMediaFromSource()`**方法，并传入由**`UIImagePickerController`**定义的常量，以指定图片或视频的来源。\n\
  \n现在，终于到了实现选择器视图的委托方法的时候了，如清单 21-8 所示。\n\n```\nfunc imagePickerController(_ picker:\
  \ UIImagePickerController,\n                           didFinishPickingMediaWithInfo\
  \ info: [String : AnyObject]) {\n    lastChosenMediaType = info[UIImagePickerControllerMediaType]\
  \ as? String\n    if let mediaType = lastChosenMediaType {\n        if mediaType\
  \ == kUTTypeImage as NSString {\n            image = info[UIImagePickerControllerEditedImage]\
  \ as? UIImage\n        } else if mediaType == kUTTypeMovie as NSString {\n     \
  \       movieURL = info[UIImagePickerControllerMediaURL] as? URL\n        }\n  \
  \  }\n    picker.dismiss(animated: true, completion: nil)\n}\nfunc imagePickerControllerDidCancel(_\
  \ picker: UIImagePickerController) {\n    picker.dismiss(animated: true, completion:nil)\n\
  }\n```\n\n第一个委托方法使用传入**`info`**字典中的值来检查是选择了图片还是视频，记录选择内容，然后关闭模态图像选择器。如果图像大于屏幕上的可用空间，在显示时它将被图像视图调整大小，因为我们在创建图像视图时将其内容模式设置为**`Aspect\
  \ Fit`**。第二个委托方法在用户取消图像选择过程时被调用，仅关闭图像选择器。\n\n这就是你需要做的全部工作。编译并运行应用程序。如果在模拟器上运行，你将无法拍摄新照片，只能从照片库中选择——就好像模拟器的照片库中有照片一样！如果有机会在真实设备上运行应用程序，尽管尝试一下。你应该能够拍摄新照片或视频，并使用捏合手势放大和缩小图片。在\
  \ iOS 上，应用程序首次需要访问用户照片时，用户将被要求允许此访问；这是 iOS 6 中新增的一项隐私功能，用于确保应用程序不会在未经用户同意的情况下偷偷抓取照片。\n\
  \n选择或拍摄照片后，如果在点击“使用照片”按钮之前进行放大和平移，裁剪后的图像将作为委托方法中的返回值返回给应用程序。\n\n## 总结\n\n信不信由你，这就是让用户使用相机拍照以便应用程序使用这些照片所需的全部内容。你甚至可以让用户对图像进行少量编辑（如果你愿意的话）。\n\
  \n在下一章中，我们将通过使 iOS 应用程序易于翻译成其他语言，来探讨如何扩大其受众范围。\n\n# 22. 使用本地化翻译应用程序\n\n在撰写本文时，你会发现\
  \ iOS 设备在全球约一半的国家有售，并且这个数字还在不断增加（见图 22-1）。iPad 和 iPod touch 在除南极洲以外的各大洲均有销售，并且几乎像\
  \ iPhone 一样无处不在。如果你计划通过 App Store 发布应用程序，请不仅考虑本国说母语的人。幸运的是，iOS 提供了强大的本地化架构，让你能够轻松地将应用程序翻译（或让他人翻译）成多种语言，甚至同一语言的多种方言。为英国的英语使用者提供与美国不同的术语不再是一个问题。\n\
  \n![A329781_3_En_22_Fig1_HTML.jpg](img/A329781_3_En_22_Fig1_HTML.jpg)\n\n由于 iOS\
  \ 设备在全球超过一半的国家有售，为多种语言开发应用程序将使你的应用更有可能获得你期望的成功。\n\n如果你正确编写了代码，本地化带来的问题微乎其微，而改造现有应用程序以支持本地化则会增加所需的工作量。在本章中，我将向你展示如何编写易于本地化的代码，然后我们将对示例应用程序进行本地化。\n\
  \n\n\n## 本地化架构\n\n当一款尚未配置本地化的应用执行时，其所有文本都会以开发者自身的语言显示，这被称为开发基准语言。当开发者决定对其应用进行本地化时，他们会为每种受支持的语言在应用包中创建一个子目录。每种语言的子目录都包含该应用资源中已翻译为该语言的一个子集。每个子目录被称为一个本地化项目，或本地化文件夹。本地化文件夹的名称始终以`.lproj`扩展名结尾。\n\
  \n在 iOS 的“设置”应用中，用户可以设置设备的首选语言和区域格式。例如，如果用户的语言是英语，可选的区域可能包括美国、澳大利亚和香港——所有讲英语的地区。\n\
  \n当一个经过本地化的应用需要加载资源（例如图片、属性列表或 nib 文件）时，应用会检查用户的语言和区域，然后查找与之匹配的本地化文件夹。如果找到，它会加载该资源的本地化版本，而不是基准版本。对于选择法语作为\
  \ iOS 语言、瑞士作为区域的用户，应用将首先查找名为`fr-CH.lproj`的本地化文件夹。文件夹名称的前两个字母是代表法语的 ISO 国家代码。连字符后面的两个字母是代表瑞士的\
  \ ISO 代码。\n\n如果应用无法使用两位代码找到匹配项，它会使用语言的三位 ISO 代码继续查找。在我们的例子中，如果应用找不到名为`fr-CH.lproj`的文件夹，它会查找名为`fre-CH`或`fra-CH`的文件夹。\n\
  \n所有语言都至少有一个三位代码。有些语言有两种三位代码：一种对应语言的英文拼写，另一种对应本地拼写。某些语言只有两位代码，但当一种语言同时拥有两位代码和三位代码时，优先使用两位代码。\n\
  \n**注意**\n\n你可以在 ISO 网站[`www.iso.org/iso/country_codes.htm`](http://www.iso.org/iso/country_codes.htm)上找到当前\
  \ ISO 国家代码的列表。两位和三位代码都是 ISO 3166 标准的一部分。\n\n如果应用找不到完全匹配的文件夹，它会在应用包中查找仅匹配语言代码而不包含区域代码的本地化文件夹。因此，以法语为例，应用接下来会查找名为`fr.lproj`的本地化文件夹。如果找不到该名称的语言文件夹，它会继续查找`fre.lproj`，然后是`fra.lproj`。如果这些都没有找到，它会检查`French.lproj`。最后这种结构是为了支持旧版\
  \ Mac OS X 应用程序而存在的；通常来说，你应该避免使用它。\n\n如果应用既找不到语言/区域组合的匹配文件夹，也找不到仅语言匹配的文件夹，它会使用开发基准语言的资源。如果它找到了合适的本地化文件夹，则会始终优先在该文件夹中查找所需的任何资源。例如，如果你使用`imageNamed()`加载一个`UIImage`，应用会首先在本地化文件夹中查找指定名称的图片。如果找到，它将使用该图片。如果没有找到，它将回退到使用基准语言的资源。\n\
  \n如果一个应用有多个匹配的本地化文件夹——例如，一个名为`fr-CH.lproj`的文件夹和一个名为`fr.lproj`的文件夹——并且用户选择了瑞士法语作为其首选语言，它会在更具体的匹配项`fr-CH.lproj`中优先搜索。如果在那里找不到资源，它会在`fr.lproj`中查找。这使你可以将某语言所有使用者通用的资源放在一个文件夹中，仅本地化那些受方言或地理区域差异影响的资源。\n\
  \n你应该只选择本地化那些受语言或国家影响的资源。例如，如果应用中的某个图片没有文字且含义是全球通用的，那就没有必要本地化该图片。\n\n### 字符串文件\n\
  \n对于源代码中的字符串字面量和字符串常量，你应该如何处理呢？请参考第 19 章中的源代码，如列表 22-1 所示。\n\n```\nlet alertController\
  \ = UIAlertController(title: \"Location Manager Error\",\nmessage: errorType, preferredStyle:\
  \ .alert)\nlet okAction = UIAlertAction(title: \"OK\", style: .cancel,\nhandler:\
  \ nil)\nalertController.addAction(okAction)\nself.presentViewController(alertController,\
  \ animated: true,\ncompletion: nil)\n列表 22-1.\n字符串字面量和常量的示例\n```\n\n如果你已经付出了努力为特定的用户群体本地化了你的应用，你当然不希望显示用开发基准语言编写的警告。解决方案是将这些字符串存储在称为字符串文件的特殊文本文件中。\n\
  \n### 字符串文件\n\n字符串文件不过是包含一系列字符串对的 Unicode 文本文件，每个字符串对都由一条注释标识。列表 22-2 展示了一个示例，说明了字符串文件在你的应用中可能是什么样子。\n\
  \n```\n/* 用于询问用户的姓名 */\n\"LABEL_FIRST_NAME\" = \"First Name\";\n/* 用于获取用户的姓氏 */\n\
  \"LABEL_LAST_NAME\" = \"Last Name\";\n/* 用于询问用户的出生日期 */\n\"LABEL_BIRTHDAY\" = \"\
  Birthday\";\n列表 22-2.\n字符串文件示例\n```\n\n`/*` 和 `*/` 字符之间的值是给翻译人员的注释。它们不会在应用程序中使用；你可以省略它们，尽管添加它们是一个好做法。这些注释提供了上下文，显示了特定字符串在应用程序中的使用方式。你会注意到每一行都由等号分隔成两部分。等号左侧的字符串充当键，无论使用何种语言，它都将始终包含相同的值。等号右侧的值是翻译成当地语言的部分。因此，上述字符串文件若本地化为法语，可能看起来像列表\
  \ 22-3 所示。\n\n```\n/* 用于询问用户的姓名 */\n\"LABEL_FIRST_NAME \" = \"Prénom\";\n/* 用于获取用户的姓氏\
  \ */\n\"LABEL_LAST_NAME\" = \"Nom de famille\";\n/* 用于询问用户的出生日期 */\n\"LABEL_BIRTHDAY\"\
  \ = \"Anniversaire\";\n列表 22-3.\n字符串文件的法语版本\n```\n\n\n\n### 本地化字符串函数\n\n在运行时，你将通过使用\
  \ `NSLocalizedString()` 函数来获取所需的字符串本地化版本。一旦你的源代码最终确定并准备好进行本地化，Xcode 会搜索所有代码文件中此函数的出现位置，提取所有唯一的字符串，并将它们嵌入到一个文件中。你可以将该文件发送给翻译人员，或者自行添加翻译。完成后，让\
  \ Xcode 导入更新后的文件，并利用其内容为你提供翻译的语言创建本地化字符串文件。让我们看看这个过程的第一部分是如何工作的。首先，这是一个传统的字符串声明：`let\
  \ myString = \"First Name\"`。\n\n要使此字符串可本地化：\n\n```\nlet myString = NSLocalizedString(\"\
  LABEL_FIRST_NAME\",\ncomment: \"用于询问用户的名字\")\n```\n\n`NSLocalizedString()` 宏接受五个参数，但其中三个有默认值，在大多数情况下已经足够，因此通常你只需要提供两个：\n\
  \n- 第一个参数是一个键，用于查找本地化字符串。如果本地化文件中没有包含该键的文本，应用程序将使用该键本身作为本地化文本。\n- 第二个参数用作注释，解释该文本的使用方式。该注释将出现在发送给翻译人员的文件中，以及导入后的本地化字符串文件中。\n\
  \n`NSLocalizedString()` 会在应用程序包中合适的本地化文件夹内搜索名为 `Localizable.strings` 的字符串文件。如果找不到该文件，它将返回其第一个参数，即所需文本的键。如果\
  \ `NSLocalizedString()` 找到了字符串文件，它会在文件中搜索与第一个参数匹配的行。在前面的示例中，`NSLocalizedString()`\
  \ 将在字符串文件中搜索字符串 `\"LABEL_FIRST_NAME\"`。如果在与用户语言设置匹配的本地化文件夹中未找到匹配项，它将转而查找基础语言中的字符串文件并使用其中的值。如果没有字符串文件，它将直接使用你传递给\
  \ `NSLocalizedString()` 函数的第一个参数。\n\n你可以将基础语言文本用作 `NSLocalizedString()` 函数的键，因为如果找不到匹配的本地化文本，该函数会返回这个键。这将使前面的示例变为：\n\
  \n```\nlet myString = NSLocalizedString(\"First Name\",\ncomment: \"用于询问用户的名字\"\
  )\n```\n\n我们不推荐这种方法，原因有二。首先，你很可能在首次尝试时无法想出完美的键，之后不得不返回去在字符串文件中修改它们，这是一项繁琐且容易出错的工作，最终得到的键仍可能与应用程序中使用的键不匹配。第二个原因是，通过明确使用大写键，你可以在运行应用程序时立即通过观察界面发现是否忘记对某些文本进行本地化。\n\
  \n现在你已经了解了本地化架构和字符串文件的工作原理，让我们来看看本地化的实际应用。\n\n## 创建 LocalizeMe 应用\n\n我们将创建一个显示用户当前区域设置的小型应用程序。区域设置（`NSLocale`\
  \ 的实例）代表用户的语言和地区。系统使用区域设置在用户交互时确定使用哪种语言，以及如何显示日期、货币和时间信息等。创建应用程序后，我们将把它本地化为其他语言，学习如何本地化故事板文件、字符串文件、图片，甚至是应用程序的显示名称。\n\
  \n图 22-2 描绘了我们的应用在顶部显示来自用户区域设置的名称时的样子。视图左侧的序数词是静态标签，它们的值将通过本地化故事板文件来设置。右侧的单词以及屏幕底部的旗帜图片，都将在应用代码中根据用户的首选语言在运行时选择。\n\
  \n![A329781_3_En_22_Fig2_HTML.jpg](img/A329781_3_En_22_Fig2_HTML.jpg)\n\n图 22-2.\
  \ LocalizeMe 应用程序在两种不同语言设置下的显示效果\n\n在 Xcode 中使用 Single View Application 模板创建一个新项目，并将其命名为\
  \ `LocalizeMe`。在示例源代码的 `22 - Images` 文件夹中，你会找到名为 `flag_usa.png` 和 `flag_france.png`\
  \ 的两张图片。在 Xcode 中，选择 `Assets.xcassets` 项，然后将 `flag_usa.png` 和 `flag_france.png`\
  \ 都拖入其中。现在，让我们在项目的视图控制器中添加一些标签输出口。我们需要为视图顶部的标签创建一个输出口，为将显示旗帜的图像视图创建一个输出口，并为右侧的所有单词创建一个输出口集合（见图\
  \ 22-2）。选择 `ViewController.swift` 并做出以下修改：\n\n```\nclass ViewController: UIViewController\
  \ {\n@IBOutlet var localeLabel : UILabel!\n@IBOutlet var flagImageView : UIImageView!\n\
  @IBOutlet var labels : [UILabel]!\n```\n\n选择 `Main.storyboard` 在 Interface Builder\
  \ 中编辑图形用户界面。从库中拖出一个标签，将其放置在主视图顶部，与顶部蓝色参考线对齐。调整标签大小，使其占据视图的整个宽度，从左侧边距参考线到右侧边距参考线。选中标签后，打开属性检查器。找到字体控件，点击其中包含的小\
  \ T 图标以弹出一个小字体选择弹出窗口。点击样式选择器并将其更改为粗体，使标题标签与其他部分略有区分。接着，使用属性检查器将文本对齐方式设置为居中。如果需要，你也可以使用字体选择器将字号调大。只要在对象属性检查器中将自动缩小设置为最小字体大小，文本在过长无法适应时就会被自动调整大小。标签放置好后，按住\
  \ Control 键从文档大纲（或故事板中的）视图控制器图标拖到该新标签，然后选择 `localeLabel` 输出口。\n\n接下来，从库中再拖出五个标签，使用蓝色参考线将它们沿左边距放置，一个在另一个上方（同样参见图\
  \ 22-2）。双击顶部的标签，将其文本从 Label 改为 First。对其余四个标签重复此步骤，将文本分别改为 Second、Third、Fourth 和\
  \ Fifth。确保所有五个标签都沿左边距参考线对齐。\n\n再从库中拖出五个标签，这次将它们沿右边距放置。使用对象属性检查器将文本对齐方式更改为右对齐。按住\
  \ Control 键从视图控制器拖到每个新标签，将每个标签连接到 `labels` 输出口集合，并确保按从上到下的正确顺序连接。\n\n\n\n从库中拖拽一个`Image\
  \ View`到视图的底部，使其触碰底部和左侧的蓝色参考线。在属性检查器中，为视图的`Image`属性选择`flag_usa`，并将图片水平拉伸以填满两条蓝色参考线之间的空间，垂直方向则设置为用户界面高度的大约三分之一。在属性检查器中，将`Mode`属性从当前值更改为`Aspect\
  \ Fit`。并非所有国旗都有相同的宽高比，我们需要确保本地化版本的图片显示正常。选择此选项将使`image view`调整其显示的所有图片以适应视图，同时保持正确的宽高比（高度与宽度之比）。现在，从视图控制器按住\
  \ Control 键拖拽至该`image view`，并选择`flagImageView`插座变量。\n\n为了完成用户界面，我们需要设置自动布局约束。从顶部的标签开始，按住\
  \ Control 键从它拖拽到文档大纲中的父视图，按住 Shift 键，依次选择`Leading Space to Container Margin`、`Trailing\
  \ Space to Container Margin`和`Vertical Spacing to Top Layout Guide`，然后按 Return 键。\n\
  \n接下来，我们将固定五排标签的位置。从文本为`First`的标签按住 Control 键拖拽到文档大纲中的父视图，选择`Leading Space to Container\
  \ Margin`和`Vertical Spacing to Top Layout Guide`，然后按 Return 键。从该标签按住 Control 键拖拽到同一行右侧的标签，选择`Baseline`，然后从右侧的标签按住\
  \ Control 键拖拽到文档大纲中的父视图，选择`Trailing Space to Container Margin`。\n\n现在我们已经定位了第一排标签。对另外四排标签执行完全相同的操作。接下来，按住\
  \ Shift 键并用鼠标点击右侧的所有五个标签来选中它们，然后选择 Editor ➤ Size to Fit Content。最后，清空所有这些标签的文本，因为我们将在代码中设置它们。\n\
  \n为了固定国旗的位置和大小，从国旗标签按住 Control 键拖拽到文档大纲中的父视图，选择`Leading Space to Container Margin`、`Trailing\
  \ Space to Container Margin`和`Vertical Spacing to Bottom Layout Guide`，然后按 Return\
  \ 键。在国旗标签仍处于选中状态时，点击`Pin`按钮，在弹出的窗口中勾选`Height`复选框，然后按`Add 1 Constraint`。现在你已经添加了所有需要的自动布局约束。\n\
  \n保存你的故事板，然后切换到`ViewController.swift`，并将清单 22-4 中的代码添加到`viewDidLoad()`方法中。\n\n```\n\
  override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    let locale = Locale.current\n\
  \    let currentLangID = Locale.preferredLanguages[0]\n    let displayLang = locale.displayName(forKey:\
  \ Locale.Key.languageCode, value: currentLangID)\n    let capitalized = displayLang?.capitalized(with:\
  \ locale)\n    localeLabel.text = capitalized\n    labels[0].text = NSLocalizedString(\"\
  LABEL_ONE\", comment: \"The number 1\")\n    labels[1].text = NSLocalizedString(\"\
  LABEL_TWO\", comment: \"The number 2\")\n    labels[2].text = NSLocalizedString(\"\
  LABEL_THREE\", comment: \"The number 3\")\n    labels[3].text = NSLocalizedString(\"\
  LABEL_FOUR\", comment: \"The number 4\")\n    labels[4].text = NSLocalizedString(\"\
  LABEL_FIVE\", comment: \"The number 5\")\n    let flagFile = NSLocalizedString(\"\
  FLAG_FILE\", comment: \"Name of the flag\")\n    flagImageView.image = UIImage(named:\
  \ flagFile)\n}\n清单 22-4.\n按所示修改 viewDidLoad 方法\n```\n\n在这段代码中，我们首先获取一个`NSLocale`实例（请记住，新版本的\
  \ Xcode 和 Swift 支持更友好的名称，如`Locale`，尽管技术上它仍然是`NSLocale`），该实例代表用户当前的区域设置。此实例告诉我们用户的语言和区域偏好，这些偏好是在设备的“设置”应用中设置的：\n\
  \n```\nlet locale = Locale.current\n```\n\n接着，我们获取用户偏好的语言。这将返回一个双字符代码，例如`\"en\"\
  `或`\"fr\"`，或者像`\"fr_CH\"`这样的区域语言变体字符串：\n\n```\nlet currentLangID = Locale.preferredLanguages[0]\n\
  ```\n\n下一行代码可能需要一些解释：\n\n```\nlet displayLang = locale.displayName(forKey: Locale.Key.languageCode,\
  \ value: currentLangID)\n```\n\n`NSLocale`的工作方式有点像字典。它可以提供关于当前用户区域设置的许多信息，包括货币名称和预期的日期格式。你可以在`NSLocale`\
  \ API 参考中找到可以检索的完整信息列表。这里，我们使用一个名为`displayName(forKey value:)`的方法来获取所选语言的实际名称，该名称被翻译成了当前区域设置本身的语言。此方法的目的是以特定语言返回我们请求的项的值。\n\
  \n例如，法语的显示名称在法语中是“français”，但在英语中是“French”。此方法使你能检索任何区域设置的数据，以便为所有用户正确显示。在这种情况下，我们希望以当前正在使用的语言显示用户偏好语言的显示名称，这就是我们传递`currentLangID`作为第二个参数的原因。这个字符串是一个两位字母的语言代码，类似于我们之前创建语言项目时使用的代码。对于英语使用者，它将是`en`；对于法语使用者，它将是`fr`。\n\
  \n从这个调用返回的名称将是类似“English”或“français”的内容——并且只有在用户偏好语言中语言名称总是大写时它才会大写。英语中是这样，但法语中不是。然而，我们希望这个名称大写以便作为标题显示。幸运的是，`NSString`有用于大写字符串的方法，包括一个可以根据给定区域设置的规则来大写字符串的方法！让我们使用它来将“français”转换为“Français”：\n\
  \n```\nlet capitalized = displayLang?.capitalized(with: locale)\n```\n\n这里，我们利用了\
  \ Objective-C 类`NSString`和 Swift 的`String`透明桥接的特性，在我们的`String`实例上调用了`NSString`的`capitalizedStringWithLocale()`方法。一旦我们有了显示名称，就用它来设置视图中的顶部标签：\n\
  \n```\nlocaleLabel.text = capitalized\n```\n\n接下来，我们将另外五个标签设置为以我们的开发基础语言拼写出的数字 1\
  \ 到 5。我们使用`NSLocalizedString()`函数来获取这些标签的文本，传递键和一条注释来指示每个单词是什么。如果单词含义明显（就像这里），你也可以为注释传递一个空字符串；然而，你在第二个参数中传递的任何字符串都会变成字符串文件中的注释，因此你可以使用此注释与翻译人员沟通：\n\
  \n```\nlabels[0].text = NSLocalizedString(\"LABEL_ONE\", comment: \"The number 1\"\
  )\nlabels[1].text = NSLocalizedString(\"LABEL_TWO\", comment: \"The number 2\")\n\
  labels[2].text = NSLocalizedString(\"LABEL_THREE\", comment: \"The number 3\")\n\
  labels[3].text = NSLocalizedString(\"LABEL_FOUR\", comment: \"The number 4\")\n\
  labels[4].text = NSLocalizedString(\"LABEL_FIVE\", comment: \"The number 5\")\n\
  ```\n\n最后，我们执行另一个字符串查找来获取要使用的国旗图片的名称，并用该名称的图片填充我们的`image view`：\n\n```\nlet flagFile\
  \ = NSLocalizedString(\"FLAG_FILE\", comment: \"Name of the flag\")\nflagImageView.image\
  \ = UIImage(named: flagFile)\n```\n\n构建并运行应用程序，如果你的基础语言是英语，它应该类似于图 22-3 所示。\n\n\
  ![A329781_3_En_22_Fig3_HTML.jpg](img/A329781_3_En_22_Fig3_HTML.jpg)\n\n图 22-3. 在作者基础语言下运行的应用程序。该应用已设置为本地化，但尚未进行本地化。\n\
  \n\n\n因为我们使用了`NSLocalizedString()`函数而不是静态字符串，现在我们已准备好进行本地化。然而，我们尚未完成本地化，这从右侧列中的大写标签以及底部缺少标志图片即可明显看出。如果你在模拟器或\
  \ iOS 设备上使用“设置”应用切换到其他语言或区域，除了视图顶部的标签外，结果看起来基本相同，如图 22-4 所示。如果你不确定如何更改语言，请先稍等，我们很快就会讲到。\n\
  \n![A329781_3_En_22_Fig4_HTML.jpg](img/A329781_3_En_22_Fig4_HTML.jpg)\n\n**图 22-4.**\
  \ 在设置为使用法语的 iPhone 上运行的非本地化应用\n\n### 本地化项目\n\n现在让我们对项目进行本地化。在 Xcode 的项目导航器中，单击`LocalizeMe`，在编辑区域单击`LocalizeMe`项目（不是其中一个目标），然后选择项目的\
  \ Info 标签。找到 Info 标签中的 Localizations 部分。你会看到它显示了一个本地化，即针对你的开发语言——在我的例子中，是英语。这个本地化通常被称为**基础本地化**，并且在\
  \ Xcode 创建项目时会自动添加。我们想要添加法语，因此点击 Localizations 部分底部的加号（+）按钮，并从出现的弹出列表中选择法语（fr）（见图\
  \ 22-5）。\n\n![A329781_3_En_22_Fig5_HTML.jpg](img/A329781_3_En_22_Fig5_HTML.jpg)\n\
  \n**图 22-5.** 显示本地化和其他信息的项目信息设置\n\n接下来，系统会要求你选择所有希望本地化的现有本地化文件，以及你希望新的法语本地化从哪个现有本地化开始（见图\
  \ 22-6）。有时，在添加新语言时，基于已有本地化的文件开始新语言的本地化会更有优势；例如，在一个已经翻译成法语的项目中创建瑞士法语本地化时（我们将在本章后面进行此操作），你几乎肯定会更倾向于使用现有的法语本地化作为起点，而不是使用你的基础语言。你可以通过在添加瑞士法语本地化时选择法语作为参考语言来实现。不过目前，只有两个文件需要本地化，并且只有一种起始语言可供选择（你的基础语言），因此只需保持默认设置并点击**完成**即可。\n\
  \n![A329781_3_En_22_Fig6_HTML.jpg](img/A329781_3_En_22_Fig6_HTML.jpg)\n\n**图 22-6.**\
  \ 选择本地化的文件\n\n现在你已经添加了法语本地化，请查看项目导航器。注意，`Main.storyboard`和`Launch.storyboard`文件旁边现在有一个展开三角形，就像它们是一个组或文件夹一样。展开它们并查看，如图\
  \ 22-7 所示。\n\n![A329781_3_En_22_Fig7_HTML.jpg](img/A329781_3_En_22_Fig7_HTML.jpg)\n\
  \n**图 22-7.** 可本地化文件有一个展开三角形，并且每添加一种语言或区域，就会有一个对应的子项\n\n在我们的项目中，`Main.storyboard`现在显示为一个包含两个子项的组。第一个名为`Main.Storyboard`，标记为**Base**；第二个名为`Main.strings`，标记为**法语**。基础版本是在你创建项目时自动创建的，它代表你的开发基础语言。`LaunchScreen.storyboard`文件也是如此。这些文件实际上位于两个不同的文件夹中：一个名为`Base.lproj`，另一个名为`fr.lproj`。前往访达并打开`LocalizeMe`项目文件夹中的`LocalizeMe`文件夹。除了你所有的项目文件之外，你应该会看到名为`Base.lproj`和`fr.lproj`的文件夹，如图\
  \ 22-8 所示。\n\n![A329781_3_En_22_Fig8_HTML.jpg](img/A329781_3_En_22_Fig8_HTML.jpg)\n\
  \n**图 22-8.** 从一开始，我们的 Xcode 项目就包含一个基础语言项目文件夹（`Base.lproj`）。当我们选择使一个文件可本地化时，Xcode\
  \ 为我们选择的语言创建了一个语言文件夹（`fr.lproj`）。\n\n请注意，`Base.lproj`文件夹一直存在，其中包含`Main.storyboard`和`LaunchScreen.storyboard`的副本。当\
  \ Xcode 发现某个资源恰好只有一个本地化版本时，它会将其显示为单个项目。一旦一个文件有两个或更多本地化版本，Xcode 就会将它们显示为一个组。当你要求\
  \ Xcode 创建法语本地化时，它在你的项目中创建了一个名为`fr.lproj`的新本地化文件夹，并在其中放置了包含从`Base.lproj/Main.storyboard`和`Base.lproj/LaunchScreen.storyboard`中提取的值的字符串文件。Xcode\
  \ 并没有复制这两个文件，而是从中提取了所有文本字符串，并创建了可供本地化的字符串文件。当应用程序构建并运行时，本地化字符串文件中的值会被引入，以替换故事板和启动屏幕中的值。\n\
  \n\n\n### 本地化故事板\n\n在 Xcode 的项目导航器中，选择 `Main.strings`（法语）以打开法语的 strings 文件，该文件的内容将注入到面向法语用户的故事板中。你会看到类似下面的文本：\n\
  \n```\n/* Class = \"UILabel\"; text = \"Fifth\"; ObjectID = \"5tN-O9-txB\"; */\n\
  \"5tN-O9-txB.text\" = \"Fifth\";\n/* Class = \"UILabel\"; text = \"Third\"; ObjectID\
  \ = \"GO5-hd-zou\"; */\n\"GO5-hd-zou.text\" = \"Third\";\n/* Class = \"UILabel\"\
  ; text = \"Second\"; ObjectID = \"NCJ-hT-XgS\"; */\n\"NCJ-hT-XgS.text\" = \"Second\"\
  ;\n/* Class = \"UILabel\"; text = \"Fourth\"; ObjectID = \"Z6w-b0-U06\"; */\n\"\
  Z6w-b0-U06.text\" = \"Fourth\";\n/* Class = \"UILabel\"; text = \"First\"; ObjectID\
  \ = \"kS9-Wx-xgy\"; */\n\"kS9-Wx-xgy.text\" = \"First\";\n/* Class = \"UILabel\"\
  ; text = \"Label\"; ObjectID = \"yGf-tY-SVz\"; */\n\"yGf-tY-SVz.text\" = \"Label\"\
  ;\n```\n\n每一对行都代表故事板中找到的一个字符串。注释告诉你包含该字符串的对象的类、原始字符串本身，以及每个对象的唯一标识符（在你自己的文件副本中可能不同）。注释之后的那一行正是你需要将翻译后的字符串添加到等号右侧的地方。你会看到其中一些是序数词，例如\
  \ First；这些来自图 22-4 左侧的标签，所有这些标签都在故事板中被赋予了名称。名称为 Label 的条目对应的是标题标签，它是我们通过编程方式设置的，因此你不需要对其进行本地化。\n\
  \n在 iOS 8 之前，通常的做法是通过直接编辑这个文件来本地化故事板。使用 iOS 8 时，你仍然可以选择这样做，但如果你打算聘请专业翻译人员，让他们同时翻译故事板文本和代码中的字符串可能会更方便。为此，Apple\
  \ 使得将所有需要翻译的字符串按每种语言收集到一个文件中成为可能，你可以将这个文件发送给你的翻译人员。如果你打算使用这种方法，你可以保持故事板字符串文件不变，然后进入下一步，下一步将在下一节描述。修改故事板字符串文件仍然是可行的，如果这样做，即使你需要让翻译人员修改或本地化额外的文本，这些更改也不会丢失。所以，就这次而言，让我们以传统方式本地化故事板字符串。为此，找到\
  \ First、Second、Third、Fourth 和 Fifth 标签的文本，然后将等号右侧的字符串分别改为 Premier、Deuxième、Troisième、Quatrième\
  \ 和 Cinquième（类似于）：\n\n```\n/* Class = \"UILabel\"; text = \"Fifth\"; ObjectID =\
  \ \"5tN-O9-txB\"; */\n\"5tN-O9-txB.text\" = \"Cinquième\";\n/* Class = \"UILabel\"\
  ; text = \"Third\"; ObjectID = \"GO5-hd-zou\"; */\n\"GO5-hd-zou.text\" = \"Troisième\"\
  ;\n/* Class = \"UILabel\"; text = \"Second\"; ObjectID = \"NCJ-hT-XgS\"; */\n\"\
  NCJ-hT-XgS.text\" = \"Deuxième\";\n/* Class = \"UILabel\"; text = \"Fourth\"; ObjectID\
  \ = \"Z6w-b0-U06\"; */\n\"Z6w-b0-U06.text\" = \"Quatrième\";\n/* Class = \"UILabel\"\
  ; text = \"First\"; ObjectID = \"kS9-Wx-xgy\"; */\n\"kS9-Wx-xgy.text\" = \"Premier\"\
  ;\n/* Class = \"UILabel\"; text = \"Label\"; ObjectID = \"yGf-tY-SVz\"; */\n\"yGf-tY-SVz.text\"\
  \ = \"Label\";\n```\n\n最后，保存文件。我们的故事板现在已本地化为法语。有三种方法可以查看此本地化对应用程序的影响——你可以在 Xcode\
  \ 中预览它，使用自定义的 scheme 启动它，或者更改模拟器或真实设备上的活动语言。让我们依次查看这些选项，从获取预览开始。\n\n#### 使用助手编辑器预览本地化\n\
  \n在项目导航器中选择 `Main.storyboard`，然后打开助手编辑器。在助手编辑器的跳转栏中，选择 Preview ➤ `Main.storyboard`，你将看到应用程序在基础开发语言中的显示效果，如图\
  \ 22-9 左侧所示。\n\n![A329781_3_En_22_Fig9_HTML.jpg](img/A329781_3_En_22_Fig9_HTML.jpg)\n\
  \n图 22-9. 以基础语言和法语预览应用程序\n\n在助手编辑器的右下角，你会看到当前语言（英语）已显示。点击此处可打开一个弹出菜单，列出项目中的所有本地化语言，然后选择法语。预览将更新以显示应用程序在法语用户眼中的外观，如图\
  \ 22-9 右侧所示，只是旗帜不正确。这是因为预览只考虑故事板本地化版本中的内容，而实际上我们是在代码中设置旗帜图像的。如果你使用代码来安装本地化资源，则需要选择其他选项之一以获得准确的视图。\n\
  \n#### 使用自定义 Scheme 更改语言和区域设置\n\n创建自定义 scheme 可以让你快速查看本地化版本的应用程序在模拟器或真实设备上运行的情况。与预览不同，此选项允许你查看在代码中和故事板中进行的本地化。首先，点击\
  \ Xcode 中 Scheme 选择器的左侧——你可以在顶部栏中找到它，位于“运行”和“停止”按钮旁边。当前，选择器应显示文本 `LocalizeMe`，这是当前\
  \ Scheme 的名称以及当前选中的设备或模拟器。当你点击 `LocalizeMe` 时，Xcode 会打开一个包含多个选项的弹出菜单。选择 `Manage\
  \ Schemes…` 打开 Scheme 对话框，如图 22-10 所示。\n\n![A329781_3_En_22_Fig10_HTML.jpg](img/A329781_3_En_22_Fig10_HTML.jpg)\n\
  \n图 22-10. Scheme 对话框允许你查看、添加和移除 scheme\n\n目前，只有一个 scheme。点击 scheme 列表下方的 + 图标，打开另一个窗口，你可以为你的新\
  \ scheme 选择名称。将其命名为 `LocalizeMe_fr` 并按下 OK。回到 Scheme 对话框，选择你新创建的 scheme，然后点击 `Edit…`\
  \ 打开 Scheme 编辑器（见图 22-11）。\n\n![A329781_3_En_22_Fig11_HTML.jpg](img/A329781_3_En_22_Fig11_HTML.jpg)\n\
  \n图 22-11. Scheme 编辑器，其中选择了法语作为应用语言，法国作为应用区域\n\n确保左侧列中选中了 Run，然后将注意力转向编辑器主体中的 Application\
  \ Language 和 Application Region 选择器。在这里，你可以选择使用自定义 scheme 启动应用程序时要使用的语言和区域。选择法语作为语言，法国作为区域，然后点击\
  \ `Close`。回到 Xcode 主窗口，你会看到你的新 scheme 现在已被选中。继续运行应用程序，你将看到法语本地化已生效，如图 22-12 所示。\n\
  \n![A329781_3_En_22_Fig12_HTML.jpg](img/A329781_3_En_22_Fig12_HTML.jpg)\n\n图 22-12.\
  \ 查看应用程序当前的法语状态\n\n如你所见，旗帜缺失了。当然，这是因为我们在代码中安装旗帜图像，并且尚未完成法语本地化。要恢复到基础语言视图，只需切换回原始的\
  \ `LocalizeMe` scheme 并再次运行应用程序即可。\n\n\n\n#### 在设备或模拟器上切换语言和区域设置\n\n查看应用在另一种语言或不同区域设置下显示效果的最终方法，是在模拟器或设备上切换相关设置。这比前两种方法花费的时间稍长，因此最好只在测试周期接近尾声、基本确认一切正常时才这样做。以下是将法语设为设备（或模拟器）主要语言的方法。\n\
  \n前往`设置`应用，选择`通用`行，然后选择`语言与地区`行。在此处，你便可以更改语言和区域偏好设置，如图 22-13 所示。\n\n![A329781_3_En_22_Fig13_HTML.jpg](img/A329781_3_En_22_Fig13_HTML.jpg)\n\
  \n图 22-13. 更改语言或区域设置\n\n轻点`iPhone 语言`，即可显示 iOS 已本地化的语言列表，然后找到并选择法语条目（其显示为法语原文`Français`）。你还可以将`区域`更改为法国以获得完全的地道效果，不过在本示例中并非必需，因为我们的代码中没有使用数字、日期或时间。按下`完成`，然后确认你要更改设备语言。此操作将使设备执行部分重启，耗时数秒。现在重新运行应用，你会再次看到左侧的标签显示的是本地化后的法语文本（见图\
  \ 22-12）。然而，与之前一样，国旗仍然缺失，右侧的文本列也依然不正确。我们将在下一部分处理这些问题。\n\n### 生成并本地化字符串文件\n\n在图 22-12\
  \ 中，视图右侧的文字仍为`全大写`样式，因为我们尚未对其进行翻译；你所看到的是`NSLocalizedString()`用于查找本地化文本的键。为了本地化这些文本，我们首先需要从代码中提取键和注释字符串。幸运的是，Xcode\
  \ 可以轻松地从项目中提取需要本地化的文本，并将其放入每种语言对应的独立文件中。让我们来看看具体如何操作。\n\n在`项目导航器`中，选择你的项目。在编辑器中，选择项目或其某个目标。然后从菜单中依次选择`编辑器`\
  \ ➤ `导出本地化…`。这将打开一个对话框，供你选择要本地化的语言以及每种语言文件的写入位置。为文件选择一个合适的位置（例如，在项目根目录下新建一个名为`XLIFF`的文件夹），确保`现有翻译`和`法语`两个复选框均已选中，然后按`存储`。Xcode\
  \ 会在你选择的文件夹内，于名为`LocalizeMe`的文件夹中创建一个名为`fr.xliff`的文件。如果你打算使用第三方服务来翻译应用的文本，他们很可能能够处理\
  \ XLIFF 文件——你只需将此文件发送给他们，让他们用翻译后的字符串更新该文件，再重新导入 Xcode 即可。不过，现在我们打算自己进行翻译。\n\n打开`fr.xliff`文件。你会看到其中包含大量\
  \ XML。它分为三个不同的部分，分别包含来自故事板的字符串、Xcode 在源代码中找到的字符串，以及来自应用`信息属性列表`文件中的一些可本地化值。我们将在本章后面讨论为什么需要本地化`Info.plist`中的条目。现在，我们先来翻译来自应用代码的文本。浏览文件，你会找到嵌入在如下\
  \ XML 中的文本：\n\n```\n<file>\n  <trans-unit>\n    <source>FLAG_FILE</source>\n   \
  \ <note>国旗名称</note>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_FIVE</source>\n\
  \    <note>数字 5</note>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_FOUR</source>\n\
  \    <note>数字 4</note>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_ONE</source>\n\
  \    <note>数字 1</note>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_THREE</source>\n\
  \    <note>数字 3</note>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_TWO</source>\n\
  \    <note>数字 2</note>\n  </trans-unit>\n</file>\n```\n\n请注意，`<file>`元素有一个`target-language`属性，指明了文本需要翻译成的语言，并且每个需要翻译的字符串都有一个嵌套的`<trans-unit>`元素。每个元素都包含一个包含原始文本的`<source>`元素，以及一个包含源代码中`NSLocalizedString()`调用注释的`<note>`元素。专业翻译人员拥有软件工具，可以展示该文件中的信息并允许他们输入翻译内容。而我们将通过添加包含法语文本的`<target>`元素来手动完成，如下所示：\n\
  \n```\n<file>\n  <trans-unit>\n    <source>FLAG_FILE</source>\n    <note>国旗名称</note>\n\
  \    <target>flag_france</target>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_FIVE</source>\n\
  \    <note>数字 5</note>\n    <target>Cinq</target>\n  </trans-unit>\n  <trans-unit>\n\
  \    <source>LABEL_FOUR</source>\n    <note>数字 4</note>\n    <target>Quatre</target>\n\
  \  </trans-unit>\n  <trans-unit>\n    <source>LABEL_ONE</source>\n    <note>数字 1</note>\n\
  \    <target>Un</target>\n  </trans-unit>\n  <trans-unit>\n    <source>LABEL_THREE</source>\n\
  \    <note>数字 3</note>\n    <target>Trois</target>\n  </trans-unit>\n  <trans-unit>\n\
  \    <source>LABEL_TWO</source>\n    <note>数字 2</note>\n    <target>Deux</target>\n\
  \  </trans-unit>\n</file>\n```\n\n如果你还没有翻译故事板字符串，现在也可以一并处理。它们位于一个独立的`<trans-unit>`元素块中，由于注释中包含了来源标签的链接，因此很容易找到。另一方面，如果你已经完成了翻译，你会发现\
  \ Xcode 已将其包含在 XLIFF 文件中，如下所示：\n\n```\n<trans-unit>\n  <source>Third</source>\n\
  \  <target>Troisième</target>\n  <note>Class = \"UILabel\"; text = \"Third\"; ObjectID\
  \ = \"GO5-hd-zou\";</note>\n</trans-unit>\n<trans-unit>\n  <source>Second</source>\n\
  \  <target>Deuxième</target>\n  <note>Class = \"UILabel\"; text = \"Second\"; ObjectID\
  \ = \"NCJ-hT-XgS\";</note>\n</trans-unit>\n```\n\n\n\n保存您的翻译。下一步是将结果导回 Xcode。确保在项目导航器中选中了项目。然后，在菜单栏中选择\
  \ **Editor** ➤ **Import Localizations**，导航到您的文件并打开它。Xcode 会显示一个已翻译的键及其翻译列表。按下 **Import**\
  \ 完成导入过程。如果您查看项目导航器，会看到已添加了两个文件——`InfoPlist.strings` 和 `Localizable.strings`。打开\
  \ `Localizable.strings`，您会看到它包含 Xcode 从 `ViewController.swift` 中提取的字符串的法语翻译：\n\n\
  ```\n/* 国旗的名称 */\n\"FLAG_FILE\" = \"flag_france\";\n/* 数字 5 */\n\"LABEL_FIVE\" =\
  \ \"Cinq\";\n/* 数字 4 */\n\"LABEL_FOUR\" = \"Quatre\";\n/* 数字 1 */\n\"LABEL_ONE\"\
  \ = \"Un\";\n/* 数字 3 */\n\"LABEL_THREE\" = \"Trois\";\n/* 数字 2 */\n\"LABEL_TWO\"\
  \ = \"Deux\";\n```\n\n现在，以法语作为活动语言构建并运行应用。您应该会看到右侧的标签已翻译成法语，并且在屏幕底部，您应该会看到法国国旗，如图\
  \ 22-14 所示。\n\n![A329781_3_En_22_Fig14_HTML.jpg](img/A329781_3_En_22_Fig14_HTML.jpg)\n\
  \n图 22-14. 我们已正确本地化的应用（法语版），包含正确的国旗\n\n那么，我们完成了吗？还没有。以英语作为活动语言重新运行应用。您会看到未本地化的应用版本，如图\
  \ 22-3 所示。要使应用在英语下正常工作，我们需要为其进行英语本地化。为此，在项目导航器中选择项目，然后从菜单中选择 **Editor** ➤ **Export\
  \ for Localization…** 以再次导出用于本地化的字符串；但这次，选择 **Development Language Only**，然后按 **Save**。这将创建一个名为\
  \ `en.xliff` 的文件，我们将在其中添加英语本地化。编辑该文件并进行以下更改：\n\n```\nFLAG_FILE\n国旗的名称\nflag_usa\n\
  \nLABEL_FIVE\n数字 5\nFive\n\nLABEL_FOUR\n数字 4\nFour\n\nLABEL_ONE\n数字 1\nOne\n\nLABEL_THREE\n\
  数字 3\nThree\n\nLABEL_TWO\n数字 2\nTwo\n```\n\n使用 **Editor** ➤ **Import Localizations**\
  \ 将这些更改导回 Xcode。\n\nXcode 会创建一个名为 `en.lproj` 的文件夹，并向其中添加包含英语本地化的文件 `InfoPlist.strings`、`Localizable.strings`\
  \ 和 `Main.strings`。您添加的是对国旗图像文件的引用以及用于替换代码中 `NSLocalizedString()` 函数调用中使用的键的文本。现在，如果您以英语作为所选语言运行应用，将看到正确的英语文本和美国国旗。\n\
  \n之所以需要为基础本地化提供国旗图像文件名和文本字符串，是因为我们在调用 `NSLocalizedString()` 时选择不使用本地化文本作为键。如果我们做了类似以下的操作，那么英语文本将出现在任何没有本地化的语言的用户界面中，即使我们没有提供基础本地化：\n\
  \n```\nlabels[0].text = NSLocalizedString(\"One\", comment: \"数字 1\")\nlabels[1].text\
  \ = NSLocalizedString(\"Two\", comment: \"数字 2\")\nlabels[2].text = NSLocalizedString(\"\
  Three\", comment: \"数字 3\")\nlabels[3].text = NSLocalizedString(\"Four\", comment:\
  \ \"数字 4\")\nlabels[4].text = NSLocalizedString(\"Five\", comment: \"数字 5\")\nlet\
  \ flagFile = NSLocalizedString(\"flag_usa\", comment: \"国旗的名称\")\n```\n\n虽然这完全合法，但缺点是，如果您需要更改任何英语文本字符串，您也在更改用于查找所有其他语言字符串的键，因此您需要手动更新所有本地化的\
  \ `.strings` 文件，以便它们使用新的键。\n\n### 本地化应用显示名称\n\n我们想探索最后一个常用的本地化部分：本地化在主屏幕和其他地方可见的应用名称。Apple\
  \ 为其多个内置应用做了这项工作，您可能也想这样做。用于显示的应用名称存储在您应用的 `Info.plist` 文件中，您可以在项目导航器中找到该文件。选择此文件进行编辑，您会看到它包含的一个项\
  \ **Bundle name** 当前设置为 `${PRODUCT_NAME}`。在 `Info.plist` 文件使用的语法中，任何以美元符号开头的内容都受变量替换的影响。在这种情况下，这意味着当\
  \ Xcode 编译应用时，此项的值将被替换为此 Xcode 项目中产品的名称，即应用本身的名称。这正是我们想要进行本地化的地方，将 `${PRODUCT_NAME}`\
  \ 替换为每种语言的本地化名称。然而，事实证明，这并不像您想象的那么简单。\n\n`Info.plist` 文件算是一个特殊情况，它本身并非设计为可本地化的。相反，如果您想要本地化\
  \ `Info.plist` 的内容，您需要创建名为 `InfoPlist.strings` 的文件的本地化版本。在此之前，您需要创建该文件的基础版本。如果您按照上一节的步骤本地化了应用，您应该已经有此文件的英文和法文版本，且它们都是空的。如果您没有这些文件，可以按如下方式添加一个：\n\
  \n1.  选择 **File** ➤ **New** ➤ **File…**。在 iOS 部分，选择 **Resource**，然后选择 **Strings\
  \ File**（见图 22-15）。按 **Next**，将文件命名为 `InfoPlist.strings`，将其分配给 `LocalizeMe` 项目中的\
  \ **Supporting Files** 组，然后创建它。\n\n![A329781_3_En_22_Fig15_HTML.jpg](img/A329781_3_En_22_Fig15_HTML.jpg)\n\
  \n图 22-15. iOS 资源文件类型选择下的 Strings File 选项  \n\n2.  选择新文件，在文件检查器中按 **Localize**。在出现的对话框中，将该文件移至英语本地化。返回文件检查器，在\
  \ **Localizations** 下勾选法语的复选框。您现在应该在项目导航器中看到此文件的法语和英语副本。\n\n我们需要在每个本地化副本中添加一行，以定义应用的显示名称。在\
  \ `Info.plist` 文件中，我们看到显示名称与一个名为 **Bundle name** 的字典键关联；然而，这并不是真正的键名。它只是 Xcode 的一个贴心设计，试图为我们提供一个更友好且可读的名称。真正的名称是\
  \ `CFBundleName`，您可以通过选择 `Info.plist`，在视图中的任意位置右键单击，然后选择 **Show Raw Keys/Values**\
  \ 来验证。这会显示所用键的真实名称。因此，选择 `InfoPlist.strings` 的英语本地化文件，并添加或修改以下行：\n\n```\n\"CFBundleName\"\
  \ = \"Localize Me\";\n```\n\n如果您按照英语本地化步骤操作，此键可能已经存在，因为它是导入 XLIFF 文件过程的一部分。实际上，另一种本地化应用名称的方法是将翻译添加到\
  \ XLIFF 文件中，方式与处理其他需要翻译的文本相同——只需查找 `CFBundleName` 的条目，并添加一个包含翻译名称的 `<trans>` 元素。类似地，选择\
  \ `InfoPlist.strings` 文件的法语本地化文件，并编辑它，为应用提供一个合适的法语名称：\n\n```\n\"CFBundleName\" =\
  \ \"Localisez Moi\";\n```\n\n\n\n### 构建并运行应用  \n构建并运行应用，然后返回启动屏幕。当然，如果当前设备或模拟器运行的是英文，请将其切换为法语。你应该能看到应用图标正下方显示的本地化名称，但有时它可能不会立即出现。iOS\
  \ 似乎会在添加新应用时缓存此信息，但当现有应用被新版本替换时（至少当 Xcode 执行替换时），它不一定会更新。因此，如果你在法语环境下运行且未看到新名称，请不要担心。只需从启动屏幕中删除应用，返回\
  \ Xcode，然后再次构建并运行应用即可。\n\n### 警告  \n如果你通过自定义方案运行应用，将无法看到本地化的应用名称。唯一的方法是切换设备或模拟器的语言为法语。\n\
  \n现在，我们的应用已完全本地化为法语和英语。\n\n### 添加另一种本地化  \n最后，我们将为应用添加另一种本地化。这次，我们将其本地化为瑞士法语，这是法语的一种区域变体，语言代码为\
  \ `fr-CH`。\n\n基本原理与之前相同——实际上，既然你已经完成过一次，这次应该会快得多。首先在项目导航器中选择项目，然后在编辑器中选择项目本身，接着选择\
  \ `Info` 标签页。在 `Localizations` 部分，点击 `+` 添加新语言。菜单中不会看到瑞士法语，因此向下滚动并选择 `Other`。这将打开一个包含大量语言的子菜单（幸运的是，它们按字母顺序排列）。向下滚动，找到\
  \ `French (Switzerland)` 并选择它。在出现的对话框中（如图 22-6 所示），将所有列出的文件的 `Reference Language`\
  \ 更改为 `French`，以便 Xcode 使用现有的法语翻译作为瑞士法语本地化的基础，然后点击 `Finish`。现在，如果你查看项目导航器，会看到故事板、本地化字符串和\
  \ `InfoPlist.strings` 文件的瑞士法语版本。为了演示此本地化与法语本地化的区别，请打开瑞士法语版本的 `InfoPlist.strings`，并将包名称更改为以下内容：\n\
  \n```\n\"CFBundleName\" = \"Swiss Localisez Moi\";\n```\n\n现在构建并运行应用。切换到“设置”应用并进入“语言与地区”。你可能不会在\
  \ iPhone 语言列表中找到瑞士法语。相反，请点击“添加语言…”并向下滚动（或搜索），找到 `French (Switzerland)`，然后选择它并点击“完成”。这将弹出一个操作表，询问你更喜欢瑞士法语还是当前语言。选择瑞士法语，让\
  \ iOS 自行重置。转到主屏幕，现在你应该看到我们的应用名称为 `Swiss Localisez Moi`（实际上，你可能看不到完整名称，因为它太长，但你明白意思）。如果你打开应用，会看到所有文本都是法语的。遗憾的是，国旗仍然是法国国旗，而不是瑞士国旗。到现在，你应该能够通过编辑瑞士本地化文件来解决这个问题。因此，作为练习，尝试从互联网下载瑞士国旗图片，看看能否使其出现在瑞士版本的应用中。\n\
  \n### 总结  \n为了最大化 iOS 应用的销量，你可能希望尽可能地进行本地化。幸运的是，iOS 本地化架构使应用内支持多种语言，甚至同一种语言的多种方言变得轻而易举。正如本章所见，添加到应用中的几乎所有类型的文件都可以进行本地化。\n\
  \n即使你不打算本地化应用，也应养成使用 `NSLocalizedString()` 的习惯，而不是在代码中直接使用静态字符串。借助 Xcode IDE 的代码补全功能，输入时间的差异几乎可以忽略不计。而且，如果你将来希望翻译应用，生活将变得轻松得多。在项目后期才回头查找所有应本地化的文本字符串，是一个既枯燥又容易出错的过程，而通过一点前期努力即可避免。\n\
  \n### 书籍总结  \n我们在这本书中接触的编程语言和框架，是超过 25 年演进的最终成果。苹果工程师们正夜以继日地工作，构思下一个酷炫的新事物。iOS 平台刚刚开始绽放，未来还有更多精彩。通过读完本书，你已经为自己打下了坚实的基础。你已扎实掌握了\
  \ Swift、Cocoa Touch，以及将这些技术融合起来创建令人惊叹的 iPhone、iPod touch 和 iPad 应用的工具。你理解了 iOS 软件架构——那些让\
  \ Cocoa Touch 绽放光彩的设计模式。简言之，你已准备好规划自己的道路。祝你好运。\n\n# Swift 简介  \n直到最近，编写 iPhone 或\
  \ iPad 应用意味着需要与 Objective-C 打交道。由于其不寻常的语法，Objective-C 是最具两极分化的编程语言之一——人们要么爱它，要么恨它。在\
  \ 2014 年的全球开发者大会上，苹果通过推出一门名为 Swift 的新语言改变了这一切。Swift 的语法设计旨在让习惯了 C++ 和 Java 等更流行的面向对象编程语言的程序员能够轻松识别，从而使他们更容易开始为\
  \ iOS（以及 Mac，因为 Swift 在 macOS 上也完全被支持作为开发语言）编写应用。本附录涵盖了理解本书示例代码所需了解的 Swift 部分。我们假设你已经具备一些编程经验，并且知道变量、函数、方法和类是什么。本附录既不是语言参考，也不是详尽指南——如需更全面的资料，请参考其他众多资源，其中一些列在第\
  \ 1 章中。\n\n## Swift 基础  \nXcode 6 中与 Swift 一同推出的最有用的新特性之一是`playground`（游乐场）。顾名思义，游乐场是一个你可以自由尝试代码的地方，无需创建运行环境——只需打开一个游乐场，输入一些代码，然后查看结果。游乐场是原型开发新功能的好地方，也是学习新语言的理想起点，因此我们将在本附录中一直使用它们。\n\
  \n让我们从创建一个新的游乐场开始。启动 Xcode，进入 `File` ➤ `New` ➤ `Playground…`。在打开的对话框中，为你的游乐场命名（例如\
  \ `SwiftBasics`），确保 Platform 为 `iOS`，然后点击 `Next`。选择保存游乐场的文件夹，然后点击 `Create`。Xcode\
  \ 会创建游乐场并在新窗口中打开，如图 A-1 所示。在阅读本附录中的示例时，请随意在游乐场中添加自己的代码或修改示例，看看会发生什么。\n\n![A329781_3_En_23_Fig1_HTML.jpg](img/A329781_3_En_23_Fig1_HTML.jpg)\n\
  \n**图 A-1.** 新创建的游乐场\n\n\n\n### 游乐场、注释、变量与常量\n\n我们先花点时间看看游乐场（Playground）的布局。它被划分为两个区域——代码位于左侧，结果显示在右侧。当你输入代码时，Swift\
  \ 编译器会立即编译并执行这些代码，并近乎实时地向你展示结果。图 A-1 中的代码声明了一个名为 `str` 的新变量，并用字符串 `\"Hello, playground\"\
  ` 对其进行了初始化。你可以在右侧的结果栏中看到这个字符串。尝试修改该值，你会注意到一旦停止输入，结果就会随之更新。\n\n图 A-1 中第 1 行代码是一个注释。编译器会忽略字符序列\
  \ `//` 之后直到行尾的所有内容。在这里，注释占据了整行，但这并非唯一的选择。我们也可以将注释添加到一行代码的末尾，如下所示：\n\n```\nvar str\
  \ = \"Hello, playground\"   // 我对这一行的注释\n```\n\n要编写跨越多行的注释，请以 `/*` 开头，以 `*/` 结尾，就像这样：\n\
  \n```\n/*\n这是一个注释，它占据了\n不止一行。\n*/\n```\n\n编写多行注释有多种不同方式。有些人喜欢通过在每行开头加上 `*` 字符来明确表明该行是注释的一部分：\n\
  \n```\n/*\n* 这是一个注释，它占据了\n* 不止一行。\n*/\n```\n\n另一些人则喜欢这样编写单行注释：\n\n```\n/* 这是编写单行注释的另一种方式。\
  \ */\n```\n\n图 A-1 中第 3 行的 `import` 语句使得 Apple 的 UIKit 框架可在游乐场中使用：\n\n```\nimport\
  \ UIKit\n```\n\niOS 包含许多框架，其中一些你会在本书中读到。UIKit 是用户界面框架，我们将在所有代码示例中使用它。另一个你会经常用到的框架是\
  \ Foundation，它包含提供基本功能的类，如日期和时间处理、集合、文件管理、网络等。要访问这个框架，你需要像这样导入它：\n\n```\nimport\
  \ Foundation\n```\n\n但是，UIKit 会自动导入 Foundation，因此任何导入了 UIKit 的游乐场都会自动获得 Foundation\
  \ 的访问权限，而无需显式地为其添加 import 语句。\n\n第 5 行是这个游乐场中第一行（也是唯一一行）可执行代码：\n\n```\nvar str =\
  \ \"Hello, playground\"\n```\n\n`var` 关键字声明了一个带有给定名称的新变量。在这里，该变量名为 `str`，这很合适，因为它是一个字符串。Swift\
  \ 对变量名非常宽容：在名称中你几乎可以使用任何你喜欢的字符，但首字符有一些限制。你可以在 Apple 的文档 [`developer.apple.com/library/ios/documentation/Swift/Conceptual/Swift_Programming_Language`](https://developer.apple.com/library/ios/documentation/Swift/Conceptual/Swift_Programming_Language)\
  \ 中找到具体规则。\n\n在变量声明之后，是一个为其分配初始值的表达式。你不必在声明变量时就初始化它，但必须在*使用*它之前（即，在执行任何读取其值的代码之前）进行初始化。然而，如果你选择赋值，那么\
  \ Swift 可以推断出变量的类型，省去你显式声明类型的麻烦。在这个例子中，Swift 推断 `str` 是一个字符串变量，因为它被一个字符串字面量初始化了。如果你选择不提供初始化器（可能因为没有固定的初始值），你必须通过在变量名后附加其类型，并用冒号分隔来声明变量的类型，就像这样：\n\
  \n```\nvar str2: String            // 一个未初始化的变量\n```\n\n尝试将游乐场中第 5 行的代码修改为：\n\n\
  ```\nvar str: String\nstr = \"Hello, playground\"\n```\n\n这与原始代码完全等效，但现在你不得不显式声明\
  \ `str` 是一个字符串变量（`String` 是 Swift 中表示字符串的类型）。在大多数情况下，将声明和初始化结合起来，并让编译器推断变量的类型会更简单。\n\
  \n另一个利用 Swift 类型推断特性的例子如下：\n\n```\nvar count = 2\n```\n\n这里，编译器推断 `count` 变量是一个整数。它的实际类型是\
  \ `Int`（我们将在下一节介绍 Swift 提供的数值类型）。你怎么能确定情况确实如此呢？很简单。让 Swift 告诉你。将上述代码输入游乐场，将鼠标悬停在\
  \ `count` 上，然后按住 ⌥（Option）键。光标会变成一个问号。现在点击鼠标，Swift 会通过一个弹出窗口向你展示它为该变量推断出的类型，如图 A-2\
  \ 所示。\n\n![A329781_3_En_23_Fig2_HTML.jpg](img/A329781_3_En_23_Fig2_HTML.jpg)\n\n\
  **图 A-2.** 获取变量的推断类型\n\n你没有显式声明变量的类型并不意味着它没有类型，或者你可以随意对待它。Swift 在变量声明时分配一个类型，之后你必须坚持使用该类型。与\
  \ JavaScript 这样的动态语言不同，你不能仅仅通过给变量赋一个新值来改变它的类型。尝试这样做：\n\n```\nvar count = 2\ncount\
  \ = \"Two\"\n```\n\n尝试将一个字符串值赋给一个整数变量会导致错误；你会在游乐场左侧的空白处看到一个红色标记。点击它，Swift 会显示一条消息来解释问题（见图\
  \ A-3）。\n\n![A329781_3_En_23_Fig3_HTML.jpg](img/A329781_3_En_23_Fig3_HTML.jpg)\n\
  \n**图 A-3.** Swift 不是动态语言。你不能改变变量的类型\n\n如果你之前有编程经验，可能会注意到我们没有费心在语句末尾添加分号。这是 Swift\
  \ 众多好用的特性之一：几乎从未必要用分号结束一条语句。如果你习惯用 C、C++、Objective-C 或 Java 编写代码，一开始可能会觉得有点奇怪，但一段时间后，你就会习惯了。当然，如果你想的话，也可以输入分号，但很可能最后你就不这么做了。唯一必须使用分号的情况是，如果你想在同一行编写两条语句。以下代码是无效的：\n\
  \n```\nvar count = 2 count = 3\n```\n\n加上一个分号，编译器就又会满意了：\n\n```\nvar count = 2;\
  \ count = 3\n```\n\n正如上面的代码所示，你可以改变一个变量的值。毕竟，这就是它被称为变量的原因。如果你只想给一个固定值取个名字呢？换句话说，你想创建一个常量并给它命名。为此，Swift\
  \ 提供了 `let` 语句，它和 `var` 很像，只是你必须提供一个初始值：\n\n```\nlet pi = 3.14159265\n```\n\n与变量一样，Swift\
  \ 可以推断常量的类型（或者你也可以显式声明它），但是你不能重新赋值一个常量的值，这当然是将其设为常量的目的所在：\n\n```\npi = 42      \
  \ // 错误 – 无法赋值给 ‘pi’：'pi' 是一个 ‘let’ 常量\n```\n\n当然，你可以用一个常量来初始化一个变量的值：\n\n```\nlet\
  \ pi = 3.14159265\nvar value = pi\n```\n\n如你所见，Swift 会将可执行语句的结果打印到对应代码的右侧。你也可以使用\
  \ Swift 标准库中的 `print()` 函数来创建输出。例如，尝试一下：\n\n```\nprint(\"Hello, world\")\n```\n\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文。\n\n\n字符串`\"Hello, world\"`后跟一个换行符会像往常一样出现在\
  \ Playground 的输出区域中，但你也可以让它与代码内联显示。为此，将鼠标悬停在结果区域上，你会看到出现几个圆形控件。点击右侧的控件，结果就会直接显示在`print()`语句下方，如图\
  \ A-4 所示。此外，请注意底部还有一个调试区域，输出也会显示在其中。你可以通过点击 Playground 底部左侧的三角形展开按钮来打开或关闭调试区域。\n\
  \n![A329781_3_En_23_Fig4_HTML.jpg](img/A329781_3_En_23_Fig4_HTML.jpg)\n\n**图 A-4.**\
  \ 在代码中内联显示输出以及在调试区域中显示输出\n\n如果你不想让换行符自动附加到字符串上，可以使用一个稍有不同的`print()`版本（它接受一个额外参数）来去除或替换它。试试这个：\n\
  \n```\nprint(\"Hello, world\", terminator: \"\")\n```\n\n这段代码将换行符替换为空字符串。如果你在结果区域中查看，会发现换行符不再存在了。\n\
  \n**提示**\n\n`print()`是 Swift 标准库中的一个函数。你可以在[`https://developer.apple.com/library/ios/documentation/General/`](https://developer.apple.com/library/ios/documentation/General/)\
  \ `Reference/SwiftStandardLibraryReference`找到该库的文档。另一种查看标准库内容的方法是，在你的 Playground\
  \ 中添加一行`import Swift`，然后按住`⌘`（Cmd）键并点击`Swift`这个词。Playground 会切换到标准库内容的列表。这里包含大量信息，你需要了解更多\
  \ Swift 知识才能完全理解，但浏览一下以了解有什么可用内容是值得的。\n\n### 预定义类型、运算符和控制语句\n\nSwift 带有一组基本的预定义类型。在后面的章节中，你将看到可以通过定义自己的类、结构体和枚举来扩展这些类型。你甚至可以通过创建类型的扩展来为现有类型添加功能。Swift\
  \ 还提供了运算符和控制语句，这些对你来说很可能在其他语言中已经很熟悉。让我们从基本类型的快速概览开始。\n\n#### 数值类型\n\nSwift 有四种基本的数值类型——`Int`、`UInt`、`Float`、`Double`——以及一组更专门的整数类型。完整的整数类型集，包括其大小（以位为单位）以及它们可以表示的值范围，列在表\
  \ A-1 中。\n\n**表 A-1.** 整数类型\n\n| 类型 | 大小（位） | 最大值 | 最小值 |\n| --- | --- | --- | ---\
  \ |\n| `Int` | 32 或 64 | 与`Int32`或`Int64`相同 | 与`Int32`或`Int64`相同 |\n| `UInt` | 32\
  \ 或 64 | 与`UInt32`或`UInt64`相同 | 0 |\n| `Int64` | 64 | 9,223,372,036,854,775,807\
  \ | –9,223,372,036,854,775,808 |\n| `UInt64` | 64 | 18,446,744,073,709,551,615 |\
  \ 0 |\n| `Int32` | 32 | 2,147,483,647 | –2,147,483,648 |\n| `UInt32` | 32 | 4,294,967,295\
  \ | 0 |\n| `Int16` | 16 | 32767 | –32768 |\n| `UInt16` | 16 | 65535 | 0 |\n| `Int8`\
  \ | 8 | 127 | –128 |\n| `UInt8` | 8 | 255 | 0 |\n\n`Int`及其衍生类型是有符号值，而与`UInt`相关的类型是无符号的。整数值的默认类型（即当你编写类似`var\
  \ count = 3`时推断的类型）是`Int`，并且除非你有特定理由使用其他类型，否则这是推荐使用的类型。\n\n从表中可以看出，`Int`和`UInt`可以表示的值范围取决于平台。在\
  \ 32 位系统上（例如某些 iPad、所有 iPhone 4s 之前的 iPhone 以及 iPhone 5c），这些都是 32 位值，而在 64 位系统上，它们是\
  \ 64 位宽。如果你需要一个明确是 32 位或明确是 64 位的值，那么请使用`Int32`或`Int64`。`Int8`和`UInt8`类型可用于表示字节。\n\
  \n你可以通过使用它们的`max`和`min`属性以编程方式发现每种类型的最大值和最小值。例如，尝试在你的 Playground 中输入以下代码行（不包含注释，注释显示了结果）：\n\
  \n```\nprint(Int8.max)       // 127\nprint(Int8.min)       //  -128\nprint(Int32.max)\
  \     // 2,147,483,647\nprint(Int32.min)     // -2,147,483,648\nprint(UInt32.max)\
  \     // 4,294,967,295\n```\n\n整数字面量可以用十进制、十六进制、八进制或二进制数基书写。尝试以下示例：\n\n```\nlet\
  \ decimal = 123         // 值为 123\nlet octal = 0o77          // 八进制 77 = 十进制 63\n\
  let hex = 0x1234          // 十六进制 1234 = 十进制 4660\nlet binary = 0b1010       //\
  \ 二进制 1010 = 十进制 10\n```\n\n前缀`0o`表示八进制，`0x`表示十六进制，`0b`表示二进制。为了可读性，你还可以在任何位置使用下划线字符（`_`）来分隔数字组：\n\
  \n```\nlet v = -1_234           // 等同于 -1234\nlet w = 12_34_56         // 等同于 123456\n\
  ```\n\n注意，你不必遵循按三位数字一组分组的常规规则。\n\n`Float`和`Double`类型分别是 32 位和 64 位浮点数。你可以通过使用浮点字面量给浮点变量赋值。除非另有指定，Swift\
  \ 会推断类型为`Double`：\n\n```\nlet a = 1.23             // 被推断为 Double\nlet b: Float\
  \ = 1.23      // 强制为 Float\n```\n\n你还可以使用指数（或科学）表示法，这对大数字很方便：\n\n```\nlet c = 1.23e2\
  \         // 计算结果为 123.0\nlet d = 1.23e-1        // 计算结果为 0.123\nlet e = 1.23E-1\
  \        // 等同于 1.23e-1\n```\n\n就其本质而言，浮点数并不是完全精确的。原因之一是，小数值无法在二进制浮点形式中精确表示。如果你在\
  \ Playground 中输入以下内容，可以看到这一点（和之前一样，注释显示了结果）：\n\n```\nlet f: Float = 0.123456789123\
  \        // 0.1234568\nlet g: Double = 0.123456789123       // 0.123456789123\n\
  ```\n\n你可以看到，该值的`Float`表示不如`Double`表示精确。如果你使小数部分更长，也会超出`Double`格式的精度。\n\n\n\n```swift\n\
  let g: Double = 0.12345678912345678  // 0.1234567891234568\n```\n\n当数值很大时，浮点数同样会丢失精度：\n\
  \n```swift\nlet f: Float = 123456789123456        // 不精确：1.234568e+14\nlet g: Double\
  \ = 123456789123456       // 精确：123,456,789,123,456.0\nlet h: Double = 123456789123456789\
  \    // 不精确：1.234567891234568e+17\n```\n\n与其他语言不同，当你将一种数值类型的变量（或表达式）赋值给另一种数值类型的变量时，Swift\
  \ 不会提供隐式类型转换。例如，如图 A-5 所示，以下代码无法编译通过。\n\n![A329781_3_En_23_Fig5_HTML.jpg](img/A329781_3_En_23_Fig5_HTML.jpg)\n\
  \n**图 A-5.** Swift 不允许组合不同类型的变量\n\n```swift\nlet a = 123\nlet b = 0.456\nlet c =\
  \ a + b\n```\n\n变量 `a` 是 `Int` 类型，而 `b` 是 `Double` 类型。Swift 本可以将 `Int` 转换为 `Double`\
  \ 并执行加法，但它不会这样做。你必须自己执行转换：\n\n```swift\nlet a = 123\nlet b = 0.456\nlet c = Double(a)\
  \ + b\n```\n\n表达式 `Double(a)` 调用了 `Double` 类型的一个初始化器，该初始化器接收一个整数参数。所有的数值类型都提供了这种初始化器，让你能够执行此类转换。\n\
  \n另一个常见例子涉及 `CGFloat` 类型。`CGFloat` 是由 Core Graphics 框架定义的一种浮点类型。它用于表示坐标和尺寸等属性。根据应用程序运行在\
  \ 32 位还是 64 位平台，它等同于 `Float` 或 `Double`。要执行涉及 `CGFloat` 和其他类型混合的操作，你需要显式地将一种类型转换为另一种。例如，以下代码将一个\
  \ `Double` 和一个 `CGFloat` 相加，通过将 `Double` 转换为 `CGFloat` 来生成一个 `CGFloat` 类型的结果：\n\n\
  在 32 位平台上，`CGFloat` 的精度低于 `Double`，因此此操作可能会丢失信息，但如果你需要得到一个 `CGFloat` 类型的值，这是不可避免的。如果你需要\
  \ `Double` 类型的结果，可以将 `CGFloat` 转换为 `Double`，且不会损失精度：\n\n```swift\nlet a: CGFloat\
  \ = 123\nlet b: Double = 456\nlet c = Double(a) + b    // 结果为 Double 类型\n```\n\n\
  需要注意的是，当所有涉及的值都是字面量时，Swift 允许你混合使用数值类型。例如：\n\n```swift\n1 + 0.5      // 计算结果为 1.5\n\
  ```\n\n你在 Swift 中能找到所有常见的二元算术运算符。你可以用它们来组合相同类型的数值；如你刚刚所见，如果显式转换其中一个操作数，也可以将它们应用于不同类型的数值。表\
  \ A-2 列出了可用的算术运算符。运算符按优先级递减的顺序列出。\n\n**表 A-2.** 预定义的二元算术运算符\n\n| 运算符 | 含义 |\n| ---\
  \ | --- |\n| `<<` | 按位左移 |\n| `>>` | 按位右移 |\n| `*`, `&*` | 乘法 |\n| `/`, `&/` | 除法\
  \ |\n| `%`, `&%` | 取余 |\n| `&` | 按位与 |\n| `+`, `&+` | 加法 |\n| `-`, `&-` | 减法 |\n\
  | `&#124;` | 按位或 |\n| `^` | 按位异或 |\n\n算术运算 `+`、`-`、`*`、`/` 和 `%` 会检测溢出。如果你希望忽略溢出，请改用\
  \ `&+`、`&-`、`&*`、`&/` 或 `&%`。例如，在 playground 中输入以下代码：\n\n```swift\nlet a = Int.max\n\
  let b = 1\nlet c = Int.max + b\n```\n\n我们将 1 加到最大可表示整数值上，这将触发溢出。在 playground 中，你会看到赋值给变量\
  \ `c` 的那一行出现错误信息；但如果你在应用程序中执行相同的代码，程序将会崩溃。若要允许操作继续并忽略溢出，请改用 `&+`：\n\n```swift\n\
  let a = Int.max\nlet b = 1\nlet c = a &+ b\n```\n\n`<<` 和 `>>` 运算符将左操作数按右操作数指定的数量进行左移和右移。这相当于乘以或除以\
  \ 2 的幂。例如：\n\n```swift\nlet a = 4\nlet b = a << 1   // 结果为 8\n```\n\n当左操作数为负数时，结果的符号保持不变：\n\
  \n```swift\nlet a = -4\nlet b = a << 1   // 结果为 -8\n```\n\n`&`、`|` 和 `^` 运算对其操作数执行按位与、或和异或操作。不要将它们与\
  \ `&&` 和 `||` 运算符混淆，后者是返回布尔结果的逻辑运算符（参见本附录后面的“布尔值”部分）。以下是一些例子：\n\n```swift\nlet a\
  \ = 7          // 值 0b111\nlet b = 3          // 值 0b011\nlet c = a & b      //\
  \ 结果为 0b011 = 3\n\nlet a = 7          // 值 0b111\nlet b = 3          // 值 0b011\n\
  let c = a | b      // 结果为 0b111 = 7\n\nlet a = 7          // 值 0b111\nlet b = 3\
  \          // 值 0b011\nlet c = a ^ b      // 结果为 0b100 = 4\n```\n\n这些运算符还有复合变体，它们先执行运算，然后进行赋值，赋值目标作为运算的左操作数。例如：\n\
  \n```swift\nvar a = 10\na += 20       // 简写形式为 a = a + 20，结果为 30\n\nvar b = 7\n\
  b &= 3        // 简写形式为 b = b & 3，结果为 3\n```\n\n**注意：** 在 Swift 3 中，一元运算符 `++` 和\
  \ `--` 已不再可用。你需要使用一种格式来替换类似 `a++` 这样的写法，例如 `a += 1`。这也意味着，在转换包含这些一元运算符的代码时，需要注意运算符的顺序（即\
  \ `++a` 与 `a++` 等）。\n\n`~` 一元运算符对其整数操作数的各位执行按位取反：\n\n```swift\nlet a = 0b1001\n\
  let b = ~a\n```\n\n在 32 位下，此运算的结果是 `0b11111111111111111111111111110110`，等同于 –10。\n\
  \n\n\n### 字符串\n\n字符串由 `String` 类型表示，是 Unicode 字符的序列。Swift 在字符串中使用 Unicode，使得无需编写特殊代码即可构建支持多种不同字符集的应用程序。然而，这也会带来一些复杂性，此处将提及部分内容。关于使用\
  \ Unicode 影响的完整讨论，请参阅《The Swift Programming Language》，你可以在 Apple 开发者网站（网址如前所述）或\
  \ iBooks 中找到它。\n\n字符串字面量是用双引号括起来的字符序列，就像你已经见过的这个示例：\n\n```\nlet str = \"Hello, playground\"\
  \n```\n\n如果需要在字符串中包含 `\"` 字符，请使用 `\\` 字符对其进行转义，如下所示：\n\n```\nlet quoted = \"Contains\
  \ \\\"quotes\\\"\"      // 包含 \"quotes\"\n```\n\n要得到 `\\`，请用另一个 `\\` 对其进行转义：\n\n\
  ```\nlet backslash = \"\\\\\"     // 结果是 \\\n```\n\n任何 Unicode 字符都可以通过给出其十六进制表示（或码点），并用\
  \ `\\u{}` 括起来，从而嵌入到字符串中。例如，`@` 符号的码点是 `0x40`，因此以下示例展示了在 Swift 字符串中表示 `@` 的两种方式：\n\
  \n```\nlet atSigns = \"@\\u{40}\"     // 结果是 @@\n```\n\n某些字符具有特殊的转义表示形式。例如，`\\n`\
  \ 和 `\\t` 分别表示换行符和制表符：\n\n```\nlet specialChars = \"Line1\\nLine2\\tTabbed\"\n```\n\
  \n字符串具备一项有用的能力，即对包含在转义序列 `\\()` 中的表达式进行插值。例如：\n\n```\nprint(\"The value of pi is\
  \ \\(M_PI)\")   // 打印 \"The value of pi is 3.14159265358979\\n\"\n```\n\n这段代码将预定义常量\
  \ `M_PI` 的值插入到字符串中，然后打印结果。被插值的值也可以是一个表达式，并且可以有多个这样的表达式：\n\n```\n// 这段代码打印：\"Area\
  \ of a circle of radius 3.0 is 28.2743338823081\\n\"\nlet r = 3.0\nprint(\"Area\
  \ of a circle of radius \\(r) is \\(M_PI * r * r)\")\n```\n\n`+` 运算符可用于连接字符串。这是组合那些你需要跨源代码文件多行拆分的字符串的唯一方式：\n\
  \n```\nlet s = \"That's one small step for man, \" +\n\"one giant leap for mankind\"\
  \nprint(s)   // \"That's one small step for man, one giant leap for mankind\\n\"\
  \n```\n\n你可以使用 `==` 和 `!=` 运算符（参见“布尔值”部分）比较两个字符串，这些运算符会对其操作数进行逐字符比较。例如：\n\n```\n\
  let s1 = \"String one\"\nlet s2 = \"String two\"\nlet s3 = \"String \" + \"one\"\
  \ns1 == s2     // false：字符串不相同\ns1 != s2     // true：字符串不同\ns1 == s3     // true：字符串包含相同字符。\n\
  ```\n\n获取字符串长度这一看似简单的任务，因字符串由 Unicode 字符组成而变得复杂，因为并非每个 Unicode 字符都由单个码点表示。我们将跳过此主题的详细讨论，但有两件事需要注意。首先，如果你想要准确计算字符串中字符的数量（在所有情况下均有效），请使用字符串的\
  \ `characters` 属性，然后获取其长度：\n\n```\ns3.characters.count    // 10\n```\n\n如果你知道字符串仅包含由单个\
  \ Unicode 码点表示的字符，你可以改用字符串的 UTF-16 视图进行计数，这在某些情况下可能更快：\n\n```\ns3.utf16.count  \
  \    // 10\n```\n\n`String` 类型本身提供了相当多有用的字符串操作，你可以在此附录前面引用的 Swift 库参考文档中找到相关说明。你还可以利用这样一个事实：Swift\
  \ 会自动将 `String` 类型桥接到 Foundation 框架中的 `NSString` 类，这意味着 `NSString` 定义的方法可以像在 `String`\
  \ 本身上定义一样使用。\n\n`Character` 类型可用于保存字符串中的单个字符。这允许通过字符串的 `characters` 属性对其各个字符进行迭代：\n\
  \n```\nlet s = \"Hello\"\nfor c in s.characters {\nprint(c)\n}\n```\n\n在此示例中，`for`\
  \ 循环的主体（其语法稍后讨论）针对字符串中的每个字符执行一次，字符被赋值给变量 `c`，其类型被推断为 `Character`。在 Playground 中，你无法直接在结果列中看到此循环的结果——只能看到它被执行了五次。不过，你可以将鼠标悬停在结果列的结果上，点击出现的两个控件中最左侧的那个（看起来像眼睛的控件）以弹出窗口，然后右键单击该弹出窗口，从出现的菜单中选择“值历史记录”以查看所有字符，如图\
  \ A-6 所示。至少在撰写本文时，点击结果中出现的任何滚动条都不起作用——你必须使用键盘上的上/下箭头键进行滚动。\n\n![A329781_3_En_23_Fig6_HTML.jpg](img/A329781_3_En_23_Fig6_HTML.jpg)\n\
  \n**图 A-6.** 值历史记录弹出窗口\n\n提示\n\n如果你没有看到结果列，请将鼠标悬停在右侧边缘，直到看到列宽拖动条，然后用它来加宽结果面板的宽度。\n\
  \n你可以像创建 `String` 一样创建和初始化 `Character`，但需要显式声明类型以避免被推断为 `String`，并且初始化器必须恰好包含一个字符：\n\
  \n```\nlet c: Character = \"s\"\n```\n\n你不能对 `Character` 做太多操作，除了与其他 `Character`\
  \ 进行比较。你不能将它们相互追加，也不能直接将它们添加到 `String`。你必须使用 `String` 的 `append()` 方法：\n\n```\n\
  let c: Character = \"s\"\nvar s = \"Book\"  // 使用 \"var\" 因为我们想要修改它\ns += c    \
  \            // 错误 – 非法\ns.append(c)       // \"Books\"\n```\n\nSwift 中的字符串并非不可变，但它们是值对象，这意味着每当你将字符串赋值给变量，或将其用作函数参数或返回值时，该字符串都会被复制。对副本所做的修改不会影响原始字符串：\n\
  \n```\nvar s1 = \"Book\"\nvar s2 = s1             // s2 现在是 s1 的一个副本\ns2 += \"s\"\
  \               // 追加到 s2；s1 保持不变\ns1                          // \"Book\"\ns2 \
  \                         // \"Books\"\n```\n\n注意\n\n为了提高效率，字符串内容的实际复制不会在赋值后立即发生。在前面的示例中，`s1`\
  \ 和 `s2` 在赋值 `s1 = s2` 后共享其字符内容的同一个副本，直到执行语句 `s2 += \"s\"`。此时，在将字符 `\"s\"` 追加到 `s2`\
  \ 之前，会创建共享内容的一个副本并安装到 `s2` 中。所有这一切都是自动发生的。\n\n\n\n#### 布尔值\n\n布尔值由 `Bool` 类型表示，其可能值为\
  \ `true` 或 `false`：\n\n```\nvar b = true              // 推断类型为 Bool\nvar b1: Bool\n\
  b1 = false\n```\n\nSwift 拥有一系列常用的比较运算符（`==`、`!=`、`>`、`<`、`>=`、`<=`），当应用于数值时，这些运算符会返回一个\
  \ `Bool` 值：\n\n```\nvar a = 100\nvar b = 200\nvar c = a\na == c       // true\n\
  a == b      // false\na != b       // true\na > b        // false\na = c      //\
  \ true\n```\n\n顺便一提，这些运算符也可以应用于字符串：\n\n```\nlet a = \"AB\"\nlet b = \"C\"\nlet c\
  \ = \"CA\"\nlet d = \"AB\"\na == b     // false – 字符串内容不同\na == d     // true –\
  \ 字符串内容相同\na != c      // true – 字符串内容不同\na > b       // false: 使用排序顺序\na < c  \
  \      // true: 两者都以 C 开头，但字符串 c 比 a 长\n```\n\n你可以使用一元运算符 `!` 来否定一个布尔值：\n\n```\n\
  var a = 100\nvar b = 200\na == b           // false\n!(a == b)        // !false\
  \ == true\n```\n\n布尔表达式可以使用运算符 `==`、`!=`、`&&` 和 `||` 进行组合。`&&` 和 `||` 运算符具有短路特性，这意味着它们仅在第一个操作数的值无法确定结果时，才会对第二个操作数进行求值。具体来说，如果第一个操作数为\
  \ `true`，则 `||` 运算符的第二个操作数无需求值；如果第一个操作数为 `false`，则 `&&` 的第二个操作数不会被求值：\n\n```\nvar\
  \ a = 100\nvar b = 200\nvar c = 300\na  b   // true；两个表达式都被求值\na  b      //  true：第二个表达式未求值\n\
  a > b && c > b   // false：第二个表达式未求值\n```\n\n#### 枚举\n\n枚举让你能够为那些值集合固定且已知的类型赋予有意义的名称。要定义一个枚举，你需要为其命名，并将所有可能的值列为\
  \ case：\n\n```\nenum DaysOfWeek {\ncase Sunday, Monday, Tuesday, Wednesday,\nThursday,\
  \ Friday, Saturday\n}\n```\n\n你也可以单独定义每个 case：\n\n```\nenum DaysOfWeek {\ncase Sunday\n\
  case Monday\ncase Tuesday\ncase Wednesday\ncase Thursday\ncase Friday\ncase Saturday\n\
  }\n```\n\n要引用一个枚举值，请使用枚举名称和 case 名称，并用句点分隔：\n\n```\nvar day = DaysOfWeek.Sunday\
  \     // \"day\" 被推断为 \"DaysOfWeek\" 类型\n```\n\n当上下文清晰时，你可以省略枚举名称。在以下示例中，编译器已经知道变量\
  \ `day` 是 `DaysOfWeek` 类型，因此赋值时无需显式说明：\n\n```\nday = .Friday      // 注意：句点 \".\"\
  \ 是必需的\n```\n\n在 Swift 中，你还可以为枚举 case 赋予关联值。在你的 Playground 中尝试这个例子：\n\n```\nenum\
  \ Status {\ncase OK\ncase ERROR(String)\n}\nlet status = Status.OK\nlet failed =\
  \ Status.ERROR(\"That does not compute\")\n```\n\n在这里，`ERROR` case 有一个关联值——一个描述错误的字符串。你可以在\
  \ `switch` 语句中提取这个关联值，正如你将在接下来的“控制语句”部分中看到的那样。\n\n在某些情况下，将每个枚举 case 映射到一个值（称为原始值）是很有用的。为此，需要在枚举名称旁边指定值的类型，然后在定义每个\
  \ case 时为其分配单独的值。下面是 `DaysOfWeek` 枚举的一个变体，它为每个 case 分配了一个整数值：\n\n```\nenum DaysOfWeek\
  \ : Int {\ncase Sunday = 0\ncase Monday\ncase Tuesday\ncase Wednesday\ncase Thursday\n\
  case Friday\ncase Saturday\n}\n```\n\n原始值可以是字符串或任何数值类型。当原始值类型是整数时，你不需要为每个 case 显式赋值；未赋值的\
  \ case 会通过将上一个原始值加 1 来推断得出。在前面的例子中，`Sunday` 被赋予了原始值 0，因此 `Monday` 自动获得原始值 1，`Tuesday`\
  \ 获得原始值 2，依此类推。只要每个 case 的值唯一，你也可以覆盖默认的赋值：\n\n```\nenum DaysOfWeek : Int {\ncase\
  \ Sunday = 0\ncase Monday          // 1\ncase Tuesday         // 2\ncase Wednesday\
  \       // 3\ncase Thursday        // 4\ncase Friday = 20     // 20\ncase Saturday\
  \        // 21\n}\n```\n\n你可以通过访问 case 的 `rawValue` 属性来获取其原始值：\n\n```\nvar day =\
  \ DaysOfWeek.Saturday\nlet rawValue = day.rawValue           // 21。DaysOfWeek.Saturday.rawValue\
  \ 同样有效\n```\n\n这是另一个使用 `String` 作为原始值类型的例子：\n\n```\nenum ResultType : String {\n\
  case SUCCESS = \"Success\"\ncase WARNING = \"Warning\"\ncase ERROR = \"Error\"\n\
  }\nlet s = ResultType.WARNING.rawValue    // s = \"Warning\"\n```\n\n给定一个原始值，你可以通过将其传递给初始化器来构建相应的\
  \ case 值：\n\n```\nlet result = ResultType(rawValue: \"Error\")\n```\n\n在这个例子中，变量\
  \ `result` 的类型不是 `ResultType`，而是 `ResultType?`，这是一个可选类型的例子。由于可能将无效的原始值传递给初始化器，因此需要某种方式来表示没有对应此值的有效\
  \ case。Swift 通过返回特殊值 `nil` 来实现这一点；但 `nil` 不能赋值给普通变量，只能赋值给可选类型。可选类型通过尾部的 `?` 表示，操作它们时需要小心。我们稍后会更详细地讨论可选类型。\n\
  \n在 Objective-C 中，通常使用枚举来定义位掩码。每个单独的枚举值都是一个包含一个位的掩码，通常可以通过对两个或更多枚举 case 进行 OR（按位或）操作来组合值。你将在第\
  \ 14 章看到一个例子，其中我们研究了 Foundation 框架中 `NSFileManager` 类的方法，这些方法让你能够定位众所周知的目录，例如应用程序的\
  \ Documents 目录。这些方法所需的参数之一指定了要执行搜索的域或域集合。在 Objective-C 中，可能的域由一个类似下面的枚举定义：\n\n```\n\
  enum {\nNSUserDomainMask = 1,\nNSLocalDomainMask = 2,\nNSNetworkDomainMask = 4,\n\
  NSSystemDomainMask = 8,\nNSAllDomainsMask = 0x0ffff,\n};\ntypedef NSUInteger NSSearchPathDomainMask;\n\
  ```\n\n如你所见，每个单独的值都是 2 的幂，这使得它们可以通过 OR 操作组合，同时仍然能够恢复原始值。\n\n### 数组、区间和字典\n\nSwift\
  \ 提供了三种基本的集合类型（数组、字典和集合）以及一种区间语法，它提供了一种便捷的方式来表示（可能很大的）值的范围。区间在访问数组时特别有用。\n\n\n\n\
  ### 数组与区间\n\nSwift 支持使用语法 `[类型]` 创建值数组，其中 `类型` 是数组值的类型。以下代码创建并初始化了一个整数数组和一个字符串数组：\n\
  \n```\nvar integers = [1, 2, 3]\nvar days = [\"Sunday\", \"Monday\", \"Tuesday\"\
  , \"Wednesday\",\n\"Thursday\", \"Friday\", \"Saturday\"]\n```\n\n当然，你也可以将数组的声明和初始化分开，只要在使用前完成初始化即可。这需要显式指定数组类型：\n\
  \n```\nvar integers: [Int]        // [Int] 表示 \"整数数组\"\nintegers = [1, 2, 3]\n```\n\
  \n使用 `[]` 初始化一个空数组：\n\n```\nvar empty: [String] = []\n```\n\n要访问数组中的元素，请使用数字下标作为索引。数组的第一个元素的索引为\
  \ 0：\n\n```\nintegers[0]        // 1\nintegers[2]        // 3\ndays[3]         \
  \   // \"Wednesday\"\n```\n\n使用相同的语法为数组元素赋新值：\n\n```\nintegers[0] = 4          \
  \                 // [4, 2, 3]\ndays[3] = \"WEDNESDAY\"         // 将 \"Wednesday\"\
  \ 替换为 \"WEDNESDAY\"\n```\n\n要提取或修改数组的一部分，请使用 Swift 的区间语法。这可能导致数组中元素数量的变化：\n\n```\n\
  var integers = [1, 2, 3]\nintegers[1..<3]               // 获取元素 1 和 2 作为数组。结果为 [2,\
  \ 3]\nintegers[1..<3] = [4]         // 将元素 1 和 2 替换为 [4]。结果为 [1, 4]\nintegers =\
  \ [1, 2, 3]\nintegers[0…1] = [5, 4]     // 将元素 0 和 1 替换为 [5, 4]。结果为 [5, 4, 3]\n\
  ```\n\n注意：如果在结果列中查看，你不会看到正确的答案；你需要像我们之前展示的那样展开结果，或者在底部的调试面板中查看。\n\n区间语法 `a..<b`\
  \ 表示从 `a` 到 `b` 的所有值，但不包括 `b`；因此 `1..<5` 等同于 `1, 2, 3, 4`。语法 `a…b`（注意这里有三个连续的点）将\
  \ `b` 包含在区间内，因此 `1…5` 表示 `1, 2, 3, 4, 5`。区间 `a..<a` 始终为空，而区间 `a…a` 恰好包含一个元素（即 `a`\
  \ 本身）。`b` 的值必须大于或等于 `a` 的值，并且隐含有步长 1。\n\n要获取数组中的元素数量，请使用它的 `count` 属性：\n\n```\n\
  var integers = [1, 2, 3]\nintegers.count                   // 3\nintegers[1..<3]\
  \ = [4]\nintegers.count                   // 2\n```\n\n要向数组添加元素，请使用 `append()` 方法或\
  \ `insert(_:atIndex:)` 方法：\n\n```\nvar integers = [1, 2, 3]\nintegers.append(4)\
  \                // 结果为 [1, 2, 3, 4]\nintegers.insert(-1, atIndex: 0)   // 结果为 [-1,\
  \ 1, 2, 3, 4]\n```\n\n你也可以使用 `+` 运算符来连接两个数组，以及使用 `+=` 运算符将一个数组追加到另一个数组：\n\n```\n\
  var integers = [1, 2, 3]\nlet a = integers + [4, 5]  // a = [1, 2, 3, 4, 5]；integers\
  \ 数组不变\nintegers += [4, 5]                 // 现在 integers = [1, 2, 3, 4, 5]\n```\n\
  \n使用 `remove()`、`removeSubrange()` 和 `removeAll()` 方法来移除数组的全部或部分元素：\n\n```\nvar\
  \ days = [\"Sunday\", \"Monday\", \"Tuesday\", \"Wednesday\",\n\"Thursday\", \"\
  Friday\", \"Saturday\"]\ndays.remove(at: 3)        // 移除 \"Wednesday\" 并将其返回给调用者\n\
  days.removeSubrange(0..<4)                      // 留下 [\"Friday\", \"Saturday\"\
  ]\ndays.removeAll(keepingCapacity: false)    // 留下一个空数组\n```\n\n传递给 `removeAll()`\
  \ 的 `keepingCapacity` 参数指示是为数组元素分配的空间应保留（值为 `true`）还是释放（值为 `false`）。\n\n你可以使用 `for`\
  \ 语句遍历整个数组或数组的一部分，这将在“控制语句”部分讨论。\n\n如果使用 `let` 语句创建了数组，则无论是数组本身还是其内容都不能以任何方式修改：\n\
  \n```\nlet integers = [1, 2, 3]     // 常量数组\nintegers = [4, 5, 6]         // 错误：不能替换数组\n\
  integers[0] = 2              // 错误：不能重新赋值元素\nintegers.removeAll(keepingCapacity:\
  \ false)  // 错误：不能修改内容\n```\n\n与字符串一样，数组是值对象，因此赋值或将其传递给函数或从函数返回都会创建一份副本：\n\n```\n\
  var integers = [1, 2, 3]\nvar integersCopy = integers   // 创建 \"integers\" 的副本\n\
  integersCopy[0] = 4           // 不会改变 \"integers\"\nintegers                   \
  \   // [1, 2, 3]\nintegersCopy                  // [4, 2, 3]\n```\n\n你可以使用 `contains()`\
  \ 方法来查找数组中是否包含某个元素：\n\n```\nlet integers = [1, 2, 3]\nintegers.contains(2)     //\
  \ true\nintegers.contains(4)     // false\n```\n\n要获取数组中元素的索引，请使用 `index(of:)` 方法：\n\
  \n```\nlet integers = [1, 2, 3]\nintegers.index(of: 3)        // 结果为 2\n```\n\n\
  如果未在数组中找到该元素，则结果为 `nil`：\n\n```\nlet integers = [1, 2, 3]\nintegers.index(of: 5)\
  \        // 结果为 nil\n```\n\n### 字典\n\n你可以创建一个字典，这是一种将键实例映射到相应值的数据结构，使用的语法与数组类似。有时你可能会看到字典被称为映射。以下代码创建一个字典，其中键是字符串，值是整数：\n\
  \n```\nvar dict = [\"Red\": 0,\n\"Green\": 1,\n\"Blue\": 2]\n```\n\n此字典的形式化类型是 `[String:\
  \ Int]`。你也可能会看到使用泛型语法将其称为 `Dictionary<String, Int>`，本附录中不涉及泛型语法。类似地，你可能会看到类型为 `[Int]`\
  \ 的数组被称为 `Array<Int>`。\n\n如果不使用初始化器，则需要在声明字典时显式声明其类型：\n\n```\nvar dict: [String:\
  \ Int]\ndict = [\"Red\": 0, \"Green\": 1, \"Blue\": 2]\n```\n\n要根据键获取字典条目的值，请使用下标表示法，如下所示：\n\
  \n```\nlet value = dict[\"Red\"]  // 结果为 0，即映射到键 \"Red\" 的值\n```\n\n你可以使用与修改数组非常相似的方式来修改字典：\n\
  \n```\ndict[\"Yellow\"] = 3    // 添加键为 \"Yellow\" 的新值\ndict[\"Red\"] = 4       //\
  \ 更新键为 \"Red\" 的值\n```\n\n要从字典中移除元素，请使用 `removeValue(forKey:)` 方法；要移除所有值，请使用 `removeAll()`：\n\
  \n```\nvar dict = [\"Red\": 0, \"Green\": 1, \"Blue\": 2]\ndict.removeValue(forKey:\
  \ \"Red\")   // 移除键为 \"Red\" 的值\ndict.removeAll()                  // 清空字典\n```\n\
  \n使用 `let` 语句创建的字典无法被修改：\n\n```\nlet fixedDict = [\"Red\": 0, \"Green\": 1, \"Blue\"\
  : 2]\nfixedDict[\"Yellow\"] = 3              // 非法\nfixedDict[\"Red\"] = 4     \
  \            // 非法\nfixedDict = [\"Blue\", 7]              // 非法\nfixedDict.removeValue(forKey:\"\
  Red\")  // 非法\n```\n\n你可以使用 `for` 语句遍历字典的键，这将在“控制语句”部分看到。要获取字典中键值对的数量，请使用 `count`\
  \ 属性：\n\n```\nvar dict = [\"Red\": 0, \"Green\": 1, \"Blue\": 2]\ndict.count   \
  \   // 3\n```\n\n与数组一样，字典是值类型，在赋值或传递给函数以及从函数返回时会进行复制。对副本的修改不会影响原始字典：\n\n```\nvar\
  \ dict = [\"Red\": 0, \"Green\": 1, \"Blue\": 2]\nvar dictCopy = dict\ndictCopy[\"\
  Red\"] = 4   // 不影响 \"dict\"\ndict                  // \"Red\":0, \"Green\": 1,\
  \ \"Blue\": 2\ndictCopy              // \"Red\":4, \"Green\": 1, \"Blue\": 2\n```\n\
  \n\n\n### 集合  \n\n第三种也是最后一种 Swift 集合类型是 `Set`。`Set` 是一个元素集合，其中元素没有定义的顺序，并且每个元素只能出现一次。添加已存在元素的另一个实例不会改变集合的内容。在其他大多数方面，集合与数组非常相似。\
  \  \n\n初始化集合的语法与数组相同。为了消除歧义，你需要明确声明正在创建一个 `Set`。以下是两种（等效）做法：  \n\n```  \nlet s1\
  \ = Set([1, 2, 3])  \nlet s2: Set = [1, 2, 3]  \n```  \n\n`contains()` 方法返回一个 `Bool`\
  \ 值，表示集合是否包含某个给定元素，而 `count` 属性保存集合中的元素数量：  \n\n```  \ns1.contains(1)    // true\
  \  \ns2.contains(4)    // false  \ns1.count          // 3  \n```  \n\n稍后你会看到，可以使用\
  \ `for` 循环来枚举集合中的元素。  \n\n要向集合中添加或移除元素，请使用 `insert()` 和 `remove()` 方法：  \n\n```\
  \  \nvar s1 = Set([1, 2, 3])   // [2, 3, 1]（注意在集合中顺序无关紧要）  \ns1.insert(4)      \
  \        // [2, 3, 1, 4]  \ns1.remove(1)              // [2, 3, 4]  \ns1.removeAll()\
  \            // []（空集）  \n```  \n\n### NSArray、NSDictionary 和 NSSet  \n\nFoundation\
  \ 框架提供了表示数组、字典和集合的 Objective-C 类——`NSArray`、`NSDictionary` 和 `NSSet`。这些类与它们对应的 Swift\
  \ 类型之间的关系类似于 `NSString` 和 `String`：通常，你可以将 Swift 数组视为 `NSArray`，将 Swift 字典视为 `NSDictionary`，将\
  \ Swift 集合视为 `NSSet`。  \n\n例如，假设你有这样一个 `NSString`：  \n\n```  \nlet s: NSString \
  \ = \"Red,Green,Blue\"  \n```  \n\n再假设你想将它分割成三个独立的部分，每个部分包含一种颜色名称。`NSString` 有一个名为\
  \ `components(separatedBy: )` 的方法，能够完全实现你的需求（`String` 也有此方法，但这里我们用的是 `NSString`，而不是\
  \ `String`）。该方法将分隔字符串作为参数，并返回一个包含各个组件的 `NSArray`：  \n\n```  \nlet s: NSString =\
  \ \"Red,Green,Blue\"  \nlet components = s.components(separatedBy: \",\")// 调用 NSString\
  \ 方法  \ncomponents      // [\"Red\", \"Green\", \"Blue\"]  \n```  \n\n尽管这个方法返回的是\
  \ `NSArray`，但 Swift 足够智能，会将其映射到对应的 Swift 集合——一个 `String` 类型的数组——因此 `components`\
  \ 的推断类型是 `[String]`，而不是 `[NSString]`。你可以通过将鼠标悬停在变量名上并按住 ⌥（Option）键点击来确认这一点。  \n\n\
  在 Swift 代码中，你可以直接创建 `NSDictionary`、`NSSet` 和 `NSArray` 实例。例如：  \n\n```  \nlet d\
  \ = NSDictionary()  \n```  \n\n变量 `d` 的推断类型当然是 `NSDictionary`。你可以使用 `as` 关键字（稍后会详细说明）将\
  \ `NSDictionary`（无论你是直接创建的，还是从 Foundation 框架或其他框架的方法中获得的）显式转换为 Swift 的 `Dictionary`\
  \ 类型：  \n\n```  \nlet e = d as Dictionary  \n```  \n\n现在，如果你 ⌥-点击名称 `e`，你会看到 Swift\
  \ 为此变量推断出的类型是 `Dictionary<NSObject, AnyObject>`，这相当于说它的类型是 `[NSObject: AnyObject]`。这些键和值类型是什么，它们又从何而来？在上述\
  \ Swift 代码中创建的 `NSDictionary` 是无类型的：编译器不知道可能添加到其中的键和值的类型（`NSSet` 和 `NSArray` 也是如此）。编译器别无选择，只能推断出一些通用类型：`NSObject`\
  \ 是所有 Foundation 对象的基类，而 `AnyObject` 是一个 Swift 协议（将在后面讨论），对应于任何 Swift 类类型——类型签名\
  \ `[NSObject: AnyObject]` 表示“我几乎不知道这个字典包含什么”。  \n\n当你在 Swift 中从 `NSDictionary` 或\
  \ `NSArray` 中检索元素时，通常必须使用 `as!` 运算符（稍后会详细介绍）将它们显式转换为正确的类型，或者将 `NSDictionary` 本身转换为你知道它必须是的那种类型。例如，如果你知道一个\
  \ `NSDictionary` 实例将字符串映射到字符串，你可以这样做：  \n\n```  \nlet d = NSDictionary()  \nlet\
  \ e = d as! [String: String]  \n```  \n\n这里，我们将 `NSDictionary` 转换成了 `[String: String]`。即使字典实际包含的是\
  \ `NSString` 而不是 `String`，这段代码也能正常工作，因为 Swift 会自动在 `String` 和 `NSString` 之间进行映射。但是要注意：如果\
  \ `NSDictionary` 的键和值类型并非如你所声明的，你的应用程序将会崩溃。你可能已经注意到，在这个示例中，我们使用 `as!` 而不是 `as` 来执行转换。稍后我会解释这两个运算符之间的区别。\
  \  \n\n有一种更安全的方式来处理所有这些情况，这涉及可选类型，而这正是下一节的主题。\n\n\n## 可选类型\n\n让我们回顾一下上一节字典部分使用过的示例：\n\
  \n```\nvar dict: [String: Int]\ndict = [\"Red\": 0, \"Green\": 1,  \"Blue\": 2]\n\
  let value = dict[\"Red\"]\n```\n\n尽管此字典中的所有值都是 `Int` 类型，但 `value` 的推断类型并非 `Int`，而是\
  \ `Int?`——一个可选整数。`?` 符号表明了该类型的可选性质。可选是什么意思？为什么在这里使用它？要回答这个问题，请思考一下：如果使用一个没有对应值的键来访问字典，会发生什么：\n\
  \n```\nlet yellowValue = dict[\"Yellow\"]\n```\n\n应该给 `yellowValue` 赋什么值？大多数语言通过设定一个特殊值来解决这个问题，按照惯例，这个值代表“无值”。在\
  \ Objective-C 中，该值被称为 `nil`（实际上只是 0 的重新定义）；在 C 和 C++ 中它是 `NULL`（同样是对 0 的重新定义）；而在\
  \ Java 中则是 `null`。这种做法的问题在于，使用 `nil`（或等价）值可能很危险。例如，在 Java 中，使用 `null` 引用会导致异常；在\
  \ C 和 C++ 中，应用程序可能会崩溃。更糟糕的是，无法通过变量的声明来判断它是否可能包含 `null`（或 `nil`、`NULL`）值。Swift 以一种巧妙的方式解决了这个问题：它也有\
  \ `nil` 值，但一个变量（或常量）只有在被声明为可选类型，或其类型被推断为可选时，才能被设置为 `nil`。因此，你可以通过检查变量或常量的类型立即判断它是否可能为\
  \ `nil`：如果不是可选类型，它就不能是 `nil`。此外，Swift 还要求你在使用该值时明确地考虑到这一点。\n\n让我们通过一些例子来更清楚地说明这一点。假设我们定义一个名为\
  \ `color` 的变量，如下所示：\n\n```\nvar color = \"Red\"\n```\n\n根据定义方式，其推断类型为 `String`，这不是可选类型。因此，尝试给这个变量赋值为\
  \ `nil` 是非法的：\n\n```\ncolor = nil   // 非法：color 不是可选类型。\n```\n\n正因如此，我们可以确信永远无需担心\
  \ `color` 会包含 `nil` 值。这也意味着我们不能用这个变量来保存从字典返回的值，即使我们知道该值不会是 `nil`：\n\n```\nlet dict\
  \ = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\ncolor = dict[0]!    // 非法：dict[0] 的值是可选字符串，而\
  \ color 不是可选类型。\n```\n\n为了使赋值合法，我们必须将 `color` 的类型从 `String` 改为可选 `String`：\n\n```\n\
  let dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\nvar color: String?     // \"\
  String?\" 表示可选 String\ncolor = dict[0]        // 合法\nprint(color)           // 这会打印什么？\n\
  ```\n\n我们该如何使用赋给 `color` 变量的值？将上述代码输入 playground，你会看到打印出的不是 \"Red\"，而是 `Optional(\"\
  Red\")`。字典访问返回的不是实际值，而是“包装”成可选类型的值。要获取字符串值，我们需要使用 `!` 运算符来“解包”可选类型，如下所示：\n\n```\n\
  let actualColor = color!   // \"color!\" 表示解包可选类型\n```\n\n`actualColor` 的推断类型是 `String`，赋给它的值是\
  \ \"Red\"。由此可见，每当你从字典中检索一个值时，它都将是可选类型，你必须解包才能获得所需的值。但请记住，我们之前说过 `nil` 引用是危险的；在 Swift\
  \ 中，这意味着解包可选类型也可能是危险的。将你的 playground 代码修改为：\n\n```\nlet dict = [0: \"Red\", 1: \"\
  Green\", 2: \"Blue\"]\nlet color = dict[4]\nlet actualColor = color!\n```\n\nSwift\
  \ 正确地推断出 `color` 的类型是 `String?`，但是当你解包字典访问的结果以将值赋给 `actualColor` 时，会出现错误。在 playground\
  \ 中，这个错误只是被报告给你；在应用程序中，它会导致崩溃。为什么会这样？因为字典中没有键为 4 的条目，所以 `color` 变量被赋值为 `nil`。如果你尝试解包\
  \ `nil`，就会崩溃。你可能会想，这跟其他语言相比并没有什么改进，但事实并非如此。首先，`color` 是可选类型这一事实告诉你，你必须预料到它可能是 `nil`——反之亦然（这也同样有价值）。其次，Swift\
  \ 提供了一种处理可选值为 `nil` 情况的方法。实际上，它提供了多种方法。\n\n你可以做的第一件事是检查字典访问是否返回了 `nil`，并且只在没有返回\
  \ `nil` 时才解包该值：\n\n```\nif color != nil {\nlet actualColor = color!\n}\n```\n\n\
  这种结构非常常见，以至于 Swift 为其提供了简写形式。以下是处理可选解包的第二种方法：\n\n```\nif let actualColor = color\
  \ {\n// 仅当 color 不为 nil 时执行\nprint(actualColor)\n}\n```\n\n与 `if` 语句关联的代码块仅在 `color`\
  \ 不为 `nil` 时执行，并且解包后的值被赋给常量 `actualColor`。你甚至可以通过将 `let` 改为 `var` 来使 `actualColor`\
  \ 成为一个变量：\n\n```\nif var actualColor = color {\n// 仅当 color 不为 nil 时执行。actualColor\
  \ 可以被修改\nprint(actualColor)\n}\n```\n\n在这些例子中，我们定义了新变量 `actualColor` 来接收解包后的值，这要求我们给它一个新的名字。有时，对于本质相同的东西却要使用不同的名称可能会显得不自然，事实上，这并非必需——我们实际上可以给新变量起一个与正在解包的可选变量相同的名字，如下所示：\n\
  \n```\nif var color = color {\n// 仅当原始 color 变量的值不为 nil 时执行\nprint(color)    //\
  \ 引用新变量，持有解包后的值\n}\n```\n\n重要的是要认识到，新的 `color` 变量与现有的变量无关，实际上，它具有不同的类型（`String`\
  \ 而不是 `String?`）。在 `if` 语句的主体中，名称 `color` 引用的是新的、解包后的变量，而不是原始的变量。\n\n```\nlet dict\
  \ = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\nlet color = dict[0]\nif var color =\
  \ color {\n// 仅当 color 不为 nil 时执行\nprint(color)                            // \"\
  Red\"\ncolor = \"Green\"                         // 重新赋值给局部变量\n}               \
  \                            // 新的 color 变量现在超出作用域\ncolor                      \
  \                 // 引用原始值：\"Red\"\n```\n\n如果我们想为字典中不存在的键使用一个默认值，该怎么办？Swift 也提供了一种便捷的方式。以下是处理可选解包的第三种方法：\n\
  \n```\nlet dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\nlet color = dict[4]\n\
  let actualColor = color ?? \"Blue\"\n```\n\n`??` 运算符（称为空合并运算符）会解包其左操作数，如果它不为 `nil`，则返回其值；否则，返回其第二个操作数。在这种情况下，因为\
  \ `color` 是 `nil`，所以 `actualColor` 会被赋值为 \"Blue\"。当然，你可以将上述代码压缩为两个语句，使其更易于阅读：\n\n\
  ```\nlet dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\nlet actualColor = dict[4]\
  \ ?? \"Blue\"\n```\n\n字典并非使用可选类型的唯一场景。如果你查阅 Swift API 文档，会看到许多返回可选值的方法。甚至类型初始化器也有可能返回可选值。我们已经见过一个这样的例子；如果你尝试使用无效的原始值来初始化一个枚举实例，结果会是\
  \ `nil`。\n\n\n```swift\nenum ResultType : String {\ncase SUCCESS = \"Success\"\n\
  case WARNING = \"Warning\"\ncase ERROR = \"Error\"\n}\nlet result = ResultType(rawValue:\
  \ \"Invalid\")\n```\n\n`result`的推断类型是`ResultType?`，在此例中其值为`nil`，因为没有枚举实例包含原始值`\"\
  Invalid\"`。\n\n你已经了解到解包可选值时必须谨慎，但有时这样做既不方便也无必要。正如你在本书示例中将会看到的，在类初始化时定义一个无法赋予有效值的变量，但在代码需要使用前已知其会拥有有效值，这种情况很常见。此时，你可以将变量定义为可选类型，并在每次使用时解包。这能让编译器满意，但意味着你必须到处添加`!`运算符，或者将访问包装在`if\
  \ let`结构中——即使你知道解包总会成功。\n\n幸运的是，Swift 让你能避开这一点。你只需告诉 Swift：每次访问该可选值时自动解包。下面是在字典示例中实现该操作的方法：\n\
  \n```swift\nlet dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\"]\nvar color: String!\
  \    // 注意这里的 !\ncolor = dict[0]       // 赋值 Optional(\"Red\")\nprint(color)   \
  \       // 自动解包可选值\n```\n\n这段代码的关键在于`color`变量被声明为`String!`类型，而非`String?`。这样声明的变量称为隐式解包可选值。`!`告诉\
  \ Swift：你希望它假定该变量在每次使用时都拥有非`nil`值，并直接进行解包。这意味着你可以写`print(color)`而不是`print(color!)`。虽然此处节省的篇幅不多，但如果需要多次访问结果，使用这一特性就能减少字符输入。\n\
  \n不过请注意：你已告知 Swift`color`永远不会是`nil`。如果在你尝试使用时它恰好为`nil`，Swift 会将其解包，导致应用崩溃。\n\n我们可以利用可选值解决讨论字典时出现的另一个问题：如何处理从`NSDictionary`获取的值。我们先通过创建带有初始值的\
  \ Foundation 字典来设定问题：\n\n```swift\nlet d = NSDictionary(objects: [\"Red\", \"Green\"\
  , \"Blue\"], forKeys: [0 as NSCopying, 1 as NSCopying, 2 as NSCopying])\n```\n\n\
  这段代码初始化了一个`NSDictionary`，包含从`Int`到`String`的映射。当然在实际开发中你不会这样创建`NSDictionary`并强制转换，而是直接创建\
  \ Swift 字典。但假设该字典来自对 Foundation 方法的调用（例如从文件内容填充），只要字典确实映射了`Int`到`String`，这段代码就能正常工作，你可以按常规方式访问其内容：\n\
  \n```swift\nlet color = d[1]    // 获取一个可选值，内包含 \"Green\"\n```\n\n但请注意：Swift 并不真正知道从字典获取的值的类型；它推断为`AnyObject?`，这是一个包裹着某种对象的可选值。你可以通过将结果显式转换为正确类型来改进：\n\
  \n```swift\nlet color = d[1] as! String\n```\n\n但如果字典类型弄错了呢？也许实际得到的是`[Int: Int]`。要查看会发生什么，将第一行中的键类型从数字改为字符串，如下所示：\n\
  \n```swift\nlet d = NSDictionary(objects: [ 0, 1, 2], forKeys: [0 as NSCopying,\
  \ 1 as NSCopying, 2 as NSCopying])\nlet value = d[1] as! String\n```\n\n这段代码在将从字典获取的值强制转换为`String`时会崩溃。这有些过于激烈了。我们真正想要的是能够检测到这种情况并采取纠正措施，而不是崩溃。我们可以使用`as?`运算符代替`as`来实现这一点。`as?`运算符返回可选值：如果第一个操作数不是第二个操作数指定的类型，它会返回`nil`而不是崩溃。因此现在我们可以这样做：\n\
  \n```swift\nlet d = NSDictionary(objects: [ 0, 1, 2], forKeys: [0 as NSCopying,\
  \ 1 as NSCopying, 2 as NSCopying])\nif let value = d[1] as? String {  // 如果 d 不是\
  \ String? 类型，as? 返回 nil\n    print(\"OK\")                         // 符合预期——正常使用\
  \ value\n} else {\n    print(\"类型不正确\")     // 如果 d 不是 [Int: String] 类型，则执行\n}\n\
  ```\n\n还有另一种实现相同效果的方法。你可以在使用字典前使用`is`关键字检查它是否属于预期类型：\n\n```swift\nif d is [Int:\
  \ String] {   // 如果 d 映射 Int 到 String，则求值为 true\n    print(\"属于 [Int: String]\"\
  )\n} else {\n    print(\"类型不正确\")\n}\n```\n\n你可能已经注意到，我们在类型转换时同时使用了`as`和`as!`运算符。有什么区别？粗略来说，当转换保证成功时使用`as`，否则使用`as!`——`!`表示你正在强制编译器接受通常会报错的代码，例如向下转换时。下面是一个安全转换的例子，我们可以使用`as`：\n\
  \n```swift\nlet s = \"Fred\"\nlet n = s as NSString\n```\n\n`s`的推断类型是`String`，我们尝试将其转换为`NSString`。Swift\
  \ 会自动执行这个桥接操作，因此本例中可以使用`as`。同样，任何向上转换都可以用`as`运算符完成：\n\n```swift\nlet label = UILabel()\n\
  let view = label as UIView\n```\n\n这里`label`类型为`UILabel`，这是一个代表标签的 UIKit 类（用于显示文本的用户界面组件）。每个\
  \ UIKit 用户界面组件都是`UIView`的子类，因此我们可以用`as`运算符将标签自由向上转换为其基类`UIView`。但反过来则不行：\n\n```swift\n\
  let view: UIView = UILabel()\nlet label = view as! UILabel    // 向下转换需要 !\n```\n\
  \n这次我们创建了一个`UILabel`，但将其赋值给类型为`UIView`的变量。要将此变量转换回`UILabel`类型，需要使用`as!`运算符，因为无法保证`UIView`类型的变量指向的是`UILabel`——它可能引用其他\
  \ UIKit 组件类型，例如`UIButton`。下面是另一个你已见过的例子：\n\n```swift\nlet d = NSDictionary(objects:\
  \ [\"Red\", \"Green\", \"Blue\"], forKeys: [0 as NSCopying, 1 as NSCopying, 2 as\
  \ NSCopying])\nlet color = d[1] as! String\n```\n\n如你之前所见，从`NSDictionary`获取值时，其类型被推断为`AnyObject?`，可能指向任何\
  \ Swift 对象类型。要将值转换为`String`，需要使用`as!`运算符。\n\n关于可选值目前就介绍到这里。在后续“属性”和“方法”章节讨论调用方法时，我们还会进一步探讨这个主题。\n\
  \n### 控制语句\n\n你已经了解了 Swift 的数据类型以及如何初始化并操作它们。现在让我们看看 Swift 的控制语句。Swift 支持大多数语言中常见的所有控制语句，并为其中一些添加了有趣的新特性。\n\
  \n\n### if 语句\n\nSwift 的 `if` 语句的运作方式与大多数其他语言类似：你测试一个布尔条件，并且仅当条件求值为 `true` 时，才执行某些代码。你还可以选择性地包含一个\
  \ `else` 代码块，当条件为 `false` 时执行。例如：\n\n```\nlet random = arc4random_uniform(10)\n\
  if random < 5 {\n    print(\"Hi\")\n} else {\n    print(\"Ho\")\n}\n```\n\n`arc4random_uniform()`\
  \ 函数返回一个介于 0（包含）和其参数值（不包含）之间的随机整数，因此在此例中，是 0 到 9 之间的任意整数。我们测试返回的值，如果它小于 5 则输出“Hi”，否则输出“Ho”。注意，Swift\
  \ 不要求将测试条件放在括号中，因此以下两种写法都是可行的：\n\n```\nif random < 5 {  // 不要求括号\n}\nif (random\
  \ < 5) { // 但也可以使用\n}\n```\n\n与其他语言相比，要执行的代码必须放在大括号内，即使只有一行代码也是如此。这意味着以下代码在 Swift\
  \ 中是无效的：\n\n```\nif random < 5\n    print(\"Hi\")         // 无效：必须放在大括号内\nelse\n\
  \    print(\"Ho\")         // 无效：必须放在大括号内\n```\n\nSwift 也有三元运算符 `?:`，你可能对它很熟悉，而且可能要么喜欢它，要么讨厌它。该运算符会求值\
  \ `?` 前面的布尔表达式，如果结果为 `true`，则执行 `?` 和 `:` 之间的语句；如果结果为 `false`，则执行 `:` 之后的语句。我们可以用它来编写如下所示的代码：\n\
  \n```\nlet random = arc4random_uniform(10)\nrandom < 5 ? print(\"Hi\") : print(\"\
  Ho\")\n```\n\n在这种情况下，通过观察我们只是输出其中一个字符串，我们可以进一步缩短代码，改写为：\n\n```\nlet random = arc4random_uniform(10)\n\
  print(random < 5 ? \"Hi\" : \"Ho\")\n```\n\n取决于你的观点，这要么比我们开始的代码清晰得多，要么是无法阅读。\n\n\
  你已经看到有一种特殊形式的 `if` 语句，用于简化对可选类型的处理：\n\n```\nlet dict = [0: \"Red\", 1: \"Green\"\
  , 2: \"Blue\"]\nlet color = dict[0]\nif let color = color {\n    // 仅当 color 不为\
  \ nil 时执行\n    print(color)                            // \"Red\"\n}\n```\n\n实际上，你可以在一个\
  \ `if let` 或 `if var` 语句中解包多个可选类型：\n\n```\nlet dict = [0: \"Red\", 1: \"Green\"\
  , 2: \"Blue\", 3: \"Green\", 4: \"Yellow\"]\nlet color1 = dict[Int(arc4random_uniform(6))]\n\
  let color2 = dict[Int(arc4random_uniform(6))]\nif let color1 = color1, color2 =\
  \ color2 {\n    // 仅当两个颜色都不为 nil 时执行\n    print(\"color1: \\(color1), color2: \\\
  (color2)\")\n}\n```\n\n这段代码生成一对范围在 0 到 5 之间的随机键，并用它们从字典中获取颜色字符串。由于没有键为 5 的条目，我们获取到的值中任意一个（或两者）都可能是\
  \ `nil`。复合的 `if let` 语句允许你安全地解包这两个值，并且仅当两者都不为 `nil` 时才执行其主体。你还可以通过添加 `where` 子句来包含一个测试条件：\n\
  \n```\nlet dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\", 3: \"Green\", 4: \"Yellow\"\
  ]\nlet color1 = dict[Int(arc4random_uniform(6))]\nlet color2 = dict[Int(arc4random_uniform(6))]\n\
  if let color1 = color1, color2 = color2 where color1 == color2 {\n    // 仅当两个颜色相同时执行\n\
  \    print(\"color1: \\(color1), color2: \\(color2)\")\n}\n```\n\n你甚至可以在解包可选类型之前包含一个测试：\n\
  \n```\nlet dict = [0: \"Red\", 1: \"Green\", 2: \"Blue\", 3: \"Green\", 4: \"Yellow\"\
  ]\nlet color1 = dict[Int(arc4random_uniform(6))]\nlet color2 = dict[Int(arc4random_uniform(6))]\n\
  if dict.count > 3, let color1 = color1, color2 = color2 where color1 == color2 {\n\
  \    print(\"color1: \\(color1), color2: \\(color2)\")\n}\n```\n\n### for 语句\n\n\
  Swift 曾经包含两种形式的 `for` 语句。第一种，与任何使用过基于 C 语言的人所熟悉的形式非常相似，已在 Swift 3 中弃用，不再有效：\n\n\
  ```\nfor var i = 0; i < 10; i += 1 {\n    print(i)\n}\n```\n\n当前可接受的形式允许你遍历一个值的序列，例如一个范围或一个集合。以下代码产生的结果与前面展示的\
  \ `for` 循环相同：\n\n```\nfor i in 0..<10 {\n    print(i)\n}\n```\n\n注意，使用这种形式时，你不需要使用\
  \ `var` 来引入变量。通过使用 `stride()` 方法，你可以创建并遍历一个更通用的范围。这是一个示例，从 10 向下到 0（包含两端）打印偶数整数：\n\
  \n```\nfor i in stride(from: 10, through: 0, by: -2) {\n    print(i)\n}\n```\n\n\
  遍历数组元素非常简单，并且代码的意图比使用索引循环更加明显：\n\n```\nlet strings = [\"A\", \"B\", \"C\"]\nfor\
  \ string in strings {\n    print(string)\n}\n```\n\n同样的结构也适用于集合，尽管遍历顺序是未定义的，因为集合不提供任何顺序：\n\
  \n```\nlet strings = Set([\"A\", \"B\", \"C\"])\nfor string in strings {\n    print(string)\n\
  }\n```\n\n你可以通过使用字典的 `keys` 属性来遍历它的键。与集合一样，遍历顺序是未定义的：\n\n```\nlet d = [ 0: \"Red\"\
  , 1: \"Green\", 2: \"Blue\"]\nfor key in d.keys {\n    print(\"\\(key) -> \\(d[key])\"\
  )\n}\n```\n\n你可以通过将字典作为一组键值对进行遍历来更直接地完成同样的操作：\n\n```\nfor (key, value) in d {\n\
  \    print(\"\\(key) -> \\(value)\")\n}\n```\n\n每个键值对作为一个带有两个元素的元组返回，其中名称 `key`\
  \ 链接到元组的第一个元素，名称 `value` 链接到第二个元素。关于元组的更多讨论，请参考《Swift 编程语言》一书。\n\n### repeat 和 while\
  \ 语句\n\n`repeat` 和 `while` 语句与 C、C++、Java 和 Objective-C 中的 `do` 和 `while` 语句相同。它们都执行一段代码体直到满足某个条件；不同之处在于\
  \ `while` 语句在每次循环之前测试条件，而 `repeat` 在每次循环结束时测试条件：\n\n```\nvar i = 10\nwhile i > 0\
  \ {\n    print(i)\n    i -= 1\n}\nvar j = 10\nrepeat {\n    print(j)\n    j -= 1\n\
  } while j > 0\n```\n\n\n\n### `switch` 语句\n\nSwift 的 `switch` 语句非常强大。我们这里没有足够的篇幅讨论它的所有特性，但你应该在苹果的《Swift\
  \ 编程语言》一书中详细阅读相关内容。我们将通过几个示例来说明它最重要的特性。\n\n你可以使用 `switch` 语句根据变量或表达式的多个可能值之一选择代码路径。例如，以下代码根据\
  \ `value` 变量的值打印不同的内容：\n\n```\nlet value = 11\nswitch value {\ncase 2, 3, 5, 7,\
  \ 11, 13, 17, 19:\nprint(\"计数是质数且小于 20\")\ncase 20…30:\nprint(\"计数在 20 到 30 之间\"\
  )\ndefault:\nprint(\"大于 30\")\n}\n```\n\n关于这段代码有几点需要注意。首先，一个 `case` 可以有多个可能的值，用逗号分隔。如果\
  \ `switch` 表达式等于所列出的任何一个值，该 `case` 就会执行。其次，`case` 的值可以是一个范围。事实上，`switch` 语句能够进行一些非常强大的模式匹配，其细节在苹果的文档中有详细说明。第三，与大多数其他语言不同，控制流不会从一个\
  \ `case` 穿透到另一个 `case`。这意味着上面的例子只会执行一个 `case` 并只打印一次；在 switch 的各个 `case` 之间不需要包含\
  \ `break` 语句。如果你确实希望从一个 `case` 继续执行到下一个 `case`，可以在第一个 `case` 的末尾添加一个 `fallthrough`\
  \ 语句。\n\n`case` 列表必须是穷尽的：如果上面的代码中没有包含 `default` 分支，编译器会报错。此外，每个 `case` 必须至少有一行可执行的代码。这意味着以下代码是不合法的（并且具有误导性）：\n\
  \n```\nswitch (value) {\ncase 2:\ncase 3:  // 非法 – 前一个 case 是空的。\nprint(\"值是 2 或\
  \ 3\")\ndefault:\nprint(\"值既不是 2 也不是 3\")\n}\n```\n\n正确的写法是将 2 和 3 包含在同一个 `case`\
  \ 中：\n\n```\nswitch (value) {\ncase 2, 3:   // 正确：捕获值为 2 和值为 3 的情况\nprint(\"值是 2\
  \ 或 3\")\ndefault:\nprint(\"值既不是 2 也不是 3\")\n}\n```\n\n或者，你可以使用 `fallthrough`：\n\
  \n```\nswitch (value) {\ncase 2: fallthrough\ncase 3:  // 非法 – 前一个 case 是空的。\nprint(\"\
  值是 2 或 3\")\ndefault:\nprint(\"值既不是 2 也不是 3\")\n}\n```\n\n`switch` 表达式不一定是数值类型。下面是一个基于字符串值进行\
  \ switch 的例子：\n\n```\nlet s = \"Hello\"\nswitch s {\ncase \"Hello\":\nprint(\"也向你问好\"\
  )\ncase \"Goodbye\":\nprint(\"明天见\")\ndefault:\nprint(\"我不明白\")\n}\n```\n\n下一个例子使用了我们之前定义的\
  \ `Status` 枚举，并展示了如何访问带有关联值的枚举 case 的关联值：\n\n```\nenum Status {\ncase OK\ncase ERROR(String)\n\
  }\nlet result = Status.ERROR(\"网络连接被拒绝\")\nswitch (result) {\ncase .OK:\nprint(\"\
  成功！\")\ncase .ERROR(let message):\nprint(\"哎呀：\\(message)\")\n}\n```\n\n由于编译器知道\
  \ `switch` 表达式的类型是 `Status`，因此无需使用完全限定名称来写 `case` 的值；我们可以写成 `case .OK` 而非 `case\
  \ Status.OK`。编译器还知道该枚举只有两个可能的值，并且这两个值都已作为 `case` 列出，因此无需添加 `default` 分支。注意 `.ERROR`\
  \ case 的形式；`.ERROR(let message)` 会让编译器提取 `ERROR` 的关联值，并将其赋值给一个名为 `message` 的常量，该常量仅在当前\
  \ case 的作用域内有效。如果枚举有多个关联值，你可以为每个值包含一个 `let` 语句，用逗号分隔，从而获取所有值。\n\n### 函数与闭包\n\n与许多其他语言不同，Swift\
  \ 使用一个关键字 (`func`) 来表示函数。要定义一个函数，你需要给出它的名称、参数列表和返回类型。以下函数根据矩形的边长计算并返回其面积：\n\n```\n\
  func areaOfRectangle(width: Double, height: Double) -> Double {\nreturn width *\
  \ height\n}\n```\n\n函数参数放在圆括号内，用逗号分隔，其书写方式与变量声明相同——即名称后跟类型。然而，与变量声明不同的是，指定参数的类型是必不可少的。如果函数没有参数，圆括号必须为空：\n\
  \n```\nfunc hello() {\nprint(\"你好，世界\")\n}\n```\n\n如果函数有返回值，则必须给出返回值的类型，并在其前面加上符号\
  \ `->`。在这个例子中，参数都是 `Double` 类型，返回值也是。如果函数不返回任何内容，你可以省略返回类型（如前面 `hello()` 函数的定义所示），也可以将其写为\
  \ `-> Void`。下面是一个根据 `debug` 变量的值要么什么都不做，要么打印其参数，并且不返回任何内容的函数：\n\n```\nlet debug\
  \ = true   // 启用调试\nfunc debugPrint(value: Double) {\nif debug {\nprint(value)\n\
  }\n}\n```\n\n这个函数的定义也可以写得更详细一些，如下所示：\n\n```\nfunc debugPrint(value: Double) -> Void\
  \ {  // \"-> Void\" 是可选的\n```\n\n要调用函数，请通过名称引用它并提供相应的参数：\n\n```\nlet area = areaOfRectangle(width:\
  \ 20, height: 10)\n```\n\n在 Swift 3 之前，可以省略第一个参数的名称，如下：\n\n```\nlet area = areaOfRectangle(20,\
  \ height: 10)   // 在 Swift 3 中不再有效\n```\n\nSwift 的另一个特性是函数参数可以有两个名称——外部名称（由函数调用者使用的名称）和内部名称（在函数体内部使用的名称）。是否提供外部名称是可选的。如果你不提供，外部名称将被视为与内部名称相同。这里是编写\
  \ `areaOfRectangle()` 函数的另一种方式，这次同时使用了外部和内部参数名称：\n\n```\nfunc areaOfRectangle(width\
  \ w: Double, height h: Double) -> Double {\nreturn w * h\n}\n```\n\n当你同时指定了外部和内部参数名称时，外部名称在前；如果你只提供一个参数名称，那么它就是内部参数名称，并且没有外部名称。注意，函数体内部使用的是内部参数名称（`w`\
  \ 和 `h`），而不是外部名称（`width` 和 `height`）。那么，为什么要使用外部参数名称呢？这个特性部分是为了适应 Objective-C 方法的命名约定，编译器需要映射这些方法以便能从\
  \ Swift 中调用它们。当我们在本附录后面研究 Swift 类时，会更详细地讨论这一点。在这个例子中，添加外部名称的唯一好处是，如果存在外部名称，调用者在调用函数时必须提供它们，这使代码更具可读性：\n\
  \n```\nlet area = areaOfRectangle(width: 20, height: 10)   // 现在 \"width\" 和 \"\
  height\" 是强制性的\n```\n\n你可以通过在参数列表中包含默认值来为函数参数提供默认值。以下函数按给定的分隔符将输入的字符串拆分为组件，如果未给出分隔符，则默认使用空格：\n\
  \n```\nfunc separateWords(str: String, delimiter: String = \" \") -> [String] {\n\
  return str.components(separatedBy: delimiter)\n}\n```\n\n你可以在不提供显式分隔符的情况下调用此函数，在这种情况下，将使用单个空格作为分隔符：\n\
  \n```\nlet result = separateWords(str:\"一小步\")\nprint(result)    // [一, 小步]\n```\n\
  \n\n\nSwift 会自动为带默认值的参数提供外部名称，使其与内部名称相同（不过你可以通过提供自己的外部名称来覆盖这一行为）。这意味着，如果参数值不是默认值，则必须使用该参数名称：\n\
  \n```\nlet result = separateWords(str: \"One. Two. Three\", delimiter: \". \") \
  \ // “delimiter”是必需的\nprint(result)    // [One, Two, Three]\n```\n\n如果你真的不想强制用户包含参数名称，可以将外部名称写为\
  \ `_`，不过不建议这样做，因为它会降低可读性：\n\n```\nfunc separateWords(str: String, _ delimiter: String\
  \ = \" \") -> [String] {\nreturn str.components(separatedBy: delimiter)\n}\nlet\
  \ result = separateWords(str: \"One. Two. Three\",  \". \")  // “delimiter”是必需的\n\
  print(result)    // [One, Two, Three]\n```\n\n你可以利用这一点修改 `areaOfRectangle()` 函数，使其两个参数名称都不需要提供：\n\
  \n```\nfunc areaOfRectangle(_ w: Double, _ h: Double) -> Double {\nreturn w * h\n\
  }\nlet area = areaOfRectangle(20, 10)\n```\n\n请注意，如果想要首先使用一个未命名的参数，则必须在其前面加上 `_`。\n\
  \n```\nfunc areaOfRectangle(_ w: Double, _ h: Double) -> Double {\nreturn w * h\n\
  }\n```\n\n在 Swift 中，函数是类型，因此你可以创建函数类型的变量，将函数的引用赋值给它，然后使用该变量来调用函数。类似地，你可以将函数作为参数传递给另一个函数，或者从一个函数中返回另一个函数。\n\
  \n要声明一个函数变量，你需要将函数的签名指定为变量的类型。该签名由括号中的函数参数类型组成（除非只有一个参数，此时可以省略括号），后跟 `->`，再后跟返回类型。以下代码创建了一个变量，它可以持有对某个函数的引用，该函数对\
  \ `Double` 执行未指定的操作并返回另一个 `Double`：\n\n```\nvar operation: (Double) -> Double\n\
  ```\n\n对于单个函数参数，旧版 Swift 允许省略括号，但这已不再有效：\n\n```\nvar operation: Double -> Double\
  \                   // 在 Swift 3 中已不再有效\n```\n\n你可以编写一些对 `Double` 进行操作的函数，并将其中任意一个函数赋值给该变量。例如：\n\
  \n```\nfunc doubleMe(number: Double) -> Double {\nreturn 2 * number\n}\noperation\
  \ = doubleMe\n```\n\n现在你可以使用函数变量来调用该函数，就像直接调用函数一样提供参数：\n\n```\noperation(2)    //\
  \ 结果为 4\n```\n\n你可以让 `operation` 变量引用另一个不同的函数，并使用相同的调用表达式执行不同的操作：\n\n```\nfunc quadrupleMe(number:\
  \ Double) -> Double {\nreturn 4 * number\n}\noperation = quadrupleMe\noperation(2)\
  \    // 结果为 8\n```\n\n以这种方式传递函数的能力非常强大。Swift 中有几种方法接受函数参数。其中之一是 `sorted()` 方法，它根据作为参数传递的函数所提供的排序规则来对有序集合进行排序。排序函数需要接受两个参数，这两个参数是要排序集合中的元素，如果第一个参数小于第二个参数，则返回\
  \ `Bool` 值 `true`，否则返回 `false`。下面是一个比较两个 `Int` 的此类函数示例：\n\n```\nfunc compareInts(_\
  \ first: Int, _ second: Int) -> Bool {\nreturn first < second\n}\n```\n\n现在你可以创建一个\
  \ `Int` 数组，并使用 `sort()` 和 `compareInts()` 函数对其排序。为此，将 `compareInts()` 函数作为参数传递给\
  \ `sort()`，如下所示：\n\n```\nvar values = [12, 3, 5, -4, 16, 18]\nlet sortedValues =\
  \ values.sorted(isOrderedBefore: compareInts)\nsortedValues   // 结果： [-4, 3, 5,\
  \ 12, 16, 18]\n```\n\n`sorted()` 函数返回数组的一个已排序副本。有一个类似的方法叫做 `sort()`，它对原始集合进行原地升序排序。\n\
  \n```\nvar values = [12, 3, 5, -4, 16, 18]\nvalues.sort(compareInts)\nvalues   //\
  \ 结果： [-4, 3, 5, 12, 16, 18]\n```\n\nSwift 更进一步，允许你直接在 `sorted()` 调用的参数列表中编写比较函数。这意味着你无需单独定义一个函数并给它起一个别处用不到的名字。下面是如何使用该技术对\
  \ `values` 数组进行排序：\n\n```\nvar values = [12, 3, 5, -4, 16, 18]\nlet sortedValues\
  \ = values.sorted(isOrderedBefore: {(first: Int, second: Int) -> Bool in\nreturn\
  \ first < second\n})\n```\n\n这乍看起来很复杂，所以让我们拆解一下。比较函数必须用花括号括起来。之后，定义的第一部分只是它的参数列表和返回类型，后跟关键字\
  \ `in`，它将参数和返回类型与函数体分隔开：\n\n```\n{(first: Int, second: Int) -> Bool in\n```\n\n\
  接下来，我们有函数体，它与 `compareInts()` 函数的原始代码相同，后跟右花括号和用于闭合 `sorted()` 方法参数列表的右括号：\n\n```\n\
  return first < second\n})\n```\n\n这种就地编写的匿名函数有一个名称：它被称为闭包。一旦你习惯了它的工作方式，你可能会发现自己会大量使用闭包。其他语言也支持这种能力，例如\
  \ Python 中它被称为 lambda。\n\n如果闭包是函数的最后一个参数，Swift 允许你通过将其放在函数参数列表之外来稍微清理语法，如下所示：\n\n\
  ```\nlet sortedValues = values.sorted() {   // 闭包现在位于括号之外\n(first: Int, second:\
  \ Int) -> Bool in\nreturn first < second\n}\n```\n\n代码仍然不少。幸运的是，我们可以进一步简化。Swift\
  \ 可以推断出闭包需要两个 `Int` 参数并且必须返回一个 `Bool`。它之所以知道这一点，是因为 `sort()` 方法在标准库中的定义方式。因此，我们可以省略参数类型、参数名称周围的括号以及返回类型，只剩下这些：\n\
  \n```\nlet sortedValues = values.sorted() {\nfirst, second in   // Swift 推断出参数类型和返回类型！\n\
  return first < second\n}\n```\n\n这样好多了。但我们还可以更进一步，连参数名称也省略掉。Swift 知道有两个参数，如果你不命名它们，它会称它们为\
  \ `$0` 和 `$1`（如果有更多参数，则为 `$2`、`$3` 等）。这样我们可以将闭包缩减为一行代码：\n\n```\nlet sortedValues\
  \ = values.sorted() { return $0 < $1 }\n```\n\n这还不是终点。Swift 还允许你省略 `return` 关键字。所以最终我们得到这样的结果：\n\
  \n```\nlet sortedValues = values.sorted() { $0 < $1 }\n}\n\n我们想你会同意，这比我们开始时的表达性强多了。或者，至少一旦你习惯了阅读这种略显简洁的语法后，就会觉得如此。在\
  \ playground 中尝试一下，尝试一些变体，看看哪些可行，哪些不可行。\n\n如果你想知道为什么闭包被称为闭包，那是因为它们会“捕获”创建时在其作用域内的变量。这意味着它们可以读取甚至写入这些变量。如果没有正确的上下文，很难理解这有多大用处。你将在本书的其余部分看到说明这一点的示例。现在，让我们先演示一下如何编写一个使用其外部定义值的闭包。看看下面的代码：\n\
  \n```\nfunc getInterestCalculator(rate: Double) -> (Double, Int) -> Double {\nlet\
  \ calculator = {\n(amount: Double, years: Int) -> Double in rate * amount * Double(years)\n\
  }\nreturn calculator\n}\n```\n\n\n\n函数签名告诉我们，`getInterestCalculator()`函数需要一个`Double`类型的参数，并返回一个函数。返回的函数需要两个参数——一个`Double`和一个`Int`——并返回一个`Double`。\n\
  \n实际上，我们在这里做的是将利率传递给`getInterestCalculator()`函数，它会返回给我们一个函数，该函数将以该利率计算单利。\n\n在`getInterestCalculator()`函数内部，我们创建了一个闭包，并将其赋值给`calculator`变量：\n\
  \n```\nlet calculator = {\n(amount: Double, years: Int) -> Double in rate * amount\
  \ * Double(years)\n}\n```\n\n如您所见，闭包函数需要金额`amount`作为`Double`，以及计算利息的周期（以年为单位）作为`Int`。最需要注意的一点是，闭包体使用了传递给`getInterestCalculator()`函数的`rate`参数。最后，闭包被返回给`getInterestCalculator()`的调用者。\n\
  \n现在让我们编写一些代码来调用此函数，并使用它返回的函数：\n\n```\nlet calculator = getInterestCalculator(rate:\
  \ 0.05)\ncalculator(100.0, 2)   // 结果为 10：利率 5%，100 美元，2 年的利息。\n```\n\n返回的函数被赋值给`calculator`常量，然后它被调用来计算\
  \ 100 美元在两年内、利率为 5% 的利息。这有什么有趣的呢？好吧，想想这里发生了什么。返回的闭包引用了`getInterestCalculator()`函数的`rate`参数的值，但这是在函数已经返回之后发生的。这怎么可能？之所以有效，是因为闭包通过引用来捕获函数参数。当闭包被创建时，它会捕获一个变量，该变量的值会被复制一份，并在闭包执行时使用该副本。这就是传递给`getInterestCalculator()`的利率值在参数本身不再存在后，仍能供闭包使用的方式。\n\
  \n### 错误处理\n\n如果您浏览 Xcode 文档中`NSString`类的页面，您会看到几个包含`throws`子句的方法声明，例如：\n\n```\n\
  init(contentsOfFile path: String, encoding enc: UInt) throws\n```\n\n每当您看到`throws`子句时，这意味着该方法会报告一个错误，您可以选择忽略它，或者通过捕获它来处理。我们首先看看如何忽略它，然后看看如何捕获并处理错误。让我们尝试忽略它，假装`throws`子句不存在：\n\
  \n```\nlet s = String(contentsOfFile: \"XX\", encoding: String.Encoding.utf8)\n\
  ```\n\n如果您在 playground 中输入这段代码，您会看到错误“Call can throw but is not marked with ‘try’”。为了让编译器接受这个调用，我们必须添加一个`try`子句。`try`有三种变体，其中两种允许您忽略错误，第三种用于您打算捕获错误时使用。让我们继续忽略潜在的错误：\n\
  \n```\nlet s = try? String(contentsOfFile: \"XX\", encoding: String.Encoding.utf8)\n\
  ```\n\n这样就消除了编译错误。现在 playground 执行该语句，并显示结果`nil`。当您使用`try?`时，您正在将所调用方法的返回类型转换为可选类型。由于此方法实际上是`String`类（`String`实际继承自`NSString`）的初始化器，因此返回类型被转换为`String?`，这就是变量`s`的推断类型。在这种情况下，值为`nil`，因为文件“`XX`”实际上并不存在。\n\
  \n我们可以在`if`语句中使用`try?`子句，仅在文件存在且其内容成功加载时才执行某些操作：\n\n```\nif let s = try? String(contentsOfFile:\
  \ \"XX\", encoding: String.Encoding.utf8) {\nprint(\"Content loaded\")\n} else {\n\
  print(\"Failed to load contents of file\")\n}\n```\n\n如果您确定要读取的文件存在且其内容可以读取，您可以将`try?`替换为`try!`，如下所示：\n\
  \n```\nlet s = try! String(contentsOfFile: \"XX\", encoding: String.Encoding.utf8)\n\
  ```\n\n虽然这是合法的语法，但这并不是好的做法，因为如果出现任何问题，您的应用程序就会崩溃——您可以通过在 playground 中尝试此语句来看到这点。\n\
  \n#### 捕获错误\n\n您已经看到，如果在`if let`语句中使用`try?`，您可以判断操作是否成功完成，并在操作未成功时采取一些不同的措施。`try?`语句通过返回`nil`值隐式地告诉您发生了错误，但无法查明该错误是什么。为此，您必须使用`try`语句，并将其包装在`do`-`catch`块中，如下所示：\n\
  \n```\ndo {\nlet s = try String(contentsOfFile: \"XX\", encoding: String.Encoding.utf8)\n\
  print(\"Loaded content \\(s)\")\n} catch {\nprint(error)\n}\n```\n\n`do`块内的语句会一直执行到完成，或者直到其中一条语句抛出错误，此时控制权转移到`catch`块。`init(contentsOfFile:encoding:)`初始化器抛出一个`NSError`类型的值，这是\
  \ Foundation 框架的通用错误类型。在`catch`块内部，您可以从`error`变量中获取错误的值，如前面的示例所示。\n\n\n\n### 抛出错误\n\
  \n任何函数或方法都可以抛出错误，前提是它在定义中通过包含`throws`子句来声明。抛出的值可以是任何遵循`ErrorType`协议的类型，就像`NSError`那样——事实上，如果你检查前面示例中`error`变量的推断类型，你会发现它是`ErrorType`。Foundation\
  \ 框架（以及其他 Apple 框架）中的方法抛出的错误类型为`NSError`，但你可以在自己的代码中自由定义自定义错误类型。通常使用枚举来实现这一目的，因为它可以方便地表示一个或多个错误情况，甚至可以包含关于错误的额外信息。\n\
  \n举个例子，我们来编写一个函数，根据三角形的两边长度及其夹角计算第三边的长度。我们坚持要求对应边长度的参数值必须为正数，且夹角必须在 0 到π弧度之间。首先，我们编写不包含任何错误检查的函数：\n\
  \n```\nfunc calcThirdSide(_ side1: Double, side2: Double, angle: Double) -> Double\
  \ {\n    return sqrt(side1 * side1 + side2 * side2 - 2 * side1 * side2 * cos(angle))\n\
  }\n```\n\n我们使用余弦定理来计算第三边的长度。为了检查实现是否正确，让我们在一个边长为 3 和 4 的直角三角形上测试：\n\n```\nlet side3\
  \ = calcThirdSide(3, side2: 4, angle: M_PI/2)\nprint(side3)\n```\n\n勾股定理告诉我们，这种情况下第三边的长度应为\
  \ 5，如果你运行这段代码，在 Playground 中会看到这个结果。现在开始添加错误检查。我们需要检查两种不同类型的条件——边长和角度值。这天然适合使用枚举，所以让我们定义一个：\n\
  \n```\nenum TriangleError : ErrorProtocol {\n    case SideInvalid(reason: String)\n\
  \    case AngleInvalid(reason: String)\n}\n```\n\n由于我们将抛出此枚举的实例，因此它需要遵循`ErrorProtocol`。我们为每种需要检查的错误类型定义了\
  \ case，并可以提供错误消息，因此两个 case 都关联了一个字符串值。\n\n在将错误检查添加到函数之前，我们必须告诉编译器它可能抛出错误。为此，我们在函数定义中添加`throws`关键字。该关键字必须放在函数的参数列表之后、返回类型（如果有）之前：\n\
  \n```\nfunc calcThirdSide(_ side1: Double, side2: Double, angle: Double) throws\
  \ -> Double {\n    return sqrt(side1 * side1 + side2 * side2 - 2 * side1 * side2\
  \ * cos(angle))\n}\n```\n\n一旦你添加了`throws`关键字，编译器就会开始报错，提示函数调用未在`try`语句中进行。让我们通过添加一些代码来捕获错误以解决这个问题：\n\
  \n```\ndo {\n    let side3 = try calcThirdSide(3, side2: 4, angle: M_PI/2)\n   \
  \ print(side3)\n} catch {\n    print(error)\n}\n```\n\n现在我们可以开始向`calcThirdSide(side1:side2:angle:)`函数添加错误检查。将函数定义修改为：\n\
  \n```\nfunc calcThirdSide(_ side1: Double, side2: Double, angle: Double) throws\
  \ -> Double {\n    if side1 <= 0 {\n        throw TriangleError.SideInvalid(reason:\
  \ \"Side 1 must be >= 0, not \\(side1)\")\n    }\n    return sqrt(side1 * side1\
  \ + side2 * side2 - 2 * side1 * side2 * cos(angle))\n}\n```\n\n`if`语句检查`side1`参数的值是否为零或负数，如果是，则使用`throw`关键字抛出一个带有适当消息的`TriangleError`枚举实例。为了测试是否有效，将测试代码中`side1`参数的值从\
  \ 3 改为-1：\n\n```\nlet side3 = try calcThirdSide(-1, side2: 4, angle: M_PI/2)\n```\n\
  \n你应该会在 Playground 的结果区域看到文本`SideInvalid(\"Side 1 must be >= 0, not -1.0\")`，表明正确的错误被抛出并捕获了。\n\
  \n现在让我们将另外三个错误检查添加到`calcThirdSide(side1:side2:angle:)`函数中：\n\n```\nfunc calcThirdSide(_\
  \ side1: Double, side2: Double, angle: Double) throws -> Double {\n    if side1\
  \ <= 0 {\n        throw TriangleError.SideInvalid(reason: \"Side 1 must be >= 0,\
  \ not \\(side1)\")\n    }\n    if side2 <= 0 {\n        throw TriangleError.SideInvalid(reason:\
  \ \"Side 2 must be >= 0, not \\(side2)\")\n    }\n    if angle < 0 {\n        throw\
  \ TriangleError.AngleInvalid(reason: \"Angle must be >= 0, not \\(angle)\")\n  \
  \  }\n    if angle >= M_PI {\n        throw TriangleError.AngleInvalid(reason: \"\
  Angle must be <= π, not \\(angle)\")\n    }\n    return sqrt(side1 * side1 + side2\
  \ * side2 - 2 * side1 * side2 * cos(angle))\n}\n```\n\n尝试向`calcThirdSide(side1:side2:angle:)`函数传递不同的参数，以验证这些检查是否有效。\n\
  \n### guard 语句\n\n在函数开头编写这样的参数检查代码非常常见。Swift 提供了另一种表达这些错误测试的方式——你可以使用`guard`语句代替`if`语句。下面是使用`guard`（而非`if`）重写`calcThirdSide(side1:side2:angle:)`函数的方法：\n\
  \n```\nfunc calcThirdSide(_ side1: Double, side2: Double, angle: Double) throws\
  \ -> Double {\n    guard side1 > 0 else {\n        throw TriangleError.SideInvalid(reason:\
  \ \"Side 1 must be >= 0, not \\(side1)\")\n    }\n    guard side2 > 0 else {\n \
  \       throw TriangleError.SideInvalid(reason: \"Side 2 must be >= 0, not \\(side2)\"\
  )\n    }\n    guard angle >= 0 else {\n        throw TriangleError.AngleInvalid(reason:\
  \ \"Angle must be >= 0, not \\(angle)\")\n    }\n    guard angle < M_PI else {\n\
  \        throw TriangleError.AngleInvalid(reason: \"Angle must be <= π, not \\(angle)\"\
  )\n    }\n    return sqrt(side1 * side1 + side2 * side2 - 2 * side1 * side2 * cos(angle))\n\
  }\n```\n\n`guard`语句的主体必须前面加上`else`关键字，并且仅当测试的条件不满足时才会执行。你可以将`guard`的含义理解为“除非满足此条件，否则执行语句主体”。因此，测试的逻辑必须与`if`语句测试的逻辑相反——例如，第一个`if`语句测试的条件是`side1\
  \ <= 0`，而等效的`guard`语句的条件是`side1 > 0`。起初这可能看起来很奇怪，但一旦你习惯了，就会看到`guard`版本的代码更清晰，因为我们在陈述为了继续执行而需要满足的条件，而不是相反的条件。\n\
  \n`guard`语句的一般形式是：\n\n```\nguard expression else {\n    // Guard body statements\n\
  \    // Transfer of control outside the scope containing the guard\n}\n// Control\
  \ must not reach here if the guard body was executed\n```\n\n`guard`主体可以包含任意数量的独立语句，前提是满足一个条件：在语句主体结束时，控制流必须转移到`guard`语句的当前作用域之外。在前面的例子中，`guard`语句位于`calcThirdSide(side1:side2:angle:)`函数的作用域内，因此在\
  \ guard 块结束时，控制流必须转移出该函数。在这里，我们通过抛出错误来实现，但我们也可以从函数中返回。如果 guard 块包含在`for`语句中，那么当前作用域就是`for`语句，你可以使用`continue`语句或`break`语句来满足`guard`语句的要求。同样的规则适用于`repeat`和`while`语句。如果你允许控制流从`guard`块末尾继续执行到其后的语句，则会出现编译错误。\n\
  \n\n\n### 关于错误捕获的更多内容\n\n到目前为止，我们只使用了一个通用的 `catch` 块来捕获并打印从 `calcThirdSide(side1:side2:angle:)`\
  \ 函数中抛出的任何错误。更普遍的情况是，一个 `do`-`catch` 语句可以包含多个 `catch` 块，并且每个 `catch` 块都可以有一个表达式，通过与抛出的错误进行匹配，以选择应执行的代码块。如果没有\
  \ `catch` 块的表达式与错误匹配，则会使用没有表达式的那个块；如果不存在这样的块，则错误会被抛给包含该 `do`-`catch` 语句的函数或方法的调用方，并且该函数或方法必须在其定义中包含\
  \ `throws` 子句来声明可能发生此情况。让我们来看一些示例。\n\n将 playground 中的 `do`-`catch` 块修改如下：\n\n```\n\
  do {\nlet side3 = try calcThirdSide( -1, side2: 4, angle: M_PI/2)\nprint(side3)\n\
  } catch let e as TriangleError {\nprint(e)\n}\n```\n\n这里，我们为 `catch` 块添加了一个表达式，使其仅捕获类型为\
  \ `TriangleError` 的错误。该错误本身被赋值给变量 `e`，该变量仅在 `catch` 块的作用域内有效。由于 `calcThirdSide(side1:side2:angle:)`\
  \ 函数只会抛出此类型的错误，我们不需要再添加其他的 `catch` 块。如果我们想以不同的方式处理特定类型的错误，只需添加更多的 case 即可。示例如下：\n\
  \n```\ndo {\nlet side3 = try calcThirdSide( -1, side2: 4, angle: M_PI/2)\nprint(side3)\n\
  } catch TriangleError.SideInvalid(let reason) {\nprint(\"捕获到无效边长：\\(reason)\")\n\
  } catch {\nprint(\"捕获到 \\(error)\")\n}\n```\n\n第一个 `catch` 块处理 `SideInvalid` 情况，并将枚举值中的错误信息赋值给变量\
  \ `reason`，以便在 `catch` 块的主体中使用。第二个 `catch` 块没有表达式，因此它会捕获未被前面块处理的任何错误。在此例中，这对应的是\
  \ `AngleInvalid` 情况。当存在像最后一个这样的全捕获（catch-all）块时，它必须是最终的 `catch` 块，因此下面的写法是无效的：\n\
  \n```\ndo {\nlet side3 = try calcThirdSide(-1, side2: 4, angle: M_PI/2)\nprint(side3)\n\
  } catch {  // 无效——这必须是最后一个 catch 块\nprint(“捕获到：\\(error)”)\n} catch TriangleError.SideInvalid(let\
  \ reason) {\nprint(\"捕获到无效边长：\\(reason)\")\n}\n```\n\n要单独处理每种情况，只需为每种情况提供各自的 `catch`\
  \ 块：\n\n```\ndo {\nlet side3 = try calcThirdSide(-1, side2: 4, angle: -M_PI/2)\n\
  print(side3)\n} catch TriangleError.AngleInvalid(let reason) {\nprint(\"捕获到无效角度：\\\
  (reason)\")\n} catch TriangleError.SideInvalid(let reason) {\nprint(\"捕获到无效边长：\\\
  (reason)\")\n}\n```\n\n由于我们已经显式处理了 `calcThirdSide(side1:side2:angle:)` 函数可能抛出的两种错误，因此无需再添加全捕获的\
  \ `catch` 块。\n\n### 类和结构体\n\nSwift 提供了两种创建自定义类型的不同方式——类和结构体。两者都可以包含属性、初始化方法和方法。属性是在类或结构体内部定义的变量；方法是在类或结构体中定义的函数；而初始化方法是一种特殊类型的方法，用于在创建类或结构体实例时建立其初始状态。\n\
  \n### 结构体\n\n以下是一个表示具有给定半径的圆的结构体示例：\n\n```\nstruct CircleStruct {\nvar radius: Double\n\
  func getArea() -> Double {\nreturn M_PI * radius * radius\n}\nfunc getCircumference()\
  \ -> Double {\nreturn 2 * M_PI * radius\n}\n}\n```\n\n该圆有一个保存其半径的属性，以及两个分别返回其面积和周长的*方法*。\n\
  \nSwift 会自动为结构体创建一个初始化方法，该初始化方法使用其参数为属性赋值。以下是使用该初始化方法创建 `CircleStruct` 实例的方法：\n\n\
  ```\nvar circleStruct = CircleStruct(radius: 10)\n```\n\n结构体的合成初始化方法为每个属性提供了一个参数。参数名称与属性名称相同，并且它们出现的顺序与属性在结构体中定义的顺序一致。请注意，在使用初始化方法时必须使用参数名称，因为初始化方法的参数同时具有外部名称和内部名称。\n\
  \n创建结构体实例后，你可以直接通过属性名称读取和修改属性。以下代码会读取圆的半径，然后将其加倍：\n\n```\nvar circleStruct = CircleStruct(radius:\
  \ 10)\nlet r = circleStruct.radius          // 读取 radius 属性——结果 = 10\ncircleStruct.radius\
  \ = 2 * r          // 将半径加倍。\n```\n\n结构体是值对象，因此以下代码会创建原始 `CircleStruct` 对象的一个副本，并将其赋值给\
  \ `newCircleStruct` 变量。通过 `newCircleStruct` 变量对 `radius` 属性所做的更改不会影响原始对象，反之亦然：\n\
  \n```\nvar newCircleStruct = circleStruct   // 复制结构体\nnewCircleStruct.radius = 32\
  \          // 仅影响副本\nnewCircleStruct.radius               // 新值：32\ncircleStruct.radius\
  \                  // 旧值：20\n```\n\n如果使用 `let` 语句将结构体赋值给常量，则其所有属性都将变为只读：\n\n```\n\
  let constantCircleStruct = CircleStruct(radius: 5)\nconstantCircleStruct.radius\
  \ = 10    // 无效：constantCircleStruct 是常量\n```\n\nSwift 要求结构体（或类）的所有属性在初始化方法完成执行之前必须被初始化。你可以选择在初始化方法本身中设置属性值，或者作为属性定义的一部分。以下是\
  \ `CircleStruct` 结构体的一个略微不同的实现，它在定义时将 `radius` 初始化为默认值 1：\n\n```\nstruct CircleStruct\
  \ {\nvar radius: Double = 1\ninit() {\n}\ninit(radius: Double) {\nself.radius =\
  \ radius\n}\nfunc getArea() -> Double {\nreturn M_PI * radius * radius\n}\nfunc\
  \ getCircumference() -> Double {\nreturn 2 * M_PI * radius\n}\n}\n```\n\n请注意，该结构体现在有两个初始化方法（初始化方法总是被称为\
  \ `init`）：一个不带参数，另一个以半径作为其参数。第一个初始化方法让你可以使用 `radius` 属性定义中设置的默认半径来创建结构体实例：\n\n```\n\
  let circleStructDefault = CircleStruct()\ncircleStructDefault.radius    // 结果为 1\n\
  ```\n\n第二个初始化方法将其参数赋值给 `radius` 属性：\n\n```\ninit(radius: Double) {\nself.radius\
  \ = radius\n}\n```\n\n在我们添加无参数初始化方法之前，我们不需要编写这种带参数的初始化方法，因为 Swift 会自动为我们创建；但如果你自己添加了初始化方法，它就不会再自动生成了。请注意，对属性的赋值使用了\
  \ `self.radius` 这种形式。`self` 变量表示正在被初始化的结构体实例。在方法调用中，它表示调用该方法的实例。通常，你不需要使用 `self`\
  \ 来限定属性访问，但在此例中我们需要这样做，因为初始化方法的参数与属性同名。\n\n\n\n如前所述，默认情况下，Swift 要求你在创建结构体实例时使用初始化器参数名称（你很快会看到，这同样适用于类）。当你定义自己的初始化器时，可以通过使用`_`作为外部参数名称来取消这一要求，如下面对第二个`CircleStruct`初始化器的修改所示：\n\
  \n```\ninit(_ radius: Double) {\n    self.radius = radius\n}\n```\n\n经过这一更改，你必须像这样使用初始化器：\n\
  \n```\nvar circleStruct = CircleStruct(10)   // 必须省略参数名称\n```\n\n`getArea()`和`getCircumference()`方法的实现没有引入任何新内容；它们只是使用`radius`属性的值进行简单计算。请注意，我们在读取属性值时没有使用`self`，尽管我们可以使用。这个版本的`getArea()`方法等同于之前展示的版本：\n\
  \n```\nfunc getArea() -> Double {\n    return M_PI * self.radius * self.radius \
  \ // 显式使用\"self\"——不推荐\n}\n```\n\n这些方法的调用方式与任何其他函数相同，只是需要一个结构体的实例：\n\n```\nlet circleStructDefault\
  \ = CircleStruct()\ncircleStructDefault.getArea()            // 返回面积\ncircleStructDefault.getCircumference()\
  \   // 返回周长\n```\n\n### 类\n\n创建类在语法上与创建结构体非常相似，但有几个需要注意的差异。下面是一个将圆形实现为类的示例：\n\n\
  ```\nclass CircleClass {\n    var radius: Double = 1\n    init() {\n    }\n    init(radius:\
  \ Double) {\n        self.radius = radius\n    }\n    func getArea() -> Double {\n\
  \        return M_PI * radius * radius\n    }\n    func getCircumference() -> Double\
  \ {\n        return 2 * M_PI * radius\n    }\n}\n```\n\n这与结构体版本之间唯一的语法差异是关键字`class`而不是`struct`，但在\
  \ Swift 处理类和结构体初始化器的方式上存在一些差异：\n\n*   Swift 不会为类创建一个设置其属性初始值的初始化器。相反，它会创建一个空的`init()`初始化器。\n\
  *   与结构体一样，如果你添加了自己的初始化器，你将不再获得免费的`init()`初始化器。\n\n在`CircleClass`的情况下，`init(radius:\
  \ Double)`初始化器的存在意味着 Swift 不会生成`init()`版本，因此我们必须自己添加它。\n\n你可以根据是否要设置半径，使用任意一个初始化器来创建`CircleClass`实例：\n\
  \n```\nvar circleClassDefault = CircleClass()        // 设置默认半径\ncircleClassDefault.radius\
  \                     // 结果为 1\nvar circleClass = CircleClass(radius: 10)     //\
  \ 显式设置半径\ncircleClass.radius                            // 结果为 10\n```\n\n类不是值对象，因此将类实例赋值给变量或将其传递给函数不会创建副本，如下代码所示：\n\
  \n```\nvar newCircleClass = circleClass    // 不会复制\nnewCircleClass.radius = 32 \
  \         // 只有一个副本，因此此更改是可见的…\nnewCircleClass.radius               // …通过两个引用。结果为\
  \ 32\ncircleClass.radius                  // 结果为 32\n```\n\n### 属性\n\n我们圆形的`radius`属性被称为存储属性，因为该值与类或结构体一起存储。还可以有计算属性，它们没有自己的存储空间。相反，每次读取属性时都会计算其值。圆的面积和周长可以被视为属性，因此我们可以合理地将它们重新实现为计算属性。以下是你对`CircleClass`进行此操作的方法（`CircleStruct`的实现相同）：\n\
  \n```\nclass CircleClass {\n    var radius: Double = 1\n    var area: Double {\n\
  \        return M_PI * radius * radius\n    }\n    var circumference: Double {\n\
  \        return 2 * M_PI * radius\n    }\n    init() {\n    }\n    init(radius:\
  \ Double) {\n        self.radius = radius\n    }\n}\n```\n\n语法非常简单：你声明属性名称及其类型（对于计算属性是强制性的），后跟一个包含计算属性值所需代码的代码块。将`area`和`circumference`作为属性，我们可以用比使用方法更少的按键来获取它们的值：\n\
  \n```\nlet circleClass = CircleClass(radius: 10)\ncircleClass.area\ncircleClass.circumference\n\
  ```\n\n我们实际上在这些属性的实现中使用了一种快捷方式；例如，`area`属性的完整形式应该是：\n\n```\nvar area: Double {\n\
  \    get {\n        return M_PI * radius * radius\n    }\n}\n```\n\n区别在于`get`关键字和围绕计算属性值代码的额外花括号对。由于`area`是一个只读属性，我们没有实现设置器，因此\
  \ Swift 允许我们省略这个额外的样板代码。\n\n将`area`视为一个可设置属性是完全可能的。如果设置了新的面积，我们可以计算并存储对应的半径——`circumference`也是如此。要使属性可设置，你需要添加`set`块，并补回如果你省略了的`get`样板代码。以下是你如何为`area`和`circumference`实现设置器：\n\
  \n```\nvar area: Double {\n    get {\n        return M_PI * radius * radius\n  \
  \  }\n    set {\n        radius = sqrt(newValue / M_PI)\n    }\n}\nvar circumference:\
  \ Double {\n    get {\n        return 2 * M_PI * radius\n    }\n    set {\n    \
  \    radius = newValue / (2 * M_PI)\n    }\n}\n```\n\n在设置器的实现中，你从一个名为`newValue`的变量中获取正在设置的值。如果你不喜欢这个名称，可以在`set`关键字后声明一个你选择的名称：\n\
  \n```\nset (value) {\n    radius = value / (2 * M_PI)\n}\n```\n\n现在这些属性是可设置的，我们可以用它们来找出给定周长或面积对应的半径：\n\
  \n```\ncircleClass.area = 314\ncircleClass.radius       // 面积 314 对应的半径是 9.997\n\
  circleClass.circumference = 100\ncircleClass.radius       // 周长 100 对应的半径是 15.915\n\
  ```\n\nSwift 支持添加代码来观察存储属性（而非计算属性）的更改。为此，你需要在属性定义中添加`willSet`或`didSet`块（或两者）。每当属性值被设置时，这些块都会被调用，即使新值和旧值相同，但在属性被初始化时除外。`willSet`块在新值被赋给属性之前调用，`didSet`块在赋值之后调用。属性观察器的一个典型用法是确保属性只能被赋予有效值。以下是你如何修改`CircleClass`中的`radius`属性，以确保只能分配非负值：\n\
  \n```\nclass CircleClass {\n    var radius: Double = 1 {\n        didSet {\n   \
  \         if (radius < 0) {\n                radius = oldValue\n            }\n\
  \        }\n    }\n```\n\n当调用`didSet`块时，新值已经存储在`radius`属性中。如果它是负数，我们将其设置回先前的值，我们可以从`oldValue`变量获取该值。与属性设置器块一样，如果你愿意，可以更改此变量的名称。从`didSet`块内部设置属性值不会导致属性观察器块再次被调用。经过这一更改，尝试设置负半径的操作将被忽略：\n\
  \n```\ncircleClass.radius = 10    // 有效：半径被设置为 10\ncircleClass.radius         //\
  \ 结果：10.0\ncircleClass.radius = -1    // 无效——被 didSet 块捕获\ncircleClass.radius  \
  \       // 结果：10.0\n```\n\n\n\n### 方法\n\n如你所见，类和结构体都可以拥有方法。方法的行为与函数类似，区别在于方法可以访问一个隐式定义的值`self`，该值指向调用该方法的类或结构体实例。在类中定义的方法可以修改其属性值，但结构体的方法默认不具备此能力。下面我们通过为`CircleClass`添加一个名为`adjustRadiusByAmount(_:times:)`的新方法，来看看具体是如何实现的。该方法将圆的半径按指定次数增加给定的数值。方法定义如下：\n\
  \n```\nfunc adjustRadiusByAmount(amount: Double, times: Int = 1) {\n    radius +=\
  \ amount * Double(times)\n}\n```\n\n有了这个定义，你可以按如下方式调用该方法：\n\n```\nvar circleClass\
  \ = CircleClass(radius: 10)\ncircleClass.radius                       // 结果: 10\n\
  circleClass.adjustRadiusByAmount(5, times: 3)\ncircleClass.radius              \
  \        // 结果 = 10 + 3 * 5 = 25\ncircleClass.adjustRadiusByAmount(5)     // \"\
  times\" 参数默认为 1\ncircleClass.radius                      // 结果 = 30\n```\n\n现在尝试为`CircleStruct`结构体添加同样的方法：\n\
  \n```\nstruct CircleStruct {\n    var radius: Double = 1\n    init() {\n    }\n\
  \    init(radius: Double) {\n        self.radius = radius\n    }\n    func getArea()\
  \ -> Double {\n        return M_PI * radius * radius\n    }\n    func getCircumference()\
  \ -> Double {\n        return 2 * M_PI * radius\n    }\n    func adjustRadiusByAmount(amount:\
  \ Double, times: Int = 1) {\n        radius += amount * Double(times)\n    }\n}\n\
  ```\n\n遗憾的是，这段代码无法编译通过。默认情况下，结构体方法不能修改结构体的状态。这是因为我们被鼓励尽可能让值对象不可变。如果你确实想要添加像这样的可变方法，则需在其定义中添加`mutating`关键字：\n\
  \n```\nmutating func adjustRadiusBy(amount: Double, times: Int = 1) {\n    radius\
  \ += amount * Double(times)\n}\n```\n\n### 可选链\n\n如何调用可选类型的方法或访问其属性？你首先需要解包该可选值。操作时需非常小心，因为正如你所知，解包一个值为`nil`的可选类型会导致应用崩溃。假设我们有如下变量，并希望获取其指向圆的半径：\n\
  \n```\nvar optionalCircle: CircleClass?\n```\n\n由于`optionalCircle`的值可能为`nil`（并且在本例中确实为`nil`），我们不能直接这样操作：\n\
  \n```\noptionalCircle!.radius      // 崩溃！\n```\n\n相反，我们需要在解包前检查`optionalCircle`是否为`nil`，如下所示：\n\
  \n```\nif optionalCircle != nil {\n    optionalCircle!.radius\n}\n```\n\n这样是安全的，但代码量确实太多。有一种更好的方法，称为可选链。不同于使用`!`来解包可选值，你可以使用`?`。借助可选链，你可以回到仅需编写一行代码的方式：\n\
  \n```\nvar optionalCircle: CircleClass?\nvar radius = optionalCircle?.radius\n```\n\
  \n当使用可选链时，仅当`optionalCircle`不为`nil`时才会进行属性访问，并且由于可能没有值赋给`radius`变量，Swift 会将其类型推断为`Double?`而非`Double`。通常会将此技术与`if\
  \ let`结构结合使用，如下所示：\n\n```\nvar optionalCircle: CircleClass?\nif let radius = optionalCircle?.radius\
  \ {\n    print(\"radius = \\(radius)\")\n}\n```\n\n该技术的真正价值体现在当你拥有嵌套在其他对象中的对象，且对嵌入对象的引用是可选类型时。要沿着对象链追踪到你想要的值，之前你需要对每个引用进行`nil`检查。而使用可选链，你可以通过如下表达式让\
  \ Swift 为你完成繁重工作：\n\n```\nouterObject?.innerObject?.property\n```\n\n可选链同样适用于方法调用：\n\
  \n```\nvar optionalCircle: CircleClass?\noptionalCircle?.adjustRadiusByAmount(5,\
  \ times: 3)\n```\n\n仅当`optionalCircle`不为`nil`时，方法调用才会发生；如果为`nil`，则跳过该调用。\n\n###\
  \ 子类化与继承\n\n至此我们有了一个相当实用的表示圆的类。如果我们想为其添加新内容呢？例如，假设我们要添加一个颜色属性。很简单，我们只需在现有类定义中添加该属性即可。但如果我们不拥有`CircleClass`类呢？它可能是某个第三方框架的一部分。我们无法修改源代码。在许多类似情况下，我们或许可以为该类添加扩展。扩展允许你为任何类添加功能——即使是你并不拥有的类，有时这样做是正确的选择。不过在本例中，这样做并不合适，因为我们想要添加一个存储属性。因此，我们将通过创建子类来扩展该类。子类会继承其派生自的类（即它们的基类）的属性和方法。如果子类提供的内容不完全符合要求，你可以重写其行为，保留所需部分并修改需要更改的部分（当然，前提是基类设计得当）。\n\
  \n在本节中，我们将扩展`CircleClass`并创建`ColoredCircleClass`。`ColoredCircleClass`将拥有与`CircleClass`相同的特性——它仍有`radius`、`area`和`circumference`属性——并且会新增一个`color`属性。在开始之前，我们先为`CircleClass`添加更多内容，以便你能看到如何在派生类中重写它们。\n\
  \n清空你的游乐场，输入下面修改后的`CircleClass`定义：\n\n```\nclass CircleClass {\n    var radius:\
  \ Double = 1 {\n        didSet {\n            if (radius < 0) {\n              \
  \  radius = oldValue\n            }\n        }\n    }\n    var area: Double {\n\
  \        get {\n            return M_PI * radius * radius\n        }\n        set\
  \ {\n            radius = sqrt(newValue / M_PI)\n        }\n    }\n    var circumference:\
  \ Double {\n        get {\n            return 2 * M_PI * radius\n        }\n   \
  \     set {\n            radius = newValue / (2 * M_PI)\n        }\n    }\n    var\
  \ description: String {\n        return \"Circle of radius \\(radius)\"\n    }\n\
  \    required init() {\n    }\n    init(radius: Double) {\n        self.radius =\
  \ radius\n    }\n    func adjustRadiusByAmount(amount: Double, times: Int = 1) {\n\
  \        radius += amount * Double(times)\n    }\n    func reset() {\n        radius\
  \ = 1;\n    }\n}\n```\n\n首先，我们添加了一个计算属性`description`，它以字符串形式返回类的描述信息。这是一个计算属性，因为我们希望返回值包含当前半径，而半径是可变的。在`ColoredCircleClass`中，我们希望在描述中添加圆的颜色，正如你将看到的，我们会通过重写该属性来实现。\n\
  \n接着，我们在无参初始化器前添加了关键字`required`。拥有这样一个将所有属性设为默认值的初始化器非常有用。该类的设计者认为它如此重要，以至于希望确保任何由此创建的子类也提供这样的初始化器。在初始化器前添加`required`可以实现这一点，因为\
  \ Swift 编译器会确保子类也实现`init()`初始化器；此外，它还会确保该初始化器也被标记为`required`，以使子类的子类也承担同样的义务。在`ColoredCircleClass`中，我们将在该初始化器的版本中设置一个默认的`color`属性值。\n\
  \n最后，我们添加了一个`reset()`方法，将半径属性恢复为其默认值。我们需要在子类中重写此方法，以便同时重置圆的新的`color`属性。\n\n我们清楚需要做什么了。开始动手吧。在阅读以下内容时，请将新代码添加到你的游乐场中。过程中你可能会遇到错误和警告，不用担心，我们会随着进度逐一修复。\n\
  \n首先，我们需要创建子类，并告知 Swift 编译器其基类是`CircleClass`。操作如下：\n\n```\nclass ColoredCircleClass\
  \ : CircleClass {\n}\n```\n\n\n\n这是定义类的一种常规方式，它告诉 Swift，`ColoredCircleClass` 以 `CircleClass`\
  \ 作为其基类。每个类只能有一个基类，且必须以此方式进行声明。正如你很快会看到的，它还可以声明遵守一个或多个 `协议`，这些协议也会在此列出。\n\n接下来，我们添加新的存储属性：\n\
  \n```\nclass ColoredCircleClass : CircleClass {\nvar color: UIColor = UIColor.black\n\
  }\n```\n\n我们的属性类型是 `UIColor`——这是 UIKit 框架中的一个类，用于表示颜色。我们将该属性初始化为一个代表黑色的 `UIColor`\
  \ 实例。接下来，让我们覆写 `description` 属性，将颜色信息添加到返回的字符串中。实现方法如下：\n\n```\nclass ColoredCircleClass\
  \ : CircleClass {\nvar color: UIColor = UIColor.black\noverride var description:\
  \ String {\nreturn super.description + \", color \\(color)\"\n}\n}\n```\n\n首先要注意的是\
  \ `override` 关键字，它告诉编译器，我们知道基类中已经有一个 `description` 属性的定义，并且我们是有意覆写它的。在某些语言中，很容易无意中创建与基类中同名的属性或方法而不自知。这可能导致难以发现的错误。\n\
  \n属性的这个新实现首先通过表达式 `super.description` 调用基类版本。关键字 `super` 告诉编译器，我们想要引用超类（即我们派生而来的那个类）的\
  \ `description` 属性，而不是我们自己的。完成后，它会添加我们 `color` 属性的字符串表示。最终结果显示，`description` 将同时包含半径（来自超类）和颜色（来自本类）。\n\
  \n接下来，我们需要添加对 `init()` 初始化器的 `required` 覆写。代码如下：\n\n```\nrequired init() {\nsuper.init()\n\
  }\n```\n\n每个初始化器都必须确保自身类的所有属性都已初始化，然后确保基类也执行同样的操作。我们只有 `color` 这个属性，而且它已在声明点被初始化。因此，我们所要做的就是给基类一个初始化自身状态的机会，即通过调用\
  \ `super.init()` 来实现。如果我们还有其他需要初始化的属性，编译器要求我们在调用 `super.init()` 之前设置它们。另外，请注意 `required`\
  \ 关键字，这是必需的，因为基类 `init()` 已被标记为 `required`。\n\n**注意**\n\n我们之前提到，将基类 `init()` 初始化器标记为\
  \ `required` 会强制任何子类实现相同的初始化器。在此之前，我们的 `ColoredCircleClass` 并没有显式的 `init()` 初始化器，但却没有报错。这是为什么？原因在于，由于\
  \ `ColoredCircleClass` 没有其他初始化器，编译器自动为我们创建了 `init()` 初始化器，这满足了基类的要求。\n\n接下来，我们需要一个初始化器来设置非默认的\
  \ `radius` 和 `color` 值。将以下代码添加到类中：\n\n```\ninit(radius: Double, color: UIColor)\
  \ {\nself.color = color\nsuper.init(radius: radius)\n}\n```\n\n我们首先根据初始化器参数设置 `color`\
  \ 属性的值，然后将 `radius` 值传递给基类的初始化器。这就是我们需要做的全部事情。\n\n最后需要做的是覆写 `reset()` 方法，将 `color`\
  \ 属性重置为黑色。现在，你应该已经熟悉所需的内容了：\n\n```\noverride func reset() {\nsuper.reset()\ncolor\
  \ = UIColor.black\n}\n```\n\n和之前一样，`override` 关键字告诉编译器，我们正在覆写基类的一个方法（顺便提一下，如果我们输错方法名，比如写成了\
  \ \"resets\"，编译器会报错，指出基类中没有这个方法；这是 `override` 关键字带来的另一个好处）。该方法的其余部分遵循你之前见过的模式：先完成自己负责的部分——然后通过\
  \ `super` 关键字调用基类方法，让基类完成其部分工作。在这里，先做自己的部分还是先调用基类方法并不重要——换句话说，以下版本同样有效：\n\n```\n\
  override func reset() {\ncolor = UIColor.black\nsuper.reset()\n}\n```\n\n就这样。我们来试试默认初始化器：\n\
  \n```\nvar coloredCircle = ColoredCircleClass()\ncoloredCircle.radius          //\
  \ 结果: 1\ncoloredCircle.color           // 结果: black\ncoloredCircle.description\n\
  // 结果: \"Circle of radius 1.0, color UIDeviceWhiteColorSpace 0 1\"\n```\n\n现在试试另一个初始化器：\n\
  \n```\ncoloredCircle = ColoredCircleClass(radius: 20, color: UIColor.red())\ncoloredCircle.radius\
  \    // 结果: 20\ncoloredCircle.color      // 结果: red\ncoloredCircle.description\n\
  // 结果: \"Circle of radius 20.0, color UIDeviceRGBColorSpace 1 0 0 1\"\n```\n\n子类化是一种非常有用的技术。你在本书中看到的每个示例至少都会使用一个子类！值得花时间回顾\
  \ Apple 的《Swift 编程语言》一书中的 \"初始化\" 和 \"继承\" 部分。这里有很多我们没有时间涵盖的微妙细节。\n\n## 协议\n\n协议是一组方法、初始化器和属性的声明，类、结构体或枚举可以通过提供这些实现的途径来遵守该协议。正如你将在本书中看到的，协议常用于定义被称为委托的对象，这些对象提供了钩子，让你可以自定义框架类的行为、响应事件等。\n\
  \n以下是一个名为 `Resizable` 的协议定义：\n\n```\nprotocol Resizable {\nvar width: Float { get\
  \ set }\nvar height: Float { get set }\ninit(width: Float, height: Float)\nfunc\
  \ resizeBy( wFactor: Float, hFactor: Float) -> Void\n}\n```\n\n`Resizable` 协议要求任何声明遵守该协议的类型必须提供它所声明的两个属性、一个初始化器和一个函数。请注意，协议本身并未定义任何内容；它只是规定了遵守协议的类型必须做什么。以下是一个名为\
  \ `Rectangle` 的类，它遵守 `Resizable` 协议：\n\n```\nclass Rectangle : Resizable, CustomStringConvertible\
  \ {\nvar width: Float\nvar height: Float\nvar description: String {\nreturn \"Rectangle,\
  \ width \\(width), height \\(height)\"\n}\nrequired init(width: Float, height: Float)\
  \ {\nself.width = width\nself.height = height\n}\nfunc resizeBy( wFactor: Float,\
  \ hFactor: Float) -> Void {\nwidth *= wFactor\nheight *= hFactor\n}\n}\n```\n\n\
  类型在其声明中，通过在基类名称（如果有的话）后面加上协议名称来声明其遵守该协议。该类同时遵守 `Resizable` 协议和 Swift 标准库中定义的 `CustomStringConvertible`\
  \ 协议。\n\n正如你所见，该类提供了 `Resizable` 协议所要求的功能的实际实现。如果协议要求实现一个初始化器，那么该初始化器必须被标记为 `required`，如这里所示。遵守某个协议的类型的实例可以分配给该协议类型的变量，如下所示：\n\
  \n```\nlet r: Resizable = Rectangle(width: 10, height: 20)\n```\n\n遵守 `CustomStringConvertible`\
  \ 协议要求类型提供一个名为 `description` 的 `String` 属性，该属性在需要类型的可读表示时使用。特别是，当遵守该协议的实例作为参数传递给\
  \ `print()` 函数时，会使用该属性：\n\n```\nlet rect = Rectangle(width: 10, height: 20)\nprint(rect)\
  \    // 输出 \"Rectangle, width 10.0, height 20.0\"\n```\n\n\n\n### 扩展\n\n扩展是 Swift\
  \ 与 Objective-C 共享的一项强大特性。通过扩展，你可以为任何类、结构体或枚举添加功能，包括标准 Swift 库或系统框架中的类型。扩展定义的语法与类和结构体类似。扩展由关键字\
  \ `extension` 引入，后跟被扩展类型的名称，然后是扩展本身。你可以为被扩展的类型添加计算属性（但不能添加存储属性）、方法、构造器、嵌套类型以及协议遵循。\n\
  \n在第 16 章中，我们使用扩展为 `UIColor` 类（来自 UIKit 框架）添加了一个返回随机颜色的方法。扩展定义如下：\n\n```\nextension\
  \ UIColor {\nclass func randomColor() -> UIColor {\nlet red = CGFloat(Double((arc4random()\
  \ % 256))/255)\nlet green = CGFloat(Double(arc4random() % 256)/255)\nlet blue =\
  \ CGFloat(Double(arc4random() % 256)/255)\nreturn UIColor(red: red, green: green,\
  \ blue: blue, alpha:1.0)\n}\n}\n```\n\n使用方法如下：\n\n```\nlet randomColor = UIColor.randomColor()\n\
  ```\n\n## 总结\n\n至此，你已经初步了解了 Swift 最重要的几个特性。这里展示的远非全部内容。我们省略了相当多的内容（并简化了其余部分），当你有时间时，应该阅读官方文档（或第\
  \ 1 章列出的书籍之一）来扩展你的知识。与此同时，请回到第 3 章（或你在本书主体部分中断的地方），开始用 Swift 编写你的第一个 iOS 应用。\n\n\
  \n\n"
