  with: UITableViewRowAnimation.fade)\n}\n}\n表单 9-12.\n允许从我们的收藏列表中删除行\n```\n\n当表格中的编辑操作完成时，会调用此方法。它相当直接，但有一些微妙的细节。我们做的第一件事是检查确保正在显示收藏列表，如果不是，就直接退出。通常，这不应发生，因为我们在前面的方法中指定只有收藏列表是可编辑的。尽管如此，我们在这里做了一点防御性编程。之后，我们检查编辑样式，以确保我们要完成的特定编辑操作确实是删除。在表格视图中可以进行插入编辑，但如果没有我们这里没有做的额外设置，则无法实现，所以我们不需要担心这种情况。接下来，我们确定应删除哪个字体，将其从\
  \ `FavoritesList` 单例中移除，并更新本地的收藏列表副本。\n\n最后，我们告诉表格视图删除该行，并通过视觉上的淡出动画使其消失。理解当你告诉表格视图删除一行时会发生什么很重要。直觉上，你可能会认为调用该方法会删除一些数据，但事实并非如此。实际上，我们已经删除了数据！这最后一个方法调用实际上是我们告诉表格视图的方式：“嘿，我已经做了更改，我希望你以动画方式移除这一行。如果你还需要什么，就来问我。”\
  \ 当这种情况发生时，表格视图将通过向上移动被删除行下方的任何行来开始播放动画，这意味着一个或多个之前屏幕外的行现在将进入屏幕，此时它确实会通过常规方法向控制器请求单元格数据。因此，重要的是，我们在\
  \ `tableView(_:commitEditingStyle:forRowAtIndexPath:)` 方法的实现中，必须在告诉表格视图删除行之前，对数据模型（本例中为\
