  4. 为选择器和按钮添加 Auto Layout 约束，以固定它们的位置。\n\n在返回代码之前，请确保保存故事板。你可能想将此页加入书签，因为稍后可能还会用到。\n\
  \n### 实现控制器\n\n选择`DoubleComponentPickerViewController.swift`，并在类定义顶部、选择器插座下方添加代码清单\
