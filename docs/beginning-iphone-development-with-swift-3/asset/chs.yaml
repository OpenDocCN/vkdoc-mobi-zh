  \n滚动到根视图控制器的底部，你会看到一些新内容：**我最喜欢的字体** 部分现在出现了。选择它，你会看到目前为止已选中的所有收藏字体列表，如图 9-16 所示。\n\
  \n![A329781_3_En_9_Fig16_HTML.jpg](img/A329781_3_En_9_Fig16_HTML.jpg)\n\n**图 9-16.**\
  \ 目前为止选中的收藏字体列表\n\n### 添加功能\n\n现在我们的应用基本功能已经完成。但在真正收工之前，我们还需要实现几个功能。如果你使用 iOS 已经有一段时间了，你应该知道可以通过从右向左滑动来删除表格视图中的一行。例如，在邮件应用中，你可以使用此技术删除邮件列表中的一条消息。执行此手势会在表格视图行内部显示一个小型\
  \ GUI。这个 GUI 会要求你确认删除，然后该行消失，剩余的行向上滑动以填补空白。整个交互过程——包括处理滑动、显示确认 GUI 以及为任何受影响的行添加动画——都由表格视图本身处理。你只需要在控制器中实现两个方法即可实现。\n\
  \n此外，表格视图还提供了易于使用的功能，允许用户通过上下拖拽来重新排序表格视图中的行。与滑动删除一样，表格视图为我们处理了所有的用户交互。我们只需要一行设置代码（用于创建一个激活重新排序\
