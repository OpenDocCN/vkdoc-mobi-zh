  \ 类是此功能应被应用的典型示例。每当应用显示收藏列表时，我们应该让用户通过滑动来删除一个收藏项，从而省去他们点击详情附件然后关闭开关的步骤。在 Xcode 中选择\
  \ `FontListViewController.swift` 开始操作。首先，添加 `tableView(_:canEditRowAt: indexPath:)`\
