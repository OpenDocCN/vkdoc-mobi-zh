  \ 在 Interface Builder 中编辑 GUI，这次重点关注文档大纲中的“设置场景”。按住 Option 键，点击展开三角形以展开“设置场景”及其下的所有内容。找到“视图”节点，删除它的两个子节点。接着，选择“视图”节点，然后调出属性检查器。使用“背景”弹出菜单选择“浅灰色”，以更改背景颜色。\n\
