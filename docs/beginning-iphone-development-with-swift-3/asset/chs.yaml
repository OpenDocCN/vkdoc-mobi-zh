  \ 打开文件进行编辑。到目前为止，我们一直在故事板中进行所有 GUI 编辑，但现在我们改用 nib 文件。大多数操作是相似的，你也会觉得很眼熟，但有一些区别。其中一个主要区别在于：故事板文件以场景为中心，每个场景将视图控制器和视图配对；而在\
  \ nib 文件中，并没有这种强制配对。实际上，nib 文件通常根本不包含真实的控制器对象，只有一个名为 `File’s Owner` 的代理。如果你打开文档大纲，就能在\
  \ `First Responder` 上方看到它。\n\n在库中查找 `Table View Cell`，然后将一个拖到 GUI 布局区域，如图 8-22 所示。\n\
  \n![A329781_3_En_8_Fig22_HTML.jpg](img/A329781_3_En_8_Fig22_HTML.jpg)\n\n**图 8-22.**\
  \ 从库中将一个表格视图单元格拖到画布上\n\n接下来，按下 `⌥⌘4` 打开属性检查器（见图 8-23）。你会在那里看到的第一个字段之一是 `Identifier`。这就是我们在代码中一直使用的复用标识符。如果不熟悉，请回顾本章前面关于\
  \ `CellTableIdentifier` 的内容。将 `Identifier` 值设置为 `CellTableIdentifier`。\n\n![A329781_3_En_8_Fig23_HTML.jpg](img/A329781_3_En_8_Fig23_HTML.jpg)\n\
  \n**图 8-23.** 表格视图单元格的属性检查器\n\n这样做的思路是：当我们检索一个单元格以复用时（例如因为滚动而使新单元格进入视图），我们希望确保获取到正确的单元格类型。当这个特定单元格从\
  \ XIB 文件实例化时，其复用标识符实例变量将预先填入你在属性检查器的 `Identifier` 字段中输入的名称——本例中为 `CellTableIdentifier`。\n\
  \n想象这样一个场景：你创建了一个带有表头后跟一系列“中间”单元格的表格。如果将一个中间单元格滚动到视图中，那么获取一个中间单元格来复用（而不是表头单元格）就至关重要。`Identifier`\
  \ 字段让你能够适当地标记这些单元格。\n\n下一步是编辑表格单元格的内容视图。首先，在编辑区域中选择表格单元格，向下拖动其下边缘使单元格稍微高一些。一直拖动直到高度为\
  \ `65`。前往库，拖出四个 `Label` 控件，并将它们放置在内容视图中，以图 8-24 作为参考。标签可能离顶部和底部太近，这些参考线帮不上太大忙，但左侧参考线和对齐参考线应该能发挥作用。请注意，你可以拖出一个标签，然后按住\
  \ Option 键拖动来创建副本——如果这种方法对你来说更方便的话。\n\n![A329781_3_En_8_Fig24_HTML.jpg](img/A329781_3_En_8_Fig24_HTML.jpg)\n\
  \n**图 8-24.** 拖入四个标签后的表格视图单元格内容视图\n\n接下来，双击左上角的标签，将其标题改为 `Name:`，然后将左下角的标签改为 `Color:`。\n\
  \n现在，同时选中 `Name:` 和 `Color:` 标签，然后点击属性检查器 `Font` 字段中的小 `T` 按钮。这将打开一个小面板，其中包含一个 `Font`\
  \ 弹出按钮。点击该按钮，选择 `Headline` 作为字体。如果需要，选中右侧两个未更改的标签字段，将其向右稍微拖动一点，为设计留出一些呼吸空间，然后调整另外两个标签的大小，以便你能看到刚刚设置的文本。接着，调整右侧两个标签的大小，使其一直延伸到右侧参考线。图\
  \ 8-25 应该能让你了解最终的单元格内容视图。\n\n![A329781_3_En_8_Fig25_HTML.jpg](img/A329781_3_En_8_Fig25_HTML.jpg)\n\
  \n**图 8-25.** 左侧标签名称已更改并设置为 Headline 样式（即粗体），右侧标签已略微移动并调整大小的表格视图单元格内容视图\n\n与往常创建新布局时一样，我们需要添加\
  \ Auto Layout 约束。总体思路是将左侧标签固定在单元格的左侧，将右侧标签固定在单元格的右侧。我们还需要确保标签与单元格顶部和底部之间、以及标签之间的垂直间距保持不变。我们将每个左侧标签与其右侧的标签关联起来。具体步骤如下：\n\
  \n\n\n1.  点击`Name:`标签，按住`Shift`键，然后点击`Color:`标签。点击笔尖编辑器下方的`Pin`图标，勾选`Equal Widths`复选框，然后点击`Add\
  \ 1 Constraint`。执行此操作时，您会看到一些 Auto Layout 警告出现——不必担心，因为随着我们添加更多约束，我们会修复它们。\n2. \
  \ 在两个标签仍处于选中状态时，打开`Size Inspector`，找到标题为`Content Hugging Priority`的区域。如果您看不到它，请尝试取消选择并重新选择这两个标签。这些字段中的值决定了标签抵抗扩展到额外空间的程度。我们不希望这些标签在水平方向上发生任何扩展，因此将`Horizontal`字段的值从`251`改为`500`。任何大于`251`的值都可以——我们只需要它大于右侧两个标签的`Content\
  \ Hugging Priority`，这样任何额外的水平空间都会分配给它们。\n3.  按住 Control 键并从`Color:`标签拖到`Name:`标签，从弹出菜单中选择`Vertical\
  \ Spacing`，然后按`Return`键。\n4.  按住 Control 键并从`Name:`标签沿对角线向左上方向拖向单元格的左上角，直到单元格背景完全变为蓝色。在弹出菜单中，按住`Shift`键，选择`Leading\
  \ Space to Container Margin`和`Top Space to Container Margin`，然后按`Return`键。\n5. \
  \ 按住 Control 键并从`Color:`标签沿对角线向左下方向拖向单元格的左下角，直到其背景变为蓝色。在弹出菜单中，按住`Shift`键，选择`Leading\
  \ Space to Container Margin`和`Bottom Space to Container Margin`，然后按`Return`键。\n\
  6.  按住 Control 键并从`Name:`标签拖到其右侧的标签。在弹出菜单中，按住`Shift`键，选择`Horizontal Spacing`和`Baseline`，然后按`Return`键。按住\
  \ Control 键并从右侧的顶部标签拖向单元格的右边缘，直到单元格背景变为蓝色。在弹出菜单中，选择`Trailing Space to Container\
  \ Margin`。\n7.  类似地，按住 Control 键并从`Color:`标签拖到其右侧的标签。在弹出菜单中，按住`Shift`键，选择`Horizontal\
  \ Spacing`和`Baseline`，然后按`Return`键。按住 Control 键并从右侧的底部标签拖向单元格的右边缘，直到单元格背景变为蓝色。在弹出菜单中，选择`Trailing\
  \ Space to Container Margin`并按`Return`键。\n8.  最后，选择`Document Outline`中的`Content\
  \ View`图标，然后从菜单中选择`Editor ➤ Resolve Auto Layout Issues ➤ Update Frames`（如果该选项可用）。四个标签应该会移动到它们的最终位置，如图\
