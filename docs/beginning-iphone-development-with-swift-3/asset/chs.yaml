  \ 方法，因为它与之前的基本相同。不过，我们应该谈谈 `viewDidLoad()` 方法。那里发生了一些你需要理解的事情，所以搬把椅子坐好，我们来聊聊。在这个新的\
  \ `viewDidLoad()` 方法中，我们做的第一件事是获取对应用程序 main bundle 的引用：\n\n```swift\nlet bundle\
  \ = Bundle.main\n```\n\nBundle 只是一种特殊类型的文件夹，其内容遵循特定的结构。应用程序和框架都是 bundle，这个调用返回一个表示我们应用程序的\
  \ bundle 对象。\n\n**注意：** 在最新版本的 Xcode 和 iOS 库中，Apple 提供了一种更用户友好的方式从 Swift 中引用诸如 `NSBundle`\
  \ 之类的元素。不需要写类似 `let bundle = NSBundle.mainBundle()` 这样的代码，我们使用上面更简单易读的版本。\n\nBundle（`NSBundle`）的主要用途之一是访问你添加到项目中的资源。当你构建应用程序时，这些文件会被复制到应用程序的\
  \ bundle 中。如果我们要在代码中访问这些资源，通常需要使用 bundle。我们使用 main bundle 来获取感兴趣资源的 URL：\n\n\n```swift\n\
  let plistURL = bundle.urlForResource(\"statedictionary\",\nwithExtension: \"plist\"\
  )\n```\n\n这将返回一个包含 `statedictionary.plist` 文件位置的 URL。我们可以使用该 URL 加载字典。完成后，该属性列表的全部内容将被加载到新创建的\
  \ `Dictionary` 对象中，即赋值给 `stateZips`：\n\n```swift\nstateZips = NSDictionary.init(contentsOf:\
  \ (plistURL)!) as! [String : [String]]\n```\n\nSwift 的 `Dictionary` 类型没有从外部源加载数据的便捷方法，但\
  \ Foundation 类 `NSDictionary` 提供了该方法。此代码利用这一特性，将 `statedictionary.plist` 文件的内容加载到\
  \ `NSDictionary` 中，然后将其强制转换为 Swift 类型 `[String : [String]]`——即一个字典，其中每个键是表示州名的字符串，对应的值是一个包含该州邮政编码（字符串形式）的数组。这反映了图\
  \ 7-18 所示的结构。\n\n为了填充选择器左侧组件（显示州名）的数组，我们从字典中获取所有键的列表，并将其赋值给 `states` 数组。在赋值之前，我们先按字母顺序排序：\n\
  \n```swift\nlet allStates = stateZips.keys\nstates = allStates.sorted()\n```\n\n\
  除非我们特意将选择设置为其他值，否则选择器默认选中第一行（行 0）。为了获取与 `states` 数组第一行对应的 `zips` 数组，我们从 `states`\
  \ 数组中取出索引为 0 的对象。这将返回启动时被选中的州名。然后我们使用该州名获取该州的邮政编码数组，并将其赋值给 `zips` 数组，用于为右侧组件提供数据：\n\
  \n```swift\nlet selectedState = states[0]\nzips = stateZips[selectedState]\n```\n\
  \n这两个数据源方法与前一个版本几乎完全相同。我们返回相应数组中的行数。我们实现的第一个委托方法也是如此。第二个委托方法是新增的，也是魔法发生的地方：\n\n\
  ```swift\nfunc pickerView(_ pickerView: UIPickerView, didSelectRow row: Int, inComponent\
  \ component: Int) {\n    if component == stateComponent {\n        let selectedState\
  \ = states[row]\n        zips = stateZips[selectedState]\n        dependentPicker.reloadComponent(zipComponent)\n\
  \        dependentPicker.selectRow(0, inComponent: zipComponent, animated: true)\n\
  \    }\n}\n```\n\n在该方法中（每次选择器选择发生变化时调用），我们检查组件，看左侧组件是否发生了变化，这意味着用户选择了新的州。如果是，我们获取对应于新选择的数组并赋值给\
  \ `zips` 数组。接着，我们将右侧组件重置为第一行，并告诉它重新加载自身。通过在州变化时交换 `zips` 数组，其余代码与 `DoublePicker`\
  \ 示例中的代码保持基本相同。\n\n我们还没有完全完成。构建并运行应用程序，然后查看“Dependent”选项卡，如图 7-22 所示。两个组件大小相同。尽管邮政编码永远不会超过五个字符，但它却与州名获得了同等的显示宽度。由于像“Mississippi”和“Massachusetts”这样的州名在大多数\
