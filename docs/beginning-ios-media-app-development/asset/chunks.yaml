- fmt: "This implementation uses the `error` object to check whether the operation\
    \ was successful. If the operation was a failure, it displays an alert view with\
    \ the human-readable `description` string from the `error` object. When the operation\
    \ succeeds, it presents a `VideoPlaybackController` that has been initialized\
    \ with the output file URL. The `VideoPlaybackController` is the customized subclass\
    \ of the `MPMoviePlayerController` class that you will use in this project for\
    \ the video preview.\n\n**Caution** Although the output file URL that is returned\
    \ from the `AVCaptureFileOutputRecordingDelegate` protocol is the same as the\
    \ one used to start the recording, you should not start playback until the delegate\
    \ method has fired, because the file will not be valid until this message has\
    \ been received.\n\n## Showing the Preview Interface\n\nFor your video preview\
    \ interface, you will want to display a video player that allows users to accept\
    \ or reject the video they just recorded. While you could simply return the recorded\
    \ video as is, it is best to give users an opportunity to check their work before\
    \ returning them to the main interface of the MyCustomRecorder application.\n\n\
    For the `VideoPlaybackController` class, you will want to take the basic video\
    \ playback function of the `CustomVideoPlayer` class from the MyCustomPlayer project\
    \ you built in [Chapter 9](#9781430250838_Ch09.xhtml) and modify the controls\
    \ to toggle playback and to accept or reject the file. Subclassing is an object-oriented\
    \ programming concept that allows you to inherit all of the properties and methods\
    \ of a parent class while still retaining the ability to modify those properties\
    \ and methods in your child class. Inheritance is a convenient way to expand the\
    \ functionality of a class without destroying or affecting the original. In this\
    \ case, you need to subclass to reuse the `CustomVideoPlayer` class for this app’s\
    \ full-screen video player.\n\nFirst, copy the `CustomVideoPlayer.h` and `CustomVideoPlayer.m`\
    \ files into your working directory and add them to your project. Next, from the\
    \ File menu, choose New File. As shown in [Figure 10-11](#9781430250838_Ch10.xhtml#Fig11),\
    \ when you are asked to specify the parent class for your file, type **MyCustomPlayer**—doing\
    \ so will cause Xcode to create a subclass template for you automatically.\n\n\
    ![9781430250838_Fig10-11.jpg](images/9781430250838_Fig10-11.jpg)\n\n[Figure 10-11](#9781430250838_Ch10.xhtml#_Fig11).\
    \ Specifying a parent class for a new file in Xcode\n\nNext, you need to create\
    \ the storyboard for the video player. The key difference between this new playback\
    \ interface and the one you created for the MyCustomPlayer project is that instead\
    \ of having a Done button in the navigation bar, you will have Accept and Reject\
    \ buttons, both of which finish the video completion process. Using [Figure 10-12](#9781430250838_Ch10.xhtml#Fig12)\
    \ as a reference, add a layer for the video output and a button to control playback.\
    \ Embed this view controller in a Navigation Controller so that you can add your\
    \ buttons.\n\n![9781430250838_Fig10-12.jpg](images/9781430250838_Fig10-12.jpg)\n\
    \n[Figure 10-12](#9781430250838_Ch10.xhtml#_Fig12). Storyboard for video player\n\
    \nThe header file for the `VideoPlaybackController` class is in [Listing 10-18](#9781430250838_Ch10.xhtml#list18).\
    \ As with other projects, remember to tie your button handlers and properties\
    \ to the storyboard.\n\n[***Listing 10-18***](#9781430250838_Ch10.xhtml#_list18).\
    \ Header File for VideoPlaybackController Class\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface VideoPlaybackController : MyCustomPlayer\n\n@property (nonatomic,\
    \ strong) IBOutlet *const;\n\n-(IBAction)accept:(id)sender;\n-(IBAction)reject:(id)sender;\n\
    \n@end\n\n@protocol CustomPlayerDelegate <NSObject>\n\n-(void)didFinishWithSuccess:(BOOL)success;\n\
    \n@end\n```\n\nBecause you are subclassing the `CustomVideoPlayer` class, you\
    \ do not need to reimplement video playback. Simply tie your button to the `togglePlayback`\
    \ button handler you defined in the `CustomVideoPlayer` class (methods from parent\
    \ classes show up in Interface Builder just as if you had defined them in your\
    \ class). For the video-recording process, you will need to focus on the Accept\
    \ and Reject functionality.\n\nWhen a user decides to accept the video just recorded,\
    \ you should follow the same workflow as the `UIImagePickerController` and return\
    \ the user to the main user interface. During this process, you will need to save\
    \ the file and dismiss the video preview and capture interfaces. The Accept button\
    \ handler for the `VideoPlaybackController` class is shown in [Listing 10-19](#9781430250838_Ch10.xhtml#list19).\n\
    \n[***Listing 10-19***](#9781430250838_Ch10.xhtml#_list19). Accept Button Handler\
    \ for VideoPlaybackController\n\n```\n-(IBAction)accept:(id)sender\n{\n    [self.mediaPlayer\
    \ stop];\n    [self.delegate didFinishWithSuccess:YES];\n}\n```\n\nThis button\
    \ handler is very short—all it does is stop the player and call the `[CustomPlayerDelegate\
    \ didFinishWithSuccess:]` method. The `[ViewController dismissViewController:animated:]`\
    \ method dismisses only one modal controller at a time. To dismiss both the `VideoPlaybackController`\
    \ and the `CameraViewController`, you need to dismiss each from the view controller\
    \ that presented them. The `CameraViewController` was presented by the `MainViewController`,\
    \ so you will need to dismiss it via the `CameraDelegate` protocol. Similarly,\
    \ the `VideoPlaybackController` was presented by the `CameraViewController`, so\
    \ you will need to dismiss it via the `CustomPlayerDelegate` protocol.\n\nThe\
    \ Reject button handler is similarly straightforward. All you need to do is dismiss\
    \ the playback controller and reset the video-recording interface. As part of\
    \ the reset process, you should delete the current movie file. [Listing 10-20](#9781430250838_Ch10.xhtml#list20)\
    \ shows the Reject button handler method.\n\n[***Listing 10-20***](#9781430250838_Ch10.xhtml#_list20).\
    \ Reject Button Handler for VideoPlaybackController\n\n```\n-(IBAction)reject:(id)sender\n\
    {\n    [self.mediaPlayer stop];\n    [self.delegate didFinishWithSuccess:NO];\n\
    }\n```\n\nYou may be wondering about the implementation of the `[CustomPlayerDelegate\
    \ didFinishWithSuccess:]` method. In your `CameraViewController` class, if the\
    \ `success` parameter is set to `YES`, then you know the user wanted to accept\
    \ the video, so you can dismiss the modal view controller that represents the\
    \ player and call the `[CameraDelegate didFinishWithURL:]` on your camera delegate\
    \ object. If the `success` parameter was set to `NO`, then you know the user wanted\
    \ to reject the video. The completed `[CustomPlayerDelegate didFinishWithSuccess:]`\
    \ method for the `CameraViewController` class is provided in [Listing 10-21](#9781430250838_Ch10.xhtml#list21).\n\
    \n[***Listing 10-21***](#9781430250838_Ch10.xhtml#_list21). “Playback Completed”\
    \ Delegate Method for CameraViewController Class\n\n```\n-(void)didFinishWithSuccess:(BOOL)success\n\
    {\n    NSURL *outputUrl = [self.movieFileOutput outputFileURL];\n\nif (success)\
    \ {\n\n[self.delegate didFinishWithUrl:outputUrl];\n\n[self dismissViewControllerAnimated:YES\
    \ completion:nil];\n\n} else {\n\n[self dismissViewControllerAnimated:YES completion:^{\n\
    \            //delete old movie file\n\n[[NSFileManager defaultManager]\n    \
    \             removeItemAtPath:[outputUrl path] error:NULL];\n\n}];\n\n}\n}\n\
    ```\n\nNext, you will learn more about the `[CameraDelegate didFinishWithURL:]`\
    \ method, which is the message that allows you to pass back a video instead of\
    \ an image.\n\n## Modifying Your Protocol for Video"
