    @property (nonatomic, strong) AVPlayer *audioPlayer;


    -(IBAction)play:(id)sender;

    -(IBAction)chooseStream:(id)sender;


    @end

    ```


    Connecting to a Stream


    You will use a `UIAlertView` to allow the user to enter a stream URL. You can
    find valid stream URLs on most radio stations’ sites by looking for a link that
    ends in `.pls`. A `.pls` file is a playlist that contains the URLs for several
    streaming radio channels. Multicast streams often have restrictions on the number
    of users who can connect simultaneously. Using a playlist helps with congestion,
    because the player will traverse the playlist until it finds a stream it can connect
    to. You want to present the `UIAlertView` when the user presses the Choose Stream
    button. [Listing 6-18](#9781430250838_Ch06.xhtml#list18) contains an example of
    the event handler for this action. Make sure you tie this action handler to your
    button in Interface Builder.


    [***Listing 6-18***](#9781430250838_Ch06.xhtml#_list18). Presenting a UIAlertView
    to Choose a Stream


    ```

    -(IBAction)chooseStream:(id)sender

    {

        UIAlertView *alertView = [[UIAlertView alloc]

            initWithTitle:@"Enter Stream URL" message:@""

            delegate:self cancelButtonTitle:@"Cancel"

                otherButtonTitles:@"OK", nil];

        [alertView setAlertViewStyle:UIAlertViewStylePlainTextInput];

        [alertView show];

    }

    ```'
