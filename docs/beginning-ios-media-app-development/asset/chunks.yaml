- fmt: "# Building a Custom Video-Recording Interface\n\nIn this chapter, you saw\
    \ how to build a custom playback controller by using the `AVFoundation` framework.\
    \ You saw that by carefully using view positioning and auto-layout, you can build\
    \ a user interface that matches a brand but that also has the flexibility to fit\
    \ any number of screens.\n\nTo enable media playback, you learned how to load\
    \ a file by using the `AVPlayer` class and how to observe status changes to determine\
    \ whether it loaded successfully. Using this same object, you built playback controls\
    \ that allowed the user to toggle playback, skip backward or forward a few seconds,\
    \ and scrub to a desired position in the video.\n\nFinally, to add that last little\
    \ bit of magic to the application, you added user-interface updates to the application\
    \ that hide the center playback controls when the user is not interacting with\
    \ the app and update the current time label and scrubber with the current playback\
    \ position.\n\nAlthough the setup code for this user interface and playback stack\
    \ was more involved than using the `MPMoviePlayerController` class directly, the\
    \ result was a custom playback controller that can mimic the `MPMoviePlayerController`\
    \ class both in functionality and its messaging system, while still allowing you\
    \ to add your own branding on top.\n\n## Chapter 10: Building a Custom Video-Recording\
    \ Interface\n\nTo close out the unit on video, you will build your own video-recording\
    \ interface “the hard way.” As you have seen while working with other media features,\
    \ Cocoa Touch provides a great built-in interface for video capture—but only if\
    \ you are willing to accept its user interface and functionality limits. When\
    \ you want to go beyond these limits, customizing the video-capture interface\
    \ to better suit your workflow or brand, you need to build your own user interface.\
    \ To do that, you need to hook into `AVFoundation`’s low-level image-capture functionality.\n\
    \nIf all this sounds familiar, that’s because it is. By repeating many of the\
    \ same steps you used to build a custom still-image interface in [Chapter 4](#9781430250838_Ch04.xhtml),\
    \ you can build a custom video-capture interface. As you learned in [Chapter 4](#9781430250838_Ch04.xhtml),\
    \ these are the major steps required to implement a still-image interface:\n\n\
    1. Discover and configure the camera hardware.\n2. Build a user interface capable\
    \ of displaying the live camera feed.\n3. Modify the capture settings from the\
    \ UI.\n4. Save the image when the user presses the Take Picture button.\n\nTo\
    \ adapt that workflow to video, you need to do the following:\n\n1. Configure\
    \ the capture session for video.\n2. Add video-specific capture controls.\n3.\
    \ Display a preview interface when the user finishes recording.\n4. Refactor the\
    \ message-passing interface to handle larger files.\n\nIn this chapter, you will\
    \ build a custom video-recording interface by implementing the `MyCustomRecorder`\
    \ project (you can find the code in the [Chapter 10](#9781430250838_Ch10.xhtml)\
    \ folder) that you first saw in [Chapter 9](#9781430250838_Ch09.xhtml), adding\
    \ video-capture features accessible via a Record Video button. You will reuse\
    \ the `MyCustomPlayer` project code for all video-playback functions. Users will\
    \ be able to modify capture settings before video recording begins. After recording\
    \ is complete, they will see a preview interface, where they can choose to accept\
    \ or reject the video they just shot.\n\n![9781430250838_Fig10-01.jpg](images/9781430250838_Fig10-01.jpg)\n\
    \n*Figure 10-1\\. Mock-up for MyCustomRecorder project*\n\nIn [Figure 10-2](#9781430250838_Ch10.xhtml#Fig2),\
    \ you can compare the `MyCustomRecorder` project to the `MyCamera` still-image\
    \ capture project from [Chapter 4](#9781430250838_Ch04.xhtml). You can see that\
    \ the general flow of the application is the same, with the exception of the preview\
    \ interface and capture settings.\n\n![9781430250838_Fig10-02.jpg](images/9781430250838_Fig10-02.jpg)\n\
    \n*Figure 10-2\\. Mock-up for MyCamera still-image capture project*\n\nThis chapter\
    \ relies heavily on your knowledge of image capture using `AVFoundation` from\
    \ [Chapter 4](#9781430250838_Ch04.xhtml). If you haven’t mastered that topic,\
    \ I recommend reviewing [Chapter 4](#9781430250838_Ch04.xhtml) before you proceed.\
    \ This project reuses many of the image-capture code samples from [Chapter 4](#9781430250838_Ch04.xhtml),\
    \ but my explanations of the core classes (such as `AVCaptureInputDevice` and\
    \ `AVCaptureSession`) will not be as deep.\n\n### Getting Started\n\nFor this\
    \ chapter, your primary focus is video capture. First, clone the `MyCustomPlayer`\
    \ from [Chapter 9](#9781430250838_Ch09.xhtml) to get a base user interface and\
    \ video-playback interface. You clone a project by making a copy of it in the\
    \ Finder and then opening it in Xcode. As shown in [Figure 10-3](#9781430250838_Ch10.xhtml#Fig3),\
    \ remember that you can rename the project by clicking carefully inside the project\
    \ file’s name in the Project Navigator.\n\n![9781430250838_Fig10-03.jpg](images/9781430250838_Fig10-03.jpg)\n\
    \n*Figure 10-3\\. Renaming a project*\n\nTo build a custom video-capture interface,\
    \ you need to use the `AVFoundation` framework’s image-capture classes. As in\
    \ previous projects, add this framework to your project as a Linked Framework\
    \ under your project’s Settings. Your final set of included frameworks should\
    \ look like the example in [Figure 10-4](#9781430250838_Ch10.xhtml#Fig4).\n\n\
    ![9781430250838_Fig10-04.jpg](images/9781430250838_Fig10-04.jpg)\n\n*Figure 10-4\\\
    . List of frameworks for MyCustomRecorder project*\n\nThe device setup code, user\
    \ interface, and protocol for the `MyCamera` project were encapsulated in the\
    \ `CameraViewController` class. Because the user interface and protocol mimicked\
    \ the `UIImagePickerControllerView` class closely, you should use these as a base\
    \ for the `MyCustomRecorder` project. Copy these files over from the `MyCamera`\
    \ project.\n\n### Setting Up the Hardware Interface\n\nAfter including the base\
    \ classes for the project, you can start modifying the `CameraViewController`\
    \ class to support video capture. Before dealing with the user interface, you\
    \ need to make sure the hardware interface to the camera is properly set up for\
    \ video capture.\n\nTo review [Chapter 4](#9781430250838_Ch04.xhtml), the classes\
    \ you configure to capture media are as follows:\n\n- `AVCaptureDevice`: Represents\
    \ the hardware device you are going to access\n- `AVCaptureInput`: Represents\
    \ the data stream you are accessing (for example, video stream for a camera, audio\
    \ stream for a microphone)\n- `AVCaptureOutput`: Represents the data that is captured\
    \ by your device (for example, a movie file)\n- `AVCaptureSession`: Manages the\
    \ interface between the input data stream and the output\n\nIn the `CameraViewController`\
    \ class, the hardware initialization code was in the `[CameraViewController viewDidLoad]`\
    \ and `[CameraViewController initializeCameras]` methods. The hardware initialization\
    \ code for still-image capture is highlighted in [Listing 10-1](#9781430250838_Ch10.xhtml#list1).\
    \ Throughout this section, you will change the settings so that they are appropriate\
    \ for video.\n\n***Listing 10-1*** *Hardware Interface Settings for Still-Image\
    \ Capture*\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do\
    \ any additional setup after loading the view.\n\n    self.previewView.autoresizingMask\
    \ =\n           UIViewAutoresizingFlexibleWidth |\n           UIViewAutoresizingFlexibleHeight;\n\
    \n    self.session = [[AVCaptureSession alloc] init];\n\n    // find the back-facing\
    \ camera\n\n    [self initializeCameras];\n\n    NSError *error = nil;\n\n   \
    \ self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];\n\n    NSMutableDictionary\
    \ *configDict = [NSMutableDictionary new];\n         [configDict setObject:AVVideoCodecJPEG\
    \ forKey:AVVideoCodecKey];\n\n    [self.stillImageOutput setOutputSettings:configDict];\n\
    \n    if (error == nil && [self.session canAddInput:self.rearCameraInput]) {\n\
    \            [self.session addInput:self.rearCameraInput];\n    }\n\n    // set\
    \ up our preview layer\n```"
