    \ quality for most applications:\n\n```\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage,\
    \ 0.7f);\n```\n\nAfter the binary data for the image is ready, you write it to\
    \ a file. You can use the `NSData` instance method `[NSData writeToFile:]` to\
    \ write the data to disk. This method requires a target location for the file.\
    \ Just as when reading a file from within your app bundle, you can use your app’s\
    \ document directory as an interface to your device’s file system. An example\
    \ of saving an image to the documents folder is provided in [Listing 3-4](#9781430250838_Ch03.xhtml#list4).\n\
    \n[***Listing 3-4***](#9781430250838_Ch03.xhtml#_list4). Saving an Image to the\
    \ Documents Folder\n\n```\n-(IBAction)saveToDisk:(id)sender\n{\n    NSArray *paths\
    \ = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask,\n\
    \                     YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
    \    NSString *filePath = [documentsDirectory stringByAppendingPathComponent:@\"\
    image.jpg\"];\n\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage,\
    \ 0.7f);\n    NSError *error = nil;\n    NSString *alertMessage = nil;\n\n//check\
    \ if the file exists before trying to write it\n    if ([[NSFileManager defaultManager]\
    \ fileExistsAtPath:filePath]) {\n\nNSDateFormatter *dateFormat = [[NSDateFormatter\
    \ alloc] init];\n        [dateFormat setDateFormat:@\"yyyyMMddHHmm\"];\n\nNSString\
    \ *dateString = [dateFormat stringFromDate:[NSDate date]];\n\nNSString *fileName\
    \ = [NSString stringWithFormat:@\"image-%@.jpg\", dateString];\n\nfilePath = [documentsDirectory\
    \ stringByAppendingPathComponent:fileName];\n    }\n\n[imageData writeToFile:filePath\
    \ options:NSDataWritingAtomic error:&error];\n\nif (error == nil) {\n        alertMessage\
    \ = @\"Saved to 'Documents' folder successfully!\";\n    } else {\n        alertMessage\
    \ = @\"Could not save image :(\";\n    }\n\nUIAlertView *alertView = [[UIAlertView\
