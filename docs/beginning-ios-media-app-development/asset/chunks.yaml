    | 问题 | 常见解决方案 |

    | --- | --- |

    | 应用程序无法在设备上运行 | 确保您的团队设置正确，并且您的设备已在 iOS 开发者计划中注册。 |

    | 启动时图像视图未显示正确的图像 | 确保您的图像已正确添加到项目中。确保图像视图已正确关联到属性。确保您的视图启动代码没有重置图像视图。 |

    | 按钮未更改图像 | 确保您的按钮和图像视图已正确关联到属性。确保按钮事件处理方法已正确注册，并且可以通过断点访问。 |

    | 按下按钮后图像视图为空白 | 确保按钮事件处理方法中的图像名称与第二张图像的文件名完全一致。 |


    **总结**


    本章首先介绍了本书的目的、媒体应用开发的不同之处以及充分利用本书所需的条件。您了解了本书的基本目标及其结构安排，以便您能按照自己的节奏学习，同时还了解了本书对您先前编程经验和知识的假设。您还了解了一些媒体开发在资源和开发者期望方面与众不同的原因。最后，通过构建一个简单的
    ImageChanger 应用程序，您开始探索构建媒体应用并在设备上运行的一些最基本的工作流程。


    # 第一部分：图像


    ## 第二章：向应用添加图像


    学习绘画的最佳途径是研究静物题材。同样，进入 iOS 媒体应用开发的最佳途径是从静态图像开始！


    在本章中，您将使用 Apple 的 `UIImage`、`UIImageView` 和 `UIImagePicker` 类来在应用中表示、显示和导入图像。这些类抽象了许多有用的功能，从解码文件到提供应用内访问
    iOS 系统级相机控制器的能力。


    ### 使用 UIImage 类表示图像数据


    与以人类可读格式存储数据的纯文本文件不同，图像拥有一系列复杂的属性，需要以二进制数据形式存储——包括压缩和色彩空间信息。所有二进制数据都需要一个特殊的类来解码并以程序可用的方式表示它。`UIImage`
    是 Apple 提供的用于表示图像数据的类。您可以将其视为所有涉及图像数据操作的通用语言。例如，您稍后将用到的 `UIImagePickerController`（用于从相机和照片库中选择图像）会将您的选择作为
    `UIImage` 对象进行传输。


    在接下来的两小节“加载捆绑文件”和“运行时加载图像”中，您将看到如何使用 `UIImage` 从文件系统的不同位置加载图像。要使这些图像数据在屏幕上可见以供用户查看，您需要使用
    `UIImageView`，这将在本章下一主要部分“使用 UIImageView 类显示图像”中进行探讨。


    #### 加载捆绑文件


    在开发 iOS 媒体应用时，一个常见任务是从设计人员提供的文件中加载图像，例如背景图像、剪贴画或自定义按钮设计。为了熟悉这一工作流程，您将构建一个在方形框架中显示图像的单一视图应用，类似于第
    1 章中的示例项目。如果您需要复习如何创建单一视图应用并向其添加图像视图，可以回顾第 1 章的最后一部分。


    开始使用所需图像的最简单方法是调用 `UIImage` 的私有方法 `[UIImage imageNamed:]`，以从项目捆绑包中的文件创建图像对象：


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    ```


    *项目捆绑包* 这个术语现在可能看起来有些陌生，但这可能是一个您已经熟悉但尚未意识到的概念。如果您曾在 OS X 中对某个应用程序执行过辅助点击，您会注意到“显示包内容”选项。在
    iOS 和 OS X 上，`.app` 文件都是智能容器，包含编译后的对象文件和捆绑的资源，例如图像、声音和预编译数据。当您的应用被编译时，所有源文件都会被转换为对象文件，而您包含的任何其他静态文件都会被直接复制到捆绑包中。


    `[UIImage imageNamed:]` API 的工作原理是在项目捆绑包中搜索与您在 `name` 参数中提供的文件名完全匹配的文件。该 API 区分大小写，并且不对名称执行任何额外逻辑，因此请确保传入的文件名与捆绑包中的完全一致，否则返回的对象将为
    `nil`。


    **注意** PNG 文件和素材目录支持的图像集是无需使用精确文件名的唯一例外。对于这两类文件，您无需指定文件扩展名。


    您可以通过确认文件在 Xcode 项目导航器（IDE 的左窗格）中是否可找到，来确认文件属于您的项目捆绑包，如图 2-1 所示。


    ![9781430250838_Fig02-01.jpg](img/9781430250838_Fig02-01.jpg)


    图 2-1. Xcode 项目导航器，高亮显示了项目中的图像文件


    在此示例中，您将看到一个 Resources 文件夹。为了保持项目文件夹的整洁，最好在导入文件之前创建组。我倾向于将所有图像文件和其他外部资源放入一个 Resources
    组中。您可以通过“文件”菜单中的“新建”选项，或在“添加文件”步骤中导入文件夹来创建组。组和文件夹不会影响您使用 `[UIImage imageNamed:]`
    API。


    #### 使用素材目录管理图像


    从 iOS 7 SDK 开始，Apple 在 iOS 开发工作流程中引入了*素材目录*。素材目录通过提供一个集中存储图像文件的位置以及一个用于管理这些文件的图形用户界面，简化了您的工作流程。虽然在项目导航器中管理少量图像文件很容易，但当您需要管理数十个文件或同一文件的多个尺寸时，这一过程会变得非常麻烦——而素材目录正是为了缓解这种情况而设计的。


    素材目录是一个重要概念，因为 Apple 对提供图像文件的多种分辨率有严格要求。如果您缺少启动图像或应用图标的必需分辨率，Apple 甚至会阻止您向 App
    Store 提交应用。


    在本练习中，您将学习如何使用素材目录管理项目中的文件，以及如何修改语法以指示您正在使用素材目录。


    您为 iOS 7 SDK 或更高版本创建的每个项目都附带一个名为 `Images.xcassets` 的空白素材目录文件。在项目导航器中点击此文件，您将看到图
    2-2 所示的界面。


    ![9781430250838_Fig02-02.jpg](img/9781430250838_Fig02-02.jpg)


    图 2-2. 素材目录用户界面


    素材目录用户界面提供两个窗格：左侧的*集合列表*和右侧的*集合查看器*。为了帮助您管理同一图像的多个分辨率，素材目录使用*图像集*来表示图像文件。其理念是，您将图像的每一个分辨率都添加到一个集合中；然后在代码中，您可以引用该集合，而不是单个图像文件名。这便将确定合适文件（例如，非
    Retina 或 Retina 屏幕）的负担从开发者转移到了编译器上。'
- fmt: '您可以使用集合列表通过点击图像集来导航。同样，您也可以使用面板底部的“添加”和“移除”按钮来管理集合。当您点击一个图像集时，集合查看器将显示该集合所有分辨率版的占位符。


    您可以通过从访达窗口拖放图像到对应的占位符来向集合添加图像（例如，使用`2x`占位符来代表图像的Retina版本）。您需要对项目中需要包含的每个图像分辨率重复此过程。要更新图像，只需将新版本拖到相应的缩略图上即可。`Xcode`会为您处理其余所有事情。


    **注意** 在撰写本文时，PNG文件是资源目录唯一支持的文件格式。对于JPG文件，您需要继续使用项目导航器。


    要使用由资源目录管理的图像，请更改您的语法，使用图像集名称而不是文件名：


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower"];

    ```


    编译器将自动确定在当前运行的平台上要使用的正确图像版本。


    **注意** 对于应用图标和启动图像，系统会为缺失的分辨率创建编译器警告。所需分辨率会随着SDK更新而更新，因此请确保您始终保持最新。


    **加载运行时的图像**


    虽然`[UIImage imageNamed:]`是一个便捷的API，但它仅专为与应用捆绑的图像设计。当您尝试在运行时加载图像（例如已下载的图像）时，需要使用不同的API：`[UIImage
    imageWithContentsOfFile:]`。这些API之间的关键区别在于，在运行时，您需要指定图像文件的路径，而不是它在应用包中的名称。[示例2-1](#9781430250838_Ch02.xhtml#list1)提供了此过程的示例。


    [**示例2-1**](#9781430250838_Ch02.xhtml#_list1). 在运行时加载图像文件


    ```

    NSArray *searchPaths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                           NSUserDomainMask, YES);

    NSString *documentFolderPath = [searchPaths objectAtIndex:0];

    NSString *localFilePath = [documentFolderPath stringByAppendingString:@"DownloadedFlower.png"];

    UIImage *myImage = [UIImage imageWithContentsOfFile:localFilePath];

    if (myImage == nil) { NSLog(@"File does not exist!");}

    ```


    如您所见，大部分工作在于查找文档目录的路径。每个应用包都附带一个文档目录，旨在作为您保存或创建文件的目标。您可以使用Apple的系统宏（或快捷方法）来快速找到应用的文档目录。每次应用安装都有唯一的目录路径，因此在运行时运行此方法非常重要。


    一旦获取了文档目录路径，您就可以使用`[NSString stringByAppendingString:]`方法附加文件名。如果图像加载成功，`UIImage`对象将非`nil`。


    **注意** 您可能会说：“我以为iOS没有文件系统！”虽然iOS不像PC那样提供全局可访问的共享文件系统，但它确实在应用沙盒内提供了一个文件系统，您可以在运行时使用它来存储和检索文件。它被称为*沙盒*，因为您可以在沙盒内做（几乎）任何想做的事，但不允许其他人进入您的沙盒，并且很难将您的工作成果带出沙盒（换句话说，用于应用间通信的API非常有限）。


    **支持的文件格式**


    与存储为ASCII数据且可由任何程序打开的简单文本文件不同，图像文件是编码的二进制文件，需要特殊的指令（解码）才能正确打开。`UIImage`最便捷的功能之一就是它抽象了下表中所示文件格式的解码过程。


    *UIImage类支持的流行文件格式*


    | 文件格式 | 扩展名 | 主要用途 |

    | --- | --- | --- |

    | 便携式网络图形 | `.png` | 现代、无损的栅格图像压缩。保留Alpha（透明度）层。 |

    | 联合图像专家小组 | `.jpg, .jpeg` | 非常高效的有损栅格图像压缩。不支持Alpha层。 |

    | 图形交换格式 | `.gif` | 旧式无损图像支持。主要用于Web上的动画图像。 |

    | 位图图像文件 | `.bmp` | 未压缩图像支持。由早期版本的Windows推广。 |

    | 标签图像文件格式 | `.tiff, .tif` | 旧式低压缩图像支持。由早期的图像捕获设备和桌面出版软件包推广。 |


    虽然系统可以加载这些文件格式，但不会为您优化其文件大小或密度。一个未压缩的10MB位图文件在访问和绘制时所需的时间将远远超过一个压缩的100KB JPG文件。只要可能，尽量使用压缩的JPG（如果需要透明度层，则使用PNG）。


    **注意** 如果您的设计师只提供Photoshop文件（`.psd`），您需要手动将图层另存为图像文件。Photoshop文件格式是一个资源密集型的移动目标，因此Apple极不可能为其提供系统级支持。


    **使用UIImageView类显示图像**


    要在应用中显示图像，您需要使用`UIView`的子类，这是iOS用户界面元素的原子单元。为了弥合这一差距，Apple创建了`UIImageView`，它提供了一个在屏幕上放置图像的区域、在运行时动态缩放图像的方法，以及一个用于触摸手势的出口。


    在本节中，您将学习如何使用图像初始化`UIImageView`，并将探索使用它处理动态内容大小的各种方法。


    **初始化图像视图**


    初始化`UIImageView`很简单：您只需用一个源`UIImage`对象来初始化它，如下所示：


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    UIImageView *myImageView = [[UIImageView  alloc] initWithImage:myImage];

    ```


    尽管`[UIImageView initWithImage:]` API没有将frame指定为必需参数，但您应该提供一个。Cocoa Touch中的frame指定了用户界面元素的位置和大小。如果您使用Interface
    Builder构建界面，元素的frame将自动创建。您可以在[示例2-2](#9781430250838_Ch02.xhtml#list2)中找到以编程方式设置frame的示例。


    [**示例2-2**](#9781430250838_Ch02.xhtml#_list2). 以编程方式设置frame


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    UIImageView *myImageView = [[UIImageView  alloc] initWithImage:myImage];

    myImageView.frame = CGRectMake(10, 10, 100, 100);

    [self.view addSubview:myImageView];

    ```


    请注意上述代码中的`addSubview`调用，它将图像视图放置在屏幕上。


    **注意** 您可以通过设置`image`属性随时更改图像视图的内容。


    **设置图像缩放选项**


    您可能以前遇到过这个问题：您请求一个分辨率为640×480像素的图像，但收到的是一个其他尺寸的图像，例如637×480。为了解决这个极其常见的问题，Apple为所有`UIView`对象构建了动态缩放功能，您可以通过`[UIView
    contentMode]`属性进行控制。在[表2-1](#9781430250838_Ch02.xhtml#Tab1)中，您将看到一些流行的内容模式常量值及其指定行为的表格。


    [**表2-1**](#9781430250838_Ch02.xhtml#_Tab1). 流行的`UIViewContentMode`常量值'
  raw: 'You can use the set list to navigate between image sets by clicking them.
    Similarly, you can use the Add and Remove buttons at the bottom of the pane to
    manage sets. When you click an image set, the set viewer will be populated with
    placeholders for all the resolutions you should provide for the set.


    You can add images to a set by dragging and dropping from a Finder window onto
    the appropriate placeholder (for example, you would use the 2x placeholder to
    represent the Retina version of an image). You continue this process for every
    resolution of the image you need to include in the project. To update an image,
    simply drag the new version onto the appropriate thumbnail. Xcode takes care of
    everything else for you.


    **Note**  At the time of this writing, PNG files are the only file type supported
    with asset catalogs. You need to continue using the Project Navigator for JPG
    files.


    To use an image that is managed by the asset catalog, change your syntax to use
    the image set name instead of the file name:


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower"];

    ```


    The compiler will automatically determine the correct version of the image to
    use on the currently running platform.


    **Note**  For app icons and launch images, the system will create compiler warnings
    for missing resolutions. Required resolutions are updated along with the SDK,
    so make sure you stay up-to-date.


    Loading Images at Runtime


    While `[UIImage imageNamed:]` is a convenient API, it is designed solely for images
    that are bundled with your app. When you are trying to load an image at runtime,
    such as an image that has been downloaded, you need to use a different API: `[UIImage
    imageWithContentsOfFile:]`. The key difference between these APIs is that at runtime,
    you need to specify the path of the image file, rather than its name within the
    bundle. [Listing 2-1](#9781430250838_Ch02.xhtml#list1) provides an example of
    this process.


    [***Listing 2-1***](#9781430250838_Ch02.xhtml#_list1). Loading an Image File at
    Runtime


    ```

    NSArray *searchPaths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                           NSUserDomainMask, YES);

    NSString *documentFolderPath = [searchPaths objectAtIndex:0];

    NSString *localFilePath = [documentFolderPath stringByAppendingString:@"DownloadedFlower.png"];

    UIImage *myImage = [UIImage imageWithContentsOfFile:localFilePath];

    if (myImage == nil) { NSLog(@"File does not exist!");}

    ```


    As you can see, the majority of the work lies in finding the path for the documents
    directory. Every app bundle comes with a documents directory, which is meant to
    serve as your target for saving or creating files. You can use Apple’s system
    macros (or shortcut methods) to quickly find the documents directory for the app.
    Each app installation has a unique directory path, so it is important to run this
    method at runtime.


    Once you have the documents directory path, you can append your file’s name by
    using the `[``NSString stringByAppendingString``:]` method. If your image has
    loaded successfully, your `UIImage` object will be non-`nil`.


    **Note**  You may be saying, “I thought iOS didn’t have a file system!” While
    iOS does not provide a globally accessible, shared file system, as on a PC, it
    does provide a file system within your app’s sandbox that you can use to store
    and retrieve files at runtime. It is called a *sandbox* because you can do (almost)
    anything you want in your sandbox, but no one else is allowed in your sandbox,
    and it is hard to take your work out of the sandbox (in other words, there are
    very limited APIs for inter-app communication).


    SUPPORTED FILE FORMATS


    Unlike a simple text file, which is stored as ASCII data and can be opened by
    any program, image files are encoded binary files and require special instructions
    (decoding) to be opened correctly. One of the most convenient features of `UIImage`
    is that it abstracts the decoding of the file formats shown in the following table.


    *Popular File Formats Supported by the UIImage Class*


    | File Format | Extension(s) | Primary Use |

    | --- | --- | --- |

    | Portable Network Graphic | `.png` | Modern, lossless raster image compression.
    Preserves alpha (transparency) layers. |

    | Joint Photographic Experts Group | `.jpg, .jpeg` | Very efficient lossy raster
    image compression. No support for alpha layers. |

    | Graphics Interchange Format | `.gif` | Legacy lossless image support. Primarily
    used for animated images on the Web. |

    | Bitmap Image File | `.bmp` | Uncompressed image support. Popularized by early
    versions of Windows. |

    | Tagged Image File Format | `.tiff`, `.tif` | Legacy low-compression image support.
    Popularized by early image-capture devices and desktop publishing packages. |


    While the system can load these file formats, it will not optimize their file
    sizes or density for you. An uncompressed, 10MB bitmap file will take much longer
    to access and draw than a compressed 100KB JPG file. Whenever possible, try to
    use compressed JPGs (or PNGs if you require transparency layers).


    **Note**  If your designer provides you with Photoshop files only (`.psd`), you
    will need to manually save the layers as image files yourself. The Photoshop file
    format is a resource-intensive moving target, so it is highly unlikely that Apple
    will provide system-level support for it.


    Using the UIImageView Class to Display Images


    To display images in your app, you need to use a subclass of `UIView`, the atomic
    unit for user interface elements in iOS. To bridge this gap, Apple has created
    `UIImageView`, which provides an area to place the image on the screen, methods
    to dynamically scale the image at runtime, and an outlet for touch gestures.


    In this section, you will learn how to initialize `UIImageView` with images and
    will explore various ways to use it to handle dynamic content sizes.


    Initializing an Image View


    Initializing `UIImageView` is simple: all you need to do is initialize it with
    a source `UIImage` object, as shown here:


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    UIImageView *myImageView = [[UIImageView  alloc] initWithImage:myImage];

    ```


    Although the `[``UIImageView initWithImage``:]` API does not specify a frame as
    a required parameter, you should provide one. Frames in Cocoa Touch specify the
    location and size of a user interface element. If you are building your interface
    with Interface Builder, the frame for your element will be created automatically.
    You can find an example of setting the frame programmatically in [Listing 2-2](#9781430250838_Ch02.xhtml#list2).


    [***Listing 2-2***](#9781430250838_Ch02.xhtml#_list2). Setting a Frame Programmatically


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    UIImageView *myImageView = [[UIImageView  alloc] initWithImage:myImage];

    myImageView.frame = CGRectMake(10, 10, 100, 100);

    [self.view addSubview:myImageView];

    ```


    Note the `addSubview` call in the preceding code, which places the image view
    on the screen.


    **Note**  You can change an image view’s content at any time by setting the `image`
    property.


    Setting Image-Scaling Options


    You may have seen this problem before: you request an image with a resolution
    of 640×480 pixels, but receive an image with some other size, such as 637×480\.
    To solve this extremely common problem, Apple builds dynamic scaling features
    into all `UIView` objects, which you can control with the `[UIView contentMode]`
    property. In [Table 2-1](#9781430250838_Ch02.xhtml#Tab1), you will see a table
    of popular content modes and the behaviors they specify.


