    **Summary**


    This chapter began by presenting the purpose of this book, what’s different about
    media app development, and the requirements you need to get the most out of the
    book. You saw the basic goals for the book, and how it’s structured so you can
    learn at your own pace, as well as the assumptions made about your prior programming
    experiences and knowledge. You covered some reasons that media development is
    different in terms of resources and developer expectations. Finally, by building
    a simple ImageChanger application, you began to explore some of the most essential
    workflows for building a media app and running it on a device.


    # Part 1: Images


    ## Chapter 2: Adding Images to Your App


    The best way to learn to draw is by studying still-life subjects. Similarly, the
    best way to get into iOS media app development is by starting with static images!


    In this chapter, you will use Apple’s `UIImage`, `UIImageView`, and `UIImagePicker`
    classes to represent, display, and import images into your applications. These
    classes abstract a number of useful features, from decoding files to providing
    in-app access to iOS’s system-wide camera controller.


    ### Using the UIImage Class to Represent Image Data


    Unlike plain-text files, which store data in a human-readable format, images have
    a complex set of attributes that require them to be stored as binary data—including
    compression and color space information. All binary data requires a special class
    to decode it and represent it in a way that allows your program to use it. `UIImage`
    is the class Apple provides for representing image data. You can think of it as
    the common language for all operations that involve image data. For instance,
    `UIImagePickerController`, which you will use later to select images from the
    camera and photo roll, transmits your selections as `UIImage` objects.


    In the next two subsections, “Loading Bundled Files” and “Loading Images at Runtime,”
    you will see how to use `UIImage` to load images from various locations on the
    file system. To make this image data visible to the user by placing it on the
    screen, you need to use `UIImageView`, which you’ll explore in the next major
    section of this chapter, “Using the UIImageView Class to Display Images.”


    #### Loading Bundled Files


    One of the more common tasks when developing an iOS media app is loading an image
    from a designer-provided file, such as a background image, some clip art, or a
    custom button design. To become familiar with this workflow, you will build a
    single-view application that displays an image in a square frame, similar to the
    sample project from [Chapter 1](#9781430250838_Ch01.xhtml). If you need to review
    how to create a single-view application and add an image view to it, you should
    review the last section of [Chapter 1](#9781430250838_Ch01.xhtml).


    The easiest way to start working with a desired image is to call the `UIImage`
    private method, `[UIImage imageNamed:]`, to create an image object from a file
    in your project bundle:


    ```

    UIImage *myImage = [UIImage imageNamed:@"Flower.jpg"];

    ```


    *Project bundle* may seem like a foreign term at this point, but it is a concept
    you are probably already familiar with, without knowing it. If you have ever performed
    a secondary click on an application in OS X, you’ve noticed a Show Package Contents
    option. On both iOS and OS X, `.app` files are smart containers that contain compiled
    object files and bundled resources, such as images, sounds, and precompiled data.
    When your app is compiled, all the source files are turned into object files,
    and any other static files you include are copied directly to the bundle.


    The `[UIImage imageNamed:]` API works by searching through the project bundle
    for a file with the exact same name as the one you provided in the `name` parameter.
    The API is case-sensitive and does not perform any extra logic on the name, so
    make sure you pass the file name exactly as it appears in the bundle, or the returned
    object will be `nil`.


    **Note**  PNG files and asset catalog–backed image sets are the only exception
    to the rule requiring you to use the exact file name. You do not need to specify
    a file extension for either of these types.


    You can confirm that a file is part of your project bundle by making sure you
    can find it in the Xcode Project Navigator (the left pane of the IDE), as shown
    in [Figure 2-1](#9781430250838_Ch02.xhtml#Fig1).


    ![9781430250838_Fig02-01.jpg](images/9781430250838_Fig02-01.jpg)


    [Figure 2-1](#9781430250838_Ch02.xhtml#_Fig1). Xcode Project Navigator, highlighting
    image files in a project


    In this example, you will see a Resources folder. To keep the project folder organized,
    it’s best to create groups before importing files. I prefer to put all of my image
    files and other external assets into a Resources group. You can create a group
    via the New option in the File menu, or by importing a folder during the Add Files
    step. Groups and folders will not prevent you from using the `[UIImage imageNamed:]`
    API.


    #### Using Asset Catalogs To Manage Images


    Starting with the iOS 7 SDK, Apple introduced *asset catalogs* to the iOS development
    workflow. Asset catalogs simplify your workflow by providing a central location
    to store your image files, and a graphical user interface to manage these files.
    While it is easy enough to manage a handful of image files in the Project Navigator,
    the process quickly becomes unwieldy when you need to manage dozens of files,
    or multiple sizes of the same file—situations that asset catalogs are meant to
    alleviate.


    Asset catalogs are an important concept because Apple places strict requirements
    on providing multiple resolutions of your image files. Apple will even prevent
    you from submitting your app to the App Store if you are missing a required resolution
    of the launch image or app icon.


    In this exercise, you will learn how to use an asset catalog to manage files within
    your project, and how to modify your syntax to indicate that you are using an
    asset catalog.


    Every project you create for the iOS 7 SDK or greater comes with a blank asset
    catalog file named `Images.xcassets`. Click this file in the Project Navigator,
    and you are presented with the screen in [Figure 2-2](#9781430250838_Ch02.xhtml#Fig2).


    ![9781430250838_Fig02-02.jpg](images/9781430250838_Fig02-02.jpg)


    [Figure 2-2](#9781430250838_Ch02.xhtml#_Fig2). Asset catalog user interface


    The asset catalog user interface provides two panes: the *set list* in the left
    pane and the *set viewer* in the right pane. To help you manage multiple resolutions
    of the same image, asset catalogs use *image sets* to represent image files. The
    idea is that you add every resolution of an image to a set; then in your code,
    you can refer to the set instead of the individual image file names. This places
    the burden of determining the appropriate file (for example, non-Retina or Retina)
    on the compiler, rather than the developer.'
