    - (void)viewDidLoad {

        [super viewDidLoad];

        // Do any additional setup after loading the view,

        // typically from a nib.


    [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(playbackFinished:)

            name:MPMoviePlayerPlaybackDidFinishNotification object:nil];


    [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(loadStateChanged:)

            name:MPMoviePlayerLoadStateDidChangeNotification object:nil];

    }

    ```


    In this example, I used the `[NSNotificationCenter addObserver:selector:name:object]`
    API to set the observers so that I could specify a method to use as the notification
    handler instead of a block—mostly to make the code easier for you to read when
    it is split up.


    The `MPMoviePlayerPlaybackDidFinishNotification` notification returns an `MPMovieFinishReason`
    constant via the `MPMoviePlayerPlaybackDidFinishReasonUserInfoKey` key and an
    error via the `error` key. If the finish reason is `MPMovieFinishReasonPlaybackError`,
