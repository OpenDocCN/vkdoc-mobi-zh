    Importing Objective-C Classes into Your Project


    Before moving on to building the storyboard, I should discuss the 800-pound gorilla
    in the room: Swift compatibility with Objective-C. Swift lets you import classes
    written in Objective-C and call Objective-C methods. This import capability is
    extremely valuable, because you can import any of the existing Cocoa Touch APIs
    or your existing Objective-C code.


    To illustrate this, rather than rewriting the entire MyAVPlayer project in Swift,
    you will rewrite only the `MainViewController` class in Swift, and you will import
    the `FileViewController` (file picker) as an Objective-C class.


    To add an Objective-C class to your Swift project, follow the same process you
