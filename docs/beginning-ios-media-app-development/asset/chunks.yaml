    ## Using Core Motion to Track Activity


    Core Motion has been iOS’s motion-sensing framework since iOS 4. Developers have
    been using it for years to access the built-in accelerator and gyroscope (enabling
    thousands of racing games ever since). However, until the M-series of motion coprocessors,
    there was never an easy way to access step data. You could use the accelerator
    to detect when the device experienced a “bump” in movement, but you had to develop
    your own code to define a “step.” Similarly, you could use GPS to determine how
    far a user moved, but doing so would drain the battery quickly.'
