    Summary


    In this chapter, you saw how to build a custom video-recording interface based
    on the `AVFoundation` framework’s image-capture classes. To save time, you reused
    the `CameraViewController` class from [Chapter 4](#9781430250838_Ch04.xhtml) for
    the basic capture interface and the `CustomPlayer` class from [Chapter 9](#9781430250838_Ch09.xhtml)
    for the custom video-playback interface.


    It’s worth noting that you were able to reuse most of the code from the still-image
    capture project you built in [Chapter 4](#9781430250838_Ch04.xhtml), making only
    a few changes to handle movie file output and enable video-specific capture settings.
    To mimic the `UIImagePickerController`’s preview interface, you added Accept and
    Reject controls to the `CustomPlayer` class. Finally, to accommodate the larger
    size of video files, you added a Did Finish with URL method to the `CameraDelegate`
    protocol.


    As has been the pattern for so many other projects in this book, this custom video-recording
    project was primarily an exercise in modifying existing code to meet a new use
    case. As you continue as a media app developer (and engineer in general), you
    will find many other concepts that greatly overlap with what you already know.
    The key is to keep an open mind and take advantage of common patterns that you
    recognize.


    Part     4


    iOS8 and Beyond


    Chapter    11


    User Interface Development with Xcode 6


    When I first started in iOS development, I had a very complicated relationship
    with Xcode and Interface Builder. I could lay things out, but they wouldn’t connect
    the way I wanted them to, or I would get weird crashes that I couldn’t debug.
    With a lot of hard work (and the release of storyboards), my frustration began
    to subside, and iOS user interface development started to become a more natural
    process. Fortunately, with the release of Xcode 6, Apple has continued to improve
    the development process by making it even easier to build and debug user interfaces.


    In this chapter, you will see how to speed up your user interface development
    with adaptive user interfaces, how to add Quick Look live view debugging to any
    of your classes, and how to make your own classes fully compatible with Interface
    Builder’s Attributes Inspector. These additions help you develop faster by reducing
    the steps required to see what’s happening “right now” and by integrating with
    features that were previously limited solely to Apple-created classes.


    **Caution**  The topics covered in this chapter are available only in Xcode 6
    with the iOS 8.0 SDK or greater.


    Using Size Classes to Build Adaptive User Interfaces


    For the first few years of its existence, iOS was limited to iPhones, which all
    had 3.5-inch screens. Subsequently, the device delivery options quickly grew to
    include 10-inch iPads, 8-inch iPad Minis, 4-inch Retina iPhones, 4.7-inch iPhones,
    and now (with the introduction of the iPhone 6 Plus), 5.5-inch iPhones When developers
    had to support only two screen sizes, they tended to use `#ifdef` statements and
    separate Interface Builder files to manage the two user interfaces. However, this
    approach broke down when Apple began introducing devices with higher pixel densities
    (the iPhone 4) and new aspect ratios (the iPhone 5). To help address the changing
    display requirements, Apple introduced *auto-layout* and *asset catalogs* in Xcode
    5\. To pave the way for future devices, Apple has introduced a design methodology
    for user interface development in Xcode 6 called *adaptive user interfaces*.


    Apple’s goal with adaptive user interfaces is to let you build one storyboard
    that can run on all devices. To accomplish this goal, Apple has introduced the
    concept of *size classes* to iOS 8: a new way of thinking of your layouts beyond
    “iPhone mode” and “iPad mode.” Size classes in iOS encourage you to conceptualize
    user interfaces in terms of the space available to your view, rather than in terms
    of specific target devices (such as phone or tablet). To ensure a smooth transition,
    Apple has built support for this concept into various aspects of Interface Builder—including
    new constraint types, a new auto-layout preview interface, and a new simulator
    (the *resizable simulator*). To help you implement this feature programmatically,
    Apple has also introduced the `UITraitCollection` class, which brings together
    size classes and screen density (for example, Retina) into a robust alternative
    to the `UIInterfaceIdiom` macros for detecting device types.


    This section focuses on how you can use size classes to build adaptive storyboards.
    You can learn more about the `UITraitCollection` class by checking Apple’s Adaptive
    User Interfaces portal (`https://developer.apple.com/design/adaptivity/`).


    As shown in [Figure 11-1](#9781430250838_Ch11.xhtml#Fig1), if you were to compare
    the four major types of layouts for a user interface in iOS, your results would
    be iPhone portrait mode, iPhone landscape mode, iPad portrait mode, and iPad landscape
    mode.


    ![9781430250838_Fig11-01.jpg](images/9781430250838_Fig11-01.jpg)


    [Figure 11-1](#9781430250838_Ch11.xhtml#_Fig1). Major layouts for iOS devices'
