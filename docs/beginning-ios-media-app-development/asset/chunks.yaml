    \ description]);\n    }\n}\n```\n\n**Caution**  The only way to change the recording\
    \ file path is by creating a new recorder object. Remember to notify the user\
    \ of this in your app, either through an alert or by indicating that the old recording\
    \ has completed.\n\n## Deleting the Recording\n\nSometimes, a user will be so\
    \ unhappy with a recording and will want to delete it outright. To delete an active\
    \ recording, use the `[AVAudioRecorder deleteRecording]` instance method, as shown\
    \ in [Listing 5-28](#9781430250838_Ch05.xhtml#list28). This method deletes the\
    \ file that you initialized the recorder object with. As with other recording\
    \ events, make sure you stop the recorder before attempting to delete the file.\n\
    \n[***Listing 5-28***](#9781430250838_Ch05.xhtml#_list28). Deleting an Audio Recording\n\
    \n```objc\n-(IBAction)delete:(id)sender\n{\n    if ([self.audioRecorder isRecording])\
    \ {\n        [self.audioRecorder stop];\n    }\n\n    [self.audioRecorder deleteRecording];\n\
    }\n```\n\n## Summary\n\nIn this chapter, you saw how to use the `AVAudioPlayer`\
    \ and `AVAudioRecorder` classes to play and record audio within your app. You\
    \ learned that, as when accessing the camera, both classes require you to use\
    \ the `AVAudioSession` class as a gatekeeper to the system’s shared resources.\
