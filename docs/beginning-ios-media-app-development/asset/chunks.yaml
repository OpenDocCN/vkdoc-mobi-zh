    Chapter    13


    Tracking Fitness with HealthKit and Core Motion


    Of all the features that were announced at this year’s Apple Worldwide Developers
    Conference, the one that took everyone by surprise was HealthKit—Apple’s platform
    for health and fitness tracking. While health and fitness are two of the largest
    segments of the App Store, Apple had always taken a backseat in the process, providing
    APIs and hardware interfaces, but never getting too involved in the software side
    (aside from developing companion apps for the Nike+ pedometers). HealthKit changes
    all that, by providing a repository for health data that all developers are encouraged
    to integrate with, and the Health app, which comes bundled with iOS 8, that allows
    users to view their stored data.


    Although you can find apps that provide everything from step counting to highly
    specialized coaching, it has been extremely difficult to sync or share information
    between applications. For instance, you might have one app that does an amazing
    job of helping you through your morning run, and another that encourages you to
    stay active throughout the day, but combining the data from the two applications
    is nearly impossible. The proliferation of Bluetooth and WiFi-connected devices
    has only exacerbated this problem. Nearly every health accessory has required
    its own custom companion app that communicates with the accessory and logs its
    data. Until HealthKit, there has been no good way to see everything in one place.


    To help expand health and fitness even further, Apple has built the M-series of
    motion coprocessors into every new iOS device since the iPhone 5S, including the
    iPad Air, iPhone 6, and iPhone 6 Plus. M-series chips provide a highly advanced
    set of sensors that reduce the need for external accessories that provide the
    same functionality. Additionally, the M-series are extremely low-power, so they’re
    a practical alternative for sensing motion. According to Apple, the M-series chips
    are 100 times more power efficient than the chips Apple previously used for motion
    sensing. Starting with iOS 7, Apple has built support for the M-series coprocessors
    into their motion-sensing framework, Core Motion, and has now made it even easier
    to quantify this data.


    In this chapter, you will see how to take advantage of the two frameworks by adding
    motion tracking and logging to the MyPod application. The new application will
    be called MyFitnessPod and is provided in the [Chapter 13](#9781430250838_Ch13.xhtml)
    folder of the source code bundle. As shown in [Figure 13-1](#9781430250838_Ch13.xhtml#Fig1),
    you will reuse the media playback and playlist selection features of the MyPod
    app, but you will also add workout controls and status information. The toggle
    playback button is missing, because it is tied to the workout controls: when the
    user starts, pauses, or ends a workout, so will playback.


    ![9781430250838_Fig13-01.jpg](images/9781430250838_Fig13-01.jpg)


    [Figure 13-1](#9781430250838_Ch13.xhtml#_Fig1). Mock-up for MyFitnessPod project


    You may be wondering how this ties into HealthKit and Core Motion. When users
    begin their workouts, the MyFitnessPod app will begin tracking their activity
    by using the Core Motion framework. Similarly, when users complete their activity,
    you will close it out using Core Motion and log the activity data to HealthKit.
    While the activity is in progress, you will monitor from both frameworks to display
    daily steps and current workout progress.


    **Caution**  This chapter requires iOS 8 and a device with an M-series motion
    coprocessor (iPhone 5S or newer) to fully implement. The Core Motion features
    will not run on an incompatible device, and HealthKit is not available in SDK
    versions prior to iOS 8.0.


    Getting Started


    As with prior projects, this one takes advantage of your previous work. Begin
    by cloning the MyPod project from [Chapter 7](#9781430250838_Ch07.xhtml) and renaming
    it to **MyFitnessPod**. If you are still unsure how to rename a project, refer
    back to the “Getting Started” section of [Chapter 8](#9781430250838_Ch08.xhtml).


    Next, you need to add the requisite frameworks. In Xcode 6, you will find both
    the `CoreMotion` and `HealthKit` frameworks in the Framework Browser. Your final
    framework set should look like the example in [Figure 13-2](#9781430250838_Ch13.xhtml#Fig2).


    ![9781430250838_Fig13-02.jpg](images/9781430250838_Fig13-02.jpg)


    [Figure 13-2](#9781430250838_Ch13.xhtml#_Fig2). Frameworks used by MyFitnessPod
    project


    Because HealthKit accesses sensitive user information, and some users may want
    to opt out, you need to add HealthKit access to your list of application capabilities.
    As with previous capability changes, navigate to the Capabilities tab of your
    project settings. Scroll down to HealthKit and click the toggle switch. You will
    be presented with a dialog box asking you to select a Development Team to associate
    the application with, as shown in [Figure 13-3](#9781430250838_Ch13.xhtml#Fig3).


    ![9781430250838_Fig13-03.jpg](images/9781430250838_Fig13-03.jpg)


    [Figure 13-3](#9781430250838_Ch13.xhtml#_Fig3). HealthKit development team prompt


    After you select a development team, the Capabilities tab will set the toggle
    switch to On and show a series of checkmarks indicating that your application
    has met all of the requirements for HealthKit, as shown in [Figure 13-4](#9781430250838_Ch13.xhtml#Fig4).


