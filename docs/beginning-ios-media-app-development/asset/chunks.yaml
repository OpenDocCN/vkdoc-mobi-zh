    if the file failed to load. When you are playing multiple files, it is critical
    to have a recovery strategy, such as skipping the bad item and continuing with
    the next one. The *playback state* observer handled this error when you were playing
    a single file using the `AVPlayer` class. For the `AVQueuePlayer`, you will need
    something a little bit more advanced.


