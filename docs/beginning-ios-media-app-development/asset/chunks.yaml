    The `videoMaximumDuration` property takes a `CGFloat` value that corresponds to
    the maximum length for videos that users can capture using the image picker. When
    the user has reached the maximum capture length, the image picker will automatically
    stop and bring up the preview interface for the user. The default value for this
    property is set to 600 seconds (10 minutes), but your final value should depend
    on your application’s intended purpose and any external requirements you may have
    (such as uploading to a video-sharing service or a custom web service).


    ```

    self.videoRecorder.maximumVideoDuration = 30.0f;

    ```


    Finally, to allow users to edit their videos before returning to the main user
    interface, enable the `allowsEditing` property on your image picker object. This
    property takes a Boolean value as its input and returns an entry value in the
    results dictionary for the image picker, which represents the URL for the edited
    video. The video-editing interface appears after the user has finished recording,
    and does not require any additional work on your part.


    ```

    self.videoRecorder.allowsEditing = YES;

    ```


