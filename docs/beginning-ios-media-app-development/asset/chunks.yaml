    Specifying a Media Queue (Playlist)


    Before you can start playing music using the `MPMusicPlayerController` class,
    you need to specify a queue of media items that the music player should play.
    You can think of a media queue as a playlist; it is a list of items that play
    in First In, First Out order (the first item that is added to the queue will be
    the first to play).


    By default, initializing a new `MPMediaQuery` item ( `[[MPMediaQuery alloc] init]`
    ) will return an unsorted list of all items in the iPod media library. To make
    your media queue useful, you should try to specify the following:


    *   The type of items to filter the results by (for example, songs, playlists,
    albums, or podcasts)

    *   How to group the results (for example, by song title, album name, or artist)

    *   Additional filters to match specific requirements (for example, match only
    a certain artist)


    Using these criteria, you could build a query such as this: Find all songs where
    the artist is Pink Floyd, sorted by song title.


    You can quickly specify a media type and grouping order for your media query by
    initializing your query object with one of the `MPMediaQuery` class methods. For
    the Pink Floyd example, you could use the `[MPMediaQuery songsQuery]` class method
    instead of the default constructor.


    ```

    MPMediaQuery *pinkFloydQuery = [MPMediaQuery songsQuery];

    ```


    You can find a table of some of the most popular `MPMediaQuery` class methods
    and their resulting queries in [Table 6-1](#9781430250838_Ch06.xhtml#Tab1).


    [Table 6-1](#9781430250838_Ch06.xhtml#_Tab1). Popular MPMediaQuery Class Methods


    | Method Name | Resulting Query |

    | --- | --- |

    | `[MPMediaQuery albumsQuery]` | Returns a list of music items (songs), sorted
    by album title |

    | `[MPMediaQuery artistsQuery]` | Returns a list of music items (songs), sorted
    by artist name |

    | `[MPMediaQuery compilationsQuery]` | Returns a list of compilation items (albums),
    sorted by album title |

    | `[MPMediaQuery playlistsQuery]` | Returns a list of playlist items, sorted by
    playlist title |

    | `[MPMediaQuery songsQuery]` | Returns a list of music items (songs), sorted
    by song title |


    You can manually change the grouping type for the media query by specifying a
    value for the `groupingType` property. You can find a table of popular grouping
    types in [Table 6-2](#9781430250838_Ch06.xhtml#Tab2).


    [Table 6-2](#9781430250838_Ch06.xhtml#_Tab2). Popular MPMediaGrouping Types


    | Key | Behavior |

    | --- | --- |

    | `MPMediaGroupingTitle` | Groups and sorts music items by album title |

    | `MPMediaGroupingArtist` | Groups and sorts music items by artist name |

    | `MPMediaGroupingAlbum` | Groups and sorts music item by album title and track
    number |

    | `MPMediaGroupingGenre` | Groups and sorts items by genre |

    | `MPMediaGroupingPlaylist` | Groups and sorts collections by playlist title |


    To filter the results to match a specific requirement (for example, Artist = Pink
    Floyd), you will need to use an `MPMediaPropertyPredicate`. To build a media property
    predicate, you need to specify three parameters:


    *   The property you are trying to match (for example, artist)

    *   The match value (for example, Pink Floyd)

    *   The type of comparison (`contains` or `equalTo`)


    For the Pink Floyd example, the predicate would look like this:


    ```

    MPMediaPropertyPredicate *artistPredicate = [MPMediaPropertyPredicate

        predicateWithValue:@"PinkFloyd"

        forProperty:MPMediaItemPropertyArtist

        comparisonType:MPMediaPredicateComparisonEqualTo];

    ```


    After building the predicate, add it to the query by using the [`MPMediaQuery
    addFilterPredicate:]` instance method:


    ```

    [pinkFloydQuery addFilterPredicate:artistPredicate];

    ```


    **Note**  A query can have multiple predicates—but make sure they don’t conflict
    with each other.


    Load your query into the media player by using the `[MPMusicPlayerController setQueueWithQuery:]`
    method. [Listing 6-3](#9781430250838_Ch06.xhtml#list3) shows a function that generates
    the Pink Floyd query and sets the media queue for a shared music player object.


    [***Listing 6-3***](#9781430250838_Ch06.xhtml#_list3). Setting a Media Queue


    ```

    MPMediaQuery *pinkFloydQuery = [MPMediaQuery songsQuery];

    MPMediaPropertyPredicate *artistPredicate =

        [MPMediaPropertyPredicate predicateWithValue:@"Pink Floyd"

        forProperty:MPMediaItemPropertyArtist

        comparisonType:MPMediaPredicateComparisonEqualTo];

    [pinkFloydQuery addFilterPredicate:artistPredicate];

    [self.musicPlayer setQueueWithQuery:pinkFloydQuery];

    ```


    For the MyPod project, you will need to set the query after the picker table view
