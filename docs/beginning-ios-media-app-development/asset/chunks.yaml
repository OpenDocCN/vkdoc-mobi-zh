    ## 流媒体音乐\n\n现在您已经知道如何在应用中播放音频文件和 iPod 媒体资料，是时候探索另一个主要的音频来源了：流媒体音频服务。许多广播电台提供其广播的在线版本，并且大量广播电台仅通过网络运营。这项技术被称为*流音频*，因为您不是下载文件，而是连接到一个服务器，该服务器向所有连接者广播连续的音频数据*流*（也称为*多播*）。该流通常使用与音频文件相同的压缩格式（编解码器，例如\
    \ MP3、OGG 或其他格式）进行编码，但不同于文件的是，它没有起始或终止头部。在播放器端，当应用程序连接到流时，它会将数据保存到内存中的一个存储桶中，称为*缓冲区*。当缓冲区收集到足够的数据以连续播放音频（或视频）时，播放即开始。\n\
    \n使用 `AVPlayer` 类，您可以访问 `AVFoundation` 框架的流媒体音频播放器。您之前用于音频文件播放的 `AVAudioPlayer`\
    \ 类不支持缓冲区管理，因此它不适合用于流媒体音频。方便的是，`AVPlayer` 类遵循了许多与 `AVAudioPlayer` 和 `MPMusicPlayerController`\
    \ 类相同的设计模式，这意味着您可以重用相同的通用逻辑进行播放。\n\n为了在您的应用中集成流媒体广播服务，您可以修改第 5 章中的 MyPlayer 应用，将其转换为使用流媒体音频而非音频文件。您将简化用户界面，使其看起来像图\
    \ 6-4 中的模型，将控件减少为“播放”按钮和一个用户可以输入流 URL 的提示框。该项目包含在源代码包的 `Chapter 6` 文件夹中，名为 MyStreamingPlayer\
    \ 项目。\n\n![9781430250838_Fig06-04.jpg](img/9781430250838_Fig06-04.jpg)\n\n图 6-4.\
    \ MyStreamingPlayer 应用模型\n\n### 入门指南\n\n要开始实现 MyStreamingPlayer 项目，请复制一份 MyPlayer\
