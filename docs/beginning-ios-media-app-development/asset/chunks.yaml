  trans: '

    尽管实现音频播放看起来需要大量工作，但`AVFoundation`提供了多种快捷方式，让配置音频会话变得简单，如代码清单 5-3 所示。


    ***代码清单 5-3***. 为播放配置音频会话


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // 加载视图后执行任何额外设置，

            // 通常来自 nib 文件。


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback

                                               error:&error];

        if (error == nil) {

            NSLog(@"音频会话初始化成功");

        } else {

            NSLog(@"初始化播放音频文件时出错：音频会话：%@",

                  [error description]);

        }

    }

    ```


    在此示例中，你可以通过单例对象 `[AVAudioSession sharedInstance]` 访问应用的音频会话，如前所述，该对象会随应用自动生成。我们的应用默认被配置为所有音频会话消息的`delegate`对象。要指定你的应用播放音频，请使用系统宏
    `AVAudioSessionCategoryPlayback`，这表示应用需要控制系统音频资源来播放声音。将此代码块添加到主视图控制器的 `[UIViewController
    viewDidLoad:]` 方法中，以指定你的应用在视图加载时想要控制音频会话。


    ## 使用单例


    *单例* 是在应用中仅实例化一次的对象。所有操作都在一个共享对象上执行。与全局变量不同，单例是*延迟加载* 的，这意味着它在首次被调用时才被实例化。


    在访问共享资源时，单例非常方便，因为它允许你创建一个管理器，通过它来传递所有操作。通过使用在整个应用程序中共享的单个管理器对象，你无需重复编写设置/拆卸代码（这些代码仅在对象初始化或销毁时调用），并且可以确保你的操作在有效对象上执行。


    要声明一个单例，你可以在头文件中定义一个公共方法，方法名使用共享对象的名称。如果你希望应用委托可以作为一个单例访问，你的头文件应如下所示：


    ```

    #import <UIKit/UIKit.h>


    @interface AppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    +(AppDelegate*)sharedInstance;


    @end

    ```


    要实现你的延迟加载逻辑，定义一个全局变量（`static`对象）来存储你的共享对象，并通过 `sharedInstance` 方法传递所有消息。如果全局变量已初始化，它将返回指针；否则，它将初始化对象并返回指针。


    ```

    static AppDelegate *shared;

    +(AppDelegate*)sharedInstance{

        if (!shared || shared==nil) {

            shared = [[AppDelegate alloc] init];

        }

        return shared;

    }

    ```


    你可以在任何类中使用你的单例对象，方法就像使用其他任何对象一样，包含其头文件并向其传递消息：


    ```

    #include "AppDelegate.h"


    @implementation myClass


    -(void)viewDidLoad {

        [[appDelegate sharedInstance] refreshSession];

    }

    ```


    尽管此示例使用了 `AVAudioSessionCategoryPlayback` 宏，但你也可以利用各种预配置的宏。表 5-1 列出了最常用的宏及其用途。


    表 5-1. 常用的 `AVAudioSessionCategoryPlayback` 宏


    | 宏（常量）名称 | 预期用途 |

    | --- | --- |

    | `AVAudioSessionCategorySoloAmbient` | 所有应用的默认音频会话配置。播放将持续进行，直到用户将设备静音或锁定屏幕。你的应用完全控制音频播放，并拒绝来自其他应用的音频事件。
    |

    | `AVAudioSessionCategoryAmbient` | 音频播放是可选的、但非必需的应用。播放将持续进行，直到用户将设备静音。其他应用仍然可以发送音频事件。
    |

    | `AVAudioSessionCategoryPlayback` | 需要音频播放才能正常工作的应用。即使用户将设备静音，播放也会继续。可以配置为允许来自其他应用的音频事件。
    |

    | `AVAudioSessionCategoryRecord` | 需要音频录制功能的应用。可以配置为支持后台音频录制。 |

    | `AVAudioSessionCategoryPlayAndRecord` | 需要同时具备音频录制和播放功能的应用。可以配置为在后台继续运行，并接受来自其他应用的音频事件。
    |


    ## 选择音频文件


    要填充 `FileViewController`，你需要扫描应用的文档文件夹，查找 MP3 和 M4A 文件。你可以将得到的数组用作表格视图的数据源。


    你可以通过调用系统文件管理器实例的 `[NSFileManager contentsOfDirectoryAtPath:]` 方法，找到并检索目录中所有文件的
    `NSArray`。通过将每个文件的 `pathExtension` 分量与你正在查找的文件类型的扩展名进行比较，来确定每个文件的类型。`pathExtension`
    属性是所有 `NSString` 对象上可用的派生属性。调用时，它会尝试返回字符串中紧跟句点（`.`）之后的部分。代码清单 5-4 展示了实现此行为的方法。在你的
    `FileViewController` 类中的 `[self viewDidLoad]` 方法底部调用此方法。


    ***代码清单 5-4***. 构建音频文件列表


    ```

    -(void)initializeFileArray

    {

        NSArray *paths = NSSearchPathForDirectoriesInDomains(

                         NSDocumentDirectory,

                         NSUserDomainMask, YES);

        NSString *documentsDirectory = [paths objectAtIndex:0];

        NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

                              contentsOfDirectoryAtPath:documentsDirectory

                              error:&error];


    if (error == nil) {


    self.fileArray = [NSMutableArray new];


    for (NSString *file in allFiles) {

                if ([[file pathExtension] isEqualToString:@"mp3"] ||

                   [[file pathExtension] isEqualToString:@"m4a"]) {

                    [self.fileArray addObject:file];

                }

            }


    } else {

            NSLog(@"查找文件出错：%@", [error description]);

        }

    }

    ```


    你将在整个类中使用 `fileArray` 属性作为数据源，因此请记得在文件视图控制器的头文件中将其声明为实例变量。


    现在你已经填充了文件数组，请实现必要的 `UITableViewDelegate` 方法，以开始将其用作表格的数据源。代码清单 5-5 展示了如何使用 `fileArray`
    属性来填充表格视图数据源委托方法所需的节数和行数。


    ***代码清单 5-5***. 使用数组填充表格


    ```

    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    {

        // 返回节数。

        return 1;

    }


    - (NSInteger)tableView:(UITableView *)tableView

           numberOfRowsInSection:(NSInteger)section

    {

        // 返回该节中的行数。

        return [self.fileArray count];

    }

    ```

    '
- fmt: 'To display the file name in each table view cell, you can use the `[NSString
    lastPathComponent]` derived property, as shown in [Listing 5-6](#9781430250838_Ch05.xhtml#list6).
    This property works like `[NSString pathExtension]`, except it extracts the characters
    after the final forward-slash character (`/`) in a string. Remember to use the
    reuse identifier you defined for your cell in Interface Builder.


    **[Listing 5-6](#9781430250838_Ch05.xhtml#_list6).** Displaying the File Name
    in a Table View Cell


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView

        cellForRowAtIndexPath:(NSIndexPath *)indexPath

    {

        UITableViewCell *cell = [tableView

            dequeueReusableCellWithIdentifier:@"fileCell"

            forIndexPath:indexPath];


    // Configure the cell...


    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];


    cell.textLabel.text = [filePath lastPathComponent];


    return cell;

    }

    ```


    When a user selects a table view cell, you should return the entire file path
    of the selected item from your file array. This will allow your music player to
    play the file directly. As with the previous camera examples, this app passes
    back selections via a custom-defined protocol. The protocol definition from the
    header file is shown in [Listing 5-7](#9781430250838_Ch05.xhtml#list7).


    **[Listing 5-7](#9781430250838_Ch05.xhtml#_list7).** Protocol Definition for FileControllerView


    ```

    @protocol FileControllerDelegate <NSObject>


    -(void)cancel;

    -(void)didFinishWithFile:(NSString *)filePath;


    @end

    ```


    You can use the protocol shown in [Listing 5-8](#9781430250838_Ch05.xhtml#list8)
    to pass back the file path.


    **[Listing 5-8](#9781430250838_Ch05.xhtml#_list8).** Passing Back the File Path
    When Selecting a Table View Cell


    ```

    -(void)tableView:(UITableView *)tableView

        didSelectRowAtIndexPath:(NSIndexPath *)indexPath

    {

        NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];


    [self.delegate didFinishWithFile:filePath];


    }

    ```


    After defining the protocol, modify your main view controller’s header file to
    indicate you will implement it, as shown in [Listing 5-9](#9781430250838_Ch05.xhtml#list9).


    **[Listing 5-9](#9781430250838_Ch05.xhtml#_list9).** Modified Header File for
    Main View Controller


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import "FileViewController.h"


    @interface MainViewController : UIViewController

         <FileControllerDelegate>


    @property (nonatomic, strong) IBOutlet UILabel *timeLabel;

    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;


    @property (nonatomic, strong) IBOutlet UIButton *chooseButton;

    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipBackwardButton;


    @property (nonatomic, strong) IBOutlet UIProgressView *progressBar;


    @property (nonatomic, strong) NSString *selectedFilePath;


    @end

    ```


    [Listing 5-10](#9781430250838_Ch05.xhtml#list10) shows how to implement the delegate
    methods by dismissing the file picker when the `cancel` message is received, and
    saving the selected file path when the `didFinishWithFile:` message is received.


    **[Listing 5-10](#9781430250838_Ch05.xhtml#_list10).** File Picker Delegate Method
    Implementations


    ```

    -(void)cancel

    {

        [self dismissViewControllerAnimated:YES completion:nil];

    }


    -(void)didFinishWithFile:(NSString *)filePath

    {

        self.selectedFilePath = filePath;

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    Remember to declare your main view controller as a delegate for the protocol when
    the Present File Picker segue is selected, in the `[UIViewController prepareForSegue:]`
    method, as shown in [Listing 5-11](#9781430250838_Ch05.xhtml#list11). Use the
    segue name you created in Interface Builder to select the button.


    **[Listing 5-11](#9781430250838_Ch05.xhtml#_list11).** Declaring the Main View
    Controller as a Delegate


    ```

    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender

    {

        if ([[segue identifier] isEqualToString:@"showFilePicker"]) {

            FileViewController *fileViewController =

              (FileViewController *)segue.destinationViewController;

            fileViewController.delegate = self;

        }

    }

    ```


    You may be thinking, “This is cool and all, but how do I get music into my app?”
    You can actually use iTunes to manage data on apps that enable iTunes File Sharing.
    You can navigate to the file manager interface in iTunes by selecting your device
    and navigating over to the Apps tab. As shown in [Figure 5-6](#9781430250838_Ch05.xhtml#Fig6),
    scrolling to the bottom of the page shows a list of apps that enable file sharing.
    Selecting them lets you manage files in their documents directories.


    ![9781430250838_Fig05-06.jpg](images/9781430250838_Fig05-06.jpg)


    **[Figure 5-6](#9781430250838_Ch05.xhtml#_Fig6).** iTunes file-sharing interface


