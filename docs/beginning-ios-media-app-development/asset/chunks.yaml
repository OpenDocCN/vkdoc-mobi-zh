    \n         object:self userInfo:userDict];\n}\n\n[self.player removeObserver:self\
    \ forKeyPath:@\"status\"];\n```\n\n为了让视频缩放适应容器，请记得设置 `AVPlayerLayer` 的 `videoGravity`\
    \ 属性为 `AVLayerVideoGravityResizeAspect`。\n\n## 创建类似 MediaPlayer 的通知\n\n为了与 `MPMoviePlayerController`\
    \ 类保持一致性，你应该发布一个通知来指示播放器的加载状态已经改变。在我的示例中，我将这个通知命名为 `customPlayerLoadStateChanged`。如代码清单\
    \ 9-10 所示，我在 `userDict`（通知用于传递变量的首选机制）中添加了 `status` 和 `error` 键，以使消息更具描述性。我使用\
    \ `ready` 作为 *成功* 时的 `status` 值，使用 `error` 作为 *失败* 时的值。\n\n**代码清单 9-10 发布 AVPlayer\
    \ 状态更改的通知**\n\n```objc\n-(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object\n\
    \    change:(NSDictionary *)change context:(void *)context\n{\n    if (object\
    \ == self.player && [keyPath isEqualToString:@\"status\"]) {\n\nif (self.player.status\
    \ == AVPlayerStatusReadyToPlay) {\n\nAVPlayerLayer *playerLayer = [AVPlayerLayer\n\
    \                playerLayerWithPlayer:self.player];\n            playerLayer.frame\
    \ = self.view.bounds;\n            playerLayer.videoGravity = AVLayerVideoGravityResizeAspect;\n\
    \            [self.view.layer addSublayer:playerLayer];\n\nplayerLayer.needsDisplayOnBoundsChange\
    \ = YES;\n            self.view.layer.needsDisplayOnBoundsChange = YES;\n\n[self\
    \ showControls:nil];\n            self.controlTimer = [NSTimer\n             \
    \   scheduledTimerWithTimeInterval:2.0f target:self\n                selector:@selector(hideControls:)\
    \ userInfo:nil\n                repeats:NO];\n\nNSDictionary *userDict = [NSDictionary\n\
    \                dictionaryWithObject:@\"ready\" forKey:@\"status\"];\n\n[[NSNotificationCenter\
    \ defaultCenter]\n                 postNotificationName:@\"customPlayerLoadStateChanged\"\
    \n                 object:self userInfo:userDict];\n\n} else {\n            NSDictionary\
    \ *userDict = [NSDictionary\n                dictionaryWithObjects:@[@\"error\"\
    , @\"Unable to load file\"]\n                forKeys:@[ @\"status\", @\"reason\"\
    ]];\n            [[NSNotificationCenter defaultCenter]\n                postNotificationName:@\"\
    customPlayerLoadStateChanged\"\n                object:self userInfo:userDict];\n\
    \        }\n\n[self.player removeObserver:self forKeyPath:@\"status\"];\n    }\n\
    }\n```\n\n要处理这个通知，你需要在 `MainViewController` 类中添加一个观察者。你可以在代码清单 9-11 中找到 `MainViewController`\
    \ 类中修改后的 `[self viewDidLoad]` 方法。在此示例中，我使用 `[self loadStateChanged:]` 作为通知的处理程序，就像在\
    \ MyVideoPlayer 项目中一样。\n\n**代码清单 9-11 为 AVPlayer 状态更改添加观察者**\n\n```objc\n-(id)initWithContentURL:(NSURL\
    \ *)contentURL\n{\n    UIStoryboard *storyboard = [UIStoryboard storyboardWithName:@\"\
    Main\"\n        bundle:nil];\n    CustomPlayerController *myViewController = [storyboard\n\
    \    instantiateViewControllerWithIdentifier:@\"CustomPlayerController\"];\n\n\
    self = myViewController;\n    if (self) {\n\nself.playerItem = [[AVPlayerItem\
    \ alloc]\n            initWithURL:contentURL];\n        self.player = [AVPlayer\
    \ playerWithPlayerItem:self.playerItem];\n\n[self.player addObserver:self forKeyPath:@\"\
    status\" options:0\n            context:nil];\n\nself.isPlaying = NO;\n    }\n\
    \    return self;\n}\n```\n\n```"
