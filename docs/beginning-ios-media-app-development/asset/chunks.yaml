    Another advantage of the `AVKit` framework over the `MediaPlayer` framework is
    that it allows you to initialize a media player with a playlist, using the `AVQueuePlayer`
    class. In addition to being able to load multiple files at once, using `AVQueuePlayer`
    as the `player` property for your `AVPlayerController` will automatically add
    controls and handler methods so that users can navigate between items in the playlist.'
