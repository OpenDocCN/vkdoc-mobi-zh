  raw: 'As with variables in Swift, you indicate the type of each parameter by appending
    the type name with a colon.


    If your method does not return anything, you can omit the return parameters and
    `->`:


    ```

    func isValidName(name: String) {

    }

    ```


    Calling Enumerated Types


    In Swift, you can build an enumerated type by specifying its name, type, and values:


    ```

    enum PlaybackStates : Int {

        case .Failed = -1, case .Loading, case .Success

    }

    ```


    Unlike Objective-C, to denote values in an `enum`, you need to place a period
    before the constant name. When comparing against an `enum` value, retain the period:


    ```

    if playbackState == .Success {

        println("Success!")

    ```


    Using Unusual Punctuation (Question Mark and Exclamation Mark Operators)


    For anyone coming from a C-based language, one of the most jarring aspects of
    Swift is how it uses the question mark and exclamation mark operators.


    In Swift, the question mark operator (`?`) is used to denote an optional variable.
    An *optional variable* is one that can hold either a value or `nil`. You may be
    wondering why this is important. In other languages, an object can be `nil`, but
    a scalar variable (such as an `int`) always stores a value. Optional variables
    in Swift remove this restriction, allowing anything to store a `nil` value.


    You declare a variable as optional by appending a question mark to the end of
    its type:


    ```

    var myString : String?

    ```


    This also applies if you are initializing an object with a value:


    ```

    var myString : String? = "Ahmed is cool"

    ```


    Because Swift infers variable types, optionals are extremely important when you
    need to pass an object (such as an `NSError`) by reference.


    **Note**  You still use a question mark to denote a ternary operation in Swift.


    The exclamation mark operator in Swift allows you to *unwrap* an optional variable.
    This is the equivalent of dereferencing a pointer in Objective-C or another C-based
    language. Unwrapping allows you to extract an optional variable’s properties (or
    `nil` if the variable has not been initialized).


    To unwrap a variable, append an exclamation mark to the end of its variable name:


    ```

    var errorString = error!.description

    ```


    **Caution**  Do not omit the period after the exclamation mark in dot-notation.
    Both are required to unwrap a variable.


    Building a Class


    Unlike Objective-C, Swift does not have a concept of interface files (`.h`) and
    implementation files (`.m`). In Swift, your entire class is declared within a
    `.swift` file.


    In Objective-C, a class declaration consisted of the following:


    *   Class name

    *   Parent class

    *   Property declarations (in interface file)

    *   Method definitions (in implementation file)


    As a basis of comparison, refer to the class declaration for the MyAVPlayer project,
    shown in [Listing 14-1](#9781430250838_Ch14.xhtml#list1). In the MyAVPlayer project,
    you can find this in the `MainViewController.h` file.


    [***Listing 14-1***](#9781430250838_Ch14.xhtml#_list1). Header File for Main View
    Controller Class


    ```

    #import <UIKit/UIKit.h>

    #import <AVKit/AVKit.h>

    #import "FileViewController.h"

    @interface MainViewController : UIViewController <FileControllerDelegate>


    @property (nonatomic, strong) IBOutlet UIView *playerViewContainer;

    @property (nonatomic, strong) IBOutlet UIButton *chooseFileButton;

    @property (nonatomic, strong) IBOutlet UIButton *playAllButton;

    @property (nonatomic, strong) AVPlayerViewController *moviePlayer;


    -(IBAction)playAll:(id)sender;


    @end

    ```


    To import classes in Swift, use the `import` keyword and specify the name of the
    class. Unlike Objective-C, you do not need to indicate the path for the header
    file:


    ```

    import UIKit

    import AVKit

    import FileViewController

    ```


    In Swift, you define a class similar to a variable: by specifying the class name
    after the `class` keyword, and specifying the parent class name after the colon
    (as you would specify the type for a variable). Add curly braces after the parent
    class name to indicate a block of code:


    ```

    class ViewController : UIViewController {

    }

    ```'
