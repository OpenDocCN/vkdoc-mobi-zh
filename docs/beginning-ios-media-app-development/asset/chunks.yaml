    \ C 语言的计算机科学课程，因为依赖 C 语言的工作通常涉及极低级的编程或遗留代码。虽然 Smalltalk 是最早的纯面向对象编程（OOP）语言之一，但其语法与任何其他流行语言都不同，并且除了教学领域外，如今很少被采用。\n\
