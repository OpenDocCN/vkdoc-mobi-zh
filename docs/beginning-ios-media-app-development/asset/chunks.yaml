    \n```\nUIImagePickerController *moviePicker = [[UIImagePickerController alloc]\
    \ init];\nmoviePicker.delegate = self;\n```\n\n要将你的 `UIImagePickerController`\
    \ 对象配置为录制视频，请将视频指定为唯一接受的媒体类型。你可以通过 `mediaTypes` 参数设置媒体类型，该参数接受一个由媒体类型常量构成的数组。视频对应的常量是\
