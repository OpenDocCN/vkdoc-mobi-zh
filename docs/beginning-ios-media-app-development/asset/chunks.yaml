    ## Connecting Items to Interface Builder


    Just as with Objective-C, to make your user-interface elements and handler methods
    visible to Interface Builder, you need to add the `@IBOutlet` attribute to your
    property declarations and `@IBAction` for your methods.


    In the Objective-C version of the `MainViewController` class, you declared an
    element as an *outlet* for Interface Builder by adding the `@IBOutlet` keyword
    in front of your class name:


    ```

    @property (nonatomic, strong) IBOutlet UIButton *playAllButton;

    ```


    In Swift, you can declare an object as an outlet by adding the `@IBOutlet` keyword
    to the front of the variable declaration:


    ```

    @IBOutlet var chooseFileButton : UIButton!

    ```


    To declare a method as an Interface Builder *action* in Objective-C, you changed
    the return type to `IBAction` and used an `id` object to represent the sender
    of the event:


    ```

    -(IBAction)playAll:(id)sender;

    ```


    In Swift, you implement the same logic by adding the `@IBAction` attribute in
    front of your method signature and by taking the `sender` object as an input:


    ```

    @IBAction func playAll:(sender: AnyObject)

    ```


    A big difference you will notice is that the generic object type for Swift is
    `AnyObject` instead of `id`. The `id` keyword does not compile in Swift, so do
    not attempt to use it.


    After adding these attributes, you can link your properties and handlers in Interface
    Builder.


    [Listing 14-3](#9781430250838_Ch14.xhtml#list3) shows the Objective-C version
    of the handler for the Play All button. In this method, you built an array of
    `AVPlayerItem` objects based on the files available in the documents directory.
    After constructing the list, you started playback on the media player.


    [***Listing 14-3***](#9781430250838_Ch14.xhtml#_list3). Objective-C Handler for
    Play All Button


    ```

    -(IBAction)playAll:(id)sender

    {

        NSArray *paths =

            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

            NSUserDomainMask, YES);

        NSString *documentsDirectory = [paths objectAtIndex:0];

        NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

            contentsOfDirectoryAtPath:documentsDirectory error:&error];


    NSMutableArray *playerItemArray = [NSMutableArray new];


    if (error == nil) {

            for (NSString *file in allFiles) {

                NSString *extensionString = [[file pathExtension]

                    lowercaseString];

                if ([extensionString isEqualToString:@"mp4"] ||

                    [extensionString isEqualToString:@"mov"]) {


    NSString *relativePath = [documentsDirectory

                        stringByAppendingPathComponent:file];


    NSURL *fileURL = [NSURL

                         fileURLWithPath:relativePath];


    AVPlayerItem *playerItem = [AVPlayerItem

                         playerItemWithURL:fileURL];


    [playerItem addObserver:self forKeyPath:@"status"

                         options:NSKeyValueObservingOptionNew context:nil];


    [playerItemArray addObject:playerItem];

                 }

            }

       } else {

         NSLog ("could not load files");

       }


    self.moviePlayer.player = [[AVQueuePlayer alloc]

            initWithItems:playerItemArray];


    [self.moviePlayer.player addObserver:self forKeyPath:@"status"

            options:0 context:nil];


    [self.moviePlayer.player play];


    }

    ```


    [Listing 14-4](#9781430250838_Ch14.xhtml#list4) shows the Swift version of the
    handler for the Play All button.


    [***Listing 14-4***](#9781430250838_Ch14.xhtml#_list4). Swift Handler for Play
    All Button


    ```

    @IBAction func playAll(sender : AnyObject) {


    var error : NSError? //optional variable (can be nil)


    let paths =

            NSSearchPathForDirectoriesInDomains(.DocumentDirectory,

            .UserDomainMask, true) // dot syntax for enums values

        let documentsDirectory = paths[0] as String


    let allFiles =

            NSFileManager.defaultManager().contentsOfDirectoryAtPath(

            documentsDirectory, error: &error) as [String]


    if error != nil {

            let errorString = error!.description //extract value

            // print error string

            println("error loading files: \(errorString)")


    } else {

            var playerItemArray  = NSMutableArray()

            for file in allFiles {

                let fileExtension = file.pathExtension.lowercaseString

                if fileExtension == "m4v" || fileExtension == "mov" {

                    let relativePath = documentsDirectory.

                        stringByAppendingPathComponent(file)

                    let fileURL = NSURL(fileURLWithPath: relativePath)

                    let playerItem = AVPlayerItem(URL: fileURL)


    playerItem.addObserver(self, forKeyPath: "status",

                        options:nil, context: nil)


    playerItemArray.addObject(playerItem)


    }

            }


    moviePlayer.player = AVQueuePlayer(items: playerItemArray)

            moviePlayer.player.addObserver(self, forKeyPath: "status",

                options: nil, context: nil)


    moviePlayer.player.play()

        }


    }

    ```


    ## Adding Delegate Support


    In Objective-C, to declare your class as a delegate of a protocol, you needed
    to add the protocol name to your class signature and implement the `@required`
    delegate methods in your class. In Swift, you follow the same process, but the
    syntax is different.


    In Objective-C, you would declare your class as a protocol by adding the protocol
    name(s) in carets after your parent class name:


    ```

    @interface MainViewController : UIViewController <FileControllerDelegate>

    ```


    But in Swift, the syntax is to add your protocol names as a comma-delimited list,
    after your parent class name:


    ```

    class ViewController: UIViewController, FileControllerDelegate {

    ```


    In the MyAVPlayer project, you needed to use the `FileControllerDelegate` protocol
    to handle the user interface events when the user decided to close the file picker
    or select a file. You can find the Objective-C versions of these methods in [Listing
    14-5](#9781430250838_Ch14.xhtml#list5).


    [***Listing 14-5***](#9781430250838_Ch14.xhtml#_list5). Objective-C Delegate Methods


    ```

    -(void)cancel

    {

        //Dismisses the file picker

        [self dismissViewControllerAnimated:YES completion:nil];

    }'
