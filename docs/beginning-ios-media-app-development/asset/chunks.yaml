    for images saved with the system camera |


    In this case, you are most interested in the value at the `UIImagePickerControllerOriginalImage`
    key, so in the delegate method, you want to extract the `UIImage` object. After
    setting the `UIImage` object as the contents of the image view, you can call the
    `dismiss` message on the picker to close it, as shown in [Listing 2-10](#9781430250838_Ch02.xhtml#list10).


