    Creating an Item Selection Interface


    You will now use media queries to build the item selection interface for the MyPod
    app. The goal is to build a class that you can reuse to select songs, albums,
    or other media types. To put this in the context of media queries, you will use
    this class to determine the predicate filter for your query (for example, song
    title.) You will use two media queries for this task: one to generate the list
    of all songs (or albums), and another to pass the final result back to the music
    player.


