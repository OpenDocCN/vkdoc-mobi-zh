  raw: 'Because the objects you are observing were created on-the-fly, in the `[MainViewController
    observeValueForKeyPath:]` method, you will need to check the incoming `object`
    for class type, rather than doing a direct pointer comparison. In Cocoa Touch,
    you can check the type of any object by using the method `[NSObject kindOfClass:]`.
    Compare your incoming object to the `class` property of the target class. In the
    KVO handler method, comparing against the `AVPlayerItem` class would look like
    this:


    ```

     if ([object isKindOfClass:[AVPlayerItem class]])

    ```


    After passing the type comparison, you can query the `status` property of the
    incoming object to see if it is in the `AVPlayerItemStatusFailed` state. As shown
    in [Listing 12-11](#9781430250838_Ch12.xhtml#list11), if the player is an `AVQueuePlayer`,
    log the error and advance to the next item; otherwise, display an alert view.


    [***Listing 12-11***](#9781430250838_Ch12.xhtml#_list11). Key-Value Observer for
    Item State


    ```

    -(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object

        change:(NSDictionary *)change context:(void *)context

    {

        if ((object == self.moviePlayer.player) && [keyPath

            isEqualToString:@"status"] ) {


    UIImage *image = [UIImage imageNamed:@"logo.png"];

            UIImageView *imageView = [[UIImageView alloc]

                initWithImage:image];

            imageView.frame = self.moviePlayer.videoBounds;

            imageView.contentMode = UIViewContentModeBottomRight;

            imageView.autoresizingMask = UIViewAutoresizingFlexibleHeight |

                UIViewAutoresizingFlexibleWidth;


    if ([self.moviePlayer.contentOverlayView.subviews count] == 0) {

                [self.moviePlayer.contentOverlayView addSubview:imageView];

            }


    [object removeObserver:self forKeyPath:@"status"];


    } else if ([object isKindOfClass:[AVPlayerItem class]]) {


    AVPlayerItem *currentItem = (AVPlayerItem *)object;


    if (currentItem.status == AVPlayerItemStatusFailed) {

                NSString *errorString = [currentItem.error description];

                NSLog(@"item failed: %@", errorString);


    if ([self.moviePlayer.player

                    isKindOfClass:[AVQueuePlayer class]]) {

                    AVQueuePlayer *queuePlayer =

                        (AVQueuePlayer *)self.moviePlayer.player;

                    [queuePlayer advanceToNextItem];

                } else {

                    UIAlertView *alert = [[UIAlertView alloc]

                        initWithTitle:@"Error" message:errorString

                        delegate:self cancelButtonTitle:@"OK"

                        otherButtonTitles:nil];

                    [alert show];

                }

            } else {

                [object removeObserver:self forKeyPath:@"status"];

            }

        }

    }

    ```


    What you have seen is just a taste of the playback state events you can handle
    for the `AVPlayer` class. For the complete list, check Apple’s Developer Library
    documentation for the `AVPlayer` class (`https://developer.apple.com/Library/ios/documentation/AVFoundation/Reference/AVPlayer_Class/index.html`).
    Remember, if a notification does not exist for the event you are trying to observe—create
    a key-value observer!


    Adding an Overlay View (Watermark)


    Another added convenience of the `AVPlayerViewController` class is its ability
    to let you add a *content* *overlay view*. Overlay views let you display static
    or live content on top of your video layer, without the hassle of writing complicated
    low-level code to intercept the video layer. For example, if you need to display
    annotations, live status indicators, or even a watermark, content overlay views
    are a quick way to enable such features. One famous example of overlay behavior
    is the YouTube Advertising view, as shown in [Figure 12-10](#9781430250838_Ch12.xhtml#Fig10),
    which allows you to click on a highlighted area to visit an advertiser’s site.


    ![9781430250838_Fig12-10.jpg](images/9781430250838_Fig12-10.jpg)


    [Figure 12-10](#9781430250838_Ch12.xhtml#_Fig10). YouTube Ad functionality


    In this section, you will learn how to add a watermark to your video—a great way
    to add branding to your app. This example uses a static image for the watermark,
    but you can display anything you want in the overlay view—as long as it subclasses
    the `UIView` class.


    **Caution**  Avoid placing highly interactive elements in your content overlay
    view, because they could conflict with the control bar.


    To get started, import an image into your project. If you want your watermark
    to have some transparency, use a PNG image with a transparency layer; otherwise,
    use a JPEG or opaque PNG image file. I prefer to use images that are approximately
    50 pixels in height, so that the image does not distract viewers from the content.
    Try to build in at least 10 pixels of padding on all edges into the image. Create
    a `UIImage` object with this image. In the MyAVPlayer project, the file is named
    l`ogo.png`:


    ```

    UIImage *image = [UIImage imageNamed:@"logo.png"];

    ```


    To display the image on the content overlay view, you need to wrap it in a subclass
    of `UIView`, so initialize a `UIImageView` object with the `UIImage` object you
    just created:


    ```

    UIImageView *imageView = [[UIImageView alloc] initWithImage:image];

    ```


    Remember that the process of creating a `UIView` is not the same as sizing and
    placing it. To imitate a television broadcast, most video applications like to
    place their watermark at the bottom-right or top-right corner of the video. By
    setting the `contentMode` property of the `UIImageView` class to `UIViewContentModeBottomRight`,
    you can instruct the `UIImageView` class to place the image in the bottom-right
    corner, while retaining its original dimensions:


    ```

    imageView.contentMode = UIViewContentModeBottomRight;

    ```


    Similarly, you will want the image to stay in the video playback area. Unfortunately,
    the size of the video player changes with the presentation style of the `AVPlayerViewController`
    (windowed or full-screen). However, you can account for this by setting the size
    of your overlay equal to the *bounding frame* of the video playback area, and
    adding *flexible* width and height resizing masks:


    ```

    imageView.frame = self.moviePlayer.videoBounds;

    imageView.autoresizingMask = UIViewAutoresizingFlexibleHeight |

        UIViewAutoresizingFlexibleWidth;

    ```


    After you have initialized and positioned the `UIImageView`, add it as a subview
    on top of the `contentOverlayView`:


    ```

    [self.moviePlayer.contentOverlayView addSubview:imageView];

    ```


    Now for the most important question, “Where?” As mentioned, one of the requirements
    for placing the `contentOverlayView` on top of the video layer is information
    about the dimensions of the video layer. Unfortunately, this value is not valid
    until the video is loaded. Luckily, this is the same event that you built a key-value
    observer for, to find out when an item was loaded. Create a new `if` block for
    the overlay, as shown in [Listing 12-12](#9781430250838_Ch12.xhtml#list12).


    [***Listing 12-12***](#9781430250838_Ch12.xhtml#_list12). Adding a Watermark to
    Your “Loading Complete” Key-Value Observer


