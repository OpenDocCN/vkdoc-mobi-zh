- fmt: "As mentioned earlier, the `MyVideoPlayer` project relies heavily on the `MyPlayer`\
    \ application for its design and user-interface components, including the file\
    \ picker interface. Throughout this section, you will see code samples taken directly\
    \ from the `MyPod` project. For a more detailed explanation of how they work,\
    \ refer to [Chapter 6](#9781430250838_Ch06.xhtml).\n\nSimilar to the `MyPod` application,\
    \ start out by creating a new project using the Single-View Application template\
    \ in Xcode. Because the `MPMoviePlayerController` class is a part of the `MediaPlayer`\
    \ framework, make sure one of your first steps is to include it in the project.\n\
    \nAs with previous applications, the main view controller is the primary driver\
    \ of the user interface. You can use the header file in [Listing 8-1](#9781430250838_Ch08.xhtml#list1)\
    \ as a guide for adding the required user interface elements. Note that the `MediaPlayer`\
    \ framework is included at the top of the file, because the `MainViewController`\
    \ class instantiates the media player.\n\n[***Listing 8-1***](#9781430250838_Ch08.xhtml#_list1).\
    \ Header File for `MainViewController` Class\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <MediaPlayer/MediaPlayer.h>\n#import \"FileViewController.h\"\n\n@interface\
    \ MainViewController : UIViewController <FileControllerDelegate>\n\n@property\
    \ (nonatomic, strong) IBOutlet UIView *playerView;\n@property (nonatomic, strong)\
    \ MPMoviePlayerController *moviePlayer;\n\n@end\n```\n\nYou may have noticed that\
    \ the code declares the `playerView` property as a `UIView`, instead of a more\
    \ specific class. When you need to implement a video player as a subview, the\
    \ design pattern is to set the video layer subview of another element—similar\
    \ to the custom camera interface you built in [Chapter 4](#9781430250838_Ch04.xhtml).\
    \ Remember to connect every property to its matching element in your storyboard.\n\
    \nYou can use the `FileViewController` class without modifications directly from\
    \ the `MyPod` project for this application. The header and implementation files\
    \ for the class are shown in [Listings 8-2](#9781430250838_Ch08.xhtml#list2) and\
    \ [8-3](#9781430250838_Ch08.xhtml#list3).\n\n[***Listing 8-2***](#9781430250838_Ch08.xhtml#_list2).\
    \ Header File for `FileViewController` Class\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@protocol FileControllerDelegate <NSObject>\n\n-(void)cancel;\n-(void)didFinishWithFile:(NSString\
    \ *)filePath;\n\n@end\n\n@interface FileViewController : UITableViewController\n\
    \n-(id)initWithFileArray:(NSArray *)fileArray;\n\n@property (nonatomic, strong)\
    \ NSMutableArray *fileArray;\n\n@property (nonatomic, strong) id <FileControllerDelegate>\
    \ delegate;\n\n-(IBAction)closeView:(id)sender;\n\n@end\n```\n\n[***Listing 8-3***](#9781430250838_Ch08.xhtml#_list3).\
    \ Implementation File for `FileViewController` Class\n\n```\n#import \"FileViewController.h\"\
    \n\n@implementation FileViewController\n\n-(id)initWithFileArray:(NSArray *)fileArray\n\
    {\n    self = [super init];\n    if (self) {\n        self.fileArray = fileArray;\n\
    \    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \n// Uncomment the following line to preserve selection\n    // between presentations.\n\
    \    // self.clearsSelectionOnViewWillAppear = NO;\n\n// Uncomment the following\
    \ line to display an Edit button in\n    // the navigation bar for this view controller.\n\
    \    // self.navigationItem.rightBarButtonItem = self.editButtonItem;\n}\n\n-\
    \ (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n   \
    \ // Dispose of any resources that can be re-created.\n}\n\n#pragma mark - Table\
    \ view data source\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    // Return the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView\n      numberOfRowsInSection:(NSInteger)section\n{\n    // Return\
    \ the number of rows in the section.\n    return [self.fileArray count];\n}\n\n\
    - (UITableViewCell *)tableView:(UITableView *)tableView\n      cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell =\n        [tableView dequeueReusableCellWithIdentifier:@\"\
    fileCell\"\n         forIndexPath:indexPath];\n\n// Configure the cell...\n\n\
    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];\n\ncell.textLabel.text\
    \ = [filePath lastPathComponent];\n\nreturn cell;\n}\n\n-(void)tableView:(UITableView\
    \ *)tableView\n       didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  \
    \  NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];\n\n[self.delegate\
    \ didFinishWithFile:filePath];\n\n}\n\n-(IBAction)closeView:(id)sender\n{\n  \
    \  [self.delegate cancel];\n}\n\n@end\n```\n\nAs with the `MyPod` project, you\
    \ will need to use a table view controller and a navigation controller to represent\
    \ the file picker on the storyboard. Refer to [Chapter 5](#9781430250838_Ch05.xhtml)\
    \ for a more detailed explanation of this process (remember that the table view\
    \ controller is “embedded” in the navigation controller). Your completed storyboard\
    \ should look like the example in [Figure 8-3](#9781430250838_Ch08.xhtml#Fig3).\n\
    \n![9781430250838_Fig08-03.jpg](images/9781430250838_Fig08-03.jpg)\n\n[Figure\
    \ 8-3](#9781430250838_Ch08.xhtml#_Fig3). Storyboard for the `MyVideoPlayer` application\n\
    \n## Initializing the Video Player\n\nTo use the `MPMoviePlayerController` class\
    \ to play video files, you must first initialize the class. Because you’re using\
    \ the “easy” approach, the `MPMoviePlayerController` class will abstract tasks\
    \ such as grabbing the audio and video playback sessions for you. Your primary\
    \ objectives in initializing the class are to do the following:\n\n- Specify the\
    \ `contentURL` property for the movie player\n- Set the parent view for your movie\
    \ player\n- Register your class to handle `MPMoviePlayerPlaybackStateChanged`\
    \ notifications\n\nWhen integrating the `MPMoviePlayerController` class, the majority\
    \ of your work is related to presentation and message handling. Unlike the media\
    \ APIs you covered for photos and audio, the `MPMoviePlayerController` class uses\
    \ notifications as its primary mechanism for message passing. The class does not\
    \ even define a `delegate` property, meaning you must use notifications to handle\
    \ all events from the media player. Notifications can be a jarring topic for developers\
    \ coming from other ecosystems, but you will find a detailed explanation of how\
    \ they work in the “Getting Started with Notifications” sidebar later in this\
    \ chapter.\n\n### Specifying a Content URL\n\nIn its simplest form, you initialize\
    \ an `MPMoviePlayerController` object by using a single line of code:\n\n```\n\
    [MPMoviePlayerController alloc] initWithContentURL:];\n```\n\nThe `[MPMoviePlayerController\
    \ initWithContentURL:]` method takes an `NSURL` object, which must be either a\
    \ valid URL pointing to a file in your app’s document directory or a video stream.\
    \ The file (or stream) must be in a format that the class accepts. [Table 8-1](#9781430250838_Ch08.xhtml#Tab1)\
    \ lists the file formats that the `MPMoviePlayerController` class supports, along\
    \ with the intended purpose of each format.\n\n[Table 8-1](#9781430250838_Ch08.xhtml#_Tab1).\
    \ Media Formats Supported by the `MPMoviePlayerController` Class\n\n| File Type\
    \ | Extension | Purpose |\n| --- | --- | --- |\n| MPEG-4 video | MP4 | Current\
    \ baseline for video compression, more efficient than AVI and DVD standards (MPEG-2)\
    \ |\n| H.264 video | MOV, MP4 | Apple-driven standard for HD video, more advanced\
    \ than normal MPEG-4 |\n| MPEG-3 audio | MP3 | Industry standard for lossy audio\
    \ compression |\n| AAC audio | M4A | Apple’s format for MPEG-4 compressed audio\
    \ |\n\nWhen the user plays a video file, the output displays in the view indicated\
    \ by your initialization code. When the user plays an audio file, the QuickTime\
    \ logo appears in the view, acting as a placeholder.\n\nNote that this method\
    \ only initializes the object; errors do not occur until you try to play the file.\
    \ Errors are passed back via an `MPMoviePlayerPlaybackState` notification, which\
    \ you will handle along with other notification handlers later in this chapter.\n\
    \n## Using the File Picker as a Data Source"
  raw: 'As mentioned earlier, the MyVideoPlayer project relies heavily on the MyPlayer
    application for its design and user-interface components, including the file picker
    interface. Throughout this section, you will see code samples taken directly from
    the MyPod project. For a more detailed explanation of how they work, refer to
    [Chapter 6](#9781430250838_Ch06.xhtml).


    Similar to the MyPod application, start out by creating a new project using the
    Single-View Application template in Xcode. Because the `MPMoviePlayerController`
    class is a part of the `MediaPlayer` framework, make sure one of your first steps
    is to include it in the project.


    As with previous applications, the main view controller is the primary driver
    of the user interface. You can use the header file in [Listing 8-1](#9781430250838_Ch08.xhtml#list1)
    as a guide for adding the required user interface elements. Note that the `MediaPlayer`
    framework is included at the top of the file, because the `MainViewController`
    class instantiates the media player.


    [***Listing 8-1***](#9781430250838_Ch08.xhtml#_list1). Header File for MainViewController
    Class


    ```

    #import <UIKit/UIKit.h>

    #import <MediaPlayer/MediaPlayer.h>

    #import "FileViewController.h"


    @interface MainViewController : UIViewController <FileControllerDelegate>


    @property (nonatomic, strong) IBOutlet UIView *playerView;

    @property (nonatomic, strong) MPMoviePlayerController *moviePlayer;


    @end

    ```


    You may have noticed that the code declares the `playerView` property as a `UIView`,
    instead of a more specific class. When you need to implement a video player as
    a subview, the design pattern is to set the video layer subview of another element—similar
    to the custom camera interface you built in [Chapter 4](#9781430250838_Ch04.xhtml).
    Remember to connect every property to its matching element in your storyboard.


    You can use the `FileViewController` class without modifications directly from
    the MyPod project for this application. The header and implementation files for
    the class are shown in [Listings 8-2](#9781430250838_Ch08.xhtml#list2) and [8-3](#9781430250838_Ch08.xhtml#list3).


    [***Listing 8-2***](#9781430250838_Ch08.xhtml#_list2). Header File for FileViewController
    Class


    ```

    #import <UIKit/UIKit.h>


    @protocol FileControllerDelegate <NSObject>


    -(void)cancel;

    -(void)didFinishWithFile:(NSString *)filePath;


    @end


    @interface FileViewController : UITableViewController


    -(id)initWithFileArray:(NSArray *)fileArray;


    @property (nonatomic, strong) NSMutableArray *fileArray;


    @property (nonatomic, strong) id <FileControllerDelegate> delegate;


    -(IBAction)closeView:(id)sender;


    @end

    ```


    [***Listing 8-3***](#9781430250838_Ch08.xhtml#_list3). Implementation File for
    FileViewController Class


    ```

    #import "FileViewController.h"


    @implementation FileViewController


    -(id)initWithFileArray:(NSArray *)fileArray

    {

        self = [super init];

        if (self) {

            self.fileArray = fileArray;

        }

        return self;

    }


    - (void)viewDidLoad

    {

        [super viewDidLoad];


    // Uncomment the following line to preserve selection

        // between presentations.

        // self.clearsSelectionOnViewWillAppear = NO;


    // Uncomment the following line to display an Edit button in

        // the navigation bar for this view controller.

        // self.navigationItem.rightBarButtonItem = self.editButtonItem;

    }


    - (void)didReceiveMemoryWarning

    {

        [super didReceiveMemoryWarning];

        // Dispose of any resources that can be re-created.

    }


    #pragma mark - Table view data source


    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    {

        // Return the number of sections.

        return 1;

    }


    - (NSInteger)tableView:(UITableView *)tableView

          numberOfRowsInSection:(NSInteger)section

    {

        // Return the number of rows in the section.

        return [self.fileArray count];

    }


    - (UITableViewCell *)tableView:(UITableView *)tableView

          cellForRowAtIndexPath:(NSIndexPath *)indexPath

    {

        UITableViewCell *cell =

            [tableView dequeueReusableCellWithIdentifier:@"fileCell"

             forIndexPath:indexPath];


    // Configure the cell...


    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];


    cell.textLabel.text = [filePath lastPathComponent];


    return cell;

    }


    -(void)tableView:(UITableView *)tableView

           didSelectRowAtIndexPath:(NSIndexPath *)indexPath

    {

        NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];


    [self.delegate didFinishWithFile:filePath];


    }


    -(IBAction)closeView:(id)sender

    {

        [self.delegate cancel];

    }


    @end

    ```


    As with the MyPod project, you will need to use a table view controller and a
    navigation controller to represent the file picker on the storyboard. Refer to
    [Chapter 5](#9781430250838_Ch05.xhtml) for a more detailed explanation of this
    process (remember that the table view controller is “embedded” in the navigation
    controller). Your completed storyboard should look like the example in [Figure
    8-3](#9781430250838_Ch08.xhtml#Fig3).


    ![9781430250838_Fig08-03.jpg](images/9781430250838_Fig08-03.jpg)


    [Figure 8-3](#9781430250838_Ch08.xhtml#_Fig3). Storyboard for the MyVideoPlayer
    application


    Initializing the Video Player


    To use the `MPMoviePlayerController` class to play video files, you must first
    initialize the class. Because you’re using the “easy” approach, the `MPMoviePlayerController`
    class will abstract tasks such as grabbing the audio and video playback sessions
    for you. Your primary objectives in initializing the class are to do the following:


    *   Specify the `contentURL` property for the movie player

    *   Set the parent view for your movie player

    *   Register your class to handle `MPMoviePlayerPlaybackStateChanged` notifications


    When integrating the `MPMoviePlayerController` class, the majority of your work
    is related to presentation and message handling. Unlike the media APIs you covered
    for photos and audio, the `MPMovieplayerController` class uses notifications as
    its primary mechanism for message passing. The class does not even define a `delegate`
    property, meaning you must use notifications to handle all events from the media
    player. Notifications can be a jarring topic for developers coming from other
    ecosystems, but you will find a detailed explanation of how they work in the “Getting
    Started with Notifications” sidebar later in this chapter.


    Specifying a Content URL


    In its simplest form, you initialize an `MPMoviePlayerController` object by using
    a single line of code:


    ```

    [MPMoviePlayerController alloc] initWithContentURL:];

    ```


    The `[MPMoviePlayerController initWithContentURL:]` method takes an `NSURL` object,
    which must be either a valid URL pointing to a file in your app’s document directory
    or a video stream. The file (or stream) must be in a format that the class accepts.
    [Table 8-1](#9781430250838_Ch08.xhtml#Tab1) lists the file formats that the `MPMoviePlayerController`
    class supports, along with the intended purpose of each format.


    [Table 8-1](#9781430250838_Ch08.xhtml#_Tab1). Media Formats Supported by the MPMoviePlayerController
    Class


    | File Type | Extension | Purpose |

    | --- | --- | --- |

    | MPEG-4 video | MP4 | Current baseline for video compression, more efficient
    than AVI and DVD standards (MPEG-2) |

    | H.264 video | MOV, MP4 | Apple-driven standard for HD video, more advanced than
    normal MPEG-4 |

    | MPEG-3 audio | MP3 | Industry standard for lossy audio compression |

    | AAC audio | M4A | Apple’s format for MPEG-4 compressed audio |


    When the user plays a video file, the output displays in the view indicated by
    your initialization code. When the user plays an audio file, the QuickTime logo
    appears in the view, acting as a placeholder.


    Note that this method only initializes the object; errors do not occur until you
    try to play the file. Errors are passed back via an `MPMoviePlayerPlaybackState`
    notification, which you will handle along with other notification handlers later
    in this chapter.


    Using the File Picker as a Data Source'
  trans: "\n如前所述，`MyVideoPlayer` 项目在设计及用户界面组件（包括文件选择器界面）上大量依赖于 `MyPlayer` 应用。在本节中，你将看到直接取自\
    \ `MyPod` 项目的代码示例。关于这些代码运行机制的更详细说明，请参阅第 6 章。\n\n与 `MyPod` 应用类似，首先在 Xcode 中使用“单视图应用程序”模板创建一个新项目。由于\
    \ `MPMoviePlayerController` 类是 `MediaPlayer` 框架的一部分，请务必先将该框架包含到项目中。\n\n与之前的应用一样，主视图控制器是用户界面的主要驱动者。你可以使用代码清单\
    \ 8-1 中的头文件作为添加所需用户界面元素的指南。请注意，`MediaPlayer` 框架包含在文件顶部，因为 `MainViewController`\
    \ 类会实例化媒体播放器。\n\n***代码清单 8-1*** `MainViewController` 类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <MediaPlayer/MediaPlayer.h>\n#import \"FileViewController.h\"\n\n@interface\
    \ MainViewController : UIViewController <FileControllerDelegate>\n\n@property\
    \ (nonatomic, strong) IBOutlet UIView *playerView;\n@property (nonatomic, strong)\
    \ MPMoviePlayerController *moviePlayer;\n\n@end\n```\n\n你可能已经注意到，代码将 `playerView`\
    \ 属性声明为 `UIView` 类型，而非更具体的类。当你需要将视频播放器实现为子视图时，设计模式是将另一个元素的视频层子视图进行设置——类似于你在第 4\
    \ 章中构建的自定义相机界面。记得将每个属性连接到故事板中对应的元素。\n\n对于此应用，你可以直接使用 `MyPod` 项目中的 `FileViewController`\
    \ 类而无需修改。该类的头文件和实现文件如代码清单 8-2 和 8-3 所示。\n\n***代码清单 8-2*** `FileViewController`\
    \ 类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\n@protocol FileControllerDelegate <NSObject>\n\
    \n-(void)cancel;\n-(void)didFinishWithFile:(NSString *)filePath;\n\n@end\n\n@interface\
    \ FileViewController : UITableViewController\n\n-(id)initWithFileArray:(NSArray\
    \ *)fileArray;\n\n@property (nonatomic, strong) NSMutableArray *fileArray;\n\n\
    @property (nonatomic, strong) id <FileControllerDelegate> delegate;\n\n-(IBAction)closeView:(id)sender;\n\
    \n@end\n```\n\n***代码清单 8-3*** `FileViewController` 类的实现文件\n\n```\n#import \"FileViewController.h\"\
    \n\n@implementation FileViewController\n\n-(id)initWithFileArray:(NSArray *)fileArray\n\
    {\n    self = [super init];\n    if (self) {\n        self.fileArray = fileArray;\n\
    \    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \n// 取消注释以下行以保持选择\n    // 在视图切换间的状态。\n    // self.clearsSelectionOnViewWillAppear\
    \ = NO;\n\n// 取消注释以下行以在此视图控制器的\n    // 导航栏中显示编辑按钮。\n    // self.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n}\n\n- (void)didReceiveMemoryWarning\n{\n    [super\
    \ didReceiveMemoryWarning];\n    // 处理任何可以重新创建的资源。\n}\n\n#pragma mark - 表视图数据源\n\
    \n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    //\
    \ 返回分区数量。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\n\
    \      numberOfRowsInSection:(NSInteger)section\n{\n    // 返回分区中的行数。\n    return\
    \ [self.fileArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
    \      cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
    \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:@\"fileCell\"\n\
    \         forIndexPath:indexPath];\n\n// 配置单元格...\n\nNSString *filePath = [self.fileArray\
    \ objectAtIndex:indexPath.row];\n\ncell.textLabel.text = [filePath lastPathComponent];\n\
    \nreturn cell;\n}\n\n-(void)tableView:(UITableView *)tableView\n       didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];\n\
    \n[self.delegate didFinishWithFile:filePath];\n\n}\n\n-(IBAction)closeView:(id)sender\n\
    {\n    [self.delegate cancel];\n}\n\n@end\n```\n\n与 `MyPod` 项目类似，你需要在故事板中使用一个表视图控制器和一个导航控制器来表示文件选择器。关于此过程的更详细说明，请参阅第\
    \ 5 章（请记住，表视图控制器是“嵌入”在导航控制器中的）。完成后的故事板应类似于图 8-3 中的示例。\n\n![9781430250838_Fig08-03.jpg](img/9781430250838_Fig08-03.jpg)\n\
    \n图 8-3 `MyVideoPlayer` 应用的故事板\n\n## 初始化视频播放器\n\n要使用 `MPMoviePlayerController`\
    \ 类播放视频文件，必须首先初始化该类。因为你采用的是“简单”方法，`MPMoviePlayerController` 类会为你抽象处理诸如获取音频和视频播放会话等任务。初始化该类的主要目标如下：\n\
    \n- 为影片播放器指定 `contentURL` 属性\n- 设置影片播放器的父视图\n- 注册你的类以处理 `MPMoviePlayerPlaybackStateChanged`\
    \ 通知\n\n在集成 `MPMoviePlayerController` 类时，大部分工作与呈现和消息处理相关。与你所了解的用于照片和音频的媒体 API\
    \ 不同，`MPMoviePlayerController` 类使用通知作为其消息传递的主要机制。该类甚至没有定义 `delegate` 属性，这意味着你必须使用通知来处理来自媒体播放器的所有事件。对于来自其他生态系统的开发者来说，通知可能是一个令人困惑的话题，但你将在本章后面的“通知入门”边栏中找到关于其工作原理的详细说明。\n\
    \n### 指定内容 URL\n\n在其最简单的形式中，你可以通过一行代码初始化 `MPMoviePlayerController` 对象：\n\n```\n\
    [MPMoviePlayerController alloc] initWithContentURL:];\n```\n\n`[MPMoviePlayerController\
    \ initWithContentURL:]` 方法接受一个 `NSURL` 对象，该对象必须是指向应用文档目录中文件的有效 URL，或者是一个视频流。该文件（或视频流）的格式必须是该类所支持的。表\
    \ 8-1 列出了 `MPMoviePlayerController` 类支持的文件格式以及每种格式的预期用途。\n\n表 8-1 `MPMoviePlayerController`\
    \ 类支持的媒体格式\n\n| 文件类型 | 扩展名 | 用途 |\n| --- | --- | --- |\n| MPEG-4 视频 | MP4 | 视频压缩的当前基线，比\
    \ AVI 和 DVD 标准（MPEG-2）效率更高 |\n| H.264 视频 | MOV, MP4 | 苹果主导的高清视频标准，比普通 MPEG-4 更先进\
    \ |\n| MPEG-3 音频 | MP3 | 有损音频压缩的行业标准 |\n| AAC 音频 | M4A | 苹果用于 MPEG-4 压缩音频的格式 |\n\
    \n当用户播放视频文件时，输出会显示在你的初始化代码所指定的视图中。当用户播放音频文件时，视图中会出现 QuickTime 标志作为占位符。\n\n请注意，此方法仅初始化对象；错误不会发生，直到你尝试播放该文件。错误会通过\
    \ `MPMoviePlayerPlaybackState` 通知传递回来，你将在本章后面与其他通知处理程序一起处理该通知。\n\n## 使用文件选择器作为数据源\n"
- fmt: 'To use the file picker with the `MyVideoPlayer` project, you need to modify
    the segue handler, `[self prepareForSegueWithIdentifier:]`. Rather than initializing
    the file picker with iPod media as before, this time you want to populate it with
    files supported by the `MediaPlayer` framework. As with the `MyPlayer` application
    from [Chapter 5](#9781430250838_Ch05.xhtml), you can generate this list by searching
    for files in your app’s documents directory whose file extensions match the supported
    file formats. After the input array is ready, you can present the file picker.
    This logic would go in the segue handler for the main view controller, as shown
    in [Listing 8-4](#9781430250838_Ch08.xhtml#list4).


    [***Listing 8-4***](#9781430250838_Ch08.xhtml#_list4). Segue Handler for Populating
    and Presenting the File Picker


    ```

    -(void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender

    {

        if ([segue.identifier isEqualToString:@"showFilePicker"]) {

            NSMutableArray *videoArray = [NSMutableArray new];


    NSArray *paths =

                NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                NSUserDomainMask, YES);

            NSString *documentsDirectory = [paths objectAtIndex:0];

            NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

                contentsOfDirectoryAtPath:documentsDirectory error:&error];


    if (error == nil) {


    for (NSString *file in allFiles) {

                    if ([[file pathExtension] isEqualToString:@"m4v"] ||

                        [[file pathExtension] isEqualToString:@"mov"]) {

                        [videoArray addObject:file];

                    }

                }


    } else {

                NSLog(@"error looking up files: %@", [error description]);

            }


    UINavigationController *navigationController =

                 (UINavigationController *)segue.destinationViewController;

            FileViewController *fileVC =

                 (FileViewController *)navigationController.topViewController;

            fileVC.delegate = self;

            fileVC.fileArray = videoArray;

        }

    }

    ```


    You should display the file name for each cell, so use that to populate the input
    array.


    Likewise, remember to specify that you will be implementing the `FileControllerDelegate`
    protocol in your main view controller’s header file:


    ```

    @interface MainViewController : UIViewController

        <FileControllerDelegate>

    ```


    The `FileControllerDelegate` protocol specifies a method that returns a file path
    when the user has picked a file. You can use this to initialize the `MPMoviePlayerController`
    object in the `MainViewController` class. In your main view controller’s `[FileControllerDelegate
    didFinishWithItem:]` delegate method, convert the `filePath` string to an `NSURL`
    object and use it to initialize your class’s `mediaPlayer` object. As with previous
    applications, your media player should be an instance variable, because many methods
    will access it. You can find an example in [Listing 8-5](#9781430250838_Ch08.xhtml#list5).


    [***Listing 8-5***](#9781430250838_Ch08.xhtml#_list5). Initializing the Video
    Player after the User Has Selected an Item


    ```

    -(void)didFinishWithFile:(NSString *)filePath

    {

        NSURL *fileURL = [NSURL URLWithString:filePath];

        self.moviePlayer = [[MPMoviePlayerController alloc]

            initWithContentURL:fileURL];


    //Dismisses the file picker

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ### Specifying a Parent View for the Media Player


    Although your video player object has been allocated in memory, you still need
    to specify a parent view to display it on your app. This process is similar to
    the way you added a video layer to a view when you created the custom camera app
    in Chapter 4—give your player the same bounding frame as its parent view and then
    add it as a subview.


    As with all `UIView` objects, you need to specify the view dimensions and its
    position. The `frame` attribute is a `CGRect` data structure that contains the
    dimensions of a view and its (x,y) position relative to the top left of the screen.
    With all views, a second attribute, `bounds`, specifies the visible area of a
    view (its *bounding* frame). The `bounds` attribute’s (x,y) position is relative
    to the origin of the *frame*, not to the origin of the screen. By default, the
    `bounds` attribute is set to the top-left position of the target view, but you
    can change it if you are trying to reposition or clip a subview.


    The goal for this app is to make the movie player fill the visible area of the
    `playerView`. Therefore, the `frame` for the `MPMoviePlayerController`’s `view`
    needs to match the dimensions of the `playerView` and have a relative position.
    The `bounds` attribute is the perfect solution for this problem:


    ```

    self.moviePlayer.view.frame = self.playerView.bounds;

    ```


    After setting the `frame` for the `MPMoviePlayerController` object, add its `view`
    as a subview on top of the `playerView`, which will make it a visible property:


    ```

    [self.playerView addSubview:self.moviePlayer.view];

    ```


    Now you will be at your final solution, as shown in [Listing 8-6](#9781430250838_Ch08.xhtml#list6).


    [***Listing 8-6***](#9781430250838_Ch08.xhtml#_list6). Adding View Positioning
    to Your Initialization Code


    ```

    -(void)didFinishWithFile:(NSString *)filePath

    {

        NSURL *fileURL = [NSURL URLWithString:filePath];

        self.moviePlayer = [[MPMoviePlayerController alloc]

            initWithContentURL:fileURL];


    self.moviePlayer.view.frame = self.playerView.bounds;

        [self.playerView addSubview:self.moviePlayer.view];


    //Dismisses the file picker

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    **Note** If you want a movie player that operates only in full-screen mode, use
    the `MPMediaPlayerViewController` class. The initialization path and notifications
    are the same as for the `MPMediaPlayerController`; the major operational difference
    is that the object is released when the view is dismissed.


    ### Adding Notification Handling to Your Class


    As the final step in initializing the media player, you need to register the `MainViewController`
    as a receiver of `MPMoviePlaybackStateDidChangeNotification` notifications. The
    `MPMoviePlayerController` class is completely dependent on notifications for its
    message passing, unlike the audio player and camera classes you used earlier,
    which use delegates. You can find a more detailed explanation of how to use notifications
    in the following sidebar, but here’s the quick summary: to handle notifications,
    you need to explicitly state which notifications your class will handle, and tie
    those to handler methods.


    #### Getting Started with Notifications


    In any programming language, *message passing* is how you send information between
    processes. Calling a method on an instance of a class is one of the simplest forms
    of message passing: you are letting the receiver (the object) know what message
    (method) to perform, and with what data (parameters).


    It is not always convenient or wise to send a message to another class directly.
    For a very generic class, you do not want to include the header files of every
    other class that could call one of its methods. Similarly, you do not want to
    include everything required to call a message on a fairly complicated class.


    To solve this problem, Cocoa Touch provides three specialized ways of performing
    generic message passing between classes:


    - Protocols

    - Notifications

    - Key-value observing'
