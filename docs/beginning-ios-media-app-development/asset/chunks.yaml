    \n图 3-3. ImageTransformations 项目\n\n## 保存图像\n\n为了充分利用您的照片，包括您在应用中处理过的那些照片，您通常需要能够将它们保存到磁盘或照片库。除非用户使用的应用声明会在一段时间后删除所有图像（例如\
