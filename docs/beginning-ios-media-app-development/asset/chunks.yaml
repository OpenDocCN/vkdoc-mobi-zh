    \n## 构建播放界面\n\n创建好媒体查询后，你现在可以开始构建播放界面了。`MPMediaPlayerController`类实现了`MPMediaPlayback`协议，这允许你复用许多用于播放声音文件的播放消息。\n\
    \n要使用`MPMediaPlayerController`类开始播放，请使用`[MPMediaPlayerController play]`方法，该方法的工作方式与其`AVAudioPlayer`对应方法完全相同，即开始（或恢复）播放媒体队列最前端的项目。要暂停播放，请使用`[MPMediaPlayerController\
    \ pause]`方法，该方法会暂停当前正在播放的项目。暂停后再次播放，会从暂停的位置恢复播放。在 MyPod 项目中，播放由一个按钮控制，就像上一章中简单的音频文件播放器一样。该按钮的处理器在\
