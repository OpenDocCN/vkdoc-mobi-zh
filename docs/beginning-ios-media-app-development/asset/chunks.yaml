    \ isDistanceAvailable]` 和 `[CMPedometer isFloorCountingAvailable]` 公共方法。\n\n##\
    \ 开始锻炼\n\n在确定你的应用程序拥有一个有效的计步器后，你现在可以开始实现开始锻炼所需的代码了。图 13-8 展示了图 13-1 的一个子集，突出了应用程序的开始过渡状态。\n\
    \n![9781430250838_Fig13-08.jpg](img/9781430250838_Fig13-08.jpg)\n\n图 13-8. 开始锻炼屏幕的模拟图\n\
    \n当用户点击“开始锻炼”按钮时，你希望开始播放音乐，将按钮文本更改为“停止锻炼”，并开始显示实时反馈以指示用户的锻炼进度。如代码清单 13-4 所示，播放音乐和更新用户界面很简单：只需调用你已经定义好的方法即可。然而，获取计步器进度更新则稍微复杂一些。\n\
    \n### 13-4. 开始锻炼时更新用户界面\n\n```\n-(IBAction)toggleWorkout:(id)sender\n{\n    if\
    \ (self.isWorkoutActive) {\n        //停止锻炼\n\n} else {\n        //开始锻炼\n\nif ([CMMotionActivityManager\
    \ isActivityAvailable] &&\n            [CMPedometer isStepCountingAvailable])\
    \ {\n            self.pedometer = [[CMPedometer alloc] init];\n            self.isWorkoutActive\
    \ = YES;\n            self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
    \ = @\"0 步\";\n            self.workoutButton.titleLabel.text = @\"停止锻炼\";\n \
    \       } else {\n            UIAlertView *errorAlert = [[UIAlertView alloc]\n\
    \                initWithTitle:@\"错误\"\n                message:@\"需要运动权限\"\n\
    \                delegate:self\n                cancelButtonTitle:@\"确定\"\n  \
    \              otherButtonTitles:nil];\n            [errorAlert show];\n     \
    \   }\n    }\n\n}\n```\n\n对于计步器数据更新，Apple 定义了两种模型：一种是基于推送的模型，在此模型下应用程序会持续（每 2.5\
    \ 秒）接收来自硬件的可用数据；另一种是基于拉取的模型，在此模型下应用程序在需要时请求数据。MyFitnessPod 项目的模拟图表明，应用程序应在数据可用时显示更新，因此你应该使用推送模型作为应用程序更新的主要驱动方式。\n\
    \n**警告：** 基于推送的交付模型是一种软件设计模式，而*推送通知*则是一个非常具体的 iOS 功能（通知被“推送”到你的设备）。在与其它开发者交流时，请务必不要混淆这两者。\n\
    \n要接收推送更新，请在你的 `CMPedometer` 对象上调用 `[CMPedometer startPedometerUpdatesFromDate:withHandler]`\
    \ 方法。从方法签名可以看出，输入参数是一个接收更新的完成处理程序，以及一个作为计步器更新基准的开始时间。Core Motion 将传输自该开始时间以来发生的更新事件。对于\
    \ MyFitnessPod 应用程序，开始时间就是用户按下“开始锻炼”按钮的时间。在编程上，你可以通过使用 `[NSDate date]` 方法简单地获取*当前时间*来实现这一点。代码清单\
    \ 13-5 提供了 MyFitnessPod 项目的 `[CMPedometer startPedometerUpdatesFromDate:withHandler]`\
    \ 调用。\n\n### 13-5. 为计步器更新设置 `MainViewController` 类\n\n```\n-(IBAction)toggleWorkout:(id)sender\n\
