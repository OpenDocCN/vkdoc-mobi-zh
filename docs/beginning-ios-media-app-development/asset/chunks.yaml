    Saving Images to the Photo Library


    For many photo-based apps, you will want to be able to give other apps access
    to images that were created or manipulated within your app. In this case, it would
    be more appropriate to save the images directly to the system’s photo library.
    To facilitate this, Apple provides a convenience method, `UIImageWriteToSavedPhotosAlbum()`,
    which allows you to save a `UIImage` object directly to the Camera Roll photo
    album.


    To use the `UIImageWriteToSavedPhotosAlbum()` method, you need pass the `UIImage`
    object you want to save and, optionally, a completion handler that will execute
    when the operation has finished. You can use your completion handler to determine
    whether the save was successful and to perform a subsequent action, such as displaying
    a `UIAlertView`:


