    ## Using the AVPlayer Class to Play a Media File


    Just as with the `MPMediaPlayerController` class, to initialize an `AVPlayerViewController`
    object, you need to provide it with a media file or content URL to use as an input.
    The `AVPlayer` class handles the playback functions of the `AVPlayerViewController`
    class. The `AVPlayer` class uses `AVPlayerItem` objects, a subclass of `AVAsset`,
    to represent media items. Unlike an `MPMediaItem` object, an `AVAsset` can represent
    media files in *container* formats, can include multiple subtitle and audio tracks,
    and can represent `AVComposition` objects—special objects that add time-based
    effects such as filters and transitions to assets.


    You initialize an `AVPlayer` object with a single media file by using the `[AVPlayer
    playerWithURL:]` method. Doing so automatically converts your content URL to an
    `AVPlayerItem` object. As with the MyVideoPlayer application, you should initialize
    your `AVPlayer` after the user has selected a file from the file picker. Place
    your initialization code in the handler method for the `FileControllerDelegate`
    protocol, `[FileControllerDelegate didFinishWithFile:]`, as shown in [Listing
    12-2](#9781430250838_Ch12.xhtml#list2). This will replace your previous `MPMoviePlayerController`
    initialization code.


    **Listing 12-2.** Loading a Media File into an AVPlayer Object'
  raw: 'Similarly, from the audio chapters ([Chapters 5](#9781430250838_Ch05.xhtml)–[7](#9781430250838_Ch07.xhtml)),
    you may remember that `AVFoundation` allowed you to control playback—as long as
    you built your own playback interface. The `AVKit` framework tries to bridge this
    gap by providing a playback interface that operates on `AVAssetItem` objects (the
    class `AVFoundation` uses to represent media). Thus it can perform more-advanced
    operations with less “glue” code. This makes it easier for you to work with media
    files and even lets you perform video effects on-the-fly—such as adding watermarks
    or color filters.


    In this chapter, you will see how to take advantage of the `AVKit` framework by
    modifying the MyVideoPlayer video player application from [Chapter 9](#9781430250838_Ch09.xhtml)
    to use the `AVPlayerController` class for media playback. Additionally, you will
    learn about `AVKit`’s tighter integration with the `AVFoundation` framework by
    using the `AVQueuePlayer` class to effortlessly load a playlist into your video
    player. Finally, to add that last little bit of flair, you will see how to add
    a watermark to your player—a convenient way of adding branding to your video playback
    interface.


    At this point, you may be wondering whether the `MediaPlayer` framework will be
    around and whether your knowledge will stay relevant for the next few years. The
    answer is yes, absolutely! The `AVPlayerViewController` class is meant to mimic
    the `MPMoviePlayerController` class in its functionality and message passing,
    so the `MediaPlayer` framework knowledge you have will reduce any speed bumps
    in debugging and implementing `AVKit`-based applications. Additionally, despite
    the introduction of the `AVKit` framework, Apple announced that the `MediaPlayer`
    framework is *not* being deprecated. For the next few releases at least, you can
    expect `MediaPlayer`-based apps to work just as they always have.


    While Apple is not deprecating the `MediaPlayer` framework, their general trend
    with competing APIs is to shift active development to the newer one; getting started
    early will help you stand out from the crowd.


    **Caution**  You need to upgrade your development tools to Xcode 6 and the iOS
    8 SDK before attempting to implement the project in this chapter. The `AVKit`
    framework is not available in SDK versions prior to iOS 8.


