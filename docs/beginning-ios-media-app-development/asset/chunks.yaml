    \        }\n}];\n```\n\nBlock 较为危险的一个方面是它的变量作用域与普通方法不同。你可以在 block 内创建局部变量，也可以访问\
    \ block 外部的实例变量。然而，默认情况下，block 中的所有外部变量都是*通过拷贝*传递的，这意味着你可以读取它们的内容，但不能修改它们。要声明一个可以被\
    \ block 修改的局部变量或实例变量，你需要在它的类型前添加 `__block` 关键字：\n\n`__block NSInteger photoCount;`\n\
    \n对于实例变量，使用类似的模式，在属性关键字之后、类型之前添加 `__block` 关键字：\n\n`@property (nonatomic, assign)\
    \ __block NSInteger photoCount;`\n\n使用 block 就像开一辆没有刹车的法拉利。你可以开得极快，但需要意识到你的局限性以及如何规避它们。\n\
    \n## 使用 UICollectionView 类来枚举资源\n\n如果你构建了上一节中的示例，那么现在你已经有一个数组，其中包含与“存储的照片”和“我的照片流”图库中的照片相对应的一组资源。此时，你可以构建一个集合视图用户界面来展示这些项目。\n\
    \n*集合视图* 在 iOS 6 中引入，指的是你可能在 iBooks 应用和旧版照片应用中熟悉的基于图形的导航界面（参见图 4-5）。在集合视图中，项目通常由图形表示（如专辑封面或书籍封面），并从左到右、从上到下排列。与表视图非常相似，你需要为视图定义数据源，指定每个项目（称为*单元格*）的外观，并定义用户与项目交互时应发生的行为。与表视图不同，你无需指定每列或每行有多少个项目；`UICollectionView`\
    \ 类会根据单元格大小和容器视图大小自动将项目适配到网格中。这使得传入线性数据集变得容易。同样，你可以像处理表视图那样，将数据分组到分区中。\n\n![9781430250838_Fig04-05.jpg](img/9781430250838_Fig04-05.jpg)\n\
    \n图 4-5. iBooks 中集合视图的截图\n\n要向应用程序添加集合视图，请从 Interface Builder 的对象库中拖拽一个“集合视图控制器”（Collection\
    \ View Controller）。确保你实例化了自己的 `UICollectionViewController` 子类，以便将数据源连接到视图，并实现你自己的操作处理程序。如果你正在实现\
    \ iPad 界面，请记得也在 iPad 故事板中复制这些设置。你可以在图 4-6 中找到故事板的截图。\n\n![9781430250838_Fig04-06.jpg](img/9781430250838_Fig04-06.jpg)\n\
    \n图 4-6. 在 Interface Builder 中添加集合视图\n"
- fmt: "# 排版后内容\n\nThe easiest way to think of a `UICollectionView` is as a more advanced\
    \ `UITableView`. Like a table view, a collection view needs to be initialized\
    \ with an array of data, and each item is represented by a cell. For the MyPicker\
    \ project, you will want each cell to contain an image and a check box representing\
    \ its state.\n\nThe default Interface Builder template for a `UICollectionView`\
    \ comes with an empty `UICollectionViewCell`. In order to make it display two\
    \ images (one for the contents and one for the check box), you need to follow\
    \ these steps:\n\n1.  Create a new subclass of `UICollectionViewCell`. Set this\
    \ as the parent class for your cell (use the Interface Builder attributes inspector\
    \ for this).\n2.  Give the cell a new reuse identifier (use the Interface Builder\
    \ attributes inspector for this).\n3.  Add two `UIImage` properties to the cell\
    \ to represent the image and check box. Tie these to your class by using Xcode.\n\
    \nWhen working with a `UICollectionViewCell`, make sure you have the cell selected\
    \ in Interface Builder; otherwise, you will have trouble modifying it. As shown\
    \ in [Figure 4-7](#9781430250838_Ch04.xhtml#Fig7), you can easily select items\
    \ by using the Scene Navigator in Interface Builder (the left pane).\n\n![9781430250838_Fig04-07.jpg](images/9781430250838_Fig04-07.jpg)\n\
    \n[Figure 4-7](#9781430250838_Ch04.xhtml#_Fig7). Setting a reuse identifier in\
    \ Interface Builder\n\n**Note** If you are having trouble setting your reuse identifier,\
    \ make sure you have selected the `UICollectionViewCell`, not one of its subviews.\n\
    \nMuch as with a `UITableView`, you need to implement a series of delegate methods\
    \ to fully realize the collection view. The first step is to let the collection\
    \ view know how many sections the data source has, and how many rows you want\
    \ in each section. You define the number of sections by implementing the `[UICollectionViewDataSource\
    \ numberOfSectionsInCollectionView]` protocol method. In this method, the return\
    \ type is an integer that specifies the number of sections. This simple example\
    \ loads assets from a one-dimensional array, so you can return 1 as the number\
    \ of sections, as shown in [Listing 4-26](#9781430250838_Ch04.xhtml#list26).\n\
    \n[***Listing 4-26***](#9781430250838_Ch04.xhtml#_list26). Initializing Collection\
    \ View Section Count\n\n```\n- (NSInteger)numberOfSectionsInCollectionView:(UICollectionView\
    \ *)collectionView\n{\n    return 1;\n}\n```\n\nThe real configuration work happens\
    \ in defining the number of rows for each section. For this example, the number\
    \ of rows is equal to the number of items in the array, so you can simply return\
    \ the `count` property. You implement this in the delegate method, `[UICollectionView\
    \ numberOfItemsInSection:]`, which takes the section number as input and returns\
    \ the row count, as shown in [Listing 4-27](#9781430250838_Ch04.xhtml#list27).\n\
    \n[***Listing 4-27***](#9781430250838_Ch04.xhtml#_list27). Initializing Collection\
    \ View Row Count\n\n```\n- (NSInteger)collectionView:(UICollectionView *)view\
    \ numberOfItemsInSection:(NSInteger)section;\n{\n    return [self.images count];\n\
    }\n```\n\nYou may run into timing issues, depending on where you initialize your\
    \ input array. For example, if you make your Asset Library calls from the `[UIViewController\
    \ viewDidLoad]` method, you will notice that the `[UICollectionView numberOfItemsInSection:]`\
    \ method initializes the collection view with a count of 0, even if you have found\
    \ several items. This is due to the asynchronous nature of block programming.\
    \ Because the lookup code runs in the background, there is nothing preventing\
    \ the system from executing the collection view initialization code immediately\
    \ against the still-empty array.\n\nWhile this may seem like a pretty big bug,\
    \ it’s nothing to worry about, because there’s an API that lets you refresh the\
    \ collection view’s data source at any time. This API is `[UICollectionView reloadData]`.\
    \ It immediately calls the `[UICollectionView numberOfSections]` and `[UICollectionView\
    \ numberOfItemsInSection:]` methods again, which then return accurate initialization\
    \ values. All you need to do is call that method when you are confident the array\
    \ has been fully populated. The sample application calls it when it has finished\
    \ iterating through all the groups. The refresh code block is illustrated in [Listing\
    \ 4-28](#9781430250838_Ch04.xhtml#list28).\n\n[***Listing 4-28***](#9781430250838_Ch04.xhtml#_list28).\
    \ Refreshing the Collection View\n\n```\n[self.assetsLibrary enumerateGroupsWithTypes:photoFilters\n\
    \    usingBlock:^(ALAssetsGroup *group, BOOL *stop) {\n    [group enumerateAssetsUsingBlock:^(ALAsset\
    \ *result, NSUInteger\n                                       index, BOOL *stop)\
    \ {\n    if (result != nil) {\n        [self.images addObject:result];\n    }\n\
    }];\n\n[self.collectionView reloadData];\n} failureBlock:^(NSError *error) {\n\
    \    NSLog(@\"error! %@\", [error description]);\n}];\n```\n\nNow that you can\
    \ be confident about the data source, you need to make sure each `UICollectionViewCell`\
    \ is initialized with information from the assets. You initialize the cells using\
    \ the `[UICollectionView cellForItemAtIndexPath:]` method, where the inputs are\
    \ the collection view and the `NSIndexPath` value for each item. Following the\
    \ pattern of initializing table view cells, the first step is to retrieve a cell\
    \ to work on, which you do with the `[UICollectionView dequeueReusableCellWithReuseIdentifier:forIndexPath:]`\
    \ method. Pass in the `indexPath` and the reuse identifier you defined in Interface\
    \ Builder. To access the image view for the custom cells, make sure to cast the\
    \ object after retrieving it. You can find the basic initialization code in [Listing\
    \ 4-29](#9781430250838_Ch04.xhtml#list29).\n\n[***Listing 4-29***](#9781430250838_Ch04.xhtml#_list29).\
    \ Initializing a Collection View Cell\n\n```\n- (UICollectionViewCell *)collectionView:(\n\
    \       UICollectionView *)collectionView\n           cellForItemAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    PickerCell *cell = (PickerCell *)[collectionView\n     \
    \   dequeueReusableCellWithReuseIdentifier:@\"PickerCell\"\n           forIndexPath:indexPath];\n\
    \nreturn cell;\n}\n```\n\nHaving retrieved the cell, you now need to retrieve\
    \ the asset that goes with it. Because the data source is a one-dimensional array,\
    \ you know that the row numbers will line up exactly with the index of each item\
    \ in the array. Therefore, to retrieve each asset, all you need to do is call\
    \ `[NSArray objectAtIndex:]` with the `row` property of the `indexPath`. If the\
    \ data source were a multidimensional array, you could pass in the section number\
    \ as well.\n\n```\nALAsset *asset = [self.images objectAtIndex:indexPath.row];\n\
    ```\n\nAn `indexPath` in Cocoa Touch is a two-dimensional array that contains\
    \ sections (the first dimension) and rows (the second dimension). You need to\
    \ translate an `indexPath` to a single-dimensional array by accessing its row\
    \ contents for the current section, which is why you will often see `indexPath.row`\
    \ used in a lot of code.\n\nThe goal for this sample application is to build a\
    \ thumbnail browser, similar to the default one provided by the `UIImagePickerController`\
    \ class. Although you could create your own thumbnail from the full image data\
    \ stored in the `ALAsset`, in the interests of speed and memory, you should use\
    \ the one available through the derived properties in the class. `ALAsset` exposes\
    \ two properties: `[ALAsset thumbnail]` and `[ALAsset aspectRatioThumbnail]`,\
    \ which both return `CGImageRef`s, or pointers to image data, for each asset.\
    \ The difference is that `thumbnail` returns a thumbnail cropped to a square aspect\
    \ ratio, while `aspectRatioThumbnail` returns a thumbnail that preserves the original\
    \ aspect ratio of the asset."
  raw: 'The easiest way to think of a `UICollectionView` is as a more advanced `UITableView`.
    Like a table view, a collection view needs to be initialized with an array of
    data, and each item is represented by a cell. For the MyPicker project, you will
    want each cell to contain an image and a check box representing its state.


    The default Interface Builder template for a `UICollectionView` comes with an
    empty `UICollectionViewCell`. In order to make it display two images (one for
    the contents and one for the check box), you need to follow these steps:


    1.  Create a new subclass of `UICollectionViewCell`. Set this as the parent class
    for your cell (use the Interface Builder attributes inspector for this).

    2.  Give the cell a new reuse identifier (use the Interface Builder attributes
    inspector for this).

    3.  Add two `UIImage` properties to the cell to represent the image and check
    box. Tie these to your class by using Xcode.


    When working with a `UICollectionViewCell`, make sure you have the cell selected
    in Interface Builder; otherwise, you will have trouble modifying it. As shown
    in [Figure 4-7](#9781430250838_Ch04.xhtml#Fig7), you can easily select items by
    using the Scene Navigator in Interface Builder (the left pane).


    ![9781430250838_Fig04-07.jpg](images/9781430250838_Fig04-07.jpg)


    [Figure 4-7](#9781430250838_Ch04.xhtml#_Fig7). Setting a reuse identifier in Interface
    Builder


    **Note**  If you are having trouble setting your reuse identifier, make sure you
    have selected the `UICollectionViewCell`, not one of its subviews.


    Much as with a `UITableView`, you need to implement a series of delegate methods
    to fully realize the collection view. The first step is to let the collection
    view know how many sections the data source has, and how many rows you want in
    each section. You define the number of sections by implementing the `[UICollectionViewDataSource
    numberOfSectionsInCollectionView]` protocol method. In this method, the return
    type is an integer that specifies the number of sections. This simple example
    loads assets from a one-dimensional array, so you can return 1 as the number of
    sections, as shown in [Listing 4-26](#9781430250838_Ch04.xhtml#list26).


    [***Listing 4-26***](#9781430250838_Ch04.xhtml#_list26). Initializing Collection
    View Section Count


    ```

    - (NSInteger)numberOfSectionsInCollectionView:(UICollectionView *)collectionView

    {

        return 1;

    }

    ```


    The real configuration work happens in defining the number of rows for each section.
    For this example, the number of rows is equal to the number of items in the array,
    so you can simply return the `count` property. You implement this in the delegate
    method, `[UICollectionView numberOfItemsInSection:]`, which takes the section
    number as input and returns the row count, as shown in [Listing 4-27](#9781430250838_Ch04.xhtml#list27).


    [***Listing 4-27***](#9781430250838_Ch04.xhtml#_list27). Initializing Collection
    View Row Count


    ```

    - (NSInteger)collectionView:(UICollectionView *)view numberOfItemsInSection:(NSInteger)section;

    {

        return [self.images count];

    }

    ```


    You may run into timing issues, depending on where you initialize your input array.
    For example, if you make your Asset Library calls from the `[UIViewController
    viewDidLoad]` method, you will notice that the `[UICollectionView numberOfItemsInSection:]`
    method initializes the collection view with a count of 0, even if you have found
    several items. This is due to the asynchronous nature of block programming. Because
    the lookup code runs in the background, there is nothing preventing the system
    from executing the collection view initialization code immediately against the
    still-empty array.


    While this may seem like a pretty big bug, it’s nothing to worry about, because
    there’s an API that lets you refresh the collection view’s data source at any
    time. This API is `[UICollectionView reloadData]`. It immediately calls the `[UICollectionView
    numberOfSections]` and `[UICollectionView numberOfItemsInSection:]` methods again,
    which then return accurate initialization values. All you need to do is call that
    method when you are confident the array has been fully populated. The sample application
    calls it when it has finished iterating through all the groups. The refresh code
    block is illustrated in [Listing 4-28](#9781430250838_Ch04.xhtml#list28).


    [***Listing 4-28***](#9781430250838_Ch04.xhtml#_list28). Refreshing the Collection
    View


    ```

    [self.assetsLibrary enumerateGroupsWithTypes:photoFilters

        usingBlock:^(ALAssetsGroup *group, BOOL *stop) {

        [group enumerateAssetsUsingBlock:^(ALAsset *result, NSUInteger

                                           index, BOOL *stop) {

        if (result != nil) {

            [self.images addObject:result];

        }

    }];


    [self.collectionView reloadData];

    } failureBlock:^(NSError *error) {

        NSLog(@"error! %@", [error description]);

    }];

    ```


    Now that you can be confident about the data source, you need to make sure each
    `UICollectionViewCell` is initialized with information from the assets. You initialize
    the cells using the `[UICollectionView cellForItemAtIndexPath:]` method, where
    the inputs are the collection view and the `NSIndexPath` value for each item.
    Following the pattern of initializing table view cells, the first step is to retrieve
    a cell to work on, which you do with the `[UICollectionView dequeueReusableCellWithReuseIdentifier:forIndexPath:]`
    method. Pass in the `indexPath` and the reuse identifier you defined in Interface
    Builder. To access the image view for the custom cells, make sure to cast the
    object after retrieving it. You can find the basic initialization code in [Listing
    4-29](#9781430250838_Ch04.xhtml#list29).


    [***Listing 4-29***](#9781430250838_Ch04.xhtml#_list29). Initializing a Collection
    View Cell


    ```

    - (UICollectionViewCell *)collectionView:(

           UICollectionView *)collectionView

               cellForItemAtIndexPath:(NSIndexPath *)indexPath

    {

        PickerCell *cell = (PickerCell *)[collectionView

            dequeueReusableCellWithReuseIdentifier:@"PickerCell"

               forIndexPath:indexPath];


    return cell;

    }

    ```


    Having retrieved the cell, you now need to retrieve the asset that goes with it.
    Because the data source is a one-dimensional array, you know that the row numbers
    will line up exactly with the index of each item in the array. Therefore, to retrieve
    each asset, all you need to do is call `[NSArray objectAtIndex:]` with the `row`
    property of the `indexPath`. If the data source were a multidimensional array,
    you could pass in the section number as well.


    ```

    ALAsset *asset = [self.images objectAtIndex:indexPath.row];

    ```


    An `indexPath` in Cocoa Touch is a two-dimensional array that contains sections
    (the first dimension) and rows (the second dimension). You need to translate an
    `indexPath` to a single-dimensional array by accessing its row contents for the
    current section, which is why you will often see `indexPath.row` used in a lot
    of code.


    The goal for this sample application is to build a thumbnail browser, similar
    to the default one provided by the `UIImagePickerController` class. Although you
    could create your own thumbnail from the full image data stored in the `ALAsset`,
    in the interests of speed and memory, you should use the one available through
    the derived properties in the class. `ALAsset` exposes two properties: `[ALAsset
    thumbnail]` and `[ALAsset aspectRatioThumbnail]`, which both return `CGImageRef`s,
    or pointers to image data, for each asset. The difference is that `thumbnail`
    returns a thumbnail cropped to a square aspect ratio, while `aspectRatioThumbnail`
    returns a thumbnail that preserves the original aspect ratio of the asset.'
  trans: "\n# 排版后内容\n\n理解 `UICollectionView` 最简单的方式是将其视为更高级的 `UITableView`。与表格视图类似，集合视图需要用数据数组进行初始化，每个项目都由一个单元格表示。对于\
    \ MyPicker 项目，你需要让每个单元格包含一张图片和一个表示其状态的复选框。\n\n`UICollectionView` 的默认 Interface\
    \ Builder 模板带有一个空的 `UICollectionViewCell`。为了让它显示两张图片（一张用于内容，一张用于复选框），你需要遵循以下步骤：\n\
    \n1.  创建 `UICollectionViewCell` 的一个新子类。将此子类设置为单元格的父类（使用 Interface Builder 的属性检查器）。\n\
    2.  为单元格指定一个新的重用标识符（使用 Interface Builder 的属性检查器）。\n3.  为单元格添加两个 `UIImage` 属性，分别代表图片和复选框。使用\
    \ Xcode 将这些属性关联到你的类。\n\n处理 `UICollectionViewCell` 时，请确保你在 Interface Builder 中选中了该单元格；否则，你将难以修改它。如图\
    \ 4-7 所示，你可以使用 Interface Builder 中的场景导航器（左侧面板）轻松选择项目。\n\n![9781430250838_Fig04-07.jpg](img/9781430250838_Fig04-07.jpg)\n\
    \n图 4-7。在 Interface Builder 中设置重用标识符\n\n**注意** 如果在设置重用标识符时遇到问题，请确保你选中了 `UICollectionViewCell`\
    \ 本身，而不是它的某个子视图。\n\n与 `UITableView` 非常相似，你需要实现一系列委托方法才能充分发挥集合视图的功能。第一步是让集合视图知道数据源包含多少个分区，以及每个分区需要多少行。通过实现\
    \ `[UICollectionViewDataSource numberOfSectionsInCollectionView]` 协议方法来定义分区数。在该方法中，返回值是一个整型，指定分区的数量。这个简单示例从一维数组中加载资源，因此你可以返回\
    \ 1 作为分区数量，如代码清单 4-26 所示。\n\n***代码清单 4-26***。初始化集合视图的分区计数\n\n```\n- (NSInteger)numberOfSectionsInCollectionView:(UICollectionView\
    \ *)collectionView\n{\n    return 1;\n}\n```\n\n实际的配置工作发生在定义每个分区的行数上。对于这个示例，行数等于数组中的项目数量，因此你可以直接返回\
    \ `count` 属性。你可以在委托方法 `[UICollectionView numberOfItemsInSection:]` 中实现这一点，该方法接收分区编号作为输入参数，并返回行数，如代码清单\
    \ 4-27 所示。\n\n***代码清单 4-27***。初始化集合视图的行数\n\n```\n- (NSInteger)collectionView:(UICollectionView\
    \ *)view numberOfItemsInSection:(NSInteger)section;\n{\n    return [self.images\
    \ count];\n}\n```\n\n根据你初始化输入数组的位置，你可能会遇到时序问题。例如，如果你在 `[UIViewController viewDidLoad]`\
    \ 方法中调用 Asset Library，你会注意到 `[UICollectionView numberOfItemsInSection:]` 方法以计数\
    \ 0 初始化集合视图，即使你已经找到多个项目。这是由于块编程的异步特性所致。因为查找代码在后台运行，没有任何机制阻止系统立即对仍然为空的数组执行集合视图初始化代码。\n\
    \n虽然这看起来像是一个相当大的错误，但无需担心，因为存在一个 API 允许你在任何时候刷新集合视图的数据源。这个 API 是 `[UICollectionView\
    \ reloadData]`。它会立即再次调用 `[UICollectionView numberOfSections]` 和 `[UICollectionView\
    \ numberOfItemsInSection:]` 方法，从而返回准确的初始化值。你只需在确信数组已完全填充时调用该方法即可。示例应用程序在完成遍历所有组时调用它。刷新代码块如代码清单\
    \ 4-28 所示。\n\n***代码清单 4-28***。刷新集合视图\n\n```\n[self.assetsLibrary enumerateGroupsWithTypes:photoFilters\n\
    \    usingBlock:^(ALAssetsGroup *group, BOOL *stop) {\n    [group enumerateAssetsUsingBlock:^(ALAsset\
    \ *result, NSUInteger\n                                       index, BOOL *stop)\
    \ {\n    if (result != nil) {\n        [self.images addObject:result];\n    }\n\
    }];\n\n[self.collectionView reloadData];\n} failureBlock:^(NSError *error) {\n\
    \    NSLog(@\"error! %@\", [error description]);\n}];\n```\n\n现在你可以对数据源充满信心，接下来需要确保每个\
    \ `UICollectionViewCell` 都能从资源中获取信息进行初始化。你可以使用 `[UICollectionView cellForItemAtIndexPath:]`\
    \ 方法来初始化单元格，其输入参数是集合视图和每个项目对应的 `NSIndexPath` 值。遵循初始化表格视图单元格的模式，第一步是获取一个可供操作的单元格，这通过\
    \ `[UICollectionView dequeueReusableCellWithReuseIdentifier:forIndexPath:]` 方法实现。传入\
    \ `indexPath` 和在 Interface Builder 中定义的重用标识符。为了访问自定义单元格中的图片视图，请确保在获取对象后对其进行类型转换。你可以在代码清单\
    \ 4-29 中找到基本的初始化代码。\n\n***代码清单 4-29***。初始化集合视图单元格\n\n```\n- (UICollectionViewCell\
    \ *)collectionView:(\n       UICollectionView *)collectionView\n           cellForItemAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    PickerCell *cell = (PickerCell *)[collectionView\n     \
    \   dequeueReusableCellWithReuseIdentifier:@\"PickerCell\"\n           forIndexPath:indexPath];\n\
    \nreturn cell;\n}\n```\n\n获取单元格后，现在需要检索与之对应的资源。由于数据源是一维数组，你知道行号会与数组中每个项目的索引完全对应。因此，要检索每个资源，你只需使用\
    \ `indexPath` 的 `row` 属性调用 `[NSArray objectAtIndex:]` 即可。如果数据源是多维数组，你还可以传入分区编号。\n\
    \n```\nALAsset *asset = [self.images objectAtIndex:indexPath.row];\n```\n\nCocoa\
    \ Touch 中的 `indexPath` 是一个二维数组，包含分区（第一维）和行（第二维）。你需要通过访问当前分区的行内容，将 `indexPath`\
    \ 转换为一维数组，这就是为什么你在很多代码中经常会看到 `indexPath.row` 的原因。\n\n这个示例应用程序的目标是构建一个缩略图浏览器，类似于\
    \ `UIImagePickerController` 类提供的默认浏览器。虽然你可以从存储在 `ALAsset` 中的完整图像数据创建自己的缩略图，但出于速度和内存的考虑，你应该使用通过该类中的派生属性提供的缩略图。`ALAsset`\
    \ 暴露了两个属性：`[ALAsset thumbnail]` 和 `[ALAsset aspectRatioThumbnail]`，它们都返回 `CGImageRef`\
    \ 类型（即指向图像数据的指针）。区别在于，`thumbnail` 返回裁剪为正方形宽高比的缩略图，而 `aspectRatioThumbnail` 返回保留原始资源宽高比的缩略图。\n"
- fmt: 'You can create a `UIImage` from the `CGImageRef` value using the initialization
    method `[UIImage imageWithCGImage:]`, passing in the pointer directly. From there,
    you simply set the `image` property on the cell’s image view, and you are good
    to go. You can find the completed initialization method for a cell in [Listing
    4-30](#9781430250838_Ch04.xhtml#list30).


    [***Listing 4-30***](#9781430250838_Ch04.xhtml#_list30). Initializing a Collection
    View Cell with a Thumbnail


    ```

    - (UICollectionViewCell *)collectionView:(

           UICollectionView *)collectionView

           cellForItemAtIndexPath:(NSIndexPath *)indexPath

    {

           PickerCell *cell = (PickerCell *)[collectionView

           dequeueReusableCellWithReuseIdentifier:@"PickerCell"

               forIndexPath:indexPath];


    ALAsset *asset = [self.images objectAtIndex:indexPath.row];

        cell.imageView.image = [UIImage imageWithCGImage:asset.aspectRatioThumbnail];


    return cell;

    }

    ```


    ## Enabling Multiple Selection


    As stated at the beginning of the chapter, one of the most compelling reasons
    for building your own image picker is to cover use cases that are not supported
    by Apple through the `UIImagePickerController` class, such as selecting multiple
    images at once. By taking advantage of `UICollectionView`’s multiple selection
    APIs, you can fill this gap without too much extra work.


    To enable multiple image selection, you need to perform three high-level tasks:


    - Enable multiple-selection on the collection view

    - Add or remove items to or from a data structure based on their selection status

    - Update each item’s user interface based on its selection status


    To enable multiple-selection, all you need to do is enable the `allowMultipleSelection`
    flag on the collection view:


    ```

    [self.collectionView setAllowsMultipleSelection:YES];

    ```


    To return multiple images when users dismiss the custom image picker, you need
    to store the images to a data structure that grows or shrinks based on the user’s
    selections. You could store the items in an `NSMutableArray`, but you would need
    to write your own wrapper code to make sure items do not already exist in the
    structure before adding them, which could slow down the app or increase its memory
    footprint. A more elegant solution is to use an `NSMutableDictionary`, keyed by
    asset index number. By keying assets directly to the index number, you are not
    dependent on what order items are added to the dictionary, and you can employ
    very fast, direct lookups. When users select an asset, you do not need to worry
    about duplicates, because you can tie only one object to the key. And when users
    deselect an asset, you can instantly find and remove the asset from the dictionary
    based on the index number.


    The final step is to update the user interface to mirror changes in selection
    state. The two delegate methods needed to implement this behavior are `[UICollectionView
    didDeselectItemAtIndexPath:]` and `[UICollectionView didSelectItemAtIndexPath:]`.
    Much as when you were building the items, the core operations for these functions
    are to first look up the appropriate cell objects and then modify specific values.
    This application indicates that an item is selected by changing its background
    color and the state of an overlay image placed over the thumbnail. Since the app
    respects the original aspect ratio of the images, and the collection cells are
    square, there’s some space to play with in the background. By adding an overlay
    image, you can also create an interface that users are familiar with from other
    apps that allow multiple item selection, such as the iOS mail app. The logic for
    selecting and deselecting cells is illustrated in [Listing 4-31](#9781430250838_Ch04.xhtml#list31).


    [***Listing 4-31***](#9781430250838_Ch04.xhtml#_list31). Logic for Selecting and
    Deselecting Collection View Cells


    ```

    -(void)collectionView:(UICollectionView *)collectionView

            didSelectItemAtIndexPath:(NSIndexPath *)indexPath

    {

        PickerCell *cell = (PickerCell *)[collectionView

            cellForItemAtIndexPath:indexPath];


    cell.overlayView.image = [UIImage imageNamed:@"Check-selected"];

        cell.imageView.backgroundColor = [UIColor whiteColor];


    [self.selectedImages setObject:[self.images

                                        objectAtIndex:indexPath.row]

                                        forKey:[NSNumber

                                        numberWithInteger:indexPath.row]];

    }


    - (void)collectionView:(UICollectionView *)collectionView

            didDeselectItemAtIndexPath:(NSIndexPath *)indexPath

    {

        PickerCell *cell = (PickerCell *)[collectionView

            cellForItemAtIndexPath:indexPath];


    cell.overlayView.image = [UIImage imageNamed:@"Check-notselected"];

        cell.imageView.backgroundColor = [UIColor purpleColor];


    if ([self.selectedImages objectForKey:[NSNumber

                         numberWithInteger:indexPath.row]] !=  nil) {

            [self.selectedImages removeObjectForKey:[NSNumber

                         numberWithInteger:indexPath.row]];

        }


    }

    ```


    ## Creating an Interface for Returning Image Data


    The final step for the custom image picker is to build a programmatic interface
    for returning the user’s image selections back to the calling class. You also
    need a way of passing back a `cancel` message, indicating that the user did not
    select any images.


    Harkening back to the earlier discussion of message passing, you may remember
    that there are several ways of building an interface between two classes, ranging
    from loose implementations such as notification and key/value observing, to very
    strict ones including protocols and delegation. While a notification-based system
    could work here, these systems are often more appropriate for background tasks
    or classes that want to subscribe to a service, meaning they could easily remove
    themselves as an observer and still operate fine. Because you are trying to build
    an experience that is similar to the native `UIImagePickerController`, you should
    try to use a design pattern similar to the native functionality, which includes
    defining specific messages and having a pointer back to the calling class. In
    this case, the most appropriate message-passing system would be delegation.


    To specify which messages to pass, you must first define the protocol. In this
    case, you are going to pass either a `didSelectImages` message, along with a list
    of assets the user selected, or a `cancel` message, which indicates that the user
    selected nothing and wants to dismiss the image picker. To make life easier for
    the users of this interface, this implementation passes back an array of images
    with the `didSelectImages` message, and nothing with the `cancel` message. You
    can find an example of the protocol definition in [Listing 4-32](#9781430250838_Ch04.xhtml#list32).


    [***Listing 4-32***](#9781430250838_Ch04.xhtml#_list32). Defining a Protocol for
    the Image Picker


    ```

    #import <UIKit/UIKit.h>

    #import <AssetsLibrary/AssetsLibrary.h>


    @protocol PickerDelegate <NSObject>


    -(void)didSelectImages:(NSArray *)images;

    -(void)cancel;


    @end


    @interface PickerViewController : UICollectionViewController


    @property (nonatomic, strong) NSMutableArray *images;

    @property (nonatomic, strong) ALAssetsLibrary *assetsLibrary;

    @property (nonatomic, strong) NSMutableDictionary *selectedImages;

    @property (nonatomic, weak) id <PickerDelegate> delegate;


    -(IBAction)cancel:(id)sender;

    -(IBAction)done:(id)sender;


    @end

    ```'
