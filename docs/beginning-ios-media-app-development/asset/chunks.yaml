    Finally, to add that last little bit of magic to the application, you added user-interface
    updates to the application that hide the center playback controls when the user
    is not interacting with the app and update the current time label and scrubber
    with the current playback position.


    Although the setup code for this user interface and playback stack was more involved
    than using the `MPMoviePlayerController` class directly, the result was a custom
