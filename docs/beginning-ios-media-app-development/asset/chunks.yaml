    ## 总结


    在本章中，你了解了如何基于`AVFoundation`框架的图像捕获类构建自定义视频录制界面。为了节省时间，你复用了第4章中的`CameraViewController`类用于基础捕获界面，以及第9章中的`CustomPlayer`类用于自定义视频播放界面。


    值得注意的是，你能够复用你在第4章中构建的静态图片捕获项目的大部分代码，仅做了少量更改来处理电影文件输出并启用视频特定的捕获设置。为了模拟`UIImagePickerController`的预览界面，你向`CustomPlayer`类添加了“接受”和“拒绝”控件。最后，为了适应视频文件较大的体积，你向`CameraDelegate`协议添加了一个“完成录制并获取URL”的方法。


    正如本书中许多其他项目的模式一样，这个自定义视频录制项目主要是一项修改现有代码以满足新用例的练习。当你继续作为媒体应用开发者（以及广义上的工程师）时，你会发现许多其他概念与你已知的内容有大量重叠。关键是要保持开放的心态，并利用你认识到的常见模式。


