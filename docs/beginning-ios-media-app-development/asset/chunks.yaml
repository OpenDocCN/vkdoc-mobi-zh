    ## 启用多选


    正如本章开头所述，构建自定义图像选择器最有力的理由之一，是为了覆盖 Apple 通过 `UIImagePickerController` 类不支持的用例，例如一次选择多张图像。通过利用
    `UICollectionView` 的多选 API，你可以无需太多额外工作就能填补这一空白。


    要启用多选图像功能，你需要完成三项高级任务：


    - 在集合视图上启用多选

    - 根据选择状态，向数据结构添加或移除项目

    - 根据每个项目的选择状态更新其用户界面


    要启用多选，你只需要在集合视图上启用 `allowMultipleSelection` 标志：


    ```

    [self.collectionView setAllowsMultipleSelection:YES];

    ```


    为了在用户关闭自定义图像选择器时返回多张图像，你需要将图像存储到一个数据结构中，该数据结构根据用户的选择而增长或缩小。你可以将项目存储在 `NSMutableArray`
    中，但你需要编写自己的包装代码，以确保在添加项目之前它们不存在于结构中，这可能会降低应用程序的速度或增加其内存占用。一个更优雅的解决方案是使用 `NSMutableDictionary`，以资产索引号作为键。通过将资产直接与索引号关联，你不依赖于项目添加到字典中的顺序，并且可以使用非常快速、直接的查找。当用户选择资产时，你无需担心重复问题，因为每个键只能关联一个对象。当用户取消选择资产时，你可以根据索引号立即在字典中找到并移除该资产。


    最后一步是更新用户界面，以反映选择状态的变化。实现此行为所需的两个委托方法是 `[UICollectionView didDeselectItemAtIndexPath:]`
    和 `[UICollectionView didSelectItemAtIndexPath:]`。就像构建项目时一样，这些函数的核心操作是首先查找相应的单元格对象，然后修改特定值。本应用程序通过更改单元格的背景颜色以及放置在缩略图上的覆盖图像的状态来指示项目已被选中。由于应用程序尊重图像的原始宽高比，并且集合单元格是方形的，因此背景中有一些可操作的空间。通过添加覆盖图像，你还可以创建一个用户在其他支持多选项目的应用程序（例如
    iOS 邮件应用）中熟悉的界面。选择和取消选择单元格的逻辑在代码清单 4-31 中进行了说明。


    ***代码清单 4-31***. 选择和取消选择集合视图单元格的逻辑


    ```

    -(void)collectionView:(UICollectionView *)collectionView

            didSelectItemAtIndexPath:(NSIndexPath *)indexPath

    {

        PickerCell *cell = (PickerCell *)[collectionView

            cellForItemAtIndexPath:indexPath];


    cell.overlayView.image = [UIImage imageNamed:@"Check-selected"];

        cell.imageView.backgroundColor = [UIColor whiteColor];


    [self.selectedImages setObject:[self.images

                                        objectAtIndex:indexPath.row]

                                        forKey:[NSNumber

                                        numberWithInteger:indexPath.row]];

    }


    - (void)collectionView:(UICollectionView *)collectionView

            didDeselectItemAtIndexPath:(NSIndexPath *)indexPath

    {

        PickerCell *cell = (PickerCell *)[collectionView

            cellForItemAtIndexPath:indexPath];


    cell.overlayView.image = [UIImage imageNamed:@"Check-notselected"];

        cell.imageView.backgroundColor = [UIColor purpleColor];


    if ([self.selectedImages objectForKey:[NSNumber

                         numberWithInteger:indexPath.row]] !=  nil) {

            [self.selectedImages removeObjectForKey:[NSNumber

                         numberWithInteger:indexPath.row]];

        }


    }

    ```


    ## 创建用于返回图像数据的接口


    自定义图像选择器的最后一步是构建一个编程接口，用于将用户选择的图像返回给调用类。你还需要一种返回 `cancel` 消息的方法，指示用户没有选择任何图像。


    回顾前面关于消息传递的讨论，你可能还记得有多种方法可以在两个类之间构建接口，从松散实现（如通知和键值观察）到非常严格的实现（包括协议和委托）。虽然基于通知的系统在这里可以工作，但这些系统通常更适用于后台任务或希望订阅服务的类，这意味着它们可以轻松地移除观察者身份并且仍然正常运行。因为你试图构建一种与本机
    `UIImagePickerController` 类似的体验，所以你应该尝试使用与本机功能相似的设计模式，包括定义特定的消息并持有一个指向调用类的指针。在这种情况下，最合适的消息传递系统是委托。


    要指定传递哪些消息，你必须首先定义协议。在本例中，你将传递 `didSelectImages` 消息（以及用户选择的资产列表）或 `cancel` 消息（表示用户未选择任何内容并希望关闭图像选择器）。为了让该接口的用户更轻松，此实现通过
    `didSelectImages` 消息返回一个图像数组，而 `cancel` 消息不返回任何内容。你可以在代码清单 4-32 中找到协议定义的示例。


    ***代码清单 4-32***. 为图像选择器定义协议


    ```

    #import <UIKit/UIKit.h>

    #import <AssetsLibrary/AssetsLibrary.h>


    @protocol PickerDelegate <NSObject>


    -(void)didSelectImages:(NSArray *)images;

    -(void)cancel;


    @end


    @interface PickerViewController : UICollectionViewController


    @property (nonatomic, strong) NSMutableArray *images;

    @property (nonatomic, strong) ALAssetsLibrary *assetsLibrary;

    @property (nonatomic, strong) NSMutableDictionary *selectedImages;

    @property (nonatomic, weak) id <PickerDelegate> delegate;


    -(IBAction)cancel:(id)sender;

    -(IBAction)done:(id)sender;


    @end

    ```

    '
- fmt: "从图像选择器类内部，在操作按钮处理程序中调用协议方法。`didSelectImages`处理程序通过遍历选择字典并返回每个索引所指示的非`nil`资源图像的表示，构建一个要传回的资产数组。对于`cancel`处理程序，你可以简单地向委托对象发送`cancel`消息。你可以在[列表4-33](#9781430250838_Ch04.xhtml#list33)中找到这些调用。\n\
    \n[***列表4-33***](#9781430250838_Ch04.xhtml#_list33). 从图像选择器调用协议方法\n\n```\n-(IBAction)done:(id)sender\n\
    {\n    NSMutableArray *imageArray = [NSMutableArray new];\n    for (id key in\
    \ self.selectedImages.allKeys) {\n        if ([self.selectedImages objectForKey:key]\
    \ != nil) {\n            [imageArray addObject:[self.selectedImages\n        \
    \                           objectForKey:key]];\n        }\n    }\n\n[self.delegate\
    \ didSelectImages:imageArray];\n}\n\n-(IBAction)cancel:(id)sender\n{\n\n[self.delegate\
    \ cancel];\n}\n```\n\n在调用图像选择器的父视图控制器中，当实例化图像选择器时，需要在类签名中声明将为图像选择器类使用委托，如[列表4-34](#9781430250838_Ch04.xhtml#list34)所示。\n\
    \n[***列表4-34***](#9781430250838_Ch04.xhtml#_list34). 指定目标类实现选择器协议\n\n```\n@interface\
    \ ViewController : UIViewController <PickerDelegate,\n                       \
    \     UITableViewDelegate, UITableViewDataSource>\n```\n\n尽管该代码将类声明为选择器协议的委托，你仍然需要对其进行初始化。\n\
    \n委托方法实现告诉表格视图，在收到`didSelectImages`消息后从资产数组加载缩略图，然后关闭图像选择器控制器。或者，对于取消消息，它只需关闭图像选择器控制器以返回正常的用户界面。你可以在[列表4-35](#9781430250838_Ch04.xhtml#list35)中找到选择器委托方法的示例。\n\
    \n[***列表4-35***](#9781430250838_Ch04.xhtml#_list35). 实现选择器委托方法\n\n```\n#pragma\
    \ mark - Picker Delegate methods\n\n-(void)cancel\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n-(void)didSelectImages:(NSArray *)images\n{\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n\nself.imageArray = [images\
    \ copy];\n\n[self.tableView reloadData];\n}\n```\n\n从资产表示创建图像数据\n\n现在你已经创建了一个接口来传回选中的资产，还需要一个步骤才能使其更像原生的图像选择器：它需要返回一些`UIImage`对象。要从`ALAsset`中提取原始图像数据，你需要执行以下步骤：\n\
    \n*   提取资产的所需版本或*表示*，到一个`ALAssetRepresentation`对象。\n*   通过使用`[ALAssetRepresentation\
    \ fullResolutionImage]`实例方法，保存指向该资产图像数据的指针。\n*   查询`ALAsset`的元数据以确定图像的正确方向。\n\
    *   根据方向和提取的`CGImageRef`创建一个`UIImage`对象。\n\n正如本章前面提到的，`ALAsset`类的优势之一是其不仅能够存储原始图像数据，还能存储元数据和图像的多个版本（称为*表示*）。一个表示可以涵盖不同的压缩格式或分辨率等变化。`ALAssetRepresentation`类存储表示信息，并具有实例方法，允许你查询图像指针、元数据、原始数据以及存储URL/UTI（通用类型标识符）。\n\
    \n你可以通过传入所需表示的UTI或调用`[ALAsset defaultRepresentation]`（返回图像第一个可用的已保存表示）从`ALAsset`对象创建一个`ALAssetRepresentation`对象：\n\
    \n```\nALAssetRepresentation *defaultRepresentation = [asset defaultRepresentation];\n\
    ```\n\n类似地，你可以通过在表示对象上调用`[ALAssetRepresentation fullResolutionImage]`实例方法来获取指向表示图像数据的指针。返回类型是`CGImageRef`，一个指向图像数据的指针，这减小了对象大小并提高了速度（类似于`ALAsset`缩略图）。\n\
    \n```\nCGImageRef imagePtr = [defaultRepresentation fullResolutionImage];\n```\n\
    \n要从`CGImageRef`创建一个`UIImage`对象，使用`[UIImage imageFromCGImage:]`或`[UIImage imageFromCGImage:scale:orientation:]`实例方法。由于人们以横向或纵向模式拍照是极其常见的用例，你应该使用方向数据初始化图像以确保其正确显示。该实例方法接受一个`UIImageOrientation`标量作为输入，因此你需要查询`ALAsset`对象以获取方向信息。将默认值设置为`UIImageOrientationUp`——以防没有可用的方向信息。你可以在[列表4-36](#9781430250838_Ch04.xhtml#list36)中找到这一过程的说明。\n\
    \n[***列表4-36***](#9781430250838_Ch04.xhtml#_list36). 查询资产方向\n\n```\nUIImageOrientation\
    \ imageOrientation = UIImageOrientationUp;\nNSNumber *orientation =\n    [asset\
    \ valueForProperty:@\"ALAssetPropertyOrientation\"];\nif (orientation != nil)\
    \ {\n    imageOrientation = [orientation integerValue];\n}\n```\n\n**注意** 查询`ALAssetRepresentation`的方向会返回一个`ALAssetOrientation`标量，它不能准确地表示图像是如何拍摄的。\n\
    \n收集了所有必要的拼图后，你现在可以创建一个图像对象：\n\n```\nUIImage *image = [UIImage imageWithCGImage:imagePtr\
    \ scale:1.0f orientation:imageOrientation];\n```\n\n总结\n\n本章提供了构建你自己的相机和图像选择器控制器的详细练习，目的是学习如何获得对照片相关API的更多控制，并构建你自己的用户界面来补充缺失的功能。通过使用更底层的框架，你应该对`UIImagePickerController`类的工作方式有清晰的认识。同时，希望你对图像在系统层面是如何被捕获和存储的有了更深的理解。\n\
    \n在相机控制器练习中，你探索了`AVFoundation`框架，以及如何利用其视频捕获能力来构建相机画面的实时预览，以及如何将帧导出为图像。你还看到了使用`CALayer`对象执行更快视图操作的一种方法，以及如何使用`AVCaptureDevice`操作相机的捕获设置。\n\
    \n图像选择器练习展示了`AssetsLibrary`框架如何为你提供一个方便的、更底层的API来查询设备上的媒体项目。你看到了如何按组和资产类型过滤资产，以及如何将结果添加到列表中。你还看到了如何在`UICollectionView`中显示这些结果，以及如何操作集合视图的设置以允许用户选择多个图像。\n\
    \n第二部分\n\n音频\n\n第5章\n\n播放和录制音频文件\n\n在本章中，你将通过构建应用程序来播放和录制音频，探索如何在你的应用中使用音频资源，这利用了iOS用于音视频任务的`AVFoundation`框架。与图像文件非常相似，音频以二进制数据的形式存储，并且必须解码后你的应用才能使用它。然而，一个巨大的区别是，音频文件存储为数据流，按时间索引，而不是表示一个静态图像的流。就像经常出现的情况一样，“有一个API可以做到这一点”，你将利用iOS内置的音频播放器和录音器类来构建你的应用。就像你处理图像一样，你将看到`AVFoundation`如何处理细节，让你能够专注于构建出色的用户体验，而不是实现底层音频编解码器。\n\
    \n播放音频文件"
  raw: 'From within the image picker class, call the protocol methods in the action
    button handlers. The `didSelectImages` handler builds an array of assets to pass
    back by iterating through the selection dictionary and returning the image representations
    of the non-`nil` assets indicated by each index. For the `cancel` handler, you
    can simply send a `cancel` message to the delegate object. You can find these
    calls in [Listing 4-33](#9781430250838_Ch04.xhtml#list33).


    [***Listing 4-33***](#9781430250838_Ch04.xhtml#_list33). Calling Protocol Methods
    from the Image Picker


    ```

    -(IBAction)done:(id)sender

    {

        NSMutableArray *imageArray = [NSMutableArray new];

        for (id key in self.selectedImages.allKeys) {

            if ([self.selectedImages objectForKey:key] != nil) {

                [imageArray addObject:[self.selectedImages

                                       objectForKey:key]];

            }

        }


    [self.delegate didSelectImages:imageArray];

    }


    -(IBAction)cancel:(id)sender

    {


    [self.delegate cancel];

    }

    ```


    In the parent view controller, which calls the image picker, declare that you’ll
    be using a delegate for the image picker class within the class signature when
    you instantiate the image picker, as shown in [Listing 4-34](#9781430250838_Ch04.xhtml#list34).


    [***Listing 4-34***](#9781430250838_Ch04.xhtml#_list34). Specifying That the Target
    Class Implements the Picker Protocol


    ```

    @interface ViewController : UIViewController <PickerDelegate,

                                UITableViewDelegate, UITableViewDataSource>

    ```


    Although that code declares the class as a delegate of the picker protocol, you
    still need to initialize it.


    The delegate method implementations tell the table view to load the thumbnails
    from the asset array upon receiving a `didSelectImages` message, and then dismiss
    the image picker controller. Or, for a cancel message, it simply needs to dismiss
    the image picker controller to get back to the normal user interface. You can
    find examples of the picker delegate methods in [Listing 4-35](#9781430250838_Ch04.xhtml#list35).


    [***Listing 4-35***](#9781430250838_Ch04.xhtml#_list35). Implementing the Picker
    Delegate Methods


    ```

    #pragma mark - Picker Delegate methods


    -(void)cancel

    {

        [self dismissViewControllerAnimated:YES completion:nil];

    }


    -(void)didSelectImages:(NSArray *)images

    {

        [self dismissViewControllerAnimated:YES completion:nil];


    self.imageArray = [images copy];


    [self.tableView reloadData];

    }

    ```


    Creating Image Data from Asset Representations


    Now that you have created an interface to pass back selected assets, there’s one
    more step required to make it work more like the native image picker: it needs
    to return some `UIImage` objects. To extract the original image data from an `ALAsset`,
    you need to perform the following steps:


    *   Extract the desired version, or *representation*, of the asset to an `ALAssetRepresentation`
    object.

    *   Save a pointer to the image data for the asset by using the [`ALAssetRepresentation
    fullResolutionImage]` instance method.

    *   Query the `ALAsset`’s metadata to determine the correct orientation for the
    image.

    *   Create a `UIImage` object based on the orientation and the extracted `CGImageRef`.


    As mentioned earlier in the chapter, one of the strengths of the `ALAsset` class
    is its ability to store not only raw image data, but also metadata and multiple
    versions of an image (called *representations*). A representation can cover such
    changes as different compression formats or resolutions. The `ALAssetRepresentation`
    class stores representation information and has instance methods that let you
    query for image pointers, metadata, raw data, and storage URLs/UTIs (universal
    type identifiers).


    You create an `ALAssetRepresentation` object from an `ALAsset` object either by
    passing in the UTI for the desired representation or by calling `[ALAsset defaultRepresentation]`,
    which returns the first available, saved representation of an image:


    ```

    ALAssetRepresentation *defaultRepresentation = [asset defaultRepresentation];

    ```


    Similarly, you can get a pointer to the image data for a representation by calling
    the `[ALAssetRepresentation fullResolutionImage]` instance method on the representation
    object. The return type is `CGImageRef`, a pointer to image data, which reduces
    object size and increases speed (similar to `ALAsset` thumbnails).


    ```

    CGImageRef imagePtr = [defaultRepresentation fullResolutionImage];

    ```


    To create a `UIImage` object from a `CGImageRef`, use the `[UIImage imageFromCGImage:]`
    or `[UIImage imageFromCGImage:scale:orientation:]` instance methods. As it is
    an extremely common use case for people to take pictures in landscape or portrait
    mode, you should initialize the image with orientation data to make sure it displays
    correctly. The instance method takes a `UIImageOrientation` scalar as its input,
    so you need to query the `ALAsset` object for the orientation information. Set
    the default value to `UIImageOrientationUp`—just in case no orientation information
    is available. You can find an  This process is illustrated in [Listing 4-36](#9781430250838_Ch04.xhtml#list36).


    [***Listing 4-36***](#9781430250838_Ch04.xhtml#_list36). Querying for Asset Orientation


    ```

    UIImageOrientation imageOrientation = UIImageOrientationUp;

    NSNumber *orientation =

        [asset valueForProperty:@"ALAssetPropertyOrientation"];

    if (orientation != nil) {

        imageOrientation = [orientation integerValue];

    }

    ```


    **Note**  Querying the `ALAssetRepresentation` for orientation returns an `ALAssetOrientation`
    scalar, which does not accurately represent how the image was taken.


    Having collected all of the necessary puzzle pieces, you can now create an image
    object:


    ```

    UIImage *image = [UIImage imageWithCGImage:imagePtr scale:1.0f orientation:imageOrientation];

    ```


    Summary


    This chapter presented detailed exercises for building your own camera and image
    picker controllers with the goal of learning how you can gain more control over
    photo-related APIs and build your own user interfaces to supply missing functionality.
    By using lower-level frameworks, you should have a firm sense of how the `UIImagePickerController`
    class works. I hope you also gained a deeper understanding of how images are captured
    and stored at the system level.


    In the camera controller exercise, you explored the `AVFoundation` framework and
    how you can use its video capture capabilities to build a live preview of a camera
    feed, as well as how to export frames as images. You also saw one way to perform
    faster view operations using `CALayer` objects and how to manipulate the capture
    settings of the camera using `AVCaptureDevice`.


    The image picker exercise showed how the `AssetsLibrary` framework gives you a
    convenient, lower-level API for querying media items on the device. You saw how
    to filter assets by groups and asset type, and how to add the results to a list.
    You also saw how to display such results in a `UICollectionView`, and how to manipulate
    the settings of the collection view to allow users to select multiple images.


    Part     2


    Audio


    Chapter    5


    Playing and Recording Audio Files


    In this chapter, you will explore how to use audio resources in your app by building
    applications to play and record audio using iOS’s `AVFoundation` framework for
    audio-visual tasks. Much like image files, audio is stored as binary data, and
    must be decoded before your application can use it. A huge difference, however,
    is that audio files are stored as a stream of data, indexed by time, rather than
    a stream that represents one static image. As is so often the case, “there’s an
    API for that,” and you will take advantage of iOS’s built-in audio player and
    recorder classes to build your apps. Just as you dealt with images, you will see
    how `AVFoundation` takes care of the details, allowing you to focus on building
    great user experiences rather than on implementing low-level audio codecs.


    Playing Audio Files'
