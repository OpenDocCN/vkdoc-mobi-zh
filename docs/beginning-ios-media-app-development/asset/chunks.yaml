    buttons by skipping 15 seconds forward or backward in the track. This functionality
    is also available in the `MPMusicPlayerController` class, and you can implement
    it in the same manner—by changing the `currentPlaybackTime` property of your `MPMusicPlayerController`
    object. [Listing 6-11](#9781430250838_Ch06.xhtml#list11) shows an example of seeking
    forward. For a more complete implementation, refer to [Chapter 5](#9781430250838_Ch05.xhtml);
    you can reuse the same logic.


    [***Listing 6-11***](#9781430250838_Ch06.xhtml#_list11). Seeking Forward 15 Seconds
    in a Track


    ```

    -(IBAction)seekForward:(id)sender

    {

        if ([self.musicPlayer playbackState] ==

            MPMusicPlaybackStatePlaying) {


    NSTimeInterval desiredTime =

               self.musicPlayer.currentPlaybackTime + 15.0f;

            if (desiredTime <

                self.musicPlayer.nowPlayingItem.playbackDuration) {

                self.musicPlayer.currentPlaybackTime = desiredTime;

            }

        }

    }

    ```


    To start taking advantage of the `MediaPlayer` framework, you implement Fast Forward
    in a slightly different manner. The `MediaPlayer` framework lets you speed up
    playback of an item during a seek operation, producing a sound effect similar
    to one you would hear when fast-forwarding a cassette tape (that’s my obligatory
    1980s reference). However, this new implementation is completely user-interface
    driven, meaning that seeking begins when the user presses the button, and stops
    when the user releases the button. You no longer need to modify the `currentPlaybackTime`
    property using this technique.


    To begin fast-forwarding, call the `[MPMediaPlayerController beginSeekingForward]`
    method on your media player object. Similarly, you would call the `[MPMediaPlayerController
    beginSeekingBackward]` method to begin rewinding. When you have finished seeking,
    for both events, you need to call the `[MPMediaPlayerController endSeeking]` method.
    [Listing 6-12](#9781430250838_Ch06.xhtml#list12) shows these calls, wrapped in
    event handlers, as they appear in the MyPod project.


    [***Listing 6-12***](#9781430250838_Ch06.xhtml#_list12). Event Handlers for Fast-Forwarding
    and Rewinding


    ```

    -(IBAction)startFastForward:(id)sender

    {

        [self.musicPlayer beginSeekingForward];

    }


    -(IBAction)startRewind:(id)sender

    {

        [self.musicPlayer beginSeekingBackward];

    }


    -(IBAction)stopSeeking:(id)sender

    {

        [self.musicPlayer endSeeking];

    }

    ```


    To tie these event handlers to your storyboard, you need to change the events
    that you are using in Interface Builder. To handle the event that gets triggered
    when a user presses down a button, tie the `[MainViewController startFastForward:]`
    method to the Touch Down event for your Fast Forward button in Interface Builder.
    To handle the event that gets triggered when you release the button, tie the `[MainViewController
    stopSeeking:]` method to the Touch Up Inside event in Interface Builder. [Figure
    6-3](#9781430250838_Ch06.xhtml#Fig3) is a screenshot of how the completed connections
    for the Fast Forward button should look in Interface Builder. You would follow
    the same process to connect the events for the Rewind button.


    ![9781430250838_Fig06-03.jpg](images/9781430250838_Fig06-03.jpg)


    [Figure 6-3](#9781430250838_Ch06.xhtml#_Fig3). Interface Builder connections for
    Fast Forward button


    To complete the playback interface for the MyPod project, you need to implement
    the Previous and Next buttons that support navigating through the currently loaded
    media queue (the playlist). You navigate through a media queue by using the `[MPMediaPlayerController
    skipToNextItem]` and `[MPMediaPlayerController skipToPreviousItem]` methods on
    your media player object. If the queue has only one item, or if you are at the
    beginning or end, these methods will stop playback of the currently playing item.
    [Listing 6-13](#9781430250838_Ch06.xhtml#list13) shows the event handlers that
    wrap these methods.


    [***Listing 6-13***](#9781430250838_Ch06.xhtml#_list13). Event Handlers for Playlist
    Navigation


    ```

    -(IBAction)nextTrack:(id)sender

    {

        [self.musicPlayer skipToNextItem];

    }


    -(IBAction)prevTrack:(id)sender

    {

        [self.musicPlayer skipToPreviousItem];

    }

    ```


    Displaying Song Information (Metadata)


    For the final piece of the MyPod project, you need to let the user know which
    song is currently playing by displaying its information (or metadata). Referring
    back to the mock-up at the beginning of the section, you want to display the song
    title, artist name, album title, and album art (if available). As with so many
    other aspects of iOS app development, there’s an API for that! By taking advantage
    of the `[MPMediaItem valueForProperty:]` instance method, you can query metadata
    information for a media item.


    The `[MPMediaItem valueForProperty:]` instance method returns an object containing
    the metadata information for the property `key` you are trying to look up. As
    it is an extremely generic method, you will need to know the object type returned
    for each property to take full advantage of it. [Table 6-3](#9781430250838_Ch06.xhtml#Tab3)
    lists some of the most popular properties, including the information they represent
    and their return types. The property keys are constant values defined in the `MPMediaItem`
    class.


    [Table 6-3](#9781430250838_Ch06.xhtml#_Tab3). Popular MPMediaItem Property Keys


    | Key | Return Type | Represents |

    | --- | --- | --- |

    | `MPMediaItemPropertyArtist` | `NSString` | Performing artist for selected item
    |

    | `MPMediaItemPropertyArtwork` | `MPMediaItemArtwork` | Album art for selected
    item |

    | `MPMediaItemPropertyAlbumTitle` | `NSString` | Album title for selected item
    |

    | `MPMediaItemPropertyGenre` | `NSString` | Genre for selected item |

    | `MPMediaItemPropertyReleaseDate` | `NSString` | Release date for selected item
    |

    | `MPMediaItemPropertyTyle` | `NSString` | Title for selected item |


    For properties returned as `NSString` objects, such as `MPMediaItemPropertyTitle`,
    you can just save the output to a string, or use it to initialize a label. For
    example, to initialize the `titleLabel` of the main view controller, set the `text`
    property of the label to the returned value:


    ```

    self.titleLabel.text = [currentMediaItem valueForProperty:MPMediaItemPropertyTitle];

    ```


    Referring back to [Table 6-3](#9781430250838_Ch06.xhtml#Tab3), note that the `MPMediaItemPropertyArtwork`
    key, which represents the album art, returns an `MPMediaItemArtwork` object. To
    use this output with a `UIImageView`, you need to use the `[MPMediaItemArtwork
    imageWithSize:]` instance method to generate a `UIImage` object, as shown in [Listing
    6-14](#9781430250838_Ch06.xhtml#list14).


    [***Listing 6-14***](#9781430250838_Ch06.xhtml#_list14). Generating a UIImage
    from a MPMediaItemArtwork Object


    ```

    MPMediaItem *currentItem = self.musicPlayer.nowPlayingItem;

    MPMediaItemArtwork *albumArt = [currentItem

        valueForProperty:MPMediaItemPropertyArtwork];

    CGSize imageFrameSize = self.albumImageView.frame.size;

    self.albumImageView.image = [albumArt imageWithSize:imageFrameSize];

    ```


    The `[MPMediaItemArtwork imageWithSize:]` method uses a `CGSize` parameter to
    determine the width and height of the generated image. As shown in the example,
    you can pass in the `size` property from the `UImageView`’s `frame`.


    The last question you may have is, “Where should I make the call to get all this
    metadata?” Because you will need to update the displayed metadata each time the
    playlist advances, you should retrieve metadata and set your labels whenever the
    `MPMusicPlayerControllerNowPlayingItemDidChangeNotification` notification occurs.
    [Listing 6-15](#9781430250838_Ch06.xhtml#list15) shows an example that catches
    the notification via a block method.


