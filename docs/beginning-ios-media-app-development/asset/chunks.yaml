    @end


    @interface CameraViewController : UIViewController


    @property (nonatomic, strong) UIImage *capturedImage;


    @property (nonatomic, weak) id <CameraViewControllerDelegate> delegate;


    @end

    ```


    As you can see, you need to add a generic delegate object (of class `id`) to the
    source class. After defining this object, you can safely make calls to the delegate
    object through the defined protocol messages, as shown in [Listing 2-7](#9781430250838_Ch02.xhtml#list7).


    [***Listing 2-7***](#9781430250838_Ch02.xhtml#_list7). Modified Implementation
    File for Originating Class


    ```

    #import "CameraViewController.h"


    @implementation CameraViewController


    - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil

    {

        self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];

        if (self) {

            // Custom initialization

        }

        return self;

    }


    - (void)viewDidLoad

    {

        [super viewDidLoad];

        // Do any additional setup after loading the view.

    }


    #pragma mark - action handlers


    -(IBAction)takePictureButtonPressed:(id)sender

    {

        [self.delegate cameraViewController:self hasImage:self.capturedImage];

    }


    -(IBAction)cancelButtonPressed:(id)sender

    {

        [self.delegate cameraViewController:self didCancel:YES];

    }


    @end

    ```


    In summary, the core concepts for protocols are as follows:


    1.  Define a protocol by specifying its methods and their priorities.

    2.  Implement a protocol in your target class by defining all its required methods.

    3.  Define an instance of a generic delegate object in the source class, and use
    it to send protocol messages.


