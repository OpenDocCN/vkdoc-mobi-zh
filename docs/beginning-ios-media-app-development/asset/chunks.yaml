    \n        if (connectionError == nil) {\n\n            UIImage *newImage = [UIImage\
    \ imageWithData:data];\n            [self.imageView setImage:newImage];\n\n  \
    \      } else {\n            UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"\
    Error\"\n                message:@\"Could not load image :(\" delegate:nil cancelButtonTitle:@\"\
    OK\"\n                otherButtonTitles:nil];\n            [alertView show]; \n\
    \        }\n    }];\n}\n```\n\n## 添加活动指示器\n\n在许多应用程序中，你会注意到一个旋转动画，表示操作正在进行中（例如下载图像），如图\
    \ 3-7 所示。你可以通过 `UIActivityIndicatorView` 类向任何视图添加旋转器（或活动指示器）。\n\n![9781430250838_Fig03-07.jpg](img/9781430250838_Fig03-07.jpg)\n\
    \n图 3-7 叠加了活动指示器的视图\n\n要将 `UIActivityIndicatorView` 添加到 `UIImageView`，你需要遵循与其他\
    \ `UIView` 相同的大多数初始化步骤，包括设置容器框架以及将 `UIActivityIndicatorView` 作为子视图添加到 `UIImageView`\
    \ 之上。\n\n通过查看图 3-7，你会注意到 `UIActivityIndicatorView` 与 `UIImageView` 相比非常小。为了适应尺寸差异，你可以找到\
    \ `UIImageView` 的中心，并将其作为 `UIActivityIndicatorView` 的起点。清单 3-7 提供了一个向图像视图添加活动指示器的示例。\n\
    \n***清单 3-7*** 向图像视图添加活动指示器\n\n```objectivec\n// calculate the mid-way point of\
    \ the image view\nCGFloat indicatorWidth, indicatorHeight;\nindicatorWidth = indicatorHeight\
    \ = 100.0f;\n\nCGFloat originX = (self.imageView.frame.size.width - indicatorWidth)\
    \ / 2;\nCGFloat originY = (self.imageView.frame.size.height - indicatorHeight)\
    \ / 2;\n\nCGRect activityFrame = CGRectMake(originX, originY, indicatorWidth,\
    \ indicatorHeight);\n\nself.activityView = [[UIActivityIndicatorView alloc] initWithFrame:activityFrame];\n\
    self.activityView.color = [UIColor blackColor];\n[self.imageView addSubview:self.activityView];\n\
    ```\n\n你需要将 `UIImageView` 和 `UIActivityIndicatorView` 对象声明为实例变量，因为你需要在整个类中访问它们。\n\
    \n在 `UIActivityIndicatorView` 初始化并添加到 `UIImageView` 之后，你就可以让魔法发生了。当下载操作开始时，应使用\
    \ `[UIActivityIndicatorView startAnimating]` 实例方法来启动活动指示器的动画。当操作完成（无论成功还是失败）时，调用\
    \ `[UIActivityIndicatorView stopAnimating]` 实例方法来停止动画并隐藏活动指示器。\n\n清单 3-8 展示了一个结合了发起下载与启动、停止活动指示器的示例。\n\
    \n***清单 3-8*** 加载图像并使用活动指示器镜像状态\n\n```objectivec\n-(IBAction)start:(id)sender\n\
    {\n    NSURL *imageUrl = [NSURL URLWithString:@\"http://images.devatelier.com/castle.jpg\"\
    ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n\
    \    [self.imageView setImage:nil];\n    [self.imageView bringSubviewToFront:self.activityView];\n\
    \    [self.activityView startAnimating];\n\n    [NSURLConnection sendAsynchronousRequest:urlRequest\
    \ queue:[NSOperationQueue mainQueue]\n                     completionHandler:^(NSURLResponse\
    \ *response, NSData *data,\n                     NSError *connectionError) {\n\
    \n        [self.activityView stopAnimating];\n\n        if (connectionError ==\
    \ nil) {\n\n            UIImage *newImage = [UIImage imageWithData:data];\n  \
    \          [self.imageView setImage:newImage];\n\n        } else {\n         \
    \   UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"Error\" message:@\"\
    Could not load image :(\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
    \            [alertView show];\n        }\n    }];\n}\n```\n\n**注意** 视图按照添加的顺序显示。在此示例中，我使用了\
    \ `[UIView bringSubviewToFront:]` 实例方法来强制活动指示器显示在视图堆栈的最顶层。\n\n本章源代码包中的 ImageDownload\
    \ 项目实现了图 3-7 所示的用户界面。当用户按下“Start Download”按钮时，图像将在后台开始下载并显示活动指示器。下载完成后，指示器将消失，图像视图将重新加载已下载的图像。\n\
    \n## 为图像添加效果\n\n无可争议，Apple 在 iOS 7 中引入的最引人注目的变化是其新的视觉设计语言以及为开发者提供的实现该语言的工具。iOS\
    \ 7 标志着 Apple 从传统的拟物化用户界面方法（从现实世界中获取灵感）转向扁平、简洁、数字优先的设计。\n\n在本节中，你将学习如何开始使用这种设计语言。你将利用传统方法（如渐变）为图像增加深度，并了解模糊和运动效果如何让你的应用使用\
    \ Apple 在其应用中使用的许多引人注目的视觉效果。\n\n### 添加渐变\n\n为了增加深度并突出叠加在图像上的内容（例如文本），你可以使用渐变。幸运的是，有一个现成的\
    \ API 可以做到这一点！"
- fmt: '你可以用来在视图上绘制渐变的 Quartz 类是`CAGradientLayer`。它是视图绘制类`CALayer`的子类，旨在根据输入的颜色和颜色停止点绘制渐变。*停止点*决定了各个区域应在何处停止并开始相互交错。你可以使用的颜色或停止点数量没有限制，但应尽量遵循良好的设计原则，实现不分散注意力的渐变。如[图
    3-8](#9781430250838_Ch03.xhtml#Fig8)所示，不同数量的停止点可以基于你放置它们的位置以及使用颜色区域的方式，产生截然不同的效果。


    ![9781430250838_Fig03-08.jpg](images/9781430250838_Fig03-08.jpg)


    [图 3-8](#9781430250838_Ch03.xhtml#_Fig8) 两个停止点的渐变与三个停止点的渐变对比


    [代码清单 3-9](#9781430250838_Ch03.xhtml#list9) 展示了向`UIImageView`添加渐变的示例。


    [***代码清单 3-9***](#9781430250838_Ch03.xhtml#_list9) 向 UIImageView 添加渐变


    ```

    UIColor *darkestColor = [UIColor colorWithWhite:0.1f alpha:0.7f];

    UIColor *lightestColor = [UIColor colorWithWhite:0.7f alpha:0.1f];


    CAGradientLayer *headerGradient = [CAGradientLayer layer];

    headerGradient.colors = [NSArray arrayWithObjects:(id)darkestColor.CGColor,

                             (id)lightestColor.CGColor, (id)darkestColor.CGColor,  nil];


    headerGradient.frame = self.headerImageView.bounds;

    [self.headerImageView.layer insertSublayer:headerGradient atIndex:0];

    ```


    **注意**：如果你未定义任何停止点，默认值将均匀分布。


    要创建渐变，首先需要创建一个`CAGradientLayer`对象。然后，指定要使用的颜色。在此示例中，我希望图像显示圆角效果，因此我使用了三个停止点，并且颜色从深色过渡到浅色，然后再回到深色。


    **注意**：在图像上放置渐变时，我强烈建议使用`UIColor`方法，该方法允许你指定 alpha 值。Alpha 值决定了图层的透明度。Alpha 值为`0.0`意味着图层完全透明，而
    alpha 值为`1.0`意味着图层完全不透明。交替使用你的 alpha 值，可以使渐变效果在不同位置更强或更弱，同时不会完全遮盖图像。


    [图 3-9](#9781430250838_Ch03.xhtml#Fig9) 展示了渐变输出的示例。


    ![9781430250838_Fig03-09.jpg](images/9781430250838_Fig03-09.jpg)


    [图 3-9](#9781430250838_Ch03.xhtml#_Fig9) 带有渐变的图像视图与不带渐变的图像视图对比


    使用渐变，你可以仅用几行简单的代码创建强大的视觉效果，帮助你的图像实现更逼真的光照感。渐变还能比单纯的投影更好地突出覆盖层。此示例中使用的效果与 Facebook
    在其个人资料页面上使用的效果相同。


    使用渐变的示例项目名为`ImageGradient`。


    ## 让图像随设备移动


    iOS 7 带来的最令人兴奋的用户界面功能之一，是能够向任何视图添加动态效果。*动态效果*允许你响应加速器事件移动视图，从而使应用更具沉浸感，并突出 UI
    中最重要的部分。苹果使用动态效果来制作 iOS 7+ 主屏幕、锁屏、提醒视图以及 iPhone 上的 Safari 标签页浏览器的动画。


    苹果通过`UIMotionEffect`抽象类公开了访问和创建动态效果的能力。作为一个抽象类，它必须被子类化才能实例化。然而，幸运的是，苹果提供了一个非常简单的子类，可以根据加速度计的变化水平和垂直移动视图，称为`UIInterpolatingMotionEffect`。


    **注意**：要实现你自己的完全自定义行为和高级动画，你可以直接子类化`UIMotionEffect`，并在`keyPathsAndRelativeValuesForViewerOffsets:`方法中添加你的自定义逻辑。


    要使用`UIInterpolatingMotionEffect`，你必须实例化一个对象，该对象带有一个`keyPath`，表示你要基于动态事件修改的`view`属性（例如，中心
    x 位置），以及你要响应的动态类型（例如，水平移动）。对于许多动态效果，你将要显示视图的隐藏区域，因此你还必须定义相对限制，让动态效果知道这些边界是什么。定义效果后，你可以通过使用`[UIView
    addMotionEffect:]`实例方法将其添加到视图。你可以直接向此方法传递一个`UIMotionEffect`对象，或者如果你尝试一次添加多个效果，则传递一个`UIMotionEffectGroup`对象。[代码清单
    3-10](#9781430250838_Ch03.xhtml#list10) 展示了向`UIImageView`添加动态效果的示例。


    [***代码清单 3-10***](#9781430250838_Ch03.xhtml#_list10) 向 UIImageView 添加动态效果


    ```

    UIInterpolatingMotionEffect *horizontalEffect = [[UIInterpolatingMotionEffect
    alloc]

                                 initWithKeyPath:@"center.x"

                                 type:UIInterpolatingMotionEffectTypeTiltAlongHorizontalAxis];


    UIInterpolatingMotionEffect *verticalEffect = [[UIInterpolatingMotionEffect alloc]

                                 initWithKeyPath:@"center.y"

                                 type:UIInterpolatingMotionEffectTypeTiltAlongVerticalAxis];


    horizontalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];

    horizontalEffect.maximumRelativeValue  = [NSNumber numberWithInteger:50];


    verticalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];

    verticalEffect.maximumRelativeValue  = [NSNumber numberWithInteger:50];


    //set bg image effects

    [self.backgroundImageView addMotionEffect:horizontalEffect];

    [self.backgroundImageView addMotionEffect:verticalEffect];

    ```


    在[代码清单 3-10](#9781430250838_Ch03.xhtml#list10)中，我设置了背景视图的动态效果。由于动态效果的意图是突出或弱化视图层次结构中的某个视图，因此通常将效果应用于背景中的视图或前景中的动作视图（例如，`UIAlertView`）是合适的。


    **注意**：iOS 辅助功能屏幕中的“减弱动态效果”开关允许用户在整个系统范围内（包括你的应用）禁用动态效果。这无法被覆盖，因此请记住针对此限制进行设计。


    源代码包中使用动态效果的示例项目名为`ImageTilt`。如[图 3-10](#9781430250838_Ch03.xhtml#Fig10)所示，没有按钮。输入来自设备的倾斜。你会注意到图像在移动，但标签没有。


    ![9781430250838_Fig03-10.jpg](images/9781430250838_Fig03-10.jpg)


    [图 3-10](#9781430250838_Ch03.xhtml#_Fig10) ImageTilt 项目的动态效果


    ## 为图像添加模糊效果


    苹果在 iOS 7 的设计语言中带来的另一个令人兴奋的视觉效果，是强调模糊背景图像以突出用户界面的重要部分。当你打开 Siri 时，可以非常频繁地看到这种效果，如[图
    3-11](#9781430250838_Ch03.xhtml#Fig11)所示。


    ![9781430250838_Fig03-11.jpg](images/9781430250838_Fig03-11.jpg)


    [图 3-11](#9781430250838_Ch03.xhtml#_Fig11) Siri 中的模糊效果'
  raw: 'The Quartz class you can use to draw a gradient over a view is called `CAGradientLayer`.
    It is a subclass of `CALayer`, the view drawing class, intended for drawing gradients
    based on input colors and color stop points. A *stop point* determines where regions
    should stop and begin to intersect with each other. There is no limit on the number
    of colors or stop points you can have, but you should try to practice good design
    and implement a nondistracting gradient. As shown in [Figure 3-8](#9781430250838_Ch03.xhtml#Fig8),
    different numbers of stop points can create drastically different effects based
    on how you place them and use your color areas.


    ![9781430250838_Fig03-08.jpg](images/9781430250838_Fig03-08.jpg)


    [Figure 3-8](#9781430250838_Ch03.xhtml#_Fig8). A gradient with two stop points
    vs. a gradient with three stop points


    [Listing 3-9](#9781430250838_Ch03.xhtml#list9) shows an example of adding a gradient
    to a `UIImageView`.


    [***Listing 3-9***](#9781430250838_Ch03.xhtml#_list9). Adding a Gradient to a
    UIImageView


    ```

    UIColor *darkestColor = [UIColor colorWithWhite:0.1f alpha:0.7f];

    UIColor *lightestColor = [UIColor colorWithWhite:0.7f alpha:0.1f];


    CAGradientLayer *headerGradient = [CAGradientLayer layer];

    headerGradient.colors = [NSArray arrayWithObjects:(id)darkestColor.CGColor,

                             (id)lightestColor.CGColor, (id)darkestColor.CGColor,  nil];


    headerGradient.frame = self.headerImageView.bounds;

    [self.headerImageView.layer insertSublayer:headerGradient atIndex:0];

    ```


    **Note**  If you do not define any stop points, the default values will be evenly
    distributed.


    To create a gradient, you start by creating a `CAGradientLayer` object. From there,
    specify the colors to use. For this example, I wanted the image to display a rounded
    effect, so I used three stop points and colors that shift from darker to lighter,
    and then back to darker.


    **Note**  When placing a gradient over an image, I strongly suggest using a `UIColor`
    method that allows you to specify an alpha value. Alpha values determine the transparency
    of a layer. An alpha value of `0.0` means the layer is completely transparent,
    while an alpha value of `1.0` means the layer is completely opaque. Alternate
    your alpha values to make the gradient effect stronger or weaker in different
    positions, all the while not completing masking your image.


    [Figure 3-9](#9781430250838_Ch03.xhtml#Fig9) shows an example of the output of
    the gradient.


    ![9781430250838_Fig03-09.jpg](images/9781430250838_Fig03-09.jpg)


    [Figure 3-9](#9781430250838_Ch03.xhtml#_Fig9). An image view with a gradient vs.
    an image view with no gradient


    Using gradients, you can create powerful visual effects with only a few simple
    lines of code, helping your images achieve a more realistic sense of lighting.
    Gradients can also accentuate overlays better than drop shadows alone. The effect
    used in this example is the same as the one Facebook uses on its profile pages.


    The sample project that employs gradients is named ImageGradient.


    Making Your Images Move with Your Device


    One of the most visually exciting user interface features that came with iOS 7
    was the ability to add motion effects to any view. *Motion effects* allow you
    to move the view in response to accelerator events, causing an app to feel more
    immersive and accentuate the most important parts of your UI. Apple uses motion
    effects to animate the iOS 7+ home screen, lock screen, alert views, and Safari
    tab browser on the iPhone.


    Apple exposes the ability to access and create motion effects through the `UIMotionEffect`
    abstract class. As an abstract class, it must be subclassed in order to be instantiated.
    Fortunately, however, Apple provides a very simple subclass that moves a view
    horizontally or vertically based on accelerometer changes, called `UIInterpolatingMotionEffect`.


    **Note**  To implement your own completely custom behaviors and advanced animations,
    you subclass `UIMotionEffect` directly, and add your custom logic in the `keyPathsAndRelativeValuesForViewerOffsets:`
    method.


    To use `UIInterpolatingMotionEffect`, you must instantiate an object with a `keyPath`
    representing the `view` property you want to modify based on the motion event
    (for example, the center x position) and the type of motion you want to react
    to (for example, horizontal movement). For many motion effects, you will be exposing
    areas of the view that are hidden, so you must also define relative limits that
    let the motion effect know what these boundaries are. Once you have defined an
    effect, you can add it to a view by using the `[UIView addMotionEffect:]` instance
    method. You can pass this method one `UIMotionEffect` object directly, or a `UIMotionEffectGroup`
    object if you are trying to add multiple effects at one time. [Listing 3-10](#9781430250838_Ch03.xhtml#list10)
    shows an example of adding motion effects to a `UIImageView`.


    [***Listing 3-10***](#9781430250838_Ch03.xhtml#_list10). Adding Motion Effects
    to a UIImageView


    ```

    UIInterpolatingMotionEffect *horizontalEffect = [[UIInterpolatingMotionEffect
    alloc]

                                 initWithKeyPath:@"center.x"

                                 type:UIInterpolatingMotionEffectTypeTiltAlongHorizontalAxis];


    UIInterpolatingMotionEffect *verticalEffect = [[UIInterpolatingMotionEffect alloc]

                                 initWithKeyPath:@"center.y"

                                 type:UIInterpolatingMotionEffectTypeTiltAlongVerticalAxis];


    horizontalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];

    horizontalEffect.maximumRelativeValue  = [NSNumber numberWithInteger:50];


    verticalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];

    verticalEffect.maximumRelativeValue  = [NSNumber numberWithInteger:50];


    //set bg image effects

    [self.backgroundImageView addMotionEffect:horizontalEffect];

    [self.backgroundImageView addMotionEffect:verticalEffect];

    ```


    In [Listing 3-10](#9781430250838_Ch03.xhtml#list10), I set the motion effect on
    the background view. As the intent of a motion effect is to highlight or diminish
    a view in the view hierarchy, it is often appropriate to apply the effect to a
    view that is in the background or an action view in the foreground (for example,
    a `UIAlertView`).


    **Note**  The Reduce Motion switch in iOS’s accessibility screen allows a user
    to disable motion effects across the entire system (including your app). This
    cannot be overridden, so remember to design for this limitation.


    The sample project in the source code bundle that employs motion effects is named
    ImageTilt. As shown in [Figure 3-10](#9781430250838_Ch03.xhtml#Fig10), there are
    no buttons. The input comes from tilting the device. You will notice that the
    image moves, but the label does not.


    ![9781430250838_Fig03-10.jpg](images/9781430250838_Fig03-10.jpg)


    [Figure 3-10](#9781430250838_Ch03.xhtml#_Fig10). The ImageTilt project’s motion
    effects


    Adding Blurring to Your Images


    Another exciting visual effect Apple brought with the design language of iOS 7
    was an emphasis on blurring background images to highlight important parts of
    your user interface. You can see this effect quite frequently when you open Siri,
    as shown in [Figure 3-11](#9781430250838_Ch03.xhtml#Fig11).


    ![9781430250838_Fig03-11.jpg](images/9781430250838_Fig03-11.jpg)


    [Figure 3-11](#9781430250838_Ch03.xhtml#_Fig11). Blur effect in Siri'
  trans: "好的，高级文档工程师和翻译员已就位。以下是按照您的要求翻译后的中文文档。\n\n\n你可以用来在视图上绘制渐变的 Quartz 类是`CAGradientLayer`。它是视图绘制类`CALayer`的子类，旨在根据输入的颜色和颜色停止点绘制渐变。*停止点*决定了各个区域应在何处停止并开始相互交错。你可以使用的颜色或停止点数量没有限制，但应尽量遵循良好的设计原则，实现不分散注意力的渐变。如图\
    \ 3-8 所示，不同数量的停止点可以基于你放置它们的位置以及使用颜色区域的方式，产生截然不同的效果。\n\n![9781430250838_Fig03-08.jpg](img/9781430250838_Fig03-08.jpg)\n\
    \n图 3-8 两个停止点的渐变与三个停止点的渐变对比\n\n代码清单 3-9 展示了向`UIImageView`添加渐变的示例。\n\n***代码清单 3-9***\
    \ 向 UIImageView 添加渐变\n\n```\nUIColor *darkestColor = [UIColor colorWithWhite:0.1f\
    \ alpha:0.7f];\nUIColor *lightestColor = [UIColor colorWithWhite:0.7f alpha:0.1f];\n\
    \nCAGradientLayer *headerGradient = [CAGradientLayer layer];\nheaderGradient.colors\
    \ = [NSArray arrayWithObjects:(id)darkestColor.CGColor,\n                    \
    \     (id)lightestColor.CGColor, (id)darkestColor.CGColor,  nil];\n\nheaderGradient.frame\
    \ = self.headerImageView.bounds;\n[self.headerImageView.layer insertSublayer:headerGradient\
    \ atIndex:0];\n```\n\n**注意**：如果你未定义任何停止点，默认值将均匀分布。\n\n要创建渐变，首先需要创建一个`CAGradientLayer`对象。然后，指定要使用的颜色。在此示例中，我希望图像显示圆角效果，因此我使用了三个停止点，并且颜色从深色过渡到浅色，然后再回到深色。\n\
    \n**注意**：在图像上放置渐变时，我强烈建议使用`UIColor`方法，该方法允许你指定 alpha 值。Alpha 值决定了图层的透明度。Alpha\
    \ 值为`0.0`意味着图层完全透明，而 alpha 值为`1.0`意味着图层完全不透明。交替使用你的 alpha 值，可以使渐变效果在不同位置更强或更弱，同时不会完全遮盖图像。\n\
    \n图 3-9 展示了渐变输出的示例。\n\n![9781430250838_Fig03-09.jpg](img/9781430250838_Fig03-09.jpg)\n\
    \n图 3-9 带有渐变的图像视图与不带渐变的图像视图对比\n\n使用渐变，你可以仅用几行简单的代码创建强大的视觉效果，帮助你的图像实现更逼真的光照感。渐变还能比单纯的投影更好地突出覆盖层。此示例中使用的效果与\
    \ Facebook 在其个人资料页面上使用的效果相同。\n\n使用渐变的示例项目名为`ImageGradient`。\n\n## 让图像随设备移动\n\n\
    iOS 7 带来的最令人兴奋的用户界面功能之一，是能够向任何视图添加动态效果。*动态效果*允许你响应加速器事件移动视图，从而使应用更具沉浸感，并突出 UI\
    \ 中最重要的部分。苹果使用动态效果来制作 iOS 7+ 主屏幕、锁屏、提醒视图以及 iPhone 上的 Safari 标签页浏览器的动画。\n\n苹果通过`UIMotionEffect`抽象类公开了访问和创建动态效果的能力。作为一个抽象类，它必须被子类化才能实例化。然而，幸运的是，苹果提供了一个非常简单的子类，可以根据加速度计的变化水平和垂直移动视图，称为`UIInterpolatingMotionEffect`。\n\
    \n**注意**：要实现你自己的完全自定义行为和高级动画，你可以直接子类化`UIMotionEffect`，并在`keyPathsAndRelativeValuesForViewerOffsets:`方法中添加你的自定义逻辑。\n\
    \n要使用`UIInterpolatingMotionEffect`，你必须实例化一个对象，该对象带有一个`keyPath`，表示你要基于动态事件修改的`view`属性（例如，中心\
    \ x 位置），以及你要响应的动态类型（例如，水平移动）。对于许多动态效果，你将要显示视图的隐藏区域，因此你还必须定义相对限制，让动态效果知道这些边界是什么。定义效果后，你可以通过使用`[UIView\
    \ addMotionEffect:]`实例方法将其添加到视图。你可以直接向此方法传递一个`UIMotionEffect`对象，或者如果你尝试一次添加多个效果，则传递一个`UIMotionEffectGroup`对象。代码清单\
    \ 3-10 展示了向`UIImageView`添加动态效果的示例。\n\n***代码清单 3-10*** 向 UIImageView 添加动态效果\n\n\
    ```\nUIInterpolatingMotionEffect *horizontalEffect = [[UIInterpolatingMotionEffect\
    \ alloc]\n                             initWithKeyPath:@\"center.x\"\n       \
    \                      type:UIInterpolatingMotionEffectTypeTiltAlongHorizontalAxis];\n\
    \nUIInterpolatingMotionEffect *verticalEffect = [[UIInterpolatingMotionEffect\
    \ alloc]\n                             initWithKeyPath:@\"center.y\"\n       \
    \                      type:UIInterpolatingMotionEffectTypeTiltAlongVerticalAxis];\n\
    \nhorizontalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];\n\
    horizontalEffect.maximumRelativeValue  = [NSNumber numberWithInteger:50];\n\n\
    verticalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];\nverticalEffect.maximumRelativeValue\
    \  = [NSNumber numberWithInteger:50];\n\n//set bg image effects\n[self.backgroundImageView\
    \ addMotionEffect:horizontalEffect];\n[self.backgroundImageView addMotionEffect:verticalEffect];\n\
    ```\n\n在代码清单 3-10 中，我设置了背景视图的动态效果。由于动态效果的意图是突出或弱化视图层次结构中的某个视图，因此通常将效果应用于背景中的视图或前景中的动作视图（例如，`UIAlertView`）是合适的。\n\
    \n**注意**：iOS 辅助功能屏幕中的“减弱动态效果”开关允许用户在整个系统范围内（包括你的应用）禁用动态效果。这无法被覆盖，因此请记住针对此限制进行设计。\n\
    \n源代码包中使用动态效果的示例项目名为`ImageTilt`。如图 3-10 所示，没有按钮。输入来自设备的倾斜。你会注意到图像在移动，但标签没有。\n\n\
    ![9781430250838_Fig03-10.jpg](img/9781430250838_Fig03-10.jpg)\n\n图 3-10 ImageTilt\
    \ 项目的动态效果\n\n## 为图像添加模糊效果\n\n苹果在 iOS 7 的设计语言中带来的另一个令人兴奋的视觉效果，是强调模糊背景图像以突出用户界面的重要部分。当你打开\
    \ Siri 时，可以非常频繁地看到这种效果，如图 3-11 所示。\n\n![9781430250838_Fig03-11.jpg](img/9781430250838_Fig03-11.jpg)\n\
    \n图 3-11 Siri 中的模糊效果\n"
- fmt: '创建模糊背景所需的许多核心概念都利用了创建图形上下文来操作图像，然后使用`CGAffineTransform`修改源图像。Apple 倾向于使用*高斯模糊*效果，这种效果通过数学运算平滑图像，从而减少细节。幸运的是，Apple
    在 2013 年 Apple 全球开发者大会（WWDC）上为`UIImage`创建了一个名为`UIImage+ImageEffects.h`的分类类，它管理用于计算的图形上下文，执行模糊函数，并返回结果。我已将`ImageEffects`分类包含在本章的示例代码中。你也可以在
    iOS Dev Center 上搜索 WWDC 课程“Implementing Engaging UI on iOS”找到它。


    iOS 中的*分类*允许你在不子类化的情况下扩展一个类。分类允许你编写非常小的文件，这些文件可以为现有类添加多个方法，以增加功能。


    要使用`ImageEffects`分类，你需要在你的类中包含`UIImage+ImageEffects.h`。然后，你可以像使用其他`UIImage`方法一样使用它提供的额外方法。[图
    3-12](#9781430250838_Ch03.xhtml#Fig12) 比较了每种模糊效果提供的结果。


    ![9781430250838_Fig03-12.jpg](images/9781430250838_Fig03-12.jpg)


    [图 3-12](#9781430250838_Ch03.xhtml#_Fig12). 同一张图片上的 Extra Light Effect 模糊、Light
    Effect 模糊和 Dark Effect 模糊


    你应该使用的模糊效果取决于你的用户界面和图像的颜色。对于浅色图像，最好使用`[UIImage applyLightEffect:]`，而`[UIImage
    applyDarkEffect:]`更适合深色图像。如你所见，选择效果只需一行代码：


    ```

    UIImage *blurredImage = [self.originalImage applyLightEffect];

    ```


    为图像添加模糊效果的示例项目名为 ImageBlur。如[图 3-13](#9781430250838_Ch03.xhtml#Fig13)所示，该项目有三个按钮，用于在模糊类型之间切换。我强烈建议使用你自己的一些图像测试该项目，看看模糊效果如何影响它们。


