  raw: 'When your app receives an update, you should display the updated step count
    in the Workout Progress label. The `CMPedometerData` class, which represents pedometer
    events, makes this easy, by declaring the `numberOfSteps` property as an `NSNumber`
    object. You display this value by calling the `[NSNumber intValue]` method to
    get the value as an `int` and then including it in a string:


    ```

    NSString *workoutProgressString = [NSString string withFormatter:"%ld steps",

        [pedometerData.numberOfSteps intValue]];

    self.workoutProgressLabel.text = workoutProgressString;

    ```


    Before adding this to your handler method, you need to account for one complication:
    blocks always execute in the *background*, while the user interface always executes
    on the main thread. To close this gap, use the `dispatch_async` `(dispatch_queue_t
    queue, dispatch_block_t block)` method to update the `workProgressLabel` object
    on the main queue. The first parameter of `dispatch_async()` takes a queue object,
    and the second parameter takes a block. By passing `dispatch_get_main_queue()`
    as your queue, you can automatically retrieve a pointer to the main queue of execution:


    ```

    dispatch_async(dispatch_get_main_queue(), ^{

        self.workoutProgressLabel.text =

        [NSString stringWithFormat:@"%ld steps",

        [pedometerData.numberOfSteps integerValue]];

        });

    ```


    You can find the complete implementation for the MyFitnessPod project in [Listing
    13-6](#9781430250838_Ch13.xhtml#list6).


    [***Listing 13-6***](#9781430250838_Ch13.xhtml#_list6). Pedometer Update Block,
    Including User Interface Changes


    ```

    -(IBAction)toggleWorkout:(id)sender

    {

        if (self.isWorkoutActive) {

            //stop workout


    } else {

            //start workout


    if ([CMMotionActivityManager isActivityAvailable] &&

                [CMPedometer isStepCountingAvailable]) {

                self.pedometer = [[CMPedometer alloc] init];

                self.isWorkoutActive = YES;

                self.startDate = [NSDate date];

                self.workoutProgressLabel.text = @"0 steps";

                self.workoutButton.titleLabel.text = @"Stop Workout";

                [self.pedometer

                    startPedometerUpdatesFromDate:self.startDate

                    withHandler:^(CMPedometerData *pedometerData,

                    NSError *error) {


    NSLog(@"number of steps: %ld",

                        [pedometerData.numberOfSteps integerValue]);

                    dispatch_async(dispatch_get_main_queue(), ^{

                        self.workoutProgressLabel.text =

                        [NSString stringWithFormat:@"%ld steps",

                        [pedometerData.numberOfSteps integerValue]];

                    });

                }];


    } else {

                UIAlertView *errorAlert = [[UIAlertView alloc]

                    initWithTitle:@"Error"

                    message:@"Motion permission required"

                    delegate:self

                    cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [errorAlert show];

            }

        }


    }

    ```


    Integrating Background Updates


    The 800-pound gorilla of any app is its background functionality. With workout
    apps, this becomes even more critical, because users are likely to be busy for
    30 minutes or longer (well beyond the sleep setting for most iOS devices). The
    good news is that, because you initialize the `[CMPedometer startPedometerUpdatesFromDate:withHandler]`
    method with a start time, backgrounding your application will not prevent the
    method from returning accurate information when it returns to the foreground (the
    updates will still be compared to the original time you provided).


    The issue you run into with background updates is one of user-interface initialization.
    It does not make sense to update the user interface while the application is backgrounded,
    because users will never see that information. However, at the same time, you
    don’t want users to come back to the application and still see their old workout
    progress on the screen (as it would be until the next update). To solve this problem,
    use the pull mechanism of the `CMPedometer` class to retrieve the user’s steps
    as soon as the application returns to the foreground.


    For the `MainViewController` class, you can use the `[self viewDidAppear:]` method
    to handle this event. The `[self viewDidAppear:]` event gets called whenever the
    view appears, regardless of whether the appearance results from the app returning
    from the background, from being initialized for the first time, or from another
    view disappearing. As shown in [Listing 13-7](#9781430250838_Ch13.xhtml#list7),
    by checking whether the workout is already active, you can query for these updates
    only after a workout has started.


    [***Listing 13-7***](#9781430250838_Ch13.xhtml#_list7). Preparing for Background
    Updates


    ```

    - (void)viewDidAppear:(BOOL)animated

    {

        if (self.isWorkoutActive)  {

            [self.pedometer queryPedometerDataFromDate:self.startDate

                toDate:[NSDate date] withHandler:^(CMPedometerData

                *pedometerData, NSError *error) {


    NSLog(@"number of steps: %ld", [pedometerData.numberOfSteps integerValue]);

               dispatch_async(dispatch_get_main_queue(), ^{


    self.workoutProgressLabel.text = [NSString

                        stringWithFormat:@"%ld steps",

                        [pedometerData.numberOfSteps integerValue]];

                });

            }];

        }

    }

    ```


    The pull method for the `CMPedometer` class is `[CMPedometer queryPedometerDataFromDate:toDate:withHandler:]`,
    which takes two dates and a completion handler as its inputs. For the *start date*,
    use the start time for the pedometer, For the *end date*, use the current time—the
    time when the application is returning to the foreground. To maintain the start
    date, add an instance variable to your class:


    ```

    @property (nonatomic, strong) NSDate *startDate;

    ```


    Next, when you click the Start Workout button, add an extra step to save the `startDate`,
    as shown in [Listing 13-8](#9781430250838_Ch13.xhtml#list8).


    [***Listing 13-8***](#9781430250838_Ch13.xhtml#_list8). Saving the Start Date
    of a Workout


    ```

    -(IBAction)toggleWorkout:(id)sender

    {

        if (self.isWorkoutActive) {

            //stop workout


    } else {

            //start workout


    if ([CMMotionActivityManager isActivityAvailable] &&

                [CMPedometer isStepCountingAvailable]) {

                self.pedometer = [[CMPedometer alloc] init];

                self.isWorkoutActive = YES;

                self.startDate = [NSDate date];

                self.workoutProgressLabel.text = @"0 steps";

                self.workoutButton.titleLabel.text = @"Stop Workout";

                [self.pedometer startPedometerUpdatesFromDate:self.startDate

                    withHandler:^(CMPedometerData *pedometerData,

                    NSError *error) {


    NSLog(@"number of steps: %ld",

                        [pedometerData.numberOfSteps integerValue]);

                    dispatch_async(dispatch_get_main_queue(), ^{

                        self.workoutProgressLabel.text =

                        [NSString stringWithFormat:@"%ld steps",

                        [pedometerData.numberOfSteps integerValue]];

                    });

                }];


    } else {

                UIAlertView *errorAlert = [[UIAlertView alloc]

                    initWithTitle:@"Error"

                    message:@"Motion permission required"

                    delegate:self

                    cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [errorAlert show];

            }

        }


    }

    ```'
