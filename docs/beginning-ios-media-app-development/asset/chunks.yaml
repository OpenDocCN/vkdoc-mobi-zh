    为图像添加模糊效果的示例项目名为 ImageBlur。如图 3-13 所示，该项目有三个按钮，用于在模糊类型之间切换。我强烈建议使用你自己的一些图像测试该项目，看看模糊效果如何影响它们。


    ![9781430250838_Fig03-13.jpg](img/9781430250838_Fig03-13.jpg)


    图 3-13. ImageBlur 项目


    ## 总结


    在本章中，你了解了如何利用图形上下文的画布般能力来操作图像。接着，你学习了如何将图像导出到文件和相册，以便稍后重用或与其他应用共享。为了让你的应用更快，你了解了如何在不阻塞用户界面的情况下从互联网加载图像。最后，你开始看到如何使用
    Apple 的许多视觉效果方法为图像增加额外的深度感。


    # 第 4 章：高级照片界面


    在本章中，你将通过构建自己的图像捕获和照片选择器类（类似于`UIImagePickerController`提供的默认类）来探索更底层的相机编程主题。在此过程中，你将了解如何配置硬件相机进行图像捕获，如何直接从“照片”应用访问照片，以及如何在用户界面中呈现这些原始数据。


    你将使用`UIImagePickerController`作为功能参考，因此如果你不确定如何呈现该类或处理其输出，最好回顾第 2 章。


    虽然复制 iOS 已提供的功能似乎工作量很大，但拥有一个与应用其余部分风格迥异的相机界面，或者一个不允许用户修改以改善照片质量的界面，会极大地影响你的功能并赶走用户。


    ## 构建自定义相机界面


    第一个练习是复制`UIImagePickerController`提供的基本图像捕获界面。如图 4-1 所示，该项目使用了非标准界面，并公开了扩展的硬件控制集。


    ![9781430250838_Fig04-01.jpg](img/9781430250838_Fig04-01.jpg)


    图 4-1. 具有自定义用户界面的相机控制器模型


    为实现这一点，应用必须能够执行以下操作：


    *   发现并配置相机硬件

    *   显示来自相机的实时数据流

    *   从 UI 修改捕获设置

    *   当用户点击“拍照”按钮时捕获图片


    理想情况下，你应该使用一个允许你配置相机“对象”并访问其生成的数据流的类。同时，你不想自己编写硬件驱动程序，因此最好使用能抽象这一层的工具。幸运的是，`AVFoundation`框架中包含了该功能，它是
    Cocoa Touch 的一部分。


    顾名思义，`AVFoundation`是 Apple 的媒体框架之一，用于捕获、操作和存储音频和视频资源。`AVFoundation`中的视频捕获 API
    允许你访问来自相机的原始视频流，并为硬件控制（如闪光灯或自动对焦）提供高级配置功能。


    你可以通过以下方式从视频流构建图像捕获接口：记住视频流只不过是一系列称为*帧*的图像。要捕获图像，你只需从视频中提取一帧。为确保结果准确，你需要在图像对焦时提取帧。


    在本节中，你将了解如何使用`AVFoundation`设置相机、显示实时流以及根据用户界面事件捕获帧或更改设置。为了加快工作流程，本节使用 storyboards
    和 Interface Builder 来构建用户界面。


    与本书之前的练习一样，你可以在 Apress 网站（`www.apress.com`）的“源代码/下载”区域找到该项目的源代码，位于第 4 章文件夹下。该应用的名为
    MyCamera。


    ### 初始化硬件接口


    在你的应用尝试访问共享资源（如硬件）或执行失败可能性很高的操作时，Apple 建议使用*会话*设计模式。该模式通过会话对象管道传输所有操作，提供了错误减少和流量控制功能，例如信号量。会话还通过简化复杂接口的设置和拆除流程来减少错误。你将在访问音频硬件或执行网络操作时看到这种设计模式的使用。


    要开始在项目中使用`AVFoundation`类，你需要将框架添加到项目中，并在任何使用它的类中包含它。向项目添加框架最简单的方法是将其添加到应用的“已链接的框架和库”数组中。你可以通过单击
    Xcode 项目导航器中的项目名称，然后滚动到“通用”选项卡底部来修改此数组，如图 4-2 所示。


    ![9781430250838_Fig04-02.jpg](img/9781430250838_Fig04-02.jpg)


    图 4-2. 查找“已链接的框架和库”数组


    你可以通过单击“已链接的框架和库”窗格底部的加号按钮来选择要添加的框架。执行此操作会显示一个导航器，显示你开发计算机上安装的框架。你可以通过输入所需框架的名称进一步过滤列表。选择一个框架，然后单击“添加”按钮将其添加到项目（参见图
    4-3）。


    ![9781430250838_Fig04-03.jpg](img/9781430250838_Fig04-03.jpg)


    ```'
- fmt: "# Figure 4-3. Xcode’s framework picker\n\nAfter adding the `AVFoundation`\
    \ framework to your project, you include it in your file by adding it to the top\
    \ of the header file for each class that uses it. The header file for the MyCamera\
    \ application is `ViewController.h`:\n\n```\n#include <AVFoundation/AVFoundation.h>\n\
    ```\n\nThe `AVFoundation` class you need to manage hardware sessions is called\
    \ `AVCaptureSession`. This class manages the hardware interfaces and provides\
    \ high-level start and stop operations. Instantiating a session object is very\
    \ easy; just call the `init` method on the `AVCaptureSession` object:\n\n```\n\
    AVCaptureSession *session = [[AVCaptureSession alloc] init];\n```\n\n**Note**\
    \ You will need to share your session object with all classes trying to access\
    \ it in the app, so remember to declare it as an instance variable or singleton.\n\
    \nWhen you are ready to use hardware devices through the session, you add them\
    \ as *inputs*. This is a two-step process: first you identify the hardware device\
    \ you want to use, and then you configure it to send its data to your session.\
    \ Hardware devices are represented by the `AVCaptureDevice` class, through which\
    \ you can query for device permissions and hardware availability, and configure\
    \ capture settings for the device.\n\nBefore you can start sending commands to\
    \ a device, you need to discover it. You use the `[AVCaptureDevice defaultDeviceWithMediaType:]`\
    \ class method to discover the default hardware device for a specific media type.\
    \ Use the `AVMediaTypeVideo` constant to specify video devices:\n\n```\nAVCaptureDevice\
    \ *camera = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\
    \n**Note** To discover all devices that match a type, use the `[AVCaptureDevice\
    \ devicesWithMediaType:]` class method. In order to match a specific property\
    \ (such as camera positions), you will need to iterate through the results. You\
    \ can use the `position` property to determine if a camera is on the front or\
    \ rear of the device.\n\nAfter finding a device, you need to add it to your session.\
    \ To configure a device for use with `AVCaptureSession`, you need to instantiate\
    \ it as an `AVDeviceCaptureInput` object. `AVDeviceCaptureInput` attempts to initialize\
    \ the hardware device and returns an object if it succeeds, or an `NSError` if\
    \ it fails. After the object is ready, use the `[AVCaptureSession canAddInput:]`\
    \ method to make sure the device is available for use by your application, and\
    \ then call the `[AVCaptureSession addInput:]` instance method to add it to your\
    \ session. You can find an example that illustrates this process in Listing 4-1.\n\
    \n## Listing 4-1. Adding a Camera Input\n\n```\nNSError *error = nil;\nAVCaptureDeviceInput\
    \ *cameraInput = [AVCaptureDeviceInput\n                                     deviceInputWithDevice:camera\n\
    \                                     error:&error];\n\nif (error == nil && [self.session\
    \ canAddInput:cameraInput]) {\n    [self.session addInput:cameraInput];\n}\n```\n\
    \n**Caution** To reduce errors, you should always make sure an input is available\
    \ before trying to add it. Remember, the camera is a shared resource, and you\
    \ need to play nice with others!\n\n# Accessing the Live Camera Feed\n\nAfter\
    \ establishing an interface to the camera hardware, you need some way of displaying\
    \ the output on the screen. To display the live video feed, you need to perform\
    \ three steps:\n\n1.  Access the data source containing the live video stream.\n\
    2.  Place the video stream on a view.\n3.  Start the stream.\n\nThe `AVFoundation`\
    \ class responsible for mirroring the video output from a session is `AVCaptureVideoPreviewLayer`.\
    \ This class is a subclass of `CALayer`, more commonly known as a Core Animation\
    \ Layer. Core Animation Layers are the backing class to which you send image data\
    \ before painting it on the screen. Layers represent content, while views represent\
    \ where the content will be displayed."
  raw: '[Figure 4-3](#9781430250838_Ch04.xhtml#_Fig3). Xcode’s framework picker


    After adding the `AVFoundation` framework to your project, you include it in your
    file by adding it to the top of the header file for each class that uses it. The
    header file for the MyCamera application is `ViewController.h`:


    ```

    #include <AVFoundation/AVFoundation.h>

    ```


    The `AVFoundation` class you need to manage hardware sessions is called `AVCaptureSession`.
    This class manages the hardware interfaces and provides high-level start and stop
    operations. Instantiating a session object is very easy; just call the `init`
    method on the `AVCaptureSession` object:


    ```

    AVCaptureSession *session = [[AVCaptureSession alloc] init];

    ```


    **Note**  You will need to share your session object with all classes trying to
    access it in the app, so remember to declare it as an instance variable or singleton.


    When you are ready to use hardware devices through the session, you add them as
    *inputs*. This is a two-step process: first you identify the hardware device you
    want to use, and then you configure it to send its data to your session. Hardware
    devices are represented by the `AVCaptureDevice` class, through which you can
    query for device permissions and hardware availability, and configure capture
    settings for the device.


    Before you can start sending commands to a device, you need to discover it. You
    use the `[AVCaptureDevice defaultDeviceWithMediaType:]` class method to discover
    the default hardware device for a specific media type. Use the `AVMediaTypeVideo`
    constant to specify video devices:


    ```

    AVCaptureDevice *camera = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];

    ```


    **Note**  To discover all devices that match a type, use the `[AVCaptureDevice
    devicesWithMediaType:]` class method. In order to match a specific property (such
    as camera positions), you will need to iterate through the results. You can use
    the `position` property to determine if a camera is on the front or rear of the
    device.


    After finding a device, you need to add it to your session. To configure a device
    for use with `AVCaptureSession`, you need to instantiate it as an `AVDeviceCaptureInput`
    object. `AVDeviceCaptureInput` attempts to initialize the hardware device and
    returns an object if it succeeds, or an `NSError` if it fails. After the object
    is ready, use the `[AVCaptureSession canAddInput:]` method to make sure the device
    is available for use by your application, and then call the `[AVCaptureSession
    addInput:]` instance method to add it to your session. You can find an example
    that illustrates this process in [Listing 4-1](#9781430250838_Ch04.xhtml#list1).


    [***Listing 4-1***](#9781430250838_Ch04.xhtml#_list1). Adding a Camera Input


    ```

    NSError *error = nil;

    AVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput

                                         deviceInputWithDevice:camera

                                         error:&error];


    if (error == nil && [self.session canAddInput:cameraInput]) {

        [self.session addInput:cameraInput];

    }

    ```


    **Caution**  To reduce errors, you should always make sure an input is available
    before trying to add it. Remember, the camera is a shared resource, and you need
    to play nice with others!


    Accessing the Live Camera Feed


    After establishing an interface to the camera hardware, you need some way of displaying
    the output on the screen. To display the live video feed, you need to perform
    three steps:


    1.  Access the data source containing the live video stream.

    2.  Place the video stream on a view.

    3.  Start the stream.


    The `AVFoundation` class responsible for mirroring the video output from a session
    is `AVCaptureVideoPreviewLayer`. This class is a subclass of `CALayer`, more commonly
    known as a Core Animation Layer. Core Animation Layers are the backing class to
    which you send image data before painting it on the screen. Layers represent content,
    while views represent where the content will be displayed.'
  trans: "\n# 图 4-3. Xcode 的框架选择器\n\n在将 `AVFoundation` 框架添加到项目后，你需要在使用该框架的每个类的头文件顶部添加包含语句来将其引入你的文件。MyCamera\
    \ 应用程序的头文件为 `ViewController.h`：\n\n```\n#include <AVFoundation/AVFoundation.h>\n\
    ```\n\n你用于管理硬件会话的 `AVFoundation` 类名为 `AVCaptureSession`。该类负责管理硬件接口，并提供高级别的启动和停止操作。实例化一个会话对象非常简单，只需调用\
    \ `AVCaptureSession` 对象的 `init` 方法：\n\n```\nAVCaptureSession *session = [[AVCaptureSession\
    \ alloc] init];\n```\n\n**注意** 你需要在应用中与所有试图访问该会话对象的类共享它，因此请记得将其声明为实例变量或单例。\n\n\
    当你准备通过会话使用硬件设备时，需要将它们作为*输入*添加。这分为两个步骤：首先识别你想要使用的硬件设备，然后将其配置为向你的会话发送数据。硬件设备由 `AVCaptureDevice`\
    \ 类表示，通过该类你可以查询设备权限和硬件可用性，并为设备配置采集设置。\n\n在开始向设备发送命令之前，你需要先发现该设备。使用 `[AVCaptureDevice\
    \ defaultDeviceWithMediaType:]` 类方法发现特定媒体类型的默认硬件设备。使用 `AVMediaTypeVideo` 常量指定视频设备：\n\
    \n```\nAVCaptureDevice *camera = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    ```\n\n**注意** 若要发现所有符合某类型的设备，请使用 `[AVCaptureDevice devicesWithMediaType:]` 类方法。为了匹配特定属性（例如摄像头位置），你需要遍历结果。你可以使用\
    \ `position` 属性来判断摄像头位于设备正面还是背面。\n\n找到设备后，你需要将其添加到会话中。要将设备配置为与 `AVCaptureSession`\
    \ 一起使用，你需要将其实例化为 `AVDeviceCaptureInput` 对象。`AVDeviceCaptureInput` 会尝试初始化硬件设备，如果成功则返回一个对象，如果失败则返回\
    \ `NSError`。对象就绪后，使用 `[AVCaptureSession canAddInput:]` 方法确认该设备可供你的应用程序使用，然后调用\
    \ `[AVCaptureSession addInput:]` 实例方法将其添加到会话中。你可以在代码清单 4-1 中找到说明此过程的示例。\n\n##\
    \ 代码清单 4-1. 添加摄像头输入\n\n```\nNSError *error = nil;\nAVCaptureDeviceInput *cameraInput\
    \ = [AVCaptureDeviceInput\n                                     deviceInputWithDevice:camera\n\
    \                                     error:&error];\n\nif (error == nil && [self.session\
    \ canAddInput:cameraInput]) {\n    [self.session addInput:cameraInput];\n}\n```\n\
    \n**警告** 为减少错误，在尝试添加输入之前，应始终确保该输入可用。请记住，摄像头是共享资源，你需要与其他应用和谐共处！\n\n# 访问实时摄像头画面\n\
    \n在建立与摄像头硬件的接口后，你需要某种方式将输出显示在屏幕上。要显示实时视频画面，你需要执行三个步骤：\n\n1.  访问包含实时视频流的数据源。\n\
    2.  将视频流放置到视图上。\n3.  启动流。\n\n`AVFoundation` 中负责镜像会话视频输出的类是 `AVCaptureVideoPreviewLayer`。该类是\
    \ `CALayer` 的子类，通常被称为**核心动画层**。核心动画层是一种后台类，你在将图像数据绘制到屏幕之前会将其发送给该类。层代表内容，而视图则代表内容将显示的位置。\n"
- fmt: "Much like cels in traditional animation, you can combine layers to represent\
    \ more-complicated data, or you can move them around independently. Because video\
    \ streams are inherently a quickly changing series of images, it makes more sense\
    \ from a performance standpoint to write the content directly to a layer, rather\
    \ than tearing down views for every frame change.\n\nYou instantiate the `AVCapturePreviewLayer`\
    \ object by calling the `[AVCapturePreviewLayer initWithSession:]` constructor\
    \ method, passing in your session object as the input parameter:\n\n```\nAVCaptureVideoPreviewLayer\
    \ *previewLayer =\n     [[AVCaptureVideoPreviewLayer alloc] initWithSession:self.session];\n\
    ```\n\nTo correctly display a layer, you need to specify its dimensions and position.\
    \ For the `MyCamera` project, you will use a `UIView` property called `previewView`\
    \ to display the camera live feed. To center the video layer on this view and\
    \ give it the same bounds, you can use the following snippet:\n\n```\nCGRect layerRect\
    \ = self.previewView.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \    CGRectGetMidY(layerRect));\n[previewLayer setBounds:layerRect];\n[previewLayer\
    \ setPosition:layerCenter];\n```\n\nTo display the video layer, however, you need\
    \ to give the layer a drawing target. You want to draw the video on the view,\
    \ so add the preview layer as a sublayer on top of the view:\n\n```\n[self.previewView.layer\
    \ addSublayer:previewLayer];\n```\n\nBy default, the preview layer resizes the\
    \ camera output to fit within its container frame, while preserving aspect ratio.\
    \ By setting the `videoGravity` property to `AVLayerVideoGravityResize`, you can\
    \ change the scaling to aspect fill:\n\n```\n[previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
    ```\n\nThe final step is to start the stream, which you do by calling the `[AVCaptureSession\
    \ startRunning]` method on the session object:\n\n```\n[self.session startRunning];\n\
    ```\n\nThe complete camera setup code for the `ViewController` class is in [Listing\
    \ 4-2](#9781430250838_Ch04.xhtml#list2). It is wrapped in the `[self viewDidLoad:]`\
    \ method because you need to initialize the camera when the view is initialized.\n\
    \n[**Listing 4-2**](#9781430250838_Ch04.xhtml#_list2). Initializing the Camera\
    \ Input\n\n```\n- (void)viewDidLoad\n{\n        [super viewDidLoad];\n       \
    \     // Do any additional setup after loading the view.\n        self.session\
    \ = [[AVCaptureSession alloc] init];\n        AVCaptureDevice *camera = [AVCaptureDevice\n\
    \            defaultDeviceWithMediaType:AVMediaTypeVideo];\n        NSError *error\
    \ = nil;\n\nAVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput\n      \
    \       deviceInputWithDevice:camera error:&error];\n\nif (error == nil && [self.session\
    \ canAddInput:cameraInput]) {\n             [self.session addInput:cameraInput];\n\
    \nAVCaptureVideoPreviewLayer *previewLayer =\n                [[AVCaptureVideoPreviewLayer\
    \ alloc]\n                  initWithSession:self.session];\n\nCGRect layerRect\
    \ = self.previewView.bounds;\n            CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \                                  CGRectGetMidY(layerRect));\n\n[previewLayer\
    \ setBounds:layerRect];\n            [previewLayer setPosition:layerCenter];\n\
    \n[previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\n[self.previewView.layer\
    \ addSublayer:previewLayer];\n\n[self.session startRunning];\n    }\n}\n```\n\n\
    ## Capturing a Still Image\n\nSimilarly to the way you added an *input* to the\
    \ `AVCaptureSession` to determine the input device, you need to add an *output*\
    \ to determine how to export data. For this example, you want to export a photo—represented\
    \ as a single frame of video—when the user is ready.\n\nThe base class for `AVCaptureSession`\
    \ output objects is `AVCaptureOutput`, however, as an abstract class that specifies\
    \ only what information is required for a capture object. Luckily, though, `AVFoundation`\
    \ comes with a number of `AVCaptureObject` subclasses you can use for desired\
    \ export formats. Several of the most popular subclasses are enumerated in [Table\
    \ 4-1](#9781430250838_Ch04.xhtml#Tab1)."
  raw: 'Much like cels in traditional animation, you can combine layers to represent
    more-complicated data, or you can move them around independently. Because video
    streams are inherently a quickly changing series of images, it makes more sense
    from a performance standpoint to write the content directly to a layer, rather
    than tearing down views for every frame change.


    You instantiate the `AVCapturePreviewLayer` object by calling the `[AVCapturePreviewLayer
    initWithSession:]` constructor method, passing in your session object as the input
    parameter:


    ```

    AVCaptureVideoPreviewLayer *previewLayer =

         [[AVCaptureVideoPreviewLayer alloc] initWithSession:self.session];

    ```


    To correctly display a layer, you need to specify its dimensions and position.
    For the MyCamera project, you will use a `UIView` property called `previewView`
    to display the camera live feed. To center the video layer on this view and give
    it the same bounds, you can use the following snippet:


    ```

    CGRect layerRect = self.previewView.bounds;

    CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),

        CGRectGetMidY(layerRect));

    [previewLayer setBounds:layerRect];

    [previewLayer setPosition:layerCenter];

    ```


    To display the video layer, however, you need to give the layer a drawing target.
    You want to draw the video on the view, so add the preview layer as a sublayer
    on top of the view:


    ```

    [self.previewView.layer addSublayer:previewLayer];

    ```


    By default, the preview layer resizes the camera output to fit within its container
    frame, while preserving aspect ratio. By setting the `videoGravity` property to  `AVLayerVideoGravityResize`,
    you can change the scaling to aspect fill:


    ```

    [previewLayer setVideoGravity:AVLayerVideoGravityResize];

    ```


    The final step is to start the stream, which you do by calling the `[AVCaptureSession
    startRunning]` method on the session object:


    ```

    [self.session startRunning];

    ```


    The complete camera setup code for the `ViewController` class is in [Listing 4-2](#9781430250838_Ch04.xhtml#list2).
    It is wrapped in the `[self viewDidLoad:]` method because you need to initialize
    the camera when the view is initialized.


    [***Listing 4-2***](#9781430250838_Ch04.xhtml#_list2). Initializing the Camera
    Input


    ```

    - (void)viewDidLoad

    {

            [super viewDidLoad];

                // Do any additional setup after loading the view.

            self.session = [[AVCaptureSession alloc] init];

            AVCaptureDevice *camera = [AVCaptureDevice

                defaultDeviceWithMediaType:AVMediaTypeVideo];

            NSError *error = nil;


    AVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput

                 deviceInputWithDevice:camera error:&error];


    if (error == nil && [self.session canAddInput:cameraInput]) {

                 [self.session addInput:cameraInput];


    AVCaptureVideoPreviewLayer *previewLayer =

                    [[AVCaptureVideoPreviewLayer alloc]

                      initWithSession:self.session];


