    Streaming Music


    Now that you know how to play audio files and iPod media in your apps, it is time
    to explore another major audio source: streaming audio services. Many radio stations
    offer online versions of their broadcasts, and a great number of radio stations
    operate online only. The technology is called *streaming* *audio* because, instead
    of downloading a file, you connect to a server that broadcasts a continuous *stream*
    of audio data to anyone who connects (also known as *multicasting*). The stream
    is generally encoded in one of the same compression formats (codecs) that audio
    files use (for example, MP3, OGG, or others), but unlike a file, it does not have
    a beginning or terminating header. On the player side, when an application connects
    to a stream, it saves the data to a bucket in memory called a *buffer*. Playback
    begins when the buffer has collected enough data to play back audio (or video)
    continuously.


    Using the `AVPlayer` class, you can access the `AVFoundation` framework’s streaming
    audio player. The `AVAudioPlayer` class you used previously for audio file playback
    does not support buffer management, making it a poor choice for streaming audio.
    Conveniently, the `AVPlayer` class follows many of the same design patterns of
    the `AVAudioPlayer` and `MPMusicPlayerController` classes, meaning you can reuse
    the same general logic for playback.


    To integrate streaming radio services in your app, you can modify the MyPlayer
    app from [Chapter 5](#9781430250838_Ch05.xhtml), converting it to use streaming
    audio instead of audio files. You will simplify the user interface to look like
    the mock-up in [Figure 6-4](#9781430250838_Ch06.xhtml#Fig4), reducing the controls
    to a Play button, and an alert box where users can enter a stream URL. This project
    is included in the `Chapter 6` folder of the source code bundle as the MyStreamingPlayer
    project.


