- fmt: '对于静态图像，你可以通过曝光来调整拍摄图像的亮度或暗度，而无需使用闪光灯。作为构图过程的一部分，你允许用户指定曝光是否应随焦点选择的变化而自动变化，还是应基于先前选择保持固定。这样，当用户重新调整焦点时，他们可以看到图像变亮/变暗或维持当前亮度设置。不幸的是，一切都有权衡，当你为图像增加或减少光线时，往往也在增加或减少细节。这可能导致传感器产生大量噪声，但你可以通过重新对焦或调整曝光设置来补偿。然而，在拍摄视频时，你不想在拍摄过程中重新对焦或大幅改变曝光设置，因为这两种变化都会产生不自然的效果，大多数人会觉得分散注意力。


    为了在视频拍摄的光线调整过程中补偿图像质量的变化，你将在拍摄界面中启用一个低光增强控制，以替代曝光模式。低光设置指示`AVCaptureDevice`类根据环境光线自动提亮或调暗场景——这与曝光模式不同，后者基于当前焦点改变设置。如果用户选择禁用低光增强，相机在录制期间将不会调整场景的光线。


    你通过`automaticallyEnablesLowLightBoostWhenAvailable`方法控制`AVCaptureDevice`的低光设置（增强开启或关闭）。顾名思义，输入是一个`BOOL`，意味着用户只能启用或禁用此设置。


    与所有拍摄设置一样，在提交更改时，你需要锁定设备并确保硬件支持这些设置。要查询设备是否支持低光增强模式，请使用`lowLightSupported`属性。[Listing
    10-12](#9781430250838_Ch10.xhtml#list12)展示了低光模式按钮的处理程序。


    [***Listing 10-12***](#9781430250838_Ch10.xhtml#_list12). 低光模式按钮的处理程序


