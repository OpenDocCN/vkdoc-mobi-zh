    [Figure 14-5](#9781430250838_Ch14.xhtml#_Fig5). Objective-C bridging header prompt


    An *Objective-C bridging header* is a special header file that gives the compiler
    a list of Objective-C header files to expose to Swift classes. This works as a
    universal header file, similar to a PCH (precompiled header) file. Add classes
    by `#import`ing them. For the SwiftAVPlayer project, the only class you need to
    import is `FileViewController`. Add the following `#import` statement to the `SwiftAVPlayer-Bridging-Header.h`
    file in your project:


    ```

    #import "FileViewController.h"

    ```


    If you wanted to import more Objective-C classes (including third-party components)
    into your project, you would follow the same steps, making sure you add all of
    the classes to your bridging header file. You do not need to add any Cocoa Touch
    classes to this bridging header file, because Apple has already taken care of
    this for you.


    Building a Storyboard


    The process of building a storyboard for a Swift-based project is exactly the
    same as that of building a storyboard for a project based on Objective-C, except
    that you need some additional configuration to use imported Objective-C classes.
    All the Interface Builder features you are already familiar with, including the
    Attributes Editor, Object Library, and View Hierarchy, are available for your
    Swift-based projects.


    For the MySwiftAVPlayer project, build the storyboard shown in [Figure 14-6](#9781430250838_Ch14.xhtml#Fig6).


    ![9781430250838_Fig14-06.jpg](images/9781430250838_Fig14-06.jpg)


