  trans: "\n您可以使用 `[UIGestureRecognizer locationInView:]` 方法来获取触摸事件的 `x` 和 `y` 坐标，这些坐标是相对于您作为输入参数传入的视图的原点。\n\
    \n要将相机配置为对焦到特定点，请使用实例方法 `[AVCaptureDevice setFocusPointOfInterest:focusPoint]`。输入参数是一个\
    \ `CGPoint` 对象，其 `x` 和 `y` 值介于 0.0 和 1.0 之间，对应于焦点在画面内的相对位置。例如，值 `(0.5, 0.75)`\
    \ 将使焦点在水平方向上居中，并在垂直方向上将其放置在画面底部以上四分之一处。\n\n您可以通过将触摸事件的 `x` 位置除以画面的宽度，并将触摸事件的 `y`\
    \ 位置除以画面的高度，将手势识别器的触摸坐标从绝对位置转换为相对位置，如代码清单 4-18 所示。\n\n**代码清单 4-18**。将绝对位置转换为相对位置\n\
    \n```\nCGPoint tapPoint = [gestureRecognizer\n                    locationInView:gestureRecognizer.view];\n\
    CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\nCGFloat relativeY\
    \ = tapPoint.y / self.previewView.frame.size.height;\nCGPoint focusPoint = CGPointMake(relativeX,\
    \ relativeY);\n```\n\n最后，通过将位置代码和拍摄设置配置代码添加到手势识别器处理程序中，将所有内容整合在一起，如代码清单 4-19 所示。\n\
    \n**代码清单 4-19**。从轻触手势处理程序设置焦点\n\n```\n-(void)didTapPreview:(UIGestureRecognizer\
    \ *)gestureRecognizer\n{\n    CGPoint tapPoint = [gestureRecognizer\n        locationInView:gestureRecognizer.view];\n\
        CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\n    CGFloat\
    \ relativeY = tapPoint.y /\n        self.previewView.frame.size.height;\n    CGPoint\
