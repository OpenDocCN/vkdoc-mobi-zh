- fmt: '# What Do I Need to Know to Use This Book?


    This book is both accessible to beginners and relevant for advanced programmers.
    Because the focus is on media app development, I am assuming you’ve had at least
    a cursory introduction to the following:


    - Core programming concepts (object-oriented programming, pointers, functions)

    - Core iOS development topics (`Xcode`, Interface Builder, Cocoa Touch)

    - Objective-C syntax


    Based on these assumptions, I use language from this core knowledge base as part
    of the natural writing style of this book. This will allow the experienced to
    feel right at home, while also giving beginners valuable experience with the terminology
    used in the field. For additional help, I recommend the books listed in [Table
    1-1](#9781430250838_Ch01.xhtml#Tab1).


    [Table 1-1](#9781430250838_Ch01.xhtml#_Tab1). Recommended References


    | Topic | Title and Author |

    | --- | --- |

    | Introductory iOS development | *Beginning iOS 7 Development* by James Nutting,
    Fredrik Olsson, David Mark, Jeff LaMarche (Apress, 2014) |

    | Using Xcode and the debugger | *Beginning Xcode* by Matthew Knott (Apress, 2014)
    |

    | Intermediate iOS development | *Learn iOS 7 App Development* by James Bucanek
    (Apress, 2013) |

    | Objective-C syntax | *Beginning Objective-C* by James Dovey and Ash Furrow (Apress,
    2012) |


    I also recommend referring to the iOS Developer Library (`https://developer.apple.com/library/ios/navigation/`).
    As Apple’s official resource for iOS API documentation, the Developer Library
    is updated with every release of the SDK. You need to keep a constant eye on the
    SDK version, because methods are often updated or removed. Be sure to use the
    document version that matches your SDK. You can find the documentation for older
    SDK releases under the Retired Documents Library link, shown in [Figure 1-1](#9781430250838_Ch01.xhtml#Fig1).


    ![9781430250838_Fig01-01.jpg](images/9781430250838_Fig01-01.jpg)


    [Figure 1-1](#9781430250838_Ch01.xhtml#_Fig1). Finding legacy iOS documentation


    **Caution** Apple also maintains prerelease documentation for beta releases of
    iOS. These are a good reference for bleeding-edge development, but are not recommended
    for production, as they are constantly in flux and their accuracy is not guaranteed.


    In an effort to offer a streamlined, comprehensive experience, the book is divided
    into four units: images, audio, video, and advanced media topics. To make the
    content flow in a natural manner, I have organized the content using the following
    structure:


    - Part 1: Background information and core frameworks

    - Part 2: Intermediate framework applications

    - Part 3: Advanced implementations (including lower-level code)


    For beginning developers, I recommend starting with the first chapter of each
    unit and working your way into the later chapters as you gain more familiarity
    with the concepts. For intermediate and advanced readers, I recommend using the
    first chapter for a quick introduction to the unit and then diving directly into
    the topics you are interested in within the later chapters.


    # What Do I Need to Get Started?


    As with traditional iOS app development, to get started in iOS media app development,
    you need an Intel-based Mac running OS X 10.9 or later (Mavericks) and the latest
    version of `Xcode` and the iOS SDK from the Mac App Store. As part of the App
    Store submission process, Apple checks to make sure your binary is compiled on
    a “valid” computer and SDK version. While it may seem like an annoying step, it
    helps ensure that applications are compiled against a common standard, eliminating
    crashes caused by the compiler. The easiest way to stay up-to-date on both is
    by downloading them from the Mac App Store.


    **Note** You can find old versions of `Xcode` on Apple’s Developer site, but keep
    in mind that you need to use a current version to submit to the App Store.


    It can be hard to sum up all the skills required to be an app developer, but I
    define an iOS media app developer as a person with an in-depth knowledge of iOS’s
    media features and the ability to apply this knowledge to create products. To
    be successful in this role, you need to be able to do more than just “make it
    work.” You need to be able to use your knowledge to identify design approaches,
    point out problematic requirements, and debug problems in the field.


    My goal is to build up your background knowledge without making the experience
    overwhelming. It is important to build up a large base of knowledge to draw upon,
    but it is equally important to present that knowledge base in a way that allows
    you to retain it or quickly return to it as a reference. Comprehensive API references
    and pure problem-solution approaches are extremely valuable for fixing specific
    problems, but do not provide a clear path for learning. As a media developer,
    you will be expected to master several frameworks, each with its own set of requirements
    and prevailing design patterns or suggestions on how you should write your code.
    Through the discussions in this book, which build in complexity, I provide you
    with a guide you can follow at your own pace, yet still use as a reference.


    Although it is extremely important to understand everything a framework can do,
    it is equally important to understand the limits of a framework. Many times, you
    will be asked to implement a feature, but upon further research you will realize
    that it is not possible or would require more effort than the project budget or
    time allows. You may also discover that you can cover 90 percent of your use cases
    with one approach, which is faster than the approach that would cover 100 percent
    of the use cases. To be successful as a media developer, you have to identify
    these problem areas and possible solutions quickly, and communicate them to the
    correct decision makers. One particularly challenging aspect of being a media
    developer is that the media frameworks are among the most complex frameworks in
    Cocoa Touch. They also place some of the strictest requirements on implementation.
    The discussion material and keystone projects in this book will expose you to
    these limitations and show you how to address them to build working products.


    Depending on whom you ask, the most exciting part of any development cycle is
    debugging. Your video player may work great in portrait mode, but then suddenly
    start dropping frames as soon as the user rotates the device. To figure out the
    root of this problem, you would need to use tools to generate data points, and
    then tie those data points back to a cause. Throughout your career, you will notice
    the same problems repeated in many projects. Having the experience of identifying
    the root cause of a problem enables you to quickly identify and fix it the next
    time it comes up. As you begin to debug media apps, you will notice that due to
    the sensitive nature of their operations (such as smooth video playback), they
    are the most prone to resource-based problems and strict configurations. More
    than anywhere, this is where you will get your real training on `Xcode`’s Instruments.
    My goals with the advanced topics and discussion sections are to expose you to
    common root causes of problems, walk you through the process of using the tools
    you need to identify them, and explain how the data the tools produce will help
    you resolve such problems.


    As a media developer, you may find yourself in the role of an “encyclopedia” for
    media programming topics—but that role also carries the responsibility of applying
    that expertise to the design process and being the “go-to guy” (or gal) for issues
    with the media-related code. This book will not only help you retain what you
    learn, but also make you aware of the pitfalls sooner rather than later.'
