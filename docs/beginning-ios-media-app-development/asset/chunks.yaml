    \n![9781430250838_Fig11-16.jpg](images/9781430250838_Fig11-16.jpg)\n\n[Figure\
    \ 11-16](#9781430250838_Ch11.xhtml#_Fig16). 在Interface Builder中查看`IBInspectable`属性\n\
    \n要使输入影响预览，您需要将这些属性连接到`[UIView layoutSubviews]`方法中的子视图。如[清单11-7](#9781430250838_Ch11.xhtml#list7)所示，通过将占位值替换为对`IBInspectable`兼容属性的引用，您可以为属性启用实时预览。\n\
    \n[***Listing 11-7***](#9781430250838_Ch11.xhtml#_list7). 添加实时更新\n\n```objectivec\n\
    -(void)layoutSubviews\n{\n    [super layoutSubviews];\n\n...\n\nself.imageView\
    \ = [[UIImageView alloc] initWithFrame:insideFrame];\n    self.imageView.image\
    \ = self.titleImage;\n\n[self addSubview:self.imageView];\n\nself.titleLabel =\
    \ [[UILabel alloc] initWithFrame:label1Frame];\n    self.titleLabel.text = self.titleText;\n\
    \    [self addSubview:self.titleLabel];\n\nself.locationLabel = [[UILabel alloc]\
    \ initWithFrame:label2Frame];\n    self.locationLabel.text = self.locationText;\n\
    \    [self addSubview:self.locationLabel];\n\n}\n```\n\n现在，您可以从Interface Builder内为属性选择新值。一旦您完成输入（或从下拉菜单中选择一个选项），故事板将反映您的更改。\n\
    \n## 使用Interface Builder调试视图\n\n在Interface Builder中查看实时预览可以大大加快视图调试，但如果您在屏幕上放置元素时遇到问题，这并没有帮助。为满足此需求，Xcode\
    \ 6为界面开发者引入了一种新的调试模式：**Debug Selected Views**。此功能允许您设置断点并逐步执行视图初始化代码，而无需运行您的应用程序。\n\
    \n您没看错：**Debug Selected Views**功能让您无需启动应用程序的调试会话，即可执行调试会话的所有功能（断点、单步执行代码以及使用LLDB调试控制台）。如果您曾经尝试调试`UITableViewController`，您一定非常熟悉这个过程是多么困难——过滤数据源中每个`UITableViewCell`的消息有时会使您偏离最初的目标。\n\
    \n使用**Debug Selected Views**功能无需额外设置。只需在Interface Builder中选择一个`IB_DESIGNABLE`兼容的`UIView`子类，然后从“Editor”菜单中选择**Debug\
    \ Selected Views**选项，如[图11-17](#9781430250838_Ch11.xhtml#Fig17)所示。\n\n![9781430250838_Fig11-17.jpg](images/9781430250838_Fig11-17.jpg)\n\
    \n[Figure 11-17](#9781430250838_Ch11.xhtml#_Fig17). 启用Debug Selected Views\n\n\
    确保您在`UIView`子类中设置了断点；否则调试器将没有内容可检查。当调试器命中断点时，您将看到熟悉的LLDB调试界面，如[图11-18](#9781430250838_Ch11.xhtml#Fig18)所示。您可以使用这些额外的面板来检查堆栈、设置额外断点，甚至向LLDB调试器发送指令。\n\
    \n![9781430250838_Fig11-18.jpg](images/9781430250838_Fig11-18.jpg)\n\n[Figure\
    \ 11-18](#9781430250838_Ch11.xhtml#_Fig18). 调试界面\n\n与普通调试会话不同，视图调试不会启动iOS模拟器。要调试您的视图，请在Xcode的单独标签页或作为伴随视图（维恩图图标）中打开Interface\
    \ Builder。因为您已经为类启用了`IB_DESIGNABLE`属性，所以在逐步执行代码时，您可以在Interface Builder中查看实时预览。\n\
    \n## 总结\n\n在本章中，您探索了Xcode 6中可以帮助您更快、更智能地构建和调试用户界面的几项新功能。首先，Size Classes可以帮助您构建一个可在所有设备上使用的单一故事板。接着，您了解了如何向任何类添加Quick\
    \ Look兼容输出，使您能够在Xcode调试界面中查看类的快照。最后，为了帮助您创建可重用的用户界面元素，您了解了如何使用`IB_DESIGNABLE`属性向任何`UIView`子类添加Interface\
    \ Builder兼容性。任何集成开发环境的目标都应是加速您的工作流程。所有这些功能无疑有助于实现这一目标，为您提供了比不断重启调试会话更好的调试用户界面的方法。\n\
    \n# 第12章 使用AVKit框架进行媒体播放\n\n尽管iOS 7给Apple移动应用世界带来了设计理念上的巨大转变，但iOS 8承诺通过强调新功能和对旧功能的精简，再次推动移动应用开发。这些变化延伸到了媒体播放领域，引入了另一个媒体播放框架——`AVKit`！\n\
    \n`AVKit`框架旨在成为`MediaPlayer`框架媒体播放功能的直接替代品。如[图12-1](#9781430250838_Ch12.xhtml#Fig1)所示，该框架通过`AVPlayerViewController`类提供的播放界面，与您在本书中一直使用的`MPMediaPlayerController`类提供的界面几乎完全相同。\n\
    \n![9781430250838_Fig12-01.jpg](images/9781430250838_Fig12-01.jpg)\n\n[Figure\
    \ 12-1](#9781430250838_Ch12.xhtml#_Fig1). 熟悉的`MPMoviePlayerController`播放界面与新`AVPlayerController`播放界面的对比\n\
    \n从用户界面角度来看，除了控制栏中增加了一个小的“Expand”按钮外，变化不大。对于某些视频，您可能还会看到一个“Dialog”按钮，它提供了一个音频和字幕轨道选择器，如[图12-2](#9781430250838_Ch12.xhtml#Fig2)所示。\n\
    \n![9781430250838_Fig12-02.jpg](images/9781430250838_Fig12-02.jpg)\n\n[Figure\
    \ 12-2](#9781430250838_Ch12.xhtml#_Fig2). `AVPlayerController`类的音频和字幕选择器\n\n这一新功能源于`AVKit`和`MediaPlayer`框架在软件架构层面的关键差异；`AVKit`框架被设计为在更接近`AVFoundation`框架的层级上进行媒体播放。从视频章节（第8-10章）中您可能还记得，您使用了`MediaPlayer`框架来呈现iOS内置的媒体播放界面，但需要下探到`AVFoundation`层来重写控件或创建自己的录制界面。"
  raw: 'To create `IBInspectable`-compatible objects, add properties to the `CustomPhotoView`
    class representing the `image`, `title`, and `location` properties from the `CustomPhoto`
    class, as shown in [Listing 11-6](#9781430250838_Ch11.xhtml#list6).


    [***Listing 11-6***](#9781430250838_Ch11.xhtml#_list6). Adding IBInspectable Properties
    to the CustomPhotoView Class


    ```

    #import <UIKit/UIKit.h>


    IB_DESIGNABLE


    @interface CustomPhotoView : UIView


    @property (nonatomic) UILabel *titleLabel;

    @property (nonatomic, strong) IBInspectable NSString *titleText;

    @property (nonatomic) UILabel *locationLabel;

    @property (nonatomic, strong) IBInspectable NSString *locationText;


    @property (nonatomic) UIImageView *imageView;

    @property (nonatomic, strong) IBInspectable UIImage *titleImage;


    @end

    ```


    To verify that Interface Builder recognizes your properties, select your view
    in the storyboard. At the top of the Attributes Inspector, you will see a section
    containing your properties, as shown in [Figure 11-16](#9781430250838_Ch11.xhtml#Fig16).


    ![9781430250838_Fig11-16.jpg](images/9781430250838_Fig11-16.jpg)


    [Figure 11-16](#9781430250838_Ch11.xhtml#_Fig16). Viewing IBInspectable properties
    in Interface Builder


    To make the user’s input affect the preview, you need to connect these properties
    to your subviews in the `[UIView layoutSubviews]` method. As shown in [Listing
    11-7](#9781430250838_Ch11.xhtml#list7), by replacing your placeholder values with
    references to your `IBInspectable`-compatible properties, you can enable live
    previews for your properties.


    [***Listing 11-7***](#9781430250838_Ch11.xhtml#_list7). Adding Live Updates


    ```

     -(void)layoutSubviews

    {

        [super layoutSubviews];


    ...


    self.imageView = [[UIImageView alloc] initWithFrame:insideFrame];

        self.imageView.image = self.titleImage;


    [self addSubview:self.imageView];


    self.titleLabel = [[UILabel alloc] initWithFrame:label1Frame];

        self.titleLabel.text = self.titleText;

        [self addSubview:self.titleLabel];


    self.locationLabel = [[UILabel alloc] initWithFrame:label2Frame];

        self.locationLabel.text = self.locationText;

        [self addSubview:self.locationLabel];


    }

    ```


    You can now select new values for your properties from within Interface Builder.
    As soon as you finish typing (or select an option from a drop-down menu), the
    storyboard will reflect your changes.


    Using Interface Builder to Debug Your Views


    Seeing live previews in Interface Builder speeds up view debugging considerably,
    but isn''t helpful if you are having trouble putting things on the screen. To
    help address this need, Xcode 6 introduces a new debugging mode for user interface
    developers: Debug Selected Views. This feature allows you to set breakpoints and
    step through view initialization code without executing your application.


    You read that right: the Debug Selected Views feature lets you perform all the
    features of a debugging session (breakpoints, stepping over code, and using the
    LLDB debugging console) without forcing you to start a debugging session for your
    application. If you have ever tried to debug a `UITableViewController`, you are
    already intimately familiar with how difficult the process can be—filtering messages
    for each `UITableViewCell` in the data source can sometimes distract you from
    your original goal.


    Using the Debug Selected Views feature doesn''t require any extra setup. Simply
    select an `IB_DESIGNABLE`-compatible `UIView` subclass in Interface Builder, and
    then select the Debug Selected Views option from the Editor menu, as shown in
    [Figure 11-17](#9781430250838_Ch11.xhtml#Fig17).


    ![9781430250838_Fig11-17.jpg](images/9781430250838_Fig11-17.jpg)


    [Figure 11-17](#9781430250838_Ch11.xhtml#_Fig17). Enabling Debug Selected Views


    Make sure you set breakpoints in your UIView subclass; otherwise, the debugger
    will have nothing to inspect. When the debugger hits a breakpoint, you will see
    the familiar LLDB debugging interface, as shown in [Figure 11-18](#9781430250838_Ch11.xhtml#Fig18).
    You can use these extra panes to inspect the stack, set additional breakpoints,
    and even send instructions to the LLDB debugger.


    ![9781430250838_Fig11-18.jpg](images/9781430250838_Fig11-18.jpg)


    [Figure 11-18](#9781430250838_Ch11.xhtml#_Fig18). Debugging interface


    Unlike a normal debugging session, view debugging does not launch the iOS simulator.
    To debug your views, open Interface Builder in a separate tab or as a companion
    view in Xcode (the Venn Diagram icon). Because you have enabled the `IB_DESIGNABLE`
    attribute for your class, you will be able to view live previews in Interface
    Builder as you step through your code.


    Summary


    In this chapter, you explored several of the new features in Xcode 6 that can
    help you build and debug user interfaces faster and more intelligently. First,
    size classes can help you build a single storyboard that you can use across all
    devices. Next, you saw how to add Quick Look–compatible output to any class, making
    snapshots of your classes available from within the Xcode debugging interface.
    Finally, to help you make reusable user interface elements, you saw how to add
    Interface Builder compatibility to any `UIView` subclass with the `IB_DESIGNABLE`
    attribute. The goal of any integrated development environment should be to speed
    up your workflow. All of these features certainly help with that goal, giving
    you better ways of debugging your user interfaces than constantly restarting debugging
    sessions.


    Chapter    12


    Using the AVKit Framework for Media Playback


    While iOS 7 brought a seismic shift in design sensibilities to the Apple mobile
    application world, iOS 8 promises to shift mobile app development yet again with
    its emphasis on new functionality and streamlining of old features. The changes
    extend into media playback, with the introduction of yet another media playback
    framework—`AVKit`!


    The `AVKit` framework is intended to be a drop-in replacement for the media playback
    features of the `MediaPlayer` framework. As shown in [Figure 12-1](#9781430250838_Ch12.xhtml#Fig1),
    this framework provides a playback interface via the `AVPlayerViewController`
    class that is almost exactly the same as the one provided by the `MPMediaPlayerController`
    class that you have been using throughout the book.


    ![9781430250838_Fig12-01.jpg](images/9781430250838_Fig12-01.jpg)


    [Figure 12-1](#9781430250838_Ch12.xhtml#_Fig1). The familiar MPMoviePlayerController
    playback interface vs. the new AVPlayerController playback interface


    From the user interface perspective, not much has changed, aside from the addition
    of a tiny Expand button in the control bar. For some videos, you may also see
    a Dialog button, which exposes an audio and subtitle track picker, as shown in
    [Figure 12-2](#9781430250838_Ch12.xhtml#Fig2).


    ![9781430250838_Fig12-02.jpg](images/9781430250838_Fig12-02.jpg)


    [Figure 12-2](#9781430250838_Ch12.xhtml#_Fig2). Audio and subtitle picker for
    AVPlayerController class


    This new feature is driven by the key difference between the `AVKit` and `MediaPlayer`
    frameworks at a software-architecture level; the `AVKit` framework is designed
    to be a media playback that operates closer to the `AVFoundation` framework. From
    the video chapters (Chapters 8–10), you may remember that you used the `MediaPlayer`
    framework to present the iOS built-in media playback interface, but that you had
    to drop down to the `AVFoundation` level to override controls or to create your
    own recording interface.'
