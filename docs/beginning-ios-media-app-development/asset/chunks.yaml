    The returned values for this method are the image picker that sent the message,
    and a dictionary object containing information about the selected asset. You can
    find a table containing all of the relevant key/value pairs provided by the `info`
    dictionary in [Table 2-3](#9781430250838_Ch02.xhtml#Tab3).


