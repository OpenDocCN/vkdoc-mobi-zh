    \ `UIImagePickerController` 类生成的视频都是 QuickTime 电影文件（.MOV 格式）。\n\n表 8-2. `UIImagePickerControllerQualityType`\
    \ 值\n"
- fmt: "| Value | Resolution | Compression |\n| --- | --- | --- |\n| `UIImagePickerControllerQualityTypeHigh`\
    \ | Highest available on device (for example, 3264×2248 for iPhone 6) | Low |\n\
    | `UIImagePickerControllerQualityTypeMedium` | Mid-range for device (for example,\
    \ 1280×720 for iPhone 6) | Medium |\n| `UIImagePickerControllerQualityTypeLow`\
    \ | Low enough to be transmitted via cell signal (144×192) | Strongest |\n| `UIImagePickerControllerQualityType640x480`\
    \ | 640×480 | None |\n| `UIImagePickerControllerQualityTypeIFrame1280x720` | 1280×720\
    \ | None |\n| `UIImagePickerControllerQualityTypeIFrame960x540` | 960×540 | None\
    \ |\n\nThe `videoMaximumDuration` property takes a `CGFloat` value that corresponds\
    \ to the maximum length for videos that users can capture using the image picker.\
    \ When the user has reached the maximum capture length, the image picker will\
    \ automatically stop and bring up the preview interface for the user. The default\
    \ value for this property is set to 600 seconds (10 minutes), but your final value\
    \ should depend on your application’s intended purpose and any external requirements\
    \ you may have (such as uploading to a video-sharing service or a custom web service).\n\
    \n```\nself.videoRecorder.maximumVideoDuration = 30.0f;\n```\n\nFinally, to allow\
    \ users to edit their videos before returning to the main user interface, enable\
    \ the `allowsEditing` property on your image picker object. This property takes\
    \ a Boolean value as its input and returns an entry value in the results dictionary\
    \ for the image picker, which represents the URL for the edited video. The video-editing\
    \ interface appears after the user has finished recording, and does not require\
    \ any additional work on your part.\n\n```\nself.videoRecorder.allowsEditing =\
    \ YES;\n```\n\nThe complete implementation for initializing the image picker for\
    \ the `MyVideoRecorder` project is in [Listing 8-13](#9781430250838_Ch08.xhtml#list13).\
    \ This code is encapsulated in the handler for the Record Video button.\n\n***Listing\
    \ 8-13***. Initializing the Image Picker for Recording Video\n\n```\n-(IBAction)showPicker:(id)sender\n\
    {\n    self.videoRecorder = [[UIImagePickerController alloc] init];\n    self.videoRecorder.sourceType\
    \ =\n        UIImagePickerControllerSourceTypeCamera;\n    self.videoRecorder.mediaTypes\
    \ =\n        [NSArray arrayWithObject:(NSString *)kUTTypeMovie];\n    self.videoRecorder.delegate\
    \ = self;\n    self.videoRecorder.videoMaximumDuration = 30.0f;\n    self.videoRecorder.videoQuality\
    \ =\n        UIImagePickerControllerQualityTypeMedium;\n    self.videoRecorder.allowsEditing\
    \ = YES;\n\n    [self presentViewController:self.videoRecorder\n             \
    \                       animated:YES\n                                    completion:nil];\n\
    }\n```\n\n## Saving Video Recordings\n\nThe delegate method that fires when the\
    \ image picker completes with captured media is `[UIImagePickerController imagePickerController:didFinishPickingMediaWithInfo:]`.\
    \ To properly handle video from the image picker, you need to learn how to use\
    \ additional keys in the results dictionary. For your reference, [Table 8-3](#9781430250838_Ch08.xhtml#Tab3)\
    \ lists all the keys in the `userInfo` results dictionary.\n\n**Table 8-3.** Keys\
    \ Returned by the Image Picker Results Dictionary\n\n| Key | Return Type | Value\
    \ |\n| --- | --- | --- |\n| `UIImagePickerControllerMediaType` | `NSString` |\
    \ Type of media (image or video) |\n| `UIImagePickerControllerOriginalImage` |\
    \ `UIImage` | Unedited image data |\n| `UIImagePickerControllerEditedImage` |\
    \ `UIImage` | Edited image data |\n| `UIImagePickerControllerCropRect` | `NSValue`\
    \ (Cast to `NSRect`) | Cropping rectangle |\n| `UIImagePickerControllerMediaURL`\
    \ | `NSURL` | URL for unedited movie |\n| `UIImagePickerControllerReferenceURL`\
    \ | `NSURL` | URL for final movie (edited or not) |\n\nThe first assumption you\
    \ need to change from the `MyCamera` app is that all results from the image picker\
    \ are images. To check the return type of a file, retrieve the value represented\
    \ by the `UIImagePickerControllerMediaType` key. This will be an `NSString`, which\
    \ you should compare against `kUTTypeMovie` for movies:\n\n```\nif ([[info objectForKey:UIImagePickerControllerMediaType]\n\
    \    isEqualToString:(NSString *)kUTTypeMovie]) {\n        //custom code goes\
    \ here\n}\n```\n\nNext, you want to determine whether the user edited the video.\
    \ The results dictionary provides two keys representing the user’s recorded video:\
    \ `UIImagePickerControllerMediaURL`, which returns the URL for the final, edited\
    \ version of the media item, and `UIImagePickerControllerReferenceURL`, which\
    \ returns the URL for the original media item. The general practice for most apps\
    \ is to use the edited version of the video. If you want to give the user a choice\
    \ of what version to use, compare the two values; if the values represented by\
    \ the keys differ, you know the user edited the video:\n\n```\nif ([[info objectForKey:UIImagePickerControllerMediaURL]\n\
    \    isEqualToString:[info\n     objectForKey:UIImagePickerControllerReferenceURL]])\
    \ {\n     movieURL = [info objectForKey:UIImagePickerControllerMediaURL];\n} else\
    \ {\n    movieURL = [info\n        objectForKey:UIImagePickerControllerReferenceURL];\n\
    }\n```\n\nFinally, to save your users a lot of headaches, you need to save your\
    \ videos to the documents directory with human-readable names. In my apps, I like\
    \ to append a timestamp to a string, such as `Movie` or my app’s name. This way,\
    \ users can easily retrieve videos based on the time that they were created. You\
    \ can create a timestamp easily with the `NSDateFormatter` class.\n\n```\nNSDateFormatter\
    \ *dateFormat = [[NSDateFormatter alloc] init];\n[dateFormat setDateFormat:@\"\
    yyyyMMddHHmm\"];\n```\n\nTo get the contents of the file, use the `[NSData dataWithContentsOfURL:]`\
    \ method:\n\n```\nNSData *movieData = [NSData dataWithContentsOfURL:movieURL];\n\
    ```\n\n[Listing 8-14](#9781430250838_Ch08.xhtml#list14) shows an implementation\
    \ for the `[UIImagePickerController imagePickerController:didFinishPickingMediaWithInfo:]`\
    \ delegate method that puts together all of these steps. In the `MyVideoRecorder`\
