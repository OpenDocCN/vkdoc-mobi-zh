    \            [self skipBackward:nil];\n            break;\n        default:\n\
    \            break;\n    }\n}\n```\n\nMyPlayer 应用包含了切换反馈和快进/快退的控制。因此，在代码清单 7-8\
    \ 中，我只实现了对这两个动作的支持。为了进一步简化，清单显示可以通过相同的逻辑来处理多个事件。\n\n在此过程的最后一步，当播放界面从内存中释放时，你需要进行清理。具体来说，`MainViewController`类需要指定它不再作为第一响应者，并且应停止接收远程控制事件。这发生在视图的`[self\
    \ dealloc]`方法中，如代码清单 7-9 所示。\n\n***代码清单 7-9***。清理远程控制事件\n\n```\n-(void)dealloc\n\
    {\n    [self resignFirstResponder];\n}\n```\n\n## 构建更稳健的音频会话\n\n通过添加后台音频和“正在播放”支持，你已显著扩展了\
    \ MyPlayer 应用的功能。它现在运行得更像一个 iPod 应用。然而，要实现完全的功能对等，你需要扩展 MyPlayer 应用以处理意外外部事件，例如来自电话应用的音频中断，或用户插入耳机引起的音频路由变化。\n\
    \n当使用 iPod 应用听音乐时，你可能注意到：当调出 Siri 时播放会停止，关闭 Siri 时恢复播放；拔下耳机时播放暂停（这样你就可以避免用你独特的音乐偏好给旁观者留下深刻印象）。这些行为在\
    \ iOS 中并非默认设置；然而，Cocoa Touch 提供了委托和通知，允许你在应用中实现它们。\n\n在本节中，你将了解如何通过实现`AVAudioSessionDelegate`来处理音频中断，以及响应`AVAudioSessionRouteChangeNotification`通知来处理输出设备（路由）变化，从而为你的音频应用构建更稳健的音频会话。与本章前几节一样，你将继续使用\
    \ MyPlayer 应用作为这些新功能的实验场。\n\n### 处理音频中断\n\niOS 中的*音频中断*是任何会中断应用音频会话的事件。此类事件可能包括来电、闹钟、通知声音或\
    \ Siri。iOS 中音频中断的默认行为是遵循你为应用选择的音频会话所规定的设置。然而，通过响应`AVAudioSessionInterruptionNotification`通知，你可以捕获中断并插入自己的播放处理代码。\n\
    \n**注意**  `AVAudioSessionInterruptionNotification`通知并非`AVFoundation`基于媒体播放器所独有。任何类，包括那些使用`MediaPlayer`框架进行播放的类，都可以实现`AVAudioSessionInterruptionNotification`通知。\n\
    \n表 7-5 列出了每种`AVAudioSession`类型的默认中断行为。\n\n**表 7-5**。AVAudioSession 类型的默认中断行为\n\
    \n| 子类型名称 | 用途 |\n| --- | --- |\n| `[MPMediaQuery albumsQuery]` | 返回按专辑标题排序的音乐项目（歌曲）列表\
    \ |\n| `[MPMediaQuery artistsQuery]` | 返回按艺术家名称排序的音乐项目（歌曲）列表 |\n| `[MPMediaQuery\
    \ compilationsQuery]` | 返回按专辑标题排序的合辑项目（专辑）列表 |\n| `[MPMediaQuery playlistsQuery]`\
    \ | 返回按播放列表标题排序的播放列表项目列表 |\n| `[MPMediaQuery songsQuery]` | 返回按歌曲标题排序的音乐项目（歌曲）列表\
    \ |\n"
- fmt: "Because the `AVAudioSessionInterruptionNotification` notification is defined\
    \ in `AVAudioSession.h`, you do not need to include any extra classes in your\
    \ header file. As with all projects that implement notifications, your next step\
    \ is to declare an *observer* method for the notification (a method that gets\
    \ called every time the notification is caught). As shown in [Listing 7-10](#9781430250838_Ch07.xhtml#list10),\
    \ you add this declaration in your class’s `[self viewDidLoad]` method, because\
    \ the class needs to be ready to catch notifications as soon as it is initialized.\
    \ The selector for the observer method is `[self caughtInterruption:]`, which\
    \ you will implement in the next step.\n\n[***Listing 7-10***](#9781430250838_Ch07.xhtml#_list10).\
    \ Adding a Notification Observer for the MainViewController Class\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically\n    // from a nib.\n\n    NSError *error = nil;\n    [[AVAudioSession\
    \ sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback error:&error];\n\
    \    if (error == nil) {\n        NSLog(@\"audio session initialized successfully\"\
    );\n        [[NSNotificationCenter defaultCenter] addObserver:self\n         \
    \   selector:@selector(caughtInterruption:)\n            name:AVAudioSessionInterruptionNotification\
    \ object:nil];\n    } else {\n        NSLog(@\"error initializing audio session:\
    \ %@\",\n              [error description]);\n    }\n}\n```\n\nTo fully support\
    \ audio interruptions, you need to add custom code to handle two unique events:\
    \ when the interruption begins and when it ends. To create the best user experience,\
    \ when an interruption begins, you should pause playback immediately. It is generally\
    \ a good practice to create an instance variable for your class that indicates\
    \ the session was interrupted. For the `MainViewController` class, I’ve defined\
    \ it as `playbackInterrupted`:\n\n```\n@property (nonatomic, retain) BOOL playbackInterrupted;\n\
    ```\n\nWhen an interruption ends, you should try to resume playback when applicable.\
    \ You can determine applicability by checking the `playbackInterrupted` variable\
    \ and the playback state of the media player.\n\nNotifications send relevant information\
    \ back to their observers via an `NSDictionary` object that is set as the `userInfo`\
    \ property. Notifications specify unique names and `userInfo` keys for their information.\
    \ The key that represents the type of audio interruption that was caught is `AVAudioSessionInterruptionType`,\
    \ which maps to an integer-based `enum`. Its values are `AVAudioSessionInterruptionTypeBegan`\
    \ and `AVAudioSessionInterruptionTypeEnded`.\n\nBased on this information, the\
    \ observer method (`[self caughtInterruption:]`), checks the `AVAudioSessionInterruptionType`\
    \ key in the notification. Pause or resume the player and set the `playbackInterrupted`\
    \ instance variable to the correct value, as shown in [Listing 7-11](#9781430250838_Ch07.xhtml#list11).\n\
    \n[***Listing 7-11***](#9781430250838_Ch07.xhtml#_list11). Audio Interruption\
    \ Notification Observer Method\n\n```\n-(void)caughtInterruption:(NSNotification\
    \ *)notification\n{\n    NSDictionary *userInfo = notification.userInfo;\n\n \
    \   NSNumber *type = [userInfo\n                     objectForKey:AVAudioSessionInterruptionTypeKey];\n\
    \    if ([type integerValue] == AVAudioSessionInterruptionTypeBegan) {\n     \
    \   if (self.audioPlayer.playing) {\n            [self.audioPlayer pause];\n \
    \           self.playbackInterrupted = YES;\n        }\n    } else {\n       \
    \ if (self.audioPlayer.playing || self.playbackInterrupted) {\n            [self.audioPlayer\
    \ play];\n            self.playbackInterrupted = NO;\n        }\n    }\n}\n```\n\
    \nTo add an extra layer of safety around the `playbackInterrupted` flag, make\
    \ sure you set its value to `NO` whenever the user manually selects a control\
    \ in the user interface. [Listing 7-12](#9781430250838_Ch07.xhtml#list12) shows\
    \ an example for the Play button.\n\n[***Listing 7-12***](#9781430250838_Ch07.xhtml#_list12).\
    \ Updated Play Button Handler for the MainViewController Class\n\n```\n-(IBAction)play:(id)sender\n\
    {\n    if ([self.audioPlayer isPlaying]) {\n        [self.audioPlayer pause];\n\
    \        self.playButton.titleLabel.text = @\"Play\";\n        self.timer = [NSTimer\
    \ timerWithTimeInterval:1.0f\n                      target:self\n            \
    \          selector:@selector(updateProgress)\n                      userInfo:nil\
    \ repeats:YES];\n\n    } else {\n        [self.audioPlayer play];\n        self.playButton.titleLabel.text\
    \ = @\"Pause\";\n        [self.timer invalidate];\n    }\n    self.playbackInterrupted\
    \ = NO;\n}\n```\n\n## Handling Hardware (Route) Changes\n\nWhen creating audio\
    \ apps, you should know about yet another obscure notification: `AVAudioSessionRouteChangeNotification`.\
    \ This notification fires whenever the user changes the hardware output for audio\
    \ on the device. Actions that trigger this notification include plugging in (or\
    \ removing) headphones, connecting to an iPod dock, or connecting to an AirPlay-enabled\
    \ device.\n\nLike the `AVAudioSessionInterruptionNotification` notification, you\
    \ start out by adding an observer to your class (`MainViewController`), as shown\
    \ in [Listing 7-13](#9781430250838_Ch07.xhtml#list13).\n\n[***Listing 7-13***](#9781430250838_Ch07.xhtml#_list13).\
    \ Adding an Observer for the Route Change Notification\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically\n    // from a nib.\n\n    NSError *error = nil;\n    [[AVAudioSession\
    \ sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback error:&error];\n\
    \    if (error == nil) {\n        NSLog(@\"audio session initialized successfully\"\
    );\n        [[NSNotificationCenter defaultCenter]\n          addObserver:self\
    \ selector:@selector(caughtInterruption:)\n          name:AVAudioSessionInterruptionNotification\
    \ object:nil];\n\n        [[NSNotificationCenter defaultCenter]\n            addObserver:self\
    \ selector:@selector(routeChanged:)\n            name:AVAudioSessionRouteChangeNotification\
    \ object:nil];\n    } else {\n        NSLog(@\"error initializing audio session:\
    \ %@\",\n              [error description]);\n    }\n}\n```\n\nIn general, a user\
    \ who plugs in a pair of headphones wants to listen to music privately. Similarly,\
    \ a user who switches to AirPlay probably wants to do a sound check before the\
    \ music starts playing. Taking this into consideration, when the user changes\
    \ the input device (*route*), you should pause playback.\n\n**Note** These are\
    \ not hard and fast rules, just suggestions. Some apps, such as streaming video\
    \ players, may be expected to continue to operate normally regardless of output\
    \ device changes.\n\nFor the best user experience, when an `AVAudioSessionRouteChangeNotification`\
    \ notification is received, you should check the `AVAudioSessionRouteChangeReason`\
    \ key to get information on why the route changed. The relevant values are listed\
    \ in [Table 7-6](#9781430250838_Ch07.xhtml#Tab6).\n\n[Table 7-6](#9781430250838_Ch07.xhtml#_Tab6).\
    \ Route Change Types\n\n| **Type** | **Purpose** |\n| --- | --- |\n| `AVAudioSessionRouteChangeReasonNewDeviceAvailable`\
    \ | User connected new output device |\n| `AVAudioSessionRouteChangeReasonOldDeviceUnavailable`\
    \ | Output device disconnected or failed |\n| `AVAudioSessionRouteChangeReasonWakeFromSleep`\
    \ | iOS device woke from sleep |\n| `AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory`\
    \ | No output available for selected audio session type |"
  raw: 'Because the `AVAudioSessionInterruptionNotification` notification is defined
    in `AVAudioSession.h`, you do not need to include any extra classes in your header
    file. As with all projects that implement notifications, your next step is to
    declare an *observer* method for the notification (a method that gets called every
    time the notification is caught). As shown in [Listing 7-10](#9781430250838_Ch07.xhtml#list10),
    you add this declaration in your class’s `[self viewDidLoad]` method, because
    the class needs to be ready to catch notifications as soon as it is initialized.
    The selector for the observer method is `[self caughtInterruption:]`, which you
    will implement in the next step.


    [***Listing 7-10***](#9781430250838_Ch07.xhtml#_list10). Adding a Notification
    Observer for the MainViewController Class


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically

            // from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");

              [[NSNotificationCenter defaultCenter] addObserver:self

                selector:@selector(caughtInterruption:)

                name:AVAudioSessionInterruptionNotification object:nil];

        } else {

            NSLog(@"error initializing audio session: %@",

                  [error description]);

        }


    }

    ```


    To fully support audio interruptions, you need to add custom code to handle two
    unique events: when the interruption begins and when it ends. To create the best
    user experience, when an interruption begins, you should pause playback immediately.
    It is generally a good practice to create an instance variable for your class
    that indicates the session was interrupted. For the `MainViewController` class,
    I’ve defined it as `playbackInterrupted`:


    ```

    @property (nonatomic, retain) BOOL playbackInterrupted;

    ```


    When an interruption ends, you should try to resume playback when applicable.
    You can determine applicability by checking the `playbackInterrupted` variable
    and the playback state of the media player.


    Notifications send relevant information back to their observers via an `NSDictionary`
    object that is set as the `userInfo` property. Notifications specify unique names
    and `userInfo` keys for their information. The key that represents the type of
    audio interruption that was caught is `AVAudioSessionInterruptionType`, which
    maps to an integer-based `enum`. Its values are `AVAudioSessionInterruptionTypeBegan`
    and `AVAudioSessionInterruptionTypeEnded`.


    Based on this information, the observer method, (`[self caughtInterruption:]`),
    checks the `AVAudioSessionInterruptionType` key in the notification. Pause or
    resume the player and set the `playbackInterrupted` instance variable to the correct
    value, as shown in [Listing 7-11](#9781430250838_Ch07.xhtml#list11).


    [***Listing 7-11***](#9781430250838_Ch07.xhtml#_list11). Audio Interruption Notification
    Observer Method


    ```

    -(void)caughtInterruption:(NSNotification *)notification

    {

        NSDictionary *userInfo = notification.userInfo;


    NSNumber *type =[userInfo

                         objectForKey:AVAudioSessionInterruptionTypeKey];

        if ([type integerValue] == AVAudioSessionInterruptionTypeBegan) {

            if (self.audioPlayer.playing) {

                [self.audioPlayer pause];

                self.playbackInterrupted = YES;

            }

        } else {

            if (self.audioPlayer.playing || self.playbackInterrupted) {

                [self.audioPlayer play];

                self.playbackInterrupted = NO;

            }

        }

    }

    ```


    To add an extra layer of safety around the `playbackInterrupted` flag, make sure
    you set its value to `NO` whenever the user manually selects a control in the
    user interface. [Listing 7-12](#9781430250838_Ch07.xhtml#list12) shows an example
    for the Play button.


    [***Listing 7-12***](#9781430250838_Ch07.xhtml#_list12). Updated Play Button Handler
    for the MainViewController Class


    ```

    -(IBAction)play:(id)sender

    {

        if ([self.audioPlayer isPlaying]) {

            [self.audioPlayer pause];

            self.playButton.titleLabel.text = @"Play";

            self.timer = [NSTimer timerWithTimeInterval:1.0f

                          target:self

                          selector:@selector(updateProgress)

                          userInfo:nil repeats:YES];


    } else {

            [self.audioPlayer play];

            self.playButton.titleLabel.text = @"Pause";

            [self.timer invalidate];

        }

        self.playbackInterrupted = NO;

    }

    ```


    Handling Hardware (Route) Changes


    When creating audio apps, you should know about yet another obscure notification:
    `AVAudioSessionRouteChangeNotification`. This notification fires whenever the
    user changes the hardware output for audio on the device. Actions that trigger
    this notification include plugging in (or removing) headphones, connecting to
    an iPod dock, or connecting to an AirPlay-enabled device.


    Like the `AVAudioSessionInterruptionNotification` notification, you start out
    by adding an observer to your class (`MainViewController`), as shown in [Listing
    7-13](#9781430250838_Ch07.xhtml#list13).


    [***Listing 7-13***](#9781430250838_Ch07.xhtml#_list13). Adding an Observer for
    the Route Change Notification


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically

            // from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");

            [[NSNotificationCenter defaultCenter]

              addObserver:self selector:@selector(caughtInterruption:)

              name:AVAudioSessionInterruptionNotification object:nil];


    [[NSNotificationCenter defaultCenter]

                addObserver:self selector:@selector(routeChanged:)

                name:AVAudioSessionRouteChangeNotification object:nil];

        } else {

            NSLog(@"error initializing audio session: %@",

                  [error description]);

        }

    }

    ```


    In general, a user who plugs in a pair of headphones wants to listen to music
    privately. Similarly, a user who switches to AirPlay probably wants to do a sound
    check before the music starts playing. Taking this into consideration, when the
    user changes the input device (*route*), you should pause playback.


    **Note**  These are not hard and fast rules, just suggestions. Some apps, such
    as streaming video players, may be expected to continue to operate normally regardless
    of output device changes.


    For the best user experience, when an `AVAudioSessionRouteChangeNotification`
    notification is received, you should check the `AVAudioSessionRouteChangeReason`
    key to get information on why the route changed. The relevant values are listed
    in [Table 7-6](#9781430250838_Ch07.xhtml#Tab6).


    [Table 7-6](#9781430250838_Ch07.xhtml#_Tab6). Route Change Types


    | **Type** | **Purpose** |

    | --- | --- |

    | `AVAudioSessionRouteChangeReasonNewDeviceAvailable` | User connected new output
    device |

    | `AVAudioSessionRouteChangeReasonOldDeviceUnavailable` | Output device disconnected
    or failed |

    | `AVAudioSessionRouteChangeReasonWakeFromSleep` | iOS device woke from sleep
    |

    | `AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory` | No output available
    for selected audio session type |'
  trans: "\n由于 `AVAudioSessionInterruptionNotification` 通知是在 `AVAudioSession.h` 中定义的，你无需在头文件中包含任何额外的类。与所有实现通知的项目一样，下一步是为该通知声明一个*观察者*方法（即每次捕获到通知时都会被调用的方法）。如代码清单\
    \ 7-10 所示，你将此声明添加到类的 `[self viewDidLoad]` 方法中，因为该类需要在初始化完成后立即准备好捕获通知。观察者方法的选择器是\
    \ `[self caughtInterruption:]`，你将在下一步实现它。\n\n***代码清单 7-10***. 为 MainViewController\
    \ 类添加通知观察者\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do\
    \ any additional setup after loading the view, typically\n    // from a nib.\n\
    \n    NSError *error = nil;\n    [[AVAudioSession sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\
    \ error:&error];\n    if (error == nil) {\n        NSLog(@\"audio session initialized\
    \ successfully\");\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
    \            selector:@selector(caughtInterruption:)\n            name:AVAudioSessionInterruptionNotification\
    \ object:nil];\n    } else {\n        NSLog(@\"error initializing audio session:\
    \ %@\",\n              [error description]);\n    }\n}\n```\n\n为了全面支持音频中断，你需要添加自定义代码来处理两个独特事件：中断开始和中断结束。为了创造最佳用户体验，当中断开始时，应立即暂停播放。通常，一个好的做法是为你的类创建一个实例变量，用于指示会话已被中断。对于\
    \ `MainViewController` 类，我将其定义为 `playbackInterrupted`：\n\n```\n@property (nonatomic,\
    \ retain) BOOL playbackInterrupted;\n```\n\n当中断结束时，你应该在适用时尝试恢复播放。你可以通过检查 `playbackInterrupted`\
    \ 变量和媒体播放器的播放状态来确定适用性。\n\n通知通过一个设置为 `userInfo` 属性的 `NSDictionary` 对象，将相关信息发送回其观察者。通知为其信息指定了唯一名称和\
    \ `userInfo` 键。表示捕获到的音频中断类型的键是 `AVAudioSessionInterruptionType`，它映射到一个基于整数的 `enum`。它的值是\
    \ `AVAudioSessionInterruptionTypeBegan` 和 `AVAudioSessionInterruptionTypeEnded`。\n\
    \n基于这些信息，观察者方法（`[self caughtInterruption:]`）会检查通知中的 `AVAudioSessionInterruptionType`\
    \ 键。暂停或恢复播放器，并将 `playbackInterrupted` 实例变量设置为正确的值，如代码清单 7-11 所示。\n\n***代码清单 7-11***.\
    \ 音频中断通知观察者方法\n\n```\n-(void)caughtInterruption:(NSNotification *)notification\n\
    {\n    NSDictionary *userInfo = notification.userInfo;\n\n    NSNumber *type =\
    \ [userInfo\n                     objectForKey:AVAudioSessionInterruptionTypeKey];\n\
    \    if ([type integerValue] == AVAudioSessionInterruptionTypeBegan) {\n     \
    \   if (self.audioPlayer.playing) {\n            [self.audioPlayer pause];\n \
    \           self.playbackInterrupted = YES;\n        }\n    } else {\n       \
    \ if (self.audioPlayer.playing || self.playbackInterrupted) {\n            [self.audioPlayer\
    \ play];\n            self.playbackInterrupted = NO;\n        }\n    }\n}\n```\n\
    \n为了给 `playbackInterrupted` 标志增加一层额外的安全性，请确保每当用户在界面中手动选择一个控件时，都将其值设置为 `NO`。代码清单\
    \ 7-12 展示了“播放”按钮的示例。\n\n***代码清单 7-12***. 为 MainViewController 类更新的播放按钮处理程序\n\n\
    ```\n-(IBAction)play:(id)sender\n{\n    if ([self.audioPlayer isPlaying]) {\n\
    \        [self.audioPlayer pause];\n        self.playButton.titleLabel.text =\
    \ @\"Play\";\n        self.timer = [NSTimer timerWithTimeInterval:1.0f\n     \
    \                 target:self\n                      selector:@selector(updateProgress)\n\
    \                      userInfo:nil repeats:YES];\n\n    } else {\n        [self.audioPlayer\
    \ play];\n        self.playButton.titleLabel.text = @\"Pause\";\n        [self.timer\
    \ invalidate];\n    }\n    self.playbackInterrupted = NO;\n}\n```\n\n## 处理硬件（线路）变更\n\
    \n在创建音频应用时，你应该了解另一个晦涩的通知：`AVAudioSessionRouteChangeNotification`。每当用户更改设备上的音频硬件输出时，就会触发此通知。触发此通知的操作包括插入（或拔出）耳机、连接到\
    \ iPod 底座或连接到支持 AirPlay 的设备。\n\n与 `AVAudioSessionInterruptionNotification` 通知一样，你首先需要为你的类（`MainViewController`）添加一个观察者，如代码清单\
    \ 7-13 所示。\n\n***代码清单 7-13***. 为线路变更通知添加观察者\n\n```\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    // Do any additional setup after loading the view,\
    \ typically\n    // from a nib.\n\n    NSError *error = nil;\n    [[AVAudioSession\
    \ sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback error:&error];\n\
    \    if (error == nil) {\n        NSLog(@\"audio session initialized successfully\"\
    );\n        [[NSNotificationCenter defaultCenter]\n          addObserver:self\
    \ selector:@selector(caughtInterruption:)\n          name:AVAudioSessionInterruptionNotification\
    \ object:nil];\n\n        [[NSNotificationCenter defaultCenter]\n            addObserver:self\
    \ selector:@selector(routeChanged:)\n            name:AVAudioSessionRouteChangeNotification\
    \ object:nil];\n    } else {\n        NSLog(@\"error initializing audio session:\
    \ %@\",\n              [error description]);\n    }\n}\n```\n\n一般来说，插入耳机的用户希望私下收听音乐。同样，切换到\
    \ AirPlay 的用户可能希望在音乐开始播放前进行声音检查。考虑到这一点，当用户更改输入设备（*线路*）时，你应该暂停播放。\n\n**注意** 这些并非硬性规定，仅是建议。某些应用，例如流媒体视频播放器，无论输出设备如何更改，都可能需要继续正常运行。\n\
    \n为了获得最佳用户体验，在收到 `AVAudioSessionRouteChangeNotification` 通知时，你应该检查 `AVAudioSessionRouteChangeReason`\
    \ 键，以获取线路变更原因的信息。相关值列于表 7-6。\n\n表 7-6. 线路变更类型\n\n| **类型** | **用途** |\n| --- |\
    \ --- |\n| `AVAudioSessionRouteChangeReasonNewDeviceAvailable` | 用户连接了新的输出设备 |\n\
    | `AVAudioSessionRouteChangeReasonOldDeviceUnavailable` | 输出设备断开或故障 |\n| `AVAudioSessionRouteChangeReasonWakeFromSleep`\
    \ | iOS 设备从休眠中唤醒 |\n| `AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory`\
    \ | 所选的音频会话类型没有可用的输出设备 |\n"
- fmt: "从[Table 7-6](#9781430250838_Ch07.xhtml#Tab6)可以看出，路由可能因多种原因而改变，从用户主动发起的更改到设备故障。对于`MyPlayer`应用，根据之前的讨论，当用户发起路由更改时应暂停播放。在设备故障（`AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory`）的情况下，应停止播放。`MainViewController`类的观察者方法（`[self\
    \ routeChanged:]`）如[Listing 7-14](#9781430250838_Ch07.xhtml#list14)所示。\n\n[***Listing\
    \ 7-14***](#9781430250838_Ch07.xhtml#_list14). 路由更改的观察者方法\n\n```\n-(void)routeChanged:(NSNotification\
    \ *)notification\n{\n    NSDictionary *userInfo = notification.userInfo;\n\n \
    \   NSNumber *reason = [userInfo\n                           objectForKey:AVAudioSessionRouteChangeReasonKey];\n\
    \    switch ([reason integerValue]) {\n        case AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory:\n\
    \            [self.audioPlayer stop];\n            break;\n        case AVAudioSessionRouteChangeReasonNewDeviceAvailable:\n\
    \        case AVAudioSessionRouteChangeReasonOldDeviceUnavailable:\n        case\
    \ AVAudioSessionRouteChangeReasonWakeFromSleep:\n            [self.audioPlayer\
    \ pause];\n            break;\n        default:\n            break;\n    }\n}\n\
    ```\n\n## 使用 AirPlay\n\n尽管创建基于音频的应用程序的可能性是无穷无尽的，但本章仅再讨论一个主题：AirPlay。AirPlay是苹果的专有技术，用于通过WiFi网络流式传输媒体。AirPlay允许用户将iOS或OS\
    \ X设备上的媒体直接流式传输到兼容AirPlay的设备，例如Apple TV、Apple AirPort路由器或兼容的第三方立体声音响。AirPlay是一种基于发现的协议；当网络中检测到开放的AirPlay设备时，它会出现在系统的可用设备列表中。您可以通过在多任务菜单中选择AirPlay按钮来查看iOS设备可用的输出设备列表，如[Figure\
    \ 7-5](#9781430250838_Ch07.xhtml#Fig5)所示。\n\n![9781430250838_Fig07-05.jpg](images/9781430250838_Fig07-05.jpg)\n\
    \n[Figure 7-5](#9781430250838_Ch07.xhtml#_Fig5). AirPlay设备列表\n\n**Note**: AirPlay不能通过蓝牙工作。用户必须连接到WiFi网络才能使用AirPlay。\n\
    \nAirPlay可以在两种主要模式下运行：仅传输应用程序输出，或镜像整个设备。镜像会直接将用户的OS X或iOS屏幕（包括系统屏幕）复制到AirPlay。这对于教学环境中教师试图演示某个功能，或针对低视力辅助功能的应用来说非常方便。对于简单场景（例如将应用程序中的视频或音频传输到Apple\
    \ TV），使用AirPlay镜像就有些大材小用了。要传输内容，您需要在应用程序中实现AirPlay支持。\n\n幸运的是，苹果在`MediaPlayer`和`AVFoundation`框架中内置了AirPlay支持，使您无需大量额外工作即可使用AirPlay。正如您将在[Chapter\
    \ 8](#9781430250838_Ch08.xhtml)关于视频应用程序的讨论中看到的，`MPMoviePlayerController`会在检测到网络中的AirPlay设备后，直接在播放控制集中添加一个AirPlay按钮，如[Figure\
    \ 7-6](#9781430250838_Ch07.xhtml#Fig6)所示。\n\n![9781430250838_Fig07-06.jpg](images/9781430250838_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781430250838_Ch07.xhtml#_Fig6). `MPMoviePlayerController`的AirPlay控件\n\
    \n对于使用`AVAudioPlayer`或`MPMusicPlayerController`类的音频应用程序，您可以通过`MPVolumeView`类为应用程序添加类似的AirPlay控件。该类提供了一个音量滑块和一个AirPlay选择器，与`MPMoviePlayerController`类中的控件完全相同。\n\
    \n**Note**: 您可以通过将`showsVolumeSlider`属性设置为`NO`来选择不使用音量滑块。\n\n顾名思义，`MPVolumeView`类是一个视图，因此您需要在故事板上指定一个区域来容纳它。Interface\
    \ Builder的拖放组件库中没有`MPVolumeView`控件；因此，您需要使用与之前基于摄像头的应用程序相同的方法——您需要将`MPVolumeView`添加为通用`UIView`的子视图。\n\
    \n对于`MyPlayer`应用程序，我在`MainViewController.h`头文件中添加了一个名为`airPlayView`的新`UIView`属性：\n\
    \n```\n@property (nonatomic, strong) UIView *airPlayView;\n```\n\n将此属性添加到类后，修改故事板以添加并关联该视图，如[Figure\
    \ 7-7](#9781430250838_Ch07.xhtml#Fig7)所示。\n\n![9781430250838_Fig07-07.jpg](images/9781430250838_Fig07-07.jpg)\n\
    \n[Figure 7-7](#9781430250838_Ch07.xhtml#_Fig7). 针对`MyPlayer`项目修改后的故事板\n\n接下来，您需要初始化`MPVolumeView`。幸运的是，`MPVolumeView`的初始化非常简单；您只需正确地初始化对象并添加为子视图即可。如[Listing\
    \ 7-15](#9781430250838_Ch07.xhtml#list15)所示，这需要在`[self viewDidLoad]`方法中完成。\n\n\
    [***Listing 7-15***](#9781430250838_Ch07.xhtml#_list15). 初始化`MPVolumeView`\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // Do any additional\
    \ setup after loading the view, typically\n        // from a nib.\n\n    NSError\
    \ *error = nil;\n    [[AVAudioSession sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\
    \ error:&error];\n    if (error == nil) {\n        NSLog(@\"audio session initialized\
    \ successfully\");\n\n        MPVolumeView *volumeView = [[MPVolumeView alloc]\
    \ init];\n           [volumeView sizeToFit];\n           [self.airPlayView addSubview:volumeView];\n\
    \n        [[UIApplication sharedApplication]                beginReceivingRemoteControlEvents];\n\
    \n        [self becomeFirstResponder];\n\n        [[NSNotificationCenter defaultCenter]\n\
    \               addObserver:self\n               selector:@selector(caughtInterruption:)\n\
    \               name:AVAudioSessionInterruptionNotification object:nil];\n\n \
    \       [[NSNotificationCenter defaultCenter]\n                 addObserver:self\n\
    \                 selector:@selector(routeChanged:)\n                 name:AVAudioSessionRouteChangeNotification\
    \ object:nil];\n    } else {\n                 NSLog(@\"error initializing audio\
    \ session: %@\",\n                  [error description]);\n    }\n}\n```\n\n如果这看起来很简洁，那么好消息是，事实确实如此。这就是您需要做的全部工作！AirPlay直接连接到远程控制事件和“正在播放”中心。通过将这些处理程序添加到代码中，您可以为AirPlay应用程序构建一个功能完整的用户体验。\n\
    \n**Note**: 默认情况下，音量滑块是白色的。如果您看不到音量滑块，请尝试更改视图的背景颜色。\n\n## 总结\n\n在本章中，您看到了如何通过添加后台音频支持、“正在播放”中心以及路由更改和音频中断通知，显著扩展基于音频的应用程序的性能。通过添加这些功能，您还了解到实现AirPlay只需在类中添加一个`MPVolumeView`即可。虽然无法预测用户会如何使用您的应用程序，但您可以利用Apple提供的有限后台音频功能，使您的应用程序更加令人愉悦。\n\
    \n# 第3部分：视频\n\n# 第8章：播放和录制视频\n\n在本章中，您将深入学习如何在应用程序中使用视频，了解如何播放和录制视频文件。作为一种格式，视频比静态图像或照片更复杂，需要显著的底层支持。幸运的是，有API可以为您提供这种底层支持。"
  raw: 'As you can see from [Table 7-6](#9781430250838_Ch07.xhtml#Tab6), there are
    several reasons that a route could change, ranging from user-initiated changes
    to device failures. For the MyPlayer app, as per the earlier discussion, you should
    pause playback whenever a user initiates a route change. In the case of device
    failure (`AVAudioSes``sionRouteChangeReasonNoSuitableRouteForCategory`), you should
    stop playback. The observer method for the `MainViewController` class (`[self
    routeChanged:]`) is shown in [Listing 7-14](#9781430250838_Ch07.xhtml#list14).


    [***Listing 7-14***](#9781430250838_Ch07.xhtml#_list14). Observer Method for Route
    Changes


    ```

    -(void)routeChanged:(NSNotification *)notification

    {

        NSDictionary *userInfo = notification.userInfo;


    NSNumber *reason =[userInfo

                           objectForKey:AVAudioSessionRouteChangeReasonKey];

        switch ([reason integerValue]) {

            case AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory:

                [self.audioPlayer stop];

                break;

            case AVAudioSessionRouteChangeReasonNewDeviceAvailable:

            case AVAudioSessionRouteChangeReasonOldDeviceUnavailable:

            case AVAudioSessionRouteChangeReasonWakeFromSleep:

                [self.audioPlayer pause];

                break;

            default:

                break;

        }


    }

    ```


    Using AirPlay


    Although the list of possibilities for creating our audio-based applications is
    endless, this chapter covers only one more topic: AirPlay. AirPlay is Apple’s
    proprietary technology for streaming media over WiFi networks. AirPlay lets users
    stream media from iOS or OS X devices directly to AirPlay-compatible devices such
    as Apple TVs, Apple AirPort routers, or compatible third-party stereos. AirPlay
    is a discovery-based protocol; when an open AirPlay device is detected on a network,
    it will show up in the available devices list for the system. You can view the
    output device list available to your iOS device by selecting the AirPlay button
    in the multitasking menu, as shown in [Figure 7-5](#9781430250838_Ch07.xhtml#Fig5).


    ![9781430250838_Fig07-05.jpg](images/9781430250838_Fig07-05.jpg)


    [Figure 7-5](#9781430250838_Ch07.xhtml#_Fig5). AirPlay device list


    **Note**  AirPlay does not work over Bluetooth. Users must be connected to a WiFi
    network to use AirPlay.


    AirPlay can operate in either of two major modes: piping app output only, or mirroring
    the entire device. Mirroring pipes a copy of the user’s OS X or iOS screen directly
    to AirPlay—system screens and all. This is often convenient for learning environments
    where an instructor is trying to demonstrate a feature, or for low-vision accessibility
    applications. AirPlay mirroring is overkill for simple cases, such as piping video
    or audio from an app to an Apple TV. To pipe content, you need to implement AirPlay
    support in your apps.


    Fortunately, Apple builds AirPlay support into the `MediaPlayer` and `AVFoundation`
    frameworks, allowing you to use AirPlay without a significant amount of additional
    work. As you will see in the discussion of video applications in [Chapter 8](#9781430250838_Ch08.xhtml),
    the `MPMoviePlayerController` adds an AirPlay button directly to your playback
    control set when an AirPlay device has been discovered on your network, as shown
    in [Figure 7-6](#9781430250838_Ch07.xhtml#Fig6).


    ![9781430250838_Fig07-06.jpg](images/9781430250838_Fig07-06.jpg)


    [Figure 7-6](#9781430250838_Ch07.xhtml#_Fig6). AirPlay control for MPMoviePlayerController


    For audio applications that use the `AVAudioPlayer` or `MPMusicPlayerController`
    classes, you can add a similar AirPlay control to your application via the `MPVolumeView`
    class. This class exposes a volume slider and an AirPlay selector, just like the
    one in the `MPMoviePlayerController` class.


    **Note**  You can opt out of the volume slider by setting the `showsVolumeSlider`
    property to `NO`.


    As the name implies, the `MPVolumeView` class is a view, so you need to designate
    an area on your storyboard to contain it. There is no `MPVolumeView` control in
    the Interface Builder drag-and-drop component library; therefore, you need to
    use the same method you used in the camera-based applications you’ve already seen—you
    need to add the `MPVolumeView` as a subview of a generic `UIView`.


    For the MyPlayer application, I added a new `UIView` property called `airPlayView`
    to the `MainViewController.h` header file:


    ```

    @property (nonatomic, strong) UIView *airPlayView;

    ```


    After adding this property to your class, modify your storyboard to add and link
    the view, as shown in [Figure 7-7](#9781430250838_Ch07.xhtml#Fig7).


    ![9781430250838_Fig07-07.jpg](images/9781430250838_Fig07-07.jpg)


    [Figure 7-7](#9781430250838_Ch07.xhtml#_Fig7). Modified storyboard for the MyPlayer
    project


    Next, you need to initialize the `MPVolumeView`. Luckily, the `MPVolumeView` is
    very straightforward to initialize; all you need to do is initialize the object
    and add it as a subview, properly. As shown in [Listing 7-15](#9781430250838_Ch07.xhtml#list15),
    this needs to happen in your `[self viewDidLoad]` method.


    [***Listing 7-15***](#9781430250838_Ch07.xhtml#_list15). Initializing an MPVolumeView


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically

            // from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");


    MPVolumeView *volumeView = [ [MPVolumeView alloc] init] ;

               [volumeView sizeToFit];

               [self.airPlayView addSubview:volumeView];


    [[UIApplication sharedApplication]                beginReceivingRemoteControlEvents];


    [self becomeFirstResponder];


    [[NSNotificationCenter defaultCenter]

               addObserver:self

               selector:@selector(caughtInterruption:)

               name:AVAudioSessionInterruptionNotification object:nil];


    [[NSNotificationCenter defaultCenter]

                 addObserver:self

                 selector:@selector(routeChanged:)

                 name:AVAudioSessionRouteChangeNotification object:nil];

        } else {

                 NSLog(@"error initializing audio session: %@",

                  [error description]);

        }

      }

    ```


    If that looks simple, the good news is, it is. That’s all the work you need to
    do! AirPlay plugs directly into the remote-control events and the Now Playing
    center. By adding these handlers to your code, you can build a fully functional
    user experience for your AirPlay application.


    **Note**  By default, the volume slider is white. If you do not see your volume
    slider, try changing your view’s background color.


    Summary


    In this chapter, you saw how to expand the performance of your audio-based applications
    significantly by adding support for backgrounded audio, the Now Playing center,
    and notifications for route changes and audio interruptions. By adding these features,
    you also saw that implementing AirPlay involved only adding an `MPVolumeView`
    to your class. While it is impossible to predict everything the user will do with
    your app, you can take advantage of the limited background audio features Apple
    provides to help make your apps more enjoyable to use.


    Part     3


    Video


    Chapter    8


    Playing and Recording Video


    In this chapter, you will dive into using video in your apps, discovering how
    to play and record video files. As a format, video is more complex than still
    images or photos, and requires significant low-level support. Fortunately, there
    are APIs to provide that low-level support for you.'
