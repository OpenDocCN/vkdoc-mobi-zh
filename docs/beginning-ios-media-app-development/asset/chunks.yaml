    To answer the “when” question again, you need to specify that your application
    is ready to become a first responder and receive remote-control events when the
    view with the playback interface loads. For the MyPlayer application, this should
    happen in the )`MainViewController`’s `[self viewDidLoad]` method, as shown in
    [Listing 7-7](#9781430250838_Ch07.xhtml#list7).


    [***Listing 7-7***](#9781430250838_Ch07.xhtml#_list7). Adding Remote-Control Event
    Support to the MainViewController Class


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically

            // from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");


    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents]

               [self becomeFirstResponder];

        } else {

            NSLog(@"error initializing audio session: %@",

                  [error description]);

        }

        )

    }

    ```


    Now that the `MainViewController` class is ready to receive events, you need to
    handle them. The delegate method for handling remote-control events is `[UIResponder
    remoteControlReceivedWithEvent:]`. The parameter used by this method is a `UIEvent`.
    The `type` property on the input determines the kind of event received. You typically
    use a `switch` statement to handle different kinds of remote-control events. [Table
    7-4](#9781430250838_Ch07.xhtml#Tab4) lists all the possible remote-control events.


    [Table 7-4](#9781430250838_Ch07.xhtml#_Tab4). Remote-Control Event Subtypes


    | **Subtype Name** | **Purpose** |

    | --- | --- |

    | `UIEventSubtypeMotionShake` | Device was shaken |

    | `UIEventSubtypeRemoteControlPlay` | Play button |

    | `UIEventSubtypeRemoteControlPause` | Pause button |

    | `UIEventSubtypeRemoteControlStop` | Stop button |

    | `UIEventSubtypeRemoteControlTogglePlayPause` | Toggle Play/Pause button |

    | `UIEventSubtypeRemoteControlNextTrack` | Skip to next track |

    | `UIEventSubtypeRemoteControlPreviousTrack` | Skip to previous track |

    | `UIEventSubtypeRemoteControlBeginSeekingBackward` | Begin seeking backward (button
    pressed down) |

    | `UIEventSubtypeRemoteControlEndSeekingBackward` | End seeking backward (button
    released) |

    | `UIEventSubtypeRemoteControlBeginSeekingForward` | Begin seeking forward (button
    pressed down) |

    | `UIEventSubtypeRemoteControlEndSeekingForward` | End seeking forward (button
    released) |


    **Note**  You do not need to handle all of the event types in your application,
    only the ones that are relevant to your application.


    [Listing 7-8](#9781430250838_Ch07.xhtml#list8) shows an example implementation
    for the `MainViewController` class.


    [***Listing 7-8***](#9781430250838_Ch07.xhtml#_list8). Remote-Control Event Handler
    for the MainViewController Class


    ```

    -(void)remoteControlReceivedWithEvent:(UIEvent *)event

    {

        switch (event.subtype) {

            case UIEventSubtypeRemoteControlPlay:

            case UIEventSubtypeRemoteControlPause:

            case UIEventSubtypeRemoteControlTogglePlayPause:

                [self play:nil];

                break;

            case UIEventSubtypeRemoteControlNextTrack:

                [self skipForward:nil];

                break;

            case UIEventSubtypeRemoteControlPreviousTrack:

                [self skipBackward:nil];

                break;

            default:

                break;

        }

    }

    ```


    The MyPlayer application includes controls for toggling feedback and seeking forward/backward.
    Thus, in [Listing 7-8](#9781430250838_Ch07.xhtml#list8), I implemented support
    only for those two actions. To further simplify things, the listing shows that
    it is possible to handle multiple events by using the same logic.


    For the final step of this process, you need to clean up when your playback interface
    is released from memory. Specifically, the `MainViewController` class needs to
    specify that it is no longer a first responder and that it should stop receiving
    remote-control events. This happens in the view’s `[self dealloc]` method, as
    shown in [Listing 7-9](#9781430250838_Ch07.xhtml#list9).


    [***Listing 7-9***](#9781430250838_Ch07.xhtml#_list9). Cleaning Up Remote-Control
    Events


    ```

    -(void)dealloc

    {

        [self resignFirstResponder];

    }

    ```


    Building a More Robust Audio Session


    By adding background audio and Now Playing support, you have significantly expanded
    the functionality of the MyPlayer application. It now operates more like an iPod
    application. However, to get full parity, you need to expand the MyPlayer application
    to handle unexpected external events, such as audio interruptions from the Phone
    application, or route changes originating from the user plugging in headphones.


    When listening to music with the iPod application, you may have noticed that playback
    stops when you bring up Siri and resumes when you dismiss her, and that playback
    pauses when you unplug your headphones (so you can avoid impressing any bystanders
    with your unique musical preferences). These actions are not the default in iOS;
    however, Cocoa Touch provides delegates and notifications that allow you to implement
    them in your apps.


    In this section, you will see how to build a more robust audio session for your
    audio applications by implementing the `AVAudioSessionDelegate` to handle audio
    interruptions, and by responding to `AVAudioSessionRouteChangeNotification` notifications
    to handle output device (route) changes. As with the previous sections in this
    chapter, you will continue to use the MyPlayer application as a sandbox for these
    new features.


    Handling Audio Interruptions


    An *audio interruption* in iOS is any event that interrupts your application’s
    audio session. Such events might be an incoming phone call, alarm, notification
    sounds, or Siri. The default behavior for audio interruptions in iOS is to follow
    the settings prescribed by the audio session you have chosen for your application.
    However, by responding to the `AVAudioSessionInterruptionNotification` notification,
    you can catch interruptions and insert your own playback handling code.


    **Note**  The `AVAudioSessionInterruptionNotification` notification is not exclusive
    to `AVFoundation`-based media players. Any class, including those that use the
    `MediaPlayer` framework for playback, can implement the `AVAudioSessionInterruptionNotification`
    notification.


    [Table 7-5](#9781430250838_Ch07.xhtml#Tab5) lists the default interruption behaviors
    for each kind of `AVAudioSession`.


    [Table 7-5](#9781430250838_Ch07.xhtml#_Tab5). Default Interruption Behaviors for
    AVAudioSession Types


    | **Subtype Name** | **Purpose** |

    | --- | --- |

    | `[MPMediaQuery albumsQuery]` | Returns a list of music items (songs), sorted
    by album title |

    | `[MPMediaQuery artistsQuery]` | Returns a list of music items (songs), sorted
    by artist name |

    | `[MPMediaQuery compilationsQuery]` | Returns a list of compilation items (albums),
    sorted by album title |

    | `[MPMediaQuery playlistsQuery]` | Returns a list of playlist items, sorted by
    playlist title |

    | `[MPMediaQuery songsQuery]` | Returns a list of music items (songs), sorted
    by song title |'
