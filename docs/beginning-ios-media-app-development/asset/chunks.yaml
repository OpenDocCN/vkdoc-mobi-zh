    the `AVFoundation` framework. You saw that by carefully using view positioning
    and auto-layout, you can build a user interface that matches a brand but that
    also has the flexibility to fit any number of screens.


    To enable media playback, you learned how to load a file by using the `AVPlayer`
    class and how to observe status changes to determine whether it loaded successfully.
