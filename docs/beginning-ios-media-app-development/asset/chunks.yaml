  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\n\n表示协议的语法是将其名称放在尖括号内。你需要将这些名称放在基类名称之后。你可以实现的协议数量没有限制，但在添加之前，需要确保它们没有任何冲突的方法名称！\n\
    \n在实现（`.m`）文件中，你为协议指示的方法定义其行为。如代码清单 2-5 所示，你可以在此处处理当图片选取器准备就绪时如何处理图片，或者当按下“取消”按钮时该做什么。\n\
    \n**代码清单 2-5**. 接收协议消息的类的实现文件\n\n```\n#import \"FirstViewController.h\"\n\n@implementation\
    \ FirstViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n  \
    \      // 在视图加载后进行任何额外的设置，通常来自 nib 文件。\n}\n\n#pragma mark - CameraViewController\
    \ 委托方法\n\n-(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage\
    \ *)image\n{\n    self.selectedImage = image;\n    [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n-(void)cameraViewController:(UIViewController *)controller\
    \ didCancel:(BOOL)state\n{\n    if (state == YES) {\n        [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n    }\n}\n\n@end\n```\n\n此列表中的 `#pragma mark` 会创建注释，这些注释将出现在\
    \ Xcode 的方法导航器下拉菜单中。在实现协议时使用此类注释是一个好习惯，这样你就能记住委托方法的定义位置。\n\n**注意** 对于你未定义的每个必需方法，你都会收到编译器警告。带有\
    \ `optional` 标志的方法增加了有用但非必需的行为，因此不会触发编译器警告。\n\n要完成使用委托的流程，你需要为原始类提供一种发送协议消息的方式。参见代码清单\
    \ 2-6。\n\n**代码清单 2-6**. 发送协议消息的类的修改后头文件\n\n```\n#import <UIKit/UIKit.h>\n\n@protocol\
    \ CameraViewControllerDelegate <NSObject>\n\n-(void)cameraViewController:(UIViewController\
    \ *)controller hasImage:(UIImage *)image;\n\n@optional\n-(void)cameraViewController:(UIViewController\
    \ *)controller didCancel:(BOOL)state;\n\n@end\n\n@interface CameraViewController\
    \ : UIViewController\n\n@property (nonatomic, strong) UIImage *capturedImage;\n\
    \n@property (nonatomic, weak) id <CameraViewControllerDelegate> delegate;\n\n\
    @end\n```\n\n如你所见，你需要向源类添加一个泛型委托对象（类型为 `id`）。定义此对象后，你就可以通过定义的协议消息安全地调用委托对象，如代码清单\
    \ 2-7 所示。\n\n**代码清单 2-7**. 原始类的修改后实现文件\n\n```\n#import \"CameraViewController.h\"\
    \n\n@implementation CameraViewController\n\n- (id)initWithNibName:(NSString *)nibNameOrNil\
    \ bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\
    \ bundle:nibBundleOrNil];\n    if (self) {\n        // 自定义初始化\n    }\n    return\
    \ self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 在视图加载后进行任何额外的设置。\n\
    }\n\n#pragma mark - 操作处理程序\n\n-(IBAction)takePictureButtonPressed:(id)sender\n\
    {\n    [self.delegate cameraViewController:self hasImage:self.capturedImage];\n\
    }\n\n-(IBAction)cancelButtonPressed:(id)sender\n{\n    [self.delegate cameraViewController:self\
    \ didCancel:YES];\n}\n\n@end\n```\n\n总而言之，协议的核心概念如下：\n\n1.  通过指定协议的方法及其优先级来定义协议。\n\
    2.  通过在目标类中定义所有必需的方法来实现协议。\n3.  在源类中定义一个泛型委托对象的实例，并使用它来发送协议消息。\n\n## 使用图片选取器访问已保存的图片\n"
- fmt: "Referring back to the example in [Figure 2-3](#9781430250838_Ch02.xhtml#Fig3),\
    \ you want to present the image picker when the user clicks the Take Picture button\
    \ from the main view controller. In order to accomplish this functionality, you\
    \ will need to learn how to configure the image picker, how to present it, and\
    \ how to handle the image data that is sent back via its protocol methods.\n\n\
    ## Configuring and Presenting the Image Picker\n\nTo make things simple, you’ll\
    \ start by configuring the image picker to select saved pictures. [Listing 2-8](#9781430250838_Ch02.xhtml#list8)\
    \ provides an example of a button handler that presents the image picker.\n\n\
    [***Listing 2-8***](#9781430250838_Ch02.xhtml#_list8). Configuring and Presenting\
    \ an Image Picker\n\n```\n-(IBAction)showPicker:(id)sender\n{\n    UIImagePickerController\
    \ *imagePicker = [[UIImagePickerController alloc] init];\n    imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\n    [self presentViewController:imagePicker\
    \ animated:YES completion:^{\n        NSLog(@\"Image picker presented!\");\n \
    \   }];\n}\n```\n\n**Note**  The caret syntax in the preceding code specifies\
    \ a *completion handler*, a code block that executes when the method has completed.\
    \ If you do not want to implement the block, replace the `^{...}` parameter with\
    \ `nil`.\n\nThis example uses the completion handler to generate a log message\
    \ indicating that the animation which presents the image picker has completed.\
    \ If you don’t want to do anything after the animation completes, you can set\
    \ the block parameter to `nil`.\n\nTo present the image picker, you need to perform\
    \ three steps: initialize the object, specify the source type, and present the\
    \ view controller. This example uses the `[UIViewController presentViewController:]`\
    \ method to present the image picker modally, as this is the user interface that\
    \ most apps implement. *Modal* presentation means showing a view on top of another\
    \ view, like a pop-up window.\n\n**Note**  You do not need to include any external\
    \ header files or frameworks to use `UIImagePicker`; it is part of UIkit!\n\n\
    To select the image picker as the data source, set the `[UIImagePickerController\
    \ sourceType]` parameter to `UIImagePickerControllerSourceTypePhotoLibrary`. [Table\
    \ 2-2](#9781430250838_Ch02.xhtml#Tab2) lists the possible options for `UIImagePickerControllerSourceType`.\n\
    \n[Table 2-2](#9781430250838_Ch02.xhtml#_Tab2). UIImagePickerControllerSourceType\
    \ Constant Values\n\n| Constant Name | Specified Behavior |\n| --- | --- |\n|\
    \ `UIImagePickerControllerSourceTypePhotoLibrary` | Presents an image thumbnail\
    \ browser, initialized with all of the photo albums on a user’s phone (for example,\
    \ Saved Photos, Camera Roll, Photo Stream) |\n| `UIImagePickerControllerSourceTypeSavedPhotosAlbum`\
    \ | Presents an image thumbnail browser, initialized with only the Camera Roll\
    \ album |\n| `UIImagePickerControllerSourceTypeCamera` | Presents the iOS system-wide\
    \ camera controller. Built-in, device-dependent controls include: Cancel, Take\
    \ Picture, Flash On/Off, Switch Camera |\n\n**Note**  The default source type\
    \ is `UIImagePickerControllerSourceTypePhotoLibrary`. This setting is automatically\
    \ applied if you do not specify a source type.\n\n## Handling Data from the Image\
    \ Picker\n\n[Listing 2-8](#9781430250838_Ch02.xhtml#list8) showed how to present\
    \ the image picker and configure it to use the thumbnail browser, but it did not\
    \ specify what should happen when the user selects the image or presses the Cancel\
    \ button within the image picker. To do this, you need to implement the `UIImagePickerControllerDelegate`\
    \ protocol.\n\nAs explained in the “Working with Protocols and Delegates” section,\
    \ the first step to using a protocol is to declare your receiver as a receiver\
    \ in your header file:\n\n```\n@interface FirstViewController : UIViewController\
    \ < UIImagePickerControllerDelegate>\n```\n\nSimilarly, you need to let the image\
    \ picker know that your class is the delegate object, so you set the `delegate`\
    \ property on the `UIImagePickerController` object you created earlier."
  raw: 'Referring back to the example in [Figure 2-3](#9781430250838_Ch02.xhtml#Fig3),
    you want to present the image picker when the user clicks the Take Picture button
    from the main view controller. In order to accomplish this functionality, you
    will need to learn how to configure the image picker, how to present it, and how
    to handle the image data that is sent back via its protocol methods.


    Configuring and Presenting the Image Picker


    To make things simple, you’ll start by configuring the image picker to select
    saved pictures. [Listing 2-8](#9781430250838_Ch02.xhtml#list8) provides an example
    of a button handler that presents the image picker.


    [***Listing 2-8***](#9781430250838_Ch02.xhtml#_list8). Configuring and Presenting
    an Image Picker


    ```

    -(IBAction)showPicker:(id)sender

    {

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;


    [self presentViewController:imagePicker animated:YES completion:^{

            NSLog(@"Image picker presented!");

        }];

    }

    ```


    **Note**  The caret syntax in the preceding code specifies a *completion handler*,
    a code block that executes when the method has completed. If you do not want to
    implement the block, replace the `^{...}` parameter with `nil`.


    This example uses the completion handler to generate a log message indicating
    that the animation which presents the image picker has completed. If you don’t
    want to do anything after the animation completes, you can set the block parameter
    to `nil`.


    To present the image picker, you need to perform three steps: initialize the object,
    specify the source type, and present the view controller. This example uses the
    `[UIViewController presentViewController:]` method to present the image picker
    modally, as this is the user interface that most apps implement. *Modal* presentation
    means showing a view on top of another view, like a pop-up window.


    **Note**  You do not need to include any external header files or frameworks to
    use `UIImagePicker`; it is part of UIkit!


    To select the image picker as the data source, set the `[UIImagePickerController
    sourceType]` parameter to `UIImagePickerControllerSourceTypePhotoLibrary`. [Table
    2-2](#9781430250838_Ch02.xhtml#Tab2) lists the possible options for `UIImagePickerControllerSourceType`.


    [Table 2-2](#9781430250838_Ch02.xhtml#_Tab2). UIImagePickerControllerSourceType
    Constant Values


    | Constant Name | Specified Behavior |

    | --- | --- |

    | `UIImagePickerControllerSourceTypePhotoLibrary` | Presents an image thumbnail
    browser, initialized with all of the photo albums on a user’s phone (for example,
    Saved Photos, Camera Roll, Photo Stream) |

    | `UIImagePickerControllerSourceTypeSavedPhotosAlbum` | Presents an image thumbnail
    browser, initialized with only the Camera Roll album |

    | `UIImagePickerControllerSourceTypeCamera` | Presents the iOS system-wide camera
    controller. Built-in, device-dependent controls include: Cancel, Take Picture,
    Flash On/Off, Switch Camera |


    **Note**  The default source type is `UIImagePickerControllerSourceTypePhotoLibrary`.
    This setting is automatically applied if you do not specify a source type.


    Handling Data from the Image Picker


    [Listing 2-8](#9781430250838_Ch02.xhtml#list8) showed how to present the image
    picker and configure it to use the thumbnail browser, but it did not specify what
    should happen when the user selects the image or presses the Cancel button within
    the image picker. To do this, you need to implement the `UIImagePickerControllerDelegate`
    protocol.


    As explained in the “Working with Protocols and Delegates” section, the first
    step to using a protocol is to declare your receiver as a receiver in your header
    file:


    ```

    @interface FirstViewController : UIViewController < UIImagePickerControllerDelegate>

    ```


    Similarly, you need to let the image picker know that your class is the delegate
    object, so you set the `delegate` property on the `UIImagePicker` object you created
    earlier.'
  trans: "\n回顾图 2-3 中的示例，当用户点击主视图控制器中的“拍照”按钮时，你需要显示图片选择器。为了实现此功能，需要学习如何配置图片选择器、如何呈现它，以及如何处理通过其协议方法返回的图片数据。\n\
    \n## 配置和呈现图片选择器\n\n为简单起见，我们将从配置图片选择器以选取已保存的图片开始。代码清单 2-8 提供了一个按钮事件处理程序的示例，用于呈现图片选择器。\n\
    \n***代码清单 2-8***. 配置和呈现图片选择器\n\n```\n-(IBAction)showPicker:(id)sender\n{\n   \
    \ UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
    \    imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\
    \n    [self presentViewController:imagePicker animated:YES completion:^{\n   \
    \     NSLog(@\"图片选择器已呈现！\");\n    }];\n}\n```\n\n**注意**  上述代码中的插入符语法指定了一个*完成处理程序*，即方法执行完成后会执行的代码块。如果你不想实现该代码块，可将`^{...}`参数替换为`nil`。\n\
    \n此示例使用完成处理程序生成一条日志消息，表明呈现图片选择器的动画已完成。如果你不想在动画完成后执行任何操作，可以将代码块参数设置为`nil`。\n\n\
    要呈现图片选择器，需要执行三个步骤：初始化对象、指定来源类型以及呈现视图控制器。此示例使用`[UIViewController presentViewController:]`方法以模态方式呈现图片选择器，这是大多数应用实现的用户界面方式。*模态*呈现意味着在另一个视图之上显示一个视图，类似于弹出窗口。\n\
    \n**注意**  使用`UIImagePicker`无需包含任何外部头文件或框架；它是 UIkit 的一部分！\n\n要将图片选择器作为数据源，请将`[UIImagePickerController\
    \ sourceType]`参数设置为`UIImagePickerControllerSourceTypePhotoLibrary`。表 2-2 列出了`UIImagePickerControllerSourceType`的可选值。\n\
    \n表 2-2. UIImagePickerControllerSourceType 常量值\n\n| 常量名称 | 指定行为 |\n| --- | ---\
    \ |\n| `UIImagePickerControllerSourceTypePhotoLibrary` | 显示图片缩略图浏览器，初始化为用户手机上的所有相册（例如，已保存的照片、相机胶卷、照片流）\
    \ |\n| `UIImagePickerControllerSourceTypeSavedPhotosAlbum` | 显示图片缩略图浏览器，仅初始化为相机胶卷相册\
    \ |\n| `UIImagePickerControllerSourceTypeCamera` | 显示 iOS 系统级相机控制器。内置的、依赖于设备的控件包括：取消、拍照、闪光灯开/关、切换摄像头\
    \ |\n\n**注意**  默认来源类型为`UIImagePickerControllerSourceTypePhotoLibrary`。如果你未指定来源类型，将自动应用此设置。\n\
    \n## 处理来自图片选择器的数据\n\n代码清单 2-8 展示了如何呈现图片选择器并将其配置为使用缩略图浏览器，但并未指定当用户在图片选择器中选择图片或按下“取消”按钮时应发生什么。为此，你需要实现`UIImagePickerControllerDelegate`协议。\n\
    \n正如“使用协议和委托”部分所述，使用协议的第一步是在头文件中将接收者声明为接收者：\n\n```\n@interface FirstViewController\
    \ : UIViewController < UIImagePickerControllerDelegate>\n```\n\n同样，你需要让图片选择器知道你的类是其委托对象，因此需要在你之前创建的`UIImagePickerController`对象上设置`delegate`属性。\n"
- fmt: "为了呈现图像选择器，请实现一个按钮处理程序，类似于[清单 2-9](#9781430250838_Ch02.xhtml#list9) 中的处理程序。请记住，要做到这一点，你需要在\
    \ Interface Builder 中创建一个按钮，并将其连接到处理程序的 `IBAction`。\n\n**[***清单 2-9***](#9781430250838_Ch02.xhtml#_list9).\
    \ 呈现图像选择器的按钮处理程序**\n\n```objc\n-(IBAction)showPicker:(id)sender\n{\n    UIImagePickerController\
    \ *imagePicker = [[UIImagePickerController alloc] init];\n    imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n    imagePicker.delegate\
    \ = self;\n\n    [self presentViewController:imagePicker animated:YES completion:^{\n\
    \        NSLog(@\"Image picker presented!\");\n    }];\n}\n```\n\n现在，你已经声明主视图控制器将实现协议的方法，接下来需要实现这些方法。指示已选择图像的委托方法如下：\n\
    \n```objc\n- (void)imagePickerController:(UIImagePickerController *)picker\n \
    \                              didFinishPickingMediaWithInfo:(NSDictionary *)info\n\
    ```\n\n此方法的返回值是发送消息的图像选择器，以及一个包含所选资产信息的字典对象。你可以在[表 2-3](#9781430250838_Ch02.xhtml#Tab3)\
    \ 中找到由 `info` 字典提供的所有相关键/值对。\n\n**[表 2-3](#9781430250838_Ch02.xhtml#_Tab3). 照片的\
    \ UIImagePickerController 媒体信息字典键/值对**\n\n| 键名 | 存储值 |\n| --- | --- |\n| `UIImagePickerControllerMediaType`\
    \ | `NSString` 对象，标识媒体类型（图像或影片） |\n| `UIImagePickerControllerOriginalImage` |\
    \ `UIImage` 对象，包含所选资产的原始图像数据 |\n| `UIImagePickerControllerEditedImage` | `UIImage`\
    \ 对象，包含所选资产的原始图像数据（如果启用了编辑功能） |\n| `UIImagePickerControllerCropRect` | `CGRect`，包含用户选择的裁剪矩形的坐标（如果启用了编辑功能）\
    \ |\n| `UIImagePickerControllerMediaMetadata` | `NSDictionary`，包含使用系统相机保存的图像的元数据\
    \ |\n\n在这种情况下，你最感兴趣的是 `UIImagePickerControllerOriginalImage` 键对应的值，因此在委托方法中，你需要提取\
    \ `UIImage` 对象。将 `UIImage` 对象设置为图像视图的内容后，可以在选择器上调用 `dismiss` 消息来关闭它，如[清单 2-10](#9781430250838_Ch02.xhtml#list10)\
    \ 所示。\n\n**[***清单 2-10***](#9781430250838_Ch02.xhtml#_list10). 接收图像选择器的 didFinishPickingMedia\
    \ 方法**\n\n```objc\n-(void)imagePickerController:(UIImagePickerController *)picker\n\
    \                              didFinishPickingMediaWithInfo:(NSDictionary *)info\n\
    {\n    UIImage *selectedImage = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
    \    [self.imageView setImage:selectedImage];\n\n    [picker\n        dismissViewControllerAnimated:YES\
    \ completion:^{\n        NSLog(@\"Image selected!\");\n    }];\n}\n```\n\n类似地，当用户在图像选择器中按下“取消”按钮时，你需要关闭选择器，因此需要实现\
    \ `cancel` 委托方法，然后在图像选择器上调用 `[UIViewController dismissViewControllerAnimated:completion:]`\
    \ 消息。请参见[清单 2-11](#9781430250838_Ch02.xhtml#list11)。\n\n**[***清单 2-11***](#9781430250838_Ch02.xhtml#_list11).\
    \ 接收图像选择器的取消消息**\n\n```objc\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker\n{\n    [picker dismissViewControllerAnimated:YES completion:^{\n \
    \       NSLog(@\"Picker cancelled without doing anything\");\n    }];\n}\n```\n\
    \n瞧！你现在可以呈现图像选择器，并在应用中使用选定的图像了！\n\n**注意** `UIPickerController` 功能有限，因为它一次只能选择一张图片。在[第\
    \ 3 章](#9781430250838_Ch03.xhtml)中，你将探索如何构建一个允许用户选择多张图片的自定义视图控制器。\n\n## 使用图像选择器拍照\n\
    \n乍一看，你可能会认为将图像选择器配置为使用硬件摄像头就像将 `sourceType` 设置为 `UIImagePickerControllerSourceTypeCamera`\
    \ 一样简单。不幸的是，这一行代码可能非常具有欺骗性。虽然它是配置中有效且关键的部分，但还涉及其他步骤。首先，你需要确保你的应用正在运行的设备有摄像头，并且你的应用有权限访问它。苹果将此设计模式称为*动态配置*，你需要严格遵守它，以确保你的应用能在尽可能多的设备类型上正常工作。\n\
    \n方便的是，作为实现动态配置的一种手段，`UIImagePickerController` 提供了一系列公共方法，你可以使用这些方法来确定设备或你想要使用的功能的状态。[表\
    \ 2-4](#9781430250838_Ch02.xhtml#Tab4) 列出了这些方法及其对应的功能。\n\n**[表 2-4](#9781430250838_Ch02.xhtml#_Tab4).\
    \ UIImagePickerController 设备检测方法**\n\n| 方法签名 | 预期用途 |\n| --- | --- |\n| `+ (BOOL)isSourceTypeAvailable:\
    \ UIImagePickerControllerSourceType)sourceType` | 指示指定的源类型（相册或相机）在设备上是否可用 |\n\
    | `+ (BOOL)isCameraDeviceAvailable: (UIImagePickerControllerCameraDevice)cameraDevice`\
    \ | 指示所需的摄像头在设备上是否可用 |\n| `+ (BOOL)isFlashAvailableForCameraDevice: (UIImagePickerControllerCameraDevice)cameraDevice`\
    \ | 指示所选摄像头（前置或后置）的闪光灯是否可用 |\n| `+ (NSArray *)availableMediaTypesForSourceType:\
    \ (UIImagePickerControllerSourceType)sourceType` | 指示所选源类型（相册或硬件）支持的媒体类型 |\n|\
