    \n首先，你需要确保你想要使用的硬件接口的所有 `AVCaptureDevice` 和 `AVCaptureInput` 对象都已正确设置。回顾 `[CameraViewController\
    \ initializeCameras]` 方法，你可以看到静态图像捕获要求你找到能够捕获视频的捕获设备（以便显示实时画面）。这样就处理了视觉方面的问题；然而，为了捕获音频，你需要为麦克风添加一个输入设备。列表\
