    \n## 添加覆盖视图（水印）\n\n`AVPlayerViewController` 类的另一个便利之处是它允许您添加一个*内容覆盖视图*。覆盖视图让您可以在视频层之上显示静态或实时内容，而无需编写复杂的底层代码来拦截视频层。例如，如果您需要显示注释、实时状态指示器甚至是水印，内容覆盖视图是一种快速实现这些功能的方法。覆盖行为的一个著名例子是\
    \ YouTube 广告视图，如[图12-10](#9781430250838_Ch12.xhtml#Fig10)所示，它允许您点击高亮区域访问广告商的网站。\n\
    \n![9781430250838_Fig12-10.jpg](images/9781430250838_Fig12-10.jpg)\n\n[图12-10](#9781430250838_Ch12.xhtml#_Fig10)。YouTube\
    \ 广告功能\n\n在本节中，您将学习如何为视频添加水印——这是为您的应用添加品牌标识的好方法。此示例使用静态图像作为水印，但您可以在覆盖视图中显示任何您想要的内容——只要它是\
    \ `UIView` 类的子类即可。\n\n**注意** 避免在内容覆盖视图中放置高度交互的元素，因为它们可能与控制条发生冲突。\n\n首先，将图像导入到您的项目中。如果您希望水印具有透明度，请使用带有透明度层的\
    \ PNG 图像；否则，使用 JPEG 或不透明的 PNG 图像文件。我倾向于使用高度约为 50 像素的图像，这样图像不会分散观众对内容的注意力。尽量在图像的所有边缘构建至少\
    \ 10 像素的内边距。使用此图像创建一个 `UIImage` 对象。在 MyAVPlayer 项目中，文件命名为 `logo.png`：\n\n```\n\
    UIImage *image = [UIImage imageNamed:@\"logo.png\"];\n```\n\n要在内容覆盖视图上显示图像，您需要将其包装在\
    \ `UIView` 的子类中，因此使用您刚刚创建的 `UIImage` 对象初始化一个 `UIImageView` 对象：\n\n```\nUIImageView\
    \ *imageView = [[UIImageView alloc] initWithImage:image];\n```\n\n请记住，创建 `UIView`\
    \ 的过程与调整其大小和位置是不同的。为了模仿电视广播，大多数视频应用喜欢将水印放置在视频的右下角或右上角。通过将 `UIImageView` 类的 `contentMode`\
    \ 属性设置为 `UIViewContentModeBottomRight`，您可以指示 `UIImageView` 类将图像放置在右下角，同时保留其原始尺寸：\n\
    \n```\nimageView.contentMode = UIViewContentModeBottomRight;\n```\n\n同样，您会希望图像保持在视频播放区域内。不幸的是，视频播放器的大小会随着\
    \ `AVPlayerViewController` 的呈现样式（窗口或全屏）而改变。不过，您可以通过将覆盖视图的大小设置为视频播放区域的*边界框*，并添加*灵活的*宽度和高度调整蒙版来解决这个问题：\n\
