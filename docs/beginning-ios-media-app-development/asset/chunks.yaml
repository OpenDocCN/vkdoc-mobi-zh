- fmt: '# About the Technical Reviewer


    ![9781430250838_unFigFM-02.jpg](images/9781430250838_unFigFM-02.jpg)


    **Gheorghe Chesler** is a senior software engineer with expertise in Quality Assurance,
    System Automation, Performance Engineering, and e-Publishing. He works at ServiceNow
    as a Senior Performance Engineer, and is a principal technical consultant for
    Plural Publishing, a medical-field publishing company. His preferred programming
    language is `Perl` (so much so that he identifies with the Perl mascot, hence
    the camel picture), but also worked on many `Java` and `Objective-C` projects.


    # Acknowledgments


    There are so many people I would like to thank who helped me during this most
    challenging and rewarding period of my life that I could probably write a book
    about it (ha ha!). But, so I won’t lose my readers’ interest, I will briefly name
    just a few people. If I have forgotten anyone, please forgive me; I write apps
    to counteract my absentmindedness.


    First, I would like to thank my family, Mohammed, Layla, and Roba Bakir, who always
    pushed me to explore my full potential.


    Next, I would like to thank Michelle Lowman at Apress, who found me at Macworld
    and kindly asked me if I was interested in writing a book. I will never forget
    our conversations about sleep deprivation.


    Kevin Walter, my coordinating editor, who had the unfortunate task of constantly
    reminding me to finish my chapters, but always brought positivity to every exchange.


    Russell Douglas, my technical editor, and Sharon Wilkey, my copy editor, who helped
    me find my writing voice and caught all of my stray commas.


    Gheorghe Chesler, my technical mentor, who taught me the beauty of clean code
    (and Perl golf). His input as the technical reviewer of this book helped me shape
    my thoughts into a work others could use.


    Mike MacKenzie, my business mentor and one of my first clients, who has always
    provided me with invaluable advice and great times in Orange County.


    Rafael Rodriguez and Viraphol Sengsourya, two of the first members of devAtelier
    LLC, whose constant hard work, diligence, and positivity have shaped the image
    of the company immensely. A dignified designer (Rafael) and an excellent engineer
    (Viraphol) who have been incredible partners and confidants.


    Carol Miller, one of my first computer science professors at North Carolina State
    University, whose engaging lectures and stories of “critical chickens” made every
    class impactful and inspirational.


    And finally, I would like to thank all of my friends, who have constantly supported
    me, encouraged me, and had the patience to listen to my crazy stories (most of
    the time). See you, space cowboys.


    # Introduction


    Do you remember the first time you experienced multimedia on a computer? Was it
    the carefully orchestrated town music of The Oregon Trail on an Apple Il? Or maybe
    it was a YouTube video of a talented feline playing a catchy tune on a keyboard?


    What about when you started to get into programming? Was it to make a game? Or
    perhaps emulate the exact tone of the school bell so you could get out of class
    early?


    For many people, multimedia has been one of the most exciting and personal aspects
    of computing. For some of us (myself included), it was an inspiration to learn
    programming. The lure of multimedia has not changed as computing has become mobile,
    but fortunately, it is now easier than ever to get started making your own multimedia
    apps.


    iOS provides an incredibly deep set of APIs (application programming interfaces)
    that allow you to display and capture photos, videos, and audio within your apps.
    These APIs are built directly into Cocoa Touch, meaning you do not need to include
    any external libraries to use them. For many of the APIs, including the camera,
    the capture interface exposed in your app is the same one used throughout the
    system. This is a great improvement over the “good old days,” when integrating
    a camera may have required talking to your component manufacturer for several
    weeks and porting sample code.


    The goal of this book is to help you take what you already know about iOS app
    development and apply it to media app development. One of the great things about
    Cocoa Touch is how much Apple has abstracted low-level functionality for you.
    You can now build apps that let you play video without having to become an expert
    on video codecs.


    By building apps that focus on specific APIs, and picking up new programming concepts
    along the way, you will make incremental progress and avoid being overwhelmed
    by the seemingly infinite set of APIs available in iOS. The units in this book
    (photo, video, audio) begin by showing you how to get started with the relevant
    APIs and then peel back the layers, allowing you to customize your apps beyond
    the basic features provided out-of-the-box.


    You have already accomplished a lot to be far enough in your iOS development journey,
    and I’m glad you’ve decided to start looking into multimedia features. Let’s go
    the extra step together and build some amazing media apps!


    # Chapter 1: Welcome to iOS Media App Development


    ## What Is the Purpose of This Book?


    This book is an in-depth guide to iOS media app development, targeted at beginning-
    to intermediate-level iOS developers. In this book, you will learn how to build
    apps that take advantage of iOS’s programming interfaces, or APIs, for capturing,
    displaying, and manipulating still images (photos), videos, and audio resources.
    The last part of the book covers new functionality, including the Swift programming
    language, which Apple introduced in iOS 8.


    In presenting these topics, I have taken some cues from tutorial-based guides,
    which introduce you to topics by providing you with code snippets. However, this
    book goes deeper than typical tutorials by introducing background information,
    presenting discussions on implementation challenges, and providing keystone projects
    to reinforce your new knowledge. These keystone projects frame each chapter by
    giving you a full-fledged application that takes advantage of the features covered,
    as well as lessons from other popular applications. By building a real application,
    you will gain a deeper understanding of the software design process, and more
    experience with tackling implementation challenges—often the hardest part of finishing
    an app.


    You may have already tried developing an app but stopped, or have friends in the
    same position. One of the most famous complaints about iOS development is that
    it is too limited in what it allows you to do. Although there is some truth to
    this statement, in that the iOS platform forces you to develop apps “in a sandbox”
    and hides access to many otherwise common features, such as a global file system,
    many of these complaints come from having to develop for Cocoa Touch, an extremely
    platform-specific framework. Programming for a framework allows you to take advantage
    of many features for free, such as drawing a view or instantiating a media player,
    but the cost is the time required to learn the framework and its limits. Furthermore,
    the sheer number of frameworks iOS provides can be daunting to newcomers, who
    feel they need to become familiar with all of them before they can get started.
    This book will help you build media apps by focusing on the iOS media frameworks
    and the skills you need to use them.


    Several guides to iOS development exist that briefly touch upon iOS media app
    development, but I feel that they provide only cursory glances at the material.
    Similarly, Apple provides excellent documentation for its APIs, but the wording
    and level of technical depth can be intimidating. This guide complements the two
    by providing specific information with an accessible approach.


    ## What Makes Media App Development Different?'
