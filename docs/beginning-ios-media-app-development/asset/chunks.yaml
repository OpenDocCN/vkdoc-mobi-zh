    \nFinally, to return results from the `CameraViewController` object, you need\
    \ to use the `CameraDelegate` protocol, which you need to modify to handle video.\
    \ Because video files are much larger than images, they cannot be passed back\
    \ as parameters, so you need to find an alternative solution.\n\n## Saving Video\
    \ Output\n\nYou may remember earlier discussions in the book, where I hinted that\
    \ video files are more complex than image and audio files. Unlike image and audio\
    \ files, which contain the binary information for one data stream, video files\
    \ are containers that contain both audio and video data streams. This makes the\
    \ requirement of having valid headers and footers (which indicate the termination\
    \ points for the data) even more strict with video files. Combined with the increased\
    \ sophistication of the algorithms required to compress video (codecs), you can\
    \ start to see why the process is complex.\n\nBy calling the `[AVCaptureFileOutput\
    \ stopRecording]` method from the `[CameraViewController togglePlayback:]` method,\
    \ you instructed the `AVCaptureMovieFileOutput` class to kick off this process\
    \ and close the file. After the File Close operation is complete, your output\
    \ object calls the `[AVCaptureFileOutputRecordingDelegate captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:error:]`\
    \ method on the object you declared as the delegate (for the MyCustomRecorder\
    \ project—the `CameraViewController` class).\n\nOne of the key advantages of a\
    \ protocol is that it strictly defines a set of messages it will send its delegates,\
    \ down to the message name and parameter types. The `didFinish` protocol message\
    \ sends back the following:\n\n*   An `AVCaptureOutput` object, identifying the\
    \ output object that completed\n*   An `NSURL` object that indicates the URL for\
    \ the file that successfully (or unsuccessfully) closed\n*   An `NSArray` of `AVCaptureConnection`\
    \ objects that are associated with the session for the output\n*   An `NSError`\
    \ object that returns a non-`nil` value if the file failed to close successfully\n\
    \nYou can find the implementation for the `CameraViewController` class in [Listing\
