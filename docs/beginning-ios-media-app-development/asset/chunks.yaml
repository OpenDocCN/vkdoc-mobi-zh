  trans: "\n# iOS 开发中的协议与通知\n\n你应该对前面章节中介绍的协议（protocol）已经有所了解。当你希望为两个类（例如相机与需要从相机获取图像的类）之间的数据传递定义有限接口时，协议是理想的选择。然而，协议也可能非常严格。协议定义中的每个方法都被隐式标记为`required`（必需），这意味着委托类必须实现所有方法才能完全符合规范。\n\
    \n`MPMediaPlayerController`类可以发出多种类型的消息，包括播放状态、流错误以及显示模式变化（例如全屏）。使用委托来实现所有这些功能可能会变得笨重。对于媒体播放器，你需要一种消息传递方案，让接收类只处理它关心的消息，而无需承担巨大的开销。\n\
    \n当你希望使用一种松散的消息传递方案时，通知是理想的选择。通知是一种基于名称的消息传递系统，任何人都可以通过使用特定名称发送格式正确的消息来*发布*通知，任何人都可以通过声明他们能够使用该名称接收格式正确的消息来处理（*观察*）通知。这种魔法由一个*通知中心*对象实现，它充当所有通知的中介。\n\
    \n第三种通用的消息传递方案是键值观察，其工作原理与通知类似，不同之处在于键值观察不是基于名称的系统，而是基于对象实例的变化。例如，“当`count`变量发生变化时，调用`increaseCount`方法”。虽然它在某些情况下很有用，但这并不适用于媒体播放器，因为你不需要监控某个属性的变化。\n\
    \n## 添加通知观察者\n\n要将你的类声明为某个通知的*观察者*，有两个主要 API：`[NSNotificationCenter addObserver:selector:name:object]`\
    \ 和 `[NSNotificationCenter addObserverForName:object:queue:usingBlock]`。两者都要求你指定要观察的通知名称以及如何处理它。两者之间的主要区别在于：第一个\
    \ API 在捕获到通知时通过`@selector`参数在运行时调用一个方法，而第二个 API 则执行一个代码块。例如，如果你试图捕获一个`MPMoviePlayerLoadStateDidChangeNotification`通知，并使用声明为`[self\
    \ stateChanged:]`的处理方法，你的代码将如下所示：\n\n```\n[[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n    selector:@selector(stateChanged:)\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
    \    object:nil];\n```\n\n你可能对`[NSNotificationCenter defaultCenter]`这段代码有疑问。这是一个单例对象，它为你的应用程序提供一个通知中心对象——无需任何特殊设置即可使用。除非你的代码变得足够复杂，需要根据通知中心来过滤通知，否则这对于大多数应用来说已经足够了。\n\
    \n## 发布与移除通知\n\n要发送通知，你可以通过使用`[NSNotificationCenter postNotification:object:userInfo]`方法来*发布*一个`NSNotification`对象。使用此方法，你需要指定要发布的通知名称以及你传递的任何信息，通过将信息添加到`userInfo`参数传递的`NSDictionary`对象中。如果你要发布一个名为`MyCustomNotification`的自定义通知，代码将如下所示：\n\
    \n```\nNSDictionary *myDict = [NSDictionary dictionaryWithObject:@\"ahmed\"\n\
    \                                     forKey:@\"userName\"];\n[[NSNotificationCenter\
    \ defaultCenter]\n      postNotificationName:@\"MyCustomNotification\" object:self\n\
    \      userInfo:myDict];\n```\n\n关于通知还有最后一点：当类被释放时，一定要记得移除观察者。除非你显式地移除观察者，否则通知中心会尝试继续使用你的类来处理传入的通知，这可能会导致你的应用程序崩溃。要移除观察者，请使用`[NSNotificationCenter\
    \ removeObserver:name:object]`方法。对于`MyCustomNotification`示例，调用方式如下：\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] removeObserver:self\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
    \    object:nil];\n```\n\n如你所见，通知是建立消息传递的一种快速方式。对于需要执行特定消息传递方案的类，委托是理想的选择，但如果你只是试图建立一个简单且允许任何人选择是否响应的方案，那么通知就是完美的解决方案。\n\
    \n## 实际实现\n\n正如前面的侧边栏所述，处理通知的第一步是将你的类声明为观察者。因为这是一个类级别的操作，你可以在`MainViewController`类的`[self\
    \ viewDidLoad]`方法中设置观察者。通过将其设为类级别操作，无论媒体播放器是被初始化多次还是从未初始化（如果媒体播放器从未初始化，消息将永远不会发送），你都已经准备好。列表\
    \ 8-7 展示了`MainViewController`类修改后的`[self viewDidLoad]`方法。\n\n**列表 8-7.** 向你的类添加通知观察者\n\
    \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 加载视图后的任何其他设置，\n\
    \    // 通常来自一个 xib 文件。\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \        selector:@selector(playbackFinished:)\n        name:MPMoviePlayerPlaybackDidFinishNotification\
    \ object:nil];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n   \
    \     selector:@selector(loadStateChanged:)\n        name:MPMoviePlayerLoadStateDidChangeNotification\
    \ object:nil];\n}\n```\n\n在示例中，我使用了`[NSNotificationCenter addObserver:selector:name:object]`\
    \ API 来设置观察者，这样我就可以指定一个方法作为通知处理程序，而不是代码块——这主要是为了让代码在拆分后更易于阅读。\n\n`MPMoviePlayerPlaybackDidFinishNotification`通知通过`MPMoviePlayerPlaybackDidFinishReasonUserInfoKey`键返回一个`MPMovieFinishReason`常量，并通过`error`键返回一个错误。如果结束原因是`MPMovieFinishReasonPlaybackError`，你应该提取错误对象，并通过错误消息或`UIAlertView`通知用户。你可以在列表\
    \ 8-8 中找到`MainViewController`类的`[self playbackFinished:]`方法。\n\n**列表 8-8.** 显示播放错误\n\
    \n```\n-(void)playbackFinished:(NSNotification *) notification\n{\n    NSDictionary\
    \ *userInfo = notification.userInfo;\n    NSNumber *finishReason = [userInfo\n\
    \        objectForKey:MPMoviePlayerPlaybackDidFinishReasonUserInfoKey];\n\nif\
    \ ([finishReason integerValue] ==\n        MPMovieFinishReasonPlaybackError) {\n\
    \        NSError *error = [userInfo objectForKey:@\"error\"];\n        NSString\
    \ *errorString = [error description];\n\nUIAlertView *alert = [[UIAlertView alloc]\n\
    \            initWithTitle:@\"错误！\"\n            message:errorString delegate:nil\n\
    \            cancelButtonTitle:@\"确定\" otherButtonTitles:nil];\n        [alert\
    \ show];\n    }\n}\n```\n"
- fmt: '`MPMoviePlayerLoadStateDidChangeNotification`通知不会在`userInfo`字典中设置任何键，但你知道当它触发时，播放器已在加载状态之间转换（主要状态有`Unknown`、`Playable`、`Playthrough
    OK/Loaded`和`Stalled`）。与音频播放器一样，加载视频文件是一个不确定的操作，这意味着你无法预测文件加载需要多长时间。因此，你应该使用`[MPMediaPlayerController
    prepareToPlay]`方法开始加载视频文件，并在文件加载完成后触发`[MPMediaPlayerController play]`方法。你可以通过比较`loadState`属性与`MPMovieLoadStatePlayable`值来判断媒体播放器是否准备好播放文件，如[代码清单8-9](#9781430250838_Ch08.xhtml#list9)所示。


    [***代码清单8-9***](#9781430250838_Ch08.xhtml#_list9). 自动启动媒体播放器


    ```

    -(void)loadStateChanged:(NSNotification *) notification

    {

        if (self.moviePlayer.loadState == MPMovieLoadStatePlayable) {


    [self.moviePlayer play];

        }

    }

    ```


    最后一步，请记住你需要移除通知以在类完成后进行清理。完全如侧边栏所示，你应将调用`[NSNotificationCenter removeObserver:name:object]`的代码放在`MainViewController`的`[self
    dealloc]`方法中，如[代码清单8-10](#9781430250838_Ch08.xhtml#list10)所示。


    [***代码清单8-10***](#9781430250838_Ch08.xhtml#_list10). 移除通知观察者


    ```

    - (void)dealloc

    {

        [[NSNotificationCenter defaultCenter] removeObserver:self

           name:MPMoviePlayerPlaybackDidFinishNotification

        object:nil];

        [[NSNotificationCenter defaultCenter] removeObserver:self

             name:MPMoviePlayerLoadStateDidChangeNotification

             object:nil];

    }

    ```


    配置视频播放器


    现在你已经完成了初始化媒体播放器所需的所有步骤，可以开始播放视频文件了。然而，为了从`MPMediaPlayerController`类中获得最佳性能，你需要通过指定一些额外的视频特定属性值来配置它：源类型和AirPlay。


    指定源类型（本地文件或网络流）


    `MPMoviePlayerController`类的默认源类型配置是*unknown*。这使该类采取观望态度来加载视频。它会尝试从源加载数据，然后——根据对源的了解——配置电影播放器以从文件或网络流播放。通过为`movieSourceType`属性指定值，你可以省略这个中间步骤并显著加快加载时间。


    `movieSourceType`属性接受`MPMovieSourceType`常量值作为输入。本地文件的值为`MPMovieSourceTypeFile`，而网络流的值为`MPMovieSourceTypeStreaming`。MyVideoPlayer应用程序只允许用户选择本地文件，因此我使用了`MPMovieSourceTypeFile`值：


    ```

    self.videoPlayer.movieSourceType = MPMovieSourceTypeFile;

    ```


    指定AirPlay支持


    在窗口和全屏模式下，视频播放器都支持AirPlay作为播放控制。如[第7章](#9781430250838_Ch07.xhtml)所述，AirPlay是苹果的专有技术，允许用户将iOS设备上的音频和视频内容流式传输到Apple
    TV。要使视频文件兼容AirPlay，它需要使用H.264视频编解码器（`MPMoviePlayerController`类支持的格式之一）进行编码；要使视频流兼容AirPlay，它需要使用Apple
    HTTP Live Streaming（HLS）协议进行传输。请注意，`MPMoviePlayerController`可以播放许多不兼容AirPlay的文件类型和流，并且只有在播放兼容AirPlay的项目时才会显示AirPlay控制。


    当视频文件通过AirPlay播放时，你的电影播放器视图将被替换为占位图像，如[图8-4](#9781430250838_Ch08.xhtml#Fig4)所示。设备上的电影播放器仍然可以使用所有播放控制，但视频将仅在Apple
    TV上播放。


    ![9781430250838_Fig08-04.jpg](images/9781430250838_Fig08-04.jpg)


    [图8-4](#9781430250838_Ch08.xhtml#_Fig4). AirPlay视频播放的占位图像


    默认情况下，对于通过`MPMoviePlayerController`播放的所有兼容AirPlay的视频文件和流，AirPlay图标会自动弹出。如果你正在构建一个需要禁用此功能的应用程序，可以通过`allowsAirPlay`属性来实现。将此值设置为`NO`可阻止AirPlay控制在电影播放器中显示。


    ```

    self.videoPlayer.allowsAirPlay = NO;

    ```


    **注** 如果用户已为其设备启用AirPlay镜像，禁用电影播放器中的AirPlay支持并不能阻止AirPlay显示。要禁用此功能，你需要在应用程序中实现辅助显示支持。该功能的教程可在苹果开发者库网站上找到。


    指定控制类型


    默认情况下，`MPMediaPlayerController`类在视频层之上提供内置的播放控制。对于许多应用程序，你可能希望更改控制样式或完全隐藏控制。你可以通过`controlStyle`属性进行切换，该属性接受`MPMovieControlStyle`类型的常量。在iOS
    7及更高版本中，你可以使用两种样式：`MPMovieControlStyleNone`（完全隐藏控制）和`MPMovieControlStyleFullscreen`（显示全套控制，包括快进、快退和音频控制）。默认控制样式是`MPMovieControlStyleFullscreen`：


    ```

    self.moviePlayer.controlStyle = MPMovieControlStyleFullscreen;

    ```


    指定缩放模式


    视频播放器的一个最终配置选项是缩放模式。与图像一样，当视频尺寸与父视图不完全匹配时，此选项决定视频将如何缩放。你可以通过`scalingMode`属性设置电影播放器的内容缩放模式，该属性接受`MPMovieScalingModeFill`常量作为输入：


    ```

    self.moviePlayer.scalingMode = MPMovieScalingModeAspectFit;

    ```


    与图像类似，可用的缩放模式如下：


    *   `MPMovieScalingModeNone`：此模式不提供缩放，将源视频放置在目标视图中（根据尺寸进行裁剪或信箱化处理）。

    *   `MPMovieScalingModeAspectFit`：此模式在不失真原始视频的情况下，尽可能将视频缩放至目标视图的尺寸（上或下）。

    *   `MPMovieScalingModeAspectFill`：此模式在不失真视频的情况下，将视频缩放以匹配目标视图的尺寸（多余部分将被裁剪）。

    *   `MPMovieScalingModeFill`：此模式通过失真原始视频来匹配目标视图的尺寸。


    默认值是`MPMovieScalingModeAspectFit`。


    开始播放


    正如你可能从[第6章](#9781430250838_Ch06.xhtml)和[第6章](#9781430250838_Ch06.xhtml)中的音频播放器示例中记得的那样，你无法预测加载媒体文件需要多长时间。加载更大的文件（视频无疑更大！）需要更长时间。因此，一旦你完成视频播放器的初始化和配置，应立即调用`[MPMoviePlayerController
    prepareToPlay]`。由于初始化代码为`MPMoviePlayerLoadStateDidChangeNotification`通知添加了处理程序，你可以在文件加载完成后自动开始播放文件。


    [代码清单8-11](#9781430250838_Ch08.xhtml#list11)展示了视频播放器的完整初始化方法，包括刚刚描述的预加载步骤。


    [***代码清单8-11***](#9781430250838_Ch08.xhtml#_list11). 视频播放器的完整初始化方法'
  raw: 'The `MPMoviePlayerLoadStateDidChangeNotification` notification does not set
    any keys in the `userInfo` dictionary, but you know that when it fires, the player
    has transitioned between load states (the major states are `Unknown`, `Playable`,
    `Playthrough OK/Loaded`, and `Stalled`). As with the audio player, loading a video
    file is an indeterminate operation, meaning you cannot predict how long it will
    take for the file to load. For this reason, you should use the `[MPMediaPlayerController
    prepareToPlay]` method to start loading the video file, and trigger the `[MPMediaPlayerController
    play]` method after the file has loaded. You can find out if the media player
    is ready to play a file by comparing the `loadState` property to the value `MPMovieLoadStatePlayable`,
    as shown in [Listing 8-9](#9781430250838_Ch08.xhtml#list9).


    [***Listing 8-9***](#9781430250838_Ch08.xhtml#_list9). Automatically Starting
    the Media Player


    ```

    -(void)loadStateChanged:(NSNotification *) notification

    {

        if (self.moviePlayer.loadState == MPMovieLoadStatePlayable) {


    [self.moviePlayer play];

        }

    }

    ```


    For the final step, remember that you need to remove your notifications to clean
    up after the class fully. Exactly as in the sidebar, you would place your calls
    to `[NSNotificationCenter removeObserver:name:object]` in the `MainViewController`’s
    `[self dealloc]` method, as shown in [Listing 8-10](#9781430250838_Ch08.xhtml#list10).


    [***Listing 8-10***](#9781430250838_Ch08.xhtml#_list10). Removing Your Notification
    Observers


    ```

    - (void)dealloc

    {

        [[NSNotificationCenter defaultCenter] removeObserver:self

           name:MPMoviePlayerPlaybackDidFinishNotification

        object:nil];

        [[NSNotificationCenter defaultCenter] removeObserver:self

             name:MPMoviePlayerLoadStateDidChangeNotification

             object:nil];

    }

    ```


    Configuring the Video Player


    Now that you have finished all the steps required to initialize your media player,
    you can start playing video files. However, to get the best performance out of
    the `MPMediaPlayerController` class, you need to configure it by specifying values
    for a couple of additional video-specific properties: the source type and AirPlay.


    Specifying a Source Type (Local File or Network Stream)


    The default source type configuration for the `MPMoviePlayerController` class
    is *unknown*. This makes the class take a wait-and-see approach to loading the
    video. It tries to load data from the source and then—based on what it finds out
    about the source—it will configure the movie player to play from a file or network
    stream. By specifying a value for the `movieSourceType` property, you can remove
    this intermediary step and speed up load times considerably.


    The `movieSourceType` property takes `MPMovieSourceType` constant values as its
    input. The value for local files is `MPMovieSourceTypeFile`, while the value for
    network streams is `MPMovieSourceTypeStreaming`. The MyVideoPlayer application
    lets users pick only local files, so I used the `MPMovieSourceTypeFile` value:


    ```

    self.videoPlayer.movieSourceType = MPMovieSourceTypeFile;

    ```


    Specifying AirPlay Support


    In both windowed and full-screen modes, the video player supports AirPlay as a
    playback control. As covered in [Chapter 7](#9781430250838_Ch07.xhtml), AirPlay
    is Apple’s proprietary technology that allows users to stream audio and video
    content from their iOS devices to an Apple TV. For a video file to work with AirPlay,
    it needs to be encoded in the H.264 video codec (one of the formats supported
    by the `MPMoviePlayerController` class); for a video stream to be compatible with
    AirPlay, it needs to be transmitted using the Apple HTTP Live Streaming (HLS)
    protocol. Note that the `MPMoviePlayerController` can play many file types and
    streams that are not AirPlay-compatible, and will show the AirPlay control only
    if it is playing an AirPlay-compatible item.


    When a video file is played in AirPlay, your movie player view will be replaced
    with a placeholder image, as shown in [Figure 8-4](#9781430250838_Ch08.xhtml#Fig4).
    All the playback controls will still be available in the movie player on the device,
    but the video will play only on the Apple TV.


    ![9781430250838_Fig08-04.jpg](images/9781430250838_Fig08-04.jpg)


    [Figure 8-4](#9781430250838_Ch08.xhtml#_Fig4). Placeholder image for AirPlay video
    playback


    By default, the AirPlay icon pops up automatically for all AirPlay-compatible
    video files and streams played through the `MPMoviePlayerController`. If you are
    building an application that needs to disable this feature, you can do so via
    the `allowsAirPlay` property. Setting this value to `NO` prevents the AirPlay
    control from appearing in the movie player.


    ```

    self.videoPlayer.allowsAirPlay = NO;

    ```


    **Note**  Disabling AirPlay support in your movie player will not prevent it from
    showing up if the user has AirPlay Mirroring turned on for their device. To disable
    this feature, you need to implement Secondary Display support in your app. A tutorial
    for this feature is available on Apple’s Developer Library site.


    Specifying Control Types


    By default, the `MPMediaPlayerController` class provides built-in playback controls
    on top of the video layer. For many applications, you will want to change the
    control style or completely hide the controls. You can toggle this via the `controlStyle`
    property, which accepts a constant of the type `MPMovieControlStyle`. On iOS 7
    and later, there are two styles you can use: `MPMovieControlStyleNone`, which
    completely hides the controls, and `MPMovieControlStyleFullscreen`, which shows
    a full set of controls, including fast-forward, rewind, and audio control. The
    default control style is `MPMovieControlStyleFullscreen`:


    ```

    self.moviePlayer.controlStyle = MPMovieControlStyleFullscreen;

    ```


    Specifying a Scaling Mode


    One final configuration option you should look at for your video player is the
    scaling mode. As with images, this determines how a video will scale in your parent
    view, when its dimensions do not match exactly. You can set the content scaling
    mode for a movie player via the `scalingMode` property, which takes an `MPMovieScalingModeFill`
    constant as its input:


    ```

    self.moviePlayer.scalingMode = MPMovieScalingModeAspectFit;

    ```


    Similar to the images, the available scaling modes are as follows:


    *   `MPMovieScalingModeNone`: This mode provides no scaling and places the source
    video in the target view (cropped or letterboxed, depending on size).

    *   `MPMovieScalingModeAspectFit`: This mode scales the video up or down to the
    dimensions of the target view as far as possible without distorting the original
    video.

    *   `MPMovieScalingModeAspectFill`: This mode scales the video to match the dimensions
    of the target view, without distorting the video (the excess will be cropped).

    *   `MPMovieScalingModeFill`: This mode distorts the original video to match the
    dimensions of the target view.


    The default value is `MPMovieScalingModeAspectFit`.


    Starting Playback


    As you may remember from the audio player examples in [Chapters 6](#9781430250838_Ch06.xhtml)
    and [6](#9781430250838_Ch06.xhtml), you cannot predict how long it will take to
    load a media file. It takes longer to load a larger file (which a video most certainly
    is!). For this reason, you should make a call to `[MPMoviePlayerController prepareToPlay]`
    as soon as you have finished initializing and configuring the video player. Because
    the initialization code adds a handler for `MPMoviePlayerLoadStateDidChangeNotification`
    notifications, you can automatically start playing the file when the file has
    loaded.


    [Listing 8-11](#9781430250838_Ch08.xhtml#list11) shows the complete initialization
    method for the video player, including the pre-loading step just described.


    [***Listing 8-11***](#9781430250838_Ch08.xhtml#_list11). Full Initialization Method
    for Video Player'
