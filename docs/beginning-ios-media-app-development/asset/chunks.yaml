    Torch Mode


    The idea of a flash in a camera is to provide a burst of light to brighten up
    a shot that would otherwise be too dark to be useful. Users frame their shot with
    the flash off, but when they press the capture button, the flash activates just
    long enough to illuminate the scene while the camera sensor is active. This concept
    does not translate to video, because the sensor is active for an extended period
    of time; however, by implementing torch mode, you can give users the ability to
    add light to a scene by keeping the flash LED active during recording.


    To activate torch mode, you can reuse the Flash button from the MyCamera project.
    The functionality is different at a low level, but that difference is not apparent
    to users. In the MyCamera project, the handler for flash mode was the `[CameraViewController
    flashMode:]` method. Bring up your `CameraViewController.h` file and perform a
    secondary click (right-click or Option-click) on the method name to bring up the
    Refactor window, as shown in [Figure 10-8](#9781430250838_Ch10.xhtml#Fig8). This
    will allow you to rename the method in every file in which it appears, including
    the Interface Builder files. Your new method should be named `[CameraViewController
    torchMode:]`.


