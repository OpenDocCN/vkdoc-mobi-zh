    Stopping a Workout


    Eventually, all workouts must come to an end, and so should the pedometer updates.
    By calling the `[CMPedometer stopPedometerUpdates]` method on your `CMPedometer`
    object, let Core Motion know that it should stop sending pedometer events to the
    completion handler you defined previously.


    For the MyFitnessPod application, place this logic in the user-initiated event
    for stopping the workout: the handler for the Stop Workout button. As shown in
    [Listing 13-10](#9781430250838_Ch13.xhtml#list10), after determining that the
    workout is active, call the `[CMPedometer stopPedometerUpdates]` method and reset
    the user interface to its original state, by stopping music playback and resetting
    the title of the workout button. You do not need to reset the number of steps,
    because most users expect to see their totals at the end of a workout.


    [***Listing 13-10***](#9781430250838_Ch13.xhtml#_list10). Stopping Updates and
    Resetting the User Interface


    ```

    -(IBAction)toggleWorkout:(id)sender

    {

        if (self.isWorkoutActive) {

            //stop workout


    if (self.pedometer != nil) {

                [self.pedometer stopPedometerUpdates];

            }

            [self.musicPlayer stop];

            self.isWorkoutActive = NO;

            self.workoutButton.titleLabel.text = @"Start Workout";

        } else {

            //start workout


    if ([CMMotionActivityManager isActivityAvailable] &&

                [CMPedometer isStepCountingAvailable]) {

                self.pedometer = [[CMPedometer alloc] init];

                /*

                 if (queue loaded) {

                     play queue

                 } else {

                     load default playlist

                 }

                 */


    self.isWorkoutActive = YES;

                self.startDate = [NSDate date];

                self.workoutProgressLabel.text = @"0 steps";

                self.workoutButton.titleLabel.text = @"Stop Workout";

                [self.pedometer startPedometerUpdatesFromDate:self.startDate

                    withHandler:^(CMPedometerData *pedometerData,

                    NSError *error) {


    NSLog(@"number of steps: %ld",

                        [pedometerData.numberOfSteps integerValue]);

                    dispatch_async(dispatch_get_main_queue(), ^{

                        self.workoutProgressLabel.text =

                        [NSString stringWithFormat:@"%ld steps",

                        [pedometerData.numberOfSteps integerValue]];

                    });

                }];


    } else {

                UIAlertView *errorAlert = [[UIAlertView alloc]

                    initWithTitle:@"Error"

                    message:@"Motion permission required"

                    delegate:self cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [errorAlert show];

            }

        }


    }

    ```


    Using HealthKit to Sync Data


    At this point, the MyFitnessPod app is able to take advantage of the M-series
    motion coprocessor, so it is time to make it a “responsible data citizen” by using
    HealthKit as the back end for posting and retrieving the workout data the app
    collects. As mentioned at the beginning of the chapter, HealthKit allows you to
    skip the unnecessary step of building your own data-logging interface, by giving
    all apps a central location where they can store (and retrieve) health and fitness
    data. Additionally, the Health app gives users windows into this data profile,
    allowing them to monitor such things as step information, caloric intake, weight,
    blood pressure, and countless other health metrics, all in one place. Users can
    even create their own dashboards to get a historical snapshot. You can view my
    dashboard from when I wrote this chapter in [Figure 13-9](#9781430250838_Ch13.xhtml#Fig9).


    ![9781430250838_Fig13-09.jpg](images/9781430250838_Fig13-09.jpg)


    [Figure 13-9](#9781430250838_Ch13.xhtml#_Fig9). The author’s Health app dashboard


    In this section, you will learn how to take advantage of HealthKit to log workouts,
    retrieve past workout activity, and receive real-time data updates. This allows
    your users to share their data between apps, and will complete the user interface
    by implementing the Today’s Totals label and populating it with accurate data.


    Although HealthKit is a completely separate framework from Core Motion, the good
    news is that it shares a lot of design similarities, such as the idea of push-
    and pull-based data queries. HealthKit also exposes data types that provide rich
    information for each type of stored activity. The fundamental steps you need to
    implement to use HealthKit are as follows:


    1.  Request permission for an object type (read, write, or both).

    2.  Implement a query and handler method to retrieve data as it becomes available.

    3.  Create a properly formatted object to store data.


    Requesting Permission to Use HealthKit


    As with Core Motion, before you can perform any kind of operation with HealthKit,
    you need to request the correct permissions. Again, because health data is sensitive
    personal information, the permission levels are extremely granular, resulting
    in a detailed modal view that the users can review before providing permission,
    as shown in [Figure 13-10](#9781430250838_Ch13.xhtml#Fig10).


    ![9781430250838_Fig13-10.jpg](images/9781430250838_Fig13-10.jpg)


    [Figure 13-10](#9781430250838_Ch13.xhtml#_Fig10). HealthKit Permissions modal
    view


    You will notice that this modal view presents read and write permissions for each
    type of health data an application wishes to access. Every operation in HealthKit
    is tied to an *object type*, represented by the `HKObject` class. Just like the
    `CMPedometerData` class, the `HKObject` class stores a rich set of properties
    for each type of health data that is being stored, including quantity (or characteristic),
    time of measurement, and the measurement source. The set of properties varies
    for each object type. There are two high-level types of object types to remember:
    *quantities*, which are measured with quantitative units (such as weight), and
    *characteristics*, which are represented by qualitative observations (such a poor
    sleep quality). The user will be prompted to opt into permissions for every object
    type you try to operate on.


    To request HealthKit permissions, you need to call the `[HKHealthStore requestAuthorizationToShareTypes:readTypes:completion:]`
    method, on an `HKHealthStore` object. The `HKHealthStore` class represents an
    interface to HealthKit for data operations, similar to how a managed object context
    provides an interface to a database in Core Data. Just as with a database, it
    does not make sense to create a health store for every data operation you want
    to perform, so declare one as an instance variable. For the `MainViewController`
    class, this property is called `healthStore`:


    ```

    @property (nonatomic, strong) HKHealthStore *healthStore;

    ```'
  trans: "\n现在您可以使用 `startDate` 实例变量作为提取查询的基准。对于完成处理程序，执行与推送处理程序完全相同的逻辑——在主线程上更新用户界面以显示接收到的步数。列表\
    \ 13-9 展示了 MyFitnessPod 项目中完整的 `[self viewDidAppear]` 方法。\n\n**列表 13-9.** 返回前台后更新用户界面\n\
    \n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    if (self.isWorkoutActive)\
    \  {\n        [self.pedometer queryPedometerDataFromDate:self.startDate\n    \
    \        toDate:[NSDate date]\n            withHandler:^(CMPedometerData *pedometerData,\n\
    \            NSError *error) {\n\nNSLog(@\"步数: %ld\",\n                [pedometerData.numberOfSteps\
    \ integerValue]);\n            dispatch_async(dispatch_get_main_queue(), ^{\n\
    \                self.workoutProgressLabel.text =\n                [NSString stringWithFormat:@\"\
    %ld 步\",\n                [pedometerData.numberOfSteps integerValue]];\n     \
    \       });\n        }];\n    }\n}\n```\n\n### 停止锻炼\n\n最终，所有锻炼都必须结束，计步器更新也应随之停止。通过调用\
    \ `CMPedometer` 对象上的 `[CMPedometer stopPedometerUpdates]` 方法，让 Core Motion 知道它应该停止向之前定义的完成处理程序发送计步器事件。\n\
    \n对于 MyFitnessPod 应用程序，将此逻辑放在用户发起停止锻炼的事件中：即“停止锻炼”按钮的处理程序。如列表 13-10 所示，在确定锻炼处于活动状态后，调用\
    \ `[CMPedometer stopPedometerUpdates]` 方法，并通过停止音乐播放和重置锻炼按钮标题来将用户界面重置为原始状态。您无需重置步数，因为大多数用户期望在锻炼结束时看到他们的总数。\n\
    \n**列表 13-10.** 停止更新并重置用户界面\n\n```\n-(IBAction)toggleWorkout:(id)sender\n{\n \
    \   if (self.isWorkoutActive) {\n        //停止锻炼\n\nif (self.pedometer != nil)\
    \ {\n            [self.pedometer stopPedometerUpdates];\n        }\n        [self.musicPlayer\
    \ stop];\n        self.isWorkoutActive = NO;\n        self.workoutButton.titleLabel.text\
    \ = @\"开始锻炼\";\n    } else {\n        //开始锻炼\n\nif ([CMMotionActivityManager isActivityAvailable]\
    \ &&\n            [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
    \ = [[CMPedometer alloc] init];\n            /*\n             if (queue loaded)\
    \ {\n                 play queue\n             } else {\n                 load\
    \ default playlist\n             }\n             */\n\nself.isWorkoutActive =\
    \ YES;\n            self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
    \ = @\"0 步\";\n            self.workoutButton.titleLabel.text = @\"停止锻炼\";\n \
    \           [self.pedometer startPedometerUpdatesFromDate:self.startDate\n   \
    \             withHandler:^(CMPedometerData *pedometerData,\n                NSError\
    \ *error) {\n\nNSLog(@\"步数: %ld\",\n                    [pedometerData.numberOfSteps\
    \ integerValue]);\n                dispatch_async(dispatch_get_main_queue(), ^{\n\
    \                    self.workoutProgressLabel.text =\n                    [NSString\
    \ stringWithFormat:@\"%ld 步\",\n                    [pedometerData.numberOfSteps\
    \ integerValue]];\n                });\n            }];\n\n} else {\n        \
    \    UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    错误\"\n                message:@\"需要运动权限\"\n                delegate:self cancelButtonTitle:@\"\
    确定\"\n                otherButtonTitles:nil];\n            [errorAlert show];\n\
    \        }\n    }\n\n}\n```\n\n## 使用 HealthKit 同步数据\n\n此时，MyFitnessPod 应用已能够利用\
    \ M 系列运动协处理器，因此是时候通过使用 HealthKit 作为发布和检索应用收集的锻炼数据的后端，使其成为“负责任的数据公民”。正如本章开头所述，HealthKit\
    \ 允许您跳过构建自己数据记录界面的不必要步骤，为所有应用提供一个集中位置，让它们可以存储（和检索）健康和健身数据。此外，“健康”应用为用户提供了查看此数据配置文件的窗口，使他们能够在一个地方监控步数信息、卡路里摄入量、体重、血压以及无数其他健康指标。用户甚至可以创建自己的仪表板来获取历史快照。您在编写本章时可以看到我的仪表板，如图\
    \ 13-9 所示。\n\n![9781430250838_Fig13-09.jpg](img/9781430250838_Fig13-09.jpg)\n\n\
    **图 13-9.** 作者的“健康”应用仪表板\n\n在本节中，您将学习如何利用 HealthKit 来记录锻炼、检索过去的锻炼活动以及接收实时数据更新。这能让您的用户在应用之间共享数据，并通过实现“今日总计”标签并用准确数据填充它来完成用户界面。\n\
    \n尽管 HealthKit 是一个与 Core Motion 完全独立的框架，但好消息是它共享了许多设计上的相似性，例如基于推送和拉取的数据查询概念。HealthKit\
    \ 还公开了数据类型，为每种存储的活动类型提供丰富的信息。使用 HealthKit 需要实现的基本步骤如下：\n\n1.  请求对象类型的权限（读取、写入或两者兼有）。\n\
    2.  实现一个查询和处理程序方法，以在数据可用时进行检索。\n3.  创建一个格式正确的对象来存储数据。\n\n### 请求使用 HealthKit 的权限\n\
    \n与 Core Motion 一样，在您可以对 HealthKit 执行任何操作之前，需要请求正确的权限。同样，由于健康数据是敏感的个人信息，权限级别非常精细，导致会显示一个详细的模态视图，供用户在授予权限前查看，如图\
    \ 13-10 所示。\n\n![9781430250838_Fig13-10.jpg](img/9781430250838_Fig13-10.jpg)\n\
    \n**图 13-10.** HealthKit 权限模态视图\n\n您会注意到，此模态视图针对应用希望访问的每种健康数据类型显示了读取和写入权限。HealthKit\
    \ 中的每个操作都与一个*对象类型*相关联，由 `HKObject` 类表示。就像 `CMPedometerData` 类一样，`HKObject` 类为正在存储的每种类型的健康数据存储了丰富的属性集，包括数量（或特征）、测量时间和测量来源。属性集因对象类型而异。需要记住两种高级别的对象类型：*数量*，用定量单位（如体重）测量；以及*特征*，用定性观察（如睡眠质量差）表示。系统会提示用户为您尝试操作的每种对象类型选择权限。\n\
    \n要请求 HealthKit 权限，您需要在 `HKHealthStore` 对象上调用 `[HKHealthStore requestAuthorizationToShareTypes:readTypes:completion:]`\
    \ 方法。`HKHealthStore` 类表示 HealthKit 数据操作的接口，类似于托管对象上下文为 Core Data 中的数据库提供接口。与数据库一样，为您想要执行的每个数据操作都创建一个健康存储是没有意义的，因此将其声明为实例变量。对于\
    \ `MainViewController` 类，此属性称为 `healthStore`：\n\n```\n@property (nonatomic, strong)\
    \ HKHealthStore *healthStore;\n```\n"
- fmt: "要请求权限，你需要指定一个`NSSet`对象类型集合，这些类型代表你想要请求的数据类型。对于`MyFitnessPod`项目，你只需要读取和写入步数，因此使用`NSQuantityTypeIdentifierStepCount`常量来初始化你的权限集合：\n\
    \n```\nNSSet *dataTypes =\n    [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n\
    ```\n\n当你请求运动活动权限时，由于请求的性质（简单的“是”或“否”），你需要在视图可见后调用状态获取方法。由于`HealthKit`权限更为复杂，`[HKHealthStore\
    \ requestAuthorizationToShareTypes:readTypes:completion:]`方法允许你指定一个完成处理程序，该处理程序返回一个`success`变量，用于指示用户是否已授予你的应用所有请求的权限。这使你能够将初始化代码放在`[self\
    \ viewDidLoad]`方法中。[Listing 13-11](#9781430250838_Ch13.xhtml#list11)展示了`MainViewController`类的`[self\
    \ viewDidLoad]`方法，其中包括`HealthKit`初始化。\n\n[***Listing 13-11***](#9781430250838_Ch13.xhtml#_list11).\
    \ 请求来自`HealthKit`的步数权限\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view,\n    // typically from\
    \ a nib.\n\nself.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];\n\
    \n....\n    self.isWorkoutActive = NO;\n\nif ([HKHealthStore isHealthDataAvailable])\
    \ {\n        NSSet *dataTypes =\n            [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n\
    \        [self.healthStore requestAuthorizationToShareTypes:dataTypes\n      \
    \      readTypes:dataTypes\n            completion:^(BOOL success, NSError *error)\
    \ {\n            if (success) {\n\n} else {\n\nUIAlertView *alert = [[UIAlertView\
    \ alloc]\n                    initWithTitle:@\"Error\"\n                    message:@\"\
    MyFitnessPod requires step count access!\"\n                    otherButtonTitles:nil];\n\
    \                [alert show];\n            }\n        }];\n    }\n}\n```\n\n\
    注意，权限块的起始处包含对`[HKHealthStore isHealthDataAvailable]`的调用。这是检查设备是否支持`HealthKit`（iOS\
    \ 8或更高版本）的另一种简单方法，并能防止在旧设备上崩溃（你无法访问未定义的类！）。\n\n如果完成处理程序返回`success`，你的`HKHealthStore`将准备好使用，无需额外的初始化操作。如果权限请求失败，你应该向用户显示错误消息。如果用户已为你的应用设置了权限，完成处理程序将立即被调用并返回结果。\n\
    \n## 从`HealthKit`检索数据\n\n由于`HealthKit`在设计上与`Core Motion`相似，它提供了基于推送和拉取的查询方式来检索数据。与`Core\
    \ Motion`一样，基于推送的方法在每次记录事件时返回结果，而基于拉取的方法则在启动后仅返回一次结果。`HealthKit`的推送机制对于类似数据库的系统来说非常不寻常（手动启动操作有助于提高性能），但考虑到资源的共享特性，这种机制很有价值，因为它允许应用响应来自其他应用程序的更新。例如，如果你将一个应用置于后台，在另一个应用中获取血压读数，当你返回原始应用时，可能会收到更新。\n\
    \n使用`HealthKit`执行查询涉及两个步骤：\n\n1.  定义一个`HKQuery`对象，其类型与结果类型（例如统计信息、样本、云端备份数据等）和期望的执行方法（推送或拉取）匹配。\n\
    2.  在你的`HKHealthStore`对象上执行查询以获取结果。\n\n`HKQuery`是一个抽象类，它定义了初始化查询和指定返回内容的通用规则，但不指定行为或返回类型。要执行查询，你必须选择一个`HKQuery`的子类，该子类与你正在寻找的结果类型（例如，一组数据或单个项目）以及所需的执行行为（基于推送或拉取）匹配。[表13-1](#9781430250838_Ch13.xhtml#Tab1)列出了主要的`HKQuery`子类，包括每个子类的结果类型和执行行为。\n\
    \n[Table 13-1](#9781430250838_Ch13.xhtml#_Tab1). 主要`HKQuery`子类的结果类型和执行行为\n\n|\
    \ 子类 | 结果类型 | 执行行为 |\n| --- | --- | --- |\n| `HKSampleQuery` | 一组样本对象（包含样本时间和数量）\
    \ | 拉取（生成一个事件） |\n| `HKStatisticsQuery` | 一组样本对象的统计结果（例如平均值、总和） | 拉取 |\n| `HKStatisticsCollectionQuery`\
    \ | 一个样本类型的一组统计结果（适用于构建图表） | 拉取 |\n| `HKObserverQuery` | 对数量对象（如步数）的更改 | 推送（生成事件直到停止）\
    \ |\n| `HKAnchoredObjectQuery` | 匹配样本类型的最新对象 | 拉取 |\n\n对于`MyFitnessPod`应用，使用`HKStatisticsQuery`来确定“今日进度”标签的总步数（总和），并使用`HKObserverQuery`来监控步数何时变化。\n\
    \n要创建统计查询，创建一个新的`HKStatisticsQuery`对象，并使用`[HKStatisticsQuery initWithQuantityType:quantitySamplePredicate:options:completionHandler:]`方法进行初始化。对于数量类型，你需要使用一个`HKQuantityType`对象，该对象与你希望检索的数据类型匹配。`HKQuantityType`类有一个便捷构造函数`[HKQuantityType\
    \ quantityTypeForIdentifier:]`，它允许你基于与预定义常量匹配的常量来创建对象。步数的常量是`HKQuantityTypeIdentierStepCount`：\n\
    \n```\nHKQuantityType *quantityType = [HKQuantityType\n    quantityTypeForIdentifier:\
    \ HKQuantityTypeIdentierStepCount];\n```\n\n用于初始化`HKStatisticsQuery`的样本谓词是一个`NSPredicate`，类似于你在[第7章](#9781430250838_Ch07.xhtml)的`MyPod`项目中使用的，通过让用户从媒体选择器中选择来限制专辑选择的谓词。`NSPredicate`对象需要非常具体才能正确过滤数据类型，但为了帮助你，`HKQuery`类提供了便捷构造函数。要按日期过滤样本对象，请使用公共方法`[HKQuery\
    \ predicateForSamplesWithStartDate:endDate:options:]`。对于开始和结束日期，使用当前日期的午夜（00:00）和晚上11:59（23:59），如[Listing\
    \ 13-12](#9781430250838_Ch13.xhtml#list12)所示。\n\n[***Listing 13-12***](#9781430250838_Ch13.xhtml#_list12).\
    \ 构建基于日期的样本谓词\n\n```\n-(NSPredicate *)getCurrentDatePredicate {\n    NSCalendar\
    \ *calendar = [NSCalendar currentCalendar];\n    NSDate *now = [NSDate date];\n\
    \    NSDate *startDate = [calendar dateBySettingHour:0 minute:0 second:0\n   \
    \     ofDate:now options:0];\n    NSDate *endDate = [calendar dateBySettingHour:0\
    \ minute:0 second:0\n        ofDate:now options:0];\n    NSPredicate *datePredicate\
    \ = [HKQuery\n        predicateForSamplesWithStartDate:startDate\n        endDate:endDate\
    \ options:0];\n    return datePredicate; \n}\n```\n\n对于查询选项，你应该指定`HKStatisticsCumulativeSum`，以表示你想要检索样本集的总和。\n\
    \n对于完成处理程序，你将使用查询的`result`对象的`sumQuantity`来提取今天的步数，并使用该值构造“今日进度”标签的字符串。要执行查询，请在你的`HKHealthStore`对象上调用`[HKHealthStore\
    \ executeQuery:]`方法。"
  raw: "To request permissions, you need to specify an `NSSet` of object types that\
    \ represent the type of data you want to request. For the MyFitnessPod project,\
    \ you only need to read and write step counts, so initialize your permission set\
    \ with the `NSQuantityTypeIdentifierStepCount` constant:\n\n```\nNSSet *dataTypes\
    \ =\n    [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n```\n\nWhen\
    \ you requested motion activity, you needed to make the call to obtain status\
    \ after the view was visible, due to the nature of the request (a simple yes or\
    \ no). Because HealthKit permissions are more complicated, the `[HKHealthStore\
    \ requestAuthorizationToShareTypes:readTypes:completion:]` method lets you specify\
    \ a completion handler that returns a `success` variable that indicates whether\
    \ or not the user has given your app all the permissions it requested. This allows\
    \ you to place your initialization code in the `[self viewDidLoad]` method. [Listing\
    \ 13-11](#9781430250838_Ch13.xhtml#list11) shows the `[self viewDidLoad]` method\
    \ for the `MainViewController` class, including the HealthKit initialization.\n\
    \n[***Listing 13-11***](#9781430250838_Ch13.xhtml#_list11). Requesting Step Count\
    \ Permission from HealthKit\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
        // Do any additional setup after loading the view,\n    // typically from\
    \ a nib.\n\nself.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];\n\
    \n....\n    self.isWorkoutActive = NO;\n\nif ([HKHealthStore isHealthDataAvailable])\
    \ {\n        NSSet *dataTypes =\n            [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n\
            [self.healthStore requestAuthorizationToShareTypes:dataTypes\n            readTypes:dataTypes\n\
                completion:^(BOOL success, NSError *error) {\n            if (success)\
    \ {\n\n} else {\n\nUIAlertView *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"\
    Error\"\n                    message:@\"MyFitnessPod requires step count access!\"\
    \n                    otherButtonTitles:nil];\n                [alert show];\n\
                }\n        }];\n    }\n}\n```\n\nNote that the beginning of the permission\
    \ block contains a call to `[HKHealthStore isHealthDataAvailable]`. This is another\
    \ easy way to check whether a device is HealthKit-enabled (iOS 8 or greater),\
    \ and prevents crashes on older devices (you cannot access a class that is not\
    \ defined!).\n\nIf the completion handler returns `success`, your `HKHealthStore`\
    \ will be ready to use, requiring no additional initialization on your part. If\
    \ the permission request failed, you should present an error message to the user.\
    \ If the user has already set permissions for your app, the completion handler\
    \ will be called immediately with the result.\n\nRetrieving Data from HealthKit\n\
    \nIn keeping with its design similarities to Core Motion, HealthKit provides push-\
    \ and pull-based queries for retrieving data. Like Core Motion, the push-based\
    \ method returns a result every time an event is logged, while the pull-based\
    \ method returns a result just once, after being initiated. HealthKit’s push-based\
    \ mechanism is very unusual for database-like systems, where manually initiating\
    \ an action helps increase performance, but it is valuable given the shared nature\
    \ of the resource, because it allows apps to react to updates coming from other\
    \ applications. For example, if you background one app to get a blood-pressure\
    \ reading in another app, when you return to the original app, you could receive\
    \ an update.\n\nTwo steps are involved in executing a query with HealthKit:\n\n\
    1.  Define an `HKQuery` object with a type matching the result type (such as statistics,\
    \ samples, cloud-backed data, and so on) and the desired execution method (push\
    \ or pull).\n2.  Perform the query on your `HKHealthStore` object to get results.\n\
    \n`HKQuery` is an abstract class that defines the general rules for initializing\
    \ a query and specifying what it should return, without specifying the behavior\
    \ or return types. To perform a query, you must select a subclass of `HKQuery`\
    \ that matches the type of results you are looking for (for example, a collection\
    \ of data or a single item) and the execution behavior you need (push or pull\
    \ based). [Table 13-1](#9781430250838_Ch13.xhtml#Tab1) lists the major `HKQuery`\
    \ subclasses, including the result type and execution behavior of each.\n\n[Table\
    \ 13-1](#9781430250838_Ch13.xhtml#_Tab1). Result Types and Execution Behaviors\
    \ for Major HKQuery Subclasses\n\n| Subclass | Result Type | Execution Behavior\
    \ |\n| --- | --- | --- |\n| `HKSampleQuery` | A set of sample objects (containing\
    \ sample time and quantity) | Pull (generates one event) |\n| `HKStatisticsQuery`\
    \ | Statistical results (for example, average, sum) for a set of sample objects\
    \ | Pull |\n| `HKStatisticsCollectionQuery` | A set of statistical results for\
    \ a sample type (appropriate for building a graph) | Pull |\n| `HKObserverQuery`\
    \ | Changes to a quantity object (such as step count) | Push (generates events\
    \ until stopped) |\n| `HKAnchoredObjectQuery` | The most recent object matching\
    \ a sample type | Pull |\n\nFor the MyFitnessPod application, use an `HKStatisticsQuery`\
    \ to determine the total number of steps (sum) for the Today’s Progress label,\
    \ and an `HKObserverQuery` to monitor when the step count changes.\n\nTo create\
    \ a statistics query, create a new `HKStatisticsQuery` object and initialize it\
    \ using the `[HKStatisticsQuery initWithQuantityType:quantitySamplePredicate:options:completionHandler:]`\
    \ method. For the quantity type, you need to use an `HKQuantityType` object that\
    \ matches the type of data you wish to retrieve. There is a convenience constructor\
    \ for the `HKQuantityType` class, `[HKQuantityType quantityTypeForIdentifier:]`,\
    \ that allows you to create an object based on a constant matching a predefined\
    \ constant. The constant for step count is `HKQuantityTypeIdentierStepCount`:\n\
    \n```\nHKQuantityType *quantityType = [HKQuantityType\n    quantityTypeForIdentifier:\
    \ HKQuantityTypeIdentierStepCount];\n```\n\nThe sample predicate used to initialize\
    \ the `HKStatisticsQuery` is an `NSPredicate`, similar to the one you used in\
    \ the MyPod project from [Chapter 7](#9781430250838_Ch07.xhtml) to limit album\
    \ selection by letting users choose from the media picker. `NSPredicate` objects\
    \ need to be very specific to filter data types properly, but to assist you, the\
    \ `HKQuery` class comes with convenience constructors. To filter sample objects\
    \ by date, use the public method `[HKQuery predicateForSamplesWithStartDate:endDate:options:]`.\
    \ For your start and end dates, use midnight (00:00) and 11:59 PM (23:59) for\
    \ the current date, as shown in [Listing 13-12](#9781430250838_Ch13.xhtml#list12).\n\
    \n[***Listing 13-12***](#9781430250838_Ch13.xhtml#_list12). Building a Date-Based\
    \ Sample Predicate\n\n```\n-(NSPredicate *)getCurrentDatePredicate {\n    NSCalendar\
    \ *calendar = [NSCalendar currentCalendar];\n    NSDate *now = [NSDate date];\n\
        NSDate *startDate = [calendar dateBySettingHour:0 minute:0 second:0\n        ofDate:now\
    \ options:0];\n    NSDate *endDate = [calendar dateBySettingHour:0 minute:0 second:0\n\
            ofDate:now options:0];\n    NSPredicate *datePredicate = [HKQuery\n        predicateForSamplesWithStartDate:startDate\n\
            endDate:endDate options:0];\n    return datePredicate; \n}\n```\n\nFor\
    \ your query options, you should specify `HKStatisticsCumulativeSum` to indicate\
    \ that you want to retrieve the sum of your sample set.\n\nFor the completion\
    \ handler, you will use the `sumQuantity` of the query’s `result` object to extract\
    \ today’s steps, and use that value to construct the string for the Today’s Progress\
    \ label. To execute the query, call the `[HKHealthStore executeQuery:]` method\
    \ on your `HKHealthStore` object."
