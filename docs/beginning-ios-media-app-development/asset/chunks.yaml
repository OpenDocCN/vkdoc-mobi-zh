    \             cancelButtonTitle:@\"确定\"\n                otherButtonTitles:nil];\n\
    \            [errorAlert show];\n        }\n    }\n\n}\n```\n\n尽管 Core Motion\
    \ 使用块（blocks）进行消息传递，但你应该为 `CMPedometer` 对象维护一个实例变量，以便处理后台更新。在 `MainViewController`\
