    Completing a Recording


    To finish the MyCustomRecorder project, you need to implement the code to complete
    the recording process. Although you called the `[AVCaptureFileOutput stopRecording]`
    method, this alone is not enough to generate a valid movie file that you can play
    back by using a `MPMoviePlayerController` subclass.


    Because you are not using the `UIImagePickerController` class to record video,
    you need to present your own video player to preview the recorded file. As shown
    in [Figure 10-10](#9781430250838_Ch10.xhtml#Fig10), this video player will expose
    limited playback controls, as well as buttons to let the user accept or reject
    the recorded video. To enable these limited controls, you will reuse the video
    player from the MyVideoPlayer project you built in [Chapter 9](#9781430250838_Ch09.xhtml).


    ![9781430250838_Fig10-10.jpg](images/9781430250838_Fig10-10.jpg)


    [Figure 10-10](#9781430250838_Ch10.xhtml#_Fig10). Mock-up of video preview interface


    Finally, to return results from the `CameraViewController` object, you need to
    use the `CameraDelegate` protocol, which you need to modify to handle video. Because
    video files are much larger than images, they cannot be passed back as parameters,
    so you need to find an alternative solution.


    Saving Video Output


    You may remember earlier discussions in the book, where I hinted that video files
    are more complex than image and audio files. Unlike image and audio files, which
    contain the binary information for one data stream, video files are *containers*
    that contain both audio and video data streams. This makes the requirement of
    having valid headers and footers (which indicate the termination points for the
    data) even more strict with video files. Combined with the increased sophistication
    of the algorithms required to compress video (codecs), you can start to see why
    the process is complex.


    By calling the `[AVCaptureFileOutput stopRecording]` method from the `[CameraViewController
    togglePlayback:]` method, you instructed the `AVCaptureMovieFileOutput` class
    to kick off this process and close the file. After the File Close operation is
    complete, your output object calls the `[AVCaptureFileOutputRecordingDelegate
    captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:error:]` method
    on the object you declared as the delegate (for the MyCustomRecorder project—the
    `CameraViewController` class).


    One of the key advantages of a protocol is that it strictly defines a set of messages
    it will send its delegates, down to the message name and parameter types. The
    `didFinish` protocol message sends back the following:


    *   An `AVCaptureOutput` object, identifying the output object that completed

    *   An `NSURL` object that indicates the URL for the file that successfully (or
    unsuccessfully) closed

    *   An `NSArray` of `AVCaptureConnection` objects that are associated with the
    session for the output

    *   An `NSError` object that returns a non-`nil` value if the file failed to close
    successfully


    You can find the implementation for the `CameraViewController` class in [Listing
    10-17](#9781430250838_Ch10.xhtml#list17).


    [***Listing 10-17***](#9781430250838_Ch10.xhtml#_list17). “Output Finished” Delegate
    Method for the CameraViewController Class


    ```

    -(void)captureOutput:(AVCaptureFileOutput *)captureOutput

        didFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL

        fromConnections:(NSArray *)connections error:(NSError *)error

    {

        if (error != nil)  {

            NSString *errorString = [error description];

            UIAlertView *alertView = [[UIAlertView alloc]

                initWithTitle:@"Error" message:errorString delegate:self

                cancelButtonTitle:@"OK" otherButtonTitles:nil];

            [alertView show];


    } else {

            VideoPlaybackController *playbackVC =

                [[VideoPlaybackController alloc]

                initWithURL:outputFileURL];

            playbackVC.delegate = self;


    [self presentViewController:playbackVC animated:YES

                completion:^{

                   [playbackVC prepareToPlay];

            }];

        }

    }

    ```'
