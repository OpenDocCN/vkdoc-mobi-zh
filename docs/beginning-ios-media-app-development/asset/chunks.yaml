    \ and by responding to `AVAudioSessionRouteChangeNotification` notifications to\
    \ handle output device (route) changes. As with the previous sections in this\
    \ chapter, you will continue to use the MyPlayer application as a sandbox for\
    \ these new features.\n\n### Handling Audio Interruptions\n\nAn *audio interruption*\
    \ in iOS is any event that interrupts your application’s audio session. Such events\
    \ might be an incoming phone call, alarm, notification sounds, or Siri. The default\
    \ behavior for audio interruptions in iOS is to follow the settings prescribed\
    \ by the audio session you have chosen for your application. However, by responding\
    \ to the `AVAudioSessionInterruptionNotification` notification, you can catch\
    \ interruptions and insert your own playback handling code.\n\n**Note**  The `AVAudioSessionInterruptionNotification`\
    \ notification is not exclusive to `AVFoundation`-based media players. Any class,\
    \ including those that use the `MediaPlayer` framework for playback, can implement\
    \ the `AVAudioSessionInterruptionNotification` notification.\n\n[Table 7-5](#9781430250838_Ch07.xhtml#Tab5)\
    \ lists the default interruption behaviors for each kind of `AVAudioSession`.\n\
