    a capture setting is to use the onscreen display button to show an action sheet
    of available modes, and then set the mode (if the device supports it). While almost
    all modern iOS devices these days have two cameras, it is important to note that
    the cameras are not equal. Generally, the rear-facing camera is more powerful,
    with support for high-resolution images, flash, and other features that improve
    picture quality (such as image stabilization for the iPhone 6 Plus). In contrast,
    the front-facing camera has lower resolution and a narrower set of capture controls.


    The `torchMode` property controls torch mode on an `AVCaptureDevice`. Its configuration
    options are Off, On, and Auto, represented by the `AVCaptureTorchModeOff`, `AVCaptureTorchModeOn`,
    and `AVCaptureTorchModeAuto` constants, respectively. For the first step of the
    process, change your button handler to display these new values in the action
    sheet, as shown in [Listing 10-9](#9781430250838_Ch10.xhtml#list9).


    [***Listing 10-9***](#9781430250838_Ch10.xhtml#_list9). Button Handler for Torch
    Mode


    ```

    -(IBAction)torchMode:(id)sender {

        if ([self.currentDevice isTorchAvailable]) {

            UIActionSheet *cameraSheet = [[UIActionSheet alloc]

                initWithTitle:@"Flash Mode" delegate:self

                cancelButtonTitle:@"Cancel" destructiveButtonTitle:nil

                otherButtonTitles:@"Auto", @"On" , @"Off", nil];

            cameraSheet.tag = 101;

            [cameraSheet showInView:self.view];

        } else {

            UIAlertView *alert = [[UIAlertView alloc]

                initWithTitle:@"Error"

                message:@"Flash not supported" delegate:nil

                cancelButtonTitle:@"OK" otherButtonTitles:nil];

            [alert show];

        }

    }

    ```


    As with previous examples, you modify the capture settings after the action sheet
    protocol has returned a `[UIActionSheet didDismissWithButtonIndex:]` message.
    Remember, this message is sent globally for all action sheets. To differentiate
    between action sheets, you give each one a tag (`101` was the tag for flash mode).
    In the `case` block for torch mode (case `101`), perform another refactor operation
    to rename the configuration method to `[CameraViewController switchToTorchModeWithIndex:]`,
    as shown in [Listing 10-10](#9781430250838_Ch10.xhtml#list10).


    [***Listing 10-10***](#9781430250838_Ch10.xhtml#_list10). Modified Action Sheet
    Delegate for Torch Mode


    ```

    -(void) actionSheet:(UIActionSheet *)actionSheet

          didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        switch (actionSheet.tag) {

            case 100:

                [self switchToCameraWithIndex:buttonIndex];

                break;

            case 101:

                [self switchToTorchWithIndex:buttonIndex];

                break;

            case 102:

                [self switchToFocusWithIndex:buttonIndex];

                break;

            case 103:

                [self switchToExposureWithIndex:buttonIndex];

                break;

            default:

                break;

        }

    }

    ```


    The method you use to determine whether torch mode is available on an `AVCaptureDevice`
    is `[AVCaptureDevice isTorchModeSupported:]`. As shown in [Listing 10-11](#9781430250838_Ch10.xhtml#list11),
    in your `[CameraViewController switchToTorchModeWithIndex:]` method, after locking
    the device for configuration, first check that torch mode is available, and then
    set it if applicable. After making your configuration change, unlock the device.
    If an error occurs while locking the device or attempting to make the change,
    show an error alert.


    [***Listing 10-11***](#9781430250838_Ch10.xhtml#_list11). Method for Changing
    Torch Mode


    ```

    -(void)switchToTorchWithIndex:(NSInteger)buttonIndex

    {

        NSError *error = nil;


    AVCaptureTorchMode torchMode = 0;


    switch (buttonIndex) {

            case 0: {

                torchMode = AVCaptureTorchModeAuto;

                self.torchButton.titleLabel.text = @"Torch: Auto";

                break;

            }

            case 1: {

                torchMode = AVCaptureTorchModeOn;

                self.torchButton.titleLabel.text = @"Torch: On";

                break;

            }

            case 2: {

                torchMode = AVCaptureTorchModeOff;

                self.torchButton.titleLabel.text = @"Torch: Off";

                break;

            }

            default:

                break;

        }


    if ([self.currentDevice lockForConfiguration:&error]) {


    self.currentDevice.torchMode = torchMode;


    [self.currentDevice unlockForConfiguration];

        } else {

            NSLog(@"could not set torch mode");

        }


    }

    ```


    Following Apple’s example, use `AVCaptureTorchModeAuto` as the default configuration
    setting for torch mode. You can define this by adding the torch mode setting to
    the `[CameraViewController initializeCameras]` method.


