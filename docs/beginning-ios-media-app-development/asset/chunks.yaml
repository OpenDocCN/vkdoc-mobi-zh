- fmt: '在本章中，你将了解如何使用外部源在应用中播放更多类型的音频。通过扩展你在[第5章](#9781430250838_Ch05.xhtml)中学到的音频基础知识，本章将介绍如何播放来自iTunes和流媒体源的音乐，以及在应用中播放事件声音（当事件发生时触发的短音效，例如按下按钮）。在实现这些新的音频源时，你将看到如何重用在播放简单音频文件时首次遇到的设计模式（例如请求共享资源、事件驱动消息处理以及实现自定义用户界面），并将其应用到其他类中，以及如何为这些类注入额外的逻辑，使你的应用能够播放多种源类型。


    本章的主要部分（关于iTunes、流媒体音频和事件声音）由示例项目支撑，你可以在本书提供的源代码包的`Chapter 6`文件夹中找到这些项目。（请参见Apress网站的Source
    Code/Download区域，`www.apress.com`）。


    ### 从iTunes导入音乐


    在[第5章](#9781430250838_Ch05.xhtml)中，你学习了如何在应用中使用音频文件。但是，你必须导入所有想要使用的音频文件，要么将它们与应用捆绑在一起，要么通过iTunes文件共享。幸运的是，Apple通过`MPMusicPlayerController`类提供了对用户设备上iPod音乐库的访问权限。当你希望用户能够在应用中播放他们自己的音乐，或者希望应用为用户当前加载的播放列表提供控制时，这非常有用。


    `MPMediaPlayerController`中的*MP*来源于它所基于的框架：`MediaPlayer`框架。`MediaPlayer`框架是专门为媒体播放而构建的，使其能够处理更复杂的任务，例如播放视频、解码来自播客和有声读物的书签信息，以及访问iPod应用。`MediaPlayer`框架将在后续章节中发挥关键作用，你将使用它来播放视频。


    与你之前用来播放声音文件的`AVAudioPlayer`类类似，`MPMusicPlayerController`类允许你在应用中构建一个自定义媒体播放器，包含播放控制方法和查询播放状态的方法。其中一些控件你已经很熟悉了，例如播放、暂停和快进/快退，以及模拟iPod应用行为的新控件，例如切换播放列表的随机播放模式。不幸的是，`MPMusicPlayerController`也是一个无头类，这意味着你必须实现自己的用户界面。此外，作为一个设计用于与iPod音乐库交互的类，你只能用它播放iTunes媒体。你可以通过继续维护一个用于播放其他音频文件的`AVAudioPlayer`对象来规避这个限制。


    在本节中，你将学习如何使用`MPMediaPlayerController`类在应用中播放iPod音乐库中的音乐，方法是构建如[图6-1](#9781430250838_Ch06.xhtml#Fig1)所示的音乐播放器应用。你可以在本书源代码包的`Chapter
    6`文件夹中找到这个应用。该项目名为`MyPod`。


    ![9781430250838_Fig06-01.jpg](images/9781430250838_Fig06-01.jpg)


    *[图 6-1](#9781430250838_Ch06.xhtml#_Fig1). MyPod 项目原型图*


    `MyPod`应用允许用户通过点击主视图控制器底部的按钮来选择要播放的歌曲或专辑。用户可以使用表视图控制器在项目之间导航。当用户选择了一首歌曲或专辑后，应用会提供当前播放歌曲的播放控制以及当前播放列表的导航控制。


    `MyPod`应用的目标是向你展示实现基于`MPMusicPlayerController`的音乐播放器的关键概念，具体如下：


    *   初始化音乐播放器

    *   指定媒体查询（你可以将其视为播放列表）

    *   构建播放界面

    *   显示曲目信息（元数据）


    ### 开始


    与本教程中的其他项目一样，你首先创建一个基于“单视图应用程序”模板的项目。使用[图6-1](#9781430250838_Ch06.xhtml#Fig1)中的原型图来帮助你选择要添加到故事板中的用户界面元素。务必添加一个表视图控制器，以便用户可以选择音乐。你不需要通过转场链接两个视图控制器，因为你将使用按钮处理程序来管理页面切换。完成后的故事板应类似于[图6-2](#9781430250838_Ch06.xhtml#Fig2)中的截图。


    ![9781430250838_Fig06-02.jpg](images/9781430250838_Fig06-02.jpg)


    *[图 6-2](#9781430250838_Ch06.xhtml#_Fig2). MyPod 项目完成的故事板*


    `MainViewController`类代表此应用的主视图。在实现该类之前，请确保已将`MediaPlayer`框架添加到项目中。在头文件（`MainViewController.h`）的顶部，引入该框架：


    ```objc

    #import <MediaPlayer/MediaPlayer.h>

    ```


    [列表6-1](#9781430250838_Ch06.xhtml#list1)显示了一个可用于实现`MainViewController`类的头文件。和往常一样，使用这些属性将你的故事板链接到该类。


    ***[列表 6-1](#9781430250838_Ch06.xhtml#_list1). MainViewController 类的头文件***


    ```objc

    #import <UIKit/UIKit.h>

    #import <MediaPlayer/MediaPlayer.h>

    #import "MediaTableViewController.h"


    @interface MainViewController : UIViewController


    @property (nonatomic, strong) MPMusicPlayerController *musicPlayer;


    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *rewindButton;

    @property (nonatomic, strong) IBOutlet UIButton *forwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *prevButton;

    @property (nonatomic, strong) IBOutlet UIButton *nextButton;


    @property (nonatomic, strong) IBOutlet UIButton *chooseTrackButton;

    @property (nonatomic, strong) IBOutlet UIButton *chooseAlbumButton;


    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;

    @property (nonatomic, strong) IBOutlet UILabel *albumLabel;

    @property (nonatomic, strong) IBOutlet UIImageView *albumImageView;


    -(IBAction)toggleAudio:(id)sender;

    -(IBAction)startFastForward:(id)sender;

    -(IBAction)startRewind:(id)sender;

    -(IBAction)stopSeeking:(id)sender;

    -(IBAction)chooseTrackButton:(id)sender;

    -(IBAction)chooseAlbumButton:(id)sender;

    @end

    ```


    对于此应用，你需要从多个函数中访问`MPMediaPlayerController`对象，因此请确保像示例中所示将其定义为实例变量。


    ### 初始化音乐播放器


    与硬件摄像头或麦克风类似，iPod音乐库是一个共享资源。`MPMusicPlayerController`类通过允许你将音乐播放器实现为“应用音乐播放器”或“iPod音乐播放器”来处理此限制。*应用音乐播放器*可以从iPod音乐播放器中拉取媒体项目，但不会对iPod应用的状态产生任何影响。*iPod音乐播放器*是应用内的一个媒体播放器，它更像是一个iPod应用的遥控器，而不是一个独立的音乐播放器。你所有的播放设置更改和媒体选择都会影响iPod应用。这对于你想让用户在应用中控制或更改他们的“*现正播放*”播放列表的应用来说非常合适。


    你可以通过为要实现的音乐播放器类型调用相应的类方法来实例化音乐播放器：


    ```objc

    self.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];

    ```'
  raw: 'In this chapter, you will see how to use external sources to play more types
    of audio in your app. By expanding on the audio basics you saw in [Chapter 5](#9781430250838_Ch05.xhtml),
    this chapter describes how to play music from iTunes and from streaming audio
    sources, and to play event sounds (short sound effects that are triggered when
    an event happens, such as pressing a button) in your apps. While implementing
    these new audio sources, you will see how to reuse the same design patterns you
    first encountered while playing simple audio files (such as requesting a shared
    resource, event-driven message handling, and implementing a custom user interface)
    in other classes, and how to hook extra logic into them to enable your app to
    play multiple source types.


    The major sections in this chapter (about iTunes, streaming audio, and event sounds)
    are backed by sample projects you can find in the `Chapter 6` folder of the source
    code bundle provided with the book. (See the Source Code/Download area of the
    Apress web site, `www.apress.com``)`.


    Importing Music from iTunes


    In [Chapter 5](#9781430250838_Ch05.xhtml), you learned how to use audio files
    within your app. However, you had to import all the audio files you wanted to
    use, either by including them with your app, or through iTunes file sharing. Fortunately,
    Apple provides access to the iPod music library on a user’s device via the `MPMusicPlayerController`
    class. This is useful when you want to let users play their own music within your
    app, or when you want your app to provide controls for the user’s currently loaded
    playlist.


    The *MP* in `MPMediaPlayerController` derives from the framework it is built upon:
    the `MediaPlayer` framework. The `MediaPlayer` framework is built specifically
    for media playback, allowing it to tackle more-complicated tasks, such as playing
    back video, decoding bookmark information from podcasts and audiobooks, and accessing
    the iPod app. The MediaPlayer framework will play a key role in later chapters,
    where you will use it to play back video.


    Similar to the `AVAudioPlayer` class you used earlier to play sound files, the
    `MPMusicPlayerController` class lets you build a custom media player within your
    app, complete with playback controls and methods to query playback status. Some
    of these controls are already familiar, such as playing, pausing, and seeking,
    as well as new controls that mimic the behavior of the iPod app, such as toggling
    the shuffle behavior of a playlist. Unfortunately, `MPMusicPlayerController` is
    also a headless class, which means you must implement your own user interface.
    Additionally, as a class designed to interface with the iPod music library, you
    can use it to play back only iTunes media. You can get around this limitation
    by continuing to maintain an `AVAudioPlayer` object for playback of other audio
    files.


    In this section, you will learn how to use the `MPMediaPlayerController` class
    to play iPod media library music in your apps by building the music player application
    shown in [Figure 6-1](#9781430250838_Ch06.xhtml#Fig1). You can find this app in
    the source code bundle for the book, under the `Chapter 6` folder. The project
    is called MyPod.


    ![9781430250838_Fig06-01.jpg](images/9781430250838_Fig06-01.jpg)


    [Figure 6-1](#9781430250838_Ch06.xhtml#_Fig1). Mock-up of MyPod project


    The MyPod application allows a user to select a song or album to play by clicking
    one of the buttons at the bottom of the main view controller. Users can navigate
    between items by using the table view controller. After a user has selected a
    song or album, the app provides playback controls for the currently playing song
    and controls for navigating through the current playlist.


    The goal of the MyPod application is to show you the key concepts of implementing
    an `MPMusicPlayerController`-based music player, which are as follows:


    *   Initializing the music player

    *   Specifying a media query (you can think of this as a playlist)

    *   Building a playback interface

    *   Displaying track information (metadata)


    Getting Started


    As with the other projects in this book, you start by creating a project based
    on the Single-View Application template. Use the mock-up shown in [Figure 6-1](#9781430250838_Ch06.xhtml#Fig1)
    to help you select the user interface elements to add to your storyboard. Be sure
    to add a table view controller so users can select music. You do not need to link
    the two view controllers via a segue, as you will be using a button handler to
    manage the transitions. Your completed storyboard should look similar to the screenshot
    in [Figure 6-2](#9781430250838_Ch06.xhtml#Fig2).


    ![9781430250838_Fig06-02.jpg](images/9781430250838_Fig06-02.jpg)


    [Figure 6-2](#9781430250838_Ch06.xhtml#_Fig2). Completed storyboard for MyPod
    project


    The `MainViewController` class represents the main view for this application.
    Before implementing the class, make sure you add the `MediaPlayer` framework to
    the project. At the top of the header file (`MainViewController.h`), include the
    framework:


    ```

    #import <MediaPlayer/MediaPlayer.h>

    ```


    [Listing 6-1](#9781430250838_Ch06.xhtml#list1) shows a header file you can use
    when implementing the `MainViewController` class. As always, use these properties
    to link your storyboard to the class.


    [***Listing 6-1***](#9781430250838_Ch06.xhtml#_list1). Header File for MainViewController
    Class


    ```

    #import <UIKit/UIKit.h>

    #import <MediaPlayer/MediaPlayer.h>

    #import “MediaTableViewController.h”


    @interface MainViewController : UIViewController


    @property (nonatomic, strong) MPMusicPlayerController *musicPlayer;


    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *rewindButton;

    @property (nonatomic, strong) IBOutlet UIButton *forwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *prevButton;

    @property (nonatomic, strong) IBOutlet UIButton *nextButton;


    @property (nonatomic, strong) IBOutlet UIButton *chooseTrackButton;

    @property (nonatomic, strong) IBOutlet UIButton *chooseAlbumButton;


    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;

    @property (nonatomic, strong) IBOutlet UILabel *albumLabel;

    @property (nonatomic, strong) IBOutlet UIImageView *albumImageView;


    -(IBAction)toggleAudio:(id)sender;

    -(IBAction)startFastForward:(id)sender;

    -(IBAction)startRewind:(id)sender;

    -(IBAction)stopSeeking:(id)sender;

    -(IBAction)chooseTrackButton:(id)sender;

    -(IBAction)chooseAlbumButton:(id)sender;

    @end

    ```


    For this application, you will need to access the `MPMediaPlayerController` object
    from several functions, so make sure you define it as an instance variable, as
    shown in the example.


    Initializing the Music Player


    Much like the hardware camera or microphone, the iPod music library is a shared
    resource. The `MPMusicPlayerController` class works with this limitation by allowing
    you to implement a music player as an application music player or an iPod music
    player. An *application music player* is one that can pull in media items from
    the iPod music player, but does not have any effect on the status of the iPod
    app. An *iPod music player* is a media player within your app that acts more like
    a remote to the iPod app than an independent music player. All your playback setting
    changes and media selections will affect the iPod app. This is appropriate for
    an app where you want to let users control or change their *Now Playing* playlist
    from within your app.


    You instantiate your music player by calling the appropriate class method for
    the type of music player you want to implement:


    ```

    self.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];

    ```'
