- fmt: '本章将说明如何使用`MPMoviePlayerController`类来播放视频文件。同时，你还会重温如何使用`UIImagePickerController`类来录制视频文件。幸运的是，你会发现，前面图像和音频章节中学习的大部分技术都可以直接应用于这里的视频主题。事实上，本章的两个项目都直接借用了之前项目中的代码。


    在此过程中，你将简单学习通知的相关知识，因为理解通知对于使用`MediaPlayer`框架至关重要。视频播放器甚至没有定义代理——可见通知有多么重要！


    ### 播放视频文件


    与照片和音频类似，Apple 提供了“简单”和“困难”两种方法来实现视频相关的所有功能。简单的方法通常意味着使用内置的用户界面来完成你的任务——但你必须应对
    Apple 所设置的限制。困难的方法则意味着使用底层框架来实现相同的功能——但你必须自己创建用户界面和会话处理代码。


    首先，你将看到如何使用 Apple 的内置视频播放界面 `MPMoviePlayerController` 类以简单的方式播放视频。你可以使用 `MPMoviePlayerController`
    类播放来自文件或网络流的视频，如[图8-1](#9781430250838_Ch08.xhtml#Fig1)所示。此外，该类提供了一套基本的播放控件（包括播放/暂停、进度条搜索和
    AirPlay），并允许你通过相同的界面播放音频文件。如果你曾经通过网页浏览器观看过电影，那么从用户角度来说，你已经对 `MPMoviePlayerController`
    类非常熟悉了。


    ![9781430250838_Fig08-01.jpg](images/9781430250838_Fig08-01.jpg)


    [图8-1](#9781430250838_Ch08.xhtml#_Fig1). 使用 `MPMoviePlayerController` 类显示的基于浏览器的视频


    从开发者的角度来看，`MPMoviePlayerController` 类是有限的，因为你受限于 Apple 的大小限制（全屏或窗口模式）及其控件（全部或没有）。


    **注意** 在[第9章](#9781430250838_Ch09.xhtml)中，你将看到如何通过构建自己的视频播放器类，使用`AVFoundation`来绕过`MPMoviePlayerController`类的用户界面限制。


    在本节中，你将通过实现[图8-2](#9781430250838_Ch08.xhtml#Fig2)所示的 MyVideoPlayer 应用程序，来探索如何使用`MPMoviePlayerController`类。该应用程序包含在源代码包的`Chapter
    8`文件夹中。（请参见 Apress 网站的源代码/下载区域，`www.apress.com`。）


    ![9781430250838_Fig08-02.jpg](images/9781430250838_Fig08-02.jpg)


    [图8-2](#9781430250838_Ch08.xhtml#_Fig2). MyVideoPlayer 项目的原型图


    MyVideoPlayer 应用程序具有一个简单的用户界面，主要包括一个允许用户选择要播放的视频文件的文件选择器，以及一个嵌入在`UIView`中的视频播放器，该播放器允许用户观看选定的视频。这个嵌入播放器的播放控件来自`MPMoviePlayerController`类本身。请注意，这些控件与浏览器中嵌入视频的控件相似——这是因为
    Safari 和此应用程序使用相同的类来显示视频！


    你可能从[第5章](#9781430250838_Ch05.xhtml)的 MyPlayer 音乐播放器应用程序中认出了这个文件选择器。你在那个项目中构建了一个通用的、可复用的文件选择类。在这里，你将直接重用该类，从而可以专注于视频特有的功能。


    与音频播放相比，视频需要更复杂的设置过程以及更多的异步状态变更处理（视频文件通常非常大）。在构建 MyVideoPlayer 项目时，你将掌握以下视频播放的核心能力：


    *   用有效的内容初始化视频播放器

    *   为不同的播放模式配置视频播放器

    *   使用通知来检测播放状态变化中的错误


    ### 开始'
  raw: 'The chapter illustrates how to use the `MPMoviePlayerController` class to
    play back video files. You will also revisit using the `UIImagePickerController`
    class to record video files. Fortunately, you will find that you can apply a significant
    portion of the techniques you saw in the earlier image and audio chapters to the
    video topics here. In fact, both the projects in this chapter borrow code directly
    from earlier projects.


    Along the way, you will get a brief lesson on notifications, because understanding
    notifications is essential when using the `MediaPlayer` framework. The video player
    doesn’t even define a delegate—that’s how important notifications are!


    Playing Video Files


    As with photos and audio, Apple provides an “easy” way and a “hard” way to do
    everything with video. The easy way usually means using a built-in user interface
    to accomplish your task—but you have to design around the limitations Apple has
    put in place. The hard way means using a lower-level framework to achieve the
    same functionality—but you have to create the user interface and session-handling
    code yourself.


    First, you will see how to play video the easy way, using Apple’s built-in video
    playback interface: the `MPMoviePlayerController` class. You can use the `MPMoviePlayerController`
    class to play video from files or network streams, as shown in [Figure 8-1](#9781430250838_Ch08.xhtml#Fig1).
    Additionally, the class exposes a basic set of playback controls (including Play/Pause,
    Seek, and AirPlay), and gives you the option to play audio files through the same
    interface. If you have ever watched a movie via the web browser, you are already
    familiar with the `MPMoviePlayerController` class from a user’s perspective.


    ![9781430250838_Fig08-01.jpg](images/9781430250838_Fig08-01.jpg)


    [Figure 8-1](#9781430250838_Ch08.xhtml#_Fig1). Browser-based video displayed using
    the MPMoviePlayerController class


    From a developer’s perspective, the `MPMoviePlayerController` class is limited,
    because you are stuck both with Apple’s size limitations (full-screen or windowed)
    and its controls (all or none).


    **Note**  In [Chapter 9](#9781430250838_Ch09.xhtml) you will see how to use `AVFoundation`
    to get around the user-interface limitations of the `MPMoviePlayerController`
    class by building your own video-player class.


    In this section, you will explore how to use the `MPMoviePlayerController` class
    by implementing the MyVideoPlayer application shown in [Figure 8-2](#9781430250838_Ch08.xhtml#Fig2).
    This application is included in the `Chapter 8` folder of the source code bundle.
    (See the Source Code/Download area of the Apress web site, `www.apress.com`.)


    ![9781430250838_Fig08-02.jpg](images/9781430250838_Fig08-02.jpg)


    [Figure 8-2](#9781430250838_Ch08.xhtml#_Fig2). Mock-up for MyVideoPlayer project


    The MyVideoPlayer application has a simple user interface, consisting mainly of
    a file picker that lets users select a video file to play, and a video player
    embedded in a `UIView` that lets users watch a selected video. The playback controls
    for this embedded player come from the `MPMoviePlayerController` class itself.
    Note that they resemble the controls on browser-embedded videos—that is because
    Safari and this app use the same class to display video!


    You may recognize the file picker from the MyPlayer music player application in
    [Chapter 5](#9781430250838_Ch05.xhtml). You built a generic, reusable class for
    picking files in that project. Here, you will reuse it directly, allowing you
    to focus on video-specific features.


    Compared to audio playback, video requires a more complicated setup process and
    more asynchronous handling of state changes (video files are usually very large).
    You will cover these core competencies for video playback while building the MyVideoPlayer
    project:


    *   Initialize the video player with valid content

    *   Configure the video player for different playback modes

    *   Use notifications to detect errors in playback state changes


    Getting Started'
  trans: '

    本章将说明如何使用`MPMoviePlayerController`类来播放视频文件。同时，你还会重温如何使用`UIImagePickerController`类来录制视频文件。幸运的是，你会发现，前面图像和音频章节中学习的大部分技术都可以直接应用于这里的视频主题。事实上，本章的两个项目都直接借用了之前项目中的代码。


    在此过程中，你将简单学习通知的相关知识，因为理解通知对于使用`MediaPlayer`框架至关重要。视频播放器甚至没有定义代理——可见通知有多么重要！


    ### 播放视频文件


    与照片和音频类似，Apple 提供了“简单”和“困难”两种方法来实现视频相关的所有功能。简单的方法通常意味着使用内置的用户界面来完成你的任务——但你必须应对
    Apple 所设置的限制。困难的方法则意味着使用底层框架来实现相同的功能——但你必须自己创建用户界面和会话处理代码。


    首先，你将看到如何使用 Apple 的内置视频播放界面 `MPMoviePlayerController` 类以简单的方式播放视频。你可以使用 `MPMoviePlayerController`
    类播放来自文件或网络流的视频，如图 8-1 所示。此外，该类提供了一套基本的播放控件（包括播放/暂停、进度条搜索和 AirPlay），并允许你通过相同的界面播放音频文件。如果你曾经通过网页浏览器观看过电影，那么从用户角度来说，你已经对
    `MPMoviePlayerController` 类非常熟悉了。


    ![9781430250838_Fig08-01.jpg](img/9781430250838_Fig08-01.jpg)


    图 8-1. 使用 `MPMoviePlayerController` 类显示的基于浏览器的视频


    从开发者的角度来看，`MPMoviePlayerController` 类是有限的，因为你受限于 Apple 的大小限制（全屏或窗口模式）及其控件（全部或没有）。


    **注意** 在第 9 章中，你将看到如何通过构建自己的视频播放器类，使用`AVFoundation`来绕过`MPMoviePlayerController`类的用户界面限制。


    在本节中，你将通过实现图 8-2 所示的 MyVideoPlayer 应用程序，来探索如何使用`MPMoviePlayerController`类。该应用程序包含在源代码包的`Chapter
    8`文件夹中。（请参见 Apress 网站的源代码/下载区域，`www.apress.com`。）


    ![9781430250838_Fig08-02.jpg](img/9781430250838_Fig08-02.jpg)


    图 8-2. MyVideoPlayer 项目的原型图


    MyVideoPlayer 应用程序具有一个简单的用户界面，主要包括一个允许用户选择要播放的视频文件的文件选择器，以及一个嵌入在`UIView`中的视频播放器，该播放器允许用户观看选定的视频。这个嵌入播放器的播放控件来自`MPMoviePlayerController`类本身。请注意，这些控件与浏览器中嵌入视频的控件相似——这是因为
    Safari 和此应用程序使用相同的类来显示视频！


    你可能从第 5 章的 MyPlayer 音乐播放器应用程序中认出了这个文件选择器。你在那个项目中构建了一个通用的、可复用的文件选择类。在这里，你将直接重用该类，从而可以专注于视频特有的功能。


    与音频播放相比，视频需要更复杂的设置过程以及更多的异步状态变更处理（视频文件通常非常大）。在构建 MyVideoPlayer 项目时，你将掌握以下视频播放的核心能力：


    *   用有效的内容初始化视频播放器

    *   为不同的播放模式配置视频播放器

    *   使用通知来检测播放状态变化中的错误


    ### 开始

