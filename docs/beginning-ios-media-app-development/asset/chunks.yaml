    Debugging Common Problems


    In a perfect world, everything works bug-free the first time you try to run an
    app. In the real world, however, it’s common to miss something, at which point
    you need to figure out how to fix it. The most convenient way to get started with
    debugging is by setting breakpoints in your code. When you are running devices
    tethered to your development machine, they are running through an instance of
    the LLDB debugger, which allows you to add special diagnostic hooks for debugging
    that can then present debugging information in case of a crash. A *breakpoint*
    is a command that tells the debugger to stop running your application when it
    gets to a particular line you have marked. When code execution reaches a breakpoint,
    you can choose to continue running the program, to abort, or to inspect variables
    and the call stack.


    The easiest way to set a breakpoint is to click the vertical bar right next to
    the line of code you want to stop on. Turning on the Line Numbers option in the
    IDE makes things a bit easier, because then you can simply click the line number.
    You can see an example of an enabled breakpoint in [Figure 1-13](#9781430250838_Ch01.xhtml#Fig13).
    The line number has a blue arrow as its background.


    ![9781430250838_Fig01-13.jpg](images/9781430250838_Fig01-13.jpg)


    [Figure 1-13](#9781430250838_Ch01.xhtml#_Fig13). Breakpoint set


    When the execution hits the breakpoint, the debugger information panes appear
    on the bottom of your screen, providing you with a variable inspector and a command-line
    interface to the debugger (see [Figure 1-14](#9781430250838_Ch01.xhtml#Fig14)).


    ![9781430250838_Fig01-14.jpg](images/9781430250838_Fig01-14.jpg)


    [Figure 1-14](#9781430250838_Ch01.xhtml#_Fig14). Breakpoint hit


    By placing breakpoints carefully, you can check to make sure the code gets to
    the lines you expect it to, and check variables to make sure they are in the state
    you expect. Often, you will find out a method never executes because it never
    gets called, or you will see that a variable has the wrong value because of a
    logic error.


    [Table 1-2](#9781430250838_Ch01.xhtml#Tab2) shows a list of common problems and
    solutions you may see when trying to implement this sample application. While
    you can download the application from the Apress web site and run it that way,
    we highly recommend trying to build it yourself, so you’ll become familiar with
    the process.


