    Using the Image Picker to Take Pictures


    At first glance, you might think configuring the image picker to use the hardware
    camera would be as easy as setting the `sourceType` to `UIImagePickerControllerSourceTypeCamera`.
    Unfortunately, this one-liner can be quite deceptive. While it is a valid and
    crucial part of the configuration, there are other steps involved. First, you
    need to make sure the device on which your app is running has a camera, and that
    your app has permission to access it. Apple calls this design pattern *dynamic
    configuration*, and you need to follow it closely to make sure your app works
    on the widest possible variety of devices.


    Conveniently, as a means to implement dynamic configuration, `UIImagePickerController`
    comes with a series of public methods you can use to determine the state of a
    device or feature you would like to use. [Table 2-4](#9781430250838_Ch02.xhtml#Tab4)
    lists these methods and the features to which they correspond.


    [Table 2-4](#9781430250838_Ch02.xhtml#_Tab4). UIImagePickerController Device Detection
    Methods


    | Method Signature | Intended Purpose |

    | --- | --- |

    | `+ (BOOL)isSourceTypeAvailable: UIImagePickerControllerSourceType)sourceType`
    | Indicates whether the specified source type (album or camera) is available on
    the device |

    | `+ (BOOL)isCameraDeviceAvailable: (UIImagePickerControllerCameraDevice)cameraDevice`
    | Indicates whether the desired camera is available on the device |

    | `+ (BOOL)isFlashAvailableForCameraDevice: (UIImagePickerControllerCameraDevice)cameraDevice`
    | Indicates whether flash is available for the selected camera (front or rear)
    |

    | `+ (NSArray *)availableMediaTypesForSourceType: (UIImagePickerControllerSourceType)sourceType`
    | Indicates the media types that are supported by the selected source type (album
    or hardware) |

    | `+ (NSArray *)availableCaptureModesForCameraDevice: (UIImagePickerControllerCameraDevice)cameraDevice`
    | Indicates the capture modes that are available for the selected camera (images,
    movies, both.) |


    **Note**  Many of these device detection options are intended for configuring
    the image picker to use video. You will revisit them in more detail in later chapters.


    In the interest of simplicity, [Listing 2-12](#9781430250838_Ch02.xhtml#list12)
    modifies the `[MainViewController showPicker:]` method shown earlier, adding the
    ability to detect that a hardware camera exists on the device, and how to set
    the source type accordingly. If a camera does not exist, the code simply displays
    the photo album, as in the previous example.


    [***Listing 2-12***](#9781430250838_Ch02.xhtml#_list12). Button Handler for Displaying
    the Camera Controller


    ```

    -(IBAction)showPicker:(id)sender

    {

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.delegate = self;


    imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;


    if ([UIImagePickerController isSourceTypeAvailable:

             UIImagePickerControllerSourceTypeCamera]) {

            imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;

        }


    [self presentViewController:imagePicker animated:YES completion:^{

            NSLog(@"Image picker presented!");

        }];

    }

    ```


