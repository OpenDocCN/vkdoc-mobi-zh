    are relying on a variable that gets mutated by a block.


    An `HKQuantity` object requires a value and a *unit*, represented by the `HKUnit`
    class. This allows it to provide context to the value and automatically perform
    unit conversion (depending on the user’s region). Because *count* is a universally
    understood unit, use the `count` string to initialize your `HKUnit` object.


