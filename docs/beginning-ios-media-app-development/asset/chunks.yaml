    \ integerValue]];\n                });\n            }];\n        } else {\n  \
    \          UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    Error\"\n                message:@\"Motion permission required\"\n           \
    \     delegate:self\n                cancelButtonTitle:@\"OK\"\n             \
    \   otherButtonTitles:nil];\n            [errorAlert show];\n        }\n    }\n\
    }\n```\n"
- fmt: "You can now use your `startDate` instance variable as the baseline for your\
    \ pull query. For your completion handler, perform the exact same logic as in\
    \ your push handler — update the user interface on the main thread to display\
    \ the number of steps received. Listing 13-9 shows the completed `[self viewDidAppear]`\
    \ method for the MyFitnessPod project.\n\n**Listing 13-9.** Updating the User\
