    ## 使用 UIImagePickerController 类选择图像


    `UIImagePickerController` 是 Apple 的 `UIViewController` 子类，它提供了对系统级相机控制器和已保存图像缩略图浏览器的访问权限。当配置该控制器将相机作为其数据源时，你将看到与系统自带相机应用类似的相机基本界面。当配置该控制器使用已保存图像时，你将看到与照片应用中相同的基于缩略图的界面。通过
    `UIImagePickerController`，Apple 提供了一种将图片快速导入应用的途径，省去了编写底层硬件接口的负担，让你能专注于图片的高级用途。


    在本节中，你将学习如何使用图像选择器从相机胶卷中选择图像、使用硬件相机拍照，并将这些数据导出为 `UIImage` 对象。在此过程中，你还会了解一些 `UIImagePickerController`
    类所依赖的背景概念，并探究该类的一些局限。


    在本节中，你将构建图 2-3 中展示的应用。这是一个相机应用，它在 `UIImageView` 中显示图像，并包含一个“拍照”按钮，该按钮会调出 `UIImagePickerController`。当图像选择器完成后，应用应返回主视图控制器并显示所选图像。该应用的完成代码包含在
    ImagePicker 项目中，此书作为本书代码包的一部分提供，位于 Apress 网站（`www.apress.com`）的源代码/下载区域。ImagePicker
    项目位于代码包的 `Chapter 2` 文件夹中。


    ![9781430250838_Fig02-03.jpg](img/9781430250838_Fig02-03.jpg)


    图 2-3. 基于相机的应用流程示意图


    ## 使用协议与委托


    在开发使用图像选择器的应用时，你通常需要制定一个类似图 2-3 所描述的工作流程。


    对于极其简单的类，你可以在一个类中处理所有逻辑。然而，`UIImagePickerController` 是一个完全独立的视图控制器；因此，你需要一种在它和你的类之间传递消息的方式。遵循面向对象设计的模式，你不想将你的类信息包含在图像选择器中，因为它需要是一个可以被其他类使用的类。同时，你也不想在你的代码中重复实现
    `UIImagePickerController` 的功能。


    `UIImagePickerController` 用于消息传递所依赖的 Objective-C 语言特性称为*委托*和*协议*。


    *协议*是一种为类间通信定义有限接口的方式，可以通过导入你想要实现其协议的类的头文件来推断。协议指定了一个名称（用于标识）和一个方法列表及其参数。你还可以使用块关键字
    `optional` 为方法指定优先级。通过在头文件中放置一个包含命名信息和方法签名的 `@protocol` 块来定义协议。代码清单 2-3 展示了一个简单的头文件，它定义了一个与
    `UIImagePickerController` 类所使用的协议相似的协议。


    ***代码清单 2-3***. 简单相机协议的头文件


    ```

    #import <UIKit/UIKit.h>


    @protocol CameraViewControllerDelegate <NSObject>


    -(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage *)image;


    @optional

    -(void)cameraViewController:(UIViewController *)controller didCancel:(BOOL)state;


    @end


    @interface CameraViewController : UIViewController


    @property (nonatomic, strong) UIImage *capturedImage;


    @end

    ```


    **注意** 所有不在 `@optional` 块下的方法都被视为必需方法，必须由协议的接收者实现。


    你会注意到我并没有包含这些方法如何工作的代码示例。这正是协议的关键优势：协议定义了两个类之间的通信方式，但从不实现目标逻辑。你可以将协议视为类似于 Java
    中的抽象类。


    为了将其与具体示例联系起来，`UIImagePickerController` 类定义了一个协议，表明它将在选择器关闭后以及拍照后发送消息。在你的展示类中，由你来处理当它发送这些消息时发生什么。


    处理这些数据的方式是通过委托。*委托*是将工作单元传递给另一个类的概念。以图像选择器为例，创建相机控制器实例、拍照和呈现数据流的所有工作都委托给了图像选择器类。当它完成后，会将结果发送回我们。实现协议并接收其消息的对象称为*委托*。


    要实现协议，你需要修改接收类的头文件以包含协议定义，并修改类定义以表明它实现了该协议。它被称为*接收类*，因为它接收来自委托类的消息。代码清单 2-4 展示了一个实现协议的类的头文件示例。此头文件旨在与你的主视图控制器的头文件类似。


    ***代码清单 2-4***. 接收协议消息的类的头文件


    ```

    #import <UIKit/UIKit.h>

    #import "CameraViewController.h"


    @interface FirstViewController : UIViewController <CameraViewControllerDelegate>

    @property (nonatomic, strong) UIImage *selectedImage;

    @end

    ```

