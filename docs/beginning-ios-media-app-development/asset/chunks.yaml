    ## 使用播放进度条


    要启用底部栏中滑块进行跳转的功能，你需要实现该元素的“值已更改”事件。*值已更改*事件在用户完成移动滑块内部指示器时触发。虽然`touch up inside`适用于按钮（因为最终事件是松开按钮），但对于滑块，你需要捕获用户完全完成值更改的时刻，而不仅仅是用户手指离开元素（手指接触滑块的任何部分都可能触发该事件）。


    对于事件的处理器方法，在 `CustomViewController` 的头文件中添加一个名为 `sliderChanged:` 的 `IBAction`
    处理器方法：


    ```

    -(IBAction)sliderChanged:(id)sender;

    ```


    要捕获*值已更改*事件，请将该事件绑定到界面构建板中的 `timeSlider`。如图 9-12 所示，与其他用户界面事件相同，在连接检查器中按住“值已更改”单选按钮，然后将光标拖拽到界面构建板中的
    `CustomViewController` 上。松开光标时，会显示一个有效的 `IBAction` 方法列表。选择 `sliderChanged:` 方法。


    ![9781430250838_Fig09-12.jpg](img/9781430250838_Fig09-12.jpg)


    图 9-12. 连接“值已更改”事件


    既然你已经了解了如何捕获事件的上下文，那么你需要学习如何处理事件信息。视频进度条允许用户跳转到视频中的任意时间点。当你更新用户界面以显示播放进度时，你通过计算视频的*完成百分比*（当前时间/总时间）来设置进度条的位置。现在用户有了进度条，你希望通过使用新值来重新计算这一时间。如代码清单
    9-16 所示，你可以从 `UISlider` 对象的 `value` 属性中获取新值。


    ***代码清单 9-16***. 播放进度条处理器


    ```

    -(IBAction)sliderChanged:(UISlider *)sender

    {

        float progress = sender.value;

        NSInteger durationSeconds = CMTimeGetSeconds([self.playerItem duration]);

        float result = durationSeconds * progress;

        CMTime seekTime = CMTimeMakeWithSeconds(result, 1);


    [self.player seekToTime:seekTime];


    }

    ```


    `value` 属性是一个介于 `0` 和 `1` 之间的 `float` 值。将视频的*持续时间*乘以该值，即可找到新的播放位置。跳转到指定时间后，调用
    `[self updateProgress]` 方法立即更新用户界面（用户期望看到他们拖拽到的新时间）。


    ## 关闭播放界面


    要关闭播放控制器，你需要向其呈现视图控制器（你的 `MainViewController` 对象）发送一条消息。为模拟 `MPMoviePlayerController`
    类的行为，当用户点击“完成”按钮时，发布一条名为 `customPlayerDidFinish` 的通知，如代码清单 9-17 所示。


    ***代码清单 9-17***. “完成”按钮处理器


    ```

    -(IBAction)done:(id)sender

    {

        NSDictionary *userDict = [NSDictionary dictionaryWithObject:@"user finished"

            forKey:@"reason"];

        [[NSNotificationCenter defaultCenter]

             postNotificationName:@"customPlayerDidFinish" object:userDict];

    }

    ```


    要处理此消息，在 `MainViewController` 类的 `[self viewDidLoad]` 方法中添加一个 `customPlayerDidFinish`
    通知的观察者；同样，在 `[self dealloc]` 方法中移除该观察者。`MainViewController` 类的最终视图销毁和设置方法如代码清单
    9-18 和 9-19 所示。


    ***代码清单 9-18***. MainViewController 视图设置方法


    ```

    - (void)viewDidLoad {

        [super viewDidLoad];

        // 加载视图后进行任何额外设置，通常来自 nib 文件。


    [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(playbackFinished:)

            name:@"customPlayerDidFinish"

            object:nil];

        [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(loadStateChanged:)

            name:@"customPlayerLoadStateChanged" object:nil];

    }

    ```


    ***代码清单 9-19***. MainViewController 视图销毁方法


    ```

    - (void)dealloc

    {

        [[NSNotificationCenter defaultCenter] removeObserver:self

            name:@"customPlayerDidFinish" object:nil];

        [[NSNotificationCenter defaultCenter] removeObserver:self

            name:@"customPlayerLoadStateChanged" object:nil];


    }

    ```


    在通知的处理器方法中（代码清单 9-19 指定为 `[self playbackFinished:]`），调用 `[self dismissViewController:animated:]`。为了给此方法添加错误处理，我在
    `userDict` 中创建了一个 `error` 条目，你可以用它来检查播放是否因错误而失败。`MainViewController` 类的“播放完成”处理器如代码清单
    9-20 所示。


    ***代码清单 9-20***. 播放完成处理器方法


    ```

    -(void)playbackFinished:(NSNotification *) notification

    {


    NSDictionary *userInfo = notification.userInfo;

        NSString *finishReason = [userInfo objectForKey:@"reason"];


    [self dismissViewControllerAnimated:YES completion:^{


    if ([finishReason isEqualToString:@"error"]) {

                NSError *error = [userInfo objectForKey:@"error"];

                NSString *errorString = [error description];


    UIAlertView *alert = [[UIAlertView alloc]

                    initWithTitle:@"Error!" message:errorString

                    delegate:nil cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [alert show];

            }


    }];


    }

    ```


    ## 添加用户界面更新


    为了改进 MyCustomVideoPlayer 应用程序的用户界面，你应添加用户界面更新，以隐藏播放控件并指示当前播放进度，这两者都可以通过巧妙使用定时器来实现。


    用户开始播放后，你应该更新“当前时间”标签和进度条，以指示当前播放位置。此外，在几秒钟无操作后，你应该隐藏中央播放控制面板。


    ### 更新播放进度

    '
- fmt: '为了更新播放进度，你可以复用第 6 章 MyPlayer 音频应用中类似的逻辑。创建一个每秒触发一次的定时器，并在其处理程序方法中执行用户界面更新。对于`CustomPlayerController`类，用户期望进度滑块（视频拖拽条）和进度标签（位于滑块左侧）每秒更新一次。


    创建一个名为`[self updateProgress]`的方法来包含此用户界面更新代码。要显示进度，你需要知道视频的总时长和当前播放位置。你可以通过当前加载的`AVPlayerItem`对象上的`duration`和`currentTime`属性来查询这些信息。对于`CustomViewController`类，这对应实例变量`playerItem`。对于`progressLabel`，你可以简单地将`currentTime`转换为分钟和秒后进行显示。滑块则稍微复杂一些——但也复杂不到哪里去。


    视频拖拽条是任何视频播放用户界面的关键组成部分。它允许用户跳转到视频中的某个位置并查看当前播放状态。它看起来像一个进度条，因为它本来就是。要获取进度，你需要知道视频已“观看”了多少，与剩余多少相比。你可以通过将当前时间除以总时长来得到这个比例。例如，如果用户观看了一段
    60 秒视频中的 30 秒，那么进度应为 50%。当你以`0`到`1`之间的`float`形式获得新值后，可以通过设置`value`属性将其应用于`UISlider`。


    [***Listing 9-21***](#9781430250838_Ch09.xhtml#_list21) 展示了`CustomViewController`类的`[self
    updateProgress]`方法，该方法更新进度标签和滑块。


    ```

    -(void)updateProgress

    {


    NSInteger durationMinutes = CMTimeGetSeconds(

            [self.playerItem duration]) / 60;

        NSInteger durationSeconds = CMTimeGetSeconds(

            [self.playerItem duration])  - durationMinutes * 60;


    NSInteger currentTimeMinutes = CMTimeGetSeconds(

            [self.playerItem currentTime]) / 60;

        NSInteger currentTimeSeconds = CMTimeGetSeconds(

            [self.playerItem currentTime])  - currentTimeMinutes * 60;


    self.timeSlider.value = CMTimeGetSeconds(

            [self.playerItem currentTime])/CMTimeGetSeconds(

            [self.playerItem duration]) + 0.0f;


    self.progressLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            currentTimeMinutes, currentTimeSeconds];

        self.totalTimeLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            durationMinutes, durationSeconds];


    }

    ```


    与 MyPlayer 应用非常相似，你只应在视频播放处于活动状态时更新进度。如 [***Listing 9-22***](#9781430250838_Ch09.xhtml#_list22)
    所示，如果用户正在开始播放，则创建一个每秒触发一次的定时器；否则，使现有定时器失效以停止它。


    ```

    -(IBAction)togglePlayback:(id)sender

    {

        if (self.isPlaying) {

            [self.player pause];


    [self.playbackButton setTitle:@"Play"

                forState:UIControlStateNormal];


    [self showControls:nil];


    [self.updateTimer invalidate];


    } else {

            [self.player play];


    [self.playbackButton setTitle:@"Pause"

                forState:UIControlStateNormal];


    self.updateTimer = [NSTimer scheduledTimerWithTimeInterval:1.0f

                target:self selector:@selector(updateProgress) userInfo:nil

                repeats:YES];

        }

        self.isPlaying = !self.isPlaying;

    }

    ```


    你会注意到，这里我调用了`[NSTimer scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:]`构造方法来初始化定时器，而不是`[NSTimer
    timerWithTimeInterval:target:selector:userInfo:repeats:]`。由于定时器更新需要被主线程捕获才能执行，*调度*定时器是强制此行为的好方法。


    ## 自动隐藏播放控件


    虽然播放控件对用户很方便，但如果它们一直停留在播放器视图之上，可能会令人烦恼。一些视频应用（包括 Apple 的应用）通过在一段时间无操作后隐藏控件来解决这个问题。当用户点击视频区域时，你通常可以正确假设用户即将拖拽视频或需要切换播放/暂停。类似地，如果
    1 或 2 秒过去用户没有触摸任何元素，你可以安全地假设用户操作已结束。


    你可以通过向播放视图添加一个`UITapGestureRecognizer`来检测此类活动。*手势识别器*内置于许多`UIKit`类中，例如`UIButton`，并驱动熟悉的事件，例如*touch
    up inside*。与任何其他事件一样，你需要定义要监视的手势以及捕获事件时要调用的`IBAction`处理方法。在 Interface Builder
    中，要向任何元素添加手势识别器，请将其从对象库中拖出并放到你的目标上。对于播放视图，将一个*Tap 手势识别器*拖到`CustomPlayerController`的`view`属性上，如
    [***Figure 9-13***](#9781430250838_Ch09.xhtml#Fig13) 所示。


    ![9781430250838_Fig09-13.jpg](images/9781430250838_Fig09-13.jpg)


    [***Figure 9-13***](#9781430250838_Ch09.xhtml#_Fig13). 向`CustomPlayerController`类添加一个`UITapGestureRecognizer`


    对于处理方法，在你的头文件中创建一个名为`[self showControls:]`的`IBAction`方法。


    ```

    -(IBAction)showControls:(id)sender;

    ```


    要将处理方法连接到手势识别器，请在连接检查器中按住“已发送操作”下的`selector`属性，并将其拖到`CustomPlayerController`上，如
    [***Figure 9-14***](#9781430250838_Ch09.xhtml#Fig14) 所示。从下拉菜单中选择`[self showControls:]`方法。


    ![9781430250838_Fig09-14.jpg](images/9781430250838_Fig09-14.jpg)


    [***Figure 9-14***](#9781430250838_Ch09.xhtml#_Fig14). 将`UITapGestureRecognizer`连接到处理方法


    顾名思义，在`[self showControls:]`中，你应该显示播放控件。然而，你还应该启动一个定时器，在 2 秒后隐藏控件。如 [***Listing
    9-23***](#9781430250838_Ch09.xhtml#list23) 所示，要显示控件，将子视图置于最前面（这将使其显示在视频之上）并启用用户交互触摸事件。要隐藏控件，创建一个名为`controlTimer`的实例变量，并令其处理方法为`[self
    hideControllers:]`。为防止冲突的定时器事件，如果之前的定时器不为`nil`，则将其禁用。


    ```

    -(IBAction)showControls:(id)sender

    {

        if (self.controlTimer != nil)

            [self.controlTimer invalidate];


    [self.view bringSubviewToFront:self.controlView];

        self.controlView.userInteractionEnabled = YES;


    if (sender != nil) {

            self.controlTimer = [NSTimer scheduledTimerWithTimeInterval:2.0f

                target:self selector:@selector(hideControls:) userInfo:nil

                repeats:NO];

        }

    }

    ```


    要隐藏控件，反转该过程。将播放控件移到预览层后面，并禁用触摸事件，以免产生任何误触发，如 [***Listing 9-24***](#9781430250838_Ch09.xhtml#list24)
    所示。


    ```

    -(IBAction)hideControls:(id)sender

    {

        [self.view sendSubviewToBack:self.controlView];

        self.controlView.userInteractionEnabled = NO;

    }

    ```


    你可以使用相同的过程来隐藏屏幕顶部和底部的栏。只需在你的类中定义它们，并将其添加到通过点击和定时器事件隐藏或显示的视图列表中。'
  raw: 'To update playback progress, you can reuse logic similar to that from the
    MyPlayer audio application in [Chapter 6](#9781430250838_Ch06.xhtml). Create a
    timer that will fire every second, and perform user-interface updates in its handler
    method. For the `CustomPlayerController` class, the user expects the progress
    slider (video scrubber) and progress label (to the left of the slider) to update
    every second.


    Create a method called `[self updateProgress]` to contain this user-interface
    update code. To display progress, you need to know the total length of the video
    and the current playback position. You can query these via the `duration` and
    `currentTime` properties on the currently loaded `AVPlayerItem` object. For the
    `CustomViewController` class, this is the `playerItem` instance variable. For
    the `progressLabel`, you can simply display the `currentTime` after converting
    it to minutes and seconds. The scrubber is a bit more complicated—but not by much.


    A video scrubber is an essential part of any video playback user interface. It
    allows the user to jump to a position in the video and see the current playback.
    It looks like a progress bar, because it is. To get the progress, you need to
    know how much of the video has been “watched,” compared to how much is remaining.
    You can find this by dividing the current time by the duration. For instance,
    if a user has watched 30 seconds of a 60-second video, the progress should be
    50%. After you have the new value in the form of a `float` between `0` and `1`,
    you can apply it to a `UISlider` by setting the `value` property.


    [Listing 9-21](#9781430250838_Ch09.xhtml#list21) shows the `[self updateProgress]`
    method for the `CustomViewController` class, which updates the progress label
    and slider.


    [***Listing 9-21***](#9781430250838_Ch09.xhtml#_list21). Updating the User Interface
    with Playback Progress


    ```

    -(void)updateProgress

    {


    NSInteger durationMinutes = CMTimeGetSeconds(

            [self.playerItem duration]) / 60;

        NSInteger durationSeconds = CMTimeGetSeconds(

            [self.playerItem duration])  - durationMinutes * 60;


    NSInteger currentTimeMinutes = CMTimeGetSeconds(

            [self.playerItem currentTime]) / 60;

        NSInteger currentTimeSeconds = CMTimeGetSeconds(

            [self.playerItem currentTime])  - currentTimeMinutes * 60;


    self.timeSlider.value = CMTimeGetSeconds(

            [self.playerItem currentTime])/CMTimeGetSeconds(

            [self.playerItem duration]) + 0.0f;


    self.progressLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            currentTimeMinutes, currentTimeSeconds];

        self.totalTimeLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            durationMinutes, durationSeconds];


    }

    ```


    Much like the MyPlayer application, you should update progress only when video
    playback is active. As shown in [Listing 9-22](#9781430250838_Ch09.xhtml#list22),
    if the user is starting playback, create a timer that fires every second; otherwise,
    invalidate the existing timer to stop it.


    [***Listing 9-22***](#9781430250838_Ch09.xhtml#_list22). Initiating Progress Updates


    ```

    -(IBAction)togglePlayback:(id)sender

    {

        if (self.isPlaying) {

            [self.player pause];


    [self.playbackButton setTitle:@"Play"

                forState:UIControlStateNormal];


    [self showControls:nil];


    [self.updateTimer invalidate];


    } else {

            [self.player play];


    [self.playbackButton setTitle:@"Pause"

                forState:UIControlStateNormal];


    self.updateTimer = [NSTimer scheduledTimerWithTimeInterval:1.0f

                target:self selector:@selector(updateProgress) userInfo:nil

                repeats:YES];

        }

        self.isPlaying = !self.isPlaying;

    }

    ```


    You will notice here that I called the `[NSTimer` `scheduledTimerWithTimeInterval``:target:selector:userInfo:repeats:]`
    constructor to initialize the timer, instead of `[NSTimer timerWithTimeInterval:target:selector:userInfo:repeats:]`.
    Since timer updates need to be caught on the main thread to execute, *scheduling*
    the timer is a good way to force this behavior.


    Automatically Hiding the Playback Controls


    While the playback controls are convenient to the user, they can be a nuisance
    if they remain on top of the player view. Several video applications (including
    Apple’s) solve this problem by hiding the controls after a couple of seconds of
    inactivity. When a user clicks on the video area, you can usually correctly assume
    that the user is about to scrub the video or needs to toggle playback. Similarly,
    if 1 or 2 seconds goes by without the user touching any element, you can safely
    assume that user is done.


    You detect such activity by adding a `UITapGestureRecognizer` to the playback
    view. *Gesture recognizers* are built into many `UIKit` classes, such as `UIButton`,
    and drive familiar events, such as *touch up inside*. Just as with any other event,
    you define the gesture to watch and which `IBAction` handler method you want to
    call when the event is caught. In Interface Builder, to add a gesture recognizer
    to any element, drag it out of the Object Library and drop it on your target.
    For the playback view, drag a *Tap gesture recognizer* onto the `CustomPlayerController`’s
    `view` property, as shown in [Figure 9-13](#9781430250838_Ch09.xhtml#Fig13).


    ![9781430250838_Fig09-13.jpg](images/9781430250838_Fig09-13.jpg)


    [Figure 9-13](#9781430250838_Ch09.xhtml#_Fig13). Adding a UITapGestureRecognizer
    to the CustomPlayerController class


    For the handler method, create an `IBAction` method in your header file called
    `[``self showControls``:]`.


    ```

    -(IBAction)showControls:(id)sender;

    ```


    To connect the handler method to the gesture recognizer, hold down on the `selector`
    property under Sent Actions in the Connections Inspector, and drop it onto the
    `CustomPlayerController`, as shown in [Figure 9-14](#9781430250838_Ch09.xhtml#Fig14).
    Select the `[self showControls:]` method from the drop-down menu.


    ![9781430250838_Fig09-14.jpg](images/9781430250838_Fig09-14.jpg)


    [Figure 9-14](#9781430250838_Ch09.xhtml#_Fig14). Connecting the UITapGestureRecognizer
    to a handler method


    As the name suggests, in `[self showControls:]`, you should display the playback
    controls. However, you should also start a timer to hide the controls after 2
    seconds. As shown in [Listing 9-23](#9781430250838_Ch09.xhtml#list23), to display
    the controls, bring the subview to the front (this will display it on top of the
    video) and enable user-interaction touch events. To hide the controls, create
    an instance variable called `controlTimer` and make its handler method, `[self
    hideControllers:]`. To prevent conflicting timer events, disable the previous
    timer if it is not `nil`.


    [***Listing 9-23***](#9781430250838_Ch09.xhtml#_list23). Showing Controls upon
    a Tap Event


    ```

    -(IBAction)showControls:(id)sender

    {

        if (self.controlTimer != nil)

            [self.controlTimer invalidate];


    [self.view bringSubviewToFront:self.controlView];

        self.controlView.userInteractionEnabled = YES;


    if (sender != nil) {

            self.controlTimer = [NSTimer scheduledTimerWithTimeInterval:2.0f

                target:self selector:@selector(hideControls:) userInfo:nil

                repeats:NO];

        }

    }

    ```


    To hide the controls, reverse the process. Move the playback controls so they’re
    behind the preview layer, and disable touch events so that you do not generate
    any false positives, as shown in [Listing 9-24](#9781430250838_Ch09.xhtml#list24).


    [***Listing 9-24***](#9781430250838_Ch09.xhtml#_list24). Hiding Controls After
    the Timer Fires


    ```

    -(IBAction)hideControls:(id)sender

    {

        [self.view sendSubviewToBack:self.controlView];

        self.controlView.userInteractionEnabled = NO;

    }

    ```


    You can use this same process to hide the bars at the top and bottom of the screen.
    Simply define them in your class and add them to the list of views that are hidden
    or shown by tap and timer events.


    Summary'
  trans: '

    为了更新播放进度，你可以复用第 6 章 MyPlayer 音频应用中类似的逻辑。创建一个每秒触发一次的定时器，并在其处理程序方法中执行用户界面更新。对于`CustomPlayerController`类，用户期望进度滑块（视频拖拽条）和进度标签（位于滑块左侧）每秒更新一次。


    创建一个名为`[self updateProgress]`的方法来包含此用户界面更新代码。要显示进度，你需要知道视频的总时长和当前播放位置。你可以通过当前加载的`AVPlayerItem`对象上的`duration`和`currentTime`属性来查询这些信息。对于`CustomViewController`类，这对应实例变量`playerItem`。对于`progressLabel`，你可以简单地将`currentTime`转换为分钟和秒后进行显示。滑块则稍微复杂一些——但也复杂不到哪里去。


    视频拖拽条是任何视频播放用户界面的关键组成部分。它允许用户跳转到视频中的某个位置并查看当前播放状态。它看起来像一个进度条，因为它本来就是。要获取进度，你需要知道视频已“观看”了多少，与剩余多少相比。你可以通过将当前时间除以总时长来得到这个比例。例如，如果用户观看了一段
    60 秒视频中的 30 秒，那么进度应为 50%。当你以`0`到`1`之间的`float`形式获得新值后，可以通过设置`value`属性将其应用于`UISlider`。


    ***列表 9-21*** 展示了`CustomViewController`类的`[self updateProgress]`方法，该方法更新进度标签和滑块。


    ```

    -(void)updateProgress

    {


    NSInteger durationMinutes = CMTimeGetSeconds(

            [self.playerItem duration]) / 60;

        NSInteger durationSeconds = CMTimeGetSeconds(

            [self.playerItem duration])  - durationMinutes * 60;


    NSInteger currentTimeMinutes = CMTimeGetSeconds(

            [self.playerItem currentTime]) / 60;

        NSInteger currentTimeSeconds = CMTimeGetSeconds(

            [self.playerItem currentTime])  - currentTimeMinutes * 60;


    self.timeSlider.value = CMTimeGetSeconds(

            [self.playerItem currentTime])/CMTimeGetSeconds(

            [self.playerItem duration]) + 0.0f;


    self.progressLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            currentTimeMinutes, currentTimeSeconds];

        self.totalTimeLabel.text = [NSString stringWithFormat:@"%02ld:%02ld",

            durationMinutes, durationSeconds];


    }

    ```


    与 MyPlayer 应用非常相似，你只应在视频播放处于活动状态时更新进度。如 ***列表 9-22*** 所示，如果用户正在开始播放，则创建一个每秒触发一次的定时器；否则，使现有定时器失效以停止它。


    ```

    -(IBAction)togglePlayback:(id)sender

    {

        if (self.isPlaying) {

            [self.player pause];


    [self.playbackButton setTitle:@"Play"

                forState:UIControlStateNormal];


    [self showControls:nil];


    [self.updateTimer invalidate];


    } else {

            [self.player play];


    [self.playbackButton setTitle:@"Pause"

                forState:UIControlStateNormal];


    self.updateTimer = [NSTimer scheduledTimerWithTimeInterval:1.0f

                target:self selector:@selector(updateProgress) userInfo:nil

                repeats:YES];

        }

        self.isPlaying = !self.isPlaying;

    }

    ```


    你会注意到，这里我调用了`[NSTimer scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:]`构造方法来初始化定时器，而不是`[NSTimer
    timerWithTimeInterval:target:selector:userInfo:repeats:]`。由于定时器更新需要被主线程捕获才能执行，*调度*定时器是强制此行为的好方法。


    ## 自动隐藏播放控件


    虽然播放控件对用户很方便，但如果它们一直停留在播放器视图之上，可能会令人烦恼。一些视频应用（包括 Apple 的应用）通过在一段时间无操作后隐藏控件来解决这个问题。当用户点击视频区域时，你通常可以正确假设用户即将拖拽视频或需要切换播放/暂停。类似地，如果
    1 或 2 秒过去用户没有触摸任何元素，你可以安全地假设用户操作已结束。


    你可以通过向播放视图添加一个`UITapGestureRecognizer`来检测此类活动。*手势识别器*内置于许多`UIKit`类中，例如`UIButton`，并驱动熟悉的事件，例如*touch
    up inside*。与任何其他事件一样，你需要定义要监视的手势以及捕获事件时要调用的`IBAction`处理方法。在 Interface Builder
    中，要向任何元素添加手势识别器，请将其从对象库中拖出并放到你的目标上。对于播放视图，将一个*Tap 手势识别器*拖到`CustomPlayerController`的`view`属性上，如
    ***Figure 9-13*** 所示。


    ![9781430250838_Fig09-13.jpg](img/9781430250838_Fig09-13.jpg)


    ***Figure 9-13***. 向`CustomPlayerController`类添加一个`UITapGestureRecognizer`


    对于处理方法，在你的头文件中创建一个名为`[self showControls:]`的`IBAction`方法。


    ```

    -(IBAction)showControls:(id)sender;

    ```


    要将处理方法连接到手势识别器，请在连接检查器中按住“已发送操作”下的`selector`属性，并将其拖到`CustomPlayerController`上，如
    ***Figure 9-14*** 所示。从下拉菜单中选择`[self showControls:]`方法。


    ![9781430250838_Fig09-14.jpg](img/9781430250838_Fig09-14.jpg)


    ***Figure 9-14***. 将`UITapGestureRecognizer`连接到处理方法


    顾名思义，在`[self showControls:]`中，你应该显示播放控件。然而，你还应该启动一个定时器，在 2 秒后隐藏控件。如 ***列表 9-23***
    所示，要显示控件，将子视图置于最前面（这将使其显示在视频之上）并启用用户交互触摸事件。要隐藏控件，创建一个名为`controlTimer`的实例变量，并令其处理方法为`[self
    hideControllers:]`。为防止冲突的定时器事件，如果之前的定时器不为`nil`，则将其禁用。


    ```

    -(IBAction)showControls:(id)sender

    {

        if (self.controlTimer != nil)

            [self.controlTimer invalidate];


    [self.view bringSubviewToFront:self.controlView];

        self.controlView.userInteractionEnabled = YES;


    if (sender != nil) {

            self.controlTimer = [NSTimer scheduledTimerWithTimeInterval:2.0f

                target:self selector:@selector(hideControls:) userInfo:nil

                repeats:NO];

        }

    }

    ```


    要隐藏控件，反转该过程。将播放控件移到预览层后面，并禁用触摸事件，以免产生任何误触发，如 ***列表 9-24*** 所示。


    ```

    -(IBAction)hideControls:(id)sender

    {

        [self.view sendSubviewToBack:self.controlView];

        self.controlView.userInteractionEnabled = NO;

    }

    ```


    你可以使用相同的过程来隐藏屏幕顶部和底部的栏。只需在你的类中定义它们，并将其添加到通过点击和定时器事件隐藏或显示的视图列表中。

