    Chapter    10


    Building a Custom Video-Recording Interface


    To close out the unit on video, you will build your own video-recording interface
    “the hard way.” As you have seen while working with other media features, Cocoa
    Touch provides a great built-in interface for video capture—but only if you are
    willing to accept its user interface and functionality limits. When you want to
    go beyond these limits, customizing the video-capture interface to better suit
    your workflow or brand, you need to build your own user interface. To do that,
    you need to hook into `AVFoundation`’s low-level image-capture functionality.


    If all this sounds familiar, that’s because it is. By repeating many of the same
    steps you used to build a custom still-image interface in [Chapter 4](#9781430250838_Ch04.xhtml),
    you can build a custom video-capture interface. As you learned in  [Chapter 4](#9781430250838_Ch04.xhtml),
    these are the major steps required to implement a still-image interface:


    1.  Discover and configure the camera hardware.

    2.  Build a user interface capable of displaying the live camera feed.

    3.  Modify the capture settings from the UI.

    4.  Save the image when the user presses the Take Picture button.


    To adapt that workflow to video, you need to do the following:


    1.  Configure the capture session for video.

    2.  Add video-specific capture controls.

    3.  Display a preview interface when the user finishes recording.

    4.  Refactor the message-passing interface to handle larger files.


    In this chapter, you will build a custom video-recording interface by implementing
    the MyCustomRecorder project (you can find the code in the [Chapter 10](#9781430250838_Ch10.xhtml)
    folder) that you first saw in [Chapter 9](#9781430250838_Ch09.xhtml), adding video-capture
    features accessible via a Record Video button. You will reuse the MyCustomPlayer
    project code for all video-playback functions. Users will be able to modify capture
    settings before video recording begins. After recording is complete, they will
    see a preview interface, where they can choose to accept or reject the video they
    just shot.


    ![9781430250838_Fig10-01.jpg](images/9781430250838_Fig10-01.jpg)


    Figure 10-1\. Mock-up for MyCustomRecorder project


    In [Figure 10-2](#9781430250838_Ch10.xhtml#Fig2), you can compare the MyCustomRecorder
    project to the MyCamera still-image capture project from [Chapter 4](#9781430250838_Ch04.xhtml).
    You can see that the general flow of the application is the same, with the exception
    of the preview interface and capture settings.


    ![9781430250838_Fig10-02.jpg](images/9781430250838_Fig10-02.jpg)


    [Figure 10-2](#9781430250838_Ch10.xhtml#_Fig2). Mock-up for MyCamera still-image
    capture project


    This chapter relies heavily on your knowledge of image capture using `AVFoundation`
    from [Chapter 4](#9781430250838_Ch04.xhtml). If you haven’t mastered that topic,
    I recommend reviewing [Chapter 4](#9781430250838_Ch04.xhtml) before you proceed.
    This project reuses many of the image-capture code samples from [Chapter 4](#9781430250838_Ch04.xhtml),
    but my explanations of the core classes (such as `AVCaptureInputDevice` and `AVCaptureSession`)
    will not be as deep.


    Getting Started


    For this chapter, your primary focus is video capture. First, clone the MyCustomPlayer
    from [Chapter 9](#9781430250838_Ch09.xhtml) to get a base user interface and video-playback
    interface. You clone a project by making a copy of it in the Finder and then opening
    it in Xcode. As shown in [Figure 10-3](#9781430250838_Ch10.xhtml#Fig3), remember
    that you can rename the project by clicking carefully inside the project file’s
    name in the Project Navigator.


    ![9781430250838_Fig10-03.jpg](images/9781430250838_Fig10-03.jpg)


    [Figure 10-3](#9781430250838_Ch10.xhtml#_Fig3). Renaming a project


    To build a custom video-capture interface, you need to use the `AVFoundation`
    framework’s image-capture classes. As in previous projects, add this framework
    to your project as a Linked Framework under your project’s Settings. Your final
    set of included frameworks should look like the example in [Figure 10-4](#9781430250838_Ch10.xhtml#Fig4).


    ![9781430250838_Fig10-04.jpg](images/9781430250838_Fig10-04.jpg)


    [Figure 10-4](#9781430250838_Ch10.xhtml#_Fig4). List of frameworks for MyCustomRecorder
    project


    The device setup code, user interface, and protocol for the MyCamera project were
    encapsulated in the `CameraViewController` class. Because the user interface and
    protocol mimicked the `UIImagePickerControllerView` class closely, you should
    use these as a base for the MyCustomRecorder project. Copy these files over from
    the MyCamera project.


    Setting Up the Hardware Interface


    After including the base classes for the project, you can start modifying the
    `CameraViewController` class to support video capture. Before dealing with the
    user interface, you need to make sure the hardware interface to the camera is
    properly set up for video capture.


    To review [Chapter 4](#9781430250838_Ch04.xhtml), the classes you configure to
    capture media are as follows:


    *   `AVCaptureDevice`: Represents the hardware device you are going to access

    *   `AVCaptureInput`: Represents the data stream you are accessing (for example,
    video stream for a camera, audio stream for a microphone)

    *   `AVCaptureOutput`:Represents the data that is captured by your device (for
    example, a movie file)

    *   `AVCaptureSession`: Manages the interface between the input data stream and
    the output


    In the `CameraViewController` class, the  hardware initialization code was in
    the `[CameraViewController viewDidLoad]` and `[CameraViewController initializeCameras]`
    methods. The hardware initialization code for still-image capture is highlighted
    in [Listing 10-1](#9781430250838_Ch10.xhtml#list1). Throughout this section, you
    will change the settings so that they are appropriate for video.


    [***Listing 10-1***](#9781430250838_Ch10.xhtml#_list1). Hardware Interface Settings
    for Still-Image Capture


