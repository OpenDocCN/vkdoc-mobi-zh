    Getting Real-Time Updates


    To get real-time updates during a workout, you need to trigger the `[MainViewController
    updateTotalStepCount]` method from an `HKObserverQuery`, which checks whether
    the total step count has been updated. Unfortunately, there is no query that kills
    both birds with one stone (determining both the change event and the new quantity),
    because an `HKObserverQuery` notifies the observer of events, but does not return
    any data about them.


    Because push queries need to be stopped, define your `HKObserverQuery` as an instance
    variable:


    ```

    @property (nonatomic, strong) HKObserverQuery *observerQuery;

    ```


    To initialize an `HKObserverQuery`, use the method `[HKObserverQuery initWithSampleType:predicate:updateHandler]`.
    For the sample type, you will once again use the `HKQuantityType` object corresponding
    to step count (all `HKQuantityType` objects are subclasses of `HKSampleType`):


    ```

    HKQuantityType *quantityType = [HKQuantityType

        quantityTypeForIdentifier:HKQuantityTypeIdentierStepCount];

    ```


    You do not need to specify a predicate for the query, because you do not need
    to filter the events. Every change to the step count will be an addition.


    In the completion handler, now that you know the step count has changed, you can
    call the `[MainViewController updateTotalStepCount]` method to retrieve the latest
    totals.


    In [Listing 13-15](#9781430250838_Ch13.xhtml#list15), you can see that I have
    added this query to the `[MainViewController viewDidLoad]` method, as the user
    should be able to see total step count updates as long as the app is open.


    [***Listing 13-15***](#9781430250838_Ch13.xhtml#_list15). Statistics Query for
    Step Count


    ```

