    {

        if ([self.movieFileOutput isRecording]) {'
  raw: 'With still images, you were able to use exposure as a way to modify the brightness
    or darkness of the captured image, without the need to involve the flash. As part
    of the framing process, you allowed users to specify whether they wanted the exposure
    to change automatically with changes in their focal point selection, or whether
    it should stay fixed based on a prior selection. In this way, when users readjust
    the focal point, they could see the image lighten/darken or maintain current brightness
    settings. Unfortunately, there is a trade-off to everything, and when you add
    or remove light to a picture, you are often adding or removing detail. This can
    result in a great amount of noise from the sensor, but you can often refocus the
    shot or change the exposure settings to compensate. When you are shooting video,
    however, you do not want to refocus or greatly change exposure settings while
    shooting, as either change will create unnatural effects that most people find
    distracting.


    To compensate for changes in image quality during lighting adjustments in video,
    you will enable a control for low-light boost in your capture interface, in place
    of exposure modes. Low-light settings instruct the `AVCaptureDevice` class to
    automatically brighten or dim a scene based on its ambient light—unlike exposure
    modes, which change settings based on the current focal point. If the user chooses
    to disable low-light boosting, the camera will not adjust the lighting for the
    scene during recording.


    You control low-light settings (boost on or off) for an `AVCaptureDevice` with
    the `automaticallyEnablesLowLightBoostWhenAvailable` method. As the name implies,
    the input is a `BOOL`, meaning users can only enable or disable the setting.


    As with all capture settings, when committing changes, you need to lock the device
    and make sure the settings are supported by the hardware. To query whether low-light
    boost mode is supported on a device, use the `lowLightSupported` property. [Listing
    10-12](#9781430250838_Ch10.xhtml#list12) shows the handler for the Low-Light Mode
    button.


    [***Listing 10-12***](#9781430250838_Ch10.xhtml#_list12). Handler for Low-Light
    Mode Button


    ```

    -(IBAction)lowLightMode:(id)sender {

        if ([self.currentDevice isLowLightBoostSupported]) {

            //

            UIActionSheet *lowLightSheet = [[UIActionSheet alloc]

                initWithTitle:@"Low Light Boost Mode" delegate:self

                cancelButtonTitle:@"Cancel" destructiveButtonTitle:nil

                otherButtonTitles:@"On" , @"Off", nil];

            lowLightSheet.tag = 103;

            [lowLightSheet showInView:self.view];

        } else {

            //

            UIAlertView *alert = [[UIAlertView alloc]

                initWithTitle:@"Error"

                message:@"Low Light Boost not supported" delegate:nil

                cancelButtonTitle:@"OK" otherButtonTitles:nil];

            [alert show];

