    Enabling Playback Controls (Remote Controls)


    To build a robust user experience for the Now Playing center, you need to add
    remote-control support to your application. As mentioned at the beginning of the
    section, this is the mechanism that drives both Made for iPhone headsets and the
    Now Playing center controls.


    To enable remote-control support for your application, you need to register it
    as being capable of receiving remote-control events and then implement the delegate
    method for those events.


    *Events* in iOS are messages fired when hardware interaction events occur, such
    as a user touching the screen, rotating the device, or using a headset. They are
    represented by the `UIEvent` class, which is part of the `UIKit` framework, meaning
    you do not need to include any additional frameworks or classes in your code to
    use them.


    You have not had to worry about `UIEvent`s thus far in your code because Apple
    includes support for basic touch events in `UIKit`. However, to take advantage
    of more-advanced events, such as the remote-control events, you need to register
    your application as being capable of handling those events. The API call for adding
    remote-control support to your application is `[[UIApplication sharedApplication]
    beginReceivingRemoteControlEvents]`.


    **Note**  The `[UIApplication sharedApplication]` object specifies the singleton
    for your application.


    An application may have many views that respond to the same event, so as an additional
    step, you need to specify that your playback interface should be the primary receiver
    for remote-control events by declaring it as the “first responder” for events.
    You specify that a view is a first responder by first indicating that your class
    *can become* a first responder and then specifying that your view *is* one (by
    default, first responder support is turned off for new views).


    To specify that a view can become a first responder, implement the `[UIResponder
    canBecomeFirstResponder]` method in your view. [Listing 7-6](#9781430250838_Ch07.xhtml#list6)
    shows how to do this for the `MainViewController` class.


    [***Listing 7-6***](#9781430250838_Ch07.xhtml#_list6). Adding First Responder
    Support to the MainViewController Class'
