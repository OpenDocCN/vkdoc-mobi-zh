    \n代码清单 8-11 展示了视频播放器的完整初始化方法，包括刚刚描述的预加载步骤。\n\n***代码清单 8-11***. 视频播放器的完整初始化方法\n"
- fmt: "```\n-(void)didFinishWithFile:(NSString *)filePath\n{\n    NSURL *fileURL\
    \ = [NSURL URLWithString:filePath];\n    self.moviePlayer = [[MPMoviePlayerController\
    \ alloc]\n       initWithContentURL:fileURL];\n    self.moviePlayer.movieSourceType\
    \ = MPMovieSourceTypeFile;\n    self.moviePlayer.allowsAirPlay = YES;\n    self.moviePlayer.scalingMode\
    \ = MPMovieScalingModeAspectFit;\n    self.moviePlayer.controlStyle = MPMovieControlStyleEmbedded;\n\
    \nself.moviePlayer.view.frame = self.playerView.bounds;\n    [self.playerView\
    \ addSubview:self.moviePlayer.view];\n\n[self.moviePlayer prepareToPlay];\n\n\
    //Dismisses the file picker\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\nTo test that your video player application is working, use the Choose\
    \ Video button to select a video, and then make sure it plays in the embedded\
    \ video player. Because you are using embedded controls, you will be able to control\
    \ playback via the built-in scrubber.\n\n## Recording Video Files\n\nThe easiest\
    \ way to record video in Cocoa Touch is to use the `UIImagePickerController` class.\
    \ You may remember this class from [Chapter 2](#9781430250838_Ch02.xhtml), where\
    \ you used it to take pictures via iOS’s built-in camera interface. If you have\
    \ ever used the native Camera app to capture video, you already familiar with\
    \ this interface, shown in [Figure 8-5](#9781430250838_Ch08.xhtml#Fig5).\n\n![9781430250838_Fig08-05.jpg](images/9781430250838_Fig08-05.jpg)\n\
    \n[Figure 8-5](#9781430250838_Ch08.xhtml#_Fig5). `UIImagePickerController` video-capture\
    \ interface\n\nHowever, unlike the Camera app, the `UIImagePickerController` class\
    \ presents your user with a confirmation screen after they have completed recording,\
    \ as shown in [Figure 8-6](#9781430250838_Ch08.xhtml#Fig6). This allows your users\
    \ to review and even edit their captured video by trimming them before moving\
    \ on.\n\n![9781430250838_Fig08-06.jpg](images/9781430250838_Fig08-06.jpg)\n\n\
    [Figure 8-6](#9781430250838_Ch08.xhtml#_Fig6). `UIImagePickerController` video\
    \ preview interface\n\nBy modifying your configuration options and `UIImagePickerDelegate`\
    \ handler methods, you can repurpose your photo-capture code to add video-capture\
    \ functionality.\n\nIn this section, you will modify the MyVideoPlayer app by\
    \ adding a button for capturing video. Captured video is saved in the app’s documents\
    \ directory and picked up by the file picker, so that users can watch them just\
    \ like any other video. The new project is included in the `Chapter 8` folder\
    \ of the source code bundle as MyVideoRecorder.\n\nIf you are still uncomfortable\
    \ with using the `UIImagePickerController` class, you should review the projects\
    \ in [Chapter 2](#9781430250838_Ch02.xhtml) before moving on with this topic.\
    \ The CameraApp project includes an in-depth explanation of the `UIImagePickerController`\
    \ class and delegates. The goal of the MyVideoRecorder project is to highlight\
    \ how you need to make only a few modifications to allow a photo app to handle\
    \ video.\n\n## Getting Started\n\nYou will use the MyVideoPlayer project as a\
    \ base for the MyVideoRecorder project. Start by making a copy of the project\
    \ and renaming the root folder MyVideoRecorder. To make this change reflect across\
    \ the rest of the project, double-click the project file (`MyVideoPlayer.xcodeproj`)\
    \ to open it in Xcode. Then, carefully click the project’s name in the Project\
    \ Navigator and rename it as shown in the upper-left corner of [Figure 8-7](#9781430250838_Ch08.xhtml#Fig7).\n\
    \n![9781430250838_Fig08-07.jpg](images/9781430250838_Fig08-07.jpg)\n\n[Figure\
    \ 8-7](#9781430250838_Ch08.xhtml#_Fig7). Renaming a project\n\nIf you are having\
    \ trouble selecting the file’s name, keep trying. You need to be careful to make\
    \ sure your click is registered on top of the text for the name, not just in the\
    \ cell.\n\nNext, add a button to the user interface to allow the user to bring\
    \ up the video-capture interface. This process requires you to declare that the\
    \ `MainViewController` class implements the `UIImagePickerDelegate` protocol and\
