    | --- | --- |

    | `ALAssetsGroupLibrary` | Library—all assets on the device, originating from
    iTunes |

    | `ALAssetsGroupAlbum` | All albums on the device, except for Photo Stream or
    Shared Streams |

    | `ALAssetsGroupEvent` | All Event albums |

    | `ALAssetsGroupFace` | All Face albums |

    | `ALAssetsGroupSavedPhotos` | Camera Roll album |

    | `ALAssetsGroupPhotoStream` | Photo Stream album (iCloud) |

    | `ALAssetsGroupAll` | All albums except for those coming from iTunes |


    Now that you have a set of asset groups ready, you can implement the logic to
    iterate through each individual asset. The `ALAsset` class represents assets.
    Much like `ALAssetGroup`s, they are more intelligent than the base classes you
    might expect to represent such binary data. `ALAsset`s maintain unique internal
    URLs corresponding to every version of an asset that exists, such as the original
    version and multiple edited versions. They also provide access to derived properties,
    such as thumbnails, for an asset, and even support saving new versions of assets.


    To access the `ALAsset`s represented by an `ALAssetGroup`, you use an API similar
    to the group discovery API: `[ALAssetGroup enumerateAssetsUsingBlock:]`. As with
    the group discovery API, the block you define will be called every time the API
    finds an asset and is ready to access. To keep things simple, this example appends
    every valid (non-`nil`), photo result to an `NSMutableArray` of assets. You’ll
    use this data structure to populate the collection view later.


