  raw: 'Many of the core concepts required to create a blurred background take advantage
    of creating a graphics context to manipulate an image, and then using `CGAffineTransform`
    to modify the source image. Apple prefers to use *Gaussian blur* effects, which
    reduce details in images through a mathematical effect that creates smoothing.
    Fortunately, Apple created a category class for `UIImage` at the Apple Worldwide
    Developers Conference (WWDC) 2013 called `UIImage+ImageEffects.h` that manages
    the graphics context for the calculation, performs the blur function, and returns
    the results. I have included the `ImageEffects` category in the sample code for
    this chapter. You can also find it on the iOS Dev Center by searching for the
    WWDC session “Implementing Engaging UI on iOS.”


    *Categories* in iOS allow you to extend a class without subclassing it. Categories
    allow you to write very small files that can add several methods to existing classes,
    for the purpose of adding functionality.


    To use the `ImageEffects` category, you include `UIImage+ImageEffects.h` in your
    class. From there, you can use the additional methods it provides as you would
    with any other `UIImage` method. [Figure 3-12](#9781430250838_Ch03.xhtml#Fig12)
    compares the results provided by each blur effect.


    ![9781430250838_Fig03-12.jpg](images/9781430250838_Fig03-12.jpg)


    [Figure 3-12](#9781430250838_Ch03.xhtml#_Fig12). Extra Light Effect blur, Light
    Effect blur, and Dark Effect blur on the same image


    The blur effect you should use depends on your user interface and the color of
    your image. For a light image, it is better to use `[UIImage applyLightEffect:]`,
    whereas `[UIImage applyDarkEffect:]` is more appropriate for dark images. As you
    can see here, selecting an effect is a one-liner:


    ```

    UIImage *blurredImage = [self.originalImage applyLightEffect];

    ```


    The sample project that adds blurring to an image is named ImageBlur. As you can
    see in [Figure 3-13](#9781430250838_Ch03.xhtml#Fig13), the project has three buttons,
    which toggle between blur types. I highly recommend testing the project with some
    of your own images to see how blurring affects them.


    ![9781430250838_Fig03-13.jpg](images/9781430250838_Fig03-13.jpg)


    [Figure 3-13](#9781430250838_Ch03.xhtml#_Fig13). ImageBlur project


    Summary


    In this chapter, you saw how to use the canvas-like abilities of graphics contexts
    to manipulate images. From there, you saw how to export images to files and the
    photo album, to be able to reuse them later or share them with other apps. To
    make your apps faster, you saw how to load images from the Internet without blocking
    the user interface. Finally, you began to see how to use many of Apple’s visual
    effects methods to add an extra sense of depth to your images.


    Chapter    4


    Advanced Photo Interfaces


    In this chapter, you will explore lower-level camera programming topics by building
    your own image-capture and photo-picker classes, similar to the defaults provided
    by `UIImagePickerController`. Along the way, you will see how to configure the
    hardware camera for image capture, how to access photos directly from the Photos
    app, and what you need to do to present this raw data in a user interface.


    You will use the `UIImagePickerController` as your reference for functionality,
    so if you are unsure how to present the class or handle its output, it would be
    a good idea to review [Chapter 2](#9781430250838_Ch02.xhtml).


    Although it may seem like a lot of work to replicate functionality iOS already
    offers, having a camera interface that looks radically different from the rest
    of your app, or that does not allow users to make modifications to improve the
    quality of their pictures, will greatly impact your functionality and drive users
    away.


    Building a Custom Camera Interface


    The first exercise is to replicate the basic image-capture interface provided
    by `UIImagePickerController`. As shown in [Figure 4-1](#9781430250838_Ch04.xhtml#Fig1),
    the project uses a nonstandard interface and exposes an expanded set of hardware
    controls.


    ![9781430250838_Fig04-01.jpg](images/9781430250838_Fig04-01.jpg)


    [Figure 4-1](#9781430250838_Ch04.xhtml#_Fig1). Mock-up of the camera controller
    with custom user interface


    To make this happen, the application must be able to do the following:


    *   Discover and configure the camera hardware

    *   Display a live feed of the data from the camera

    *   Modify the capture settings from the UI

    *   Capture a picture when the user clicks the Take Picture button


    Ideally, you should use a class that lets you configure a camera “object” and
    access the data stream that it generates. At the same time, you don’t want to
    have to write the hardware drivers yourself, so it’s better to use something that
    abstracts this layer. Luckily, that functionality exists in the `AVFoundation`
    framework, which is included as part of Cocoa Touch.


    As its name implies, `AVFoundation` is one of Apple’s media frameworks for capturing,
    manipulating, and storing audio and video assets. The video-capture APIs in `AVFoundation`
    let you access the raw video stream coming from the camera, and provide high-level
    configuration capabilities for hardware controls, such as the flash or autofocus.


    You can build an image-capture interface from a video stream by remembering that
    a video stream is nothing but a series of images called *frames*. To capture an
    image, you just need to extract a frame from the video. To make sure the result
    is accurate, you want to extract a frame when the image is in focus.


    In this section, you will see how to use `AVFoundation` to set up the camera,
    display a live feed, and capture frames or change settings based on user interface
    events. To speed up the workflow, this section uses storyboards and Interface
    Builder to build the user interface.


    As with previous exercises in this book, you can find the source code for this
    project in the Source Code/Download area of the Apress web site (`www.apress.com`),
    under the [Chapter 4](#9781430250838_Ch04.xhtml) folder. The project for this
    application is called MyCamera.


    Initializing the Hardware Interface


    In situations where your application attempts to access a shared resource (such
    as hardware) or perform an operation with a high potential for failure, Apple
    suggests using a *session* design pattern. This pattern pipes all your operations
    through the session object, which provides error reduction and traffic control
    features, such as semaphores. Sessions also reduce errors by streamlining the
    process for setting up and tearing down complicated interfaces. You will see this
    design pattern in use when accessing audio hardware or performing network operations.


    To begin using `AVFoundation` classes in your project, you need to add the framework
    to your project, and also include it in any classes that use it. The easiest way
    to add a framework to your project is by adding it to the Linked Frameworks and
    Libraries array for your application. You can modify this array by clicking your
    project name in the Xcode Project Navigator, and scrolling to the bottom of the
    General tab, as shown in [Figure 4-2](#9781430250838_Ch04.xhtml#Fig2).


    ![9781430250838_Fig04-02.jpg](images/9781430250838_Fig04-02.jpg)


    [Figure 4-2](#9781430250838_Ch04.xhtml#_Fig2). Finding the Linked Frameworks and
    Libraries array


    You can choose which framework to add by clicking the Plus button at the bottom
    of the Linked Frameworks and Libraries pane. Doing this displays a navigator showing
    the frameworks that are installed on your development computer. You can filter
    the list further by typing the name of your desired framework. Select a framework
    and click the Add button to add it to your project (see [Figure 4-3](#9781430250838_Ch04.xhtml#Fig3)).


