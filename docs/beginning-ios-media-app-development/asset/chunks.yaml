- fmt: "# In the Simple Audio Player Application\n\nIn the simple audio player application,\
    \ you implemented Fast Forward and Rewind buttons by skipping 15 seconds forward\
    \ or backward in the track. This functionality is also available in the `MPMusicPlayerController`\
    \ class, and you can implement it in the same manner—by changing the `currentPlaybackTime`\
    \ property of your `MPMusicPlayerController` object. [Listing 6-11](#9781430250838_Ch06.xhtml#list11)\
    \ shows an example of seeking forward. For a more complete implementation, refer\
    \ to [Chapter 5](#9781430250838_Ch05.xhtml); you can reuse the same logic.\n\n\
    [***Listing 6-11***](#9781430250838_Ch06.xhtml#_list11). Seeking Forward 15 Seconds\
    \ in a Track\n\n```\n-(IBAction)seekForward:(id)sender\n{\n    if ([self.musicPlayer\
    \ playbackState] ==\n        MPMusicPlaybackStatePlaying) {\n\nNSTimeInterval\
    \ desiredTime =\n           self.musicPlayer.currentPlaybackTime + 15.0f;\n  \
    \      if (desiredTime <\n            self.musicPlayer.nowPlayingItem.playbackDuration)\
    \ {\n            self.musicPlayer.currentPlaybackTime = desiredTime;\n       \
    \ }\n    }\n}\n```\n\nTo start taking advantage of the `MediaPlayer` framework,\
    \ you implement Fast Forward in a slightly different manner. The `MediaPlayer`\
    \ framework lets you speed up playback of an item during a seek operation, producing\
    \ a sound effect similar to one you would hear when fast-forwarding a cassette\
    \ tape (that’s my obligatory 1980s reference). However, this new implementation\
    \ is completely user-interface driven, meaning that seeking begins when the user\
    \ presses the button, and stops when the user releases the button. You no longer\
    \ need to modify the `currentPlaybackTime` property using this technique.\n\n\
    To begin fast-forwarding, call the `[MPMediaPlayerController beginSeekingForward]`\
    \ method on your media player object. Similarly, you would call the `[MPMediaPlayerController\
    \ beginSeekingBackward]` method to begin rewinding. When you have finished seeking,\
    \ for both events, you need to call the `[MPMediaPlayerController endSeeking]`\
    \ method. [Listing 6-12](#9781430250838_Ch06.xhtml#list12) shows these calls,\
    \ wrapped in event handlers, as they appear in the MyPod project.\n\n[***Listing\
    \ 6-12***](#9781430250838_Ch06.xhtml#_list12). Event Handlers for Fast-Forwarding\
    \ and Rewinding\n\n```\n-(IBAction)startFastForward:(id)sender\n{\n    [self.musicPlayer\
    \ beginSeekingForward];\n}\n\n-(IBAction)startRewind:(id)sender\n{\n    [self.musicPlayer\
    \ beginSeekingBackward];\n}\n\n-(IBAction)stopSeeking:(id)sender\n{\n    [self.musicPlayer\
    \ endSeeking];\n}\n```\n\nTo tie these event handlers to your storyboard, you\
    \ need to change the events that you are using in Interface Builder. To handle\
    \ the event that gets triggered when a user presses down a button, tie the `[MainViewController\
    \ startFastForward:]` method to the Touch Down event for your Fast Forward button\
    \ in Interface Builder. To handle the event that gets triggered when you release\
    \ the button, tie the `[MainViewController stopSeeking:]` method to the Touch\
    \ Up Inside event in Interface Builder. [Figure 6-3](#9781430250838_Ch06.xhtml#Fig3)\
    \ is a screenshot of how the completed connections for the Fast Forward button\
    \ should look in Interface Builder. You would follow the same process to connect\
    \ the events for the Rewind button.\n\n![9781430250838_Fig06-03.jpg](images/9781430250838_Fig06-03.jpg)\n\
    \n[Figure 6-3](#9781430250838_Ch06.xhtml#_Fig3). Interface Builder connections\
    \ for Fast Forward button\n\nTo complete the playback interface for the MyPod\
    \ project, you need to implement the Previous and Next buttons that support navigating\
    \ through the currently loaded media queue (the playlist). You navigate through\
    \ a media queue by using the `[MPMediaPlayerController skipToNextItem]` and `[MPMediaPlayerController\
    \ skipToPreviousItem]` methods on your media player object. If the queue has only\
    \ one item, or if you are at the beginning or end, these methods will stop playback\
    \ of the currently playing item. [Listing 6-13](#9781430250838_Ch06.xhtml#list13)\
    \ shows the event handlers that wrap these methods.\n\n[***Listing 6-13***](#9781430250838_Ch06.xhtml#_list13).\
    \ Event Handlers for Playlist Navigation\n\n```\n-(IBAction)nextTrack:(id)sender\n\
    {\n    [self.musicPlayer skipToNextItem];\n}\n\n-(IBAction)prevTrack:(id)sender\n\
    {\n    [self.musicPlayer skipToPreviousItem];\n}\n```\n\n# Displaying Song Information\
    \ (Metadata)\n\nFor the final piece of the MyPod project, you need to let the\
    \ user know which song is currently playing by displaying its information (or\
    \ metadata). Referring back to the mock-up at the beginning of the section, you\
    \ want to display the song title, artist name, album title, and album art (if\
    \ available). As with so many other aspects of iOS app development, there’s an\
    \ API for that! By taking advantage of the `[MPMediaItem valueForProperty:]` instance\
    \ method, you can query metadata information for a media item.\n\nThe `[MPMediaItem\
    \ valueForProperty:]` instance method returns an object containing the metadata\
    \ information for the property `key` you are trying to look up. As it is an extremely\
    \ generic method, you will need to know the object type returned for each property\
    \ to take full advantage of it. [Table 6-3](#9781430250838_Ch06.xhtml#Tab3) lists\
    \ some of the most popular properties, including the information they represent\
    \ and their return types. The property keys are constant values defined in the\
    \ `MPMediaItem` class.\n\n[Table 6-3](#9781430250838_Ch06.xhtml#_Tab3). Popular\
    \ `MPMediaItem` Property Keys\n\n| Key | Return Type | Represents |\n| --- | ---\
    \ | --- |\n| `MPMediaItemPropertyArtist` | `NSString` | Performing artist for\
    \ selected item |\n| `MPMediaItemPropertyArtwork` | `MPMediaItemArtwork` | Album\
    \ art for selected item |\n| `MPMediaItemPropertyAlbumTitle` | `NSString` | Album\
    \ title for selected item |\n| `MPMediaItemPropertyGenre` | `NSString` | Genre\
    \ for selected item |\n| `MPMediaItemPropertyReleaseDate` | `NSString` | Release\
    \ date for selected item |\n| `MPMediaItemPropertyTyle` | `NSString` | Title for\
    \ selected item |\n\nFor properties returned as `NSString` objects, such as `MPMediaItemPropertyTitle`,\
    \ you can just save the output to a string, or use it to initialize a label. For\
    \ example, to initialize the `titleLabel` of the main view controller, set the\
    \ `text` property of the label to the returned value:\n\n```\nself.titleLabel.text\
    \ = [currentMediaItem valueForProperty:MPMediaItemPropertyTitle];\n```\n\nReferring\
    \ back to [Table 6-3](#9781430250838_Ch06.xhtml#Tab3), note that the `MPMediaItemPropertyArtwork`\
    \ key, which represents the album art, returns an `MPMediaItemArtwork` object.\
    \ To use this output with a `UIImageView`, you need to use the `[MPMediaItemArtwork\
    \ imageWithSize:]` instance method to generate a `UIImage` object, as shown in\
    \ [Listing 6-14](#9781430250838_Ch06.xhtml#list14).\n\n[***Listing 6-14***](#9781430250838_Ch06.xhtml#_list14).\
    \ Generating a `UIImage` from a `MPMediaItemArtwork` Object\n\n```\nMPMediaItem\
    \ *currentItem = self.musicPlayer.nowPlayingItem;\nMPMediaItemArtwork *albumArt\
    \ = [currentItem\n    valueForProperty:MPMediaItemPropertyArtwork];\nCGSize imageFrameSize\
    \ = self.albumImageView.frame.size;\nself.albumImageView.image = [albumArt imageWithSize:imageFrameSize];\n\
    ```\n\nThe `[MPMediaItemArtwork imageWithSize:]` method uses a `CGSize` parameter\
    \ to determine the width and height of the generated image. As shown in the example,\
    \ you can pass in the `size` property from the `UImageView`’s `frame`.\n\nThe\
    \ last question you may have is, \"Where should I make the call to get all this\
    \ metadata?\" Because you will need to update the displayed metadata each time\
    \ the playlist advances, you should retrieve metadata and set your labels whenever\
    \ the `MPMusicPlayerControllerNowPlayingItemDidChangeNotification` notification\
    \ occurs. [Listing 6-15](#9781430250838_Ch06.xhtml#list15) shows an example that\
    \ catches the notification via a block method.\n\n[***Listing 6-15***](#9781430250838_Ch06.xhtml#_list15).\
    \ Catching the Notification for \"Now Playing\" Changes"
