    Cropping an Image


    Cropping an image employs a very similar process to resizing an image, except
    that rather than shrinking the entire image down to the target frame’s size, you
    need to resize it and reposition it to fit within the cropping frame. A common
    reason for cropping an image is to make a consistent image thumbnail (for example,
    a square), regardless of the source image’s dimensions.


    Similar to resizing, your first step is to find a scaling factor for your image.
    Since you want to preserve the natural aspect ratio of your images (that is, make
    sure they are not distorted), you should use the smaller dimension as the baseline.
    From there, you can center the image in the bounding frame and crop away the excess.
    You can find an updated graphic illustrating the crop process in [Figure 3-2](#9781430250838_Ch03.xhtml#Fig2).


    ![9781430250838_Fig03-02.jpg](images/9781430250838_Fig03-02.jpg)


    [Figure 3-2](#9781430250838_Ch03.xhtml#_Fig2). Process of cropping an image


    [Listing 3-2](#9781430250838_Ch03.xhtml#list2) provides an implementation of the
    cropping process.


    [***Listing 3-2***](#9781430250838_Ch03.xhtml#_list2). Cropping an Image


    ```

    -(IBAction)crop:(id)sender

    {

        UIImage *resizedImage = nil;

        CGSize originalImageSize = self.originalImage.size;

        CGSize targetImageSize = CGSizeMake(150.0f, 150.0f);

        float scaleFactor, tempImageHeight, tempImageWidth;

        CGRect croppingRect;


    BOOL favorsX = NO;


    if (originalImageSize.width > originalImageSize.height) {

            scaleFactor = targetImageSize.height / originalImageSize.height;

            favorsX = YES;

        } else {

            scaleFactor = targetImageSize.width / originalImageSize.width;

            favorsX = NO;

        }


    tempImageHeight = originalImageSize.height * scaleFactor;

        tempImageWidth = originalImageSize.width * scaleFactor;


    if (favorsX) {

            float delta = (tempImageWidth - targetImageSize.width) / 2;

            croppingRect = CGRectMake(-1.0f * delta, 0, tempImageWidth, tempImageHeight);

        } else {

            float delta = (tempImageHeight - targetImageSize.height) / 2;

            croppingRect = CGRectMake(0, -1.0f * delta, tempImageWidth, tempImageHeight);

        }


    UIGraphicsBeginImageContext(targetImageSize);


    [self.originalImage drawInRect:croppingRect];


    resizedImage = UIGraphicsGetImageFromCurrentImageContext();


    UIGraphicsEndImageContext();


    [self.imageView setImage:resizedImage];


    self.statusLabel.text = @"Effect: Crop";


    }

    ```


    You will notice that the key logic in this method centers around finding the smaller
    dimension, repositioning the image, and saving the changes by removing everything
    outside the bounding frame. You shift the image to fit in the center of frame,
    depending on whether it needs more cropping in the x or y dimension (as indicated
    by the `favorsX` variable). This example multiplies one of the `origin` values
    by `-1.0` to indicate that the image needs to be shifted in the negative direction
    (left for `x`, up for `y`). Just as when resizing images, you must export a snapshot
    of your graphics context when you are finished, to preserve your changes.


    If you do not want to scale down the image and just want to crop out a portion
    of it at a specified (x,y) position, you can ignore the scale step. In this case,
    the most important operation is positioning the bounding frame by calling `[UIView`
    `dra``wRect:]` with the correct target coordinates. An example of a crop operation
    that ignores scaling is provided in [Listing 3-3](#9781430250838_Ch03.xhtml#list3).


    [***Listing 3-3***](#9781430250838_Ch03.xhtml#_list3). Cropping Without Scaling
    at a Specified (x,y) Position


    ```

    -(IBAction)crop:(id)sender

    {

        UIImage *resizedImage = nil;

        CGSize originalImageSize = self.originalImage.size;

        CGSize targetImageSize = CGSizeMake(150.0f, 150.0f);


    float originX = 10.0f;

        float originY = 20.0f;

        float scaleFactor, tempImageHeight, tempImageWidth;

        CGRect croppingRect = CGRectMake(originX, originY, originalImageSize.width,

            originalImageSize.height);

        UIGraphicsBeginImageContext(targetImageSize);


    [self.originalImage drawInRect:croppingRect];


    resizedImage = UIGraphicsGetImageFromCurrentImageContext();


    UIGraphicsEndImageContext();


    [self.imageView setImage:resizedImage];


    self.statusLabel.text = @"Effect: Crop";


    }

    ```


