    without performing an action, which is exactly what the example should do.


    ## Understanding User Interface Limitations of the Image Picker


    As you have seen, `UIImagePicker` is a convenient way to access Apple’s system-wide
    camera controller and saved images thumbnail browser. Unfortunately, because it
    encapsulates system-wide resources, it also places restrictions on how you can
    present the view controller. Table 2-5 shows the default states of the image picker
    on both iPhone and iPad devices.


    **Table 2-5**. UIImagePickerController User Interface States


    | | iPhone | iPad |

    | --- | --- | --- |

    | Camera | Always a full-screen modal | Always a full-screen modal |

    | Photo albums | Always a full-screen modal, in portrait orientation | Can be
    presented as a full-screen modal or within a popover controller |


    The previous examples were primarily designed for the iPhone. Next, you’ll learn
    about the modifications you need to make to account for the iPad.


    ## Presenting the Photo Album on an iPad


    To improve the user experience of this app, you could present the photo gallery
    interface on an iPad by using a popover view controller. Most apps choose to launch
    popovers from a `UIToolbarBarButtonItem`, as shown in Figure 2-4.


    ![9781430250838_Fig02-04.jpg](images/9781430250838_Fig02-04.jpg)


    **Figure 2-4**. Example of a popover launched from a UIToolBarButtonItem


    A popover has several unique properties that require it to be initialized differently
    from a normal view controller.


    The first requirement for a popover is that it must not be destroyed when you
    present it, so you need to store it as an instance variable of the class:


    ```objc

    @property (nonatomic, strong) UIPopoverController *popover;

    ```


    Next, `UIPopoverController` conforms to the `UIAppearanceContainer` protocol,
    meaning it is intended to be a container for another view controller and must
    be initialized with a content view controller. Listing 2-13 modifies the button
    handler to present the image picker as the `contentViewController` for a popover
    view controller.


    **Listing 2-13**. Button Handler for Showing the Image Picker in a Popover


    ```objc

    -(IBAction)showPicker:(id)sender

    {

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.delegate = self;

        imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;


        if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])
    {

            imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;

        }


        self.popover = [[UIPopoverController alloc] initWithContentViewController:imagePicker];

    }

    ```


    You may see popover controllers with buttons at the top or bottom. To do this,
    embed your target view controller in a navigation controller and add buttons to
    its toolbars. We won’t show that in this example, though.


    Finally, a popover requires an *origin*—some place for it to “pop out” of. This
    example doesn’t use a navigation controller; instead it presents the popover from
    the frame of the Take Picture button:


    ```objc

    [self.popover presentPopoverFromRect:self.actionButton.frame inView:self.view

                  permittedArrowDirections:UIPopoverArrowDirectionDown animated:YES];

    ```


    As further proof of how much Apple wants you to use a `UIBarButtonItem` to present
    the popover, they provide a `presentPopoverFromBarButtonItem:` API.


    **Note** The preceding code specifies a `permittedArrowDirection` of `UIPopoverArrowDirectionDown`
    forces the popover to pop out of the Take Picture button in a downward direction,
    meaning the popover content will appear beneath the button. The default value
    is `UIPopoverArrowDirectionAny`, which is a better choice for handling multiple
    device orientations.


    To programmatically dismiss the popover, call the `dismissPopoverAnimated:` method
    on the popover controller, just as you would to dismiss any other view controller.
    The pivotal actions in this case are choosing an image or dismissing the controller,
    so add this code to the `UIImagePickerController` delegate methods, as shown in
    Listing 2-14.


    **Listing 2-14**. Adding Popovers as Part of the Camera Delegate Workflow


    ```objc

    -(void)imagePickerController:(UIImagePickerController *)picker

                                  didFinishPickingMediaWithInfo:(NSDictionary *)info

    {

        UIImage *selectedImage = [info objectForKey:UIImagePickerControllerOriginalImage];

        [self.imageView setImage:selectedImage];


        [picker dismissViewControllerAnimated:YES completion:^{

            NSLog(@"Image selected!");

        }];


        if (self.popover != nil) {

            [self.popover dismissPopoverAnimated:YES];

            self.popover = nil;

        }

    }


    -(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker

    {

        [picker dismissViewControllerAnimated:YES completion:^{

            NSLog(@"Picker cancelled without doing anything");

        }];


        if (self.popover != nil) {

            [self.popover dismissPopoverAnimated:YES];

            self.popover = nil;

        }

    }

