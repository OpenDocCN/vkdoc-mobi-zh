    To start implementing the MyStreamingPlayer project, make a copy of the MyPlayer
    project, renaming it appropriately.


    **Tip**  You can quickly rename a project by double-clicking its name in the Source
    Code Navigator (the left pane of Xcode).


    In Interface Builder, remove all the buttons from the main view controller except
    for the Play button and the Choose File button. Rename the Choose File button
    to *Choose Stream*. In your code, delete the now-extraneous code for the buttons
    you removed. Because you want to use the `AVPlayer` class (which can play streaming
    files) instead of the `AVAudioPlayer` class (which cannot), change the object
    type of the `audioPlayer` property to `AVPlayer`. Because both classes are part
    of the `AVFoundation` framework, you do not need to make any additional changes.
    Your final header file should look like the example in [Listing 6-17](#9781430250838_Ch06.xhtml#list17).


