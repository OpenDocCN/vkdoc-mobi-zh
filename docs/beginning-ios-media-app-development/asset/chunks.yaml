- fmt: "# Swift 与 Objective-C 语法对比\n\n在 Objective-C 中，通过声明类型、变量名和值来创建变量：\n\n```\n\
    NSInteger count = 5;\n```\n\n在 Swift 中，通过指定变量名和可变性（`var`或`let`）来声明变量，并可选择指定数据类型和初始值：\n\
    \n```\nvar count : Int = 5\n```\n\n所有使用`var`在 Swift 中定义的变量都是*可变的*，这意味着你可以更改它们的值而无需重新初始化变量——例如，`NSMutableString`或`NSMutableArray`。\n\
    \n`let`关键字类似于 Objective-C 和 C 中的`const`；这是一个*常量*值，不应更改。\n\nSwift 会推断数据类型，因此如果你愿意，可以在声明中省略类型：\n\
    \n```\nvar count = 5\n```\n\n## 实例化对象\n\n在 Objective-C 中，通过先分配内存再调用构造函数来实例化对象：\n\
    \n```\nNSMutableArray *fileArray = [[NSMutableArray alloc] init];\n```\n\n在 Swift\
    \ 中则更简单。Swift 会自动分配内存，省去了`alloc`步骤。此外，Swift 中类的默认构造函数是类名后跟一对空圆括号：\n\n```\nvar\
    \ fileArray = NSMutableArray()\n```\n\n如果你要初始化的类在其构造函数中接受参数，则可以像调用任何其他方法一样调用构造函数：\n\
    \n```\nvar myView = UIView(frame: myFrame)\n```\n\n如果你从 Objective-C 类实例化对象，则需要将其构造函数作为方法调用：\n\
    \n```\nvar mutableArray = NSMutableArray()\n```\n\n## 访问属性和方法（包括 Objective-C 类）\n\
    \n在 Swift 中，你可以使用点符号访问对象的属性或方法，就像在 C 或 Java 中一样。这包括在 Objective-C 中定义的类。\n\n在 Objective-C\
    \ 中，通过以下代码访问字符串的`lastPathComponent`属性：\n\n```\nNSString *extension = [fileName\
    \ lastPathComponent];\n```\n\nSwift 中的等效写法如下：\n\n```\nvar extension = fileName.lastPathComponent\n\
    ```\n\n要在 Objective-C 中调用`UIView`对象的`reloadSubviews`方法，你会编写如下调用：\n\n```\n[myView\
    \ reloadSubviews];\n```\n\n在 Swift 中，同一行代码看起来像这样：\n\n```\nmyView.reloadSubviews()\n\
    ```\n\n## 类型转换\n\n在 Objective-C 中，要将对象从一种类转换为另一种，需要在前面加上类名和可选的星号来标识指针：\n\n```\n\
    UINavigationController *navigatonController = (UINavigationController *)segue.destinationController;\n\
    ```\n\n在 Swift 中，使用`as`关键字即可轻松完成转换：\n\n```\nlet navigationController = segue.destinationController\
    \ as UINavigatonController\n```\n\n只需在结果后添加`as`关键字和类名，编译器就会为你处理其余部分。你甚至可以在任何需要使用对象的地方内联插入此关键字：\n\
    \n```\nfor (file as String in fileArray) {}\n```\n\n## 使用字符串格式化器\n\n在 Objective-C\
    \ 中，当你想要将对象的值插入字符串时，必须使用字符串格式化器来构建自定义字符串：\n\n```\nNSString *summaryString = [NSString\n\
    \    stringWithFormat:@\"value 1: %d value 2: %d\", value1, value2];\n```\n\n\
    对于每个要插入字符串的值，你需要使用代表其类型的替换字符。\n\n在 Swift 中，这已成为过去。你可以通过将变量名放在圆括号内，并在前面加上反斜杠来将值插入字符串：\n\
    \n```\nlet value1 = 5\nlet value2 = 10\nvar summaryString = \"value 1: \\(value1)\
    \ value2: \\(value2)\"\n```\n\n## 使用数组\n\n在 Objective-C 中，你使用`NSArray`类表示数组。Objective-C\
    \ 中的数组只包含对象，可以通过几种便捷的构造函数方法进行初始化，包括`[NSArray arrayWithObjects:]`：\n\n```\nNSArray\
    \ *stringArray = [NSArray arrayWithObjects:@\"string 1\",\n    @\"string 2\",\
    \ @\"string 3\"]\n```\n\n在 Swift 中，你可以在定义变量时通过在方括号中提供值来声明数组：\n\n```\nvar stringArray\
    \ = [\"string 1\", \"string 2\", \"string 3\"]\n```"
  raw: 'In Objective-C, you created variables by declaring the type, variable, and
    value:


    ```

    NSInteger count = 5;

    ```


    In Swift, you declare variables by specifying their name and mutability (`var`
    or `let`), and optionally, the data type and initialization value:


    ```

    var count : Int = 5

    ```


    All variables defined with `var` in Swift are *mutable*, meaning you can change
    their values without re-initializing the variable—for example, `NSMutableString`
    or `NSMutableArray`.


    The `let` keyword is similar to `const` in Objective-C and C; this is a *constant*
    value that is not meant to change.


    Swift infers data types, so if you prefer, you can omit the type from your declaration:


    ```

    var count = 5

    ```


    Instantiating Objects


    In Objective-C, you would instantiate an object by allocating it in memory and
    then calling its constructor method:


    ```

    NSMutableArray *fileArray = [[NSMutableArray alloc] init];

    ```


    Things are a bit easier in Swift. Swift automatically allocates memory, removing
    the `alloc` step. Additionally, the default constructor for a class in Swift is
    the class name with an empty set of parentheses appended to the end:


    ```

    var fileArray = NSMutableArray()

    ```


    If the class you are initializing takes parameters in its constructor, call the
    constructor as you would any other method:


    ```

    var myView = UIView(frame: myFrame)

    ```


    If you are instantiating an object from an Objective-C class, you need to call
    its constructor as a method:


    ```

    var mutableArray = NSMutableArray()

    ```


    Accessing Properties and Methods (Including Objective-C)


    In Swift, you can access a property or method of an object by using dot-notation,
    as you would in C or Java. This includes classes that were defined in Objective-C.


    In Objective-C, you accessed the `lastPathComponent` property of a string by using
    the following code:


    ```

    NSString *extension = [fileName lastPathComponent];

    ```


    The Swift equivalent is as follows:


    ```

    var extension = fileName.lastPathComponent

    ```


    To call the `reloadSubviews` method on a `UIView` object in Objective-C, you would
    make a call like the following:


    ```

    [myView reloadSubviews];

    ```


    In Swift, the same line of code would look like this:


    ```

    myView.reloadSubviews()

    ```


    Casting


    In Objective-C, to cast an object from one class to another, you would prepend
    the class name and optionally an asterisk, identifying your pointer:


    ```

    UINavigationController *navigatonController = (UINavigationController *)segue.destinationController;

    ```


    In Swift, casting is as easy as using the `as` keyword:


    ```

    let navigationController = segue.destinationController as UINavigatonController

    ```


    Simply add the `as` keyword and the class name to the result, and the compiler
    will do the rest for you. You can even insert this keyword inline, wherever you
    would normally use your object:


    ```

    for (file as String in fileArray) {}

    ```


    Using String Formatters


    In Objective-C, when you wanted to insert a value from an object into a string,
    you had to use a string formatter to build a custom string:


    ```

    NSString *summaryString = [NSString

        stringWithFormat:@"value 1: %d value 2: %d", value1, value2];

    ```


    For each value you wanted to insert into the string, you needed to use a substitution
    character representing its type.


    In Swift, this is a thing of the past. You can insert a value into a string by
    placing the variable’s name in parentheses, prepended by a forward slash:


    ```

    let value1 = 5

    let value2 = 10

    var summaryString = "value 1: \(value1) value2: \(value2)"

    ```


    Using Arrays


    In Objective-C, you used the `NSArray` class to represent arrays. Arrays in Objective-C
    contained objects only, and could be initialized with several convenience constructor
    methods, including `[NSArray arrayWithObjects:]`:


    ```

    NSArray *stringArray = [NSArray arrayWithObjects:@"string 1",

        @"string 2", @"string 3"]

    ```


    In Swift, you can declare an array by providing its values in square brackets
    when you define the variable:


    ```

    var stringArray = ["string 1", "string 2", "string 3"]

    ```'
  trans: "\n# Swift 与 Objective-C 语法对比\n\n在 Objective-C 中，通过声明类型、变量名和值来创建变量：\n\n```\n\
    NSInteger count = 5;\n```\n\n在 Swift 中，通过指定变量名和可变性（`var`或`let`）来声明变量，并可选择指定数据类型和初始值：\n\
    \n```\nvar count : Int = 5\n```\n\n所有使用`var`在 Swift 中定义的变量都是*可变的*，这意味着你可以更改它们的值而无需重新初始化变量——例如，`NSMutableString`或`NSMutableArray`。\n\
    \n`let`关键字类似于 Objective-C 和 C 中的`const`；这是一个*常量*值，不应更改。\n\nSwift 会推断数据类型，因此如果你愿意，可以在声明中省略类型：\n\
    \n```\nvar count = 5\n```\n\n## 实例化对象\n\n在 Objective-C 中，通过先分配内存再调用构造函数来实例化对象：\n\
    \n```\nNSMutableArray *fileArray = [[NSMutableArray alloc] init];\n```\n\n在 Swift\
    \ 中则更简单。Swift 会自动分配内存，省去了`alloc`步骤。此外，Swift 中类的默认构造函数是类名后跟一对空圆括号：\n\n```\nvar\
    \ fileArray = NSMutableArray()\n```\n\n如果你要初始化的类在其构造函数中接受参数，则可以像调用任何其他方法一样调用构造函数：\n\
    \n```\nvar myView = UIView(frame: myFrame)\n```\n\n如果你从 Objective-C 类实例化对象，则需要将其构造函数作为方法调用：\n\
    \n```\nvar mutableArray = NSMutableArray()\n```\n\n## 访问属性和方法（包括 Objective-C 类）\n\
    \n在 Swift 中，你可以使用点符号访问对象的属性或方法，就像在 C 或 Java 中一样。这包括在 Objective-C 中定义的类。\n\n在 Objective-C\
    \ 中，通过以下代码访问字符串的`lastPathComponent`属性：\n\n```\nNSString *extension = [fileName\
    \ lastPathComponent];\n```\n\nSwift 中的等效写法如下：\n\n```\nvar extension = fileName.lastPathComponent\n\
    ```\n\n要在 Objective-C 中调用`UIView`对象的`reloadSubviews`方法，你会编写如下调用：\n\n```\n[myView\
    \ reloadSubviews];\n```\n\n在 Swift 中，同一行代码看起来像这样：\n\n```\nmyView.reloadSubviews()\n\
    ```\n\n## 类型转换\n\n在 Objective-C 中，要将对象从一种类转换为另一种，需要在前面加上类名和可选的星号来标识指针：\n\n```\n\
    UINavigationController *navigatonController = (UINavigationController *)segue.destinationController;\n\
    ```\n\n在 Swift 中，使用`as`关键字即可轻松完成转换：\n\n```\nlet navigationController = segue.destinationController\
    \ as UINavigatonController\n```\n\n只需在结果后添加`as`关键字和类名，编译器就会为你处理其余部分。你甚至可以在任何需要使用对象的地方内联插入此关键字：\n\
    \n```\nfor (file as String in fileArray) {}\n```\n\n## 使用字符串格式化器\n\n在 Objective-C\
    \ 中，当你想要将对象的值插入字符串时，必须使用字符串格式化器来构建自定义字符串：\n\n```\nNSString *summaryString = [NSString\n\
    \    stringWithFormat:@\"value 1: %d value 2: %d\", value1, value2];\n```\n\n\
    对于每个要插入字符串的值，你需要使用代表其类型的替换字符。\n\n在 Swift 中，这已成为过去。你可以通过将变量名放在圆括号内，并在前面加上反斜杠来将值插入字符串：\n\
    \n```\nlet value1 = 5\nlet value2 = 10\nvar summaryString = \"value 1: \\(value1)\
    \ value2: \\(value2)\"\n```\n\n## 使用数组\n\n在 Objective-C 中，你使用`NSArray`类表示数组。Objective-C\
    \ 中的数组只包含对象，可以通过几种便捷的构造函数方法进行初始化，包括`[NSArray arrayWithObjects:]`：\n\n```\nNSArray\
    \ *stringArray = [NSArray arrayWithObjects:@\"string 1\",\n    @\"string 2\",\
    \ @\"string 3\"]\n```\n\n在 Swift 中，你可以在定义变量时通过在方括号中提供值来声明数组：\n\n```\nvar stringArray\
    \ = [\"string 1\", \"string 2\", \"string 3\"]\n```\n"
- fmt: "Swift does not place the same restriction on the contents of an array, so\
    \ you can initialize it with scalar values (such as `Int`s):\n\n```\nvar intArray\
    \ = [1, 3, 5]\n```\n\nIf you do not want to initialize your array with values,\
    \ declare a variable type for the input by placing the type name in square brackets:\n\
    \n```\nvar intArray : [Int]\n```\n\nYou can also use subscript notation to read\
    \ or change values in a Swift array:\n\n```\nvar sampleString = stringArray[3]\n\
    ```\n\nIf you define your array as a mutable variable, you can use the plus (`+`)\
    \ operator to append values to the array:\n\n```\nstringArray += \"string4\"\n\
    ```\n\n## Using Conditional Logic\n\nIn Objective-C, you implemented the most\
    \ basic kind of conditional logic by placing a comparison in braces, as part of\
    \ an `if` statement:\n\n```\nif (currentValue < maximumValue) {\n}\n```\n\nIn\
    \ Swift, this syntax is largely unchanged, except the requirement for parentheses\
    \ is gone:\n\n```\nif currentValue < maximumValue\n```\n\nAn `if-else` statement\
    \ retains this rule as well:\n\n```\nif currentValue < maximumValue {\n    //Do\
    \ something\n} else if currentValue == 3 {\n    //Do something else\n}\n```\n\n\
    **Note:** All the comparison operators you are familiar with from Objective-C\
    \ are still valid in Swift.\n\nWhen you wanted to check against multiple values\
    \ in Objective-C, you used a `switch` statement, with a `case` block for each\
    \ value:\n\n```\nswitch(currentValue) {\n    case 1: NSLog(\"value 1\");\n   \
    \     break;\n    case 2: NSLog(\"value 2\");\n        break;\n    case 3: NSLog(\"\
    value 3\");\n        break;\n}\n```\n\nThe good news is the `switch` statement\
    \ is also available in Swift, with a few changes:\n\n- `switch` statements in\
    \ Swift allow you to compare objects. The Objective-C requirement for comparing\
    \ only values has been eliminated in Swift.\n- `switch` statements in Swift no\
    \ longer fall through by default. This means you do not have to add a `break;`\
    \ statement at the end of each `case`.\n- `switch` statements in Swift need to\
    \ be exhaustive (meaning they must either cover all values or include a `default`\
    \ case). This requirement is a best practice for code security and prevents unexpected\
    \ comparisons.\n\nIn Swift, the earlier `switch` statement would look like this:\n\
    \n```\nswitch currentValue {\n    case 1: println(\"value 1\")\n    case 2: NSLog(\"\
    value 2\")\n    case 3: NSLog(\"value 3\")\n    default: NSLog(\"other value\"\
    )\n}\n```\n\n## Using Loops\n\nThe syntax for all of the major types of loops\
    \ (`for`, `for-each`, `do`, `do-while`) are largely unchanged in Swift. Two major\
    \ changes are that you do not need to declare your type, and parentheses are once\
    \ again optional:\n\n```\nfor name in nameArray {\n    println(\"name = \\(name)\"\
    )\n}\n```\n\nSwift includes a major addition that can improve your loops: *ranges*.\
    \ Ranges in Swift allow you to specify a set of values that you can use to iterate\
    \ a loop or as part of comparison.\n\nThere are two major types of ranges in Swift:\n\
    \n- *Closed ranges*, expressed as `x...y`, create a range that starts at x and\
    \ includes all values including y. (Note: *three* dots!)\n- *Half-open ranges*,\
    \ expressed as `x..<y`, create a range that starts at x and includes all values\
    \ up to y. (Note: *two* dots!)\n\nYou could use a range in a `for-each` loop as\
    \ follows:\n\n```\nfor i in 1..<5 {\n    println(i)\n}\n```\n\nThis would print\
    \ the numbers 1–4.\n\n## Defining Methods\n\nBefore defining a method in Swift,\
    \ let’s investigate a method signature in Objective-C:\n\n```\n-(BOOL)compareValue1:(NSInteger)value1\
    \ toValue2:(NSInteger)value2;\n```\n\nIn this line of code, you can see that the\
    \ return type comes before the method name and that each of the parameters is\
    \ provided after a colon. You add labels to every parameter after the first one,\
    \ to increase readability.\n\nIn Swift, you declare a method by placing the `func`\
    \ keyword in front of the method name and then including the input parameters\
    \ and output parameters in parentheses:\n\n```\nfunc compareValues(value1: Int,\
    \ value2: Int) -> (result: Bool)\n```\n\nSwift uses `->` to separate the input\
    \ parameters and return parameters."
  raw: 'Swift does not place the same restriction on the contents of an array, so
    you can initialize it with scalar values (such as `Int`s):


    ```

    var intArray = [1, 3, 5]

    ```


    If you do not want to initialize your array with values, declare a variable type
    for the input by placing the type name in square brackets:


    ```

    var intArray : [Int]

    ```


    You can also use subscript notation to read or change values in a Swift array:


    ```

    var sampleString = stringArray[3]

    ```


    If you define your array as a mutable variable, you can use the plus (`+`) operator
    to append values to the array:


    ```

    stringArray += "string4"

    ```


    Using Conditional Logic


    In Objective-C, you implemented the most basic kind of conditional logic by placing
    a comparison in braces, as part of an `if` statement:


    ```

    if (currentValue < maximumValue) {

    }

    ```


    In Swift, this syntax is largely unchanged, except the requirement for parentheses
    is gone:


    ```

    if currentValue < maximumValue

    ```


    An `if-else` statement retains this rule as well:


    ```

    if currentValue < maximumValue {

        //Do something

    } else if currentValue == 3 {

        //Do something else

    }

    ```


    **Note**  All the comparison operators you are familiar with from Objective-C
    are still valid in Swift.


    When you wanted to check against multiple values in Objective-C, you used a `switch`
    statement, with a `case` block for each value:


    ```

    switch(currentValue) {

        case 1: NSLog("value 1");

            break;

        case 2: NSLog("value 2");

            break;

        case 3: NSLog("value 3");

            break;

    }

    ```


    The good news is the `switch` statement is also available in Swift, with a few
    changes:


    *   `switch` statements in Swift allow you to compare objects. The Objective-C
    requirement for comparing only values has been eliminated in Swift.

    *   `switch` statements in Swift no longer fall through by default. This means
    you do not have to add a `break;` statement at the end of each `case`.

    *   `switch` statements in Swift need to be exhaustive (meaning they must either
    cover all values or include a `default` case). This requirement is a best practice
    for code security and prevents unexpected comparisons.


    In Swift, the earlier `switch` statement would look like this:


    ```

    switch currentValue {

        case 1: println("value 1")

        case 2: NSLog("value 2")

        case 3: NSLog("value 3")

        default: NSLog("other value")

    }

    ```


    Using Loops


    The syntax for all of the major types of loops (`for`, `for-each`, `do`, `do-while`)
    are largely unchanged in Swift. Two major changes are that you do not need to
    declare your type, and parentheses are once again optional:


    ```

    for name in nameArray {

        println("name = \(name)")

    }

    ```


    Swift includes a major addition that can improve your loops: *ranges*. Ranges
    in Swift allow you to specify a set of values that you can use to iterate a loop
    or as part of comparison.


    There are two major types of ranges in Swift:


    *   *Closed ranges*, expressed as `x...y`, create a range that starts at x and
    includes all values including y. (Note: *three* dots!)

    *   *Half-open ranges*, expressed as x..y , create a range that starts at x and
    includes all values up to y. (Note: *two* dots!)


    You could use a range in a `for-each` loop as follows:


    ```

    for i in 1..5  {

        println(i)

    }

    ```


    This would print the numbers 1–4.


    Defining Methods


    Before defining a method in Swift, let’s investigate a method signature in Objective-C:


    ```

    -(BOOL)compareValue1:(NSInteger)value1 toValue2:(NSInteger)value2;

    ```


    In this line of code, you can see that the return type comes before the method
    name and that each of the parameters is provided after a colon. You add labels
    to every parameter after the first one, to increase readability.


    In Swift, you declare a method by placing the `func` keyword in front of the method
    name and then including the input parameters and output parameters in parentheses:


    ```

    func compareValues(value1: Int, value2: Int) -> (result: Bool)

    ```


    Swift uses `->` to separate the input parameters and return parameters.'
  trans: "\nSwift 对数组内容的类型限制与 Objective-C 不同，因此你可以直接用标量值（如`Int`）来初始化数组：\n\n```\nvar\
    \ intArray = [1, 3, 5]\n```\n\n如果你不希望用值来初始化数组，可以通过在方括号中指定类型名称来声明输入变量的类型：\n\n```\n\
    var intArray : [Int]\n```\n\n你还可以使用下标语法来读取或修改 Swift 数组中的值：\n\n```\nvar sampleString\
    \ = stringArray[3]\n```\n\n如果你将数组定义为可变变量，可以使用加号（`+`）运算符向数组追加值：\n\n```\nstringArray\
    \ += \"string4\"\n```\n\n## 使用条件逻辑\n\n在 Objective-C 中，实现最基本的条件逻辑时，需要将比较表达式放在括号内，作为\
    \ `if` 语句的一部分：\n\n```\nif (currentValue < maximumValue) {\n}\n```\n\n在 Swift 中，除了不再需要括号之外，此语法基本保持不变：\n\
    \n```\nif currentValue < maximumValue {\n}\n```\n\n`if-else` 语句也遵循这一规则：\n\n```\n\
    if currentValue < maximumValue {\n    //执行某些操作\n} else if currentValue == 3 {\n\
    \    //执行其他操作\n}\n```\n\n**注意：** 你在 Objective-C 中熟悉的所有比较运算符在 Swift 中仍然有效。\n\n\
    在 Objective-C 中，当你需要检查多个值时，会使用 `switch` 语句，并为每个值提供一个 `case` 分支：\n\n```\nswitch(currentValue)\
    \ {\n    case 1: NSLog(\"value 1\");\n        break;\n    case 2: NSLog(\"value\
    \ 2\");\n        break;\n    case 3: NSLog(\"value 3\");\n        break;\n}\n\
    ```\n\n好消息是，Swift 中同样支持 `switch` 语句，但有一些变化：\n\n- Swift 中的 `switch` 语句允许比较对象。Objective-C\
    \ 中只能比较值的要求在 Swift 中已被取消。\n- Swift 中的 `switch` 语句默认不再贯穿（fall through）。这意味着你不必在每个\
    \ `case` 末尾添加 `break;` 语句。\n- Swift 中的 `switch` 语句必须是穷尽的（即必须覆盖所有值，或包含一个 `default`\
    \ 分支）。这一要求是代码安全的最佳实践，可以防止意外的比较。\n\n在 Swift 中，之前的 `switch` 语句将如下所示：\n\n```\nswitch\
    \ currentValue {\n    case 1: println(\"value 1\")\n    case 2: NSLog(\"value\
    \ 2\")\n    case 3: NSLog(\"value 3\")\n    default: NSLog(\"other value\")\n\
    }\n```\n\n## 使用循环\n\n所有主要循环类型（`for`、`for-each`、`do`、`do-while`）的语法在 Swift 中基本保持不变。两个主要变化是：你无需声明类型，并且括号再次变为可选：\n\
    \n```\nfor name in nameArray {\n    println(\"name = \\(name)\")\n}\n```\n\nSwift\
    \ 引入了一项能改进循环的重要功能：*区间*（ranges）。Swift 中的区间允许你指定一组值，用于循环迭代或作为比较的一部分。\n\nSwift 中有两种主要的区间类型：\n\
    \n- *闭区间*，表示为 `x...y`，创建一个从 x 开始并包含包括 y 在内的所有值的区间。（注意：是*三个*点！）\n- *半开区间*，表示为 `x..<y`，创建一个从\
    \ x 开始并包含直到 y 为止的所有值的区间。（注意：是*两个*点！）\n\n你可以在 `for-each` 循环中使用区间，如下所示：\n\n```\n\
    for i in 1..<5 {\n    println(i)\n}\n```\n\n这将打印数字 1 到 4。\n\n## 定义方法\n\n在 Swift\
    \ 中定义方法之前，我们先看一下 Objective-C 中的方法签名：\n\n```\n-(BOOL)compareValue1:(NSInteger)value1\
    \ toValue2:(NSInteger)value2;\n```\n\n在这行代码中，你可以看到返回类型位于方法名之前，每个参数都放在冒号之后。你还可以为第一个参数之后的每个参数添加标签，以提高可读性。\n\
    \n在 Swift 中，你需要在方法名之前加上 `func` 关键字，然后将输入参数和输出参数放在括号内来声明方法：\n\n```\nfunc compareValues(value1:\
    \ Int, value2: Int) -> (result: Bool)\n```\n\nSwift 使用 `->` 来分隔输入参数和返回参数。\n"
- fmt: "# 排版后的内容\n\n## 参数类型声明\n\n与 Swift 中的变量一样，通过附加类型名称和冒号来指示每个参数的类型。\n\n如果方法不返回任何内容，可以省略返回参数和`->`：\n\
    \n```\nfunc isValidName(name: String) {\n}\n```\n\n## 调用枚举类型\n\n在 Swift 中，可以通过指定枚举的名称、类型和值来构建枚举类型：\n\
    \n```\nenum PlaybackStates : Int {\n    case .Failed = -1, case .Loading, case\
    \ .Success\n}\n```\n\n与 Objective-C 不同，要表示`enum`中的值，需要在常量名称前放置一个句点。在与`enum`值进行比较时，保留该句点：\n\
