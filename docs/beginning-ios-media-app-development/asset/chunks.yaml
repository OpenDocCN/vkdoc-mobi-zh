    and `IBAction`s in Swift.


    Basic Swift Syntax


    Before jumping in, I want to introduce some basic Swift syntax concepts to help
    you become comfortable with the language. To help make the transitions clear,
    I will preface each Swift code example with the corresponding Objective-C code.
    The code in this section is not meant to be used directly in the final project,
    so feel free to experiment while working the examples.


    Calling Methods (Hello World)


    In Objective-C, to print “Hello World” on the console, you would use the `NSLog()`
    method:


    ```

    NSLog(@"Hello World");

    ```


    In Swift, the equivalent is as follows:


    ```

    println("Hello World")

    ```


    You should notice a couple of big differences:


    *   *No semicolons*: Swift uses the `newline` character to separate lines.

    *   *No @ symbol*: Swift has its own `String` class, which is implemented as a
    simple character array.

    *   *println*: Swift uses this familiar method name from C and Java to allow you
    to print a line directly to the console.


    Calling a method with multiple parameters in Objective-C looks like this:


    ```

    NSInteger finalSum = [self calculateSumOf:5 andValue:5];

    ```


    In Swift, you call methods with multiple parameters by adding them to a comma-delimited
    list within the parentheses (as you would in C or Java):


    ```

    var finalSum = calculateSum(5, 5)

    ```


    If the method defines labels for its parameters, add the labels in front of the
    values:


    ```

    var finalSum = calculateSum(firstValue: 5, secondValue: 5)

    ```


    Defining Variables


