    ## Working with Protocols and Delegates


    When developing an app that uses the image picker, you are often expected to develop
    a workflow that looks like the one described in [Figure 2-3](#9781430250838_Ch02.xhtml#Fig3).


    For extremely simple classes, you can handle all the logic within one class. However,
    `UIImagePickerController` is a completely separate view controller; therefore,
    you need a way to pass messages between it and your class. Following the patterns
    of object-oriented design, you do not want to include information about your class
    in the image picker, because it needs to be a class that can be used by another
    class. Also, you do not want to duplicate features from the `UIImagePickerController`
    in your code.


    The Objective-C language features that `UIImagePickerController` relies on for
    message passing are called *delegation* and *protocols*.


    A *protocol* is a way of defining a limited interface for inter-class communication,
    which can be inferred by importing the header file of the class whose protocol
    you want to implement. A protocol specifies a name (for identification) and a
    list of methods and their parameters. You can also specify a priority level for
    a method with the block keyword `optional`. You define a protocol by placing an
    `@protocol` block containing the naming information and method signatures in your
    header file. [Listing 2-3](#9781430250838_Ch02.xhtml#list3) shows a simple header
    file, which defines a protocol that is similar to the one the `UIImagePickerController`
    class uses.


    [***Listing 2-3***](#9781430250838_Ch02.xhtml#_list3). Header File for Simple
    Camera Protocol


    ```

    #import <UIKit/UIKit.h>


    @protocol CameraViewControllerDelegate <NSObject>


    -(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage *)image;


    @optional

    -(void)cameraViewController:(UIViewController *)controller didCancel:(BOOL)state;


    @end


    @interface CameraViewController : UIViewController


    @property (nonatomic, strong) UIImage *capturedImage;


    @end

    ```


    **Note** All methods that are not under the `@optional` block are considered required
    and must be implemented by the protocol’s receiver.


    You will notice that I did not include any code examples of how these methods
    work. This is the key advantage of a protocol: a protocol defines a means of communication
    between two classes but never implements the target logic. You can think of a
    protocol as similar to an abstract class in Java.


    To tie this to a concrete example, the `UIImagePickerController` class defines
    a protocol that indicates it will send messages after the picker has been closed,
    and after it has taken a picture. It is up to you, in your presenting class, to
    handle what happens when it sends these messages.


    The way to handle this data is through delegation. *Delegation* is the concept
    of passing a unit of work off to another class. In the case of the image picker,
    all the work of creating the camera controller instance, taking pictures, and
    presenting a data stream is delegated to the image picker class. When it is done,
    it will send the result back to us. The object that implements the protocol and
    receives its messages is called the *delegate*.


    To implement a protocol, you need to modify the receiving class’s header file
    to include the protocol definition, and modify the class definition to indicate
    that it implements the protocol. It’s called the *receiving class* because it
    receives messages from the delegated class. [Listing 2-4](#9781430250838_Ch02.xhtml#list4)
    shows an example of a header file for a class that implements a protocol. This
    header file is intended to be similar to your main view controller’s header file.


    [***Listing 2-4***](#9781430250838_Ch02.xhtml#_list4). Header File for Class Receiving
    Protocol Messages


    ```

    #import <UIKit/UIKit.h>

    #import "CameraViewController.h"


    @interface FirstViewController : UIViewController <CameraViewControllerDelegate>

    @property (nonatomic, strong) UIImage *selectedImage;

    @end

    ```'
