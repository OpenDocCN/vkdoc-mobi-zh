    You handle the item selection in a pattern similar to the other item projects
    in this book: send a message from the table view controller via the protocol,
    and handle it in the main view controller. The selection action needs to occur
    first. When a cell has been selected, send a message via the protocol in the `[self
    tableView:didSelectRowAtIndexPath:]` method for the `MediaTableViewController`
    class, as shown in [Listing 6-8](#9781430250838_Ch06.xhtml#list8).


    [***Listing 6-8***](#9781430250838_Ch06.xhtml#_list8). Sending a Protocol Message
    for Selecting a Media Item


    ```

    -(void)tableView:(UITableView *)tableView

        didSelectRowAtIndexPath:(NSIndexPath *)indexPath

    {

        NSString *selectedItem = [self.itemsArray

            objectAtIndex:indexPath.row];

        [self.delegate didFinishWithItem:selectedItem

            andType:self.mediaType];

    }

    ```


    Handle the protocol messages in your main view controller. Based on the returned
    media type, you set a predicate by using the filterName string as the match text.
    In the handler method, use an `if()` statement to compare the media type, so that
    you can use different code blocks to handle albums and songs. You will use this
    predicate to initialize the active queue for the music player via the `[MPMusicPlayerController
    setQueueWithQuery:]` method. [Listing 6-9](#9781430250838_Ch06.xhtml#list9) shows
    example delegate methods that implement this logic for the `MediaTableDelegate`
    protocol.


    [***Listing 6-9***](#9781430250838_Ch06.xhtml#_list9). Setting a Media Queue after
    Receiving a Protocol Message


    ```

    -(void)didFinishWithItem:(NSString *)item andType:(NSString *)type

    {


    if ([type isEqualToString:@"songs"]) {

            MPMediaQuery *query = [MPMediaQuery songsQuery];

            MPMediaPropertyPredicate *predicate =

               [MPMediaPropertyPredicate predicateWithValue:item

               forProperty:MPMediaItemPropertyArtist

               comparisonType:MPMediaPredicateComparisonEqualTo];


    [query addFilterPredicate:predicate];

            [self.musicPlayer setQueueWithQuery:query];


    } else if ([type isEqualToString:@"albums"]) {

            MPMediaQuery *query = [MPMediaQuery albumsQuery];

            MPMediaPropertyPredicate *predicate =

                   [MPMediaPropertyPredicate predicateWithValue:item

                   forProperty:MPMediaItemPropertyAlbumTitle

                   comparisonType:MPMediaPredicateComparisonEqualTo];

            [query addFilterPredicate:predicate];

            [self.musicPlayer setQueueWithQuery:query];


    }


    [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    Building a Playback Interface


    Having created your media query, you can now start building the playback interface.
    The `MPMediaPlayerController` class implements the `MPMediaPlayback` protocol,
    which allows you to reuse many of the playback messages you used to play sound
    files.


    To start playback by using the `MPMediaPlayerController` class, use the `[MPMediaPlayerController
    play]` method, which works exactly like its `AVAudioPlayer` counterpart, by starting
    (or resuming) playback of the item at the front of the media queue. To pause playback,
    use the `[MPMediaPlayerController pause]` method, which pauses the currently playing
    item. Playing the item after pausing resumes play from the position where the
    media was paused. In the MyPod project, playback is controlled by one button,
    just as in the simple audio file player from the last chapter. The handler for
    this button is in [Listing 6-10](#9781430250838_Ch06.xhtml#list10).


    [***Listing 6-10***](#9781430250838_Ch06.xhtml#_list10). Toggling Playback for
    the MyPod Project


    ```

    -(IBAction)toggleAudio:(id)sender

    {

        if ([self.musicPlayer playbackState] ==

            MPMusicPlaybackStatePlaying) {

             [self.musicPlayer pause];

              self.playButton.titleLabel.text = @"Play";

        } else {

             [self.musicPlayer play];

             self.playButton.titleLabel.text = @"Pause";

        }

    }

    ```


    As with the simple audio player, to toggle playback state with one button, you
    should poll the media player for its playback state by using the `[MPMusicPlayerController
    playbackState]` property. If you want to completely stop playback of an item,
    implement a separate Stop button, using the `[MPMediaPlayerController stop]` method.
    Stop works exactly like Pause, except it resets the playback position to the beginning
    of the track the next time the user resumes playback.'
