    ## Setting Up the Audio Player


    Now that your app can load audio files, you are ready to start using the `AVAudioPlayer`
    class to play the files. You integrate an audio player into your class by adding
    it as a property and implementing its protocol methods.


    Because this app plays only one music file at a time, you want to implement your
    `AVAudioPlayer` object as an instance variable of your main view controller (the
    one that contains the player). The audio player sends back messages via a protocol,
    so, similarly, you should also indicate that your class will implement that protocol.
    [Listing 5-12](#9781430250838_Ch05.xhtml#list12) shows a modified version of the
    header file that includes these changes.


    **[Listing 5-12](#9781430250838_Ch05.xhtml#_list12).** Adding the Audio Player
    and Its Protocol to Your Header File


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import "FileViewController.h"


    @interface MainViewController : UIViewController <FileControllerDelegate,

    AVAudioPlayerDelegate>


    @property (nonatomic, strong) IBOutlet UILabel *timeLabel;

    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;


    @property (nonatomic, strong) IBOutlet UIButton *chooseButton;

    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipBackwardButton;


    @property (nonatomic, strong) IBOutlet UIProgressView *progressBar;


    @property (nonatomic, strong) NSString *selectedFilePath;


    @property (nonatomic, strong) AVAudioPlayer *audioPlayer;


    @end

    ```


    **Note**  If you want to write an app whose audio playback can be controlled by
    multiple views, it is best to encapsulate your audio player instance in a singleton
    class, and to have all classes access it through that.'
