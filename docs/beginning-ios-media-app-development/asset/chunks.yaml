  raw: 'Next, you are ready to begin adding the controls to the playback interface.
    Use [Figure 9-6](#9781430250838_Ch09.xhtml#Fig6) as your guide, but pay careful
    attention to make sure that when you place the elements, you drop them directly
    on top of a view. This mimics adding an element as a subview and allows you to
    show or hide an entire panel by modifying the container. For example, to hide
    all the playback controls, all you need to do is hide the center control panel.
    You can verify that elements have been added as subviews by confirming their hierarchical
    position in the *Document Outline* (Interface Builder’s left pane). Using [Figure
    9-11](#9781430250838_Ch09.xhtml#Fig11) as a reference, you can confirm that the
    Current Time label has been added to the control bar at the bottom of the screen
    because the label appears underneath the view in the element hierarchy.


    ![9781430250838_Fig09-11.jpg](images/9781430250838_Fig09-11.jpg)


    [Figure 9-11](#9781430250838_Ch09.xhtml#_Fig11). Verifying view hierarchy


    To help you connect the rest of your user interface, [Listing 9-6](#9781430250838_Ch09.xhtml#list6)
    shows the header file for the `CustomPlayerController` class. Connect the button
    actions to the *touch up inside* events of the buttons, and connect the slider
    events to the Value Changed events of the sliders.


    [***Listing 9-6***](#9781430250838_Ch09.xhtml#_list6). Header File for CustomPlayerController
    Class


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>


    @interface CustomPlayerController : UIViewController


    @property (nonatomic, strong) IBOutlet UIView *controlView;

    @property (nonatomic, strong) IBOutlet UIButton *playbackButton;

    @property (nonatomic, strong) IBOutlet UIButton *seekFwdButton;

    @property (nonatomic, strong) IBOutlet UIButton *seekBackButton;

    @property (nonatomic, strong) IBOutlet UIButton *doneButton;


    @property (nonatomic, strong) IBOutlet UISlider *timeSlider;

    @property (nonatomic, strong) IBOutlet UILabel *progressLabel;

    @property (nonatomic, strong) IBOutlet UILabel *totalTimeLabel;


    -(IBAction)seekBackward:(id)sender;

    -(IBAction)seekForward:(id)sender;

    -(IBAction)sliderChanged:(UISlider *)sender;

    -(IBAction)togglePlayback:(id)sender;

    -(IBAction)done:(id)sender;


    -(void)play;


    -(id)initWithContentURL:(NSURL *)contentURL;


    @end

    ```


    To hide the center control panel, remember to link the `controlView` property
    of the class. Once this is done, you can set the background color of the element
    to *clear* in order to make the playback controls look like they are floating.


    Using the AVPlayer Class for Media Playback


    The `AVFoundation` framework allows you to play back video files via the `AVPlayer`
    class. Although it does not provide a user interface, this class provides playback
    controls (including scrubbing and toggling playback), events (including *loading
    state* or *playback complete*), and limited hardware controls (including AirPlay
    and Volume). The class is designed to take `AVPlayerItem` objects as its input,
    and can pass its output directly to the `AVPlayerLayer` class, which you can display
    on top of a `UIView`. To control playback, you will need to add instance variables
    for the `AVPlayerItem` and `AVPlayer` to the `CustomPlayerController` header file:


    ```

    @property (nonatomic, strong) AVPlayerItem *playerItem;

    @property (nonatomic, strong) AVPlayer *player;

    ```


    To check the validity of your input with the `AVPlayer` class, you need to attempt
    to load the file. When the `AVPlayer` object has a `status` of `AVStatusReadyToPlay`,
    the file is ready to play. To catch this change, you need to use key-value observing
    (KVO), a message-passing mechanism that works on a subscription basis, like notifications.
    For KVO, you specify a property (*key*) that you want to *observe* on an object.
    For `AVPlayer` status changes, you want to observe the `status` property. You
    can find a detailed explanation of key-value observing in [Chapter 12](#9781430250838_Ch12.xhtml),
    where you will develop a more sophisticated `AVPlayer`-based media player using
    the new `AVKit` framework.


    [Listing 9-7](#9781430250838_Ch09.xhtml#list7) shows how I begin the `AVPlayer`
    initialization process—by creating an `AVPlayerItem` with the input URL, initializing
    an `AVPlayer` object, and setting an observer.


    [***Listing 9-7***](#9781430250838_Ch09.xhtml#_list7). Initializing the AVPlayer


    ```

    -(id)initWithContentURL:(NSURL *)contentURL

    {

        UIStoryboard *storyboard = [UIStoryboard

            storyboardWithName:@"Main" bundle:nil];

        CustomPlayerController *myViewController = [storyboard

        instantiateViewControllerWithIdentifier:@"CustomPlayerController"];


    self = myViewController;

        if (self) {


    self.playerItem = [[AVPlayerItem alloc]

                initWithURL:contentURL];

            self.player = [AVPlayer playerWithPlayerItem:self.playerItem];

            [self.player addObserver:self forKeyPath:@"status"

                options:0 context:nil];

    }

        return self;

    }

    ```


    All KVO messages are handled by the `[UIViewController observeValueForKeyPath:ofObject:change:context:]`
    method for a class. Changes in the `status` property will indicate that the `AVPlayer`
    was able to load the file successfully (`AVPlayerStatusReadyToPlay`) or that it
    failed (`AVPlayerStatusFailed`). To identify KVO messages, before performing any
    logic, compare the incoming `object` and `keyPath`. As shown in [Listing 9-8](#9781430250838_Ch09.xhtml#list8),
    you can use the `self.player` instance variable and `status` for these parameters
    in the `CustomPlayerController` class.


    [***Listing 9-8***](#9781430250838_Ch09.xhtml#_list8). Handling AVPlayer KVO Messages


    ```

    -(void)observeValueForKeyPath:(NSString *)keyPath

        ofObject:(id)object change:(NSDictionary *)change

        context:(void *)context

    {

        if (object == self.player && [keyPath isEqualToString:@"status"]) {


    if (self.player.status == AVPlayerStatusReadyToPlay) {

                ...

            } else {

                ...

            }


    [self.player removeObserver:self forKeyPath:@"status"];

        }

    }

    ```


    If the file loaded successfully, you are ready to initialize the `AVPlayerLayer`,
    which displays the output of the `AVPlayer`. The `AVPlayerLayer` works like the
    `AVCaptureVideoPreviewLayer` you used in [Chapter 4](#9781430250838_Ch04.xhtml)
    to mirror a live feed from the camera. It outputs video data directly to a `layer`,
    the lower-level object that provides content for a `UIView`. As shown in [Listing
    9-9](#9781430250838_Ch09.xhtml#list9), to display the video layer, match its dimensions
    to the *bounding frame* of the target view (in this case, the main area of the
    `CustomViewController`), and add it as a sublayer.


    [***Listing 9-9***](#9781430250838_Ch09.xhtml#_list9). Adding an AVPlayerLayer
    to the CustomViewController


    ```

    -(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object

        change:(NSDictionary *)change context:(void *)context

    {

        if (object == self.player && [keyPath isEqualToString:@"status"]) {


    if (self.player.status == AVPlayerStatusReadyToPlay) {


    AVPlayerLayer *playerLayer = [AVPlayerLayer

                   playerLayerWithPlayer:self.player];

                playerLayer.frame = self.view.bounds;

                playerLayer.videoGravity = AVLayerVideoGravityResizeAspect;

                [self.view.layer addSublayer:playerLayer];'
