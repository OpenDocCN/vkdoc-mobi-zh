    The key components of this storyboard are as follows:


    *   An AVKit player view controller that will represent the media player for the
    project

    *   A container view that holds the media player, and an Embed segue named `setPlayerContent`
    that is used to initialize the media player

    *   A `UITableViewController` subclass that will be used for the file picker

    *   A `UINavigationController` that embeds the file picker, and that connects
    to the Choose File option via a Present Modally segue named `showFilePicker`


    For more details on how to build each component of this storyboard, review [Chapter
    9](#9781430250838_Ch09.xhtml).


    To connect the file picker on the storyboard to its parent class, `FileViewController.h`,
    use the Identity Inspector in Interface Builder, just as you would in an Objective-C
    based project. To allow Interface Builder to recognize an Objective-C–based class,
    you need to select a parent class and a *module*. Modules are another way of adding
    Swift compatibility to Objective-C classes. For a basic project, you do not need
    to define a module; however, you need to click inside the Module drop-down in
    the Identity Inspector to make Interface Builder recognize your Objective-C class.


    As shown in [Figure 14-7](#9781430250838_Ch14.xhtml#Fig7), after entering `FileViewController`
    as your class, click inside the empty Module drop-down in order to save your selection.


    ![9781430250838_Fig14-07.jpg](images/9781430250838_Fig14-07.jpg)


