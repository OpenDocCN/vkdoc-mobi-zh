  trans: "\n当你需要保留图片中的 Alpha（透明度）信息时，应使用 `UIImagePNGRepresentation()`，其唯一参数是你输入的 `UIImage`。如果你的图片不包含任何\
    \ Alpha 信息，且需要压缩选项，则应使用 `UIImageJPEGRepresentation()`。该方法的参数是输入的 `UIImage` 和一个\
    \ `float` 类型的值（范围 0.0 到 1.0），代表压缩质量。数值越低，压缩程度越高，图像质量越低。对于大多数应用来说，0.6 或 0.7 是在文件大小与图像质量之间的良好平衡点：\n\
    \n```\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage, 0.7f);\n\
    ```\n\n准备好图片的二进制数据后，即可将其写入文件。你可以使用 `NSData` 的实例方法 `[NSData writeToFile:]` 将数据写入磁盘。该方法需要一个文件的目标存储位置。就像从应用包内读取文件一样，你可以将应用的文档目录作为访问设备文件系统的接口。在列表\
    \ 3-4 中提供了将图片保存到文档文件夹的示例。\n\n***列表 3-4***. 将图片保存到文档文件夹\n\n```\n-(IBAction)saveToDisk:(id)sender\n\
    {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask,\n                     YES);\n    NSString *documentsDirectory\
    \ = [paths objectAtIndex:0];\n    NSString *filePath = [documentsDirectory stringByAppendingPathComponent:@\"\
    image.jpg\"];\n\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage,\
    \ 0.7f);\n    NSError *error = nil;\n    NSString *alertMessage = nil;\n\n//在尝试写入前检查文件是否存在\n\
    \    if ([[NSFileManager defaultManager] fileExistsAtPath:filePath]) {\n\nNSDateFormatter\
    \ *dateFormat = [[NSDateFormatter alloc] init];\n        [dateFormat setDateFormat:@\"\
    yyyyMMddHHmm\"];\n\nNSString *dateString = [dateFormat stringFromDate:[NSDate\
    \ date]];\n\nNSString *fileName = [NSString stringWithFormat:@\"image-%@.jpg\"\
    , dateString];\n\nfilePath = [documentsDirectory stringByAppendingPathComponent:fileName];\n\
    \    }\n\n[imageData writeToFile:filePath options:NSDataWritingAtomic error:&error];\n\
    \nif (error == nil) {\n        alertMessage = @\"已成功保存到'Documents'文件夹！\";\n  \
    \  } else {\n        alertMessage = @\"无法保存图片 :(\";\n    }\n\nUIAlertView *alertView\
    \ = [[UIAlertView alloc] initWithTitle:@\"状态\"\n                             \
    \  message:alertMessage delegate:nil cancelButtonTitle:@\"确定\"\n             \
    \                  otherButtonTitles:nil];\n    [alertView show];\n}\n```\n\n\
    **注意** Apple 的 API 不提供自动文件命名功能，因此在尝试写入文件前，务必记得检查文件名是否已存在。\n\n在列表 3-4 中，代表图片的对象采用\
    \ `self.originalImage` 的格式。这表明该图片是类的一个实例变量，而非特定方法中的局部变量。当需要在同一个类中多次操作同一个对象，而无需将其作为参数传递时，实例变量就显得尤为重要。你需要在头文件中声明实例变量来创建它：\n\
    \n```\n@property (nonatomic, strong) UIImage *originalImage;\n```\n\n现在文件已保存到文档文件夹，下次加载应用时你就可以访问它们了。\n\
    \n如果你希望用户能够将应用中的输出下载到他们的电脑上，还需要完成最后一步：为你的应用启用“iTunes 文件共享”。你可以通过导航到项目设置的“Info”选项卡，然后添加键“Application\
    \ supports iTunes file sharing”来实现，如图 图 3-4 所示。\n\n![9781430250838_Fig03-04.jpg](img/9781430250838_Fig03-04.jpg)\n\
    \n图 3-4. 启用 iTunes 文件共享\n\n现在，用户可以在 iTunes 中选择他们的设备，向下滚动到“App”选项卡的“文件共享”部分来查看文件。通过点击已安装应用列表中的应用名称，他们就能看到应用文档文件夹的内容，如图\
    \ 图 3-5 所示。\n\n![9781430250838_Fig03-05.jpg](img/9781430250838_Fig03-05.jpg)\n\
    \n图 3-5. 在 iTunes 中查看文件\n\n## 将图片保存到相册\n\n对于许多基于照片的应用，你可能希望为其他应用提供访问那些在你的应用内创建或处理的图片的权限。在这种情况下，更合适的做法是直接将图片保存到系统的照片库中。为此，Apple\
    \ 提供了一个便捷方法 `UIImageWriteToSavedPhotosAlbum()`，该方法允许你将 `UIImage` 对象直接保存到“相机胶卷”相册。\n\
    \n要使用 `UIImageWriteToSavedPhotosAlbum()` 方法，你需要传入要保存的 `UIImage` 对象，并可选地传入一个完成处理程序，该处理程序将在操作完成后执行。你可以使用这个完成处理程序来判断保存是否成功，并执行后续操作，例如显示一个\
    \ `UIAlertView`：\n\n```\nUIImageWriteToSavedPhotosAlbum(self.originalImage, self,\n\
    \                               @selector(image:didFinishSavingWithError:contextInfo:),\
    \ nil);\n```\n\n如果你使用了完成处理程序，请确保同时传递 `completionTarget` 参数（此处为 `self`）和处理程序方法的选择器。否则，你的代码将不知道在运行时使用哪个方法，也不知道在哪里查找它。列表\
    \ 3-5 提供了一个显示提示视图的完成处理程序示例。\n\n***列表 3-5***. 显示提示视图的完成处理程序\n\n```\n- (void)image:(UIImage\
    \ *)image didFinishSavingWithError:(NSError *)\n                             \
    \                            error contextInfo:(void *)contextInfo\n{\n    NSString\
    \ *alertMessage = nil;\n    if (error == nil) {\n        alertMessage = @\"已成功保存到相机胶卷！\"\
    ;\n    } else {\n        alertMessage = @\"无法保存图片 :(\";\n    }\n\nUIAlertView\
    \ *alertView = [[UIAlertView alloc] initWithTitle:@\"状态\"\n                  \
    \             message:alertMessage delegate:nil cancelButtonTitle:@\"确定\"\n  \
    \                             otherButtonTitles:nil];\n    [alertView show];\n\
    }\n```\n\n在源代码包中，我提供了一个名为 ImageSave 的示例项目，它演示了两种保存图片的方式。如图 图 3-6 所示，该应用提供了一个图片视图和两个触发保存操作的按钮。\n\
    \n![9781430250838_Fig03-06.jpg](img/9781430250838_Fig03-06.jpg)\n\n图 3-6. ImageSave\
    \ 项目\n\n## 从网络加载图片\n\n你永远无法预测从网络加载一张图片需要多长时间。虽然你可以使用 `[NSData initWithContentsOfUrl:]`\
    \ 方法来加载图片数据，但该方法不会提供错误处理，并且是一个阻塞操作，这意味着在下载完成之前，你的应用将无法响应其他事件。更好的方法是在后台下载图片，并在数据准备好后用下载结果刷新\
    \ `UIImageView`。\n\n要在应用的后台下载图片数据，你需要使用 `NSURLConnection` 类。该类允许你控制下载（开始/停止），并提供了选项来控制其在何处执行（前台或后台），以及响应是通过委托还是完成块来处理。\n\
    \n首先，用占位图片或 `nil` 值初始化你的 `UIImageView`：\n\n```\n[self.imageView setImage:nil];\n\
    ```\n\n接下来，初始化一个包含目标 URL 的 `NSURLRequest` 对象：\n"
- fmt: "```objectivec\nNSURL *imageUrl = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"\
    ];\nNSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n```\n\n\
    `NSURLRequest` 对象将 URL 包装在一个 HTTP `GET` 命令中，这是浏览器和其他应用程序向 Web 服务器发送下载请求的方式。\n\n\
    为了简化此实现，我建议使用允许指定完成块的 `NSURLConnection` 方法：`[NSURLConnection sendAsynchronousRequest:]`。使用完成处理程序可以在方法完成后立即执行代码块，而无需持久化变量或创建额外的方法。它是一个类方法，因此无需实例化对象即可使用：\n\
    \n```objectivec\n[NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
    \ mainQueue]\n                 completionHandler:^(NSURLResponse *response, NSData\
    \ *data,\n                 NSError *connectionError) { ... }];\n```\n\n可以看到，该方法的完成处理程序返回一个\
    \ `NSData` 对象和一个 `NSError` 对象。如果下载失败，`error` 对象将为 `nil`；否则它将包含一个非 `nil` 值。[清单\
    \ 3-6](#9781430250838_Ch03.xhtml#list6) 展示了一个方法，该方法发起下载，并在下载成功时根据结果数据创建一个 `UIImage`\
    \ 对象。如果下载失败，应用程序将向用户显示一个提示错误的警告视图。\n\n***清单 3-6*** 从网络加载图像\n\n```objectivec\n\
    -(IBAction)start:(id)sender\n{\n    NSURL *imageUrl = [NSURL URLWithString:@\"\
    http://www.devatelier.com/images/flower.png\"];\n    NSURLRequest *urlRequest\
    \ = [NSURLRequest requestWithURL:imageUrl];\n\n    [self.imageView setImage:nil];\n\
    \n    [NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
    \ mainQueue]\n                     completionHandler:^(NSURLResponse *response,\
    \ NSData *data,\n                     NSError *connectionError) {\n\n        if\
    \ (connectionError == nil) {\n\n            UIImage *newImage = [UIImage imageWithData:data];\n\
    \            [self.imageView setImage:newImage];\n\n        } else {\n       \
    \     UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"Error\"\n\
    \                message:@\"Could not load image :(\" delegate:nil cancelButtonTitle:@\"\
    OK\"\n                otherButtonTitles:nil];\n            [alertView show]; \n\
    \        }\n    }];\n}\n```\n\n## 添加活动指示器\n\n在许多应用程序中，你会注意到一个旋转动画，表示操作正在进行中（例如下载图像），如图\
    \ 3-7 所示。你可以通过 `UIActivityIndicatorView` 类向任何视图添加旋转器（或活动指示器）。\n\n![9781430250838_Fig03-07.jpg](images/9781430250838_Fig03-07.jpg)\n\
    \n图 3-7 叠加了活动指示器的视图\n\n要将 `UIActivityIndicatorView` 添加到 `UIImageView`，你需要遵循与其他\
    \ `UIView` 相同的大多数初始化步骤，包括设置容器框架以及将 `UIActivityIndicatorView` 作为子视图添加到 `UIImageView`\
    \ 之上。\n\n通过查看图 3-7，你会注意到 `UIActivityIndicatorView` 与 `UIImageView` 相比非常小。为了适应尺寸差异，你可以找到\
    \ `UIImageView` 的中心，并将其作为 `UIActivityIndicatorView` 的起点。清单 3-7 提供了一个向图像视图添加活动指示器的示例。\n\
    \n***清单 3-7*** 向图像视图添加活动指示器\n\n```objectivec\n// calculate the mid-way point of\
    \ the image view\nCGFloat indicatorWidth, indicatorHeight;\nindicatorWidth = indicatorHeight\
    \ = 100.0f;\n\nCGFloat originX = (self.imageView.frame.size.width - indicatorWidth)\
    \ / 2;\nCGFloat originY = (self.imageView.frame.size.height - indicatorHeight)\
    \ / 2;\n\nCGRect activityFrame = CGRectMake(originX, originY, indicatorWidth,\
    \ indicatorHeight);\n\nself.activityView = [[UIActivityIndicatorView alloc] initWithFrame:activityFrame];\n\
    self.activityView.color = [UIColor blackColor];\n[self.imageView addSubview:self.activityView];\n\
    ```\n\n你需要将 `UIImageView` 和 `UIActivityIndicatorView` 对象声明为实例变量，因为你需要在整个类中访问它们。\n\
    \n在 `UIActivityIndicatorView` 初始化并添加到 `UIImageView` 之后，你就可以让魔法发生了。当下载操作开始时，应使用\
    \ `[UIActivityIndicatorView startAnimating]` 实例方法来启动活动指示器的动画。当操作完成（无论成功还是失败）时，调用\
    \ `[UIActivityIndicatorView stopAnimating]` 实例方法来停止动画并隐藏活动指示器。\n\n清单 3-8 展示了一个结合了发起下载与启动、停止活动指示器的示例。\n\
    \n***清单 3-8*** 加载图像并使用活动指示器镜像状态\n\n```objectivec\n-(IBAction)start:(id)sender\n\
    {\n    NSURL *imageUrl = [NSURL URLWithString:@\"http://images.devatelier.com/castle.jpg\"\
    ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n\
    \    [self.imageView setImage:nil];\n    [self.imageView bringSubviewToFront:self.activityView];\n\
    \    [self.activityView startAnimating];\n\n    [NSURLConnection sendAsynchronousRequest:urlRequest\
    \ queue:[NSOperationQueue mainQueue]\n                     completionHandler:^(NSURLResponse\
    \ *response, NSData *data,\n                     NSError *connectionError) {\n\
    \n        [self.activityView stopAnimating];\n\n        if (connectionError ==\
    \ nil) {\n\n            UIImage *newImage = [UIImage imageWithData:data];\n  \
    \          [self.imageView setImage:newImage];\n\n        } else {\n         \
    \   UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"Error\" message:@\"\
    Could not load image :(\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
    \            [alertView show];\n        }\n    }];\n}\n```\n\n**注意** 视图按照添加的顺序显示。在此示例中，我使用了\
    \ `[UIView bringSubviewToFront:]` 实例方法来强制活动指示器显示在视图堆栈的最顶层。\n\n本章源代码包中的 ImageDownload\
    \ 项目实现了图 3-7 所示的用户界面。当用户按下“Start Download”按钮时，图像将在后台开始下载并显示活动指示器。下载完成后，指示器将消失，图像视图将重新加载已下载的图像。\n\
    \n## 为图像添加效果\n\n无可争议，Apple 在 iOS 7 中引入的最引人注目的变化是其新的视觉设计语言以及为开发者提供的实现该语言的工具。iOS\
    \ 7 标志着 Apple 从传统的拟物化用户界面方法（从现实世界中获取灵感）转向扁平、简洁、数字优先的设计。\n\n在本节中，你将学习如何开始使用这种设计语言。你将利用传统方法（如渐变）为图像增加深度，并了解模糊和运动效果如何让你的应用使用\
    \ Apple 在其应用中使用的许多引人注目的视觉效果。\n\n### 添加渐变\n\n为了增加深度并突出叠加在图像上的内容（例如文本），你可以使用渐变。幸运的是，有一个现成的\
    \ API 可以做到这一点！"
  raw: "```\nNSURL *imageUrl = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"\
    ];\nNSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n```\n\n\
    The `NSURLRequest` object wraps the URL in an HTTP `GET` command, which is how\
    \ browsers and other apps send download requests to a web server.\n\nTo streamline\
    \ this implementation, I suggest using the `NSURLConnection` method that allows\
    \ you to specify a completion block: `[NSURLConnection sendAsynchronousRequest:]`.\
    \ Using a completion handler enables you to execute a block of code as soon as\
    \ a method finishes, without needing to persist variables or create extra methods.\
    \ It is a class method, so you do not need to instantiate an object to use it:\n\
    \n```\n[NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
    \ mainQueue]\n                 completionHandler:^(NSURLResponse *response, NSData\
    \ *data,\n                 NSError *connectionError) { ... }];\n```\n\nYou see\
    \ that the completion handler for this method returns an `NSData` object and an\
    \ `NSError` object. If the download fails, the error object will be `nil`; otherwise,\
    \ it will contain a non-`nil` value. [Listing 3-6](#9781430250838_Ch03.xhtml#list6)\
    \ presents a method that initiates a download and creates a `UIImage` object from\
    \ the resulting data if the download is successful. If the download fails, the\
    \ application will display an alert view indicating the failure to the user.\n\
    \n[***Listing 3-6***](#9781430250838_Ch03.xhtml#_list6). Loading an Image from\
    \ the Internet\n\n```\n-(IBAction)start:(id)sender\n{\n    NSURL *imageUrl = [NSURL\
    \ URLWithString:@\"http://www.devatelier.com/images/flower.png\"];\n    NSURLRequest\
    \ *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n[self.imageView setImage:nil];\n\
    \n[NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
    \ mainQueue]\n                     completionHandler:^(NSURLResponse *response,\
    \ NSData *data,\n                     NSError *connectionError) {\n\nif (connectionError\
    \ == nil) {\n\nUIImage *newImage = [UIImage imageWithData:data];\n            [self.imageView\
    \ setImage:newImage];\n\n} else {\n            UIAlertView *alertView = [[UIAlertView\
    \ alloc] initWithTitle:@\"Error\"\n\nmessage:@\"Could not load image :(\" delegate:nil\
    \ cancelButtonTitle:@\"OK\"\n                otherButtonTitles:nil];\n            [alertView\
    \ show]; \n        }\n    }];\n}\n```\n\nAdding an Activity Indicator\n\nIn many\
    \ apps, you will notice a spinning animation that indicates an operation is in\
    \ progress (such as downloading an image), as shown in [Figure 3-7](#9781430250838_Ch03.xhtml#Fig7).\
    \ You can add a spinner (or *activity indicator*) to any view via the `UIActivityIndicatorView`\
    \ class.\n\n![9781430250838_Fig03-07.jpg](images/9781430250838_Fig03-07.jpg)\n\
    \n[Figure 3-7](#9781430250838_Ch03.xhtml#_Fig7). View with activity indicator\
    \ superimposed\n\nTo add a `UIActivityIndicatorView` to a `UIImageView`, you follow\
    \ many of the same initialization steps you would use with any other `UIView`,\
    \ including setting up the container frame and adding the `UIActivityIndicatorView`\
    \ as a subview on top of the `UIImageView`.\n\nBy reviewing [Figure 3-7](#9781430250838_Ch03.xhtml#Fig7),\
    \ you will notice that the `UIActivityIndicatorView` is very small in comparison\
    \ to the `UIImageView`. To accommodate for the size difference, you could find\
    \ the center of the `UIImageView` and use this as the origin for the `UIActivityIndicatorView`.\
    \ An example of adding an activity indictor to an image view is provided in [Listing\
    \ 3-7](#9781430250838_Ch03.xhtml#list7).\n\n[***Listing 3-7***](#9781430250838_Ch03.xhtml#_list7).\
    \ Adding an Activity Indicator to an Image View\n\n```\n//calculate the mid-way\
    \ point of the image view\nCGFloat indicatorWidth, indicatorHeight;\nindicatorWidth\
    \ = indicatorHeight = 100.0f;\n\nCGFloat originX = (self.imageView.frame.size.width\
    \ - indicatorWidth) / 2;\nCGFloat originY = (self.imageView.frame.size.height\
    \ - indicatorHeight) / 2;\n\nCGRect activityFrame = CGRectMake(originX, originY,\
    \ indicatorWidth, indicatorHeight);\n\nself.activityView = [[UIActivityIndicatorView\
    \ alloc] initWithFrame:activityFrame];\nself.activityView.color = [UIColor blackColor];\n\
    [self.imageView addSubview:self.activityView];\n```\n\nYou declare the `UIImageView`\
    \ and `UIActivityIndidatorView` objects as instance variables, since you will\
    \ need to access them throughout the class.\n\nAfter the `UIActivityIndicatorView`\
    \ has been initialized and added to the `UIImageView`, you are ready to make magic\
    \ happen. You should use the `[UIActivityIndicatorView startAnimating]` instance\
    \ method to start animating the activity indicator when the download operation\
    \ begins. When the operation completes, due to success or failure, call the `[UIActivityIndicatorView\
    \ stopAnimating]` instance method to stop the animation and hide the activity\
    \ indicator.\n\n[Listing 3-8](#9781430250838_Ch03.xhtml#list8) shows an example\
    \ that combines initiating a download with starting and stopping the activity\
    \ indicator.\n\n[***Listing 3-8***](#9781430250838_Ch03.xhtml#_list8). Loading\
    \ an Image and Mirroring Status with an Activity Indicator\n\n```\n-(IBAction)start:(id)sender\n\
    {\n    NSURL *imageUrl = [NSURL URLWithString:@\" @\"http://images.devatelier.com/castle.jpg\
    \ \"];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\
    \n[self.imageView setImage:nil];\n    [self.imageView bringSubviewToFront:self.activityView];\n\
        [self.activityView startAnimating];\n\n[NSURLConnection sendAsynchronousRequest:urlRequest\
    \ queue:[NSOperationQueue mainQueue]\n                     completionHandler:^(NSURLResponse\
    \ *response, NSData *data,\n                     NSError *connectionError) {\n\
    \n[self.activityView stopAnimating];\n\nif (connectionError == nil) {\n\nUIImage\
    \ *newImage = [UIImage imageWithData:data];\n            [self.imageView setImage:newImage];\n\
    \n} else {\n            UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"\
    Error\" message:@\"Could not load image :(\" delegate:nil cancelButtonTitle:@\"\
    OK\" otherButtonTitles:nil];\n            [alertView show];\n        }\n    }];\n\
    }\n```\n\n**Note**  Views are displayed in the order they were added. I am using\
    \ the `[UIView bringSubviewToFront:]` instance method in this example to force\
    \ the activity indicator to appear at the top of the view stack.\n\nThe ImageDownload\
    \ project in the source code bundle for this chapter implements the user interface\
    \ that was illustrated in [Figure 3-7](#9781430250838_Ch03.xhtml#Fig7). When the\
    \ user presses the Start Download button, the image will start downloading in\
    \ the background and display the activity indicator. When the download has completed,\
    \ the indicator will disappear and the image view will be reloaded with the downloaded\
    \ image.\n\nAdding Effects to Your Images\n\nArguably, the most striking change\
    \ that Apple introduced with iOS 7 was its new visual design language and the\
    \ tools it provided developers to implement this language. iOS 7 marked Apple’s\
    \ shift from its traditional skeumorphic user interface approach (taking cues\
    \ from the real world) to flat, clean, digital-first design.\n\nIn this section,\
    \ you will see how to begin using this design language. You will leverage traditional\
    \ methods, such as gradients, to give depth to images, and you will see how blurring\
    \ and motion effects can give your app access to many of the compelling visual\
    \ effects Apple uses in its apps.\n\nAdding Gradients\n\nTo add depth and accentuate\
    \ overlays on top of your images (such as text), you can use gradients. Luckily\
    \ for us, there’s an API for that!"
  trans: "```objectivec\nNSURL *imageUrl = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"\
    ];\nNSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n```\n\n\
    `NSURLRequest` 对象将 URL 包装在一个 HTTP `GET` 命令中，这是浏览器和其他应用程序向 Web 服务器发送下载请求的方式。\n\n\
    为了简化此实现，我建议使用允许指定完成块的 `NSURLConnection` 方法：`[NSURLConnection sendAsynchronousRequest:]`。使用完成处理程序可以在方法完成后立即执行代码块，而无需持久化变量或创建额外的方法。它是一个类方法，因此无需实例化对象即可使用：\n\
    \n```objectivec\n[NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
    \ mainQueue]\n                 completionHandler:^(NSURLResponse *response, NSData\
    \ *data,\n                 NSError *connectionError) { ... }];\n```\n\n可以看到，该方法的完成处理程序返回一个\
    \ `NSData` 对象和一个 `NSError` 对象。如果下载失败，`error` 对象将为 `nil`；否则它将包含一个非 `nil` 值。清单 3-6\
    \ 展示了一个方法，该方法发起下载，并在下载成功时根据结果数据创建一个 `UIImage` 对象。如果下载失败，应用程序将向用户显示一个提示错误的警告视图。\n\
    \n***清单 3-6*** 从网络加载图像\n\n```objectivec\n-(IBAction)start:(id)sender\n{\n    NSURL\
    \ *imageUrl = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"\
    ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n\
    \    [self.imageView setImage:nil];\n\n    [NSURLConnection sendAsynchronousRequest:urlRequest\
