  raw: 'You might be thinking, “This is pretty standard functionality; shouldn’t all
    of the media player classes have it?” Unfortunately, the primary classes you have
    used for media playback, `AVAudioPlayer` (for audio) and `MPMediaPlayerController`
    (for video), cannot be initialized with a playlist. The way most applications
    implement playlist-like functionality with these classes is by initializing a
    media player with the “next file” in the playlist when the app receives the event
    for *playback completed*. Prior to `AVKit`, the only media player class that could
    handle a playlist natively was the `MPMusicPlayerController` class, which you
    used for iPod music playback—but remember, you had to implement your own user
    interface to use this class. The `AVQueuePlayer` class kills two birds with one
    stone by providing both the user interface and transition logic from one object.


    Just as the `AVPlayerViewController` class is intended to be a drop-in replacement
    for the `MPMediaPlayerController` class, you can use the `AVQueuePlayer` class
    as a drop-in replacement for the `AVPlayer` class. The key difference between
    the two classes is that instead of initializing an `AVQueuePlayer` with a single
    media asset, you pass it an array of `AVPlayerItem` objects:


    ```

    AVQueuePlayer *queuePlayer = [[AVQueuePlayer alloc]

                                  initWithItems:playerItemArray];

    ```


    The requirement to use `AVPlayerItem` objects means that you cannot use a single
    content URL to initialize your player. However, you can create `AVPlayerItem`
    objects from content URLs by using the `[AVPlayerItem playerItemWithURL:]` method:


    ```

    AVPlayerItem *item1 = [AVPlayerItem playerItemWithURL:@"goodDoge.mp4"];

    ```


    This method allows you to use either a local file URL or a remote content URL.
    As always, remember to calculate your local file URL at runtime in order to properly
    load it:


    ```

    NSString *relativePath = [documentsDirectory

        stringByAppendingPathComponent:@"goodDoge.mp4"];

    NSURL *fileURL = [NSURL fileURLWithPath:relativePath];

    AVPlayerItem *item1 = [AVPlayerItem playerItemWithURL:fileURL];

    ```


    Because the `AVQueuePlayer` class is a subclass of `AVPlayer`, all you need to
    do to is pass an `AVQueuePlayer` object to your `AVPlayerViewController`’s `player`
    property:


    ```

    self.moviePlayer.player = queuePlayer;

    ```


    As mentioned at the beginning of the chapter, in the MyAVPlayer project, you want
    to let the user play a single file by using the Choose File button, or load all
    available files when they use the Play All button. To do this, initialize the
    `AVPlayerViewController` with an `AVPlayer` when the user selects the Choose File
    button, and an `AVQueuePlayer` when the user selects the Play All button.


    To retain single-file playback, you should leave the Choose File handler (the
    file picker delegate) untouched. Instead, make a new method, `[MainViewController
    playAll:]`, which will act as the handler for the Play All button. As shown in
    [Listing 12-4](#9781430250838_Ch12.xhtml#list4), use this method to set the `player`
    property for the shared `AVPlayerViewController` object.


    [***Listing 12-4***](#9781430250838_Ch12.xhtml#_list4). Initializing an AVPlayerViewController
    with an AVQueuePlayer


    ```

    -(IBAction)playAll:(id)sender

    {


    NSString *relativePath = [documentsDirectory

            stringByAppendingPathComponent:@"goodDoge.mp4"];

        NSURL *fileURL = [NSURL fileURLWithPath:relativePath];

        AVPlayerItem *item1 = [AVPlayerItem playerItemWithURL:fileURL];


    NSString *relativePath2 = [documentsDirectory

            stringByAppendingPathComponent:@"badDoge.mp4"];

        NSURL *fileURL2 = [NSURL fileURLWithPath:relativePath2];


    AVPlayerItem *item2 = [AVPlayerItem

            playerItemWithURL:@"http://www.devatelier.com/commercial.mov"];

        NSArrray *playerItemArray = [NSArray arrayWithObjects: item1, item2];


    self.moviePlayer.player = [[AVQueuePlayer alloc]

            initWithItems:playerItemArray];


    [self.moviePlayer.player addObserver:self forKeyPath:@"status"

            options:0 context:nil];


    [self.moviePlayer.player play];


    }

    ```


    To get this code to compile, you need to define the `inputPlaylist` object. Because
    the goal is to play all files, you can duplicate the scanning logic from the file
    picker (the `FileViewController`) class. Scan for all files in the documents directory
    and add them to an `NSMutableArray`. When that process completes, attach it to
    your `AVPlayerViewController`. [Listing 12-5](#9781430250838_Ch12.xhtml#list5)
    shows the completed initialization method.


    [***Listing 12-5***](#9781430250838_Ch12.xhtml#_list5). Completed Initialization
    Code for AVQueuePlayer


    ```

    -(IBAction)playAll:(id)sender

    {

        NSArray *paths = NSSearchPathForDirectoriesInDomains(

            NSDocumentDirectory, NSUserDomainMask, YES);

        NSString *documentsDirectory = [paths objectAtIndex:0];

        NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

            contentsOfDirectoryAtPath:documentsDirectory error:&error];


    NSMutableArray *playerItemArray = [NSMutableArray new];


    for (NSString *file in allFiles) {


    if ([[file pathExtension] isEqualToString:@"mp4"] ||

                [[file pathExtension] isEqualToString:@"mov"] ||

                 [[file pathExtension] isEqualToString:@"MOV"]) {

                NSString *relativePath = [documentsDirectory

                    stringByAppendingPathComponent:file];


    NSURL *fileURL = [NSURL fileURLWithPath:relativePath];


    AVPlayerItem *playerItem = [AVPlayerItem

                    playerItemWithURL:fileURL];


    [playerItem addObserver:self forKeyPath:@"status"

                    options:nil context:nil];


    [playerItemArray addObject:playerItem];

            }


    }


    self.moviePlayer.player = [[AVQueuePlayer alloc]

            initWithItems:playerItemArray];


    [self.moviePlayer.player addObserver:self forKeyPath:@"status"

            options:0 context:nil];


    [self.moviePlayer.player play];


    }

    ```


    Working with Media Playback Events


    One of the few features from the `MPMediaPlayerController` class that was not
    ported directly to the `AVPlayerViewController` class was reporting playback state
    changes through notifications. The good news is that you implement similar functionality
    in `AVPlayerViewController` by using key-value observers. Notifications still
    exist for some playback events, such as *playback finished* and similar events.


    USING KEY-VALUE OBSERVERS


    Like notifications, key-value observing (KVO) is a subscription-based message-passing
    system, meaning a class does not receive any messages until it declares it is
    *observing* them. While notifications require you to define and use a notification
    “name” to pass and receive messages through a central service (the notification
    center), key-value observers are decentralized.


    Key-value observer messages are triggered when the content (value) of a property
    (key) changes on an object. In KVO, a class declares itself an observer of messages
    for an object, and specifies a handler method—just as with notifications. Any
    object or property can be observed, giving you the flexibility to define handling
    of events that are not tied to notifications or delegate methods—at the cost of
    reuse (your implementation will be class-specific and less portable).


    The process of creating and using a key-value observer is quite similar to that
    of creating a notification (with the major exception being its object-specific
    nature): Declare your class as observing a property on an object.


    1.  Implement handler code for the KVO event.

    2.  Remove your observer when it’s no longer needed (to prevent crashing).


    The API for registering a key-value observer is `[NSObject addObserver:forKeyPath:options:context]`.
    If you wanted to observe when an array’s length changed, your registration code
    would look like this:


    `[self.peopleArray addObserver:self forKeyPath:@"count" options:nil`

        `context:nil];`'
