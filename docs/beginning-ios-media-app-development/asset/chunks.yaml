    ## 将 Objective-C 类导入到你的项目中


    在继续构建故事板之前，我应该讨论一下房间里的大象：Swift 与 Objective-C 的兼容性。Swift 允许您导入用 Objective-C 编写的类并调用
    Objective-C 方法。这种导入功能非常有价值，因为您可以导入任何现有的 Cocoa Touch API 或现有的 Objective-C 代码。


    为了说明这一点，我们不会用 Swift 重写整个`MyAVPlayer`项目，而是仅使用 Swift 重写`MainViewController`类，并将`FileViewController`（文件选择器）作为
    Objective-C 类导入。


    要将 Objective-C 类添加到您的 Swift 项目中，请遵循与 Objective-C 项目相同的流程：将文件拖放到项目导航器中，或从文件菜单中选择“将文件添加到<项目名称>”。第一次将
    Objective-C 类导入 Swift 项目时，系统会要求您创建一个 Objective-C 桥接头文件，如[图14-5](#9781430250838_Ch14.xhtml#Fig5)所示。选择“是”以继续。


    ![9781430250838_Fig14-05.jpg](images/9781430250838_Fig14-05.jpg)


    [图14-5](#9781430250838_Ch14.xhtml#_Fig5). Objective-C 桥接头文件提示


    *Objective-C 桥接头文件*是一种特殊的头文件，它为编译器提供要暴露给 Swift 类的 Objective-C 头文件列表。它作为一个通用头文件工作，类似于
