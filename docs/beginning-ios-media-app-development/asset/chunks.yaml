    found in the [Chapter 3](#9781430250838_Ch03.xhtml) folder. As shown in [Figure
    3-3](#9781430250838_Ch03.xhtml#Fig3), the project provides an image view to preview
    the image, and buttons to crop it, resize it, and restore it to its original size.


