    \ integerValue]];\n                });\n            }];\n\n} else {\n        \
    \    UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    Error\"\n                message:@\"Motion permission required\"\n           \
    \     delegate:self cancelButtonTitle:@\"OK\"\n                otherButtonTitles:nil];\n\
    \            [errorAlert show];\n        }\n    }\n\n}\n```\n\n## Using HealthKit\
    \ to Sync Data\n\nAt this point, the MyFitnessPod app is able to take advantage\
    \ of the M-series motion coprocessor, so it is time to make it a “responsible\
    \ data citizen” by using HealthKit as the back end for posting and retrieving\
    \ the workout data the app collects. As mentioned at the beginning of the chapter,\
    \ HealthKit allows you to skip the unnecessary step of building your own data-logging\
    \ interface, by giving all apps a central location where they can store (and retrieve)\
    \ health and fitness data. Additionally, the Health app gives users windows into\
    \ this data profile, allowing them to monitor such things as step information,\
    \ caloric intake, weight, blood pressure, and countless other health metrics,\
    \ all in one place. Users can even create their own dashboards to get a historical\
    \ snapshot. You can view my dashboard from when I wrote this chapter in Figure\
    \ 13-9.\n\n![9781430250838_Fig13-09.jpg](images/9781430250838_Fig13-09.jpg)\n\n\
    **Figure 13-9.** The author’s Health app dashboard\n\nIn this section, you will\
    \ learn how to take advantage of HealthKit to log workouts, retrieve past workout\
    \ activity, and receive real-time data updates. This allows your users to share\
    \ their data between apps, and will complete the user interface by implementing\
    \ the Today’s Totals label and populating it with accurate data.\n\nAlthough HealthKit\
    \ is a completely separate framework from Core Motion, the good news is that it\
    \ shares a lot of design similarities, such as the idea of push- and pull-based\
    \ data queries. HealthKit also exposes data types that provide rich information\
    \ for each type of stored activity. The fundamental steps you need to implement\
    \ to use HealthKit are as follows:\n\n1.  Request permission for an object type\
    \ (read, write, or both).\n2.  Implement a query and handler method to retrieve\
    \ data as it becomes available.\n3.  Create a properly formatted object to store\
    \ data.\n\n### Requesting Permission to Use HealthKit\n\nAs with Core Motion,\
    \ before you can perform any kind of operation with HealthKit, you need to request\
    \ the correct permissions. Again, because health data is sensitive personal information,\
    \ the permission levels are extremely granular, resulting in a detailed modal\
    \ view that the users can review before providing permission, as shown in Figure\
    \ 13-10.\n\n![9781430250838_Fig13-10.jpg](images/9781430250838_Fig13-10.jpg)\n\
    \n**Figure 13-10.** HealthKit Permissions modal view\n\nYou will notice that this\
    \ modal view presents read and write permissions for each type of health data\
    \ an application wishes to access. Every operation in HealthKit is tied to an\
    \ *object type*, represented by the `HKObject` class. Just like the `CMPedometerData`\
    \ class, the `HKObject` class stores a rich set of properties for each type of\
    \ health data that is being stored, including quantity (or characteristic), time\
    \ of measurement, and the measurement source. The set of properties varies for\
    \ each object type. There are two high-level types of object types to remember:\
    \ *quantities*, which are measured with quantitative units (such as weight), and\
    \ *characteristics*, which are represented by qualitative observations (such a\
    \ poor sleep quality). The user will be prompted to opt into permissions for every\
    \ object type you try to operate on.\n\nTo request HealthKit permissions, you\
    \ need to call the `[HKHealthStore requestAuthorizationToShareTypes:readTypes:completion:]`\
    \ method, on an `HKHealthStore` object. The `HKHealthStore` class represents an\
    \ interface to HealthKit for data operations, similar to how a managed object\
    \ context provides an interface to a database in Core Data. Just as with a database,\
    \ it does not make sense to create a health store for every data operation you\
    \ want to perform, so declare one as an instance variable. For the `MainViewController`\
    \ class, this property is called `healthStore`:\n\n```\n@property (nonatomic,\
    \ strong) HKHealthStore *healthStore;\n```"
