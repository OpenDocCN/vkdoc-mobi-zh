    \ 直接连接到远程控制事件和“正在播放”中心。通过将这些处理程序添加到代码中，您可以为 AirPlay 应用程序构建一个功能完整的用户体验。\n\n**Note**:\
    \ 默认情况下，音量滑块是白色的。如果您看不到音量滑块，请尝试更改视图的背景颜色。\n\n## 总结\n\n在本章中，您看到了如何通过添加后台音频支持、“正在播放”中心以及路由更改和音频中断通知，显著扩展基于音频的应用程序的性能。通过添加这些功能，您还了解到实现\
    \ AirPlay 只需在类中添加一个`MPVolumeView`即可。虽然无法预测用户会如何使用您的应用程序，但您可以利用 Apple 提供的有限后台音频功能，使您的应用程序更加令人愉悦。\n\
    \n# 第 3 部分：视频\n\n# 第 8 章：播放和录制视频\n\n在本章中，您将深入学习如何在应用程序中使用视频，了解如何播放和录制视频文件。作为一种格式，视频比静态图像或照片更复杂，需要显著的底层支持。幸运的是，有\
