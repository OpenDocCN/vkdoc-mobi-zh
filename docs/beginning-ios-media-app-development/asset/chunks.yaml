    Summary


    In this chapter, you saw how to repurpose the MyPod application, turning it from
    a simple iPod-based music player to a powerful HealthKit-connected workout fitness
    application. By integrating Core Motion into the application, you were able to
    create an accessory-less interface to the M-series motion coprocessor on the user’s
    device, and you were able to query pedometer data directly as a step count. To
    make your application work well with other fitness apps, and to obtain a total
    snapshot of the user’s daily activity, you integrated HealthKit into the app as
    the repository for health information. Along the way, you learned how design similarities
    in the two frameworks allow you to quickly convert data types and use similar
    design patterns for retrieving data.


    Chapter    14


    Getting Started with Swift


    It is very hard to end an iOS book written after June 2, 2014 without a mention
    of one of the most earthshaking announcements in recent years: Swift. *Swift*
    is Apple’s brand-new programming language, intended to lower the barrier to entry
    to iOS and OS X. For many developers, Objective-C’s unique blend of C and Smalltalk
    syntax is extremely daunting. It is rare for universities to have a purely C-based
    computer science curriculum these days, because the jobs that rely on it typically
    involve either extremely low-level programming or legacy code. While Smalltalk
    was one of the first pure object-oriented programming (OOP) languages, its syntax
    is unlike any other popular language, and the language rarely sees adoption nowadays
    outside the realm of teaching concepts.


    To address this problem, Apple hopes to use Swift to marry the design concepts
    of Objective-C with the best syntax features of newer programming languages, such
    as Java, Python, and Haskell. To give the language legs, Apple has announced that
    Xcode, Cocoa, and Cocoa Touch are fully compatible with Swift, allowing you to
    build apps entirely in Swift. That compatibility also means that developers who
    are still learning the language can mix Objective-C and Swift in their projects.


    In this chapter, you will see how to get started with Swift by converting the
    MyAVPlayer project from [Chapter 9](#9781430250838_Ch09.xhtml) from Objective-C
    to Swift. Along the way, I will cover Swift syntax as you port different parts
    of the project, discuss how you can integrate Swift with your existing Objective-C
    code, and highlight how you need to modify your Xcode workflow for Swift.


    This chapter is intended only as a very high-level overview of the Swift programming
    language. For a more in-depth discussion of the language, I recommend *Beginning
    iPhone Development with Swift* by David Mark et al. (Apress, 2014), as well as
    Apple’s own guide to the language, *The Swift Programming Language*, available
    from the iBooks Store.


    Getting Started


    In this chapter, you will port the MyAVPlayer project to Swift. The resulting
    project will be called SwiftAVPlayer and is included in the [Chapter 14](#9781430250838_Ch14.xhtml)
    folder of the source code bundle. Before getting started, it’s worth reviewing
    the mock-up of the MyAVPlayer project from [Chapter 1](#9781430250838_Ch01.xhtml),
    provided in [Figure 14-1](#9781430250838_Ch14.xhtml#Fig1).


    ![9781430250838_Fig14-01.jpg](images/9781430250838_Fig14-01.jpg)


    [Figure 14-1](#9781430250838_Ch14.xhtml#_Fig1). Mock-up of MyAVPlayer project


    In the MyAVPlayer project, the goal was to create a media playback app using the
    `AVKit` framework. Users could initiate playback by clicking the Choose File and
    Play All buttons at the bottom of the main view controller, which let them manually
    select a file to play or automatically play (respectively) all of the files available
    in the app’s documents directory. The SwiftAVPlayer project will retain this functionality.


    Creating a New Project


    As with Objective-C projects, the first step in creating a Swift project is to
    select New ä Project from Xcode’s File menu. You will see the familiar project
    wizard that you saw in the Objective-C projects you have created throughout this
    book. However, to create a Swift project, select Swift in the Language drop-down,
    as shown in [Figure 14-2](#9781430250838_Ch14.xhtml#Fig2). To target both iPhone
    and iPad, select Universal for your Device type.


    ![9781430250838_Fig14-02.jpg](images/9781430250838_Fig14-02.jpg)


