    Summary


    In this chapter, you saw how to use the `MPMoviePlayerController` class to play
    video and how to use the `UIImagePickerController` class to record video. In the
    MyVideoPlayer application, you saw that most of the differences between using
    the `MediaPlayer` framework to play audio and video lie in configuring the player’s
    playback settings and parent view. To help catch errors and auto-play content,
    you saw how to implement notification observers.


    In the MyVideoRecorder application, you learned how to add video recording to
    the MyVideoPlayer application by integrating the `UIImagePickerController`. You
    saw, once again, that by switching this class to handle only video and adding
    some extra configuration options, you could create a user experience that enables
    easy video capture.


    Chapter    9


    Building a Custom Video-Playback Interface


    Following the trend of the image and audio units in the book, now that you have
    learned how to use Apple’s built-in interfaces for video playback and recording,
    you are ready to start learning how to “take control” of their core functionality.
    In this chapter, you will learn how to customize a video-playback interface, allowing
    you to expose your branding and the controls that are most appropriate for your
    app.


    To accomplish this, you will need to build your own user interface on top of `AVFoundation`’s
    media-playback features, just as you did with the audio applications you developed
    in [Chapters 6](#9781430250838_Ch06.xhtml)–[8](#9781430250838_Ch08.xhtml). While
    this may seem daunting, the good news is that the media-playback layer is relatively
    easy to set up; most of the work is in building your user experience.


    The fundamental steps to implement an `AVFoundation` -based video player are as
    follows:


    1.  Set up a media player using the `AVPlayer` class.

    2.  Use the `AVPlayerLayer` class to display video.

    3.  Create custom playback controls using Interface Builder.

    4.  Create handlers for playback controls and state changes.


    In this chapter, you will learn how to implement these steps by swapping the video
    player from the MyVideoPlayer project with a custom subclass that you develop.
    This project is included in the [Chapter 9](#9781430250838_Ch09.xhtml) folder
    of the source code bundle as MyCustomVideoPlayer. To help ease the transition,
    you will design a notification-based messaging system that mimics the `MPMoviePlayerController`
    class very closely.


    Most video applications need to expose a full set of controls during full-screen
    mode, so the project focuses on building controls for a full-screen video-playback
    interface. You can find the updated mock-up for the video-playback interface in
    Figure [9-1](#9781430250838_Ch09.xhtml#Fig1).


    ![9781430250838_Fig09-01.jpg](images/9781430250838_Fig09-01.jpg)


    [Figure 9-1](#9781430250838_Ch09.xhtml#_Fig1). Mock-up for MyCustomVideoPlayer
    video-playback interface


    Comparing the new video-playback interface to the default iOS video interface,
    shown in [Figure 9-2](#9781430250838_Ch09.xhtml#Fig2), you can see that this project
    places greater emphasis on phone operation. Rather than having to squint to find
    the Play button or to seek a couple of seconds, the larger buttons in the center
    reduce users’ chances of making mistakes. During playback, the slider at the bottom
    of the screen updates to show current progress, displayed by advancing the slider
    to the right. Users can also use this control to *scrub* (skip) to any point in
    the video. Users can toggle playback or skip forward or backward by a few seconds
    by using the controls in the center of the screen. After a few seconds of inactivity,
    the controls disappear, making them available without being a distraction or taking
    up screen real estate.


    ![9781430250838_Fig09-02.jpg](images/9781430250838_Fig09-02.jpg)


    [Figure 9-2](#9781430250838_Ch09.xhtml#_Fig2). Default iOS video-playback interface
    (left) vs. custom playback interface (right)


