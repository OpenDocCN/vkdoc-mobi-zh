    在本章中，你将了解如何使用外部源在应用中播放更多类型的音频。通过扩展你在第 5 章中学到的音频基础知识，本章将介绍如何播放来自 iTunes 和流媒体源的音乐，以及在应用中播放事件声音（当事件发生时触发的短音效，例如按下按钮）。在实现这些新的音频源时，你将看到如何重用在播放简单音频文件时首次遇到的设计模式（例如请求共享资源、事件驱动消息处理以及实现自定义用户界面），并将其应用到其他类中，以及如何为这些类注入额外的逻辑，使你的应用能够播放多种源类型。


    本章的主要部分（关于 iTunes、流媒体音频和事件声音）由示例项目支撑，你可以在本书提供的源代码包的`Chapter 6`文件夹中找到这些项目。（请参见
    Apress 网站的 Source Code/Download 区域，`www.apress.com`）。


    ### 从 iTunes 导入音乐


    在第 5 章中，你学习了如何在应用中使用音频文件。但是，你必须导入所有想要使用的音频文件，要么将它们与应用捆绑在一起，要么通过 iTunes 文件共享。幸运的是，Apple
    通过`MPMusicPlayerController`类提供了对用户设备上 iPod 音乐库的访问权限。当你希望用户能够在应用中播放他们自己的音乐，或者希望应用为用户当前加载的播放列表提供控制时，这非常有用。


    `MPMediaPlayerController`中的*MP*来源于它所基于的框架：`MediaPlayer`框架。`MediaPlayer`框架是专门为媒体播放而构建的，使其能够处理更复杂的任务，例如播放视频、解码来自播客和有声读物的书签信息，以及访问
    iPod 应用。`MediaPlayer`框架将在后续章节中发挥关键作用，你将使用它来播放视频。


    与你之前用来播放声音文件的`AVAudioPlayer`类类似，`MPMusicPlayerController`类允许你在应用中构建一个自定义媒体播放器，包含播放控制方法和查询播放状态的方法。其中一些控件你已经很熟悉了，例如播放、暂停和快进/快退，以及模拟
    iPod 应用行为的新控件，例如切换播放列表的随机播放模式。不幸的是，`MPMusicPlayerController`也是一个无头类，这意味着你必须实现自己的用户界面。此外，作为一个设计用于与
    iPod 音乐库交互的类，你只能用它播放 iTunes 媒体。你可以通过继续维护一个用于播放其他音频文件的`AVAudioPlayer`对象来规避这个限制。


    在本节中，你将学习如何使用`MPMediaPlayerController`类在应用中播放 iPod 音乐库中的音乐，方法是构建如图 6-1 所示的音乐播放器应用。你可以在本书源代码包的`Chapter
    6`文件夹中找到这个应用。该项目名为`MyPod`。


    ![9781430250838_Fig06-01.jpg](img/9781430250838_Fig06-01.jpg)


    *图 6-1. MyPod 项目原型图*


    `MyPod`应用允许用户通过点击主视图控制器底部的按钮来选择要播放的歌曲或专辑。用户可以使用表视图控制器在项目之间导航。当用户选择了一首歌曲或专辑后，应用会提供当前播放歌曲的播放控制以及当前播放列表的导航控制。


    `MyPod`应用的目标是向你展示实现基于`MPMusicPlayerController`的音乐播放器的关键概念，具体如下：


    *   初始化音乐播放器

    *   指定媒体查询（你可以将其视为播放列表）

    *   构建播放界面

    *   显示曲目信息（元数据）


    ### 开始


    与本教程中的其他项目一样，你首先创建一个基于“单视图应用程序”模板的项目。使用图 6-1 中的原型图来帮助你选择要添加到故事板中的用户界面元素。务必添加一个表视图控制器，以便用户可以选择音乐。你不需要通过转场链接两个视图控制器，因为你将使用按钮处理程序来管理页面切换。完成后的故事板应类似于图
    6-2 中的截图。


    ![9781430250838_Fig06-02.jpg](img/9781430250838_Fig06-02.jpg)


    *图 6-2. MyPod 项目完成的故事板*


    `MainViewController`类代表此应用的主视图。在实现该类之前，请确保已将`MediaPlayer`框架添加到项目中。在头文件（`MainViewController.h`）的顶部，引入该框架：


    ```objc

    #import <MediaPlayer/MediaPlayer.h>

    ```


    列表 6-1 显示了一个可用于实现`MainViewController`类的头文件。和往常一样，使用这些属性将你的故事板链接到该类。


    ***列表 6-1. MainViewController 类的头文件***


    ```objc

    #import <UIKit/UIKit.h>

    #import <MediaPlayer/MediaPlayer.h>

    #import "MediaTableViewController.h"


    @interface MainViewController : UIViewController


    @property (nonatomic, strong) MPMusicPlayerController *musicPlayer;


    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *rewindButton;

    @property (nonatomic, strong) IBOutlet UIButton *forwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *prevButton;

    @property (nonatomic, strong) IBOutlet UIButton *nextButton;


    @property (nonatomic, strong) IBOutlet UIButton *chooseTrackButton;

    @property (nonatomic, strong) IBOutlet UIButton *chooseAlbumButton;


    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;

    @property (nonatomic, strong) IBOutlet UILabel *albumLabel;

    @property (nonatomic, strong) IBOutlet UIImageView *albumImageView;


    -(IBAction)toggleAudio:(id)sender;

    -(IBAction)startFastForward:(id)sender;

    -(IBAction)startRewind:(id)sender;

    -(IBAction)stopSeeking:(id)sender;

    -(IBAction)chooseTrackButton:(id)sender;

    -(IBAction)chooseAlbumButton:(id)sender;

    @end

    ```


    对于此应用，你需要从多个函数中访问`MPMediaPlayerController`对象，因此请确保像示例中所示将其定义为实例变量。


    ### 初始化音乐播放器


    与硬件摄像头或麦克风类似，iPod 音乐库是一个共享资源。`MPMusicPlayerController`类通过允许你将音乐播放器实现为“应用音乐播放器”或“iPod
    音乐播放器”来处理此限制。*应用音乐播放器*可以从 iPod 音乐播放器中拉取媒体项目，但不会对 iPod 应用的状态产生任何影响。*iPod 音乐播放器*是应用内的一个媒体播放器，它更像是一个
    iPod 应用的遥控器，而不是一个独立的音乐播放器。你所有的播放设置更改和媒体选择都会影响 iPod 应用。这对于你想让用户在应用中控制或更改他们的“*现正播放*”播放列表的应用来说非常合适。


    你可以通过为要实现的音乐播放器类型调用相应的类方法来实例化音乐播放器：


    ```objc

    self.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];

    ```

