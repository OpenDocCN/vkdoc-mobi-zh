  trans: '

    在使用 `MyVideoPlayer` 项目中的文件选择器时，你需要修改转场处理程序 `[self prepareForSegueWithIdentifier:]`。这一次，不要像之前那样使用
    iPod 媒体初始化文件选择器，而是需要填充由 `MediaPlayer` 框架所支持的文件。与第 5 章中的 `MyPlayer` 应用程序一样，你可以通过在应用文档目录中搜索文件扩展名与受支持文件格式相匹配的文件来生成此列表。输入数组准备好之后，你就可以展示文件选择器了。此逻辑将位于主视图控制器的转场处理程序中，如代码清单
    8-4 所示。


    ***代码清单 8-4***.  用于填充并展示文件选择器的转场处理程序


    ```

    -(void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender

    {

        if ([segue.identifier isEqualToString:@"showFilePicker"]) {

            NSMutableArray *videoArray = [NSMutableArray new];


    NSArray *paths =

                NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                NSUserDomainMask, YES);

            NSString *documentsDirectory = [paths objectAtIndex:0];

            NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

                contentsOfDirectoryAtPath:documentsDirectory error:&error];


    if (error == nil) {


    for (NSString *file in allFiles) {

                    if ([[file pathExtension] isEqualToString:@"m4v"] ||

                        [[file pathExtension] isEqualToString:@"mov"]) {

                        [videoArray addObject:file];

                    }

                }


    } else {

                NSLog(@"error looking up files: %@", [error description]);

            }


    UINavigationController *navigationController =

                 (UINavigationController *)segue.destinationViewController;

            FileViewController *fileVC =

                 (FileViewController *)navigationController.topViewController;

            fileVC.delegate = self;

            fileVC.fileArray = videoArray;

        }

    }

    ```


    你应该在每个单元格中显示文件名，因此请使用该文件名来填充输入数组。


    同样，请记住在主视图控制器的头文件中指定你将实现 `FileControllerDelegate` 协议：


    ```

    @interface MainViewController : UIViewController

        <FileControllerDelegate>

    ```


    `FileControllerDelegate` 协议指定了一个方法，该方法在用户选取文件后返回一个文件路径。你可以使用它在 `MainViewController`
    类中初始化 `MPMoviePlayerController` 对象。在你的主视图控制器的 `[FileControllerDelegate didFinishWithItem:]`
    委托方法中，将 `filePath` 字符串转换为 `NSURL` 对象，并用它来初始化你类的 `mediaPlayer` 对象。与之前的应用程序一样，你的媒体播放器应该是一个实例变量，因为会有许多方法访问它。你可以在代码清单
    8-5 中找到一个示例。


    ***代码清单 8-5***.  在用户选择项目后初始化视频播放器


    ```

    -(void)didFinishWithFile:(NSString *)filePath

    {

        NSURL *fileURL = [NSURL URLWithString:filePath];

        self.moviePlayer = [[MPMoviePlayerController alloc]

            initWithContentURL:fileURL];


    //解散文件选择器

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ### 为媒体播放器指定父视图


    尽管你的视频播放器对象已在内存中分配，但你仍然需要指定一个父视图才能在应用中显示它。此过程类似于你在第 4 章创建自定义相机应用时将视频层添加到视图的方式——为你的播放器设置与其父视图相同的边界框，然后将其添加为子视图。


    与所有 `UIView` 对象一样，你需要指定视图的尺寸及其位置。`frame` 属性是一个 `CGRect` 数据结构，包含视图的尺寸及其相对于屏幕左上角的
    (x,y) 位置。对于所有视图，第二个属性 `bounds` 指定了视图的可见区域（即其*边界*框）。`bounds` 属性的 (x,y) 位置是相对于*frame*
    的原点，而不是相对于屏幕的原点。默认情况下，`bounds` 属性被设置为目标视图的左上角位置，但如果你试图重新定位或裁剪子视图，则可以更改它。


    此应用的目标是使影片播放器填满 `playerView` 的可见区域。因此，`MPMoviePlayerController` 的 `view` 的 `frame`
    需要与 `playerView` 的尺寸相匹配，并且具有相对位置。`bounds` 属性是解决此问题的完美方案：


    ```

    self.moviePlayer.view.frame = self.playerView.bounds;

    ```


    在为 `MPMoviePlayerController` 对象设置 `frame` 之后，将其 `view` 作为子视图添加到 `playerView` 之上，这将使其成为可见属性：


    ```

    [self.playerView addSubview:self.moviePlayer.view];

    ```


    现在你将得到最终的解决方案，如代码清单 8-6 所示。


    ***代码清单 8-6***.  将视图定位添加到您的初始化代码中


    ```

    -(void)didFinishWithFile:(NSString *)filePath

    {

        NSURL *fileURL = [NSURL URLWithString:filePath];

        self.moviePlayer = [[MPMoviePlayerController alloc]

            initWithContentURL:fileURL];


    self.moviePlayer.view.frame = self.playerView.bounds;

        [self.playerView addSubview:self.moviePlayer.view];


    //解散文件选择器

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    **注意** 如果你想要一个仅在**全屏模式**下运行的影片播放器，请使用 `MPMediaPlayerViewController` 类。其初始化路径和通知与
    `MPMediaPlayerController` 相同；主要的操作区别在于，当视图被解散时，该对象会被释放。


    ### 向类添加通知处理


    作为初始化媒体播放器的最后一步，你需要将 `MainViewController` 注册为 `MPMoviePlaybackStateDidChangeNotification`
    通知的接收者。`MPMoviePlayerController` 类完全依赖通知来传递消息，这与之前使用的音频播放器和相机类不同，后者使用委托。你可以在下面的侧边栏中找到关于如何使用通知的更详细解释，但这里有一个快速总结：要处理通知，你需要明确声明你的类将处理哪些通知，并将这些通知绑定到处理程序方法。


    #### 通知入门


    在任何编程语言中，*消息传递*是进程间发送信息的方式。在类的实例上调用方法是最简单的消息传递形式之一：你让接收者（对象）知道要执行什么消息（方法），以及使用什么数据（参数）。


    直接向另一个类发送消息并不总是方便或明智的。对于一个非常通用的类，你不想包含可能调用其方法的其他每个类的头文件。同样，你也不想包含调用一个相当复杂的类上的消息所需的所有内容。


    为了解决这个问题，Cocoa Touch 提供了三种在类之间执行通用消息传递的专门方式：


    - 协议

    - 通知

    - 键值观察

    '
- fmt: "# Protocols and Notifications in iOS Development\n\nYou should already be\
    \ familiar with protocols from previous chapters. Protocols are ideal when you\
    \ want to define limited interfaces for passing data between two classes (for\
    \ instance, the camera and the class that needs an image from a camera). However,\
    \ protocols can also be very strict. Every method in a protocol’s definition is\
    \ implicitly defined as being `required`, meaning the delegate class needs to\
    \ implement all the methods to be fully compliant.\n\nThe `MPMediaPlayerController`\
    \ class can issue many kinds of messages, including playback state, stream errors,\
    \ and presentation mode changes (for example, full-screen). Using a delegate to\
    \ implement all of these could get unwieldy. For the media player, you want a\
    \ message-passing scheme that allows a receiving class to handle only the messages\
    \ it wants, without a huge overhead.\n\nNotifications are ideal when you want\
    \ to use a loose message-passing scheme. A notification is a name-based message-passing\
    \ system in which anyone can *post* a notification by sending a properly formed\
    \ message using that name, and anyone can handle (*observe*) a notification by\
    \ declaring they can receive properly formatted messages using that name. This\
    \ magic is enabled by a *notification center* object, which acts as an intermediary\
    \ for all the notifications.\n\nThe third generic message-passing scheme, key-value\
    \ observing (KVO), works similarly to notifications, except that instead of being\
    \ a name-based system, KVO is based on an instance of an object changing. For\
    \ instance, “when the `count` variable changes, call the `increaseCount` method.”\
    \ While useful in some cases, this is not appropriate for the media player, because\
    \ you will not be monitoring changes on a property.\n\n## Adding Notification\
    \ Observers\n\nThere are two major APIs for declaring your class as an *observer*\
    \ of a notification: `[NSNotificationCenter addObserver:selector:name:object]`\
    \ and `[NSNotificationCenter addObserverForName:object:queue:usingBlock]`. Both\
    \ require you to specify the name of the notification you want to observe and\
    \ how it should be handled. The main difference between these two is that the\
    \ first calls a method at runtime (via the `@selector` parameter) whenever the\
    \ notification is caught, whereas the second executes a block. As an example,\
    \ if you were trying catch a `MPMoviePlayerLoadStateDidChangeNotification` notification\
    \ with a handler method declared as `[self stateChanged:]`, your code would look\
    \ like this:\n\n```\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \    selector:@selector(stateChanged:)\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
    \    object:nil];\n```\n\nYou may have questions about the `[NSNotificationCenter\
    \ defaultCenter]` code snippet. This is a singleton that provides a notification\
    \ center object your application can use—without any specialized setup. Until\
    \ your code becomes sophisticated enough to require filtering notifications by\
    \ which notification center they are sent to, this should be fine for most apps.\n\
    \n## Posting and Removing Notifications\n\nTo send a notification, you *post*\
    \ an `NSNotification` object by using the method `[NSNotificationCenter postNotification:object:userInfo]`.\
    \ With this method, you need to specify the name of the notification you are posting\
    \ and any information you are passing along, by adding it to an `NSDictionary`\
    \ object via the `userInfo` parameter. If you were posting a custom notification,\
    \ named `MyCustomNotification`, the code would look like this:\n\n```\nNSDictionary\
    \ *myDict = [NSDictionary dictionaryWithObject:@\"ahmed\"\n                  \
    \                   forKey:@\"userName\"];\n[[NSNotificationCenter defaultCenter]\n\
    \      postNotificationName:@\"MyCustomNotification\" object:self\n      userInfo:myDict];\n\
    ```\n\nOne last thing about notifications: always remember to remove observers\
    \ for a class when it is being deallocated. Unless you explicitly remove observers,\
    \ the notification center will try to keep using your class to handle incoming\
    \ notifications, which could cause your application to crash. To remove observers,\
    \ use the method `[NSNotificationCenter removeObserver:name:object]`. For the\
    \ `MyCustomNotification` example, the call would look like this:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] removeObserver:self\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
    \    object:nil];\n```\n\nAs you can see, notifications are a quick way of setting\
    \ up message passing. For classes that need to enforce a specific message-passing\
    \ scheme, delegates are ideal, but if you are just trying to make a simple scheme\
    \ that anyone can choose to respond to, notifications are the perfect solution.\n\
    \n## Practical Implementation\n\nAs covered in the preceding sidebar, the first\
    \ step in handling notifications is to declare your class as an observer. Because\
    \ this is a class-level operation, you can set the observers in the `[self viewDidLoad]`\
    \ method for the `MainViewController` class. By making this a class-level operation,\
    \ you are ready if the media player is initialized several times or if it is never\
    \ initialized at all (the messages will never be sent if the media player is never\
    \ initialized). [Listing 8-7](#9781430250838_Ch08.xhtml#list7) shows the modified\
    \ `[self viewDidLoad]` method for the `MainViewController` class.\n\n**Listing\
    \ 8-7.** Adding Notification Observers to Your Class\n\n```\n- (void)viewDidLoad\
    \ {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view,\n    // typically from a nib.\n\n[[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n        selector:@selector(playbackFinished:)\n        name:MPMoviePlayerPlaybackDidFinishNotification\
    \ object:nil];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n   \
    \     selector:@selector(loadStateChanged:)\n        name:MPMoviePlayerLoadStateDidChangeNotification\
    \ object:nil];\n}\n```\n\nIn this example, I used the `[NSNotificationCenter addObserver:selector:name:object]`\
    \ API to set the observers so that I could specify a method to use as the notification\
    \ handler instead of a block—mostly to make the code easier for you to read when\
    \ it is split up.\n\nThe `MPMoviePlayerPlaybackDidFinishNotification` notification\
    \ returns an `MPMovieFinishReason` constant via the `MPMoviePlayerPlaybackDidFinishReasonUserInfoKey`\
    \ key and an error via the `error` key. If the finish reason is `MPMovieFinishReasonPlaybackError`,\
    \ you should extract the error object and notify the user via an error message\
    \ or `UIAlertView`. You can find the `[self playbackFinished:]` method for the\
    \ `MainViewController` class in [Listing 8-8](#9781430250838_Ch08.xhtml#list8).\n\
    \n**Listing 8-8.** Displaying the Playback Error\n\n```\n-(void)playbackFinished:(NSNotification\
    \ *) notification\n{\n    NSDictionary *userInfo = notification.userInfo;\n  \
    \  NSNumber *finishReason = [userInfo\n        objectForKey:MPMoviePlayerPlaybackDidFinishReasonUserInfoKey];\n\
    \nif ([finishReason integerValue] ==\n        MPMovieFinishReasonPlaybackError)\
    \ {\n        NSError *error = [userInfo objectForKey:@\"error\"];\n        NSString\
    \ *errorString = [error description];\n\nUIAlertView *alert = [[UIAlertView alloc]\n\
    \            initWithTitle:@\"Error!\"\n            message:errorString delegate:nil\n\
    \            cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n        [alert\
    \ show];\n    }\n}\n```"
