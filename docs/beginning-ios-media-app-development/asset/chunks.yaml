    As with the `MediaPlayer`-based implementation, your content URL needs to be created
    at runtime, to correctly determine the location of your app’s documents directory
    (remember, the exact location is tied to a UUID that is auto-generated by iOS).


    **Note**  If you want to load an `AVComposition` or `AVPlayerItem` directly, you
    can use the`[AVPlayer playerWithPlayerItem:]` method.


    After an `AVPlayer` object has been initialized, a user can click the Play button
    to start file playback. However, to fully implement the workflow of the MyVideoPlayer
    project, you need to add two final steps:


    1.  Present the `AVPlayerViewController`.

    2.  Define media playback events, (for example, preloading the media so it will
    load faster).


    Presenting the AVPlayerViewController


    From a user interface perspective, `AVPlayerViewController` has two major advantages
    over `MPMoviePlayerController`: it provides *adaptive* controls that respond to
    both the size of the window and to the type of content being played, and it provides
    an object representation you use in Interface Builder, as shown in [Figure 12-6](#9781430250838_Ch12.xhtml#Fig6).


    ![9781430250838_Fig12-06.jpg](images/9781430250838_Fig12-06.jpg)


    [Figure 12-6](#9781430250838_Ch12.xhtml#_Fig6). Interface Builder object for AVPlayerViewController


    As shown in [Figure 12-7](#9781430250838_Ch12.xhtml#Fig7), the `AVPlayerViewController`
    class will automatically switch the control types based on the presentation style
    (windowed or full-screen). In contrast, the `MPMoviePlayerController` required
    users to specify their control style.


    ![9781430250838_Fig12-07.jpg](images/9781430250838_Fig12-07.jpg)


    [Figure 12-7](#9781430250838_Ch12.xhtml#_Fig7). Control differences between two
    AVPlayerViewController presentation styles


    As with the `MPMoviePlayerController` class, users can click the Expand control
    in the embedded player to toggle between windowed and full-screen playback.


    **Note**  You can still hide the `AVPlayerViewController` controls completely
    by using the `showsPlaybackControls` property.


    Similarly, the controls change based on whether the user is playing a local media
    file or a streaming one. As shown in [Figure 12-8](#9781430250838_Ch12.xhtml#Fig8),
    local playback exposes a Play button and Forward/Back buttons so users can navigate
    through a playlist, while streaming playback exposes a Play button and a Repeat
    button. As with control style, the `AVPlayerViewController` class does all of
    this automatically.


    ![9781430250838_Fig12-08.jpg](images/9781430250838_Fig12-08.jpg)


    [Figure 12-8](#9781430250838_Ch12.xhtml#_Fig8). `AVPlayerViewController` control
    differences between local and streaming files


    Although the user interface for the MyAVPlayer project should replicate the MyVideoPlayer
    project, you need to change the view initialization code. The `AVPlayer` class
    is responsible for controlling media playback while the `AVPlayerViewController`
    acts as a wrapper for the user interface. To present an `AVPlayerViewController`
    in windowed mode, use a container view to contain the `AVPlayerViewController`
    object.


    To place the `AVPlayerViewController` on the `MainViewController` class, drag
    and drop Container View and AVPlayer View Controller objects from the Interface
    Builder Object Library onto your storyboard, as shown in [Figure 12-9](#9781430250838_Ch12.xhtml#Fig9).


    ![9781430250838_Fig12-09.jpg](images/9781430250838_Fig12-09.jpg)


    [Figure 12-9](#9781430250838_Ch12.xhtml#_Fig9). Completed storyboard for MyAVPlayer
    project


    Attach the container view to the `playerView` property in your `MainViewController`
    class. To initialize the view, create an *embed* segue named `setPlayer`. The
    system will call this segue only once—after the view has loaded. As with all segues,
    add this to the `[MainViewController prepareForSegue:sender:]` method, as shown
    in [Listing 12-3](#9781430250838_Ch12.xhtml#list3).


