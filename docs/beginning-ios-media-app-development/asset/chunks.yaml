    ## 使用 AVPlayer 类播放媒体文件


    与`MPMediaPlayerController`类一样，要初始化一个`AVPlayerViewController`对象，你需要为其提供一个媒体文件或内容
    URL 作为输入。`AVPlayer`类负责处理`AVPlayerViewController`类的播放功能。`AVPlayer`类使用`AVPlayerItem`对象（`AVAsset`的子类）来表示媒体项。与`MPMediaItem`对象不同，`AVAsset`可以以*容器*格式表示媒体文件，可以包含多个字幕和音轨，并且可以表示`AVComposition`对象——这些特殊对象可向资产添加基于时间的特效，如滤镜和转场。


    你可以使用`[AVPlayer playerWithURL:]`方法，通过单个媒体文件初始化`AVPlayer`对象。这样做会自动将你的内容 URL 转换为一个`AVPlayerItem`对象。与
    MyVideoPlayer 应用类似，你应该在用户从文件选择器中选择文件后初始化`AVPlayer`。将你的初始化代码放在`FileControllerDelegate`协议的处理器方法`[FileControllerDelegate
    didFinishWithFile:]`中，如代码清单 12-2 所示。这将替换你之前的`MPMoviePlayerController`初始化代码。


    **代码清单 12-2.** 将媒体文件加载到 AVPlayer 对象中

