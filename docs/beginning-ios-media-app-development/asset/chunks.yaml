- fmt: "当您的应用收到更新时，应在“Workout Progress”（锻炼进度）标签中显示更新的步数。表示计步器事件的`CMPedometerData`类通过将`numberOfSteps`属性声明为`NSNumber`对象，使这一操作变得简单。您可以通过调用`[NSNumber\
    \ intValue]`方法获取`int`类型的值，并将其包含在字符串中来显示此值：\n\n```\nNSString *workoutProgressString\
    \ = [NSString stringWithFormat:@\"%ld steps\",\n    [pedometerData.numberOfSteps\
    \ intValue]];\nself.workoutProgressLabel.text = workoutProgressString;\n```\n\n\
    在将此代码添加到处理程序方法之前，您需要考虑一个复杂情况：块（block）总是在**后台**执行，而用户界面总是在主线程上执行。为弥合这一差距，请使用`dispatch_async(dispatch_queue_t\
    \ queue, dispatch_block_t block)`方法在主队列上更新`workProgressLabel`对象。`dispatch_async()`的第一个参数接受一个队列对象，第二个参数接受一个块。通过传入`dispatch_get_main_queue()`作为队列，您可以自动获取指向主执行队列的指针：\n\
    \n```\ndispatch_async(dispatch_get_main_queue(), ^{\n    self.workoutProgressLabel.text\
    \ =\n    [NSString stringWithFormat:@\"%ld steps\",\n    [pedometerData.numberOfSteps\
    \ integerValue]];\n    });\n```\n\n您可以在[Listing 13-6](#9781430250838_Ch13.xhtml#list6)中找到`MyFitnessPod`项目的完整实现。\n\
    \n[***Listing 13-6***](#9781430250838_Ch13.xhtml#_list6). 计步器更新块（包括用户界面变更）\n\n\
    ```\n-(IBAction)toggleWorkout:(id)sender\n{\n    if (self.isWorkoutActive) {\n\
    \        // stop workout\n    } else {\n        // start workout\n        if ([CMMotionActivityManager\
    \ isActivityAvailable] &&\n            [CMPedometer isStepCountingAvailable])\
    \ {\n            self.pedometer = [[CMPedometer alloc] init];\n            self.isWorkoutActive\
    \ = YES;\n            self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
    \ = @\"0 steps\";\n            self.workoutButton.titleLabel.text = @\"Stop Workout\"\
    ;\n            [self.pedometer\n                startPedometerUpdatesFromDate:self.startDate\n\
    \                withHandler:^(CMPedometerData *pedometerData,\n             \
    \   NSError *error) {\n                NSLog(@\"number of steps: %ld\",\n    \
    \                [pedometerData.numberOfSteps integerValue]);\n              \
    \  dispatch_async(dispatch_get_main_queue(), ^{\n                    self.workoutProgressLabel.text\
    \ =\n                    [NSString stringWithFormat:@\"%ld steps\",\n        \
    \            [pedometerData.numberOfSteps integerValue]];\n                });\n\
    \            }];\n        } else {\n            UIAlertView *errorAlert = [[UIAlertView\
    \ alloc]\n                initWithTitle:@\"Error\"\n                message:@\"\
    Motion permission required\"\n                delegate:self\n                cancelButtonTitle:@\"\
    OK\"\n                otherButtonTitles:nil];\n            [errorAlert show];\n\
    \        }\n    }\n}\n```\n\n## 集成后台更新\n\n任何应用的重中之重都是其后台功能。对于锻炼应用来说，这一点尤为重要，因为用户可能会忙碌30分钟或更长时间（远超多数iOS设备的休眠设置）。好消息是，由于您使用开始时间初始化了`[CMPedometer\
    \ startPedometerUpdatesFromDate:withHandler]`方法，将应用置于后台并不会阻止该方法在返回前台时返回准确信息（更新仍会与您提供的原始时间进行比较）。\n\
    \n后台更新遇到的问题是用户界面的初始化问题。在应用处于后台时更新用户界面没有意义，因为用户永远不会看到这些信息。然而，与此同时，您又不希望用户回到应用时仍然看到旧的锻炼进度显示在屏幕上（在下一次更新之前会一直如此）。为解决此问题，请使用`CMPedometer`类的拉取机制，在应用返回前台后立即检索用户的步数。\n\
    \n对于`MainViewController`类，您可以使用`[self viewDidAppear:]`方法来处理此事件。每当视图出现时，都会调用`[self\
    \ viewDidAppear:]`事件，无论这次出现是由于应用从后台返回、首次初始化，还是其他视图消失所致。如[Listing 13-7](#9781430250838_Ch13.xhtml#list7)所示，通过检查锻炼是否已激活，您可以在锻炼开始后仅查询这些更新。\n\
