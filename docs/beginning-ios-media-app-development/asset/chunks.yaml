    \ Saving Images to the Photo Library\n\nFor many photo-based apps, you will want\
    \ to be able to give other apps access to images that were created or manipulated\
    \ within your app. In this case, it would be more appropriate to save the images\
    \ directly to the system’s photo library. To facilitate this, Apple provides a\
    \ convenience method, `UIImageWriteToSavedPhotosAlbum()`, which allows you to\
    \ save a `UIImage` object directly to the Camera Roll photo album.\n\nTo use the\
    \ `UIImageWriteToSavedPhotosAlbum()` method, you need pass the `UIImage` object\
    \ you want to save and, optionally, a completion handler that will execute when\
    \ the operation has finished. You can use your completion handler to determine\
    \ whether the save was successful and to perform a subsequent action, such as\
    \ displaying a `UIAlertView`:\n\n```\nUIImageWriteToSavedPhotosAlbum(self.originalImage,\
    \ self,\n                               @selector(image:didFinishSavingWithError:contextInfo:),\
    \ nil);\n```\n\nIf you are using a completion handler, be careful to pass both\
    \ the `completionTarget` parameter (in this case, `self`) and the selector for\
    \ your handler method. Otherwise, your code will not know what method to use at\
    \ runtime or where to look for it. [Listing 3-5](#9781430250838_Ch03.xhtml#list5)\
    \ provides an example of a completion handler that shows an alert view.\n\n[***Listing\
    \ 3-5***](#9781430250838_Ch03.xhtml#_list5). Completion Handler That Shows an\
    \ Alert View\n\n```\n- (void)image:(UIImage *)image didFinishSavingWithError:(NSError\
    \ *)\n                                                         error contextInfo:(void\
    \ *)contextInfo\n{\n    NSString *alertMessage = nil;\n    if (error == nil) {\n\
    \        alertMessage = @\"Saved to Camera Roll successfully!\";\n    } else {\n\
    \        alertMessage = @\"Could not save image :(\";\n    }\n\nUIAlertView *alertView\
    \ = [[UIAlertView alloc] initWithTitle:@\"Status\"\n                         \
    \      message:alertMessage delegate:nil cancelButtonTitle:@\"OK\"\n         \
    \                      otherButtonTitles:nil];\n    [alertView show];\n}\n```\n\
