    \ of a flash in a camera is to provide a burst of light to brighten up a shot\
    \ that would otherwise be too dark to be useful. Users frame their shot with the\
    \ flash off, but when they press the capture button, the flash activates just\
    \ long enough to illuminate the scene while the camera sensor is active. This\
    \ concept does not translate to video, because the sensor is active for an extended\
    \ period of time; however, by implementing torch mode, you can give users the\
    \ ability to add light to a scene by keeping the flash LED active during recording.\n\
    \nTo activate torch mode, you can reuse the Flash button from the `MyCamera` project.\
    \ The functionality is different at a low level, but that difference is not apparent\
    \ to users. In the `MyCamera` project, the handler for flash mode was the `[CameraViewController\
    \ flashMode:]` method. Bring up your `CameraViewController.h` file and perform\
    \ a secondary click (right-click or Option-click) on the method name to bring\
    \ up the Refactor window, as shown in [Figure 10-8](#9781430250838_Ch10.xhtml#Fig8).\
    \ This will allow you to rename the method in every file in which it appears,\
    \ including the Interface Builder files. Your new method should be named `[CameraViewController\
    \ torchMode:]`.\n\n![9781430250838_Fig10-08.jpg](images/9781430250838_Fig10-08.jpg)\n\
    \n[Figure 10-8](#9781430250838_Ch10.xhtml#_Fig8). Refactor window\n\nAs you saw\
    \ in [Chapter 4](#9781430250838_Ch04.xhtml), the general flow to modify a capture\
    \ setting is to use the onscreen display button to show an action sheet of available\
    \ modes, and then set the mode (if the device supports it). While almost all modern\
    \ iOS devices these days have two cameras, it is important to note that the cameras\
    \ are not equal. Generally, the rear-facing camera is more powerful, with support\
    \ for high-resolution images, flash, and other features that improve picture quality\
    \ (such as image stabilization for the iPhone 6 Plus). In contrast, the front-facing\
    \ camera has lower resolution and a narrower set of capture controls.\n\nThe `torchMode`\
    \ property controls torch mode on an `AVCaptureDevice`. Its configuration options\
    \ are `Off`, `On`, and `Auto`, represented by the `AVCaptureTorchModeOff`, `AVCaptureTorchModeOn`,\
    \ and `AVCaptureTorchModeAuto` constants, respectively. For the first step of\
    \ the process, change your button handler to display these new values in the action\
    \ sheet, as shown in [Listing 10-9](#9781430250838_Ch10.xhtml#list9).\n\n***Listing\
    \ 10-9***. Button Handler for Torch Mode\n\n```objectivec\n-(IBAction)torchMode:(id)sender\
    \ {\n    if ([self.currentDevice isTorchAvailable]) {\n        UIActionSheet *cameraSheet\
    \ = [[UIActionSheet alloc]\n            initWithTitle:@\"Flash Mode\" delegate:self\n\
    \            cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil\n      \
    \      otherButtonTitles:@\"Auto\", @\"On\" , @\"Off\", nil];\n        cameraSheet.tag\
    \ = 101;\n        [cameraSheet showInView:self.view];\n    } else {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc]\n            initWithTitle:@\"Error\"\n      \
    \      message:@\"Flash not supported\" delegate:nil\n            cancelButtonTitle:@\"\
    OK\" otherButtonTitles:nil];\n        [alert show];\n    }\n}\n```\n\nAs with\
    \ previous examples, you modify the capture settings after the action sheet protocol\
    \ has returned a `[UIActionSheet didDismissWithButtonIndex:]` message. Remember,\
    \ this message is sent globally for all action sheets. To differentiate between\
    \ action sheets, you give each one a tag (`101` was the tag for flash mode). In\
    \ the `case` block for torch mode (case `101`), perform another refactor operation\
    \ to rename the configuration method to `[CameraViewController switchToTorchModeWithIndex:]`,\
    \ as shown in [Listing 10-10](#9781430250838_Ch10.xhtml#list10).\n\n***Listing\
    \ 10-10***. Modified Action Sheet Delegate for Torch Mode\n\n```objectivec\n-(void)\
    \ actionSheet:(UIActionSheet *)actionSheet\n      didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    switch (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
    \            break;\n        case 101:\n            [self switchToTorchWithIndex:buttonIndex];\n\
    \            break;\n        case 102:\n            [self switchToFocusWithIndex:buttonIndex];\n\
    \            break;\n        case 103:\n            [self switchToExposureWithIndex:buttonIndex];\n\
    \            break;\n        default:\n            break;\n    }\n}\n```\n\nThe\
    \ method you use to determine whether torch mode is available on an `AVCaptureDevice`\
    \ is `[AVCaptureDevice isTorchModeSupported:]`. As shown in [Listing 10-11](#9781430250838_Ch10.xhtml#list11),\
    \ in your `[CameraViewController switchToTorchModeWithIndex:]` method, after locking\
    \ the device for configuration, first check that torch mode is available, and\
    \ then set it if applicable. After making your configuration change, unlock the\
    \ device. If an error occurs while locking the device or attempting to make the\
    \ change, show an error alert.\n\n***Listing 10-11***. Method for Changing Torch\
    \ Mode\n\n```objectivec\n-(void)switchToTorchWithIndex:(NSInteger)buttonIndex\n\
    {\n    NSError *error = nil;\n\n    AVCaptureTorchMode torchMode = 0;\n\n    switch\
