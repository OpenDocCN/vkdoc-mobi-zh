    \n***代码清单 4-14***. 更改设备的闪光灯模式\n\n```objective-c\n-(void)switchToFlashWithIndex:(NSInteger)buttonIndex\n\
    {\n    NSError *error = nil;\n\nAVCaptureFlashMode flashMode = 0;\n\nswitch (buttonIndex)\
    \ {\n        case 0: {\n            flashMode = AVCaptureFlashModeAuto;\n    \
    \        self.flashButton.titleLabel.text = @\"闪光：自动\";\n            break;\n\
    \        }\n        case 1: {\n            flashMode = AVCaptureFlashModeOn;\n\
    \            self.flashButton.titleLabel.text = @\"闪光：开启\";\n            break;\n\
    \        }\n        case 2: {\n            flashMode = AVCaptureFlashModeOff;\n\
    \            self.flashButton.titleLabel.text = @\"闪光：关闭\";\n            break;\n\
    \        }\n        default:\n            break;\n    }\n\nif ([self.currentDevice\
    \ lockForConfiguration:&error]) {\n\nself.currentDevice.flashMode = flashMode;\n\
    \n[self.currentDevice unlockForConfiguration];\n    } else {\n        NSLog(@\"\
    could not set flash mode\");\n    }\n\n}\n```\n\n## 更改自动对焦模式\n\n设置相机的自动对焦模式遵循与设置闪光灯完全相同的过程（显示操作表、选择模式、在提交前查询兼容性）。但有一个重要的补充：你需要为相机定义一个焦点。\n\
    \n与前面的示例一样，如果当前相机设备支持自动对焦，该示例使用一个按钮处理器显示操作表，如**代码清单 4-15**所示。\n\n***代码清单 4-15***.\
    \ 更改对焦模式按钮处理器\n\n```objective-c\n-(IBAction)focusMode:(id)sender {\n    if ([self.currentDevice\
    \ isFocusPointOfInterestSupported]) {\n        UIActionSheet *focusSheet = [[UIActionSheet\
    \ alloc]\n                                      initWithTitle:@\"对焦模式\"\n    \
    \                                  delegate:self\n                           \
    \           cancelButtonTitle:@\"取消\"\n                                      destructiveButtonTitle:nil\n\
    \                                      otherButtonTitles:@\"自动\",\n          \
    \                                @\"连续自动对焦\" ,\n                             \
    \             @\"固定\", nil];\n        focusSheet.tag = 102;\n        [focusSheet\
    \ showInView:self.view];\n    } else {\n        //\n        UIAlertView *alert\
    \ = [[UIAlertView alloc]\n                               initWithTitle:@\"错误\"\
    \n                               message:@\"不支持自动对焦\"\n                      \
    \         delegate:nil\n                               cancelButtonTitle:@\"确定\"\
    \n                               otherButtonTitles:nil];\n        [alert show];\n\
    \    }\n}\n```\n\n与前面的示例一样，扩展操作表处理器以支持新的操作表，如**代码清单 4-16**所示。\n\n***代码清单 4-16***.\
    \ 修改后的操作表处理器\n\n```objective-c\n-(void) actionSheet:(UIActionSheet *)actionSheet\n\
    \        didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    switch (actionSheet.tag)\
    \ {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
    \            break;\n        case 101:\n            [self switchToFlashWithIndex:buttonIndex];\n\
    \            break;\n        case 102:\n            [self switchToFocusWithIndex:buttonIndex];\n\
    \            break;\n        default:\n            break;\n    }\n}\n```\n\n就像更改闪光灯模式时一样，代码将按钮选项转换为有效的常量，获取配置锁定，如果设备支持这些更改，则提交更改。你可以在**代码清单\
    \ 4-17**中找到封装了自动对焦模式切换逻辑的方法。\n\n***代码清单 4-17***. 切换自动对焦模式\n\n```objective-c\n\
    -(void)switchToFocusWithIndex:(NSInteger)buttonIndex\n{\n    NSError *error =\
    \ nil;\n\nAVCaptureFocusMode focusMode = 0;\n\nswitch (buttonIndex) {\n      \
    \  case 0: {\n            focusMode = AVCaptureFocusModeAutoFocus;\n         \
    \   self.focusButton.titleLabel.text = @\"对焦：自动\";\n            break;\n     \
    \   }\n        case 1: {\n            focusMode = AVCaptureFocusModeContinuousAutoFocus;\n\
    \            self.focusButton.titleLabel.text = @\"对焦：连续\";\n            break;\n\
    \        }\n        case 2: {\n            focusMode = AVCaptureFocusModeLocked;\n\
    \            self.focusButton.titleLabel.text = @\"对焦：固定\";\n            break;\n\
    \        }\n        default:\n            break;\n    }\n\nif ([self.currentDevice\
    \ lockForConfiguration:&error] &&\n        [self.currentDevice\n        isFocusModeSupported:focusMode])\
    \ {\n\nself.currentDevice.focusMode = focusMode;\n\n[self.currentDevice unlockForConfiguration];\n\
    \    } else {\n        NSLog(@\"could not set focus mode\");\n    }\n\n}\n```\n\
    \n默认情况下，焦点位于屏幕中央，但用户通常会将拍摄对象置于画面的左三分之一或右三分之一处。为了充分利用自动对焦功能，你应该让用户将相机重新对焦到某个新的焦点。在使用\
    \ iOS 的默认相机时，你可能记得点击屏幕时会出现一个矩形。这是通过使用 `UITapGestureRecognizer` 对象来实现的。\n\n手势识别器允许你在用户发生触摸手势（例如点击屏幕或捏合/张开手指）时调用一个方法，并提供触摸事件在屏幕上发生的位置等属性。手势识别器处理器方法的签名类似于普通事件处理器的签名，不同之处在于参数类型是\
    \ `UIGestureRecognizer`：\n\n```objective-c\n-(IBAction)didTapPreview:(UIGestureRecognizer\
    \ *)gestureRecognizer;\n```\n"
- fmt: "You use the method `[UIGestureRecognizer locationInView:]` to determine the\
    \ `x` and `y` coordinates of the touch event, relative to the origin of the view\
    \ you pass in as an input parameter.\n\nTo configure the camera to focus to a\
    \ specific point, use the instance method `[AVCaptureDevice setFocusPointOfInterest:focusPoint]`.\
    \ The input parameter is a `CGPoint` object with `x` and `y` values between 0.0\
    \ and 1.0 that correspond to the relative position of the focal point within the\
    \ frame. For example, a value of `(0.5, 0.75)` would center the focal point horizontally,\
    \ and place it one-fourth of the way above the bottom of the frame, vertically.\n\
    \nYou convert gesture recognizer touch coordinates from absolute to relative positions\
    \ by dividing the touch event’s `x` position by the frame’s width, and dividing\
    \ the touch event’s `y` position by the frame’s height, as shown in [Listing 4-18](#9781430250838_Ch04.xhtml#list18).\n\
    \n**[Listing 4-18](#9781430250838_Ch04.xhtml#_list18).** Converting Absolute Positions\
    \ to Relative Positions\n\n```\nCGPoint tapPoint = [gestureRecognizer\n                    locationInView:gestureRecognizer.view];\n\
    CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\nCGFloat relativeY\
    \ = tapPoint.y / self.previewView.frame.size.height;\nCGPoint focusPoint = CGPointMake(relativeX,\
    \ relativeY);\n```\n\nFinally, tie everything together by adding the position\
    \ code and capture setting configuration code into the gesture recognizer handler,\
    \ as shown in [Listing 4-19](#9781430250838_Ch04.xhtml#list19).\n\n**[Listing\
    \ 4-19](#9781430250838_Ch04.xhtml#_list19).** Setting Focal Point from a Tap Gesture\
    \ Handler\n\n```\n-(void)didTapPreview:(UIGestureRecognizer *)gestureRecognizer\n\
    {\n    CGPoint tapPoint = [gestureRecognizer\n        locationInView:gestureRecognizer.view];\n\
        CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\n    CGFloat\
    \ relativeY = tapPoint.y /\n        self.previewView.frame.size.height;\n    CGPoint\
    \ focusPoint = CGPointMake(relativeX, relativeY);\n\nAVCaptureFocusMode focusMode\
    \ = self.currentDevice.focusMode;\n\nNSError *error = nil;\n\nif ([self.currentDevice\
    \ isFocusPointOfInterestSupported] &&\n        [self.currentDevice isFocusModeSupported:focusMode])\n\
        {\n        if ([self.currentDevice lockForConfiguration:&error])\n        {\n\
                [self.currentDevice setFocusMode:focusMode];\n            [self.currentDevice\
    \ setFocusPointOfInterest:focusPoint];\n            [self.currentDevice unlockForConfiguration];\n\
            }\n    }\n\nself.tapPosition.text = [NSString stringWithFormat:\n                            \
    \ @\"Tap Position: (%0.f, %0.f)\",\n                             tapPoint.x, tapPoint.y];\n\
    }\n```\n\n## Changing Exposure Modes\n\nModifying exposure settings has all of\
    \ the same properties and background knowledge requirements as changing autofocus\
    \ settings:\n\n- Use a button and action sheet to select exposure mode.\n- Query\
    \ for compatibility before setting desired exposure mode.\n- Set the focal point\
    \ for exposure settings based on a touch event.\n\nTherefore, the button handler\
    \ should look very familiar. The major difference is that this functionality will\
    \ allow the user to select only Continuous Auto-Exposure or Fixed Exposure. You\
    \ can find a button handler that presents the exposure mode action sheet in [Listing\
    \ 4-20](#9781430250838_Ch04.xhtml#list20).\n\n**[Listing 4-20](#9781430250838_Ch04.xhtml#_list20).**\
    \ Action Sheet Button Handler, Including Exposure\n\n```\n-(IBAction)exposureMode:(id)sender\
    \ {\n    if ([self.currentDevice isExposurePointOfInterestSupported]) {\n        //\n\
            UIActionSheet *exposureSheet =\n             [[UIActionSheet alloc]\n\
                   initWithTitle:@\"Exposure Mode\"\n               delegate:self\n\
                   cancelButtonTitle:@\"Cancel\"\n               destructiveButtonTitle:nil\n\
                   otherButtonTitles:@\"Continuous Auto\" , @\"Fixed\", nil];\n        exposureSheet.tag\
    \ = 103;\n        [exposureSheet showInView:self.view];\n    } else {\n        //\n\
            UIAlertView *alert = [[UIAlertView alloc]\n                              \
    \ initWithTitle:@\"Error\"\n                               message:@\"Flash not\
    \ supported\"\n                               delegate:nil\n                              \
    \ cancelButtonTitle:@\"OK\"\n                               otherButtonTitles:nil];\n\
            [alert show];\n    }\n}\n```\n\nThe final action sheet handler adds the\
    \ tag for the exposure sheet, as shown in [Listing 4-21](#9781430250838_Ch04.xhtml#list21).\n\
    \n**[Listing 4-21](#9781430250838_Ch04.xhtml#_list21).** Exposure Mode Button\
    \ Handler\n\n```\n-(void) actionSheet:(UIActionSheet *)actionSheet didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    switch (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
                break;\n        case 101:\n            [self switchToFlashWithIndex:buttonIndex];\n\
                break;\n        case 102:\n            [self switchToFocusWithIndex:buttonIndex];\n\
                break; \n        case 103:\n            [self switchToExposureWithIndex:buttonIndex];\n\
                break;\n        default:\n            break;\n    }\n}\n```\n\nYou\
    \ set exposure settings in the manner that should now be extremely familiar—converting\
    \ indices to constants, and taking a lock, as shown in [Listing 4-22](#9781430250838_Ch04.xhtml#list22).\n\
    \n**[Listing 4-22](#9781430250838_Ch04.xhtml#_list22).** Setting Exposure Mode\n\
    \n```\n-(void)switchToExposureWithIndex:(NSInteger)buttonIndex\n{\n    NSError\
    \ *error = nil;\n\nAVCaptureExposureMode exposureMode = 0;\n\nswitch (buttonIndex)\
    \ {\n        case 0: {\n            exposureMode = AVCaptureExposureModeContinuousAutoExposure;\n\
                self.exposureButton.titleLabel.text = @\"Exposure: Cont\";\n            break;\n\
            }\n        case 1: {\n            exposureMode = AVCaptureExposureModeLocked;\n\
                self.exposureButton.titleLabel.text = @\"Exposure: Fixed\";\n            break;\
    \ \n        }\n}\n\nif ([self.currentDevice isExposureModeSupported:exposureMode]\
    \ &&\n        [self.currentDevice lockForConfiguration:&error]) {\n\nself.currentDevice.exposureMode\
    \ = exposureMode;\n\n[self.currentDevice unlockForConfiguration];\n    } else\
    \ {\n        NSLog(@\"could not set exposure mode\");\n    }\n\n}\n```\n\nThe\
    \ final gesture recognizer duplicates the autofocus logic, except for exposure,\
    \ as shown in [Listing 4-23](#9781430250838_Ch04.xhtml#list23).\n\n**[Listing\
    \ 4-23](#9781430250838_Ch04.xhtml#_list23).** Tap Gesture Recognizer, Including\
    \ Exposure Settings\n\n```\n-(void)didTapPreview:(UIGestureRecognizer *)gestureRecognizer\n\
    {\n    CGPoint tapPoint = [gestureRecognizer\n                        locationInView:gestureRecognizer.view];\n\
        CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\n    CGFloat\
    \ relativeY = tapPoint.y /\n                        self.previewView.frame.size.height;\n\
        CGPoint focusPoint = CGPointMake(relativeX, relativeY);\n\nAVCaptureExposureMode\
    \ exposureMode =\n                          self.currentDevice.exposureMode;\n\
        AVCaptureFocusMode focusMode = self.currentDevice.focusMode;\n\nNSError *error\
    \ = nil;\n```"
