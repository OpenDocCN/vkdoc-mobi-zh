    Configuring the Image Picker for Video


    Just as when taking pictures, you need to initialize and configure an instance
    of the `UIImagePickerController` class when the user presses the Record Video
    button in the app. You may recall from [Chapter 2](#9781430250838_Ch02.xhtml)
    that, at minimum, to configure an image picker, you need to specify a source type
    (the camera or a photo album) and a delegate for the image data:


    ```

    UIImagePickerController *moviePicker = [[UIImagePickerController alloc] init];

    moviePicker.delegate = self;

    ```


    To configure your `UIImagePickerController` object to capture video, specify video
    as the only accepted media type. You can set media types via the `mediaTypes`
    parameter, which takes an array of media type constants. The constant for video
    is `kUTTypeMovie`; `b`y default, the parameter is initialized with the constant
    for images, `kUTTypeImage`:


    ```

    self.videoPlayer.mediaTypes = [NSArray arrayWithObjects:kUTTypeMovie];

    ```


    **Note**  If you add both constants to the `mediaTypes` array, the user will be
    presented with the option to toggle capture interfaces, like in the iOS Camera
    app.


    While most photos captured on an iOS device grow to only a couple of megabytes
    in size, videos can easily grow to be hundreds (or thousands) of megabytes large.
    To keep video sizes under control, you set values for two additional properties
    on the image picker: `videoQuality` and `videoMaximumDuration`. The `videoQuality`
    property takes a constant of the type `UIImagePickerControllerQualityType`. [Table
    8-2](#9781430250838_Ch08.xhtml#Tab2) lists these values and what they represent.
    Note that the values you choose affect video quality by determining the resolution
    of the video frame and the strength of the compression algorithm. The default
    value is `UIImagePickerControllerQualityTypeMedium`. All videos generated by the
    `UIImagePickerController` class are QuickTime movie files (.MOV).


