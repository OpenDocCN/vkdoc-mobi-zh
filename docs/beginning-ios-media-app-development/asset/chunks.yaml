    Recording Video Files


    The easiest way to record video in Cocoa Touch is to use the `UIImagePickerController`
    class. You may remember this class from [Chapter 2](#9781430250838_Ch02.xhtml),
    where you used it to take pictures via iOS’s built-in camera interface. If you
    have ever used the native Camera app to capture video, you already familiar with
    this interface, shown in [Figure 8-5](#9781430250838_Ch08.xhtml#Fig5).


    ![9781430250838_Fig08-05.jpg](images/9781430250838_Fig08-05.jpg)


    [Figure 8-5](#9781430250838_Ch08.xhtml#_Fig5). UIImagePickerController video-capture
    interface


    However, unlike the Camera app, the `UIImagePickerController` class presents your
    user with a confirmation screen after they have completed recording, as shown
    in [Figure 8-6](#9781430250838_Ch08.xhtml#Fig6). This allows your users to review
    and even edit their captured video by trimming them before moving on.


    ![9781430250838_Fig08-06.jpg](images/9781430250838_Fig08-06.jpg)


    [Figure 8-6](#9781430250838_Ch08.xhtml#_Fig6). UIImagePickerController video preview
    interface


    By modifying your configuration options and `UIImagePickerDelegate` handler methods,
    you can repurpose your photo-capture code to add video-capture functionality.


    In this section, you will modify the MyVideoPlayer app by adding a button for
    capturing video. Captured video is saved in the app’s documents directory and
    picked up by the file picker, so that users can watch them just like any other
    video. The new project is included in the `Chapter 8` folder of the source code
    bundle as MyVideoRecorder.


    If you are still uncomfortable with using the `UIImagePickerController` class,
    you should review the projects in [Chapter 2](#9781430250838_Ch02.xhtml) before
    moving on with this topic. The CameraApp project includes an in-depth explanation
    of the `UIImagePickerController` class and delegates. The goal of the MyVideoRecorder
    project is to highlight how you need to make only a few modifications to allow
    a photo app to handle video.


    Getting Started


    You will use the MyVideoPlayer project as a base for the MyVideoRecorder project.
    Start by making a copy of the project and renaming the root folder MyVideoRecorder.
    To make this change reflect across the rest of the project, double-click the project
    file (`MyVideoPlayer.xcodeproj`) to open it in Xcode. Then, carefully click the
    project’s name in the Project Navigator and rename it as shown in the upper-left
    corner of [Figure 8-7](#9781430250838_Ch08.xhtml#Fig7).


