- fmt: 'In this method, you will find two interesting changes from the Objective-C
    implementation. First, when you check the type of the incoming object, you can
    call the `isKindOfClass()` method on the name of your class directly. Additionally,
    when you check the incoming message string, you perform a comparison on the value
    directly, instead of calling the `isEqualToString()` method.


    ## Adding Notification Support


    Notifications are fully supported in Swift, with the caveat that you must implement
    the Objective-C methods for posting and observing notifications.


    In Objective-C, you set up the main view controller class for Playback Complete
    notifications by declaring a selector method for `AVPlayerItemDidPlayToEndTimeNotification`:


    ```

    [[NSNotificationCenter defaultCenter] addObserver:self

        selector:@selector(playbackFinished:)

        name:AVPlayerItemDidPlayToEndTimeNotification object:nil];

    ```


    You can use the same method in Swift to add an observer, being careful to convert
    it to Swift-style syntax:


    ```

    var notificationCenter = NSNotificationCenter.defaultCenter()

    notificationCenter.addObserver(self, selector: "playbackFinished:",

        name: AVPlayerItemDidPlayToEndTimeNotification, object: nil)

    ```


    The Objective-C notification handler is shown in [Listing 14-10](#9781430250838_Ch14.xhtml#list10).
    In this method, you would dismiss the full-screen media player upon receiving
    the notification that playback had finished.


    [***Listing 14-10***](#9781430250838_Ch14.xhtml#_list10). Notification Handler
    in Objective-C


    ```

    -(void)playbackFinished:(NSNotification *) notification

    {

        NSDictionary *userInfo = notification.userInfo;


    if ([self.moviePlayer.player isKindOfClass:[AVPlayer class]]) {

            [self dismissViewControllerAnimated:YES completion:nil];

        } else {

            //do nothing

        }


    }

    ```


    For your Swift handler method, remember to set the incoming notification as your
    input parameter, as shown in [Listing 14-11](#9781430250838_Ch14.xhtml#list11).


    [***Listing 14-11***](#9781430250838_Ch14.xhtml#_list11). Notification Handler
    in Swift


    ```

    func playbackFinished(notification : NSNotification) {


    let userInfo = notification.userInfo


    if moviePlayer.player.isKindOfClass(AVPlayer) {

           dismissViewControllerAnimated(true, completion: nil)

       } else {

           //do nothing

       }

    }

    ```


    ## Summary


    In this chapter, you experienced your first taste of Swift by porting the `MyAVPlayer`
    project. After seeing how to set up a Swift project and import existing Objective-C
    classes, a crash course on the syntax of the Swift language gave you the basics
    to apply your new knowledge to rewrite the `ViewController` class in Swift. While
    Swift brings significant syntax changes to iOS development, its methods are designed
    to work like Objective-C. For the most part, by using Swift method syntax, you
    can call any Objective-C Cocoa Touch method from Swift. In instances where this
    is not possible, check Apple’s Developer Library for alternate methods.


