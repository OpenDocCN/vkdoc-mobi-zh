    project from [Chapter 10](#9781430250838_Ch10.xhtml) and rename it **MyCustomVideoPlayer**.
    If you are unsure of how to clone a project, refer to the “Recording Video Files”
    section of [Chapter 8](#9781430250838_Ch08.xhtml), where you cloned the MyVideoPlayer
    project to create the MyVideoRecorder project.


    Because this project uses the `AVFoundation` framework for media playback instead
    of the `MediaPlayer` framework, make the appropriate change in the Linked Libraries
    and Frameworks section under your project settings. As shown in [Figure 9-3](#9781430250838_Ch09.xhtml#Fig3),
    your final list of frameworks should include only the `AVFoundation` framework.


