    ## 第11章


    使用 Xcode 6 进行用户界面开发


    当我刚开始进行 iOS 开发时，我与 Xcode 和 Interface Builder 的关系非常复杂。我可以进行布局，但它们无法按我想要的方式连接，或者我会遇到无法调试的奇怪崩溃。通过大量的努力（以及
    Storyboard 的发布），我的挫败感开始消退，iOS 用户界面开发开始变得更加自然。幸运的是，随着 Xcode 6 的发布，Apple 通过使构建和调试用户界面变得更加容易，持续改进了开发过程。


    在本章中，你将了解如何通过自适应用户界面来加速你的用户界面开发，如何将 Quick Look 实时视图调试添加到你的任何类中，以及如何使你自己的类与 Interface
    Builder 的属性检查器完全兼容。这些新增功能通过减少查看“当前”情况所需的步骤，以及通过与以前仅限于 Apple 创建的类的功能集成，帮助你更快地进行开发。


    **注意** 本章涵盖的主题仅在 Xcode 6 及更高版本（配合 iOS 8.0 SDK）中可用。


    ## 使用 Size Classes 构建自适应用户界面


    在 iOS 存在的头几年，它仅限于所有都配备 3.5 英寸屏幕的 iPhone。随后，设备交付选项迅速增长，包括了 10 英寸的 iPad、8 英寸的 iPad
    Mini、4 英寸的 Retina iPhone、4.7 英寸的 iPhone，以及现在（随着 iPhone 6 Plus 的推出），5.5 英寸的 iPhone。当开发者只需要支持两种屏幕尺寸时，他们倾向于使用`#ifdef`语句和单独的
    Interface Builder 文件来管理这两个用户界面。然而，当 Apple 开始推出具有更高像素密度（iPhone 4）和新宽高比（iPhone 5）的设备时，这种方法就失效了。为了帮助应对不断变化的显示需求，Apple
    在 Xcode 5 中引入了*自动布局*和*资源目录*。为了为未来的设备铺平道路，Apple 在 Xcode 6 中引入了一种用于用户界面开发的设计方法，称为*自适应用户界面*。


    Apple 使用自适应用户界面的目标是让你构建一个能在所有设备上运行的 Storyboard。为了实现这个目标，Apple 向 iOS 8 引入了*Size
    Classes*的概念：一种超越“iPhone 模式”和“iPad 模式”来思考布局的新方式。iOS 中的 Size Classes 鼓励你根据视图可用的空间来概念化用户界面，而不是根据特定的目标设备（如手机或平板电脑）。为了确保平滑过渡，Apple
    将对此概念的支持构建到了 Interface Builder 的各个方面——包括新的约束类型、新的自动布局预览界面以及新的模拟器（*可调整大小的模拟器*）。为了帮助你以编程方式实现此功能，Apple
    还引入了`UITraitCollection`类，它将 Size Classes 和屏幕密度（例如，Retina）结合在一起，作为检测设备类型的`UIInterfaceIdiom`宏的强大替代方案。


    本节重点介绍如何使用 Size Classes 构建自适应 Storyboard。你可以通过查看 Apple 的自适应用户界面门户网站（`https://developer.apple.com/design/adaptivity/`）来了解更多关于`UITraitCollection`类的信息。


    如[图11-1](#9781430250838_Ch11.xhtml#Fig1)所示，如果你要比较 iOS 中用户界面的四种主要布局类型，结果将是 iPhone
    竖屏模式、iPhone 横屏模式、iPad 竖屏模式和 iPad 横屏模式。


    ![9781430250838_Fig11-01.jpg](images/9781430250838_Fig11-01.jpg)


