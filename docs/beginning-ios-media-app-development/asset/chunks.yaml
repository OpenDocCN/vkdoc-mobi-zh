    audio recorder and new buttons to the main view controller. [Listing 5-22](#9781430250838_Ch05.xhtml#list22)
    shows an example.


    [***Listing 5-22***](#9781430250838_Ch05.xhtml#_list22). Header File for Audio
    Recorder App


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>


    @interface MainViewController : UIViewController

        <AVAudioPlayerDelegate>


    @property (nonatomic, strong) IBOutlet UILabel *timeLabel;


    @property (nonatomic, strong) IBOutlet UIButton *recordButton;

    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *resetButton;


    @property (nonatomic, strong) IBOutlet UIProgressView *progressBar;


    @property (nonatomic, strong) AVAudioPlayer *audioPlayer;

    @property (nonatomic, strong) AVAudioRecorder *audioRecorder;


    @property (nonatomic, strong) NSTimer *timer;


    -(IBAction)record:(id)sender;

    -(IBAction)play:(id)sender;

    -(IBAction)reset:(id)sender;


    @end

    ```


    As with the `AVAudioPlayer` class, `AVAudioRecorder` requires the `AVFoundation`
    framework to compile. Follow the same process you used with the audio player app
    to add the framework to your project.


    Having defined your properties and methods, lay out your storyboard and connect
    your actions using Interface Builder. The result should look the screenshot in
    [Figure 5-9](#9781430250838_Ch05.xhtml#Fig9).


    ![9781430250838_Fig05-09.jpg](images/9781430250838_Fig05-09.jpg)


    [Figure 5-9](#9781430250838_Ch05.xhtml#_Fig9). Storyboard for simple audio recorder


    Configuring the Audio Session


    Just as you did with the audio player, you need to initialize the audio session
    before using the audio recorder. Because your app will need both playback and
    recording abilities, use the `AVAudioSessionCategoryPlayAndRecord` macro to configure
    the audio session.


    You will want to prepare the audio session as soon as the user presses the Record
    button, so configure the session in the button handler, as shown in [Listing 5-23](#9781430250838_Ch05.xhtml#list23).


    [***Listing 5-23***](#9781430250838_Ch05.xhtml#_list23). Initializing the Audio
    Session for Recording


    ```

    -(IBAction)record:(id)sender

    {

        NSError *error;


    AVAudioSession *audioSession = [AVAudioSession sharedInstance];

        [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord

                      error:&error];

    }

    ```


    Setting Up the Audio Recorder


    To set up the audio recorder, use the `[AVAudioRecorder initWithURL:settings:error:]`
    instance method. Like the audio player, it takes a URL. However, the URL the recorder
    is interested in is the *destination* for the recording. As with the audio session,
    you want to initialize the recorder when the user presses the Record button. A
    modified version of the button handler for the Record button, with the recorder
    initialization logic, is provided in [Listing 5-24](#9781430250838_Ch05.xhtml#list24).


    [***Listing 5-24***](#9781430250838_Ch05.xhtml#_list24). Initializing the Audio
    Recorder


    ```

    -(IBAction)record:(id)sender

    {

        NSError *error;


    AVAudioSession *audioSession = [AVAudioSession sharedInstance];

        [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord

                      error:&error];


    if (error == nil) {


    NSArray *paths =

                NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

                NSUserDomainMask, YES);

            NSString *documentsDirectory = [paths objectAtIndex:0];


    NSString *filePath = [documentsDirectory

               stringByAppendingPathComponent:@"recording.m4a"];

            NSURL *fileURL = [NSURL fileURLWithPath:filePath];


    NSMutableDictionary *settingsDict = [NSMutableDictionary new];

            [settingsDict setObject:[NSNumber numberWithInt:44100.0]

                                     forKey:AVSampleRateKey];

            [settingsDict setObject:[NSNumber numberWithInt:2]

                                     forKey:AVNumberOfChannelsKey];

            [settingsDict setObject:[NSNumber

                                     numberWithInt:AVAudioQualityMedium]

               forKey:AVEncoderAudioQualityKey];

            [settingsDict setObject:[NSNumber numberWithInt:16]

                                     forKey:AVEncoderBitRateKey];


    self.audioRecorder = [[AVAudioRecorder alloc]

                                   initWithURL:fileURL


    settings:settingsDict error:&error];


    if (error == nil) {


    NSLog(@“audio recorder initialized successfully!");


    } else {

                NSLog(@"error initializing audio recorder: %@",

                      [error description]);

            }


    } else {

            NSLog(@"error initializing Playing audio files:audio session: %@",

                  [error description]);

        }

    }

    ```


    As with the audio player, for this app, you will use the documents directory as
    the destination for the user’s recording. You can create the full path for your
    file by appending the file name to the documents directory. The audio recorder
    will create a new file if the file specified by the URL does not exist, or it
    will overwrite the existing file if it does.


    You may also be wondering about the `settings` parameter. This is a dictionary
    of key/value pairs that configure the hardware’s capture settings. The preceding
    example configures the microphone to capture 16-bit stereo audio at moderate quality.
    This is a good, middle-of-the-road configuration, in which the recording will
    sound better than a phone call, but without the data overhead of a full, uncompressed
    audio recording.


    Building the Recording Interface


    As with the `AVAudioPlayer` class, the `AVAudioRecorder` class is headless, so
    you have to implement your own user interface to control the recording process.
    For this application, you want to add controls for recording-specific functionality:
    starting and stopping the recording, saving the file, and deleting the recording.
    With a few exceptions, you can reuse the playback interface from the audio player
    app to preview the recording.


    Starting or Stopping the Recording


    You use the `[AVAudioRecorder record]` method to begin recording an audio file.
    Similarly, the `[AVAudioRecorder stop]` method stops recording. As with the audio
    player app, you use a single button to toggle the recording state. Following the
    same pattern you used with audio APIs, you query the recording status of the recorder
    object by using the `[AVAudioRecorder isRecording]` property. [Listing 5-25](#9781430250838_Ch05.xhtml#list25)
    shows a modified version of the Record button handler that implements this flow.


    [***Listing 5-25***](#9781430250838_Ch05.xhtml#_list25). Starting or Stopping
    the Audio Recorder


