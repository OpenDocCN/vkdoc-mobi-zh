    ## 设置音频播放器


    现在你的应用可以加载音频文件了，可以开始使用 `AVAudioPlayer` 类来播放文件。通过将音频播放器作为属性添加并实现其协议方法，你将音频播放器集成到类中。


    由于此应用一次只播放一个音乐文件，你最好将 `AVAudioPlayer` 对象实现为主视图控制器（包含播放器的那个）的实例变量。音频播放器通过协议传回消息，因此，同样地，你也应该声明你的类将实现该协议。代码清单
    5-12 展示了包含这些修改的头文件版本。


    **代码清单 5-12.** 将音频播放器及其协议添加到头文件


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import "FileViewController.h"


    @interface MainViewController : UIViewController <FileControllerDelegate,

    AVAudioPlayerDelegate>


    @property (nonatomic, strong) IBOutlet UILabel *timeLabel;

    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;


    @property (nonatomic, strong) IBOutlet UIButton *chooseButton;

    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipBackwardButton;


    @property (nonatomic, strong) IBOutlet UIProgressView *progressBar;


    @property (nonatomic, strong) NSString *selectedFilePath;


    @property (nonatomic, strong) AVAudioPlayer *audioPlayer;


    @end

    ```


    **注意** 如果你想编写一个音频播放可由多个视图控制的应用，最好将音频播放器实例封装在单例类中，并让所有类通过该单例访问它。

    '
- fmt: "现在您已将音频播放器对象添加到类中，需要对其进行初始化。`AVAudioPlayer`类提供了两个主要的`init`方法，分别是`[AVAudioPlayer\
    \ initWithContentsOfURL:error:]`和`[AVAudioPlayer initWithData:error:]`。请记住，当文件视图控制器完成时，您将返回目标音频文件的文件路径，这意味着可以使用基于`URL`的`init`方法。播放器没有源文件就无法初始化，因此请将初始化功能放在接收来自文件视图控制器的文件的委托方法中，如[列表\
    \ 5-13](#9781430250838_Ch05.xhtml#list13) 所示。\n\n[***列表 5-13***](#9781430250838_Ch05.xhtml#_list13).\
    \ 选择文件时初始化音频播放器\n\n```\n-(void)didFinishWithFile:(NSString *)filePath\n\nself.selectedFilePath\
    \ = filePath;\n\nNSError *error = nil;\n    NSURL *fileURL = [NSURL fileURLWithPath:self.selectedFilePath];\n\
    \nself.audioPlayer = [[AVAudioPlayer alloc]\n                         initWithContentsOfURL:fileURL\
    \ error:&error];\n    self.audioPlayer.delegate = self;\n\nif (error == nil) {\n\
    \        NSLog(@\"audio player initialized successfully\");\n    } else {\n  \
    \      NSLog(@\"error initializing Playing audio files:audio player: %@\",\n \
    \             [error description]);\n    }\n\n//dismiss the file picker\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n请注意，上述代码在将文件路径发送到音频播放器之前，将其转换为`URL`。虽然文件路径和`URL`都是文件位置的有效引用，但您需要将文件路径转换为`NSURL`数据类型以符合`API`要求。您可能想知道为什么没有使用基于`NSData`的`init`方法。要使用此方法，您需要将文件加载到内存中。虽然这对于从网络源下载的文件（您不想将文件保存到磁盘）是合适的，但它会为此应用程序增加不必要的开销。\n\
    \n## 构建播放界面\n\n现在音频播放器已初始化，您可能认为应用程序已准备好开始播放文件。不幸的是，`AVAudioPlayer`是一个*无界面*类，意味着它不提供用户界面。要开始和控制音频播放，您需要通过用户操作来触发它们。\n\
    \n### 开始或暂停播放\n\n音频播放器的主要控件是“播放”按钮。顾名思义，用户将使用它来启动播放。它有两个作用：如果音乐文件正在播放，您可以允许用户通过单击此按钮暂停播放。\n\
    \n使用音频播放器开始播放的方法是`[AVAudioPlayer play]`，它告诉音频播放器开始处理输入文件，并在播放器准备好后自动开始播放。您应该从“播放”按钮的按钮处理程序中调用此方法，如[列表\
    \ 5-14](#9781430250838_Ch05.xhtml#list14) 所示。确保在`Interface Builder`中将此功能连接到您的故事板。\n\
    \n[***列表 5-14***](#9781430250838_Ch05.xhtml#_list14). 启动音频播放\n\n```\n-(IBAction)play:(id)sender\n\
    {\n    [self.audioPlayer play];\n}\n```\n\n与图像不同，音频和视频文件被系统视为数据流，需要额外的时间来建立内存缓冲区，以便可以预加载数据。缓冲区允许播放器拥有足够的数据，从而能够以默认速度（1x）播放文件。不幸的是，您无法预测填充缓冲区需要多长时间，因此`[AVAudioPlayer\
    \ play]`方法是*异步的*（意味着它不会阻塞应用程序中的其他事件）。\n\n**注意** 您可以使用`[AVAudioPlayer prepareToPlay]`方法强制音频播放器缓冲文件。此方法作为`[AVAudioPlayer\
    \ play]`的一部分自动调用，但单独调用它可以提升用户体验，特别是当您不希望在用户选择文件后立即自动开始播放时。\n\n此时，您的应用程序可以播放文件，但尚不能暂停。`[AVAudioPlayer\
    \ pause:]`可以使播放器暂停。然而，在调用暂停方法之前，您应该检查音频播放器当前是否正在播放文件。您可以通过`[AVAudioPlayer isPlaying]`属性查询音频播放器的播放状态，如[列表\
    \ 5-15](#9781430250838_Ch05.xhtml#list15) 中的示例所示。\n\n[***列表 5-15***](#9781430250838_Ch05.xhtml#_list15).\
    \ 使用播放状态确定按钮操作\n\n```\n-(IBAction)play:(id)sender\n{\n    if ([self.audioPlayer\
    \ isPlaying]) {\n        [self.audioPlayer pause];\n        self.playButton.titleLabel.text\
    \ = @\"Play\";\n    } else {\n        [self.audioPlayer play];\n        self.playButton.titleLabel.text\
    \ = @\"Pause\";\n    }\n\n}\n```\n\n除了更改操作外，代码还更改了按钮的标题。这是一个关键步骤，因为您希望在界面上向用户反映状态变化。\n\
    \n为了完成播放周期，您需要在播放完成时重置用户界面。您可能还记得，设置音频播放器的第一步之一是声明主视图控制器将实现`AVAudioPlayerDelegate`协议。当播放器完成播放文件时发送的委托方法是`audioPlayerDidFinishPlaying:Successfully:`。如[列表\
    \ 5-16](#9781430250838_Ch05.xhtml#list16) 所示，您需要做的就是在收到此消息时重置“播放”按钮的文本。由于应用程序使用运行时逻辑来确定操作，因此您不需要重新连接按钮。\n\
    \n[***列表 5-16***](#9781430250838_Ch05.xhtml#_list16). 使用委托重置用户界面\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
    \ *)player\n                                    successfully:(BOOL)flag\n{\n \
    \   if (flag) {\n        self.playButton.titleLabel.text = @\"Play\";\n    }\n\
    }\n```\n\n### 快进或快退\n\n现在您可以播放或暂停文件，接下来可以转向另一个常见的播放功能：快进或快退。与“播放”按钮一样，应用程序通过按钮处理程序控制这些功能。然而，与“播放”按钮不同，这些功能是离散的，因此每个功能应该有一个独立的`UI`元素。\n\
    \n您可以通过将`[AVAudioPlayer currentTime]`属性的值设置为所需的时间，强制音频播放器跳转到文件中的特定时间点。对于此应用程序，您希望能够快进或快退15秒。\n\
    \n对于快进功能，您可以通过将当前时间值加上15来获得所需时间，该值来自音频播放器。`NSTimeInterval`数据类型以秒为单位计数。为了防止用户跳过文件末尾（这是一个无效操作），在设置播放器的新时间值之前，您需要将新计算的目標时间与文件的时长进行比较。您可以使用`[AVAudioPlayer\
    \ duration]`属性从音频播放器获取当前文件的时长。\n\n[列表 5-17](#9781430250838_Ch05.xhtml#list17)\
    \ 展示了快进的实现。\n\n[***列表 5-17***](#9781430250838_Ch05.xhtml#_list17). 快进按钮处理程序\n\n\
    ```\n-(IBAction)skipForward:(id)sender\n{\n    if ([self.audioPlayer isPlaying])\
    \ {\n\nNSTimeInterval desiredTime =\n            self.audioPlayer.currentTime\
    \ + 15.0f;\n        if (desiredTime < self.audioPlayer.duration) {\n         \
    \   self.audioPlayer.currentTime = desiredTime;\n        }\n    }\n}\n```\n\n\
    您遵循类似的逻辑来实现快退。但是，不是检查文件的时长，而是将计算出的时间与0（文件开始处）进行比较。如果用户在播放时间少于15秒时尝试快退，则将其发送到文件开头。否则，将其发送到当前位置前15秒的位置。[列表\
    \ 5-18](#9781430250838_Ch05.xhtml#list18) 展示了一个示例。"
  raw: 'Now that you have added the audio player object to your class, you need to
    initialize it. The `AVAudioPlayer` class comes with two primary `init` methods,
    `[AVAudioPlayer initWithContentsOfURL:error:]` and `[AVAudioPlayer initWithData:error:]`.
    Remember, you’re passing back the file path for the target audio file when the
    file view controller completes, meaning you can use the URL-based `init` method.
    The player cannot be initialized without a source file, so put the initialization
    functionality in the delegate method that receives a file from the file view controller,
    as shown in [Listing 5-13](#9781430250838_Ch05.xhtml#list13).


    [***Listing 5-13***](#9781430250838_Ch05.xhtml#_list13). Initializing the Audio
    Player When a File Is Selected


    ```

    -(void)didFinishWithFile:(NSString *)filePath


    self.selectedFilePath = filePath;


    NSError *error = nil;

        NSURL *fileURL = [NSURL fileURLWithPath:self.selectedFilePath];


    self.audioPlayer = [[AVAudioPlayer alloc]

                             initWithContentsOfURL:fileURL error:&error];

        self.audioPlayer.delegate = self;


    if (error == nil) {

            NSLog(@"audio player initialized successfully");

        } else {

            NSLog(@"error initializing Playing audio files:audio player: %@",

                  [error description]);

        }


    //dismiss the file picker

        [self dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    Note that the preceding code converts the file path to a URL before sending it
    to the audio player. While both a file path and a URL are valid references to
    a file location, you need to convert the file path to the `NSURL` data type to
    comply with the API. You may be wondering why we did not use the `NSData`-based
    `init` method. To use this method, you need to load the file into memory. While
    that’s appropriate for a file downloaded from a network source (where you don’t
    want to save the file to disk), it adds extra overhead that you don’t need for
    this app.


    Building a Playback Interface


    Now that the audio player is initialized, you might think the app would be ready
    to start playing files. Unfortunately, `AVAudioPlayer` is a *headless* class,
    meaning it provides no user interface. To start and control audio playback, you
    need to trigger them via user actions.


    Starting or Pausing Playback


    The primary control for your audio player is the Play button. As its name indicates,
    users will use this to initiate playback. It serves a dual purpose: if a music
    file is already playing, you want to let the user pause playback by clicking this
    button.


    The method that starts playback using the audio player is `[AVAudioPlayer play]`,
    which tells the audio player to start processing the input file and automatically
    begins playback as soon as the player is ready. You should make this call from
    the button handler for the Play button, as shown in [Listing 5-14](#9781430250838_Ch05.xhtml#list14).
    Make sure to tie this function to your storyboard in Interface Builder.


    [***Listing 5-14***](#9781430250838_Ch05.xhtml#_list14). Initiating Audio Playback


    ```

    -(IBAction)play:(id)sender

    {

        [self.audioPlayer play];

    }

    ```


    Unlike images, audio and video files are treated as streams of data by the system
    and require additional time to build up a memory buffer where they can preload
    data. The buffer allows the player to have enough data so it can play back the
    file at the default speed (1x). Unfortunately, you cannot predict how long it
    will take to fill the buffer, so the `[AVAudioPlayer play]` method is *asynchronous*
    (meaning it will not block other events in your app).


    **Note**  You can force the audio player to buffer a file with the `[AVAudioPlayer
    prepareToPlay]` method. This method is automatically called as part of `[AVAudioPlayer
    play]`, but calling it separately speeds up your user experience, especially if
    you do not expect to automatically start playing a file as soon as the user selects
    it.


    At this point, your app can play the file, but cannot yet pause it. The `[AVAudioPlayer
    pause:]` pauses the player. However, before calling the pause method, you should
    check to see if the audio player is currently playing a file. You query the playback
    status of the audio player via the `[AVAudioPlayer isPlaying]` property, as shown
    in the example in [Listing 5-15](#9781430250838_Ch05.xhtml#list15).


    [***Listing 5-15***](#9781430250838_Ch05.xhtml#_list15). Using Playback Status
    to Determine Button Action


    ```

    -(IBAction)play:(id)sender

    {

        if ([self.audioPlayer isPlaying]) {

            [self.audioPlayer pause];

            self.playButton.titleLabel.text = @"Play";

        } else {

            [self.audioPlayer play];

            self.playButton.titleLabel.text = @"Pause";

        }


    }

    ```


    In addition to changing the action, the code also changes the title of the button.
    This is a critical step, because you want to reflect the state change to the user.


    To complete the playback cycle, you need to reset the user interface when playback
    has completed. You may remember that one of the first steps in setting up the
    audio player was to declare that the main view controller would implement the
    `AVAudioPlayerDelegate` protocol. The delegate method that the player sends when
    it has completed playing a file is `audioPlayerDidFinishPlaying:Successfully:`.
    As shown in [Listing 5-16](#9781430250838_Ch05.xhtml#list16), all you need to
    do is reset the Play button’s text when this message is received. Because the
    app uses runtime logic to determine the action, you do not need to rewire the
    button.


    [***Listing 5-16***](#9781430250838_Ch05.xhtml#_list16). Resetting the User Interface
    Using the Delegate


    ```

    -(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player

                                        successfully:(BOOL)flag

    {

        if (flag) {

            self.playButton.titleLabel.text = @"Play";

        }

    }

    ```


    Skipping Forward or Backward


    Now that you can play or pause a file, you can move onto another common playback
    function: the ability to skip forward or backward. As with the Play button, the
    app controls these functions via button handlers. Unlike the Play button, however,
    the functionality is discrete enough so that each function should have a separate
    UI element.


    You can force the audio player to seek to a specific time in a file by setting
    the value of the `[AVAudioPlayer currentTime]` property to a desired time. For
    this app, you want to be able to skip forward or backward by 15 seconds.


    For the skip-forward functionality, you can get the desired time by adding 15
    to the current time value from the audio player. The `NSTimeInterval` data type
    counts in seconds. To prevent the user from skipping beyond the end of the file
    (which is an invalid action), you compare the new calculated target time to the
    duration of the file, before setting the new time value for the player. You can
    get the duration of the current file from the audio player by using the `[AVAudioPlayer
    duration]` property.


    [Listing 5-17](#9781430250838_Ch05.xhtml#list17) shows the skip-forward implementation.


    [***Listing 5-17***](#9781430250838_Ch05.xhtml#_list17). Button Handler for Skipping
    Forward


    ```

    -(IBAction)skipForward:(id)sender

    {

        if ([self.audioPlayer isPlaying]) {


    NSTimeInterval desiredTime =

                self.audioPlayer.currentTime + 15.0f;

            if (desiredTime < self.audioPlayer.duration) {

                self.audioPlayer.currentTime = desiredTime;

            }

        }

    }

    ```


    You follow similar logic to implement skipping backward. However, instead of checking
    the duration of the file, compare the calculated time to 0 (the start of the file).
    If the user attempts to skip backward when the player is less than 15 seconds
    into playback, you send the user to the beginning of the file. Otherwise, send
    the user to the position 15 seconds before the current position. [Listing 5-18](#9781430250838_Ch05.xhtml#list18)
    shows an example.'
  trans: "好的，作为高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n现在您已将音频播放器对象添加到类中，需要对其进行初始化。`AVAudioPlayer`类提供了两个主要的`init`方法，分别是`[AVAudioPlayer\
    \ initWithContentsOfURL:error:]`和`[AVAudioPlayer initWithData:error:]`。请记住，当文件视图控制器完成时，您将返回目标音频文件的文件路径，这意味着可以使用基于`URL`的`init`方法。播放器没有源文件就无法初始化，因此请将初始化功能放在接收来自文件视图控制器的文件的委托方法中，如列表\
    \ 5-13 所示。\n\n***列表 5-13***. 选择文件时初始化音频播放器\n\n```\n-(void)didFinishWithFile:(NSString\
    \ *)filePath\n\nself.selectedFilePath = filePath;\n\nNSError *error = nil;\n \
