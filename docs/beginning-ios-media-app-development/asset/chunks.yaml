    ## 总结\n\n本章中，你学习了如何使用`MPMoviePlayerController`类播放视频，以及如何使用`UIImagePickerController`类录制视频。在MyVideoPlayer应用中，你看到使用`MediaPlayer`框架播放音频和视频的主要区别在于配置播放器的播放设置和父视图。为了捕捉错误和自动播放内容，你学习了如何实现通知观察者。\n\
    \n在MyVideoRecorder应用中，你通过集成`UIImagePickerController`学习了如何为MyVideoPlayer应用添加视频录制功能。你再次看到，通过将该类配置为仅处理视频并添加一些额外的配置选项，你可以创造一种易于捕获视频的用户体验。\n\
    \n## 第9章 构建自定义视频播放界面\n\n遵循本书中图像和音频单元的相同趋势，既然你已经学会了如何使用苹果内置的界面进行视频播放和录制，现在可以开始学习如何“控制”它们的核心功能。在本章中，你将学习如何自定义视频播放界面，从而展示你的品牌标识以及最适合你应用的控件。\n\
    \n为此，你需要在`AVFoundation`的媒体播放功能之上构建自己的用户界面，就像你在[第6章](#9781430250838_Ch06.xhtml)到[第8章](#9781430250838_Ch08.xhtml)中开发的音频应用一样。虽然这看起来可能有些困难，但好消息是媒体播放层的设置相对容易；大部分工作在于构建你的用户体验。\n\
    \n实现基于`AVFoundation`的视频播放器的基本步骤如下：\n\n1.  使用`AVPlayer`类设置一个媒体播放器。\n2.  使用`AVPlayerLayer`类显示视频。\n\
    3.  使用Interface Builder创建自定义播放控件。\n4.  为播放控件和状态变化创建处理程序。\n\n在本章中，你将学习如何通过将MyVideoPlayer项目中的视频播放器替换为你开发的自定义子类来实现这些步骤。该项目包含在源代码包的[第9章](#9781430250838_Ch09.xhtml)文件夹中，名称为MyCustomVideoPlayer。为了简化过渡，你将设计一个基于通知的消息系统，它非常类似于`MPMoviePlayerController`类。\n\
    \n大多数视频应用需要在全屏模式下暴露完整的控件集，因此该项目专注于为全屏视频播放界面构建控件。你可以在图[9-1](#9781430250838_Ch09.xhtml#Fig1)中找到更新后的视频播放界面原型。\n\
    \n![9781430250838_Fig09-01.jpg](images/9781430250838_Fig09-01.jpg)\n\n[图9-1](#9781430250838_Ch09.xhtml#_Fig1).\
    \ MyCustomVideoPlayer视频播放界面原型\n\n将新的视频播放界面与默认的iOS视频界面（如图[9-2](#9781430250838_Ch09.xhtml#Fig2)所示）进行比较，你可以看到该项目更强调手指操作的便利性。用户无需费力寻找播放按钮或精确跳转几秒钟，屏幕中央较大的按钮减少了用户出错的机会。在播放过程中，屏幕底部的滑块会向右移动以显示当前进度。用户还可以使用该控件**拖放**（跳跃）到视频的任何位置。通过使用屏幕中央的控件，用户可以切换播放状态或向前/向后跳转几秒钟。在几秒钟无操作后，控件会消失，这样它们既可用又不会分散注意力或占用屏幕空间。\n\
    \n![9781430250838_Fig09-02.jpg](images/9781430250838_Fig09-02.jpg)\n\n[图9-2](#9781430250838_Ch09.xhtml#_Fig2).\
    \ 默认iOS视频播放界面（左）与自定义播放界面（右）\n\n## 开始\n\n要开始使用MyCustomVideoPlayer项目，请从[第10章](#9781430250838_Ch10.xhtml)复制MyVideoPlayer项目并将其重命名为`MyCustomVideoPlayer`。如果你不确定如何克隆项目，请参考[第8章](#9781430250838_Ch08.xhtml)中的“录制视频文件”部分，你在那里克隆了MyVideoPlayer项目以创建MyVideoRecorder项目。\n\
    \n由于该项目使用`AVFoundation`框架进行媒体播放，而不是`MediaPlayer`框架，请在项目设置中的“链接的库和框架”部分进行相应更改。如图[9-3](#9781430250838_Ch09.xhtml#Fig3)所示，你的最终框架列表应仅包含`AVFoundation`框架。\n\
