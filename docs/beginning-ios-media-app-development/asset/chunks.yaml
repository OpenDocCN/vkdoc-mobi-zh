  raw: 'Set the `UIAlertView` to present a text box by using the `[UIAlertView setAlertViewStyle:]`
    instance method. In the next section, you will see how to handle the result.


    Playing Streaming Audio


    After a user has entered a stream URL, you use that information to initialize
    the `AVPlayer` object for the main view controller. Much like the `AVAudioPlayer`
    class, you can load items into an `AVPlayer` item during the initialization path.
    [Listing 6-19](#9781430250838_Ch06.xhtml#list19) shows the delegate method for
    the `UIAlertView`, which initializes the `AVPlayer` and changes the title of the
    Now Playing label.


    [***Listing 6-19***](#9781430250838_Ch06.xhtml#_list19). Initializing the AVPlayer


    ```

    -(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        if (buttonIndex == 1) {

            NSString *selectedUrlString =

               [alertView textFieldAtIndex:0].text;

            self.selectedURL = [NSURL URLWithString:selectedUrlString];

            self.titleLabel.text = [NSString stringWithFormat:

                                    @"Now Playing: %@", selectedUrlString];

            self.audioPlayer = [[AVPlayer alloc] initWithURL:

                                self.selectedURL];

        }

    }

    ```


    To play audio, reuse the same basic logic from the other two media player apps—start
    or stop based on the playback status. For the `AVPlayer` class, you query status
    through the `status` property. If the value is `AVPlayerStatusReadyToPlay`, the
    player is ready to start playing back audio; otherwise, it is already playing,
    or an error occurred while connecting to the stream. You can find out if an error
    occurred by checking whether the `error` status is non-`nil`. [Listing 6-20](#9781430250838_Ch06.xhtml#list20)
    shows the action handler for the Play button that attempts to start playback or
    displays an error.


    [***Listing 6-20***](#9781430250838_Ch06.xhtml#_list20). Action Handler for Play
    Button


    ```

    -(IBAction)play:(id)sender

    {

        if (self.audioPlayer.error != nil) {

            UIAlertView *alert = [[UIAlertView alloc]

                                  initWithTitle:@"Error"

               message:[self.audioPlayer.error description] delegate:self

                        cancelButtonTitle:@"OK" otherButtonTitles:nil];

            [alert show];

        } else {

            if ([self.audioPlayer status] != AVPlayerStatusReadyToPlay) {

                [self.audioPlayer pause];

                self.playButton.titleLabel.text = @"Play";


    } else {

                [self.audioPlayer play];

                self.playButton.titleLabel.text = @"Pause";

            }

        }

    }

    ```


    Playing Event Sounds (Including Vibration)


    Often, you will want to play a short sound effect in response to a user-interface
    event, such as a snap sound when a user takes a picture with the camera, or a
    typing sound when the user enters text. As you may remember from [Chapter 5](#9781430250838_Ch05.xhtml),
    the process for playing sounds by using the `AVAudioPlayer` class requires a lot
    of setup, and may take a few seconds to initialize. Therefore, to play very short
    sound files (of less than 30 seconds), Apple recommends using the System Sound
    Services APIs, which are bundled with the `AudioToolbox` framework.


    The idea behind System Sound Services is to create a programmatic interface that
    re-creates the functionality of the Sound Effects panel in OS X, shown in [Figure
    6-5](#9781430250838_Ch06.xhtml#Fig5). This panel, accessible from the Sound system
    preference pane, lets you specify the named sound effect that should play when
    an alert view or other action happens on the computer.


    ![9781430250838_Fig06-05.jpg](images/9781430250838_Fig06-05.jpg)


    [Figure 6-5](#9781430250838_Ch06.xhtml#_Fig5). OS X Sound Effects panel


    While iOS has its own system sounds panel, as of this writing, Apple does not
    allow you to access it within your app. However, by defining your own system sounds,
    you can take advantage of the same functionality.


    To play a system sound, implement the following steps:


    1.  Create a URL reference to the sound file you want to play.

    2.  Create a `SystemSoundID` object using this URL reference.

    3.  Play your desired sound by referencing its `SystemSoundID` object.


    Getting Started


    To help you learn how to use system sounds, you will implement the SystemSounds
    project in the in the `Chapter 6` folder of the source code bundle. SystemSounds
    is a simple, single-view application that plays a sound effect or causes your
    device to vibrate, depending on which button is pressed. [Figure 6-6](#9781430250838_Ch06.xhtml#Fig6)
    shows a mock-up of the application.


    ![9781430250838_Fig06-06.jpg](images/9781430250838_Fig06-06.jpg)


    [Figure 6-6](#9781430250838_Ch06.xhtml#_Fig6). Mock-up of SystemSounds project


    Before getting started with system sounds, you need to include the `AudioToolbox`
    framework in your project. You can find this framework in the usual manner by
    navigating to your project settings and using the framework browser that appears
    in the Link Binary with Libraries section under the Build Phases tab.


    Next, you need to include the `AudioToolbox.h` header file for the framework in
    the class that will be implementing it. For the SampleSounds project, this class
    is the `MainViewController`:


    ```

    #import <AudioToolbox/AudioToolbox.h>

    ```


    **Note**  The `AudioToolbox` framework is separate from `AVFoundation`, so remember
    to include both if you want to use them in the same project.


    Creating a System Sound


    The `AudioToolbox` framework derives part of its speed advantage over `AVFoundation`
    because it’s a C-based framework. At a compiler level, Objective-C is implemented
    on top of C, so working directly in C allows the framework to reduce overhead
    and represent data in a way that is closer to what the hardware expects.


    As a result, to initialize your system sounds, you need to provide the system
    with a URL reference (`CFURLRef`), rather than a `NSURL` object. The `CFBundleCopyResourceURL()`
    method allows you to create a URL reference in a similar manner to retrieving
    a file url; by specifying the path of the main bundle and the name and type of
    your desired file. [Listing 6-21](#9781430250838_Ch06.xhtml#list21) shows an example
    method that creates URL references.


    [***Listing 6-21***](#9781430250838_Ch06.xhtml#_list21). Creating a URL Reference
    to a Sound File


    ```

    - (void)initializeSystemSound

    {

        CFBundleRef mainBundle = CFBundleGetMainBundle();

        CFURLRef clickUrlRef = CFBundleCopyResourceURL(mainBundle,

            CFSTR("click"), CFSTR("wav"), nil);


    }

    ```


    To reduce overhead, the `AudioToolbox` classes accept only uncompressed audio
    files (also known as *Linear PCM files*). To meet this requirement, you should
    always use AIF and WAV files for your system sounds.


    To operate at a low level, your sound files will need to be loaded in memory,
    so make sure you include them in your main bundle by adding them to your project
    (refer to [Chapter 2](#9781430250838_Ch02.xhtml) for a more detailed explanation
    of bundles). To access the main bundle, you need to use a bundle reference (`CFBundleRef`),
    which you can easily find by using the `CFGetMainBundle()` function. Because you
    are operating at the C level, you cannot use the `NSString` class; instead, you
    need to use string references (`CFStringRef`). A quick shortcut for creating a
    one-time-use `CFStringRef` is the macro function `CFStr()`.


    **Note**  You may be wondering why I keep using parentheses for method calls in
    this example. This is C-style syntax! Always use the correct syntax for the framework
    you are referencing. Try to avoid C-style calls to Objective-C frameworks; doing
    so will make debugging more difficult.'
  trans: "\n使用 `[UIAlertView setAlertViewStyle:]` 实例方法将 `UIAlertView` 设置为显示文本框。在下一节中，你将了解如何处理结果。\n\
    \n# 播放流媒体音频\n\n当用户输入流媒体 URL 后，你便可以利用该信息为主视图控制器初始化 `AVPlayer` 对象。与 `AVAudioPlayer`\
    \ 类非常相似，你可以在初始化过程中将项目加载到 `AVPlayer` 项目中。代码清单 6-19 展示了 `UIAlertView` 的委托方法，该方法用于初始化\
    \ `AVPlayer` 并更改“正在播放”标签的标题。\n\n***代码清单 6-19***. 初始化 AVPlayer\n\n```\n-(void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
    \ == 1) {\n        NSString *selectedUrlString =\n           [alertView textFieldAtIndex:0].text;\n\
    \        self.selectedURL = [NSURL URLWithString:selectedUrlString];\n       \
    \ self.titleLabel.text = [NSString stringWithFormat:\n                       \
    \         @\"Now Playing: %@\", selectedUrlString];\n        self.audioPlayer\
    \ = [[AVPlayer alloc] initWithURL:\n                            self.selectedURL];\n\
    \    }\n}\n```\n\n要播放音频，请复用其他两个媒体播放器应用中的基本逻辑——根据播放状态启动或停止。对于 `AVPlayer` 类，你可以通过\
    \ `status` 属性查询其状态。如果该值为 `AVPlayerStatusReadyToPlay`，则说明播放器已准备好开始播放音频；否则，要么正在播放，要么在连接流媒体时发生错误。你可以通过检查\
    \ `error` 状态是否为非 `nil` 来判断是否发生了错误。代码清单 6-20 展示了“播放”按钮的操作处理器，该处理器尝试开始播放或显示错误信息。\n\
    \n***代码清单 6-20***. 播放按钮的操作处理器\n\n```\n-(IBAction)play:(id)sender\n{\n    if (self.audioPlayer.error\
    \ != nil) {\n        UIAlertView *alert = [[UIAlertView alloc]\n             \
    \                 initWithTitle:@\"Error\"\n           message:[self.audioPlayer.error\
    \ description] delegate:self\n                    cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
    \        [alert show];\n    } else {\n        if ([self.audioPlayer status] !=\
    \ AVPlayerStatusReadyToPlay) {\n            [self.audioPlayer pause];\n      \
    \      self.playButton.titleLabel.text = @\"Play\";\n\n} else {\n            [self.audioPlayer\
    \ play];\n            self.playButton.titleLabel.text = @\"Pause\";\n        }\n\
    \    }\n}\n```\n\n# 播放事件音效（包括振动）\n\n通常，你会希望播放一个简短音效以响应用户界面事件，例如，当用户用相机拍照时发出咔嚓声，或者用户在输入文本时发出打字声。你可能还记得，在第\
    \ 5 章中，使用 `AVAudioPlayer` 类播放声音的过程需要大量设置，并且可能需要几秒钟来初始化。因此，对于播放非常短的声音文件（少于 30 秒），Apple\
    \ 建议使用 `AudioToolbox` 框架中包含的系统声音服务 API。\n\n系统声音服务的理念是创建一个编程接口，用以重现 OS X 中“音效”面板的功能，如图\
    \ 6-5 所示。该面板可通过“声音”系统偏好设置窗格访问，允许你指定在警报视图或其他操作发生时计算机应播放的命名音效。\n\n![9781430250838_Fig06-05.jpg](img/9781430250838_Fig06-05.jpg)\n\
    \n图 6-5. OS X 音效面板\n\n虽然 iOS 有自己系统声音面板，但在撰写本文时，Apple 不允许你在应用中访问它。然而，通过定义你自己的系统声音，你可以利用相同的功能。\n\
    \n要播放系统声音，请执行以下步骤：\n\n1.  为你想要播放的声音文件创建一个 URL 引用。\n2.  使用此 URL 引用创建一个 `SystemSoundID`\
    \ 对象。\n3.  通过引用其 `SystemSoundID` 对象来播放你所需的声音。\n\n## 开始上手\n\n为了帮助你学习如何使用系统声音，你将实现源代码包\
    \ `Chapter 6` 文件夹中的 SystemSounds 项目。SystemSounds 是一个简单的单视图应用，根据按下的按钮，播放音效或使设备振动。图\
    \ 6-6 展示了该应用的模型图。\n\n![9781430250838_Fig06-06.jpg](img/9781430250838_Fig06-06.jpg)\n\
    \n图 6-6. SystemSounds 项目模型图\n\n在开始使用系统声音之前，你需要在项目中包含 `AudioToolbox` 框架。你可以通过通常的方式找到该框架：导航到项目设置，然后使用出现在“构建阶段”选项卡下“将二进制文件链接到库”部分中的框架浏览器。\n\
    \n接下来，你需要在将要实现该框架的类中包含 `AudioToolbox.h` 头文件。对于 SampleSounds 项目，这个类是 `MainViewController`：\n\
    \n```\n#import <AudioToolbox/AudioToolbox.h>\n```\n\n**注意**  `AudioToolbox` 框架与\
    \ `AVFoundation` 是分开的，因此如果你要在同一项目中使用两者，请记得都包含它们。\n\n### 创建系统声音\n\n`AudioToolbox`\
    \ 框架相对于 `AVFoundation` 具有速度优势，部分原因在于它是一个基于 C 语言的框架。在编译器层面，Objective-C 是在 C 语言之上实现的，因此直接使用\
    \ C 语言可以使框架减少开销，并以更接近硬件期望的方式表示数据。\n\n因此，要初始化你的系统声音，你需要向系统提供一个 URL 引用（`CFURLRef`），而不是\
    \ `NSURL` 对象。`CFBundleCopyResourceURL()` 方法允许你以类似于检索文件 URL 的方式创建 URL 引用：通过指定主束的路径以及所需文件的名称和类型。代码清单\
    \ 6-21 展示了一个创建 URL 引用的示例方法。\n\n***代码清单 6-21***. 为声音文件创建 URL 引用\n\n```\n- (void)initializeSystemSound\n\
    {\n    CFBundleRef mainBundle = CFBundleGetMainBundle();\n    CFURLRef clickUrlRef\
    \ = CFBundleCopyResourceURL(mainBundle,\n        CFSTR(\"click\"), CFSTR(\"wav\"\
    ), nil);\n\n}\n```\n\n为降低开销，`AudioToolbox` 类仅接受未压缩的音频文件（也称为*线性 PCM 文件*）。为满足此要求，你的系统声音应始终使用\
    \ AIF 和 WAV 文件。\n\n为了在底层运行，你的声音文件需要加载到内存中，因此请确保通过将它们添加到项目中来包含在主束中（关于束的更详细说明，请参阅第\
    \ 2 章）。要访问主束，你需要使用束引用（`CFBundleRef`），你可以通过 `CFGetMainBundle()` 函数轻松找到它。由于你在 C\
    \ 语言层面操作，因此不能使用 `NSString` 类；相反，你需要使用字符串引用（`CFStringRef`）。创建一次性使用的 `CFStringRef`\
    \ 的快捷方式是使用宏函数 `CFStr()`。\n\n**注意**  你可能想知道为什么我在此示例中一直对方法调用使用括号。这是 C 语言的语法！请始终为你所引用的框架使用正确的语法。尽量避免对\
    \ Objective-C 框架使用 C 语言风格的调用；这样做会使调试变得更加困难。\n"
- fmt: "现在你已经有了一个有效的音效文件引用，你需要创建一个系统声音 ID 对象（`SystemSoundID`）来播放它，这需要使用 `AudioToolbox`\
    \ 框架。你将在整个调用类中复用这个对象，因此请确保将其声明为实例变量。由于你需要对 `AudioToolbox` 类使用 C 语法，因此需要在类的 `@implementation`\
    \ 块中声明该变量：\n\n```\nSystemSoundID clickSoundId;\n```\n\n在示例项目中，你可以在 `MainViewController.m`\
    \ 文件中找到这个声明。\n\n你可以通过调用 `AudioServicesCreateSystemSoundID()` 函数来初始化 `SystemSoundID`\
    \ 对象，该函数需要你之前生成的 URL 引用和一个指向系统声音 ID 对象的指针。[清单 6-22](#9781430250838_Ch06.xhtml#list22)\
    \ 展示了 `[self initializeSystemSounds]` 方法的修改版本，它会在运行时为一个系统声音 ID 创建一个指针。\n\n[***清单\
    \ 6-22***](#9781430250838_Ch06.xhtml#_list22). 创建一个 `SystemSoundID` 对象\n\n```\n\
    - (void)initializeSystemSound\n{\n    CFBundleRef mainBundle = CFBundleGetMainBundle();\n\
    \    CFURLRef clickUrlRef = CFBundleCopyResourceURL(mainBundle,\n        CFSTR(\"\
    click\"), CFSTR(\"wav\"), nil);\n\nAudioServicesCreateSystemSoundID (clickUrlRef,\
    \ &clickSoundId);\n}\n```\n\n与上一章初始化音频会话时需要*按引用*传递 `NSError` 对象的方式类似，你同样需要*按引用*传递你的\
    \ `systemSoundId` 对象来初始化它们。回顾一下，按引用传递时，你可以修改传入对象的内容，而不是修改它在内存中的副本。\n\n如果你需要创建多个系统声音，请按照流程为每个声音创建一个\
    \ URL 引用和 `SystemSoundID` 对象。\n\n最后一点，你需要在调用所有系统声音 ID 对象之前完成它们的初始化，因此请从属于初始化过程的方法中调用\
    \ `[self initializeSystemSounds]` 方法。示例项目在 `MainViewController` 类中的 `[self viewDidLoad]`\
    \ 方法里进行了此调用。\n\n## 播放系统声音\n\n既然你已经初始化了系统声音，就可以通过使用你的 `SystemSoundID` 对象调用 `AudioServicesPlaySystemSound()`\
    \ 方法来播放它们。系统声音初始化后，你可以在类的生命周期内的任何时刻调用它们。[清单 6-23](#9781430250838_Ch06.xhtml#list23)\
    \ 展示了一个播放系统声音的按钮处理程序示例。\n\n[***清单 6-23***](#9781430250838_Ch06.xhtml#_list23).\
    \ 播放系统声音\n\n```\n-(IBAction)playSound:(id)sender\n{\n    AudioServicesPlaySystemSound(clickSoundId);\n\
    }\n```\n\n**注意**  “系统声音服务”仅适用于非常简单的音频文件。它只能播放最多 30 秒的文件，使用用户当前的音频设置（音量、静音等），并且一次只能播放一个。如果需要更高级的播放功能，请继续使用\
    \ `AVAudioPlayer` 类。\n\n## 使设备振动\n\n“系统声音服务”提供了两种使设备振动的方式：一种是在播放系统声音的同时振动，另一种是代替播放系统声音而振动。\n\
    \n**注意**  振动功能仅在 iPhone 设备上可用；但是，在不兼容的设备上调用这些 API 是无害的；`vibrate` 命令将会被简单地忽略。\n\
    \n为了在播放系统声音时使设备振动，可以使用 `AudioServicesPlayAlertSound()` 方法代替 `AudioServicesPlaySystemSound()`\
    \ 方法，如[清单 6-24](#9781430250838_Ch06.xhtml#list24) 所示。\n\n[***清单 6-24***](#9781430250838_Ch06.xhtml#_list24).\
    \ 播放带振动的系统声音\n\n```\n-(IBAction)playSoundAndVibrate:(id)sender\n{\n    AudioServicesPlayAlertSound(clickSoundId);\n\
    }\n```\n\nApple 对于“没有全局可访问的系统声音”这一规则有一个例外：当你希望设备振动但不播放声音时。要实现这一点，可以使用 `AudioToolbox`\
    \ 中用于振动的常量 `kSystemSoundID_Vibrate` 调用 `AudioServicesPlaySystemSound()` 方法。[清单\
    \ 6-25](#9781430250838_Ch06.xhtml#list25) 展示了一个示例。\n\n[***清单 6-25***](#9781430250838_Ch06.xhtml#_list25).\
    \ 使设备振动但不播放声音\n\n```\n-(IBAction)vibrate:(id)sender\n{\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
    }\n```\n\n**注意**  与播放普通系统声音一样，一次只能有一个振动效果处于激活状态。在撰写本文时，还没有公开的 API 可以控制振动的强度或播放时长。\n\
    \n## 总结\n\n在本章中，你学习了如何将三种新的音频源集成到你的应用：iPod 音乐文件、流式音频和系统声音。在实现 `MyPod` 应用时，你看到了\
    \ `MediaPlayer` 框架如何提供对 iPod 应用的深度访问，同时遵循与 `AVFoundation` 播放类相似的许多设计模式。通过 `MyStreamingPlayer`\
    \ 应用，你学习了如何修改你的音频文件播放器来播放流式音频——这主要包括使用 `AVPlayer` 类代替 `AVAudioPlayer` 类。通过 `SystemSounds`\
    \ 应用，你学习了如何使用 `SystemsSounds` 类将基于 `C` 的代码集成到你的应用中，以快速播放短音效文件或使手机振动。\n\n最后要记住一点：这些类并不是互斥的；你可以在同一个应用中使用它们中的任意一个或全部，只要为你尝试播放的每个音频源维护一个对象即可。\n\
    \n# 第 7 章\n\n# 高级音频主题\n\n在第 5 章和第 6 章中，你学习了如何构建接受多种输入源（包括本地文件、用户的 iPod 音乐库和流式广播）的音频播放器应用。你还学习了如何使用基于\
    \ `AVFoundation` 和 `MediaPlayer` 框架的媒体播放器，并看到了它们之间的一些相似之处。\n\n在本章中，你将学习如何通过增加一些功能，使你的音频应用更加强大，这些功能可以将你的音频从其他设备任务的干扰中解放出来。这些功能将使你的应用在用户触发外部事件（例如将应用切换到后台或拔掉耳机）时能够继续运行。在此过程中，你还会探索一些额外的高级功能，例如\
    \ `AirPlay` 和“远程控制”，它们允许用户在应用内置的用户界面之外与其进行交互。\n\n## 后台音频\n\n在第 5 章的 `MyPlayer`\
    \ 项目中，你构建了一个可以播放应用文档目录中声音文件的应用。不幸的是，你可能已经注意到，将应用发送到后台（无论是通过让设备“休眠”还是打开另一个应用）都会暂停播放。不过，通过对项目设置和音频会话进行一些调整，你可以使基于\
    \ `AVFoundation` 的音频应用即使在后台运行时也能继续播放。以下是您需要进行的主要更改：\n\n*   为你的应用添加后台模式\n*   选择兼容后台的会话类型\n\
    \n在本节中，你将修改第 5 章的 `MyPlayer` 项目，使其能够在后台播放音频。你可以在源代码包的“第 7 章”文件夹中找到该项目的副本（参见 Apress\
    \ 网站 `www.apress.com` 的源代码/下载区域），其中包含了后台音频的修改。该项目保留 `MyPlayer` 名称。在构建第 5 章中 `MyPlayer`\
    \ 项目的初始版本时，你学习了如何执行以下操作：\n\n*   初始化音乐播放器\n*   指定媒体查询（你可以将其视为播放列表）\n*   构建播放界面\n\
    *   显示歌曲信息（元数据）"
  raw: 'Now that you have a valid reference to your sound file, you need to create
    a system sound ID object (`SystemSoundID`) to play it, using the `AudioToolbox`
    framework. You’ll reuse this object throughout the calling class, so make sure
    you declare it as an instance variable. Because you need to use C syntax for the
    `AudioToolbox` classes, you need to declare the variable within your class’s `@implementation`
    block:


    ```

    SystemSoundID clickSoundId;

    ```


    In the sample project, you can find this declaration in the `MainViewController.m`
    file.


    You can initialize your `SystemSoundID` object by calling the `AudioServicesCreateSystemSoundID()`
    function with the URL reference you generated earlier and a pointer to the system
    sound ID object. [Listing 6-22](#9781430250838_Ch06.xhtml#list22) shows a modified
    version of the `[self initializeSystemSounds]` method, which creates a pointer
    for a system sound ID at runtime.


    [***Listing 6-22***](#9781430250838_Ch06.xhtml#_list22). Creating a SystemSoundID
    Object


    ```

    - (void)initializeSystemSound

    {

        CFBundleRef mainBundle = CFBundleGetMainBundle();

        CFURLRef clickUrlRef = CFBundleCopyResourceURL(mainBundle,

            CFSTR("click"), CFSTR("wav"), nil);


    AudioServicesCreateSystemSoundID (clickUrlRef, &clickSoundId);

    }

    ```


    In a manner similar to the way you needed to pass `NSError` objects *by reference*
    when you initialized an audio session in the preceding chapter, you also need
    to pass your `systemSoundId` object by reference to initialize them. As a refresher,
    when passing by reference, you can change the contents of the object you pass
    in, rather than modifying a copy of it in memory.


    If you need to create multiple system sounds, follow the process to create a URL
    reference and `SystemSoundID` object for each sound.


    As a final note, you need to initialize all your system sound ID objects before
    you can call them, so call the `[self initializeSystemSounds]` method from a method
    that is part of your initialization process. The sample project makes this call
    from `[self viewDidLoad]` in the `MainViewController` class.


    Playing a System Sound


    Now that you have initialized your system sounds, you can play them by calling
    the `AudioServicesPlaySystemSound()` method with your `SystemSoundID` object.
    After system sounds are initialized, you can call them at any time during the
    lifetime of a class. [Listing 6-23](#9781430250838_Ch06.xhtml#list23) shows an
    example of a button handler that plays a system sound.


    [***Listing 6-23***](#9781430250838_Ch06.xhtml#_list23). Playing a System Sound


    ```

    -(IBAction)playSound:(id)sender

    {

        AudioServicesPlaySystemSound(clickSoundId);

    }

    ```


    **Caution**  System Sound Services is intended for very simple audio files only.
    It is able to play back only 30-second files, using the user’s current audio settings
    (volume, mute, and so forth), one at a time. If you require more-advanced playback,
    continue to use the `AVAudioPlayer` class.


    Making the Device Vibrate


    System Sound Services offers two options for making a user’s device vibrate: either
    when a system sound is played, or in place of a system sound.


    **Note**  Vibration is available only on iPhone devices; however, there’s no harm
    in calling these APIs on incompatible devices; the `vibrate` command will simply
    be ignored.


    To make a device vibrate when a system sound is played, instead of calling the
    `AudioServicesPlaySystemSound()` method, use the `AudioServicesPlayAlertSound()`
    method, as shown in [Listing 6-24](#9781430250838_Ch06.xhtml#list24).


    [***Listing 6-24***](#9781430250838_Ch06.xhtml#_list24). Playing a System Sound
    with Vibration


    ```

    -(IBAction)playSoundAndVibrate:(id)sender

    {

        AudioServicesPlayAlertSound(clickSoundId);

    }

    ```


    Apple makes one exception to their rule of “no globally accessible system sounds”:
    when you want the device to vibrate without playing a sound. To do that, call
    the `AudioServicesPlaySystemSound()` method with the `AudioToolbox` constant for
    vibration, `kSystemSoundID_Vibrate`. [Listing 6-25](#9781430250838_Ch06.xhtml#list25)
    shows an example.


    [***Listing 6-25***](#9781430250838_Ch06.xhtml#_list25). Making the Device Vibrate
    Without Playing a Sound


    ```

    -(IBAction)vibrate:(id)sender

    {

        AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);

    }

    ```


    **Note**  As when playing regular system sounds, you can have only one vibration
    effect active at a time. At the time of this writing, there are no public APIs
    to control vibration intensity or playback length.


    Summary


    In this chapter, you saw how to integrate three new audio sources into your apps:
    iPod music files, streaming audio, and system sounds. In implementing the MyPod
    app, you saw how the `MediaPlayer` framework gives you deep access into the iPod
    app, yet follows many of the same design patterns as the `AVFoundation` playback
    classes. With the MyStreamingPlayer app, you learned how to modify your audio
    file player to play streaming audio—which consisted primarily of using the `AVPlayer`
    class instead of the `AVAudioPlayer` class. With the SystemSounds app, you learned
    how to use the `SystemsSounds` classes to integrate C-based code into your apps
    to play short sound files quickly, or to vibrate the phone.


    As a final takeaway, remember, none of these classes are mutually exclusive; you
    can use any or all of the them in the same app, as long as you maintain an object
    for each audio source you are trying to play.


    Chapter    7


    Advanced Audio Topics


    In [Chapters 5](#9781430250838_Ch05.xhtml) and [6](#9781430250838_Ch06.xhtml),
    you learned how to build audio player applications that accept a wide variety
    of input sources, including local files, a user’s iPod music library, and streaming
    radio. You also learned how to use media players based on the `AVFoundation` and
    `MediaPlayer` frameworks and saw some of their similarities.


    In this chapter, you will learn ways to make your audio apps even more powerful
    by adding features that free your audio from interference by other device tasks.
    These features will allow your apps to keep operating when users initiate an external
    event, such as backgrounding your app or unplugging the headphones. Along the
    way, you will also explore some additional, cool features such as AirPlay and
    “remote controls,” which allow users to interact with your app outside its built-in
    user interface.


    Backgrounding Audio


    In the MyPlayer project in [Chapter 5](#9781430250838_Ch05.xhtml), you built an
    application that would play sound files in the application’s documents directory.
    Unfortunately, you may have noticed that sending the application to the background
    (either by setting the device to “sleep” or opening another application) paused
    playback. However, with a few tweaks to your project settings and audio session,
    you can make your `AVFoundation`-based audio applications continue playback even
    when they are backgrounded. Here are the major changes you need to make:


    *   Adding background modes to your application

    *   Selecting a background-compatible session type


    In this section, you will modify the MyPlayer project from [Chapter 5](#9781430250838_Ch05.xhtml)
    to allow it to play audio in the background. You''ll find a copy of the project
    with the background audio modifications in the [Chapter 7](#9781430250838_Ch07.xhtml)
    folder of the source code bundle (see the Source Code/Download area of the Apress
    web site at `www.apress.com`). The project retains the MyPlayer name. While building
    the initial version of the MyPlayer project in [Chapter 5](#9781430250838_Ch05.xhtml),
    you saw how to do the following:


    *   Initialize the music player

    *   Specify a media query (you can think of this as a playlist)

    *   Build a playback interface

    *   Display song information (metadata)'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的格式要求，完成英文到中文的翻译。\n\n\n现在你已经有了一个有效的音效文件引用，你需要创建一个系统声音\
    \ ID 对象（`SystemSoundID`）来播放它，这需要使用 `AudioToolbox` 框架。你将在整个调用类中复用这个对象，因此请确保将其声明为实例变量。由于你需要对\
    \ `AudioToolbox` 类使用 C 语法，因此需要在类的 `@implementation` 块中声明该变量：\n\n```\nSystemSoundID\
    \ clickSoundId;\n```\n\n在示例项目中，你可以在 `MainViewController.m` 文件中找到这个声明。\n\n你可以通过调用\
    \ `AudioServicesCreateSystemSoundID()` 函数来初始化 `SystemSoundID` 对象，该函数需要你之前生成的 URL\
    \ 引用和一个指向系统声音 ID 对象的指针。清单 6-22 展示了 `[self initializeSystemSounds]` 方法的修改版本，它会在运行时为一个系统声音\
    \ ID 创建一个指针。\n\n***清单 6-22***. 创建一个 `SystemSoundID` 对象\n\n```\n- (void)initializeSystemSound\n\
    {\n    CFBundleRef mainBundle = CFBundleGetMainBundle();\n    CFURLRef clickUrlRef\
    \ = CFBundleCopyResourceURL(mainBundle,\n        CFSTR(\"click\"), CFSTR(\"wav\"\
    ), nil);\n\nAudioServicesCreateSystemSoundID (clickUrlRef, &clickSoundId);\n}\n\
    ```\n\n与上一章初始化音频会话时需要*按引用*传递 `NSError` 对象的方式类似，你同样需要*按引用*传递你的 `systemSoundId`\
    \ 对象来初始化它们。回顾一下，按引用传递时，你可以修改传入对象的内容，而不是修改它在内存中的副本。\n\n如果你需要创建多个系统声音，请按照流程为每个声音创建一个\
    \ URL 引用和 `SystemSoundID` 对象。\n\n最后一点，你需要在调用所有系统声音 ID 对象之前完成它们的初始化，因此请从属于初始化过程的方法中调用\
    \ `[self initializeSystemSounds]` 方法。示例项目在 `MainViewController` 类中的 `[self viewDidLoad]`\
    \ 方法里进行了此调用。\n\n## 播放系统声音\n\n既然你已经初始化了系统声音，就可以通过使用你的 `SystemSoundID` 对象调用 `AudioServicesPlaySystemSound()`\
    \ 方法来播放它们。系统声音初始化后，你可以在类的生命周期内的任何时刻调用它们。清单 6-23 展示了一个播放系统声音的按钮处理程序示例。\n\n***清单\
    \ 6-23***. 播放系统声音\n\n```\n-(IBAction)playSound:(id)sender\n{\n    AudioServicesPlaySystemSound(clickSoundId);\n\
    }\n```\n\n**注意**  “系统声音服务”仅适用于非常简单的音频文件。它只能播放最多 30 秒的文件，使用用户当前的音频设置（音量、静音等），并且一次只能播放一个。如果需要更高级的播放功能，请继续使用\
    \ `AVAudioPlayer` 类。\n\n## 使设备振动\n\n“系统声音服务”提供了两种使设备振动的方式：一种是在播放系统声音的同时振动，另一种是代替播放系统声音而振动。\n\
    \n**注意**  振动功能仅在 iPhone 设备上可用；但是，在不兼容的设备上调用这些 API 是无害的；`vibrate` 命令将会被简单地忽略。\n\
    \n为了在播放系统声音时使设备振动，可以使用 `AudioServicesPlayAlertSound()` 方法代替 `AudioServicesPlaySystemSound()`\
    \ 方法，如清单 6-24 所示。\n\n***清单 6-24***. 播放带振动的系统声音\n\n```\n-(IBAction)playSoundAndVibrate:(id)sender\n\
    {\n    AudioServicesPlayAlertSound(clickSoundId);\n}\n```\n\nApple 对于“没有全局可访问的系统声音”这一规则有一个例外：当你希望设备振动但不播放声音时。要实现这一点，可以使用\
    \ `AudioToolbox` 中用于振动的常量 `kSystemSoundID_Vibrate` 调用 `AudioServicesPlaySystemSound()`\
    \ 方法。清单 6-25 展示了一个示例。\n\n***清单 6-25***. 使设备振动但不播放声音\n\n```\n-(IBAction)vibrate:(id)sender\n\
    {\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n}\n```\n\n**注意**  与播放普通系统声音一样，一次只能有一个振动效果处于激活状态。在撰写本文时，还没有公开的\
    \ API 可以控制振动的强度或播放时长。\n\n## 总结\n\n在本章中，你学习了如何将三种新的音频源集成到你的应用：iPod 音乐文件、流式音频和系统声音。在实现\
    \ `MyPod` 应用时，你看到了 `MediaPlayer` 框架如何提供对 iPod 应用的深度访问，同时遵循与 `AVFoundation` 播放类相似的许多设计模式。通过\
    \ `MyStreamingPlayer` 应用，你学习了如何修改你的音频文件播放器来播放流式音频——这主要包括使用 `AVPlayer` 类代替 `AVAudioPlayer`\
    \ 类。通过 `SystemSounds` 应用，你学习了如何使用 `SystemsSounds` 类将基于 `C` 的代码集成到你的应用中，以快速播放短音效文件或使手机振动。\n\
    \n最后要记住一点：这些类并不是互斥的；你可以在同一个应用中使用它们中的任意一个或全部，只要为你尝试播放的每个音频源维护一个对象即可。\n\n# 第 7 章\n\
    \n# 高级音频主题\n\n在第 5 章和第 6 章中，你学习了如何构建接受多种输入源（包括本地文件、用户的 iPod 音乐库和流式广播）的音频播放器应用。你还学习了如何使用基于\
    \ `AVFoundation` 和 `MediaPlayer` 框架的媒体播放器，并看到了它们之间的一些相似之处。\n\n在本章中，你将学习如何通过增加一些功能，使你的音频应用更加强大，这些功能可以将你的音频从其他设备任务的干扰中解放出来。这些功能将使你的应用在用户触发外部事件（例如将应用切换到后台或拔掉耳机）时能够继续运行。在此过程中，你还会探索一些额外的高级功能，例如\
    \ `AirPlay` 和“远程控制”，它们允许用户在应用内置的用户界面之外与其进行交互。\n\n## 后台音频\n\n在第 5 章的 `MyPlayer`\
    \ 项目中，你构建了一个可以播放应用文档目录中声音文件的应用。不幸的是，你可能已经注意到，将应用发送到后台（无论是通过让设备“休眠”还是打开另一个应用）都会暂停播放。不过，通过对项目设置和音频会话进行一些调整，你可以使基于\
    \ `AVFoundation` 的音频应用即使在后台运行时也能继续播放。以下是您需要进行的主要更改：\n\n*   为你的应用添加后台模式\n*   选择兼容后台的会话类型\n\
    \n在本节中，你将修改第 5 章的 `MyPlayer` 项目，使其能够在后台播放音频。你可以在源代码包的“第 7 章”文件夹中找到该项目的副本（参见 Apress\
    \ 网站 `www.apress.com` 的源代码/下载区域），其中包含了后台音频的修改。该项目保留 `MyPlayer` 名称。在构建第 5 章中 `MyPlayer`\
    \ 项目的初始版本时，你学习了如何执行以下操作：\n\n*   初始化音乐播放器\n*   指定媒体查询（你可以将其视为播放列表）\n*   构建播放界面\n\
    *   显示歌曲信息（元数据）\n"
- fmt: '# Setting Background Modes


    The first step in enabling background audio is to change your project settings
    to reflect the fact that your app will use the Audio background service. Background
    services are iOS’s mechanism for allowing you to keep a small subset of processes
    from your application alive when it is backgrounded. Unlike modern desktop computers,
    which are designed to run multiple applications simultaneously, iOS devices are
    designed to keep one application active at a time. Because of the limited resources
    on these devices, it does not make sense to allow all processes to stay active
    all the time. Instead, when the user launches or selects a different application,
    the previous application is backgrounded, meaning it’s suspended until it’s either
    closed or becomes the active application again.


    Apple realizes that some applications, such as music players or navigation applications,
    need to continue operating when they have been backgrounded, so iOS uses background
    services to define a white list of the processes that are allowed to continue
    in the background.


    To use background services, you need to add values to the `UIBackgroundModes`
    key in your project settings. In Xcode 6, you can do this by selecting your project
    file (`MyPlayer.xcodeproj`) from the Project Navigator and then selecting the
    Capabilities tab, as shown in [Figure 7-1](#9781430250838_Ch07.xhtml#Fig1).


    ![9781430250838_Fig07-01.jpg](images/9781430250838_Fig07-01.jpg)


    [Figure 7-1](#9781430250838_Ch07.xhtml#_Fig1). The Capabilities tab in Xcode


    After toggling the switch in the Background Modes section to On, you will see
    a series of check boxes that allow you to select background modes. For the MyPlayer
    app, you want to enable Audio and AirPlay. After toggling the check box, your
    screen should look like [Figure 7-2](#9781430250838_Ch07.xhtml#Fig2).


    ![9781430250838_Fig07-02.jpg](images/9781430250838_Fig07-02.jpg)


    [Figure 7-2](#9781430250838_Ch07.xhtml#_Fig2). Completed background mode settings


    The Capabilities tab in Xcode provides a user-friendly interface for modifying
    common project settings. If you are using Xcode 5, or prefer the traditional way
    of changing application settings, you can use the Info tab. The key you need to
    add is called Required Background Modes (or `UIBackgroundModes`). [Figure 7-3](#9781430250838_Ch07.xhtml#Fig3)
    shows an example of how the settings look in the Info tab.


    ![9781430250838_Fig07-03.jpg](images/9781430250838_Fig07-03.jpg)


    [Figure 7-3](#9781430250838_Ch07.xhtml#_Fig3). Using the Info tab to specify background
    modes


    The `UIBackgroundModes` key can take an array of values as its input, so you can
    add multiple values to specify multiple background services.


    [Table 7-1](#9781430250838_Ch07.xhtml#Tab1) lists the most popular `UIBackgroundModes`
    keys and what they represent. Remember, these are the only kinds of tasks you
    can keep alive when your app is backgrounded.


    [Table 7-1](#9781430250838_Ch07.xhtml#_Tab1). Major Background Modes Supported
    by iOS


    | Name | Key | Purpose |

    | --- | --- | --- |

    | Audio and AirPlay | `audio` | Allows app to play back audio in the background
    |

    | Location updates | `location` | Allows app to use location services in the background
    (to provide location-based information) |

    | External accessory communication | `external-accessory` | Allows app to communicate
    in the background with a connected hardware accessory |

    | Uses Bluetooth LE accessory | `bluetooth-peripheral` | Allows app to communicate
    in the background with a Bluetooth accessory |

    | Background fetch | `fetch` | Allows app to periodically fetch information in
    the background |

    | Remote notification | `remote-notification` | Allows app to update information
    in the background, based on notifications |


    ## Selecting a Compatible Session Type


    The second step in enabling background audio for the MyPlayer application is to
    select an audio session type that supports backgrounding. Compared to setting
    background modes, this is a straightforward step. All you need to do is choose
    the audio session that is most appropriate for your application. For convenience,
    [Table 7-2](#9781430250838_Ch07.xhtml#Tab2) lists the background-compatible session
    categories and their purposes.


    [Table 7-2](#9781430250838_Ch07.xhtml#_Tab2). `AVAudioSession` Categories Compatible
    with Backgrounding


    | Category Name | Purpose |

    | --- | --- |

    | `AVAudioSessionCategoryPlayback` | Playing sound files (single-duplex playback
    only) |

    | `AVAudioSessionCategoryRecord` | Recording sound files (single-duplex recording
    only) |

    | `AVAudioSessionCategoryPlayAndRecord` | Full-duplex audio playback and recording
    |


    The MyPlayer application only needs to play audio, so the `AVAudioSessionCategoryPlayback`
    key is most appropriate. Because you need to initialize the session along with
    the view, place this code in the `[self viewDidLoad]` method for the `MainViewController`
    class, as shown in [Listing 7-1](#9781430250838_Ch07.xhtml#list1).


    [***Listing 7-1***](#9781430250838_Ch07.xhtml#_list1). Initializing Your Audio
    Session


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically

          // from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");

        } else {

            NSLog(@"error initializing audio session: %@",

                  [error description]);

        }

    }

    ```


    To test that you have configured background audio correctly, select a music file
    within your app and wait for it to begin playing. Then press the Home button.
    The music should continue playing even though your app is backgrounded.


    ## Using the Now Playing Center


    Another cool feature that many developers like to use to enhance the user experience
    of their audio-driven application is the Now Playing center. The Now Playing center
    is a global resource in iOS that appears in the lock screen, the multitasking
    menu, and any Made for iPod–compatible connected devices (such as radios or car
    dashboards), as well as any app that specifically requests the information.


    As shown in [Figure 7-4](#9781430250838_Ch07.xhtml#Fig4), within the lock screen
    and multitasking modal, the Now Playing center shows the song title, album or
    artist information (depending on the application), playback progress, and album
    art (on the lock screen). These screens also expose a limited set of playback
    controls, including Play/Pause and Back/Forward.


    ![9781430250838_Fig07-04.jpg](images/9781430250838_Fig07-04.jpg)


    [Figure 7-4](#9781430250838_Ch07.xhtml#_Fig4). Now Playing information on lock
    screen and multitasking menu


    In this section, you will see how to make your audio apps compatible with the
    system’s Now Playing center by implementing the `MPNowPlayingInfoCenter` class
    and remote-control events.


    You might be scratching your head at the term remote control, because everyone
    knows the iPhone isn’t a remote control for TVs (on its own, at least). But in
    the context of media apps, remote control refers to the hardware controls included
    on Made for iPhone (MFi) headsets, such as those that come packaged with iPhones.
    These same controls are piped through the Now Playing center and, as a bonus,
    you can take advantage of them to make your applications compatible with MFi headsets.


    Just as you did in the previous section with backgrounding audio, you will add
    Now Playing support by continuing to extend the MyPlayer application.'
