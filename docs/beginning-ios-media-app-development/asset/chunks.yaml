    10-2](#9781430250838_Ch10.xhtml#list2) provides a modified version of the `[CameraViewController
    initializeCameras]` method that includes the audio input.


    [***Listing 10-2***](#9781430250838_Ch10.xhtml#_list2). AVCaptureDevice and AVCaptureDeviceInput
    Settings for MyCustomRecorder Project, Including Audio


    ```

    -(void)initializeCameras

    {

        self.cameraArray = [AVCaptureDevice

                            devicesWithMediaType:AVMediaTypeVideo];


    NSError *error = nil;


    self.rearCamera = nil;

        self.frontCamera = nil;


    self.microphone = nil;


    if ([self.cameraArray count] > 1) {


    for (AVCaptureDevice *camera in self.cameraArray) {

                if (camera.position == AVCaptureDevicePositionBack) {

                    self.rearCamera = camera;

                } else if (camera.position == AVCaptureDevicePositionFront) {

                    self.frontCamera = camera;

                }

            }


    self.rearCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.rearCamera error:&error];

            self.frontCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.frontCamera error:&error];


    } else {

            self.rearCamera = [AVCaptureDevice

                defaultDeviceWithMediaType:AVMediaTypeVideo];

            self.rearCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.rearCamera error:&error];

        }


    self.microphone = [[AVCaptureDevice

            devicesWithMediaType:AVMediaTypeAudio] objectAtIndex:0];

        self.audioInput = [AVCaptureDeviceInput

            deviceInputWithDevice:self.microphone error:&error];


    self.currentDevice = self.rearCamera;

    }

    ```


    Next, you need to make sure you have set up the correct `AVCaptureOutput` objects
    for your media. For still-image capture, the `AVCaptureOutput` object for the
    class was represented by the `stillImageOutput` property, which subclassed the
    `AVCaptureStillImageOutput` class. To capture video, you need to generate a file
    that contains both the audio and video streams, in a format that the `MPMoviePlayerController`
    class can play back. As a refresher, [Table 10-1](#9781430250838_Ch10.xhtml#Tab1)
    repeats the list of `AVCaptureOutput` types from [Chapter 4](#9781430250838_Ch04.xhtml).
    The most appropriate output type for recording a movie file with both audio and
    video data is `AVCaptureMovieFileOutput`, which generates a valid QuickTime movie
    file.


    [Table 10-1](#9781430250838_Ch10.xhtml#_Tab1). AVCaptureOutput Types


    | Subclass | Capture Output |

    | --- | --- |

    | `AVCaptureMovieFileOutput` | QuickTime movie file |

    | `AVCaptureVideoDataOutput` | Video frames—intended for processing |

    | `AVCaptureAudioFileOutput` | Audio files supported by Core Audio (MP3, AIFF,
    WAV, AAC) |

    | `AVCaptureAudioDataOutput` | Audio buffer— intended for processing |

    | `AVCaptureMetadataOutput` | Media file metadata properties (for example, GPS
    location, exposure level) |

    | `AVCaptureStillImageOutput` | Still images and metadata |


    You need to add a new property to your class to handle the movie output. In the
    MyVideoRecorder project, this property is called `fileOutput`:


    ```

    @property (nonatomic, strong) AVCaptureMovieFileOutput *fileOutput;

    ```


    So far, you have not configured the hardware interfaces to better suit your application.
    As with the simple video-recording example in [Chapter 8](#9781430250838_Ch08.xhtml)
    (the MyVideoRecorder project), at minimum you should specify dimensions for the
    video file and a maximum recording length. Additionally, for the `AVCaptureMovieFileOutput`
    class, you can implement the `minFreeDiskSpaceLimit` property to prevent recording
    from starting if the device does not have enough free disk space. [Listing 10-3](#9781430250838_Ch10.xhtml#list3)
    shows a code snippet that initializes the `fileOutput` object with these changes.
    In your final code, this snippet will be part of the `[CameraViewController viewDidLoad]`
    method.


    [***Listing 10-3***](#9781430250838_Ch10.xhtml#_list3). Initializing an AVCaptureMovieFileOutput
    Object


    ```

    self.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];

    self.movieFileOutput.minFreeDiskSpaceLimit = 200 * 1024; //200MB

    self.movieFileOutput.maxRecordedDuration =

        CMTimeMakeWithSeconds(180, 1); //3 mins max


    if ([self.session canAddOutput:self.movieFileOutput]) {

        [self.session addOutput:self.movieFileOutput];

    } else {

        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error!"

            message:@"Not enough disk space" delegate:self

            cancelButtonTitle:@"OK" otherButtonTitles:nil];

        [alert show];

    }

    ```


    Because video capture operates at a lower level than typical Cocoa Touch classes,
    the `minFreeDiskSpaceLimit` property uses the C type for a 64-bit integer, `int64_t`,
    and the `maxRecordedDuration` property uses Apple’s lower-level `struct` (custom
    data type) for representing time: `CMTime`. As shown in the example, by casting,
    you can cleanly convert your input into types that the classes can work with.'
