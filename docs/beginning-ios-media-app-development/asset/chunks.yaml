- fmt: '与传统的 iOS 应用开发不同，iOS 媒体应用开发在硬件设备上进行测试是强制要求。当你刚开始进行 iOS 开发时，可能注意到很多你想要实现的功能能轻松在模拟器上测试。遗憾的是，我们在本书中将要编程实现的许多功能（例如，拍照和录音）在模拟器中不受支持，必须在物理设备上进行测试。此外，在模拟器上测试某些功能会产生兼容性错误。


    需要始终备齐用于测试的硬件设备套件，这主要取决于你需要支持的设备范围。通常，你应在处于 Apple 最新更新周期（例如，`iPhone 5` 或 `iPhone
    5S`）并运行最新版本 `iOS` 的设备上进行核心开发。在测试阶段，你还应能接触到运行旧版本 `iOS`（例如，`iOS 6.1`）的设备，以及硬件规格较老的设备（例如，`iPhone
    4S`）。我在 `iPhone 5` 和带视网膜显示屏的 `iPad Mini` 上进行核心开发，在进入测试阶段时，我会使用一台运行 `iOS 6.1` 的
    `iPad 3`，并借用朋友的 `iPhone 4S`。混合搭配不同设备和系统版本，能让你在 Apple 的 App Store 审核流程之前，发现最广泛的兼容性问题。


    ### 使用本书需要一个有效的 iOS 开发者计划账户


    在本书中你需要使用的许多 API（例如，用于访问 `iPhone` 上的硬件摄像头）都需要将设备连接到你的开发电脑。Apple 不允许通过模拟器来模拟硬件摄像头或录音设备。从模拟器中调用这些
    API 会导致示例程序崩溃。


    要直接在硬件设备上测试，你需要将你的开发者计划账户升级为付费等级（个人或企业账户）。你可能已经拥有一个免费账户，用于访问支持论坛和文档库；然而，你需要一个付费账户才能使用其设备管理功能以及提供签名证书的能力。为了保护用户，Apple
    要求所有 `iOS` 应用必须使用有效的代码签名证书进行签名，才能在设备上运行。付费账户使你能创建这些证书，并构建一个签名后的应用，从而可以在设备上运行。


    你可以通过导航至 Apple 开发者计划网站（`https://developer.apple.com/programs/`）并选择 iOS 开发者计划链接（如图
    1-2 所示）来注册付费的 iOS 开发者计划账户。然后系统会要求你使用你的 Apple ID 账户登录以继续。


    ![9781430250838_Fig01-02.jpg](images/9781430250838_Fig01-02.jpg)


    [图 1-2](#9781430250838_Ch01.xhtml#_Fig2). 注册付费的 iOS 开发者计划账户


    **Caution** 如果你已在将 Apple ID 用于向 iBooks 发布内容，则需要为应用开发创建一个新的 Apple ID。Apple 不允许不同商店共用一个账户。


    ### 构建你的第一个 iOS 媒体应用


    为了让你熟悉本书的风格和内容的深度，我们将从一个练习开始：构建一个简单的应用，能让你在两幅图像之间交替切换。这个练习的重点是让你接触到在设备上首次尝试运行应用时可能遇到的问题。我们将在本书的后续部分更详细地介绍应用中所使用的媒体
    API。


    在实现这个练习时，重点将放在遵循以设备为中心的工作流程上。你将探索如何设置项目、创建配置文件请求，并涵盖在连接设备的情况下运行应用的基础知识。


    **Note** 本书中所有示例应用和关键项目的源代码均可在 Apress 网站上找到。对于本项目，你可以在`Chapter 1`文件夹中找到源代码。应用名为`ImageChanger`。该项目可在任何能够打开`Xcode
    5`或更新版本的现代 Mac 上运行。


    ### 关于此应用


    为了演示 iOS 媒体应用的开发，你将学习如何创建一个应用，该应用允许你执行以下操作：


    *   将图像加载到项目中的视图里

    *   启用一个按钮来更改图像

    *   根据用户的选择更改图像


    用户界面极其简单，如图 1-3 所示。


    ![9781430250838_Fig01-03.jpg](images/9781430250838_Fig01-03.jpg)


    [图 1-3](#9781430250838_Ch01.xhtml#_Fig3). ImageChanger 应用的界面原型


    如原型所示，我们的应用包含一个带有按钮和图像的屏幕。当你点击按钮时，当前显示的图像会切换。该状态会进行切换，意味着点击按钮两次将使应用恢复到初始状态。


    ### 设置应用


    此应用使用单个视图。选择“单视图应用程序”作为项目模板（见图 1-4）。


    ![9781430250838_Fig01-04.jpg](images/9781430250838_Fig01-04.jpg)


    [图 1-4](#9781430250838_Ch01.xhtml#_Fig4). 创建一个单视图应用程序项目


    选择“单视图应用程序”模板后，系统会要求你命名项目并选择保存位置。完成后，你将开始布局用户界面。


    你需要向主视图控制器中添加一个按钮和一个图像视图，以使你的故事板看起来像图 1-3 中的原型。你可以在屏幕右下角的“对象库”中找到用于按钮、图像视图以及许多其他常见用户界面元素的
    Interface Builder 模板。你可以通过将项目从“对象库”中拖出并放到目标视图控制器上来将其添加到视图控制器中。“对象库”在图 1-5 中高亮显示。


    ![9781430250838_Fig01-05.jpg](images/9781430250838_Fig01-05.jpg)


    [图 1-5](#9781430250838_Ch01.xhtml#_Fig5). 对象库位于 Xcode 的右下角


    ### 将图像添加到你的应用


    要切换图像，首先需要将它们导入到应用中。你可以通过右键点击项目导航器（Xcode 的左窗格）中的任何项目来导入图像或任何其他类型的文件。点击“添加文件”选项并选择你的目标文件。对于此应用，请选择两个图像文件（PNG
    或 JPG 格式）。


    要使其中一个图像出现在图像视图中，请从 Interface Builder 中选择该图像视图，如图 1-6 所示。在属性检查器中，导航到“图像”下拉列表，并从你将在那里看到的文件名列表中选择刚刚添加的图像。


    ![9781430250838_Fig01-06.jpg](images/9781430250838_Fig01-06.jpg)


    [图 1-6](#9781430250838_Ch01.xhtml#_Fig6). 属性检查器中的图像下拉列表


    ### 处理用户界面事件


    要使当前图像根据用户界面事件进行更改，你需要将源代码与故事板关联起来。主视图控制器由`ViewController`类表示，因此，在`ViewController.h`中，你需要添加以下属性和方法签名：


    ```

    @property (nonatomic, assign) BOOL isActive;

    @property (nonatomic, strong) IBOutlet UIImageView *imageView;

    @property (nonatomic, strong) IBOutlet UIButton *changeButton;

    -(IBAction)changeImage:(id)sender;

    ```


    `imageView`和`changeButton`对象代表用户界面元素。`changeImage:`方法表示当用户按下按钮时需要被调用的方法。`isActive`属性允许你跟踪按钮的状态。


    要使事件处理器工作，你必须通过向`ViewController.m`中添加以下代码来实现此方法：'
  raw: 'Unlike traditional iOS app development, iOS media app development places a
    strict requirement on testing with hardware devices. When you started in iOS development,
    you may have noticed that a lot of features you were trying to implement could
    easily be tested with the simulator alone. Unfortunately, many of the features
    we will be programming for in this book (for example, taking pictures and audio
    recording) are not supported by the simulator and must be tested with a physical
    device. Additionally, testing on the simulator will give you compatibility errors
    for some features.


    The suite of hardware devices to keep on hand for testing depends greatly on the
    range of devices you need to support. In general, you should do your core development
    on a device that is in Apple’s latest tick-tock cycle (for example, iPhone 5 or
    iPhone 5S) that is running the latest version of iOS. In your test cycle, you
    should also have access to a device running an older supported iOS version (for
    example, iOS 6.1), and a device with an older hardware specification (for example,
    iPhone 4S). I do my core development on an iPhone 5 and iPad Mini with Retina
    Display, and when I reach the testing phase, I use an iPad 3 running iOS 6.1 and
    borrow a friend’s iPhone 4S. Having a mix of devices and system versions enables
    you to identify the widest range of compatibility issues before Apple does during
    the App Store approval process.


    An Active iOS Developer Program Account Is Required to Use This Book


    Many of the APIs you will need to use in this book (for example, for assessing
    the hardware camera on an iPhone) require you to tether a device to your development
    computer. Apple does not allow you to simulate hardware cameras or audio recording
    devices through the simulator. Attempting to call these APIs from the simulator
    will cause your samples to crash.


    To test directly on hardware devices, you need to upgrade your Developer Program
    account to a paid tier (Individual or Enterprise.) You may already have a free
    account for access to the support forums and documentation library; however, you
    need a paid account for its device management features and ability to provide
    signing certificates. To protect users, Apple requires that all iOS applications
    be signed with a valid code-signing certificate in order to run on a device. A
    paid account gives you the ability to create these certificates and build a signed
    application you can run on a device.


    You can sign up for a paid iOS Developer Program account by navigating to the
    Apple Developer Program site (`https://developer.apple.com/programs/`) and selecting
    the iOS Developer Program link, as shown in [Figure 1-2](#9781430250838_Ch01.xhtml#Fig2).
    You will then be asked to continue by signing in with your Apple ID account.


    ![9781430250838_Fig01-02.jpg](images/9781430250838_Fig01-02.jpg)


    [Figure 1-2](#9781430250838_Ch01.xhtml#_Fig2). Signing up for a paid iOS Developer
    Program account


    **Caution**  You need to create a new Apple ID for app development if you are
    already using your account for publishing content to iBooks. Apple does not allow
    accounts to be shared between stores.


    Building Your First iOS Media App


    To become comfortable with the style of this book and the depth of its content,
    you’re going to start with an exercise: building a simple app that lets you alternate
    between two images. The focus of this exercise is to expose you to the kinds of
    problems you may see the first time you try to run one of your apps on a device.
    You will cover the media APIs used in the app in more detail further in the book.


    In implementing this exercise, the focus will be on following a device-centric
    workflow. You’ll explore how to set up a project, make provisioning profile requests,
    and cover the basics of running an application with a device attached.


    **Note**  The source code for all of the sample applications and keystone projects
    in this book is located on the Apress web site. For this project, you can find
    the source code in the `Chapter 1` folder. The application is called ImageChanger.
    The project will run on any recent Mac that is able to open Xcode 5 or newer.


    About the Application


    To demonstrate iOS media app development, you will learn how to create an application
    that lets you do the following:


    *   Load an image into a view in your project

    *   Enable a button to change the image

    *   Change the image based on the user’s selection


    The user interface is extremely simple, as shown in [Figure 1-3](#9781430250838_Ch01.xhtml#Fig3).


    ![9781430250838_Fig01-03.jpg](images/9781430250838_Fig01-03.jpg)


    [Figure 1-3](#9781430250838_Ch01.xhtml#_Fig3). Mock-up for ImageChanger app


    As shown in the mock-up, our app contains one screen with a button and an image.
    When you click the button, the currently displayed image changes. The state toggles,
    meaning that clicking the button twice returns the app to its original state.


    Setting Up the Application


    This application uses a single view. Select Single-View Application as the project
    template (see [Figure 1-4](#9781430250838_Ch01.xhtml#Fig4)).


    ![9781430250838_Fig01-04.jpg](images/9781430250838_Fig01-04.jpg)


    [Figure 1-4](#9781430250838_Ch01.xhtml#_Fig4). Creating a Single View Application
    project


    After selecting the Single View Application template, you’re asked to name your
    project and select a location in which to save it. After this is complete, you
    will start laying out the user interface.


    You need to add a button and an image view onto your main view controller to make
    your storyboard look like the mock-up in [Figure 1-3](#9781430250838_Ch01.xhtml#Fig3).
    You can find Interface Builder templates for a button, image view, and many other
    common user-interface elements in the Object Library at the bottom right of the
    screen. You add items to a view controller by dragging them out of the Object
    Library and dropping them onto the target view controller. The Object Library
    is highlighted in [Figure 1-5](#9781430250838_Ch01.xhtml#Fig5).


    ![9781430250838_Fig01-05.jpg](images/9781430250838_Fig01-05.jpg)


    [Figure 1-5](#9781430250838_Ch01.xhtml#_Fig5). The Object Library is at the bottom
    right of Xcode


    Adding Images to Your App


    To toggle images, you first need to import them into the application. You can
    import images or any other kind of file by right-clicking any item in the Project
    Navigator (the left pane of Xcode.) Click the Add Files option and select your
    target files. For this app, select two image files (either PNG or JPG).


    To make one of the images appear in the image view, select the image view from
    within Interface Builder, as shown in [Figure 1-6](#9781430250838_Ch01.xhtml#Fig6).
    In the Attributes Inspector, navigate to the Image drop-down list and select the
    image you just added from the list of file names you’ll see there.


    ![9781430250838_Fig01-06.jpg](images/9781430250838_Fig01-06.jpg)


    [Figure 1-6](#9781430250838_Ch01.xhtml#_Fig6). Image drop-down in the Attributes
    Inspector


    Handling User-Interface Events


    To make the active image change based on user-interface events, you need to tie
    the source code to the storyboard. The main view controller is represented by
    the `ViewController class`, so in `ViewController.h`, you would add the following
    properties and method signatures:


    ```

    @property (nonatomic, assign) BOOL isActive;

    @property (nonatomic, strong) IBOutlet UIImageView *imageView;

    @property (nonatomic, strong) IBOutlet UIButton *changeButton;

    -(IBAction)changeImage:(id)sender;

    ```


    The `imageView` and `changeButton` objects represent the user-interface elements.
    The `changeImage:` method represents the method that needs to be called when the
    user presses the button. The `isActive` property allows you to track the state
    of the button.


    To make the event handler work, you must implement the method by adding the following
    code to `ViewController.m`:'
