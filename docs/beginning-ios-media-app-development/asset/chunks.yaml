    Saving Images


    To get the most use out of your photos, including those you manipulated in your
    app, you often need the ability to save them to disk or back to the photo album.
    Unless they are using an app that declares it deletes all images after a certain
    period of time (such as Snapchat), most users expect to be able to retrieve images
    they created with your app, the next time they open it. The ability to save images
    is important because it will satisfy this expectation, and it will allow users
    to export images they create to e-mail or other apps.


    Saving Images to Files


    The process of saving images to disk is quite simple. Much like any other data
    operation, you need to extract the binary data for the image, and write this data
    to a file.


    To extract the binary data for an image, you can use the UIkit convenience methods,
    `UIImagePNRepresentation()` and `UIImageJPEGRepresentation()`. Both of these methods
    return `NSData` objects, as shown here:


    ```

    NSData *imageData = UIImagePNGRepresentation(self.originalImage);

    ```'
