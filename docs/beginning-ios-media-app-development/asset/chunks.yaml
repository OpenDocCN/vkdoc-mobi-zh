- fmt: "**Note** The `MPNowPlayingInfoCenter` class is meant for one-way communication\
    \ to the Now Playing center. The only way to get information on currently playing\
    \ tracks is by implementing an iPod music library application, as described in\
    \ [Chapter 6](#9781430250838_Ch06.xhtml).\n\n## Displaying Metadata\n\nAs stated\
    \ earlier, the Now Playing center on iOS devices is a shared system resource.\
    \ As the name implies, the `MPNowPlayingInfoCenter` class is part of the `MediaPlayer`\
    \ framework, but this does not prevent it from working with `AVFoundation` media\
    \ players. Any type of application can send messages to the `MPNowPlayingInfoCenter`\
    \ class—as long as they are properly formatted.\n\nTo enable Now Playing support\
    \ in the MyPlayer application, you need to include the `MediaPlayer` framework\
    \ in your project and add it to the header file for the `MainViewController` class\
    \ (`MainViewController.h`):\n\n```objc\n#import <MediaPlayer/MediaPlayer.h>\n\
    ```\n\nAs a shared resource (just like the camera), you access the Now Playing\
    \ center via a singleton, which you can retrieve via the `[MPNowPlayingInfoCenter\
    \ defaultCenter]` public method:\n\n```objc\nMPNowPlayingInfoCenter *infoCenter\
    \ = [MPNowPlayingInfoCenter defaultCenter];\n```\n\nTo set values for the Now\
    \ Playing center, you need to initialize the `nowPlayingInfo` property with an\
    \ `NSDictionary` object containing your new metadata values:\n\n```objc\n[infoCenter\
    \ setNowPlayingInfo:myMetaDataDict];\n```\n\n[Table 7-3](#9781430250838_Ch07.xhtml#Tab3)\
    \ shows the valid keys for the `nowPlayingInfo` dictionary, as well as their types\
    \ and what they represent. These keys are used in the `MPMediaItem` class. You\
    \ must pass them exactly as specified, or your app may crash at runtime.\n\n###\
    \ Table 7-3. Valid Keys for `nowPlayingInfo` Dictionary\n\n| **Key** | **Type**\
    \ | **Purpose** |\n| --- | --- | --- |\n| `MPMediaItemPropertyArtist` | `NSString`\
    \ | Performing artist for selected item |\n| `MPMediaItemPropertyArtwork` | `MPMediaItemArtwork`\
    \ | Album art for selected item |\n| `MPMediaItemPropertyAlbumTitle` | `NSString`\
    \ | Album title for selected item |\n| `MPMediaItemPropertyGenre` | `NSString`\
    \ | Genre for selected item |\n| `MPNowPlayingInfoElapsedPlaybackTime` | `NSNumber`\
    \ | Playback progress for selected item (in seconds) |\n| `MPMediaItemPropertyPlaybackDuration`\
    \ | `NSNumber` | Length of selected item (in seconds) |\n| `MPMediaItemPropertyTitle`\
    \ | `NSString` | Title for selected item |\n\nLooking back at [Figure 7-4](#9781430250838_Ch07.xhtml#Fig4),\
    \ you will see that the Now Playing values common to both the lock screen and\
    \ multitasking screens include Song Title, Album Name, and Playback Duration.\
    \ For an `MPMusicPlayerController`-based application, where you are using iPod\
    \ music items, you can get this information directly from the `MPMediaItem` that\
    \ is currently playing, as shown in [Listing 7-2](#9781430250838_Ch07.xhtml#list2).\n\
    \n### Listing 7-2. Setting Metadata Information from an `MPMediaItem`\n\n```objc\n\
    -(void)viewDidLoad {\n...\n[[NSNotificationCenter defaultCenter]\n        addObserverForName:\
    \ \n           @\"MPMusicPlayerControllerNowPlayingItemDidChangeNotification\"\
    \n         selector:@selector(updateNPCenter:)  object:nil];\n}\n\n-(void)updateNPCenter:(NSNotification\
    \ *)note {\n\nMPMediaItem *currentItem = self.musicPlayer.nowPlayingItem;\n        MPMediaItemArtwork\
    \ *albumArt =\n           [currentItem valueForProperty:MPMediaItemPropertyArtwork];\n\
            CGSize imageFrameSize = self.albumImageView.frame.size;\n        self.albumImageView.image\
    \ =\n        [albumArt imageWithSize:imageFrameSize];\n\nNSString *artistName\
    \ =\n            [currentItem valueForProperty:MPMediaItemPropertyTitle];\n        NSString\
    \ *albumName =\n            [currentItem\n            valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
            NSString *songTitle =\n            [currentItem valueForProperty:MPMediaItemPropertyTitle];\n\
    \nself.titleLabel.text =\n            [currentItem valueForProperty:songTitle];\n\
            self.albumLabel.text = [NSString stringWithFormat:@\"%@ / %@\",\n                              \
    \ artistName, albumName];\n\nMPNowPlayingInfoCenter *infoCenter =\n            [MPNowPlayingInfoCenter\
    \ defaultCenter];\n        NSDictionary *infoDict = [NSDictionary\n            dictionaryWithObjects:@[songTitle,\
    \ artistName,\n            albumName, albumArt] forKeys:@[MPMediaItemPropertyTitle,\n\
                MPMediaItemPropertyAlbumArtist,\n            MPMediaItemPropertyAlbumTitle,\n\
                MPMediaItemPropertyArtwork]];\n        [infoCenter setNowPlayingInfo:infoDict];\n\
            ;\n\n}\n```\n\nIn the MyPlayer application, the primary key for music\
    \ files was the file name. For applications for which you don't have all the metadata\
    \ information, you can insert placeholder items for missing information. For the\
    \ MyPlayer application, use the file name for the Song Title, the application’s\
    \ name as the Album Title, the file duration as the Playback Duration, and a placeholder\
    \ image as the Album Art, as shown in [Listing 7-3](#9781430250838_Ch07.xhtml#list3).\n\
    \n### Listing 7-3. Setting Metadata Information for the MyPlayer Application\n\
    \n```objc\nNSString *songTitle = [filePath lastPathComponent];\nNSString *artistName\
    \ = @\"MyPlayer\";\nMPMediaItemArtwork *albumArt = [[MPMediaItemArtwork alloc]\n\
         initWithImage:[UIImage imageNamed:@\"Placeholder\"]];\n```\n\nYou may be\
    \ wondering, “When do I call this code?” The answer: you should update the Now\
    \ Playing center whenever your playlist changes—for example, when the user selects\
    \ a new song or when you load a new item into the playlist. The MyPlayer application\
    \ updates it whenever the File Picker controller completes. [Listing 7-4](#9781430250838_Ch07.xhtml#list4)\
    \ shows code for the entire process of setting Now Playing information in the\
    \ File Picker delegate.\n\n### Listing 7-4. Setting Now Playing Information in\
    \ the File Picker Delegate\n\n```objc\n-(void)didFinishWithFile:(NSString *)filePath\n\
    {\n    self.selectedFilePath = filePath;\n\nNSError *error = nil;\n    NSURL *fileURL\
    \ = [NSURL fileURLWithPath:self.selectedFilePath];\n\nself.audioPlayer = [[AVAudioPlayer\
    \ alloc]\n                         initWithContentsOfURL:fileURL error:&error];\n\
        self.audioPlayer.delegate = self;\n\nif (error == nil) {\n        NSLog(@\"\
    audio player initialized successfully\");\n\nself.timer = [NSTimer timerWithTimeInterval:1.0f\
    \ target:self\n                      selector:@selector(updateProgress) userInfo:nil\n\
                          repeats:YES];\n\nNSString *songTitle = [filePath lastPathComponent];\n\
               NSString *artistName = @\"MyPlayer\";\n           MPMediaItemArtwork\
    \ *albumArt = [[MPMediaItemArtwork alloc]\n              initWithImage:[UIImage\
    \ imageNamed:@\"Placeholder\"]];\n\nMPNowPlayingInfoCenter *infoCenter = [MPNowPlayingInfoCenter\
    \ defaultCenter];\n           NSDictionary *infoDict =\n               [NSDictionary\
    \ dictionaryWithObjects:@[songTitle, artistName, albumArt]\n               forKeys:@[MPMediaItemPropertyTitle,\
    \ MPMediaItemPropertyAlbumArtist,\n               MPMediaItemPropertyArtwork]];\n\
               [infoCenter setNowPlayingInfo:infoDict];\n\n} else {\n        NSLog(@\"\
    error initializing audio player: %@\",\n            [error description]);\n    }\n\
    \n//dismiss the file picker\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\nAs a final step, for the best user experience, you should update the\
    \ Elapsed Playback Time for items every second, so that the user can see progress.\
    \ In the MyPlayer app, you added timers to update the user interface within the\
    \ app every second; you can piggyback off this logic by adding a call to update\
    \ the Now Playing information, as shown in [Listing 7-5](#9781430250838_Ch07.xhtml#list5).\n\
    \n### Listing 7-5. Updated Timer Delegate That Adds Now Playing Updates"
