  trans: "\n表 4-1. 常用的 `AVCaptureOutput` 子类\n\n| 子类 | 捕获输出 |\n| --- | --- |\n| `AVCaptureMovieFileOutput`\
    \ | QuickTime 影片文件 |\n| `AVCaptureVideoDataOutput` | 视频帧——用于处理 |\n| `AVCaptureAudioFileOutput`\
    \ | Core Audio 支持的音频文件（.MP3、.AIFF、.WAV、.AAC） |\n| `AVCaptureAudioDataOutput` |\
    \ 音频缓冲区——用于处理 |\n| `AVCaptureMetadataOutput` | 媒体文件元数据属性（例如 GPS 位置、曝光度） |\n| `AVCaptureStillImageOutput`\
    \ | 静态图像和元数据 |\n\n要捕获静态图像，请使用 `AVCaptureStillImageOutput` 子类。使用该类捕获图像的方法被定义为实例方法，因此需将\
    \ `AVCaptureStillImageOutput` 对象声明为实例变量：\n\n```\nself.stillImageOutput = [[AVCaptureStillImageOutput\
    \ alloc] init];\n```\n\n虽然无需配置输出对象即可捕获原始数据，但最好通过将数据压缩为 JPEG 文件(.JPG)来节省空间。为此，您需要在配置字典中指定编解码器类型。将\
    \ `kCMVideoCodecType_JPEG` 常量作为 `AVVideoCodecKey` 键的值以指定 JPEG 格式。字典准备就绪后，使用 `[AVStillImageOutput\
    \ setOutputSettings:]` 方法保存设置，如代码清单 4-3 所示。\n\n***代码清单 4-3***. 配置输出对象\n\n```\n\
    NSMutableDictionary *configDict = [NSMutableDictionary new];\n[configDict setObject:AVVideoCodecJPEG\
    \ forKey:AVVideoCodecKey];\n[self.stillImageOutput setOutputSettings:configDict];\n\
    ```\n\n与添加输入对象类似，在将输出对象添加到会话之前，应检查其是否可用，如代码清单 4-4 所示。\n\n***代码清单 4-4***. 添加输出对象\n\
    \n```\nif ([self.session canAddOutput:self.stillImageOutput]) {\n    [self.session\
    \ addOutput:self.stillImageOutput];\n}\n```\n\n现在已配置好输出对象，可以用于捕获静态图像。`AVCaptureStillImageOutput`\
    \ 类的 API 参考文档显示，您可以使用 `[AVCaptureStillImageAsynchronouslyFromConnection:completionHandler]`\
    \ 实例方法。但遗憾的是，使用此方法需要先建立*连接*。由 `AVCaptureConnection` 类表示的连接是连接输入和输出对象的接口。幸运的是，当您将输出添加到会话时，连接会自动创建。您可以通过指定要查找的输出对象和媒体类型（例如音频或视频）来查询连接，如代码清单\
    \ 4-5 所示。\n\n***代码清单 4-5***. 查询连接对象\n\n```\nAVCaptureConnection *connection =\
    \ [self.stillImageOutput\n    connectionWithMediaType:AVMediaTypeVideo];\n```\n\
    \n创建连接对象后，您可以调用块来捕获静态图像。完成处理程序返回一个指向静态图像的低级媒体缓冲区（`CMSampleBufferRef`），如果操作失败则返回\
    \ `NSError` 对象。您可以通过调用 `[AVCaptureStillImageOutput jpegStillImageNSDataRespresentation:]`\
    \ 类方法来保存图像，该方法返回作为 JPEG 文件（包含有效 EXIF 元数据）的静态图像 `NSData` 表示。检索到图像的 `NSData` 后，可将其保存到磁盘或转换为\
    \ `UIImage` 对象。\n\n在代码清单 4-6 中，按钮处理程序封装了捕获图像的完整过程。在 MyCamera 项目中，这由\"拍摄\"按钮触发。如果该方法能成功捕获图像，它将向摄像头委托发送\
    \ `didFinishWithImage` 消息。如果捕获失败，则通过发送 `cancel` 消息并使用 `[NSLog description]` 将错误记录为字符串来记录错误。\n\
    \n***代码清单 4-6***. 捕获静态图像\n\n```\n-(IBAction)finish:(id)sender\n{\n\nAVCaptureConnection\
    \ *connection = [self.stillImageOutput\n        connectionWithMediaType:AVMediaTypeVideo];\n\
    \n//[[self.stillImageOutput connectionWithMediaType:AVMediaTypeVideo]\n      \
    \  setVideoOrientation:[connection videoOrientation]];\n\n[self.stillImageOutput\n\
    \        captureStillImageAsynchronouslyFromConnection:connection\n        completionHandler:^(CMSampleBufferRef\
    \ imageDataSampleBuffer,\n        NSError *error) {\n\nif (imageDataSampleBuffer\
    \ != nil) {\n\nNSData *imageData = [AVCaptureStillImageOutput\n             jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \nUIImage *image = [UIImage imageWithData:imageData];\n\n[self.delegate didFinishWithImage:image];\n\
    \        } else {\n\nNSLog(@\"error description: %@\", [error description]);\n\
    \n[self.delegate cancel];\n        }\n\n}];\n```\n\n**注意** EXIF（可交换图像文件格式）元数据是捕获照片信息（如曝光度、方向、拍摄日期和闪光灯设置）的行业标准。您的\
    \ iOS 捕获设备会产生这些值。您可以在 Apple 的“CGImageProperties Reference”（可从 Apple 在线 iOS 开发者库获取）中找到所有有效键/值对的完整列表。\n\
    \n由于目标是实现类似于 `UIImagePickerController` 的工作流程，您希望在用户拍照后立即关闭摄像头界面。为了加快处理速度并释放摄像头以供其他进程使用，请在摄像头控制器类的\
    \ `[UIViewController viewWillDisappear]` 方法中对会话调用 `[AVCaptureSession stopRunning]`\
    \ 方法，如代码清单 4-7 所示。\n\n***代码清单 4-7***. 停止捕获会话\n\n```\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [super viewWillDisappear:animated];\n    [self.session stopRunning];\n\
    }\n```\n\n**警告** 用于清理视图控制器的旧方法 `[UIViewController viewDidUnload]` 已从 iOS 6.0 开始弃用。请勿尝试定义此函数，因为您的代码永远不会被调用。\n\
    \n## 访问硬件控制\n\n完成自定义摄像头控制器的最后一个组件是用于配置摄像头捕获设置的接口。本示例应用专注于切换摄像头（例如前置/后置）以及配置闪光灯、自动对焦和曝光设置。这些示例展示了摄像头开发中的两个重要模式：\n\
    \n*   在更改设备配置之前，必须先锁定设备配置。\n*   应使用触摸事件驱动特定区域的设置（例如自动对焦、曝光）。\n\n### 切换摄像头\n\n\
    您将要构建的第一个硬件控制是一个按钮，允许用户在设备的前置和后置摄像头之间切换。与 iOS 中的默认摄像头类似，此示例将保留查看摄像头输出的实时预览和拍照的能力，并允许用户随意切换摄像头。回顾之前学到的关于\
    \ `AVFoundation` 捕获堆栈的知识，您可以通过切换会话上的活动输入来实现摄像头切换。\n\n要在运行时切换摄像头，您需要维护指向每个硬件设备的指针。而在之前的示例中，您使用\
    \ `[AVCaptureDevice defaultDeviceWithMediaType]` 实例方法找到了默认摄像头设备，这次则需要维护一个设备数组。返回\
    \ `AVCaptureDevice` 对象数组的方法是 `[AVCaptureDevice devicesWithMediaType:]`：\n\n```\n\
    self.cameraArray = [AVCaptureDevice \n                    devicesWithMediaType:AVMediaTypeVideo];\n\
    ```\n\n将 `NSArray` 初始化为目标类的实例变量，因为您需要在切换摄像头前再次查询它（换言之，如果用户正在使用只有一个摄像头的设备，则不应允许切换摄像头）。\n"
- fmt: '您可以使用`AVCaptureDevice`的`_position_`属性来确定前置和后置摄像头。与之前的示例一样，您需要创建一个`AVCaptureDeviceInput`对象，将`AVCaptureDevice`连接到捕获会话。此示例将设备对象初始化为实例变量，以便稍后轻松修改其捕获设置。同样，您应该将输入对象初始化为实例变量，以便稍后切换设备。您通过切换会话上的活动输入对象来切换设备。您可以在[清单4-8](#9781430250838_Ch04.xhtml#list8)中找到说明此过程的示例。


    [**清单4-8**](#9781430250838_Ch04.xhtml#_list8). 初始化相机输入


    ```

    -(void)initializeCameras

    {

        NSArray *cameraArray = [AVCaptureDevice

                                devicesWithMediaType:AVMediaTypeVideo];


    NSError *error = nil;


    self.rearCamera = nil;

        self.frontCamera = nil;


    if ([self.cameraArray count] > 1) {


    for (AVCaptureDevice *camera in self.cameraArray) {

                if (camera.position == AVCaptureDevicePositionBack) {

                    self.rearCamera = camera;

                } else if (camera.position == AVCaptureDevicePositionFront)

                {

                    self.frontCamera = camera;

                }

            }


    self.rearCameraInput = [AVCaptureDeviceInput

                                    deviceInputWithDevice:self.rearCamera

                                    error:&error];

          self.frontCameraInput = [AVCaptureDeviceInput

                                   deviceInputWithDevice:self.frontCamera

                                   error:&error];


    } else {

            self.rearCamera = [AVCaptureDevice

                 defaultDeviceWithMediaType:AVMediaTypeVideo];

            self.rearCameraInput = [AVCaptureDeviceInput

                 deviceInputWithDevice:self.rearCamera

                 error:&error];

        }


    self.currentDevice = self.rearCamera;

    }

    ```


    您可以看到[清单4-8](#9781430250838_Ch04.xhtml#list8)中的代码在相机数组仅包含一个对象时，会回退到默认捕获设备。由于捕获设置更改仅影响用户设置为活动的设备，因此代码还保留了指向当前设备的指针。


    现在您已拥有每个捕获设备的指针，需要实现代码，以便用户在预览视图中按下“Camera”按钮时切换活动摄像头。在此示例中，我们实现了一个返回类型为`IBAction`的方法，因为它是与Interface
    Builder中的对象（在本例中为“Camera”按钮）关联的事件处理程序。如果设备有两个摄像头，应用程序会显示一个多选操作表，允许用户保存其选择。如果出现故障，则会显示错误警报。您可以在[清单4-9](#9781430250838_Ch04.xhtml#list9)中找到执行所有初始化代码的处理程序方法。


    [**清单4-9**](#9781430250838_Ch04.xhtml#_list9). 用于选择摄像头的操作表


    ```

    -(IBAction)switchCamera:(id)sender {


    if ([self.cameraArray count] > 1) {


    //present an action sheet


    UIActionSheet *cameraSheet = [[UIActionSheet alloc]

                initWithTitle:@"Choose Camera"

                delegate:self cancelButtonTitle:@"Cancel"

                destructiveButtonTitle:nil

                otherButtonTitles:@"Front Camera", @"Rear Camera", nil];

            cameraSheet.tag = 100;

            [cameraSheet showInView:self.view];


    } else {

            //we only have one camera, show an error message


    UIAlertView *alert = [[UIAlertView alloc]

                                   initWithTitle:@"Error"

                message:@"You only have one camera" delegate:nil

                    cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

            [alert show];

        }


    }

    ```


    为了支持操作表，您需要将视图控制器声明为委托。为此，请按如下所示修改类签名：


    ```

    @interface CameraViewController : UIViewController

          <UIActionSheetDelegate>

    ```


    在操作表按钮处理程序`[UIActionSheetDelegate actionSheet:didDismissWithButtonIndex:]`中，主要逻辑会检查传入操作表的标签，并将按钮索引传递给目标方法。在本例中，您希望将其传递给`switchToCameraWithIndex:`方法，如[清单4-10](#9781430250838_Ch04.xhtml#list10)所示。


    [**清单4-10**](#9781430250838_Ch04.xhtml#_list10). 操作表按钮处理程序


    ```

    -(void) actionSheet:(UIActionSheet *)actionSheet

            didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        switch (actionSheet.tag) {

            case 100:

                [self switchToCameraWithIndex:buttonIndex];

                break;

        }

    }

    ```


    现在，您已准备好实现切换活动摄像头的代码。更改操作的最终目标是捕获会话，因为您需要向会话添加或从会话中移除输入设备。为防止冲突，您需要在提交任何更改之前，对目标对象“加锁”以指示您将更改捕获设置。`AVCaptureSession`的锁是`[AVCaptureSession
    beginConfiguration]`：


    ```

    [self.session beginConfiguration];

    ```


    接下来，您需要将按钮选择与目标设备对齐。操作表按钮索引从上到下递增，意味着最顶部的项目索引为0。在此示例中，“Front Camera”是顶部项目。您通过从捕获会话中移除后置摄像头输入，然后添加前置摄像头输入来切换到前置摄像头。为了镜像选择，您还需要更新类中的`currentDevice`指针以及“Switch
    Camera”按钮的标签：


    ```

    if (buttonIndex == 0) { //front camera


    [self.session removeInput:self.rearCameraInput];


    if ([self.session canAddInput:self.frontCameraInput]) {

                [self.session addInput:self.frontCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Front";

            self.currentDevice = self.frontCamera;


    }

    ```


    对于最终产品，为操作表中的“Rear Camera”选项添加一个`else if`语句，并释放会话对象的配置锁，如[清单4-11](#9781430250838_Ch04.xhtml#list11)所示。


    [**清单4-11**](#9781430250838_Ch04.xhtml#_list11). 在两个摄像头之间切换的完整实现


    ```

    -(void)switchToCameraWithIndex:(NSInteger)buttonIndex

    {

        [self.session beginConfiguration];


    if (buttonIndex == 0) {


    [self.session removeInput:self.rearCameraInput];


    if ([self.session canAddInput:self.frontCameraInput]) {

                [self.session addInput:self.frontCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Front";

            self.currentDevice = self.frontCamera;


    } else if (buttonIndex == 1) {


    [self.session removeInput:self.frontCameraInput];


    if ([self.session canAddInput:self.rearCameraInput]) {

                [self.session addInput:self.rearCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Rear";

            self.currentDevice = self.frontCamera;

        }


    [self.session commitConfiguration];

    }

    ```


    ## 更改闪光灯模式


    在应用程序中更改闪光灯模式的过程与更改摄像头非常相似；主要区别在于你是在`AVCaptureDevice`级别上进行操作，而不是在`AVCaptureSession`级别上。与“更改摄像头”示例非常相似，此示例使用按钮更改闪光灯模式，并向用户提供一个操作表以供选择。iOS支持的闪光灯模式有自动、打开和关闭。


    [清单4-12](#9781430250838_Ch04.xhtml#list12)中的代码在显示选择器之前，会检查当前输入设备是否支持闪光灯模式。此错误检查步骤至关重要，因为它允许应用程序支持较旧的iPhone，并规避了系统中所有内置摄像头都支持闪光灯功能的假设。在许多设备上，前置摄像头没有闪光灯。


    [**清单4-12**](#9781430250838_Ch04.xhtml#_list12). 更改闪光灯模式事件处理程序'
  raw: 'You can use the `_position_` property of the `AVCaptureDevice` to determine
    the front and rear cameras. As with the earlier example, you need to create an
    `AVCaptureDeviceInput` object to tie the `AVCaptureDevice` to the capture session.
    This example initializes device objects as instance variables to make it easy
    to modify their capture settings later. Similarly, you should initialize input
    objects as instance variables so you can toggle devices later. You toggle devices
    by switching the active input object on the session. You can find an example which
    illustrates this process in [Listing 4-8](#9781430250838_Ch04.xhtml#list8).


    [***Listing 4-8***](#9781430250838_Ch04.xhtml#_list8). Initializing the Camera
    Inputs


    ```

    -(void)initializeCameras

    {

        NSArray *cameraArray = [AVCaptureDevice

                                devicesWithMediaType:AVMediaTypeVideo];


    NSError *error = nil;


    self.rearCamera = nil;

        self.frontCamera = nil;


    if ([self.cameraArray count] > 1) {


    for (AVCaptureDevice *camera in self.cameraArray) {

                if (camera.position == AVCaptureDevicePositionBack) {

                    self.rearCamera = camera;

                } else if (camera.position == AVCaptureDevicePositionFront)

                {

                    self.frontCamera = camera;

                }

            }


    self.rearCameraInput = [AVCaptureDeviceInput

                                    deviceInputWithDevice:self.rearCamera

                                    error:&error];

          self.frontCameraInput = [AVCaptureDeviceInput

                                   deviceInputWithDevice:self.frontCamera

                                   error:&error];


    } else {

            self.rearCamera = [AVCaptureDevice

                 defaultDeviceWithMediaType:AVMediaTypeVideo];

            self.rearCameraInput = [AVCaptureDeviceInput

                 deviceInputWithDevice:self.rearCamera

                 error:&error];

        }


    self.currentDevice = self.rearCamera;

    }

    ```


    You can see that the code in [Listing 4-8](#9781430250838_Ch04.xhtml#list8) falls
    back to the default capture device if the camera array contains only one object.
    Because the capture setting changes affect only the device the user has set to
    active, the code also keeps a pointer to the current device.


    Now that you have pointers for each capture device, you need to implement the
    code to switch the active camera when the user presses the Camera button in the
    preview view. In this example, we have implemented the method with a return type
    of `IBAction`, because it is an event handler tied to an object in Interface Builder
    (in this case, the Camera button). If the device has two cameras, the app displays
    a multiple-choice action sheet to allow users to save their selection. If there
    is a failure, it displays an error alert. You can find a handler method that performs
    all of the initialization code in [Listing 4-9](#9781430250838_Ch04.xhtml#list9).


    [***Listing 4-9***](#9781430250838_Ch04.xhtml#_list9). Action Sheet for Selecting
    a Camera


    ```

    -(IBAction)switchCamera:(id)sender {


    if ([self.cameraArray count] > 1) {


    //present an action sheet


    UIActionSheet *cameraSheet = [[UIActionSheet alloc]

                initWithTitle:@"Choose Camera"

                delegate:self cancelButtonTitle:@"Cancel"

                destructiveButtonTitle:nil

                otherButtonTitles:@"Front Camera", @"Rear Camera", nil];

            cameraSheet.tag = 100;

            [cameraSheet showInView:self.view];


    } else {

            //we only have one camera, show an error message


    UIAlertView *alert = [[UIAlertView alloc]

                                   initWithTitle:@"Error"

                message:@"You only have one camera" delegate:nil

                    cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

            [alert show];

        }


    }

    ```


    To support the action sheet, you need to declare the view controller as a delegate.
    To do that, modify the class signature as shown here:


    ```

    @interface CameraViewController : UIViewController

          <UIActionSheetDelegate>

    ```


    In the action sheet button handler, `[UIActionSheetDelegate actionSheet:didDismissWithButtonIndex:]`,
    the main logic checks the tag of the incoming action sheet, and passes the button
    index to the target method. In this case, you want to pass it to the `switchToCameraWithIndex:`
    method, as shown in [Listing 4-10](#9781430250838_Ch04.xhtml#list10).


    [***Listing 4-10***](#9781430250838_Ch04.xhtml#_list10). Action Sheet Button Handler


    ```

    -(void) actionSheet:(UIActionSheet *)actionSheet

            didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        switch (actionSheet.tag) {

            case 100:

                [self switchToCameraWithIndex:buttonIndex];

                break;

        }

    }

    ```


    You are now ready to implement the code to switch the active camera. The ultimate
    target of the change operation will be the capture session, because you add or
    remove input devices to or from a session. To prevent conflicts, you need to “take
    a lock” on the target object to indicate you will be changing the capture settings,
    before committing any changes. The lock for `AVCaptureSession` is `[AVCaptureSession
    beginConfiguration]`:


    ```

    [self.session beginConfiguration];

    ```


    Next, you need to line the button selections up to the target devices. Action
    sheet button indexes progress in a top-down manner, meaning the topmost item will
    have an index of 0\. In this example, Front Camera is the top item. You switch
    to the front camera by removing the rear camera as an input on the capture session,
    and then adding the front camera input. To mirror the selection, you also need
    to update the `currentDevice` pointer in the class, and the label for the Switch
    Camera button:


    ```

    if (buttonIndex == 0) { //front camera


    [self.session removeInput:self.rearCameraInput];


    if ([self.session canAddInput:self.frontCameraInput]) {

                [self.session addInput:self.frontCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Front";

            self.currentDevice = self.frontCamera;


    }

    ```


    For the final product, add an `else if` statement for the Rear Camera option in
    the action sheet, and release the configuration lock for the session object, as
    shown in [Listing 4-11](#9781430250838_Ch04.xhtml#list11).


    [***Listing 4-11***](#9781430250838_Ch04.xhtml#_list11). Complete Implementation
    for Switching Between Two Cameras


    ```

    -(void)switchToCameraWithIndex:(NSInteger)buttonIndex

    {

        [self.session beginConfiguration];


    if (buttonIndex == 0) {


    [self.session removeInput:self.rearCameraInput];


    if ([self.session canAddInput:self.frontCameraInput]) {

                [self.session addInput:self.frontCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Front";

            self.currentDevice = self.frontCamera;


    } else if (buttonIndex == 1) {


    [self.session removeInput:self.frontCameraInput];


    if ([self.session canAddInput:self.rearCameraInput]) {

                [self.session addInput:self.rearCameraInput];

            }


    self.cameraButton.titleLabel.text = @"Camera: Rear";

            self.currentDevice = self.frontCamera;

        }


    [self.session commitConfiguration];

    }

    ```


    Changing Flash Modes


    Changing flash modes in the app follows a process very similar to changing cameras;
    the key exception is that you are operating on the `AVCaptureDevice` level, rather
    than the `AVCaptureSession` level. Much like the Change Camera example, this example
    uses a button to change flash modes, and presents users with an action sheet to
    make their selection. The flash modes supported by iOS are Automatic, On, and
    Off.


    The code in [Listing 4-12](#9781430250838_Ch04.xhtml#list12) checks whether the
    current input device supports flash mode before presenting the picker. This error-checking
    step is critical, because it allows the app to support older iPhones and circumvents
    the assumption that all the system’s built-in cameras support the flash feature.
    On many devices, the front camera does not have a flash.


    [***Listing 4-12***](#9781430250838_Ch04.xhtml#_list12). Change Flash Mode Event
    Handler'
