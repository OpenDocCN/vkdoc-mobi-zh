    \  \n`}`  \n\n你可以通过在应用中使用**选择视频**按钮来选择录制的视频，验证其是否可播放。它们应该像文档文件夹中的其他视频文件一样正常播放。\n\
    \n## 总结\n\n本章中，你学习了如何使用`MPMoviePlayerController`类播放视频，以及如何使用`UIImagePickerController`类录制视频。在\
    \ MyVideoPlayer 应用中，你看到使用`MediaPlayer`框架播放音频和视频的主要区别在于配置播放器的播放设置和父视图。为了捕捉错误和自动播放内容，你学习了如何实现通知观察者。\n\
    \n在 MyVideoRecorder 应用中，你通过集成`UIImagePickerController`学习了如何为 MyVideoPlayer 应用添加视频录制功能。你再次看到，通过将该类配置为仅处理视频并添加一些额外的配置选项，你可以创造一种易于捕获视频的用户体验。\n\
    \n## 第 9 章 构建自定义视频播放界面\n\n遵循本书中图像和音频单元的相同趋势，既然你已经学会了如何使用苹果内置的界面进行视频播放和录制，现在可以开始学习如何“控制”它们的核心功能。在本章中，你将学习如何自定义视频播放界面，从而展示你的品牌标识以及最适合你应用的控件。\n\
    \n为此，你需要在`AVFoundation`的媒体播放功能之上构建自己的用户界面，就像你在第 6 章到第 8 章中开发的音频应用一样。虽然这看起来可能有些困难，但好消息是媒体播放层的设置相对容易；大部分工作在于构建你的用户体验。\n\
    \n实现基于`AVFoundation`的视频播放器的基本步骤如下：\n\n1.  使用`AVPlayer`类设置一个媒体播放器。\n2.  使用`AVPlayerLayer`类显示视频。\n\
    3.  使用 Interface Builder 创建自定义播放控件。\n4.  为播放控件和状态变化创建处理程序。\n\n在本章中，你将学习如何通过将 MyVideoPlayer\
    \ 项目中的视频播放器替换为你开发的自定义子类来实现这些步骤。该项目包含在源代码包的第 9 章文件夹中，名称为 MyCustomVideoPlayer。为了简化过渡，你将设计一个基于通知的消息系统，它非常类似于`MPMoviePlayerController`类。\n\
    \n大多数视频应用需要在全屏模式下暴露完整的控件集，因此该项目专注于为全屏视频播放界面构建控件。你可以在图 9-1 中找到更新后的视频播放界面原型。\n\n\
    ![9781430250838_Fig09-01.jpg](img/9781430250838_Fig09-01.jpg)\n\n图 9-1. MyCustomVideoPlayer\
    \ 视频播放界面原型\n\n将新的视频播放界面与默认的 iOS 视频界面（如图 9-2 所示）进行比较，你可以看到该项目更强调手指操作的便利性。用户无需费力寻找播放按钮或精确跳转几秒钟，屏幕中央较大的按钮减少了用户出错的机会。在播放过程中，屏幕底部的滑块会向右移动以显示当前进度。用户还可以使用该控件**拖放**（跳跃）到视频的任何位置。通过使用屏幕中央的控件，用户可以切换播放状态或向前/向后跳转几秒钟。在几秒钟无操作后，控件会消失，这样它们既可用又不会分散注意力或占用屏幕空间。\n\
    \n![9781430250838_Fig09-02.jpg](img/9781430250838_Fig09-02.jpg)\n\n图 9-2. 默认 iOS\
    \ 视频播放界面（左）与自定义播放界面（右）\n\n## 开始\n\n要开始使用 MyCustomVideoPlayer 项目，请从第 10 章复制 MyVideoPlayer\
    \ 项目并将其重命名为`MyCustomVideoPlayer`。如果你不确定如何克隆项目，请参考第 8 章中的“录制视频文件”部分，你在那里克隆了 MyVideoPlayer\
    \ 项目以创建 MyVideoRecorder 项目。\n\n由于该项目使用`AVFoundation`框架进行媒体播放，而不是`MediaPlayer`框架，请在项目设置中的“链接的库和框架”部分进行相应更改。如图\
    \ 9-3 所示，你的最终框架列表应仅包含`AVFoundation`框架。\n\n![9781430250838_Fig09-03.jpg](img/9781430250838_Fig09-03.jpg)\n\
    \n图 9-3. MyCustomVideoPlayer 项目的框架列表\n\n对于新的视频播放界面，请向你的项目中添加一个`UIViewController`的子类。与之前的项目一样，你可以通过在\
    \ Xcode 的**File**菜单中选择**New → File**来创建子类。如图 9-4 所示，当提示你选择父类时，请输入`UIViewController`。在\
    \ MyCustomVideoPlayer 项目中，该类被命名为`CustomPlayerController`。\n\n![9781430250838_Fig09-04.jpg](img/9781430250838_Fig09-04.jpg)\n\
    \n图 9-4. 创建子类\n\n向`CustomPlayerController`类添加一个名为`[CustomPlayerController initWithContentURL:]`的构造函数。这将帮助你模仿`MPMoviePlayerController`类，后者使用`[MPMoviePlayerController\
    \ initWIthContentURL:]`作为其构造函数。你可以在代码清单 9-1 和 9-2 中找到`CustomPlayerController`类的初始头文件（`.h`）和实现文件（`.m`）。\n\
    \n**代码清单 9-1**. `CustomPlayerController`类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n\n@interface CustomPlayerController : UIViewController\n\
    \n-(id)initWithContentURL:(NSURL *)contentURL;\n\n@end\n```\n\n**代码清单 9-2**. `CustomPlayerController`类的实现文件\n\
    \n```\n#import \"CustomPlayerController.h\"\n\n@interface CustomPlayerController\
    \ ()\n\n@end\n\n@implementation CustomPlayerController\n\n-(id)initWithContentURL:(NSURL\
    \ *)contentURL\n{\n    self = [super init];\n    if (self) {\n        ....\n \
    \   }\n    return self;\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
    \    // 在此处进行额外的设置\n}\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n\
    \    // 释放任何可以重新创建的资源\n}\n\n- (BOOL)shouldAutorotate\n{\n    return NO;\n}\n\n\
    @end\n```\n"
- fmt: "要链接此类到您的`MainViewController`，请在头文件中包含它，并将`moviePlayer`的类型从`MPMoviePlayerController`改为`CustomPlayerController`。虽然此类中还未定义任何内容，但您将构建一组控件和通知，这些控件和通知紧密模仿`MPMoviePlayerController`类的设计。`MainViewController`类的完整头文件包含在[Listing\
    \ 9-3](#9781430250838_Ch09.xhtml#list3)中。\n\n[***Listing 9-3***](#9781430250838_Ch09.xhtml#_list3).\
    \ MainViewController类的头文件\n\n```\n#import <UIKit/UIKit.h>\n#import \"CustomPlayerController.h\"\
    \n#import \"FileViewController.h\"\n\n@interface MainViewController : UIViewController\n\
    \    <FileControllerDelegate>\n\n@property (nonatomic, strong) IBOutlet UIView\
    \ *playerView;\n@property (nonatomic, strong) CustomPlayerController *moviePlayer;\n\
    \n@end\n```\n\n对于本项目，目标是专注于构建自定义播放界面的基础知识。大多数用户期望在全屏模式下看到完整的控件集；这些示例将帮助您构建一个全屏播放控制器。\n\
    \n要以全屏模式呈现新的播放控制器，请修改文件选择器委托`[FileControllerDelegate didFinishWithFile:]`中的呈现代码。用户选择文件后，您应尝试使用所选内容URL初始化`CustomPlayerController`。如[Listing\
    \ 9-4](#9781430250838_Ch09.xhtml#list4)所示，将所有`MPMoviePlayerController`初始化代码替换为对`[CustomPlayerController\
    \ initWithContentURL:]`的调用。为简化消息传递过程，您将把`MPMoviePlayerController`的设置代码封装到`CustomPlayerController`类的初始化方法中。\n\
    \n[***Listing 9-4***](#9781430250838_Ch09.xhtml#_list4). 呈现您的`CustomPlayerController`\n\
    \n```\n-(void)didFinishWithFile:(NSString *)filePath\n{\n    NSArray *paths =\n\
    \        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n    NSUserDomainMask,\
    \ YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n    NSString\
    \ *relativePath = [documentsDirectory\n        stringByAppendingPathComponent:filePath];\n\
    \nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n    self.moviePlayer\
    \ = [[CustomPlayerController alloc]\n        initWithContentURL:fileURL];\n\n\
    }\n```\n\n## 构建用户界面\n\n使用`AVFoundation`框架构建自己的视频播放界面的一个优势是，您可以通过Interface Builder布置自己的用户界面。另一种自定义播放界面的流行方法是子类化`MPPlayerViewController`类并覆盖控制栏。不幸的是，您无法通过使用`MPPlayerViewController`的子类来构建故事板元素，因为它不会注册为Interface\
    \ Builder兼容对象。\n\n使用`AVFoundation`框架时，您可以通过创建一个`UIViewController`的新子类并将项目直接放置在故事板上，来避免这种麻烦。此外，您还可以利用自动布局，这将使您的用户界面能够跨多种屏幕尺寸进行缩放。\n\
    \n首先，从Interface Builder对象库中拖动一个视图控制器到您的故事板上。在属性检查器中，为类和故事板ID都输入**CustomPlayerController**，如[Figure\
    \ 9-5](#9781430250838_Ch09.xhtml#Fig5)所示。\n\n![9781430250838_Fig09-05.jpg](images/9781430250838_Fig09-05.jpg)\n\
    \n[Figure 9-5](#9781430250838_Ch09.xhtml#_Fig5). CustomPlayerController故事板元素的属性\n\
    \n因为您将以编程方式呈现`CustomPlayerController`，所以不需要定义segue。但是，要获取自定义用户界面，您需要使用故事板而非默认构造器来初始化`CustomPlayerController`对象。如[Listing\
    \ 9-5](#9781430250838_Ch09.xhtml#list5)所示，您可以通过获取项目`UIStoryboard`对象的引用，然后使用其故事板ID拉取`CustomPlayerController`的故事板来执行此操作。此代码替换了您在`[self\
    \ initWithContentUrl:]`方法中对`[super init]`的通用调用。\n\n[***Listing 9-5***](#9781430250838_Ch09.xhtml#_list5).\
    \ 从故事板初始化`CustomPlayerController`\n\n```\n-(id)initWithContentURL:(NSURL *)contentURL\n\
    {\n    UIStoryboard *storyboard = [UIStoryboard\n        storyboardWithName:@\"\
    Main\" bundle:nil];\n    CustomPlayerController *myViewController = [storyboard\n\
    \    instantiateViewControllerWithIdentifier:@\"CustomPlayerController\"];\n\n\
    self = myViewController;\n    if (self) {\n        ....\n    }\n    return self;\n\
    }\n```\n\n在[Figure 9-6](#9781430250838_Ch09.xhtml#Fig6)中，我从应用程序的模拟图中提取了播放界面。请注意，用户界面有三个主要区域：顶部的控制栏、底部的控制栏和屏幕中央的控制区域。\n\
    \n![9781430250838_Fig09-06.jpg](images/9781430250838_Fig09-06.jpg)\n\n[Figure\
    \ 9-6](#9781430250838_Ch09.xhtml#_Fig6). 视频播放界面模拟图\n\n要构建控制区域，请从对象库中拖放三个`UIView`对象到您的故事板上，如[Figure\
    \ 9-7](#9781430250838_Ch09.xhtml#Fig7)所示。顶部和底部的视图将充当非正式的导航栏，中央视图将用于放置控件。\n\n![9781430250838_Fig09-07.jpg](images/9781430250838_Fig09-07.jpg)\n\
    \n[Figure 9-7](#9781430250838_Ch09.xhtml#_Fig7). 添加容器视图\n\n为支持多种屏幕尺寸，您需要为元素启用*自动布局*。使用自动布局，您可以指定哪些定位元素需要被约束（固定），并允许其余元素自适应屏幕尺寸。如[Figure\
    \ 9-8](#9781430250838_Ch09.xhtml#Fig8)所示，您可以通过在Interface Builder中选择一个项目，导航到窗口底部的Pin按钮（下方圈出），然后点击表示您想要“固定”的元素的虚线或复选框来设置约束。\n\
    \n![9781430250838_Fig09-08.jpg](images/9781430250838_Fig09-08.jpg)\n\n[Figure\
    \ 9-8](#9781430250838_Ch09.xhtml#_Fig8). 自动布局Pin对话框\n\n对于导航栏，将视图固定到屏幕的左侧和右侧，以及顶部或底部。您可以在Figure\
    \ [9-9](#9781430250838_Ch09.xhtml#Fig9)中找到底部导航栏的示例。对顶部栏执行相同操作。\n\n![9781430250838_Fig09-09.jpg](images/9781430250838_Fig09-09.jpg)\n\
    \n[Figure 9-9](#9781430250838_Ch09.xhtml#_Fig9). 固定底部导航栏\n\n对于中央控制面板，您不需要担心屏幕尺寸；相反，您需要担心其在屏幕中央的位置。要居中对齐此面板，请固定其宽度和高度，然后使用Align按钮将元素在其容器中对齐，如Figure\
    \ [9-10](#9781430250838_Ch09.xhtml#Fig10)所示。\n\n![9781430250838_Fig09-10.jpg](images/9781430250838_Fig09-10.jpg)\n\
    \n[Figure 9-10](#9781430250838_Ch09.xhtml#_Fig10). 居中对齐播放控件"
  raw: 'To link this class to your `MainViewController`, include it in your header
    file, and change the type of the `moviePlayer` from `MPMoviePlayerController`
    to `CustomPlayerController`. Although nothing is defined in this class yet, you
    will build a set of controls and notifications that closely mimic the design of
    the `MPMoviePlayerController` class. The completed header file for the `MainViewController`
    class is included in [Listing 9-3](#9781430250838_Ch09.xhtml#list3).


    [***Listing 9-3***](#9781430250838_Ch09.xhtml#_list3). Header File for MainViewController
    Class


    ```

    #import <UIKit/UIKit.h>

    #import "CustomPlayerController.h"

    #import "FileViewController.h"


    @interface MainViewController : UIViewController

        <FileControllerDelegate>


    @property (nonatomic, strong) IBOutlet UIView *playerView;

    @property (nonatomic, strong) CustomPlayerController *moviePlayer;


    @end

    ```


    For this project, the goal is to focus on the fundamentals of building a custom
    playback interface. Most users expect to see a full set of controls during full-screen
    mode; these examples will help you build a full-screen playback controller.


    To present the new playback controller in full-screen mode, change the presenting
    code in the file picker delegate, `[FileControllerDelegate didFinishWithFile:]`.
    After a user picks a file, you should attempt to initialize the `CustomPlayerController`
    with the selected content URL. As shown in [Listing 9-4](#9781430250838_Ch09.xhtml#list4),
    replace all the `MPMoviePlayerController` initialization code with a call to `[CustomPlayerController
    initWithContentURL:]`. To streamline the message-passing process, you will encapsulate
    the setup code from the `MPMoviePlayerController` into the initialization method
    for the `CustomPlayerController` class.


    [***Listing 9-4***](#9781430250838_Ch09.xhtml#_list4). Presenting Your CustomPlayerController


    ```

    -(void)didFinishWithFile:(NSString *)filePath

    {

        NSArray *paths =

            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,

        NSUserDomainMask, YES);

        NSString *documentsDirectory = [paths objectAtIndex:0];

        NSString *relativePath = [documentsDirectory

            stringByAppendingPathComponent:filePath];


    NSURL *fileURL = [NSURL fileURLWithPath:relativePath];

        self.moviePlayer = [[CustomPlayerController alloc]

            initWithContentURL:fileURL];


    }

    ```


    Building the User Interface


    One advantage of building your own video-playback interface with the `AVFoundation`
    framework is that you can lay out your own user interface by using Interface Builder.
    Another popular method for customizing the playback interface is by subclassing
    the `MPPlayerViewController` class and overriding the control bar. Unfortunately,
    you cannot build a storyboard element by using a subclass of `MPPlayerViewController`,
    as it will not register as an Interface Builder–compatible object.


    When using the `AVFoundation` framework, you can avoid this hassle by creating
    a new subclass of `UIViewController` and placing items directly on a storyboard.
    Additionally, you can take advantage of auto-layout, which will allow your user
    interface to scale across multiple screen sizes.


    To begin, drag a view controller from the Interface Builder Object Library onto
    your storyboard. In the Attributes Inspector, enter **CustomPlayerController**
    as the name for both the Class and Storyboard ID, as shown in [Figure 9-5](#9781430250838_Ch09.xhtml#Fig5).


    ![9781430250838_Fig09-05.jpg](images/9781430250838_Fig09-05.jpg)


    [Figure 9-5](#9781430250838_Ch09.xhtml#_Fig5). Attributes for CustomPlayerController
    storyboard element


    Because you will present the `CustomPlayerController` programmatically, you do
    not need to define a segue. However, to pick up your custom user interface, you
    will need to initialize your `CustomPlayerController` object by using the storyboard,
    instead of using the default constructor. As shown in [Listing 9-5](#9781430250838_Ch09.xhtml#list5),
    you can perform this operation by getting a reference to the `UIStoryboard` object
    for your project and then pulling the `CustomPlayerController`’s storyboard by
    using its storyboard ID. This code replaces the generic `[super init]` call in
    your `[self initWithContentUrl:]` method.


    [***Listing 9-5***](#9781430250838_Ch09.xhtml#_list5). Initializing the CustomPlayerController
    from a Storyboard


    ```

    -(id)initWithContentURL:(NSURL *)contentURL

    {

        UIStoryboard *storyboard = [UIStoryboard

            storyboardWithName:@"Main" bundle:nil];

        CustomPlayerController *myViewController = [storyboard

        instantiateViewControllerWithIdentifier:@"CustomPlayerController"];


    self = myViewController;

        if (self) {

            ....

        }

        return self;

    }

    ```


    In [Figure 9-6](#9781430250838_Ch09.xhtml#Fig6), I have extracted the playback
    interface from the application’s Mock-up. Note that there are three main areas
    to the user interface: a control bar at the top, a control bar at the bottom,
    and a control area at the center of the screen.


    ![9781430250838_Fig09-06.jpg](images/9781430250838_Fig09-06.jpg)


    [Figure 9-6](#9781430250838_Ch09.xhtml#_Fig6). Mock-up of video-playback interface


    To build the control areas, drag and drop three `UView` objects from the Object
    Library onto your storyboard, as shown in [Figure 9-7](#9781430250838_Ch09.xhtml#Fig7).
    The top and bottom views will act as informal navigation bars, and the center
    view will be used to place the controls.


    ![9781430250838_Fig09-07.jpg](images/9781430250838_Fig09-07.jpg)


    [Figure 9-7](#9781430250838_Ch09.xhtml#_Fig7). Adding container views


    To support multiple screen sizes, you need to enable *auto-layout* for your elements.
    With auto-layout, you specify which positioning elements need to be constrained
    (fixed), and allow the rest to grow to fit the screen. As shown in [Figure 9-8](#9781430250838_Ch09.xhtml#Fig8),
    you set constraints by selecting an item in Interface Builder, navigating to the
    Pin button at the bottom of the window (circled below), and then clicking on the
    dotted lines or check boxes representing the elements you want to “pin.”


    ![9781430250838_Fig09-08.jpg](images/9781430250838_Fig09-08.jpg)


    [Figure 9-8](#9781430250838_Ch09.xhtml#_Fig8). The Auto-Layout Pin dialog box


    For the navigation bars, pin the views to the left and right of the screen, and
    to the top or bottom. You can find an example for the bottom navigation bar in
    Figure [9-9](#9781430250838_Ch09.xhtml#Fig9). Follow the same process for the
    top bar.


    ![9781430250838_Fig09-09.jpg](images/9781430250838_Fig09-09.jpg)


    [Figure 9-9](#9781430250838_Ch09.xhtml#_Fig9). Pinning the bottom navigation bar


    For the center control panel, you do not need to worry about the screen size;
    instead, you need to worry about maintaining its position in the center of the
    screen. To center this panel, pin its width and height, then use the Align button
    to align the element in the center of its container, as shown in Figure [9-10](#9781430250838_Ch09.xhtml#Fig10).


    ![9781430250838_Fig09-10.jpg](images/9781430250838_Fig09-10.jpg)


    [Figure 9-10](#9781430250838_Ch09.xhtml#_Fig10). Centering the playback controls'
  trans: "\n要链接此类到您的`MainViewController`，请在头文件中包含它，并将`moviePlayer`的类型从`MPMoviePlayerController`改为`CustomPlayerController`。虽然此类中还未定义任何内容，但您将构建一组控件和通知，这些控件和通知紧密模仿`MPMoviePlayerController`类的设计。`MainViewController`类的完整头文件包含在\
    \ Listing 9-3 中。\n\n***Listing 9-3***. MainViewController 类的头文件\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"CustomPlayerController.h\"\n#import \"FileViewController.h\"\
    \n\n@interface MainViewController : UIViewController\n    <FileControllerDelegate>\n\
    \n@property (nonatomic, strong) IBOutlet UIView *playerView;\n@property (nonatomic,\
    \ strong) CustomPlayerController *moviePlayer;\n\n@end\n```\n\n对于本项目，目标是专注于构建自定义播放界面的基础知识。大多数用户期望在全屏模式下看到完整的控件集；这些示例将帮助您构建一个全屏播放控制器。\n\
    \n要以全屏模式呈现新的播放控制器，请修改文件选择器委托`[FileControllerDelegate didFinishWithFile:]`中的呈现代码。用户选择文件后，您应尝试使用所选内容\
    \ URL 初始化`CustomPlayerController`。如 Listing 9-4 所示，将所有`MPMoviePlayerController`初始化代码替换为对`[CustomPlayerController\
    \ initWithContentURL:]`的调用。为简化消息传递过程，您将把`MPMoviePlayerController`的设置代码封装到`CustomPlayerController`类的初始化方法中。\n\
    \n***Listing 9-4***. 呈现您的`CustomPlayerController`\n\n```\n-(void)didFinishWithFile:(NSString\
    \ *)filePath\n{\n    NSArray *paths =\n        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \    NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
    \    NSString *relativePath = [documentsDirectory\n        stringByAppendingPathComponent:filePath];\n\
    \nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n    self.moviePlayer\
    \ = [[CustomPlayerController alloc]\n        initWithContentURL:fileURL];\n\n\
    }\n```\n\n## 构建用户界面\n\n使用`AVFoundation`框架构建自己的视频播放界面的一个优势是，您可以通过 Interface Builder\
    \ 布置自己的用户界面。另一种自定义播放界面的流行方法是子类化`MPPlayerViewController`类并覆盖控制栏。不幸的是，您无法通过使用`MPPlayerViewController`的子类来构建故事板元素，因为它不会注册为\
    \ Interface Builder 兼容对象。\n\n使用`AVFoundation`框架时，您可以通过创建一个`UIViewController`的新子类并将项目直接放置在故事板上，来避免这种麻烦。此外，您还可以利用自动布局，这将使您的用户界面能够跨多种屏幕尺寸进行缩放。\n\
    \n首先，从 Interface Builder 对象库中拖动一个视图控制器到您的故事板上。在属性检查器中，为类和故事板 ID 都输入**CustomPlayerController**，如\
    \ Figure 9-5 所示。\n\n![9781430250838_Fig09-05.jpg](img/9781430250838_Fig09-05.jpg)\n\
    \nFigure 9-5. CustomPlayerController 故事板元素的属性\n\n因为您将以编程方式呈现`CustomPlayerController`，所以不需要定义\
    \ segue。但是，要获取自定义用户界面，您需要使用故事板而非默认构造器来初始化`CustomPlayerController`对象。如 Listing\
    \ 9-5 所示，您可以通过获取项目`UIStoryboard`对象的引用，然后使用其故事板 ID 拉取`CustomPlayerController`的故事板来执行此操作。此代码替换了您在`[self\
    \ initWithContentUrl:]`方法中对`[super init]`的通用调用。\n\n***Listing 9-5***. 从故事板初始化`CustomPlayerController`\n\
    \n```\n-(id)initWithContentURL:(NSURL *)contentURL\n{\n    UIStoryboard *storyboard\
    \ = [UIStoryboard\n        storyboardWithName:@\"Main\" bundle:nil];\n    CustomPlayerController\
    \ *myViewController = [storyboard\n    instantiateViewControllerWithIdentifier:@\"\
    CustomPlayerController\"];\n\nself = myViewController;\n    if (self) {\n    \
    \    ....\n    }\n    return self;\n}\n```\n\n在 Figure 9-6 中，我从应用程序的模拟图中提取了播放界面。请注意，用户界面有三个主要区域：顶部的控制栏、底部的控制栏和屏幕中央的控制区域。\n\
    \n![9781430250838_Fig09-06.jpg](img/9781430250838_Fig09-06.jpg)\n\nFigure 9-6.\
    \ 视频播放界面模拟图\n\n要构建控制区域，请从对象库中拖放三个`UIView`对象到您的故事板上，如 Figure 9-7 所示。顶部和底部的视图将充当非正式的导航栏，中央视图将用于放置控件。\n\
    \n![9781430250838_Fig09-07.jpg](img/9781430250838_Fig09-07.jpg)\n\nFigure 9-7.\
    \ 添加容器视图\n\n为支持多种屏幕尺寸，您需要为元素启用*自动布局*。使用自动布局，您可以指定哪些定位元素需要被约束（固定），并允许其余元素自适应屏幕尺寸。如\
    \ Figure 9-8 所示，您可以通过在 Interface Builder 中选择一个项目，导航到窗口底部的 Pin 按钮（下方圈出），然后点击表示您想要“固定”的元素的虚线或复选框来设置约束。\n\
    \n![9781430250838_Fig09-08.jpg](img/9781430250838_Fig09-08.jpg)\n\nFigure 9-8.\
    \ 自动布局 Pin 对话框\n\n对于导航栏，将视图固定到屏幕的左侧和右侧，以及顶部或底部。您可以在 Figure 9-9 中找到底部导航栏的示例。对顶部栏执行相同操作。\n\
    \n![9781430250838_Fig09-09.jpg](img/9781430250838_Fig09-09.jpg)\n\nFigure 9-9.\
    \ 固定底部导航栏\n\n对于中央控制面板，您不需要担心屏幕尺寸；相反，您需要担心其在屏幕中央的位置。要居中对齐此面板，请固定其宽度和高度，然后使用 Align\
    \ 按钮将元素在其容器中对齐，如 Figure 9-10 所示。\n\n![9781430250838_Fig09-10.jpg](img/9781430250838_Fig09-10.jpg)\n\
    \nFigure 9-10. 居中对齐播放控件\n"
- fmt: "接下来，您就可以开始向播放界面中添加控件了。以[图9-6](#9781430250838_Ch09.xhtml#Fig6)为指导，但请特别注意：在放置元素时，确保直接将其拖放到视图（`view`）之上。这样操作相当于将元素作为子视图（subview）添加，使得您可以通过修改容器来显示或隐藏整个面板。例如，要隐藏所有播放控件，您只需隐藏中央控制面板即可。您可以通过确认元素在*文档大纲*（Interface\
    \ Builder 的左侧面板）中的层次位置，来验证它们是否已作为子视图添加。参考[图9-11](#9781430250838_Ch09.xhtml#Fig11)，您可以确认当前时间标签（`Current\
    \ Time` label）已添加到屏幕底部的控制栏中，因为该标签在元素层级中出现在视图（`view`）之下。\n\n![9781430250838_Fig09-11.jpg](images/9781430250838_Fig09-11.jpg)\n\
    \n[图9-11](#9781430250838_Ch09.xhtml#_Fig11) 验证视图层级\n\n为了帮助您连接用户界面的其余部分，[代码清单9-6](#9781430250838_Ch09.xhtml#list6)展示了`CustomPlayerController`类的头文件。将按钮的动作（action）连接到按钮的*Touch\
    \ Up Inside*事件，并将滑块事件连接到滑块的*Value Changed*事件。\n\n[***代码清单9-6***](#9781430250838_Ch09.xhtml#_list6)\
    \ `CustomPlayerController`类的头文件\n\n```objc\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    \n@interface CustomPlayerController : UIViewController\n\n@property (nonatomic,\
    \ strong) IBOutlet UIView *controlView;\n@property (nonatomic, strong) IBOutlet\
    \ UIButton *playbackButton;\n@property (nonatomic, strong) IBOutlet UIButton *seekFwdButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *seekBackButton;\n@property (nonatomic,\
    \ strong) IBOutlet UIButton *doneButton;\n\n@property (nonatomic, strong) IBOutlet\
    \ UISlider *timeSlider;\n@property (nonatomic, strong) IBOutlet UILabel *progressLabel;\n\
    @property (nonatomic, strong) IBOutlet UILabel *totalTimeLabel;\n\n-(IBAction)seekBackward:(id)sender;\n\
    -(IBAction)seekForward:(id)sender;\n-(IBAction)sliderChanged:(UISlider *)sender;\n\
    -(IBAction)togglePlayback:(id)sender;\n-(IBAction)done:(id)sender;\n\n-(void)play;\n\
    \n-(id)initWithContentURL:(NSURL *)contentURL;\n\n@end\n```\n\n要隐藏中央控制面板，请记得链接该类的`controlView`属性。完成后，您可以将该元素的背景颜色设置为*clear*（透明），从而使播放控件看起来像是悬浮在界面上。\n\
    \n## 使用`AVPlayer`类进行媒体播放\n\n`AVFoundation`框架允许您通过`AVPlayer`类播放视频文件。尽管它不提供用户界面，但该类提供了播放控制（包括进度拖拽和播放切换）、事件（包括*加载状态*或*播放完成*）以及有限的硬件控制（包括AirPlay和音量）。该类设计为接收`AVPlayerItem`对象作为输入，并可以将其输出直接传递给`AVPlayerLayer`类，您可以将`AVPlayerLayer`显示在`UIView`之上。要控制播放，您需要在`CustomPlayerController`头文件中为`AVPlayerItem`和`AVPlayer`添加实例变量：\n\
    \n```objc\n@property (nonatomic, strong) AVPlayerItem *playerItem;\n@property\
    \ (nonatomic, strong) AVPlayer *player;\n```\n\n要使用`AVPlayer`类检查输入的有效性，您需要尝试加载文件。当`AVPlayer`对象的`status`为`AVStatusReadyToPlay`时，表示文件已准备好播放。为了捕获此状态变化，您需要使用键值观察（KVO），这是一种基于订阅的消息传递机制，类似于通知。对于KVO，您需要指定一个要*观察*的对象属性（key）。对于`AVPlayer`的状态变化，您需要观察`status`属性。您可以在[第12章](#9781430250838_Ch12.xhtml)中找到关于键值观察的详细说明，届时您将使用新的`AVKit`框架开发一个更复杂的基于`AVPlayer`的媒体播放器。\n\
    \n[代码清单9-7](#9781430250838_Ch09.xhtml#list7)展示了如何开始`AVPlayer`的初始化过程——通过输入URL创建一个`AVPlayerItem`，初始化一个`AVPlayer`对象，并设置一个观察者。\n\
    \n[***代码清单9-7***](#9781430250838_Ch09.xhtml#_list7) 初始化`AVPlayer`\n\n```objc\n\
    -(id)initWithContentURL:(NSURL *)contentURL\n{\n    UIStoryboard *storyboard =\
    \ [UIStoryboard\n        storyboardWithName:@\"Main\" bundle:nil];\n    CustomPlayerController\
    \ *myViewController = [storyboard\n    instantiateViewControllerWithIdentifier:@\"\
    CustomPlayerController\"];\n\nself = myViewController;\n    if (self) {\n\nself.playerItem\
    \ = [[AVPlayerItem alloc]\n            initWithURL:contentURL];\n        self.player\
    \ = [AVPlayer playerWithPlayerItem:self.playerItem];\n        [self.player addObserver:self\
    \ forKeyPath:@\"status\"\n            options:0 context:nil];\n}\n    return self;\n\
    }\n```\n\n所有KVO消息都由类的`[UIViewController observeValueForKeyPath:ofObject:change:context:]`方法处理。`status`属性的变化会表明`AVPlayer`是否成功加载了文件（`AVPlayerStatusReadyToPlay`）或者加载失败（`AVPlayerStatusFailed`）。为了识别KVO消息，在执行任何逻辑之前，请比较传入的`object`和`keyPath`。如[代码清单9-8](#9781430250838_Ch09.xhtml#list8)所示，您可以在`CustomPlayerController`类中使用`self.player`实例变量和`status`作为这些参数。\n\
    \n[***代码清单9-8***](#9781430250838_Ch09.xhtml#_list8) 处理`AVPlayer`的KVO消息\n\n```objc\n\
    -(void)observeValueForKeyPath:(NSString *)keyPath\n    ofObject:(id)object change:(NSDictionary\
    \ *)change\n    context:(void *)context\n{\n    if (object == self.player && [keyPath\
    \ isEqualToString:@\"status\"]) {\n\nif (self.player.status == AVPlayerStatusReadyToPlay)\
    \ {\n            ...\n        } else {\n            ...\n        }\n\n[self.player\
    \ removeObserver:self forKeyPath:@\"status\"];\n    }\n}\n```\n\n如果文件加载成功，您就可以初始化`AVPlayerLayer`了，它负责显示`AVPlayer`的输出。`AVPlayerLayer`的工作原理类似于您在[第4章](#9781430250838_Ch04.xhtml)中用于镜像相机实时画面的`AVCaptureVideoPreviewLayer`。它将视频数据直接输出到一个`layer`，这是一个为`UIView`提供内容的底层对象。如[代码清单9-9](#9781430250838_Ch09.xhtml#list9)所示，要显示视频层，请将其尺寸匹配到目标视图的*bounding\
    \ frame*（边界框）（在本例中为`CustomViewController`的主区域），并将其添加为子层（sublayer）。\n\n[***代码清单9-9***](#9781430250838_Ch09.xhtml#_list9)\
    \ 向`CustomViewController`添加`AVPlayerLayer`\n\n```objc\n-(void)observeValueForKeyPath:(NSString\
