    \ resignFirstResponder];\n}\n```\n\n## Building a More Robust Audio Session\n\n\
    By adding background audio and Now Playing support, you have significantly expanded\
    \ the functionality of the MyPlayer application. It now operates more like an\
    \ iPod application. However, to get full parity, you need to expand the MyPlayer\
    \ application to handle unexpected external events, such as audio interruptions\
    \ from the Phone application, or route changes originating from the user plugging\
    \ in headphones.\n\nWhen listening to music with the iPod application, you may\
    \ have noticed that playback stops when you bring up Siri and resumes when you\
    \ dismiss her, and that playback pauses when you unplug your headphones (so you\
    \ can avoid impressing any bystanders with your unique musical preferences). These\
    \ actions are not the default in iOS; however, Cocoa Touch provides delegates\
    \ and notifications that allow you to implement them in your apps.\n\nIn this\
    \ section, you will see how to build a more robust audio session for your audio\
