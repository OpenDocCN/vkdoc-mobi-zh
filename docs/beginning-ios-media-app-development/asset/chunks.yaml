    ## 使用 Core Motion 追踪活动


    自 iOS 4 起，Core Motion 就成了 iOS 的动作感应框架。多年来，开发者一直用它来访问内置的加速计和陀螺仪（自那时起便催生了成千上万的赛车游戏）。然而，在
    M 系列运动协处理器问世之前，一直缺乏简便的方法来获取步数数据。你可以利用加速计来检测设备移动时是否发生了“颠簸”，但你必须自行编写代码来定义何为“一步”。同样，你可以使用
    GPS 来确定用户的移动距离，但这样做会迅速耗尽电池电量。

    '
- fmt: 'Although iOS 7 added an interface to the M-series motion coprocessor to the
    Core Motion framework, iOS 8 has fully unlocked it, allowing you to retrieve data
    directly as *steps* and *activity types*. Core Motion takes care of all the work
    to define what a step is, what it corresponds to in terms of distance, and what
    the user was doing when the step was registered (for example, running or walking).


    Now that you know what Core Motion can do, you can discover how to enable it.
    For the `MyFitnessPod` app, you will want to use Core Motion to start logging
    the user’s step and echo the display to the user interface. To do this, you prepare
    the application to accept motion data, a task that includes the following:


    1.  Requesting permission to use the hardware (if it is available)

    2.  Registering your class for motion updates

    3.  Implementing handler methods for these updates


    The Core Motion framework depends heavily on completion handlers (blocks) for
    message-passing. If you are still unsure of how to use blocks, refer back to the
    “Quick Guide to Blocks” sidebar in [Chapter 4](#9781430250838_Ch04.xhtml).


    ## Requesting Motion Activity Permission


    Because health data is one of the most sensitive pieces of information you can
    collect about a user, before you can get started accessing the M-series motion
    coprocessor hardware, you need to make sure your application has permission from
    the user to access *motion activity* data. As with the photo-based applications
    you developed earlier, you cannot override the user’s decision, but you can catch
    the response and initialize your application appropriately.


    The Core Motion class that manages motion events and the motion activity permission
    is `CMMotionActivityManager`. Strictly speaking, a *motion activity* is defined
    as an event that corresponds to the type of movement the user is currently engaged
    in, whether that is walking, running, or even driving. Although handling these
    events is not within the scope of the `MyFitnessPod` project, Apple uses motion
    activity as the permission level for Core Motion, so you need to include it in
    your project.


    You query for motion activity status by calling the public method `[CMMotionActivity
    isActivityAvailable]`. This method returns a `BOOL` value, indicating whether
    the user has given your app permission to access motion activity. As shown in
    [Figure 13-7](#9781430250838_Ch13.xhtml#Fig7), calling this method for the first
    time exposes the system’s permission action sheet. Privacy permissions are keyed
    by *application identifier*, meaning subsequent launches (or reinstalls) of your
    application will not prompt the user to select the permission level again. (Users
    can change their permission level at any time by selecting the Privacy option
    in the iOS Settings application.)


    ![9781430250838_Fig13-07.jpg](images/9781430250838_Fig13-07.jpg)


    [Figure 13-7](#9781430250838_Ch13.xhtml#_Fig7). Motion activity permission prompt


    **Note**  You can reset all application permissions on a device by choosing General
    → Reset → Reset Privacy & Location in the iOS Settings application.


    Because the action sheet needs to be visible for the user to respond to it, you
    need to make the call from a user-initiated action (instead of using the `[self
    viewDidLoad]` method). For the `MyFitnessPod` application, the primary user-initiated
    action that requires motion data is the Start Workout button, so place your permission
    call in that button’s handler method, defined as `[MainViewController toggleWorkout]`
    in the header file from [Listing 13-1](#9781430250838_Ch13.xhtml#list1). As shown
    in [Listing 13-2](#9781430250838_Ch13.xhtml#list2), after determining whether
    the user is about to start a workout, you should immediately check for motion
    activity permission. If the user has given your app permission, you can begin
    updating the user interface and start setting up the pedometer; otherwise, you
    should show an alert, letting the user know that your app requires the motion
    activity permission.'
