    ```

    @protocol CameraDelegate <NSObject>


    -(void)cancel;

    -(void)didFinishWithImage:(UIImage *)image;


    @end

    ```


    虽然这种消息传递技术适用于静态图片（最多几兆字节），但视频文件可能轻易达到数百兆字节。为了有效地传回视频，你应该返回由 `AVCaptureMovieFileOutput`
    生成的电影文件的 URL。代码清单 10-23 包含了 `CameraDelegate` 协议的修改后声明。用于返回视频的方法被命名为 `[CameraDelegate
    didFinishWithURL:]`。


    ***代码清单 10-23***. 视频的 `CameraDelegate` 协议声明


    ```

    @protocol CameraDelegate <NSObject>


    -(void)cancel;

    -(void)didFinishWithUrl:(NSURL *)url;


    @end

    ```


    **注意** 切记，仅在 `AVCaptureFileOutputRecordingDelegate` 完成后才展示播放界面。这样，你才能确保视频文件是有效的。


    与所有其他协议一样，你需要在被设置为代理的类中实现 `[CameraDelegate didFinishWithURL:]` 方法。对于 `MyCustomRecorder`
    项目，这是 `MainViewController`。你只需在实现中关闭视频捕获界面并显示一个成功提示视图即可。因为你在创建 `AVCaptureMovieFileOutput`
    对象时，指定了一个位于应用程序文档目录中的输出 URL，所以无需执行额外工作来保存视频文件。`MainViewController` 类的最终实现在代码清单
    10-24 中。


    ***代码清单 10-24***. `MainViewController` 类的“完成录制并获取 URL”实现


    ```

    -(void)didFinishWithSuccess:(BOOL)success

    {

        NSURL *outputUrl = [self.movieFileOutput outputFileURL];


    if (success) {


    [self.delegate didFinishWithUrl:outputUrl];


    [self dismissViewControllerAnimated:YES completion:nil];


    } else {


    [self dismissViewControllerAnimated:YES completion:^{

                //delete old movie file


    [[NSFileManager defaultManager]

                    removeItemAtPath:[outputUrl path] error:NULL];


    }];


    }

    }

    ```


    ## 总结


    在本章中，你了解了如何基于 `AVFoundation` 框架的图像捕获类构建自定义视频录制界面。为了节省时间，你复用了第 4 章中的 `CameraViewController`
    类用于基础捕获界面，以及第 9 章中的 `CustomPlayer` 类用于自定义视频播放界面。


    值得注意的是，你能够复用你在第 4 章中构建的静态图片捕获项目的大部分代码，仅做了少量更改来处理电影文件输出并启用视频特定的捕获设置。为了模拟 `UIImagePickerController`
    的预览界面，你向 `CustomPlayer` 类添加了“接受”和“拒绝”控件。最后，为了适应视频文件较大的体积，你向 `CameraDelegate` 协议添加了一个“完成录制并获取
    URL”的方法。


    正如本书中许多其他项目的模式一样，这个自定义视频录制项目主要是一项修改现有代码以满足新用例的练习。当你继续作为媒体应用开发者（以及广义上的工程师）时，你会发现许多其他概念与你已知的内容有大量重叠。关键是要保持开放的心态，并利用你认识到的常见模式。


    ## 第四部分


    iOS 8 及更高版本


    ## 第 11 章


    使用 Xcode 6 进行用户界面开发


    当我刚开始进行 iOS 开发时，我与 Xcode 和 Interface Builder 的关系非常复杂。我可以进行布局，但它们无法按我想要的方式连接，或者我会遇到无法调试的奇怪崩溃。通过大量的努力（以及
    Storyboard 的发布），我的挫败感开始消退，iOS 用户界面开发开始变得更加自然。幸运的是，随着 Xcode 6 的发布，Apple 通过使构建和调试用户界面变得更加容易，持续改进了开发过程。


    在本章中，你将了解如何通过自适应用户界面来加速你的用户界面开发，如何将 Quick Look 实时视图调试添加到你的任何类中，以及如何使你自己的类与 Interface
    Builder 的属性检查器完全兼容。这些新增功能通过减少查看“当前”情况所需的步骤，以及通过与以前仅限于 Apple 创建的类的功能集成，帮助你更快地进行开发。


    **注意** 本章涵盖的主题仅在 Xcode 6 及更高版本（配合 iOS 8.0 SDK）中可用。


    ## 使用 Size Classes 构建自适应用户界面


    在 iOS 存在的头几年，它仅限于所有都配备 3.5 英寸屏幕的 iPhone。随后，设备交付选项迅速增长，包括了 10 英寸的 iPad、8 英寸的 iPad
    Mini、4 英寸的 Retina iPhone、4.7 英寸的 iPhone，以及现在（随着 iPhone 6 Plus 的推出），5.5 英寸的 iPhone。当开发者只需要支持两种屏幕尺寸时，他们倾向于使用
    `#ifdef` 语句和单独的 Interface Builder 文件来管理这两个用户界面。然而，当 Apple 开始推出具有更高像素密度（iPhone
    4）和新宽高比（iPhone 5）的设备时，这种方法就失效了。为了帮助应对不断变化的显示需求，Apple 在 Xcode 5 中引入了*自动布局*和*资源目录*。为了为未来的设备铺平道路，Apple
    在 Xcode 6 中引入了一种用于用户界面开发的设计方法，称为*自适应用户界面*。


    Apple 使用自适应用户界面的目标是让你构建一个能在所有设备上运行的 Storyboard。为了实现这个目标，Apple 向 iOS 8 引入了*Size
    Classes*的概念：一种超越“iPhone 模式”和“iPad 模式”来思考布局的新方式。iOS 中的 Size Classes 鼓励你根据视图可用的空间来概念化用户界面，而不是根据特定的目标设备（如手机或平板电脑）。为了确保平滑过渡，Apple
    将对此概念的支持构建到了 Interface Builder 的各个方面——包括新的约束类型、新的自动布局预览界面以及新的模拟器（*可调整大小的模拟器*）。为了帮助你以编程方式实现此功能，Apple
    还引入了 `UITraitCollection` 类，它将 Size Classes 和屏幕密度（例如，Retina）结合在一起，作为检测设备类型的 `UIInterfaceIdiom`
    宏的强大替代方案。


    本节重点介绍如何使用 Size Classes 构建自适应 Storyboard。你可以通过查看 Apple 的自适应用户界面门户网站（`https://developer.apple.com/design/adaptivity/`）来了解更多关于
    `UITraitCollection` 类的信息。


    如图 11-1 所示，如果你要比较 iOS 中用户界面的四种主要布局类型，结果将是 iPhone 竖屏模式、iPhone 横屏模式、iPad 竖屏模式和 iPad
    横屏模式。


    ![9781430250838_Fig11-01.jpg](img/9781430250838_Fig11-01.jpg)


    图 11-1. iOS 设备的主要布局

    '
- fmt: '在自适应用户界面中，尺寸通过`vertical`尺寸类别和`horizontal`尺寸类别来表示。这些尺寸类别的幅度由你针对的屏幕类别决定：`compact`用于手机或`regular`用于平板。


    如果你将屏幕重叠在一起，会注意到另一个有趣的模式，如图[11-2](#9781430250838_Ch11.xhtml#Fig2)所示。这些屏幕大致形成一个3×3的网格，宽度构成x轴，高度构成y轴。


    ![9781430250838_Fig11-02.jpg](images/9781430250838_Fig11-02.jpg)


    [图11-2](#9781430250838_Ch11.xhtml#_Fig2). 屏幕尺寸的并置


    尽管`compact`尺寸类别的属性很好地包含在`regular`尺寸类别内，但你可以看到还有扩展空间。因此，苹果提供了`any`尺寸类别，旨在作为用户界面的默认尺寸类别。你应该尝试将`any`尺寸类别中的项目缩小以适配`compact`尺寸类别，或者增大其尺寸/内边距以适配`regular`尺寸类别。


    通过将它们放入3×3网格，按方向和增大尺寸排列，可以很好地可视化尺寸类别的可能组合，如图[11-3](#9781430250838_Ch11.xhtml#Fig3)所示。


    ![9781430250838_Fig11-03.jpg](images/9781430250838_Fig11-03.jpg)


    [图11-3](#9781430250838_Ch11.xhtml#_Fig3). 尺寸类别的3×3网格


    围绕与你目标设备对应的组合框画一条线，你就会了解需要使用的尺寸类别以优化布局。对于横屏模式的iPad，你会使用`regular horizontal`尺寸类别和`any
    vertical`尺寸类别，如图[11-4](#9781430250838_Ch11.xhtml#Fig4)所示。


    ![9781430250838_Fig11-04.jpg](images/9781430250838_Fig11-04.jpg)


    [图11-4](#9781430250838_Ch11.xhtml#_Fig4). 横屏模式iPad的尺寸类别组合


    Interface Builder允许你通过属性检查器中的“尺寸类别”选项（可启用或禁用尺寸类别）和新的自动布局预览切换视图（可在故事板的特定尺寸类别版本之间切换），无缝地将尺寸类别集成到故事板中。


    你可以通过选择文件检查器（Interface Builder最右侧窗格的第一个选项卡）来切换故事板的尺寸类别设置，如图[11-5](#9781430250838_Ch11.xhtml#Fig5)所示。如果你在Xcode
    6或更高版本中创建项目，故事板已经选中了“使用尺寸类别”复选框；否则，你需要手动选择它。


    ![9781430250838_Fig11-05.jpg](images/9781430250838_Fig11-05.jpg)


    [图11-5](#9781430250838_Ch11.xhtml#_Fig5). 为故事板启用尺寸类别


    第一次在故事板中使用尺寸类别时，结果会相当令人震惊。如图[11-6](#9781430250838_Ch11.xhtml#Fig6)所示，默认的故事板预览将是方形的，对应于`any`×`any`的尺寸类别组合。故事板所选组合的名称显示在Interface
    Builder底部窗格的中心，在图[11-6](#9781430250838_Ch11.xhtml#Fig6)中以红色标出。


    ![9781430250838_Fig11-06.jpg](images/9781430250838_Fig11-06.jpg)


    [图11-6](#9781430250838_Ch11.xhtml#_Fig6). 默认故事板和尺寸类别组合


    点击此标签会弹出一个尺寸选择器，位于弹出窗口内，如图[11-7](#9781430250838_Ch11.xhtml#Fig7)所示。此选择器使用与图[11-1](#9781430250838_Ch11.xhtml#Tab1)相同的尺寸类别组合表。使用相同的“追踪”组合逻辑，为你的设备选择适当的组合。


    ![9781430250838_Fig11-07.jpg](images/9781430250838_Fig11-07.jpg)


    [图11-7](#9781430250838_Ch11.xhtml#_Fig7). 故事板布局选择器


    在Xcode 6中，你不再被迫为每个版本的界面使用相同的自动布局约束集。切换布局后，所有约束和位置更改将仅应用于该布局。利用这一点，创建最适合你设备尺寸的布局。


    如果你计划使用自动布局约束来定位项目（例如将项目保持在屏幕中央），请使用`any`×`any`布局作为基础，并在其他布局（例如`compact`×`regular`）中覆盖你的选择。


    ## 使用Quick Look进行运行时预览


    自第5版以来，苹果在Xcode中提供了一个名为Quick Look的功能。此功能允许你在调试期间将鼠标悬停在对象上以查看内容的预览，如图[11-8](#9781430250838_Ch11.xhtml#Fig8)所示。为此，你需要使用一个与Quick
    Look兼容的对象。在Xcode 6之前，苹果提供了一组有限的类（例如`UIView`、`NSString`、`CLLocation`）；然而，从Xcode
    6开始，你可以通过实现`[NSObject debugQuickLookObject]`方法将Quick Look扩展到任何类。


    ![9781430250838_Fig11-08.jpg](images/9781430250838_Fig11-08.jpg)


    [图11-8](#9781430250838_Ch11.xhtml#_Fig8). 对象的Quick Look详细信息


    [表11-1](#9781430250838_Ch11.xhtml#Tab1)列出了默认的Quick Look兼容类及其输出。在构建Quick Look实现时，你需要使用这些类之一来显示调试信息。


    [表11-1](#9781430250838_Ch11.xhtml#_Tab1). Quick Look兼容类


    | 类 | 预览类型 |

    | --- | --- |

    | `UIView` | 视图及其所有子视图的快照 |

    | `CLLocation` | 显示`CLLocation`对象元数据的地图和图例 |

    | `NSString` | 字符串的纯文本打印输出 |

    | `NSAttributedString` | 字符串的打印输出，包括所有格式（例如颜色或粗体） |

    | `UIColor` | 包含所选颜色的色板 |

    | `UIImage` | 图像的预览 |

    | `NSURL` | 指定URL处内容的预览 |

    | `NSData` | 数据二进制内容的打印输出 |


    要访问Quick Look，必须使用调试会话。在命中断点且执行暂停后，你可以通过将鼠标悬停在当前作用域（通常是调试器暂停的方法）中的任何兼容对象上来调出Quick
    Look面板。单击眼形按钮（如图[11-9](#9781430250838_Ch11.xhtml#Fig9)所示）会调出Quick Look视图，其中包含对象的更多详细信息。


    ![9781430250838_Fig11-09.jpg](images/9781430250838_Fig11-09.jpg)


    [图11-9](#9781430250838_Ch11.xhtml#_Fig9). 显示Quick Look详细信息窗格


    要在应用程序中启用Quick Look，你需要在自定义类中实现`[NSObject debugQuickLookObject]`方法。回顾模型-视图-控制器设计模式，大多数需要实现Quick
    Look的类将是*模型*（表示数据）或*视图*（表示元素的视觉布局）。


    为了帮助说明这个主题，我创建了一个名为`CustomPhoto`的模型类，它表示一个图像及其关联的元数据信息，类似于`ALAsset`类。你可以在源代码包的[第11章](#9781430250838_Ch11.xhtml)文件夹下的QuickLookSample项目中找到此示例代码。[列表11-1](#9781430250838_Ch11.xhtml#list1)显示了`CustomPhoto`类的头文件。


    [***列表11-1***](#9781430250838_Ch11.xhtml#_list1). CustomPhoto类的头文件


    ```

    #import <Foundation/Foundation.h>

    #import <UIKit/UIKit.h>


    @interface CustomPhoto : NSObject


    @property (nonatomic, strong) UIImage *image;

    @property (nonatomic, strong) NSString *title;

    @property (nonatomic, strong) NSString *location;


    @end

    ```'
  raw: 'In adaptive user interfaces, dimensions are expressed in terms of a `vertical`
    size class and a `horizontal` size class. The magnitude of these size classes
    is determined by the class of screen you are targeting: `compact` for phones or
    `regular` for tablets.


    If you were to juxtapose the screens on top of one another, you would notice another
    interesting pattern, shown in Figure [11-2](#9781430250838_Ch11.xhtml#Fig2). The
    screens form an approximate 3×3 grid, with the widths forming the x axis, and
    the heights forming the y axis.


    ![9781430250838_Fig11-02.jpg](images/9781430250838_Fig11-02.jpg)


    [Figure 11-2](#9781430250838_Ch11.xhtml#_Fig2). Juxtaposition of screen sizes


    Although the attributes for the `compact` size classes sit nicely inside those
    of the `regular` size classes, you can see there is room to grow. For this reason,
    Apple provides the `any` size class, which is meant to serve as the default size
    class for your user interface. You should try to shrink items from an `any` size
    class to fit inside a `compact` size class, or increase their size/padding to
    make them fit in a `regular` size class.


    A good way to visualize the possible combinations of size classes is by putting
    them in a 3×3 grid, arranging them by orientation and increasing size, as shown
    in Figure [11-3](#9781430250838_Ch11.xhtml#Fig3).


    ![9781430250838_Fig11-03.jpg](images/9781430250838_Fig11-03.jpg)


    [Figure 11-3](#9781430250838_Ch11.xhtml#_Fig3). 3×3 grid of size classes


    Tracing a line around the combination of boxes that correspond to the device you
    are targeting will give you an idea of the size classes you need to use to optimize
    your layout. For an iPad in landscape mode, you would use a `regular horizontal`
    size class, and an `any vertical` size class, as shown in Figure [11-4](#9781430250838_Ch11.xhtml#Fig4).


    ![9781430250838_Fig11-04.jpg](images/9781430250838_Fig11-04.jpg)


    [Figure 11-4](#9781430250838_Ch11.xhtml#_Fig4). Size class combination for an
    iPad in landscape mode


    Interface Builder allows you to seamlessly integrate size classes into your storyboards
    by giving you both a Size Class option in the Attributes Inspector, which lets
    you enable or disable size classes, and a new Auto-Layout preview toggle view,
    which allows you to switch between size class–specific versions of your storyboard.


    You can toggle size class settings for your storyboard by selecting the File Inspector
    (the first tab in the rightmost pane of Interface Builder), as shown in [Figure
    11-5](#9781430250838_Ch11.xhtml#Fig5). If you created your project in Xcode 6
    or greater, your storyboard will already have the Use Size Classes check box selected;
    otherwise, you will need to select it manually.


    ![9781430250838_Fig11-05.jpg](images/9781430250838_Fig11-05.jpg)


    [Figure 11-5](#9781430250838_Ch11.xhtml#_Fig5). Enabling size classes for a storyboard


    The first time you use size classes in your storyboard, the result will be quite
    jarring. As shown in [Figure 11-6](#9781430250838_Ch11.xhtml#Fig6), your default
    storyboard preview will be square, corresponding to the `any`×`any` combination
    of size classes. The name of the selected combination for your storyboard is displayed
    in the center of the bottom pane of Interface Builder, outlined in red in [Figure
    11-6](#9781430250838_Ch11.xhtml#Fig6).


    ![9781430250838_Fig11-06.jpg](images/9781430250838_Fig11-06.jpg)


    [Figure 11-6](#9781430250838_Ch11.xhtml#_Fig6). Default storyboard and size class
    combination


    Clicking this label brings up a dimension picker, inside a popover, as shown in
    [Figure 11-7](#9781430250838_Ch11.xhtml#Fig7). This picker uses the same table
    of size-class combinations as in [Figure 11-1](#9781430250838_Ch11.xhtml#Tab1).
    Use the same logic of “tracing” your combination to select the appropriate combination
    for your device.


    ![9781430250838_Fig11-07.jpg](images/9781430250838_Fig11-07.jpg)


    [Figure 11-7](#9781430250838_Ch11.xhtml#_Fig7). Storyboard layout picker


    In Xcode 6, you are no longer forced to use the same set of auto-layout constraints
    for every version of your user interface. After switching layouts, all your constraint
    and positioning changes will apply to that layout only. Use this to your advantage
    by creating layouts that are most appropriate for your device size.


    If you plan on using auto-layout constraints to position your items (such as keeping
    an item in the center of the screen), use the `any`×`any` layout as your base,
    and override your selections in other layouts (such as `compact`×`regular`).


    Using Quick Look for Runtime Previews


    Since version 5, Apple has provided a feature in Xcode called Quick Look. This
    feature allows you to hover over an object during debugging to see a preview of
    the contents, as shown in [Figure 11-8](#9781430250838_Ch11.xhtml#Fig8). To do
    this, you need to use a Quick Look–compatible object. Prior to Xcode 6, Apple
    provided a limited set of classes (for example, `UIView`, `NSString`, `CLLocation`);
    however, starting with Xcode 6, you can extend Quick Look to any class by implementing
    the `[NSObject debugQuickLookObject]` method.


    ![9781430250838_Fig11-08.jpg](images/9781430250838_Fig11-08.jpg)


    [Figure 11-8](#9781430250838_Ch11.xhtml#_Fig8). Quick Look details for an object


    [Table 11-1](#9781430250838_Ch11.xhtml#Tab1) lists the default Quick Look–compatible
    classes and their output. When you are building your Quick Look implementation,
    you will need to use one of these classes to display your debugging information.


    [Table 11-1](#9781430250838_Ch11.xhtml#_Tab1). Quick Look–Compatible Classes


    | Class | Preview Type |

    | --- | --- |

    | `UIView` | A snapshot of your view and all its subviews |

    | `CLLocation` | A map and legend showing the metadata for your `CLLocation` object
    |

    | `NSString` | A plain-text printout of your string |

    | `NSAttributedString` | A printout of your string, including all formatting (such
    as colors or bold) |

    | `UIColor` | A swatch containing the selected color |

    | `UIImage` | A preview of your image |

    | `NSURL` | A preview of the content at your specified URL |

    | `NSData` | A printout of the binary contents of your data |


    To access Quick Look, you must use a debugging session. After you have hit a breakpoint
    and execution is paused, you can bring up the Quick Look panel by hovering over
    any compatible object in your current scope (generally, the method that the debugger
    is paused in). Clicking the eye button, shown in [Figure 11-9](#9781430250838_Ch11.xhtml#Fig9),
    brings up the Quick Look view with additional details for your object.


    ![9781430250838_Fig11-09.jpg](images/9781430250838_Fig11-09.jpg)


    [Figure 11-9](#9781430250838_Ch11.xhtml#_Fig9). Exposing the Quick Look Details
    pane


    To enable Quick Look in your applications, you need to implement the `[NSObject
    debugQuickLookObject]` method in your custom classes. Referring back to the Model
    View Controller design pattern, most of the classes for which you will need to
    implement Quick Look will be either *models* (representing data) or *views* (representing
    the visual layout of elements).


    To help illustrate the subject, I have created a model class called `CustomPhoto`
    that represents an image and its associated metadata information, similar to the
    `ALAsset` class. You can find this sample code in the [Chapter 11](#9781430250838_Ch11.xhtml)
    folder of the source code bundle, under the QuickLookSample project. [Listing
    11-1](#9781430250838_Ch11.xhtml#list1) shows the header file for the `CustomPhoto`
    class.


    [***Listing 11-1***](#9781430250838_Ch11.xhtml#_list1). Header File for CustomPhoto
    Class


    ```

    #import <Foundation/Foundation.h>

    #import <UIKit/UIKit.h>


    @interface CustomPhoto : NSObject


    @property (nonatomic, strong) UIImage *image;

    @property (nonatomic, strong) NSString *title;

    @property (nonatomic, strong) NSString *location;


    @end

    ```'
  trans: '在自适应用户界面中，尺寸通过`vertical`尺寸类别和`horizontal`尺寸类别来表示。这些尺寸类别的幅度由你针对的屏幕类别决定：`compact`用于手机或`regular`用于平板。


    如果你将屏幕重叠在一起，会注意到另一个有趣的模式，如图 11-2 所示。这些屏幕大致形成一个 3×3 的网格，宽度构成 x 轴，高度构成 y 轴。


    ![9781430250838_Fig11-02.jpg](img/9781430250838_Fig11-02.jpg)


    图 11-2. 屏幕尺寸的并置


    尽管`compact`尺寸类别的属性很好地包含在`regular`尺寸类别内，但你可以看到还有扩展空间。因此，苹果提供了`any`尺寸类别，旨在作为用户界面的默认尺寸类别。你应该尝试将`any`尺寸类别中的项目缩小以适配`compact`尺寸类别，或者增大其尺寸/内边距以适配`regular`尺寸类别。


    通过将它们放入 3×3 网格，按方向和增大尺寸排列，可以很好地可视化尺寸类别的可能组合，如图 11-3 所示。


    ![9781430250838_Fig11-03.jpg](img/9781430250838_Fig11-03.jpg)


    图 11-3. 尺寸类别的 3×3 网格


    围绕与你目标设备对应的组合框画一条线，你就会了解需要使用的尺寸类别以优化布局。对于横屏模式的 iPad，你会使用`regular horizontal`尺寸类别和`any
    vertical`尺寸类别，如图 11-4 所示。


    ![9781430250838_Fig11-04.jpg](img/9781430250838_Fig11-04.jpg)


    图 11-4. 横屏模式 iPad 的尺寸类别组合


    Interface Builder 允许你通过属性检查器中的“尺寸类别”选项（可启用或禁用尺寸类别）和新的自动布局预览切换视图（可在故事板的特定尺寸类别版本之间切换），无缝地将尺寸类别集成到故事板中。


    你可以通过选择文件检查器（Interface Builder 最右侧窗格的第一个选项卡）来切换故事板的尺寸类别设置，如图 11-5 所示。如果你在 Xcode
    6 或更高版本中创建项目，故事板已经选中了“使用尺寸类别”复选框；否则，你需要手动选择它。


    ![9781430250838_Fig11-05.jpg](img/9781430250838_Fig11-05.jpg)


    图 11-5. 为故事板启用尺寸类别


    第一次在故事板中使用尺寸类别时，结果会相当令人震惊。如图 11-6 所示，默认的故事板预览将是方形的，对应于`any`×`any`的尺寸类别组合。故事板所选组合的名称显示在
    Interface Builder 底部窗格的中心，在图 11-6 中以红色标出。


    ![9781430250838_Fig11-06.jpg](img/9781430250838_Fig11-06.jpg)


    图 11-6. 默认故事板和尺寸类别组合


    点击此标签会弹出一个尺寸选择器，位于弹出窗口内，如图 11-7 所示。此选择器使用与图 11-1 相同的尺寸类别组合表。使用相同的“追踪”组合逻辑，为你的设备选择适当的组合。


    ![9781430250838_Fig11-07.jpg](img/9781430250838_Fig11-07.jpg)


    图 11-7. 故事板布局选择器


    在 Xcode 6 中，你不再被迫为每个版本的界面使用相同的自动布局约束集。切换布局后，所有约束和位置更改将仅应用于该布局。利用这一点，创建最适合你设备尺寸的布局。


    如果你计划使用自动布局约束来定位项目（例如将项目保持在屏幕中央），请使用`any`×`any`布局作为基础，并在其他布局（例如`compact`×`regular`）中覆盖你的选择。


    ## 使用 Quick Look 进行运行时预览


    自第 5 版以来，苹果在 Xcode 中提供了一个名为 Quick Look 的功能。此功能允许你在调试期间将鼠标悬停在对象上以查看内容的预览，如图 11-8
    所示。为此，你需要使用一个与 Quick Look 兼容的对象。在 Xcode 6 之前，苹果提供了一组有限的类（例如`UIView`、`NSString`、`CLLocation`）；然而，从
    Xcode 6 开始，你可以通过实现`[NSObject debugQuickLookObject]`方法将 Quick Look 扩展到任何类。


    ![9781430250838_Fig11-08.jpg](img/9781430250838_Fig11-08.jpg)


    图 11-8. 对象的 Quick Look 详细信息


    表 11-1 列出了默认的 Quick Look 兼容类及其输出。在构建 Quick Look 实现时，你需要使用这些类之一来显示调试信息。


    表 11-1. Quick Look 兼容类


    | 类 | 预览类型 |

    | --- | --- |

    | `UIView` | 视图及其所有子视图的快照 |

    | `CLLocation` | 显示`CLLocation`对象元数据的地图和图例 |

    | `NSString` | 字符串的纯文本打印输出 |

    | `NSAttributedString` | 字符串的打印输出，包括所有格式（例如颜色或粗体） |

    | `UIColor` | 包含所选颜色的色板 |

    | `UIImage` | 图像的预览 |

    | `NSURL` | 指定 URL 处内容的预览 |

    | `NSData` | 数据二进制内容的打印输出 |


    要访问 Quick Look，必须使用调试会话。在命中断点且执行暂停后，你可以通过将鼠标悬停在当前作用域（通常是调试器暂停的方法）中的任何兼容对象上来调出
    Quick Look 面板。单击眼形按钮（如图 11-9 所示）会调出 Quick Look 视图，其中包含对象的更多详细信息。


    ![9781430250838_Fig11-09.jpg](img/9781430250838_Fig11-09.jpg)


    图 11-9. 显示 Quick Look 详细信息窗格


    要在应用程序中启用 Quick Look，你需要在自定义类中实现`[NSObject debugQuickLookObject]`方法。回顾模型-视图-控制器设计模式，大多数需要实现
    Quick Look 的类将是*模型*（表示数据）或*视图*（表示元素的视觉布局）。


    为了帮助说明这个主题，我创建了一个名为`CustomPhoto`的模型类，它表示一个图像及其关联的元数据信息，类似于`ALAsset`类。你可以在源代码包的第
    11 章文件夹下的 QuickLookSample 项目中找到此示例代码。列表 11-1 显示了`CustomPhoto`类的头文件。


    ***列表 11-1***. CustomPhoto 类的头文件


    ```

    #import <Foundation/Foundation.h>

    #import <UIKit/UIKit.h>


    @interface CustomPhoto : NSObject


    @property (nonatomic, strong) UIImage *image;

    @property (nonatomic, strong) NSString *title;

    @property (nonatomic, strong) NSString *location;


    @end

    ```'
- fmt: "It is natural to assume that a developer will want to be able to see a preview\
    \ of the image and inspect the metadata properties when debugging a`CustomPhoto`\
    \ object. Because you can return only one object from the `[NSObject debugQuickLookObject]`\
    \ method, you need to pick a class that can hold the output from all the objects.\n\
    \nIn the `QuickLookSample` project, I chose to create a`UIView`. Quick Look can\
    \ paint a view fully in its preview pane, so adding subviews to a container`UIView`\
    \ is a great way to display multiple items at once. As shown in [Figure 11-10](#9781430250838_Ch11.xhtml#Fig10),\
    \ for this example, I wanted to display the image in a`UIImageView` and the metadata\
    \ attributes in `UILabel`s.\n\n![9781430250838_Fig11-10.jpg](images/9781430250838_Fig11-10.jpg)\n\
    \n[Figure 11-10](#9781430250838_Ch11.xhtml#_Fig10). Mock-up of Quick Look output\n\
    \nThe easiest way to build your`UIView` for Quick Look is to create and position\
    \ all your subviews programmatically. Quick Look does not accept`UIViewController`\
    \ subclasses as input, so it is not efficient to use a storyboard or XIB file\
    \ to lay out your user interface. While it is more annoying to position your subviews\
    \ manually, here are a couple of tricks about the`CGRect` that can help you build\
    \ your subview faster:\n\n*   Use neighboring subviews as your reference for positioning.\
    \ For instance, to position two elements at the same y position, use the`CGRectMinY()`\
    \ convenience method on the `frame` of the first view.\n*   When creating`UILabel`\
    \ objects, you can change the font by using the `font` property. The `[UIFont\
    \ systemFontWithSize:]` method allows you to specify a pixel height for a font,\
    \ which can serve as a helpful guide when you are trying to determine the height\
    \ of your label. For instance, a 20-point font would be well served by 5 pixels\
    \ of padding on the top and bottom——meaning you should specify a height of 30\
    \ pixels.\n*   When creating a`UILabel`, the default clipping behavior for text\
    \ is to truncate the middle characters. You can make the text shrink to fit the`UILabel`\
    \ by setting the `adjustsFontSizeToFitWidth` property to `YES`.\n\n[Listing 11-2](#9781430250838_Ch11.xhtml#list2)\
    \ shows the code to create the`UIView`. In addition to the view-positioning code,\
    \ you will see that I set a default value for each property. Because you are building\
    \ a debugging view, you need to make it very clear to the user when the input\
    \ is not set or invalid.\n\n***Listing 11-2***. Enabling Quick Look for the `CustomPhoto`\
    \ Class\n\n```\n-(id)debugQuickLookObject {\n    UIView *quickLookView = [[UIView\
    \ alloc] initWithFrame:CGRectMake(\n        0, 0, 400, 400)];\n\nUIImageView *imageView\
    \ = [[UIImageView alloc]\n        initWithFrame:quickLookView.frame];\n\nimageView.image\
    \ = (self.image == nil) ?\n        [UIImage imageNamed:@\"placeholder.jpg\"]:\n\
    \        imageView.image = self.image;\n\nCGFloat originX = CGRectGetMinX(quickLookView.frame)\
    \ + 10;\n    CGFloat originY = CGRectGetMaxY(quickLookView.frame) - 40;\n    CGFloat\
    \ width = quickLookView.frame.size.width;\n\nCGRect titleLabelFrame = CGRectMake(originX,\
    \ originY, width, 20);\n    CGRect locationLabelFrame = CGRectMake(originX, originY\
    \ + 20,\n        width, 20);\n\nUILabel *titleLabel = [[UILabel alloc] initWithFrame:titleLabelFrame];\n\
    \    UILabel *locationLabel = [[UILabel alloc]\n        initWithFrame:locationLabelFrame];\n\
    \ntitleLabel.text = (self.title == nil) ? @\"No title\" : self.title;\n    locationLabel.text\
    \ = (self.location == nil) ? @\"No location\" :\n        self.location;\n\n[quickLookView\
    \ addSubview:imageView];\n    [quickLookView addSubview:titleLabel];\n    [quickLookView\
    \ addSubview:locationLabel];\n\nreturn quickLookView;\n}\n```\n\nThe output from\
    \ the preceding method should look like the example in [Figure 11-11](#9781430250838_Ch11.xhtml#Fig11).\n\
    \n![9781430250838_Fig11-11.jpg](images/9781430250838_Fig11-11.jpg)\n\n[Figure\
    \ 11-11](#9781430250838_Ch11.xhtml#_Fig11). Quick Look output for `CustomPhoto`\
    \ class"
  raw: 'It is natural to assume that a developer will want to be able to see a preview
    of the image and inspect the metadata properties when debugging a `CustomPhoto`
    object. Because you can return only one object from the `[NSObject debugQuickLookObject]`
    method, you need to pick a class that can hold the output from all the objects.


    In the QuickLookSample project, I chose to create a `UIView`. Quick Look can paint
    a view fully in its preview pane, so adding subviews to a container `UIView` is
    a great way to display multiple items at once. As shown in [Figure 11-10](#9781430250838_Ch11.xhtml#Fig10),
    for this example, I wanted to display the image in a `UIImageView` and the metadata
    attributes in `UILabel`s.


    ![9781430250838_Fig11-10.jpg](images/9781430250838_Fig11-10.jpg)


    [Figure 11-10](#9781430250838_Ch11.xhtml#_Fig10). Mock-up of Quick Look output


    The easiest way to build your `UIView` for Quick Look is to create and position
    all your subviews programmatically. Quick Look does not accept `UIViewController`
    subclasses as input, so it is not efficient to use a storyboard or  XIB file to
    lay out your user interface. While it is more annoying to position your subviews
    manually, here are a couple of tricks about the `CGRect` that can help you build
    your subview faster:


    *   Use neighboring subviews as your reference for positioning. For instance,
    to position two elements at the same y position, use the `CGRectMinY()` convenience
    method on the `frame` of the first view.

    *   When creating `UILabel` objects, you can change the font by using the `font`
    property. The `[UIFont systemFontWithSize:]` method allows you to specify a pixel
    height for a font, which can serve as a helpful guide when you are trying to determine
    the height of your label. For instance, a 20-point font would be well served by
    5 pixels of padding on the top and bottom—meaning you should specify a height
    of 30 pixels.

    *   When creating a `UILabel`, the default clipping behavior for text is to truncate
    the middle characters. You can make the text shrink to fit the `UILabel` by setting
    the `adjustsFontSizeToFitWidth` property to `YES`.


    [Listing 11-2](#9781430250838_Ch11.xhtml#list2) shows the code to create the `UIView`.
    In addition to the view-positioning code, you will see that I set a default value
    for each property. Because you are building a debugging view, you need to make
    it very clear to the user when the input is not set or invalid.


    [***Listing 11-2***](#9781430250838_Ch11.xhtml#_list2). Enabling Quick Look for
    the CustomPhoto Class


    ```

    -(id)debugQuickLookObject {

        UIView *quickLookView = [[UIView alloc] initWithFrame:CGRectMake(

            0, 0, 400, 400)];


    UIImageView *imageView = [[UIImageView alloc]

            initWithFrame:quickLookView.frame];


    imageView.image = (self.image == nil) ?

            [UIImage imageNamed:@"placeholder.jpg"]:

            imageView.image = self.image;


    CGFloat originX = CGRectGetMinX(quickLookView.frame) + 10;

        CGFloat originY = CGRectGetMaxY(quickLookView.frame) - 40;

        CGFloat width = quickLookView.frame.size.width;


    CGRect titleLabelFrame = CGRectMake(originX, originY, width, 20);

        CGRect locationLabelFrame = CGRectMake(originX, originY + 20,

            width, 20);


    UILabel *titleLabel = [[UILabel alloc] initWithFrame:titleLabelFrame];

        UILabel *locationLabel = [[UILabel alloc]

            initWithFrame:locationLabelFrame];


    titleLabel.text = (self.title == nil) ? @"No title" : self.title;

        locationLabel.text = (self.location == nil) ? @"No location" :

            self.location;


    [quickLookView addSubview:imageView];

        [quickLookView addSubview:titleLabel];

        [quickLookView addSubview:locationLabel];


    return quickLookView;

    }

    ```


    The output from the preceding method should look like the example in [Figure 11-11](#9781430250838_Ch11.xhtml#Fig11).


    ![9781430250838_Fig11-11.jpg](images/9781430250838_Fig11-11.jpg)


    [Figure 11-11](#9781430250838_Ch11.xhtml#_Fig11). Quick Look output for CustomPhoto
    class'
  trans: "\n很自然地，开发者会希望在调试`CustomPhoto`对象时，能够预览图片并检查元数据属性。由于只能从`[NSObject debugQuickLookObject]`方法返回一个对象，因此你需要选择一个能够容纳所有对象输出的类。\n\
    \n在`QuickLookSample`项目中，我选择创建一个`UIView`。Quick Look 可以在其预览面板中完整地绘制一个视图，因此向容器`UIView`添加子视图是一种同时显示多个项目的好方法。如图\
    \ 11-10 所示，在本例中，我打算在`UIImageView`中显示图片，并在`UILabel`中显示元数据属性。\n\n![9781430250838_Fig11-10.jpg](img/9781430250838_Fig11-10.jpg)\n\
    \n图 11-10. Quick Look 输出的模拟示意图\n\n为 Quick Look 构建`UIView`最简单的方法是以编程方式创建并定位所有子视图。Quick\
    \ Look 不接受`UIViewController`子类作为输入，因此使用 Storyboard 或 XIB 文件来布局用户界面并不高效。虽然手动定位子视图比较麻烦，但这里有一些关于`CGRect`的技巧，可以帮助你更快地构建子视图：\n\
    \n*   使用相邻的子视图作为定位参考。例如，要将两个元素放在相同的 y 坐标位置，可以在第一个视图的 `frame` 上使用`CGRectMinY()`便捷方法。\n\
    *   创建`UILabel`对象时，可以通过 `font` 属性更改字体。`[UIFont systemFontWithSize:]`方法允许你为字体指定像素高度，这在尝试确定标签高度时可以作为有用的参考。例如，一个\
    \ 20 磅的字体，上下各留 5 像素的内边距即可——这意味着你应该指定 30 像素的高度。\n*   创建`UILabel`时，文本的默认裁剪行为是截断中间字符。你可以通过将\
    \ `adjustsFontSizeToFitWidth` 属性设置为 `YES`，让文本收缩以适合`UILabel`。\n\n代码清单 11-2 展示了创建`UIView`的代码。除了视图定位代码之外，你还会看到我为每个属性设置了默认值。因为你正在构建一个调试视图，所以当输入未设置或无效时，需要非常清楚地向用户表明。\n\
    \n***代码清单 11-2***. 为 `CustomPhoto` 类启用 Quick Look\n\n```\n-(id)debugQuickLookObject\
    \ {\n    UIView *quickLookView = [[UIView alloc] initWithFrame:CGRectMake(\n \
    \       0, 0, 400, 400)];\n\nUIImageView *imageView = [[UIImageView alloc]\n \
    \       initWithFrame:quickLookView.frame];\n\nimageView.image = (self.image ==\
    \ nil) ?\n        [UIImage imageNamed:@\"placeholder.jpg\"]:\n        imageView.image\
    \ = self.image;\n\nCGFloat originX = CGRectGetMinX(quickLookView.frame) + 10;\n\
    \    CGFloat originY = CGRectGetMaxY(quickLookView.frame) - 40;\n    CGFloat width\
    \ = quickLookView.frame.size.width;\n\nCGRect titleLabelFrame = CGRectMake(originX,\
    \ originY, width, 20);\n    CGRect locationLabelFrame = CGRectMake(originX, originY\
    \ + 20,\n        width, 20);\n\nUILabel *titleLabel = [[UILabel alloc] initWithFrame:titleLabelFrame];\n\
    \    UILabel *locationLabel = [[UILabel alloc]\n        initWithFrame:locationLabelFrame];\n\
    \ntitleLabel.text = (self.title == nil) ? @\"No title\" : self.title;\n    locationLabel.text\
    \ = (self.location == nil) ? @\"No location\" :\n        self.location;\n\n[quickLookView\
    \ addSubview:imageView];\n    [quickLookView addSubview:titleLabel];\n    [quickLookView\
    \ addSubview:locationLabel];\n\nreturn quickLookView;\n}\n```\n\n上述方法的输出应类似于图\
    \ 11-11 中的示例。\n\n![9781430250838_Fig11-11.jpg](img/9781430250838_Fig11-11.jpg)\n\
    \n图 11-11. `CustomPhoto`类的 Quick Look 输出\n"
- fmt: "作为`UIView`的替代方案，你可以使用`NSAttributedString`对象来构建输出。富文本字符串通过允许你指定格式（如颜色和粗体文本）以及其他输入方法，扩展了`NSString`类。例如，你可以直接使用`NSAttributedString`渲染HTML。\n\
    \n## 向类中添加Interface Builder预览\n\n延续改进用户界面可视化调试的主题，Xcode 6现在允许你在Interface Builder中预览和配置你自己的`UIView`子类。此外，Interface\
    \ Builder现在提供了一个名为*Debug Selected View*的功能，允许你在不运行应用程序的情况下调试视图。\n\n与Quick Look一样，Apple历史上在其自己的`UIView`子类（如`UILabel`和`UIButton`）中支持Interface\
    \ Builder内的预览和配置。参考[Figure 11-12](#9781430250838_Ch11.xhtml#Fig12)，你可以看到`UIButton`会改变其外观以反映用户在属性检查器中输入的属性更改。通过Xcode\
    \ 6，你现在可以通过添加`IB_DESIGNABLE`属性，为你的`UIView`子类启用相同的功能。\n\n![9781430250838_Fig11-12.jpg](images/9781430250838_Fig11-12.jpg)\n\
    \n[Figure 11-12](#9781430250838_Ch11.xhtml#_Fig12). 属性检查器和UIButton的预览\n\n为了演示此功能，你将创建一个单视图应用程序，该应用程序显示`CustomPhoto`类的内容，并在名为`CustomPhotoView`的`UIView`子类中展示。你可以在源代码包的[Chapter\
    \ 11](#9781430250838_Ch11.xhtml)文件夹中找到这个`IBSample`项目的代码。\n\n对于`CustomPhotoView`类，你将显示一个`UIImage`和两个`UILabel`对象，它们代表`CustomPhoto`中的元数据字段，如[Figure\
    \ 11-13](#9781430250838_Ch11.xhtml#Fig13)所示。为了帮助调试，你希望让开发人员在Interface Builder中看到这些子视图的实时预览。\n\
    \n![9781430250838_Fig11-13.jpg](images/9781430250838_Fig11-13.jpg)\n\n[Figure\
    \ 11-13](#9781430250838_Ch11.xhtml#_Fig13). `CustomPhotoView`类的模型图\n\n首先，创建`CustomPhotoView`类作为`UIView`的子视图。添加属性以表示模型图中的子视图，如[代码清单11-3](#9781430250838_Ch11.xhtml#list3)所示。\n\
    \n[***代码清单11-3***](#9781430250838_Ch11.xhtml#_list3). `CustomPhotoView`类的头文件\n\
    \n```\n#import <UIKit/UIKit.h>\n\nIB_DESIGNABLE\n\n@interface CustomPhotoView\
    \ : UIView\n\n@property (nonatomic) UILabel *titleLabel;\n@property (nonatomic)\
    \ UILabel *locationLabel;\n@property (nonatomic) UIImageView *imageView;\n\n@end\n\
    ```\n\n要为你的视图启用Interface Builder预览，请将`IB_DESIGNABLE`属性添加到类的`@interface`声明之前的行。Objective-C中的*attribute*是一种编译器指令（类似于*macro*），它允许你将预定义的行为附加到变量声明上。定义实例变量时使用的`nonatomic`属性指示编译器自动为该对象创建getter和setter方法。修改后的头文件应类似于[代码清单11-4](#9781430250838_Ch11.xhtml#list4)中的示例。\n\
    \n[***代码清单11-4***](#9781430250838_Ch11.xhtml#_list4). `CustomPhotoView`类的`IB_DESIGNABLE`兼容头文件\n\
    \n```\n#import <UIKit/UIKit.h>\n\nIB_DESIGNABLE\n\n@interface CustomPhotoView\
    \ : UIView\n\n@property (nonatomic) UILabel *titleLabel;\n@property (nonatomic)\
    \ UILabel *locationLabel;\n@property (nonatomic) UIImageView *imageView;\n\n@end\n\
    ```\n\n要可视化`CustomPhotoView`类，你需要将其添加到你的故事板中。选择项目的`Main.storyboard`文件，并将一个视图对象拖到视图控制器场景上。使用身份检查器（Interface\
    \ Builder中的第三个选项卡）将该视图关联到`CustomPhotoView`类，如[Figure 11-14](#9781430250838_Ch11.xhtml#Fig14)所示。为了更容易看到视图，请使用属性检查器为其赋予一个非白色的背景颜色。\n\
    \n![9781430250838_Fig11-14.jpg](images/9781430250838_Fig11-14.jpg)\n\n[Figure\
    \ 11-14](#9781430250838_Ch11.xhtml#_Fig14). 在身份检查器中设置类名称\n\n为了充分利用Interface Builder预览，你需要以编程方式布局你的视图（类似于Quick\
    \ Look）。通常，要以编程方式布局视图，你会使用`[UIView initWithFrame:]`构造方法。不幸的是，由于预览本质上是动态的，并且核心功能基于子视图构建，因此你需要使用一个每当视图被指示重新加载其子视图时都会调用的方法。由于这种设计限制，最佳的方法是使用`[UIView\
    \ layoutSubviews]`。\n\n**注意**：如果你有任何用于在`UIView`中绘制元素的代码（例如添加边框），请将其放在`[UIView\
    \ drawRect]`方法中。\n\n在你的`[UIView layoutSubviews]`方法中，添加子视图的初始化代码。`UIImageView`应填满`UIView`的整个可见区域（意味着它应使用相同的框架），而`UILabel`应位于视图的底部。与Quick\
    \ Look示例类似，使用相邻的框架来定位元素。使用示例数据初始化子视图后，结果应类似于[代码清单11-5](#9781430250838_Ch11.xhtml#list5)。\n\
    \n[***代码清单11-5***](#9781430250838_Ch11.xhtml#_list5). 初始化`CustomPhotoView`类\n\n\
    ```\n-(void)layoutSubviews\n{\n    [super layoutSubviews];\n\n    CGFloat padding\
    \ = 10.0f;\n    CGFloat labelHeight = 20.0f;\n    CGFloat viewWidth = self.frame.size.width;\n\
    \    CGFloat viewHeight = self.frame.size.height;\n\n    CGRect insideFrame =\
    \ CGRectMake(padding, padding,\n        viewWidth - padding * 2, viewHeight -\
    \ padding * 2);\n    CGRect label1Frame = CGRectMake(padding,\n        CGRectGetMaxY(insideFrame)\
    \ - 40, viewWidth, labelHeight);\n    CGRect label2Frame = CGRectMake(padding,\n\
    \        CGRectGetMinY(label1Frame) + 20,  viewWidth, labelHeight);\n\n    self.imageView\
    \ = [[UIImageView alloc] initWithFrame:insideFrame];\n    [self addSubview:self.imageView];\n\
    \n    self.titleLabel = [[UILabel alloc] initWithFrame:label1Frame];\n    [self\
    \ addSubview:self.titleLabel];\n    self.titleLabel.text = @\"No title\";\n\n\
    \    self.locationLabel = [[UILabel alloc] initWithFrame:label2Frame];\n    [self\
    \ addSubview:self.locationLabel];\n    self.locationLabel.text = @\"No location\"\
    ;\n}\n```\n\n要在Interface Builder中预览`CustomPhotoView`，请选择你的故事板文件。你应该能够在视图中看到占位符文本，如[Figure\
    \ 11-15](#9781430250838_Ch11.xhtml#Fig15)所示。不幸的是，你还需要再做一点工作才能预览图像。\n\n![9781430250838_Fig11-15.jpg](images/9781430250838_Fig11-15.jpg)\n\
    \n[Figure 11-15](#9781430250838_Ch11.xhtml#_Fig15). 预览`CustomPhotoView`类\n\n尽管看到占位符文本令人兴奋，但对于开发人员来说，能够从Interface\
    \ Builder内部实时更改图像和文本并查看结果则更为激动人心（也更有用）。Xcode 6允许你通过`IBInspectable`属性，将有限的类集合作为可编辑属性暴露在Interface\
    \ Builder中。此属性的工作方式与`IBOutlet`属性非常相似：将必要的代码添加到你的声明中，可以使该属性出现在Interface Builder中。你可以在[表11-2](#9781430250838_Ch11.xhtml#Tab2)中找到支持的类列表。\n\
    \n[表11-2](#9781430250838_Ch11.xhtml#_Tab2). `IBInspectable`兼容的类\n\n| 类 | 用途 |\n\
    | --- | --- |\n| `UIImage` | 允许你从应用包或素材目录中选择图像 |\n| `UIColor` | 允许你通过OS X颜色选择器选择颜色\
    \ |\n| `NSString` | 允许你输入字符串 |\n| `NSInteger` | 允许你输入整数值 |\n| `CGFloat` | 允许你输入浮点数值\
    \ |\n| `CGRect` | 允许你输入四个浮点数值，分别对应框架的x、y、宽度和高度 |"
  raw: 'As an alternative to a `UIView`, you can build your output by using an `NSAttributedString`
    object. Attributed strings extend the `NSString` class by allowing you to specify
    formatting (such as colors and bold text) and additional input methods. For example,
    you can render HTML directly by using an `NSAttributedString`.


    Adding Interface Builder Previews to Your Classes


    Continuing on the theme of improved visual debugging for your user interfaces,
    Xcode 6 now allows you to preview and configure your own `UIView` subclasses within
    Interface Builder. Additionally, Interface Builder now provides a feature called
    *Debug Selected View*, which allows you to debug your views without running your
    application.


    As with Quick Look, Apple has historically supported preview and configuration
    within Interface Builder for some of its own `UIView` subclasses, such as `UILabel`
    and `UIButton`. Looking at [Figure 11-12](#9781430250838_Ch11.xhtml#Fig12) for
    reference, you can see that a `UIButton` changes its appearance to reflect the
    property changes that the user has entered into the Attributes Inspector. With
    Xcode 6, you can now enable this same functionality for your `UIView` subclasses
    by adding the `IB_DESIGNABLE` attribute.


    ![9781430250838_Fig11-12.jpg](images/9781430250838_Fig11-12.jpg)


    [Figure 11-12](#9781430250838_Ch11.xhtml#_Fig12). Attributes Inspector and preview
    for UIButton


    To demonstrate this feature, you will create a single-view application that displays
    the content from the `CustomPhoto` class in a `UIView` subclass named `CustomPhotoView`.
    You''ll find the code for this IBSample project in the [Chapter 11](#9781430250838_Ch11.xhtml)
    folder of the source code bundle.


    For the `CustomPhotoView` class, you will display a `UIImage` and two `UILabel`
    objects representing metadata fields from the `CustomPhoto`, as shown in [Figure
    11-13](#9781430250838_Ch11.xhtml#Fig13). To aid with debugging, you want to let
    developers see live previews of these subviews in Interface Builder.


    ![9781430250838_Fig11-13.jpg](images/9781430250838_Fig11-13.jpg)


    [Figure 11-13](#9781430250838_Ch11.xhtml#_Fig13). Mock-up of CustomPhotoView class


    To get started, create the `CustomPhotoView` class as a subview of `UIView`. Add
    properties to represent the subviews in the mock-up, as shown in [Listing 11-3](#9781430250838_Ch11.xhtml#list3).


    [***Listing 11-3***](#9781430250838_Ch11.xhtml#_list3). Header File for CustomPhotoView
    Class


    ```

    #import <UIKit/UIKit.h>


    IB_DESIGNABLE


    @interface CustomPhotoView : UIView


    @property (nonatomic) UILabel *titleLabel;

    @property (nonatomic) UILabel *locationLabel;

    @property (nonatomic) UIImageView *imageView;


    @end

    ```


    To enable an Interface Builder preview of your view, add the `IB_DESIGNABLE` attribute
    to the line preceding the `@interface` declaration for your class. An *attribute*
    in Objective-C is a compiler directive (like a *macro*), which allows you to attach
    predefined behaviors to a variable declaration. The `nonatomic` attribute used
    in defining instance variables instructs the compilers to automatically create
    getters and setters for the object. Your modified header file should look like
    the example in [Listing 11-4](#9781430250838_Ch11.xhtml#list4).


    [***Listing 11-4***](#9781430250838_Ch11.xhtml#_list4). IB_DESIGNABLE-Compatible
    Header File for CustomPhotoView Class


    ```

    #import <UIKit/UIKit.h>


    IB_DESIGNABLE


    @interface CustomPhotoView : UIView


    @property (nonatomic) UILabel *titleLabel;

    @property (nonatomic) UILabel *locationLabel;

    @property (nonatomic) UIImageView *imageView;


    @end

    ```


    To visualize the `CustomPhotoView` class, you need to add it to your storyboard.
    Select your project’s `Main.storyboard` file and drag a View object onto the View
    Controller Scene. Use the Identity Inspector (third tab in Interface Builder)
    to associate the view to the `CustomPhotoView` class, as shown in [Figure 11-14](#9781430250838_Ch11.xhtml#Fig14).
    To make the view easier to see, give it a nonwhite background color by using the
    Attributes Inspector.


    ![9781430250838_Fig11-14.jpg](images/9781430250838_Fig11-14.jpg)


    [Figure 11-14](#9781430250838_Ch11.xhtml#_Fig14). Setting the class name in the
    Identity Inspector


    To take full advantage of Interface Builder previews, you need to lay out your
    view programmatically (similar to Quick Look). Normally, to lay out a view programmatically,
    you would use the `[UIView initWithFrame:]` constructor method. Unfortunately,
    by their very nature, previews need to be dynamic. Since the core of the functionality
    is built on subviews, you need to use a method that will be called whenever the
    view is instructed to reload its subviews. Because of this design restriction,
    the best method to use is `[UIView layoutSubviews]`.


    **Note**  If you have any code for drawing elements in your `UIView`, such as
    adding a border, place it in your `[UIView drawRect]` method.


    In your `[``UIView layoutSubviews``]` method, add the initialization code for
    your subviews. The `UIImageView` should fill the entire visible area of the `UIView`
    (meaning it should use the same frame), and the `UILabels` should sit at the bottom
    of the view. Similar to the Quick Look example, use neighboring frames to position
    elements. After initializing your subviews with sample data, your result should
    look like [Listing 11-5](#9781430250838_Ch11.xhtml#list5).


    [***Listing 11-5***](#9781430250838_Ch11.xhtml#_list5). Initializing the CustomPhotoView
    Class


    ```

    -(void)layoutSubviews

    {

        [super layoutSubviews];


    CGFloat padding = 10.0f;

        CGFloat labelHeight = 20.0f;

        CGFloat viewWidth = self.frame.size.width;

        CGFloat viewHeight = self.frame.size.height;


    CGRect insideFrame = CGRectMake(padding, padding,

            viewWidth - padding * 2, viewHeight - padding * 2);

        CGRect label1Frame = CGRectMake(padding,

            CGRectGetMaxY(insideFrame) - 40, viewWidth, labelHeight);

        CGRect label2Frame = CGRectMake(padding,

            CGRectGetMinY(label1Frame) + 20,  viewWidth, labelHeight);


    self.imageView = [[UIImageView alloc] initWithFrame:insideFrame];

        [self addSubview:self.imageView];


    self.titleLabel = [[UILabel alloc] initWithFrame:label1Frame];

        [self addSubview:self.titleLabel];

        self.titleLabel.text = @"No title";


    self.locationLabel = [[UILabel alloc] initWithFrame:label2Frame];

        [self addSubview:self.locationLabel];

        self.LocationLabel.text = @"No location";


    }

    ```


    To preview the `CustomPhotoView` in Interface Builder, select your storyboard
    file. You should see your placeholder text inside the view, as shown in [Figure
    11-15](#9781430250838_Ch11.xhtml#Fig15). Unfortunately, you still need to do a
    little more work to be able to preview the image.


    ![9781430250838_Fig11-15.jpg](images/9781430250838_Fig11-15.jpg)


    [Figure 11-15](#9781430250838_Ch11.xhtml#_Fig15). Previewing the CustomPhotoView
    class


    As exciting as it is to see placeholder text, it is more exciting (and useful)
    for developers to be able to see the results of changing the image and text on-the-fly,
    from within Interface Builder. Xcode 6 allows you to expose a limited set of classes
    as editable properties in Interface Builder via the `IBInspectable` attribute.
    This attribute works much like the `IBOutlet` attribute: adding the necessary
    code to your declaration allows the property to show up in Interface Builder.
    You can find a list of supported classes in [Table 11-2](#9781430250838_Ch11.xhtml#Tab2).


    [Table 11-2](#9781430250838_Ch11.xhtml#_Tab2). IBInspectable-Compatible Classes


    | Class | Purpose |

    | --- | --- |

    | `UIImage` | Allows you to select an image from your app bundle or asset catalog
    |

    | `UIColor` | Allows you to select a color by using the OS X color picker |

    | `NSString` | Allows you to type in a string |

    | `NSInteger` | Allows you to type in an integer value |

    | `CGFloat` | Allows you to type in a float value |

    | `CGRect` | Allows you to type in four float values, corresponding to a frame’s
    x, y, width, and height values |'
