    Saving Video Recordings


    The delegate method that fires when the image picker completes with captured media
    is `[UIImagePickerController imagePickerController:didFinishPickingMediaWithInfo:]`.
    To properly handle video from the image picker, you need to learn how to use additional
    keys in the results dictionary. For your reference, [Table 8-3](#9781430250838_Ch08.xhtml#Tab3)
    lists all the keys in the `userInfo` results dictionary.


    [Table 8-3](#9781430250838_Ch08.xhtml#_Tab3). Keys Returned by the Image Picker
    Results Dictionary


    | Key | Return Type | Value |

    | --- | --- | --- |

    | `UIImagePickerControllerMediaType` | `NSString` | Type of media (image or video)
    |

    | `UIImagePickerControllerOriginalImage` | `UIImage` | Unedited image data |

    | `UIImagePickerControllerEditedImage` | `UIImage` | Edited image data |

    | `UIImagePickerControllerCropRect` | `NSValue` (Cast to `NSRect`) | Cropping
    rectangle |

    | `UIImagePickerControllerMediaURL` | `NSURL` | URL for unedited movie |

    | `UIImagePickerControllerReferenceURL` | `NSURL` | URL for final movie (edited
    or not) |


    The first assumption you need to change from the MyCamera app is that all results
    from the image picker are images. To check the return type of a file, retrieve
    the value represented by the `UIImagePickerControllerMediaType` key. This will
    be an `NSString`, which you should compare against `kUTTypeMovie` for movies:


    ```

    if ([[info objectForKey:UIImagePickerControllerMediaType]

        isEqualToString:(NSString *)kUTTypeMovie]) {

            //custom code goes here

    ```


    `}`


    Next, you want to determine whether the user edited the video. The results dictionary
    provides two keys representing the user’s recorded video: `UIImagePickerControllerMediaURL`,
    which returns the URL for the final, edited version of the media item, and `UIImagePickerControllerReferenceURL`,
    which returns the URL for the original media item. The general practice for most
    apps is to use the edited version of the video. If you want to give the user a
    choice of what version to use, compare the two values; if the values represented
    by the keys differ, you know the user edited the video:


    ```

    if ([[info objectForKey:UIImagePickerControllerMediaURL]

        isEqualToString:[info

         objectForKey:UIImagePickerControllerReferenceURL]]) {

         movieURL = [info objectForKey:UIImagePickerControllerMediaURL];

    } else {

        movieURL = [info

            objectForKey:UIImagePickerControllerReferenceURL];

    }

    ```


    Finally, to save your users a lot of headaches, you need to save your videos to
    the documents directory with human-readable names. In my apps, I like to append
    a timestamp to a string, such as Movie or my app’s name. This way, users can easily
    retrieve videos based on the time that they were created. You can create a timestamp
    easily with the `NSDateFormatter` class.


    ```

    NSDateFormatter *dateFormat = [[NSDateFormatter alloc] init];

    [dateFormat setDateFormat:@"yyyyMMddHHmm"];

    ```


    To get the contents of the file, use the `[NSData dataWithContentsOfURL:]` method:


    ```

    NSData *movieData = [NSData dataWithContentsOfURL:movieURL];

    ```


