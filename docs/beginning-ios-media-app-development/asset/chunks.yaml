        }

    ];

    ```


    QUICK GUIDE TO BLOCKS


    In Objective-C, blocks are a language feature that allow you to specify *anonymous*
    *methods*—pieces of code that act like a method but do not need to be declared
    with a signature. Blocks are a great way of creating a “disposable” method that
    is called from only one specific code path. Additionally, you can define blocks
    as a parameter for a method. Throughout this book, you will see mention of *completion
    blocks*; these are blocks defined in the method call that get called immediately
    when a method completes.


    Block signatures have a jarring syntax compared to methods. The signature for
    a block is as follows:


    `void (^myBlock)(NSString* string1, NSString *string2, int count);`


    The first keyword, `void`, is the return type for the block. `myBlock` is the
    block name; it is always preceded by a caret symbol. The contents of the final
    set of parentheses are the parameter types. Blocks are closer to C in syntax style
    and do not require labels for parameters.


    A block’s signature specifies its return type, name, and parameters, just like
    a method’s. To define a block, append the code for the block in curly braces,
    just as you would a method. Blocks are treated as *inline* functions by the compiler,
    meaning they do not break a line of code, so make sure you add a semicolon to
    the end of the line:


    `int finalPhotoCount = ^(int count1, int count2) {`

        `return count1+count2;};`


    You use the same syntax to call a block with parameters as you do a method, by
    specifying the parameter types and code for the block. For example, blocks were
    used to enumerate the assets and groups in [Listing 4-25](#9781430250838_Ch04.xhtml#list25).


    `[group enumerateAssetsUsingBlock:^(ALAsset *result, NSUInteger index,`

        `BOOL *stop) {`

            `if (result != nil) {`

               **[self.images addObject:result];**

            `}`

    }];


    One of the more perilous aspects of a block is that its variable scoping is different
    from that of a normal method. You can create local variables within a block, and
    you can access instance variables from outside the block. However, by default,
    all outside variables in a block are passed *by copy*, meaning you can see their
    contents, but you cannot modify them. To declare a local or instance variable
    so that it can be modified by a block, you need to add the `__block` keyword in
    front of its type:


    `__block NSInteger photoCount;`


    You use a similar pattern for instance variables, adding the `__block` keyword
    after the attributes and before the type:


    `@property (nonatomic, assign) __block NSInteger photoCount;`


    Using a block is like driving a Ferrari without brakes. You can go incredibly
    fast, but you need to be aware of your limitations and how to work around them.


    Using the UICollectionView Class to Enumerate Assets


    If you built the examples in the previous section, you now have an array containing
    a set of assets that correspond to photos from the Saved Photos and Photo Stream
    galleries. At this point, you can build a collection view user interface to represent
    these items.


    Introduced with iOS 6, *collection views* refer to the graphics-based navigation
    interface that you may be familiar with from the iBooks app, and from older versions
    of the Photos app (see [Figure 4-5](#9781430250838_Ch04.xhtml#Fig5)). In a collection
    view, items are generally represented by a graphical representation (such as album
    art or book covers), and flow from left to right, top to bottom. Much like with
    a table view, you define a data source for the view, specify what each item (called
    a *cell*) should look like, and define the behaviors that should occur when the
    user interacts with an item. Unlike a table view, you do not need to specify how
    many items will be in each column or row; the `UICollectionView` class will automatically
    fit items into the grid based on the cell size and the container view size. That
    makes it easy to pass in linear data sets. Similarly, you can group data in sections,
    as you would with a table view.


    ![9781430250838_Fig04-05.jpg](images/9781430250838_Fig04-05.jpg)


    [Figure 4-5](#9781430250838_Ch04.xhtml#_Fig5). Screenshot of the collection view
    in iBooks


    To add a collection view to the application, drag a Collection View Controller
    from Interface Builder’s object library. Make sure you instantiate your own subclass
    of `UICollectionViewController` so that you can tie the data source to the view,
    and implement your own action handlers. If you are implementing an iPad interface,
    remember to duplicate these settings in the iPad storyboard as well. You can find
    a screenshot of the storyboard in [Figure 4-6](#9781430250838_Ch04.xhtml#Fig6).


    ![9781430250838_Fig04-06.jpg](images/9781430250838_Fig04-06.jpg)


