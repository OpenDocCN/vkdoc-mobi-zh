                                      CGRectGetMidY(layerRect));


    [previewLayer setBounds:layerRect];

                [previewLayer setPosition:layerCenter];


    [previewLayer setVideoGravity:AVLayerVideoGravityResize];


    [self.previewView.layer addSublayer:previewLayer];


    [self.session startRunning];

        }

    }

    ```


    Capturing a Still Image


    Similarly to the way you added an *input* to the `AVCaptureSession` to determine
    the input device, you need to add an *output* to determine how to export data.
    For this example, you want to export a photo—represented as a single frame of
    video—when the user is ready.


    The base class for `AVCaptureSession` output objects is `AVCaptureOutput`, however,
    as an abstract class that specifies only what information is required for a capture
    object. Luckily, though, `AVFoundation` comes with a number of `AVCaptureObject`
    subclasses you can use for desired export formats. Several of the most popular
    subclasses are enumerated in [Table 4-1](#9781430250838_Ch04.xhtml#Tab1).'
  trans: "\n与传统动画中的赛璐珞片类似，你可以组合图层来表示更复杂的数据，也可以独立移动它们。由于视频流本质上是快速变化的图像序列，从性能角度来看，将内容直接写入图层比在每一帧变化时销毁视图要合理得多。\n\
    \n通过调用构造方法 `[AVCapturePreviewLayer initWithSession:]` 来实例化 `AVCapturePreviewLayer`\
    \ 对象，并将会话对象作为输入参数传入：\n\n```\nAVCaptureVideoPreviewLayer *previewLayer =\n    \
    \ [[AVCaptureVideoPreviewLayer alloc] initWithSession:self.session];\n```\n\n\
    为了正确显示图层，你需要指定其尺寸和位置。在 `MyCamera` 项目中，你将使用名为 `previewView` 的 `UIView` 属性来展示相机实时画面。要将视频图层居中于该视图并赋予其相同的边界，可以使用以下代码片段：\n\
    \n```\nCGRect layerRect = self.previewView.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \    CGRectGetMidY(layerRect));\n[previewLayer setBounds:layerRect];\n[previewLayer\
    \ setPosition:layerCenter];\n```\n\n然而，要显示视频图层，你需要为其指定一个绘制目标。你希望在视图上绘制视频，因此将预览图层作为子层添加到视图顶层：\n\
    \n```\n[self.previewView.layer addSublayer:previewLayer];\n```\n\n默认情况下，预览图层会在保持宽高比的同时调整相机输出大小以适应其容器框。通过将\
    \ `videoGravity` 属性设置为 `AVLayerVideoGravityResize`，你可以将缩放模式更改为按比例填充：\n\n```\n\
    [previewLayer setVideoGravity:AVLayerVideoGravityResize];\n```\n\n最后一步是启动视频流，在会话对象上调用\
    \ `[AVCaptureSession startRunning]` 方法即可：\n\n```\n[self.session startRunning];\n\
    ```\n\n`ViewController` 类的完整相机设置代码见列表 4-2。该代码被封装在 `[self viewDidLoad:]` 方法中，因为当视图初始化时需要初始化相机。\n\
    \n**列表 4-2**。初始化相机输入\n\n```\n- (void)viewDidLoad\n{\n        [super viewDidLoad];\n\
    \            // Do any additional setup after loading the view.\n        self.session\
    \ = [[AVCaptureSession alloc] init];\n        AVCaptureDevice *camera = [AVCaptureDevice\n\
    \            defaultDeviceWithMediaType:AVMediaTypeVideo];\n        NSError *error\
    \ = nil;\n\nAVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput\n      \
    \       deviceInputWithDevice:camera error:&error];\n\nif (error == nil && [self.session\
    \ canAddInput:cameraInput]) {\n             [self.session addInput:cameraInput];\n\
    \nAVCaptureVideoPreviewLayer *previewLayer =\n                [[AVCaptureVideoPreviewLayer\
    \ alloc]\n                  initWithSession:self.session];\n\nCGRect layerRect\
    \ = self.previewView.bounds;\n            CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \                                  CGRectGetMidY(layerRect));\n\n[previewLayer\
    \ setBounds:layerRect];\n            [previewLayer setPosition:layerCenter];\n\
    \n[previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\n[self.previewView.layer\
    \ addSublayer:previewLayer];\n\n[self.session startRunning];\n    }\n}\n```\n\n\
    ## 捕捉静态图像\n\n与之前向 `AVCaptureSession` 添加*输入*（input）以确定输入设备的方式类似，你需要添加一个*输出*（output）来确定如何导出数据。在本例中，当用户准备就绪时，你希望导出一张照片——以视频单帧的形式表示。\n\
    \n`AVCaptureSession` 输出对象的基类是 `AVCaptureOutput`，但它是一个仅指定捕获对象所需信息的抽象类。幸运的是，`AVFoundation`\
    \ 提供了许多 `AVCaptureObject` 的子类，可用于你所需的导出格式。常用的一些子类列举在表 4-1 中。\n"
- fmt: "[Table 4-1](#9781430250838_Ch04.xhtml#_Tab1). Popular `AVCaptureOutput` Subclasses\n\
    \n| Subclass | Capture Output |\n| --- | --- |\n| `AVCaptureMovieFileOutput` |\
    \ QuickTime movie file |\n| `AVCaptureVideoDataOutput` | Video frames—intended\
    \ for processing |\n| `AVCaptureAudioFileOutput` | Audio files supported by Core\
    \ Audio (.MP3, .AIFF, .WAV, .AAC) |\n| `AVCaptureAudioDataOutput` | Audio buffer—\
    \ intended for processing |\n| `AVCaptureMetadataOutput` | Media file metadata\
    \ properties (for example, GPS location, exposure level) |\n| `AVCaptureStillImageOutput`\
    \ | Still images and metadata |\n\nTo capture a still image, use the `AVCaptureStillImageOutput`\
    \ subclass. The method to capture images using this class is defined as an instance\
    \ method, so declare an `AVCaptureStillImageOutput` object as an instance variable:\n\
    \n```\nself.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];\n```\n\
    \nAlthough you do not have to configure the output object to capture raw data,\
    \ it is a good idea to compress the data by saving it as a JPEG file (.JPG). To\
    \ do this, you need to specify the codec type in a configuration dictionary. You\
    \ specify JPEG format using the `kCMVideoCodecType_JPEG` constant for the value\
    \ at the `AVVideoCodecKey` key. After the dictionary is ready, save your settings\
    \ using the `[AVStillImageOutput setOutputSettings:]` method, as shown in [Listing\
    \ 4-3](#9781430250838_Ch04.xhtml#list3).\n\n[***Listing 4-3***](#9781430250838_Ch04.xhtml#_list3).\
    \ Configuring an Output Object\n\n```\nNSMutableDictionary *configDict = [NSMutableDictionary\
    \ new];\n[configDict setObject:AVVideoCodecJPEG forKey:AVVideoCodecKey];\n[self.stillImageOutput\
    \ setOutputSettings:configDict];\n```\n\nAgain, just as when adding an input object,\
    \ you should check to make sure the output object is available before adding it\
    \ to your session, as shown in [Listing 4-4](#9781430250838_Ch04.xhtml#list4).\n\
    \n[***Listing 4-4***](#9781430250838_Ch04.xhtml#_list4). Adding an Output Object\n\
    \n```\nif ([self.session canAddOutput:self.stillImageOutput]) {\n    [self.session\
    \ addOutput:self.stillImageOutput];\n}\n```\n\nNow that you have set up an output\
    \ object, you can use it to capture still images. The API reference for the `AVCaptureStillImageOutput`\
    \ class shows that you can use the `[AVCaptureStillImageAsynchronouslyFromConnection:completionHandler]`\
    \ instance method. Unfortunately, though, you need to set up a *connection* to\
    \ use this method. A connection, represented by the `AVCaptureConnection` class,\
    \ is an interface that links the input and output objects. Luckily, connections\
    \ are created automatically when you add outputs to a session. You can query for\
    \ a connection by specifying the output object and media type you are looking\
    \ for (for example, audio or video), as shown in [Listing 4-5](#9781430250838_Ch04.xhtml#list5).\n\
    \n[***Listing 4-5***](#9781430250838_Ch04.xhtml#_list5). Querying for a Connection\
    \ Object\n\n```\nAVCaptureConnection *connection = [self.stillImageOutput\n  \
    \  connectionWithMediaType:AVMediaTypeVideo];\n```\n\nHaving created a connection\
    \ object, you can now call a block to capture still images. The completion handler\
    \ returns a low-level media buffer (`CMSampleBufferRef`) that points to the still\
    \ image, or an `NSError` object if the operation failed. You can save the image\
    \ by calling the `[AVCaptureStillImageOutput jpegStillImageNSDataRespresentation:]`\
    \ class method, which returns the `NSData` representation for the still image\
    \ as a JPEG file with valid EXIF metadata. After retrieving the `NSData` for the\
    \ image, you can save it to disk or convert it to a `UIImage` object.\n\nIn [Listing\
    \ 4-6](#9781430250838_Ch04.xhtml#list6), a button handler encapsulates the entire\
    \ process of capturing an image. In the MyCamera project, this would be triggered\
    \ by the Shoot button. If this method is able to capture an image successfully,\
    \ it will send a `didFinishWithImage` message to its camera delegate. If the capture\
    \ fails, it logs the error by sending the `cancel` message and logging the error\
    \ as a string using `[NSLog description]`.\n\n[***Listing 4-6***](#9781430250838_Ch04.xhtml#_list6).\
    \ Capturing a Still Image\n\n```\n-(IBAction)finish:(id)sender\n{\n\nAVCaptureConnection\
    \ *connection = [self.stillImageOutput\n        connectionWithMediaType:AVMediaTypeVideo];\n\
    \n//[[self.stillImageOutput connectionWithMediaType:AVMediaTypeVideo]\n      \
    \  setVideoOrientation:[connection videoOrientation]];\n\n[self.stillImageOutput\n\
    \        captureStillImageAsynchronouslyFromConnection:connection\n        completionHandler:^(CMSampleBufferRef\
    \ imageDataSampleBuffer,\n        NSError *error) {\n\nif (imageDataSampleBuffer\
    \ != nil) {\n\nNSData *imageData = [AVCaptureStillImageOutput\n             jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \nUIImage *image = [UIImage imageWithData:imageData];\n\n[self.delegate didFinishWithImage:image];\n\
    \        } else {\n\nNSLog(@\"error description: %@\", [error description]);\n\
    \n[self.delegate cancel];\n        }\n\n}];\n```\n\n**Note**  EXIF (Exchangeable\
    \ Image File Format) metadata is an industry standard for capturing information\
    \ about a picture that was taken. Your iOS capture device produces values that\
    \ include exposure, orientation, date taken, and flash setting. You can find a\
    \ complete listing of all valid key/value pairs in Apple’s “CGImageProperties\
    \ Reference” (available in Apple’s online iOS Developer Library).\n\nBecause the\
    \ goal is to implement a workflow much like `UIImagePickerController`, you want\
    \ to dismiss the camera interface as soon as the user has taken a picture. To\
    \ speed up the process, and free up the camera for other processes, call the `[AVCaptureSession\
    \ stopRunning]` method on the session in the `[UIViewController viewWillDisappear]`\
    \ method for the camera controller class, as shown in [Listing 4-7](#9781430250838_Ch04.xhtml#list7).\n\
    \n[***Listing 4-7***](#9781430250838_Ch04.xhtml#_list7). Stopping the Capture\
    \ Session\n\n```\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [self.session stopRunning];\n}\n```\n\n**Caution**  The old method for cleaning\
    \ up view controllers, `[UIViewController viewDidUnload]`, has been deprecated\
    \ starting with iOS 6.0. Do not attempt to define this function, as your code\
    \ will never be called.\n\n## Accessing Hardware Controls\n\nThe final component\
    \ to complete the custom camera controller is an interface to configure the camera’s\
    \ capture settings. This sample application focuses on switching cameras (for\
    \ example, front/rear) and configuring the flash, autofocus, and exposure settings.\
    \ These examples demonstrate two important patterns with camera development:\n\
    \n*   You must always lock your device configuration before changing it.\n*  \
    \ You should use touch events to drive area-specific settings (for example, autofocus,\
    \ exposure).\n\n### Switching Cameras\n\nThe first hardware control you will build\
    \ is a button that allows users to switch between the front and rear cameras on\
    \ the device. Much like the default camera in iOS, the example will retain the\
    \ ability to see a live preview of the camera output and take pictures, and allow\
    \ users to toggle the cameras as often as they like. Remembering what you learned\
    \ earlier about `AVFoundation`’s capture stack, you can implement camera switching\
    \ by switching the active input on the session.\n\nTo switch cameras at runtime,\
    \ you need to maintain pointers to each hardware device. Whereas in the earlier\
    \ example, you found the default camera device using the `[AVCaptureDevice defaultDeviceWithMediaType]`\
    \ instance method, this time you need to maintain an array of devices. The method\
    \ that returns an array of `AVCaptureDevice` objects is `[AVCaptureDevice devicesWithMediaType:]`:\n\
    \n```\nself.cameraArray = [AVCaptureDevice \n                    devicesWithMediaType:AVMediaTypeVideo];\n\
    ```\n\nInitialize the `NSArray` as an instance variable of the target class, because\
    \ you need to be able to query it again before switching cameras (in other words,\
    \ you should not allow the user to switch cameras if they’re using a device with\
    \ only one camera)."
