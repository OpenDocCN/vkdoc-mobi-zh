    the `CustomPlayerController` class in [Listings 9-14](#9781430250838_Ch09.xhtml#list14)
    and [9-15](#9781430250838_Ch09.xhtml#list15). After seeking to your new playback
    position, update the user interface immediately so that the user knows about the
    change.


    [***Listing 9-14***](#9781430250838_Ch09.xhtml#_list14). Seeking Forward


    ```

    -(IBAction)seekForward:(id)sender

    {

        NSInteger duration = CMTimeGetSeconds([self.playerItem duration]);

        NSInteger currentTime = CMTimeGetSeconds(

           [self.playerItem currentTime]);


    float desiredTime = currentTime + 5;

        if (desiredTime < duration) {

            CMTime seekTime = CMTimeMakeWithSeconds(desiredTime, 1);

            [self.player seekToTime:seekTime];


    [self updateProgress];

        }

    }

    ```


    [***Listing 9-15***](#9781430250838_Ch09.xhtml#_list15). Seeking Backward


    ```

    -(IBAction)seekBackward:(id)sender

    {

        NSInteger currentTime = CMTimeGetSeconds([self.playerItem

            currentTime]);


    float desiredTime = currentTime - 5;


    if (desiredTime < 0) {

            CMTime seekTime = CMTimeMakeWithSeconds(0.0f, 1);

            [self.player seekToTime:seekTime];

        } else {

            CMTime seekTime = CMTimeMakeWithSeconds(desiredTime, 1);

            [self.player seekToTime:seekTime];

        }


    [self updateProgress];

    }

    ```


    ## Using the Playback Scrubber


    To enable seeking via the slider in the bottom bar, you need to implement the
    value changed event for the element. The *value changed* event fires when the
    user has finished moving the indicator element inside of the slider. While *touch
    up inside* was appropriate for the buttons (because the final event was releasing
    the button), for sliders, you need to catch when the user has completely finished
    changing the value, not just when the user’s finger has left the element (which
    could be triggered by touching any part of the slider).


    For the event’s handler method, add an `IBAction` handler method called `sliderChanged:`
    to your `CustomViewController` header file:


    ```

    -(IBAction)sliderChanged:(id)sender;

    ```


    To catch the *value changed* event, tie the event to the `timeSlider` in your
    storyboard. As shown in [Figure 9-12](#9781430250838_Ch09.xhtml#Fig12), as with
    other user-interface events, hold down the Value Changed radio button in the Connections
    Inspector and drag your cursor over to the `CustomViewController` in your storyboard.
    When you release your cursor, a list of valid `IBAction` methods will show up.
    Select the `sliderChanged:` method.


    ![9781430250838_Fig09-12.jpg](images/9781430250838_Fig09-12.jpg)


    [Figure 9-12](#9781430250838_Ch09.xhtml#_Fig12). Connecting the Value Changed
    event


    Now that you have the context of how to catch the event, you need to learn what
    to do with the event information. Video scrubbers allow users to skip to a desired
    time in the video. When you updated the user interface to show playback progress,
    you set the scrubber’s position by calculating the *percent complete* of the video
    (current time / total time). Now that the user has a scrubber, you want to recalculate
    this time by using the new value. As shown in [Listing 9-16](#9781430250838_Ch09.xhtml#list16),
    you can get the new value of the `UISlider` object from the `value` property.


    [***Listing 9-16***](#9781430250838_Ch09.xhtml#_list16). Playback Scrubber Handler


    ```

    -(IBAction)sliderChanged:(UISlider *)sender

    {

        float progress = sender.value;

        NSInteger durationSeconds = CMTimeGetSeconds([self.playerItem duration]);

        float result = durationSeconds * progress;

        CMTime seekTime = CMTimeMakeWithSeconds(result, 1);


    [self.player seekToTime:seekTime];


    }

    ```


    The `value` property is a `float` between `0` and `1`. By multiplying the video’s
    *duration* by this value, you can find the new playback position. After seeking
    to the desired time, call the `[self updateProgress]` method to update the user
    interface immediately (users expect to see the new time they scrubbed to).


    ## Dismissing the Playback Interface


    To dismiss the playback controller, you need to send a message to its presenting
    view controller (your `MainViewController` object). To mimic the `MPMoviePlayerController`
    class, post a notification called `customPlayerDidFinish` when the user clicks
    the Done button, as shown in [Listing 9-17](#9781430250838_Ch09.xhtml#list17).


    [***Listing 9-17***](#9781430250838_Ch09.xhtml#_list17). Done Button Handler


    ```

    -(IBAction)done:(id)sender

    {

        NSDictionary *userDict = [NSDictionary dictionaryWithObject:@"user finished"

            forKey:@"reason"];

        [[NSNotificationCenter defaultCenter]

             postNotificationName:@"customPlayerDidFinish" object:userDict];

    }

    ```


    To handle this message, add an observer for the `customPlayerDidFinish` notification
    in the `MainViewController` class’s `[self viewDidLoad]` method; similarly remove
    the observer in the `[self dealloc]` method. Your final view teardown and setup
    methods for the `MainViewController` class are shown in [Listings 9-18](#9781430250838_Ch09.xhtml#list18)
    and [9-19](#9781430250838_Ch09.xhtml#list19).


    [***Listing 9-18***](#9781430250838_Ch09.xhtml#_list18). MainViewController View
    Setup Method


    ```

    - (void)viewDidLoad {

        [super viewDidLoad];

        // Do any additional setup after loading the view, typically from a nib.


    [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(playbackFinished:)

            name:@"customPlayerDidFinish"

            object:nil];

        [[NSNotificationCenter defaultCenter] addObserver:self

            selector:@selector(loadStateChanged:)

            name:@"customPlayerLoadStateChanged" object:nil];

    }

    ```


    [***Listing 9-19***](#9781430250838_Ch09.xhtml#_list19). MainViewController View
    Teardown Method


    ```

    - (void)dealloc

    {

        [[NSNotificationCenter defaultCenter] removeObserver:self

            name:@"customPlayerDidFinish" object:nil];

        [[NSNotificationCenter defaultCenter] removeObserver:self

            name:@"customPlayerLoadStateChanged" object:nil];


    }

    ```


    In the notification’s handler method, which [Listing 9-19](#9781430250838_Ch09.xhtml#list19)
    specifies as `[self playbackFinished:]`, make a call to `[self dismissViewController:animated:]`.
    To add error handling to this method, I have created an `error` entry in `userDict`,
    which you can use to check whether playback failed because of an error. The Playback
    Finished handler for the `MainViewController` class is provided in [Listing 9-20](#9781430250838_Ch09.xhtml#list20).


    [***Listing 9-20***](#9781430250838_Ch09.xhtml#_list20). Playback Finished Handler
    Method


    ```

    -(void)playbackFinished:(NSNotification *) notification

    {


    NSDictionary *userInfo = notification.userInfo;

        NSString *finishReason = [userInfo objectForKey:@"reason"];


    [self dismissViewControllerAnimated:YES completion:^{


    if ([finishReason isEqualToString:@"error"]) {

                NSError *error = [userInfo objectForKey:@"error"];

                NSString *errorString = [error description];


    UIAlertView *alert = [[UIAlertView alloc]

                    initWithTitle:@"Error!" message:errorString

                    delegate:nil cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [alert show];

            }


    }];


    }

    ```


    ## Adding User-Interface Updates


    To improve the user interface for the MyCustomVideoPlayer application, you should
    add user-interface updates to hide the playback controls and indicate the current
    playback progress, both of which can be accomplished through clever use of timers.


    After the user has started playback, you should update the Current Time label
    and scrubber to indicate the current playback position. Also, after a couple of
    seconds of inactivity, you should hide the center playback control panel.


    ### Updating Playback Progress'
