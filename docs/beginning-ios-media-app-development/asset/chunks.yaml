    \ You place these after the base class name. You are not limited in the number\
    \ of protocols you can implement, but you need to make sure they do not have any\
    \ conflicting method names before adding them!\n\nIn the implementation (`.m`)\
    \ file, you define the behavior for the methods indicated by the protocol. As\
    \ shown in [Listing 2-5](#9781430250838_Ch02.xhtml#list5), this is where you can\
    \ handle what to do with the picture when the image picker is ready, or what to\
    \ do when the Cancel button has been pressed.\n\n[***Listing 2-5***](#9781430250838_Ch02.xhtml#_list5).\
    \ Implementation File for Class Receiving Protocol Messages\n\n```\n#import \"\
    FirstViewController.h\"\n\n@implementation FirstViewController\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n}\n\n#pragma mark - CameraViewController delegate\
    \ methods\n\n-(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage\
    \ *)image\n{\n    self.selectedImage = image;\n    [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n\n-(void)cameraViewController:(UIViewController *)controller\
    \ didCancel:(BOOL)state\n{\n    if (state == YES) {\n        [controller dismissViewControllerAnimated:YES\
    \ completion:nil];\n    }\n}\n\n@end\n```\n\nThe `#pragma mark` in this listing\
    \ creates comments that will appear in the Xcode method navigator drop-down menu.\
    \ It is a good idea to use comments like these whenever you are implementing a\
    \ protocol, so you can remember where your delegate methods are defined.\n\n**Note**\
    \ You will get a compiler warning for every required method you do not define.\
    \ Methods with the `optional` flag add useful but nonessential behavior, and thus\
    \ will not throw compiler warnings.\n\nTo complete the cycle of using a delegate,\
    \ you need to give the originating class a way of sending protocol messages. See\
    \ [Listing 2-6](#9781430250838_Ch02.xhtml#list6).\n\n[***Listing 2-6***](#9781430250838_Ch02.xhtml#_list6).\
    \ Modified Header File for Class Sending Protocol Messages\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@protocol CameraViewControllerDelegate <NSObject>\n\n-(void)cameraViewController:(UIViewController\
    \ *)controller hasImage:(UIImage *)image;\n\n@optional\n-(void)cameraViewController:(UIViewController\
    \ *)controller didCancel:(BOOL)state;\n\n@end\n\n@interface CameraViewController\
    \ : UIViewController\n\n@property (nonatomic, strong) UIImage *capturedImage;\n\
    \n@property (nonatomic, weak) id <CameraViewControllerDelegate> delegate;\n\n\
    @end\n```\n\nAs you can see, you need to add a generic delegate object (of class\
    \ `id`) to the source class. After defining this object, you can safely make calls\
    \ to the delegate object through the defined protocol messages, as shown in [Listing\
    \ 2-7](#9781430250838_Ch02.xhtml#list7).\n\n[***Listing 2-7***](#9781430250838_Ch02.xhtml#_list7).\
    \ Modified Implementation File for Originating Class\n\n```\n#import \"CameraViewController.h\"\
    \n\n@implementation CameraViewController\n\n- (id)initWithNibName:(NSString *)nibNameOrNil\
    \ bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\
    \ bundle:nibBundleOrNil];\n    if (self) {\n        // Custom initialization\n\
    \    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view.\n}\n\n#pragma mark - action\
    \ handlers\n\n-(IBAction)takePictureButtonPressed:(id)sender\n{\n    [self.delegate\
    \ cameraViewController:self hasImage:self.capturedImage];\n}\n\n-(IBAction)cancelButtonPressed:(id)sender\n\
    {\n    [self.delegate cameraViewController:self didCancel:YES];\n}\n\n@end\n```\n\
    \nIn summary, the core concepts for protocols are as follows:\n\n1.  Define a\
    \ protocol by specifying its methods and their priorities.\n2.  Implement a protocol\
    \ in your target class by defining all its required methods.\n3.  Define an instance\
    \ of a generic delegate object in the source class, and use it to send protocol\
    \ messages.\n\n## Using the Image Picker to Access Saved Pictures"
