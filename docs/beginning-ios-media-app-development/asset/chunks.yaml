    Handling Different Screen Sizes


    While you do not need to add any extra configuration options to your `AVCaptureSession`
    to handle different screen sizes (for example, the iPad, iPhone 4S, or iPhone
    5), you will want to make sure you are following the best practices for universal
    (multi-device) user interface development.


    If you are using one storyboard for both your tablet and phone user interfaces,
    make sure you have enabled auto-layout for your camera controller interface so
    that it will grow (or shrink) with your screen size. It is a good idea to assign
    fixed dimensions to your controls while letting the preview area adjust to fill
    your screen size.


    In contrast, if you are using separate storyboards for your tablet and phone user
    interfaces, remember to lay out your camera controller on both storyboards. Make
    sure all your outlets and actions are set correctly on both storyboards, and try
    to optimize your user interface for each device. You may find that short captions
    or a limited set of exposed configuration options are appropriate for a phone
    interface, while expanded captions and a comprehensive set of configuration options
    are perfect for a tablet interface. Once again, try to let your preview area expand
    with the screen, as it is your user’s primary feedback interface.


    **Caution**  Remember, auto-layout is not available for NIB-based user interfaces,
    so be careful to duplicate your changes across all screen-size versions of an
    interface, or begin transitioning over to storyboards.


    Building a Custom Image Picker


    In this section, you will build a custom image picker, using the same logic as
    with the custom camera controller—to implement use cases. Apple does not provide
    a `UIImagePickerController` out of the box. For this app, you want to be able
    to theme the image picker, and be able to select multiple images before returning
    to the original view. [Figure 4-4](#9781430250838_Ch04.xhtml#Fig4) shows a flow
    diagram and mock-up of the image picker.


    ![9781430250838_Fig04-04.jpg](images/9781430250838_Fig04-04.jpg)


    [Figure 4-4](#9781430250838_Ch04.xhtml#_Fig4). Flow diagram and mock-up of the
    custom image picker


    Much like a `UIImagePickerController`, you want to present the image picker modally,
    dismissing it after users confirm their selection(s). Because this example adds
    functionality to a familiar user interface, it presents the thumbnail images in
    a grid implemented via the `UICollectionView` class. The app represents a selection
    by highlighting the selected item and displaying a filled-in check box over it.
    Deselecting an item will undo both those state changes. The app destroys the modal
    view after users have confirmed their changes or decided to cancel the view. The
    selected images will appear in a scrollable table view on the parent view controller.


    To accomplish this workflow, you need to perform the following steps, which are
    covered in this section:


    1.  Initialize a data source containing images from the camera roll.

    2.  Present these images in a `UICollectionView`.

    3.  Configure the `UICollectionView` to allow multiple selections.

    4.  Create a programmatic interface for returning selected images.


    You’ll be using the Assets Library framework as the data source. Because this
    framework and the `UICollectionView` class may be unfamiliar to most readers,
    you’ll also see background information on both.


    You can find the source code for this application in the [Chapter 4](#9781430250838_Ch04.xhtml)
    folder of the source code bundle. This project is called MyPicker.


    Instantiating an Asset Library as a Data Source


    The first step in building the photo browser is to instantiate a data source.
    While there is no API that will allow you to just “get all `UIImage`s on the device,”
    you can take advantage of the Assets Library framework to access all the photos
    and videos available through the Photos app.


    Asset libraries, represented by the `ALAssetsLibrary` class, provide a two-way
    interface to the Photos app for reading and writing photos and videos. You can
    look up assets by album, unique URL, or media type, and save assets to the Photos
    app or create new albums from within your apps. Additionally, as with other apps
    that access shared resources, you can query whether your app has permission to
    access the photos. While iOS does not have such concepts as a global file system,
    limited interfaces like this allow apps to share data in a safe, consistent way.


    To instantiate an Asset Library, you first add the `AssetsLibrary.framework` to
    the project. As with the MyCamera project, you can add the framework to your project
    by adding it to the Linked Frameworks and Libraries array under your project’s
    general settings.


    After adding the framework, include its header file in the target class:


    ```

    #import <AssetsLibrary/AssetsLibrary.h>

    ```


    **Note**  The `import` keyword allows you to reduce code size by checking for
    duplicates before adding a file, unlike the `include` keyword.


    Now that the groundwork is in place, you can instantiate an Assets Library:


    ```

    ALAssetsLibrary *assetsLibrary = [[ALAssetsLibrary alloc] init];

    ```


    Just as you need to select an album or timeline to view photos from the Photos
    app, you need to specify a *group* to discover assets through an Asset Library.
    Represented by the `ALAssetGroup` class, asset groups allow you to access a subset
    of assets from the Photos app based on one or more filters. While asset groups
    allow you to replicate some of the functionality of an `NSSet`, such as providing
    the number of items in the set, they also allow for more-advanced functionality
    and can provide information such as a thumbnail image for a group or permission
    status.


    To retrieve an asset group, use the Asset Library API `[ALAssetsLibrary enumerateGroupsWithTypes:usingBlock:failureBlock]`.
    You pass this API an `NSInteger` that represents the filters to include in the
    search, a block that will be called each time an `ALAssetGroup` is found, and
    a block that will be called if a failure occurs. Because there is no way of guaranteeing
    how processor- or time-intensive group lookup will be (a user could have hundreds
    of albums, many of which are hidden), block syntax is appropriate for this API.
    Blocks make apps faster by giving developers a way to run snippets of code in
    the background, freeing up the main thread for time-sensitive operations, such
    as feedback from user-interface elements (for example, catching button presses).


    [Listing 4-24](#9781430250838_Ch04.xhtml#list24) returns groups that represent
    photos in the Saved Photos and Photo Stream galleries. The example prints log
    messages upon success or failure.


