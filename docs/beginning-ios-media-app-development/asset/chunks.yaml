    For all long-running queries, you need to call the `[HKHealthStore stopQuery:]`
    method to stop receiving updates. As shown in [Listing 13-16](#9781430250838_Ch13.xhtml#list16),
    I make this call in the `[MainViewController dealloc]` method, to indicate that
    the application should stop receiving updates when it exits.


    [***Listing 13-16***](#9781430250838_Ch13.xhtml#_list16). Stopping an HKObserverQuery


