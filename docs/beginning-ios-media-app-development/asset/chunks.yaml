    With segues, the primary method for accessing the *destination* view controller
    is through the `destinationViewController` property. Because the `setPlayer` segue
    identifier is used only once in your storyboard, you know that the `destinationViewController`
    object points to the `AVPlayerViewController` you placed there. After casting,
    you have a valid object that you can use to set the `moviePlayer` property of
    the `MainViewController` class. (Remember, objects placed on a storyboard are
    initialized by their default constructor when loaded).


    Because you initialized the `AVPlayer` object in the `[FileViewDelegate didFinishWithFile:]`
    method (after the user selected a file from the file picker), your video player
    is now ready to use. When the user selects a media file, your video player will
    load the first frame of the video and the control bar for the player, indicating
    that it is ready for playback.


