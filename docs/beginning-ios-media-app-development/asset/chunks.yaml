    if (error == nil) {


    [self.audioPlayer play];

                self.playButton.titleLabel.text = @"Stop";


    } else {

                NSLog(@"error initializing Playing audio files:audio player: %@",

                      [error description]);

            }


    }

    }

    ```


    Note that rather than storing the recording file’s URL in a variable, you can
    grab it directly from the recording object via the `[AVAudioRecorder url]` property.
    One more caveat in this example is that it checks the recording status before
    playing back the file. You need to stop the recording before attempting to play
    back the file; otherwise, you will create a feedback loop (an endless echo) that
    will render your recording useless.


    Saving the Recording


    You do not need to do any extra work to save the recording. The `AVAudioRecorder`
    automatically closes the file buffer and saves the recording to disk as soon as
    the user chooses to stop recording.


    One major use case you need to cover is a user who expects to record multiple
    audio files. You can resolve this by using the `NSFileManager` class. To prevent
    a recorded file from being overwritten each time the user stops recording, call
    the `[NSFileManager fileExistsAtPath:]` instance method. To create unique file
    names, check to make sure the desired file does not exist before recording. If
    the file exists, add a unique identifier to the end of the file name, such as
    a count. [Listing 5-27](#9781430250838_Ch05.xhtml#list27) shows a modified version
    of the Record button handler that adds this logic before initializing the recorder
    object.


    [***Listing 5-27***](#9781430250838_Ch05.xhtml#_list27). Creating Unique File
    Names


    ```

    -(IBAction)record:(id)sender

    {

        NSError *error;


    AVAudioSession *audioSession = [AVAudioSession sharedInstance];

        [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord

                      error:&error];


    if (error == nil) {


    NSArray *paths =

                NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,


    NSUserDomainMask, YES);

            NSString *documentsDirectory = [paths objectAtIndex:0];


    NSString *filePath = [documentsDirectory

                stringByAppendingPathComponent:@"recording.m4a"];

            NSInteger count = 0;


    while ([[NSFileManager defaultManager]

                     fileExistsAtPath:filePath]) {

                NSString *fileName = [NSString

                    stringWithFormat:@"recording-%d", count];

                filePath = [documentsDirectory

                            stringByAppendingPathComponent:fileName];

                count++;

            }


    NSURL *fileURL = [NSURL fileURLWithPath:filePath];


    NSMutableDictionary *settingsDict = [NSMutableDictionary new];

            [settingsDict setObject:[NSNumber numberWithInt:44100.0]

                                     forKey:AVSampleRateKey];

            [settingsDict setObject:[NSNumber numberWithInt:2]

                                     forKey:AVNumberOfChannelsKey];

            [settingsDict setObject:[NSNumber

                                     numberWithInt:AVAudioQualityMedium]

                                     forKey:AVEncoderAudioQualityKey];

            [settingsDict setObject:[NSNumber numberWithInt:16]

                          forKey:AVEncoderBitRateKey];


    self.audioRecorder = [[AVAudioRecorder alloc]

                                   initWithURL:fileURL

                                   settings:settingsDict

                                   error:&error];


    if (error == nil) {


    if ([self.audioRecorder isRecording]) {


    [self.audioRecorder record];

                    self.recordButton.titleLabel.text = @"Stop";


    } else {

                    [self.audioRecorder stop];

                    self.recordButton.titleLabel.text = @"Record";


    }


    } else {

                NSLog(@"error initializing audio recorder: %@",

                      [error description]);

            }


    } else {

            NSLog(@"error initializing Playing audio files:audio session: %@",

                  [error description]);

        }

    }

    ```


    **Caution**  The only way to change the recording file path is by creating a new
    recorder object. Remember to notify the user of this in your app, either through
    an alert or by indicating that the old recording has completed.


    Deleting the Recording


    Sometimes, a user will be so unhappy with a recording and will want to delete
    it outright. To delete an active recording, use the `[AVAudioRecorder deleteRecording]`
    instance method, as shown in [Listing 5-28](#9781430250838_Ch05.xhtml#list28).
    This method deletes the file that you initialized the recorder object with. As
    with other recording events, make sure you stop the recorder before attempting
    to delete the file.


    [***Listing 5-28***](#9781430250838_Ch05.xhtml#_list28). Deleting an Audio Recording


    ```

    -(IBAction)delete:(id)sender

    {

        if ([self.audioRecorder isRecording]) {

            [self.audioRecorder stop];

        }


    [self.audioRecorder deleteRecording];

    }

    ```


    Summary


    In this chapter, you saw how to use the `AVAudioPlayer` and `AVAudioRecorder`
    classes to play and record audio within your app. You learned that, as when accessing
    the camera, both classes require you to use the `AVAudioSession` class as a gatekeeper
    to the system’s shared resources. Because of the indeterminate nature of starting
    a session, you saw how to implement an event-based flow for handling messages
    from the player and recorder. Remember that both classes are headless, so you
    have to implement the user interface—but doing so is straightforward. Finally,
    note that after having configured the session correctly for recording, there is
    a huge overlap in the concepts that drive the audio player and recorder.


    Chapter    6


