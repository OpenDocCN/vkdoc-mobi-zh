- fmt: '| Constant Name | Specified Behavior |

    | --- | --- |

    | `UIViewContentModeScaleToFill` | Stretches content to fit the aspect ratio of
    the view’s frame. |

    | `UIViewContentModeScaleAspectFit` | Scales content to fit in the view’s frame,
    while preserving the original aspect ratio. The rest of the frame displays the
    view’s background color (transparent by default). |

    | `UIViewContentModeCenter` | Centers content while preserving its original dimensions.
    |

    | `UIViewContentModeTop` | Aligns content to the top edge of the frame, while
    preserving its original dimensions. |

    | `UIViewContentModeLeft` | Aligns content to the left edge of the frame, while
    preserving its original dimensions. |


    The default `contentMode` for all `UIView` objects is `UIViewContentModeScaleToFill`,
    which stretches or shrinks your content to fit the bounds of the `UIView`. When
    selecting a `contentMode`, think about what your visual design references specify
    (or require for other elements). If you are centering an image in the middle of
    the screen and have no requirements on how the edges are aligned, `UIViewContentModeScaleAspectFill`
    is a safe option. When you need to preserve a specific edge, you may want to look
    at one of the edge-alignment options, such as `UIViewContentModeTop` or `UIViewContentModeLeft`.
    In the case where the content’s aspect ratio needs to be exactly as specified
    by the view, explore `UIViewContentModeScaleAspectFit`, or manually crop the image
    before presenting it.


    To specify a content mode, simply set the property on your `UIImageView` object:


    ```

    [myImageView setContentMode:UIViewContentModeScaleAspectFill];

    ```


    ## Using the UIImagePickerController Class to Select Images


    `UIImagePickerController` is Apple’s `UIViewController` subclass, which provides
    access to the system-wide camera controller and saved images thumbnail browser.
    When you configure the controller to use the camera as its data source, you will
    see the basic camera interface you are familiar with from the system’s built-in
    Camera app. When you configure the controller to use saved images, you will see
    the same thumbnail-based interface used in the Photos app. Through `UIImagePickerController`,
    Apple provides a quick way to import pictures into your apps, removing the burden
    of writing low-level hardware interfaces and letting you concentrate on high-level
    uses for photos.


