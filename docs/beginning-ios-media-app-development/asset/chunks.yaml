    Building Playback Controls


    Having created the user interface, initialized an `AVPlayer` object, and set up
    `MediaPlayer`-like notifications, you are ready to start implementing the playback
    controls and user-interface updates. The main controls for the `CustomPlayerController`
    include skipping forward or backward, toggling playback, and scrubbing to a specific
    time in the player. The user can dismiss the playback interface via the Done button
    in the top control view.


    Toggling Playback


    In the header file for the `CustomPlayerController` class, I declared `[CustomPlayerController
    togglePlayback:]` as the method to toggle playback state. To build a familiar
    user interface, use one button to start or stop playback. In order to determine
    which action should execute, add a `BOOL` instance variable to the `CustomPlayerController`
    class:


    ```

    @property (nonatomic, assign) BOOL isPlaying;

    ```


    You can control the playback, using the `[AVPlayer play]` and `[AVPlayer pause]`
    methods on your `AVPlayer` object. As shown in [Listing 9-13](#9781430250838_Ch09.xhtml#list13),
    to maintain state, update the `isPlaying` property and your user interface after
    starting or stopping playback.


    [***Listing 9-13***](#9781430250838_Ch09.xhtml#_list13). Toggling Playback


    ```

    -(IBAction)togglePlayback:(id)sender

    {

        if (self.isPlaying) {

            [self.player pause];


    [self.playbackButton setTitle:@"Play"

                forState:UIControlStateNormal];


    } else {

            [self.player play];


    [self.playbackButton setTitle:@"Pause"

                forState:UIControlStateNormal];


    }

        self.isPlaying = !self.isPlaying;

    }

    ```


    Skipping Forward/Backward


    Similar to how you can use the `AVPlayer` object to start or stop media playback,
    you can also use it to seek backward or forward a few seconds in playback. This
    is a convenient feature when users want to rewind to catch a shot they have missed,
    or skip a shot they are not interested in.


    To implement skipping, you will use a method similar to the one employed in [Chapter
    6](#9781430250838_Ch06.xhtml). Query the currently playing item for its playback
    position, and then check whether the desired time (+/- 5 seconds) is valid. If
    the user tries to skip backward less than 5 seconds into a video, skip to the
    beginning. If they try to skip forward with less than 5 seconds remaining, ignore
    the event. As with code for updating the user interface, you can determine the
    playback position of a file by querying the `currentTime` property on the `AVPlayerItem`
    object.'
