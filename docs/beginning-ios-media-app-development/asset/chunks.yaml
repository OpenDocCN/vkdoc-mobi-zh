    5.  Close the context to indicate that your image manipulation operation has completed,
    and that the view is ready for another operation.


    You will notice that many of the steps are related to setup and teardown. Graphics
    contexts are unique to each view, but shared within views. A graphics context
    is `nil` until you call the `UIGraphicsGetCurrentContext` helper method, which
    will try to retrieve the current context for the view or create a new one. To
    preserve your changes, you need to close the context you are working on before
    attempting any other operations.


    You can think of a context like a physical canvas. You can add items to a canvas,
    rotate them within the canvas without affecting the overall size, and even cut
    them to fit. Drawing an object is like gluing it down and cutting away the edges.
    Exporting is equivalent to calling the work of art ready and sending it to a framer.


    Resizing an Image


    To resize an image, the main operations you need to focus on are calculating your
    target image size and then drawing the image within that frame. As highlighted
    earlier, once you are satisfied with your changes, you need to export the resulting
    image from the context to *save* it.


    The most frequent reason for resizing an image is to create a *thumbnail*, a smaller
    version of an image that is appropriate for displaying in a collection of multiple
    items. When displaying a large number of items, you should optimize for speed
    by loading files that are small in both their file size and dimensions.


    After you have determined the bounding size (or limits) for your thumbnail (for
    example, 50 pixels by 50 pixels), you scale the image down to fit this frame.
    To preserve the aspect ratio of the image, you pick one dimension that will remain
    fixed and use that to calculate a scaling factor. [Figure 3-1](#9781430250838_Ch03.xhtml#Fig1)
    illustrates the process of resizing an image.


    ![9781430250838_Fig03-01.jpg](images/9781430250838_Fig03-01.jpg)


    [Figure 3-1](#9781430250838_Ch03.xhtml#_Fig1). Process of resizing an image


    **Note**  Using a fixed dimension lets you create a better user experience, by
    making the thumbnail images all the same width or height.


    You find the scaling factor by dividing your target (fixed) dimension by the matching
    dimension from the source image: For example, if you were matching heights, you
    would use the height of the image.


    ```

    CGSize originalImageSize = self.originalImage.size;

    float targetHeight = 150.0f;

    float scaleFactor = targetHeight / originalImageSize.height;

    ```


    You calculate your target frame by multiplying the remaining dimension by the
    scaling factor:


    ```

    float targetWidth = originalImageSize.width * scaleFactor;

    CGRect targetFrame = CGRectMake(0, 0, targetWidth, targetHeight);

    ```


    For the final step, you create your scaled-down image by creating a context based
    on the target frame size and calling the `[UIImage drawInRect:]` instance method
    to draw it on the context. When you are finished, save a snapshot of the context
    to a `UIImage` object and close the context:'
