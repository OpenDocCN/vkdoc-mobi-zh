- fmt: "iOS中的`AVAudioPlayer`类提供了一个“无头”接口，用于在应用内播放音频文件。该类允许您控制单个或多个文件的播放（例如播放、暂停和跳转），循环音频文件，并监控当前播放项目的音频电平。您可以对本地文件（例如应用文档目录中的文件）或网络资源（例如网络音频流）使用此类。本章涵盖本地音频播放；不过，您将在[第6章](#9781430250838_Ch06.xhtml)中了解网络流播放。\n\
    \n为了练习使用`AVAudioPlayer`类，您将构建[图5-1](#9781430250838_Ch05.xhtml#Fig1)所示的音乐播放器应用。\n\
    \n![9781430250838_Fig05-01.jpg](images/9781430250838_Fig05-01.jpg)\n\n[图5-1](#9781430250838_Ch05.xhtml#_Fig1).\
    \ 简易音频播放器模型\n\n此应用允许用户选择存储在其项目包中的音频文件并控制其播放。播放控件包括“播放/暂停”（取决于状态）、“快进”和“快退”（15秒）。为指示状态，应用会显示播放进度和当前播放文件的名称。\n\
    \n文件选择通过`UITableViewController`处理。用户可以通过单击文件名来选择文件，这将会关闭文件选择器。单击“取消”按钮也会关闭文件选择器。\n\
    \n为实现此功能，您需要执行以下操作：\n\n1.  向iOS请求音频播放权限。\n2.  构建用户界面以选择要播放的音频文件。\n3.  使用所选文件初始化音频播放器。\n\
    4.  构建用户界面以控制播放。\n\n您可以在Apress网站（`www.apress.com`）的源代码/下载区域中找到此应用程序的所有源代码，位于`MyPlayer`项目的[第5章](#9781430250838_Ch05.xhtml)文件夹中。\n\
    \n## 入门\n\n如[图5-1](#9781430250838_Ch05.xhtml#Fig1)所示，`MyPlayer`应用程序的主要控件位于主视图控制器上。\n\
    \n您从熟悉的方式开始：在Xcode中使用“单视图应用程序”模板创建一个项目。默认情况下，Xcode将使用`ViewController`类来表示您的主视图控制器；在`MyPlayer`项目中，此文件已重命名为`MainViewController`。您可以在Xcode中右键单击类名并从“重构”菜单中选择“重命名”来重命名一个类，如[图5-2](#9781430250838_Ch05.xhtml#Fig2)所示。\n\
    \n![9781430250838_Fig05-02.jpg](images/9781430250838_Fig05-02.jpg)\n\n[图5-2](#9781430250838_Ch05.xhtml#_Fig2).\
    \ 如何重命名类\n\n要实例化音频播放器，您需要在`MainViewController.h`中包含`AVAudioPlayer`类，这要求您在项目中包含`AVFoundation`框架。与[第4章](#9781430250838_Ch04.xhtml)中的示例一样，您可以通过在Xcode中选择项目文件并滚动到“通用”选项卡底部的“链接的框架和库”窗格来向项目添加框架，如[图5-3](#9781430250838_Ch05.xhtml#Fig3)所示。\n\
    \n![9781430250838_Fig05-03.jpg](images/9781430250838_Fig05-03.jpg)\n\n[图5-3](#9781430250838_Ch05.xhtml#_Fig3).\
    \ 向项目添加框架\n\n在主视图控制器上，使用多个`UIButton`实例来表示“播放/暂停”、“快进”、“快退”和“选择文件”控件。添加一个`UIProgressView`作为进度条，以及`UILabel`实例用于歌曲标题和播放时间。您可以使用[代码清单5-1](#9781430250838_Ch05.xhtml#list1)中的头文件作为连接到情节提要文件的输出口的示例。\n\
    \n[***代码清单5-1***](#9781430250838_Ch05.xhtml#_list1). `MyPlayer`主视图控制器的头文件\n\n\
    ```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import \"\
    FileViewController.h\"\n\n@interface MainViewController : UIViewController\n \
    \   <FileControllerDelegate,AVAudioPlayerDelegate>\n@property (nonatomic, strong)\
    \ IBOutlet UILabel *timeLabel;\n@property (nonatomic, strong) IBOutlet UILabel\
    \ *titleLabel;\n@property (nonatomic, strong) IBOutlet UIButton *chooseButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *playButton;\n@property (nonatomic,\
    \ strong) IBOutlet UIButton *skipForwardButton;\n@property (nonatomic, strong)\
    \ IBOutlet UIButton *skipBackwardButton;\n@property (nonatomic, strong) IBOutlet\
    \ UIProgressView *progressBar;\n@property (nonatomic, strong) NSString *selectedFilePath;\n\
    @property (nonatomic, strong) AVAudioPlayer *audioPlayer;\n@property (nonatomic,\
    \ strong) NSTimer *timer;\n\n-(IBAction)play:(id)sender;\n-(IBAction)skipForward:(id)sender;\n\
    -(IBAction)skipBackward:(id)sender;\n\n@end\n```\n\n在Xcode中使用“新建文件”命令，为文件选择器创建第二个视图控制器，它是`UITableViewController`的子类。在`MyPlayer`项目中，此类名为`FileViewController`。在Interface\
    \ Builder中进行适当的连接，以将此类绑定到您的情节提要。\n\n为了向文件选择器添加“取消”按钮，您需要将文件选择器嵌入到`UINavigationController`中。这会在视图顶部提供一个工具栏，您可以在其中添加栏按钮项。您可以通过在Xcode的“编辑器”菜单中选择“嵌入于”选项来轻松地向视图控制器添加导航控制器，如[图5-4](#9781430250838_Ch05.xhtml#Fig4)所示。\n\
    \n![9781430250838_Fig05-04.jpg](images/9781430250838_Fig05-04.jpg)\n\n[图5-4](#9781430250838_Ch05.xhtml#_Fig4).\
    \ 向视图控制器添加导航控制器\n\n您可以在[代码清单5-2](#9781430250838_Ch05.xhtml#list2)中找到`FileViewController`类的头文件。在您的头文件中，确保定义了一个用于传递消息的协议，以及情节提要所需的适当属性。\n\
    \n[***代码清单5-2***](#9781430250838_Ch05.xhtml#_list2). `FileViewController`类的头文件\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@protocol FileControllerDelegate <NSObject>\n\
    -(void)cancel;\n-(void)didFinishWithFile:(NSString *)filePath;\n@end\n\n@interface\
    \ FileViewController : UITableViewController\n@property (nonatomic, strong) NSMutableArray\
    \ *fileArray;\n@property (nonatomic, strong) id <FileControllerDelegate> delegate;\n\
    \n-(IBAction)closeView:(id)sender;\n\n@end\n```\n\n要完成您的情节提要，请连接所有操作和属性。确保“选择文件”按钮设置为模态呈现`FileViewController`，并确保`UITableViewController`的默认单元格具有一个重用标识符，以便您可以在代码中访问它。\n\
    \n您完成后的情节提要应类似于[图5-5](#9781430250838_Ch05.xhtml#Fig5)。\n\n![9781430250838_Fig05-05.jpg](images/9781430250838_Fig05-05.jpg)\n\
    \n[图5-5](#9781430250838_Ch05.xhtml#_Fig5). `MyPlayer`应用的完成后的情节提要\n\n我对`MyPlayer`应用程序的实现仅包含一个iPhone用户界面。如果您正在创建通用应用程序，请确保将相同的设置应用于您适用于iPad的情节提要。\n\
    \n## 配置音频会话\n\n与相机非常相似，您的iOS设备的音频功能是一种共享资源。Apple通过*音频会话*的概念（由`AVAudioSession`表示）提供对系统音频控制器的访问。所有iOS应用都带有一个默认的音频会话，但在您对其进行配置之前，您的应用将无法利用全部音频功能。\n\
    \n配置音频会话允许您指定应用将执行的音频活动类型（例如录制和播放）、应用应如何与其他竞争音频资源的应用交互的偏好（例如，混合音轨，忽略所有其他音频源），以及处理硬件事件（例如用户拔下耳机）的方式。"
  raw: 'The `AVAudioPlayer` class in iOS provides a *headless* interface for playing
    audio files within your app. This class allows you to control playback for single
    or multiple files (for example, play, pause, and seek), loop audio files, and
    monitor audio levels for currently playing items. You can use this class for both
    local files, such as those in your app’s documents directory, or for network resources,
    such as network audio streams. This chapter covers local audio playback; however,
    you will learn about network stream playback in [Chapter 6](#9781430250838_Ch06.xhtml).


    To practice using the `AVAudioPlayer` class, you will build the music player app
    shown in [Figure 5-1](#9781430250838_Ch05.xhtml#Fig1).


    ![9781430250838_Fig05-01.jpg](images/9781430250838_Fig05-01.jpg)


    [Figure 5-1](#9781430250838_Ch05.xhtml#_Fig1). Mock-up of simple audio player


    This app allows a user to select an audio file stored in the app’s project bundle
    and control its playback. The playback controls are Play/Pause (depending on state),
    Fast-Forward, and Rewind (15 seconds). To indicate status, the app shows playback
    progress and the name of the currently playing file.


    File selection is handled through a `UITableViewController`. The user can select
    a file by clicking its name, which dismisses the file picker. Clicking the Cancel
    button also dismisses the file picker.


    To enable this functionality, you need to do the following:


    1.  Request audio playback permission from iOS.

    2.  Build a user interface to select an audio file for playback.

    3.  Initialize the audio player with the selected file.

    4.  Build a user interface to control playback.


    You can find all the source code for this application in Source Code/Download
    area of the Apress web site (`www.apress.com`), in the MyPlayer project, in the
    [Chapter 5](#9781430250838_Ch05.xhtml) folder.


    Getting Started


    As shown in [Figure 5-1](#9781430250838_Ch05.xhtml#Fig1), the primary controls
    for the MyPlayer application are on the main view controller.


    You start out in a familiar manner by creating a project using the Single-View
    Application template in Xcode. By default, Xcode will use the `ViewController`
    class to represent your main view controller; in the MyPlayer project, this file
    has been renamed `MainViewController`. You can rename a class in Xcode by right-clicking
    it and selecting Rename from the Refactor menu, as shown in [Figure 5-2](#9781430250838_Ch05.xhtml#Fig2).


    ![9781430250838_Fig05-02.jpg](images/9781430250838_Fig05-02.jpg)


    [Figure 5-2](#9781430250838_Ch05.xhtml#_Fig2). How to rename a class


    To instantiate the audio player, you will need to include the `AVAudioPlayer`
    class in `MainViewController.h`, which will require you to include the `AVFoundation`
    framework in the project. As with the examples in [Chapter 4](#9781430250838_Ch04.xhtml),
    you can add a framework to a project by selecting your project file in Xcode and
    scrolling to the Linked Frameworks and Libraries pane at the bottom of the General
    tab, as shown in [Figure 5-3](#9781430250838_Ch05.xhtml#Fig3).


    ![9781430250838_Fig05-03.jpg](images/9781430250838_Fig05-03.jpg)


    [Figure 5-3](#9781430250838_Ch05.xhtml#_Fig3). Adding a framework to your project


    On the main view controller, use several `UIButton` instances to represent the
    Play/Pause, Fast-Forward, Rewind, and Choose File controls. Add a `UIProgressView`
    for the progress bar, and `UILabel` instances for the song title and playback
    time. You can use the header file in [Listing 5-1](#9781430250838_Ch05.xhtml#list1)
    as an example of outlets to connect to your storyboard file.


    [***Listing 5-1***](#9781430250838_Ch05.xhtml#_list1). Header File for MyPlayer
    main view controller


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import "FileViewController.h"


    @interface MainViewController : UIViewController

        <FileControllerDelegate,AVAudioPlayerDelegate>

    @property (nonatomic, strong) IBOutlet UILabel *timeLabel;

    @property (nonatomic, strong) IBOutlet UILabel *titleLabel;

    @property (nonatomic, strong) IBOutlet UIButton *chooseButton;

    @property (nonatomic, strong) IBOutlet UIButton *playButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;

    @property (nonatomic, strong) IBOutlet UIButton *skipBackwardButton;

    @property (nonatomic, strong) IBOutlet UIProgressView *progressBar;

    @property (nonatomic, strong) NSString *selectedFilePath;

    @property (nonatomic, strong) AVAudioPlayer *audioPlayer;

    @property (nonatomic, strong) NSTimer *timer;


    -(IBAction)play:(id)sender;

    -(IBAction)skipForward:(id)sender;

    -(IBAction)skipBackward:(id)sender;


    @end

    ```


    Using the New File command in Xcode, create a second view controller for the file
    picker, which is a subclass of `UITableViewController`. In the MyPlayer project,
    this class is named `FileViewController`. Make the appropriate connections in
    Interface Builder to tie this class to your storyboard.


    In order to add a Cancel button to the file picker, you will need to embed the
    file picker in a `UINavigationController`. This gives you a toolbar at the top
    of the view that you can add bar button items to. You can easily add a navigation
    controller to a view controller by selecting the Embed In option from the Editor
    menu in Xcode, as shown in [Figure 5-4](#9781430250838_Ch05.xhtml#Fig4).


    ![9781430250838_Fig05-04.jpg](images/9781430250838_Fig05-04.jpg)


    [Figure 5-4](#9781430250838_Ch05.xhtml#_Fig4). Adding a navigation controller
    to a view controller


    You can find a header for the `FileViewController` class in [Listing 5-2](#9781430250838_Ch05.xhtml#list2).
    In your header file, make sure you define a protocol for passing back messages
    and the appropriate properties for your storyboard.


    [***Listing 5-2***](#9781430250838_Ch05.xhtml#_list2). Header File for FileViewController
    Class


    ```

    #import <UIKit/UIKit.h>


    @protocol FileControllerDelegate <NSObject>

    -(void)cancel;

    -(void)didFinishWithFile:(NSString *)filePath;

    @end


    @interface FileViewController : UITableViewController

    @property (nonatomic, strong) NSMutableArray *fileArray;

    @property (nonatomic, strong) id <FileControllerDelegate> delegate;


    -(IBAction)closeView:(id)sender;


    @end

    ```


    To complete your storyboard, connect all of the actions and properties. Make sure
    the Choose File button is set to present the `FileViewController` modally, and
    make sure the default cell for the `UITableViewController` has a *reuse identifier*
    so that you can access it in your code.


    Your completed storyboard should look like [Figure 5-5](#9781430250838_Ch05.xhtml#Fig5).


    ![9781430250838_Fig05-05.jpg](images/9781430250838_Fig05-05.jpg)


    [Figure 5-5](#9781430250838_Ch05.xhtml#_Fig5). Completed storyboard for MyPlayer
    app


    My implementation of the MyPlayer application includes only an iPhone user interface.
    If you are creating a universal application, make sure you apply the same settings
    to your iPad-specific storyboard.


    Configuring an Audio Session


    Much like the camera, your iOS device’s audio capabilities are a shared resource.
    Apple provides access to the system’s audio controller via the concept of an *audio
    session*, represented by `AVAudioSession`. All iOS apps come with a default audio
    session, but your app will not be able to take advantage of the full range of
    audio features until you configure it.


    Configuring an audio session allows you to specify the type of audio activities
    your app will be performing (such as recording and playback), your preferences
    for how your app should interact with other apps competing for audio resources
    (for example, mixing tracks, ignoring all other audio sources), and ways to handle
    hardware events (such as a user unplugging the headphones).'
