  raw: 'The *receiver* (calling class) for this message is the object that needs to
    be observed; in this case, the array itself. The *observer* is the class that
    acts like a delegate and receives messages based on the indicated value change.
    `key path` is the property of the object that you want to observe; the name is
    passed as a case-sensitive string. The `options` parameter lets you specify how
    information should be sent to the handler method. For example, you can pare down
    the frequency of messages (the default value of `nil` is sufficient for most beginning
    applications). The `context` parameter lets you to specify an “original value”
    to compare against in your handler method. Once again, `nil` is sufficient for
    most beginning applications.


    Unlike a notification, the `NSObject` method handles all key-value observers by
    using `[NSObject observeValueForKeyPath:ofObject:change:context]`. For the array
    example, your handler method would look like this:


    `-(void)observeValueForKeyPath:(NSString *)keyPath`

         `ofObject:(id)object change:(NSDictionary *)change`

         `context:(void *)context`

    `{`

        `if ((object == self.peopleArray) &&`

             `[keyPath isEqualToString:@"count"] ) {`

                 `NSLog(@"new count!", [self.peopleArray count]);`

         `}`

    `}`


    The parameters for handling a KVO message correspond in a one-to-one relationship
    with the parameters you used to declare your observer. The unfamiliar part should
    be the handling logic. Because one method handles all the messages, you need to
    check that the message originated from the object you specified. If you are using
    an instance variable, you would compare the object directly; if you wanted to
    use a local variable, you could compare the object type. Additionally, you need
    to check that the message corresponds to the expected property (because you can
    observe multiple properties on the same object).


    Finally, to remove an observer, you call the `[``NSObject` `removeObserver:forKeyPath]`
    method on the receiving object, during the tear-down process for your class. For
    the array example, it would look like this:


    `-(void)dealloc`

    `{`

        `[self.peopleArray removeObserver:self forKeyPath:@"count"];`

    `}`


    Just as with notifications, a KVO message could fire after you have torn down
    your class; cleaning up your observer will prevent crashes. If you are reinitializing
    an instance variable at runtime, it is wise to remove the observer as part of
    your reset step.


    Loading Complete Event


    As you may remember from [Chapter 8](#9781430250838_Ch08.xhtml), after selecting
    a media file, you immediately called the `[MPMediaPlayer prepareToPlay]` method
    to start loading it. After the file was loaded, the `MPMoviePlayerLoadStateChanged`
    notification fired, indicating the file was ready for playback. Upon receipt of
