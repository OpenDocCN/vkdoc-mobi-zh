    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n请注意，上述代码在将文件路径发送到音频播放器之前，将其转换为`URL`。虽然文件路径和`URL`都是文件位置的有效引用，但您需要将文件路径转换为`NSURL`数据类型以符合`API`要求。您可能想知道为什么没有使用基于`NSData`的`init`方法。要使用此方法，您需要将文件加载到内存中。虽然这对于从网络源下载的文件（您不想将文件保存到磁盘）是合适的，但它会为此应用程序增加不必要的开销。\n\
    \n## 构建播放界面\n\n现在音频播放器已初始化，您可能认为应用程序已准备好开始播放文件。不幸的是，`AVAudioPlayer`是一个*无界面*类，意味着它不提供用户界面。要开始和控制音频播放，您需要通过用户操作来触发它们。\n\
    \n### 开始或暂停播放\n\n音频播放器的主要控件是“播放”按钮。顾名思义，用户将使用它来启动播放。它有两个作用：如果音乐文件正在播放，您可以允许用户通过单击此按钮暂停播放。\n\
    \n使用音频播放器开始播放的方法是`[AVAudioPlayer play]`，它告诉音频播放器开始处理输入文件，并在播放器准备好后自动开始播放。您应该从“播放”按钮的按钮处理程序中调用此方法，如列表\
    \ 5-14 所示。确保在`Interface Builder`中将此功能连接到您的故事板。\n\n***列表 5-14***. 启动音频播放\n\n```\n\
    -(IBAction)play:(id)sender\n{\n    [self.audioPlayer play];\n}\n```\n\n与图像不同，音频和视频文件被系统视为数据流，需要额外的时间来建立内存缓冲区，以便可以预加载数据。缓冲区允许播放器拥有足够的数据，从而能够以默认速度（1x）播放文件。不幸的是，您无法预测填充缓冲区需要多长时间，因此`[AVAudioPlayer\
    \ play]`方法是*异步的*（意味着它不会阻塞应用程序中的其他事件）。\n\n**注意** 您可以使用`[AVAudioPlayer prepareToPlay]`方法强制音频播放器缓冲文件。此方法作为`[AVAudioPlayer\
    \ play]`的一部分自动调用，但单独调用它可以提升用户体验，特别是当您不希望在用户选择文件后立即自动开始播放时。\n\n此时，您的应用程序可以播放文件，但尚不能暂停。`[AVAudioPlayer\
    \ pause:]`可以使播放器暂停。然而，在调用暂停方法之前，您应该检查音频播放器当前是否正在播放文件。您可以通过`[AVAudioPlayer isPlaying]`属性查询音频播放器的播放状态，如列表\
    \ 5-15 中的示例所示。\n\n***列表 5-15***. 使用播放状态确定按钮操作\n\n```\n-(IBAction)play:(id)sender\n\
    {\n    if ([self.audioPlayer isPlaying]) {\n        [self.audioPlayer pause];\n\
    \        self.playButton.titleLabel.text = @\"Play\";\n    } else {\n        [self.audioPlayer\
    \ play];\n        self.playButton.titleLabel.text = @\"Pause\";\n    }\n\n}\n\
    ```\n\n除了更改操作外，代码还更改了按钮的标题。这是一个关键步骤，因为您希望在界面上向用户反映状态变化。\n\n为了完成播放周期，您需要在播放完成时重置用户界面。您可能还记得，设置音频播放器的第一步之一是声明主视图控制器将实现`AVAudioPlayerDelegate`协议。当播放器完成播放文件时发送的委托方法是`audioPlayerDidFinishPlaying:Successfully:`。如列表\
    \ 5-16 所示，您需要做的就是在收到此消息时重置“播放”按钮的文本。由于应用程序使用运行时逻辑来确定操作，因此您不需要重新连接按钮。\n\n***列表\
    \ 5-16***. 使用委托重置用户界面\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
    \ *)player\n                                    successfully:(BOOL)flag\n{\n \
    \   if (flag) {\n        self.playButton.titleLabel.text = @\"Play\";\n    }\n\
    }\n```\n\n### 快进或快退\n\n现在您可以播放或暂停文件，接下来可以转向另一个常见的播放功能：快进或快退。与“播放”按钮一样，应用程序通过按钮处理程序控制这些功能。然而，与“播放”按钮不同，这些功能是离散的，因此每个功能应该有一个独立的`UI`元素。\n\
    \n您可以通过将`[AVAudioPlayer currentTime]`属性的值设置为所需的时间，强制音频播放器跳转到文件中的特定时间点。对于此应用程序，您希望能够快进或快退\
    \ 15 秒。\n\n对于快进功能，您可以通过将当前时间值加上 15 来获得所需时间，该值来自音频播放器。`NSTimeInterval`数据类型以秒为单位计数。为了防止用户跳过文件末尾（这是一个无效操作），在设置播放器的新时间值之前，您需要将新計算的目标时间与文件的时长进行比较。您可以使用`[AVAudioPlayer\
    \ duration]`属性从音频播放器获取当前文件的时长。\n\n列表 5-17 展示了快进的实现。\n\n***列表 5-17***. 快进按钮处理程序\n\
    \n```\n-(IBAction)skipForward:(id)sender\n{\n    if ([self.audioPlayer isPlaying])\
    \ {\n\nNSTimeInterval desiredTime =\n            self.audioPlayer.currentTime\
    \ + 15.0f;\n        if (desiredTime < self.audioPlayer.duration) {\n         \
    \   self.audioPlayer.currentTime = desiredTime;\n        }\n    }\n}\n```\n\n\
    您遵循类似的逻辑来实现快退。但是，不是检查文件的时长，而是将计算出的时间与 0（文件开始处）进行比较。如果用户在播放时间少于 15 秒时尝试快退，则将其发送到文件开头。否则，将其发送到当前位置前\
    \ 15 秒的位置。列表 5-18 展示了一个示例。\n"
- fmt: "# Listing 5-18: Button Handler for Skipping Backward\n\n```\n-(IBAction)skipBackward:(id)sender\n\
    {\n    if ([self.audioPlayer isPlaying]) {\n        NSTimeInterval desiredTime\
    \ =\n            self.audioPlayer.currentTime - 15.0f;\n        if (desiredTime\
    \ < 0) {\n            self.audioPlayer.currentTime = 0.0f;\n        } else {\n\
    \            self.audioPlayer.currentTime = desiredTime;\n        }\n    }\n}\n\
    ```\n\n**Caution** While you might think you could use the `AVAudioPlayer` method\
    \ `[AVAudioPlayer playAtTime:]` to seek to a certain point in a file’s timeline,\
    \ this is not a use case the API supports. Instead, this method is intended to\
    \ delay the start time of the player, which would be useful if, for example, you\
    \ wanted to display a countdown timer or perform another action before an audio\
    \ file starts playing.\n\n## Displaying Playback Progress\n\nAs the final piece\
    \ of your music player app, you want to be able to display the progress for the\
    \ currently playing track. Unfortunately, there is no delegate method or notification\
    \ that will automatically give you this value. However, you can accomplish the\
    \ desired result by using an `NSTimer` that fires every second.\n\nThe `NSTimer`\
    \ class triggers a method after a specified time delay or on a recurring basis.\
    \ You initialize timers by using a time interval that specifies the delay between\
    \ calls, the method selector that needs to be called when the timer fires, and\
    \ whether or not the timer should repeat. A caveat with repeating timers is that\
    \ they will fire until specifically *invalidated* (stopped), so you need to maintain\
    \ a pointer to the timer. You can do this by declaring your timer as an instance\
    \ variable in the main view controller:\n\n```\n@property (nonatomic, strong)\
    \ NSTimer *timer;\n```\n\nYou want to start the timer when the user hits the Play\
    \ button, so place your initialization code in the Play button handler, as shown\
    \ in Listing 5-19. The Play button is managed by your storyboard, so it does not\
    \ need to be initialized when changing state, only updated.\n\n### Listing 5-19:\
    \ Initializing a Timer When the User Starts Playing a File\n\n```\n-(IBAction)play:(id)sender\n\
    {\n    if ([self.audioPlayer isPlaying]) {\n        [self.audioPlayer pause];\n\
    \        self.playButton.titleLabel.text = @\"Play\";\n        self.timer = [NSTimer\
    \ timerWithTimeInterval:1.0f target:self\n            selector:@selector(updateProgress)\
    \ userInfo:nil\n            repeats:YES];\n\n} else {\n        [self.audioPlayer\
    \ play];\n        self.playButton.titleLabel.text = @\"Pause\";\n        [self.timer\
    \ invalidate];\n    }\n\n}\n```\n\nYou may be wondering why the timer object is\
    \ reinitialized when playback is started, and destroyed when playback stops. There\
    \ is no way to pause a timer, except by destroying it using the `[NSTimer invalidate]`\
    \ method. For this reason, you need to re-create the timer to restart it. The\
    \ `audioPlayer` object does not need to be reinitialized because it is an instance\
    \ variable, and is reset only when you change files.\n\nThis example specifies\
    \ `[self updateProgress]` as the method to call whenever the timer fires. Therefore,\
    \ you will want to update the progress bar and progress label with the player’s\
    \ current time and song duration in that method. As with the skip forward/backward\
    \ examples, you can use the `[AVAudioPlayer currentTime]` and `[AVAudioPlayer\
    \ duration]` properties to retrieve these values. Listing 5-20 shows an implementation\
    \ of the `[self updateProgress]` method for the main view controller.\n\n### Listing\
    \ 5-20: Method to Update Progress Bar and Label\n\n```\n-(void)updateProgress\n\
    {\n    NSInteger durationMinutes = [self.audioPlayer duration] / 60;\n    NSInteger\
    \ durationSeconds = [self.audioPlayer duration] –\n                          \
    \       durationMinutes * 60;\n\nNSInteger currentTimeMinutes = [self.audioPlayer\
    \ currentTime] / 60;\n    NSInteger currentTimeSeconds = [self.audioPlayer currentTime]\
    \ –\n                                    currentTimeMinutes * 60;\n    NSString\
    \ *progressString =\n       [NSString stringWithFormat:@\"%d:%02d / %d:%02d\"\
    ,\n       currentTimeMinutes, currentTimeSeconds, durationMinutes,\n       durationSeconds];\n\
    \    self.timeLabel.text = progressString;\n\nself.progressBar.progress = [self.audioPlayer\
    \ currentTime] /\n                                [self.audioPlayer duration];\n\
    \n}\n```\n\nThere are two interesting things about the preceding code. First,\
    \ to display the time in a human-readable format, it extracts the minutes and\
    \ seconds from the raw seconds output of the current time and progress values.\
    \ While displaying total seconds is a perfectly valid way of representing progress,\
    \ it is not one that your users will be able to make much use of. Second, the\
    \ method simply passes a division result to the progress bar. The `UIProgressView`\
    \ represents the *full* status of the progress bar based on the `[UIProgressView\
    \ progress]` property, which is a value between `0.0` and `1.0`. By dividing the\
    \ current time by the duration, you get an accurate progress value to pass along.\n\
    \nWhile it is great that everything is working now, you must take a final step\
    \ to make sure the progress is updated correctly the *next* time you try to play\
    \ a file: you need to invalidate the timer. You already saw how to invalidate\
    \ the timer when the user presses the Pause button; now you also need to invalidate\
    \ the timer when the file has finished playing. Listing 5-21 shows an example\
    \ of the modified `audioPlayerDidFinishPlaying:successfully` delegate method.\n\
    \n### Listing 5-21: Invalidating the Timer in the Audio Player Delegate Method\n\
    \n```\n -(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player\n         \
    \                            successfully:(BOOL)flag\n{\n    if (flag) {\n   \
    \     self.playButton.titleLabel.text = @\"Play\";\n        [self.timer invalidate];\n\
    \    }\n}\n```\n\n## Recording Audio Files\n\nYou can apply many of the lessons\
    \ you learned from playing back audio to the process of recording audio. As with\
    \ playing audio, you need to request permission for the audio session before you\
    \ can use the audio hardware, and some delay may occur. Similarly, you can use\
    \ an event-driven class to start/stop the recording, `AVAudioRecorder`, which\
    \ is also headless.\n\nThe additional requirements that come from using the audio\
    \ recorder are as follows:\n\n- You need an audio session capable of recording.\n\
    - You need to configure the microphone before using it.\n- You need to build a\
    \ playback interface to preview your recordings.\n\nTo learn how to use the `AVAudioRecorder`\
    \ class, you will build the audio recorder player app shown in Figure 5-8.\n\n\
    ![9781430250838_Fig05-08.jpg](images/9781430250838_Fig05-08.jpg)\n\n**Figure 5-8**.\
    \ Mock-up of simple audio recorder\n\nThe only input in this app is the audio\
    \ recorder, so you can implement it as a single-view application. The user triggers\
    \ recording via the microphone button. Like the Play button from the audio player\
    \ app, the state of this button changes to `stop` when recording is active. To\
    \ allow the user to preview the recording, you can reuse the playback interface\
    \ from the audio player app. This app also provides a Reset button so users can\
    \ delete the recording if they are not satisfied with it.\n\nYou can find all\
    \ the source code for this application in the `MyRecorder` project, in the Chapter\
    \ 6 folder of the source code bundle.\n\n### Getting Started\n\nFor this project,\
    \ you can reuse most of your work from the audio player app as a base. The main\
    \ additions are as follows:\n\n- Adding an audio recorder object to your main\
    \ view controller\n- Adding controls for recording\n- Adding extra logic to enable\
    \ playback from the audio recorder."
  raw: '[***Listing 5-18***](#9781430250838_Ch05.xhtml#_list18). Button Handler for
    Skipping Backward


    ```

    -(IBAction)skipBackward:(id)sender

    {

        if ([self.audioPlayer isPlaying]) {

            NSTimeInterval desiredTime =

                self.audioPlayer.currentTime - 15.0f;

            if (desiredTime < 0) {

                self.audioPlayer.currentTime = 0.0f;

            } else {

                self.audioPlayer.currentTime = desiredTime;

            }

        }

    }

    ```


    **Caution**  While you might think you could use the `AVAudioPlayer` method `[AVAudioPlayer
    playAtTime:]` to seek to a certain point in a file’s timeline, this is not a use
    case the API supports. Instead, this method is intended to delay the start time
    of the player, which would be useful if, for example, you wanted to display a
    countdown timer or perform another action before an audio file starts playing.


    Displaying Playback Progress


    As the final piece of your music player app, you want to be able to display the
    progress for the currently playing track. Unfortunately, there is no delegate
    method or notification that will automatically give you this value. However, you
    can accomplish the desired result by using an `NSTimer` that fires every second.


    The `NSTimer` class triggers a method after a specified time delay or on a recurring
    basis. You initialize timers by using a time interval that specifies the delay
    between calls, the method selector that needs to be called when the timer fires,
    and whether or not the timer should repeat. A caveat with repeating timers is
    that they will fire until specifically *invalidated* (stopped), so you need to
    maintain a pointer to the timer. You can do this by declaring your timer as an
    instance variable in the main view controller:


    ```

    @property (nonatomic, strong) NSTimer *timer;

    ```


    You want to start the timer when the user hits the Play button, so place your
    initialization code in the Play button handler, as shown in [Listing 5-19](#9781430250838_Ch05.xhtml#list19).
    The Play button is managed by your storyboard, so it does not need to be initialized
    when changing state, only updated.


    [***Listing 5-19***](#9781430250838_Ch05.xhtml#_list19). Initializing a Timer
    When the User Starts Playing a File


    ```

    -(IBAction)play:(id)sender

    {

        if ([self.audioPlayer isPlaying]) {

            [self.audioPlayer pause];

            self.playButton.titleLabel.text = @"Play";

            self.timer = [NSTimer timerWithTimeInterval:1.0f target:self

                selector:@selector(updateProgress) userInfo:nil

                repeats:YES];


    } else {

            [self.audioPlayer play];

            self.playButton.titleLabel.text = @"Pause";

            [self.timer invalidate];

        }


    }

    ```


    You may be wondering why the timer object is reinitialized when playback is started,
    and destroyed when playback stops. There is no way to pause a timer, except by
    destroying it using the `[NSTimer invalidate]` method. For this reason, you need
    to re-create the timer to restart it. The `audioPlayer` object does not need to
    be reinitialized because it is an instance variable, and is reset only when you
    change files.


    This example specifies `[self updateProgress]` as the method to call whenever
    the timer fires. Therefore, you will want to update the progress bar and progress
    label with the player’s current time and song duration in that method. As with
    the skip forward/backward examples, you can use the `[AVAudioPlayer currentTime]`
    and `[AVAudioPlayer duration]` properties to retrieve these values. [Listing 5-20](#9781430250838_Ch05.xhtml#list20)
    shows an implementation of the `[self updateProgress]` method for the main view
    controller.


    [***Listing 5-20***](#9781430250838_Ch05.xhtml#_list20). Method to Update Progress
    Bar and Label


    ```

    -(void)updateProgress

    {

        NSInteger durationMinutes = [self.audioPlayer duration] / 60;

        NSInteger durationSeconds = [self.audioPlayer duration] –

                                     durationMinutes * 60;


    NSInteger currentTimeMinutes = [self.audioPlayer currentTime] / 60;

        NSInteger currentTimeSeconds = [self.audioPlayer currentTime] –

                                        currentTimeMinutes * 60;

        NSString *progressString =

           [NSString stringWithFormat:@"%d:%02d / %d:%02d",

           currentTimeMinutes, currentTimeSeconds, durationMinutes,

           durationSeconds];

        self.timeLabel.text = progressString;


    self.progressBar.progress = [self.audioPlayer currentTime] /

                                    [self.audioPlayer duration];


    }

    ```


    There are two interesting things about the preceding code. First, to display the
    time in a human-readable format, it extracts the minutes and seconds from the
    raw seconds output of the current time and progress values. While displaying total
    seconds is a perfectly valid way of representing progress, it is not one that
    your users will be able to make much use of. Second, the method simply passes
    a division result to the progress bar. The `UIProgressView` represents the *full*
    status of the progress bar based on the `[UIProgressView progress]` property,
    which is a value between `0.0` and `1.0`. By dividing the current time by the
    duration, you get an accurate progress value to pass along.


    While it is great that everything is working now, you must take a final step to
    make sure the progress is updated correctly the *next* time you try to play a
    file: you need to invalidate the timer. You already saw how to invalidate the
    timer when the user presses the Pause button; now you also need to invalidate
    the timer when the file has finished playing. [Listing 5-21](#9781430250838_Ch05.xhtml#list21)
    shows an example of the modified `audioPlayerDidFinishPlaying:successfully` delegate
    method.


    [***Listing 5-21***](#9781430250838_Ch05.xhtml#_list21). Invalidating the Timer
    in the Audio Player Delegate Method


    ```

     -(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player

                                         successfully:(BOOL)flag

    {

        if (flag) {

            self.playButton.titleLabel.text = @"Play";

            [self.timer invalidate];

        }

    }

    ```


    Recording Audio Files


    You can apply many of the lessons you learned from playing back audio to the process
    of recording audio. As with playing audio, you need to request permission for
    the audio session before you can use the audio hardware, and some delay may occur.
    Similarly, you can use an event-driven class to start/stop the recording, `AVAudioRecorder`,
    which is also headless.


    The additional requirements that come from using the audio recorder are as follows:


    *   You need an audio session capable of recording.

    *   You need to configure the microphone before using it.

    *   You need to build a playback interface to preview your recordings.


    To learn how to use the `AVAudioRecorder` class, you will build the audio recorder
    player app shown in [Figure 5-8](#9781430250838_Ch05.xhtml#Fig8).


    ![9781430250838_Fig05-08.jpg](images/9781430250838_Fig05-08.jpg)


    [Figure 5-8](#9781430250838_Ch05.xhtml#_Fig8). Mock-up of simple audio recorder


    The only input in this app is the audio recorder, so you can implement it as a
    single-view application. The user triggers recording via the microphone button.
    Like the Play button from the audio player app, the state of this button changes
    to `stop` when recording is active. To allow the user to preview the recording,
    you can reuse the playback interface from the audio player app. This app also
    provides a Reset button so users can delete the recording if they are not satisfied
    with it.


    You can find all the source code for this application in the MyRecorder project,
    in the [Chapter 6](#9781430250838_Ch06.xhtml) folder of the source code bundle.


    Getting Started


    For this project, you can reuse most of your work from the audio player app as
    a base. The main additions are as follows:


    *   Adding an audio recorder object to your main view controller

    *   Adding controls for recording

    *   Adding extra logic to enable playback from the audio recorder.'
  trans: "\n# 列表 5-18：后退按钮的处理方法\n\n```\n-(IBAction)skipBackward:(id)sender\n{\n  \
    \  if ([self.audioPlayer isPlaying]) {\n        NSTimeInterval desiredTime =\n\
    \            self.audioPlayer.currentTime - 15.0f;\n        if (desiredTime <\
    \ 0) {\n            self.audioPlayer.currentTime = 0.0f;\n        } else {\n \
    \           self.audioPlayer.currentTime = desiredTime;\n        }\n    }\n}\n\
    ```\n\n**注意** 虽然你可能认为可以使用 `AVAudioPlayer` 的 `[AVAudioPlayer playAtTime:]` 方法来跳转到文件时间线上的某个特定点，但这并非该\
    \ API 支持的用例。实际上，此方法旨在延迟播放器的开始时间，例如，如果你想在音频文件开始播放前显示倒计时或执行其他操作，它会非常有用。\n\n## 显示播放进度\n\
    \n作为音乐播放器应用的最后一个部分，你希望能够显示当前播放曲目的进度。遗憾的是，没有委托方法或通知会自动提供这个值。不过，你可以通过使用一个每秒触发一次的\
    \ `NSTimer` 来实现所需的结果。\n\n`NSTimer` 类会在指定的时间延迟后或按重复周期触发一个方法。初始化定时器时，需要指定调用之间的延迟时间间隔、定时器触发时要调用的方法选择器，以及定时器是否应重复。重复定时器的一个注意事项是，它们会一直触发直到被专门*失效*（停止），因此你需要维护一个指向定时器的指针。你可以通过在主视图控制器中将定时器声明为实例变量来实现这一点：\n\
    \n```\n@property (nonatomic, strong) NSTimer *timer;\n```\n\n你希望在用户按下“播放”按钮时启动定时器，因此将初始化代码放在播放按钮的处理方法中，如列表\
    \ 5-19 所示。播放按钮由你的故事板管理，因此在状态改变时无需初始化，只需更新即可。\n\n### 列表 5-19：用户开始播放文件时初始化定时器\n\n\
    ```\n-(IBAction)play:(id)sender\n{\n    if ([self.audioPlayer isPlaying]) {\n\
    \        [self.audioPlayer pause];\n        self.playButton.titleLabel.text =\
    \ @\"Play\";\n        self.timer = [NSTimer timerWithTimeInterval:1.0f target:self\n\
    \            selector:@selector(updateProgress) userInfo:nil\n            repeats:YES];\n\
    \n} else {\n        [self.audioPlayer play];\n        self.playButton.titleLabel.text\
    \ = @\"Pause\";\n        [self.timer invalidate];\n    }\n\n}\n```\n\n你可能想知道为什么在开始播放时要重新初始化定时器对象，而在停止播放时销毁它。除了使用\
    \ `[NSTimer invalidate]` 方法销毁定时器外，没有其他方法可以暂停定时器。因此，你需要重新创建定时器来重新启动它。`audioPlayer`\
    \ 对象无需重新初始化，因为它是一个实例变量，并且仅在更换文件时才重置。\n\n此示例指定 `[self updateProgress]` 为定时器触发时调用的方法。因此，你需要在该方法中使用播放器的当前时间和歌曲持续时间来更新进度条和进度标签。与快进/快退示例类似，你可以使用\
    \ `[AVAudioPlayer currentTime]` 和 `[AVAudioPlayer duration]` 属性来获取这些值。列表 5-20\
    \ 展示了主视图控制器的 `[self updateProgress]` 方法的实现。\n\n### 列表 5-20：更新进度条和标签的方法\n\n```\n\
    -(void)updateProgress\n{\n    NSInteger durationMinutes = [self.audioPlayer duration]\
    \ / 60;\n    NSInteger durationSeconds = [self.audioPlayer duration] –\n     \
    \                            durationMinutes * 60;\n\nNSInteger currentTimeMinutes\
    \ = [self.audioPlayer currentTime] / 60;\n    NSInteger currentTimeSeconds = [self.audioPlayer\
    \ currentTime] –\n                                    currentTimeMinutes * 60;\n\
    \    NSString *progressString =\n       [NSString stringWithFormat:@\"%d:%02d\
    \ / %d:%02d\",\n       currentTimeMinutes, currentTimeSeconds, durationMinutes,\n\
    \       durationSeconds];\n    self.timeLabel.text = progressString;\n\nself.progressBar.progress\
    \ = [self.audioPlayer currentTime] /\n                                [self.audioPlayer\
    \ duration];\n\n}\n```\n\n上述代码中有两个有趣的地方。首先，为了以人类可读的格式显示时间，它从当前时间和进度值的原始秒数输出中提取了分钟和秒。虽然显示总秒数是一种完全有效的表示进度的方式，但你的用户无法很好地利用它。其次，该方法只是将除法结果传递给进度条。`UIProgressView`\
    \ 根据 `[UIProgressView progress]` 属性表示进度条的*完整*状态，该属性的值介于 `0.0` 和 `1.0` 之间。通过将当前时间除以总时长，你可以得到一个精确的进度值进行传递。\n\
    \n虽然一切正常运转很好，但你还要完成最后一步，以确保*下次*尝试播放文件时进度能正确更新：你需要使定时器失效。你已经看到了当用户按下“暂停”按钮时如何使定时器失效；现在，你还需要在文件播放完毕时使定时器失效。列表\
    \ 5-21 展示了修改后的 `audioPlayerDidFinishPlaying:successfully` 委托方法的示例。\n\n### 列表 5-21：在音频播放器委托方法中使定时器失效\n\
    \n```\n -(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player\n         \
    \                            successfully:(BOOL)flag\n{\n    if (flag) {\n   \
    \     self.playButton.titleLabel.text = @\"Play\";\n        [self.timer invalidate];\n\
    \    }\n}\n```\n\n## 录制音频文件\n\n你可以将从播放音频中学到的许多知识应用到音频录制过程中。与播放音频类似，你需要先请求音频会话的权限才能使用音频硬件，并且可能会出现一些延迟。同样，你可以使用事件驱动的类\
    \ `AVAudioRecorder` 来开始/停止录制，它也是无界面的。\n\n使用音频录制器的其他要求如下：\n\n- 你需要一个能够录制的音频会话。\n\
    - 你需要在使用麦克风之前对其进行配置。\n- 你需要构建一个播放界面来预览你的录音。\n\n为了学习如何使用 `AVAudioRecorder` 类，你将构建图\
    \ 5-8 中所示的音频录制器播放器应用。\n\n![9781430250838_Fig05-08.jpg](img/9781430250838_Fig05-08.jpg)\n\
    \n**图 5-8**。简单音频录制器的模型\n\n此应用中唯一的输入是音频录制器，因此你可以将其实现为单视图应用程序。用户通过麦克风按钮触发录制。与音频播放器应用中的“播放”按钮类似，当录制处于活动状态时，此按钮的状态会变为“停止”。为了允许用户预览录音，你可以重用音频播放器应用中的播放界面。此应用还提供了一个“重置”按钮，以便用户在不满意录音时可以将其删除。\n\
    \n你可以在源代码包的 Chapter 6 文件夹中的 `MyRecorder` 项目中找到此应用的所有源代码。\n\n### 开始使用\n\n对于此项目，你可以将音频播放器应用的大部分工作作为基础进行复用。主要新增内容包括：\n\
    \n- 向主视图控制器添加音频录制器对象\n- 添加用于录制的控件\n- 添加额外的逻辑以支持从音频录制器播放。"
- fmt: "Using the header file for the audio player as a reference, you can add your\
    \ audio recorder and new buttons to the main view controller. [Listing 5-22](#9781430250838_Ch05.xhtml#list22)\
    \ shows an example.\n\n[***Listing 5-22***](#9781430250838_Ch05.xhtml#_list22).\
    \ Header File for Audio Recorder App\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <AVFoundation/AVFoundation.h>\n\n@interface MainViewController : UIViewController\n\
    \    <AVAudioPlayerDelegate>\n\n@property (nonatomic, strong) IBOutlet UILabel\
    \ *timeLabel;\n\n@property (nonatomic, strong) IBOutlet UIButton *recordButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *playButton;\n@property (nonatomic,\
    \ strong) IBOutlet UIButton *resetButton;\n\n@property (nonatomic, strong) IBOutlet\
    \ UIProgressView *progressBar;\n\n@property (nonatomic, strong) AVAudioPlayer\
    \ *audioPlayer;\n@property (nonatomic, strong) AVAudioRecorder *audioRecorder;\n\
    \n@property (nonatomic, strong) NSTimer *timer;\n\n-(IBAction)record:(id)sender;\n\
    -(IBAction)play:(id)sender;\n-(IBAction)reset:(id)sender;\n\n@end\n```\n\nAs with\
    \ the `AVAudioPlayer` class, `AVAudioRecorder` requires the `AVFoundation` framework\
    \ to compile. Follow the same process you used with the audio player app to add\
    \ the framework to your project.\n\nHaving defined your properties and methods,\
    \ lay out your storyboard and connect your actions using Interface Builder. The\
    \ result should look the screenshot in [Figure 5-9](#9781430250838_Ch05.xhtml#Fig9).\n\
    \n![9781430250838_Fig05-09.jpg](images/9781430250838_Fig05-09.jpg)\n\n[Figure\
    \ 5-9](#9781430250838_Ch05.xhtml#_Fig9). Storyboard for simple audio recorder\n\
    \n## Configuring the Audio Session\n\nJust as you did with the audio player, you\
    \ need to initialize the audio session before using the audio recorder. Because\
    \ your app will need both playback and recording abilities, use the `AVAudioSessionCategoryPlayAndRecord`\
    \ macro to configure the audio session.\n\nYou will want to prepare the audio\
    \ session as soon as the user presses the Record button, so configure the session\
    \ in the button handler, as shown in [Listing 5-23](#9781430250838_Ch05.xhtml#list23).\n\
    \n[***Listing 5-23***](#9781430250838_Ch05.xhtml#_list23). Initializing the Audio\
    \ Session for Recording\n\n```\n-(IBAction)record:(id)sender\n{\n    NSError *error;\n\
    \n    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n    [audioSession\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord\n                       error:&error];\n\
    }\n```\n\n## Setting Up the Audio Recorder\n\nTo set up the audio recorder, use\
    \ the `[AVAudioRecorder initWithURL:settings:error:]` instance method. Like the\
    \ audio player, it takes a URL. However, the URL the recorder is interested in\
    \ is the *destination* for the recording. As with the audio session, you want\
    \ to initialize the recorder when the user presses the Record button. A modified\
    \ version of the button handler for the Record button, with the recorder initialization\
    \ logic, is provided in [Listing 5-24](#9781430250838_Ch05.xhtml#list24).\n\n\
    [***Listing 5-24***](#9781430250838_Ch05.xhtml#_list24). Initializing the Audio\
    \ Recorder\n\n```\n-(IBAction)record:(id)sender\n{\n    NSError *error;\n\n  \
    \  AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n    [audioSession\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord\n                       error:&error];\n\
    \n    if (error == nil) {\n\n        NSArray *paths =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \            NSUserDomainMask, YES);\n        NSString *documentsDirectory = [paths\
    \ objectAtIndex:0];\n\n        NSString *filePath = [documentsDirectory\n    \
    \       stringByAppendingPathComponent:@\"recording.m4a\"];\n        NSURL *fileURL\
    \ = [NSURL fileURLWithPath:filePath];\n\n        NSMutableDictionary *settingsDict\
    \ = [NSMutableDictionary new];\n        [settingsDict setObject:[NSNumber numberWithInt:44100.0]\n\
    \                                 forKey:AVSampleRateKey];\n        [settingsDict\
    \ setObject:[NSNumber numberWithInt:2]\n                                 forKey:AVNumberOfChannelsKey];\n\
    \        [settingsDict setObject:[NSNumber\n                                 numberWithInt:AVAudioQualityMedium]\n\
    \           forKey:AVEncoderAudioQualityKey];\n        [settingsDict setObject:[NSNumber\
    \ numberWithInt:16]\n                                 forKey:AVEncoderBitRateKey];\n\
    \n        self.audioRecorder = [[AVAudioRecorder alloc]\n                    \
    \           initWithURL:fileURL\n                               settings:settingsDict\
    \ error:&error];\n\n        if (error == nil) {\n\n            NSLog(@\"audio\
    \ recorder initialized successfully!\");\n\n        } else {\n            NSLog(@\"\
    error initializing audio recorder: %@\",\n                  [error description]);\n\
    \        }\n\n    } else {\n        NSLog(@\"error initializing Playing audio\
    \ files:audio session: %@\",\n              [error description]);\n    }\n}\n\
    ```\n\nAs with the audio player, for this app, you will use the documents directory\
    \ as the destination for the user’s recording. You can create the full path for\
    \ your file by appending the file name to the documents directory. The audio recorder\
    \ will create a new file if the file specified by the URL does not exist, or it\
    \ will overwrite the existing file if it does.\n\nYou may also be wondering about\
    \ the `settings` parameter. This is a dictionary of key/value pairs that configure\
    \ the hardware’s capture settings. The preceding example configures the microphone\
    \ to capture 16-bit stereo audio at moderate quality. This is a good, middle-of-the-road\
    \ configuration, in which the recording will sound better than a phone call, but\
    \ without the data overhead of a full, uncompressed audio recording.\n\n## Building\
    \ the Recording Interface\n\nAs with the `AVAudioPlayer` class, the `AVAudioRecorder`\
    \ class is headless, so you have to implement your own user interface to control\
    \ the recording process. For this application, you want to add controls for recording-specific\
    \ functionality: starting and stopping the recording, saving the file, and deleting\
    \ the recording. With a few exceptions, you can reuse the playback interface from\
    \ the audio player app to preview the recording.\n\n### Starting or Stopping the\
    \ Recording\n\nYou use the `[AVAudioRecorder record]` method to begin recording\
    \ an audio file. Similarly, the `[AVAudioRecorder stop]` method stops recording.\
    \ As with the audio player app, you use a single button to toggle the recording\
    \ state. Following the same pattern you used with audio APIs, you query the recording\
    \ status of the recorder object by using the `[AVAudioRecorder isRecording]` property.\
    \ [Listing 5-25](#9781430250838_Ch05.xhtml#list25) shows a modified version of\
    \ the Record button handler that implements this flow.\n\n[***Listing 5-25***](#9781430250838_Ch05.xhtml#_list25).\
    \ Starting or Stopping the Audio Recorder\n\n```\n-(IBAction)record:(id)sender\n\
    {\n    NSError *error;\n\n    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
    \    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\n         \
    \              error:&error];\n\n    if (error == nil) {\n\n        NSArray *paths\
    \ =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n  \
    \          NSUserDomainMask, YES);\n        NSString *documentsDirectory = [paths\
    \ objectAtIndex:0];\n\n        NSString *filePath = [documentsDirectory\n    \
    \                          stringByAppendingPathComponent:@\"recording.m4a\"];\n\
    \n        NSURL *fileURL = [NSURL fileURLWithPath:filePath];\n```"
