    A property in Swift is declared like any other variable, except its scope is at
    the top level of the class:


    ```

     class ViewController : UIViewController {

        var playAllButton : UIButton!

        var chooseFileButton : UIButton!

        var playAllButton : UIButton!

        var moviePlayer : AVPlayerViewController!

    }

    ```


    Similarly, to define a method, place it at the top level of your class:


    ```

     class ViewController : UIViewController {

        var playAllButton : UIButton!

        var chooseFileButton : UIButton!

        var playAllButton : UIButton!

        var moviePlayer : AVPlayerViewController!

        func playAll() {


    }

    }

    ```


    In [Listing 14-2](#9781430250838_Ch14.xhtml#list2), you can find the Swift file
    for the `ViewController` class, which includes the `viewDidLoad` and `didReceiveMemoryWarning`
    methods from the `UIViewController` class. When you override methods from your
    parent class, you need to add the `override` keyword in front of your method definition.


    [***Listing 14-2***](#9781430250838_Ch14.xhtml#_list2). Modified Swift File for
    ViewController Class


    ```

    import UIKit

    import AVFoundation

    import AVKit


    class ViewController: UIViewController, FileControllerDelegate {


    var chooseFileButton : UIButton!

        var playAllButton : UIButton!

        var moviePlayer : AVPlayerViewController!


    override func viewDidLoad() {

            super.viewDidLoad()

            // Do any additional setup after loading the view,

            // typically from a nib.

        }


    override func didReceiveMemoryWarning() {

            super.didReceiveMemoryWarning()

