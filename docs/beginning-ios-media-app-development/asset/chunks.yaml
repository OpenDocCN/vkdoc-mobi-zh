- fmt: 'While this may seem like a lot of effort to implement audio playback, `AVFoundation`
    provides several shortcuts to make configuring a session easy, as illustrated
    in [Listing 5-3](#9781430250838_Ch05.xhtml#list3).


    [***Listing 5-3***](#9781430250838_Ch05.xhtml#_list3). Configuring Your Audio
    Session for Playback


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view,

            // typically from a nib.


    NSError *error = nil;

        [[AVAudioSession sharedInstance]

            setCategory:AVAudioSessionCategoryPlayback

                                               error:&error];

        if (error == nil) {

            NSLog(@"audio session initialized successfully");

        } else {

            NSLog(@"error initializing Playing audio files:audio session: %@",

                  [error description]);

        }

    }

    ```


    In this example, you can access your app’s audio session via the singleton object,
    `[AVAudioSession sharedInstance]`, which as previously mentioned is auto-generated
    with the app. Our app is automatically configured to be the `delegate` object
    for all audio session messages. To specify that your app plays audio, use the
    system macro `AVAudioSessionCategoryPlayback`, which indicates the app needs to
    take control of the system’s audio resources to play sounds. Add this block of
    code to the `[UIViewController viewDidLoad:]` method of the main view controller
    to specify that your app wants control of the audio session when the view loads.


    ## Using Singletons


    A *singleton* is an object that is instantiated once in an application. All operations
    are performed on a shared object. Unlike a global variable, a singleton is *lazy
    loaded*, meaning it is instantiated the first time it is called.


    A singleton is convenient when you are accessing a shared resource because it
    allows you to make a manager through which you can pass all your operations. By
    using a single manager object that is shared across the entire application, you
    do not need to duplicate setup/teardown code (it is called only when your object
    is initialized or destroyed) and can be sure that your operations will be performed
    on a valid object.


    To declare a singleton, you define a public method in your header file, with the
    name of the shared object. If you wanted your app delegate to be accessible as
    a singleton, your header file would look like this:


    ```

    #import <UIKit/UIKit.h>


    @interface AppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    +(AppDelegate*)sharedInstance;


    @end

    ```


    To implement your lazy-loading logic, define a global variable (`static` object)
    to store your shared object, and pass all messages through the `sharedInstance`
    method. If the global variable has already been initialized, it will return the
    pointer; otherwise, it will initialize the object and return the pointer.


    ```

    static AppDelegate *shared;

    +(AppDelegate*)sharedInstance{

        if (!shared || shared==nil) {

            shared = [[AppDelegate alloc] init];

        }

        return shared;

    }

    ```


    You can use your singleton object in any class by including its header file and
    passing messages to it, as you would any other object:


    ```

    #include "AppDelegate.h"


    @implementation myClass


    -(void)viewDidLoad {

        [[appDelegate sharedInstance] refreshSession];

    }

    ```


    Although this example uses the `AVAudioSessionCategoryPlayback` macro, you can
    take advantage of a wide variety of preconfigured macros. [Table 5-1](#9781430250838_Ch05.xhtml#Tab1)
    lists the most common macros and their uses.


    [Table 5-1](#9781430250838_Ch05.xhtml#_Tab1). Popular `AVAudioSessionCategoryPlayback`
    Macros


    | Macro (Constant) Name | Intended Use |

    | --- | --- |

    | `AVAudioSessionCategorySoloAmbient` | The default audio session configuration
    for all apps. Playback continues until the user silences the device or locks the
    screen. Your app takes complete control of audio playback, and refuses audio events
    from other apps. |

    | `AVAudioSessionCategoryAmbient` | Apps where audio playback is optional, but
    not required. Playback continues until the user silences the device. Other apps
    can still send audio events. |

    | `AVAudioSessionCategoryPlayback` | Apps that require audio playback to function
    properly. Playback continues if the user silences the device. Can be configured
    to allow audio events from other apps. |

    | `AVAudioSessionCategoryRecord` | Apps that require audio recording capabilities.
    Can be configured to allow background audio recording. |

    | `AVAudioSessionCategoryPlayAndRecord` | Apps that require both audio recording
    and playback capabilities. Can be configured to continue in the background, and
    to accept audio events from other apps. |


    ## Selecting an Audio File


    To populate the `FileViewController`, you need to scan the app’s documents folder
    for MP3 and M4A files. You can use the resulting array as the data source for
    the table view.


    You can find and retrieve an `NSArray` of all of the files in a directory by using
    the `[NSFileManager contentsOfDirectoryAtPath:]` method on an instance of the
    system file manager. You determine the type of each file by comparing its `pathExtension`
    component with the extension for the type of file you are looking for. The `pathExtension`
    property is a derived property available on all `NSString` objects. When called,
    it will attempt to return the part of the string that follows the period (`.`).
    [Listing 5-4](#9781430250838_Ch05.xhtml#list4) shows a method that implements
    this behavior. Make a call to this method at the bottom of `[self viewDidLoad]`
    in your `FileViewController` class.


    [***Listing 5-4***](#9781430250838_Ch05.xhtml#_list4). Building a List of Audio
    Files


    ```

    -(void)initializeFileArray

    {

        NSArray *paths = NSSearchPathForDirectoriesInDomains(

                         NSDocumentDirectory,

                         NSUserDomainMask, YES);

        NSString *documentsDirectory = [paths objectAtIndex:0];

        NSError *error = nil;


    NSArray *allFiles = [[NSFileManager defaultManager]

                              contentsOfDirectoryAtPath:documentsDirectory

                              error:&error];


    if (error == nil) {


    self.fileArray = [NSMutableArray new];


    for (NSString *file in allFiles) {

                if ([[file pathExtension] isEqualToString:@"mp3"] ||

                   [[file pathExtension] isEqualToString:@"m4a"]) {

                    [self.fileArray addObject:file];

                }

            }


    } else {

            NSLog(@"error looking up files: %@", [error description]);

        }

    }

    ```


    You will use the `fileArray` property throughout this class as the data source,
    so remember to declare it as an instance variable in the header file for your
    file view controller.


    Now that you have populated your file array, implement the required `UITableViewDelegate`
    methods to start using it as a data source for the table. [Listing 5-5](#9781430250838_Ch05.xhtml#list5)
    shows how to use the `fileArray` property to populate the section and row counts
    for the table view data source delegate methods.


    [***Listing 5-5***](#9781430250838_Ch05.xhtml#_list5). Using an Array to Populate
    a Table


    ```

    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    {

        // Return the number of sections.

        return 1;

    }


    - (NSInteger)tableView:(UITableView *)tableView

           numberOfRowsInSection:(NSInteger)section

    {

        // Return the number of rows in the section.

        return [self.fileArray count];

    }

    ```'
