- fmt: "# 指定视频分辨率\n\n配置硬件接口的最后一部分——`AVCaptureSession`对象时，就需要考虑指定视频分辨率了。`session`的功能类似于硬件接口的电话接线员，它将输入设备与输出流连接起来。回顾[列表10-2](#9781430250838_Ch10.xhtml#list2)，初始化`AVCaptureSession`对象的基本步骤是：选择合适的构造方法，然后添加输入。虽然这些步骤对视频仍然适用，但多了一步：使用会话预设来配置会话以进行视频捕获。[表10-2](#9781430250838_Ch10.xhtml#Tab2)列出了预设选项。\n\
    \n[表10-2](#9781430250838_Ch10.xhtml#_Tab2)。`AVCaptureSession`预设\n\n| 预设 | 输出类型\
    \ |\n| --- | --- |\n| `AVCaptureSessionPresetPhoto` | 高质量静态图像 |\n| `AVCaptureSessionPresetLow`\
    \ | 设备上可用的低质量视频和音频，适合通过3G蜂窝网络传输 |\n| `AVCaptureSessionPresetMedium` | 设备上可用的中等质量视频和音频\
    \ |\n| `AVCaptureSessionPresetHigh` | 设备上可用的最高质量视频和音频（默认） |\n| `AVCaptureSessionPreset1080x720`\
    \ | 1080×720（720p）视频 |\n| `AVCaptureSessionPreset1920x1080` | 1280×1080（1080p）视频\
    \ |\n| `AVCaptureSessionPresetiFrame960x540` | 960×540 H.264 iFrame视频（适合iMovie编辑）\
    \ |\n| `AVCaptureSessionPresetiFrame1280x720` | 1280×720 H.264 iFrame视频（适合iMovie编辑）\
    \ |\n| `AVCaptureSessionPresetInputPriority` | 原始视频和音频流，适用于高级编解码器或视频处理 |\n\n与所有应用程序一样，请选择最适合您预期用途和设备的预设。如果不确定，视频捕获的安全选择是`AVCaptureSessionPreset1920x1080`。所有运行iOS\
    \ 6或更高版本的iOS设备都能捕获1080p视频。要使用预设配置您的会话，只需使用所选常量设置属性：\n\n```\n[self.session setSessionPreset:AVCaptureSessionPreset1920x1080];\n\
    ```\n\n[列表10-4](#9781430250838_Ch10.xhtml#list4)展示了MyVideoRecorder项目中完成的`[CameraViewController\
    \ viewDidLoad]`和`[CameraViewController initializeCameras]`方法。与[列表10-1](#9781430250838_Ch10.xhtml#list1)中的静态图像示例一样，硬件接口部分以粗体显示。\n\
    \n[***列表10-4***](#9781430250838_Ch10.xhtml#_list4)。MyCustomRecorder项目的完整硬件接口代码\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view.\n\nself.session = [[AVCaptureSession alloc] init];\n\
    \n// find the back-facing camera\n\n[self initializeCameras];\n\nNSError *error\
    \ = nil;\n\nif (error == nil && [self.session\n        canAddInput:self.rearCameraInput])\
    \ {\n        [self.session addInput:self.rearCameraInput];\n\n// set up our output\n\
    \nself.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];\n        self.movieFileOutput.minFreeDiskSpaceLimit\
    \ = 200 * 1024; //200MB\n        self.movieFileOutput.maxRecordedDuration =\n\
    \            CMTimeMakeWithSeconds(180, 1); //3 mins max\n\nif ([self.session\
    \ canAddOutput:self.movieFileOutput] &&\n            [self.session\n         \
    \       canSetSessionPreset:AVCaptureSessionPreset1920x1080]) {\n            [self.session\n\
    \                setSessionPreset:AVCaptureSessionPreset1920x1080];\n        \
    \    [self.session addOutput:self.movieFileOutput];\n        } else {\n      \
    \           UIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    Error!\" message:@\"Camera Unavailable\"\n                delegate:self cancelButtonTitle:@\"\
    OK\"\n                otherButtonTitles:nil];\n            [alert show];\n   \
    \     }\n\n[self.view bringSubviewToFront:self.tapPosition];\n    }\n\n}\n\n-(void)initializeCameras\n\
    {\n    self.cameraArray = [AVCaptureDevice\n                        devicesWithMediaType:AVMediaTypeVideo];\n\
    \nNSError *error = nil;\n\nself.rearCamera = nil;\n    self.frontCamera = nil;\n\
    \nself.microphone = nil;\n\nif ([self.cameraArray count] > 1) {\n\nfor (AVCaptureDevice\
    \ *camera in self.cameraArray) {\n            if (camera.position == AVCaptureDevicePositionBack)\
    \ {\n                self.rearCamera = camera;\n            } else if (camera.position\
    \ == AVCaptureDevicePositionFront) {\n                self.frontCamera = camera;\n\
    \            }\n        }\n\nself.rearCameraInput = [AVCaptureDeviceInput\n  \
    \          deviceInputWithDevice:self.rearCamera error:&error];\n        self.frontCameraInput\
    \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.frontCamera\
    \ error:&error];\n\n} else {\n        self.rearCamera = [AVCaptureDevice\n   \
    \         defaultDeviceWithMediaType:AVMediaTypeVideo];\n        self.rearCameraInput\
    \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.rearCamera error:&error];\n\
    \    }\n\nself.microphone = [[AVCaptureDevice\n        devicesWithMediaType:AVMediaTypeAudio]\
    \ objectAtIndex:0];\n    self.audioInput = [AVCaptureDeviceInput\n        deviceInputWithDevice:self.microphone\
    \ error:&error];\n\nself.currentDevice = self.rearCamera;\n}\n```\n\n## 构建用户界面\n\
    \n配置好硬件接口后，您可以开始更新用户界面以支持视频捕获。与硬件接口一样，您不需要丢弃所有现有代码来启用此功能；您主要需要对现有代码进行一些通知修改。\n\
    \n与静态图像捕获类似，以下是用户界面中需要关注的主要区域：\n\n*   显示摄像头输入的实时预览。\n*   公开用于修改捕获设置的控件。\n*   公开用于开始和停止录制的控件。\n\
    \n与静态图像不同，您需要在录制过程中更改用户界面。除了切换“录制”按钮的状态外，您还应该显示录制进度，并隐藏一些捕获设置（用户不应在录制过程中更改手电筒模式或低光设置；这样做会产生不连贯的效果）。录制完成后，用户应进入预览模式，在此模式下他们可以接受或拒绝录制的视频。\n\
    \n本节重点介绍启动视频录制以及在录制过程中出现的用户界面元素。完成录制的过程主要涉及非用户界面主题，将在下一节“完成录制”中介绍。\n\n### 设置视频图层\n\
    \n在静态图像捕获项目的`[CameraViewController viewDidLoad]`方法中，您使用了`AVCaptureVideoPreviewLayer`对象来显示来自摄像头的实时预览。如[列表10-5](#9781430250838_Ch10.xhtml#list5)所示，该图层连接到会话对象，并配置为在父视图控制器中正确显示。\n\
    \n[***列表10-5***](#9781430250838_Ch10.xhtml#_list5)。MyCamera项目的视频预览图层初始化代码\n\n\
    ```\nself.previewLayer = [[AVCaptureVideoPreviewLayer alloc]\n               \
    \       initWithSession:self.session];\n\n// CGRect layerRect = self.previewView.bounds;\n\
    CGRect layerRect = self.view.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \     CGRectGetMidY(layerRect));\n\n[self.previewLayer setBounds:layerRect];\n\
    [self.previewLayer setPosition:layerCenter];\n\n[self.previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
    // [self.previewLayer\n//    setVideoGravity:AVLayerVideoGravityResizeAspectFill];\n\
    \n[self.previewView.layer addSublayer:self.previewLayer];\n```\n\n好消息是，对于视频捕获，您无需对显示实时视频的代码做任何更改！您可以原样重用这段代码。虽然您需要在硬件初始化代码中创建一个音频输入对象来管理音频捕获，但实时预览应仅包含视频。用户将能够在视频录制完成后预览音频，因为在录制过程中预览音频会导致讨厌的反馈循环（回声）。"
  raw: 'Specifying the video resolution comes into play when you configure the final
    piece of the hardware interface: the `AVCaptureSession` object. The *session*
    functions much like a telephone operator for the hardware interface, connecting
    the input devices with the output streams. Looking back at [Listing 10-2](#9781430250838_Ch10.xhtml#list2),
    remember that the basic steps for initializing an `AVCaptureSession` object are
    picking the appropriate constructor method and then adding*inputs*. While these
    steps are still true for video, there’s an extra step: using a session preset
    to configure the session for video capture. [Table 10-2](#9781430250838_Ch10.xhtml#Tab2)
    lists the preset options.


    [Table 10-2](#9781430250838_Ch10.xhtml#_Tab2). AVCaptureSession Presets


    | Preset | Output Type |

    | --- | --- |

    | `AVCaptureSessionPresetPhoto` | High-quality still images |

    | `AVCaptureSessionPresetLow` | Low-quality video and audio available on the device,
    suitable for transmitting over 3G cellular |

    | `AVCaptureSessionPresetMedium` | Mid-range quality video and audio available
    on the device |

    | `AVCaptureSessionPresetHigh` | Highest-quality video and audio available on
    the device (default) |

    | `AVCaptureSessionPreset1080x720` | 1080×720 (720p) video |

    | `AVCaptureSessionPreset1920x1080` | 1280×1080 (1080p) video |

    | `AVCaptureSessionPresetiFrame960x540` | 960×540 H.264 iFrame video (ideal for
    iMovie editing) |

    | `AVCaptureSessionPresetiFrame1280x720` | 1280×720 H.264 iFrame video (ideal
    for iMovie editing) |

    | `AVCaptureSessionPresetInputPriority` | Raw video and audio streams, appropriate
    for advanced codecs or video processing |


    As with all applications, pick the preset that is best for your intended application
    and devices. If you’re not sure, a safe bet for video capture is `AVCaptureSessionPreset1920x1080`.
    All iOS devices running iOS 6 or higher are capable of capturing 1080p video.
    To configure your session with a preset, simply set the property with your selected
    constant:


    ```

    [self.session setSessionPreset:AVCaptureSessionPreset1920x1080];

    ```


    [Listing 10-4](#9781430250838_Ch10.xhtml#list4) shows the completed `[CameraViewController
    viewDidLoad]` and `[CameraViewController initializeCameras]` methods for the MyVideoRecorder
    project. As with the still-image sample in [Listing 10-1](#9781430250838_Ch10.xhtml#list1),
    the hardware interface sections are in bold.


    [***Listing 10-4***](#9781430250838_Ch10.xhtml#_list4). Completed Hardware Interface
    Code for MyCustomRecorder Project


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

        // Do any additional setup after loading the view.


    self.session = [[AVCaptureSession alloc] init];


    // find the back-facing camera


    [self initializeCameras];


    NSError *error = nil;


    if (error == nil && [self.session

            canAddInput:self.rearCameraInput]) {

            [self.session addInput:self.rearCameraInput];


    // set up our output


    self.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];

            self.movieFileOutput.minFreeDiskSpaceLimit = 200 * 1024; //200MB

            self.movieFileOutput.maxRecordedDuration =

                CMTimeMakeWithSeconds(180, 1); //3 mins max


    if ([self.session canAddOutput:self.movieFileOutput] &&

                [self.session

                    canSetSessionPreset:AVCaptureSessionPreset1920x1080]) {

                [self.session

                    setSessionPreset:AVCaptureSessionPreset1920x1080];

                [self.session addOutput:self.movieFileOutput];

            } else {

                     UIAlertView *alert = [[UIAlertView alloc]

                    initWithTitle:@"Error!" message:@"Camera Unavailable"

                    delegate:self cancelButtonTitle:@"OK"

                    otherButtonTitles:nil];

                [alert show];

            }


    [self.view bringSubviewToFront:self.tapPosition];

        }


    }


    -(void)initializeCameras

    {

        self.cameraArray = [AVCaptureDevice

                            devicesWithMediaType:AVMediaTypeVideo];


    NSError *error = nil;


    self.rearCamera = nil;

        self.frontCamera = nil;


    self.microphone = nil;


    if ([self.cameraArray count] > 1) {


    for (AVCaptureDevice *camera in self.cameraArray) {

                if (camera.position == AVCaptureDevicePositionBack) {

                    self.rearCamera = camera;

                } else if (camera.position == AVCaptureDevicePositionFront) {

                    self.frontCamera = camera;

                }

            }


    self.rearCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.rearCamera error:&error];

            self.frontCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.frontCamera error:&error];


    } else {

            self.rearCamera = [AVCaptureDevice

                defaultDeviceWithMediaType:AVMediaTypeVideo];

            self.rearCameraInput = [AVCaptureDeviceInput

                deviceInputWithDevice:self.rearCamera error:&error];

        }


    self.microphone = [[AVCaptureDevice

            devicesWithMediaType:AVMediaTypeAudio] objectAtIndex:0];

        self.audioInput = [AVCaptureDeviceInput

            deviceInputWithDevice:self.microphone error:&error];


    self.currentDevice = self.rearCamera;

    }

    ```


    Building the User Interface


    Having configured the hardware interface, you can start updating the user interface
    to support video capture. As with the hardware interface, you will not need to
    throw out all of the existing code to enable this; you will mostly need to make
    notifications to the existing code.


    Similar to still-image capture, here are the major areas to target in your user
    interface:


    *   Display a live feed of the camera input.

    *   Expose controls for modifying capture settings.

    *   Expose controls for starting and stopping recording.


    Unlike still images, you will need to change the user interface during recording.
    In addition to toggling the state of the Record button, you should display recording
    progress and hide some of the capture settings (users should not be able to change
    torch mode or low-light settings during recording; doing so produces a jarring
    effect). After recording is complete, users should enter a preview mode where
    they can accept or reject their recording.


    This section focuses on the user-interface elements that initiate video recording
    and appear while recording is in progress. The process for completing a recording
    primarily consists of non-user-interface topics and is covered in the upcoming
    section, “Completing a Recording.”


    Setting Up the Video Layer


    In the `[CameraViewController viewDidLoad]` method for the still-image capture
    project, you used an `AVCaptureVideoPreviewLayer` object to display the live feed
    from the camera. As shown in [Listing 10-5](#9781430250838_Ch10.xhtml#list5),
    this layer was connected to the session object and configured to appear correctly
    in the parent view controller.


    [***Listing 10-5***](#9781430250838_Ch10.xhtml#_list5). Video Preview Layer Initialization
    Code for MyCamera Project


    ```

    self.previewLayer = [[AVCaptureVideoPreviewLayer alloc]

                          initWithSession:self.session];


    // CGRect layerRect = self.previewView.bounds;

    CGRect layerRect = self.view.bounds;

    CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),

         CGRectGetMidY(layerRect));


    [self.previewLayer setBounds:layerRect];

    [self.previewLayer setPosition:layerCenter];


    [self.previewLayer setVideoGravity:AVLayerVideoGravityResize];

    // [self.previewLayer

    //    setVideoGravity:AVLayerVideoGravityResizeAspectFill];


    [self.previewView.layer addSublayer:self.previewLayer];

    ```


    The good news is, for video capture, you need to make no changes at all to display
    live video in your code! You can reuse this code as is. While you needed to create
    an audio input object to manage audio capture in your hardware initialization
    code, the live preview should contain only video. The user will be able to preview
    audio after the video has completed recording, because previewing audio during
    recording causes a nasty feedback loop (echo).'
  trans: "\n# 指定视频分辨率\n\n配置硬件接口的最后一部分——`AVCaptureSession`对象时，就需要考虑指定视频分辨率了。`session`的功能类似于硬件接口的电话接线员，它将输入设备与输出流连接起来。回顾列表\
    \ 10-2，初始化`AVCaptureSession`对象的基本步骤是：选择合适的构造方法，然后添加输入。虽然这些步骤对视频仍然适用，但多了一步：使用会话预设来配置会话以进行视频捕获。表\
    \ 10-2 列出了预设选项。\n\n表 10-2。`AVCaptureSession`预设\n\n| 预设 | 输出类型 |\n| --- | --- |\n\
    | `AVCaptureSessionPresetPhoto` | 高质量静态图像 |\n| `AVCaptureSessionPresetLow` | 设备上可用的低质量视频和音频，适合通过\
    \ 3G 蜂窝网络传输 |\n| `AVCaptureSessionPresetMedium` | 设备上可用的中等质量视频和音频 |\n| `AVCaptureSessionPresetHigh`\
    \ | 设备上可用的最高质量视频和音频（默认） |\n| `AVCaptureSessionPreset1080x720` | 1080×720（720p）视频\
    \ |\n| `AVCaptureSessionPreset1920x1080` | 1280×1080（1080p）视频 |\n| `AVCaptureSessionPresetiFrame960x540`\
    \ | 960×540 H.264 iFrame 视频（适合 iMovie 编辑） |\n| `AVCaptureSessionPresetiFrame1280x720`\
    \ | 1280×720 H.264 iFrame 视频（适合 iMovie 编辑） |\n| `AVCaptureSessionPresetInputPriority`\
    \ | 原始视频和音频流，适用于高级编解码器或视频处理 |\n\n与所有应用程序一样，请选择最适合您预期用途和设备的预设。如果不确定，视频捕获的安全选择是`AVCaptureSessionPreset1920x1080`。所有运行\
    \ iOS 6 或更高版本的 iOS 设备都能捕获 1080p 视频。要使用预设配置您的会话，只需使用所选常量设置属性：\n\n```\n[self.session\
    \ setSessionPreset:AVCaptureSessionPreset1920x1080];\n```\n\n列表 10-4 展示了 MyVideoRecorder\
    \ 项目中完成的`[CameraViewController viewDidLoad]`和`[CameraViewController initializeCameras]`方法。与列表\
    \ 10-1 中的静态图像示例一样，硬件接口部分以粗体显示。\n\n***列表 10-4***。MyCustomRecorder 项目的完整硬件接口代码\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view.\n\nself.session = [[AVCaptureSession alloc] init];\n\
    \n// find the back-facing camera\n\n[self initializeCameras];\n\nNSError *error\
    \ = nil;\n\nif (error == nil && [self.session\n        canAddInput:self.rearCameraInput])\
    \ {\n        [self.session addInput:self.rearCameraInput];\n\n// set up our output\n\
    \nself.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];\n        self.movieFileOutput.minFreeDiskSpaceLimit\
    \ = 200 * 1024; //200MB\n        self.movieFileOutput.maxRecordedDuration =\n\
    \            CMTimeMakeWithSeconds(180, 1); //3 mins max\n\nif ([self.session\
    \ canAddOutput:self.movieFileOutput] &&\n            [self.session\n         \
    \       canSetSessionPreset:AVCaptureSessionPreset1920x1080]) {\n            [self.session\n\
    \                setSessionPreset:AVCaptureSessionPreset1920x1080];\n        \
    \    [self.session addOutput:self.movieFileOutput];\n        } else {\n      \
    \           UIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    Error!\" message:@\"Camera Unavailable\"\n                delegate:self cancelButtonTitle:@\"\
    OK\"\n                otherButtonTitles:nil];\n            [alert show];\n   \
    \     }\n\n[self.view bringSubviewToFront:self.tapPosition];\n    }\n\n}\n\n-(void)initializeCameras\n\
    {\n    self.cameraArray = [AVCaptureDevice\n                        devicesWithMediaType:AVMediaTypeVideo];\n\
    \nNSError *error = nil;\n\nself.rearCamera = nil;\n    self.frontCamera = nil;\n\
    \nself.microphone = nil;\n\nif ([self.cameraArray count] > 1) {\n\nfor (AVCaptureDevice\
    \ *camera in self.cameraArray) {\n            if (camera.position == AVCaptureDevicePositionBack)\
    \ {\n                self.rearCamera = camera;\n            } else if (camera.position\
    \ == AVCaptureDevicePositionFront) {\n                self.frontCamera = camera;\n\
    \            }\n        }\n\nself.rearCameraInput = [AVCaptureDeviceInput\n  \
    \          deviceInputWithDevice:self.rearCamera error:&error];\n        self.frontCameraInput\
    \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.frontCamera\
    \ error:&error];\n\n} else {\n        self.rearCamera = [AVCaptureDevice\n   \
    \         defaultDeviceWithMediaType:AVMediaTypeVideo];\n        self.rearCameraInput\
    \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.rearCamera error:&error];\n\
    \    }\n\nself.microphone = [[AVCaptureDevice\n        devicesWithMediaType:AVMediaTypeAudio]\
    \ objectAtIndex:0];\n    self.audioInput = [AVCaptureDeviceInput\n        deviceInputWithDevice:self.microphone\
    \ error:&error];\n\nself.currentDevice = self.rearCamera;\n}\n```\n\n## 构建用户界面\n\
    \n配置好硬件接口后，您可以开始更新用户界面以支持视频捕获。与硬件接口一样，您不需要丢弃所有现有代码来启用此功能；您主要需要对现有代码进行一些通知修改。\n\
    \n与静态图像捕获类似，以下是用户界面中需要关注的主要区域：\n\n*   显示摄像头输入的实时预览。\n*   公开用于修改捕获设置的控件。\n*   公开用于开始和停止录制的控件。\n\
    \n与静态图像不同，您需要在录制过程中更改用户界面。除了切换“录制”按钮的状态外，您还应该显示录制进度，并隐藏一些捕获设置（用户不应在录制过程中更改手电筒模式或低光设置；这样做会产生不连贯的效果）。录制完成后，用户应进入预览模式，在此模式下他们可以接受或拒绝录制的视频。\n\
    \n本节重点介绍启动视频录制以及在录制过程中出现的用户界面元素。完成录制的过程主要涉及非用户界面主题，将在下一节“完成录制”中介绍。\n\n### 设置视频图层\n\
    \n在静态图像捕获项目的`[CameraViewController viewDidLoad]`方法中，您使用了`AVCaptureVideoPreviewLayer`对象来显示来自摄像头的实时预览。如列表\
    \ 10-5 所示，该图层连接到会话对象，并配置为在父视图控制器中正确显示。\n\n***列表 10-5***。MyCamera 项目的视频预览图层初始化代码\n\
    \n```\nself.previewLayer = [[AVCaptureVideoPreviewLayer alloc]\n             \
    \         initWithSession:self.session];\n\n// CGRect layerRect = self.previewView.bounds;\n\
    CGRect layerRect = self.view.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \     CGRectGetMidY(layerRect));\n\n[self.previewLayer setBounds:layerRect];\n\
    [self.previewLayer setPosition:layerCenter];\n\n[self.previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
    // [self.previewLayer\n//    setVideoGravity:AVLayerVideoGravityResizeAspectFill];\n\
    \n[self.previewView.layer addSublayer:self.previewLayer];\n```\n\n好消息是，对于视频捕获，您无需对显示实时视频的代码做任何更改！您可以原样重用这段代码。虽然您需要在硬件初始化代码中创建一个音频输入对象来管理音频捕获，但实时预览应仅包含视频。用户将能够在视频录制完成后预览音频，因为在录制过程中预览音频会导致讨厌的反馈循环（回声）。\n"
- fmt: "Before moving on, I want to review a couple of configuration options you need\
    \ to remember to give special attention to: setting the correct frame properties\
    \ and starting the stream. From [Chapter 4](#9781430250838_Ch04.xhtml), you may\
    \ remember that a layer is just a component you add to a view—like a part of an\
    \ animation cel. To position a layer correctly, you need to give it the appropriate\
    \ bounds and origin position. This is the same process you follow for a normal\
    \ view, except you need to remember to explicitly define everything to correctly\
    \ display a layer. Similarly, the concept of *auto-resizing* is not a default\
    \ setting for video layers, so you need to make sure you specify `AVLayerVideoGravityResize`\
    \ for the `videoGravity` property of the preview layer.\n\nYou may also remember\
    \ that positioning the frame for the video layer did not automatically display\
    \ the live feed on the target view. To display live video, you need to start your\
    \ session. As with still-image capture, you can start a session by calling the\
    \ `[AVCaptureSession startRunning]` method on your session object. This is applicable\
    \ to most session preset types. An important distinction for the video-capture\
    \ application is that starting the session is not the same as recording the file.\
    \ You start or stop recordings through the `AVCaptureMovieFileObject`. You’ll\
    \ add that code to the handler for the Toggle Recording button later.\n\n[Listing\
    \ 10-6](#9781430250838_Ch10.xhtml#list6) shows the final version of the `[CameraViewController\
    \ viewDidLoad]` method for the `MyCustomRecorder` project. The video preview layer\
    \ initialization code is highlighted in bold text.\n\n[***Listing 10-6***](#9781430250838_Ch10.xhtml#_list6).\
    \ Video Preview Layer Initialization Code for `MyCustomRecorder` Project\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view.\n\nself.previewView.autoresizingMask =\n        UIViewAutoresizingFlexibleWidth\
    \ |\n        UIViewAutoresizingFlexibleHeight;\n\nself.session = [[AVCaptureSession\
    \ alloc] init];\n\n// find the back-facing camera\n\n[self initializeCameras];\n\
    \nNSError *error = nil;\n\nself.focusPoint = CGPointMake(0.5f, 0.5f);\n\nif (error\
    \ == nil && [self.session\n        canAddInput:self.rearCameraInput]) {\n    \
    \    [self.session addInput:self.rearCameraInput];\n\n// set up our preview layer\n\
    \      self.previewLayer = [[AVCaptureVideoPreviewLayer alloc]\n            initWithSession:self.session];\n\
    \nCGRect layerRect = self.view.bounds;\n        CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
    \            CGRectGetMidY(layerRect));\n\n[self.previewLayer setBounds:layerRect];\n\
    \        [self.previewLayer setPosition:layerCenter];\n\n[self.previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
    \n[self.previewView.layer addSublayer:self.previewLayer];\n\n// set up our output\n\
    \nself.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];\n        self.movieFileOutput.minFreeDiskSpaceLimit\
    \ =\n           200 * 1024; //200MB\n        self.movieFileOutput.maxRecordedDuration\
    \ =\n            CMTimeMakeWithSeconds(180, 1); //3 mins max\n\nif ([self.session\
    \ canAddOutput:self.movieFileOutput] &&\n            [self.session\n         \
    \       canSetSessionPreset:AVCaptureSessionPreset1920x1080]) {\n            [self.session\
    \ \n                setSessionPreset:AVCaptureSessionPreset1920x1080];\n     \
    \       [self.session addOutput:self.movieFileOutput];\n        } else {\n   \
    \         UIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
    Error!\"\n                message:@\"Not enough disk space\"\n               \
    \ delegate:self cancelButtonTitle:@\"OK\"\n                otherButtonTitles:nil];\n\
    \            [alert show];\n        }\n\n[self.view bringSubviewToFront:self.tapPosition];\n\
    \    }\n\n}\n```\n\n## Adding Controls for Capture Settings\n\nFor the still-image\
    \ capture project, you added a wide set of controls to modify the camera capture\
    \ settings, such as exposure, flash, device selection, and autofocus control.\
    \ While you can reuse the device selection and autofocus controls, you will need\
    \ to pare down the list of controls for this project, because some concepts, such\
    \ as exposure and flash, are applicable only when the camera’s sensor is active,\
    \ which is just for a moment. The good news is that you can implement features\
    \ for video, such as torch mode, white balance, and low-light settings that provide\
    \ similar functionality.\n\nLooking at Apple’s built-in camera interfaces in [Figure\
    \ 10-5](#9781430250838_Ch10.xhtml#Fig5), you can see that the only controls Apple\
    \ exposes are Toggle Torch and Toggle Device.\n\n![9781430250838_Fig10-05.jpg](images/9781430250838_Fig10-05.jpg)\n\
    \n[Figure 10-5](#9781430250838_Ch10.xhtml#_Fig5). Differences between Apple’s\
    \ still-image and video-capture interfaces\n\nBecause your application provides\
    \ a user experience different from the default, you will add controls for torch\
    \ mode and low-light settings, as shown in [Figure 10-6](#9781430250838_Ch10.xhtml#Fig6).\n\
    \n![9781430250838_Fig10-06.jpg](images/9781430250838_Fig10-06.jpg)\n\n[Figure\
    \ 10-6](#9781430250838_Ch10.xhtml#_Fig6). Video capture interface for `MyCustomRecorder`\
    \ project\n\nFor the `MyCustomRecorder` project, you will remove the exposure\
    \ button and repurpose the flash button for torch mode. You will also add buttons\
    \ for low-light settings and to start recording. After making these changes in\
    \ Interface Builder, your storyboard should look like the one shown in [Figure\
    \ 10-7](#9781430250838_Ch10.xhtml#Fig7).\n\n![9781430250838_Fig10-07.jpg](images/9781430250838_Fig10-07.jpg)\n\
    \n[Figure 10-7](#9781430250838_Ch10.xhtml#_Fig7). Storyboard for video-capture\
    \ interface\n\nWith the new buttons in place, your `CameraViewController.h` file\
    \ should look like the example in [Listing 10-7](#9781430250838_Ch10.xhtml#list7).\n\
    \n[***Listing 10-7***](#9781430250838_Ch10.xhtml#_list7). Modified Header File\
    \ for `CameraViewController`, with New Controls\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n\n@protocol CameraDelegate <NSObject>\n\
    \n-(void)cancel;\n-(void)didFinishWithImage:(UIImage *)image;\n\n@end\n\n@interface\
    \ CameraViewController : UIViewController\n    <UIActionSheetDelegate>\n\n@property\
    \ (nonatomic, strong) IBOutlet UIView *previewView;\n@property (nonatomic, strong)\
    \ IBOutlet UIButton *torchButton;\n@property (nonatomic, strong) IBOutlet UIButton\
    \ *lowLightButton;\n@property (nonatomic, strong) IBOutlet UIButton *focusButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *cameraButton;\n\n@property (nonatomic,\
    \ strong) IBOutlet UILabel *tapPosition;\n\n@property (nonatomic, strong) AVCaptureSession\
    \ *session;\n@property (nonatomic, strong) AVCaptureMovieFileOutput\n    *movieFileOutput;\n\
    \n@property (nonatomic, strong) id <CameraDelegate> delegate;\n\n-(IBAction)cancel:(id)sender;\n\
    -(IBAction)toggleRecording:(id)sender;\n\n-(IBAction)torchMode:(id)sender;\n-(IBAction)lowLightMode:(id)sender;\n\
    -(IBAction)focusMode:(id)sender;\n-(IBAction)switchCamera:(id)sender;\n\n-(IBAction)didTapPreview:(UIGestureRecognizer\
    \ *)gestureRecognizer;\n\n@end\n```\n\nFor your reference, I have included the\
    \ handlers for the autofocus and toggle device buttons in [Listing 10-8](#9781430250838_Ch10.xhtml#list8).\
    \ You don’t need to modify these at all for video capture, and as always, they\
    \ go in your `CameraViewController.m` file.\n\n[***Listing 10-8***](#9781430250838_Ch10.xhtml#_list8).\
    \ Button Handlers for Autofocus and Toggling Devices\n\n```\n-(void)switchToFocusWithIndex:(NSInteger)buttonIndex\n\
    {\n    NSError *error = nil;\n\nAVCaptureFocusMode focusMode = 0;\n```"
