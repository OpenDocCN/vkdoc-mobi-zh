    was successful. If the operation was a failure, it displays an alert view with
    the human-readable `description` string from the `error` object. When the operation
    succeeds, it presents a `VideoPlaybackController` that has been initialized with
    the output file URL. The `VideoPlaybackController` is the customized subclass
    of the `MPMoviePlayerController` class that you will use in this project for the
    video preview.


    **Caution**  Although the output file URL that is returned from the `AVCaptureFileOutputRecordingDelegate`
    protocol is the same as the one used to start the recording, you should not start
    playback until the delegate method has fired, because the file will not be valid
    until this message has been received.


    Showing the Preview Interface


    For your video preview interface, you will want to display a video player that
    allows users to accept or reject the video they just recorded. While you could
    simply return the recorded video as is, it is best to give users an opportunity
    to check their work before returning them to the main interface of the MyCustomRecorder
    application.


    For the `VideoPlaybackController` class, you will want to take the basic video
    playback function of the `CustomVideoPlayer` class from the MyCustomPlayer project
    you built in [Chapter 9](#9781430250838_Ch09.xhtml) and modify the controls to
    toggle playback and to accept or reject the file. Subclassing is an object-oriented
    programming concept that allows you to inherit all of the properties and methods
    of a parent class while still retaining the ability to modify those properties
    and methods in your child class. Inheritance is a convenient way to expand the
    functionality of a class without destroying or affecting the original. In this
    case, you need to subclass to reuse the `CustomVideoPlayer` class for this app’s
    full-screen video player.


    First, copy the `CustomVideoPlayer.h` and `CustomVideoPlayer.m` files into your
    working directory and add them to your project. Next, from the File menu, choose
    New File. As shown in [Figure 10-11](#9781430250838_Ch10.xhtml#Fig11), when you
    are asked to specify the parent class for your file, type **MyCustomPlayer**—doing
    so will cause Xcode to create a subclass template for you automatically.


    ![9781430250838_Fig10-11.jpg](images/9781430250838_Fig10-11.jpg)


    [Figure 10-11](#9781430250838_Ch10.xhtml#_Fig11). Specifying a parent class for
    a new file in Xcode


    Next, you need to create the storyboard for the video player. The key difference
    between this new playback interface and the one you created for the MyCustomPlayer
    project is that instead of having a Done button in the navigation bar, you will
    have Accept and Reject buttons, both of which finish the video completion process.
    Using [Figure 10-12](#9781430250838_Ch10.xhtml#Fig12) as a reference, add a layer
    for the video output and a button to control playback. Embed this view controller
    in a Navigation Controller so that you can add your buttons.


    ![9781430250838_Fig10-12.jpg](images/9781430250838_Fig10-12.jpg)


    [Figure 10-12](#9781430250838_Ch10.xhtml#_Fig12). Storyboard for video player


    The header file for the `VideoPlaybackController` class is in [Listing 10-18](#9781430250838_Ch10.xhtml#list18).
    As with other projects, remember to tie your button handlers and properties to
    the storyboard.


    [***Listing 10-18***](#9781430250838_Ch10.xhtml#_list18). Header File for VideoPlaybackController
    Class


    ```

    #import <UIKit/UIKit.h>


    @interface VideoPlaybackController : MyCustomPlayer


    @property (nonatomic, strong) IBOutlet *const;


    -(IBAction)accept:(id)sender;

    -(IBAction)reject:(id)sender;


    @end


    @protocol CustomPlayerDelegate <NSObject>


    -(void)didFinishWithSuccess:(BOOL)success;


    @end

    ```


    Because you are subclassing the `CustomVideoPlayer` class, you do not need to
    reimplement video playback. Simply tie your button to the `togglePlayback` button
    handler you defined in the `CustomVideoPlayer` class (methods from parent classes
    show up in Interface Builder just as if you had defined them in your class). For
    the video-recording process, you will need to focus on the Accept and Reject functionality.


    When a user decides to accept the video just recorded, you should follow the same
    workflow as the `UIImagePickerController` and return the user to the main user
    interface. During this process, you will need to save the file and dismiss the
    video preview and capture interfaces. The Accept button handler for the `VideoPlaybackController`
    class is shown in [Listing 10-19](#9781430250838_Ch10.xhtml#list19).


    [***Listing 10-19***](#9781430250838_Ch10.xhtml#_list19). Accept Button Handler
    for VideoPlaybackController


    ```

    -(IBAction)accept:(id)sender

    {

        [self.mediaPlayer stop];

        [self.delegate didFinishWithSuccess:YES];

    }

    ```


    This button handler is very short—all it does is stop the player and call the
    `[CustomPlayerDelegate didFinishWithSuccess:]` method. The `[ViewController dismissViewController:animated:]`
    method dismisses only one modal controller at a time. To dismiss both the `VideoPlaybackController`
    and the `CameraViewController`, you need to dismiss each from the view controller
    that presented them. The `CameraViewController` was presented by the `MainViewController`,
    so you will need to dismiss it via the `CameraDelegate` protocol. Similarly, the
    `VideoPlaybackController` was presented by the `CameraViewController`, so you
    will need to dismiss it via the `CustomPlayerDelegate` protocol.


    The Reject button handler is similarly straightforward. All you need to do is
    dismiss the playback controller and reset the video-recording interface. As part
    of the reset process, you should delete the current movie file. [Listing 10-20](#9781430250838_Ch10.xhtml#list20)
    shows the Reject button handler method.


    [***Listing 10-20***](#9781430250838_Ch10.xhtml#_list20). Reject Button Handler
    for VideoPlaybackController


    ```

    -(IBAction)reject:(id)sender

    {

        [self.mediaPlayer stop];

        [self.delegate didFinishWithSuccess:NO];

    }

    ```


    You may be wondering about the implementation of the `[CustomPlayerDelegate didFinishWithSuccess:]`
    method. In your `CameraViewController` class, if the `success` parameter is set
    to `YES`, then you know the user wanted to accept the video, so you can dismiss
    the modal view controller that represents the player and call the `[CameraDelegate
    didFinishWithURL:]` on your camera delegate object. If the `success` parameter
    was set to `NO`, then you know the user wanted to reject the video. The completed
    `[CustomPlayerDelegate didFinishWithSuccess:]` method for the `CameraViewController`
    class is provided in [Listing 10-21](#9781430250838_Ch10.xhtml#list21).


    [***Listing 10-21***](#9781430250838_Ch10.xhtml#_list21). “Playback Completed”
