- '# 关于作者


  **艾哈迈德·巴克尔**是 devAtelier LLC（`www.devatelier.com`）的创始人兼首席开发人员，这是一家位于圣地亚哥的移动开发公司。在花费数年时间为嵌入式系统编写软件之后，他开始出于兴趣在咖啡店里开发应用程序。消息传开后，他开始承接客户，并辞去日常工作，全职投入应用程序开发。自那时起，他参与了超过
  20 个移动项目的开发，并见证了多个项目进入应用商店前 25 名，其中一个甚至在其类别中达到了第一名（视频调度器）。他的客户范围从充满活力的初创公司到大型企业，例如思杰。在业余时间，艾哈迈德会在旅途中探索新地方，谈论移动开发，并且仍然在咖啡店里工作。




  '
- '# 关于技术审校者


  ![9781430250838_unFigFM-02.jpg](img/9781430250838_unFigFM-02.jpg)


  **格奥尔基·切斯勒**是一位资深软件工程师，专长于质量保证、系统自动化、性能工程和电子出版。他就职于 ServiceNow 公司，担任高级性能工程师，同时也是医学领域出版公司
  Plural Publishing 的首席技术顾问。他最偏爱的编程语言是`Perl`（以至于他认同 Perl 的吉祥物，因此有了这张骆驼图片），但也参与过许多`Java`和`Objective-C`项目。


  '
- '# 致谢


  在我生命这段最具挑战性又收获满满的时期，有太多我想要感谢的人，多到或许我能为此写一本书（哈哈！）。但为了不失去读者的兴趣，我将仅简要提及几位。如果遗忘了任何人，请原谅我；我编写应用就是为了弥补我的健忘。


  首先，我要感谢我的家人——穆罕默德、莱拉和罗巴·巴克尔，是他们一直推动我去探索自己的全部潜能。


  接下来，我要感谢 Apress 出版社的米歇尔·洛曼，她在 Macworld 展会上找到了我，并亲切地询问我是否有兴趣写一本书。我永远不会忘记我们关于睡眠不足的谈话。


  凯文·沃尔特，我的协调编辑，他肩负着不断提醒我完成章节这一艰巨任务，但每次交流他总是带来积极的正能量。


  罗素·道格拉斯，我的技术编辑，以及莎伦·威尔基，我的文字编辑，她们帮助我找到了写作的风格，并纠正了我所有多余的逗号。


  格奥尔基·切斯勒，我的技术导师，他教会了我整洁代码（及 Perl 高尔夫）之美。他作为本书技术审校者的投入，帮助我将思路梳理成他人可用的作品。


  迈克·麦肯齐，我的商业导师，也是我的首批客户之一，他总是在奥兰治县为我提供宝贵的建议和美好的时光。


  拉斐尔·罗德里格斯和维拉福·森苏里亚，devAtelier LLC 的早期两位成员，他们持续的勤奋、尽职和积极态度极大地塑造了公司的形象。一位高雅的设师（拉斐尔）和一位卓越的工程师（维拉福），他们是我不可思议的伙伴和知己。


  卡罗尔·米勒，我在北卡罗来纳州立大学时首批计算机科学教授之一，她引人入胜的讲座和关于“危机鸡”的故事让每一堂课都充满影响力和启发性。


  最后，我要感谢所有一直支持我、鼓励我，并有耐心（大多数时候）倾听我疯狂故事的朋友们。再见啦，太空牛仔们。


  '
- '# 引言


  你是否还记得第一次在电脑上体验多媒体的情景？是在 Apple II 电脑上《俄勒冈之旅》那精心编排的小镇音乐？还是 YouTube 上那只才华横溢的猫在键盘上弹奏动人曲调的视频？


  那你开始学习编程时呢？是为了制作游戏？还是为了模拟学校铃声的确切音调以便提前下课？


  对许多人来说，多媒体一直是计算中最令人兴奋和个性化的方面之一。对于我们中的一些人（包括我自己），它是学习编程的灵感源泉。随着计算向移动设备发展，多媒体的魅力并未改变，但幸运的是，现在开始制作你自己的多媒体应用比以往任何时候都更容易。


  iOS 提供了一组极其深入的 API（应用程序编程接口），允许你在应用中显示和捕捉照片、视频和音频。这些 API 直接内置于 Cocoa Touch 中，这意味着你无需包含任何外部库即可使用它们。对于许多
  API，包括相机在内，在你的应用中暴露的捕捉界面与系统全局使用的界面相同。相比“美好的旧时光”，这是一个巨大的进步，那时集成相机可能需要与元件制造商交涉数周，并移植示例代码。


  本书的目标是帮助你利用已有的 iOS 应用开发知识，将其应用于媒体应用开发。Cocoa Touch 的妙处之一在于，Apple 为你抽象了大量底层功能。现在，你可以构建能播放视频的应用，而无需成为视频编解码器的专家。


  通过构建专注于特定 API 的应用，并在此过程中学习新的编程概念，你将循序渐进地取得进展，并避免被 iOS 中看似无穷无尽的 API 所压倒。本书的各个单元（照片、视频、音频）会先展示如何开始使用相关
  API，然后逐层深入，让你能够定制应用，超越开箱即用的基本功能。


  在 iOS 开发之旅中，你已经取得了不少成就，我很高兴你决定开始探索多媒体功能。让我们一起迈出下一步，构建一些出色的媒体应用吧！


  '
- "# 第 1 章：欢迎进入 iOS 媒体应用开发\n\n## 本书的目的是什么？\n\n本书是一本针对 iOS 媒体应用开发的深度指南，面向初级到中级的 iOS\
  \ 开发者。在本书中，你将学习如何构建应用，以利用 iOS 的编程接口（API）来捕捉、显示和处理静态图像（照片）、视频及音频资源。书的最后部分涵盖了新功能，包括\
  \ Apple 在 iOS 8 中引入的 Swift 编程语言。\n\n在呈现这些主题时，我借鉴了教程式指南的一些方法，通过提供代码片段向你介绍主题。然而，本书比典型教程更深入，它介绍了背景信息，讨论了实现挑战，并提供了关键项目来巩固你的新知识。这些关键项目为每个章节构建框架，为你提供一个完整的、利用了所涵盖功能的应用程序，以及来自其他流行应用的经验教训。通过构建一个真实的应用，你将对软件设计过程有更深的理解，并在应对实现挑战（通常是完成应用最困难的部分）方面获得更多经验。\n\
  \n你可能曾尝试开发一个应用但中途停止了，或者你的朋友也遇到同样的情况。关于 iOS 开发最著名的抱怨之一就是它限制了你所能做的事情。尽管这种说法有些道理——iOS\
  \ 平台强制你在“沙盒”中开发应用，并隐藏了对许多常见功能（如全局文件系统）的访问——但许多抱怨来自于必须为 Cocoa Touch 这个极其平台特定的框架进行开发。为框架编程让你可以免费利用许多功能，例如绘制视图或实例化媒体播放器，但代价是需要时间学习该框架及其限制。此外，iOS\
  \ 提供的框架数量之多，可能令新手望而生畏，他们觉得在开始之前必须熟悉所有框架。本书将通过聚焦 iOS 媒体框架及你使用它们所需的技能，帮助你构建媒体应用。\n\
  \n市面上有几本 iOS 开发指南会简要提及 iOS 媒体应用开发，但我感觉它们只是浅尝辄止。同样，Apple 为其 API 提供了出色的文档，但其措辞和技术深度可能令人望而生畏。本指南通过以易于理解的方式提供具体信息，对两者进行了补充。\n\
  \n## 媒体应用开发有何不同？\n\n\n\n## 阅读本书需要哪些知识储备？\n\n本书既适合初学者入门，也适合高级程序员参考。由于本书重点关注媒体应用开发，我假设您已至少初步了解以下内容：\n\
  \n- 核心编程概念（面向对象编程、指针、函数）\n- iOS 核心开发主题（`Xcode`、Interface Builder、Cocoa Touch）\n\
  - Objective-C 语法\n\n基于这些假设，我将在本书的行文风格中，自然运用这些核心知识库中的术语。这样既能让经验丰富的开发者感到亲切，也能让初学者通过实践掌握该领域的专业术语。如需更多帮助，推荐参考表\
  \ 1-1 中列出的书籍。\n\n表 1-1. 推荐参考资料\n\n| 主题 | 书名与作者 |\n| --- | --- |\n| iOS 开发入门 | *Beginning\
  \ iOS 7 Development* 作者：James Nutting、Fredrik Olsson、David Mark、Jeff LaMarche（Apress，2014）\
  \ |\n| Xcode 与调试器使用 | *Beginning Xcode* 作者：Matthew Knott（Apress，2014） |\n| iOS 开发进阶\
  \ | *Learn iOS 7 App Development* 作者：James Bucanek（Apress，2013） |\n| Objective-C\
  \ 语法 | *Beginning Objective-C* 作者：James Dovey 与 Ash Furrow（Apress，2012） |\n\n我还建议您参考\
  \ iOS 开发者库（`https://developer.apple.com/library/ios/navigation/`）。作为 Apple 的 iOS\
  \ API 官方文档资源，开发者库会随每次 SDK 的发布而更新。您需要时刻关注 SDK 版本，因为方法经常会被更新或移除。请务必使用与您 SDK 版本匹配的文档。您可以在“已归档文档库”链接下找到旧版\
  \ SDK 的文档，如图 1-1 所示。\n\n![9781430250838_Fig01-01.jpg](img/9781430250838_Fig01-01.jpg)\n\
  \n图 1-1. 查找旧版 iOS 文档\n\n**注意** Apple 还会为 iOS 的 Beta 版本维护预发布文档。这些文档对于前沿开发是很好的参考，但不推荐用于生产环境，因为它们会频繁变动，且其准确性无法保证。\n\
  \n为了提供流畅而全面的阅读体验，本书分为四个单元：图像、音频、视频和进阶媒体主题。为了让内容自然流畅，我采用了以下结构组织内容：\n\n- 第 1 部分：背景信息与核心框架\n\
  - 第 2 部分：中级框架应用\n- 第 3 部分：高级实现（包括底层代码）\n\n对于初学者，我建议从每个单元的第一章开始阅读，随着对概念逐渐熟悉，再深入后续章节。对于中级和高级读者，我建议快速浏览第一章以了解单元概要，然后直接深入后续章节中您感兴趣的专题。\n\
  \n## 开始学习需要准备什么？\n\n与传统的 iOS 应用开发一样，要开始 iOS 媒体应用开发，您需要一台搭载 OS X 10.9 或更高版本（Mavericks）的\
  \ Intel 架构 Mac，以及 Mac App Store 中的最新版 `Xcode` 和 iOS SDK。作为 App Store 提交流程的一部分，Apple\
  \ 会检查您的二进制文件是否在“有效”的计算机和 SDK 版本上编译。虽然这看起来是烦人的一步，但它有助于确保应用程序按统一标准编译，从而消除由编译器引起的崩溃。保持两者同步更新的最简单方法是从\
  \ Mac App Store 下载。\n\n**注意** 您可以在 Apple 开发者网站上找到旧版 `Xcode`，但请记住，向 App Store 提交应用时必须使用当前版本。\n\
  \n要概括成为一名应用开发者所需的所有技能可能很难，但我将 iOS 媒体应用开发者定义为：深入了解 iOS 媒体特性，并能运用这些知识创造产品的人。要成功胜任这一角色，您需要做到的不仅仅是“让它工作起来”。您需要能够运用知识识别设计方案、指出有问题的需求，并在现场调试问题。\n\
  \n我的目标是建立您的背景知识，而不会让学习过程令人难以承受。建立庞大的知识储备以供调用固然重要，但以能让您记住或快速查阅的方式呈现这些知识同样重要。全面的 API\
  \ 参考和纯问题-解决方案的方法对于解决特定问题极具价值，但并不能提供清晰的学习路径。作为媒体开发者，您需要掌握多个框架，每个框架都有自己的要求、主流设计模式或关于如何编写代码的建议。通过本书中难度递进的论述，我将为您提供一份可按照自己的节奏学习、同时也可作为参考的指南。\n\
  \n尽管理解一个框架的所能做到的一切极其重要，但理解框架的局限性也同样重要。很多时候，您会被要求实现某个功能，但经过进一步研究，您会发现这不可能实现，或者所需的工作量超出了项目预算或时间允许的范围。您还可能发现，有一种方法可以覆盖\
  \ 90%的使用场景，而且比能覆盖 100%使用场景的方法更快。要成为一名成功的媒体开发者，您必须快速识别这些问题领域和可能的解决方案，并与正确的决策者进行沟通。作为媒体开发者，一个特别具有挑战性的方面是，媒体框架是\
  \ Cocoa Touch 中最复杂的框架之一。它们对实现也提出了最严格的要求。本书中的讨论材料和关键项目将让您接触到这些限制，并向您展示如何解决它们，以构建可用的产品。\n\
  \n取决于你问谁，开发周期中最激动人心的部分可能就是调试。您的视频播放器在竖屏模式下可能工作得很好，但用户一旋转设备，它就可能开始丢帧。要找出这个问题的根源，您需要使用工具生成数据点，然后将这些数据点与原因关联起来。在整个职业生涯中，您会发现同样的问题在多个项目中重复出现。拥有识别问题根本原因的经验，能让您在下次遇到时迅速识别并修复它。当您开始调试媒体应用时，您会注意到，由于它们操作（如流畅视频播放）的敏感性，它们最容易出现资源相关问题和严格的配置要求。没有什么地方比这里更能让您真正训练\
  \ `Xcode` 的 Instruments 工具。我在高级主题和讨论部分的目标是，让您接触常见问题的根本原因，引导您完成使用必要工具识别它们的过程，并解释工具生成的数据如何帮助您解决此类问题。\n\
  \n作为媒体开发者，您可能会发现自己扮演着媒体编程主题“百科全书”的角色——但这一角色也意味着您有责任将专业知识应用到设计过程中，并成为处理媒体相关代码问题的“专家”（无论男女）。本书不仅会帮助您巩固所学知识，还会让您尽早意识到潜在的陷阱。\n\
  \n\n\n与传统的 iOS 应用开发不同，iOS 媒体应用开发在硬件设备上进行测试是强制要求。当你刚开始进行 iOS 开发时，可能注意到很多你想要实现的功能能轻松在模拟器上测试。遗憾的是，我们在本书中将要编程实现的许多功能（例如，拍照和录音）在模拟器中不受支持，必须在物理设备上进行测试。此外，在模拟器上测试某些功能会产生兼容性错误。\n\
  \n需要始终备齐用于测试的硬件设备套件，这主要取决于你需要支持的设备范围。通常，你应在处于 Apple 最新更新周期（例如，`iPhone 5` 或 `iPhone\
  \ 5S`）并运行最新版本 `iOS` 的设备上进行核心开发。在测试阶段，你还应能接触到运行旧版本 `iOS`（例如，`iOS 6.1`）的设备，以及硬件规格较老的设备（例如，`iPhone\
  \ 4S`）。我在 `iPhone 5` 和带视网膜显示屏的 `iPad Mini` 上进行核心开发，在进入测试阶段时，我会使用一台运行 `iOS 6.1` 的\
  \ `iPad 3`，并借用朋友的 `iPhone 4S`。混合搭配不同设备和系统版本，能让你在 Apple 的 App Store 审核流程之前，发现最广泛的兼容性问题。\n\
  \n### 使用本书需要一个有效的 iOS 开发者计划账户\n\n在本书中你需要使用的许多 API（例如，用于访问 `iPhone` 上的硬件摄像头）都需要将设备连接到你的开发电脑。Apple\
  \ 不允许通过模拟器来模拟硬件摄像头或录音设备。从模拟器中调用这些 API 会导致示例程序崩溃。\n\n要直接在硬件设备上测试，你需要将你的开发者计划账户升级为付费等级（个人或企业账户）。你可能已经拥有一个免费账户，用于访问支持论坛和文档库；然而，你需要一个付费账户才能使用其设备管理功能以及提供签名证书的能力。为了保护用户，Apple\
  \ 要求所有 `iOS` 应用必须使用有效的代码签名证书进行签名，才能在设备上运行。付费账户使你能创建这些证书，并构建一个签名后的应用，从而可以在设备上运行。\n\
  \n你可以通过导航至 Apple 开发者计划网站（`https://developer.apple.com/programs/`）并选择 iOS 开发者计划链接（如图\
  \ 1-2 所示）来注册付费的 iOS 开发者计划账户。然后系统会要求你使用你的 Apple ID 账户登录以继续。\n\n![9781430250838_Fig01-02.jpg](img/9781430250838_Fig01-02.jpg)\n\
  \n图 1-2. 注册付费的 iOS 开发者计划账户\n\n**Caution** 如果你已在将 Apple ID 用于向 iBooks 发布内容，则需要为应用开发创建一个新的\
  \ Apple ID。Apple 不允许不同商店共用一个账户。\n\n### 构建你的第一个 iOS 媒体应用\n\n为了让你熟悉本书的风格和内容的深度，我们将从一个练习开始：构建一个简单的应用，能让你在两幅图像之间交替切换。这个练习的重点是让你接触到在设备上首次尝试运行应用时可能遇到的问题。我们将在本书的后续部分更详细地介绍应用中所使用的媒体\
  \ API。\n\n在实现这个练习时，重点将放在遵循以设备为中心的工作流程上。你将探索如何设置项目、创建配置文件请求，并涵盖在连接设备的情况下运行应用的基础知识。\n\
  \n**Note** 本书中所有示例应用和关键项目的源代码均可在 Apress 网站上找到。对于本项目，你可以在`Chapter 1`文件夹中找到源代码。应用名为`ImageChanger`。该项目可在任何能够打开`Xcode\
  \ 5`或更新版本的现代 Mac 上运行。\n\n#### 关于此应用\n\n为了演示 iOS 媒体应用的开发，你将学习如何创建一个应用，该应用允许你执行以下操作：\n\
  \n*   将图像加载到项目中的视图里\n*   启用一个按钮来更改图像\n*   根据用户的选择更改图像\n\n用户界面极其简单，如图 1-3 所示。\n\n\
  ![9781430250838_Fig01-03.jpg](img/9781430250838_Fig01-03.jpg)\n\n图 1-3. ImageChanger\
  \ 应用的界面原型\n\n如原型所示，我们的应用包含一个带有按钮和图像的屏幕。当你点击按钮时，当前显示的图像会切换。该状态会进行切换，意味着点击按钮两次将使应用恢复到初始状态。\n\
  \n#### 设置应用\n\n此应用使用单个视图。选择“单视图应用程序”作为项目模板（见图 1-4）。\n\n![9781430250838_Fig01-04.jpg](img/9781430250838_Fig01-04.jpg)\n\
  \n图 1-4. 创建一个单视图应用程序项目\n\n选择“单视图应用程序”模板后，系统会要求你命名项目并选择保存位置。完成后，你将开始布局用户界面。\n\n你需要向主视图控制器中添加一个按钮和一个图像视图，以使你的故事板看起来像图\
  \ 1-3 中的原型。你可以在屏幕右下角的“对象库”中找到用于按钮、图像视图以及许多其他常见用户界面元素的 Interface Builder 模板。你可以通过将项目从“对象库”中拖出并放到目标视图控制器上来将其添加到视图控制器中。“对象库”在图\
  \ 1-5 中高亮显示。\n\n![9781430250838_Fig01-05.jpg](img/9781430250838_Fig01-05.jpg)\n\n\
  图 1-5. 对象库位于 Xcode 的右下角\n\n#### 将图像添加到你的应用\n\n要切换图像，首先需要将它们导入到应用中。你可以通过右键点击项目导航器（Xcode\
  \ 的左窗格）中的任何项目来导入图像或任何其他类型的文件。点击“添加文件”选项并选择你的目标文件。对于此应用，请选择两个图像文件（PNG 或 JPG 格式）。\n\
  \n要使其中一个图像出现在图像视图中，请从 Interface Builder 中选择该图像视图，如图 1-6 所示。在属性检查器中，导航到“图像”下拉列表，并从你将在那里看到的文件名列表中选择刚刚添加的图像。\n\
  \n![9781430250838_Fig01-06.jpg](img/9781430250838_Fig01-06.jpg)\n\n图 1-6. 属性检查器中的图像下拉列表\n\
  \n#### 处理用户界面事件\n\n要使当前图像根据用户界面事件进行更改，你需要将源代码与故事板关联起来。主视图控制器由`ViewController`类表示，因此，在`ViewController.h`中，你需要添加以下属性和方法签名：\n\
  \n```\n@property (nonatomic, assign) BOOL isActive;\n@property (nonatomic, strong)\
  \ IBOutlet UIImageView *imageView;\n@property (nonatomic, strong) IBOutlet UIButton\
  \ *changeButton;\n-(IBAction)changeImage:(id)sender;\n```\n\n`imageView`和`changeButton`对象代表用户界面元素。`changeImage:`方法表示当用户按下按钮时需要被调用的方法。`isActive`属性允许你跟踪按钮的状态。\n\
  \n要使事件处理器工作，你必须通过向`ViewController.m`中添加以下代码来实现此方法：\n\n\n\n```\n-(IBAction)changeImage:(id)sender\n\
  {\n    if (self.isActive) {\n        self.imageView.image = [UIImage imageNamed:@\"\
  alpaca-vision.png\"];\n    } else {\n        self.imageView.image = [UIImage imageNamed:@\"\
  alpaca-plain.png\"];\n    }\n    self.isActive = !self.isActive;\n}\n```\n\n你将在第\
  \ 2 章中了解这段代码的工作原理，但从宏观角度来看，你大概能看出它根据一个全局布尔变量的状态来更改图像视图的`image`属性。请确保`[UIImage imageNamed:]`方法与你之前选择的文件名完全匹配。\n\
  \n## 在设备上运行应用程序\n\n要在设备上运行项目，首先需要为项目设置一个开发团队。导航到项目属性，选择“团队”下拉菜单（参见图 1-7）。\n\n![9781430250838_Fig01-07.jpg](img/9781430250838_Fig01-07.jpg)\n\
  \n图 1-7. 项目属性中的团队下拉菜单\n\n在选项中，你可以看到当前电脑上拥有签名信息的所有开发团队，以及“添加账户”的选项。如果下拉菜单为空，请选择“添加团队”以调出\
  \ Xcode 账户管理器，它会要求你输入 Apple ID，并引导你下载用于电脑的开发证书（参见图 1-8）。\n\n![9781430250838_Fig01-08.jpg](img/9781430250838_Fig01-08.jpg)\n\
  \n图 1-8. Xcode 账户管理器\n\n如果账户管理器发现你的 iOS 开发者账户尚未设置任何开发证书，你需要登录网站，并选择右上角的“证书、标识符和描述文件”链接，如图\
  \ 1-9 所示。\n\n![9781430250838_Fig01-09.jpg](img/9781430250838_Fig01-09.jpg)\n\n图\
  \ 1-9. 在 iOS 开发者中心查找证书\n\n在“证书”链接下，选择“添加证书”，并生成一个 iOS 应用程序开发证书。下一页（参见图 1-10）将详细说明如何生成证书签名请求文件并上传给\
  \ Apple。\n\n![9781430250838_Fig01-10.jpg](img/9781430250838_Fig01-10.jpg)\n\n图 1-10.\
  \ 生成证书签名请求\n\n**注意** 所有证书都将使用此 CSR 文件进行身份验证，因此请记住存储位置并保护好该文件。尝试生成新的 CSR 文件将使所有现有证书失效。如果需要迁移到另一台电脑，Xcode\
  \ 提供了“导出开发配置文件”工具。\n\nCSR 文件验证通过后，将生成证书文件并自动下载。下载完成后，双击将其安装到电脑上。\n\n现在开发证书已准备就绪，再次调出账户管理器，它将成功创建一个通配符配置描述文件。配置描述文件的作用类似于设备访问控制列表；通配符配置描述文件允许你将应用签名并部署到已注册\
  \ Apple 并通过 USB 连接的设备上。对于本例，通配符描述文件已足够，但在将应用分发进行测试之前，你还需要生成一个 App ID 和开发配置描述文件。\n\
  \nXcode 识别到你的团队后，会在“团队”下拉菜单中显示团队名称。接下来，通过 USB 将 iOS 设备连接到电脑。如果设备被成功识别，它将出现在 Xcode“运行”按钮旁边的设备下拉菜单中，且项目属性屏幕上不会显示错误。如果设备未被识别，团队名称下方会出现“修复问题”按钮。点击该按钮将触发一个向导，尝试将你的设备添加到你的\
  \ iOS 开发者计划账户中。图 1-11 展示了 Xcode 未能识别团队的情况。\n\n![9781430250838_Fig01-11.jpg](img/9781430250838_Fig01-11.jpg)\n\
  \n图 1-11. 团队选择失败\n\n如果点击“修复问题”按钮后设备仍未识别，请打开 Xcode Organizer，导航到“设备”屏幕，选择你的设备，如图\
  \ 1-12 所示。\n\n![9781430250838_Fig01-12.jpg](img/9781430250838_Fig01-12.jpg)\n\n\
  图 1-12. Xcode 设备管理器\n\n解决所有设备签名问题后，你的设备将出现在设备列表下拉菜单中，你就可以点击“运行”按钮来编译并在设备上运行应用程序。\n\
  \n## 调试常见问题\n\n在理想情况下，第一次尝试运行应用时一切完美无 bug。然而在现实中，经常会遗漏某些东西，此时你需要找出解决方法。开始调试最便捷的方法是在代码中设置断点。当设备连接到开发机器并运行时，它们通过\
  \ LLDB 调试器实例运行，该调试器允许你添加特殊的诊断钩子用于调试，以便在崩溃时显示调试信息。*断点*是一条命令，告诉调试器在到达你标记的特定行时停止运行应用程序。当代码执行到达断点时，你可以选择继续运行程序、中止程序，或检查变量和调用堆栈。\n\
  \n设置断点最简单的方法是点击你希望暂停的代码行旁边的垂直条。在 IDE 中开启“行号”选项会让操作更简单，因为你可以直接点击行号。图 1-13 展示了一个已启用断点的示例。该行号背景为蓝色箭头。\n\
  \n![9781430250838_Fig01-13.jpg](img/9781430250838_Fig01-13.jpg)\n\n图 1-13. 断点设置\n\
  \n当执行到达断点时，调试器信息面板会出现在屏幕底部，提供变量检查器和调试器的命令行界面（参见图 1-14）。\n\n![9781430250838_Fig01-14.jpg](img/9781430250838_Fig01-14.jpg)\n\
  \n图 1-14. 命中断点\n\n通过仔细设置断点，你可以确认代码是否到达了预期的行，并检查变量是否处于预期的状态。通常，你会因为方法从未被调用而发现它从未执行，或者因为逻辑错误而发现变量具有错误的值。\n\
  \n表 1-2 列出了在尝试实现此示例应用时可能遇到的常见问题及解决方案。虽然你可以从 Apress 网站下载应用程序并直接运行，但我们强烈建议你自己构建应用程序，以便熟悉整个过程。\n\
  \n表 1-2. 构建 ImageChanger 应用时的常见错误\n\n\n\n| 问题 | 常见解决方案 |\n| --- | --- |\n| 应用程序无法在设备上运行\
  \ | 确保您的团队设置正确，并且您的设备已在 iOS 开发者计划中注册。 |\n| 启动时图像视图未显示正确的图像 | 确保您的图像已正确添加到项目中。确保图像视图已正确关联到属性。确保您的视图启动代码没有重置图像视图。\
  \ |\n| 按钮未更改图像 | 确保您的按钮和图像视图已正确关联到属性。确保按钮事件处理方法已正确注册，并且可以通过断点访问。 |\n| 按下按钮后图像视图为空白\
  \ | 确保按钮事件处理方法中的图像名称与第二张图像的文件名完全一致。 |\n\n**总结**\n\n本章首先介绍了本书的目的、媒体应用开发的不同之处以及充分利用本书所需的条件。您了解了本书的基本目标及其结构安排，以便您能按照自己的节奏学习，同时还了解了本书对您先前编程经验和知识的假设。您还了解了一些媒体开发在资源和开发者期望方面与众不同的原因。最后，通过构建一个简单的\
  \ ImageChanger 应用程序，您开始探索构建媒体应用并在设备上运行的一些最基本的工作流程。\n\n"
- "# 第一部分：图像\n\n## 第二章：向应用添加图像\n\n学习绘画的最佳途径是研究静物题材。同样，进入 iOS 媒体应用开发的最佳途径是从静态图像开始！\n\
  \n在本章中，您将使用 Apple 的 `UIImage`、`UIImageView` 和 `UIImagePicker` 类来在应用中表示、显示和导入图像。这些类抽象了许多有用的功能，从解码文件到提供应用内访问\
  \ iOS 系统级相机控制器的能力。\n\n### 使用 UIImage 类表示图像数据\n\n与以人类可读格式存储数据的纯文本文件不同，图像拥有一系列复杂的属性，需要以二进制数据形式存储——包括压缩和色彩空间信息。所有二进制数据都需要一个特殊的类来解码并以程序可用的方式表示它。`UIImage`\
  \ 是 Apple 提供的用于表示图像数据的类。您可以将其视为所有涉及图像数据操作的通用语言。例如，您稍后将用到的 `UIImagePickerController`（用于从相机和照片库中选择图像）会将您的选择作为\
  \ `UIImage` 对象进行传输。\n\n在接下来的两小节“加载捆绑文件”和“运行时加载图像”中，您将看到如何使用 `UIImage` 从文件系统的不同位置加载图像。要使这些图像数据在屏幕上可见以供用户查看，您需要使用\
  \ `UIImageView`，这将在本章下一主要部分“使用 UIImageView 类显示图像”中进行探讨。\n\n#### 加载捆绑文件\n\n在开发 iOS\
  \ 媒体应用时，一个常见任务是从设计人员提供的文件中加载图像，例如背景图像、剪贴画或自定义按钮设计。为了熟悉这一工作流程，您将构建一个在方形框架中显示图像的单一视图应用，类似于第\
  \ 1 章中的示例项目。如果您需要复习如何创建单一视图应用并向其添加图像视图，可以回顾第 1 章的最后一部分。\n\n开始使用所需图像的最简单方法是调用 `UIImage`\
  \ 的私有方法 `[UIImage imageNamed:]`，以从项目捆绑包中的文件创建图像对象：\n\n```\nUIImage *myImage = [UIImage\
  \ imageNamed:@\"Flower.jpg\"];\n```\n\n*项目捆绑包* 这个术语现在可能看起来有些陌生，但这可能是一个您已经熟悉但尚未意识到的概念。如果您曾在\
  \ OS X 中对某个应用程序执行过辅助点击，您会注意到“显示包内容”选项。在 iOS 和 OS X 上，`.app` 文件都是智能容器，包含编译后的对象文件和捆绑的资源，例如图像、声音和预编译数据。当您的应用被编译时，所有源文件都会被转换为对象文件，而您包含的任何其他静态文件都会被直接复制到捆绑包中。\n\
  \n`[UIImage imageNamed:]` API 的工作原理是在项目捆绑包中搜索与您在 `name` 参数中提供的文件名完全匹配的文件。该 API 区分大小写，并且不对名称执行任何额外逻辑，因此请确保传入的文件名与捆绑包中的完全一致，否则返回的对象将为\
  \ `nil`。\n\n**注意** PNG 文件和素材目录支持的图像集是无需使用精确文件名的唯一例外。对于这两类文件，您无需指定文件扩展名。\n\n您可以通过确认文件在\
  \ Xcode 项目导航器（IDE 的左窗格）中是否可找到，来确认文件属于您的项目捆绑包，如图 2-1 所示。\n\n![9781430250838_Fig02-01.jpg](img/9781430250838_Fig02-01.jpg)\n\
  \n图 2-1. Xcode 项目导航器，高亮显示了项目中的图像文件\n\n在此示例中，您将看到一个 Resources 文件夹。为了保持项目文件夹的整洁，最好在导入文件之前创建组。我倾向于将所有图像文件和其他外部资源放入一个\
  \ Resources 组中。您可以通过“文件”菜单中的“新建”选项，或在“添加文件”步骤中导入文件夹来创建组。组和文件夹不会影响您使用 `[UIImage imageNamed:]`\
  \ API。\n\n#### 使用素材目录管理图像\n\n从 iOS 7 SDK 开始，Apple 在 iOS 开发工作流程中引入了*素材目录*。素材目录通过提供一个集中存储图像文件的位置以及一个用于管理这些文件的图形用户界面，简化了您的工作流程。虽然在项目导航器中管理少量图像文件很容易，但当您需要管理数十个文件或同一文件的多个尺寸时，这一过程会变得非常麻烦——而素材目录正是为了缓解这种情况而设计的。\n\
  \n素材目录是一个重要概念，因为 Apple 对提供图像文件的多种分辨率有严格要求。如果您缺少启动图像或应用图标的必需分辨率，Apple 甚至会阻止您向 App\
  \ Store 提交应用。\n\n在本练习中，您将学习如何使用素材目录管理项目中的文件，以及如何修改语法以指示您正在使用素材目录。\n\n您为 iOS 7 SDK\
  \ 或更高版本创建的每个项目都附带一个名为 `Images.xcassets` 的空白素材目录文件。在项目导航器中点击此文件，您将看到图 2-2 所示的界面。\n\
  \n![9781430250838_Fig02-02.jpg](img/9781430250838_Fig02-02.jpg)\n\n图 2-2. 素材目录用户界面\n\
  \n素材目录用户界面提供两个窗格：左侧的*集合列表*和右侧的*集合查看器*。为了帮助您管理同一图像的多个分辨率，素材目录使用*图像集*来表示图像文件。其理念是，您将图像的每一个分辨率都添加到一个集合中；然后在代码中，您可以引用该集合，而不是单个图像文件名。这便将确定合适文件（例如，非\
  \ Retina 或 Retina 屏幕）的负担从开发者转移到了编译器上。\n\n\n您可以使用集合列表通过点击图像集来导航。同样，您也可以使用面板底部的“添加”和“移除”按钮来管理集合。当您点击一个图像集时，集合查看器将显示该集合所有分辨率版的占位符。\n\
  \n您可以通过从访达窗口拖放图像到对应的占位符来向集合添加图像（例如，使用`2x`占位符来代表图像的 Retina 版本）。您需要对项目中需要包含的每个图像分辨率重复此过程。要更新图像，只需将新版本拖到相应的缩略图上即可。`Xcode`会为您处理其余所有事情。\n\
  \n**注意** 在撰写本文时，PNG 文件是资源目录唯一支持的文件格式。对于 JPG 文件，您需要继续使用项目导航器。\n\n要使用由资源目录管理的图像，请更改您的语法，使用图像集名称而不是文件名：\n\
  \n```\nUIImage *myImage = [UIImage imageNamed:@\"Flower\"];\n```\n\n编译器将自动确定在当前运行的平台上要使用的正确图像版本。\n\
  \n**注意** 对于应用图标和启动图像，系统会为缺失的分辨率创建编译器警告。所需分辨率会随着 SDK 更新而更新，因此请确保您始终保持最新。\n\n**加载运行时的图像**\n\
  \n虽然`[UIImage imageNamed:]`是一个便捷的 API，但它仅专为与应用捆绑的图像设计。当您尝试在运行时加载图像（例如已下载的图像）时，需要使用不同的\
  \ API：`[UIImage imageWithContentsOfFile:]`。这些 API 之间的关键区别在于，在运行时，您需要指定图像文件的路径，而不是它在应用包中的名称。示例\
  \ 2-1 提供了此过程的示例。\n\n**示例 2-1**. 在运行时加载图像文件\n\n```\nNSArray *searchPaths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
                         NSUserDomainMask, YES);\nNSString *documentFolderPath = [searchPaths\
  \ objectAtIndex:0];\nNSString *localFilePath = [documentFolderPath stringByAppendingString:@\"\
  DownloadedFlower.png\"];\nUIImage *myImage = [UIImage imageWithContentsOfFile:localFilePath];\n\
  if (myImage == nil) { NSLog(@\"File does not exist!\");}\n```\n\n如您所见，大部分工作在于查找文档目录的路径。每个应用包都附带一个文档目录，旨在作为您保存或创建文件的目标。您可以使用\
  \ Apple 的系统宏（或快捷方法）来快速找到应用的文档目录。每次应用安装都有唯一的目录路径，因此在运行时运行此方法非常重要。\n\n一旦获取了文档目录路径，您就可以使用`[NSString\
  \ stringByAppendingString:]`方法附加文件名。如果图像加载成功，`UIImage`对象将非`nil`。\n\n**注意** 您可能会说：“我以为\
  \ iOS 没有文件系统！”虽然 iOS 不像 PC 那样提供全局可访问的共享文件系统，但它确实在应用沙盒内提供了一个文件系统，您可以在运行时使用它来存储和检索文件。它被称为*沙盒*，因为您可以在沙盒内做（几乎）任何想做的事，但不允许其他人进入您的沙盒，并且很难将您的工作成果带出沙盒（换句话说，用于应用间通信的\
  \ API 非常有限）。\n\n**支持的文件格式**\n\n与存储为 ASCII 数据且可由任何程序打开的简单文本文件不同，图像文件是编码的二进制文件，需要特殊的指令（解码）才能正确打开。`UIImage`最便捷的功能之一就是它抽象了下表中所示文件格式的解码过程。\n\
  \n*UIImage 类支持的流行文件格式*\n\n| 文件格式 | 扩展名 | 主要用途 |\n| --- | --- | --- |\n| 便携式网络图形\
  \ | `.png` | 现代、无损的栅格图像压缩。保留 Alpha（透明度）层。 |\n| 联合图像专家小组 | `.jpg, .jpeg` | 非常高效的有损栅格图像压缩。不支持\
  \ Alpha 层。 |\n| 图形交换格式 | `.gif` | 旧式无损图像支持。主要用于 Web 上的动画图像。 |\n| 位图图像文件 | `.bmp`\
  \ | 未压缩图像支持。由早期版本的 Windows 推广。 |\n| 标签图像文件格式 | `.tiff, .tif` | 旧式低压缩图像支持。由早期的图像捕获设备和桌面出版软件包推广。\
  \ |\n\n虽然系统可以加载这些文件格式，但不会为您优化其文件大小或密度。一个未压缩的 10MB 位图文件在访问和绘制时所需的时间将远远超过一个压缩的 100KB\
  \ JPG 文件。只要可能，尽量使用压缩的 JPG（如果需要透明度层，则使用 PNG）。\n\n**注意** 如果您的设计师只提供 Photoshop 文件（`.psd`），您需要手动将图层另存为图像文件。Photoshop\
  \ 文件格式是一个资源密集型的移动目标，因此 Apple 极不可能为其提供系统级支持。\n\n**使用 UIImageView 类显示图像**\n\n要在应用中显示图像，您需要使用`UIView`的子类，这是\
  \ iOS 用户界面元素的原子单元。为了弥合这一差距，Apple 创建了`UIImageView`，它提供了一个在屏幕上放置图像的区域、在运行时动态缩放图像的方法，以及一个用于触摸手势的出口。\n\
  \n在本节中，您将学习如何使用图像初始化`UIImageView`，并将探索使用它处理动态内容大小的各种方法。\n\n**初始化图像视图**\n\n初始化`UIImageView`很简单：您只需用一个源`UIImage`对象来初始化它，如下所示：\n\
  \n```\nUIImage *myImage = [UIImage imageNamed:@\"Flower.jpg\"];\nUIImageView *myImageView\
  \ = [[UIImageView  alloc] initWithImage:myImage];\n```\n\n尽管`[UIImageView initWithImage:]`\
  \ API 没有将 frame 指定为必需参数，但您应该提供一个。Cocoa Touch 中的 frame 指定了用户界面元素的位置和大小。如果您使用 Interface\
  \ Builder 构建界面，元素的 frame 将自动创建。您可以在示例 2-2 中找到以编程方式设置 frame 的示例。\n\n**示例 2-2**. 以编程方式设置\
  \ frame\n\n```\nUIImage *myImage = [UIImage imageNamed:@\"Flower.jpg\"];\nUIImageView\
  \ *myImageView = [[UIImageView  alloc] initWithImage:myImage];\nmyImageView.frame\
  \ = CGRectMake(10, 10, 100, 100);\n[self.view addSubview:myImageView];\n```\n\n\
  请注意上述代码中的`addSubview`调用，它将图像视图放置在屏幕上。\n\n**注意** 您可以通过设置`image`属性随时更改图像视图的内容。\n\n\
  **设置图像缩放选项**\n\n您可能以前遇到过这个问题：您请求一个分辨率为 640×480 像素的图像，但收到的是一个其他尺寸的图像，例如 637×480。为了解决这个极其常见的问题，Apple\
  \ 为所有`UIView`对象构建了动态缩放功能，您可以通过`[UIView contentMode]`属性进行控制。在表 2-1 中，您将看到一些流行的内容模式常量值及其指定行为的表格。\n\
  \n**表 2-1**. 流行的`UIViewContentMode`常量值\n\n\n\n| 常量名称 | 指定行为 |\n| --- | --- |\n|\
  \ `UIViewContentModeScaleToFill` | 拉伸内容以适配视图框架的长宽比。 |\n| `UIViewContentModeScaleAspectFit`\
  \ | 缩放内容以适配视图框架，同时保持原始宽高比。框架的其余部分显示视图的背景色（默认透明）。 |\n| `UIViewContentModeCenter`\
  \ | 居中显示内容，同时保持其原始尺寸。 |\n| `UIViewContentModeTop` | 将内容对齐到框架顶部边缘，同时保持其原始尺寸。 |\n\
  | `UIViewContentModeLeft` | 将内容对齐到框架左侧边缘，同时保持其原始尺寸。 |\n\n所有 `UIView` 对象的默认 `contentMode`\
  \ 是 `UIViewContentModeScaleToFill`，它会拉伸或收缩内容以适配 `UIView` 的边界。在选择 `contentMode` 时，请思考你的视觉设计参考所指定（或其他元素所需）的内容。如果你要将图像居中显示在屏幕中间，且对边缘对齐方式没有要求，那么\
  \ `UIViewContentModeScaleAspectFill` 是一个安全的选择。当需要保留特定边缘时，你可能需要考虑边缘对齐选项，例如 `UIViewContentModeTop`\
  \ 或 `UIViewContentModeLeft`。在内容的宽高比需要与视图严格一致的情况下，可以探究 `UIViewContentModeScaleAspectFit`，或在展示图像前手动裁剪。\n\
  \n要指定内容模式，只需在 `UIImageView` 对象上设置属性：\n\n```\n[myImageView setContentMode:UIViewContentModeScaleAspectFill];\n\
  ```\n\n### 使用 UIImagePickerController 类选择图像\n\n`UIImagePickerController` 是 Apple\
  \ 的 `UIViewController` 子类，它提供了对系统级相机控制器和已保存图像缩略图浏览器的访问权限。当配置该控制器将相机作为其数据源时，你将看到与系统自带相机应用类似的相机基本界面。当配置该控制器使用已保存图像时，你将看到与照片应用中相同的基于缩略图的界面。通过\
  \ `UIImagePickerController`，Apple 提供了一种将图片快速导入应用的途径，省去了编写底层硬件接口的负担，让你能专注于图片的高级用途。\n\
  \n在本节中，你将学习如何使用图像选择器从相机胶卷中选择图像、使用硬件相机拍照，并将这些数据导出为 `UIImage` 对象。在此过程中，你还会了解一些 `UIImagePickerController`\
  \ 类所依赖的背景概念，并探究该类的一些局限。\n\n在本节中，你将构建图 2-3 中展示的应用。这是一个相机应用，它在 `UIImageView` 中显示图像，并包含一个“拍照”按钮，该按钮会调出\
  \ `UIImagePickerController`。当图像选择器完成后，应用应返回主视图控制器并显示所选图像。该应用的完成代码包含在 ImagePicker\
  \ 项目中，此书作为本书代码包的一部分提供，位于 Apress 网站（`www.apress.com`）的源代码/下载区域。ImagePicker 项目位于代码包的\
  \ `Chapter 2` 文件夹中。\n\n![9781430250838_Fig02-03.jpg](img/9781430250838_Fig02-03.jpg)\n\
  \n图 2-3. 基于相机的应用流程示意图\n\n### 使用协议与委托\n\n在开发使用图像选择器的应用时，你通常需要制定一个类似图 2-3 所描述的工作流程。\n\
  \n对于极其简单的类，你可以在一个类中处理所有逻辑。然而，`UIImagePickerController` 是一个完全独立的视图控制器；因此，你需要一种在它和你的类之间传递消息的方式。遵循面向对象设计的模式，你不想将你的类信息包含在图像选择器中，因为它需要是一个可以被其他类使用的类。同时，你也不想在你的代码中重复实现\
  \ `UIImagePickerController` 的功能。\n\n`UIImagePickerController` 用于消息传递所依赖的 Objective-C\
  \ 语言特性称为*委托*和*协议*。\n\n*协议*是一种为类间通信定义有限接口的方式，可以通过导入你想要实现其协议的类的头文件来推断。协议指定了一个名称（用于标识）和一个方法列表及其参数。你还可以使用块关键字\
  \ `optional` 为方法指定优先级。通过在头文件中放置一个包含命名信息和方法签名的 `@protocol` 块来定义协议。代码清单 2-3 展示了一个简单的头文件，它定义了一个与\
  \ `UIImagePickerController` 类所使用的协议相似的协议。\n\n***代码清单 2-3***. 简单相机协议的头文件\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@protocol CameraViewControllerDelegate <NSObject>\n\n\
  -(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage *)image;\n\
  \n@optional\n-(void)cameraViewController:(UIViewController *)controller didCancel:(BOOL)state;\n\
  \n@end\n\n@interface CameraViewController : UIViewController\n\n@property (nonatomic,\
  \ strong) UIImage *capturedImage;\n\n@end\n```\n\n**注意** 所有不在 `@optional` 块下的方法都被视为必需方法，必须由协议的接收者实现。\n\
  \n你会注意到我并没有包含这些方法如何工作的代码示例。这正是协议的关键优势：协议定义了两个类之间的通信方式，但从不实现目标逻辑。你可以将协议视为类似于 Java\
  \ 中的抽象类。\n\n为了将其与具体示例联系起来，`UIImagePickerController` 类定义了一个协议，表明它将在选择器关闭后以及拍照后发送消息。在你的展示类中，由你来处理当它发送这些消息时发生什么。\n\
  \n处理这些数据的方式是通过委托。*委托*是将工作单元传递给另一个类的概念。以图像选择器为例，创建相机控制器实例、拍照和呈现数据流的所有工作都委托给了图像选择器类。当它完成后，会将结果发送回我们。实现协议并接收其消息的对象称为*委托*。\n\
  \n要实现协议，你需要修改接收类的头文件以包含协议定义，并修改类定义以表明它实现了该协议。它被称为*接收类*，因为它接收来自委托类的消息。代码清单 2-4 展示了一个实现协议的类的头文件示例。此头文件旨在与你的主视图控制器的头文件类似。\n\
  \n***代码清单 2-4***. 接收协议消息的类的头文件\n\n```\n#import <UIKit/UIKit.h>\n#import \"CameraViewController.h\"\
  \n\n@interface FirstViewController : UIViewController <CameraViewControllerDelegate>\n\
  @property (nonatomic, strong) UIImage *selectedImage;\n@end\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\
  \n\n表示协议的语法是将其名称放在尖括号内。你需要将这些名称放在基类名称之后。你可以实现的协议数量没有限制，但在添加之前，需要确保它们没有任何冲突的方法名称！\n\
  \n在实现（`.m`）文件中，你为协议指示的方法定义其行为。如代码清单 2-5 所示，你可以在此处处理当图片选取器准备就绪时如何处理图片，或者当按下“取消”按钮时该做什么。\n\
  \n**代码清单 2-5**. 接收协议消息的类的实现文件\n\n```\n#import \"FirstViewController.h\"\n\n@implementation\
  \ FirstViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    \
  \    // 在视图加载后进行任何额外的设置，通常来自 nib 文件。\n}\n\n#pragma mark - CameraViewController 委托方法\n\
  \n-(void)cameraViewController:(UIViewController *)controller hasImage:(UIImage *)image\n\
  {\n    self.selectedImage = image;\n    [controller dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n\n-(void)cameraViewController:(UIViewController *)controller\
  \ didCancel:(BOOL)state\n{\n    if (state == YES) {\n        [controller dismissViewControllerAnimated:YES\
  \ completion:nil];\n    }\n}\n\n@end\n```\n\n此列表中的 `#pragma mark` 会创建注释，这些注释将出现在\
  \ Xcode 的方法导航器下拉菜单中。在实现协议时使用此类注释是一个好习惯，这样你就能记住委托方法的定义位置。\n\n**注意** 对于你未定义的每个必需方法，你都会收到编译器警告。带有\
  \ `optional` 标志的方法增加了有用但非必需的行为，因此不会触发编译器警告。\n\n要完成使用委托的流程，你需要为原始类提供一种发送协议消息的方式。参见代码清单\
  \ 2-6。\n\n**代码清单 2-6**. 发送协议消息的类的修改后头文件\n\n```\n#import <UIKit/UIKit.h>\n\n@protocol\
  \ CameraViewControllerDelegate <NSObject>\n\n-(void)cameraViewController:(UIViewController\
  \ *)controller hasImage:(UIImage *)image;\n\n@optional\n-(void)cameraViewController:(UIViewController\
  \ *)controller didCancel:(BOOL)state;\n\n@end\n\n@interface CameraViewController\
  \ : UIViewController\n\n@property (nonatomic, strong) UIImage *capturedImage;\n\n\
  @property (nonatomic, weak) id <CameraViewControllerDelegate> delegate;\n\n@end\n\
  ```\n\n如你所见，你需要向源类添加一个泛型委托对象（类型为 `id`）。定义此对象后，你就可以通过定义的协议消息安全地调用委托对象，如代码清单 2-7 所示。\n\
  \n**代码清单 2-7**. 原始类的修改后实现文件\n\n```\n#import \"CameraViewController.h\"\n\n@implementation\
  \ CameraViewController\n\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle\
  \ *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n\
  \    if (self) {\n        // 自定义初始化\n    }\n    return self;\n}\n\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 在视图加载后进行任何额外的设置。\n}\n\n#pragma mark - 操作处理程序\n\
  \n-(IBAction)takePictureButtonPressed:(id)sender\n{\n    [self.delegate cameraViewController:self\
  \ hasImage:self.capturedImage];\n}\n\n-(IBAction)cancelButtonPressed:(id)sender\n\
  {\n    [self.delegate cameraViewController:self didCancel:YES];\n}\n\n@end\n```\n\
  \n总而言之，协议的核心概念如下：\n\n1.  通过指定协议的方法及其优先级来定义协议。\n2.  通过在目标类中定义所有必需的方法来实现协议。\n3.  在源类中定义一个泛型委托对象的实例，并使用它来发送协议消息。\n\
  \n### 使用图片选取器访问已保存的图片\n\n\n\n回顾图 2-3 中的示例，当用户点击主视图控制器中的“拍照”按钮时，你需要显示图片选择器。为了实现此功能，需要学习如何配置图片选择器、如何呈现它，以及如何处理通过其协议方法返回的图片数据。\n\
  \n### 配置和呈现图片选择器\n\n为简单起见，我们将从配置图片选择器以选取已保存的图片开始。代码清单 2-8 提供了一个按钮事件处理程序的示例，用于呈现图片选择器。\n\
  \n***代码清单 2-8***. 配置和呈现图片选择器\n\n```\n-(IBAction)showPicker:(id)sender\n{\n    UIImagePickerController\
  \ *imagePicker = [[UIImagePickerController alloc] init];\n    imagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\n    [self presentViewController:imagePicker\
  \ animated:YES completion:^{\n        NSLog(@\"图片选择器已呈现！\");\n    }];\n}\n```\n\n\
  **注意**  上述代码中的插入符语法指定了一个*完成处理程序*，即方法执行完成后会执行的代码块。如果你不想实现该代码块，可将`^{...}`参数替换为`nil`。\n\
  \n此示例使用完成处理程序生成一条日志消息，表明呈现图片选择器的动画已完成。如果你不想在动画完成后执行任何操作，可以将代码块参数设置为`nil`。\n\n要呈现图片选择器，需要执行三个步骤：初始化对象、指定来源类型以及呈现视图控制器。此示例使用`[UIViewController\
  \ presentViewController:]`方法以模态方式呈现图片选择器，这是大多数应用实现的用户界面方式。*模态*呈现意味着在另一个视图之上显示一个视图，类似于弹出窗口。\n\
  \n**注意**  使用`UIImagePicker`无需包含任何外部头文件或框架；它是 UIkit 的一部分！\n\n要将图片选择器作为数据源，请将`[UIImagePickerController\
  \ sourceType]`参数设置为`UIImagePickerControllerSourceTypePhotoLibrary`。表 2-2 列出了`UIImagePickerControllerSourceType`的可选值。\n\
  \n表 2-2. UIImagePickerControllerSourceType 常量值\n\n| 常量名称 | 指定行为 |\n| --- | --- |\n\
  | `UIImagePickerControllerSourceTypePhotoLibrary` | 显示图片缩略图浏览器，初始化为用户手机上的所有相册（例如，已保存的照片、相机胶卷、照片流）\
  \ |\n| `UIImagePickerControllerSourceTypeSavedPhotosAlbum` | 显示图片缩略图浏览器，仅初始化为相机胶卷相册\
  \ |\n| `UIImagePickerControllerSourceTypeCamera` | 显示 iOS 系统级相机控制器。内置的、依赖于设备的控件包括：取消、拍照、闪光灯开/关、切换摄像头\
  \ |\n\n**注意**  默认来源类型为`UIImagePickerControllerSourceTypePhotoLibrary`。如果你未指定来源类型，将自动应用此设置。\n\
  \n### 处理来自图片选择器的数据\n\n代码清单 2-8 展示了如何呈现图片选择器并将其配置为使用缩略图浏览器，但并未指定当用户在图片选择器中选择图片或按下“取消”按钮时应发生什么。为此，你需要实现`UIImagePickerControllerDelegate`协议。\n\
  \n正如“使用协议和委托”部分所述，使用协议的第一步是在头文件中将接收者声明为接收者：\n\n```\n@interface FirstViewController\
  \ : UIViewController < UIImagePickerControllerDelegate>\n```\n\n同样，你需要让图片选择器知道你的类是其委托对象，因此需要在你之前创建的`UIImagePickerController`对象上设置`delegate`属性。\n\
  \n\n\n为了呈现图像选择器，请实现一个按钮处理程序，类似于清单 2-9 中的处理程序。请记住，要做到这一点，你需要在 Interface Builder 中创建一个按钮，并将其连接到处理程序的\
  \ `IBAction`。\n\n*****清单 2-9***. 呈现图像选择器的按钮处理程序**\n\n```objc\n-(IBAction)showPicker:(id)sender\n\
  {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
  \    imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\
  \    imagePicker.delegate = self;\n\n    [self presentViewController:imagePicker\
  \ animated:YES completion:^{\n        NSLog(@\"Image picker presented!\");\n   \
  \ }];\n}\n```\n\n现在，你已经声明主视图控制器将实现协议的方法，接下来需要实现这些方法。指示已选择图像的委托方法如下：\n\n```objc\n\
  - (void)imagePickerController:(UIImagePickerController *)picker\n              \
  \                 didFinishPickingMediaWithInfo:(NSDictionary *)info\n```\n\n此方法的返回值是发送消息的图像选择器，以及一个包含所选资产信息的字典对象。你可以在表\
  \ 2-3 中找到由 `info` 字典提供的所有相关键/值对。\n\n**表 2-3. 照片的 UIImagePickerController 媒体信息字典键/值对**\n\
  \n| 键名 | 存储值 |\n| --- | --- |\n| `UIImagePickerControllerMediaType` | `NSString`\
  \ 对象，标识媒体类型（图像或影片） |\n| `UIImagePickerControllerOriginalImage` | `UIImage` 对象，包含所选资产的原始图像数据\
  \ |\n| `UIImagePickerControllerEditedImage` | `UIImage` 对象，包含所选资产的原始图像数据（如果启用了编辑功能）\
  \ |\n| `UIImagePickerControllerCropRect` | `CGRect`，包含用户选择的裁剪矩形的坐标（如果启用了编辑功能） |\n\
  | `UIImagePickerControllerMediaMetadata` | `NSDictionary`，包含使用系统相机保存的图像的元数据 |\n\n\
  在这种情况下，你最感兴趣的是 `UIImagePickerControllerOriginalImage` 键对应的值，因此在委托方法中，你需要提取 `UIImage`\
  \ 对象。将 `UIImage` 对象设置为图像视图的内容后，可以在选择器上调用 `dismiss` 消息来关闭它，如清单 2-10 所示。\n\n*****清单\
  \ 2-10***. 接收图像选择器的 didFinishPickingMedia 方法**\n\n```objc\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker\n                              didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    UIImage *selectedImage = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
  \    [self.imageView setImage:selectedImage];\n\n    [picker\n        dismissViewControllerAnimated:YES\
  \ completion:^{\n        NSLog(@\"Image selected!\");\n    }];\n}\n```\n\n类似地，当用户在图像选择器中按下“取消”按钮时，你需要关闭选择器，因此需要实现\
  \ `cancel` 委托方法，然后在图像选择器上调用 `[UIViewController dismissViewControllerAnimated:completion:]`\
  \ 消息。请参见清单 2-11。\n\n*****清单 2-11***. 接收图像选择器的取消消息**\n\n```objc\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker\n{\n    [picker dismissViewControllerAnimated:YES completion:^{\n   \
  \     NSLog(@\"Picker cancelled without doing anything\");\n    }];\n}\n```\n\n\
  瞧！你现在可以呈现图像选择器，并在应用中使用选定的图像了！\n\n**注意** `UIPickerController` 功能有限，因为它一次只能选择一张图片。在第\
  \ 3 章中，你将探索如何构建一个允许用户选择多张图片的自定义视图控制器。\n\n### 使用图像选择器拍照\n\n乍一看，你可能会认为将图像选择器配置为使用硬件摄像头就像将\
  \ `sourceType` 设置为 `UIImagePickerControllerSourceTypeCamera` 一样简单。不幸的是，这一行代码可能非常具有欺骗性。虽然它是配置中有效且关键的部分，但还涉及其他步骤。首先，你需要确保你的应用正在运行的设备有摄像头，并且你的应用有权限访问它。苹果将此设计模式称为*动态配置*，你需要严格遵守它，以确保你的应用能在尽可能多的设备类型上正常工作。\n\
  \n方便的是，作为实现动态配置的一种手段，`UIImagePickerController` 提供了一系列公共方法，你可以使用这些方法来确定设备或你想要使用的功能的状态。表\
  \ 2-4 列出了这些方法及其对应的功能。\n\n**表 2-4. UIImagePickerController 设备检测方法**\n\n| 方法签名 | 预期用途\
  \ |\n| --- | --- |\n| `+ (BOOL)isSourceTypeAvailable: UIImagePickerControllerSourceType)sourceType`\
  \ | 指示指定的源类型（相册或相机）在设备上是否可用 |\n| `+ (BOOL)isCameraDeviceAvailable: (UIImagePickerControllerCameraDevice)cameraDevice`\
  \ | 指示所需的摄像头在设备上是否可用 |\n| `+ (BOOL)isFlashAvailableForCameraDevice: (UIImagePickerControllerCameraDevice)cameraDevice`\
  \ | 指示所选摄像头（前置或后置）的闪光灯是否可用 |\n| `+ (NSArray *)availableMediaTypesForSourceType:\
  \ (UIImagePickerControllerSourceType)sourceType` | 指示所选源类型（相册或硬件）支持的媒体类型 |\n| `+\
  \ (NSArray *)availableCaptureModesForCameraDevice: (UIImagePickerControllerCameraDevice)cameraDevice`\
  \ | 指示所选摄像头可用的捕获模式（图像、影片或两者） |\n\n**注意** 许多这些设备检测选项旨在将图像选择器配置为使用视频。你将在后续章节中更详细地回顾它们。\n\
  \n为简单起见，清单 2-12 修改了之前显示的 `[MainViewController showPicker:]` 方法，增加了检测设备是否存在硬件摄像头以及如何相应地设置源类型的能力。如果摄像头不存在，则代码会像之前的示例一样简单地显示相册。\n\
  \n*****清单 2-12***. 用于显示相机控制器的按钮处理程序**\n\n```objc\n-(IBAction)showPicker:(id)sender\n\
  {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
  \    imagePicker.delegate = self;\n\n    imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\
  \n    if ([UIImagePickerController isSourceTypeAvailable:\n         UIImagePickerControllerSourceTypeCamera])\
  \ {\n        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \    }\n\n    [self presentViewController:imagePicker animated:YES completion:^{\n\
  \        NSLog(@\"Image picker presented!\");\n    }];\n}\n```\n\n#### 练习：让用户选择图像选择器类型\n\
  \n通过将设备检测逻辑与操作表相结合，你可以让用户选择在运行时选择图像选择器类型。不要立即配置图像选择器，而是使用检测逻辑来配置操作表：\n\n```objc\n\
  -(IBAction)showPickerActionSheet:(id)sender\n{\n    UIActionSheet *pickerActionSheet\
  \ = nil;\n```\n\n\n```objc\nif ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        pickerActionSheet = [[UIActionSheet alloc] initWithTitle:@\"选择源类型\"\
  \n                                                          delegate:self cancelButtonTitle:@\"\
  取消\" destructiveButtonTitle:nil\n                                              \
  \    otherButtonTitles:@\"使用相册\", @\"拍照\", nil];\n} else {\n        pickerActionSheet\
  \ = [[UIActionSheet alloc] initWithTitle:@\"选择源类型\"\n                          \
  \                             delegate:self cancelButtonTitle:@\"取消\" destructiveButtonTitle:nil\n\
  \                                                  otherButtonTitles:@\"使用相册\",\
  \ nil];\n}\n[pickerActionSheet showInView:self.view];\n```\n\n接下来，你需要指明你的类实现了`UIActionSheetDelegate`协议，因此修改类定义，如下列代码中粗体所示：\n\
  \n```objc\n@interface FirstViewController : UIViewController <UIActionSheetDelegate,\n\
  \                  UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
  ```\n\n通过实现`didDismissWithButtonIndex:`委托方法，应用现在将呈现图片选择器，并根据用户点击的按钮配置源类型：\n\n```objc\n\
  -(void)actionSheet:(UIActionSheet *)actionSheet didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
  \    imagePicker.delegate = self;\n\n    switch (buttonIndex) {\n        case 0:\n\
  \            imagePicker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
  \            break;\n        case 1:\n            imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \            break;\n        default:\n            break;\n    }\n\n    [self presentViewController:imagePicker\
  \ animated:YES completion:^{\n        NSLog(@\"图片选择器已呈现！\");\n    }];\n}\n```\n\n\
  这段代码使用了`switch`语句而非`if-else`，因为操作表中有三个可能的选项：“使用图库”、“使用相机”和“取消”。取消按钮始终是列表中的最后一个。当你选择“取消”时，系统会销毁操作表，因此这里无需额外的逻辑来处理。\n\
  \n**注意** 取消按钮的默认行为是不执行任何操作就直接销毁操作表，这正是示例应遵循的做法。\n\n### 理解图片选择器的用户界面限制\n\n如你所见，`UIImagePicker`是访问苹果系统级相机控制器和已保存图片缩略图浏览器的便捷方式。不幸的是，由于它封装了系统级资源，也对视图控制器的呈现方式施加了限制。表\
  \ 2-5 显示了 iPhone 和 iPad 设备上图片选择器的默认状态。\n\n**表 2-5**. UIImagePickerController 用户界面状态\n\
  \n| | iPhone | iPad |\n| --- | --- | --- |\n| 相机 | 始终为全屏模态 | 始终为全屏模态 |\n| 相册 | 始终为全屏模态，竖屏方向\
  \ | 可以呈现为全屏模态，或在弹出控制器内呈现 |\n\n之前的示例主要针对 iPhone 设计。接下来，你将了解为适应 iPad 需要进行的修改。\n\n\
  ### 在 iPad 上呈现相册\n\n为了改善此应用的用户体验，你可以在 iPad 上使用弹出视图控制器来呈现图库界面。大多数应用会选择从`UIToolbarBarButtonItem`启动弹出视图，如图\
  \ 2-4 所示。\n\n![9781430250838_Fig02-04.jpg](img/9781430250838_Fig02-04.jpg)\n\n**图\
  \ 2-4**. 从 UIToolBarButtonItem 启动弹出视图的示例\n\n弹出视图具有几个独特属性，需要以不同于普通视图控制器的方式初始化。\n\n\
  弹出视图的第一个要求是，在呈现时不能销毁它，因此你需要将其存储为类的实例变量：\n\n```objc\n@property (nonatomic, strong)\
  \ UIPopoverController *popover;\n```\n\n接下来，`UIPopoverController`符合`UIAppearanceContainer`协议，意味着它旨在作为另一个视图控制器的容器，并且必须使用内容视图控制器进行初始化。清单\
  \ 2-13 修改了按钮处理程序，将图片选择器作为弹出视图控制器的`contentViewController`呈现。\n\n**清单 2-13**. 在弹出视图中显示图片选择器的按钮处理程序\n\
  \n```objc\n-(IBAction)showPicker:(id)sender\n{\n    UIImagePickerController *imagePicker\
  \ = [[UIImagePickerController alloc] init];\n    imagePicker.delegate = self;\n\
  \    imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\
  \n    if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \    }\n\n    self.popover = [[UIPopoverController alloc] initWithContentViewController:imagePicker];\n\
  }\n```\n\n你可能会看到顶部或底部带有按钮的弹出控制器。为此，请将目标视图控制器嵌入导航控制器，并在其工具栏中添加按钮。不过，本示例不会展示这一点。\n\
  \n最后，弹出视图需要一个*起点*——即它“弹出”的位置。本示例未使用导航控制器，而是从“拍照”按钮的框架位置呈现弹出视图：\n\n```objc\n[self.popover\
  \ presentPopoverFromRect:self.actionButton.frame inView:self.view\n            \
  \  permittedArrowDirections:UIPopoverArrowDirectionDown animated:YES];\n```\n\n\
  进一步证明苹果强烈希望你使用`UIBarButtonItem`来呈现弹出视图的是，他们提供了`presentPopoverFromBarButtonItem:`API。\n\
  \n**注意** 前述代码指定了`permittedArrowDirection`为`UIPopoverArrowDirectionDown`，强制弹出视图从“拍照”按钮向下弹出，这意味着弹出内容将出现在按钮下方。默认值为`UIPopoverArrowDirectionAny`，这是处理多种设备方向的更好选择。\n\
  \n要以编程方式关闭弹出视图，请在弹出控制器上调用`dismissPopoverAnimated:`方法，就像关闭其他任何视图控制器一样。此处的关键操作是选择图片或关闭控制器，因此将这段代码添加到`UIImagePickerController`的委托方法中，如清单\
  \ 2-14 所示。\n\n**清单 2-14**. 将弹出视图作为相机委托工作流程的一部分\n\n```objc\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker\n                              didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    UIImage *selectedImage = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
  \    [self.imageView setImage:selectedImage];\n\n    [picker dismissViewControllerAnimated:YES\
  \ completion:^{\n        NSLog(@\"图片已选择！\");\n    }];\n\n    if (self.popover !=\
  \ nil) {\n        [self.popover dismissPopoverAnimated:YES];\n        self.popover\
  \ = nil;\n    }\n}\n\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker\n{\n    [picker dismissViewControllerAnimated:YES completion:^{\n   \
  \     NSLog(@\"选择器已取消，未执行任何操作\");\n    }];\n\n    if (self.popover != nil) {\n \
  \       [self.popover dismissPopoverAnimated:YES];\n        self.popover = nil;\n\
  \    }\n}\n```\n\n\n你可以通过以下方式控制状态持久化（即是否希望弹出视图记住用户上次使用时的位置）：仅在选中图片时重新加载内容视图，或每次弹出视图时都重新加载。通常，最佳用户体验是每次弹出视图时都重新加载内容视图。本示例在按下\"\
  拍照\"按钮时始终重新初始化弹出视图来实现这一点；参见列表 2-15。\n\n***列表 2-15***。持久化弹出视图状态\n\n```\n-(IBAction)showPicker:(id)sender\n\
  {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
                                               imagePicker.delegate = self;\n\nimagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n\nif ([UIImagePickerController\
  \ isSourceTypeAvailable:\n         UIImagePickerControllerSourceTypeCamera]) {\n\
  \nimagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\n}\n\nif (UI_USER_INTERFACE_IDIOM()\
  \ == UIUserInterfaceIdiomPad &&\n       imagePicker.sourceType != UIImagePickerControllerSourceTypeCamera)\
  \ {\n        //iPad\n\nself.popover = [[UIPopoverController alloc]\n                        initWithContentViewController:imagePicker];\n\
  \n[self.popover presentPopoverFromRect:self.actionButton.frame\n                      inView:self.view\n\
                        permittedArrowDirections:UIPopoverArrowDirectionDown animated:YES];\n\
  \n} else {\n        //iPhone\n\n[self presentViewController:imagePicker animated:YES\
  \ completion:^{\n            NSLog(@\"Image picker presented!\");\n        }];\n\
      }\n}\n```\n\n**注意** 你还可以通过使用 `[UIPopoverController popoverContentSize]` 属性来控制弹出视图的大小。当你不想使用默认的\
  \ 320×600 像素大小时，这非常有用。\n\n## 总结\n\n本章介绍了 `UIImage`、`UIImageView` 和 `UIImagePIckerController`\
  \ 类。你了解了使用 `UIImage` 类加载数据的基础知识，以及它在底层提供的一些功能。你看到了如何使用 `UIImageView` 将 `UIImage`\
  \ 显示到屏幕上，以及如何动态处理意外的文件大小。最后，你了解了如何使用 `UIImagePicker` 从相机导入图片，学习了设备能力和协议如何帮助你安全地实现这个类，以及如何将简单的相机应用移植到\
  \ iPad。\n\n"
- "# 第 3 章：用图片做有用的事\n\n在本章中，你将看到如何通过添加特效、转换图片以及从应用中导出应用来改进你的图片相关应用。此外，你还将接触到新的图片处理用户界面，这些界面可以帮助你处理更高级的用例并构建引人入胜的用户体验。\n\
  \n本章假设你已具备使用 `UIImage` 类表示图片数据和使用 `UIImageView` 类显示图片数据的基本理解。如果你已经牢固掌握了这些主题，可以直接深入本章，专注于你最感兴趣的主题。如果你还需要复习，建议回顾第\
  \ 2 章。\n\n## 操作图片\n\n在 iOS 中处理图片时，你会遇到的两个常见任务是调整图片的大小和方向。虽然 `UIImage` 类允许你根据帧大小在运行时缩放图片，但这并非永久解决方案，且可能降低应用速度。同样，`UIImage`\
  \ 对裁剪提供了非常有限（且不一致）的控制。\n\n对于更持久的解决方案，你应当实现 Apple 所谓的*图形上下文*。图形上下文是 Apple 的 Quartz\
  \ 框架提供的一种数据类型，表示一个可以保存信息的绘制区域。Quartz 是 Apple 的绘图引擎，它位于 UIkit 的更低层级，让你能更直接地控制绘图操作。你可以使用图形上下文来绘制\
  \ 2D 图形、显示位图图片数据，甚至显示 PDF。\n\n对于所有图片操作，你需要执行以下步骤：\n\n1.  创建一个符合目标尺寸的上下文。\n2.  使用\
  \ `CGRect` 和 `CGContext` 辅助方法创建用于裁剪、调整大小或旋转的帧。\n3.  通过将操作后的图片放置到上下文上来绘制它。\n4.  将上下文的快照导出到文件或\
  \ `UIImage` 对象。\n5.  关闭上下文以指示你的图片操作已完成，视图已准备好进行下一次操作。\n\n你会注意到许多步骤与设置和拆卸相关。图形上下文对每个视图是唯一的，但在视图内是共享的。在你调用\
  \ `UIGraphicsGetCurrentContext` 辅助方法之前，图形上下文为 `nil`，该方法会尝试检索视图的当前上下文或创建一个新的。要保留你的更改，你需要在尝试任何其他操作之前关闭当前正在操作的上下文。\n\
  \n你可以将上下文想象成一块实体画布。你可以在画布上添加项目，在画布内旋转它们而不影响整体大小，甚至可以裁剪它们以适配。绘制对象就像将其粘贴并切掉边缘。导出则相当于宣告作品完成并将其发送给装裱师。\n\
  \n## 调整图片大小\n\n要调整图片大小，你需要关注的主要操作是计算目标图片大小，然后在那个帧内绘制图片。如前所述，一旦你对更改满意，你需要从上下文中导出生成的图片以*保存*它。\n\
  \n调整图片大小最常见的原因是创建*缩略图*，即图片的较小版本，适合在多项物品的集合中显示。当显示大量物品时，你应通过加载文件大小和尺寸都较小的文件来优化速度。\n\
  \n在确定了缩略图的边界大小（或限制）后（例如，50 像素 x 50 像素），你将图片缩小以适配此帧。为了保持图片的宽高比，你选择一个固定维度，并用它来计算缩放因子。图\
  \ 3-1 说明了调整图片大小的过程。\n\n![9781430250838_Fig03-01.jpg](img/9781430250838_Fig03-01.jpg)\n\
  \n图 3-1。调整图片大小的过程\n\n**注意** 使用固定维度可以让缩略图具有相同的宽度或高度，从而创造更好的用户体验。\n\n你通过将目标（固定）维度除以源图片的对应维度来找到缩放因子：例如，如果你要匹配高度，你将使用图片的高度。\n\
  \n```\nCGSize originalImageSize = self.originalImage.size;\nfloat targetHeight = 150.0f;\n\
  float scaleFactor = targetHeight / originalImageSize.height;\n```\n\n你通过将剩余维度乘以缩放因子来计算目标帧：\n\
  \n```\nfloat targetWidth = originalImageSize.width * scaleFactor;\nCGRect targetFrame\
  \ = CGRectMake(0, 0, targetWidth, targetHeight);\n```\n\n最后一步，你通过基于目标帧大小创建上下文，并调用\
  \ `[UIImage drawInRect:]` 实例方法将其绘制到上下文上，来创建缩放后的图片。完成后，将上下文的快照保存到 `UIImage` 对象并关闭上下文：\n\
  \n\n\n```objectivec\nUIGraphicsBeginImageContext(targetFrame.size);\n[self.originalImage\
  \ drawInRect:targetFrame];\nresizedImage = UIGraphicsGetImageFromCurrentImageContext();\n\
  UIGraphicsEndImageContext();\n[self.imageView setImage:resizedImage];\n```\n\n**列表\
  \ 3-1** 提供了一个完整方法的示例，它整合了上述所有步骤。\n\n***列表 3-1***. 调整图像大小\n\n```objectivec\n-(IBAction)shrink:(id)sender\n\
  {\n    UIImage *resizedImage = nil;\n\n    CGSize originalImageSize = self.originalImage.size;\n\
  \    float targetHeight = 150.0f;\n    float scaleFactor = targetHeight / originalImageSize.height;\n\
  \    float targetWidth = originalImageSize.width * scaleFactor;\n\n    CGRect targetFrame\
  \ = CGRectMake(0, 0, targetWidth, targetHeight);\n\n    UIGraphicsBeginImageContext(targetFrame.size);\n\
  \n    [self.originalImage drawInRect:targetFrame];\n\n    resizedImage = UIGraphicsGetImageFromCurrentImageContext();\n\
  \n    UIGraphicsEndImageContext();\n\n    [self.imageView setImage:resizedImage];\n\
  }\n```\n\n请记住，在调整图像大小时，大部分代码将用于计算新的帧尺寸并将其在图形上下文中正确定位。\n\n## 裁剪图像\n\n裁剪图像的过程与调整图像大小非常相似，区别在于，不是将整个图像缩小到目标帧的尺寸，而是需要调整其大小并重新定位，使其适合裁剪帧。裁剪图像的一个常见原因是制作统一的图像缩略图（例如，正方形），而不管源图像的尺寸如何。\n\
  \n与调整大小类似，第一步是找到图像的缩放比例。由于您希望保留图像的自然宽高比（即确保图像不会变形），因此应使用较小的尺寸作为基准。然后，您可以将图像居中于边界框内，并裁剪掉多余的部分。您可以在图\
  \ 3-2 中查看更新后的裁剪过程示意图。\n\n![9781430250838_Fig03-02.jpg](img/9781430250838_Fig03-02.jpg)\n\
  \n图 3-2. 图像裁剪过程\n\n**列表 3-2** 提供了裁剪过程的实现。\n\n***列表 3-2***. 裁剪图像\n\n```objectivec\n\
  -(IBAction)crop:(id)sender\n{\n    UIImage *resizedImage = nil;\n    CGSize originalImageSize\
  \ = self.originalImage.size;\n    CGSize targetImageSize = CGSizeMake(150.0f, 150.0f);\n\
  \    float scaleFactor, tempImageHeight, tempImageWidth;\n    CGRect croppingRect;\n\
  \n    BOOL favorsX = NO;\n\n    if (originalImageSize.width > originalImageSize.height)\
  \ {\n        scaleFactor = targetImageSize.height / originalImageSize.height;\n\
  \        favorsX = YES;\n    } else {\n        scaleFactor = targetImageSize.width\
  \ / originalImageSize.width;\n        favorsX = NO;\n    }\n\n    tempImageHeight\
  \ = originalImageSize.height * scaleFactor;\n    tempImageWidth = originalImageSize.width\
  \ * scaleFactor;\n\n    if (favorsX) {\n        float delta = (tempImageWidth -\
  \ targetImageSize.width) / 2;\n        croppingRect = CGRectMake(-1.0f * delta,\
  \ 0, tempImageWidth, tempImageHeight);\n    } else {\n        float delta = (tempImageHeight\
  \ - targetImageSize.height) / 2;\n        croppingRect = CGRectMake(0, -1.0f * delta,\
  \ tempImageWidth, tempImageHeight);\n    }\n\n    UIGraphicsBeginImageContext(targetImageSize);\n\
  \n    [self.originalImage drawInRect:croppingRect];\n\n    resizedImage = UIGraphicsGetImageFromCurrentImageContext();\n\
  \n    UIGraphicsEndImageContext();\n\n    [self.imageView setImage:resizedImage];\n\
  \n    self.statusLabel.text = @\"Effect: Crop\";\n}\n```\n\n您会注意到，此方法中的关键逻辑围绕着寻找较小的尺寸、重新定位图像以及通过移除边界框外的所有内容来保存更改。您需要移动图像使其适配在帧的中心，具体取决于需要在\
  \ `x` 还是 `y` 维度上进行更多裁剪（由 `favorsX` 变量指示）。此示例将其中一个 `origin` 值乘以 `-1.0`，表示图像需要向负方向移动（对于\
  \ `x` 是向左，对于 `y` 是向上）。与调整图像尺寸时一样，必须在完成后导出图形上下文的快照，以保存更改。\n\n如果您不想缩小图像，而只想在指定的 (`x`,`y`)\
  \ 位置裁剪出图像的一部分，则可以忽略缩放步骤。在这种情况下，最重要的操作是通过使用正确的目标坐标调用 `[UIView drawRect:]` 来定位边界框。列表\
  \ 3-3 提供了一个忽略缩放的裁剪操作示例。\n\n***列表 3-3***. 在指定 (`x`,`y`) 位置进行无缩放裁剪\n\n```objectivec\n\
  -(IBAction)crop:(id)sender\n{\n    UIImage *resizedImage = nil;\n    CGSize originalImageSize\
  \ = self.originalImage.size;\n    CGSize targetImageSize = CGSizeMake(150.0f, 150.0f);\n\
  \n    float originX = 10.0f;\n    float originY = 20.0f;\n    float scaleFactor,\
  \ tempImageHeight, tempImageWidth;\n    CGRect croppingRect = CGRectMake(originX,\
  \ originY, originalImageSize.width,\n        originalImageSize.height);\n    UIGraphicsBeginImageContext(targetImageSize);\n\
  \n    [self.originalImage drawInRect:croppingRect];\n\n    resizedImage = UIGraphicsGetImageFromCurrentImageContext();\n\
  \n    UIGraphicsEndImageContext();\n\n    [self.imageView setImage:resizedImage];\n\
  \n    self.statusLabel.text = @\"Effect: Crop\";\n}\n```\n\n您可以在本书的源代码包（请参见 Apress\
  \ 网站的来源/代码下载区域，`www.apress.com`）中找到演示裁剪和调整大小的示例项目。该项目名为 ImageTransformations，位于第\
  \ 3 章文件夹中。如图 3-3 所示，该项目提供了一个图像视图用于预览图像，以及用于裁剪、调整大小和将其恢复到原始大小的按钮。\n\n![9781430250838_Fig03-03.jpg](img/9781430250838_Fig03-03.jpg)\n\
  \n图 3-3. ImageTransformations 项目\n\n## 保存图像\n\n为了充分利用您的照片，包括您在应用中处理过的那些照片，您通常需要能够将它们保存到磁盘或照片库。除非用户使用的应用声明会在一段时间后删除所有图像（例如\
  \ Snapchat），否则大多数用户期望能够在下次打开应用时检索到他们使用您的应用创建的图像。保存图像的能力很重要，因为它能满足这种期望，并且允许用户将创建的图像导出到电子邮件或其他应用中。\n\
  \n### 将图像保存到文件\n\n将图像保存到磁盘的过程非常简单。与其他许多数据操作一样，您需要提取图像的二进制数据，并将此数据写入文件。\n\n要提取图像的二进制数据，您可以使用\
  \ UIKit 的便捷方法 `UIImagePNRepresentation()` 和 `UIImageJPEGRepresentation()`。这两种方法都返回\
  \ `NSData` 对象，如下所示：\n\n```objectivec\nNSData *imageData = UIImagePNGRepresentation(self.originalImage);\n\
  ```\n\n\n\n当你需要保留图片中的 Alpha（透明度）信息时，应使用 `UIImagePNGRepresentation()`，其唯一参数是你输入的\
  \ `UIImage`。如果你的图片不包含任何 Alpha 信息，且需要压缩选项，则应使用 `UIImageJPEGRepresentation()`。该方法的参数是输入的\
  \ `UIImage` 和一个 `float` 类型的值（范围 0.0 到 1.0），代表压缩质量。数值越低，压缩程度越高，图像质量越低。对于大多数应用来说，0.6\
  \ 或 0.7 是在文件大小与图像质量之间的良好平衡点：\n\n```\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage,\
  \ 0.7f);\n```\n\n准备好图片的二进制数据后，即可将其写入文件。你可以使用 `NSData` 的实例方法 `[NSData writeToFile:]`\
  \ 将数据写入磁盘。该方法需要一个文件的目标存储位置。就像从应用包内读取文件一样，你可以将应用的文档目录作为访问设备文件系统的接口。在列表 3-4 中提供了将图片保存到文档文件夹的示例。\n\
  \n***列表 3-4***. 将图片保存到文档文件夹\n\n```\n-(IBAction)saveToDisk:(id)sender\n{\n    NSArray\
  \ *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask,\n\
  \                     YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSString *filePath = [documentsDirectory stringByAppendingPathComponent:@\"\
  image.jpg\"];\n\nNSData *imageData = UIImageJPEGRepresentation(self.originalImage,\
  \ 0.7f);\n    NSError *error = nil;\n    NSString *alertMessage = nil;\n\n//在尝试写入前检查文件是否存在\n\
  \    if ([[NSFileManager defaultManager] fileExistsAtPath:filePath]) {\n\nNSDateFormatter\
  \ *dateFormat = [[NSDateFormatter alloc] init];\n        [dateFormat setDateFormat:@\"\
  yyyyMMddHHmm\"];\n\nNSString *dateString = [dateFormat stringFromDate:[NSDate date]];\n\
  \nNSString *fileName = [NSString stringWithFormat:@\"image-%@.jpg\", dateString];\n\
  \nfilePath = [documentsDirectory stringByAppendingPathComponent:fileName];\n   \
  \ }\n\n[imageData writeToFile:filePath options:NSDataWritingAtomic error:&error];\n\
  \nif (error == nil) {\n        alertMessage = @\"已成功保存到'Documents'文件夹！\";\n    }\
  \ else {\n        alertMessage = @\"无法保存图片 :(\";\n    }\n\nUIAlertView *alertView\
  \ = [[UIAlertView alloc] initWithTitle:@\"状态\"\n                               message:alertMessage\
  \ delegate:nil cancelButtonTitle:@\"确定\"\n                               otherButtonTitles:nil];\n\
  \    [alertView show];\n}\n```\n\n**注意** Apple 的 API 不提供自动文件命名功能，因此在尝试写入文件前，务必记得检查文件名是否已存在。\n\
  \n在列表 3-4 中，代表图片的对象采用 `self.originalImage` 的格式。这表明该图片是类的一个实例变量，而非特定方法中的局部变量。当需要在同一个类中多次操作同一个对象，而无需将其作为参数传递时，实例变量就显得尤为重要。你需要在头文件中声明实例变量来创建它：\n\
  \n```\n@property (nonatomic, strong) UIImage *originalImage;\n```\n\n现在文件已保存到文档文件夹，下次加载应用时你就可以访问它们了。\n\
  \n如果你希望用户能够将应用中的输出下载到他们的电脑上，还需要完成最后一步：为你的应用启用“iTunes 文件共享”。你可以通过导航到项目设置的“Info”选项卡，然后添加键“Application\
  \ supports iTunes file sharing”来实现，如图 图 3-4 所示。\n\n![9781430250838_Fig03-04.jpg](img/9781430250838_Fig03-04.jpg)\n\
  \n图 3-4. 启用 iTunes 文件共享\n\n现在，用户可以在 iTunes 中选择他们的设备，向下滚动到“App”选项卡的“文件共享”部分来查看文件。通过点击已安装应用列表中的应用名称，他们就能看到应用文档文件夹的内容，如图\
  \ 图 3-5 所示。\n\n![9781430250838_Fig03-05.jpg](img/9781430250838_Fig03-05.jpg)\n\n\
  图 3-5. 在 iTunes 中查看文件\n\n### 将图片保存到相册\n\n对于许多基于照片的应用，你可能希望为其他应用提供访问那些在你的应用内创建或处理的图片的权限。在这种情况下，更合适的做法是直接将图片保存到系统的照片库中。为此，Apple\
  \ 提供了一个便捷方法 `UIImageWriteToSavedPhotosAlbum()`，该方法允许你将 `UIImage` 对象直接保存到“相机胶卷”相册。\n\
  \n要使用 `UIImageWriteToSavedPhotosAlbum()` 方法，你需要传入要保存的 `UIImage` 对象，并可选地传入一个完成处理程序，该处理程序将在操作完成后执行。你可以使用这个完成处理程序来判断保存是否成功，并执行后续操作，例如显示一个\
  \ `UIAlertView`：\n\n```\nUIImageWriteToSavedPhotosAlbum(self.originalImage, self,\n\
  \                               @selector(image:didFinishSavingWithError:contextInfo:),\
  \ nil);\n```\n\n如果你使用了完成处理程序，请确保同时传递 `completionTarget` 参数（此处为 `self`）和处理程序方法的选择器。否则，你的代码将不知道在运行时使用哪个方法，也不知道在哪里查找它。列表\
  \ 3-5 提供了一个显示提示视图的完成处理程序示例。\n\n***列表 3-5***. 显示提示视图的完成处理程序\n\n```\n- (void)image:(UIImage\
  \ *)image didFinishSavingWithError:(NSError *)\n                               \
  \                          error contextInfo:(void *)contextInfo\n{\n    NSString\
  \ *alertMessage = nil;\n    if (error == nil) {\n        alertMessage = @\"已成功保存到相机胶卷！\"\
  ;\n    } else {\n        alertMessage = @\"无法保存图片 :(\";\n    }\n\nUIAlertView *alertView\
  \ = [[UIAlertView alloc] initWithTitle:@\"状态\"\n                               message:alertMessage\
  \ delegate:nil cancelButtonTitle:@\"确定\"\n                               otherButtonTitles:nil];\n\
  \    [alertView show];\n}\n```\n\n在源代码包中，我提供了一个名为 ImageSave 的示例项目，它演示了两种保存图片的方式。如图\
  \ 图 3-6 所示，该应用提供了一个图片视图和两个触发保存操作的按钮。\n\n![9781430250838_Fig03-06.jpg](img/9781430250838_Fig03-06.jpg)\n\
  \n图 3-6. ImageSave 项目\n\n## 从网络加载图片\n\n你永远无法预测从网络加载一张图片需要多长时间。虽然你可以使用 `[NSData initWithContentsOfUrl:]`\
  \ 方法来加载图片数据，但该方法不会提供错误处理，并且是一个阻塞操作，这意味着在下载完成之前，你的应用将无法响应其他事件。更好的方法是在后台下载图片，并在数据准备好后用下载结果刷新\
  \ `UIImageView`。\n\n要在应用的后台下载图片数据，你需要使用 `NSURLConnection` 类。该类允许你控制下载（开始/停止），并提供了选项来控制其在何处执行（前台或后台），以及响应是通过委托还是完成块来处理。\n\
  \n首先，用占位图片或 `nil` 值初始化你的 `UIImageView`：\n\n```\n[self.imageView setImage:nil];\n\
  ```\n\n接下来，初始化一个包含目标 URL 的 `NSURLRequest` 对象：\n\n\n```objectivec\nNSURL *imageUrl\
  \ = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"];\nNSURLRequest\
  \ *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n```\n\n`NSURLRequest` 对象将\
  \ URL 包装在一个 HTTP `GET` 命令中，这是浏览器和其他应用程序向 Web 服务器发送下载请求的方式。\n\n为了简化此实现，我建议使用允许指定完成块的\
  \ `NSURLConnection` 方法：`[NSURLConnection sendAsynchronousRequest:]`。使用完成处理程序可以在方法完成后立即执行代码块，而无需持久化变量或创建额外的方法。它是一个类方法，因此无需实例化对象即可使用：\n\
  \n```objectivec\n[NSURLConnection sendAsynchronousRequest:urlRequest queue:[NSOperationQueue\
  \ mainQueue]\n                 completionHandler:^(NSURLResponse *response, NSData\
  \ *data,\n                 NSError *connectionError) { ... }];\n```\n\n可以看到，该方法的完成处理程序返回一个\
  \ `NSData` 对象和一个 `NSError` 对象。如果下载失败，`error` 对象将为 `nil`；否则它将包含一个非 `nil` 值。清单 3-6\
  \ 展示了一个方法，该方法发起下载，并在下载成功时根据结果数据创建一个 `UIImage` 对象。如果下载失败，应用程序将向用户显示一个提示错误的警告视图。\n\
  \n***清单 3-6*** 从网络加载图像\n\n```objectivec\n-(IBAction)start:(id)sender\n{\n    NSURL\
  \ *imageUrl = [NSURL URLWithString:@\"http://www.devatelier.com/images/flower.png\"\
  ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n \
  \   [self.imageView setImage:nil];\n\n    [NSURLConnection sendAsynchronousRequest:urlRequest\
  \ queue:[NSOperationQueue mainQueue]\n                     completionHandler:^(NSURLResponse\
  \ *response, NSData *data,\n                     NSError *connectionError) {\n\n\
  \        if (connectionError == nil) {\n\n            UIImage *newImage = [UIImage\
  \ imageWithData:data];\n            [self.imageView setImage:newImage];\n\n    \
  \    } else {\n            UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"\
  Error\"\n                message:@\"Could not load image :(\" delegate:nil cancelButtonTitle:@\"\
  OK\"\n                otherButtonTitles:nil];\n            [alertView show]; \n\
  \        }\n    }];\n}\n```\n\n## 添加活动指示器\n\n在许多应用程序中，你会注意到一个旋转动画，表示操作正在进行中（例如下载图像），如图\
  \ 3-7 所示。你可以通过 `UIActivityIndicatorView` 类向任何视图添加旋转器（或活动指示器）。\n\n![9781430250838_Fig03-07.jpg](img/9781430250838_Fig03-07.jpg)\n\
  \n图 3-7 叠加了活动指示器的视图\n\n要将 `UIActivityIndicatorView` 添加到 `UIImageView`，你需要遵循与其他 `UIView`\
  \ 相同的大多数初始化步骤，包括设置容器框架以及将 `UIActivityIndicatorView` 作为子视图添加到 `UIImageView` 之上。\n\
  \n通过查看图 3-7，你会注意到 `UIActivityIndicatorView` 与 `UIImageView` 相比非常小。为了适应尺寸差异，你可以找到\
  \ `UIImageView` 的中心，并将其作为 `UIActivityIndicatorView` 的起点。清单 3-7 提供了一个向图像视图添加活动指示器的示例。\n\
  \n***清单 3-7*** 向图像视图添加活动指示器\n\n```objectivec\n// calculate the mid-way point of\
  \ the image view\nCGFloat indicatorWidth, indicatorHeight;\nindicatorWidth = indicatorHeight\
  \ = 100.0f;\n\nCGFloat originX = (self.imageView.frame.size.width - indicatorWidth)\
  \ / 2;\nCGFloat originY = (self.imageView.frame.size.height - indicatorHeight) /\
  \ 2;\n\nCGRect activityFrame = CGRectMake(originX, originY, indicatorWidth, indicatorHeight);\n\
  \nself.activityView = [[UIActivityIndicatorView alloc] initWithFrame:activityFrame];\n\
  self.activityView.color = [UIColor blackColor];\n[self.imageView addSubview:self.activityView];\n\
  ```\n\n你需要将 `UIImageView` 和 `UIActivityIndicatorView` 对象声明为实例变量，因为你需要在整个类中访问它们。\n\
  \n在 `UIActivityIndicatorView` 初始化并添加到 `UIImageView` 之后，你就可以让魔法发生了。当下载操作开始时，应使用 `[UIActivityIndicatorView\
  \ startAnimating]` 实例方法来启动活动指示器的动画。当操作完成（无论成功还是失败）时，调用 `[UIActivityIndicatorView\
  \ stopAnimating]` 实例方法来停止动画并隐藏活动指示器。\n\n清单 3-8 展示了一个结合了发起下载与启动、停止活动指示器的示例。\n\n***清单\
  \ 3-8*** 加载图像并使用活动指示器镜像状态\n\n```objectivec\n-(IBAction)start:(id)sender\n{\n   \
  \ NSURL *imageUrl = [NSURL URLWithString:@\"http://images.devatelier.com/castle.jpg\"\
  ];\n    NSURLRequest *urlRequest = [NSURLRequest requestWithURL:imageUrl];\n\n \
  \   [self.imageView setImage:nil];\n    [self.imageView bringSubviewToFront:self.activityView];\n\
  \    [self.activityView startAnimating];\n\n    [NSURLConnection sendAsynchronousRequest:urlRequest\
  \ queue:[NSOperationQueue mainQueue]\n                     completionHandler:^(NSURLResponse\
  \ *response, NSData *data,\n                     NSError *connectionError) {\n\n\
  \        [self.activityView stopAnimating];\n\n        if (connectionError == nil)\
  \ {\n\n            UIImage *newImage = [UIImage imageWithData:data];\n         \
  \   [self.imageView setImage:newImage];\n\n        } else {\n            UIAlertView\
  \ *alertView = [[UIAlertView alloc] initWithTitle:@\"Error\" message:@\"Could not\
  \ load image :(\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
  \            [alertView show];\n        }\n    }];\n}\n```\n\n**注意** 视图按照添加的顺序显示。在此示例中，我使用了\
  \ `[UIView bringSubviewToFront:]` 实例方法来强制活动指示器显示在视图堆栈的最顶层。\n\n本章源代码包中的 ImageDownload\
  \ 项目实现了图 3-7 所示的用户界面。当用户按下“Start Download”按钮时，图像将在后台开始下载并显示活动指示器。下载完成后，指示器将消失，图像视图将重新加载已下载的图像。\n\
  \n## 为图像添加效果\n\n无可争议，Apple 在 iOS 7 中引入的最引人注目的变化是其新的视觉设计语言以及为开发者提供的实现该语言的工具。iOS 7\
  \ 标志着 Apple 从传统的拟物化用户界面方法（从现实世界中获取灵感）转向扁平、简洁、数字优先的设计。\n\n在本节中，你将学习如何开始使用这种设计语言。你将利用传统方法（如渐变）为图像增加深度，并了解模糊和运动效果如何让你的应用使用\
  \ Apple 在其应用中使用的许多引人注目的视觉效果。\n\n### 添加渐变\n\n为了增加深度并突出叠加在图像上的内容（例如文本），你可以使用渐变。幸运的是，有一个现成的\
  \ API 可以做到这一点！\n\n好的，高级文档工程师和翻译员已就位。以下是按照您的要求翻译后的中文文档。\n\n\n你可以用来在视图上绘制渐变的 Quartz\
  \ 类是`CAGradientLayer`。它是视图绘制类`CALayer`的子类，旨在根据输入的颜色和颜色停止点绘制渐变。*停止点*决定了各个区域应在何处停止并开始相互交错。你可以使用的颜色或停止点数量没有限制，但应尽量遵循良好的设计原则，实现不分散注意力的渐变。如图\
  \ 3-8 所示，不同数量的停止点可以基于你放置它们的位置以及使用颜色区域的方式，产生截然不同的效果。\n\n![9781430250838_Fig03-08.jpg](img/9781430250838_Fig03-08.jpg)\n\
  \n图 3-8 两个停止点的渐变与三个停止点的渐变对比\n\n代码清单 3-9 展示了向`UIImageView`添加渐变的示例。\n\n***代码清单 3-9***\
  \ 向 UIImageView 添加渐变\n\n```\nUIColor *darkestColor = [UIColor colorWithWhite:0.1f\
  \ alpha:0.7f];\nUIColor *lightestColor = [UIColor colorWithWhite:0.7f alpha:0.1f];\n\
  \nCAGradientLayer *headerGradient = [CAGradientLayer layer];\nheaderGradient.colors\
  \ = [NSArray arrayWithObjects:(id)darkestColor.CGColor,\n                      \
  \   (id)lightestColor.CGColor, (id)darkestColor.CGColor,  nil];\n\nheaderGradient.frame\
  \ = self.headerImageView.bounds;\n[self.headerImageView.layer insertSublayer:headerGradient\
  \ atIndex:0];\n```\n\n**注意**：如果你未定义任何停止点，默认值将均匀分布。\n\n要创建渐变，首先需要创建一个`CAGradientLayer`对象。然后，指定要使用的颜色。在此示例中，我希望图像显示圆角效果，因此我使用了三个停止点，并且颜色从深色过渡到浅色，然后再回到深色。\n\
  \n**注意**：在图像上放置渐变时，我强烈建议使用`UIColor`方法，该方法允许你指定 alpha 值。Alpha 值决定了图层的透明度。Alpha 值为`0.0`意味着图层完全透明，而\
  \ alpha 值为`1.0`意味着图层完全不透明。交替使用你的 alpha 值，可以使渐变效果在不同位置更强或更弱，同时不会完全遮盖图像。\n\n图 3-9\
  \ 展示了渐变输出的示例。\n\n![9781430250838_Fig03-09.jpg](img/9781430250838_Fig03-09.jpg)\n\
  \n图 3-9 带有渐变的图像视图与不带渐变的图像视图对比\n\n使用渐变，你可以仅用几行简单的代码创建强大的视觉效果，帮助你的图像实现更逼真的光照感。渐变还能比单纯的投影更好地突出覆盖层。此示例中使用的效果与\
  \ Facebook 在其个人资料页面上使用的效果相同。\n\n使用渐变的示例项目名为`ImageGradient`。\n\n## 让图像随设备移动\n\niOS\
  \ 7 带来的最令人兴奋的用户界面功能之一，是能够向任何视图添加动态效果。*动态效果*允许你响应加速器事件移动视图，从而使应用更具沉浸感，并突出 UI 中最重要的部分。苹果使用动态效果来制作\
  \ iOS 7+ 主屏幕、锁屏、提醒视图以及 iPhone 上的 Safari 标签页浏览器的动画。\n\n苹果通过`UIMotionEffect`抽象类公开了访问和创建动态效果的能力。作为一个抽象类，它必须被子类化才能实例化。然而，幸运的是，苹果提供了一个非常简单的子类，可以根据加速度计的变化水平和垂直移动视图，称为`UIInterpolatingMotionEffect`。\n\
  \n**注意**：要实现你自己的完全自定义行为和高级动画，你可以直接子类化`UIMotionEffect`，并在`keyPathsAndRelativeValuesForViewerOffsets:`方法中添加你的自定义逻辑。\n\
  \n要使用`UIInterpolatingMotionEffect`，你必须实例化一个对象，该对象带有一个`keyPath`，表示你要基于动态事件修改的`view`属性（例如，中心\
  \ x 位置），以及你要响应的动态类型（例如，水平移动）。对于许多动态效果，你将要显示视图的隐藏区域，因此你还必须定义相对限制，让动态效果知道这些边界是什么。定义效果后，你可以通过使用`[UIView\
  \ addMotionEffect:]`实例方法将其添加到视图。你可以直接向此方法传递一个`UIMotionEffect`对象，或者如果你尝试一次添加多个效果，则传递一个`UIMotionEffectGroup`对象。代码清单\
  \ 3-10 展示了向`UIImageView`添加动态效果的示例。\n\n***代码清单 3-10*** 向 UIImageView 添加动态效果\n\n```\n\
  UIInterpolatingMotionEffect *horizontalEffect = [[UIInterpolatingMotionEffect alloc]\n\
  \                             initWithKeyPath:@\"center.x\"\n                  \
  \           type:UIInterpolatingMotionEffectTypeTiltAlongHorizontalAxis];\n\nUIInterpolatingMotionEffect\
  \ *verticalEffect = [[UIInterpolatingMotionEffect alloc]\n                     \
  \        initWithKeyPath:@\"center.y\"\n                             type:UIInterpolatingMotionEffectTypeTiltAlongVerticalAxis];\n\
  \nhorizontalEffect.minimumRelativeValue  = [NSNumber numberWithInteger:-50];\nhorizontalEffect.maximumRelativeValue\
  \  = [NSNumber numberWithInteger:50];\n\nverticalEffect.minimumRelativeValue  =\
  \ [NSNumber numberWithInteger:-50];\nverticalEffect.maximumRelativeValue  = [NSNumber\
  \ numberWithInteger:50];\n\n//set bg image effects\n[self.backgroundImageView addMotionEffect:horizontalEffect];\n\
  [self.backgroundImageView addMotionEffect:verticalEffect];\n```\n\n在代码清单 3-10 中，我设置了背景视图的动态效果。由于动态效果的意图是突出或弱化视图层次结构中的某个视图，因此通常将效果应用于背景中的视图或前景中的动作视图（例如，`UIAlertView`）是合适的。\n\
  \n**注意**：iOS 辅助功能屏幕中的“减弱动态效果”开关允许用户在整个系统范围内（包括你的应用）禁用动态效果。这无法被覆盖，因此请记住针对此限制进行设计。\n\
  \n源代码包中使用动态效果的示例项目名为`ImageTilt`。如图 3-10 所示，没有按钮。输入来自设备的倾斜。你会注意到图像在移动，但标签没有。\n\n\
  ![9781430250838_Fig03-10.jpg](img/9781430250838_Fig03-10.jpg)\n\n图 3-10 ImageTilt\
  \ 项目的动态效果\n\n## 为图像添加模糊效果\n\n苹果在 iOS 7 的设计语言中带来的另一个令人兴奋的视觉效果，是强调模糊背景图像以突出用户界面的重要部分。当你打开\
  \ Siri 时，可以非常频繁地看到这种效果，如图 3-11 所示。\n\n![9781430250838_Fig03-11.jpg](img/9781430250838_Fig03-11.jpg)\n\
  \n图 3-11 Siri 中的模糊效果\n\n\n```markdown\n\n创建模糊背景所需的许多核心概念都利用了创建图形上下文来操作图像，然后使用`CGAffineTransform`修改源图像。Apple\
  \ 倾向于使用*高斯模糊*效果，这种效果通过数学运算平滑图像，从而减少细节。幸运的是，Apple 在 2013 年 Apple 全球开发者大会（WWDC）上为`UIImage`创建了一个名为`UIImage+ImageEffects.h`的分类类，它管理用于计算的图形上下文，执行模糊函数，并返回结果。我已将`ImageEffects`分类包含在本章的示例代码中。你也可以在\
  \ iOS Dev Center 上搜索 WWDC 课程“Implementing Engaging UI on iOS”找到它。\n\niOS 中的*分类*允许你在不子类化的情况下扩展一个类。分类允许你编写非常小的文件，这些文件可以为现有类添加多个方法，以增加功能。\n\
  \n要使用`ImageEffects`分类，你需要在你的类中包含`UIImage+ImageEffects.h`。然后，你可以像使用其他`UIImage`方法一样使用它提供的额外方法。图\
  \ 3-12 比较了每种模糊效果提供的结果。\n\n![9781430250838_Fig03-12.jpg](img/9781430250838_Fig03-12.jpg)\n\
  \n图 3-12. 同一张图片上的 Extra Light Effect 模糊、Light Effect 模糊和 Dark Effect 模糊\n\n你应该使用的模糊效果取决于你的用户界面和图像的颜色。对于浅色图像，最好使用`[UIImage\
  \ applyLightEffect:]`，而`[UIImage applyDarkEffect:]`更适合深色图像。如你所见，选择效果只需一行代码：\n\n\
  ```\nUIImage *blurredImage = [self.originalImage applyLightEffect];\n```\n\n为图像添加模糊效果的示例项目名为\
  \ ImageBlur。如图 3-13 所示，该项目有三个按钮，用于在模糊类型之间切换。我强烈建议使用你自己的一些图像测试该项目，看看模糊效果如何影响它们。\n\
  \n![9781430250838_Fig03-13.jpg](img/9781430250838_Fig03-13.jpg)\n\n图 3-13. ImageBlur\
  \ 项目\n\n## 总结\n\n在本章中，你了解了如何利用图形上下文的画布般能力来操作图像。接着，你学习了如何将图像导出到文件和相册，以便稍后重用或与其他应用共享。为了让你的应用更快，你了解了如何在不阻塞用户界面的情况下从互联网加载图像。最后，你开始看到如何使用\
  \ Apple 的许多视觉效果方法为图像增加额外的深度感。\n\n# 第 4 章：高级照片界面\n\n在本章中，你将通过构建自己的图像捕获和照片选择器类（类似于`UIImagePickerController`提供的默认类）来探索更底层的相机编程主题。在此过程中，你将了解如何配置硬件相机进行图像捕获，如何直接从“照片”应用访问照片，以及如何在用户界面中呈现这些原始数据。\n\
  \n你将使用`UIImagePickerController`作为功能参考，因此如果你不确定如何呈现该类或处理其输出，最好回顾第 2 章。\n\n虽然复制 iOS\
  \ 已提供的功能似乎工作量很大，但拥有一个与应用其余部分风格迥异的相机界面，或者一个不允许用户修改以改善照片质量的界面，会极大地影响你的功能并赶走用户。\n\n\
  ## 构建自定义相机界面\n\n第一个练习是复制`UIImagePickerController`提供的基本图像捕获界面。如图 4-1 所示，该项目使用了非标准界面，并公开了扩展的硬件控制集。\n\
  \n![9781430250838_Fig04-01.jpg](img/9781430250838_Fig04-01.jpg)\n\n图 4-1. 具有自定义用户界面的相机控制器模型\n\
  \n为实现这一点，应用必须能够执行以下操作：\n\n*   发现并配置相机硬件\n*   显示来自相机的实时数据流\n*   从 UI 修改捕获设置\n*  \
  \ 当用户点击“拍照”按钮时捕获图片\n\n理想情况下，你应该使用一个允许你配置相机“对象”并访问其生成的数据流的类。同时，你不想自己编写硬件驱动程序，因此最好使用能抽象这一层的工具。幸运的是，`AVFoundation`框架中包含了该功能，它是\
  \ Cocoa Touch 的一部分。\n\n顾名思义，`AVFoundation`是 Apple 的媒体框架之一，用于捕获、操作和存储音频和视频资源。`AVFoundation`中的视频捕获\
  \ API 允许你访问来自相机的原始视频流，并为硬件控制（如闪光灯或自动对焦）提供高级配置功能。\n\n你可以通过以下方式从视频流构建图像捕获接口：记住视频流只不过是一系列称为*帧*的图像。要捕获图像，你只需从视频中提取一帧。为确保结果准确，你需要在图像对焦时提取帧。\n\
  \n在本节中，你将了解如何使用`AVFoundation`设置相机、显示实时流以及根据用户界面事件捕获帧或更改设置。为了加快工作流程，本节使用 storyboards\
  \ 和 Interface Builder 来构建用户界面。\n\n与本书之前的练习一样，你可以在 Apress 网站（`www.apress.com`）的“源代码/下载”区域找到该项目的源代码，位于第\
  \ 4 章文件夹下。该应用的名为 MyCamera。\n\n### 初始化硬件接口\n\n在你的应用尝试访问共享资源（如硬件）或执行失败可能性很高的操作时，Apple\
  \ 建议使用*会话*设计模式。该模式通过会话对象管道传输所有操作，提供了错误减少和流量控制功能，例如信号量。会话还通过简化复杂接口的设置和拆除流程来减少错误。你将在访问音频硬件或执行网络操作时看到这种设计模式的使用。\n\
  \n要开始在项目中使用`AVFoundation`类，你需要将框架添加到项目中，并在任何使用它的类中包含它。向项目添加框架最简单的方法是将其添加到应用的“已链接的框架和库”数组中。你可以通过单击\
  \ Xcode 项目导航器中的项目名称，然后滚动到“通用”选项卡底部来修改此数组，如图 4-2 所示。\n\n![9781430250838_Fig04-02.jpg](img/9781430250838_Fig04-02.jpg)\n\
  \n图 4-2. 查找“已链接的框架和库”数组\n\n你可以通过单击“已链接的框架和库”窗格底部的加号按钮来选择要添加的框架。执行此操作会显示一个导航器，显示你开发计算机上安装的框架。你可以通过输入所需框架的名称进一步过滤列表。选择一个框架，然后单击“添加”按钮将其添加到项目（参见图\
  \ 4-3）。\n\n![9781430250838_Fig04-03.jpg](img/9781430250838_Fig04-03.jpg)\n\n```\n\
  \n\n#### 图 4-3. Xcode 的框架选择器\n\n在将 `AVFoundation` 框架添加到项目后，你需要在使用该框架的每个类的头文件顶部添加包含语句来将其引入你的文件。MyCamera\
  \ 应用程序的头文件为 `ViewController.h`：\n\n```\n#include <AVFoundation/AVFoundation.h>\n\
  ```\n\n你用于管理硬件会话的 `AVFoundation` 类名为 `AVCaptureSession`。该类负责管理硬件接口，并提供高级别的启动和停止操作。实例化一个会话对象非常简单，只需调用\
  \ `AVCaptureSession` 对象的 `init` 方法：\n\n```\nAVCaptureSession *session = [[AVCaptureSession\
  \ alloc] init];\n```\n\n**注意** 你需要在应用中与所有试图访问该会话对象的类共享它，因此请记得将其声明为实例变量或单例。\n\n当你准备通过会话使用硬件设备时，需要将它们作为*输入*添加。这分为两个步骤：首先识别你想要使用的硬件设备，然后将其配置为向你的会话发送数据。硬件设备由\
  \ `AVCaptureDevice` 类表示，通过该类你可以查询设备权限和硬件可用性，并为设备配置采集设置。\n\n在开始向设备发送命令之前，你需要先发现该设备。使用\
  \ `[AVCaptureDevice defaultDeviceWithMediaType:]` 类方法发现特定媒体类型的默认硬件设备。使用 `AVMediaTypeVideo`\
  \ 常量指定视频设备：\n\n```\nAVCaptureDevice *camera = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  ```\n\n**注意** 若要发现所有符合某类型的设备，请使用 `[AVCaptureDevice devicesWithMediaType:]` 类方法。为了匹配特定属性（例如摄像头位置），你需要遍历结果。你可以使用\
  \ `position` 属性来判断摄像头位于设备正面还是背面。\n\n找到设备后，你需要将其添加到会话中。要将设备配置为与 `AVCaptureSession`\
  \ 一起使用，你需要将其实例化为 `AVDeviceCaptureInput` 对象。`AVDeviceCaptureInput` 会尝试初始化硬件设备，如果成功则返回一个对象，如果失败则返回\
  \ `NSError`。对象就绪后，使用 `[AVCaptureSession canAddInput:]` 方法确认该设备可供你的应用程序使用，然后调用 `[AVCaptureSession\
  \ addInput:]` 实例方法将其添加到会话中。你可以在代码清单 4-1 中找到说明此过程的示例。\n\n#### 代码清单 4-1. 添加摄像头输入\n\
  \n```\nNSError *error = nil;\nAVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput\n\
  \                                     deviceInputWithDevice:camera\n           \
  \                          error:&error];\n\nif (error == nil && [self.session canAddInput:cameraInput])\
  \ {\n    [self.session addInput:cameraInput];\n}\n```\n\n**警告** 为减少错误，在尝试添加输入之前，应始终确保该输入可用。请记住，摄像头是共享资源，你需要与其他应用和谐共处！\n\
  \n### 访问实时摄像头画面\n\n在建立与摄像头硬件的接口后，你需要某种方式将输出显示在屏幕上。要显示实时视频画面，你需要执行三个步骤：\n\n1.  访问包含实时视频流的数据源。\n\
  2.  将视频流放置到视图上。\n3.  启动流。\n\n`AVFoundation` 中负责镜像会话视频输出的类是 `AVCaptureVideoPreviewLayer`。该类是\
  \ `CALayer` 的子类，通常被称为**核心动画层**。核心动画层是一种后台类，你在将图像数据绘制到屏幕之前会将其发送给该类。层代表内容，而视图则代表内容将显示的位置。\n\
  \n\n\n与传统动画中的赛璐珞片类似，你可以组合图层来表示更复杂的数据，也可以独立移动它们。由于视频流本质上是快速变化的图像序列，从性能角度来看，将内容直接写入图层比在每一帧变化时销毁视图要合理得多。\n\
  \n通过调用构造方法 `[AVCapturePreviewLayer initWithSession:]` 来实例化 `AVCapturePreviewLayer`\
  \ 对象，并将会话对象作为输入参数传入：\n\n```\nAVCaptureVideoPreviewLayer *previewLayer =\n     [[AVCaptureVideoPreviewLayer\
  \ alloc] initWithSession:self.session];\n```\n\n为了正确显示图层，你需要指定其尺寸和位置。在 `MyCamera`\
  \ 项目中，你将使用名为 `previewView` 的 `UIView` 属性来展示相机实时画面。要将视频图层居中于该视图并赋予其相同的边界，可以使用以下代码片段：\n\
  \n```\nCGRect layerRect = self.previewView.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
  \    CGRectGetMidY(layerRect));\n[previewLayer setBounds:layerRect];\n[previewLayer\
  \ setPosition:layerCenter];\n```\n\n然而，要显示视频图层，你需要为其指定一个绘制目标。你希望在视图上绘制视频，因此将预览图层作为子层添加到视图顶层：\n\
  \n```\n[self.previewView.layer addSublayer:previewLayer];\n```\n\n默认情况下，预览图层会在保持宽高比的同时调整相机输出大小以适应其容器框。通过将\
  \ `videoGravity` 属性设置为 `AVLayerVideoGravityResize`，你可以将缩放模式更改为按比例填充：\n\n```\n[previewLayer\
  \ setVideoGravity:AVLayerVideoGravityResize];\n```\n\n最后一步是启动视频流，在会话对象上调用 `[AVCaptureSession\
  \ startRunning]` 方法即可：\n\n```\n[self.session startRunning];\n```\n\n`ViewController`\
  \ 类的完整相机设置代码见列表 4-2。该代码被封装在 `[self viewDidLoad:]` 方法中，因为当视图初始化时需要初始化相机。\n\n**列表\
  \ 4-2**。初始化相机输入\n\n```\n- (void)viewDidLoad\n{\n        [super viewDidLoad];\n \
  \           // Do any additional setup after loading the view.\n        self.session\
  \ = [[AVCaptureSession alloc] init];\n        AVCaptureDevice *camera = [AVCaptureDevice\n\
  \            defaultDeviceWithMediaType:AVMediaTypeVideo];\n        NSError *error\
  \ = nil;\n\nAVCaptureDeviceInput *cameraInput = [AVCaptureDeviceInput\n        \
  \     deviceInputWithDevice:camera error:&error];\n\nif (error == nil && [self.session\
  \ canAddInput:cameraInput]) {\n             [self.session addInput:cameraInput];\n\
  \nAVCaptureVideoPreviewLayer *previewLayer =\n                [[AVCaptureVideoPreviewLayer\
  \ alloc]\n                  initWithSession:self.session];\n\nCGRect layerRect =\
  \ self.previewView.bounds;\n            CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
  \                                  CGRectGetMidY(layerRect));\n\n[previewLayer setBounds:layerRect];\n\
  \            [previewLayer setPosition:layerCenter];\n\n[previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
  \n[self.previewView.layer addSublayer:previewLayer];\n\n[self.session startRunning];\n\
  \    }\n}\n```\n\n### 捕捉静态图像\n\n与之前向 `AVCaptureSession` 添加*输入*（input）以确定输入设备的方式类似，你需要添加一个*输出*（output）来确定如何导出数据。在本例中，当用户准备就绪时，你希望导出一张照片——以视频单帧的形式表示。\n\
  \n`AVCaptureSession` 输出对象的基类是 `AVCaptureOutput`，但它是一个仅指定捕获对象所需信息的抽象类。幸运的是，`AVFoundation`\
  \ 提供了许多 `AVCaptureObject` 的子类，可用于你所需的导出格式。常用的一些子类列举在表 4-1 中。\n\n\n\n表 4-1. 常用的 `AVCaptureOutput`\
  \ 子类\n\n| 子类 | 捕获输出 |\n| --- | --- |\n| `AVCaptureMovieFileOutput` | QuickTime 影片文件\
  \ |\n| `AVCaptureVideoDataOutput` | 视频帧——用于处理 |\n| `AVCaptureAudioFileOutput` |\
  \ Core Audio 支持的音频文件（.MP3、.AIFF、.WAV、.AAC） |\n| `AVCaptureAudioDataOutput` | 音频缓冲区——用于处理\
  \ |\n| `AVCaptureMetadataOutput` | 媒体文件元数据属性（例如 GPS 位置、曝光度） |\n| `AVCaptureStillImageOutput`\
  \ | 静态图像和元数据 |\n\n要捕获静态图像，请使用 `AVCaptureStillImageOutput` 子类。使用该类捕获图像的方法被定义为实例方法，因此需将\
  \ `AVCaptureStillImageOutput` 对象声明为实例变量：\n\n```\nself.stillImageOutput = [[AVCaptureStillImageOutput\
  \ alloc] init];\n```\n\n虽然无需配置输出对象即可捕获原始数据，但最好通过将数据压缩为 JPEG 文件(.JPG)来节省空间。为此，您需要在配置字典中指定编解码器类型。将\
  \ `kCMVideoCodecType_JPEG` 常量作为 `AVVideoCodecKey` 键的值以指定 JPEG 格式。字典准备就绪后，使用 `[AVStillImageOutput\
  \ setOutputSettings:]` 方法保存设置，如代码清单 4-3 所示。\n\n***代码清单 4-3***. 配置输出对象\n\n```\nNSMutableDictionary\
  \ *configDict = [NSMutableDictionary new];\n[configDict setObject:AVVideoCodecJPEG\
  \ forKey:AVVideoCodecKey];\n[self.stillImageOutput setOutputSettings:configDict];\n\
  ```\n\n与添加输入对象类似，在将输出对象添加到会话之前，应检查其是否可用，如代码清单 4-4 所示。\n\n***代码清单 4-4***. 添加输出对象\n\
  \n```\nif ([self.session canAddOutput:self.stillImageOutput]) {\n    [self.session\
  \ addOutput:self.stillImageOutput];\n}\n```\n\n现在已配置好输出对象，可以用于捕获静态图像。`AVCaptureStillImageOutput`\
  \ 类的 API 参考文档显示，您可以使用 `[AVCaptureStillImageAsynchronouslyFromConnection:completionHandler]`\
  \ 实例方法。但遗憾的是，使用此方法需要先建立*连接*。由 `AVCaptureConnection` 类表示的连接是连接输入和输出对象的接口。幸运的是，当您将输出添加到会话时，连接会自动创建。您可以通过指定要查找的输出对象和媒体类型（例如音频或视频）来查询连接，如代码清单\
  \ 4-5 所示。\n\n***代码清单 4-5***. 查询连接对象\n\n```\nAVCaptureConnection *connection = [self.stillImageOutput\n\
  \    connectionWithMediaType:AVMediaTypeVideo];\n```\n\n创建连接对象后，您可以调用块来捕获静态图像。完成处理程序返回一个指向静态图像的低级媒体缓冲区（`CMSampleBufferRef`），如果操作失败则返回\
  \ `NSError` 对象。您可以通过调用 `[AVCaptureStillImageOutput jpegStillImageNSDataRespresentation:]`\
  \ 类方法来保存图像，该方法返回作为 JPEG 文件（包含有效 EXIF 元数据）的静态图像 `NSData` 表示。检索到图像的 `NSData` 后，可将其保存到磁盘或转换为\
  \ `UIImage` 对象。\n\n在代码清单 4-6 中，按钮处理程序封装了捕获图像的完整过程。在 MyCamera 项目中，这由\"拍摄\"按钮触发。如果该方法能成功捕获图像，它将向摄像头委托发送\
  \ `didFinishWithImage` 消息。如果捕获失败，则通过发送 `cancel` 消息并使用 `[NSLog description]` 将错误记录为字符串来记录错误。\n\
  \n***代码清单 4-6***. 捕获静态图像\n\n```\n-(IBAction)finish:(id)sender\n{\n\nAVCaptureConnection\
  \ *connection = [self.stillImageOutput\n        connectionWithMediaType:AVMediaTypeVideo];\n\
  \n//[[self.stillImageOutput connectionWithMediaType:AVMediaTypeVideo]\n        setVideoOrientation:[connection\
  \ videoOrientation]];\n\n[self.stillImageOutput\n        captureStillImageAsynchronouslyFromConnection:connection\n\
  \        completionHandler:^(CMSampleBufferRef imageDataSampleBuffer,\n        NSError\
  \ *error) {\n\nif (imageDataSampleBuffer != nil) {\n\nNSData *imageData = [AVCaptureStillImageOutput\n\
  \             jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\nUIImage\
  \ *image = [UIImage imageWithData:imageData];\n\n[self.delegate didFinishWithImage:image];\n\
  \        } else {\n\nNSLog(@\"error description: %@\", [error description]);\n\n\
  [self.delegate cancel];\n        }\n\n}];\n```\n\n**注意** EXIF（可交换图像文件格式）元数据是捕获照片信息（如曝光度、方向、拍摄日期和闪光灯设置）的行业标准。您的\
  \ iOS 捕获设备会产生这些值。您可以在 Apple 的“CGImageProperties Reference”（可从 Apple 在线 iOS 开发者库获取）中找到所有有效键/值对的完整列表。\n\
  \n由于目标是实现类似于 `UIImagePickerController` 的工作流程，您希望在用户拍照后立即关闭摄像头界面。为了加快处理速度并释放摄像头以供其他进程使用，请在摄像头控制器类的\
  \ `[UIViewController viewWillDisappear]` 方法中对会话调用 `[AVCaptureSession stopRunning]`\
  \ 方法，如代码清单 4-7 所示。\n\n***代码清单 4-7***. 停止捕获会话\n\n```\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    [self.session stopRunning];\n}\n\
  ```\n\n**警告** 用于清理视图控制器的旧方法 `[UIViewController viewDidUnload]` 已从 iOS 6.0 开始弃用。请勿尝试定义此函数，因为您的代码永远不会被调用。\n\
  \n### 访问硬件控制\n\n完成自定义摄像头控制器的最后一个组件是用于配置摄像头捕获设置的接口。本示例应用专注于切换摄像头（例如前置/后置）以及配置闪光灯、自动对焦和曝光设置。这些示例展示了摄像头开发中的两个重要模式：\n\
  \n*   在更改设备配置之前，必须先锁定设备配置。\n*   应使用触摸事件驱动特定区域的设置（例如自动对焦、曝光）。\n\n#### 切换摄像头\n\n您将要构建的第一个硬件控制是一个按钮，允许用户在设备的前置和后置摄像头之间切换。与\
  \ iOS 中的默认摄像头类似，此示例将保留查看摄像头输出的实时预览和拍照的能力，并允许用户随意切换摄像头。回顾之前学到的关于 `AVFoundation` 捕获堆栈的知识，您可以通过切换会话上的活动输入来实现摄像头切换。\n\
  \n要在运行时切换摄像头，您需要维护指向每个硬件设备的指针。而在之前的示例中，您使用 `[AVCaptureDevice defaultDeviceWithMediaType]`\
  \ 实例方法找到了默认摄像头设备，这次则需要维护一个设备数组。返回 `AVCaptureDevice` 对象数组的方法是 `[AVCaptureDevice devicesWithMediaType:]`：\n\
  \n```\nself.cameraArray = [AVCaptureDevice \n                    devicesWithMediaType:AVMediaTypeVideo];\n\
  ```\n\n将 `NSArray` 初始化为目标类的实例变量，因为您需要在切换摄像头前再次查询它（换言之，如果用户正在使用只有一个摄像头的设备，则不应允许切换摄像头）。\n\
  \n\n\n您可以使用`AVCaptureDevice`的`_position_`属性来确定前置和后置摄像头。与之前的示例一样，您需要创建一个`AVCaptureDeviceInput`对象，将`AVCaptureDevice`连接到捕获会话。此示例将设备对象初始化为实例变量，以便稍后轻松修改其捕获设置。同样，您应该将输入对象初始化为实例变量，以便稍后切换设备。您通过切换会话上的活动输入对象来切换设备。您可以在清单\
  \ 4-8 中找到说明此过程的示例。\n\n**清单 4-8**. 初始化相机输入\n\n```\n-(void)initializeCameras\n{\n\
      NSArray *cameraArray = [AVCaptureDevice\n                            devicesWithMediaType:AVMediaTypeVideo];\n\
  \nNSError *error = nil;\n\nself.rearCamera = nil;\n    self.frontCamera = nil;\n\
  \nif ([self.cameraArray count] > 1) {\n\nfor (AVCaptureDevice *camera in self.cameraArray)\
  \ {\n            if (camera.position == AVCaptureDevicePositionBack) {\n                self.rearCamera\
  \ = camera;\n            } else if (camera.position == AVCaptureDevicePositionFront)\n\
              {\n                self.frontCamera = camera;\n            }\n        }\n\
  \nself.rearCameraInput = [AVCaptureDeviceInput\n                                deviceInputWithDevice:self.rearCamera\n\
                                  error:&error];\n      self.frontCameraInput = [AVCaptureDeviceInput\n\
                                 deviceInputWithDevice:self.frontCamera\n                              \
  \ error:&error];\n\n} else {\n        self.rearCamera = [AVCaptureDevice\n            \
  \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n        self.rearCameraInput = [AVCaptureDeviceInput\n\
               deviceInputWithDevice:self.rearCamera\n             error:&error];\n\
      }\n\nself.currentDevice = self.rearCamera;\n}\n```\n\n您可以看到清单 4-8 中的代码在相机数组仅包含一个对象时，会回退到默认捕获设备。由于捕获设置更改仅影响用户设置为活动的设备，因此代码还保留了指向当前设备的指针。\n\
  \n现在您已拥有每个捕获设备的指针，需要实现代码，以便用户在预览视图中按下“Camera”按钮时切换活动摄像头。在此示例中，我们实现了一个返回类型为`IBAction`的方法，因为它是与\
  \ Interface Builder 中的对象（在本例中为“Camera”按钮）关联的事件处理程序。如果设备有两个摄像头，应用程序会显示一个多选操作表，允许用户保存其选择。如果出现故障，则会显示错误警报。您可以在清单\
  \ 4-9 中找到执行所有初始化代码的处理程序方法。\n\n**清单 4-9**. 用于选择摄像头的操作表\n\n```\n-(IBAction)switchCamera:(id)sender\
  \ {\n\nif ([self.cameraArray count] > 1) {\n\n//present an action sheet\n\nUIActionSheet\
  \ *cameraSheet = [[UIActionSheet alloc]\n            initWithTitle:@\"Choose Camera\"\
  \n            delegate:self cancelButtonTitle:@\"Cancel\"\n            destructiveButtonTitle:nil\n\
              otherButtonTitles:@\"Front Camera\", @\"Rear Camera\", nil];\n        cameraSheet.tag\
  \ = 100;\n        [cameraSheet showInView:self.view];\n\n} else {\n        //we\
  \ only have one camera, show an error message\n\nUIAlertView *alert = [[UIAlertView\
  \ alloc]\n                               initWithTitle:@\"Error\"\n            message:@\"\
  You only have one camera\" delegate:nil\n                cancelButtonTitle:@\"OK\"\
  \n                otherButtonTitles:nil];\n        [alert show];\n    }\n\n}\n```\n\
  \n为了支持操作表，您需要将视图控制器声明为委托。为此，请按如下所示修改类签名：\n\n```\n@interface CameraViewController\
  \ : UIViewController\n      <UIActionSheetDelegate>\n```\n\n在操作表按钮处理程序`[UIActionSheetDelegate\
  \ actionSheet:didDismissWithButtonIndex:]`中，主要逻辑会检查传入操作表的标签，并将按钮索引传递给目标方法。在本例中，您希望将其传递给`switchToCameraWithIndex:`方法，如清单\
  \ 4-10 所示。\n\n**清单 4-10**. 操作表按钮处理程序\n\n```\n-(void) actionSheet:(UIActionSheet\
  \ *)actionSheet\n        didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    switch\
  \ (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
              break;\n    }\n}\n```\n\n现在，您已准备好实现切换活动摄像头的代码。更改操作的最终目标是捕获会话，因为您需要向会话添加或从会话中移除输入设备。为防止冲突，您需要在提交任何更改之前，对目标对象“加锁”以指示您将更改捕获设置。`AVCaptureSession`的锁是`[AVCaptureSession\
  \ beginConfiguration]`：\n\n```\n[self.session beginConfiguration];\n```\n\n接下来，您需要将按钮选择与目标设备对齐。操作表按钮索引从上到下递增，意味着最顶部的项目索引为\
  \ 0。在此示例中，“Front Camera”是顶部项目。您通过从捕获会话中移除后置摄像头输入，然后添加前置摄像头输入来切换到前置摄像头。为了镜像选择，您还需要更新类中的`currentDevice`指针以及“Switch\
  \ Camera”按钮的标签：\n\n```\nif (buttonIndex == 0) { //front camera\n\n[self.session\
  \ removeInput:self.rearCameraInput];\n\nif ([self.session canAddInput:self.frontCameraInput])\
  \ {\n            [self.session addInput:self.frontCameraInput];\n        }\n\nself.cameraButton.titleLabel.text\
  \ = @\"Camera: Front\";\n        self.currentDevice = self.frontCamera;\n\n}\n```\n\
  \n对于最终产品，为操作表中的“Rear Camera”选项添加一个`else if`语句，并释放会话对象的配置锁，如清单 4-11 所示。\n\n**清单 4-11**.\
  \ 在两个摄像头之间切换的完整实现\n\n```\n-(void)switchToCameraWithIndex:(NSInteger)buttonIndex\n\
  {\n    [self.session beginConfiguration];\n\nif (buttonIndex == 0) {\n\n[self.session\
  \ removeInput:self.rearCameraInput];\n\nif ([self.session canAddInput:self.frontCameraInput])\
  \ {\n            [self.session addInput:self.frontCameraInput];\n        }\n\nself.cameraButton.titleLabel.text\
  \ = @\"Camera: Front\";\n        self.currentDevice = self.frontCamera;\n\n} else\
  \ if (buttonIndex == 1) {\n\n[self.session removeInput:self.frontCameraInput];\n\
  \nif ([self.session canAddInput:self.rearCameraInput]) {\n            [self.session\
  \ addInput:self.rearCameraInput];\n        }\n\nself.cameraButton.titleLabel.text\
  \ = @\"Camera: Rear\";\n        self.currentDevice = self.frontCamera;\n    }\n\n\
  [self.session commitConfiguration];\n}\n```\n\n#### 更改闪光灯模式\n\n在应用程序中更改闪光灯模式的过程与更改摄像头非常相似；主要区别在于你是在`AVCaptureDevice`级别上进行操作，而不是在`AVCaptureSession`级别上。与“更改摄像头”示例非常相似，此示例使用按钮更改闪光灯模式，并向用户提供一个操作表以供选择。iOS\
  \ 支持的闪光灯模式有自动、打开和关闭。\n\n清单 4-12 中的代码在显示选择器之前，会检查当前输入设备是否支持闪光灯模式。此错误检查步骤至关重要，因为它允许应用程序支持较旧的\
  \ iPhone，并规避了系统中所有内置摄像头都支持闪光灯功能的假设。在许多设备上，前置摄像头没有闪光灯。\n\n**清单 4-12**. 更改闪光灯模式事件处理程序\n\
  \n\n\n```objective-c\n-(IBAction)flashMode:(id)sender {\n    if ([self.currentDevice\
  \ isFlashAvailable]) {\n        UIActionSheet *cameraSheet = [[UIActionSheet alloc]\n\
  \                                       initWithTitle:@\"闪光模式\"\n              \
  \                         delegate:self\n                                      \
  \ cancelButtonTitle:@\"取消\"\n                                       destructiveButtonTitle:nil\n\
  \                                       otherButtonTitles:@\"自动\",\n           \
  \                            @\"开启\" , @\"关闭\", nil];\n        cameraSheet.tag =\
  \ 101;\n        [cameraSheet showInView:self.view];\n    } else {\n        //\n\
  \        UIAlertView *alert = [[UIAlertView alloc]\n                           \
  \    initWithTitle:@\"错误\"\n                               message:@\"不支持闪光灯\"\n\
  \                               delegate:nil\n                               cancelButtonTitle:@\"\
  确定\"\n                               otherButtonTitles:nil];\n        [alert show];\n\
  \    }\n}\n```\n\n下一步是扩展操作表按钮处理器，以支持这个新的操作表，如**代码清单 4-13**所示。为操作表分配一个唯一的标签，以便能够识别它。\n\
  \n***代码清单 4-13**.* 修改后的操作表按钮处理器\n\n```objective-c\n-(void) actionSheet:(UIActionSheet\
  \ *)actionSheet\n        didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n \
  \   switch (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
  \            break;\n        case 101:\n            [self switchToFlashWithIndex:buttonIndex];\n\
  \            break;\n        default:\n            break;\n    }\n}\n```\n\n通过设置设备的\
  \ `flashMode` 属性来切换闪光灯模式。**代码清单 4-14** 在`[switchToFlashWithIndex:]`方法开头使用了一个`switch`语句，将按钮选择与有效的\
  \ `flashMode` 常量关联起来。要提交配置更改，请尝试获取该设备的锁定，然后在完成后释放。作为额外的错误检查，该示例在尝试设置之前，确保设备支持所选的闪光灯模式。\n\
  \n***代码清单 4-14***. 更改设备的闪光灯模式\n\n```objective-c\n-(void)switchToFlashWithIndex:(NSInteger)buttonIndex\n\
  {\n    NSError *error = nil;\n\nAVCaptureFlashMode flashMode = 0;\n\nswitch (buttonIndex)\
  \ {\n        case 0: {\n            flashMode = AVCaptureFlashModeAuto;\n      \
  \      self.flashButton.titleLabel.text = @\"闪光：自动\";\n            break;\n    \
  \    }\n        case 1: {\n            flashMode = AVCaptureFlashModeOn;\n     \
  \       self.flashButton.titleLabel.text = @\"闪光：开启\";\n            break;\n   \
  \     }\n        case 2: {\n            flashMode = AVCaptureFlashModeOff;\n   \
  \         self.flashButton.titleLabel.text = @\"闪光：关闭\";\n            break;\n \
  \       }\n        default:\n            break;\n    }\n\nif ([self.currentDevice\
  \ lockForConfiguration:&error]) {\n\nself.currentDevice.flashMode = flashMode;\n\
  \n[self.currentDevice unlockForConfiguration];\n    } else {\n        NSLog(@\"\
  could not set flash mode\");\n    }\n\n}\n```\n\n#### 更改自动对焦模式\n\n设置相机的自动对焦模式遵循与设置闪光灯完全相同的过程（显示操作表、选择模式、在提交前查询兼容性）。但有一个重要的补充：你需要为相机定义一个焦点。\n\
  \n与前面的示例一样，如果当前相机设备支持自动对焦，该示例使用一个按钮处理器显示操作表，如**代码清单 4-15**所示。\n\n***代码清单 4-15***.\
  \ 更改对焦模式按钮处理器\n\n```objective-c\n-(IBAction)focusMode:(id)sender {\n    if ([self.currentDevice\
  \ isFocusPointOfInterestSupported]) {\n        UIActionSheet *focusSheet = [[UIActionSheet\
  \ alloc]\n                                      initWithTitle:@\"对焦模式\"\n      \
  \                                delegate:self\n                               \
  \       cancelButtonTitle:@\"取消\"\n                                      destructiveButtonTitle:nil\n\
  \                                      otherButtonTitles:@\"自动\",\n            \
  \                              @\"连续自动对焦\" ,\n                                 \
  \         @\"固定\", nil];\n        focusSheet.tag = 102;\n        [focusSheet showInView:self.view];\n\
  \    } else {\n        //\n        UIAlertView *alert = [[UIAlertView alloc]\n \
  \                              initWithTitle:@\"错误\"\n                         \
  \      message:@\"不支持自动对焦\"\n                               delegate:nil\n     \
  \                          cancelButtonTitle:@\"确定\"\n                         \
  \      otherButtonTitles:nil];\n        [alert show];\n    }\n}\n```\n\n与前面的示例一样，扩展操作表处理器以支持新的操作表，如**代码清单\
  \ 4-16**所示。\n\n***代码清单 4-16***. 修改后的操作表处理器\n\n```objective-c\n-(void) actionSheet:(UIActionSheet\
  \ *)actionSheet\n        didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n \
  \   switch (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
  \            break;\n        case 101:\n            [self switchToFlashWithIndex:buttonIndex];\n\
  \            break;\n        case 102:\n            [self switchToFocusWithIndex:buttonIndex];\n\
  \            break;\n        default:\n            break;\n    }\n}\n```\n\n就像更改闪光灯模式时一样，代码将按钮选项转换为有效的常量，获取配置锁定，如果设备支持这些更改，则提交更改。你可以在**代码清单\
  \ 4-17**中找到封装了自动对焦模式切换逻辑的方法。\n\n***代码清单 4-17***. 切换自动对焦模式\n\n```objective-c\n-(void)switchToFocusWithIndex:(NSInteger)buttonIndex\n\
  {\n    NSError *error = nil;\n\nAVCaptureFocusMode focusMode = 0;\n\nswitch (buttonIndex)\
  \ {\n        case 0: {\n            focusMode = AVCaptureFocusModeAutoFocus;\n \
  \           self.focusButton.titleLabel.text = @\"对焦：自动\";\n            break;\n\
  \        }\n        case 1: {\n            focusMode = AVCaptureFocusModeContinuousAutoFocus;\n\
  \            self.focusButton.titleLabel.text = @\"对焦：连续\";\n            break;\n\
  \        }\n        case 2: {\n            focusMode = AVCaptureFocusModeLocked;\n\
  \            self.focusButton.titleLabel.text = @\"对焦：固定\";\n            break;\n\
  \        }\n        default:\n            break;\n    }\n\nif ([self.currentDevice\
  \ lockForConfiguration:&error] &&\n        [self.currentDevice\n        isFocusModeSupported:focusMode])\
  \ {\n\nself.currentDevice.focusMode = focusMode;\n\n[self.currentDevice unlockForConfiguration];\n\
  \    } else {\n        NSLog(@\"could not set focus mode\");\n    }\n\n}\n```\n\n\
  默认情况下，焦点位于屏幕中央，但用户通常会将拍摄对象置于画面的左三分之一或右三分之一处。为了充分利用自动对焦功能，你应该让用户将相机重新对焦到某个新的焦点。在使用\
  \ iOS 的默认相机时，你可能记得点击屏幕时会出现一个矩形。这是通过使用 `UITapGestureRecognizer` 对象来实现的。\n\n手势识别器允许你在用户发生触摸手势（例如点击屏幕或捏合/张开手指）时调用一个方法，并提供触摸事件在屏幕上发生的位置等属性。手势识别器处理器方法的签名类似于普通事件处理器的签名，不同之处在于参数类型是\
  \ `UIGestureRecognizer`：\n\n```objective-c\n-(IBAction)didTapPreview:(UIGestureRecognizer\
  \ *)gestureRecognizer;\n```\n\n\n\n您可以使用 `[UIGestureRecognizer locationInView:]`\
  \ 方法来获取触摸事件的 `x` 和 `y` 坐标，这些坐标是相对于您作为输入参数传入的视图的原点。\n\n要将相机配置为对焦到特定点，请使用实例方法 `[AVCaptureDevice\
  \ setFocusPointOfInterest:focusPoint]`。输入参数是一个 `CGPoint` 对象，其 `x` 和 `y` 值介于 0.0\
  \ 和 1.0 之间，对应于焦点在画面内的相对位置。例如，值 `(0.5, 0.75)` 将使焦点在水平方向上居中，并在垂直方向上将其放置在画面底部以上四分之一处。\n\
  \n您可以通过将触摸事件的 `x` 位置除以画面的宽度，并将触摸事件的 `y` 位置除以画面的高度，将手势识别器的触摸坐标从绝对位置转换为相对位置，如代码清单\
  \ 4-18 所示。\n\n**代码清单 4-18**。将绝对位置转换为相对位置\n\n```\nCGPoint tapPoint = [gestureRecognizer\n\
                      locationInView:gestureRecognizer.view];\nCGFloat relativeX = tapPoint.x\
  \ / self.previewView.frame.size.width;\nCGFloat relativeY = tapPoint.y / self.previewView.frame.size.height;\n\
  CGPoint focusPoint = CGPointMake(relativeX, relativeY);\n```\n\n最后，通过将位置代码和拍摄设置配置代码添加到手势识别器处理程序中，将所有内容整合在一起，如代码清单\
  \ 4-19 所示。\n\n**代码清单 4-19**。从轻触手势处理程序设置焦点\n\n```\n-(void)didTapPreview:(UIGestureRecognizer\
  \ *)gestureRecognizer\n{\n    CGPoint tapPoint = [gestureRecognizer\n        locationInView:gestureRecognizer.view];\n\
      CGFloat relativeX = tapPoint.x / self.previewView.frame.size.width;\n    CGFloat\
  \ relativeY = tapPoint.y /\n        self.previewView.frame.size.height;\n    CGPoint\
  \ focusPoint = CGPointMake(relativeX, relativeY);\n\nAVCaptureFocusMode focusMode\
  \ = self.currentDevice.focusMode;\n\nNSError *error = nil;\n\nif ([self.currentDevice\
  \ isFocusPointOfInterestSupported] &&\n        [self.currentDevice isFocusModeSupported:focusMode])\n\
      {\n        if ([self.currentDevice lockForConfiguration:&error])\n        {\n\
              [self.currentDevice setFocusMode:focusMode];\n            [self.currentDevice\
  \ setFocusPointOfInterest:focusPoint];\n            [self.currentDevice unlockForConfiguration];\n\
          }\n    }\n\nself.tapPosition.text = [NSString stringWithFormat:\n                            \
  \ @\"Tap Position: (%0.f, %0.f)\",\n                             tapPoint.x, tapPoint.y];\n\
  }\n```\n\n#### 更改曝光模式\n\n修改曝光设置具有与更改自动对焦设置相同的所有属性和背景知识要求：\n\n- 使用按钮和操作表来选择曝光模式。\n\
  - 在设置所需的曝光模式之前查询兼容性。\n- 基于触摸事件为曝光设置设置焦点。\n\n因此，按钮处理程序看起来应该非常熟悉。主要区别在于，此功能将只允许用户选择连续自动曝光或固定曝光。您可以在代码清单\
  \ 4-20 中找到呈现曝光模式操作表的按钮处理程序。\n\n**代码清单 4-20**。操作表按钮处理程序，包含曝光\n\n```\n-(IBAction)exposureMode:(id)sender\
  \ {\n    if ([self.currentDevice isExposurePointOfInterestSupported]) {\n        //\n\
          UIActionSheet *exposureSheet =\n             [[UIActionSheet alloc]\n              \
