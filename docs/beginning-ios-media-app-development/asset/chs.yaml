  \ otherButtonTitles:@\"Continuous Auto\" , @\"Fixed\", nil];\n        exposureSheet.tag\
  \ = 103;\n        [exposureSheet showInView:self.view];\n    } else {\n        //\n\
          UIAlertView *alert = [[UIAlertView alloc]\n                              \
  \ initWithTitle:@\"Error\"\n                               message:@\"Flash not\
