  -(IBAction)startRewind:(id)sender;\n-(IBAction)stopSeeking:(id)sender;\n\n-(IBAction)startWorkout:(id)sender;\n\
  \n-(IBAction)chooseTrackButton:(id)sender;\n-(IBAction)chooseAlbumButton:(id)sender;\n\
  \n@end\n```\n\n## 使用 Core Motion 追踪活动\n\n自 iOS 4 起，Core Motion 就成了 iOS 的动作感应框架。多年来，开发者一直用它来访问内置的加速计和陀螺仪（自那时起便催生了成千上万的赛车游戏）。然而，在\
  \ M 系列运动协处理器问世之前，一直缺乏简便的方法来获取步数数据。你可以利用加速计来检测设备移动时是否发生了“颠簸”，但你必须自行编写代码来定义何为“一步”。同样，你可以使用\
  \ GPS 来确定用户的移动距离，但这样做会迅速耗尽电池电量。\n\n\n\n虽然 iOS 7 在 Core Motion 框架中为 M 系列运动协处理器添加了接口，但\
  \ iOS 8 才完全解锁其功能，允许你直接以*步数*和*活动类型*的形式检索数据。Core Motion 负责处理所有工作，包括定义什么是步数、步数对应的距离，以及在记录步数时用户正在做什么（例如跑步或步行）。\n\
  \n既然你已经了解了 Core Motion 的功能，就可以探索如何启用它了。对于 `MyFitnessPod` 应用，你将希望使用 Core Motion 来开始记录用户的步数，并在用户界面上回显显示。为此，你需要让应用程序准备好接受运动数据，该任务包括以下步骤：\n\
  \n1.  请求使用硬件的权限（如果可用）\n2.  注册你的类以接收运动更新\n3.  为这些更新实现处理程序方法\n\nCore Motion 框架严重依赖于完成处理程序（block）来进行消息传递。如果你仍不确定如何使用\
  \ block，请参考第 4 章中的“Block 快速指南”边栏。\n\n## 请求运动活动权限\n\n因为健康数据是你能收集到的关于用户最敏感的信息之一，所以在开始访问\
  \ M 系列运动协处理器硬件之前，你需要确保你的应用程序已获得用户访问*运动活动*数据的权限。与你之前开发的基于照片的应用程序一样，你不能覆盖用户的决定，但你可以捕获响应并适当地初始化你的应用程序。\n\
  \n管理运动事件和运动活动权限的 Core Motion 类是 `CMMotionActivityManager`。严格来说，*运动活动*被定义为一个对应于用户当前所进行运动类型的事件，无论是步行、跑步还是驾车。虽然处理这些事件不在\
  \ `MyFitnessPod` 项目的范围内，但 Apple 将运动活动作为 Core Motion 的权限级别，因此你需要将其包含在你的项目中。\n\n你可以通过调用公共方法\
  \ `[CMMotionActivity isActivityAvailable]` 来查询运动活动状态。该方法返回一个 `BOOL` 值，指示用户是否已授予你的应用访问运动活动的权限。如图\
  \ 13-7 所示，首次调用此方法会暴露系统的权限操作表。隐私权限通过*应用程序标识符*进行键控，这意味着你的应用后续启动（或重新安装）时不会再次提示用户选择权限级别。（用户可以随时通过选择\
  \ iOS 设置应用中的“隐私”选项来更改其权限级别。）\n\n![9781430250838_Fig13-07.jpg](img/9781430250838_Fig13-07.jpg)\n\
  \n图 13-7. 运动活动权限提示\n\n**注意** 你可以通过选择 iOS 设置应用中的“通用”→“还原”→“还原隐私与定位”来重置设备上的所有应用权限。\n\
  \n由于操作表需要可见以供用户响应，你需要从用户发起的操作中调用该方法（而不是使用 `[self viewDidLoad]` 方法）。对于 `MyFitnessPod`\
  \ 应用，需要运动数据的主要用户发起操作是“开始锻炼”按钮，因此请将你的权限调用放在该按钮的处理程序方法中，该方法在代码清单 13-1 的头文件中定义为 `[MainViewController\
  \ toggleWorkout]`。如代码清单 13-2 所示，在确定用户即将开始锻炼后，你应立即检查运动活动权限。如果用户已授予你的应用权限，你就可以开始更新用户界面并开始设置计步器；否则，你应该显示一个提示，让用户知道你的应用需要运动活动权限。\n\
  \n\n\n### 13-2. 检查运动活动权限\n\n```\n-(IBAction)toggleWorkout:(id)sender\n{\n    if\
  \ (self.isWorkoutActive) {\n        //停止锻炼\n        self.isWorkoutActive = NO;\n\
  \n} else {\n        //开始锻炼\n\nif ([CMMotionActivityManager isActivityAvailable])\n\
  \          {\n            self.isWorkoutActive = YES;\n\n} else {\n            UIAlertView\
  \ *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"错误\"\n  \
  \              message:@\"需要运动权限\"\n                delegate:self\n            \
  \    cancelButtonTitle:@\"确定\"\n                otherButtonTitles:nil];\n      \
  \      [errorAlert show];\n        }\n    }\n\n}\n```\n\n在确定你的应用程序已被允许访问运动活动后，你需要进行第二次检查——以确定设备是否具有带步数追踪功能的\
  \ M 系列运动协处理器。从 M 系列运动协处理器中检索步数数据的 Core Motion 类为 `CMPedometer`。该类允许你查询硬件以获取更新，并通过\
  \ `CMPedometerData` 类返回值，该类会自动将加速度计和高度计数据抽象为步数、距离以及上升或下降的“楼层数”。查询计步器可用性的公共方法是 `[CMPedometer\
  \ isStepTrackingAvailable]`。如代码清单 13-3 所示，在更新用户界面之前，将其作为第二个条件添加，这样只有在权限和硬件都可用时才能开始锻炼。在确定硬件可用后，你可以初始化一个\
  \ `CMPedometer` 对象来维护与硬件的接口。\n\n### 13-3. 检查并初始化计步器\n\n```\n-(IBAction)toggleWorkout:(id)sender\n\
  {\n    if (self.isWorkoutActive) {\n        //停止锻炼\n\n} else {\n        //开始锻炼\n\
  \nif ([CMMotionActivityManager isActivityAvailable] &&\n            [CMPedometer\
  \ isStepCountingAvailable]) {\n            self.pedometer = [[CMPedometer alloc]\
  \ init];\n            self.isWorkoutActive = YES;}\n        else {\n           \
  \ UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  错误\"\n                message:@\"需要运动权限\"\n                delegate:self\n     \
  \           cancelButtonTitle:@\"确定\"\n                otherButtonTitles:nil];\n\
  \            [errorAlert show];\n        }\n    }\n\n}\n```\n\n尽管 Core Motion 使用块（blocks）进行消息传递，但你应该为\
  \ `CMPedometer` 对象维护一个实例变量，以便处理后台更新。在 `MainViewController` 类中，该对象由 `pedometer` 属性表示：\n\
  \n```\n@property (nonatomic, strong) CMPedometer *pedometer;\n```\n\n**注意：** 并非所有设备都支持距离和高度计数据，因此如果你计划在应用程序中使用这些功能，请调用\
  \ `[CMPedometer isDistanceAvailable]` 和 `[CMPedometer isFloorCountingAvailable]`\
  \ 公共方法。\n\n## 开始锻炼\n\n在确定你的应用程序拥有一个有效的计步器后，你现在可以开始实现开始锻炼所需的代码了。图 13-8 展示了图 13-1\
  \ 的一个子集，突出了应用程序的开始过渡状态。\n\n![9781430250838_Fig13-08.jpg](img/9781430250838_Fig13-08.jpg)\n\
  \n图 13-8. 开始锻炼屏幕的模拟图\n\n当用户点击“开始锻炼”按钮时，你希望开始播放音乐，将按钮文本更改为“停止锻炼”，并开始显示实时反馈以指示用户的锻炼进度。如代码清单\
  \ 13-4 所示，播放音乐和更新用户界面很简单：只需调用你已经定义好的方法即可。然而，获取计步器进度更新则稍微复杂一些。\n\n### 13-4. 开始锻炼时更新用户界面\n\
  \n```\n-(IBAction)toggleWorkout:(id)sender\n{\n    if (self.isWorkoutActive) {\n\
  \        //停止锻炼\n\n} else {\n        //开始锻炼\n\nif ([CMMotionActivityManager isActivityAvailable]\
  \ &&\n            [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
  \ = [[CMPedometer alloc] init];\n            self.isWorkoutActive = YES;\n     \
  \       self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
  \ = @\"0 步\";\n            self.workoutButton.titleLabel.text = @\"停止锻炼\";\n   \
  \     } else {\n            UIAlertView *errorAlert = [[UIAlertView alloc]\n   \
  \             initWithTitle:@\"错误\"\n                message:@\"需要运动权限\"\n     \
  \           delegate:self\n                cancelButtonTitle:@\"确定\"\n         \
  \       otherButtonTitles:nil];\n            [errorAlert show];\n        }\n   \
  \ }\n\n}\n```\n\n对于计步器数据更新，Apple 定义了两种模型：一种是基于推送的模型，在此模型下应用程序会持续（每 2.5 秒）接收来自硬件的可用数据；另一种是基于拉取的模型，在此模型下应用程序在需要时请求数据。MyFitnessPod\
  \ 项目的模拟图表明，应用程序应在数据可用时显示更新，因此你应该使用推送模型作为应用程序更新的主要驱动方式。\n\n**警告：** 基于推送的交付模型是一种软件设计模式，而*推送通知*则是一个非常具体的\
  \ iOS 功能（通知被“推送”到你的设备）。在与其它开发者交流时，请务必不要混淆这两者。\n\n要接收推送更新，请在你的 `CMPedometer` 对象上调用\
  \ `[CMPedometer startPedometerUpdatesFromDate:withHandler]` 方法。从方法签名可以看出，输入参数是一个接收更新的完成处理程序，以及一个作为计步器更新基准的开始时间。Core\
  \ Motion 将传输自该开始时间以来发生的更新事件。对于 MyFitnessPod 应用程序，开始时间就是用户按下“开始锻炼”按钮的时间。在编程上，你可以通过使用\
  \ `[NSDate date]` 方法简单地获取*当前时间*来实现这一点。代码清单 13-5 提供了 MyFitnessPod 项目的 `[CMPedometer\
  \ startPedometerUpdatesFromDate:withHandler]` 调用。\n\n### 13-5. 为计步器更新设置 `MainViewController`\
  \ 类\n\n```\n-(IBAction)toggleWorkout:(id)sender\n{\n    if (self.isWorkoutActive)\
  \ {\n        //停止锻炼\n        if (self.pedometer != nil) {\n            [self.pedometer\
  \ stopPedometerUpdates];\n        }\n        [self.musicPlayer stop];\n        self.isWorkoutActive\
  \ = NO;\n        self.workoutButton.titleLabel.text = @\"开始锻炼\";\n\n} else {\n \
  \       //开始锻炼\n        if ([CMMotionActivityManager isActivityAvailable] &&\n \
  \           [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
  \ = [[CMPedometer alloc] init];\n            self.isWorkoutActive = YES;\n     \
  \       self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
  \ = @\"0 步\";\n            self.workoutButton.titleLabel.text = @\"停止锻炼\";\n\n[self.pedometer\n\
  \                startPedometerUpdatesFromDate:self.startDate\n                withHandler:^(CMPedometerData\
  \ *pedometerData,\n                NSError *error) {\n\n...\n            }];\n\n\
  } else {\n            UIAlertView *errorAlert = [[UIAlertView alloc]\n         \
  \       initWithTitle:@\"错误\"\n                message:@\"需要运动权限\"\n           \
  \     delegate:self cancelButtonTitle:@\"确定\"\n                otherButtonTitles:nil];\n\
  \            [errorAlert show];\n        }\n    }\n\n}\n```\n\n\n\n当您的应用收到更新时，应在“Workout\
  \ Progress”（锻炼进度）标签中显示更新的步数。表示计步器事件的`CMPedometerData`类通过将`numberOfSteps`属性声明为`NSNumber`对象，使这一操作变得简单。您可以通过调用`[NSNumber\
  \ intValue]`方法获取`int`类型的值，并将其包含在字符串中来显示此值：\n\n```\nNSString *workoutProgressString\
  \ = [NSString stringWithFormat:@\"%ld steps\",\n    [pedometerData.numberOfSteps\
  \ intValue]];\nself.workoutProgressLabel.text = workoutProgressString;\n```\n\n\
  在将此代码添加到处理程序方法之前，您需要考虑一个复杂情况：块（block）总是在**后台**执行，而用户界面总是在主线程上执行。为弥合这一差距，请使用`dispatch_async(dispatch_queue_t\
  \ queue, dispatch_block_t block)`方法在主队列上更新`workProgressLabel`对象。`dispatch_async()`的第一个参数接受一个队列对象，第二个参数接受一个块。通过传入`dispatch_get_main_queue()`作为队列，您可以自动获取指向主执行队列的指针：\n\
  \n```\ndispatch_async(dispatch_get_main_queue(), ^{\n    self.workoutProgressLabel.text\
  \ =\n    [NSString stringWithFormat:@\"%ld steps\",\n    [pedometerData.numberOfSteps\
  \ integerValue]];\n    });\n```\n\n您可以在 Listing 13-6 中找到`MyFitnessPod`项目的完整实现。\n\
  \n***Listing 13-6***. 计步器更新块（包括用户界面变更）\n\n```\n-(IBAction)toggleWorkout:(id)sender\n\
  {\n    if (self.isWorkoutActive) {\n        // stop workout\n    } else {\n    \
  \    // start workout\n        if ([CMMotionActivityManager isActivityAvailable]\
  \ &&\n            [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
  \ = [[CMPedometer alloc] init];\n            self.isWorkoutActive = YES;\n     \
  \       self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
  \ = @\"0 steps\";\n            self.workoutButton.titleLabel.text = @\"Stop Workout\"\
  ;\n            [self.pedometer\n                startPedometerUpdatesFromDate:self.startDate\n\
  \                withHandler:^(CMPedometerData *pedometerData,\n               \
  \ NSError *error) {\n                NSLog(@\"number of steps: %ld\",\n        \
  \            [pedometerData.numberOfSteps integerValue]);\n                dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                    self.workoutProgressLabel.text =\n                   \
  \ [NSString stringWithFormat:@\"%ld steps\",\n                    [pedometerData.numberOfSteps\
  \ integerValue]];\n                });\n            }];\n        } else {\n    \
  \        UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  Error\"\n                message:@\"Motion permission required\"\n             \
  \   delegate:self\n                cancelButtonTitle:@\"OK\"\n                otherButtonTitles:nil];\n\
  \            [errorAlert show];\n        }\n    }\n}\n```\n\n## 集成后台更新\n\n任何应用的重中之重都是其后台功能。对于锻炼应用来说，这一点尤为重要，因为用户可能会忙碌\
  \ 30 分钟或更长时间（远超多数 iOS 设备的休眠设置）。好消息是，由于您使用开始时间初始化了`[CMPedometer startPedometerUpdatesFromDate:withHandler]`方法，将应用置于后台并不会阻止该方法在返回前台时返回准确信息（更新仍会与您提供的原始时间进行比较）。\n\
  \n后台更新遇到的问题是用户界面的初始化问题。在应用处于后台时更新用户界面没有意义，因为用户永远不会看到这些信息。然而，与此同时，您又不希望用户回到应用时仍然看到旧的锻炼进度显示在屏幕上（在下一次更新之前会一直如此）。为解决此问题，请使用`CMPedometer`类的拉取机制，在应用返回前台后立即检索用户的步数。\n\
  \n对于`MainViewController`类，您可以使用`[self viewDidAppear:]`方法来处理此事件。每当视图出现时，都会调用`[self\
  \ viewDidAppear:]`事件，无论这次出现是由于应用从后台返回、首次初始化，还是其他视图消失所致。如 Listing 13-7 所示，通过检查锻炼是否已激活，您可以在锻炼开始后仅查询这些更新。\n\
  \n***Listing 13-7***. 准备后台更新\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n \
  \   if (self.isWorkoutActive) {\n        [self.pedometer queryPedometerDataFromDate:self.startDate\n\
  \            toDate:[NSDate date] withHandler:^(CMPedometerData\n            *pedometerData,\
  \ NSError *error) {\n            NSLog(@\"number of steps: %ld\", [pedometerData.numberOfSteps\
  \ integerValue]);\n            dispatch_async(dispatch_get_main_queue(), ^{\n  \
  \              self.workoutProgressLabel.text = [NSString\n                    stringWithFormat:@\"\
  %ld steps\",\n                    [pedometerData.numberOfSteps integerValue]];\n\
  \            });\n        }];\n    }\n}\n```\n\n`CMPedometer`类的拉取方法是`[CMPedometer\
  \ queryPedometerDataFromDate:toDate:withHandler:]`，它接受两个日期和一个完成处理程序作为输入。对于*开始日期*，请使用计步器的开始时间；对于*结束日期*，请使用当前时间——即应用返回前台的时间。为了维护开始日期，请在您的类中添加一个实例变量：\n\
  \n```\n@property (nonatomic, strong) NSDate *startDate;\n```\n\n接下来，当您点击“Start Workout”（开始锻炼）按钮时，添加一个保存`startDate`的额外步骤，如\
  \ Listing 13-8 所示。\n\n***Listing 13-8***. 保存锻炼的开始日期\n\n```\n-(IBAction)toggleWorkout:(id)sender\n\
  {\n    if (self.isWorkoutActive) {\n        // stop workout\n    } else {\n    \
  \    // start workout\n        if ([CMMotionActivityManager isActivityAvailable]\
  \ &&\n            [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
  \ = [[CMPedometer alloc] init];\n            self.isWorkoutActive = YES;\n     \
  \       self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
  \ = @\"0 steps\";\n            self.workoutButton.titleLabel.text = @\"Stop Workout\"\
  ;\n            [self.pedometer startPedometerUpdatesFromDate:self.startDate\n  \
  \              withHandler:^(CMPedometerData *pedometerData,\n                NSError\
  \ *error) {\n                NSLog(@\"number of steps: %ld\",\n                \
  \    [pedometerData.numberOfSteps integerValue]);\n                dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                    self.workoutProgressLabel.text =\n                   \
  \ [NSString stringWithFormat:@\"%ld steps\",\n                    [pedometerData.numberOfSteps\
  \ integerValue]];\n                });\n            }];\n        } else {\n    \
  \        UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  Error\"\n                message:@\"Motion permission required\"\n             \
  \   delegate:self\n                cancelButtonTitle:@\"OK\"\n                otherButtonTitles:nil];\n\
  \            [errorAlert show];\n        }\n    }\n}\n```\n\n\n\n现在您可以使用 `startDate`\
  \ 实例变量作为提取查询的基准。对于完成处理程序，执行与推送处理程序完全相同的逻辑——在主线程上更新用户界面以显示接收到的步数。列表 13-9 展示了 MyFitnessPod\
  \ 项目中完整的 `[self viewDidAppear]` 方法。\n\n**列表 13-9.** 返回前台后更新用户界面\n\n```\n- (void)viewDidAppear:(BOOL)animated\n\
  {\n    if (self.isWorkoutActive)  {\n        [self.pedometer queryPedometerDataFromDate:self.startDate\n\
  \            toDate:[NSDate date]\n            withHandler:^(CMPedometerData *pedometerData,\n\
  \            NSError *error) {\n\nNSLog(@\"步数: %ld\",\n                [pedometerData.numberOfSteps\
  \ integerValue]);\n            dispatch_async(dispatch_get_main_queue(), ^{\n  \
  \              self.workoutProgressLabel.text =\n                [NSString stringWithFormat:@\"\
  %ld 步\",\n                [pedometerData.numberOfSteps integerValue]];\n       \
  \     });\n        }];\n    }\n}\n```\n\n### 停止锻炼\n\n最终，所有锻炼都必须结束，计步器更新也应随之停止。通过调用\
  \ `CMPedometer` 对象上的 `[CMPedometer stopPedometerUpdates]` 方法，让 Core Motion 知道它应该停止向之前定义的完成处理程序发送计步器事件。\n\
  \n对于 MyFitnessPod 应用程序，将此逻辑放在用户发起停止锻炼的事件中：即“停止锻炼”按钮的处理程序。如列表 13-10 所示，在确定锻炼处于活动状态后，调用\
  \ `[CMPedometer stopPedometerUpdates]` 方法，并通过停止音乐播放和重置锻炼按钮标题来将用户界面重置为原始状态。您无需重置步数，因为大多数用户期望在锻炼结束时看到他们的总数。\n\
  \n**列表 13-10.** 停止更新并重置用户界面\n\n```\n-(IBAction)toggleWorkout:(id)sender\n{\n   \
  \ if (self.isWorkoutActive) {\n        //停止锻炼\n\nif (self.pedometer != nil) {\n\
  \            [self.pedometer stopPedometerUpdates];\n        }\n        [self.musicPlayer\
  \ stop];\n        self.isWorkoutActive = NO;\n        self.workoutButton.titleLabel.text\
  \ = @\"开始锻炼\";\n    } else {\n        //开始锻炼\n\nif ([CMMotionActivityManager isActivityAvailable]\
  \ &&\n            [CMPedometer isStepCountingAvailable]) {\n            self.pedometer\
  \ = [[CMPedometer alloc] init];\n            /*\n             if (queue loaded)\
  \ {\n                 play queue\n             } else {\n                 load default\
  \ playlist\n             }\n             */\n\nself.isWorkoutActive = YES;\n   \
  \         self.startDate = [NSDate date];\n            self.workoutProgressLabel.text\
  \ = @\"0 步\";\n            self.workoutButton.titleLabel.text = @\"停止锻炼\";\n   \
  \         [self.pedometer startPedometerUpdatesFromDate:self.startDate\n       \
  \         withHandler:^(CMPedometerData *pedometerData,\n                NSError\
  \ *error) {\n\nNSLog(@\"步数: %ld\",\n                    [pedometerData.numberOfSteps\
  \ integerValue]);\n                dispatch_async(dispatch_get_main_queue(), ^{\n\
  \                    self.workoutProgressLabel.text =\n                    [NSString\
  \ stringWithFormat:@\"%ld 步\",\n                    [pedometerData.numberOfSteps\
  \ integerValue]];\n                });\n            }];\n\n} else {\n          \
  \  UIAlertView *errorAlert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  错误\"\n                message:@\"需要运动权限\"\n                delegate:self cancelButtonTitle:@\"\
  确定\"\n                otherButtonTitles:nil];\n            [errorAlert show];\n\
  \        }\n    }\n\n}\n```\n\n## 使用 HealthKit 同步数据\n\n此时，MyFitnessPod 应用已能够利用 M\
  \ 系列运动协处理器，因此是时候通过使用 HealthKit 作为发布和检索应用收集的锻炼数据的后端，使其成为“负责任的数据公民”。正如本章开头所述，HealthKit\
  \ 允许您跳过构建自己数据记录界面的不必要步骤，为所有应用提供一个集中位置，让它们可以存储（和检索）健康和健身数据。此外，“健康”应用为用户提供了查看此数据配置文件的窗口，使他们能够在一个地方监控步数信息、卡路里摄入量、体重、血压以及无数其他健康指标。用户甚至可以创建自己的仪表板来获取历史快照。您在编写本章时可以看到我的仪表板，如图\
  \ 13-9 所示。\n\n![9781430250838_Fig13-09.jpg](img/9781430250838_Fig13-09.jpg)\n\n\
  **图 13-9.** 作者的“健康”应用仪表板\n\n在本节中，您将学习如何利用 HealthKit 来记录锻炼、检索过去的锻炼活动以及接收实时数据更新。这能让您的用户在应用之间共享数据，并通过实现“今日总计”标签并用准确数据填充它来完成用户界面。\n\
  \n尽管 HealthKit 是一个与 Core Motion 完全独立的框架，但好消息是它共享了许多设计上的相似性，例如基于推送和拉取的数据查询概念。HealthKit\
  \ 还公开了数据类型，为每种存储的活动类型提供丰富的信息。使用 HealthKit 需要实现的基本步骤如下：\n\n1.  请求对象类型的权限（读取、写入或两者兼有）。\n\
  2.  实现一个查询和处理程序方法，以在数据可用时进行检索。\n3.  创建一个格式正确的对象来存储数据。\n\n### 请求使用 HealthKit 的权限\n\
  \n与 Core Motion 一样，在您可以对 HealthKit 执行任何操作之前，需要请求正确的权限。同样，由于健康数据是敏感的个人信息，权限级别非常精细，导致会显示一个详细的模态视图，供用户在授予权限前查看，如图\
  \ 13-10 所示。\n\n![9781430250838_Fig13-10.jpg](img/9781430250838_Fig13-10.jpg)\n\n\
  **图 13-10.** HealthKit 权限模态视图\n\n您会注意到，此模态视图针对应用希望访问的每种健康数据类型显示了读取和写入权限。HealthKit\
  \ 中的每个操作都与一个*对象类型*相关联，由 `HKObject` 类表示。就像 `CMPedometerData` 类一样，`HKObject` 类为正在存储的每种类型的健康数据存储了丰富的属性集，包括数量（或特征）、测量时间和测量来源。属性集因对象类型而异。需要记住两种高级别的对象类型：*数量*，用定量单位（如体重）测量；以及*特征*，用定性观察（如睡眠质量差）表示。系统会提示用户为您尝试操作的每种对象类型选择权限。\n\
  \n要请求 HealthKit 权限，您需要在 `HKHealthStore` 对象上调用 `[HKHealthStore requestAuthorizationToShareTypes:readTypes:completion:]`\
  \ 方法。`HKHealthStore` 类表示 HealthKit 数据操作的接口，类似于托管对象上下文为 Core Data 中的数据库提供接口。与数据库一样，为您想要执行的每个数据操作都创建一个健康存储是没有意义的，因此将其声明为实例变量。对于\
  \ `MainViewController` 类，此属性称为 `healthStore`：\n\n```\n@property (nonatomic, strong)\
  \ HKHealthStore *healthStore;\n```\n\n\n\n要请求权限，你需要指定一个`NSSet`对象类型集合，这些类型代表你想要请求的数据类型。对于`MyFitnessPod`项目，你只需要读取和写入步数，因此使用`NSQuantityTypeIdentifierStepCount`常量来初始化你的权限集合：\n\
  \n```\nNSSet *dataTypes =\n    [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n\
  ```\n\n当你请求运动活动权限时，由于请求的性质（简单的“是”或“否”），你需要在视图可见后调用状态获取方法。由于`HealthKit`权限更为复杂，`[HKHealthStore\
  \ requestAuthorizationToShareTypes:readTypes:completion:]`方法允许你指定一个完成处理程序，该处理程序返回一个`success`变量，用于指示用户是否已授予你的应用所有请求的权限。这使你能够将初始化代码放在`[self\
  \ viewDidLoad]`方法中。Listing 13-11 展示了`MainViewController`类的`[self viewDidLoad]`方法，其中包括`HealthKit`初始化。\n\
  \n***Listing 13-11***. 请求来自`HealthKit`的步数权限\n\n```\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view,\n    //\
  \ typically from a nib.\n\nself.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];\n\
  \n....\n    self.isWorkoutActive = NO;\n\nif ([HKHealthStore isHealthDataAvailable])\
  \ {\n        NSSet *dataTypes =\n            [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n\
  \        [self.healthStore requestAuthorizationToShareTypes:dataTypes\n        \
  \    readTypes:dataTypes\n            completion:^(BOOL success, NSError *error)\
  \ {\n            if (success) {\n\n} else {\n\nUIAlertView *alert = [[UIAlertView\
  \ alloc]\n                    initWithTitle:@\"Error\"\n                    message:@\"\
  MyFitnessPod requires step count access!\"\n                    otherButtonTitles:nil];\n\
  \                [alert show];\n            }\n        }];\n    }\n}\n```\n\n注意，权限块的起始处包含对`[HKHealthStore\
  \ isHealthDataAvailable]`的调用。这是检查设备是否支持`HealthKit`（iOS 8 或更高版本）的另一种简单方法，并能防止在旧设备上崩溃（你无法访问未定义的类！）。\n\
  \n如果完成处理程序返回`success`，你的`HKHealthStore`将准备好使用，无需额外的初始化操作。如果权限请求失败，你应该向用户显示错误消息。如果用户已为你的应用设置了权限，完成处理程序将立即被调用并返回结果。\n\
  \n## 从`HealthKit`检索数据\n\n由于`HealthKit`在设计上与`Core Motion`相似，它提供了基于推送和拉取的查询方式来检索数据。与`Core\
  \ Motion`一样，基于推送的方法在每次记录事件时返回结果，而基于拉取的方法则在启动后仅返回一次结果。`HealthKit`的推送机制对于类似数据库的系统来说非常不寻常（手动启动操作有助于提高性能），但考虑到资源的共享特性，这种机制很有价值，因为它允许应用响应来自其他应用程序的更新。例如，如果你将一个应用置于后台，在另一个应用中获取血压读数，当你返回原始应用时，可能会收到更新。\n\
  \n使用`HealthKit`执行查询涉及两个步骤：\n\n1.  定义一个`HKQuery`对象，其类型与结果类型（例如统计信息、样本、云端备份数据等）和期望的执行方法（推送或拉取）匹配。\n\
  2.  在你的`HKHealthStore`对象上执行查询以获取结果。\n\n`HKQuery`是一个抽象类，它定义了初始化查询和指定返回内容的通用规则，但不指定行为或返回类型。要执行查询，你必须选择一个`HKQuery`的子类，该子类与你正在寻找的结果类型（例如，一组数据或单个项目）以及所需的执行行为（基于推送或拉取）匹配。表\
  \ 13-1 列出了主要的`HKQuery`子类，包括每个子类的结果类型和执行行为。\n\nTable 13-1. 主要`HKQuery`子类的结果类型和执行行为\n\
  \n| 子类 | 结果类型 | 执行行为 |\n| --- | --- | --- |\n| `HKSampleQuery` | 一组样本对象（包含样本时间和数量）\
  \ | 拉取（生成一个事件） |\n| `HKStatisticsQuery` | 一组样本对象的统计结果（例如平均值、总和） | 拉取 |\n| `HKStatisticsCollectionQuery`\
  \ | 一个样本类型的一组统计结果（适用于构建图表） | 拉取 |\n| `HKObserverQuery` | 对数量对象（如步数）的更改 | 推送（生成事件直到停止）\
  \ |\n| `HKAnchoredObjectQuery` | 匹配样本类型的最新对象 | 拉取 |\n\n对于`MyFitnessPod`应用，使用`HKStatisticsQuery`来确定“今日进度”标签的总步数（总和），并使用`HKObserverQuery`来监控步数何时变化。\n\
  \n要创建统计查询，创建一个新的`HKStatisticsQuery`对象，并使用`[HKStatisticsQuery initWithQuantityType:quantitySamplePredicate:options:completionHandler:]`方法进行初始化。对于数量类型，你需要使用一个`HKQuantityType`对象，该对象与你希望检索的数据类型匹配。`HKQuantityType`类有一个便捷构造函数`[HKQuantityType\
  \ quantityTypeForIdentifier:]`，它允许你基于与预定义常量匹配的常量来创建对象。步数的常量是`HKQuantityTypeIdentierStepCount`：\n\
  \n```\nHKQuantityType *quantityType = [HKQuantityType\n    quantityTypeForIdentifier:\
  \ HKQuantityTypeIdentierStepCount];\n```\n\n用于初始化`HKStatisticsQuery`的样本谓词是一个`NSPredicate`，类似于你在第\
  \ 7 章的`MyPod`项目中使用的，通过让用户从媒体选择器中选择来限制专辑选择的谓词。`NSPredicate`对象需要非常具体才能正确过滤数据类型，但为了帮助你，`HKQuery`类提供了便捷构造函数。要按日期过滤样本对象，请使用公共方法`[HKQuery\
  \ predicateForSamplesWithStartDate:endDate:options:]`。对于开始和结束日期，使用当前日期的午夜（00:00）和晚上\
  \ 11:59（23:59），如 Listing 13-12 所示。\n\n***Listing 13-12***. 构建基于日期的样本谓词\n\n```\n\
  -(NSPredicate *)getCurrentDatePredicate {\n    NSCalendar *calendar = [NSCalendar\
  \ currentCalendar];\n    NSDate *now = [NSDate date];\n    NSDate *startDate = [calendar\
  \ dateBySettingHour:0 minute:0 second:0\n        ofDate:now options:0];\n    NSDate\
  \ *endDate = [calendar dateBySettingHour:0 minute:0 second:0\n        ofDate:now\
  \ options:0];\n    NSPredicate *datePredicate = [HKQuery\n        predicateForSamplesWithStartDate:startDate\n\
  \        endDate:endDate options:0];\n    return datePredicate; \n}\n```\n\n对于查询选项，你应该指定`HKStatisticsCumulativeSum`，以表示你想要检索样本集的总和。\n\
  \n对于完成处理程序，你将使用查询的`result`对象的`sumQuantity`来提取今天的步数，并使用该值构造“今日进度”标签的字符串。要执行查询，请在你的`HKHealthStore`对象上调用`[HKHealthStore\
  \ executeQuery:]`方法。\n\n\n\n触发`MainViewController`类总步数查询的代码包含在清单 13-13 中。该方法被封装在一个方法中，因为你不想每次查询总步数状态时都重复这段代码。\n\
  \n***清单 13-13***. 步数统计查询\n\n```\n-(void)updateTotalStepCount\n{\n    NSPredicate\
  \ *datePredicate =\n        [self getCurrentDatePredicate];\n\nHKUnit *countUnit\
  \ = [HKUnit unitFromString:@\"count\"];\n\nHKQuantityType *quantityType = [HKQuantityType\n\
          quantityTypeForIdentifier:HKQuantityTypeIdentifierStepCount];\n\nHKStatisticsQuery\
  \ *statisticsQuery = [[HKStatisticsQuery alloc]\n        initWithQuantityType:quantityType\n\
          quantitySamplePredicate:datePredicate\n        options:HKStatisticsOptionCumulativeSum\n\
          completionHandler:^(HKStatisticsQuery *query,\n                            HKStatistics\
  \ *result,\n        NSError *error) {\n\nHKQuantity *sumQuantity = result.sumQuantity;\n\
          dispatch_async(dispatch_get_main_queue(), ^{\n            self.dailyProgressLabel.text\
  \ =\n                [NSString stringWithFormat:@\"%l steps\",\n                [sumQuantity\
  \ doubleValueForUnit:countUnit]];\n        });\n\n}];\n    [self.healthStore executeQuery:statisticsQuery];\n\
  }\n```\n\n要获取总步数，你需要使用`results`属性，它代表一个包含查询结果的`HKQuantity`对象。`sumQuantity`属性表示总和值。调用`[HKQuantity\
  \ doubleValueForUnit:]`会返回一个可以在字符串中显示的`double`值。\n\n在清单 13-14 中，你可以看到我在`[self viewDidLoad:]`方法中调用了`[MainViewController\
  \ updateTotalStepCount]`方法——就在确认 HealthKit 权限之后——以便初始化“今日进度”标签。\n\n***清单 13-14***.\
  \ 首次查询\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view,\n    // typically from a nib.\n\n...\n\nself.isWorkoutActive\
  \ = NO;\n\nif ([HKHealthStore isHealthDataAvailable]) {\n        NSSet *dataTypes\
  \ =\n            [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n        [self.healthStore\
  \ requestAuthorizationToShareTypes:dataTypes\n            readTypes:dataTypes\n\
              completion:^(BOOL success, NSError *error) {\n            if (success)\
  \ {\n                [self updateTotalStepCount];\n            } else {\n                UIAlertView\
  \ *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"Error\" message:@\"\
  MyFitnessPod \" +\n                        \"requires step count access for total\
  \ progress!\"\n                    delegate:self cancelButtonTitle:@\"OK\"\n                    otherButtonTitles:nil];\n\
                  [alert show];\n            }\n        }];\n    }\n}\n```\n\n## 获取实时更新\n\
  \n为了在锻炼期间获取实时更新，你需要从`HKObserverQuery`中触发`[MainViewController updateTotalStepCount]`方法，该方法会检查总步数是否已更新。不幸的是，没有哪个查询能一石二鸟（同时确定变更事件和新数量），因为`HKObserverQuery`会通知观察者事件，但不会返回关于这些事件的任何数据。\n\
  \n由于推送查询需要被停止，请将`HKObserverQuery`定义为一个实例变量：\n\n```\n@property (nonatomic, strong)\
  \ HKObserverQuery *observerQuery;\n```\n\n要初始化`HKObserverQuery`，请使用`[HKObserverQuery\
  \ initWithSampleType:predicate:updateHandler]`方法。对于样本类型，你将再次使用与步数对应的`HKQuantityType`对象（所有`HKQuantityType`对象都是`HKSampleType`的子类）：\n\
  \n```\nHKQuantityType *quantityType = [HKQuantityType\n    quantityTypeForIdentifier:HKQuantityTypeIdentierStepCount];\n\
  ```\n\n你不需要为查询指定谓词，因为你不需要过滤事件。步数的每次更改都将是一个新增操作。\n\n在完成处理程序中，既然你知道步数已更改，就可以调用`[MainViewController\
  \ updateTotalStepCount]`方法来检索最新总数。\n\n在清单 13-15 中，你可以看到我已将此查询添加到了`[MainViewController\
  \ viewDidLoad]`方法中，因为只要应用程序处于打开状态，用户就应该能够看到总步数更新。\n\n***清单 13-15***. 步数统计查询\n\n\
  ```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view,\n    // typically from a nib.\n\n...\n\nself.isWorkoutActive\
  \ = NO;\n\nif ([HKHealthStore isHealthDataAvailable]) {\n        NSSet *dataTypes\
  \ =\n            [NSSet setWithObject:HKQuantityTypeIdentifierStepCount];\n        [self.healthStore\
  \ requestAuthorizationToShareTypes:dataTypes\n            readTypes:dataTypes\n\
              completion:^(BOOL success, NSError *error) {\n            if (success)\
  \ {\n                [self updateTotalStepCount];\n\nHKQuantityType *quantityType\
  \ = [HKQuantityType\n                    quantityTypeForIdentifier:\n                    HKQuantityTypeIdentifierStepCount];\n\
  \nself.observerQuery = [[HKObserverQuery alloc]\n                    initWithSampleType:quantityType\
  \ predicate:nil\n                    updateHandler:^(HKObserverQuery *query,\n                                    HKObserverQueryCompletionHandler\n\
                                      completionHandler, NSError *error) {\n                    if\
  \ (!error) {\n                        [self updateTotalStepCount];\n                    }\
  \ else {\n                                NSLog(@\"Unable to retrieve step count.\"\
  );\n                    }\n                }];\n\n} else {\n                UIAlertView\
  \ *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"Error\"\n\
                      message:@\"MyFitnessPod requires step count access \" +\n                        \"\
  for total progress!\"\n                    delegate:self cancelButtonTitle:@\"OK\"\
  \n                    otherButtonTitles:nil];\n                [alert show];\n            }\n\
  \n}];\n    }\n}\n```\n\n对于所有长时间运行的查询，你需要调用`[HKHealthStore stopQuery:]`方法来停止接收更新。如清单\
  \ 13-16 所示，我在`[MainViewController dealloc]`方法中进行了此调用，以指示应用程序在退出时应停止接收更新。\n\n***清单\
  \ 13-16***. 停止 HKObserverQuery\n\n```\n-(void)dealloc\n{\n    [self.healthStore\
  \ stopQuery:self.oberverQuery];\n    [super dealloc];\n}\n```\n\n## 记录活动\n\n为了让其他应用程序能够使用来自\
  \ MyFitnessPod 应用的数据，你需要将锻炼结果保存到 HealthKit。要将锻炼保存到 HealthKit，你需要在锻炼完成时创建一个`HKSample`对象，并使用`[HKHealthStore\
  \ saveObject:withCompletion:]`方法将其保存到你的`HKHeathStore`对象中。\n\nHealthKit 中的`HKSample`对象代表一条数据及其收集的时间跨度。`HKQuantitySample`子类扩展了此功能，允许你存储数量数据，例如步数。这一切听起来应该很熟悉，因为当你从`CMPedometer`类检索数据时，你基于日期范围接收了一个数量（步数）。如清单\
  \ 13-17 所示，通过获取用户结束锻炼时的最终计步器读数，你可以创建一个可以保存到 HealthKit 的`HKQuantitySample`对象。\n\n\
  ***清单 13-17***. 从计步器数据创建 HKQuantitySample\n\n```\nself.pedometer queryPedometerDataFromDate:self.startDate\n\
      toDate:[NSDate date] withHandler:^(CMPedometerData *pedometerData,\n    NSError\
  \ *error) {\n```\n\n\n\n`NSLog(@\"number of steps: %ld\", [pedometerData.numberOfSteps\
  \ integerValue]);`\n`__block double stepCount = 0;`\n`dispatch_async(dispatch_get_main_queue(),\
  \ ^{`\n`stepCount = [pedometerData.numberOfSteps doubleValue];`\n\n`HKUnit *countUnit\
  \ = [HKUnit unitFromString:@\"count\"];`\n`HKQuantity *stepQuantity = [HKQuantity\
  \ quantityWithUnit:countUnit doubleValue:stepCount];`\n`HKQuantitySample *exerciseSample\
  \ = [HKQuantitySample quantitySampleWithType:HKQuantityTypeIdentifierStepCount quantity:stepQuantity\
  \ startDate:self.startDate endDate:[NSDate date]];`\n\n**注意** 请记住，只要依赖被 block 修改的变量，就始终需要使用\
  \ `__block` 关键字。\n\n`HKQuantity` 对象需要一个值和用 `HKUnit` 类表示的*单位*。这样可以为值提供上下文，并自动执行单位转换（取决于用户区域）。由于*计数*是一个普遍理解的单位，请使用\
  \ `count` 字符串初始化你的 `HKUnit` 对象。\n\n现在，你已经基于计步器数据得到了有效的 `HKQuantitySample` 对象，可以将其保存到健康存储中。如\
  \ 清单 13-18 所示，该操作应发生在 `[MainViewController togglePlayback:]` 方法中。在完成处理程序里，如果保存失败，请显示一个错误。\n\
  \n***清单 13-18***。将 `HKQuantitySample` 保存到 HealthKit\n\n```\n-(IBAction)toggleWorkout:(id)sender\n\
  {\n    if (self.isWorkoutActive) {\n        // 停止锻炼\n\nif (self.pedometer != nil)\
  \ {\n            [self.pedometer stopPedometerUpdates];\n        }\n\n[self.musicPlayer\
  \ stop];\n\nself.isWorkoutActive = NO;\n\nself.workoutButton.titleLabel.text = @\"\
  开始锻炼\";\n\n__block double stepCount = 0;\n        [self.pedometer queryPedometerDataFromDate:self.startDate\n\
  \             toDate:[NSDate date]\n             withHandler:^(CMPedometerData *pedometerData,\n\
  \                 NSError *error) {\n\nNSLog(@\"步数: %ld\",\n                [pedometerData.numberOfSteps\
  \ integerValue]);\n            dispatch_async(dispatch_get_main_queue(), ^{\n  \
  \              stepCount = [pedometerData.numberOfSteps doubleValue];\n\nHKUnit\
  \ *countUnit = [HKUnit unitFromString:@\"count\"];\n                HKQuantity *stepQuantity\
  \ = [HKQuantity\n                    quantityWithUnit:countUnit doubleValue:stepCount];\n\
  \                HKQuantitySample *exerciseSample = [HKQuantitySample\n        \
  \          quantitySampleWithType:HKQuantityTypeIdentifierStepCount\n          \
  \        quantity:stepQuantity startDate:self.startDate\n                  endDate:[NSDate\
  \ date]];\n\n[self.healthStore saveObject:exerciseSample\n                    withCompletion:^(BOOL\
  \ success, NSError *error){\n                    if (success) {\n              \
  \          [self updateTotalStepCount];\n                    } else {\n        \
  \                NSLog(@\"保存步数时出错\");\n                    }\n                }];\n\
  \n});\n        }];\n\n} else {\n        ...\n    }\n\n}\n```\n\n保存锻炼结果后，你不需要手动刷新总步数，因为这一操作由你之前设置的\
  \ `HKObserverQuery` 自动处理。\n\n## 总结\n在本章中，你了解了如何重新利用 MyPod 应用程序，将它从简单的基于 iPod 的音乐播放器转变为强大的、与\
  \ HealthKit 连接的健身锻炼应用程序。通过将 Core Motion 集成到应用程序中，你能够在用户设备上创建无需配件的 M 系列运动协处理器接口，并能够直接将计步器数据作为步数进行查询。为了让你的应用程序更好地与其他健身应用协同工作，并获取用户日常活动的完整快照，你将\
  \ HealthKit 作为健康信息存储库集成到了应用程序中。在此过程中，你还了解了两个框架在设计上的相似性，从而能够快速转换数据类型，并使用相似的设计模式来检索数据。\n\
  \n# 第 14 章：Swift 入门\n在撰写 2014 年 6 月 2 日之后的 iOS 书籍时，几乎不可能不提及近年来最震撼的公告之一：Swift。*Swift*\
  \ 是苹果全新的编程语言，旨在降低 iOS 和 OS X 的入门门槛。对许多开发者来说，Objective-C 独特的 C 语言与 Smalltalk 语法结合体极具挑战性。如今，大学里很少有纯粹基于\
  \ C 语言的计算机科学课程，因为依赖 C 语言的工作通常涉及极低级的编程或遗留代码。虽然 Smalltalk 是最早的纯面向对象编程（OOP）语言之一，但其语法与任何其他流行语言都不同，并且除了教学领域外，如今很少被采用。\n\
  \n为了解决这个问题，苹果希望利用 Swift 将 Objective-C 的设计理念与 Java、Python 和 Haskell 等较新编程语言的最佳语法特性相结合。为了让这门语言更具生命力，苹果宣布\
  \ Xcode、Cocoa 和 Cocoa Touch 完全兼容 Swift，允许你完全使用 Swift 构建应用。这种兼容性也意味着仍在学习该语言的开发者可以在项目中混合使用\
  \ Objective-C 和 Swift。\n\n在本章中，你将看到如何通过将第 9 章的 MyAVPlayer 项目从 Objective-C 转换为 Swift\
  \ 来开始使用 Swift。在此过程中，我将在此介绍你在移植项目不同部分时所需的 Swift 语法，讨论如何将 Swift 集成到现有的 Objective-C\
  \ 代码中，并强调如何为 Swift 修改 Xcode 工作流程。\n\n本章仅作为 Swift 编程语言的高度概述。如需更深入地讨论该语言，我推荐 David\
  \ Mark 等人所著的《Beginning iPhone Development with Swift》（Apress, 2014 年），以及苹果公司自己的语言指南《The\
  \ Swift Programming Language》，该指南可在 iBooks Store 获取。\n\n## 入门\n在这一章中，你将把 MyAVPlayer\
  \ 项目移植到 Swift。最终项目将命名为 SwiftAVPlayer，并包含在源代码包的第 14 章文件夹中。在开始之前，不妨回顾一下图 14-1 中提供的第\
  \ 1 章 MyAVPlayer 项目模型图。\n\n![9781430250838_Fig14-01.jpg](img/9781430250838_Fig14-01.jpg)\n\
  \n图 14-1。MyAVPlayer 项目模型图\n\n在 MyAVPlayer 项目中，目标是使用 `AVKit` 框架创建一个媒体播放应用。用户可以通过点击主视图控制器底部的“选择文件”和“全部播放”按钮来启动播放，这两个按钮分别允许用户手动选择要播放的文件，或自动播放应用文档目录中的所有可用文件。SwiftAVPlayer\
  \ 项目将保留这一功能。\n\n### 创建新项目\n与 Objective-C 项目相同，创建 Swift 项目的第一步是从 Xcode 的“文件”菜单中选择“新建”\
  \ → “项目”。你将看到本书中创建 Objective-C 项目时熟悉的项目向导。然而，要创建 Swift 项目，请在“语言”下拉菜单中选择 Swift，如图\
  \ 14-2 所示。若要同时支持 iPhone 和 iPad，请将“设备”类型选择为“通用”。\n\n![9781430250838_Fig14-02.jpg](img/9781430250838_Fig14-02.jpg)\n\
  \n图 14-2。创建 Swift 项目\n\n\n\n当您的项目创建成功后，您将看到如图 14-3 所示的项目层次结构。项目将预填充一个`ViewController`类（名为`ViewController.swift`）、一个`AppDelegate`类（名为`AppDelegate.swift`）、一个故事板文件（名为`Main.storyboard`）以及基于向导选择的默认\
  \ Xcode 项目设置。\n\n![9781430250838_Fig14-03.jpg](img/9781430250838_Fig14-03.jpg)\n\
  \n图 14-3. 示例 Swift 项目\n\n此项目层次结构与创建 Objective-C 项目时的层次结构类似。主要区别在于项目的基础编译语言设置为 Swift，并且默认类以\
  \ Swift 提供。所有 Xcode 项目设置界面和 Interface Builder 界面的工作方式与 Objective-C 项目完全相同，因为文件格式没有重大变化。由于`MyAVPlayer`项目依赖应用程序的文档目录存放文件，您需要在项目中启用\
  \ iTunes 文件共享。与 Objective-C 项目一样，点击项目的 Info 选项卡，并选择`Application Supports iTunes\
  \ File Sharing`即可启用，如图 14-4 所示。确保该键的值设置为`Yes`以启用文件共享。\n\n![9781430250838_Fig14-04.jpg](img/9781430250838_Fig14-04.jpg)\n\
  \n图 14-4. 启用 iTunes 文件共享支持\n\n## 将 Objective-C 类导入到你的项目中\n\n在继续构建故事板之前，我应该讨论一下房间里的大象：Swift\
  \ 与 Objective-C 的兼容性。Swift 允许您导入用 Objective-C 编写的类并调用 Objective-C 方法。这种导入功能非常有价值，因为您可以导入任何现有的\
  \ Cocoa Touch API 或现有的 Objective-C 代码。\n\n为了说明这一点，我们不会用 Swift 重写整个`MyAVPlayer`项目，而是仅使用\
  \ Swift 重写`MainViewController`类，并将`FileViewController`（文件选择器）作为 Objective-C 类导入。\n\
  \n要将 Objective-C 类添加到您的 Swift 项目中，请遵循与 Objective-C 项目相同的流程：将文件拖放到项目导航器中，或从文件菜单中选择“将文件添加到<项目名称>”。第一次将\
  \ Objective-C 类导入 Swift 项目时，系统会要求您创建一个 Objective-C 桥接头文件，如图 14-5 所示。选择“是”以继续。\n\n\
  ![9781430250838_Fig14-05.jpg](img/9781430250838_Fig14-05.jpg)\n\n图 14-5. Objective-C\
  \ 桥接头文件提示\n\n*Objective-C 桥接头文件*是一种特殊的头文件，它为编译器提供要暴露给 Swift 类的 Objective-C 头文件列表。它作为一个通用头文件工作，类似于\
  \ PCH（预编译头）文件。通过`#import`导入类。对于`SwiftAVPlayer`项目，您唯一需要导入的类是`FileViewController`。将以下`#import`语句添加到项目中的`SwiftAVPlayer-Bridging-Header.h`文件中：\n\
  \n```objc\n#import \"FileViewController.h\"\n```\n\n如果您想将更多 Objective-C 类（包括第三方组件）导入到项目中，可遵循相同步骤，确保将所有类添加到桥接头文件中。您无需将任何\
  \ Cocoa Touch 类添加到此桥接头文件中，因为 Apple 已为您处理好这些。\n\n## 构建故事板\n\n为基于 Swift 的项目构建故事板的过程与为基于\
  \ Objective-C 的项目构建故事板完全相同，只是您需要一些额外配置来使用导入的 Objective-C 类。您已经熟悉的所有 Interface Builder\
  \ 功能，包括属性检查器、对象库和视图层次结构，都可以在基于 Swift 的项目中使用。\n\n对于`MySwiftAVPlayer`项目，构建如图 14-6\
  \ 所示的故事板。\n\n![9781430250838_Fig14-06.jpg](img/9781430250838_Fig14-06.jpg)\n\n图\
  \ 14-6. SwiftAVPlayer 项目的故事板\n\n此故事板的关键组件如下：\n\n*   一个 AVKit 播放器视图控制器，代表项目的媒体播放器\n\
  *   一个容器视图，用于容纳媒体播放器，以及一个名为`setPlayerContent`的 Embed 转场，用于初始化媒体播放器\n*   一个`UITableViewController`子类，用于文件选择器\n\
  *   一个`UINavigationController`，嵌入文件选择器，并通过一个名为`showFilePicker`的 Present Modally\
  \ 转场连接到“选择文件”选项\n\n有关如何构建此故事板每个组件的更多详细信息，请参阅第 9 章。\n\n要将故事板上的文件选择器连接到其父类`FileViewController.h`，请使用\
  \ Interface Builder 中的身份检查器，就像在基于 Objective-C 的项目中一样。要使 Interface Builder 能够识别基于\
  \ Objective-C 的类，您需要选择一个父类和一个*模块*。模块是为 Objective-C 类添加 Swift 兼容性的另一种方式。对于基本项目，您不需要定义模块；但是，您需要点击身份检查器中的模块下拉列表，以便让\
  \ Interface Builder 识别您的 Objective-C 类。\n\n如图 14-7 所示，在输入`FileViewController`作为类名后，点击空的模块下拉列表以保存您的选择。\n\
  \n![9781430250838_Fig14-07.jpg](img/9781430250838_Fig14-07.jpg)\n\n图 14-7. 为基于 Objective-C\
  \ 的类选择空模块\n\n**注意**：此步骤是 Xcode 6 的局限性，并且是在故事板中使用 Objective-C 类所必需的。\n\n在下一节中，您将看到如何在\
  \ Swift 中连接到您的`IBOutlet`和`IBAction`。\n\n## 基本 Swift 语法\n\n在深入学习之前，我想介绍一些基本的 Swift\
  \ 语法概念，帮助您熟悉这门语言。为了使转换过程更清晰，我将在每个 Swift 代码示例之前展示相应的 Objective-C 代码。本节中的代码并非旨在直接用于最终项目，因此请随意在练习示例时进行实验。\n\
  \n### 调用方法（Hello World）\n\n在 Objective-C 中，要在控制台打印“Hello World”，您会使用`NSLog()`方法：\n\
  \n```objc\nNSLog(@\"Hello World\");\n```\n\n在 Swift 中，等效的代码是：\n\n```swift\nprintln(\"\
  Hello World\")\n```\n\n您应该注意到几个主要区别：\n\n*   *无分号*：Swift 使用`newline`字符来分隔行。\n*  \
  \ *无@符号*：Swift 有自己的`String`类，它被实现为一个简单的字符数组。\n*   *`println`*：Swift 使用这个从 C 和 Java\
  \ 中熟悉的函数名，允许您直接向控制台打印一行。\n\n在 Objective-C 中，调用带有多个参数的方法如下所示：\n\n```objc\nNSInteger\
  \ finalSum = [self calculateSumOf:5 andValue:5];\n```\n\n在 Swift 中，调用带有多个参数的方法是将它们添加到括号内的逗号分隔列表中（就像在\
  \ C 或 Java 中一样）：\n\n```swift\nvar finalSum = calculateSum(5, 5)\n```\n\n如果方法为其参数定义了标签，则将标签添加到值前面：\n\
  \n```swift\nvar finalSum = calculateSum(firstValue: 5, secondValue: 5)\n```\n\n\
  ### 定义变量\n\n在“Hello World”之后，每个编程课程都必须继续讨论变量。\n\n\n\n#### Swift 与 Objective-C 语法对比\n\
  \n在 Objective-C 中，通过声明类型、变量名和值来创建变量：\n\n```\nNSInteger count = 5;\n```\n\n在 Swift\
  \ 中，通过指定变量名和可变性（`var`或`let`）来声明变量，并可选择指定数据类型和初始值：\n\n```\nvar count : Int = 5\n\
  ```\n\n所有使用`var`在 Swift 中定义的变量都是*可变的*，这意味着你可以更改它们的值而无需重新初始化变量——例如，`NSMutableString`或`NSMutableArray`。\n\
  \n`let`关键字类似于 Objective-C 和 C 中的`const`；这是一个*常量*值，不应更改。\n\nSwift 会推断数据类型，因此如果你愿意，可以在声明中省略类型：\n\
  \n```\nvar count = 5\n```\n\n## 实例化对象\n\n在 Objective-C 中，通过先分配内存再调用构造函数来实例化对象：\n\
  \n```\nNSMutableArray *fileArray = [[NSMutableArray alloc] init];\n```\n\n在 Swift\
  \ 中则更简单。Swift 会自动分配内存，省去了`alloc`步骤。此外，Swift 中类的默认构造函数是类名后跟一对空圆括号：\n\n```\nvar fileArray\
  \ = NSMutableArray()\n```\n\n如果你要初始化的类在其构造函数中接受参数，则可以像调用任何其他方法一样调用构造函数：\n\n```\n\
  var myView = UIView(frame: myFrame)\n```\n\n如果你从 Objective-C 类实例化对象，则需要将其构造函数作为方法调用：\n\
  \n```\nvar mutableArray = NSMutableArray()\n```\n\n## 访问属性和方法（包括 Objective-C 类）\n\
  \n在 Swift 中，你可以使用点符号访问对象的属性或方法，就像在 C 或 Java 中一样。这包括在 Objective-C 中定义的类。\n\n在 Objective-C\
  \ 中，通过以下代码访问字符串的`lastPathComponent`属性：\n\n```\nNSString *extension = [fileName lastPathComponent];\n\
  ```\n\nSwift 中的等效写法如下：\n\n```\nvar extension = fileName.lastPathComponent\n```\n\
  \n要在 Objective-C 中调用`UIView`对象的`reloadSubviews`方法，你会编写如下调用：\n\n```\n[myView reloadSubviews];\n\
  ```\n\n在 Swift 中，同一行代码看起来像这样：\n\n```\nmyView.reloadSubviews()\n```\n\n## 类型转换\n\n\
  在 Objective-C 中，要将对象从一种类转换为另一种，需要在前面加上类名和可选的星号来标识指针：\n\n```\nUINavigationController\
  \ *navigatonController = (UINavigationController *)segue.destinationController;\n\
  ```\n\n在 Swift 中，使用`as`关键字即可轻松完成转换：\n\n```\nlet navigationController = segue.destinationController\
  \ as UINavigatonController\n```\n\n只需在结果后添加`as`关键字和类名，编译器就会为你处理其余部分。你甚至可以在任何需要使用对象的地方内联插入此关键字：\n\
  \n```\nfor (file as String in fileArray) {}\n```\n\n## 使用字符串格式化器\n\n在 Objective-C\
  \ 中，当你想要将对象的值插入字符串时，必须使用字符串格式化器来构建自定义字符串：\n\n```\nNSString *summaryString = [NSString\n\
  \    stringWithFormat:@\"value 1: %d value 2: %d\", value1, value2];\n```\n\n对于每个要插入字符串的值，你需要使用代表其类型的替换字符。\n\
  \n在 Swift 中，这已成为过去。你可以通过将变量名放在圆括号内，并在前面加上反斜杠来将值插入字符串：\n\n```\nlet value1 = 5\nlet\
  \ value2 = 10\nvar summaryString = \"value 1: \\(value1) value2: \\(value2)\"\n\
  ```\n\n## 使用数组\n\n在 Objective-C 中，你使用`NSArray`类表示数组。Objective-C 中的数组只包含对象，可以通过几种便捷的构造函数方法进行初始化，包括`[NSArray\
  \ arrayWithObjects:]`：\n\n```\nNSArray *stringArray = [NSArray arrayWithObjects:@\"\
  string 1\",\n    @\"string 2\", @\"string 3\"]\n```\n\n在 Swift 中，你可以在定义变量时通过在方括号中提供值来声明数组：\n\
  \n```\nvar stringArray = [\"string 1\", \"string 2\", \"string 3\"]\n```\n\n\n\n\
  Swift 对数组内容的类型限制与 Objective-C 不同，因此你可以直接用标量值（如`Int`）来初始化数组：\n\n```\nvar intArray\
  \ = [1, 3, 5]\n```\n\n如果你不希望用值来初始化数组，可以通过在方括号中指定类型名称来声明输入变量的类型：\n\n```\nvar intArray\
  \ : [Int]\n```\n\n你还可以使用下标语法来读取或修改 Swift 数组中的值：\n\n```\nvar sampleString = stringArray[3]\n\
  ```\n\n如果你将数组定义为可变变量，可以使用加号（`+`）运算符向数组追加值：\n\n```\nstringArray += \"string4\"\n\
  ```\n\n## 使用条件逻辑\n\n在 Objective-C 中，实现最基本的条件逻辑时，需要将比较表达式放在括号内，作为 `if` 语句的一部分：\n\n\
  ```\nif (currentValue < maximumValue) {\n}\n```\n\n在 Swift 中，除了不再需要括号之外，此语法基本保持不变：\n\
  \n```\nif currentValue < maximumValue {\n}\n```\n\n`if-else` 语句也遵循这一规则：\n\n```\n\
  if currentValue < maximumValue {\n    //执行某些操作\n} else if currentValue == 3 {\n\
  \    //执行其他操作\n}\n```\n\n**注意：** 你在 Objective-C 中熟悉的所有比较运算符在 Swift 中仍然有效。\n\n在 Objective-C\
  \ 中，当你需要检查多个值时，会使用 `switch` 语句，并为每个值提供一个 `case` 分支：\n\n```\nswitch(currentValue)\
  \ {\n    case 1: NSLog(\"value 1\");\n        break;\n    case 2: NSLog(\"value\
  \ 2\");\n        break;\n    case 3: NSLog(\"value 3\");\n        break;\n}\n```\n\
  \n好消息是，Swift 中同样支持 `switch` 语句，但有一些变化：\n\n- Swift 中的 `switch` 语句允许比较对象。Objective-C\
  \ 中只能比较值的要求在 Swift 中已被取消。\n- Swift 中的 `switch` 语句默认不再贯穿（fall through）。这意味着你不必在每个\
  \ `case` 末尾添加 `break;` 语句。\n- Swift 中的 `switch` 语句必须是穷尽的（即必须覆盖所有值，或包含一个 `default`\
  \ 分支）。这一要求是代码安全的最佳实践，可以防止意外的比较。\n\n在 Swift 中，之前的 `switch` 语句将如下所示：\n\n```\nswitch\
  \ currentValue {\n    case 1: println(\"value 1\")\n    case 2: NSLog(\"value 2\"\
  )\n    case 3: NSLog(\"value 3\")\n    default: NSLog(\"other value\")\n}\n```\n\
  \n## 使用循环\n\n所有主要循环类型（`for`、`for-each`、`do`、`do-while`）的语法在 Swift 中基本保持不变。两个主要变化是：你无需声明类型，并且括号再次变为可选：\n\
  \n```\nfor name in nameArray {\n    println(\"name = \\(name)\")\n}\n```\n\nSwift\
  \ 引入了一项能改进循环的重要功能：*区间*（ranges）。Swift 中的区间允许你指定一组值，用于循环迭代或作为比较的一部分。\n\nSwift 中有两种主要的区间类型：\n\
  \n- *闭区间*，表示为 `x...y`，创建一个从 x 开始并包含包括 y 在内的所有值的区间。（注意：是*三个*点！）\n- *半开区间*，表示为 `x..<y`，创建一个从\
  \ x 开始并包含直到 y 为止的所有值的区间。（注意：是*两个*点！）\n\n你可以在 `for-each` 循环中使用区间，如下所示：\n\n```\nfor\
  \ i in 1..<5 {\n    println(i)\n}\n```\n\n这将打印数字 1 到 4。\n\n## 定义方法\n\n在 Swift 中定义方法之前，我们先看一下\
  \ Objective-C 中的方法签名：\n\n```\n-(BOOL)compareValue1:(NSInteger)value1 toValue2:(NSInteger)value2;\n\
  ```\n\n在这行代码中，你可以看到返回类型位于方法名之前，每个参数都放在冒号之后。你还可以为第一个参数之后的每个参数添加标签，以提高可读性。\n\n在 Swift\
  \ 中，你需要在方法名之前加上 `func` 关键字，然后将输入参数和输出参数放在括号内来声明方法：\n\n```\nfunc compareValues(value1:\
  \ Int, value2: Int) -> (result: Bool)\n```\n\nSwift 使用 `->` 来分隔输入参数和返回参数。\n\n\n\n\
  ### 排版后的内容\n\n### 参数类型声明\n\n与 Swift 中的变量一样，通过附加类型名称和冒号来指示每个参数的类型。\n\n如果方法不返回任何内容，可以省略返回参数和`->`：\n\
  \n```\nfunc isValidName(name: String) {\n}\n```\n\n### 调用枚举类型\n\n在 Swift 中，可以通过指定枚举的名称、类型和值来构建枚举类型：\n\
  \n```\nenum PlaybackStates : Int {\n    case .Failed = -1, case .Loading, case .Success\n\
  }\n```\n\n与 Objective-C 不同，要表示`enum`中的值，需要在常量名称前放置一个句点。在与`enum`值进行比较时，保留该句点：\n\n\
  ```\nif playbackState == .Success {\n    println(\"Success!\")\n```\n\n### 使用特殊标点（问号和感叹号运算符）\n\
  \n对于任何来自基于 C 的语言的人来说，Swift 最令人困扰的一个方面是它如何使用问号和感叹号运算符。\n\n在 Swift 中，问号运算符（`?`）用于表示可选变量。*可选变量*是可以持有值或`nil`的变量。你可能想知道为什么这很重要。在其他语言中，对象可以是`nil`，但标量变量（如`int`）始终存储值。Swift\
  \ 中的可选变量消除了这一限制，允许任何内容存储`nil`值。\n\n通过在其类型末尾附加问号来将变量声明为可选：\n\n```\nvar myString :\
  \ String?\n```\n\n这也适用于用值初始化对象时：\n\n```\nvar myString : String? = \"Ahmed is cool\"\
  \n```\n\n由于 Swift 会推断变量类型，因此在需要通过引用传递对象（例如`NSError`）时，可选变量非常重要。\n\n**注意**：在 Swift\
  \ 中，仍然使用问号来表示三元运算。\n\nSwift 中的感叹号运算符允许你*解包*可选变量。这相当于在 Objective-C 或其他基于 C 的语言中解引用指针。解包允许你提取可选变量的属性（如果变量尚未初始化，则提取`nil`）。\n\
  \n要解包变量，在其变量名称末尾附加一个感叹号：\n\n```\nvar errorString = error!.description\n```\n\n**警告**：在点表示法中，不要省略感叹号后的句点。两者都是解包变量所必需的。\n\
  \n## 构建类\n\n与 Objective-C 不同，Swift 没有接口文件（`.h`）和实现文件（`.m`）的概念。在 Swift 中，整个类都在一个`.swift`文件中声明。\n\
  \n在 Objective-C 中，类声明由以下部分组成：\n\n* 类名\n* 父类\n* 属性声明（在接口文件中）\n* 方法定义（在实现文件中）\n\n\
  作为比较的基础，请参考 MyAVPlayer 项目的类声明，如列表 14-1 所示。在 MyAVPlayer 项目中，可以在`MainViewController.h`文件中找到它。\n\
  \n***列表 14-1***。主视图控制器类的头文件\n\n```\n#import <UIKit/UIKit.h>\n#import <AVKit/AVKit.h>\n\
  #import \"FileViewController.h\"\n@interface MainViewController : UIViewController\
  \ <FileControllerDelegate>\n\n@property (nonatomic, strong) IBOutlet UIView *playerViewContainer;\n\
  @property (nonatomic, strong) IBOutlet UIButton *chooseFileButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *playAllButton;\n@property (nonatomic, strong) AVPlayerViewController\
  \ *moviePlayer;\n\n-(IBAction)playAll:(id)sender;\n\n@end\n```\n\n要在 Swift 中导入类，使用`import`关键字并指定类的名称。与\
  \ Objective-C 不同，不需要指定头文件的路径：\n\n```\nimport UIKit\nimport AVKit\nimport FileViewController\n\
  ```\n\n在 Swift 中，定义类类似于定义变量：在`class`关键字后指定类名，在冒号后指定父类名（就像为变量指定类型一样）。在父类名后添加大括号以表示代码块：\n\
  \n```\nclass ViewController : UIViewController {\n}\n```\n\n\n\n由于 Swift 不区分接口文件和实现文件，你需要在类定义内部声明属性和方法。\n\
  \nSwift 中的属性声明方式与其他变量相同，只是其作用域位于类的顶层：\n\n```\nclass ViewController : UIViewController\
  \ {\n    var playAllButton : UIButton!\n    var chooseFileButton : UIButton!\n \
  \   var playAllButton : UIButton!\n    var moviePlayer : AVPlayerViewController!\n\
  }\n```\n\n同样，定义方法时，将其放置在类的顶层：\n\n```\nclass ViewController : UIViewController {\n\
  \    var playAllButton : UIButton!\n    var chooseFileButton : UIButton!\n    var\
  \ playAllButton : UIButton!\n    var moviePlayer : AVPlayerViewController!\n   \
  \ func playAll() {\n\n}\n}\n```\n\n在**列表 14-2**中，你可以找到 `ViewController` 类的 Swift\
  \ 文件，其中包含了从 `UIViewController` 类继承的 `viewDidLoad` 和 `didReceiveMemoryWarning` 方法。当重写父类的方法时，你需要在方法定义前添加\
  \ `override` 关键字。\n\n***列表 14-2***。修改后的 ViewController 类 Swift 文件\n\n```\nimport\
  \ UIKit\nimport AVFoundation\nimport AVKit\n\nclass ViewController: UIViewController,\
  \ FileControllerDelegate {\n\nvar chooseFileButton : UIButton!\n    var playAllButton\
  \ : UIButton!\n    var moviePlayer : AVPlayerViewController!\n\noverride func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 在此处执行视图加载后的任何额外设置，\n        // 通常来自\
  \ nib 文件。\n    }\n\noverride func didReceiveMemoryWarning() {\n        super.didReceiveMemoryWarning()\n\
  \        // 处置任何可以重新创建的资源。\n    }\n\n}\n```\n\n## 将项目连接到 Interface Builder\n\n与\
  \ Objective-C 类似，为了使你的用户界面元素和处理程序方法对 Interface Builder 可见，你需要在属性声明前添加 `@IBOutlet`\
  \ 属性，在方法前添加 `@IBAction`。\n\n在 Objective-C 版本的 `MainViewController` 类中，你通过在类名前面添加\
  \ `@IBOutlet` 关键字，将一个元素声明为 Interface Builder 的 *outlet*：\n\n```\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *playAllButton;\n```\n\n在 Swift 中，你可以通过在变量声明前添加 `@IBOutlet`\
  \ 关键字，将一个对象声明为 outlet：\n\n```\n@IBOutlet var chooseFileButton : UIButton!\n```\n\
  \n要在 Objective-C 中将方法声明为 Interface Builder 的 *action*，你需要将返回类型改为 `IBAction`，并使用\
  \ `id` 对象表示事件的发送者：\n\n```\n-(IBAction)playAll:(id)sender;\n```\n\n在 Swift 中，你通过在方法签名前添加\
  \ `@IBAction` 属性，并将 `sender` 对象作为输入参数，来实现相同的逻辑：\n\n```\n@IBAction func playAll:(sender:\
  \ AnyObject)\n```\n\n你会注意到的最大区别是，Swift 中的通用对象类型是 `AnyObject` 而不是 `id`。`id` 关键字在\
  \ Swift 中无法编译，所以请不要尝试使用它。\n\n添加这些属性后，你就可以在 Interface Builder 中连接你的属性和处理程序了。\n\n\
  **列表 14-3** 展示了“播放全部”按钮的 Objective-C 版本处理程序。在此方法中，你根据文档目录中可用的文件构建了一个 `AVPlayerItem`\
  \ 对象数组。构建列表后，你启动了媒体播放器的播放。\n\n***列表 14-3***。“播放全部”按钮的 Objective-C 处理程序\n\n```\n\
  -(IBAction)playAll:(id)sender\n{\n    NSArray *paths =\n        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \        NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSError *error = nil;\n\nNSArray *allFiles = [[NSFileManager defaultManager]\n\
  \        contentsOfDirectoryAtPath:documentsDirectory error:&error];\n\nNSMutableArray\
  \ *playerItemArray = [NSMutableArray new];\n\nif (error == nil) {\n        for (NSString\
  \ *file in allFiles) {\n            NSString *extensionString = [[file pathExtension]\n\
  \                lowercaseString];\n            if ([extensionString isEqualToString:@\"\
  mp4\"] ||\n                [extensionString isEqualToString:@\"mov\"]) {\n\nNSString\
  \ *relativePath = [documentsDirectory\n                    stringByAppendingPathComponent:file];\n\
  \nNSURL *fileURL = [NSURL\n                     fileURLWithPath:relativePath];\n\
  \nAVPlayerItem *playerItem = [AVPlayerItem\n                     playerItemWithURL:fileURL];\n\
  \n[playerItem addObserver:self forKeyPath:@\"status\"\n                     options:NSKeyValueObservingOptionNew\
  \ context:nil];\n\n[playerItemArray addObject:playerItem];\n             }\n   \
  \     }\n   } else {\n     NSLog (\"could not load files\");\n   }\n\nself.moviePlayer.player\
  \ = [[AVQueuePlayer alloc]\n        initWithItems:playerItemArray];\n\n[self.moviePlayer.player\
  \ addObserver:self forKeyPath:@\"status\"\n        options:0 context:nil];\n\n[self.moviePlayer.player\
  \ play];\n\n}\n```\n\n**列表 14-4** 展示了“播放全部”按钮的 Swift 版本处理程序。\n\n***列表 14-4***。“播放全部”按钮的\
  \ Swift 处理程序\n\n```\n@IBAction func playAll(sender : AnyObject) {\n\nvar error :\
  \ NSError? //可选变量（可为 nil）\n\nlet paths =\n        NSSearchPathForDirectoriesInDomains(.DocumentDirectory,\n\
  \        .UserDomainMask, true) // 枚举值使用点语法\n    let documentsDirectory = paths[0]\
  \ as String\n\nlet allFiles =\n        NSFileManager.defaultManager().contentsOfDirectoryAtPath(\n\
  \        documentsDirectory, error: &error) as [String]\n\nif error != nil {\n \
  \       let errorString = error!.description //提取值\n        // 打印错误字符串\n       \
  \ println(\"error loading files: \\(errorString)\")\n\n} else {\n        var playerItemArray\
  \  = NSMutableArray()\n        for file in allFiles {\n            let fileExtension\
  \ = file.pathExtension.lowercaseString\n            if fileExtension == \"m4v\"\
  \ || fileExtension == \"mov\" {\n                let relativePath = documentsDirectory.\n\
  \                    stringByAppendingPathComponent(file)\n                let fileURL\
  \ = NSURL(fileURLWithPath: relativePath)\n                let playerItem = AVPlayerItem(URL:\
  \ fileURL)\n\nplayerItem.addObserver(self, forKeyPath: \"status\",\n           \
  \         options:nil, context: nil)\n\nplayerItemArray.addObject(playerItem)\n\n\
  }\n        }\n\nmoviePlayer.player = AVQueuePlayer(items: playerItemArray)\n   \
  \     moviePlayer.player.addObserver(self, forKeyPath: \"status\",\n           \
  \ options: nil, context: nil)\n\nmoviePlayer.player.play()\n    }\n\n}\n```\n\n\
  ## 添加委托支持\n\n在 Objective-C 中，要将你的类声明为某个协议的委托，你需要在类签名中添加协议名称，并在类中实现 `@required` 的委托方法。在\
  \ Swift 中，你遵循相同的过程，但语法不同。\n\n在 Objective-C 中，你会通过在父类名后的尖括号中添加协议名称来声明类遵循某个协议：\n\n\
  ```\n@interface MainViewController : UIViewController <FileControllerDelegate>\n\
  ```\n\n但在 Swift 中，语法是在父类名之后，以逗号分隔的列表形式添加协议名称：\n\n```\nclass ViewController: UIViewController,\
  \ FileControllerDelegate {\n```\n\n在 MyAVPlayer 项目中，你需要使用 `FileControllerDelegate`\
  \ 协议来处理用户决定关闭文件选择器或选择文件时的用户界面事件。你可以在**列表 14-5** 中找到这些方法的 Objective-C 版本。\n\n***列表\
  \ 14-5***。Objective-C 委托方法\n\n```\n-(void)cancel\n{\n    //关闭文件选择器\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n\n\n\n-(void)didFinishWithFile:(NSString *)filePath\n{\n\
  \    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n         NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSString *relativePath = [documentsDirectory\n         stringByAppendingPathComponent:filePath];\n\
  \    NSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n    self.moviePlayer.player\
  \ = [AVPlayer playerWithURL:fileURL];\n    [self.moviePlayer.player addObserver:self\
  \ forKeyPath:@\"status\"\n          options:0 context:nil];\n    [self dismissViewControllerAnimated:YES\
  \ completion:^{\n        [self.moviePlayer.player play];\n    }];\n}\n\n在 `[FileControllerdelegate\
  \ didFinishWithFile:]` 方法中，你根据用户的选择，使用基于文件的 URL 初始化了电影播放器，然后开始播放。而在 `[FileControllerdelegate\
  \ cancel]` 方法中，你仅仅关闭了文件选择器，没有进行任何媒体选择。\n\n这些方法的 Swift 版本如代码清单 14-6 所示。\n\n***代码清单\
  \ 14-6***. Swift 委托方法\n\n```\nfunc cancel() {\n    dismissViewControllerAnimated(true,\
  \ completion: nil)\n}\n\nfunc didFinishWithFile(filePath: String!) {\n    let paths\
  \ = NSSearchPathForDirectoriesInDomains(\n           .DocumentDirectory,.UserDomainMask,\
  \ true)\n    let documentsDirectory = paths[0] as String\n    let relativePath =\
  \ documentsDirectory.\n            stringByAppendingPathComponent(filePath)\n  \
  \  let fileURL = NSURL(fileURLWithPath: relativePath)\n    moviePlayer.player =\
  \ AVPlayer(URL: fileURL)\n    moviePlayer.player.addObserver(self, forKeyPath: \"\
  status\",\n        options: nil, context: nil)\n    dismissViewControllerAnimated(true,\
  \ completion: { () -> Void in\n            self.moviePlayer.player.play()\n    })\n\
  }\n```\n\n因为你并非从父类重写委托方法，所以不需要在方法签名前添加 `override` 关键字。你会注意到，这里的几个局部变量通过 `let` 声明为常量；由于我使用这些变量来访问属性，因此不需要它们可变。\n\
  \n在 `dismissViewControllerAnimated` 方法调用中的 `() -> Void` 片段表示一个完成处理器。Swift 中的闭包被视为没有名称的方法；要在\
  \ Swift 中实现一个完成处理器，对于你的参数，可以使用该闭包的输入和输出参数集（如果它不需要参数，则使用两组空圆括号）：\n\n```\n() -> ()\
  \ {\n// 执行某些操作\n}\n```\n\n## 添加键值观察支持\n\n在 MyAVPlayer 项目中，你使用了键值观察来自动推进队列中的播放项，并在播放完成时自动关闭全屏媒体播放器。要重现此行为，你需要在\
  \ Swift 中实现键值观察。\n\n通常来说，Swift 试图摆脱键值观察，转而倾向于使用一种名为**属性观察器**的新概念。如代码清单 14-7 所示，属性观察器允许你实现当变量即将更改（`willSet`）和已更改（`didSet`）时的代码块。你可以通过在这些块中可用的\
  \ `oldValue` 和 `newValue` 常量来访问这些值。\n\n***代码清单 14-7***. 属性观察器\n\n```\nvar count\
  \ : Int {\n        willSet {\n                println(\"old value \\(oldValue)\"\
  )\n        }\n        didSet {\n                println(\"new value \\(newValue)\"\
  )\n        }\n}\n```\n\n不幸的是，属性观察器需要在定义属性或局部变量时实现。对于现有类的属性，你可以继续使用 Objective-C 中添加观察者的方法：`[NSObject\
  \ addObserver:forKeyPath:options:context:]`，只不过你需要使用 Swift 方法语法来调用它：\n\n```\nmoviePlayer.player.addObserver(self,\
  \ forKeyPath: \"status\", options: nil,\n    context: nil)\n```\n\n供你参考，你可以在代码清单\
  \ 14-8 中找到 KVO 处理方法的 Objective-C 版本。如果传入的对象是 `AVPlayer`，你会添加一张图片作为覆盖视图。如果是 `AVPlayerItem`，你会自动推进到\
  \ `AVQueuePlayer` 中的下一个项。\n\n***代码清单 14-8***. 用于 KVO 的 Objective-C 处理方法\n\n```\n\
  -(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object\n    change:(NSDictionary\
  \ *)change context:(void *)context\n{\n    if ((object == self.moviePlayer.player)\
  \ &&\n        [keyPath isEqualToString:@\"status\"] ) {\n        UIImage *image\
  \ = [UIImage imageNamed:@\"logo.png\"];\n        UIImageView *imageView = [[UIImageView\
  \ alloc]\n            initWithImage:image];\n        imageView.frame = self.moviePlayer.videoBounds;\n\
  \        imageView.contentMode = UIViewContentModeBottomRight;\n        imageView.autoresizingMask\
  \ = UIViewAutoresizingFlexibleHeight |\n                                     UIViewAutoresizingFlexibleWidth;\n\
  \        if ([self.moviePlayer.contentOverlayView.subviews count] == 0) {\n    \
  \        [self.moviePlayer.contentOverlayView addSubview:imageView];\n        }\n\
  \        [object removeObserver:self forKeyPath:@\"status\"];\n    } else if ([object\
  \ isKindOfClass:[AVPlayerItem class]]) {\n        AVPlayerItem *currentItem = (AVPlayerItem\
  \ *)object;\n        if (currentItem.status == AVPlayerItemStatusFailed) {\n   \
  \         NSString *errorString = [currentItem.error description];\n           \
  \ NSLog(@\"item failed: %@\", errorString);\n            if ([self.moviePlayer.player\n\
  \                    isKindOfClass:[AVQueuePlayer class]]) {\n                 \
  \   AVQueuePlayer *queuePlayer =\n                       (AVQueuePlayer *)self.moviePlayer.player;\n\
  \                [queuePlayer advanceToNextItem];\n            } else {\n      \
  \          UIAlertView *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"\
  Error\" message:errorString\n                    delegate:self cancelButtonTitle:@\"\
  OK\"\n                    otherButtonTitles:nil];\n                [alert show];\n\
  \            }\n        } else {\n            [object removeObserver:self forKeyPath:@\"\
  status\"];\n        }\n    }\n}\n```\n\n观察者的 Swift 版本处理方法如代码清单 14-9 所示。由于这是一个继承来的方法，请记得在方法签名前添加\
  \ `override` 关键字。\n\n***代码清单 14-9***. 用于 KVO 的 Swift 处理方法\n\n```\noverride func\
  \ observeValueForKeyPath(keyPath: String, ofObject\n    object: AnyObject, change:\
  \ [NSObject : AnyObject],\n    context: UnsafeMutablePointer<Void>) {\n        if\
  \ object.isKindOfClass(AVPlayer) && keyPath == \"status\" {\n            let overlayImage\
  \ = UIImage(named: \"logo.png\")\n            let imageView = UIImageView(image:\
  \ overlayImage)\n            imageView.frame = moviePlayer.videoBounds\n       \
  \     imageView.contentMode = .BottomRight\n            imageView.autoresizingMask\
  \ = .FlexibleHeight | .FlexibleWidth\n            if moviePlayer.contentOverlayView.subviews.count\
  \ == 0 {\n                self.moviePlayer.contentOverlayView.addSubview(imageView)\n\
  \            }\n            object.removeObserver(self, forKeyPath: \"status\")\n\
  \        } else if object.isKindOfClass(AVPlayerItem) {\n            let currentItem\
  \ = object as AVPlayerItem\n            if currentItem.status == .Failed {\n   \
  \             let errorString = currentItem.error.description\n                println(\"\
  error playing item: \\(errorString)\")\n                if (moviePlayer.player.isKindOfClass(AVQueuePlayer))\
  \ {\n                    let queuePlayer = moviePlayer.player as AVQueuePlayer\n\
  \                    queuePlayer.advanceToNextItem()\n                } else {\n\
  \                    let alert = UIAlertView(title: \"Error\",\n               \
  \         message: errorString, delegate: self,\n                        cancelButtonTitle:\
  \ \"OK\")\n                    alert.show()\n                }\n            } else\
  \ {\n                object.removeObserver(self, forKeyPath: \"status\")\n     \
  \       }\n        }\n}\n```\n\n\n\n在这个方法中，你会发现与 Objective-C 实现相比有两个有趣的变化。首先，当你检查传入对象的类型时，可以直接在类名上调用\
  \ `isKindOfClass()` 方法。此外，当你检查传入的消息字符串时，你直接对值进行比较，而不是调用 `isEqualToString()` 方法。\n\
  \n## 添加通知支持\n\nSwift 完全支持通知，但需要注意的是，你必须实现用于发送和观察通知的 Objective-C 方法。\n\n在 Objective-C\
  \ 中，通过为 `AVPlayerItemDidPlayToEndTimeNotification` 声明一个选择器方法，来设置用于播放完成通知的主视图控制器类：\n\
  \n```\n[[NSNotificationCenter defaultCenter] addObserver:self\n    selector:@selector(playbackFinished:)\n\
      name:AVPlayerItemDidPlayToEndTimeNotification object:nil];\n```\n\n你可以在 Swift\
  \ 中使用相同的方法来添加观察者，注意将其转换为 Swift 风格的语法：\n\n```\nvar notificationCenter = NSNotificationCenter.defaultCenter()\n\
  notificationCenter.addObserver(self, selector: \"playbackFinished:\",\n    name:\
  \ AVPlayerItemDidPlayToEndTimeNotification, object: nil)\n```\n\nObjective-C 的通知处理器如列表\
  \ 14-10 所示。在该方法中，你会在收到播放已结束的通知后关闭全屏媒体播放器。\n\n***列表 14-10***. Objective-C 中的通知处理器\n\
  \n```\n-(void)playbackFinished:(NSNotification *) notification\n{\n    NSDictionary\
  \ *userInfo = notification.userInfo;\n\nif ([self.moviePlayer.player isKindOfClass:[AVPlayer\
  \ class]]) {\n        [self dismissViewControllerAnimated:YES completion:nil];\n\
      } else {\n        //do nothing\n    }\n\n}\n```\n\n对于你的 Swift 处理器方法，记得将传入的通知作为输入参数，如列表\
  \ 14-11 所示。\n\n***列表 14-11***. Swift 中的通知处理器\n\n```\nfunc playbackFinished(notification\
  \ : NSNotification) {\n\nlet userInfo = notification.userInfo\n\nif moviePlayer.player.isKindOfClass(AVPlayer)\
  \ {\n       dismissViewControllerAnimated(true, completion: nil)\n   } else {\n\
         //do nothing\n   }\n}\n```\n\n## 总结\n\n在本章中，你通过移植 `MyAVPlayer` 项目，初步体验了 Swift。在了解了如何设置\
  \ Swift 项目并导入现有的 Objective-C 类之后，通过 Swift 语言语法的速成课程，你掌握了将新知识应用于用 Swift 重写 `ViewController`\
  \ 类的基础知识。虽然 Swift 为 iOS 开发带来了显著的语法变化，但其方法设计旨在与 Objective-C 类似。在大多数情况下，你可以使用 Swift\
  \ 方法语法从 Swift 中调用任何 Objective-C Cocoa Touch 方法。在无法实现的情况下，请查阅 Apple 开发者库以获取替代方法。\n\
