  首先，你需要确保你想要使用的硬件接口的所有 `AVCaptureDevice` 和 `AVCaptureInput` 对象都已正确设置。回顾 `[CameraViewController\
  \ initializeCameras]` 方法，你可以看到静态图像捕获要求你找到能够捕获视频的捕获设备（以便显示实时画面）。这样就处理了视觉方面的问题；然而，为了捕获音频，你需要为麦克风添加一个输入设备。列表\
  \ 10-2 提供了一个包含音频输入的 `[CameraViewController initializeCameras]` 方法的修改版本。\n\n**列表\
  \ 10-2**。MyCustomRecorder 项目（包含音频）的 `AVCaptureDevice` 和 `AVCaptureDeviceInput` 设置\n\
  \n```\n-(void)initializeCameras\n{\n    self.cameraArray = [AVCaptureDevice\n  \
  \                      devicesWithMediaType:AVMediaTypeVideo];\n\nNSError *error\
  \ = nil;\n\nself.rearCamera = nil;\n    self.frontCamera = nil;\n\nself.microphone\
  \ = nil;\n\nif ([self.cameraArray count] > 1) {\n\nfor (AVCaptureDevice *camera\
  \ in self.cameraArray) {\n            if (camera.position == AVCaptureDevicePositionBack)\
  \ {\n                self.rearCamera = camera;\n            } else if (camera.position\
  \ == AVCaptureDevicePositionFront) {\n                self.frontCamera = camera;\n\
  \            }\n        }\n\nself.rearCameraInput = [AVCaptureDeviceInput\n    \
  \        deviceInputWithDevice:self.rearCamera error:&error];\n        self.frontCameraInput\
  \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.frontCamera error:&error];\n\
  \n} else {\n        self.rearCamera = [AVCaptureDevice\n            defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \        self.rearCameraInput = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.rearCamera\
  \ error:&error];\n    }\n\nself.microphone = [[AVCaptureDevice\n        devicesWithMediaType:AVMediaTypeAudio]\
  \ objectAtIndex:0];\n    self.audioInput = [AVCaptureDeviceInput\n        deviceInputWithDevice:self.microphone\
  \ error:&error];\n\nself.currentDevice = self.rearCamera;\n}\n```\n\n接下来，你需要确保已经为你的媒体设置了正确的\
  \ `AVCaptureOutput` 对象。对于静态图像捕获，类的 `AVCaptureOutput` 对象由 `stillImageOutput` 属性表示，该属性是\
  \ `AVCaptureStillImageOutput` 类的子类。为了捕获视频，你需要生成一个包含音频和视频流的文件，其格式应能被 `MPMoviePlayerController`\
  \ 类回放。作为回顾，表 10-1 重复列出了第 4 章 中的 `AVCaptureOutput` 类型。对于录制同时包含音频和视频数据的电影文件，最合适的输出类型是\
  \ `AVCaptureMovieFileOutput`，它会生成一个有效的 QuickTime 电影文件。\n\n**表 10-1**。`AVCaptureOutput`\
  \ 类型\n\n| 子类 | 捕获输出 |\n| --- | --- |\n| `AVCaptureMovieFileOutput` | QuickTime 电影文件\
  \ |\n| `AVCaptureVideoDataOutput` | 视频帧——用于处理 |\n| `AVCaptureAudioFileOutput` |\
  \ Core Audio 支持的音频文件（MP3、AIFF、WAV、AAC） |\n| `AVCaptureAudioDataOutput` | 音频缓冲区——用于处理\
  \ |\n| `AVCaptureMetadataOutput` | 媒体文件元数据属性（例如，GPS 位置、曝光级别） |\n| `AVCaptureStillImageOutput`\
  \ | 静态图像和元数据 |\n\n你需要为你的类添加一个新属性来处理电影输出。在 MyVideoRecorder 项目中，这个属性名为 `fileOutput`：\n\
  \n```\n@property (nonatomic, strong) AVCaptureMovieFileOutput *fileOutput;\n```\n\
  \n到目前为止，你还没有配置硬件接口以使其更适合你的应用程序。正如第 8 章（MyVideoRecorder 项目）中的简单视频录制示例所示，你至少应该指定视频文件的尺寸和最大录制时长。此外，对于\
  \ `AVCaptureMovieFileOutput` 类，你可以实现 `minFreeDiskSpaceLimit` 属性，以防止在设备没有足够可用磁盘空间时开始录制。列表\
  \ 10-3 显示了一个代码片段，它通过这些更改初始化了 `fileOutput` 对象。在你最终的代码中，这个片段将是 `[CameraViewController\
  \ viewDidLoad]` 方法的一部分。\n\n**列表 10-3**。初始化一个 `AVCaptureMovieFileOutput` 对象\n\n```\n\
  self.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];\nself.movieFileOutput.minFreeDiskSpaceLimit\
  \ = 200 * 1024; //200MB\nself.movieFileOutput.maxRecordedDuration =\n    CMTimeMakeWithSeconds(180,\
  \ 1); //最长 3 分钟\n\nif ([self.session canAddOutput:self.movieFileOutput]) {\n   \
  \ [self.session addOutput:self.movieFileOutput];\n} else {\n    UIAlertView *alert\
  \ = [[UIAlertView alloc] initWithTitle:@\"错误！\"\n        message:@\"磁盘空间不足\" delegate:self\n\
  \        cancelButtonTitle:@\"确定\" otherButtonTitles:nil];\n    [alert show];\n\
  }\n```\n\n由于视频捕获在比典型的 Cocoa Touch 类更低的层级上运行，因此 `minFreeDiskSpaceLimit` 属性使用 C 语言的\
  \ 64 位整数类型 `int64_t`，而 `maxRecordedDuration` 属性则使用 Apple 底层用于表示时间的 `struct`（自定义数据类型）：`CMTime`。如示例所示，通过强制类型转换，你可以清晰地地将输入转换为这些类可处理的类型。\n\
  \n\n\n### 指定视频分辨率\n\n配置硬件接口的最后一部分——`AVCaptureSession`对象时，就需要考虑指定视频分辨率了。`session`的功能类似于硬件接口的电话接线员，它将输入设备与输出流连接起来。回顾列表\
  \ 10-2，初始化`AVCaptureSession`对象的基本步骤是：选择合适的构造方法，然后添加输入。虽然这些步骤对视频仍然适用，但多了一步：使用会话预设来配置会话以进行视频捕获。表\
  \ 10-2 列出了预设选项。\n\n表 10-2。`AVCaptureSession`预设\n\n| 预设 | 输出类型 |\n| --- | --- |\n\
  | `AVCaptureSessionPresetPhoto` | 高质量静态图像 |\n| `AVCaptureSessionPresetLow` | 设备上可用的低质量视频和音频，适合通过\
  \ 3G 蜂窝网络传输 |\n| `AVCaptureSessionPresetMedium` | 设备上可用的中等质量视频和音频 |\n| `AVCaptureSessionPresetHigh`\
  \ | 设备上可用的最高质量视频和音频（默认） |\n| `AVCaptureSessionPreset1080x720` | 1080×720（720p）视频\
  \ |\n| `AVCaptureSessionPreset1920x1080` | 1280×1080（1080p）视频 |\n| `AVCaptureSessionPresetiFrame960x540`\
  \ | 960×540 H.264 iFrame 视频（适合 iMovie 编辑） |\n| `AVCaptureSessionPresetiFrame1280x720`\
  \ | 1280×720 H.264 iFrame 视频（适合 iMovie 编辑） |\n| `AVCaptureSessionPresetInputPriority`\
  \ | 原始视频和音频流，适用于高级编解码器或视频处理 |\n\n与所有应用程序一样，请选择最适合您预期用途和设备的预设。如果不确定，视频捕获的安全选择是`AVCaptureSessionPreset1920x1080`。所有运行\
  \ iOS 6 或更高版本的 iOS 设备都能捕获 1080p 视频。要使用预设配置您的会话，只需使用所选常量设置属性：\n\n```\n[self.session\
  \ setSessionPreset:AVCaptureSessionPreset1920x1080];\n```\n\n列表 10-4 展示了 MyVideoRecorder\
  \ 项目中完成的`[CameraViewController viewDidLoad]`和`[CameraViewController initializeCameras]`方法。与列表\
  \ 10-1 中的静态图像示例一样，硬件接口部分以粗体显示。\n\n***列表 10-4***。MyCustomRecorder 项目的完整硬件接口代码\n\n\
  ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view.\n\nself.session = [[AVCaptureSession alloc] init];\n\
  \n// find the back-facing camera\n\n[self initializeCameras];\n\nNSError *error\
  \ = nil;\n\nif (error == nil && [self.session\n        canAddInput:self.rearCameraInput])\
  \ {\n        [self.session addInput:self.rearCameraInput];\n\n// set up our output\n\
  \nself.movieFileOutput = [[AVCaptureMovieFileOutput alloc] init];\n        self.movieFileOutput.minFreeDiskSpaceLimit\
  \ = 200 * 1024; //200MB\n        self.movieFileOutput.maxRecordedDuration =\n  \
  \          CMTimeMakeWithSeconds(180, 1); //3 mins max\n\nif ([self.session canAddOutput:self.movieFileOutput]\
  \ &&\n            [self.session\n                canSetSessionPreset:AVCaptureSessionPreset1920x1080])\
  \ {\n            [self.session\n                setSessionPreset:AVCaptureSessionPreset1920x1080];\n\
  \            [self.session addOutput:self.movieFileOutput];\n        } else {\n\
  \                 UIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  Error!\" message:@\"Camera Unavailable\"\n                delegate:self cancelButtonTitle:@\"\
  OK\"\n                otherButtonTitles:nil];\n            [alert show];\n     \
  \   }\n\n[self.view bringSubviewToFront:self.tapPosition];\n    }\n\n}\n\n-(void)initializeCameras\n\
  {\n    self.cameraArray = [AVCaptureDevice\n                        devicesWithMediaType:AVMediaTypeVideo];\n\
  \nNSError *error = nil;\n\nself.rearCamera = nil;\n    self.frontCamera = nil;\n\
  \nself.microphone = nil;\n\nif ([self.cameraArray count] > 1) {\n\nfor (AVCaptureDevice\
  \ *camera in self.cameraArray) {\n            if (camera.position == AVCaptureDevicePositionBack)\
  \ {\n                self.rearCamera = camera;\n            } else if (camera.position\
  \ == AVCaptureDevicePositionFront) {\n                self.frontCamera = camera;\n\
  \            }\n        }\n\nself.rearCameraInput = [AVCaptureDeviceInput\n    \
  \        deviceInputWithDevice:self.rearCamera error:&error];\n        self.frontCameraInput\
  \ = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.frontCamera error:&error];\n\
  \n} else {\n        self.rearCamera = [AVCaptureDevice\n            defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \        self.rearCameraInput = [AVCaptureDeviceInput\n            deviceInputWithDevice:self.rearCamera\
  \ error:&error];\n    }\n\nself.microphone = [[AVCaptureDevice\n        devicesWithMediaType:AVMediaTypeAudio]\
  \ objectAtIndex:0];\n    self.audioInput = [AVCaptureDeviceInput\n        deviceInputWithDevice:self.microphone\
  \ error:&error];\n\nself.currentDevice = self.rearCamera;\n}\n```\n\n## 构建用户界面\n\
  \n配置好硬件接口后，您可以开始更新用户界面以支持视频捕获。与硬件接口一样，您不需要丢弃所有现有代码来启用此功能；您主要需要对现有代码进行一些通知修改。\n\n\
  与静态图像捕获类似，以下是用户界面中需要关注的主要区域：\n\n*   显示摄像头输入的实时预览。\n*   公开用于修改捕获设置的控件。\n*   公开用于开始和停止录制的控件。\n\
  \n与静态图像不同，您需要在录制过程中更改用户界面。除了切换“录制”按钮的状态外，您还应该显示录制进度，并隐藏一些捕获设置（用户不应在录制过程中更改手电筒模式或低光设置；这样做会产生不连贯的效果）。录制完成后，用户应进入预览模式，在此模式下他们可以接受或拒绝录制的视频。\n\
  \n本节重点介绍启动视频录制以及在录制过程中出现的用户界面元素。完成录制的过程主要涉及非用户界面主题，将在下一节“完成录制”中介绍。\n\n### 设置视频图层\n\
  \n在静态图像捕获项目的`[CameraViewController viewDidLoad]`方法中，您使用了`AVCaptureVideoPreviewLayer`对象来显示来自摄像头的实时预览。如列表\
  \ 10-5 所示，该图层连接到会话对象，并配置为在父视图控制器中正确显示。\n\n***列表 10-5***。MyCamera 项目的视频预览图层初始化代码\n\
  \n```\nself.previewLayer = [[AVCaptureVideoPreviewLayer alloc]\n               \
  \       initWithSession:self.session];\n\n// CGRect layerRect = self.previewView.bounds;\n\
  CGRect layerRect = self.view.bounds;\nCGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
  \     CGRectGetMidY(layerRect));\n\n[self.previewLayer setBounds:layerRect];\n[self.previewLayer\
  \ setPosition:layerCenter];\n\n[self.previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
  // [self.previewLayer\n//    setVideoGravity:AVLayerVideoGravityResizeAspectFill];\n\
  \n[self.previewView.layer addSublayer:self.previewLayer];\n```\n\n好消息是，对于视频捕获，您无需对显示实时视频的代码做任何更改！您可以原样重用这段代码。虽然您需要在硬件初始化代码中创建一个音频输入对象来管理音频捕获，但实时预览应仅包含视频。用户将能够在视频录制完成后预览音频，因为在录制过程中预览音频会导致讨厌的反馈循环（回声）。\n\
  \n\n\n在继续之前，我想回顾几个需要特别关注的配置选项：设置正确的帧属性和启动会话。从第 4 章你可能记得，图层只是你添加到视图中的一个组件——类似于动画层的一部分。要正确定位图层，你需要为其指定适当的边界和原点位置。这与操作普通视图的流程相同，但需要记住显式定义所有内容以正确显示图层。同样，*自动调整大小*的概念并非视频图层的默认设置，因此你需要确保为预览层的`videoGravity`属性指定`AVLayerVideoGravityResize`。\n\
  \n你可能还记得，定位视频图层的帧并不会自动在目标视图上显示实时画面。要显示实时视频，你需要启动会话。与静态图像拍摄类似，你可以通过调用会话对象上的`[AVCaptureSession\
  \ startRunning]`方法来启动会话。这适用于大多数会话预设类型。对于视频拍摄应用程序，一个重要的区别在于：启动会话并不等同于录制文件。你需要通过`AVCaptureMovieFileObject`来开始或停止录制。稍后，你将为“切换录制”按钮的处理程序添加相应代码。\n\
  \n列表 10-6 展示了`MyCustomRecorder`项目中`[CameraViewController viewDidLoad]`方法的最终版本。视频预览层初始化代码以粗体文本突出显示。\n\
  \n***列表 10-6***. `MyCustomRecorder`项目的视频预览层初始化代码\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    // 加载视图后进行任何其他设置\n\nself.previewView.autoresizingMask\
  \ =\n        UIViewAutoresizingFlexibleWidth |\n        UIViewAutoresizingFlexibleHeight;\n\
  \nself.session = [[AVCaptureSession alloc] init];\n\n// 查找后置摄像头\n\n[self initializeCameras];\n\
  \nNSError *error = nil;\n\nself.focusPoint = CGPointMake(0.5f, 0.5f);\n\nif (error\
  \ == nil && [self.session\n        canAddInput:self.rearCameraInput]) {\n      \
  \  [self.session addInput:self.rearCameraInput];\n\n// 设置预览层\n      self.previewLayer\
  \ = [[AVCaptureVideoPreviewLayer alloc]\n            initWithSession:self.session];\n\
  \nCGRect layerRect = self.view.bounds;\n        CGPoint layerCenter = CGPointMake(CGRectGetMidX(layerRect),\n\
  \            CGRectGetMidY(layerRect));\n\n[self.previewLayer setBounds:layerRect];\n\
  \        [self.previewLayer setPosition:layerCenter];\n\n[self.previewLayer setVideoGravity:AVLayerVideoGravityResize];\n\
  \n[self.previewView.layer addSublayer:self.previewLayer];\n\n// 设置输出\n\nself.movieFileOutput\
  \ = [[AVCaptureMovieFileOutput alloc] init];\n        self.movieFileOutput.minFreeDiskSpaceLimit\
  \ =\n           200 * 1024; // 200MB\n        self.movieFileOutput.maxRecordedDuration\
  \ =\n            CMTimeMakeWithSeconds(180, 1); // 最长 3 分钟\n\nif ([self.session\
  \ canAddOutput:self.movieFileOutput] &&\n            [self.session\n           \
  \     canSetSessionPreset:AVCaptureSessionPreset1920x1080]) {\n            [self.session\
  \ \n                setSessionPreset:AVCaptureSessionPreset1920x1080];\n       \
  \     [self.session addOutput:self.movieFileOutput];\n        } else {\n       \
  \     UIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  错误！\"\n                message:@\"磁盘空间不足\"\n                delegate:self cancelButtonTitle:@\"\
  确定\"\n                otherButtonTitles:nil];\n            [alert show];\n     \
