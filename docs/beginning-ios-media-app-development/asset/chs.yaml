  ## 添加拍摄设置控件\n\n在静态图像拍摄项目中，你添加了一套广泛的控件来修改相机拍摄设置，例如曝光、闪光灯、设备选择和自动对焦控制。虽然你可以重用设备选择和自动对焦控件，但需要精简该项目的控件列表，因为某些概念（如曝光和闪光灯）仅适用于相机传感器激活的时刻。好消息是，你可以为视频实现诸如手电筒模式、白平衡和弱光设置等功能，以提供类似的功能。\n\
  \n查看图 10-5 中苹果内置的相机界面，你会发现苹果暴露的唯一控件是“切换手电筒”和“切换设备”。\n\n![9781430250838_Fig10-05.jpg](img/9781430250838_Fig10-05.jpg)\n\
  \n图 10-5. 苹果静态图像与视频拍摄界面之间的区别\n\n由于你的应用程序提供了与默认设置不同的用户体验，因此你将添加用于手电筒模式和弱光设置的控件，如图\
  \ 10-6 所示。\n\n![9781430250838_Fig10-06.jpg](img/9781430250838_Fig10-06.jpg)\n\n\
  图 10-6. `MyCustomRecorder`项目的视频拍摄界面\n\n对于`MyCustomRecorder`项目，你将移除曝光按钮，并将闪光灯按钮重新用于手电筒模式。你还将添加用于弱光设置和开始录制的按钮。在\
  \ Interface Builder 中进行这些更改后，你的故事板应类似于图 10-7 所示。\n\n![9781430250838_Fig10-07.jpg](img/9781430250838_Fig10-07.jpg)\n\
  \n图 10-7. 视频拍摄界面的故事板\n\n新增按钮就位后，你的`CameraViewController.h`文件应类似于列表 10-7 中的示例。\n\n\
  ***列表 10-7***. 包含新控件的`CameraViewController`修改头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n\n@protocol CameraDelegate <NSObject>\n\n\
  -(void)cancel;\n-(void)didFinishWithImage:(UIImage *)image;\n\n@end\n\n@interface\
  \ CameraViewController : UIViewController\n    <UIActionSheetDelegate>\n\n@property\
  \ (nonatomic, strong) IBOutlet UIView *previewView;\n@property (nonatomic, strong)\
  \ IBOutlet UIButton *torchButton;\n@property (nonatomic, strong) IBOutlet UIButton\
  \ *lowLightButton;\n@property (nonatomic, strong) IBOutlet UIButton *focusButton;\n\
  @property (nonatomic, strong) IBOutlet UIButton *cameraButton;\n\n@property (nonatomic,\
  \ strong) IBOutlet UILabel *tapPosition;\n\n@property (nonatomic, strong) AVCaptureSession\
  \ *session;\n@property (nonatomic, strong) AVCaptureMovieFileOutput\n    *movieFileOutput;\n\
  \n@property (nonatomic, strong) id <CameraDelegate> delegate;\n\n-(IBAction)cancel:(id)sender;\n\
  -(IBAction)toggleRecording:(id)sender;\n\n-(IBAction)torchMode:(id)sender;\n-(IBAction)lowLightMode:(id)sender;\n\
  -(IBAction)focusMode:(id)sender;\n-(IBAction)switchCamera:(id)sender;\n\n-(IBAction)didTapPreview:(UIGestureRecognizer\
  \ *)gestureRecognizer;\n\n@end\n```\n\n供你参考，我在列表 10-8 中包含了自动对焦和切换设备按钮的处理程序。对于视频拍摄，你完全不需要修改这些处理程序，并且一如既往，它们应放在你的`CameraViewController.m`文件中。\n\
  \n***列表 10-8***. 自动对焦与切换设备的按钮处理程序\n\n```\n-(void)switchToFocusWithIndex:(NSInteger)buttonIndex\n\
  {\n    NSError *error = nil;\n\nAVCaptureFocusMode focusMode = 0;\n```\n\n\n\n```objectivec\n\
  switch (buttonIndex) {\n    case 0: {\n        focusMode = AVCaptureFocusModeAutoFocus;\n\
  \        self.focusButton.titleLabel.text = @\"Focus: Auto\";\n        break;\n\
  \    }\n    case 1: {\n        focusMode = AVCaptureFocusModeContinuousAutoFocus;\n\
  \        self.focusButton.titleLabel.text = @\"Focus: Cont\";\n        break;\n\
  \    }\n    case 2: {\n        focusMode = AVCaptureFocusModeLocked;\n        self.focusButton.titleLabel.text\
  \ = @\"Focus: Fixed\";\n        break;\n    }\n    default:\n        break;\n}\n\
  ```\n\n```objectivec\nif ([self.currentDevice lockForConfiguration:&error] &&\n\
  \    [self.currentDevice isFocusModeSupported:focusMode]) {\n\n    self.currentDevice.focusMode\
  \ = focusMode;\n\n    [self.currentDevice unlockForConfiguration];\n} else {\n \
  \   NSLog(@\"could not set focus mode\");\n}\n```\n\n```objectivec\n-(void)switchToCameraWithIndex:(NSInteger)buttonIndex\n\
  {\n    [self.session beginConfiguration];\n\n    if (buttonIndex == 0) {\n     \
  \   [self.session removeInput:self.rearCameraInput];\n\n        if ([self.session\
  \ canAddInput:self.frontCameraInput]) {\n            [self.session addInput:self.frontCameraInput];\n\
  \        }\n\n        self.cameraButton.titleLabel.text = @\"Camera: Front\";\n\
  \        self.currentDevice = self.frontCamera;\n\n    } else if (buttonIndex ==\
  \ 1) {\n        [self.session removeInput:self.frontCameraInput];\n\n        if\
  \ ([self.session canAddInput:self.rearCameraInput]) {\n            [self.session\
  \ addInput:self.rearCameraInput];\n        }\n\n        self.cameraButton.titleLabel.text\
  \ = @\"Camera: Rear\";\n        self.currentDevice = self.frontCamera;\n    }\n\n\
  \    [self.session commitConfiguration];\n}\n```\n\n### 手电筒模式\n\n相机闪光灯的概念是发出一束光，照亮原本过于暗淡而无法拍摄的场景。用户通常在闪光灯关闭的情况下构图，但当他们按下拍摄按钮时，闪光灯会恰好激活足够长的时间，在相机传感器工作期间照亮场景。这一概念并不适用于视频拍摄，因为传感器需长时间保持激活状态；然而，通过实现手电筒模式，您可以让用户在录制期间保持闪光灯\
  \ LED 激活，从而为场景增加光线。\n\n要激活手电筒模式，您可以复用 `MyCamera` 项目中的闪光灯按钮。底层功能有所不同，但这种差异对用户来说并不明显。在\
  \ `MyCamera` 项目中，闪光灯模式的处理方法是 `[CameraViewController flashMode:]`。打开您的 `CameraViewController.h`\
  \ 文件，在该方法名上执行辅助点击（右键点击或 Option 键点击），调出重构窗口，如图 Figure 10-8 所示。这将允许您在包含该方法的每个文件中重命名它，包括\
  \ Interface Builder 文件。您的新方法应命名为 `[CameraViewController torchMode:]`。\n\n![9781430250838_Fig10-08.jpg](img/9781430250838_Fig10-08.jpg)\n\
  \n图 10-8. 重构窗口\n\n如第 4 章所述，修改拍摄设置的一般流程是：使用屏幕上的显示按钮弹出可用模式的操作表，然后设置模式（如果设备支持）。虽然如今几乎所有现代\
  \ iOS 设备都配备了两个摄像头，但需要注意的是，这些摄像头并不相同。通常，后置摄像头功能更强大，支持高分辨率图像、闪光灯以及其他可提高画质的功能（例如 iPhone\
  \ 6 Plus 的图像稳定功能）。相比之下，前置摄像头分辨率较低，可用的拍摄控制选项也更少。\n\n`torchMode` 属性用于控制 `AVCaptureDevice`\
  \ 上的手电筒模式。其配置选项为 `Off`（关闭）、`On`（开启）和 `Auto`（自动），分别由常量 `AVCaptureTorchModeOff`、`AVCaptureTorchModeOn`\
  \ 和 `AVCaptureTorchModeAuto` 表示。作为该过程的第一步，请修改您的按钮处理器，以便在操作表中显示这些新值，如代码清单 10-9 所示。\n\
  \n***代码清单 10-9***. 手电筒模式的按钮处理器\n\n```objectivec\n-(IBAction)torchMode:(id)sender\
  \ {\n    if ([self.currentDevice isTorchAvailable]) {\n        UIActionSheet *cameraSheet\
  \ = [[UIActionSheet alloc]\n            initWithTitle:@\"Flash Mode\" delegate:self\n\
  \            cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil\n        \
  \    otherButtonTitles:@\"Auto\", @\"On\" , @\"Off\", nil];\n        cameraSheet.tag\
  \ = 101;\n        [cameraSheet showInView:self.view];\n    } else {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc]\n            initWithTitle:@\"Error\"\n        \
  \    message:@\"Flash not supported\" delegate:nil\n            cancelButtonTitle:@\"\
  OK\" otherButtonTitles:nil];\n        [alert show];\n    }\n}\n```\n\n与之前的示例一样，您需在操作表协议返回\
  \ `[UIActionSheet didDismissWithButtonIndex:]` 消息后修改拍摄设置。请记住，此消息是全局发送给所有操作表的。为了区分不同的操作表，您需要为每个操作表分配一个标签（`101`\
  \ 是闪光灯模式的标签）。在手电筒模式的 `case` 块（对应 `101` 号）中，执行另一个重构操作，将配置方法重命名为 `[CameraViewController\
  \ switchToTorchModeWithIndex:]`，如代码清单 10-10 所示。\n\n***代码清单 10-10***. 修改后的手电筒模式操作表委托\n\
  \n```objectivec\n-(void) actionSheet:(UIActionSheet *)actionSheet\n      didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    switch (actionSheet.tag) {\n        case 100:\n            [self switchToCameraWithIndex:buttonIndex];\n\
  \            break;\n        case 101:\n            [self switchToTorchWithIndex:buttonIndex];\n\
  \            break;\n        case 102:\n            [self switchToFocusWithIndex:buttonIndex];\n\
  \            break;\n        case 103:\n            [self switchToExposureWithIndex:buttonIndex];\n\
  \            break;\n        default:\n            break;\n    }\n}\n```\n\n用于判断\
  \ `AVCaptureDevice` 是否支持手电筒模式的方法是 `[AVCaptureDevice isTorchModeSupported:]`。如代码清单\
  \ 10-11 所示，在您的 `[CameraViewController switchToTorchModeWithIndex:]` 方法中，锁定设备进行配置后，首先检查手电筒模式是否可用，如果适用则进行设置。完成配置更改后，解锁设备。如果在锁定设备或尝试进行更改时发生错误，则显示错误警告。\n\
  \n***代码清单 10-11***. 更改手电筒模式的方法\n\n```objectivec\n-(void)switchToTorchWithIndex:(NSInteger)buttonIndex\n\
  {\n    NSError *error = nil;\n\n    AVCaptureTorchMode torchMode = 0;\n\n    switch\
  \ (buttonIndex) {\n        case 0: {\n            torchMode = AVCaptureTorchModeAuto;\n\
  \            self.torchButton.titleLabel.text = @\"Torch: Auto\";\n            break;\n\
  \        }\n        case 1: {\n            torchMode = AVCaptureTorchModeOn;\n \
  \           self.torchButton.titleLabel.text = @\"Torch: On\";\n            break;\n\
  \        }\n        case 2: {\n            torchMode = AVCaptureTorchModeOff;\n\
  \            self.torchButton.titleLabel.text = @\"Torch: Off\";\n            break;\n\
  \        }\n        default:\n            break;\n    }\n\n    if ([self.currentDevice\
  \ lockForConfiguration:&error]) {\n        self.currentDevice.torchMode = torchMode;\n\
  \        [self.currentDevice unlockForConfiguration];\n    } else {\n        NSLog(@\"\
  could not set torch mode\");\n    }\n}\n```\n\n遵循苹果的示例，将 `AVCaptureTorchModeAuto`\
  \ 用作手电筒模式的默认配置设置。您可以通过将手电筒模式设置添加到 `[CameraViewController initializeCameras]` 方法来定义此默认值。\n\
  \n### 弱光增强\n\n\n\n对于静态图像，你可以通过曝光来调整拍摄图像的亮度或暗度，而无需使用闪光灯。作为构图过程的一部分，你允许用户指定曝光是否应随焦点选择的变化而自动变化，还是应基于先前选择保持固定。这样，当用户重新调整焦点时，他们可以看到图像变亮/变暗或维持当前亮度设置。不幸的是，一切都有权衡，当你为图像增加或减少光线时，往往也在增加或减少细节。这可能导致传感器产生大量噪声，但你可以通过重新对焦或调整曝光设置来补偿。然而，在拍摄视频时，你不想在拍摄过程中重新对焦或大幅改变曝光设置，因为这两种变化都会产生不自然的效果，大多数人会觉得分散注意力。\n\
  \n为了在视频拍摄的光线调整过程中补偿图像质量的变化，你将在拍摄界面中启用一个低光增强控制，以替代曝光模式。低光设置指示`AVCaptureDevice`类根据环境光线自动提亮或调暗场景——这与曝光模式不同，后者基于当前焦点改变设置。如果用户选择禁用低光增强，相机在录制期间将不会调整场景的光线。\n\
  \n你通过`automaticallyEnablesLowLightBoostWhenAvailable`方法控制`AVCaptureDevice`的低光设置（增强开启或关闭）。顾名思义，输入是一个`BOOL`，意味着用户只能启用或禁用此设置。\n\
  \n与所有拍摄设置一样，在提交更改时，你需要锁定设备并确保硬件支持这些设置。要查询设备是否支持低光增强模式，请使用`lowLightSupported`属性。列表\
  \ 10-12 展示了低光模式按钮的处理程序。\n\n***列表 10-12***. 低光模式按钮的处理程序\n\n```\n-(IBAction)lowLightMode:(id)sender\
  \ {\n    if ([self.currentDevice isLowLightBoostSupported]) {\n        //\n        UIActionSheet\
  \ *lowLightSheet = [[UIActionSheet alloc]\n            initWithTitle:@\"Low Light\
  \ Boost Mode\" delegate:self\n            cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil\n\
              otherButtonTitles:@\"On\" , @\"Off\", nil];\n        lowLightSheet.tag\
  \ = 103;\n        [lowLightSheet showInView:self.view];\n    } else {\n        //\n\
          UIAlertView *alert = [[UIAlertView alloc]\n            initWithTitle:@\"\
  Error\"\n            message:@\"Low Light Boost not supported\" delegate:nil\n            cancelButtonTitle:@\"\
  OK\" otherButtonTitles:nil];\n        [alert show];\n    }\n}\n-(void)switchToExposureWithIndex:(NSInteger)buttonIndex\n\
  {\n    NSError *error = nil;\n\nBOOL boostOn;\n    switch (buttonIndex) {\n        case\
  \ 0: {\n            boostOn = YES;\n            self.lowLightButton.titleLabel.text\
  \ = @\"LL Boost: On\";\n            break;\n        }\n        case 1: {\n            boostOn\
  \ = NO;\n            self.lowLightButton.titleLabel.text = @\"LL Boost: Off\";\n\
              break;\n        }\n        default:\n            break;\n    }\n\nif\
  \ ([self.currentDevice lockForConfiguration:&error] &&\n        [self.currentDevice\
  \ isLowLightBoostSupported]) {\n\nself.currentDevice.\n            automaticallyEnablesLowLightBoostWhenAvailable\
  \ = boostOn;\n\n[self.currentDevice unlockForConfiguration];\n    } else {\n        NSLog(@\"\
  could not set exposure mode\");\n    }\n\n}\n```\n\n## 开始/停止录制\n\n在设置了视频拍摄界面的预览层和拍摄控制后，剩下的唯一用户界面任务是处理开始和停止录制。查看\
  \ Apple 相机应用的“录制中”界面，如图 10-9 所示。请注意，在录制过程中，Apple 将“开始”按钮的状态更改为“停止”，并显示当前录制的时长。\n\
  \n![9781430250838_Fig10-09.jpg](img/9781430250838_Fig10-09.jpg)\n\n图 10-9. 相机应用的“录制中”界面\n\
  \n在`MyCustomRecorder`应用中，你将更进一步，隐藏拍摄控制，因为用户在录制期间除了焦点外不应修改任何内容。\n\n为了显示录制时间，将`UILabel`添加到你的故事板，并将`NSTimer`对象添加到`CameraViewController`类。在`MyCustomRecorder`项目中，我将它们分别命名为`timeLabel`和`recordingTimer`：\n\
  \n```\n@property (nonatomic, strong) IBOutlet UILabel *timeLabel;\n@property (nonatomic,\
  \ strong) NSTimer *recordingTimer;\n```\n\n在 Interface Builder 中，使用属性检查器将`timeLabel`默认设置为隐藏。当用户开始播放时，你将显示它。\n\
  \n在继续之前，花点时间回顾一下你在构建静态图像拍摄界面时如何将捕获的图像转换为图像文件。参考列表 10-13，你会看到在“完成”按钮的处理程序中，你调用了`[AVCaptureImageOutput\
  \ captureStillImageAsynchronouslyFromConnection:completionHandler:]`方法来生成图像文件。操作完成后，你生成了一个`UIImage`对象并将其传递回你的委托对象。\n\
  \n***列表 10-13***. 从视频源捕获图像文件\n\n```\n-(IBAction)finish:(id)sender\n{\n\nAVCaptureConnection\
  \ *connection = [self.stillImageOutput\n        connectionWithMediaType:AVMediaTypeVideo];\n\
  \n[self.stillImageOutput\n        captureStillImageAsynchronouslyFromConnection:connection\n\
          completionHandler:^(CMSampleBufferRef imageDataSampleBuffer,\n            NSError\
  \ *error) {\n\nif (imageDataSampleBuffer != nil) {\n\nNSData *imageData = [AVCaptureStillImageOutput\n\
               jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\nUIImage\
  \ *image = [UIImage imageWithData:imageData];\n\n[self.delegate didFinishWithImage:image];\n\
          } else {\n\nNSLog(@\"error description: %@\", [error description]);\n\n\
  [self.delegate cancel];\n        }\n\n}];\n\n}\n```\n\n对于视频捕获，你希望在按下“录制”按钮时切换录制。与静态图像捕获类似，你需要在类的`AVCaptureOutput`对象上执行此操作，对于视频捕获，该对象是`AVCaptureMovieFileOutput`对象（`AVCaptureMovieFileOutput`是`AVCaptureFileOutput`的子类）。你不再调用一个方法来捕获静态图像，而是开始或停止录制。在`AVCaptureMovieFileOutput`对象上开始和停止录制的方法是`[AVCaptureFileOutput\
  \ startRecordingToOutputFileURL:recordingDelegate:]`和`[AVCaptureFileOutput stopRecording]`。\n\
  \n列表 10-14 展示了切换录制的处理方法，该方法在`CameraViewController.h`文件中被定义为`[CameraViewController\
  \ toggleRecording]`。在这个方法中，你希望基于`AVCaptureOutput`对象的当前状态来开始或停止视频捕获。你可以通过使用`recording`属性查询`AVCaptureMovieFileOutput`对象的录制状态。\n\
  \n***列表 10-14***. 用于切换视频录制的按钮处理程序\n\n```\n-(IBAction)toggleRecording:(id)sender\n\
  {\n    if ([self.movieFileOutput isRecording]) {\n\n\n```objc\nNSArray *paths =\
  \ NSSearchPathForDirectoriesInDomains(\n    NSDocumentDirectory, NSUserDomainMask,\
  \ YES);\nNSString *documentsDirectory = [paths objectAtIndex:0];\nNSString *relativePath\
  \ = [documentsDirectory\n    stringByAppendingPathComponent:@\"movie.mov\"];\n\n\
  NSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n\n[self.movieFileOutput\
  \ startRecordingToOutputFileURL:fileURL\n         recordingDelegate:self];\n} else\
  \ {\n\n[self.movieFileOutput stopRecording];\n}\n}\n```\n\n当开始录制文件时，你需要指定输出文件的 URL\
  \ 以及遵循某个协议的委托对象。`AVCaptureFileOutput` 类定义了 `AVCaptureFileOutputRecordingDelegate`\
  \ 协议，用于回传影片文件的完成消息。因此，请修改 `CameraViewController` 的头文件，标明你将实现该协议：\n\n```objc\n@interface\
  \ CameraViewController : UIViewController\n    <UIActionSheetDelegate, AVCaptureFileOutputRecordingDelegate\
  \ >\n```\n\n在下一节“完成录制”中，你将实现该委托方法以关闭影片文件。\n\n作为用户界面的最后一步，你应在开始录制后更新界面，即隐藏拍摄按钮并显示录制进度。幸运的是，在\
  \ Cocoa Touch 中隐藏界面元素极为简单：只需将 `isHidden` 属性设为 `YES`。将此属性设为 `NO` 则会显示被隐藏的元素。在代码清单\
  \ 10-15 中，我已在录制按钮处理程序中添加了界面更新逻辑。\n\n***代码清单 10-15***：为切换录制按钮添加界面更新\n\n```objc\n\
  -(IBAction)toggleRecording:(id)sender\n{\n    if ([self.movieFileOutput isRecording])\
  \ {\n\nNSArray *paths = NSSearchPathForDirectoriesInDomains(\n        NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSString *relativePath = [documentsDirectory\n        stringByAppendingPathComponent:@\"\
  movie.mov\"];\n\nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n\nself.torchButton.hidden\
  \ = YES;\n        self.focusButton.hidden = YES;\n        self.cameraButton.hidden\
  \ = YES;\n        self.lowLightButton.hidden = YES;\n\nself.timeLabel.hidden = NO;\n\
  \n[self.movieFileOutput startRecordingToOutputFileURL:fileURL\n        recordingDelegate:self];\n\
  \nself.recordingTimer = [NSTimer timerWithTimeInterval:1.0f\n        target:self\
  \ selector:@selector(updateProgress) userInfo:nil\n        repeats:YES];\n     \
  \   self.duration = 0;\n    } else {\n\n[self.movieFileOutput stopRecording];\n\n\
  self.torchButton.hidden = NO;\n        self.focusButton.hidden = NO;\n        self.cameraButton.hidden\
  \ = NO;\n        self.lowLightButton.hidden = NO;\n\nself.timeLabel.hidden = YES;\n\
  \n[self.recordingTimer invalidate];\n      self.duration = 0;\n    }\n}\n```\n\n\
  请注意，除了隐藏或显示界面元素外，录制按钮处理程序还会创建或销毁 `playbackTimer` 对象。与所有定时器一样，要更新状态，你需要使用一个处理程序方法（选择器）重新初始化定时器对象。停止定时器的唯一方法是销毁它。在代码清单\
  \ 10-16 中，你可以找到定时器的选择器方法 `[CameraViewController updateProgress]`，该方法会使用当前录制时长更新\
  \ `timeLabel`。\n\n***代码清单 10-16***：时间更新的选择器方法\n\n```objc\n-(void)updateProgress\n\
  {\n    NSInteger durationMinutes = self.duration / 60;\n    NSInteger durationSeconds\
  \ = self.duration  - durationMinutes * 60;\n    NSString *progressString = [NSString\
  \ stringWithFormat:@\"%d:%02d\",\n        durationMinutes, durationSeconds];\n \
  \   self.timeLabel.text = progressString;\n    self.duration++;\n}\n```\n\n## 完成录制\n\
  \n要完成 MyCustomRecorder 项目，你需要实现完成录制过程的代码。尽管你调用了 `[AVCaptureFileOutput stopRecording]`\
  \ 方法，但仅凭这一调用还不足以生成一个可用 `MPMoviePlayerController` 子类播放的有效影片文件。\n\n由于你没有使用 `UIImagePickerController`\
  \ 类来录制视频，你需要提供自己的视频播放器来预览录制的文件。如图 10-10 所示，该视频播放器将提供有限的播放控制功能，以及让用户接受或拒绝录制视频的按钮。为了实现这些有限的控制，你将复用第\
  \ 9 章中构建的 MyVideoPlayer 项目中的视频播放器。\n\n![9781430250838_Fig10-10.jpg](img/9781430250838_Fig10-10.jpg)\n\
  \n图 10-10。视频预览界面原型\n\n最后，要从 `CameraViewController` 对象返回结果，你需要使用 `CameraDelegate`\
  \ 协议，并修改该协议以处理视频。由于视频文件远大于图片，无法作为参数回传，因此你需要寻找替代方案。\n\n## 保存视频输出\n\n你可能还记得本书之前的讨论，我曾暗示视频文件比图片和音频文件更复杂。与包含单一数据流二进制信息的图片和音频文件不同，视频文件是包含音频和视频数据流的容器。这使得视频文件对有效的文件头和文件尾（用于标识数据终止点）的要求更为严格。再加上压缩视频所需算法（编解码器）的复杂程度更高，你就能理解为什么这一过程如此复杂了。\n\
  \n通过从 `[CameraViewController togglePlayback:]` 方法中调用 `[AVCaptureFileOutput stopRecording]`\
  \ 方法，你指示 `AVCaptureMovieFileOutput` 类启动此过程并关闭文件。文件关闭操作完成后，你的输出对象会调用你在委托（对于 MyCustomRecorder\
  \ 项目而言是 `CameraViewController` 类）上声明的 `[AVCaptureFileOutputRecordingDelegate captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:error:]`\
  \ 方法。\n\n协议的一个关键优势在于，它会严格定义一套将要发送给其委托的消息，包括消息名称和参数类型。`didFinish` 协议消息会回传以下内容：\n\n\
  *   一个 `AVCaptureOutput` 对象，标识已完成的输出对象\n*   一个 `NSURL` 对象，指示已成功（或未成功）关闭的文件的 URL\n\
  *   一个由 `AVCaptureConnection` 对象组成的 `NSArray`，这些对象与该输出的会话相关联\n*   一个 `NSError` 对象，如果文件未能成功关闭，则返回非\
  \ `nil` 值\n\n你可以在代码清单 10-17 中找到 `CameraViewController` 类的实现。\n\n***代码清单 10-17***：CameraViewController\
  \ 类的“输出完成”委托方法\n\n```objc\n-(void)captureOutput:(AVCaptureFileOutput *)captureOutput\n\
  \    didFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL\n    fromConnections:(NSArray\
  \ *)connections error:(NSError *)error\n{\n    if (error != nil)  {\n        NSString\
  \ *errorString = [error description];\n        UIAlertView *alertView = [[UIAlertView\
  \ alloc]\n            initWithTitle:@\"Error\" message:errorString delegate:self\n\
  \            cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n        [alertView\
  \ show];\n\n} else {\n        VideoPlaybackController *playbackVC =\n          \
  \  [[VideoPlaybackController alloc]\n            initWithURL:outputFileURL];\n \
  \       playbackVC.delegate = self;\n\n[self presentViewController:playbackVC animated:YES\n\
  \            completion:^{\n               [playbackVC prepareToPlay];\n       \
  \ }];\n    }\n}\n```\n\n\n该实现使用了 `error` 对象来检查操作是否成功。如果操作失败，它会从 `error` 对象中获取人类可读的\
  \ `description` 字符串，并显示一个警示视图。当操作成功时，它会呈现一个已使用输出文件 URL 初始化的 `VideoPlaybackController`。`VideoPlaybackController`\
  \ 是 `MPMoviePlayerController` 类的自定义子类，你将在本项目中使用它进行视频预览。\n\n**警告** 虽然从 `AVCaptureFileOutputRecordingDelegate`\
  \ 协议返回的输出文件 URL 与用于开始录制的 URL 相同，但你不应在委托方法触发前开始播放，因为直到接收到该消息后文件才有效。\n\n## 显示预览界面\n\
  \n对于你的视频预览界面，你需要显示一个视频播放器，允许用户接受或拒绝他们刚刚录制的视频。虽然你可以直接原样返回录制的视频，但最好在用户返回 MyCustomRecorder\
  \ 应用程序的主界面之前，给他们一个检查录制结果的机会。\n\n对于 `VideoPlaybackController` 类，你需要从你在第 9 章中构建的 MyCustomPlayer\
  \ 项目中获取 `CustomVideoPlayer` 类的基本视频播放功能，并修改其控件以切换播放以及接受或拒绝文件。子类化是一种面向对象编程概念，它允许你继承父类的所有属性和方法，同时仍保留在子类中修改这些属性和方法的能力。继承是一种便捷的方式，可以在不破坏或影响原始类的情况下扩展类的功能。在本例中，你需要创建子类以重用\
  \ `CustomVideoPlayer` 类，用于此应用的**全屏视频播放器**。\n\n首先，将 `CustomVideoPlayer.h` 和 `CustomVideoPlayer.m`\
  \ 文件复制到你的工作目录中，并将它们添加到你的项目中。接下来，从“文件”菜单中选择“新建文件”。如图 10-11 所示，当系统要求你指定文件的父类时，输入 **MyCustomPlayer**——这将导致\
  \ Xcode 自动为你创建子类模板。\n\n![9781430250838_Fig10-11.jpg](img/9781430250838_Fig10-11.jpg)\n\
  \n图 10-11. 在 Xcode 中为新建文件指定父类\n\n接下来，你需要为视频播放器创建故事板。这个新播放界面与你为 MyCustomPlayer 项目创建的界面的主要区别在于，导航栏中不再有“完成”按钮，取而代之的是“接受”和“拒绝”按钮，两者都用于完成视频处理过程。参照图\
  \ 10-12，添加一个用于视频输出的图层和一个用于控制播放的按钮。将此视图控制器嵌入到导航控制器中，以便添加你的按钮。\n\n![9781430250838_Fig10-12.jpg](img/9781430250838_Fig10-12.jpg)\n\
  \n图 10-12. 视频播放器的故事板\n\n`VideoPlaybackController` 类的头文件在代码清单 10-18 中。与其他项目一样，记得将你的按钮处理程序和属性与故事板绑定。\n\
  \n***代码清单 10-18***. VideoPlaybackController 类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface VideoPlaybackController : MyCustomPlayer\n\n@property (nonatomic, strong)\
  \ IBOutlet *const;\n\n-(IBAction)accept:(id)sender;\n-(IBAction)reject:(id)sender;\n\
  \n@end\n\n@protocol CustomPlayerDelegate <NSObject>\n\n-(void)didFinishWithSuccess:(BOOL)success;\n\
  \n@end\n```\n\n由于你正在创建 `CustomVideoPlayer` 类的子类，因此无需重新实现视频播放功能。只需将你的按钮绑定到你在 `CustomVideoPlayer`\
  \ 类中定义的 `togglePlayback` 按钮处理程序即可（父类中的方法在 Interface Builder 中显示，就像你在自己的类中定义它们一样）。对于视频录制过程，你需要重点关注“接受”和“拒绝”功能。\n\
  \n当用户决定接受刚录制的视频时，你应遵循与 `UIImagePickerController` 相同的工作流程，将用户返回到主用户界面。在此过程中，你需要保存文件并关闭视频预览和捕获界面。`VideoPlaybackController`\
  \ 类的“接受”按钮处理程序如代码清单 10-19 所示。\n\n***代码清单 10-19***. VideoPlaybackController 的“接受”按钮处理程序\n\
  \n```\n-(IBAction)accept:(id)sender\n{\n    [self.mediaPlayer stop];\n    [self.delegate\
  \ didFinishWithSuccess:YES];\n}\n```\n\n此按钮处理程序非常简短——它所做的只是停止播放器并调用 `[CustomPlayerDelegate\
  \ didFinishWithSuccess:]` 方法。`[ViewController dismissViewController:animated:]`\
  \ 方法一次只能关闭一个模态控制器。要同时关闭 `VideoPlaybackController` 和 `CameraViewController`，你需要对呈现它们的视图控制器分别执行关闭操作。`CameraViewController`\
  \ 是由 `MainViewController` 呈现的，因此你需要通过 `CameraDelegate` 协议将其关闭。类似地，`VideoPlaybackController`\
  \ 是由 `CameraViewController` 呈现的，因此你需要通过 `CustomPlayerDelegate` 协议将其关闭。\n\n“拒绝”按钮处理程序同样简单直接。你只需要关闭播放控制器并重置视频录制界面即可。作为重置过程的一部分，你应该删除当前的影片文件。代码清单\
  \ 10-20 展示了“拒绝”按钮处理程序方法。\n\n***代码清单 10-20***. VideoPlaybackController 的“拒绝”按钮处理程序\n\
  \n```\n-(IBAction)reject:(id)sender\n{\n    [self.mediaPlayer stop];\n    [self.delegate\
  \ didFinishWithSuccess:NO];\n}\n```\n\n你可能对 `[CustomPlayerDelegate didFinishWithSuccess:]`\
  \ 方法的实现感到好奇。在你的 `CameraViewController` 类中，如果 `success` 参数设置为 `YES`，则表明用户想要接受视频，因此你可以关闭代表播放器的模态视图控制器，并在你的相机委托对象上调用\
  \ `[CameraDelegate didFinishWithURL:]`。如果 `success` 参数设置为 `NO`，则表示用户想要拒绝视频。`CameraViewController`\
  \ 类的完整 `[CustomPlayerDelegate didFinishWithSuccess:]` 方法如代码清单 10-21 所示。\n\n***代码清单\
  \ 10-21***. CameraViewController 类的“播放完成”委托方法\n\n```\n-(void)didFinishWithSuccess:(BOOL)success\n\
  {\n    NSURL *outputUrl = [self.movieFileOutput outputFileURL];\n\nif (success)\
  \ {\n\n[self.delegate didFinishWithUrl:outputUrl];\n\n[self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\n} else {\n\n[self dismissViewControllerAnimated:YES completion:^{\n\
  \            //删除旧影片文件\n\n[[NSFileManager defaultManager]\n                 removeItemAtPath:[outputUrl\
  \ path] error:NULL];\n\n}];\n\n}\n}\n```\n\n接下来，你将进一步了解 `[CameraDelegate didFinishWithURL:]`\
  \ 方法，该消息允许你传回一个视频，而非图像。\n\n## 为视频修改你的协议\n\n\n\n为了完成录制过程，你需要修改 `CameraDelegate` 协议，添加一个允许传回视频的选项。查看代码清单\
  \ 10-22 中静态图片的实现，你可以看到指定了一个 `[CameraDelegate didFinishWithImage:]` 方法，它将捕获的图像作为\
  \ `UIImage` 对象返回。\n\n***代码清单 10-22***. 静态图片的 `CameraDelegate` 协议声明\n\n```\n@protocol\
  \ CameraDelegate <NSObject>\n\n-(void)cancel;\n-(void)didFinishWithImage:(UIImage\
  \ *)image;\n\n@end\n```\n\n虽然这种消息传递技术适用于静态图片（最多几兆字节），但视频文件可能轻易达到数百兆字节。为了有效地传回视频，你应该返回由\
  \ `AVCaptureMovieFileOutput` 生成的电影文件的 URL。代码清单 10-23 包含了 `CameraDelegate` 协议的修改后声明。用于返回视频的方法被命名为\
  \ `[CameraDelegate didFinishWithURL:]`。\n\n***代码清单 10-23***. 视频的 `CameraDelegate`\
  \ 协议声明\n\n```\n@protocol CameraDelegate <NSObject>\n\n-(void)cancel;\n-(void)didFinishWithUrl:(NSURL\
  \ *)url;\n\n@end\n```\n\n**注意** 切记，仅在 `AVCaptureFileOutputRecordingDelegate` 完成后才展示播放界面。这样，你才能确保视频文件是有效的。\n\
  \n与所有其他协议一样，你需要在被设置为代理的类中实现 `[CameraDelegate didFinishWithURL:]` 方法。对于 `MyCustomRecorder`\
  \ 项目，这是 `MainViewController`。你只需在实现中关闭视频捕获界面并显示一个成功提示视图即可。因为你在创建 `AVCaptureMovieFileOutput`\
  \ 对象时，指定了一个位于应用程序文档目录中的输出 URL，所以无需执行额外工作来保存视频文件。`MainViewController` 类的最终实现在代码清单\
  \ 10-24 中。\n\n***代码清单 10-24***. `MainViewController` 类的“完成录制并获取 URL”实现\n\n```\n\
  -(void)didFinishWithSuccess:(BOOL)success\n{\n    NSURL *outputUrl = [self.movieFileOutput\
  \ outputFileURL];\n\nif (success) {\n\n[self.delegate didFinishWithUrl:outputUrl];\n\
  \n[self dismissViewControllerAnimated:YES completion:nil];\n\n} else {\n\n[self\
  \ dismissViewControllerAnimated:YES completion:^{\n            //delete old movie\
  \ file\n\n[[NSFileManager defaultManager]\n                removeItemAtPath:[outputUrl\
  \ path] error:NULL];\n\n}];\n\n}\n}\n```\n\n## 总结\n\n在本章中，你了解了如何基于 `AVFoundation`\
  \ 框架的图像捕获类构建自定义视频录制界面。为了节省时间，你复用了第 4 章中的 `CameraViewController` 类用于基础捕获界面，以及第 9\
  \ 章中的 `CustomPlayer` 类用于自定义视频播放界面。\n\n值得注意的是，你能够复用你在第 4 章中构建的静态图片捕获项目的大部分代码，仅做了少量更改来处理电影文件输出并启用视频特定的捕获设置。为了模拟\
  \ `UIImagePickerController` 的预览界面，你向 `CustomPlayer` 类添加了“接受”和“拒绝”控件。最后，为了适应视频文件较大的体积，你向\
  \ `CameraDelegate` 协议添加了一个“完成录制并获取 URL”的方法。\n\n正如本书中许多其他项目的模式一样，这个自定义视频录制项目主要是一项修改现有代码以满足新用例的练习。当你继续作为媒体应用开发者（以及广义上的工程师）时，你会发现许多其他概念与你已知的内容有大量重叠。关键是要保持开放的心态，并利用你认识到的常见模式。\n\
  \n# 第四部分\n\niOS 8 及更高版本\n\n## 第 11 章\n\n使用 Xcode 6 进行用户界面开发\n\n当我刚开始进行 iOS 开发时，我与\
  \ Xcode 和 Interface Builder 的关系非常复杂。我可以进行布局，但它们无法按我想要的方式连接，或者我会遇到无法调试的奇怪崩溃。通过大量的努力（以及\
  \ Storyboard 的发布），我的挫败感开始消退，iOS 用户界面开发开始变得更加自然。幸运的是，随着 Xcode 6 的发布，Apple 通过使构建和调试用户界面变得更加容易，持续改进了开发过程。\n\
  \n在本章中，你将了解如何通过自适应用户界面来加速你的用户界面开发，如何将 Quick Look 实时视图调试添加到你的任何类中，以及如何使你自己的类与 Interface\
  \ Builder 的属性检查器完全兼容。这些新增功能通过减少查看“当前”情况所需的步骤，以及通过与以前仅限于 Apple 创建的类的功能集成，帮助你更快地进行开发。\n\
  \n**注意** 本章涵盖的主题仅在 Xcode 6 及更高版本（配合 iOS 8.0 SDK）中可用。\n\n## 使用 Size Classes 构建自适应用户界面\n\
  \n在 iOS 存在的头几年，它仅限于所有都配备 3.5 英寸屏幕的 iPhone。随后，设备交付选项迅速增长，包括了 10 英寸的 iPad、8 英寸的 iPad\
  \ Mini、4 英寸的 Retina iPhone、4.7 英寸的 iPhone，以及现在（随着 iPhone 6 Plus 的推出），5.5 英寸的 iPhone。当开发者只需要支持两种屏幕尺寸时，他们倾向于使用\
  \ `#ifdef` 语句和单独的 Interface Builder 文件来管理这两个用户界面。然而，当 Apple 开始推出具有更高像素密度（iPhone\
  \ 4）和新宽高比（iPhone 5）的设备时，这种方法就失效了。为了帮助应对不断变化的显示需求，Apple 在 Xcode 5 中引入了*自动布局*和*资源目录*。为了为未来的设备铺平道路，Apple\
  \ 在 Xcode 6 中引入了一种用于用户界面开发的设计方法，称为*自适应用户界面*。\n\nApple 使用自适应用户界面的目标是让你构建一个能在所有设备上运行的\
  \ Storyboard。为了实现这个目标，Apple 向 iOS 8 引入了*Size Classes*的概念：一种超越“iPhone 模式”和“iPad 模式”来思考布局的新方式。iOS\
  \ 中的 Size Classes 鼓励你根据视图可用的空间来概念化用户界面，而不是根据特定的目标设备（如手机或平板电脑）。为了确保平滑过渡，Apple 将对此概念的支持构建到了\
  \ Interface Builder 的各个方面——包括新的约束类型、新的自动布局预览界面以及新的模拟器（*可调整大小的模拟器*）。为了帮助你以编程方式实现此功能，Apple\
  \ 还引入了 `UITraitCollection` 类，它将 Size Classes 和屏幕密度（例如，Retina）结合在一起，作为检测设备类型的 `UIInterfaceIdiom`\
  \ 宏的强大替代方案。\n\n本节重点介绍如何使用 Size Classes 构建自适应 Storyboard。你可以通过查看 Apple 的自适应用户界面门户网站（`https://developer.apple.com/design/adaptivity/`）来了解更多关于\
  \ `UITraitCollection` 类的信息。\n\n如图 11-1 所示，如果你要比较 iOS 中用户界面的四种主要布局类型，结果将是 iPhone\
  \ 竖屏模式、iPhone 横屏模式、iPad 竖屏模式和 iPad 横屏模式。\n\n![9781430250838_Fig11-01.jpg](img/9781430250838_Fig11-01.jpg)\n\
  \n图 11-1. iOS 设备的主要布局\n\n\n在自适应用户界面中，尺寸通过`vertical`尺寸类别和`horizontal`尺寸类别来表示。这些尺寸类别的幅度由你针对的屏幕类别决定：`compact`用于手机或`regular`用于平板。\n\
  \n如果你将屏幕重叠在一起，会注意到另一个有趣的模式，如图 11-2 所示。这些屏幕大致形成一个 3×3 的网格，宽度构成 x 轴，高度构成 y 轴。\n\n\
  ![9781430250838_Fig11-02.jpg](img/9781430250838_Fig11-02.jpg)\n\n图 11-2. 屏幕尺寸的并置\n\
  \n尽管`compact`尺寸类别的属性很好地包含在`regular`尺寸类别内，但你可以看到还有扩展空间。因此，苹果提供了`any`尺寸类别，旨在作为用户界面的默认尺寸类别。你应该尝试将`any`尺寸类别中的项目缩小以适配`compact`尺寸类别，或者增大其尺寸/内边距以适配`regular`尺寸类别。\n\
  \n通过将它们放入 3×3 网格，按方向和增大尺寸排列，可以很好地可视化尺寸类别的可能组合，如图 11-3 所示。\n\n![9781430250838_Fig11-03.jpg](img/9781430250838_Fig11-03.jpg)\n\
  \n图 11-3. 尺寸类别的 3×3 网格\n\n围绕与你目标设备对应的组合框画一条线，你就会了解需要使用的尺寸类别以优化布局。对于横屏模式的 iPad，你会使用`regular\
  \ horizontal`尺寸类别和`any vertical`尺寸类别，如图 11-4 所示。\n\n![9781430250838_Fig11-04.jpg](img/9781430250838_Fig11-04.jpg)\n\
  \n图 11-4. 横屏模式 iPad 的尺寸类别组合\n\nInterface Builder 允许你通过属性检查器中的“尺寸类别”选项（可启用或禁用尺寸类别）和新的自动布局预览切换视图（可在故事板的特定尺寸类别版本之间切换），无缝地将尺寸类别集成到故事板中。\n\
  \n你可以通过选择文件检查器（Interface Builder 最右侧窗格的第一个选项卡）来切换故事板的尺寸类别设置，如图 11-5 所示。如果你在 Xcode\
  \ 6 或更高版本中创建项目，故事板已经选中了“使用尺寸类别”复选框；否则，你需要手动选择它。\n\n![9781430250838_Fig11-05.jpg](img/9781430250838_Fig11-05.jpg)\n\
  \n图 11-5. 为故事板启用尺寸类别\n\n第一次在故事板中使用尺寸类别时，结果会相当令人震惊。如图 11-6 所示，默认的故事板预览将是方形的，对应于`any`×`any`的尺寸类别组合。故事板所选组合的名称显示在\
  \ Interface Builder 底部窗格的中心，在图 11-6 中以红色标出。\n\n![9781430250838_Fig11-06.jpg](img/9781430250838_Fig11-06.jpg)\n\
  \n图 11-6. 默认故事板和尺寸类别组合\n\n点击此标签会弹出一个尺寸选择器，位于弹出窗口内，如图 11-7 所示。此选择器使用与图 11-1 相同的尺寸类别组合表。使用相同的“追踪”组合逻辑，为你的设备选择适当的组合。\n\
  \n![9781430250838_Fig11-07.jpg](img/9781430250838_Fig11-07.jpg)\n\n图 11-7. 故事板布局选择器\n\
  \n在 Xcode 6 中，你不再被迫为每个版本的界面使用相同的自动布局约束集。切换布局后，所有约束和位置更改将仅应用于该布局。利用这一点，创建最适合你设备尺寸的布局。\n\
  \n如果你计划使用自动布局约束来定位项目（例如将项目保持在屏幕中央），请使用`any`×`any`布局作为基础，并在其他布局（例如`compact`×`regular`）中覆盖你的选择。\n\
  \n## 使用 Quick Look 进行运行时预览\n\n自第 5 版以来，苹果在 Xcode 中提供了一个名为 Quick Look 的功能。此功能允许你在调试期间将鼠标悬停在对象上以查看内容的预览，如图\
  \ 11-8 所示。为此，你需要使用一个与 Quick Look 兼容的对象。在 Xcode 6 之前，苹果提供了一组有限的类（例如`UIView`、`NSString`、`CLLocation`）；然而，从\
  \ Xcode 6 开始，你可以通过实现`[NSObject debugQuickLookObject]`方法将 Quick Look 扩展到任何类。\n\n\
  ![9781430250838_Fig11-08.jpg](img/9781430250838_Fig11-08.jpg)\n\n图 11-8. 对象的 Quick\
  \ Look 详细信息\n\n表 11-1 列出了默认的 Quick Look 兼容类及其输出。在构建 Quick Look 实现时，你需要使用这些类之一来显示调试信息。\n\
  \n表 11-1. Quick Look 兼容类\n\n| 类 | 预览类型 |\n| --- | --- |\n| `UIView` | 视图及其所有子视图的快照\
  \ |\n| `CLLocation` | 显示`CLLocation`对象元数据的地图和图例 |\n| `NSString` | 字符串的纯文本打印输出 |\n\
  | `NSAttributedString` | 字符串的打印输出，包括所有格式（例如颜色或粗体） |\n| `UIColor` | 包含所选颜色的色板 |\n\
  | `UIImage` | 图像的预览 |\n| `NSURL` | 指定 URL 处内容的预览 |\n| `NSData` | 数据二进制内容的打印输出 |\n\
  \n要访问 Quick Look，必须使用调试会话。在命中断点且执行暂停后，你可以通过将鼠标悬停在当前作用域（通常是调试器暂停的方法）中的任何兼容对象上来调出\
  \ Quick Look 面板。单击眼形按钮（如图 11-9 所示）会调出 Quick Look 视图，其中包含对象的更多详细信息。\n\n![9781430250838_Fig11-09.jpg](img/9781430250838_Fig11-09.jpg)\n\
  \n图 11-9. 显示 Quick Look 详细信息窗格\n\n要在应用程序中启用 Quick Look，你需要在自定义类中实现`[NSObject debugQuickLookObject]`方法。回顾模型-视图-控制器设计模式，大多数需要实现\
  \ Quick Look 的类将是*模型*（表示数据）或*视图*（表示元素的视觉布局）。\n\n为了帮助说明这个主题，我创建了一个名为`CustomPhoto`的模型类，它表示一个图像及其关联的元数据信息，类似于`ALAsset`类。你可以在源代码包的第\
  \ 11 章文件夹下的 QuickLookSample 项目中找到此示例代码。列表 11-1 显示了`CustomPhoto`类的头文件。\n\n***列表 11-1***.\
  \ CustomPhoto 类的头文件\n\n```\n#import <Foundation/Foundation.h>\n#import <UIKit/UIKit.h>\n\
  \n@interface CustomPhoto : NSObject\n\n@property (nonatomic, strong) UIImage *image;\n\
  @property (nonatomic, strong) NSString *title;\n@property (nonatomic, strong) NSString\
  \ *location;\n\n@end\n```\n\n\n很自然地，开发者会希望在调试`CustomPhoto`对象时，能够预览图片并检查元数据属性。由于只能从`[NSObject\
  \ debugQuickLookObject]`方法返回一个对象，因此你需要选择一个能够容纳所有对象输出的类。\n\n在`QuickLookSample`项目中，我选择创建一个`UIView`。Quick\
  \ Look 可以在其预览面板中完整地绘制一个视图，因此向容器`UIView`添加子视图是一种同时显示多个项目的好方法。如图 11-10 所示，在本例中，我打算在`UIImageView`中显示图片，并在`UILabel`中显示元数据属性。\n\
  \n![9781430250838_Fig11-10.jpg](img/9781430250838_Fig11-10.jpg)\n\n图 11-10. Quick\
  \ Look 输出的模拟示意图\n\n为 Quick Look 构建`UIView`最简单的方法是以编程方式创建并定位所有子视图。Quick Look 不接受`UIViewController`子类作为输入，因此使用\
  \ Storyboard 或 XIB 文件来布局用户界面并不高效。虽然手动定位子视图比较麻烦，但这里有一些关于`CGRect`的技巧，可以帮助你更快地构建子视图：\n\
  \n*   使用相邻的子视图作为定位参考。例如，要将两个元素放在相同的 y 坐标位置，可以在第一个视图的 `frame` 上使用`CGRectMinY()`便捷方法。\n\
  *   创建`UILabel`对象时，可以通过 `font` 属性更改字体。`[UIFont systemFontWithSize:]`方法允许你为字体指定像素高度，这在尝试确定标签高度时可以作为有用的参考。例如，一个\
  \ 20 磅的字体，上下各留 5 像素的内边距即可——这意味着你应该指定 30 像素的高度。\n*   创建`UILabel`时，文本的默认裁剪行为是截断中间字符。你可以通过将\
  \ `adjustsFontSizeToFitWidth` 属性设置为 `YES`，让文本收缩以适合`UILabel`。\n\n代码清单 11-2 展示了创建`UIView`的代码。除了视图定位代码之外，你还会看到我为每个属性设置了默认值。因为你正在构建一个调试视图，所以当输入未设置或无效时，需要非常清楚地向用户表明。\n\
  \n***代码清单 11-2***. 为 `CustomPhoto` 类启用 Quick Look\n\n```\n-(id)debugQuickLookObject\
  \ {\n    UIView *quickLookView = [[UIView alloc] initWithFrame:CGRectMake(\n   \
  \     0, 0, 400, 400)];\n\nUIImageView *imageView = [[UIImageView alloc]\n     \
  \   initWithFrame:quickLookView.frame];\n\nimageView.image = (self.image == nil)\
  \ ?\n        [UIImage imageNamed:@\"placeholder.jpg\"]:\n        imageView.image\
  \ = self.image;\n\nCGFloat originX = CGRectGetMinX(quickLookView.frame) + 10;\n\
  \    CGFloat originY = CGRectGetMaxY(quickLookView.frame) - 40;\n    CGFloat width\
  \ = quickLookView.frame.size.width;\n\nCGRect titleLabelFrame = CGRectMake(originX,\
  \ originY, width, 20);\n    CGRect locationLabelFrame = CGRectMake(originX, originY\
  \ + 20,\n        width, 20);\n\nUILabel *titleLabel = [[UILabel alloc] initWithFrame:titleLabelFrame];\n\
  \    UILabel *locationLabel = [[UILabel alloc]\n        initWithFrame:locationLabelFrame];\n\
  \ntitleLabel.text = (self.title == nil) ? @\"No title\" : self.title;\n    locationLabel.text\
  \ = (self.location == nil) ? @\"No location\" :\n        self.location;\n\n[quickLookView\
  \ addSubview:imageView];\n    [quickLookView addSubview:titleLabel];\n    [quickLookView\
  \ addSubview:locationLabel];\n\nreturn quickLookView;\n}\n```\n\n上述方法的输出应类似于图 11-11\
  \ 中的示例。\n\n![9781430250838_Fig11-11.jpg](img/9781430250838_Fig11-11.jpg)\n\n图 11-11.\
  \ `CustomPhoto`类的 Quick Look 输出\n\n\n```markdown\n作为`UIView`的替代方案，你可以使用`NSAttributedString`对象来构建输出。富文本字符串通过允许你指定格式（如颜色和粗体文本）以及其他输入方法，扩展了`NSString`类。例如，你可以直接使用`NSAttributedString`渲染\
  \ HTML。\n\n## 向类中添加 Interface Builder 预览\n\n延续改进用户界面可视化调试的主题，Xcode 6 现在允许你在 Interface\
  \ Builder 中预览和配置你自己的`UIView`子类。此外，Interface Builder 现在提供了一个名为*Debug Selected View*的功能，允许你在不运行应用程序的情况下调试视图。\n\
  \n与 Quick Look 一样，Apple 历史上在其自己的`UIView`子类（如`UILabel`和`UIButton`）中支持 Interface Builder\
  \ 内的预览和配置。参考 Figure 11-12，你可以看到`UIButton`会改变其外观以反映用户在属性检查器中输入的属性更改。通过 Xcode 6，你现在可以通过添加`IB_DESIGNABLE`属性，为你的`UIView`子类启用相同的功能。\n\
  \n![9781430250838_Fig11-12.jpg](img/9781430250838_Fig11-12.jpg)\n\nFigure 11-12.\
  \ 属性检查器和 UIButton 的预览\n\n为了演示此功能，你将创建一个单视图应用程序，该应用程序显示`CustomPhoto`类的内容，并在名为`CustomPhotoView`的`UIView`子类中展示。你可以在源代码包的\
  \ Chapter 11 文件夹中找到这个`IBSample`项目的代码。\n\n对于`CustomPhotoView`类，你将显示一个`UIImage`和两个`UILabel`对象，它们代表`CustomPhoto`中的元数据字段，如\
  \ Figure 11-13 所示。为了帮助调试，你希望让开发人员在 Interface Builder 中看到这些子视图的实时预览。\n\n![9781430250838_Fig11-13.jpg](img/9781430250838_Fig11-13.jpg)\n\
  \nFigure 11-13. `CustomPhotoView`类的模型图\n\n首先，创建`CustomPhotoView`类作为`UIView`的子视图。添加属性以表示模型图中的子视图，如代码清单\
  \ 11-3 所示。\n\n***代码清单 11-3***. `CustomPhotoView`类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  \nIB_DESIGNABLE\n\n@interface CustomPhotoView : UIView\n\n@property (nonatomic)\
  \ UILabel *titleLabel;\n@property (nonatomic) UILabel *locationLabel;\n@property\
  \ (nonatomic) UIImageView *imageView;\n\n@end\n```\n\n要为你的视图启用 Interface Builder\
  \ 预览，请将`IB_DESIGNABLE`属性添加到类的`@interface`声明之前的行。Objective-C 中的*attribute*是一种编译器指令（类似于*macro*），它允许你将预定义的行为附加到变量声明上。定义实例变量时使用的`nonatomic`属性指示编译器自动为该对象创建\
  \ getter 和 setter 方法。修改后的头文件应类似于代码清单 11-4 中的示例。\n\n***代码清单 11-4***. `CustomPhotoView`类的`IB_DESIGNABLE`兼容头文件\n\
  \n```\n#import <UIKit/UIKit.h>\n\nIB_DESIGNABLE\n\n@interface CustomPhotoView :\
  \ UIView\n\n@property (nonatomic) UILabel *titleLabel;\n@property (nonatomic) UILabel\
  \ *locationLabel;\n@property (nonatomic) UIImageView *imageView;\n\n@end\n```\n\n\
  要可视化`CustomPhotoView`类，你需要将其添加到你的故事板中。选择项目的`Main.storyboard`文件，并将一个视图对象拖到视图控制器场景上。使用身份检查器（Interface\
  \ Builder 中的第三个选项卡）将该视图关联到`CustomPhotoView`类，如 Figure 11-14 所示。为了更容易看到视图，请使用属性检查器为其赋予一个非白色的背景颜色。\n\
  \n![9781430250838_Fig11-14.jpg](img/9781430250838_Fig11-14.jpg)\n\nFigure 11-14.\
  \ 在身份检查器中设置类名称\n\n为了充分利用 Interface Builder 预览，你需要以编程方式布局你的视图（类似于 Quick Look）。通常，要以编程方式布局视图，你会使用`[UIView\
  \ initWithFrame:]`构造方法。不幸的是，由于预览本质上是动态的，并且核心功能基于子视图构建，因此你需要使用一个每当视图被指示重新加载其子视图时都会调用的方法。由于这种设计限制，最佳的方法是使用`[UIView\
  \ layoutSubviews]`。\n\n**注意**：如果你有任何用于在`UIView`中绘制元素的代码（例如添加边框），请将其放在`[UIView drawRect]`方法中。\n\
  \n在你的`[UIView layoutSubviews]`方法中，添加子视图的初始化代码。`UIImageView`应填满`UIView`的整个可见区域（意味着它应使用相同的框架），而`UILabel`应位于视图的底部。与\
  \ Quick Look 示例类似，使用相邻的框架来定位元素。使用示例数据初始化子视图后，结果应类似于代码清单 11-5。\n\n***代码清单 11-5***.\
  \ 初始化`CustomPhotoView`类\n\n```\n-(void)layoutSubviews\n{\n    [super layoutSubviews];\n\
  \n    CGFloat padding = 10.0f;\n    CGFloat labelHeight = 20.0f;\n    CGFloat viewWidth\
  \ = self.frame.size.width;\n    CGFloat viewHeight = self.frame.size.height;\n\n\
  \    CGRect insideFrame = CGRectMake(padding, padding,\n        viewWidth - padding\
  \ * 2, viewHeight - padding * 2);\n    CGRect label1Frame = CGRectMake(padding,\n\
  \        CGRectGetMaxY(insideFrame) - 40, viewWidth, labelHeight);\n    CGRect label2Frame\
  \ = CGRectMake(padding,\n        CGRectGetMinY(label1Frame) + 20,  viewWidth, labelHeight);\n\
  \n    self.imageView = [[UIImageView alloc] initWithFrame:insideFrame];\n    [self\
  \ addSubview:self.imageView];\n\n    self.titleLabel = [[UILabel alloc] initWithFrame:label1Frame];\n\
  \    [self addSubview:self.titleLabel];\n    self.titleLabel.text = @\"No title\"\
  ;\n\n    self.locationLabel = [[UILabel alloc] initWithFrame:label2Frame];\n   \
  \ [self addSubview:self.locationLabel];\n    self.locationLabel.text = @\"No location\"\
  ;\n}\n```\n\n要在 Interface Builder 中预览`CustomPhotoView`，请选择你的故事板文件。你应该能够在视图中看到占位符文本，如\
  \ Figure 11-15 所示。不幸的是，你还需要再做一点工作才能预览图像。\n\n![9781430250838_Fig11-15.jpg](img/9781430250838_Fig11-15.jpg)\n\
  \nFigure 11-15. 预览`CustomPhotoView`类\n\n尽管看到占位符文本令人兴奋，但对于开发人员来说，能够从 Interface Builder\
  \ 内部实时更改图像和文本并查看结果则更为激动人心（也更有用）。Xcode 6 允许你通过`IBInspectable`属性，将有限的类集合作为可编辑属性暴露在\
  \ Interface Builder 中。此属性的工作方式与`IBOutlet`属性非常相似：将必要的代码添加到你的声明中，可以使该属性出现在 Interface\
  \ Builder 中。你可以在表 11-2 中找到支持的类列表。\n\n表 11-2. `IBInspectable`兼容的类\n\n| 类 | 用途 |\n\
  | --- | --- |\n| `UIImage` | 允许你从应用包或素材目录中选择图像 |\n| `UIColor` | 允许你通过 OS X 颜色选择器选择颜色\
  \ |\n| `NSString` | 允许你输入字符串 |\n| `NSInteger` | 允许你输入整数值 |\n| `CGFloat` | 允许你输入浮点数值\
  \ |\n| `CGRect` | 允许你输入四个浮点数值，分别对应框架的 x、y、宽度和高度 |\n```\n\n\n为了创建`IBInspectable`兼容的对象，向`CustomPhotoView`类添加代表`CustomPhoto`类中`image`、`title`和`location`属性的属性，如清单\
  \ 11-6 所示。\n\n***清单 11-6***. 向`CustomPhotoView`类添加`IBInspectable`属性\n\n```objective-c\n\
  #import <UIKit/UIKit.h>\n\nIB_DESIGNABLE\n\n@interface CustomPhotoView : UIView\n\
  \n@property (nonatomic) UILabel *titleLabel;\n@property (nonatomic, strong) IBInspectable\
  \ NSString *titleText;\n@property (nonatomic) UILabel *locationLabel;\n@property\
  \ (nonatomic, strong) IBInspectable NSString *locationText;\n\n@property (nonatomic)\
  \ UIImageView *imageView;\n@property (nonatomic, strong) IBInspectable UIImage *titleImage;\n\
  \n@end\n```\n\n要验证 Interface Builder 是否识别了您的属性，请在故事板中选择您的视图。在“属性检查器”顶部，您将看到包含您属性的部分，如图\
  \ 11-16 所示。\n\n![9781430250838_Fig11-16.jpg](img/9781430250838_Fig11-16.jpg)\n\n\
  图 11-16. 在 Interface Builder 中查看`IBInspectable`属性\n\n要使输入影响预览，您需要将这些属性连接到`[UIView\
  \ layoutSubviews]`方法中的子视图。如清单 11-7 所示，通过将占位值替换为对`IBInspectable`兼容属性的引用，您可以为属性启用实时预览。\n\
  \n***清单 11-7***. 添加实时更新\n\n```objectivec\n-(void)layoutSubviews\n{\n    [super layoutSubviews];\n\
  \n...\n\nself.imageView = [[UIImageView alloc] initWithFrame:insideFrame];\n   \
  \ self.imageView.image = self.titleImage;\n\n[self addSubview:self.imageView];\n\
  \nself.titleLabel = [[UILabel alloc] initWithFrame:label1Frame];\n    self.titleLabel.text\
  \ = self.titleText;\n    [self addSubview:self.titleLabel];\n\nself.locationLabel\
  \ = [[UILabel alloc] initWithFrame:label2Frame];\n    self.locationLabel.text =\
  \ self.locationText;\n    [self addSubview:self.locationLabel];\n\n}\n```\n\n现在，您可以从\
  \ Interface Builder 内为属性选择新值。一旦您完成输入（或从下拉菜单中选择一个选项），故事板将反映您的更改。\n\n## 使用 Interface\
  \ Builder 调试视图\n\n在 Interface Builder 中查看实时预览可以大大加快视图调试，但如果您在屏幕上放置元素时遇到问题，这并没有帮助。为满足此需求，Xcode\
  \ 6 为界面开发者引入了一种新的调试模式：**Debug Selected Views**。此功能允许您设置断点并逐步执行视图初始化代码，而无需运行您的应用程序。\n\
  \n您没看错：**Debug Selected Views**功能让您无需启动应用程序的调试会话，即可执行调试会话的所有功能（断点、单步执行代码以及使用 LLDB\
  \ 调试控制台）。如果您曾经尝试调试`UITableViewController`，您一定非常熟悉这个过程是多么困难——过滤数据源中每个`UITableViewCell`的消息有时会使您偏离最初的目标。\n\
  \n使用**Debug Selected Views**功能无需额外设置。只需在 Interface Builder 中选择一个`IB_DESIGNABLE`兼容的`UIView`子类，然后从“Editor”菜单中选择**Debug\
  \ Selected Views**选项，如图 11-17 所示。\n\n![9781430250838_Fig11-17.jpg](img/9781430250838_Fig11-17.jpg)\n\
  \n图 11-17. 启用 Debug Selected Views\n\n确保您在`UIView`子类中设置了断点；否则调试器将没有内容可检查。当调试器命中断点时，您将看到熟悉的\
  \ LLDB 调试界面，如图 11-18 所示。您可以使用这些额外的面板来检查堆栈、设置额外断点，甚至向 LLDB 调试器发送指令。\n\n![9781430250838_Fig11-18.jpg](img/9781430250838_Fig11-18.jpg)\n\
  \n图 11-18. 调试界面\n\n与普通调试会话不同，视图调试不会启动 iOS 模拟器。要调试您的视图，请在 Xcode 的单独标签页或作为伴随视图（维恩图图标）中打开\
  \ Interface Builder。因为您已经为类启用了`IB_DESIGNABLE`属性，所以在逐步执行代码时，您可以在 Interface Builder\
  \ 中查看实时预览。\n\n## 总结\n\n在本章中，您探索了 Xcode 6 中可以帮助您更快、更智能地构建和调试用户界面的几项新功能。首先，Size Classes\
  \ 可以帮助您构建一个可在所有设备上使用的单一故事板。接着，您了解了如何向任何类添加 Quick Look 兼容输出，使您能够在 Xcode 调试界面中查看类的快照。最后，为了帮助您创建可重用的用户界面元素，您了解了如何使用`IB_DESIGNABLE`属性向任何`UIView`子类添加\
  \ Interface Builder 兼容性。任何集成开发环境的目标都应是加速您的工作流程。所有这些功能无疑有助于实现这一目标，为您提供了比不断重启调试会话更好的调试用户界面的方法。\n\
  \n# 第 12 章 使用 AVKit 框架进行媒体播放\n\n尽管 iOS 7 给 Apple 移动应用世界带来了设计理念上的巨大转变，但 iOS 8 承诺通过强调新功能和对旧功能的精简，再次推动移动应用开发。这些变化延伸到了媒体播放领域，引入了另一个媒体播放框架——`AVKit`！\n\
  \n`AVKit`框架旨在成为`MediaPlayer`框架媒体播放功能的直接替代品。如图 12-1 所示，该框架通过`AVPlayerViewController`类提供的播放界面，与您在本书中一直使用的`MPMediaPlayerController`类提供的界面几乎完全相同。\n\
  \n![9781430250838_Fig12-01.jpg](img/9781430250838_Fig12-01.jpg)\n\n图 12-1. 熟悉的`MPMoviePlayerController`播放界面与新`AVPlayerController`播放界面的对比\n\
  \n从用户界面角度来看，除了控制栏中增加了一个小的“Expand”按钮外，变化不大。对于某些视频，您可能还会看到一个“Dialog”按钮，它提供了一个音频和字幕轨道选择器，如图\
  \ 12-2 所示。\n\n![9781430250838_Fig12-02.jpg](img/9781430250838_Fig12-02.jpg)\n\n\
  图 12-2. `AVPlayerController`类的音频和字幕选择器\n\n这一新功能源于`AVKit`和`MediaPlayer`框架在软件架构层面的关键差异；`AVKit`框架被设计为在更接近`AVFoundation`框架的层级上进行媒体播放。从视频章节（第\
  \ 8-10 章）中您可能还记得，您使用了`MediaPlayer`框架来呈现 iOS 内置的媒体播放界面，但需要下探到`AVFoundation`层来重写控件或创建自己的录制界面。\n\
  \n\n\n同样，通过音频章节（第 5 章–第 7 章），你可能还记得，`AVFoundation`允许你控制播放——前提是你得自己构建播放界面。`AVKit`框架则致力于弥补这一差距，它提供了一个可操作`AVAssetItem`对象（即`AVFoundation`用于表示媒体的类）的播放界面。因此，它可以用更少的“胶水”代码执行更高级的操作。这使得处理媒体文件更加容易，甚至能让你即时实现视频特效——例如添加水印或颜色滤镜。\n\
  \n在本章中，你将看到如何通过修改来自第 9 章的 MyVideoPlayer 视频播放器应用，使其使用`AVPlayerController`类进行媒体播放，从而利用`AVKit`框架。此外，你还将了解`AVKit`与`AVFoundation`框架更紧密的集成，例如使用`AVQueuePlayer`类轻松地将播放列表加载到视频播放器中。最后，为增添最后一点亮点，你将学习如何为播放器添加水印——这是一种为视频播放界面添加品牌标识的便捷方式。\n\
  \n此时，你可能想知道`MediaPlayer`框架是否还会存在，以及你所学的知识在未来几年是否依然适用。答案是肯定的，绝对适用！`AVPlayerViewController`类的功能设计和消息传递旨在模仿`MPMoviePlayerController`类，因此你所掌握的`MediaPlayer`框架知识将减少调试和实现基于`AVKit`的应用时的障碍。此外，尽管引入了`AVKit`框架，苹果公司宣布`MediaPlayer`框架并*不*会被弃用。至少在接下来的几个版本中，你可以预期基于`MediaPlayer`的应用会像往常一样正常运行。\n\
  \n虽然苹果公司没有弃用`MediaPlayer`框架，但他们对于竞争性 API 的总体趋势是将活跃开发转移到较新的框架上；尽早开始使用将帮助你脱颖而出。\n\n\
  **Caution** 在尝试实现本章项目之前，你需要将开发工具升级到 Xcode 6 和 iOS 8 SDK。`AVKit`框架在 iOS 8 之前的 SDK\
  \ 版本中不可用。\n\n## 入门指南\n\n为了说明`AVKit`框架的使用，你将修改来自第 9 章的 MyVideoPlayer 视频播放应用，使其使用`AVPlayerViewController`类进行媒体播放，并添加支持水印和队列播放（播放列表）的功能。新项目将命名为\
  \ MyAVPlayer，可在源代码包的第 13 章文件夹中找到。\n\nMyVideoPlayer 项目呈现了一个窗口式视频播放器。用户可以从应用的文档文件夹中选择一个媒体文件进行播放。如图\
  \ 12-3 所示，用户在 MyAVPlayer 项目中唯一能看到的图形界面变化是覆盖在播放器上的水印，以及一个额外的“全部播放”按钮，用于开始播放文档文件夹中的所有媒体文件。\n\
  \n![9781430250838_Fig12-03.jpg](img/9781430250838_Fig12-03.jpg)\n\n图 12-3. MyAVPlayer\
  \ 项目效果图\n\n按照你在第 8 章中从 MyPod 项目副本创建 MyVideoPlayer 项目时的相同流程，创建一个包含 MyVideoPlayer\
  \ 项目的文件夹副本，然后在 Xcode 中将其重命名为`MyAVPlayer`。\n\n要使用`AVKit`框架，必须确保`AVKit`和`AVFoundation`框架都已包含在你的项目中。如果你使用的是\
  \ Xcode 6 和 iOS 8 SDK（或更高版本），这两个框架都会出现在框架浏览器中。由于在此项目中你将使用`AVKit`作为`MediaPlayer`框架的直接替代品，请从项目中移除`MediaPlayer`框架。你最终的框架列表应类似于图\
  \ 12-4 中的示例。\n\n![9781430250838_Fig12-04.jpg](img/9781430250838_Fig12-04.jpg)\n\n\
  图 12-4. MyAVPlayer 项目的框架列表\n\n接下来，你需要更新`MainViewController`类中的代码，以反映`AVKit`框架和新的“全部播放”按钮。首先，导入`AVKit`和`AVFoundation`框架：\n\
  \n```\n#import <AVFoundation/AVFoundation.h>\n#import <AVKit/AVKit.h>\n```\n\n然后将`moviePlayer`属性的类型从`MPMoviePlayerController`更改为`AVPlayerViewController`：\n\
  \n```\n@property (nonatomic, strong) AVPlayerViewController *moviePlayer;\n```\n\
  \n最后，添加一个代表“全部播放”按钮的`UIButton`属性：\n\n```\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *playAllButton;\n```\n\n你的`MainViewController`类的头文件应类似于代码清单 12-1 中的示例。\n\
  \n**代码清单 12-1.** MainViewController 类的头文件\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <AVFoundation/AVFoundation.h>\n#import <AVKit/AVKit.h>\n#import \"FileViewController.h\"\
  \n\n@interface MainViewController : UIViewController <FileControllerDelegate>\n\n\
  @property (nonatomic, strong) IBOutlet UIView *playerViewContainer;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *chooseFileButton;\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *playAllButton;\n@property (nonatomic, strong) AVPlayerViewController\
  \ *moviePlayer;\n\n-(IBAction)playAll:(id)sender;\n\n@end\n```\n\n最后，将你的“全部播放”按钮添加到项目的\
  \ Storyboard 中，并将其关联到你刚刚添加的属性。你中间状态的 Storyboard 应类似于图 12-5 中的示例。\n\n![9781430250838_Fig12-05.jpg](img/9781430250838_Fig12-05.jpg)\n\
  \n图 12-5. MyAVPlayer 项目的 Storyboard\n\n## 使用 AVPlayer 类播放媒体文件\n\n与`MPMediaPlayerController`类一样，要初始化一个`AVPlayerViewController`对象，你需要为其提供一个媒体文件或内容\
  \ URL 作为输入。`AVPlayer`类负责处理`AVPlayerViewController`类的播放功能。`AVPlayer`类使用`AVPlayerItem`对象（`AVAsset`的子类）来表示媒体项。与`MPMediaItem`对象不同，`AVAsset`可以以*容器*格式表示媒体文件，可以包含多个字幕和音轨，并且可以表示`AVComposition`对象——这些特殊对象可向资产添加基于时间的特效，如滤镜和转场。\n\
  \n你可以使用`[AVPlayer playerWithURL:]`方法，通过单个媒体文件初始化`AVPlayer`对象。这样做会自动将你的内容 URL 转换为一个`AVPlayerItem`对象。与\
  \ MyVideoPlayer 应用类似，你应该在用户从文件选择器中选择文件后初始化`AVPlayer`。将你的初始化代码放在`FileControllerDelegate`协议的处理器方法`[FileControllerDelegate\
  \ didFinishWithFile:]`中，如代码清单 12-2 所示。这将替换你之前的`MPMoviePlayerController`初始化代码。\n\n\
  **代码清单 12-2.** 将媒体文件加载到 AVPlayer 对象中\n\n\n```objc\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n{\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n   \
  \     NSDocumentDirectory, NSUserDomainMask,  YES);\n    NSString *documentsDirectory\
  \ = [paths objectAtIndex:0];\n    NSString *relativePath = [documentsDirectory\n\
  \        stringByAppendingPathComponent:filePath];\n\n    NSURL *fileURL = [NSURL\
  \ fileURLWithPath:relativePath];\n\n    self.moviePlayer.player = [AVPlayer playerWithURL:fileURL];\n\
  \    [self.moviePlayer.player addObserver:self forKeyPath:@\"status\"\n        \
  \                     options:0 context:nil];\n\n    [self dismissViewControllerAnimated:YES\
  \ completion:^{\n        [self.moviePlayer.player play];\n    }];\n}\n```\n\n与基于\
  \ `MediaPlayer` 的实现类似，你的内容 URL 需要在运行时创建，以正确确定应用文档目录的位置（请记住，确切位置与 iOS 自动生成的 UUID\
  \ 相关联）。\n\n**注意** 如果你想直接加载 `AVComposition` 或 `AVPlayerItem`，可以使用 `[AVPlayer playerWithPlayerItem:]`\
  \ 方法。\n\n初始化 `AVPlayer` 对象后，用户可以点击“播放”按钮开始播放文件。然而，要完全实现 `MyVideoPlayer` 项目的工作流程，还需要添加最后两个步骤：\n\
  \n1.  呈现 `AVPlayerViewController`。\n2.  定义媒体播放事件（例如，预加载媒体以使其加载更快）。\n\n### 呈现 AVPlayerViewController\n\
  \n从用户界面的角度来看，`AVPlayerViewController` 相比 `MPMoviePlayerController` 有两个主要优势：它提供了*自适应*控件，可以响应窗口大小和播放内容的类型；并且它提供了可在\
  \ `Interface Builder` 中使用的对象表示形式，如图 12-6 所示。\n\n![9781430250838_Fig12-06.jpg](img/9781430250838_Fig12-06.jpg)\n\
  \n图 12-6. `AVPlayerViewController` 的 `Interface Builder` 对象\n\n如图 12-7 所示，`AVPlayerViewController`\
  \ 类会根据呈现样式（窗口或全屏）自动切换控件类型。相比之下，`MPMoviePlayerController` 要求用户指定其控件样式。\n\n![9781430250838_Fig12-07.jpg](img/9781430250838_Fig12-07.jpg)\n\
  \n图 12-7. 两种 `AVPlayerViewController` 呈现样式的控件差异\n\n与 `MPMoviePlayerController` 类一样，用户可以点击嵌入播放器中的展开控件，在窗口播放和全屏播放之间切换。\n\
  \n**注意** 你仍然可以通过 `showsPlaybackControls` 属性完全隐藏 `AVPlayerViewController` 的控件。\n\n\
  类似地，控件会根据用户播放的是本地媒体文件还是流媒体文件而改变。如图 12-8 所示，本地播放会显示“播放”按钮和“前进/后退”按钮，以便用户在播放列表中导航；而流媒体播放会显示“播放”按钮和“重复”按钮。在控件样式方面，`AVPlayerViewController`\
  \ 类会自动完成所有这些操作。\n\n![9781430250838_Fig12-08.jpg](img/9781430250838_Fig12-08.jpg)\n\
  \n图 12-8. `AVPlayerViewController` 在本地文件和流媒体文件之间的控件差异\n\n虽然 `MyAVPlayer` 项目的用户界面应与\
  \ `MyVideoPlayer` 项目保持一致，但你需要更改视图初始化代码。`AVPlayer` 类负责控制媒体播放，而 `AVPlayerViewController`\
  \ 作为用户界面的包装器。要以窗口模式呈现 `AVPlayerViewController`，请使用容器视图来包含 `AVPlayerViewController`\
  \ 对象。\n\n要将 `AVPlayerViewController` 放置在 `MainViewController` 类上，请从 `Interface Builder`\
  \ 的对象库中将容器视图和 AV Player View Controller 对象拖放到你的故事板中，如图 12-9 所示。\n\n![9781430250838_Fig12-09.jpg](img/9781430250838_Fig12-09.jpg)\n\
  \n图 12-9. `MyAVPlayer` 项目的完成故事板\n\n将容器视图连接到 `MainViewController` 类中的 `playerView`\
  \ 属性。要初始化视图，请创建一个名为 `setPlayer` 的*嵌入*转场。系统只会在视图加载后调用该转场一次。与所有转场一样，将其添加到 `[MainViewController\
  \ prepareForSegue:sender:]` 方法中，如代码清单 12-3 所示。\n\n***代码清单 12-3***. 从转场初始化 `AVPlayerViewController`\
  \ 对象\n\n```objc\n-(void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n\
  {\n    if ([segue.identifier isEqualToString:@\"setPlayerContent\"]) {\n       \
  \ AVPlayerViewController *playerVC = (AVPlayerViewController *)\n            segue.destinationViewController;\n\
  \        self.moviePlayer = playerVC;\n\n    } else if ([segue.identifier isEqualToString:@\"\
  showFilePicker\"]) {\n        NSMutableArray *videoArray = [NSMutableArray new];\n\
  \n        NSArray *paths = NSSearchPathForDirectoriesInDomains(\n            NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n        NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \        NSError *error = nil;\n\n        NSArray *allFiles = [[NSFileManager defaultManager]\n\
  \            contentsOfDirectoryAtPath:documentsDirectory error:&error];\n\n   \
  \     if (error == nil) {\n\n            for (NSString *file in allFiles) {\n  \
  \              NSString *fileExtension = [\n                    [file pathExtension]\
  \ lowercaseString];\n                if ([fileExtension isEqualToString:@\"m4v\"\
  ] ||\n                    [fileExtension isEqualToString:@\"mov\"]) {\n        \
  \                [videoArray addObject:file];\n                }\n            }\n\
  \n            UINavigationController *navigationController =\n            (UINavigationController\
  \ *) segue.destinationViewController;\n            FileViewController *fileVC =\n\
  \              (FileViewController *)navigationController.topViewController;\n \
  \           fileVC.delegate = self;\n            fileVC.fileArray = videoArray;\n\
  \        } else {\n            NSLog(@\"error looking up files: %@\", [error description]);\n\
  \        }\n    }\n}\n```\n\n在转场中，访问*目标*视图控制器的主要方法是通过 `destinationViewController`\
  \ 属性。由于 `setPlayer` 转场标识在你的故事板中只使用一次，因此你可以知道 `destinationViewController` 对象指向你放置的\
  \ `AVPlayerViewController`。进行类型转换后，你就获得了可用于设置 `MainViewController` 类的 `moviePlayer`\
  \ 属性的有效对象。（请记住，放置在故事板上的对象在加载时会由其默认构造函数初始化。）\n\n由于你是在 `[FileViewDelegate didFinishWithFile:]`\
  \ 方法中（在用户从文件选择器中选择文件后）初始化了 `AVPlayer` 对象，因此你的视频播放器现在可以使用了。当用户选择媒体文件时，你的视频播放器将加载视频的第一帧和播放器的控制栏，表明它已准备好播放。\n\
  \n## 使用 AVQueuePlayer 类播放播放列表\n\n`AVKit` 框架相对于 `MediaPlayer` 框架的另一个优势在于，它允许你使用 `AVQueuePlayer`\
  \ 类通过播放列表来初始化媒体播放器。除了能够一次加载多个文件之外，将 `AVQueuePlayer` 用作 `AVPlayerController` 的 `player`\
  \ 属性，将自动添加上下文控件和处理方法，以便用户可以在播放列表中的项目之间导航。\n\n\n你可能会想：“这功能很基本啊，难道所有的媒体播放器类不都应该有吗？”遗憾的是，你用于媒体播放的主要类——`AVAudioPlayer`（用于音频）和`MPMediaPlayerController`（用于视频）——无法用播放列表来初始化。大多数应用程序在这些类上实现类似播放列表功能的方式是：当应用收到*播放完成*事件时，用播放列表中的“下一个文件”来初始化媒体播放器。在`AVKit`出现之前，唯一能原生处理播放列表的媒体播放器类是`MPMusicPlayerController`，你曾用它进行\
  \ iPod 音乐播放——但请记住，你必须实现自己的用户界面才能使用这个类。而`AVQueuePlayer`类则一举两得，既提供了用户界面，又提供了从一个对象到另一个对象的转场逻辑。\n\
  \n正如`AVPlayerViewController`类旨在作为`MPMediaPlayerController`类的直接替代品一样，你可以将`AVQueuePlayer`类用作`AVPlayer`类的直接替代品。这两个类的关键区别在于：初始化`AVQueuePlayer`时，不是传入单个媒体资源，而是传入一个`AVPlayerItem`对象数组：\n\
  \n```\nAVQueuePlayer *queuePlayer = [[AVQueuePlayer alloc]\n                   \
  \           initWithItems:playerItemArray];\n```\n\n需要使用`AVPlayerItem`对象的要求意味着你不能使用单个内容\
  \ URL 来初始化播放器。不过，你可以通过`[AVPlayerItem playerItemWithURL:]`方法从内容 URL 创建`AVPlayerItem`对象：\n\
  \n```\nAVPlayerItem *item1 = [AVPlayerItem playerItemWithURL:@\"goodDoge.mp4\"];\n\
  ```\n\n这个方法允许你使用本地文件 URL 或远程内容 URL。和往常一样，记得在运行时计算本地文件 URL，以便正确加载它：\n\n```\nNSString\
  \ *relativePath = [documentsDirectory\n    stringByAppendingPathComponent:@\"goodDoge.mp4\"\
  ];\nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\nAVPlayerItem *item1\
  \ = [AVPlayerItem playerItemWithURL:fileURL];\n```\n\n因为`AVQueuePlayer`类是`AVPlayer`的子类，你只需要将一个`AVQueuePlayer`对象传递给`AVPlayerViewController`的`player`属性即可：\n\
  \n```\nself.moviePlayer.player = queuePlayer;\n```\n\n正如本章开头在 MyAVPlayer 项目中提到的，你希望让用户通过“选择文件”按钮播放单个文件，或者当他们使用“全部播放”按钮时加载所有可用文件。为此，在用户选择“选择文件”按钮时，用`AVPlayer`初始化`AVPlayerViewController`；在用户选择“全部播放”按钮时，用`AVQueuePlayer`初始化。\n\
  \n为了保留单文件播放功能，你应该保持“选择文件”处理程序（文件选择器委托）不变。相反，创建一个新方法`[MainViewController playAll:]`，它将作为“全部播放”按钮的处理程序。如代码清单\
  \ 12-4 所示，使用此方法为共享的`AVPlayerViewController`对象设置`player`属性。\n\n***代码清单 12-4***. 使用`AVQueuePlayer`初始化`AVPlayerViewController`\n\
  \n```\n-(IBAction)playAll:(id)sender\n{\n\nNSString *relativePath = [documentsDirectory\n\
  \        stringByAppendingPathComponent:@\"goodDoge.mp4\"];\n    NSURL *fileURL\
  \ = [NSURL fileURLWithPath:relativePath];\n    AVPlayerItem *item1 = [AVPlayerItem\
  \ playerItemWithURL:fileURL];\n\nNSString *relativePath2 = [documentsDirectory\n\
  \        stringByAppendingPathComponent:@\"badDoge.mp4\"];\n    NSURL *fileURL2\
  \ = [NSURL fileURLWithPath:relativePath2];\n\nAVPlayerItem *item2 = [AVPlayerItem\n\
  \        playerItemWithURL:@\"http://www.devatelier.com/commercial.mov\"];\n   \
  \ NSArrray *playerItemArray = [NSArray arrayWithObjects: item1, item2];\n\nself.moviePlayer.player\
  \ = [[AVQueuePlayer alloc]\n        initWithItems:playerItemArray];\n\n[self.moviePlayer.player\
  \ addObserver:self forKeyPath:@\"status\"\n        options:0 context:nil];\n\n[self.moviePlayer.player\
  \ play];\n\n}\n```\n\n为了让这段代码能编译通过，你需要定义`inputPlaylist`对象。因为目标是播放所有文件，你可以从文件选择器（`FileViewController`）类中复制扫描逻辑。扫描文档目录中的所有文件，并将它们添加到一个`NSMutableArray`中。当这个过程完成后，将其附加到你的`AVPlayerViewController`上。代码清单\
  \ 12-5 显示了完整的初始化方法。\n\n***代码清单 12-5***. `AVQueuePlayer`的完整初始化代码\n\n```\n-(IBAction)playAll:(id)sender\n\
  {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n        NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSError *error = nil;\n\nNSArray *allFiles = [[NSFileManager defaultManager]\n\
  \        contentsOfDirectoryAtPath:documentsDirectory error:&error];\n\nNSMutableArray\
  \ *playerItemArray = [NSMutableArray new];\n\nfor (NSString *file in allFiles) {\n\
  \nif ([[file pathExtension] isEqualToString:@\"mp4\"] ||\n            [[file pathExtension]\
  \ isEqualToString:@\"mov\"] ||\n             [[file pathExtension] isEqualToString:@\"\
  MOV\"]) {\n            NSString *relativePath = [documentsDirectory\n          \
  \      stringByAppendingPathComponent:file];\n\nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n\
  \nAVPlayerItem *playerItem = [AVPlayerItem\n                playerItemWithURL:fileURL];\n\
  \n[playerItem addObserver:self forKeyPath:@\"status\"\n                options:nil\
  \ context:nil];\n\n[playerItemArray addObject:playerItem];\n        }\n\n}\n\nself.moviePlayer.player\
  \ = [[AVQueuePlayer alloc]\n        initWithItems:playerItemArray];\n\n[self.moviePlayer.player\
  \ addObserver:self forKeyPath:@\"status\"\n        options:0 context:nil];\n\n[self.moviePlayer.player\
  \ play];\n\n}\n```\n\n## 处理媒体播放事件\n\n`MPMediaPlayerController`类中少数几个没有直接移植到`AVPlayerViewController`类的特性之一，是通过通知报告播放状态变化。好消息是，你可以通过使用键值观察者在`AVPlayerViewController`中实现类似的功能。某些播放事件（如*播放完成*和类似事件）的通知仍然存在。\n\
  \n### 使用键值观察者\n\n与通知类似，键值观察（KVO）是一种基于订阅的消息传递系统，这意味着类在声明*正在观察*它们之前不会收到任何消息。虽然通知要求你定义并使用通知“名称”，通过一个中心服务（通知中心）来传递和接收消息，但键值观察者是去中心化的。\n\
  \n当对象上某个属性（键）的内容（值）发生变化时，会触发键值观察者消息。在 KVO 中，一个类声明自己是一个对象消息的观察者，并指定一个处理程序方法——这与通知类似。任何对象或属性都可以被观察，这让你能够灵活地定义对未绑定到通知或委托方法的事件的处理——但代价是可重用性降低（你的实现将特定于类，且可移植性较差）。\n\
  \n创建和使用键值观察者的过程与创建通知非常相似（主要区别在于其特定于对象的特性）：声明你的类正在观察对象上的某个属性。\n\n1. 实现 KVO 事件的处理程序代码。\n\
  2. 当不再需要时，移除你的观察者（以防止崩溃）。\n\n注册键值观察者的 API 是`[NSObject addObserver:forKeyPath:options:context]`。如果你想观察数组长度的变化，注册代码看起来像这样：\n\
  \n`[self.peopleArray addObserver:self forKeyPath:@\"count\" options:nil`\n    `context:nil];`\n\
  \n\n\n#### 接收者（`receiver`，即调用类）是此消息需要被观察的对象；在本例中，就是数组本身。观察者（`observer`）是充当委托并基于指定值变化接收消息的类。`key\
  \ path` 是您想要观察的对象的属性；该名称作为区分大小写的字符串传递。`options` 参数允许您指定信息应如何发送到处理方法。例如，您可以减少消息的频率（默认值\
  \ `nil` 对于大多数初级应用来说已经足够）。`context` 参数允许您在处理方法中指定一个“原始值”进行比较。同样，默认值 `nil` 对于大多数初级应用来说已经足够。\n\
  \n与通知不同，`NSObject` 方法通过使用 `[NSObject observeValueForKeyPath:ofObject:change:context]`\
  \ 来处理所有键值观察者。对于数组示例，您的处理方法如下所示：\n\n```\n-(void)observeValueForKeyPath:(NSString\
  \ *)keyPath\n     ofObject:(id)object change:(NSDictionary *)change\n     context:(void\
  \ *)context\n{\n    if ((object == self.peopleArray) &&\n         [keyPath isEqualToString:@\"\
  count\"] ) {\n             NSLog(@\"new count!\", [self.peopleArray count]);\n    \
  \ }\n}\n```\n\n处理 KVO 消息的参数与声明观察者时使用的参数一一对应。陌生部分应该是处理逻辑。由于一个方法处理所有消息，您需要检查消息是否来自指定的对象。如果您使用的是实例变量，则直接比较对象；如果您想使用局部变量，则可以比较对象类型。此外，您还需要检查消息是否对应于预期的属性（因为您可以在同一对象上观察多个属性）。\n\
  \n最后，要移除观察者，您需要在类的拆卸过程中，调用接收对象上的 `[NSObject removeObserver:forKeyPath]` 方法。对于数组示例，代码如下所示：\n\
  \n```\n-(void)dealloc\n{\n    [self.peopleArray removeObserver:self forKeyPath:@\"\
  count\"];\n}\n```\n\n正如通知一样，KVO 消息可能在类拆卸后触发；清理观察者可以防止崩溃。如果在运行时重新初始化实例变量，建议将移除观察者作为重置步骤的一部分。\n\
  \n#### 加载完成事件\n\n您可能还记得（参见第 8 章），在选择媒体文件后，您立即调用了 `[MPMediaPlayer prepareToPlay]`\
  \ 方法开始加载文件。文件加载完成后，会触发 `MPMoviePlayerLoadStateChanged` 通知，指示文件已准备好播放。收到此通知后，您调用了\
  \ `[MPMediaPlayer play]` 函数。`AVPlayer` 对象的 `status` 属性用于检索视频的加载状态。在您的 `FileViewController`\
  \ 委托方法中，初始化 `player` 对象后添加一个观察者，如列表 12-6 所示。\n\n***列表 12-6***。为视频加载状态添加键值观察者\n\n\
  ```\n-(IBAction)playAll:(id)sender\n{\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
          NSDocumentDirectory, NSUserDomainMask, YES);\n    NSString *documentsDirectory\
  \ = [paths objectAtIndex:0];\n    NSError *error = nil;\n\nNSArray *allFiles = [[NSFileManager\
  \ defaultManager]\n        contentsOfDirectoryAtPath:documentsDirectory error:&error];\n\
  \nif (error == nil) {\n        NSMutableArray *playerItemArray = [NSMutableArray\
  \ new];\n\nfor (NSString *file in allFiles) {\n        NSString *fileExtension =\
  \ [file pathExtension];\n        if ([[fileExtension lowercaseString] isEqualToString:@\"\
  mp4\"] ||\n            [[fileExtension lowercaseString] isEqualToString:@\"mov\"\
  ]) {\n\nNSString *relativePath = [documentsDirectory\n                    stringByAppendingPathComponent:file];\n\
  ```\n\n\n\n```objectivec\nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n\
  \nAVPlayerItem *playerItem = [AVPlayerItem\n                   playerItemWithURL:fileURL];\n\
  \n[playerItem addObserver:self forKeyPath:@\"status\"\n                   options:NSKeyValueObservingOptionNew\
  \ context:nil];\n\n[playerItemArray addObject:playerItem];\n       }\n\n}\n\nself.moviePlayer.player\
  \ = [[AVQueuePlayer alloc] initWithItems:playerItemArray];\n\n[self.moviePlayer.player\
  \ addObserver:self forKeyPath:@\"status\" options:0 context:nil];\n\n[self.moviePlayer.player\
  \ play];\n\n} else {\n         NSLog(@\"no files found\");\n  }\n}\n```\n\n回顾“使用键值观察”边栏，在你的\
  \ `[MainViewController observeValueForKeyPath:]` 方法中，将处理逻辑放在一个 `if` 代码块内，该代码块用于确认观察到的\
  \ `object` 是你的 `player`，并且观察到的 `keyPath` 是 `status`。如果发生错误，则显示一个警告视图；否则，立即开始播放视频文件，如代码清单\
  \ 12-7 所示。只有当两个比较条件都成功时，你的处理方法才会执行。\n\n***代码清单 12-7***。视频加载状态键值观察的处理方法\n\n```objectivec\n\
  -(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object\n    change:(NSDictionary\
  \ *)change context:(void *)context\n{\n    if ((object == self.moviePlayer.player)\
  \ && [keyPath\n        isEqualToString:@\"status\"] ) {\n\nUIImage *image = [UIImage\
  \ imageNamed:@\"devat\"];\n        UIImageView *imageView = [[UIImageView alloc]\n\
  \            initWithImage:image];\n        imageView.frame = self.moviePlayer.videoBounds;\n\
  \        imageView.contentMode = UIViewContentModeBottomRight;\n        imageView.autoresizingMask\
  \ = UIViewAutoresizingFlexibleHeight |\n            UIViewAutoresizingFlexibleWidth;\n\
  \nif ([self.moviePlayer.contentOverlayView.subviews count] == 0) {\n           \
  \ [self.moviePlayer.contentOverlayView addSubview:imageView];\n        }\n\n[object\
  \ removeObserver:self forKeyPath:@\"status\"];\n\n} else if ([object isKindOfClass:[AVPlayerItem\
  \ class]]) {\n\nAVPlayerItem *currentItem = (AVPlayerItem *)object;\n\nif (currentItem.status\
  \ == AVPlayerItemStatusFailed) {\n            NSString *errorString = [currentItem.error\
  \ description];\n            NSLog(@\"item failed: %@\", errorString);\n\nif ([self.moviePlayer.player\n\
  \                isKindOfClass:[AVQueuePlayer class]]) {\n                AVQueuePlayer\
  \ *queuePlayer =\n                    (AVQueuePlayer *)self.moviePlayer.player;\n\
  \                [queuePlayer advanceToNextItem];\n            } else {\n      \
  \          UIAlertView *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"\
  Error\" message:errorString\n                    delegate:self cancelButtonTitle:@\"\
  OK\"\n                    otherButtonTitles:nil];\n                [alert show];\n\
  \            }\n        } else {\n            [object removeObserver:self forKeyPath:@\"\
  status\"];\n        }\n    }\n}\n```\n\n请记住，键值观察的目标是将消息精准过滤到你所需的内容（例如，特定的媒体播放器对象、特定的属性）。你不需要添加错误处理逻辑，因为代理方法由整个类共享（每个\
  \ KVO 对象都会向此类发送消息）。\n\n另请注意，代码清单 12-7 的最后一行在捕获到观察者后将其移除。这可以防止用户在下次开始播放视频时发生崩溃。此时，你原始的\
  \ `AVPlayer` 对象已从内存中释放。\n\n#### 播放完成事件\n\n在 MyVideoPlayer 应用中，通过观察 `MPMoviePlayerPlaybackDidFinishNotification`\
  \ 通知，你在媒体播放完成时显示了一个警告视图。要捕获 `AVKit` 框架的等效通知，请为 `AVPlayerItemDidPlayToEndTimeNotification`\
  \ 通知添加一个观察者，如代码清单 12-8 所示。\n\n***代码清单 12-8***。为 AVPlayer 的“播放完成”通知添加观察者\n\n```objectivec\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n        selector:@selector(playbackFinished:)\n        name:AVPlayerItemDidPlayToEndTimeNotification\
  \ object:nil];\n}\n```\n\n许多视频应用通常在播放完成后自动关闭视频播放界面。你可以通过在回调方法中调用 `[self dismissViewController:animated:]`\
  \ 方法来实现此行为，如代码清单 12-9 所示。\n\n***代码清单 12-9***。 “播放完成”通知的回调方法\n\n```objectivec\n-(void)playbackFinished:(NSNotification\
  \ *) notification\n{\n    NSDictionary *userInfo = notification.userInfo;\n\nif\
  \ ([self.moviePlayer.player isKindOfClass:[AVPlayer class]]) {\n        [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n    } else {\n        //do nothing\n    }\n\n}\n```\n\n使用“播放完成”通知时，在完全关闭\
  \ `AVPlayerViewController` 之前，请务必检查当前加载的 `AVPlayer` 对象的类型。对于 `AVQueuePlayer`，在关闭\
  \ `AVPlayerViewController` 之前，你需要创建一个变量来维护队列位置。不幸的是，目前尚无相关的 API。\n\n#### 错误处理\n\n\
  当播放单个媒体文件时，如果文件加载失败，显示一条错误消息是一种良好的做法。当播放多个文件时，制定一个恢复策略至关重要，例如跳过有问题的项目并继续播放下一个。在使用\
  \ `AVPlayer` 类播放单个文件时，*播放状态* 观察者已处理了此错误。对于 `AVQueuePlayer`，你需要更高级一些的处理方式。\n\n你可以通过观察添加到队列中的每个\
  \ `AVPlayerItem` 的 `status` 变量，为 `AVQueuePlayer` 类启用项目错误处理。如代码清单 12-10 所示，修改你的 `[MainViewController\
  \ playAll:]` 方法，为你创建的每个 `AVPlayerItem` 添加一个观察者。虽然同一个观察者方法可以服务所有项目，但除非你单独注册它们，否则它们的事件将被忽略。\n\
  \n***代码清单 12-10***。为 AVPlayerItem 对象添加键值观察者\n\n```objectivec\n-(IBAction)playAll:(id)sender\n\
  {\n    NSArray *paths =\n        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \        NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSError *error = nil;\n\nNSArray *allFiles = [[NSFileManager defaultManager]\n\
  \        contentsOfDirectoryAtPath:documentsDirectory error:&error];\n\nNSMutableArray\
  \ *playerItemArray = [NSMutableArray new];\n\nif (error == nil) {\n\nfor (NSString\
  \ *file in allFiles) {\n              NSString *fileExtension =           [[file\
  \ pathExtension] lowercaseString];\n                if ([fileExtension isEqualToString:@\"\
  m4v\"] ||\n                    [fileExtension isEqualToString:@\"mov\"]) {\n\nNSString\
  \ *relativePath = [documentsDirectory\n                              stringByAppendingPathComponent:file];\n\
  \nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n\nAVPlayerItem *playerItem\
  \ = [AVPlayerItem\n                        playerItemWithURL:fileURL];\n\n[playerItem\
  \ addObserver:self forKeyPath:@\"status\"\n                 options:NSKeyValueObservingOptionNew\
  \ context:nil];\n\n[playerItemArray addObject:playerItem];\n                 }\n\
  \        }\n\nself.moviePlayer.player = [[AVQueuePlayer alloc]\n        initWithItems:playerItemArray];\n\
  \n[self.moviePlayer.player addObserver:self forKeyPath:@\"status\"\n        options:0\
  \ context:nil];\n\n[self.moviePlayer.player play];\n\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项，将给定的英文文本翻译为中文。\n\
  \n\n因为您正在观察的对象是即时创建的，位于 `[MainViewController observeValueForKeyPath:]` 方法中，您需要检查传入的\
  \ `object` 的类型，而不是进行直接的指针比较。在 Cocoa Touch 中，您可以通过 `[NSObject kindOfClass:]` 方法检查任何对象的类型。将传入的对象与目标类的\
  \ `class` 属性进行比较。在 KVO 处理方法中，与 `AVPlayerItem` 类进行比较，代码如下：\n\n```\nif ([object isKindOfClass:[AVPlayerItem\
  \ class]])\n```\n\n通过类型比较后，您可以查询传入对象的 `status` 属性，检查其是否处于 `AVPlayerItemStatusFailed`\
  \ 状态。如列表 12-11 所示，如果播放器是 `AVQueuePlayer`，则记录错误并前进到下一个项目；否则，显示一个警告视图。\n\n***列表 12-11***。用于项目状态的键值观察者\n\
  \n```\n-(void)observeValueForKeyPath:(NSString *)keyPath ofObject:(id)object\n \
  \   change:(NSDictionary *)change context:(void *)context\n{\n    if ((object ==\
  \ self.moviePlayer.player) && [keyPath\n        isEqualToString:@\"status\"] ) {\n\
  \n        UIImage *image = [UIImage imageNamed:@\"logo.png\"];\n        UIImageView\
  \ *imageView = [[UIImageView alloc]\n            initWithImage:image];\n       \
  \ imageView.frame = self.moviePlayer.videoBounds;\n        imageView.contentMode\
  \ = UIViewContentModeBottomRight;\n        imageView.autoresizingMask = UIViewAutoresizingFlexibleHeight\
  \ |\n            UIViewAutoresizingFlexibleWidth;\n\n        if ([self.moviePlayer.contentOverlayView.subviews\
  \ count] == 0) {\n            [self.moviePlayer.contentOverlayView addSubview:imageView];\n\
  \        }\n\n        [object removeObserver:self forKeyPath:@\"status\"];\n\n \
  \   } else if ([object isKindOfClass:[AVPlayerItem class]]) {\n\n        AVPlayerItem\
  \ *currentItem = (AVPlayerItem *)object;\n\n        if (currentItem.status == AVPlayerItemStatusFailed)\
  \ {\n            NSString *errorString = [currentItem.error description];\n    \
  \        NSLog(@\"item failed: %@\", errorString);\n\n            if ([self.moviePlayer.player\n\
  \                    isKindOfClass:[AVQueuePlayer class]]) {\n                AVQueuePlayer\
  \ *queuePlayer =\n                    (AVQueuePlayer *)self.moviePlayer.player;\n\
  \                [queuePlayer advanceToNextItem];\n            } else {\n      \
  \          UIAlertView *alert = [[UIAlertView alloc]\n                    initWithTitle:@\"\
  Error\" message:errorString\n                    delegate:self cancelButtonTitle:@\"\
  OK\"\n                    otherButtonTitles:nil];\n                [alert show];\n\
  \            }\n        } else {\n            [object removeObserver:self forKeyPath:@\"\
  status\"];\n        }\n    }\n}\n```\n\n您刚才看到的只是您可以为 `AVPlayer` 类处理的部分播放状态事件。有关完整列表，请查阅\
  \ Apple 开发者库中关于 `AVPlayer` 类的文档（`https://developer.apple.com/Library/ios/documentation/AVFoundation/Reference/AVPlayer_Class/index.html`）。请记住，如果您试图观察的事件没有相应的通知，就创建一个键值观察者！\n\
  \n## 添加覆盖视图（水印）\n\n`AVPlayerViewController` 类的另一个便利之处是它允许您添加一个*内容覆盖视图*。覆盖视图让您可以在视频层之上显示静态或实时内容，而无需编写复杂的底层代码来拦截视频层。例如，如果您需要显示注释、实时状态指示器甚至是水印，内容覆盖视图是一种快速实现这些功能的方法。覆盖行为的一个著名例子是\
  \ YouTube 广告视图，如图 12-10 所示，它允许您点击高亮区域访问广告商的网站。\n\n![9781430250838_Fig12-10.jpg](img/9781430250838_Fig12-10.jpg)\n\
  \n图 12-10。YouTube 广告功能\n\n在本节中，您将学习如何为视频添加水印——这是为您的应用添加品牌标识的好方法。此示例使用静态图像作为水印，但您可以在覆盖视图中显示任何您想要的内容——只要它是\
  \ `UIView` 类的子类即可。\n\n**注意** 避免在内容覆盖视图中放置高度交互的元素，因为它们可能与控制条发生冲突。\n\n首先，将图像导入到您的项目中。如果您希望水印具有透明度，请使用带有透明度层的\
  \ PNG 图像；否则，使用 JPEG 或不透明的 PNG 图像文件。我倾向于使用高度约为 50 像素的图像，这样图像不会分散观众对内容的注意力。尽量在图像的所有边缘构建至少\
  \ 10 像素的内边距。使用此图像创建一个 `UIImage` 对象。在 MyAVPlayer 项目中，文件命名为 `logo.png`：\n\n```\nUIImage\
  \ *image = [UIImage imageNamed:@\"logo.png\"];\n```\n\n要在内容覆盖视图上显示图像，您需要将其包装在 `UIView`\
  \ 的子类中，因此使用您刚刚创建的 `UIImage` 对象初始化一个 `UIImageView` 对象：\n\n```\nUIImageView *imageView\
  \ = [[UIImageView alloc] initWithImage:image];\n```\n\n请记住，创建 `UIView` 的过程与调整其大小和位置是不同的。为了模仿电视广播，大多数视频应用喜欢将水印放置在视频的右下角或右上角。通过将\
  \ `UIImageView` 类的 `contentMode` 属性设置为 `UIViewContentModeBottomRight`，您可以指示 `UIImageView`\
  \ 类将图像放置在右下角，同时保留其原始尺寸：\n\n```\nimageView.contentMode = UIViewContentModeBottomRight;\n\
  ```\n\n同样，您会希望图像保持在视频播放区域内。不幸的是，视频播放器的大小会随着 `AVPlayerViewController` 的呈现样式（窗口或全屏）而改变。不过，您可以通过将覆盖视图的大小设置为视频播放区域的*边界框*，并添加*灵活的*宽度和高度调整蒙版来解决这个问题：\n\
  \n```\nimageView.frame = self.moviePlayer.videoBounds;\nimageView.autoresizingMask\
  \ = UIViewAutoresizingFlexibleHeight |\n    UIViewAutoresizingFlexibleWidth;\n```\n\
  \n在您初始化和定位了 `UIImageView` 之后，将其作为子视图添加到 `contentOverlayView` 之上：\n\n```\n[self.moviePlayer.contentOverlayView\
  \ addSubview:imageView];\n```\n\n现在最重要的问题是，“放在哪里？”如前所述，将 `contentOverlayView` 放置在视频层之上所需的条件之一是知道视频层的尺寸信息。不幸的是，在视频加载完成之前，这个值是无效的。幸运的是，这与您构建键值观察者以了解项目何时加载完成的事件是同一个事件。为覆盖视图创建一个新的\
  \ `if` 块，如列表 12-12 所示。\n\n***列表 12-12***。将水印添加到您的“加载完成”键值观察者中\n\n```\n-(void)observeValueForKeyPath:(NSString\
  \ *)keyPath ofObject:(id)object\n     change:(NSDictionary *)change context:(void\
  \ *)context\n{\n    if ((object == self.moviePlayer.player) && [keyPath\n      \
  \  isEqualToString:@\"status\"] ) {\n\n        UIImage *image = [UIImage imageNamed:@\"\
  logo.png\"];\n        UIImageView *imageView = [[UIImageView alloc]\n          \
  \ initWithImage:image];\n        imageView.frame = self.moviePlayer.videoBounds;\n\
  \        imageView.contentMode = UIViewContentModeBottomRight;\n        imageView.autoresizingMask\
  \ = UIViewAutoresizingFlexibleHeight |\n                                     UIViewAutoresizingFlexibleWidth;\n\
  \n        if ([self.moviePlayer.contentOverlayView.subviews count] == 0) {\n   \
  \         [self.moviePlayer.contentOverlayView addSubview:imageView];\n        }\n\
  \n        [object removeObserver:self forKeyPath:@\"status\"];\n\n    } else if\
  \ ([object isKindOfClass:[AVPlayerItem class]]) {\n\n        AVPlayerItem *currentItem\
  \ = (AVPlayerItem *)object;\n```\n\n\n\n```objc\nif (currentItem.status == AVPlayerItemStatusFailed)\
  \ {\n    NSString *errorString = [currentItem.error description];\n    NSLog(@\"\
  item failed: %@\", errorString);\n\n    if ([self.moviePlayer.player\n         \
  \   isKindOfClass:[AVQueuePlayer class]]) {\n        AVQueuePlayer *queuePlayer\
  \ =\n            (AVQueuePlayer *)self.moviePlayer.player;\n        [queuePlayer\
  \ advanceToNextItem];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc]\n            initWithTitle:@\"Error\" message:errorString\n           \
  \ delegate:self cancelButtonTitle:@\"OK\"\n            otherButtonTitles:nil];\n\
  \        [alert show];\n    }\n} else {\n    [object removeObserver:self forKeyPath:@\"\
  status\"];\n}\n```\n\n最后一点提示，`contentOverlayValue` 属性是只读的，这意味着你无法从中移除子视图，只能添加视图。因此，在代码清单\
  \ 12-12 中，我在添加水印前检查了子视图的数量——无论用户选择视频多少次，你都应该只保留一个水印！\n\n## 总结\n\n在本章中，你了解了如何使用 `AVKit`\
  \ 框架及其媒体播放类 `AVPlayer` 和 `AVQueuePlayer`，作为 `MediaPlayer` 框架的即插即用替代方案。通过 MyAVPlayer\
  \ 项目，你集成了基于播放列表的媒体和覆盖视图，充分利用了 `AVKit` 与 `AVFoundation` 框架更紧密的集成。在集成过程中，你会发现该框架的许多设计模式与\
  \ `MediaPlayer` 使用的模式非常相似，但需要稍有不同的实现方式。\n\n请记住，尽管苹果不会立即弃用 `MediaPlayer` 框架，但尽早使用\
  \ `AVKit` 可以让你访问一组新的功能特性，否则你需要自行开发这些功能。\n\n# 第 13 章\n\n## 使用 HealthKit 和 Core Motion\
  \ 追踪健身数据\n\n在今年苹果全球开发者大会上公布的所有功能中，最令人惊讶的当属 `HealthKit`——苹果的健康与健身追踪平台。虽然健康和健身是 App\
  \ Store 中最大的两个细分领域，但苹果此前一直扮演着幕后角色，提供 API 和硬件接口，但从未过多涉足软件层面（除了为 Nike+ 计步器开发配套应用）。`HealthKit`\
  \ 改变了这一切，它提供了一个健康数据存储库，鼓励所有开发者与之集成；同时，随 iOS 8 预装的健康应用也让用户能够查看其存储的数据。\n\n尽管你可以找到从步数统计到高度专业化的教练指导等各种应用，但在应用之间同步或共享信息却极其困难。例如，你可能有一个应用能出色地帮助你完成晨跑，另一个应用则鼓励你全天保持活跃，但合并这两个应用的数据几乎是不可能的。蓝牙和\
  \ WiFi 连接设备的普及只会加剧这一问题。几乎每个健康配件都需要其专属的自定义配套应用来与配件通信并记录数据。在 `HealthKit` 出现之前，没有一个好的方法可以在一个地方查看所有信息。\n\
  \n为了进一步扩展健康和健身功能，苹果从 iPhone 5S 开始，在每一款新 iOS 设备（包括 iPad Air、iPhone 6 和 iPhone 6 Plus）中内置了\
  \ M 系列运动协处理器。M 系列芯片提供了一套高度先进的传感器，减少了对提供相同功能的外部配件的需求。此外，M 系列芯片功耗极低，因此是感知运动的实用替代方案。据苹果称，M\
  \ 系列芯片的能效是苹果此前用于运动感应芯片的 100 倍。从 iOS 7 开始，苹果在其运动感应框架 `Core Motion` 中内置了对 M 系列协处理器的支持，现在量化这些数据变得更加容易。\n\
  \n在本章中，你将了解如何通过向 MyPod 应用添加运动追踪和日志记录功能来充分利用这两个框架。新应用将命名为 `MyFitnessPod`，并在源代码包的第\
  \ 13 章文件夹中提供。如图 13-1 所示，你将复用 MyPod 应用的媒体播放和播放列表选择功能，但还将添加锻炼控制和状态信息。切换播放按钮被移除，因为它与锻炼控制绑定：当用户开始、暂停或结束锻炼时，播放也会相应操作。\n\
  \n![9781430250838_Fig13-01.jpg](img/9781430250838_Fig13-01.jpg)\n\n图 13-1. MyFitnessPod\
  \ 项目设计草图\n\n你可能会好奇这与 `HealthKit` 和 `Core Motion` 有何关联。当用户开始锻炼时，`MyFitnessPod` 应用将使用\
  \ `Core Motion` 框架开始追踪活动。同样，当用户完成活动时，你将使用 `Core Motion` 结束活动，并将活动数据记录到 `HealthKit`。在活动进行期间，你将同时监控这两个框架，以显示每日步数和当前锻炼进度。\n\
  \n**注意** 本章需要 iOS 8 以及配备 M 系列运动协处理器的设备（iPhone 5S 或更新机型）才能完整实现。`Core Motion` 功能将无法在不兼容的设备上运行，且\
  \ `HealthKit` 在 iOS 8.0 之前的 SDK 版本中不可用。\n\n## 开始操作\n\n与之前的项目一样，本项目建立在你之前工作的基础上。首先从第\
  \ 7 章克隆 MyPod 项目，并将其重命名为 `MyFitnessPod`。如果你仍然不确定如何重命名项目，请参考第 8 章的“开始操作”部分。\n\n接下来，你需要添加必要的框架。在\
  \ Xcode 6 中，你将在框架浏览器中找到 `CoreMotion` 和 `HealthKit` 框架。最终的框架集应类似于图 13-2 中的示例。\n\n\
  ![9781430250838_Fig13-02.jpg](img/9781430250838_Fig13-02.jpg)\n\n图 13-2. MyFitnessPod\
  \ 项目使用的框架\n\n由于 `HealthKit` 访问敏感的用户信息，且某些用户可能希望选择退出，你需要将 `HealthKit` 访问权限添加到应用功能列表中。与之前的功能更改类似，导航到项目设置的“功能”选项卡。向下滚动到\
  \ `HealthKit` 并点击切换开关。系统将弹出一个对话框，要求你选择一个开发团队来关联应用，如图 13-3 所示。\n\n![9781430250838_Fig13-03.jpg](img/9781430250838_Fig13-03.jpg)\n\
  \n图 13-3. HealthKit 开发团队提示\n\n选择开发团队后，“功能”选项卡会将切换开关设置为“开”，并显示一系列勾选标记，表明你的应用已满足 `HealthKit`\
  \ 的所有要求，如图 13-4 所示。\n\n![9781430250838_Fig13-04.jpg](img/9781430250838_Fig13-04.jpg)\n\
  \n\n\n图 13-4. 成功的 HealthKit 配置\n\n由于许多用户会在锻炼过程中将设备设为睡眠模式，因此你还应打开“音频和 AirPlay”后台模式，如图\
  \ 13-5 所示。\n\n![9781430250838_Fig13-05.jpg](img/9781430250838_Fig13-05.jpg)\n\n\
  图 13-5. 启用后台音频\n\n**注意** `MyFitnessPod` 项目中包含的最终版本代码涵盖了第 9 章中的后台音频控制功能。此处未列出该代码以节省篇幅。如果你自行移植示例，请注意使用\
  \ `MPMusicPlayerController` 的播放消息，而非 `AVAudioPlayer` 类的消息。\n\n现在，项目已配置好 HealthKit\
  \ 和 Core Motion，你可以开始修改用户界面，添加锻炼控件和状态标签。图 13-6 展示了 `MyFitnessPod` 项目故事板的截图。请注意，这里没有新增视图控制器，只是在\
  \ `MainViewController` 上添加了额外的标签和按钮。\n\n![9781430250838_Fig13-06.jpg](img/9781430250838_Fig13-06.jpg)\n\
  \n图 13-6. MyFitnessPod 项目故事板\n\n要连接这些用户界面元素，一如既往地，你需要为每个项目添加 `IBOutlet` 属性和 `IBAction`\
  \ 处理方法。代码清单 13-1 展示了 `MainViewController` 类的头文件，其中新增项以粗体高亮显示。请使用这些内容将你的故事板连接到代码。\n\
