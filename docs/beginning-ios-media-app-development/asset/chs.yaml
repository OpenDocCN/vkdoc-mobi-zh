  ```\n\n\n\n要链接此类到您的`MainViewController`，请在头文件中包含它，并将`moviePlayer`的类型从`MPMoviePlayerController`改为`CustomPlayerController`。虽然此类中还未定义任何内容，但您将构建一组控件和通知，这些控件和通知紧密模仿`MPMoviePlayerController`类的设计。`MainViewController`类的完整头文件包含在\
  \ Listing 9-3 中。\n\n***Listing 9-3***. MainViewController 类的头文件\n\n```\n#import\
  \ <UIKit/UIKit.h>\n#import \"CustomPlayerController.h\"\n#import \"FileViewController.h\"\
  \n\n@interface MainViewController : UIViewController\n    <FileControllerDelegate>\n\
  \n@property (nonatomic, strong) IBOutlet UIView *playerView;\n@property (nonatomic,\
  \ strong) CustomPlayerController *moviePlayer;\n\n@end\n```\n\n对于本项目，目标是专注于构建自定义播放界面的基础知识。大多数用户期望在全屏模式下看到完整的控件集；这些示例将帮助您构建一个全屏播放控制器。\n\
  \n要以全屏模式呈现新的播放控制器，请修改文件选择器委托`[FileControllerDelegate didFinishWithFile:]`中的呈现代码。用户选择文件后，您应尝试使用所选内容\
  \ URL 初始化`CustomPlayerController`。如 Listing 9-4 所示，将所有`MPMoviePlayerController`初始化代码替换为对`[CustomPlayerController\
  \ initWithContentURL:]`的调用。为简化消息传递过程，您将把`MPMoviePlayerController`的设置代码封装到`CustomPlayerController`类的初始化方法中。\n\
  \n***Listing 9-4***. 呈现您的`CustomPlayerController`\n\n```\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n{\n    NSArray *paths =\n        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \    NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSString *relativePath = [documentsDirectory\n        stringByAppendingPathComponent:filePath];\n\
  \nNSURL *fileURL = [NSURL fileURLWithPath:relativePath];\n    self.moviePlayer =\
  \ [[CustomPlayerController alloc]\n        initWithContentURL:fileURL];\n\n}\n```\n\
  \n## 构建用户界面\n\n使用`AVFoundation`框架构建自己的视频播放界面的一个优势是，您可以通过 Interface Builder 布置自己的用户界面。另一种自定义播放界面的流行方法是子类化`MPPlayerViewController`类并覆盖控制栏。不幸的是，您无法通过使用`MPPlayerViewController`的子类来构建故事板元素，因为它不会注册为\
  \ Interface Builder 兼容对象。\n\n使用`AVFoundation`框架时，您可以通过创建一个`UIViewController`的新子类并将项目直接放置在故事板上，来避免这种麻烦。此外，您还可以利用自动布局，这将使您的用户界面能够跨多种屏幕尺寸进行缩放。\n\
  \n首先，从 Interface Builder 对象库中拖动一个视图控制器到您的故事板上。在属性检查器中，为类和故事板 ID 都输入**CustomPlayerController**，如\
  \ Figure 9-5 所示。\n\n![9781430250838_Fig09-05.jpg](img/9781430250838_Fig09-05.jpg)\n\
  \nFigure 9-5. CustomPlayerController 故事板元素的属性\n\n因为您将以编程方式呈现`CustomPlayerController`，所以不需要定义\
  \ segue。但是，要获取自定义用户界面，您需要使用故事板而非默认构造器来初始化`CustomPlayerController`对象。如 Listing 9-5\
  \ 所示，您可以通过获取项目`UIStoryboard`对象的引用，然后使用其故事板 ID 拉取`CustomPlayerController`的故事板来执行此操作。此代码替换了您在`[self\
  \ initWithContentUrl:]`方法中对`[super init]`的通用调用。\n\n***Listing 9-5***. 从故事板初始化`CustomPlayerController`\n\
  \n```\n-(id)initWithContentURL:(NSURL *)contentURL\n{\n    UIStoryboard *storyboard\
  \ = [UIStoryboard\n        storyboardWithName:@\"Main\" bundle:nil];\n    CustomPlayerController\
  \ *myViewController = [storyboard\n    instantiateViewControllerWithIdentifier:@\"\
  CustomPlayerController\"];\n\nself = myViewController;\n    if (self) {\n      \
  \  ....\n    }\n    return self;\n}\n```\n\n在 Figure 9-6 中，我从应用程序的模拟图中提取了播放界面。请注意，用户界面有三个主要区域：顶部的控制栏、底部的控制栏和屏幕中央的控制区域。\n\
  \n![9781430250838_Fig09-06.jpg](img/9781430250838_Fig09-06.jpg)\n\nFigure 9-6. 视频播放界面模拟图\n\
  \n要构建控制区域，请从对象库中拖放三个`UIView`对象到您的故事板上，如 Figure 9-7 所示。顶部和底部的视图将充当非正式的导航栏，中央视图将用于放置控件。\n\
  \n![9781430250838_Fig09-07.jpg](img/9781430250838_Fig09-07.jpg)\n\nFigure 9-7. 添加容器视图\n\
  \n为支持多种屏幕尺寸，您需要为元素启用*自动布局*。使用自动布局，您可以指定哪些定位元素需要被约束（固定），并允许其余元素自适应屏幕尺寸。如 Figure 9-8\
  \ 所示，您可以通过在 Interface Builder 中选择一个项目，导航到窗口底部的 Pin 按钮（下方圈出），然后点击表示您想要“固定”的元素的虚线或复选框来设置约束。\n\
  \n![9781430250838_Fig09-08.jpg](img/9781430250838_Fig09-08.jpg)\n\nFigure 9-8. 自动布局\
  \ Pin 对话框\n\n对于导航栏，将视图固定到屏幕的左侧和右侧，以及顶部或底部。您可以在 Figure 9-9 中找到底部导航栏的示例。对顶部栏执行相同操作。\n\
  \n![9781430250838_Fig09-09.jpg](img/9781430250838_Fig09-09.jpg)\n\nFigure 9-9. 固定底部导航栏\n\
  \n对于中央控制面板，您不需要担心屏幕尺寸；相反，您需要担心其在屏幕中央的位置。要居中对齐此面板，请固定其宽度和高度，然后使用 Align 按钮将元素在其容器中对齐，如\
  \ Figure 9-10 所示。\n\n![9781430250838_Fig09-10.jpg](img/9781430250838_Fig09-10.jpg)\n\
  \nFigure 9-10. 居中对齐播放控件\n\n\n\n接下来，您就可以开始向播放界面中添加控件了。以图 9-6 为指导，但请特别注意：在放置元素时，确保直接将其拖放到视图（`view`）之上。这样操作相当于将元素作为子视图（subview）添加，使得您可以通过修改容器来显示或隐藏整个面板。例如，要隐藏所有播放控件，您只需隐藏中央控制面板即可。您可以通过确认元素在*文档大纲*（Interface\
  \ Builder 的左侧面板）中的层次位置，来验证它们是否已作为子视图添加。参考图 9-11，您可以确认当前时间标签（`Current Time` label）已添加到屏幕底部的控制栏中，因为该标签在元素层级中出现在视图（`view`）之下。\n\
  \n![9781430250838_Fig09-11.jpg](img/9781430250838_Fig09-11.jpg)\n\n图 9-11 验证视图层级\n\
  \n为了帮助您连接用户界面的其余部分，代码清单 9-6 展示了`CustomPlayerController`类的头文件。将按钮的动作（action）连接到按钮的*Touch\
  \ Up Inside*事件，并将滑块事件连接到滑块的*Value Changed*事件。\n\n***代码清单 9-6*** `CustomPlayerController`类的头文件\n\
  \n```objc\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
  \ CustomPlayerController : UIViewController\n\n@property (nonatomic, strong) IBOutlet\
  \ UIView *controlView;\n@property (nonatomic, strong) IBOutlet UIButton *playbackButton;\n\
  @property (nonatomic, strong) IBOutlet UIButton *seekFwdButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *seekBackButton;\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *doneButton;\n\n@property (nonatomic, strong) IBOutlet UISlider *timeSlider;\n\
  @property (nonatomic, strong) IBOutlet UILabel *progressLabel;\n@property (nonatomic,\
  \ strong) IBOutlet UILabel *totalTimeLabel;\n\n-(IBAction)seekBackward:(id)sender;\n\
  -(IBAction)seekForward:(id)sender;\n-(IBAction)sliderChanged:(UISlider *)sender;\n\
  -(IBAction)togglePlayback:(id)sender;\n-(IBAction)done:(id)sender;\n\n-(void)play;\n\
  \n-(id)initWithContentURL:(NSURL *)contentURL;\n\n@end\n```\n\n要隐藏中央控制面板，请记得链接该类的`controlView`属性。完成后，您可以将该元素的背景颜色设置为*clear*（透明），从而使播放控件看起来像是悬浮在界面上。\n\
  \n## 使用`AVPlayer`类进行媒体播放\n\n`AVFoundation`框架允许您通过`AVPlayer`类播放视频文件。尽管它不提供用户界面，但该类提供了播放控制（包括进度拖拽和播放切换）、事件（包括*加载状态*或*播放完成*）以及有限的硬件控制（包括\
  \ AirPlay 和音量）。该类设计为接收`AVPlayerItem`对象作为输入，并可以将其输出直接传递给`AVPlayerLayer`类，您可以将`AVPlayerLayer`显示在`UIView`之上。要控制播放，您需要在`CustomPlayerController`头文件中为`AVPlayerItem`和`AVPlayer`添加实例变量：\n\
  \n```objc\n@property (nonatomic, strong) AVPlayerItem *playerItem;\n@property (nonatomic,\
  \ strong) AVPlayer *player;\n```\n\n要使用`AVPlayer`类检查输入的有效性，您需要尝试加载文件。当`AVPlayer`对象的`status`为`AVStatusReadyToPlay`时，表示文件已准备好播放。为了捕获此状态变化，您需要使用键值观察（KVO），这是一种基于订阅的消息传递机制，类似于通知。对于\
  \ KVO，您需要指定一个要*观察*的对象属性（key）。对于`AVPlayer`的状态变化，您需要观察`status`属性。您可以在第 12 章中找到关于键值观察的详细说明，届时您将使用新的`AVKit`框架开发一个更复杂的基于`AVPlayer`的媒体播放器。\n\
  \n代码清单 9-7 展示了如何开始`AVPlayer`的初始化过程——通过输入 URL 创建一个`AVPlayerItem`，初始化一个`AVPlayer`对象，并设置一个观察者。\n\
  \n***代码清单 9-7*** 初始化`AVPlayer`\n\n```objc\n-(id)initWithContentURL:(NSURL *)contentURL\n\
