  \        [alert show];\n    }\n\n}\n```\n\n### 构建播放控制\n\n在创建用户界面、初始化`AVPlayer`对象并设置类似`MediaPlayer`的通知后，你可以开始实现播放控制和用户界面更新。`CustomPlayerController`的主要控件包括向前或向后跳过、切换播放以及拖拽到播放器中的特定时间点。用户可以通过顶部控制视图中的“完成”按钮关闭播放界面。\n\
  \n#### 切换播放\n\n在`CustomPlayerController`类的头文件中，我将`[CustomPlayerController togglePlayback:]`声明为切换播放状态的方法。为了构建熟悉的用户界面，使用一个按钮来开始或停止播放。为了确定应执行哪个操作，向`CustomPlayerController`类添加一个`BOOL`实例变量：\n\
  \n```\n@property (nonatomic, assign) BOOL isPlaying;\n```\n\n你可以使用`AVPlayer`对象上的`[AVPlayer\
  \ play]`和`[AVPlayer pause]`方法控制播放。如列表 9-13 所示，为了维护状态，在开始或停止播放后更新`isPlaying`属性和用户界面。\n\
  \n**列表 9-13**。切换播放\n\n```\n-(IBAction)togglePlayback:(id)sender\n{\n    if (self.isPlaying)\
  \ {\n        [self.player pause];\n\n[self.playbackButton setTitle:@\"Play\"\n \
  \           forState:UIControlStateNormal];\n\n} else {\n        [self.player play];\n\
  \n[self.playbackButton setTitle:@\"Pause\"\n            forState:UIControlStateNormal];\n\
  \n}\n    self.isPlaying = !self.isPlaying;\n}\n```\n\n#### 向前/向后跳过\n\n类似于可以使用`AVPlayer`对象开始或停止媒体播放，你也可以使用它来在播放中向后或向前跳转几秒。当用户想要回放以捕捉错过的镜头，或跳过不感兴趣的镜头时，这是一个方便的功能。\n\
  \n为了实现跳过，你将使用与第 6 章中类似的方法。查询当前播放项以获取其播放位置，然后检查目标时间（+/- 5 秒）是否有效。如果用户尝试向后跳过视频中不到\
  \ 5 秒的位置，则跳到开头。如果他们尝试在剩余时间不到 5 秒时向前跳过，则忽略该事件。与更新用户界面的代码一样，你可以通过查询`AVPlayerItem`对象上的`currentTime`属性来确定文件的播放位置。\n\
  \n\n\n你可以在代码清单 9-14 和 9-15 中找到 `CustomPlayerController` 类的 `[self skipForward]`\
  \ 和 `[self skipBackward]` 方法。跳转到新的播放位置后，请立即更新用户界面，以便用户了解变化。\n\n***代码清单 9-14***.\
  \ 快进\n\n```\n-(IBAction)seekForward:(id)sender\n{\n    NSInteger duration = CMTimeGetSeconds([self.playerItem\
  \ duration]);\n    NSInteger currentTime = CMTimeGetSeconds(\n       [self.playerItem\
  \ currentTime]);\n\nfloat desiredTime = currentTime + 5;\n    if (desiredTime <\
  \ duration) {\n        CMTime seekTime = CMTimeMakeWithSeconds(desiredTime, 1);\n\
          [self.player seekToTime:seekTime];\n\n[self updateProgress];\n    }\n}\n\
  ```\n\n***代码清单 9-15***. 快退\n\n```\n-(IBAction)seekBackward:(id)sender\n{\n    NSInteger\
  \ currentTime = CMTimeGetSeconds([self.playerItem\n        currentTime]);\n\nfloat\
  \ desiredTime = currentTime - 5;\n\nif (desiredTime < 0) {\n        CMTime seekTime\
  \ = CMTimeMakeWithSeconds(0.0f, 1);\n        [self.player seekToTime:seekTime];\n\
      } else {\n        CMTime seekTime = CMTimeMakeWithSeconds(desiredTime, 1);\n\
          [self.player seekToTime:seekTime];\n    }\n\n[self updateProgress];\n}\n\
  ```\n\n## 使用播放进度条\n\n要启用底部栏中滑块进行跳转的功能，你需要实现该元素的“值已更改”事件。*值已更改*事件在用户完成移动滑块内部指示器时触发。虽然`touch\
  \ up inside`适用于按钮（因为最终事件是松开按钮），但对于滑块，你需要捕获用户完全完成值更改的时刻，而不仅仅是用户手指离开元素（手指接触滑块的任何部分都可能触发该事件）。\n\
  \n对于事件的处理器方法，在 `CustomViewController` 的头文件中添加一个名为 `sliderChanged:` 的 `IBAction`\
  \ 处理器方法：\n\n```\n-(IBAction)sliderChanged:(id)sender;\n```\n\n要捕获*值已更改*事件，请将该事件绑定到界面构建板中的\
  \ `timeSlider`。如图 9-12 所示，与其他用户界面事件相同，在连接检查器中按住“值已更改”单选按钮，然后将光标拖拽到界面构建板中的 `CustomViewController`\
  \ 上。松开光标时，会显示一个有效的 `IBAction` 方法列表。选择 `sliderChanged:` 方法。\n\n![9781430250838_Fig09-12.jpg](img/9781430250838_Fig09-12.jpg)\n\
  \n图 9-12. 连接“值已更改”事件\n\n既然你已经了解了如何捕获事件的上下文，那么你需要学习如何处理事件信息。视频进度条允许用户跳转到视频中的任意时间点。当你更新用户界面以显示播放进度时，你通过计算视频的*完成百分比*（当前时间/总时间）来设置进度条的位置。现在用户有了进度条，你希望通过使用新值来重新计算这一时间。如代码清单\
  \ 9-16 所示，你可以从 `UISlider` 对象的 `value` 属性中获取新值。\n\n***代码清单 9-16***. 播放进度条处理器\n\n\
  ```\n-(IBAction)sliderChanged:(UISlider *)sender\n{\n    float progress = sender.value;\n\
      NSInteger durationSeconds = CMTimeGetSeconds([self.playerItem duration]);\n\
      float result = durationSeconds * progress;\n    CMTime seekTime = CMTimeMakeWithSeconds(result,\
  \ 1);\n\n[self.player seekToTime:seekTime];\n\n}\n```\n\n`value` 属性是一个介于 `0` 和 `1`\
  \ 之间的 `float` 值。将视频的*持续时间*乘以该值，即可找到新的播放位置。跳转到指定时间后，调用 `[self updateProgress]` 方法立即更新用户界面（用户期望看到他们拖拽到的新时间）。\n\
  \n## 关闭播放界面\n\n要关闭播放控制器，你需要向其呈现视图控制器（你的 `MainViewController` 对象）发送一条消息。为模拟 `MPMoviePlayerController`\
  \ 类的行为，当用户点击“完成”按钮时，发布一条名为 `customPlayerDidFinish` 的通知，如代码清单 9-17 所示。\n\n***代码清单\
  \ 9-17***. “完成”按钮处理器\n\n```\n-(IBAction)done:(id)sender\n{\n    NSDictionary *userDict\
  \ = [NSDictionary dictionaryWithObject:@\"user finished\"\n        forKey:@\"reason\"\
  ];\n    [[NSNotificationCenter defaultCenter]\n         postNotificationName:@\"\
  customPlayerDidFinish\" object:userDict];\n}\n```\n\n要处理此消息，在 `MainViewController`\
  \ 类的 `[self viewDidLoad]` 方法中添加一个 `customPlayerDidFinish` 通知的观察者；同样，在 `[self dealloc]`\
  \ 方法中移除该观察者。`MainViewController` 类的最终视图销毁和设置方法如代码清单 9-18 和 9-19 所示。\n\n***代码清单 9-18***.\
  \ MainViewController 视图设置方法\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
      // 加载视图后进行任何额外设置，通常来自 nib 文件。\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
          selector:@selector(playbackFinished:)\n        name:@\"customPlayerDidFinish\"\
  \n        object:nil];\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
          selector:@selector(loadStateChanged:)\n        name:@\"customPlayerLoadStateChanged\"\
  \ object:nil];\n}\n```\n\n***代码清单 9-19***. MainViewController 视图销毁方法\n\n```\n- (void)dealloc\n\
  {\n    [[NSNotificationCenter defaultCenter] removeObserver:self\n        name:@\"\
  customPlayerDidFinish\" object:nil];\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self\n        name:@\"customPlayerLoadStateChanged\" object:nil];\n\
  \n}\n```\n\n在通知的处理器方法中（代码清单 9-19 指定为 `[self playbackFinished:]`），调用 `[self dismissViewController:animated:]`。为了给此方法添加错误处理，我在\
  \ `userDict` 中创建了一个 `error` 条目，你可以用它来检查播放是否因错误而失败。`MainViewController` 类的“播放完成”处理器如代码清单\
  \ 9-20 所示。\n\n***代码清单 9-20***. 播放完成处理器方法\n\n```\n-(void)playbackFinished:(NSNotification\
  \ *) notification\n{\n\nNSDictionary *userInfo = notification.userInfo;\n    NSString\
  \ *finishReason = [userInfo objectForKey:@\"reason\"];\n\n[self dismissViewControllerAnimated:YES\
  \ completion:^{\n\nif ([finishReason isEqualToString:@\"error\"]) {\n            NSError\
  \ *error = [userInfo objectForKey:@\"error\"];\n            NSString *errorString\
  \ = [error description];\n\nUIAlertView *alert = [[UIAlertView alloc]\n                initWithTitle:@\"\
  Error!\" message:errorString\n                delegate:nil cancelButtonTitle:@\"\
  OK\"\n                otherButtonTitles:nil];\n            [alert show];\n        }\n\
  \n}];\n\n}\n```\n\n## 添加用户界面更新\n\n为了改进 MyCustomVideoPlayer 应用程序的用户界面，你应添加用户界面更新，以隐藏播放控件并指示当前播放进度，这两者都可以通过巧妙使用定时器来实现。\n\
  \n用户开始播放后，你应该更新“当前时间”标签和进度条，以指示当前播放位置。此外，在几秒钟无操作后，你应该隐藏中央播放控制面板。\n\n### 更新播放进度\n\
  \n\n\n为了更新播放进度，你可以复用第 6 章 MyPlayer 音频应用中类似的逻辑。创建一个每秒触发一次的定时器，并在其处理程序方法中执行用户界面更新。对于`CustomPlayerController`类，用户期望进度滑块（视频拖拽条）和进度标签（位于滑块左侧）每秒更新一次。\n\
  \n创建一个名为`[self updateProgress]`的方法来包含此用户界面更新代码。要显示进度，你需要知道视频的总时长和当前播放位置。你可以通过当前加载的`AVPlayerItem`对象上的`duration`和`currentTime`属性来查询这些信息。对于`CustomViewController`类，这对应实例变量`playerItem`。对于`progressLabel`，你可以简单地将`currentTime`转换为分钟和秒后进行显示。滑块则稍微复杂一些——但也复杂不到哪里去。\n\
  \n视频拖拽条是任何视频播放用户界面的关键组成部分。它允许用户跳转到视频中的某个位置并查看当前播放状态。它看起来像一个进度条，因为它本来就是。要获取进度，你需要知道视频已“观看”了多少，与剩余多少相比。你可以通过将当前时间除以总时长来得到这个比例。例如，如果用户观看了一段\
  \ 60 秒视频中的 30 秒，那么进度应为 50%。当你以`0`到`1`之间的`float`形式获得新值后，可以通过设置`value`属性将其应用于`UISlider`。\n\
  \n***列表 9-21*** 展示了`CustomViewController`类的`[self updateProgress]`方法，该方法更新进度标签和滑块。\n\
  \n```\n-(void)updateProgress\n{\n\nNSInteger durationMinutes = CMTimeGetSeconds(\n\
          [self.playerItem duration]) / 60;\n    NSInteger durationSeconds = CMTimeGetSeconds(\n\
          [self.playerItem duration])  - durationMinutes * 60;\n\nNSInteger currentTimeMinutes\
  \ = CMTimeGetSeconds(\n        [self.playerItem currentTime]) / 60;\n    NSInteger\
  \ currentTimeSeconds = CMTimeGetSeconds(\n        [self.playerItem currentTime])  -\
  \ currentTimeMinutes * 60;\n\nself.timeSlider.value = CMTimeGetSeconds(\n        [self.playerItem\
  \ currentTime])/CMTimeGetSeconds(\n        [self.playerItem duration]) + 0.0f;\n\
  \nself.progressLabel.text = [NSString stringWithFormat:@\"%02ld:%02ld\",\n        currentTimeMinutes,\
  \ currentTimeSeconds];\n    self.totalTimeLabel.text = [NSString stringWithFormat:@\"\
  %02ld:%02ld\",\n        durationMinutes, durationSeconds];\n\n}\n```\n\n与 MyPlayer\
  \ 应用非常相似，你只应在视频播放处于活动状态时更新进度。如 ***列表 9-22*** 所示，如果用户正在开始播放，则创建一个每秒触发一次的定时器；否则，使现有定时器失效以停止它。\n\
  \n```\n-(IBAction)togglePlayback:(id)sender\n{\n    if (self.isPlaying) {\n        [self.player\
  \ pause];\n\n[self.playbackButton setTitle:@\"Play\"\n            forState:UIControlStateNormal];\n\
  \n[self showControls:nil];\n\n[self.updateTimer invalidate];\n\n} else {\n        [self.player\
  \ play];\n\n[self.playbackButton setTitle:@\"Pause\"\n            forState:UIControlStateNormal];\n\
  \nself.updateTimer = [NSTimer scheduledTimerWithTimeInterval:1.0f\n            target:self\
  \ selector:@selector(updateProgress) userInfo:nil\n            repeats:YES];\n    }\n\
      self.isPlaying = !self.isPlaying;\n}\n```\n\n你会注意到，这里我调用了`[NSTimer scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:]`构造方法来初始化定时器，而不是`[NSTimer\
  \ timerWithTimeInterval:target:selector:userInfo:repeats:]`。由于定时器更新需要被主线程捕获才能执行，*调度*定时器是强制此行为的好方法。\n\
  \n### 自动隐藏播放控件\n\n虽然播放控件对用户很方便，但如果它们一直停留在播放器视图之上，可能会令人烦恼。一些视频应用（包括 Apple 的应用）通过在一段时间无操作后隐藏控件来解决这个问题。当用户点击视频区域时，你通常可以正确假设用户即将拖拽视频或需要切换播放/暂停。类似地，如果\
  \ 1 或 2 秒过去用户没有触摸任何元素，你可以安全地假设用户操作已结束。\n\n你可以通过向播放视图添加一个`UITapGestureRecognizer`来检测此类活动。*手势识别器*内置于许多`UIKit`类中，例如`UIButton`，并驱动熟悉的事件，例如*touch\
  \ up inside*。与任何其他事件一样，你需要定义要监视的手势以及捕获事件时要调用的`IBAction`处理方法。在 Interface Builder\
  \ 中，要向任何元素添加手势识别器，请将其从对象库中拖出并放到你的目标上。对于播放视图，将一个*Tap 手势识别器*拖到`CustomPlayerController`的`view`属性上，如\
  \ ***Figure 9-13*** 所示。\n\n![9781430250838_Fig09-13.jpg](img/9781430250838_Fig09-13.jpg)\n\
  \n***Figure 9-13***. 向`CustomPlayerController`类添加一个`UITapGestureRecognizer`\n\n\
  对于处理方法，在你的头文件中创建一个名为`[self showControls:]`的`IBAction`方法。\n\n```\n-(IBAction)showControls:(id)sender;\n\
  ```\n\n要将处理方法连接到手势识别器，请在连接检查器中按住“已发送操作”下的`selector`属性，并将其拖到`CustomPlayerController`上，如\
  \ ***Figure 9-14*** 所示。从下拉菜单中选择`[self showControls:]`方法。\n\n![9781430250838_Fig09-14.jpg](img/9781430250838_Fig09-14.jpg)\n\
  \n***Figure 9-14***. 将`UITapGestureRecognizer`连接到处理方法\n\n顾名思义，在`[self showControls:]`中，你应该显示播放控件。然而，你还应该启动一个定时器，在\
  \ 2 秒后隐藏控件。如 ***列表 9-23*** 所示，要显示控件，将子视图置于最前面（这将使其显示在视频之上）并启用用户交互触摸事件。要隐藏控件，创建一个名为`controlTimer`的实例变量，并令其处理方法为`[self\
  \ hideControllers:]`。为防止冲突的定时器事件，如果之前的定时器不为`nil`，则将其禁用。\n\n```\n-(IBAction)showControls:(id)sender\n\
  {\n    if (self.controlTimer != nil)\n        [self.controlTimer invalidate];\n\n\
  [self.view bringSubviewToFront:self.controlView];\n    self.controlView.userInteractionEnabled\
  \ = YES;\n\nif (sender != nil) {\n        self.controlTimer = [NSTimer scheduledTimerWithTimeInterval:2.0f\n\
              target:self selector:@selector(hideControls:) userInfo:nil\n            repeats:NO];\n\
      }\n}\n```\n\n要隐藏控件，反转该过程。将播放控件移到预览层后面，并禁用触摸事件，以免产生任何误触发，如 ***列表 9-24*** 所示。\n\
  \n```\n-(IBAction)hideControls:(id)sender\n{\n    [self.view sendSubviewToBack:self.controlView];\n\
      self.controlView.userInteractionEnabled = NO;\n}\n```\n\n你可以使用相同的过程来隐藏屏幕顶部和底部的栏。只需在你的类中定义它们，并将其添加到通过点击和定时器事件隐藏或显示的视图列表中。\n\
  \n\n\n## 构建自定义视频录制界面\n\n在本章中，你将学习如何使用 `AVFoundation` 框架构建自定义播放控制器。你将看到，通过精心使用视图定位和自动布局，可以构建一个既符合品牌形象，又能灵活适配各种屏幕尺寸的用户界面。\n\
  \n为了实现媒体播放，你学习了如何使用 `AVPlayer` 类加载文件，以及如何通过观察状态变化来判断文件是否加载成功。利用同一个对象，你构建了播放控制功能，允许用户切换播放状态、向前或向后跳转几秒，以及拖拽到视频中的任意位置。\n\
  \n最后，为了给应用增添一丝灵动之感，你添加了界面更新功能：当用户不与应用交互时，隐藏中央的播放控制按钮，并根据当前播放位置更新当前时间标签和进度条。\n\n\
  尽管这个用户界面和播放栈的设置代码比直接使用 `MPMoviePlayerController` 类要复杂一些，但最终的成果是一个自定义播放控制器，它既能模仿\
  \ `MPMoviePlayerController` 类的功能和消息传递系统，又允许你添加自己的品牌元素。\n\n"
- "# 第 10 章：构建自定义视频录制界面\n\n为了结束视频部分的学习，你将“用更复杂的方式”构建自己的视频录制界面。正如你在处理其他媒体功能时所看到的，Cocoa\
  \ Touch 为视频捕捉提供了一个出色的内置界面——但前提是你愿意接受其界面和功能上的限制。当你想要突破这些限制，自定义视频捕捉界面以更好地适应工作流程或品牌需求时，就需要构建自己的用户界面。为此，你需要接入\
  \ `AVFoundation` 的底层图像捕捉功能。\n\n如果这一切听起来很熟悉，那是因为确实如此。通过重复你在第 4 章中构建自定义静态图像界面时使用的许多相同步骤，你可以构建一个自定义视频捕捉界面。正如你在第\
  \ 4 章学到的，实现静态图像界面需要以下主要步骤：\n\n1. 发现并配置摄像头硬件。\n2. 构建能够显示实时摄像头画面的用户界面。\n3. 从界面修改捕捉设置。\n\
  4. 当用户按下“拍照”按钮时保存图像。\n\n要将这个工作流程调整为视频捕捉，你需要执行以下操作：\n\n1. 配置用于视频的捕捉会话。\n2. 添加视频专用的捕捉控件。\n\
  3. 当用户完成录制时显示预览界面。\n4. 重构消息传递接口以处理更大的文件。\n\n在本章中，你将通过实现 `MyCustomRecorder` 项目（你可以在第\
  \ 10 章文件夹中找到代码）来构建一个自定义视频录制界面，该项目首次出现在第 9 章中，并通过“录制视频”按钮添加了视频捕捉功能。你将复用 `MyCustomPlayer`\
  \ 项目的代码来实现所有视频播放功能。用户可以在开始录制视频之前修改捕捉设置。录制完成后，他们将看到一个预览界面，可以在其中选择接受或拒绝刚刚拍摄的视频。\n\n\
  ![9781430250838_Fig10-01.jpg](img/9781430250838_Fig10-01.jpg)\n\n*图 10-1. MyCustomRecorder\
  \ 项目示意图*\n\n在图 10-2 中，你可以将 `MyCustomRecorder` 项目与第 4 章中的 `MyCamera` 静态图像捕捉项目进行对比。可以看出，除了预览界面和捕捉设置外，应用的整体流程是相同的。\n\
  \n![9781430250838_Fig10-02.jpg](img/9781430250838_Fig10-02.jpg)\n\n*图 10-2. MyCamera\
  \ 静态图像捕捉项目示意图*\n\n本章在很大程度上依赖于你在第 4 章中学习的使用 `AVFoundation` 进行图像捕捉的知识。如果你还没有掌握那个主题，我建议在继续之前先复习一下第\
  \ 4 章。本项目复用了第 4 章中的许多图像捕捉代码示例，但我对核心类（如 `AVCaptureInputDevice` 和 `AVCaptureSession`）的讲解将不会那么深入。\n\
  \n## 开始之前\n\n在本章中，你的主要重点是视频捕捉。首先，从第 9 章克隆 `MyCustomPlayer` 项目，以获得基本的用户界面和视频播放界面。克隆项目的方法是在\
  \ Finder 中复制它，然后在 Xcode 中打开。如图 10-3 所示，请注意，你可以通过仔细点击项目导航器中项目文件的名称来重命名项目。\n\n![9781430250838_Fig10-03.jpg](img/9781430250838_Fig10-03.jpg)\n\
  \n*图 10-3. 重命名项目*\n\n要构建自定义视频捕捉界面，你需要使用 `AVFoundation` 框架的图像捕捉类。与之前的项目一样，在项目设置的“Linked\
  \ Frameworks” 中添加此框架。你最终包含的框架列表应类似于图 10-4 中的示例。\n\n![9781430250838_Fig10-04.jpg](img/9781430250838_Fig10-04.jpg)\n\
  \n*图 10-4. MyCustomRecorder 项目的框架列表*\n\n`MyCamera` 项目的设备设置代码、用户界面和协议都封装在 `CameraViewController`\
  \ 类中。由于用户界面和协议与 `UIImagePickerControllerView` 类非常相似，你应该将它们用作 `MyCustomRecorder`\
  \ 项目的基础。从 `MyCamera` 项目中复制这些文件。\n\n## 设置硬件接口\n\n包含项目的基础类之后，你可以开始修改 `CameraViewController`\
  \ 类以支持视频捕捉。在处理用户界面之前，你需要确保摄像头的硬件接口已正确设置为视频捕捉模式。\n\n回顾第 4 章，用于配置媒体捕捉的类如下：\n\n- `AVCaptureDevice`：表示你将访问的硬件设备\n\
  - `AVCaptureInput`：表示你正在访问的数据流（例如，摄像头的视频流，麦克风的音频流）\n- `AVCaptureOutput`：表示设备捕捉到的数据（例如，一个视频文件）\n\
  - `AVCaptureSession`：管理输入数据流与输出之间的接口\n\n在 `CameraViewController` 类中，硬件初始化代码位于 `[CameraViewController\
  \ viewDidLoad]` 和 `[CameraViewController initializeCameras]` 方法中。用于静态图像捕捉的硬件初始化代码已在代码清单\
  \ 10-1 中高亮显示。在本节中，你将更改这些设置，使其适用于视频。\n\n***代码清单 10-1*** *静态图像捕捉的硬件接口设置*\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 在此添加视图加载后的额外设置\n\n    self.previewView.autoresizingMask\
