  \n以下是翻译结果：\n\n\n在`[self loadStateChanged]`方法中，你应该通过检查`ready`或`error`来解码通知。通过在`MainViewController`类中处理状态变化消息，而不是在`CustomPlayerController`类中，可以避免在文件加载失败时呈现播放界面。如列表\
