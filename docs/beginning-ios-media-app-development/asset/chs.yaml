  \ iPad 的情节提要。\n\n## 配置音频会话\n\n与相机非常相似，您的 iOS 设备的音频功能是一种共享资源。Apple 通过*音频会话*的概念（由`AVAudioSession`表示）提供对系统音频控制器的访问。所有\
  \ iOS 应用都带有一个默认的音频会话，但在您对其进行配置之前，您的应用将无法利用全部音频功能。\n\n配置音频会话允许您指定应用将执行的音频活动类型（例如录制和播放）、应用应如何与其他竞争音频资源的应用交互的偏好（例如，混合音轨，忽略所有其他音频源），以及处理硬件事件（例如用户拔下耳机）的方式。\n\
  ```\n\n\n尽管实现音频播放看起来需要大量工作，但`AVFoundation`提供了多种快捷方式，让配置音频会话变得简单，如代码清单 5-3 所示。\n\n\
  ***代码清单 5-3***. 为播放配置音频会话\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
          // 加载视图后执行任何额外设置，\n        // 通常来自 nib 文件。\n\nNSError *error = nil;\n    [[AVAudioSession\
  \ sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\n                                          \
  \ error:&error];\n    if (error == nil) {\n        NSLog(@\"音频会话初始化成功\");\n    }\
  \ else {\n        NSLog(@\"初始化播放音频文件时出错：音频会话：%@\",\n              [error description]);\n\
      }\n}\n```\n\n在此示例中，你可以通过单例对象 `[AVAudioSession sharedInstance]` 访问应用的音频会话，如前所述，该对象会随应用自动生成。我们的应用默认被配置为所有音频会话消息的`delegate`对象。要指定你的应用播放音频，请使用系统宏\
  \ `AVAudioSessionCategoryPlayback`，这表示应用需要控制系统音频资源来播放声音。将此代码块添加到主视图控制器的 `[UIViewController\
  \ viewDidLoad:]` 方法中，以指定你的应用在视图加载时想要控制音频会话。\n\n## 使用单例\n\n*单例* 是在应用中仅实例化一次的对象。所有操作都在一个共享对象上执行。与全局变量不同，单例是*延迟加载*\
  \ 的，这意味着它在首次被调用时才被实例化。\n\n在访问共享资源时，单例非常方便，因为它允许你创建一个管理器，通过它来传递所有操作。通过使用在整个应用程序中共享的单个管理器对象，你无需重复编写设置/拆卸代码（这些代码仅在对象初始化或销毁时调用），并且可以确保你的操作在有效对象上执行。\n\
  \n要声明一个单例，你可以在头文件中定义一个公共方法，方法名使用共享对象的名称。如果你希望应用委托可以作为一个单例访问，你的头文件应如下所示：\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n+(AppDelegate*)sharedInstance;\n\
  \n@end\n```\n\n要实现你的延迟加载逻辑，定义一个全局变量（`static`对象）来存储你的共享对象，并通过 `sharedInstance` 方法传递所有消息。如果全局变量已初始化，它将返回指针；否则，它将初始化对象并返回指针。\n\
  \n```\nstatic AppDelegate *shared;\n+(AppDelegate*)sharedInstance{\n    if (!shared\
  \ || shared==nil) {\n        shared = [[AppDelegate alloc] init];\n    }\n    return\
  \ shared;\n}\n```\n\n你可以在任何类中使用你的单例对象，方法就像使用其他任何对象一样，包含其头文件并向其传递消息：\n\n```\n#include\
  \ \"AppDelegate.h\"\n\n@implementation myClass\n\n-(void)viewDidLoad {\n    [[appDelegate\
  \ sharedInstance] refreshSession];\n}\n```\n\n尽管此示例使用了 `AVAudioSessionCategoryPlayback`\
  \ 宏，但你也可以利用各种预配置的宏。表 5-1 列出了最常用的宏及其用途。\n\n表 5-1. 常用的 `AVAudioSessionCategoryPlayback`\
  \ 宏\n\n| 宏（常量）名称 | 预期用途 |\n| --- | --- |\n| `AVAudioSessionCategorySoloAmbient`\
  \ | 所有应用的默认音频会话配置。播放将持续进行，直到用户将设备静音或锁定屏幕。你的应用完全控制音频播放，并拒绝来自其他应用的音频事件。 |\n| `AVAudioSessionCategoryAmbient`\
  \ | 音频播放是可选的、但非必需的应用。播放将持续进行，直到用户将设备静音。其他应用仍然可以发送音频事件。 |\n| `AVAudioSessionCategoryPlayback`\
  \ | 需要音频播放才能正常工作的应用。即使用户将设备静音，播放也会继续。可以配置为允许来自其他应用的音频事件。 |\n| `AVAudioSessionCategoryRecord`\
  \ | 需要音频录制功能的应用。可以配置为支持后台音频录制。 |\n| `AVAudioSessionCategoryPlayAndRecord` | 需要同时具备音频录制和播放功能的应用。可以配置为在后台继续运行，并接受来自其他应用的音频事件。\
  \ |\n\n## 选择音频文件\n\n要填充 `FileViewController`，你需要扫描应用的文档文件夹，查找 MP3 和 M4A 文件。你可以将得到的数组用作表格视图的数据源。\n\
  \n你可以通过调用系统文件管理器实例的 `[NSFileManager contentsOfDirectoryAtPath:]` 方法，找到并检索目录中所有文件的\
  \ `NSArray`。通过将每个文件的 `pathExtension` 分量与你正在查找的文件类型的扩展名进行比较，来确定每个文件的类型。`pathExtension`\
  \ 属性是所有 `NSString` 对象上可用的派生属性。调用时，它会尝试返回字符串中紧跟句点（`.`）之后的部分。代码清单 5-4 展示了实现此行为的方法。在你的\
  \ `FileViewController` 类中的 `[self viewDidLoad]` 方法底部调用此方法。\n\n***代码清单 5-4***. 构建音频文件列表\n\
  \n```\n-(void)initializeFileArray\n{\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
                       NSDocumentDirectory,\n                     NSUserDomainMask,\
  \ YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n    NSError\
  \ *error = nil;\n\nNSArray *allFiles = [[NSFileManager defaultManager]\n                          contentsOfDirectoryAtPath:documentsDirectory\n\
                            error:&error];\n\nif (error == nil) {\n\nself.fileArray\
  \ = [NSMutableArray new];\n\nfor (NSString *file in allFiles) {\n            if\
  \ ([[file pathExtension] isEqualToString:@\"mp3\"] ||\n               [[file pathExtension]\
  \ isEqualToString:@\"m4a\"]) {\n                [self.fileArray addObject:file];\n\
              }\n        }\n\n} else {\n        NSLog(@\"查找文件出错：%@\", [error description]);\n\
      }\n}\n```\n\n你将在整个类中使用 `fileArray` 属性作为数据源，因此请记得在文件视图控制器的头文件中将其声明为实例变量。\n\n\
  现在你已经填充了文件数组，请实现必要的 `UITableViewDelegate` 方法，以开始将其用作表格的数据源。代码清单 5-5 展示了如何使用 `fileArray`\
  \ 属性来填充表格视图数据源委托方法所需的节数和行数。\n\n***代码清单 5-5***. 使用数组填充表格\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    // 返回节数。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n       numberOfRowsInSection:(NSInteger)section\n{\n    // 返回该节中的行数。\n\
      return [self.fileArray count];\n}\n```\n\n\n\n要在每个表格视图单元格中显示文件名，可以使用 `[NSString\
  \ lastPathComponent]` 派生属性，如代码清单 5-6 所示。该属性的工作方式类似于 `[NSString pathExtension]`，区别在于它提取的是字符串中最后一个正斜杠字符（`/`）之后的部分。请记得使用在\
  \ Interface Builder 中为单元格定义的复用标识符。\n\n**代码清单 5-6.** 在表格视图单元格中显示文件名\n\n```\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n    cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
  {\n    UITableViewCell *cell = [tableView\n        dequeueReusableCellWithIdentifier:@\"\
  fileCell\"\n        forIndexPath:indexPath];\n\n// 配置单元格...\n\nNSString *filePath\
  \ = [self.fileArray objectAtIndex:indexPath.row];\n\ncell.textLabel.text = [filePath\
  \ lastPathComponent];\n\nreturn cell;\n}\n```\n\n当用户选中一个表格视图单元格时，你应该从文件数组中返回所选项的完整文件路径。这能让你的音乐播放器直接播放该文件。与之前的相机示例一样，此应用通过自定义定义的协议传回选择结果。头文件中的协议定义如代码清单\
  \ 5-7 所示。\n\n**代码清单 5-7.** FileControllerView 的协议定义\n\n```\n@protocol FileControllerDelegate\
  \ <NSObject>\n\n-(void)cancel;\n-(void)didFinishWithFile:(NSString *)filePath;\n\
  \n@end\n```\n\n你可以使用代码清单 5-8 中所示的协议来传回文件路径。\n\n**代码清单 5-8.** 选中表格视图单元格时传回文件路径\n\n\
  ```\n-(void)tableView:(UITableView *)tableView\n    didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];\n\
  \n[self.delegate didFinishWithFile:filePath];\n\n}\n```\n\n定义好协议后，修改主视图控制器的头文件，声明你将实现该协议，如代码清单\
  \ 5-9 所示。\n\n**代码清单 5-9.** 主视图控制器的修改后头文件\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <AVFoundation/AVFoundation.h>\n#import \"FileViewController.h\"\n\n@interface\
  \ MainViewController : UIViewController\n     <FileControllerDelegate>\n\n@property\
  \ (nonatomic, strong) IBOutlet UILabel *timeLabel;\n@property (nonatomic, strong)\
  \ IBOutlet UILabel *titleLabel;\n\n@property (nonatomic, strong) IBOutlet UIButton\
  \ *chooseButton;\n@property (nonatomic, strong) IBOutlet UIButton *playButton;\n\
  @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *skipBackwardButton;\n\n@property (nonatomic, strong)\
  \ IBOutlet UIProgressView *progressBar;\n\n@property (nonatomic, strong) NSString\
  \ *selectedFilePath;\n\n@end\n```\n\n代码清单 5-10 展示了如何实现代理方法：当收到 `cancel` 消息时关闭文件选择器，当收到\
  \ `didFinishWithFile:` 消息时保存选定的文件路径。\n\n**代码清单 5-10.** 文件选择器代理方法实现\n\n```\n-(void)cancel\n\
  {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n{\n    self.selectedFilePath = filePath;\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n请记得，在选择“Present File Picker”转场时，需要在 `[UIViewController\
  \ prepareForSegue:]` 方法中声明主视图控制器为该协议的委托，如代码清单 5-11 所示。使用你在 Interface Builder 中创建的转场名称来选择按钮。\n\
  \n**代码清单 5-11.** 将主视图控制器声明为委托\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender\n{\n    if ([[segue identifier] isEqualToString:@\"\
  showFilePicker\"]) {\n        FileViewController *fileViewController =\n          (FileViewController\
  \ *)segue.destinationViewController;\n        fileViewController.delegate = self;\n\
      }\n}\n```\n\n你可能会想：“这很酷，但如何将音乐导入我的应用呢？”实际上，你可以使用 iTunes 来管理那些启用了 iTunes 文件共享的应用的数据。在\
  \ iTunes 中，选择你的设备，然后导航到“应用”标签页，即可进入文件管理器界面。如图 5-6 所示，滚动到页面底部会显示一个已启用文件共享的应用列表。选中它们即可管理其文档目录中的文件。\n\
  \n![9781430250838_Fig05-06.jpg](img/9781430250838_Fig05-06.jpg)\n\n**图 5-6.** iTunes\
  \ 文件共享界面\n\n要配置你的应用以支持文件共享，单击项目文件来修改其设置，然后点击“Info”标签页，如图 5-7 所示。\n\n![9781430250838_Fig05-07.jpg](img/9781430250838_Fig05-07.jpg)\n\
  \n**图 5-7.** 启用 iTunes 文件共享\n\n右键点击任意行以调出选项菜单，并选择“Add Row”。在列表中导航，选择“Application\
  \ Supports iTunes File Sharing”。将值设置为“Yes”。将应用加载到设备上并打开 iTunes，你的应用现在就会出现在文件共享列表中。拖放几个文件到应用中，以便文件选择器有内容可供操作。\n\
  \n## 设置音频播放器\n\n现在你的应用可以加载音频文件了，可以开始使用 `AVAudioPlayer` 类来播放文件。通过将音频播放器作为属性添加并实现其协议方法，你将音频播放器集成到类中。\n\
  \n由于此应用一次只播放一个音乐文件，你最好将 `AVAudioPlayer` 对象实现为主视图控制器（包含播放器的那个）的实例变量。音频播放器通过协议传回消息，因此，同样地，你也应该声明你的类将实现该协议。代码清单\
  \ 5-12 展示了包含这些修改的头文件版本。\n\n**代码清单 5-12.** 将音频播放器及其协议添加到头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n#import \"FileViewController.h\"\n\n@interface\
  \ MainViewController : UIViewController <FileControllerDelegate,\nAVAudioPlayerDelegate>\n\
  \n@property (nonatomic, strong) IBOutlet UILabel *timeLabel;\n@property (nonatomic,\
  \ strong) IBOutlet UILabel *titleLabel;\n\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *chooseButton;\n@property (nonatomic, strong) IBOutlet UIButton *playButton;\n\
  @property (nonatomic, strong) IBOutlet UIButton *skipForwardButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *skipBackwardButton;\n\n@property (nonatomic, strong)\
  \ IBOutlet UIProgressView *progressBar;\n\n@property (nonatomic, strong) NSString\
  \ *selectedFilePath;\n\n@property (nonatomic, strong) AVAudioPlayer *audioPlayer;\n\
  \n@end\n```\n\n**注意** 如果你想编写一个音频播放可由多个视图控制的应用，最好将音频播放器实例封装在单例类中，并让所有类通过该单例访问它。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n现在您已将音频播放器对象添加到类中，需要对其进行初始化。`AVAudioPlayer`类提供了两个主要的`init`方法，分别是`[AVAudioPlayer\
  \ initWithContentsOfURL:error:]`和`[AVAudioPlayer initWithData:error:]`。请记住，当文件视图控制器完成时，您将返回目标音频文件的文件路径，这意味着可以使用基于`URL`的`init`方法。播放器没有源文件就无法初始化，因此请将初始化功能放在接收来自文件视图控制器的文件的委托方法中，如列表\
  \ 5-13 所示。\n\n***列表 5-13***. 选择文件时初始化音频播放器\n\n```\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n\nself.selectedFilePath = filePath;\n\nNSError *error = nil;\n   \
  \ NSURL *fileURL = [NSURL fileURLWithPath:self.selectedFilePath];\n\nself.audioPlayer\
  \ = [[AVAudioPlayer alloc]\n                         initWithContentsOfURL:fileURL\
  \ error:&error];\n    self.audioPlayer.delegate = self;\n\nif (error == nil) {\n\
  \        NSLog(@\"audio player initialized successfully\");\n    } else {\n    \
  \    NSLog(@\"error initializing Playing audio files:audio player: %@\",\n     \
  \         [error description]);\n    }\n\n//dismiss the file picker\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n请注意，上述代码在将文件路径发送到音频播放器之前，将其转换为`URL`。虽然文件路径和`URL`都是文件位置的有效引用，但您需要将文件路径转换为`NSURL`数据类型以符合`API`要求。您可能想知道为什么没有使用基于`NSData`的`init`方法。要使用此方法，您需要将文件加载到内存中。虽然这对于从网络源下载的文件（您不想将文件保存到磁盘）是合适的，但它会为此应用程序增加不必要的开销。\n\
  \n## 构建播放界面\n\n现在音频播放器已初始化，您可能认为应用程序已准备好开始播放文件。不幸的是，`AVAudioPlayer`是一个*无界面*类，意味着它不提供用户界面。要开始和控制音频播放，您需要通过用户操作来触发它们。\n\
  \n### 开始或暂停播放\n\n音频播放器的主要控件是“播放”按钮。顾名思义，用户将使用它来启动播放。它有两个作用：如果音乐文件正在播放，您可以允许用户通过单击此按钮暂停播放。\n\
  \n使用音频播放器开始播放的方法是`[AVAudioPlayer play]`，它告诉音频播放器开始处理输入文件，并在播放器准备好后自动开始播放。您应该从“播放”按钮的按钮处理程序中调用此方法，如列表\
  \ 5-14 所示。确保在`Interface Builder`中将此功能连接到您的故事板。\n\n***列表 5-14***. 启动音频播放\n\n```\n\
  -(IBAction)play:(id)sender\n{\n    [self.audioPlayer play];\n}\n```\n\n与图像不同，音频和视频文件被系统视为数据流，需要额外的时间来建立内存缓冲区，以便可以预加载数据。缓冲区允许播放器拥有足够的数据，从而能够以默认速度（1x）播放文件。不幸的是，您无法预测填充缓冲区需要多长时间，因此`[AVAudioPlayer\
  \ play]`方法是*异步的*（意味着它不会阻塞应用程序中的其他事件）。\n\n**注意** 您可以使用`[AVAudioPlayer prepareToPlay]`方法强制音频播放器缓冲文件。此方法作为`[AVAudioPlayer\
  \ play]`的一部分自动调用，但单独调用它可以提升用户体验，特别是当您不希望在用户选择文件后立即自动开始播放时。\n\n此时，您的应用程序可以播放文件，但尚不能暂停。`[AVAudioPlayer\
  \ pause:]`可以使播放器暂停。然而，在调用暂停方法之前，您应该检查音频播放器当前是否正在播放文件。您可以通过`[AVAudioPlayer isPlaying]`属性查询音频播放器的播放状态，如列表\
  \ 5-15 中的示例所示。\n\n***列表 5-15***. 使用播放状态确定按钮操作\n\n```\n-(IBAction)play:(id)sender\n\
  {\n    if ([self.audioPlayer isPlaying]) {\n        [self.audioPlayer pause];\n\
  \        self.playButton.titleLabel.text = @\"Play\";\n    } else {\n        [self.audioPlayer\
  \ play];\n        self.playButton.titleLabel.text = @\"Pause\";\n    }\n\n}\n```\n\
  \n除了更改操作外，代码还更改了按钮的标题。这是一个关键步骤，因为您希望在界面上向用户反映状态变化。\n\n为了完成播放周期，您需要在播放完成时重置用户界面。您可能还记得，设置音频播放器的第一步之一是声明主视图控制器将实现`AVAudioPlayerDelegate`协议。当播放器完成播放文件时发送的委托方法是`audioPlayerDidFinishPlaying:Successfully:`。如列表\
  \ 5-16 所示，您需要做的就是在收到此消息时重置“播放”按钮的文本。由于应用程序使用运行时逻辑来确定操作，因此您不需要重新连接按钮。\n\n***列表 5-16***.\
  \ 使用委托重置用户界面\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player\n\
  \                                    successfully:(BOOL)flag\n{\n    if (flag) {\n\
  \        self.playButton.titleLabel.text = @\"Play\";\n    }\n}\n```\n\n### 快进或快退\n\
  \n现在您可以播放或暂停文件，接下来可以转向另一个常见的播放功能：快进或快退。与“播放”按钮一样，应用程序通过按钮处理程序控制这些功能。然而，与“播放”按钮不同，这些功能是离散的，因此每个功能应该有一个独立的`UI`元素。\n\
  \n您可以通过将`[AVAudioPlayer currentTime]`属性的值设置为所需的时间，强制音频播放器跳转到文件中的特定时间点。对于此应用程序，您希望能够快进或快退\
  \ 15 秒。\n\n对于快进功能，您可以通过将当前时间值加上 15 来获得所需时间，该值来自音频播放器。`NSTimeInterval`数据类型以秒为单位计数。为了防止用户跳过文件末尾（这是一个无效操作），在设置播放器的新时间值之前，您需要将新計算的目标时间与文件的时长进行比较。您可以使用`[AVAudioPlayer\
  \ duration]`属性从音频播放器获取当前文件的时长。\n\n列表 5-17 展示了快进的实现。\n\n***列表 5-17***. 快进按钮处理程序\n\
  \n```\n-(IBAction)skipForward:(id)sender\n{\n    if ([self.audioPlayer isPlaying])\
  \ {\n\nNSTimeInterval desiredTime =\n            self.audioPlayer.currentTime +\
  \ 15.0f;\n        if (desiredTime < self.audioPlayer.duration) {\n            self.audioPlayer.currentTime\
  \ = desiredTime;\n        }\n    }\n}\n```\n\n您遵循类似的逻辑来实现快退。但是，不是检查文件的时长，而是将计算出的时间与\
  \ 0（文件开始处）进行比较。如果用户在播放时间少于 15 秒时尝试快退，则将其发送到文件开头。否则，将其发送到当前位置前 15 秒的位置。列表 5-18 展示了一个示例。\n\
  \n\n\n#### 列表 5-18：后退按钮的处理方法\n\n```\n-(IBAction)skipBackward:(id)sender\n{\n   \
  \ if ([self.audioPlayer isPlaying]) {\n        NSTimeInterval desiredTime =\n  \
  \          self.audioPlayer.currentTime - 15.0f;\n        if (desiredTime < 0) {\n\
  \            self.audioPlayer.currentTime = 0.0f;\n        } else {\n          \
  \  self.audioPlayer.currentTime = desiredTime;\n        }\n    }\n}\n```\n\n**注意**\
  \ 虽然你可能认为可以使用 `AVAudioPlayer` 的 `[AVAudioPlayer playAtTime:]` 方法来跳转到文件时间线上的某个特定点，但这并非该\
  \ API 支持的用例。实际上，此方法旨在延迟播放器的开始时间，例如，如果你想在音频文件开始播放前显示倒计时或执行其他操作，它会非常有用。\n\n### 显示播放进度\n\
  \n作为音乐播放器应用的最后一个部分，你希望能够显示当前播放曲目的进度。遗憾的是，没有委托方法或通知会自动提供这个值。不过，你可以通过使用一个每秒触发一次的 `NSTimer`\
  \ 来实现所需的结果。\n\n`NSTimer` 类会在指定的时间延迟后或按重复周期触发一个方法。初始化定时器时，需要指定调用之间的延迟时间间隔、定时器触发时要调用的方法选择器，以及定时器是否应重复。重复定时器的一个注意事项是，它们会一直触发直到被专门*失效*（停止），因此你需要维护一个指向定时器的指针。你可以通过在主视图控制器中将定时器声明为实例变量来实现这一点：\n\
  \n```\n@property (nonatomic, strong) NSTimer *timer;\n```\n\n你希望在用户按下“播放”按钮时启动定时器，因此将初始化代码放在播放按钮的处理方法中，如列表\
  \ 5-19 所示。播放按钮由你的故事板管理，因此在状态改变时无需初始化，只需更新即可。\n\n#### 列表 5-19：用户开始播放文件时初始化定时器\n\n\
  ```\n-(IBAction)play:(id)sender\n{\n    if ([self.audioPlayer isPlaying]) {\n  \
  \      [self.audioPlayer pause];\n        self.playButton.titleLabel.text = @\"\
  Play\";\n        self.timer = [NSTimer timerWithTimeInterval:1.0f target:self\n\
  \            selector:@selector(updateProgress) userInfo:nil\n            repeats:YES];\n\
  \n} else {\n        [self.audioPlayer play];\n        self.playButton.titleLabel.text\
  \ = @\"Pause\";\n        [self.timer invalidate];\n    }\n\n}\n```\n\n你可能想知道为什么在开始播放时要重新初始化定时器对象，而在停止播放时销毁它。除了使用\
  \ `[NSTimer invalidate]` 方法销毁定时器外，没有其他方法可以暂停定时器。因此，你需要重新创建定时器来重新启动它。`audioPlayer`\
  \ 对象无需重新初始化，因为它是一个实例变量，并且仅在更换文件时才重置。\n\n此示例指定 `[self updateProgress]` 为定时器触发时调用的方法。因此，你需要在该方法中使用播放器的当前时间和歌曲持续时间来更新进度条和进度标签。与快进/快退示例类似，你可以使用\
  \ `[AVAudioPlayer currentTime]` 和 `[AVAudioPlayer duration]` 属性来获取这些值。列表 5-20 展示了主视图控制器的\
  \ `[self updateProgress]` 方法的实现。\n\n#### 列表 5-20：更新进度条和标签的方法\n\n```\n-(void)updateProgress\n\
  {\n    NSInteger durationMinutes = [self.audioPlayer duration] / 60;\n    NSInteger\
  \ durationSeconds = [self.audioPlayer duration] –\n                            \
  \     durationMinutes * 60;\n\nNSInteger currentTimeMinutes = [self.audioPlayer\
  \ currentTime] / 60;\n    NSInteger currentTimeSeconds = [self.audioPlayer currentTime]\
  \ –\n                                    currentTimeMinutes * 60;\n    NSString\
  \ *progressString =\n       [NSString stringWithFormat:@\"%d:%02d / %d:%02d\",\n\
  \       currentTimeMinutes, currentTimeSeconds, durationMinutes,\n       durationSeconds];\n\
  \    self.timeLabel.text = progressString;\n\nself.progressBar.progress = [self.audioPlayer\
  \ currentTime] /\n                                [self.audioPlayer duration];\n\
  \n}\n```\n\n上述代码中有两个有趣的地方。首先，为了以人类可读的格式显示时间，它从当前时间和进度值的原始秒数输出中提取了分钟和秒。虽然显示总秒数是一种完全有效的表示进度的方式，但你的用户无法很好地利用它。其次，该方法只是将除法结果传递给进度条。`UIProgressView`\
  \ 根据 `[UIProgressView progress]` 属性表示进度条的*完整*状态，该属性的值介于 `0.0` 和 `1.0` 之间。通过将当前时间除以总时长，你可以得到一个精确的进度值进行传递。\n\
  \n虽然一切正常运转很好，但你还要完成最后一步，以确保*下次*尝试播放文件时进度能正确更新：你需要使定时器失效。你已经看到了当用户按下“暂停”按钮时如何使定时器失效；现在，你还需要在文件播放完毕时使定时器失效。列表\
  \ 5-21 展示了修改后的 `audioPlayerDidFinishPlaying:successfully` 委托方法的示例。\n\n#### 列表 5-21：在音频播放器委托方法中使定时器失效\n\
  \n```\n -(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player\n           \
  \                          successfully:(BOOL)flag\n{\n    if (flag) {\n       \
  \ self.playButton.titleLabel.text = @\"Play\";\n        [self.timer invalidate];\n\
  \    }\n}\n```\n\n## 录制音频文件\n\n你可以将从播放音频中学到的许多知识应用到音频录制过程中。与播放音频类似，你需要先请求音频会话的权限才能使用音频硬件，并且可能会出现一些延迟。同样，你可以使用事件驱动的类\
  \ `AVAudioRecorder` 来开始/停止录制，它也是无界面的。\n\n使用音频录制器的其他要求如下：\n\n- 你需要一个能够录制的音频会话。\n\
  - 你需要在使用麦克风之前对其进行配置。\n- 你需要构建一个播放界面来预览你的录音。\n\n为了学习如何使用 `AVAudioRecorder` 类，你将构建图\
  \ 5-8 中所示的音频录制器播放器应用。\n\n![9781430250838_Fig05-08.jpg](img/9781430250838_Fig05-08.jpg)\n\
  \n**图 5-8**。简单音频录制器的模型\n\n此应用中唯一的输入是音频录制器，因此你可以将其实现为单视图应用程序。用户通过麦克风按钮触发录制。与音频播放器应用中的“播放”按钮类似，当录制处于活动状态时，此按钮的状态会变为“停止”。为了允许用户预览录音，你可以重用音频播放器应用中的播放界面。此应用还提供了一个“重置”按钮，以便用户在不满意录音时可以将其删除。\n\
  \n你可以在源代码包的 Chapter 6 文件夹中的 `MyRecorder` 项目中找到此应用的所有源代码。\n\n### 开始使用\n\n对于此项目，你可以将音频播放器应用的大部分工作作为基础进行复用。主要新增内容包括：\n\
  \n- 向主视图控制器添加音频录制器对象\n- 添加用于录制的控件\n- 添加额外的逻辑以支持从音频录制器播放。\n\n\n以音频播放器的头文件为参考，你可以将录音器和新按钮添加到主视图控制器中。代码清单\
  \ 5-22 展示了一个示例。\n\n***代码清单 5-22***. 音频录音器的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n\n@interface MainViewController : UIViewController\n\
  \    <AVAudioPlayerDelegate>\n\n@property (nonatomic, strong) IBOutlet UILabel *timeLabel;\n\
  \n@property (nonatomic, strong) IBOutlet UIButton *recordButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *playButton;\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *resetButton;\n\n@property (nonatomic, strong) IBOutlet UIProgressView\
  \ *progressBar;\n\n@property (nonatomic, strong) AVAudioPlayer *audioPlayer;\n@property\
  \ (nonatomic, strong) AVAudioRecorder *audioRecorder;\n\n@property (nonatomic, strong)\
  \ NSTimer *timer;\n\n-(IBAction)record:(id)sender;\n-(IBAction)play:(id)sender;\n\
  -(IBAction)reset:(id)sender;\n\n@end\n```\n\n与 `AVAudioPlayer` 类一样，`AVAudioRecorder`\
  \ 也需要 `AVFoundation` 框架才能编译。按照你在音频播放器应用中所用的相同流程，将框架添加到你的项目中。\n\n定义好属性和方法后，设计你的故事板，并使用\
  \ Interface Builder 连接操作。结果应如图 5-9 中的截图所示。\n\n![9781430250838_Fig05-09.jpg](img/9781430250838_Fig05-09.jpg)\n\
  \n图 5-9. 简易音频录音器的故事板\n\n## 配置音频会话\n\n就像你在音频播放器中所做的那样，在使用音频录音器之前，你需要初始化音频会话。由于你的应用将同时需要播放和录音功能，请使用\
  \ `AVAudioSessionCategoryPlayAndRecord` 宏来配置音频会话。\n\n你需要在用户按下录音按钮时立即准备音频会话，因此在按钮处理程序中配置会话，如代码清单\
  \ 5-23 所示。\n\n***代码清单 5-23***. 为录音初始化音频会话\n\n```\n-(IBAction)record:(id)sender\n\
  {\n    NSError *error;\n\n    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
  \    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\n           \
  \            error:&error];\n}\n```\n\n## 设置音频录音器\n\n要设置音频录音器，请使用 `[AVAudioRecorder\
  \ initWithURL:settings:error:]` 实例方法。与音频播放器一样，它需要一个 URL。不过，录音器关心的 URL 是录音的*目标路径*。与音频会话类似，你希望在用户按下录音按钮时初始化录音器。录音按钮处理程序的一个修改版本（包含录音器初始化逻辑）在代码清单\
  \ 5-24 中提供。\n\n***代码清单 5-24***. 初始化音频录音器\n\n```\n-(IBAction)record:(id)sender\n\
  {\n    NSError *error;\n\n    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n\
  \    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\n           \
  \            error:&error];\n\n    if (error == nil) {\n\n        NSArray *paths\
  \ =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n    \
  \        NSUserDomainMask, YES);\n        NSString *documentsDirectory = [paths\
  \ objectAtIndex:0];\n\n        NSString *filePath = [documentsDirectory\n      \
  \     stringByAppendingPathComponent:@\"recording.m4a\"];\n        NSURL *fileURL\
  \ = [NSURL fileURLWithPath:filePath];\n\n        NSMutableDictionary *settingsDict\
  \ = [NSMutableDictionary new];\n        [settingsDict setObject:[NSNumber numberWithInt:44100.0]\n\
  \                                 forKey:AVSampleRateKey];\n        [settingsDict\
  \ setObject:[NSNumber numberWithInt:2]\n                                 forKey:AVNumberOfChannelsKey];\n\
  \        [settingsDict setObject:[NSNumber\n                                 numberWithInt:AVAudioQualityMedium]\n\
  \           forKey:AVEncoderAudioQualityKey];\n        [settingsDict setObject:[NSNumber\
  \ numberWithInt:16]\n                                 forKey:AVEncoderBitRateKey];\n\
  \n        self.audioRecorder = [[AVAudioRecorder alloc]\n                      \
  \         initWithURL:fileURL\n                               settings:settingsDict\
  \ error:&error];\n\n        if (error == nil) {\n\n            NSLog(@\"audio recorder\
  \ initialized successfully!\");\n\n        } else {\n            NSLog(@\"error\
  \ initializing audio recorder: %@\",\n                  [error description]);\n\
  \        }\n\n    } else {\n        NSLog(@\"error initializing Playing audio files:audio\
  \ session: %@\",\n              [error description]);\n    }\n}\n```\n\n与音频播放器一样，在此应用中，你将使用文档目录作为用户录音的目标路径。你可以通过将文件名附加到文档目录来创建文件的完整路径。如果\
  \ URL 指定的文件不存在，音频录音器会创建一个新文件；如果文件已存在，则会覆盖现有文件。\n\n你可能还会对 `settings` 参数感到好奇。这是一个键/值对字典，用于配置硬件的采集设置。前面的示例将麦克风配置为以中等质量采集\
  \ 16 位立体声音频。这是一个不错的、中规中矩的配置，录音效果会比电话通话更好，但又不会有完整未压缩音频录音的数据开销。\n\n## 构建录音界面\n\n与\
  \ `AVAudioPlayer` 类一样，`AVAudioRecorder` 类也是无界面的，因此你必须实现自己的用户界面来控制录音过程。对于此应用，你需要添加特定于录音功能的控件：开始和停止录音、保存文件以及删除录音。除少数例外情况外，你可以复用音频播放器应用中的播放界面来预览录音。\n\
  \n### 开始或停止录音\n\n你可以使用 `[AVAudioRecorder record]` 方法开始录制音频文件。同样，`[AVAudioRecorder\
  \ stop]` 方法用于停止录音。与音频播放器应用一样，你使用单个按钮来切换录音状态。遵循你使用音频 API 时的相同模式，你通过使用 `[AVAudioRecorder\
  \ isRecording]` 属性查询录音器对象的录音状态。代码清单 5-25 展示了实现此流程的录音按钮处理程序的修改版本。\n\n***代码清单 5-25***.\
  \ 开始或停止音频录音器\n\n```\n-(IBAction)record:(id)sender\n{\n    NSError *error;\n\n  \
  \  AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n    [audioSession\
  \ setCategory:AVAudioSessionCategoryPlayAndRecord\n                       error:&error];\n\
  \n    if (error == nil) {\n\n        NSArray *paths =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \            NSUserDomainMask, YES);\n        NSString *documentsDirectory = [paths\
  \ objectAtIndex:0];\n\n        NSString *filePath = [documentsDirectory\n      \
  \                        stringByAppendingPathComponent:@\"recording.m4a\"];\n\n\
  \        NSURL *fileURL = [NSURL fileURLWithPath:filePath];\n```\n\n\n\n```objc\n\
  NSMutableDictionary *settingsDict = [NSMutableDictionary new];\n[settingsDict setObject:[NSNumber\
  \ numberWithInt:44100.0]\n                 forKey:AVSampleRateKey];\n[settingsDict\
  \ setObject:[NSNumber numberWithInt:2]\n                 forKey:AVNumberOfChannelsKey];\n\
  [settingsDict setObject:[NSNumber\n                         numberWithInt:AVAudioQualityMedium]\n\
  \                 forKey:AVEncoderAudioQualityKey];\n[settingsDict setObject:[NSNumber\
  \ numberWithInt:16]\n                 forKey:AVEncoderBitRateKey];\n\nself.audioRecorder\
  \ = [[AVAudioRecorder alloc]\n                      initWithURL:fileURL\n      \
  \                settings:settingsDict\n                      error:&error];\n\n\
  if (error == nil) {\n    if ([self.audioRecorder isRecording]) {\n        [self.audioRecorder\
  \ record];\n        self.recordButton.titleLabel.text = @\"停止\";\n    } else {\n\
  \        [self.audioRecorder stop];\n        self.recordButton.titleLabel.text =\
  \ @\"录制\";\n    }\n} else {\n    NSLog(@\"error initializing audio recorder: %@\"\
  ,\n          [error description]);\n}\n```\n\n与音频播放器一样，请记住根据录制状态更新按钮标签。\n\n## 播放录制内容\n\
  \n音频录制器对象的初始化参数之一是录制文件的目标路径。音频播放器的初始化参数之一则是用作音频源文件的路径。这一巧合使得预览音频文件变得非常简单：只需将录制文件的路径传递给音频播放器即可，你可以在\"\
  播放\"按钮的处理程序中实现此功能，如代码清单 5-26 所示。\n\n***代码清单 5-26***. 预览音频录制\n\n```objc\n-(IBAction)play:(id)sender\n\
  {\n    NSError *error = nil;\n\n    if ([self.audioRecorder isRecording]) {\n  \
  \      [self.audioRecorder stop];\n    }\n\n    if ([self.audioPlayer isPlaying])\
  \ {\n        [self.audioPlayer stop];\n        self.playButton.titleLabel.text =\
  \ @\"播放\";\n    } else {\n        self.audioPlayer = [[AVAudioPlayer alloc]\n  \
  \                          initWithContentsOfURL:[self.audioRecorder url]\n    \
  \                        error:&error];\n\n        if (error == nil) {\n       \
  \     [self.audioPlayer play];\n            self.playButton.titleLabel.text = @\"\
  停止\";\n        } else {\n            NSLog(@\"error initializing Playing audio files:audio\
  \ player: %@\",\n                  [error description]);\n        }\n    }\n}\n\
  ```\n\n请注意，这里无需将录制文件的路径存储在变量中，可以直接通过录制对象的 `[AVAudioRecorder url]` 属性获取。本示例中还有一个注意事项：它会在播放文件之前检查录制状态。在尝试播放文件之前，必须先停止录制，否则会产生反馈回路（无尽回声），导致录制内容失效。\n\
  \n## 保存录制内容\n\n无需额外操作即可保存录制内容。`AVAudioRecorder` 会在用户停止录制时，自动关闭文件缓冲区并将录制内容保存到磁盘。\n\
  \n你需要处理的一个主要用例是用户期望录制多个音频文件。可以通过 `NSFileManager` 类来解决此问题。为防止每次用户停止录制时录制的文件被覆盖，可以调用\
  \ `[NSFileManager fileExistsAtPath:]` 实例方法。要创建唯一的文件名，请在录制前检查以确保目标文件不存在。如果文件已存在，则在文件名末尾添加唯一标识符，例如递增计数器。代码清单\
  \ 5-27 展示了\"录制\"按钮处理程序的修改版本，它在初始化录制器对象之前添加了此逻辑。\n\n***代码清单 5-27***. 创建唯一文件名\n\n\
  ```objc\n-(IBAction)record:(id)sender\n{\n    NSError *error;\n\n    AVAudioSession\
  \ *audioSession = [AVAudioSession sharedInstance];\n    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\n\
  \                       error:&error];\n\n    if (error == nil) {\n        NSArray\
  \ *paths =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \                                                NSUserDomainMask, YES);\n     \
  \   NSString *documentsDirectory = [paths objectAtIndex:0];\n\n        NSString\
  \ *filePath = [documentsDirectory\n            stringByAppendingPathComponent:@\"\
  recording.m4a\"];\n        NSInteger count = 0;\n\n        while ([[NSFileManager\
  \ defaultManager]\n                 fileExistsAtPath:filePath]) {\n            NSString\
  \ *fileName = [NSString\n                stringWithFormat:@\"recording-%d\", count];\n\
  \            filePath = [documentsDirectory\n                        stringByAppendingPathComponent:fileName];\n\
  \            count++;\n        }\n\n        NSURL *fileURL = [NSURL fileURLWithPath:filePath];\n\
  \n        NSMutableDictionary *settingsDict = [NSMutableDictionary new];\n     \
  \   [settingsDict setObject:[NSNumber numberWithInt:44100.0]\n                 \
  \        forKey:AVSampleRateKey];\n        [settingsDict setObject:[NSNumber numberWithInt:2]\n\
  \                         forKey:AVNumberOfChannelsKey];\n        [settingsDict\
  \ setObject:[NSNumber\n                                 numberWithInt:AVAudioQualityMedium]\n\
  \                         forKey:AVEncoderAudioQualityKey];\n        [settingsDict\
  \ setObject:[NSNumber numberWithInt:16]\n                         forKey:AVEncoderBitRateKey];\n\
  \n        self.audioRecorder = [[AVAudioRecorder alloc]\n                      \
  \        initWithURL:fileURL\n                              settings:settingsDict\n\
  \                              error:&error];\n\n        if (error == nil) {\n \
  \           if ([self.audioRecorder isRecording]) {\n                [self.audioRecorder\
  \ record];\n                self.recordButton.titleLabel.text = @\"停止\";\n     \
  \       } else {\n                [self.audioRecorder stop];\n                self.recordButton.titleLabel.text\
  \ = @\"录制\";\n            }\n        } else {\n            NSLog(@\"error initializing\
  \ audio recorder: %@\",\n                  [error description]);\n        }\n  \
  \  } else {\n        NSLog(@\"error initializing Playing audio files:audio session:\
  \ %@\",\n              [error description]);\n    }\n}\n```\n\n**注意**：更改录制文件路径的唯一方法是创建新的录制器对象。请务必在你的应用中通过提醒或指示旧录制已完成等方式，将这一点告知用户。\n\
  \n## 删除录制内容\n\n有时，用户可能对某段录制内容非常不满意，想要直接删除。要删除正在进行的录制，请使用 `[AVAudioRecorder deleteRecording]`\
  \ 实例方法，如代码清单 5-28 所示。此方法会删除你初始化录制器对象时所使用的文件。与其他录制事件一样，在尝试删除文件之前，请确保先停止录制器。\n\n***代码清单\
  \ 5-28***. 删除音频录制\n\n```objc\n-(IBAction)delete:(id)sender\n{\n    if ([self.audioRecorder\
  \ isRecording]) {\n        [self.audioRecorder stop];\n    }\n\n    [self.audioRecorder\
  \ deleteRecording];\n}\n```\n\n## 本章小结\n\n在本章中，你学习了如何使用 `AVAudioPlayer` 和 `AVAudioRecorder`\
  \ 类在应用中播放和录制音频。你还了解到，与访问相机时一样，这两个类都需要你使用 `AVAudioSession` 类作为系统共享资源的守门人。由于启动会话具有不确定性，你看到了如何实现一个基于事件的流程来处理播放器和录制器的消息。请记住，这两个类都是\"\
  无头\"的，因此你必须自行实现用户界面——不过这很简单。最后请注意，在正确配置用于录制的会话后，驱动音频播放器和录制器的概念存在大量重叠。\n\n"
- "# 第 6 章：使用外部音频源\n\n\n\n在本章中，你将了解如何使用外部源在应用中播放更多类型的音频。通过扩展你在第 5 章中学到的音频基础知识，本章将介绍如何播放来自\
  \ iTunes 和流媒体源的音乐，以及在应用中播放事件声音（当事件发生时触发的短音效，例如按下按钮）。在实现这些新的音频源时，你将看到如何重用在播放简单音频文件时首次遇到的设计模式（例如请求共享资源、事件驱动消息处理以及实现自定义用户界面），并将其应用到其他类中，以及如何为这些类注入额外的逻辑，使你的应用能够播放多种源类型。\n\
  \n本章的主要部分（关于 iTunes、流媒体音频和事件声音）由示例项目支撑，你可以在本书提供的源代码包的`Chapter 6`文件夹中找到这些项目。（请参见\
  \ Apress 网站的 Source Code/Download 区域，`www.apress.com`）。\n\n## 从 iTunes 导入音乐\n\n\
  在第 5 章中，你学习了如何在应用中使用音频文件。但是，你必须导入所有想要使用的音频文件，要么将它们与应用捆绑在一起，要么通过 iTunes 文件共享。幸运的是，Apple\
  \ 通过`MPMusicPlayerController`类提供了对用户设备上 iPod 音乐库的访问权限。当你希望用户能够在应用中播放他们自己的音乐，或者希望应用为用户当前加载的播放列表提供控制时，这非常有用。\n\
  \n`MPMediaPlayerController`中的*MP*来源于它所基于的框架：`MediaPlayer`框架。`MediaPlayer`框架是专门为媒体播放而构建的，使其能够处理更复杂的任务，例如播放视频、解码来自播客和有声读物的书签信息，以及访问\
  \ iPod 应用。`MediaPlayer`框架将在后续章节中发挥关键作用，你将使用它来播放视频。\n\n与你之前用来播放声音文件的`AVAudioPlayer`类类似，`MPMusicPlayerController`类允许你在应用中构建一个自定义媒体播放器，包含播放控制方法和查询播放状态的方法。其中一些控件你已经很熟悉了，例如播放、暂停和快进/快退，以及模拟\
  \ iPod 应用行为的新控件，例如切换播放列表的随机播放模式。不幸的是，`MPMusicPlayerController`也是一个无头类，这意味着你必须实现自己的用户界面。此外，作为一个设计用于与\
  \ iPod 音乐库交互的类，你只能用它播放 iTunes 媒体。你可以通过继续维护一个用于播放其他音频文件的`AVAudioPlayer`对象来规避这个限制。\n\
  \n在本节中，你将学习如何使用`MPMediaPlayerController`类在应用中播放 iPod 音乐库中的音乐，方法是构建如图 6-1 所示的音乐播放器应用。你可以在本书源代码包的`Chapter\
  \ 6`文件夹中找到这个应用。该项目名为`MyPod`。\n\n![9781430250838_Fig06-01.jpg](img/9781430250838_Fig06-01.jpg)\n\
  \n*图 6-1. MyPod 项目原型图*\n\n`MyPod`应用允许用户通过点击主视图控制器底部的按钮来选择要播放的歌曲或专辑。用户可以使用表视图控制器在项目之间导航。当用户选择了一首歌曲或专辑后，应用会提供当前播放歌曲的播放控制以及当前播放列表的导航控制。\n\
  \n`MyPod`应用的目标是向你展示实现基于`MPMusicPlayerController`的音乐播放器的关键概念，具体如下：\n\n*   初始化音乐播放器\n\
  *   指定媒体查询（你可以将其视为播放列表）\n*   构建播放界面\n*   显示曲目信息（元数据）\n\n## 开始\n\n与本教程中的其他项目一样，你首先创建一个基于“单视图应用程序”模板的项目。使用图\
  \ 6-1 中的原型图来帮助你选择要添加到故事板中的用户界面元素。务必添加一个表视图控制器，以便用户可以选择音乐。你不需要通过转场链接两个视图控制器，因为你将使用按钮处理程序来管理页面切换。完成后的故事板应类似于图\
  \ 6-2 中的截图。\n\n![9781430250838_Fig06-02.jpg](img/9781430250838_Fig06-02.jpg)\n\n\
  *图 6-2. MyPod 项目完成的故事板*\n\n`MainViewController`类代表此应用的主视图。在实现该类之前，请确保已将`MediaPlayer`框架添加到项目中。在头文件（`MainViewController.h`）的顶部，引入该框架：\n\
  \n```objc\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n列表 6-1 显示了一个可用于实现`MainViewController`类的头文件。和往常一样，使用这些属性将你的故事板链接到该类。\n\
  \n***列表 6-1. MainViewController 类的头文件***\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
  \ <MediaPlayer/MediaPlayer.h>\n#import \"MediaTableViewController.h\"\n\n@interface\
  \ MainViewController : UIViewController\n\n@property (nonatomic, strong) MPMusicPlayerController\
  \ *musicPlayer;\n\n@property (nonatomic, strong) IBOutlet UIButton *playButton;\n\
  @property (nonatomic, strong) IBOutlet UIButton *rewindButton;\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *forwardButton;\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *prevButton;\n@property (nonatomic, strong) IBOutlet UIButton *nextButton;\n\
  \n@property (nonatomic, strong) IBOutlet UIButton *chooseTrackButton;\n@property\
  \ (nonatomic, strong) IBOutlet UIButton *chooseAlbumButton;\n\n@property (nonatomic,\
  \ strong) IBOutlet UILabel *titleLabel;\n@property (nonatomic, strong) IBOutlet\
  \ UILabel *albumLabel;\n@property (nonatomic, strong) IBOutlet UIImageView *albumImageView;\n\
  \n-(IBAction)toggleAudio:(id)sender;\n-(IBAction)startFastForward:(id)sender;\n\
  -(IBAction)startRewind:(id)sender;\n-(IBAction)stopSeeking:(id)sender;\n-(IBAction)chooseTrackButton:(id)sender;\n\
  -(IBAction)chooseAlbumButton:(id)sender;\n@end\n```\n\n对于此应用，你需要从多个函数中访问`MPMediaPlayerController`对象，因此请确保像示例中所示将其定义为实例变量。\n\
  \n### 初始化音乐播放器\n\n与硬件摄像头或麦克风类似，iPod 音乐库是一个共享资源。`MPMusicPlayerController`类通过允许你将音乐播放器实现为“应用音乐播放器”或“iPod\
  \ 音乐播放器”来处理此限制。*应用音乐播放器*可以从 iPod 音乐播放器中拉取媒体项目，但不会对 iPod 应用的状态产生任何影响。*iPod 音乐播放器*是应用内的一个媒体播放器，它更像是一个\
  \ iPod 应用的遥控器，而不是一个独立的音乐播放器。你所有的播放设置更改和媒体选择都会影响 iPod 应用。这对于你想让用户在应用中控制或更改他们的“*现正播放*”播放列表的应用来说非常合适。\n\
  \n你可以通过为要实现的音乐播放器类型调用相应的类方法来实例化音乐播放器：\n\n```objc\nself.musicPlayer = [MPMusicPlayerController\
  \ applicationMusicPlayer];\n```\n\n\n\n`MyPod`应用将其音乐播放器实现为应用程序音乐播放器。要实现 iPod 音乐播放器，请调用`[MPMusicPlayerController\
  \ iPodMusicPlayer]`类方法。为了正确初始化对象，请将此调用放在类的`[self viewDidLoad]`方法中，如清单 6-2 所示。\n\n\
  ***清单 6-2***. 初始化音乐播放器\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
          // Do any additional setup after loading the view,\n        // typically\
  \ from a nib.\n\nself.musicPlayer = [MPMusicPlayerController applicationMusicPlayer];\n\
  }\n```\n\n## 指定媒体队列（播放列表）\n\n在使用`MPMusicPlayerController`类开始播放音乐之前，你需要指定一个音乐播放器应播放的媒体项队列。你可以将媒体队列视为一个播放列表；它是一个按先进先出顺序播放的项列表（添加到队列的第一个项将首先播放）。\n\
  \n默认情况下，初始化一个新的`MPMediaQuery`项（`[[MPMediaQuery alloc] init]`）将返回 iPod 媒体库中所有项的未排序列表。为了使媒体队列有用，你应该尝试指定以下内容：\n\
  \n-   要按之过滤结果的项类型（例如，歌曲、播放列表、专辑或播客）\n-   如何对结果进行分组（例如，按歌曲标题、专辑名称或艺术家）\n-   用于匹配特定要求的附加过滤器（例如，仅匹配某个艺术家）\n\
  \n使用这些条件，你可以构建如下查询：查找所有艺术家为 Pink Floyd 的歌曲，按歌曲标题排序。\n\n你可以通过使用`MPMediaQuery`类方法之一初始化查询对象，来快速为媒体查询指定媒体类型和分组顺序。对于\
  \ Pink Floyd 的例子，你可以使用`[MPMediaQuery songsQuery]`类方法，而不是默认构造器。\n\n```\nMPMediaQuery\
  \ *pinkFloydQuery = [MPMediaQuery songsQuery];\n```\n\n你可以在表 6-1 中找到一些最流行的`MPMediaQuery`类方法及其结果查询的表格。\n\
  \n表 6-1. 流行的 `MPMediaQuery` 类方法\n\n| 方法名 | 结果查询 |\n| --- | --- |\n| `[MPMediaQuery\
  \ albumsQuery]` | 返回音乐项（歌曲）列表，按专辑标题排序 |\n| `[MPMediaQuery artistsQuery]` | 返回音乐项（歌曲）列表，按艺术家名称排序\
  \ |\n| `[MPMediaQuery compilationsQuery]` | 返回合辑项（专辑）列表，按专辑标题排序 |\n| `[MPMediaQuery\
  \ playlistsQuery]` | 返回播放列表项列表，按播放列表标题排序 |\n| `[MPMediaQuery songsQuery]` | 返回音乐项（歌曲）列表，按歌曲标题排序\
  \ |\n\n你可以通过为`groupingType`属性指定一个值来手动更改媒体查询的分组类型。你可以在表 6-2 中找到流行的分组类型表格。\n\n表 6-2.\
  \ 流行的 `MPMediaGrouping` 类型\n\n| 键值 | 行为 |\n| --- | --- |\n| `MPMediaGroupingTitle`\
  \ | 按专辑标题分组和排序音乐项 |\n| `MPMediaGroupingArtist` | 按艺术家名称分组和排序音乐项 |\n| `MPMediaGroupingAlbum`\
  \ | 按专辑标题和曲目号分组和排序音乐项 |\n| `MPMediaGroupingGenre` | 按流派分组和排序项 |\n| `MPMediaGroupingPlaylist`\
  \ | 按播放列表标题分组和排序集合 |\n\n要过滤结果以匹配特定要求（例如，艺术家 = Pink Floyd），你将需要使用`MPMediaPropertyPredicate`。要构建媒体属性谓词，你需要指定三个参数：\n\
  \n-   你试图匹配的属性（例如，艺术家）\n-   匹配值（例如，Pink Floyd）\n-   比较类型（`contains`或`equalTo`）\n\
  \n对于 Pink Floyd 的例子，谓词如下所示：\n\n```\nMPMediaPropertyPredicate *artistPredicate = [MPMediaPropertyPredicate\n\
      predicateWithValue:@\"PinkFloyd\"\n    forProperty:MPMediaItemPropertyArtist\n\
      comparisonType:MPMediaPredicateComparisonEqualTo];\n```\n\n构建谓词后，使用[`MPMediaQuery\
  \ addFilterPredicate:]`实例方法将其添加到查询中：\n\n```\n[pinkFloydQuery addFilterPredicate:artistPredicate];\n\
  ```\n\n**注意** 一个查询可以有多个谓词——但要确保它们之间不冲突。\n\n使用`[MPMusicPlayerController setQueueWithQuery:]`方法将你的查询加载到媒体播放器中。清单\
  \ 6-3 展示了一个生成 Pink Floyd 查询并为共享音乐播放器对象设置媒体队列的函数。\n\n***清单 6-3***. 设置媒体队列\n\n```\n\
  MPMediaQuery *pinkFloydQuery = [MPMediaQuery songsQuery];\nMPMediaPropertyPredicate\
  \ *artistPredicate =\n    [MPMediaPropertyPredicate predicateWithValue:@\"Pink Floyd\"\
  \n    forProperty:MPMediaItemPropertyArtist\n    comparisonType:MPMediaPredicateComparisonEqualTo];\n\
  [pinkFloydQuery addFilterPredicate:artistPredicate];\n[self.musicPlayer setQueueWithQuery:pinkFloydQuery];\n\
  ```\n\n对于`MyPod`项目，你需要在选择器表视图通过委托方法返回后设置查询。\n\n## 创建项目选择界面\n\n你现在将使用媒体查询来为`MyPod`应用构建项目选择界面。目标是构建一个可重用的类，用于选择歌曲、专辑或其他媒体类型。在媒体查询的上下文中，你将使用此类来确定查询的谓词过滤器（例如，歌曲标题）。你将为此任务使用两个媒体查询：一个用于生成所有歌曲（或专辑）的列表，另一个用于将最终结果传回给音乐播放器。\n\
  \n由于目标是构建一个可重用的类，你将希望使你的接口尽可能通用，包括输入和输出。清单 6-4 显示了选择界面的示例头文件，在示例项目中由`MediaTableViewController`类表示。\n\
  \n***清单 6-4***. `MediaTableViewController`类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@protocol MediaTableDelegate <NSObject>\n\n-(void)didFinishWithItem:(NSString\
  \ *)item andType:(NSString *)type;\n-(void)didCancel;\n\n@end\n\n@interface MediaTableViewController\
  \ : UITableViewController\n\n@property (nonatomic, strong) NSArray *itemsArray;\n\
  @property (nonatomic, strong) NSString *mediaType;\n\n-(id)initWithArray:(NSArray\
  \ *)array withType:(NString *)type;\n\n@end\n```\n\n请注意，初始化方法接受一个`NSArray`作为输入。这很方便，因为媒体查询返回一个结果数组，你可以轻松地从数组初始化表视图。还要注意用于返回结果的协议，该协议使用`NSString`来表示选定的项。同样，这是一个合适的选择，因为你想要构建一个返回谓词比较字符串的类。因为希望能够重用此类，请注意媒体类型是参数之一。以这种方式编写代码允许你在实现协议的类中处理结果。\n\
  \n首先创建按钮处理程序，当用户按下“选择曲目”按钮时显示`MediaTableViewController`。关键任务是创建一个可以用作数据源的媒体查询，并呈现表视图控制器。因为你正在查找歌曲，所以使用`[MPMediaQuery\
  \ songsQuery]`类方法创建你的查询。清单 6-5 显示了此方法的实现。你将此按钮处理程序放在你的主视图控制器中。\n\n***清单 6-5***.\
  \ “选择曲目”按钮的按钮处理程序\n\n```\n-(IBAction)chooseTrackButton:(id)sender\n{\n    NSMutableArray\
  \ *items = [NSMutableArray new];\n```\n\n\n```objc\nMPMediaQuery *query = [MPMediaQuery\
  \ songsQuery];\n\nfor (MPMediaItem *item in query.items) {\n    NSString *trackName\
  \ = [item valueForProperty:MPMediaItemPropertyTitle];\n    [items addObject:trackName];\n\
  }\n\nMediaTableViewController *mediaTableVC = [[MediaTableViewController alloc]\
  \ initWithItems:items];\n[self presentViewController:mediaTableVC animated:YES completion:nil];\n\
  ```\n\n你可能想知道为什么我选择从媒体查询项中提取歌曲标题，而不是直接传递结果数组（`items`属性）。答案是：为了让你的类更具可复用性，你需要减少依赖项。通过将媒体项发送到`MediaTableViewController`之前进行处理，你无需在类中包含`MediaPlayer`的头文件。\n\
  \n对于“选择专辑”按钮，请遵循相同的模式，但需要使用`[MPMediaQuery compilationsQuery]`类方法，并将*专辑*指定为返回类型。Listing\
  \ 6-6 包含了“选择专辑”按钮处理器的实现。\n\n***Listing 6-6***. “选择专辑”按钮的处理程序\n\n```objc\n-(IBAction)chooseAlbumButton:(id)sender\n\
  {\n    NSMutableArray *items = [NSMutableArray new];\n\n    MPMediaQuery *query\
  \ = [MPMediaQuery compilationsQuery];\n\n    for (MPMediaItem *item in query.items)\
  \ {\n        NSString *albumName = [item valueForProperty:MPMediaItemPropertyTitle];\n\
  \        [items addObject:albumName];\n    }\n\n    MediaTableViewController *mediaTableVC\
  \ = [[MediaTableViewController alloc] initWithItems:items];\n    [self presentViewController:mediaTableVC\
  \ animated:YES completion:nil];\n}\n```\n\n要为`MediaTableViewController`填充表格视图，请使用`itemsArray`属性来填充单元格数量并设置每个单元格的标签。填充`MediaTableViewController`表格视图的方法在\
  \ Listing 6-7 中。请记住，这些方法应放在你的`MediaTableViewController.m`文件中。`[MediaTableViewController\
  \ initWithItems]`方法使用默认的 Cocoa Touch`init`方法作为设计模式。\n\n***Listing 6-7***. 填充 MediaTableViewController\
  \ 表格视图\n\n```objc\n- (id)initWithItems:(NSArray *)array withType:(NSString *)type\n\
  {\n    self = [super init];\n    if (self) {\n        // 自定义初始化\n        self.itemsArray\
  \ = array;\n        self.mediaType = type;\n    }\n    return self;\n}\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    // 返回分区数\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // 返回分区中的行数\n   \
  \ return [self.itemsArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"itemCell\" forIndexPath:indexPath];\n\
  \n    // 配置单元格...\n    cell.textLabel.text = [self.itemsArray objectAtIndex:indexPath.row];\n\
  \    return cell;\n}\n```\n\n你以与其他项目选择项类似的模式处理项选择：通过协议从表格视图控制器发送消息，并在主视图控制器中处理。选择操作需要首先发生。当选中某个单元格时，在`MediaTableViewController`类的`[self\
  \ tableView:didSelectRowAtIndexPath:]`方法中通过协议发送消息，如 Listing 6-8 所示。\n\n***Listing\
  \ 6-8***. 发送用于选择媒体项的协议消息\n\n```objc\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSString *selectedItem = [self.itemsArray objectAtIndex:indexPath.row];\n\
  \    [self.delegate didFinishWithItem:selectedItem andType:self.mediaType];\n}\n\
  ```\n\n在主视图控制器中处理协议消息。根据返回的媒体类型，你使用`filterName`字符串作为匹配文本来设置谓词。在处理器方法中，使用`if()`语句比较媒体类型，以便使用不同的代码块处理专辑和歌曲。你将使用此谓词通过`[MPMusicPlayerController\
  \ setQueueWithQuery:]`方法为音乐播放器初始化活动队列。Listing 6-9 展示了实现`MediaTableDelegate`协议此逻辑的示例委托方法。\n\
  \n***Listing 6-9***. 收到协议消息后设置媒体队列\n\n```objc\n-(void)didFinishWithItem:(NSString\
  \ *)item andType:(NSString *)type\n{\n    if ([type isEqualToString:@\"songs\"])\
  \ {\n        MPMediaQuery *query = [MPMediaQuery songsQuery];\n        MPMediaPropertyPredicate\
  \ *predicate = [MPMediaPropertyPredicate predicateWithValue:item\n             \
  \                                                                 forProperty:MPMediaItemPropertyArtist\n\
  \                                                                           comparisonType:MPMediaPredicateComparisonEqualTo];\n\
  \        [query addFilterPredicate:predicate];\n        [self.musicPlayer setQueueWithQuery:query];\n\
  \    } else if ([type isEqualToString:@\"albums\"]) {\n        MPMediaQuery *query\
  \ = [MPMediaQuery albumsQuery];\n        MPMediaPropertyPredicate *predicate = [MPMediaPropertyPredicate\
  \ predicateWithValue:item\n                                                    \
  \                          forProperty:MPMediaItemPropertyAlbumTitle\n         \
  \                                                                  comparisonType:MPMediaPredicateComparisonEqualTo];\n\
  \        [query addFilterPredicate:predicate];\n        [self.musicPlayer setQueueWithQuery:query];\n\
  \    }\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n\
  ## 构建播放界面\n\n创建好媒体查询后，你现在可以开始构建播放界面了。`MPMediaPlayerController`类实现了`MPMediaPlayback`协议，这允许你复用许多用于播放声音文件的播放消息。\n\
  \n要使用`MPMediaPlayerController`类开始播放，请使用`[MPMediaPlayerController play]`方法，该方法的工作方式与其`AVAudioPlayer`对应方法完全相同，即开始（或恢复）播放媒体队列最前端的项目。要暂停播放，请使用`[MPMediaPlayerController\
  \ pause]`方法，该方法会暂停当前正在播放的项目。暂停后再次播放，会从暂停的位置恢复播放。在 MyPod 项目中，播放由一个按钮控制，就像上一章中简单的音频文件播放器一样。该按钮的处理器在\
  \ Listing 6-10 中。\n\n***Listing 6-10***. 在 MyPod 项目中切换播放状态\n\n```objc\n-(IBAction)toggleAudio:(id)sender\n\
  {\n    if ([self.musicPlayer playbackState] == MPMusicPlaybackStatePlaying) {\n\
  \        [self.musicPlayer pause];\n        self.playButton.titleLabel.text = @\"\
  播放\";\n    } else {\n        [self.musicPlayer play];\n        self.playButton.titleLabel.text\
  \ = @\"暂停\";\n    }\n}\n```\n\n与简单的音频播放器一样，要使用一个按钮切换播放状态，你应该通过使用`[MPMusicPlayerController\
  \ playbackState]`属性轮询媒体播放器的播放状态。如果你想完全停止某个项目的播放，请实现一个单独的停止按钮，使用`[MPMediaPlayerController\
  \ stop]`方法。`停止`的工作方式与`暂停`完全相同，唯一的区别是，当用户下次恢复播放时，它会将播放位置重置到音轨的开头。\n\n\n### 在简易音频播放器应用中\n\
  \n在简易音频播放器应用中，你通过将曲目前进或后退 15 秒实现了快进和快退按钮。这个功能在`MPMusicPlayerController`类中同样可用，你可以通过改变`MPMusicPlayerController`对象的`currentPlaybackTime`属性，以相同的方式来实现。列表\
  \ 6-11 展示了向前快进的示例。更完整的实现请参考第 5 章；你可以复用相同的逻辑。\n\n***列表 6-11***. 在曲目中向前快进 15 秒\n\n\
  ```\n-(IBAction)seekForward:(id)sender\n{\n    if ([self.musicPlayer playbackState]\
  \ ==\n        MPMusicPlaybackStatePlaying) {\n\nNSTimeInterval desiredTime =\n \
  \          self.musicPlayer.currentPlaybackTime + 15.0f;\n        if (desiredTime\
  \ <\n            self.musicPlayer.nowPlayingItem.playbackDuration) {\n         \
  \   self.musicPlayer.currentPlaybackTime = desiredTime;\n        }\n    }\n}\n```\n\
  \n为了开始利用`MediaPlayer`框架，你可以用一种略有不同的方式实现快进。`MediaPlayer`框架允许你在快进操作期间加快播放速度，产生一种类似快进录音带时听到的音效（这是我刻意引用的\
  \ 80 年代风格）。然而，这种新实现完全由用户界面驱动，这意味着当用户按下按钮时开始快进，当用户释放按钮时停止快进。使用这种技术，你不再需要修改`currentPlaybackTime`属性。\n\
  \n要开始快进，请在媒体播放器对象上调用`[MPMediaPlayerController beginSeekingForward]`方法。类似地，你可以调用`[MPMediaPlayerController\
  \ beginSeekingBackward]`方法开始快退。当快进/快退结束后，无论哪种情况，你都需要调用`[MPMediaPlayerController\
  \ endSeeking]`方法。列表 6-12 展示了这些调用，它们被封装在事件处理器中，就像在 MyPod 项目中出现的那样。\n\n***列表 6-12***.\
  \ 快进和快退的事件处理器\n\n```\n-(IBAction)startFastForward:(id)sender\n{\n    [self.musicPlayer\
  \ beginSeekingForward];\n}\n\n-(IBAction)startRewind:(id)sender\n{\n    [self.musicPlayer\
  \ beginSeekingBackward];\n}\n\n-(IBAction)stopSeeking:(id)sender\n{\n    [self.musicPlayer\
  \ endSeeking];\n}\n```\n\n要将这些事件处理器关联到你的故事板，你需要更改在 Interface Builder 中使用的事件。要处理用户按下按钮时触发的事件，请在\
  \ Interface Builder 中将`[MainViewController startFastForward:]`方法关联到快进按钮的 Touch Down\
  \ 事件。要处理释放按钮时触发的事件，请在 Interface Builder 中将`[MainViewController stopSeeking:]`方法关联到\
  \ Touch Up Inside 事件。图 6-3 展示了快进按钮在 Interface Builder 中完成连接后的截图。你可以按照相同的过程来连接快退按钮的事件。\n\
  \n![9781430250838_Fig06-03.jpg](img/9781430250838_Fig06-03.jpg)\n\n图 6-3. 快进按钮的\
  \ Interface Builder 连接\n\n为了完成 MyPod 项目的播放界面，你需要实现“上一首”和“下一首”按钮，以支持在当前加载的媒体队列（播放列表）中导航。通过在媒体播放器对象上使用`[MPMediaPlayerController\
  \ skipToNextItem]`和`[MPMediaPlayerController skipToPreviousItem]`方法，你可以在媒体队列中导航。如果队列中只有一项，或者你位于队列的开始或末尾，这些方法将停止当前播放项目的播放。列表\
  \ 6-13 展示了封装了这些方法的事件处理器。\n\n***列表 6-13***. 播放列表导航的事件处理器\n\n```\n-(IBAction)nextTrack:(id)sender\n\
  {\n    [self.musicPlayer skipToNextItem];\n}\n\n-(IBAction)prevTrack:(id)sender\n\
  {\n    [self.musicPlayer skipToPreviousItem];\n}\n```\n\n### 显示歌曲信息（元数据）\n\n对于 MyPod\
  \ 项目的最后一部分，你需要通过显示当前播放歌曲的信息（或元数据）来让用户知晓。回顾本部分开头的原型图，你希望显示歌曲标题、艺术家姓名、专辑标题和专辑封面（如果有的话）。与\
  \ iOS 应用开发的许多其他方面一样，有一个 API 可以完成这个任务！通过利用`[MPMediaItem valueForProperty:]`实例方法，你可以查询媒体项目的元数据信息。\n\
  \n`[MPMediaItem valueForProperty:]`实例方法返回一个包含你所查询的属性`key`的元数据信息的对象。由于这是一个极其通用的方法，你需要了解每个属性返回的对象类型才能充分利用它。表\
  \ 6-3 列出了一些最常用的属性，包括它们所代表的信息以及返回类型。这些属性键是在`MPMediaItem`类中定义的常量值。\n\n表 6-3. 常用的 `MPMediaItem`\
  \ 属性键\n\n| 键 | 返回类型 | 表示内容 |\n| --- | --- | --- |\n| `MPMediaItemPropertyArtist`\
  \ | `NSString` | 所选项目的表演艺术家 |\n| `MPMediaItemPropertyArtwork` | `MPMediaItemArtwork`\
  \ | 所选项目的专辑封面 |\n| `MPMediaItemPropertyAlbumTitle` | `NSString` | 所选项目的专辑标题 |\n\
  | `MPMediaItemPropertyGenre` | `NSString` | 所选项目的流派 |\n| `MPMediaItemPropertyReleaseDate`\
  \ | `NSString` | 所选项目的发行日期 |\n| `MPMediaItemPropertyTitle` | `NSString` | 所选项目的标题\
  \ |\n\n对于返回类型为`NSString`对象的属性，例如`MPMediaItemPropertyTitle`，你可以直接将输出保存到字符串，或用来初始化一个标签。例如，要初始化主视图控制器的`titleLabel`，将标签的`text`属性设置为返回值：\n\
  \n```\nself.titleLabel.text = [currentMediaItem valueForProperty:MPMediaItemPropertyTitle];\n\
  ```\n\n回顾表 6-3，注意表示专辑封面的`MPMediaItemPropertyArtwork`键返回一个`MPMediaItemArtwork`对象。要使用此输出与`UIImageView`配合，你需要使用`[MPMediaItemArtwork\
  \ imageWithSize:]`实例方法来生成一个`UIImage`对象，如列表 6-14 所示。\n\n***列表 6-14***. 从 `MPMediaItemArtwork`\
  \ 对象生成 `UIImage`\n\n```\nMPMediaItem *currentItem = self.musicPlayer.nowPlayingItem;\n\
  MPMediaItemArtwork *albumArt = [currentItem\n    valueForProperty:MPMediaItemPropertyArtwork];\n\
  CGSize imageFrameSize = self.albumImageView.frame.size;\nself.albumImageView.image\
  \ = [albumArt imageWithSize:imageFrameSize];\n```\n\n`[MPMediaItemArtwork imageWithSize:]`方法使用一个`CGSize`参数来确定生成图像的宽度和高度。如示例所示，你可以传入`UIImageView`的`frame`中的`size`属性。\n\
  \n你可能最后一个问题是：“我应该在哪里调用获取所有这些元数据的代码？”因为每次播放列表前进时，你都需要更新显示的元数据，所以每当收到`MPMusicPlayerControllerNowPlayingItemDidChangeNotification`通知时，你应该检索元数据并设置你的标签。列表\
  \ 6-15 展示了一个通过块方法捕获该通知的示例。\n\n***列表 6-15***. 捕获“正在播放”变化的通知\n\n\n\n```objc\n[[NSNotificationCenter\
  \ defaultCenter] addObserverForName:\n    @\"MPMusicPlayerControllerVolumeDidChangeNotification\"\
  \n    object:self queue:nil\n    usingBlock:^(NSNotification *note) {\n\nMPMediaItem\
  \ *currentItem = self.musicPlayer.nowPlayingItem;\n        MPMediaItemArtwork *albumArt\
  \ =\n           [currentItem valueForProperty:MPMediaItemPropertyArtwork];\n   \
  \     CGSize imageFrameSize = self.albumImageView.frame.size;\n        self.albumImageView.image\
  \ =\n           [albumArt imageWithSize:imageFrameSize];\n\nNSString *artistName\
  \ =\n          [currentItem valueForProperty:MPMediaItemPropertyTitle];\n      \
  \  NSString *albumName =\n          [currentItem valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
  \nself.titleLabel.text =\n           [currentItem valueForProperty:MPMediaItemPropertyTitle];\n\
  \        self.albumLabel.text = [NSString stringWithFormat:@\"%@ / %@\",\n     \
  \                           artistName, albumName];\n\n}];\n```\n\n要开始接收通知，您需要让音乐播放器知道它应该生成这些通知。您可以通过调用\
  \ `[MPMusicPlayerController beginGeneratingPlaybackNotifications]` 实例方法来实现这一点。清单\
  \ 6-16 包含了主视图控制器的 `[self viewDidLoad]` 方法的完整版本，其中包含了这一步。\n\n***清单 6-16***. 创建媒体播放器并捕获通知的完整实现\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后进行任何额外的设置，\n\
  \        // 通常是从 nib 文件加载。\n\nself.musicPlayer = [MPMusicPlayerController\n    \
  \                    applicationMusicPlayer];\n\n[self.musicPlayer beginGeneratingPlaybackNotifications];\n\
  \n[[NSNotificationCenter defaultCenter] addObserverForName:\n        @\"MPMusicPlayerControllerNowPlayingItemDidChangeNotification\"\
  \n        object:self\n        queue:nil usingBlock:^(NSNotification *note) {\n\n\
  MPMediaItem *currentItem = self.musicPlayer.nowPlayingItem;\n        MPMediaItemArtwork\
  \ *albumArt = [currentItem\n            valueForProperty:MPMediaItemPropertyArtwork];\n\
  \        CGSize imageFrameSize = self.albumImageView.frame.size;\n\nself.albumImageView.image\
  \ =\n           [albumArt imageWithSize:imageFrameSize];\n\nNSString *artistName\
  \ =\n          [currentItem valueForProperty:MPMediaItemPropertyTitle];\n      \
  \  NSString *albumName =\n          [currentItem valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
  \nself.titleLabel.text =\n          [currentItem valueForProperty:MPMediaItemPropertyTitle];\n\
  \        self.albumLabel.text = [NSString stringWithFormat:@\"%@ / %@\",\n     \
  \                           artistName, albumName];\n\n}];\n}\n```\n\n通知是许多 `MediaPlayer`\
  \ 类（尤其是用于视频播放的类）的核心概念。有关此概念的更详细解释，请跳转到第 10 章“播放和录制视频”的开头部分。\n\n## 流媒体音乐\n\n现在您已经知道如何在应用中播放音频文件和\
  \ iPod 媒体资料，是时候探索另一个主要的音频来源了：流媒体音频服务。许多广播电台提供其广播的在线版本，并且大量广播电台仅通过网络运营。这项技术被称为*流音频*，因为您不是下载文件，而是连接到一个服务器，该服务器向所有连接者广播连续的音频数据*流*（也称为*多播*）。该流通常使用与音频文件相同的压缩格式（编解码器，例如\
  \ MP3、OGG 或其他格式）进行编码，但不同于文件的是，它没有起始或终止头部。在播放器端，当应用程序连接到流时，它会将数据保存到内存中的一个存储桶中，称为*缓冲区*。当缓冲区收集到足够的数据以连续播放音频（或视频）时，播放即开始。\n\
  \n使用 `AVPlayer` 类，您可以访问 `AVFoundation` 框架的流媒体音频播放器。您之前用于音频文件播放的 `AVAudioPlayer`\
  \ 类不支持缓冲区管理，因此它不适合用于流媒体音频。方便的是，`AVPlayer` 类遵循了许多与 `AVAudioPlayer` 和 `MPMusicPlayerController`\
  \ 类相同的设计模式，这意味着您可以重用相同的通用逻辑进行播放。\n\n为了在您的应用中集成流媒体广播服务，您可以修改第 5 章中的 MyPlayer 应用，将其转换为使用流媒体音频而非音频文件。您将简化用户界面，使其看起来像图\
  \ 6-4 中的模型，将控件减少为“播放”按钮和一个用户可以输入流 URL 的提示框。该项目包含在源代码包的 `Chapter 6` 文件夹中，名为 MyStreamingPlayer\
  \ 项目。\n\n![9781430250838_Fig06-04.jpg](img/9781430250838_Fig06-04.jpg)\n\n图 6-4.\
  \ MyStreamingPlayer 应用模型\n\n## 入门指南\n\n要开始实现 MyStreamingPlayer 项目，请复制一份 MyPlayer\
  \ 项目，并适当地重命名。\n\n**提示** 您可以通过在源代码导航器（Xcode 的左窗格）中双击项目名称来快速重命名项目。\n\n在 Interface\
  \ Builder 中，从主视图控制器中移除除“播放”按钮和“选择文件”按钮之外的所有按钮。将“选择文件”按钮重命名为*选择流*。在您的代码中，删除已移除按钮的无关代码。因为您想要使用\
  \ `AVPlayer` 类（可以播放流媒体文件）而不是 `AVAudioPlayer` 类（不能播放），所以请将 `audioPlayer` 属性的对象类型更改为\
  \ `AVPlayer`。由于这两个类都属于 `AVFoundation` 框架，您无需进行任何其他更改。您的最终头文件应类似于清单 6-17 中的示例。\n\n\
  ***清单 6-17***. MainViewController 类的头文件\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
  \ <AVFoundation/AVFoundation.h>\n\n@interface MainViewController : UIViewController\
  \ <UIAlertViewDelegate>\n\n@property (nonatomic, strong) IBOutlet UILabel *timeLabel;\n\
  @property (nonatomic, strong) IBOutlet UILabel *titleLabel;\n\n@property (nonatomic,\
  \ strong) IBOutlet UIButton *chooseButton;\n@property (nonatomic, strong) IBOutlet\
  \ UIButton *playButton;\n\n@property (nonatomic, strong) NSURL *selectedURL;\n\n\
  @property (nonatomic, strong) AVPlayer *audioPlayer;\n\n-(IBAction)play:(id)sender;\n\
  -(IBAction)chooseStream:(id)sender;\n\n@end\n```\n\n### 连接到流\n\n您将使用 `UIAlertView`\
  \ 允许用户输入流 URL。您可以在大多数广播电台网站上找到有效的流 URL，方法是查找以 `.pls` 结尾的链接。`.pls` 文件是一个播放列表，其中包含多个流媒体广播频道的\
  \ URL。多播流通常对可以同时连接的用户数量有限制。使用播放列表有助于缓解拥塞，因为播放器会遍历播放列表，直到找到它可以连接的流。您希望在用户按下“选择流”按钮时显示\
  \ `UIAlertView`。清单 6-18 包含了此操作的事件处理程序示例。请确保您将此操作处理程序与 Interface Builder 中的按钮关联起来。\n\
  \n***清单 6-18***. 显示 UIAlertView 以选择流\n\n```objc\n-(IBAction)chooseStream:(id)sender\n\
  {\n    UIAlertView *alertView = [[UIAlertView alloc]\n        initWithTitle:@\"\
  请输入流 URL\" message:@\"\"\n        delegate:self cancelButtonTitle:@\"取消\"\n    \
  \        otherButtonTitles:@\"确定\", nil];\n    [alertView setAlertViewStyle:UIAlertViewStylePlainTextInput];\n\
  \    [alertView show];\n}\n```\n\n\n\n使用 `[UIAlertView setAlertViewStyle:]` 实例方法将\
  \ `UIAlertView` 设置为显示文本框。在下一节中，你将了解如何处理结果。\n\n### 播放流媒体音频\n\n当用户输入流媒体 URL 后，你便可以利用该信息为主视图控制器初始化\
  \ `AVPlayer` 对象。与 `AVAudioPlayer` 类非常相似，你可以在初始化过程中将项目加载到 `AVPlayer` 项目中。代码清单 6-19\
  \ 展示了 `UIAlertView` 的委托方法，该方法用于初始化 `AVPlayer` 并更改“正在播放”标签的标题。\n\n***代码清单 6-19***.\
  \ 初始化 AVPlayer\n\n```\n-(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    if (buttonIndex == 1) {\n        NSString *selectedUrlString =\n        \
  \   [alertView textFieldAtIndex:0].text;\n        self.selectedURL = [NSURL URLWithString:selectedUrlString];\n\
  \        self.titleLabel.text = [NSString stringWithFormat:\n                  \
  \              @\"Now Playing: %@\", selectedUrlString];\n        self.audioPlayer\
  \ = [[AVPlayer alloc] initWithURL:\n                            self.selectedURL];\n\
  \    }\n}\n```\n\n要播放音频，请复用其他两个媒体播放器应用中的基本逻辑——根据播放状态启动或停止。对于 `AVPlayer` 类，你可以通过\
  \ `status` 属性查询其状态。如果该值为 `AVPlayerStatusReadyToPlay`，则说明播放器已准备好开始播放音频；否则，要么正在播放，要么在连接流媒体时发生错误。你可以通过检查\
  \ `error` 状态是否为非 `nil` 来判断是否发生了错误。代码清单 6-20 展示了“播放”按钮的操作处理器，该处理器尝试开始播放或显示错误信息。\n\
  \n***代码清单 6-20***. 播放按钮的操作处理器\n\n```\n-(IBAction)play:(id)sender\n{\n    if (self.audioPlayer.error\
  \ != nil) {\n        UIAlertView *alert = [[UIAlertView alloc]\n               \
  \               initWithTitle:@\"Error\"\n           message:[self.audioPlayer.error\
  \ description] delegate:self\n                    cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
  \        [alert show];\n    } else {\n        if ([self.audioPlayer status] != AVPlayerStatusReadyToPlay)\
  \ {\n            [self.audioPlayer pause];\n            self.playButton.titleLabel.text\
  \ = @\"Play\";\n\n} else {\n            [self.audioPlayer play];\n            self.playButton.titleLabel.text\
  \ = @\"Pause\";\n        }\n    }\n}\n```\n\n## 播放事件音效（包括振动）\n\n通常，你会希望播放一个简短音效以响应用户界面事件，例如，当用户用相机拍照时发出咔嚓声，或者用户在输入文本时发出打字声。你可能还记得，在第\
  \ 5 章中，使用 `AVAudioPlayer` 类播放声音的过程需要大量设置，并且可能需要几秒钟来初始化。因此，对于播放非常短的声音文件（少于 30 秒），Apple\
  \ 建议使用 `AudioToolbox` 框架中包含的系统声音服务 API。\n\n系统声音服务的理念是创建一个编程接口，用以重现 OS X 中“音效”面板的功能，如图\
  \ 6-5 所示。该面板可通过“声音”系统偏好设置窗格访问，允许你指定在警报视图或其他操作发生时计算机应播放的命名音效。\n\n![9781430250838_Fig06-05.jpg](img/9781430250838_Fig06-05.jpg)\n\
  \n图 6-5. OS X 音效面板\n\n虽然 iOS 有自己系统声音面板，但在撰写本文时，Apple 不允许你在应用中访问它。然而，通过定义你自己的系统声音，你可以利用相同的功能。\n\
  \n要播放系统声音，请执行以下步骤：\n\n1.  为你想要播放的声音文件创建一个 URL 引用。\n2.  使用此 URL 引用创建一个 `SystemSoundID`\
  \ 对象。\n3.  通过引用其 `SystemSoundID` 对象来播放你所需的声音。\n\n### 开始上手\n\n为了帮助你学习如何使用系统声音，你将实现源代码包\
  \ `Chapter 6` 文件夹中的 SystemSounds 项目。SystemSounds 是一个简单的单视图应用，根据按下的按钮，播放音效或使设备振动。图\
  \ 6-6 展示了该应用的模型图。\n\n![9781430250838_Fig06-06.jpg](img/9781430250838_Fig06-06.jpg)\n\
  \n图 6-6. SystemSounds 项目模型图\n\n在开始使用系统声音之前，你需要在项目中包含 `AudioToolbox` 框架。你可以通过通常的方式找到该框架：导航到项目设置，然后使用出现在“构建阶段”选项卡下“将二进制文件链接到库”部分中的框架浏览器。\n\
  \n接下来，你需要在将要实现该框架的类中包含 `AudioToolbox.h` 头文件。对于 SampleSounds 项目，这个类是 `MainViewController`：\n\
  \n```\n#import <AudioToolbox/AudioToolbox.h>\n```\n\n**注意**  `AudioToolbox` 框架与\
  \ `AVFoundation` 是分开的，因此如果你要在同一项目中使用两者，请记得都包含它们。\n\n### 创建系统声音\n\n`AudioToolbox`\
  \ 框架相对于 `AVFoundation` 具有速度优势，部分原因在于它是一个基于 C 语言的框架。在编译器层面，Objective-C 是在 C 语言之上实现的，因此直接使用\
  \ C 语言可以使框架减少开销，并以更接近硬件期望的方式表示数据。\n\n因此，要初始化你的系统声音，你需要向系统提供一个 URL 引用（`CFURLRef`），而不是\
  \ `NSURL` 对象。`CFBundleCopyResourceURL()` 方法允许你以类似于检索文件 URL 的方式创建 URL 引用：通过指定主束的路径以及所需文件的名称和类型。代码清单\
  \ 6-21 展示了一个创建 URL 引用的示例方法。\n\n***代码清单 6-21***. 为声音文件创建 URL 引用\n\n```\n- (void)initializeSystemSound\n\
  {\n    CFBundleRef mainBundle = CFBundleGetMainBundle();\n    CFURLRef clickUrlRef\
  \ = CFBundleCopyResourceURL(mainBundle,\n        CFSTR(\"click\"), CFSTR(\"wav\"\
  ), nil);\n\n}\n```\n\n为降低开销，`AudioToolbox` 类仅接受未压缩的音频文件（也称为*线性 PCM 文件*）。为满足此要求，你的系统声音应始终使用\
  \ AIF 和 WAV 文件。\n\n为了在底层运行，你的声音文件需要加载到内存中，因此请确保通过将它们添加到项目中来包含在主束中（关于束的更详细说明，请参阅第\
  \ 2 章）。要访问主束，你需要使用束引用（`CFBundleRef`），你可以通过 `CFGetMainBundle()` 函数轻松找到它。由于你在 C 语言层面操作，因此不能使用\
  \ `NSString` 类；相反，你需要使用字符串引用（`CFStringRef`）。创建一次性使用的 `CFStringRef` 的快捷方式是使用宏函数 `CFStr()`。\n\
  \n**注意**  你可能想知道为什么我在此示例中一直对方法调用使用括号。这是 C 语言的语法！请始终为你所引用的框架使用正确的语法。尽量避免对 Objective-C\
  \ 框架使用 C 语言风格的调用；这样做会使调试变得更加困难。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的格式要求，完成英文到中文的翻译。\n\
  \n\n现在你已经有了一个有效的音效文件引用，你需要创建一个系统声音 ID 对象（`SystemSoundID`）来播放它，这需要使用 `AudioToolbox`\
  \ 框架。你将在整个调用类中复用这个对象，因此请确保将其声明为实例变量。由于你需要对 `AudioToolbox` 类使用 C 语法，因此需要在类的 `@implementation`\
  \ 块中声明该变量：\n\n```\nSystemSoundID clickSoundId;\n```\n\n在示例项目中，你可以在 `MainViewController.m`\
  \ 文件中找到这个声明。\n\n你可以通过调用 `AudioServicesCreateSystemSoundID()` 函数来初始化 `SystemSoundID`\
  \ 对象，该函数需要你之前生成的 URL 引用和一个指向系统声音 ID 对象的指针。清单 6-22 展示了 `[self initializeSystemSounds]`\
  \ 方法的修改版本，它会在运行时为一个系统声音 ID 创建一个指针。\n\n***清单 6-22***. 创建一个 `SystemSoundID` 对象\n\n\
  ```\n- (void)initializeSystemSound\n{\n    CFBundleRef mainBundle = CFBundleGetMainBundle();\n\
  \    CFURLRef clickUrlRef = CFBundleCopyResourceURL(mainBundle,\n        CFSTR(\"\
  click\"), CFSTR(\"wav\"), nil);\n\nAudioServicesCreateSystemSoundID (clickUrlRef,\
  \ &clickSoundId);\n}\n```\n\n与上一章初始化音频会话时需要*按引用*传递 `NSError` 对象的方式类似，你同样需要*按引用*传递你的\
  \ `systemSoundId` 对象来初始化它们。回顾一下，按引用传递时，你可以修改传入对象的内容，而不是修改它在内存中的副本。\n\n如果你需要创建多个系统声音，请按照流程为每个声音创建一个\
  \ URL 引用和 `SystemSoundID` 对象。\n\n最后一点，你需要在调用所有系统声音 ID 对象之前完成它们的初始化，因此请从属于初始化过程的方法中调用\
  \ `[self initializeSystemSounds]` 方法。示例项目在 `MainViewController` 类中的 `[self viewDidLoad]`\
  \ 方法里进行了此调用。\n\n### 播放系统声音\n\n既然你已经初始化了系统声音，就可以通过使用你的 `SystemSoundID` 对象调用 `AudioServicesPlaySystemSound()`\
  \ 方法来播放它们。系统声音初始化后，你可以在类的生命周期内的任何时刻调用它们。清单 6-23 展示了一个播放系统声音的按钮处理程序示例。\n\n***清单 6-23***.\
  \ 播放系统声音\n\n```\n-(IBAction)playSound:(id)sender\n{\n    AudioServicesPlaySystemSound(clickSoundId);\n\
  }\n```\n\n**注意**  “系统声音服务”仅适用于非常简单的音频文件。它只能播放最多 30 秒的文件，使用用户当前的音频设置（音量、静音等），并且一次只能播放一个。如果需要更高级的播放功能，请继续使用\
  \ `AVAudioPlayer` 类。\n\n### 使设备振动\n\n“系统声音服务”提供了两种使设备振动的方式：一种是在播放系统声音的同时振动，另一种是代替播放系统声音而振动。\n\
  \n**注意**  振动功能仅在 iPhone 设备上可用；但是，在不兼容的设备上调用这些 API 是无害的；`vibrate` 命令将会被简单地忽略。\n\n\
  为了在播放系统声音时使设备振动，可以使用 `AudioServicesPlayAlertSound()` 方法代替 `AudioServicesPlaySystemSound()`\
  \ 方法，如清单 6-24 所示。\n\n***清单 6-24***. 播放带振动的系统声音\n\n```\n-(IBAction)playSoundAndVibrate:(id)sender\n\
  {\n    AudioServicesPlayAlertSound(clickSoundId);\n}\n```\n\nApple 对于“没有全局可访问的系统声音”这一规则有一个例外：当你希望设备振动但不播放声音时。要实现这一点，可以使用\
  \ `AudioToolbox` 中用于振动的常量 `kSystemSoundID_Vibrate` 调用 `AudioServicesPlaySystemSound()`\
  \ 方法。清单 6-25 展示了一个示例。\n\n***清单 6-25***. 使设备振动但不播放声音\n\n```\n-(IBAction)vibrate:(id)sender\n\
  {\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n}\n```\n\n**注意**  与播放普通系统声音一样，一次只能有一个振动效果处于激活状态。在撰写本文时，还没有公开的\
  \ API 可以控制振动的强度或播放时长。\n\n## 总结\n\n在本章中，你学习了如何将三种新的音频源集成到你的应用：iPod 音乐文件、流式音频和系统声音。在实现\
  \ `MyPod` 应用时，你看到了 `MediaPlayer` 框架如何提供对 iPod 应用的深度访问，同时遵循与 `AVFoundation` 播放类相似的许多设计模式。通过\
  \ `MyStreamingPlayer` 应用，你学习了如何修改你的音频文件播放器来播放流式音频——这主要包括使用 `AVPlayer` 类代替 `AVAudioPlayer`\
  \ 类。通过 `SystemSounds` 应用，你学习了如何使用 `SystemsSounds` 类将基于 `C` 的代码集成到你的应用中，以快速播放短音效文件或使手机振动。\n\
  \n最后要记住一点：这些类并不是互斥的；你可以在同一个应用中使用它们中的任意一个或全部，只要为你尝试播放的每个音频源维护一个对象即可。\n\n"
- '# 第 7 章


  '
- "# 高级音频主题\n\n在第 5 章和第 6 章中，你学习了如何构建接受多种输入源（包括本地文件、用户的 iPod 音乐库和流式广播）的音频播放器应用。你还学习了如何使用基于\
  \ `AVFoundation` 和 `MediaPlayer` 框架的媒体播放器，并看到了它们之间的一些相似之处。\n\n在本章中，你将学习如何通过增加一些功能，使你的音频应用更加强大，这些功能可以将你的音频从其他设备任务的干扰中解放出来。这些功能将使你的应用在用户触发外部事件（例如将应用切换到后台或拔掉耳机）时能够继续运行。在此过程中，你还会探索一些额外的高级功能，例如\
  \ `AirPlay` 和“远程控制”，它们允许用户在应用内置的用户界面之外与其进行交互。\n\n## 后台音频\n\n在第 5 章的 `MyPlayer` 项目中，你构建了一个可以播放应用文档目录中声音文件的应用。不幸的是，你可能已经注意到，将应用发送到后台（无论是通过让设备“休眠”还是打开另一个应用）都会暂停播放。不过，通过对项目设置和音频会话进行一些调整，你可以使基于\
  \ `AVFoundation` 的音频应用即使在后台运行时也能继续播放。以下是您需要进行的主要更改：\n\n*   为你的应用添加后台模式\n*   选择兼容后台的会话类型\n\
  \n在本节中，你将修改第 5 章的 `MyPlayer` 项目，使其能够在后台播放音频。你可以在源代码包的“第 7 章”文件夹中找到该项目的副本（参见 Apress\
  \ 网站 `www.apress.com` 的源代码/下载区域），其中包含了后台音频的修改。该项目保留 `MyPlayer` 名称。在构建第 5 章中 `MyPlayer`\
  \ 项目的初始版本时，你学习了如何执行以下操作：\n\n*   初始化音乐播放器\n*   指定媒体查询（你可以将其视为播放列表）\n*   构建播放界面\n\
  *   显示歌曲信息（元数据）\n\n\n\n### 设置后台模式\n\n启用后台音频的第一步是修改项目设置，以表明您的应用将使用音频后台服务。后台服务是 iOS\
  \ 的机制，允许应用在进入后台时，保持其中一小部分进程持续运行。与设计为同时运行多个应用程序的现代桌面电脑不同，iOS 设备旨在一次只保持一个应用程序活跃。由于这些设备资源有限，允许所有进程始终处于活跃状态并不合理。相反，当用户启动或切换到另一个应用程序时，前一个应用会被置于后台，即被挂起，直到它被关闭或再次成为活跃应用。\n\
  \n苹果公司意识到，某些应用（例如音乐播放器或导航应用）在后台时仍需继续运行，因此 iOS 使用后台服务来定义一个允许在后台继续运行的进程白名单。\n\n要使用后台服务，您需要在项目设置的\
  \ `UIBackgroundModes` 键中添加值。在 Xcode 6 中，您可以通过从项目导航器中选择项目文件（`MyPlayer.xcodeproj`），然后选择“功能”标签页来完成此操作，如图\
  \ 7-1 所示。\n\n![9781430250838_Fig07-01.jpg](img/9781430250838_Fig07-01.jpg)\n\n图\
  \ 7-1. Xcode 中的“功能”标签页\n\n将“后台模式”部分的开关切换到“开”后，您会看到一系列复选框，用于选择后台模式。对于 MyPlayer 应用，您需要启用“音频和\
  \ AirPlay”。勾选复选框后，您的屏幕应如图 7-2 所示。\n\n![9781430250838_Fig07-02.jpg](img/9781430250838_Fig07-02.jpg)\n\
  \n图 7-2. 完成的后台模式设置\n\nXcode 的“功能”标签页提供了用户友好的界面来修改通用项目设置。如果您使用的是 Xcode 5，或者更喜欢传统的修改应用设置方式，可以使用“信息”标签页。需要添加的键名为“必需的后台模式”（或\
  \ `UIBackgroundModes`）。图 7-3 展示了在“信息”标签页中设置的外观示例。\n\n![9781430250838_Fig07-03.jpg](img/9781430250838_Fig07-03.jpg)\n\
  \n图 7-3. 使用“信息”标签页指定后台模式\n\n`UIBackgroundModes` 键可以接受一个数组作为其输入值，因此您可以通过添加多个值来指定多种后台服务。\n\
  \n表 7-1 列出了最常用的 `UIBackgroundModes` 键及其含义。请记住，当您的应用在后台时，只有这些类型的任务可以保持运行。\n\n表 7-1.\
  \ iOS 支持的主要后台模式\n\n| 名称 | 键值 | 用途 |\n| --- | --- | --- |\n| 音频和 AirPlay | `audio`\
  \ | 允许应用在后台播放音频 |\n| 位置更新 | `location` | 允许应用在后台使用定位服务（以提供基于位置的信息） |\n| 外部配件通信 |\
  \ `external-accessory` | 允许应用在后台与连接的硬件配件通信 |\n| 使用蓝牙低功耗配件 | `bluetooth-peripheral`\
  \ | 允许应用在后台与蓝牙配件通信 |\n| 后台获取 | `fetch` | 允许应用在后台定期获取信息 |\n| 远程通知 | `remote-notification`\
  \ | 允许应用根据通知在后台更新信息 |\n\n## 选择兼容的会话类型\n\n为 MyPlayer 应用启用后台音频的第二步是选择支持后台运行的音频会话类型。与设置后台模式相比，这一步更为直接。您需要做的就是选择最适合您应用的音频会话。为方便起见，表\
  \ 7-2 列出了兼容后台的会话类别及其用途。\n\n表 7-2. 兼容后台运行的 `AVAudioSession` 类别\n\n| 类别名称 | 用途 |\n\
  | --- | --- |\n| `AVAudioSessionCategoryPlayback` | 播放声音文件（仅单工播放） |\n| `AVAudioSessionCategoryRecord`\
  \ | 录制声音文件（仅单工录制） |\n| `AVAudioSessionCategoryPlayAndRecord` | 全双工音频播放与录制 |\n\n\
  MyPlayer 应用仅需要播放音频，因此 `AVAudioSessionCategoryPlayback` 键最为合适。由于您需要在视图加载时初始化会话，请将此代码放置在\
  \ `MainViewController` 类的 `[self viewDidLoad]` 方法中，如代码清单 7-1 所示。\n\n***代码清单 7-1***.\
  \ 初始化音频会话\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后进行任何额外的设置，通常\n\
        // 来自一个 nib 文件。\n\nNSError *error = nil;\n    [[AVAudioSession sharedInstance]\n\
          setCategory:AVAudioSessionCategoryPlayback error:&error];\n    if (error\
  \ == nil) {\n        NSLog(@\"音频会话初始化成功\");\n    } else {\n        NSLog(@\"初始化音频会话时出错:\
  \ %@\",\n              [error description]);\n    }\n}\n```\n\n要测试您是否正确配置了后台音频，请在应用中选择一个音乐文件并等待其开始播放。然后按下\
  \ Home 键。即使应用进入后台，音乐也应继续播放。\n\n## 使用“正在播放”中心\n\n许多开发者喜欢用来增强音频驱动应用用户体验的另一个酷炫功能是“正在播放”中心。“正在播放”中心是\
  \ iOS 中的一个全局资源，它会显示在锁定屏幕、多任务菜单、任何 Made for iPod 兼容的连接设备（例如收音机或汽车仪表盘）上，以及任何明确请求该信息的应用中。\n\
  \n如图 7-4 所示，在锁定屏幕和多任务模态界面中，“正在播放”中心会显示歌曲标题、专辑或艺术家信息（取决于应用）、播放进度以及专辑封面艺术（在锁定屏幕上）。这些屏幕还提供了一组有限的播放控制，包括播放/暂停和后退/前进。\n\
  \n![9781430250838_Fig07-04.jpg](img/9781430250838_Fig07-04.jpg)\n\n图 7-4. 锁定屏幕和多任务菜单上的“正在播放”信息\n\
  \n在本节中，您将学习如何通过实现 `MPNowPlayingInfoCenter` 类和远程控制事件，使您的音频应用与系统的“正在播放”中心兼容。\n\n您可能对“远程控制”这个术语感到疑惑，因为众所周知\
  \ iPhone 并非电视的遥控器（至少其本身不是）。但在媒体应用的上下文中，远程控制指的是 Made for iPhone (MFi) 耳机上包含的硬件控制，例如\
  \ iPhone 附带的耳机。这些相同的控制会通过“正在播放”中心进行传递，而且额外的好处是，您可以利用它们使您的应用与 MFi 耳机兼容。\n\n正如您在上一节中对后台音频所做的那样，您将继续扩展\
  \ MyPlayer 应用来添加对“正在播放”的支持。\n\n\n\n**注意** `MPNowPlayingInfoCenter` 类仅用于向“正在播放”中心进行单向通信。获取当前播放曲目信息的唯一方法是实现\
  \ iPod 音乐库应用程序，如第 6 章所述。\n\n## 显示元数据\n\n如前所述，iOS 设备上的“正在播放”中心是一个共享系统资源。顾名思义，`MPNowPlayingInfoCenter`\
  \ 类是 `MediaPlayer` 框架的一部分，但这并不妨碍它与 `AVFoundation` 媒体播放器配合使用。任何类型的应用程序都可以向 `MPNowPlayingInfoCenter`\
  \ 类发送消息——只要它们格式正确。\n\n要在 MyPlayer 应用程序中启用“正在播放”支持，您需要在项目中包含 `MediaPlayer` 框架，并将其添加到\
  \ `MainViewController` 类的头文件 (`MainViewController.h`) 中：\n\n```objc\n#import <MediaPlayer/MediaPlayer.h>\n\
  ```\n\n作为一个共享资源（就像摄像头一样），您可以通过单例模式访问“正在播放”中心，该单例可通过 `[MPNowPlayingInfoCenter defaultCenter]`\
  \ 公开方法获取：\n\n```objc\nMPNowPlayingInfoCenter *infoCenter = [MPNowPlayingInfoCenter\
  \ defaultCenter];\n```\n\n要为“正在播放”中心设置值，您需要使用包含新元数据值的 `NSDictionary` 对象来初始化 `nowPlayingInfo`\
  \ 属性：\n\n```objc\n[infoCenter setNowPlayingInfo:myMetaDataDict];\n```\n\n表 7-3 展示了\
  \ `nowPlayingInfo` 字典的有效键及其类型和含义。这些键在 `MPMediaItem` 类中使用。您必须严格按照指定方式传递它们，否则您的应用程序可能在运行时崩溃。\n\
  \n#### 表 7-3. `nowPlayingInfo` 字典的有效键\n\n| **键** | **类型** | **用途** |\n| --- | ---\
  \ | --- |\n| `MPMediaItemPropertyArtist` | `NSString` | 所选项目的表演艺术家 |\n| `MPMediaItemPropertyArtwork`\
  \ | `MPMediaItemArtwork` | 所选项目的专辑封面 |\n| `MPMediaItemPropertyAlbumTitle` | `NSString`\
  \ | 所选项目的专辑标题 |\n| `MPMediaItemPropertyGenre` | `NSString` | 所选项目的流派 |\n| `MPNowPlayingInfoElapsedPlaybackTime`\
  \ | `NSNumber` | 所选项目的播放进度（以秒为单位） |\n| `MPMediaItemPropertyPlaybackDuration` | `NSNumber`\
  \ | 所选项目的长度（以秒为单位） |\n| `MPMediaItemPropertyTitle` | `NSString` | 所选项目的标题 |\n\n\
  回顾图 7-4，您会看到锁定屏幕和多任务屏幕共有的“正在播放”数值包括歌曲标题、专辑名称和播放时长。对于基于 `MPMusicPlayerController`\
  \ 的应用程序，当您使用 iPod 音乐项目时，可以直接从当前正在播放的 `MPMediaItem` 中获取此信息，如列表 7-2 所示。\n\n#### 列表\
  \ 7-2. 从 `MPMediaItem` 设置元数据信息\n\n```objc\n-(void)viewDidLoad {\n...\n[[NSNotificationCenter\
  \ defaultCenter]\n        addObserverForName: \n           @\"MPMusicPlayerControllerNowPlayingItemDidChangeNotification\"\
  \n         selector:@selector(updateNPCenter:)  object:nil];\n}\n\n-(void)updateNPCenter:(NSNotification\
  \ *)note {\n\nMPMediaItem *currentItem = self.musicPlayer.nowPlayingItem;\n    \
  \    MPMediaItemArtwork *albumArt =\n           [currentItem valueForProperty:MPMediaItemPropertyArtwork];\n\
  \        CGSize imageFrameSize = self.albumImageView.frame.size;\n        self.albumImageView.image\
  \ =\n        [albumArt imageWithSize:imageFrameSize];\n\nNSString *artistName =\n\
  \            [currentItem valueForProperty:MPMediaItemPropertyTitle];\n        NSString\
  \ *albumName =\n            [currentItem\n            valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
  \        NSString *songTitle =\n            [currentItem valueForProperty:MPMediaItemPropertyTitle];\n\
  \nself.titleLabel.text =\n            [currentItem valueForProperty:songTitle];\n\
  \        self.albumLabel.text = [NSString stringWithFormat:@\"%@ / %@\",\n     \
  \                          artistName, albumName];\n\nMPNowPlayingInfoCenter *infoCenter\
  \ =\n            [MPNowPlayingInfoCenter defaultCenter];\n        NSDictionary *infoDict\
  \ = [NSDictionary\n            dictionaryWithObjects:@[songTitle, artistName,\n\
  \            albumName, albumArt] forKeys:@[MPMediaItemPropertyTitle,\n        \
  \    MPMediaItemPropertyAlbumArtist,\n            MPMediaItemPropertyAlbumTitle,\n\
  \            MPMediaItemPropertyArtwork]];\n        [infoCenter setNowPlayingInfo:infoDict];\n\
  \        ;\n\n}\n```\n\n在 MyPlayer 应用程序中，音乐文件的主键是文件名。对于没有完整元数据信息的应用程序，您可以为缺失的信息插入占位符。对于\
  \ MyPlayer 应用程序，使用文件名作为歌曲标题，使用应用程序名称作为专辑标题，使用文件时长作为播放时长，并使用占位图像作为专辑封面，如列表 7-3 所示。\n\
  \n#### 列表 7-3. 为 MyPlayer 应用程序设置元数据信息\n\n```objc\nNSString *songTitle = [filePath\
  \ lastPathComponent];\nNSString *artistName = @\"MyPlayer\";\nMPMediaItemArtwork\
  \ *albumArt = [[MPMediaItemArtwork alloc]\n     initWithImage:[UIImage imageNamed:@\"\
  Placeholder\"]];\n```\n\n您可能会想：“我什么时候调用这段代码？”答案是：每当您的播放列表发生变化时——例如，当用户选择新歌曲或您将新项目加载到播放列表中时——您都应该更新“正在播放”中心。MyPlayer\
  \ 应用程序在文件选择器控制器完成时更新它。列表 7-4 显示了在文件选择器委托中设置“正在播放”信息的完整过程代码。\n\n#### 列表 7-4. 在文件选择器委托中设置“正在播放”信息\n\
  \n```objc\n-(void)didFinishWithFile:(NSString *)filePath\n{\n    self.selectedFilePath\
  \ = filePath;\n\nNSError *error = nil;\n    NSURL *fileURL = [NSURL fileURLWithPath:self.selectedFilePath];\n\
  \nself.audioPlayer = [[AVAudioPlayer alloc]\n                         initWithContentsOfURL:fileURL\
  \ error:&error];\n    self.audioPlayer.delegate = self;\n\nif (error == nil) {\n\
  \        NSLog(@\"audio player initialized successfully\");\n\nself.timer = [NSTimer\
  \ timerWithTimeInterval:1.0f target:self\n                      selector:@selector(updateProgress)\
  \ userInfo:nil\n                      repeats:YES];\n\nNSString *songTitle = [filePath\
  \ lastPathComponent];\n           NSString *artistName = @\"MyPlayer\";\n      \
  \     MPMediaItemArtwork *albumArt = [[MPMediaItemArtwork alloc]\n             \
  \ initWithImage:[UIImage imageNamed:@\"Placeholder\"]];\n\nMPNowPlayingInfoCenter\
  \ *infoCenter = [MPNowPlayingInfoCenter defaultCenter];\n           NSDictionary\
  \ *infoDict =\n               [NSDictionary dictionaryWithObjects:@[songTitle, artistName,\
  \ albumArt]\n               forKeys:@[MPMediaItemPropertyTitle, MPMediaItemPropertyAlbumArtist,\n\
  \               MPMediaItemPropertyArtwork]];\n           [infoCenter setNowPlayingInfo:infoDict];\n\
  \n} else {\n        NSLog(@\"error initializing audio player: %@\",\n          \
  \  [error description]);\n    }\n\n//dismiss the file picker\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n最后一步，为了获得最佳用户体验，您应该每秒更新一次项目的已播放时间，以便用户可以看到进度。在 MyPlayer\
  \ 应用中，您添加了定时器以每秒更新应用内的用户界面；您可以通过添加对“正在播放”信息的更新调用来利用此逻辑，如列表 7-5 所示。\n\n#### 列表 7-5.\
  \ 已添加“正在播放”更新的定时器委托\n\n\n```objc\n-(void)updateProgress\n{\n    NSInteger durationMinutes\
  \ = [self.audioPlayer duration] / 60;\n    NSInteger durationSeconds = [self.audioPlayer\
  \ duration]\n                                 - durationMinutes * 60;\n\n    NSInteger\
  \ currentTimeMinutes = [self.audioPlayer currentTime] / 60;\n    NSInteger currentTimeSeconds\
  \ = [self.audioPlayer currentTime]\n                                    - currentTimeMinutes\
  \ * 60;\n    NSString *progressString =\n        [NSString stringWithFormat:@\"\
  %d:%02d / %d:%02d\",\n         currentTimeMinutes, currentTimeSeconds, durationMinutes,\n\
  \         durationSeconds];\n    self.timeLabel.text = progressString;\n\n    self.progressBar.progress\
  \ = [self.audioPlayer currentTime] /\n                                    [self.audioPlayer\
  \ duration];\n\n    NSNumber *numCurrentTimeSeconds = [NSNumber numberWithInt:currentTimeSeconds];\n\
  \    NSNumber *numDurationSeconds = [NSNumber numberWithInt:durationSeconds];\n\n\
  \    NSString *songTitle = [self.selectedFilePath lastPathComponent];\n    NSString\
  \ *artistName = @\"MyPlayer\";\n    MPMediaItemArtwork *albumArt = [[MPMediaItemArtwork\
  \ alloc]\n        initWithImage:[UIImage imageNamed:@\"Placeholder\"]];\n\n    MPNowPlayingInfoCenter\
  \ *infoCenter = [MPNowPlayingInfoCenter defaultCenter];\n    NSDictionary *infoDict\
  \ = [NSDictionary\n        dictionaryWithObjects:@[songTitle, artistName, albumArt,\n\
  \            numDurationSeconds, numCurrentTimeSeconds]\n            forKeys:@[MPMediaItemPropertyTitle,\n\
  \            MPMediaItemPropertyAlbumArtist,\n            MPMediaItemPropertyArtwork,\n\
  \            MPMediaItemPropertyPlaybackDuration,\n            MPNowPlayingInfoPropertyElapsedPlaybackTime]];\n\
  \    [infoCenter setNowPlayingInfo:infoDict];\n}\n```\n\n你可以在基于 `MPMusicPlayerController`\
  \ 的应用中使用相同的逻辑来更新播放进度。\n\n## 启用播放控制（远程控制）\n\n要为用户提供\"正在播放\"中心的稳健用户体验，需要为应用添加远程控制支持。如本节开头所述，该机制同时驱动着\
  \ Made for iPhone 耳机和\"正在播放\"中心的控件。\n\n要为应用启用远程控制支持，需要注册应用使其能够接收远程控制事件，然后实现这些事件的委托方法。\n\
  \niOS 中的 `Events` 是在发生硬件交互事件（如用户触摸屏幕、旋转设备或使用耳机）时触发的消息。它们由 `UIKit` 框架中的 `UIEvent`\
  \ 类表示，这意味着你无需在代码中包含任何额外的框架或类即可使用它们。\n\n到目前为止，你无需担心代码中的 `UIEvent`，因为 Apple 已在 `UIKit`\
  \ 中包含了对基本触摸事件的支持。然而，要利用更高级的事件（如远程控制事件），你需要将应用注册为能够处理这些事件。为应用添加远程控制支持的 API 调用是 `[[UIApplication\
  \ sharedApplication] beginReceivingRemoteControlEvents]`。\n\n**注意**  `[UIApplication\
  \ sharedApplication]` 对象指定了应用的单例。\n\n一个应用可能包含多个响应同一事件的视图，因此作为额外步骤，你需要通过将播放界面声明为事件的\"\
  第一响应者\"，来指定其应成为远程控制事件的主要接收者。要指定某个视图为第一响应者，首先需要指示你的类*可以成为*第一响应者，然后指定你的视图*就是*第一响应者（默认情况下，新视图的第一响应者支持是关闭的）。\n\
  \n要指定某个视图可以成为第一响应者，请在视图中实现 `[UIResponder canBecomeFirstResponder]` 方法。列表 7-6 演示了如何在\
  \ `MainViewController` 类中实现这一操作。\n\n***列表 7-6***。为 MainViewController 类添加第一响应者支持\n\
  \n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常\n\
  \        //来自 nib 文件。\n\nNSError *error = nil;\n    [[AVAudioSession sharedInstance]\n\
  \        setCategory:AVAudioSessionCategoryPlayback error:&error];\n    if (error\
  \ == nil) {\n        NSLog(@\"audio session initialized successfully\");\n     \
  \             [self becomeFirstResponder];\n    } else {\n        NSLog(@\"error\
  \ initializing audio session: %@\",\n              [error description]);\n    }\n\
  \n)\n}\n\n-(BOOL)canBecomeFirstResponder\n{\n    return YES;\n}\n\n为了再次回答“何时”这个问题，你需要指定你的应用程序已准备好成为第一响应者，并在播放界面的视图加载时接收远程控制事件。对于\
  \ MyPlayer 应用，这应在`MainViewController`的`[self viewDidLoad]`方法中完成，如代码清单 7-7 所示。\n\n\
  ***代码清单 7-7***。向 MainViewController 类添加远程控制事件支持\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常\n        // 来自 nib 文件。\n\n\
  NSError *error = nil;\n    [[AVAudioSession sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\
  \ error:&error];\n    if (error == nil) {\n        NSLog(@\"audio session initialized\
  \ successfully\");\n\n[[UIApplication sharedApplication] beginReceivingRemoteControlEvents]\n\
  \           [self becomeFirstResponder];\n    } else {\n        NSLog(@\"error initializing\
  \ audio session: %@\",\n              [error description]);\n    }\n    )\n}\n```\n\
  \n现在`MainViewController`类已准备好接收事件，你需要处理这些事件。处理远程控制事件的委托方法是`[UIResponder remoteControlReceivedWithEvent:]`。该方法使用的参数是一个`UIEvent`。输入的`type`属性决定了接收事件的类型。你通常使用`switch`语句来处理不同类型的远程控制事件。表\
  \ 7-4 列出了所有可能的远程控制事件。\n\n**表 7-4**。远程控制事件子类型\n\n| 子类型名称 | 用途 |\n| --- | --- |\n\
  | `UIEventSubtypeMotionShake` | 设备被摇晃 |\n| `UIEventSubtypeRemoteControlPlay` | 播放按钮\
  \ |\n| `UIEventSubtypeRemoteControlPause` | 暂停按钮 |\n| `UIEventSubtypeRemoteControlStop`\
  \ | 停止按钮 |\n| `UIEventSubtypeRemoteControlTogglePlayPause` | 切换播放/暂停按钮 |\n| `UIEventSubtypeRemoteControlNextTrack`\
  \ | 跳至下一曲 |\n| `UIEventSubtypeRemoteControlPreviousTrack` | 跳至上一曲 |\n| `UIEventSubtypeRemoteControlBeginSeekingBackward`\
  \ | 开始向后快退（按钮按下） |\n| `UIEventSubtypeRemoteControlEndSeekingBackward` | 结束向后快退（按钮释放）\
  \ |\n| `UIEventSubtypeRemoteControlBeginSeekingForward` | 开始向前快进（按钮按下） |\n| `UIEventSubtypeRemoteControlEndSeekingForward`\
  \ | 结束向前快进（按钮释放） |\n\n**注意**  你无需在应用中处理所有事件类型，只需处理与你的应用相关的事件。\n\n代码清单 7-8 展示了`MainViewController`类的一个示例实现。\n\
  \n***代码清单 7-8***。MainViewController 类的远程控制事件处理程序\n\n```\n-(void)remoteControlReceivedWithEvent:(UIEvent\
  \ *)event\n{\n    switch (event.subtype) {\n        case UIEventSubtypeRemoteControlPlay:\n\
  \        case UIEventSubtypeRemoteControlPause:\n        case UIEventSubtypeRemoteControlTogglePlayPause:\n\
  \            [self play:nil];\n            break;\n        case UIEventSubtypeRemoteControlNextTrack:\n\
  \            [self skipForward:nil];\n            break;\n        case UIEventSubtypeRemoteControlPreviousTrack:\n\
  \            [self skipBackward:nil];\n            break;\n        default:\n  \
  \          break;\n    }\n}\n```\n\nMyPlayer 应用包含了切换反馈和快进/快退的控制。因此，在代码清单 7-8 中，我只实现了对这两个动作的支持。为了进一步简化，清单显示可以通过相同的逻辑来处理多个事件。\n\
  \n在此过程的最后一步，当播放界面从内存中释放时，你需要进行清理。具体来说，`MainViewController`类需要指定它不再作为第一响应者，并且应停止接收远程控制事件。这发生在视图的`[self\
  \ dealloc]`方法中，如代码清单 7-9 所示。\n\n***代码清单 7-9***。清理远程控制事件\n\n```\n-(void)dealloc\n\
  {\n    [self resignFirstResponder];\n}\n```\n\n## 构建更稳健的音频会话\n\n通过添加后台音频和“正在播放”支持，你已显著扩展了\
  \ MyPlayer 应用的功能。它现在运行得更像一个 iPod 应用。然而，要实现完全的功能对等，你需要扩展 MyPlayer 应用以处理意外外部事件，例如来自电话应用的音频中断，或用户插入耳机引起的音频路由变化。\n\
  \n当使用 iPod 应用听音乐时，你可能注意到：当调出 Siri 时播放会停止，关闭 Siri 时恢复播放；拔下耳机时播放暂停（这样你就可以避免用你独特的音乐偏好给旁观者留下深刻印象）。这些行为在\
  \ iOS 中并非默认设置；然而，Cocoa Touch 提供了委托和通知，允许你在应用中实现它们。\n\n在本节中，你将了解如何通过实现`AVAudioSessionDelegate`来处理音频中断，以及响应`AVAudioSessionRouteChangeNotification`通知来处理输出设备（路由）变化，从而为你的音频应用构建更稳健的音频会话。与本章前几节一样，你将继续使用\
  \ MyPlayer 应用作为这些新功能的实验场。\n\n### 处理音频中断\n\niOS 中的*音频中断*是任何会中断应用音频会话的事件。此类事件可能包括来电、闹钟、通知声音或\
  \ Siri。iOS 中音频中断的默认行为是遵循你为应用选择的音频会话所规定的设置。然而，通过响应`AVAudioSessionInterruptionNotification`通知，你可以捕获中断并插入自己的播放处理代码。\n\
  \n**注意**  `AVAudioSessionInterruptionNotification`通知并非`AVFoundation`基于媒体播放器所独有。任何类，包括那些使用`MediaPlayer`框架进行播放的类，都可以实现`AVAudioSessionInterruptionNotification`通知。\n\
  \n表 7-5 列出了每种`AVAudioSession`类型的默认中断行为。\n\n**表 7-5**。AVAudioSession 类型的默认中断行为\n\n\
  | 子类型名称 | 用途 |\n| --- | --- |\n| `[MPMediaQuery albumsQuery]` | 返回按专辑标题排序的音乐项目（歌曲）列表\
  \ |\n| `[MPMediaQuery artistsQuery]` | 返回按艺术家名称排序的音乐项目（歌曲）列表 |\n| `[MPMediaQuery\
  \ compilationsQuery]` | 返回按专辑标题排序的合辑项目（专辑）列表 |\n| `[MPMediaQuery playlistsQuery]`\
  \ | 返回按播放列表标题排序的播放列表项目列表 |\n| `[MPMediaQuery songsQuery]` | 返回按歌曲标题排序的音乐项目（歌曲）列表\
  \ |\n\n\n\n由于 `AVAudioSessionInterruptionNotification` 通知是在 `AVAudioSession.h` 中定义的，你无需在头文件中包含任何额外的类。与所有实现通知的项目一样，下一步是为该通知声明一个*观察者*方法（即每次捕获到通知时都会被调用的方法）。如代码清单\
  \ 7-10 所示，你将此声明添加到类的 `[self viewDidLoad]` 方法中，因为该类需要在初始化完成后立即准备好捕获通知。观察者方法的选择器是\
  \ `[self caughtInterruption:]`，你将在下一步实现它。\n\n***代码清单 7-10***. 为 MainViewController\
  \ 类添加通知观察者\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any\
  \ additional setup after loading the view, typically\n    // from a nib.\n\n   \
  \ NSError *error = nil;\n    [[AVAudioSession sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\
  \ error:&error];\n    if (error == nil) {\n        NSLog(@\"audio session initialized\
  \ successfully\");\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \            selector:@selector(caughtInterruption:)\n            name:AVAudioSessionInterruptionNotification\
  \ object:nil];\n    } else {\n        NSLog(@\"error initializing audio session:\
  \ %@\",\n              [error description]);\n    }\n}\n```\n\n为了全面支持音频中断，你需要添加自定义代码来处理两个独特事件：中断开始和中断结束。为了创造最佳用户体验，当中断开始时，应立即暂停播放。通常，一个好的做法是为你的类创建一个实例变量，用于指示会话已被中断。对于\
  \ `MainViewController` 类，我将其定义为 `playbackInterrupted`：\n\n```\n@property (nonatomic,\
  \ retain) BOOL playbackInterrupted;\n```\n\n当中断结束时，你应该在适用时尝试恢复播放。你可以通过检查 `playbackInterrupted`\
  \ 变量和媒体播放器的播放状态来确定适用性。\n\n通知通过一个设置为 `userInfo` 属性的 `NSDictionary` 对象，将相关信息发送回其观察者。通知为其信息指定了唯一名称和\
  \ `userInfo` 键。表示捕获到的音频中断类型的键是 `AVAudioSessionInterruptionType`，它映射到一个基于整数的 `enum`。它的值是\
  \ `AVAudioSessionInterruptionTypeBegan` 和 `AVAudioSessionInterruptionTypeEnded`。\n\
  \n基于这些信息，观察者方法（`[self caughtInterruption:]`）会检查通知中的 `AVAudioSessionInterruptionType`\
  \ 键。暂停或恢复播放器，并将 `playbackInterrupted` 实例变量设置为正确的值，如代码清单 7-11 所示。\n\n***代码清单 7-11***.\
  \ 音频中断通知观察者方法\n\n```\n-(void)caughtInterruption:(NSNotification *)notification\n\
  {\n    NSDictionary *userInfo = notification.userInfo;\n\n    NSNumber *type = [userInfo\n\
  \                     objectForKey:AVAudioSessionInterruptionTypeKey];\n    if ([type\
  \ integerValue] == AVAudioSessionInterruptionTypeBegan) {\n        if (self.audioPlayer.playing)\
  \ {\n            [self.audioPlayer pause];\n            self.playbackInterrupted\
  \ = YES;\n        }\n    } else {\n        if (self.audioPlayer.playing || self.playbackInterrupted)\
  \ {\n            [self.audioPlayer play];\n            self.playbackInterrupted\
  \ = NO;\n        }\n    }\n}\n```\n\n为了给 `playbackInterrupted` 标志增加一层额外的安全性，请确保每当用户在界面中手动选择一个控件时，都将其值设置为\
  \ `NO`。代码清单 7-12 展示了“播放”按钮的示例。\n\n***代码清单 7-12***. 为 MainViewController 类更新的播放按钮处理程序\n\
  \n```\n-(IBAction)play:(id)sender\n{\n    if ([self.audioPlayer isPlaying]) {\n\
  \        [self.audioPlayer pause];\n        self.playButton.titleLabel.text = @\"\
  Play\";\n        self.timer = [NSTimer timerWithTimeInterval:1.0f\n            \
  \          target:self\n                      selector:@selector(updateProgress)\n\
  \                      userInfo:nil repeats:YES];\n\n    } else {\n        [self.audioPlayer\
  \ play];\n        self.playButton.titleLabel.text = @\"Pause\";\n        [self.timer\
  \ invalidate];\n    }\n    self.playbackInterrupted = NO;\n}\n```\n\n## 处理硬件（线路）变更\n\
  \n在创建音频应用时，你应该了解另一个晦涩的通知：`AVAudioSessionRouteChangeNotification`。每当用户更改设备上的音频硬件输出时，就会触发此通知。触发此通知的操作包括插入（或拔出）耳机、连接到\
  \ iPod 底座或连接到支持 AirPlay 的设备。\n\n与 `AVAudioSessionInterruptionNotification` 通知一样，你首先需要为你的类（`MainViewController`）添加一个观察者，如代码清单\
  \ 7-13 所示。\n\n***代码清单 7-13***. 为线路变更通知添加观察者\n\n```\n- (void)viewDidLoad\n{\n   \
  \ [super viewDidLoad];\n    // Do any additional setup after loading the view, typically\n\
  \    // from a nib.\n\n    NSError *error = nil;\n    [[AVAudioSession sharedInstance]\n\
  \        setCategory:AVAudioSessionCategoryPlayback error:&error];\n    if (error\
  \ == nil) {\n        NSLog(@\"audio session initialized successfully\");\n     \
  \   [[NSNotificationCenter defaultCenter]\n          addObserver:self selector:@selector(caughtInterruption:)\n\
  \          name:AVAudioSessionInterruptionNotification object:nil];\n\n        [[NSNotificationCenter\
  \ defaultCenter]\n            addObserver:self selector:@selector(routeChanged:)\n\
  \            name:AVAudioSessionRouteChangeNotification object:nil];\n    } else\
  \ {\n        NSLog(@\"error initializing audio session: %@\",\n              [error\
  \ description]);\n    }\n}\n```\n\n一般来说，插入耳机的用户希望私下收听音乐。同样，切换到 AirPlay 的用户可能希望在音乐开始播放前进行声音检查。考虑到这一点，当用户更改输入设备（*线路*）时，你应该暂停播放。\n\
  \n**注意** 这些并非硬性规定，仅是建议。某些应用，例如流媒体视频播放器，无论输出设备如何更改，都可能需要继续正常运行。\n\n为了获得最佳用户体验，在收到\
  \ `AVAudioSessionRouteChangeNotification` 通知时，你应该检查 `AVAudioSessionRouteChangeReason`\
  \ 键，以获取线路变更原因的信息。相关值列于表 7-6。\n\n表 7-6. 线路变更类型\n\n| **类型** | **用途** |\n| --- | ---\
  \ |\n| `AVAudioSessionRouteChangeReasonNewDeviceAvailable` | 用户连接了新的输出设备 |\n| `AVAudioSessionRouteChangeReasonOldDeviceUnavailable`\
  \ | 输出设备断开或故障 |\n| `AVAudioSessionRouteChangeReasonWakeFromSleep` | iOS 设备从休眠中唤醒\
  \ |\n| `AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory` | 所选的音频会话类型没有可用的输出设备\
  \ |\n\n\n\n从 Table 7-6 可以看出，路由可能因多种原因而改变，从用户主动发起的更改到设备故障。对于`MyPlayer`应用，根据之前的讨论，当用户发起路由更改时应暂停播放。在设备故障（`AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory`）的情况下，应停止播放。`MainViewController`类的观察者方法（`[self\
  \ routeChanged:]`）如 Listing 7-14 所示。\n\n***Listing 7-14***. 路由更改的观察者方法\n\n```\n\
  -(void)routeChanged:(NSNotification *)notification\n{\n    NSDictionary *userInfo\
  \ = notification.userInfo;\n\n    NSNumber *reason = [userInfo\n               \
  \            objectForKey:AVAudioSessionRouteChangeReasonKey];\n    switch ([reason\
  \ integerValue]) {\n        case AVAudioSessionRouteChangeReasonNoSuitableRouteForCategory:\n\
  \            [self.audioPlayer stop];\n            break;\n        case AVAudioSessionRouteChangeReasonNewDeviceAvailable:\n\
  \        case AVAudioSessionRouteChangeReasonOldDeviceUnavailable:\n        case\
  \ AVAudioSessionRouteChangeReasonWakeFromSleep:\n            [self.audioPlayer pause];\n\
  \            break;\n        default:\n            break;\n    }\n}\n```\n\n## 使用\
  \ AirPlay\n\n尽管创建基于音频的应用程序的可能性是无穷无尽的，但本章仅再讨论一个主题：AirPlay。AirPlay 是苹果的专有技术，用于通过 WiFi\
  \ 网络流式传输媒体。AirPlay 允许用户将 iOS 或 OS X 设备上的媒体直接流式传输到兼容 AirPlay 的设备，例如 Apple TV、Apple\
  \ AirPort 路由器或兼容的第三方立体声音响。AirPlay 是一种基于发现的协议；当网络中检测到开放的 AirPlay 设备时，它会出现在系统的可用设备列表中。您可以通过在多任务菜单中选择\
  \ AirPlay 按钮来查看 iOS 设备可用的输出设备列表，如 Figure 7-5 所示。\n\n![9781430250838_Fig07-05.jpg](img/9781430250838_Fig07-05.jpg)\n\
  \nFigure 7-5. AirPlay 设备列表\n\n**Note**: AirPlay 不能通过蓝牙工作。用户必须连接到 WiFi 网络才能使用 AirPlay。\n\
  \nAirPlay 可以在两种主要模式下运行：仅传输应用程序输出，或镜像整个设备。镜像会直接将用户的 OS X 或 iOS 屏幕（包括系统屏幕）复制到 AirPlay。这对于教学环境中教师试图演示某个功能，或针对低视力辅助功能的应用来说非常方便。对于简单场景（例如将应用程序中的视频或音频传输到\
  \ Apple TV），使用 AirPlay 镜像就有些大材小用了。要传输内容，您需要在应用程序中实现 AirPlay 支持。\n\n幸运的是，苹果在`MediaPlayer`和`AVFoundation`框架中内置了\
  \ AirPlay 支持，使您无需大量额外工作即可使用 AirPlay。正如您将在 Chapter 8 关于视频应用程序的讨论中看到的，`MPMoviePlayerController`会在检测到网络中的\
  \ AirPlay 设备后，直接在播放控制集中添加一个 AirPlay 按钮，如 Figure 7-6 所示。\n\n![9781430250838_Fig07-06.jpg](img/9781430250838_Fig07-06.jpg)\n\
  \nFigure 7-6. `MPMoviePlayerController`的 AirPlay 控件\n\n对于使用`AVAudioPlayer`或`MPMusicPlayerController`类的音频应用程序，您可以通过`MPVolumeView`类为应用程序添加类似的\
  \ AirPlay 控件。该类提供了一个音量滑块和一个 AirPlay 选择器，与`MPMoviePlayerController`类中的控件完全相同。\n\n\
  **Note**: 您可以通过将`showsVolumeSlider`属性设置为`NO`来选择不使用音量滑块。\n\n顾名思义，`MPVolumeView`类是一个视图，因此您需要在故事板上指定一个区域来容纳它。Interface\
  \ Builder 的拖放组件库中没有`MPVolumeView`控件；因此，您需要使用与之前基于摄像头的应用程序相同的方法——您需要将`MPVolumeView`添加为通用`UIView`的子视图。\n\
  \n对于`MyPlayer`应用程序，我在`MainViewController.h`头文件中添加了一个名为`airPlayView`的新`UIView`属性：\n\
  \n```\n@property (nonatomic, strong) UIView *airPlayView;\n```\n\n将此属性添加到类后，修改故事板以添加并关联该视图，如\
  \ Figure 7-7 所示。\n\n![9781430250838_Fig07-07.jpg](img/9781430250838_Fig07-07.jpg)\n\
  \nFigure 7-7. 针对`MyPlayer`项目修改后的故事板\n\n接下来，您需要初始化`MPVolumeView`。幸运的是，`MPVolumeView`的初始化非常简单；您只需正确地初始化对象并添加为子视图即可。如\
  \ Listing 7-15 所示，这需要在`[self viewDidLoad]`方法中完成。\n\n***Listing 7-15***. 初始化`MPVolumeView`\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // Do any additional\
  \ setup after loading the view, typically\n        // from a nib.\n\n    NSError\
  \ *error = nil;\n    [[AVAudioSession sharedInstance]\n        setCategory:AVAudioSessionCategoryPlayback\
  \ error:&error];\n    if (error == nil) {\n        NSLog(@\"audio session initialized\
  \ successfully\");\n\n        MPVolumeView *volumeView = [[MPVolumeView alloc] init];\n\
  \           [volumeView sizeToFit];\n           [self.airPlayView addSubview:volumeView];\n\
  \n        [[UIApplication sharedApplication]                beginReceivingRemoteControlEvents];\n\
  \n        [self becomeFirstResponder];\n\n        [[NSNotificationCenter defaultCenter]\n\
  \               addObserver:self\n               selector:@selector(caughtInterruption:)\n\
  \               name:AVAudioSessionInterruptionNotification object:nil];\n\n   \
  \     [[NSNotificationCenter defaultCenter]\n                 addObserver:self\n\
  \                 selector:@selector(routeChanged:)\n                 name:AVAudioSessionRouteChangeNotification\
  \ object:nil];\n    } else {\n                 NSLog(@\"error initializing audio\
  \ session: %@\",\n                  [error description]);\n    }\n}\n```\n\n如果这看起来很简洁，那么好消息是，事实确实如此。这就是您需要做的全部工作！AirPlay\
  \ 直接连接到远程控制事件和“正在播放”中心。通过将这些处理程序添加到代码中，您可以为 AirPlay 应用程序构建一个功能完整的用户体验。\n\n**Note**:\
  \ 默认情况下，音量滑块是白色的。如果您看不到音量滑块，请尝试更改视图的背景颜色。\n\n## 总结\n\n在本章中，您看到了如何通过添加后台音频支持、“正在播放”中心以及路由更改和音频中断通知，显著扩展基于音频的应用程序的性能。通过添加这些功能，您还了解到实现\
  \ AirPlay 只需在类中添加一个`MPVolumeView`即可。虽然无法预测用户会如何使用您的应用程序，但您可以利用 Apple 提供的有限后台音频功能，使您的应用程序更加令人愉悦。\n\
  \n"
- '# 第 3 部分：视频


  '
- "# 第 8 章：播放和录制视频\n\n在本章中，您将深入学习如何在应用程序中使用视频，了解如何播放和录制视频文件。作为一种格式，视频比静态图像或照片更复杂，需要显著的底层支持。幸运的是，有\
  \ API 可以为您提供这种底层支持。\n\n\n\n本章将说明如何使用`MPMoviePlayerController`类来播放视频文件。同时，你还会重温如何使用`UIImagePickerController`类来录制视频文件。幸运的是，你会发现，前面图像和音频章节中学习的大部分技术都可以直接应用于这里的视频主题。事实上，本章的两个项目都直接借用了之前项目中的代码。\n\
  \n在此过程中，你将简单学习通知的相关知识，因为理解通知对于使用`MediaPlayer`框架至关重要。视频播放器甚至没有定义代理——可见通知有多么重要！\n\n\
  ## 播放视频文件\n\n与照片和音频类似，Apple 提供了“简单”和“困难”两种方法来实现视频相关的所有功能。简单的方法通常意味着使用内置的用户界面来完成你的任务——但你必须应对\
  \ Apple 所设置的限制。困难的方法则意味着使用底层框架来实现相同的功能——但你必须自己创建用户界面和会话处理代码。\n\n首先，你将看到如何使用 Apple\
  \ 的内置视频播放界面 `MPMoviePlayerController` 类以简单的方式播放视频。你可以使用 `MPMoviePlayerController`\
  \ 类播放来自文件或网络流的视频，如图 8-1 所示。此外，该类提供了一套基本的播放控件（包括播放/暂停、进度条搜索和 AirPlay），并允许你通过相同的界面播放音频文件。如果你曾经通过网页浏览器观看过电影，那么从用户角度来说，你已经对\
  \ `MPMoviePlayerController` 类非常熟悉了。\n\n![9781430250838_Fig08-01.jpg](img/9781430250838_Fig08-01.jpg)\n\
  \n图 8-1. 使用 `MPMoviePlayerController` 类显示的基于浏览器的视频\n\n从开发者的角度来看，`MPMoviePlayerController`\
  \ 类是有限的，因为你受限于 Apple 的大小限制（全屏或窗口模式）及其控件（全部或没有）。\n\n**注意** 在第 9 章中，你将看到如何通过构建自己的视频播放器类，使用`AVFoundation`来绕过`MPMoviePlayerController`类的用户界面限制。\n\
  \n在本节中，你将通过实现图 8-2 所示的 MyVideoPlayer 应用程序，来探索如何使用`MPMoviePlayerController`类。该应用程序包含在源代码包的`Chapter\
  \ 8`文件夹中。（请参见 Apress 网站的源代码/下载区域，`www.apress.com`。）\n\n![9781430250838_Fig08-02.jpg](img/9781430250838_Fig08-02.jpg)\n\
  \n图 8-2. MyVideoPlayer 项目的原型图\n\nMyVideoPlayer 应用程序具有一个简单的用户界面，主要包括一个允许用户选择要播放的视频文件的文件选择器，以及一个嵌入在`UIView`中的视频播放器，该播放器允许用户观看选定的视频。这个嵌入播放器的播放控件来自`MPMoviePlayerController`类本身。请注意，这些控件与浏览器中嵌入视频的控件相似——这是因为\
  \ Safari 和此应用程序使用相同的类来显示视频！\n\n你可能从第 5 章的 MyPlayer 音乐播放器应用程序中认出了这个文件选择器。你在那个项目中构建了一个通用的、可复用的文件选择类。在这里，你将直接重用该类，从而可以专注于视频特有的功能。\n\
  \n与音频播放相比，视频需要更复杂的设置过程以及更多的异步状态变更处理（视频文件通常非常大）。在构建 MyVideoPlayer 项目时，你将掌握以下视频播放的核心能力：\n\
  \n*   用有效的内容初始化视频播放器\n*   为不同的播放模式配置视频播放器\n*   使用通知来检测播放状态变化中的错误\n\n## 开始\n\n\n\n\
  如前所述，`MyVideoPlayer` 项目在设计及用户界面组件（包括文件选择器界面）上大量依赖于 `MyPlayer` 应用。在本节中，你将看到直接取自 `MyPod`\
  \ 项目的代码示例。关于这些代码运行机制的更详细说明，请参阅第 6 章。\n\n与 `MyPod` 应用类似，首先在 Xcode 中使用“单视图应用程序”模板创建一个新项目。由于\
  \ `MPMoviePlayerController` 类是 `MediaPlayer` 框架的一部分，请务必先将该框架包含到项目中。\n\n与之前的应用一样，主视图控制器是用户界面的主要驱动者。你可以使用代码清单\
  \ 8-1 中的头文件作为添加所需用户界面元素的指南。请注意，`MediaPlayer` 框架包含在文件顶部，因为 `MainViewController` 类会实例化媒体播放器。\n\
  \n***代码清单 8-1*** `MainViewController` 类的头文件\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <MediaPlayer/MediaPlayer.h>\n#import \"FileViewController.h\"\n\n@interface MainViewController\
  \ : UIViewController <FileControllerDelegate>\n\n@property (nonatomic, strong) IBOutlet\
  \ UIView *playerView;\n@property (nonatomic, strong) MPMoviePlayerController *moviePlayer;\n\
  \n@end\n```\n\n你可能已经注意到，代码将 `playerView` 属性声明为 `UIView` 类型，而非更具体的类。当你需要将视频播放器实现为子视图时，设计模式是将另一个元素的视频层子视图进行设置——类似于你在第\
  \ 4 章中构建的自定义相机界面。记得将每个属性连接到故事板中对应的元素。\n\n对于此应用，你可以直接使用 `MyPod` 项目中的 `FileViewController`\
  \ 类而无需修改。该类的头文件和实现文件如代码清单 8-2 和 8-3 所示。\n\n***代码清单 8-2*** `FileViewController` 类的头文件\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@protocol FileControllerDelegate <NSObject>\n\n\
  -(void)cancel;\n-(void)didFinishWithFile:(NSString *)filePath;\n\n@end\n\n@interface\
  \ FileViewController : UITableViewController\n\n-(id)initWithFileArray:(NSArray\
  \ *)fileArray;\n\n@property (nonatomic, strong) NSMutableArray *fileArray;\n\n@property\
  \ (nonatomic, strong) id <FileControllerDelegate> delegate;\n\n-(IBAction)closeView:(id)sender;\n\
  \n@end\n```\n\n***代码清单 8-3*** `FileViewController` 类的实现文件\n\n```\n#import \"FileViewController.h\"\
  \n\n@implementation FileViewController\n\n-(id)initWithFileArray:(NSArray *)fileArray\n\
  {\n    self = [super init];\n    if (self) {\n        self.fileArray = fileArray;\n\
  \    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \n// 取消注释以下行以保持选择\n    // 在视图切换间的状态。\n    // self.clearsSelectionOnViewWillAppear\
  \ = NO;\n\n// 取消注释以下行以在此视图控制器的\n    // 导航栏中显示编辑按钮。\n    // self.navigationItem.rightBarButtonItem\
  \ = self.editButtonItem;\n}\n\n- (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n\
  \    // 处理任何可以重新创建的资源。\n}\n\n#pragma mark - 表视图数据源\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    // 返回分区数量。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n      numberOfRowsInSection:(NSInteger)section\n{\n    // 返回分区中的行数。\n\
  \    return [self.fileArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n      cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
  \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:@\"fileCell\"\n\
  \         forIndexPath:indexPath];\n\n// 配置单元格...\n\nNSString *filePath = [self.fileArray\
  \ objectAtIndex:indexPath.row];\n\ncell.textLabel.text = [filePath lastPathComponent];\n\
  \nreturn cell;\n}\n\n-(void)tableView:(UITableView *)tableView\n       didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSString *filePath = [self.fileArray objectAtIndex:indexPath.row];\n\
  \n[self.delegate didFinishWithFile:filePath];\n\n}\n\n-(IBAction)closeView:(id)sender\n\
  {\n    [self.delegate cancel];\n}\n\n@end\n```\n\n与 `MyPod` 项目类似，你需要在故事板中使用一个表视图控制器和一个导航控制器来表示文件选择器。关于此过程的更详细说明，请参阅第\
  \ 5 章（请记住，表视图控制器是“嵌入”在导航控制器中的）。完成后的故事板应类似于图 8-3 中的示例。\n\n![9781430250838_Fig08-03.jpg](img/9781430250838_Fig08-03.jpg)\n\
  \n图 8-3 `MyVideoPlayer` 应用的故事板\n\n## 初始化视频播放器\n\n要使用 `MPMoviePlayerController` 类播放视频文件，必须首先初始化该类。因为你采用的是“简单”方法，`MPMoviePlayerController`\
  \ 类会为你抽象处理诸如获取音频和视频播放会话等任务。初始化该类的主要目标如下：\n\n- 为影片播放器指定 `contentURL` 属性\n- 设置影片播放器的父视图\n\
  - 注册你的类以处理 `MPMoviePlayerPlaybackStateChanged` 通知\n\n在集成 `MPMoviePlayerController`\
  \ 类时，大部分工作与呈现和消息处理相关。与你所了解的用于照片和音频的媒体 API 不同，`MPMoviePlayerController` 类使用通知作为其消息传递的主要机制。该类甚至没有定义\
  \ `delegate` 属性，这意味着你必须使用通知来处理来自媒体播放器的所有事件。对于来自其他生态系统的开发者来说，通知可能是一个令人困惑的话题，但你将在本章后面的“通知入门”边栏中找到关于其工作原理的详细说明。\n\
  \n### 指定内容 URL\n\n在其最简单的形式中，你可以通过一行代码初始化 `MPMoviePlayerController` 对象：\n\n```\n\
  [MPMoviePlayerController alloc] initWithContentURL:];\n```\n\n`[MPMoviePlayerController\
  \ initWithContentURL:]` 方法接受一个 `NSURL` 对象，该对象必须是指向应用文档目录中文件的有效 URL，或者是一个视频流。该文件（或视频流）的格式必须是该类所支持的。表\
  \ 8-1 列出了 `MPMoviePlayerController` 类支持的文件格式以及每种格式的预期用途。\n\n表 8-1 `MPMoviePlayerController`\
  \ 类支持的媒体格式\n\n| 文件类型 | 扩展名 | 用途 |\n| --- | --- | --- |\n| MPEG-4 视频 | MP4 | 视频压缩的当前基线，比\
  \ AVI 和 DVD 标准（MPEG-2）效率更高 |\n| H.264 视频 | MOV, MP4 | 苹果主导的高清视频标准，比普通 MPEG-4 更先进\
  \ |\n| MPEG-3 音频 | MP3 | 有损音频压缩的行业标准 |\n| AAC 音频 | M4A | 苹果用于 MPEG-4 压缩音频的格式 |\n\
  \n当用户播放视频文件时，输出会显示在你的初始化代码所指定的视图中。当用户播放音频文件时，视图中会出现 QuickTime 标志作为占位符。\n\n请注意，此方法仅初始化对象；错误不会发生，直到你尝试播放该文件。错误会通过\
  \ `MPMoviePlayerPlaybackState` 通知传递回来，你将在本章后面与其他通知处理程序一起处理该通知。\n\n## 使用文件选择器作为数据源\n\
  \n\n\n在使用 `MyVideoPlayer` 项目中的文件选择器时，你需要修改转场处理程序 `[self prepareForSegueWithIdentifier:]`。这一次，不要像之前那样使用\
  \ iPod 媒体初始化文件选择器，而是需要填充由 `MediaPlayer` 框架所支持的文件。与第 5 章中的 `MyPlayer` 应用程序一样，你可以通过在应用文档目录中搜索文件扩展名与受支持文件格式相匹配的文件来生成此列表。输入数组准备好之后，你就可以展示文件选择器了。此逻辑将位于主视图控制器的转场处理程序中，如代码清单\
  \ 8-4 所示。\n\n***代码清单 8-4***.  用于填充并展示文件选择器的转场处理程序\n\n```\n-(void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender\n{\n    if ([segue.identifier isEqualToString:@\"showFilePicker\"\
  ]) {\n        NSMutableArray *videoArray = [NSMutableArray new];\n\nNSArray *paths\
  \ =\n            NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n            NSUserDomainMask,\
  \ YES);\n        NSString *documentsDirectory = [paths objectAtIndex:0];\n        NSError\
  \ *error = nil;\n\nNSArray *allFiles = [[NSFileManager defaultManager]\n            contentsOfDirectoryAtPath:documentsDirectory\
  \ error:&error];\n\nif (error == nil) {\n\nfor (NSString *file in allFiles) {\n\
                  if ([[file pathExtension] isEqualToString:@\"m4v\"] ||\n                    [[file\
  \ pathExtension] isEqualToString:@\"mov\"]) {\n                    [videoArray addObject:file];\n\
                  }\n            }\n\n} else {\n            NSLog(@\"error looking\
  \ up files: %@\", [error description]);\n        }\n\nUINavigationController *navigationController\
  \ =\n             (UINavigationController *)segue.destinationViewController;\n        FileViewController\
  \ *fileVC =\n             (FileViewController *)navigationController.topViewController;\n\
          fileVC.delegate = self;\n        fileVC.fileArray = videoArray;\n    }\n\
  }\n```\n\n你应该在每个单元格中显示文件名，因此请使用该文件名来填充输入数组。\n\n同样，请记住在主视图控制器的头文件中指定你将实现 `FileControllerDelegate`\
  \ 协议：\n\n```\n@interface MainViewController : UIViewController\n    <FileControllerDelegate>\n\
  ```\n\n`FileControllerDelegate` 协议指定了一个方法，该方法在用户选取文件后返回一个文件路径。你可以使用它在 `MainViewController`\
  \ 类中初始化 `MPMoviePlayerController` 对象。在你的主视图控制器的 `[FileControllerDelegate didFinishWithItem:]`\
  \ 委托方法中，将 `filePath` 字符串转换为 `NSURL` 对象，并用它来初始化你类的 `mediaPlayer` 对象。与之前的应用程序一样，你的媒体播放器应该是一个实例变量，因为会有许多方法访问它。你可以在代码清单\
  \ 8-5 中找到一个示例。\n\n***代码清单 8-5***.  在用户选择项目后初始化视频播放器\n\n```\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n{\n    NSURL *fileURL = [NSURL URLWithString:filePath];\n    self.moviePlayer\
  \ = [[MPMoviePlayerController alloc]\n        initWithContentURL:fileURL];\n\n//解散文件选择器\n\
      [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n### 为媒体播放器指定父视图\n\
  \n尽管你的视频播放器对象已在内存中分配，但你仍然需要指定一个父视图才能在应用中显示它。此过程类似于你在第 4 章创建自定义相机应用时将视频层添加到视图的方式——为你的播放器设置与其父视图相同的边界框，然后将其添加为子视图。\n\
  \n与所有 `UIView` 对象一样，你需要指定视图的尺寸及其位置。`frame` 属性是一个 `CGRect` 数据结构，包含视图的尺寸及其相对于屏幕左上角的\
  \ (x,y) 位置。对于所有视图，第二个属性 `bounds` 指定了视图的可见区域（即其*边界*框）。`bounds` 属性的 (x,y) 位置是相对于*frame*\
  \ 的原点，而不是相对于屏幕的原点。默认情况下，`bounds` 属性被设置为目标视图的左上角位置，但如果你试图重新定位或裁剪子视图，则可以更改它。\n\n此应用的目标是使影片播放器填满\
  \ `playerView` 的可见区域。因此，`MPMoviePlayerController` 的 `view` 的 `frame` 需要与 `playerView`\
  \ 的尺寸相匹配，并且具有相对位置。`bounds` 属性是解决此问题的完美方案：\n\n```\nself.moviePlayer.view.frame = self.playerView.bounds;\n\
  ```\n\n在为 `MPMoviePlayerController` 对象设置 `frame` 之后，将其 `view` 作为子视图添加到 `playerView`\
  \ 之上，这将使其成为可见属性：\n\n```\n[self.playerView addSubview:self.moviePlayer.view];\n```\n\
  \n现在你将得到最终的解决方案，如代码清单 8-6 所示。\n\n***代码清单 8-6***.  将视图定位添加到您的初始化代码中\n\n```\n-(void)didFinishWithFile:(NSString\
  \ *)filePath\n{\n    NSURL *fileURL = [NSURL URLWithString:filePath];\n    self.moviePlayer\
  \ = [[MPMoviePlayerController alloc]\n        initWithContentURL:fileURL];\n\nself.moviePlayer.view.frame\
  \ = self.playerView.bounds;\n    [self.playerView addSubview:self.moviePlayer.view];\n\
  \n//解散文件选择器\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\
  \n**注意** 如果你想要一个仅在**全屏模式**下运行的影片播放器，请使用 `MPMediaPlayerViewController` 类。其初始化路径和通知与\
  \ `MPMediaPlayerController` 相同；主要的操作区别在于，当视图被解散时，该对象会被释放。\n\n### 向类添加通知处理\n\n作为初始化媒体播放器的最后一步，你需要将\
  \ `MainViewController` 注册为 `MPMoviePlaybackStateDidChangeNotification` 通知的接收者。`MPMoviePlayerController`\
  \ 类完全依赖通知来传递消息，这与之前使用的音频播放器和相机类不同，后者使用委托。你可以在下面的侧边栏中找到关于如何使用通知的更详细解释，但这里有一个快速总结：要处理通知，你需要明确声明你的类将处理哪些通知，并将这些通知绑定到处理程序方法。\n\
  \n#### 通知入门\n\n在任何编程语言中，*消息传递*是进程间发送信息的方式。在类的实例上调用方法是最简单的消息传递形式之一：你让接收者（对象）知道要执行什么消息（方法），以及使用什么数据（参数）。\n\
  \n直接向另一个类发送消息并不总是方便或明智的。对于一个非常通用的类，你不想包含可能调用其方法的其他每个类的头文件。同样，你也不想包含调用一个相当复杂的类上的消息所需的所有内容。\n\
  \n为了解决这个问题，Cocoa Touch 提供了三种在类之间执行通用消息传递的专门方式：\n\n- 协议\n- 通知\n- 键值观察\n\n\n\n####\
  \ iOS 开发中的协议与通知\n\n你应该对前面章节中介绍的协议（protocol）已经有所了解。当你希望为两个类（例如相机与需要从相机获取图像的类）之间的数据传递定义有限接口时，协议是理想的选择。然而，协议也可能非常严格。协议定义中的每个方法都被隐式标记为`required`（必需），这意味着委托类必须实现所有方法才能完全符合规范。\n\
  \n`MPMediaPlayerController`类可以发出多种类型的消息，包括播放状态、流错误以及显示模式变化（例如全屏）。使用委托来实现所有这些功能可能会变得笨重。对于媒体播放器，你需要一种消息传递方案，让接收类只处理它关心的消息，而无需承担巨大的开销。\n\
  \n当你希望使用一种松散的消息传递方案时，通知是理想的选择。通知是一种基于名称的消息传递系统，任何人都可以通过使用特定名称发送格式正确的消息来*发布*通知，任何人都可以通过声明他们能够使用该名称接收格式正确的消息来处理（*观察*）通知。这种魔法由一个*通知中心*对象实现，它充当所有通知的中介。\n\
  \n第三种通用的消息传递方案是键值观察，其工作原理与通知类似，不同之处在于键值观察不是基于名称的系统，而是基于对象实例的变化。例如，“当`count`变量发生变化时，调用`increaseCount`方法”。虽然它在某些情况下很有用，但这并不适用于媒体播放器，因为你不需要监控某个属性的变化。\n\
  \n#### 添加通知观察者\n\n要将你的类声明为某个通知的*观察者*，有两个主要 API：`[NSNotificationCenter addObserver:selector:name:object]`\
  \ 和 `[NSNotificationCenter addObserverForName:object:queue:usingBlock]`。两者都要求你指定要观察的通知名称以及如何处理它。两者之间的主要区别在于：第一个\
  \ API 在捕获到通知时通过`@selector`参数在运行时调用一个方法，而第二个 API 则执行一个代码块。例如，如果你试图捕获一个`MPMoviePlayerLoadStateDidChangeNotification`通知，并使用声明为`[self\
  \ stateChanged:]`的处理方法，你的代码将如下所示：\n\n```\n[[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n    selector:@selector(stateChanged:)\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
  \    object:nil];\n```\n\n你可能对`[NSNotificationCenter defaultCenter]`这段代码有疑问。这是一个单例对象，它为你的应用程序提供一个通知中心对象——无需任何特殊设置即可使用。除非你的代码变得足够复杂，需要根据通知中心来过滤通知，否则这对于大多数应用来说已经足够了。\n\
  \n#### 发布与移除通知\n\n要发送通知，你可以通过使用`[NSNotificationCenter postNotification:object:userInfo]`方法来*发布*一个`NSNotification`对象。使用此方法，你需要指定要发布的通知名称以及你传递的任何信息，通过将信息添加到`userInfo`参数传递的`NSDictionary`对象中。如果你要发布一个名为`MyCustomNotification`的自定义通知，代码将如下所示：\n\
  \n```\nNSDictionary *myDict = [NSDictionary dictionaryWithObject:@\"ahmed\"\n  \
  \                                   forKey:@\"userName\"];\n[[NSNotificationCenter\
  \ defaultCenter]\n      postNotificationName:@\"MyCustomNotification\" object:self\n\
  \      userInfo:myDict];\n```\n\n关于通知还有最后一点：当类被释放时，一定要记得移除观察者。除非你显式地移除观察者，否则通知中心会尝试继续使用你的类来处理传入的通知，这可能会导致你的应用程序崩溃。要移除观察者，请使用`[NSNotificationCenter\
  \ removeObserver:name:object]`方法。对于`MyCustomNotification`示例，调用方式如下：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] removeObserver:self\n    name:MPMoviePlayerPlaybackStateDidChangeNotification\n\
  \    object:nil];\n```\n\n如你所见，通知是建立消息传递的一种快速方式。对于需要执行特定消息传递方案的类，委托是理想的选择，但如果你只是试图建立一个简单且允许任何人选择是否响应的方案，那么通知就是完美的解决方案。\n\
  \n#### 实际实现\n\n正如前面的侧边栏所述，处理通知的第一步是将你的类声明为观察者。因为这是一个类级别的操作，你可以在`MainViewController`类的`[self\
  \ viewDidLoad]`方法中设置观察者。通过将其设为类级别操作，无论媒体播放器是被初始化多次还是从未初始化（如果媒体播放器从未初始化，消息将永远不会发送），你都已经准备好。列表\
  \ 8-7 展示了`MainViewController`类修改后的`[self viewDidLoad]`方法。\n\n**列表 8-7.** 向你的类添加通知观察者\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 加载视图后的任何其他设置，\n \
  \   // 通常来自一个 xib 文件。\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
  \        selector:@selector(playbackFinished:)\n        name:MPMoviePlayerPlaybackDidFinishNotification\
  \ object:nil];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n     \
  \   selector:@selector(loadStateChanged:)\n        name:MPMoviePlayerLoadStateDidChangeNotification\
  \ object:nil];\n}\n```\n\n在示例中，我使用了`[NSNotificationCenter addObserver:selector:name:object]`\
  \ API 来设置观察者，这样我就可以指定一个方法作为通知处理程序，而不是代码块——这主要是为了让代码在拆分后更易于阅读。\n\n`MPMoviePlayerPlaybackDidFinishNotification`通知通过`MPMoviePlayerPlaybackDidFinishReasonUserInfoKey`键返回一个`MPMovieFinishReason`常量，并通过`error`键返回一个错误。如果结束原因是`MPMovieFinishReasonPlaybackError`，你应该提取错误对象，并通过错误消息或`UIAlertView`通知用户。你可以在列表\
  \ 8-8 中找到`MainViewController`类的`[self playbackFinished:]`方法。\n\n**列表 8-8.** 显示播放错误\n\
  \n```\n-(void)playbackFinished:(NSNotification *) notification\n{\n    NSDictionary\
  \ *userInfo = notification.userInfo;\n    NSNumber *finishReason = [userInfo\n \
  \       objectForKey:MPMoviePlayerPlaybackDidFinishReasonUserInfoKey];\n\nif ([finishReason\
  \ integerValue] ==\n        MPMovieFinishReasonPlaybackError) {\n        NSError\
  \ *error = [userInfo objectForKey:@\"error\"];\n        NSString *errorString =\
  \ [error description];\n\nUIAlertView *alert = [[UIAlertView alloc]\n          \
  \  initWithTitle:@\"错误！\"\n            message:errorString delegate:nil\n      \
  \      cancelButtonTitle:@\"确定\" otherButtonTitles:nil];\n        [alert show];\n\
  \    }\n}\n```\n\n\n\n`MPMoviePlayerLoadStateDidChangeNotification`通知不会在`userInfo`字典中设置任何键，但你知道当它触发时，播放器已在加载状态之间转换（主要状态有`Unknown`、`Playable`、`Playthrough\
  \ OK/Loaded`和`Stalled`）。与音频播放器一样，加载视频文件是一个不确定的操作，这意味着你无法预测文件加载需要多长时间。因此，你应该使用`[MPMediaPlayerController\
  \ prepareToPlay]`方法开始加载视频文件，并在文件加载完成后触发`[MPMediaPlayerController play]`方法。你可以通过比较`loadState`属性与`MPMovieLoadStatePlayable`值来判断媒体播放器是否准备好播放文件，如代码清单\
  \ 8-9 所示。\n\n***代码清单 8-9***. 自动启动媒体播放器\n\n```\n-(void)loadStateChanged:(NSNotification\
  \ *) notification\n{\n    if (self.moviePlayer.loadState == MPMovieLoadStatePlayable)\
  \ {\n\n[self.moviePlayer play];\n    }\n}\n```\n\n最后一步，请记住你需要移除通知以在类完成后进行清理。完全如侧边栏所示，你应将调用`[NSNotificationCenter\
  \ removeObserver:name:object]`的代码放在`MainViewController`的`[self dealloc]`方法中，如代码清单\
  \ 8-10 所示。\n\n***代码清单 8-10***. 移除通知观察者\n\n```\n- (void)dealloc\n{\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self\n       name:MPMoviePlayerPlaybackDidFinishNotification\n\
  \    object:nil];\n    [[NSNotificationCenter defaultCenter] removeObserver:self\n\
  \         name:MPMoviePlayerLoadStateDidChangeNotification\n         object:nil];\n\
  }\n```\n\n配置视频播放器\n\n现在你已经完成了初始化媒体播放器所需的所有步骤，可以开始播放视频文件了。然而，为了从`MPMediaPlayerController`类中获得最佳性能，你需要通过指定一些额外的视频特定属性值来配置它：源类型和\
  \ AirPlay。\n\n指定源类型（本地文件或网络流）\n\n`MPMoviePlayerController`类的默认源类型配置是*unknown*。这使该类采取观望态度来加载视频。它会尝试从源加载数据，然后——根据对源的了解——配置电影播放器以从文件或网络流播放。通过为`movieSourceType`属性指定值，你可以省略这个中间步骤并显著加快加载时间。\n\
  \n`movieSourceType`属性接受`MPMovieSourceType`常量值作为输入。本地文件的值为`MPMovieSourceTypeFile`，而网络流的值为`MPMovieSourceTypeStreaming`。MyVideoPlayer\
  \ 应用程序只允许用户选择本地文件，因此我使用了`MPMovieSourceTypeFile`值：\n\n```\nself.videoPlayer.movieSourceType\
  \ = MPMovieSourceTypeFile;\n```\n\n指定 AirPlay 支持\n\n在窗口和全屏模式下，视频播放器都支持 AirPlay 作为播放控制。如第\
  \ 7 章所述，AirPlay 是苹果的专有技术，允许用户将 iOS 设备上的音频和视频内容流式传输到 Apple TV。要使视频文件兼容 AirPlay，它需要使用\
  \ H.264 视频编解码器（`MPMoviePlayerController`类支持的格式之一）进行编码；要使视频流兼容 AirPlay，它需要使用 Apple\
  \ HTTP Live Streaming（HLS）协议进行传输。请注意，`MPMoviePlayerController`可以播放许多不兼容 AirPlay\
  \ 的文件类型和流，并且只有在播放兼容 AirPlay 的项目时才会显示 AirPlay 控制。\n\n当视频文件通过 AirPlay 播放时，你的电影播放器视图将被替换为占位图像，如图\
  \ 8-4 所示。设备上的电影播放器仍然可以使用所有播放控制，但视频将仅在 Apple TV 上播放。\n\n![9781430250838_Fig08-04.jpg](img/9781430250838_Fig08-04.jpg)\n\
  \n图 8-4. AirPlay 视频播放的占位图像\n\n默认情况下，对于通过`MPMoviePlayerController`播放的所有兼容 AirPlay\
  \ 的视频文件和流，AirPlay 图标会自动弹出。如果你正在构建一个需要禁用此功能的应用程序，可以通过`allowsAirPlay`属性来实现。将此值设置为`NO`可阻止\
  \ AirPlay 控制在电影播放器中显示。\n\n```\nself.videoPlayer.allowsAirPlay = NO;\n```\n\n**注**\
  \ 如果用户已为其设备启用 AirPlay 镜像，禁用电影播放器中的 AirPlay 支持并不能阻止 AirPlay 显示。要禁用此功能，你需要在应用程序中实现辅助显示支持。该功能的教程可在苹果开发者库网站上找到。\n\
  \n指定控制类型\n\n默认情况下，`MPMediaPlayerController`类在视频层之上提供内置的播放控制。对于许多应用程序，你可能希望更改控制样式或完全隐藏控制。你可以通过`controlStyle`属性进行切换，该属性接受`MPMovieControlStyle`类型的常量。在\
  \ iOS 7 及更高版本中，你可以使用两种样式：`MPMovieControlStyleNone`（完全隐藏控制）和`MPMovieControlStyleFullscreen`（显示全套控制，包括快进、快退和音频控制）。默认控制样式是`MPMovieControlStyleFullscreen`：\n\
  \n```\nself.moviePlayer.controlStyle = MPMovieControlStyleFullscreen;\n```\n\n指定缩放模式\n\
  \n视频播放器的一个最终配置选项是缩放模式。与图像一样，当视频尺寸与父视图不完全匹配时，此选项决定视频将如何缩放。你可以通过`scalingMode`属性设置电影播放器的内容缩放模式，该属性接受`MPMovieScalingModeFill`常量作为输入：\n\
  \n```\nself.moviePlayer.scalingMode = MPMovieScalingModeAspectFit;\n```\n\n与图像类似，可用的缩放模式如下：\n\
  \n*   `MPMovieScalingModeNone`：此模式不提供缩放，将源视频放置在目标视图中（根据尺寸进行裁剪或信箱化处理）。\n*   `MPMovieScalingModeAspectFit`：此模式在不失真原始视频的情况下，尽可能将视频缩放至目标视图的尺寸（上或下）。\n\
  *   `MPMovieScalingModeAspectFill`：此模式在不失真视频的情况下，将视频缩放以匹配目标视图的尺寸（多余部分将被裁剪）。\n* \
  \  `MPMovieScalingModeFill`：此模式通过失真原始视频来匹配目标视图的尺寸。\n\n默认值是`MPMovieScalingModeAspectFit`。\n\
  \n开始播放\n\n正如你可能从第 6 章和第 6 章中的音频播放器示例中记得的那样，你无法预测加载媒体文件需要多长时间。加载更大的文件（视频无疑更大！）需要更长时间。因此，一旦你完成视频播放器的初始化和配置，应立即调用`[MPMoviePlayerController\
  \ prepareToPlay]`。由于初始化代码为`MPMoviePlayerLoadStateDidChangeNotification`通知添加了处理程序，你可以在文件加载完成后自动开始播放文件。\n\
  \n代码清单 8-11 展示了视频播放器的完整初始化方法，包括刚刚描述的预加载步骤。\n\n***代码清单 8-11***. 视频播放器的完整初始化方法\n\n\
  \n\n```\n-(void)didFinishWithFile:(NSString *)filePath\n{\n    NSURL *fileURL =\
  \ [NSURL URLWithString:filePath];\n    self.moviePlayer = [[MPMoviePlayerController\
  \ alloc]\n       initWithContentURL:fileURL];\n    self.moviePlayer.movieSourceType\
  \ = MPMovieSourceTypeFile;\n    self.moviePlayer.allowsAirPlay = YES;\n    self.moviePlayer.scalingMode\
  \ = MPMovieScalingModeAspectFit;\n    self.moviePlayer.controlStyle = MPMovieControlStyleEmbedded;\n\
  \nself.moviePlayer.view.frame = self.playerView.bounds;\n    [self.playerView addSubview:self.moviePlayer.view];\n\
  \n[self.moviePlayer prepareToPlay];\n\n//关闭文件选择器\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n要测试你的视频播放器应用是否正常工作，请使用\"选择视频\"按钮选择一个视频，然后确保它能在嵌入式视频播放器中正常播放。由于你使用的是嵌入式控件，你将能够通过内置的进度条来控制播放。\n\
  \n## 录制视频文件\n\n在 Cocoa Touch 中录制视频最简单的方法是使用 `UIImagePickerController` 类。你可能还记得这个类来自第\
  \ 2 章，当时你用它通过 iOS 的内置相机界面拍照。如果你曾经使用过原生的相机应用来录制视频，那么你已经对这个界面很熟悉了，如图 8-5 所示。\n\n![9781430250838_Fig08-05.jpg](img/9781430250838_Fig08-05.jpg)\n\
  \n图 8-5. `UIImagePickerController` 视频录制界面\n\n然而，与相机应用不同，`UIImagePickerController`\
  \ 类在用户完成录制后会显示一个确认界面，如图 8-6 所示。这允许用户在继续之前预览甚至编辑他们录制的视频，比如进行裁剪。\n\n![9781430250838_Fig08-06.jpg](img/9781430250838_Fig08-06.jpg)\n\
  \n图 8-6. `UIImagePickerController` 视频预览界面\n\n通过修改你的配置选项和 `UIImagePickerDelegate`\
  \ 处理方法，你可以重新利用拍照代码来添加视频录制功能。\n\n在本节中，你将修改 MyVideoPlayer 应用，添加一个用于录制视频的按钮。录制的视频将保存在应用的文档目录中，并被文件选择器识别，这样用户就可以像观看其他视频一样观看它们。该新项目包含在源代码包的\
  \ `Chapter 8` 文件夹中，名为 MyVideoRecorder。\n\n如果你对使用 `UIImagePickerController` 类仍然感到不熟悉，建议你在继续本主题之前先复习第\
  \ 2 章中的项目。其中 CameraApp 项目对该类及其委托协议进行了深入的解释。MyVideoRecorder 项目的目标是突出说明，你只需进行少量修改，就能让一个拍照应用处理视频。\n\
  \n## 开始入门\n\n你将使用 MyVideoPlayer 项目作为 MyVideoRecorder 项目的基础。首先复制该项目，并将根文件夹重命名为 MyVideoRecorder。为了使这一更改在项目的其余部分生效，双击项目文件\
  \ (`MyVideoPlayer.xcodeproj`) 在 Xcode 中打开它。然后，在项目导航器中仔细点击项目名称，并对其进行重命名，如图 8-7 左上角所示。\n\
  \n![9781430250838_Fig08-07.jpg](img/9781430250838_Fig08-07.jpg)\n\n图 8-7. 重命名项目\n\
  \n如果你在选择文件名时遇到困难，请继续尝试。你需要确保点击操作准确落在文件名的文本上，而不仅仅是单元格区域。\n\n接下来，在用户界面中添加一个按钮，允许用户调出视频录制界面。这一过程要求你声明\
  \ `MainViewController` 类实现了 `UIImagePickerDelegate` 协议，并在 Interface Builder 中添加新按钮。请记住，`UIImagePickerDelegate`\
  \ 协议是 `UIImagePickerController` 类用来回传消息的机制，这些消息表示相机控制器已捕获媒体或希望被关闭。代码清单 8-12 展示了修改后的\
  \ `MainViewController` 头文件。\n\n***代码清单 8-12***. MyVideoRecorder 项目的头文件更改\n\n```\n\
  #import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n#import \"FileViewController.h\"\
  \n\n@interface MainViewController : UIViewController\n    <FileControllerDelegate,\
  \ UIImagePickerControllerDelegate,\n    UINavigationControllerDelegate>\n\n@property\
  \ (nonatomic, strong) IBOutlet UIView *playerView;\n@property (nonatomic, strong)\
  \ MPMoviePlayerController *moviePlayer;\n@property (nonatomic, strong) UIImagePickerController\
  \ *videoRecorder;\n\n-(IBAction)showPicker:(id)sender;\n@end\n```\n\n图 8-8 展示了新用户界面的\
  \ Storyboard。由于关闭相机控制器的过程由图像选择器的委托方法处理，因此除了将\"录制视频\"按钮连接到类及其处理方法之外，你无需在 Interface\
  \ Builder 中为 `MainViewController` 类添加任何额外的 Segue 或连接。\n\n![9781430250838_Fig08-08.jpg](img/9781430250838_Fig08-08.jpg)\n\
  \n图 8-8. MyVideoRecorder 项目的完成 Storyboard\n\n## 为视频配置图像选择器\n\n就像拍照时一样，当用户按下应用中的\"\
  录制视频\"按钮时，你需要初始化并配置一个 `UIImagePickerController` 类的实例。你可能还记得第 2 章中提到的，配置图像选择器至少需要指定一个源类型（相机或相册）和一个用于处理图像数据的委托：\n\
  \n```\nUIImagePickerController *moviePicker = [[UIImagePickerController alloc] init];\n\
  moviePicker.delegate = self;\n```\n\n要将你的 `UIImagePickerController` 对象配置为录制视频，请将视频指定为唯一接受的媒体类型。你可以通过\
  \ `mediaTypes` 参数设置媒体类型，该参数接受一个由媒体类型常量构成的数组。视频对应的常量是 `kUTTypeMovie`；默认情况下，该参数会被初始化为图像常量\
  \ `kUTTypeImage`：\n\n```\nself.videoPlayer.mediaTypes = [NSArray arrayWithObjects:kUTTypeMovie];\n\
  ```\n\n**注意** 如果你将两个常量都添加到 `mediaTypes` 数组中，用户可以像在 iOS 相机应用中那样，切换录制界面。\n\n尽管在 iOS\
  \ 设备上拍摄的大多数照片只有几兆字节大小，但视频的大小很容易达到几百（甚至几千）兆字节。为了控制视频大小，你需要在图像选择器上设置另外两个属性：`videoQuality`\
  \ 和 `videoMaximumDuration`。`videoQuality` 属性接受一个 `UIImagePickerControllerQualityType`\
  \ 类型的常量。表 8-2 列出了这些值及其含义。请注意，你选择的值会通过决定视频帧分辨率和压缩算法强度来影响视频质量。默认值是 `UIImagePickerControllerQualityTypeMedium`。所有由\
  \ `UIImagePickerController` 类生成的视频都是 QuickTime 电影文件（.MOV 格式）。\n\n表 8-2. `UIImagePickerControllerQualityType`\
  \ 值\n\n\n\n| 值 | 分辨率 | 压缩程度 |\n| --- | --- | --- |\n| `UIImagePickerControllerQualityTypeHigh`\
  \ | 设备支持的最高分辨率（例如 iPhone 6 为 3264×2248） | 低 |\n| `UIImagePickerControllerQualityTypeMedium`\
  \ | 设备的中等分辨率（例如 iPhone 6 为 1280×720） | 中等 |\n| `UIImagePickerControllerQualityTypeLow`\
  \ | 低至可通过蜂窝信号传输的分辨率（144×192） | 最高 |\n| `UIImagePickerControllerQualityType640x480`\
  \ | 640×480 | 无 |\n| `UIImagePickerControllerQualityTypeIFrame1280x720` | 1280×720\
  \ | 无 |\n| `UIImagePickerControllerQualityTypeIFrame960x540` | 960×540 | 无 |\n\n\
  `videoMaximumDuration` 属性接受一个 `CGFloat` 类型的值，该值对应的是用户使用图像选取器可拍摄视频的最大长度。当用户达到最大录制时长时，图像选取器会自动停止并弹出预览界面供用户使用。此属性的默认值设置为\
  \ 600 秒（10 分钟），但您的最终值应取决于您应用程序的预期用途以及您可能拥有的任何外部需求（例如上传到视频分享服务或自定义网络服务）。\n\n```\n\
  self.videoRecorder.maximumVideoDuration = 30.0f;\n```\n\n最后，为了允许用户在返回主用户界面之前编辑他们的视频，请在图像选取器对象上启用\
  \ `allowsEditing` 属性。此属性接受一个布尔值作为输入，并在图像选取器的结果字典中返回一个条目值，该值代表编辑后视频的 URL。视频编辑界面会在用户完成录制后出现，并且不需要您进行任何额外的工作。\n\
  \n```\nself.videoRecorder.allowsEditing = YES;\n```\n\n`MyVideoRecorder` 项目中用于初始化视频录制图像选取器的完整实现在代码清单\
  \ 8-13 中。这段代码封装在“录制视频”按钮的事件处理器中。\n\n***代码清单 8-13***。初始化用于录制视频的图像选取器\n\n```\n-(IBAction)showPicker:(id)sender\n\
  {\n    self.videoRecorder = [[UIImagePickerController alloc] init];\n    self.videoRecorder.sourceType\
  \ =\n        UIImagePickerControllerSourceTypeCamera;\n    self.videoRecorder.mediaTypes\
  \ =\n        [NSArray arrayWithObject:(NSString *)kUTTypeMovie];\n    self.videoRecorder.delegate\
  \ = self;\n    self.videoRecorder.videoMaximumDuration = 30.0f;\n    self.videoRecorder.videoQuality\
  \ =\n        UIImagePickerControllerQualityTypeMedium;\n    self.videoRecorder.allowsEditing\
  \ = YES;\n\n    [self presentViewController:self.videoRecorder\n               \
  \                     animated:YES\n                                    completion:nil];\n\
  }\n```\n\n## 保存视频录制文件\n\n当图像选取器完成媒体捕获时触发的代理方法是 `[UIImagePickerController imagePickerController:didFinishPickingMediaWithInfo:]`。为了正确处理来自图像选取器的视频，您需要学习如何使用结果字典中的附加键。供您参考，表\
  \ 8-3 列出了`userInfo`结果字典中的所有键。\n\n**表 8-3。** 图像选取器结果字典返回的键\n\n| 键 | 返回类型 | 值 |\n\
  | --- | --- | --- |\n| `UIImagePickerControllerMediaType` | `NSString` | 媒体类型（图像或视频）\
  \ |\n| `UIImagePickerControllerOriginalImage` | `UIImage` | 未经编辑的图像数据 |\n| `UIImagePickerControllerEditedImage`\
  \ | `UIImage` | 编辑后的图像数据 |\n| `UIImagePickerControllerCropRect` | `NSValue`（转换为\
  \ `NSRect`） | 裁剪矩形 |\n| `UIImagePickerControllerMediaURL` | `NSURL` | 未经编辑的视频 URL\
  \ |\n| `UIImagePickerControllerReferenceURL` | `NSURL` | 最终视频的 URL（无论是否编辑） |\n\n\
  您需要从 `MyCamera` 应用中改变的第一个假设是，图像选取器的所有结果都是图像。要检查文件的返回类型，请检索由 `UIImagePickerControllerMediaType`\
  \ 键表示的值。这将是一个 `NSString`，您应将其与代表电影的 `kUTTypeMovie` 进行比较：\n\n```\nif ([[info objectForKey:UIImagePickerControllerMediaType]\n\
  \    isEqualToString:(NSString *)kUTTypeMovie]) {\n        //自定义代码写在这里\n}\n```\n\
  \n接下来，您需要确定用户是否编辑了视频。结果字典提供了两个键来表示用户录制的视频：`UIImagePickerControllerMediaURL`，它返回媒体项最终编辑版本的\
  \ URL；以及 `UIImagePickerControllerReferenceURL`，它返回原始媒体项的 URL。大多数应用的一般做法是使用视频的编辑版本。如果您想给用户选择使用哪个版本的权利，可以比较这两个值；如果键代表的值不同，您就知道用户编辑了视频：\n\
  \n```\nif ([[info objectForKey:UIImagePickerControllerMediaURL]\n    isEqualToString:[info\n\
  \     objectForKey:UIImagePickerControllerReferenceURL]]) {\n     movieURL = [info\
  \ objectForKey:UIImagePickerControllerMediaURL];\n} else {\n    movieURL = [info\n\
  \        objectForKey:UIImagePickerControllerReferenceURL];\n}\n```\n\n最后，为了省去用户很多麻烦，您需要将视频以人类可读的名称保存到文档目录。在我的应用中，我喜欢在字符串（例如\
  \ `Movie` 或我的应用名称）后面追加一个时间戳。这样，用户就可以根据视频的创建时间轻松检索视频。您可以使用 `NSDateFormatter` 类轻松创建时间戳。\n\
  \n```\nNSDateFormatter *dateFormat = [[NSDateFormatter alloc] init];\n[dateFormat\
  \ setDateFormat:@\"yyyyMMddHHmm\"];\n```\n\n要获取文件内容，请使用 `[NSData dataWithContentsOfURL:]`\
  \ 方法：\n\n```\nNSData *movieData = [NSData dataWithContentsOfURL:movieURL];\n```\n\
  \n代码清单 8-14 展示了 `[UIImagePickerController imagePickerController:didFinishPickingMediaWithInfo:]`\
  \ 代理方法的一个实现，它将所有这些步骤整合在一起。在 `MyVideoRecorder` 项目中，此方法定义在 `MainViewController` 类中。您还会找到取消图像选取器的代理方法，该方法仅用于关闭图像选取器。\n\
  \n***代码清单 8-14***。`MyVideoRecorder` 项目的图像选取器代理方法\n\n```\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker\n    didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n\n    NSArray\
  \ *paths =\n        NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n \
  \       NSUserDomainMask, YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n\
  \    NSString *filePath = [documentsDirectory\n        stringByAppendingPathComponent:@\"\
  movie.mov\"];\n\n    if ([[info objectForKey:UIImagePickerControllerMediaType]\n\
  \              isEqualToString:(NSString *)kUTTypeMovie]) {\n\n        NSURL *movieURL\
  \ = nil;\n\n        if ([[info objectForKey:UIImagePickerControllerMediaURL]\n \
  \               isEqualToString:[info\n                        objectForKey:UIImagePickerControllerReferenceURL]])\
  \ {\n                   movieURL = [info\n                        objectForKey:UIImagePickerControllerMediaURL];\n\
  \            } else {\n                movieURL = [info\n                      \
  \  objectForKey:UIImagePickerControllerReferenceURL];\n            }\n\n       \
  \ NSData *movieData = [NSData dataWithContentsOfURL:movieURL];\n        NSError\
  \ *error = nil;\n        NSString *alertMessage = nil;\n\n        //在尝试写入前检查文件是否已存在\n\
  \        if ([[NSFileManager defaultManager]\n            fileExistsAtPath:filePath])\
  \ {\n             NSDateFormatter *dateFormat =\n                 [[NSDateFormatter\
  \ alloc] init];\n            [dateFormat setDateFormat:@\"yyyyMMddHHmm\"];\n\n \
  \           NSString *dateString =\n                [dateFormat stringFromDate:[NSDate\
  \ date]];\n```\n\n\n\n`NSString *fileName = [NSString stringWithFormat:@\"movie-%@.mov\"\
  , dateString];`  \n`filePath = [documentsDirectory stringByAppendingPathComponent:fileName];`\
  \  \n`[movieData writeToFile:filePath options:NSDataWritingAtomic error:&error];`\
  \  \n`if (error == nil) {`  \n    `alertMessage = @\"已成功保存到'Documents'文件夹！\";` \
  \ \n`} else {`  \n    `alertMessage = @\"无法保存影片 :(\";`  \n`}`  \n\n`-(void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker`  \n`{`  \n    `[self dismissViewControllerAnimated:YES completion:nil];`\
  \  \n`}`  \n\n你可以通过在应用中使用**选择视频**按钮来选择录制的视频，验证其是否可播放。它们应该像文档文件夹中的其他视频文件一样正常播放。\n\
  \n## 总结\n\n本章中，你学习了如何使用`MPMoviePlayerController`类播放视频，以及如何使用`UIImagePickerController`类录制视频。在\
  \ MyVideoPlayer 应用中，你看到使用`MediaPlayer`框架播放音频和视频的主要区别在于配置播放器的播放设置和父视图。为了捕捉错误和自动播放内容，你学习了如何实现通知观察者。\n\
  \n在 MyVideoRecorder 应用中，你通过集成`UIImagePickerController`学习了如何为 MyVideoPlayer 应用添加视频录制功能。你再次看到，通过将该类配置为仅处理视频并添加一些额外的配置选项，你可以创造一种易于捕获视频的用户体验。\n\
  \n## 第 9 章 构建自定义视频播放界面\n\n遵循本书中图像和音频单元的相同趋势，既然你已经学会了如何使用苹果内置的界面进行视频播放和录制，现在可以开始学习如何“控制”它们的核心功能。在本章中，你将学习如何自定义视频播放界面，从而展示你的品牌标识以及最适合你应用的控件。\n\
  \n为此，你需要在`AVFoundation`的媒体播放功能之上构建自己的用户界面，就像你在第 6 章到第 8 章中开发的音频应用一样。虽然这看起来可能有些困难，但好消息是媒体播放层的设置相对容易；大部分工作在于构建你的用户体验。\n\
  \n实现基于`AVFoundation`的视频播放器的基本步骤如下：\n\n1.  使用`AVPlayer`类设置一个媒体播放器。\n2.  使用`AVPlayerLayer`类显示视频。\n\
  3.  使用 Interface Builder 创建自定义播放控件。\n4.  为播放控件和状态变化创建处理程序。\n\n在本章中，你将学习如何通过将 MyVideoPlayer\
  \ 项目中的视频播放器替换为你开发的自定义子类来实现这些步骤。该项目包含在源代码包的第 9 章文件夹中，名称为 MyCustomVideoPlayer。为了简化过渡，你将设计一个基于通知的消息系统，它非常类似于`MPMoviePlayerController`类。\n\
  \n大多数视频应用需要在全屏模式下暴露完整的控件集，因此该项目专注于为全屏视频播放界面构建控件。你可以在图 9-1 中找到更新后的视频播放界面原型。\n\n![9781430250838_Fig09-01.jpg](img/9781430250838_Fig09-01.jpg)\n\
  \n图 9-1. MyCustomVideoPlayer 视频播放界面原型\n\n将新的视频播放界面与默认的 iOS 视频界面（如图 9-2 所示）进行比较，你可以看到该项目更强调手指操作的便利性。用户无需费力寻找播放按钮或精确跳转几秒钟，屏幕中央较大的按钮减少了用户出错的机会。在播放过程中，屏幕底部的滑块会向右移动以显示当前进度。用户还可以使用该控件**拖放**（跳跃）到视频的任何位置。通过使用屏幕中央的控件，用户可以切换播放状态或向前/向后跳转几秒钟。在几秒钟无操作后，控件会消失，这样它们既可用又不会分散注意力或占用屏幕空间。\n\
  \n![9781430250838_Fig09-02.jpg](img/9781430250838_Fig09-02.jpg)\n\n图 9-2. 默认 iOS\
  \ 视频播放界面（左）与自定义播放界面（右）\n\n## 开始\n\n要开始使用 MyCustomVideoPlayer 项目，请从第 10 章复制 MyVideoPlayer\
  \ 项目并将其重命名为`MyCustomVideoPlayer`。如果你不确定如何克隆项目，请参考第 8 章中的“录制视频文件”部分，你在那里克隆了 MyVideoPlayer\
  \ 项目以创建 MyVideoRecorder 项目。\n\n由于该项目使用`AVFoundation`框架进行媒体播放，而不是`MediaPlayer`框架，请在项目设置中的“链接的库和框架”部分进行相应更改。如图\
  \ 9-3 所示，你的最终框架列表应仅包含`AVFoundation`框架。\n\n![9781430250838_Fig09-03.jpg](img/9781430250838_Fig09-03.jpg)\n\
  \n图 9-3. MyCustomVideoPlayer 项目的框架列表\n\n对于新的视频播放界面，请向你的项目中添加一个`UIViewController`的子类。与之前的项目一样，你可以通过在\
  \ Xcode 的**File**菜单中选择**New → File**来创建子类。如图 9-4 所示，当提示你选择父类时，请输入`UIViewController`。在\
  \ MyCustomVideoPlayer 项目中，该类被命名为`CustomPlayerController`。\n\n![9781430250838_Fig09-04.jpg](img/9781430250838_Fig09-04.jpg)\n\
  \n图 9-4. 创建子类\n\n向`CustomPlayerController`类添加一个名为`[CustomPlayerController initWithContentURL:]`的构造函数。这将帮助你模仿`MPMoviePlayerController`类，后者使用`[MPMoviePlayerController\
  \ initWIthContentURL:]`作为其构造函数。你可以在代码清单 9-1 和 9-2 中找到`CustomPlayerController`类的初始头文件（`.h`）和实现文件（`.m`）。\n\
  \n**代码清单 9-1**. `CustomPlayerController`类的头文件\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n\n@interface CustomPlayerController : UIViewController\n\
  \n-(id)initWithContentURL:(NSURL *)contentURL;\n\n@end\n```\n\n**代码清单 9-2**. `CustomPlayerController`类的实现文件\n\
  \n```\n#import \"CustomPlayerController.h\"\n\n@interface CustomPlayerController\
