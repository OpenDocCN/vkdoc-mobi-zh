  \ unlockForConfiguration];\n    }\n\nself.tapPosition.text =\n        [NSString\
  \ stringWithFormat:@\"Tap Position: (%0.f, %0.f)\",\n                          \
  \         tapPoint.x, tapPoint.y];\n}\n```\n\n### 处理不同屏幕尺寸\n\n虽然你不需要向 `AVCaptureSession`\
  \ 添加任何额外的配置选项来处理不同的屏幕尺寸（例如 iPad、iPhone 4S 或 iPhone 5），但你需要确保遵循通用（多设备）用户界面开发的最佳实践。\n\
  \n如果你为平板和手机用户界面使用同一个 storyboard，请确保已为相机控制器界面启用了自动布局，以便它能随着屏幕尺寸变大（或缩小）。一个好的做法是为控件分配固定尺寸，同时让预览区域自适应填充屏幕尺寸。\n\
  \n相反，如果你为平板和手机用户界面使用不同的 storyboard，请记得在两个 storyboard 上布局相机控制器。确保所有输出口和动作在两个 storyboard\
  \ 上都正确设置，并尽量为每种设备优化用户界面。你可能会发现，手机界面适合使用短标题或有限的配置选项，而平板界面则适合使用扩展标题和全面的配置选项。再次强调，尽量让预览区域随屏幕扩展，因为它是用户的主要反馈界面。\n\
  \n**注意** 请记住，自动布局不适用于基于 NIB 的用户界面，因此要小心地在所有屏幕尺寸版本的界面中同步你的更改，或者开始过渡到使用 storyboard。\n\
  \n## 构建自定义图片选择器\n\n在本节中，你将使用与自定义相机控制器相同的逻辑——即实现用例——来构建一个自定义图片选择器。苹果并未提供现成的 `UIImagePickerController`。对于此应用，你希望能够定制图片选择器的主题，并在返回原始视图前能够选择多张图片。图\
  \ 4-4 展示了图片选择器的流程图和模型图。\n\n![9781430250838_Fig04-04.jpg](img/9781430250838_Fig04-04.jpg)\n\
  \n图 4-4. 自定义图片选择器的流程图和模型图\n\n与 `UIImagePickerController` 非常相似，你需要模态呈现图片选择器，并在用户确认选择后将其关闭。由于此示例在熟悉的用户界面基础上增加了功能，因此它通过\
  \ `UICollectionView` 类以网格形式展示缩略图。应用通过高亮选中项并在其上显示一个填充的复选框来表示选择。取消选择某个项将撤销这两种状态变化。在用户确认更改或决定取消视图后，应用会销毁模态视图。选中的图片将出现在父视图控制器的可滚动表格视图中。\n\
  \n要实现此流程，你需要执行以下步骤，本节将涵盖这些步骤：\n\n1. 初始化一个包含来自相机胶卷图片的数据源。\n2. 在 `UICollectionView`\
  \ 中展示这些图片。\n3. 配置 `UICollectionView` 以允许多选。\n4. 创建一个用于返回选中图片的程序化接口。\n\n你将使用 Asset\
  \ Library 框架作为数据源。由于大多数读者可能不熟悉此框架和 `UICollectionView` 类，你还会看到关于这两者的背景信息。\n\n你可以在源代码包的\
  \ 第 4 章 文件夹中找到此应用的源代码。该项目名为 MyPicker。\n\n### 实例化资产库作为数据源\n\n构建图片浏览器的第一步是实例化一个数据源。虽然没有\
  \ API 能让你直接“获取设备上所有的 `UIImage`”，但你可以利用 Asset Library 框架来访问“照片”应用中的所有照片和视频。\n\n由\
  \ `ALAssetsLibrary` 类表示的资产库，提供了与“照片”应用双向的接口，用于读写照片和视频。你可以按相册、唯一 URL 或媒体类型查找资产，将资产保存到“照片”应用，或从你的应用内创建新相册。此外，与其他访问共享资源的应用一样，你可以查询你的应用是否有权限访问照片。虽然\
  \ iOS 没有全局文件系统这样的概念，但像这样的受限接口允许应用以安全、一致的方式共享数据。\n\n要实例化一个 Asset Library，首先需要将 `AssetsLibrary.framework`\
  \ 添加到项目中。与 MyCamera 项目一样，你可以通过将框架添加到项目通用设置下的“链接的框架和库”数组中，来将其添加到项目中。\n\n添加框架后，在目标类中包含其头文件：\n\
  \n```objc\n#import <AssetsLibrary/AssetsLibrary.h>\n```\n\n**注意** 与 `include` 关键字不同，`import`\
  \ 关键字允许你通过在添加文件前检查重复项来减少代码量。\n\n现在基础工作已就绪，你可以实例化一个 Asset Library：\n\n```objc\nALAssetsLibrary\
  \ *assetsLibrary = [[ALAssetsLibrary alloc] init];\n```\n\n就像你需要选择相册或时间线来查看“照片”应用中的照片一样，你需要指定一个*组*来通过\
  \ Asset Library 发现资产。由 `ALAssetGroup` 类表示的资产组，允许你根据一个或多个过滤器访问“照片”应用中的资产子集。资产组不仅允许你复制\
  \ `NSSet` 的某些功能（例如提供集合中的项目数量），还允许更高级的功能，并能提供诸如组的缩略图或权限状态等信息。\n\n要检索资产组，请使用 Asset\
  \ Library API `[ALAssetsLibrary enumerateGroupsWithTypes:usingBlock:failureBlock]`。你需向此\
  \ API 传递一个 `NSInteger`，它表示要包含在搜索中的过滤器；一个块，每次找到 `ALAssetGroup` 时都会调用该块；以及一个块，在发生故障时会调用该块。由于无法保证组查找的处理器或时间消耗（用户可能有数百个相册，其中许多是隐藏的），因此块语法适用于此\
  \ API。块通过为开发者提供在后台运行代码片段的方式，使应用更快，从而将主线程解放出来用于时间敏感的操作，例如用户界面元素的反馈（例如捕捉按钮按下）。\n\n\
  代码清单 4-24 返回代表“已存储的照片”和“我的照片流”图库中的照片的组。该示例在成功或失败时打印日志消息。\n\n***代码清单 4-24***. 枚举资产组\n\
  \n```objc\nNSInteger photoFilters = ALAssetsGroupPhotoStream |\n               \
  \          ALAssetsGroupSavedPhotos;\n```\n\n\n```objc\n[assetsLibrary enumerateGroupsWithTypes:photoFilters\n\
  \    usingBlock:^(ALAssetsGroup *group, BOOL *stop) {\n        [group enumerateAssetsUsingBlock:^(ALAsset\
  \ *result,\n        NSUInteger index, BOOL *stop) {\n            NSLog(@\"success!\
  \ asset found\");\n        }];\n\n} failureBlock:^(NSError *error) {\n        NSLog(@\"\
  error! %@\", [error description]);\n    }\n];\n```\n\n过滤器值代表一个掩码中的位，因此通过将它们进行 `OR`\
  \ 操作，你可以组合多个过滤器。表 4-2 列出了常用的过滤器值及其含义。\n\n表 4-2. 常用资源组过滤器\n\n| 常量 | 资源组 |\n| ---\
  \ | --- |\n| `ALAssetsGroupLibrary` | 资料库——设备上所有源自 iTunes 的资源 |\n| `ALAssetsGroupAlbum`\
  \ | 设备上的所有相簿，但不包含“我的照片流”或“共享流” |\n| `ALAssetsGroupEvent` | 所有事件相簿 |\n| `ALAssetsGroupFace`\
  \ | 所有面孔相簿 |\n| `ALAssetsGroupSavedPhotos` | 相机胶卷相簿 |\n| `ALAssetsGroupPhotoStream`\
  \ | 我的照片流相簿（iCloud） |\n| `ALAssetsGroupAll` | 除源自 iTunes 的相簿外的所有相簿 |\n\n现在你已经有了一组资源组，就可以实现遍历每个单独资源的逻辑了。`ALAsset`\
  \ 类代表了资源。与 `ALAssetGroup` 类似，它们比你可能预期用来表示这类二进制数据的基类要智能得多。`ALAsset` 维护着与资源存在的每个版本（如原始版本和多个编辑版本）相对应的唯一内部\
  \ URL。它们还允许访问资源的派生属性（如缩略图），甚至支持保存资源的新版本。\n\n要访问由 `ALAssetGroup` 表示的 `ALAsset` 对象，你可以使用与组发现\
  \ API 类似的 API：`[ALAssetGroup enumerateAssetsUsingBlock:]`。与组发现 API 一样，每当 API 找到一个资源并准备访问时，你定义的\
  \ block 就会被调用。简而言之，本示例将每个有效的（非 `nil`）图片结果添加到一个 `NSMutableArray` 资源数组中。稍后你将使用这个数据结构来填充集合视图。\n\
  \n***列表 4-25***. 枚举图片资源\n\n```objc\nself.assetsLibrary = [[ALAssetsLibrary alloc]\
  \ init];\nself.images = [NSMutableArray new];\n\nNSInteger photoFilters = ALAssetsGroupPhotoStream\
  \ |\n                         ALAssetsGroupSavedPhotos;\n\n[self.assetsLibrary enumerateGroupsWithTypes:photoFilters\n\
  \    usingBlock:^(ALAssetsGroup *group, BOOL *stop) {\n        [group enumerateAssetsUsingBlock:^(ALAsset\
  \ *result, NSUInteger\n                                           index, BOOL *stop)\
  \ {\n            if (result != nil) {\n                    [self.images addObject:result];\n\
  \            }\n        }];\n    } failureBlock:^(NSError *error) {\n        NSLog(@\"\
  error! %@\", [error description]);\n    }\n];\n```\n\n## BLOCK 快速指南\n\n在 Objective-C\
  \ 中，block 是一种语言特性，允许你指定*匿名方法*——即像方法一样工作但无需声明签名的代码片段。Block 是一种创建“一次性”方法的绝佳方式，这种方法仅从特定的代码路径调用。此外，你可以将\
  \ block 定义为方法的参数。在本书中，你将看到*完成 block* 的提及；这些是在方法调用中定义的 block，在方法完成时会立即被调用。\n\n与方法相比，block\
  \ 的语法较为突兀。Block 的签名如下：\n\n`void (^myBlock)(NSString* string1, NSString *string2,\
  \ int count);`\n\n第一个关键字 `void` 是 block 的返回类型。`myBlock` 是 block 的名称，它前面总是有一个脱字符（`^`）。最后一对圆括号中的内容是参数类型。Block\
  \ 在语法风格上更接近 C 语言，且不需要为参数添加标签。\n\nBlock 的签名指定了它的返回类型、名称和参数，就像方法一样。要定义一个 block，只需将\
  \ block 的代码放在花括号中，就像定义方法那样。编译器会将 block 视为*内联*函数，这意味着它们不会中断代码行，所以请确保在行末添加分号：\n\n\
  `int finalPhotoCount = ^(int count1, int count2) {`\n    `return count1+count2;};`\n\
  \n调用带参数的 block 时，使用的语法与调用方法相同，需要指定参数类型和 block 的代码。例如，在列表 4-25 中，使用了 block 来枚举资源和组。\n\
  \n```objc\n[group enumerateAssetsUsingBlock:^(ALAsset *result, NSUInteger index,\n\
  \    BOOL *stop) {\n        if (result != nil) {\n           [self.images addObject:result];\n\
  \        }\n}];\n```\n\nBlock 较为危险的一个方面是它的变量作用域与普通方法不同。你可以在 block 内创建局部变量，也可以访问\
  \ block 外部的实例变量。然而，默认情况下，block 中的所有外部变量都是*通过拷贝*传递的，这意味着你可以读取它们的内容，但不能修改它们。要声明一个可以被\
  \ block 修改的局部变量或实例变量，你需要在它的类型前添加 `__block` 关键字：\n\n`__block NSInteger photoCount;`\n\
  \n对于实例变量，使用类似的模式，在属性关键字之后、类型之前添加 `__block` 关键字：\n\n`@property (nonatomic, assign)\
  \ __block NSInteger photoCount;`\n\n使用 block 就像开一辆没有刹车的法拉利。你可以开得极快，但需要意识到你的局限性以及如何规避它们。\n\
  \n### 使用 UICollectionView 类来枚举资源\n\n如果你构建了上一节中的示例，那么现在你已经有一个数组，其中包含与“存储的照片”和“我的照片流”图库中的照片相对应的一组资源。此时，你可以构建一个集合视图用户界面来展示这些项目。\n\
  \n*集合视图* 在 iOS 6 中引入，指的是你可能在 iBooks 应用和旧版照片应用中熟悉的基于图形的导航界面（参见图 4-5）。在集合视图中，项目通常由图形表示（如专辑封面或书籍封面），并从左到右、从上到下排列。与表视图非常相似，你需要为视图定义数据源，指定每个项目（称为*单元格*）的外观，并定义用户与项目交互时应发生的行为。与表视图不同，你无需指定每列或每行有多少个项目；`UICollectionView`\
  \ 类会根据单元格大小和容器视图大小自动将项目适配到网格中。这使得传入线性数据集变得容易。同样，你可以像处理表视图那样，将数据分组到分区中。\n\n![9781430250838_Fig04-05.jpg](img/9781430250838_Fig04-05.jpg)\n\
  \n图 4-5. iBooks 中集合视图的截图\n\n要向应用程序添加集合视图，请从 Interface Builder 的对象库中拖拽一个“集合视图控制器”（Collection\
  \ View Controller）。确保你实例化了自己的 `UICollectionViewController` 子类，以便将数据源连接到视图，并实现你自己的操作处理程序。如果你正在实现\
  \ iPad 界面，请记得也在 iPad 故事板中复制这些设置。你可以在图 4-6 中找到故事板的截图。\n\n![9781430250838_Fig04-06.jpg](img/9781430250838_Fig04-06.jpg)\n\
  \n图 4-6. 在 Interface Builder 中添加集合视图\n\n\n\n### 排版后内容\n\n理解 `UICollectionView` 最简单的方式是将其视为更高级的\
  \ `UITableView`。与表格视图类似，集合视图需要用数据数组进行初始化，每个项目都由一个单元格表示。对于 MyPicker 项目，你需要让每个单元格包含一张图片和一个表示其状态的复选框。\n\
  \n`UICollectionView` 的默认 Interface Builder 模板带有一个空的 `UICollectionViewCell`。为了让它显示两张图片（一张用于内容，一张用于复选框），你需要遵循以下步骤：\n\
  \n1.  创建 `UICollectionViewCell` 的一个新子类。将此子类设置为单元格的父类（使用 Interface Builder 的属性检查器）。\n\
  2.  为单元格指定一个新的重用标识符（使用 Interface Builder 的属性检查器）。\n3.  为单元格添加两个 `UIImage` 属性，分别代表图片和复选框。使用\
  \ Xcode 将这些属性关联到你的类。\n\n处理 `UICollectionViewCell` 时，请确保你在 Interface Builder 中选中了该单元格；否则，你将难以修改它。如图\
  \ 4-7 所示，你可以使用 Interface Builder 中的场景导航器（左侧面板）轻松选择项目。\n\n![9781430250838_Fig04-07.jpg](img/9781430250838_Fig04-07.jpg)\n\
  \n图 4-7。在 Interface Builder 中设置重用标识符\n\n**注意** 如果在设置重用标识符时遇到问题，请确保你选中了 `UICollectionViewCell`\
  \ 本身，而不是它的某个子视图。\n\n与 `UITableView` 非常相似，你需要实现一系列委托方法才能充分发挥集合视图的功能。第一步是让集合视图知道数据源包含多少个分区，以及每个分区需要多少行。通过实现\
  \ `[UICollectionViewDataSource numberOfSectionsInCollectionView]` 协议方法来定义分区数。在该方法中，返回值是一个整型，指定分区的数量。这个简单示例从一维数组中加载资源，因此你可以返回\
  \ 1 作为分区数量，如代码清单 4-26 所示。\n\n***代码清单 4-26***。初始化集合视图的分区计数\n\n```\n- (NSInteger)numberOfSectionsInCollectionView:(UICollectionView\
  \ *)collectionView\n{\n    return 1;\n}\n```\n\n实际的配置工作发生在定义每个分区的行数上。对于这个示例，行数等于数组中的项目数量，因此你可以直接返回\
  \ `count` 属性。你可以在委托方法 `[UICollectionView numberOfItemsInSection:]` 中实现这一点，该方法接收分区编号作为输入参数，并返回行数，如代码清单\
  \ 4-27 所示。\n\n***代码清单 4-27***。初始化集合视图的行数\n\n```\n- (NSInteger)collectionView:(UICollectionView\
  \ *)view numberOfItemsInSection:(NSInteger)section;\n{\n    return [self.images\
  \ count];\n}\n```\n\n根据你初始化输入数组的位置，你可能会遇到时序问题。例如，如果你在 `[UIViewController viewDidLoad]`\
  \ 方法中调用 Asset Library，你会注意到 `[UICollectionView numberOfItemsInSection:]` 方法以计数 0\
  \ 初始化集合视图，即使你已经找到多个项目。这是由于块编程的异步特性所致。因为查找代码在后台运行，没有任何机制阻止系统立即对仍然为空的数组执行集合视图初始化代码。\n\
  \n虽然这看起来像是一个相当大的错误，但无需担心，因为存在一个 API 允许你在任何时候刷新集合视图的数据源。这个 API 是 `[UICollectionView\
  \ reloadData]`。它会立即再次调用 `[UICollectionView numberOfSections]` 和 `[UICollectionView\
  \ numberOfItemsInSection:]` 方法，从而返回准确的初始化值。你只需在确信数组已完全填充时调用该方法即可。示例应用程序在完成遍历所有组时调用它。刷新代码块如代码清单\
  \ 4-28 所示。\n\n***代码清单 4-28***。刷新集合视图\n\n```\n[self.assetsLibrary enumerateGroupsWithTypes:photoFilters\n\
  \    usingBlock:^(ALAssetsGroup *group, BOOL *stop) {\n    [group enumerateAssetsUsingBlock:^(ALAsset\
  \ *result, NSUInteger\n                                       index, BOOL *stop)\
  \ {\n    if (result != nil) {\n        [self.images addObject:result];\n    }\n\
  }];\n\n[self.collectionView reloadData];\n} failureBlock:^(NSError *error) {\n \
  \   NSLog(@\"error! %@\", [error description]);\n}];\n```\n\n现在你可以对数据源充满信心，接下来需要确保每个\
  \ `UICollectionViewCell` 都能从资源中获取信息进行初始化。你可以使用 `[UICollectionView cellForItemAtIndexPath:]`\
  \ 方法来初始化单元格，其输入参数是集合视图和每个项目对应的 `NSIndexPath` 值。遵循初始化表格视图单元格的模式，第一步是获取一个可供操作的单元格，这通过\
  \ `[UICollectionView dequeueReusableCellWithReuseIdentifier:forIndexPath:]` 方法实现。传入\
  \ `indexPath` 和在 Interface Builder 中定义的重用标识符。为了访问自定义单元格中的图片视图，请确保在获取对象后对其进行类型转换。你可以在代码清单\
  \ 4-29 中找到基本的初始化代码。\n\n***代码清单 4-29***。初始化集合视图单元格\n\n```\n- (UICollectionViewCell\
  \ *)collectionView:(\n       UICollectionView *)collectionView\n           cellForItemAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    PickerCell *cell = (PickerCell *)[collectionView\n       \
  \ dequeueReusableCellWithReuseIdentifier:@\"PickerCell\"\n           forIndexPath:indexPath];\n\
  \nreturn cell;\n}\n```\n\n获取单元格后，现在需要检索与之对应的资源。由于数据源是一维数组，你知道行号会与数组中每个项目的索引完全对应。因此，要检索每个资源，你只需使用\
  \ `indexPath` 的 `row` 属性调用 `[NSArray objectAtIndex:]` 即可。如果数据源是多维数组，你还可以传入分区编号。\n\
  \n```\nALAsset *asset = [self.images objectAtIndex:indexPath.row];\n```\n\nCocoa\
  \ Touch 中的 `indexPath` 是一个二维数组，包含分区（第一维）和行（第二维）。你需要通过访问当前分区的行内容，将 `indexPath` 转换为一维数组，这就是为什么你在很多代码中经常会看到\
  \ `indexPath.row` 的原因。\n\n这个示例应用程序的目标是构建一个缩略图浏览器，类似于 `UIImagePickerController` 类提供的默认浏览器。虽然你可以从存储在\
  \ `ALAsset` 中的完整图像数据创建自己的缩略图，但出于速度和内存的考虑，你应该使用通过该类中的派生属性提供的缩略图。`ALAsset` 暴露了两个属性：`[ALAsset\
  \ thumbnail]` 和 `[ALAsset aspectRatioThumbnail]`，它们都返回 `CGImageRef` 类型（即指向图像数据的指针）。区别在于，`thumbnail`\
  \ 返回裁剪为正方形宽高比的缩略图，而 `aspectRatioThumbnail` 返回保留原始资源宽高比的缩略图。\n\n\n\n你可以使用初始化方法 `[UIImage\
  \ imageWithCGImage:]`，直接传入指针，从 `CGImageRef` 值创建 `UIImage`。之后，只需设置单元格图像视图的 `image`\
  \ 属性即可。你可以在代码清单 4-30 中找到单元格的完整初始化方法。\n\n***代码清单 4-30***. 使用缩略图初始化集合视图单元格\n\n```\n\
  - (UICollectionViewCell *)collectionView:(\n       UICollectionView *)collectionView\n\
         cellForItemAtIndexPath:(NSIndexPath *)indexPath\n{\n       PickerCell *cell\
  \ = (PickerCell *)[collectionView\n       dequeueReusableCellWithReuseIdentifier:@\"\
  PickerCell\"\n           forIndexPath:indexPath];\n\nALAsset *asset = [self.images\
  \ objectAtIndex:indexPath.row];\n    cell.imageView.image = [UIImage imageWithCGImage:asset.aspectRatioThumbnail];\n\
  \nreturn cell;\n}\n```\n\n### 启用多选\n\n正如本章开头所述，构建自定义图像选择器最有力的理由之一，是为了覆盖 Apple 通过\
  \ `UIImagePickerController` 类不支持的用例，例如一次选择多张图像。通过利用 `UICollectionView` 的多选 API，你可以无需太多额外工作就能填补这一空白。\n\
  \n要启用多选图像功能，你需要完成三项高级任务：\n\n- 在集合视图上启用多选\n- 根据选择状态，向数据结构添加或移除项目\n- 根据每个项目的选择状态更新其用户界面\n\
  \n要启用多选，你只需要在集合视图上启用 `allowMultipleSelection` 标志：\n\n```\n[self.collectionView setAllowsMultipleSelection:YES];\n\
  ```\n\n为了在用户关闭自定义图像选择器时返回多张图像，你需要将图像存储到一个数据结构中，该数据结构根据用户的选择而增长或缩小。你可以将项目存储在 `NSMutableArray`\
  \ 中，但你需要编写自己的包装代码，以确保在添加项目之前它们不存在于结构中，这可能会降低应用程序的速度或增加其内存占用。一个更优雅的解决方案是使用 `NSMutableDictionary`，以资产索引号作为键。通过将资产直接与索引号关联，你不依赖于项目添加到字典中的顺序，并且可以使用非常快速、直接的查找。当用户选择资产时，你无需担心重复问题，因为每个键只能关联一个对象。当用户取消选择资产时，你可以根据索引号立即在字典中找到并移除该资产。\n\
  \n最后一步是更新用户界面，以反映选择状态的变化。实现此行为所需的两个委托方法是 `[UICollectionView didDeselectItemAtIndexPath:]`\
  \ 和 `[UICollectionView didSelectItemAtIndexPath:]`。就像构建项目时一样，这些函数的核心操作是首先查找相应的单元格对象，然后修改特定值。本应用程序通过更改单元格的背景颜色以及放置在缩略图上的覆盖图像的状态来指示项目已被选中。由于应用程序尊重图像的原始宽高比，并且集合单元格是方形的，因此背景中有一些可操作的空间。通过添加覆盖图像，你还可以创建一个用户在其他支持多选项目的应用程序（例如\
  \ iOS 邮件应用）中熟悉的界面。选择和取消选择单元格的逻辑在代码清单 4-31 中进行了说明。\n\n***代码清单 4-31***. 选择和取消选择集合视图单元格的逻辑\n\
  \n```\n-(void)collectionView:(UICollectionView *)collectionView\n        didSelectItemAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    PickerCell *cell = (PickerCell *)[collectionView\n        cellForItemAtIndexPath:indexPath];\n\
  \ncell.overlayView.image = [UIImage imageNamed:@\"Check-selected\"];\n    cell.imageView.backgroundColor\
  \ = [UIColor whiteColor];\n\n[self.selectedImages setObject:[self.images\n                                    objectAtIndex:indexPath.row]\n\
                                      forKey:[NSNumber\n                                    numberWithInteger:indexPath.row]];\n\
  }\n\n- (void)collectionView:(UICollectionView *)collectionView\n        didDeselectItemAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    PickerCell *cell = (PickerCell *)[collectionView\n        cellForItemAtIndexPath:indexPath];\n\
  \ncell.overlayView.image = [UIImage imageNamed:@\"Check-notselected\"];\n    cell.imageView.backgroundColor\
  \ = [UIColor purpleColor];\n\nif ([self.selectedImages objectForKey:[NSNumber\n\
                       numberWithInteger:indexPath.row]] !=  nil) {\n        [self.selectedImages\
  \ removeObjectForKey:[NSNumber\n                     numberWithInteger:indexPath.row]];\n\
      }\n\n}\n```\n\n### 创建用于返回图像数据的接口\n\n自定义图像选择器的最后一步是构建一个编程接口，用于将用户选择的图像返回给调用类。你还需要一种返回\
  \ `cancel` 消息的方法，指示用户没有选择任何图像。\n\n回顾前面关于消息传递的讨论，你可能还记得有多种方法可以在两个类之间构建接口，从松散实现（如通知和键值观察）到非常严格的实现（包括协议和委托）。虽然基于通知的系统在这里可以工作，但这些系统通常更适用于后台任务或希望订阅服务的类，这意味着它们可以轻松地移除观察者身份并且仍然正常运行。因为你试图构建一种与本机\
  \ `UIImagePickerController` 类似的体验，所以你应该尝试使用与本机功能相似的设计模式，包括定义特定的消息并持有一个指向调用类的指针。在这种情况下，最合适的消息传递系统是委托。\n\
  \n要指定传递哪些消息，你必须首先定义协议。在本例中，你将传递 `didSelectImages` 消息（以及用户选择的资产列表）或 `cancel` 消息（表示用户未选择任何内容并希望关闭图像选择器）。为了让该接口的用户更轻松，此实现通过\
  \ `didSelectImages` 消息返回一个图像数组，而 `cancel` 消息不返回任何内容。你可以在代码清单 4-32 中找到协议定义的示例。\n\n\
  ***代码清单 4-32***. 为图像选择器定义协议\n\n```\n#import <UIKit/UIKit.h>\n#import <AssetsLibrary/AssetsLibrary.h>\n\
  \n@protocol PickerDelegate <NSObject>\n\n-(void)didSelectImages:(NSArray *)images;\n\
  -(void)cancel;\n\n@end\n\n@interface PickerViewController : UICollectionViewController\n\
  \n@property (nonatomic, strong) NSMutableArray *images;\n@property (nonatomic, strong)\
  \ ALAssetsLibrary *assetsLibrary;\n@property (nonatomic, strong) NSMutableDictionary\
  \ *selectedImages;\n@property (nonatomic, weak) id <PickerDelegate> delegate;\n\n\
  -(IBAction)cancel:(id)sender;\n-(IBAction)done:(id)sender;\n\n@end\n```\n\n\n\n\
  从图像选择器类内部，在操作按钮处理程序中调用协议方法。`didSelectImages`处理程序通过遍历选择字典并返回每个索引所指示的非`nil`资源图像的表示，构建一个要传回的资产数组。对于`cancel`处理程序，你可以简单地向委托对象发送`cancel`消息。你可以在列表\
  \ 4-33 中找到这些调用。\n\n***列表 4-33***. 从图像选择器调用协议方法\n\n```\n-(IBAction)done:(id)sender\n\
  {\n    NSMutableArray *imageArray = [NSMutableArray new];\n    for (id key in self.selectedImages.allKeys)\
  \ {\n        if ([self.selectedImages objectForKey:key] != nil) {\n            [imageArray\
  \ addObject:[self.selectedImages\n                                   objectForKey:key]];\n\
  \        }\n    }\n\n[self.delegate didSelectImages:imageArray];\n}\n\n-(IBAction)cancel:(id)sender\n\
  {\n\n[self.delegate cancel];\n}\n```\n\n在调用图像选择器的父视图控制器中，当实例化图像选择器时，需要在类签名中声明将为图像选择器类使用委托，如列表\
  \ 4-34 所示。\n\n***列表 4-34***. 指定目标类实现选择器协议\n\n```\n@interface ViewController : UIViewController\
  \ <PickerDelegate,\n                            UITableViewDelegate, UITableViewDataSource>\n\
  ```\n\n尽管该代码将类声明为选择器协议的委托，你仍然需要对其进行初始化。\n\n委托方法实现告诉表格视图，在收到`didSelectImages`消息后从资产数组加载缩略图，然后关闭图像选择器控制器。或者，对于取消消息，它只需关闭图像选择器控制器以返回正常的用户界面。你可以在列表\
  \ 4-35 中找到选择器委托方法的示例。\n\n***列表 4-35***. 实现选择器委托方法\n\n```\n#pragma mark - Picker\
  \ Delegate methods\n\n-(void)cancel\n{\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n\n-(void)didSelectImages:(NSArray *)images\n{\n    [self\
  \ dismissViewControllerAnimated:YES completion:nil];\n\nself.imageArray = [images\
  \ copy];\n\n[self.tableView reloadData];\n}\n```\n\n从资产表示创建图像数据\n\n现在你已经创建了一个接口来传回选中的资产，还需要一个步骤才能使其更像原生的图像选择器：它需要返回一些`UIImage`对象。要从`ALAsset`中提取原始图像数据，你需要执行以下步骤：\n\
  \n*   提取资产的所需版本或*表示*，到一个`ALAssetRepresentation`对象。\n*   通过使用`[ALAssetRepresentation\
  \ fullResolutionImage]`实例方法，保存指向该资产图像数据的指针。\n*   查询`ALAsset`的元数据以确定图像的正确方向。\n* \
  \  根据方向和提取的`CGImageRef`创建一个`UIImage`对象。\n\n正如本章前面提到的，`ALAsset`类的优势之一是其不仅能够存储原始图像数据，还能存储元数据和图像的多个版本（称为*表示*）。一个表示可以涵盖不同的压缩格式或分辨率等变化。`ALAssetRepresentation`类存储表示信息，并具有实例方法，允许你查询图像指针、元数据、原始数据以及存储\
  \ URL/UTI（通用类型标识符）。\n\n你可以通过传入所需表示的 UTI 或调用`[ALAsset defaultRepresentation]`（返回图像第一个可用的已保存表示）从`ALAsset`对象创建一个`ALAssetRepresentation`对象：\n\
  \n```\nALAssetRepresentation *defaultRepresentation = [asset defaultRepresentation];\n\
  ```\n\n类似地，你可以通过在表示对象上调用`[ALAssetRepresentation fullResolutionImage]`实例方法来获取指向表示图像数据的指针。返回类型是`CGImageRef`，一个指向图像数据的指针，这减小了对象大小并提高了速度（类似于`ALAsset`缩略图）。\n\
  \n```\nCGImageRef imagePtr = [defaultRepresentation fullResolutionImage];\n```\n\
  \n要从`CGImageRef`创建一个`UIImage`对象，使用`[UIImage imageFromCGImage:]`或`[UIImage imageFromCGImage:scale:orientation:]`实例方法。由于人们以横向或纵向模式拍照是极其常见的用例，你应该使用方向数据初始化图像以确保其正确显示。该实例方法接受一个`UIImageOrientation`标量作为输入，因此你需要查询`ALAsset`对象以获取方向信息。将默认值设置为`UIImageOrientationUp`——以防没有可用的方向信息。你可以在列表\
  \ 4-36 中找到这一过程的说明。\n\n***列表 4-36***. 查询资产方向\n\n```\nUIImageOrientation imageOrientation\
  \ = UIImageOrientationUp;\nNSNumber *orientation =\n    [asset valueForProperty:@\"\
  ALAssetPropertyOrientation\"];\nif (orientation != nil) {\n    imageOrientation\
  \ = [orientation integerValue];\n}\n```\n\n**注意** 查询`ALAssetRepresentation`的方向会返回一个`ALAssetOrientation`标量，它不能准确地表示图像是如何拍摄的。\n\
  \n收集了所有必要的拼图后，你现在可以创建一个图像对象：\n\n```\nUIImage *image = [UIImage imageWithCGImage:imagePtr\
  \ scale:1.0f orientation:imageOrientation];\n```\n\n总结\n\n本章提供了构建你自己的相机和图像选择器控制器的详细练习，目的是学习如何获得对照片相关\
  \ API 的更多控制，并构建你自己的用户界面来补充缺失的功能。通过使用更底层的框架，你应该对`UIImagePickerController`类的工作方式有清晰的认识。同时，希望你对图像在系统层面是如何被捕获和存储的有了更深的理解。\n\
  \n在相机控制器练习中，你探索了`AVFoundation`框架，以及如何利用其视频捕获能力来构建相机画面的实时预览，以及如何将帧导出为图像。你还看到了使用`CALayer`对象执行更快视图操作的一种方法，以及如何使用`AVCaptureDevice`操作相机的捕获设置。\n\
  \n图像选择器练习展示了`AssetsLibrary`框架如何为你提供一个方便的、更底层的 API 来查询设备上的媒体项目。你看到了如何按组和资产类型过滤资产，以及如何将结果添加到列表中。你还看到了如何在`UICollectionView`中显示这些结果，以及如何操作集合视图的设置以允许用户选择多个图像。\n\
  \n第二部分\n\n音频\n\n第 5 章\n\n播放和录制音频文件\n\n在本章中，你将通过构建应用程序来播放和录制音频，探索如何在你的应用中使用音频资源，这利用了\
  \ iOS 用于音视频任务的`AVFoundation`框架。与图像文件非常相似，音频以二进制数据的形式存储，并且必须解码后你的应用才能使用它。然而，一个巨大的区别是，音频文件存储为数据流，按时间索引，而不是表示一个静态图像的流。就像经常出现的情况一样，“有一个\
  \ API 可以做到这一点”，你将利用 iOS 内置的音频播放器和录音器类来构建你的应用。就像你处理图像一样，你将看到`AVFoundation`如何处理细节，让你能够专注于构建出色的用户体验，而不是实现底层音频编解码器。\n\
  \n播放音频文件\n\n\n```markdown\niOS 中的`AVAudioPlayer`类提供了一个“无头”接口，用于在应用内播放音频文件。该类允许您控制单个或多个文件的播放（例如播放、暂停和跳转），循环音频文件，并监控当前播放项目的音频电平。您可以对本地文件（例如应用文档目录中的文件）或网络资源（例如网络音频流）使用此类。本章涵盖本地音频播放；不过，您将在第\
  \ 6 章中了解网络流播放。\n\n为了练习使用`AVAudioPlayer`类，您将构建图 5-1 所示的音乐播放器应用。\n\n![9781430250838_Fig05-01.jpg](img/9781430250838_Fig05-01.jpg)\n\
  \n图 5-1. 简易音频播放器模型\n\n此应用允许用户选择存储在其项目包中的音频文件并控制其播放。播放控件包括“播放/暂停”（取决于状态）、“快进”和“快退”（15\
