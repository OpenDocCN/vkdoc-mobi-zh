  @property (nonatomic, strong) NSDate *startDate;\n@property (nonatomic, assign)\
  \ BOOL isWorkoutActive;\n\n-(IBAction)toggleAudio:(id)sender;\n-(IBAction)nextTrack:(id)sender;\n\
