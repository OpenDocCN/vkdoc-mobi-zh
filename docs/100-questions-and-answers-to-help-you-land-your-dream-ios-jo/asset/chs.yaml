- "# 面向初级开发者的问题\n\n本章提出的问题是关于 iOS 的基础问题。高级开发者应该能够轻松作答，而经验不超过一年的初级开发者，也应了解相关概念。\n\n\
  这绝不是什么圣经。你可以随意选择一个题目，与朋友或同事开始一次非正式的讨论，观察讨论会走向何方。根据讨论的分支情况，运用你自己的判断力和兴趣决定是否继续下一个问题。\n\
  \n## 问题 1：iOS 中的结构体是什么？\n\n结构体是一种命名类型，允许将多个项分组到一个变量中。Swift 中的结构体示例如下：\n\n```\nstruct\
  \ SomeStruct {\nvar name: String\nvar attribute: String\n}\n```\n\n而在 Objective-C\
  \ 中，它看起来像这样：\n\n```\nstruct City {\nNSString *name;\nNSString *attribute;\n};\n\
  ```\n\n可以追问候选人的一个好问题是解释类和结构体的区别，以及它们分别在哪些场景下使用更高效。在 Swift 中，结构体是值类型，而类是引用类型。因此，对于大型对象，结构体会作为值传递，而非引用传递。Swift\
  \ 甚至对 `String` 和 `Array` 对象也使用结构体以提高性能。在以下情况下，使用结构体更可取：\n\n*   目的是封装少量数据值。\n*  \
  \ 该结构不需要继承其他现有类型的值。\n\n## 问题 2：iOS 中的框架是什么？\n\n框架是一个打包成 Bundle 的“骨架”，可供其他应用程序使用和分发。框架可以包含各种各样的额外资源（图像、已本地化的字符串、数据文件、UI\
  \ 对象等）。除非框架已公开发布，否则它通常也包含运行所需的 `.h` 文件。\n\n一个可以深入探讨此主题的好问题是询问候选人框架和库的区别。库可以被定义为可供应用程序链接和使用的一系列功能的集合。框架可以是一个库，一个包含多个库的集合，一系列脚本，或者任何你创建应用所需的东西。它是一个更抽象的概念。如果要求候选人举例，库可以是一个网络库。框架则可以是一个插件管理器或一个\
  \ GUI 系统。\n\n## 问题 3：如何在 iOS 应用中存储信息？\n\niOS 原生提供了几种不同的方式在应用程序中持久化数据。它们包括：\n\n*\
  \   `Keychain`：用于以安全的方式存储敏感数据（常见的例子是登录名和密码）。\n*   `SQLite` 数据库：如果要存储的数据结构复杂或需要大量结构化数据，通常使用\
  \ `SQLite` 数据库是最佳选择。\n*   `Core Data`：这是苹果的持久化框架。它基于对象图来描述需要保存的对象。然后，你可以直接操作这些对象，而框架负责将其保存到数据库中。\n\
  *   `Files`：文件可以直接保存在应用程序内（出于安全原因，应用只能访问其自身的应用容器）。\n*   如果你想深入了解，一个潜在的候选人可能会讨论选择\
  \ `SQLite` 而非 `Core Data` 的原因。例如，一个原因是 `SQLite` 可以在其他平台的不同应用程序之间共享，而 `Core Data`\
  \ 是苹果专有的框架。\n*   `User Defaults`：可用于存储少量数据。典型的例子是运行应用程序所需配置的一部分。`User Defaults`\
  \ 可以持久化 iOS 中的基本数据类型（`String`、`Data`、`Number`、`Date`、`Array` 和 `Dictionary`）。\n\n\
  ## 问题 4：字典是什么？它与其他编程语言中的类似结构有何异同？\n\n字典在一个没有定义顺序的集合中，存储同一类型的键和同一类型的值之间的关联。每个值都与一个唯一的键相关联，该键在字典内充当该值的标识符。它类似于其他语言中所谓的\
  \ `HashMap`，但存在一些细微差别。\n\n## 问题 5：什么是描述文件？\n\n描述文件是一组数字实体的集合，它将开发者和设备唯一地绑定到一个经过授权的\
  \ iPhone 开发团队，并使设备能够用于测试。你必须在希望运行应用程序代码的每台设备上安装一个开发描述文件。\n\n如果你想与候选人进一步讨论，可以询问他/她关于\
  \ iOS 应用程序的签名过程。\n\n## 问题 6：什么是 ARC？\n\n自动引用计数（`ARC`）是一项编译器功能，为你所有的 Objective-C\
  \ 对象提供自动内存管理。无需手动执行保留和释放操作，`ARC` 让你可以专注于代码中更有趣的部分，即对象图以及应用程序中对象之间的关系。\n\n讨论 `ARC`\
  \ 可以转向更有趣的方向。如果候选人展现出扎实的背景，你可能想讨论传统垃圾回收方法之间的区别。对于 `ARC` 而言，它不像其他技术那样，有一个后台进程在运行时去分配对象。\n\
  \n## 问题 7：什么是自动布局？\n\n`Auto Layout` 是开发者通过定义元素之间的关系来创建用户界面的一种方式。它提供了一个灵活而强大的系统，用于描述视图和\
  \ UI 控件如何相互关联。通过使用 `Auto Layout`，你可以获得对布局的极高控制度，拥有广泛的定制选项，从而实现完美的界面。\n\n## 问题 8：在\
  \ iOS 中如何管理依赖项？\n\n与其他平台不同，苹果官方并未提供任何处理 iOS 项目依赖项的方法。作为事实上的标准，`CocoaPods` 在 iOS\
  \ 社区中被广泛使用。项目的依赖项在一个名为 `Podfile` 的文本文件中指定，`CocoaPods` 会用它来解析库之间的依赖关系，获取源代码，然后在 Xcode\
  \ 工作区中将它们链接在一起以构建你的项目。\n\n经验更丰富的候选人肯定会提到 `CocoaPods` 的另一个替代方案，即 `Carthage`，它相当流行，并且是用\
  \ Swift 编写的。\n\n想进一步讨论这个问题吗？那么可以开始一场关于 `Carthage` 与 `CocoaPods` 各自优点的讨论。\n\n## 问题\
  \ 9：如何在 iOS 上进行调试和性能分析？\n\n这是一个非常宽泛的问题，旨在引出候选人的单一回答。为了使讨论更有趣，候选人应该能够讨论 iOS 中的性能分析工具和崩溃日志。如果你的应用程序中存在已知的\
  \ bug，让开发者打开你的环境，看他/她如何浏览各种分析工具（CPU 调试等）会是一个不错的实践。\n\n## 问题 10：iOS 中的 App ID 和 Bundle\
  \ ID 有什么区别？\n\n`Bundle ID` 用于精确标识单个应用程序。`Bundle ID` 字符串必须是统一类型标识符（`UTI`），且只能包含字母数字字符（A–Z，\
  \ a–z， 0–9）、连字符（-）和句点（.）。该字符串应采用反向 DNS 格式。\n\n`App ID` 是一个由两部分组成的字符串，用于标识来自单个开发团队的一个或多个应用程序。该字符串由一个\
  \ `Team ID` 和一个 `Bundle ID` 搜索字符串组成，中间用句点（.）分隔。`Team ID` 由苹果提供，对于特定的开发团队是唯一的，而 `Bundle\
  \ ID` 搜索字符串则由你提供，用于匹配单个应用的 `Bundle ID` 或一组应用程序的 `Bundle ID` 集合。\n\n苹果为何选择如此令人困惑的命名方式，至今无人知晓。\n\
  \n\n\n## 问题 11：代码签名是如何工作的？\n\n代码签名是唯一标识一个应用程序以建立你自己的凭证（使用公私钥对）的过程。所使用的密钥存储在你的 Macintosh\
  \ 电脑本地，当你想在其他工作站上进行开发时，也必须共享该身份标识。\n\n有个老笑话是：“只需 75 步轻松签署你的 iOS 应用的教程”。这个过程并不简单，无论你经验多么丰富，总容易忘记其中一些步骤。然而，开发者应该能够概述该流程的关键步骤。\n\
  \n注意：此流程将来可能会改变，特别是具体步骤。\n\n1.  你必须首先在你的本地计算机上创建一个 CSR 文件。为此，你必须使用钥匙串访问程序来创建 CSR\
  \ 文件。在这个过程中，需要指定一些信息（如通用名称、电子邮件地址、加密类型等）。这个文件必须`安全存储`。\n\n2.  完成这一步后，你必须在你的开发者计划网站上创建一个证书。在流程中的某个时刻，助手会提示你上传之前创建的\
  \ CSR 文件。然后会创建并下载一个证书。双击该证书，它会自动添加到你的钥匙串中。要使用它，此证书必须存在于你的机器上。\n\n## 问题 12：Frame\
  \ 和 Bounds 有什么区别？\n\n在 iOS 中，`UIView` 的 Frame 是一个相对于其父视图位置的假想矩形。另一方面，Bounds 是相对于其自身坐标系的矩形。两者都表示为一个位置，以\
  \ `x`、`y` 为起点，以 `width` 和 `height` 表示大小。\n\n## 问题 13：如何在类型之间进行转换？\n\n对于 Objective-C\
  \ 和 Swift，答案会有所不同。一般来说，由于 Objective-C 是 C 语言的超集，类型转换的工作方式类似。我们可以通过以下方式转换类型：\n\n\
  ```\nint i = (int)42.69f;\n```\n\n在 C 语言中，这种转换会丢失精度。\n\nSwift 中的类型转换稍微复杂一些，但功能强大。我们使用所谓的类型检查运算符（`is`\
  \ 和 `as`）来验证某个变量是否属于特定类型。以下是一个示例：\n\n```\nvar appleCount = 0\nvar orangeCount =\
  \ 0\nfor item in Shop {\n    if item is Apple {\n        appleCount += 1\n    }\
  \ else if item is Orange {\n        orangeCount += 1\n    }\n}\n```\n\n在这个例子中，如果条件满足（item\
  \ 是 Apple 或 Orange），运算符返回 `true`，评估成功，代码将继续执行。请注意，如果要考虑多种类型，情况会变得更复杂。\n\n`as` 运算符非常相似。考虑以下代码片段：\n\
  \n```\nif let _ = item as? Apple ...\nif item is Apple ...\n```\n\n这两者非常相似，但在这种情况下，`as`\
  \ 运算符将转换结果类以供后续使用（通常是这种情况）。\n\n如果你想跟进这个问题，可以询问候选人使用 `as?` 和 `as!` 之间的区别。\n\n## 问题\
  \ 14：你会调用哪个方法来查找对象类型？\n\n同样，根据我们使用的语言，我们有不同的选择。\n\n在 Objective-C 中，我们必须调用以下函数：\n\
  \n```\n[name isKindOfClass:[NSString class]]\n```\n\n而在 Swift 中，我们可以这样做：\n\n```\n\
  if object is String\n```\n\n在 Swift 中，我们还有一堆额外的选项可以帮助我们：\n\n```\ntype(of:)\nisKind(of:)\n\
  isMember(of:)\nconforms(to:)\n```\n\n## 问题 15：`#if` 和 `#ifdef` 有什么区别？\n\n`#if` 的功能类似于普通的\
  \ if 语句。\n\n```\n#if __IPHONE_OS_VERSION_MAX_ALLOWED >= 30200\nif (UI_USER_INTERFACE_IDIOM()\
  \ == UIUserInterfaceIdiomPad) {\n    return YES;\n}\n#endif\nreturn NO;\n```\n\n\
  `#ifdef` 意思是“如果定义了——某个值或宏”。\n\n```\n#ifdef    RKL_APPEND_TO_ICU_FUNCTIONS\n#define\
  \ RKL_ICU_FUNCTION_APPEND(x) _RKL_CONCAT(x, RKL_APPEND_TO_ICU_FUNCTIONS)\n#else\
  \  // RKL_APPEND_TO_ICU_FUNCTIONS\n#define RKL_ICU_FUNCTION_APPEND(x) x\n#endif\
  \ // RKL_APPEND_TO_ICU_FUNCTIONS\n```\n\n## 问题 16：iOS 编译器是什么？\n\n编译器是一个庞大的主题，初级开发人员绝不可能详细解释它们。然而，如果你从事\
  \ iOS 开发，你应该知道在 iOS 中可以使用不同的编译器，并且它们经历了不同的成熟阶段。它们是 `GCC`、带 `Clang` 的 `LLVM` 以及带\
  \ `GCC` 的 `LLVM`。\n\n这个话题可以无限延伸。如果被问及当前的技术现状，知识渊博的候选人会告诉你，简而言之，不再需要 `GCC`，而带 `Clang`\
  \ 的 `LLVM` 是可以满足你所有需求的编译器。也可以给出细节：`LLVM` 编译速度比 `GCC` 快；生成的代码通常更快，并且在编译过程中提供更准确的错误信息。\n\
  \n## 问题 17：如何为生产版本和开发版本保留不同的变体？\n\n这里可以采用不同的方法。一种初始方法可能是创建不同的目标，每个目标使用不同的 `Info.plist`\
  \ 文件。每次选择一个目标时，将使用不同的 `Info.plist`，从而能够区分不同的变量（例如令牌、URL 等）。\n\n也可以考虑使用 Bundle 标识符。定义不同的预处理器宏将控制各种代码块的编译条件。\n\
  \n或者，或者除此之外，你可以将构建配置设置（包括 `Info.plist` 文件的变更位置）放入 `*.xcconfig` 文件中，并在项目的项目、信息和配置区域引用这些文件。然后，你只需更改你的方案就可以构建应用程序的不同版本。将构建配置设置放入文件中对配置控制也有巨大的好处。\n\
  \n## 问题 18：`viewDidLoad` 和 `viewDidAppear` 有什么区别？你会使用哪一个从远程服务器加载数据并将其显示在屏幕上？\n\n\
  `viewDidLoad()` 只在视图控制器首次加载到内存时调用一次。通常，当我们想要实例化变量并构建在视图控制器的整个生命周期中都存活的视图时，我们在这里进行。然而，此时视图还不可见！\n\
  \n`viewDidAppear()` 在视图首次显示到屏幕上时被调用。实际上，在视图控制器的生命周期中，这个方法可能会被多次调用。例如，想象一下，当一个模态视图控制器被加载然后被关闭时。视图已经被加载过了，但它会因此出现两次。在这个方法中，我们通常执行布局相关的操作，比如绘制\
  \ UI、呈现模态屏幕等。\n\n这是你想要实例化任何实例变量并构建在此视图控制器整个生命周期中都存在的任何视图的地方。然而，此时视图通常还不可见。\n\n要回答这个问题，你应该在\
  \ `viewDidLoad` 方法中从远程服务器加载数据。这样，数据只加载一次，而不是每次视图出现时都加载。\n\n为了跟进，你可以询问候选人，在 `viewDidAppear`\
  \ 中保留内容会有什么影响。影响是，如果在视图消失后这些内容没有被释放，很可能会发生内存泄漏。\n\n## 问题 19：你如何跟踪 Bug？你选择什么工具？\n\
  \n这里，候选人会想谈谈他/她可能已经知道的工具选择。可以列举一些（不暗示对任何特定公司的认可），例如 Apteligent（原 Crittercism）、Crashlytics/Fabric、HockeyApp，或者苹果平台本身（应用分发后，你可以在\
  \ iTunes Connect 中看到崩溃报告）。\n\n\n\n## 问题 20: 什么是 NSUserDefaults？\n\n`NSUserDefaults`\
  \ 是一个允许开发者保存应用程序或用户数据相关设置、属性和信息的类。`NSUserDefaults` 存储键及其关联值。可以使用 `NSUserDefaults`\
  \ 存储以下类型：\n\n*   `NSData`\n*   `NSString`\n*   `NSNumber`\n*   `NSDate`\n*   `NSArray`\n\
  *   `NSDictionary`\n\n这里可能的后续问题如下：iOS 中与其他存储机制有何区别？是否可以用 `NSUserDefaults` 存储图片？答案是肯定的。图像可以转换为\
  \ Base64 并作为 `NSString` 存储。另一个问题是，这是否是使用 `NSUserDefaults` 的有效方式。\n\n通常，应该引导候选人讨论使用\
  \ `NSUserDefaults` 相对于其他存储类型的优缺点。\n\n## 问题 21: 你如何测试代码？如何使代码可测试？\n\n这些也是重要的问题，可以引出许多有趣的讨论，我们希望借此了解候选人的思维方式及其理论知识。一个相关的讨论可以是手动测试和自动化测试的好处。每种测试类型都有不同的优缺点。让我们谈谈自动化测试。\n\
  \n*   测试可以运行得相当快，因为不需要人工干预。\n*   如果能合理利用自动化工具，它们可能具有成本效益。短期内可能成本较高，但从长远来看肯定会降低成本。\n\
  *   每个人都能看到结果。测试可以重现、记录和保存。\n*   另一方面，工具可能有局限性，我们可能会受到测试工具或 API 开发的限制。\n\n手动测试也有其自身的优缺点。\n\
  \n*   短期内，它降低了成本。\n*   它更有可能发现真实的用户问题。因为自动测试是自动化的，它们不会测试特殊的边缘用例或即兴测试脚本中未提供的内容。\n\
  *   另一方面，有些任务可能很难手动执行，最坏的情况是重复、枯燥且毫无激励性。\n\n也可以向候选人提问：你使用哪些测试框架？`XCTest` 与 `Xcode`\
  \ 紧密集成，因此大多数开发人员至少应该对该框架有最低限度的理论了解。其他测试框架包括 `Appium` 和 `Calabash`。为了深入探讨，你可以讨论每个框架的优缺点。这可能是将候选人的知识与公司知识对齐的便捷方式，尽管雇佣候选人不应仅仅基于他/她掌握的框架知识，而应基于他/她的总体态度和推理能力。今天的框架明天可能就在博物馆里了。\n\
  \n最后，关于这个话题一个有趣的讨论是如何使代码可测试。创建可测试代码的原则总是能引发有趣的对话，其中 `SOLID` 原则是一个很好的起点。\n\n## 问题\
  \ 22: atomic 和 nonatomic 属性之间有什么区别？合成属性的默认行为是哪个？你会在何时使用其中之一？\n\n`atomic` 是默认行为。一个\
  \ `atomic` 属性将确保在另一个进程访问该变量之前，当前进程由 CPU 完成。显然，这并不快，因为它要确保进程完全完成。\n\n另一方面，`nonatomic`\
  \ 行为不是默认行为。对于合成代码（即使用 `@property` 和 `@synthesize` 创建的变量）来说它更快。它们不是线程安全的，当两个不同的进程同时访问同一个变量时，使用它们可能会导致意外行为。\n\
  \n## 问题 24: 你追踪和修复内存泄漏的过程是什么？\n\n处理这个问题的最佳方法是向候选人提供一个现有项目和一个已知的内存泄漏，并要求他/她进行调试。\n\
  \n## 问题 25: 标准 iOS 工具集包含哪六种工具？\n\n其中，候选人应该能说出以下工具的名称：`Leaks`、`Multicore`、`Time Profiler`、`Zombies`、`System\
  \ Usage`、`UI Recorder`、`Activity Monitor`、`Allocations`、`Core Animation`。\n\n作为后续，每个工具的功能和特性是深入探讨的好话题。\n\
  \n## 问题 26: 我如何向应用添加资源？\n\n在资源组下，只需将文件拖入其中并选择“为任何添加的文件夹创建文件夹引用”。这样，文件就会自动添加。\n\n\
  ## 问题 27: 什么是 blocks？\n\n`blocks` 是添加到 C、Objective-C 和 C++ 中的语言级别特性，它允许您创建不同的代码段，这些代码段可以像值一样传递给方法或函数。\n\
  \n`blocks` 是 Objective-C 对象，这意味着它们可以添加到 `NSArray` 或 `NSDictionary` 等集合中。它们还能够从封闭作用域捕获值，这使得它们类似于其他编程语言中的闭包或\
  \ `lambda` 表达式。\n\n愿意深入探讨这个主题的候选人也可以说，Swift 中等效于 `blocks` 的是 `closures`。`closures`\
  \ 是一等对象，因此可以嵌套和传递（就像 Objective-C 中的 `blocks` 一样）。在 Swift 中，函数只是 `closures` 的一个特例。\n\
  \n## 问题 28: 如何插入一个在发布构建中会被禁用的合理性检查？\n\n你可以使用一个仅在调试构建中运行的断言代码。以下代码片段是一个示例：\n\n```\n\
  #if defined(NDEBUG)\n{\n// The assertion code below should be compiled out of existence\
  \ in a release\n// build.  Log an error and abort the program if it is not.\nbool\
  \ ok = true;\nNSCAssert(ok = false, @\"NS assertions should be disabled but are\
  \ not\");\nif (!ok)\n{\nNSLog(@\"Detected release build but NS_BLOCK_ASSERTIONS\
  \ is not defined\");\nreturn -1;\n}\n}\n#endif\n```\n\n## 问题 29: 在 Swift 中，何时适合使用\
  \ let 和 var？\n\n`let` 关键字定义一个常量。\n\n```\nlet theAnswer = 42\n```\n\n之后 `theAnswer`\
  \ 不能被更改。这就是为什么任何可选或弱引用的东西都不能用 `let` 来写。前者必须在运行时更改，必须使用 `var` 来写。\n\n`var` 定义一个普通变量。\n\
  \n```\nvar president = \"Lincoln\"\n```\n\n## 问题 30: 什么是协议，如何定义你自己的协议，何时使用它？\n\n\
  协议是一种指定一组方法的方式，如果一个类想要与你的某个类一起工作，就需要实现这些方法。委托和数据源，如 `UITableViewDelegate` 和 `UITableViewDataSource`，确实是协议。\n\
  \n```\n@protocol MyProtocol \n- (void)aRequiredMethod;\n@required\n- (void)anotherRequiredMethod;\n\
  @optional\n- (void)anOptionalMethod;\n@end\n```\n\n`@required` 指定该方法*必须*实现，而 `@optional`\
  \ 让开发者决定。\n\n然后，你可以在类的接口中指定一个类“符合”某个协议（即实现了所需的方法），如下所示：\n\n```\n@interface MyClass\
  \ \n@end\n```\n\n\n\n## 问题 31：什么是 MVC，它在 iOS 中是如何实现的，它是否有替代方案？\n\nMVC 是一种众所周知的设计模式，它定义了每个组件必须如何实现、组件之间如何通信以及每个功能必须驻留在何处。默认情况下，Apple\
  \ 提供了 MVC 模式的实现：`UIView` 是承载用户界面的视图；`UIViewController` 支持控制器，控制器监听事件，因此可以根据我们的需要更新视图；模型是应用程序使用的数据，可以驻留在我们为存储有用信息而创建的任何对象中。\n\
  \nMVC 有很多替代方案。一个常见的方案是结合使用 MVVM 和 Reactive Cocoa。其他替代方案可能包括 Viper 和使用函数式响应式代码。\n\
  \n一个经验丰富的候选人会告诉你模式和架构之间的区别。广义上说，模式是解决计算机科学领域中反复出现问题的模型，而架构是一组规则和组织方式，它定义了代码必须如何构建才能可维护和可扩展。\n\
  \n## 问题 32：在 UIView 中指定元素布局有哪些不同的方式？\n\n在 iOS 应用中有几种不同的技术来指定布局。\n\n*   我们可以使用 `InterfaceBuilder`\
  \ 向项目中添加一个 XIB 文件。之后，可以从我们的应用程序代码中加载这个 XIB 文件。`InterfaceBuilder` 也允许我们创建故事板。\n*\
  \   你可以编写自己的代码来使用 `NSLayoutConstraint`，让视图中的元素通过自动布局进行排列。\n*   你可以创建描述每个元素确切坐标的\
  \ `CGRect`，并将它们传递给 `UIView` 的 `- (id)initWithFrame:(CGRect)frame` 方法。\n\n## 问题 33：使用\
  \ NSString 打印格式化消息时使用什么格式代码？\n\n你会使用以下格式：\n```\nNSLog(@\"Message == %@\", msg);\n\
  ```\n\n"
- '# 针对已有一定 iOS 工作经验的候选人的问题


  以下章节包含的问题针对的是经验非常丰富的开发者，通常具有一、两或三年的经验。他们对 SDK 和大多数用于 iOS 开发的库感到舒适和熟悉。他们可能一直在为自己的
  iOS 开发框架或架构工作，并且能够识别复杂问题并为其提供解决方案。


  ## 问题 34：iOS 上是如何处理内存管理的？


  每个在 iOS 开发领域工作过一段时间的开发者都应该能从容地谈论这个话题。对内存管理了解不足可能导致内存泄漏、性能低下以及经理、投资者、开发者和用户感到失望。


  回答可以从指出 Swift 使用自动引用计数（`ARC`）开始，这本质上与 Objective-C 中的相同。默认情况下，所有引用都是强引用。因此可能出现强引用循环，这使得
  `ARC` 无法释放内存。这可以通过使用弱引用来解决。


  这个话题可以扩展到讨论无主引用。无主引用用于那些期望永远不为 `nil` 的值，因此必须定义为非可选类型。


  此外，讨论的另一个可能方面是关于闭包。


  ## 问题 35：你对单例了解多少？你会在哪里使用单例，在哪里不会？


  单例就是一个只允许一个实例的类。你不能重新创建单例类的实例。


  互联网上反复出现的一个原因是“日志记录”类。在这种情况下，可以使用单例来代替类的单个实例，因为日志记录类通常必须被项目中的每个类一遍又一遍地使用。


  ## 问题 36：你通常如何进行网络请求？


  这个话题会非常有趣，并能揭示开发者方法论的许多见解。开发者应该提到他/她使用过的架构和依赖的模式。这些可能包括服务层、MVVM、UI 数据绑定、依赖注入或函数式响应式编程。


  开发者使用哪些库？开发者有不同的背景，可能使用 `AFNetworking`、`ReactiveCocoa`……他/她如何确保可以从网络保存数据？从用户点击 UI
  组件到数据存储在设备本地，这个过程是怎样的？所选架构中涉及哪些类？开发者如何为离线使用准备应用程序，他/她如何处理缓存？他/她如何定义移动设备的理想 API？他/她是否了解所有的
  HTTP 方法（`PUT`、`POST`、`GET`、`DELETE`），以及何时及如何使用它们？


  对于上述问题，没有正确/错误的答案。相反，它们提供了一个与经验丰富的潜在同事讨论方法的绝佳机会，通过比较你自己的流程与潜在雇主的流程，这些方法也可能对你有益。


  ## 问题 37：你如何从 Web 服务器下载 JSON，将其序列化并保存在本地存储中？


  这个问题部分源于前一个问题。在这里，开发者可以谈论可以使用的框架。`NSJSONSerialization` 是 Apple 提供的框架，但它有一些 bug 和限制。特别是在数据验证和转换方面存在一些问题。


  一个更好的答案是提到第三方库（比如想到 `ObjectMapper` 或 `Mantle`）。此外，讨论如何在逻辑上将 JSON 到逻辑实体以及逻辑实体到存储的过程分离也是相关的。


  ## 问题 38：你在 iOS 中了解并使用哪些设计模式？


  每位接受面试的开发者都应该了解 MVC。这是 iOS 构建的基础范式。开发者资历越深，他/她能讨论的框架就越多。这里，你可以包括 MVVM，它有助于开发者防止出现臃肿的视图控制器。此外，开发者可以解释不同框架的差异和优缺点。


  ## 问题 39：你如何处理异步任务？


  为了处理异步任务，iOS 提供了一种称为 Grand Central Dispatch 的机制。要使用它，你必须创建一个队列（在此上下文中，这类似于一个线程）并传递一个代码块给
  `dispatch_async()`，以便在后台执行。


  然而，在 iOS 中还可以使用其他几种机制。


  *   回调

  *   全局队列

  *   内存

  *   多个任务/代码块


  开发者可能想讨论每种替代方案何时使用及其优缺点。


  ## 问题 40：什么是托管对象上下文，它提供什么样的功能？


  托管对象上下文由 `NSManagedObjectContext` 类的一个实例表示。可以将托管对象上下文理解为一组相关对象的临时便笺本。这组对象代表了一个或多个持久化存储的一致视图。一个托管对象实例只存在于一个且仅一个上下文中，但一个对象的多个副本可以存在于不同的上下文中。


  托管对象上下文提供的关键功能包括：


  *   生命周期管理

  *   通知

  *   并发




  ## 问题 41: 你能比较并对比在 OS X 和 iOS 中实现并发的不同方法吗？


  在 iOS 中，基本上有三种实现并发的方式。


  *   使用线程

  *   调度队列

  *   操作队列


  如果你能识别出所有这些方法，可能还需要讨论它们的各个方面和区别。线程的一个问题是，设计一个可扩展系统的责任在于开发者。她/他必须决定创建多少个线程，并负责在变化条件下手动调整这个数量。


  使用 `GCD` 时，这个管理责任被委托给了系统层面。开发者的责任仅仅是定义必须执行的任务并将其添加到调度队列中。这通常能让事情变得更容易。


  操作队列是 Cocoa 中并发调度队列的等价物，由 `NSOperationQueue` 类实现。与调度队列不同，操作队列不限于以 `FIFO`（先进先出）顺序执行任务，并且支持为你的任务创建复杂的执行顺序图。


  ## 问题 42: iOS 中有哪些不同的后台模式？


  以下是 iOS 中可用的后台模式：


  *   `播放音频`：应用能够在后台播放音频。

  *   `位置更新`：设备位置每次发生变化时触发回调。

  *   `执行有限长度的任务`：这是 iOS 中“后台运行”的一般情况，应用在后台运行并执行一个操作。

  *   `IP 语音 (VoIP)`：应用在后台运行并执行 `VoIP`。


  ## 问题 43: 你能列举并解释 iOS 应用程序的不同状态类型吗？


  ![../images/475684_1_En_2_Chapter/475684_1_En_2_Fig1_HTML.jpg](img/475684_1_En_2_Fig1_HTML.jpg)


  图 2-1

  iOS 应用生命周期


  *   `未运行`：应用尚未启动，或正在运行但被系统终止。

  *   `未激活`：应用在前台运行，但当前未接收事件。（不过，它可能正在执行其他代码。）应用通常只在此状态停留很短暂的时间，然后会过渡到其他状态。

  *   `激活`：应用在前台运行并正在接收事件。这是前台应用通常所处的模式。

  *   `后台`：应用在后台并正在执行代码。大多数应用在进入挂起状态之前会短暂进入此状态。然而，一个请求额外执行时间的应用可能会在此状态停留一段时间。此外，直接启动进入后台的应用会进入此状态，而不是未激活状态。关于如何在后台执行代码的信息，请参见后台执行
  [`developer.apple.com/library/archive/documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/TheAppLifeCycle/TheAppLifeCycle.html`](https://developer.apple.com/library/archive/documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/TheAppLifeCycle/TheAppLifeCycle.html)
  。

  *   `挂起`：应用在后台但未执行任何代码。系统会自动将应用移到此状态，并且在此操作之前不会通知它们。在挂起期间，应用保留在内存中但不执行任何代码。当出现内存不足的情况时，系统可能会在不通知的情况下清除挂起的应用，以便为前台应用腾出更多空间。


  ## 问题 44: copy 和 retain 之间有什么区别？


  在一般情况下，保留一个对象会使其保留计数增加一。这有助于将对象保留在内存中，防止它被释放。这意味着，如果你只持有一个对象的保留版本，那么你是与传递该对象给你的人共享那个副本。然而，复制一个对象（无论你如何操作）应该会创建一个具有相同值的另一个对象。可以将其视为一个克隆。你不会与传递对象给你的人共享这个克隆。特别是在处理
  `NSString` 时，你可能无法假设给你 `NSString` 的人真正给你的是 `NSString`。某人可能递给你一个子类（在这种情况下是 `NSMutableString`），这意味着他们可能在你不知情的情况下修改其值。如果你的应用程序依赖于传入的值，并且有人更改了它，你可能会遇到麻烦。


  ## 问题 45: 在 ARC 下，什么能强制一个对象被销毁？


  只需将引用这些对象的变量设置为 `nil`。编译器就会在那一刻释放这些对象，如果没有其他强引用指向它们，它们就会被销毁。


  ## 问题 46: 在 nil 指针上调用方法会发生什么？


  在 Objective-C 中，向 `nil` 对象发送消息是完全可接受的。它被视为一个空操作。无法将其标记为错误，因为它本身不是错误。实际上，这可能是该语言的一个非常有用的特性。


  ## 问题 47: 什么时候必须合成属性？


  当它们在协议中声明时。


  ## 问题 48: 什么是 NSAssert？


  `NSAssert` 函数用于确保某个值符合预期。如果断言失败，这意味着出现了错误，因此应用程序会退出。使用 `NSAssert` 的一个原因是，如果你有一个函数，当传递给它的某个参数不是某个特定值（或一个范围内的值）时，该函数的行为会异常或会产生非常糟糕的副作用。在这种情况下，你可以放置一个
  `NSAssert`，以确保该值符合你的预期。如果不符合，说明确实出了问题，因此应用程序退出。`NSAssert` 对于调试/单元测试非常有用，也可以在你提供框架时，用于阻止用户进行“有害”操作。


  ## 问题 49: iOS 中的 Category 是什么？


  Objective-C 的类别允许你用你认为合适的任何方法来扩展现有类。这对于向其他类添加辅助方法非常有用，这些方法帮助以该类原本未预期的方式解析数据。你也可以用它来拆分你自己的类，这样，如果你有一个完成多项任务的庞大全能类，你可以只引入那些类别，从而仅选择你需要的部分。


  ## 问题 50: 你可以用什么来向 NSString 添加一个新方法？


  与前一个问题相关，答案将是类别。要向 `NSString` 添加一个新方法，答案将是使用类别。例如：


  ```

  @interface NSString (CategoryName)

  -(NSString *) aNewMethod;

  @end

  ```




  '
- '# 问题 51：在编写 UI 时，你更倾向于使用 XIB 文件、Storyboards 还是通过代码编程创建 UIView？


  支持不同模型的观点都有。假装拥有一个确切的答案是自大的。相反，这个问题的目的是与候选人讨论他/她**偏好**某一种方式（或哪种场景更适合它们）的思考过程和理由。一个可能的答案可以关联到每种机制的优缺点，例如：


  ### XIB 文件的优点


  *   可以快速搭建 UI。

  *   为屏幕数量极少的小型应用提供了直接简单的实现方式。

  *   可以为不同的本地化（例如，语言或国家）创建单独的 XIB 文件。

  *   非常擅长布局元素和直观地发现未对齐问题。便于对布局进行细微调整。


  ### XIB 文件的缺点


  *   在团队环境中工作时，合并冲突很困难（难以进行差异比较、合并和阅读）。

  *   高度动态的视图无法用 XIB 来描述。

  *   从性能角度看，它们比通过代码创建视图慢，因为 XIB 必须从磁盘读取并进行解析。

  *   XIB 缺少一些你可以在代码中完成的定制，例如 Quartz 效果（阴影、圆角）。

  *   更难调试（例如，如果你在 Interface Builder 中忘记建立连接或建立了错误的连接）。


  ### Storyboards 的优点


  *   Storyboards 适用于屏幕数量少到中等、视图间导航需求相对直接的应用。

  *   你可以在几乎不写代码的情况下，模拟出应用程序的流程。


  ### Storyboards 的缺点


  *   Storyboards 不兼容 iOS 5 之前的系统，因此无法支持 iOS 4.3。

  *   在团队环境中很难并行工作，因为每个人都在修改同一个文件。

  *   同样地，在 GIT 中合并冲突的 storyboards 会非常痛苦。

  *   使用 storyboards 时，人们曾遇到 Xcode 的 bug（例如，由于不一致而不得不频繁清理 `DerivedData` 文件夹）。


  ### 编程创建视图的优点


  *   相比 XIB 文件，合并冲突和对比代码行更容易。

  *   在调试时可以跟踪代码，而不必查看 Interface Builder。

  *   从性能角度看，它提供了比 XIB 更快的视图创建速度。

  *   通过代码创建视图给你更多的控制权和自由度。


  ### 编程创建视图的缺点


  *   如果你的所有 UI 创建代码没有集中在一个地方，那么就更难直观地想象 UI，并在脑海中形成它最终的样子。

  *   你不能直观地放置元素，这使得布局视图更耗时。

  *   项目团队的新成员需要更长的时间来理解应用程序的流程和导航。


  '
- '# 问题 52：你会如何在设备上离线安全地存储用户的私有数据？还应采取哪些其他安全最佳实践？


  这些问题没有标准答案，但它们是了解一个人对 iOS 安全研究深入程度的绝佳方式。特别是如果面试的是银行或其他安全至关重要的机构，这类问题是必然会遇到的。对于答案我没有严格的准则，但至少应该讨论以下几个主题：


  *   如果数据极度敏感，就绝不应该离线存储在设备上，因为所有设备都是可以被破解的。

  *   钥匙串（Keychain）是安全存储数据的一种选择。然而，其加密是基于设备的 PIN 码的。系统并不强制用户设置 PIN 码，因此在某些情况下，数据甚至可能根本没有加密。此外，用户的
  PIN 码可能很容易被破解。

  *   更好的解决方案是使用像 SQLCipher 这样的工具，它是一个完全加密的 SQLite 数据库。加密密钥可以由应用程序强制执行，并与用户的 PIN 码分离。

  *   只通过 SSL/HTTPS 与远程服务器通信。

  *   如果可能，在应用程序中实施证书锁定（certificate pinning），以防止在公共 Wi-Fi 上受到中间人攻击。

  *   通过覆写的方式清除内存中的敏感数据。

  *   确保所有对提交数据的验证也在服务器端运行。


  '
- '# 问题 53：你用过 NSOperationQueue 吗？你能解释一下它吗？


  在 iOS 中实现并发操作的一种方式是使用 `NSOperation` 和 `NSOperationQueue` 类。`NSOperationQueue` 管理操作的并发执行。它充当一个优先级队列，使得操作大致按照先进先出（FIFO）的方式执行，优先级更高（`NSOperation.queuePriority`）的操作可以跳到优先级较低的操作前面。`NSOperationQueue`
  还可以使用 `maxConcurrentOperationCount` 属性来限制在任何给定时刻执行的最大并发操作数。


  '
- '# 问题 54：你会如何将一个数组序列化到磁盘？


  需要使用的关键类是一个名为 `NSCoder` 的抽象类，以及一个名为 `NSCoding` 的协议。这两者一起设计用来标准化将类与序列化数据格式相互转换的过程。如果你曾经使用过
  NIB 文件或 storyboards，你可能已经以某种形式接触过 `NSCoding`，因为 `NSCoding` 是 Cocoa 用来从 NIB 加载视图和视图控制器的底层机制。


  '
- '# 问题 55：instancetype 是如何工作的，它有什么用处？


  `instancetype` 是一个上下文相关的关键字，可以用作返回类型，表示一个方法返回一个相关的结果类型。例如：


  ```

  @interface Person

  + (instancetype)personWithName:(NSString *)name;

  @end

  ```


  为了评估候选人的学习曲线，一个后续问题可能是讨论使用 `instancetype` 和 `id` 之间的异同。与 `id` 不同，`instancetype`
  只能在方法声明中用作结果类型。


  '
- '# 问题 56：反射（reflection）这个术语是什么意思？


  反射指的是能够检查自身或系统中其他代码的代码。Objective-C 具有反射功能（以及抽象类）。对候选人的后续问题可以是：**什么时候反射适合我们的需求？**


  '
- '# 问题 57：层对象（layer objects）是什么，它们代表什么？


  层对象是表示视觉内容的数据对象。视图使用层对象来渲染其内容。也可以向界面中添加自定义层对象，以实现复杂的动画和其他类型的复杂视觉效果。


  '
- '# 问题 58：在 Swift 枚举中，原始值（raw values）和关联值（associated values）有什么区别？


  原始值用于枚举中每个 case 都由一个编译时设定的值表示的情况。它们类似于常量，例如：


  ```

  enum E: Int {

  case A  // 如果不指定，基于 IntegerLiteralConvertible 的枚举从 0 开始

  case B

  }

  ```


  在这个例子中，`A` 的值将是 `0`，而 `B` 的值将是 `1`。


  关联值更像是变量，与枚举的某个 case 相关联。


  ```

  enum E {

  case A(Int)

  case B

  case C(String)

  }

  ```


  '
- '# 问题 59：@synthesize 是做什么的？


  `@synthesize` 为变量创建 getter 和 setter 方法。这允许你为变量指定一些属性，当你使用 `@synthesize` 将该属性合成到变量时，你就生成了该变量的
  getter 和 setter。


  属性名可以和变量名相同。有时人们希望它们不同，以便在 `init` 或 `dealloc` 方法中使用，或者当参数与变量同名传递时使用。




  ## 问题 60：Swift 中有哪些集合类型？


  在 Swift 中，集合类型有两种：`Array` 和 `Dictionary`。


  *   `Array`：你可以创建一个单一类型的数组或包含多种类型的数组。Swift 通常更倾向于前者。

  *   要访问数组元素，必须使用下标，例如 `println(CardNames[0])`。

  *   `Dictionary`：这类似于其他编程语言中的哈希表。字典允许你存储键值对，并通过提供键来访问对应的值。


  ```

  var cardName : [String] = [ "Robert" , "Lisa" , "Kevin"]

  ```


  ```

  var cards = [ "Robert": 22, "Lisa" : 24, "Kevin": 26]

  ```


  ## 问题 61：Swift 中的自定义运算符是什么？


  当你需要一个全新的运算符时（通常是因为其功能非常独特，以至于现有的任何运算符都不适用），Swift 中的自定义运算符就派上用场了。接下来，一个有趣的问题是向潜在的候选人提问：Swift
  中存在哪些类型的自定义运算符？他/她应该能够列出以下几种：


  *   `Prefix`（前缀）：一种一元运算符（操作一个值），位于其操作数的*前面*。

  *   `Postfix`（后缀）：一种一元运算符，位于其操作数的*后面*。

  *   `Infix`（中缀）：一种二元运算符（操作两个值），位于其两个操作数*之间*。


  作为编码练习，候选人可以为特定问题编写自定义运算符。


  ## 问题 62：在使用代码块（Blocks）时，你需要注意哪些问题？


  在特定情况下，iOS 中的代码块（Blocks）可能会引入循环引用（retain cycles）。尤其是在捕获 `self` 时，如果未能避免强引用循环，就很可能发生这种情况。


  ## 问题 63：什么是 iOS 扩展（extension）？


  Swift 扩展主要为现有类型（类、结构和枚举）添加方法，只是有几种不同的“风味”。


  以下代码为 `UIColor` 类创建了一个扩展。请注意，这里使用的关键字是 `extension`，而不是 `class`、`struct` 或 `enum`。


  ```

  extension UIColor: ImportantProtocol, MoreImportantCustomProtocol {

  }

  ```


  ## 问题 64：什么是应用程序沙盒（sandboxing）？


  应用程序沙盒是 OS X 中提供的一种访问控制技术，在内核级别强制执行。其设计目的是，如果应用程序受到威胁，可以将损害限制在系统和用户数据范围内。通过 Mac
  App Store 分发的应用必须采用应用程序沙盒。使用开发者 ID 在 Mac App Store 外部签名和分发的应用也可以（并且在大多数情况下也应该）使用应用程序沙盒。


  出于安全原因，iOS 会在安装时将每个应用程序（包括其偏好设置和数据）置于一个沙盒中。沙盒是一组精细的控制机制，用于限制应用程序对文件、偏好设置、网络资源、硬件等的访问。作为沙盒化过程的一部分，系统将每个应用程序安装在其独立的沙盒目录中，该目录充当应用程序及其数据的主目录。


  ## 问题 65：如何为 iPad 和 iPhone 开发应用程序？


  如果你在创建新项目时选择设备族（Device family）为通用（universal），你将获得为 iPhone 和 iPad 准备不同 XIB 文件或故事板（storyboards）的选项。在代码层面，你可以检查设备类型，或者在分配资源时使用适当的命名。


  在运行时，你可能希望根据设备是 iPhone 还是 iPad 来加载不同的资源。从编程代码的角度，你可以按以下方式操作（使用 Swift）：


  ```

  switch UIDevice.currentDevice().userInterfaceIdiom {

  case .Phone:

  // 这是 iPhone

  case .Pad:

  // 这是 iPad

  case .Unspecified:

  //

  }

  ```


  ## 问题 66：iOS 中有哪些不同的后台模式？


  *   `播放音频`：应用程序可以在后台继续播放和/或录制音频。

  *   `接收位置更新`：当设备位置变化时，应用程序可以持续获得回调。

  *   `执行有限时长任务`：这是通用的“任何情况”模式，应用程序可以在后台运行任意代码，但有时间限制。

  *   `处理 Newsstand Kit 下载`：专属于报刊杂志（Newsstand）应用，应用程序可以在后台下载内容。

  *   `提供 VoIP 服务`：应用程序可以在后台运行任意代码。当然，苹果会限制其使用，因此你的应用也必须提供 VoIP 服务。


  '
- '# 3. 我们需要那个人来共同成就伟业！


  本章专门针对高级 iOS 工程师——通常是那些拥有多年经验，并且在大量需求各异的项目中工作过的工程师。请记住，经验必须与实际的分析和问题解决能力相结合。例如，雇主不会希望雇佣一个仅仅读过这本书并将其背下来的候选人。


  特别是对于本章的问题，你应该鼓励讨论和意见交流。有时，对于实时问题只有一个解决方案，而大多数方案都涉及权衡取舍。你可能需要在代码可用性方面获得优势，而在性能方面做出妥协，等等。


  高级开发人员还需要具备领导团队所需的领导力和激励技巧。本书不涉及识别这些技能的可能问题或方法，但我相信读者对于如何识别这些已有一定的想法。高级开发人员在讨论任何话题时都应该从容自信，并且能够接受变化。他们身上应有一种创业精神。他们是促进者而非老板，应该鼓励独立思考和自由思想。


  ## 问题 67：委托（delegation）和 KVO 有什么区别？


  两者都是在对象间建立关系的方式。委托是一种一对一关系，其中一个对象实现一个委托协议，另一个对象使用该协议并发送消息，假设那些方法已被实现，因为接收者承诺遵守该协议。KVO
  是一种多对多关系，其中一个对象可以广播消息，一个或多个其他对象可以监听并对其作出反应。


  ## 问题 68：什么是方法交换（method swizzling）？你会在什么时候使用它？


  方法交换是改变现有选择器实现的过程。这种技术之所以可行，是因为在 Objective-C 中，可以通过改变类调度表中选择器与底层函数的映射关系，在运行时改变方法调用。


  例如，假设我们想跟踪 iOS 应用中每个视图控制器向用户展示的次数。每个视图控制器都可以在自己的 `viewDidAppear:` 实现中添加跟踪代码，但这会产生大量重复的样板代码。子类化是另一种可能，但这需要子类化
  `UIViewController`、`UITableViewController`、`UINavigationController` 以及其他每个视图控制器类——这种方法同样会面临代码重复的问题。


  ## 问题 69：假设有三个对象：祖对象、父对象和子对象。祖对象持有父对象，父对象持有子对象，子对象又持有父对象。如果祖对象释放了父对象，会发生什么？


  会发生循环引用。因为它们相互持有，所以无法将它们从内存中释放。可以通过将其中一个引用设为弱引用来解决这个问题。




  ## 问题 70：为什么在产品代码中永远不应使用`retainCount`？请给出两个独立且相互不依赖的原因。


  你永远不应使用`-retainCount`，因为它从未提供任何有用信息。Foundation 和 AppKit/UIKit 框架的实现是不透明的。你不知道什么正在被保留、为什么被保留、谁在保留它、它何时被保留等等。以下是何时会用到`-retainCount`的例子：

  * `[NSNumber numberWithInt:1]` 现在的 `retainCount` 是 9223372036854775807。如果你的代码期望它是
  2，那么你的代码现在已经出错了。

  * 你可能认为 `@"Foo"` 的 `retainCount` 是 1。但事实并非如此，它是 1152921504606846975。

  * 你可能认为 `[NSString stringWithString:@"Foo"]` 的 retainCount 是 1。但事实并非如此，同样是 1152921504606846975。


  基本上，因为任何东西都可以保留一个对象（从而改变其`retainCount`），并且因为你无法获得运行应用程序的大多数代码的源代码，所以一个对象的`retainCount`是毫无意义的。如果你试图追踪为什么一个对象没有被释放，请使用
  Instruments 中的 leaks 工具。如果你试图追踪为什么一个对象过早被释放，请使用 Instruments 中的 zombies 工具。但不要使用`-retainCount`。它是一个真正毫无价值的方法。


  ## 问题 71：自动释放池在运行时层面是如何工作的？


  每次向一个对象发送`-autorelease`消息时，该对象会被添加到最内层的自动释放池中。当池被排空（drained）时，它只是向池中的所有对象发送`-release`消息。

  自动释放池只是一种便捷机制，允许你将发送`-release`的操作推迟到“稍后”。这个“稍后”可能发生在几个地方，但在 Cocoa GUI 应用程序中最常见的是在当前运行循环（run
  loop）周期结束时。


  ## 问题 72：遍历 NSArray 和 NSDictionary，哪个更快？


  当集合中项目的顺序不重要时，集合（set）在查找集合中的项目时提供了更好的性能。原因是集合使用哈希值来查找项目（就像字典一样），而数组必须遍历其全部内容才能找到特定对象。

