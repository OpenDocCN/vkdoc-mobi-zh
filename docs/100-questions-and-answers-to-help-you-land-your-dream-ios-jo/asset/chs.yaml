- '# 问题 86：如何使一段代码片段具备线程安全性？


  你可以使用 `@synchronized` 关键字。这将自动使其具备线程安全性。


  有一种非常有趣的方法可能很少有工程师熟悉，如果候选人能提到它，那他/她绝对很在行：那就是使所有对象都不可变，这样它们就无法被修改。


  '
- '# 问题 87：为什么我们应该在 viewDidUnload 中释放 outlets？


  `viewDidUnload` 严格用于释放具有 retain 属性的 `IBOutlet`。原因与 `UIViewController` 有一个它持有的 view
  属性有关。该 view 属性本身持有对其所有子视图的引用。这些子视图正是你在这些 outlet 属性中持有的。问题在于这些子视图有一个“额外”的 retain。


  `-viewDidUnload` 的目标是清理不必要的内存使用。当调用 `-viewDidUnload` 时，view 属性已经被释放，从而释放了顶层的 `UIView`
  及其所有子视图。然而，由于我们持有了其中一些子视图，它们会滞留在内存中，而我们想要释放它们，因为它们将不再被使用。当（如果）视图重新加载时，将创建这些子视图的新副本。严格来说，属性也会被设置为
  `nil`，这样我们就不会让指针指向已释放的内存。


  '
- '# 问题 88：浅拷贝（shallow copy）和深拷贝（deep copy）有什么区别？


  浅拷贝尽可能少地复制内容。集合的浅拷贝是复制集合的结构，而不是元素。使用浅拷贝，两个集合现在共享各个元素。


  深拷贝复制所有内容。集合的深拷贝是两个集合，其中包含原始集合中所有元素的副本。


  '
