- '# 问题 85：应用在 App Store 中被拒绝的常见原因有哪些？


  我特别喜欢这个问题，尽管它不是技术性的。一个在 iOS 开发领域待了一段时间的人很可能经历过几次应用被拒的情况。从这些经历中，你可以从候选人那里引出有趣的故事，并分析他/她如何应对和解决这些问题。


