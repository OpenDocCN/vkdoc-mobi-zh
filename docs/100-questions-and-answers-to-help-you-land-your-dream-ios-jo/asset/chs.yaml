  ## 问题 73：遍历 NSArray 和 NSSet，哪个更快？


  对于简单的持有和遍历操作，`NSArray` 比 `NSSet` 更快。在低端情况下，构造数组的速度快达 50%，而在高端情况下，遍历数组的速度快达 500%。如果只需要遍历内容，不要使用
  `NSSet`。


  ## 问题 74：你是否必须实现所采纳协议中的所有声明？


  不。如果一个方法被声明为 `@optional`，则不必实现它。


  ```

  @protocol MyProtocol

  - (void)requiredMethod;

  @optional

  - (void)anOptionalMethod;

  - (void)anotherOptionalMethod;

  @required

  - (void)anotherRequiredMethod;

  @end

  ```


  如果被要求指出这种方法的风险，开发者应该能够提出这样的观点：如果协议中的一个方法被标记为可选，在尝试调用它之前，必须检查对象是否实现了该方法。


  ## 问题 75：调用 alloc 和 init 的快捷方式是什么？


  `alloc` 和 `init` 通常可以这样调用：

  ```

  [[Class alloc] init]

  ```

  在其他一些代码和文献中，我们也可以看到如下方式：

  ```

  [Class new]

  ```

  最初在 Objective-C 中，对象是用 `new` 创建的。随着 OpenStep/Cocoa 框架的发展，设计者们形成了这样的观点：为对象分配内存和初始化其属性是分开的关注点，因此应该是独立的方法（例如，一个对象可能被分配在特定的内存区域）。所以，`alloc`-`init`
  风格的对象创建方式开始流行。基本上，`new` 是旧的，并且几乎——但并非完全——被弃用。因此，你会发现 Cocoa 类有很多 `init` 方法，但几乎没有任何自定义的
  `new` 方法。


  ## 问题 76：哪种指针可以帮助安全地避免内存泄漏？


  智能指针在自动管理对象生命周期方面非常有帮助。智能指针是一个包装“原始”（或“裸”）C++ 指针的类，用于管理所指向对象的生命周期。没有单一的智能指针类型，但它们都试图以一种实用的方式抽象原始指针。

  应优先使用智能指针而非原始指针。如果你觉得必须使用指针（首先考虑是否真的需要），通常你会希望使用智能指针，因为这可以缓解原始指针的许多问题，主要是忘记删除对象而导致内存泄漏。


  ## 问题 77：如果你有一个长时间运行的执行循环，什么可以帮助防止内存不足崩溃？


  这里的一个关键点是内存泄漏。确保内存正在被清理，并且你没有持有任何阻止对象被回收的引用。同时，在你的应用程序委托中查看 `applicationWillTerminate`
  消息。如果你的应用程序被系统终止（例如，由于内存不足）会调用此方法，但如果用户通过按 home 键以通常方式离开应用程序，则不会调用。


  ## 问题 78：在编写一个显示从远程服务器下载的图片的 UITableViewController 时，有哪些必要的考虑因素？


  就其本身而言，编程实现此功能可能是候选人的一个编码任务。然而，如果口头提问，候选人应通过引用如何处理该问题衍生的存储和异步性方面的一些通用准则来回答。需要涵盖的要点包括：

  * 仅当单元格滚动到视图中时（即调用 `cellForRowAtIndexPath` 时）才下载图片。

  * 在后台线程上异步下载图片，以免阻塞 UI，使用户可以持续滚动。

  * 当单元格的图片下载完成后，我们必须检查该单元格是否仍在视图中，或者是否已被另一段数据重用。如果已被重用，我们应丢弃该图片。否则，我们必须切换回主线程，以更改单元格上的图片。


  根据对话的精确度，你可能希望将讨论引向如何缓存图片以供用户后续离线使用、占位符的使用等方面。


  ## 问题 79：什么是 KVC 和 KVO？请举一个使用 KVC 设置值的例子。


  KVC 代表“键值编码”。它是一种机制，允许在运行时使用字符串访问对象的属性，而不必在开发时静态地知道属性名称。KVO 代表“键值观察”，允许控制器或类观察属性值的变化。

  例如，如果一个类上有一个属性名

  ```

  @property (nonatomic, copy) NSString *name;

  ```

  我们可以使用 KVC 访问它，如下所示：

  ```

  NSString *n = [object valueForKey:@"name"]

  ```

  并且我们可以通过发送以下消息来修改其值：

  ```

  [object setValue:@"Mary" forKey:@"name"]

  ```




  '
- '# 问题 80：iOS 提供了哪些机制来支持多线程？


  在 iOS 中，我们可以使用多种不同的技术来为应用程序提供多线程支持。


  *   `NSThread` 创建一个新的低级线程，可以通过调用 `start` 方法来启动。

  *   `NSOperationQueue` 允许创建并使用一个线程池来并行执行 `NSOperation`。也可以通过向 `NSOperationQueue`
  请求 `mainQueue` 来在**主线程**上运行 `NSOperation`。

  *   Grand Central Dispatch (GCD) 是 Objective-C 的一项现代特性，提供了一套丰富的方法和 API 来支持常见的多线程任务。GCD
  提供了一种将任务排队以分派到**主线程**、**并发队列**（任务并行运行）或**串行队列**（任务按 FIFO 顺序运行）的方式。


  '
- '# 问题 81：什么是响应链？


  当一个事件发生在视图中时，例如触摸事件，该视图会将事件传递给与 `UIView` 类关联的一系列 `UIResponder` 对象链。第一个 `UIResponder`
  是 `UIView` 本身。如果它不处理该事件，则继续向上传递，直到某个 `UIResponder` 处理它为止。该链将包括 `UIViewController`、父
  `UIView` 及其关联的 `UIViewController`。如果它们都不处理该事件，则会询问 `UIWindow` 是否能处理，最后，如果 `UIWindow`
  也不处理，则会询问 `UIApplicationDelegate`。


  由于这是一个相当层次化的结构，可能会要求候选人在白板上画出这个链。绘制类似图 3-2 的图表将能解决问题。


  ![../images/475684_1_En_3_Chapter/475684_1_En_3_Fig2_HTML.jpg](img/475684_1_En_3_Fig2_HTML.jpg)


  图 3-2


  *iOS 中的响应链流程*


  '
- '# 问题 82：使用委托（delegate）和通知（notification）有什么区别？


  你可以把委托想象成打电话。你给你的朋友打电话，并明确希望和她交谈。你可以说些什么，她可以回应。你们可以一直交谈直到挂断电话。委托以非常类似的方式在两个对象之间建立了一个链接，而且你不需要知道委托的具体类型；它只需实现协议即可。


  另一方面，`NSNotification` 就像是一个广播电台。它向任何愿意收听的人广播消息。广播电台无法从听众那里接收反馈，除非它有一部电话（委托）。听众可以忽略一条消息，或者对此消息采取行动。`NSNotification`
  允许你向任何对象发送消息，但双方之间没有可以进行来回通信的链接。如果你需要这种类型的通信，你可能应该实现一个委托；否则，`NSNotification` 更简单、更容易使用，尽管它可能会给你带来麻烦。


  '
- '# 问题 83：你将如何在设备上离线安全地存储用户的私人数据？还应采取哪些其他安全最佳实践？


  这个问题应该能引发与候选人关于最佳实践和框架的讨论。一个经验丰富的候选人将能够谈论钥匙串（Keychain）、Touch ID 和 1Password。此外，关于网络安全（使用
  SSL 连接、使用 Charles 进行调试等）的一般性讨论可以导向一些有趣的方向。


