  ## 引言


  2015 年，我在没有找到新工作的情况下辞去了之前的职位。当时，这感觉很可怕——我放弃了一个舒适安稳的职位，去追求一种连自己都无法确切定义的不同生活方式。回想起来，这却是我做过的最好的决定。我能专注于其他项目；它让我走出了舒适区；并且它让我能够突破我从未意识到的界限。


  那时，我正在为潜在候选人进行面试，为此，我最终创建了自己的问题与答案清单。我倾向于量化、写笔记，并将想法细致地记录在日常日志中，对于所有问题我也这样做了。我还记录了候选人是否能够回答我的问题，提出特定问题后对话的走向，等等。后来，当我发现自己坐在了面试桌的另一边时，我意识到，我所整理和收集的所有笔记对我具有巨大的价值，并且我从之前的经验中获得了深刻的见解。


  最终，我找到了一位客户，他有一个具有挑战性的项目（这是当今移动开发者提供的福利之一，对此类人才，尤其是高级开发者的需求，显著超过了可用人员的供应）。经过几周高强度的工作，这为我阐明了未来的职业道路，我获得了一些想法。一个反复出现的念头是，处于我这种情况的任何人是否都能从一本按职位级别分类、组织良好的潜在面试问题书中受益。另一个想法是，潜在的雇主是否可以使用这样一本书来面试未来的员工。我有一些空闲时间，并且已经整理了一系列问题，所以我决定出版这本书`100
  Questions and Answers to Help You Land Your Dream Android Job`。


  结果证明这是成功的，虽然不是财务上的成功，但我以其他方式得到了回报。我开始收到来自世界各地匿名同行的信息，他们分享了真实的生活经历。其中一条信息是：“感谢你写了这本书，我获得了一次面试机会，并且部分由于你的帮助通过了面试！”另一条是：“我正和家人从印度搬迁到湾区，这本书帮助我理清了思路。”这让我非常高兴！作为一名多年的移动开发者，我已经习惯了与我使用我的库和应用程序或阅读我的文章的人进行有限的互动，但突然之间，我写的一本书正在对他人及其家人的生活产生真正的影响。我感到自己充满力量并肩负使命。我感到有义务继续做这件事。为世界做出积极贡献成为了重中之重。


  我几乎立刻就有了写这本书的想法，但开始自由职业者的生活让我重新思考了我的优先事项：我最终为一个极具挑战性的项目编写了代码，但由于其他的努力和责任，我的空闲时间迅速减少。然而，写作`100
  Questions and Answers to Help You Land Your Dream iOS Job`的愿望却更加强烈了。所以，日复一日，我坚持写作（一个问题、一个想法等等），直到这本书完成。现在，它就在你的手中或在你的
  Kindle 上。


  我写这本书的目的，是帮助你获得梦寐以求的 iOS 工作，增加你的 iOS 知识，或者帮助你作为一名面试官进行有效的面试，总体上让你的生活更轻松。书中的问题并不非常详细，因为这不是本书的目的。我认为在面试中，你不需要深入到极其技术性的细节或对
  API 的精确记忆。谁会记得一个函数的所有参数呢？或者，知道如何在白板上写出能编译的代码就能代表任何实用技能吗？我不这么认为。我认为口头面试应该是对 API、候选人在框架方面的经验及其优缺点的看法、代码草图绘制以及能够识别特定场景中的风险的非正式讨论。（我一直喜欢问潜在候选人他们如何能制造内存泄漏，但我并不期望他们在白板上写一个没有样板代码的
  Java 编译类。我自己可能也做不到！）


  有些问题包含一个后续段落。当我提问时，如果一位候选人看起来对某个主题很兴奋、非常有信心或特别热衷，我喜欢进一步讨论。这是深入了解特定领域优点和缺点的简单方法。例如，如果一位候选人能够相当快地定义一个并发范式，我会跟进，请他或她描述一个适合应用该范式的场景。如果对话朝那个方向发展，也许之后我们还可以讨论可变性或如何安全地在设备上存储信息。


  如果这本书真的能以任何方式帮助你，我将非常感谢你告诉我。如果你有任何建设性的批评想与我分享，我将更加感激。如果你觉得这本书没用或是浪费时间，请将付款证明发给我，我会从我收到的版税中退款给你。（根据供应商的不同，情况可能有所不同。例如，如果你在谷歌上购买这本书，我将获得总价的
  70%。）


  最后但同样重要的是，编程愉快！为你日常所做之事保持动力，成为世界需要的那份改变。


  ## 致谢


  这是我出版的第四本书。在撰写数本书的迷人旅程中，我发现了很多事情。其中最重要的是，一本书很少是一个人努力的结果。没有许多才华横溢、富有创造力的人直接或间接的帮助，我不可能完成它。


  我的审稿人对本指南的最终状态产生了巨大的影响。感谢 Adrian Kosmaczewski（一个几乎无所不能的人，你应该在 Medium 上关注他）、Bastian
  Kohlbauer 和 Marian Zange，我从他们那里不断学习并提升我的 iOS 技能。Pedro Piñera Buendía 在我们相遇的所有活动中总是令人愉快的伙伴，他也是一位在
  Goodreads 上激励我的热心读者。


  谷歌专家计划的同事们将我的职业水平提升到了一个我无法想象的高度。每天与他们一起工作在许多方面改变了我的生活，我非常高兴能成为这个社区的一员并为之做出贡献。


  我生活中必须提及的许多人都应在此获得感谢，还有许多其他人会被遗漏，这仅仅是因为我糟糕的记忆力：我在巴塞罗那的长期朋友和同事 Marius、Mika 和 Xavi；Gabriel
  Martínez，一位从计算机科学家转型为设计师的人，我总能在专业和个人建议上依赖他；Nick Skelton，一个不断拓宽我舒适区的人。以及所有在这次努力中支持我和一直陪伴我的其他人。




  ### 关于作者


