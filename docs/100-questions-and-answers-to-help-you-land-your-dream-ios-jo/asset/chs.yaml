- "# 问题 90：什么是反初始化器（deinitializer），在 Swift 中如何编写？\n\n反初始化器在类实例被释放之前立即声明。你使用 `deinit`\
  \ 关键字编写反初始化器。反初始化器的编写不带括号，并且不接受任何参数。其写法如下：\n\n```\ndeinit {\n    // 执行反初始化操作\n}\n\
  ```\n\n"
- '# 问题 91：什么是可选链（optional chaining）？


  查询、调用可能是 `nil` 的可选值的属性、下标和方法的过程被定义为可选链。可选链返回两种结果：

  *   如果可选值包含一个 `value`，调用其相关属性、方法和下标将返回 `value`。

  *   如果可选值包含一个 `nil` 值，其所有相关属性、方法和下标都将返回 `nil`。


  由于对方法、属性和下标的多次查询被分组在一起，链中一个环节的失败将影响整个链，并导致 `nil` 值。


  '
- '# 问题 92：什么是 Fallthrough 语句？它有什么作用？


  `Fallthrough` “落入”下一个 case，而不是下一个匹配的 case。这个概念继承自 C 语言的 switch 语句，其中每个 case 都可以被认为是一个
  goto 目标标签，而 switch 语句将执行带到第一个匹配的标签。


  '
- '# 问题 93：什么是惰性存储属性？它们在什么时候有用？


  惰性存储属性用于那些初始值直到第一次使用时才被计算的属性。你可以在属性声明前写上 `lazy` 修饰符来声明一个惰性存储属性。当一个属性的初始值依赖于外部因素，而这些因素的值未知时，惰性属性非常有用。




  ## 问题 94：你听说过 Handoff 吗？


  Handoff 是随着 iOS 8 和 OS X Yosemite 引入的一项新功能。它允许你在从一台设备切换到另一台设备时，无需重新配置任何设备即可不间断地继续某项活动。


  ## 问题 95：在 iOS 中可以有多个 UIWindow 吗？


  虽然这是可能的，但情况比较少见。例如，当你在一个独立的窗口中有一个 `UIAlertView` 时，就会发生这种情况。


  ## 问题 96：什么是 Metal？


  Metal 是一个底层、可移植性较差、但优化程度更高的图形层，用于执行与 OpenGL（及 OpenCL）或 Direct3D 相同类型的任务，即 3D 图形渲染和并行
  GPU 编程。出于性能原因，Metal 试图降低所需的开销量，并减少 CPU 瓶颈。


  ## 问题 97：你能想出提高网络效率的策略吗？


  一名有经验的开发者应该了解一些 iOS 默认未提供的技术。这将提升你的水平。


  你可以讨论诸如延迟测量（评估你所连接的网络类型，以便做出数据传输决策）、批处理（将请求打包在一起，当它们成为一个有代表性的组时一起发送——许多分析 SDK 中都会这样做）、预取（在设备空闲或网络连接良好时下载信息）、指数退避（如果连接失败，在发出下一个请求之前等待指数级增加的时间间隔）、缓存机制、使用
  Last-Modified 头等主题。


  ## 问题 98：你在上一份工作中必须解决的最复杂问题是什么？


  这个问题将揭示候选人具备的、与 iOS 知识不直接相关但同样重要的技能。这可以引导你讨论应用程序增长、系统扩展的问题，如何使软件长期可持续发展，如何组建团队并使其高效工作，以及候选人用来解决问题的框架。


  ## 问题 99：什么是自动释放池？


  `NSAutoreleasePool` 类用于支持 Cocoa 的引用计数内存管理系统。自动释放池存储对象，当池本身被清空时，会向这些对象发送释放消息。另外，如果你使用自动引用计数，就不能直接使用自动释放池。相反，你应该使用
  `@autoreleasepool` 块。


  ## 问题 100：从 UIButton 到 NSObject 的类层次结构是怎样的？


  `UIButton` 继承自 `UIControl`，`UIControl` 继承自 `UIView`，`UIView` 继承自 `UIResponder`，`UIResponder`
  继承自根类 `NSObject`：`UIButton` ➤ `UIControl` ➤ `UIView` ➤ `UIResponder` ➤ `NSObject`。


