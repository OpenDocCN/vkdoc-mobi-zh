    Figure 10-4


    Current UML


    `CoreDataStack` is the class responsible for initializing the Core Data stack.
    Since we haven’t created it yet, adding the preceding line will cause a build
    error. So we’ll pause working on `CoreDataManagerTests` for now and move our focus
    on creating `CoreDataStack` (Figure [10-4](#505360_1_En_10_Chapter.xhtml#Fig4)).
    Once we’re done, we’ll circle back to it.


    So what exactly is `CoreDataStack` responsible for? It should initialize a persistent
    container, and by default the underlying managed model should be the app’s model.
    So let’s translate this into a test. First, we’ll add a new test case class named
    `CoreDataStackTests`, and then add this test inside it:


    ```

    func testDefaultStoreName() {

    // Given

    let stack = CoreDataStack()

    // When

    let container = stack.storeContainer

    // Then

    XCTAssertEqual(container.name, "Books")

    }

    ```


    To fix this test, we’ll need to create the new class `CoreDataStack` as in the
    following :


    ```

    import CoreData

    class CoreDataStack {

    // MARK:- Lazy Variables

    lazy var storeContainer: NSPersistentContainer = {

    let container = NSPersistentContainer(name: "Books")

    container.loadPersistentStores { _, error in

    if let error = error as NSError? {

    print("Unresolved error \(error), \(error.userInfo)")

    }

    }

    return container

    }()

    }

    ```


    Now we need to be able to customize our stack so that it uses custom models, not
    just the default. We’ll heavily depend on this in our tests. So let’s add a test
    for this:


    ```

    func testCustomStoreName() {

    // Given

    let stack = CoreDataStack(name: "TestModel")

    // When

    let container = stack.storeContainer

    // Then

    XCTAssertEqual(container.name, "TestModel")

    }

    ```


    To make this pass, we’ll need to do two things. First, update our class to handle
    custom model names :


    ```

    class CoreDataStack {

    // MARK:- Variables

    private let modelName: String

    // MARK:- Lazy Variables

    lazy var storeContainer: NSPersistentContainer = {

    let container = NSPersistentContainer(name: self.modelName)

    container.loadPersistentStores { _, error in

    if let error = error as NSError? {

    print("Unresolved error \(error), \(error.userInfo)")

    }

    }

    return container

    }()

    // MARK:- Initializer

    public init(name: String = "Books") {

    self.modelName = name

    }

    }

    ```


    Second, we need to add the new data model. To do this, we’ll add a new data model
    file (Figure [10-5](#505360_1_En_10_Chapter.xhtml#Fig5)) and name it “TestModel.”


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig5_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Adding a new data model file


    After adding the model , head to the project file. Open the test target and under
    **Build Phases** make sure that the data model file is **NOT** in **Compile Sources**
    and is included under **Copy Bundle Resources** (Figure [10-6](#505360_1_En_10_Chapter.xhtml#Fig6)).
    This will prevent build errors that might happen later on when we create entities.


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig6_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Setting up the test data model correctly


    Sadly, our test will still be failing after adding the new model. This is because
    the persistent container searches for the data model file by default inside the
    app’s main bundle. However, our test data model is inside our tests bundle. To
    do this we need to manually pass the object model for our data model to the Core
    Data stack. Let’s update our test to this:


    ```

    func testCustomStoreName() {

    // Given

    let testBundle = Bundle(for: type(of: self))

    let modelUrl = testBundle.url(forResource: "TestModel", withExtension: "momd")!

    let objectModel = NSManagedObjectModel(contentsOf: modelUrl)

    let stack = CoreDataStack(name: "TestModel", objectModel: objectModel)

    // When

    let container = stack.storeContainer

    // Then

    XCTAssertEqual(container.name, "TestModel")

    }

    ```


    And update our class to this:


    ```

    class CoreDataStack {

    // MARK:- Variables

    private let modelName: String

    private let objectModel: NSManagedObjectModel?

    // MARK:- Lazy Variables

    lazy var storeContainer: NSPersistentContainer = {

    var container: NSPersistentContainer

    if let objectModel = self.objectModel {

    container = NSPersistentContainer(name: self.modelName, managedObjectModel: objectModel)

    }

    else {

    container = NSPersistentContainer(name: self.modelName)

    }

    container.loadPersistentStores { _, error in

    if let error = error as NSError? {

    print("Unresolved error \(error), \(error.userInfo)")

    }

    }

    return container

    }()

    // MARK:- Initializer

    public init(name: String = "Books", objectModel: NSManagedObjectModel? = nil)
    {

    self.modelName = name

    self.objectModel = objectModel

    }

    }

    ```


    Here we add the ability to inject a custom object model. And when initializing
    our container, we check if a custom model is passed. If so, we use it to create
    the container. If not, then we create the container normally.


    Now if you recall, we need to be able to create Core Data stacks that utilize
    in-memory stores . Right now our stack can only be set up using the default store,
    which is the SQLite store. So let’s add tests for this:


    ```

    func testPersistentStoreType() {

    // Given

    let stack = CoreDataStack(storageType: .persistent)

    // When

    let container = stack.storeContainer

    // Then

    XCTAssertEqual(container.persistentStoreDescriptions[0].type, NSSQLiteStoreType)

    }

    func testInMemoryStoreType() {

    // Given

    let stack = CoreDataStack(storageType: .inMemory)

    // When

    let container = stack.storeContainer

    // Then

    XCTAssertEqual(container.persistentStoreDescriptions[0].type, NSInMemoryStoreType)

    }

    ```


    To fix our tests, we need to add an enum that represents store type. We can add
    it in a separate file or inside the CoreDataStack file. The enum should look like
    this:


    ```

    enum StorageType {

    case persistent, inMemory

    }

    ```


    Then to fix our tests , we need to change our class to this:


    ```

    class CoreDataStack {

    // MARK:- Variables

    private let modelName: String

    private let objectModel: NSManagedObjectModel?

    private let storageType: StorageType

    // MARK:- Lazy Variables

    lazy var storeContainer: NSPersistentContainer = {

    var container: NSPersistentContainer

    if let objectModel = self.objectModel {

    container = NSPersistentContainer(name: self.modelName, managedObjectModel: objectModel)

    }

    else {

    container = NSPersistentContainer(name: self.modelName)

    }

    if self.storageType == .inMemory {

    let description = NSPersistentStoreDescription()

    description.type = NSInMemoryStoreType

    container.persistentStoreDescriptions = [description]

    }

    container.loadPersistentStores { _, error in

    if let error = error as NSError? {

    print("Unresolved error \(error), \(error.userInfo)")

    }

    }

    return container

    }()

    // MARK:- Initializer

    public init(name: String = "Books", objectModel: NSManagedObjectModel? = nil,
    storageType: StorageType = .persistent) {

    self.modelName = name

    self.objectModel = objectModel

    self.storageType = storageType

    }

    }

    ```


    Here we add a new variable to hold our storage type. And we add a new parameter
    in the init to be able to set the storage type. We also set the default value
    to `.persistent`. And finally we check if the storage type is in-memory; if so,
    we override the store type. Else, we leave the default store type, which is SQLite.
    After these changes, our tests should be passing now.


    Lastly, we need our stack to provide us with a context. This context should be
    used on the main thread. In our app, all of our usage of Core Data is lightweight
    and will reflect on our app’s UI. Which means we don’t need background contexts.


    Let’s add a test for this:


    ```

    func testContext() {

    // Given

    let stack = CoreDataStack(storageType: .inMemory)

    // When

    let context = stack.context

    // Then

    XCTAssertNotNil(context)

    XCTAssertEqual(context.concurrencyType, .mainQueueConcurrencyType)

    }

    ```


