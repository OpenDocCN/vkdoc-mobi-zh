    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig2_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    User submitted a bug report


    ### Debugging


    From the attached screenshot (Figure [12-2](#505360_1_En_12_Chapter.xhtml#Fig2)),
    we can see that the `MainViewController` is empty. So this means that their complaint
    is valid.


    After checking the bug report and looking at the network logs (Figure [12-3](#505360_1_En_12_Chapter.xhtml#Fig3)),
    we can see that the books request failed. So this behavior is expected. However,
    we don’t show any error messages at all.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig3_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Network logs from bug report


    What we need to do here is once the books request failed, we need to make sure
    to show this message: “Failed to load best seller books”.


    Fixing this should be simple. But even if it was as simple as adding one letter,
    we still need to use TDD. The rule of TDD is that we can’t write any code without
    having a failing test. And given that we’ve shipped this bug to production, then
    this means that we don’t have tests covering this scenario.


