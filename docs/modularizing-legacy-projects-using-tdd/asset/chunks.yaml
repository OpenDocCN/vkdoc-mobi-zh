    \ `MainViewPresenter` will contain a method that will fetch all books and abstract\
    \ the communication to `MainViewModel` under the hood; then, the model will return\
    \ the books. Lastly, `MainViewPresenter` will update the view. Now let’s convert\
    \ this to a test:\n\n```\nfunc testFetchBestSellerBooksReturnsList() throws {\n\
