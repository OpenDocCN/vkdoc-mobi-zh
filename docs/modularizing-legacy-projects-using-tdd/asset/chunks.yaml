- fmt: "##### `MainViewPresenter`\n\n接下来，我们需要为`MainViewPresenter`编写单元测试。首先，我们将创建一个新类作为`MainViewModel`的桩（stub）：\n\
    \n```swift\n@testable import Books\nclass MainViewModelStub: MainViewModel {\n\
    \    var stubbedLists:[List]?\n    init(stubbedLists:[List]) {\n        self.stubbedLists\
    \ = stubbedLists\n        super.init(networkLayer: nil)\n    }\n    public override\
    \ func fetchBestSellerBooks(callBack: @escaping (_ lists:[List]?) -> Void) {\n\
    \        callBack(self.stubbedLists)\n    }\n}\n```\n\n现在我们可以编写测试：\n\n```swift\n\
    func testFetchingBestSellerBooksReturnsLists() throws {\n    // Given\n    let\
    \ expectedLists: [List] = stubbedlists()\n    var actualLists: [List] = []\n \
    \   let mainViewModel = MainViewModelStub(stubbedLists: expectedLists)\n    let\
    \ mainViewPresenter = MainViewPresenter(mainViewModel: mainViewModel)\n    //\
    \ when & then\n    let waitForBooks = XCTestExpectation(description: \"Wait to\
    \ fetch books\")\n    mainViewPresenter.fetchBestSellerBooks { lists in\n    \
    \    actualLists = lists ?? []\n        waitForBooks.fulfill()\n    }\n    self.wait(for:\
    \ [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists, expectedLists,\
    \ \"Fetched books does not match the expected\")\n}\nfunc stubbedlists() -> [List]\
    \ {\n    let firstBook = BookModel(title: \"THE LAST THING HE TOLD ME\", contributor:\
    \ \"by Laura Dave\", author: \"Laura Dave\", createdDate: \"2021-05-26 22:10:24\"\
    )\n    let secondBook = BookModel(title: \"SOOLEY\", contributor: \"by John Grisham\"\
    , author: \"John Grisham\", createdDate: \"2021-05-26 22:10:24\")\n    let firstList\
    \ = List(listID: 704, listName: \"Combined Print and E-Book Fiction\", displayName:\
    \ \"Combined Print & E-Book Fiction\", books: [firstBook,secondBook])\n    return\
    \ [firstList]\n}\n```\n\n上述测试与我们刚刚为`MainViewModel`编写的测试有些相似。我们使用一个桩对象来设置展示器（presenter）的实例，然后调用函数并等待其完成畅销书数据的获取，最后对返回的书籍进行断言。\n\
    \n现在我们可以编写代码使`MainViewPresenterTests`通过测试：\n\n```swift\nclass MainViewPresenter:\
    \ NSObject {\n    private var mainViewModel:MainViewModel?\n    init(mainViewModel:MainViewModel?)\
    \ {\n        self.mainViewModel = mainViewModel\n    }\n    public func fetchBestSellerBooks(callBack:\
    \ @escaping (_ data:[List]?) -> Void) {\n        self.mainViewModel?.fetchBestSellerBooks(callBack:\
    \ { lists in\n            callBack(lists)\n        })\n    }\n}\n```\n\n展示器的实现非常简单。它实现了一个获取畅销书的功能，而该功能的实现本质上是调用`MainViewModel`中对应的函数。你可能会认为我们不需要展示器，它只是一个包装器，但这只是暂时的。逻辑分离至关重要，随着我们不断重构更多代码，其重要性会愈发凸显。\n\
    \n现在运行`MainViewPresenterTests`（图 [6-20](#505360_1_En_6_Chapter.xhtml#Fig20)），测试应该可以通过✅。\n\
    \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig20_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig20_HTML.jpg)\n\
    \n**图 6-20** `MainViewPresenterTests` 通过\n\n##### 最后的调整\n\n现在所有单元测试都通过了。不仅如此，如果我们运行集成测试，也应该能通过。最后需要做的是将旧的`fetchBooks()`实现替换为使用新组件的新实现。让我们用以下代码替换现有的`fetchBooks()`函数：\n\
    \n```swift\nfunc fetchBooks() {\n    self.mainViewPresenter?.fetchBestSellerBooks(callBack:\
    \ { lists in\n        if let lists = lists {\n            self.lists = lists\n\
    \            DispatchQueue.main.async {\n                self.refreshControl.endRefreshing()\n\
    \                self.tableView?.reloadData()\n            }\n        }\n    })\n\
    }\n```\n\n这一步骤标志着 **步骤 3.2** 的结束。我们现在已经彻底重构了与功能相关的逻辑。\n\n##### 测试的价值\n\n在进入下一步之前，让我们尝试做一些能展示我们添加的所有测试价值的事情。在`MainViewModel`内部，将`fetchBestSellerBooks`方法替换为以下代码。我们只是删除了`callBack(lists)`之后的返回语句，结果导致回调被调用了两次。这就像一个定时炸弹——这种行为目前不会引发错误，但将来可能引发问题。如果你现在运行应用，它会按预期工作，因为我们在`MainViewController`中对`nil`进行了守卫。但如果我们某天移除了那个守卫，或者在别处重用了该代码，错误就会开始出现。然而，如果我们现在运行测试，会发现它们能捕获到这个问题（图\
    \ [6-21](#505360_1_En_6_Chapter.xhtml#Fig21)）。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig21_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig21_HTML.jpg)\n\
    \n**图 6-21** 失败的单元测试\n\n```swift\npublic func fetchBestSellerBooks(callBack: @escaping\
    \ (_ lists:[List]?) -> Void) {\n    self.networkLayer?.executeNetworkRequest(callBack:\
    \ { data in\n        guard let data = data else {\n            callBack(nil)\n\
    \            return\n        }\n        var response:Response?\n        do {\n\
    \            response = try JSONDecoder().decode(Response.self, from: data)\n\
    \        } catch {\n            print(error.localizedDescription)\n        }\n\
    \        if let lists = response?.results.lists {\n            callBack(lists)\n\
    \        }\n        callBack(nil)\n    })\n}\n```\n\n#### 重新运行验证测试\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig22_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig22_HTML.jpg)\n\
    \n**图 6-22** 步骤 3.3\n\n一直以来，我们都在重构`MainViewController`的一个职责：“启动时获取最新书籍”。在确认完成这个职责之前，我们需要运行在\
    \ **步骤 3.1** 中添加的验证测试，以确保一切按预期运行（图 [6-22](#505360_1_En_6_Chapter.xhtml#Fig22)）。如果我们尝试运行`testShowingBestSellerBooks()`（图\
    \ [6-23](#505360_1_En_6_Chapter.xhtml#Fig23)），测试应该可以通过✅。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig23_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig23_HTML.jpg)\n\
    \n**图 6-23** 测试通过\n\n### 重构其余职责\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig24_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig24_HTML.jpg)\n\
    \n**图 6-24** 重复步骤 3 及其子步骤\n\n回到 **步骤 2**，我们识别出了`MainViewController`的六个职责。刚刚完成了第一个职责的重构。现在，我们应该对剩下的职责逐一执行相同的步骤（图\
    \ [6-24](#505360_1_En_6_Chapter.xhtml#Fig24)）。\n\n### 下一个起点\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig25_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig25_HTML.jpg)\n\
    \n**图 6-25** 步骤 4\n\n一旦完成了`MainViewController`中所有职责的重构，我们将回到步骤 1，重复整个过程（图 [6-25](#505360_1_En_6_Chapter.xhtml#Fig25)）。也就是说，我们会选取一个新的起点，并像处理`MainViewController`一样彻底重构它。\n\
    \n## 练习\n\n我们已经完成了`MainViewController`的第一个职责。作为练习，请使用我们在本章中遵循的相同流程，尝试重构其余的职责。"
