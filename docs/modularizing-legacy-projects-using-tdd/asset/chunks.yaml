    \ 5-13，我们的第一个用户故事就完成了。这个功能似乎很简单。我们将对剩余的故事实施相同的过程。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig13_HTML.jpg](img/505360_1_En_5_Fig13_HTML.jpg)\n\
    \n图 5-13 所有已添加的测试\n\n我们没有详细讨论该功能 UI 元素的实现，但你可以在本章的资源中找到相关代码。\n\n## 测试健康检查\n\n\
    我们需要验证，当测试通过时，它表明一切正常；当测试失败时，表明存在问题，并且问题可以通过测试识别出来。在图 5-14 中，列出了所有可能的错误位置。所以让我们故意引入一个错误，看看我们的测试能否捕获它。\n\
    \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig14_HTML.jpg](img/505360_1_En_5_Fig14_HTML.jpg)\n\
    \n图 5-14 可能的错误\n\n示例：让我们尝试更改 `CoffeeDrinksPresenter` 中的 `getDrinkName`，使其返回 `imageName`\
    \ 而不是 `name`（图 5-15），然后运行我们的测试。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig15_HTML.jpg](img/505360_1_En_5_Fig15_HTML.jpg)\n\
    \n图 5-15 有缺陷的代码更改\n\n现在让我们运行测试（图 5-16）。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig16_HTML.jpg](img/505360_1_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16 测试失败\n\n测试成功捕获了该错误。\n\n## 第二个故事\n\n> *“作为用户，我想点击任何咖啡饮品类型，以查看该饮品的更多详细信息，包括咖啡图片和成分的简要描述。”*\n\
    \n我们需要编写一个会失败的端到端测试，以验证点击任何咖啡饮品类型将显示该饮品的详细信息。（图 5-17）\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig17_HTML.jpg](img/505360_1_En_5_Fig17_HTML.jpg)\n\
    \n图 5-17 测试计划图\n\n让我们为这个故事编写第一个测试：\n\n```\nfunc testDetailedCoffeeView() {\n \
    \   let app = XCUIApplication()\n    app.launchEnvironment = [\"coffee_drinks_stubbed\"\
    : \"coffee_drinks_stub\"]\n    app.launch()\n    let coffeeCollectionView = app.collectionViews\n\
    \    coffeeCollectionView.cells[\"coffee1\"].tap()\n    XCTAssertTrue(app.navigationBars[\"\
    coffee1\"].exists)\n    XCTAssertEqual(app.textViews[\"desc\"].value as? String,\
    \ \"description1\")\n}\n```\n\n这里我们为这个故事编写了端到端测试。我们使用启动参数设置应用程序。然后导航到特定饮品页面，并断言其详细信息正确显示。\n"
- fmt: "# Architecture\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig18_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig18_HTML.jpg)\n\
    \nFigure 5-18\n\nMVP applied\n\nAs we can see from Figure [5-18](#505360_1_En_5_Chapter.xhtml#Fig18),\
    \ there aren’t too many objects integrated to deliver this story. Which basically\
    \ means there aren’t any sociable components to write integration tests for. So\
    \ it’s enough to write only unit tests for `CoffeeDetailsPresenter`.\n\nLet’s\
    \ start writing our tests one by one:\n\n```\nfunc testFetchingDrinkName() {\n\
    \    //Given\n    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name:\
    \ \"coffee1\",imageName: \"black\",description: \"desc1\"))\n    // when & then\n\
    \    XCTAssertEqual(coffeeDetailsPresenter.getName(), \"coffee1\")\n}\nfunc testFetchingDrinkDescription()\
    \ {\n    //Given\n    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name:\
    \ \"coffee1\",imageName: \"black\",description: \"desc1\"))\n    // when & then\n\
    \    XCTAssertEqual(coffeeDetailsPresenter.getDescription(), \"desc1\")\n}\nfunc\
    \ testFetchingDrinkImageName() {\n    //Given\n    let coffeeDetailsPresenter\
    \ = CoffeeDetailsPresenter(drink:CoffeeDrink(name: \"coffee1\",imageName: \"black\"\
    ,description: \"desc1\"))\n    // when & then\n    XCTAssertEqual(coffeeDetailsPresenter.getImageName(),\
    \ \"black\")\n}\n```\n\nAfter writing all the preceding tests and making all of\
    \ them pass one after the other using TDD, we will end up with the following class:\n\
    \n```\nclass CoffeeDetailsPresenter {\n    private var drink:CoffeeDrink?\n  \
    \  init(drink:CoffeeDrink?) {\n        self.drink = drink\n    }\n    public func\
    \ getName() -> String? {\n        guard let drink = self.drink else {\n      \
    \      return nil\n        }\n        return drink.name\n    }\n    public func\
    \ getImageName() -> String? {\n        guard let drink = self.drink else {\n \
    \           return nil\n        }\n        return drink.imageName\n    }\n   \
    \ public func getDescription() -> String? {\n        guard let drink = self.drink\
    \ else {\n            return nil\n        }\n        return drink.description\n\
    \    }\n}\n```\n\nAfter adding all our tests, this is how our test suite should\
    \ look like (Figure [5-19](#505360_1_En_5_Chapter.xhtml#Fig19)) as well as our\
    \ app (Figure [5-20](#505360_1_En_5_Chapter.xhtml#Fig20)):\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg)\n\
    \nFigure 5-20\n\nApp main screen\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg)\n\
    \nFigure 5-19\n\nFinal test suite\n\nThe same as the first feature, we did not\
    \ go into details on implementing the UI, but you’ll find the code in this chapter’s\
    \ resources.\n\n# Exercise\n\nWe are done with the first and second stories. But\
    \ there are still two more stories to go. You should be able to apply the same\
    \ process we equipped in this chapter and implement these two stories. You can\
    \ find the final project, with the first two stories implemented, in the chapter’s\
    \ resources.\n\n# Summary\n\nIn this chapter, we took a look at how TDD can be\
    \ employed on a slightly complex project, which is a challenge similar to what\
    \ you’ll encounter in your day-to-day life. You got introduced to **CoffeePot**,\
    \ which is an app that helps users understand the differences between different\
    \ types of coffee. The app has two views: one is a view that lists all types of\
    \ coffee, and the other is a detailed view for a single type of coffee.\n\nWhen\
    \ working on such a project, we can’t aim to complete it in one go. This is both\
