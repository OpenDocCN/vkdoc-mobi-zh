    ##### Last Touches


    All our unit tests are passing now. But not only that, now if we run the integration
    test, it should pass as well. Last thing we need to do is replace the old implementation
    of `fetchBooks()` with the new one that makes use of the newly added components.
    Let’s replace the existing `fetchBooks()` func with the following:


    ```

    func fetchBooks() {

    self.mainViewPresenter?.fetchBestSellerBooks(callBack: { lists in

    if let lists = lists {

    self.lists = lists

    DispatchQueue.main.async {

    self.refreshControl.endRefreshing()

    self.tableView?.reloadData()

    }

    }

    })

    }

    ```


    This here marks the end of **step 3.2**. We have now completely refactored the
    logic related to our feature.


    ##### Test Value


    Before we jump to the next step, let’s try to do something that might showcase
    the value of all the tests that we’ve been adding. Inside `MainViewModel` let’s
    replace the `fetchBestSellerBooks` method with the following code. We simply remove
    the return function after `callBack(lists)`, and as a result of this, the callback
    will be called twice. This is a ticking time bomb, as this misbehavior is not
    causing bugs now but can cause problems in the future. If you run the app now,
    it will work as expected because we have a guard on nil inside `MainViewController`.
    But if we remove that guard one day or reuse that code somewhere else, bugs will
    start showing. However, if we just run our tests now, we’ll see that they’ll catch
    this (Figure [6-21](#505360_1_En_6_Chapter.xhtml#Fig21)).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig21_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    Failing unit tests


    ```

    public func fetchBestSellerBooks(callBack: @escaping (_ lists:[List]?) -> Void)
    {

    self.networkLayer?.executeNetworkRequest(callBack: { data in

    guard let data = data else {

    callBack(nil)

    return

    }

    var response:Response?

    do {

    response = try JSONDecoder().decode(Response.self, from: data)

    } catch {

    print(error.localizedDescription)

    }

    if let lists = response?.results.lists {

    callBack(lists)

    }

    callBack(nil)

    })

    }

    ```


    #### Rerun Verification Tests


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig22_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    Step 3.3


    All this time we’ve been working on refactoring one responsibility of `MainViewController`,
    which is “Fetch latest books on startup.” Before we can say we’re done with this
    responsibility, we need to run the verification test we added in **step 3.1**
    to verify that everything is running as expected (Figure [6-22](#505360_1_En_6_Chapter.xhtml#Fig22)).
    If we try to run `testShowingBestSellerBooks()` (Figure [6-23](#505360_1_En_6_Chapter.xhtml#Fig23)),
    it should pass ✅.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig23_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig23_HTML.jpg)


    Figure 6-23


    Test passing


    ### Refactor the Rest of the Responsibilities


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig24_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Repeats step 3 and its substeps


    Back in **step 2** we identified six responsibilities of **MainViewController**.
    We have just finished refactoring the first responsibility. Now we should carry
    out the same steps for the rest of the responsibilities one by one (Figure [6-24](#505360_1_En_6_Chapter.xhtml#Fig24)).


    ### Next Starting Point


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig25_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig25_HTML.jpg)


    Figure 6-25


    Step 4


    Once we’re done refactoring all the responsibilities in `MainViewController`,
    we will basically go back to step 1 and repeat the process all over again (Figure
    [6-25](#505360_1_En_6_Chapter.xhtml#Fig25)). So we will pick a new starting point
    and refactor it completely as we did for `MainViewController`.


    ## Exercise


    We are done with the first responsibility of **MainViewController.** For your
    exercise, try refactoring the rest of the responsibilities using the same process
    we followed in this chapter.'
