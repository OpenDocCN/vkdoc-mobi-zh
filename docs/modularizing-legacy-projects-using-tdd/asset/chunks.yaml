    ## 何时不应使用 TDD？


    这个问题的答案具有主观性。在几乎所有情况下，使用 TDD 都是有意义的。然而，某些用例并不值得采用 TDD。TDD 的优势在长期项目中最为明显。因此，如果你正在做一个短时间就能完成的小项目，并且之后不会再重访，那么为了追求速度而跳过
    TDD，只在之后添加测试，甚至完全不添加测试，或许也是合理的。这完全取决于项目的性质。归根结底，TDD 是一种工具，是否在需要时使用它，完全取决于你自己。


    ## 重构


    我们之前已经多次提到重构。它是 TDD 循环中的第三步。那么，什么是重构呢？重构是指在不改变代码外部行为的前提下，改变内部代码结构或编写方式的过程。重构总是通过一系列小的、迭代的步骤来完成。每一步都应该增强我们代码的结构，同时又要足够小，以便于理解。一个有意义的小型重构示例是将一段代码移动到一个新的辅助函数中，或者将其提取到一个新类中。虽然这看起来微不足道，但当执行了无数个小重构后，我们最终会开始看到它们对代码产生的影响。每应用一次修改，我们都可以通过运行测试来确保它不会破坏任何东西——当然，前提是我们一直在使用
    TDD。


    ## 模块化


    术语“模块化”指的是将一个系统划分为多个相对独立、可互换且具有明确定义接口的模块。每个模块都足够小巧和简单，以便被充分理解和广泛测试；每个模块都包含了执行其预定功能所需的一切。我们在设计系统时可以追求模块化的方法，而使用
    TDD 会鼓励我们这样做。然而，如果我们有一个非模块化的系统，我们仍然可以通过重构来使其模块化。一个非模块化的应用程序，就其本质而言，会包含大量代码坏味，不可测试，并且更难以维护。你将在后续章节中学习更多关于如何通过使用
    TDD 对遗留应用进行模块化的过程。在本章剩余部分，让我们先看一些 TDD 实战的例子，从测试结构开始。


    ## 测试结构


    在我们开始使用 TDD 编写测试之前，先谈谈我们将如何组织测试结构。一个适用于所有测试的良好结构如下：


    1.  设置测试数据。

    2.  调用被测方法。

    3.  断言返回了预期结果。


    记住这种模式的一个更简单的方法是“给定”、“当”和“那么”三元组，它受行为驱动开发（BDD）的启发，其中 *给定* 反映测试准备，*当* 反映方法调用，*那么*
    反映断言部分。


    这种模式确保了你的测试保持一致性且易于阅读。除此之外，按照这种结构编写的测试往往更短小、更清晰。在本书的所有测试中，我们都将使用这种结构。


    ## 让我们实践 TDD


    现在，让我们举一个例子，并尝试使用 TDD 来实现它。请打开本章的入门项目。你可以在本章的资源中找到它。我们想创建一个税收计算器，它能在原始工资中减去 30%
    的税后计算出净工资。让我们从第一步开始：编写测试。我们的第一个测试可以像这样：


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    }

    ```


    最终，一个测试代表一个需求，而上述测试描述了我们最基本的需求：存在一个名为 `TaxCalculator` 的类。因为这一行代码甚至无法编译，你可能会认为我们走错了方向，但实际上我们已经完成了第一步：我们编写了一个失败的测试。


    进入第二步，让我们用最少的代码让这个测试通过。为此，我们需要添加以下代码：


    ```

    class TaxCalculator: NSObject {

    }

    ```


    现在，如果运行我们的测试，它会通过，这意味着我们完成了第二步。现在进入第三步，检查是否有需要重构的地方。现在还没有，因为我们只写了两行代码。


    既然我们已经完成了这三个步骤，接下来要做的就是重复 TDD 循环。让我们先给测试添加一个新的需求，使其失败。下一个需求是，`TaxCalculator` 中有一个函数，它接收工资并计算净工资。当我们把这个需求翻译成代码时，测试会变成这样：


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(100)

    }

    ```


    现在让我们通过修改 `TaxCalculator` 来修复这个测试，但同样要使用最少的代码。所以基本上我们只需要这样做：


    ```

    class TaxCalculator: NSObject {

    public func calculate(salary: Int) -> Int {

    return 0

    }

    }

    ```


    现在测试通过了，并且不需要重构，让我们再重复一次循环。这次我们将添加对函数输出的断言需求：


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(100)

    // Then

    XCTAssertEqual(netSalary, 70,

    "Net salary failed")

    }

    ```


    如果你运行这个测试，它会失败，这正是我们所期望的。但在修复测试之前，我们需要测试一个关键点。如果你在项目工作中看到消息 `"Net salary failed"`
    ，你认为自己能知道项目当前的问题所在，还是需要去调试？如果答案是否定的，那么你需要编写一个描述性的消息，以帮助任何参与此项目的人（可能是未来的你自己）知道他们刚刚破坏了什么：


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(salary: 100)

    // Then

    XCTAssertEqual(netSalary, 70,

    "Net salary should be 70$ when you subtract 30% taxes from 100$")

    }

    ```


    如果你看到 `"Net salary should be 70$ when you subtract 30% taxes from 100$"` ，你将确切地知道问题是什么，以及需要检查哪个方法。


    现在我们需要编写使测试通过的代码。添加代码后，它应该像这样：


    ```

    class TaxCalculator: NSObject {

    public func calculate(salary: Int) -> Int {

    return salary - ((salary * 30)/100);

    }

    }

    ```


    运行测试后，测试现在通过了，并且我们仍然不需要重构（图 1-2）。


    ![../images/505360_1_En_1_Chapter/505360_1_En_1_Fig2_HTML.jpg](img/505360_1_En_1_Fig2_HTML.jpg)


    图 1-2


    `testExample` 通过

