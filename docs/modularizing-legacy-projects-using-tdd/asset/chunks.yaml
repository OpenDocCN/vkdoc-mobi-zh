  raw: '### Handle a Failing Request


    Now that we’ve covered making a successful request with a test case, let’s write
    test cases for failure scenarios. In this chapter, we’ll cover two situations
    where our request might fail. First is if the server doesn’t return data at all.
    The second is a client-side failure, which happens if we don’t provide a valid
    URL to perform the request on. So let’s write these two tests.


    Let’s add this test that simulates the server returning no data and an error:


    ```

    func testExecutingFailedRequest() {

    // Given

    let session = URLSessionMock()

    session.stubbedData = nil

    let network = NetworkLayer(session: session)

    let request = TestRequest()

    let env = APIEnvironment.production

    // When

    let expectation = XCTestExpectation(description: "Request is done")

    var actualData: Data?

    var actualError: APIError?

    network.executeRequest(request, callBack: { data, error in

    actualData = data

    actualError = error

    expectation.fulfill()

    })

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    XCTAssertNotNil(session.request)

    XCTAssertEqual(session.request?.httpMethod, "GET")

    XCTAssertEqual(session.request?.httpBody, "Request Data".data(using: .utf8))

    XCTAssertEqual(session.request?.url, request.createURLRequest(with: env)?.url)

    XCTAssertNil(actualData)

    XCTAssertEqual(actualError, .requestFailed)

    }

    ```


    Here we tell our mock session to not return any data, and then we assert that
    `NetworkLayer` correctly handles this scenario by checking the value of the returned
    error. This test will fail for now. Let’s add the second test and then we’ll fix
    both.


    We want to add another test that simulates the scenario where we attempt to make
    an invalid request. To create this test, we need to create a new struct that conforms
    to RequestProtocol. This struct should describe our invalid request:


    ```

    struct InvalidRequest: RequestProtocol {

    var body: Data? {

    return nil

    }

    var path: String {

    return "INVALID PATH"

    }

    var queryItems: [URLQueryItem]? {

    return nil

    }

    var method:HTTPMethod {

    return .GET

    }

    }

    ```


    Now let’s add our test:


    ```

    func testExecutingRequestWithInvalidURL() {

    // Given

    let session = URLSessionMock()

    session.stubbedData = "Sample Data".data(using: .utf8)

    let network = NetworkLayer(session: session)

    let request = InvalidRequest()

    // When

    let expectation = XCTestExpectation(description: "Request is done")

    var actualData: Data?

    var actualError: APIError?

    network.executeRequest(request, callBack: { data, error in

    actualData = data

    actualError = error

    expectation.fulfill()

    })

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    XCTAssertNil(session.request)

    XCTAssertNil(actualData)

    XCTAssertEqual(actualError, .invalidRequest)

    }

    ```


    To make our tests pass, we’ll have to modify the `executeRequest` function to
    handle these two scenarios.


    First, we’ll need to add two cases to `APIError`:


    ```

    enum APIError: Error {

    case requestFailed

    case invalidRequest

    }

    ```


    And we’ll need to change the implementation of `executeRequest` to this:


    ```

    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    {

    guard let urlRequest = request.createURLRequest(with: Self.environment) else {

    callBack(nil, .invalidRequest)

    return

    }

    let task = self.session.dataTask(with: urlRequest) { data, response, error in

    guard let data = data else {

    callBack(nil, .requestFailed)

    return

    }

    callBack(data, nil)

    }

    task.resume()

    }

    ```


    When we detect that the request is invalid or the request failed, we call our
    completion handler with the appropriate value of type `APIError`.


    ### Putting It All Together


    Since all our tests are passing, then it’s time to use the new API in our app.
    Let’s take a look at a high-level overview of how our design should look like
    (Figure [9-7](#505360_1_En_9_Chapter.xhtml#Fig7)).


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig7_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Integrating new network layer


    Our `MainViewModel` will use the public API of `NetworkLayer` that is `executeRequest`
    and will pass it a request. This request will be of type `BookRequest`. Then `NetworkLayer`
    will use the passed books request to retrieve the required information and then
    execute the request. When the request is done, `NetworkLayer` will return the
    response back to the view model through the callback.


    Given this overview, we know we need to create a new component, which is `BookRequest`.
    Let’s create a test case class for it and name it `BookRequestTests`. And we’ll
    add these tests in it:


    ```

    func testBookRequestHTTPMethod() {

    //Given

    let bookRequest = BooksRequest()

    //When & Then

    XCTAssertEqual(bookRequest.method, .GET)

    }

    func testBookRequestURL() {

    //Given

    let bookRequest = BooksRequest()

    let env = APIEnvironment(scheme: "http", host: "test.com", port: 433, API_KEY:
    "")

    // When

    let urlRequest = bookRequest.createURLRequest(with: env)

    //When & Then

    XCTAssertEqual(urlRequest?.url?.absoluteString, "http://test.com:433/svc/books/v3/lists/overview.json?offset=20&api-key=\(APIEnvironment.production.API_KEY)")

    }

    func testBookRequestBody() {

    //Given

    let bookRequest = BooksRequest()

    //When & Then

    XCTAssertNil(bookRequest.body)

    }

    ```


    To make these tests pass, we’ll have to actually add `BookRequest` and have it
    conform to `RequestProtocol`:


    ```

    struct BooksRequest: RequestProtocol {

    var path: String {

    return "/svc/books/v3/lists/overview.json"

    }

    var queryItems: [URLQueryItem]? {

    return [URLQueryItem(name: "offset", value: "20"), URLQueryItem(name: "api-key",
    value: NetworkLayer.environment.API_KEY)]

    }

    var method:HTTPMethod {return .GET}

    var body: Data? {return nil}

    }

    ```


    Now let’s remove our old code from `NetworkLayer` and fix the build error that
    will arise by using the new API along with the newly created `BookRequest`. Our
    `NetworkLayer` class should finally look like this:


    ```

    typealias NetworkCompletion = (Data?, APIError?) -> Void

    enum APIError: Error {

    case requestFailed

    case invalidRequest

    }

    class NetworkLayer {

    // MARK:- Variables

    let session: URLSession

    static var environment: APIEnvironment {

    return isTesting() ? .testing : .production

    }

    // MARK:- Initializer

    init(session:URLSession = .shared) {

    self.session = session

    }

    // MARK:- Public Functions

    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    {

    guard let url = request.createURL(with: Self.environment) else {

    callBack(nil, ..invalidRequest)

    return

    }

    var urlRequest = URLRequest(url: url)

    urlRequest.httpMethod = request.method.rawValue

    urlRequest.httpBody = request.body

    let task = self.session.dataTask(with: urlRequest) { data, response, error in

    guard let data = data else {

    callBack(nil, .requestFailed)

    return

    }

    callBack(data, nil)

    }

    task.resume()

    }

    // MARK:- Helper Functions

    static func isTesting() -> Bool {

    return ProcessInfo.processInfo.arguments.contains("TESTING")

    }

    }

    ```


    Now we’ll have to make two changes. First, we’ll modify our code in `MainViewModel`
    to use the new API.


    We’ll replace this line


    ```

    self.networkLayer?.executeNetworkRequest(callBack: { data in

    ```


    by this line:


    ```

    self.networkLayer?.executeRequest(BooksRequest(), callBack: { (data, error) in

    ```


    We’ll also need to update `NetworkLayerStub` as it’s causing a build error as
    well:


    ```

    class NetworkLayerStub: NetworkLayer {

    var stubbedData:Data?

    init(stubbedData:Data) {

    self.stubbedData = stubbedData

    }

    override func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    where T : RequestProtocol {

    let jsonData = self.stubbedData!

    callBack(jsonData, nil)

    }

    }

    ```


    Now we are all done! If we run our whole test suite including our verification
    tests (Figure [9-8](#505360_1_En_9_Chapter.xhtml#Fig8)), everything will pass.
    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Figa_HTML.gif](images/505360_1_En_9_Chapter/505360_1_En_9_Figa_HTML.gif)


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig8_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Test suite passing'
