  trans: '

    # 练习


    我们有一个用于下载图片的 `UIImageView` 扩展。该扩展使用原生 API 从给定的 URL 加载图片。你的任务是修改此扩展的实现，改用我们新创建的
    `NetworkLayer`。


    # 总结


    网络通信几乎是每个应用的必备需求。它让我们能够将应用提升到新的高度。能够从任何网络服务请求资源，为我们提供了无数种改进应用的可能性。


    iOS URL 加载系统由 iOS Foundation 框架原生提供的多个类和结构体组成。我们使用该系统通过互联网协议与服务器进行通信。该系统的主要类是
    `URLSession`，它模拟了网页浏览器中一个打开标签页或窗口内的会话。同一会话内的请求共享相同的配置和缓存。我们使用 `URLSession` 实例来创建
    `URLSessionTask` 实例。这些任务可以从服务器获取数据、下载/上传文件，或与服务器建立流连接。我们使用 `URLSessionConfiguration`
    来配置会话的行为。


    当我们的应用执行网络调用时，为网络代码编写测试至关重要。网络层的任何问题都极易导致应用出现严重错误。例如，如果进行了不必要的网络调用，还可能导致性能问题。为网络层编写测试有时可能具有挑战性，但对于维护应用质量来说是不可或缺的。


    在本章中，我们遵循测试驱动的方法重写了网络层。我们将与环境相关的代码分离出来，并为其编写了测试。我们还利用协议，能够轻松创建具有不同端点和参数的新请求，这也通过测试得到了覆盖。最后，当实际执行网络调用时，我们通过使用测试替身，成功用测试覆盖了这一环节。我们注入了一个模拟的
    `URLSession`，并利用它来断言发出的请求。由于应用中消费网络代码的部分已经通过了测试覆盖，我们得以自信地做出这些更改。完成后，我们能够验证这些更改是有效的，并且没有破坏任何功能。


    # 10. 驯服 Core Data


    Core Data 是 iOS 开发者最著名的框架之一。自 iOS 3 发布以来，Core Data 就已经可用，并且自那时起已历经大量演变。一个常见的误解是，认为
    Core Data 是一个数据库或数据库封装器。尽管数据持久化是它的特性之一，但 Core Data 远不止于此。Core Data 的本质是管理我们应用程序的对象图。对象图基本上是通过关系连接起来的对象集合（图
    10-1）。Core Data 管理这些图中的对象，如果需要，我们可以使用 Core Data 将对象图持久化到磁盘上。除此之外，该框架还具有数据验证和撤销/重做管理等多种其他功能。


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig1_HTML.jpg](img/505360_1_En_10_Fig1_HTML.jpg)


    图 10-1 对象图


    尽管 Core Data 如此著名，许多开发者在使用时仍会遇到困难。这主要由两个原因造成。首先，许多开发者在不完全理解其内部乃至外部运作机制的情况下，就一头扎进
    Core Data 的使用中。Core Data 包含许多构建块，如果不能完全理解每个块负责什么，就很容易导致误用。其次，同样重要的是缺乏测试。Core Data
    是任何应用中最难为其编写测试的部分之一。因此，许多开发者选择不对其 Core Data 层进行测试覆盖。我们在之前的章节中反复强调了测试的重要性，而在 Core
    Data 方面，这种重要性更为突出。


    ## Core Data 栈


    现在我们已经了解了 Core Data 是什么以及它能做什么，是时候探索其内部运作机制了。Core Data 有许多相互交互的构建块（图 10-2）。理解每个构建块的功能对于完全掌握这个框架并能够正确使用它至关重要。


    主要构建块包括：


    1.  托管对象模型

    2.  持久化存储协调器

    3.  托管对象上下文


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig2_HTML.jpg](img/505360_1_En_10_Fig2_HTML.jpg)


    图 10-2 Core Data 栈


    ### 托管对象模型


    托管对象模型是对要管理的对象图的描述。这个描述基本上就是模型的数据模式。它包含了实体及其属性，以及与其他实体的关系。数据模式由 `.xcdatamodeld`
    文件表示，Xcode 附带了一个强大的编辑器，可以轻松编辑模式文件。我们可以直接在 Xcode 的编辑器中轻松创建实体、建立关系、对模式进行版本控制以及准备迁移。Core
    Data 不直接与文件交互，而是与 `NSManagedObjectModel` 的实例交互。该类提供了描述我们模式的 `.xcdatamodeld` 文件的程序化表示形式，Core
    Data 能够理解并使用它。虽然典型的 Core Data 实现会有一个 `NSManagedObjectModel` 类的实例，但也可以有多个。


    ### 持久化存储协调器


    持久化存储协调器由 `NSPersistentStoreCoordinator` 类的实例表示，它在 Core Data 的功能中扮演着关键角色。顾名思义，持久化存储协调器协调托管对象上下文与持久化存储之间的关系。它负责加载、缓存和持久化数据。尽管它是
    Core Data 栈中最重要的成员之一，但你很少会直接与之交互。


    ### 持久化存储


    持久化存储代表了数据的实际存储位置。我们之前提到过 Core Data 管理对象图，但是为了让框架发挥作用，持久化存储协调器需要至少连接到一个持久化存储。这允许协调器将数据加载到上下文中，并将新数据推送到存储中，从而使新更改成为对象图状态的永久部分。


    Core Data 提供了四种内置的持久化存储类型：


    1.  SQLite：此存储由 SQLite 数据库支持，是最广泛使用的存储类型。

    2.  XML：此存储由 XML 文件支持。

    3.  二进制：此存储由二进制数据文件支持。

    4.  内存中：此存储利用应用的内存进行存储。它只是部分持久化的，因为当应用因任何原因终止时，数据会丢失。


    你也可以通过子类化 `NSAtomicStore` 或 `NSIncrementalStore` 来创建自己的存储类型。

