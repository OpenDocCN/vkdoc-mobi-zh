- fmt: '# Maximum Out of TDD


    What we did in the introduction is a quick brief about TDD. But to make TDD improve
    your quality significantly, you need to change your way of thinking about test
    cases. Test cases are not just happy scenarios, they should also cover corner
    cases. Most of the time, you will write code that fulfills all happy scenarios.
    Let’s try to improve our test cases. You need to think about how to break it.
    What if someone passes a fraction? What if someone passes a negative value? What
    if someone passes zero?


    We’re gonna handle these using the exact same steps. Let’s take the fraction scenario
    and write a test for it:


    ```

    func testPassingFractionNumber() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = try calculator.calculate(salary: 0.5)

    // Then

    XCTAssertEqual(netSalary, 0.35,

    "Net salary should be 0.35$ when you subtract 30% taxes from 0.5$")

    }

    ```


    Now to fix the test we’ll have to do the following:


    ```

    class TaxCalculator: NSObject {

    public func calculate(salary: Double) throws -> Double {

    return salary - (salary * 0.3);

    }

    }

    ```


    Still no need for refactoring, so we’ll repeat once again. Now let’s consider
    the cases for zero and negative. We’ll probably need to throw an error in these
    cases. Which is exactly what we’re going to reflect in our tests:


    ```

    func testPassingNegativeNumber() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    do {

    _ = try calculator.calculate(salary: -1)

    } catch let caughtError as TaxCalculatorError {

    // Then

    XCTAssertEqual(caughtError,  .negativeSalaryError, "Should throw error when passing
    a negative salary.")

    }

    }

    func testPassingZero() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    do {

    _ = try calculator.calculate(salary: 0)

    } catch let caughtError as TaxCalculatorError {

    // Then

    XCTAssertEqual(caughtError,  .zeroSalaryError, "Should throw error when passing
    a zero salary.")

    }

    }

    ```


    After applying step 2, our class would look like this:


    ```

    enum TaxCalculatorError: Error {

    case negativeSalaryError

    case zeroSalaryError

    }

    class TaxCalculator: NSObject {

    public func calculate(salary: Double) throws -> Double {

    if salary < 0  {

    throw TaxCalculatorError.negativeSalaryError

    }

    if salary == 0  {

    throw TaxCalculatorError.zeroSalaryError

    }

    return salary - (salary * 0.3);

    }

    }

    ```


    Now that all tests are passing, we can move on to step 3. We can probably refactor
    error handling into a helper function:


    ```

    enum TaxCalculatorError: Error {

    case negativeSalaryError

    case zeroSalaryError

    }

    class TaxCalculator: NSObject {

    public func calculate(salary: Double) throws -> Double {

    try handleErrors(salary: salary)

    return salary - (salary * 0.3);

    }

    private func handleErrors(salary: Double) throws {

    if salary < 0  {

    throw TaxCalculatorError.negativeSalaryError

    }

    if salary == 0  {

    throw TaxCalculatorError.zeroSalaryError

    }

    }

    }

    ```


    And after any refactor, we can simply run our tests to make sure we did not break
    any functionality in the process (Figure [1-3](#505360_1_En_1_Chapter.xhtml#Fig3)).


    ![../images/505360_1_En_1_Chapter/505360_1_En_1_Fig3_HTML.jpg](images/505360_1_En_1_Chapter/505360_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    All tests passed


    ## Exercise


    `TaxCalculator` now calculates the salary after removing a constant percentage,
    which is always 30%. For your exercise, try making this percentage dynamic, meaning
    that we can pass the `calculate` function the salary and a custom percentage.
    We also want to keep the 30% as the default.


    ## Summary


    Untested code is basically a ticking time bomb that can explode at any second
    in the form of bugs and crashes. Even the tiniest of changes can introduce regressions.
    And these regressions can only be caught by testing. We found that we can’t solely
    depend on manual testing and need to make use of automated testing.


    Though writing tests has tremendous value and directly contributes to a project’s
    quality, most developers don’t do it. This is because for many developers, writing
    tests is quite boring. They’d rather be writing actual code instead of writing
    tests for code they just wrote. However, there is one way of developing that completely
    revolutionized how we look at tests, which is Test-Driven Development (TDD).


    TDD is the process of writing tests first before writing code. Doing so leads
    to us having a project that is highly covered by tests. TDD transforms the process
    of writing tests from a boring ordeal to a fun design activity. By having to write
    tests before we write code, tests now become a way of defining our requirements
    and help us think how to achieve these requirements.


    TDD has a direct and substantial effect on the number of tests in our projects.
    We add a test before writing any code, which means all our code will be covered
    by tests. Working on a code base that has high test coverage can be life changing.
    It efficiently catches regressions and gives confidence for the developer whenever
    a change is made through a very fast feedback loop.


    TDD doesn’t only affect our test coverage, which helps in maintaining our external
    quality. It also directly affects the quality of code. Writing tests before code
    makes us clearly think about what the code should do and how it will do it. And
    having to write tests first also forces us to write testable code, which in turn
    translates to loosely coupled code with good design.


    We can use TDD in various settings. We can use it on new projects from the start
    or when adding new features to old legacy projects. We can also apply TDD when
    attempting to refactor parts of old code or even when attempting to modularize
    a legacy app.


    The TDD process is a very simple one. We have just three steps. First, we write
    a failing test. In order to write a failing test, we need to think about what
    the code should do and translate this requirement into a test. The second step
    is to write as little code as possible to make this test pass. And finally when
    we have a passing test, we start to think if we can improve our code in any way,
    be it a design change or an implementation change. When we finish step 3 and we’re
    sure that our change (if any) didn’t make any of our tests break, we loop back
    again to step 1 and find a new requirement that we can translate into a failing
    test.


    # 2. Unit Tests


    As you know by now, TDD is a process in which you write a test first before writing
    actual code. But before jumping into TDD, you need to understand the basics of
    testing in iOS. Luckily, every year, `Xcode` and `Swift` are becoming more and
    more powerful when it comes to testing. And the testing framework `XCTest` is
    also evolving with them.


    This chapter covers how to use `XCTAssert` functions to write functional tests.
    These are the main components of `XCTest`. You’ll also learn how to use expectations
    to test async code. Next, you’ll go through best practices when it comes to organizing
    your test suite and tests. Then you’ll use the debugger to find and fix errors
    in your tests. Finally, you’ll go through gathering code coverage to make sure
    the tests you’ve written are sufficient.'
