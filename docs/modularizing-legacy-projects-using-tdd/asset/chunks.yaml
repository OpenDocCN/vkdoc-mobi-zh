    , withExtension: \"json\")\nlet booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\n\
    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
    \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
    app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\nThis is almost identical\
    \ to how we set up the already existing tests. The only difference is that we\
    \ now need to stub one more request, which is the reviews request. Here we stub\
    \ it and return a response having no reviews.\n\nNow on to the “When” section:\n\
    \n```swift\n// When\nlet booksTableView = app.tables\nlet cells = booksTableView.cells\n\
    let firstCell = cells.firstMatch\n_ = firstCell.waitForExistence(timeout: 1.0)\n\
