    ## Summary


    When writing tests, we often find ourselves in a position where we need to assert
    on something that we don’t have access to, and sometimes we need to control a
    certain behavior to avoid unpredictability. In these situations, our solution
    to all our problems is test doubles. A test double is any kind of fake object
    that we use in place of the real object, and they have many forms and uses. In
    this chapter we talked about different types of test doubles. We also talked about
    how to create and inject doubles into our code being tested.


    Stubs are one type of test doubles. A stub holds some predefined data and returns
    it instead of returning real data. This is useful in tests to improve speed and
    eliminate unpredictability. Another type of test doubles is mock objects. Mocks
    can also return fake data, but their main function is that they register calls
    made to them. And they can also register the values passed to them through function
    calls. This allows us to assert if a specific interaction between the object we’re
    testing and our mock happened or not.


    There are multiple ways to create our test doubles. We can create them using inheritance,
    where we would subclass the original class and then override and change the functions
    we want to stub or mock. Another way to create doubles is by using protocols.
    If our test object depends on a certain protocol, then we can create our double
    by creating a new component that conforms to that protocol and implementing the
    protocol’s requirement.


    As for injecting our doubles into our code to be tested, this is a fairly simple
    task. We can either inject it through the initializer of the object being tested;
    this is called initializer injection. Or we can use property injection, where
    we would create our object normally and then inject our double by accessing its
    property and assigning our double to it.


    Finally, we explored a specific but highly important type of stubbing, which is
    network stubbing in the UI test layer. We used a third-party library to stub network
    requests. And that allowed us to write more comprehensive UI tests. At the same
    time, this increased the test’s stability and speed.


    # 8. Avoiding Multithreading Nightmares


    Concurrency and multithreading are a core part of iOS development. Understanding
    them and understanding how to properly leverage them is a key part of developing
    a high-quality app. Lack of concurrency usually leads to having nonresponsive
    apps that freeze up once a heavy operation is being performed.


    ## What Is Concurrency?


    The concept of concurrency is that two or more tasks can be defined independently
    and each task can be executed regardless if the other tasks are executing or not.
    This means that two or more tasks can be executed at the same time, in other words,
    executing concurrently.


    Concurrency can be achieved in one of two ways, either by context switching (time
    slicing) or by parallelism. Which way is used depends on the type of processor.
    With a single-core processor, context switching is used, in which the system switches
    between threads quick enough that it virtually seems that both tasks are running
    at the same time. With a multi-core processor, however, concurrency is achieved
    through actually running each thread on a separate core in parallel.


    ### GCD


    So far we have talked about threads and how it’s possible to execute two or more
    tasks on separate threads at the same time. But threads are a low-level tool,
    and managing threads manually to achieve concurrency is a fairly complicated task


    Grand Central Dispatch (GCD) was created by Apple and has been available since
    iOS 4. GCD basically abstracts the manual handling of threads away from the developer.
    It helps developers leverage the multithreading features of the system without
    actually having to create or manage threads themselves. Instead of creating threads,
    you use GCD to schedule tasks, and the system will execute these tasks in the
    most efficient way possible.


    ### Queues


    As mentioned before , GCD abstracts the handling of threads. So after this abstraction,
    what do you deal with? You deal with **dispatch queues** . You can deduce its
    functionality from its name. You submit tasks to a queue, and GCD will execute
    them in FIFO order (First In, First Out). Depending on the available resources,
    the type of queue used, and the dispatching function (function used to submit
    a task), GCD will decide when and on what thread this task will be executed.


    We’ve been saying how great GCD is, and rightfully so. However, just using GCD
    does not guarantee bug-free code. The key is choosing the right type of dispatch
    queue and the right dispatching function.'
