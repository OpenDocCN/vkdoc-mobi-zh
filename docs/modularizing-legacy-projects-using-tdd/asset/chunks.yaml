  raw: '## Testing Pyramid


    As mentioned in the previous chapter, we have three types of testing; each one
    is doing a specific task or answering a particular question. In the unit tests,
    we test the isolated functionality of each class; do our objects do the right
    thing? In the integration tests, we test components that integrate a group of
    other components; do our objects work with each other correctly? And in our UI
    tests, we test the system end to end; does the whole system work? We will use
    all three testing levels while implementing this project. And we’ll see how we
    can combine the Testing Pyramid concept with a TDD implementation approach.


    A user story is the smallest feature that can add value to a user on its own.
    We will work on user stories one by one. Although the user story is minimal, we
    cannot implement it in one go; we need to break it into tiny chunks and finish
    these chunks one by one. Our strategy (Figure [5-3](#505360_1_En_5_Chapter.xhtml#Fig3))
    to finish each user story is writing a failing end-to-end test, and then we will
    design our user story using a set of integration tests. Integration tests will
    define how our objects will communicate with each other; after that, we will go
    through each object and write a failing unit test that will describe how this
    object will do its job. Our integration tests will pass by making all failing
    unit tests pass.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Testing plan diagram


    ## First Story


    > *“As a user, I want to know all types of hot and cold coffee drinks, including
    a picture of the coffee drink.”*


    Let’s open up the starter project, which can be found in this chapter’s resources.
    Firstly, we will need to write a failing end-to-end test that validates that the
    coffee drinks view shows all coffee drinks (Figure [5-4](#505360_1_En_5_Chapter.xhtml#Fig4)).
    When this end-to-end test passes, this will indicate that we finished this story.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Testing plan diagram (end-to-end test added)


    Let’s write our first test, which will be a UI test:


    ```

    func testShowsAllCoffeeDrinks() {

    let app = XCUIApplication()

    app.launchEnvironment = ["coffee_drinks_stubbed": "coffee_drinks_stub"]

    app.launch()

    let coffeeCollectionView = app.collectionViews

    XCTAssertTrue(coffeeCollectionView.cells["coffee1"].exists, "Failed to show the
    first coffee item in plist")

    XCTAssertTrue(coffeeCollectionView.cells["coffee2"].exists, "Failed to show the
    second coffee item in plist")

    }

    ```


    Here we wrote our first end-to-end test. We set up our app using launch arguments,
    which we will discuss in detail later on in this chapter (see section “[CoffeeDrinksDataSource](#505360_1_En_5_Chapter.xhtml#Sec10)”).
    And then we assert that the data is displayed correctly inside our collection
    view.


    ## Architecture


    First, let’s talk about object-oriented design before making the end-to-end test
    pass. Object-oriented design focuses more on the communication between modules
    and communication between objects inside these modules rather than the object
    itself. An object communicates by messages: it receives messages from other objects
    and reacts by sending messages to other objects, returning a value to the original
    sender. An object must do a single task. This lets us change the system’s behavior
    by changing objects’ composition—adding and removing instances, plugging different
    modules together.


    We now need to design how our objects will interact under the hood to deliver
    the required story. There are multiple patterns we can apply, patterns like MVC,
    MVP, MVVM, and many more. All these design patterns help in developing applications
    that are loosely combined and easy to test and maintain. These patterns always
    aim to divide the application into distinct component groups, each group carrying
    a specific aspect of the application. In this project, we will use simple MVP.


    ## MVP


    The Model View Presenter (MVP) architecture pattern (Figure [5-5](#505360_1_En_5_Chapter.xhtml#Fig5))
    separates the data model from a view through a presenter.


    1.  **The view**


    A view component in MVP contains a visual part of the application.


    It contains only the UI, and it does not contain any logic or knowledge of the
    data displayed. It also handles any interaction a user may have with the screen
    and directs it to the presenter.


    1.  **The presenter**


    The presenter is a layer that connects models and views. It triggers the business
    logic and tells the view when to update. It interacts with the model and fetches
    and formats data from the model to update the view.


    1.  **The model**


    This contains a data provider, the code to fetch and update, the data and the
    business logic. Usually, this data is fetched from the network or a local database.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig5_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    MVP design pattern


    ## First Integration Test


    Integration tests are mainly responsible for how our objects integrate and communicate
    with each other. The integration test allows us to think about the design first
    and how all objects will do their job and interact inside the system. As mentioned
    in Chapter [4](#505360_1_En_4_Chapter.xhtml), we write integration tests for highly
    sociable components. By applying the MVP design pattern on the logic we need in
    the first story, we’ll find that our presenter is considered a sociable component.
    Our design can look something like Figure [5-6](#505360_1_En_5_Chapter.xhtml#Fig6).


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig6_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    MVP applied


    If we convert the diagram into code, once `CoffeeDrinksController` is loaded,
    we will initialize `CoffeeDrinksPresenter`, which will take `CoffeeDrinksModel`
    inside the constructor. `CoffeeDrinksPresenter` will contain a method that will
    fetch all coffee drinks and abstract the communication to `CoffeeDrinksModel`
    under the hood; then, the model will return the drinks. Last, `CoffeeDrinksPresenter`
    will update the view. Converting this to a test will be something like the following:


    ```

    func testFetchingAllCoffeeDrinks() {

    //Given

    let expectedDrinks = """

    [

    {

    "name": "coffee1",

    "image_name": "black",

    "desc": "desc1"

    },

    {

    "name": "coffee2",

    "image_name": "black",

    "desc": "desc2"

    }

    ]

    """

    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:expectedDrinks)

    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)

    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)

    // when & then

    XCTAssertEqual( coffeeDrinksPresenter.getDrinksCount(), 2)

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:0), "coffee1")

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:0), "black")

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:1), "coffee2")

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:1), "black")

    }

    ```


    The chart status now will be something like Figure [5-7](#505360_1_En_5_Chapter.xhtml#Fig7).


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig7_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Testing plan diagram (integration #1 test added)


    ## Unit Tests


    If you run the integration test, it will definitely fail. We need to go through
    each object and start implementing it using unit tests until we make the integration
    test pass. We will write a failing unit test, then make it pass, and then refactor
    it; check Figure [5-8](#505360_1_En_5_Chapter.xhtml#Fig8).


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig8_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    TDD cycle on units'
  trans: "\n# 测试金字塔\n\n如前一章所述，我们共有三种类型的测试；每种测试都执行特定任务或解答特定问题。在**单元测试**中，我们测试每个类的独立功能——我们的对象是否做了正确的事情？在**集成测试**中，我们测试集成其他组件的组合组件——我们的对象能否正确协作？而在**UI\
    \ 测试**中，我们进行端到端的系统测试——整个系统是否正常工作？在实现这个项目时，我们将同时使用这三个测试层级，并学习如何将测试金字塔概念与 TDD 实现方法相结合。\n\
    \n用户故事是最小且能独立为用户带来价值的功能。我们将逐个处理用户故事。尽管用户故事很小，但无法一次性实现；我们需要将其拆解为微小模块，然后逐个完成这些模块。我们完成每个用户故事的策略（图\
    \ 5-3）是：先编写一个会失败的端到端测试，然后通过一组集成测试来设计用户故事。集成测试将定义对象间如何通信；接着我们会遍历每个对象，编写描述其职责的失败单元测试。当所有单元测试通过时，集成测试也将随之通过。\n\
    \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg](img/505360_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3  \n测试计划示意图\n\n## 第一个故事\n\n> “作为用户，我希望了解所有热饮和冷饮咖啡品种，包括咖啡饮品的图片。”\n\n让我们打开本章资源中的入门项目。首先，我们需要编写一个会失败的端到端测试，验证咖啡饮品视图是否显示所有咖啡饮品（图\
    \ 5-4）。当这个端到端测试通过时，就表明我们完成了这个用户故事。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg](img/505360_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4  \n测试计划示意图（已添加端到端测试）\n\n我们来编写第一个测试（UI 测试）：\n\n```\nfunc testShowsAllCoffeeDrinks()\
    \ {\n    let app = XCUIApplication()\n    app.launchEnvironment = [\"coffee_drinks_stubbed\"\
    : \"coffee_drinks_stub\"]\n    app.launch()\n    let coffeeCollectionView = app.collectionViews\n\
    \    XCTAssertTrue(coffeeCollectionView.cells[\"coffee1\"].exists, \"Failed to\
    \ show the first coffee item in plist\")\n    XCTAssertTrue(coffeeCollectionView.cells[\"\
    coffee2\"].exists, \"Failed to show the second coffee item in plist\")\n}\n```\n\
    \n这里我们编写了第一个端到端测试。通过启动参数配置应用（本章后续章节“CoffeeDrinksDataSource”将详细讨论），然后断言集合视图中数据是否正确显示。\n\
    \n## 架构设计\n\n在让端到端测试通过之前，我们先讨论面向对象设计。面向对象设计更关注模块间通信及模块内部对象间的通信，而非对象本身。对象通过消息通信：它接收其他对象的消息，并通过向其他对象发送消息或向原始发送者返回值来做出响应。每个对象必须执行单一职责，这使得我们可以通过改变对象组合（增删实例、组合不同模块）来改变系统行为。\n\
    \n现在我们需要设计对象在后端如何交互以实现所需用户故事。有多种模式可供选择，如 MVC、MVP、MVVM 等。这些设计模式都有助于开发松散耦合、易于测试和维护的应用程序。它们通常将应用划分为不同的组件组，每个组件组承载应用的特定方面。在本项目中，我们将使用简单的\
    \ MVP 模式。\n\n## MVP 模式\n\n模型-视图-呈现器（MVP）架构模式（图 5-5）通过呈现器将数据模型与视图分离。\n\n1. **视图**\n\
    \nMVP 中的视图组件包含应用的视觉部分。\n\n它仅包含 UI，不包含任何逻辑或数据的显示知识。它还处理用户与屏幕的交互，并将交互定向到呈现器。\n\n\
    2. **呈现器**\n\n呈现器是连接模型和视图的层。它触发业务逻辑，并告知视图何时更新。它与模型交互，从模型中获取并格式化数据以更新视图。\n\n3.\
    \ **模型**\n\n模型包含数据提供者、获取和更新数据的代码及业务逻辑。通常数据从网络或本地数据库获取。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig5_HTML.jpg](img/505360_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5  \nMVP 设计模式\n\n## 第一个集成测试\n\n集成测试主要负责验证对象如何集成和通信。它让我们优先思考设计，以及所有对象如何履行职责并在系统内部交互。如第\
    \ 4 章所述，我们为高度交际性组件编写集成测试。将 MVP 设计模式应用于第一个用户故事的逻辑后，我们会发现呈现器就是这样的交际性组件。我们的设计可能如图\
    \ 5-6 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig6_HTML.jpg](img/505360_1_En_5_Fig6_HTML.jpg)\n\
    \n图 5-6  \nMVP 应用场景\n\n如果将示意图转换为代码：当`CoffeeDrinksController`加载时，将初始化`CoffeeDrinksPresenter`，其构造函数接收`CoffeeDrinksModel`。`CoffeeDrinksPresenter`包含获取所有咖啡饮品的方法，并在底层抽象与`CoffeeDrinksModel`的通信；模型返回饮品数据后，`CoffeeDrinksPresenter`更新视图。对应的测试如下：\n\
    \n```\nfunc testFetchingAllCoffeeDrinks() {\n    //Given\n    let expectedDrinks\
    \ = \"\"\"\n    [\n    {\n        \"name\": \"coffee1\",\n        \"image_name\"\
    : \"black\",\n        \"desc\": \"desc1\"\n    },\n    {\n        \"name\": \"\
    coffee2\",\n        \"image_name\": \"black\",\n        \"desc\": \"desc2\"\n\
    \    }\n    ]\n    \"\"\"\n    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:\
    \ expectedDrinks)\n    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)\n\
    \    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model: coffeeDrinksModel)\n\
    \    // when & then\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinksCount(),\
    \ 2)\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index: 0), \"coffee1\"\
    )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index: 0), \"black\"\
    )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index: 1), \"coffee2\"\
    )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index: 1), \"black\"\
    )\n}\n```\n\n当前测试状态如图 5-7 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig7_HTML.jpg](img/505360_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7  \n测试计划示意图（已添加集成测试#1）\n\n## 单元测试\n\n如果运行集成测试，它肯定会失败。我们需要遍历每个对象并开始使用单元测试实现，直到集成测试通过。我们将编写一个会失败的单元测试，使其通过，然后重构——如图\
    \ 5-8 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig8_HTML.jpg](img/505360_1_En_5_Fig8_HTML.jpg)\n\
    \n图 5-8  \n单元级 TDD 循环\n"
- fmt: "### `CoffeeDrinksDataSource`\n\nWe’ll start with our smallest unit, which\
    \ is `CoffeeDrinksDataSource`. It’s an object that has the sole responsibility\
    \ of reading a plist file from disk and returning it in the form of `Data`. Due\
    \ to its nature, we’ll find that writing a test for it will be basically duplicating\
    \ the implementation code. This is an example of the very rare cases where we\
    \ encounter a class that doesn’t need to be tested. But at the same time, we can’t\
    \ inject this logic into another class because we’ll need it to facilitate other\
    \ tests. (More on that later in this chapter.)\n\nNow let’s write our class:\n\
    \n```\nclass CoffeeDrinksDataSource {\n    func plistDataSourcePath() -> String?\
    \ {\n        var fileName = \"coffee_drinks\"\n        // UITests\n        if\
    \ let stubbedFileName = ProcessInfo.processInfo.environment[\"coffee_drinks_stubbed\"\
    ] {\n            fileName = stubbedFileName\n        }\n        return Bundle.main.path(forResource:\
    \ fileName, ofType: \"plist\")\n    }\n\n    public func getData() -> Data? {\n\
    \        let dataPath = plistDataSourcePath()\n        guard let path = dataPath,\
    \ let dataArray = NSArray(contentsOfFile:path) else {\n            return nil\n\
    \        }\n        var data:Data?\n        do {\n            data = try JSONSerialization.data(withJSONObject:\
    \ dataArray)\n        } catch {\n            print(\"JSON serialization failed:\
    \  \\(error)\")\n        }\n        return data\n    }\n}\n```\n\n`CoffeeDrinksDataSource`\
    \ is implemented to read data from the plist file and return data from this plist\
    \ file. There is some extra logic we need to add used only for UI tests. There\
    \ are times when we need our UI test code to pass some information to our mobile\
    \ app, not by typing it into a text field or a user interaction but by sending\
    \ it as a command-line argument or as a launch environment/arguments. If you remember\
    \ the first UI test we wrote, we needed to stub the data inside the coffee drinks\
    \ view instead of depending on the actual data that may change over the application’s\
    \ life and can cause our test to be unreliable. Here we add the ability to stub\
    \ the data returned by the data source through environment variables. We access\
    \ the environment variables using `ProcessInfo.processInfo.environment`.\n\n###\
    \ `CoffeeDrinksModelTests`\n\nSince `CoffeeDrinksModel` depends on `CoffeeDrinksDataSource`,\
    \ if we need to test it precisely, we need to exclude all these objects that `CoffeeDrinksModel`\
    \ depends on and make it return expected data and assert on all public methods\
    \ inside `CoffeeDrinksModel`. This is called **stubbing**.\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9  \n`CoffeeDrinksModel` dependency on `CoffeeDrinksDataSource`\n\n\
    Stubbing means creating a fake version of an object that can stand in for the\
