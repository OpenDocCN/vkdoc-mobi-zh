  raw: '##### NetworkLayer


    Now that we have our integration test, it’s time to go down a level to unit tests.
    We will start with the **Network Module** . But since testing the network layer
    can be quite tricky, we’ll skip its tests for now. But don’t worry. We will go
    deep on how we can test our network layer later in **Chapter** [**9**](#505360_1_En_9_Chapter.xhtml).
    What we’ll do is add our network layer class in its separate module. It’s a real
    simple class. It will only execute a single request and return data:


    ```

    class NetworkLayer {

    let host = "api.nytimes.com"

    let API_KEY = "YOUR_API_KEY"

    let bestSellerBooks = "/svc/books/v3/lists/overview.json"

    public func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void)
    {

    var components = URLComponents()

    components.scheme = "https"

    components.host = host

    components.path = bestSellerBooks

    components.queryItems = [URLQueryItem(name: "api-key", value: API_KEY), URLQueryItem(name:
    "offset", value: "20")]

    guard let url = components.url else {

    callBack(nil)

    preconditionFailure("Failed to construct URL")

    }

    let task = URLSession.shared.dataTask(with: url) {

    data, response, error in

    guard let data = data else {

    callBack(nil)

    return

    }

    callBack(data)

    }

    task.resume()

    }

    }

    ```


    ##### MainViewModel


    Let’s jump to the next class, which will be `MainViewModel` . It’s part of the
    **MainView Module** and will be responsible for creating a `NetworkLayer` object
    and performing network requests and then parsing the response data and returning
    the parsed data through a callback. As usual we will start with `MainViewModelTests.
    We will` write all tests to make sure that this class is working fine and as expected:


    ```

    func testFetchingAndParsingBestSellerBooks() throws {

    // Given

    let testBundle = Bundle(for: type(of: self))

    let booksJSONURL = testBundle.url(forResource: "BestSellerBooksStub", withExtension:
    "json")

    let booksJSON = try Data(contentsOf: booksJSONURL!)

    let expectedLists: [List] = stubbedlists()

    var actualLists: [List] = []

    let networkLayer = NetworkLayerStub(stubbedData: booksJSON)

    let mainViewModel = MainViewModel(networkLayer: networkLayer)

    // when & then

    let waitForBooks = XCTestExpectation(description: "Wait to fetch books")

    mainViewModel.fetchBestSellerBooks { lists in

    actualLists = lists ?? []

    waitForBooks.fulfill()

    }

    self.wait(for: [waitForBooks], timeout: 0.1)

    XCTAssertEqual(actualLists, expectedLists, "Fetched books does not match the expected")

    }

    func stubbedlists() -> [List] {

    let firstBook = BookModel(title: "THE LAST THING HE TOLD ME", contributor: "by
    Laura Dave", author: "Laura Dave", createdDate: "2021-05-26 22:10:24")

    let secondBook = BookModel(title: "SOOLEY", contributor: "by John Grisham", author:
    "John Grisham", createdDate: "2021-05-26 22:10:24")

    let firstList = List(listID: 704, listName: "Combined Print and E-Book Fiction",
    displayName: "Combined Print & E-Book Fiction", books: [firstBook,secondBook])

    return [firstList]

    }

    ```


    The preceding test first sets up an instance of MainViewModel by initializing
    it using a NetworkLayer instance. We then call the function that we’re trying
    to test, which fetches the data from the server, and then we wait till it’s done.
    And finally we assert on the returned data.


    In order to test `MainViewModel,` we need to stub `NetworkLayer` to return specific
    JSON so that we can assert on the output of `MainViewModel`. We need to create
    a new class that will stub the network, as our just added test is not building
    because of that. `NetworkLayerStub` will look like this:


    ```

    class NetworkLayerStub: NetworkLayer {

    var stubbedData:Data?

    init(stubbedData:Data) {

    self.stubbedData = stubbedData

    }

    public override func executeNetworkRequest(callBack: @escaping (_ data:Data?)
    -> Void){

    let jsonData = self.stubbedData

    callBack(jsonData)

    }

    }

    ```


    We solved one build error by adding `NetworkLayerStub,` but the test is still
    not building. Now it’s time to write code to make `MainViewModelTests` pass. For
    that to happen, we need to create `MainViewModel,` and it should look like this
    :


    ```

    class MainViewModel: NSObject {

    private var networkLayer:NetworkLayer?

    init(networkLayer:NetworkLayer?) {

    self.networkLayer = networkLayer

    }

    public func fetchBestSellerBooks(callBack: @escaping (_ data:[List]?) -> Void)
    {

    self.networkLayer?.executeNetworkRequest(callBack: { data in

    guard let data = data else {

    callBack(nil)

    return

    }

    var response:Response?

    do {

    response = try JSONDecoder().decode(Response.self, from: data)

    } catch {

    print(error.localizedDescription)

    }

    if let lists = response?.results.lists {

    callBack(lists)

    return;

    }

    callBack(nil)

    })

    }

    ```


    Here we simply implement the function we need, which is fetchBestSellerBooks .
    The function is passed a callback block as a parameter, which should be called
    with the fetched books when done. We use the instance of NetworkLayer to make
    the request, and we decode the response and then return it in the callback.


    Now if we run `MainViewModelTests` (Figure [6-19](#505360_1_En_6_Chapter.xhtml#Fig19)),
    it should pass ✅.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig19_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    MainViewModelTests passing'
