  raw: '#### NetworkLayer New Design


    We should think about how the new objects will interact with each other without
    looking at the current code in order not to be affected by the current implementation.
    Our design can be something like Figure [9-5](#505360_1_En_9_Chapter.xhtml#Fig5).
    NetworkLayer will use APIEnvironment to get all static data. RequestProtocol is
    a protocol that encapsulates creation of URLRequests. So, whenever we want to
    make a network call, we need to implement RequestProtocol. NetworkLayer will now
    be able to create a URLSessionTask and execute the request.


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig5_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Network layer design


    ### Kickoff


    Since we’ve identified the responsibilities of our `NetworkLayer` class and also
    identified how these responsibilities should be modified, it’s time to start refactoring.


    From our modularization process, we know we need to follow these steps when refactoring:


    1.  Add verification tests.


    2.  Refactor related code.


    3.  Rerun verification tests.


    ### Verification Tests


    So let’s start with our verification test. We need to verify that the functionality
    of `MainViewModel` is exactly the same after the refactor. MainViewModel fetches
    the list of books by consuming `NetworkLayer`, which will make a network request
    call and return the list of books to `MainViewModel` through a callback. We need
    our verification test to verify that this flow is working fine after refactor.
    By looking at our current test suite, we can see that `testFetchBestSellerBooks`
    inside `MainViewIntegrationTests` can act as our verification test. Also if we
    go up a level, we’ll find that we have UI tests covering this as well. Now if
    we break anything in integration between `MainViewModel` and `NetworkLayer`, our
    tests will fail. We can now refactor the NetworkLayer with confidence.


    ### Make a Network Request


    Let’s start by writing a test for this. We’ll create a new test case class and
    call it `NetworkLayerTests` and add this to it:


    ```

    func testExecutingSuccessfulRequest() {

    // Given

    let network = NetworkLayer()

    let request = TestRequest()

    let env = APIEnvironment.production

    // When

    let expectation = XCTestExpectation(description: "Request is done")

    network.executeRequest(request, callBack: {

    expectation.fulfill()

    })

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    // Missing assertion

    }

    ```


    To fix the build errors, let’s add some code. First, let’s add the new API in
    NetworkLayer but leave the implementation empty for now:


    ```

    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    {

    // We''ll leave it empty for now

    }

    ```


    And add this type alias at the top of the file outside the scope of the class:


    ```

    typealias NetworkCompletion = () -> Void

    ```


    ### RequestProtocol


    Now in order to use the new API , we’ll always need to pass an instance that conforms
    to our request protocol. This instance will carry all the info we need to make
    a request. It’s time to define this protocol. Let’s create a new file and add
    this inside:


    ```

    enum HTTPMethod: String {

    case GET

    case POST

    case PATCH

    case PUT

    case DELETE

    }

    protocol RequestProtocol {

    var method: HTTPMethod { get }

    var body: Data? { get }

    var path: String { get }

    var queryItems: [URLQueryItem]? { get }

    }

    ```


    Right now our test is still not building. This is because we need to create our
    `TestRequest` struct inside our test target and make it conform to `RequestProtocol`
    :


    ```

    import Foundation

    @testable import Books

    struct TestRequest: RequestProtocol {

    var method:HTTPMethod {

    return .GET

    }

    var body: Data? {

    return "Request Data".data(using: .utf8)

    }

    var path: String {

    return "/api/mock"

    }

    var queryItems: [URLQueryItem]? {

    return [URLQueryItem(name: "offset", value: "20")]

    }

    }

    ```


    We can add a very useful function to `RequestProtocol` through an extension, which
    is creating a URL describing the request. This will keep our code clean. The URL
    creation still needs the host and scheme to be defined. This won’t change between
    requests; however, it will change between production and testing environments.
    We’ll extract this info to be saved into a new component .


    Let’s start by writing a test for URL request creation and see how it goes. We’ll
    add a new test case class and name it `RequestProtocolTests` `,` and we’ll add
    this test to it:


    ```

    func testCreateURLRequest() {

    // Given

    let environment = APIEnvironment(scheme: "http", host: "test.com", port: 433,
    API_KEY: "KEY")

    let request = TestRequest()

    // When

    let urlRequest = request.createURLRequest(with: environment)

    // Then

    XCTAssertEqual(urlRequest?.url?.absoluteString, "http://test.com:433/api/mock?offset=20")

    XCTAssertEqual(urlRequest?.httpMethod, "GET")

    XCTAssertEqual(urlRequest?.httpBody, "Request Data".data(using: .utf8))

    }

    ```


    For this test to build, we’ll need to create `APIEnvironment`. We’ll skip the
    detailed TDD steps for this component as it is very simple. But after multiple
    TDD cycles, we should end up with this struct :


    ```

    struct APIEnvironment {

    let scheme: String

    let host: String

    let port: Int?

    let API_KEY: String

    static let production: APIEnvironment = .init(scheme: "https", host: "api.nytimes.com",
    port: nil, API_KEY: "YOUR_API_KEY")

    static let testing: APIEnvironment = .init(scheme: "http", host: "localhost",
    port: 8080, API_KEY: "KEY")

    }

    ```


    This just encapsulates the scheme and host of the environment. And also we included
    the API key. And we added two preset instances as static variables.


    To have our create URL request test pass, we’ll need to add this extension:


    ```

    extension RequestProtocol {

    func createURLRequest(with environment: APIEnvironment) -> URLRequest? {

    guard let url = createURL(with: environment) else {

    return nil

    }

    var request = URLRequest(url: url)

    request.httpMethod = method.rawValue

    request.httpBody = body

    return request

    }

    private func createURL(with environment: APIEnvironment) -> URL? {

    var components = URLComponents()

    components.scheme = environment.scheme

    components.host = environment.host

    components.port = environment.port

    components.path = path

    components.queryItems = queryItems

    return components.url

    }

    }

    ```


    We can add this anywhere, but it makes sense to keep it in the same file as the
    protocol.


    ### Execute Request


    After this detour to add the create URL function to `RequestProtocol`, let’s get
    back on track. If we run `testExecutingSuccessfulRequest,` we’ll find that it’s
    failing due to the expectation never being fulfilled. Let’s fix this by simply
    calling the completion handler inside `executeRequest`:


    ```

    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    {

    callBack()

    }

    ```


    Now our test will pass ✅.'
  trans: "\n### NetworkLayer 新设计\n\n为了避免受到当前实现的影响，我们应当在不查看现有代码的情况下，思考新对象之间将如何交互。我们的设计方案可以类似于图\
    \ 9-5。`NetworkLayer` 将使用 `APIEnvironment` 来获取所有静态数据。`RequestProtocol` 是一个封装了 `URLRequest`\
    \ 创建过程的协议。因此，每当我们想要发起网络调用时，都需要实现 `RequestProtocol`。这样一来，`NetworkLayer` 就能够创建 `URLSessionTask`\
    \ 并执行请求。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig5_HTML.jpg](img/505360_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5  \n网络层设计\n\n### 开始行动\n\n既然我们已经明确了 `NetworkLayer` 类的职责，并且也确定了这些职责应如何修改，那么是时候开始重构了。\n\
    \n根据模块化流程，我们知道重构时需要遵循以下步骤：\n\n1.  添加验证测试。\n2.  重构相关代码。\n3.  重新运行验证测试。\n\n### 验证测试\n\
    \n那么就从验证测试开始。我们需要验证 `MainViewModel` 在重构后的功能是否完全一致。`MainViewModel` 通过使用 `NetworkLayer`\
    \ 来获取书籍列表，`NetworkLayer` 会发起网络请求，并通过回调将书籍列表返回给 `MainViewModel`。我们需要验证测试确保这个流程在重构后依然能正常工作。查看当前的测试套件，我们发现\
    \ `MainViewIntegrationTests` 中的 `testFetchBestSellerBooks` 方法可以作为我们的验证测试。此外，再向上看一层，会发现我们也有覆盖此功能的\
    \ UI 测试。现在，如果 `MainViewModel` 和 `NetworkLayer` 之间的集成被破坏，我们的测试将会失败。这样我们就可以放心地重构\
    \ `NetworkLayer` 了。\n\n### 发起网络请求\n\n让我们先为此编写一个测试。创建一个新的测试用例类，命名为 `NetworkLayerTests`，并向其中添加以下内容：\n\
    \n```\nfunc testExecutingSuccessfulRequest() {\n    // 准备\n    let network = NetworkLayer()\n\
    \    let request = TestRequest()\n    let env = APIEnvironment.production\n  \
    \  // 执行\n    let expectation = XCTestExpectation(description: \"请求已完成\")\n  \
    \  network.executeRequest(request, callBack: {\n        expectation.fulfill()\n\
    \    })\n    self.wait(for: [expectation], timeout: 0.1)\n    // 验证\n    // 缺少断言\n\
    }\n```\n\n为了修复构建错误，我们先添加一些代码。首先，在 `NetworkLayer` 中添加新的 API，但暂时保持实现为空：\n\n```\n\
    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)\
    \ {\n    // 暂时保持为空\n}\n```\n\n并在文件顶部、类作用域之外添加这个类型别名：\n\n```\ntypealias NetworkCompletion\
    \ = () -> Void\n```\n\n### RequestProtocol\n\n现在，为了使用新的 API，我们总是需要传递一个符合我们请求协议的实例。这个实例将携带发起请求所需的所有信息。是时候定义这个协议了。创建一个新文件，并在其中添加以下内容：\n\
    \n```\nenum HTTPMethod: String {\n    case GET\n    case POST\n    case PATCH\n\
    \    case PUT\n    case DELETE\n}\n\nprotocol RequestProtocol {\n    var method:\
    \ HTTPMethod { get }\n    var body: Data? { get }\n    var path: String { get\
    \ }\n    var queryItems: [URLQueryItem]? { get }\n}\n```\n\n目前我们的测试仍然无法构建。这是因为我们需要在测试目标内创建\
    \ `TestRequest` 结构体，并使其遵循 `RequestProtocol`：\n\n```\nimport Foundation\n@testable\
    \ import Books\n\nstruct TestRequest: RequestProtocol {\n    var method: HTTPMethod\
    \ {\n        return .GET\n    }\n    var body: Data? {\n        return \"请求数据\"\
    .data(using: .utf8)\n    }\n    var path: String {\n        return \"/api/mock\"\
    \n    }\n    var queryItems: [URLQueryItem]? {\n        return [URLQueryItem(name:\
    \ \"offset\", value: \"20\")]\n    }\n}\n```\n\n我们可以通过扩展为 `RequestProtocol` 添加一个非常有用的函数，即创建一个描述该请求的\
    \ URL。这能保持代码整洁。创建 URL 仍然需要定义主机（host）和方案（scheme）。这些在不同请求之间不会改变；但是，它们在生产环境和测试环境之间会有所不同。我们将这些信息提取出来，保存到一个新的组件中。\n\
    \n让我们先为 URL 请求的创建编写一个测试，看看效果如何。添加一个新的测试用例类，命名为 `RequestProtocolTests`，并向其中添加这个测试：\n\
    \n```\nfunc testCreateURLRequest() {\n    // 准备\n    let environment = APIEnvironment(scheme:\
    \ \"http\", host: \"test.com\", port: 433, API_KEY: \"KEY\")\n    let request\
    \ = TestRequest()\n    // 执行\n    let urlRequest = request.createURLRequest(with:\
    \ environment)\n    // 验证\n    XCTAssertEqual(urlRequest?.url?.absoluteString,\
    \ \"http://test.com:433/api/mock?offset=20\")\n    XCTAssertEqual(urlRequest?.httpMethod,\
    \ \"GET\")\n    XCTAssertEqual(urlRequest?.httpBody, \"请求数据\".data(using: .utf8))\n\
    }\n```\n\n为了让这个测试能够构建，我们需要创建 `APIEnvironment`。由于这个组件非常简单，我们将跳过详细的 TDD 步骤。但是，经过多个\
    \ TDD 周期后，我们最终应该得到这个结构体：\n\n```\nstruct APIEnvironment {\n    let scheme: String\n\
    \    let host: String\n    let port: Int?\n    let API_KEY: String\n\n    static\
    \ let production: APIEnvironment = .init(scheme: \"https\", host: \"api.nytimes.com\"\
    , port: nil, API_KEY: \"YOUR_API_KEY\")\n    static let testing: APIEnvironment\
    \ = .init(scheme: \"http\", host: \"localhost\", port: 8080, API_KEY: \"KEY\"\
    )\n}\n```\n\n这仅仅封装了环境的方案和主机，并且我们也包含了 API 密钥。我们还添加了两个预设实例作为静态变量。\n\n为了让创建 URL 请求的测试通过，我们需要添加这个扩展：\n\
    \n```\nextension RequestProtocol {\n    func createURLRequest(with environment:\
    \ APIEnvironment) -> URLRequest? {\n        guard let url = createURL(with: environment)\
    \ else {\n            return nil\n        }\n        var request = URLRequest(url:\
    \ url)\n        request.httpMethod = method.rawValue\n        request.httpBody\
    \ = body\n        return request\n    }\n\n    private func createURL(with environment:\
    \ APIEnvironment) -> URL? {\n        var components = URLComponents()\n      \
    \  components.scheme = environment.scheme\n        components.host = environment.host\n\
    \        components.port = environment.port\n        components.path = path\n\
    \        components.queryItems = queryItems\n        return components.url\n \
    \   }\n}\n```\n\n这段代码可以放在任何地方，但放在协议所在的同一个文件中比较合理。\n\n### 执行请求\n\n在经历了为 `RequestProtocol`\
    \ 添加创建 URL 函数的小插曲之后，让我们回到正轨。如果运行 `testExecutingSuccessfulRequest`，会发现它因为期望条件从未被满足而失败。让我们通过在\
    \ `executeRequest` 内部直接调用完成处理程序来解决这个问题：\n\n```\npublic func executeRequest(_ request:\
    \ T, callBack: @escaping NetworkCompletion) {\n    callBack()\n}\n```\n\n现在我们的测试将通过\
    \ ✅。\n"
- fmt: '# Mocking URLSession


    We need to update our test, since now it’s passing even though we don’t even make
    any network requests. To be able to test what `NetworkLayer` does internally,
    we need to insert a mock of a `URLSession` and use it to assert that the request
    is performed. Let’s create our mock:


    ```

    class URLSessionMock: URLSession {

    typealias CompletionHandler = (Data?, URLResponse?, Error?) -> Void

    public var stubbedData: Data?

    public var request: URLRequest?

    override func dataTask(with request: URLRequest, completionHandler: @escaping
    CompletionHandler) -> URLSessionDataTask {

    let data = self.stubbedData

    self.request = request

    return URLSessionDataTaskMock {

    completionHandler(data, nil, nil)

    }

    }

    }

    class URLSessionDataTaskMock: URLSessionDataTask {

    private let closure: () -> Void

    init(closure: @escaping () -> Void) {

    self.closure = closure

    }

    override func resume() {

    closure()

    }

    }

    ```


    Here we create a test double to be able to mock a `URLSession`. We create this
    mock by subclassing `URLSession` and overriding the function that creates a data
    task. We override it so that it does two things: first, it saves the inputs that
    are passed to it, and second, it returns an instance of `URLSessionDataTaskMock`,
    which is a test double for `URLSessionDataTask`. Instead of making the network
    request, this mock executes a block that’s passed to it. We use this block to
    identify if the task was run or not.


    Now that we’ve created our test double, it’s time to inject it into our `NetworkLayer`
    instance in our test:


    ```

    func testExecutingSuccessfulRequest() {

    // Given

    let session = URLSessionMock()

    let network = NetworkLayer(session: session)

    let request = TestRequest()

    let env = APIEnvironment.production

    // When

    let expectation = XCTestExpectation(description: "Request is done")

    network.executeRequest(request, callBack: {

    expectation.fulfill()

    })

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    // Missing assertion

    }

    ```


    Now we need to update our class to accept this injection of a `URLSession`. We’ll
    add this variable to our class:


    ```

    let session: URLSession

    ```


    And add a new initializer:


    ```

    init(session:URLSession = .shared) {

    self.session = session

    }

    ```


    Here we pass a session in the initializer and save it in a local variable so we
    can use it to make requests. If no custom session is passed, we default to the
    shared session.


    Now that we have successfully injected our mock, we can now update our test to
    actually assert on the creation and running of a data task:


    ```

    func testExecutingSuccessfulRequest() {

    // Given

    let expectedData = "Sample Data".data(using: .utf8)

    let session = URLSessionMock()

    session.stubbedData = expectedData // #1

    let network = NetworkLayer(session: session)

    let request = TestRequest()

    let env = APIEnvironment.production

    // When

    let expectation = XCTestExpectation(description: "Request is done")

    var actualData: Data?

    var actualError: APIError?

    network.executeRequest(request, callBack: { data, error in // #2

    actualData = data // #3

    actualError = error

    expectation.fulfill()

    })

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    XCTAssertNotNil(session.request)

    XCTAssertEqual(session.request?.httpMethod, "GET")

    XCTAssertEqual(session.request?.httpBody, "Request Data".data(using: .utf8))

    XCTAssertEqual(session.request?.url, request.createURLRequest(with: env)?.url)

    XCTAssertEqual(expectedData, actualData)

    XCTAssertNil(actualError)

    }

    ```


    In this test, we do a couple of things:


    1. Here we tell our session mock what data to return when a request is made.

    2. We change our block since we now expect our function to return data.

    3. Here we save the returned data and error so we can assert on them later on.


    And in our **Then** section, we assert that the request that’s passed to the session
    is created correctly and has the correct method, body, and URL. We also assert
    that the data returned is the data expected. We also assert that there is no error
    returned.


    ## Using URLSession


    To fix this test, we need to utilize the `URLSession` and actually make the request.
    First, we’ll need to add the following so that `NetworkLayer` can provide the
    base URL for our request:


    ```

    public static var environment: APIEnvironment {

    return isTesting() ? .testing : .production

    }

    ```


    Here we make use of our two `APIEnvironment` instances we already created. And
    we return one of them based on the current environment.


    We’ll need to update our `NetworkCompletion` type alias and also add our error
    enum:


    ```

    typealias NetworkCompletion = (Data?, APIError?) -> Void

    enum APIError: Error {

    // We''ll leave it empty for now

    }

    ```


    Then we’ll update our function to actually make the request:


    ```

    public func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)
    {

    guard let urlRequest = request.createURLRequest(with: Self.environment) else {

    return

    }

    let task = self.session.dataTask(with: urlRequest) { data, response, error in

    guard let data = data else {

    return

    }

    callBack(data, nil)

    }

    task.resume()

    }

    ```


    After these changes, our test will pass ✅.


    ## Showcasing Test Value


    To showcase the value of our test, if for any reason we don’t call `task.resume()`,
    which can happen if we refactor our code moving forward, our test will fail. We
    can simulate this by commenting out the call to `task.resume()` and running our
    test. It will fail as you see in Figure [9-6](#505360_1_En_9_Chapter.xhtml#Fig6).


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig6_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Failing test'
