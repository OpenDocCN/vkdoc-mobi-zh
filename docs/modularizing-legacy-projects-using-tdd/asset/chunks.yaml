- fmt: '# Summary


    Core Data is indeed a powerful framework, and it’s used by many developers due
    to its vast array of features. But as mentioned before, using Core Data can sometimes
    be a tedious task. This is largely due to two things. First is that many developers
    use Core Data without fully grasping what this framework really is and how it
    functions. Second is that many developers find it challenging to write tests for
    their Core Data code, which ultimately leads to hard-to-spot regressions. In this
    chapter, we’ve attempted to address these two issues.


    We talked about what Core Data really is and what it’s not. Core Data is not a
    database. Though it’s capable of persisting data on disk, Core Data is much more
    than that. In its essence, Core Data manages object graphs, meaning it manages
    the lifecycle of our objects. Internally Core Data depends on multiple objects
    to function, each having a specific responsibility. There is the managed object
    model, which is a programmatic representation of our object schema. And there’s
    the managed object context, which acts as a scratch pad for us to apply the changes
    we want, and then we can either discard them or persist them. Finally, there’s
    the persistent store coordinator, which acts as a middleman between our contexts
    and the persistent store, which is responsible for actually saving the data. These
    represent the main building blocks of the Core Data stack. And then finally there’s
    the persistent container, which encapsulates the Core Data stack and simplifies
    its creation and management.


    We then went on and debunked the myth that Core Data is not testable. Yes, testing
    Core Data can be challenging, but once you get the hang of it, it becomes a piece
    of cake. We created a generic Core Data layer and used it in our app (`Books`)
    instead of the old Core Data implementation. And we did all that using TDD. We
    saw how using a SQLite store in testing can cause issues in our tests. And we
    were able to overcome this by using an in-memory store. We also saw how we can
    write tests that are completely isolated from our app’s data model by adding a
    separate data model just for testing and initializing our Core Data stack in tests
    using this new model.


    # 11. Adding Features to a Legacy App


    If you recall in Chapter [1](#505360_1_En_1_Chapter.xhtml), we talked about the
    various situations where we can use TDD. TDD can basically be applied at any stage
    in a project’s lifetime. The most obvious option is start using TDD from the very
    beginning. This is what we always recommend. However, what if you only just recently
    heard about TDD and you already have a project you’re working on? Well, TDD is
    still for you. TDD can help guide the refactor of old legacy code, and also we
    can use TDD to properly modularize and decouple our code base. We’ve already put
    this to action extensively in previous chapters.


    We can also use TDD when adding new functionalities to our existing legacy code.
    This is what we will discuss in this chapter. Let’s assume we have a legacy app
    that is on its way to being fully refactored and modularized using TDD. But in
    the middle of that process, we got a request for a new feature. Given the fast-paced
    world we’re living in, in most cases we won’t have the luxury of pausing all new
    advancements of a project until a big refactor is done. We need to continue developing
    new features while simultaneously enhancing/refactoring our legacy code.


    So how can we do this? First, we’ll examine our feature to determine if the feature
    is coupled with an old feature or a completely new feature that doesn’t depend
    on any old code. And if the feature is coupled with old code, is this code legacy
    or refactored and modularized? But don’t get this wrong. We’re not doing this
    examination to determine if we need TDD or not. We’ll be using TDD in all cases.
    This will only affect the complexity of our task. Working on a completely separated
    feature will be relatively simple, since we are almost writing code from scratch,
    so we will spend less time refactoring code.


    On the other hand, working on a feature coupled with old legacy code is a bit
    challenging because we can’t first refactor our code and then add the feature.
    In these scenarios, you might be tempted to ditch TDD and testing altogether because
    the parent code is not tested. However, there’s a rule of thumb we should always
    try to follow from Uncle Bob’s clean code, which states “Always leave the code
    better than you found it.” That’s why we should try not to give in to that temptation.


    ## Legacy Code Disclaimer


    We will be adding a new feature to `Books`. Let’s open up the starter project,
    which can be found in the chapter’s resources. If we take a look at our code,
    we’ll find that we have two view controllers for the detailed book view: `BookViewControllerA`
    and `BookViewControllerB`. This exists because we’re running an A/B testing experiment.
    Even though the two view controllers have a lot of common functionalities, the
    code is duplicated between them, which is something expected from legacy code.
    This is a huge code smell, and if we have time we should definitely fix this,
    but sadly we don’t.


    ### A/B Testing


    A/B testing is essentially an experiment where two or more variants of a page
    are shown to users at random, and statistical analysis is used to determine which
    variation performs better for a given conversion goal. So the motivation of having
    an A/B test here was to determine which design for `BookViewController` gives
    a better conversion for purchasing books.


    ## New Feature


    The feature we want to add is to display reviews for each book, which can help
    our users in making a decision whether they want to read this book or not (Figure
    [11-1](#505360_1_En_11_Chapter.xhtml#Fig1)).


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig1_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Reviews wireframe


    As we already pointed out, there are two view controllers for the book view: `BookViewControllerA`
    and `BookViewControllerB`. And we need to make this change in both view controllers.
    Knowing that the change is common between both controllers, we can follow the
    current implementation and add the change in both controllers. However, this way
    we won’t be following Uncle Bob’s rule we mentioned earlier. Let’s start implementing
    the feature and see how we can address this problem without having to refactor
    the entirety of the code.


    ## Kickoff


    We’ll start by listing the possible scenarios a user can go through:


    1.  When a user opens a book view that contains no review, they should be able
    to see an indication that there are no reviews.


    2.  When a user opens a book view that contains reviews, they should be able to
    see the first review.


    We will follow our approach in implementing this feature as you can see in Figure
    [11-2](#505360_1_En_11_Chapter.xhtml#Fig2).


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig2_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Testing plan diagram


    Now let’s transform these scenarios into UI tests. These tests are our end goal.
    Once these tests pass, we then know that we’re done with our new feature ✅.'
  raw: '## Summary


    Core Data is indeed a powerful framework, and it’s used by many developers due
    to its vast array of features. But as mentioned before, using Core Data can sometimes
    be a tedious task. This is largely due to two things. First is that many developers
    use Core Data without fully grasping what this framework really is and how it
    functions. Second is that many developers find it challenging to write tests for
    their Core Data code, which ultimately leads to hard-to-spot regressions. In this
    chapter, we’ve attempted to address these two issues.


    We talked about what Core Data really is and what it’s not. Core Data is not a
    database. Though it’s capable of persisting data on disk, Core Data is much more
    than that. In its essence, Core Data manages object graphs, meaning it manages
    the lifecycle of our objects. Internally Core Data depends on multiple objects
    to function, each having a specific responsibility. There is the managed object
    model, which is a programmatic representation of our object schema. And there’s
    the managed object context, which acts as a scratch pad for us to apply the changes
    we want, and then we can either discard them or persist them. Finally, there’s
    the persistent store coordinator, which acts as a middleman between our contexts
    and the persistent store, which is responsible for actually saving the data. These
    represent the main building blocks of the Core Data stack. And then finally there’s
    the persistent container, which encapsulates the Core Data stack and simplifies
    its creation and management.


    We then went on and debunked the myth that Core Data is not testable. Yes, testing
    Core Data can be challenging, but once you get the hang of it, it becomes a piece
    of cake. We created a generic Core Data layer and used it in our app (Books) instead
    of the old Core Data implementation. And we did all that using TDD. We saw how
    using a SQLite store in testing can cause issues in our tests. And we were able
    to overcome this by using an in-memory store. We also saw how we can write tests
    that are completely isolated from our app’s data model by adding a separate data
    model just for testing and initializing our Core Data stack in tests using this
    new model.


