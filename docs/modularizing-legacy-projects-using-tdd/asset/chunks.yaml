    book_review\"]\n    _ = reviewsCell.waitForExistence(timeout: 1.0)\n    XCTAssertTrue(cells.staticTexts[\"\
    book_review\"].label == \"The book is interesting\")\n}\n```\n\nThis is almost\
    \ identical to the first test we’ve added. The only changes are that we stub the\
    \ request using a different response. And we check that the review returned in\
    \ the response is displayed.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3** Testing plan diagram (end-to-end tests added)\n\nNow that we’re\
    \ done with our UI tests (Figure [11-3](#505360_1_En_11_Chapter.xhtml#Fig3)),\
    \ let’s go down a level.\n\n### Integration Tests\n\nNow, we can design how the\
    \ feature will work using integration tests. We will use MVP again as we did before\
    \ in all previous chapters. However, `BookViewControllerA` and `BookViewControllerB`\
    \ contain a lot of spaghetti code. They both make a network request and save data\
    \ into the database. They also share a lot of duplicated code between them. Unfortunately\
    \ as we said before, we don’t have time to refactor this whole mess. So we need\
    \ to design this feature to be added into our spaghetti code so that the added\
    \ code is loosely coupled with each other and well tested and enhances the already\
    \ implemented code without refactoring the whole class.\n\nWe will implement/inject\
    \ this feature inside `BookViewControllerA` and `BookViewControllerB` as if these\
    \ viewControllers don’t do anything else. So this feature will be implemented\
    \ using the MVP design pattern (Figure [11-4](#505360_1_En_11_Chapter.xhtml#Fig4)),\
    \ and the old feature will remain the same with no change.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png](images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png)\n\
    \n**Figure 11-4** MVP Design\n\nAs we can see in the diagram, `BookViewControllerA`\
    \ depends on the presenter to return data that will be displayed inside the `TableView`.\
    \ `BookViewPresenter` depends on `BookViewModel` in order to return the reviews\
    \ array. `BookViewModel` depends on `NetworkLayer` to make the request.\n\nNow\
    \ let’s convert this to a test. Let’s create a new test case class named `BookViewIntegrationTests`\
    \ and add this test to it:\n\n```swift\nfunc testFetchingBooksReturnsAReviewInPresenterDelegate\
    \ () {\n    // Given\n    let testBundle = Bundle(for: type(of: self))\n    let\
    \ booksReveiwsJSONURL = testBundle.url(forResource: \"booksReview\", withExtension:\
    \ \"json\")\n    let booksReveiwsJSON = try! Data(contentsOf: booksReveiwsJSONURL!)\n\
    \    let networkLayer = NetworkLayerStub(stubbedData: booksReveiwsJSON)\n    let\
    \ bookViewModel = BookViewModel(network: networkLayer)\n    let bookViewPresenter\
    \ = BookViewPresenter(bookViewModel: bookViewModel)\n    let delegateMock = BookViewPresenterDelegateMock()\n\
    \    bookViewPresenter.delegate = delegateMock\n    let expectation = XCTKVOExpectation(keyPath:\
    \ \"review\", object: delegateMock)\n    // When\n    bookViewPresenter.fetchBookReviews(title:\
    \ \"THE LAST THING HE TOLD ME\")\n    // Then\n    self.wait(for: [expectation],\
    \ timeout: 0.1)\n    XCTAssertTrue(delegateMock.review == \"The book is interesting\"\
    , \"Fetched fetch and view expected reviews\")\n}\n```\n\nThis is a slightly complicated\
    \ test, so let’s break it down:\n\n*   **Given section:**\n    *   We create an\
    \ instance of `NetworkLayerStub` that returns the content of `booksReview.json`.\n\
    \    *   We create an instance of `BookViewModel` that depends on `NetworkLayerStub`.\n\
    \    *   We create an instance of `BookViewPresenter` that depends on `BookViewModel`.\n\
    \    *   We create an instance of `BookViewPresenterDelegateMock` and set it as\
    \ the delegate of our presenter.\n*   **When section:** We call `fetchBookReviews`\
    \ with the expectation that the presenter will eventually call its delegate and\
    \ pass it the book reviews.\n*   **Then section:** We wait for the expectation\
    \ and assert on the value of the reviews.\n\nSince almost all the classes we used\
    \ in this test are still not created, we’ll have to comment out this test until\
    \ we’re done with our unit test phase. This is to allow our tests to build. Then\
    \ we’ll come back and run it to make sure we’re done.\n\n### Unit Tests and Actual\
    \ Implementation\n\nSo far we’ve just been adding tests as you can see in Figure\
    \ [11-5](#505360_1_En_11_Chapter.xhtml#Fig5). But since we’ve reached this level\
    \ of testing, it means we’re close to actually adding code. We’ll need to implement\
    \ each component in our design (Figure [11-5](#505360_1_En_11_Chapter.xhtml#Fig5)).\n\
    \n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg)\n\
    \n**Figure 11-5** Testing plan diagram (integration test added)"
  raw: "### UI Tests\n\nLet’s transform our first scenario to a test. We’ll open up\
    \ `BooksUITests` and add a new test called `testShowingBookViewWithNoReveiws`\
    \ . Let’s take a look at the “Given” section of our test:\n\n```\n// Given\nlet\
    \ testBundle = Bundle(for: type(of: self))\nlet booksJSONURL = testBundle.url(forResource:\
    \ \"BestSellerBooksStub\", withExtension: \"json\")\nlet booksJSON = try! String(contentsOf:\
    \ booksJSONURL!)\nlet booksNoReveiwsJSONURL = testBundle.url(forResource: \"booksNoReview\"\
    , withExtension: \"json\")\nlet booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\n\
    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
    \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
    app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\nThis is almost identical\
    \ to how we set up the already existing tests. The only difference is that we\
    \ now need to stub one more request, which is the reviews request. Here we stub\
    \ it and return a response having no reviews.\n\nNow on to the “When” section:\n\
    \n```\n// When\nlet booksTableView = app.tables\nlet cells = booksTableView.cells\n\
    let firstCell = cells.firstMatch\n_ = firstCell.waitForExistence(timeout: 1.0)\n\
    firstCell.tap()\n```\n\nHere we just tap on a book to go to the book details view.\n\
    \nAnd now for the “Then” section:\n\n```\nlet reviewsCell = cells.staticTexts[\"\
    book_review\"]\n_ = reviewsCell.waitForExistence(timeout: 1.0)\nXCTAssertTrue(cells.staticTexts[\"\
    book_review\"].label == \"No Reviews Available\")\n```\n\nHere we make sure that\
    \ the text “No Reviews Available” is shown.\n\nNow that we’ve added a UI test\
    \ for our first scenario, let’s add a test for the second scenario:\n\n```\nfunc\
    \ testShowingBookViewWithReveiws () {\n// Given\nlet testBundle = Bundle(for:\
    \ type(of: self))\nlet booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
    , withExtension: \"json\")\nlet booksJSON = try! String(contentsOf: booksJSONURL!)\n\
    let booksReveiwsJSONURL = testBundle.url(forResource: \"booksReview\", withExtension:\
    \ \"json\")\nlet booksReveiwsJSON = try! String(contentsOf: booksReveiwsJSONURL!)\n\
    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
    \ in HttpResponse.ok(.text(booksReveiwsJSON))}\nlet app = XCUIApplication()\n\
    app.launchArguments += [\"TESTING\"]\napp.launch()\n// When\nlet booksTableView\
    \ = app.tables\nlet cells = booksTableView.cells\nlet firstCell = cells.firstMatch\n\
    _ = firstCell.waitForExistence(timeout: 1.0)\nfirstCell.tap()\n// Then\nlet reviewsCell\
    \ = cells.staticTexts[\"book_review\"]\n_ = reviewsCell.waitForExistence(timeout:\
    \ 1.0)\nXCTAssertTrue(cells.staticTexts[\"book_review\"].label == \"The book is\
    \ interesting\")\n}\n```\n\nThis is almost identical to the first test we’ve added.\
    \ The only changes are that we stub the request using a different response. And\
    \ we check that the review returned in the response is displayed.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3\n\nTesting plan diagram (end-to-end tests added)\n\nNow that we’re\
    \ done with our UI tests (Figure [11-3](#505360_1_En_11_Chapter.xhtml#Fig3)),\
    \ let’s go down a level.\n\n### Integration Tests\n\nNow, we can design how the\
    \ feature will work using integration tests. We will use MVP again as we did before\
    \ in all previous chapters. However, `BookViewControllerA` and `BookViewControllerB`\
    \ contain a lot of spaghetti code. They both make a network request and save data\
    \ into the database. They also share a lot of duplicated code between them. Unfortunately\
    \ as we said before, we don’t have time to refactor this whole mess. So we need\
    \ to design this feature to be added into our spaghetti code so that the added\
    \ code is loosely coupled with each other and well tested and enhances the already\
    \ implemented code without refactoring the whole class.\n\nWe will implement/inject\
    \ this feature inside `BookViewControllerA` and `BookViewControllerB` as if these\
    \ viewControllers don’t do anything else. So this feature will be implemented\
    \ using the MVP design pattern (Figure [11-4](#505360_1_En_11_Chapter.xhtml#Fig4)),\
    \ and the old feature will remain the same with no change.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png](images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png)\n\
    \nFigure 11-4\n\nMVP Design\n\nAs we can see in the diagram, BookViewControllerA\
    \ depends on the presenter to return data that will be displayed inside the TableView.\
    \ `BookViewPresenter` depends on `BookViewModel` in order to return the reviews\
    \ array. `BookViewModel` depends on NetworkLayer to make the request.\n\nNow let’s\
    \ convert this to a test. Let’s create a new test case class named `BookViewIntegrationTests`\
    \ and add this test to it:\n\n```\nfunc testFetchingBooksReturnsAReviewInPresenterDelegate\
    \ () {\n// Given\nlet testBundle = Bundle(for: type(of: self))\nlet booksReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\nlet\
    \ booksReveiwsJSON = try! Data(contentsOf: booksReveiwsJSONURL!)\nlet networkLayer\
    \ = NetworkLayerStub(stubbedData: booksReveiwsJSON)\nlet bookViewModel = BookViewModel(network:\
    \ networkLayer)\nlet bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)\n\
    let delegateMock = BookViewPresenterDelegateMock()\nbookViewPresenter.delegate\
    \ = delegateMock\nlet expectation = XCTKVOExpectation(keyPath: \"review\", object:\
    \ delegateMock)\n// When\nbookViewPresenter.fetchBookReviews(title: \"THE LAST\
    \ THING HE TOLD ME\")\n// Then\nself.wait(for: [expectation], timeout: 0.1)\n\
    XCTAssertTrue(delegateMock.review == \"The book is interesting\", \"Fetched fetch\
    \ and view expected reviews\")\n}\n```\n\nThis is a slightly complicated test,\
    \ so let’s break it down:\n\n*   Given section:\n    *   We create an instance\
    \ of `NetworkLayerStub` that returns the content of `booksReview.json`.\n\n  \
    \  *   We create an instance of `BookViewModel` that depends on `NetworkLayerStub`.\n\
    \n    *   We create an instance of `BookViewPresenter` that depends on `BookViewModel`.\n\
    \n    *   We create an instance of `BookViewPresenterDelegateMock` and set it\
    \ as the delegate of our presenter.\n\n*   When section: We call `fetchBookReviews`\
    \ with the expectation that the presenter will eventually call its delegate and\
    \ pass it the book reviews.\n\n*   Then section: We wait for the expectation and\
    \ assert on the value of the reviews.\n\nSince almost all the classes we used\
    \ in this test are still not created, we’ll have to comment out this test until\
    \ we’re done with our unit test phase. This is to allow our tests to build. Then\
    \ we’ll come back and run it to make sure we’re done.\n\n### Unit Tests and Actual\
    \ Implementation\n\nSo far we’ve just been adding tests as you can see in Figure\
    \ [11-5](#505360_1_En_11_Chapter.xhtml#Fig5). But since we’ve reached this level\
    \ of testing, it means we’re close to actually adding code. We’ll need to implement\
    \ each component in our design (Figure [11-5](#505360_1_En_11_Chapter.xhtml#Fig5)).\n\
    \n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5\n\nTesting plan diagram (integration test added)"
  trans: "\n### UI 测试\n\n现在让我们将第一个场景转化为测试。我们将打开 `BooksUITests` 并添加一个名为 `testShowingBookViewWithNoReveiws`\
    \ 的新测试。先来看一下测试中的“Given”部分：\n\n```swift\n// Given\nlet testBundle = Bundle(for:\
    \ type(of: self))\nlet booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
    , withExtension: \"json\")\nlet booksJSON = try! String(contentsOf: booksJSONURL!)\n\
    let booksNoReveiwsJSONURL = testBundle.url(forResource: \"booksNoReview\", withExtension:\
    \ \"json\")\nlet booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\n\
    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
    \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
    app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\n这与我们之前设置已有测试的方式几乎相同。唯一的区别是现在需要多\
    \ stub 一个请求，也就是评论请求。这里我们将其 stub 并返回一个没有评论的响应。\n\n接下来是“When”部分：\n\n```swift\n//\
    \ When\nlet booksTableView = app.tables\nlet cells = booksTableView.cells\nlet\
    \ firstCell = cells.firstMatch\n_ = firstCell.waitForExistence(timeout: 1.0)\n\
    firstCell.tap()\n```\n\n这里我们只是点击一本书以进入书籍详情视图。\n\n然后是“Then”部分：\n\n```swift\nlet\
    \ reviewsCell = cells.staticTexts[\"book_review\"]\n_ = reviewsCell.waitForExistence(timeout:\
    \ 1.0)\nXCTAssertTrue(cells.staticTexts[\"book_review\"].label == \"No Reviews\
    \ Available\")\n```\n\n这里我们验证文本“No Reviews Available”是否被显示。\n\n现在我们已经为第一个场景添加了\
    \ UI 测试，接下来为第二个场景添加测试：\n\n```swift\nfunc testShowingBookViewWithReveiws () {\n\
    \    // Given\n    let testBundle = Bundle(for: type(of: self))\n    let booksJSONURL\
    \ = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension: \"json\"\
    )\n    let booksJSON = try! String(contentsOf: booksJSONURL!)\n    let booksReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\n  \
    \  let booksReveiwsJSON = try! String(contentsOf: booksReveiwsJSONURL!)\n    server.GET[\"\
    /svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    \    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"\
    ] = {_ in HttpResponse.ok(.text(booksReveiwsJSON))}\n    let app = XCUIApplication()\n\
    \    app.launchArguments += [\"TESTING\"]\n    app.launch()\n    // When\n   \
    \ let booksTableView = app.tables\n    let cells = booksTableView.cells\n    let\
    \ firstCell = cells.firstMatch\n    _ = firstCell.waitForExistence(timeout: 1.0)\n\
    \    firstCell.tap()\n    // Then\n    let reviewsCell = cells.staticTexts[\"\
    book_review\"]\n    _ = reviewsCell.waitForExistence(timeout: 1.0)\n    XCTAssertTrue(cells.staticTexts[\"\
    book_review\"].label == \"The book is interesting\")\n}\n```\n\n这与我们添加的第一个测试几乎相同。唯一的变化是我们使用了不同的响应来\
    \ stub 请求，并且检查了响应中返回的评论是否被显示。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg](img/505360_1_En_11_Fig3_HTML.jpg)\n\
    \n**图 11-3** 测试计划图（已添加端到端测试）\n\nUI 测试完成后（图 11-3），让我们深入到下一层。\n\n### 集成测试\n\n现在，我们可以使用集成测试来设计该功能将如何工作。我们将像之前所有章节一样再次使用\
    \ MVP 模式。然而，`BookViewControllerA` 和 `BookViewControllerB` 包含大量意大利面条式代码。它们都发起网络请求并将数据保存到数据库，彼此之间还共享大量重复代码。不幸的是，如前所述，我们没有时间重构这一整团乱麻。因此我们需要设计这个功能，使其能够被添加到意大利面条式代码中，添加的代码之间松耦合、经过良好测试，并且在不重构整个类的情况下增强已有代码。\n\
    \n我们将在 `BookViewControllerA` 和 `BookViewControllerB` 内部实现/注入这个功能，就好像这些控制器不处理其他任何事情一样。因此，这个功能将使用\
    \ MVP 设计模式（图 11-4）来实现，而旧功能将保持不变。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png](img/505360_1_En_11_Fig4_HTML.png)\n\
    \n**图 11-4** MVP 设计\n\n如图所示，`BookViewControllerA` 依赖于 presenter 来返回将在 `TableView`\
    \ 中显示的数据。`BookViewPresenter` 依赖于 `BookViewModel` 以获取评论数组。`BookViewModel` 依赖于 `NetworkLayer`\
    \ 来发起请求。\n\n现在让我们将其转化为测试。创建一个名为 `BookViewIntegrationTests` 的新测试用例类，并向其中添加以下测试：\n\
    \n```swift\nfunc testFetchingBooksReturnsAReviewInPresenterDelegate () {\n   \
    \ // Given\n    let testBundle = Bundle(for: type(of: self))\n    let booksReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\n  \
    \  let booksReveiwsJSON = try! Data(contentsOf: booksReveiwsJSONURL!)\n    let\
    \ networkLayer = NetworkLayerStub(stubbedData: booksReveiwsJSON)\n    let bookViewModel\
    \ = BookViewModel(network: networkLayer)\n    let bookViewPresenter = BookViewPresenter(bookViewModel:\
    \ bookViewModel)\n    let delegateMock = BookViewPresenterDelegateMock()\n   \
    \ bookViewPresenter.delegate = delegateMock\n    let expectation = XCTKVOExpectation(keyPath:\
    \ \"review\", object: delegateMock)\n    // When\n    bookViewPresenter.fetchBookReviews(title:\
    \ \"THE LAST THING HE TOLD ME\")\n    // Then\n    self.wait(for: [expectation],\
    \ timeout: 0.1)\n    XCTAssertTrue(delegateMock.review == \"The book is interesting\"\
    , \"Fetched fetch and view expected reviews\")\n}\n```\n\n这是一个略显复杂的测试，我们来分解一下：\n\
    \n*   **Given 部分：**\n    *   创建一个 `NetworkLayerStub` 实例，该实例返回 `booksReview.json`\
    \ 的内容。\n    *   创建一个依赖于 `NetworkLayerStub` 的 `BookViewModel` 实例。\n    *   创建一个依赖于\
    \ `BookViewModel` 的 `BookViewPresenter` 实例。\n    *   创建一个 `BookViewPresenterDelegateMock`\
    \ 实例，并将其设置为 presenter 的代理。\n*   **When 部分：** 调用 `fetchBookReviews`，期望 presenter\
    \ 最终会调用其代理并传递书籍评论。\n*   **Then 部分：** 等待期望（expectation）并对评论的值进行断言。\n\n由于此测试中使用的几乎所有类都尚未创建，我们需要先注释掉此测试，直到完成单元测试阶段。这是为了让我们的测试能够编译通过。之后我们再回来运行它以确保一切完成。\n\
    \n### 单元测试与具体实现\n\n到目前为止，正如你在图 11-5 中所见，我们只是在不断增加测试。但既然我们已经到达这个测试层级，意味着距离实际添加代码已经不远了。我们需要实现设计中每个组件（图\
    \ 11-5）。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg](img/505360_1_En_11_Fig5_HTML.jpg)\n\
    \n**图 11-5** 测试计划图（已添加集成测试）\n"
- fmt: "### `BookViewModel`\n\nWe’ll start by implementing `BookViewModel`. To do\
    \ that we’ll create a new test case class and name it `BookViewModelTests` (Figure\
    \ [11-6](#505360_1_En_11_Chapter.xhtml#Fig6)). And add this to it:\n\n```\nfunc\
    \ testFetchingBookReveiws() throws {\n// Given\nlet expectedReviews: [Review]\
    \ = stubbedReviews()\nlet testBundle = Bundle(for: type(of: self))\nlet booksReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\nlet\
    \ booksReveiwsJSON = try Data(contentsOf: booksReveiwsJSONURL!)\nlet networkLayer\
    \ = NetworkLayerStub(stubbedData: booksReveiwsJSON)\nlet bookViewModel = BookViewModel(network:\
    \ networkLayer)\n// When\nvar actualReviews: [Review]?\nlet waitForBookReviews\
    \ = XCTestExpectation(description: \"Wait to fetch book reviews\")\nbookViewModel.fetchBookReviews(with:\
    \ \"Title\", callBack: { reviews in\nactualReviews = reviews\nwaitForBookReviews.fulfill()\n\
    })\n// Then\nself.wait(for: [waitForBookReviews], timeout: 0.1)\nXCTAssertEqual(actualReviews,\
    \ expectedReviews, \"Fetched books does not match the expected\")\n}\nfunc stubbedReviews()\
    \ -> [Review]{\nreturn [Review(byLine:\"ERROL MORRIS\", summary:\"The book is\
    \ interesting\")]\n}\n```\n\nLet’s break it down.\n\n*   Given section:\n    *\
    \   We create an array of stubbed reviews that returns the content of `booksReview.json`.\n\
    \    *   We create an instance of `NetworkLayerStub` that returns the content\
    \ of `booksReview.json`.\n    *   We create an instance of `BookViewModel` that\
    \ depends on `NetworkLayerStub`.\n\n*   When section: We call `fetchBookReviews`\
    \ with the expectation that the model will return the actual reviews.\n\n*   Then\
    \ section: We wait for the expectation and assert on the value of the reviews.\n\
    \n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6  \nTesting plan diagram (unit test added)\n\nFor our test to build\
    \ , we need to do a couple of things. First, we need to create the `Review` object\
    \ and make sure it implements `Codable` and `Equatable`:\n\n```\n// MARK: - ReviewsResponse\n\
    struct ReviewsResponse: Codable {\nlet status, copyright: String\nlet numResults:\
    \ Int\nlet results: [Review]\nenum CodingKeys: String, CodingKey {\ncase status,\
    \ copyright\ncase numResults = \"num_results\"\ncase results\n}\n}\n// MARK: -\
    \ Review\nstruct Review: Codable, Equatable {\nvar byLine: String?\nvar summary:\
    \ String?\ninit(byLine:String, summary:String) {\nself.byLine = byLine\nself.summary\
    \ = summary\n}\nenum CodingKeys: String, CodingKey {\ncase byLine = \"byline\"\
    \ncase summary = \"summary\"\n}\nstatic func == (lhs: Review, rhs: Review) ->\
    \ Bool {\nlhs.byLine == rhs.byLine &&\nlhs.summary == rhs.summary\n}\n}\n```\n\
    \nNow let’s update the `BookViewModel` class . The class should have a dependency\
    \ on `NetworkLayer` and should have the `fetchBookReviews` public function :\n\
    \n```\nclass BookViewModel {\nprivate var favoritesManager:FavoritesManager?\n\
    private var networkLayer: NetworkLayer?\ninit(networkLayer: NetworkLayer? = .init(),\
    \ favoritesManager:FavoritesManager? = .shared) {\nself.networkLayer = networkLayer\n\
    self.favoritesManager = favoritesManager\n}\npublic func addFavorite(_ model:\
    \ BookModel) {\nself.favoritesManager?.addFavorite(model)\n}\npublic func fetchBookReviews(with\
    \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {\ncallBack(nil)\n\
    }\n}\n```\n\nHere we create our class and add the needed function with empty implementation.\n\
    \nIf we run our test, it will fail, which is expected. Now we need to actually\
    \ implement `fetchBookReviews` . To do so we need to make a network request. This\
    \ means we need to create a new struct conforming to `RequestProtocol` that describes\
    \ the request we need to make.\n\nLet’s create a new test case class and name\
    \ it `ReviewsRequestTests` . And we’ll add these tests to it:\n\n```\nfunc testReviewsRequestHTTPMethod()\
    \ {\n//Given\nlet reviewsRequest = ReviewsRequest(title: \"title\")\n//When &\
    \ Then\nXCTAssertEqual(reviewsRequest.method, .GET)\n}\nfunc testReviewsRequestURL()\
    \ {\n//Given\nlet bookRequest = ReviewsRequest(title: \"title\")\nlet env = APIEnvironment(scheme:\
    \ \"http\", host: \"test.com\", port: 433, API_KEY: \"\")\n// When\nlet urlRequest\
    \ = bookRequest.createURLRequest(with: env)\n//When & Then\nXCTAssertEqual(urlRequest?.url?.absoluteString,\
    \ \"http://test.com:433/svc/books/v3/reviews.json?title=title&api-key=\\(APIEnvironment.production.API_KEY)\"\
    )\n}\nfunc testReviewsRequestBody() {\n//Given\nlet reviewsRequest = ReviewsRequest(title:\
    \ \"title\")\n//When & Then\nXCTAssertNil(reviewsRequest.body)\n}\n```\n\nNow\
    \ to get these tests to pass, we’ll need to create `ReviewsRequest` like so:\n\
    \n```\nstruct ReviewsRequest: RequestProtocol {\nvar title:String\nvar path: String\
    \ {\nreturn \"/svc/books/v3/reviews.json\"\n}\nvar queryItems: [URLQueryItem]?\
    \ {\nreturn [URLQueryItem(name: \"title\", value: self.title), URLQueryItem(name:\
    \ \"api-key\", value: NetworkLayer.environment.API_KEY)]\n}\nvar method:HTTPMethod\
    \ {return .GET}\nvar body: Data? {return nil}\n}\n```\n\nNow if we run `ReviewsRequestTests`\
    \ (Figure [11-7](#505360_1_En_11_Chapter.xhtml#Fig7)), they will pass ✅.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7  \n`ReviewsRequestTests` passing\n\nNow that we have `ReviewsRequest`\
    \ ready, we can implement `fetchBookReviews` properly:\n\n```\npublic func fetchBookReviews(with\
    \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {        self.network?.executeRequest(ReviewsRequest(title:\
    \ title), callBack: { data, Error in\nguard let data = data else {\ncallBack(nil)\n\
    return\n}\nvar response:ReviewsResponse?\ndo {\nresponse = try JSONDecoder().decode(ReviewsResponse.self,\
    \ from: data)\n} catch {\nprint(error.localizedDescription)\n}\nif let reviews\
    \ = response?.results {\ncallBack(reviews)\nreturn\n}\ncallBack(nil)\n})\n}\n\
    ```\n\nHere we make our network request, and we then parse the response to `Review`\
    \ objects and return it in the callback. And if any error occurs, we return nil.\n\
    \nNow if we run the test in `BookViewModelTests`, it should pass ✅."
  raw: "#### BookViewModel\n\nWe’ll start by implementing `BookViewModel` . To do\
    \ that we’ll create a new test case class and name it `BookViewModelTests` (Figure\
    \ [11-6](#505360_1_En_11_Chapter.xhtml#Fig6)). And add this to it:\n\n```\nfunc\
    \ testFetchingBookReveiws() throws {\n// Given\nlet expectedReviews: [Review]\
    \ = stubbedReviews()\nlet testBundle = Bundle(for: type(of: self))\nlet booksReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\nlet\
    \ booksReveiwsJSON = try Data(contentsOf: booksReveiwsJSONURL!)\nlet networkLayer\
    \ = NetworkLayerStub(stubbedData: booksReveiwsJSON)\nlet bookViewModel = BookViewModel(network:\
    \ networkLayer)\n// When\nvar actualReviews: [Review]?\nlet waitForBookReviews\
    \ = XCTestExpectation(description: \"Wait to fetch book reviews\")\nbookViewModel.fetchBookReviews(with:\
    \ \"Title\", callBack: { reviews in\nactualReviews = reviews\nwaitForBookReviews.fulfill()\n\
    })\n// Then\nself.wait(for: [waitForBookReviews], timeout: 0.1)\nXCTAssertEqual(actualReviews,\
    \ expectedReviews, \"Fetched books does not match the expected\")\n}\nfunc stubbedReviews()\
    \ -> [Review]{\nreturn [Review(byLine:\"ERROL MORRIS\", summary:\"The book is\
    \ interesting\")]\n}\n```\n\nLet’s break it down.\n\n*   Given section:\n    *\
    \   We create an array of stubbed reviews that returns the content of `booksReview.json`.\n\
    \n*   We create an instance of `NetworkLayerStub` that returns the content of\
    \ `booksReview.json`.\n\n*   We create an instance of `BookViewModel` that depends\
    \ on `NetworkLayerStub`.\n\n*   When section: We call `fetchBookReviews` with\
    \ the expectation that the model will return the actual reviews.\n\n*   Then section:\
    \ We wait for the expectation and assert on the value of the reviews.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6\n\nTesting plan diagram (unit test added)\n\nFor our test to build\
