    \ = bookRequest.createURLRequest(with: env)\n//When & Then\nXCTAssertEqual(urlRequest?.url?.absoluteString,\
    \ \"http://test.com:433/svc/books/v3/reviews.json?title=title&api-key=\\(APIEnvironment.production.API_KEY)\"\
    )\n}\nfunc testReviewsRequestBody() {\n//Given\nlet reviewsRequest = ReviewsRequest(title:\
    \ \"title\")\n//When & Then\nXCTAssertNil(reviewsRequest.body)\n}\n```\n\nNow\
    \ to get these tests to pass, we’ll need to create `ReviewsRequest` like so:\n\
    \n```\nstruct ReviewsRequest: RequestProtocol {\nvar title:String\nvar path: String\
    \ {\nreturn \"/svc/books/v3/reviews.json\"\n}\nvar queryItems: [URLQueryItem]?\
    \ {\nreturn [URLQueryItem(name: \"title\", value: self.title), URLQueryItem(name:\
    \ \"api-key\", value: NetworkLayer.environment.API_KEY)]\n}\nvar method:HTTPMethod\
    \ {return .GET}\nvar body: Data? {return nil}\n}\n```\n\nNow if we run `ReviewsRequestTests`\
    \ (Figure [11-7](#505360_1_En_11_Chapter.xhtml#Fig7)), they will pass ✅.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\n\nReviewsRequest tests passing\n\nNow that we have `ReviewsRequest`\
    \ ready, we can implement `fetchBookReviews` properly:\n\n```\npublic func fetchBookReviews(with\
    \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {        self.network?.executeRequest(ReviewsRequest(title:\
    \ title), callBack: { data, Error in\nguard let data = data else {\ncallBack(nil)\n\
    return\n}\nvar response:ReviewsResponse?\ndo {\nresponse = try JSONDecoder().decode(ReviewsResponse.self,\
    \ from: data)\n} catch {\nprint(error.localizedDescription)\n}\nif let reviews\
    \ = response?.results {\ncallBack(reviews)\nreturn\n}\ncallBack(nil)\n})\n}\n\
    ```\n\nHere we make our network request, and we then parse the response to `Review`\
    \ objects and return it in the callback. And if any error occurs, we return nil.\n\
    \nNow if we run the test in `BookViewModelTests`, it should pass ✅."
  trans: "\n### `BookViewModel`\n\n我们首先来实现 `BookViewModel`。为此，我们需要创建一个新的测试用例类并将其命名为\
    \ `BookViewModelTests`（图 11-6）。然后向其中添加以下内容：\n\n```\nfunc testFetchingBookReveiws()\
    \ throws {\n// Given\nlet expectedReviews: [Review] = stubbedReviews()\nlet testBundle\
    \ = Bundle(for: type(of: self))\nlet booksReveiwsJSONURL = testBundle.url(forResource:\
    \ \"booksReview\", withExtension: \"json\")\nlet booksReveiwsJSON = try Data(contentsOf:\
    \ booksReveiwsJSONURL!)\nlet networkLayer = NetworkLayerStub(stubbedData: booksReveiwsJSON)\n\
    let bookViewModel = BookViewModel(network: networkLayer)\n// When\nvar actualReviews:\
    \ [Review]?\nlet waitForBookReviews = XCTestExpectation(description: \"Wait to\
    \ fetch book reviews\")\nbookViewModel.fetchBookReviews(with: \"Title\", callBack:\
    \ { reviews in\nactualReviews = reviews\nwaitForBookReviews.fulfill()\n})\n//\
    \ Then\nself.wait(for: [waitForBookReviews], timeout: 0.1)\nXCTAssertEqual(actualReviews,\
    \ expectedReviews, \"Fetched books does not match the expected\")\n}\nfunc stubbedReviews()\
    \ -> [Review]{\nreturn [Review(byLine:\"ERROL MORRIS\", summary:\"The book is\
    \ interesting\")]\n}\n```\n\n我们来分解一下。\n\n*   **Given** 部分：\n    *   创建一个包含模拟书评的数组，该数组返回\
    \ `booksReview.json` 的内容。\n    *   创建一个返回 `booksReview.json` 内容的 `NetworkLayerStub`\
    \ 实例。\n    *   创建一个依赖于 `NetworkLayerStub` 的 `BookViewModel` 实例。\n\n*   **When**\
    \ 部分：调用 `fetchBookReviews`，并期望模型能返回实际的书评数据。\n\n*   **Then** 部分：等待期望得到满足，然后对书评的值进行断言。\n\
    \n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg](img/505360_1_En_11_Fig6_HTML.jpg)\n\
    \n图 11-6  \n测试计划示意图（已添加单元测试）\n\n为了让我们的测试能够构建通过，我们需要做几件事。首先，我们需要创建 `Review` 对象，并确保它实现了\
    \ `Codable` 和 `Equatable` 协议：\n\n```\n// MARK: - ReviewsResponse\nstruct ReviewsResponse:\
    \ Codable {\nlet status, copyright: String\nlet numResults: Int\nlet results:\
    \ [Review]\nenum CodingKeys: String, CodingKey {\ncase status, copyright\ncase\
    \ numResults = \"num_results\"\ncase results\n}\n}\n// MARK: - Review\nstruct\
    \ Review: Codable, Equatable {\nvar byLine: String?\nvar summary: String?\ninit(byLine:String,\
    \ summary:String) {\nself.byLine = byLine\nself.summary = summary\n}\nenum CodingKeys:\
    \ String, CodingKey {\ncase byLine = \"byline\"\ncase summary = \"summary\"\n\
    }\nstatic func == (lhs: Review, rhs: Review) -> Bool {\nlhs.byLine == rhs.byLine\
    \ &&\nlhs.summary == rhs.summary\n}\n}\n```\n\n现在我们来更新 `BookViewModel` 类。该类应依赖于\
    \ `NetworkLayer`，并应包含 `fetchBookReviews` 这个公共方法：\n\n```\nclass BookViewModel {\n\
    private var favoritesManager:FavoritesManager?\nprivate var networkLayer: NetworkLayer?\n\
    init(networkLayer: NetworkLayer? = .init(), favoritesManager:FavoritesManager?\
    \ = .shared) {\nself.networkLayer = networkLayer\nself.favoritesManager = favoritesManager\n\
    }\npublic func addFavorite(_ model: BookModel) {\nself.favoritesManager?.addFavorite(model)\n\
    }\npublic func fetchBookReviews(with title:String, callBack: @escaping (_ reviews:[Review]?)\
    \ -> Void) {\ncallBack(nil)\n}\n}\n```\n\n这里我们创建了类，并添加了所需的方法，不过其实现是空的。\n\n如果我们运行这个测试，它会失败，这是意料之中的。现在我们需要真正去实现\
    \ `fetchBookReviews`。为此，我们需要发起一个网络请求。这意味着我们需要创建一个新的结构体，使其遵循 `RequestProtocol`\
    \ 协议，来描述我们需要发起的这个请求。\n\n让我们创建一个新的测试用例类，并将其命名为 `ReviewsRequestTests`。然后向其中添加以下测试：\n\
    \n```\nfunc testReviewsRequestHTTPMethod() {\n//Given\nlet reviewsRequest = ReviewsRequest(title:\
    \ \"title\")\n//When & Then\nXCTAssertEqual(reviewsRequest.method, .GET)\n}\n\
    func testReviewsRequestURL() {\n//Given\nlet bookRequest = ReviewsRequest(title:\
    \ \"title\")\nlet env = APIEnvironment(scheme: \"http\", host: \"test.com\", port:\
    \ 433, API_KEY: \"\")\n// When\nlet urlRequest = bookRequest.createURLRequest(with:\
    \ env)\n//When & Then\nXCTAssertEqual(urlRequest?.url?.absoluteString, \"http://test.com:433/svc/books/v3/reviews.json?title=title&api-key=\\\
    (APIEnvironment.production.API_KEY)\")\n}\nfunc testReviewsRequestBody() {\n//Given\n\
    let reviewsRequest = ReviewsRequest(title: \"title\")\n//When & Then\nXCTAssertNil(reviewsRequest.body)\n\
    }\n```\n\n为了让这些测试通过，我们需要像下面这样创建 `ReviewsRequest`：\n\n```\nstruct ReviewsRequest:\
    \ RequestProtocol {\nvar title:String\nvar path: String {\nreturn \"/svc/books/v3/reviews.json\"\
    \n}\nvar queryItems: [URLQueryItem]? {\nreturn [URLQueryItem(name: \"title\",\
    \ value: self.title), URLQueryItem(name: \"api-key\", value: NetworkLayer.environment.API_KEY)]\n\
    }\nvar method:HTTPMethod {return .GET}\nvar body: Data? {return nil}\n}\n```\n\
    \n现在如果我们运行 `ReviewsRequestTests`（图 11-7），它们将会通过 ✅。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg](img/505360_1_En_11_Fig7_HTML.jpg)\n\
    \n图 11-7  \n`ReviewsRequestTests` 测试通过\n\n既然我们已经准备好了 `ReviewsRequest`，那么就可以正确地实现\
    \ `fetchBookReviews` 了：\n\n```\npublic func fetchBookReviews(with title:String,\
    \ callBack: @escaping (_ reviews:[Review]?) -> Void) {        self.network?.executeRequest(ReviewsRequest(title:\
    \ title), callBack: { data, Error in\nguard let data = data else {\ncallBack(nil)\n\
    return\n}\nvar response:ReviewsResponse?\ndo {\nresponse = try JSONDecoder().decode(ReviewsResponse.self,\
    \ from: data)\n} catch {\nprint(error.localizedDescription)\n}\nif let reviews\
    \ = response?.results {\ncallBack(reviews)\nreturn\n}\ncallBack(nil)\n})\n}\n\
    ```\n\n这里我们发起了网络请求，然后将响应数据解析为 `Review` 对象，并通过回调将其返回。如果发生任何错误，则返回 nil。\n\n现在，如果我们运行\
    \ `BookViewModelTests` 中的测试，它应该会通过 ✅。\n"
- fmt: "### BookViewPresenter\n\nNow let’s jump to our presenter. As usual, we’ll\
    \ start by creating a test case class and name it `BookViewPresenterTests`. And\
    \ we’ll add this test to it:\n\n```swift\nfunc testFetchingBookReveiwsInDelegate()\
    \ {\n    // Given\n    let bookViewModel = BookViewModelStub(stubbedReviews: stubbedReviews())\n\
    \    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)\n\
    \    let delegateMock = BookViewPresenterDelegateMock()\n    bookViewPresenter.delegate\
    \ = delegateMock\n}\nfunc stubbedReviews() -> [Review]{\n    return [Review(byLine:\"\
    ERROL MORRIS\", summary:\"The book is interesting\")]\n}\n```\n\nHere we create\
    \ an instance of `BookViewPresenter` injected with a stub for our view model.\
    \ And we set its delegate to an instance of `BookViewPresenterDelegateMock`. Since\
    \ all these classes don’t exist, we’ll need to create them so that our test can\
    \ build.\n\nWe’ll start with `BookViewPresenter`:\n\n```swift\nprotocol BookViewPresenterDelegate:\
    \ AnyObject {\n    func reviewDidFinish(_ review: String?)\n}\nclass BookViewPresenter\
    \ {\n    private var bookViewModel:BookViewModel\n    weak var delegate: BookViewPresenterDelegate?\n\
    \    init(bookViewModel:BookViewModel) {\n        self.bookViewModel = bookViewModel\n\
    \    }\n}\n```\n\nHere we define the protocol for our delegate. And we create\
    \ our class that has a dependency on `BookViewModel`.\n\nNow let’s create `BookViewModelStub`:\n\
    \n```swift\nclass BookViewModelStub: BookViewModel {\n    var stubbedReviews:[Review]?\n\
    \    init(stubbedReviews:[Review]) {\n        self.stubbedReviews = stubbedReviews\n\
    \        super.init(network: nil)\n    }\n    override public func fetchBookReviews(with\
    \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {\n       \
    \ callBack(self.stubbedReviews!)\n    }\n}\n```\n\nThis simply takes an array\
    \ of reviews as the stubbed data and returns it whenever `fetchBookReviews` is\
    \ called.\n\nFinally we need to create `BookViewPresenterDelegateMock`:\n\n```swift\n\
    class BookViewPresenterDelegateMock: BookViewPresenterDelegate {\n    public var\
    \ review:String?\n    func reviewDidFinish(_ review: String?) {\n        self.review\
    \ = review\n    }\n}\n```\n\nThis here simply conforms to `BookViewPresenterDelegate`\
    \ and saves the passed value in a variable.\n\nSince our test is building now,\
    \ it’s time to write the rest of it:\n\n```swift\nfunc testFetchingBookReveiwsInDelegate()\
    \ throws {\n    // Given\n    let bookViewModel = BookViewModelStub(stubbedReviews:\
    \ stubbedReviews())\n    let bookViewPresenter = BookViewPresenter(bookViewModel:\
    \ bookViewModel)\n    let delegateMock = BookViewPresenterDelegateMock()\n   \
    \ bookViewPresenter.delegate = delegateMock\n    // When\n    let expectation\
    \ = XCTKVOExpectation(keyPath: \"review\", object: delegateMock)\n    bookViewPresenter.fetchBookReviews(title:\
    \ \"Title\")\n    // Then\n    self.wait(for: [expectation], timeout: 0.1)\n \
    \   XCTAssertEqual(delegateMock.review, \"The book is interesting\")\n}\n```\n\
    \nHere we call `fetchBookReviews` and expect that our delegate will be called.\
    \ We then assert on the value passed to our delegate.\n\nWe use a KVO expectation\
    \ in our test. And in order to make this expectation work, we need to make `BookViewPresenterDelegateMock`\
    \ inherit from `NSObject` and annotate the variable we are listening on with `@objc`\
    \ and `dynamic`:\n\n```swift\nclass BookViewPresenterDelegateMock: NSObject, BookViewPresenterDelegate\
    \  {\n    @objc dynamic var review:String = \"\"\n    func reviewDidFinish(_ review:\
    \ String?) {\n        self.review = review ?? \"\"\n    }\n}\n```\n\nNow to make\
    \ our test build and pass, we need to implement `fetchBookReviews`:\n\n```swift\n\
    func fetchBookReviews(title:String) {\n    self.bookViewModel?.fetchBookReviews(with:title,\
    \ callBack: { reviews in\n        var dataToBeDisplayed: String?\n        if let\
    \ reviews = reviews, reviews.count > 0 {\n            let firstReview = reviews[0]\n\
    \            dataToBeDisplayed = firstReview.summary\n        }\n        DispatchQueue.main.async\
    \ {\n            self.delegate?.reviewDidFinish(dataToBeDisplayed)\n        }\n\
    \    })\n}\n```\n\nHere we use the view model to fetch the reviews, and we get\
    \ the summary of the first review and pass it to our delegate.\n\nNow if we run\
    \ our test (Figure 11-8), it should pass ✅.\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig8_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8 Presenter test passing\n\nLet’s add a new test to handle the scenario\
    \ where the view model does not return reviews. It will be almost identical to\
    \ our first test:\n\n```swift\nfunc testFetchingBookReveiwsReturnsNoResultsInDelegate()\
    \ throws {\n    // Given\n    let bookViewModel = BookViewModelStub(stubbedReviews:\
    \ [])\n    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)\n\
    \    let delegateMock = BookViewPresenterDelegateMock()\n    bookViewPresenter.delegate\
    \ = delegateMock\n    // when\n    let expectation = XCTKVOExpectation(keyPath:\
    \ \"review\", object: delegateMock)\n    bookViewPresenter.fetchBookReviews(title:\
    \ \"Title\")\n    self.wait(for: [expectation], timeout: 0.1)\n    // Then\n \
    \   XCTAssertEqual(delegateMock.review, \"No Reviews Available\")\n}\n```\n\n\
    Here we just pass an empty array to our view model stub, and we assert that the\
    \ value passed to our delegate is the expected empty state text.\n\nThis test\
    \ will fail. To fix it, we need to handle this case in our code. It will be as\
    \ simple as adding a default value like so:\n\n```swift\nfunc fetchBookReviews(title:String)\
    \ {\n    self.bookViewModel?.fetchBookReviews(with:title, callBack: { reviews\
    \ in\n        var dataToBeDisplayed: String?\n        if let reviews = reviews,\
    \ reviews.count > 0 {\n            let firstReview = reviews[0]\n            dataToBeDisplayed\
    \ = firstReview.summary\n        }\n        DispatchQueue.main.async {\n     \
    \       self.delegate?.reviewDidFinish(dataToBeDisplayed ?? \"No Reviews Available\"\
    )\n        }\n    })\n}\n```\n\nSince the value passed back to the `BookViewPresenterDelegate`\
    \ is no longer optional, we can update our delegate to this:\n\n```swift\nprotocol\
    \ BookViewPresenterDelegate: AnyObject {\n    func reviewDidFinish(_ review: String)\n\
    }\n```\n\nIf we run our presenter tests (Figure 11-9), they should pass ✅.\n\n\
    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig9_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9 Presenter tests passing\n\nNow that all our unit tests are passing,\
    \ let's uncomment our integration test inside `BookViewIntegrationTests` and try\
    \ to run it. It should pass now as well ✅.\n\n### Final Steps\n\nWe will not be\
    \ doing this step in detail in this chapter as it’s a bit trivial. However, what\
    \ we need to do is to make use of our new presenter inside our view controllers.\
    \ The view controllers need to conform to `BookViewPresenterDelegate`, and we\
    \ need to call `fetchBookReviews` in `viewDidLoad`. When the presenter calls `reviewDidFinish`,\
    \ we should use the data passed and populate our view. When we do this, our UI\
    \ tests should all pass.\n\nWe can go the extra mile and create a new class called\
    \ `BookViewControllerBase` and implement this functionality inside it. And then\
    \ we’ll have our two view controllers inherit from it.\n\n### Summary\n\nUsing\
    \ TDD on legacy code can be a bit challenging. Developers normally tend to avoid\
    \ using TDD and best practices when working on legacy code. However, we should\
    \ always try to leave any code we work on better than we’ve found it. And this\
    \ applies to adding new features to legacy apps. Even if we don’t have the time\
    \ to refactor the whole app, the code we add needs to be well designed, tested,\
    \ and maintainable. And this actually sets the path to transforming the legacy\
    \ code to well-designed code.\n\nIn this chapter we worked on adding a new feature\
    \ to our legacy app. If we had followed the standards the old code followed, we\
    \ would’ve ended up with more duplicated code that is impossible to test. Instead\
    \ we applied TDD and ended up with a new feature that works perfectly with the\
    \ old code and is well designed and highly covered by tests at the same time."
  raw: '#### BookViewPresenter


    Now let’s jump to our presenter . As usual, we’ll start by creating a test case
    class and name it `BookViewPresenterTests`. And we’ll add this test to it:


    ```

    func testFetchingBookReveiwsInDelegate() {

    // Given

    let bookViewModel = BookViewModelStub(stubbedReviews: stubbedReviews())

    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)

    let delegateMock = BookViewPresenterDelegateMock()

    bookViewPresenter.delegate = delegateMock

    }

    func stubbedReviews() -> [Review]{

    return [Review(byLine:"ERROL MORRIS", summary:"The book is interesting")]

    }

    ```


    Here we create an instance of `BookViewPresenter` injected with a stub for our
    view model. And we set its delegate to an instance of `BookViewPresenterDelegateMock`.
    Since all these classes don’t exist, we’ll need to create them so that our test
    can build.


    We’ll start with `BookViewPresenter`:


    ```

    protocol BookViewPresenterDelegate: AnyObject {

    func reviewDidFinish(_ review: String?)

    }

    class BookViewPresenter {

    private var bookViewModel:BookViewModel

    weak var delegate: BookViewPresenterDelegate?

    init(bookViewModel:BookViewModel) {

    self.bookViewModel = bookViewModel

    }

    }

    ```


    Here we define the protocol for our delegate. And we create our class that has
    a dependency on `BookViewModel` .


    Now let’s create `BookViewModelStub`:


    ```

    class BookViewModelStub: BookViewModel {

    var stubbedReviews:[Review]?

    init(stubbedReviews:[Review]) {

    self.stubbedReviews = stubbedReviews

    super.init(network: nil)

    }

    override public func fetchBookReviews(with title:String, callBack: @escaping (_
    reviews:[Review]?) -> Void) {

    callBack(self.stubbedReviews!)

    }

    }

    ```


    This simply takes an array of reviews as the stubbed data and returns it whenever
    `fetchBookReviews` is called.


    Finally we need to create BookViewPresenterDelegateMock:


    ```

    class BookViewPresenterDelegateMock: BookViewPresenterDelegate {

    public var review:String?

    func reviewDidFinish(_ review: String?) {

    self.review = review

    }

    }

    ```


    This here simply conforms to `BookViewPresenterDelegate` and saves the passed
    value in a variable .


    Since our test is building now, it’s time to write the rest of it:


    ```

    func testFetchingBookReveiwsInDelegate() throws {

    // Given

    let bookViewModel = BookViewModelStub(stubbedReviews: stubbedReviews())

    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)

    let delegateMock = BookViewPresenterDelegateMock()

    bookViewPresenter.delegate = delegateMock

    // When

    let expectation = XCTKVOExpectation(keyPath: "review", object: delegateMock)

    bookViewPresenter.fetchBookReviews(title: "Title")

    // Then

    self.wait(for: [expectation], timeout: 0.1)

    XCTAssertEqual(delegateMock.review, "The book is interesting")

    }

    ```


    Here we call `fetchBookReviews` and expect that our delegate will be called. We
    then assert on the value passed to our delegate.


    We use a KVO expectation in our test. And in order to make this expectation work,
    we need to make `BookViewPresenterDelegateMock` inherit from `NSObject` and annotate
    the variable we are listening on with `@objc` and `dynamic`:


    ```

    class BookViewPresenterDelegateMock: NSObject, BookViewPresenterDelegate  {

    @objc dynamic var review:String = ""

    func reviewDidFinish(_ review: String?) {

    self.review = review ?? ""

    }

    }

    ```


    Now to make our test build and pass, we need to implement `fetchBookReviews` :


    ```

    func fetchBookReviews(title:String) {

    self.bookViewModel?.fetchBookReviews(with:title, callBack: { reviews in

    var dataToBeDisplayed: String?

    if let reviews = reviews, reviews.count > 0 {

    let firstReview = reviews[0]

    dataToBeDisplayed = firstReview.summary

    }

    DispatchQueue.main.async {

    self.delegate?.reviewDidFinish(dataToBeDisplayed)

    }

    })

    }

    ```


    Here we use the view model to fetch the reviews, and we get the summary of the
    first review and pass it to our delegate.


    Now if we run our test (Figure [11-8](#505360_1_En_11_Chapter.xhtml#Fig8)), it
    should pass ✅.


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig8_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Presenter test passing


    Let’s add a new test to handle the scenario where the view model does not return
    reviews. It will be almost identical to our first test :


    ```

    func testFetchingBookReveiwsReturnsNoResultsInDelegate() throws {

    // Given

    let bookViewModel = BookViewModelStub(stubbedReviews: [])

    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)

    let delegateMock = BookViewPresenterDelegateMock()

    bookViewPresenter.delegate = delegateMock

    // when

    let expectation = XCTKVOExpectation(keyPath: "review", object: delegateMock)

    bookViewPresenter.fetchBookReviews(title: "Title")

    self.wait(for: [expectation], timeout: 0.1)

    // Then

    XCTAssertEqual(delegateMock.review, "No Reviews Available")

    }

    ```


    Here we just pass an empty array to our view model stub, and we assert that the
    value passed to our delegate is the expected empty state text.


    This test will fail. To fix it, we need to handle this case in our code. It will
    be as simple as adding a default value like so:


    ```

    func fetchBookReviews(title:String) {

    self.bookViewModel?.fetchBookReviews(with:title, callBack: { reviews in

    var dataToBeDisplayed: String?

    if let reviews = reviews, reviews.count > 0 {

    let firstReview = reviews[0]

    dataToBeDisplayed = firstReview.summary

    }

    DispatchQueue.main.async {

    self.delegate?.reviewDidFinish(dataToBeDisplayed ?? "No Reviews Available")

    }

    })

    }

    ```


    Since the value passed back to the `BookViewPresenterDelegate` is no longer optional
    , we can update our delegate to this:


    ```

    protocol BookViewPresenterDelegate: AnyObject {

    func reviewDidFinish(_ review: String)

    }

    ```


    If we run our presenter tests (Figure [11-9](#505360_1_En_11_Chapter.xhtml#Fig9)),
    they should pass ✅.


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig9_HTML.jpg](images/505360_1_En_11_Chapter/505360_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Presenter tests passing


    Now that all our unit tests are passing, let''s uncomment our integration test
    inside `BookViewIntegrationTests` and try to run it. It should pass now as well
    ✅.


    ### Final Steps


    We will not be doing this step in detail in this chapter as it’s a bit trivial.
    However, what we need to do is to make use of our new presenter inside our view
    controllers. The view controllers need to conform to `BookViewPresenterDelegate`,
    and we need to call `fetchBookReviews` in `viewDidLoad`. When the presenter calls
    `reviewDidFinish`, we should use the data passed and populate our view. When we
    do this, our UI tests should all pass.


    We can go the extra mile and create a new class called `BookViewControllerBase`
    and implement this functionality inside it. And then we’ll have our two view controllers
    inherit from it.


    ## Summary


    Using TDD on legacy code can be a bit challenging. Developers normally tend to
    avoid using TDD and best practices when working on legacy code. However, we should
    always try to leave any code we work on better than we’ve found it. And this applies
    to adding new features to legacy apps. Even if we don’t have the time to refactor
    the whole app, the code we add needs to be well designed, tested, and maintainable.
    And this actually sets the path to transforming the legacy code to well-designed
    code.


    In this chapter we worked on adding a new feature to our legacy app. If we had
    followed the standards the old code followed, we would’ve ended up with more duplicated
    code that is impossible to test. Instead we applied TDD and ended up with a new
    feature that works perfectly with the old code and is well designed and highly
    covered by tests at the same time.'
