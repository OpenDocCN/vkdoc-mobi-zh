    \nFigure 5-21\n\nTest plan diagram used for TDD\n\n# 6. Modularization for the\
    \ Win\n\nModularization is dividing the system into a number of relatively independent\
    \ and interchangeable modules with well-defined interfaces, such that each one\
    \ contains everything necessary to execute the desired functionality. Each one\
    \ is small enough and simple enough to be thoroughly understood and well tested.\n\
    \nThough an extremely important design aspect, modularization typically is one\
    \ of the first things that developers sacrifice when their code base grows. They\
