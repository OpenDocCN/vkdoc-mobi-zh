- fmt: '## When Not to Use TDD?


    The answer to that question is subjective. In almost all cases, it will make sense
    to use TDD. However, some use cases do not warrant the use of TDD. The benefits
    of TDD are most evident in long-term projects. So if you’re working on a small
    project that will be done in a short time and you won’t revisit it again, then
    it might make sense to skip TDD in favor of speed and just add tests after or
    even don’t add tests. It all depends on the nature of the project. At the end
    of the day, TDD is a tool, and it’s up to you to use it when you think it is needed.


    ## Refactoring


    We’ve mentioned refactoring a couple times now. It is the third step in the TDD
    cycle. So what is refactoring? Refactoring is the process of changing how internal
    code is structured/written without changing its behavior. Refactoring is always
    done in small iterative steps. Each step should enhance the structure of our code
    and be small enough at the same time so that it’s understandable. An example of
    a small meaningful refactor is moving a block of code to a new helper function
    or extracting it into a new class. Though it might not seem like much, when numerous
    small refactorings are performed, we eventually start to see an impact on our
    code. With each change applied, we can make sure that it doesn’t break anything
    by running our tests, that is, of course if we had been using TDD.


    ## Modularization


    The term “modularization” refers to the division of a system into a number of
    relatively independent and interchangeable modules with well-defined interfaces.
    Each one is tiny enough and simple enough to be well understood and extensively
    tested; each one contains everything required to carry out the intended functionality.
    We can go for a modularized approach when designing our system, and using TDD
    will encourage us to do so. However, if we have a non-modularized system, we can
    still modularize it through the use of refactoring. A non-modularized app, by
    its nature, will contain lots of code smells, will not be testable, and will be
    harder to maintain. You’ll learn more about the process of modularizing a legacy
    app by using TDD in future chapters. For the remainder of this chapter, let’s
    look at some examples of TDD in action beginning with test structure.


    ## Test Structure


    Before we start writing tests using TDD, let’s talk about how we’ll structure
    our tests. A good structure for all your tests is this one:


    1.  Set up the test data.

    2.  Call your method under test.

    3.  Assert that the expected results are returned.


    An easier way to remember this pattern is the “given,” “when,” and “then” triad,
    which is inspired from Behavior-Driven Development (BDD), where *given* reflects
    the setup, *when* the method call, and *then* the assertion part.


    This pattern ensures that your tests remain consistent and easy to read. On top
    of that, tests written with this structure in mind tend to be shorter and more
    verbose. We will be using this structure throughout this book in all our tests.


    ## Let’s TDD


    Now let’s take an example and try to implement it using TDD. Go ahead and open
    up this chapter’s starter project. You can find it in the chapter’s resources.
    We want to create a tax calculator that calculates the net salary out of an original
    salary after subtracting 30% taxes. Let’s start with the first step, writing the
    test. Our first test can be something like this:


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    }

    ```


    Ultimately a test represents a requirement, and the preceding test details our
    most basic requirement: that we have a class named `TaxCalculator` . Since this
    one line won’t even compile, you might think we are heading in the wrong direction,
    but we’re now actually done with our first step; we wrote a failing test.


    On to step 2, let’s make this test pass using the minimum amount of code. To do
    so we need to add the following:


    ```

    class TaxCalculator: NSObject {

    }

    ```


    Now if we run our test, it will pass, meaning we’re done with step 2. Now for
    step 3, we check if there’s anything to refactor. Right now there’s none, since
    we only wrote two lines of code.


    Since we’re done with our three steps, what we do now is repeat our TDD cycle.
    Let’s start by adding a new requirement to our test that will make it fail. The
    next requirement is that we have a function in `TaxCalculator` that takes salary
    and calculates net salary. When we translate this requirement, our test will look
    like this:


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(100)

    }

    ```


    Now let’s fix this test by modifying `TaxCalculator` but again using minimum code.
    So basically all we need to do is this:


    ```

    class TaxCalculator: NSObject {

    public func calculate(salary: Int) -> Int {

    return 0

    }

    }

    ```


    Since now the test is passing and there’s no need for refactoring, let’s repeat
    our cycle one more time. Now we’ll add the requirement for the output of our function:


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(100)

    // Then

    XCTAssertEqual(netSalary, 70,

    "Net salary failed")

    }

    ```


    If you run this test, it will fail, which is what we’re expecting. But before
    going to fix the test, we need to test something essential. If you see this message
    `"Net salary failed"` while working on your project, do you think you will know
    your project’s current problem or you will need to debug? If the answer is no,
    you will need to write a descriptive message to help whoever is working on this
    project (possibly your future self) to know what they just broke:


    ```

    func testExample() throws {

    //  Given

    let calculator = TaxCalculator()

    // When

    let netSalary = calculator.calculate(salary: 100)

    // Then

    XCTAssertEqual(netSalary, 70,

    "Net salary should be 70$ when you subtract 30% taxes from 100$")

    }

    ```


    If you saw `"Net salary should be 70$ when you subtract 30% taxes from 100$"`,
    you will precisely know what the problem is and which method you need to check.


    Now we need to write the code that makes the test pass. After adding the code,
    it should be something like this:


    ```

    class TaxCalculator: NSObject {

    public func calculate(salary: Int) -> Int {

    return salary - ((salary * 30)/100);

    }

    }

    ```


    After running the test, the test is green now, and we still don’t need refactoring
    (Figure [1-2](#505360_1_En_1_Chapter.xhtml#Fig2)).


    ![../images/505360_1_En_1_Chapter/505360_1_En_1_Fig2_HTML.jpg](images/505360_1_En_1_Chapter/505360_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    `testExample` passed'
