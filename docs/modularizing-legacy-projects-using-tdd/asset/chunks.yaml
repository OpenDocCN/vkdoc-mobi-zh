- fmt: '# Trouble with Automated Testing


    The introduction of automated tests gives you and the testers more confidence
    in your project. It provides an immediate validation that all the basic requirements
    are being met and leaves the testers to focus on identifying those hidden bugs.
    However, writing automated tests is considered by many developers a boring activity.
    We saw many cases where developers started off the project with the intention
    of writing tests, but they ditched adding tests once the ball actually started
    rolling. And the main reason for that was that they just didn’t like adding tests.


    Even if you were able to bite the bullet and commit to writing tests or if you
    are one of the minority that finds testing fun, you can still be writing bad or
    unnecessary tests. To be able to see a direct positive effect on quality, we need
    to ensure the quality of our tests themselves. Yes, tests have quality. Just like
    we can have bad code, we can have bad tests. After all, tests are also code. Another
    point to consider is how relevant our tests are. A higher test coverage does not
    mean that our code is properly tested. We could be adding lots of tests that are
    useless. For example, we could be adding tests for unused code or multiple tests
    that test the same thing or even tests that can never fail, like testing getters
    and setters.


    We need to be writing the right tests with good quality and for the right components.
    This is where **Test-Driven Development** (TDD) comes in. It helps us in achieving
    just that and more.


    ## TDD in a Nutshell


    TDD in its essence is a very simple programming process. It consists merely of
    four steps (Figure [1-1](#505360_1_En_1_Chapter.xhtml#Fig1)).


    ![../images/505360_1_En_1_Chapter/505360_1_En_1_Fig1_HTML.jpg](images/505360_1_En_1_Chapter/505360_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The TDD cycle


    1. Write a failing test.

    2. Make the test pass.

    3. Refactor.

    4. Repeat.


    This cycle is called the TDD cycle. This process is arguably the best way to ensure
    high quality of any project. This is because it ensures that your code is fully
    covered by tests, because writing of the code is **test-driven**.


    The cycle is often color-coded:


    1. **Red**: Write a failing test. Since you haven’t written anything before that,
    it’s only natural that this test will fail.

    2. **Green**: Write the minimum amount of code that gets your test to pass.

    3. **Refactor**: Clean up your test and code to get it up to standards if needed.

    4. **Repeat**: Do this cycle again. This is what makes it a cycle. We only stop
    when all requirements are implemented.


    The cycle is color-coded as the colors correspond to how most editors (including
    Xcode) display test results:


    * Failing tests are shown with red color.

    * Passing tests are shown with green color.


    ## Why Use TDD?


    We’ve mentioned a few troubling problems with writing tests. The most popular
    problem among developers is how boring and demotivating writing tests can be.
    Many can’t wrap their heads around writing a test for code they themselves wrote.
    And even if they are able to look past this and see the value of having tests,
    they can end up writing bad tests. And we can’t blame them. It’s normal to not
    perform well when you’re not enjoying what you’re doing.


    This is where TDD changes the game. TDD transforms testing from a boring practice
    to a design activity. By writing tests before writing code, TDD redefines how
    we look at testing. We no longer use tests to merely validate that the code we
    just wrote works (while knowing in the back of our minds it probably works since
    we just wrote it). In TDD, we use them to think about what we want the code to
    do and how we’ll implement it.


    As we mentioned before, not all tests are good. TDD helps in ensuring the quality
    of our tests. For us we consider a test to be good when it follows the FIRST rules
    that are defined by Uncle Bob Martin in his well-known book *Clean Code*. FIRST
    is an acronym with each letter referring to a rule:


    * **F**ast: Tests need to be fast. With TDD we always run our tests with every
    step, which pushes us to have fast tests. If we have slow tests, say 1 second
    each, and we keep adding tests as we go, this will eventually discourage us from
    running the test suite. If we end in this state, it means this is no longer TDD.
    Therefore, to keep using TDD, we’re always encouraged to keep tests fast.

    * **I**ndependent: Tests should not depend on each other. In TDD, we always run
    all our tests to make sure everything is passing before we proceed. This makes
    sure that a test passes even when run with other tests.

    * **R**epeatable: Tests should be repeatable in any environment. As we just mentioned,
    in TDD, we constantly run all our tests with every step. This ensures that our
    tests are always passing and forces us to keep them unaffected by any external
    factors.

    * **S**elf-validating: Tests should have a Boolean output, either pass or fail.
    The first step in TDD is to write a failing test. And then we add code to make
    it pass. This proves that the test can fail and pass. Having a test that always
    passes is counterintuitive and is just a waste of time.

    * **T**imely: Tests should be written right before writing code. Which is basically
    Uncle Bob telling you: “Use TDD!”


    In addition to being a good test, a test needs to be relevant and add value. With
    TDD we write our tests before writing the code. Since each test we write directly
    corresponds to an acceptance criteria for a part in our code, this gives us confidence
    that the tests we’re adding actually have value.


    ## External and Internal Quality


    Our project’s quality is divided into two sections, the external quality and the
    internal quality. External quality is how well the system meets customer expectations.
    With external quality we care about our app being functional and providing the
    expected experience for our end user. We also care whether or not our app is reliable,
    responsive, etc. Internal quality, on the other hand, is how well the system meets
    developer expectations. With internal quality we care about how our internal components
    behave in different situations. We also care about how easy our code is to understand,
    change, scale, etc.


    When using TDD, you always think of the requirement first and write a test for
    it and then think about the implementation. This gives us high confidence that
    our test correctly validates our end requirement. In other words, it upholds and
    maintains the external quality. When it comes to internal quality, every step
    in TDD helps us gather feedback both on our design and actual implementation.
    As you’ll see in future chapters, we always cover each component completely with
    tests. This ensures that each internal component performs as expected. It also
    upholds the quality of the code itself, since developing using TDD forces you
    to constantly rethink your design at every step. Having to write a failing test
    at first encourages us to write loosely coupled code so that it can be easily
    tested. So thinking test-first directly contributes to the quality of our design,
    and in each cycle it pushes us to write a better-structured code if needed.


    ## When to Use TDD?


    You can use TDD at any point in the lifetime of a project. You can use it with
    projects from the get-go or on outdated legacy projects. We strongly encourage
    using TDD whenever possible. Best-case scenario is using TDD on a brand-new project
    and sticking with it. Then you would truly feel the blessing of having a completely
    comprehensive test suite, and you will reap the full rewards of TDD. We can also
    use TDD to guide the process of adding new features to legacy apps. We can even
    use TDD to guide the refactoring of parts inside a legacy app.'
