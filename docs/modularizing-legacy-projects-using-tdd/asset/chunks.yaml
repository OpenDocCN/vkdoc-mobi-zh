- fmt: "### Managed Object Context\n\nA managed object context is an object that is\
    \ responsible for managing a collection of managed objects. It is represented\
    \ by an instance of the `NSManagedObject` class. A Core Data application can have\
    \ one or more managed object contexts. Each context is connected to a persistent\
    \ store coordinator. You can think of a context as a scratch pad where you can\
    \ make any changes you want to the objects inside the context. You can fetch objects\
    \ into your context from the persistent store coordinator. You can also insert\
    \ new objects, make changes to existing objects, or undo/redo changes. Any changes\
    \ you make to objects inside a context remain local to that context and only saved\
    \ in-memory, which means that changes are not propagated to the persistent store\
    \ coordinator. Changes remain local to the context until you manually commit these\
    \ changes by telling the context to save its changes. You can think of this as\
    \ if you’re writing on a board using a nonpermanent marker, which gives you the\
    \ ability to clear all your writing at any time. And when you’re ready to commit\
    \ what you wrote, you then **save** your writing by going over them by a permanent\
    \ marker.\n\n### Persistent Container\n\nBefore iOS 10, we used to have to manually\
    \ set up the preceding three components to have a functioning Core Data stack.\
    \ But from iOS 10, Apple introduced `NSPersistentContainer`, which was a real\
    \ game changer as it completely simplified the process of setting up Core Data.\
    \ It is a container that encapsulates the Core Data stack and takes care of the\
    \ creation and management of the managed object model, persistent store coordinator,\
    \ and managed object context.\n\n## Core Data in Books\n\nIf we take a look at\
    \ **Books**, we will find that it uses Core Data. However, this part of our app\
    \ is still not modularized. Actually, if we look closely, we’ll find that our\
    \ Core Data code is all over the place. We will attempt to fix this during this\
    \ chapter. You will find the Books project in this chapter’s resources.\n\nOur\
    \ goal for this following section is to do the following:\n\n- Create a generic\
    \ Core Data interface.\n- Create a component that consumes this interface to provide\
    \ needed functionality for our app.\n- Use this new component instead of the old\
    \ implementation.\n\nWe will go through these incremental steps while following\
    \ a test-driven approach.\n\n### Testing Stack\n\nWe want our new Core Data layer\
    \ to operate using a SQLite persistent store, as it’s the store type that makes\
    \ most sense in our case. This store type persists on disk and at the same time\
    \ has low performance overhead and low memory footprint.\n\nHowever, when it comes\
    \ to testing, this store type causes a few problems. Since data is persisted on\
    \ disk in a database, this makes data persistent between tests. Persisting data\
    \ between tests might lead to one test failing due to a change in environment\
    \ caused by a previous test. This can be fixed by deleting and then recreating\
    \ the database after each test, but this makes our tests slow, and we need our\
    \ unit tests to be fast.\n\nYou might think that we’ve hit a dead end here. Well,\
    \ think again. We’ve already mentioned that there are other store types. One of\
    \ them is the in-memory store type, and it’s exactly what we need. This solves\
    \ our problem because with this store, data isn’t persisted to disk; it stays\
    \ in memory. So with each test, the in-memory store releases its data.\n\nSo this\
    \ means we need to use different stacks for testing and production. We need to\
    \ use the SQLite store in our production code and in-memory store in our tests.\
    \ We’ll keep that in mind moving forward.\n\n### CoreDataManager\n\nNow that we\
    \ know how Core Data operates, let’s kick off the implementation.\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3 Current UML\n\nWe’ll start with our first goal, which is creating\
    \ a generic interface for Core Data (Figure [10-3](#505360_1_En_10_Chapter.xhtml#Fig3)).\
    \ This interface should provide **CRUD** (Create, Read, Update, Delete) operations\
    \ and should operate on generic models. We know that we’ll need to create a new\
    \ object to be our interface, and this object should be accessible from anywhere\
    \ in the app. And it makes sense to have only one instance of it. So let’s translate\
    \ this into a test. First, let’s add a new test case class and call it `CoreDataManagerTests`.\
    \ And we’ll add this test to it:\n\n```swift\nfunc testSharedInstance() {\n  \
    \  // When\n    let manager = CoreDataManager.shared\n    // Then\n    XCTAssertNotNil(manager)\n\
    }\n```\n\nNormally there’s a build error as we haven't created the class yet.\
    \ Let’s go ahead and fix our test by adding this new class to our app:\n\n```swift\n\
    class CoreDataManager {\n    // MARK:- Singleton\n    public static let shared\
    \ = CoreDataManager()\n}\n```\n\nThe test should now be passing.\n\nMake sure\
    \ to add `@testable import Books` at the beginning of all your test files.\n\n\
    Now on to the next test. We know that `CoreDataManager` should provide an interface\
    \ for CRUD operations. So we should now start adding these tests.\n\nAll our tests\
    \ will require initializing an instance of `CoreDataManager`. This can be added\
    \ inside the common setup function:\n\n```swift\n// MARK:- Variables\nvar manager:\
    \ CoreDataManager!\n// MARK:- Setup\noverride func setUp() {\n    super.setUp()\n\
    \    self.manager = CoreDataManager()\n}\noverride func tearDown() {\n    super.tearDown()\n\
    \    self.manager = nil\n}\n```\n\nNow if you remember, we decided on using different\
    \ stacks for production and testing. This means that we need to create a stack\
    \ for testing and inject it into our manager. Creating a custom stack for testing\
    \ should look like this:\n\n```swift\nlet stack = CoreDataStack(name: \"TestModel\"\
    , storageType: .inMemory)\n```"
  raw: '### Managed Object Context


    A managed object context is an object that is responsible for managing a collection
    of managed objects. It is represented by an instance of the NSManagedObject class.
    A Core Data application can have one or more managed object contexts. Each context
    is connected to a persistent store coordinator. You can think of a context as
    a scratch pad where you can make any changes you want to the objects inside the
    context. You can fetch objects into your context from the persistent store coordinator.
    You can also insert new objects, make changes to existing objects, or undo/redo
    changes. Any changes you make to objects inside a context remain local to that
    context and only saved in-memory, which means that changes are not propagated
    to the persistent store coordinator. Changes remain local to the context until
    you manually commit these changes by telling the context to save its changes.
    You can think of this as if you’re writing on a board using a nonpermanent marker,
    which gives you the ability to clear all your writing at any time. And when you’re
    ready to commit what you wrote, you then **save** your writing by going over them
    by a permanent marker.


    ### Persistent Container


    Before iOS 10, we used to have to manually set up the preceding three components
    to have a functioning Core Data stack. But from iOS 10, Apple introduced `NSPersistentContainer`
    `,` which was a real game changer as it completely simplified the process of setting
    up Core Data. It is a container that encapsulates the Core Data stack and takes
    care of the creation and management of the managed object model, persistent store
    coordinator, and managed object context.


    ## Core Data in Books


    If we take a look at **Books**, we will find that it uses Core Data. However,
    this part of our app is still not modularized. Actually, if we look closely, we’ll
    find that our Core Data code is all over the place. We will attempt to fix this
    during this chapter. You will find the Books project in this chapter’s resources.


    Our goal for this following section is to do the following:


    *   Create a generic Core Data interface.


    *   Create a component that consumes this interface to provide needed functionality
    for our app.


    *   Use this new component instead of the old implementation.


    We will go through these incremental steps while following a test-driven approach.


    ### Testing Stack


    We want our new Core Data layer to operate using a SQLite persistent store, as
    it’s the store type that makes most sense in our case. This store type persists
    on disk and at the same time has low performance overhead and low memory footprint.


    However, when it comes to testing, this store type causes a few problems. Since
    data is persisted on disk in a database, this makes data persistent between tests.
    Persisting data between tests might lead to one test failing due to a change in
    environment caused by a previous test. This can be fixed by deleting and then
    recreating the database after each test, but this makes our tests slow, and we
    need our unit tests to be fast.


    You might think that we’ve hit a dead end here. Well, think again. We’ve already
    mentioned that there are other store types. One of them is the in-memory store
    type, and it’s exactly what we need. This solves our problem because with this
    store, data isn’t persisted to disk; it stays in memory. So with each test, the
    in-memory store releases its data.


    So this means we need to use different stacks for testing and production. We need
    to use the SQLite store in our production code and in-memory store in our tests.
    We’ll keep that in mind moving forward.


    ### CoreDataManager


    Now that we know how Core Data operates , let’s kick off the implementation.


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Current UML


    We’ll start with our first goal, which is creating a generic interface for Core
    Data (Figure [10-3](#505360_1_En_10_Chapter.xhtml#Fig3)). This interface should
    provide **CRUD** (Create, Read, Update, Delete) operations and should operate
    on generic models. We know that we’ll need to create a new object to be our interface,
    and this object should be accessible from anywhere in the app. And it makes sense
    to have only one instance of it. So let’s translate this into a test. First, let’s
    add a new test case class and call it `CoreDataManagerTests` . And we’ll add this
    test to it:


    ```

    func testSharedInstance() {

    // When

    let manager = CoreDataManager.shared

    // Then

    XCTAssertNotNil(manager)

    }

    ```


    Normally there’s a build error as we haven''t created the class yet. Let’s go
    ahead and fix our test by adding this new class to our app:


    ```

    class CoreDataManager {

    // MARK:- Singleton

    public static let shared = CoreDataManager()

    }

    ```


    The test should now be passing .


    Make sure to add “@testable import Books” at the beginning of all your test files.


    Now on to the next test. We know that `CoreDataManager` should provide an interface
    for CRUD operations. So we should now start adding these tests.


    All our tests will require initializing an instance of `CoreDataManager`. This
    can be added inside the common setup function:


    ```

    // MARK:- Variables

    var manager: CoreDataManager!

    // MARK:- Setup

    override func setUp() {

    super.setUp()

    self.manager = CoreDataManager()

    }

    override func tearDown() {

    super.tearDown()

    self.manager = nil

    }

    ```


    Now if you remember, we decided on using different stacks for production and testing.
    This means that we need to create a stack for testing and inject it into our manager.
    Creating a custom stack for testing should look like this :


    ```

    let stack = CoreDataStack(name: "TestModel", storageType: .inMemory)

    ```'
  trans: "\n### 托管对象上下文\n\n托管对象上下文是一个负责管理托管对象集合的对象，由 `NSManagedObject` 类的实例表示。一个 Core\
    \ Data 应用可以拥有一个或多个托管对象上下文。每个上下文都与一个持久化存储协调器相连。你可以将上下文视为一个草稿板，在其中可以对上下文内的对象进行任意修改。你可以从持久化存储协调器将对象提取到上下文中，也可以插入新对象、修改现有对象，或者撤销/重做更改。你对上下文内对象所做的任何修改都仅局限于该上下文，并且仅保存在内存中，这意味着这些更改不会传播到持久化存储协调器。这些修改会一直保留在上下文内，直到你通过告知上下文保存其更改来手动提交这些修改。你可以将其想象成用非永久性记号笔在书写板上写字，这样你随时都能擦除所有内容。当你准备提交所写的内容时，再用永久性记号笔描一遍来**保存**你的笔迹。\n\
    \n### 持久化容器\n\n在 iOS 10 之前，我们必须手动设置上述三个组件才能构建一个可用的 Core Data 栈。但从 iOS 10 开始，Apple\
    \ 引入了 `NSPersistentContainer`，这彻底改变了游戏规则，因为它极大地简化了 Core Data 的设置流程。它是一个封装了 Core\
    \ Data 栈的容器，负责托管对象模型、持久化存储协调器以及托管对象上下文的创建和管理。\n\n## Books 中的 Core Data\n\n如果我们来看一下\
    \ **Books**，就会发现它使用了 Core Data。不过，我们应用的这一部分目前尚未模块化。实际上，仔细审视就会发现，我们的 Core Data\
    \ 代码散落得到处都是。我们将在本章中尝试解决这个问题。你可以在本章的资源中找到 Books 项目。\n\n我们接下来部分的目标如下：\n\n-   创建一个通用的\
    \ Core Data 接口。\n-   创建一个消耗该接口的组件，为我们的应用提供所需功能。\n-   使用这个新组件替换旧的实现。\n\n我们将以测试驱动的方式逐步完成这些增量步骤。\n\
    \n### 测试栈\n\n我们希望新的 Core Data 层能够使用 SQLite 持久化存储进行操作，因为这种存储类型在我们的场景中最合理。这种存储类型会持久化到磁盘，同时性能开销低且内存占用小。\n\
    \n然而，当涉及到测试时，这种存储类型会引发一些问题。由于数据被持久化到磁盘上的数据库中，这会导致数据在测试之间保持持久化。测试间数据持久化可能导致某个测试因前一个测试造成的环境变化而失败。这个问题可以通过在每个测试后删除并重新创建数据库来解决，但这会拖慢测试速度，而我们的单元测试需要快速执行。\n\
    \n你可能会觉得我们陷入了僵局。嗯，再想想。我们之前提到过还有其他存储类型。其中一种是内存存储类型，这正是我们所需要的。这解决了我们的问题，因为使用这种存储，数据不会持久化到磁盘，而是留在内存中。因此，每次测试时，内存存储都会释放其数据。\n\
    \n所以这意味着我们需要为测试和生产环境使用不同的栈。我们需要在生产代码中使用 SQLite 存储，在测试中使用内存存储。后续我们会牢记这一点。\n\n###\
    \ CoreDataManager\n\n现在我们已经了解了 Core Data 的工作原理，让我们开始实现吧。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg](img/505360_1_En_10_Fig3_HTML.jpg)\n\
    \n图 10-3 当前 UML 图\n\n我们从第一个目标开始：为 Core Data 创建一个通用接口（图 10-3）。这个接口应该提供 **CRUD**（创建、读取、更新、删除）操作，并且应该能操作通用模型。我们知道我们需要创建一个新对象作为接口，并且这个对象应该能从应用的任何地方访问到。而且只保留它的一个实例是合理的。所以，让我们将其转化为一个测试。首先，添加一个新的测试用例类，命名为\
    \ `CoreDataManagerTests`。然后向其中添加这个测试：\n\n```swift\nfunc testSharedInstance() {\n\
    \    // 当\n    let manager = CoreDataManager.shared\n    // 那么\n    XCTAssertNotNil(manager)\n\
    }\n```\n\n通常这里会有编译错误，因为我们还没有创建这个类。让我们继续，通过向应用添加这个新类来修复测试：\n\n```swift\nclass CoreDataManager\
    \ {\n    // MARK:- 单例\n    public static let shared = CoreDataManager()\n}\n```\n\
    \n现在测试应该能通过了。\n\n请确保在你的所有测试文件开头添加 `@testable import Books`。\n\n接下来进行下一个测试。我们知道\
    \ `CoreDataManager` 应该提供一个用于 CRUD 操作的接口。所以现在我们应该开始添加这些测试。\n\n我们所有的测试都需要初始化一个 `CoreDataManager`\
    \ 实例。这可以添加到公共的 setup 函数中：\n\n```swift\n// MARK:- 变量\nvar manager: CoreDataManager!\n\
    // MARK:- 设置\noverride func setUp() {\n    super.setUp()\n    self.manager = CoreDataManager()\n\
    }\noverride func tearDown() {\n    super.tearDown()\n    self.manager = nil\n\
    }\n```\n\n现在，如果你还记得，我们决定为生产和测试使用不同的栈。这意味着我们需要为测试创建一个栈，并将其注入到我们的管理器中。为测试创建自定义栈的方式如下：\n\
    \n```swift\nlet stack = CoreDataStack(name: \"TestModel\", storageType: .inMemory)\n\
    ```\n"
- fmt: "### CoreDataStack\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig4_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig4_HTML.jpg)\n\
    *Figure 10-4*: Current UML\n\n`CoreDataStack` is the class responsible for initializing\
    \ the Core Data stack. Since we haven’t created it yet, adding the preceding line\
    \ will cause a build error. So we’ll pause working on `CoreDataManagerTests` for\
    \ now and move our focus on creating `CoreDataStack` (Figure 10-4). Once we’re\
    \ done, we’ll circle back to it.\n\nSo what exactly is `CoreDataStack` responsible\
    \ for? It should initialize a persistent container, and by default the underlying\
    \ managed model should be the app’s model. So let’s translate this into a test.\
    \ First, we’ll add a new test case class named `CoreDataStackTests`, and then\
    \ add this test inside it:\n\n```\nfunc testDefaultStoreName() {\n    // Given\n\
    \    let stack = CoreDataStack()\n    // When\n    let container = stack.storeContainer\n\
    \    // Then\n    XCTAssertEqual(container.name, \"Books\")\n}\n```\n\nTo fix\
    \ this test, we’ll need to create the new class `CoreDataStack` as in the following:\n\
    \n```\nimport CoreData\nclass CoreDataStack {\n    // MARK:- Lazy Variables\n\
    \    lazy var storeContainer: NSPersistentContainer = {\n        let container\
    \ = NSPersistentContainer(name: \"Books\")\n        container.loadPersistentStores\
    \ { _, error in\n            if let error = error as NSError? {\n            \
    \    print(\"Unresolved error \\(error), \\(error.userInfo)\")\n            }\n\
    \        }\n        return container\n    }()\n}\n```\n\nNow we need to be able\
    \ to customize our stack so that it uses custom models, not just the default.\
    \ We’ll heavily depend on this in our tests. So let’s add a test for this:\n\n\
    ```\nfunc testCustomStoreName() {\n    // Given\n    let stack = CoreDataStack(name:\
    \ \"TestModel\")\n    // When\n    let container = stack.storeContainer\n    //\
    \ Then\n    XCTAssertEqual(container.name, \"TestModel\")\n}\n```\n\nTo make this\
    \ pass, we’ll need to do two things. First, update our class to handle custom\
    \ model names:\n\n```\nclass CoreDataStack {\n    // MARK:- Variables\n    private\
    \ let modelName: String\n    // MARK:- Lazy Variables\n    lazy var storeContainer:\
    \ NSPersistentContainer = {\n        let container = NSPersistentContainer(name:\
    \ self.modelName)\n        container.loadPersistentStores { _, error in\n    \
    \        if let error = error as NSError? {\n                print(\"Unresolved\
    \ error \\(error), \\(error.userInfo)\")\n            }\n        }\n        return\
    \ container\n    }()\n    // MARK:- Initializer\n    public init(name: String\
    \ = \"Books\") {\n        self.modelName = name\n    }\n}\n```\n\nSecond, we need\
    \ to add the new data model. To do this, we’ll add a new data model file (Figure\
    \ 10-5) and name it “TestModel.”\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig5_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig5_HTML.jpg)\n\
    *Figure 10-5*: Adding a new data model file\n\nAfter adding the model, head to\
    \ the project file. Open the test target and under **Build Phases** make sure\
    \ that the data model file is **NOT** in **Compile Sources** and is included under\
    \ **Copy Bundle Resources** (Figure 10-6). This will prevent build errors that\
    \ might happen later on when we create entities.\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig6_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig6_HTML.jpg)\n\
    *Figure 10-6*: Setting up the test data model correctly\n\nSadly, our test will\
    \ still be failing after adding the new model. This is because the persistent\
    \ container searches for the data model file by default inside the app’s main\
    \ bundle. However, our test data model is inside our tests bundle. To do this\
    \ we need to manually pass the object model for our data model to the Core Data\
    \ stack. Let’s update our test to this:\n\n```\nfunc testCustomStoreName() {\n\
    \    // Given\n    let testBundle = Bundle(for: type(of: self))\n    let modelUrl\
    \ = testBundle.url(forResource: \"TestModel\", withExtension: \"momd\")!\n   \
    \ let objectModel = NSManagedObjectModel(contentsOf: modelUrl)\n    let stack\
    \ = CoreDataStack(name: \"TestModel\", objectModel: objectModel)\n    // When\n\
    \    let container = stack.storeContainer\n    // Then\n    XCTAssertEqual(container.name,\
    \ \"TestModel\")\n}\n```\n\nAnd update our class to this:\n\n```\nclass CoreDataStack\
    \ {\n    // MARK:- Variables\n    private let modelName: String\n    private let\
    \ objectModel: NSManagedObjectModel?\n    // MARK:- Lazy Variables\n    lazy var\
    \ storeContainer: NSPersistentContainer = {\n        var container: NSPersistentContainer\n\
    \        if let objectModel = self.objectModel {\n            container = NSPersistentContainer(name:\
    \ self.modelName, managedObjectModel: objectModel)\n        }\n        else {\n\
    \            container = NSPersistentContainer(name: self.modelName)\n       \
    \ }\n        container.loadPersistentStores { _, error in\n            if let\
    \ error = error as NSError? {\n                print(\"Unresolved error \\(error),\
    \ \\(error.userInfo)\")\n            }\n        }\n        return container\n\
    \    }()\n    // MARK:- Initializer\n    public init(name: String = \"Books\"\
    , objectModel: NSManagedObjectModel? = nil) {\n        self.modelName = name\n\
    \        self.objectModel = objectModel\n    }\n}\n```\n\nHere we add the ability\
    \ to inject a custom object model. And when initializing our container, we check\
    \ if a custom model is passed. If so, we use it to create the container. If not,\
    \ then we create the container normally.\n\nNow if you recall, we need to be able\
    \ to create Core Data stacks that utilize in-memory stores. Right now our stack\
    \ can only be set up using the default store, which is the SQLite store. So let’s\
    \ add tests for this:\n\n```\nfunc testPersistentStoreType() {\n    // Given\n\
    \    let stack = CoreDataStack(storageType: .persistent)\n    // When\n    let\
    \ container = stack.storeContainer\n    // Then\n    XCTAssertEqual(container.persistentStoreDescriptions[0].type,\
    \ NSSQLiteStoreType)\n}\n\nfunc testInMemoryStoreType() {\n    // Given\n    let\
    \ stack = CoreDataStack(storageType: .inMemory)\n    // When\n    let container\
    \ = stack.storeContainer\n    // Then\n    XCTAssertEqual(container.persistentStoreDescriptions[0].type,\
    \ NSInMemoryStoreType)\n}\n```\n\nTo fix our tests, we need to add an enum that\
    \ represents store type. We can add it in a separate file or inside the `CoreDataStack`\
    \ file. The enum should look like this:\n\n```\nenum StorageType {\n    case persistent,\
    \ inMemory\n}\n```\n\nThen to fix our tests, we need to change our class to this:\n\
    \n```\nclass CoreDataStack {\n    // MARK:- Variables\n    private let modelName:\
    \ String\n    private let objectModel: NSManagedObjectModel?\n    private let\
