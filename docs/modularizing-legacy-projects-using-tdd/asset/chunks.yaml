- fmt: '# 12. Handling Production Issues


    App quality has been a prominent topic in this book. We talked about our external
    quality and internal quality. We also talked about how using TDD can significantly
    enhance our quality. But quality is something we need to be always working toward.
    Even the biggest companies are constantly working toward enhancing their quality.
    As we said, having a well-tested project helps in avoiding setbacks in our quality.
    But it doesn’t eliminate them. Even if we follow TDD in everything we do, we might
    still miss a few corner cases. In the end we’re only human.


    ## Our Tool


    To be able to proactively work toward better quality, we need to be able to track
    two things: bugs and crashes. We need to be able to track the crashes our users
    encounter. This is an extremely hard thing to implement ourselves. However, thankfully
    there are many third-party tools that can provide us with this. We also need to
    provide our users with a way to communicate with us any bugs they encounter while
    using our app. We can manually implement this in a very basic way. However, there
    are also tools that can provide us with this functionality along with a collection
    of added functionalities (network logs, console logs, user steps, device state
    with every bug reported).


    In this chapter, we are going to use Instabug for bug reporting and crash reporting.
    It’s perfectly fitting what we exactly need to keep track of our bugs/crashes.
    We will show you how you can use it to be able to reproduce your bugs/crashes
    so that you can write tests to fix them.


    ### Integration


    First, let’s open up our starter project from this chapter’s resources. Now in
    order to integrate our tool, we’ll need to go to their [website](http://dashboard.instabug.com)
    and sign up. When we sign up, we’ll be provided with a token, which is what we’ll
    need to link our account to our app.


    Next, we will add Instabug’s SDK to our app using Swift Package Manager (Figure
    [12-1](#505360_1_En_12_Chapter.xhtml#Fig1)). Their package lives in this repo:
    [`https://github.com/Instabug/Instabug-SP`](https://github.com/Instabug/Instabug-SP).


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig1_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Adding a third-party library using SPM


    Finally we will add this line to the `AppDelegate.swift`, and you are ready to
    go ![../images/505360_1_En_12_Chapter/505360_1_En_12_Figa_HTML.gif](images/505360_1_En_12_Chapter/505360_1_En_12_Figa_HTML.gif).


    ```

    Instabug.start(withToken: "TOKEN", invocationEvents: .shake)

    ```


    ## Production Bug


    We just received our first bug (Figure [12-2](#505360_1_En_12_Chapter.xhtml#Fig2)).
    A user is complaining that they can’t find any books.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig2_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    User submitted a bug report


    ### Debugging


    From the attached screenshot (Figure [12-2](#505360_1_En_12_Chapter.xhtml#Fig2)),
    we can see that the `MainViewController` is empty. So this means that their complaint
    is valid.


    After checking the bug report and looking at the network logs (Figure [12-3](#505360_1_En_12_Chapter.xhtml#Fig3)),
    we can see that the books request failed. So this behavior is expected. However,
    we don’t show any error messages at all.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig3_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Network logs from bug report


    What we need to do here is once the books request failed, we need to make sure
    to show this message: “Failed to load best seller books”.


    Fixing this should be simple. But even if it was as simple as adding one letter,
    we still need to use TDD. The rule of TDD is that we can’t write any code without
    having a failing test. And given that we’ve shipped this bug to production, then
    this means that we don’t have tests covering this scenario.


    ### UI Test


    Let’s open `BooksUITests` and add a new test to simulate this bug. The test should
    look like this:


    ```

    func testShowingErrorMessageWhenFailedToFetchBooksRequest() {

    // Given

    server.GET["/svc/books/v3/lists/overview.json"] = {_ in HttpResponse.notFound}

    let app = XCUIApplication()

    app.launchArguments += ["TESTING"]

    app.launch()

    // When

    let booksTableView = app.tables

    // Then

    let failureMessage = booksTableView.staticTexts["Failed to fetch best seller books"]

    _ = failureMessage.waitForExistence(timeout:10)

    }

    ```


    Here we stub our request as we used to do, but now we return a failed response.
    Then we assert that the error message is displayed.'
