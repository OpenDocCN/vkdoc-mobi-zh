    \    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
    \ \"添加 \\(key) 完成\")\n        queue.async {\n            image.load(url: URL(string:\
    \ \"https://storage.googleapis.com/du-prd/books/images/9781501171345.jpg\")!)\n\
    \            exp.fulfill()\n        }\n        expectations.append(exp)\n    }\n\
    \    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
    \ \"添加 \\(key) 完成\")\n        queue.async {\n            image.load(url: URL(string:\
    \ \"https://storage.googleapis.com/du-prd/books/images/9781501171345.jpg\")!)\n\
    \            exp.fulfill()\n        }\n        expectations.append(exp)\n    }\n\
    \    wait(for: expectations, timeout: 10)\n}\n```\n\n现在我们有了一个失败的测试，表明我们的代码不是线程安全的，是时候修复我们的代码了。我们可以像数据库示例中那样，使用串行队列来修复扩展，但让我们尝试点新东西。这次我们将使用锁，这是一种确保同步的常用方法：\n\
    \n```\nextension UIImageView {\n    // MARK:- 变量\n    static var dictionaryImageCache\
    \ = [String:UIImage]()\n    static var lock = NSRecursiveLock()\n    // MARK:-\
    \ 函数\n    func load(url: URL) {\n        DispatchQueue.global().async { [weak\
    \ self] in\n            Self.lock.lock()\n            if (Self.dictionaryImageCache[url.path]\
    \ != nil) {\n                DispatchQueue.main.async {\n                    self?.image\
    \ = Self.dictionaryImageCache[url.path]\n                }\n                Self.lock.unlock()\n\
    \                return\n            }\n            Self.lock.unlock()\n     \
    \       if let data = try? Data(contentsOf: url) {\n                if let image\
    \ = UIImage(data: data) {\n                    Self.lock.lock()\n            \
    \        Self.dictionaryImageCache[url.path] = image\n                    Self.lock.unlock()\n\
    \                    DispatchQueue.main.async {\n                        self?.image\
    \ = image\n                    }\n                }\n            }\n        }\n\
    \    }\n}\n```\n\n我们在这里所做的是，在访问或修改之前，先通过调用 `lock()` 获取锁。这确保了当任何其他线程试图获取同一把锁时，它将被强制等待，直到持有锁的线程释放它。我们通过调用\
    \ `unlock()` 来释放锁。\n\n现在如果我们再次运行测试（图 8-12），它将会通过 ✅。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig12_HTML.jpg](img/505360_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12. 多线程测试通过\n\n## 总结\n\n在本章中，你了解了多线程编程中的一些主要概念。首先是并发，即两个或多个任务可以在不同线程上同时执行。在\
    \ iOS 中，并发是通过使用 Grand Central Dispatch (GCD) 实现的。GCD 将线程的手动处理从开发者手中抽象出来。你无需创建线程，而是创建任务并将其分发到队列，GCD\
    \ 会在需要时处理这些任务在多个线程上的底层执行。\n\n调度队列是 GCD 运行的核心。当任务被提交到队列时，GCD 会按照先进先出的顺序执行这些任务。然而，我们有两种类型的队列：串行队列和并发队列。串行队列确保在任何给定时间，该队列中只有一个任务在运行，当一个任务完成后，队列中的下一个任务才开始。另一方面，并发队列能够同时运行多个任务。\n\
    \n当向队列提交任务时，我们可以使用 `sync` 或 `async` 来提交。这种区别影响的是**源**队列（执行分发的队列），而不是**目标**队列（任务被提交到的队列）。使用\
    \ `sync` 时会阻塞调用队列，直到任务完成。而使用 `async` 时，调用队列会正常运行。\n\n并发有许多好处，尤其是在性能方面。由于我们能够同时执行多个任务，并且不会因为一个繁重任务而阻塞另一个任务，这自然会提升我们应用的性能。但这并非总是如此，过度使用并发会因不必要的高内存消耗而降级性能。\n\
    \n除了对性能的负面影响，并发还有一些严重的缺点。如果使用不当，并发可能导致错误和崩溃。当两个操作依赖于同一个共享资源并且彼此并发执行时，可能会引发一系列问题。我们可能会遇到死锁，甚至是数据竞争条件。\n\
    \n当某个线程正在修改一个资源，而另一个线程要么试图读取同一资源，要么也试图修改它时，就会发生竞态条件。竞态条件往往会导致极其难以调试的意外行为，在某些情况下甚至可能引发崩溃。在本章中，我们探讨了如何应用\
    \ TDD 来修复数据竞争。我们通过添加一种特殊类型的测试来应用 TDD 的第一步，这种测试在多线程环境中测试我们的代码（并配合使用线程清理器）。然后像往常一样进行\
    \ TDD 循环中的第二步和第三步。\n\n# 9. 测试你的网络\n\n如今大多数应用在某个时候都会与互联网通信。纯本地应用很棒，但与 Web 服务通信可以帮助你将应用转变为一款真正卓越的应用。有大量多样化的公共\
    \ Web 服务可供你的应用使用。你还可以接入自己的私有 Web 服务，为用户提供一组扩展的功能，这些功能是你的纯本地应用所无法提供的。\n\n## 网络基础知识\n\
    \n当人们想到互联网时，脑海中可能会浮现出许多东西。其中之一就是“**www.**”。这代表**万维网**，它是我们能够通过互联网访问的信息系统。顾名思义，这个系统是全球性的。对于如此庞大的系统，要演变成我们今天所知的模样，它必须受一些协议的约束，以便全球所有机器都能访问。因此，两台机器之间要通信，需要使用定义的协议进行。协议本质上是双方之间的一份契约，包含一套既定的规则，规定了数据如何在不同的设备之间传输。\n\
    \n### HTTP 请求\n\n超文本传输协议 (HTTP) 是一种允许在双方之间传输资源的协议。\n\n一个 HTTP 请求通常包含以下内容：\n\n\
    * URL：标识我们想要的资源。\n* HTTP 方法：声明可以执行的操作类型。\n* 头部（可选）：这是键/值对，允许我们向服务器传递额外信息。\n* 数据（可选）：可以有多种形式，例如\
    \ JSON。通常被称为请求的正文。\n\nHTTP 方法有多种选择：\n\n* `GET`：用于获取资源\n* `POST`：用于创建或更新资源\n* `PATCH`：用于修改资源\n\
    * `PUT`：用于替换资源\n* `DELETE`：用于删除资源\n\n### HTTP 响应\n\n当你向服务器发出 HTTP 请求时，服务器会返回一个响应。一个响应通常包含以下内容：\n\
    \n* 状态码：这是一个数字，告诉你请求是否成功，或者因为某些错误而失败。\n* 头部：这类似于请求中的头部。它们携带关于响应的额外信息。\n* 数据：这也类似于请求中的数据。它携带你所请求的数据（如果有的话）。它可以有多种形式，但大多数服务器以\
    \ JSON 格式返回数据。\n"
- fmt: '### URL


    A Uniform Resource Locator (URL) is basically an address to a unique resource.
    This resource can be an HTML page, an image, JSON data, etc.


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig1_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig1_HTML.jpg)


    Figure 9-1 URL components


    A basic URL has different components (Figure 9-1):


    - **Scheme**: Which indicates the protocol the client must use to access the resource.

    - **Host**: Which is usually a domain name (but an IP address can also be used),
    which indicates the server we are communicating with.

    - **Path**: Which identifies the specific resource we are requesting from the
    server.

    - **Query** (optional): With this, we can add extra parameters that the server
    might use to further process the resource before returning it.


    There are other possible parts, but they are not relevant for basic usage. So
    we won’t be discussing them.


    ### Networking in iOS


    As mentioned before, almost every app that’s worth its salt will make a network
    request at some point. Which makes performing network requests a skill that any
    iOS developer must master. Many developers nowadays rely on third-party libraries
    to handle their network calls. Some of these libraries are quite powerful, but
    in many cases they can be an overkill, and by using them, you will just be adding
    an external dependency, which is always a risk. Instead, we can use the native
    iOS URL Loading System, with the main component being `URLSession`. `URLSession`
    is a part of a collection of classes that work together to handle network requests.


    Let’s talk about the most important components in the iOS URL Loading System in
    detail (Figure 9-2).


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig2_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig2_HTML.jpg)


    Figure 9-2 iOS URL Loading System


    #### URLSession


    The session is a core concept of HTTP. You can think of a session as an open tab
    or window of your web browser, through which you make multiple network requests.
    Loading a single web page can be fetching many resources through multiple requests
    under the hood, to be able to render the page. These requests are made using a
    single session as they share multiple things. `URLSession`, from the name, is
    used to manage an HTTP session. Making multiple requests using the same `URLSession`
    allows us to share configurations and cached data among requests.


    #### URLSessionConfiguration


    Since we just mentioned that requests made with the same session share the same
    configuration, let’s talk about the object that holds these configurations. A
    `URLSessionConfiguration` defines the behavior and policies used when making requests
    using a `URLSession`. We can use it to set the timeout values, caching policies,
    connection requirements, etc. There are three types of `URLSessionConfiguration`:


    - **Default**: A session configuration that uses disk-persistent storage for caches,
    cookies, or credentials.

    - **Ephemeral**: A session configuration that uses no persistent storage for caches,
    cookies, or credentials.

    - **Background**: A session configuration that allows app uploads or downloads
    to be performed in the background, even when the app itself is suspended or terminated.


    #### URLRequest


    We’ve already discussed the components that make up an HTTP request: URL, HTTP
    method, headers, and data. `URLRequest` is a structure that encapsulates all these
    components that describe a single request.


    #### URLSessionTask


    This is what actually performs the request. Normally we don’t directly use `URLSessionTask`,
    but we use one of its subclasses. There are four native types of tasks:


    - **Data task**: This type of task is able to send and receive data. It’s the
    most common type of task and is used when sending or requesting JSON, for example.

    - **Upload task**: This type of task is similar to a data task, but it also supports
    uploading data in the background.

    - **Download task**: This type of task is able to download data from a server
    and directly write it to a file on disk. You can also track the download progress
    and can pause and resume the download.

    - **Stream task**: This type of task provides a stream of data by establishing
    a connection with the server.


    We don’t create the tasks directly. Instead, we use one of the functions inside
    `URLSession` to create a new task. Once we create a task, we start it by calling
    the `resume()` function.


    ### Networking in Books


    The main premise of our app is that we fetch a list of bestseller books and display
    it for our users. A substantial part of our functionality depends on networking.
    And we might need to add new features in the future that depend on networking.
    However, when we take a look at our network layer, we’ll find that it’s highly
    coupled with a specific request to the single resource we’re requesting from our
    server. We’ll also find out that our network layer is not properly covered by
    tests.


    Luckily, this is fixable, and this will be our aim during the rest of this chapter.
    Our goal will be to create a generic enough network layer (Figure 9-3), so that
    it becomes easy to reuse for different requests. And as always, we will implement
    this refactor using a test-driven approach. You can find the project in this chapter’s
    resources.


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig3_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig3_HTML.jpg)


    Figure 9-3 Network Module


    #### Process Overview


    Our network layer is already separated from the rest of our code. What we’re attempting
    to do here is just to refactor it. Even though what we’re attempting is not considered
    modularization, we will apply the same principles and almost the same process
    outlined in Chapter 6 (Figure 9-4). Let’s take a look at this process and see
    what we can apply in our case.


    ##### Modularization process


    ![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig4_HTML.jpg](images/505360_1_En_9_Chapter/505360_1_En_9_Fig4_HTML.jpg)


    Figure 9-4 Modularization process


    First of all, we don’t really have to choose a starting point, because we only
    have one point, which is the class `NetworkLayer`. Which makes step 1 and step
    4 redundant.


    ##### Identify the Class’s Responsibilities


    The class in question is the `NetworkLayer` class. If we scan this class, we’ll
    find that it has only one responsibility, which is executing a request to fetch
    books from our server. However, as we already mentioned before, we need to tweak
    this responsibility a bit and make it more generic. We want to make this class
    able to make any request, not just fetch our books from the server. We’ll attempt
    to achieve this in the next steps.


    ##### Design Overview


    Now before we start refactoring, let’s take a closer look at what `NetworkLayer`
    does internally. We can see that it’s doing a lot of things. First, it’s storing
    a lot of static information related to the environment like host, API key, etc.
    Second, it contains information about creating the request itself, which is messy,
    and we already know we want to make it more generic. Third, it creates a `URLSessionTask`
    and executes the request. A good idea would be to separate all these coherent
    tasks.


    ###### NetworkLayer Tasks to Be Refactored


    1. Storing static information

    2. Creating a URL request

    3. Creating a `URLSessionTask` and executing the request'
