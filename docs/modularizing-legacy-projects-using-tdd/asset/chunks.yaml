    \ [10-11](#505360_1_En_10_Chapter.xhtml#Fig11)). Let’s add a test for updating:\n\
    \n```\nfunc testUpdateEntity() {\n    // Given\n    let testModel = manager.create(TestEntity.self)\n\
    \    testModel?.name = \"Test\"\n    testModel?.number = 123\n    // When\n  \
    \  manager.update(testModel)\n    stack.context.rollback()\n    // Then\n    let\
    \ updatedModel = manager.fetchAll(TestEntity.self)?[0]\n    XCTAssertNotNil(updatedModel)\n\
    \    XCTAssertEqual(updatedModel?.name, \"Test\")\n    XCTAssertEqual(updatedModel?.number,\
    \ 123)\n}\n```\n\nYou might have noticed that we call `rollback()` on our context\
    \ inside our test. So what does this do? First, let’s look at what we’re attempting\
    \ to do in our test. We insert a new object using `create`, and then we make some\
    \ changes to it. We call our `update` function, and we’re expecting it to persist\
    \ these changes. Given the nature of Core Data, we know that the changes we make\
    \ will be applied only locally to the current context we’re in. And since we use\
    \ the same context for creating and updating as we do for fetching, then even\
    \ if we don’t persist our changes in the store, the fetch will return the updated\
    \ data. To showcase this, let’s add implementation for `update` that doesn’t actually\
    \ save the changes:\n\n```\n@discardableResult\npublic func update(_ entity: T?)\
    \ -> T? {\n    return entity\n}\n```\n\nThe test now fails because we do not save.\
    \ To showcase the importance of `rollback()`, comment out the line where we call\
    \ `rollback()` and rerun the test. We’ll find that our test passes. So in this\
    \ test the use of `rollback` is essential to clear all unsaved data and assert\
    \ only on the saved data.\n\nTo fix the test, we need to change our implementation\
    \ so that we actually save the changes:\n\n```\n@discardableResult\npublic func\
    \ update(_ entity: T?) -> T? {\n    stack.saveContextIfNeeded()\n    return entity\n\
    }\n```\n\n### Advanced Fetching\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg)\n\
    \n**Figure 10-12** Current UML\n\nSince tests are now passing, let’s add a new\
    \ functionality. We need to be able to sort our fetched results (Figure [10-12](#505360_1_En_10_Chapter.xhtml#Fig12)).\
    \ Sorting them while fetching is much more optimized than sorting them in memory\
    \ after fetching. In addition to sorting, we need to be able to filter our fetch\
    \ results. We also need to set a limit for fetch results. Let’s add tests for\
    \ these two functionalities:\n\n```\nfunc testFetchSorted() {\n    // Given\n\
    \    for i in 1...10 {\n        let testModelOne = manager.create(TestEntity.self)\n\
    \        testModelOne?.number = Int32(i)\n        manager.update(testModelOne)\n\
    \    }\n    // When\n    let sort = NSSortDescriptor(key: \"number\", ascending:\
    \ false)\n    let models = manager.fetchAll(TestEntity.self, sort: sort)\n   \
    \ // Then\n    XCTAssertNotNil(models)\n    XCTAssertEqual(models?.count, 10)\n\
    \    XCTAssertEqual(models?[0].number, 10)\n    XCTAssertEqual(models?[9].number,\
    \ 1)\n}\n\nfunc testFetchWithLimit() {\n    // Given\n    for i in 1...10 {\n\
    \        let testModelOne = manager.create(TestEntity.self)\n        testModelOne?.number\
    \ = Int32(i)\n        manager.update(testModelOne)\n    }\n    // When\n    let\
    \ models = manager.fetchAll(TestEntity.self, limit: 5)\n    // Then\n    XCTAssertNotNil(models)\n\
    \    XCTAssertEqual(models?.count, 5)\n}\n\nfunc testFetchWithPredicate() {\n\
    \    // Given\n    for i in 1...10 {\n        let testModelOne = manager.create(TestEntity.self)\n\
    \        testModelOne?.number = Int32(i)\n        manager.update(testModelOne)\n\
    \    }\n    // When\n    let predicate = NSPredicate(format: \"number > 5\")\n\
    \    let models = manager.fetchAll(TestEntity.self, predicate: predicate)\n  \
    \  // Then\n    XCTAssertNotNil(models)\n    XCTAssertEqual(models?.count, 5)\n\
    }\n```\n\nTo fix these tests, update `fetchAll` to this:\n\n```\npublic func fetchAll(_\
    \ entityType: T.Type, sort: NSSortDescriptor? = nil, limit: Int = 0, predicate:\
    \ NSPredicate? = nil) -> [T]? {\n    let request: NSFetchRequest = T.fetchRequest()\n\
    \    if let sort = sort {\n        request.sortDescriptors = [sort]\n    }\n \
    \   if let predicate = predicate {\n        request.predicate = predicate\n  \
    \  }\n    request.fetchLimit = limit\n    do {\n        let results = try stack.context.fetch(request)\n\
    \        return results\n    } catch let error as NSError {\n        print(\"\
    Unresolved error \\(error), \\(error.userInfo)\")\n    }\n    return nil\n}\n\
    ```\n\n### Next Steps\n\nLet’s recall our goal we stated earlier. It was divided\
    \ into three subgoals:\n\n*   Create a generic Core Data interface `CoreDataManager`\
    \ ✅.\n*   Create a component that consumes this interface to provide needed functionality\
    \ for our app.\n*   Use this new component instead of the old implementation.\n\
    \nSince we’re done with the creation of the generic Core Data interface (`CoreDataManager`),\
    \ let’s move now to our second subgoal. We will create a new component called\
    \ `FavoritesManager`, which will be responsible for adding, deleting, and fetching\
    \ our favorites (Figure [10-13](#505360_1_En_10_Chapter.xhtml#Fig13)).\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig13_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig13_HTML.jpg)\n\
    \n**Figure 10-13** Current UML\n\nWe’ll start as usual with tests. Let’s add a\
    \ new test case class named `FavoritesManagerTests`, which will house our tests.\
    \ Next, let’s set up our manager. We need to set it up using a custom in-memory\
    \ Core Data manager that consumes our app’s data model. Our file should look like\
    \ this:\n\n```\nimport XCTest\n@testable import Books\nimport CoreData\n\nclass\
    \ FavoritesManagerTests: XCTestCase {\n    // MARK:- Variables\n    var favoritesManager:\
    \ FavoritesManager!\n    var coredataManager: CoreDataManager!\n    var stack:\
    \ CoreDataStack!\n\n    // MARK:- Setup\n    override func setUp() {\n       \
    \ super.setUp()\n        self.stack = CoreDataStack(storageType: .inMemory)\n\
    \        self.coredataManager = CoreDataManager(coreDataStack: stack)\n      \
    \  self.favoritesManager = FavoritesManager(coredataManager: coredataManager)\n\
    \    }\n\n    override func tearDown() {\n        super.tearDown()\n        self.favoritesManager\
    \ = nil\n        self.coredataManager = nil\n        self.stack = nil\n    }\n\
    }\n```\n\nThis will cause build errors. To fix these, we’ll need to add a new\
    \ class `FavoritesManager` that has an internal dependency on `CoreDataManager`.\
    \ Our class should look like this:\n\n```\nclass FavoritesManager {\n    // MARK:-\
    \ Variables\n    private var coredataManager: CoreDataManager\n\n    // MARK:-\
    \ Singleton\n    public static let shared = FavoritesManager()\n\n    // MARK:-\
    \ Initializer\n    init(coredataManager: CoreDataManager = .shared) {\n      \
    \  self.coredataManager = coredataManager\n    }\n}\n```\n\nNow we know from before\
    \ that interacting with `CoreDataManager` requires our models to conform to the\
    \ `Storable` protocol. Let’s go ahead and get this out of the way. We’ll do the\
    \ same thing we did with `TestEntity` for our two managed object classes: `Book`\
    \ and `BuyLink`. We need to also make sure that both classes are marked with the\
    \ `final` keyword to avoid build errors.\n\nNow let’s write tests for the operations\
    \ `FavoritesManager` is responsible for. Normally we would tackle this in a normal\
    \ TDD fashion. However, we won’t go through this part step by step to avoid repetitiveness.\
    \ After going through multiple TDD cycles, we will end up with this set of new\
    \ tests:"
  raw: '### Updating


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig11_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Current UML


    Now let’s move to a new CRUD operation (Figure [10-11](#505360_1_En_10_Chapter.xhtml#Fig11)).
    Let’s add a test for updating:


    ```

    func testUpdateEntity() {

    // Given

    let testModel = manager.create(TestEntity.self)

    testModel?.name = "Test"

    testModel?.number = 123

    // When

    manager.update(testModel)

    stack.context.rollback()

    // Then

    let updatedModel = manager.fetchAll(TestEntity.self)?[0]

    XCTAssertNotNil(updatedModel)

    XCTAssertEqual(updatedModel?.name, "Test")

    XCTAssertEqual(updatedModel?.number, 123)

    }

    ```


    You might have noticed that we call `rollback()` on our context inside our test.
    So what does this do? First, let’s look at what we’re attempting to do in our
    test. We insert a new object using create, and then we make some changes to it.
    We call our update function, and we’re expecting it to persist these changes.
    Given the nature of Core Data, we know that the changes we make will be applied
    only locally to the current context we’re in. And since we use the same context
    for creating and updating as we do for fetching, then even if we don’t persist
    our changes in the store, the fetch will return the updated data. To showcase
    this, let’s add implementation for update that doesn’t actually save the changes:


    ```

    @discardableResult

    public func update(_ entity: T?) -> T? {

    return entity

    }

    ```


    The test now fails because we do not save. To showcase the importance of `rollback()`
    , comment out the line where we call `rollback()` and rerun the test. We’ll find
    that our test passes. So in this test the use of rollback is essential to clear
    all unsaved data and assert only on the saved data.


    To fix the test, we need to change our implementation so that we actually save
    the changes:


    ```

    @discardableResult

    public func update(_ entity: T?) -> T? {

    stack.saveContextIfNeeded()

    return entity

    }

    ```


    ### Advanced Fetching


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Current UML


    Since tests are now passing, let’s add a new functionality. We need to be able
    to sort our fetched results (Figure [10-12](#505360_1_En_10_Chapter.xhtml#Fig12)).
    Sorting them while fetching is much more optimized than sorting them in memory
    after fetching. In addition to sorting, we need to be able to filter our fetch
    results. We also need to set a limit for fetch results. Let’s add tests for these
    two functionalities:


    ```

    func testFetchSorted() {

    // Given

    for i in 1...10 {

    let testModelOne = manager.create(TestEntity.self)

    testModelOne?.number = Int32(i)

    manager.update(testModelOne)

    }

    // When

    let sort = NSSortDescriptor(key: "number", ascending: false)

    let models = manager.fetchAll(TestEntity.self, sort: sort)

    // Then

    XCTAssertNotNil(models)

    XCTAssertEqual(models?.count, 10)

    XCTAssertEqual(models?[0].number, 10)

    XCTAssertEqual(models?[9].number, 1)

    }

    func testFetchWithLimit() {

    // Given

    for i in 1...10 {

    let testModelOne = manager.create(TestEntity.self)

    testModelOne?.number = Int32(i)

    manager.update(testModelOne)

    }

    // When

    let models = manager.fetchAll(TestEntity.self, limit: 5)

    // Then

    XCTAssertNotNil(models)

    XCTAssertEqual(models?.count, 5)

    }

    func testFetchWithPredicate() {

    // Given

    for i in 1...10 {

    let testModelOne = manager.create(TestEntity.self)

    testModelOne?.number = Int32(i)

    manager.update(testModelOne)

    }

    // When

    let predicate = NSPredicate(format: "number > 5")

    let models = manager.fetchAll(TestEntity.self, predicate: predicate)

    // Then

    XCTAssertNotNil(models)

    XCTAssertEqual(models?.count, 5)

    }

    ```


    To fix these tests, update fetchAll to this:


    ```

    public func fetchAll(_ entityType: T.Type, sort: NSSortDescriptor? = nil, limit:
    Int = 0, predicate: NSPredicate? = nil) -> [T]? {

    let request: NSFetchRequest = T.fetchRequest()

    if let sort = sort {

    request.sortDescriptors = [sort]

    }

    if let predicate = predicate {

    request.predicate = predicate

    }

    request.fetchLimit = limit

    do {

    let results = try stack.context.fetch(request)

    return results

    } catch let error as NSError {

    print("Unresolved error \(error), \(error.userInfo)")

    }

    return nil

    }

    ```


    ### Next Steps


    Let’s recall our goal we stated earlier. It was divided into three subgoals:


    *   Create a generic Core Data interface ✅.


    *   Create a component that consumes this interface to provide needed functionality
    for our app.


    *   Use this new component instead of the old implementation.


    Since we’re done with the creation of the generic Core Data interface (`CoreDataManager`),
    let’s move now to our second subgoal. We will create a new component called `FavoritesManager`
    , which will be responsible for adding, deleting, and fetching our favorites (Figure
    [10-13](#505360_1_En_10_Chapter.xhtml#Fig13)).


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig13_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Current UML


    We’ll start as usual with tests. Let’s add a new test case class named `FavoritesManagerTests,`
    which will house our tests. Next, let’s set up our manager. We need to set it
    up using a custom in-memory Core Data manager that consumes our app’s data model.
    Our file should look like this:


    ```

    import XCTest

    @testable import Books

    import CoreData

    class FavoritesManagerTests: XCTestCase {

    // MARK:- Variables

    var favoritesManager: FavoritesManager!

    var coredataManager: CoreDataManager!

    var stack: CoreDataStack!

    // MARK:- Setup

    override func setUp() {

    super.setUp()

    self.stack = CoreDataStack(storageType: .inMemory)

    self.coredataManager = CoreDataManager(coreDataStack: stack)

    self.favoritesManager = FavoritesManager(coredataManager: coredataManager)

    }

    override func tearDown() {

    super.tearDown()

    self.favoritesManager = nil

    self.coredataManager = nil

    self.stack = nil

    }

    }

    ```


    This will cause build errors. To fix these, we’ll need to add a new class `FavoritesManager`
    that has an internal dependency on `CoreDataManager`. Our class should look like
    this:


    ```

    class FavoritesManager {

    // MARK:- Variables

    private var coredataManager: CoreDataManager

    // MARK:- Singleton

    public static let shared = FavoritesManager()

    // MARK:- Initializer

    init(coredataManager: CoreDataManager = .shared) {

    self.coredataManager = coredataManager

    }

    }

    ```


    Now we know from before that interacting with `CoreDataManager` requires our models
    to conform to the `Storable` protocol. Let’s go ahead and get this out of the
    way. We’ll do the same thing we did with `TestEntity` for our two managed object
    classes: `Book` and `BuyLink`. We need to also make sure that both classes are
    marked with the `final` keyword to avoid build errors.


    Now let’s write tests for the operations `FavoritesManager` is responsible for.
    Normally we would tackle this in a normal TDD fashion. However, we won’t go through
    this part step by step to avoid repetitiveness. After going through multiple TDD
    cycles, we will end up with this set of new tests:'
