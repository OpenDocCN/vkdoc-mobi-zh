    # 自动化测试的困境


    引入自动化测试能让你和测试人员对项目更有信心。它能立即验证所有基本需求是否得到满足，同时让测试人员可以专注于发现那些隐藏的缺陷。然而，许多开发者认为编写自动化测试是一项枯燥的活动。我们见过很多这样的案例：开发者在项目启动时本意是要编写测试，但一旦项目真正开始运转，他们就放弃了添加测试。其主要原因就是他们就是不喜欢添加测试。


    即使你能够硬着头皮坚持编写测试，或者你属于少数觉得测试很有趣的人，你仍然可能写出糟糕或不必要的测试。为了看到对质量的直接积极影响，我们需要确保测试本身的质量。是的，测试也有质量。就像我们会有糟糕的代码一样，我们也可能会有糟糕的测试。毕竟，测试也是代码。另一个需要考虑的点是我们的测试有多相关。更高的测试覆盖率并不意味着我们的代码得到了充分的测试。我们可能添加了许多无用的测试。例如，我们可能为未使用的代码添加测试，或者添加多个测试来测试同一件事，甚至添加永远不会失败的测试，比如测试
    getter 和 setter 方法。


    我们需要为正确的组件编写正确且高质量的测试。这就是**测试驱动开发**（TDD）的用武之地。它能帮助我们实现这一目标，并且做得更多。


    ## TDD 概述


    TDD 的本质是一个非常简单的编程过程。它仅包含四个步骤（图 1-1）。


    ![../images/505360_1_En_1_Chapter/505360_1_En_1_Fig1_HTML.jpg](img/505360_1_En_1_Fig1_HTML.jpg)


    图 1-1


    TDD 周期


    1. 编写一个失败的测试。

    2. 使测试通过。

    3. 重构。

    4. 重复。


    这个周期被称为 TDD 周期。这个流程可以说是确保任何项目高质量的最佳方式。这是因为它能确保你的代码被测试完全覆盖，因为代码的编写是**测试驱动**的。


    这个周期通常用颜色代码表示：


    1. **红色**：编写一个失败的测试。由于你在此之前什么代码都还没写，这个测试自然就会失败。

    2. **绿色**：编写最少的代码让你的测试通过。

    3. **重构**：如果需要，清理你的测试和代码，使其达到标准。

    4. **重复**：再次进行这个周期。这就是它被称为周期的原因。我们只有在所有需求都实现后才会停止。


    之所以用颜色编码，是因为这些颜色与大多数编辑器（包括 Xcode）显示测试结果的方式相对应：


    * 失败的测试显示为红色。

    * 通过的测试显示为绿色。


    ## 为什么要使用 TDD？


    我们已经提到了编写测试时的一些棘手问题。开发人员中最常见的问题是编写测试是多么枯燥和令人失去动力。许多人难以理解为什么要为他们自己编写的代码编写测试。即使他们能够克服这一点并看到测试的价值，他们也可能会写出糟糕的测试。我们不能责怪他们。做自己不享受的事情时表现不佳是正常的。


    这正是 TDD 改变游戏规则的地方。TDD 将测试从一项枯燥的实践转变为一种设计活动。通过在编写代码之前编写测试，TDD 重新定义了我们对测试的看法。我们不再仅仅用测试来验证我们刚写的代码是否有效（同时心里清楚它很可能有效，因为我们刚写完它）。在
    TDD 中，我们用测试来思考我们希望代码做什么以及如何实现它。


    正如我们之前提到的，并非所有的测试都是好测试。TDD 有助于确保我们测试的质量。对我们来说，当一个测试遵循了 Bob Martin 叔叔在其著名著作《代码整洁之道》中定义的
    FIRST 原则时，我们就认为它是一个好测试。FIRST 是一个首字母缩略词，每个字母对应一条规则：


    * **F**ast（快速）：测试需要快速执行。使用 TDD，我们在每一步都运行测试，这促使我们编写快速的测试。如果我们的测试很慢，比如每个测试耗时 1 秒，并且我们在开发过程中不断添加测试，这最终会打击我们运行测试套件的积极性。如果我们最终陷入这种状态，那就意味着这不再是
    TDD 了。因此，为了持续使用 TDD，我们总是被鼓励保持测试的快速。

    * **I**ndependent（独立）：测试之间不应相互依赖。在 TDD 中，我们总是在继续下一步之前运行所有测试，以确保所有测试都通过。这确保了一个测试即使与其他测试一起运行时也能通过。

    * **R**epeatable（可重复）：测试应该在任何环境中都可重复。正如我们刚才提到的，在 TDD 中，我们在每一步都不断运行所有测试。这确保了我们的测试始终能够通过，并迫使我们让测试不受任何外部因素的影响。

    * **S**elf-validating（自验证）：测试应该有一个布尔输出，要么通过，要么失败。TDD 的第一步是编写一个失败的测试。然后我们添加代码使其通过。这证明了测试既可以失败也可以通过。一个总是通过的测试是反直觉的，并且只是在浪费时间。

    * **T**imely（及时）：测试应该在编写代码之前立即编写。这基本上就是 Bob 叔叔在告诉你：“使用 TDD！”


    除了是一个好测试之外，测试还需要是相关的并且能增加价值。使用 TDD，我们在编写代码之前编写测试。因为我们编写的每个测试都直接对应于代码中某一部分的验收标准，这让我们相信我们添加的测试确实是有价值的。


    ## 外部质量与内部质量


    我们项目的质量分为两个部分：外部质量和内部质量。外部质量是指系统满足客户期望的程度。在外部质量方面，我们关心的是我们的应用是否功能正常，并为最终用户提供预期的体验。我们还关心我们的应用是否可靠、响应迅速等。另一方面，内部质量是指系统满足开发者期望的程度。在内部质量方面，我们关心的是内部组件在不同情况下的行为方式。我们还关心我们的代码是否易于理解、更改、扩展等。


    使用 TDD 时，你总是首先考虑需求，为其编写测试，然后再考虑实现。这让我们高度确信我们的测试能够正确验证最终需求。换句话说，它维护并保持了外部质量。在内部质量方面，TDD
    的每一步都帮助我们收集关于设计和实际实现的反馈。正如你将在后续章节中看到的，我们总是用测试完全覆盖每个组件。这确保了每个内部组件的运行符合预期。它同时也维护了代码本身的质量，因为使用
    TDD 开发会迫使你在每一步不断地重新思考你的设计。首先必须编写一个失败的测试，这鼓励我们编写松耦合的代码，以便于测试。因此，测试优先的思考方式直接有助于我们设计的质量，并且在每个周期中，它推动我们在必要时编写结构更优的代码。


    ## 何时使用 TDD？


    你可以在项目生命周期的任何阶段使用 TDD。你可以将其用于新项目，也可以用于老旧的传统项目。我们强烈建议在可能的情况下使用 TDD。最佳情况是在一个全新项目中使用
    TDD 并坚持下去。这样你才能真正感受到拥有一个全面测试套件的好处，并收获 TDD 的全部回报。我们也可以使用 TDD 来指导向传统应用添加新功能的过程。我们甚至可以使用
    TDD 来指导传统应用内部部分代码的重构。

