  trans: '

    # 书籍应用介绍


    **书籍**是一款展示最新畅销书的简易应用（图 6-6）。本章及后续章节中，我们将持续维护并改进这款**书籍**应用。你可以在本章的资源中找到该项目。尽管它看似简单，却会揭示你在处理遗留应用时可能遇到的诸多问题。对我们而言，遗留应用就是未经测试、且轻易改动便可能出问题的应用。在接下来的章节中，我们将把**书籍**从一个易出错的遗留应用，改造成一个可扩展且易于维护的应用。


    **书籍**依赖于向纽约时报 API 发送请求。为保障应用正常运行，你需要一个有效的 API 密钥。获取密钥的具体步骤可在项目的 README 文件中找到。请务必将项目中所有
    `"YOUR_API_KEY"` 的实例替换为实际的 API 密钥。同时，确保在后续章节添加的所有代码片段中也进行相应替换。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig6_HTML.jpg](img/505360_1_En_6_Fig6_HTML.jpg)


    图 6-6

    遗留版书籍应用


    使用**书籍**应用的挑战之一在于它并未采用现代架构。相反，大量的业务逻辑、网络调用和持久化逻辑都集中在单一视图控制器中。目前它尚能运行，就像所有遗留代码一样。但随着我们深入使用，你会发现添加新功能是多么困难且充满风险。


    本章的目标，是将这个包含众多功能的遗留单体应用（图 6-7），转换为模块化应用，每个模块对应一组相关的功能特性。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig7_HTML.jpg](img/505360_1_En_6_Fig7_HTML.jpg)


    图 6-7

    遗留应用模块映射


    最终结果应如图 6-8 所示。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig8_HTML.jpg](img/505360_1_En_6_Fig8_HTML.jpg)


    图 6-8

    模块化应用模块映射


    ## 模块化流程


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig9_HTML.jpg](img/505360_1_En_6_Fig9_HTML.jpg)


    图 6-9

    模块化流程


    上述图表（图 6-9）展示了我们项目模块化的流程。它可能看起来有点复杂，但只要我们逐步操作，很快就能掌握要领。


    ### 初始模块映射


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig10_HTML.jpg](img/505360_1_En_6_Fig10_HTML.jpg)


    图 6-10

    步骤 0


    在开始模块化**书籍**之前，我们先做一个练习。该练习的目标是创建一个类似于我们为**App Store**应用（图 6-5）设计的模块映射。这是一个一次性练习，仅在启动模块化流程前执行（图
    6-10）。我们将不查看代码，而是以全新的视角浏览应用，尝试将相关功能特性分组到各个模块中。这份模块映射将作为指南和我们在模块化过程中积极寻求的模糊目标。然而，该模块映射并非一成不变，它仅作为初始的提议设计方案。在实际进行应用模块化时，我们可能会决定新增模块或合并两个模块，这都是完全可行的。


    如果我们基于**书籍**中现有功能特性创建初始模块映射，结果将类似于图 6-11。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig11_HTML.jpg](img/505360_1_En_6_Fig11_HTML.jpg)


    图 6-11

    书籍应用模块映射


    ### 选择一个类作为起点


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig12_HTML.jpg](img/505360_1_En_6_Fig12_HTML.jpg)


    图 6-12

    步骤 1


    我们首先需要选择一个类，作为后续步骤的起点（图 6-12）。这是一个相当简单的步骤，实际上没有绝对的正确或错误。不过，需要考虑的一点是，最好尝试寻找那些职责过多的类，因为重构这些类为模块时影响更大。在像**书籍**这样不遵循任何真正设计模式的遗留应用中，你会发现最佳的起点通常是我们的**视图控制器**。


    如前所述，图 6-8 中的模块映射可以在我们操作过程中提供指导，也能帮助我们选择起点。从模块映射中，我们选择一个模块；在此例中，我们选择**主视图模块**。然后，我们开始寻找与该模块相关且职责最多的起点。对我们来说，最佳的起点是
    `MainViewController`。


    ### 识别类的职责


    既然有了起点，我们就需要开始行动了。接下来要做的是确定起点所负责的所有关键功能特性（图 6-13）。具体做法是遍历该类的代码并理解其功能。如果代码过于复杂且难以理解，我们可以关注代码的几个入口点，以便更容易把握该类职责的范围。我们需要查看所有公开函数、对象创建时触发的函数（`init`）、以及由用户交互（点击、手势、视图生命周期事件等）或其他机制（通知、KVO
    等）触发的所有函数。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig13_HTML.jpg](img/505360_1_En_6_Fig13_HTML.jpg)


    图 6-13

    步骤 2


    如果你深入分析 `MainViewController` 内的代码，会发现它可以通过图 6-14 的图表简洁地表示。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig14_HTML.png](img/505360_1_En_6_Fig14_HTML.png)


    图 6-14

    `MainViewController` 职责图


    让我们正式定义 `MainViewController` 的主要职责：


    1.  启动时获取最新书籍。

    2.  在单独的单元格中展示每本书。

    3.  下拉表格时获取最新书籍。

    4.  用户可筛选书籍。

    5.  用户可查看特定书籍的详情。

    6.  用户可查看收藏。


    ### 重构职责


    明确了类的职责后，现在是时候开始重构了。针对每一项职责，我们将执行以下步骤：


    1.  添加验证测试。

    2.  重构相关代码。

    3.  重新运行验证测试。

    '
- fmt: "### Verification Tests\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15\n\n**Step 3.1**\n\nLet’s start with our first responsibility, which\
    \ is “Fetch latest books on startup.” Before we start refactoring the related\
    \ code, we first need to add verification tests (Figure 6-15). Verification tests\
    \ are high-level tests that verify that the feature or functionality that we’re\
    \ refactoring is working fine. For user-facing features like the one we’re trying\
    \ to refactor now, a verification can be in the form of a UI test, as that’s the\
    \ highest level of testing we have. If the part we’re refactoring is not user-facing,\
    \ then integration tests can be used. Verification tests are an integral part\
    \ of our process, as they help in avoiding regressions due to our refactor.\n\n\
    Let’s write a verification test for our feature:\n\n```\nfunc testShowingBestSellerBooks()\
    \ throws {\n    // Given\n    let app = XCUIApplication()\n    app.launch()\n\
    \    // When\n    let booksTableView = app.tables\n    let cells = booksTableView.cells\n\
    \    _ = cells.firstMatch.waitForExistence(timeout: 1.0)\n    // Then\n    XCTAssertGreaterThan(cells.count,\
    \ 0)\n}\n```\n\nOur verification test simply makes sure that the list table view\
    \ contains at least one cell. For the scope of this feature, we only care about\
    \ the table view being populated on startup, and we don’t care about the content\
    \ of the cells yet.\n\nThe preceding test highly depends on the back end and could\
    \ easily fail if the back-end server fails. This dependency is not optimum at\
    \ all, and we’ll talk about how we can remove it in Chapter 8. However, for now,\
    \ this test will do as it is.\n\n### Refactoring\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16\n\n**Step 3.2**\n\nNow that we have our verification test, we can\
    \ safely start refactoring (Figure 6-16). To refactor this feature, we need to\
    \ ask ourselves a few questions. Is the code responsible for this feature in the\
    \ right place, or should it be moved to a new component or even a new module?\
    \ And after we move that code to its right place, does it need to be refactored?\n\
    \nIf we take a look at the code responsible for our feature, we’ll find that the\
    \ function we need to address is `fetchBooks()`. So the first question is, is\
    \ it in the right place? Since there is no specific design pattern or an architecture\
    \ inside the app, we will try to apply a design pattern while refactoring. We\
    \ are going to use MVP as we did in Chapter 5. And from MVP we know that view\
    \ controllers should not contain any business logic and should only be responsible\
    \ for handling the UI. Therefore, we know that we need to move `fetchBooks()`\
