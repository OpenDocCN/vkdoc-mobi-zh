- fmt: "# Interacting with the UI\n\nWe should use the power of `XCUIElementQuery`\
    \ to find the `\"San Francisco\"` cell. First, you need to fetch all table view’s\
    \ descendants and to return labels only, which will be something like this: `app.tables.staticTexts`.\
    \ This query will return all labels inside the table view. The next step now is\
    \ to find the label that contains `\"San Francisco\"`. The query will return an\
    \ array of `XCUIElement`s.\n\n`XCUIElement` is a proxy for `UIElement`s in the\
    \ application. Elements have types like `button`, `cell`, `staticText`, etc. They\
    \ also have identifiers, which we get from an accessibility system, an accessibility\
    \ identifier, or an accessibility label or title. Most of the time, we will find\
    \ `UIElement` with a combination of type and identifier; for example, `let button\
    \ = app.buttons[\"Edit\"]`. We find a `UIElement` of type button with identifier\
    \ `Edit`. Another way to query elements is to query based on the element’s content.\
    \ If we know that a label should display a specific text for example we can search\
    \ for that label by querying its content. We can use this to find the `\"San Francisco\"\
    ` label. Also, there is another important property, which you can use to check\
    \ if the `UIElement` exists or not: `element.exists`.\n\n**After asserting on\
    \ the San Francisco label, our first test will be**\n\n```\nfunc testExample()\
    \ throws {\n    // UI tests must launch the application that they test.\n    let\
    \ app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
    \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(cell.exists)\n\
    }\n```\n\n**Note**: It’s very risky to depend on content when this content is\
    \ dynamic or can differ from one run to another. In these cases you should always\
    \ depend on accessibility identifiers.\n\n## UI Events\n\nOnce you find your element,\
    \ you need to simulate user interactions. `XCUIElement` provides some APIs you\
    \ can use to interact with `UIElement`:\n\n*   `tap()`\n*   `doubleTap()`\n* \
    \  `press(forDuration:, thenDragTo:)`\n*   `twoFingerTap()`\n*   `swipeUp()`,\
    \ `swipeDown()`, `swipeLeft()`, `swipeRight()`\n*   `typeText(\"\")`\n\n**After\
    \ using tap API, our first test will be**\n\n```\nfunc testExample() throws {\n\
    \    // UI tests must launch the application that they test.\n    let app = XCUIApplication()\n\
    \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell\
    \ = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n}\n```\n\n## Assertions\n\
    \nLike what we did in step 3, we need to fetch all navigation bar’s descendants\
    \ and to return labels only and then assert if it contains the `\"San Francisco\"\
    ` label.\n\n**After asserting on the title label, our first test will be**\n\n\
    ```\nfunc testExample() throws {\n    // UI tests must launch the application\
    \ that they test.\n    let app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
    \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
    \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    }\n```\n\n### Value Assertion\n\nYou can assert on the value of `UIElement` using\
    \ the value property, which varies based on the element’s type. If the `UIElement`\
    \ is `UISwitch`, it will be its state:\n\n```\nlet genderSwitch = app.tables.switches[\"\
    Gender\"].value\n```\n\nHere if the switch is turned off, the value will be a\
    \ string with the value “0,” and the value will be “1” if the switch is turned\
    \ on.\n\n## Accessibility\n\nApplication is the root of a tree of elements. All\
    \ these are elements that you can access using types and identifiers. To make\
    \ your life easy when UI testing, you need to make each `UIElement` unique. In\
    \ a way we will repeat what we did in step 4, but we will use the accessibility\
    \ identifier to get the `\"Say Hello !\"` button. Let’s recall the elements hierarchy\
    \ of the app.\n\nYou can add accessibility identifiers using Storyboard from the\
    \ Identity Inspector by checking if Accessibility is enabled and adding an identifier\
    \ (Figure [3-9](#505360_1_En_3_Chapter.xhtml#Fig9)) or using API `view.isAccessibilityElement\
    \ = true` and `view.accessibilityIdentifier = \"Hello\"`.\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9: Adding an identifier\n\n**After using Accessibility to find the\
    \ Hello button, our first test will be**\n\n```\nfunc testExample() throws {\n\
    \    // UI tests must launch the application that they test.\n    let app = XCUIApplication()\n\
    \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell\
    \ = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n    let titleLabel\
    \ = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n}\n```\n\
    \n### Accessibility Tips\n\n*   Add breakpoints inside tests (Figure [3-10](#505360_1_En_3_Chapter.xhtml#Fig10))\
    \ and print the description of a `UIElement` inside `LLDB` using this command:\
    \ `p print(helloButton.debugDescription)`.\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg)\n\
    \n    Figure 3-10: Debugging accessibility\n\n*   When you launch the Accessibility\
    \ Inspector (Figure [3-11](#505360_1_En_3_Chapter.xhtml#Fig11)), you can touch\
    \ `UIElement`s inside the simulator to check the accessibility system’s output\
    \ (Figure [3-12](#505360_1_En_3_Chapter.xhtml#Fig12)).\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg)\n\
    \n    Figure 3-12: Debugging using the Accessibility Inspector\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg)\n\
    \n    Figure 3-11: Opening the Accessibility Inspector\n\n## Putting It All Together\n\
    \n**After asserting on alert content, our first test will be**\n\n```\nfunc testExample()\
    \ throws {\n    // UI tests must launch the application that they test.\n    let\
    \ app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
    \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
    \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n    XCTAssertTrue(app.alerts.staticTexts[\"\
    Welcome\"].exists)\n    XCTAssertTrue(app.alerts.staticTexts[\"in San Francisco\"\
    ].exists)\n}\n```\n\n## Improve UI Tests\n\nUI tests are much slower than normal\
    \ unit tests. This is due to their nature as they directly interact with the UI\
    \ the same as a normal user would. However, there are a few things to keep in\
    \ mind in order to make your UI tests efficient:\n\n*   **Waiting times**: Do\
    \ not use `sleep` inside your tests to wait for a specific operation because it\
    \ makes your tests slower and still can make them flaky; you need to use `.waitForExistence(timeout:\
    \ )`.\n*   **Parallel UI tests execution** starting from Xcode 10, but it’s more\
    \ stable on Xcode 11 (Figure [3-13](#505360_1_En_3_Chapter.xhtml#Fig13)).\n\n\
    \    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg)\n\
    \n    Figure 3-13: Parallelize test execution\n\n## Exercise\n\nWe are done with\
    \ the first UI test, which navigates to the first city and taps the “Say Hello\
    \ !” button. Try writing another UI test that navigates to the first city and\
    \ taps the “Say Hello !” button and then goes back and navigates to the second\
    \ one and taps the “Say Hello !” button."
