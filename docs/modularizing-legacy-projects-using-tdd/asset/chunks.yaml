    \    XCTAssertEqual(actualError, .invalidRequest)\n}\n```\n\n为了让测试通过，我们需要修改 `executeRequest`\
    \ 函数以处理这两种场景。\n\n首先在 `APIError` 中添加两个枚举值：\n\n```\nenum APIError: Error {\n   \
    \ case requestFailed\n    case invalidRequest\n}\n```\n\n然后将 `executeRequest`\
    \ 的实现修改为：\n\n```\npublic func executeRequest(_ request: T, callBack: @escaping\
    \ NetworkCompletion) {\n    guard let urlRequest = request.createURLRequest(with:\
    \ Self.environment) else {\n        callBack(nil, .invalidRequest)\n        return\n\
    \    }\n    let task = self.session.dataTask(with: urlRequest) { data, response,\
    \ error in\n        guard let data = data else {\n            callBack(nil, .requestFailed)\n\
    \            return\n        }\n        callBack(data, nil)\n    }\n    task.resume()\n\
    }\n```\n\n当检测到请求无效或请求失败时，我们用相应的 `APIError` 类型值调用完成处理器。\n\n### 整合所有功能\n\n既然所有测试都已通过，是时候在应用程序中使用新的\
    \ API 了。让我们从高层次概览设计结构（图 9-7）。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig7_HTML.jpg](img/505360_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7：集成新的网络层\n\n我们的 `MainViewModel` 将使用 `NetworkLayer` 的公共 API `executeRequest`，并传入一个类型为\
    \ `BookRequest` 的请求。然后 `NetworkLayer` 使用传入的图书请求获取所需信息并执行请求。请求完成后，`NetworkLayer`\
    \ 通过回调将响应返回给视图模型。\n\n基于这个概览，我们需要创建一个新组件 `BookRequest`。为其创建名为 `BookRequestTests`\
    \ 的测试用例类，并添加以下测试：\n\n```\nfunc testBookRequestHTTPMethod() {\n    // Given\n \
    \   let bookRequest = BooksRequest()\n    // When & Then\n    XCTAssertEqual(bookRequest.method,\
    \ .GET)\n}\n\nfunc testBookRequestURL() {\n    // Given\n    let bookRequest =\
    \ BooksRequest()\n    let env = APIEnvironment(scheme: \"http\", host: \"test.com\"\
    , port: 433, API_KEY: \"\")\n    // When\n    let urlRequest = bookRequest.createURLRequest(with:\
    \ env)\n    // When & Then\n    XCTAssertEqual(urlRequest?.url?.absoluteString,\
    \ \"http://test.com:433/svc/books/v3/lists/overview.json?offset=20&api-key=\\\
    (APIEnvironment.production.API_KEY)\")\n}\n\nfunc testBookRequestBody() {\n  \
    \  // Given\n    let bookRequest = BooksRequest()\n    // When & Then\n    XCTAssertNil(bookRequest.body)\n\
    }\n```\n\n为了让这些测试通过，我们需要实际添加 `BookRequest` 并使其遵循 `RequestProtocol`：\n\n```\nstruct\
    \ BooksRequest: RequestProtocol {\n    var path: String {\n        return \"/svc/books/v3/lists/overview.json\"\
    \n    }\n    var queryItems: [URLQueryItem]? {\n        return [URLQueryItem(name:\
    \ \"offset\", value: \"20\"), URLQueryItem(name: \"api-key\", value: NetworkLayer.environment.API_KEY)]\n\
    \    }\n    var method: HTTPMethod { return .GET }\n    var body: Data? { return\
    \ nil }\n}\n```\n\n现在从 `NetworkLayer` 中删除旧代码，并修复因使用新 API 和新创建的 `BookRequest` 而产生的编译错误。最终的\
    \ `NetworkLayer` 类应如下所示：\n\n```\ntypealias NetworkCompletion = (Data?, APIError?)\
    \ -> Void\n\nenum APIError: Error {\n    case requestFailed\n    case invalidRequest\n\
    }\n\nclass NetworkLayer {\n    // MARK:- 变量\n    let session: URLSession\n   \
    \ static var environment: APIEnvironment {\n        return isTesting() ? .testing\
    \ : .production\n    }\n\n    // MARK:- 初始化器\n    init(session: URLSession = .shared)\
    \ {\n        self.session = session\n    }\n\n    // MARK:- 公共方法\n    public func\
    \ executeRequest(_ request: T, callBack: @escaping NetworkCompletion) {\n    \
    \    guard let url = request.createURL(with: Self.environment) else {\n      \
    \      callBack(nil, .invalidRequest)\n            return\n        }\n       \
    \ var urlRequest = URLRequest(url: url)\n        urlRequest.httpMethod = request.method.rawValue\n\
    \        urlRequest.httpBody = request.body\n        let task = self.session.dataTask(with:\
    \ urlRequest) { data, response, error in\n            guard let data = data else\
    \ {\n                callBack(nil, .requestFailed)\n                return\n \
    \           }\n            callBack(data, nil)\n        }\n        task.resume()\n\
    \    }\n\n    // MARK:- 辅助方法\n    static func isTesting() -> Bool {\n        return\
    \ ProcessInfo.processInfo.arguments.contains(\"TESTING\")\n    }\n}\n```\n\n接下来需要做两处修改。首先修改\
    \ `MainViewModel` 中的代码以使用新 API。\n\n将这一行：\n\n```\nself.networkLayer?.executeNetworkRequest(callBack:\
    \ { data in\n```\n\n替换为：\n\n```\nself.networkLayer?.executeRequest(BooksRequest(),\
    \ callBack: { (data, error) in\n```\n\n同时需要更新 `NetworkLayerStub`，因为它也会导致编译错误：\n\
    \n```\nclass NetworkLayerStub: NetworkLayer {\n    var stubbedData: Data?\n\n\
    \    init(stubbedData: Data) {\n        self.stubbedData = stubbedData\n    }\n\
    \n    override func executeRequest(_ request: T, callBack: @escaping NetworkCompletion)\
    \ where T: RequestProtocol {\n        let jsonData = self.stubbedData!\n     \
    \   callBack(jsonData, nil)\n    }\n}\n```\n\n现在大功告成！如果我们运行包含验证测试的完整测试套件（图 9-8），所有测试都将通过。\n\
    \n![../images/505360_1_En_9_Chapter/505360_1_En_9_Figa_HTML.gif](img/505360_1_En_9_Figa_HTML.gif)\n\
    \n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig8_HTML.jpg](img/505360_1_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8：测试套件全部通过\n"
- fmt: '# Exercise


    We have an extension on `UIImageView` that we use for downloading images. This
    extension uses a native API to load the image from a given URL. Your exercise
    is to change the implementation of this extension to instead use our newly created
    `NetworkLayer`.


    # Summary


    Networking is a requirement for almost every app out there. It allows us to take
    our app to the next level. Being able to request resources from any web service
    opens the door to countless ways we can improve our apps.


    The iOS URL Loading System is made up of a number of classes and structs that
    are provided natively within iOS’s Foundation framework. We use this system to
    communicate with servers using Internet protocols. The main class in this system
    is `URLSession`, which mimics a session in an open tab or window in your web browser.
    Requests made within the same session share the same configurations and caching.
    We use an instance of `URLSession` to create instances of `URLSessionTask`. These
    tasks can fetch data from a server, download/upload files, or open a stream with
    a server. We use `URLSessionConfiguration` to configure how a session behaves.


    When our app is performing network calls, it’s extremely important to cover our
    networking code with tests. Any problem in the network layer can easily cause
    critical bugs in any app. And it can also cause performance issues, if we’re doing
    unnecessary network calls, for example. Writing tests for a network layer can
    sometimes be challenging, but it’s integral for maintaining the app’s quality.


    In this chapter we rewrote our network layer by following a test-driven approach.
    We separated that environment-specific code and covered that with tests. We also
    made use of protocols to be able to easily create new requests with different
    endpoints and parameters. This was also covered by tests. Finally, when it came
    to actually performing the network calls, we were able to cover this as well with
    tests by the use of test doubles. We injected a mock `URLSession` and used that
    to be able to assert on the requests going out. Because the part of our app that
    consumed our network code was already covered by tests, we were able to make this
    change with confidence. And after we were done, we were able to verify that our
    changes were functional and didn’t break anything.


    # 10. Taming Core Data


    Core Data is one of the most famous frameworks known to iOS developers. Core Data
    has been available since the release of iOS 3, and it has evolved a lot since
    then. A common misconception is that Core Data is a database or a database wrapper.
    Though persisting data is one of its features, Core Data is much more than that.
    The essence of Core Data is that it manages our application’s object graph. An
    object graph is basically a collection of objects connected with relationships
    (Figure 10-1). Core Data manages the objects in these graphs, and we can use Core
    Data to persist the graph on disk if we want. In addition to that, the framework
    has multiple other features such as data validation and undo/redo management.


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig1_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig1_HTML.jpg)


    Figure 10-1 Object graph


    As famous as Core Data is, many developers suffer when using it. This is largely
    caused by two things. First, many developers dive headfirst into using Core Data
    without fully grasping how it operates internally and even externally. Core Data
    is known to have many building blocks, and not fully understanding what each block
    is responsible for increases the likelihood of misusing it. Second, and just as
    important, is the lack of testing. Core Data is one of the most challenging parts
    in any application to write tests for. Therefore, many developers opt out of covering
    their Core Data layer with tests. We’ve talked about the importance of testing
    over and over again in past chapters, and this importance is even magnified when
    it comes to Core Data.


    ## The Core Data Stack


    Now that we know what Core Data is and what it’s capable of, it’s time to explore
    how it functions internally. Core Data has many building blocks that interact
    together (Figure 10-2). Understanding the function of each building block is crucial
    in fully grasping this framework and being able to use it properly.


    The main building blocks are:


    1.  Managed object model

    2.  Persistent store coordinator

    3.  Managed object context


    ![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig2_HTML.jpg](images/505360_1_En_10_Chapter/505360_1_En_10_Fig2_HTML.jpg)


    Figure 10-2 The Core Data stack


    ### Managed Object Model


    A managed object model is a description of the object graph to be managed. This
    description is basically the schema for our model. It is the entities with their
    properties as well as relationships to other entities. A data schema is represented
    by an `.xcdatamodeld` file, and Xcode comes with a powerful editor that makes
    it easy to edit our schema file. We can easily create entities, create relationships,
    version our schema, and prepare migration, all from within Xcode’s editor. Core
    Data does not interact with files; it interacts with instances of `NSManagedObjectModel`.
    This class provides a programmatic representation of the `.xcdatamodeld` file
    describing our schema, which Core Data can understand and use. While a typical
    Core Data implementation has one instance of the `NSManagedObjectModel` class,
    it’s possible to have multiple.


    ### Persistent Store Coordinator


    A persistent store coordinator is represented by an instance of the `NSPersistentStoreCoordinator`
    class, and it plays a key role in the functionality of Core Data. From its name,
    a persistent store coordinator coordinates between managed object contexts and
    persistent stores. It takes care of loading, caching, and persisting data. Despite
    it being one of the most important members of the Core Data stack, you will rarely
    interact with it directly.


    ### Persistent Store


    A persistent store represents where your data actually lives. We’ve mentioned
    that Core Data manages an object graph, but in order for the framework to be useful,
    the persistent store coordinator needs to be connected to at least one persistent
    store. This allows the coordinator to load data into contexts and push new data
    into the store making the new change a permanent part of the object graph’s state.


    Core Data provides four different types of persistent store built in:


    1.  SQLite: This store is backed by a SQLite database, and it’s the most widely
    used store type.

    2.  XML: This store is backed by an XML file.

    3.  Binary: This store is backed by a binary data file.

    4.  In-memory: This store utilizes the app’s memory for storage. It’s only partially
    persistent as data is lost when the app is terminated for any reason.


    And you can also create your own store types by subclassing `NSAtomicStore` or
    `NSIncrementalStore`.'
