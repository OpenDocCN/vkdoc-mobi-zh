    \    XCTAssertEqual(updatedModel?.name, \"Test\")\n    XCTAssertEqual(updatedModel?.number,\
    \ 123)\n}\n```\n\n你可能已经注意到，我们在测试中调用了上下文的 `rollback()` 方法。这是做什么的呢？首先，让我们看看我们在测试中试图做什么。我们使用\
    \ `create` 方法插入一个新对象，然后对其进行一些修改。接着调用 `update` 函数，期望它能持久化这些更改。鉴于 Core Data 的特性，我们知道所做的修改只会局部应用于当前所在的上下文。由于我们创建、更新和获取操作使用的是同一个上下文，因此即使我们没有将更改持久化到存储区，获取操作仍然会返回更新后的数据。为了演示这一点，让我们添加一个实际上并不保存更改的\
    \ `update` 实现：\n\n```\n@discardableResult\npublic func update(_ entity: T?) ->\
    \ T? {\n    return entity\n}\n```\n\n现在测试会失败，因为我们没有保存数据。为了演示 `rollback()` 的重要性，请注释掉调用\
    \ `rollback()` 的那行代码，然后重新运行测试。我们会发现测试通过了。因此，在这个测试中，使用 `rollback` 对于清除所有未保存的数据并仅断言已保存的数据至关重要。\n\
    \n要修复测试，我们需要修改实现，使其真正保存更改：\n\n```\n@discardableResult\npublic func update(_ entity:\
    \ T?) -> T? {\n    stack.saveContextIfNeeded()\n    return entity\n}\n```\n\n\
    ### 高级获取操作\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg](img/505360_1_En_10_Fig12_HTML.jpg)\n\
    \n**图 10-12** 当前 UML 图\n\n由于测试现在可以通过，让我们添加一个新功能。我们需要能够对获取的结果进行排序（图 10-12）。在获取时进行排序比获取后在内存中排序要高效得多。除了排序之外，我们还需要能够过滤获取的结果。此外，我们还需要为获取结果设置数量限制。让我们为这两个功能添加测试：\n\
    \n```\nfunc testFetchSorted() {\n    // 给定条件\n    for i in 1...10 {\n        let\
