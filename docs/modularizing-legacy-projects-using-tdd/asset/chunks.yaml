    func testAddingBook() {

    // Given

    let buyLink = BuyLinkModel(name: .amazon, url: "URL")

    var book = BookModel(title: "BookTitle", contributor: "Contributor", author: "Author",
    createdDate: "2021-05-26 22:10:24")

    book.amazonProductURL = "Amazon"

    book.bookImage = "Image"

    book.bookDescription = "Description"

    book.publisher = "Publisher"

    book.buyLinks = [buyLink]

    // When

    favoritesManager.addFavorite(book)

    // Then

    let books = coredataManager.fetchAll(Book.self)

    XCTAssertNotNil(books)

    XCTAssertEqual(books?.count, 1)

    let retrievedBook = books![0]

    XCTAssertEqual(retrievedBook.title, book.title)

    XCTAssertEqual(retrievedBook.contributor, book.contributor)

    XCTAssertEqual(retrievedBook.author, book.author)

    XCTAssertEqual(retrievedBook.created_date, book.createdDate)

    XCTAssertEqual(retrievedBook.amazon_product_url, book.amazonProductURL)

    XCTAssertEqual(retrievedBook.book_image, book.bookImage)

    XCTAssertEqual(retrievedBook.desc, book.bookDescription)

    XCTAssertEqual(retrievedBook.publisher, book.publisher)

    XCTAssertEqual(retrievedBook.buyLinks?.count, 1)

    let link = retrievedBook.buyLinks?.allObjects[0] as? BuyLink

    XCTAssertEqual(link?.name, buyLink.name.rawValue)

    XCTAssertEqual(link?.url, buyLink.url)

    }

    func testFetchingFavoritesSorted() {

    // Given

    let book1 = BookModel(title: "Book1", contributor: "Contributor", author: "Author",
    createdDate: "2021-05-01 22:00:00")

    let book2 = BookModel(title: "Book2", contributor: "Contributor", author: "Author",
    createdDate: "2021-05-02 22:00:00")

    let book3 = BookModel(title: "Book3", contributor: "Contributor", author: "Author",
    createdDate: "2021-05-03 22:00:00")

    favoritesManager.addFavorite(book1)

    favoritesManager.addFavorite(book3)

    favoritesManager.addFavorite(book2)

    // When

    let favorites = favoritesManager.fetchAllFavorites()

    // Then

    XCTAssertEqual(favorites.count, 3)

    XCTAssertEqual(favorites[0].title, "Book3")

    XCTAssertEqual(favorites[1].title, "Book2")

    XCTAssertEqual(favorites[2].title, "Book1")

    }

    ```


    And the code that makes these tests pass is this:


    *   fetchAllFavorites uses the fetchAll function of `CoreDataManager` to fetch
    all objects of type `Book` and returns them sorted by date.


    *   addFavorite takes a `BookModel` object. It inserts a new `Book` object into
    our store and then populates this book with data from the passed model.


    ```

    // MARK:- Public Functions

    func fetchAllFavorites() -> [Book] {

    let sort = NSSortDescriptor(key: "created_date", ascending: false)

    return coredataManager.fetchAll(Book.self, sort: sort) ?? []

    }

    func addFavorite(_ model: BookModel) {

    guard let book = coredataManager.create(Book.self) else {

    return

    }

    book.title = model.title

    book.amazon_product_url = model.amazonProductURL

    book.author = model.author

    book.book_image = model.bookImage

    book.contributor = model.contributor

    book.created_date = model.createdDate

    book.desc = model.bookDescription

    book.publisher = model.publisher

    let links:NSMutableSet? = []

    guard let buyLinks = model.buyLinks else {

    return

    }

    for buyLink in buyLinks {

    if let link = coredataManager.create(BuyLink.self) {

    link.url = buyLink.url

    link.name = buyLink.name.rawValue

    link.book = book

    links?.add(link)

    }

    }

    book.buyLinks = links

    coredataManager.update(book)

    }

    // MARK:- Private Helpers

    func getBook(from model: BookModel) -> Book? {

    let predicate = NSPredicate(format: "title == %@", model.title ?? "")

    let results = coredataManager.fetchAll(Book.self, limit: 1, predicate: predicate)

    guard let books = results, books.count == 1 else {

    return nil

    }

    return books[0]

    }

    ```


    ### Putting It All Together


    So far we have not changed any of our old code. We’ve only added new code, but
    we haven’t used it anywhere in our app yet. Which brings us to the last goal we
    had when we started this Core Data–themed journey: we want to use the new code
    we’ve written instead of the old implementation.


    Making this change will directly affect our app. So as with any step we take in
    TDD, we need to start it with tests. We need to make sure that we have verification
    tests in place covering all the logic that will be affected. The logic that’s
    going to be affected is everything related to favorites handling in our app. Luckily,
    if we take a look at our UI test suite, we’ll find that we have tests for all
    our scenarios. This means we can now switch out the implementations with confidence.


    Easiest way to guide this change is to remove the old Core Data code from its
    root. So let’s head to our `AppDelegate` and remove all code related to Core Data.
    This will result in an array of build errors in our app. Now we just go over the
    errors one by one and replace the old code by calls to `FavoritesManager`.


    In `FavViewController` the function `loadSavedData` will now look like this:


    ```

    func loadSavedData() {

    let results = FavoritesManager.shared.fetchAllFavorites()

    for book in results {

    books.append(convertToBookModel(book: book))

    }

    self.tableView?.reloadData()

    }

    ```


    And the saveBookAsFavorite implementation in both BookViewControllerA and BookViewControllerB
    will look like this:


    ```

    func saveBookAsFavorite(withBook bookModel:BookModel) {

    FavoritesManager.shared.addFavorite(bookModel)

    let alert = UIAlertController(title: "Saved", message: "Your book saved to favorites",
    preferredStyle: .alert)

    alert.addAction(UIAlertAction(title: "Ok", style: .default, handler: nil))

    self.present(alert, animated: true, completion: nil)

    }

    ```


    Now that we’re done with our changes, we need to rerun our verification tests
    to make sure our changes did not break anything. When we run our tests, everything
    passes, which means we’ve successfully written a testable Core Data layer and
    integrated it swiftly in our app!


    ## Exercise


    We have one last operation to add, which is the deletion operation. Your exercise
    is to add a new delete API to CoreDataManager. And use that new API to implement
    deleting a book inside `FavoritesManager`. Then you’ll update FavViewController
