    )\n    XCTAssertEqual(coffeeDrink1.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink1.description,\
    \ \"desc1\")\n\n    let coffeeDrink2 = actualDrinks![1]\n    XCTAssertEqual(coffeeDrink2.name,\
    \ \"coffee2\")\n    XCTAssertEqual(coffeeDrink2.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink2.description,\
    \ \"desc2\")\n}\n```\n\nAfter applying the TDD cycle as we slowly build our test\
    \ case till we reach the preceding comprehensive test, we will end up with the\
