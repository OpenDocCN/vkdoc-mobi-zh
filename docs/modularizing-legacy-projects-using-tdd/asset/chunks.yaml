    now it’s time to fix our code. We can fix our extension using a serial queue like
    we did in the database example, but let’s try something new. We’ll use locks this
    time, which are a common method for ensuring synchronization:


    ```

    extension UIImageView {

    // MARK:- Variables

    static var dictionaryImageCache = [String:UIImage]()

    static var lock = NSRecursiveLock()

    // MARK:- Functions

    func load(url: URL) {

    DispatchQueue.global().async { [weak self] in

    Self.lock.lock()

    if (Self.dictionaryImageCache[url.path] != nil) {

    DispatchQueue.main.async {

    self?.image = Self.dictionaryImageCache[url.path]

    }

    Self.lock.unlock()

    return

    }

    Self.lock.unlock()

    if let data = try? Data(contentsOf: url) {

    if let image = UIImage(data: data) {

    Self.lock.lock()

    Self.dictionaryImageCache[url.path] = image

    Self.lock.unlock()

    DispatchQueue.main.async {

    self?.image = image

    }

    }

    }

    }

    }

    }

    ```


    What we do here is that before accessing or modifying, we first acquire the lock
    by calling `lock()`. This makes sure that whenever any other thread tries to acquire
    the same lock, it will be forced to wait until the thread holding the lock lets
    go of it. We release the lock by calling `unlock()`.


    Now if we run our test again (Figure [8-12](#505360_1_En_8_Chapter.xhtml#Fig12)),
    it will pass ✅.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig12_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig12_HTML.jpg)


    Figure 8-12.


    Multithreading test passing


    ## Summary


    In this chapter you learned about some of the main concepts in multithreading
    programming. First of all was the concept of concurrency, which is that two or
    more tasks can be executed simultaneously on different threads. Concurrency is
    achieved in iOS by the use of Grand Central Dispatch (GCD). GCD abstracts the
    manual handling of threads away from the developer. Instead of creating threads,
    you create your tasks and dispatch on a queue, and GCD handles the low-level execution
    of these tasks on multiple threads if needed.


    Dispatch queues are at the core of how GCD operates. When tasks are submitted
    to a queue, GCD will execute these tasks in First In, First Out order. However,
    we have two types of queues, serial and concurrent. Serial queues make sure that
    only one task in that queue is running at any given time, and when a task finishes,
    the next task in line starts. Concurrent queues, on the other hand, are able to
    run more than one task at the same time.


    When submitting a task to a queue, we can submit it using sync or async. This
    distinction affects the **source** queue (queue that performs the dispatch), not
    the destination queue (queue to which the task is submitted). When using sync,
    this blocks the calling queue until the task is completed. While using async,
    this calling queue continues normally.


    Concurrency has many benefits especially when it comes to performance. Since we''re
    able to perform multiple tasks at the same time and not block one task by another
    heavy task, this naturally leads to enhancement in our app''s performance. But
    this is actually not always the case, as overusing concurrency can degrade the
    performance due to unnecessary high memory consumption.


    Apart from negative performance impact, concurrency has some serious drawbacks.
    When not used correctly, concurrency can result in bugs and crashes. When two
    operations depend on the same shared resource and get executed concurrently relative
    to each other, this can cause an array of problems. We might encounter a deadlock
    or even a data race condition.


    Race conditions occur when one thread is modifying a resource and another thread
    is either trying to read the same resource or trying to modify it as well. Race
    conditions tend to lead to unexpected behavior that''s extremely hard to debug
    and in some cases might cause crashes. In this chapter we looked at how we can
    apply TDD to fix our data races. We apply the first step in TDD by adding a special
    type of test that tests our code in a multithreaded environment (plus the use
    of the Thread Sanitizer). And then we go about the second and third steps in the
    TDD cycle as we would normally do.


    # 9. Testing Your Network


    Most apps these days will communicate with the Internet at some point. Purely
    local apps are great, but communicating with a web service can help transform
    your app to a truly extraordinary app. There is a huge collection of diverse public
    web services that your app can make use of. And you can also hook into your own
    private web service to provide an expanded set of features to your users that
    you just can’t provide if your app is purely local.


    ## Networking ABCs


    When one thinks of the Internet, many things might come to mind. One of them is
    “**www.**” This stands for the **World Wide Web**, which is the information system
    that we’re able to access through the Internet. From its name, this system is
    worldwide. For something this big to evolve to what we know today, it had to be
    governed by some agreements so that it can be accessed by all the machines worldwide.
    So for two machines to communicate, they do so using defined protocols. A protocol
    is basically a contract between two parties with an established set of rules that
    dictate how data is transferred between different devices.


    ### HTTP Requests


    Hypertext Transfer Protocol (HTTP) is a protocol that allows transfer of resources
    between two parties.


    An HTTP request normally contains the following:


    *   URL: Which identifies the resource we want.


    *   HTTP method: Which states the type of action that can be performed.


    *   Headers (optional): These are key/value pairs that allow us to pass additional
    information to the server.


    *   Data (optional): This can be in multiple forms, for example, JSON. Often referred
    to as the body of the request.


    There are various options for HTTP methods:


    *   GET: For fetching a resource


    *   POST: For creating or updating a resource


    *   PATCH: For modifying a resource


    *   PUT: For replacing a resource


    *   DELETE: For deleting a resource


    ### HTTP Responses


    When you make an HTTP request to a server, the server returns a response. A response
    usually contains the following:


    *   Status code: This is a number that tells you whether your request succeeded
    or failed due to some error.


    *   Headers: This is similar to headers in the request. They carry additional
    information about the response.


    *   Data: This is also similar to the data in the request. This carries the data
    you requested if any. It can be in many forms, but most servers return data in
    JSON format.'
