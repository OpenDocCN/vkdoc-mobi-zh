    \n**图 10-11** 当前 UML 图\n\n现在让我们进入一个新的 CRUD 操作（图 10-11）。我们为更新操作添加一个测试：\n\n```\n\
    func testUpdateEntity() {\n    // 给定条件\n    let testModel = manager.create(TestEntity.self)\n\
