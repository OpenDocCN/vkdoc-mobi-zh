    \ 6)\nlet cell = app.tables.staticTexts[\"San Francisco\"]\ncell.tap()\n}\n```\n\
    \n## Assertions\n\nLike what we did in step 3 , we need to fetch all navigation\
    \ bar’s descendants and to return labels only and then assert if it contains the\
    \ `\"San Francisco\"` label.\n\n**After asserting on the title label, our first\
    \ test will be**\n\n```\nfunc testExample() throws {\n// UI tests must launch\
    \ the application that they test.\nlet app = XCUIApplication()\napp.launch()\n\
    XCTAssertEqual(app.tables.cells.count, 6)\nlet cell = app.tables.staticTexts[\"\
    San Francisco\"]\ncell.tap()\nlet titleLabel = app.navigationBars.staticTexts[\"\
    San Francisco\"]\nXCTAssertTrue(titleLabel.exists)\n}\n```\n\n### Value Assertion\n\
    \nYou can assert on the value of UIElement using the value property, which varies\
    \ based on the element’s type. If the UIElement is UISwitch, it will be its state:\n\
    \n```\nlet genderSwitch = app.tables.switches[\"Gender\"].value\n```\n\nHere if\
    \ the switch is turned off, the value will be a string with the value “0,” and\
    \ the value will be “1” if the switch is turned on.\n\n## Accessibility\n\nApplication\
    \ is the root of a tree of elements. All these are elements that you can access\
    \ using types and identifiers. To make your life easy when UI testing, you need\
    \ to make each UIElement unique. In a way we will repeat what we did in step 4,\
    \ but we will use the accessibility identifier to get the `\"Say Hello !\"` button.\
    \ Let’s recall the elements hierarchy of the app.\n\nYou can add accessibility\
    \ identifiers using Storyboard from the Identity Inspector by checking if Accessibility\
    \ is enabled and adding an identifier (Figure [3-9](#505360_1_En_3_Chapter.xhtml#Fig9))\
    \ or using API `view.isAccessibilityElement = true` and `view.accessibilityIdentifier\
    \ = \"Hello\"`.\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9\n\nAdding an identifier\n\n**After using Accessibility to find the\
    \ Hello button, our first test will be**\n\n```\nfunc testExample() throws {\n\
    // UI tests must launch the application that they test.\nlet app = XCUIApplication()\n\
    app.launch()\nXCTAssertEqual(app.tables.cells.count, 6)\nlet cell = app.tables.staticTexts[\"\
    San Francisco\"]\ncell.tap()\nlet titleLabel = app.navigationBars.staticTexts[\"\
    San Francisco\"]\nXCTAssertTrue(titleLabel.exists)\nlet helloButton = app.buttons[\"\
    Hello\"]\nhelloButton.tap()\n}\n```\n\n### Accessibility Tips\n\n*   Add breakpoints\
    \ inside tests (Figure [3-10](#505360_1_En_3_Chapter.xhtml#Fig10)) and print the\
    \ description of a UIElement inside `LLDB` using this command: `p print(helloButton.debugDescription).`\n\
    \n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg)\n\
    \n    Figure 3-10\n\n    Debugging accessibility\n\n*   When you launch the Accessibility\
    \ Inspector (Figure [3-11](#505360_1_En_3_Chapter.xhtml#Fig11)), you can touch\
    \ UIElements inside the simulator to check the accessibility system’s output (Figure\
    \ [3-12](#505360_1_En_3_Chapter.xhtml#Fig12)).\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg)\n\
    \n    Figure 3-12\n\n    Debugging using the Accessibility Inspector\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg)\n\
    \n    Figure 3-11\n\n    Opening the Accessibility Inspector\n\n## Putting It\
    \ All Together\n\n**After asserting on alert content, our first test will be**\n\
    \n```\nfunc testExample() throws {\n// UI tests must launch the application that\
    \ they test.\nlet app = XCUIApplication()\napp.launch()\nXCTAssertEqual(app.tables.cells.count,\
    \ 6)\nlet cell = app.tables.staticTexts[\"San Francisco\"]\ncell.tap()\nlet titleLabel\
    \ = app.navigationBars.staticTexts[\"San Francisco\"]\nXCTAssertTrue(titleLabel.exists)\n\
    let helloButton = app.buttons[\"Hello\"]\nhelloButton.tap()\nXCTAssertTrue(app.alerts.staticTexts[\"\
    Welcome\"].exists)\nXCTAssertTrue(app.alerts.staticTexts[\"in San Francisco\"\
    ].exists)\n}\n```\n\n## Improve UI Tests\n\nUI tests are much slower than normal\
    \ unit tests. This is due to their nature as they directly interact with the UI\
    \ the same as a normal user would. However, there are a few things to keep in\
    \ mind in order to make your UI tests efficient:\n\n*   Waiting times: Do not\
    \ use `sleep` inside your tests to wait for a specific operation because it makes\
    \ your tests slower and still can make them flaky; you need to use `.waitForExistence(timeout:\
    \ )`.\n\n*   Parallel UI tests execution starting from Xcode 10, but it’s more\
    \ stable on Xcode 11 (Figure [3-13](#505360_1_En_3_Chapter.xhtml#Fig13)).\n\n\
    \    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg)\n\
    \n    Figure 3-13\n\n    Parallelize test execution\n\n## Exercise\n\nWe are done\
    \ with the first UI test, which navigates to the first city and taps the “Say\
    \ Hello !” button. Try writing another UI test that navigates to the first city\
    \ and taps the “Say Hello !” button and then goes back and navigates to the second\
    \ one and taps the “Say Hello !” button."
  trans: "\n# 与用户界面交互\n\n我们应该利用 `XCUIElementQuery` 的强大功能来找到 `\"San Francisco\"` 单元格。首先，你需要获取所有表视图的后代元素，并只返回标签，类似于这样：`app.tables.staticTexts`。这个查询将返回表视图内所有的标签。下一步是找到包含\
    \ `\"San Francisco\"` 的标签。该查询将返回一个 `XCUIElement` 数组。\n\n`XCUIElement` 是应用中 `UIElement`\
    \ 的代理。元素具有诸如 `button`、`cell`、`staticText` 等类型。它们也有标识符，这些标识符来自辅助功能系统、辅助功能标识符，或者辅助功能标签或标题。大多数情况下，我们通过类型和标识符的组合来找到\
    \ `UIElement`；例如，`let button = app.buttons[\"Edit\"]`。我们找到了一个类型为按钮、标识符为 `Edit`\
    \ 的 `UIElement`。另一种查询元素的方式是基于元素的内容进行查询。例如，如果我们知道一个标签应该显示特定的文本，我们可以通过查询其内容来搜索该标签。我们可以用这种方法来找到\
    \ `\"San Francisco\"` 标签。此外，还有一个重要的属性可以用来检查 `UIElement` 是否存在：`element.exists`。\n\
    \n**在对 San Francisco 标签进行断言后，我们的第一个测试将是**\n\n```\nfunc testExample() throws {\n\
    \    // UI tests must launch the application that they test.\n    let app = XCUIApplication()\n\
    \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell\
    \ = app.tables.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(cell.exists)\n\
    }\n```\n\n**注意**：当内容是动态的或在不同运行之间可能不同时，依赖内容是非常危险的。在这种情况下，你应该始终依赖辅助功能标识符。\n\n##\
    \ UI 事件\n\n一旦找到元素，你需要模拟用户交互。`XCUIElement` 提供了一些 API，你可以用来与 `UIElement` 交互：\n\n\
    *   `tap()`\n*   `doubleTap()`\n*   `press(forDuration:, thenDragTo:)`\n*   `twoFingerTap()`\n\
    *   `swipeUp()`、`swipeDown()`、`swipeLeft()`、`swipeRight()`\n*   `typeText(\"\"\
    )`\n\n**在使用 tap API 后，我们的第一个测试将是**\n\n```\nfunc testExample() throws {\n    //\
    \ UI tests must launch the application that they test.\n    let app = XCUIApplication()\n\
    \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell\
    \ = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n}\n```\n\n## 断言\n\
    \n就像我们在第三步中所做的那样，我们需要获取所有导航栏的后代元素，并只返回标签，然后断言它是否包含 `\"San Francisco\"` 标签。\n\n\
    **在对标题标签进行断言后，我们的第一个测试将是**\n\n```\nfunc testExample() throws {\n    // UI tests\
    \ must launch the application that they test.\n    let app = XCUIApplication()\n\
    \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell\
    \ = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n    let titleLabel\
    \ = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    }\n```\n\n### 值断言\n\n你可以使用 `value` 属性对 `UIElement` 的值进行断言，该属性根据元素类型而变化。如果 `UIElement`\
    \ 是 `UISwitch`，则其值代表开关状态：\n\n```\nlet genderSwitch = app.tables.switches[\"Gender\"\
    ].value\n```\n\n这里，如果开关关闭，该值将是字符串 `\"0\"`；如果开关打开，值将是 `\"1\"`。\n\n## 辅助功能\n\n应用程序是元素树的根。所有这些都是你可以使用类型和标识符访问的元素。为了在\
    \ UI 测试时轻松应对，你需要使每个 `UIElement` 都是唯一的。在某种程度上，我们将重复我们在第四步中所做的操作，但我们将使用辅助功能标识符来获取\
    \ `\"Say Hello !\"` 按钮。让我们回顾一下应用程序的元素层级结构。\n\n你可以使用 Storyboard 从 Identity Inspector\
    \ 添加辅助功能标识符，方法是检查 Accessibility 是否启用并添加标识符（图 3-9），或者使用 API `view.isAccessibilityElement\
    \ = true` 和 `view.accessibilityIdentifier = \"Hello\"`。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg](img/505360_1_En_3_Fig9_HTML.jpg)\n\
    \n图 3-9：添加标识符\n\n**在使用辅助功能找到 Hello 按钮后，我们的第一个测试将是**\n\n```\nfunc testExample()\
    \ throws {\n    // UI tests must launch the application that they test.\n    let\
    \ app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
    \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
    \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n}\n```\n\
    \n### 辅助功能提示\n\n*   在测试中添加断点（图 3-10）并在 `LLDB` 中使用以下命令打印 `UIElement` 的描述：`p print(helloButton.debugDescription)`。\n\
    \n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg](img/505360_1_En_3_Fig10_HTML.jpg)\n\
    \n    图 3-10：调试辅助功能\n\n*   当你启动 Accessibility Inspector（图 3-11）时，你可以在模拟器中触摸 `UIElement`\
    \ 以检查辅助功能系统的输出（图 3-12）。\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg](img/505360_1_En_3_Fig12_HTML.jpg)\n\
    \n    图 3-12：使用 Accessibility Inspector 进行调试\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg](img/505360_1_En_3_Fig11_HTML.jpg)\n\
    \n    图 3-11：打开 Accessibility Inspector\n\n## 综合运用\n\n**在对警告内容进行断言后，我们的第一个测试将是**\n\
    \n```\nfunc testExample() throws {\n    // UI tests must launch the application\
    \ that they test.\n    let app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
    \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
    \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
    \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n    XCTAssertTrue(app.alerts.staticTexts[\"\
    Welcome\"].exists)\n    XCTAssertTrue(app.alerts.staticTexts[\"in San Francisco\"\
    ].exists)\n}\n```\n\n## 改进 UI 测试\n\nUI 测试比普通的单元测试要慢得多。这是由于它们的本质，因为它们像普通用户一样直接与\
    \ UI 交互。然而，为了让你的 UI 测试高效，有几点需要注意：\n\n*   **等待时间**：不要在测试中使用 `sleep` 来等待特定操作，因为这会使你的测试变慢，并且仍然可能导致测试不稳定；你需要使用\
    \ `.waitForExistence(timeout: )`。\n*   **并行 UI 测试执行** 从 Xcode 10 开始支持，但在 Xcode\
    \ 11 上更稳定（图 3-13）。\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg](img/505360_1_En_3_Fig13_HTML.jpg)\n\
    \n    图 3-13：并行化测试执行\n\n## 练习\n\n我们已经完成了第一个 UI 测试，它导航到第一个城市并点击了“Say Hello !”按钮。尝试编写另一个\
    \ UI 测试，它导航到第一个城市并点击“Say Hello !”按钮，然后返回并导航到第二个城市，再点击“Say Hello !”按钮。\n"
- fmt: "## Summary\n\nIn UI tests we interact with the app exactly as an actual user\
    \ would. In this chapter we explored the basics of UI testing in iOS and how we\
    \ can use the `XCUITest` framework to write all tests by searching for UI elements\
    \ on-screen, interacting with them, and verifying the expected UI state of the\
    \ app.\n\nWe used `XCUIApplication` to create a proxy for our app and used that\
    \ proxy to launch our app. We can also use that proxy to terminate our app. After\
    \ the app is launched, in order to start interacting with it, we need to access\
    \ the UI elements on the screen. To search and find a certain UI element, we use\
    \ the powerful `XCUIElementQuery` to search inside our app’s view. And by combining\
    \ multiple queries together, we can reach the element we need.\n\nWhen we have\
    \ an element, we can either assert on its state using normal `XCTAsserts` discussed\
    \ in the previous chapter, or we can interact with this element. There are multiple\
    \ user interactions that we can simulate using `XCUITest`. We can tap or double-tap,\
    \ we can press and hold, we can swipe in any direction, and we can even type text\
    \ if applicable.\n\nUI testing in iOS and accessibility features work hand in\
    \ hand. Adding accessibility identifiers, labels, and values to your views will\
    \ not only make your app accessible to people with vision, motor, learning, or\
    \ hearing disabilities but will also make writing UI tests much easier. When you\
    \ make your views accessible, you enable your tests to query these elements using\
    \ accessibility identifiers or labels and can check on the value to verify correct\
    \ behavior.\n\n# Testing Pyramid\n\nNow that we know how to use `XCTest` and `XCUITest`\
    \ to write tests in iOS, we need to know the types of tests we should be writing,\
    \ as well as the quantity of each type of testing. And this is where the “Testing\
    \ Pyramid” comes in (Figure 4-1). It is a concept that helps in answering both\
    \ of these questions. Mike Cohn came up with this concept in his book *Succeeding\
    \ with Agile*. It’s a great visual metaphor telling you to think about different\
    \ layers of testing. It also tells you how much testing to do on each layer.\n\
    \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg](images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nEmpty Testing Pyramid\n\nInstead of showing the conclusion Mike\
    \ Cohn reached, we will try to deduce it by going through a few examples. In this\
    \ chapter, you will be introduced to three types of testing, and we’ll implement\
    \ some tests for each type. And by the end of the chapter, we will try to deduce\
    \ the position of each type in the Testing Pyramid.\n\n## Our App\n\nLet’s take\
    \ a look at our demo app for this chapter, `TestingPyramid`. You can find the\
    \ starter project for this app in the chapter’s resources. It’s an extremely simple\
    \ app with just two screens (Figure 4-2). The initial screen is the login screen,\
    \ where the user is asked to enter their email and password. If successful, they\
    \ are routed to our second screen, which is the statistics page. The statistics\
    \ page shows the number of successful and failed logins since the app was installed.\n\
    \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg](images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\n\nApp screens\n\nThe app internally has the following components:\n\
    \n- `Validator`: Validates email and password\n- `DatabaseManager`: Queries the\
    \ local database to check if the login attempt is valid\n- `PersistenceManager`:\
    \ Saves the number of failed logins and successful logins in user defaults\n-\
    \ `LoginManager`: Responsible for executing the whole path of logging in, which\
    \ is validating the entered credentials, making the network request, and updating\
    \ the saved statistics based on the result\n\n## UI Tests\n\nThe first type we\
    \ will explore is UI testing. When writing UI tests, we want to test two interconnected\
    \ things, that our UI is displayed correctly and that the app functionalities\
    \ are working as expected. When UI testing, we’re seeing the app exactly how users\
    \ do. We also interact with the app the same way users do. We have no access to\
    \ any internal code, we can’t check on network requests, and we can’t query our\
    \ persistence layer or write to an internal variable.\n\nLet’s take a look at\
    \ some UI tests we can write for our app:\n\n```\nfunc testInvalidLogin() throws\
    \ {\n    // Initial state\n    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
    \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
    \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
    \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
    \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n \
    \   XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
    \    // Invalid login\n    loginButton.tap()\n    // Then\n    let alert = app.alerts.element\n\
    \    let alertExists = alert.waitForExistence(timeout: 5)\n    XCTAssertTrue(alertExists)\n\
    \    XCTAssertEqual(alert.label, \"Login Error\")\n    XCTAssertTrue(alert.staticTexts[\"\
    Email can not be empty\"].exists)\n}\n\nfunc testValidLogin() throws {\n    //\
    \ Initial state\n    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
    \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
    \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
    \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
    \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n \
    \   XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
    \    // Valid login\n    emailTextField.tap()\n    emailTextField.typeText(\"\
    valid@valid.com\")\n    passwordTextField.tap()\n    passwordTextField.typeText(\"\
    Password!\")\n    loginButton.tap()\n    // Then\n    let statisticsTitle = app.staticTexts[AccessibilityIdentifiers.kStatisticsTitleLabelIdentifier]\n\
    \    let failedLabel = app.staticTexts[AccessibilityIdentifiers.kFailedCountLabelIdentifier]\n\
    \    let successfulLabel = app.staticTexts[AccessibilityIdentifiers.kSuccessfulCountLabelIdentifier]\n\
    \    XCTAssertTrue(statisticsTitle.exists)\n    XCTAssertTrue(failedLabel.exists)\n\
    \    XCTAssertTrue(successfulLabel.exists)\n}\n```\n\nHere we test two scenarios,\
    \ one where the login is successful and the other where the login is unsuccessful\
    \ because the email and password are empty. And in both scenarios, we assert on\
    \ the expected behavior. However, when it comes to unsuccessful login, we know\
    \ that this is not the only scenario that leads to an unsuccessful login. One\
    \ option is to add a UI test for each scenario where the login fails, but since\
    \ UI tests are expensive in terms of execution time, it doesn’t make sense to\
    \ add multiple new tests, which are all almost identical. So what we will do is\
    \ try to cover these scenarios within a different level in our Testing Pyramid.\
    \ Another aspect in which UI tests fall short is asserting on internal changes.\
    \ For example, we would want to assert that login counts are updated when an attempted\
    \ login occurs. But since we have no access to our internal code, we will need\
    \ to cover this within a different level as well."
  raw: '## Summary


    In UI tests we interact with the app exactly as an actual user would. In this
    chapter we explored the basics of UI testing in iOS and how we can use the XCUITest
    framework to write all tests by searching for UI elements on-screen, interacting
    with them, and verifying the expected UI state of the app.


    We used XCUIApplication to create a proxy for our app and used that proxy to launch
    our app. We can also use that proxy to terminate our app. After the app is launched,
    in order to start interacting with it, we need to access the UI elements on the
    screen. To search and find a certain UI element, we use the powerful XCUIElementQuery
    to search inside our app’s view. And by combining multiple queries together, we
    can reach the element we need.


    When we have an element, we can either assert on its state using normal XCTAsserts
    discussed in the previous chapter, or we can interact with this element. There
    are multiple user interactions that we can simulate using XCUITest. We can tap
    or double-tap, we can press and hold, we can swipe in any direction, and we can
    even type text if applicable.


    UI testing in iOS and accessibility features work hand in hand. Adding accessibility
    identifiers, labels, and values to your views will not only make your app accessible
    to people with vision, motor, learning, or hearing disabilities but will also
    make writing UI tests much easier. When you make your views accessible, you enable
    your tests to query these elements using accessibility identifiers or labels and
    can check on the value to verify correct behavior.


    # 4. Testing Pyramid


    Now that we know how to use XCTest and XCUITest to write tests in iOS, we need
    to know the types of tests we should be writing, as well as the quantity of each
    type of testing. And this is where the “Testing Pyramid” comes in (Figure [4-1](#505360_1_En_4_Chapter.xhtml#Fig1)).
    It is a concept that helps in answering both of these questions. Mike Cohn came
    up with this concept in his book *Succeeding with Agile*. It’s a great visual
    metaphor telling you to think about different layers of testing. It also tells
    you how much testing to do on each layer.


    ![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg](images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Empty Testing Pyramid


    Instead of showing the conclusion Mike Cohn reached, we will try to deduce it
    by going through a few examples. In this chapter, you will be introduced to three
    types of testing, and we’ll implement some tests for each type. And by the end
    of the chapter, we will try to deduce the position of each type in the Testing
    Pyramid.


    ## Our App


    Let’s take a look at our demo app for this chapter, **TestingPyramid**. You can
    find the starter project for this app in the chapter’s resources. It’s an extremely
    simple app with just two screens (Figure [4-2](#505360_1_En_4_Chapter.xhtml#Fig2)).
    The initial screen is the login screen, where the user is asked to enter their
    email and password. If successful, they are routed to our second screen, which
    is the statistics page. The statistics page shows the number of successful and
    failed logins since the app was installed.


    ![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg](images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    App screens


    The app internally has the following components:


    *   Validator: Validates email and password


    *   DatabaseManager: Queries the local database to check if the login attempt
    is valid


    *   PersistenceManager: Saves the number of failed logins and successful logins
    in user defaults


    *   LoginManager: Responsible for executing the whole path of logging in, which
    is validating the entered credentials, making the network request, and updating
    the saved statistics based on the result


    ## UI Tests


    The first type we will explore is UI testing . When writing UI tests, we want
    to test two interconnected things, that our UI is displayed correctly and that
    the app functionalities are working as expected. When UI testing, we’re seeing
    the app exactly how users do. We also interact with the app the same way users
    do. We have no access to any internal code, we can’t check on network requests,
    and we can’t query our persistence layer or write to an internal variable.


    Let’s take a look at some UI tests we can write for our app:


    ```

    func testInvalidLogin() throws {

    // Initial state

    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]

    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]

    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]

    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]

    XCTAssertTrue(title.exists)

    XCTAssertTrue(emailTextField.exists)

    XCTAssertTrue(passwordTextField.exists)

    XCTAssertTrue(loginButton.exists)

    // Invalid login

    loginButton.tap()

    // Then

    let alert = app.alerts.element

    let alertExists = alert.waitForExistence(timeout: 5)

    XCTAssertTrue(alertExists)

    XCTAssertEqual(alert.label, "Login Error")

    XCTAssertTrue(alert.staticTexts["Email can not be empty"].exists)

    }

    func testValidLogin() throws {

    // Initial state

    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]

    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]

    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]

    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]

    XCTAssertTrue(title.exists)

    XCTAssertTrue(emailTextField.exists)

    XCTAssertTrue(passwordTextField.exists)

    XCTAssertTrue(loginButton.exists)

    // Valid login

    emailTextField.tap()

    emailTextField.typeText("valid@valid.com")

    passwordTextField.tap()

    passwordTextField.typeText("Password!")

    loginButton.tap()

    // Then

    let statisticsTitle = app.staticTexts[AccessibilityIdentifiers.kStatisticsTitleLabelIdentifier]

    let failedLabel = app.staticTexts[AccessibilityIdentifiers.kFailedCountLabelIdentifier]

    let successfulLabel = app.staticTexts[AccessibilityIdentifiers.kSuccessfulCountLabelIdentifier]

    XCTAssertTrue(statisticsTitle.exists)

    XCTAssertTrue(failedLabel.exists)

    XCTAssertTrue(successfulLabel.exists)

    }

    ```


    Here we test two scenarios, one where the login is successful and the other where
    the login is unsuccessful because the email and password are empty. And in both
    scenarios, we assert on the expected behavior. However, when it comes to unsuccessful
    login, we know that this is not the only scenario that leads to an unsuccessful
    login. One option is to add a UI test for each scenario where the login fails,
    but since UI tests are expensive in terms of execution time, it doesn’t make sense
    to add multiple new tests, which are all almost identical. So what we will do
    is try to cover these scenarios within a different level in our Testing Pyramid.
    Another aspect in which UI tests fall short is asserting on internal changes.
    For example, we would want to assert that login counts are updated when an attempted
    login occurs. But since we have no access to our internal code, we will need to
    cover this within a different level as well.'
  trans: "好的，作为高级文档工程师和翻译员，我将按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n## 总结\n\n在 UI 测试中，我们与应用程序的交互方式与真实用户完全相同。在本章中，我们探讨了\
    \ iOS 中 UI 测试的基础知识，以及如何使用 `XCUITest` 框架，通过查找屏幕上的 UI 元素、与之交互，并验证应用程序预期的 UI 状态来编写所有测试。\n\
    \n我们使用 `XCUIApplication` 为应用程序创建了一个代理，并使用该代理来启动我们的应用程序。我们也可以使用同一个代理来终止应用程序。应用程序启动后，为了开始与之交互，我们需要访问屏幕上的\
    \ UI 元素。为了搜索和查找特定的 UI 元素，我们使用强大的 `XCUIElementQuery` 在我们的应用程序视图中进行搜索。通过组合多个查询，我们可以找到所需的元素。\n\
    \n当我们获取到某个元素后，我们可以使用前一章讨论的标准 `XCTAsserts` 来断言其状态，也可以与该元素进行交互。使用 `XCUITest` 可以模拟多种用户交互。我们可以点击或双击、长按、向任意方向滑动，甚至在适用的情况下输入文本。\n\
    \niOS 中的 UI 测试与辅助功能特性是相辅相成的。为你的视图添加辅助功能标识符、标签和值，不仅能让你的应用程序对视障、行动不便、学习障碍或听障人士更友好，也会让编写\
    \ UI 测试变得更加容易。当你使视图可访问时，你的测试就可以使用辅助功能标识符或标签来查询这些元素，并可以检查其值以验证正确的行为。\n\n# 测试金字塔\n\
    \n现在我们已经知道了如何使用 `XCTest` 和 `XCUITest` 在 iOS 中编写测试，我们需要了解我们应该编写哪些类型的测试，以及每种测试类型的数量。这正是“测试金字塔”（图\
    \ 4-1）概念的用武之地。这个概念有助于回答这两个问题。Mike Cohn 在他的书 *Succeeding with Agile* 中提出了这个概念。这是一个绝佳的视觉隐喻，告诉你要考虑不同的测试层次，也告诉你在每一层应该进行多少测试。\n\
    \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg](img/505360_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1\n\n空的测试金字塔\n\n我们不直接展示 Mike Cohn 得出的结论，而是尝试通过几个例子来推导它。在本章中，你将了解到三种测试类型，并为每种类型实现一些测试。在本章结束时，我们将尝试推导出每种类型在测试金字塔中的位置。\n\
    \n## 我们的应用程序\n\n让我们来看看本章的演示应用程序 `TestingPyramid`。你可以在本章的资源中找到该应用程序的起始项目。这是一个极其简单的应用程序，只有两个屏幕（图\
    \ 4-2）。初始屏幕是登录屏幕，用户需要在此输入电子邮件和密码。如果登录成功，用户将被引导到第二个屏幕，即统计页面。统计页面显示自应用程序安装以来的成功和失败登录次数。\n\
    \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg](img/505360_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2\n\n应用程序屏幕\n\n该应用程序内部包含以下组件：\n\n- `Validator`：验证电子邮件和密码\n- `DatabaseManager`：查询本地数据库以检查登录尝试是否有效\n\
    - `PersistenceManager`：在用户默认设置中保存失败登录和成功登录的次数\n- `LoginManager`：负责执行整个登录流程，包括验证输入的凭据、发起网络请求以及根据结果更新保存的统计数据\n\
    \n## UI 测试\n\n我们将探索的第一种类型是 UI 测试。在编写 UI 测试时，我们希望测试两个相互关联的事情：我们的 UI 是否正确显示，以及应用程序的功能是否按预期工作。进行\
    \ UI 测试时，我们以用户完全相同的方式查看应用程序，也以用户相同的方式与应用程序交互。我们无法访问任何内部代码，不能检查网络请求，也不能查询持久化层或写入内部变量。\n\
    \n让我们来看看我们可以为应用程序编写的一些 UI 测试：\n\n```\nfunc testInvalidLogin() throws {\n    //\
    \ 初始状态\n    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
    \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
    \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
    \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
    \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n \
    \   XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
    \    // 无效登录\n    loginButton.tap()\n    // 然后\n    let alert = app.alerts.element\n\
    \    let alertExists = alert.waitForExistence(timeout: 5)\n    XCTAssertTrue(alertExists)\n\
    \    XCTAssertEqual(alert.label, \"Login Error\")\n    XCTAssertTrue(alert.staticTexts[\"\
    Email can not be empty\"].exists)\n}\n\nfunc testValidLogin() throws {\n    //\
    \ 初始状态\n    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
    \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
    \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
    \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
    \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n \
    \   XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
    \    // 有效登录\n    emailTextField.tap()\n    emailTextField.typeText(\"valid@valid.com\"\
    )\n    passwordTextField.tap()\n    passwordTextField.typeText(\"Password!\")\n\
    \    loginButton.tap()\n    // 然后\n    let statisticsTitle = app.staticTexts[AccessibilityIdentifiers.kStatisticsTitleLabelIdentifier]\n\
    \    let failedLabel = app.staticTexts[AccessibilityIdentifiers.kFailedCountLabelIdentifier]\n\
    \    let successfulLabel = app.staticTexts[AccessibilityIdentifiers.kSuccessfulCountLabelIdentifier]\n\
    \    XCTAssertTrue(statisticsTitle.exists)\n    XCTAssertTrue(failedLabel.exists)\n\
    \    XCTAssertTrue(successfulLabel.exists)\n}\n```\n\n这里我们测试了两个场景：一个是登录成功，另一个是登录失败（因为电子邮件和密码为空）。在这两种场景中，我们都断言的预期行为。然而，关于登录失败，我们知道这并不是导致登录失败的唯一场景。一种选择是为每个导致登录失败的场景添加一个\
    \ UI 测试，但由于 UI 测试的执行时间成本很高，添加多个几乎相同的测试是没有意义的。因此，我们将在测试金字塔的不同层级中尝试覆盖这些场景。UI 测试的另一个不足在于断言内部状态的变化。例如，我们希望断言当尝试登录时，登录计数已经更新。但由于我们无法访问内部代码，我们也需要在另一个不同的层级中来覆盖这一点。\n"
- fmt: '# Integration Tests


    For each component, we can describe it based on its level of isolation. We’ll
    call completely isolated components (components that depend on no other components)
    **solitary components**. And we’ll call components that depend on/integrate with
    other components **sociable components**. Just like in human beings, some sociable
    components can be more sociable than other sociable components.


    Integration tests are targeted toward highly sociable components, components that
    integrate other smaller components together. Normally, the numbers of these components
    are relatively small.


    There is no one rule on which components should be the subject of integration
    tests. You will have to use your judgement here when it comes to this. However,
    there are some things to consider when making this judgment. No integration tests
    are needed for solitary components, since they don’t integrate with anything.
    Highly sociable components will most likely fall under the integration testing
    level. Components in between don’t always have to be subject of integration tests.
    Yes, we can add integration tests for all sociable components. However, for components
    that are closer to being solitary than to being sociable, adding integration tests
    will probably not add much value and will slow up our integration test suite.
    Adding unit tests for these components will probably be enough. But this will
    ultimately depend on your judgement.


    When it comes to our demo app, `LoginManager` is a highly sociable component,
    as it interacts with our other three components. Let’s take a look at some integration
    tests we can write for `LoginManager`:


    ```

    func testInvalidCredentialsLogin() {

    // Given

    let databaseManager = TestDatabaseManager() // #1

    let persistenceManager = PersistenceManager.shared

    let manager = LoginManager(databaseManager: databaseManager)

    // That

    let expectation = self.expectation(description: "Login finished")

    // When

    manager.login(email: "invalid", password: "invalid") { (success, error) in

    // Then

    XCTAssertFalse(success, "Login should not be successful") // #2

    XCTAssertEqual(error, ValidationError.invalidEmail.message, "Wrong error returned
    from login") // #3

    expectation.fulfill()

    }

    // Then

    self.wait(for: [expectation], timeout: 2)

    XCTAssertEqual(persistenceManager.failedLoginsCount, 1, "Failed login counts should
    be incremented") // #4

    XCTAssertEqual(persistenceManager.successfulLoginsCount, 0, "Successful login
    counts should not be incremented") // #5

    XCTAssertEqual(databaseManager.queriesCount, 0, "Database should not be queried")
    // #6

    }

    ```


    Here we wrote a test to verify that `LoginManager` interacts correctly with its
    dependencies. In the case of invalid credentials, we make the following assertions:


    1. We create an instance of `TestDatabaseManager` which behaves the same as the
    normal `DatabaseManager` except it keeps record of how many queries to the database
    are made.

    2. We assert that the login function returns a false success flag.

    3. We assert that the error returned is a validation error of type `"invalidEmail"`.

    4. We assert that the login manager asks the persistence manager to increment
    failed login count.

    5. We assert that the login manager does not ask the persistence manager to increment
    successful login count.

    6. We assert that the login manager does not query the database.


    ```

    func testIncorrectCredentialsLogin() {

    // Given

    let databaseManager = TestDatabaseManager(databaseFilename: "testAccounts")

    let persistenceManager = PersistenceManager.shared

    let manager = LoginManager(databaseManager: databaseManager)

    // That

    let expectation = self.expectation(description: "Login finished")

    // When

    manager.login(email: "test@test.com", password: "Incorrect!") { (success, error)
    in

    // Then

    XCTAssertFalse(success, "Login should not be successful") // #1

    XCTAssertEqual(error, DatabaseError.credentialMismatch.message, "Wrong error returned
    from login") // #2

    expectation.fulfill()

    }

    // Then

    self.wait(for: [expectation], timeout: 2)

    XCTAssertEqual(persistenceManager.failedLoginsCount, 1, "Failed login counts should
    be incremented") // #3

    XCTAssertEqual(persistenceManager.successfulLoginsCount, 0, "Successful login
    counts should not be incremented") // #4

    XCTAssertEqual(databaseManager.queriesCount, 1, "Database should be queried")
    // #5

    }

    ```


    For the second test, we look at the case of incorrect credentials, and we make
    the following assertions:


    1. We assert that the login function returns a false success flag.

    2. We assert that the error returned is a database error of type `"credentialMismatch"`.

    3. We assert that the login manager asks the persistence manager to increment
    failed login count.

    4. We assert that the login manager does not ask the persistence manager to increment
    successful login count.

    5. We assert that the login manager queries the database exactly once.


    ```

    func testSuccessfulLogin() {

    // Given

    let databaseManager = TestDatabaseManager(databaseFilename: "testAccounts")

    let persistenceManager = PersistenceManager.shared

    let manager = LoginManager(databaseManager: databaseManager)

    // That

    let expectation = self.expectation(description: "Login finished")

    // When

    manager.login(email: "test@test.com", password: "!2345678") { (success, error)
    in

    // Then

    XCTAssertTrue(success, "Login should be successful")

    XCTAssertNil(error, "No error should be returned from login")

    expectation.fulfill()

    }

    // Then

    self.wait(for: [expectation], timeout: 2)

    XCTAssertEqual(persistenceManager.failedLoginsCount, 0, "Failed login counts should
    not be incremented")

    XCTAssertEqual(persistenceManager.successfulLoginsCount, 1, "Successful login
    counts should be incremented")

    XCTAssertEqual(databaseManager.queriesCount, 1, "Database should be queried")

    }

    ```


    Finally, for the successful login case, we make the following assertions:


    1. We assert that the login function returns a true success flag.

    2. We assert that no error is returned.

    3. We assert that the login manager does not ask the persistence manager to increment
    failed login count.

    4. We assert that the login manager asks the persistence manager to increment
    successful login count.

    5. We assert that the login manager queries the database exactly once.


    Now the question we need to answer is: Should we add more tests for `LoginManager`?
    We probably can, since, for example, we haven’t covered all cases in which the
    initial validation will fail. So if we take a look at the first test we wrote,
    `testInvalidCredentialsLogin`, we could probably add multiple similar tests, each
    having a different validation fault and assert on the matching error. This would
    be an example for a new test.'
