  raw: '### CoffeeDrinksPresenterTests


    We already added an integration test for our presenter , so you might think we
    don’t need unit tests for it. But that’s never the case. Integration tests can
    never be a substitute for unit tests. As we covered in Chapter [4](#505360_1_En_4_Chapter.xhtml),
    each type serves a different purpose. We already wrote a test to validate that
    our presenter integrates correctly with other components. Now we need to write
    tests for it but in isolation.


    Again `CoffeeDrinksPresenter` is dependent on `CoffeeDrinksModel`. If we need
    to test it, we need to stub all these objects that `CoffeeDrinksPresenter` depends
    on and return expected data. Here we write a stub for `CoffeeDrinksModel`, which
    takes the expected data in its constructor and returns it as data inside the `fetchAllCoffeDrinks()`
    function:


    ```

    class CoffeeDrinksModelStub: CoffeeDrinksModel {

    var stubbedDrinks:[CoffeeDrink]?

    init(stubbedDrinks:[CoffeeDrink]) {

    super.init(source: nil)

    self.stubbedDrinks = stubbedDrinks

    }

    public override func fetchAllCoffeDrinks() ->[CoffeeDrink]? {

    return self.stubbedDrinks

    }

    }

    ```


    Now let’s start writing our tests one by one:


    ```

    func testFetchingDrinksCount() {

    //Given

    let drinks = [CoffeeDrink(name: "coffee1",imageName: "black",description: "desc1"),

    CoffeeDrink(name: "coffee2",imageName: "black",description: "desc2")]

    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks: drinks)

    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)

    // when & then

    XCTAssertEqual( coffeeDrinksPresenter.getDrinksCount(), 2)

    }

    func testFetchingDrinksName() {

    //Given

    let drinks = [CoffeeDrink(name: "coffee1",imageName: "black",description: "desc1"),

    CoffeeDrink(name: "coffee2",imageName: "black",description: "desc2")]

    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks: drinks)

    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)

    // when & then

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:0), "coffee1")

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:1), "coffee2")

    }

    func testFetchingDrinksImagesName() {

    //Given

    let drinks = [CoffeeDrink(name: "coffee1",imageName: "black",description: "desc1"),

    CoffeeDrink(name: "coffee2",imageName: "black",description: "desc2")]

    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks: drinks)

    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)

    // when & then

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:0), "black")

    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:1), "black")

    }

    ```


    As you know by now, after writing each test, we go and apply the TDD cycle over
    and over again. And after writing all the preceding tests and making all of them
    pass one after the other, we will end up with the following class :


    ```

    class CoffeeDrinksPresenter {

    private var model:CoffeeDrinksModel?

    var drinks:[CoffeeDrink]?

    init(model:CoffeeDrinksModel?) {

    self.model = model

    self.drinks = self.model?.fetchAllCoffeDrinks()

    }

    public func getDrinksCount() -> Int {

    self.drinks?.count ?? 0

    }

    public func getDrinkName(index:Int) -> String? {

    guard let drink = self.drinks?[index] else {

    return nil

    }

    return drink.name

    }

    public func getDrinkImageName(index:Int) -> String? {

    guard let drink = self.drinks?[index] else {

    return nil

    }

    return drink.imageName

    }

    }

    ```


    Now we can run `CoffeeDrinksPresenterTests`, and it should pass ✅.


    And we can uncomment `CoffeeDrinksIntegrationTests` and run; it should pass too.
    Now, the current status (Figure [5-12](#505360_1_En_5_Chapter.xhtml#Fig12)) is
    that every object is working well separately as well as working well when integrated
    together.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig12_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Testing plan diagram (second unit added)


    Let’s now implement the last part of our feature to populate the data inside the
    view. After that, we need to run our end-to-end test to ensure everything is working
    fine. Once we see Figure [5-13](#505360_1_En_5_Chapter.xhtml#Fig13), we are done
    with our first user story. This feature seems to be simple. We will implement
    the same process for the rest of the stories.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig13_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    All added tests


    We did not go into details on implementing the UI element of this feature, but
    you’ll find the code in this chapter’s resources.


    ## Test Health Check


    We need to validate that when our tests pass, it indicates that everything is
    working fine, and when they fail, we have a problem, and the problem is identified
    from the tests. In Figure [5-14](#505360_1_En_5_Chapter.xhtml#Fig14) are all possible
    locations for bugs. So let’s try to introduce a bug intentionally and see if our
    tests are able to catch it or not.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig14_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Possible bugs


    Example: Let’s try to change `getDrinkName` inside `CoffeeDrinksPresenter` and
    make it return `imageName` instead of `name` (Figure [5-15](#505360_1_En_5_Chapter.xhtml#Fig15))
    and run our tests.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig15_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Faulty code change


    Now let’s run our tests (Figure [5-16](#505360_1_En_5_Chapter.xhtml#Fig16)).


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig16_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Failing tests


    The tests were able to catch the bug successfully.


    ## Second Story


    > *“As a user, I want to tap any coffee drink type to show more details about
    this drink, including a picture of the coffee and a brief description of ingredients.”*


    We need to write a failing end-to-end test that validates that pressing on any
    coffee drink type will show details about this drink. (Figure [5-17](#505360_1_En_5_Chapter.xhtml#Fig17))


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig17_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Testing plan diagram


    Let’s write the first test for this story:


    ```

    func testDetailedCoffeeView() {

    let app = XCUIApplication()

    app.launchEnvironment = ["coffee_drinks_stubbed": "coffee_drinks_stub"]

    app.launch()

    let coffeeCollectionView = app.collectionViews

    coffeeCollectionView.cells["coffee1"].tap()

    XCTAssertTrue(app.navigationBars["coffee1"].exists)

    XCTAssertEqual(app.textViews["desc"].value as? String, "description1")

    }

    ```


    Here we wrote our end-to-end test for this story. We set up our app using launch
    arguments. Then we navigate to a specific drink page and assert that its details
    are correctly displayed.'
  trans: "\n### CoffeeDrinksPresenterTests\n\n我们已经为 presenter 添加了一个集成测试，所以你可能认为不需要再为它编写单元测试了。但事实并非如此。集成测试永远无法替代单元测试。正如我们在第\
    \ 4 章中所述，每种测试都有其不同的目的。我们编写了一个测试来验证 presenter 能否与其他组件正确集成。现在我们需要为它编写测试，但这次是隔离测试。\n\
