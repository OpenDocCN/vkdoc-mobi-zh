  raw: '## Architecture


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig18_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    MVP applied


    As we can see from Figure [5-18](#505360_1_En_5_Chapter.xhtml#Fig18), there aren’t
    too many objects integrated to deliver this story. Which basically means there
    aren’t any sociable components to write integration tests for. So it’s enough
    to write only unit tests for `CoffeeDetailsPresenter` .


    Let’s start writing our tests one by one:


    ```

    func testFetchingDrinkName() {

    //Given

    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name: "coffee1",imageName:
    "black",description: "desc1"))

    // when & then

    XCTAssertEqual(coffeeDetailsPresenter.getName(), "coffee1")

    }

    func testFetchingDrinkDescription() {

    //Given

    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name: "coffee1",imageName:
    "black",description: "desc1"))

    // when & then

    XCTAssertEqual(coffeeDetailsPresenter.getDescription(), "desc1")

    }

    func testFetchingDrinkImageName() {

    //Given

    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name: "coffee1",imageName:
    "black",description: "desc1"))

    // when & then

    XCTAssertEqual(coffeeDetailsPresenter.getImageName(), "black")

    }

    ```


    After writing all the preceding tests and making all of them pass one after the
    other using TDD, we will end up with the following class:


    ```

    class CoffeeDetailsPresenter {

    private var drink:CoffeeDrink?

    init(drink:CoffeeDrink?) {

    self.drink = drink

    }

    public func getName() -> String? {

    guard let drink = self.drink else {

    return nil

    }

    return drink.name

    }

    public func getImageName() -> String? {

    guard let drink = self.drink else {

    return nil

    }

    return drink.imageName

    }

    public func getDescription() -> String? {

    guard let drink = self.drink else {

    return nil

    }

    return drink.description

    }

    }

    ```


    After adding all our tests, this is how our test suite should look like (Figure
    [5-19](#505360_1_En_5_Chapter.xhtml#Fig19)) as well as our app (Figure [5-20](#505360_1_En_5_Chapter.xhtml#Fig20)):


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    App main screen


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Final test suite


    The same as the first feature, we did not go into details on implementing the
    UI, but you’ll find the code in this chapter’s resources.


    ## Exercise


    We are done with the first and second stories. But there are still two more stories
    to go. You should be able to apply the same process we equipped in this chapter
    and implement these two stories. You can find the final project, with the first
    two stories implemented, in the chapter’s resources.


    ## Summary


    In this chapter, we took a look at how TDD can be employed on a slightly complex
    project, which is a challenge similar to what you’ll encounter in your day-to-day
    life. You got introduced to **CoffeePot**, which is an app that helps users understand
    the differences between different types of coffee. The app has two views: one
    is a view that lists all types of coffee, and the other is a detailed view for
    a single type of coffee.


    When working on such a project, we can’t aim to complete it in one go. This is
    both unrealistic and will have us ending up with poorly written code. The key
    here is granularity, where we break up our project into smaller chunks of logic
    and finish them one by one. TDD helps us to think in a granular manner. Since
    we need to always start with one failing test, which is basically a single requirement,
    in this case this requirement is our small chunk. And by applying the TDD cycle,
    we finish this chunk before thinking about the next chunk.


    In order to break up our project into smaller chunks, the first step is to properly
    define and think thoroughly about all the project requirements. Then we take these
    requirements and translate them to tests. The first requirement acts as our first
    test, which kicks off the TDD cycle. We keep going through this cycle until we’ve
    fulfilled all the requirements we have defined.


    We took our first requirement—which is viewing all the types of coffee including
    a picture for each type—and we wrote a UI test for that before we even started
    thinking of how we would implement it. Normally this test failed since we hadn’t
    added any code. As mentioned many times before, TDD forces us to think clearly
    about our design and architecture. In this case we went with a popular design
    pattern called Model View Presenter (MVP), which gave us a good idea of the components
    we’d add and how they’d interact. Since we knew how we’d design our code, we then
    went down a level and added an integration test. Finally we went down another
    level and started adding unit tests, and we just looped through the TDD cycle
    until all tests passed, including integration and UI tests we added at the very
    beginning (Figure [5-21](#505360_1_En_5_Chapter.xhtml#Fig21)). Our end-to-end
    test passing was an indication that we’re done with this feature. We then took
    another requirement and did the same test-driven process all over again.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig21_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Test plan diagram used for TDD


    # 6. Modularization for the Win


    Modularization is dividing the system into a number of relatively independent
    and interchangeable modules with well-defined interfaces, such that each one contains
    everything necessary to execute the desired functionality. Each one is small enough
    and simple enough to be thoroughly understood and well tested.


    Though an extremely important design aspect, modularization typically is one of
    the first things that developers sacrifice when their code base grows. They may
    still have modules by name, but they all depend on each other and they end up
    with a **big ball of mud**. Which is a term used to describe software systems
    that lack a perceivable architecture.'
