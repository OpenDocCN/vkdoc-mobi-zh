  trans: '

    # 为何要费心进行模块化？


    从模块化的简短定义中，你或许已经觉得它是个让应用锦上添花的特性。但我们真的需要它吗？在设计应用架构时，我们有必要投入额外的精力来确保它被恰当地模块化吗？而将一个现有应用进行模块化，又是否值得我们付出更大的努力呢？


    要回答这些问题，一种方法是观察模块化应用与非模块化应用如何应对扩展的挑战。扩展是任何成功应用都会经历的过程，它基本意味着用户数量的增加、应用本身及其内部功能特性的增多、发布频率的加快，以及在大多数情况下，团队规模的扩大。


    我们来谈谈这两类应用如何处理其功能和特性的扩展。如果审视一个非模块化应用，并试图理清其组件之间如何相互依赖和通信，我们最终会得到一个依赖关系图，它可能看起来像图
    6-1 所示。这是一个示例图，但对于非模块化应用来说相当真实。这样的图可能代表着一个简单、功能单一的应用。所以，如果你已经觉得这个图很复杂，那么当我们试图扩展这个应用时，这个图几乎肯定会变成一张由节点和边构成的混乱网络。遗憾的是，应用依赖关系图的可读性差并不是我们在这种情况下唯一的问题。如果我们只担心图不好看，那完全可以不去看它。然而，我们真正的问题在于这个图所代表的东西：依赖关系。依赖关系越多，应用就变得越不可预测。


    这种不可预测性在我们开始在某处添加新功能，却在应用中一个完全不同的地方引入了一个 Bug 或导致崩溃时变得尤为明显。所以，基本上由于我们复杂且不受管理的依赖关系，当引入一个变更时，我们永远无法知道这个变更对应用的影响范围。另一方面，在模块化应用中做同样的事情则截然不同（图
    6-2）。由于代码的完全分离，实施一个变更意味着只会影响我们正在修改的那个模块。另一个需要考虑的方面是处理 Bug。在一个像图 6-2 中模块化应用那样组织有序、结构清晰的应用中追踪
    Bug，显然比在图 6-1 中那样要容易得多。可能只需阅读 Bug 的描述，我们就能识别出该查看哪个模块。然而，在非模块化应用中，调试 Bug 会繁琐得多。


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig2_HTML.png](img/505360_1_En_6_Fig2_HTML.png)


    图 6-2：模块化应用


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig1_HTML.png](img/505360_1_En_6_Fig1_HTML.png)


    图 6-1：非模块化应用


    除了应用本身的规模，管理和维护应用的团队规模也可能扩大。这会带来一些挑战；其中之一就是新成员的入职。你的代码库可读性越高，入职过程就越顺畅。试图理解一个拥有大量相互连接组件的非模块化应用的代码库可能会非常令人困惑。这就是为什么模块化应用凭借其分离的设计，可读性会强得多。在模块化应用中，找到代码中负责某个特定功能的部分，就像找到相关的模块并在其中查找一样简单，而不是在整个代码库中翻找。


    大型团队带来的另一个挑战是团队之间的协作方式。在模块化应用中，可以让多个成员同时处理不同的功能，而无需相互沟通；当然，前提是每个人都在处理不同的模块。由于变更的分离，这种在不同模块上的并行工作也几乎不会产生冲突。这显然不适用于非模块化应用，因为试图进行同样的并行工作需要付出大量额外的努力来在团队成员之间沟通变更并解决冲突。模块化还使得分配代码所有权成为可能。将模块的所有权分配给特定的团队成员或子团队要容易得多。


    模块化应用的优点（以及非模块化应用的缺点），并不仅仅适用于大型应用。这些优缺点适用于各种规模的应用。然而，应用越大，这些优缺点就越被放大。从中得出的结论是，你不需要等到应用需要扩展时才考虑模块化。即使你的应用规模很小，你也能收获很多好处。并且，随着未来你的应用规模扩大，你将为自己带来呈指数级增长的好处。

    '
- fmt: "# What Is a Module?\n\nWe’ve mentioned the word module ten times by now during\
    \ this chapter, but we still haven’t properly defined what a module actually is.\
    \ By now you probably have an idea in mind, and you’re probably not far out. But\
    \ let’s agree on a proper definition. Generally speaking, a module is a standalone\
    \ piece of code that provides specific and tightly coupled functionality.\n\n\
    While that definition makes sense, let’s take a look at a real-life example to\
    \ see what a module can actually look like. If you’ve owned an iOS device, then\
    \ you’ve definitely used the App Store before. Let’s take a close look at the\
    \ App Store iOS application (Figure 6-3) and try to divide it into modules.\n\n\
    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3  \nApp Store app\n\nWe can split the main app into five modules;\
    \ each module represents a tab inside the bottom tab bar. And we can split these\
    \ main modules into way more sub-modules. So in this case a module is a group\
    \ of features that provides a coupled functionality for the end user:\n\n1.  Today\
    \ module\n2.  Games module\n3.  Apps module\n4.  Arcade module\n5.  Search module\n\
    \nBesides main modules, we will need to separate shared code into modules to be\
    \ easily used across different modules. If we explore the app a little bit, we’ll\
    \ find that the app view in Figure 6-4 can be accessed from all our five main\
    \ modules. This means that this functionality belongs to a sub-module that the\
    \ five main modules use.\n\nIf we for some reason decide not to have this sub-module,\
    \ then we’d have to do one of two things. Either duplicate the app page functionality\
    \ in all our five main modules, which is a really bad code smell. If we do that,\
    \ then whenever we need to make a change in our app page functionality, we’ll\
    \ need to update it in five places. And this is just the tip of the iceberg when\
    \ it comes to problems with duplicating code. The other option is to implement\
    \ this common functionality in one of the five modules, the Today module, for\
    \ example, and have the other four modules depend on the Today module. This kind\
    \ of design decisions will soon lead us to a situation much like in Figure 6-1,\
    \ where we have modules with dependencies that they don’t need, and might eventually\
    \ lead to dependency cycles. So it’s always best to separate unrelated code completely.\n\
    \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4  \nApp page in App Store\n\nModules are not only made up of coupled\
    \ features, like our five main modules or the app module; we can create modules\
    \ for low-level functionalities as well, given that they are coupled together.\
    \ For the App Store, we can have a module for networking, a module for analytics,\
    \ and many more. The beauty of these low-level modules is that if they are written\
    \ well enough, they can be reused across different apps.\n\nSo if we modularize\
    \ the App Store app, it will be something like Figure 6-5.\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5  \nApp Store module map\n\nWe should always try avoiding dependency\
    \ cycles between modules, meaning we can’t have module A depending on module B\
    \ and module B depending on module A. Having such a cycle indicates a code smell,\
    \ and we should attempt to break it by refactoring.\n\n# Modularizing Your App\n\
    \nWhen working on a brand-new app from scratch, it’s always best to adopt a modularized\
    \ approach while designing it. Transforming a non-modularized app to a modularized\
    \ one is a costly process. And it’s always better to avoid a problem before it\
    \ happens. However, if you find yourself in that position, solving this problem\
    \ is not impossible. The rest of this chapter will walk you through how to tackle\
    \ such a process.\n\nWhen you find yourself with a non-modularized app and you\
    \ want to modularize it, you have one of two options: rewrite the whole app, or\
    \ refactor the app.\n\nRewriting the app is simple. You would basically throw\
    \ most of what you have and start from scratch. This is a very aggressive approach\
    \ and will require a huge and sudden investment. And due to that high level of\
    \ investment needed, it comes with high risk. The rewrite time will probably end\
    \ up being more than predicted, which could cause many problems. But as with most\
    \ things in life, when you put in high investment and accept the high risks and\
    \ all goes well, you will end up with high reward. If you go with this approach,\
    \ you will start feeling the impact right away. Another thing about rewriting\
    \ an app is that you will have to pause all work on new features until the rewrite\
    \ is done. The alternative to pausing is duplicating the effort, as you’ll have\
    \ to implement new features once in an old app and once in a new rewritten app,\
    \ which is quite expensive.\n\nThough the vigorous rewriting approach has some\
    \ perks, it has some pretty major drawbacks, and in most cases it’s unfeasible\
    \ to go that route. Luckily, we have another option, which is gradual refactoring.\
    \ Contrary to the rewriting approach, it’s a low-investment, low-risk, and low-impact\
    \ approach. It allows us to modularize our app at our own pace without blocking\
    \ the release of new features. And since the changes are of low impact, this means\
    \ that so are the risks. One drawback is the slow speed of modularization, but\
    \ that’s completely in our hands as we can speed up or slow down based on many\
    \ deciding factors.\n\nThe biggest drawback, however, is that taking this approach\
    \ requires skill and following a thought-out process. Otherwise, our refactoring\
    \ might lead to introducing regressions on our app. To avoid that, we need to\
    \ make sure, through the use of tests, that the part of code we’re refactoring\
    \ is working correctly before and after refactoring. But this is not the only\
    \ thing we’ll use tests for. It’s important to have your refactor be driven by\
    \ tests just as you would while writing new code. And it’s always recommended\
    \ to take a step-by-step approach and not take too big steps, to avoid making\
    \ breaking changes."
  raw: '## What Is a Module?


    We’ve mentioned the word module ten times by now during this chapter, but we still
    haven’t properly defined what a module actually is. By now you probably have an
    idea in mind, and you’re probably not far out. But let’s agree on a proper definition.
    Generally speaking, a module is a standalone piece of code that provides specific
    and tightly coupled functionality.


    While that definition makes sense, let’s take a look at a real-life example to
    see what a module can actually look like. If you’ve owned an iOS device, then
    you’ve definitely used the **App Store** before. Let’s take a close look at the
    App Store iOS application (Figure [6-3](#505360_1_En_6_Chapter.xhtml#Fig3)) and
    try to divide it into modules.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    App Store app


    We can split the main app into five modules; each module represents a tab inside
    the bottom tab bar. And we can split these main modules into way more sub-modules.
    So in this case a module is a group of features that provides a coupled functionality
    for the end user:


    1.  Today module


    2.  Games module


    3.  Apps module


    4.  Arcade module


    5.  Search module


    Besides main modules, we will need to separate shared code into modules to be
    easily used across different modules. If we explore the app a little bit, we’ll
    find that the app view in Figure [6-4](#505360_1_En_6_Chapter.xhtml#Fig4) can
    be accessed from all our five main modules. This means that this functionality
    belongs to a sub-module that the five main modules use.


    If we for some reason decide not to have this sub-module, then we’d have to do
    one of two things. Either duplicate the app page functionality in all our five
    main modules, which is a really bad code smell. If we do that, then whenever we
    need to make a change in our app page functionality, we’ll need to update it in
    five places. And this is just the tip of the iceberg when it comes to problems
    with duplicating code. The other option is to implement this common functionality
    in one of the five modules, the Today module, for example, and have the other
    four modules depend on the Today module. This kind of design decisions will soon
    lead us to a situation much like in Figure [6-1](#505360_1_En_6_Chapter.xhtml#Fig1),
    where we have modules with dependencies that they don’t need, and might eventually
    lead to dependency cycles. So it’s always best to separate unrelated code completely.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    App page in App Store


    Modules are not only made up of coupled features, like our five main modules or
    the app module; we can create modules for low-level functionalities as well, given
    that they are coupled together. For the App Store, we can have a module for networking,
    a module for analytics, and many more. The beauty of these low-level modules is
    that if they are written well enough, they can be reused across different apps.


    So if we modularize the App Store app, it will be something like Figure [6-5](#505360_1_En_6_Chapter.xhtml#Fig5).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    App Store module map


    We should always try avoiding dependency cycles between modules, meaning we can’t
    have module A depending on module B and module B depending on module A. Having
    such a cycle indicates a code smell, and we should attempt to break it by refactoring.


    ## Modularizing Your App


    When working on a brand-new app from scratch, it’s always best to adopt a modularized
    approach while designing it. Transforming a non-modularized app to a modularized
    one is a costly process. And it’s always better to avoid a problem before it happens.
    However, if you find yourself in that position, solving this problem is not impossible.
    The rest of this chapter will walk you through how to tackle such a process.


    When you find yourself with a non-modularized app and you want to modularize it,
    you have one of two options: rewrite the whole app, or refactor the app.


    Rewriting the app is simple. You would basically throw most of what you have and
    start from scratch. This is a very aggressive approach and will require a huge
    and sudden investment. And due to that high level of investment needed, it comes
    with high risk. The rewrite time will probably end up being more than predicted,
    which could cause many problems. But as with most things in life, when you put
    in high investment and accept the high risks and all goes well, you will end up
    with high reward. If you go with this approach, you will start feeling the impact
    right away. Another thing about rewriting an app is that you will have to pause
    all work on new features until the rewrite is done. The alternative to pausing
    is duplicating the effort, as you’ll have to implement new features once in an
    old app and once in a new rewritten app, which is quite expensive.


    Though the vigorous rewriting approach has some perks, it has some pretty major
    drawbacks, and in most cases it’s unfeasible to go that route. Luckily, we have
    another option, which is gradual refactoring. Contrary to the rewriting approach,
    it’s a low-investment, low-risk, and low-impact approach. It allows us to modularize
    our app at our own pace without blocking the release of new features. And since
    the changes are of low impact, this means that so are the risks. One drawback
    is the slow speed of modularization, but that’s completely in our hands as we
    can speed up or slow down based on many deciding factors.


    The biggest drawback, however, is that taking this approach requires skill and
    following a thought-out process. Otherwise, our refactoring might lead to introducing
    regressions on our app. To avoid that, we need to make sure, through the use of
    tests, that the part of code we’re refactoring is working correctly before and
    after refactoring. But this is not the only thing we’ll use tests for. It’s important
    to have your refactor be driven by tests just as you would while writing new code.
    And it’s always recommended to take a step-by-step approach and not take too big
    steps, to avoid making breaking changes.'
  trans: "\n# 什么是模块？\n\n在本章中，我们已经多次提到“模块”这个词，但还没有正确定义模块到底是什么。到目前为止，你可能对它已有概念，而且很可能八九不离十。但让我们先统一一个准确的定义。一般来说，模块是一段独立的代码，提供特定且高内聚的功能。\n\
    \n虽然这个定义听起来合理，但让我们通过一个实际例子来看看模块究竟长什么样。如果你用过 iOS 设备，那你肯定用过 App Store。我们来仔细看看 App\
    \ Store 的 iOS 应用（图 6-3），并尝试将它划分为多个模块。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg](img/505360_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3  \nApp Store 应用\n\n我们可以将主应用拆分为五个模块；每个模块对应底部标签栏中的一个标签。而这些主模块还可以进一步拆分为更多子模块。所以在这里，模块就是一组为最终用户提供内聚功能的功能集合：\n\
    \n1.  “今日”模块\n2.  “游戏”模块\n3.  “应用”模块\n4.  “Arcade”模块\n5.  “搜索”模块\n\n除了主模块，我们还需要将共享代码分离到模块中，以便在不同模块间轻松复用。如果我们进一步探索这个应用，会发现图\
    \ 6-4 中的应用页面可以从所有五个主模块中访问。这意味着该功能属于一个子模块，被五个主模块所共用。\n\n如果由于某些原因我们决定不保留这个子模块，那就只能采取两种做法之一。要么在所有五个主模块中重复实现应用页面的功能，这显然是一种很糟糕的代码坏味道。如果那样做，每次需要修改应用页面功能时，我们都得在五个地方进行更新。而这仅仅是代码重复问题的冰山一角。另一种选择是将这个公共功能实现在五个模块中的某一个里，比如“今日”模块，然后让其他四个模块依赖“今日”模块。这种设计决策很快就会导致图\
    \ 6-1 所示的情况——模块拥有它们并不需要的依赖关系，最终可能导致依赖循环。因此，最好的做法始终是将不相关的代码完全分离。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg](img/505360_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4  \nApp Store 中的应用页面\n\n模块并不仅仅由内聚的功能组成，比如我们的五个主模块或应用模块；只要底层功能是内聚的，我们也可以为它们创建模块。对于\
    \ App Store 来说，我们可以有一个网络模块、一个分析模块，等等。这些底层模块的美妙之处在于，如果编写得足够好，它们可以在不同的应用之间复用。\n\n\
    因此，如果我们将 App Store 应用模块化，结果将类似于图 6-5。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg](img/505360_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5  \nApp Store 模块地图\n\n我们应始终避免模块之间出现依赖循环，也就是说，不能让模块 A 依赖模块 B，同时模块 B 又依赖模块\
    \ A。出现这种循环表明存在代码坏味道，我们应该尝试通过重构来打破它。\n\n# 模块化你的应用\n\n在从头开始开发一个全新应用时，最好在设计阶段就采用模块化方法。将一个非模块化的应用转变为模块化应用，是一个成本高昂的过程。而防患于未然总是更好的选择。然而，如果你恰好处于需要重构的境地，解决这个问题也并非不可能。本章的剩余部分将指导你如何应对这一过程。\n\
    \n当你面对一个非模块化的应用并希望将其模块化时，你有两种选择：重写整个应用，或者重构应用。\n\n重写应用很简单。你基本上可以抛弃现有的绝大部分代码，从零开始。这是一种非常激进的方法，需要巨大且突然的投入。由于所需投入水平很高，因此伴随的风险也高。重写时间很可能会超出预期，从而引发许多问题。但就像生活中大多数事情一样，当你投入高成本并接受高风险，并且一切顺利时，最终也会获得高回报。如果选择这种方法，你会立即感受到效果。重写应用的另一个问题是，你必须在重写完成前暂停所有新功能的开发。暂停的替代方案是重复劳动，因为你需要在旧应用和新重写的应用中各实现一次新功能，这成本相当高。\n\
    \n尽管激进的重写方法有一些好处，但它也有相当明显的缺点，而且在大多数情况下，走这条路是行不通的。幸运的是，我们有另一种选择，那就是渐进式重构。与重写方法相反，这是一种低投入、低风险、低影响的方法。它允许我们按照自己的节奏模块化应用，同时不阻碍新功能的发布。由于变更影响很小，这也意味着风险很小。其中一个缺点是模块化速度较慢，但这完全掌握在我们手中，我们可以根据多种决定因素来加快或减慢速度。\n\
    \n然而，最大的缺点是采用这种方法需要技巧，并且要遵循一个深思熟虑的过程。否则，我们的重构可能会导致应用中出现回归问题。为了避免这种情况，我们需要通过测试来确保正在重构的代码部分在重构前后都能正常工作。但这并不是我们使用测试的唯一目的。重要的是，就像编写新代码一样，你的重构过程也要由测试驱动。并且，始终建议采用循序渐进的方法，不要迈出太大的步子，以避免引入破坏性变更。\n"
- fmt: '# Introducing Books


    **Books** is a simple app that displays the latest bestselling books (Figure [6-6](#505360_1_En_6_Chapter.xhtml#Fig6)).
    We will be working on maintaining and improving **Books** in this chapter and
    in following chapters as well. You can find this project in this chapter’s resources.
    Though it might seem simple, it will showcase many issues you may encounter while
    working on a legacy app. For us a legacy app is an app with no tests; it’s an
    app that can easily be broken by introducing simple changes. In the upcoming chapters,
    we will transform **Books** from an easy-to-break legacy app to a scalable and
    maintainable app.


    **Books** depends on making requests to the New York Times API. For the app to
    function properly you’ll need a valid API key. You can find steps on how to obtain
    one in the project’s README. Make sure to replace all instances of `"YOUR_API_KEY"`
    in the project with the actual API key. Also make sure to replace all instances
    in any future snippets you will add throughout the coming chapters.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig6_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Legacy Books app


    One challenge working with **Books** is that it does not use modern architecture.
    Instead, a lot of the business logic, network calls, and persistence logic exist
    in monolithic view controllers. For the time being, it works, as all legacy code.
    But as we interact with it more, you’ll see just how hard and risky it is to add
    new things.


    Our goal for this chapter is to convert this legacy monolithic app, which contains
    many features (Figure [6-7](#505360_1_En_6_Chapter.xhtml#Fig7)), into a modularized
    app with separated modules for each set of related features or functionalities.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig7_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Legacy app module map


    And the final result should be something like Figure [6-8](#505360_1_En_6_Chapter.xhtml#Fig8).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig8_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Modularized app module map


    ## Modularization Process


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig9_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Modularization process


    The preceding diagram (Figure [6-9](#505360_1_En_6_Chapter.xhtml#Fig9)) illustrates
    the process we will apply to modularize our project. It might look a bit complicated,
    but once we go through it step by step, you’ll get the hang of it.


    ### Initial Module Map


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig10_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Step 0


    Before we start modularizing **Books**, we will perform an exercise first. The
    goal of this exercise is to come up with a module map similar to the one we created
    for the **App Store** app (Figure [6-5](#505360_1_En_6_Chapter.xhtml#Fig5)). This
    is a one-time exercise that we’ll only perform before kicking off our modularization
    process (Figure [6-10](#505360_1_En_6_Chapter.xhtml#Fig10)). We will create this
    map without looking at our code. Instead, we’ll just start navigating our app
    with fresh eyes and try to group related features and functionalities together
    into modules. This module map will act as a guide and as a blurry goal that we’re
    actively trying to reach through our process of modularization. However, this
    module map is not binding; it only acts as an initial proposed design. While we’re
    actually in the process of modularizing the app, we might make decisions to add
    new modules or merge two modules together, and that’s totally fine.


    If we create an initial module map based on the available features and functionalities
    in **Books**, it will be something like that in Figure [6-11](#505360_1_En_6_Chapter.xhtml#Fig11).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig11_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Books module map


    ### Choose a Class as a Starting Point


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig12_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Step 1


    First thing we need to do is to pick a class to act as our starting point for
    the rest of the coming steps (Figure [6-12](#505360_1_En_6_Chapter.xhtml#Fig12)).
    This is a pretty trivial step, and there’s really no right or wrong here. However,
    one thing to take into consideration is that it’s better to try to look for classes
    with a bloated amount of responsibilities, as these tend to have higher impact
    when refactored into modules. And in legacy apps like **Books** that don’t follow
    any real design patterns, you’ll find that the best starting points are usually
    our **ViewControllers**.


    As mentioned before, the module map in Figure [6-8](#505360_1_En_6_Chapter.xhtml#Fig8)
    can help guide us during our process. It can also help us choose our starting
    point. From the module map, we’ll choose one module; in this case, we’ll choose
    the **MainView Module**. And then we’ll start looking for a starting point that
    has the most responsibilities related to that module. The best starting point
    in our case is `MainViewController`.


    ### Identify the Class’s Responsibilities


    Now that we have our starting point, we need to actually start. What we’ll do
    next is we’ll identify all the key features and functionalities that our starting
    point is responsible for (Figure [6-13](#505360_1_En_6_Chapter.xhtml#Fig13)).
    We do that by basically traversing the code of said class and understanding what
    it does. If the code is too complex and hard to understand, then we can focus
    on a few entry points to our code in order to make it easier to grasp the scope
    of responsibilities of this particular class. We need to look at all public functions,
    at all functions triggered when the object is created (`init`), and at all functions
    triggered either by user interactions (taps, gestures, view lifecycle events,
    etc.) or something else (notifications, KVO, etc.).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig13_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Step 2


    If you take a deep dive into what the code inside `MainViewController` does, you’ll
    find out it can be simply represented by the diagram in Figure [6-14](#505360_1_En_6_Chapter.xhtml#Fig14).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig14_HTML.png](images/505360_1_En_6_Chapter/505360_1_En_6_Fig14_HTML.png)


    Figure 6-14


    `MainViewController` responsibilities diagram


    Let’s formally define the key responsibilities of `MainViewController`:


    1. Fetch latest books on startup.

    2. Display each book in a separate cell.

    3. Fetch latest books when the table is pulled down.

    4. User can filter the books.

    5. User can view a specific book’s details.

    6. User can view their favorites.


    ### Refactor Responsibilities


    Now that we’ve identified the responsibilities of our class, it’s time to start
    refactoring. For each responsibility, we’re going to do the following steps:


    1. Add verification tests.

    2. Refactor related code.

    3. Rerun verification tests.'
  raw: '## Introducing Books


    **Books** is a simple app that displays the latest bestselling books (Figure [6-6](#505360_1_En_6_Chapter.xhtml#Fig6)).
    We will be working on maintaining and improving **Books** in this chapter and
    in following chapters as well. You can find this project in this chapter’s resources.
    Though it might seem simple, it will showcase many issues you may encounter while
    working on a legacy app. For us a legacy app is an app with no tests; it’s an
    app that can easily be broken by introducing simple changes. In the upcoming chapters,
    we will transform **Books** from an easy-to-break legacy app to a scalable and
    maintainable app.


    Books depends on making requests to the New York Times API. For the app to function
    properly you’ll need a valid API key. You can find steps on how to obtain one
    in the project’s README. Make sure to replace all instances of `"YOUR_API_KEY"`
    in the project with the actual API key. Also make sure to replace all instances
    in any future snippets you will add throughout the coming chapters.


