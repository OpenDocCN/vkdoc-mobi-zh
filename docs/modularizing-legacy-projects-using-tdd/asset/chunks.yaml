    ## Acknowledgments


    We would like to thank the many people who helped us write this book. We are very
    grateful to Vishwesh Shrimali—his constant and thorough feedback was integral
    in making this book. We would also like to thank Moataz Soliman, Ahmed AbouElhamayed,
    Mahmoud Othman, Aprille Muscara, and Anwar El-Wakil—without their feedback, this
    book would’ve been in a much worse state. We also thank Aaron Black, for believing
    in this project from day one. And, finally, we especially thank our editor, Jessica
    Vakili, who was extremely supportive throughout the whole process of writing this
    book.


    # 1. TDD Basics


    A developer is a craftsman, a skilled individual driven by passion. Most developers
    enjoy what they do for a living, to the extent that a lot of developers choose
    coding as their secondary hobby in their free time. They are proud of what they
    develop and set high quality standards for their work. Nothing feels better than
    releasing new code that works well and meets users’ expectations. The user here
    could be the customer or the developer who developed the code themselves. This
    is important to realize. This sets the intention of the developer as someone who
    wants to produce high-quality results.


    It is no secret that everyone out there including you wants their software projects
    to be of the highest quality. Yet achieving such a standard isn’t particularly
    easy, and maintaining it can be even harder. Let’s say you have worked on an MVP
    (Minimal Viable Product) and it got released. In most cases this is not the end
    of the story. You’ll probably keep on adding features to it. At some point you’ll
    even realize you need to rewrite a big part of your code or swipe out a dependency
    for another. These constant changes will eventually compromise your project’s
    quality. Even bug fixes can make a dent at your quality. It’s very common to fix
    one bug and have it cause another more serious bug someplace else. So how can
    we reach a high quality standard and maintain it? We need to have constant feedback
    that tells us if our changes introduce any issues. And how can we get such feedback?
    The answer is simple: testing.


    ## Types of Testing


    There is more than one type of testing you can utilize to address these problems.
    The first solution we will discuss is manual testing. Manual testing is a type
    of testing in which test cases are executed manually either by a tester or directly
    by the developer. Manual testing in many cases is considered to be an imperative
    part of the software cycle. Good testers often have a knack of thinking of highly
    irregular scenarios, which ultimately leads to identifying hidden bugs.


    Humans are amazing creatures. However, for a system of any size, solely depending
    on manual testing is highly impractical for a variety of reasons. Due to the limited
    speed of humans, depending on manual testing will ultimately slow down the release
    process as well as hinder the ability to scale your system. Also, no matter how
    good a tester is, they are still susceptible to human errors. Switching out the
    number “0” with the letter “O,” for example, in some contexts can be the sign
    of a major bug, but many humans might miss this. And last but certainly not least,
    if you depend only on manual testing, your testing budget will cost you an arm
    and a leg.


    Since we can’t solely depend on manual testing, we need to introduce automated
    testing into our process. Automated tests address all the problems with manual
    testing. It’s fast; a machine can run a test in milliseconds. It’s accurate; a
    machine will not make humanlike mistakes, unless the human who wrote the test
    makes a mistake. It’s inexpensive in the long run. Only the creation of tests
    is expensive, but running tests after that costs close to nothing. Generally,
    a combination of manual and automated testing yields the best results. But in
    many cases, where the project is small enough, we can actually depend solely on
    automated testing.'
