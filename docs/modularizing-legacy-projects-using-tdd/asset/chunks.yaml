    // Then

    let failureMessage = booksTableView.staticTexts["Failed to fetch best seller books"]

    _ = failureMessage.waitForExistence(timeout:10)

    }

    ```


    Here we stub our request as we used to do, but now we return a failed response.
    Then we assert that the error message is displayed.'
