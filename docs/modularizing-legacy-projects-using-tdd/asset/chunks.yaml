- fmt: "# Summary\n\nIn this chapter, we talked about the concept of modularization,\
    \ which is the idea of breaking up a system into multiple modules that are relatively\
    \ independent and interchangeable. Generally, a module is a standalone piece of\
    \ code that provides specific and tightly coupled functionality. When we ignore\
    \ modularization completely, we tend to end up with a messy architecture, which\
    \ is commonly referred to as a big ball of mud architecture.\n\nHaving a modularized\
    \ app has many benefits over non-modularized apps. Non-modularized apps tend to\
    \ be unpredictable whenever change is introduced into the project. This is due\
    \ to interconnected dependencies between components. On the other hand, in a modularized\
    \ app, when we’re introducing a change in a module, we are certain that we will\
    \ only affect this module. This is thanks to the strong separation in our code.\
    \ This code separation provides another very important benefit, which is code\
    \ readability. We’ve mentioned before that developers spend more time reading\
    \ code than writing it, and having a modularized app makes it much easier to read\
    \ and understand how it works. In a properly modularized app, one developer can\
    \ actively work on a module without understanding or touching other modules in\
    \ the app.\n\nGiven these many benefits, it’s probably best to take a modularized\
    \ approach when working on a new app from scratch. However, if we have a legacy\
    \ app that’s not modularized, we can still transform it. There are two ways we\
    \ can do that: First, we can rewrite our whole app. Rewriting as a concept is\
    \ pretty straightforward; we basically throw all what we have and start with a\
    \ clean (modularized) slate. However, this approach is pretty aggressive and requires\
    \ a huge investment in a short time. The other approach is refactoring, which\
    \ is a more granular approach where we modularize our app one step at a time.\
    \ This approach is much slower, but it allows us to continue working on our app\
    \ and add features while we actively transform it at the same time.\n\nModularizing\
    \ an app through gradual refactoring is not an easy task. However, there’s a systematic\
    \ process (Figure 6-26) that we can follow. First, we create a projection of what\
    \ our app would look like internally if we would divide it into modules to give\
    \ us an idea of our end goal. After that we pick a class as a starting point and\
    \ list down this class’s responsibilities. Then for each responsibility we write\
    \ a verification test to make sure that our following changes will not introduce\
    \ any regressions. Then we proceed with refactoring this responsibility if needed.\
    \ We could move it to a different class or even a different module or even create\
    \ a whole new module for it. Once we refactor all responsibilities for that class,\
    \ we would just loop over our process again by choosing a new starting point.\
    \ And we’ll keep going through that loop until we run out of starting points.\
    \ When we reach this point, this means that we no longer have un-modularized code.\n\
    \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg)\n\
    \nFigure 6-26  \nModularization process\n\n# Dependency Injection and Mocks\n\n\
    Writing tests for a component can be a tedious task if this component depends\
    \ on another component that has an unpredictable behavior. To test such a component,\
    \ we need to be able to control this unpredictable behavior. We can do that with\
    \ the help of a test double. The term test double was first introduced in Gerard\
    \ Meszaros’s book *XUnit Test Patterns*. Test double is a generic term for any\
    \ kind of pretend object used in place of a real object for testing purposes.\
    \ Another situation in which it can be challenging to write tests is if we have\
    \ a component that communicates with another component and we want to verify something\
    \ related to this interaction. In this case, a test double is also the best course\
    \ of action. Test doubles are an imperative tool in any programmer’s arsenal.\
    \ And using them is essential for having an application that’s highly covered\
    \ with tests and makes our tests more stable.\n\n## Stubbing\n\nOne type of test\
    \ doubles is stubs. A stub is an object that holds predefined data and provides\
    \ these data during tests. It is used when we don’t want to use real data and\
    \ to have a more consistent data source. A test doesn’t really care if the function\
    \ is called or not on a stub, as long as the test object (or system under test)\
    \ gets the data it needs from the stub and does the right thing. And if the stub\
    \ is passed a value, the test doesn’t care about that value. Also, regardless\
    \ of the input, the stub always outputs the same predefined data. Due to its nature,\
    \ a stub is considered a fairly lightweight test double.\n\nAn example of when\
    \ we need stubs is when we have an object that depends on making a network call\
    \ to a server. Making an actual network request will lead to our test being both\
    \ slow and unpredictable as we can’t control what the server will return each\
    \ time.\n\nLet’s say that we have an object A that has a Boolean variable `status`\
    \ whose value depends on the data returned from the server. So if the server returns\
    \ success, then `status` will be `true`; and if the server returns failure, then\
    \ `status` will be `false` (Figure 7-1). To be able to test both these scenarios\
    \ with confidence, we will need to use a stub.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1  \nDependency example\n\nWe will create a new object called `ServerStub`,\
    \ and we will use it in place of the real `Server` object as seen in Figure 7-2.\
    \ Our stub has two methods to control the kind of data it should return. We will\
    \ use these methods to set up our tests.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2  \nStubbing a dependency\n\nWhen we write tests for our two scenarios,\
    \ they will look like this:\n\n```\nfunc testObjectASuccessStatus() {\n// Given\n\
    let server = ServerStub()\nserver.returnSuccess()\n// When\nlet objectA = ObjectA(server)\n\
    // Then\nXCTAssertTrue(objectA.status)\n}\nfunc testObjectAFailureStatus() {\n\
    // Given\nlet server = ServerStub()\nserver.returnFailure()\n// When\nlet objectA\
    \ = ObjectA(server)\n// Then\nXCTAssertFalse(objectA.status)\n}\n```\n\nIn each\
    \ test we create an instance of our stub and then set it up using either `returnSuccess()`\
    \ or `returnFailure()`. Then we pass the stub to our test object and do our assertion\
    \ on `status`. We will talk about injecting stubs into our test objects later\
    \ on in this chapter."
  raw: '## Summary


    In this chapter, we talked about the concept of modularization, which is the idea
    of breaking up a system into multiple modules that are relatively independent
    and interchangeable. Generally, a module is a standalone piece of code that provides
    specific and tightly coupled functionality. When we ignore modularization completely,
    we tend to end up with a messy architecture, which is commonly referred to as
    a **big ball of mud** architecture.


    Having a modularized app has many benefits over non-modularized apps. Non-modularized
    apps tend to be unpredictable whenever change is introduced into the project.
    This is due to interconnected dependencies between components. On the other hand,
    in a modularized app, when we’re introducing a change in a module, we are certain
    that we will only affect this module. This is thanks to the strong separation
    in our code. This code separation provides another very important benefit, which
    is code readability. We’ve mentioned before that developers spend more time reading
    code than writing it, and having a modularized app makes it much easier to read
    and understand how it works. In a properly modularized app, one developer can
    actively work on a module without understanding or touching other modules in the
    app.


    Given these many benefits, it’s probably best to take a modularized approach when
    working on a new app from scratch. However, if we have a legacy app that’s not
    modularized, we can still transform it. There are two ways we can do that: First,
    we can rewrite our whole app. Rewriting as a concept is pretty straightforward;
    we basically throw all what we have and start with a clean (modularized) slate.
    However, this approach is pretty aggressive and requires a huge investment in
    a short time. The other approach is refactoring, which is a more granular approach
    where we modularize our app one step at a time. This approach is much slower,
    but it allows us to continue working on our app and add features while we actively
    transform it at the same time.


    Modularizing an app through gradual refactoring is not an easy task. However,
    there’s a systematic process (Figure [6-26](#505360_1_En_6_Chapter.xhtml#Fig26))
    that we can follow. First, we create a projection of what our app would look like
    internally if we would divide it into modules to give us an idea of our end goal.
    After that we pick a class as a starting point and list down this class’s responsibilities.
    Then for each responsibility we write a verification test to make sure that our
    following changes will not introduce any regressions. Then we proceed with refactoring
    this responsibility if needed. We could move it to a different class or even a
    different module or even create a whole new module for it. Once we refactor all
    responsibilities for that class, we would just loop over our process again by
    choosing a new starting point. And we’ll keep going through that loop until we
    run out of starting points. When we reach this point, this means that we no longer
    have un-modularized code.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg)


    Figure 6-26


    Modularization process


    # 7. Dependency Injection and Mocks


    Writing tests for a component can be a tedious task if this component depends
    on another component that has an unpredictable behavior. To test such a component,
    we need to be able to control this unpredictable behavior. We can do that with
    the help of a **test double**. The term test double was first introduced in Gerard
    Meszaros’s book *XUnit Test Patterns*. Test double is a generic term for any kind
    of pretend object used in place of a real object for testing purposes. Another
    situation in which it can be challenging to write tests is if we have a component
    that communicates with another component and we want to verify something related
    to this interaction. In this case, a test double is also the best course of action.
    Test doubles are an imperative tool in any programmer’s arsenal. And using them
    is essential for having an application that’s highly covered with tests and makes
    our tests more stable.


    ## Stubbing


    One type of test doubles is stubs. A **stub** is an object that holds predefined
    data and provides these data during tests. It is used when we don’t want to use
    real data and to have a more consistent data source. A test doesn’t really care
    if the function is called or not on a stub, as long as the test object (or system
    under test) gets the data it needs from the stub and does the right thing. And
    if the stub is passed a value, the test doesn’t care about that value. Also, regardless
    of the input, the stub always outputs the same predefined data. Due to its nature,
    a stub is considered a fairly lightweight test double.


    An example of when we need stubs is when we have an object that depends on making
    a network call to a server. Making an actual network request will lead to our
    test being both slow and unpredictable as we can’t control what the server will
    return each time.


    Let’s say that we have an object A that has a Boolean variable `status` whose
    value depends on the data returned from the server. So if the server returns success,
    then `status` will be `true;` and if the server returns failure, then `status`
    will be `false` (Figure [7-1](#505360_1_En_7_Chapter.xhtml#Fig1)). To be able
    to test both these scenarios with confidence, we will need to use a stub.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Dependency example


    We will create a new object called `ServerStub,` and we will use it in place of
    the real `Server` object as seen in Figure [7-2](#505360_1_En_7_Chapter.xhtml#Fig2).
    Our stub has two methods to control the kind of data it should return. We will
    use these methods to set up our tests.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Stubbing a dependency


    When we write tests for our two scenarios, they will look like this:


    ```

    func testObjectASuccessStatus() {

    // Given

    let server = ServerStub()

    server.returnSuccess()

    // When

    let objectA = ObjectA(server)

    // Then

    XCTAssertTrue(objectA.status)

    }

    func testObjectAFailureStatus() {

    // Given

    let server = ServerStub()

    server.returnFailure()

    // When

    let objectA = ObjectA(server)

    // Then

    XCTAssertFalse(objectA.status)

    }

    ```


    In each test we create an instance of our stub and then set it up using either
    `returnSuccess()` or `returnFailure()` . Then we pass the stub to our test object
    and do our assertion on `status`. We will talk about injecting stubs into our
    test objects later on in this chapter .'
  trans: "\n# 总结\n\n本章我们讨论了模块化的概念，即把系统拆分为多个相对独立且可互换的模块。通常而言，模块是一段独立的代码，提供特定且紧密耦合的功能。如果我们完全忽略模块化，最终往往会得到混乱的架构，通常被称为“大泥球”架构。\n\
    \n模块化应用相比非模块化应用有许多优势。非模块化应用在引入变更时往往不可预测，这是由于组件之间存在相互依赖关系。另一方面，在模块化应用中，当我们对某个模块引入变更时，可以确信只会影响该模块本身。这得益于代码之间强分离性。这种代码分离还带来了另一个非常重要的好处：代码可读性。我们之前提到过，开发人员花在阅读代码上的时间比编写代码的时间更多，而模块化应用使得阅读和理解其工作原理变得更加容易。在一个恰当模块化的应用中，一个开发者可以专注于一个模块进行开发，而无需理解或触碰应用中的其他模块。\n\
    \n鉴于这些诸多好处，在从零开始开发新应用时，最好采用模块化方法。然而，如果有一个未模块化的遗留应用，我们仍然可以对其进行改造。有两种方式可以实现：第一，重写整个应用。重写这个概念相当直接；我们基本上抛弃所有现有代码，从一个干净的（模块化）起点开始。不过，这种方法相当激进，需要在短时间内投入巨大资源。另一种方法是重构，这是一种更渐进的方式，我们逐步将应用模块化。这种方法速度慢得多，但它允许我们在积极改造应用的同时，继续在应用上工作并添加新功能。\n\
    \n通过逐步重构来模块化应用并非易事。不过，有一个系统性的流程（图 6-26）可供遵循。首先，我们创建一个关于如果我们将应用划分为模块，其内部结构会是什么样的投影，以便让我们对最终目标有个概念。之后，我们选择一个类作为起点，并列出该类的职责。然后针对每个职责编写一个验证测试，以确保我们接下来的改动不会引入回归问题。接着，如果需要，我们就对这个职责进行重构。我们可能将其移动到另一个类，甚至另一个模块，或者为其创建一个全新的模块。一旦我们重构完该类的所有职责，我们只需再次选择一个新的起点，重复我们的流程。我们将持续循环这个过程，直到没有更多起点可选用。当达到这个阶段时，就意味着我们不再有未模块化的代码了。\n\
    \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg](img/505360_1_En_6_Fig26_HTML.jpg)\n\
    \n图 6-26  \n模块化流程\n\n# 依赖注入与模拟对象\n\n如果一个组件依赖于另一个行为不可预测的组件，那么为该组件编写测试可能是一项繁琐的任务。为了测试这样的组件，我们需要能够控制这种不可预测的行为。我们可以借助测试替身（test\
    \ double）来实现这一点。术语“测试替身”最早由 Gerard Meszaros 在其著作 *XUnit Test Patterns* 中提出。测试替身是一个通用术语，指代用于替代真实对象以进行测试的任何类型的伪装对象。另一种难以编写测试的情况是，如果我们有一个组件与另一个组件通信，并且我们希望验证与此交互相关的某些事情。在这种情况下，使用测试替身也是最佳方案。测试替身是任何程序员武器库中不可或缺的工具。使用它们对于实现应用的高测试覆盖率以及使测试更稳定至关重要。\n\
    \n## 桩（Stubbing）\n\n测试替身的一种类型是桩（stub）。桩是一个持有预定义数据并在测试期间提供这些数据的对象。当我们不想使用真实数据并希望拥有更一致的数据源时，就会用到它。测试实际上并不关心桩上的函数是否被调用，只要测试对象（或被测系统）能从桩中获取所需数据并执行正确操作即可。并且，如果向桩传递了一个值，测试也不关心该值。此外，无论输入是什么，桩始终输出相同的预定义数据。由于其特性，桩被认为是一种相当轻量级的测试替身。\n\
    \n一个需要使用桩的例子是，当我们有一个对象依赖于向服务器发起网络调用时。发起真实的网络请求会导致我们的测试既缓慢又不可预测，因为我们无法控制服务器每次返回什么数据。\n\
    \n假设我们有一个对象 A，它有一个布尔类型变量 `status`，其值取决于服务器返回的数据。因此，如果服务器返回成功，那么 `status` 将为 `true`；如果服务器返回失败，那么\
    \ `status` 将为 `false`（图 7-1）。为了能够确信地测试这两种场景，我们需要使用桩。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg](img/505360_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1  \n依赖示例\n\n我们将创建一个名为 `ServerStub` 的新对象，并用它来替代真实的 `Server` 对象，如图 7-2 所示。我们的桩有两个方法，用于控制它应返回何种数据。我们将使用这些方法来设置我们的测试。\n\
    \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg](img/505360_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2  \n对依赖进行打桩\n\n当我们为两种场景编写测试时，代码会像这样：\n\n```\nfunc testObjectASuccessStatus()\
    \ {\n// Given\nlet server = ServerStub()\nserver.returnSuccess()\n// When\nlet\
    \ objectA = ObjectA(server)\n// Then\nXCTAssertTrue(objectA.status)\n}\nfunc testObjectAFailureStatus()\
    \ {\n// Given\nlet server = ServerStub()\nserver.returnFailure()\n// When\nlet\
    \ objectA = ObjectA(server)\n// Then\nXCTAssertFalse(objectA.status)\n}\n```\n\
    \n在每个测试中，我们创建一个桩的实例，然后使用 `returnSuccess()` 或 `returnFailure()` 对其进行设置。接着，我们将桩传递给测试对象，并对\
    \ `status` 进行断言。我们将在本章后面讨论如何将桩注入到测试对象中。\n"
- fmt: "# Mocking\n\nAnother type of test doubles is mocks. A mock is slightly more\
    \ complex than a stub. It could return some fake data just like a stub and can\
    \ also verify whether a particular method was called. Mocks register calls they\
    \ receive, and in our tests, we can verify that all expected actions were performed\
    \ on a specific mock. We use mocks when we don’t want to invoke production code\
    \ or when there is no easy way to verify that intended code was executed.\n\n\
    Let’s say we have three objects: objects `A`, `B`, and `C`. Object `A` has a method\
    \ that takes an input, and based on that input, it decides to either call object\
    \ `B` or object `C` (Figure [7-3](#505360_1_En_7_Chapter.xhtml#Fig3)). If we pass\
    \ `true` to our test object, it should call object `B`, and if we pass it `false`,\
    \ it should call object `C`. To be able to verify both these scenarios, we will\
    \ need to use a mock.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3 Dependency example\n\nWe create two new objects that will act as\
    \ our mocks (Figure [7-4](#505360_1_En_7_Chapter.xhtml#Fig4)). `ObjectBMock` and\
    \ `ObjectCMock` will both do the same simple task, which is register if they are\
    \ called and save this info in the public property `isCalled`.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4 Mocking dependencies\n\nNow we can write our tests like this:\n\n\
    ```\nfunc testObjectALogic1 () {\n    // Given\n    let objectB = ObjectBMock()\n\
    \    let objectC = ObjectCMock()\n    let objectA = ObjectA(objectB, objectC)\n\
    \    // When\n    objectA.doLogic(true)\n    // Then\n    XCTAssertTrue(objectB.isCalled)\n\
    \    XCTAssertFalse(objectC.isCalled)\n}\nfunc testObjectALogic2 () {\n    //\
    \ Given\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n  \
    \  let objectA = ObjectA(objectB, objectC)\n    // When\n    objectA.doLogic(false)\n\
    \    // Then\n    XCTAssertFalse(objectB.isCalled)\n    XCTAssertTrue(objectC.isCalled)\n\
    }\n```\n\nAs well as registering if they are called, mocks can also register the\
    \ values they are passed with each call. And in our tests, we can verify that\
    \ the values passed to our mocks are correct.\n\nSo, for our example, we can modify\
    \ our two mocks to save the values they are passed. And then we can modify our\
    \ tests to be like this:\n\n```\nfunc testObjectALogic1 () {\n    // Given\n \
    \   let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n    let objectA\
    \ = ObjectA(objectB, objectC)\n    // When\n    objectA.doLogic(true)\n    //\
    \ Then\n    XCTAssertTrue(objectB.isCalled)\n    XCTAssertEqual(objectB.value,\
    \ \"Test\")\n    XCTAssertFalse(objectC.isCalled)\n}\nfunc testObjectALogic2 ()\
    \ {\n    // Given\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n\
    \    let objectA = ObjectA(objectB, objectC)\n    // When\n    objectA.doLogic(false)\n\
    \    // Then\n    XCTAssertFalse(objectB.isCalled)\n    XCTAssertTrue(objectC.isCalled)\n\
    \    XCTAssertEqual(objectC.value, \"Test\")\n}\n```\n\n## Test Doubles Creation\n\
    \nWe talked about different types of test doubles: mocks and stubs. But we did\
    \ not talk about how we can create them. Doubles by their definition are objects\
    \ that can be used in place of real objects. So a double has to be somewhat related\
    \ to the original object so that we can seamlessly swap in our double in our tests.\
    \ There are multiple ways of creating doubles. In this chapter, we’ll talk about\
    \ creation using inheritance and creation using protocols.\n\n### Creation Using\
    \ Inheritance\n\nWe used this approach a lot in the previous chapters. The inheritance\
    \ concept in general is a mechanism where you can derive a class from another\
    \ class. It is one of the core concepts of Object-Oriented Programming (OOP).\
    \ When we inherit from a class, we inherit all characteristics of the parent class.\
    \ And this is the essence of this approach. We inherit all properties and functions\
    \ of the object to be mocked or stubbed, and we change the behavior of the part\
    \ we want to mock or stub through overriding (Figure [7-5](#505360_1_En_7_Chapter.xhtml#Fig5)).\
    \ The good thing about this approach is that we have access to the original implementation,\
    \ so we can either change the implementation or if needed we can just extend it,\
    \ keeping the old logic as it is and just adding new logic that’s specific to\
    \ testing.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5 Creation by inheritance\n\nIf you recall, we used this approach in\
    \ Chapter [6](#505360_1_En_6_Chapter.xhtml) when we were writing tests for `MainViewModel`.\
    \ `MainViewModel` depended on `NetworkLayer`, so we created `NetworkLayerStub`\
    \ using inheritance. And it looked like this:\n\n```\nclass NetworkLayerStub:\
    \ NetworkLayer {\n    var stubbedData:Data?\n    init(stubbedData:Data) {\n  \
    \      self.stubbedData = stubbedData\n    }\n    public override func executeNetworkRequest(callBack:\
    \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData!\n\
    \        callBack(jsonData)\n    }\n}\n```\n\nWe inherit from `NetworkLayer`,\
    \ and we override `executeNetworkRequest` and make it return `stubbedData` instead\
    \ of actually making a network request. We set `stubbedData` from our tests as\
    \ needed.\n\n### Creation Using Protocols\n\nCreation using protocols is a bit\
    \ similar to creation using inheritance, and it goes hand in hand with Protocol-Oriented\
    \ Programming (POP). A protocol acts as a blueprint to what we expect from the\
    \ type (class, struct, or enum) that conforms to it. In the protocol-oriented\
    \ approach, we start designing our system by defining protocols. So if we need\
    \ to create a component that will be doing some logic, we will abstract this logic\
    \ to APIs and define it inside a protocol. Then we create our component by conforming\
    \ to that protocol and implementing the required functions.\n\nWe can use the\
    \ same protocol-oriented approach when creating test doubles. If we have a dependency\
    \ that we need to exchange with a double, we add a protocol describing this dependency.\
    \ Now our original object will conform to this dependency, and we can now say\
    \ that our test object depends on a component that conforms to this protocol.\
    \ In our tests, we can now add a new component that conforms to the protocol and\
    \ inject it into our test object, and this will be our test double (Figure [7-6](#505360_1_En_7_Chapter.xhtml#Fig6)).\n\
    \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6 Creation by protocol conformance\n\nLet’s try to rewrite the `MainViewModel`\
    \ example using a protocol. `MainViewModel` needs to depend on the protocol instead\
    \ of the `NetworkLayer` object. Our protocol will look like this:\n\n```\nprotocol\
    \ NetworkProtocol {\n    func executeNetworkRequest(callBack: @escaping (_ data:Data?)\
    \ -> Void)\n}\n```\n\nAnd now we will modify `MainViewModel` so that it now depends\
    \ on `NetworkProtocol` instead of `NetworkLayer`:\n\n```\nclass MainViewModel:\
    \ NSObject {\n    private var networkLayer:NetworkProtocol?\n    init(networkLayer:NetworkProtocol)\
    \ {\n        self.networkLayer = networkLayer\n    }\n    public func fetchBestSellerBooks(callBack:\
    \ @escaping (_ lists:[List]?) -> Void) {\n        self.networkLayer?.executeNetworkRequest(callBack:\
    \ { data in\n            guard let data = data else {\n                callBack(nil)\n\
    \                return\n            }\n            var response:Response?\n \
    \           do {\n                response = try JSONDecoder().decode(Response.self,\
    \ from: data)\n            } catch {\n                print(error.localizedDescription)\n\
    \            }\n            if let lists = response?.results.lists {\n       \
    \         callBack(lists)\n                return;\n            }\n          \
    \  callBack(nil)\n        })\n    }\n}\n```\n\nFinally, we will create our test\
    \ double by creating a new class that conforms to `NetworkProtocol`:\n\n```\n\
    class NetworkLayerStub: NetworkProtocol {\n    var stubbedData:Data?\n    init(stubbedData:Data)\
    \ {\n        self.stubbedData = stubbedData\n    }\n    func executeNetworkRequest(callBack:\
    \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData!\n\
    \        callBack(jsonData)\n    }\n}\n```"
  raw: '## Mocking


    Another type of test doubles is mocks . A mock is slightly more complex than a
    stub. It could return some fake data just like a stub and can also verify whether
    a particular method was called. Mocks register calls they receive, and in our
    tests, we can verify that all expected actions were performed on a specific mock.
    We use mocks when we don’t want to invoke production code or when there is no
    easy way to verify that intended code was executed.


    Let’s say we have three objects: objects A, B, and C. Object A has a method that
    takes an input, and based on that input, it decides to either call object B or
    object C (Figure [7-3](#505360_1_En_7_Chapter.xhtml#Fig3)). If we pass true to
    our test object, it should call object B, and if we pass it false, it should call
    object C. To be able to verify both these scenarios, we will need to use a mock.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Dependency example


    We create two new objects that will act as our mocks (Figure [7-4](#505360_1_En_7_Chapter.xhtml#Fig4)).
    `ObjectBMock` and `ObjectCMock` will both do the same simple task, which is register
    if they are called and save this info in the public property `isCalled`.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Mocking dependencies


    Now we can write our tests like this:


    ```

    func testObjectALogic1 () {

    // Given

    let objectB = ObjectBMock()

    let objectC = ObjectCMock()

    let objectA = ObjectA(objectB, objectC)

    // When

    objectA.doLogic(true)

    // Then

    XCTAssertTrue(objectB.isCalled)

    XCTAssertFalse(objectC.isCalled)

    }

    func testObjectALogic2 () {

    // Given

    let objectB = ObjectBMock()

    let objectC = ObjectCMock()

    let objectA = ObjectA(objectB, objectC)

    // When

    objectA.doLogic(false)

    // Then

    XCTAssertFalse(objectB.isCalled)

    XCTAssertTrue(objectC.isCalled)

    }

    ```


    As well as registering if they are called, mocks can also register the values
    they are passed with each call. And in our tests, we can verify that the values
    passed to our mocks are correct.


    So, for our example, we can modify our two mocks to save the values they are passed.
    And then we can modify our tests to be like this:


    ```

    func testObjectALogic1 () {

    // Given

    let objectB = ObjectBMock()

    let objectC = ObjectCMock()

    let objectA = ObjectA(objectB, objectC)

    // When

    objectA.doLogic(true)

    // Then

    XCTAssertTrue(objectB.isCalled)

    XCTAssertEqual(objectB.value, "Test")

    XCTAssertFalse(objectC.isCalled)

    }

    func testObjectALogic2 () {

    // Given

    let objectB = ObjectBMock()

    let objectC = ObjectCMock()

    let objectA = ObjectA(objectB, objectC)

    // When

    objectA.doLogic(false)

    // Then

    XCTAssertFalse(objectB.isCalled)

    XCTAssertTrue(objectC.isCalled)

    XCTAssertEqual(objectC.value, "Test")

    }

    ```


    ## Test Doubles Creation


    We talked about different types of test doubles: mocks and stubs. But we did not
    talk about how we can create them. Doubles by their definition are objects that
    can be used in place of real objects. So a double has to be somewhat related to
    the original object so that we can seamlessly swap in our double in our tests.
    There are multiple ways of creating doubles. In this chapter, we’ll talk about
    creation using inheritance and creation using protocols.


    ### Creation Using Inheritance


    We used this approach a lot in the previous chapters . The inheritance concept
    in general is a mechanism where you can derive a class from another class. It
    is one of the core concepts of Object-Oriented Programming (OOP). When we inherit
    from a class, we inherit all characteristics of the parent class. And this is
    the essence of this approach. We inherit all properties and functions of the object
    to be mocked or stubbed, and we change the behavior of the part we want to mock
    or stub through overriding (Figure [7-5](#505360_1_En_7_Chapter.xhtml#Fig5)).
    The good thing about this approach is that we have access to the original implementation,
    so we can either change the implementation or if needed we can just extend it,
    keeping the old logic as it is and just adding new logic that’s specific to testing.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Creation by inheritance


    If you recall, we used this approach in Chapter [6](#505360_1_En_6_Chapter.xhtml)
    when we were writing tests for `MainViewModel`. MainViewModel depended on `NetworkLayer`,
    so we created `NetworkLayerStub` using inheritance. And it looked like this :


    ```

    class NetworkLayerStub: NetworkLayer {

    var stubbedData:Data?

    init(stubbedData:Data) {

    self.stubbedData = stubbedData

    }

    public override func executeNetworkRequest(callBack: @escaping (_ data:Data?)
    -> Void){

    let jsonData = self.stubbedData!

    callBack(jsonData)

    }

    }

    ```


    We inherit from `NetworkLayer`, and we override `executeNetworkRequest` and make
    it return `stubbedData` instead of actually making a network request. We set `stubbedData`
    from our tests as needed.


    ### Creation Using Protocols


    Creation using protocols is a bit similar to creation using inheritance, and it
    goes hand in hand with Protocol-Oriented Programming (POP). A protocol acts as
    a blueprint to what we expect from the type (class, struct, or enum) that conforms
    to it. In the protocol-oriented approach, we start designing our system by defining
    protocols. So if we need to create a component that will be doing some logic,
    we will abstract this logic to APIs and define it inside a protocol. Then we create
    our component by conforming to that protocol and implementing the required functions.


    We can use the same protocol-oriented approach when creating test doubles. If
    we have a dependency that we need to exchange with a double, we add a protocol
    describing this dependency. Now our original object will conform to this dependency,
    and we can now say that our test object depends on a component that conforms to
    this protocol. In our tests, we can now add a new component that conforms to the
    protocol and inject it into our test object, and this will be our test double
    (Figure [7-6](#505360_1_En_7_Chapter.xhtml#Fig6)).


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Creation by protocol conformance


    Let’s try to rewrite the `MainViewModel` example using a protocol. `MainViewModel`
    needs to depend on the protocol instead of the NetworkLayer object. Our protocol
    will look like this:


    ```

    protocol NetworkProtocol {

    func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void)

    }

    ```


    And now we will modify `MainViewModel` so that it now depends on `NetworkProtocol`
    instead of `NetworkLayer`:


    ```

    class MainViewModel: NSObject {

    private var networkLayer:NetworkProtocol?

    init(networkLayer:NetworkProtocol) {

    self.networkLayer = networkLayer

    }

    public func fetchBestSellerBooks(callBack: @escaping (_ lists:[List]?) -> Void)
    {

    self.networkLayer?.executeNetworkRequest(callBack: { data in

    guard let data = data else {

    callBack(nil)

    return

    }

    var response:Response?

    do {

    response = try JSONDecoder().decode(Response.self, from: data)

    } catch {

    print(error.localizedDescription)

    }

    if let lists = response?.results.lists {

    callBack(lists)

    return;

    }

    callBack(nil)

    })

    }

    }

    ```


    Finally, we will create our test double by creating a new class that conforms
    to `NetworkProtocol`:


    ```

    class NetworkLayerStub: NetworkProtocol {

    var stubbedData:Data?

    init(stubbedData:Data) {

    self.stubbedData = stubbedData

    }

    func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void){

    let jsonData = self.stubbedData!

    callBack(jsonData)

    }

    }

    ```'
  trans: "\n# 模拟（Mocking）\n\n测试替身的另一种类型是模拟对象。模拟对象比存根稍复杂一些。它既可以像存根一样返回一些伪造的数据，还可以验证某个特定方法是否被调用过。模拟对象会记录它们接收到的调用，在我们的测试中，可以验证所有预期操作是否在特定的模拟对象上执行完毕。当我们不想调用生产代码，或者没有简便方法验证预期代码是否已执行时，就会使用模拟对象。\n\
    \n假设我们有三个对象：对象 `A`、`B` 和 `C`。对象 `A` 有一个方法，它接收一个输入，并根据该输入决定是调用对象 `B` 还是对象 `C`（图\
    \ 7-3）。如果我们向测试对象传入 `true`，它应该调用对象 `B`；如果传入 `false`，则应调用对象 `C`。为了能够验证这两种场景，我们需要使用模拟对象。\n\
    \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg](img/505360_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3 依赖关系示例\n\n我们创建两个新对象作为模拟对象（图 7-4）。`ObjectBMock` 和 `ObjectCMock` 都将执行同一个简单任务：如果被调用则进行记录，并将此信息保存在公共属性\
    \ `isCalled` 中。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg](img/505360_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4 模拟依赖关系\n\n现在我们可以这样编写测试：\n\n```\nfunc testObjectALogic1 () {\n    // 给定\n\
    \    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n    let objectA\
    \ = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(true)\n    // 那么\n\
    \    XCTAssertTrue(objectB.isCalled)\n    XCTAssertFalse(objectC.isCalled)\n}\n\
    func testObjectALogic2 () {\n    // 给定\n    let objectB = ObjectBMock()\n    let\
    \ objectC = ObjectCMock()\n    let objectA = ObjectA(objectB, objectC)\n    //\
    \ 当\n    objectA.doLogic(false)\n    // 那么\n    XCTAssertFalse(objectB.isCalled)\n\
    \    XCTAssertTrue(objectC.isCalled)\n}\n```\n\n除了记录是否被调用之外，模拟对象还可以记录每次调用时传入的参数值。在测试中，我们可以验证传递给模拟对象的值是否正确。\n\
    \n因此，以我们的示例为例，可以修改两个模拟对象，使其保存接收到的参数值。然后，测试可以这样修改：\n\n```\nfunc testObjectALogic1\
    \ () {\n    // 给定\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n\
    \    let objectA = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(true)\n\
    \    // 那么\n    XCTAssertTrue(objectB.isCalled)\n    XCTAssertEqual(objectB.value,\
    \ \"Test\")\n    XCTAssertFalse(objectC.isCalled)\n}\nfunc testObjectALogic2 ()\
    \ {\n    // 给定\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n\
    \    let objectA = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(false)\n\
    \    // 那么\n    XCTAssertFalse(objectB.isCalled)\n    XCTAssertTrue(objectC.isCalled)\n\
    \    XCTAssertEqual(objectC.value, \"Test\")\n}\n```\n\n## 创建测试替身\n\n我们讨论了不同类型的测试替身：模拟对象和存根。但并未讨论如何创建它们。根据定义，替身是可以替代真实对象的对象。因此，替身必须与原始对象有一定关联，以便我们能在测试中无缝替换。有多种创建替身的方式。在本章中，我们将讨论使用继承和使用协议两种创建方式。\n\
    \n### 使用继承创建\n\n在前几章中，我们大量使用了这种方法。继承机制通常是指从一个类派生出另一个类的机制。它是面向对象编程（OOP）的核心概念之一。当我们继承一个类时，就继承了父类的所有特征。这正是该方法的本质所在。我们继承待模拟或待存根对象的所有属性和函数，并通过重写（覆盖）来改变我们想要模拟或存根的部分的行为（图\
    \ 7-5）。这种方法的好处在于，我们可以访问原始实现，因此既可以改变实现，也可以在需要时仅扩展它，保留原有逻辑不变，仅添加测试特定的新逻辑。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg](img/505360_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5 通过继承创建\n\n回想一下，在第 6 章为 `MainViewModel` 编写测试时，我们就使用了这种方法。`MainViewModel`\
    \ 依赖于 `NetworkLayer`，因此我们通过继承创建了 `NetworkLayerStub`。代码如下：\n\n```\nclass NetworkLayerStub:\
    \ NetworkLayer {\n    var stubbedData:Data?\n    init(stubbedData:Data) {\n  \
    \      self.stubbedData = stubbedData\n    }\n    public override func executeNetworkRequest(callBack:\
    \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData!\n\
    \        callBack(jsonData)\n    }\n}\n```\n\n我们继承自 `NetworkLayer`，并重写了 `executeNetworkRequest`\
    \ 方法，使其返回 `stubbedData`，而不是真正发起网络请求。在测试中，我们可以根据需要设置 `stubbedData`。\n\n### 使用协议创建\n\
    \n使用协议创建与使用继承创建有些类似，并且它与面向协议编程（POP）紧密相关。协议充当了对其遵循类型（类、结构体或枚举）应具备功能的蓝图。在面向协议的方法中，我们首先通过定义协议来设计系统。因此，如果需要创建一个执行某些逻辑的组件，我们会将这些逻辑抽象为\
    \ API 并在协议中定义。然后通过遵循该协议并实现所需函数来创建组件。\n\n在创建测试替身时，我们可以使用相同的面向协议方法。如果有一个依赖项需要用替身替换，我们就添加一个描述该依赖项的协议。现在，原始对象遵循此协议，我们可以说测试对象依赖于一个遵循该协议的组件。在测试中，我们可以添加一个遵循该协议的新组件，并将其注入测试对象中，这将成为我们的测试替身（图\
    \ 7-6）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg](img/505360_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6 通过遵循协议创建\n\n让我们尝试使用协议重写 `MainViewModel` 示例。`MainViewModel` 需要依赖协议而不是 `NetworkLayer`\
    \ 对象。我们的协议将如下所示：\n\n```\nprotocol NetworkProtocol {\n    func executeNetworkRequest(callBack:\
    \ @escaping (_ data:Data?) -> Void)\n}\n```\n\n现在修改 `MainViewModel`，使其依赖 `NetworkProtocol`\
    \ 而不是 `NetworkLayer`：\n\n```\nclass MainViewModel: NSObject {\n    private var\
    \ networkLayer:NetworkProtocol?\n    init(networkLayer:NetworkProtocol) {\n  \
    \      self.networkLayer = networkLayer\n    }\n    public func fetchBestSellerBooks(callBack:\
    \ @escaping (_ lists:[List]?) -> Void) {\n        self.networkLayer?.executeNetworkRequest(callBack:\
    \ { data in\n            guard let data = data else {\n                callBack(nil)\n\
    \                return\n            }\n            var response:Response?\n \
    \           do {\n                response = try JSONDecoder().decode(Response.self,\
    \ from: data)\n            } catch {\n                print(error.localizedDescription)\n\
    \            }\n            if let lists = response?.results.lists {\n       \
    \         callBack(lists)\n                return;\n            }\n          \
    \  callBack(nil)\n        })\n    }\n}\n```\n\n最后，通过创建一个遵循 `NetworkProtocol` 的新类来创建测试替身：\n\
    \n```\nclass NetworkLayerStub: NetworkProtocol {\n    var stubbedData:Data?\n\
    \    init(stubbedData:Data) {\n        self.stubbedData = stubbedData\n    }\n\
    \    func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void){\n\
    \        let jsonData = self.stubbedData!\n        callBack(jsonData)\n    }\n\
    }\n```\n"
- fmt: "# Dependency Injection\n\nWe talked about mocks and stubs, and we talked about\
    \ how we can create these helpful test doubles. But we are still to learn how\
    \ we can inject these test doubles into our code. There are multiple ways to inject\
    \ our test dependencies. We will talk about property injection and initializer\
    \ injection.\n\nWe have the following class `Example` that we would like to write\
    \ tests for. `Example` depends on `Network.shared`, which is a singleton instance.\
    \ However, we need to mock `Network` in order to verify that our request is made:\n\
    \n```swift\nclass Example {\n    func doWork() {\n        Network.shared.makeRequest()\n\
    \    }\n}\n```\n\nSo let’s refactor our class so that we can easily inject our\
    \ mock from our tests.\n\n## Initializer Injection\n\nWe used this approach a\
    \ lot in the previous chapters. In this approach our entry for injecting a dependency\
    \ is our initializer. We pass the dependency to our object whenever we create\
    \ a new instance. We save a reference to this dependency in our object, and we\
    \ use that reference whenever we need to access our dependency. So in tests, when\
    \ we’re creating an instance of our object, we simply pass our test double in\
    \ the initializer instead of the real thing (Figure 7-7).\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig7_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig7_HTML.jpg)\n\
    \n*Figure 7-7 — Initializer injection*\n\nWhen in our code we always pass the\
    \ same dependency to our object and only need to pass something different in tests,\
    \ then it’s a good idea to use default arguments in Swift. Here we tell our initializer\
    \ that the default for the dependency is this object, but we can override it when\
    \ we need. This is useful as it makes our code neater and more readable.\n\nWhen\
    \ we refactor our class, it should look like this:\n\n```swift\nclass Example\
    \ {\n    private var network: Network?\n    \n    init(network: Network = Network.shared)\
    \ {\n        self.network = network\n    }\n    \n    func doWork() {\n      \
    \  self.network?.makeRequest()\n    }\n}\n```\n\nAnd to inject a test double,\
    \ now we can simply do this:\n\n```swift\nlet networkMock = NetworkMock()\nlet\
    \ testObject = Example(network: networkMock)\n```\n\n## Property Injection\n\n\
    Injection using a property is the easiest way to inject, but it will not be applicable\
    \ in most of the cases. Let’s imagine that we have object A that uses object B\
    \ to perform a specific task. If object A has a public property that holds object\
    \ B, then we can use this to inject our mock in place of the original object B\
    \ inside our tests (Figure 7-8). But we need to be careful not to expose properties\
    \ only for tests as this will break the abstraction of our objects and it will\
    \ lead to a lot of code smells.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig8_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig8_HTML.jpg)\n\
    \n*Figure 7-8 — Property injection*\n\nWhen we refactor our class to use property\
    \ injection, it should look like this:\n\n```swift\nclass Example {\n    public\
    \ var network: Network?\n    \n    init() {\n        self.network = Network.shared\n\
    \    }\n    \n    func doWork() {\n        self.network?.makeRequest()\n    }\n\
    }\n```\n\nAnd to inject a test double, now we can simply do this:\n\n```swift\n\
    let networkMock = NetworkMock()\nlet testObject = Example()\ntestObject.network\
    \ = networkMock\n```\n\n# Stubbing the Network in UI Tests\n\nAll previous approaches\
    \ can be implemented inside unit and integration tests. It’s not recommended to\
    \ use these approaches inside UI tests because UI tests should test your app as\
    \ a black box exactly like what your customer will use. It does not make sense\
    \ to test a mock object inside an end-to-end test and not the actual code. However,\
    \ in some cases, we’ll need to stub a certain behavior, and we can do that with\
    \ a higher level of stubbing.\n\nFirst, let’s open up the starter project from\
    \ this chapter’s resources. This is a version of **Books**, the app we’ve worked\
    \ on in the previous chapter. Let’s take a look at the end-to-end test implemented\
    \ in Chapter 6, step 3.2:\n\n```swift\nfunc testShowingBestSellerBooks() throws\
    \ {\n    // Given\n    let app = XCUIApplication()\n    app.launch()\n    \n \
    \   // When\n    let booksTableView = app.tables\n    let cells = booksTableView.cells\n\
    \    _ = cells.firstMatch.waitForExistence(timeout: 1.0)\n    \n    // Then\n\
    \    XCTAssertGreaterThan(cells.count, 0)\n}\n```\n\nThis test is not useful at\
    \ all. First, it’s depending on the network request so it’s slow, and we are not\
    \ asserting on the data shown inside the table. The app may show the wrong data,\
    \ and the test will pass.\n\nIn order to fix this test, we are going to stub the\
    \ network request and return specific data (Figure 7-9), and the test should make\
    \ sure that the data is rendered correctly inside the app.\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig9_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig9_HTML.jpg)\n\
    \n*Figure 7-9 — Network stubbing*\n\nWe are going to use a third-party library\
    \ called **Swifter** to mock network requests. We can achieve this using different\
    \ other libraries or even manually. But for this example, we will be going with\
    \ this lightweight third-party dependency.\n\nFirst, we need to integrate Swifter.\
    \ We will use Swift Package Manager (SPM) to install the dependency (Figure 7-10).\
    \ We need to make sure to add it to the `BooksUITests` target, not the app (Figure\
    \ 7-11).\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig11_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig11_HTML.jpg)\n\
    \n*Figure 7-11 — Integrate a third party using SPM (Step 2)*\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig10_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig10_HTML.jpg)\n\
    \n*Figure 7-10 — Integrate a third party using SPM (Step 1)*\n\nNow that we have\
    \ **Swifter** installed, we need to make a minor change inside our network layer\
    \ to allow **Swifter** to stub the network requests. We need to check on the launch\
    \ argument inside `ProcessInfo`, and in case it contains `TESTING`, we need to\
    \ change the domain to localhost, change HTTPS to HTTP, and add `8080` to port:\n\
    \n```swift\nfunc getHost() -> String {\n    if ProcessInfo.processInfo.arguments.contains(\"\
    TESTING\") {\n        return \"localhost\"\n    } else {\n        return \"api.nytimes.com\"\
    \n    }\n}\n\nfunc getScheme() -> String {\n    if ProcessInfo.processInfo.arguments.contains(\"\
    TESTING\") {\n        return \"http\"\n    } else {\n        return \"https\"\n\
    \    }\n}\n\npublic func executeNetworkRequest(callBack: @escaping (_ data: Data?)\
    \ -> Void) {\n    var components = URLComponents()\n    components.scheme = getScheme()\n\
    \    components.host = getHost()\n    components.port = 8080\n    components.path\
    \ = bestSellerBooks\n    components.queryItems = [\n        URLQueryItem(name:\
    \ \"api-key\", value: API_KEY),\n        URLQueryItem(name: \"offset\", value:\
    \ \"20\")\n    ]\n    \n    guard let url = components.url else {\n        callBack(nil)\n\
    \        preconditionFailure(\"Failed to construct URL\")\n    }\n    \n    let\
    \ task = URLSession.shared.dataTask(with: url) { data, response, error in\n  \
    \      guard let data = data else {\n            callBack(nil)\n            return\n\
    \        }\n        callBack(data)\n    }\n    task.resume()\n}\n```\n\nWhat we\
    \ need to do in the setup is start the server. If the server fails to start, it\
    \ will throw an error, which will fail our test. This makes sense as the test\
    \ will be useless if our stub server is not running."
  raw: '## Dependency Injection


    We talked about mocks and stubs, and we talked about how we can create these helpful
    test doubles. But we are still to learn how we can inject these test doubles into
    our code. There are multiple ways to inject our test dependencies. We will talk
    about property injection and initializer injection.


    We have the following class `Example` that we would like to write tests for. `Example`
    depends on `Network.shared,` which is a singleton instance. However, we need to
    mock Network in order to verify that our request is made:


    ```

    class Example {

    func doWork() {

    Network.shared.makeRequest()

    }

    }

    ```


    So let’s refactor our class so that we can easily inject our mock from our tests.


    ### Initializer Injection


    We used this approach a lot in the previous chapters . In this approach our entry
    for injecting a dependency is our initializer. We pass the dependency to our object
    whenever we create a new instance. We save a reference to this dependency in our
    object, and we use that reference whenever we need to access our dependency. So
    in tests, when we’re creating an instance of our object, we simply pass our test
    double in the initializer instead of the real thing (Figure [7-7](#505360_1_En_7_Chapter.xhtml#Fig7)).


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig7_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Initializer injection


    When in our code we always pass the same dependency to our object and only need
    to pass something different in tests, then it’s a good idea to use default arguments
    in Swift. Here we tell our initializer that the default for the dependency is
    this object, but we can override it when we need. This is useful as it makes our
    code neater and more readable.


    When we refactor our class, it should look like this:


    ```

    class Example {

    private var network:Network?

    init(network:Network = Network.shared) {

    self.network = network

    }

    func doWork() {

    self.network.makeRequest()

    }

    }

    ```


    And to inject a test double , now we can simply do this:


    ```

    let networkMock = NetworkMock()

    let testObject = Example(network: networkMock)

    ```


    ### Property Injection


    Injection using a property is the easiest way to inject, but it will not be applicable
    in most of the cases. Let’s imagine that we have object A that uses object B to
    perform a specific task. If object A has a public property that holds object B,
    then we can use this to inject our mock in place of the original object B inisdee
    our tests (Figure [7-8](#505360_1_En_7_Chapter.xhtml#Fig8)). But we need to be
    careful not to expose properties only for tests as this will break the abstraction
    of our objects and it will lead to a lot of code smells.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig8_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Property injection


    When we refactor our class to use property injection, it should look like this:


    ```

    class Example {

    public var network:Network?

    init() {

    self.network = Network.shared

    }

    func doWork() {

    self.network.makeRequest()

    }

    }

    ```


    And to inject a test double, now we can simply do this:


    ```

    let networkMock = NetworkMock()

    let testObject = Example()

    testObject.network = networkMock

    ```


    ## Stubbing the Network in UI Tests


    All previous approaches can be implemented inside unit and integration tests.
    It’s not recommended to use these approaches inside UI tests because UI tests
    should test your app as a black box exactly like what your customer will use.
    It does not make sense to test a mock object inside an end-to-end test and not
    the actual code. However, in some cases, we’ll need to stub a certain behavior,
    and we can do that with a higher level of stubbing.


    First, let’s open up the starter project from this chapter’s resources. This is
    a version of **Books**, the app we’ve worked on in the previous chapter**.** Let’s
    take a look at the end-to-end test implemented in Chapter [6](#505360_1_En_6_Chapter.xhtml),
    step 3.2:


    ```

    func testShowingBestSellerBooks() throws {

    // Given

    let app = XCUIApplication()

    app.launch()

    // When

    let booksTableView = app.tables

    let cells = booksTableView.cells

    _ = cells.firstMatch.waitForExistence(timeout: 1.0)

    // Then

    XCTAssertGreaterThan(cells.count, 0)

    }

    ```


    This test is not useful at all. First, it’s depending on the network request so
    it’s slow, and we are not asserting on the data shown inside the table. The app
    may show the wrong data, and the test will pass.


    In order to fix this test, we are going to stub the network request and return
    specific data (Figure [7-9](#505360_1_En_7_Chapter.xhtml#Fig9)), and the test
    should make sure that the data is rendered correctly inside the app.


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig9_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Network stubbing


    We are going to use a third-party library called **Swifter** to mock network requests.
    We can achieve this using different other libraries or even manually. But for
    this example, we will be going with this lightweight third-party dependency.


    First, we need to integrate Swifter. We will use Swift Package Manager (SPM) to
    install the dependency (Figure [7-10](#505360_1_En_7_Chapter.xhtml#Fig10)). We
    need to make sure to add it to the BooksUITests target, not the app (Figure [7-11](#505360_1_En_7_Chapter.xhtml#Fig11)).


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig11_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Integrate a third party using SPM (Step 2)


    ![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig10_HTML.jpg](images/505360_1_En_7_Chapter/505360_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Integrate a third party using SPM (Step 1)


    Now that we have **Swifter** installed, we need to make a minor change inside
    our network layer to allow **Swifter** to stub the network requests. We need to
    check on the launch argument inside `ProcessInfo,` and in case it contains `TESTING,`
    we need to change the domain to localhost, change HTTPS to HTTP, and add `8080`
    to port:


    ```

    func getHost() -> String {

    if ProcessInfo.processInfo.arguments.contains("TESTING") {

    return "localhost"

    } else {

    return "api.nytimes.com"

    }

    }

    func getScheme() -> String {

    if ProcessInfo.processInfo.arguments.contains("TESTING") {

    return "http"

    } else {

    return "https"

    }

    }

    public func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void)
    {

    var components = URLComponents()

    components.scheme = getScheme()

    components.host = getHost()

    components.port = 8080

    components.path = bestSellerBooks

    components.queryItems = [URLQueryItem(name: "api-key", value: API_KEY), URLQueryItem(name:
    "offset", value: "20")]

    guard let url = components.url else {

    callBack(nil)

    preconditionFailure("Failed to construct URL")

    }

    let task = URLSession.shared.dataTask(with: url) {

    data, response, error in

    guard let data = data else {

    callBack(nil)

    return

    }

    callBack(data)

