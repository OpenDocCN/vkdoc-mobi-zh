  trans: '

    # 摘要


    Core Data 确实是一个强大的框架，因其功能丰富而被许多开发者使用。但如前所述，使用 Core Data 有时可能是一项繁琐的工作。这很大程度上源于两个原因。首先，许多开发者在使用
    Core Data 时并未完全理解这个框架的真正本质及其运作方式。其次，许多开发者发现为他们的 Core Data 代码编写测试颇具挑战性，这最终导致难以发现的回归问题。在本章中，我们尝试解决这两个问题。


    我们讨论了 Core Data 的真正本质以及它不是什么。Core Data 不是一个数据库。虽然它能够将数据持久化到磁盘上，但 Core Data 的功能远不止于此。本质上，Core
    Data 管理对象图，这意味着它管理着我们对象的生命周期。在内部，Core Data 依赖于多个对象才能运行，每个对象都有特定的职责。有托管对象模型（managed
    object model），它是我们对象模式（object schema）的程序化表示。另外还有托管对象上下文（managed object context），它充当一个草稿板，让我们应用想要的更改，然后我们可以选择丢弃或持久化这些更改。最后，还有持久化存储协调器（persistent
    store coordinator），它在我们的上下文和持久化存储（persistent store）之间充当中间人，而持久化存储则负责实际保存数据。这些构成了
    Core Data 栈的主要构建模块。最后还有持久化容器（persistent container），它封装了整个 Core Data 栈并简化了其创建和管理。


    接着，我们揭穿了“Core Data 不可测试”这个迷思。是的，测试 Core Data 可能具有挑战性，但一旦掌握了要领，就变得轻而易举了。我们创建了一个通用的
    Core Data 层，并在我们的应用（`Books`）中使用了它，而不是旧的 Core Data 实现。我们完全使用 TDD（测试驱动开发）完成了这一切。我们看到了在测试中使用
    SQLite 存储可能会导致测试出现问题。通过使用内存存储（in-memory store），我们成功克服了这个问题。我们还展示了如何编写与应用程序数据模型完全隔离的测试，方法是添加专门用于测试的独立数据模型，并在测试中使用这个新模型来初始化我们的
    Core Data 栈。


    # 11. 为遗留应用添加功能


    如果你还记得第 1 章的内容，我们讨论了可以在哪些不同情况下使用 TDD。基本上，TDD 可以应用于项目生命周期的任何阶段。最显而易见的选择是从项目一开始就使用
    TDD。这也是我们一直推荐的。然而，如果你最近才听说 TDD，而手头已经有一个正在进行的项目了，该怎么办？TDD 仍然适合你。TDD 可以帮助指导对旧遗留代码的重构，而且我们也可以用
    TDD 来恰当地对代码库进行模块化和解耦。在前面的章节中，我们已经大量实践了这种方法。


    在向现有的遗留代码添加新功能时，我们也可以使用 TDD。这正是本章我们将要讨论的内容。假设我们有一个遗留应用，它正在被完全重构并使用 TDD 进行模块化的进程中。但在这一过程中途，我们收到了一个新功能的需求。考虑到我们生活在一个快节奏的世界，在大多数情况下，我们很难奢侈地暂停项目所有的新进展，直到完成一次大的重构。我们需要在增强/重构遗留代码的同时，继续开发新的功能。


    那么我们该如何做到这一点呢？首先，我们需要检查新功能，确定它是与旧功能耦合的，还是一个完全不依赖任何旧代码的全新功能。如果它与旧代码耦合，那么这些旧代码是遗留代码，还是已经被重构和模块化过的？但请不要误解。我们做这个检查不是为了决定是否需要使用
    TDD。在所有情况下我们都会使用 TDD。这个检查只会影响我们任务的复杂程度。处理一个完全独立的功能会相对简单，因为我们几乎是重写代码，所以花在重构代码上的时间会较少。


    另一方面，处理一个与旧的遗留代码耦合的功能会有些挑战性，因为我们不能先重构代码再添加功能。在这些场景下，你可能会忍不住完全放弃 TDD 和测试，因为父级代码本身就没有经过测试。然而，有一条我们从
    Bob 大叔的《代码整洁之道》中学到并应始终遵循的黄金法则：“总是让代码比你发现它时更整洁。”这就是为什么我们应该尽量不要屈服于这种诱惑。


    ## 遗留代码免责声明


    我们将为 `Books` 添加一个新功能。让我们打开起始项目，它可以在本章的资源中找到。如果我们查看一下代码，会发现有两个用于书籍详情视图的视图控制器：`BookViewControllerA`
    和 `BookViewControllerB`。之所以存在这种情况，是因为我们正在进行一个 A/B 测试实验。尽管这两个视图控制器有很多共同的功能，但代码在它们之间是重复的，这在遗留代码中是意料之中的事。这是一个巨大的代码坏味道，如果有时间我们肯定应该修复它，但遗憾的是，我们没有。


    ### A/B 测试


    A/B 测试本质上是一种实验，其中向用户随机展示页面的两个或多个变体，并通过统计分析确定哪个变体在给定的转化目标上表现更佳。因此，此处进行 A/B 测试的动机是为了确定
    `BookViewController` 的哪种设计能为图书购买带来更好的转化率。


    ## 新功能


    我们想要添加的新功能是显示每本书的评论，这可以帮助我们的用户决定是否要阅读这本书（图 11-1）。


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig1_HTML.jpg](img/505360_1_En_11_Fig1_HTML.jpg)


    图 11-1


    评论线框图


    正如我们已经指出的，书籍视图有两个视图控制器：`BookViewControllerA` 和 `BookViewControllerB`。我们需要在两个视图控制器中都进行这项改动。知道这个改动是两个控制器共有的，我们可以遵循当前的实现方式，在两个控制器中都添加该改动。然而，这样做我们就没有遵循前面提到的
    Bob 大叔的规则。现在就开始实现这个功能，并看看我们如何在不重构整个代码库的情况下解决这个问题。


    ## 启动


    我们首先列出用户可能经历的场景：


    1.  当用户打开一个没有评论的书籍视图时，他们应该能够看到一个表示“暂无评论”的提示。


    2.  当用户打开一个包含评论的书籍视图时，他们应该能够看到第一条评论。


    我们将按照图 11-2 所示的方法来实现这个功能。


    ![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig2_HTML.jpg](img/505360_1_En_11_Fig2_HTML.jpg)


    图 11-2


    测试计划图


    现在我们将这些场景转化为 UI 测试。这些测试是我们的最终目标。一旦这些测试通过，我们就知道新功能已经完成 ✅。

