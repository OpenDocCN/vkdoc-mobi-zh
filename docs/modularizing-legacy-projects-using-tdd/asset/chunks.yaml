  raw: '#### Verification Tests


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Step 3.1


    Let’s start with our first responsibility, which is “Fetch latest books on startup.”
    Before we start refactoring the related code, we first need to add verification
    tests (Figure [6-15](#505360_1_En_6_Chapter.xhtml#Fig15)). Verification tests
    are high-level tests that verify that the feature or functionality that we’re
    refactoring is working fine. For user-facing features like the one we’re trying
    to refactor now, a verification can be in the form of a UI test, as that’s the
    highest level of testing we have. If the part we’re refactoring is not user-facing,
    then integration tests can be used. Verification tests are an integral part of
    our process, as they help in avoiding regressions due to our refactor.


    Let’s write a verification test for our feature:


    ```

    func testShowingBestSellerBooks() throws {

    // Given

    let app = XCUIApplication()

    app.launch()

    // When

    let booksTableView = app.tables

    let cells = booksTableView.cells

    _ = cells.firstMatch.waitForExistence(timeout: 1.0)

    // Then

    XCTAssertGreaterThan(cells.count, 0)

    }

    ```


    Our verification test simply makes sure that the list table view contains at least
    one cell. For the scope of this feature, we only care about the table view being
    populated on startup, and we don’t care about the content of the cells yet.


    The preceding test highly depends on the back end and could easily fail if the
    back-end server fails. This dependency is not optimum at all, and we’ll talk about
    how we can remove it in Chapter [8](#505360_1_En_8_Chapter.xhtml)**.** However,
    for now, this test will do as it is.


    #### Refactoring


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Step 3.2


    Now that we have our verification test, we can safely start refactoring (Figure
    [6-16](#505360_1_En_6_Chapter.xhtml#Fig16)). To refactor this feature, we need
    to ask ourselves a few questions. Is the code responsible for this feature in
    the right place, or should it be moved to a new component or even a new module?
    And after we move that code to its right place, does it need to be refactored?


    If we take a look at the code responsible for our feature, we’ll find that the
    function we need to address is `fetchBooks()` . So the first question is, is it
    in the right place? Since there is no specific design pattern or an architecture
    inside the app, we will try to apply a design pattern while refactoring. We are
    going to use MVP as we did in Chapter [5](#505360_1_En_5_Chapter.xhtml). And from
    MVP we know that view controllers should not contain any business logic and should
    only be responsible for handling the UI. Therefore, we know that we need to move
    `fetchBooks()` somewhere else, but where? We already know that it will be included
    in the **MainView Module**, but what component? For that question, we’ll try to
    understand more what `fetchBooks()` does. `fetchBooks()` makes a network request
    and parses the responses in order to extract the lists of books and then uses
    that to update the data source of the table. We will apply the **MVP** design
    pattern on the logic we want to implement as if we’ll implement it from scratch.
    We should think about how the new objects will interact with each other without
    looking at the current code in order not to be affected by the current implementation.
    By doing that, we will end up with the following design in Figure [6-17](#505360_1_En_6_Chapter.xhtml#Fig17).


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig17_HTML.png](images/505360_1_En_6_Chapter/505360_1_En_6_Fig17_HTML.png)


    Figure 6-17


    MVP design pattern


    Now it’s time to bust out our TDD skills. If you look at Figure [6-18](#505360_1_En_6_Chapter.xhtml#Fig18),
    you’ll probably remember it from Chapter [5](#505360_1_En_5_Chapter.xhtml). For
    the end-to-end test, we already have that covered by our verification test. And
    since we already know how the objects will interact with each other, we are ready
    to start writing some integration tests.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig18_HTML.jpg](images/505360_1_En_6_Chapter/505360_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Testing plan diagram


    ##### Integration Test


    Let’s create a new class called `MainViewIntegrationTests` `,` which will include
    all integration tests related to this module. It’s very useful to group the same
    types of tests together so that you have the flexibility to run a specific type
    of tests easily.


    From Figure [6-17](#505360_1_En_6_Chapter.xhtml#Fig17) we know that once `MainViewController`
    is loaded, we will initialize `MainViewPresenter`, which will take `MainViewModel`
    inside the constructor. `MainViewPresenter` will contain a method that will fetch
    all books and abstract the communication to `MainViewModel` under the hood; then,
    the model will return the books. Lastly, `MainViewPresenter` will update the view.
    Now let’s convert this to a test:


    ```

    func testFetchBestSellerBooksReturnsList() throws {

    // Given

    let testBundle = Bundle(for: type(of: self))

    let booksJSONURL = testBundle.url(forResource: "BestSellerBooksStub", withExtension:
    "json")

    let booksJSON = try Data(contentsOf: booksJSONURL!)

    let expectedLists: [List] = stubbedlists()

    var actualLists: [List] = []

    let networkLayer = NetworkLayerStub(stubbedData: booksJSON)

    let mainViewModel = MainViewModel(networkLayer: networkLayer)

    let mainViewPresenter = MainViewPresenter(mainViewModel: mainViewModel)

    // when & then

    let waitForBooks = XCTestExpectation(description: "Wait to fetch books")

    mainViewPresenter.fetchBestSellerBooks { lists in

    actualLists = lists ?? []

    waitForBooks.fulfill()

    }

    self.wait(for: [waitForBooks], timeout: 0.1)

    XCTAssertEqual(actualLists, expectedLists, "Fetched books does not match the expected")

    }

    func stubbedlists() -> [List] {

    let firstBook = BookModel(title: "THE LAST THING HE TOLD ME", contributor: "by
    Laura Dave", author: "Laura Dave", createdDate: "2021-05-26 22:10:24")

    let secondBook = BookModel(title: "SOOLEY", contributor: "by John Grisham", author:
    "John Grisham", createdDate: "2021-05-26 22:10:24")

    let firstList = List(listID: 704, listName: "Combined Print and E-Book Fiction",
    displayName: "Combined Print & E-Book Fiction", books: [firstBook,secondBook])

    return [firstList]

    }

    ```


    The test will not even build because we still haven’t added any of the components
    that it’s testing , and that’s normal.


    It makes sense to allow our network layer to stub API requests to return the expected
    JSON so that we can assert on values and prevent our tests from depending on network
    calls, which will make it flaky. We will talk more on stubbing in Chapter [7](#505360_1_En_7_Chapter.xhtml).'
  trans: "\n### 验证测试\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg](img/505360_1_En_6_Fig15_HTML.jpg)\n\
    \n**图 6-15**\n\n**步骤 3.1**\n\n我们先从第一个职责开始，即“启动时获取最新书籍”。在开始重构相关代码之前，首先需要添加验证测试（图\
    \ 6-15）。验证测试是高级别的测试，用于验证我们正在重构的特性或功能是否正常运行。对于像我们现在重构的这类面向用户的特性，验证可以采用 UI 测试的形式，因为这是我们拥有的最高级别的测试。如果重构的部分不是面向用户的，则可以使用集成测试。验证测试是我们流程中不可或缺的一部分，因为它们有助于避免因重构而导致的回归。\n\
    \n现在为我们的特性编写一个验证测试：\n\n```\nfunc testShowingBestSellerBooks() throws {\n    //\
    \ 前置条件\n    let app = XCUIApplication()\n    app.launch()\n    // 操作\n    let\
    \ booksTableView = app.tables\n    let cells = booksTableView.cells\n    _ = cells.firstMatch.waitForExistence(timeout:\
    \ 1.0)\n    // 断言\n    XCTAssertGreaterThan(cells.count, 0)\n}\n```\n\n我们的验证测试仅确保列表表格视图中至少包含一个单元格。就本特性的范围而言，我们只关心表格视图在启动时已被填充数据，暂时不关心单元格的内容。\n\
    \n上述测试高度依赖于后端，如果后端服务器发生故障，很容易失败。这种依赖性并不理想，我们将在第 8 章讨论如何移除它。不过，就目前而言，这个测试已经够用了。\n\
    \n### 重构\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg](img/505360_1_En_6_Fig16_HTML.jpg)\n\
    \n**图 6-16**\n\n**步骤 3.2**\n\n现在我们有了验证测试，就可以安全地开始重构了（图 6-16）。要重构这个特性，我们需要问自己几个问题：负责该特性的代码是否在正确的位置？还是应该将其移至新组件甚至新模块？在将代码移到正确的位置后，它是否还需要重构？\n\
    \n如果我们查看负责该特性的代码，会发现需要处理的函数是 `fetchBooks()`。那么第一个问题是，它是否在正确的位置？由于应用程序内部没有特定的设计模式或架构，我们将在重构时尝试应用一种设计模式。我们将像第\
    \ 5 章那样使用 MVP 模式。从 MVP 模式中我们知道，视图控制器不应包含任何业务逻辑，只应负责处理 UI。因此，我们知道需要将 `fetchBooks()`\
    \ 移到其他地方，但移到哪里呢？我们已经知道它会包含在 **MainView 模块**中，但具体是哪个组件？针对这个问题，我们需要进一步了解 `fetchBooks()`\
    \ 的功能。`fetchBooks()` 发起网络请求并解析响应以提取图书列表，然后用于更新表格的数据源。我们将像从头开始实现一样，对要实现的逻辑应用 **MVP**\
    \ 设计模式。我们应该考虑新对象之间将如何交互，而不要查看当前代码，以免受当前实现的影响。通过这样做，我们将得到图 6-17 中的设计。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig17_HTML.png](img/505360_1_En_6_Fig17_HTML.png)\n\
    \n**图 6-17**\n\nMVP 设计模式\n\n现在是时候发挥我们的 TDD 技能了。如果你查看图 6-18，可能会想起第 5 章的内容。对于端到端测试，我们已经通过验证测试覆盖了。既然我们已经知道对象之间将如何交互，就可以开始编写一些集成测试了。\n\
    \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig18_HTML.jpg](img/505360_1_En_6_Fig18_HTML.jpg)\n\
    \n**图 6-18**\n\n测试计划图\n\n#### 集成测试\n\n让我们创建一个名为 `MainViewIntegrationTests` 的新类，它将包含与此模块相关的所有集成测试。将相同类型的测试分组在一起非常有用，这样你就可以灵活地轻松运行特定类型的测试。\n\
    \n从图 6-17 中我们知道，一旦 `MainViewController` 被加载，我们将初始化 `MainViewPresenter`，它将在构造函数中接收\
    \ `MainViewModel`。`MainViewPresenter` 将包含一个方法，用于获取所有图书并在底层封装与 `MainViewModel`\
    \ 的通信；然后，模型将返回图书列表。最后，`MainViewPresenter` 将更新视图。现在让我们将其转换为一个测试：\n\n```\nfunc testFetchBestSellerBooksReturnsList()\
    \ throws {\n    // 前置条件\n    let testBundle = Bundle(for: type(of: self))\n  \
    \  let booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension:\
    \ \"json\")\n    let booksJSON = try Data(contentsOf: booksJSONURL!)\n    let\
    \ expectedLists: [List] = stubbedlists()\n    var actualLists: [List] = []\n \
    \   let networkLayer = NetworkLayerStub(stubbedData: booksJSON)\n    let mainViewModel\
    \ = MainViewModel(networkLayer: networkLayer)\n    let mainViewPresenter = MainViewPresenter(mainViewModel:\
    \ mainViewModel)\n    // 操作与断言\n    let waitForBooks = XCTestExpectation(description:\
    \ \"等待获取图书\")\n    mainViewPresenter.fetchBestSellerBooks { lists in\n       \
    \ actualLists = lists ?? []\n        waitForBooks.fulfill()\n    }\n    self.wait(for:\
    \ [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists, expectedLists,\
    \ \"获取的图书与预期不匹配\")\n}\n\nfunc stubbedlists() -> [List] {\n    let firstBook =\
    \ BookModel(title: \"他告诉我的最后一件事\", contributor: \"作者：劳拉·戴夫\", author: \"劳拉·戴夫\"\
    , createdDate: \"2021-05-26 22:10:24\")\n    let secondBook = BookModel(title:\
    \ \"苏利\", contributor: \"作者：约翰·格里森姆\", author: \"约翰·格里森姆\", createdDate: \"2021-05-26\
    \ 22:10:24\")\n    let firstList = List(listID: 704, listName: \"综合印刷与电子书小说\"\
    , displayName: \"综合印刷及电子书小说\", books: [firstBook, secondBook])\n    return [firstList]\n\
    }\n```\n\n这个测试甚至无法构建，因为我们还没有添加它所测试的任何组件，这很正常。\n\n允许我们的网络层通过桩代码返回预期的 JSON，以便我们可以对值进行断言，并防止测试依赖于网络调用（这会使测试变得不稳定），这是有意义的。我们将在第\
    \ 7 章更详细地讨论桩代码。\n"
- fmt: "### `NetworkLayer`\n\nNow that we have our integration test, it’s time to\
    \ go down a level to unit tests. We will start with the **Network Module**. But\
    \ since testing the network layer can be quite tricky, we’ll skip its tests for\
    \ now. But don’t worry. We will go deep on how we can test our network layer later\
    \ in **Chapter 9**. What we’ll do is add our network layer class in its separate\
    \ module. It’s a real simple class. It will only execute a single request and\
    \ return data:\n\n```\nclass NetworkLayer {\n    let host = \"api.nytimes.com\"\
    \n    let API_KEY = \"YOUR_API_KEY\"\n    let bestSellerBooks = \"/svc/books/v3/lists/overview.json\"\
    \n\n    public func executeNetworkRequest(callBack: @escaping (_ data:Data?) ->\
    \ Void) {\n        var components = URLComponents()\n        components.scheme\
    \ = \"https\"\n        components.host = host\n        components.path = bestSellerBooks\n\
    \        components.queryItems = [URLQueryItem(name: \"api-key\", value: API_KEY),\
    \ URLQueryItem(name: \"offset\", value: \"20\")]\n        guard let url = components.url\
    \ else {\n            callBack(nil)\n            preconditionFailure(\"Failed\
    \ to construct URL\")\n        }\n        let task = URLSession.shared.dataTask(with:\
    \ url) {\n            data, response, error in\n            guard let data = data\
    \ else {\n                callBack(nil)\n                return\n            }\n\
    \            callBack(data)\n        }\n        task.resume()\n    }\n}\n```\n\
    \n### `MainViewModel`\n\nLet’s jump to the next class, which will be `MainViewModel`.\
    \ It’s part of the **MainView Module** and will be responsible for creating a\
    \ `NetworkLayer` object and performing network requests and then parsing the response\
    \ data and returning the parsed data through a callback. As usual we will start\
    \ with `MainViewModelTests`. We will write all tests to make sure that this class\
    \ is working fine and as expected:\n\n```\nfunc testFetchingAndParsingBestSellerBooks()\
    \ throws {\n    // Given\n    let testBundle = Bundle(for: type(of: self))\n \
    \   let booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension:\
    \ \"json\")\n    let booksJSON = try Data(contentsOf: booksJSONURL!)\n    let\
    \ expectedLists: [List] = stubbedlists()\n    var actualLists: [List] = []\n \
    \   let networkLayer = NetworkLayerStub(stubbedData: booksJSON)\n    let mainViewModel\
    \ = MainViewModel(networkLayer: networkLayer)\n    // when & then\n    let waitForBooks\
    \ = XCTestExpectation(description: \"Wait to fetch books\")\n    mainViewModel.fetchBestSellerBooks\
    \ { lists in\n        actualLists = lists ?? []\n        waitForBooks.fulfill()\n\
    \    }\n    self.wait(for: [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists,\
    \ expectedLists, \"Fetched books does not match the expected\")\n}\n\nfunc stubbedlists()\
    \ -> [List] {\n    let firstBook = BookModel(title: \"THE LAST THING HE TOLD ME\"\
    , contributor: \"by Laura Dave\", author: \"Laura Dave\", createdDate: \"2021-05-26\
    \ 22:10:24\")\n    let secondBook = BookModel(title: \"SOOLEY\", contributor:\
    \ \"by John Grisham\", author: \"John Grisham\", createdDate: \"2021-05-26 22:10:24\"\
    )\n    let firstList = List(listID: 704, listName: \"Combined Print and E-Book\
    \ Fiction\", displayName: \"Combined Print & E-Book Fiction\", books: [firstBook,secondBook])\n\
    \    return [firstList]\n}\n```\n\nThe preceding test first sets up an instance\
    \ of `MainViewModel` by initializing it using a `NetworkLayer` instance. We then\
    \ call the function that we’re trying to test, which fetches the data from the\
    \ server, and then we wait till it’s done. And finally we assert on the returned\
    \ data.\n\nIn order to test `MainViewModel`, we need to stub `NetworkLayer` to\
    \ return specific JSON so that we can assert on the output of `MainViewModel`.\
    \ We need to create a new class that will stub the network, as our just added\
    \ test is not building because of that. `NetworkLayerStub` will look like this:\n\
    \n```\nclass NetworkLayerStub: NetworkLayer {\n    var stubbedData:Data?\n   \
    \ init(stubbedData:Data) {\n        self.stubbedData = stubbedData\n    }\n  \
    \  public override func executeNetworkRequest(callBack: @escaping (_ data:Data?)\
    \ -> Void){\n        let jsonData = self.stubbedData\n        callBack(jsonData)\n\
    \    }\n}\n```\n\nWe solved one build error by adding `NetworkLayerStub`, but\
    \ the test is still not building. Now it’s time to write code to make `MainViewModelTests`\
    \ pass. For that to happen, we need to create `MainViewModel`, and it should look\
    \ like this:\n\n```\nclass MainViewModel: NSObject {\n    private var networkLayer:NetworkLayer?\n\
    \    init(networkLayer:NetworkLayer?) {\n        self.networkLayer = networkLayer\n\
    \    }\n    public func fetchBestSellerBooks(callBack: @escaping (_ data:[List]?)\
    \ -> Void) {\n        self.networkLayer?.executeNetworkRequest(callBack: { data\
    \ in\n            guard let data = data else {\n                callBack(nil)\n\
    \                return\n            }\n            var response:Response?\n \
    \           do {\n                response = try JSONDecoder().decode(Response.self,\
    \ from: data)\n            } catch {\n                print(error.localizedDescription)\n\
    \            }\n            if let lists = response?.results.lists {\n       \
    \         callBack(lists)\n                return;\n            }\n          \
    \  callBack(nil)\n        })\n    }\n}\n```\n\nHere we simply implement the function\
    \ we need, which is `fetchBestSellerBooks`. The function is passed a callback\
    \ block as a parameter, which should be called with the fetched books when done.\
    \ We use the instance of `NetworkLayer` to make the request, and we decode the\
    \ response and then return it in the callback.\n\nNow if we run `MainViewModelTests`\
