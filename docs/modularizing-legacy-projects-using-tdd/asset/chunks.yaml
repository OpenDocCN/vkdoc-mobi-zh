  raw: '### Unit Tests


    The `MainViewPresenter` is the class that should be responsible for returning
    an error message based on the list returned from the `MainViewModel`.


    `fetchBestSellerBooks` returns a list only. We need to extend this method to return
    a Boolean to indicate if the presenter succeeded in fetching the request or not
    and an error message to be displayed to our user. Let’s add a new test in `MainViewPresenterTests`:


    ```

    func testFailureToFetchBooks() throws {

    // Given

    let mainViewModel = MainViewModelStub(stubbedLists: [])

    let mainViewPresenter = MainViewPresenter(mainViewModel: mainViewModel)

    var status:Bool?

    var message:String?

    var actualLists: [List] = []

    // when & then

    let waitForBooks = XCTestExpectation(description: "Wait to fetch books")

    mainViewPresenter.fetchBestSellerBooks { lists, success, errorMessage in

    actualLists = lists ?? []

    status = success

    message = errorMessage

    waitForBooks.fulfill()

    }

    self.wait(for: [waitForBooks], timeout: 0.1)

    XCTAssertEqual(actualLists, [])

    XCTAssertEqual(status, false)

    XCTAssertEqual(message, "Failed to fetch best seller books")

    }

    ```


    Here we tell our stub to return an empty array. And then we call `fetchBestSellerBooks`
    that now returns a Boolean indicating success and an error message in case of
    failure. Then we assert on the values returned in the callback.


    To fix this test, we need to update `fetchBestSellerBooks` to handle this case:


    ```

    public func fetchBestSellerBooks(callBack: @escaping (_ data:[List]?, _ success:Bool,
    _ errorMessage:String?) -> Void) {

    self.mainViewModel?.fetchBestSellerBooks(callBack: { lists in

    if let lists = lists, lists.count > 0 {

    callBack(lists, true, nil)

    } else {

    callBack([], false, "Failed to fetch best seller books")

    }

    })

    }

    ```


    This will cause multiple build errors in our code and tests since we’ve changed
    the signature of the function. We just need to pass through every build error
    and update the signature.


    After fixing all build errors, if we run our new test in `MainViewPresenterTests`
    (Figure [12-4](#505360_1_En_12_Chapter.xhtml#Fig4)), it should now pass ✅.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig4_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    All tests passing


    Now we just need to update our view controller to display the error:


    ```

    func fetchBooks() {

    self.mainViewPresenter?.fetchBestSellerBooks(callBack: { lists,success,errorMessage  in

    if success {

    if let lists = lists {

    self.lists = lists

    DispatchQueue.main.async {

    self.refreshControl.endRefreshing()

    self.tableView?.reloadData()

    }

    }

    } else {

    self.lists = lists

    DispatchQueue.main.async {

    self.refreshControl.endRefreshing()

    self.tableView?.reloadData()

    self.showErrorMessage(errorMessage: errorMessage)

    }

    }

    })

    }

    func showErrorMessage(errorMessage:String?) {

    let label = UILabel(frame: CGRect(x: 0, y: 0, width: 100, height: 40))

    label.translatesAutoresizingMaskIntoConstraints = false

    label.text = errorMessage

    label.sizeToFit()

    self.tableView?.addSubview(label)

    label.centerXAnchor.constraint(equalTo: (self.tableView?.centerXAnchor)!).isActive
    = true

    label.centerYAnchor.constraint(equalTo: (self.tableView?.centerYAnchor)!).isActive
    = true

    }

    ```


    Now if we run the UI test (Figure [12-5](#505360_1_En_12_Chapter.xhtml#Fig5)),
    it should also pass ✅.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig5_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    UI test passing


    ## Production Crash


    We just received our first crash with number of occurrences 3 (Figure [12-6](#505360_1_En_12_Chapter.xhtml#Fig6)).


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig6_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Crash report


    ### Debugging


    If we look at the crash stack trace (Figure [12-7](#505360_1_En_12_Chapter.xhtml#Fig7)),
    we’ll find that it happens when someone tries to buy a book using Amazon .


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig7_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Crash stack trace


    First though, it could be that it’s an issue from the web service we’re using.
    It’s possible that the book returned does not contain an Amazon link or something.
    But if we check the network logs (Figure [12-8](#505360_1_En_12_Chapter.xhtml#Fig8)),
    we’ll find that the web service returned a correct response.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig8_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Network logs


    If we debug our crash further and look at the user steps for all three occurrences
    (Figure [12-9](#505360_1_En_12_Chapter.xhtml#Fig9)), we can reach the conclusion
    that all crashes happened inside `BookViewControllerA`. And they always happened
    after going to the background and coming back to foreground.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig9_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Steps prior to crash


    If we check the code inside `BookViewControllerA,` we’ll find the culprit:


    ```

    NotificationCenter.default.addObserver(self, selector: #selector(didEnterBackground),
    name: UIApplication.didEnterBackgroundNotification, object: nil)

    ```


    We listen on the didEnterBackground notification, and when it’s fired we do this:


    ```

    @objc func didEnterBackground() {

    self.book = nil

    }

    ```


    And when a user taps on the Amazon button


    ```

    @IBAction func buyByAmazon() {

    for buyLink in self.book!.buyLinks! {

    if buyLink.name == .amazon {

    if let url = URL(string: buyLink.url) {

    UIApplication.shared.open(url)

    }

    }

    }

    }

    ```


    we force-unwrap our book instance to be able to use it.


    Gotcha!!!


    So now that we have our root cause, we will do the same thing we did with our
    bug. We’ll apply TDD.


    ### UI Test


    Let’s open `BooksUITests` and add a new test named `testShowingBookViewAfterEnterBackground`
    to simulate the scenario that causes the crash .


    The Given section of the test should look like this:


    ```

    // Given

    let testBundle = Bundle(for: type(of: self))

    let booksJSONURL = testBundle.url(forResource: "BestSellerBooksStub", withExtension:
    "json")

    let booksJSON = try! String(contentsOf: booksJSONURL!)

    let booksNoReveiwsJSONURL = testBundle.url(forResource: "booksNoReview", withExtension:
    "json")

    let booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)

    server.GET["/svc/books/v3/lists/overview.json"] = {_ in HttpResponse.ok(.text(booksJSON))}

    server.GET["/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME"] = {_
    in HttpResponse.ok(.text(booksNoReveiwsJSON))}

    let app = XCUIApplication()

    app.launchArguments += ["TESTING"]

    app.launch()

    ```


    Here we just set up our test by stubbing our two requests and then launching the
    app.


    Now on to the “When” section:


    ```

    // When

    // Go to book

    let booksTableView = app.tables

    let cells = booksTableView.cells

    let firstCell = cells.firstMatch

    _ = firstCell.waitForExistence(timeout: 1.0)

    firstCell.tap()

    // Move to background

    XCUIDevice.shared.press(.home)

    // Move back to foreground

    app.activate()

    ```


    Here we navigate to a book details page. And then we go to the background and
    then back to the foreground.


    Finally our “Then” section:


    ```

    // Then

    let amazonButton = app.buttons["amazon"]

    _ = amazonButton.waitForExistence(timeout: 1.0)

    amazonButton.tap()

    ```


    Here we should tap on the Amazon button. Normally in the Then section we do some
    assertions. However, for this test, our assertion is that the app doesn’t crash.'
  trans: "\n### 单元测试\n\n`MainViewPresenter` 是一个负责根据 `MainViewModel` 返回的列表来返回错误信息的类。\n\
    \n`fetchBestSellerBooks` 目前只返回一个列表。我们需要扩展这个方法，使其返回一个布尔值来指示 presenter 是否成功获取请求，并返回一个要显示给用户的错误信息。让我们在\
    \ `MainViewPresenterTests` 中添加一个新测试：\n\n```\nfunc testFailureToFetchBooks() throws\
    \ {\n    // Given\n    let mainViewModel = MainViewModelStub(stubbedLists: [])\n\
    \    let mainViewPresenter = MainViewPresenter(mainViewModel: mainViewModel)\n\
    \    var status:Bool?\n    var message:String?\n    var actualLists: [List] =\
    \ []\n    // when & then\n    let waitForBooks = XCTestExpectation(description:\
    \ \"Wait to fetch books\")\n    mainViewPresenter.fetchBestSellerBooks { lists,\
    \ success, errorMessage in\n        actualLists = lists ?? []\n        status\
    \ = success\n        message = errorMessage\n        waitForBooks.fulfill()\n\
    \    }\n    self.wait(for: [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists,\
    \ [])\n    XCTAssertEqual(status, false)\n    XCTAssertEqual(message, \"Failed\
    \ to fetch best seller books\")\n}\n```\n\n这里我们让桩模块返回一个空数组。然后调用 `fetchBestSellerBooks`，该方法现在会返回一个指示成功与否的布尔值，以及在失败时返回的错误信息。最后，我们断言回调中返回的值。\n\
    \n为了修复这个测试，我们需要更新 `fetchBestSellerBooks` 以处理这种情况：\n\n```\npublic func fetchBestSellerBooks(callBack:\
    \ @escaping (_ data:[List]?, _ success:Bool, _ errorMessage:String?) -> Void)\
    \ {\n    self.mainViewModel?.fetchBestSellerBooks(callBack: { lists in\n     \
    \   if let lists = lists, lists.count > 0 {\n            callBack(lists, true,\
    \ nil)\n        } else {\n            callBack([], false, \"Failed to fetch best\
    \ seller books\")\n        }\n    })\n}\n```\n\n由于我们更改了函数的签名，这会在我们的代码和测试中导致多个构建错误。我们只需逐一处理每个构建错误并更新签名即可。\n\
    \n修复所有构建错误后，如果我们运行 `MainViewPresenterTests` 中的新测试（图 12-4），它现在应该可以通过 ✅。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig4_HTML.jpg](img/505360_1_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4\n\n所有测试通过\n\n现在，我们只需要更新视图控制器来显示错误信息：\n\n```\nfunc fetchBooks() {\n  \
    \  self.mainViewPresenter?.fetchBestSellerBooks(callBack: { lists,success,errorMessage\
    \  in\n        if success {\n            if let lists = lists {\n            \
    \    self.lists = lists\n                DispatchQueue.main.async {\n        \
    \            self.refreshControl.endRefreshing()\n                    self.tableView?.reloadData()\n\
    \                }\n            }\n        } else {\n            self.lists =\
    \ lists\n            DispatchQueue.main.async {\n                self.refreshControl.endRefreshing()\n\
    \                self.tableView?.reloadData()\n                self.showErrorMessage(errorMessage:\
    \ errorMessage)\n            }\n        }\n    })\n}\n\nfunc showErrorMessage(errorMessage:String?)\
    \ {\n    let label = UILabel(frame: CGRect(x: 0, y: 0, width: 100, height: 40))\n\
    \    label.translatesAutoresizingMaskIntoConstraints = false\n    label.text =\
    \ errorMessage\n    label.sizeToFit()\n    self.tableView?.addSubview(label)\n\
    \    label.centerXAnchor.constraint(equalTo: (self.tableView?.centerXAnchor)!).isActive\
    \ = true\n    label.centerYAnchor.constraint(equalTo: (self.tableView?.centerYAnchor)!).isActive\
    \ = true\n}\n```\n\n现在，如果我们运行 UI 测试（图 12-5），它也应该可以通过 ✅。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig5_HTML.jpg](img/505360_1_En_12_Fig5_HTML.jpg)\n\
    \n图 12-5\n\nUI 测试通过\n\n## 生产环境崩溃\n\n我们刚刚收到了第一次崩溃报告，发生次数为 3 次（图 12-6）。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig6_HTML.jpg](img/505360_1_En_12_Fig6_HTML.jpg)\n\
    \n图 12-6\n\n崩溃报告\n\n### 调试\n\n如果我们查看崩溃堆栈跟踪信息（图 12-7），会发现崩溃发生在用户尝试通过亚马逊购买图书时。\n\
    \n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig7_HTML.jpg](img/505360_1_En_12_Fig7_HTML.jpg)\n\
    \n图 12-7\n\n崩溃堆栈跟踪\n\n首先，可能只是我们使用的网络服务有问题。也许返回的图书不包含亚马逊链接或其他什么。但如果我们检查网络日志（图 12-8），会发现网络服务返回了正确的响应。\n\
    \n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig8_HTML.jpg](img/505360_1_En_12_Fig8_HTML.jpg)\n\
    \n图 12-8\n\n网络日志\n\n如果我们进一步调试崩溃，查看全部三次崩溃的用户操作步骤（图 12-9），可以得出结论：所有崩溃都发生在 `BookViewControllerA`\
    \ 内部。并且总是在应用进入后台再返回前台后发生。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig9_HTML.jpg](img/505360_1_En_12_Fig9_HTML.jpg)\n\
    \n图 12-9\n\n崩溃前的操作步骤\n\n如果我们检查 `BookViewControllerA` 内部的代码，就会找到罪魁祸首：\n\n```\n\
    NotificationCenter.default.addObserver(self, selector: #selector(didEnterBackground),\
    \ name: UIApplication.didEnterBackgroundNotification, object: nil)\n```\n\n我们监听了\
    \ `didEnterBackground` 通知，当它被触发时，我们执行以下操作：\n\n```\n@objc func didEnterBackground()\
    \ {\n    self.book = nil\n}\n```\n\n而当用户点击亚马逊按钮时：\n\n```\n@IBAction func buyByAmazon()\
    \ {\n    for buyLink in self.book!.buyLinks! {\n        if buyLink.name == .amazon\
    \ {\n            if let url = URL(string: buyLink.url) {\n                UIApplication.shared.open(url)\n\
    \            }\n        }\n    }\n}\n```\n\n我们强制解包了 book 实例以便使用它。\n\n找到问题了！！！\n\
    \n现在我们找到了根本原因，我们将采用与修复之前 bug 相同的方法：应用 TDD。\n\n### UI 测试\n\n让我们打开 `BooksUITests`\
    \ 并添加一个名为 `testShowingBookViewAfterEnterBackground` 的新测试来模拟导致崩溃的场景。\n\n测试的 Given\
    \ 部分应该如下所示：\n\n```\n// Given\nlet testBundle = Bundle(for: type(of: self))\nlet\
    \ booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension:\
    \ \"json\")\nlet booksJSON = try! String(contentsOf: booksJSONURL!)\nlet booksNoReveiwsJSONURL\
    \ = testBundle.url(forResource: \"booksNoReview\", withExtension: \"json\")\n\
    let booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\nserver.GET[\"\
    /svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
    \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
    app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\n这里我们通过为两个请求设置桩模块并启动应用来设置测试。\n\
    \n接下来是 “When” 部分：\n\n```\n// When\n// Go to book\nlet booksTableView = app.tables\n\
    let cells = booksTableView.cells\nlet firstCell = cells.firstMatch\n_ = firstCell.waitForExistence(timeout:\
    \ 1.0)\nfirstCell.tap()\n// Move to background\nXCUIDevice.shared.press(.home)\n\
    // Move back to foreground\napp.activate()\n```\n\n这里我们导航到图书详情页面，然后让应用进入后台，再回到前台。\n\
    \n最后是我们的 “Then” 部分：\n\n```\n// Then\nlet amazonButton = app.buttons[\"amazon\"\
    ]\n_ = amazonButton.waitForExistence(timeout: 1.0)\namazonButton.tap()\n```\n\n\
    这里我们应该点击亚马逊按钮。通常在 Then 部分我们会做一些断言。但是，对于这个测试，我们的断言是应用不会崩溃。\n"
- fmt: '### Handle A/B Testing


    Now we have a problem: every time the test runs, it may open `BookViewControllerA`
    or `BookViewControllerB`. This is because of our A/B testing experiment that chooses
    a view controller by random. So if it chooses to go to `BookViewControllerB`,
    our test will pass even though it should fail. For our test to be effective, we
    need it to fail consistently.


    So we need to add another launch argument inside our UI test to force our app
    to use the first experiment:


    ```

    let app = XCUIApplication()

    app.launchArguments += ["TESTING", "detailsA"]

    app.launch()

    ```


    We need to adjust the `AppDelegate` to force a specific experiment:


    ```

    if ProcessInfo.processInfo.arguments.contains("TESTING"){

    if ProcessInfo.processInfo.arguments.contains("detailsA")  {

    UserDefaults.standard.set(true, forKey: "detailsA")

    } else {

    UserDefaults.standard.set(false, forKey: "detailsA")

    }

    } else {

    let randomBool = Bool.random()

    if randomBool {

    Instabug.addExperiments(["detailsA"])

    } else {

    Instabug.addExperiments(["detailsB"])

    }

    UserDefaults.standard.set(randomBool, forKey: "detailsA")

    }

    ```


    Here we check if a launch argument is passed. If it is, we use the value passed;
    if not, we fall back to our normal implementation, which is choosing a view randomly.


    Now, if we run our test, it should crash (Figure [12-10](#505360_1_En_12_Chapter.xhtml#Fig10)).


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig10_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Crash reproduced


    ### Fixing Our Test


    Fixing our test, and in turn our production issue, is pretty simple. We just need
    to remove the force casting inside and replace our implementation with this:


    ```

    @IBAction func buyByAmazon() {

    guard let buyLinks = self.book?.buyLinks else {

    return

    }

    for buyLink in buyLinks {

    if buyLink.name == .amazon {

    if let url = URL(string: buyLink.url) {

    UIApplication.shared.open(url)

    }

    }

    }

    }

    ```


    Here we use a guard to check if the book exists or not.


    We should always avoid using force casting as it’s extremely unsafe. Most crashes
    happening on iOS are caused by force casting.


    We can also remove the code that listens on the `didEnterBackground` notification
    altogether as we don’t seem to need it.


    Now if we run our test (Figure [12-11](#505360_1_En_12_Chapter.xhtml#Fig11)),
    it should pass ✅.


    ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig11_HTML.jpg](images/505360_1_En_12_Chapter/505360_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    UI test passing


    ## Summary


    Our goal is to continuously improve our app quality. Sometimes it’s possible to
    miss a certain scenario and not have it handled. We can’t always predict how our
    users will interact with our app. That’s why it’s always best to have a way to
    track the fatal crashes happening to our production users and to also provide
    our users with a way to report faulty behaviors in our app.


    In this chapter we talked about how to use third-party tools to keep track of
    bugs and crashes on production. When encountering a production issue, fixing it
    should also be test-driven. We used TDD when adding features by transforming our
    requirements to tests. With production bugs and crashes, it’s the exact same thing,
    and our requirement is simply for the issue to not happen. When we do this, we
    will be preventing this specific issue from ever happening again.'
