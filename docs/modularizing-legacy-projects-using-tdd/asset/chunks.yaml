    \ look like this:\n\n```\nfunc testExample() {\nlet x = \"foo\"\nlet y = \"bar\"\
    \nXCTAssertEqual(x, y)\n}\n```\n\nThis makes the test a little bit more verbose\
    \ and easier to understand. And if we run this test, the test result error is\
    \ far more descriptive:\n\n```\nXCTAssertEqual failed: (\"foo\") is not equal\
    \ to (\"bar\")\n```\n\n### Assert Method Types\n\nXCTest has many assertion methods,\
    \ and they can be categorized into five categories:\n\n1.  Truthfulness\n\n2.\
    \  Equality\n\n3.  Nullability\n\n4.  Comparison\n\n5.  Errors\n\n#### Truthfulness\
    \ Asserts\n\n*   XCTAssertTrue\n\n    Asserts that the given expression evaluates\
    \ to true\n\n*   XCTAssertFalse\n\nAsserts that the given expression evaluates\
    \ to false\n\n*   XCTAssert\n\nAn alias for XCTAssertTrue\n\nSo far, we have been\
    \ using `XCTAssertTrue` exclusively. However, now we can refactor `testDisableLogging`\
    \ to use `XCTAssertFalse`. Go ahead and replace the last line in the test with\
    \ this:\n\n```\nXCTAssertFalse(isEnabled)\n```"
  trans: "\n## 你的第一个测试\n\n让我们暂时忘记 TDD（测试驱动开发），先专注于测试基础。请下载并打开本章资源中的入门项目 `Calc`。`Calc`\
    \ 是一个框架（图 2-1），它提供了一些基本数学运算以及一些特殊运算。`Calc` 还会记录并保存每次运算的输出。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig1_HTML.jpg](img/505360_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1 计算器框架类图\n\n`Calc` 包含两个组件：`Calculator` 和 `Logger`。`Calculator` 具有以下功能：`add`、`subtract`、`multiply`、`divide`、`addRandomNumber`\
    \ 和 `subtractRandomNumber`。它还有一个用于检查日志记录是否已启用的函数，以及用于启用/禁用日志记录的函数。至于 `Logger`，它有一个函数，该函数接收一个数字并记录它。如果数字在限制范围内，则保存它；否则，抛出错误。`Calculator`\
    \ 使用 `Logger` 来记录每次运算的输出。\n\n如果你浏览一下项目，就会发现其中根本没有添加任何测试。而我们接下来要做的，就是一边带你了解 `XCTest`\
    \ 的基础知识，一边解决这个问题。\n\n### 我们要测试什么？\n\n-   默认情况下日志记录是启用的。\n-   `disableLogging`\
    \ 函数能正确禁用日志记录。\n-   `enableLogging` 函数能正确启用日志记录。\n-   `Calculator` 内部的 `Logger`\
    \ 实例默认已初始化。\n-   当日志记录被禁用时，`Logger` 实例会被清空。\n-   所有运算功能都能按预期工作。\n-   `Logger`\
    \ 的 `log` 函数在提供的数字小于限制时会保存该数字。\n-   `Logger` 的 `log` 函数在提供的数字大于限制时会抛出一个错误。\n\n\
    ### 创建单元测试目标\n\n为了运行测试，首先我们需要一个单元测试目标。单元测试目标是一个独立的可执行文件，其唯一目的是运行你的单元测试。当你将应用提交到\
    \ App Store 或分发框架时，这个测试目标不会被包含在内。\n\n按下 `Command+6` 打开测试导航器。\n\n点击左下角的 `+` 按钮。然后从菜单中选择\
    \ **New Unit Test Target…**（图 2-2）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig2_HTML.jpg](img/505360_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2 添加单元测试目标\n\n接受所有默认值，然后点击 **Finish**。\n\n现在，你应该能在测试导航器中看到新添加的测试目标了（图 2-3）。\n\
    \n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig3_HTML.jpg](img/505360_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3 测试导航器\n\nXcode 会自动生成一个名为 `CalcTests.swift` 的测试用例文件。我们不需要它，所以请直接删除它。\n\n\
    ### 添加测试用例类\n\n我们将从为 `Calculator` 编写测试开始，第一步就是创建一个测试用例类来包含这些测试。\n\n转到测试导航器，选择现在为空的测试目标\
    \ `CalcTests`。然后点击左下角的 `+` 按钮。接着从菜单中选择 **New Unit Test Class…**。在 **Class** 字段中输入\
    \ “CalculatorTests”，然后依次点击 Next 和 Create。\n\n默认模板（图 2-4）导入了测试框架 `XCTest`，并定义了一个\
    \ `XCTestCase` 的子类 `CalculatorTests`，其中包含了 `setUpWithError()`、`tearDownWithError()`\
    \ 以及示例测试方法。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig4_HTML.jpg](img/505360_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4 `CalculatorTests`\n\n请继续删除示例测试方法。同时删除 setup 和 teardown 方法，因为我们暂时还用不到它们。\n\
    \n现在是时候添加这个项目中的第一个测试了。我们要测试日志记录在默认情况下是启用的。我们可以使用公共函数 `isLoggingEnabled()` 来检查日志记录是否已启用。\n\
    \n首先，在文件开头添加这一行新代码以导入我们的框架：\n\n`import Calc`\n\n然后，在 `CalculatorTests` 中添加以下代码：\n\
    \n```\nfunc testIsLoggingEnabledByDefault() {\n    // Given\n    let calc = Calculator()\n\
    \    // When\n    let isEnabled = calc.isLoggingEnabled()\n    // Then\n    XCTAssertTrue(isEnabled)\n\
    }\n```\n\n这里我们创建了一个新的 `Calculator` 实例，然后调用 `isLoggingEnabled` 并将结果保存在变量 `isEnabled`\
    \ 中。在 **Then** 部分，我们断言 `isEnabled` 为 true。\n\n点击旁边的菱形按钮或通过测试导航器运行测试。测试应该会通过（图\
    \ 2-5）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig5_HTML.jpg](img/505360_1_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5 你的第一个测试！\n\n你刚刚已经编写并运行了你的第一个测试！\n\n## 断言方法\n\n在我们编写的第一个测试中，我们使用了 `XCTAssertTrue`，它断言给定的表达式的计算结果为\
    \ true。然而，我们的方法还有另一个可能的结果，即返回 false。如果调用了 `disableLogging()`，那么 `isLoggingEnabled()`\
    \ 应该返回 false。让我们继续编写那个测试：\n\n```\nfunc testDisableLogging() {\n    // Given\n\
    \    let calc = Calculator()\n    // When\n    calc.disableLogging()\n    let\
    \ isEnabled = calc.isLoggingEnabled()\n    // Then\n}\n```\n\n现在我们要断言 `isEnabled`\
    \ 为 false。你的第一反应可能是像这样做：\n\n```\nXCTAssertTrue(!isEnabled)\n```\n\n让我们继续添加它并运行测试。\n\
    \n测试通过了！\n\n如你所见，我们可以仅使用 `XCTAssertTrue` 来断言我们想要的任何内容，无论是相等性、可空性、比较还是其他。然而，这引入了两个问题：测试可读性差和测试输出可读性差。让我们看看下面的测试示例：\n\
    \n```\nfunc testExample() {\n    let x = \"foo\"\n    let y = \"bar\"\n    let\
    \ z = foo == bar\n    XCTAssertTrue(z)\n}\n```\n\n快速浏览这个测试，我们可以看到我们在断言 `z` 为 true，但为了理解我们实际在测试什么，我们需要返回去检查\
    \ “z” 是什么。你可能认为这不是一个大问题，但当测试变得更加复杂和精细时，这个问题就会非常明显。\n\n第二个也是更重要的问题是测试结果。以下是运行上述测试时的测试结果错误信息：\n\
    \n```\nXCTAssertTrue failed\n```\n\n如你所见，这个信息有点不明确，没有告诉我们任何关于出了什么问题或 `x` 和 `y`\
    \ 的值的线索。\n\n现在我们已经发现了仅使用 `XCTAssertTrue` 的问题，接下来该怎么办呢？幸运的是，`XCTest` 已经为我们考虑到了这一点。正如我们之前提到的，`XCTest`\
    \ 是一个非常强大的测试框架，其核心能力之一就是其多样化的断言方法套件。其中一个方法就是 `XCTAssertEqual`。\n\n我们可以重构之前的测试用例来使用\
    \ `XCTAssertEqual`，重构后如下所示：\n\n```\nfunc testExample() {\n    let x = \"foo\"\n\
    \    let y = \"bar\"\n    XCTAssertEqual(x, y)\n}\n```\n\n这使得测试更加详细且易于理解。如果我们运行这个测试，测试结果错误信息会更具描述性：\n\
    \n```\nXCTAssertEqual failed: (\"foo\") is not equal to (\"bar\")\n```\n\n###\
    \ 断言方法类型\n\n`XCTest` 有许多断言方法，它们可以分为五类：\n\n1.  真值\n2.  相等性\n3.  可空性\n4.  比较\n5.\
    \  错误\n\n#### 真值断言\n\n-   `XCTAssertTrue`  \n    断言给定的表达式的计算结果为 true\n-   `XCTAssertFalse`\
    \  \n    断言给定的表达式的计算结果为 false\n-   `XCTAssert`  \n    是 `XCTAssertTrue` 的别名\n\n\
    到目前为止，我们一直在专门使用 `XCTAssertTrue`。但是，现在我们可以重构 `testDisableLogging` 来使用 `XCTAssertFalse`。请继续将测试中的最后一行替换为：\n\
    \n```\nXCTAssertFalse(isEnabled)\n```\n"
- fmt: "# 单元测试中的断言\n\n## 等式断言（Equality Asserts）\n\n* `XCTAssertEqual`\n\n  断言给定的两个表达式相等。\n\
    \n* `XCTAssertNotEqual`\n\n  断言给定的两个表达式不相等。\n\n对于所有等式断言，传入的表达式的类型必须相同，并且该类型需要遵循`Equatable`或`FloatingPoint`协议。\n\
    \n让我们为`add(firstArgument: FloatingPoint, secondArgument: FloatingPoint)`添加一个测试：\n\
    \n```\nfunc testAdd() {\n    // Given\n    let calc = Calculator()\n    // When\n\
    \    let output = calc.add(firstArgument: 1, secondArgument: 2)\n    // Then\n\
    \    XCTAssertEqual(output, 3)\n}\n```\n\n这里我们简单地断言函数的输出等于预期的输出，即“3”。\n\n## 空值断言（Nullability\
    \ Asserts）\n\n* `XCTAssertNil`\n\n  断言给定的表达式为`nil`。\n\n* `XCTAssertNotNil`\n\n\
    \  断言给定的表达式不为`nil`。\n\n当`Calculator`实例被初始化时，会创建一个新的`Logger`对象，并将其作为变量保存在`Calculator`内部。当调用`disableLogging()`时，该变量被设置为`nil`。让我们添加测试来覆盖这部分功能：\n\
    \n```\nfunc testLoggerIsInitializedByDefault() {\n    // Given\n    let calc =\
    \ Calculator()\n    // Then\n    XCTAssertNotNil(calc.logger)\n}\nfunc testDisableLoggingResetsLogger()\
    \ {\n    // Given\n    let calc = Calculator()\n    // When\n    calc.disableLogging()\n\
    \    // Then\n    XCTAssertNil(calc.logger)\n}\n```\n\n当你添加这些测试时，会遇到一个如下所示的构建错误：\n\
    \n```\n'logger' is inaccessible due to 'internal' protection level\n```\n\n要修复此问题，请将：\n\
    \n```\nimport Calc\n```\n\n替换为：\n\n```\n@testable import Calc\n```\n\n当我们为启用了测试编译的模块的`import`语句添加`@testable`属性时，我们就为该作用域内的该模块激活了提升的访问权限。标记为`public`的类和类成员的行为就像被标记为`open`一样。其他标记为`internal`的实体则表现为被声明为`public`。\n\
    \n## 比较断言（Comparison Asserts）\n\n* `XCTAssertGreaterThan`\n\n* `XCTAssertGreaterThanOrEqual`\n\
    \n* `XCTAssertLessThan`\n\n* `XCTAssertLessThanOrEqual`\n\n对于所有比较断言，传入的表达式的类型必须相同，并且该类型需要遵循`Comparable`协议。\n\
    \n让我们利用比较断言为`addRandomNumber`编写一个测试。这里我们希望断言输出大于传入的参数：\n\n```\nfunc testAddRandomNumber()\
    \ {\n    // Given\n    let calc = Calculator()\n    // When\n    let output =\
    \ calc.addRandomNumber(argument: 1)\n    // Then\n    XCTAssertGreaterThan(output,\
    \ 1)\n}\n```\n\n## 错误断言（Errors Asserts）\n\n* `XCTAssertThrowsError`\n\n* `XCTAssertNoThrow`\n\
    \n这些断言方法用于测试会抛出错误的函数。\n\n我们的`Logger`在尝试记录大于**1000**的数字时会抛出错误。让我们使用这些断言方法来覆盖这部分逻辑。\n\
    \n首先，我们需要添加一个新的测试用例类来包含`Logger`的测试。按照之前的方式创建它，并将其命名为`LoggerTests`。首先添加`@testable`导入语句。然后删除自动生成的代码，并替换为以下内容：\n\
    \n```\nfunc testAddLogShouldThrowIfExceedsLimit() {\n    // Given\n    let logger\
    \ = Logger()\n    let number: Double = 2000\n    // Then\n    XCTAssertThrowsError(try\
    \ logger.log(number))\n}\nfunc testAddLogShouldNotThrowIfUnderLimit() {\n    //\
    \ Given\n    let logger = Logger()\n    let number: Double = 500\n    // Then\n\
    \    XCTAssertNoThrow(try logger.log(number))\n}\n```\n\n这两个测试覆盖了`Logger`抛出错误和不抛出错误的两种场景。\n\
    \n## 期望（Expectations）\n\n现在你已经熟悉了断言函数，让我们更进一步。尝试测试异步代码。首先，什么是异步代码？当你同步执行某件事时，你会等它完成后再继续执行另一个任务。当你异步执行某件事时，你可以在它完成之前就继续执行另一个任务。\n\
    \n我们的`Logger.log(_ number: Double, completion: LogCompletion)`函数是异步添加日志的。它接受一个完成处理器，并在执行完毕时调用它。\n\
    \n让我们尝试为其编写一个测试：\n\n```\nfunc testAddingLog() throws {\n    // Given\n    let\
    \ logger = Logger()\n    let number: Double = 1\n    // When\n    try logger.log(number)\
    \ {\n        // Then\n        XCTAssertEqual(logger.logs.count, 0)\n    }\n}\n\
    ```\n\n如果你仔细检查我们刚刚编写的函数和测试，你会发现断言应该失败，因为日志计数预期是`1`，而不是`0`。但是当我们运行这个测试时，它通过了，并且只是偶尔失败。这是因为`log`是异步的，基本上发生的情况是测试执行作用域在函数完成执行或调用完成处理器之前就结束了。所以我们的断言实际上从未被调用。这就是仅靠`XCTAssertTrue`无法胜任的地方——异步代码。\n\
    \n我们可以通过强制测试等待`log`完成来修复这个问题。有很多方法可以做到这一点：等待特定的时间，或者使用`DispatchGroup`。但这些可能有些大材小用和/或不必要，因为正如你所猜到的，XCTest再次为我们提供了支持，这次是用`XCTestExpectation`。\n\
    \n`XCTestExpectation`是一个对象，它描述了我们期望在未来发生的某件事，并且我们希望等待它发生。\n\n我们可以这样创建期望：\n\n```\n\
    let exp = expectation(description: \"Log added\")\n```\n\n继续，在测试的开头添加这一行。\n\n\
    为了等待一个期望，我们需要添加这一行：\n\n```\nwait(for: [exp], timeout: 1)\n```\n\n让我们也修复一下断言语句。现在测试应该是这样的：\n\
    \n```\nfunc testAddingLog() throws {\n    let exp = expectation(description: \"\
    Log added\")\n    // Given\n    let logger = Logger()\n    let number: Double\
    \ = 1\n    // When\n    try logger.log(number) {\n        // Then\n        XCTAssertEqual(logger.logs.count,\
    \ 1)\n    }\n    wait(for: [exp], timeout: 1)\n}\n```\n\n现在运行测试。测试应该仍然失败，但会显示不同的错误：\n\
    \n```\nAsynchronous wait failed: Exceeded timeout of 1 seconds, with unfulfilled\
    \ expectations: \"Log added\".\n```\n\n这意味着超时已过，但我们的期望尚未满足，这是合逻辑的，因为我们从未定义何时满足期望。这正展示了`XCTestExpectation`的精妙之处。它们不仅帮助我们等待异步任务完成；它们还充当断言，即期望在给定的时间内得到满足，如果没有，它们会报告错误。\n\
    \n让我们通过定义何时满足期望来修复测试。在`XCTAssertEqual`这一行之后立即添加这一行：\n\n```\nexp.fulfill()\n```\n\
    \n现在当我们运行测试时，它通过了！\n\n### 期望的类型（Expectation Types）\n\n就像`XCTAssertTrue`一样，`XCTestExpectation`是我们的基础期望，我们可以用它来等待和测试任何异步代码。但我们还有其他类型的期望，使得等待特定事件更加容易：\n\
    \n1. 常规期望（Normal）\n\n2. 键值观察期望（KVO）\n\n3. 通知期望（Notification）\n\n4. 谓词期望（Predicate）\n\
    \n我们介绍了常规期望类型，其余的将在后续章节中介绍。"
  raw: "#### Equality Asserts\n\n*   XCTAssertEqual\n\n    Asserts that the given\
    \ two expressions are equal to each other\n\n*   XCTAssertNotEqual\n\n    Asserts\
    \ that the given two expressions are not equal to each other\n\nFor all equality\
    \ assertions, the passed expressions need to be of the same type, and that type\
    \ should conform to `Equatable` or `FloatingPoint`.\n\nLet’s add a test for `add(firstArgument:\
    \ FloatingPoint, secondArgument: FloatingPoint):`\n\n```\nfunc testAdd() {\n//\
    \ Given\nlet calc = Calculator()\n// When\nlet output = calc.add(firstArgument:\
    \ 1, secondArgument: 2)\n// Then\nXCTAssertEqual(output, 3)\n}\n```\n\nHere we\
    \ simply assert that the output of the function is equal to the expected output,\
    \ which is “3.”\n\n#### Nullability Asserts\n\n*   XCTAssertNil\n\n    Asserts\
    \ that the given expression is nil\n\n*   XCTAssertNotNil\n\n    Asserts that\
    \ the given expression is not nil\n\nWhen a `Calculator` instance is initialized,\
    \ a new `Logger` object is created and saved as a variable inside `Calculator`.\
    \ And when `disableLogging()` is called, this variable is set to nil. Let’s add\
    \ tests to cover this part:\n\n```\nfunc testLoggerIsInitializedByDefault() {\n\
    // Given\nlet calc = Calculator()\n// Then\nXCTAssertNotNil(calc.logger)\n}\n\
    func testDisableLoggingResetsLogger() {\n// Given\nlet calc = Calculator()\n//\
    \ When\ncalc.disableLogging()\n// Then\nXCTAssertNil(calc.logger)\n}\n```\n\n\
    When you add these tests, you’ll face a build error that looks like this:\n\n\
    ```\n'logger' is inaccessible due to 'internal' protection level\n```\n\nTo fix\
    \ this, replace\n\n```\nimport Calc\n```\n\nwith\n\n```\n@testable import Calc\n\
    ```\n\nWhen we add the @testable attribute to an import statement for a module\
    \ compiled with testing enabled, we activate elevated access for that module in\
    \ that scope. Classes and class members marked as public behave as if they were\
    \ marked open. Other entities marked as internal act as if they were declared\
    \ public.\n\n#### Comparison Asserts\n\n*   XCTAssertGreaterThan\n\n*   XCTAssertGreaterThanOrEqual\n\
    \n*   XCTAssertLessThan\n\n*   XCTAssertLessThanOrEqual\n\nFor all comparison\
    \ assertions, the passed expressions need to be of the same type, and that type\
    \ should conform to `Comparable`.\n\nLet’s make use of the comparison asserts\
    \ and write a test for `addRandomNumber` . Here we want to assert that the output\
    \ is greater than the passed argument:\n\n```\nfunc testAddRandomNumber() {\n\
    // Given\nlet calc = Calculator()\n// When\nlet output = calc.addRandomNumber(argument:\
    \ 1)\n// Then\nXCTAssertGreaterThan(output, 1)\n}\n```\n\n#### Errors Asserts\n\
    \n*   XCTAssertThrowsError\n\n*   XCTAssertNoThrow\n\nThese assert methods are\
    \ used to assert functions that throw errors.\n\nOur `Logger` throws an error\
    \ if we try to log a number greater than **1000**. Let’s use these assert methods\
    \ to cover this part.\n\nFirst, we’ll need to add a new test case class to include\
    \ the Logger test. Create it the same way as before and name it “LoggerTests.”\
    \ First, add the @testable import statement. Then remove the autogenerated code\
    \ and replace it with this:\n\n```\nfunc testAddLogShouldThrowIfExceedsLimit()\
    \ {\n// Given\nlet logger = Logger()\nlet number: Double = 2000\n// Then\nXCTAssertThrowsError(try\
    \ logger.log(number))\n}\nfunc testAddLogShouldNotThrowIfUnderLimit() {\n// Given\n\
    let logger = Logger()\nlet number: Double = 500\n// Then\nXCTAssertNoThrow(try\
    \ logger.log(number))\n}\n```\n\nThese two tests cover the two scenarios where\
    \ the logger throws an error and where it doesn’t.\n\n## Expectations\n\nNow that\
    \ you are familiar with the assertion functions, we’ll kick it up a notch. Let’s\
    \ try testing async code. First of all, what is async code? When you execute something\
    \ synchronously, you wait for it to finish before moving on to another task. When\
    \ you execute something asynchronously, you can move on to another task before\
    \ it finishes.\n\nOur `Logger.log(_ number: Double, completion: LogCompletion)`\
    \ function adds the log asynchronously. And it accepts a completion handler and\
    \ calls it when it’s done executing.\n\nLet’s try writing a test for it:\n\n```\n\
    func testAddingLog() throws {\n// Given\nlet logger = Logger()\nlet number: Double\
    \ = 1\n// When\ntry logger.log(number) {\n// Then\nXCTAssertEqual(logger.logs.count,\
    \ 0)\n}\n}\n```\n\nIf you examine the function and test we just wrote closely,\
    \ you’ll find out that the assertion should fail, as the logs count is expected\
    \ to be `1`, not `0`. But when we run this test, it passes and only fails occasionally.\
    \ This is because `log` is async, and what basically happens is that the test\
    \ execution scope finishes before the function finishes execution or calls the\
    \ completion handler. So our assert is never actually called. This is where `XCTAssertTrue`\
    \ alone falls short, async code.\n\nWe can fix this test by forcing it to wait\
    \ until the `log` finishes. There are many ways we can do that: wait for a specific\
    \ time or use `DispatchGroup`. But these could be somewhat of an overkill and/or\
    \ unnecessary, because as you have guessed it, XCTest has got our back again,\
    \ this time with `XCTestExpectation`.\n\n`XCTestExpectation` is an object that\
    \ describes something we are expecting to happen in the future, and we want to\
    \ wait until it happens.\n\nWe can create an expectation this way:\n\n```\nlet\
    \ exp = expectation(description: \"Log added\")\n```\n\nGo ahead and add this\
    \ line at the start of our test.\n\nAnd to wait for an expectation, we need to\
    \ add this line:\n\n```\nwait(for: [exp], timeout: 1)\n```\n\nLet’s fix our assert\
    \ statement as well. Now the test should look like this:\n\n```\nfunc testAddingLog()\
    \ throws {\nlet exp = expectation(description: \"Log added\")\n// Given\nlet logger\
    \ = Logger()\nlet number: Double = 1\n// When\ntry logger.log(number) {\n// Then\n\
    XCTAssertEqual(logger.logs.count, 1)\n}\nwait(for: [exp], timeout: 1)\n}\n```\n\
    \nNow run the test. The test should still be failing but now with a different\
    \ error:\n\n```\nAsynchronous wait failed: Exceeded timeout of 1 seconds, with\
    \ unfulfilled expectations: \"Log added\".\n```\n\nThis here means that the timeout\
    \ has passed without our expectation being fulfilled, which makes sense since\
    \ we never defined when the expectation is fulfilled. This here shows the beauty\
    \ of XCTestExpectations. They don’t just help us wait for async tasks to finish;\
    \ they also act as assertion that the expectation is fulfilled in the given time,\
    \ and if not they report an error.\n\nLet’s fix our test by defining when the\
    \ expectation is fulfilled. Add this line right after the `XCTAssertEqual` line\
    \ :\n\n```\nexp.fulfill()\n```\n\nNow the test passes when we run it!\n\n### Expectation\
    \ Types\n\nJust like XCTAssertTrue, XCTestExpectation is our base expectation,\
    \ and we can use it to wait and test any async code. But we also have other types\
    \ of expectations that make it easier to wait for specific events:\n\n1.  Normal\n\
    \n2.  Key-Value Observing (KVO)\n\n3.  Notification\n\n4.  Predicate\n\nWe covered\
    \ the normal expectation type, and we’ll cover the rest in later chapters."
  trans: "\n# 单元测试中的断言\n\n## 等式断言\n\n* `XCTAssertEqual`\n\n  断言给定的两个表达式相等。\n\n* `XCTAssertNotEqual`\n\
    \n  断言给定的两个表达式不相等。\n\n对于所有等式断言，传入的表达式的类型必须相同，并且该类型需要遵循`Equatable`或`FloatingPoint`协议。\n\
    \n让我们为`add(firstArgument: FloatingPoint, secondArgument: FloatingPoint)`添加一个测试：\n\
    \n```\nfunc testAdd() {\n    // Given\n    let calc = Calculator()\n    // When\n\
    \    let output = calc.add(firstArgument: 1, secondArgument: 2)\n    // Then\n\
    \    XCTAssertEqual(output, 3)\n}\n```\n\n这里我们简单地断言函数的输出等于预期的输出，即“3”。\n\n## 空值断言\n\
    \n* `XCTAssertNil`\n\n  断言给定的表达式为`nil`。\n\n* `XCTAssertNotNil`\n\n  断言给定的表达式不为`nil`。\n\
    \n当`Calculator`实例被初始化时，会创建一个新的`Logger`对象，并将其作为变量保存在`Calculator`内部。当调用`disableLogging()`时，该变量被设置为`nil`。让我们添加测试来覆盖这部分功能：\n\
    \n```\nfunc testLoggerIsInitializedByDefault() {\n    // Given\n    let calc =\
    \ Calculator()\n    // Then\n    XCTAssertNotNil(calc.logger)\n}\nfunc testDisableLoggingResetsLogger()\
    \ {\n    // Given\n    let calc = Calculator()\n    // When\n    calc.disableLogging()\n\
    \    // Then\n    XCTAssertNil(calc.logger)\n}\n```\n\n当你添加这些测试时，会遇到一个如下所示的构建错误：\n\
    \n```\n'logger' is inaccessible due to 'internal' protection level\n```\n\n要修复此问题，请将：\n\
    \n```\nimport Calc\n```\n\n替换为：\n\n```\n@testable import Calc\n```\n\n当我们为启用了测试编译的模块的`import`语句添加`@testable`属性时，我们就为该作用域内的该模块激活了提升的访问权限。标记为`public`的类和类成员的行为就像被标记为`open`一样。其他标记为`internal`的实体则表现为被声明为`public`。\n\
    \n## 比较断言\n\n* `XCTAssertGreaterThan`\n\n* `XCTAssertGreaterThanOrEqual`\n\n*\
    \ `XCTAssertLessThan`\n\n* `XCTAssertLessThanOrEqual`\n\n对于所有比较断言，传入的表达式的类型必须相同，并且该类型需要遵循`Comparable`协议。\n\
    \n让我们利用比较断言为`addRandomNumber`编写一个测试。这里我们希望断言输出大于传入的参数：\n\n```\nfunc testAddRandomNumber()\
    \ {\n    // Given\n    let calc = Calculator()\n    // When\n    let output =\
    \ calc.addRandomNumber(argument: 1)\n    // Then\n    XCTAssertGreaterThan(output,\
    \ 1)\n}\n```\n\n## 错误断言\n\n* `XCTAssertThrowsError`\n\n* `XCTAssertNoThrow`\n\n\
    这些断言方法用于测试会抛出错误的函数。\n\n我们的`Logger`在尝试记录大于**1000**的数字时会抛出错误。让我们使用这些断言方法来覆盖这部分逻辑。\n\
    \n首先，我们需要添加一个新的测试用例类来包含`Logger`的测试。按照之前的方式创建它，并将其命名为`LoggerTests`。首先添加`@testable`导入语句。然后删除自动生成的代码，并替换为以下内容：\n\
    \n```\nfunc testAddLogShouldThrowIfExceedsLimit() {\n    // Given\n    let logger\
    \ = Logger()\n    let number: Double = 2000\n    // Then\n    XCTAssertThrowsError(try\
    \ logger.log(number))\n}\nfunc testAddLogShouldNotThrowIfUnderLimit() {\n    //\
    \ Given\n    let logger = Logger()\n    let number: Double = 500\n    // Then\n\
    \    XCTAssertNoThrow(try logger.log(number))\n}\n```\n\n这两个测试覆盖了`Logger`抛出错误和不抛出错误的两种场景。\n\
    \n## 期望\n\n现在你已经熟悉了断言函数，让我们更进一步。尝试测试异步代码。首先，什么是异步代码？当你同步执行某件事时，你会等它完成后再继续执行另一个任务。当你异步执行某件事时，你可以在它完成之前就继续执行另一个任务。\n\
    \n我们的`Logger.log(_ number: Double, completion: LogCompletion)`函数是异步添加日志的。它接受一个完成处理器，并在执行完毕时调用它。\n\
    \n让我们尝试为其编写一个测试：\n\n```\nfunc testAddingLog() throws {\n    // Given\n    let\
    \ logger = Logger()\n    let number: Double = 1\n    // When\n    try logger.log(number)\
    \ {\n        // Then\n        XCTAssertEqual(logger.logs.count, 0)\n    }\n}\n\
    ```\n\n如果你仔细检查我们刚刚编写的函数和测试，你会发现断言应该失败，因为日志计数预期是`1`，而不是`0`。但是当我们运行这个测试时，它通过了，并且只是偶尔失败。这是因为`log`是异步的，基本上发生的情况是测试执行作用域在函数完成执行或调用完成处理器之前就结束了。所以我们的断言实际上从未被调用。这就是仅靠`XCTAssertTrue`无法胜任的地方——异步代码。\n\
    \n我们可以通过强制测试等待`log`完成来修复这个问题。有很多方法可以做到这一点：等待特定的时间，或者使用`DispatchGroup`。但这些可能有些大材小用和/或不必要，因为正如你所猜到的，XCTest\
    \ 再次为我们提供了支持，这次是用`XCTestExpectation`。\n\n`XCTestExpectation`是一个对象，它描述了我们期望在未来发生的某件事，并且我们希望等待它发生。\n\
    \n我们可以这样创建期望：\n\n```\nlet exp = expectation(description: \"Log added\")\n```\n\
    \n继续，在测试的开头添加这一行。\n\n为了等待一个期望，我们需要添加这一行：\n\n```\nwait(for: [exp], timeout: 1)\n\
    ```\n\n让我们也修复一下断言语句。现在测试应该是这样的：\n\n```\nfunc testAddingLog() throws {\n    let\
    \ exp = expectation(description: \"Log added\")\n    // Given\n    let logger\
    \ = Logger()\n    let number: Double = 1\n    // When\n    try logger.log(number)\
    \ {\n        // Then\n        XCTAssertEqual(logger.logs.count, 1)\n    }\n  \
    \  wait(for: [exp], timeout: 1)\n}\n```\n\n现在运行测试。测试应该仍然失败，但会显示不同的错误：\n\n```\n\
    Asynchronous wait failed: Exceeded timeout of 1 seconds, with unfulfilled expectations:\
    \ \"Log added\".\n```\n\n这意味着超时已过，但我们的期望尚未满足，这是合逻辑的，因为我们从未定义何时满足期望。这正展示了`XCTestExpectation`的精妙之处。它们不仅帮助我们等待异步任务完成；它们还充当断言，即期望在给定的时间内得到满足，如果没有，它们会报告错误。\n\
    \n让我们通过定义何时满足期望来修复测试。在`XCTAssertEqual`这一行之后立即添加这一行：\n\n```\nexp.fulfill()\n```\n\
    \n现在当我们运行测试时，它通过了！\n\n### 期望的类型\n\n就像`XCTAssertTrue`一样，`XCTestExpectation`是我们的基础期望，我们可以用它来等待和测试任何异步代码。但我们还有其他类型的期望，使得等待特定事件更加容易：\n\
    \n1. 常规期望\n\n2. 键值观察期望\n\n3. 通知期望\n\n4. 谓词期望\n\n我们介绍了常规期望类型，其余的将在后续章节中介绍。\n"
- fmt: "# Test Ordering\n\nWe are done with adding tests for now. Open up the checkpoint\
    \ version of the project, which can be found in the chapter’s resources. Run all\
    \ the tests by pressing `Command+U`.\n\nYou should find that one test is failing,\
    \ which is `testIsLoggingEnabledByDefault`. A helpful tip for debugging failing\
    \ tests is to use breakpoints. Xcode has a special breakpoint called **Test Failure\
    \ Breakpoint**, which pauses execution automatically whenever an assertion or\
    \ expectation failure occurs. You can then make use of Xcode’s debugger to examine\
    \ the current state of your variables.\n\nTo add **Test Failure Breakpoint**,\
    \ open the Breakpoint navigator by pressing `Command+8`.\n\nClick the `+` button\
    \ in the lower-left corner. Then select **Test Failure Breakpoint** from the menu\
    \ (Figure [2-6](#505360_1_En_2_Chapter.xhtml#Fig6)).\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6 — Test Failure Breakpoint\n\nOne interesting thing you might have\
    \ noticed is that this test was passing before and the only changes we made were\
    \ adding more tests. This means that our tests are not correctly encapsulated\
    \ and that some tests affect other tests. Therefore, we need to reset the state\
    \ of the shared `Calculator` instance before every test. This can be done by overriding\
    \ the `setUp()` function. Before each test begins, XCTest calls `setUpWithError()`,\
    \ followed by `setUp()`. If state preparation might throw errors, we should override\
    \ `setUpWithError()`. Since we won’t be calling any throwing functions, `setUp()`\
    \ will be enough. Sometimes we might need to perform some sort of cleanup after\
    \ each test. Then we could use `tearDown()` or `tearDownWithError()`.\n\nAdd this\
    \ inside `CalculatorTests` and before the tests:\n\n```\noverride func setUp()\
    \ {\n    UserDefaults.standard.removeObject(forKey: Calculator.kLoggingEnabledDefaultsKey)\n\
    }\n```\n\nThis resets the value of logging enabled as if it was a clean run. Now\
    \ run all tests again. They should pass again.\n\n## Randomized Ordering\n\nThere\
    \ is an option in the **Test** action of the scheme to randomize the test order.\n\
    \nEdit the **Calc** scheme (`Command+Shift+,`). Select the **Test** action. In\
    \ the center pane, next to **CalcTests** is an **Options...** button (Figure [2-7](#505360_1_En_2_Chapter.xhtml#Fig7)).\n\
    \n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7 — Randomize the test order\n\nClick that and, in the pop-up, check\
    \ **Randomize execution order** (Figure [2-8](#505360_1_En_2_Chapter.xhtml#Fig8)).\
    \ This will cause the tests to run in a random order each time.\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8 — Randomize execution order\n\nThis can help you discover more bugs\
    \ and expose dependencies between tests that you wouldn’t catch using normal static\
    \ ordering. The downside, however, is that ordering issues are hard to reproduce\
    \ if they are too specific.\n\n## Code Coverage\n\nSince we were just editing\
    \ our scheme, let’s open it up again to enable code coverage. Code coverage enables\
    \ you to visualize and measure how much of your code is being exercised by tests.\n\
    \nTo enable code coverage, open up the **Test** action again. This time select\
    \ the **Options** tab. There is a checkbox for **Code Coverage**. Check it (Figure\
    \ [2-9](#505360_1_En_2_Chapter.xhtml#Fig9)).\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9 — Code coverage\n\nNow run the tests again. After the tests pass,\
    \ open up the Report navigator by pressing `Command+9`. Choose to display the\
    \ reports **By Group**. And under the latest test, you should find the coverage\
    \ report, which you can select to display it (Figure [2-10](#505360_1_En_2_Chapter.xhtml#Fig10)).\n\
    \n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10 — Code coverage results\n\nThere will be a list of each file in\
    \ the target along with the percentage of the code lines that were executed. You\
    \ should always aim for the highest coverage percentage possible.\n\nOpening up\
    \ an individual file will show the coverage on a per-function and per-closure\
    \ basis. Double-clicking a file or function name will open up that file in the\
    \ editor.\n\nYou should note that having a high coverage percentage doesn’t necessarily\
    \ mean that you have added all the required tests.\n\n## Exercise\n\nOpen the\
    \ final version of the project from the chapter’s resources. Now that you have\
    \ enabled code coverage, try adding tests till you reach at least 90% coverage.\
    \ You should make use of the list under the “What Do We Want to Test?” section.\n\
    \n## Summary\n\nIn this chapter, you got introduced to the basics of unit testing\
    \ in iOS and to all the powerful functionalities that come with the native testing\
    \ framework **XCTest**. We learned of the function of test targets and test case\
    \ classes. We created a test target to be able to add tests for our Calculator\
    \ project. And then we proceeded to add test case classes for each of our components\
    \ to be able to add tests inside them.\n\nWe then started exploring all the different\
    \ types of assertion that XCTest has to offer. We have our **Truthfulness** assertions,\
    \ which basically verify that the expression we provide is either true or false.\
    \ We then have our **Equality** assertions, which we use to verify that two expressions\
    \ are either equal or not equal. We also have **Nullability** assertions to verify\
    \ that the expression we provide is either null or not null. We have our **Comparison**\
    \ assertions, which can be used to compare two expressions and make sure that\
    \ one is greater than the other or vice versa. And finally, we have our **Errors**\
    \ assertions, which we use to verify that a certain expression throws an error\
    \ or that it doesn’t.\n\nIt’s important to point out that we can perform all the\
    \ needed assertions using the plain `XCTAssert` or `XCTAssertTrue`. However, using\
    \ other types of assertions when applicable makes our tests more readable and\
    \ also makes the error messages that Xcode outputs when an assertion fails more\
    \ readable and much more useful.\n\nOther than the various assertions that XCTest\
    \ offers, there are also **expectations**, which make testing asynchronous code\
    \ rather seamless. We basically create an expectation object, and then we mark\
    \ it as fulfilled whenever our asynchronous task is finished. And to make our\
    \ test wait for our async task, we add a single line that tells our test to wait\
    \ till the expectation is fulfilled.\n\nWhen running our whole test suite, we\
    \ might run into the situation where one test causes another test to fail. This\
    \ happens when tests share the same environment and our tests make changes to\
    \ that environment, which then leak to other tests. So when running tests in a\
    \ specific order, tests might start failing due to them not running in a clean\
    \ environment. For that, we learned how to use `XCTestCase`’s setup and teardown\
    \ functions to make any common setup between all our tests and to make any necessary\
    \ cleanup after each test is done.\n\nFinally we explored some of Xcode’s hidden\
    \ features. We added **Test Failure Breakpoint** to make debugging a failing test\
    \ easier using Xcode’s debugger. With this breakpoint enabled, Xcode will pause\
    \ whenever an assertion fails, and then you could inspect the state of your variables\
    \ at the moment of failure. We also enabled **randomized test ordering**, which\
    \ tells Xcode to run your tests in a different order every time. This can help\
    \ in spotting even more bugs. And finally, we enabled **code coverage** to get\
    \ a sense of how much of our code is covered by tests. When this feature is enabled,\
    \ Xcode generates a report after each test run, which can help in identifying\
    \ areas with poor coverage that need more tests."
  raw: '## Test Ordering


    We are done with adding tests for now. Open up the checkpoint version of the project,
    which can be found in the chapter’s resources. Run all the tests by pressing **Command+U**.


    You should find that one test is failing, which is `testIsLoggingEnabledByDefault`.
    A helpful tip for debugging failing tests is to use breakpoints. Xcode has a special
    breakpoint called **Test Failure Breakpoint** , which pauses execution automatically
    whenever an assertion or expectation failure occurs. You can then make use of
    Xcode’s debugger to examine the current state of your variables.


    To add **Test Failure Breakpoint**, open the Breakpoint navigator by pressing
    **Command+8**.


    Click the + button in the lower-left corner. Then select Test Failure Breakpoint
    from the menu (Figure [2-6](#505360_1_En_2_Chapter.xhtml#Fig6)).


    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Test Failure Breakpoint


    One interesting thing you might have noticed is that this test was passing before
    and the only changes we made were adding more tests. This means that our tests
    are not correctly encapsulated and that some tests affect other tests. Therefore,
    we need to reset the state of the shared `Calculator` instance before every test.
    This can be done by overriding the `setUp()` function . Before each test begins,
    XCTest calls `setUpWithError()`, followed by `setUp()`. If state preparation might
    throw errors, we should override `setUpWithError()` . Since we won’t be calling
    any throwing functions, `setUp()` will be enough. Sometimes we might need to perform
    some sort of cleanup after each test. Then we could use `tearDown()` or `tearDownWithError()`.


    Add this inside `CalculatorTests` and before the tests:


    ```

    override func setUp() {

    UserDefaults.standard.removeObject(forKey: Calculator.kLoggingEnabledDefaultsKey)

    }

    ```


    This resets the value of logging enabled as if it was a clean run. Now run all
    tests again. They should pass again.


    ### Randomized Ordering


    There is an option in the **Test** action of the scheme to randomize the test
    order.


    Edit the **Calc** scheme (**Command+Shift+,**). Select the **Test** action. In
    the center pane, next to **CalcTests** is an **Options...** button (Figure [2-7](#505360_1_En_2_Chapter.xhtml#Fig7)).


    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Randomize the test order


    Click that and, in the pop-up, check **Randomize execution order** (Figure [2-8](#505360_1_En_2_Chapter.xhtml#Fig8)).
    This will cause the tests to run in a random order each time.


    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Randomize execution order


    This can help you discover more bugs and expose dependencies between tests that
    you wouldn’t catch using normal static ordering. The downside, however, is that
    ordering issues are hard to reproduce if they are too specific.


    ## Code Coverage


    Since we were just editing our scheme, let’s open it up again to enable code coverage.
    Code coverage enables you to visualize and measure how much of your code is being
    exercised by tests.


    To enable code coverage, open up the Test action again. This time select the Options
    tab. There is a checkbox for Code Coverage. Check it (Figure [2-9](#505360_1_En_2_Chapter.xhtml#Fig9)).


    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Code coverage


    Now run the tests again. After the tests pass, open up the Report navigator by
    pressing **Command+9**. Choose to display the reports **By Group**. And under
    the latest test, you should find the coverage report, which you can select to
    display it (Figure [2-10](#505360_1_En_2_Chapter.xhtml#Fig10)).


    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Code coverage results


    There will be a list of each file in the target along with the percentage of the
    code lines that were executed. You should always aim for the highest coverage
    percentage possible.


    Opening up an individual file will show the coverage on a per-function and per-closure
    basis. Double-clicking a file or function name will open up that file in the editor.


    You should note that having a high coverage percentage doesn’t necessarily mean
    that you have added all the required tests.


    ## Exercise


    Open the final version of the project from the chapter’s resources. Now that you
    have enabled code coverage, try adding tests till you reach at least 90% coverage.
    You should make use of the list under the “What Do We Want to Test?” section.


    ## Summary


    In this chapter, you got introduced to the basics of unit testing in iOS and to
    all the powerful functionalities that come with the native testing framework **XCTest**.
    We learned of the function of test targets and test case classes. We created a
    test target to be able to add tests for our Calculator project. And then we proceeded
    to add test case classes for each of our components to be able to add tests inside
    them.


    We then started exploring all the different types of assertion that XCTest has
    to offer. We have our **Truthfulness** assertions, which basically verify that
    the expression we provide is either true or false. We then have our **Equality**
    assertions, which we use to verify that two expressions are either equal or not
    equal. We also have **Nullability** assertions to verify that the expression we
    provide is either null or not null. We have our **Comparison** assertions, which
    can be used to compare two expressions and make sure that one is greater than
    the other or vice versa. And finally, we have our **Errors** assertions, which
    we use to verify that a certain expression throws an error or that it doesn’t.


    It’s important to point out that we can perform all the needed assertions using
    the plain XCTAssert or XCTAssertTrue. However, using other types of assertions
    when applicable makes our tests more readable and also makes the error messages
    that Xcode outputs when an assertion fails more readable and much more useful.


    Other than the various assertions that XCTest offers, there are also **expectations**,
    which make testing asynchronous code rather seamless. We basically create an expectation
    object, and then we mark it as fulfilled whenever our asynchronous task is finished.
    And to make our test wait for our async task, we add a single line that tells
    our test to wait till the expectation is fulfilled.


    When running our whole test suite, we might run into the situation where one test
    causes another test to fail. This happens when tests share the same environment
    and our tests make changes to that environment, which then leak to other tests.
    So when running tests in a specific order, tests might start failing due to them
    not running in a clean environment. For that, we learned how to use XCTestCase’s
    setup and teardown functions to make any common setup between all our tests and
    to make any necessary cleanup after each test is done.


    Finally we explored some of Xcode’s hidden features. We added **Test Failure Breakpoint**
    to make debugging a failing test easier using Xcode’s debugger. With this breakpoint
    enabled, Xcode will pause whenever an assertion fails, and then you could inspect
    the state of your variables at the moment of failure. We also enabled **randomized
    test ordering**, which tells Xcode to run your tests in a different order every
    time. This can help in spotting even more bugs. And finally, we enabled **code
    coverage** to get a sense of how much of our code is covered by tests. When this
    feature is enabled, Xcode generates a report after each test run, which can help
    in identifying areas with poor coverage that need more tests.'
  trans: "\n# 测试顺序\n\n到目前为止，我们已经完成了测试的添加。打开本章资源中的项目检查点版本。按下 `Command+U` 运行所有测试。\n\n\
    你会发现有一个测试失败了，即 `testIsLoggingEnabledByDefault`。调试失败测试的一个有用技巧是使用断点。Xcode 有一个特殊的断点，叫做**测试失败断点**，它会在断言或预期失败时自动暂停执行。然后你可以利用\
    \ Xcode 的调试器检查变量的当前状态。\n\n要添加**测试失败断点**，请按下 `Command+8` 打开断点导航器。\n\n点击左下角的 `+`\
    \ 按钮。然后从菜单中选择**测试失败断点**（图 2-6）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg](img/505360_1_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6 — 测试失败断点\n\n你可能注意到一个有趣的现象：这个测试之前是能通过的，而我们仅仅添加了更多的测试。这意味着我们的测试没有正确封装，某些测试影响了其他测试。因此，我们需要在每个测试之前重置共享\
    \ `Calculator` 实例的状态。这可以通过重写 `setUp()` 函数来实现。在每个测试开始之前，XCTest 会先调用 `setUpWithError()`，然后是\
    \ `setUp()`。如果状态准备可能会抛出错误，我们应该重写 `setUpWithError()`。由于我们不会调用任何会抛出错误的函数，`setUp()`\
    \ 就足够了。有时我们可能需要在每个测试之后执行一些清理工作，这时可以使用 `tearDown()` 或 `tearDownWithError()`。\n\n\
    在 `CalculatorTests` 内部、测试之前添加以下代码：\n\n```\noverride func setUp() {\n    UserDefaults.standard.removeObject(forKey:\
    \ Calculator.kLoggingEnabledDefaultsKey)\n}\n```\n\n这会将日志记录功能的启用值重置为初始状态，就像一次全新运行一样。现在再次运行所有测试，它们应该都能通过了。\n\
    \n## 随机化顺序\n\n在 scheme 的**测试**操作中，有一个选项可以随机化测试顺序。\n\n编辑 **Calc** scheme（`Command+Shift+,`）。选择**测试**操作。在中央窗格中，**CalcTests**\
    \ 旁边有一个**选项...**按钮（图 2-7）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg](img/505360_1_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7 — 随机化测试顺序\n\n点击该按钮，在弹出的窗口中勾选**随机化执行顺序**（图 2-8）。这将使每次测试运行顺序随机化。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg](img/505360_1_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8 — 随机化执行顺序\n\n这有助于发现更多错误，并暴露测试之间的依赖关系，而这些在使用常规静态顺序时是无法捕捉的。然而，缺点在于，如果顺序问题过于特定，将难以复现。\n\
    \n## 代码覆盖率\n\n既然我们刚才编辑过 scheme，我们再次打开它以启用代码覆盖率。代码覆盖率能让你可视化并衡量有多少代码被测试所覆盖。\n\n\
    要启用代码覆盖率，再次打开**测试**操作。这次选择**选项**标签。有一个**代码覆盖率**复选框。勾选它（图 2-9）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg](img/505360_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9 — 代码覆盖率\n\n现在再次运行测试。测试通过后，按下 `Command+9` 打开报告导航器。选择**按组**显示报告。在最新的测试会话下方，你应该能找到覆盖率报告，选择它即可显示（图\
    \ 2-10）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg](img/505360_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10 — 代码覆盖率结果\n\n列表中会显示目标中每个文件的代码行执行百分比。你应该始终追求尽可能高的覆盖率百分比。\n\n打开单个文件会显示每个函数和闭包的覆盖率。双击文件名或函数名会在编辑器中打开该文件。\n\
    \n需要注意的是，高覆盖率百分比并不一定意味着你已添加了所有必需的测试。\n\n## 练习\n\n打开本章资源中的项目最终版本。既然你已经启用了代码覆盖率，尝试添加测试，直到达到至少\
    \ 90% 的覆盖率。你可以利用“我们想测试什么？”部分下的列表。\n\n## 总结\n\n在本章中，你了解了 iOS 中单元测试的基础知识，以及原生测试框架**XCTest**\
    \ 带来的所有强大功能。我们学习了测试目标和测试用例类的作用。我们创建了一个测试目标，以便能够为我们的计算器项目添加测试。然后，我们继续为每个组件添加了测试用例类，以便在它们内部添加测试。\n\
    \n接着，我们开始探索 XCTest 提供的各种断言类型。我们有**真值**断言，基本上用于验证我们提供的表达式是真还是假。然后我们有**相等性**断言，用于验证两个表达式相等或不相等。我们还有**空值性**断言，用于验证我们提供的表达式是空还是非空。我们的**比较**断言可用于比较两个表达式，并确保一个大于另一个或反之。最后，我们有**错误**断言，用于验证某个表达式是否抛出错误。\n\
    \n需要指出的是，我们可以使用普通的 `XCTAssert` 或 `XCTAssertTrue` 执行所有需要的断言。然而，在适用的情况下使用其他类型的断言，可以使我们的测试更易读，并且当断言失败时，Xcode\
    \ 输出的错误信息也更具可读性和实用性。\n\n除了 XCTest 提供的各种断言，还有**预期**，它使得测试异步代码变得非常无缝。我们基本上创建一个预期对象，然后在异步任务完成时将其标记为已完成。为了让测试等待我们的异步任务，我们添加一行代码，告诉测试等待直到预期被满足。\n\
    \n当运行整个测试套件时，我们可能会遇到一个测试导致另一个测试失败的情况。当测试共享同一个环境，并且我们的测试对该环境进行了更改，这些更改泄露到其他测试时，就会发生这种情况。因此，当按特定顺序运行测试时，测试可能因为不是在干净的环境中运行而开始失败。为此，我们学习了如何使用\
    \ `XCTestCase` 的 setup 和 teardown 函数，为所有测试进行通用的设置，并在每个测试完成后进行必要的清理。\n\n最后，我们探索了\
    \ Xcode 的一些隐藏功能。我们添加了**测试失败断点**，以便使用 Xcode 的调试器更轻松地调试失败的测试。启用此断点后，Xcode 会在断言失败时暂停，然后你可以检查失败时刻变量的状态。我们还启用了**随机化测试顺序**，它告诉\
    \ Xcode 每次以不同的顺序运行测试。这有助于发现更多错误。最后，我们启用了**代码覆盖率**，以了解测试覆盖了我们多少代码。启用此功能后，Xcode\
    \ 会在每次测试运行后生成一份报告，这有助于识别覆盖率较低、需要更多测试的区域。\n"
- fmt: '# 3. UI Tests


    UI tests are your first line of defense, which will tell you whether your application
    works or not; they interact with the application precisely like what your user
    does. The `XCUITest` framework will help you query UI elements inside your app
    and do interactions and then validate UI properties and states. UI tests access
    your app using the iOS accessibility system. Accessibility is a technology that
    gives disabled people the same experience on our applications that all our users
    receive. It offers rich semantic data about the UI, so that voice-over can be
    used to guide users through the application.


    ## Your First Test


    This chapter aims to explore the UI tests in Xcode since we are going to depend
    on them heavily moving forward. We are going to be writing UI tests for a simple
    app that displays a list of cities. You can find the starter project for this
    app in the chapter’s resources. The app (Figure [3-1](#505360_1_En_3_Chapter.xhtml#Fig1))
    contains the main screen, which shows a list of cities. Once you select one of
    them, it will open another screen in which the title will match the chosen city
    name. You will find a button; once you tap this button, it will show a welcome
    alert.


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig1_HTML.png](images/505360_1_En_3_Chapter/505360_1_En_3_Fig1_HTML.png)


    Figure 3-1


    App to be tested


    If we open up the demo app, we’ll see that there is no UI test target for our
    app. So you need to create a new target for UI tests. A UI test target is a separate
    executable with a single purpose, running your UI tests. When you ship your app
    to the App Store or distribute your framework, this test target is not included.


    Open the Test navigator by pressing `Command+6`.


    Click the `+` button in the lower-left corner. Then select `New UI Test Target…`
    from the menu (Figure [3-2](#505360_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig2_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    New UI Test Target


    Once you create the UI test target, it will create a new folder that contains
    your first UI test class that inherits from `XCTestCase` (Figure [3-3](#505360_1_En_3_Chapter.xhtml#Fig3)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig3_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Boilerplate tests


    **Requirements:**


    *   iOS 9 is the minimum version that supports UI tests.

    *   UI tests’ minimum iOS version should match the version of the application
    to be tested.


    You need to click the diamond button beside `testExample`. You’ve just run your
    first test! (Figure [3-4](#505360_1_En_3_Chapter.xhtml#Fig4))


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig4_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Running dummy test


    ## XCUITest Components


    The `XCUITest` framework consists of three main components. We will cover them
    on the go. These components are:


    *   `XCUIApplication`

    *   `XCUIElementQuery`

    *   `XCUIElements`


    ## Our Chapter Goal


    As we mentioned earlier, UI tests interact with the application exactly as our
    user. So we want to interact with our application as our user will do and validate
    if everything is working as expected or not.


    ### First Test Case


    *   As a user, I should see six cities in a table view; when I tap on San Francisco
    city, the app should navigate into another view, and the title should match the
    selected city. Upon navigating into another view, I should be able to see a `"Say
    Hello !"` button, and when I tap it, it should show a welcome message.


    If we converted the test case into actions, it would be as follows:


    1.  Launch the app.

    2.  Count all cities inside the table view.

    3.  Select `"San Francisco"` city.

    4.  Make sure that the title in the details view is `San Francisco`.

    5.  Tap the `"Say Hello !"` button.

    6.  Make sure that you see a welcome alert.


    ## Launching the App


    To run your tests, you must launch the app. So `XCUITest` provides `XCUIApplication`,
    which is a proxy for your application, so that you can `launch`, `terminate`,
    and `activate` your application. Inside each test you must have a single instance
    from `XCUIApplication` and call `app.launch()`.


    **After using the launch API, our first test will be**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    }

    ```


    `XCUIApplication` contains a potent API; we will use it heavily later, which is
    in `launchArguments`. It helps you send a launch argument to the app to make specific
    customization. We will use this API heavily in the book. Before every UI test,
    you must launch your application, whether with launch arguments or not, which
    will clear the application’s previously existing instance.


    ## Querying the UI


    We need to have access to the table view to count the cells inside. But how can
    we do this? `XCUITest` provides a class to do this. `XCUIElementQuery` is a query
    to locate `UIElement`s so that I can assert on `UIElement` or do an interaction.
    Let’s dig deep into how `XCUIElementQuery` works.


    `XCUIElementQuery` does two main functions, relationships and filtering.


    ### Relationships


    *   **Descendants**: Which will get all descendant elements under a specific `UIElement`.


    For example: View’s descendants contain all elements under View: `view.descendants`
    (Figure [3-5](#505360_1_En_3_Chapter.xhtml#Fig5)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Descendants relationship


    *   **Children**: Which will get all elements directly below a specific `UIElement`.
    For example: `TableView`’s children contain all elements directly below `TableView`,
    which are cells (Figure [3-6](#505360_1_En_3_Chapter.xhtml#Fig6)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Children relationship


    *   **Containment**: Which will be helpful if `UIElement` is not unique, but it
    contains a unique element. For example: `cells.containing(NSPredicate(format:
    "label CONTAINS %@", "San Francisco"))` (Figure [3-7](#505360_1_En_3_Chapter.xhtml#Fig7)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Containment relationship


    ### Filtering


    We can combine filters and relationships to be more assertive. We can filter the
    descendants to get only the labels under a specific `UIElement`.


    `tableView.descendants(matching: .button)` will return all descendant elements
    under `TableView` filtered by type button. This is also equivalent to the following
    query: `tableView.buttons`. We can combine queries to build up more complex queries,
    for example, `app.tables.staticTexts` will get all labels under `TableView` (Figure
    [3-8](#505360_1_En_3_Chapter.xhtml#Fig8)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Combining relationships


    You can use the query itself to be the end of the assertions, so you can check
    the count of cells after adding a new cell: `let query = app.tables.cells` and
    then `query.count`. But be careful every time you call this query; it will be
    evaluated again and get the most updated query result.


    **After using the query API, our first test will be**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    XCTAssertEqual(app.tables.cells.count, 6)

    }

    ```'
