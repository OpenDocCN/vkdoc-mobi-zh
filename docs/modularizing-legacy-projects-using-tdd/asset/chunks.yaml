    \n图 7-12  \n设置 `BestSellerBooksStub.json` 的目标成员资格\n\n此外，我们还需要仅允许本地主机域使用 HTTP 而非\
    \ HTTPS。这将防止系统出于安全原因阻止我们的请求。我们可以通过修改 `Info.plist` 来实现（图 7-13）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig13_HTML.jpg](img/505360_1_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13  \n为 localhost 启用 HTTP\n\n现在，是时候真正 stub 网络并更新我们的测试了：\n\n```swift\nfunc\
    \ testShowingBestSellerBooks() throws {\n    // 给定条件\n    let testBundle = Bundle(for:\
    \ type(of: self))\n    let booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
    , withExtension: \"json\")\n    let booksJSON = try String(contentsOf: booksJSONURL!)\n\
    \    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
    \    let app = XCUIApplication()\n    app.launchArguments += [\"TESTING\"]\n \
    \   app.launch()\n    // 触发操作\n    let booksTableView = app.tables\n    let cells\
    \ = booksTableView.cells\n    _ = cells.firstMatch.waitForExistence(timeout: 1.0)\n\
    \    // 验证结果\n    XCTAssertTrue(cells.staticTexts[\"book_title_0\"].label == \"\
    THE LAST THING HE TOLD ME\")\n    XCTAssertTrue(cells.staticTexts[\"book_desc_0\"\
    ].label == \"Hannah Hall discovers truths about her missing husband and bonds\
    \ with his daughter from a previous relationship.\")\n    XCTAssertTrue(cells.staticTexts[\"\
    book_date_0\"].label == \"2021-05-26 22:10:24\")\n    XCTAssertTrue(cells.staticTexts[\"\
    book_title_1\"].label == \"SOOLEY\")\n    XCTAssertTrue(cells.staticTexts[\"book_desc_1\"\
    ].label == \"Samuel Sooleymon receives a basketball scholarship to North Carolina\
    \ Central and determines to bring his family over from a civil war-ravaged South\
    \ Sudan.\")\n    XCTAssertTrue(cells.staticTexts[\"book_date_1\"].label == \"\
    2021-05-26 22:10:24\")\n}\n```\n\n在我们的测试中，首先告诉 Swifter 对指定路径进行 stub 并返回预期的 JSON，以便我们能够在展示的\
    \ UI 中进行断言。然后，我们启动应用程序并传入额外的启动参数来表明我们正在测试。接着，我们对预期单元格的存在性进行断言，同时对显示的数据也进行断言。\n\
    \n这个更新后的测试应该能够通过。但重要的是，现在得益于网络 stub，我们能够在 UI 中对实际数据进行断言（图 7-14）。日后，如果我们显示的内容有误，例如，这个测试将能够捕获它。\n\
    \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig14_HTML.jpg](img/505360_1_En_7_Fig14_HTML.jpg)\n\
    \n图 7-14  \n经过 Stub 后的应用程序\n\n## 总结\n\n在编写测试时，我们常常会遇到需要断言某些无法直接访问的内容的情况，有时还需要控制特定行为以避免不可预测性。在这些情况下，我们解决所有问题的方案就是测试替身。测试替身是任何用于替代真实对象的假对象，它们有多种形式和用途。在这一章中，我们讨论了不同类型的测试替身，还介绍了如何创建替身并将其注入到待测试的代码中。\n\
    \n桩（Stub）是测试替身的一种。桩持有一些预定义的数据，并返回这些数据而不是真实数据。这在测试中很有用，可以提高速度并消除不可预测性。另一种测试替身是模拟对象（Mock）。模拟对象也可以返回假数据，但它们的主要功能是记录对它们发出的调用，还能记录通过函数调用传入的值。这样我们就可以断言待测试对象与模拟对象之间是否发生了特定的交互。\n\
    \n创建测试替身有几种方法。我们可以通过继承来创建，即对原始类进行子类化，然后重写并修改我们想要进行 stub 或 mock 的函数。另一种创建替身的方法是使用协议。如果我们的测试对象依赖于某个协议，那么我们可以通过创建一个符合该协议的新组件，并实现协议的要求来创建替身。\n\
    \n至于将替身注入到待测试代码中，这是一个相当简单的任务。我们可以通过待测试对象的初始化方法进行注入，这被称为初始化器注入。或者，我们可以使用属性注入，即先正常创建对象，然后通过访问其属性并将替身赋值给它来实现注入。\n\
    \n最后，我们探讨了一种具体但非常重要的 stub 类型——在 UI 测试层进行网络 stub。我们使用了一个第三方库来 stub 网络请求，这使得我们能够编写更全面的\
    \ UI 测试。同时，这也提高了测试的稳定性和速度。\n\n# 8. 避免多线程噩梦\n\n并发与多线程是 iOS 开发的核心组成部分。理解它们以及如何正确利用它们，是开发高质量应用程序的关键。缺乏并发通常会导致应用程序无响应，在执行繁重操作时卡死。\n\
    \n## 什么是并发？\n\n并发的概念是指两个或多个任务可以独立定义，并且每个任务无论其他任务是否正在执行都可以被执行。这意味着两个或多个任务可以同时执行，换句话说，就是并发执行。\n\
    \n并发可以通过两种方式实现：上下文切换（时间片轮转）或并行。使用哪种方式取决于处理器的类型。对于单核处理器，使用上下文切换，系统在线程之间切换得足够快，以至于看起来两个任务似乎同时在运行。而对于多核处理器，则是通过在每个独立核心上并行运行每个线程来实现并发。\n\
    \n### GCD\n\n到目前为止，我们讨论了线程以及如何在不同的线程上同时执行两个或多个任务。但线程是一种底层工具，手动管理线程以实现并发是一项相当复杂的任务。\n\
    \nGrand Central Dispatch（GCD）由苹果公司创建，自 iOS 4 起就已可用。GCD 基本上将手动处理线程的工作从开发者手中抽象出来。它帮助开发者利用系统的多线程特性，而无需实际创建或管理线程本身。你无需创建线程，而是使用\
    \ GCD 来调度任务，系统将以最高效的方式执行这些任务。\n\n### 队列\n\n如前所述，GCD 抽象了线程的处理。那么在这种抽象之后，你处理的是什么呢？你处理的是派发队列（dispatch\
    \ queues）。你可以从名称推断出其功能。你将任务提交到队列，GCD 将按先进先出（FIFO）顺序执行它们。根据可用的资源、使用的队列类型以及派发函数（用于提交任务的函数），GCD\
    \ 将决定该任务在何时以及哪个线程上执行。\n\n我们一直在说 GCD 有多出色，这确实没错。然而，仅仅使用 GCD 并不能保证代码没有 bug。关键在于选择正确类型的派发队列以及正确的派发函数。\n"
- fmt: "### Serial vs. Concurrent\n\nQueues have two types, serial and concurrent:\n\
    \nA **serial queue** guarantees that all tasks submitted to it run one after the\
    \ other, meaning that first task has to finish in order for the second task to\
    \ start. This means that a serial queue will not run on more than one thread.\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1  \nSerial queue tasks illustration\n\nA **concurrent queue** can\
    \ run on more than one thread, meaning that the tasks submitted to it can run\
    \ simultaneously. A very important distinction between a concurrent and serial\
    \ queue is that a concurrent queue only guarantees FIFO order when it comes to\
    \ starting the task. However, because the queue doesn’t wait for tasks to finish\
    \ before starting a new task, FIFO order is not guaranteed for the finishing of\
    \ the tasks.\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2  \nConcurrent queue tasks illustration\n\n### Sync vs. Async\n\n\
    When dispatching a task onto a queue, you can either dispatch it synchronously\
    \ or asynchronously. Your choice of serial vs. concurrent affects the **destination**—the\
    \ queue on which the task is submitted to run. This is contrary to sync vs. async,\
    \ where your choice affects the **source**—the queue from which you submit the\
    \ task.\n\nWhen you use a **sync** statement, it will block the current queue\
    \ (source) until the block is executed and finished. When it finishes, it returns\
    \ control back to the caller, and the source queue can resume.\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3  \nSync task illustration\n\nOn the other hand, an **async** statement\
    \ gets executed asynchronously with respect to the current queue (source). Control\
    \ is returned immediately to the caller, and the source queue is never blocked.\
    \ And there’s also no guarantee as to when exactly the block gets executed.\n\n\
    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4  \nAsync task illustration\n\n## Cost of Concurrency\n\n`GCD` is\
    \ meant to simplify the use of threads and add concurrency to the tasks performed\
    \ by our app. And concurrency is meant to improve the performance of our app and\
    \ ultimately lead to a highly responsive app even when performing heavy operations.\
    \ But sadly there is a negative cost to concurrency, which means we can’t just\
    \ apply it whenever and wherever.\n\nConcurrency is used to enhance the app’s\
    \ performance, but misusing it might actually lead to the exact opposite. Imagine\
    \ having a very low-impact operation that we want to perform 10,000 times. You\
    \ might think we have to use `GCD` to improve performance in this case. But if\
    \ we create 10,000 tasks and submit them all to a queue, this will actually result\
    \ in extremely high memory consumption and will negatively impact the allocation\
    \ and deallocation of operation blocks. So in this case, while trying to enhance\
    \ our performance, we actually end up degrading it. `GCD` is not a magical technology\
    \ that enhances the performance regardless of any other factors. Just like any\
    \ technology, it has its limitations. So it all comes down to how `GCD` is used.\
    \ It’s up to you to use it in a way that is effective.\n\nOther than introducing\
    \ overhead on the system resources, using `GCD` also introduces some serious risks.\
    \ One risk in particular is the risk of encountering a **deadlock**. In simple\
    \ terms, a deadlock is a state where two threads are waiting on each other to\
    \ finish so that they can resume. In the following figure, thread A is waiting\
    \ on thread B to finish so that it can resume, and thread B is waiting on thread\
    \ A to finish so it can resume. Since this means that neither can finish, then\
    \ neither can resume. Which causes these two threads to be suspended indefinitely.\
    \ This is a very common risk when working with multithreaded programming, and\
    \ in turn it’s very common when using `GCD`.\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5  \nDeadlock\n\nOther risks when working with `GCD` also include **race\
    \ conditions**. Race conditions occur when two threads are trying to access or\
    \ modify the same resource at the exact same time. The problem with race conditions\
    \ is that it solely depends on when threads are scheduled to perform certain tasks,\
    \ which, by the nature of `GCD`, is completely unpredictable. Which makes identifying,\
    \ debugging, and reproducing them really tricky. This is a synchronization problem\
    \ and can be fixed using serial queues or dispatch barriers if we’re using a concurrent\
    \ queue. There are other ways to achieve synchronization, but we won’t be discussing\
    \ them in our book.\n\n## Reader-Writer Problem\n\nThere are many problems that\
    \ can lead to race conditions. One of these is the reader-writer problem. It is\
    \ one of the more common problems that we might find ourselves facing. This problem\
    \ occurs when there is a shared resource and one thread is trying to **read**\
    \ the shared resource and another thread is trying to **write** to it.\n\nLet's\
    \ talk about how we can identify that our code introduces this kind of problem.\
    \ Our keyword here is **shared resource**. Once we have a shared resource that\
    \ we're not handling properly, it's highly likely to cause a race condition. The\
    \ first place to look for shared resources in any app is our infamous **singleton**\
    \ classes.\n\n### Singleton Classes\n\nSingleton classes are classes that can\
    \ only have one instance. One instance is created and usually held statically\
    \ in the class and then shared everywhere this object is needed. Creating a singleton\
    \ in Swift is as simple as adding an empty private init to our class or struct,\
    \ which makes sure our singleton can't be initialized from outside the class.\
    \ And then we just add a static variable that holds the only created instance\
    \ of this class. Here is an example of a singleton class:\n\n```\nstruct TestStruct\
    \ {\nstatic let shared = TestStruct()\nprivate init() { }\n}\n```\n\nDue to their\
    \ nature, singleton classes can be easily accessed from two threads at the same\
    \ time because a single object serves our whole application. However, normal classes\
    \ can have a shared resource between two threads as well. It all depends on how\
    \ the objects of these classes are being handled and used and how each object\
    \ handles its resources. Once we find a resource that we suspect, we need to ask\
    \ ourselves, is this resource accessible from multiple threads? And can this resource\
    \ be accessed (read) and modified (write)? If the answer to both these questions\
    \ is yes, then we have found a potential race condition."
  raw: '### Serial vs. Concurrent


    Queues have two types, serial and concurrent:


    A **serial queue** (Figure [8-1](#505360_1_En_8_Chapter.xhtml#Fig1)) guarantees
    that all tasks submitted to it run one after the other, meaning that first task
    has to finish in order for the second task to start. This means that a serial
    queue will not run on more than one thread.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Serial queue tasks illustration


    A **concurrent queue** (Figure [8-2](#505360_1_En_8_Chapter.xhtml#Fig2)) can run
    on more than one thread, meaning that the tasks submitted to it can run simultaneously.
    A very important distinction between a concurrent and serial queue is that a concurrent
    queue only guarantees FIFO order when it comes to starting the task. However,
    because the queue doesn’t wait for tasks to finish before starting a new task,
    FIFO order is not guaranteed for the finishing of the tasks.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Concurrent queue tasks illustration


    ### Sync vs. Async


    When dispatching a task onto a queue, you can either dispatch it synchronously
    or asynchronously. Your choice of serial vs. concurrent affects the **destination**—the
    queue on which the task is submitted to run. This is contrary to sync vs. async,
    where your choice affects the **source**—the queue from which you submit the task.


    When you use a **sync** statement (Figure [8-3](#505360_1_En_8_Chapter.xhtml#Fig3)),
    it will block the current queue (source) until the block is executed and finished.
    When it finishes, it returns control back to the caller, and the source queue
    can resume.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Sync task illustration


    On the other hand, an **async** statement (Figure [8-4](#505360_1_En_8_Chapter.xhtml#Fig4))
    gets executed asynchronously with respect to the current queue (source). Control
    is returned immediately to the caller, and the source queue is never blocked.
    And there’s also no guarantee as to when exactly the block gets executed.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Async task illustration


    ## Cost of Concurrency


    GCD is meant to simplify the use of threads and add concurrency to the tasks performed
    by our app. And concurrency is meant to improve the performance of our app and
    ultimately lead to a highly responsive app even when performing heavy operations.
    But sadly there is a negative cost to concurrency, which means we can’t just apply
    it whenever and wherever.


    Concurrency is used to enhance the app’s performance, but misusing it might actually
    lead to the exact opposite. Imagine having a very low-impact operation that we
    want to perform 10,000 times. You might think we have to use GCD to improve performance
    in this case. But if we create 10,000 tasks and submit them all to a queue, this
    will actually result in extremely high memory consumption and will negatively
    impact the allocation and deallocation of operation blocks. So in this case, while
    trying to enhance our performance, we actually end up degrading it. GCD is not
    a magical technology that enhances the performance regardless of any other factors.
    Just like any technology, it has its limitations. So it all comes down to how
    GCD is used. It’s up to you to use it in a way that is effective.


    Other than introducing overhead on the system resources, using GCD also introduces
    some serious risks. One risk in particular is the risk of encountering a **deadlock**
    . In simple terms, a deadlock is a state where two threads are waiting on each
    other to finish so that they can resume. In the following figure, thread A is
    waiting on thread B to finish so that it can resume, and thread B is waiting on
    thread A to finish so it can resume. Since this means that neither can finish,
    then neither can resume. Which causes these two threads to be suspended indefinitely
    (Figure [8-5](#505360_1_En_8_Chapter.xhtml#Fig5)). This is a very common risk
    when working with multithreaded programming, and in turn it’s very common when
    using GCD.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Deadlock


    Other risks when working with GCD also include **race conditions** . Race conditions
    occur when two threads are trying to access or modify the same resource at the
    exact same time. The problem with race conditions is that it solely depends on
    when threads are scheduled to perform certain tasks, which, by the nature of GCD,
    is completely unpredictable. Which makes identifying, debugging, and reproducing
    them really tricky. This is a synchronization problem and can be fixed using serial
    queues or dispatch barriers if we’re using a concurrent queue. There are other
    ways to achieve synchronization, but we won’t be discussing them in our book .


    ## Reader-Writer Problem


    There are many problems that can lead to race conditions. One of these is the
    reader-writer problem. It is one of the more common problems that we might find
    ourselves facing. This problem occurs when there is a shared resource and one
    thread is trying to **read** the shared resource and another thread is trying
    to **write** to it.


    Let''s talk about how we can identify that our code introduces this kind of problem.
    Our keyword here is **shared resource** **.** Once we have a shared resource that
    we''re not handling properly, it''s highly likely to cause a race condition. The
    first place to look for shared resources in any app is our infamous **singleton**
    classes.


    ### Singleton Classes


    Singleton classes are classes that can only have one instance. One instance is
    created and usually held statically in the class and then shared everywhere this
    object is needed. Creating a singleton in Swift is as simple as adding an empty
    private init to our class or struct, which makes sure our singleton can''t be
    initialized from outside the class. And then we just add a static variable that
    holds the only created instance of this class. Here is an example of a singleton
    class:


    ```

    struct TestStruct {

    static let shared = TestStruct()

    private init() { }

    }

    ```


    Due to their nature, singleton classes can be easily accessed from two threads
    at the same time because a single object serves our whole application. However,
    normal classes can have a shared resource between two threads as well. It all
    depends on how the objects of these classes are being handled and used and how
    each object handles its resources. Once we find a resource that we suspect, we
    need to ask ourselves, is this resource accessible from multiple threads? And
    can this resource be accessed (read) and modified (write)? If the answer to both
    these questions is yes, then we have found a potential race condition .'
  trans: "\n### 串行队列与并发队列\n\n队列分为两种类型：串行队列和并发队列：\n\n**串行队列**能保证提交到该队列的所有任务一个接一个地执行，也就是说，第一个任务必须完成，第二个任务才能开始。这意味着串行队列不会在超过一个线程上运行。\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg](img/505360_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1  \n串行队列任务示意图\n\n**并发队列**可以在多个线程上运行，这意味着提交到该队列的任务可以同时执行。并发队列与串行队列的一个非常重要的区别是：并发队列仅在任务启动时保证先进先出（FIFO）顺序。然而，由于队列不会等待任务完成再启动新任务，因此任务的完成顺序并不保证\
    \ FIFO。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg](img/505360_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2  \n并发队列任务示意图\n\n### 同步与异步\n\n将任务派发到队列时，你可以选择同步派发或异步派发。选择串行还是并发会影响**目标**——即任务被提交以运行的队列。这与选择同步还是异步不同，后者会影响**来源**——即你提交任务的那个队列。\n\
    \n当你使用**同步**语句时，它会阻塞当前队列（来源），直到该代码块执行完毕。执行完成后，它将控制权返还给调用者，来源队列便可继续执行。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg](img/505360_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3  \n同步任务示意图\n\n另一方面，**异步**语句相对于当前队列（来源）是异步执行的。控制权会立即返还给调用者，来源队列永远不会被阻塞。并且，也无法保证该代码块具体何时执行。\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg](img/505360_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4  \n异步任务示意图\n\n## 并发的成本\n\n`GCD` 旨在简化线程的使用，并为我们的应用执行的任务增加并发性。而并发的目的是提升应用的性能，最终使应用即使在执行繁重操作时也能保持高度响应。但遗憾的是，并发也有负面成本，这意味着我们不能随时随地应用它。\n\
    \n并发用于提升应用性能，但误用它实际上可能导致适得其反。想象一下，我们有一个影响非常小的操作，需要执行 10,000 次。你可能会认为在这种情况下必须使用\
    \ `GCD` 来提升性能。但是，如果我们创建 10,000 个任务并将它们全部提交给一个队列，这实际上会导致极高的内存消耗，并对操作块的分配和释放产生负面影响。因此在这种情况下，我们在试图提升性能的同时，实际上反而降低了性能。`GCD`\
    \ 并非无视其他因素即可提升性能的神奇技术。与任何技术一样，它也有自身的局限性。所以，一切归结于 `GCD` 的使用方式。如何有效地使用它，取决于你。\n\n\
    除了给系统资源带来开销之外，使用 `GCD` 还会带来一些严重风险。其中一个特定的风险是遭遇**死锁**的风险。简单来说，死锁是一种两个线程互相等待对方完成才能继续执行的状态。在下图中，线程\
    \ A 等待线程 B 完成才能继续，而线程 B 等待线程 A 完成才能继续。这意味着两者都无法完成，因此也无法继续。这会导致这两个线程无限期地挂起。这是多线程编程中非常常见的风险，进而在使用\
    \ `GCD` 时也相当常见。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg](img/505360_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5  \n死锁\n\n使用 `GCD` 时的其他风险还包括**竞争条件**。当两个线程试图在同一时刻访问或修改同一资源时，就会发生竞争条件。竞争条件的问题在于它完全取决于线程何时被调度来执行特定任务，而根据\
    \ `GCD` 的特性，这是完全不可预测的。这使得识别、调试和重现它们变得非常棘手。这是一个同步问题，可以通过使用串行队列来解决，如果使用的是并发队列，则可以使用调度屏障来解决。还有其他实现同步的方法，但我们不会在本书中讨论。\n\
    \n## 读者-写者问题\n\n许多问题都可能导致竞争条件。其中之一就是读者-写者问题。这是我们可能会遇到的更常见的问题之一。当存在一个共享资源，一个线程试图**读取**该共享资源，而另一个线程试图**写入**该资源时，就会发生此问题。\n\
    \n让我们谈谈如何识别我们的代码引入了这类问题。这里的关键词是**共享资源**。一旦我们有一个处理不当的共享资源，就极有可能导致竞争条件。在任何应用中，查找共享资源的首要目标就是我们臭名昭著的**单例**类。\n\
    \n### 单例类\n\n单例类是指只能有一个实例的类。通常会创建一个实例并以静态方式保存在类中，然后在需要该对象的任何地方共享。在 Swift 中创建单例非常简单，只需为我们的类或结构体添加一个空的私有初始化方法，以确保我们的单例不能从类外部初始化。然后，我们再添加一个静态变量来保存该类的唯一实例。以下是一个单例类的示例：\n\
    \n```\nstruct TestStruct {\nstatic let shared = TestStruct()\nprivate init() {\
    \ }\n}\n```\n\n由于其特性，单例类很容易被两个线程同时访问，因为单个对象服务于整个应用。然而，普通类也可能在两个线程之间拥有共享资源。这完全取决于这些类的对象如何处理和使用，以及每个对象如何管理其资源。一旦我们找到可疑的资源，就需要问自己：这个资源能被多个线程访问吗？这个资源能否被访问（读取）和修改（写入）？如果这两个问题的答案都是肯定的，那么我们就找到了一个潜在的竞争条件。\n"
- fmt: "### Identifying a Race Condition\n\nFirst, let’s take a look at the project\
    \ **ReaderWriter** , which you can find in this chapter’s resources. This is an\
    \ empty project that has only one class `Database`, which was written using TDD:\n\
    \n```\npublic class Database {\n// MARK:- Singleton\npublic static let shared\
    \ = Database.shared\n// MARK:- Initializer\nprivate init() {}\n// MARK:- Private\
    \ Variables\nprivate var dictionary: [String:Any] = [:]\n// MARK:- Public Functions\n\
    public func addObject(_ object: Any, for key: String) {\ndictionary[key] = object\n\
    }\npublic func removeObject(for key: String) {\ndictionary.removeValue(forKey:\
    \ key)\n}\npublic func object(for key: String) -> Any? {\nreturn dictionary[key]\n\
    }\npublic func recordsCount() -> Int {\nreturn dictionary.count\n}\npublic func\
    \ reset() {\ndictionary = [:]\n}\n}\n```\n\nThis is a singleton class that acts\
    \ as a very primitive database. It stores key/value pairs inside an internal dictionary.\
    \ And it has some public APIs to interact with the database. There’s an API to\
    \ add a new record, an API to delete a record, an API to retrieve a record, and\
    \ an API to get the current number of records.\n\nThis class has an internal dictionary.\
    \ Could this resource cause a reader/writer data race? To answer this, let’s ask\
    \ our two questions for this resource:\n\n1.  Is this resource accessible from\
    \ multiple threads?\n\n    Since `Database` is a singleton class, then it’s highly\
    \ possible for any of its public APIs to be called from multiple threads. Therefore,\
    \ **yes**.\n\n2.  Can this resource be accessed (read) and modified (write)?\n\
    \n    By looking at the public functions, we have `object(for key: String)` and\
    \ `recordsCount()`, and both access our resource. We also have `addObject(_ object:\
    \ Any, for key: String)` and `removeObject(for key: String)`, and both modify\
    \ our resources. Therefore, **yes**.\n\nThe answers of these two questions tell\
    \ us that this class is not thread-safe and could cause a race condition.\n\n\
    ### Applying TDD to the Problem\n\nBy now, once you read “TDD,” you should immediately\
    \ think of the following cycle (Figure [8-6](#505360_1_En_8_Chapter.xhtml#Fig6)).\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig6_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6\n\nThe TDD cycle\n\nAs always we will start with the first step,\
    \ writing a failing test. We know that our code can cause a race condition when\
    \ we try to read and write at the same time. So now our goal is to write a test\
    \ that fails due to this problem.\n\nNow let’s write our test. First, we’ll start\
    \ by setting up our test. We need to create a new `Database` object and add to\
    \ it a record that we’ll attempt retrieving later on in the test. Our **Given**\
    \ should look like this:\n\n```\n// Given\nlet database = Database.shared\ndatabase.addObject(\"\
    InitialValue\", for: \"InitialKey\")\n```\n\nNext, we’ll attempt to write to our\
    \ database and read from it, in hopes that this will cause a race condition. Our\
    \ **When** should look like this:\n\n```\n// When\ndatabase.addObject(\"Test\"\
    , for: \"Key1\")\nlet _ = database.object(for: \"InitialKey\")\n```\n\nFinally,\
    \ in our **Then** section of the test, we usually assert that the expected behavior\
    \ actually happened. In our case, we actually have two assertions. We have an\
    \ explicit assertion that the record was actually added. We don’t actually care\
    \ much about that assertion. What we care more about is our implicit assertion.\
    \ If the test runs normally, this means that no race condition occurred, but if\
    \ a race condition occurs, the test will crash and fail. This here acts as our\
    \ implicit assertion. Our **Then** should look like this:\n\n```\n// Then\nlet\
    \ count = database.recordsCount()\nXCTAssertEqual(count, 2)\n```\n\nIf we run\
    \ the test we just wrote, it will actually pass. But why did it not cause a race\
    \ condition and fail? Let’s take a deeper look into the test we just wrote:\n\n\
    ```\nfunc testReadWriteDataRace() {\n// Given\nlet database = Database.shared\n\
    database.addObject(\"InitialValue\", for: \"InitialKey\")\n// When\ndatabase.addObject(\"\
    Test\", for: \"Key1\") // #1\nlet _ = database.object(for: \"InitialKey\") //\
    \ #2\n// Then\nlet count = database.recordsCount()\nXCTAssertEqual(count, 2)\n\
    }\n```\n\nWe know that this whole test is a single block. And we know that in\
    \ the context of a block each line is executed one after the other (serially).\
    \ So this means that the call to `addObject` (#1) is executed and finished and\
    \ then the call to `object` (#2) is executed. Which means that the read and write\
    \ operations never execute concurrently (Figure [8-7](#505360_1_En_8_Chapter.xhtml#Fig7)).\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig7_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7\n\nTest illustration\n\nNow what we need to do is add concurrency\
    \ between our two operations. We’ll do that by using a concurrent queue. After\
    \ modifying our test, it should look like this:\n\n```\nfunc testReadWriteDataRace()\
    \ {\n// Given\nlet queue = DispatchQueue(label: \"com.ReaderWriterTests.DatabaseTests\"\
    , attributes: .concurrent)\nlet database = Database.shared\ndatabase.addObject(\"\
    InitialValue\", for: \"InitialKey\")\n// When\nqueue.async { // #1\ndatabase.addObject(\"\
    Test\", for: \"Key1\") // #2\n}\nqueue.async { // #3\nlet _ = database.object(for:\
    \ \"InitialKey\") // #4\n}\n// Then\nlet count = database.recordsCount()\nXCTAssertEqual(count,\
    \ 2) // #5\n}\n```\n\nHere we create a new concurrent queue and give it a label.\
    \ And in the `When` section, we dispatch both our operations asynchronously onto\
    \ our concurrent queue. We use `async` not `sync` because if we use `sync`, as\
    \ we mentioned before, this will affect the source, which is the thread the test\
    \ is running on, meaning our test will be paused at the first `sync` call until\
    \ it’s finished and then we’ll dispatch the second operation onto our concurrent\
    \ queue. In this case, our two operations will never exist on the queue at the\
    \ same time, which defeats the purpose."
