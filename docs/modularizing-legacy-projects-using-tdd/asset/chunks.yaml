    If you look closely at the preceding test, you will find that it’s almost a duplicate
    of our first test. And we could also add five more duplicate tests, each with
    a different error. But the problem with these tests is that they will all be performing
    the exact same checks (checks related to `PersistenceManager` and `DatabaseManager`)
    over and over again, meaning that if one of the duplicates passes or fails when
    it comes to `PersistenceManager` or `DatabaseManager` checks, all other tests
    will for sure behave the same way. So the only value from them is testing the
    `Validator`, since it’s the only variable among them. Once we spot this problem,
    we can safely deduce that these tests should not be here in the integration test
    level, which brings us to our third and final level: unit tests.


    ## Unit Tests


    Before we talk about unit tests, we need to first define what a unit is. This
    is not a fairly easy thing to answer. However, there has been a general consensus
    that when it comes to object-oriented languages (Swift), every class is considered
    a “unit.”


    When testing a specific class, we should at least test the public interface of
    the class. Unit tests should cover the happy scenarios as well as edge cases.


    Unit tests run in a high degree of isolation, meaning each unit should be tested
    to ensure that it’s working properly on its own. This means that if a unit depends
    on another component, this component needs to be stubbed. We will talk about stubbing
    and mocking in detail later in Chapter [7](#505360_1_En_7_Chapter.xhtml). Due
    to this high degree of isolation, unit tests are the fastest type of tests we
    will write.


    When it comes to our demo app, we will need to add unit tests for `Validator`,
    `PersistenceManager`, and `DatabaseManager` . Let’s take a look at unit tests
    that we can write for `Validator`. In our tests for `LoginManager` , we went through
    scenarios in which the validation failed and asserted that the error returned
    from the login function is equal to expected validation error. And we also went
    through scenarios where the validation passed. But for `Validator` tests, we will
    cover all possible scenarios when it comes to validating our credentials:


    ```

    // Test validating a valid credential

    func testValidCredentials() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "valid@valid.com", password: "Password!")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertTrue(result.success)

    XCTAssertNil(result.error)

    }

    // Test validating an invalid credential with empty email

    func testEmptyEmail() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "", password: "Password!")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .emptyEmail)

    }

    // Test validating an invalid credential with invalid email

    func testInvalidEmail() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "invalid", password: "Password!")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .invalidEmail)

    }

    // Test validating an invalid credential with long email

    func testTooLongEmail() {

    // Given

    let validator = Validator()

    let email = randomString(100) + "@valid.com"

    let password = "Password!"

    let credentials = Credentials(email: email, password: password)

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .tooLongEmail)

    }

    // Test validating an invalid credential with empty password

    func testEmptyPassword() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "valid@valid.com", password: "")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .emptyPassword)

    }

    // Test validating an invalid credential with short password

    func testShortPassword() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "valid@valid.com", password: "1234!")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .tooShortPassword)

    }

    // Test validating an invalid credential with long password

    func testLongPassword() {

    // Given

    let validator = Validator()

    let email = "valid@valid.com"

    let password = randomString(41)

    let credentials = Credentials(email: email, password: password)

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .tooLongPassword)

    }

    // Test validating an invalid credential with password having no special

    //characters

    func testNoSpecialCharacterPassword() {

    // Given

    let validator = Validator()

    let credentials = Credentials(email: "valid@valid.com", password: "12345678")

    // When

    let result = validator.validateCredentials(credentials)

    // Then

    XCTAssertFalse(result.success)

    XCTAssertEqual(result.error, .noSpecialCharacters)

    }

    ```


    For our Validator component, we cover all the possible scenarios when it comes
    to validation logic. We have a high degree of freedom when adding unit tests,
    since unit tests are the least expensive type of tests. So all the scenarios we
    chose not to cover with UI or integration tests, we can cover them in this level.'
