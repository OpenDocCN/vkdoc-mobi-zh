    \nFigure 6-18\n\nTesting plan diagram\n\n#### Integration Test\n\nLet’s create\
    \ a new class called `MainViewIntegrationTests`, which will include all integration\
    \ tests related to this module. It’s very useful to group the same types of tests\
    \ together so that you have the flexibility to run a specific type of tests easily.\n\
    \nFrom Figure 6-17 we know that once `MainViewController` is loaded, we will initialize\
