    \        guard let drink = self.drink else {\n            return nil\n       \
    \ }\n        return drink.imageName\n    }\n    public func getDescription() ->\
    \ String? {\n        guard let drink = self.drink else {\n            return nil\n\
    \        }\n        return drink.description\n    }\n}\n```\n\n在添加所有测试后，我们的测试套件（图\
    \ 5-19）和应用程序（图 5-20）将呈现如下状态：\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg](img/505360_1_En_5_Fig20_HTML.jpg)\n\
    \n图 5-20\n\n应用主屏幕\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg](img/505360_1_En_5_Fig19_HTML.jpg)\n\
    \n图 5-19\n\n最终测试套件\n\n与第一个功能相同，我们没有深入探讨 UI 的实现细节，但你可以在本章的资源中找到相关代码。\n\n# 练习\n\n\
    我们已经完成了第一个和第二个故事。但还有两个故事需要处理。你应该能够应用本章介绍的相同流程来实现这两个故事。你可以在本章资源中找到已完成前两个故事的最终项目。\n\
    \n# 总结\n\n在本章中，我们探讨了如何在稍复杂的项目上应用 TDD，这与你在日常工作中可能遇到的挑战类似。我们介绍了 **CoffeePot**，这是一款帮助用户了解不同咖啡类型差异的应用。该应用有两个视图：一个视图列出所有咖啡类型，另一个是单个咖啡类型的详情视图。\n\
    \n在处理此类项目时，我们不能指望一蹴而就。这不仅不切实际，还会导致代码质量低下。关键在于粒度，我们要将项目分解为较小的逻辑块，然后逐一完成。TDD 帮助我们以粒度化的方式思考。由于我们始终需要从一个失败的测试开始，这本质上就是一个单一需求，此时这个需求就是我们要处理的小块。通过应用\
    \ TDD 循环，我们在思考下一个块之前就完成了当前块。\n\n为了将项目分解为更小的块，第一步是正确定义并全面思考所有项目需求。然后，我们将这些需求转化为测试。第一个需求作为我们的第一个测试，启动\
    \ TDD 循环。我们不断重复这个循环，直到完成所有已定义的需求。\n\n我们以第一个需求为例——即查看所有咖啡类型及其图片。在我们甚至还未思考如何实现它之前，就先为此编写了一个\
    \ UI 测试。通常，由于尚未添加任何代码，这个测试会失败。如前所述，TDD 迫使我们清晰思考设计与架构。在本例中，我们采用了名为模型-视图-展示器（MVP）的流行设计模式，这让我们清楚了解要添加的组件以及它们之间的交互方式。由于明确了代码设计思路，我们随后降级添加了集成测试。最后再降一级，开始添加单元测试，并不断循环\
    \ TDD 过程，直至所有测试（包括最初添加的集成测试和 UI 测试）全部通过（图 5-21）。端到端测试通过标志着该功能开发完成。然后我们选取下一个需求，重复相同的测试驱动流程。\n\
    \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig21_HTML.jpg](img/505360_1_En_5_Fig21_HTML.jpg)\n\
    \n图 5-21\n\n用于 TDD 的测试计划图\n\n# 6. 模块化制胜\n\n模块化是指将系统划分为多个相对独立、可互换且具有明确定义接口的模块，每个模块包含执行所需功能的一切要素。每个模块都足够小、足够简单，以便被彻底理解和充分测试。\n\
    \n尽管模块化是极其重要的设计方面，但当代码库增长时，它通常是开发者最先牺牲的部分之一。他们可能仍然命名模块，但模块之间相互依赖，最终形成一团**泥球**。这个术语用于描述缺乏可感知架构的软件系统。\n"
- fmt: '# Why Bother with Modularization?


    From that brief definition of what modularization is, it might already seem that
    it''s a nice-to-have characteristic in your app. But do we need it? Do we need
    to put that extra effort while designing the app''s architecture to make sure
    it''s properly modularized? And do we need to put that even greater effort into
    modularizing an existing app?


    Well, one way to answer these questions is to look at how a modularized and a
    non-modularized app would handle the challenge of scaling. Scaling is a process
    that any successful app goes through, and it basically means an increase in number
    of users, an increase in size of the app and number of features and functionalities
    inside the app, more frequent releases, and in most cases larger teams.


    Let''s talk about how our two types of apps can handle the scaling of their features
    and functionality. If we take a look at a non-modularized app and try to figure
    out how its components depend on and communicate with one another, we will end
    up with a dependency diagram that might look like the diagram in Figure [6-1](#505360_1_En_6_Chapter.xhtml#Fig1).
    It''s a dummy diagram, but it''s quite realistic for a non-modularized app. A
    diagram like this would probably represent a simple, feature-poor app. So if you
    already think this diagram looks complex, then if we try to scale this said app,
    the diagram would most definitely turn into a chaotic mesh of nodes and edges.
    Sadly, the readability of an app''s dependency diagram is not our only problem
    in this situation. If our only concern is that our diagram is not pretty, then
    we can just avoid looking at it. However, our real problem lies in what the diagram
    represents: dependencies. The more dependencies we have, the more unpredictable
    our app becomes.


    This unpredictability becomes evident when we start adding new features in one
    place and end up introducing a bug or a crash in a completely different place
    in our app. So basically due to our complex unmanaged dependencies, when introducing
    a change, we would never be able to know the extent of this change''s impact on
    our app. On the other hand, doing the same thing in a modularized app is vastly
    different (Figure [6-2](#505360_1_En_6_Chapter.xhtml#Fig2)). Due to the complete
    separation in our code, implementing a change means only impacting the module
    that we are changing. Another aspect to think about is dealing with bugs. It''s
    definitely easier to track down a bug in an organized, structured app like our
    modularized app in Figure [6-2](#505360_1_En_6_Chapter.xhtml#Fig2) than the one
    in Figure [6-1](#505360_1_En_6_Chapter.xhtml#Fig1). Probably by just reading the
    description of the bug, we can identify which module to look at. However, in a
    non-modularized app, debugging bugs will be much more tedious.


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig2_HTML.png](images/505360_1_En_6_Chapter/505360_1_En_6_Fig2_HTML.png)


    Figure 6-2: Modularized app


    ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig1_HTML.png](images/505360_1_En_6_Chapter/505360_1_En_6_Fig1_HTML.png)


    Figure 6-1: Non-modularized app


    Other than the size of the app, the size of the team that manages and maintains
    the app can also scale. This will introduce a couple of challenges; one of them
    is onboarding new members. The more readable your code base is, the smoother the
    onboarding. Attempting to understand the code base of a non-modularized app with
    lots of interconnected components can be very confusing. That''s why a modularized
    app, with its separated design, makes it much more readable. Trying to find a
    part in the code responsible for a specific feature in a modularized app is as
    simple as finding the related module and just looking there, instead of looking
    through the whole code base.


    Another challenge that arises with large teams is how teams collaborate with each
    other. In a modularized app, you can have multiple members working on different
    features at the same time without having to communicate with each other; that''s
    of course given that each one is working on a different module. This simultaneous
    work on different modules will also rarely result in conflicts due to the separation
    of changes. That definitely doesn''t apply to non-modularized apps, where attempting
    the same simultaneity would require a lot of extra effort to communicate changes
    across team members and solve conflicts. Another thing that''s made possible by
    modularization is assigning code ownership. It''s much easier to assign ownership
    of modules to certain team members or subteams.


    The advantages and disadvantages of a modularized app and non-modularized app,
    respectively, do not only apply to applications of large scale. The advantages
    and disadvantages apply on apps of all sizes. However, the larger the application,
    the more amplified they are. The takeaway from this is that you don''t need to
    wait for your app to scale to start thinking about modularization. You will reap
    a lot of benefits even if your app is of small scale. And you will set yourself
    for exponentially increasing benefits as your app scales in the future.'
