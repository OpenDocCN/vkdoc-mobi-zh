  trans: "\n### 识别竞态条件\n\n首先，让我们看一下本章资源中的 **ReaderWriter** 项目。这是一个空项目，只包含一个使用测试驱动开发（TDD）编写的类\
    \ `Database`：\n\n```\npublic class Database {\n// MARK:- 单例\npublic static let\
    \ shared = Database.shared\n// MARK:- 初始化方法\nprivate init() {}\n// MARK:- 私有变量\n\
    private var dictionary: [String:Any] = [:]\n// MARK:- 公共方法\npublic func addObject(_\
    \ object: Any, for key: String) {\ndictionary[key] = object\n}\npublic func removeObject(for\
    \ key: String) {\ndictionary.removeValue(forKey: key)\n}\npublic func object(for\
    \ key: String) -> Any? {\nreturn dictionary[key]\n}\npublic func recordsCount()\
    \ -> Int {\nreturn dictionary.count\n}\npublic func reset() {\ndictionary = [:]\n\
    }\n}\n```\n\n这是一个充当极简数据库的单例类。它在内部字典中存储键值对，并提供了一些公共 API 来与数据库交互：有添加新记录的 API、删除记录的\
    \ API、检索记录的 API，以及获取当前记录数的 API。\n\n该类含有一个内部字典。这个资源是否会导致读取器/写入器竞态条件？要回答这个问题，让我们针对该资源提出两个问题：\n\
    \n1.  该资源能否被多个线程访问？\n\n    由于`Database`是单例类，其任何公共 API 都有可能被多个线程调用。因此，**答案是肯定的**。\n\
    \n2.  该资源能否被访问（读取）和修改（写入）？\n\n    查看公共方法，`object(for key: String)`和`recordsCount()`都会访问该资源。而`addObject(_\
    \ object: Any, for key: String)`和`removeObject(for key: String)`则会修改该资源。因此，**答案也是肯定的**。\n\
    \n这两个问题的答案告诉我们，该类并非线程安全的，可能会引发竞态条件。\n\n### 用测试驱动开发（TDD）解决问题\n\n到现在为止，一旦你看到“TDD”，就应该立刻想到以下循环（图\
    \ 8-6）。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig6_HTML.jpg](img/505360_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6\n\nTDD 循环\n\n与往常一样，我们将从第一步开始：编写一个会失败的测试。我们知道，当代码同时尝试读取和写入时，会导致竞态条件。因此，我们现在目标是编写一个因该问题而失败的测试。\n\
    \n现在我们来编写测试。首先，从搭建测试环境开始。我们需要创建一个新的`Database`对象，并向其中添加一条记录，以便稍后在测试中尝试检索它。我们的**给定（Given）**部分应如下所示：\n\
    \n```\n// 给定（Given）\nlet database = Database.shared\ndatabase.addObject(\"InitialValue\"\
    , for: \"InitialKey\")\n```\n\n接着，我们将尝试同时向数据库写入数据并从数据库中读取数据，期望这会引发竞态条件。我们的**当（When）**部分应如下所示：\n\
    \n```\n// 当（When）\ndatabase.addObject(\"Test\", for: \"Key1\")\nlet _ = database.object(for:\
    \ \"InitialKey\")\n```\n\n最后，在测试的**那么（Then）**部分，我们通常会断言预期的行为确实发生了。在本例中，我们实际上有两个断言。一个是显式断言，确认记录确实已被添加。我们并不太关心这个断言。我们更关心的是隐式断言：如果测试正常运行，则说明没有发生竞态条件；但如果发生竞态条件，测试将会崩溃并失败。这在这里充当了我们的隐式断言。我们的**那么（Then）**部分应如下所示：\n\
    \n```\n// 那么（Then）\nlet count = database.recordsCount()\nXCTAssertEqual(count,\
    \ 2)\n```\n\n如果我们运行刚才编写的测试，它实际上会通过。但为什么没有引发竞态条件而失败呢？让我们深入分析一下刚才编写的测试：\n\n```\n\
    func testReadWriteDataRace() {\n// 给定（Given）\nlet database = Database.shared\n\
    database.addObject(\"InitialValue\", for: \"InitialKey\")\n// 当（When）\ndatabase.addObject(\"\
    Test\", for: \"Key1\") // #1\nlet _ = database.object(for: \"InitialKey\") //\
    \ #2\n// 那么（Then）\nlet count = database.recordsCount()\nXCTAssertEqual(count,\
    \ 2)\n}\n```\n\n我们知道整个测试是一个单独的代码块。在代码块的上下文中，每一行代码都是按顺序（串行）执行的。这意味着对`addObject`（#1）的调用会执行并完成后，才会执行对`object`（#2）的调用。也就是说，读取和写入操作从未并发执行（图\
    \ 8-7）。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig7_HTML.jpg](img/505360_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7\n\n测试示意图\n\n现在我们需要在两个操作之间添加并发性。我们将通过使用一个并发队列来实现。修改后的测试应如下所示：\n\n```\n\
    func testReadWriteDataRace() {\n// 给定（Given）\nlet queue = DispatchQueue(label:\
    \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\nlet database\
    \ = Database.shared\ndatabase.addObject(\"InitialValue\", for: \"InitialKey\"\
    )\n// 当（When）\nqueue.async { // #1\ndatabase.addObject(\"Test\", for: \"Key1\"\
    ) // #2\n}\nqueue.async { // #3\nlet _ = database.object(for: \"InitialKey\")\
    \ // #4\n}\n// 那么（Then）\nlet count = database.recordsCount()\nXCTAssertEqual(count,\
    \ 2) // #5\n}\n```\n\n这里我们创建了一个新的并发队列，并为其指定了标签。在**当（When）**部分，我们将两个操作异步派发到该并发队列中。我们使用\
    \ `async` 而不是 `sync`，因为如前所述，使用 `sync` 会影响源线程（即测试运行的线程），这意味着测试会在第一个`sync`调用处暂停，直到它执行完毕，然后我们才会将第二个操作派发到并发队列。在这种情况下，两个操作永远不会同时存在于队列中，这就不符合我们的目的了。\n"
- fmt: "If we try running our test now, it will fail. At first glance this is a good\
    \ thing because that’s what we were trying to reach. But when we actually look\
    \ at the cause of failure, we’ll find that our `XCTAssertEqual` fails. If you\
    \ recall, we don’t really care about this assertion as it doesn’t indicate a race\
    \ condition and it should pass in all cases. This means that the call to `addObject`\
    \ was not executed, which means there’s an issue with our test.\n\nLet’s take\
    \ a look at what happens when we run our test (Figure [8-8](#505360_1_En_8_Chapter.xhtml#Fig8)).\
    \ Because we dispatch our two operations using `async`, this means that the source\
    \ thread is not blocked. And because it’s not blocked, the test will immediately\
    \ resume after we dispatch our operation onto our queue. If we look at our test,\
    \ this means that it will immediately execute our Then section. And that’s why\
    \ the test fails. We execute our assertion before our operations are even executed.\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8\n\nTest illustration\n\nTo fix our test, we’ll need to block the\
    \ test until our operations are done. We can’t use `sync` as mentioned before.\
    \ Instead, we need our test to wait after dispatching our two tasks. We can achieve\
    \ this using `XCTestExpectation`. We’ll create an expectation for each operation\
    \ and fulfill them inside the `async` block. Then we’ll wait for both expectations\
    \ right before our assertion. Our test should look like this:\n\n```\nfunc testReadWriteDataRace()\
    \ {\n    // Given\n    let queue = DispatchQueue(label: \"com.ReaderWriterTests.DatabaseTests\"\
    , attributes: .concurrent)\n    let database = Database.shared\n    database.addObject(\"\
    InitialValue\", for: \"InitialKey\")\n    // When\n    let exp1 = expectation(description:\
    \ \"Adding Key1 done\")\n    let exp2 = expectation(description: \"Adding Key2\
    \ done\")\n    queue.async {\n        database.addObject(\"Test\", for: \"Key1\"\
    )\n        exp1.fulfill()\n    }\n    queue.async {\n        let _ = database.object(for:\
    \ \"InitialKey\")\n        exp2.fulfill()\n    }\n    wait(for: [exp1, exp2],\
    \ timeout: 1)\n    // Then\n    let count = database.recordsCount()\n    XCTAssertEqual(count,\
    \ 2)\n}\n```\n\nNow that we fixed the test and made it wait for the operations\
    \ to be performed (Figure [8-9](#505360_1_En_8_Chapter.xhtml#Fig9)), let’s run\
    \ it again while looking out for the race condition we’re looking for. When we\
    \ run our test, it will (most probably) pass. This is both good and bad news.\
    \ It’s good news because it means the expectations we added actually did their\
    \ job. But bad news because we now have two operations running on a concurrent\
    \ queue, but they are still not being performed at the same time.\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9\n\nTest illustration\n\nWhere is our race condition? Does this mean\
    \ that `Database` is thread-safe?\n\nActually the answer to these questions is\
    \ hidden in the previous paragraph. If you take a look at it, you’ll find that\
    \ it’s mentioned that the test will **most probably** pass. There’s a reason why\
    \ we’re not 100% certain if the test will pass. This is because there’s a very\
    \ small chance that the race condition we’re looking for actually happens. Since\
    \ the queue we’re using is concurrent, then GCD might decide to run each operation\
    \ on a separate thread, leading to the race condition. But as mentioned before,\
    \ the probability of this happening is extremely low. The reason for this is that\
    \ the two operations in question are light operations and there are also only\
    \ two tasks dispatched on the queue. And it’s highly unlikely for GCD to decide\
    \ to allocate an extra thread for our queue. And even if GCD allocates an extra\
    \ thread, because of the nature of our operations and how light they are and how\
    \ quick they take to finish, the probability of them being executed at the exact\
    \ same time is really low as well.\n\nSo now what? We know that there's a very\
    \ low probability that our test will fail (close to zero). Sadly this means that\
    \ our test has little to no value. If the test doesn’t fail even though it should,\
    \ then there’s no reason to even have that test. Luckily, there’s still something\
    \ we can do. We know that the probability of a race condition is extremely low\
    \ because there’s only two tasks on our queue and they’re both light. Which means\
    \ if we add more tasks to our queue, we will increase this probability. We can\
    \ even increase this probability significantly till we reach a point where we’re\
    \ certain that a race condition will happen. Let’s take a look at how we can do\
    \ that:\n\n```\nfunc testReadWriteDataRace() {\n    // Given\n    let queue =\
    \ DispatchQueue(label: \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n\
    \    let database = Database.shared\n    database.addObject(\"InitialValue\",\
    \ for: \"InitialKey\")\n    // When\n    var expectations:[XCTestExpectation]\
    \ = []\n    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let\
    \ exp = expectation(description: \"Adding \\(key) done\")\n        queue.async\
    \ {\n            database.addObject(\"Test\", for: key)\n            exp.fulfill()\n\
    \        }\n        expectations.append(exp)\n    }\n    for i in 0..<500 {\n\
    \        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
    \ \"Adding \\(key) done\")\n        queue.async {\n            let _ = database.object(for:\
    \ \"InitialKey\")\n            exp.fulfill()\n        }\n        expectations.append(exp)\n\
    \    }\n    wait(for: expectations, timeout: 10)\n    // Then\n    let count =\
    \ database.recordsCount()\n    XCTAssertEqual(count, 501)\n}\n```\n\nWe simply\
    \ modified our test so we would be performing 500 read operations and 500 write\
    \ operations. By overloading our queue with this extremely high number of tasks,\
    \ we’re basically forcing GCD to allocate more than one thread for this queue,\
    \ and due to the high number of reads and writes, it is almost certain that two\
    \ of these operations are executed at the same time.\n\nIf we try running our\
    \ test now, it will finally fail due to a race condition. ![../images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif](images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif)"
  raw: 'If we try running our test now, it will fail. At first glance this is a good
    thing because that’s what we were trying to reach. But when we actually look at
    the cause of failure, we’ll find that our `XCTAssertEqual` fails. If you recall,
    we don’t really care about this assertion as it doesn’t indicate a race condition
    and it should pass in all cases. This means that the call to `addObject` was not
    executed, which means there’s an issue with our test.


    Let’s take a look at what happens when we run our test (Figure [8-8](#505360_1_En_8_Chapter.xhtml#Fig8)).
    Because we dispatch our two operations using `async`, this means that the source
    thread is not blocked. And because it’s not blocked, the test will immediately
    resume after we dispatch our operation onto our queue. If we look at our test,
    this means that it will immediately execute our **Then** section. And that’s why
    the test fails. We execute our assertion before our operations are even executed.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Test illustration


    To fix our test, we’ll need to block the test until our operations are done. We
    can’t use `sync` as mentioned before. Instead, we need our test to wait after
    dispatching our two tasks. We can achieve this using `XCTestExpectation` . We’ll
    create an expectation for each operation and fulfill them inside the `async` block.
    Then we’ll wait for both expectations right before our assertion. Our test should
    look like this:


    ```

    func testReadWriteDataRace() {

    // Given

    let queue = DispatchQueue(label: "com.ReaderWriterTests.DatabaseTests", attributes:
    .concurrent)

    let database = Database.shared

    database.addObject("InitialValue", for: "InitialKey")

    // When

    let exp1 = expectation(description: "Adding Key1 done")

    let exp2 = expectation(description: "Adding Key2 done")

    queue.async {

    database.addObject("Test", for: "Key1")

    exp1.fulfill()

    }

    queue.async {

    let _ = database.object(for: "InitialKey")

    exp2.fulfill()

    }

    wait(for: [exp1, exp2], timeout: 1)

    // Then

    let count = database.recordsCount()

    XCTAssertEqual(count, 2)

    }

    ```


    Now that we fixed the test and made it wait for the operations to be performed
    (Figure [8-9](#505360_1_En_8_Chapter.xhtml#Fig9)), let’s run it again while looking
    out for the race condition we’re looking for. When we run our test, it will (most
    probably) pass. This is both good and bad news. It’s good news because it means
    the expectations we added actually did their job. But bad news because we now
    have two operations running on a concurrent queue, but they are still not being
    performed at the same time.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Test illustration


    Where is our race condition? Does this mean that `Database` is thread-safe?


    Actually the answer to these questions is hidden in the previous paragraph. If
    you take a look at it, you’ll find that it’s mentioned that the test will **most
    probably** pass. There’s a reason why we’re not 100% certain if the test will
    pass. This is because there’s a very small chance that the race condition we’re
    looking for actually happens. Since the queue we’re using is concurrent, then
    GCD might decide to run each operation on a separate thread, leading to the race
    condition. But as mentioned before, the probability of this happening is extremely
    low. The reason for this is that the two operations in question are light operations
    and there are also only two tasks dispatched on the queue. And it’s highly unlikely
    for GCD to decide to allocate an extra thread for our queue. And even if GCD allocates
    an extra thread, because of the nature of our operations and how light they are
    and how quick they take to finish, the probability of them being executed at the
    exact same time is really low as well.


    So now what? We know that there''s a very low probability that our test will fail
    (close to zero). Sadly this means that our test has little to no value. If the
    test doesn’t fail even though it should, then there’s no reason to even have that
    test. Luckily, there’s still something we can do. We know that the probability
    of a race condition is extremely low because there’s only two tasks on our queue
    and they’re both light. Which means if we add more tasks to our queue, we will
    increase this probability. We can even increase this probability significantly
    till we reach a point where we’re certain that a race condition will happen. Let’s
    take a look at how we can do that:


    ```

    func testReadWriteDataRace() {

    // Given

    let queue = DispatchQueue(label: "com.ReaderWriterTests.DatabaseTests", attributes:
    .concurrent)

    let database = Database.shared

    database.addObject("InitialValue", for: "InitialKey")

    // When

    var expectations:[XCTestExpectation] = []

    for i in 0..<500 {

    let key = "Key\(i+1)"

    let exp = expectation(description: "Adding \(key) done")

    queue.async {

    database.addObject("Test", for: key)

    exp.fulfill()

    }

    expectations.append(exp)

    }

    for i in 0..<500 {

    let key = "Key\(i+1)"

    let exp = expectation(description: "Adding \(key) done")

    queue.async {

    let _ = database.object(for: "InitialKey")

    exp.fulfill()

    }

    expectations.append(exp)

    }

    wait(for: expectations, timeout: 10)

    // Then

    let count = database.recordsCount()

    XCTAssertEqual(count, 501)

    }

    ```


    We simply modified our test so we would be performing 500 read operations and
    500 write operations. By overloading our queue with this extremely high number
    of tasks, we’re basically forcing GCD to allocate more than one thread for this
    queue, and due to the high number of reads and writes, it is almost certain that
    two of these operations are executed at the same time.


    If we try running our test now, it will finally fail due to a race condition.
    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif](images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif)'
  trans: "\n如果现在尝试运行我们的测试，它将会失败。乍一看，这是件好事，因为这正是我们试图达到的目的。但当我们实际查看失败原因时，会发现是 `XCTAssertEqual`\
    \ 断言失败了。如果你还记得，我们其实并不关心这个断言，因为它并不指示竞争条件，并且在所有情况下都应该通过。这意味着 `addObject` 的调用未被执行，也就是说我们的测试存在问题。\n\
    \n让我们看看运行测试时会发生什么（图 8-8）。因为我们使用 `async` 派发了两个操作，这意味着源线程不会被阻塞。由于它不被阻塞，测试将在我们将操作派发到队列后立即继续执行。回到我们的测试中，这意味着它会立即执行“Then”部分。这就是测试失败的原因。我们在操作尚未执行时就执行了断言。\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg](img/505360_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8\n\n测试示意图\n\n要修复我们的测试，需要阻塞测试直到操作完成。如前所述，我们不能使用 `sync`。相反，我们需要测试在派发两个任务后等待。我们可以使用\
    \ `XCTestExpectation` 来实现这一点。我们将为每个操作创建一个期望，并在 `async` 块内实现它们。然后，就在断言之前等待这两个期望。我们的测试应该像这样：\n\
    \n```\nfunc testReadWriteDataRace() {\n    // Given\n    let queue = DispatchQueue(label:\
    \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n    let database\
    \ = Database.shared\n    database.addObject(\"InitialValue\", for: \"InitialKey\"\
    )\n    // When\n    let exp1 = expectation(description: \"Adding Key1 done\")\n\
    \    let exp2 = expectation(description: \"Adding Key2 done\")\n    queue.async\
    \ {\n        database.addObject(\"Test\", for: \"Key1\")\n        exp1.fulfill()\n\
    \    }\n    queue.async {\n        let _ = database.object(for: \"InitialKey\"\
    )\n        exp2.fulfill()\n    }\n    wait(for: [exp1, exp2], timeout: 1)\n  \
    \  // Then\n    let count = database.recordsCount()\n    XCTAssertEqual(count,\
    \ 2)\n}\n```\n\n现在我们已经修复了测试，让它等待操作执行完毕（图 8-9），让我们再次运行它，同时留意我们正在寻找的竞争条件。当我们运行测试时，它（极有可能）会通过。这既是好消息也是坏消息。好消息是因为这意味着我们添加的期望确实发挥了作用。但坏消息是因为我们现在在并发队列上运行两个操作，但它们仍然没有同时执行。\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg](img/505360_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9\n\n测试示意图\n\n我们的竞争条件在哪里？这是否意味着 `Database` 是线程安全的？\n\n实际上，这些问题的答案隐藏在前一段中。如果你仔细看，会发现提到测试**极有可能**通过。我们之所以不能\
    \ 100% 确定测试是否会通过，是有原因的。这是因为我们正在寻找的竞争条件实际发生的可能性非常小。由于我们使用的队列是并发的，GCD 可能会决定在单独的线程上运行每个操作，从而导致竞争条件。但如前所述，这种情况发生的概率极低。原因在于，这两个操作是轻量级的操作，并且队列上只派发了两个任务。GCD\
    \ 几乎不太可能决定为我们的队列额外分配一个线程。即使 GCD 额外分配了一个线程，由于我们操作的性质、它们的轻量级以及它们完成的速度之快，它们恰好同时执行的概率也确实很低。\n\
    \n那么现在该怎么办？我们知道测试失败的概率非常低（接近于零）。遗憾的是，这意味着我们的测试几乎没有价值。如果测试本应失败却没有失败，那么保留这个测试根本就没有理由。幸运的是，我们仍然可以做一些事情。我们知道竞争条件的概率极低，因为队列上只有两个任务，而且它们都很轻量。这意味着如果我们在队列上添加更多任务，就会增加这种概率。我们甚至可以显著提高这个概率，直到我们确信竞争条件一定会发生。让我们看看如何做到这一点：\n\
    \n```\nfunc testReadWriteDataRace() {\n    // Given\n    let queue = DispatchQueue(label:\
    \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n    let database\
    \ = Database.shared\n    database.addObject(\"InitialValue\", for: \"InitialKey\"\
    )\n    // When\n    var expectations:[XCTestExpectation] = []\n    for i in 0..<500\
    \ {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
    \ \"Adding \\(key) done\")\n        queue.async {\n            database.addObject(\"\
    Test\", for: key)\n            exp.fulfill()\n        }\n        expectations.append(exp)\n\
    \    }\n    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let\
    \ exp = expectation(description: \"Adding \\(key) done\")\n        queue.async\
    \ {\n            let _ = database.object(for: \"InitialKey\")\n            exp.fulfill()\n\
    \        }\n        expectations.append(exp)\n    }\n    wait(for: expectations,\
    \ timeout: 10)\n    // Then\n    let count = database.recordsCount()\n    XCTAssertEqual(count,\
    \ 501)\n}\n```\n\n我们简单地修改了测试，以便执行 500 次读取操作和 500 次写入操作。通过用这个极高的任务数来过载我们的队列，我们基本上迫使\
    \ GCD 为这个队列分配不止一个线程，并且由于读写操作的数量很大，几乎可以确定其中两个操作会同时执行。\n\n如果现在尝试运行我们的测试，它最终会因竞争条件而失败。![../images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif](img/505360_1_En_8_Figa_HTML.gif)\n"
- fmt: "### Thread Sanitizer\n\nHowever, now we have a different problem. Our test\
    \ now takes too much time. And if we try to reduce the number of iterations, we\
    \ will reduce its accuracy in catching threading issues. Luckily, we have access\
    \ to a tool in Xcode that can help us with this, the `Thread Sanitizer`.\n\nThe\
    \ `Thread Sanitizer`, commonly referred to as `TSan`, is a tool Apple provides\
    \ as part of the LLVM compiler. It helps in auditing threading issues in your\
    \ Swift and C language written code. This sanitizer is able to detect when multiple\
    \ threads attempt to access the same resource and at least one of these accesses\
    \ is a write operation. It’s able to do that by rebuilding the whole app and adding\
    \ checks around each memory access in your code. These checks record that a memory\
    \ access occurred along with when it occurred and from which thread. And from\
    \ that information, it’s able to add a breakpoint whenever an illegal memory access\
    \ occurs.\n\nThe beauty of the `Thread Sanitizer` is that it’s able to detect\
    \ the silent data races. In many cases, the same resource can be accessed and\
    \ modified from different threads, but the threads miss collision by microseconds.\
    \ Without the sanitizer, this scenario will go unnoticed as it won’t cause misbehavior\
    \ or a crash. However in other times, they may collide. This randomness is what\
    \ makes threading issues so hard to debug. But with the `Thread Sanitizer` enabled,\
    \ catching threading issues becomes far more likely to happen.\n\nTo enable the\
    \ `Thread Sanitizer`, we need to go into our scheme configuration (Figure [8-10](#505360_1_En_8_Chapter.xhtml#Fig10)).\n\
    \nLet’s enable the sanitizer for our Run and Test configurations.\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig10_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10  \nEnabling Thread Sanitizer\n\nNow in order to make Xcode pause\
    \ whenever a data race is detected, we need to add `Runtime Issue Breakpoint`.\
    \ We can add that from the Breakpoint navigator (Figure [8-11](#505360_1_En_8_Chapter.xhtml#Fig11)).\n\
    \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig11_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11  \nAdding Runtime Issue Breakpoint\n\nSince we now have the `Thread\
    \ Sanitizer` enabled, we can actually reduce the number of iterations a bit if\
    \ we want.\n\n### Make It Pass\n\nNow that we’re finally done with the first step\
    \ in the TDD cycle, it’s time to fix the test whose failure we just celebrated.\
    \ As mentioned before, race conditions are a problem of synchronization and can\
    \ be fixed using many ways. Let’s try fixing it using a serial queue. The goal\
    \ is to leverage a serial queue in order to achieve synchronization between all\
    \ the operations performed by our database object. We need to make sure that only\
    \ one operation is performed at any given time.\n\nWhen we add the serial queue,\
    \ our `Database` class should look like this:\n\n```\npublic class Database {\n\
    \    // MARK:- Singleton\n    public static let shared = Database.shared\n   \
    \ // MARK:- Private Variables\n    private var dictionary: [String:Any] = [:]\n\
    \    private let queue = DispatchQueue(label: \"com.ReaderWriter.Database\")\n\
    \    // MARK:- Public Functions\n    public func addObject(_ object: Any, for\
    \ key: String) {\n        queue.sync {\n            dictionary[key] = object\n\
    \        }\n    }\n    public func removeObject(for key: String) {\n        queue.sync\
    \ {\n            _ = dictionary.removeValue(forKey: key)\n        }\n    }\n \
    \   public func object(for key: String) -> Any? {\n        queue.sync {\n    \
    \        return dictionary[key]\n        }\n    }\n    public func recordsCount()\
    \ -> Int {\n        queue.sync {\n            return dictionary.count\n      \
    \  }\n    }\n    public func reset() -> Int {\n        queue.sync {\n        \
    \    dictionary = [:]\n        }\n    }\n}\n```\n\nNow let’s try running our test\
    \ once again. It should be passing ✅. Let’s run the rest of our tests as well\
    \ to make sure our change did not cause any regressions. Since all tests are passing\
    \ and there’s nothing that needs refactoring, this means we’re done fixing this\
    \ issue. So there you have it. We identified a problem in our code that had to\
    \ do with multithreading, and we successfully applied TDD to fix this issue.\n\
    \n## Fixing Threading Issues in Books\n\n`Books` is the project introduced in\
    \ Chapter [6](#505360_1_En_6_Chapter.xhtml). Currently, `Books` is a modularized\
    \ app, but that doesn’t mean it’s bug-free. Luckily for us, when `Books` was being\
