  raw: '### CoffeeDrinksDataSource


    We’ll start with our smallest unit, which is `CoffeeDrinksDataSource` . It’s an
    object that has the sole responsibility of reading a plist file from disk and
    returning it in the form of `Data`. Due to its nature, we’ll find that writing
    a test for it will be basically duplicating the implementation code. This is an
    example of the very rare cases where we encounter a class that doesn’t need to
    be tested. But at the same time, we can’t inject this logic into another class
    because we’ll need it to facilitate other tests. (More on that later in this chapter.)


    Now let’s write our class:


    ```

    class CoffeeDrinksDataSource {

    func plistDataSourcePath() -> String? {

    var fileName = "coffee_drinks"

    // UITests

    if let stubbedFileName = ProcessInfo.processInfo.environment["coffee_drinks_stubbed"]
    {

    fileName = stubbedFileName

    }

    return Bundle.main.path(forResource: fileName, ofType: "plist")

    }

    public func getData() -> Data? {

    let dataPath = plistDataSourcePath()

    guard let path = dataPath, let dataArray = NSArray(contentsOfFile:path) else {

    return nil

    }

    var data:Data?

    do {

    data = try JSONSerialization.data(withJSONObject: dataArray)

    }catch {

    print("JSON serialization failed:  \(error)")

    }

    return data

    }

    }

    ```


    `CoffeeDrinksDataSource` is implemented to read data from the plist file and return
    data from this plist file. There is some extra logic we need to add used only
    for UI tests. There are times when we need our UI test code to pass some information
    to our mobile app, not by typing it into a text field or a user interaction but
    by sending it as a command-line argument or as a launch environment/arguments.
    If you remember the first UI test we wrote, we needed to stub the data inside
    the coffee drinks view instead of depending on the actual data that may change
    over the application’s life and can cause our test to be unreliable . Here we
    add the ability to stub the data returned by the data source through environment
    variables. We access the environment variables using `ProcessInfo.processInfo.environment`.


    ### CoffeeDrinksModelTests


    Since `CoffeeDrinksModel` depends on `CoffeeDrinksDataSource` , if we need to
    test it precisely, we need to exclude all these objects that `CoffeeDrinksModel`
    depends on and make it return expected data and assert on all public methods inside
    `CoffeeDrinksModel`. This is called **stubbing** .


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    CoffeeDrinksModel dependency on CoffeeDrinksDataSource


    Stubbing means creating a fake version of an object that can stand in for the
    real one, helping your tests run more quickly and more reliably. We will need
    to stub some components from here on out. We won’t dive deep in this topic as
    we will be covering it later on in Chapter [7](#505360_1_En_7_Chapter.xhtml).


    In Figure [5-9](#505360_1_En_5_Chapter.xhtml#Fig9) the `CoffeeDrinksModel` class
    uses `CoffeeDrinksDataSource` to fetch all coffee drinks from the plist file.
    Testing `CoffeeDrinksModel` without stubbing `CoffeeDrinksDataSource` will be
    challenging and will not be reliable; in other words, if we change the data inside
    the plist file, this test will fail. The purpose of stubbing (Figure [5-10](#505360_1_En_5_Chapter.xhtml#Fig10))
    is to isolate and focus on the code being tested and not on external dependencies’
    behavior or state. The external dependency here is `CoffeeDrinksDataSource`, which
    provides the data from the plist file.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Replace the dependency with a stub object


    Now let’s write our stub object:


    ```

    class CoffeeDrinksDataSourceStub: CoffeeDrinksDataSource {

    var stubbedDataJSON: String?

    init(stubbedDataJSON: String){

    self.stubbedDataJSON = stubbedDataJSON

    }

    public override func getData() -> Data? {

    let jsonData = self.stubbedDataJSON?.data(using: .utf8)

    return jsonData

    }

    }

    ```


    CoffeeDrinksDataSourceStub will take the expected data in its constructor and
    return it as data inside the getData() function. So no logic, and we can test
    CoffeeDrinksModel separately.


    Let’s now write tests for `CoffeeDrinksModel` using the newly created stub object
    :


    ```

    func testFetchingAllCoffeeDrinks() {

    //Given

    let expectedDrinks = """

    [

    {

    "name": "coffee1",

    "image_name": "black",

    "desc": "desc1"

    },

    {

    "name": "coffee2",

    "image_name": "black",

    "desc": "desc2"

    }

    ]

    """

    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:expectedDrinks)

    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)

    // when

    let actualDrinks = coffeeDrinksModel.fetchAllCoffeDrinks()

    // then

    let coffeeDrink1 = actualDrinks![0]

    XCTAssertEqual(coffeeDrink1.name, "coffee1")

    XCTAssertEqual(coffeeDrink1.imageName, "black")

    XCTAssertEqual(coffeeDrink1.description, "desc1")

    let coffeeDrink2 = actualDrinks![1]

    XCTAssertEqual(coffeeDrink2.name, "coffee2")

    XCTAssertEqual(coffeeDrink2.imageName, "black")

    XCTAssertEqual(coffeeDrink2.description, "desc2")

    }

    ```


    After applying the TDD cycle as we slowly build our test case till we reach the
    preceding comprehensive test, we will end up with the following two components:


    ```

    class CoffeeDrinksModel {

    private var dataSource:CoffeeDrinksDataSource?

    init(source:CoffeeDrinksDataSource?) {

    self.dataSource = source

    }

    public func fetchAllCoffeDrinks() ->[CoffeeDrink]? {

    guard let data = self.dataSource?.getData() else {

    return []

    }

    var drinks:[CoffeeDrink]?

    do {

    drinks = try JSONDecoder().decode([CoffeeDrink].self, from: data)

    } catch {

    }

    return drinks

    }

    }

    ```


    ```

    struct CoffeeDrink: Codable, Equatable {

    let name:String?

    let imageName: String?

    let description: String?

    private enum CodingKeys : String, CodingKey {

    case name = "name"

    case imageName = "image_name"

    case description = "desc"

    }

    }

    ```


    Let’s comment out the previous test inside CoffeeDrinksIntegrationTests and run
    CoffeeDrinksModelTests.


    It should pass now ✅.


    This will be our current status (Figure [5-11](#505360_1_En_5_Chapter.xhtml#Fig11)).


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig11_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Testing plan diagram (first unit added)'
  trans: "\n### `CoffeeDrinksDataSource`\n\n我们从最小的单元`CoffeeDrinksDataSource`开始。它是一个对象，唯一职责是从磁盘读取\
    \ plist 文件，并以`Data`的形式返回。由于其特性，我们会发现为它编写测试基本上等同于重复实现代码。这是一个极为罕见的案例，我们遇到的类不需要测试。但与此同时，我们又不能将这种逻辑注入到另一个类中，因为我们需要用它来辅助其他测试。（本章后面会详细讨论这一点。）\n\
    \n现在我们来编写这个类：\n\n```\nclass CoffeeDrinksDataSource {\n    func plistDataSourcePath()\
    \ -> String? {\n        var fileName = \"coffee_drinks\"\n        // UITests\n\
    \        if let stubbedFileName = ProcessInfo.processInfo.environment[\"coffee_drinks_stubbed\"\
    ] {\n            fileName = stubbedFileName\n        }\n        return Bundle.main.path(forResource:\
    \ fileName, ofType: \"plist\")\n    }\n\n    public func getData() -> Data? {\n\
    \        let dataPath = plistDataSourcePath()\n        guard let path = dataPath,\
    \ let dataArray = NSArray(contentsOfFile:path) else {\n            return nil\n\
    \        }\n        var data:Data?\n        do {\n            data = try JSONSerialization.data(withJSONObject:\
    \ dataArray)\n        } catch {\n            print(\"JSON serialization failed:\
    \  \\(error)\")\n        }\n        return data\n    }\n}\n```\n\n`CoffeeDrinksDataSource`的实现用于从\
    \ plist 文件中读取数据并返回数据。我们还需要添加一些仅用于 UI 测试的额外逻辑。有时，我们需要让 UI 测试代码将信息传递给移动应用，不是通过文本字段输入或用户交互，而是通过命令行参数或启动环境/参数来发送。如果你还记得我们编写的第一个\
    \ UI 测试，我们需要对咖啡饮品视图内的数据进行桩处理，而不是依赖可能随应用生命周期变化并导致测试不可靠的实际数据。这里我们通过环境变量添加了桩处理数据源返回数据的能力。我们使用`ProcessInfo.processInfo.environment`来访问环境变量。\n\
    \n### `CoffeeDrinksModelTests`\n\n由于`CoffeeDrinksModel`依赖于`CoffeeDrinksDataSource`，如果我们要精确地测试它，就需要排除所有`CoffeeDrinksModel`所依赖的对象，使其返回预期的数据，并对`CoffeeDrinksModel`内部所有公有方法进行断言。这就是所谓的**桩处理**。\n\
    \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg](img/505360_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9  \n`CoffeeDrinksModel`对`CoffeeDrinksDataSource`的依赖\n\n桩处理意味着创建一个对象的虚假版本，用来替代真实对象，帮助你的测试运行得更快、更可靠。从现在开始，我们需要对某些组件进行桩处理。我们不会深入探讨这个话题，因为稍后将在第\
    \ 7 章中介绍。\n\n在图 5-9 中，`CoffeeDrinksModel`类使用`CoffeeDrinksDataSource`从 plist 文件中获取所有咖啡饮品。在不进行桩处理`CoffeeDrinksDataSource`的情况下测试`CoffeeDrinksModel`将会很有挑战性，并且不可靠；换句话说，如果我们更改\
    \ plist 文件中的数据，这个测试将会失败。桩处理（图 5-10）的目的是隔离并专注于被测试的代码，而不是外部依赖的行为或状态。这里的外部依赖是`CoffeeDrinksDataSource`，它提供来自\
    \ plist 文件的数据。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg](img/505360_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10  \n用桩对象替换依赖\n\n现在我们来编写桩对象：\n\n```\nclass CoffeeDrinksDataSourceStub:\
    \ CoffeeDrinksDataSource {\n    var stubbedDataJSON: String?\n    init(stubbedDataJSON:\
    \ String){\n        self.stubbedDataJSON = stubbedDataJSON\n    }\n\n    public\
    \ override func getData() -> Data? {\n        let jsonData = self.stubbedDataJSON?.data(using:\
    \ .utf8)\n        return jsonData\n    }\n}\n```\n\n`CoffeeDrinksDataSourceStub`会在其构造函数中接收预期数据，并在`getData()`函数中将其作为数据返回。因此没有逻辑，我们可以单独测试`CoffeeDrinksModel`。\n\
    \n现在让我们使用新创建的桩对象为`CoffeeDrinksModel`编写测试：\n\n```\nfunc testFetchingAllCoffeeDrinks()\
    \ {\n    //Given\n    let expectedDrinks = \"\"\"\n    [\n        {\n        \
    \    \"name\": \"coffee1\",\n            \"image_name\": \"black\",\n        \
    \    \"desc\": \"desc1\"\n        },\n        {\n            \"name\": \"coffee2\"\
    ,\n            \"image_name\": \"black\",\n            \"desc\": \"desc2\"\n \
    \       }\n    ]\n    \"\"\"\n    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:expectedDrinks)\n\
    \    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)\n\
    \n    // when\n    let actualDrinks = coffeeDrinksModel.fetchAllCoffeDrinks()\n\
    \n    // then\n    let coffeeDrink1 = actualDrinks![0]\n    XCTAssertEqual(coffeeDrink1.name,\
    \ \"coffee1\")\n    XCTAssertEqual(coffeeDrink1.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink1.description,\
    \ \"desc1\")\n\n    let coffeeDrink2 = actualDrinks![1]\n    XCTAssertEqual(coffeeDrink2.name,\
    \ \"coffee2\")\n    XCTAssertEqual(coffeeDrink2.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink2.description,\
    \ \"desc2\")\n}\n```\n\n在应用 TDD 周期，我们逐步构建测试用例直至达到上述全面的测试后，最终会得到以下两个组件：\n\n```\n\
    class CoffeeDrinksModel {\n    private var dataSource:CoffeeDrinksDataSource?\n\
    \    init(source:CoffeeDrinksDataSource?) {\n        self.dataSource = source\n\
    \    }\n\n    public func fetchAllCoffeDrinks() ->[CoffeeDrink]? {\n        guard\
    \ let data = self.dataSource?.getData() else {\n            return []\n      \
    \  }\n        var drinks:[CoffeeDrink]?\n        do {\n            drinks = try\
    \ JSONDecoder().decode([CoffeeDrink].self, from: data)\n        } catch {\n  \
    \      }\n        return drinks\n    }\n}\n```\n\n```\nstruct CoffeeDrink: Codable,\
    \ Equatable {\n    let name:String?\n    let imageName: String?\n    let description:\
    \ String?\n\n    private enum CodingKeys : String, CodingKey {\n        case name\
    \ = \"name\"\n        case imageName = \"image_name\"\n        case description\
    \ = \"desc\"\n    }\n}\n```\n\n让我们注释掉`CoffeeDrinksIntegrationTests`中之前的测试，然后运行`CoffeeDrinksModelTests`。\n\
    \n现在应该可以通过了 ✅。\n\n这将是我们当前的状态（图 5-11）。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig11_HTML.jpg](img/505360_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11  \n测试计划图（已添加第一个单元）\n"
- fmt: "### CoffeeDrinksPresenterTests\n\nWe already added an integration test for\
    \ our presenter, so you might think we don’t need unit tests for it. But that’s\
    \ never the case. Integration tests can never be a substitute for unit tests.\
    \ As we covered in Chapter [4](#505360_1_En_4_Chapter.xhtml), each type serves\
    \ a different purpose. We already wrote a test to validate that our presenter\
    \ integrates correctly with other components. Now we need to write tests for it\
    \ but in isolation.\n\nAgain `CoffeeDrinksPresenter` is dependent on `CoffeeDrinksModel`.\
    \ If we need to test it, we need to stub all these objects that `CoffeeDrinksPresenter`\
    \ depends on and return expected data. Here we write a stub for `CoffeeDrinksModel`,\
    \ which takes the expected data in its constructor and returns it as data inside\
    \ the `fetchAllCoffeDrinks()` function:\n\n```\nclass CoffeeDrinksModelStub: CoffeeDrinksModel\
    \ {\n    var stubbedDrinks:[CoffeeDrink]?\n    init(stubbedDrinks:[CoffeeDrink])\
    \ {\n        super.init(source: nil)\n        self.stubbedDrinks = stubbedDrinks\n\
    \    }\n    public override func fetchAllCoffeDrinks() ->[CoffeeDrink]? {\n  \
    \      return self.stubbedDrinks\n    }\n}\n```\n\nNow let’s start writing our\
    \ tests one by one:\n\n```\nfunc testFetchingDrinksCount() {\n    //Given\n  \
    \  let drinks = [CoffeeDrink(name: \"coffee1\",imageName: \"black\",description:\
    \ \"desc1\"),\n                  CoffeeDrink(name: \"coffee2\",imageName: \"black\"\
    ,description: \"desc2\")]\n    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks:\
    \ drinks)\n    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n\
    \    // when & then\n    XCTAssertEqual( coffeeDrinksPresenter.getDrinksCount(),\
    \ 2)\n}\nfunc testFetchingDrinksName() {\n    //Given\n    let drinks = [CoffeeDrink(name:\
    \ \"coffee1\",imageName: \"black\",description: \"desc1\"),\n                \
    \  CoffeeDrink(name: \"coffee2\",imageName: \"black\",description: \"desc2\")]\n\
    \    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks: drinks)\n  \
    \  let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n\
    \    // when & then\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:0),\
    \ \"coffee1\")\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:1),\
    \ \"coffee2\")\n}\nfunc testFetchingDrinksImagesName() {\n    //Given\n    let\
    \ drinks = [CoffeeDrink(name: \"coffee1\",imageName: \"black\",description: \"\
    desc1\"),\n                  CoffeeDrink(name: \"coffee2\",imageName: \"black\"\
    ,description: \"desc2\")]\n    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks:\
    \ drinks)\n    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n\
    \    // when & then\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:0),\
    \ \"black\")\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:1),\
    \ \"black\")\n}\n```\n\nAs you know by now, after writing each test, we go and\
    \ apply the TDD cycle over and over again. And after writing all the preceding\
    \ tests and making all of them pass one after the other, we will end up with the\
    \ following class:\n\n```\nclass CoffeeDrinksPresenter {\n    private var model:CoffeeDrinksModel?\n\
    \    var drinks:[CoffeeDrink]?\n    init(model:CoffeeDrinksModel?) {\n       \
    \ self.model = model\n        self.drinks = self.model?.fetchAllCoffeDrinks()\n\
    \    }\n    public func getDrinksCount() -> Int {\n        self.drinks?.count\
    \ ?? 0\n    }\n    public func getDrinkName(index:Int) -> String? {\n        guard\
    \ let drink = self.drinks?[index] else {\n            return nil\n        }\n\
    \        return drink.name\n    }\n    public func getDrinkImageName(index:Int)\
    \ -> String? {\n        guard let drink = self.drinks?[index] else {\n       \
    \     return nil\n        }\n        return drink.imageName\n    }\n}\n```\n\n\
