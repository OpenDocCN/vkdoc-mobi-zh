    \ we will be covering it later on in Chapter [7](#505360_1_En_7_Chapter.xhtml).\n\
    \nIn Figure [5-9](#505360_1_En_5_Chapter.xhtml#Fig9) the `CoffeeDrinksModel` class\
    \ uses `CoffeeDrinksDataSource` to fetch all coffee drinks from the plist file.\
    \ Testing `CoffeeDrinksModel` without stubbing `CoffeeDrinksDataSource` will be\
    \ challenging and will not be reliable; in other words, if we change the data\
    \ inside the plist file, this test will fail. The purpose of stubbing (Figure\
    \ [5-10](#505360_1_En_5_Chapter.xhtml#Fig10)) is to isolate and focus on the code\
    \ being tested and not on external dependencies’ behavior or state. The external\
    \ dependency here is `CoffeeDrinksDataSource`, which provides the data from the\
    \ plist file.\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10  \nReplace the dependency with a stub object\n\nNow let’s write\
    \ our stub object:\n\n```\nclass CoffeeDrinksDataSourceStub: CoffeeDrinksDataSource\
    \ {\n    var stubbedDataJSON: String?\n    init(stubbedDataJSON: String){\n  \
    \      self.stubbedDataJSON = stubbedDataJSON\n    }\n\n    public override func\
    \ getData() -> Data? {\n        let jsonData = self.stubbedDataJSON?.data(using:\
    \ .utf8)\n        return jsonData\n    }\n}\n```\n\n`CoffeeDrinksDataSourceStub`\
    \ will take the expected data in its constructor and return it as data inside\
    \ the `getData()` function. So no logic, and we can test `CoffeeDrinksModel` separately.\n\
    \nLet’s now write tests for `CoffeeDrinksModel` using the newly created stub object:\n\
    \n```\nfunc testFetchingAllCoffeeDrinks() {\n    //Given\n    let expectedDrinks\
    \ = \"\"\"\n    [\n        {\n            \"name\": \"coffee1\",\n           \
    \ \"image_name\": \"black\",\n            \"desc\": \"desc1\"\n        },\n  \
    \      {\n            \"name\": \"coffee2\",\n            \"image_name\": \"black\"\
    ,\n            \"desc\": \"desc2\"\n        }\n    ]\n    \"\"\"\n    let coffeeDrinksDataSource\
    \ = CoffeeDrinksDataSourceStub(stubbedDataJSON:expectedDrinks)\n    let coffeeDrinksModel\
    \ = CoffeeDrinksModel(source: coffeeDrinksDataSource)\n\n    // when\n    let\
