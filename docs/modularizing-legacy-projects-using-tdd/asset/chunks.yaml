    \    // When\n    let result = validator.validateCredentials(credentials)\n  \
    \  // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
    \ .invalidEmail)\n}\n\n// Test validating an invalid credential with long email\n\
    func testTooLongEmail() {\n    // Given\n    let validator = Validator()\n   \
    \ let email = randomString(100) + \"@valid.com\"\n    let password = \"Password!\"\
    \n    let credentials = Credentials(email: email, password: password)\n    //\
    \ When\n    let result = validator.validateCredentials(credentials)\n    // Then\n\
    \    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error, .tooLongEmail)\n\
    }\n\n// Test validating an invalid credential with empty password\nfunc testEmptyPassword()\
    \ {\n    // Given\n    let validator = Validator()\n    let credentials = Credentials(email:\
    \ \"valid@valid.com\", password: \"\")\n    // When\n    let result = validator.validateCredentials(credentials)\n\
    \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
    \ .emptyPassword)\n}\n\n// Test validating an invalid credential with short password\n\
    func testShortPassword() {\n    // Given\n    let validator = Validator()\n  \
    \  let credentials = Credentials(email: \"valid@valid.com\", password: \"1234!\"\
    )\n    // When\n    let result = validator.validateCredentials(credentials)\n\
    \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
    \ .tooShortPassword)\n}\n\n// Test validating an invalid credential with long\
    \ password\nfunc testLongPassword() {\n    // Given\n    let validator = Validator()\n\
    \    let email = \"valid@valid.com\"\n    let password = randomString(41)\n  \
    \  let credentials = Credentials(email: email, password: password)\n    // When\n\
    \    let result = validator.validateCredentials(credentials)\n    // Then\n  \
    \  XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error, .tooLongPassword)\n\
    }\n\n// Test validating an invalid credential with password having no special\
    \ characters\nfunc testNoSpecialCharacterPassword() {\n    // Given\n    let validator\
    \ = Validator()\n    let credentials = Credentials(email: \"valid@valid.com\"\
    , password: \"12345678\")\n    // When\n    let result = validator.validateCredentials(credentials)\n\
    \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
    \ .noSpecialCharacters)\n}\n```\n\n对于我们的 `Validator` 组件，我们涵盖了验证逻辑中所有可能的场景。我们在添加单元测试时拥有很高的自由度，因为单元测试是成本最低的测试类型。因此，所有我们决定不在\
    \ UI 测试或集成测试中覆盖的场景，都可以在这个层面得到覆盖。"
- fmt: '# Summary


    In the unit tests, we tested the isolated functionality of the `validator`, `network`,
    and `persistence`. In the integration tests, we tested a special component (`LoginManager`)
    that basically integrates all our components together, and by these tests, we
    made sure that our units integrate correctly with each other. And in our UI tests,
    we also tested the integration of all our components, as well as testing that
    our UI is working properly.


    Your unit tests make sure that a certain component works as intended. When testing
    a component, we carry out the test with complete isolation from other components.
    The number of unit tests in your test suite will largely outnumber any other type
    of test, and thankfully they are also the fastest type of testing.


    Integration tests are targeted toward components that link and integrate other
    smaller components together. They make sure that smaller components work together
    as expected. Without integration tests, many bugs can be left unnoticed even if
    you have very high coverage with your unit tests. And when it comes to speed,
    integration tests are slower than unit tests.


    Your UI tests make sure that the UI behaves correctly and that the app’s main
    functionalities are working. When it comes to UI testing, we can actually say
    that it’s a very high-level type of integration testing. You’re seeing the app
    exactly how users do—there’s no special internal knowledge of how your code is
    structured as we get with unit and integration tests, and you can’t add `mocks`
    or `stubs` to isolate specific functionality. Without UI tests, you will have
    no guarantee that your app works as expected, as this tests the app the same way
    your user does. Because this type of testing deals with the UI, it is the slowest
    type of testing.


    And this brings us to our Testing Pyramid (Figure [4-3](#505360_1_En_4_Chapter.xhtml#Fig3)),
    now populated with three equally important levels of testing.


    ![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig3_HTML.jpg](images/505360_1_En_4_Chapter/505360_1_En_4_Fig3_HTML.jpg)


    **Figure 4-3** Final Testing Pyramid


    The Testing Pyramid serves as a good rule of thumb when it comes to establishing
    your own test suite. Stick to the pyramid shape to come up with a healthy, fast,
    and maintainable test suite: write lots of small and fast unit tests. Write some
    more integration tests for your sociable components and very few high-level tests
    that test your application from end to end.


    # 5. TDD Deep Dive


    So far you have been introduced to the basics of testing and TDD. We have also
    utilized TDD to implement somewhat simple examples. This chapter aims to take
    this to an even further step. One of our goals in writing this book was to show
    you the whole experience of test-driven software development. We want to show
    you how TDD fits in different types of projects and not just simple examples.
    We will start implementing this project from scratch and keep adding a small piece
    of code incrementally and safely using TDD, until we finish the project together.


    ## CoffeePot


    Have you ever found yourself standing in line at your favorite coffee shop struggling
    to understand the difference between the vast variety of options and then just
    ending up ordering the one coffee order you know by heart? Even if you are a coffee
    buff now, there must have been a time when you were still a coffee newbie. Here
    comes CoffeePot. It is all coffee newbies’ best friend. **CoffeePot** is an app
    aimed at helping you understand the differences between all types of coffee, as
    well as different ways of preparing coffee. You can think of it as an ultimate
    coffee guide. By the end of this chapter, we will have **CoffeePot** up and running,
    ready to assist with any coffee order. This app is heavily inspired by [this](https://www.tasteofhome.com/article/types-of-coffee/)
    [article](https://www.tasteofhome.com/article/types-of-coffee/) from **Taste of
    Home**, and it’s where we got our data.


    ## Eye on the Big Picture


    The golden rule for tackling any project/problem is granularity; you can’t complete
    a project in one go. You have to break it into tiny chunks and finish them one
    by one. The key is how to add a tiny chunk and make sure that it is being integrated
    correctly and does not break the previous features. Each chunk should be significant
    and concrete enough that you can tell when it’s done and small enough to be focused
    on one concept and achievable quickly. Dividing our work into small, coherent
    chunks also helps to manage the development risk.


    Granularity (Figure [5-1](#505360_1_En_5_Chapter.xhtml#Fig1)) is powerful, but
    you need to keep your eyes on the big goal or get lost, which is finishing the
    project. So, when we start implementing a new feature, we start with acceptance
    tests, which exercise the functionality we want to build end to end; when the
    acceptance test fails, it’s an indication that we are not done yet. When it passes,
    we are done. When implementing a new feature, the test loop is a measure of our
    progress, and the growing test suite of tests protects us against regression of
    failures when we change the system moving forward. Also, we need to keep the code
    as simple as possible, making it easier to understand and modify. Always remember:
    developers spend more time reading code than writing it. So that’s what we should
    optimize for. Inside TDD, we can continuously refactor our code to simplify and
    improve the design. The test suites in the feedback loop protect us from mistakes.


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig1_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Granularity visualized


    ## Requirements


    **Let’s begin with user stories:**


    If you are not familiar with user stories, a user story is a general explanation
    of a software feature written from the perspective of the end user.


    1.  As a user, I want to know all types of hot and cold coffee drinks, including
    a picture of the coffee drink.

    2.  As a user, I want to tap any coffee drink type to show more details about
    this drink, including a picture of the coffee and a brief description of ingredients.

    3.  As a user, I want to know all types of coffee machines, including a picture
    of the coffee machine.

    4.  As a user, I want to tap any coffee maker type to show more details about
    this machine, including a picture of the machine and a brief description of how
    to use it.


    > **Note:** All required data are inside the start project as a `plist` file.


    **Project wireframes** (Figure [5-2](#505360_1_En_5_Chapter.xhtml#Fig2)):


    ![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig2_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Wireframes'
