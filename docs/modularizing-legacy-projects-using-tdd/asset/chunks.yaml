    if everything is working as expected or not.


    ### First Test Case


    *   As a user, I should see six cities in a table view; when I tap on San Francisco
    city, the app should navigate into another view, and the title should match the
    selected city. Upon navigating into another view, I should be able to see a `"Say
    Hello !"` button, and when I tap it, it should show a welcome message.


    If we converted the test case into actions, it would be as follows:


    1.  Launch the app.


    2.  Count all cities inside the table view.


    3.  Select `"San Francisco"` city.


    4.  Make sure that the title in the details view is `San Francisco`.


    5.  Tap the `"Say Hello !"` button.


    6.  Make sure that you see a welcome alert.


    ## Launching the App


    To run your tests, you must launch the app. So XCUITest provides XCUIApplication,
    which is a proxy for your application, so that you can `launch`, `terminate`,
    and `activate` your application. Inside each test you must have a single instance
    from `XCUIApplication` and call `app.launch()`.


    **After using the launch API, our first test will be**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    }

    ```


    XCUIApplication contains a potent API; we will use it heavily later, which is
    in `launchArguments` . It helps you send a launch argument to the app to make
    specific customization. We will use this API heavily in the book. Before every
    UI test, you must launch your application, whether with launch arguments or not,
    which will clear the application’s previously existing instance.


    ## Querying the UI


    We need to have access to the table view to count the cells inside. But how can
    we do this? XCUITest provides a class to do this. XCUIElementQuery is a query
    to locate UIElements so that I can assert on UIElement or do an interaction. Let’s
    dig deep into how XCUIElementQuery works.


    XCUIElementQuery does two main functions, relationships and filtering.


    ### Relationships


    *   Descendants: Which will get all descendant elements under a specific UIElement.


    For example: View’s descendants contain all elements under View: `view.descendants`
    (Figure [3-5](#505360_1_En_3_Chapter.xhtml#Fig5)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Descendants relationship


    *   Children: Which will get all elements directly below a specific UIElement.
    For example: TableView’s children contain all elements directly below TableView,
    which are cells (Figure [3-6](#505360_1_En_3_Chapter.xhtml#Fig6)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Children relationship


    *   Containment: Which will be helpful if UIElement is not unique, but it contains
    a unique element. For example: `cells.containing(NSPredicate(format: "label CONTAINS
    %@", "San Francisco"))` (Figure [3-7](#505360_1_En_3_Chapter.xhtml#Fig7)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Containment relationship


    **Filtering**


    We can combine filters and relationships to be more assertive. We can filter the
    descendants to get only the labels under a specific UIElement.


    `tableView.descendants(matching: .button)` will return all descendant elements
    under TableView filtered by type button. This is also equivalent to the following
    query: `tableView.buttons`. We can combine queries to build up more complex queries,
    for example, `app.tables.staticTexts` will get all labels under TableView (Figure
    [3-8](#505360_1_En_3_Chapter.xhtml#Fig8)).


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg](images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Combining relationships


    You can use the query itself to be the end of the assertions, so you can check
    the count of cells after adding a new cell: `let query = app.tables.cells` and
    then `query.count`. But be careful every time you call this query; it will be
    evaluated again and get the most updated query result.


    **After using the query API, our first test will be**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    XCTAssertEqual(app.tables.cells.count, 6)

    }

    ```'
  trans: '

    # 3. UI 测试


    UI 测试是你的第一道防线，它能告诉你应用是否正常工作；它们与应用的交互方式，与用户的操作方式完全相同。`XCUITest` 框架能帮你查询应用内的 UI
    元素、执行交互操作，并验证 UI 的属性和状态。UI 测试通过 iOS 的无障碍系统来访问你的应用。无障碍是一项技术，它能让残障人士获得与所有其他用户相同的应用体验。它提供了关于
    UI 的丰富语义数据，因此可以使用旁白来引导用户操作应用。


    ## 你的第一个测试


    本章旨在探索 Xcode 中的 UI 测试，因为我们将在后续部分大量依赖它。我们将为一个显示城市列表的简单应用编写 UI 测试。你可以在本章的资源中找到该应用的起始项目。该应用（图
    3-1）包含主屏幕，其中显示了一个城市列表。当你选择其中一个城市时，它将打开另一个屏幕，该屏幕的标题将与所选城市名称匹配。你会找到一个按钮；点击此按钮，它将显示一个欢迎警报。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig1_HTML.png](img/505360_1_En_3_Fig1_HTML.png)


    图 3-1


    待测试的应用


    如果我们打开演示应用，会发现它没有 UI 测试目标。因此，你需要为 UI 测试创建一个新的目标。UI 测试目标是一个独立的可执行文件，其唯一用途是运行你的
    UI 测试。当你将应用提交到 App Store 或分发你的框架时，这个测试目标不会被包含在内。


    按下 `Command+6` 打开测试导航器。


    点击左下角的 `+` 按钮。然后从菜单中选择 `New UI Test Target…` （图 3-2）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig2_HTML.jpg](img/505360_1_En_3_Fig2_HTML.jpg)


    图 3-2


    新建 UI 测试目标


    创建 UI 测试目标后，它会创建一个新文件夹，其中包含你的第一个 UI 测试类，该类继承自 `XCTestCase` （图 3-3）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig3_HTML.jpg](img/505360_1_En_3_Fig3_HTML.jpg)


    图 3-3


    样板测试


    **要求：**


    *   iOS 9 是支持 UI 测试的最低版本。

    *   UI 测试的最低 iOS 版本应与待测试应用的版本一致。


    你需要点击 `testExample` 旁边的菱形按钮。你刚刚就运行了你的第一个测试！（图 3-4）


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig4_HTML.jpg](img/505360_1_En_3_Fig4_HTML.jpg)


    图 3-4


    运行虚拟测试


    ## XCUITest 组件


    `XCUITest` 框架由三个主要组件组成。我们将在进行中逐一介绍。这些组件是：


    *   `XCUIApplication`

    *   `XCUIElementQuery`

    *   `XCUIElements`


    ## 本章目标


    正如我们之前提到的，UI 测试与应用的交互方式与用户完全相同。因此，我们希望像用户那样与我们的应用进行交互，并验证一切是否按预期工作。


    ### 第一个测试用例


    *   作为一名用户，我应该在表格视图中看到六个城市；当我点击旧金山城市时，应用应导航到另一个视图，并且标题应与所选城市匹配。在导航到另一个视图后，我应该能够看到一个
    `"Say Hello !"` 按钮，当我点击它时，应该显示一条欢迎消息。


    如果我们将测试用例转换为操作，它将如下所示：


    1.  启动应用。

    2.  统计表格视图内的所有城市。

    3.  选择 `"San Francisco"` 城市。

    4.  确保详情视图中的标题是 `San Francisco`。

    5.  点击 `"Say Hello !"` 按钮。

    6.  确保你看到了一个欢迎警报。


    ## 启动应用


    要运行你的测试，你必须启动应用。因此，`XCUITest` 提供了 `XCUIApplication`，它是你的应用的一个代理，这样你就可以 `launch`（启动）、`terminate`（终止）和
    `activate`（激活）你的应用。在每个测试中，你必须有一个 `XCUIApplication` 的实例，并调用 `app.launch()`。


    **使用启动 API 后，我们的第一个测试将是**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    }

    ```


    `XCUIApplication` 包含一个强大的 API，我们稍后会大量使用它，即 `launchArguments`。它帮助你向应用发送启动参数以进行特定的自定义。我们将在本书中大量使用这个
    API。在每个 UI 测试之前，无论是否使用启动参数，你都必须启动你的应用，这将清除应用的先前实例。


    ## 查询 UI


    我们需要访问表格视图来统计其中的单元格。但是该怎么做呢？`XCUITest` 提供了一个类来执行此操作。`XCUIElementQuery` 是一个用于定位
    `UIElement` 的查询，以便我可以在 `UIElement` 上进行断言或执行交互。让我们深入了解 `XCUIElementQuery` 的工作原理。


    `XCUIElementQuery` 执行两个主要功能：关系和过滤。


    ### 关系


    *   **后代**：将获取特定 `UIElement` 下的所有后代元素。


    例如：视图的后代包含视图下的所有元素：`view.descendants` （图 3-5）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg](img/505360_1_En_3_Fig5_HTML.jpg)


    图 3-5


    后代关系


    *   **子级**：将获取特定 `UIElement` 正下方的所有元素。例如：`TableView` 的子级包含 `TableView` 正下方的所有元素，即单元格（图
    3-6）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg](img/505360_1_En_3_Fig6_HTML.jpg)


    图 3-6


    子级关系


    *   **包含**：如果 `UIElement` 不唯一，但它包含一个唯一元素时，这会很有用。例如：`cells.containing(NSPredicate(format:
    "label CONTAINS %@", "San Francisco"))` （图 3-7）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg](img/505360_1_En_3_Fig7_HTML.jpg)


    图 3-7


    包含关系


    ### 过滤


    我们可以结合过滤器和关系来进行更深入的断言。我们可以过滤后代，只获取特定 `UIElement` 下的标签。


    `tableView.descendants(matching: .button)` 将返回 `TableView` 下所有类型为按钮的后代元素。这也等同于以下查询：`tableView.buttons`。我们可以组合查询来构建更复杂的查询，例如，`app.tables.staticTexts`
    将获取 `TableView` 下的所有标签（图 3-8）。


    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg](img/505360_1_En_3_Fig8_HTML.jpg)


    图 3-8


    组合关系


    你可以将查询本身用作断言的终点，因此你可以在添加新单元格后检查单元格的数量：`let query = app.tables.cells` 然后 `query.count`。但要注意，每次调用此查询时，它都会重新计算并获取最新的查询结果。


    **使用查询 API 后，我们的第一个测试将是**


    ```

    func testExample() throws {

    // UI tests must launch the application that they test.

    let app = XCUIApplication()

    app.launch()

    XCTAssertEqual(app.tables.cells.count, 6)

    }

    ```

