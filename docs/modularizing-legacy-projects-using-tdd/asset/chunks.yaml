  raw: '### Thread Sanitizer


    However, now we have a different problem. Our test now takes too much time. And
    if we try to reduce the number of iterations, we will reduce its accuracy in catching
    threading issues. Luckily, we have access to a tool in Xcode that can help us
    with this, the **Thread Sanitizer** .


    The Thread Sanitizer, commonly referred to as TSan, is a tool Apple provides as
    part of the LLVM compiler. It helps in auditing threading issues in your Swift
    and C language written code. This sanitizer is able to detect when multiple threads
    attempt to access the same resource and at least one of these accesses is a write
    operation. It’s able to do that by rebuilding the whole app and adding checks
    around each memory access in your code. These checks record that a memory access
    occurred along with when it occurred and from which thread. And from that information,
    it’s able to add a breakpoint whenever an illegal memory access occurs.


    The beauty of the Thread Sanitizer is that it’s able to detect the silent data
    races. In many cases, the same resource can be accessed and modified from different
    threads, but the threads miss collision by microseconds. Without the sanitizer,
    this scenario will go unnoticed as it won’t cause misbehavior or a crash. However
    in other times, they may collide. This randomness is what makes threading issues
    so hard to debug. But with the Thread Sanitizer enabled, catching threading issues
    becomes far more likely to happen.


    To enable the Thread Sanitizer , we need to go into our scheme configuration (Figure
    [8-10](#505360_1_En_8_Chapter.xhtml#Fig10)).


    Let’s enable the sanitizer for our Run and Test configurations.


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig10_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Enabling Thread Sanitizer


    Now in order to make Xcode pause whenever a data race is detected, we need to
    add **Runtime Issue Breakpoint.** We can add that from the Breakpoint navigator
    (Figure [8-11](#505360_1_En_8_Chapter.xhtml#Fig11)).


    ![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig11_HTML.jpg](images/505360_1_En_8_Chapter/505360_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Adding Runtime Issue Breakpoint


    Since we now have the Thread Sanitizer enabled, we can actually reduce the number
    of iterations a bit if we want.


    ### Make It Pass


    Now that we’re finally done with the first step in the TDD cycle, it’s time to
    fix the test whose failure we just celebrated. As mentioned before, race conditions
    are a problem of synchronization and can be fixed using many ways. Let’s try fixing
    it using a serial queue. The goal is to leverage a serial queue in order to achieve
    synchronization between all the operations performed by our database object. We
    need to make sure that only one operation is performed at any given time.


    When we add the serial queue, our `Database` class should look like this:


    ```

    public class Database {

    // MARK:- Singleton

    public static let shared = Database.shared

    // MARK:- Private Variables

    private var dictionary: [String:Any] = [:]

    private let queue = DispatchQueue(label: "com.ReaderWriter.Database")

    // MARK:- Public Functions

    public func addObject(_ object: Any, for key: String) {

    queue.sync {

    dictionary[key] = object

    }

    }

    public func removeObject(for key: String) {

    queue.sync {

    _ = dictionary.removeValue(forKey: key)

    }

    }

    public func object(for key: String) -> Any? {

    queue.sync {

    return dictionary[key]

    }

    }

    public func recordsCount() -> Int {

    queue.sync {

    return dictionary.count

    }

    }

    public func reset() -> Int {

    queue.sync {

    dictionary = [:]

    }

    }

    }

    ```


    Now let’s try running our test once again. It should be passing ✅. Let’s run the
    rest of our tests as well to make sure our change did not cause any regressions.
    Since all tests are passing and there’s nothing that needs refactoring, this means
    we’re done fixing this issue. So there you have it. We identified a problem in
    our code that had to do with multithreading, and we successfully applied TDD to
    fix this issue.


    ## Fixing Threading Issues in Books


    **Books** is the project introduced in Chapter [6](#505360_1_En_6_Chapter.xhtml)
    **.** Currently, Books is a modularized app, but that doesn’t mean it’s bug-free.
    Luckily for us, when **Books** was being written, concurrency issues weren''t
    a top priority. So we now have a chance to see a threading issue in a real app
    and attempt to fix it using TDD like we just did for our reader-writer problem
    in the `Database` class.


    Let’s open up the project, which can be found in this chapter’s resources, and
    start looking for potential threading issues. If we look carefully, we’ll find
    that there’s one place in our code that could potentially be not thread-safe.
    That part is our extension on `UIImageView` that handles image caching:


    ```

    extension UIImageView {

    static var dictionaryImageCache = [String:UIImage]()

    func load(url: URL) {

    DispatchQueue.global().async { [weak self] in

    if (UIImageView.dictionaryImageCache[url.path] != nil) {

    DispatchQueue.main.async {

    self?.image = UIImageView.dictionaryImageCache[url.path]

    }

    return

    }

    if let data = try? Data(contentsOf: url) {

    if let image = UIImage(data: data) {

    UIImageView.dictionaryImageCache[url.path] = image

    DispatchQueue.main.async {

    self?.image = image

    }

    }

    }

    }

    }

    }

    ```


    How that extension works is that it has a static dictionary that we store images
    in and that dictionary is accessible for all instances of `UIImageView` . This
    here indicates that data race could occur on the shared dictionary. To be certain,
    let’s ask our two questions:


    1.  **Is this resource accessible from multiple threads?**


    The extension by its nature is global and applies to all `UIImageView` instances,
    which means that we can call `load(url: URL)` from more than one thread easily.


    1.  **Can this resource be accessed (read) and modified (write)?**


    By looking at the load function, what it does is that it accesses the dictionary
    to check if the image is available in cache to return it; if not, it loads the
    image and then modifies the dictionary to save the newly loaded image.


    The answers of these two questions tell us that this extension is not thread-safe
    and could cause a race condition.'
  trans: "\n### 线程清理器\n\n然而，现在我们遇到了一个新问题：测试耗时过长。如果试图减少迭代次数，又会降低捕捉线程问题的准确性。幸运的是，Xcode\
    \ 中有一个工具可以帮我们解决这个问题——`Thread Sanitizer`（线程清理器）。\n\n`Thread Sanitizer`（通常简称为 `TSan`）是苹果公司作为\
    \ LLVM 编译器的一部分提供的工具。它能帮助审查 Swift 和 C 语言代码中的线程问题。该清理器能够检测到多个线程尝试访问同一资源且至少有一个访问是写操作的情况。它通过重建整个应用程序，并在代码中的每个内存访问周围添加检查来实现这一点。这些检查会记录下内存访问的发生时间、发生位置以及来自哪个线程。根据这些信息，它能在发生非法内存访问时添加断点。\n\
    \n`Thread Sanitizer` 的妙处在于它能够检测到静默的数据竞争。在很多情况下，同一资源可能被不同线程访问和修改，但线程之间仅差微秒未能产生冲突。没有这个清理器，这种场景会因不会导致异常行为或崩溃而被忽略。然而其他时候，它们可能会发生冲突。正是这种随机性使得线程问题难以调试。但启用\
