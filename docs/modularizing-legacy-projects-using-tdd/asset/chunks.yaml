    book_review\"]\n_ = reviewsCell.waitForExistence(timeout: 1.0)\nXCTAssertTrue(cells.staticTexts[\"\
    book_review\"].label == \"No Reviews Available\")\n```\n\nHere we make sure that\
    \ the text “No Reviews Available” is shown.\n\nNow that we’ve added a UI test\
