    var manager: CoreDataManager!

    var stack: CoreDataStack!

    // MARK:- Setup

    override func setUp() {

    super.setUp()

    let testBundle = Bundle(for: type(of: self))

    let modelUrl = testBundle.url(forResource: "TestModel", withExtension: "momd")!

    let objectModel = NSManagedObjectModel(contentsOf: modelUrl)

    self.stack = CoreDataStack(name: "TestModel", objectModel: objectModel, storageType:
    .inMemory)

    self.manager = CoreDataManager(coreDataStack: stack)

    }

    override func tearDown() {

    super.tearDown()

    self.manager = nil

    self.stack = nil

    }

    ```


    This will cause a build error. To fix this, we need to update CoreDataManager
    to accept a `CoreDataStack` as a dependency:


    ```

    // MARK:- Variables

    private var stack: CoreDataStack

    // MARK:- Singleton

    public static let shared = CoreDataManager(coreDataStack: CoreDataStack())

    // MARK:- Initializer

    public init(coreDataStack: CoreDataStack) {

    self.stack = coreDataStack

    }

    ```


