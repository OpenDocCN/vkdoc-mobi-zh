- fmt: "# Testing Pyramid\n\nAs mentioned in the previous chapter, we have three types\
    \ of testing; each one is doing a specific task or answering a particular question.\
    \ In the unit tests, we test the isolated functionality of each class; do our\
    \ objects do the right thing? In the integration tests, we test components that\
    \ integrate a group of other components; do our objects work with each other correctly?\
    \ And in our UI tests, we test the system end to end; does the whole system work?\
    \ We will use all three testing levels while implementing this project. And we’ll\
    \ see how we can combine the Testing Pyramid concept with a TDD implementation\
    \ approach.\n\nA user story is the smallest feature that can add value to a user\
    \ on its own. We will work on user stories one by one. Although the user story\
    \ is minimal, we cannot implement it in one go; we need to break it into tiny\
    \ chunks and finish these chunks one by one. Our strategy (Figure [5-3](#505360_1_En_5_Chapter.xhtml#Fig3))\
    \ to finish each user story is writing a failing end-to-end test, and then we\
    \ will design our user story using a set of integration tests. Integration tests\
    \ will define how our objects will communicate with each other; after that, we\
    \ will go through each object and write a failing unit test that will describe\
    \ how this object will do its job. Our integration tests will pass by making all\
    \ failing unit tests pass.\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nTesting plan diagram\n\n## First Story\n\n> “As a user, I want\
    \ to know all types of hot and cold coffee drinks, including a picture of the\
    \ coffee drink.”\n\nLet’s open up the starter project, which can be found in this\
    \ chapter’s resources. Firstly, we will need to write a failing end-to-end test\
    \ that validates that the coffee drinks view shows all coffee drinks (Figure [5-4](#505360_1_En_5_Chapter.xhtml#Fig4)).\
    \ When this end-to-end test passes, this will indicate that we finished this story.\n\
    \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg](images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nTesting plan diagram (end-to-end test added)\n\nLet’s write our\
    \ first test, which will be a UI test:\n\n```\nfunc testShowsAllCoffeeDrinks()\
    \ {\n    let app = XCUIApplication()\n    app.launchEnvironment = [\"coffee_drinks_stubbed\"\
    : \"coffee_drinks_stub\"]\n    app.launch()\n    let coffeeCollectionView = app.collectionViews\n\
    \    XCTAssertTrue(coffeeCollectionView.cells[\"coffee1\"].exists, \"Failed to\
    \ show the first coffee item in plist\")\n    XCTAssertTrue(coffeeCollectionView.cells[\"\
