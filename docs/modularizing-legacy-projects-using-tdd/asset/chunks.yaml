- fmt: "## Your First Test\n\nLet’s forget about TDD for a while and just focus on\
    \ testing basics. Go ahead and download and open the starter project `Calc`, which\
    \ you can find in this chapter’s resources. `Calc` is a framework (Figure 2-1)\
    \ that provides some basic mathematical operations as well as some special operations.\
    \ `Calc` also logs and saves the output from each operation.\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig1_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1 Calculator framework class diagram\n\n`Calc` has two components:\
    \ `Calculator` and `Logger`. `Calculator` has the following functions: `add`,\
    \ `subtract`, `multiply`, `divide`, `addRandomNumber`, and `subtractRandomNumber`.\
    \ It also has a function to check if logging is enabled and functions to enable/disable\
    \ logging. As for `Logger`, it has one function that takes a number and logs it.\
    \ If the number is within the limit, it saves it. Else, it throws an error. `Calculator`\
    \ uses `Logger` to log the output of each operation.\n\nIf you look around the\
    \ project, you’ll find that there are no tests added at all. And that’s what we’ll\
    \ fix while walking you through the basics of `XCTest`.\n\n### What Do We Want\
    \ to Test?\n\n- Logging is enabled by default.\n- The `disableLogging` function\
    \ correctly disables logging.\n- The `enableLogging` function correctly enables\
    \ logging.\n- The `Logger` instance inside `Calculator` is initialized by default.\n\
    - The `Logger` instance is cleared when logging is disabled.\n- All operations\
    \ are working as expected.\n- `Logger`’s `log` function saves the provided number\
    \ if it’s less than the limit.\n- `Logger`’s `log` function throws an error if\
    \ it’s greater than the limit.\n\n### Creating a Unit Test Target\n\nIn order\
    \ to run tests, first, we need a unit test target. A unit test target is a separate\
    \ executable with a single purpose, running your unit tests. When you ship your\
    \ app to the App Store or distribute your framework, this test target is not included.\n\
    \nOpen the Test navigator by pressing `Command+6`.\n\nClick the `+` button in\
    \ the lower-left corner. Then select **New Unit Test Target…** from the menu (Figure\
    \ 2-2).\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig2_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2 Add a unit test target\n\nAccept all the default values and click\
    \ **Finish**.\n\nYou should now see the newly added test target in the Test navigator\
    \ (Figure 2-3).\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig3_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3 Test navigator\n\nXcode automatically generates a test case file\
    \ named `CalcTests.swift`. We will not be needing that, so go ahead and delete\
    \ it.\n\n### Adding a Test Case Class\n\nWe will start by writing tests for `Calculator`,\
    \ and the first step would be to create a test case class to include these tests.\n\
    \nGo to the Test navigator and select our now empty test target `CalcTests`. Then\
    \ click the `+` button in the lower-left corner. Then select **New Unit Test Class…**\
    \ from the menu. In the **Class** field, enter “CalculatorTests” and then press\
    \ Next and then Create.\n\nThe default template (Figure 2-4) imports the testing\
    \ framework, `XCTest`, and defines a `CalculatorTests` subclass of `XCTestCase`,\
    \ with `setUpWithError()`, `tearDownWithError()`, and example test methods.\n\n\
    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig4_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4 `CalculatorTests`\n\nGo ahead and remove the example test methods.\
    \ Also remove the setup and teardown methods as we will not be needing them for\
    \ now.\n\nNow it’s time to add the very first test in this project. We want to\
    \ test that logging is enabled by default. We can check whether logging is enabled\
    \ or not using the public function `isLoggingEnabled()`.\n\nFirst add this new\
    \ line to the beginning of the file to import our framework:\n\n`import Calc`\n\
    \nThen add the following inside `CalculatorTests`:\n\n```\nfunc testIsLoggingEnabledByDefault()\
    \ {\n    // Given\n    let calc = Calculator()\n    // When\n    let isEnabled\
    \ = calc.isLoggingEnabled()\n    // Then\n    XCTAssertTrue(isEnabled)\n}\n```\n\
    \nHere we create a new instance of `Calculator`, and then we call `isLoggingEnabled`\
    \ and save the outcome in the variable `isEnabled`. And in the **Then** section,\
    \ we assert that `isEnabled` is true.\n\nRun the test by clicking the diamond\
    \ next to it or from the Test navigator. The test should pass (Figure 2-5).\n\n\
    ![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig5_HTML.jpg](images/505360_1_En_2_Chapter/505360_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5 Your first test!\n\nYou’ve just written and run your first test!\n\
    \n## Assert Methods\n\nIn the first test we wrote, we used `XCTAssertTrue`, which\
    \ asserted that the given expression evaluated to true. However, our method has\
    \ another possible outcome that returns false. If `disableLogging()` is called,\
    \ `isLoggingEnabled()` should return false. Let’s go ahead and write that test:\n\
    \n```\nfunc testDisableLogging() {\n    // Given\n    let calc = Calculator()\n\
    \    // When\n    calc.disableLogging()\n    let isEnabled = calc.isLoggingEnabled()\n\
    \    // Then\n}\n```\n\nNow we want to assert that `isEnabled` is false. Your\
    \ first instinct might be to do something like this:\n\n```\nXCTAssertTrue(!isEnabled)\n\
    ```\n\nLet’s go ahead and add it and run the test.\n\nThe test passes!\n\nAs you\
    \ can see, we can assert on anything we want using `XCTAssertTrue` alone, equality,\
    \ nullability, comparison, or anything. However, this introduces two problems:\
    \ bad test readability and bad test output readability. Let’s take a look at the\
    \ following test for instance:\n\n```\nfunc testExample() {\n    let x = \"foo\"\
    \n    let y = \"bar\"\n    let z = foo == bar\n    XCTAssertTrue(z)\n}\n```\n\n\
    By glancing at this test, we can see that we’re asserting that `z` is true, but\
    \ in order to understand what we’re actually testing, we need to go back and check\
    \ what “z” is. You might think that this is not too big of a problem, but when\
    \ tests get more complex and elaborate, this problem will be very evident.\n\n\
    The second and more important problem is the test result. This is the test result\
    \ error when running the preceding test:\n\n```\nXCTAssertTrue failed\n```\n\n\
    As you can see, it’s a bit uninformative and tells us nothing about what went\
    \ wrong or the values of `x` and `y`.\n\nNow that we’ve identified the problems\
    \ with using `XCTAssertTrue` only, where should we go from here? Fortunately,\
    \ `XCTest` has got us covered. As we’ve mentioned before, `XCTest` is a very powerful\
    \ testing framework, and one of those core powers is its versatile suite of assertion\
    \ methods. One of those methods is `XCTAssertEqual`.\n\nWe can refactor the previous\
    \ test case to use `XCTAssertEqual`, and it would look like this:\n\n```\nfunc\
    \ testExample() {\n    let x = \"foo\"\n    let y = \"bar\"\n    XCTAssertEqual(x,\
    \ y)\n}\n```\n\nThis makes the test a little bit more verbose and easier to understand.\
    \ And if we run this test, the test result error is far more descriptive:\n\n\
    ```\nXCTAssertEqual failed: (\"foo\") is not equal to (\"bar\")\n```\n\n### Assert\
    \ Method Types\n\n`XCTest` has many assertion methods, and they can be categorized\
    \ into five categories:\n\n1. Truthfulness\n2. Equality\n3. Nullability\n4. Comparison\n\
    5. Errors\n\n#### Truthfulness Asserts\n\n- `XCTAssertTrue`  \n  Asserts that\
    \ the given expression evaluates to true\n- `XCTAssertFalse`  \n  Asserts that\
    \ the given expression evaluates to false\n- `XCTAssert`  \n  An alias for `XCTAssertTrue`\n\
    \nSo far, we have been using `XCTAssertTrue` exclusively. However, now we can\
    \ refactor `testDisableLogging` to use `XCTAssertFalse`. Go ahead and replace\
    \ the last line in the test with this:\n\n```\nXCTAssertFalse(isEnabled)\n```"
