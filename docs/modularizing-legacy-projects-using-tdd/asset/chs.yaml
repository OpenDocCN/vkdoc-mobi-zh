  \ `XCTestCase` 的子类 `CalculatorTests`，其中包含了 `setUpWithError()`、`tearDownWithError()`\
  \ 以及示例测试方法。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig4_HTML.jpg](img/505360_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4 `CalculatorTests`\n\n请继续删除示例测试方法。同时删除 setup 和 teardown 方法，因为我们暂时还用不到它们。\n\
  \n现在是时候添加这个项目中的第一个测试了。我们要测试日志记录在默认情况下是启用的。我们可以使用公共函数 `isLoggingEnabled()` 来检查日志记录是否已启用。\n\
  \n首先，在文件开头添加这一行新代码以导入我们的框架：\n\n`import Calc`\n\n然后，在 `CalculatorTests` 中添加以下代码：\n\
  \n```\nfunc testIsLoggingEnabledByDefault() {\n    // Given\n    let calc = Calculator()\n\
  \    // When\n    let isEnabled = calc.isLoggingEnabled()\n    // Then\n    XCTAssertTrue(isEnabled)\n\
  }\n```\n\n这里我们创建了一个新的 `Calculator` 实例，然后调用 `isLoggingEnabled` 并将结果保存在变量 `isEnabled`\
  \ 中。在 **Then** 部分，我们断言 `isEnabled` 为 true。\n\n点击旁边的菱形按钮或通过测试导航器运行测试。测试应该会通过（图 2-5）。\n\
  \n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig5_HTML.jpg](img/505360_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5 你的第一个测试！\n\n你刚刚已经编写并运行了你的第一个测试！\n\n## 断言方法\n\n在我们编写的第一个测试中，我们使用了 `XCTAssertTrue`，它断言给定的表达式的计算结果为\
  \ true。然而，我们的方法还有另一个可能的结果，即返回 false。如果调用了 `disableLogging()`，那么 `isLoggingEnabled()`\
  \ 应该返回 false。让我们继续编写那个测试：\n\n```\nfunc testDisableLogging() {\n    // Given\n  \
  \  let calc = Calculator()\n    // When\n    calc.disableLogging()\n    let isEnabled\
  \ = calc.isLoggingEnabled()\n    // Then\n}\n```\n\n现在我们要断言 `isEnabled` 为 false。你的第一反应可能是像这样做：\n\
  \n```\nXCTAssertTrue(!isEnabled)\n```\n\n让我们继续添加它并运行测试。\n\n测试通过了！\n\n如你所见，我们可以仅使用\
  \ `XCTAssertTrue` 来断言我们想要的任何内容，无论是相等性、可空性、比较还是其他。然而，这引入了两个问题：测试可读性差和测试输出可读性差。让我们看看下面的测试示例：\n\
  \n```\nfunc testExample() {\n    let x = \"foo\"\n    let y = \"bar\"\n    let z\
  \ = foo == bar\n    XCTAssertTrue(z)\n}\n```\n\n快速浏览这个测试，我们可以看到我们在断言 `z` 为 true，但为了理解我们实际在测试什么，我们需要返回去检查\
  \ “z” 是什么。你可能认为这不是一个大问题，但当测试变得更加复杂和精细时，这个问题就会非常明显。\n\n第二个也是更重要的问题是测试结果。以下是运行上述测试时的测试结果错误信息：\n\
  \n```\nXCTAssertTrue failed\n```\n\n如你所见，这个信息有点不明确，没有告诉我们任何关于出了什么问题或 `x` 和 `y` 的值的线索。\n\
  \n现在我们已经发现了仅使用 `XCTAssertTrue` 的问题，接下来该怎么办呢？幸运的是，`XCTest` 已经为我们考虑到了这一点。正如我们之前提到的，`XCTest`\
  \ 是一个非常强大的测试框架，其核心能力之一就是其多样化的断言方法套件。其中一个方法就是 `XCTAssertEqual`。\n\n我们可以重构之前的测试用例来使用\
  \ `XCTAssertEqual`，重构后如下所示：\n\n```\nfunc testExample() {\n    let x = \"foo\"\n\
  \    let y = \"bar\"\n    XCTAssertEqual(x, y)\n}\n```\n\n这使得测试更加详细且易于理解。如果我们运行这个测试，测试结果错误信息会更具描述性：\n\
  \n```\nXCTAssertEqual failed: (\"foo\") is not equal to (\"bar\")\n```\n\n### 断言方法类型\n\
  \n`XCTest` 有许多断言方法，它们可以分为五类：\n\n1.  真值\n2.  相等性\n3.  可空性\n4.  比较\n5.  错误\n\n####\
  \ 真值断言\n\n-   `XCTAssertTrue`  \n    断言给定的表达式的计算结果为 true\n-   `XCTAssertFalse` \
  \ \n    断言给定的表达式的计算结果为 false\n-   `XCTAssert`  \n    是 `XCTAssertTrue` 的别名\n\n到目前为止，我们一直在专门使用\
  \ `XCTAssertTrue`。但是，现在我们可以重构 `testDisableLogging` 来使用 `XCTAssertFalse`。请继续将测试中的最后一行替换为：\n\
  \n```\nXCTAssertFalse(isEnabled)\n```\n\n\n\n#### 单元测试中的断言\n\n#### 等式断言\n\n* `XCTAssertEqual`\n\
  \n  断言给定的两个表达式相等。\n\n* `XCTAssertNotEqual`\n\n  断言给定的两个表达式不相等。\n\n对于所有等式断言，传入的表达式的类型必须相同，并且该类型需要遵循`Equatable`或`FloatingPoint`协议。\n\
  \n让我们为`add(firstArgument: FloatingPoint, secondArgument: FloatingPoint)`添加一个测试：\n\
  \n```\nfunc testAdd() {\n    // Given\n    let calc = Calculator()\n    // When\n\
  \    let output = calc.add(firstArgument: 1, secondArgument: 2)\n    // Then\n \
  \   XCTAssertEqual(output, 3)\n}\n```\n\n这里我们简单地断言函数的输出等于预期的输出，即“3”。\n\n#### 空值断言\n\
  \n* `XCTAssertNil`\n\n  断言给定的表达式为`nil`。\n\n* `XCTAssertNotNil`\n\n  断言给定的表达式不为`nil`。\n\
  \n当`Calculator`实例被初始化时，会创建一个新的`Logger`对象，并将其作为变量保存在`Calculator`内部。当调用`disableLogging()`时，该变量被设置为`nil`。让我们添加测试来覆盖这部分功能：\n\
  \n```\nfunc testLoggerIsInitializedByDefault() {\n    // Given\n    let calc = Calculator()\n\
  \    // Then\n    XCTAssertNotNil(calc.logger)\n}\nfunc testDisableLoggingResetsLogger()\
  \ {\n    // Given\n    let calc = Calculator()\n    // When\n    calc.disableLogging()\n\
  \    // Then\n    XCTAssertNil(calc.logger)\n}\n```\n\n当你添加这些测试时，会遇到一个如下所示的构建错误：\n\
  \n```\n'logger' is inaccessible due to 'internal' protection level\n```\n\n要修复此问题，请将：\n\
  \n```\nimport Calc\n```\n\n替换为：\n\n```\n@testable import Calc\n```\n\n当我们为启用了测试编译的模块的`import`语句添加`@testable`属性时，我们就为该作用域内的该模块激活了提升的访问权限。标记为`public`的类和类成员的行为就像被标记为`open`一样。其他标记为`internal`的实体则表现为被声明为`public`。\n\
  \n#### 比较断言\n\n* `XCTAssertGreaterThan`\n\n* `XCTAssertGreaterThanOrEqual`\n\n*\
  \ `XCTAssertLessThan`\n\n* `XCTAssertLessThanOrEqual`\n\n对于所有比较断言，传入的表达式的类型必须相同，并且该类型需要遵循`Comparable`协议。\n\
  \n让我们利用比较断言为`addRandomNumber`编写一个测试。这里我们希望断言输出大于传入的参数：\n\n```\nfunc testAddRandomNumber()\
  \ {\n    // Given\n    let calc = Calculator()\n    // When\n    let output = calc.addRandomNumber(argument:\
  \ 1)\n    // Then\n    XCTAssertGreaterThan(output, 1)\n}\n```\n\n#### 错误断言\n\n\
  * `XCTAssertThrowsError`\n\n* `XCTAssertNoThrow`\n\n这些断言方法用于测试会抛出错误的函数。\n\n我们的`Logger`在尝试记录大于**1000**的数字时会抛出错误。让我们使用这些断言方法来覆盖这部分逻辑。\n\
  \n首先，我们需要添加一个新的测试用例类来包含`Logger`的测试。按照之前的方式创建它，并将其命名为`LoggerTests`。首先添加`@testable`导入语句。然后删除自动生成的代码，并替换为以下内容：\n\
  \n```\nfunc testAddLogShouldThrowIfExceedsLimit() {\n    // Given\n    let logger\
  \ = Logger()\n    let number: Double = 2000\n    // Then\n    XCTAssertThrowsError(try\
  \ logger.log(number))\n}\nfunc testAddLogShouldNotThrowIfUnderLimit() {\n    //\
  \ Given\n    let logger = Logger()\n    let number: Double = 500\n    // Then\n\
  \    XCTAssertNoThrow(try logger.log(number))\n}\n```\n\n这两个测试覆盖了`Logger`抛出错误和不抛出错误的两种场景。\n\
  \n### 期望\n\n现在你已经熟悉了断言函数，让我们更进一步。尝试测试异步代码。首先，什么是异步代码？当你同步执行某件事时，你会等它完成后再继续执行另一个任务。当你异步执行某件事时，你可以在它完成之前就继续执行另一个任务。\n\
  \n我们的`Logger.log(_ number: Double, completion: LogCompletion)`函数是异步添加日志的。它接受一个完成处理器，并在执行完毕时调用它。\n\
  \n让我们尝试为其编写一个测试：\n\n```\nfunc testAddingLog() throws {\n    // Given\n    let logger\
  \ = Logger()\n    let number: Double = 1\n    // When\n    try logger.log(number)\
  \ {\n        // Then\n        XCTAssertEqual(logger.logs.count, 0)\n    }\n}\n```\n\
  \n如果你仔细检查我们刚刚编写的函数和测试，你会发现断言应该失败，因为日志计数预期是`1`，而不是`0`。但是当我们运行这个测试时，它通过了，并且只是偶尔失败。这是因为`log`是异步的，基本上发生的情况是测试执行作用域在函数完成执行或调用完成处理器之前就结束了。所以我们的断言实际上从未被调用。这就是仅靠`XCTAssertTrue`无法胜任的地方——异步代码。\n\
  \n我们可以通过强制测试等待`log`完成来修复这个问题。有很多方法可以做到这一点：等待特定的时间，或者使用`DispatchGroup`。但这些可能有些大材小用和/或不必要，因为正如你所猜到的，XCTest\
  \ 再次为我们提供了支持，这次是用`XCTestExpectation`。\n\n`XCTestExpectation`是一个对象，它描述了我们期望在未来发生的某件事，并且我们希望等待它发生。\n\
  \n我们可以这样创建期望：\n\n```\nlet exp = expectation(description: \"Log added\")\n```\n\n\
  继续，在测试的开头添加这一行。\n\n为了等待一个期望，我们需要添加这一行：\n\n```\nwait(for: [exp], timeout: 1)\n```\n\
  \n让我们也修复一下断言语句。现在测试应该是这样的：\n\n```\nfunc testAddingLog() throws {\n    let exp =\
  \ expectation(description: \"Log added\")\n    // Given\n    let logger = Logger()\n\
  \    let number: Double = 1\n    // When\n    try logger.log(number) {\n       \
  \ // Then\n        XCTAssertEqual(logger.logs.count, 1)\n    }\n    wait(for: [exp],\
  \ timeout: 1)\n}\n```\n\n现在运行测试。测试应该仍然失败，但会显示不同的错误：\n\n```\nAsynchronous wait failed:\
  \ Exceeded timeout of 1 seconds, with unfulfilled expectations: \"Log added\".\n\
  ```\n\n这意味着超时已过，但我们的期望尚未满足，这是合逻辑的，因为我们从未定义何时满足期望。这正展示了`XCTestExpectation`的精妙之处。它们不仅帮助我们等待异步任务完成；它们还充当断言，即期望在给定的时间内得到满足，如果没有，它们会报告错误。\n\
  \n让我们通过定义何时满足期望来修复测试。在`XCTAssertEqual`这一行之后立即添加这一行：\n\n```\nexp.fulfill()\n```\n\
  \n现在当我们运行测试时，它通过了！\n\n#### 期望的类型\n\n就像`XCTAssertTrue`一样，`XCTestExpectation`是我们的基础期望，我们可以用它来等待和测试任何异步代码。但我们还有其他类型的期望，使得等待特定事件更加容易：\n\
  \n1. 常规期望\n\n2. 键值观察期望\n\n3. 通知期望\n\n4. 谓词期望\n\n我们介绍了常规期望类型，其余的将在后续章节中介绍。\n\n\n\n\
  ## 测试顺序\n\n到目前为止，我们已经完成了测试的添加。打开本章资源中的项目检查点版本。按下 `Command+U` 运行所有测试。\n\n你会发现有一个测试失败了，即\
  \ `testIsLoggingEnabledByDefault`。调试失败测试的一个有用技巧是使用断点。Xcode 有一个特殊的断点，叫做**测试失败断点**，它会在断言或预期失败时自动暂停执行。然后你可以利用\
  \ Xcode 的调试器检查变量的当前状态。\n\n要添加**测试失败断点**，请按下 `Command+8` 打开断点导航器。\n\n点击左下角的 `+` 按钮。然后从菜单中选择**测试失败断点**（图\
  \ 2-6）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig6_HTML.jpg](img/505360_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6 — 测试失败断点\n\n你可能注意到一个有趣的现象：这个测试之前是能通过的，而我们仅仅添加了更多的测试。这意味着我们的测试没有正确封装，某些测试影响了其他测试。因此，我们需要在每个测试之前重置共享\
  \ `Calculator` 实例的状态。这可以通过重写 `setUp()` 函数来实现。在每个测试开始之前，XCTest 会先调用 `setUpWithError()`，然后是\
  \ `setUp()`。如果状态准备可能会抛出错误，我们应该重写 `setUpWithError()`。由于我们不会调用任何会抛出错误的函数，`setUp()`\
  \ 就足够了。有时我们可能需要在每个测试之后执行一些清理工作，这时可以使用 `tearDown()` 或 `tearDownWithError()`。\n\n\
  在 `CalculatorTests` 内部、测试之前添加以下代码：\n\n```\noverride func setUp() {\n    UserDefaults.standard.removeObject(forKey:\
  \ Calculator.kLoggingEnabledDefaultsKey)\n}\n```\n\n这会将日志记录功能的启用值重置为初始状态，就像一次全新运行一样。现在再次运行所有测试，它们应该都能通过了。\n\
  \n### 随机化顺序\n\n在 scheme 的**测试**操作中，有一个选项可以随机化测试顺序。\n\n编辑 **Calc** scheme（`Command+Shift+,`）。选择**测试**操作。在中央窗格中，**CalcTests**\
  \ 旁边有一个**选项...**按钮（图 2-7）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig7_HTML.jpg](img/505360_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7 — 随机化测试顺序\n\n点击该按钮，在弹出的窗口中勾选**随机化执行顺序**（图 2-8）。这将使每次测试运行顺序随机化。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig8_HTML.jpg](img/505360_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8 — 随机化执行顺序\n\n这有助于发现更多错误，并暴露测试之间的依赖关系，而这些在使用常规静态顺序时是无法捕捉的。然而，缺点在于，如果顺序问题过于特定，将难以复现。\n\
  \n## 代码覆盖率\n\n既然我们刚才编辑过 scheme，我们再次打开它以启用代码覆盖率。代码覆盖率能让你可视化并衡量有多少代码被测试所覆盖。\n\n要启用代码覆盖率，再次打开**测试**操作。这次选择**选项**标签。有一个**代码覆盖率**复选框。勾选它（图\
  \ 2-9）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig9_HTML.jpg](img/505360_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9 — 代码覆盖率\n\n现在再次运行测试。测试通过后，按下 `Command+9` 打开报告导航器。选择**按组**显示报告。在最新的测试会话下方，你应该能找到覆盖率报告，选择它即可显示（图\
  \ 2-10）。\n\n![../images/505360_1_En_2_Chapter/505360_1_En_2_Fig10_HTML.jpg](img/505360_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10 — 代码覆盖率结果\n\n列表中会显示目标中每个文件的代码行执行百分比。你应该始终追求尽可能高的覆盖率百分比。\n\n打开单个文件会显示每个函数和闭包的覆盖率。双击文件名或函数名会在编辑器中打开该文件。\n\
  \n需要注意的是，高覆盖率百分比并不一定意味着你已添加了所有必需的测试。\n\n## 练习\n\n打开本章资源中的项目最终版本。既然你已经启用了代码覆盖率，尝试添加测试，直到达到至少\
  \ 90% 的覆盖率。你可以利用“我们想测试什么？”部分下的列表。\n\n## 总结\n\n在本章中，你了解了 iOS 中单元测试的基础知识，以及原生测试框架**XCTest**\
  \ 带来的所有强大功能。我们学习了测试目标和测试用例类的作用。我们创建了一个测试目标，以便能够为我们的计算器项目添加测试。然后，我们继续为每个组件添加了测试用例类，以便在它们内部添加测试。\n\
  \n接着，我们开始探索 XCTest 提供的各种断言类型。我们有**真值**断言，基本上用于验证我们提供的表达式是真还是假。然后我们有**相等性**断言，用于验证两个表达式相等或不相等。我们还有**空值性**断言，用于验证我们提供的表达式是空还是非空。我们的**比较**断言可用于比较两个表达式，并确保一个大于另一个或反之。最后，我们有**错误**断言，用于验证某个表达式是否抛出错误。\n\
  \n需要指出的是，我们可以使用普通的 `XCTAssert` 或 `XCTAssertTrue` 执行所有需要的断言。然而，在适用的情况下使用其他类型的断言，可以使我们的测试更易读，并且当断言失败时，Xcode\
  \ 输出的错误信息也更具可读性和实用性。\n\n除了 XCTest 提供的各种断言，还有**预期**，它使得测试异步代码变得非常无缝。我们基本上创建一个预期对象，然后在异步任务完成时将其标记为已完成。为了让测试等待我们的异步任务，我们添加一行代码，告诉测试等待直到预期被满足。\n\
  \n当运行整个测试套件时，我们可能会遇到一个测试导致另一个测试失败的情况。当测试共享同一个环境，并且我们的测试对该环境进行了更改，这些更改泄露到其他测试时，就会发生这种情况。因此，当按特定顺序运行测试时，测试可能因为不是在干净的环境中运行而开始失败。为此，我们学习了如何使用\
  \ `XCTestCase` 的 setup 和 teardown 函数，为所有测试进行通用的设置，并在每个测试完成后进行必要的清理。\n\n最后，我们探索了\
  \ Xcode 的一些隐藏功能。我们添加了**测试失败断点**，以便使用 Xcode 的调试器更轻松地调试失败的测试。启用此断点后，Xcode 会在断言失败时暂停，然后你可以检查失败时刻变量的状态。我们还启用了**随机化测试顺序**，它告诉\
  \ Xcode 每次以不同的顺序运行测试。这有助于发现更多错误。最后，我们启用了**代码覆盖率**，以了解测试覆盖了我们多少代码。启用此功能后，Xcode 会在每次测试运行后生成一份报告，这有助于识别覆盖率较低、需要更多测试的区域。\n\
  \n\n\n"
- "# 3. UI 测试\n\nUI 测试是你的第一道防线，它能告诉你应用是否正常工作；它们与应用的交互方式，与用户的操作方式完全相同。`XCUITest` 框架能帮你查询应用内的\
  \ UI 元素、执行交互操作，并验证 UI 的属性和状态。UI 测试通过 iOS 的无障碍系统来访问你的应用。无障碍是一项技术，它能让残障人士获得与所有其他用户相同的应用体验。它提供了关于\
  \ UI 的丰富语义数据，因此可以使用旁白来引导用户操作应用。\n\n## 你的第一个测试\n\n本章旨在探索 Xcode 中的 UI 测试，因为我们将在后续部分大量依赖它。我们将为一个显示城市列表的简单应用编写\
  \ UI 测试。你可以在本章的资源中找到该应用的起始项目。该应用（图 3-1）包含主屏幕，其中显示了一个城市列表。当你选择其中一个城市时，它将打开另一个屏幕，该屏幕的标题将与所选城市名称匹配。你会找到一个按钮；点击此按钮，它将显示一个欢迎警报。\n\
  \n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig1_HTML.png](img/505360_1_En_3_Fig1_HTML.png)\n\
  \n图 3-1\n\n待测试的应用\n\n如果我们打开演示应用，会发现它没有 UI 测试目标。因此，你需要为 UI 测试创建一个新的目标。UI 测试目标是一个独立的可执行文件，其唯一用途是运行你的\
  \ UI 测试。当你将应用提交到 App Store 或分发你的框架时，这个测试目标不会被包含在内。\n\n按下 `Command+6` 打开测试导航器。\n\n\
  点击左下角的 `+` 按钮。然后从菜单中选择 `New UI Test Target…` （图 3-2）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig2_HTML.jpg](img/505360_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n新建 UI 测试目标\n\n创建 UI 测试目标后，它会创建一个新文件夹，其中包含你的第一个 UI 测试类，该类继承自 `XCTestCase`\
  \ （图 3-3）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig3_HTML.jpg](img/505360_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n样板测试\n\n**要求：**\n\n*   iOS 9 是支持 UI 测试的最低版本。\n*   UI 测试的最低 iOS 版本应与待测试应用的版本一致。\n\
  \n你需要点击 `testExample` 旁边的菱形按钮。你刚刚就运行了你的第一个测试！（图 3-4）\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig4_HTML.jpg](img/505360_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n运行虚拟测试\n\n## XCUITest 组件\n\n`XCUITest` 框架由三个主要组件组成。我们将在进行中逐一介绍。这些组件是：\n\
  \n*   `XCUIApplication`\n*   `XCUIElementQuery`\n*   `XCUIElements`\n\n## 本章目标\n\
  \n正如我们之前提到的，UI 测试与应用的交互方式与用户完全相同。因此，我们希望像用户那样与我们的应用进行交互，并验证一切是否按预期工作。\n\n### 第一个测试用例\n\
  \n*   作为一名用户，我应该在表格视图中看到六个城市；当我点击旧金山城市时，应用应导航到另一个视图，并且标题应与所选城市匹配。在导航到另一个视图后，我应该能够看到一个\
  \ `\"Say Hello !\"` 按钮，当我点击它时，应该显示一条欢迎消息。\n\n如果我们将测试用例转换为操作，它将如下所示：\n\n1.  启动应用。\n\
  2.  统计表格视图内的所有城市。\n3.  选择 `\"San Francisco\"` 城市。\n4.  确保详情视图中的标题是 `San Francisco`。\n\
  5.  点击 `\"Say Hello !\"` 按钮。\n6.  确保你看到了一个欢迎警报。\n\n## 启动应用\n\n要运行你的测试，你必须启动应用。因此，`XCUITest`\
  \ 提供了 `XCUIApplication`，它是你的应用的一个代理，这样你就可以 `launch`（启动）、`terminate`（终止）和 `activate`（激活）你的应用。在每个测试中，你必须有一个\
  \ `XCUIApplication` 的实例，并调用 `app.launch()`。\n\n**使用启动 API 后，我们的第一个测试将是**\n\n```\n\
  func testExample() throws {\n// UI tests must launch the application that they test.\n\
  let app = XCUIApplication()\napp.launch()\n}\n```\n\n`XCUIApplication` 包含一个强大的 API，我们稍后会大量使用它，即\
  \ `launchArguments`。它帮助你向应用发送启动参数以进行特定的自定义。我们将在本书中大量使用这个 API。在每个 UI 测试之前，无论是否使用启动参数，你都必须启动你的应用，这将清除应用的先前实例。\n\
  \n## 查询 UI\n\n我们需要访问表格视图来统计其中的单元格。但是该怎么做呢？`XCUITest` 提供了一个类来执行此操作。`XCUIElementQuery`\
  \ 是一个用于定位 `UIElement` 的查询，以便我可以在 `UIElement` 上进行断言或执行交互。让我们深入了解 `XCUIElementQuery`\
  \ 的工作原理。\n\n`XCUIElementQuery` 执行两个主要功能：关系和过滤。\n\n### 关系\n\n*   **后代**：将获取特定 `UIElement`\
  \ 下的所有后代元素。\n\n例如：视图的后代包含视图下的所有元素：`view.descendants` （图 3-5）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig5_HTML.jpg](img/505360_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n后代关系\n\n*   **子级**：将获取特定 `UIElement` 正下方的所有元素。例如：`TableView` 的子级包含 `TableView`\
  \ 正下方的所有元素，即单元格（图 3-6）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig6_HTML.jpg](img/505360_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n子级关系\n\n*   **包含**：如果 `UIElement` 不唯一，但它包含一个唯一元素时，这会很有用。例如：`cells.containing(NSPredicate(format:\
  \ \"label CONTAINS %@\", \"San Francisco\"))` （图 3-7）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig7_HTML.jpg](img/505360_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n包含关系\n\n### 过滤\n\n我们可以结合过滤器和关系来进行更深入的断言。我们可以过滤后代，只获取特定 `UIElement` 下的标签。\n\
  \n`tableView.descendants(matching: .button)` 将返回 `TableView` 下所有类型为按钮的后代元素。这也等同于以下查询：`tableView.buttons`。我们可以组合查询来构建更复杂的查询，例如，`app.tables.staticTexts`\
  \ 将获取 `TableView` 下的所有标签（图 3-8）。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig8_HTML.jpg](img/505360_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8\n\n组合关系\n\n你可以将查询本身用作断言的终点，因此你可以在添加新单元格后检查单元格的数量：`let query = app.tables.cells`\
  \ 然后 `query.count`。但要注意，每次调用此查询时，它都会重新计算并获取最新的查询结果。\n\n**使用查询 API 后，我们的第一个测试将是**\n\
  \n```\nfunc testExample() throws {\n// UI tests must launch the application that\
  \ they test.\nlet app = XCUIApplication()\napp.launch()\nXCTAssertEqual(app.tables.cells.count,\
  \ 6)\n}\n```\n\n\n\n### 与用户界面交互\n\n我们应该利用 `XCUIElementQuery` 的强大功能来找到 `\"San Francisco\"\
  ` 单元格。首先，你需要获取所有表视图的后代元素，并只返回标签，类似于这样：`app.tables.staticTexts`。这个查询将返回表视图内所有的标签。下一步是找到包含\
  \ `\"San Francisco\"` 的标签。该查询将返回一个 `XCUIElement` 数组。\n\n`XCUIElement` 是应用中 `UIElement`\
  \ 的代理。元素具有诸如 `button`、`cell`、`staticText` 等类型。它们也有标识符，这些标识符来自辅助功能系统、辅助功能标识符，或者辅助功能标签或标题。大多数情况下，我们通过类型和标识符的组合来找到\
  \ `UIElement`；例如，`let button = app.buttons[\"Edit\"]`。我们找到了一个类型为按钮、标识符为 `Edit` 的\
  \ `UIElement`。另一种查询元素的方式是基于元素的内容进行查询。例如，如果我们知道一个标签应该显示特定的文本，我们可以通过查询其内容来搜索该标签。我们可以用这种方法来找到\
  \ `\"San Francisco\"` 标签。此外，还有一个重要的属性可以用来检查 `UIElement` 是否存在：`element.exists`。\n\
  \n**在对 San Francisco 标签进行断言后，我们的第一个测试将是**\n\n```\nfunc testExample() throws {\n\
  \    // UI tests must launch the application that they test.\n    let app = XCUIApplication()\n\
  \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell =\
  \ app.tables.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(cell.exists)\n}\n\
  ```\n\n**注意**：当内容是动态的或在不同运行之间可能不同时，依赖内容是非常危险的。在这种情况下，你应该始终依赖辅助功能标识符。\n\n## UI 事件\n\
  \n一旦找到元素，你需要模拟用户交互。`XCUIElement` 提供了一些 API，你可以用来与 `UIElement` 交互：\n\n*   `tap()`\n\
  *   `doubleTap()`\n*   `press(forDuration:, thenDragTo:)`\n*   `twoFingerTap()`\n\
  *   `swipeUp()`、`swipeDown()`、`swipeLeft()`、`swipeRight()`\n*   `typeText(\"\")`\n\
  \n**在使用 tap API 后，我们的第一个测试将是**\n\n```\nfunc testExample() throws {\n    // UI tests\
  \ must launch the application that they test.\n    let app = XCUIApplication()\n\
  \    app.launch()\n    XCTAssertEqual(app.tables.cells.count, 6)\n    let cell =\
  \ app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n}\n```\n\n## 断言\n\n\
  就像我们在第三步中所做的那样，我们需要获取所有导航栏的后代元素，并只返回标签，然后断言它是否包含 `\"San Francisco\"` 标签。\n\n**在对标题标签进行断言后，我们的第一个测试将是**\n\
  \n```\nfunc testExample() throws {\n    // UI tests must launch the application\
  \ that they test.\n    let app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
  \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
  \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
  }\n```\n\n### 值断言\n\n你可以使用 `value` 属性对 `UIElement` 的值进行断言，该属性根据元素类型而变化。如果 `UIElement`\
  \ 是 `UISwitch`，则其值代表开关状态：\n\n```\nlet genderSwitch = app.tables.switches[\"Gender\"\
  ].value\n```\n\n这里，如果开关关闭，该值将是字符串 `\"0\"`；如果开关打开，值将是 `\"1\"`。\n\n## 辅助功能\n\n应用程序是元素树的根。所有这些都是你可以使用类型和标识符访问的元素。为了在\
  \ UI 测试时轻松应对，你需要使每个 `UIElement` 都是唯一的。在某种程度上，我们将重复我们在第四步中所做的操作，但我们将使用辅助功能标识符来获取\
  \ `\"Say Hello !\"` 按钮。让我们回顾一下应用程序的元素层级结构。\n\n你可以使用 Storyboard 从 Identity Inspector\
  \ 添加辅助功能标识符，方法是检查 Accessibility 是否启用并添加标识符（图 3-9），或者使用 API `view.isAccessibilityElement\
  \ = true` 和 `view.accessibilityIdentifier = \"Hello\"`。\n\n![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig9_HTML.jpg](img/505360_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9：添加标识符\n\n**在使用辅助功能找到 Hello 按钮后，我们的第一个测试将是**\n\n```\nfunc testExample() throws\
  \ {\n    // UI tests must launch the application that they test.\n    let app =\
  \ XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
  \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
  \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
  \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n}\n```\n\n\
  ### 辅助功能提示\n\n*   在测试中添加断点（图 3-10）并在 `LLDB` 中使用以下命令打印 `UIElement` 的描述：`p print(helloButton.debugDescription)`。\n\
  \n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig10_HTML.jpg](img/505360_1_En_3_Fig10_HTML.jpg)\n\
  \n    图 3-10：调试辅助功能\n\n*   当你启动 Accessibility Inspector（图 3-11）时，你可以在模拟器中触摸 `UIElement`\
  \ 以检查辅助功能系统的输出（图 3-12）。\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig12_HTML.jpg](img/505360_1_En_3_Fig12_HTML.jpg)\n\
  \n    图 3-12：使用 Accessibility Inspector 进行调试\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig11_HTML.jpg](img/505360_1_En_3_Fig11_HTML.jpg)\n\
  \n    图 3-11：打开 Accessibility Inspector\n\n## 综合运用\n\n**在对警告内容进行断言后，我们的第一个测试将是**\n\
  \n```\nfunc testExample() throws {\n    // UI tests must launch the application\
  \ that they test.\n    let app = XCUIApplication()\n    app.launch()\n    XCTAssertEqual(app.tables.cells.count,\
  \ 6)\n    let cell = app.tables.staticTexts[\"San Francisco\"]\n    cell.tap()\n\
  \    let titleLabel = app.navigationBars.staticTexts[\"San Francisco\"]\n    XCTAssertTrue(titleLabel.exists)\n\
  \    let helloButton = app.buttons[\"Hello\"]\n    helloButton.tap()\n    XCTAssertTrue(app.alerts.staticTexts[\"\
  Welcome\"].exists)\n    XCTAssertTrue(app.alerts.staticTexts[\"in San Francisco\"\
  ].exists)\n}\n```\n\n## 改进 UI 测试\n\nUI 测试比普通的单元测试要慢得多。这是由于它们的本质，因为它们像普通用户一样直接与 UI\
  \ 交互。然而，为了让你的 UI 测试高效，有几点需要注意：\n\n*   **等待时间**：不要在测试中使用 `sleep` 来等待特定操作，因为这会使你的测试变慢，并且仍然可能导致测试不稳定；你需要使用\
  \ `.waitForExistence(timeout: )`。\n*   **并行 UI 测试执行** 从 Xcode 10 开始支持，但在 Xcode 11\
  \ 上更稳定（图 3-13）。\n\n    ![../images/505360_1_En_3_Chapter/505360_1_En_3_Fig13_HTML.jpg](img/505360_1_En_3_Fig13_HTML.jpg)\n\
  \n    图 3-13：并行化测试执行\n\n## 练习\n\n我们已经完成了第一个 UI 测试，它导航到第一个城市并点击了“Say Hello !”按钮。尝试编写另一个\
  \ UI 测试，它导航到第一个城市并点击“Say Hello !”按钮，然后返回并导航到第二个城市，再点击“Say Hello !”按钮。\n\n\n好的，作为高级文档工程师和翻译员，我将按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n## 总结\n\n在 UI 测试中，我们与应用程序的交互方式与真实用户完全相同。在本章中，我们探讨了 iOS 中 UI 测试的基础知识，以及如何使用 `XCUITest`\
  \ 框架，通过查找屏幕上的 UI 元素、与之交互，并验证应用程序预期的 UI 状态来编写所有测试。\n\n我们使用 `XCUIApplication` 为应用程序创建了一个代理，并使用该代理来启动我们的应用程序。我们也可以使用同一个代理来终止应用程序。应用程序启动后，为了开始与之交互，我们需要访问屏幕上的\
  \ UI 元素。为了搜索和查找特定的 UI 元素，我们使用强大的 `XCUIElementQuery` 在我们的应用程序视图中进行搜索。通过组合多个查询，我们可以找到所需的元素。\n\
  \n当我们获取到某个元素后，我们可以使用前一章讨论的标准 `XCTAsserts` 来断言其状态，也可以与该元素进行交互。使用 `XCUITest` 可以模拟多种用户交互。我们可以点击或双击、长按、向任意方向滑动，甚至在适用的情况下输入文本。\n\
  \niOS 中的 UI 测试与辅助功能特性是相辅相成的。为你的视图添加辅助功能标识符、标签和值，不仅能让你的应用程序对视障、行动不便、学习障碍或听障人士更友好，也会让编写\
  \ UI 测试变得更加容易。当你使视图可访问时，你的测试就可以使用辅助功能标识符或标签来查询这些元素，并可以检查其值以验证正确的行为。\n\n## 测试金字塔\n\
  \n现在我们已经知道了如何使用 `XCTest` 和 `XCUITest` 在 iOS 中编写测试，我们需要了解我们应该编写哪些类型的测试，以及每种测试类型的数量。这正是“测试金字塔”（图\
  \ 4-1）概念的用武之地。这个概念有助于回答这两个问题。Mike Cohn 在他的书 *Succeeding with Agile* 中提出了这个概念。这是一个绝佳的视觉隐喻，告诉你要考虑不同的测试层次，也告诉你在每一层应该进行多少测试。\n\
  \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig1_HTML.jpg](img/505360_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n空的测试金字塔\n\n我们不直接展示 Mike Cohn 得出的结论，而是尝试通过几个例子来推导它。在本章中，你将了解到三种测试类型，并为每种类型实现一些测试。在本章结束时，我们将尝试推导出每种类型在测试金字塔中的位置。\n\
  \n## 我们的应用程序\n\n让我们来看看本章的演示应用程序 `TestingPyramid`。你可以在本章的资源中找到该应用程序的起始项目。这是一个极其简单的应用程序，只有两个屏幕（图\
  \ 4-2）。初始屏幕是登录屏幕，用户需要在此输入电子邮件和密码。如果登录成功，用户将被引导到第二个屏幕，即统计页面。统计页面显示自应用程序安装以来的成功和失败登录次数。\n\
  \n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig2_HTML.jpg](img/505360_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n应用程序屏幕\n\n该应用程序内部包含以下组件：\n\n- `Validator`：验证电子邮件和密码\n- `DatabaseManager`：查询本地数据库以检查登录尝试是否有效\n\
  - `PersistenceManager`：在用户默认设置中保存失败登录和成功登录的次数\n- `LoginManager`：负责执行整个登录流程，包括验证输入的凭据、发起网络请求以及根据结果更新保存的统计数据\n\
  \n### UI 测试\n\n我们将探索的第一种类型是 UI 测试。在编写 UI 测试时，我们希望测试两个相互关联的事情：我们的 UI 是否正确显示，以及应用程序的功能是否按预期工作。进行\
  \ UI 测试时，我们以用户完全相同的方式查看应用程序，也以用户相同的方式与应用程序交互。我们无法访问任何内部代码，不能检查网络请求，也不能查询持久化层或写入内部变量。\n\
  \n让我们来看看我们可以为应用程序编写的一些 UI 测试：\n\n```\nfunc testInvalidLogin() throws {\n    // 初始状态\n\
  \    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
  \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
  \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
  \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
  \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n   \
  \ XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
  \    // 无效登录\n    loginButton.tap()\n    // 然后\n    let alert = app.alerts.element\n\
  \    let alertExists = alert.waitForExistence(timeout: 5)\n    XCTAssertTrue(alertExists)\n\
  \    XCTAssertEqual(alert.label, \"Login Error\")\n    XCTAssertTrue(alert.staticTexts[\"\
  Email can not be empty\"].exists)\n}\n\nfunc testValidLogin() throws {\n    // 初始状态\n\
  \    let title = app.staticTexts[AccessibilityIdentifiers.kLoginWelcomeLabelIdentifier]\n\
  \    let emailTextField = app.textFields[AccessibilityIdentifiers.kLoginEmailTextFieldIdentifier]\n\
  \    let passwordTextField = app.textFields[AccessibilityIdentifiers.kLoginPasswordTextFieldIdentifier]\n\
  \    let loginButton = app.buttons[AccessibilityIdentifiers.kLoginButtonIdentifier]\n\
  \    XCTAssertTrue(title.exists)\n    XCTAssertTrue(emailTextField.exists)\n   \
  \ XCTAssertTrue(passwordTextField.exists)\n    XCTAssertTrue(loginButton.exists)\n\
  \    // 有效登录\n    emailTextField.tap()\n    emailTextField.typeText(\"valid@valid.com\"\
  )\n    passwordTextField.tap()\n    passwordTextField.typeText(\"Password!\")\n\
  \    loginButton.tap()\n    // 然后\n    let statisticsTitle = app.staticTexts[AccessibilityIdentifiers.kStatisticsTitleLabelIdentifier]\n\
  \    let failedLabel = app.staticTexts[AccessibilityIdentifiers.kFailedCountLabelIdentifier]\n\
  \    let successfulLabel = app.staticTexts[AccessibilityIdentifiers.kSuccessfulCountLabelIdentifier]\n\
  \    XCTAssertTrue(statisticsTitle.exists)\n    XCTAssertTrue(failedLabel.exists)\n\
  \    XCTAssertTrue(successfulLabel.exists)\n}\n```\n\n这里我们测试了两个场景：一个是登录成功，另一个是登录失败（因为电子邮件和密码为空）。在这两种场景中，我们都断言的预期行为。然而，关于登录失败，我们知道这并不是导致登录失败的唯一场景。一种选择是为每个导致登录失败的场景添加一个\
  \ UI 测试，但由于 UI 测试的执行时间成本很高，添加多个几乎相同的测试是没有意义的。因此，我们将在测试金字塔的不同层级中尝试覆盖这些场景。UI 测试的另一个不足在于断言内部状态的变化。例如，我们希望断言当尝试登录时，登录计数已经更新。但由于我们无法访问内部代码，我们也需要在另一个不同的层级中来覆盖这一点。\n\
  \n\n\n### 集成测试\n\n对于每个组件，我们可以根据其隔离程度来进行描述。我们将完全独立的组件（即不依赖其他任何组件的组件）称为**独立组件**。而将依赖或集成其他组件的组件称为**社交型组件**。就像人类一样，有些社交型组件可能比其他社交型组件更具社交性。\n\
  \n集成测试的目标是高度社交型的组件，即那些将其他较小组件集成在一起的组件。通常，这类组件的数量相对较少。\n\n关于哪些组件应该成为集成测试的对象，并没有统一的规定。在这方面，你需要自行判断。不过，在做判断时，有一些因素需要考虑。独立组件不需要集成测试，因为它们不与任何组件集成。高度社交型的组件则很可能属于集成测试的范畴。介于两者之间的组件并不总是需要作为集成测试的对象。是的，我们可以为所有社交型组件添加集成测试。然而，对于那些更接近独立而非社交的组件，添加集成测试可能不会增加太多价值，反而会拖慢集成测试套件的运行速度。为这些组件添加单元测试可能就足够了。但这最终取决于你的判断。\n\
  \n就我们的演示应用而言，`LoginManager` 是一个高度社交型的组件，因为它与我们的其他三个组件进行交互。让我们来看看可以为 `LoginManager`\
  \ 编写的一些集成测试：\n\n```\nfunc testInvalidCredentialsLogin() {\n// Given\nlet databaseManager\
  \ = TestDatabaseManager() // #1\nlet persistenceManager = PersistenceManager.shared\n\
  let manager = LoginManager(databaseManager: databaseManager)\n// That\nlet expectation\
  \ = self.expectation(description: \"Login finished\")\n// When\nmanager.login(email:\
  \ \"invalid\", password: \"invalid\") { (success, error) in\n// Then\nXCTAssertFalse(success,\
  \ \"Login should not be successful\") // #2\nXCTAssertEqual(error, ValidationError.invalidEmail.message,\
  \ \"Wrong error returned from login\") // #3\nexpectation.fulfill()\n}\n// Then\n\
  self.wait(for: [expectation], timeout: 2)\nXCTAssertEqual(persistenceManager.failedLoginsCount,\
  \ 1, \"Failed login counts should be incremented\") // #4\nXCTAssertEqual(persistenceManager.successfulLoginsCount,\
  \ 0, \"Successful login counts should not be incremented\") // #5\nXCTAssertEqual(databaseManager.queriesCount,\
  \ 0, \"Database should not be queried\") // #6\n}\n```\n\n这里我们编写了一个测试，用于验证 `LoginManager`\
  \ 是否正确与其依赖项交互。在凭据无效的情况下，我们做了以下断言：\n\n1.  我们创建了一个 `TestDatabaseManager` 的实例，它的行为与普通的\
  \ `DatabaseManager` 相同，只是它会记录对数据库进行的查询次数。\n2.  我们断言登录函数返回了 false 的成功标志。\n3.  我们断言返回的错误是类型为\
  \ `\"invalidEmail\"` 的验证错误。\n4.  我们断言登录管理器要求持久化管理器增加失败登录次数。\n5.  我们断言登录管理器没有要求持久化管理器增加成功登录次数。\n\
  6.  我们断言登录管理器没有查询数据库。\n\n```\nfunc testIncorrectCredentialsLogin() {\n// Given\n\
  let databaseManager = TestDatabaseManager(databaseFilename: \"testAccounts\")\n\
  let persistenceManager = PersistenceManager.shared\nlet manager = LoginManager(databaseManager:\
  \ databaseManager)\n// That\nlet expectation = self.expectation(description: \"\
  Login finished\")\n// When\nmanager.login(email: \"test@test.com\", password: \"\
  Incorrect!\") { (success, error) in\n// Then\nXCTAssertFalse(success, \"Login should\
  \ not be successful\") // #1\nXCTAssertEqual(error, DatabaseError.credentialMismatch.message,\
  \ \"Wrong error returned from login\") // #2\nexpectation.fulfill()\n}\n// Then\n\
  self.wait(for: [expectation], timeout: 2)\nXCTAssertEqual(persistenceManager.failedLoginsCount,\
  \ 1, \"Failed login counts should be incremented\") // #3\nXCTAssertEqual(persistenceManager.successfulLoginsCount,\
  \ 0, \"Successful login counts should not be incremented\") // #4\nXCTAssertEqual(databaseManager.queriesCount,\
  \ 1, \"Database should be queried\") // #5\n}\n```\n\n对于第二个测试，我们考察了凭据不正确的情况，并做了以下断言：\n\
  \n1.  我们断言登录函数返回了 false 的成功标志。\n2.  我们断言返回的错误是类型为 `\"credentialMismatch\"` 的数据库错误。\n\
  3.  我们断言登录管理器要求持久化管理器增加失败登录次数。\n4.  我们断言登录管理器没有要求持久化管理器增加成功登录次数。\n5.  我们断言登录管理器查询了数据库恰好一次。\n\
  \n```\nfunc testSuccessfulLogin() {\n// Given\nlet databaseManager = TestDatabaseManager(databaseFilename:\
  \ \"testAccounts\")\nlet persistenceManager = PersistenceManager.shared\nlet manager\
  \ = LoginManager(databaseManager: databaseManager)\n// That\nlet expectation = self.expectation(description:\
  \ \"Login finished\")\n// When\nmanager.login(email: \"test@test.com\", password:\
  \ \"!2345678\") { (success, error) in\n// Then\nXCTAssertTrue(success, \"Login should\
  \ be successful\")\nXCTAssertNil(error, \"No error should be returned from login\"\
  )\nexpectation.fulfill()\n}\n// Then\nself.wait(for: [expectation], timeout: 2)\n\
  XCTAssertEqual(persistenceManager.failedLoginsCount, 0, \"Failed login counts should\
  \ not be incremented\")\nXCTAssertEqual(persistenceManager.successfulLoginsCount,\
  \ 1, \"Successful login counts should be incremented\")\nXCTAssertEqual(databaseManager.queriesCount,\
  \ 1, \"Database should be queried\")\n}\n```\n\n最后，对于成功登录的情况，我们做了以下断言：\n\n1.  我们断言登录函数返回了\
  \ true 的成功标志。\n2.  我们断言没有返回任何错误。\n3.  我们断言登录管理器没有要求持久化管理器增加失败登录次数。\n4.  我们断言登录管理器要求持久化管理器增加成功登录次数。\n\
  5.  我们断言登录管理器查询了数据库恰好一次。\n\n现在我们需要回答的问题是：我们是否应该为 `LoginManager` 添加更多的测试？我们可能可以，例如，我们还没有覆盖初始验证会失败的所有情况。所以如果看一下我们编写的第一个测试\
  \ `testInvalidCredentialsLogin`，我们可能可以添加多个类似的测试，每个测试都有不同的验证错误，并断言匹配的错误。这将是一个新测试的示例。\n\
  \n\n```swift\nfunc testInvalidCredentialsLoginEmptyEmail() {\n    // Given\n   \
  \ let databaseManager = TestDatabaseManager()\n    let persistenceManager = PersistenceManager.shared\n\
  \    let manager = LoginManager(databaseManager: databaseManager)\n    // That\n\
  \    let expectation = self.expectation(description: \"Login finished\")\n    //\
  \ When\n    manager.login(email: \"\", password: \"invalid\") { (success, error)\
  \ in\n        // Then\n        XCTAssertFalse(success, \"Login should not be successful\"\
  ) // #1\n        XCTAssertEqual(error, ValidationError.emptyEmail.message, \"Wrong\
  \ error returned from login\") // #2\n        expectation.fulfill()\n    }\n   \
  \ // Then\n    self.wait(for: [expectation], timeout: 2)\n    XCTAssertEqual(persistenceManager.failedLoginsCount,\
  \ 1, \"Failed login counts should be incremented\") // #3\n    XCTAssertEqual(persistenceManager.successfulLoginsCount,\
  \ 0, \"Successful login counts should not be incremented\") // #4\n    XCTAssertEqual(databaseManager.queriesCount,\
  \ 0, \"Database should not be queried\") // #5\n}\n```\n\n仔细看看上面的测试，你会发现它几乎是我们第一个测试的翻版。我们还可以再添加五个重复的测试，每个测试对应不同的错误。但这些测试的问题在于，它们会一遍又一遍地执行完全相同的检查（与\
  \ `PersistenceManager` 和 `DatabaseManager` 相关的检查）。这意味着，如果其中一个副本在涉及 `PersistenceManager`\
  \ 或 `DatabaseManager` 的检查中通过了或失败了，那么所有其他测试必定会表现出相同的行为。因此，它们唯一的价值在于测试 `Validator`，因为这是它们之间唯一的变量。一旦我们发现了这个问题，就可以有把握地推断这些测试不应该出现在集成测试层面，这引出了我们的第三个也是最后一个层面：单元测试。\n\
  \n### 单元测试\n\n在讨论单元测试之前，我们首先需要定义什么是单元。这并非一个容易回答的问题。然而，业界已经基本达成共识，对于面向对象的语言（如 Swift），每个类都被视为一个“单元”。\n\
  \n在测试特定类时，我们至少应该测试该类的公共接口。单元测试应覆盖正常场景以及边界情况。\n\n单元测试在高度隔离的环境中运行，这意味着每个单元都应独立进行测试以确保其正常工作。也就是说，如果一个单元依赖于另一个组件，那么这个组件需要进行桩接（stubbed）。我们将在后面的第\
  \ 7 章中详细讨论桩接和模拟。由于这种高度隔离性，单元测试将是我们编写的最快类型的测试。\n\n对于我们的演示应用，我们需要为 `Validator`、`PersistenceManager`\
  \ 和 `DatabaseManager` 添加单元测试。让我们看看可以为 `Validator` 编写的单元测试。在 `LoginManager` 的测试中，我们经历了验证失败的场景，并断言登录函数返回的错误与预期的验证错误一致。我们还经历了验证通过的场景。但对于\
  \ `Validator` 的测试，我们将涵盖验证凭据时所有可能的场景：\n\n```swift\n// Test validating a valid credential\n\
  func testValidCredentials() {\n    // Given\n    let validator = Validator()\n \
  \   let credentials = Credentials(email: \"valid@valid.com\", password: \"Password!\"\
  )\n    // When\n    let result = validator.validateCredentials(credentials)\n  \
  \  // Then\n    XCTAssertTrue(result.success)\n    XCTAssertNil(result.error)\n\
  }\n\n// Test validating an invalid credential with empty email\nfunc testEmptyEmail()\
  \ {\n    // Given\n    let validator = Validator()\n    let credentials = Credentials(email:\
  \ \"\", password: \"Password!\")\n    // When\n    let result = validator.validateCredentials(credentials)\n\
  \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
  \ .emptyEmail)\n}\n\n// Test validating an invalid credential with invalid email\n\
  func testInvalidEmail() {\n    // Given\n    let validator = Validator()\n    let\
  \ credentials = Credentials(email: \"invalid\", password: \"Password!\")\n    //\
  \ When\n    let result = validator.validateCredentials(credentials)\n    // Then\n\
  \    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error, .invalidEmail)\n\
  }\n\n// Test validating an invalid credential with long email\nfunc testTooLongEmail()\
  \ {\n    // Given\n    let validator = Validator()\n    let email = randomString(100)\
  \ + \"@valid.com\"\n    let password = \"Password!\"\n    let credentials = Credentials(email:\
  \ email, password: password)\n    // When\n    let result = validator.validateCredentials(credentials)\n\
  \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
  \ .tooLongEmail)\n}\n\n// Test validating an invalid credential with empty password\n\
  func testEmptyPassword() {\n    // Given\n    let validator = Validator()\n    let\
  \ credentials = Credentials(email: \"valid@valid.com\", password: \"\")\n    //\
  \ When\n    let result = validator.validateCredentials(credentials)\n    // Then\n\
  \    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error, .emptyPassword)\n\
  }\n\n// Test validating an invalid credential with short password\nfunc testShortPassword()\
  \ {\n    // Given\n    let validator = Validator()\n    let credentials = Credentials(email:\
  \ \"valid@valid.com\", password: \"1234!\")\n    // When\n    let result = validator.validateCredentials(credentials)\n\
  \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
  \ .tooShortPassword)\n}\n\n// Test validating an invalid credential with long password\n\
  func testLongPassword() {\n    // Given\n    let validator = Validator()\n    let\
  \ email = \"valid@valid.com\"\n    let password = randomString(41)\n    let credentials\
  \ = Credentials(email: email, password: password)\n    // When\n    let result =\
  \ validator.validateCredentials(credentials)\n    // Then\n    XCTAssertFalse(result.success)\n\
  \    XCTAssertEqual(result.error, .tooLongPassword)\n}\n\n// Test validating an\
  \ invalid credential with password having no special characters\nfunc testNoSpecialCharacterPassword()\
  \ {\n    // Given\n    let validator = Validator()\n    let credentials = Credentials(email:\
  \ \"valid@valid.com\", password: \"12345678\")\n    // When\n    let result = validator.validateCredentials(credentials)\n\
  \    // Then\n    XCTAssertFalse(result.success)\n    XCTAssertEqual(result.error,\
  \ .noSpecialCharacters)\n}\n```\n\n对于我们的 `Validator` 组件，我们涵盖了验证逻辑中所有可能的场景。我们在添加单元测试时拥有很高的自由度，因为单元测试是成本最低的测试类型。因此，所有我们决定不在\
  \ UI 测试或集成测试中覆盖的场景，都可以在这个层面得到覆盖。\n\n\n## 总结\n\n在单元测试中，我们测试了`validator`、`network`和`persistence`的独立功能。在集成测试中，我们测试了一个特殊组件（`LoginManager`），它基本整合了所有组件。通过这些测试，我们确保各个单元能够正确地相互集成。而在\
  \ UI 测试中，我们不仅测试了所有组件的集成情况，还验证了 UI 能否正常工作。\n\n单元测试确保特定组件按预期工作。测试组件时，我们完全隔离于其他组件进行测试。测试套件中单元测试的数量通常远超其他类型的测试，幸运的是，它们也是执行速度最快的测试类型。\n\
  \n集成测试针对的是连接并整合多个较小组件的组件。它们确保这些较小的组件能够按预期协同工作。如果没有集成测试，即使单元测试覆盖率非常高，许多错误也可能被遗漏。在速度方面，集成测试比单元测试慢。\n\
  \nUI 测试确保 UI 行为正确，并且应用的主要功能正常运行。可以说，UI 测试是一种非常高级的集成测试。你完全以用户视角来审视应用——不像单元测试和集成测试那样需要了解代码的内部结构，也无法添加`mocks`或`stubs`来隔离特定功能。没有\
  \ UI 测试，你就无法保证应用按预期工作，因为这种测试模拟了用户使用应用的方式。由于这类测试涉及 UI，因此是所有测试类型中最慢的。\n\n这就引出了我们的测试金字塔（图\
  \ 4-3），现在它包含了三个同等重要的测试层级。\n\n![../images/505360_1_En_4_Chapter/505360_1_En_4_Fig3_HTML.jpg](img/505360_1_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** 最终测试金字塔\n\n在构建自己的测试套件时，测试金字塔是一个很好的经验法则。遵循金字塔形状来构建健康、快速且易于维护的测试套件：编写大量小而快的单元测试；为社交组件编写更多的集成测试；再编写少量端到端的高层级测试来测试整个应用。\n\
  \n"
- "# 5. TDD 深入探讨\n\n至此，你已经了解了测试和 TDD 的基础知识，并利用 TDD 实现了一些简单的示例。本章旨在将此推向更深的层次。我们撰写本书的目标之一，就是向你展示测试驱动软件开发的完整体验。我们想展示\
  \ TDD 如何适用于不同类型的项目，而不仅仅是简单的示例。我们将从头开始实现这个项目，使用 TDD 逐步、安全地添加一小段代码，直到我们一起完成整个项目。\n\
  \n## CoffeePot\n\n你是否曾在你最喜欢的咖啡馆排队时，面对琳琅满目的选项感到困惑，最后只好点了一杯你最熟悉的咖啡？即使你现在是个咖啡爱好者，也一定有过还是咖啡新手的阶段。这就是\
  \ CoffeePot 的用武之地。它是所有咖啡新手的最佳伙伴。**CoffeePot**是一个旨在帮助你了解各种咖啡类型以及不同咖啡制作方法的应用。你可以把它当作一本终极咖啡指南。在本章结束时，我们将让**CoffeePot**成功运行，随时准备辅助任何咖啡订单。这个应用的灵感主要来源于**Taste\
  \ of Home**的[这篇](https://www.tasteofhome.com/article/types-of-coffee/)文章，我们的数据也来自这里。\n\
  \n## 放眼全局\n\n处理任何项目或问题的黄金法则是粒度化：你无法一口气完成一个项目。你必须将其分解成小块，然后逐一完成。关键在于如何添加一个微小块，并确保它能正确集成且不破坏已有功能。每个块应该足够重要和具体，以便能判断何时完成；同时也要足够小，以便专注于一个概念并能快速实现。将工作划分为连贯的小块也有助于管理开发风险。\n\
  \n粒度化（图 5-1）非常强大，但你需要始终着眼于最终目标——即完成项目，否则可能会迷失方向。因此，当我们开始实现一个新功能时，我们首先编写验收测试。验收测试会端到端地验证我们想要构建的功能；当验收测试失败时，表明我们尚未完成；当它通过时，我们就完成了。在实现新功能时，测试循环是衡量我们进度的标尺，而不断增长的测试套件则保护我们，在后续修改系统时免于回归错误。同时，我们需要尽可能保持代码简单，使其更容易理解和修改。永远记住：开发者花在阅读代码上的时间比编写代码更多。所以这才是我们应该优化的方向。在\
  \ TDD 中，我们可以持续重构代码，以简化和改进设计。反馈循环中的测试套件可以保护我们免于犯错。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig1_HTML.jpg](img/505360_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** 粒度化可视化\n\n## 需求\n\n**让我们从用户故事开始：**\n\n如果你不熟悉用户故事，它是一种从最终用户角度编写的、对软件功能的通用说明。\n\
  \n1.  作为一名用户，我想了解所有类型的热饮和冷饮咖啡，包括咖啡饮品的图片。\n2.  作为一名用户，我想点击任一咖啡饮品类型，以显示该饮品的更多详细信息，包括咖啡图片和配料简要说明。\n\
  3.  作为一名用户，我想了解所有类型的咖啡机，包括咖啡机的图片。\n4.  作为一名用户，我想点击任一咖啡机类型，以显示该机器的更多详细信息，包括机器图片和简要的使用说明。\n\
  \n> **注意：** 所有所需数据都包含在初始项目中，格式为`plist`文件。\n\n**项目线框图**（图 5-2）：\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig2_HTML.jpg](img/505360_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 线框图\n\n\n\n## 测试金字塔\n\n如前一章所述，我们共有三种类型的测试；每种测试都执行特定任务或解答特定问题。在**单元测试**中，我们测试每个类的独立功能——我们的对象是否做了正确的事情？在**集成测试**中，我们测试集成其他组件的组合组件——我们的对象能否正确协作？而在**UI\
  \ 测试**中，我们进行端到端的系统测试——整个系统是否正常工作？在实现这个项目时，我们将同时使用这三个测试层级，并学习如何将测试金字塔概念与 TDD 实现方法相结合。\n\
  \n用户故事是最小且能独立为用户带来价值的功能。我们将逐个处理用户故事。尽管用户故事很小，但无法一次性实现；我们需要将其拆解为微小模块，然后逐个完成这些模块。我们完成每个用户故事的策略（图\
  \ 5-3）是：先编写一个会失败的端到端测试，然后通过一组集成测试来设计用户故事。集成测试将定义对象间如何通信；接着我们会遍历每个对象，编写描述其职责的失败单元测试。当所有单元测试通过时，集成测试也将随之通过。\n\
  \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig3_HTML.jpg](img/505360_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3  \n测试计划示意图\n\n## 第一个故事\n\n> “作为用户，我希望了解所有热饮和冷饮咖啡品种，包括咖啡饮品的图片。”\n\n让我们打开本章资源中的入门项目。首先，我们需要编写一个会失败的端到端测试，验证咖啡饮品视图是否显示所有咖啡饮品（图\
  \ 5-4）。当这个端到端测试通过时，就表明我们完成了这个用户故事。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig4_HTML.jpg](img/505360_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4  \n测试计划示意图（已添加端到端测试）\n\n我们来编写第一个测试（UI 测试）：\n\n```\nfunc testShowsAllCoffeeDrinks()\
  \ {\n    let app = XCUIApplication()\n    app.launchEnvironment = [\"coffee_drinks_stubbed\"\
  : \"coffee_drinks_stub\"]\n    app.launch()\n    let coffeeCollectionView = app.collectionViews\n\
  \    XCTAssertTrue(coffeeCollectionView.cells[\"coffee1\"].exists, \"Failed to show\
  \ the first coffee item in plist\")\n    XCTAssertTrue(coffeeCollectionView.cells[\"\
  coffee2\"].exists, \"Failed to show the second coffee item in plist\")\n}\n```\n\
  \n这里我们编写了第一个端到端测试。通过启动参数配置应用（本章后续章节“CoffeeDrinksDataSource”将详细讨论），然后断言集合视图中数据是否正确显示。\n\
  \n## 架构设计\n\n在让端到端测试通过之前，我们先讨论面向对象设计。面向对象设计更关注模块间通信及模块内部对象间的通信，而非对象本身。对象通过消息通信：它接收其他对象的消息，并通过向其他对象发送消息或向原始发送者返回值来做出响应。每个对象必须执行单一职责，这使得我们可以通过改变对象组合（增删实例、组合不同模块）来改变系统行为。\n\
  \n现在我们需要设计对象在后端如何交互以实现所需用户故事。有多种模式可供选择，如 MVC、MVP、MVVM 等。这些设计模式都有助于开发松散耦合、易于测试和维护的应用程序。它们通常将应用划分为不同的组件组，每个组件组承载应用的特定方面。在本项目中，我们将使用简单的\
  \ MVP 模式。\n\n## MVP 模式\n\n模型-视图-呈现器（MVP）架构模式（图 5-5）通过呈现器将数据模型与视图分离。\n\n1. **视图**\n\
  \nMVP 中的视图组件包含应用的视觉部分。\n\n它仅包含 UI，不包含任何逻辑或数据的显示知识。它还处理用户与屏幕的交互，并将交互定向到呈现器。\n\n2.\
  \ **呈现器**\n\n呈现器是连接模型和视图的层。它触发业务逻辑，并告知视图何时更新。它与模型交互，从模型中获取并格式化数据以更新视图。\n\n3. **模型**\n\
  \n模型包含数据提供者、获取和更新数据的代码及业务逻辑。通常数据从网络或本地数据库获取。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig5_HTML.jpg](img/505360_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5  \nMVP 设计模式\n\n## 第一个集成测试\n\n集成测试主要负责验证对象如何集成和通信。它让我们优先思考设计，以及所有对象如何履行职责并在系统内部交互。如第\
  \ 4 章所述，我们为高度交际性组件编写集成测试。将 MVP 设计模式应用于第一个用户故事的逻辑后，我们会发现呈现器就是这样的交际性组件。我们的设计可能如图 5-6\
  \ 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig6_HTML.jpg](img/505360_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6  \nMVP 应用场景\n\n如果将示意图转换为代码：当`CoffeeDrinksController`加载时，将初始化`CoffeeDrinksPresenter`，其构造函数接收`CoffeeDrinksModel`。`CoffeeDrinksPresenter`包含获取所有咖啡饮品的方法，并在底层抽象与`CoffeeDrinksModel`的通信；模型返回饮品数据后，`CoffeeDrinksPresenter`更新视图。对应的测试如下：\n\
  \n```\nfunc testFetchingAllCoffeeDrinks() {\n    //Given\n    let expectedDrinks\
  \ = \"\"\"\n    [\n    {\n        \"name\": \"coffee1\",\n        \"image_name\"\
  : \"black\",\n        \"desc\": \"desc1\"\n    },\n    {\n        \"name\": \"coffee2\"\
  ,\n        \"image_name\": \"black\",\n        \"desc\": \"desc2\"\n    }\n    ]\n\
  \    \"\"\"\n    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:\
  \ expectedDrinks)\n    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)\n\
  \    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model: coffeeDrinksModel)\n\
  \    // when & then\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinksCount(),\
  \ 2)\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index: 0), \"coffee1\"\
  )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index: 0), \"black\"\
  )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index: 1), \"coffee2\"\
  )\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index: 1), \"black\"\
  )\n}\n```\n\n当前测试状态如图 5-7 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig7_HTML.jpg](img/505360_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7  \n测试计划示意图（已添加集成测试#1）\n\n### 单元测试\n\n如果运行集成测试，它肯定会失败。我们需要遍历每个对象并开始使用单元测试实现，直到集成测试通过。我们将编写一个会失败的单元测试，使其通过，然后重构——如图\
  \ 5-8 所示。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig8_HTML.jpg](img/505360_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8  \n单元级 TDD 循环\n\n\n\n### `CoffeeDrinksDataSource`\n\n我们从最小的单元`CoffeeDrinksDataSource`开始。它是一个对象，唯一职责是从磁盘读取\
  \ plist 文件，并以`Data`的形式返回。由于其特性，我们会发现为它编写测试基本上等同于重复实现代码。这是一个极为罕见的案例，我们遇到的类不需要测试。但与此同时，我们又不能将这种逻辑注入到另一个类中，因为我们需要用它来辅助其他测试。（本章后面会详细讨论这一点。）\n\
  \n现在我们来编写这个类：\n\n```\nclass CoffeeDrinksDataSource {\n    func plistDataSourcePath()\
  \ -> String? {\n        var fileName = \"coffee_drinks\"\n        // UITests\n \
  \       if let stubbedFileName = ProcessInfo.processInfo.environment[\"coffee_drinks_stubbed\"\
  ] {\n            fileName = stubbedFileName\n        }\n        return Bundle.main.path(forResource:\
  \ fileName, ofType: \"plist\")\n    }\n\n    public func getData() -> Data? {\n\
  \        let dataPath = plistDataSourcePath()\n        guard let path = dataPath,\
  \ let dataArray = NSArray(contentsOfFile:path) else {\n            return nil\n\
  \        }\n        var data:Data?\n        do {\n            data = try JSONSerialization.data(withJSONObject:\
  \ dataArray)\n        } catch {\n            print(\"JSON serialization failed:\
  \  \\(error)\")\n        }\n        return data\n    }\n}\n```\n\n`CoffeeDrinksDataSource`的实现用于从\
  \ plist 文件中读取数据并返回数据。我们还需要添加一些仅用于 UI 测试的额外逻辑。有时，我们需要让 UI 测试代码将信息传递给移动应用，不是通过文本字段输入或用户交互，而是通过命令行参数或启动环境/参数来发送。如果你还记得我们编写的第一个\
  \ UI 测试，我们需要对咖啡饮品视图内的数据进行桩处理，而不是依赖可能随应用生命周期变化并导致测试不可靠的实际数据。这里我们通过环境变量添加了桩处理数据源返回数据的能力。我们使用`ProcessInfo.processInfo.environment`来访问环境变量。\n\
  \n### `CoffeeDrinksModelTests`\n\n由于`CoffeeDrinksModel`依赖于`CoffeeDrinksDataSource`，如果我们要精确地测试它，就需要排除所有`CoffeeDrinksModel`所依赖的对象，使其返回预期的数据，并对`CoffeeDrinksModel`内部所有公有方法进行断言。这就是所谓的**桩处理**。\n\
  \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig9_HTML.jpg](img/505360_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9  \n`CoffeeDrinksModel`对`CoffeeDrinksDataSource`的依赖\n\n桩处理意味着创建一个对象的虚假版本，用来替代真实对象，帮助你的测试运行得更快、更可靠。从现在开始，我们需要对某些组件进行桩处理。我们不会深入探讨这个话题，因为稍后将在第\
  \ 7 章中介绍。\n\n在图 5-9 中，`CoffeeDrinksModel`类使用`CoffeeDrinksDataSource`从 plist 文件中获取所有咖啡饮品。在不进行桩处理`CoffeeDrinksDataSource`的情况下测试`CoffeeDrinksModel`将会很有挑战性，并且不可靠；换句话说，如果我们更改\
  \ plist 文件中的数据，这个测试将会失败。桩处理（图 5-10）的目的是隔离并专注于被测试的代码，而不是外部依赖的行为或状态。这里的外部依赖是`CoffeeDrinksDataSource`，它提供来自\
  \ plist 文件的数据。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig10_HTML.jpg](img/505360_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10  \n用桩对象替换依赖\n\n现在我们来编写桩对象：\n\n```\nclass CoffeeDrinksDataSourceStub: CoffeeDrinksDataSource\
  \ {\n    var stubbedDataJSON: String?\n    init(stubbedDataJSON: String){\n    \
  \    self.stubbedDataJSON = stubbedDataJSON\n    }\n\n    public override func getData()\
  \ -> Data? {\n        let jsonData = self.stubbedDataJSON?.data(using: .utf8)\n\
  \        return jsonData\n    }\n}\n```\n\n`CoffeeDrinksDataSourceStub`会在其构造函数中接收预期数据，并在`getData()`函数中将其作为数据返回。因此没有逻辑，我们可以单独测试`CoffeeDrinksModel`。\n\
  \n现在让我们使用新创建的桩对象为`CoffeeDrinksModel`编写测试：\n\n```\nfunc testFetchingAllCoffeeDrinks()\
  \ {\n    //Given\n    let expectedDrinks = \"\"\"\n    [\n        {\n          \
  \  \"name\": \"coffee1\",\n            \"image_name\": \"black\",\n            \"\
  desc\": \"desc1\"\n        },\n        {\n            \"name\": \"coffee2\",\n \
  \           \"image_name\": \"black\",\n            \"desc\": \"desc2\"\n      \
  \  }\n    ]\n    \"\"\"\n    let coffeeDrinksDataSource = CoffeeDrinksDataSourceStub(stubbedDataJSON:expectedDrinks)\n\
  \    let coffeeDrinksModel = CoffeeDrinksModel(source: coffeeDrinksDataSource)\n\
  \n    // when\n    let actualDrinks = coffeeDrinksModel.fetchAllCoffeDrinks()\n\n\
  \    // then\n    let coffeeDrink1 = actualDrinks![0]\n    XCTAssertEqual(coffeeDrink1.name,\
  \ \"coffee1\")\n    XCTAssertEqual(coffeeDrink1.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink1.description,\
  \ \"desc1\")\n\n    let coffeeDrink2 = actualDrinks![1]\n    XCTAssertEqual(coffeeDrink2.name,\
  \ \"coffee2\")\n    XCTAssertEqual(coffeeDrink2.imageName, \"black\")\n    XCTAssertEqual(coffeeDrink2.description,\
  \ \"desc2\")\n}\n```\n\n在应用 TDD 周期，我们逐步构建测试用例直至达到上述全面的测试后，最终会得到以下两个组件：\n\n```\n\
  class CoffeeDrinksModel {\n    private var dataSource:CoffeeDrinksDataSource?\n\
  \    init(source:CoffeeDrinksDataSource?) {\n        self.dataSource = source\n\
  \    }\n\n    public func fetchAllCoffeDrinks() ->[CoffeeDrink]? {\n        guard\
  \ let data = self.dataSource?.getData() else {\n            return []\n        }\n\
  \        var drinks:[CoffeeDrink]?\n        do {\n            drinks = try JSONDecoder().decode([CoffeeDrink].self,\
  \ from: data)\n        } catch {\n        }\n        return drinks\n    }\n}\n```\n\
  \n```\nstruct CoffeeDrink: Codable, Equatable {\n    let name:String?\n    let imageName:\
  \ String?\n    let description: String?\n\n    private enum CodingKeys : String,\
  \ CodingKey {\n        case name = \"name\"\n        case imageName = \"image_name\"\
  \n        case description = \"desc\"\n    }\n}\n```\n\n让我们注释掉`CoffeeDrinksIntegrationTests`中之前的测试，然后运行`CoffeeDrinksModelTests`。\n\
  \n现在应该可以通过了 ✅。\n\n这将是我们当前的状态（图 5-11）。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig11_HTML.jpg](img/505360_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11  \n测试计划图（已添加第一个单元）\n\n\n\n### CoffeeDrinksPresenterTests\n\n我们已经为 presenter\
  \ 添加了一个集成测试，所以你可能认为不需要再为它编写单元测试了。但事实并非如此。集成测试永远无法替代单元测试。正如我们在第 4 章中所述，每种测试都有其不同的目的。我们编写了一个测试来验证\
  \ presenter 能否与其他组件正确集成。现在我们需要为它编写测试，但这次是隔离测试。\n\n同样，`CoffeeDrinksPresenter` 依赖于\
  \ `CoffeeDrinksModel`。如果我们需要测试它，就需要对 `CoffeeDrinksPresenter` 所依赖的所有这些对象进行桩处理，并返回预期数据。这里我们为\
  \ `CoffeeDrinksModel` 编写一个桩，它在构造函数中接收预期数据，并在 `fetchAllCoffeDrinks()` 函数中将其作为数据返回：\n\
  \n```\nclass CoffeeDrinksModelStub: CoffeeDrinksModel {\n    var stubbedDrinks:[CoffeeDrink]?\n\
  \    init(stubbedDrinks:[CoffeeDrink]) {\n        super.init(source: nil)\n    \
  \    self.stubbedDrinks = stubbedDrinks\n    }\n    public override func fetchAllCoffeDrinks()\
  \ ->[CoffeeDrink]? {\n        return self.stubbedDrinks\n    }\n}\n```\n\n现在让我们开始逐一编写测试：\n\
  \n```\nfunc testFetchingDrinksCount() {\n    //给定\n    let drinks = [CoffeeDrink(name:\
  \ \"coffee1\",imageName: \"black\",description: \"desc1\"),\n                  CoffeeDrink(name:\
  \ \"coffee2\",imageName: \"black\",description: \"desc2\")]\n    let coffeeDrinksModel\
  \ = CoffeeDrinksModelStub(stubbedDrinks: drinks)\n    let coffeeDrinksPresenter\
  \ = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n    // 当 & 则\n    XCTAssertEqual(\
  \ coffeeDrinksPresenter.getDrinksCount(), 2)\n}\nfunc testFetchingDrinksName() {\n\
  \    //给定\n    let drinks = [CoffeeDrink(name: \"coffee1\",imageName: \"black\"\
  ,description: \"desc1\"),\n                  CoffeeDrink(name: \"coffee2\",imageName:\
  \ \"black\",description: \"desc2\")]\n    let coffeeDrinksModel = CoffeeDrinksModelStub(stubbedDrinks:\
  \ drinks)\n    let coffeeDrinksPresenter = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n\
  \    // 当 & 则\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:0), \"\
  coffee1\")\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkName(index:1), \"coffee2\"\
  )\n}\nfunc testFetchingDrinksImagesName() {\n    //给定\n    let drinks = [CoffeeDrink(name:\
  \ \"coffee1\",imageName: \"black\",description: \"desc1\"),\n                  CoffeeDrink(name:\
  \ \"coffee2\",imageName: \"black\",description: \"desc2\")]\n    let coffeeDrinksModel\
  \ = CoffeeDrinksModelStub(stubbedDrinks: drinks)\n    let coffeeDrinksPresenter\
  \ = CoffeeDrinksPresenter(model:coffeeDrinksModel)\n    // 当 & 则\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:0),\
  \ \"black\")\n    XCTAssertEqual(coffeeDrinksPresenter.getDrinkImageName(index:1),\
  \ \"black\")\n}\n```\n\n如你所知，每编写完一个测试，我们就会反复应用 TDD 循环。在编写完上述所有测试并使它们逐个通过后，我们最终会得到以下类：\n\
  \n```\nclass CoffeeDrinksPresenter {\n    private var model:CoffeeDrinksModel?\n\
  \    var drinks:[CoffeeDrink]?\n    init(model:CoffeeDrinksModel?) {\n        self.model\
  \ = model\n        self.drinks = self.model?.fetchAllCoffeDrinks()\n    }\n    public\
  \ func getDrinksCount() -> Int {\n        self.drinks?.count ?? 0\n    }\n    public\
  \ func getDrinkName(index:Int) -> String? {\n        guard let drink = self.drinks?[index]\
  \ else {\n            return nil\n        }\n        return drink.name\n    }\n\
  \    public func getDrinkImageName(index:Int) -> String? {\n        guard let drink\
  \ = self.drinks?[index] else {\n            return nil\n        }\n        return\
  \ drink.imageName\n    }\n}\n```\n\n现在我们可以运行 `CoffeeDrinksPresenterTests`，它应该能通过\
  \ ✅。\n\n我们还可以取消注释 `CoffeeDrinksIntegrationTests` 并运行，它也应该能通过。现在，当前状态（图 5-12）是每个对象在单独工作时表现良好，在集成在一起时也表现良好。\n\
  \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig12_HTML.jpg](img/505360_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12 测试计划图（已添加第二个单元）\n\n现在让我们实现功能的最后一部分，将数据填充到视图中。之后，我们需要运行端到端测试以确保一切正常。一旦我们看到图\
  \ 5-13，我们的第一个用户故事就完成了。这个功能似乎很简单。我们将对剩余的故事实施相同的过程。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig13_HTML.jpg](img/505360_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13 所有已添加的测试\n\n我们没有详细讨论该功能 UI 元素的实现，但你可以在本章的资源中找到相关代码。\n\n## 测试健康检查\n\n我们需要验证，当测试通过时，它表明一切正常；当测试失败时，表明存在问题，并且问题可以通过测试识别出来。在图\
  \ 5-14 中，列出了所有可能的错误位置。所以让我们故意引入一个错误，看看我们的测试能否捕获它。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig14_HTML.jpg](img/505360_1_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14 可能的错误\n\n示例：让我们尝试更改 `CoffeeDrinksPresenter` 中的 `getDrinkName`，使其返回 `imageName`\
  \ 而不是 `name`（图 5-15），然后运行我们的测试。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig15_HTML.jpg](img/505360_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15 有缺陷的代码更改\n\n现在让我们运行测试（图 5-16）。\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig16_HTML.jpg](img/505360_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16 测试失败\n\n测试成功捕获了该错误。\n\n## 第二个故事\n\n> *“作为用户，我想点击任何咖啡饮品类型，以查看该饮品的更多详细信息，包括咖啡图片和成分的简要描述。”*\n\
  \n我们需要编写一个会失败的端到端测试，以验证点击任何咖啡饮品类型将显示该饮品的详细信息。（图 5-17）\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig17_HTML.jpg](img/505360_1_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17 测试计划图\n\n让我们为这个故事编写第一个测试：\n\n```\nfunc testDetailedCoffeeView() {\n   \
  \ let app = XCUIApplication()\n    app.launchEnvironment = [\"coffee_drinks_stubbed\"\
  : \"coffee_drinks_stub\"]\n    app.launch()\n    let coffeeCollectionView = app.collectionViews\n\
  \    coffeeCollectionView.cells[\"coffee1\"].tap()\n    XCTAssertTrue(app.navigationBars[\"\
  coffee1\"].exists)\n    XCTAssertEqual(app.textViews[\"desc\"].value as? String,\
  \ \"description1\")\n}\n```\n\n这里我们为这个故事编写了端到端测试。我们使用启动参数设置应用程序。然后导航到特定饮品页面，并断言其详细信息正确显示。\n\
  \n\n\n## 架构\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig18_HTML.jpg](img/505360_1_En_5_Fig18_HTML.jpg)\n\
  \n图 5-18\n\nMVP 应用实例\n\n如图 5-18 所示，实现该功能涉及的集成对象并不多。这基本上意味着没有需要编写集成测试的社交组件。因此，只需为\
  \ `CoffeeDetailsPresenter` 编写单元测试就足够了。\n\n让我们逐一编写测试：\n\n```\nfunc testFetchingDrinkName()\
  \ {\n    // 给定\n    let coffeeDetailsPresenter = CoffeeDetailsPresenter(drink:CoffeeDrink(name:\
  \ \"coffee1\",imageName: \"black\",description: \"desc1\"))\n    // 当 & 则\n    XCTAssertEqual(coffeeDetailsPresenter.getName(),\
  \ \"coffee1\")\n}\nfunc testFetchingDrinkDescription() {\n    // 给定\n    let coffeeDetailsPresenter\
  \ = CoffeeDetailsPresenter(drink:CoffeeDrink(name: \"coffee1\",imageName: \"black\"\
  ,description: \"desc1\"))\n    // 当 & 则\n    XCTAssertEqual(coffeeDetailsPresenter.getDescription(),\
  \ \"desc1\")\n}\nfunc testFetchingDrinkImageName() {\n    // 给定\n    let coffeeDetailsPresenter\
  \ = CoffeeDetailsPresenter(drink:CoffeeDrink(name: \"coffee1\",imageName: \"black\"\
  ,description: \"desc1\"))\n    // 当 & 则\n    XCTAssertEqual(coffeeDetailsPresenter.getImageName(),\
  \ \"black\")\n}\n```\n\n在编写完上述所有测试，并运用 TDD 方法逐个使其通过后，最终将得到以下类：\n\n```\nclass CoffeeDetailsPresenter\
  \ {\n    private var drink:CoffeeDrink?\n    init(drink:CoffeeDrink?) {\n      \
  \  self.drink = drink\n    }\n    public func getName() -> String? {\n        guard\
  \ let drink = self.drink else {\n            return nil\n        }\n        return\
  \ drink.name\n    }\n    public func getImageName() -> String? {\n        guard\
  \ let drink = self.drink else {\n            return nil\n        }\n        return\
  \ drink.imageName\n    }\n    public func getDescription() -> String? {\n      \
  \  guard let drink = self.drink else {\n            return nil\n        }\n    \
  \    return drink.description\n    }\n}\n```\n\n在添加所有测试后，我们的测试套件（图 5-19）和应用程序（图\
  \ 5-20）将呈现如下状态：\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig20_HTML.jpg](img/505360_1_En_5_Fig20_HTML.jpg)\n\
  \n图 5-20\n\n应用主屏幕\n\n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig19_HTML.jpg](img/505360_1_En_5_Fig19_HTML.jpg)\n\
  \n图 5-19\n\n最终测试套件\n\n与第一个功能相同，我们没有深入探讨 UI 的实现细节，但你可以在本章的资源中找到相关代码。\n\n## 练习\n\n\
  我们已经完成了第一个和第二个故事。但还有两个故事需要处理。你应该能够应用本章介绍的相同流程来实现这两个故事。你可以在本章资源中找到已完成前两个故事的最终项目。\n\
  \n## 总结\n\n在本章中，我们探讨了如何在稍复杂的项目上应用 TDD，这与你在日常工作中可能遇到的挑战类似。我们介绍了 **CoffeePot**，这是一款帮助用户了解不同咖啡类型差异的应用。该应用有两个视图：一个视图列出所有咖啡类型，另一个是单个咖啡类型的详情视图。\n\
  \n在处理此类项目时，我们不能指望一蹴而就。这不仅不切实际，还会导致代码质量低下。关键在于粒度，我们要将项目分解为较小的逻辑块，然后逐一完成。TDD 帮助我们以粒度化的方式思考。由于我们始终需要从一个失败的测试开始，这本质上就是一个单一需求，此时这个需求就是我们要处理的小块。通过应用\
  \ TDD 循环，我们在思考下一个块之前就完成了当前块。\n\n为了将项目分解为更小的块，第一步是正确定义并全面思考所有项目需求。然后，我们将这些需求转化为测试。第一个需求作为我们的第一个测试，启动\
  \ TDD 循环。我们不断重复这个循环，直到完成所有已定义的需求。\n\n我们以第一个需求为例——即查看所有咖啡类型及其图片。在我们甚至还未思考如何实现它之前，就先为此编写了一个\
  \ UI 测试。通常，由于尚未添加任何代码，这个测试会失败。如前所述，TDD 迫使我们清晰思考设计与架构。在本例中，我们采用了名为模型-视图-展示器（MVP）的流行设计模式，这让我们清楚了解要添加的组件以及它们之间的交互方式。由于明确了代码设计思路，我们随后降级添加了集成测试。最后再降一级，开始添加单元测试，并不断循环\
  \ TDD 过程，直至所有测试（包括最初添加的集成测试和 UI 测试）全部通过（图 5-21）。端到端测试通过标志着该功能开发完成。然后我们选取下一个需求，重复相同的测试驱动流程。\n\
  \n![../images/505360_1_En_5_Chapter/505360_1_En_5_Fig21_HTML.jpg](img/505360_1_En_5_Fig21_HTML.jpg)\n\
  \n图 5-21\n\n用于 TDD 的测试计划图\n\n"
- "# 6. 模块化制胜\n\n模块化是指将系统划分为多个相对独立、可互换且具有明确定义接口的模块，每个模块包含执行所需功能的一切要素。每个模块都足够小、足够简单，以便被彻底理解和充分测试。\n\
  \n尽管模块化是极其重要的设计方面，但当代码库增长时，它通常是开发者最先牺牲的部分之一。他们可能仍然命名模块，但模块之间相互依赖，最终形成一团**泥球**。这个术语用于描述缺乏可感知架构的软件系统。\n\
  \n\n\n## 为何要费心进行模块化？\n\n从模块化的简短定义中，你或许已经觉得它是个让应用锦上添花的特性。但我们真的需要它吗？在设计应用架构时，我们有必要投入额外的精力来确保它被恰当地模块化吗？而将一个现有应用进行模块化，又是否值得我们付出更大的努力呢？\n\
  \n要回答这些问题，一种方法是观察模块化应用与非模块化应用如何应对扩展的挑战。扩展是任何成功应用都会经历的过程，它基本意味着用户数量的增加、应用本身及其内部功能特性的增多、发布频率的加快，以及在大多数情况下，团队规模的扩大。\n\
  \n我们来谈谈这两类应用如何处理其功能和特性的扩展。如果审视一个非模块化应用，并试图理清其组件之间如何相互依赖和通信，我们最终会得到一个依赖关系图，它可能看起来像图\
  \ 6-1 所示。这是一个示例图，但对于非模块化应用来说相当真实。这样的图可能代表着一个简单、功能单一的应用。所以，如果你已经觉得这个图很复杂，那么当我们试图扩展这个应用时，这个图几乎肯定会变成一张由节点和边构成的混乱网络。遗憾的是，应用依赖关系图的可读性差并不是我们在这种情况下唯一的问题。如果我们只担心图不好看，那完全可以不去看它。然而，我们真正的问题在于这个图所代表的东西：依赖关系。依赖关系越多，应用就变得越不可预测。\n\
  \n这种不可预测性在我们开始在某处添加新功能，却在应用中一个完全不同的地方引入了一个 Bug 或导致崩溃时变得尤为明显。所以，基本上由于我们复杂且不受管理的依赖关系，当引入一个变更时，我们永远无法知道这个变更对应用的影响范围。另一方面，在模块化应用中做同样的事情则截然不同（图\
  \ 6-2）。由于代码的完全分离，实施一个变更意味着只会影响我们正在修改的那个模块。另一个需要考虑的方面是处理 Bug。在一个像图 6-2 中模块化应用那样组织有序、结构清晰的应用中追踪\
  \ Bug，显然比在图 6-1 中那样要容易得多。可能只需阅读 Bug 的描述，我们就能识别出该查看哪个模块。然而，在非模块化应用中，调试 Bug 会繁琐得多。\n\
  \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig2_HTML.png](img/505360_1_En_6_Fig2_HTML.png)\n\
  \n图 6-2：模块化应用\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig1_HTML.png](img/505360_1_En_6_Fig1_HTML.png)\n\
  \n图 6-1：非模块化应用\n\n除了应用本身的规模，管理和维护应用的团队规模也可能扩大。这会带来一些挑战；其中之一就是新成员的入职。你的代码库可读性越高，入职过程就越顺畅。试图理解一个拥有大量相互连接组件的非模块化应用的代码库可能会非常令人困惑。这就是为什么模块化应用凭借其分离的设计，可读性会强得多。在模块化应用中，找到代码中负责某个特定功能的部分，就像找到相关的模块并在其中查找一样简单，而不是在整个代码库中翻找。\n\
  \n大型团队带来的另一个挑战是团队之间的协作方式。在模块化应用中，可以让多个成员同时处理不同的功能，而无需相互沟通；当然，前提是每个人都在处理不同的模块。由于变更的分离，这种在不同模块上的并行工作也几乎不会产生冲突。这显然不适用于非模块化应用，因为试图进行同样的并行工作需要付出大量额外的努力来在团队成员之间沟通变更并解决冲突。模块化还使得分配代码所有权成为可能。将模块的所有权分配给特定的团队成员或子团队要容易得多。\n\
  \n模块化应用的优点（以及非模块化应用的缺点），并不仅仅适用于大型应用。这些优缺点适用于各种规模的应用。然而，应用越大，这些优缺点就越被放大。从中得出的结论是，你不需要等到应用需要扩展时才考虑模块化。即使你的应用规模很小，你也能收获很多好处。并且，随着未来你的应用规模扩大，你将为自己带来呈指数级增长的好处。\n\
  \n\n\n## 什么是模块？\n\n在本章中，我们已经多次提到“模块”这个词，但还没有正确定义模块到底是什么。到目前为止，你可能对它已有概念，而且很可能八九不离十。但让我们先统一一个准确的定义。一般来说，模块是一段独立的代码，提供特定且高内聚的功能。\n\
  \n虽然这个定义听起来合理，但让我们通过一个实际例子来看看模块究竟长什么样。如果你用过 iOS 设备，那你肯定用过 App Store。我们来仔细看看 App\
  \ Store 的 iOS 应用（图 6-3），并尝试将它划分为多个模块。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig3_HTML.jpg](img/505360_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3  \nApp Store 应用\n\n我们可以将主应用拆分为五个模块；每个模块对应底部标签栏中的一个标签。而这些主模块还可以进一步拆分为更多子模块。所以在这里，模块就是一组为最终用户提供内聚功能的功能集合：\n\
  \n1.  “今日”模块\n2.  “游戏”模块\n3.  “应用”模块\n4.  “Arcade”模块\n5.  “搜索”模块\n\n除了主模块，我们还需要将共享代码分离到模块中，以便在不同模块间轻松复用。如果我们进一步探索这个应用，会发现图\
  \ 6-4 中的应用页面可以从所有五个主模块中访问。这意味着该功能属于一个子模块，被五个主模块所共用。\n\n如果由于某些原因我们决定不保留这个子模块，那就只能采取两种做法之一。要么在所有五个主模块中重复实现应用页面的功能，这显然是一种很糟糕的代码坏味道。如果那样做，每次需要修改应用页面功能时，我们都得在五个地方进行更新。而这仅仅是代码重复问题的冰山一角。另一种选择是将这个公共功能实现在五个模块中的某一个里，比如“今日”模块，然后让其他四个模块依赖“今日”模块。这种设计决策很快就会导致图\
  \ 6-1 所示的情况——模块拥有它们并不需要的依赖关系，最终可能导致依赖循环。因此，最好的做法始终是将不相关的代码完全分离。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig4_HTML.jpg](img/505360_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4  \nApp Store 中的应用页面\n\n模块并不仅仅由内聚的功能组成，比如我们的五个主模块或应用模块；只要底层功能是内聚的，我们也可以为它们创建模块。对于\
  \ App Store 来说，我们可以有一个网络模块、一个分析模块，等等。这些底层模块的美妙之处在于，如果编写得足够好，它们可以在不同的应用之间复用。\n\n\
  因此，如果我们将 App Store 应用模块化，结果将类似于图 6-5。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig5_HTML.jpg](img/505360_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5  \nApp Store 模块地图\n\n我们应始终避免模块之间出现依赖循环，也就是说，不能让模块 A 依赖模块 B，同时模块 B 又依赖模块\
  \ A。出现这种循环表明存在代码坏味道，我们应该尝试通过重构来打破它。\n\n## 模块化你的应用\n\n在从头开始开发一个全新应用时，最好在设计阶段就采用模块化方法。将一个非模块化的应用转变为模块化应用，是一个成本高昂的过程。而防患于未然总是更好的选择。然而，如果你恰好处于需要重构的境地，解决这个问题也并非不可能。本章的剩余部分将指导你如何应对这一过程。\n\
  \n当你面对一个非模块化的应用并希望将其模块化时，你有两种选择：重写整个应用，或者重构应用。\n\n重写应用很简单。你基本上可以抛弃现有的绝大部分代码，从零开始。这是一种非常激进的方法，需要巨大且突然的投入。由于所需投入水平很高，因此伴随的风险也高。重写时间很可能会超出预期，从而引发许多问题。但就像生活中大多数事情一样，当你投入高成本并接受高风险，并且一切顺利时，最终也会获得高回报。如果选择这种方法，你会立即感受到效果。重写应用的另一个问题是，你必须在重写完成前暂停所有新功能的开发。暂停的替代方案是重复劳动，因为你需要在旧应用和新重写的应用中各实现一次新功能，这成本相当高。\n\
  \n尽管激进的重写方法有一些好处，但它也有相当明显的缺点，而且在大多数情况下，走这条路是行不通的。幸运的是，我们有另一种选择，那就是渐进式重构。与重写方法相反，这是一种低投入、低风险、低影响的方法。它允许我们按照自己的节奏模块化应用，同时不阻碍新功能的发布。由于变更影响很小，这也意味着风险很小。其中一个缺点是模块化速度较慢，但这完全掌握在我们手中，我们可以根据多种决定因素来加快或减慢速度。\n\
  \n然而，最大的缺点是采用这种方法需要技巧，并且要遵循一个深思熟虑的过程。否则，我们的重构可能会导致应用中出现回归问题。为了避免这种情况，我们需要通过测试来确保正在重构的代码部分在重构前后都能正常工作。但这并不是我们使用测试的唯一目的。重要的是，就像编写新代码一样，你的重构过程也要由测试驱动。并且，始终建议采用循序渐进的方法，不要迈出太大的步子，以避免引入破坏性变更。\n\
  \n\n\n## 书籍应用介绍\n\n**书籍**是一款展示最新畅销书的简易应用（图 6-6）。本章及后续章节中，我们将持续维护并改进这款**书籍**应用。你可以在本章的资源中找到该项目。尽管它看似简单，却会揭示你在处理遗留应用时可能遇到的诸多问题。对我们而言，遗留应用就是未经测试、且轻易改动便可能出问题的应用。在接下来的章节中，我们将把**书籍**从一个易出错的遗留应用，改造成一个可扩展且易于维护的应用。\n\
  \n**书籍**依赖于向纽约时报 API 发送请求。为保障应用正常运行，你需要一个有效的 API 密钥。获取密钥的具体步骤可在项目的 README 文件中找到。请务必将项目中所有\
  \ `\"YOUR_API_KEY\"` 的实例替换为实际的 API 密钥。同时，确保在后续章节添加的所有代码片段中也进行相应替换。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig6_HTML.jpg](img/505360_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n遗留版书籍应用\n\n使用**书籍**应用的挑战之一在于它并未采用现代架构。相反，大量的业务逻辑、网络调用和持久化逻辑都集中在单一视图控制器中。目前它尚能运行，就像所有遗留代码一样。但随着我们深入使用，你会发现添加新功能是多么困难且充满风险。\n\
  \n本章的目标，是将这个包含众多功能的遗留单体应用（图 6-7），转换为模块化应用，每个模块对应一组相关的功能特性。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig7_HTML.jpg](img/505360_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n遗留应用模块映射\n\n最终结果应如图 6-8 所示。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig8_HTML.jpg](img/505360_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n模块化应用模块映射\n\n##### 模块化流程\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig9_HTML.jpg](img/505360_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n模块化流程\n\n上述图表（图 6-9）展示了我们项目模块化的流程。它可能看起来有点复杂，但只要我们逐步操作，很快就能掌握要领。\n\n####\
  \ 初始模块映射\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig10_HTML.jpg](img/505360_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n步骤 0\n\n在开始模块化**书籍**之前，我们先做一个练习。该练习的目标是创建一个类似于我们为**App Store**应用（图 6-5）设计的模块映射。这是一个一次性练习，仅在启动模块化流程前执行（图\
  \ 6-10）。我们将不查看代码，而是以全新的视角浏览应用，尝试将相关功能特性分组到各个模块中。这份模块映射将作为指南和我们在模块化过程中积极寻求的模糊目标。然而，该模块映射并非一成不变，它仅作为初始的提议设计方案。在实际进行应用模块化时，我们可能会决定新增模块或合并两个模块，这都是完全可行的。\n\
  \n如果我们基于**书籍**中现有功能特性创建初始模块映射，结果将类似于图 6-11。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig11_HTML.jpg](img/505360_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n书籍应用模块映射\n\n#### 选择一个类作为起点\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig12_HTML.jpg](img/505360_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n步骤 1\n\n我们首先需要选择一个类，作为后续步骤的起点（图 6-12）。这是一个相当简单的步骤，实际上没有绝对的正确或错误。不过，需要考虑的一点是，最好尝试寻找那些职责过多的类，因为重构这些类为模块时影响更大。在像**书籍**这样不遵循任何真正设计模式的遗留应用中，你会发现最佳的起点通常是我们的**视图控制器**。\n\
  \n如前所述，图 6-8 中的模块映射可以在我们操作过程中提供指导，也能帮助我们选择起点。从模块映射中，我们选择一个模块；在此例中，我们选择**主视图模块**。然后，我们开始寻找与该模块相关且职责最多的起点。对我们来说，最佳的起点是\
  \ `MainViewController`。\n\n##### 识别类的职责\n\n既然有了起点，我们就需要开始行动了。接下来要做的是确定起点所负责的所有关键功能特性（图\
  \ 6-13）。具体做法是遍历该类的代码并理解其功能。如果代码过于复杂且难以理解，我们可以关注代码的几个入口点，以便更容易把握该类职责的范围。我们需要查看所有公开函数、对象创建时触发的函数（`init`）、以及由用户交互（点击、手势、视图生命周期事件等）或其他机制（通知、KVO\
  \ 等）触发的所有函数。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig13_HTML.jpg](img/505360_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n步骤 2\n\n如果你深入分析 `MainViewController` 内的代码，会发现它可以通过图 6-14 的图表简洁地表示。\n\n\
  ![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig14_HTML.png](img/505360_1_En_6_Fig14_HTML.png)\n\
  \n图 6-14\n`MainViewController` 职责图\n\n让我们正式定义 `MainViewController` 的主要职责：\n\n1.\
  \  启动时获取最新书籍。\n2.  在单独的单元格中展示每本书。\n3.  下拉表格时获取最新书籍。\n4.  用户可筛选书籍。\n5.  用户可查看特定书籍的详情。\n\
  6.  用户可查看收藏。\n\n#### 重构职责\n\n明确了类的职责后，现在是时候开始重构了。针对每一项职责，我们将执行以下步骤：\n\n1.  添加验证测试。\n\
  2.  重构相关代码。\n3.  重新运行验证测试。\n\n\n\n### 验证测试\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig15_HTML.jpg](img/505360_1_En_6_Fig15_HTML.jpg)\n\
  \n**图 6-15**\n\n**步骤 3.1**\n\n我们先从第一个职责开始，即“启动时获取最新书籍”。在开始重构相关代码之前，首先需要添加验证测试（图\
  \ 6-15）。验证测试是高级别的测试，用于验证我们正在重构的特性或功能是否正常运行。对于像我们现在重构的这类面向用户的特性，验证可以采用 UI 测试的形式，因为这是我们拥有的最高级别的测试。如果重构的部分不是面向用户的，则可以使用集成测试。验证测试是我们流程中不可或缺的一部分，因为它们有助于避免因重构而导致的回归。\n\
  \n现在为我们的特性编写一个验证测试：\n\n```\nfunc testShowingBestSellerBooks() throws {\n    // 前置条件\n\
  \    let app = XCUIApplication()\n    app.launch()\n    // 操作\n    let booksTableView\
  \ = app.tables\n    let cells = booksTableView.cells\n    _ = cells.firstMatch.waitForExistence(timeout:\
  \ 1.0)\n    // 断言\n    XCTAssertGreaterThan(cells.count, 0)\n}\n```\n\n我们的验证测试仅确保列表表格视图中至少包含一个单元格。就本特性的范围而言，我们只关心表格视图在启动时已被填充数据，暂时不关心单元格的内容。\n\
  \n上述测试高度依赖于后端，如果后端服务器发生故障，很容易失败。这种依赖性并不理想，我们将在第 8 章讨论如何移除它。不过，就目前而言，这个测试已经够用了。\n\
  \n#### 重构\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig16_HTML.jpg](img/505360_1_En_6_Fig16_HTML.jpg)\n\
  \n**图 6-16**\n\n**步骤 3.2**\n\n现在我们有了验证测试，就可以安全地开始重构了（图 6-16）。要重构这个特性，我们需要问自己几个问题：负责该特性的代码是否在正确的位置？还是应该将其移至新组件甚至新模块？在将代码移到正确的位置后，它是否还需要重构？\n\
  \n如果我们查看负责该特性的代码，会发现需要处理的函数是 `fetchBooks()`。那么第一个问题是，它是否在正确的位置？由于应用程序内部没有特定的设计模式或架构，我们将在重构时尝试应用一种设计模式。我们将像第\
  \ 5 章那样使用 MVP 模式。从 MVP 模式中我们知道，视图控制器不应包含任何业务逻辑，只应负责处理 UI。因此，我们知道需要将 `fetchBooks()`\
  \ 移到其他地方，但移到哪里呢？我们已经知道它会包含在 **MainView 模块**中，但具体是哪个组件？针对这个问题，我们需要进一步了解 `fetchBooks()`\
  \ 的功能。`fetchBooks()` 发起网络请求并解析响应以提取图书列表，然后用于更新表格的数据源。我们将像从头开始实现一样，对要实现的逻辑应用 **MVP**\
  \ 设计模式。我们应该考虑新对象之间将如何交互，而不要查看当前代码，以免受当前实现的影响。通过这样做，我们将得到图 6-17 中的设计。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig17_HTML.png](img/505360_1_En_6_Fig17_HTML.png)\n\
  \n**图 6-17**\n\nMVP 设计模式\n\n现在是时候发挥我们的 TDD 技能了。如果你查看图 6-18，可能会想起第 5 章的内容。对于端到端测试，我们已经通过验证测试覆盖了。既然我们已经知道对象之间将如何交互，就可以开始编写一些集成测试了。\n\
  \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig18_HTML.jpg](img/505360_1_En_6_Fig18_HTML.jpg)\n\
  \n**图 6-18**\n\n测试计划图\n\n### 集成测试\n\n让我们创建一个名为 `MainViewIntegrationTests` 的新类，它将包含与此模块相关的所有集成测试。将相同类型的测试分组在一起非常有用，这样你就可以灵活地轻松运行特定类型的测试。\n\
  \n从图 6-17 中我们知道，一旦 `MainViewController` 被加载，我们将初始化 `MainViewPresenter`，它将在构造函数中接收\
  \ `MainViewModel`。`MainViewPresenter` 将包含一个方法，用于获取所有图书并在底层封装与 `MainViewModel` 的通信；然后，模型将返回图书列表。最后，`MainViewPresenter`\
  \ 将更新视图。现在让我们将其转换为一个测试：\n\n```\nfunc testFetchBestSellerBooksReturnsList() throws\
  \ {\n    // 前置条件\n    let testBundle = Bundle(for: type(of: self))\n    let booksJSONURL\
  \ = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension: \"json\"\
  )\n    let booksJSON = try Data(contentsOf: booksJSONURL!)\n    let expectedLists:\
  \ [List] = stubbedlists()\n    var actualLists: [List] = []\n    let networkLayer\
  \ = NetworkLayerStub(stubbedData: booksJSON)\n    let mainViewModel = MainViewModel(networkLayer:\
  \ networkLayer)\n    let mainViewPresenter = MainViewPresenter(mainViewModel: mainViewModel)\n\
  \    // 操作与断言\n    let waitForBooks = XCTestExpectation(description: \"等待获取图书\"\
  )\n    mainViewPresenter.fetchBestSellerBooks { lists in\n        actualLists =\
  \ lists ?? []\n        waitForBooks.fulfill()\n    }\n    self.wait(for: [waitForBooks],\
  \ timeout: 0.1)\n    XCTAssertEqual(actualLists, expectedLists, \"获取的图书与预期不匹配\"\
  )\n}\n\nfunc stubbedlists() -> [List] {\n    let firstBook = BookModel(title: \"\
  他告诉我的最后一件事\", contributor: \"作者：劳拉·戴夫\", author: \"劳拉·戴夫\", createdDate: \"2021-05-26\
  \ 22:10:24\")\n    let secondBook = BookModel(title: \"苏利\", contributor: \"作者：约翰·格里森姆\"\
  , author: \"约翰·格里森姆\", createdDate: \"2021-05-26 22:10:24\")\n    let firstList\
  \ = List(listID: 704, listName: \"综合印刷与电子书小说\", displayName: \"综合印刷及电子书小说\", books:\
  \ [firstBook, secondBook])\n    return [firstList]\n}\n```\n\n这个测试甚至无法构建，因为我们还没有添加它所测试的任何组件，这很正常。\n\
  \n允许我们的网络层通过桩代码返回预期的 JSON，以便我们可以对值进行断言，并防止测试依赖于网络调用（这会使测试变得不稳定），这是有意义的。我们将在第 7 章更详细地讨论桩代码。\n\
  \n\n\n##### `NetworkLayer`\n\n现在我们已经有了集成测试，是时候深入一层进行单元测试了。我们将从**网络模块**开始。但由于测试网络层可能相当棘手，我们暂时跳过它的测试。不过别担心。我们会在**第\
  \ 9 章**深入探讨如何测试网络层。我们现在要做的是在单独模块中添加网络层类。这是一个非常简单的类。它只会执行单个请求并返回数据：\n\n```\nclass\
  \ NetworkLayer {\n    let host = \"api.nytimes.com\"\n    let API_KEY = \"YOUR_API_KEY\"\
  \n    let bestSellerBooks = \"/svc/books/v3/lists/overview.json\"\n\n    public\
  \ func executeNetworkRequest(callBack: @escaping (_ data:Data?) -> Void) {\n   \
  \     var components = URLComponents()\n        components.scheme = \"https\"\n\
  \        components.host = host\n        components.path = bestSellerBooks\n   \
  \     components.queryItems = [URLQueryItem(name: \"api-key\", value: API_KEY),\
  \ URLQueryItem(name: \"offset\", value: \"20\")]\n        guard let url = components.url\
  \ else {\n            callBack(nil)\n            preconditionFailure(\"Failed to\
  \ construct URL\")\n        }\n        let task = URLSession.shared.dataTask(with:\
  \ url) {\n            data, response, error in\n            guard let data = data\
  \ else {\n                callBack(nil)\n                return\n            }\n\
  \            callBack(data)\n        }\n        task.resume()\n    }\n}\n```\n\n\
  ##### `MainViewModel`\n\n让我们跳到下一个类，即 `MainViewModel`。它是**MainView 模块**的一部分，负责创建\
  \ `NetworkLayer` 对象、执行网络请求、解析响应数据并通过回调返回解析后的数据。像往常一样，我们首先编写 `MainViewModelTests`。我们会编写所有测试，确保该类能够正常工作并符合预期：\n\
  \n```\nfunc testFetchingAndParsingBestSellerBooks() throws {\n    // Given\n   \
  \ let testBundle = Bundle(for: type(of: self))\n    let booksJSONURL = testBundle.url(forResource:\
  \ \"BestSellerBooksStub\", withExtension: \"json\")\n    let booksJSON = try Data(contentsOf:\
  \ booksJSONURL!)\n    let expectedLists: [List] = stubbedlists()\n    var actualLists:\
  \ [List] = []\n    let networkLayer = NetworkLayerStub(stubbedData: booksJSON)\n\
  \    let mainViewModel = MainViewModel(networkLayer: networkLayer)\n    // when\
  \ & then\n    let waitForBooks = XCTestExpectation(description: \"Wait to fetch\
  \ books\")\n    mainViewModel.fetchBestSellerBooks { lists in\n        actualLists\
  \ = lists ?? []\n        waitForBooks.fulfill()\n    }\n    self.wait(for: [waitForBooks],\
  \ timeout: 0.1)\n    XCTAssertEqual(actualLists, expectedLists, \"Fetched books\
  \ does not match the expected\")\n}\n\nfunc stubbedlists() -> [List] {\n    let\
  \ firstBook = BookModel(title: \"THE LAST THING HE TOLD ME\", contributor: \"by\
  \ Laura Dave\", author: \"Laura Dave\", createdDate: \"2021-05-26 22:10:24\")\n\
  \    let secondBook = BookModel(title: \"SOOLEY\", contributor: \"by John Grisham\"\
  , author: \"John Grisham\", createdDate: \"2021-05-26 22:10:24\")\n    let firstList\
  \ = List(listID: 704, listName: \"Combined Print and E-Book Fiction\", displayName:\
  \ \"Combined Print & E-Book Fiction\", books: [firstBook,secondBook])\n    return\
  \ [firstList]\n}\n```\n\n上述测试首先使用 `NetworkLayer` 实例初始化 `MainViewModel` 实例。然后我们调用要测试的函数，该函数从服务器获取数据，然后我们等待它完成。最后，我们对返回的数据进行断言。\n\
  \n为了测试 `MainViewModel`，我们需要模拟 `NetworkLayer` 以返回特定的 JSON，这样我们就可以对 `MainViewModel`\
  \ 的输出进行断言。我们需要创建一个模拟网络的新类，因为我们刚刚添加的测试因缺少该类而无法构建。`NetworkLayerStub` 将如下所示：\n\n```\n\
  class NetworkLayerStub: NetworkLayer {\n    var stubbedData:Data?\n    init(stubbedData:Data)\
  \ {\n        self.stubbedData = stubbedData\n    }\n    public override func executeNetworkRequest(callBack:\
  \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData\n\
  \        callBack(jsonData)\n    }\n}\n```\n\n通过添加 `NetworkLayerStub`，我们解决了一个构建错误，但测试仍然无法构建。现在是时候编写代码让\
  \ `MainViewModelTests` 通过了。为此，我们需要创建 `MainViewModel`，它应该如下所示：\n\n```\nclass MainViewModel:\
  \ NSObject {\n    private var networkLayer:NetworkLayer?\n    init(networkLayer:NetworkLayer?)\
  \ {\n        self.networkLayer = networkLayer\n    }\n    public func fetchBestSellerBooks(callBack:\
  \ @escaping (_ data:[List]?) -> Void) {\n        self.networkLayer?.executeNetworkRequest(callBack:\
  \ { data in\n            guard let data = data else {\n                callBack(nil)\n\
  \                return\n            }\n            var response:Response?\n   \
  \         do {\n                response = try JSONDecoder().decode(Response.self,\
  \ from: data)\n            } catch {\n                print(error.localizedDescription)\n\
  \            }\n            if let lists = response?.results.lists {\n         \
  \       callBack(lists)\n                return;\n            }\n            callBack(nil)\n\
  \        })\n    }\n}\n```\n\n在这里，我们简单地实现了所需的函数 `fetchBestSellerBooks`。该函数接受一个回调块作为参数，在操作完成时应使用获取到的书籍数据调用该回调。我们使用\
  \ `NetworkLayer` 实例发起请求，解码响应，然后通过回调返回结果。\n\n现在，如果运行 `MainViewModelTests`（图 6-19），它应该可以通过\
  \ ✅。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig19_HTML.jpg](img/505360_1_En_6_Fig19_HTML.jpg)\
  \  \n图 6-19 MainViewModelTests 通过\n\n\n\n###### `MainViewPresenter`\n\n接下来，我们需要为`MainViewPresenter`编写单元测试。首先，我们将创建一个新类作为`MainViewModel`的桩（stub）：\n\
  \n```swift\n@testable import Books\nclass MainViewModelStub: MainViewModel {\n \
  \   var stubbedLists:[List]?\n    init(stubbedLists:[List]) {\n        self.stubbedLists\
  \ = stubbedLists\n        super.init(networkLayer: nil)\n    }\n    public override\
  \ func fetchBestSellerBooks(callBack: @escaping (_ lists:[List]?) -> Void) {\n \
  \       callBack(self.stubbedLists)\n    }\n}\n```\n\n现在我们可以编写测试：\n\n```swift\n\
  func testFetchingBestSellerBooksReturnsLists() throws {\n    // Given\n    let expectedLists:\
  \ [List] = stubbedlists()\n    var actualLists: [List] = []\n    let mainViewModel\
  \ = MainViewModelStub(stubbedLists: expectedLists)\n    let mainViewPresenter =\
  \ MainViewPresenter(mainViewModel: mainViewModel)\n    // when & then\n    let waitForBooks\
  \ = XCTestExpectation(description: \"Wait to fetch books\")\n    mainViewPresenter.fetchBestSellerBooks\
  \ { lists in\n        actualLists = lists ?? []\n        waitForBooks.fulfill()\n\
  \    }\n    self.wait(for: [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists,\
  \ expectedLists, \"Fetched books does not match the expected\")\n}\nfunc stubbedlists()\
  \ -> [List] {\n    let firstBook = BookModel(title: \"THE LAST THING HE TOLD ME\"\
  , contributor: \"by Laura Dave\", author: \"Laura Dave\", createdDate: \"2021-05-26\
  \ 22:10:24\")\n    let secondBook = BookModel(title: \"SOOLEY\", contributor: \"\
  by John Grisham\", author: \"John Grisham\", createdDate: \"2021-05-26 22:10:24\"\
  )\n    let firstList = List(listID: 704, listName: \"Combined Print and E-Book Fiction\"\
  , displayName: \"Combined Print & E-Book Fiction\", books: [firstBook,secondBook])\n\
  \    return [firstList]\n}\n```\n\n上述测试与我们刚刚为`MainViewModel`编写的测试有些相似。我们使用一个桩对象来设置展示器（presenter）的实例，然后调用函数并等待其完成畅销书数据的获取，最后对返回的书籍进行断言。\n\
  \n现在我们可以编写代码使`MainViewPresenterTests`通过测试：\n\n```swift\nclass MainViewPresenter:\
  \ NSObject {\n    private var mainViewModel:MainViewModel?\n    init(mainViewModel:MainViewModel?)\
  \ {\n        self.mainViewModel = mainViewModel\n    }\n    public func fetchBestSellerBooks(callBack:\
  \ @escaping (_ data:[List]?) -> Void) {\n        self.mainViewModel?.fetchBestSellerBooks(callBack:\
  \ { lists in\n            callBack(lists)\n        })\n    }\n}\n```\n\n展示器的实现非常简单。它实现了一个获取畅销书的功能，而该功能的实现本质上是调用`MainViewModel`中对应的函数。你可能会认为我们不需要展示器，它只是一个包装器，但这只是暂时的。逻辑分离至关重要，随着我们不断重构更多代码，其重要性会愈发凸显。\n\
  \n现在运行`MainViewPresenterTests`（图 6-20），测试应该可以通过✅。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig20_HTML.jpg](img/505360_1_En_6_Fig20_HTML.jpg)\n\
  \n**图 6-20** `MainViewPresenterTests` 通过\n\n###### 最后的调整\n\n现在所有单元测试都通过了。不仅如此，如果我们运行集成测试，也应该能通过。最后需要做的是将旧的`fetchBooks()`实现替换为使用新组件的新实现。让我们用以下代码替换现有的`fetchBooks()`函数：\n\
  \n```swift\nfunc fetchBooks() {\n    self.mainViewPresenter?.fetchBestSellerBooks(callBack:\
  \ { lists in\n        if let lists = lists {\n            self.lists = lists\n \
  \           DispatchQueue.main.async {\n                self.refreshControl.endRefreshing()\n\
  \                self.tableView?.reloadData()\n            }\n        }\n    })\n\
  }\n```\n\n这一步骤标志着 **步骤 3.2** 的结束。我们现在已经彻底重构了与功能相关的逻辑。\n\n###### 测试的价值\n\n在进入下一步之前，让我们尝试做一些能展示我们添加的所有测试价值的事情。在`MainViewModel`内部，将`fetchBestSellerBooks`方法替换为以下代码。我们只是删除了`callBack(lists)`之后的返回语句，结果导致回调被调用了两次。这就像一个定时炸弹——这种行为目前不会引发错误，但将来可能引发问题。如果你现在运行应用，它会按预期工作，因为我们在`MainViewController`中对`nil`进行了守卫。但如果我们某天移除了那个守卫，或者在别处重用了该代码，错误就会开始出现。然而，如果我们现在运行测试，会发现它们能捕获到这个问题（图\
  \ 6-21）。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig21_HTML.jpg](img/505360_1_En_6_Fig21_HTML.jpg)\n\
  \n**图 6-21** 失败的单元测试\n\n```swift\npublic func fetchBestSellerBooks(callBack: @escaping\
  \ (_ lists:[List]?) -> Void) {\n    self.networkLayer?.executeNetworkRequest(callBack:\
  \ { data in\n        guard let data = data else {\n            callBack(nil)\n \
  \           return\n        }\n        var response:Response?\n        do {\n  \
  \          response = try JSONDecoder().decode(Response.self, from: data)\n    \
  \    } catch {\n            print(error.localizedDescription)\n        }\n     \
  \   if let lists = response?.results.lists {\n            callBack(lists)\n    \
  \    }\n        callBack(nil)\n    })\n}\n```\n\n#### 重新运行验证测试\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig22_HTML.jpg](img/505360_1_En_6_Fig22_HTML.jpg)\n\
  \n**图 6-22** 步骤 3.3\n\n一直以来，我们都在重构`MainViewController`的一个职责：“启动时获取最新书籍”。在确认完成这个职责之前，我们需要运行在\
  \ **步骤 3.1** 中添加的验证测试，以确保一切按预期运行（图 6-22）。如果我们尝试运行`testShowingBestSellerBooks()`（图\
  \ 6-23），测试应该可以通过✅。\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig23_HTML.jpg](img/505360_1_En_6_Fig23_HTML.jpg)\n\
  \n**图 6-23** 测试通过\n\n#### 重构其余职责\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig24_HTML.jpg](img/505360_1_En_6_Fig24_HTML.jpg)\n\
  \n**图 6-24** 重复步骤 3 及其子步骤\n\n回到 **步骤 2**，我们识别出了`MainViewController`的六个职责。刚刚完成了第一个职责的重构。现在，我们应该对剩下的职责逐一执行相同的步骤（图\
  \ 6-24）。\n\n#### 下一个起点\n\n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig25_HTML.jpg](img/505360_1_En_6_Fig25_HTML.jpg)\n\
  \n**图 6-25** 步骤 4\n\n一旦完成了`MainViewController`中所有职责的重构，我们将回到步骤 1，重复整个过程（图 6-25）。也就是说，我们会选取一个新的起点，并像处理`MainViewController`一样彻底重构它。\n\
  \n## 练习\n\n我们已经完成了`MainViewController`的第一个职责。作为练习，请使用我们在本章中遵循的相同流程，尝试重构其余的职责。\n\n\
  \n\n## 总结\n\n本章我们讨论了模块化的概念，即把系统拆分为多个相对独立且可互换的模块。通常而言，模块是一段独立的代码，提供特定且紧密耦合的功能。如果我们完全忽略模块化，最终往往会得到混乱的架构，通常被称为“大泥球”架构。\n\
  \n模块化应用相比非模块化应用有许多优势。非模块化应用在引入变更时往往不可预测，这是由于组件之间存在相互依赖关系。另一方面，在模块化应用中，当我们对某个模块引入变更时，可以确信只会影响该模块本身。这得益于代码之间强分离性。这种代码分离还带来了另一个非常重要的好处：代码可读性。我们之前提到过，开发人员花在阅读代码上的时间比编写代码的时间更多，而模块化应用使得阅读和理解其工作原理变得更加容易。在一个恰当模块化的应用中，一个开发者可以专注于一个模块进行开发，而无需理解或触碰应用中的其他模块。\n\
  \n鉴于这些诸多好处，在从零开始开发新应用时，最好采用模块化方法。然而，如果有一个未模块化的遗留应用，我们仍然可以对其进行改造。有两种方式可以实现：第一，重写整个应用。重写这个概念相当直接；我们基本上抛弃所有现有代码，从一个干净的（模块化）起点开始。不过，这种方法相当激进，需要在短时间内投入巨大资源。另一种方法是重构，这是一种更渐进的方式，我们逐步将应用模块化。这种方法速度慢得多，但它允许我们在积极改造应用的同时，继续在应用上工作并添加新功能。\n\
  \n通过逐步重构来模块化应用并非易事。不过，有一个系统性的流程（图 6-26）可供遵循。首先，我们创建一个关于如果我们将应用划分为模块，其内部结构会是什么样的投影，以便让我们对最终目标有个概念。之后，我们选择一个类作为起点，并列出该类的职责。然后针对每个职责编写一个验证测试，以确保我们接下来的改动不会引入回归问题。接着，如果需要，我们就对这个职责进行重构。我们可能将其移动到另一个类，甚至另一个模块，或者为其创建一个全新的模块。一旦我们重构完该类的所有职责，我们只需再次选择一个新的起点，重复我们的流程。我们将持续循环这个过程，直到没有更多起点可选用。当达到这个阶段时，就意味着我们不再有未模块化的代码了。\n\
  \n![../images/505360_1_En_6_Chapter/505360_1_En_6_Fig26_HTML.jpg](img/505360_1_En_6_Fig26_HTML.jpg)\n\
  \n图 6-26  \n模块化流程\n\n"
- "# 依赖注入与模拟对象\n\n如果一个组件依赖于另一个行为不可预测的组件，那么为该组件编写测试可能是一项繁琐的任务。为了测试这样的组件，我们需要能够控制这种不可预测的行为。我们可以借助测试替身（test\
  \ double）来实现这一点。术语“测试替身”最早由 Gerard Meszaros 在其著作 *XUnit Test Patterns* 中提出。测试替身是一个通用术语，指代用于替代真实对象以进行测试的任何类型的伪装对象。另一种难以编写测试的情况是，如果我们有一个组件与另一个组件通信，并且我们希望验证与此交互相关的某些事情。在这种情况下，使用测试替身也是最佳方案。测试替身是任何程序员武器库中不可或缺的工具。使用它们对于实现应用的高测试覆盖率以及使测试更稳定至关重要。\n\
  \n## 桩（Stubbing）\n\n测试替身的一种类型是桩（stub）。桩是一个持有预定义数据并在测试期间提供这些数据的对象。当我们不想使用真实数据并希望拥有更一致的数据源时，就会用到它。测试实际上并不关心桩上的函数是否被调用，只要测试对象（或被测系统）能从桩中获取所需数据并执行正确操作即可。并且，如果向桩传递了一个值，测试也不关心该值。此外，无论输入是什么，桩始终输出相同的预定义数据。由于其特性，桩被认为是一种相当轻量级的测试替身。\n\
  \n一个需要使用桩的例子是，当我们有一个对象依赖于向服务器发起网络调用时。发起真实的网络请求会导致我们的测试既缓慢又不可预测，因为我们无法控制服务器每次返回什么数据。\n\
  \n假设我们有一个对象 A，它有一个布尔类型变量 `status`，其值取决于服务器返回的数据。因此，如果服务器返回成功，那么 `status` 将为 `true`；如果服务器返回失败，那么\
  \ `status` 将为 `false`（图 7-1）。为了能够确信地测试这两种场景，我们需要使用桩。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig1_HTML.jpg](img/505360_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1  \n依赖示例\n\n我们将创建一个名为 `ServerStub` 的新对象，并用它来替代真实的 `Server` 对象，如图 7-2 所示。我们的桩有两个方法，用于控制它应返回何种数据。我们将使用这些方法来设置我们的测试。\n\
  \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig2_HTML.jpg](img/505360_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2  \n对依赖进行打桩\n\n当我们为两种场景编写测试时，代码会像这样：\n\n```\nfunc testObjectASuccessStatus()\
  \ {\n// Given\nlet server = ServerStub()\nserver.returnSuccess()\n// When\nlet objectA\
  \ = ObjectA(server)\n// Then\nXCTAssertTrue(objectA.status)\n}\nfunc testObjectAFailureStatus()\
  \ {\n// Given\nlet server = ServerStub()\nserver.returnFailure()\n// When\nlet objectA\
  \ = ObjectA(server)\n// Then\nXCTAssertFalse(objectA.status)\n}\n```\n\n在每个测试中，我们创建一个桩的实例，然后使用\
  \ `returnSuccess()` 或 `returnFailure()` 对其进行设置。接着，我们将桩传递给测试对象，并对 `status` 进行断言。我们将在本章后面讨论如何将桩注入到测试对象中。\n\
  \n\n\n## 模拟（Mocking）\n\n测试替身的另一种类型是模拟对象。模拟对象比存根稍复杂一些。它既可以像存根一样返回一些伪造的数据，还可以验证某个特定方法是否被调用过。模拟对象会记录它们接收到的调用，在我们的测试中，可以验证所有预期操作是否在特定的模拟对象上执行完毕。当我们不想调用生产代码，或者没有简便方法验证预期代码是否已执行时，就会使用模拟对象。\n\
  \n假设我们有三个对象：对象 `A`、`B` 和 `C`。对象 `A` 有一个方法，它接收一个输入，并根据该输入决定是调用对象 `B` 还是对象 `C`（图 7-3）。如果我们向测试对象传入\
  \ `true`，它应该调用对象 `B`；如果传入 `false`，则应调用对象 `C`。为了能够验证这两种场景，我们需要使用模拟对象。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig3_HTML.jpg](img/505360_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 依赖关系示例\n\n我们创建两个新对象作为模拟对象（图 7-4）。`ObjectBMock` 和 `ObjectCMock` 都将执行同一个简单任务：如果被调用则进行记录，并将此信息保存在公共属性\
  \ `isCalled` 中。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig4_HTML.jpg](img/505360_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4 模拟依赖关系\n\n现在我们可以这样编写测试：\n\n```\nfunc testObjectALogic1 () {\n    // 给定\n\
  \    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n    let objectA\
  \ = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(true)\n    // 那么\n\
  \    XCTAssertTrue(objectB.isCalled)\n    XCTAssertFalse(objectC.isCalled)\n}\n\
  func testObjectALogic2 () {\n    // 给定\n    let objectB = ObjectBMock()\n    let\
  \ objectC = ObjectCMock()\n    let objectA = ObjectA(objectB, objectC)\n    // 当\n\
  \    objectA.doLogic(false)\n    // 那么\n    XCTAssertFalse(objectB.isCalled)\n \
  \   XCTAssertTrue(objectC.isCalled)\n}\n```\n\n除了记录是否被调用之外，模拟对象还可以记录每次调用时传入的参数值。在测试中，我们可以验证传递给模拟对象的值是否正确。\n\
  \n因此，以我们的示例为例，可以修改两个模拟对象，使其保存接收到的参数值。然后，测试可以这样修改：\n\n```\nfunc testObjectALogic1\
  \ () {\n    // 给定\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n\
  \    let objectA = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(true)\n\
  \    // 那么\n    XCTAssertTrue(objectB.isCalled)\n    XCTAssertEqual(objectB.value,\
  \ \"Test\")\n    XCTAssertFalse(objectC.isCalled)\n}\nfunc testObjectALogic2 ()\
  \ {\n    // 给定\n    let objectB = ObjectBMock()\n    let objectC = ObjectCMock()\n\
  \    let objectA = ObjectA(objectB, objectC)\n    // 当\n    objectA.doLogic(false)\n\
  \    // 那么\n    XCTAssertFalse(objectB.isCalled)\n    XCTAssertTrue(objectC.isCalled)\n\
  \    XCTAssertEqual(objectC.value, \"Test\")\n}\n```\n\n## 创建测试替身\n\n我们讨论了不同类型的测试替身：模拟对象和存根。但并未讨论如何创建它们。根据定义，替身是可以替代真实对象的对象。因此，替身必须与原始对象有一定关联，以便我们能在测试中无缝替换。有多种创建替身的方式。在本章中，我们将讨论使用继承和使用协议两种创建方式。\n\
  \n### 使用继承创建\n\n在前几章中，我们大量使用了这种方法。继承机制通常是指从一个类派生出另一个类的机制。它是面向对象编程（OOP）的核心概念之一。当我们继承一个类时，就继承了父类的所有特征。这正是该方法的本质所在。我们继承待模拟或待存根对象的所有属性和函数，并通过重写（覆盖）来改变我们想要模拟或存根的部分的行为（图\
  \ 7-5）。这种方法的好处在于，我们可以访问原始实现，因此既可以改变实现，也可以在需要时仅扩展它，保留原有逻辑不变，仅添加测试特定的新逻辑。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig5_HTML.jpg](img/505360_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5 通过继承创建\n\n回想一下，在第 6 章为 `MainViewModel` 编写测试时，我们就使用了这种方法。`MainViewModel`\
  \ 依赖于 `NetworkLayer`，因此我们通过继承创建了 `NetworkLayerStub`。代码如下：\n\n```\nclass NetworkLayerStub:\
  \ NetworkLayer {\n    var stubbedData:Data?\n    init(stubbedData:Data) {\n    \
  \    self.stubbedData = stubbedData\n    }\n    public override func executeNetworkRequest(callBack:\
  \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData!\n\
  \        callBack(jsonData)\n    }\n}\n```\n\n我们继承自 `NetworkLayer`，并重写了 `executeNetworkRequest`\
  \ 方法，使其返回 `stubbedData`，而不是真正发起网络请求。在测试中，我们可以根据需要设置 `stubbedData`。\n\n### 使用协议创建\n\
  \n使用协议创建与使用继承创建有些类似，并且它与面向协议编程（POP）紧密相关。协议充当了对其遵循类型（类、结构体或枚举）应具备功能的蓝图。在面向协议的方法中，我们首先通过定义协议来设计系统。因此，如果需要创建一个执行某些逻辑的组件，我们会将这些逻辑抽象为\
  \ API 并在协议中定义。然后通过遵循该协议并实现所需函数来创建组件。\n\n在创建测试替身时，我们可以使用相同的面向协议方法。如果有一个依赖项需要用替身替换，我们就添加一个描述该依赖项的协议。现在，原始对象遵循此协议，我们可以说测试对象依赖于一个遵循该协议的组件。在测试中，我们可以添加一个遵循该协议的新组件，并将其注入测试对象中，这将成为我们的测试替身（图\
  \ 7-6）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig6_HTML.jpg](img/505360_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6 通过遵循协议创建\n\n让我们尝试使用协议重写 `MainViewModel` 示例。`MainViewModel` 需要依赖协议而不是 `NetworkLayer`\
  \ 对象。我们的协议将如下所示：\n\n```\nprotocol NetworkProtocol {\n    func executeNetworkRequest(callBack:\
  \ @escaping (_ data:Data?) -> Void)\n}\n```\n\n现在修改 `MainViewModel`，使其依赖 `NetworkProtocol`\
  \ 而不是 `NetworkLayer`：\n\n```\nclass MainViewModel: NSObject {\n    private var networkLayer:NetworkProtocol?\n\
  \    init(networkLayer:NetworkProtocol) {\n        self.networkLayer = networkLayer\n\
  \    }\n    public func fetchBestSellerBooks(callBack: @escaping (_ lists:[List]?)\
  \ -> Void) {\n        self.networkLayer?.executeNetworkRequest(callBack: { data\
  \ in\n            guard let data = data else {\n                callBack(nil)\n\
  \                return\n            }\n            var response:Response?\n   \
  \         do {\n                response = try JSONDecoder().decode(Response.self,\
  \ from: data)\n            } catch {\n                print(error.localizedDescription)\n\
  \            }\n            if let lists = response?.results.lists {\n         \
  \       callBack(lists)\n                return;\n            }\n            callBack(nil)\n\
  \        })\n    }\n}\n```\n\n最后，通过创建一个遵循 `NetworkProtocol` 的新类来创建测试替身：\n\n```\n\
  class NetworkLayerStub: NetworkProtocol {\n    var stubbedData:Data?\n    init(stubbedData:Data)\
  \ {\n        self.stubbedData = stubbedData\n    }\n    func executeNetworkRequest(callBack:\
  \ @escaping (_ data:Data?) -> Void){\n        let jsonData = self.stubbedData!\n\
  \        callBack(jsonData)\n    }\n}\n```\n\n\n\n## 依赖注入\n\n我们讨论了模拟对象和桩代码，也探讨了如何创建这些有用的测试替身。但还需要学习如何将测试替身注入到代码中。有多种注入测试依赖的方法。本文将介绍属性注入和初始化器注入。\n\
  \n以下是我们想要编写测试的 `Example` 类。`Example` 依赖于单例实例 `Network.shared`。不过，我们需要模拟 `Network`\
  \ 来验证请求是否已发出：\n\n```swift\nclass Example {\n    func doWork() {\n        Network.shared.makeRequest()\n\
  \    }\n}\n```\n\n现在重构这个类，以便能够轻松地从测试中注入模拟对象。\n\n### 初始化器注入\n\n在前几章中，我们多次使用了这种方法。在该方法中，注入依赖的入口是初始化器。每当创建新实例时，我们会将依赖传递给对象。并在对象中保存对该依赖的引用，每当需要访问依赖时，就使用该引用。因此在测试中，当创建对象实例时，只需在初始化器中传入测试替身，而非真实对象（图\
  \ 7-7）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig7_HTML.jpg](img/505360_1_En_7_Fig7_HTML.jpg)\n\
  \n*图 7-7——初始化器注入*\n\n当代码中始终向对象传递同一个依赖，仅在测试时需要传入不同内容时，在 Swift 中使用默认参数是个好方法。这里我们告知初始化器，依赖的默认值是某个对象，但需要时可以覆盖它。这很有用，因为它能让代码更整洁清晰。\n\
  \n重构后的类应如下所示：\n\n```swift\nclass Example {\n    private var network: Network?\n\
  \    \n    init(network: Network = Network.shared) {\n        self.network = network\n\
  \    }\n    \n    func doWork() {\n        self.network?.makeRequest()\n    }\n\
  }\n```\n\n现在要注入测试替身，只需这样做：\n\n```swift\nlet networkMock = NetworkMock()\nlet testObject\
  \ = Example(network: networkMock)\n```\n\n### 属性注入\n\n使用属性注入是最简单的方法，但在大多数情况下并不适用。假设对象\
  \ A 使用对象 B 执行特定任务。如果对象 A 有一个持有对象 B 的公开属性，那么就可以利用该属性在测试中将模拟对象注入以替代原始对象 B（图 7-8）。但需注意，不要仅为测试而暴露属性，否则会破坏对象的抽象性并导致大量代码异味。\n\
  \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig8_HTML.jpg](img/505360_1_En_7_Fig8_HTML.jpg)\n\
  \n*图 7-8——属性注入*\n\n将类重构为使用属性注入后，应如下所示：\n\n```swift\nclass Example {\n    public\
  \ var network: Network?\n    \n    init() {\n        self.network = Network.shared\n\
  \    }\n    \n    func doWork() {\n        self.network?.makeRequest()\n    }\n\
  }\n```\n\n现在要注入测试替身，只需这样做：\n\n```swift\nlet networkMock = NetworkMock()\nlet testObject\
  \ = Example()\ntestObject.network = networkMock\n```\n\n## 在 UI 测试中模拟网络请求\n\n上述所有方法都可以在单元测试和集成测试中实现。但不建议在\
  \ UI 测试中使用这些方法，因为 UI 测试应像用户使用应用一样，将应用视为黑盒进行测试。在端到端测试中测试模拟对象而不是实际代码是没有意义的。不过，在某些情况下，我们需要模拟特定行为，这时可以通过更高层次的模拟来实现。\n\
  \n首先，打开本章资源中的起始项目。这是**Books**应用的一个版本，我们在上一章中已经使用过。来看一下第 6 章步骤 3.2 中实现的端到端测试：\n\n\
  ```swift\nfunc testShowingBestSellerBooks() throws {\n    // 给定条件\n    let app =\
  \ XCUIApplication()\n    app.launch()\n    \n    // 执行操作\n    let booksTableView\
  \ = app.tables\n    let cells = booksTableView.cells\n    _ = cells.firstMatch.waitForExistence(timeout:\
  \ 1.0)\n    \n    // 验证结果\n    XCTAssertGreaterThan(cells.count, 0)\n}\n```\n\n\
  这个测试完全没有用。首先，它依赖网络请求，因此速度很慢，而且我们没有对表格中显示的数据进行断言。应用可能显示错误数据，但测试仍会通过。\n\n为了修复这个测试，我们将模拟网络请求并返回特定数据（图\
  \ 7-9），同时测试应确保数据在应用内正确渲染。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig9_HTML.jpg](img/505360_1_En_7_Fig9_HTML.jpg)\n\
  \n*图 7-9——网络请求模拟*\n\n我们将使用名为 **Swifter** 的第三方库来模拟网络请求。也可以通过其他库甚至手动实现。但本例中，我们将使用这个轻量级的第三方依赖。\n\
  \n首先，需要集成 Swifter。我们将使用 Swift 包管理器（SPM）安装依赖（图 7-10）。务必确保将其添加到 `BooksUITests` 目标，而非应用目标（图\
  \ 7-11）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig11_HTML.jpg](img/505360_1_En_7_Fig11_HTML.jpg)\n\
  \n*图 7-11——使用 SPM 集成第三方库（步骤 2）*\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig10_HTML.jpg](img/505360_1_En_7_Fig10_HTML.jpg)\n\
  \n*图 7-10——使用 SPM 集成第三方库（步骤 1）*\n\n安装好 **Swifter** 后，需要在网络层做一个小改动，以允许 **Swifter**\
  \ 模拟网络请求。我们需要检查 `ProcessInfo` 中的启动参数，如果包含 `TESTING`，则将域名改为 localhost，将 HTTPS 改为\
  \ HTTP，并添加 `8080` 端口：\n\n```swift\nfunc getHost() -> String {\n    if ProcessInfo.processInfo.arguments.contains(\"\
  TESTING\") {\n        return \"localhost\"\n    } else {\n        return \"api.nytimes.com\"\
  \n    }\n}\n\nfunc getScheme() -> String {\n    if ProcessInfo.processInfo.arguments.contains(\"\
  TESTING\") {\n        return \"http\"\n    } else {\n        return \"https\"\n\
  \    }\n}\n\npublic func executeNetworkRequest(callBack: @escaping (_ data: Data?)\
  \ -> Void) {\n    var components = URLComponents()\n    components.scheme = getScheme()\n\
  \    components.host = getHost()\n    components.port = 8080\n    components.path\
  \ = bestSellerBooks\n    components.queryItems = [\n        URLQueryItem(name: \"\
  api-key\", value: API_KEY),\n        URLQueryItem(name: \"offset\", value: \"20\"\
  )\n    ]\n    \n    guard let url = components.url else {\n        callBack(nil)\n\
  \        preconditionFailure(\"Failed to construct URL\")\n    }\n    \n    let\
  \ task = URLSession.shared.dataTask(with: url) { data, response, error in\n    \
  \    guard let data = data else {\n            callBack(nil)\n            return\n\
  \        }\n        callBack(data)\n    }\n    task.resume()\n}\n```\n\n在设置中需要启动服务器。如果服务器启动失败，将抛出一个错误，从而导致测试失败。这很合理，因为如果模拟服务器未运行，测试将毫无意义。\n\
  \n\n\n```swift\nclass BooksUITests: XCTestCase {\n    var server = HttpServer()\n\
  \    override func setUpWithError() throws {\n        continueAfterFailure = false\n\
  \        try server.start()\n    }\n    override func tearDownWithError() throws\
  \ {\n        server.stop()\n    }\n}\n```\n\n我们将使用同一个 `BestSellerBooksStub.json`\
  \ 文件，因此需要确保它同时包含在两个目标中（图 7-12）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig12_HTML.jpg](img/505360_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12  \n设置 `BestSellerBooksStub.json` 的目标成员资格\n\n此外，我们还需要仅允许本地主机域使用 HTTP 而非\
  \ HTTPS。这将防止系统出于安全原因阻止我们的请求。我们可以通过修改 `Info.plist` 来实现（图 7-13）。\n\n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig13_HTML.jpg](img/505360_1_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13  \n为 localhost 启用 HTTP\n\n现在，是时候真正 stub 网络并更新我们的测试了：\n\n```swift\nfunc\
  \ testShowingBestSellerBooks() throws {\n    // 给定条件\n    let testBundle = Bundle(for:\
  \ type(of: self))\n    let booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
  , withExtension: \"json\")\n    let booksJSON = try String(contentsOf: booksJSONURL!)\n\
  \    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
  \    let app = XCUIApplication()\n    app.launchArguments += [\"TESTING\"]\n   \
  \ app.launch()\n    // 触发操作\n    let booksTableView = app.tables\n    let cells\
  \ = booksTableView.cells\n    _ = cells.firstMatch.waitForExistence(timeout: 1.0)\n\
  \    // 验证结果\n    XCTAssertTrue(cells.staticTexts[\"book_title_0\"].label == \"\
  THE LAST THING HE TOLD ME\")\n    XCTAssertTrue(cells.staticTexts[\"book_desc_0\"\
  ].label == \"Hannah Hall discovers truths about her missing husband and bonds with\
  \ his daughter from a previous relationship.\")\n    XCTAssertTrue(cells.staticTexts[\"\
  book_date_0\"].label == \"2021-05-26 22:10:24\")\n    XCTAssertTrue(cells.staticTexts[\"\
  book_title_1\"].label == \"SOOLEY\")\n    XCTAssertTrue(cells.staticTexts[\"book_desc_1\"\
  ].label == \"Samuel Sooleymon receives a basketball scholarship to North Carolina\
  \ Central and determines to bring his family over from a civil war-ravaged South\
  \ Sudan.\")\n    XCTAssertTrue(cells.staticTexts[\"book_date_1\"].label == \"2021-05-26\
  \ 22:10:24\")\n}\n```\n\n在我们的测试中，首先告诉 Swifter 对指定路径进行 stub 并返回预期的 JSON，以便我们能够在展示的\
  \ UI 中进行断言。然后，我们启动应用程序并传入额外的启动参数来表明我们正在测试。接着，我们对预期单元格的存在性进行断言，同时对显示的数据也进行断言。\n\n\
  这个更新后的测试应该能够通过。但重要的是，现在得益于网络 stub，我们能够在 UI 中对实际数据进行断言（图 7-14）。日后，如果我们显示的内容有误，例如，这个测试将能够捕获它。\n\
  \n![../images/505360_1_En_7_Chapter/505360_1_En_7_Fig14_HTML.jpg](img/505360_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14  \n经过 Stub 后的应用程序\n\n## 总结\n\n在编写测试时，我们常常会遇到需要断言某些无法直接访问的内容的情况，有时还需要控制特定行为以避免不可预测性。在这些情况下，我们解决所有问题的方案就是测试替身。测试替身是任何用于替代真实对象的假对象，它们有多种形式和用途。在这一章中，我们讨论了不同类型的测试替身，还介绍了如何创建替身并将其注入到待测试的代码中。\n\
  \n桩（Stub）是测试替身的一种。桩持有一些预定义的数据，并返回这些数据而不是真实数据。这在测试中很有用，可以提高速度并消除不可预测性。另一种测试替身是模拟对象（Mock）。模拟对象也可以返回假数据，但它们的主要功能是记录对它们发出的调用，还能记录通过函数调用传入的值。这样我们就可以断言待测试对象与模拟对象之间是否发生了特定的交互。\n\
  \n创建测试替身有几种方法。我们可以通过继承来创建，即对原始类进行子类化，然后重写并修改我们想要进行 stub 或 mock 的函数。另一种创建替身的方法是使用协议。如果我们的测试对象依赖于某个协议，那么我们可以通过创建一个符合该协议的新组件，并实现协议的要求来创建替身。\n\
  \n至于将替身注入到待测试代码中，这是一个相当简单的任务。我们可以通过待测试对象的初始化方法进行注入，这被称为初始化器注入。或者，我们可以使用属性注入，即先正常创建对象，然后通过访问其属性并将替身赋值给它来实现注入。\n\
  \n最后，我们探讨了一种具体但非常重要的 stub 类型——在 UI 测试层进行网络 stub。我们使用了一个第三方库来 stub 网络请求，这使得我们能够编写更全面的\
  \ UI 测试。同时，这也提高了测试的稳定性和速度。\n\n"
- "# 8. 避免多线程噩梦\n\n并发与多线程是 iOS 开发的核心组成部分。理解它们以及如何正确利用它们，是开发高质量应用程序的关键。缺乏并发通常会导致应用程序无响应，在执行繁重操作时卡死。\n\
  \n## 什么是并发？\n\n并发的概念是指两个或多个任务可以独立定义，并且每个任务无论其他任务是否正在执行都可以被执行。这意味着两个或多个任务可以同时执行，换句话说，就是并发执行。\n\
  \n并发可以通过两种方式实现：上下文切换（时间片轮转）或并行。使用哪种方式取决于处理器的类型。对于单核处理器，使用上下文切换，系统在线程之间切换得足够快，以至于看起来两个任务似乎同时在运行。而对于多核处理器，则是通过在每个独立核心上并行运行每个线程来实现并发。\n\
  \n### GCD\n\n到目前为止，我们讨论了线程以及如何在不同的线程上同时执行两个或多个任务。但线程是一种底层工具，手动管理线程以实现并发是一项相当复杂的任务。\n\
  \nGrand Central Dispatch（GCD）由苹果公司创建，自 iOS 4 起就已可用。GCD 基本上将手动处理线程的工作从开发者手中抽象出来。它帮助开发者利用系统的多线程特性，而无需实际创建或管理线程本身。你无需创建线程，而是使用\
  \ GCD 来调度任务，系统将以最高效的方式执行这些任务。\n\n### 队列\n\n如前所述，GCD 抽象了线程的处理。那么在这种抽象之后，你处理的是什么呢？你处理的是派发队列（dispatch\
  \ queues）。你可以从名称推断出其功能。你将任务提交到队列，GCD 将按先进先出（FIFO）顺序执行它们。根据可用的资源、使用的队列类型以及派发函数（用于提交任务的函数），GCD\
  \ 将决定该任务在何时以及哪个线程上执行。\n\n我们一直在说 GCD 有多出色，这确实没错。然而，仅仅使用 GCD 并不能保证代码没有 bug。关键在于选择正确类型的派发队列以及正确的派发函数。\n\
  \n\n\n### 串行队列与并发队列\n\n队列分为两种类型：串行队列和并发队列：\n\n**串行队列**能保证提交到该队列的所有任务一个接一个地执行，也就是说，第一个任务必须完成，第二个任务才能开始。这意味着串行队列不会在超过一个线程上运行。\n\
  \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig1_HTML.jpg](img/505360_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1  \n串行队列任务示意图\n\n**并发队列**可以在多个线程上运行，这意味着提交到该队列的任务可以同时执行。并发队列与串行队列的一个非常重要的区别是：并发队列仅在任务启动时保证先进先出（FIFO）顺序。然而，由于队列不会等待任务完成再启动新任务，因此任务的完成顺序并不保证\
  \ FIFO。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig2_HTML.jpg](img/505360_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2  \n并发队列任务示意图\n\n### 同步与异步\n\n将任务派发到队列时，你可以选择同步派发或异步派发。选择串行还是并发会影响**目标**——即任务被提交以运行的队列。这与选择同步还是异步不同，后者会影响**来源**——即你提交任务的那个队列。\n\
  \n当你使用**同步**语句时，它会阻塞当前队列（来源），直到该代码块执行完毕。执行完成后，它将控制权返还给调用者，来源队列便可继续执行。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig3_HTML.jpg](img/505360_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3  \n同步任务示意图\n\n另一方面，**异步**语句相对于当前队列（来源）是异步执行的。控制权会立即返还给调用者，来源队列永远不会被阻塞。并且，也无法保证该代码块具体何时执行。\n\
  \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig4_HTML.jpg](img/505360_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4  \n异步任务示意图\n\n## 并发的成本\n\n`GCD` 旨在简化线程的使用，并为我们的应用执行的任务增加并发性。而并发的目的是提升应用的性能，最终使应用即使在执行繁重操作时也能保持高度响应。但遗憾的是，并发也有负面成本，这意味着我们不能随时随地应用它。\n\
  \n并发用于提升应用性能，但误用它实际上可能导致适得其反。想象一下，我们有一个影响非常小的操作，需要执行 10,000 次。你可能会认为在这种情况下必须使用 `GCD`\
  \ 来提升性能。但是，如果我们创建 10,000 个任务并将它们全部提交给一个队列，这实际上会导致极高的内存消耗，并对操作块的分配和释放产生负面影响。因此在这种情况下，我们在试图提升性能的同时，实际上反而降低了性能。`GCD`\
  \ 并非无视其他因素即可提升性能的神奇技术。与任何技术一样，它也有自身的局限性。所以，一切归结于 `GCD` 的使用方式。如何有效地使用它，取决于你。\n\n\
  除了给系统资源带来开销之外，使用 `GCD` 还会带来一些严重风险。其中一个特定的风险是遭遇**死锁**的风险。简单来说，死锁是一种两个线程互相等待对方完成才能继续执行的状态。在下图中，线程\
  \ A 等待线程 B 完成才能继续，而线程 B 等待线程 A 完成才能继续。这意味着两者都无法完成，因此也无法继续。这会导致这两个线程无限期地挂起。这是多线程编程中非常常见的风险，进而在使用\
  \ `GCD` 时也相当常见。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig5_HTML.jpg](img/505360_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5  \n死锁\n\n使用 `GCD` 时的其他风险还包括**竞争条件**。当两个线程试图在同一时刻访问或修改同一资源时，就会发生竞争条件。竞争条件的问题在于它完全取决于线程何时被调度来执行特定任务，而根据\
  \ `GCD` 的特性，这是完全不可预测的。这使得识别、调试和重现它们变得非常棘手。这是一个同步问题，可以通过使用串行队列来解决，如果使用的是并发队列，则可以使用调度屏障来解决。还有其他实现同步的方法，但我们不会在本书中讨论。\n\
  \n## 读者-写者问题\n\n许多问题都可能导致竞争条件。其中之一就是读者-写者问题。这是我们可能会遇到的更常见的问题之一。当存在一个共享资源，一个线程试图**读取**该共享资源，而另一个线程试图**写入**该资源时，就会发生此问题。\n\
  \n让我们谈谈如何识别我们的代码引入了这类问题。这里的关键词是**共享资源**。一旦我们有一个处理不当的共享资源，就极有可能导致竞争条件。在任何应用中，查找共享资源的首要目标就是我们臭名昭著的**单例**类。\n\
  \n### 单例类\n\n单例类是指只能有一个实例的类。通常会创建一个实例并以静态方式保存在类中，然后在需要该对象的任何地方共享。在 Swift 中创建单例非常简单，只需为我们的类或结构体添加一个空的私有初始化方法，以确保我们的单例不能从类外部初始化。然后，我们再添加一个静态变量来保存该类的唯一实例。以下是一个单例类的示例：\n\
  \n```\nstruct TestStruct {\nstatic let shared = TestStruct()\nprivate init() { }\n\
  }\n```\n\n由于其特性，单例类很容易被两个线程同时访问，因为单个对象服务于整个应用。然而，普通类也可能在两个线程之间拥有共享资源。这完全取决于这些类的对象如何处理和使用，以及每个对象如何管理其资源。一旦我们找到可疑的资源，就需要问自己：这个资源能被多个线程访问吗？这个资源能否被访问（读取）和修改（写入）？如果这两个问题的答案都是肯定的，那么我们就找到了一个潜在的竞争条件。\n\
  \n\n\n### 识别竞态条件\n\n首先，让我们看一下本章资源中的 **ReaderWriter** 项目。这是一个空项目，只包含一个使用测试驱动开发（TDD）编写的类\
  \ `Database`：\n\n```\npublic class Database {\n// MARK:- 单例\npublic static let shared\
  \ = Database.shared\n// MARK:- 初始化方法\nprivate init() {}\n// MARK:- 私有变量\nprivate\
  \ var dictionary: [String:Any] = [:]\n// MARK:- 公共方法\npublic func addObject(_ object:\
  \ Any, for key: String) {\ndictionary[key] = object\n}\npublic func removeObject(for\
  \ key: String) {\ndictionary.removeValue(forKey: key)\n}\npublic func object(for\
  \ key: String) -> Any? {\nreturn dictionary[key]\n}\npublic func recordsCount()\
  \ -> Int {\nreturn dictionary.count\n}\npublic func reset() {\ndictionary = [:]\n\
  }\n}\n```\n\n这是一个充当极简数据库的单例类。它在内部字典中存储键值对，并提供了一些公共 API 来与数据库交互：有添加新记录的 API、删除记录的\
  \ API、检索记录的 API，以及获取当前记录数的 API。\n\n该类含有一个内部字典。这个资源是否会导致读取器/写入器竞态条件？要回答这个问题，让我们针对该资源提出两个问题：\n\
  \n1.  该资源能否被多个线程访问？\n\n    由于`Database`是单例类，其任何公共 API 都有可能被多个线程调用。因此，**答案是肯定的**。\n\
  \n2.  该资源能否被访问（读取）和修改（写入）？\n\n    查看公共方法，`object(for key: String)`和`recordsCount()`都会访问该资源。而`addObject(_\
  \ object: Any, for key: String)`和`removeObject(for key: String)`则会修改该资源。因此，**答案也是肯定的**。\n\
  \n这两个问题的答案告诉我们，该类并非线程安全的，可能会引发竞态条件。\n\n### 用测试驱动开发（TDD）解决问题\n\n到现在为止，一旦你看到“TDD”，就应该立刻想到以下循环（图\
  \ 8-6）。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig6_HTML.jpg](img/505360_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\nTDD 循环\n\n与往常一样，我们将从第一步开始：编写一个会失败的测试。我们知道，当代码同时尝试读取和写入时，会导致竞态条件。因此，我们现在目标是编写一个因该问题而失败的测试。\n\
  \n现在我们来编写测试。首先，从搭建测试环境开始。我们需要创建一个新的`Database`对象，并向其中添加一条记录，以便稍后在测试中尝试检索它。我们的**给定（Given）**部分应如下所示：\n\
  \n```\n// 给定（Given）\nlet database = Database.shared\ndatabase.addObject(\"InitialValue\"\
  , for: \"InitialKey\")\n```\n\n接着，我们将尝试同时向数据库写入数据并从数据库中读取数据，期望这会引发竞态条件。我们的**当（When）**部分应如下所示：\n\
  \n```\n// 当（When）\ndatabase.addObject(\"Test\", for: \"Key1\")\nlet _ = database.object(for:\
  \ \"InitialKey\")\n```\n\n最后，在测试的**那么（Then）**部分，我们通常会断言预期的行为确实发生了。在本例中，我们实际上有两个断言。一个是显式断言，确认记录确实已被添加。我们并不太关心这个断言。我们更关心的是隐式断言：如果测试正常运行，则说明没有发生竞态条件；但如果发生竞态条件，测试将会崩溃并失败。这在这里充当了我们的隐式断言。我们的**那么（Then）**部分应如下所示：\n\
  \n```\n// 那么（Then）\nlet count = database.recordsCount()\nXCTAssertEqual(count, 2)\n\
  ```\n\n如果我们运行刚才编写的测试，它实际上会通过。但为什么没有引发竞态条件而失败呢？让我们深入分析一下刚才编写的测试：\n\n```\nfunc testReadWriteDataRace()\
  \ {\n// 给定（Given）\nlet database = Database.shared\ndatabase.addObject(\"InitialValue\"\
  , for: \"InitialKey\")\n// 当（When）\ndatabase.addObject(\"Test\", for: \"Key1\")\
  \ // #1\nlet _ = database.object(for: \"InitialKey\") // #2\n// 那么（Then）\nlet count\
  \ = database.recordsCount()\nXCTAssertEqual(count, 2)\n}\n```\n\n我们知道整个测试是一个单独的代码块。在代码块的上下文中，每一行代码都是按顺序（串行）执行的。这意味着对`addObject`（#1）的调用会执行并完成后，才会执行对`object`（#2）的调用。也就是说，读取和写入操作从未并发执行（图\
  \ 8-7）。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig7_HTML.jpg](img/505360_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n测试示意图\n\n现在我们需要在两个操作之间添加并发性。我们将通过使用一个并发队列来实现。修改后的测试应如下所示：\n\n```\nfunc\
  \ testReadWriteDataRace() {\n// 给定（Given）\nlet queue = DispatchQueue(label: \"com.ReaderWriterTests.DatabaseTests\"\
  , attributes: .concurrent)\nlet database = Database.shared\ndatabase.addObject(\"\
  InitialValue\", for: \"InitialKey\")\n// 当（When）\nqueue.async { // #1\ndatabase.addObject(\"\
  Test\", for: \"Key1\") // #2\n}\nqueue.async { // #3\nlet _ = database.object(for:\
  \ \"InitialKey\") // #4\n}\n// 那么（Then）\nlet count = database.recordsCount()\nXCTAssertEqual(count,\
  \ 2) // #5\n}\n```\n\n这里我们创建了一个新的并发队列，并为其指定了标签。在**当（When）**部分，我们将两个操作异步派发到该并发队列中。我们使用\
  \ `async` 而不是 `sync`，因为如前所述，使用 `sync` 会影响源线程（即测试运行的线程），这意味着测试会在第一个`sync`调用处暂停，直到它执行完毕，然后我们才会将第二个操作派发到并发队列。在这种情况下，两个操作永远不会同时存在于队列中，这就不符合我们的目的了。\n\
  \n\n\n如果现在尝试运行我们的测试，它将会失败。乍一看，这是件好事，因为这正是我们试图达到的目的。但当我们实际查看失败原因时，会发现是 `XCTAssertEqual`\
  \ 断言失败了。如果你还记得，我们其实并不关心这个断言，因为它并不指示竞争条件，并且在所有情况下都应该通过。这意味着 `addObject` 的调用未被执行，也就是说我们的测试存在问题。\n\
  \n让我们看看运行测试时会发生什么（图 8-8）。因为我们使用 `async` 派发了两个操作，这意味着源线程不会被阻塞。由于它不被阻塞，测试将在我们将操作派发到队列后立即继续执行。回到我们的测试中，这意味着它会立即执行“Then”部分。这就是测试失败的原因。我们在操作尚未执行时就执行了断言。\n\
  \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig8_HTML.jpg](img/505360_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\n测试示意图\n\n要修复我们的测试，需要阻塞测试直到操作完成。如前所述，我们不能使用 `sync`。相反，我们需要测试在派发两个任务后等待。我们可以使用\
  \ `XCTestExpectation` 来实现这一点。我们将为每个操作创建一个期望，并在 `async` 块内实现它们。然后，就在断言之前等待这两个期望。我们的测试应该像这样：\n\
  \n```\nfunc testReadWriteDataRace() {\n    // Given\n    let queue = DispatchQueue(label:\
  \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n    let database\
  \ = Database.shared\n    database.addObject(\"InitialValue\", for: \"InitialKey\"\
  )\n    // When\n    let exp1 = expectation(description: \"Adding Key1 done\")\n\
  \    let exp2 = expectation(description: \"Adding Key2 done\")\n    queue.async\
  \ {\n        database.addObject(\"Test\", for: \"Key1\")\n        exp1.fulfill()\n\
  \    }\n    queue.async {\n        let _ = database.object(for: \"InitialKey\")\n\
  \        exp2.fulfill()\n    }\n    wait(for: [exp1, exp2], timeout: 1)\n    //\
  \ Then\n    let count = database.recordsCount()\n    XCTAssertEqual(count, 2)\n\
  }\n```\n\n现在我们已经修复了测试，让它等待操作执行完毕（图 8-9），让我们再次运行它，同时留意我们正在寻找的竞争条件。当我们运行测试时，它（极有可能）会通过。这既是好消息也是坏消息。好消息是因为这意味着我们添加的期望确实发挥了作用。但坏消息是因为我们现在在并发队列上运行两个操作，但它们仍然没有同时执行。\n\
  \n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig9_HTML.jpg](img/505360_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n测试示意图\n\n我们的竞争条件在哪里？这是否意味着 `Database` 是线程安全的？\n\n实际上，这些问题的答案隐藏在前一段中。如果你仔细看，会发现提到测试**极有可能**通过。我们之所以不能\
  \ 100% 确定测试是否会通过，是有原因的。这是因为我们正在寻找的竞争条件实际发生的可能性非常小。由于我们使用的队列是并发的，GCD 可能会决定在单独的线程上运行每个操作，从而导致竞争条件。但如前所述，这种情况发生的概率极低。原因在于，这两个操作是轻量级的操作，并且队列上只派发了两个任务。GCD\
  \ 几乎不太可能决定为我们的队列额外分配一个线程。即使 GCD 额外分配了一个线程，由于我们操作的性质、它们的轻量级以及它们完成的速度之快，它们恰好同时执行的概率也确实很低。\n\
  \n那么现在该怎么办？我们知道测试失败的概率非常低（接近于零）。遗憾的是，这意味着我们的测试几乎没有价值。如果测试本应失败却没有失败，那么保留这个测试根本就没有理由。幸运的是，我们仍然可以做一些事情。我们知道竞争条件的概率极低，因为队列上只有两个任务，而且它们都很轻量。这意味着如果我们在队列上添加更多任务，就会增加这种概率。我们甚至可以显著提高这个概率，直到我们确信竞争条件一定会发生。让我们看看如何做到这一点：\n\
  \n```\nfunc testReadWriteDataRace() {\n    // Given\n    let queue = DispatchQueue(label:\
  \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n    let database\
  \ = Database.shared\n    database.addObject(\"InitialValue\", for: \"InitialKey\"\
  )\n    // When\n    var expectations:[XCTestExpectation] = []\n    for i in 0..<500\
  \ {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
  \ \"Adding \\(key) done\")\n        queue.async {\n            database.addObject(\"\
  Test\", for: key)\n            exp.fulfill()\n        }\n        expectations.append(exp)\n\
  \    }\n    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let exp\
  \ = expectation(description: \"Adding \\(key) done\")\n        queue.async {\n \
  \           let _ = database.object(for: \"InitialKey\")\n            exp.fulfill()\n\
  \        }\n        expectations.append(exp)\n    }\n    wait(for: expectations,\
  \ timeout: 10)\n    // Then\n    let count = database.recordsCount()\n    XCTAssertEqual(count,\
  \ 501)\n}\n```\n\n我们简单地修改了测试，以便执行 500 次读取操作和 500 次写入操作。通过用这个极高的任务数来过载我们的队列，我们基本上迫使\
  \ GCD 为这个队列分配不止一个线程，并且由于读写操作的数量很大，几乎可以确定其中两个操作会同时执行。\n\n如果现在尝试运行我们的测试，它最终会因竞争条件而失败。![../images/505360_1_En_8_Chapter/505360_1_En_8_Figa_HTML.gif](img/505360_1_En_8_Figa_HTML.gif)\n\
  \n\n\n### 线程清理器\n\n然而，现在我们遇到了一个新问题：测试耗时过长。如果试图减少迭代次数，又会降低捕捉线程问题的准确性。幸运的是，Xcode 中有一个工具可以帮我们解决这个问题——`Thread\
  \ Sanitizer`（线程清理器）。\n\n`Thread Sanitizer`（通常简称为 `TSan`）是苹果公司作为 LLVM 编译器的一部分提供的工具。它能帮助审查\
  \ Swift 和 C 语言代码中的线程问题。该清理器能够检测到多个线程尝试访问同一资源且至少有一个访问是写操作的情况。它通过重建整个应用程序，并在代码中的每个内存访问周围添加检查来实现这一点。这些检查会记录下内存访问的发生时间、发生位置以及来自哪个线程。根据这些信息，它能在发生非法内存访问时添加断点。\n\
  \n`Thread Sanitizer` 的妙处在于它能够检测到静默的数据竞争。在很多情况下，同一资源可能被不同线程访问和修改，但线程之间仅差微秒未能产生冲突。没有这个清理器，这种场景会因不会导致异常行为或崩溃而被忽略。然而其他时候，它们可能会发生冲突。正是这种随机性使得线程问题难以调试。但启用\
  \ `Thread Sanitizer` 后，捕捉线程问题的几率会大大增加。\n\n要启用 `Thread Sanitizer`，我们需要进入方案配置界面（图\
  \ 8-10）。\n\n让我们为“运行”和“测试”配置启用该清理器。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig10_HTML.jpg](img/505360_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10  \n启用线程清理器\n\n现在，为了让 Xcode 在检测到数据竞争时暂停，我们需要添加“运行时问题断点”。我们可以从断点导航器中添加它（图\
  \ 8-11）。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig11_HTML.jpg](img/505360_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11  \n添加运行时问题断点\n\n由于现在已经启用了 `Thread Sanitizer`，如果需要，我们实际上可以适当减少迭代次数。\n\n\
  ### 让测试通过\n\n现在我们终于完成了 TDD 周期中的第一步，是时候修复那个我们刚刚庆祝其失败的测试了。如前所述，竞态条件是同步问题，可以通过多种方式修复。让我们尝试使用串行队列来修复它。目标是利用串行队列来实现数据库对象执行的所有操作之间的同步。我们需要确保在任何给定时间只执行一个操作。\n\
  \n当我们添加串行队列后，`Database` 类应该如下所示：\n\n```\npublic class Database {\n    // MARK:-\
  \ 单例\n    public static let shared = Database.shared\n    // MARK:- 私有变量\n    private\
  \ var dictionary: [String:Any] = [:]\n    private let queue = DispatchQueue(label:\
  \ \"com.ReaderWriter.Database\")\n    // MARK:- 公共函数\n    public func addObject(_\
  \ object: Any, for key: String) {\n        queue.sync {\n            dictionary[key]\
  \ = object\n        }\n    }\n    public func removeObject(for key: String) {\n\
  \        queue.sync {\n            _ = dictionary.removeValue(forKey: key)\n   \
  \     }\n    }\n    public func object(for key: String) -> Any? {\n        queue.sync\
  \ {\n            return dictionary[key]\n        }\n    }\n    public func recordsCount()\
  \ -> Int {\n        queue.sync {\n            return dictionary.count\n        }\n\
  \    }\n    public func reset() -> Int {\n        queue.sync {\n            dictionary\
  \ = [:]\n        }\n    }\n}\n```\n\n现在让我们再次运行测试。它应该能通过了 ✅。让我们也运行其余测试，以确保我们的更改没有导致任何回归。由于所有测试都通过了，并且没有需要重构的地方，这意味着我们已经完成了这个问题的修复。那么就是这样：我们在代码中识别出一个与多线程相关的问题，并成功应用\
  \ TDD 修复了它。\n\n## 修复 Books 中的线程问题\n\n`Books` 是第 6 章中介绍的项目。目前，`Books` 是一个模块化应用，但这并不意味着它没有\
  \ Bug。幸运的是，在编写 `Books` 时，并发问题并非首要考虑事项。因此，我们现在有机会在一个真实应用中看到线程问题，并尝试使用 TDD 来修复它，就像我们刚刚对\
  \ `Database` 类中的读写者问题所做的那样。\n\n让我们打开项目（可在本章资源中找到），开始寻找潜在的线程问题。如果仔细查看，会发现代码中有一个地方可能不是线程安全的。那就是我们\
  \ `UIImageView` 上的扩展，它负责处理图片缓存：\n\n```\nextension UIImageView {\n    static var\
  \ dictionaryImageCache = [String:UIImage]()\n    func load(url: URL) {\n       \
  \ DispatchQueue.global().async { [weak self] in\n            if (UIImageView.dictionaryImageCache[url.path]\
  \ != nil) {\n                DispatchQueue.main.async {\n                    self?.image\
  \ = UIImageView.dictionaryImageCache[url.path]\n                }\n            \
  \    return\n            }\n            if let data = try? Data(contentsOf: url)\
  \ {\n                if let image = UIImage(data: data) {\n                    UIImageView.dictionaryImageCache[url.path]\
  \ = image\n                    DispatchQueue.main.async {\n                    \
  \    self?.image = image\n                    }\n                }\n           \
  \ }\n        }\n    }\n}\n```\n\n这个扩展的工作原理是：它有一个静态字典，用于存储图片，该字典对所有 `UIImageView`\
  \ 实例都是可访问的。这表明共享字典上可能发生数据竞争。为了确定，让我们问自己两个问题：\n\n1. **这个资源是否可以从多个线程访问？**  \n   该扩展本质上是全局的，适用于所有\
  \ `UIImageView` 实例，这意味着我们可以轻松地从多个线程调用 `load(url: URL)`。\n\n2. **这个资源是否可以同时被访问（读取）和修改（写入）？**\
  \  \n   查看 `load` 函数，它所做的是访问字典以检查图片是否在缓存中；如果没有，则加载图片并修改字典以保存新加载的图片。\n\n这两个问题的答案告诉我们，这个扩展不是线程安全的，可能会导致竞态条件。\n\
  \n\n\n### 应用测试驱动开发（TDD）\n\nTDD 的第一步是编写一个会失败的测试。这个测试将与我们上一个例子最终得到的测试非常相似：\n\n```\n\
  func testLoadImageMultiThreading() {\n    // 给定条件\n    let queue = DispatchQueue(label:\
  \ \"com.ReaderWriterTests.DatabaseTests\", attributes: .concurrent)\n    let image\
  \ = UIImageView()\n    // 执行操作\n    var expectations:[XCTestExpectation] = []\n\
  \    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
  \ \"添加 \\(key) 完成\")\n        queue.async {\n            image.load(url: URL(string:\
  \ \"https://storage.googleapis.com/du-prd/books/images/9781501171345.jpg\")!)\n\
  \            exp.fulfill()\n        }\n        expectations.append(exp)\n    }\n\
  \    for i in 0..<500 {\n        let key = \"Key\\(i+1)\"\n        let exp = expectation(description:\
  \ \"添加 \\(key) 完成\")\n        queue.async {\n            image.load(url: URL(string:\
  \ \"https://storage.googleapis.com/du-prd/books/images/9781501171345.jpg\")!)\n\
  \            exp.fulfill()\n        }\n        expectations.append(exp)\n    }\n\
  \    wait(for: expectations, timeout: 10)\n}\n```\n\n现在我们有了一个失败的测试，表明我们的代码不是线程安全的，是时候修复我们的代码了。我们可以像数据库示例中那样，使用串行队列来修复扩展，但让我们尝试点新东西。这次我们将使用锁，这是一种确保同步的常用方法：\n\
  \n```\nextension UIImageView {\n    // MARK:- 变量\n    static var dictionaryImageCache\
  \ = [String:UIImage]()\n    static var lock = NSRecursiveLock()\n    // MARK:- 函数\n\
  \    func load(url: URL) {\n        DispatchQueue.global().async { [weak self] in\n\
  \            Self.lock.lock()\n            if (Self.dictionaryImageCache[url.path]\
  \ != nil) {\n                DispatchQueue.main.async {\n                    self?.image\
  \ = Self.dictionaryImageCache[url.path]\n                }\n                Self.lock.unlock()\n\
  \                return\n            }\n            Self.lock.unlock()\n       \
  \     if let data = try? Data(contentsOf: url) {\n                if let image =\
  \ UIImage(data: data) {\n                    Self.lock.lock()\n                \
  \    Self.dictionaryImageCache[url.path] = image\n                    Self.lock.unlock()\n\
  \                    DispatchQueue.main.async {\n                        self?.image\
  \ = image\n                    }\n                }\n            }\n        }\n\
  \    }\n}\n```\n\n我们在这里所做的是，在访问或修改之前，先通过调用 `lock()` 获取锁。这确保了当任何其他线程试图获取同一把锁时，它将被强制等待，直到持有锁的线程释放它。我们通过调用\
  \ `unlock()` 来释放锁。\n\n现在如果我们再次运行测试（图 8-12），它将会通过 ✅。\n\n![../images/505360_1_En_8_Chapter/505360_1_En_8_Fig12_HTML.jpg](img/505360_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12. 多线程测试通过\n\n## 总结\n\n在本章中，你了解了多线程编程中的一些主要概念。首先是并发，即两个或多个任务可以在不同线程上同时执行。在\
  \ iOS 中，并发是通过使用 Grand Central Dispatch (GCD) 实现的。GCD 将线程的手动处理从开发者手中抽象出来。你无需创建线程，而是创建任务并将其分发到队列，GCD\
  \ 会在需要时处理这些任务在多个线程上的底层执行。\n\n调度队列是 GCD 运行的核心。当任务被提交到队列时，GCD 会按照先进先出的顺序执行这些任务。然而，我们有两种类型的队列：串行队列和并发队列。串行队列确保在任何给定时间，该队列中只有一个任务在运行，当一个任务完成后，队列中的下一个任务才开始。另一方面，并发队列能够同时运行多个任务。\n\
  \n当向队列提交任务时，我们可以使用 `sync` 或 `async` 来提交。这种区别影响的是**源**队列（执行分发的队列），而不是**目标**队列（任务被提交到的队列）。使用\
  \ `sync` 时会阻塞调用队列，直到任务完成。而使用 `async` 时，调用队列会正常运行。\n\n并发有许多好处，尤其是在性能方面。由于我们能够同时执行多个任务，并且不会因为一个繁重任务而阻塞另一个任务，这自然会提升我们应用的性能。但这并非总是如此，过度使用并发会因不必要的高内存消耗而降级性能。\n\
  \n除了对性能的负面影响，并发还有一些严重的缺点。如果使用不当，并发可能导致错误和崩溃。当两个操作依赖于同一个共享资源并且彼此并发执行时，可能会引发一系列问题。我们可能会遇到死锁，甚至是数据竞争条件。\n\
  \n当某个线程正在修改一个资源，而另一个线程要么试图读取同一资源，要么也试图修改它时，就会发生竞态条件。竞态条件往往会导致极其难以调试的意外行为，在某些情况下甚至可能引发崩溃。在本章中，我们探讨了如何应用\
  \ TDD 来修复数据竞争。我们通过添加一种特殊类型的测试来应用 TDD 的第一步，这种测试在多线程环境中测试我们的代码（并配合使用线程清理器）。然后像往常一样进行\
  \ TDD 循环中的第二步和第三步。\n\n"
- "# 9. 测试你的网络\n\n如今大多数应用在某个时候都会与互联网通信。纯本地应用很棒，但与 Web 服务通信可以帮助你将应用转变为一款真正卓越的应用。有大量多样化的公共\
  \ Web 服务可供你的应用使用。你还可以接入自己的私有 Web 服务，为用户提供一组扩展的功能，这些功能是你的纯本地应用所无法提供的。\n\n## 网络基础知识\n\
  \n当人们想到互联网时，脑海中可能会浮现出许多东西。其中之一就是“**www.**”。这代表**万维网**，它是我们能够通过互联网访问的信息系统。顾名思义，这个系统是全球性的。对于如此庞大的系统，要演变成我们今天所知的模样，它必须受一些协议的约束，以便全球所有机器都能访问。因此，两台机器之间要通信，需要使用定义的协议进行。协议本质上是双方之间的一份契约，包含一套既定的规则，规定了数据如何在不同的设备之间传输。\n\
  \n### HTTP 请求\n\n超文本传输协议 (HTTP) 是一种允许在双方之间传输资源的协议。\n\n一个 HTTP 请求通常包含以下内容：\n\n* URL：标识我们想要的资源。\n\
  * HTTP 方法：声明可以执行的操作类型。\n* 头部（可选）：这是键/值对，允许我们向服务器传递额外信息。\n* 数据（可选）：可以有多种形式，例如 JSON。通常被称为请求的正文。\n\
  \nHTTP 方法有多种选择：\n\n* `GET`：用于获取资源\n* `POST`：用于创建或更新资源\n* `PATCH`：用于修改资源\n* `PUT`：用于替换资源\n\
  * `DELETE`：用于删除资源\n\n### HTTP 响应\n\n当你向服务器发出 HTTP 请求时，服务器会返回一个响应。一个响应通常包含以下内容：\n\
  \n* 状态码：这是一个数字，告诉你请求是否成功，或者因为某些错误而失败。\n* 头部：这类似于请求中的头部。它们携带关于响应的额外信息。\n* 数据：这也类似于请求中的数据。它携带你所请求的数据（如果有的话）。它可以有多种形式，但大多数服务器以\
  \ JSON 格式返回数据。\n\n\n\n### URL\n\n统一资源定位符（URL）本质上是一个指向特定资源的地址。该资源可以是 HTML 页面、图片、JSON\
  \ 数据等。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig1_HTML.jpg](img/505360_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1 URL 组成部分\n\n一个基本的 URL 包含不同的组成部分（图 9-1）：\n\n- **协议方案**：指明客户端访问资源时必须使用的协议。\n\
  - **主机**：通常是一个域名（也可以使用 IP 地址），指明我们正在通信的服务器。\n- **路径**：标识我们向服务器请求的特定资源。\n- **查询**（可选）：通过此部分可添加额外参数，服务器在返回资源前可能会使用这些参数进行进一步处理。\n\
  \n还有其他可能的组成部分，但对基本使用无关紧要，因此我们将不进行讨论。\n\n### iOS 中的网络\n\n如前所述，几乎所有真正有价值的应用都会在某个时候发起网络请求。这使得执行网络请求成为每个\
  \ iOS 开发者必须掌握的技能。如今很多开发者依赖第三方库来处理网络调用。这些库中有些功能非常强大，但在许多情况下它们可能显得大材小用，而且使用它们只是增加了一个外部依赖，这始终是一种风险。相反，我们可以使用原生的\
  \ iOS URL 加载系统，其中主要组件是`URLSession`。`URLSession`是一组协同处理网络请求的类的一部分。\n\n让我们详细讨论一下 iOS\
  \ URL 加载系统中最重要的组件（图 9-2）。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig2_HTML.jpg](img/505360_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2 iOS URL 加载系统\n\n#### URLSession\n\n会话是 HTTP 的核心概念。你可以将会话看作是网络浏览器中打开的一个标签页或窗口，通过它可以发起多个网络请求。加载一个网页时，底层可能会通过多个请求获取许多资源才能渲染页面。这些请求因为共享多个元素而使用同一个会话进行。从名称来看，`URLSession`用于管理一个\
  \ HTTP 会话。使用同一个`URLSession`发起多个请求，允许我们在请求之间共享配置和缓存数据。\n\n#### URLSessionConfiguration\n\
  \n既然我们刚刚提到使用同一会话发出的请求共享相同的配置，那么我们来谈谈保存这些配置的对象。`URLSessionConfiguration`定义了使用`URLSession`发起请求时的行为和策略。我们可以用它来设置超时值、缓存策略、连接要求等。有三种类型的`URLSessionConfiguration`：\n\
  \n- **默认**：一种使用磁盘持久化存储来保存缓存、Cookie 或凭据的会话配置。\n- **临时**：一种不使用任何持久化存储来保存缓存、Cookie\
  \ 或凭据的会话配置。\n- **后台**：一种允许应用在后台执行上传或下载的会话配置，即使应用本身被挂起或终止也能进行。\n\n#### URLRequest\n\
  \n我们已经讨论过构成 HTTP 请求的组件：URL、HTTP 方法、标头和数据。`URLRequest`是一个封装了所有这些描述单个请求的组件的结构体。\n\n\
  #### URLSessionTask\n\n这是实际执行请求的对象。通常我们不直接使用`URLSessionTask`，而是使用它的子类之一。有四种原生类型的任务：\n\
  \n- **数据任务**：此类任务能够发送和接收数据。这是最常见的任务类型，例如在发送或请求 JSON 时使用。\n- **上传任务**：此类任务与数据任务类似，但还支持在后台上传数据。\n\
  - **下载任务**：此类任务能够从服务器下载数据，并直接将其写入磁盘上的文件中。你还可以跟踪下载进度，并可以暂停和恢复下载。\n- **流任务**：此类任务通过与服务器建立连接来提供数据流。\n\
  \n我们不直接创建这些任务，而是使用`URLSession`内部的某个函数来创建新任务。创建任务后，我们通过调用`resume()`函数来启动它。\n\n###\
  \ Books 应用中的网络\n\n我们应用的主要前提是获取畅销书列表并展示给用户。我们功能的很大一部分依赖于网络。而且未来我们可能需要添加依赖网络的新功能。然而，当我们审视网络层时，会发现它与我们向服务器请求的单个资源高度耦合。我们还会发现网络层没有通过测试进行充分覆盖。\n\
  \n幸运的是，这是可以修复的，这将是本章剩余部分的目标。我们的目标是创建一个足够通用的网络层（图 9-3），使其易于针对不同请求进行重用。与往常一样，我们将采用测试驱动的方法来实现这一重构。你可以在本章的资源中找到这个项目。\n\
  \n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig3_HTML.jpg](img/505360_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3 网络模块\n\n#### 流程概述\n\n我们的网络层已经与代码的其余部分分离。我们在这里要做的只是对其进行重构。尽管我们尝试做的事情并不算是模块化，但我们将应用与第\
  \ 6 章（图 9-4）中概述相同的原则和几乎相同的流程。让我们来看看这个流程，看看哪些适用于我们的情况。\n\n##### 模块化流程\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig4_HTML.jpg](img/505360_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4 模块化流程\n\n首先，我们实际上不需要选择起始点，因为只有一个点，即`NetworkLayer`类。这使得步骤 1 和步骤 4 变得多余。\n\
  \n##### 识别类的职责\n\n这里讨论的类是`NetworkLayer`类。如果查看这个类，会发现它只有一个职责，即执行请求以从服务器获取书籍。然而，正如我们之前提到的，我们需要稍微调整这个职责，使其更加通用。我们希望让这个类能够发起任何请求，而不仅仅是从服务器获取我们的书籍。我们将在接下来的步骤中尝试实现这一点。\n\
  \n##### 设计概览\n\n现在，在开始重构之前，让我们更仔细地看看`NetworkLayer`在内部做了什么。我们可以看到它做了很多事情。首先，它存储了许多与环境相关的静态信息，比如主机、API\
  \ 密钥等。其次，它包含了创建请求本身的信息，这很混乱，而且我们已经知道要让它更通用。第三，它创建了一个`URLSessionTask`并执行请求。一个好的想法是将所有这些内聚的任务分离出来。\n\
  \n###### 需要重构的 NetworkLayer 任务\n\n1. 存储静态信息\n2. 创建 URL 请求\n3. 创建`URLSessionTask`并执行请求\n\
  \n\n\n### NetworkLayer 新设计\n\n为了避免受到当前实现的影响，我们应当在不查看现有代码的情况下，思考新对象之间将如何交互。我们的设计方案可以类似于图\
  \ 9-5。`NetworkLayer` 将使用 `APIEnvironment` 来获取所有静态数据。`RequestProtocol` 是一个封装了 `URLRequest`\
  \ 创建过程的协议。因此，每当我们想要发起网络调用时，都需要实现 `RequestProtocol`。这样一来，`NetworkLayer` 就能够创建 `URLSessionTask`\
  \ 并执行请求。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig5_HTML.jpg](img/505360_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5  \n网络层设计\n\n### 开始行动\n\n既然我们已经明确了 `NetworkLayer` 类的职责，并且也确定了这些职责应如何修改，那么是时候开始重构了。\n\
  \n根据模块化流程，我们知道重构时需要遵循以下步骤：\n\n1.  添加验证测试。\n2.  重构相关代码。\n3.  重新运行验证测试。\n\n### 验证测试\n\
  \n那么就从验证测试开始。我们需要验证 `MainViewModel` 在重构后的功能是否完全一致。`MainViewModel` 通过使用 `NetworkLayer`\
  \ 来获取书籍列表，`NetworkLayer` 会发起网络请求，并通过回调将书籍列表返回给 `MainViewModel`。我们需要验证测试确保这个流程在重构后依然能正常工作。查看当前的测试套件，我们发现\
  \ `MainViewIntegrationTests` 中的 `testFetchBestSellerBooks` 方法可以作为我们的验证测试。此外，再向上看一层，会发现我们也有覆盖此功能的\
  \ UI 测试。现在，如果 `MainViewModel` 和 `NetworkLayer` 之间的集成被破坏，我们的测试将会失败。这样我们就可以放心地重构 `NetworkLayer`\
  \ 了。\n\n### 发起网络请求\n\n让我们先为此编写一个测试。创建一个新的测试用例类，命名为 `NetworkLayerTests`，并向其中添加以下内容：\n\
  \n```\nfunc testExecutingSuccessfulRequest() {\n    // 准备\n    let network = NetworkLayer()\n\
  \    let request = TestRequest()\n    let env = APIEnvironment.production\n    //\
  \ 执行\n    let expectation = XCTestExpectation(description: \"请求已完成\")\n    network.executeRequest(request,\
  \ callBack: {\n        expectation.fulfill()\n    })\n    self.wait(for: [expectation],\
  \ timeout: 0.1)\n    // 验证\n    // 缺少断言\n}\n```\n\n为了修复构建错误，我们先添加一些代码。首先，在 `NetworkLayer`\
  \ 中添加新的 API，但暂时保持实现为空：\n\n```\npublic func executeRequest(_ request: T, callBack:\
  \ @escaping NetworkCompletion) {\n    // 暂时保持为空\n}\n```\n\n并在文件顶部、类作用域之外添加这个类型别名：\n\
  \n```\ntypealias NetworkCompletion = () -> Void\n```\n\n### RequestProtocol\n\n\
  现在，为了使用新的 API，我们总是需要传递一个符合我们请求协议的实例。这个实例将携带发起请求所需的所有信息。是时候定义这个协议了。创建一个新文件，并在其中添加以下内容：\n\
  \n```\nenum HTTPMethod: String {\n    case GET\n    case POST\n    case PATCH\n\
  \    case PUT\n    case DELETE\n}\n\nprotocol RequestProtocol {\n    var method:\
  \ HTTPMethod { get }\n    var body: Data? { get }\n    var path: String { get }\n\
  \    var queryItems: [URLQueryItem]? { get }\n}\n```\n\n目前我们的测试仍然无法构建。这是因为我们需要在测试目标内创建\
  \ `TestRequest` 结构体，并使其遵循 `RequestProtocol`：\n\n```\nimport Foundation\n@testable\
  \ import Books\n\nstruct TestRequest: RequestProtocol {\n    var method: HTTPMethod\
  \ {\n        return .GET\n    }\n    var body: Data? {\n        return \"请求数据\"\
  .data(using: .utf8)\n    }\n    var path: String {\n        return \"/api/mock\"\
  \n    }\n    var queryItems: [URLQueryItem]? {\n        return [URLQueryItem(name:\
  \ \"offset\", value: \"20\")]\n    }\n}\n```\n\n我们可以通过扩展为 `RequestProtocol` 添加一个非常有用的函数，即创建一个描述该请求的\
  \ URL。这能保持代码整洁。创建 URL 仍然需要定义主机（host）和方案（scheme）。这些在不同请求之间不会改变；但是，它们在生产环境和测试环境之间会有所不同。我们将这些信息提取出来，保存到一个新的组件中。\n\
  \n让我们先为 URL 请求的创建编写一个测试，看看效果如何。添加一个新的测试用例类，命名为 `RequestProtocolTests`，并向其中添加这个测试：\n\
  \n```\nfunc testCreateURLRequest() {\n    // 准备\n    let environment = APIEnvironment(scheme:\
  \ \"http\", host: \"test.com\", port: 433, API_KEY: \"KEY\")\n    let request =\
  \ TestRequest()\n    // 执行\n    let urlRequest = request.createURLRequest(with:\
  \ environment)\n    // 验证\n    XCTAssertEqual(urlRequest?.url?.absoluteString, \"\
  http://test.com:433/api/mock?offset=20\")\n    XCTAssertEqual(urlRequest?.httpMethod,\
  \ \"GET\")\n    XCTAssertEqual(urlRequest?.httpBody, \"请求数据\".data(using: .utf8))\n\
  }\n```\n\n为了让这个测试能够构建，我们需要创建 `APIEnvironment`。由于这个组件非常简单，我们将跳过详细的 TDD 步骤。但是，经过多个\
  \ TDD 周期后，我们最终应该得到这个结构体：\n\n```\nstruct APIEnvironment {\n    let scheme: String\n\
  \    let host: String\n    let port: Int?\n    let API_KEY: String\n\n    static\
  \ let production: APIEnvironment = .init(scheme: \"https\", host: \"api.nytimes.com\"\
  , port: nil, API_KEY: \"YOUR_API_KEY\")\n    static let testing: APIEnvironment\
  \ = .init(scheme: \"http\", host: \"localhost\", port: 8080, API_KEY: \"KEY\")\n\
  }\n```\n\n这仅仅封装了环境的方案和主机，并且我们也包含了 API 密钥。我们还添加了两个预设实例作为静态变量。\n\n为了让创建 URL 请求的测试通过，我们需要添加这个扩展：\n\
  \n```\nextension RequestProtocol {\n    func createURLRequest(with environment:\
  \ APIEnvironment) -> URLRequest? {\n        guard let url = createURL(with: environment)\
  \ else {\n            return nil\n        }\n        var request = URLRequest(url:\
  \ url)\n        request.httpMethod = method.rawValue\n        request.httpBody =\
  \ body\n        return request\n    }\n\n    private func createURL(with environment:\
  \ APIEnvironment) -> URL? {\n        var components = URLComponents()\n        components.scheme\
  \ = environment.scheme\n        components.host = environment.host\n        components.port\
  \ = environment.port\n        components.path = path\n        components.queryItems\
  \ = queryItems\n        return components.url\n    }\n}\n```\n\n这段代码可以放在任何地方，但放在协议所在的同一个文件中比较合理。\n\
  \n### 执行请求\n\n在经历了为 `RequestProtocol` 添加创建 URL 函数的小插曲之后，让我们回到正轨。如果运行 `testExecutingSuccessfulRequest`，会发现它因为期望条件从未被满足而失败。让我们通过在\
  \ `executeRequest` 内部直接调用完成处理程序来解决这个问题：\n\n```\npublic func executeRequest(_ request:\
  \ T, callBack: @escaping NetworkCompletion) {\n    callBack()\n}\n```\n\n现在我们的测试将通过\
  \ ✅。\n\n\n\n"
- "# 模拟 URLSession\n\n我们需要更新测试，因为现在即使没有发起任何网络请求，测试也能通过。为了能够测试 `NetworkLayer` 的内部行为，我们需要插入一个\
  \ `URLSession` 的模拟对象，并用它来断言请求是否已被执行。让我们创建模拟对象：\n\n```\nclass URLSessionMock: URLSession\
  \ {\ntypealias CompletionHandler = (Data?, URLResponse?, Error?) -> Void\npublic\
  \ var stubbedData: Data?\npublic var request: URLRequest?\noverride func dataTask(with\
  \ request: URLRequest, completionHandler: @escaping CompletionHandler) -> URLSessionDataTask\
  \ {\nlet data = self.stubbedData\nself.request = request\nreturn URLSessionDataTaskMock\
  \ {\ncompletionHandler(data, nil, nil)\n}\n}\n}\nclass URLSessionDataTaskMock: URLSessionDataTask\
  \ {\nprivate let closure: () -> Void\ninit(closure: @escaping () -> Void) {\nself.closure\
  \ = closure\n}\noverride func resume() {\nclosure()\n}\n}\n```\n\n这里我们创建了一个测试替身，以便模拟\
  \ `URLSession`。我们通过继承 `URLSession` 并重写创建数据任务的方法来创建这个模拟对象。我们重写该方法，使其执行两件事：首先，保存传入的输入参数；其次，返回一个\
  \ `URLSessionDataTaskMock` 的实例，该实例是 `URLSessionDataTask` 的测试替身。这个模拟对象不会发起网络请求，而是执行一个传入的代码块。我们用这个代码块来判断任务是否已被执行。\n\
  \n现在我们已经创建了测试替身，是时候将其注入到测试中的 `NetworkLayer` 实例里了：\n\n```\nfunc testExecutingSuccessfulRequest()\
  \ {\n// 给定\nlet session = URLSessionMock()\nlet network = NetworkLayer(session:\
  \ session)\nlet request = TestRequest()\nlet env = APIEnvironment.production\n//\
  \ 当\nlet expectation = XCTestExpectation(description: \"Request is done\")\nnetwork.executeRequest(request,\
  \ callBack: {\nexpectation.fulfill()\n})\nself.wait(for: [expectation], timeout:\
  \ 0.1)\n// 那么\n// 缺少断言\n}\n```\n\n现在我们需要更新我们的类，使其能够接受注入的 `URLSession`。我们将在类中添加这个变量：\n\
  \n```\nlet session: URLSession\n```\n\n并添加一个新的初始化方法：\n\n```\ninit(session:URLSession\
  \ = .shared) {\nself.session = session\n}\n```\n\n这里，我们在初始化方法中传入一个会话（session）并将其保存在本地变量中，以便用它来发起请求。如果没有传入自定义会话，则默认使用共享会话。\n\
  \n现在我们已经成功注入了模拟对象，可以更新测试，使其真正断言数据任务的创建和执行：\n\n```\nfunc testExecutingSuccessfulRequest()\
  \ {\n// 给定\nlet expectedData = \"Sample Data\".data(using: .utf8)\nlet session =\
  \ URLSessionMock()\nsession.stubbedData = expectedData // #1\nlet network = NetworkLayer(session:\
  \ session)\nlet request = TestRequest()\nlet env = APIEnvironment.production\n//\
  \ 当\nlet expectation = XCTestExpectation(description: \"Request is done\")\nvar\
  \ actualData: Data?\nvar actualError: APIError?\nnetwork.executeRequest(request,\
  \ callBack: { data, error in // #2\nactualData = data // #3\nactualError = error\n\
  expectation.fulfill()\n})\nself.wait(for: [expectation], timeout: 0.1)\n// 那么\n\
  XCTAssertNotNil(session.request)\nXCTAssertEqual(session.request?.httpMethod, \"\
  GET\")\nXCTAssertEqual(session.request?.httpBody, \"Request Data\".data(using: .utf8))\n\
  XCTAssertEqual(session.request?.url, request.createURLRequest(with: env)?.url)\n\
  XCTAssertEqual(expectedData, actualData)\nXCTAssertNil(actualError)\n}\n```\n\n\
  在这个测试中，我们做了以下几件事：\n\n1. 在这里，我们告诉会话模拟对象当请求发起时应返回什么数据。\n2. 我们修改了代码块，因为现在我们期望函数返回数据。\n\
  3. 在这里，我们保存了返回的数据和错误，以便后续对其进行断言。\n\n而在我们的**那么**部分，我们断言传递给会话的请求被正确创建，并具有正确的方法、主体和\
  \ URL。我们还断言返回的数据是预期的数据。同时，我们断言没有返回错误。\n\n## 使用 URLSession\n\n为了修复这个测试，我们需要利用 `URLSession`\
  \ 并真正发起请求。首先，我们需要添加以下代码，以便 `NetworkLayer` 能为我们的请求提供基础 URL：\n\n```\npublic static\
  \ var environment: APIEnvironment {\nreturn isTesting() ? .testing : .production\n\
  }\n```\n\n这里我们利用了之前创建的两个 `APIEnvironment` 实例。并根据当前环境返回其中一个。\n\n我们需要更新 `NetworkCompletion`\
  \ 类型别名，并添加错误枚举：\n\n```\ntypealias NetworkCompletion = (Data?, APIError?) -> Void\n\
  enum APIError: Error {\n// 暂时留空\n}\n```\n\n然后，我们更新函数以实际发起请求：\n\n```\npublic func\
  \ executeRequest(_ request: T, callBack: @escaping NetworkCompletion) {\nguard let\
  \ urlRequest = request.createURLRequest(with: Self.environment) else {\nreturn\n\
  }\nlet task = self.session.dataTask(with: urlRequest) { data, response, error in\n\
  guard let data = data else {\nreturn\n}\ncallBack(data, nil)\n}\ntask.resume()\n\
  }\n```\n\n经过这些更改，我们的测试将会通过 ✅。\n\n### 展示测试的价值\n\n为了展示测试的价值，如果出于某种原因我们没有调用 `task.resume()`（例如在后续重构代码时可能发生），我们的测试将会失败。我们可以通过注释掉\
  \ `task.resume()` 的调用来模拟这种情况，然后运行测试。你会看到测试失败，如图 9-6 所示。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig6_HTML.jpg](img/505360_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n测试失败\n\n\n\n#### 处理失败请求\n\n我们已经介绍了如何通过测试用例成功发起请求，接下来编写失败场景的测试用例。本章将涵盖请求可能失败的两种情况：第一种是服务器完全不返回数据，第二种是客户端错误（当我们未提供有效\
  \ URL 时发生）。现在我们来编写这两个测试。\n\n首先添加模拟服务器无数据返回并报错的测试：\n\n```\nfunc testExecutingFailedRequest()\
  \ {\n    // Given\n    let session = URLSessionMock()\n    session.stubbedData =\
  \ nil\n    let network = NetworkLayer(session: session)\n    let request = TestRequest()\n\
  \    let env = APIEnvironment.production\n    // When\n    let expectation = XCTestExpectation(description:\
  \ \"Request is done\")\n    var actualData: Data?\n    var actualError: APIError?\n\
  \    network.executeRequest(request, callBack: { data, error in\n        actualData\
  \ = data\n        actualError = error\n        expectation.fulfill()\n    })\n \
  \   self.wait(for: [expectation], timeout: 0.1)\n    // Then\n    XCTAssertNotNil(session.request)\n\
  \    XCTAssertEqual(session.request?.httpMethod, \"GET\")\n    XCTAssertEqual(session.request?.httpBody,\
  \ \"Request Data\".data(using: .utf8))\n    XCTAssertEqual(session.request?.url,\
  \ request.createURLRequest(with: env)?.url)\n    XCTAssertNil(actualData)\n    XCTAssertEqual(actualError,\
  \ .requestFailed)\n}\n```\n\n这里我们让模拟会话不返回任何数据，然后通过检查返回错误的类型来验证 `NetworkLayer` 是否正确处理此场景。这个测试现在会失败。让我们添加第二个测试，然后一起修复这两个问题。\n\
  \n接下来添加另一个测试，模拟尝试发起无效请求的场景。要创建这个测试，需要新建一个遵循 `RequestProtocol` 的结构体，用于描述无效请求：\n\n\
  ```\nstruct InvalidRequest: RequestProtocol {\n    var body: Data? {\n        return\
  \ nil\n    }\n    var path: String {\n        return \"INVALID PATH\"\n    }\n \
  \   var queryItems: [URLQueryItem]? {\n        return nil\n    }\n    var method:\
  \ HTTPMethod {\n        return .GET\n    }\n}\n```\n\n现在添加测试代码：\n\n```\nfunc testExecutingRequestWithInvalidURL()\
  \ {\n    // Given\n    let session = URLSessionMock()\n    session.stubbedData =\
  \ \"Sample Data\".data(using: .utf8)\n    let network = NetworkLayer(session: session)\n\
  \    let request = InvalidRequest()\n    // When\n    let expectation = XCTestExpectation(description:\
  \ \"Request is done\")\n    var actualData: Data?\n    var actualError: APIError?\n\
  \    network.executeRequest(request, callBack: { data, error in\n        actualData\
  \ = data\n        actualError = error\n        expectation.fulfill()\n    })\n \
  \   self.wait(for: [expectation], timeout: 0.1)\n    // Then\n    XCTAssertNil(session.request)\n\
  \    XCTAssertNil(actualData)\n    XCTAssertEqual(actualError, .invalidRequest)\n\
  }\n```\n\n为了让测试通过，我们需要修改 `executeRequest` 函数以处理这两种场景。\n\n首先在 `APIError` 中添加两个枚举值：\n\
  \n```\nenum APIError: Error {\n    case requestFailed\n    case invalidRequest\n\
  }\n```\n\n然后将 `executeRequest` 的实现修改为：\n\n```\npublic func executeRequest(_ request:\
  \ T, callBack: @escaping NetworkCompletion) {\n    guard let urlRequest = request.createURLRequest(with:\
  \ Self.environment) else {\n        callBack(nil, .invalidRequest)\n        return\n\
  \    }\n    let task = self.session.dataTask(with: urlRequest) { data, response,\
  \ error in\n        guard let data = data else {\n            callBack(nil, .requestFailed)\n\
  \            return\n        }\n        callBack(data, nil)\n    }\n    task.resume()\n\
  }\n```\n\n当检测到请求无效或请求失败时，我们用相应的 `APIError` 类型值调用完成处理器。\n\n#### 整合所有功能\n\n既然所有测试都已通过，是时候在应用程序中使用新的\
  \ API 了。让我们从高层次概览设计结构（图 9-7）。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig7_HTML.jpg](img/505360_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7：集成新的网络层\n\n我们的 `MainViewModel` 将使用 `NetworkLayer` 的公共 API `executeRequest`，并传入一个类型为\
  \ `BookRequest` 的请求。然后 `NetworkLayer` 使用传入的图书请求获取所需信息并执行请求。请求完成后，`NetworkLayer`\
  \ 通过回调将响应返回给视图模型。\n\n基于这个概览，我们需要创建一个新组件 `BookRequest`。为其创建名为 `BookRequestTests`\
  \ 的测试用例类，并添加以下测试：\n\n```\nfunc testBookRequestHTTPMethod() {\n    // Given\n   \
  \ let bookRequest = BooksRequest()\n    // When & Then\n    XCTAssertEqual(bookRequest.method,\
  \ .GET)\n}\n\nfunc testBookRequestURL() {\n    // Given\n    let bookRequest = BooksRequest()\n\
  \    let env = APIEnvironment(scheme: \"http\", host: \"test.com\", port: 433, API_KEY:\
  \ \"\")\n    // When\n    let urlRequest = bookRequest.createURLRequest(with: env)\n\
  \    // When & Then\n    XCTAssertEqual(urlRequest?.url?.absoluteString, \"http://test.com:433/svc/books/v3/lists/overview.json?offset=20&api-key=\\\
  (APIEnvironment.production.API_KEY)\")\n}\n\nfunc testBookRequestBody() {\n    //\
  \ Given\n    let bookRequest = BooksRequest()\n    // When & Then\n    XCTAssertNil(bookRequest.body)\n\
  }\n```\n\n为了让这些测试通过，我们需要实际添加 `BookRequest` 并使其遵循 `RequestProtocol`：\n\n```\nstruct\
  \ BooksRequest: RequestProtocol {\n    var path: String {\n        return \"/svc/books/v3/lists/overview.json\"\
  \n    }\n    var queryItems: [URLQueryItem]? {\n        return [URLQueryItem(name:\
  \ \"offset\", value: \"20\"), URLQueryItem(name: \"api-key\", value: NetworkLayer.environment.API_KEY)]\n\
  \    }\n    var method: HTTPMethod { return .GET }\n    var body: Data? { return\
  \ nil }\n}\n```\n\n现在从 `NetworkLayer` 中删除旧代码，并修复因使用新 API 和新创建的 `BookRequest` 而产生的编译错误。最终的\
  \ `NetworkLayer` 类应如下所示：\n\n```\ntypealias NetworkCompletion = (Data?, APIError?)\
  \ -> Void\n\nenum APIError: Error {\n    case requestFailed\n    case invalidRequest\n\
  }\n\nclass NetworkLayer {\n    // MARK:- 变量\n    let session: URLSession\n    static\
  \ var environment: APIEnvironment {\n        return isTesting() ? .testing : .production\n\
  \    }\n\n    // MARK:- 初始化器\n    init(session: URLSession = .shared) {\n      \
  \  self.session = session\n    }\n\n    // MARK:- 公共方法\n    public func executeRequest(_\
  \ request: T, callBack: @escaping NetworkCompletion) {\n        guard let url =\
  \ request.createURL(with: Self.environment) else {\n            callBack(nil, .invalidRequest)\n\
  \            return\n        }\n        var urlRequest = URLRequest(url: url)\n\
  \        urlRequest.httpMethod = request.method.rawValue\n        urlRequest.httpBody\
  \ = request.body\n        let task = self.session.dataTask(with: urlRequest) { data,\
  \ response, error in\n            guard let data = data else {\n               \
  \ callBack(nil, .requestFailed)\n                return\n            }\n       \
  \     callBack(data, nil)\n        }\n        task.resume()\n    }\n\n    // MARK:-\
  \ 辅助方法\n    static func isTesting() -> Bool {\n        return ProcessInfo.processInfo.arguments.contains(\"\
  TESTING\")\n    }\n}\n```\n\n接下来需要做两处修改。首先修改 `MainViewModel` 中的代码以使用新 API。\n\n将这一行：\n\
  \n```\nself.networkLayer?.executeNetworkRequest(callBack: { data in\n```\n\n替换为：\n\
  \n```\nself.networkLayer?.executeRequest(BooksRequest(), callBack: { (data, error)\
  \ in\n```\n\n同时需要更新 `NetworkLayerStub`，因为它也会导致编译错误：\n\n```\nclass NetworkLayerStub:\
  \ NetworkLayer {\n    var stubbedData: Data?\n\n    init(stubbedData: Data) {\n\
  \        self.stubbedData = stubbedData\n    }\n\n    override func executeRequest(_\
  \ request: T, callBack: @escaping NetworkCompletion) where T: RequestProtocol {\n\
  \        let jsonData = self.stubbedData!\n        callBack(jsonData, nil)\n   \
  \ }\n}\n```\n\n现在大功告成！如果我们运行包含验证测试的完整测试套件（图 9-8），所有测试都将通过。\n\n![../images/505360_1_En_9_Chapter/505360_1_En_9_Figa_HTML.gif](img/505360_1_En_9_Figa_HTML.gif)\n\
  \n![../images/505360_1_En_9_Chapter/505360_1_En_9_Fig8_HTML.jpg](img/505360_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8：测试套件全部通过\n\n\n\n## 练习\n\n我们有一个用于下载图片的 `UIImageView` 扩展。该扩展使用原生 API 从给定的\
  \ URL 加载图片。你的任务是修改此扩展的实现，改用我们新创建的 `NetworkLayer`。\n\n## 总结\n\n网络通信几乎是每个应用的必备需求。它让我们能够将应用提升到新的高度。能够从任何网络服务请求资源，为我们提供了无数种改进应用的可能性。\n\
  \niOS URL 加载系统由 iOS Foundation 框架原生提供的多个类和结构体组成。我们使用该系统通过互联网协议与服务器进行通信。该系统的主要类是\
  \ `URLSession`，它模拟了网页浏览器中一个打开标签页或窗口内的会话。同一会话内的请求共享相同的配置和缓存。我们使用 `URLSession` 实例来创建\
  \ `URLSessionTask` 实例。这些任务可以从服务器获取数据、下载/上传文件，或与服务器建立流连接。我们使用 `URLSessionConfiguration`\
  \ 来配置会话的行为。\n\n当我们的应用执行网络调用时，为网络代码编写测试至关重要。网络层的任何问题都极易导致应用出现严重错误。例如，如果进行了不必要的网络调用，还可能导致性能问题。为网络层编写测试有时可能具有挑战性，但对于维护应用质量来说是不可或缺的。\n\
  \n在本章中，我们遵循测试驱动的方法重写了网络层。我们将与环境相关的代码分离出来，并为其编写了测试。我们还利用协议，能够轻松创建具有不同端点和参数的新请求，这也通过测试得到了覆盖。最后，当实际执行网络调用时，我们通过使用测试替身，成功用测试覆盖了这一环节。我们注入了一个模拟的\
  \ `URLSession`，并利用它来断言发出的请求。由于应用中消费网络代码的部分已经通过了测试覆盖，我们得以自信地做出这些更改。完成后，我们能够验证这些更改是有效的，并且没有破坏任何功能。\n\
  \n"
- "# 10. 驯服 Core Data\n\nCore Data 是 iOS 开发者最著名的框架之一。自 iOS 3 发布以来，Core Data 就已经可用，并且自那时起已历经大量演变。一个常见的误解是，认为\
  \ Core Data 是一个数据库或数据库封装器。尽管数据持久化是它的特性之一，但 Core Data 远不止于此。Core Data 的本质是管理我们应用程序的对象图。对象图基本上是通过关系连接起来的对象集合（图\
  \ 10-1）。Core Data 管理这些图中的对象，如果需要，我们可以使用 Core Data 将对象图持久化到磁盘上。除此之外，该框架还具有数据验证和撤销/重做管理等多种其他功能。\n\
  \n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig1_HTML.jpg](img/505360_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1 对象图\n\n尽管 Core Data 如此著名，许多开发者在使用时仍会遇到困难。这主要由两个原因造成。首先，许多开发者在不完全理解其内部乃至外部运作机制的情况下，就一头扎进\
  \ Core Data 的使用中。Core Data 包含许多构建块，如果不能完全理解每个块负责什么，就很容易导致误用。其次，同样重要的是缺乏测试。Core Data\
  \ 是任何应用中最难为其编写测试的部分之一。因此，许多开发者选择不对其 Core Data 层进行测试覆盖。我们在之前的章节中反复强调了测试的重要性，而在 Core\
  \ Data 方面，这种重要性更为突出。\n\n## Core Data 栈\n\n现在我们已经了解了 Core Data 是什么以及它能做什么，是时候探索其内部运作机制了。Core\
  \ Data 有许多相互交互的构建块（图 10-2）。理解每个构建块的功能对于完全掌握这个框架并能够正确使用它至关重要。\n\n主要构建块包括：\n\n1. \
  \ 托管对象模型\n2.  持久化存储协调器\n3.  托管对象上下文\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig2_HTML.jpg](img/505360_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2 Core Data 栈\n\n### 托管对象模型\n\n托管对象模型是对要管理的对象图的描述。这个描述基本上就是模型的数据模式。它包含了实体及其属性，以及与其他实体的关系。数据模式由\
  \ `.xcdatamodeld` 文件表示，Xcode 附带了一个强大的编辑器，可以轻松编辑模式文件。我们可以直接在 Xcode 的编辑器中轻松创建实体、建立关系、对模式进行版本控制以及准备迁移。Core\
  \ Data 不直接与文件交互，而是与 `NSManagedObjectModel` 的实例交互。该类提供了描述我们模式的 `.xcdatamodeld` 文件的程序化表示形式，Core\
  \ Data 能够理解并使用它。虽然典型的 Core Data 实现会有一个 `NSManagedObjectModel` 类的实例，但也可以有多个。\n\n\
  ### 持久化存储协调器\n\n持久化存储协调器由 `NSPersistentStoreCoordinator` 类的实例表示，它在 Core Data 的功能中扮演着关键角色。顾名思义，持久化存储协调器协调托管对象上下文与持久化存储之间的关系。它负责加载、缓存和持久化数据。尽管它是\
  \ Core Data 栈中最重要的成员之一，但你很少会直接与之交互。\n\n### 持久化存储\n\n持久化存储代表了数据的实际存储位置。我们之前提到过 Core\
  \ Data 管理对象图，但是为了让框架发挥作用，持久化存储协调器需要至少连接到一个持久化存储。这允许协调器将数据加载到上下文中，并将新数据推送到存储中，从而使新更改成为对象图状态的永久部分。\n\
  \nCore Data 提供了四种内置的持久化存储类型：\n\n1.  SQLite：此存储由 SQLite 数据库支持，是最广泛使用的存储类型。\n2.  XML：此存储由\
  \ XML 文件支持。\n3.  二进制：此存储由二进制数据文件支持。\n4.  内存中：此存储利用应用的内存进行存储。它只是部分持久化的，因为当应用因任何原因终止时，数据会丢失。\n\
  \n你也可以通过子类化 `NSAtomicStore` 或 `NSIncrementalStore` 来创建自己的存储类型。\n\n\n\n### 托管对象上下文\n\
  \n托管对象上下文是一个负责管理托管对象集合的对象，由 `NSManagedObject` 类的实例表示。一个 Core Data 应用可以拥有一个或多个托管对象上下文。每个上下文都与一个持久化存储协调器相连。你可以将上下文视为一个草稿板，在其中可以对上下文内的对象进行任意修改。你可以从持久化存储协调器将对象提取到上下文中，也可以插入新对象、修改现有对象，或者撤销/重做更改。你对上下文内对象所做的任何修改都仅局限于该上下文，并且仅保存在内存中，这意味着这些更改不会传播到持久化存储协调器。这些修改会一直保留在上下文内，直到你通过告知上下文保存其更改来手动提交这些修改。你可以将其想象成用非永久性记号笔在书写板上写字，这样你随时都能擦除所有内容。当你准备提交所写的内容时，再用永久性记号笔描一遍来**保存**你的笔迹。\n\
  \n### 持久化容器\n\n在 iOS 10 之前，我们必须手动设置上述三个组件才能构建一个可用的 Core Data 栈。但从 iOS 10 开始，Apple\
  \ 引入了 `NSPersistentContainer`，这彻底改变了游戏规则，因为它极大地简化了 Core Data 的设置流程。它是一个封装了 Core\
  \ Data 栈的容器，负责托管对象模型、持久化存储协调器以及托管对象上下文的创建和管理。\n\n## Books 中的 Core Data\n\n如果我们来看一下\
  \ **Books**，就会发现它使用了 Core Data。不过，我们应用的这一部分目前尚未模块化。实际上，仔细审视就会发现，我们的 Core Data 代码散落得到处都是。我们将在本章中尝试解决这个问题。你可以在本章的资源中找到\
  \ Books 项目。\n\n我们接下来部分的目标如下：\n\n-   创建一个通用的 Core Data 接口。\n-   创建一个消耗该接口的组件，为我们的应用提供所需功能。\n\
  -   使用这个新组件替换旧的实现。\n\n我们将以测试驱动的方式逐步完成这些增量步骤。\n\n### 测试栈\n\n我们希望新的 Core Data 层能够使用\
  \ SQLite 持久化存储进行操作，因为这种存储类型在我们的场景中最合理。这种存储类型会持久化到磁盘，同时性能开销低且内存占用小。\n\n然而，当涉及到测试时，这种存储类型会引发一些问题。由于数据被持久化到磁盘上的数据库中，这会导致数据在测试之间保持持久化。测试间数据持久化可能导致某个测试因前一个测试造成的环境变化而失败。这个问题可以通过在每个测试后删除并重新创建数据库来解决，但这会拖慢测试速度，而我们的单元测试需要快速执行。\n\
  \n你可能会觉得我们陷入了僵局。嗯，再想想。我们之前提到过还有其他存储类型。其中一种是内存存储类型，这正是我们所需要的。这解决了我们的问题，因为使用这种存储，数据不会持久化到磁盘，而是留在内存中。因此，每次测试时，内存存储都会释放其数据。\n\
  \n所以这意味着我们需要为测试和生产环境使用不同的栈。我们需要在生产代码中使用 SQLite 存储，在测试中使用内存存储。后续我们会牢记这一点。\n\n###\
  \ CoreDataManager\n\n现在我们已经了解了 Core Data 的工作原理，让我们开始实现吧。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig3_HTML.jpg](img/505360_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 当前 UML 图\n\n我们从第一个目标开始：为 Core Data 创建一个通用接口（图 10-3）。这个接口应该提供 **CRUD**（创建、读取、更新、删除）操作，并且应该能操作通用模型。我们知道我们需要创建一个新对象作为接口，并且这个对象应该能从应用的任何地方访问到。而且只保留它的一个实例是合理的。所以，让我们将其转化为一个测试。首先，添加一个新的测试用例类，命名为\
  \ `CoreDataManagerTests`。然后向其中添加这个测试：\n\n```swift\nfunc testSharedInstance() {\n\
  \    // 当\n    let manager = CoreDataManager.shared\n    // 那么\n    XCTAssertNotNil(manager)\n\
  }\n```\n\n通常这里会有编译错误，因为我们还没有创建这个类。让我们继续，通过向应用添加这个新类来修复测试：\n\n```swift\nclass CoreDataManager\
  \ {\n    // MARK:- 单例\n    public static let shared = CoreDataManager()\n}\n```\n\
  \n现在测试应该能通过了。\n\n请确保在你的所有测试文件开头添加 `@testable import Books`。\n\n接下来进行下一个测试。我们知道 `CoreDataManager`\
  \ 应该提供一个用于 CRUD 操作的接口。所以现在我们应该开始添加这些测试。\n\n我们所有的测试都需要初始化一个 `CoreDataManager` 实例。这可以添加到公共的\
  \ setup 函数中：\n\n```swift\n// MARK:- 变量\nvar manager: CoreDataManager!\n// MARK:-\
  \ 设置\noverride func setUp() {\n    super.setUp()\n    self.manager = CoreDataManager()\n\
  }\noverride func tearDown() {\n    super.tearDown()\n    self.manager = nil\n}\n\
  ```\n\n现在，如果你还记得，我们决定为生产和测试使用不同的栈。这意味着我们需要为测试创建一个栈，并将其注入到我们的管理器中。为测试创建自定义栈的方式如下：\n\
  \n```swift\nlet stack = CoreDataStack(name: \"TestModel\", storageType: .inMemory)\n\
  ```\n\n\n\n### CoreDataStack\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig4_HTML.jpg](img/505360_1_En_10_Fig4_HTML.jpg)\n\
  *图 10-4*: 当前 UML 图\n\n`CoreDataStack` 是负责初始化 Core Data 堆栈的类。由于我们尚未创建该类，添加上述代码行会导致构建错误。因此，我们暂停处理\
  \ `CoreDataManagerTests`，转而专注于创建 `CoreDataStack`（图 10-4）。完成后，再回过头来处理它。\n\n那么 `CoreDataStack`\
  \ 具体负责什么呢？它应初始化一个持久化容器，默认情况下其底层托管模型应为应用的模型。接下来，我们将此逻辑转化为测试。首先，新增一个名为 `CoreDataStackTests`\
  \ 的测试用例类，并在其中添加如下测试：\n\n```\nfunc testDefaultStoreName() {\n    // Given\n    let\
  \ stack = CoreDataStack()\n    // When\n    let container = stack.storeContainer\n\
  \    // Then\n    XCTAssertEqual(container.name, \"Books\")\n}\n```\n\n为了修复此测试，我们需要创建新类\
  \ `CoreDataStack`，如下所示：\n\n```\nimport CoreData\nclass CoreDataStack {\n    // MARK:-\
  \ 懒加载变量\n    lazy var storeContainer: NSPersistentContainer = {\n        let container\
  \ = NSPersistentContainer(name: \"Books\")\n        container.loadPersistentStores\
  \ { _, error in\n            if let error = error as NSError? {\n              \
  \  print(\"未解决的错误 \\(error), \\(error.userInfo)\")\n            }\n        }\n \
  \       return container\n    }()\n}\n```\n\n现在，我们需要能够自定义堆栈，使其使用自定义模型而非默认模型。这在测试中会频繁依赖。因此，为此添加一个测试：\n\
  \n```\nfunc testCustomStoreName() {\n    // Given\n    let stack = CoreDataStack(name:\
  \ \"TestModel\")\n    // When\n    let container = stack.storeContainer\n    //\
  \ Then\n    XCTAssertEqual(container.name, \"TestModel\")\n}\n```\n\n为使该测试通过，我们需要做两件事。首先，更新类以处理自定义模型名称：\n\
  \n```\nclass CoreDataStack {\n    // MARK:- 变量\n    private let modelName: String\n\
  \    // MARK:- 懒加载变量\n    lazy var storeContainer: NSPersistentContainer = {\n \
  \       let container = NSPersistentContainer(name: self.modelName)\n        container.loadPersistentStores\
  \ { _, error in\n            if let error = error as NSError? {\n              \
  \  print(\"未解决的错误 \\(error), \\(error.userInfo)\")\n            }\n        }\n \
  \       return container\n    }()\n    // MARK:- 初始化器\n    public init(name: String\
  \ = \"Books\") {\n        self.modelName = name\n    }\n}\n```\n\n其次，需要添加新的数据模型。为此，我们添加一个新的数据模型文件（图\
  \ 10-5），并将其命名为“TestModel”。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig5_HTML.jpg](img/505360_1_En_10_Fig5_HTML.jpg)\n\
  *图 10-5*: 添加新的数据模型文件\n\n添加模型后，进入项目文件。打开测试目标，在 **Build Phases** 下确保数据模型文件**不在** **Compile\
  \ Sources** 中，并已包含在 **Copy Bundle Resources** 中（图 10-6）。这样可以避免后续创建实体时可能出现的构建错误。\n\
  \n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig6_HTML.jpg](img/505360_1_En_10_Fig6_HTML.jpg)\n\
  *图 10-6*: 正确设置测试数据模型\n\n遗憾的是，添加新模型后测试仍会失败。这是因为持久化容器默认在应用的主 bundle 中搜索数据模型文件，而我们的测试数据模型位于测试\
  \ bundle 中。为此，需要手动将数据模型的对象模型传递给 Core Data 堆栈。将测试更新如下：\n\n```\nfunc testCustomStoreName()\
  \ {\n    // Given\n    let testBundle = Bundle(for: type(of: self))\n    let modelUrl\
  \ = testBundle.url(forResource: \"TestModel\", withExtension: \"momd\")!\n    let\
  \ objectModel = NSManagedObjectModel(contentsOf: modelUrl)\n    let stack = CoreDataStack(name:\
  \ \"TestModel\", objectModel: objectModel)\n    // When\n    let container = stack.storeContainer\n\
  \    // Then\n    XCTAssertEqual(container.name, \"TestModel\")\n}\n```\n\n并将类更新如下：\n\
  \n```\nclass CoreDataStack {\n    // MARK:- 变量\n    private let modelName: String\n\
  \    private let objectModel: NSManagedObjectModel?\n    // MARK:- 懒加载变量\n    lazy\
  \ var storeContainer: NSPersistentContainer = {\n        var container: NSPersistentContainer\n\
  \        if let objectModel = self.objectModel {\n            container = NSPersistentContainer(name:\
  \ self.modelName, managedObjectModel: objectModel)\n        }\n        else {\n\
  \            container = NSPersistentContainer(name: self.modelName)\n        }\n\
  \        container.loadPersistentStores { _, error in\n            if let error\
  \ = error as NSError? {\n                print(\"未解决的错误 \\(error), \\(error.userInfo)\"\
  )\n            }\n        }\n        return container\n    }()\n    // MARK:- 初始化器\n\
  \    public init(name: String = \"Books\", objectModel: NSManagedObjectModel? =\
  \ nil) {\n        self.modelName = name\n        self.objectModel = objectModel\n\
  \    }\n}\n```\n\n这里我们增加了注入自定义对象模型的能力。初始化容器时，会检查是否传入了自定义模型：如果是，则使用它创建容器；否则，正常创建容器。\n\
  \n回顾一下，我们需要能够创建使用内存存储的 Core Data 堆栈。当前堆栈仅能使用默认的 SQLite 存储。为此，添加以下测试：\n\n```\nfunc\
  \ testPersistentStoreType() {\n    // Given\n    let stack = CoreDataStack(storageType:\
  \ .persistent)\n    // When\n    let container = stack.storeContainer\n    // Then\n\
  \    XCTAssertEqual(container.persistentStoreDescriptions[0].type, NSSQLiteStoreType)\n\
  }\n\nfunc testInMemoryStoreType() {\n    // Given\n    let stack = CoreDataStack(storageType:\
  \ .inMemory)\n    // When\n    let container = stack.storeContainer\n    // Then\n\
  \    XCTAssertEqual(container.persistentStoreDescriptions[0].type, NSInMemoryStoreType)\n\
  }\n```\n\n为修复测试，需要添加一个表示存储类型的枚举。可以将其放在单独文件或 `CoreDataStack` 文件中。枚举应如下所示：\n\n```\n\
  enum StorageType {\n    case persistent, inMemory\n}\n```\n\n接着，将类修改为：\n\n```\n\
  class CoreDataStack {\n    // MARK:- 变量\n    private let modelName: String\n   \
  \ private let objectModel: NSManagedObjectModel?\n    private let storageType: StorageType\n\
  \    // MARK:- 懒加载变量\n    lazy var storeContainer: NSPersistentContainer = {\n \
  \       var container: NSPersistentContainer\n        if let objectModel = self.objectModel\
  \ {\n            container = NSPersistentContainer(name: self.modelName, managedObjectModel:\
  \ objectModel)\n        }\n        else {\n            container = NSPersistentContainer(name:\
  \ self.modelName)\n        }\n        if self.storageType == .inMemory {\n     \
  \       let description = NSPersistentStoreDescription()\n            description.type\
  \ = NSInMemoryStoreType\n            container.persistentStoreDescriptions = [description]\n\
  \        }\n        container.loadPersistentStores { _, error in\n            if\
  \ let error = error as NSError? {\n                print(\"未解决的错误 \\(error), \\\
  (error.userInfo)\")\n            }\n        }\n        return container\n    }()\n\
  \    // MARK:- 初始化器\n    public init(name: String = \"Books\", objectModel: NSManagedObjectModel?\
  \ = nil, storageType: StorageType = .persistent) {\n        self.modelName = name\n\
  \        self.objectModel = objectModel\n        self.storageType = storageType\n\
  \    }\n}\n```\n\n这里我们新增了一个变量来存储存储类型，并在初始化方法中增加了参数以设置存储类型，默认值为 `.persistent`。最后，检查存储类型是否为内存类型：若是，则覆盖存储类型；否则保持默认的\
  \ SQLite 类型。完成这些更改后，测试应能通过。\n\n最后，堆栈需要提供一个上下文。该上下文应在主线程上使用。在应用中，我们对 Core Data 的所有使用都是轻量级的，并会反映到应用界面上，这意味着我们不需要后台上下文。\n\
  \n为此添加一个测试：\n\n```\nfunc testContext() {\n    // Given\n    let stack = CoreDataStack(storageType:\
  \ .inMemory)\n    // When\n    let context = stack.context\n    // Then\n    XCTAssertNotNil(context)\n\
  \    XCTAssertEqual(context.concurrencyType, .mainQueueConcurrencyType)\n}\n```\n\
  \n为修复该测试，需要在 `CoreDataStack` 中添加以下内容。\n\n\n```swift\npublic lazy var context: NSManagedObjectContext\
  \ = {\n    return storeContainer.viewContext\n}()\n```\n\n### 将堆栈注入 CoreDataManager\n\
  \n现在 CoreDataStack 已经就绪，让我们回到最初触发这一切的 `CoreDataManagerTests`。现在我们可以创建一个自定义堆栈并将其传递给管理器：\n\
  \n```swift\n// MARK:- 变量\nvar manager: CoreDataManager!\nvar stack: CoreDataStack!\n\
  // MARK:- 设置\noverride func setUp() {\n    super.setUp()\n    let testBundle = Bundle(for:\
  \ type(of: self))\n    let modelUrl = testBundle.url(forResource: \"TestModel\"\
  , withExtension: \"momd\")!\n    let objectModel = NSManagedObjectModel(contentsOf:\
  \ modelUrl)\n    self.stack = CoreDataStack(name: \"TestModel\", objectModel: objectModel,\
  \ storageType: .inMemory)\n    self.manager = CoreDataManager(coreDataStack: stack)\n\
  }\noverride func tearDown() {\n    super.tearDown()\n    self.manager = nil\n  \
  \  self.stack = nil\n}\n```\n\n这会导致构建错误。要修复此问题，我们需要更新 `CoreDataManager`，使其接受 `CoreDataStack`\
  \ 作为依赖项：\n\n```swift\n// MARK:- 变量\nprivate var stack: CoreDataStack\n// MARK:-\
  \ 单例\npublic static let shared = CoreDataManager(coreDataStack: CoreDataStack())\n\
  // MARK:- 初始化器\npublic init(coreDataStack: CoreDataStack) {\n    self.stack = coreDataStack\n\
  }\n```\n\n### TestEntity\n\n在开始编写 CRUD 操作的测试之前，先创建一个实体以便进行操作是合理的。我们将前往 `TestModel.xcdatamodel`，通过\
  \ Xcode 的编辑器添加一个新实体，并将其命名为 `TestEntity`。然后我们将添加图 10-7 中的两个属性。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig7_HTML.jpg](img/505360_1_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7** 向数据模型文件添加 TestEntity\n\n现在，为了完成新实体的设置，我们需要为其添加代码表示。我们将遵循这里的约定，添加两个文件（均在测试目标中）。首先，文件\
  \ `TestEntity+CoreDataClass` 应包含以下内容：\n\n```swift\nimport CoreData\n@objc(TestEntity)\n\
  public final class TestEntity: NSManagedObject {\n}\n```\n\n第二个文件 `TestEntity+CoreDataProperties`\
  \ 应包含以下内容：\n\n```swift\nimport CoreData\nextension TestEntity {\n    @nonobjc public\
  \ class func fetchRequest() -> NSFetchRequest {\n        return NSFetchRequest(entityName:\
  \ String(describing: TestEntity.self))\n    }\n    @NSManaged public var name: String?\n\
  \    @NSManaged public var number: Int32\n}\n```\n\n### 创建\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig8_HTML.jpg](img/505360_1_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8** 当前 UML\n\n现在让我们开始第一个 CRUD 操作——创建，并为其编写一个测试：\n\n```swift\nfunc testCreateEntity()\
  \ {\n    // 当\n    let testModel = manager.create(TestEntity.self)\n    // 那么\n\
  \    XCTAssertNotNil(testModel)\n    XCTAssertEqual(stack.context.insertedObjects.count,\
  \ 0)\n}\n```\n\n这里我们创建了一个新对象，并断言它不为 nil，并且它确实被保存到了持久化存储中，而不仅仅是上下文。\n\n这将导致一个构建错误，因为没有\
  \ `create` 函数。那么让我们添加它：\n\n```swift\npublic func create(_ entity: T.Type) -> T?\
  \ {\n    return nil\n}\n```\n\n#### 引入 `Storable`\n\n`Storable` 是一个协议，它描述了一个可以使用我们的\
  \ Core Data 管理器进行存储的类（图 10-8）。任何 `Storable` 都需要是 `NSManagedObject`。让我们添加这个协议：\n\n\
  ```swift\nimport CoreData\npublic protocol Storable: NSManagedObject {\n}\n```\n\
  \n现在测试仍然无法构建，因为 `TestEntity` 不符合 `Storable` 协议。\n\n我们通过简单地遵循协议来解决这个问题，如下所示：\n\n\
  ```swift\nextension TestEntity: Storable {\n}\n```\n\n现在我们的测试可以构建了，但如果尝试运行，它会失败。\n\
  \n#### 创建实现\n\n让我们通过实际创建一个新实体来修复这个问题：\n\n```swift\npublic func create(_ entityType:\
  \ T.Type) -> T? {\n    guard let entityDescription = NSEntityDescription.entity(forEntityName:\
  \ entityType.entityName, in: stack.context) else {\n        return nil\n    }\n\
  \    let entity = NSManagedObject(entity: entityDescription, insertInto: stack.context)\n\
  \    return entity as? T\n}\n```\n\n我们需要将其添加到 `Storable` 中：\n\n```swift\npublic\
  \ protocol Storable: NSManagedObject {\n    static var entityName: String {get}\n\
  }\n```\n\n并将 `TestEntity` 的实现更新为：\n\n```swift\nextension TestEntity: Storable {\n\
  \    public static var entityName: String {\n        String(describing: Self.self)\n\
  \    }\n}\n```\n\n如果我们运行测试，会发现第二个断言仍然失败。这意味着我们需要保存更改。\n\n#### 保存更改\n\n在 `create`\
  \ 函数内部，我们将在返回之前添加一行来保存上下文。现在我们的函数应该如下所示：\n\n```swift\npublic func create(_ entityType:\
  \ T.Type) -> T? {\n    guard let entityDescription = NSEntityDescription.entity(forEntityName:\
  \ entityType.entityName, in: stack.context) else {\n        return nil\n    }\n\
  \    let entity = NSManagedObject(entity: entityDescription, insertInto: stack.context)\n\
  \    stack.saveContextIfNeeded()\n    return entity as? T\n}\n```\n\n这将导致一个构建错误。要修复它，我们需要在\
  \ `CoreDataStack`（图 10-9）中添加一个新函数：\n\n```swift\npublic func saveContextIfNeeded()\
  \ {\n}\n```\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig9_HTML.jpg](img/505360_1_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9** 当前 UML\n\n现在让我们在 `CoreDataStackTests` 中添加一个保存上下文的测试：\n\n```swift\n\
  func testSavingContextIfNeeded() {\n    // 给定\n    let testBundle = Bundle(for:\
  \ type(of: self))\n    let modelUrl = testBundle.url(forResource: \"TestModel\"\
  , withExtension: \"momd\")!\n    let objectModel = NSManagedObjectModel(contentsOf:\
  \ modelUrl)\n    let stack = CoreDataStack(name: \"TestModel\", objectModel: objectModel,\
  \ storageType: .inMemory)\n    let context = stack.context\n    let _ = TestEntity(context:\
  \ context)\n    // 预期\n    expectation(forNotification: .NSManagedObjectContextDidSave,\
  \ object: context, handler: nil)\n    // 当\n    stack.saveContextIfNeeded()\n  \
  \  // 那么\n    waitForExpectations(timeout: 1.0, handler: nil)\n}\n```\n\n为了修复测试，我们将\
  \ `saveContextIfNeeded` 更新为：\n\n```swift\npublic func saveContextIfNeeded() {\n\
  \    if context.hasChanges {\n        do {\n            try context.save()\n   \
  \     }\n        catch let error as NSError {\n            print(\"未解决的错误 \\(error),\
  \ \\(error.userInfo)\")\n        }\n    }\n}\n```\n\n现在我们的所有测试——`testSavingContextIfNeeded`\
  \ 和 `testCreateEntity`——都通过了。这意味着我们完成了第一个 CRUD 操作。\n\n### 获取\n\n现在让我们进入第二个 CRUD\
  \ 操作——获取数据（图 10-10）。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig10_HTML.jpg](img/505360_1_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** 当前 UML\n\n我们将从添加一个测试开始，该测试创建新实体，然后获取所有实体并检查返回的值是否正确。这个测试如下所示：\n\n\
  ```swift\nfunc testFetchEntities() {\n    // 给定\n    let testModel = manager.create(TestEntity.self)\n\
  \    // 当\n    let models = manager.fetchAll(TestEntity.self)\n    // 那么\n    XCTAssertNotNil(models)\n\
  \    XCTAssertEqual(models?.count, 1)\n    XCTAssertEqual(models?[0].objectID, testModel?.objectID)\n\
  }\n```\n\n为了修复这个测试，我们将去实现 `fetch` 函数。\n\n添加此函数：\n\n```swift\npublic func fetchAll(_\
  \ entityType: T.Type) -> [T]? {\n    let request: NSFetchRequest = T.fetchRequest()\n\
  \    do {\n        let results = try stack.context.fetch(request)\n        return\
  \ results\n    } catch let error as NSError {\n        print(\"未解决的错误 \\(error),\
  \ \\(error.userInfo)\")\n    }\n    return nil\n}\n```\n\n我们需要更新 `Storable`，因为我们要求每个\
  \ `Storable` 提供自己的获取请求，并且我们需要这个获取请求能够获取到我们的对象。现在它应该如下所示：\n\n```swift\npublic protocol\
  \ Storable: NSManagedObject {\n    static var entityName: String {get}\n    static\
  \ func fetchRequest() -> NSFetchRequest\n}\n```\n\n\n### 更新操作\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig11_HTML.jpg](img/505360_1_En_10_Fig11_HTML.jpg)\n\
  \n**图 10-11** 当前 UML 图\n\n现在让我们进入一个新的 CRUD 操作（图 10-11）。我们为更新操作添加一个测试：\n\n```\nfunc\
  \ testUpdateEntity() {\n    // 给定条件\n    let testModel = manager.create(TestEntity.self)\n\
  \    testModel?.name = \"Test\"\n    testModel?.number = 123\n    // 执行操作\n    manager.update(testModel)\n\
  \    stack.context.rollback()\n    // 验证结果\n    let updatedModel = manager.fetchAll(TestEntity.self)?[0]\n\
  \    XCTAssertNotNil(updatedModel)\n    XCTAssertEqual(updatedModel?.name, \"Test\"\
  )\n    XCTAssertEqual(updatedModel?.number, 123)\n}\n```\n\n你可能已经注意到，我们在测试中调用了上下文的\
  \ `rollback()` 方法。这是做什么的呢？首先，让我们看看我们在测试中试图做什么。我们使用 `create` 方法插入一个新对象，然后对其进行一些修改。接着调用\
  \ `update` 函数，期望它能持久化这些更改。鉴于 Core Data 的特性，我们知道所做的修改只会局部应用于当前所在的上下文。由于我们创建、更新和获取操作使用的是同一个上下文，因此即使我们没有将更改持久化到存储区，获取操作仍然会返回更新后的数据。为了演示这一点，让我们添加一个实际上并不保存更改的\
  \ `update` 实现：\n\n```\n@discardableResult\npublic func update(_ entity: T?) -> T?\
  \ {\n    return entity\n}\n```\n\n现在测试会失败，因为我们没有保存数据。为了演示 `rollback()` 的重要性，请注释掉调用\
  \ `rollback()` 的那行代码，然后重新运行测试。我们会发现测试通过了。因此，在这个测试中，使用 `rollback` 对于清除所有未保存的数据并仅断言已保存的数据至关重要。\n\
  \n要修复测试，我们需要修改实现，使其真正保存更改：\n\n```\n@discardableResult\npublic func update(_ entity:\
  \ T?) -> T? {\n    stack.saveContextIfNeeded()\n    return entity\n}\n```\n\n###\
  \ 高级获取操作\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig12_HTML.jpg](img/505360_1_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12** 当前 UML 图\n\n由于测试现在可以通过，让我们添加一个新功能。我们需要能够对获取的结果进行排序（图 10-12）。在获取时进行排序比获取后在内存中排序要高效得多。除了排序之外，我们还需要能够过滤获取的结果。此外，我们还需要为获取结果设置数量限制。让我们为这两个功能添加测试：\n\
  \n```\nfunc testFetchSorted() {\n    // 给定条件\n    for i in 1...10 {\n        let\
  \ testModelOne = manager.create(TestEntity.self)\n        testModelOne?.number =\
  \ Int32(i)\n        manager.update(testModelOne)\n    }\n    // 执行操作\n    let sort\
  \ = NSSortDescriptor(key: \"number\", ascending: false)\n    let models = manager.fetchAll(TestEntity.self,\
  \ sort: sort)\n    // 验证结果\n    XCTAssertNotNil(models)\n    XCTAssertEqual(models?.count,\
  \ 10)\n    XCTAssertEqual(models?[0].number, 10)\n    XCTAssertEqual(models?[9].number,\
  \ 1)\n}\n\nfunc testFetchWithLimit() {\n    // 给定条件\n    for i in 1...10 {\n   \
  \     let testModelOne = manager.create(TestEntity.self)\n        testModelOne?.number\
  \ = Int32(i)\n        manager.update(testModelOne)\n    }\n    // 执行操作\n    let\
  \ models = manager.fetchAll(TestEntity.self, limit: 5)\n    // 验证结果\n    XCTAssertNotNil(models)\n\
  \    XCTAssertEqual(models?.count, 5)\n}\n\nfunc testFetchWithPredicate() {\n  \
  \  // 给定条件\n    for i in 1...10 {\n        let testModelOne = manager.create(TestEntity.self)\n\
  \        testModelOne?.number = Int32(i)\n        manager.update(testModelOne)\n\
  \    }\n    // 执行操作\n    let predicate = NSPredicate(format: \"number > 5\")\n \
  \   let models = manager.fetchAll(TestEntity.self, predicate: predicate)\n    //\
  \ 验证结果\n    XCTAssertNotNil(models)\n    XCTAssertEqual(models?.count, 5)\n}\n```\n\
  \n要修复这些测试，请将 `fetchAll` 方法更新为：\n\n```\npublic func fetchAll(_ entityType: T.Type,\
  \ sort: NSSortDescriptor? = nil, limit: Int = 0, predicate: NSPredicate? = nil)\
  \ -> [T]? {\n    let request: NSFetchRequest = T.fetchRequest()\n    if let sort\
  \ = sort {\n        request.sortDescriptors = [sort]\n    }\n    if let predicate\
  \ = predicate {\n        request.predicate = predicate\n    }\n    request.fetchLimit\
  \ = limit\n    do {\n        let results = try stack.context.fetch(request)\n  \
  \      return results\n    } catch let error as NSError {\n        print(\"Unresolved\
  \ error \\(error), \\(error.userInfo)\")\n    }\n    return nil\n}\n```\n\n### 下一步\n\
  \n让我们回顾一下之前设定的目标。它被分为三个子目标：\n\n*   创建一个通用的 Core Data 接口 `CoreDataManager` ✅。\n*\
  \   创建一个使用该接口、为我们的应用提供所需功能的组件。\n*   用这个新组件替换旧的实现。\n\n由于我们已经完成了通用 Core Data 接口（`CoreDataManager`）的创建，现在让我们进入第二个子目标。我们将创建一个名为\
  \ `FavoritesManager` 的新组件，负责添加、删除和获取我们的收藏项（图 10-13）。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig13_HTML.jpg](img/505360_1_En_10_Fig13_HTML.jpg)\n\
  \n**图 10-13** 当前 UML 图\n\n像往常一样，我们从测试开始。让我们添加一个名为 `FavoritesManagerTests` 的新测试用例类，用于存放我们的测试。接下来，设置我们的管理器。我们需要使用一个自定义的、使用应用数据模型的内存型\
  \ Core Data 管理器来设置它。文件内容应如下所示：\n\n```\nimport XCTest\n@testable import Books\nimport\
  \ CoreData\n\nclass FavoritesManagerTests: XCTestCase {\n    // MARK:- 变量\n    var\
  \ favoritesManager: FavoritesManager!\n    var coredataManager: CoreDataManager!\n\
  \    var stack: CoreDataStack!\n\n    // MARK:- 设置\n    override func setUp() {\n\
  \        super.setUp()\n        self.stack = CoreDataStack(storageType: .inMemory)\n\
  \        self.coredataManager = CoreDataManager(coreDataStack: stack)\n        self.favoritesManager\
  \ = FavoritesManager(coredataManager: coredataManager)\n    }\n\n    override func\
  \ tearDown() {\n        super.tearDown()\n        self.favoritesManager = nil\n\
  \        self.coredataManager = nil\n        self.stack = nil\n    }\n}\n```\n\n\
  这会导致构建错误。为了修复这些错误，我们需要添加一个名为 `FavoritesManager` 的新类，该类内部依赖于 `CoreDataManager`。该类应如下所示：\n\
  \n```\nclass FavoritesManager {\n    // MARK:- 变量\n    private var coredataManager:\
  \ CoreDataManager\n\n    // MARK:- 单例\n    public static let shared = FavoritesManager()\n\
  \n    // MARK:- 初始化器\n    init(coredataManager: CoreDataManager = .shared) {\n \
  \       self.coredataManager = coredataManager\n    }\n}\n```\n\n现在，我们之前了解到，与 `CoreDataManager`\
  \ 交互需要我们的模型符合 `Storable` 协议。让我们先把这件事处理掉。我们将对两个托管对象类 `Book` 和 `BuyLink` 执行与 `TestEntity`\
  \ 相同的操作。我们还需要确保这两个类都标记了 `final` 关键字，以避免构建错误。\n\n现在，让我们为 `FavoritesManager` 负责的操作编写测试。通常我们会按照常规的\
  \ TDD 方式来处理。然而，为了避免重复，我们不会逐步完成这部分。经过多个 TDD 周期后，我们将得到以下一组新的测试：\n\n\n\n```swift\n\
  func testAddingBook() {\n    // 给定\n    let buyLink = BuyLinkModel(name: .amazon,\
  \ url: \"URL\")\n    var book = BookModel(title: \"BookTitle\", contributor: \"\
  Contributor\", author: \"Author\", createdDate: \"2021-05-26 22:10:24\")\n    book.amazonProductURL\
  \ = \"Amazon\"\n    book.bookImage = \"Image\"\n    book.bookDescription = \"Description\"\
  \n    book.publisher = \"Publisher\"\n    book.buyLinks = [buyLink]\n    // 当\n\
  \    favoritesManager.addFavorite(book)\n    // 然后\n    let books = coredataManager.fetchAll(Book.self)\n\
  \    XCTAssertNotNil(books)\n    XCTAssertEqual(books?.count, 1)\n    let retrievedBook\
  \ = books![0]\n    XCTAssertEqual(retrievedBook.title, book.title)\n    XCTAssertEqual(retrievedBook.contributor,\
  \ book.contributor)\n    XCTAssertEqual(retrievedBook.author, book.author)\n   \
  \ XCTAssertEqual(retrievedBook.created_date, book.createdDate)\n    XCTAssertEqual(retrievedBook.amazon_product_url,\
  \ book.amazonProductURL)\n    XCTAssertEqual(retrievedBook.book_image, book.bookImage)\n\
  \    XCTAssertEqual(retrievedBook.desc, book.bookDescription)\n    XCTAssertEqual(retrievedBook.publisher,\
  \ book.publisher)\n    XCTAssertEqual(retrievedBook.buyLinks?.count, 1)\n    let\
  \ link = retrievedBook.buyLinks?.allObjects[0] as? BuyLink\n    XCTAssertEqual(link?.name,\
  \ buyLink.name.rawValue)\n    XCTAssertEqual(link?.url, buyLink.url)\n}\n\nfunc\
  \ testFetchingFavoritesSorted() {\n    // 给定\n    let book1 = BookModel(title: \"\
  Book1\", contributor: \"Contributor\", author: \"Author\", createdDate: \"2021-05-01\
  \ 22:00:00\")\n    let book2 = BookModel(title: \"Book2\", contributor: \"Contributor\"\
  , author: \"Author\", createdDate: \"2021-05-02 22:00:00\")\n    let book3 = BookModel(title:\
  \ \"Book3\", contributor: \"Contributor\", author: \"Author\", createdDate: \"2021-05-03\
  \ 22:00:00\")\n    favoritesManager.addFavorite(book1)\n    favoritesManager.addFavorite(book3)\n\
  \    favoritesManager.addFavorite(book2)\n    // 当\n    let favorites = favoritesManager.fetchAllFavorites()\n\
  \    // 然后\n    XCTAssertEqual(favorites.count, 3)\n    XCTAssertEqual(favorites[0].title,\
  \ \"Book3\")\n    XCTAssertEqual(favorites[1].title, \"Book2\")\n    XCTAssertEqual(favorites[2].title,\
  \ \"Book1\")\n}\n```\n\n下面是使这些测试通过的代码：\n\n- `fetchAllFavorites` 使用 `CoreDataManager`\
  \ 的 `fetchAll` 函数获取所有类型为 `Book` 的对象，并按照日期排序返回。\n- `addFavorite` 接收一个 `BookModel`\
  \ 对象。它会在存储中插入一个新的 `Book` 对象，然后用传入模型的数据填充该书。\n\n```swift\n// MARK:- 公共函数\nfunc fetchAllFavorites()\
  \ -> [Book] {\n    let sort = NSSortDescriptor(key: \"created_date\", ascending:\
  \ false)\n    return coredataManager.fetchAll(Book.self, sort: sort) ?? []\n}\n\n\
  func addFavorite(_ model: BookModel) {\n    guard let book = coredataManager.create(Book.self)\
  \ else {\n        return\n    }\n    book.title = model.title\n    book.amazon_product_url\
  \ = model.amazonProductURL\n    book.author = model.author\n    book.book_image\
  \ = model.bookImage\n    book.contributor = model.contributor\n    book.created_date\
  \ = model.createdDate\n    book.desc = model.bookDescription\n    book.publisher\
  \ = model.publisher\n    let links:NSMutableSet? = []\n    guard let buyLinks =\
  \ model.buyLinks else {\n        return\n    }\n    for buyLink in buyLinks {\n\
  \        if let link = coredataManager.create(BuyLink.self) {\n            link.url\
  \ = buyLink.url\n            link.name = buyLink.name.rawValue\n            link.book\
  \ = book\n            links?.add(link)\n        }\n    }\n    book.buyLinks = links\n\
  \    coredataManager.update(book)\n}\n\n// MARK:- 私有辅助方法\nfunc getBook(from model:\
  \ BookModel) -> Book? {\n    let predicate = NSPredicate(format: \"title == %@\"\
  , model.title ?? \"\")\n    let results = coredataManager.fetchAll(Book.self, limit:\
  \ 1, predicate: predicate)\n    guard let books = results, books.count == 1 else\
  \ {\n        return nil\n    }\n    return books[0]\n}\n```\n\n### 整合所有部分\n\n到目前为止，我们尚未修改任何旧代码。我们只添加了新代码，但还没有在应用中的任何地方使用它。这就引出了我们开启这个\
  \ Core Data 主题之旅时的最后一个目标：用新编写的代码替换旧的实现。\n\n这一改动将直接影响我们的应用。因此，与我们在 TDD 中采取的每一步一样，我们需要从测试开始。我们需要确保已经拥有覆盖所有受影响逻辑的验证测试。受影响的逻辑是应用中与收藏处理相关的所有内容。幸运的是，如果审视一下我们的\
  \ UI 测试套件，会发现针对所有场景都有对应的测试。这意味着我们可以放心地切换实现。\n\n引导这一变更的最简单方法是从根源上移除旧的 Core Data 代码。那么，让我们前往\
  \ `AppDelegate`，删除所有与 Core Data 相关的代码。这将在我们的应用中产生一系列构建错误。现在我们逐一解决这些错误，用对 `FavoritesManager`\
  \ 的调用来替换旧代码。\n\n在 `FavViewController` 中，`loadSavedData` 函数现在将如下所示：\n\n```swift\n\
  func loadSavedData() {\n    let results = FavoritesManager.shared.fetchAllFavorites()\n\
  \    for book in results {\n        books.append(convertToBookModel(book: book))\n\
  \    }\n    self.tableView?.reloadData()\n}\n```\n\n而 `BookViewControllerA` 和 `BookViewControllerB`\
  \ 中的 `saveBookAsFavorite` 实现将如下所示：\n\n```swift\nfunc saveBookAsFavorite(withBook\
  \ bookModel:BookModel) {\n    FavoritesManager.shared.addFavorite(bookModel)\n \
  \   let alert = UIAlertController(title: \"已保存\", message: \"您的书籍已添加至收藏\", preferredStyle:\
  \ .alert)\n    alert.addAction(UIAlertAction(title: \"确定\", style: .default, handler:\
  \ nil))\n    self.present(alert, animated: true, completion: nil)\n}\n```\n\n现在我们已经完成了修改，需要重新运行验证测试，确保修改没有破坏任何功能。运行测试时，所有测试通过，这意味着我们成功编写了一个可测试的\
  \ Core Data 层，并将其顺利集成到了应用中！\n\n## 练习\n\n我们还需要添加最后一个操作，即删除操作。你的练习是为 `CoreDataManager`\
  \ 添加一个新的删除 API，并使用该新 API 在 `FavoritesManager` 中实现删除书籍的功能。然后，你将更新 `FavViewController`，使用\
  \ `FavoritesManager` 中的新 API。\n\n添加删除 API 后，最终设计应如图 10-14 所示。\n\n![../images/505360_1_En_10_Chapter/505360_1_En_10_Fig14_HTML.jpg](img/505360_1_En_10_Fig14_HTML.jpg)\n\
  \n**图 10-14** 最终 UML 图\n\n\n\n## 摘要\n\nCore Data 确实是一个强大的框架，因其功能丰富而被许多开发者使用。但如前所述，使用\
  \ Core Data 有时可能是一项繁琐的工作。这很大程度上源于两个原因。首先，许多开发者在使用 Core Data 时并未完全理解这个框架的真正本质及其运作方式。其次，许多开发者发现为他们的\
  \ Core Data 代码编写测试颇具挑战性，这最终导致难以发现的回归问题。在本章中，我们尝试解决这两个问题。\n\n我们讨论了 Core Data 的真正本质以及它不是什么。Core\
  \ Data 不是一个数据库。虽然它能够将数据持久化到磁盘上，但 Core Data 的功能远不止于此。本质上，Core Data 管理对象图，这意味着它管理着我们对象的生命周期。在内部，Core\
  \ Data 依赖于多个对象才能运行，每个对象都有特定的职责。有托管对象模型（managed object model），它是我们对象模式（object schema）的程序化表示。另外还有托管对象上下文（managed\
  \ object context），它充当一个草稿板，让我们应用想要的更改，然后我们可以选择丢弃或持久化这些更改。最后，还有持久化存储协调器（persistent\
  \ store coordinator），它在我们的上下文和持久化存储（persistent store）之间充当中间人，而持久化存储则负责实际保存数据。这些构成了\
  \ Core Data 栈的主要构建模块。最后还有持久化容器（persistent container），它封装了整个 Core Data 栈并简化了其创建和管理。\n\
  \n接着，我们揭穿了“Core Data 不可测试”这个迷思。是的，测试 Core Data 可能具有挑战性，但一旦掌握了要领，就变得轻而易举了。我们创建了一个通用的\
  \ Core Data 层，并在我们的应用（`Books`）中使用了它，而不是旧的 Core Data 实现。我们完全使用 TDD（测试驱动开发）完成了这一切。我们看到了在测试中使用\
  \ SQLite 存储可能会导致测试出现问题。通过使用内存存储（in-memory store），我们成功克服了这个问题。我们还展示了如何编写与应用程序数据模型完全隔离的测试，方法是添加专门用于测试的独立数据模型，并在测试中使用这个新模型来初始化我们的\
  \ Core Data 栈。\n\n"
- "# 11. 为遗留应用添加功能\n\n如果你还记得第 1 章的内容，我们讨论了可以在哪些不同情况下使用 TDD。基本上，TDD 可以应用于项目生命周期的任何阶段。最显而易见的选择是从项目一开始就使用\
  \ TDD。这也是我们一直推荐的。然而，如果你最近才听说 TDD，而手头已经有一个正在进行的项目了，该怎么办？TDD 仍然适合你。TDD 可以帮助指导对旧遗留代码的重构，而且我们也可以用\
  \ TDD 来恰当地对代码库进行模块化和解耦。在前面的章节中，我们已经大量实践了这种方法。\n\n在向现有的遗留代码添加新功能时，我们也可以使用 TDD。这正是本章我们将要讨论的内容。假设我们有一个遗留应用，它正在被完全重构并使用\
  \ TDD 进行模块化的进程中。但在这一过程中途，我们收到了一个新功能的需求。考虑到我们生活在一个快节奏的世界，在大多数情况下，我们很难奢侈地暂停项目所有的新进展，直到完成一次大的重构。我们需要在增强/重构遗留代码的同时，继续开发新的功能。\n\
  \n那么我们该如何做到这一点呢？首先，我们需要检查新功能，确定它是与旧功能耦合的，还是一个完全不依赖任何旧代码的全新功能。如果它与旧代码耦合，那么这些旧代码是遗留代码，还是已经被重构和模块化过的？但请不要误解。我们做这个检查不是为了决定是否需要使用\
  \ TDD。在所有情况下我们都会使用 TDD。这个检查只会影响我们任务的复杂程度。处理一个完全独立的功能会相对简单，因为我们几乎是重写代码，所以花在重构代码上的时间会较少。\n\
  \n另一方面，处理一个与旧的遗留代码耦合的功能会有些挑战性，因为我们不能先重构代码再添加功能。在这些场景下，你可能会忍不住完全放弃 TDD 和测试，因为父级代码本身就没有经过测试。然而，有一条我们从\
  \ Bob 大叔的《代码整洁之道》中学到并应始终遵循的黄金法则：“总是让代码比你发现它时更整洁。”这就是为什么我们应该尽量不要屈服于这种诱惑。\n\n## 遗留代码免责声明\n\
  \n我们将为 `Books` 添加一个新功能。让我们打开起始项目，它可以在本章的资源中找到。如果我们查看一下代码，会发现有两个用于书籍详情视图的视图控制器：`BookViewControllerA`\
  \ 和 `BookViewControllerB`。之所以存在这种情况，是因为我们正在进行一个 A/B 测试实验。尽管这两个视图控制器有很多共同的功能，但代码在它们之间是重复的，这在遗留代码中是意料之中的事。这是一个巨大的代码坏味道，如果有时间我们肯定应该修复它，但遗憾的是，我们没有。\n\
  \n### A/B 测试\n\nA/B 测试本质上是一种实验，其中向用户随机展示页面的两个或多个变体，并通过统计分析确定哪个变体在给定的转化目标上表现更佳。因此，此处进行\
  \ A/B 测试的动机是为了确定 `BookViewController` 的哪种设计能为图书购买带来更好的转化率。\n\n## 新功能\n\n我们想要添加的新功能是显示每本书的评论，这可以帮助我们的用户决定是否要阅读这本书（图\
  \ 11-1）。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig1_HTML.jpg](img/505360_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n评论线框图\n\n正如我们已经指出的，书籍视图有两个视图控制器：`BookViewControllerA` 和 `BookViewControllerB`。我们需要在两个视图控制器中都进行这项改动。知道这个改动是两个控制器共有的，我们可以遵循当前的实现方式，在两个控制器中都添加该改动。然而，这样做我们就没有遵循前面提到的\
  \ Bob 大叔的规则。现在就开始实现这个功能，并看看我们如何在不重构整个代码库的情况下解决这个问题。\n\n## 启动\n\n我们首先列出用户可能经历的场景：\n\
  \n1.  当用户打开一个没有评论的书籍视图时，他们应该能够看到一个表示“暂无评论”的提示。\n\n2.  当用户打开一个包含评论的书籍视图时，他们应该能够看到第一条评论。\n\
  \n我们将按照图 11-2 所示的方法来实现这个功能。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig2_HTML.jpg](img/505360_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n测试计划图\n\n现在我们将这些场景转化为 UI 测试。这些测试是我们的最终目标。一旦这些测试通过，我们就知道新功能已经完成 ✅。\n\n\
  \n\n### UI 测试\n\n现在让我们将第一个场景转化为测试。我们将打开 `BooksUITests` 并添加一个名为 `testShowingBookViewWithNoReveiws`\
  \ 的新测试。先来看一下测试中的“Given”部分：\n\n```swift\n// Given\nlet testBundle = Bundle(for: type(of:\
  \ self))\nlet booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
  , withExtension: \"json\")\nlet booksJSON = try! String(contentsOf: booksJSONURL!)\n\
  let booksNoReveiwsJSONURL = testBundle.url(forResource: \"booksNoReview\", withExtension:\
  \ \"json\")\nlet booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\n\
  server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
  server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
  \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
  app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\n这与我们之前设置已有测试的方式几乎相同。唯一的区别是现在需要多\
  \ stub 一个请求，也就是评论请求。这里我们将其 stub 并返回一个没有评论的响应。\n\n接下来是“When”部分：\n\n```swift\n// When\n\
  let booksTableView = app.tables\nlet cells = booksTableView.cells\nlet firstCell\
  \ = cells.firstMatch\n_ = firstCell.waitForExistence(timeout: 1.0)\nfirstCell.tap()\n\
  ```\n\n这里我们只是点击一本书以进入书籍详情视图。\n\n然后是“Then”部分：\n\n```swift\nlet reviewsCell = cells.staticTexts[\"\
  book_review\"]\n_ = reviewsCell.waitForExistence(timeout: 1.0)\nXCTAssertTrue(cells.staticTexts[\"\
  book_review\"].label == \"No Reviews Available\")\n```\n\n这里我们验证文本“No Reviews Available”是否被显示。\n\
  \n现在我们已经为第一个场景添加了 UI 测试，接下来为第二个场景添加测试：\n\n```swift\nfunc testShowingBookViewWithReveiws\
  \ () {\n    // Given\n    let testBundle = Bundle(for: type(of: self))\n    let\
  \ booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\", withExtension:\
  \ \"json\")\n    let booksJSON = try! String(contentsOf: booksJSONURL!)\n    let\
  \ booksReveiwsJSONURL = testBundle.url(forResource: \"booksReview\", withExtension:\
  \ \"json\")\n    let booksReveiwsJSON = try! String(contentsOf: booksReveiwsJSONURL!)\n\
  \    server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
  \    server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"]\
  \ = {_ in HttpResponse.ok(.text(booksReveiwsJSON))}\n    let app = XCUIApplication()\n\
  \    app.launchArguments += [\"TESTING\"]\n    app.launch()\n    // When\n    let\
  \ booksTableView = app.tables\n    let cells = booksTableView.cells\n    let firstCell\
  \ = cells.firstMatch\n    _ = firstCell.waitForExistence(timeout: 1.0)\n    firstCell.tap()\n\
  \    // Then\n    let reviewsCell = cells.staticTexts[\"book_review\"]\n    _ =\
  \ reviewsCell.waitForExistence(timeout: 1.0)\n    XCTAssertTrue(cells.staticTexts[\"\
  book_review\"].label == \"The book is interesting\")\n}\n```\n\n这与我们添加的第一个测试几乎相同。唯一的变化是我们使用了不同的响应来\
  \ stub 请求，并且检查了响应中返回的评论是否被显示。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig3_HTML.jpg](img/505360_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3** 测试计划图（已添加端到端测试）\n\nUI 测试完成后（图 11-3），让我们深入到下一层。\n\n### 集成测试\n\n现在，我们可以使用集成测试来设计该功能将如何工作。我们将像之前所有章节一样再次使用\
  \ MVP 模式。然而，`BookViewControllerA` 和 `BookViewControllerB` 包含大量意大利面条式代码。它们都发起网络请求并将数据保存到数据库，彼此之间还共享大量重复代码。不幸的是，如前所述，我们没有时间重构这一整团乱麻。因此我们需要设计这个功能，使其能够被添加到意大利面条式代码中，添加的代码之间松耦合、经过良好测试，并且在不重构整个类的情况下增强已有代码。\n\
  \n我们将在 `BookViewControllerA` 和 `BookViewControllerB` 内部实现/注入这个功能，就好像这些控制器不处理其他任何事情一样。因此，这个功能将使用\
  \ MVP 设计模式（图 11-4）来实现，而旧功能将保持不变。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig4_HTML.png](img/505360_1_En_11_Fig4_HTML.png)\n\
  \n**图 11-4** MVP 设计\n\n如图所示，`BookViewControllerA` 依赖于 presenter 来返回将在 `TableView`\
  \ 中显示的数据。`BookViewPresenter` 依赖于 `BookViewModel` 以获取评论数组。`BookViewModel` 依赖于 `NetworkLayer`\
  \ 来发起请求。\n\n现在让我们将其转化为测试。创建一个名为 `BookViewIntegrationTests` 的新测试用例类，并向其中添加以下测试：\n\
  \n```swift\nfunc testFetchingBooksReturnsAReviewInPresenterDelegate () {\n    //\
  \ Given\n    let testBundle = Bundle(for: type(of: self))\n    let booksReveiwsJSONURL\
  \ = testBundle.url(forResource: \"booksReview\", withExtension: \"json\")\n    let\
  \ booksReveiwsJSON = try! Data(contentsOf: booksReveiwsJSONURL!)\n    let networkLayer\
  \ = NetworkLayerStub(stubbedData: booksReveiwsJSON)\n    let bookViewModel = BookViewModel(network:\
  \ networkLayer)\n    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)\n\
  \    let delegateMock = BookViewPresenterDelegateMock()\n    bookViewPresenter.delegate\
  \ = delegateMock\n    let expectation = XCTKVOExpectation(keyPath: \"review\", object:\
  \ delegateMock)\n    // When\n    bookViewPresenter.fetchBookReviews(title: \"THE\
  \ LAST THING HE TOLD ME\")\n    // Then\n    self.wait(for: [expectation], timeout:\
  \ 0.1)\n    XCTAssertTrue(delegateMock.review == \"The book is interesting\", \"\
  Fetched fetch and view expected reviews\")\n}\n```\n\n这是一个略显复杂的测试，我们来分解一下：\n\n*\
  \   **Given 部分：**\n    *   创建一个 `NetworkLayerStub` 实例，该实例返回 `booksReview.json` 的内容。\n\
  \    *   创建一个依赖于 `NetworkLayerStub` 的 `BookViewModel` 实例。\n    *   创建一个依赖于 `BookViewModel`\
  \ 的 `BookViewPresenter` 实例。\n    *   创建一个 `BookViewPresenterDelegateMock` 实例，并将其设置为\
  \ presenter 的代理。\n*   **When 部分：** 调用 `fetchBookReviews`，期望 presenter 最终会调用其代理并传递书籍评论。\n\
  *   **Then 部分：** 等待期望（expectation）并对评论的值进行断言。\n\n由于此测试中使用的几乎所有类都尚未创建，我们需要先注释掉此测试，直到完成单元测试阶段。这是为了让我们的测试能够编译通过。之后我们再回来运行它以确保一切完成。\n\
  \n### 单元测试与具体实现\n\n到目前为止，正如你在图 11-5 中所见，我们只是在不断增加测试。但既然我们已经到达这个测试层级，意味着距离实际添加代码已经不远了。我们需要实现设计中每个组件（图\
  \ 11-5）。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig5_HTML.jpg](img/505360_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5** 测试计划图（已添加集成测试）\n\n\n\n### `BookViewModel`\n\n我们首先来实现 `BookViewModel`。为此，我们需要创建一个新的测试用例类并将其命名为\
  \ `BookViewModelTests`（图 11-6）。然后向其中添加以下内容：\n\n```\nfunc testFetchingBookReveiws()\
  \ throws {\n// Given\nlet expectedReviews: [Review] = stubbedReviews()\nlet testBundle\
  \ = Bundle(for: type(of: self))\nlet booksReveiwsJSONURL = testBundle.url(forResource:\
  \ \"booksReview\", withExtension: \"json\")\nlet booksReveiwsJSON = try Data(contentsOf:\
  \ booksReveiwsJSONURL!)\nlet networkLayer = NetworkLayerStub(stubbedData: booksReveiwsJSON)\n\
  let bookViewModel = BookViewModel(network: networkLayer)\n// When\nvar actualReviews:\
  \ [Review]?\nlet waitForBookReviews = XCTestExpectation(description: \"Wait to fetch\
  \ book reviews\")\nbookViewModel.fetchBookReviews(with: \"Title\", callBack: { reviews\
  \ in\nactualReviews = reviews\nwaitForBookReviews.fulfill()\n})\n// Then\nself.wait(for:\
  \ [waitForBookReviews], timeout: 0.1)\nXCTAssertEqual(actualReviews, expectedReviews,\
  \ \"Fetched books does not match the expected\")\n}\nfunc stubbedReviews() -> [Review]{\n\
  return [Review(byLine:\"ERROL MORRIS\", summary:\"The book is interesting\")]\n\
  }\n```\n\n我们来分解一下。\n\n*   **Given** 部分：\n    *   创建一个包含模拟书评的数组，该数组返回 `booksReview.json`\
  \ 的内容。\n    *   创建一个返回 `booksReview.json` 内容的 `NetworkLayerStub` 实例。\n    *   创建一个依赖于\
  \ `NetworkLayerStub` 的 `BookViewModel` 实例。\n\n*   **When** 部分：调用 `fetchBookReviews`，并期望模型能返回实际的书评数据。\n\
  \n*   **Then** 部分：等待期望得到满足，然后对书评的值进行断言。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig6_HTML.jpg](img/505360_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6  \n测试计划示意图（已添加单元测试）\n\n为了让我们的测试能够构建通过，我们需要做几件事。首先，我们需要创建 `Review` 对象，并确保它实现了\
  \ `Codable` 和 `Equatable` 协议：\n\n```\n// MARK: - ReviewsResponse\nstruct ReviewsResponse:\
  \ Codable {\nlet status, copyright: String\nlet numResults: Int\nlet results: [Review]\n\
  enum CodingKeys: String, CodingKey {\ncase status, copyright\ncase numResults =\
  \ \"num_results\"\ncase results\n}\n}\n// MARK: - Review\nstruct Review: Codable,\
  \ Equatable {\nvar byLine: String?\nvar summary: String?\ninit(byLine:String, summary:String)\
  \ {\nself.byLine = byLine\nself.summary = summary\n}\nenum CodingKeys: String, CodingKey\
  \ {\ncase byLine = \"byline\"\ncase summary = \"summary\"\n}\nstatic func == (lhs:\
  \ Review, rhs: Review) -> Bool {\nlhs.byLine == rhs.byLine &&\nlhs.summary == rhs.summary\n\
  }\n}\n```\n\n现在我们来更新 `BookViewModel` 类。该类应依赖于 `NetworkLayer`，并应包含 `fetchBookReviews`\
  \ 这个公共方法：\n\n```\nclass BookViewModel {\nprivate var favoritesManager:FavoritesManager?\n\
  private var networkLayer: NetworkLayer?\ninit(networkLayer: NetworkLayer? = .init(),\
  \ favoritesManager:FavoritesManager? = .shared) {\nself.networkLayer = networkLayer\n\
  self.favoritesManager = favoritesManager\n}\npublic func addFavorite(_ model: BookModel)\
  \ {\nself.favoritesManager?.addFavorite(model)\n}\npublic func fetchBookReviews(with\
  \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {\ncallBack(nil)\n\
  }\n}\n```\n\n这里我们创建了类，并添加了所需的方法，不过其实现是空的。\n\n如果我们运行这个测试，它会失败，这是意料之中的。现在我们需要真正去实现\
  \ `fetchBookReviews`。为此，我们需要发起一个网络请求。这意味着我们需要创建一个新的结构体，使其遵循 `RequestProtocol` 协议，来描述我们需要发起的这个请求。\n\
  \n让我们创建一个新的测试用例类，并将其命名为 `ReviewsRequestTests`。然后向其中添加以下测试：\n\n```\nfunc testReviewsRequestHTTPMethod()\
  \ {\n//Given\nlet reviewsRequest = ReviewsRequest(title: \"title\")\n//When & Then\n\
  XCTAssertEqual(reviewsRequest.method, .GET)\n}\nfunc testReviewsRequestURL() {\n\
  //Given\nlet bookRequest = ReviewsRequest(title: \"title\")\nlet env = APIEnvironment(scheme:\
  \ \"http\", host: \"test.com\", port: 433, API_KEY: \"\")\n// When\nlet urlRequest\
  \ = bookRequest.createURLRequest(with: env)\n//When & Then\nXCTAssertEqual(urlRequest?.url?.absoluteString,\
  \ \"http://test.com:433/svc/books/v3/reviews.json?title=title&api-key=\\(APIEnvironment.production.API_KEY)\"\
  )\n}\nfunc testReviewsRequestBody() {\n//Given\nlet reviewsRequest = ReviewsRequest(title:\
  \ \"title\")\n//When & Then\nXCTAssertNil(reviewsRequest.body)\n}\n```\n\n为了让这些测试通过，我们需要像下面这样创建\
  \ `ReviewsRequest`：\n\n```\nstruct ReviewsRequest: RequestProtocol {\nvar title:String\n\
  var path: String {\nreturn \"/svc/books/v3/reviews.json\"\n}\nvar queryItems: [URLQueryItem]?\
  \ {\nreturn [URLQueryItem(name: \"title\", value: self.title), URLQueryItem(name:\
  \ \"api-key\", value: NetworkLayer.environment.API_KEY)]\n}\nvar method:HTTPMethod\
  \ {return .GET}\nvar body: Data? {return nil}\n}\n```\n\n现在如果我们运行 `ReviewsRequestTests`（图\
  \ 11-7），它们将会通过 ✅。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig7_HTML.jpg](img/505360_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7  \n`ReviewsRequestTests` 测试通过\n\n既然我们已经准备好了 `ReviewsRequest`，那么就可以正确地实现\
  \ `fetchBookReviews` 了：\n\n```\npublic func fetchBookReviews(with title:String,\
  \ callBack: @escaping (_ reviews:[Review]?) -> Void) {        self.network?.executeRequest(ReviewsRequest(title:\
  \ title), callBack: { data, Error in\nguard let data = data else {\ncallBack(nil)\n\
  return\n}\nvar response:ReviewsResponse?\ndo {\nresponse = try JSONDecoder().decode(ReviewsResponse.self,\
  \ from: data)\n} catch {\nprint(error.localizedDescription)\n}\nif let reviews =\
  \ response?.results {\ncallBack(reviews)\nreturn\n}\ncallBack(nil)\n})\n}\n```\n\
  \n这里我们发起了网络请求，然后将响应数据解析为 `Review` 对象，并通过回调将其返回。如果发生任何错误，则返回 nil。\n\n现在，如果我们运行 `BookViewModelTests`\
  \ 中的测试，它应该会通过 ✅。\n\n\n\n### BookViewPresenter\n\n现在让我们跳到我们的展示器。像往常一样，我们先创建一个测试用例类，并将其命名为\
  \ `BookViewPresenterTests`，然后将以下测试添加到该类中：\n\n```swift\nfunc testFetchingBookReveiwsInDelegate()\
  \ {\n    // Given\n    let bookViewModel = BookViewModelStub(stubbedReviews: stubbedReviews())\n\
  \    let bookViewPresenter = BookViewPresenter(bookViewModel: bookViewModel)\n \
  \   let delegateMock = BookViewPresenterDelegateMock()\n    bookViewPresenter.delegate\
  \ = delegateMock\n}\nfunc stubbedReviews() -> [Review]{\n    return [Review(byLine:\"\
  ERROL MORRIS\", summary:\"The book is interesting\")]\n}\n```\n\n这里我们创建了一个 `BookViewPresenter`\
  \ 实例，并为其注入了视图模型的一个桩对象。然后将其委托设置为 `BookViewPresenterDelegateMock` 的一个实例。由于所有这些类都尚未存在，我们需要创建它们，以便测试能够编译通过。\n\
  \n我们先从 `BookViewPresenter` 开始：\n\n```swift\nprotocol BookViewPresenterDelegate:\
  \ AnyObject {\n    func reviewDidFinish(_ review: String?)\n}\nclass BookViewPresenter\
  \ {\n    private var bookViewModel:BookViewModel\n    weak var delegate: BookViewPresenterDelegate?\n\
  \    init(bookViewModel:BookViewModel) {\n        self.bookViewModel = bookViewModel\n\
  \    }\n}\n```\n\n这里我们定义了委托的协议，并创建了依赖于 `BookViewModel` 的类。\n\n现在创建 `BookViewModelStub`：\n\
  \n```swift\nclass BookViewModelStub: BookViewModel {\n    var stubbedReviews:[Review]?\n\
  \    init(stubbedReviews:[Review]) {\n        self.stubbedReviews = stubbedReviews\n\
  \        super.init(network: nil)\n    }\n    override public func fetchBookReviews(with\
  \ title:String, callBack: @escaping (_ reviews:[Review]?) -> Void) {\n        callBack(self.stubbedReviews!)\n\
  \    }\n}\n```\n\n这个类只是将评论数组作为桩数据，并在 `fetchBookReviews` 被调用时返回该数据。\n\n最后，我们需要创建\
  \ `BookViewPresenterDelegateMock`：\n\n```swift\nclass BookViewPresenterDelegateMock:\
  \ BookViewPresenterDelegate {\n    public var review:String?\n    func reviewDidFinish(_\
  \ review: String?) {\n        self.review = review\n    }\n}\n```\n\n这个类只是实现了 `BookViewPresenterDelegate`\
  \ 协议，并将传入的值保存在一个变量中。\n\n现在测试已经可以编译了，接下来编写测试的剩余部分：\n\n```swift\nfunc testFetchingBookReveiwsInDelegate()\
  \ throws {\n    // Given\n    let bookViewModel = BookViewModelStub(stubbedReviews:\
  \ stubbedReviews())\n    let bookViewPresenter = BookViewPresenter(bookViewModel:\
  \ bookViewModel)\n    let delegateMock = BookViewPresenterDelegateMock()\n    bookViewPresenter.delegate\
  \ = delegateMock\n    // When\n    let expectation = XCTKVOExpectation(keyPath:\
  \ \"review\", object: delegateMock)\n    bookViewPresenter.fetchBookReviews(title:\
  \ \"Title\")\n    // Then\n    self.wait(for: [expectation], timeout: 0.1)\n   \
  \ XCTAssertEqual(delegateMock.review, \"The book is interesting\")\n}\n```\n\n这里我们调用了\
  \ `fetchBookReviews`，并期望我们的委托方法会被调用。然后我们对传递给委托的值进行断言。\n\n我们在测试中使用了 KVO 期望。为了使这个期望生效，我们需要让\
  \ `BookViewPresenterDelegateMock` 继承自 `NSObject`，并使用 `@objc` 和 `dynamic` 注解我们要监听的变量：\n\
  \n```swift\nclass BookViewPresenterDelegateMock: NSObject, BookViewPresenterDelegate\
  \  {\n    @objc dynamic var review:String = \"\"\n    func reviewDidFinish(_ review:\
  \ String?) {\n        self.review = review ?? \"\"\n    }\n}\n```\n\n现在为了让测试通过，我们需要实现\
  \ `fetchBookReviews`：\n\n```swift\nfunc fetchBookReviews(title:String) {\n    self.bookViewModel?.fetchBookReviews(with:title,\
  \ callBack: { reviews in\n        var dataToBeDisplayed: String?\n        if let\
  \ reviews = reviews, reviews.count > 0 {\n            let firstReview = reviews[0]\n\
  \            dataToBeDisplayed = firstReview.summary\n        }\n        DispatchQueue.main.async\
  \ {\n            self.delegate?.reviewDidFinish(dataToBeDisplayed)\n        }\n\
  \    })\n}\n```\n\n这里我们使用视图模型来获取评论，获取第一条评论的摘要并将其传递给委托。\n\n现在运行测试（图 11-8），它应该会通过\
  \ ✅。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig8_HTML.jpg](img/505360_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8 展示器测试通过\n\n让我们添加一个新的测试，用于处理视图模型未返回评论的情况。该测试与第一个测试几乎相同：\n\n```swift\nfunc\
  \ testFetchingBookReveiwsReturnsNoResultsInDelegate() throws {\n    // Given\n \
  \   let bookViewModel = BookViewModelStub(stubbedReviews: [])\n    let bookViewPresenter\
  \ = BookViewPresenter(bookViewModel: bookViewModel)\n    let delegateMock = BookViewPresenterDelegateMock()\n\
  \    bookViewPresenter.delegate = delegateMock\n    // when\n    let expectation\
  \ = XCTKVOExpectation(keyPath: \"review\", object: delegateMock)\n    bookViewPresenter.fetchBookReviews(title:\
  \ \"Title\")\n    self.wait(for: [expectation], timeout: 0.1)\n    // Then\n   \
  \ XCTAssertEqual(delegateMock.review, \"No Reviews Available\")\n}\n```\n\n这里我们向视图模型桩对象传递了一个空数组，并断言传递给委托的值是预期的空状态文本。\n\
  \n此测试将会失败。要修复它，我们需要在代码中处理这种情况。只需要像下面这样添加一个默认值即可：\n\n```swift\nfunc fetchBookReviews(title:String)\
  \ {\n    self.bookViewModel?.fetchBookReviews(with:title, callBack: { reviews in\n\
  \        var dataToBeDisplayed: String?\n        if let reviews = reviews, reviews.count\
  \ > 0 {\n            let firstReview = reviews[0]\n            dataToBeDisplayed\
  \ = firstReview.summary\n        }\n        DispatchQueue.main.async {\n       \
  \     self.delegate?.reviewDidFinish(dataToBeDisplayed ?? \"No Reviews Available\"\
  )\n        }\n    })\n}\n```\n\n由于传递给 `BookViewPresenterDelegate` 的值不再是可选类型，我们可以将委托更新为：\n\
  \n```swift\nprotocol BookViewPresenterDelegate: AnyObject {\n    func reviewDidFinish(_\
  \ review: String)\n}\n```\n\n如果我们运行展示器测试（图 11-9），它们应该可以通过 ✅。\n\n![../images/505360_1_En_11_Chapter/505360_1_En_11_Fig9_HTML.jpg](img/505360_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9 展示器测试通过\n\n现在所有的单元测试都通过了，让我们取消 `BookViewIntegrationTests` 中集成测试的注释并尝试运行它。现在它也应该可以通过了\
  \ ✅。\n\n### 最终步骤\n\n在本章中，我们不会详细进行这一步，因为它有点琐碎。然而，我们需要做的是在我们的视图控制器中使用新的展示器。视图控制器需要遵守\
  \ `BookViewPresenterDelegate` 协议，并且我们需要在 `viewDidLoad` 中调用 `fetchBookReviews`。当展示器调用\
  \ `reviewDidFinish` 时，我们应该使用传递过来的数据填充视图。完成这些后，我们的 UI 测试应该都能通过。\n\n我们可以更进一步，创建一个名为\
  \ `BookViewControllerBase` 的新类，并在其中实现该功能。然后让我们的两个视图控制器继承自它。\n\n## 总结\n\n在遗留代码上使用\
  \ TDD 可能有点挑战性。在处理遗留代码时，开发人员通常倾向于避免使用 TDD 和最佳实践。然而，我们应该始终努力让我们接触的任何代码变得比我们找到它时更好。这同样适用于向遗留应用添加新功能。即使我们没有时间重构整个应用，我们添加的代码也需要设计良好、可测试且可维护。而这实际上为将遗留代码转变为设计良好的代码铺平了道路。\n\
  \n在本章中，我们致力于向遗留应用添加一个新功能。如果我们遵循旧代码的标准，最终只会得到更多无法测试的重复代码。相反，我们应用了 TDD，最终实现了一个与旧代码完美协作的新功能，并且该功能设计良好，同时被测试广泛覆盖。\n\
  \n\n\n"
- "# 12. 处理线上问题\n\n应用质量一直是本书重点讨论的话题。我们谈到了外部质量和内部质量，也讨论了如何通过 TDD 大幅提升质量。但质量是需要我们持续追求的目标，即使是最大的公司也在不断努力提升质量。正如我们所说，经过充分测试的项目有助于避免质量倒退，但无法彻底杜绝问题。即使我们在所有开发环节都遵循\
  \ TDD，仍可能遗漏某些边界情况。毕竟，我们都只是凡人。\n\n## 我们的工具\n\n为了主动提升质量，我们需要能够追踪两类信息：程序缺陷（Bug）和崩溃（Crash）。我们需要能够追踪用户遇到的崩溃。自行实现这一功能极其困难，但幸运的是，有许多第三方工具可以为我们提供此类支持。我们还需要为用户提供一种方式，让他们能够报告在使用我们的应用时遇到的任何程序缺陷。虽然可以手动实现一个基础版本，但也有一些工具不仅能提供报告功能，还能附带网络日志、控制台日志、用户操作步骤以及每次报告缺陷时的设备状态等丰富信息。\n\
  \n在本章中，我们将使用 Instabug 来处理程序缺陷报告和崩溃报告。它完美契合了我们追踪程序缺陷/崩溃的需求。我们将展示如何利用它来复现问题，从而编写测试进行修复。\n\
  \n### 集成\n\n首先，打开本章资源中的初始项目。要集成该工具，需要前往其[网站](http://dashboard.instabug.com)注册账号。注册成功后，我们会获得一个令牌（token），用于将账户与我们的应用关联。\n\
  \n接下来，通过 Swift Package Manager 将 Instabug 的 SDK 添加到应用中（图 12-1）。其包位于此仓库：[`https://github.com/Instabug/Instabug-SP`](https://github.com/Instabug/Instabug-SP)。\n\
  \n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig1_HTML.jpg](img/505360_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n使用 SPM 添加第三方库\n\n最后，在 `AppDelegate.swift` 中添加以下代码，即可完成集成 ![../images/505360_1_En_12_Chapter/505360_1_En_12_Figa_HTML.gif](img/505360_1_En_12_Figa_HTML.gif)。\n\
  \n```\nInstabug.start(withToken: \"TOKEN\", invocationEvents: .shake)\n```\n\n##\
  \ 线上程序缺陷\n\n我们刚刚收到了第一个程序缺陷报告（图 12-2）。一位用户抱怨说找不到任何书籍。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig2_HTML.jpg](img/505360_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n用户提交的程序缺陷报告\n\n### 调试\n\n从附带的截图（图 12-2）可以看到，`MainViewController` 是空的。这说明用户的投诉是合理的。\n\
  \n检查程序缺陷报告并查看网络日志后（图 12-3），我们发现书籍请求失败了。因此，出现这种行为是意料之中的。但问题是，我们完全没有显示任何错误信息。\n\n\
  ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig3_HTML.jpg](img/505360_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3\n\n来自程序缺陷报告的网络日志\n\n这里需要做的是：一旦书籍请求失败，我们必须确保显示提示信息：“无法加载畅销书”。\n\n修复这个问题应该很简单。但即使简单到只需添加一个字母，我们仍然需要使用\
  \ TDD。TDD 的规则是，没有失败的测试就不能编写任何代码。既然这个程序缺陷已经发布到线上，就意味着我们没有覆盖这个场景的测试。\n\n### UI 测试\n\
  \n打开 `BooksUITests`，新增一个测试来模拟这个缺陷。测试代码如下：\n\n```\nfunc testShowingErrorMessageWhenFailedToFetchBooksRequest()\
  \ {\n// Given\nserver.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.notFound}\n\
  let app = XCUIApplication()\napp.launchArguments += [\"TESTING\"]\napp.launch()\n\
  // When\nlet booksTableView = app.tables\n// Then\nlet failureMessage = booksTableView.staticTexts[\"\
  Failed to fetch best seller books\"]\n_ = failureMessage.waitForExistence(timeout:10)\n\
  }\n```\n\n这里我们像之前一样模拟了请求，但现在返回了一个失败的响应。然后断言错误信息能够显示出来。\n\n\n\n### 单元测试\n\n`MainViewPresenter`\
  \ 是一个负责根据 `MainViewModel` 返回的列表来返回错误信息的类。\n\n`fetchBestSellerBooks` 目前只返回一个列表。我们需要扩展这个方法，使其返回一个布尔值来指示\
  \ presenter 是否成功获取请求，并返回一个要显示给用户的错误信息。让我们在 `MainViewPresenterTests` 中添加一个新测试：\n\n\
  ```\nfunc testFailureToFetchBooks() throws {\n    // Given\n    let mainViewModel\
  \ = MainViewModelStub(stubbedLists: [])\n    let mainViewPresenter = MainViewPresenter(mainViewModel:\
  \ mainViewModel)\n    var status:Bool?\n    var message:String?\n    var actualLists:\
  \ [List] = []\n    // when & then\n    let waitForBooks = XCTestExpectation(description:\
  \ \"Wait to fetch books\")\n    mainViewPresenter.fetchBestSellerBooks { lists,\
  \ success, errorMessage in\n        actualLists = lists ?? []\n        status =\
  \ success\n        message = errorMessage\n        waitForBooks.fulfill()\n    }\n\
  \    self.wait(for: [waitForBooks], timeout: 0.1)\n    XCTAssertEqual(actualLists,\
  \ [])\n    XCTAssertEqual(status, false)\n    XCTAssertEqual(message, \"Failed to\
  \ fetch best seller books\")\n}\n```\n\n这里我们让桩模块返回一个空数组。然后调用 `fetchBestSellerBooks`，该方法现在会返回一个指示成功与否的布尔值，以及在失败时返回的错误信息。最后，我们断言回调中返回的值。\n\
  \n为了修复这个测试，我们需要更新 `fetchBestSellerBooks` 以处理这种情况：\n\n```\npublic func fetchBestSellerBooks(callBack:\
  \ @escaping (_ data:[List]?, _ success:Bool, _ errorMessage:String?) -> Void) {\n\
  \    self.mainViewModel?.fetchBestSellerBooks(callBack: { lists in\n        if let\
  \ lists = lists, lists.count > 0 {\n            callBack(lists, true, nil)\n   \
  \     } else {\n            callBack([], false, \"Failed to fetch best seller books\"\
  )\n        }\n    })\n}\n```\n\n由于我们更改了函数的签名，这会在我们的代码和测试中导致多个构建错误。我们只需逐一处理每个构建错误并更新签名即可。\n\
  \n修复所有构建错误后，如果我们运行 `MainViewPresenterTests` 中的新测试（图 12-4），它现在应该可以通过 ✅。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig4_HTML.jpg](img/505360_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\n所有测试通过\n\n现在，我们只需要更新视图控制器来显示错误信息：\n\n```\nfunc fetchBooks() {\n    self.mainViewPresenter?.fetchBestSellerBooks(callBack:\
  \ { lists,success,errorMessage  in\n        if success {\n            if let lists\
  \ = lists {\n                self.lists = lists\n                DispatchQueue.main.async\
  \ {\n                    self.refreshControl.endRefreshing()\n                 \
  \   self.tableView?.reloadData()\n                }\n            }\n        } else\
  \ {\n            self.lists = lists\n            DispatchQueue.main.async {\n  \
  \              self.refreshControl.endRefreshing()\n                self.tableView?.reloadData()\n\
  \                self.showErrorMessage(errorMessage: errorMessage)\n           \
  \ }\n        }\n    })\n}\n\nfunc showErrorMessage(errorMessage:String?) {\n   \
  \ let label = UILabel(frame: CGRect(x: 0, y: 0, width: 100, height: 40))\n    label.translatesAutoresizingMaskIntoConstraints\
  \ = false\n    label.text = errorMessage\n    label.sizeToFit()\n    self.tableView?.addSubview(label)\n\
  \    label.centerXAnchor.constraint(equalTo: (self.tableView?.centerXAnchor)!).isActive\
  \ = true\n    label.centerYAnchor.constraint(equalTo: (self.tableView?.centerYAnchor)!).isActive\
  \ = true\n}\n```\n\n现在，如果我们运行 UI 测试（图 12-5），它也应该可以通过 ✅。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig5_HTML.jpg](img/505360_1_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5\n\nUI 测试通过\n\n## 生产环境崩溃\n\n我们刚刚收到了第一次崩溃报告，发生次数为 3 次（图 12-6）。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig6_HTML.jpg](img/505360_1_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n\n崩溃报告\n\n### 调试\n\n如果我们查看崩溃堆栈跟踪信息（图 12-7），会发现崩溃发生在用户尝试通过亚马逊购买图书时。\n\n\
  ![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig7_HTML.jpg](img/505360_1_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7\n\n崩溃堆栈跟踪\n\n首先，可能只是我们使用的网络服务有问题。也许返回的图书不包含亚马逊链接或其他什么。但如果我们检查网络日志（图 12-8），会发现网络服务返回了正确的响应。\n\
  \n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig8_HTML.jpg](img/505360_1_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8\n\n网络日志\n\n如果我们进一步调试崩溃，查看全部三次崩溃的用户操作步骤（图 12-9），可以得出结论：所有崩溃都发生在 `BookViewControllerA`\
  \ 内部。并且总是在应用进入后台再返回前台后发生。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig9_HTML.jpg](img/505360_1_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9\n\n崩溃前的操作步骤\n\n如果我们检查 `BookViewControllerA` 内部的代码，就会找到罪魁祸首：\n\n```\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(didEnterBackground), name: UIApplication.didEnterBackgroundNotification,\
  \ object: nil)\n```\n\n我们监听了 `didEnterBackground` 通知，当它被触发时，我们执行以下操作：\n\n```\n@objc\
  \ func didEnterBackground() {\n    self.book = nil\n}\n```\n\n而当用户点击亚马逊按钮时：\n\n\
  ```\n@IBAction func buyByAmazon() {\n    for buyLink in self.book!.buyLinks! {\n\
  \        if buyLink.name == .amazon {\n            if let url = URL(string: buyLink.url)\
  \ {\n                UIApplication.shared.open(url)\n            }\n        }\n\
  \    }\n}\n```\n\n我们强制解包了 book 实例以便使用它。\n\n找到问题了！！！\n\n现在我们找到了根本原因，我们将采用与修复之前 bug\
  \ 相同的方法：应用 TDD。\n\n### UI 测试\n\n让我们打开 `BooksUITests` 并添加一个名为 `testShowingBookViewAfterEnterBackground`\
  \ 的新测试来模拟导致崩溃的场景。\n\n测试的 Given 部分应该如下所示：\n\n```\n// Given\nlet testBundle = Bundle(for:\
  \ type(of: self))\nlet booksJSONURL = testBundle.url(forResource: \"BestSellerBooksStub\"\
  , withExtension: \"json\")\nlet booksJSON = try! String(contentsOf: booksJSONURL!)\n\
  let booksNoReveiwsJSONURL = testBundle.url(forResource: \"booksNoReview\", withExtension:\
  \ \"json\")\nlet booksNoReveiwsJSON = try! String(contentsOf: booksNoReveiwsJSONURL!)\n\
  server.GET[\"/svc/books/v3/lists/overview.json\"] = {_ in HttpResponse.ok(.text(booksJSON))}\n\
  server.GET[\"/svc/books/v3/reviews.json?title=THE+LAST+THING+HE+TOLD+ME\"] = {_\
  \ in HttpResponse.ok(.text(booksNoReveiwsJSON))}\nlet app = XCUIApplication()\n\
  app.launchArguments += [\"TESTING\"]\napp.launch()\n```\n\n这里我们通过为两个请求设置桩模块并启动应用来设置测试。\n\
  \n接下来是 “When” 部分：\n\n```\n// When\n// Go to book\nlet booksTableView = app.tables\n\
  let cells = booksTableView.cells\nlet firstCell = cells.firstMatch\n_ = firstCell.waitForExistence(timeout:\
  \ 1.0)\nfirstCell.tap()\n// Move to background\nXCUIDevice.shared.press(.home)\n\
  // Move back to foreground\napp.activate()\n```\n\n这里我们导航到图书详情页面，然后让应用进入后台，再回到前台。\n\
  \n最后是我们的 “Then” 部分：\n\n```\n// Then\nlet amazonButton = app.buttons[\"amazon\"]\n\
  _ = amazonButton.waitForExistence(timeout: 1.0)\namazonButton.tap()\n```\n\n这里我们应该点击亚马逊按钮。通常在\
  \ Then 部分我们会做一些断言。但是，对于这个测试，我们的断言是应用不会崩溃。\n\n\n\n### 处理 A/B 测试\n\n现在出现了一个问题：每次测试运行时，它可能会打开\
  \ `BookViewControllerA` 或 `BookViewControllerB`。这是因为我们的 A/B 测试实验会随机选择一个视图控制器。所以，如果它选择打开\
  \ `BookViewControllerB`，我们的测试就能通过，即使它本应失败。为了让我们的测试有效，我们需要它总是失败。\n\n因此，我们需要在 UI 测试中添加另一个启动参数，强制应用使用第一个实验方案：\n\
  \n```\nlet app = XCUIApplication()\napp.launchArguments += [\"TESTING\", \"detailsA\"\
  ]\napp.launch()\n```\n\n我们需要调整 `AppDelegate` 来强制指定实验方案：\n\n```\nif ProcessInfo.processInfo.arguments.contains(\"\
  TESTING\"){\nif ProcessInfo.processInfo.arguments.contains(\"detailsA\")  {\nUserDefaults.standard.set(true,\
  \ forKey: \"detailsA\")\n} else {\nUserDefaults.standard.set(false, forKey: \"detailsA\"\
  )\n}\n} else {\nlet randomBool = Bool.random()\nif randomBool {\nInstabug.addExperiments([\"\
  detailsA\"])\n} else {\nInstabug.addExperiments([\"detailsB\"])\n}\nUserDefaults.standard.set(randomBool,\
  \ forKey: \"detailsA\")\n}\n```\n\n这里我们检查是否传入了启动参数。如果传入了，就使用该值；如果没有，则回退到正常的随机选择视图实现。\n\
  \n现在，如果我们运行测试，它应该会崩溃（图 12-10）。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig10_HTML.jpg](img/505360_1_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10\n\n成功复现崩溃\n\n### 修复测试\n\n修复测试，进而修复生产环境的问题，非常简单。我们只需移除内部的强制解包，并将实现替换为以下代码：\n\
  \n```\n@IBAction func buyByAmazon() {\nguard let buyLinks = self.book?.buyLinks\
  \ else {\nreturn\n}\nfor buyLink in buyLinks {\nif buyLink.name == .amazon {\nif\
  \ let url = URL(string: buyLink.url) {\nUIApplication.shared.open(url)\n}\n}\n}\n\
  }\n```\n\n这里我们使用 `guard` 来检查书籍是否存在。\n\n我们应该始终避免使用强制解包，因为它极度不安全。iOS 上发生的大多数崩溃都是由强制解包导致的。\n\
  \n我们还可以一并移除监听 `didEnterBackground` 通知的代码，因为似乎并不需要它。\n\n现在，如果我们运行测试（图 12-11），它应该会通过\
  \ ✅。\n\n![../images/505360_1_En_12_Chapter/505360_1_En_12_Fig11_HTML.jpg](img/505360_1_En_12_Fig11_HTML.jpg)\n\
  \n图 12-11\n\nUI 测试通过\n\n## 总结\n\n我们的目标是持续提升应用质量。有时我们可能会遗漏某个场景而未加处理。我们无法总是预测用户将如何与应用交互。因此，最好的做法是，始终有一种方法来追踪生产环境用户遇到的致命崩溃，并为用户提供一种报告应用中错误行为的途径。\n\
  \n在本章中，我们讨论了如何使用第三方工具来追踪生产环境中的错误和崩溃。当遇到生产环境问题时，修复也应遵循测试驱动。我们在添加功能时使用 TDD，将需求转化为测试。对于生产环境的错误和崩溃，处理方式完全一样，我们的需求就是问题不再发生。当我们这样做时，我们将防止这个特定问题再次发生。\n\
