- "# 打印照片\n\niOS 4.3 新增了**AirPrint**功能。**AirPrint**是 Apple 专有的内置打印功能。**AirPrint**适用于照片、文档和其他应用。很酷的一点是：你无需像在\
  \ PC 或 Mac 上那样安装打印机驱动程序。\n\n请按照以下步骤打印照片：\n\n1.  像之前一样，从相册中选择任意一张照片。\n2.  点击**信封**图标。\n\
  3.  从选项中选择**打印**。\n4.  当你点击**打印机选项**按钮时，**AirPrint**将搜索兼容的**AirPrint**打印机。\n5. \
  \ 选择你想要打印的份数。\n6.  点击**打印**按钮，照片便会打印出来。\n\n![images](img/p431-02.jpg)\n\n\n\n###\
  \ 为联系人指定照片\n\n第 14 章：“使用联系人”介绍了如何在编辑联系人时添加照片。你也可以找到喜欢的图片并将其指定给联系人。首先，找到你想要使用的照片。\n\
  \n与选择壁纸和通过电子邮件发送照片时一样，点击`选项`按钮——即上方软键行最右侧的那个。如果看不到图标，请点击屏幕一次。\n\n![图片](img/p432-01.jpg)\n\
  \n点击`选项`按钮后，你会看到一个下拉选项列表：`通过电子邮件发送照片`、`指定给联系人`、`用作壁纸`和`复制照片`。\n\n点击`指定给联系人`按钮。\n\
  \n![图片](img/p432-02.jpg)\n\n屏幕上将显示你的联系人列表。你可以通过顶部的`搜索`栏进行搜索，也可以直接滚动浏览联系人。\n\n![图片](img/p433-01.jpg)\n\
  \n找到你想要添加照片的联系人后，点击其姓名。\n\n接着你会看到`移动和缩放`屏幕。拖动照片可以移动它；使用双指捏合可以放大或缩小。\n\n将照片调整到满意位置后，点击`使用`按钮，即可将照片指定给该联系人。\n\
  \n![图片](img/p434-01.jpg)\n\n**注意**：操作完成后，你将返回`照片`图库，而非联系人列表。如需确认照片已成功设置给联系人，请退出`照片`应用，打开`通讯录`应用，然后搜索该联系人。\n\
  \n#### 删除照片\n\n你可能会纳闷，为什么无法从 iPad 上删除某些照片（即找不到`废纸篓`图标）。\n\n你会注意到，所有从 iTunes 同步过来的照片都不显示`废纸篓`图标。这类照片只能从你的电脑资料库中删除。下次同步\
  \ iPad 时，它们就会被移除。\n\n![图片](img/p435-01.jpg)\n\n当你查看`相机胶卷`（该相册不与 iTunes 同步，由你从电子邮件中保存或从网络下载的照片组成）中的照片时，在顶部的图标栏右侧会看到`废纸篓`图标。而查看`照片`图库或其他同步相册中的照片时，此`废纸篓`图标不会出现。\n\
  \n如果看不到底部的图标行，点击照片一次即可激活它们。然后点击`废纸篓`图标；系统会提示你确认是否删除照片。\n\n点击`删除照片`，该照片就会从你的 iPad\
  \ 上被删除。\n\n![图片](img/p435-02.jpg)\n\n### 从网站下载图片\n\n现在你已经知道如何将照片从电脑传输到 iPad，以及如何从电子邮件中保存照片。此外，你还可以直接从网络将图片下载并保存到\
  \ iPad 上。\n\n**警告**：我们强烈建议你在从网络下载和保存图片时尊重图片版权法。除非网站标明图片是免费的，否则在下载和保存任何图片前，应先征得网站所有者的同意。\n\
  \n#### 找到要下载的图片\n\niPad 让从网站复制和保存图片变得非常简便。当你为 iPad 寻找新的壁纸图片时，这个功能会派上用场。\n\n![图片](img/p436-01.jpg)\n\
  \n首先，点击`Safari`网络浏览器图标，搜索 iPad 壁纸，找到一些可能提供有趣选择的网站（如需帮助，请参见第 11 章：“使用 Safari 浏览网页”）。\n\
  \n![图片](img/p436-02.jpg)\n\n找到你想要下载并保存的图片后，长按该图片，会弹出一个新的选项菜单，其中包含`存储图像`（以及其他选项），如图\
  \ 16–9 所示。选择此选项，即可将图片保存到你的`相机胶卷`相册中。\n\n![图片](img/1609.jpg)\n\n**图 16–9.** *从网站保存图像*\n\
  \n现在点击你的`照片`图标，你应该就能在`相机胶卷`相册中看到这张图片了。\n\n![图片](img/p437-01.jpg)\n\n### Photo Booth\n\
  \niPad 新增了一款非常有趣的软件，Mac 用户对此应该不会陌生：`Photo Booth`。`Photo Booth`使用 iPad 的前置摄像头，让用户能够创建一些非常酷炫且与众不同的视觉效果。\n\
  \n![图片](img/p438-01.jpg)\n\n首先，点击`Photo Booth`图标，你会看到九个方格，每个代表一种不同的视觉效果：`热感应摄像头`、`镜像`、`X\
  \ 光`、`万花筒`、`正常`、`光隧道`、`挤压`、`旋转`和`拉伸`。\n\n![图片](img/p438-02.jpg)\n\n只需点击其中一种效果，它就会全屏显示。\n\
  \n要捕捉其中一张图像，点击`相机`图标，就像拍照一样。捕捉到的图像会出现在屏幕底部的一行中。\n\n要返回并选择不同的效果类型，请点击左下角的图标。\n\n\
  若要结合当前效果使用后置摄像头，只需点击`切换摄像头`按钮即可。\n\n![图片](img/p439-01.jpg)\n\n`Photo Booth`能带给你很多乐趣。你拍摄的照片会存储在`相机胶卷`中，因此你可以通过电子邮件发送它们、发布到\
  \ Facebook 上，与全世界分享！\n\n## 第 17 章\n\n## 录制与编辑视频\n\n你的 iPad 是一部功能强大的摄像机。你可以录制并导出高达\
  \ 720p 的高清视频。随后，你可以将该视频直接发布到 YouTube 或 MobileMe，甚至可以通过电子邮件发送给收件人。在本章中，我们还将向你展示如何拍摄视频、快速进行*修剪*，以及如何上传视频。\n\
  \n### 视频录制与编辑\n\n今年 iPad 新增了使用`相机`应用录制视频以及使用`iMovie`应用编辑视频的功能，Mac 用户已经使用`iMovie`一段时间了。通过`iMovie`，你可以连接视频片段、添加图片和转场效果，再配上自己的音轨，从而创作出完整的影片。完成后，你可以将影片上传到网络。\n\
  \n在下一节中，你将学习如何添加视频片段、音频、图片和转场效果。你还将学习如何直接在 iPad 上制作出高质量的高清视频。\n\n\n\n#### 启动录像机\n\
  \n视频录制软件实际上是**相机**应用的一部分（请参见图 17–1）。请按照以下步骤使用内置录像机：\n\n1.  启动**相机**应用（有关具体操作方法，请参见第\
  \ 16 章：“iPad 摄影”）。\n2.  将右下角的滑块从**相机**图标移动到**录像机**图标。\n3.  录制场景时，尽量保持 iPad 稳定。\n\
  4.  录制完成后，轻触**停止**按钮。\n\n![images](img/1701.jpg)\n\n**图 17–1.** *录像机的布局与控件*\n\n\
  ##### 调整白平衡点\n\niPad 摄像头的对焦是固定的。您可以根据拍摄主体调整视频的白平衡点。请按照以下步骤利用此功能：\n\n1.  要对视频前景中的某物对焦，请轻触前景中的屏幕。此时会显示一个小方框，标示白平衡区域。\n\
  2.  要将白平衡切换到背景中的主体，请轻触屏幕的另一部分。该方框会临时显示新的白平衡区域。\n\n##### 修剪视频\n\niPad 允许您直接在设备上对视频进行剪辑。按下**停止**按钮录制完视频后，该视频会立即存入您的**相机胶卷**。\n\
  \n轻触左下角的视频缩略图以打开该视频。在屏幕顶部，您会看到一个时间轴，显示了视频的所有帧（请参见图 17–2）。请按照以下步骤编辑您刚刚录制的视频：\n\n\
  1.  拖动时间轴的任意一端，您会看到视频进入**修剪**模式。\n2.  拖动视频两端，直到它达到您想要的长度。\n3.  当视频长度合适时，轻触右上角的**修剪**按钮。\n\
  4.  接着，选择**修剪原片**或**存储为新剪辑**。后者会保存一个新修剪版本的视频。\n\n![images](img/1702.jpg)\n\n**图\
  \ 17–2.** *修剪视频*\n\n**注意**：视频文件远大于图片；如果向**相机胶卷**中保存大量视频，请务必留意存储空间。\n\n##### 发送视频\n\
  \n与照片类似，您有几种选择可以通过 iPad 将录制的视频发送给他人。请按照以下步骤从 iPad 发送视频：\n\n1.  轻触右上角的**发送**图标 ![images](img/p444-01.jpg)。\n\
  2.  选择您偏好的视频发送选项：**电子邮件**、**彩信**、**MobileMe**、**YouTube** 或**拷贝**。\n3.  您看到的下一屏幕将取决于您在步骤\
  \ 2 中所做的选择。如果您选择了**电子邮件**，您的**邮件**应用将会启动。\n\n##### 上传到 YouTube\n\niPad 允许您将高清（720p）视频直接上传到您的\
  \ **YouTube** 账户。您只需连接到 Wi-Fi 网络即可。请按照以下步骤将视频上传到 YouTube：\n\n1.  在您的**相机胶卷**中找到要上传的视频。\n\
  2.  轻触**发送**图标。\n3.  选择**发送到 YouTube**。\n4.  为视频输入标题、描述和*标签*。\n5.  选择标准清晰度或高清。\n\
  6.  为视频选择一个类别。\n\n![images](img/1703.jpg)\n\n**图 17–3.** *将视频上传到 YouTube*\n\n**注意**：要将视频上传到\
  \ MobileMe 或 YouTube，您需要拥有目标网站的账户（有关 MobileMe 的更多信息，请参见第 4 章：“其他同步方法”）。\n\n####\
  \ 使用 iMovie\n\nMac 用户多年来一直享受着 **iMovie** 应用的乐趣。此应用允许您将影片剪辑与图片和音乐结合，为场景之间添加炫酷的转场效果，从而制作出具有专业水准的影片。\n\
  \n![images](img/p445-01.jpg)\n\n新款 iPad 的一大出色功能是用户可以直接在 iPad 上体验 **iMovie** 的强大功能。**iMovie**\
  \ 应用可从 App Store 以 4.99 美元的价格下载。它通常列在**精选**应用或**为 iPad 2 优化**应用专区下。您也可以直接在 App Store\
  \ 中搜索“iMovie”来直接进入下载页面（有关在 App Store 中搜索内容的更多信息，请参见第 21 章：“神奇的 App Store”）。\n\n\
  ![images](img/p446-01.jpg)\n\n#### 开始使用 iMovie\n\n**iMovie** 应用以项目方式工作。如果您保存过项目，它们会显示在**项目**页面上。这很可能您是第一次使用该应用，因此不会有任何项目。请按照以下步骤开始一个\
  \ **iMovie** 项目：\n\n1.  轻触**加号**图标 ![images](img/p446-02.jpg) 以开始一个新项目。\n2.  轻触**设置**图标并为项目选择一个主题。浏览可用的主题。当前主题包括**现代**、**明亮**、**旅行**、**俏皮**、**霓虹**、**旅行**、**简洁**、**新闻**和\
  \ **CNN 报道**。\n3.  如果您想使用为该主题设计的特定音乐，请选择**主题音乐 开**。\n4.  轻触任一**插入媒体**图标以选择您影片的媒体。要选择视频，请轻触左侧的**视频**软键。要选择照片，请轻触旁边的**照片**软键。最后，要从您自己的音乐文件中选择音轨，请轻触**音频**软键并导航到所需的歌曲（请参见图\
  \ 17–4）。\n\n![images](img/1704.jpg)\n\n**图 17–4.** *选择要添加到您的 **iMovie** 项目中的媒体*\n\
  \n##### 构建您的影片\n\n在 **iMovie** 中创建影片就像添加新内容、转场和音频一样简单。请按照以下步骤构建您的影片：\n\n1.  再次轻触**插入媒体**按钮，并从您的**照片**应用中选择一个影片剪辑或照片。\n\
  2.  通过将两端的**黄点**向中心移动来调整剪辑的长度。注意，随着调整，剪辑的时长会发生变化。\n3.  准备将剪辑添加到项目时间轴时，轻触**蓝色箭头**。\n\
  4.  重复上述步骤，向时间轴添加另一个视频剪辑或照片。\n5.  现在，项目中不同媒体之间会出现一个小**双箭头**图标。这是**转场**图标。双击**转场**图标以调出**转场设置**菜单（请参见图\
  \ 17–5）。\n6.  选择一个转场效果（目前只有三个选项：**无**、**交叉溶解**和**主题**）。\n7.  选择转场时长。范围可从 0.5 秒到\
  \ 2.0 秒。\n8.  接下来，轻触**转场**图标下方的**上箭头**或**下箭头**，以调整从一个剪辑或照片到另一个的重叠和过渡。\n9.  轻触**转场**图标退出菜单。\n\
  10. 通过轻触**音频**按钮并从您的**音乐**资料库中选择配乐来添加音乐。\n11. 轻触**波形**按钮以查看实际的音频波形及其在视频中的位置。\n12.\
  \ 轻触**录音**按钮为视频添加画外音录制。\n\n![images](img/1705.jpg)\n\n**图 17–5.** *为 **iMovie**\
  \ 项目添加转场*\n\n请按照以下步骤预览影片：\n\n1.  将底部的**时间轴**控件滑到开头，然后轻触**播放** ![images](img/p448-01.jpg)\
  \ 按钮。\n2.  完成后，轻触屏幕顶部中央的**我的项目** ![images](img/p448-02.jpg) 按钮。这会让您返回到**项目**屏幕。\n\
  \n\n\n#### 分享你的影片\n\n轻触`分享`按钮，`iMovie`会提供选项，让你将影片分享到`YouTube`、`Facebook`、`Vimeo`或`CNNiReport`。此外，你还可以选择将项目发送到`iTunes`。\n\
  \n![images](img/p449-01.jpg)\n\n选择你想要分享项目的网站。随后会出现一个选项屏幕，让你选择影片的导出尺寸。你可以选择以高清（720p）、大（540p）或中等（360p）格式导出影片文件。\n\
  \n![images](img/p449-02.jpg)\n\n**注意**：高清 720p 影片画质最佳；但根据影片长度，文件可能非常大。显然，通过电子邮件发送或上传高清影片所需的时间会比同等长度的大或中等尺寸影片更长。\n\
  \n`导出`屏幕会显示影片导出的进度。按照以下步骤从你的`相机胶卷`分享项目：\n\n1.  从`共享`菜单中选择`相机胶卷`选项。\n2.  前往你的`相机胶卷`（更多操作详情请参见第\
  \ 16 章：“iPad 摄影”）。\n3.  在`相机胶卷`中找到新影片。图片底部会显示`视频`图标；图像中还会显示视频时长。\n4.  从`相机胶卷`中轻触该视频。\n\
  5.  从底部的虚拟按键中选择`分享`。\n6.  选择以下方式之一发送项目：`电子邮件`、`MobileMe`、`YouTube`或`拷贝`。\n\n**注意**：为保持高清\
  \ 720p 视频的质量，你应该将其同步回电脑。通过 Wi-Fi 手动上传可能让你以最高质量分享影片。将影片同步到 iTunes 可确保原始画质得以保留。\n\n\
  ##### 上传至 YouTube\n\niPad 允许你将高清（720p）的`iMovie`项目直接上传到你的 YouTube 账户。你只需连接到 Wi-Fi\
  \ 网络。按照以下步骤将视频上传至 YouTube：\n\n1.  在`iMovie`项目中找到要上传的项目。\n2.  轻触`分享`图标。\n3.  选择`YouTube`。\n\
  4.  为视频输入`标题`、`描述`和`标签`。\n5.  为`大小`选择`中等`、`大`或`高清`。\n6.  为视频选择一个`类别`。\n7.  完成后轻触`分享`按钮。\n\
  8.  最后，选择`在 YouTube 上查看`或`告诉朋友`（通过电子邮件）视频已发布（参见图 17–6）。\n\n![images](img/1706.jpg)\n\
  \n**图 17–6.** *将`iMovie`项目上传至 YouTube*\n\n## 第 18 章\n\n## FaceTime 视频通话与 Skype\n\
  \n你的 iPad 为生活带来了许多新功能，其中一些在几年前还像是科幻小说。例如，视频通话现在不仅成为可能，而且通过全新的`FaceTime`应用变得极为易用。\n\
  \n![images](img/p453-01.jpg)\n\n只要你与通话对方都使用 iOS 设备，并且都连接到 Wi-Fi 网络，就可以进行无限时的视频通话。在本章中，我们将向你展示如何启用和使用`FaceTime`程序，以及如何使用这一出色新功能开始享受乐趣。\n\
  \n通过`Skype`（许多人在电脑上使用的热门视频通话和聊天程序）也可以实现 Wi-Fi 通话。我们将向你展示如何在 iPad 上使用`Skype`应用。\n\
  \n### 视频通话\n\n多年来，我们曾在电视节目和电影中目睹过此类未来技术的首次亮相。例如，许多节目和电影中的人们使用小巧的便携电话交谈并进行视频对话。甚至上世纪\
  \ 70 年代的动画片《摩登原始人》也曾将此作为一个未来概念。\n\niPad 将这种未来构想变成了今天的现实。\n\n#### 设置 FaceTime\n\n\
  在 iPad 上首次使用`FaceTime`时需要进行设置。该过程通常非常简单。由于 iPad 不是手机，`FaceTime`需要关联一个电子邮件地址才能正常工作。请按照以下步骤将`FaceTime`与电子邮件地址关联：\n\
  \n1.  轻触`FaceTime`图标（通常位于 iPad 的第一个`主屏幕`上）。\n2.  使用你的`Apple ID`或`MobileMe`用户名和密码登录你的\
  \ Apple 账户。如果你没有账户（或想专门为`FaceTime`创建一个新账户），只需轻触`创建新账户`按钮（参见图 18–1）。\n3.  账户设置完成后，你可以选择用于拨打`FaceTime`通话的电子邮件地址。你还可以添加其他电子邮件地址用于你的`FaceTime`账户。\n\
  \n**注意：** 一旦`FaceTime`设置完成，你随时可以进入`设置`，然后选择`FaceTime`标签进行调整或添加更多电子邮件地址。在此标签下，你可以选择添加更多电子邮件地址或更改`FaceTime`通话的来电显示。\n\
  \n![images](img/1801.jpg)\n\n**图 18–1.** *在 iPad 上设置 FaceTime 账户*\n\n#### 使用 FaceTime\
  \ 进行视频通话\n\n`FaceTime`是苹果众多 iPhone 和 iPad 广告中重点突出的应用。本质上，`FaceTime`是通过 Wi-Fi 进行免费通话，让你能够通过设备的前置摄像头看到通话另一端的对方。\n\
  \n**注意**：目前`FaceTime`仅适用于 Mac、新款 iPhone 4、iPod touch 以及运行 iOS 4.3 及更高版本的最新型号 iPad\
  \ 2 设备；此外，它仅能在 Wi-Fi 网络下使用。\n\n##### 在 iPad 上启用 FaceTime 通话功能\n\n当你首次使用 iPad 时，`FaceTime`尚未启用。要启用\
  \ iPad 接收和拨打`FaceTime`通话，请按以下步骤操作：\n\n1.  找到并轻触`设置`图标。\n2.  向下滚动到`FaceTime`选项标签。\n\
  3.  将`FaceTime`开关切换到`开启`位置。\n\n#### 使用 FaceTime\n\n一旦`FaceTime`启用，你就可以从`FaceTime`应用或联系人页面底部的`FaceTime`按钮发起`FaceTime`通话。但`FaceTime`仅在对方也使用\
  \ iPad 2、iPod touch 或 iPhone 4，并且双方设备均启用了`FaceTime`功能时才能工作。\n\n![images](img/p455-01.jpg)\n\
  \n要发起`FaceTime`通话，请按以下步骤操作：\n\n1.  轻触 iPad 上的`FaceTime`图标（最初位于第一个`主屏幕`上）。\n2.  选择能够接收`FaceTime`通话的`个人收藏`、`最近通话`或`联系人`。应用会请求通话另一端的对方`接受`该`FaceTime`通话。\n\
  \n接听他人的来电也很简单。只需通过轻触`接听`按钮来`接受`对方的`FaceTime`通话；如果 iPod 处于`睡眠`模式，则通过`滑动来接听`（参见图 18–2）。\n\
  \n![images](img/1802.jpg)\n\n**图 18–2.** *接听`FaceTime`通话*\n\n一旦`FaceTime`通话建立，按照以下步骤进行视频会议：\n\
  \n1.  将设备稍微拿远一些。\n2.  确保自己在窗口中*取景*得当。\n3.  你可以将显示自己的小图像拖到屏幕上的方便位置。\n4.  轻触`切换摄像头`按钮，向`FaceTime`通话对方展示你所看到的画面。`切换摄像头`按钮此时将使用\
  \ iPad 背面的标准摄像头。在图 18–3 中，我能看到朋友女儿正在做什么，而她能在右下角看到她的妈妈和我。\n5.  轻触`结束`按钮来结束`FaceTime`通话。\n\
  6.  轻触`静音`按钮可暂时将通话静音。\n\n![images](img/1803.jpg)\n\n**图 18–3.** *在`FaceTime`通话中切换摄像头画面*\n\
  \n**注意**：你可以在 iPad 2 上以`竖屏`和`横屏`模式使用`FaceTime`。只需记住，当处于`横屏`模式时，摄像头会位于设备的一侧。\n\n\n\
  \n#### 在 FaceTime 中设置收藏\n\n与使用 iPhone 时类似，您可以在 iPad 上为 `FaceTime` 通话设置`收藏`。您设置的收藏对象必须是拥有\
  \ iPad 2、iPod touch 或 iPhone 4 的用户，且这些用户也需要将设备设置为可进行 `FaceTime` 通话。请按照以下步骤将联系人添加到您的`收藏`中：\n\
  \n1. 像之前一样启动 `FaceTime` 应用。\n2. 点击底部的`收藏`软键（请参见 图 18–4）。\n3. 点击`加号` (`+`)，然后选择一个联系人添加到您的`收藏`中。\n\
  \n**注意**：选择联系人时，请选择该联系人的 iPhone 号码或与其 `FaceTime` 账户关联的电子邮件地址。\n\n![images](img/1804.jpg)\n\
  \n**图 18–4.** *在 `FaceTime` 中添加收藏*\n\n#### 使用 FaceTime 进行多任务处理\n\n新款 iPad 的一大特色是搭载了苹果最新的\
  \ iOS 软件，支持多任务处理（请参阅第 8 章：“多任务处理与语音控制”，了解更多关于如何在应用间切换的内容）。\n\n当您正在进行 `FaceTime`\
  \ 通话时，只需双击`主屏幕`按钮即可查看正在运行的其他应用。切换到另一个应用后，屏幕顶部会出现一个提示栏，显示“轻触以继续 FaceTime 通话”。部分用户反映，通过此方式操作后，有时难以返回\
  \ `FaceTime` 通话。\n\n只需轻触该提示栏即可返回通话。\n\n![images](img/p459-01.jpg)\n\n### 使用 Skype\
  \ 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过像 [`www.facebook.com`](http://www.facebook.com)\
  \ 和 [`www.myspace.com`](http://www.myspace.com) 这样的网站进行被动交流固然不错，但有时，没有什么能替代亲耳听到对方声音的体验。\n\
  \n令人惊喜的是，您可以使用任何 iPad 上的 `Skype` 应用拨打电话。拨打给世界上任何其他 Skype 用户的电话都是免费的。Skype 的一大优点是它能在电脑和多种移动设备上运行，包括\
  \ iPhone 4、iPod touch、部分黑莓智能手机以及其他移动设备。拨打手机和座机电话会产生费用，但资费合理。\n\n![images](img/p459-02.jpg)\n\
  \n**注意**：只有当您拥有前置摄像头（例如 iPad 2、iPhone 4 或 iPod touch 上的那种）时，才能使用 `Skype` 应用进行视频通话。\n\
  \n![images](img/p459-03.jpg)\n\n#### 将 Skype 下载到您的 iPad\n\n您可以从 App Store 免费下载 `Skype`\
  \ 应用，方法是搜索“Skype”并进行安装。如果您在操作过程中需要帮助，请查阅第 21 章：“神奇的 App Store”。不过，您应该注意到，与 `Facebook`\
  \ 和其他应用类似，`Skype` 并没有原生的 iPad 版本，因此您将使用的是 iPhone 版应用。\n\n#### 在 iPad 上创建 Skype 账户\n\
  \n如果您需要设置 Skype 账户，并且尚未在电脑上完成此操作（请参阅本章后面的“在电脑上使用 Skype”部分），请按照以下步骤在 iPad 上设置 `Skype`：\n\
  \n1. 在`主屏幕`上点击 `Skype` 图标。\n2. 点击`创建账户`按钮。\n3. 在弹出的`无法拨打紧急电话`警告窗口中点击`接受`。\n4. 输入您的`全名`、`Skype\
  \ 名称`、`密码`和`电子邮件`，然后通过设置底部的开关来决定是否要`接收新闻和优惠`。\n5. 点击`完成`按钮以创建您的账户。\n\n![images](img/p460-01.jpg)\n\
  \n#### 登录 Skype 应用\n\n创建账户后，您就可以在 iPad 上登录 `Skype` 了。请按照以下步骤操作：\n\n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击\
  \ `Skype` 图标。\n2. 输入您的`Skype 名称`和`密码`。\n3. 点击右上角的`登录`按钮。\n4. 您无需再次输入此登录信息；它已保存在\
  \ `Skype` 中。下次您点击 `Skype` 时，它将自动为您登录。\n\n![images](img/p461-01.jpg)\n\n#### 查找并添加\
  \ Skype 联系人\n\n一旦登录 `Skype` 应用，您就可以开始与他人沟通了。为此，您需要找到他们并将其添加到您的 `Skype` 联系人列表中：\n\
  \n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击 `Skype` 图标，如有提示则登录。\n2. 点击底部的`联系人`软键。\n3. 点击顶部的`搜索`窗口，然后输入某人的姓氏和名字或`SkypeName`。点击`搜索`以查找此人。\n\
  4. 当您看到要添加的人时，点击其姓名。\n\n   ![images](img/p461-02.jpg)\n\n5. 如果您不确定此人是否正确，请点击`查看完整资料`按钮。\n\
  6. 点击底部的`添加联系人`。\n\n   ![images](img/p462-01.jpg)\n\n7. 适当调整邀请信息。\n8. 点击`发送`按钮，向此人发送邀请，使其成为您的\
  \ `Skype` 联系人之一。\n\n   ![images](img/p462-02.jpg)\n\n9. 重复此过程以添加更多联系人。\n10. 完成后，点击底部的`联系人`软键。\n\
  11. 在`群组`屏幕中点击`所有联系人`，即可查看您添加的所有新联系人。\n12. 一旦此人接受您为联系人，您将在`所有联系人`屏幕中看到其名字被列为联系人。\n\
  \n**提示：** 有时您可能需要删除某个 `Skype` 联系人。您可以通过在联系人列表中点击她的姓名来移除或屏蔽该联系人。点击`设置`图标（右上角），然后选择`从联系人中移除`或`屏蔽`。\n\
  \n![images](img/p463-01.jpg)\n\n#### 在 iPad 上使用 Skype 拨打电话\n\n到目前为止，您已经创建了账户并添加了联系人。现在，您终于可以在\
  \ iPad 上通过 `Skype` 拨打第一个电话了：\n\n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击 `Skype` 图标，如有提示则登录。\n\
  2. 点击底部的`联系人`软键。\n3. 点击`所有联系人`以查看您的联系人。\n4. 点击您想要呼叫的联系人姓名（请参见 图 18–5）。\n5. 点击`呼叫`按钮。\n\
  6. 您可能会看到 `Skype` 按钮和`手机`或其他电话按钮。按下 `Skype` 按钮即可拨打免费电话。拨打任何其他类型的电话都需要您使用 `Skype\
  \ 点数` 付费。\n\n![images](img/1805.jpg)\n\n**图 18–5.** *在 iPad 上通过 `Skype` 拨打电话*\n\n\
  **注意：** 您可以使用 iPad 上的 `Skype Out` 免费拨打免费电话号码。以下通知来自 Skype 网站 [`www.skype.com`](http://www.skype.com)：\n\
  \n“以下国家和号码范围受支持，且对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33 800、+33 805、+33 809 波兰：+48 800 英国：+44\
  \ 500、+44 800、+44 808 美国：+1 800、+1 866、+1 877、+1 888 台湾：+886 80。”\n\n#### 使用 Skype\
  \ 切换摄像头\n\n就像在 `FaceTime` 应用中一样，您可以通过“切换”到 iPad 的后置摄像头，向 `Skype` 通话对象展示您周围的环境。\n\
  \n只需点击左上角的`摄像头`软键，然后选择您希望在屏幕上显示`前置摄像头`、`后置摄像头`还是`无摄像头`。\n\n如果您选择`无摄像头`，`Skype` 仍可正常工作，但您只能进行语音通话——没有视频画面。\n\
  \n![images](img/p465-01.jpg)\n\n\n\n"
- "# 在 iPad 上使用 Skype 接听电话\n\nApple 的 `iOS` 系统原生支持后台网络语音 (VoIP) 通话。借助最新版本的 `Skype`，你可以让\
  \ `Skype` 在后台运行，并且仍然能够在有来电时接听 `Skype` 电话。你甚至（理论上）可以在一次语音通话中接听你的 `Skype` 电话！\n\n\
  **提示：** `Skype` 非常耗电。如果你想给某个在 iPad 上使用 `Skype` 的人打电话，只需给她发一封简短的邮件，或者快速打个电话提醒她，你想通过\
  \ `Skype` 应用和她通话。\n\n## 购买 Skype 点数或月度订阅套餐\n\n`Skype` 用户之间通话是免费的。但是，如果你想通过 `Skype`\
  \ 拨打对方的座机或手机，则需要购买 Skype 点数或购买月度订阅套餐。如果你尝试在 `Skype` 应用内购买点数或订阅，它会跳转到 Skype 网站。因此，我们建议使用\
  \ iPad 上的 `Safari` 或电脑上的网页浏览器来购买这些点数。\n\n**提示：** 你可能想先从少量的 Skype 点数开始，试用一下服务，然后再注册订阅套餐。如果你打算使用\
  \ `Skype` 应用与大量非 Skype 用户（例如，普通座机和手机）通话，那么订阅套餐会是更好的选择。\n\n按照以下步骤使用 `Safari` 购买 Skype\
  \ 点数：\n\n1.  点击 `Safari` 图标。\n2.  在顶部的地址栏中输入 [`www.skype.com`](http://www.skype.com)，然后点击\
  \ `Go`。\n3.  点击页面顶部的 `Sign In` 链接。\n4.  输入你的 `Skype Name` 和 `Password`，然后点击 `Sign\
  \ me in`。\n5.  如果你尚未进入 `Account` 界面，请点击顶部导航栏右侧的 `Account` 标签页。\n6.  此时，你可以选择购买点数或订阅：\n\
  \    *   点击 `Buy pre-pay credit` 按钮购买固定金额的点数。\n    *   点击 `Get a subscription` 按钮购买月度订阅账户。\n\
  7.  最后，根据所选的购买类型完成付款指示。\n\n## 使用 Skype 聊天\n\n除了拨打电话，你还可以通过文本与 iPad 上的其他 `Skype`\
  \ 用户聊天。开始聊天与开始通话非常相似；按照以下步骤操作：\n\n1.  如果你还未进入 `Skype`，请从 `Home` 屏幕点击 `Skype` 图标，如有提示则登录。\n\
  2.  点击底部的 `Contacts` 软键。\n3.  点击 `All Contacts` 查看你的联系人。\n4.  点击你想聊天的联系人的名字（参见 图\
  \ 18–6）。\n5.  点击 `Chat` 按钮。\n6.  输入你的聊天文本，然后按 `Send` 按钮。你的聊天内容将出现在屏幕顶部。\n\n![images](img/1806.jpg)\n\
  \n**图 18–6.** *在 iPad 上使用 `Skype` 聊天*\n\n## 将 Skype 添加到你的电脑\n\n你也可以在电脑上使用 `Skype`\
  \ 应用。接下来我们将向你展示如何操作。如果你还连接了网络摄像头，还可以使用 `Skype` 在电脑上进行视频通话。\n\n要创建 Skype 账户并为你的电脑下载\
  \ `Skype` 软件，请按照以下步骤操作：\n\n1.  在你的电脑上打开网页浏览器。\n2.  访问 [`www.skype.com`](http://www.skype.com)。\n\
  3.  点击页面顶部的 `Join` 链接。\n4.  通过填写所有必填信息并点击 `Continue` 按钮来创建账户。请注意，你只需输入标记有星号的必填字段的信息。例如，你不需要输入性别、出生日期和手机号码。\n\
  5.  现在，账户设置过程就完成了。接下来，你会看到购买 Skype 点数的选项；不过，对于免费的 `Skype` 电话、视频通话和聊天来说，这不是必需的。\n\
  \n    **提示：** 只有当你想要给未使用 `Skype` 的人打电话时，才需要为 `Skype` 付费。例如，拨打座机或手机（未使用 `Skype`）的电话会产生费用。在本书出版时，即付即用费率约为每分钟\
  \ 2.1 美分；月度订阅费用根据不同的通话套餐，大约在 3 到 14 美元之间。\n\n6.  接下来，点击网站顶部导航栏中的 `Get Skype` 链接，将\
  \ `Skype` 下载到你的电脑。\n7.  点击 `Get Skype for Windows` 按钮或 `Get Skype for Mac` 按钮。\n\
  8.  按照说明安装软件。\n9.  软件安装完成后，启动它并使用你的 Skype 账户登录。\n10.  你现在可以开始向任何使用 `Skype` 的人发起（或接听）电话、视频通话和聊天了，包括所有在\
  \ iPad 上使用 `Skype` 的朋友。\n\n"
- '# 第 19 章


  '
- '# 生产力与文件传输


  你已经知道你的 iPad 非常适合消费或享受内容。它是你的音乐播放器、视频播放器和游戏机；它还能为你带来新闻、天气、体育等信息。不过，iPad 不仅仅用于娱乐和游戏。在本章中，我们将介绍
  Apple 的三款生产力强效应用：`Pages`（与 `Microsoft Word` 兼容）、`Keynote`（与 `Microsoft PowerPoint`
  兼容）和 `Numbers`（与 `Microsoft Excel` 兼容）。


  如果你是一位 Mac 用户，你可能已经熟悉作为 `iWork for Mac` 套件一部分的 `Pages`、`Keynote` 和 `Numbers`。在你的
  iPad 上使用这三个应用，你可以创建内容——而不仅仅是消费内容。


  ![images](img/p469-01.jpg)


  每个应用都内置了出色的创意工具，并且都能生成专业的、兼容 `Microsoft Office` 的文档，之后你可以通过电子邮件发送、上传到在线账户或在 iPad
  上演示这些文档。


  ### 文件传输选项


  一旦你开始在 iPad 上处理文件，你就会想知道如何传输你在 iPad 上创建的文件，或者如何将文件从电脑或其他地方传输到你的 iPad。在本章中，我们总结了一些文件传输选项（参见
  表 19–1）。其中一些选项将在本书的其他地方详细描述，而另一些应用将在本章中进行介绍。


  ![images](img/t1901.jpg)


  当然，你始终可以通过电子邮件将文件传入或传出 iPad，但这通常只适用于数量有限或体积较小的文件。有时，文件太大而无法作为电子邮件附件发送。这时，你就需要诸如
  `DiskAid` 或 `Dropbox` 之类的文件传输解决方案。


  接下来，我们将介绍两种文件传输选项：`DiskAid`，它通过 USB 数据线将 iPad 连接到电脑来工作；以及 `Dropbox`，它提供无线文件传输。




  '
- '# DiskAid 文件传输


  如果你更喜欢使用 USB 连接线，并且希望能够真正访问 iPad 上的所有文件，包括电子表格、文字处理文档、演示文稿文件、图片、视频，甚至是 FaceTime
  通话记录、语音备忘录和备忘录等内容，那么 `DiskAid` 是一个不错的选择。


  `DiskAid` 支持在 PC 和 Mac 上运行。在本文撰写时，你可以下载一个免费试用 14 天的版本。这个试用版让你在支付 9.90 美元购买之前，可以先对软件进行测试。


  你可以直接从 DiskAid 网站获取该软件，网址是 [`www.digidna.net/products/diskaid/download`](http://www.digidna.net/products/diskaid/download)。


  在你的电脑上运行 `DiskAid` 并通过 USB 线将 iPad 连接到电脑后，你应该会看到主屏幕，上面显示了你 iPad 上安装的应用程序（参见 图 19–1）。


  要复制文件，你需要执行以下操作：


  1.  在 `DiskAid` 的左侧栏中选择一个 iPad 应用。在本示例中，我们选择了 `GoodReader`。

  2.  打开一个窗口浏览你电脑中的文件，然后将选中的文件拖放到 `DiskAid` 右侧的主窗口上。

  3.  接着，断开 iPad 的连接并检查该应用（此处为 `GoodReader`）。你应该能看到刚刚拖放过来的文件。


  **提示：** 要将文件从 iPad 复制到电脑，请执行相反的操作——将文件从 iPad 拖放到你的电脑文件夹中。你也可以通过选中 `DiskAid` 中的文件，然后按电脑键盘上的
  `Delete` 键来删除 iPad 上的文件。


  ![images](img/1901.jpg)


  **图 19–1.** *使用 `DiskAid` 复制文件*


  '
- '# Dropbox 文件传输


  `Dropbox` 与 `DiskAid` 在一些方面有所不同。首先，它是无线的；无需 USB 连接线连接到电脑。其次，`Dropbox` 不仅允许你在 iPad
  和电脑之间同步文件，还能在多台电脑（例如 Windows、Mac 和 Linux）以及 Dropbox 网站之间同步文件。第三，你需要在 iPad 和电脑上都安装一个应用。好处是你可以免费存储和传输最多
  2 GB（千兆字节）的文件。如果你想存储多达 50 GB 的文件，价格是 9.99 美元/月或 99.00 美元/年。还有更大的存储方案可供选择。


  **提示：** 使用 `Dropbox`，你还可以通过 PIN 码来保护你的文件，以进一步增强安全性。这意味着你可以在移动设备上安全地存储和访问个人信息、税务信息和个人照片。


  请按照以下步骤在 iPad 上使用 `Dropbox`：


  1.  注册一个免费账户，并从 [`www.dropbox.com`](http://www.dropbox.com) 下载电脑（PC 或 Mac）应用。

  2.  接着，前往 iPad 上的 App Store，找到并下载免费的 `Dropbox` 应用。

  3.  使用你首次设置账户时创建的用户名和密码登录 iPad 上的 `Dropbox`。

  4.  你拖入电脑 `Dropbox` 文件夹的任何文件或文件夹，都将无线同步到 iPad 上的 `Dropbox` 应用（参见 图 19–2）。


  ![images](img/1902.jpg)


  **图 19–2.** *使用 `Dropbox` 复制文件*


  放入 iPad 上 `Dropbox` 应用的文件，也会出现在电脑的 Dropbox 文件夹中，以及 [`www.dropbox.com`](http://www.dropbox.com)
  网站上。换句话说，重要文件会在 [`www.dropbox.com`](http://www.dropbox.com) 上自动备份。


  你甚至可以与其他人（比如同事、朋友或家人）分享你 Dropbox 账户中的特定文件夹。这是一种分享大小文件的绝佳方式，因为你无需担心发送电子邮件附件时有时会遇到的大小限制。


  现在你已经了解了如何在 iPad 之间传输大小文件的基本知识，可以开始探索一些高效的办公应用了。


  '
- '# 办公应用


  正如我们之前提到的，使用 `Pages` 作为文字处理器，`Numbers` 作为电子表格，`Keynote` 进行演示，可以极大地提升你在 iPad 上的移动办公效率。


  ## 下载 Pages、Keynote 和 Numbers


  `Pages`、`Keynote` 和 `Numbers` 都可以在 App Store 购买和下载。在本文撰写时，每个应用的价格为 9.99 美元。


  最简便的方法可能是在右上角的 `Search`（搜索）窗口中输入 `Pages` 来查找。


  接下来，在 `Pages` 下载页面中，通过查看左下角 `More iPad Apps by Apple`（更多 Apple 出品的 iPad 应用）部分来找到
  `Keynote` 和 `Numbers`。


  ![images](img/p474-01.jpg)


  '
- '# 使用 Pages


  `Pages` 是 Apple 的文字处理程序。如果你使用 Mac，你会熟悉 Pages 程序的布局和功能。虽然它并非旨在完全替代桌面文字处理器，但 `Pages`
  功能相当强大，可以让你编辑和创建出非常专业的文档。


  使用 `Pages`，你不仅可以创建文档；还可以通过电子邮件发送它们，或将其上传到在线账户，以便轻松查看、共享和打印。


  ## 首次使用 Pages


  当你首次启动 `Pages` 时，你会看到一个名为“Getting Started”的示例文档。这是了解 `Pages` 许多功能的一个很好的教程。我们建议你通读此文档，了解与
  `Pages` 相关的各种样式、对象和工具栏。


  ![images](img/p475-01.jpg)


  要开始一个新文档，请触摸底部的 `New Document`（新建文档）按钮。当你触摸 `New Document` 按钮时，你可以选择从头开始创建新文档，或者复制当前显示的文档。


  ![images](img/p475-02.jpg)


  **提示：** 如果你想把现有文档用作模板，选择 `Duplicate Document`（复制文档）会很有用。否则，请选择 `New Document` 来创建新文档。


  ## 选择新文档模板


  当你选择 `New Document` 时，有 16 个可用的模板供你选择。这些模板都是通用型的，比如 `Poster`（海报）、`Proposal`（提案）或
  `Term Paper`（学期论文）。你可以选择从一个模板开始（这可能会使格式设置更容易），或者直接选择 `Blank`（空白）（位于左上角）从空白页开始（参见
  图 19–3）。


  模板中的所有内容都可以更改或调整，所以请大胆尝试。


  **注意：** 对于需要特定格式和外观的文档（如简历和信函），模板非常有用。


  一旦做出选择，你就可以开始编写和编辑，将模板变成完美的文档。


  ![images](img/p476-01.jpg)


  ![images](img/1903.jpg)


  **图 19–3.** *`Pages` 中的页面布局*


  ## 使用工具和样式


  与大多数文字处理器一样，`Pages` 为你提供了许多为文档添加各种样式的选项。内置工具栏让你可以轻松访问自定义文档的大部分功能。


  右上角工具栏上有四个特定的按钮，它们在你的写作中会非常有用：`Information`（信息）、`Picture/Object`（图片/对象）、`Tools`（工具）和
  `Full Screen`（全屏）。


  ![images](img/p477-01.jpg)




  ### 信息按钮


  只有在选中文本或其他项目（如图形）后，`信息`按钮才会生效。


  ![images](img/p477-02.jpg)


  此按钮可让您完成以下操作：


  - 设置特定样式，例如标题、副标题或说明文字

  - 更改字体、字号或颜色

  - 更改带有项目符号和编号的列表的设置

  - 更改对齐方式/两端对齐和行间距


  请按照以下步骤调整文档中的样式：


  1. 在文档中选择文本。

  2. 轻点`信息`按钮。

  3. 轻点`样式`按钮。

  4. 滚动列表以选择合适的样式，然后触摸该样式。此时，您选择的样式旁边会出现一个`对勾`图标。


  您还可以通过触摸相应的按钮来添加**粗体**、*斜体*、下划线或`删除线`。


  ![images](img/p478-01.jpg)


  '
- '# 选择文本以应用样式或剪切/复制


  您选择的样式可以应用于接下来要输入的文本，也可以应用于文档中已有的选定文本。


  请按以下步骤选择已输入的文本：


  ![images](img/p478-02.jpg)


  1. 双击以选择一个单词。

  2. 三击以选择一个段落。


  请按以下步骤选择`Pages`模板中的文本：


  1. 按住一个单词以将其选中。

  2. 双击以选择一个段落。


  选定文本后，使用工具栏或`信息`（`i`）按钮选择要应用于所选文本的样式，如图所示。


  #### 图片/对象按钮


  在`信息`按钮旁边，您会找到`图片/对象`按钮。触摸此按钮可将媒体、表格、图表或形状插入到文档中。


  首次触摸此按钮时，您将看到`媒体`选项卡高亮显示，并且您的所有相册都可见。


  要选择照片，请浏览可用的相册，然后选择要使用的照片。


  要向文档添加表格，请触摸`表格`选项卡，并从显示的多种表格格式中进行选择。


  ![images](img/p479-01.jpg)


  **注意：** 表格共有六个屏幕；请从右向左滑动以浏览这些屏幕。


  请按照以下步骤插入图表：


  1. 触摸`图表`选项卡并滑动浏览屏幕。

  2. 轻点您想要插入的图表。


  请按照以下步骤编辑图表背后的数据（参见图 19–4）：


  1. 双击图表，使其翻转过来，显示一个数据表。

  2. 输入创建图表所需的数据。

  3. 完成后按右上角的`完成`，即可看到更新后的图表。


  ![images](img/p479-02.jpg)


  ![images](img/1904.jpg)


  **图 19–4.** *如何在`Pages`中编辑图表数据*


  请按以下步骤插入形状：


  1. 触摸`形状`选项卡并滑动浏览屏幕。

  2. 轻点您想要插入的形状。


  请按以下步骤移动或调整形状大小：


  1. 按住形状以在页面上拖动。

  2. 触摸两个角点，捏合或张开以使其变小或变大。

  3. 将两根手指放在形状内部并旋转，以旋转该形状。


  ![images](img/p480-01.jpg)


  要移动或调整图片、图表或对象的大小，只需轻点一次以调出蓝色圆点。按住该对象并在页面上将其移动到任意位置。您会注意到，当您移动对象时，文本会围绕对象重新排列。


  ![images](img/p481-01.jpg)


  **提示：** 要更改或调整文本绕排，只需在图片或对象高亮显示时触摸`信息`按钮，然后选择`排列`。触摸`绕排`按钮，并为文本绕排选择一种样式。


  ## 工具按钮（打印、查找、设置和帮助）


  在`图片/对象`按钮旁边是`工具`按钮。触摸此按钮可访问`查找`、`打印`、`文稿设置`、`设置`和`前往帮助`工具。


  ![images](img/p481-02.jpg)


  `设置`选项允许您打开或关闭`拼写检查`选项，并选择是否显示各种功能：`字数统计`、`中心参考线`和`边缘参考线`。


  ![images](img/p482-01.jpg)


  触摸`文稿设置`工具，您将看到一个类似蓝图的界面。要添加或编辑页眉或页脚，请触摸`轻点以编辑页眉/页脚`按钮。


  要调整页边距，只需从页面侧面或顶部和底部拖动三角形即可。


  调整完毕后，只需触摸左上角的`完成`按钮即可。


  ![images](img/p482-02.jpg)


  ![images](img/p482-03.jpg)


  要隐藏所有工具栏，专注于空白的书写屏幕，请触摸右上角的`全屏`图标。要再次启用工具栏，只需轻点屏幕即可。


  ## 样式按钮和标尺


  `样式`按钮和标尺仅在您处于可编辑文本的字段中时可见。只需触摸屏幕上任何可以输入或编辑文本的位置，您就会在顶部看到标尺（参见图 19–5）。


  **注意：** 如果将 iPad 切换到`横向`模式，菜单和样式栏会消失。要恢复菜单和样式栏，请将 iPad 旋转回`纵向`模式。


  在标尺的两端，都有用于制表符和缩进的滑动导轨。只需滑动即可调整文档的页边距和制表位。


  ![images](img/1905.jpg)


  **图 19–5.** *`样式`按钮*


  在标尺上方，您会找到许多与触摸`信息`按钮时看到的相同的按钮。您可以通过触摸相应的按钮来调整段落和字符样式；对齐或两端对齐文本；以及设置制表位、分页符和分栏符。


  '
- '# 导航器


  `导航器`是内置于`Pages`中的一个非常酷的工具。请按照以下步骤使用它：


  1. 将手指放在页面的右边缘，并慢慢向下或向上拖动。

  2. 会出现一个小的`放大镜`图标，并附有文档页面的“快照”。

  3. 每向下移动一点，就会显示下一页。

  4. 当找到您想要阅读或编辑的页面时，将手指从屏幕上移开，您就会跳转到该页面。


  ![images](img/p483-01.jpg)


