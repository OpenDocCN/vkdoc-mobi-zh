  表 2 提供了一些快速链接，帮助您将 iPad 连接到网络（使用 Wi-Fi 或 3G）、购买和欣赏歌曲或视频（`iTunes`、`iPod` 和 `视频`）、退出应用、休眠、关机、解锁
  iPad、使用电子相框功能等等。


  ![Image](img/p18-01.jpg)


  ### 保持条理


  表 3 为您提供了从整理和查找联系人到管理日历，从阅读和回复电子邮件到获取驾车路线等各方面的链接。


  ![Image](img/p19-01.jpg)


  ### 享受娱乐


  您的 iPad 能带来无穷乐趣；表 4 将向您展示如何实现。您可以购买或租赁电影，通过 `Pandora` 收听免费的互联网广播，还可以使用 `iBooks`
  购买书籍并以全新的方式享受阅读。如果您已经在使用 Kindle，可以将所有 Kindle 书籍同步到您的 iPad 上立即阅读。从 App Store 超过 35
  万个应用中进行选择，让您的 iPad 变得更加出色、有趣和实用。从 Netflix 或 iTunes 服务中租赁一部电影并立即下载，以便稍后观看（例如在飞机或火车上）。如果您有喜欢的
  ABC 电视节目，很有可能您可以通过 `ABC` 应用找到并观看它。


  ![Image](img/p20-01.jpg)


  ![Image](img/p21-01.jpg)


  ### 保持资讯灵通


  您还可以使用 iPad 来保持信息灵通。例如，您可以用它来阅读您喜爱的杂志或报纸，其中包含最新的、生动的图片和视频（参见表 5），或者以前所未有的方式查看最新天气。您能做的远不止浏览网页——您还可以使用
  iPad 上的 `Safari` 与之进行交互。


  ![Image](img/p22-01.jpg)


  ### 社交网络


  您的 iPad 还允许您使用各种社交网络工具与朋友、同事以及专业人脉保持联系并获取最新动态（参见表 6）。


  ![Image](img/p23-01.jpg)


  ### 高效工作


  您可以使用 `Pages`、`Numbers`、`Keynote` 应用以及 iPad 的触摸屏界面来处理文档、电子表格和演示文稿文件。您只需用手指拖拽、展开或旋转，即可在文档和演示文稿中调整图像大小、旋转或移动位置。您可以使用
  `GoodReader` 应用访问和阅读几乎任何 PDF 文件或其他文档。您还可以使用基础的 `笔记` 应用做笔记，或升级到功能强大的 `Evernote` 应用，该应用具有整合音频、图片和文本笔记的惊人能力，并能将所有内容同步到一个网站（参见表
  7）。


  ![Image](img/p24-01.jpg)


  ![Image](img/p25-01.jpg)


  ## 其他有趣的功能


  iPad 可以作为一个绝佳的电子相框——我们在此为您介绍基本用法。您也会爱上它作为视频播放器的表现！在本节中，我们为您提供一些关于操作视频和音乐播放器的快速技巧，以及如何充分利用嵌入在网页中的视频。


  ### 将 iPad 用作电子相框


  您可能想知道当锁定 iPad 时，“滑动来解锁”开关旁边那个小小的`花朵`图标是做什么用的。点击它即可启动电子相框功能——这是与他人分享照片或单纯欣赏自己照片的好方法。要使用电子相框功能，您需要执行以下操作：


  1.  使用 `iTunes` 将您的照片加载到 iPad 上（参见第 3 章：“将 iPad 与 iTunes 同步”中的“照片——自动同步”部分）。

  2.  轻点`相框`图标以开启电子相框功能。

  3.  再次轻点该图标以关闭此功能。


  ![Image](img/p25-02.jpg)


  电子相框会循环播放您所有的照片，也可以设置成仅显示选定的相册。


  **提示：** 您可以自定义相框的运作方式、选择特定相册等。请参阅第 6 章：“个性化与保护您的 iPad”中的“个性化您的相框”部分。


  ### 操作您的音乐和视频播放器


  播放歌曲或视频时，只需轻点屏幕中央任意位置，即可显示或隐藏屏幕顶部的控制项，如图 12 所示。


  ![images](img/p26-01.jpg)


  **图 12.** *操作您的音乐和视频播放器。*


  ### 在网页中观看视频


  一件非常有趣的事情是直接在网页中观看支持的视频格式。遗憾的是，iPad 不支持许多网站使用的 Adobe Flash 视频格式。但仍有许多视频可供观看，例如《纽约时报》网页首页上的视频，如图
  13 所示。请按照以下步骤在该网站的网页中观看视频：


  1.  轻点 `Safari` 图标。

  2.  轻点顶部的地址栏并输入：[`www.nytimes.com`](http://www.nytimes.com)。

  3.  找到并轻点任意视频；通常您会在图片中央看到一个像这样的`播放`图标 ![images](img/p27-01.jpg)。

  4.  视频将直接在网页中开始播放。

  5.  要将视频扩展至全屏，请在视频内部张开双指。将两个手指放在视频上，并在屏幕上滑动的同时展开手指。

  6.  要以宽屏模式观看视频，请将 iPad 倾斜至`横屏`模式。


  ![images](img/p27-02.jpg)


  **图 13.** *如何在网页中欣赏视频。*


