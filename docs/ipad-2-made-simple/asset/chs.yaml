- '# 引言


  欢迎使用全新的 iPad 2——以及这本告诉您如何充分利用它所需了解一切的书。在本部分中，我们将向您展示本书的组织方式，以及如何找到您需要的内容。我们甚至向您展示如何通过简短的电子邮件将一些绝佳的技巧和秘诀直接发送到您的
  iPad 2，以及在哪里可以找到简短、切中要点的视频教程，以便更深入地了解您的 iPad。


  '
- "# 引言\n\n![Image](img/p35-01.jpg)\n\n### 恭喜您拥有 iPad 2！\n\n您手中的是全新增强版的 iPad 2——比初代\
  \ iPad 更小、更薄、更强大。它可以说是当今市面上功能最强大、最优雅的媒体播放器、电子书阅读器、游戏机、生活管理工具，几乎无所不能。\n\niPad 2 可以完成您在电脑上所做的近\
  \ 90% 的工作——而且体验更佳。iPad 2 还可以完成您在智能手机上能做的几乎所有事情。您甚至可以通过 Apple 专有的 **FaceTime** 应用或\
  \ **Skype** 应用，从 iPad 2 进行视频通话。然而，iPad 既不是电脑也不是智能手机——它介于两者之间，恰是我们许多人的日常使用之选。\n\n\
  **注意：** 请查看第 18 章：“FaceTime 视频通话与 Skype”，其中我们将向您展示如何在 iPad 上使用 **FaceTime** 和 **Skype**！\n\
  \n使用您的 iPad，您可以查看照片，并使用与 iPhone 或 iPod touch 相同的触控手势与之交互。您可以捏合缩放、旋转以及通过电子邮件发送照片——所有这些都只需简单的轻点手势。\n\
  \n您还可以以前所未有的方式与内容互动。报纸看起来和读起来既像报纸又像网站，浑然一体。您可以浏览故事、视频和图片，并与新闻互动。\n\n在 iPad 上阅读时，您会真正感觉像在读一本书。翻页可以慢速或快速（当您使用\
  \ **iBooks** 应用时，甚至可以在翻页时看到页面背面的文字）。\n\n您可以以前所未有的方式管理您的媒体库。**iTunes** 和 **iPod**\
  \ 应用在 iPad 上拥有精美的界面。在大尺寸、高清质量的屏幕上，选择音乐、观看视频、整理播放列表等操作变得轻松而有趣。\n\n您有 Netflix 帐户吗？您可以在精美的\
  \ iPad 显示屏上观看您最喜爱的电视节目和电影。您还可以直接在 iPad 上管理内容和整理您的播放队列。\n\n您也无需再在智能手机的小屏幕上更新您的 Facebook\
  \ 状态——有了 iPad，您可以在大屏幕上浏览网站，并访问桌面版网站的许多功能，同时还能利用 iPad 的触摸屏以前所未有的方式与 Facebook 互动。\n\
  \n最后，通过内置的 Wi-Fi 连接或可选的 3G 连接，您可以随时与网络和电子邮件保持连接。支持所有最新的高速协议，因此您可以随时保持联系并获取最新内容。当您在**横向**模式下使用\
  \ iPad 时，甚至还有一个近乎“全尺寸”的键盘用于输入电子邮件。\n\n### 充分利用 *iPad 2 Made Simple* 这本书\n\n本书可以从头到尾通读，但您也可以按章节或章节内的主题进行模块化阅读。也许您只是想了解\
  \ **App Store**，试试 **iBooks** 应用，或者设置您的电子邮件或通讯录。又或者您只想加载音乐。通过我们的书，您可以做到所有这些，甚至更多。\n\
  \n您很快就会意识到您的 iPad 2 是一个功能非常强大的设备。然而，本书中还有许多“锁在”内部的秘密，我们将帮助您“解锁”它们。\n\n慢慢来——这本书可以帮助您学习如何最好地使用、操作并享受您的新\
  \ iPad。回想一下您第一次尝试使用 Windows 或 Mac 电脑时的情景。熟悉操作方法需要一点时间。iPad 也是如此。使用本书帮助您快速上手，并更快地学习所有最佳技巧和秘诀。\n\
  \n请记住，如此强大的设备一开始并不总是那么容易掌握。\n\n如果您每次阅读书中的一个部分，然后尝试您读到的内容，您将从 iPad 中获得最大收益。我们都知道，阅读后进行实践的记忆保持率远高于单纯阅读。\n\
  \n因此，为了学习和记住您所学的内容，我们建议您执行以下操作：\n\n***读一点，在您的 iPad 上试一点，然后重复！***\n\n### 本书的组织方式\n\
  \n了解本书的组织方式将帮助您更快地找到对您重要的内容。这里我们向您展示本书的主要组织结构。请记住利用我们的精简目录、详细目录以及全面的索引，帮助您快速定位感兴趣的内容。\n\
  \n\n\n#### iPad 用户的日常\n\n翻开书籍的前后封面，你会发现一条条便于查阅、相互参照的章节编号所构成的精妙资讯。因此，若你看到想学的内容，只需翻到对应章节，数分钟内即可掌握。\n\
  \n#### 第 1 部分：快速入门指南\n\n快速入门指南的第 1 部分涵盖以下主题：\n\n- **触摸屏基础：** 大量视觉效果图助你快速学会在 iPad\
  \ 触摸屏上进行触摸、滑动、轻拂、缩放等操作。\n- **应用参考表格：** 按分类快速浏览图标或应用。在可跳转至本书详述各应用详解章节的列表旁，你将看到所有`iPaddo`应用的缩略图。\n\
  - **其他趣味功能：** 了解 iPad 作为音乐播放器、视频播放器和电子相框的用法。\n- **iPad 配件：** 简要概述键盘、摄像头等常见配件，以及用于将\
  \ iPad 连接至高清电视的新型数字影音转换器。（详见第 1 章更多配件信息。）\n\n#### 第 2 部分：引言\n\n你现在正身处此处……\n\n####\
  \ 第 3 部分：你与你的 iPad\n\n这是本书的核心内容，共 28 个易于理解的章节，配有大量插图全程指引你每一步操作。\n\n#### 第 4 部分：iPad\
  \ 的灵魂伴侣——iTunes\n\n作为给读者的特别赠礼，我们在第 29 章中提供了详尽的 iTunes 用户指南，教你如何熟练运用`iTunes`并探索这款桌面应用的全部潜能。你对`iTunes`越熟悉，就越能在\
  \ iPad 上更好地整理和使用电脑中的内容，从而获得更愉悦的用户体验。\n\n##### 快速定位提示、警告和注意事项\n\n翻阅本书时，你一眼就能根据格式识别出提示、警告和注意事项。例如，若你想查找所有日历相关的提示，只需翻到**日历**章节就能快速找到。\n\
  \n**提示、警告**和**注意事项**均采用这种灰色背景的格式，方便你快速识别。\n\n##### iPad 邮件提示与视频教程\n\n请访问作者网站[`www.madesimplelearning.com`](http://www.madesimplelearning.com)，获取一系列非常实用的“碎片化”iPad\
  \ 技巧与窍门。我们从本书中精选了一些优秀技巧，并额外添加了一些新内容。点击“免费技巧”栏目并注册，即可在 iPad 收件箱中每周收到一条技巧。碎片化学习是掌握\
  \ iPad 的绝佳方式！\n\n有时候，观看视频比阅读文字更容易理解概念。作者深谙此道，正在忙于为此书制作配套视频教程系列。请访问[`www.madesimplelearning.com`](http://www.madesimplelearning.com)或发邮件至`info@madesimplelearning.com`，了解更多关于\
  \ iPad 视频教程的信息。\n\n## 第 III 部分\n\n### 你与你的 iPad 2……\n\n这是《iPad 2 化繁为简》的核心部分。在本部分中，你将看到标签清晰的章节，每一章都阐释了\
  \ iPad 2 的关键功能。你会发现大部分章节专注于单个应用或特定类型的应用。许多章节讨论了 iPad 2 自带的应用，但也包含了一些可从 App Store\
  \ 下载的有趣且实用的应用。当然，iPad 2 是为了娱乐而生，但它的用途远不止于此。最后，我们还提供了一些实用的故障排除技巧，以防你的 iPad 2 出现异常。\n\
  \n## 第 1 章\n\n### 开始使用\n\n在本章中，我们将带你逐步熟悉 iPad 2，从充电到首次激活`iTunes`应用。在本章末尾的“iPad 基础”部分，我们将展示在\
  \ iPad 上进行基本操作的方法，让你能快速上手并运行。\n\n### 认识你的 iPad 2\n\n在本部分中，我们将向你展示如何使用 iPad 2 包装盒内的所有物品。同时，我们还会提供一些\
  \ iPad 电池和充电技巧，帮助你判断 iPad 是否已激活，并介绍**滑动来解锁**功能。\n\n#### 包装盒内有什么\n\n装有 iPad 2 的纸盒仅比\
  \ iPad 本身稍大一些；如果你初次接触苹果产品，可能会觉得包装略显单薄。然而，里面确实包含了上手使用 iPad 2 所需的一切——除了一本好的用户手册，而这也正是我们撰写本书的原因！\n\
  \n打开盒子后，最上面映入眼帘的就是你崭新的 iPad 2。\n\n在 iPad 下方的塑料支架下，你会发现一本纸质小册子，上面印着“加州苹果设计”。包装盒内还包含以下物品：\n\
  \n- **一页参考指南**：只有一页？！没错——正反两面仅一页！正面展示了按钮位置，背面则要求你下载`iTunes`并将 iPad 连接到电脑以开始使用。\n\
  - **iPad 产品信息指南**：这是一本小册子，字体小到难以阅读。里面包含了与 iPad 相关的所有法律条款、条件、警告和免责声明。\n- **苹果标志贴纸**：你会得到两张漂亮的白色苹果标志贴纸，有时你会在车窗上看到它们。尽情使用吧！\n\
  \n盒子底部是其余配件，如图 1-1 所示。\n\n![images](img/0101.jpg)\n\n**图 1-1.** *盒子底部的 USB 连接线和壁式充电适配器*\n\
  \n##### 基座接口转 USB 连接线\n\n你的 iPad 包装盒内附带了一条基座转 USB 连接线。这根线用于连接电脑，同时也兼作电源线。\n\n#####\
  \ 壁式充电器（10 瓦）\n\niPad 还附带了一个实用的硬件组件——壁式充电器（见图 1-1）。该适配器让你无需电脑，直接将 iPad 通过墙上插座充电。你只需将基座转\
  \ USB 连接线插入此壁式充电器，另一端连接 iPad 即可。\n\n**提示：** 再购买一个适配器，一个放在家里，一个放在办公室。目前这款充电器在折扣在线商店的售价低于\
  \ 10 美元。\n\n##### 预期电池续航与充电时间\n\n苹果公司表示，配备先进 25 瓦可充电锂聚合物电池的新款、更快的 iPad 2，其电池续航应与原始\
  \ iPad 相同（见表 1-1）。\n\n**表 1-1.** 苹果官方电池续航规格\n\n| **视频与音频播放** | 10 小时 |\n| **网页浏览**\
  \ | Wi-Fi 环境下 10 小时，3G 蜂窝网络下 9 小时 |\n| **充电时间** | 快速充电 2 小时可充至 80%，完全充满需 4 小时 |\n\
  \n以上续航时间是在理想条件下，使用全新充满电的电池得出的。你会注意到，随着时间的推移，实际电池续航会下降。\n\n**提示：** 如果你发现 iPad 电池无法良好保持电量，或远达不到预期的\
  \ 10 小时续航，可以联系苹果更换电池。请访问苹果网站[`www.apple.com/batteries/replacements.html`](http://www.apple.com/batteries/replacements.html)了解如何为\
  \ iPad 获取新电池。本书出版时的费用为 99 美元加运费。\n\n##### 电池与充电技巧\n\n没有什么比在急需使用时电量耗尽更糟糕的事了。关键问题是：如何最大限度地延长电池续航，确保\
  \ iPad 随时待命？以下是一些有用的技巧。\n\n\n\n###### 充分利用每次充电\n\n要延长电池续航时间，请尝试以下技巧：\n\n- **将 iPad\
  \ 置于睡眠模式。** 点击设备右上角的 `电源/睡眠` 按钮，将其置于睡眠模式。\n- **在不使用时关闭 Wi-Fi 或 3G。** 即使未连接 Wi-Fi\
  \ 或 3G 网络，Wi-Fi 和 3G 天线也会消耗电量，因此在不需使用时请关闭它们。点击 `设置`，然后将 `飞行模式` 设为开启。\n- **降低屏幕亮度：**\
  \ 点击 `设置`，然后点击 `亮度与墙纸`。使用滑块将亮度调低至不到一半但仍适合您使用的水平。同时，确保 `自动亮度` 设为开启。\n- **关闭定位服务：**\
  \ 如果您不需要将实际位置传输给应用程序，可以将其关闭。点击 `设置`，然后点击 `定位服务`。将 `定位服务` 设为关闭。如果启动需要您位置的应用程序，系统会提醒您重新开启。\n\
  - **设置较短的自动锁定时间：** 缩短 iPad 在不使用时关闭屏幕并进入睡眠模式的时间，有助于节省电量。操作方法是：点击 `设置`、`通用` 和 `自动锁定`。将\
  \ `自动锁定` 设置为尽可能短的时间——如果您喜欢，可以短至 2 分钟。\n- **关闭推送邮件和推送通知：** 点击 `设置`，然后点击 `邮件、通讯录、日历`。接着点击\
  \ `获取新数据`，并将 `推送` 设为关闭。\n- **了解更多关于电池续航的信息**，并从 Apple 网站 [`www.apple.com/batteries/ipad.html`](http://www.apple.com/batteries/ipad.html)\
  \ 获取更多实用的 iPad 相关技巧。\n\n###### 延长电池使用寿命\n\n可充电电池保持电量的能力会随时间推移而下降，并且在其使用周期内的充放电次数是有限的。您可以通过确保每月至少将电池完全耗尽一次来延长\
  \ iPad 电池的使用寿命。如果定期进行完全放电，可充电电池的寿命会更长。\n\n###### iPad 充电配件\n\n无论您做什么，如果您经常使用 iPad，您会希望找到更多地方和更多方式来为其充电。表\
  \ 1-2 列出了除使用电源线或连接电脑之外的一些其他充电选项。\n\n**表 1-2.** *为 iPad 充电的其他地点和方式*\n\n| 机场充电站 |\
  \ 如今大多数机场都有墙上插座，您可以在候机时给 iPad 充电。有些机场设有指定的充电站，而其他机场只有墙上插座，甚至可能隐藏在椅子或其他物体后面。您可能需要费点功夫，才能抢在那些同样需要充电的旅客前面！\
  \ |\n| 外接电池组 | 这种配件可以将 iPad 的电池续航时间延长两到三倍。您可以用大约 70 到 150 美元的价格购买此类电池组。在网络上搜索“ipad\
  \ 外接电池组”，即可找到最新、最出色的选择。 |\n| 车载充电器 | 如果您白天大量使用 iPad 进行通话，可能想投资一个车载充电器或其他方式，在漫长一天的中途为它补充电量。有些充电器可以通过汽车点烟器插座提供供电的\
  \ USB 接口，而其他充电器则提供一个基座端口连接器，用于插入 iPad 底部。大多数售价约为 15 到 30 美元。 |\n| 车载电源逆变器 | 如果您进行长途汽车旅行，可以购买一个电源逆变器，将\
  \ 12V 汽车电源插座转换为普通电源插座，以便插入 iPad 充电器。在网上搜索“车载电源逆变器”，可以找到许多价格为 50 到 100 美元的选择。 |\n\
  | 其他配件 | 如前所述，您也可以在具有其他功能（如通过扬声器播放音乐）的许多配件中为 iPad 充电。只需寻找插头或闪电图标，以确保您的 iPad 在此类配件中正在充电。\
  \ |\n\n#### 充电与电池小贴士\n\n您的 iPad 可能已有一些电量，但您可能希望将其完全充满，这样便可享受数小时不间断的使用。这段时间恰好可以浏览本章剩余内容、安装或更新\
  \ iTunes，或者在 iTunes App Store 中浏览所有酷炫的 iPad 应用（请参见第 21 章：“令人惊叹的 App Store”）。\n\n\
  基座转 USB 连接线也可兼作充电线。它位于 iPad 下方那个印有“Designed by Apple in California”字样的白色小册子下面。将连接线较宽的一端插入\
  \ iPad 底部（靠近 `主屏幕` 按钮的位置），然后将 USB 连接线的一端插入带有可折叠插头的小白盒。\n\n| 要确保设备正确连接并正在充电，请查看 iPad\
  \ 屏幕右上角电池指示器内的小插头图标。如果屏幕空白，请点击一次 `主屏幕` 按钮点亮屏幕。您会看到此图片右侧电池图标旁边的 100% 字样，这是因为我们进入了\
  \ `设置` ![Image](img/U001.jpg)（`通用` 并将 `电池百分比` 设为开启。 | ![Image](img/p45-01.jpg) |\n\
  \n**将 iPad 连接到电脑时，它会充电吗？**\n\n答案是：“这得看情况。”\n\n当您通过 USB 连接线将 iPad 连接到电脑时，如果在电池图标内看到插头图标，说明\
  \ iPad *正在*充电。大多数 Mac 电脑、部分 Windows 电脑以及部分有源 USB 集线器（一种可购买的插入墙插并带有 USB 端口的配件）在 iPad\
  \ 处于“唤醒”状态（屏幕亮起）时能够提供足够电力为其充电。\n\n当 iPad 处于睡眠模式（屏幕关闭）时，这一点更难判断，因为将 iPad 连接到电脑后，您可能会在电池图标旁看到“未在充电”的信息。在这种情况下，iPad\
  \ 在睡眠模式下很可能仍会充电。您需要亲自用电脑和 iPad 进行试验，才能针对特定情况做出准确判断。我们发现，在使用 Windows 笔记本电脑时，即使 iPad\
  \ 在唤醒状态下显示“未在充电”，它在睡眠模式下也肯定能正常充电。\n\n#### 您的 iPad 激活可能已完成\n\n例如，当您开启 iPad 或点击 `主屏幕`\
  \ 按钮（位于设备底部）时，可能会看到 `滑动以解锁` 屏幕或主屏幕上的图标屏幕。如果是这样，说明您的 iPad 已经激活。如果您看到黑色屏幕上显示需要插入 iTunes\
  \ 的 USB 连接线（参见图 1-3），则说明您仍需激活设备。\n\n#### 滑动以解锁\n\n首次开启 iPad 时，您会看到 `滑动以解锁` 屏幕。只需沿着箭头图标的方向，轻轻向右滑动解锁按钮即可。\n\
  \n完成此操作后，您将看到主屏幕。\n\n您会看到底部程序坞中有四个锁定的图标（参见图 1-2 右下角），而其余图标则可以在底部程序坞上方的 *页面* 中来回移动。了解如何在第\
  \ 7 章：“个性化设置与保护您的 iPad”中的“移动图标”部分，将您喜爱的图标移动到底部程序坞中。\n\n![images](img/0102.jpg)\n\
  \n**图 1-2.** *滑动以解锁、浏览主屏幕以及底部程序坞*\n\n\n\n### iTunes 与您的 iPad\n\n要激活您的 iPad 并加载内容（例如音乐、图片、视频等），您需要将设备连接到电脑上的\
  \ `iTunes` 应用。备份（以及日后恢复）您的 iPad 也需要使用 `iTunes` 应用。\n\n如果您没有 `iTunes` 应用，或者不确定是否拥有最新版本，则需要进行升级。首次将\
  \ iPad 连接到 `iTunes` 服务时，将会激活您的 iPad，或将其与您的 Apple ID 关联。完成此操作后，您就可以直接在 iPad 上或电脑的\
  \ `iTunes` 中购买歌曲、影片、图书以及几乎任何其他内容。\n\n#### 在电脑上安装或更新 iTunes\n\n如果您的 iPad 屏幕上显示一个指向\
  \ `iTunes` 的 USB 插头，那么您需要将 iPad 连接到电脑上的 `iTunes` 应用（请参见图 1-3）。\n\n![images](img/0103.jpg)\n\
  \n**图 1-3.** *显示需要连接至 iTunes 才能开始的 iPad 屏幕*\n\n通常，您需要确保安装了最新版本的 `iTunes` 程序。\n\n\
  如果需要更新程序，请启动 `iTunes`。如果您是 Windows 用户，请选择 `帮助`，然后选择 `检查更新`。如果您是 Mac 用户，请选择 `iTunes`，然后选择\
  \ `检查更新`。按照提供的说明来更新 `iTunes`。\n\n需要详细说明？请参阅第 29 章：“您的 iTunes 用户指南”中的“iTunes 更新”部分。\n\
  \n如果您的电脑上没有安装 `iTunes` 程序，请打开网络浏览器，访问 [`www.itunes.com/download`](http://www.itunes.com/download)。从提供的链接下载该软件。\n\
  \n需要详细说明？同样，请参阅第 29 章：“您的 iTunes 用户指南”中的“如何下载并安装 iTunes”部分。\n\n#### 将 iPad 连接到 iTunes\n\
  \n一旦您安装或升级到最新版本的 `iTunes` 程序，就可以将您的 iPad 连接到电脑上的 `iTunes` 服务了。\n\n**提示：** 使用 `iTunes`\
  \ 应用的“家庭共享”功能，您可以在 iPad 上以及家庭网络中已授权的电脑之间，共享来自同一 iTunes 帐户的已购内容（音乐、应用、视频、iBooks 等）。此外，您可以将任何相同的内容同步到同一\
  \ iTunes 帐户下的任何 iPod/iPhone/iPad。要了解更多关于使用 `iTunes` 同步内容的信息，请参阅第 3 章：“将 iPad 与 iTunes\
  \ 同步”，并了解关于家庭共享的信息，请参阅第 29 章：“您的 iTunes 用户指南”。\n\n通过将 iPad 连接到 `iTunes`，您可以将您的 iPad（通过设备序列号）注册或关联到特定的\
  \ iTunes 帐户（Apple ID）。\n\n**提示：** 这样做的好处是，如果您已为 iPhone 或 iPod touch 购买了应用和其他内容（例如音乐、视频等），那么您可以在\
  \ iPad 上运行其中的大部分应用——尽管屏幕尺寸会稍小一些。请注意，您可以在多个 iTunes 帐户上授权一台 iPad；但是，您同步到该 iPad 的所有内容都必须来自同一台电脑。因此，您需要选择您的“主”电脑来与\
  \ iPad 同步。\n\n如果您还没有 iTunes 帐户（Apple ID），请不要担心——您可以在注册 iPad 时创建一个。\n\n#### 启动 iTunes\n\
  \n如果 `iTunes` 应用尚未运行，请双击桌面上的 `iTunes` 图标：\n\n*   Mac 用户：点击 `Finder` 图标，选择 `前往` 菜单，然后选择\
  \ `应用程序` 以查找 `iTunes`（快捷键：`Shift`+`Command`+`A` 用于打开 `应用程序`）。\n*   Windows 用户：点击左下角的\
  \ `开始` 菜单或 `Windows` 徽标，选择 `所有程序`，然后选择 `iTunes`。\n\n#### 首次注册您的 iPad\n\n一旦 `iTunes`\
  \ 应用已安装或更新并在电脑上运行，您就可以准备首次连接您的 iPad 并进行注册或激活了。完成这些操作后，您就可以开始使用您的新 iPad 了。\n\n**注意：**\
  \ 如果您的 iPad 已经注册，您可以跳过此注册部分，直接跳至本章后面的“设置您的 iPad”部分。如果您在屏幕底部看到 `滑动来解锁`，或者在按下设备底部的\
  \ `主屏幕` 按钮时看到图标屏幕，则表明您的 iPad 已经注册。\n\n请按照以下步骤连接您的 iPad 并进行注册或激活：\n\n1.  将 iPad 附带的白色\
  \ USB 连接线插入电脑上的可用 USB 端口。\n\n    **注意：** 首次将 iPad 连接到电脑时，Windows 电脑应会自动安装必要的驱动程序。如果您使用的是\
  \ Mac 电脑，根据您安装的操作系统版本，Apple 可能会建议您在开始使用 iPad 之前，先将操作系统升级到最新版本。\n\n2.  点击 iTunes\
  \ 左侧栏中 `设备` 下的 `iPad`，以开始操作。\n3.  如果您尚未注册 iPad，您应该会看到一个 `欢迎` 屏幕（请参见图 1-4）。点击 `继续`\
  \ 以开始注册您的 iPad。\n\n    ![images](img/0104.jpg)\n\n    **图 1-4.** *`iTunes` 中的 iPad\
  \ `欢迎` 屏幕*\n\n4.  接下来您会看到 `iPad 软件许可协议`。\n5.  如果您同意这些法律条款，请勾选标有 `我已阅读并同意 iPad 软件许可协议`\
  \ 的方框，并点击 `继续` 按钮。\n6.  接下来，您将有机会使用您的 Apple ID 登录，或创建一个新的 Apple ID。输入您的 Apple ID\
  \ 和密码，或者点击 `我没有 Apple ID` 并选择您的国家/地区（请参见图 1-5）。\n\n    ![images](img/0105.jpg)\n\
  \n    **图 1-5.** *`iTunes` 中的 `Apple ID` 屏幕*\n\n7.  点击 `继续` 按钮。\n    *   如果您尝试输入\
  \ Apple ID 和密码后收到一条错误信息，提示“需要额外的安全信息”，请阅读第 29 章：“您的 iTunes 用户指南”中的“故障排除：修复 Apple\
  \ ID 安全错误”部分。\n8.  现在您应该会看到 `注册您的 iPad` 屏幕（请参见图 1-6）。\n\n    ![images](img/0106.jpg)\n\
  \n    **图 1-6.** *iTunes 中的 `注册您的 iPad` 屏幕*\n\n9.  输入或核验您的信息是否正确，然后点击 `提交` 以完成注册。\n\
  \n\n\n#### 设置“查找我的 iPad”服务\n\n注册 iPad 后，您可能会看到一个类似的屏幕，询问您是否要设置免费的“查找我的 iPad”服务（参见图\
  \ 1-7）。点击**设置“查找我的 iPad”**按钮，然后按照屏幕上的说明开始操作。这项服务让您能够通过 MobileMe 苹果网站 ([`http://me.com`](http://me.com))\
  \ 定位您的 iPad（只要它处于开机状态并连接到网络）。\n\n**提示：** 请查阅第 4 章：“其他同步方法”中的 MobileMe 服务详细说明，以了解该服务的各项功能。\n\
  \n![images](img/0107.jpg)\n\n**图 1-7.** *设置免费的“查找我的 iPad”服务*\n\n如果您没有看到此屏幕，请按照以下步骤在您的\
  \ iPad 上进行设置：\n\n**提示：** 您还可以在苹果官网观看视频并了解更多信息：[`www.apple.com/ipad/find-my-ipad-setup/`](http://www.apple.com/ipad/find-my-ipad-setup/)。\n\
  \n1. 此时，您的 iPad 可能正忙于与 **iTunes** 同步。您需要等待同步完成，直到看到**主屏幕**或**滑动以解锁**屏幕；这时，您就可以开始操作了。\n\
  2. 轻点**设置**应用。\n3. 轻点**邮件、通讯录、日历**。\n4. 轻点**添加帐户**，然后选择 **Mobile Me**。\n5. 输入您的\
  \ **Apple ID** 和**密码**，然后轻点**下一步**进行登录。如果您没有 Apple ID，可以点击链接免费创建一个。如果这是您首次将 **Apple\
  \ ID** 用于 MobileMe 服务，您可能需要同意**服务条款**。\n6. 随后，您应会收到一封发送至您与 Apple ID 关联的主邮箱的电子邮件。您需要点击收到的邮件中的链接以**验证**您的帐户。\n\
  7. 成功登录后，您会看到一个小弹出窗口，询问**是否允许 MobileMe 使用您 iPad 的位置？** 您可能已经猜到，要使此服务正常工作，您必须回答**好**。\n\
  8. 确保将**查找我的 iPad** 设置为**开启**，如图所示。然后轻点**存储**以完成设置过程。\n\n![Image](img/p54-01.jpg)\n\
  \n#### 停用或调整“查找我的 iPad”功能\n\n您也可以停用此服务或更改所使用的 MobileMe 帐户，方法是返回 MobileMe 的**帐户**屏幕，具体操作如下：\n\
  \n1. 轻点**设置**应用。\n2. 轻点**邮件、通讯录、日历**。\n3. 在右侧栏的**帐户**屏幕下，轻点 **Mobile Me** 帐户。\n\n\
  \   ![Image](img/p54-02.jpg)\n\n4. 在此屏幕上，您可以：\n   - 轻点**帐户**以调整使用的帐户。\n   - 将**查找我的\
  \ iPad** 设置为**开启**或**关闭**。\n   - **删除**此 iPad 上的 MobileMe 帐户。\n5. 轻点**完成**以保存更改。\n\
  \n![Image](img/p54-03.jpg)\n\n#### 通过 Me.com 网站使用“查找我的 iPad”\n\n您几乎可以通过任何网页浏览器使用“查找我的\
  \ iPad”服务，无论是在电脑上还是其他移动设备上。请按照以下步骤使用该服务：\n\n1. 打开网页浏览器，访问 [`www.me.com`](http://www.me.com)。\n\
  2. 使用相同的 Apple ID 和密码登录。\n\n   ![Image](img/p55-01.jpg)\n\n3. 您现在应该会看到**查找我的 iPad**（或\
  \ iPhone）屏幕，它会立即显示您设备的最后已知位置。请注意，如果您有多台设备，可在左侧栏中选择另一台设备进行定位。\n\n   ![Image](img/p55-02.jpg)\n\
  \n   **注意：** 地图上设备名称旁边的**时钟**图标 ![Image](img/p55-03.jpg) 表示距离上次更新已有一段时间。如果您的设备已关机，则最后已知位置将是其关机时在地图上标记的位置。\n\
  \n4. 点击设备名称可查看更多选项。您可以执行以下操作：\n\n   ![Image](img/p56-01.jpg)\n\n   ![Image](img/p56-02.jpg)\n\
  \n   - 点击**锁定**以远程锁定您的 iPad。这会通过添加四位数字密码来保护您的私人信息。\n   - 点击**抹掉**以远程清除您的所有私人信息。请记住，您电脑上会保留从上次备份到\
  \ iTunes 时的所有数据，通常这是您上次将 iPad 连接到电脑上 iTunes 的时间。勾选底部的复选框，然后点击**抹掉所有数据**以完成此过程。\n\
  \n     ![Image](img/p57-01.jpg)\n\n   - 点击**显示信息**或**播放声音**，以发送一条消息显示在您的 iPad 上，或播放持续\
  \ 2 分钟的声音以帮助您定位设备。这个声音类似于船上的声纳音，非常独特！\n\n     如果您勾选此框，右侧的消息将显示在您的 iPad 上，并且几秒钟内会播放声音——这是一个非常不错的功能！\n\
  \n     ![Image](img/p57-02.jpg)\n\n     ![Image](img/p57-03.jpg)\n\n#### 通过其他 iOS\
  \ 移动设备使用“查找我的 iPad”\n\n您也可以使用从 App Store 下载的免费应用（名为**“查找我的 iPhone”**）来访问“查找我的 iPad”服务。请按照以下步骤使用该应用：\n\
  \n| **注意：** 在本书出版时，该应用的原名为 **“查找我的 iPhone”**。因此，如果您在 App Store 中只找到这个应用，请放心下载到您的\
  \ iPad 上使用。 | ![Image](img/p58-01.jpg) |\n\n1. 轻点**查找 iPhone** 应用，并使用您的 **Apple\
  \ ID** 和**密码**登录。\n2. 系统会立即将您带到**地图**视图，并显示您的 iPad。\n3. 与前面描述的网页版类似，您可以点击设备名称以**显示信息**/**播放声音**、远程**抹掉**（擦除）或远程**锁定**（使用四位数字密码）设备。\n\
  \n   **注意：** 如果您正在使用 iPad 查看自身位置，则这些选项（即**显示**、**抹掉**或**锁定**）均无效。\n\n4. 与在 [`me.com`](http://www.me.com)\
  \ 网站上一样，如果您有多个运行 iOS 4.2 或更高版本的苹果设备（例如 iPhone 或 iPod touch），您可以直接在 iPad 上的应用中查看这些设备。只需轻点右上角的**设备**按钮即可查看您所有的设备。\n\
  \n![Image](img/p58-02.jpg)\n\n#### 苹果的 MobileMe 同步服务\n\n第一次注册 iPad 后，您可能会看到一个宣传苹果\
  \ MobileMe 无线同步服务的屏幕。要继续设置您的 iPad，请点击**不了，谢谢**按钮以进入下一个屏幕。\n\n**什么是 MobileMe？**\n\
  \n正如您在之前的“查找我的 iPad”部分所见，MobileMe 免费提供 iPad 定位服务。然而，MobileMe 的功能远不止于此；它还提供了一种在您所有电脑和移动设备之间共享电子邮件、通讯录、日历和网页书签的方式。在本书出版时，照片共享仅限于安装了\
  \ MobileMe **iPhoto** 文件夹的 Mac 电脑。MobileMe 在有限时间内（目前为 60 天）免费使用，之后单人计划费用为 99.00\
  \ 美元，家庭计划费用为 149.00 美元。请参阅第 4 章：“其他同步方法”中的“MobileMe 导览”部分。\n\n\n\n## 设置你的 iPad\n\
  \n首次连接 iPad 时，你可以为其命名并选择其他一些选项（参见图 1-8）。\n\n如果你看到的屏幕询问是否要从备份恢复，请直接跳至本章稍后的“从备份设置或恢复”部分。\n\
  \n![图片](img/0108.jpg)\n\n**图 1-8.** 设置 iPad 屏幕\n\n**注意：** 如果你打算同时使用两台 iPad，我们建议你将第二台\
  \ iPad 设置为新设备，而不要从备份文件恢复。否则，两台 iPad 可能具有相同的设备名称，导致混淆。\n\n1. 为你的 iPad 起一个**名称**。每次你将\
  \ iPad 连接到这台电脑或其他任何电脑时，iPad 都会显示你在此处选择的名称。在此例中，我们将这台 iPad 命名为：`Martin's iPad`。\n\
  \n   **提示：快速设置 iPad**\n\n   要快速完成设置，请取消选中图 1-9 所示屏幕上的所有三个复选框，然后单击**完成**。你稍后可以在 `iTunes`\
  \ 应用的标签页中勾选或取消勾选这些复选框。我们将在第 3 章：“将 iPad 与 iTunes 同步”和第 29 章：“你的 iTunes 使用指南”中介绍具体细节。\n\
  \n2. 如果你希望将电脑 `iTunes` 资料库中的所有音乐和视频同步到新 iPad 上，请勾选**自动将歌曲和视频同步到我的 iPad** 旁边的复选框。\n\
  \n   **警告：** 你的 iPad 内存不如电脑大，因此如果你的电脑 `iTunes` 资料库中有成千上万首歌曲、照片或许多视频，在选择自动同步时请务必小心。\n\
  \n3. 如果你希望将电脑特定文件夹中的所有照片同步到新 iPad 上，请勾选**自动将照片添加到我的 iPad** 旁边的复选框。\n\n4. 如果你希望在\
  \ iPad 上购买的应用能备份到电脑上，请勾选**自动将应用同步到我的 iPad** 旁边的复选框。此选项允许你从电脑上的 `iTunes` 应用更新应用；同时，你也可以使用电脑上的\
  \ `iTunes` 应用来管理和排列应用图标及**主**屏幕。我们建议你勾选此复选框。\n\n5. 单击**完成**以完成**设置**屏幕。\n\n### 从备份设置或恢复\n\
  \n如果你已经将类似设备（如 iPhone 或 iPod touch）与 iTunes 同步过，那么你很可能会看到**设置你的 iPad** 屏幕，其中包含**设置为新\
  \ iPad** 或从备份恢复的选项（参见图 1-9）。\n\n![图片](img/0109.jpg)\n\n**图 1-9.** 设置或恢复 iPad\n\n\
  1. 现在，根据你的具体情况，有几种选择：\n   1. 如果你是首次使用 iPad，请选择**设置为新 iPad**。![图片](img/p61-01.jpg)\n\
  \   2. 如果你之前已将电脑与另一台 iPad 同步过，并希望从该备份文件恢复，请选择**从以下备份恢复**，然后从下拉列表中选择正确的 iPad 备份文件。\n\
  \   3. 如果你已备份过除 iPad 以外的其他 iOS 设备（例如 iPhone 或 iPod touch），我们建议你选择**设置为新 iPad**。![图片](img/p61-02.jpg)\
  \ 稍后，你可以将应用、图片、歌曲等内容从 iTunes 同步到 iPad；这种方法比使用非 iPad 设备的备份文件更安全。\n\n   **警告：** 我们听说有人在将非\
  \ iPad 设备（iPhone/iPod touch）的备份恢复到 iPad 时遇到了问题（如死机、电池续航缩短等）。此外，在此处选择恢复，前提是你已对旧设备（iPhone/iPod\
  \ touch）进行过备份，以便将最新信息恢复到新 iPad 上。\n\n2. 单击**继续**按钮。\n\n**注意：** 如果你想保留现有的 iPhone\
  \ 和/或 iPod Touch 并设置新的 iPad，则应选择**设置新 iPad**。\n\n### 设置完成：iPad 摘要屏幕\n\n确认你的选择并单击**完成**（参见图\
  \ 1-8），或从**设置/恢复**屏幕单击**继续**（参见图 1-9）后，你将进入主**摘要**屏幕（图 1-10）。\n\n![图片](img/0110.jpg)\n\
  \n**图 1-10.** iTunes 中的 iPad **摘要**屏幕\n\n### 维护你的 iPad\n\n设置好 iPad 后，你将需要了解如何安全地清洁屏幕，以及如何使用各种保护壳来保护它。\n\
  \n#### 清洁你的 iPad 屏幕\n\n使用 iPad 一段时间后，你会发现手指（可能还有其他人的手指）在原本光洁的屏幕上留下了污迹和油渍。你需要知道如何安全地清洁屏幕。一种全天保持屏幕清洁的方法是在\
  \ iPad 上贴一张保护膜，这还可能额外减少反光（下一节将讨论）。\n\n我们还建议执行以下操作：\n\n1. 按住顶部边缘的**睡眠/电源**键关闭 iPad，然后使用**滑动**条将其关机。\n\
  2. 拔下所有线缆，例如 USB 同步线。\n3. 用柔软、干燥、不起毛的布（例如用于清洁眼镜的布或类似物品）擦拭屏幕。\n4. 如果干布不起作用，可尝试加少量水将布微微润湿。如果使用湿布，请注意不要让水进入任何开口。\n\
  \n**警告：** 切勿使用家用清洁剂、研磨性清洁剂（如 `Soft Scrub`）、含氨清洁剂（如 `Windex`）、酒精、喷雾剂或溶剂。\n\n####\
  \ iPad 的保护壳和保护套\n\n当你拿到 iPad 时，你会注意到其构造多么精美。你也会注意到它相当光滑，可能会从手中滑落或轻微晃动。当你使用 iPad\
  \ 打字时，其背面也可能被刮花。\n\n我们建议为你的 iPad 购买一个保护壳。普通保护壳的价格大约在 10-40 美元之间，高档皮革保护壳的价格可能达到 100\
  \ 美元或以上。花点小钱来保护你花费 500 美元或更多购买的 iPad，是非常明智的。\n\n#### 购买保护壳的地点\n\n你可以在以下任何地点购买 iPad\
  \ 保护壳：\n\n* Amazon.com ([`www.amazon.com`](http://www.amazon.com))\n* Apple 配件商店\
  \ ([`http://store.apple.com`](http://store.apple.com))\n* iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
  * TiPB – The iPhone + iPad Blog Store ([`http://store.tipb.com/`](http://store.tipb.com/))\n\
  \n你也可以在网上搜索“iPad 保护壳”或“iPad 保护套”。\n\n**提示**：你*可能*可以将为其他类型电脑设计的保护套用于你的 iPad；例如，为上网本或小型平板电脑设计的保护套可能效果不错。不过，如果你选择这种节省开支的方式，请务必确保你的\
  \ iPad 能牢固地放入保护套或保护壳中。\n\n\n\n##### 选购保护壳类型\n\n以下部分列出了几种可供选择的保护壳类型及其价格范围。\n\n######\
  \ Apple iPad Smart Cover（塑料款约 40 美元，皮革款约 70 美元）\n\n**功能：** 保护壳上的磁铁可瞬间吸附在 iPad 上，实现稳固贴合。将保护壳向后折叠，即可形成一个舒适的低角度支架。\n\
  \n**优点：** 颜色多样、重量轻，且由 Apple 专为 iPad 2 设计——这还需要我们多说什么吗？\n\n**缺点：** 无法很好地保护 iPad 免受磕碰或凹陷（设备背面无保护）。\n\
  \n![Image](img/p64-01.jpg)\n\n###### 内置键盘的金属保护壳（约 100 美元）\n\n**功能：** 提供坚固的保护壳和内置蓝牙键盘。如果你经常在\
  \ iPad 上输入文字，这是一个非常小巧便捷的选择。\n\n**优点：** 相比单独购买保护壳和键盘更便宜。打字方便。\n\n**缺点：** 会增加设备的体积和重量。\n\
  \n![Image](img/p65-01.jpg)\n\n###### 橡胶/硅胶保护壳（10-30 美元）\n\n**功能：** 提供缓冲握持感，可吸收 iPad\
  \ 受到的碰撞和震动。\n\n**优点：** 价格低廉、颜色鲜艳、握持舒适。\n\n**缺点：** 外观不如皮革保护壳专业。\n\n###### 防水保护壳（10-40\
  \ 美元）\n\n**功能：** 为 iPad 提供防水保护，让你可以在靠近水的地方（雨天、泳池边、海滩、船上等）安全使用 iPad。\n\n**优点：** 提供良好的防水保护。\n\
  \n**缺点：** 可能使触摸屏更难操作；通常无法防止跌落或碰撞。\n\n###### 硬塑料/金属保护壳（20-100 美元）\n\n**功能：** 提供坚硬牢固的保护，防止刮擦、碰撞和短距离跌落。\n\
  \n**优点：** 提供良好的保护。\n\n**缺点：** 会增加一些体积和重量。\n\n###### 皮革书本式或翻盖保护壳（40-100 美元以上）\n\n\
  **功能：** 提供更奢华的手感，并保护正面、侧面以及背面。\n\n**优点：** 提供皮革的奢华手感，同时保护正面和背面。\n\n**缺点：** 价格更贵，且会增加体积和重量。\n\
  \n###### 屏幕和背膜保护（5-40 美元）\n\n**功能：** 保护 iPad 屏幕和背面免受刮擦。\n\n**优点：** 有助于延长 iPad 的使用寿命并防止刮擦。此外，大多数此类保护膜还能减少屏幕眩光。\n\
  \n**缺点：** 有些可能会增加眩光或影响屏幕触摸灵敏度。\n\n### iPad 基础操作\n\n现在，你的 iPad 已经充满电、屏幕干净、完成注册并装上了崭新的保护壳，接下来让我们了解一些基础操作，帮助你快速上手。\n\
  \n#### 开机/关机与睡眠/唤醒\n\n若要开启 iPad，按住 iPad 顶部边缘的`电源/睡眠`按钮几秒钟（参见图 1-11）。如果 iPad 完全关机，仅快速轻点此按钮是无法开机的——你必须按住它，直到看到\
  \ iPad 开机。\n\n当你不再使用 iPad 时，有两个选择：可以将其置于`睡眠`模式，或者完全关机。\n\n![images](img/0111.jpg)\n\
  \n**图 1-11.** *`电源/睡眠`按钮与`主屏幕`按钮*\n\n`睡眠`模式的优势在于，当你想再次使用 iPad 时，只需快速轻点`电源/睡眠`按钮或`主屏幕`按钮，即可唤醒\
  \ iPad。据 Apple 称，iPad 的待机时间可长达一个月。\n\n如果你想最大限度地节省电量，或者知道会有相当长一段时间不使用 iPad（例如睡觉时），你可能想将其完全关机。操作方法是：按住`电源/睡眠`按钮，直到出现`滑动来关机`滑块。只需向右滑动滑块，iPad\
  \ 就会关机。\n\n#### 主屏幕按钮\n\n| ![Image](img/p67-01.jpg) | 你最常用的按键就是`主屏幕`按钮（参见图 1-11）。此按钮将开启你在\
  \ iPad 上的一切操作。按一下即可唤醒 iPad（假设它处于`睡眠`模式）。 |\n\n按下`主屏幕`按钮将退出任何应用程序，并带你回到`主屏幕`。\n\n\
  **提示：** 双击`主屏幕`按钮可以设置为执行不同的操作，例如启动 iPad 功能、搜索等（请参阅下一节了解如何配置此按钮）。\n\n#### 双击主屏幕按钮进行多任务处理\n\
  \niPad（iOS 4.2 及更高版本的新功能）的亮点之一是多任务处理。此功能让你可以同时打开多个应用。要进行多任务处理，只需双击`主屏幕`按钮，然后前后滑动手指即可选择要跳转到的应用。\n\
  \n**提示：** 关于多任务处理的更多详细信息，请参见第 8 章：“多任务处理与语音控制”。\n\n#### 音量键\n\niPad 右上侧设有简单的`音量增大`/`音量减小`键，你会发现它们非常方便（参见图\
  \ 1-12）。在许多地方，你也可以通过在屏幕音量控制上滑动手指来控制歌曲、视频、`FaceTime`通话或播客的音量。\n\n##### FaceTime 铃声音量\n\
  \n如果你没有播放歌曲、视频或其他内容，按下这些`音量`键将调整你的`FaceTime`应用的铃声音量。\n\n**提示：** 按住`音量减小`键约两秒钟，可快速将\
  \ iPad 静音。\n\n![images](img/0112.jpg)\n\n**图 1-12.** *`静音`/`屏幕旋转锁定`开关、`音量增大/减小`键及`主屏幕`按钮*\n\
  \n| **提示：** 你也可以使用`ipod`应用左上角的`滑块`控制来调整音乐播放的音量。 | ![Image](img/p69-01.jpg) |\n\n\
  #### 旋转锁定/静音开关\n\n就在`音量`键的上方，你可以找到`静音`/`屏幕旋转锁定`开关（参见图 1-12）。\n\n这个开关在 iPad 上有着多变的功能。如果你拥有初代\
  \ iPad，就会知道这个开关最初是作为`屏幕旋转锁定`开关使用的。然后 Apple 在 iOS 4.2 中将其改为单纯的`静音`开关。在 iOS 4.3 及更高版本的设备中，你现在可以配置此开关的功能。\n\
  \n要更改此开关的功能，请按以下步骤操作：\n\n**5.** 轻点`设置`，然后轻点`通用`。\n\n**6.** 在`使用侧边开关：`部分，选择`锁定屏幕旋转`或`静音`。\n\
  \n![Image](img/p70-01.jpg)\n\n当你想要将 iPad 静音或强制其停止旋转屏幕时，可使用此开关。当你的 iPad 平放在桌面上或腿上时，`旋转锁定`非常有用，你可以强制它保持`竖屏`或`横屏`方向。\n\
  \n**提示：** 这是在床上阅读 iBooks 的好方法。将 iPad 旋转到`横屏`模式，锁定屏幕旋转，然后开始阅读你的书籍。更多信息请参见第 12 章：“iBooks\
  \ 与电子书”。\n\n\n\n#### 调整或禁用自动锁定超时功能\n\n你会注意到，iPad 在闲置一小段时间后会自动锁定并进入`休眠`模式，屏幕变黑。你可以更改此前的间隔时间，或者使用`设置`图标完全禁用此功能：\n\
  \n1.  从`主屏幕`触摸`设置`图标。\n2.  触摸左侧栏中的`通用`，然后触摸右侧栏中的`自动锁定`。\n3.  你会看到此页面上`自动锁定`旁边的当前时间间隔（图\
  \ 1-15）。默认设置是 iPad 在闲置五分钟后锁定（以节省电池寿命）。此设置的选项范围从两分钟到十五分钟，或`永不`。\n\n    ![图片](img/p70-02.jpg)\n\
  \n4.  触摸所需设置以选中它——当你看到它旁边出现`勾号`图标时，即表示已选中。\n5.  然后，点击顶行的`通用`按钮返回`通用`屏幕。你应该会看到你的更改现在已反映在`自动锁定`旁边。\n\
  \n**电池寿命小贴士：**\n\n将`自动锁定`时间设置得更短（例如，2 分钟）将有助于节省电池寿命。\n\n#### 调整日期和时间\n\n通常情况下，日期和时间会在你连接\
  \ iPad 到电脑时自动设置或调整，我们在第 3 章：“将 iPad 与 iTunes 同步”中介绍过。不过，你也可以非常轻松地手动调整日期和时间。当你在旅途中使用\
  \ iPad 并需要在降落后调整时区时，你可能需要这样做。请按以下步骤操作：\n\n1.  触摸`设置`图标。\n2.  触摸左侧栏中的`通用`和右侧栏中的`日期与时间`以查看`日期与时间`设置屏幕。\n\
  3.  如果你更喜欢看到 09:30 和 14:30，而不是上午 9:30 和下午 2:30，请将`24 小时制`设置开关拨到`开启`。\n\n    ![图片](img/p71-01.jpg)\n\
  \n    ![图片](img/p71-02.jpg)\n\n4.  要设置日期和时间，请触摸`设置日期与时间`按钮，查看弹出的滚轮窗口，触摸并移动滚轮即可转动。\n\
  5.  触摸并滑动`小时`、`分钟`和`上午/下午`滚轮，使其上下移动。\n6.  同样地，要更改日期，请点击`日期`（在此图片中为`2011 年 3 月 23\
  \ 日，星期三`）。\n\n#### 设置时区\n\n请按照以下步骤设置时区：\n\n1.  在上节显示的同一`日期与时间`屏幕上点击`时区`。\n2.  开始输入所需城市的名称（参见图\
  \ 1-13）。\n3.  触摸城市名称以选中它，屏幕将自动返回`日期与时间`屏幕。\n\n![图片](img/0113.jpg)\n\n**图 1-13.**\
  \ *设置时区*\n\n#### 调整亮度\n\n你的 iPad 带有`自动亮度`控制功能，通常默认设置为`开启`（参见图 1-14）。此功能使用内置光线传感器来调整屏幕亮度。通常，我们建议你将其保持为`开启`状态。\n\
  \n如果你想调整亮度，当然可以。从`主屏幕`触摸`设置`图标。然后触摸靠近左侧栏顶部的`亮度与墙纸`标签，并移动`滑块`控制来调整亮度。\n\n![图片](img/0114.jpg)\n\
  \n**图 1-14.** *设置 iPad 的亮度*\n\n**小贴士**：将亮度调低将有助于节省电池寿命。将滑块调整到略低于一半的位置似乎效果不错。\n\n\
  ## 第 2 章\n\n## 输入技巧、复制/粘贴和搜索\n\n在本章中，我们将向你展示一些在 iPad 上高效输入和节省宝贵时间的好方法，无论你是使用`竖屏`（垂直/较小）键盘还是`横屏`（水平/较大）键盘。我们将介绍如何选择不同的语言键盘、如何输入符号以及其他技巧。我们还将展示在使用各种适用于\
  \ iPad 的外部键盘配件时的一些技巧和诀窍。\n\n在本章后面，我们将介绍`聚焦搜索`和`拷贝与粘贴`功能。`拷贝与粘贴`将为你节省大量时间，同时提高你在使用\
  \ iPad 时的准确性。\n\n### 在 iPad 上输入\n\n你很快就会在 iPad 上发现两个屏幕键盘：一个是垂直方向持握 iPad 时可见的较小键盘，另一个是水平方向持握\
  \ iPad 时可见的较大`横屏`键盘。好处是你可以选择最适合你的键盘。如果你更喜欢实体键盘，我们还将为你介绍 Apple 和 ZAGG 的几款不错配件键盘的详情（参见图\
  \ 2-1）。\n\n![图片](img/0201.jpg)\n\n**图 2-1.** *来自 Apple 和 ZAGG 的几款键盘配件*\n\n#### 使用竖屏键盘在屏幕上输入\n\
  \n你会发现，刚开始使用 iPad 时，用一根手指（通常是食指）输入最方便，同时用另一只手握住 iPad。\n\n过一小段时间后，你应该可以尝试用拇指输入（就像你看到很多人用\
  \ iPhone 或黑莓智能手机那样）。稍加练习后，用两个拇指输入会比单指输入大大提升速度。请耐心些；要熟练地用双拇指快速输入确实需要练习。\n\n实际上，过一段时间你会注意到，键盘的触摸灵敏度会假定你正在用两个拇指输入。这意味着键盘左侧的字母应由左手按压，右侧的按键应由右手按压（参见图\
  \ 2-2）。\n\n![图片](img/0202.jpg)\n\n**图 2-2.** *在`竖屏`模式下持握 iPad 时用两个拇指输入*\n\n**小贴士：**\
  \ 如果你的手比较大，觉得在较小的竖屏键盘上输入有挑战性，那么把你的 iPad 侧转过来，就能得到更大的`横屏`键盘（参见图 2-3）。\n\n#### 使用更大的横屏键盘在屏幕上输入\n\
  \n几乎在任何应用中，只需将 iPad 侧转，键盘就会变为更大的`横屏`键盘，使输入更容易（参见图 2-3）。请按照以下步骤在`横屏`键盘上输入：\n\n1.\
  \  将 iPad 稍微倾斜放置会有助于输入；这样能更容易看到屏幕。你也可以简单地将 iPad 平放在平坦表面上。通常，将 iPad 放在保护套中（参见第 1\
  \ 章：“开始使用”以了解各种保护套）或放在柔软的表面上会有所帮助，这样在输入时它不会晃动。\n2.  像在普通电脑键盘上一样用双手输入。经过一些练习后，你几乎可以像在普通实体键盘上一样快速地在较大的屏幕上输入。\n\
  \n**小贴士：** 尝试重复利用旧的鼠标垫作为你输入时 iPad 的垫子。\n\n![图片](img/0203.jpg)\n\n**图 2-3.** *在`横屏`方向时用双手输入*\n\
  \n**小贴士：** 对于经常旅行的人来说，与任何笔记本电脑相比，使用 iPad 上的虚拟键盘能在拥挤的飞机座位上节省大量空间！\n\n#### 使用外部键盘（需另行购买配件）\n\
  \n如果你需要大量输入，或者只是不习惯虚拟键盘那种“在玻璃上输入”的感觉，你可以购买适用于 iPad 的外部键盘。我们已经测试过 Apple 的两款，但我们知道还有更多的键盘底座和蓝牙选项可供选择。我们在本章前面展示过但未测试过一款名为\
  \ ZAGGmate 的键盘/保护套组合（参见图 2-1）。请查看 iPad/iPhone/iPod 博客或在线商店（例如 [`www.amazon.com`](http://www.amazon.com)）来寻找键盘和其他配件。你也可以快速搜索“iPad\
  \ external keyboard”来找到其他选择。\n\n\n\n### 外接键盘快捷键\n\n当您将外接键盘连接到 iPad 后，即可使用许多您在电脑键盘上已熟悉的快捷键。以下快捷键能让您在\
  \ iPad 上输入时节省一些时间：\n\n-   **使用方向键选择文本：** `Command-Shift-方向键`\n-   **剪切所选文本：** `Command\
  \ + X`\n-   **复制所选文本：** `Command + C`\n-   **粘贴所选文本：** `Command + V`\n-   **撤销：**\
  \ `Command + Z`\n-   **重做：** `Command + Y`\n\n**提示：** 如果您打算在 iPad 上进行大量文本输入，那么投资购买一款这样的外接键盘绝对是物超所值的！在我们的测试中，我们更偏好\
  \ Apple iPad 键盘底座，因为它能让 iPad 保持一个非常舒适的输入角度。如果您使用蓝牙键盘，那么您确实需要投资购买一个能将 iPad 以一定角度支撑起来的保护壳，这样在输入时阅读屏幕会更方便。\n\
  \n**警告：** 少数 iPad 应用程序只支持横屏模式，因此无法与键盘底座配合使用，因为当 iPad 处于竖屏方向时，整个应用界面会横向显示——**Apple\
  \ Keynote** 就是一个典型的例子。\n\n### Apple 无线键盘（蓝牙）——约 70 美元\n\n外接键盘除了让输入更轻松、更快速之外，还有一个额外的好处：由于虚拟键盘消失，您能看到更多的\
  \ iPad 屏幕内容。\n\n**提示：** 如果您拥有另一台 Apple 电脑，您可能已经拥有一款无线键盘——它就是 Apple 多年来一直在生产的同一款无线键盘。\n\
  \n#### 将您的 iPad 连接起来\n\n您的 iPad 使用无线蓝牙连接，因此您首先需要将此键盘与 iPad 进行连接，或称*配对*（更多信息请参见第\
  \ 25 章：“蓝牙”）。您可以通过以下步骤将几乎任何无线键盘连接到您的 iPad：\n\n1.  轻点**设置**图标（参见图 2-4）。\n2.  轻点左栏中的**通用**。\n\
  3.  轻点右栏中的**蓝牙**。\n4.  如果蓝牙接收器显示为**关闭**，请轻点开关将其设置为**开启**。\n5.  按下键盘顶部下方圆管右侧边缘的**开/关**按钮，开启您的\
  \ Apple 无线键盘。当键盘已开启且装有电池时，键盘右上角的绿色指示灯会亮起或闪烁。\n6.  无线键盘通电后，您应该会在 iPad 的**蓝牙**屏幕上的**设备**列表中看到它。轻点**设备**下列出的键盘，让\
  \ iPad 生成一个配对码（参见图 2-4）。\n7.  在无线键盘上输入 iPad 上显示的配对码，然后按键盘上的 **回车/Return** 键。\n8.\
  \  有时需要尝试两到三次才能让键盘与 iPad 成功配对。请继续尝试，最终会成功的！\n\n![images](img/0204.jpg)\n\n**图 2-4.**\
  \ *将蓝牙无线键盘与 iPad 配对*\n\n#### 在无线键盘与屏幕键盘之间切换\n\n在无线键盘和内置屏幕键盘之间来回切换非常容易。只需按下键盘右上角的**弹出**键\
  \ ![Image](img/p79-01.jpg)，即可暂时断开无线键盘的连接并显示屏幕键盘。\n\n再次按下**弹出**键即可重新连接无线键盘并隐藏屏幕键盘。\n\
  \n### Apple iPad 键盘底座——约 70 美元\n\n除了提供实体键盘供您输入外，键盘底座还有一个额外的好处：它能将您的 iPad 像普通电脑屏幕一样以一定角度支撑起来。体验非常棒！\n\
  \n**说明：** 在本书出版时，Apple 尚未更新初代 iPad 底座，因此它既能支撑 iPad 也能支撑 iPad 2（虽然可能有点松）。我们相信 Apple\
  \ 可能很快就会推出专门为 iPad 2 设计的新款底座。\n\n此键盘的其他好处在于，它是由 Apple 专门为 iPad 设计的，因此拥有特殊设计的按键，如图\
  \ 2-5 所示。在这些按键的右侧，沿着顶部还有媒体控制键：**上一曲**、**播放/暂停**、**下一曲**和**音量**。此外，您还有一个**锁定**键。\n\
  \n![images](img/0205.jpg)\n\n**图 2-5.** *iPad 键盘底座上的特殊按键*\n\n**提示：** 要唤醒处于休眠状态的\
  \ iPad，您只需轻按 iPad 键盘底座上的任意按键即可。\n\n与笔记本电脑不同，iPad 在底座中的角度是固定的，无法调整；不过，我们在测试中发现这个角度用起来非常舒适。\n\
  \n**警告：** iPad 在键盘底座中可能有点不太稳定。我们建议将其放在一个平整、稳固的表面上。另外，如果有小朋友（或大狗）在身边跑来跑去时要格外小心——他们很容易意外碰倒\
  \ iPad 使其从底座上掉落。\n\n#### 将您的 iPad 连接到键盘底座\n\n将 iPad 连接到键盘底座非常简单——只需将其放置在底座上，插入 iPad\
  \ 底部的端口即可，如图 2-6 所示。\n\n![images](img/0206.jpg)\n\n**图 2-6.** *放置在键盘底座中的 iPad——非常适合输入长文挡*\n\
  \n**说明：** 如果您给 iPad 装了保护壳，那么很可能需要先取下保护壳，才能将 iPad 连接到键盘底座。这样做还有一个额外的好处：当您在底座上给 iPad\
  \ 充电时，有助于其散热。\n\n然后，您可以将 USB 同步和充电线缆插入键盘底座背部，以便同时将 iPad 连接到电脑，或通过墙插为其充电。\n\n要断开连接，只需将\
  \ iPad 从键盘底座中向上拔出即可。\n\n**警告：** 在本书出版时，标准的键盘快捷键，例如 `Command-C` 用于复制、`Command-V`\
  \ 用于粘贴，在这两款键盘配件上均可使用；但是，iPad 的自动大写、自动更正以及双击**空格**键输入句号的快捷键功能无法使用。\n\n#### 同时连接两个键盘\n\
  \n如果您恰好同时拥有无线键盘和键盘底座，我们发现您可以在 iPad 上同时使用这两个键盘进行输入。因此，您甚至可以在同一份文档上轮流输入，进行键盘对决，甚至尝试二重奏式的输入。无论如何，这都是这些键盘一项奇怪但真实存在的功能。\n\
  \n\n\n#### 利用自动纠正节省时间\n\n当你打字一段时间后，就会注意到正在输入的某些单词正下方会出现一个小弹出窗口——这被称为自动纠正功能。（如果你从未见过这个弹出窗口，则需要在\
  \ iPad 上的 `设置` 图标中启用自动纠正。）当你看到弹出窗口猜出了正确的单词时，只需按下键盘底部的 `空格键` 选择该单词，就能节省时间。\n\n在这个例子中，我们开始输入单词“especially”。当我们输到这个单词中的字母\
  \ `c` 时，正确的单词——*especially*——就会出现在下方的弹出窗口中。要选择它，我们只需按下键盘底部的 `空格键`（见图 2-7）。\n\n![images](img/0207.jpg)\n\
  \n**图 2-7.** *使用自动纠正和建议单词*\n\n你的第一反应可能是点击弹出的单词，但那样做只会将它从屏幕上清除。实际上，更快的做法是继续打字，或者当看到正确的单词时按下\
  \ `空格键`，因为在许多情况下，随着你继续输入，单词要么本来就是正确的，要么会变成正确的。长远来看，这种方法能减少手指的移动距离。\n\n学会使用 `空格键`\
  \ 后，你就会发现这个弹出式猜测功能能节省不少时间。毕竟，你本来就需要在单词末尾输入一个空格！\n\n**提示：** 利用自动纠正，你可以避免在许多常见缩略词中输入撇号，例如“won't”和“can't”。自动纠正会在弹出的窗口中显示拼写正确的缩略词；你只需按下\
  \ `空格键` 即可选择纠正后的单词。\n\n![Image](img/p82-01.jpg)\n\n##### 听取自动纠正单词的读音\n\n你可以将 iPad\
  \ 设置为在自动文本和自动纠正单词出现时朗读它们。这有助于你选择正确的单词。请按以下步骤启用此朗读功能：\n\n1.  点击 `设置` 图标。\n2.  点击左侧栏中的\
  \ `通用`。\n3.  点击右侧栏底部的 `辅助功能`。\n4.  将 `朗读自动文本` 旁边的开关设置为 `开启`。\n\n启用此功能后，每次打字时弹出自动纠正的单词，你都会听到它被朗读出来。如果你喜欢听到的单词，就按下\
  \ `空格键` 接受它；否则，继续打字。此功能可以帮你省去从键盘上抬头查看的麻烦，从而节省时间。\n\n### 辅助功能选项\n\niPad 上有许多有用的功能可以辅助操作。\
  \ `旁白` 选项能为你朗读屏幕上的文本。它会告诉你触摸了什么、选中了哪些按钮以及所有选项。它还可以朗读整屏的文本。如果你想让屏幕显示更大，也可以按下一节所述，开启\
  \ `缩放` 功能。\n\n#### 大文本\n\n有时，标准字体太小，阅读起来很费力。这种情况下，`大文本` 功能就非常有用了。\n\n从 `辅助功能` 选项中点击\
  \ `大文本`，可以调整 `通讯录`、`邮件` 和 `备忘录` 中的字体大小。\n\n你可以从 `关闭`（默认约为 12 磅文本）一直选择到 56 磅文本。\n\
  \n![Image](img/p83-01.jpg)\n\n#### 旁白——让 iPad 为你朗读\n\niPad 的一个很酷的功能是可以开启 `旁白` 功能，这样\
  \ iPad 就会朗读屏幕上显示的任何内容。你甚至可以让它为你朗读任何电子邮件、文本文档，甚至是 iBook 页面中的内容。\n\n请按以下步骤启用 `旁白`：\n\
  \n1.  点击 `设置` 图标。\n2.  点击左侧栏中的 `通用`。\n3.  点击右侧栏底部的 `辅助功能`。\n4.  点击左侧栏中的 `旁白`。\n\
  5.  将 `旁白` 开关设置为 `开启`，然后在弹出窗口中点击 `确定` 确认。\n\n![Image](img/p84-01.jpg)\n\n**注意：**\
  \ 如右侧屏幕所示，`旁白` 的手势与正常手势不同。请点击 `练习旁白手势` 按钮来熟悉它们。\n\n请注意，你可以从慢到快调整 `朗读速率`，并进行其他调整，例如\
  \ `键入反馈`、`使用语音` 和 `使用音调变化`。不妨尝试一些这些选项，看看哪些最适合你。\n\n点击 `盲文` 可以通过蓝牙将 iPad 连接到盲文设备。\n\
  \n点击 `网页转子` 可以调整各种网页功能，以便在 *网页转子* 中包含这些功能（稍后你将了解更多相关信息）。\n\n类似地，点击 `语言转子` 可以选择用于\
  \ `旁白` 的语言（同样，稍后你将了解更多相关信息）。\n\n在启用 `旁白` 的情况下打字时，默认情况下，你输入的每个字符都会被朗读出来。你可以在刚才提到的设置屏幕中更改这一设置。你可以将其设置为仅朗读单词、仅朗读字符，或者不朗读任何内容。\n\
  \n要在 `iBooks` 应用中让 iPad 为你朗读整个页面，你需要同时触摸屏幕上文本块的上方和下方。如果你用一根手指点击文本，则只会为你朗读单行文本。\n\
  \n在 `备忘录` 应用中点击笔记的顶部，会为你朗读整篇笔记。\n\n##### 网页转子与语言转子\n\n使用 `旁白` 时的两个有趣功能是网页转子和语言转子。你可以在之前显示的\
  \ `旁白` 设置屏幕中自定义这些转子中出现哪些项目。\n\n| 要使用网页或语言转子，你需要将两根手指放在屏幕上，同时旋转它们（就像用手指指尖转动刻度盘一样）。完成此操作后，屏幕上会出现一个小型的\
  \ `旋转刻度盘` 图标（请参见右侧图片，其中 `旋转刻度盘` 设置为 `标题`）。接着，用一根手指在屏幕上向下轻扫，就会跳转到所选列表中的下一个项目。例如，如果你将网页转子设置为\
  \ `标题`，然后用一根手指向下轻扫，`旁白` 会跳转到页面的下一个标题。向上轻扫则跳回上一个标题。 | ![Image](img/p85-01.jpg) |\n\
  | 要切换语言，首先在 `旁白` 的“语言转子”设置屏幕中选择若干种语言。将两根手指放在屏幕上并旋转，直到看到指针指向 `语言`。接着，向下轻扫以选择下一个 `旁白`\
  \ 语言。向上轻扫则返回之前选择的一种语言。 | ![Image](img/p85-02.jpg) |\n\n#### 使用缩放放大整个屏幕\n\n如果你觉得屏幕上的文本、图标、按钮或任何东西看得稍微有些困难，你可以开启\
  \ `缩放` 功能。开启 `缩放` 功能后，你可以将整个屏幕放大到几乎两倍大小。这会让所有内容更容易阅读。\n\n**注意：** `旁白` 和 `缩放` 不能同时使用；你需要选择其中之一。\n\
  \n请按以下步骤启用 `缩放`：\n\n1.  点击 `设置` 图标。\n2.  点击左侧栏中的 `通用`。\n3.  点击右侧栏底部的 `辅助功能`。\n4.\
  \  点击右侧栏中的 `缩放`。\n5.  将 `缩放` 旁边的开关设置为 `开启`。\n\n![Image](img/p86-01.jpg)\n\n与 `旁白`\
  \ 类似，`缩放` 使用三指手势。在离开屏幕前，请务必记下这些手势。\n\n#### 白底黑字\n\n如果对比度和颜色难以辨认，那么你可能想要开启 `白底黑字`\
  \ 设置。请按照以下步骤更改此设置：\n\n1.  如前所示，进入 `设置` 应用中的 `辅助功能` 屏幕。\n2.  将 `白底黑字` 开关设置为 `开启`。\n\
  \n当此设置开启时，屏幕上所有浅色部分都会变成黑色，而所有深色或黑色部分则会变成白色。\n\n\n\n#### 三次点击主屏幕按钮选项\n\n你可以设置三次点击\
  \ `主屏幕` 按钮来执行与辅助功能相关的各种操作：\n\n1.  进入 `设置` 应用中的 `辅助功能` 屏幕，如前所示。\n2.  轻点右侧列底部附近的 `三次点击主屏幕按钮`。\n\
  3.  从 `关闭`、`切换旁白`、`切换黑底白字` 或 `询问` 中选择。\n\n### 用于编辑文本/放置光标的放大镜\n\n你是否曾多次在输入文字时，想要将光标精确地放置在两个单词或字母之间？在你掌握放大镜技巧之前，这可能很难做到。具体操作如下：用手指按住你想要放置光标的位置（参见图\
  \ 2-8）。一两秒后，你会看到 `放大镜` 图标出现。然后，在手指按住屏幕的同时，滑动手指来定位光标。当你松开手指时，会看到 `拷贝/粘贴` 弹出菜单，但你可以忽略它。\n\
  \n![images](img/0208.jpg)\n\n**图 2-8.** *按住屏幕以调出 `放大镜` 图标并放置光标。*\n\n### 输入数字和符号\n\
  \n你可能想知道如何使用 iPad 屏幕键盘输入数字或符号。输入时，轻点左下角的 `.?123` 键即可看到数字和常用符号，例如 `$ ! ~ & = # .\
  \ _ - +`。如果你需要更多符号，请从数字键盘上轻点 `#+=` 键，该键位于左下角 `ABC` 键的正上方（参见图 2-9）。\n\n**提示：** 当你按下\
  \ `.?123` 键时，甚至会出现一个 `撤销` 键——对任何键盘来说都是一个不错的补充！\n\n![images](img/0209.jpg)\n\n**图\
  \ 2-9.** *在字母、数字和高级符号键盘之间切换*\n\n**提示：** 请注意，`数字` 和 `符号` 键盘将保持激活状态，直到你按下 `空格` 键或轻点另一个键盘（如\
  \ `ABC`）的按键为止。\n\n#### 触控并滑动技巧\n\n以下技巧由 iPhone/iPad Blog（[`www.tipb.com`](http://www.tipb.com)）的\
  \ Rene Ritchie 提供。\n\n##### 输入大写字母\n\n| 通常，你需要先轻点 `Shift` 键，再轻点字母来输入大写字母。然而，对于需要\
  \ `Shift` 键的单个大写字母或符号，更快的输入方法是：触摸 `Shift` 键，手指不离开键盘，滑动到你想要的按键上，然后松开。例如，要输入大写字母“M”，触摸右侧的\
  \ `Shift` 键，然后滑动到“M”键上并松开。 | ![Image](img/p89-01.jpg) |\n\n##### 快速输入单个数字\n\n如果你只需输入一个数字，那么请触摸\
  \ `.?123` 键，并将手指向上滑动到该数字上。但是，要连续输入多个数字，最好先轻点 `.?123` 键并松开手指，然后逐个轻点每个数字。\n\n#####\
  \ 输入需要 Shift 键的符号\n\n问号和感叹号亦是如此，它们需要你在字母键盘上按下 `Shift` 键。触摸 `Shift` 键，然后滑动并松开手指于\
  \ `?` 键上。\n\n##### 输入撇号\n\n按住 `逗号/感叹号` 键可看到撇号弹出窗口。撇号会以蓝色高亮显示，因此只需松开按键即可输入它。\n\n\
  ![Image](img/p90-01.jpg)\n\n**提示：** 对于大多数常见的缩略词，你的自动纠正词典应能自动插入撇号。例如，输入“dont”，然后按下\
  \ `空格` 键即可插入撇号，变成“don't”。\n\n#### 长按键盘快捷键以输入符号等\n\n| 你可能还想知道如何输入键盘上未显示的其他符号。**提示：**\
  \ 你可以输入的符号比屏幕上显示的要多。你只需长按与你想要的符号相关的字母、数字或符号；这将调出一个特殊的上下文菜单。 | ![Image](img/p90-02.jpg)\
  \ |\n| 例如，如果你想输入欧元符号（€），请按住 `$` 键，直到看到其他选项。接着，向上滑动手指以高亮显示，然后在欧元符号上松开手指。 | ![Image](img/p91-01.jpg)\
  \ |\n| 这个技巧也适用于 `Safari` 浏览器中的 `.com` 键。你可以通过按住此键来获取更多的网站后缀。右侧的屏幕显示其选项中有 `.co.uk`\
  \ 和 `.ie` 键。这些键在标准的美式键盘上没有出现，但在这里存在，是因为我们安装了英语（英国）国际键盘（有关国际键盘的帮助，请参考本章前面的部分）。 |\
  \ ![Image](img/p91-02.jpg) |\n\n**提示：** 在 `数字` 屏幕上有一个很好的圆点符号（或度数符号，取决于你如何看待它）。你可以通过按住\
  \ `零` 键（`0`）来访问它。你也可以按住 `?` 和 `!` 键来获取它们对应的西班牙语倒置符号。\n\n#### 左右箭头（国际语言）\n\n| 如果（且仅当）你激活了从右向左输入的国际语言键盘（例如希伯来语或日语），你会注意到在文本上方的弹出窗口右端出现一个带有一对箭头的按钮。点击这个\
  \ `箭头` ![Image](img/p92-01.jpg) 按钮，你可以调整文本在 iPad 上的输入方式——从右向左或从左向右。 | ![Image](img/p92-02.jpg)\
  \ |\n\n### 键盘选项与设置\n\n| 有一些键盘选项可以让你的 iPad 输入更加轻松。键盘选项位于 `设置` 应用的 `通用` 标签中。请按照以下步骤更改你的键盘设置：\n\
  1.  轻点 `设置` 图标。\n2.  轻点右侧列中的 `通用`。\n3.  轻点左侧列中的 `键盘` 以查看此屏幕。\n | ![Image](img/p93-01.jpg)\
  \ |\n\n#### 自动大写\n\n| 当你开始一个新句子时，如果 `自动大写` 设置为 `开`，第一个单词将自动大写。此外，常见的专有名词也会被正确大写。例如，如果你输入“New\
  \ york”，系统会提示你将其更改为“New York”——同样，只需按下 `空格` 键即可执行更正。如果你用退格键删除了一个大写字母，iPad 会假定你接下来输入的字母也应该是大写。此功能默认也为\
  \ `开`。 | ![Image](img/p93-02.jpg) |\n\n#### 自动纠正 开 / 关\n\n使用内置词典，“自动纠正”功能会自动对常见的拼写错误进行更改。\n\
  \n**提示：** 如果“自动纠正”功能错误地更改了一个单词，你可以立即按 `退格` 键，调出一个包含原始单词（在自动纠正之前）的弹出窗口。\n\n例如，如果你输入“wont”，自动纠正会即时将其更改为“won't”。如果你希望此功能生效，需要确保“自动纠正”设置为\
  \ `开`（默认设置为 `开`）。\n\n#### 检查拼写\n\n你的 iPad 会自动检查你的拼写，因为此选项的默认设置为 `开`。但是，如果你更想禁用拼写检查，只需将\
  \ `检查拼写` 切换到 `关` 即可。\n\n**提示：** 当拼写检查开启时，拼写检查器认为拼写错误的任何单词都会被加下划线。轻点任何带下划线的单词即可查看建议的更正值列表。\n\
  \n#### 启用大写锁定\n\n有时在输入时，你可能想像在电脑键盘上一样，通过按住 `大写` 键（`上箭头` 键）来锁定大写。启用 `大写锁定` 可以让你做到这一点。此功能默认设置为\
  \ `关`。\n\n#### “.” 快捷键\n\n如果你是 iPhone 或 BlackBerry 用户，你可能熟悉双击 `空格` 键会在句子末尾自动输入句号的功能。这正是你在\
  \ iPad 上可以启用的相同功能。默认情况下，此功能也设置为 `开`。\n\n\n\n#### 使用其他语言输入——国际键盘\n\n截至本书出版时，iPad\
  \ 支持你使用超过十几种语言进行输入。部分亚洲语言（如日语和中文）提供了两到三种键盘，对应不同的输入法。\n\n若要启用多种语言键盘，请按照以下步骤操作：\n\n\
  1.  轻点`设置`图标（请参阅图 2-10）。\n2.  在左侧栏中轻点`通用`。\n3.  在右侧栏底部附近轻点`键盘`。\n4.  轻点`国际键盘`。\n\
  5.  轻点`添加新键盘`以添加其他国际键盘。\n6.  轻点列表中的任意键盘/语言以添加该键盘。\n7.  此时该键盘将出现在可用键盘列表中。\n8.  若要调整键盘选项，请轻点列表中的键盘。\n\
  \n![images](img/0210.jpg)\n\n**图 2-10.** *添加并自定义国际键盘*\n\n##### 编辑或删除国际键盘\n\n编辑或删除国际键盘也十分简单：\n\
  \n1.  返回到显示所有键盘列表的`键盘`屏幕（见图 2-11）。\n2.  轻点右上角的`编辑`以更改键盘顺序或删除键盘。\n3.  若要更改键盘列表的顺序，请向上或向下拖动列表键盘的左边缘。\n\
  4.  若要删除键盘，请轻点`红色减号`图标，然后轻点`删除`。\n\n![images](img/0211.jpg)\n\n**图 2-11.** *编辑和删除国际键盘*\n\
  \n一旦你启用了多个键盘，轻点`地球`键即可在所有语言之间循环切换（请参阅图 2-12）。\n\n日语和其他一些语言提供了多个键盘选项，以满足你的输入偏好。\n\
  \n在某些语言中（例如图 2-12 中显示的日语），你会看到输入的字母自动转换为字符。你还会在键盘上方看到一行其他字符组合。看到你想要的组合时，轻点它即可。\n\
  \n![images](img/0212.jpg)\n\n**图 2-12.** *轻点`地球`键在国际键盘之间循环切换。*\n\n#### 拷贝与粘贴\n\n\
  拷贝和粘贴文本有多种方法。例如，`拷贝和粘贴`功能对于从日历中获取文本并放入电子邮件中非常有用。它也很适合将笔记放入电子邮件或日历中。你甚至可以从你的`Safari`网页浏览器中拷贝文本，然后粘贴到笔记或邮件中。\n\
  \n#### 选择文本\n\n如果你正在阅读或输入文本，可以通过几种方式选择文本。例如，你可以轻点或双击文本以开始选择文本进行拷贝。此操作在邮件、信息和笔记中均有效。\n\
  \n##### 双击并拖动蓝色手柄\n\n选择文本的一种方式是双击一个单词，然后拖动蓝色手柄。\n\n你会看到一个带有蓝色圆点（手柄）的选框位于对角。只需拖动这些手柄即可选择你想要高亮显示并拷贝的文本，如图\
  \ 2-13 所示。\n\n![images](img/0213.jpg)\n\n**图 2-13.** *双击开始选择文本，然后拖动蓝色圆点以扩展选区。*\n\
  \n##### 使用“选择”或“全选”\n\n| 在输入内容时选择文本的另一种方法是轻点文本一次，然后从弹出窗口中选择`选择`或`全选`。除了在文本本身之外，如果你在屏幕上的任意位置双击，也会出现相同的弹出窗口。\
  \ | ![Image](img/p98-01.jpg) |\n\n#### 使用双指触摸选择文本\n\n另一种选择文本的方法要求你同时用两根手指触摸屏幕。如果你用一只手握住\
  \ iPad，用另一只手的拇指和食指触摸屏幕，这种方法效果最佳。你要做的是在你想要选择文本的开始和结束位置同时触摸屏幕。如果第一次触摸未能精确选中，请不要担心。在第一次触摸后，使用蓝色手柄将选区的起始和结束位置拖动到正确位置（请参阅图\
  \ 2-14）。\n\n![images](img/0214.jpg)\n\n**图 2-14.** *通过同时用两根手指触摸屏幕来选择文本。*\n\n####\
  \ 通过长按选择网站或其他不可编辑文本\n\n| 在`Safari`网页浏览器以及其他无法编辑文本的地方，你可以将手指放在某些文本上，一个单词或整个段落将会被高亮显示，并在每个角落出现手柄。如果你想要选择更多文本，可以拖动这些手柄。\n\
  \n**注意：** 向上或向下拖动可快速选择整个段落或更多内容。你可以拖动小于一个段落的距离，以使用带有蓝色手柄的精细文本模式选择器。 | ![Image](img/p99-01.jpg)\
  \ |\n\n#### 剪切或拷贝文本\n\n| 一旦你想要拷贝的文本被高亮显示，只需轻点屏幕顶部的`拷贝`选项卡。该选项卡会变为蓝色，表示文本已在剪贴板上。**注意：**\
  \ 如果你之前已经剪切或拷贝过文本，那么你还会看到`粘贴`选项，如图所示。 | ![Image](img/p99-02.jpg) |\n\n#### 粘贴文本\n\
  \n如果你要将文本粘贴到同一个笔记或邮件中，请按照以下步骤操作：\n\n1.  用手指将光标移动到你想要粘贴文本的位置。请记住使用“放大镜”技巧（本章前面已描述）来帮助你定位光标。\n\
  2.  松开屏幕后，你应该会看到一个弹出窗口，询问你是要`选择`、`全选`还是`粘贴`。\n3.  如果没有看到这个弹出窗口，请双击屏幕。\n4.  选择`粘贴`以粘贴你的选择内容。\n\
  \n![Image](img/p100-01.jpg)\n\n#### 将文本或图像粘贴到另一个应用\n\n按照以下步骤将你拷贝的文本或图像粘贴到另一个应用：\n\
  \n1.  按下`主屏幕`按钮（见图 2-15）。\n2.  轻点你想要粘贴文本的目标应用。在此例中，我们轻点`邮件`。\n3.  轻点`编写`图标 ![Image](img/p101-01.jpg)\
  \ 以撰写新电子邮件。\n4.  在邮件正文中的任意位置双击。\n5.  轻点`粘贴`。\n\n![images](img/0215.jpg)\n\n**图 2-15.**\
  \ *通过双击或按压、按住并松开的方式调出`粘贴`命令。*\n\n将光标移动到文本正文处，然后双击或触摸、按住并松开手指。这将调出`粘贴`弹出窗口。轻点`粘贴`，剪贴板上的文本便会立即粘贴到电子邮件正文中。\n\
  \n#### 摇动以撤销粘贴或输入\n\n| 拷贝和粘贴功能中的一个出色新特性是能够撤销输入或刚刚粘贴的文本。你只需在粘贴后摇晃 iPad。一个新的弹出窗口会出现，让你选择撤销刚才的操作。\n\
  \n轻点`撤销粘贴`或`撤销输入`来纠正错误。**提示：** 键盘上也有一个`撤销`按钮。只需按下`.?123`键；它位于左下角。 | ![Image](img/p102-01.jpg)\
  \ |\n\n**提示：通过选择文本并按退格键来删除文本**\n\n如果你想用一两次轻点来删除多行文本、一个段落甚至所有刚输入的文本，这个技巧对你会有帮助。使用前面介绍的方法选择你想要删除的文本。然后，只需按下键盘左下角的`删除`键\
  \ ![Image](img/p102-02.jpg) 即可删除所有选中的文本。\n\n### 使用 Spotlight 搜索查找内容\n\niPad 上一个非常出色的信息查找功能是`Spotlight\
  \ 搜索`，这是苹果专有的搜索方法。此功能让你的 iPad 能够全局搜索姓名、事件或主题。\n\n其概念很简单。假设你在寻找与 Martin 相关的内容。你不记得它是邮件、笔记还是日历事件；但你确定它与\
  \ Martin 有关。\n\n此时正是使用`Spotlight 搜索`功能在 iPad 上查找所有与 Martin 相关内容的绝佳时机。\n\n\n\n###\
  \ 启动聚焦搜索\n\n首先启动**聚焦搜索**，它位于**主屏幕**第一页的左侧。\n\n![图片](img/p103-01.jpg)\n\n在第一个圆点（表示**主屏幕**的第一页）的左侧，你可以看到一个非常小的**放大镜**图标。从这第一页图标向右滑动，即可进入**聚焦搜索**页面。\n\
  \n![图片](img/p103-02.jpg)\n\n#### 搜索应用\n\n使用**聚焦搜索**的一个好方法是快速查找应用。如果你的**主屏幕**超过两到三页，你可能会想用它。启动搜索并输入应用名称的几个字母，例如**天气**。这将找到所有与天气相关的应用。\n\
  \n![图片](img/p103-03.jpg)\n\n#### 搜索网页或维基百科\n\n如果你确定要搜索网页或维基百科，可以跳过打开**Safari**浏览器并在**搜索**栏中输入信息的步骤。通过跳过进入维基百科网站的步骤，你可以节省更多时间。\n\
  \n例如，你可能想知道美国邮政编码 10708 的位置。只需在**聚焦搜索**中输入`\"10708\"`，然后轻点**搜索网页**（见图 -16）。\n\n\
  ![图片](img/0216.jpg)\n\n**图 2-16.** *从**聚焦搜索**中搜索网页或维基百科。*\n\n#### 搜索邮件、通讯录、视频、歌曲、日程等\n\
  \n**聚焦搜索**的美妙之处在于，它几乎可以搜索 iPad 上的任何内容。你可能想查找联系人、视频、歌曲、日历日程或其他项目。使用起来很简单：只需在**搜索**页面中开始输入即可（见图\
  \ -17）。\n\n**提示：** 如果你在找人，请输入其全名，以便更精确地只找到与该人相关的项目（例如`\"Martin Trautschold\"`）。这将会排除\
  \ iPad 中所有其他叫 Martin 的人，确保只找到与 Martin Trautschold 相关的项目。\n\n在搜索结果中，你会看到搜索找到的所有电子邮件、日程、会议邀请和联系信息。轻点列表中的某个结果即可查看其内容。\n\
  \n![图片](img/0217.jpg)\n\n**图 2-17.** *使用**聚焦搜索**在你的 iPad 上搜索所有类型的内容。*\n\n你的搜索结果会一直保留，直到你手动清除，因此你可以随时从**主屏幕**向右滑动，再次回到**聚焦搜索**。\n\
  \n要清除**搜索**栏，只需轻点**搜索**栏中的 **X** 按键。要退出**聚焦搜索**，只需按下**主屏幕**按键或向左滑动。\n\n#### 自定义聚焦搜索\n\
  \n有时你可能希望有选择地只搜索特定项目。另一些时候，你可能希望从搜索中移除某些特定项目（例如邮件）。你可以通过调整**设置**应用中的**聚焦搜索**选项来实现。请按照以下步骤操作：\n\
  \n1.  轻点**设置**图标。\n2.  轻点**通用**。\n3.  轻点右侧栏中的**聚焦搜索**，即可看到此处所示的屏幕。\n4.  轻点任意项目以勾选或取消勾选。\n\
  5.  长按每个项目右侧边缘的图标，在列表中向上或向下拖动。\n\n![图片](img/p106-01.jpg)\n\n## 第 3 章\n\n## 用 iTunes\
  \ 同步你的 iPad\n\n在本章中，我们将向你展示如何设置，以便在 iPad 与 Windows 或 Mac 电脑之间同步信息。除了同步功能外，iTunes\
  \ 还能做更多事情，比如整理音乐、创建播放列表、购买歌曲和视频；它还具备家庭共享和 Genius 功能。要了解这些功能，请查看第 29 章。\n\n**注意：**\
  \ 如果你的电脑或其他地方没有维护日历或通讯录，电脑上也没有照片、视频、音乐、有声读物或图片，你仍然需要将 iPad 连接到电脑上的 iTunes，至少要为 iPad\
  \ 进行备份，并在有可用更新时进行软件更新。\n\n我们还将向你展示同步前需要考虑的事项、如何设置个人信息的自动同步，以及如何手动传输信息。通过 iTunes，你可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、文档和照片库。iTunes\
  \ 还有一个额外的好处，那就是只要你将 iPad 连接到电脑，它就会自动备份你的 iPad。如果同步出现问题，我们甚至还会向你展示一些简单的故障排除技巧。最后，我们将向你展示如何检查更新以及为\
  \ iPad 安装更新的操作系统软件。\n\n**提示：** 如果你是 iTunes 新手，我们强烈建议你查看第 29 章，“你的 iTunes 用户指南”，以帮助你充分利用\
  \ iTunes。\n\n### 在设置 iTunes 同步之前\n\n在开始使用 iTunes 同步之前，你需要准备几样东西。我们将介绍先决条件，并回答一些关于为何使用\
  \ iTunes 的常见问题。我们还将帮助你了解，如果你拥有其他 Apple 设备（如 iPhone 或 iPod），并与 iPad 同步时会发生什么。\n\n\
  #### 同步前的先决条件\n\n在开始使用 iTunes 同步你的 iPad 之前，你只需要准备好以下几样东西。\n\n1.  确保你的电脑上安装了最新版本的\
  \ iTunes。关于如何安装或更新 iTunes，请参见第 29 章：“你的 iTunes 用户指南”。\n2.  创建一个 iTunes 账户（Apple\
  \ ID）；请参阅第 29 章中的“创建 iTunes 账户”部分。\n3.  找到 iPad 附带的白色同步线缆。线缆的一端插入 iPad 底部靠近**主屏幕**按键的底座接口，另一端插入电脑的\
  \ USB 端口。\n\n#### 我可以在 iPad 与另一部 iPhone、iPod touch 或 iPod 之间同步 iTunes 吗？\n\n**可以！**\
  \ 只要你是同步到同一台电脑，就可以将多个 Apple 设备（Apple 说最多五个，但我们听说有人同步了更多）同步到单台电脑上的同一个 iTunes 账户。\n\
  \n**警告：** 你不能将同一部 iPad、iPhone 或 iPod 同步到两台不同的电脑。当你尝试这样做时，会看到类似这样的信息：“是否要擦除此设备（iPad、iPhone、iPod）并重新同步新资料库？”\
  \ 如果你选择“是”，那么该设备上的所有音乐和视频都将被抹掉。\n\n#### 其他同步选项：MobileMe 和 Exchange/Google\n\n还有其他同步个人信息和电子邮件的方法，例如\
  \ Exchange/Google 和 MobileMe，我们将在第 4 章：“其他同步方法”中介绍。然而请记住，即使你选择使用这些其他的同步方式，你仍然需要使用\
  \ iTunes 来：\n\n*   备份和恢复你的 iPad。\n*   更新 iPad 操作系统软件。\n*   同步和管理你的应用程序，也称为“应用”。\n\
  *   同步你的音乐资料库和播放列表。\n*   同步电影、电视节目、播客和 iTunes U 内容。\n*   同步图书。\n*   同步照片。\n\n####\
  \ 考虑其他同步选项\n\n表 3–1 总结了你的其他同步选项。你选择使用哪种同步方式，应该取决于你当前存储电子邮件、通讯录和日历的地方——也就是你的使用环境。\n\
  \n**注意：** 正如你在表 3–1 中所见，在某些环境下，你可以将通讯录和日历无线同步到你的 iPad。\n\n![图片](img/p109-01.jpg)\n\
  \n![图片](img/p110-01.jpg)\n\n### 设置你的 iTunes 同步\n\n我们将向你展示使用 iTunes 对 iPad 执行自动同步和手动传输信息的所有步骤。\n\
  \n\n\n"
- "# iPad 摘要屏幕\n\n将 iPad 连接到电脑后，您可以查看重要信息，例如 iPad 的 GB 容量、已安装的软件版本和序列号。您还可以检查软件版本更新或恢复\
  \ iPad 上的数据。此屏幕上提供了其他几个选项。\n\n### iTunes 导航基础\n\n熟悉左侧导航栏。点击左侧导航栏中的各个项目，并注意主显示窗口会随之变化（参见图\
  \ 3-1）。\n\n主窗口顶部的导航栏也会根据您在左侧导航栏中选择的内容而变化。\n\n例如，当您在左侧导航栏中点击您的 iPad 时，主窗口顶部会显示与您设备相关的标签。\n\
  \n当您在左侧导航栏中单击 iTunes Store 时，主窗口中会显示与商店相关的标签。\n\n要查看 `iPadSummary` 屏幕：\n\n1. 在您的电脑上启动\
  \ iTunes 软件。\n2. 使用设备附带的白色 USB 数据线将 iPad 连接到电脑。将线的一端插入 iPad 底部靠近 `Home` 按钮的位置，另一端插入电脑的\
  \ USB 端口。\n3. 如果连接成功，您应该在左侧导航栏的 `DEVICES` 下看到您的 iPad。\n4. 点击左侧导航栏中的 iPad，然后点击主窗口左侧边缘的\
  \ `Summary` 标签（参见图 3-1）。\n5. 如果您希望能够将音乐和视频拖放到 iPad 上，则需要勾选 `Manually manage music\
  \ and videos` 旁边的复选框。\n6. 如果您希望每次连接 iPad 时自动打开 iTunes 并进行同步，请勾选 `Open iTunes when\
  \ this iPad is connected` 复选框。\n\n**注意：** 您可能会在摘要屏幕的“选项”区域看到 `Open iTunes when this\
  \ iPad is connected` 旁边的文本和复选框呈灰色（不可点击）。这是因为在 iTunes“编辑”>“偏好设置”![images](img/U001.jpg)\
  \ “设备”标签屏幕中，`Prevent iPods, iPhones and iPads from syncing automatically` 旁边的复选框已被勾选。如果您在“偏好设置”![images](img/U001.jpg)\
  \ “设备”标签中取消勾选此框，则可以使 `Open iTunes when this iPad is connected` 再次变为可点击项目。\n\n![images](img/p111-01.jpg)\n\
  \n![images](img/0301.jpg)\n\n**图 3-1.** *iTunes 中的 iPad 摘要屏幕*\n\n### iTunes 导航基础\n\
  \n熟悉左侧导航栏。点击左侧导航栏中的各个项目，并注意主显示窗口会随之变化。\n\n主窗口顶部的导航栏也会根据您在左侧导航栏中选择的内容而变化。例如，当您在左侧导航栏中点击您的\
  \ `iPad` 时，主窗口顶部会显示与您设备相关的标签。当您在左侧导航栏中点击 `iTunes Store` 时，主窗口中会显示与商店相关的标签。\n\n##\
  \ 进入同步设置屏幕（信息标签）\n\n您的第一步是进入同步联系人、日历、电子邮件等内容的设置屏幕。您可以按照前面描述的进入 `Summary` 屏幕的相同步骤操作，但现在需要在主\
  \ iTunes 窗口顶部点击 `Info` 标签来查看联系人（以及其他同步设置）。\n\n## 同步您的联系人和日历\n\n让我们从设置联系人和日历的同步开始。\n\
  \n1. 勾选 `Sync Contacts with` 复选框，并调整下拉菜单以选择存储联系人的软件或服务。在本书出版时，Windows 电脑上可用的选项有\
  \ Outlook、Google 联系人、Windows 联系人和 Yahoo! 通讯录。参见图 3-2。您还可以选择 `All contacts` 或 `Selected\
  \ groups`。\n2. 要同步日历，请勾选 `Sync Calendars with` 复选框，并调整下拉列表以匹配您在电脑上存储日历的软件，如图 3-2\
  \ 所示。您还可以选择 `All calendars` 或 `Selected calendars`。\n\n![images](img/0302.jpg)\n\
  \n**图 3-2.** *选择用于同步联系人的软件 (Windows)*\n\n**警告**: 每当您在这些同步设置屏幕（称为同步提供商）中的软件和服务之间切换时，都会影响到连接到您\
  \ iTunes 帐户的每一个移动设备。例如，如果您将联系人同步到 iPhone 或 iPod touch（除了您的 iPad 之外），这些更改也会影响到 MobileMe。您将更改您的\
  \ iTunes 帐户所连接的任何其他设备同步联系人的方式。\n\n![images](img/p114-01.jpg)\n\n### Google 和 Yahoo!\
  \ 同步\n\n如果您选择 Google 或 Yahoo! 同步，系统将提示您输入您的 Google ID 或 Yahoo! ID 和密码。\n\n**注意**：您在\
  \ `Info` 标签和其他下拉框中看到的选项会根据您电脑上安装的软件略有不同。例如，在 Mac 上，联系人同步没有下拉列表；相反，其他服务（例如 Google\
  \ 联系人和 Yahoo!）会显示为单独的复选框。\n\n要继续设置您的电子邮件帐户、书签等，请向下滚动页面。如果您不想设置其他任何内容进行同步，请点击 iTunes\
  \ 屏幕右下角的 `Apply` 按钮开始同步。\n\n**提示**：如果您是使用 Microsoft Entourage 的 Mac 用户，则需要启用 Entourage\
  \ 与 iCal 的同步。为此，请进入 Entourage 的“偏好设置”，然后转到“同步服务”并勾选与 iCal 和通讯簿同步的复选框，如图 3-3 所示。如果您是\
  \ Office for Mac 2011 的用户，则需要安装 SP1（Service Pack 1）才能通过 iTunes 同步到您的 iPad。在本书撰写之时，SP1\
  \ 更新尚未发布。根据 Microsoft 的 Office for Mac 网站，您应该能够使用 Apple 同步服务来同步 Outlook 的日历、联系人、备忘录和任务。\n\
  \n![images](img/0303.jpg)\n\n**图 3-3.** *Microsoft Entourage 和 Outlook 设置 (Apple\
  \ Mac)*\n\n\n\n### 同步电子邮件账户、浏览器书签和笔记\n\n向下滚动页面，以同步电子邮件账户设置、浏览器书签和笔记。\n\n**注意**：将电子邮件账户设置同步到\
  \ iPad 后，您仍需在 **设置** > **邮箱、通讯录、日历** 中为每个电子邮件账户输入密码。在 iPad 上，每个账户只需执行一次此操作。\n\n\
  1.  在 iTunes 的同一 **信息** 选项卡上，向下滚动到日历设置下方，以查看 **邮件** 账户设置。\n2.  勾选 **同步邮件账户来源** 复选框，并调整下拉菜单，选择存储电子邮件的软件或服务（图\
  \ 3–4）。这可能是 Windows 电脑上的 Outlook，或 Mac 上的 Entourage 或 Mail。\n\n    ![images](img/0304.jpg)\n\
  \n    **图 3–4.** *设置要同步的电子邮件账户、浏览器书签和笔记*\n\n    **注意**：截至出版时，iTunes 仅支持两种用于同步的网页浏览器：Microsoft\
  \ Internet Explorer 和 Apple Safari。如果您使用 Mozilla Firefox 或 Google Chrome，仍可以同步书签，但需要安装免费的书签同步软件（例如来自\
  \ [`www.xmarks.com`](http://www.xmarks.com) 的 `xmarks`），以将书签从 Firefox 或 Chrome 同步到\
  \ Safari 或 Explorer。然后，您可以通过两步过程同步浏览器书签。`Firefox Home` 应用是 Firefox 用户同步书签的一个不错选择（请访问\
  \ [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8)）。\n\
  \n3.  要同步浏览器书签，请勾选 **同步书签来源** 复选框，并调整下拉菜单，选择您使用的网页浏览器（参见 图 3–4）。目前，您只能选择 Internet\
  \ Explorer 或 Safari。\n4.  要同步笔记，请勾选 **同步笔记来源** 复选框，并选择存储笔记的软件或服务。\n5.  点击 iTunes\
  \ 屏幕右下角的 **应用** 按钮，开始同步。\n\n**注意**：根据您拥有的信息量（尤其是联系人和日历信息），首次同步可能需要 15 分钟或更长时间。\n\
  \n### 将 iPad 与 iTunes 同步\n\n当您将 iPad 连接到电脑的 USB 端口时，同步通常是自动进行的。唯一的例外是您禁用了自动同步。\n\
  \n#### 跟踪同步过程\n\n在 iTunes 顶部的状态窗口中，您可以查看同步的进展情况。您可能会看到 **正在将联系人同步到 [您的姓名] 的 iPad**\
  \ 或 **正在将日历同步到 [您的姓名] 的 iPad**，这能让您了解当前正在同步的内容。\n\n#### 处理同步冲突\n\n有时，iTunes 同步会检测到电脑和\
  \ iPad 上数据之间的冲突，例如两个公司名称不同的相同联系人条目，或两个笔记不同的相同日历条目。处理这些冲突相当简单。\n\n1.  在 **冲突解决器**\
  \ 窗口中，点击正确的信息。这会将背景变为浅蓝色，而未选中的一侧则为白色。参见 图 3–5。\n2.  如果还有更多冲突，请点击 **下一个** 按钮，直到解决所有冲突。\n\
  \n    ![images](img/0305.jpg)\n\n    **图 3–5.** *iTunes 同步冲突解决器*\n\n3.  点击 **完成**\
  \ 关闭窗口。\n4.  您所做的所有选择将应用于下一次与 iPad 的同步。系统会为您提供 **立即同步** 或 **稍后同步** 的选项。\n\n**注意**：冲突可能导致同步过程中止。联系人是首先同步的，然后才是日历。因此，如果发现联系人同步冲突，则在解决联系人冲突之前，日历将不会同步。解决冲突后，请务必重新同步您的\
  \ iPad 以完成同步。\n\n#### 取消正在进行的同步\n\n您可以从 iTunes 或 iPad 上取消同步。\n\n**要取消电脑上 iTunes\
  \ 的同步：**\n\n点击同步状态窗口中的 **X** 按钮，如 图 3–6 所示。\n\n![images](img/0306.jpg)\n\n**图 3–6.**\
  \ *点击 iTunes 状态窗口中的 **X** 按钮以取消同步*\n\n**要从 iPad 取消同步：**\n\n滑动屏幕底部的滑块条，该滑块条显示 **滑动来取消**。其位置与常规的\
  \ **滑动来解锁** 消息相同。\n\n#### 为什么您可能不希望 iTunes 自动同步？\n\n可能有一些原因需要手动同步而非自动同步：\n\n1. \
  \ 您不想用过多的音乐和视频文件填满 iPad。\n2.  同步和备份过程耗时较长，因此您不希望每次连接 iPad 到电脑时都执行此操作。\n3.  您将 iPad\
  \ 连接到不同的电脑为其充电，但不希望每次都被询问是否要抹掉并重新同步音乐。\n\n**注意**：如果您想拖放音乐和视频，请务必在 iTunes 的 **摘要**\
  \ 选项卡中勾选 **手动管理音乐和视频** 复选框。\n\n#### 在自动同步开始前手动阻止\n\n有时您可能希望在连接 iPad 到电脑时不触发自动同步。这可能是因为您时间不多，只想快速拖放几首新歌到\
  \ iPad 上，而无需同步其他所有内容。\n\n要阻止 iPad 的常规自动同步，您可以在连接 iPad 到电脑时，按住电脑键盘上的某些按键。\n\n**在\
  \ Windows PC 上**：\n\n> 在将 iPad 连接到电脑时，按住 **Shift** + **Ctrl** 键。\n\n**在 Mac 上**：\n\
  \n> 在连接 iPad 时，按住 **Command** + **Option** 键。\n\n#### 永久关闭自动同步\n\n您可以在 iTunes 中永久关闭自动同步。如果您更希望对所有同步过程进行手动控制，可能需要这样做。\n\
  \n**警告**：关闭自动同步还会禁止每次将 iPad 连接到电脑时的自动备份。此设置最适合于辅助电脑，您可能仅用它为 iPad 充电，但绝不希望进行同步。\n\
  \n要在 iTunes 中关闭自动同步，请执行以下步骤：\n\n1.  从 iTunes 菜单中，选择 **编辑**，然后选择 **偏好设置**。\n2.  点击顶部的\
  \ **设备** 选项卡。\n3.  勾选 **防止 iPod、iPhone 和 iPad 自动同步** 复选框（参见 图 3–7）。\n4.  点击 **确定**\
  \ 按钮保存您的设置。\n\n![images](img/0307.jpg)\n\n**图 3–7.** *在 iTunes 中禁用自动同步*\n\n\n\n\
  #### 同步功能的全新开始\n\n有时你会遇到同步问题，只需重新开始即可。在 iTunes 中，你可以采取以下措施：清除或重置同步历史记录，让 iTunes\
  \ 认为它是第一次与你的 iPad 同步；你也可以强制 iPad 上的所有信息被电脑上的信息所替换。\n\n##### 重置同步历史记录（让 iTunes 认为它正在首次同步）\n\
  \n要在 iTunes 中重置同步历史记录，请按以下步骤操作：\n\n1.  选择**编辑**菜单，然后点击**偏好设置**。\n2.  在 iTunes 偏好设置窗口顶部，点击**设备**选项卡。\n\
  3.  点击底部的**重置同步历史记录**按钮，如图 3–8 所示。\n4.  在弹出的窗口中点击**重置同步历史记录**以确认你的选择。\n\n![图片](img/0308.jpg)\n\
  \n**图 3–8.** *在 iTunes 中重置同步历史记录*\n\n##### 替换 iPad 上的所有信息（仅限下一次同步）\n\n有时你可能需要让 iPad\
  \ 上的信息焕然一新。无论出于何种原因，你想清除 iPad 上一个或所有已同步应用中的信息，然后重新开始。请按以下步骤操作：\n\n1.  与之前设置同步一样，将\
  \ iPad 连接到电脑，启动 iTunes，在左侧导航栏中点击你的**iPad**，然后在主窗口顶部点击**信息**选项卡。\n2.  向下滚动到底部的**高级**区域（参见图\
  \ 3–9）。\n3.  根据需要勾选一个、几个或所有复选框。\n\n    ![图片](img/0309.jpg)\n\n    **图 3–9.** *在高级区域中，选择你要替换的信息。*\n\
  \n4.  准备就绪后，点击右下角的**应用**按钮。同步应立即开始。你勾选的应用的所有信息将从 iPad 中删除，并替换为电脑中的信息。\n\n### 应用：同步与管理\n\
  \n通过 iTunes，你可以同步和管理 iPad 上的应用。你可以轻松地在某个特定**主**屏幕页面上拖放应用图标，甚至可以在 iPad 的页面之间拖放。\n\
  \n#### 在 iTunes 中同步应用\n\n请按以下步骤同步和管理应用：\n\n1.  与之前设置同步一样，将 iPad 连接到电脑，启动 iTunes，在左侧导航栏中点击你的**iPad**。\n\
  2.  点击主窗口顶部的**应用**选项卡。\n3.  勾选**同步应用**复选框，即可查看存储在 iPad 上的所有应用以及你的**主**屏幕，如图 3–10\
  \ 所示。\n\n![图片](img/0310.jpg)\n\n**图 3–10.** *iTunes 中的同步应用屏幕*\n\n#### 移动应用、处理文件夹或删除应用图标\n\
  \n在此 iTunes 屏幕中，你可以轻松移动并整理应用图标。\n\n**在屏幕内移动应用：** 点击它并将其在屏幕内拖拽。\n\n**在主屏幕页面之间移动应用：**\
  \ 点击并将其拖拽到右栏中的新页面。该新页面会展开；将其放到新页面上。\n\n**将应用停靠到底部程序坞：** 如果已有六个图标，请先移除一个。然后点击并将图标拖拽到程序坞上。\n\
  \n| **移除图标：** 将鼠标悬停在其上，看到 X 后点击该 X。**注意：你无法移除通讯录、设置、Safari 浏览器和其他预装的核心图标。** | ![图片](img/p123-01.jpg)\
  \ |\n| **创建新文件夹：** 将一个图标拖拽到另一个图标上。**将应用移入现有文件夹：** 将图标拖拽到文件夹图标上。**将应用移出文件夹：** 点击文件夹以将其打开。然后将图标拖拽到文件夹外部。**查看另一个主屏幕页面：**\
  \ 在右栏中点击该页面。**删除文件夹：** 从该文件夹中移除所有应用（将它们拖出），文件夹便会消失。 | ![图片](img/p124-01.jpg) |\n\
  \n#### 移除与重新安装应用\n\n要从 iPad 上移除应用，只需取消勾选它旁边的复选框并确认你的选择，如图 3–11 所示。无需担心——由于你在 iTunes\
  \ 中将应用同步到了电脑，你在 iTunes 中仍然保留着一份应用副本。\n\n![图片](img/0311.jpg)\n\n**图 3–11.** *取消勾选应用以将其从\
  \ iPad 中删除*\n\n**提示**：即使你从 iPad 上删除了某个应用，只要你已按图示选择同步应用，你仍可通过重新勾选其旁边的复选框来重新安装该应用。该应用将在下一次同步期间重新加载到你的\
  \ iPad 上。\n\n\n\n#### 将下载的内容导入 iTunes 进行同步\n\n如果在 `iTunes` 内从 `iBookstore`、`iTunes\
  \ Store` 或 `App Store` 购买或下载内容，这些内容会自动出现在你的 `iTunes` 资料库中。但如何将从网络下载的内容导入 `iTunes`\
  \ 呢？（它们不会自动出现在 `iTunes` 中。）如果下载的内容是压缩文件（如有声书 `.zip` 文件），该怎么办？在本节中，我们将帮助你了解从网络下载内容到电脑，再将其导入\
  \ `iTunes`，以便同步到 `iPad` 的基本步骤。\n\n**提示**: 你还可以从 `Audible.com` 找到很棒的免费和付费有声书。\n\n\
  ##### 第 1 步：将内容下载到电脑\n\n| 访问想要下载内容的网站。本例中，我们要从 [`http://librivox.org`](http://librivox.org)\
  \ 下载一本免费有声书。我们搜索了马克·吐温的作品，并希望下载《苦行记》*Roughing It* 的全套章节。点击左侧链接栏中的 `整本书的 Zip 文件`\
  \ 链接。（这个 488 MB 的文件根据你的网速需要 15 分钟到 4 小时完成下载。） | ![images](img/p125-01.jpg) |\n\n\
  ##### 第 2 步：必要时解压文件\n\n| 接下来，找到刚下载的文件。它通常位于你的 `Downloads` 文件夹中。解压所有文件。 | ![images](img/p125-02.jpg)\
  \ |\n| ![images](img/p126-01.jpg) 解压过程因电脑或 Mac 上安装的软件而异。但通常只需双击打开 zip 文件。然后选择 `Unzip`、`Unzip\
  \ All`、`Extract` 或 `Extract All`。大多数情况下，这些文件会直接解压到 `Downloads` 文件夹，或 `Downloads`\
  \ 文件夹中一个以 zip 文件命名的子文件夹内。 | ![images](img/p126-02.jpg) |\n\n##### 第 3 步：将内容拖拽到 iTunes\n\
  \n| 接下来，找到解压后的文件并全部选中。可以按住键盘上的 `Shift` 键，先点击列表中的第一个文件，再点击最后一个文件，即可选中列表中的所有文件。然后，将整个高亮列表拖拽到\
  \ `iTunes` 左侧栏顶部的资料库上释放。也可以使用 `文件` ![images](img/U001.jpg) `将文件添加到资料库` 菜单命令来代替拖放操作。\
  \ | ![images](img/p126-03.jpg) |\n\n##### 第 4 步：选择要同步到设备的内容\n\n按照本章后续小节中的步骤，将下载的内容同步到\
  \ `iPad`。\n\n##### 如何确保有声书显示为有声书（而非音乐）\n\n**提示：** 某些有声书文件会出现在你的 `音乐` 资料库中。以下是修正方法。如果你从\
  \ `Librivox.org` 下载了免费有声书，它可能出现在 `音乐` 资料库中，但你可以更改这一设置。要将其放入正确的 `有声书` 资料库，请执行以下步骤。\n\
  \n1.  用专辑视图查看有声书，以便轻松一次选中所有章节或部分。\n2.  然后右键点击有声书专辑封面，选择 `显示简介`，或按快捷键 `Command +\
  \ I`（Mac）或 `Control + I`（PC）。如果看到关于编辑多个项目信息的警告弹窗，点击 `是`。\n3.  点击 `多个项目简介` 窗口顶部的\
  \ `选项` 标签。\n4.  勾选 `媒体种类` 旁的复选框，并选择 `有声书`。（见上图。）\n\n| ![images](img/p127-01.jpg)\
  \ |\n\n### iPad 与电脑之间的文件共享（文件传输）\n\n只要安装了支持文件的应用（如 `GoodReader` 或 `Stanza`），就可以使用\
  \ `iTunes` 在电脑和 `iPad` 之间传输文件。文件传输通过 `iTunes` 中 `App` 标签页底部（所有应用图标屏幕下方）进行。\n\n**提示**：某些应用（如\
  \ `GoodReader`）自带无线传输和共享文件的方法。有关更多信息，请查看第 27 章：“新媒体：阅读报纸、杂志等”中的 `GoodReader` 部分。\n\
  \n#### 将文件从电脑复制到 iPad\n\n要将文件从电脑复制到 `iPad`，请按以下步骤操作：\n\n1.  如同设置之前的同步一样，将 `iPad`\
  \ 连接到电脑，启动 `iTunes`，然后点击左侧导航栏中的 `iPad`。\n2.  点击主窗口顶部的 `App` 标签。\n3.  向下滚动到应用下方的\
  \ `文件共享` 部分，如图 3–12 所示。\n\n    ![images](img/0312.jpg)\n\n    **图 3–12.** *将文件传输到\
  \ iPad*\n\n4.  点击左侧栏中的任意应用，然后点击右下角的 `添加` 按钮。\n5.  弹出一个窗口。选择要传输的文件并点击 `打开`。文件将立即传输到你的\
  \ `iPad`。\n\n#### 将文件从 iPad 复制到电脑\n\n要将文件从 `iPad` 复制到电脑，请按以下步骤操作：\n\n1.  将 `iPad`\
  \ 连接到电脑，启动 `iTunes`，然后点击左侧导航栏中的 `iPad`。\n2.  点击主窗口顶部的 `App` 标签。\n3.  向下滚动到应用下方的\
  \ `文件共享` 部分（见图 3–13）。\n\n    ![images](img/0313.jpg)\n\n    **图 3–13.** *从 iPad\
  \ 传输文件*\n\n4.  点击左侧栏中要传输文件的应用。\n5.  使用以下任意方法选择一个或多个文件：\n    1.  单击单个文件。\n    2.\
  \  按住 `Control` 键（Windows）或 `Option` 键（Mac），再单击多个文件。\n    3.  按住 `Shift` 键，点击列表中的第一个和最后一个文件，以选中该列表中的所有文件。\n\
  6.  选中文件后，点击右下角的 `存储到` 按钮。\n7.  弹出一个窗口，要求你在电脑上选择一个文件夹来接收来自 `iPad` 的文件。找到并点击该文件夹，然后点击\
  \ `选择文件夹`。文件将立即传输到你的电脑。\n\n### 同步媒体及其他内容\n\n现在来看看如何为音乐、电影、`iBooks`、`iTunes U` 等内容设置自动同步。\n\
  \n**注意**：请确保你在 `iTunes` 中登录的账号与 `iPad` 上使用的 `iTunes` 账号一致，因为受数字版权管理（`DRM`）保护的内容（音乐、视频等）只有在账号匹配时才能同步。你可以在电脑和\
  \ `iPad` 上分别退出并重新登录 `iTunes`，以确保登录了正确的账号。\n\n#### 关注容量（可用空间）\n\n当开始选择要同步的铃声、音乐、视频、图书、播客等内容时，请留意每个\
  \ `iTunes` 同步屏幕底部的容量条。如果发现任何选择已接近或超出容量，就需要做出调整。有时你无法将所有内容都带走！图 3–14 显示我们的 `iPad`\
  \ 上目前还有 15.6 GB（吉字节）可用空间——所以空间很充裕。\n\n![images](img/0314.jpg)\n\n**图 3–14.** *在\
  \ iTunes 中进行同步选择时，注意可用空间*\n\n\n\n### 同步铃声\n\n当你点击`Ringtones`（铃声）标签时，可以选择同步整个铃声库或选定的项目。铃声用于\
  \ iPad 上的 `FaceTime` 通话。\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n2. 点击主窗口顶部的\
  \ `Ringtones`（铃声）标签。\n3. 勾选右侧显示的 `Sync Ringtones`（同步铃声）复选框。\n4. 默认设置为同步所有铃声。若只同步特定铃声，请点击\
  \ `Selected ringtones`（选定的铃声）旁边的单选按钮。\n5. 完成选择后，点击 `Apply`（应用）按钮开始同步铃声。\n\n| ![图片](img/p131-01.jpg)\
  \ |\n\n**提示**：了解如何在第 18 章：“FaceTime 视频消息和 Skype”中为联系人分配铃声、购买自定义铃声以及从音乐中创建自己的铃声。\n\
  \n### 同步音乐\n\n当你点击 `Music`（音乐）标签时，可以选择同步整个音乐库或选定的项目。\n\n**警告**：如果你已经手动将部分音乐、音乐视频或语音备忘录传输到\
  \ iPad，你将会收到一条警告信息，提示 iPad 上的所有现有内容将被移除，并替换为从电脑选定的音乐库。\n\n要将音乐从电脑同步到 iPad，请按照以下步骤操作：\n\
  \n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n2. 点击主窗口顶部的 `Music`（音乐）标签。\n3.\
  \ 勾选 `Sync Music`（同步音乐）复选框（参见图 3–15）。\n4. 仅当你*确定*你的音乐库不会太大而无法容纳在 iPad 上时，才点击 `Entire\
  \ music library`（整个音乐库）旁边的按钮。\n5. 如果不确定音乐库是否过大，或者只想同步特定的播放列表或艺人，请点击 `Selected playlists,\
  \ artists, and genres`（选定的播放列表、艺人和风格）旁边的按钮。\n6. 你可以通过勾选相应复选框来选择是否包含音乐视频和语音备忘录。\n\
  7. 你还可以选择自动用歌曲填充剩余空间。\n\n    **警告**：我们不建议勾选此选项，因为它会占用 iPad 上的所有空间，导致无法安装那些很酷的应用程序！\n\
  \n8. 现在勾选屏幕底部两列中的任何播放列表或艺人。你甚至可以使用 `Artists`（艺人）列顶部的搜索框搜索特定艺人。\n\n![图片](img/0315.jpg)\n\
  \n**图 3–15.** *与 iPad 同步音乐*\n\n### 同步影片\n\n当你点击 `Movies`（影片）标签时，可以选择同步特定影片、最近影片、未观看影片或全部影片。\n\
  \n要将影片从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
  2. 点击主窗口顶部的 `Movies`（影片）标签。\n3. 勾选 `Sync Movies`（同步影片）复选框（参见图 3–16）。\n4. 如果你希望同步最近或未观看的影片，请勾选\
  \ `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1 most recent`（最近 1 个）、`All\
  \ unwatched`（所有未观看）、`5 most recent unwatched`（最近 5 个未观看）等。\n\n    ![图片](img/0316.jpg)\n\
  \n    **图 3–16.** *配置影片同步以自动包含选择内容*\n\n5. 如果你选择了 `All`（全部）之外的任何项目，则可以选择将特定影片或视频同步到\
  \ iPad。只需勾选你想要包含在同步中的影片旁边的复选框即可。\n\n### 同步电视节目\n\n当你点击 `TV Shows`（电视节目）标签时，可以选择同步特定节目、最近节目、未观看节目或全部节目。\n\
  \n要将电视节目从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
  2. 点击主窗口顶部的 `TV Shows`（电视节目）标签。\n3. 勾选 `Sync TV Shows`（同步电视节目）复选框（参见图 3–17）。\n4.\
  \ 如果你希望同步最近或未观看的电视节目，请勾选 `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1\
  \ newest`（最新 1 个）、`All unwatched`（所有未观看）、`5 oldest unwatched`（最早 5 个未观看）、`10 newest\
  \ unwatched`（最新 10 个未观看）等。\n\n    ![图片](img/0317.jpg)\n\n    **图 3–17.** *配置电视节目同步以自动包含选择内容*\n\
  \n5. 在 `episodes of`（...的剧集）旁边选择 `all Shows`（所有节目）或 `selected Shows`（选定的节目）。\n6.\
  \ 如果选择 `Selected Shows`（选定的节目），你可以在屏幕中间的两个区域中选择单个节目甚至单个剧集。\n7. 如果你有电视节目的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些节目。\n\
  \n### 同步播客\n\n当你点击 `Podcasts`（播客）标签时，可以选择同步特定播客、最近播客、未播放播客或全部播客。\n\n**提示**：播客是通常定期更新的音频或视频节目（例如每日、每周或每月更新）。大多数都可以在\
  \ iTunes Store 免费订阅。当你订阅并按照本节所述设置自动同步后，你将在 iPad 上收到所有喜爱的播客。\n\n许多你喜爱的广播节目都会以播客形式录制和播出。我们鼓励你浏览\
  \ iTunes Store 的 `Podcast`（播客）部分，看看哪些内容可能让你感兴趣。你会找到电影评论、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等众多播客。\n\
  \n要将播客从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
  2. 点击主窗口顶部的 `Podcasts`（播客）标签。\n3. 勾选 `Sync Podcasts`（同步播客）复选框（参见图 3–18）。\n4. 如果你希望同步最近或未播放的播客，请勾选\
  \ `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1 newest`（最新 1 个）、`All unplayed`（所有未播放）、`5\
  \ newest`（最新 5 个）、`10 most recent unplayed`（最近 10 个未播放）等。\n\n    ![图片](img/0318.jpg)\n\
  \n    **图 3–18.** *配置播客同步以自动包含选择内容*\n\n5. 在 `episodes of`（...的剧集）旁边选择 `All Podcasts`（所有播客）或\
  \ `Selected Podcasts`（选定的播客）。\n6. 如果选择 `Selected Podcasts`（选定的播客），你可以在屏幕中间的两个区域中选择单个播客甚至单集。\n\
  7. 如果你有播客的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些节目。\n\n**提示**：同步这些播客后，你可以在设备上的 `Music`（音乐）应用中的\
  \ `Podcasts`（播客）部分欣赏它们。\n\n\n\n#### 同步 iTunes U\n\n当你点击 `iTunes U` 标签页时，可以选择同步特定、最近或未播放的\
  \ iTunes U 内容，或者同步所有内容。\n\n**提示**：`iTunes U` 播客与其他音频或视频播客类似，但侧重于教育内容，且大多由高校制作。在\
  \ iTunes Store 中，大多数可免费订阅。当你按照本节的说明订阅并设置自动同步后，你将在 iPad 上收到所有你喜爱的 `iTunes U` 播客。\n\
  \n请务必查看 iTunes Store 中的 `iTunes U` 版块。你可能会发现你心仪的大学或学院提供了教授生物学、天文学或更多知识的节目。甚至还有斯坦福大学关于如何开发\
  \ iPad 应用的课程！许多顶尖大学都在 `iTunes U` 中播放知名教授的课堂讲座。快去看看吧——你会发现的内容令人惊叹！\n\n要将 `iTunes\
  \ U` 内容从电脑同步到 iPad，请按照以下步骤操作：\n\n1.  将 iPad 连接到电脑，启动 iTunes，然后在左侧导航栏中点击你的`iPad`。\n\
  2.  点击主窗口顶部的 `iTunes U` 标签页。\n3.  勾选 `同步 iTunes U` 复选框（参见图 3–19）。\n4.  如果你想同步最近或未播放的项目，请勾选\
  \ `自动包含` 复选框，并使用下拉菜单选择 `全部`、`最新 1 个`、`所有未播放`、`最新 5 个`、`最近 10 个未播放` 等选项。\n\n    ![images](img/0319.jpg)\n\
  \n    **图 3–19.** *配置 iTunes U 同步以自动包含所选内容*\n\n5.  在 `项目` 旁边选择 `所有合集` 或 `所选合集`。\n\
  6.  如果选择 `所选合集`，你可以选择单个合集，甚至可以选择屏幕中间两个区域中的单个项目。\n7.  如果你有 `iTunes U` 播客的播放列表，可以通过勾选屏幕底部\
  \ `从播放列表中包含项目` 下的复选框来选择包含这些播放列表。\n\n#### 同步 iBooks、PDF 文件和有声读物\n\n当你点击 `图书` 标签页时，可以选择同步全部或部分的图书及有声读物。\n\
  \n**提示**：iPad 上的图书是纸质图书的电子版。它们采用一种名为 `ePub` 的特定电子格式。你可以在 iPad 上的 iBookstore 中购买，或从其他来源获取，并使用此处描述的步骤将其同步到\
  \ iPad。从其他来源获取的图书必须没有保护或“无 DRM”才能同步到 iPad。你可以在 iPad 上的 `iBooks` 应用或其他图书阅读器中阅读这些图书。详见第\
  \ 12 章：“iBooks 与电子书”。\n\n要在电脑和 iPad 之间同步图书、PDF 文件或有声读物，请按照以下步骤操作：\n\n**提示**：你可以在\
  \ iBookstore 中搜索“project gutenberg”来查找免费的 iBooks。你也可以通过电脑浏览器访问 [`http://librivox.org`](http://librivox.org)，下载公共领域的有声读物，从而获得免费的音频书。（这些免费有声读物通常并非由专业演员录制，而是由志愿者录制，因此质量可能参差不齐。）请参阅本章中的“将下载的项目导入\
  \ iTunes 以进行同步”部分，了解如何下载和同步免费有声读物的具体方法。\n\n1.  将 iPad 连接到电脑，启动 iTunes，然后在左侧导航栏中点击你的`iPad`。\n\
  2.  点击主窗口顶部的 `图书` 标签页。\n3.  勾选 `同步图书` 和 `同步有声读物` 复选框（参见图 3–20）。\n4.  如果你想同步所有图书，请保留默认的\
  \ `所有图书` 选项。\n5.  否则，请选择 `所选图书`，并勾选窗口中的特定图书以进行选择。\n\n    **提示**：为了将 iBooks、PDF 文件和其他类似文档同步到\
  \ iPad，你需要先将文件从电脑拖放到你的 iTunes 资料库中。从电脑上的任何文件夹中抓取文件，然后将其直接拖放到 iTunes 左上角列中的资料库上。\n\
  \n    ![images](img/0320.jpg)\n\n    **图 3–20.** *配置图书和有声读物同步以自动包含所选内容*\n\n6.  如果你想同步所有有声读物，请保留默认的\
  \ `所有有声读物` 选项。\n7.  否则，请选择 `所选有声读物`，并通过勾选此选项下方窗口中的特定有声读物进行选择。\n\n**提示**：同步这些图书后，你可以在设备上的\
  \ `iBooks` 应用中享受阅读。你可以在 `iPod` 应用中收听有声读物，该应用左侧有 `有声读物` 标签页。\n\n**注**：来自 `Audible`\
  \ 的有声读物要求你首先使用你的 `Audible` 账户对电脑进行授权，然后才能从电脑将其同步到 iPad。\n\n#### 同步照片\n\n当你点击 `照片`\
  \ 标签页时，可以选择同步所有文件夹或所选文件夹中的照片，甚至还可以包含视频。\n\n**提示**：你可以在令人惊艳的 iPad 屏幕上创建精美的电子相框并分享你的照片（参见第\
  \ 16 章：“iPad 摄影”）。你甚至可以使用照片来设置背景墙纸和锁定屏幕墙纸（更多信息请参见第 7 章：“个性化你的 iPad 并确保其安全”）。\n\n\
  要将照片从电脑同步到 iPad，请按照以下步骤操作：\n\n1.  将 iPad 连接到电脑，启动 iTunes，然后在左侧导航栏中点击你的`iPad`。\n\n\
  \    **提示**：Mac 用户也可以使用 `iPhoto` 或 `Aperture` 同步照片，包括事件（基于时间的同步）、面孔（基于人的同步）和地点（基于位置的同步）。\n\
  \n2.  点击主窗口顶部的 `照片` 标签页。\n3.  勾选 `同步照片来源` 复选框（参见图 3–21）。\n\n    ![images](img/0321.jpg)\n\
  \n    **图 3–21.** *配置照片同步以自动包含所选内容*\n\n4.  点击 `同步照片来源` 旁边的下拉菜单，选择存储照片的文件夹。如果你想抓取所有照片，请选择最高层级的文件夹（例如，Windows\
  \ 电脑上的 `C:` 或 Apple Mac 上的 `/`）。\n5.  如果你想同步电脑上选定文件夹中的所有照片，请选择 `所有文件夹`，如图 3–21 所示。\n\
  \n    **警告**：由于电脑上的照片资料库可能过大而无法容纳在 iPad 上，因此勾选 `所有文件夹` 时请务必谨慎。\n\n6.  否则，请选择 `所选文件夹`，并通过勾选下方窗口中的特定文件夹进行选择，如图\
  \ 3–21 所示。\n7.  你还可以通过勾选 `包含视频` 复选框来包含文件夹中的任何视频，如图 3–21 所示。\n8.  完成要同步的照片选择后，点击\
  \ `应用` 按钮以保存设置并开始同步。\n9.  当同步开始时，你将在 iTunes 中间顶部的状态窗口中看到同步状态。\n\n### 如何了解 iTunes\
  \ 中哪些是新的或未播放的\n\n你可能会注意到 iTunes 左侧导航栏中项目旁边的小数字（参见图 3–22）。主窗口中项目的右上角也有类似的蓝色小数字。这些数字显示了有多少项目未播放、未观看，或者对于应用而言，需要更新。\n\
  \n![images](img/0322.jpg)\n\n**图 3–22.** *快速查看未播放项目的数量*\n\n\n\n### 在 iPad 上手动传输音乐、影片、播客等（拖放法）\n\
  \n“自动同步”部分展示了如何自动将内容同步到 iPad。这里你将学习如何手动传输歌曲、视频、图书、有声读物等内容。所有类型内容的传输过程都相同，因此我们仅以其中一种类型为例进行说明。\n\
  \n**提示**：使用相同的拖放技巧可将项目添加到播放列表中。\n\n要将内容从电脑手动传输到 iPad，请按照以下步骤操作：\n\n**注意**：在尝试拖放音乐或视频之前，请务必在\
  \ iTunes 的“摘要”标签页中勾选“手动管理音乐和视频”。如果你已选择自动同步内容（例如音乐、影片、播客等），则无法使用此拖放方法将项目复制到 iPad。\n\
  \n1. 将 iPad 连接到电脑，并启动 iTunes。\n2. 在左侧导航栏中，点击你的 `iPad`。然后点击顶部的“摘要”标签页。在屏幕底部附近，确保勾选了“手动管理音乐和视频”复选框。如果你之前在\
  \ iPad 上同步过音乐或视频，可能会出现一条警告消息，提示所有先前同步的音乐和视频将被你的 iTunes 资料库替换。这没有关系。\n\n   ![images](img/p143-01.jpg)\n\
  \n3. 在左侧导航栏的“资料库”标题下，点击你要传输的内容类型（“音乐”、“影片、电视节目、播客、iTunes U”等）。\n4. 在主窗口中，你将看到你的内容资料库。通常最简单的方法是选择\
  \ iTunes 顶部的“列表视图”，如图 3–23 所示。这使你能够以列表形式查看所有内容，并轻松选择单个项目或一组项目。\n\n   ![images](img/0323.jpg)\n\
  \n   **图 3–23.** *选择要拖放到设备上的媒体*\n\n5. 以下是如何单独、以列表形式或分散选择内容的方法：\n   1. 要选择单个项目，只需单击它将其高亮显示。\n\
  \n      ![images](img/p144-01.jpg)\n\n   2. 要选择不连续列表中的项目，Windows 用户请按住 `Control`\
  \ 键并同时单击项目，Mac 用户请按住 `Command` 键并同时单击项目。\n\n      ![images](img/p144-02.jpg)\n\n\
  \   3. 要选择连续列表中的项目，请按住 `Shift` 键，先单击列表中的第一个项目，再单击最后一个项目。中间的所有项目将被选中。\n\n      ![images](img/p145-01.jpg)\n\
  \n6. 然后，要将这些项目复制到 iPad，只需单击选中的项目并将其拖到你的 iPad 上，然后松开鼠标按钮。所有选中的项目将被复制到左侧“设备”栏下的 iPad\
  \ 中。\n\n### iTunes 与同步故障排除\n\n有时 iTunes 的行为可能并不完全如你所预期，因此这里提供一些简单的故障排除技巧。\n\n####\
  \ 查阅 Apple 知识库获取有帮助的文章\n\n遇到问题时的第一步是查阅 Apple 的支持页面，那里有大量有用信息。在 iPad 或电脑的网页浏览器中，访问以下网页并点击某个主题或设备以获取帮助：\n\
  \n[`www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/)\n\n#### iTunes\
  \ 无响应并锁定（Windows 电脑）\n\n1. 同时按下键盘上的 `Ctrl` + `Alt` + `Del` 键，调出“Windows 任务管理器”。“任务管理器”应类似于图\
  \ 3–24 所示。\n\n   ![images](img/0324.jpg)\n\n   **图 3–24.** *在 Windows 任务管理器中定位 `iTunes.exe`\
  \ 以终止它*\n\n2. 然后，要结束该进程，从弹出窗口中点击“结束进程”。\n3. 现在，iTunes 应被强制关闭。\n4. 尝试重新启动 iTunes。\n\
  5. 如果 iTunes 无法启动或再次锁定，请重启电脑并重试。\n\n#### iTunes 无响应并锁定（Mac 电脑）\n\n**提示**：按下 `Command`\
  \ + `Option` + `Escape` 是调出图 3–25 所示“强制退出应用程序”窗口的快捷键。\n\n1. 向上点击顶部 iTunes 菜单。\n\
  2. 点击“退出 iTunes”。\n3. 如果这不起作用，请转到任何其他程序，点击左上角的小苹果图标。\n4. 点击“强制退出”，将显示正在运行的程序列表。\n\
  5. 高亮 iTunes 并点击“强制退出”按钮。\n6. 如果这仍无帮助，请尝试重启你的 Mac。\n\n![images](img/0325.jpg)\n\n\
  **图 3–25.** *Mac 电脑上的“强制退出应用程序”窗口*\n\n### 更新 iPad 操作系统\n\n你可以使用 iTunes 检查更新的软件并安装更新的操作系统（称为“iOS”）。\n\
  \n**注意**：请在你不介意至少 30 分钟无法使用 iPad 时进行此更新，具体时间取决于 iPad 上的信息量以及你的电脑和网络连接速度。\n\n通常，iTunes\
  \ 会按照设定计划（大约每两周）自动检查更新。如果未找到更新，iTunes 会告知你下次检查更新的时间。\n\n要手动检查 iTunes 中的 iOS 更新软件并安装，请执行以下步骤，并参见图\
  \ 3–26：\n\n1. 启动 iTunes。\n2. 将 iPad 连接到电脑。\n3. 在左侧导航栏的“设备”下，点击你的 `iPad`。\n4. 点击顶部导航栏中的“摘要”标签页。\n\
  5. 在屏幕中央的“版本”部分，点击“检查更新”按钮。\n\n   ![images](img/0326.jpg)\n\n   **图 3–26.** *检查更新软件*\n\
  \n6. 如果你已拥有最新版本，你将看到弹出窗口提示类似“此 iPad 软件版本 (4.x.x) 为当前版本”。点击“确定”关闭窗口。更新过程就此完成。\n7.\
  \ 如果你没有最新版本，右侧会显示类似窗口，告知有新版本可用，并询问是否要更新。点击“下载并更新”。\n\n   ![images](img/p149-01.jpg)\n\
  \n8. iTunes 将引导你浏览几个屏幕，其中描述更新并要求你同意软件许可。如果你同意，点击“下一步”和“同意”，以下载 Apple 提供的最新 iOS 软件。这大约需要\
  \ 5–10 分钟。\n\n   ![images](img/p149-02.jpg)\n\n   **提示**：我们将在第 29 章“故障排除”的“重新安装\
  \ iPad 操作系统”部分，展示此更新过程中你可能会看到的所有屏幕。\n\n9. 接下来，iTunes 将备份你的 iPad，如果你的 iPad 存有大量数据，这可能需要\
  \ 10 分钟或更长时间。\n10. 现在将安装新的 iOS，你的 iPad 数据将被擦除。\n11. 最后，你将看到屏幕，允许你将 iPad 设置为新设备或从备份恢复。\n\
  \    1.  如果你想在更新过程后擦除所有数据，请选择“设置为新的 iPad”。\n    2.  选择“从以下备份恢复”，并确保选择了正确的备份文件（通常是最新的那个）。\n\
  \n现在你的 iPad 将按照你的选择进行恢复或设置，iPad 操作系统更新完成。\n\n\n\n## 其他同步方式\n\n在第 3 章“用 iTunes 同步你的\
  \ iPad”中，你学习了如何将 iPad 连接到电脑并使用 iTunes 同步你的个人信息、音乐、视频等。在本章中，我们将探索一些替代方法，用于将信息无线同步到你的\
  \ iPad。无线方式的好处在于，你无需将 iPad 连接到电脑即可更新信息。一切通过无线网络自动完成。我们将涵盖的两种方法是 Apple 的 MobileMe\
  \ 服务和 Exchange/Google 同步。\n\n**注**：如果你使用`Gmail`账户设置（而非本章所述的`Exchange`）来设置你的 Gmail，你将能够无线同步你的电子邮件、日历和备忘录，但不能同步你的\
  \ Google 通讯录。因此，如果你不需要同步 Google 通讯录，可以使用`Gmail`设置来代替`Exchange`。\n\n### 无线同步你的 Google、Hotmail\
  \ 或 Exchange 信息\n\n使用我们在此描述的步骤，你的 iPad 可以通过 Microsoft Exchange 账户或 Google 账户无线同步你的电子邮件、通讯录和日历。\n\
  \n**提示**：你现在可以在 iPad 上无线同步多个 Exchange 账户。如果你有多个 Google、Hotmail 或 Microsoft Exchange\
  \ 账户，你可以同时将它们全部无线同步到你的 iPad。\n\n#### 为什么我们说 Google/Exchange？\n\n我们在此交替使用 Google\
  \ 和 Exchange 这两个词，因为你是在 iPad 上使用`Exchange`设置来配置你的 Google 同步功能。Google 已获得 Microsoft\
  \ Exchange ActiveSync 的授权，因此你现在可以像设置 Exchange 账户一样设置你的 Google 账户，并享受同样的推送电子邮件、通讯录和日历功能。我们知道这有点令人困惑，但无论是\
  \ Google 账户还是 Exchange 账户，你都是以完全相同的方式，在 iPad 上使用`Exchange`设置来配置的——所以我们说 Google/Exchange。\n\
  \n从编写原版 iPad 图书到编写这本 iPad 2 图书期间，Hotmail 也增加了 ActiveSync 功能，因此我们在本章中加入了关于如何设置 Hotmail\
  \ 的内容。\n\n#### 如果你需要一个 Google 账户，就创建一个\n\n如果你没有 Microsoft Exchange 账户，但仍希望进行无线同步，那么你应该设置一个免费的\
  \ Google 账户来存储你的通讯录和日历。该账户将允许你开始使用 Google 邮件 (Gmail)、通讯录和日历。\n\n若要设置你的 Google 账户，请按照以下步骤操作：\n\
  \n1.  在你的电脑浏览器中（你无法在 iPad 上创建 Gmail 账户）输入：[`www.gmail.com`](http://www.gmail.com)。\n\
  2.  点击**创建账户**按钮。\n\n    ![图片](img/p152-01.jpg)\n\n3.  在下一个屏幕上，输入要求的信息，然后点击页面底部的按钮，该按钮显示**我接受。创建我的账户。**\n\
  4.  如果成功，你将看到一个显示**恭喜！**的屏幕。点击**显示我的账户**按钮以开始使用。\n5.  若要查看你的日历，请点击左上角的**日历**链接（参见图\
  \ 4–1）。\n6.  若要查看你的通讯录，请点击 Gmail 收件箱页面左侧的**通讯录**链接。\n\n![图片](img/0401.jpg)\n\n**图\
  \ 4–1.** *导航查看你的 Gmail 收件箱、通讯录和日历*\n\n一旦你按照本章所示设置了同步，你就会开始看到来自 Google 的通讯录和日历的所有更改神奇地出现在你的\
  \ iPad 上。同样，你在 iPad 上所做的任何更改或添加内容，也会在片刻之后自动出现在 Google 中。\n\n**提示**：你的 Google 通讯录列表非常容易增长到数千条，因为它会自动包含你曾经用\
  \ Gmail 账户发过邮件的每个人。你可能希望在设置与 iPad 同步之前先清理一下你的通讯录列表。\n\n#### 在你的 iPad 上设置你的 Google、Hotmail\
  \ 或 Exchange 账户\n\n以下步骤向你展示如何为你的 Exchange 账户或你的 Google 通讯录和日历设置无线同步：\n\n1.  触摸 iPad\
  \ 上的**设置**图标。\n2.  点击**邮件、通讯录、日历**。\n3.  在右侧列中，你将看到你的电子邮件账户列表，在其下方是**添加账户**选项。\n\
  \n    ![图片](img/p153-01.jpg)\n\n    如果你没有设置任何账户，你将只看到**添加账户**。无论哪种情况，均点击**添加账户**。\n\
  \n4.  在下一个屏幕上，选择**Microsoft Exchange**。\n\n    **注**：如果你想与你的 Google 通讯录和日历进行无线同步，你应该选择\
  \ Microsoft Exchange。如果你选择`Gmail`，你将无法无线同步你的 Google 通讯录，并且备忘录也无法与你的日历同步。\n\n   \
  \ ![图片](img/p154-01.jpg)\n\n5.  输入你的电子邮件地址。\n\n    **提示**：要在电子邮件地址中输入 **.com**（或\
  \ `.net`、`.edu`、`.org` 等），请按住句点键，直到看到 **.com** 键出现在其上方。滑动手指并按下 **.com**。\n\n   \
  \ ![图片](img/p154-02.jpg)\n\n    ![图片](img/p154-03.jpg)\n\n6.  很多时候，你的电子邮件地址也是你的用户名。如果是这样，复制粘贴比重新输入更容易。要将你的电子邮件地址复制到用户名字段，请按照以下步骤操作：\n\
  \    1.  按住**电子邮件地址**，直到看到黑色弹出窗口出现在其上方。点击**全选**。\n\n        ![图片](img/p154-04.jpg)\n\
  \n    2.  点击**拷贝**。\n\n        ![图片](img/p155-01.jpg)\n\n    3.  在**用户名**字段中双击（你也可以按住），直到看到弹出窗口出现，然后点击**粘贴**。\n\
  \n        ![图片](img/p155-02.jpg)\n\n7.  对于 Gmail，将**域**字段留空。\n\n    对于 Exchange\
  \ 电子邮件，你可能需要输入由你的管理员提供的域名。\n\n    输入你的**密码。**\n\n    如果你愿意，可以调整账户的**描述**，该描述默认为你的电子邮件地址。\n\
  \n    ![图片](img/p155-03.jpg)\n\n8.  点击右上角的**下一步**按钮。\n9.  你可能会看到一个**无法验证证书**屏幕，如下所示。如果看到了，请点击**接受**以继续。\n\
  \n    ![图片](img/p155-04.jpg)\n\n10.  对于 Gmail，在**服务器**字段中输入 `m.google.com`。\n\n\
  \    对于 Hotmail，在**服务器**字段中输入 `m.hotmail.com`。\n\n    对于 Exchange 电子邮件，请输入你的服务器地址。（示例：`mobile.servername.com`）\n\
  \n11.  点击右上角的**下一步**。\n\n    ![图片](img/p156-01.jpg)\n\n12.  在此屏幕上，你可以选择将**邮件**、**通讯录**和**日历**的无线同步**开启**或**关闭**。对于你想要开启的每个同步，点击开关将其更改为**开启**。\n\
  \n    ![图片](img/p156-02.jpg)\n\n    ![图片](img/p156-03.jpg)\n\n    **注**：如果你的 iPad\
  \ 上已有通讯录或日历项目，在点击通讯录和日历旁边的**是**之后，你可能会看到警告弹出消息。\n\n    你的选择是**保留在 iPad 上**或**删除**。如果你选择**取消**，则会停止设置你的\
  \ Exchange 账户。\n\n    选择**保留在 iPad 上**以保留 iPad 上所有现有的通讯录和日历事件。这些项目不会出现在你的 Google\
  \ 或 Exchange 账户中——它们将保留在你的 iPad 上。\n\n    如果你的 Google 或 Exchange 账户中已存在相同的通讯录或日历事件，你的\
  \ iPad 上最终可能会出现一些重复的通讯录或日历事件。\n\n    如果你已经在你的 Exchange 或 Google 账户中有这些通讯录或日历项目，并且不希望重复，请选择**删除**。\n\
  \n13.  点击**存储**以保存你的设置。\n\n    ![图片](img/p157-01.jpg)\n\n14.  你已完成账户的初始设置。你应该会在**邮件、通讯录、日历**屏幕上的**账户**标题下看到你的新账户被列出。\n\
  \n    ![图片](img/p157-02.jpg)\n\n\n\n#### 编辑或删除您的 Google、Hotmail 或 Exchange 账户\n\n\
  在 iPad 上设置好 Google、Hotmail 或 Exchange 账户后，您可能需要调整一些默认设置，例如同步哪些邮件文件夹（默认仅同步收件箱）、同步多少天内的邮件（默认为三天）以及其他设置。您也可以按照此处所示的步骤来移除或删除该账户。\n\
  \n1.  进入邮件设置界面，就像首次设置账户时那样（轻点`设置`图标，轻点`邮件、通讯录、日历`）。\n2.  轻点您想要调整或移除的邮件账户。\n\n  \
  \  ![images](img/p157-03.jpg)\n\n3.  若要更改您的账户用户名、账户名称或密码，请轻点顶部的`账户`。您将看到首次设置此账户时所看到的信息。\n\
  4.  若要从 iPad 上移除该账户，请轻点底部的`删除账户`并确认您的选择。\n\n    ![images](img/p158-01.jpg)\n\n5.\
  \  若要启用或禁用`邮件`、`通讯录`和`日历`项目的无线同步，请将对应的开关设为`开`或`关`。\n\n    **注意**：如果将这些项目中的任一开关设为“关”，它们都将从您的\
  \ iPad 中删除。例如，所有已同步的通讯录联系人会立即从您的`通讯录`应用中删除。\n\n6.  若要调整同步到 iPad 上的邮件数量，请轻点`邮件同步天数`并根据需求进行调整（您可以选择从`1\
  \ 天`到`无限制`，默认设置为 3 天）。\n\n    轻点左上角的`电子邮件账户名称`按钮，以保存您的选择并返回上一屏幕。\n\n    ![images](img/p158-02.jpg)\n\
  \n7.  `轻点要推送的邮件文件夹`，以指定哪些邮件文件夹应同步到您的 iPad。\n\n    默认情况下仅同步`收件箱`，但您可以轻点选择任意数量的文件夹。（每个选中的文件夹会显示一个勾选标记。）\n\
  \n    **提示**：只有当您在此处选择了要同步的文件夹后，您才能在 iPad 上在这些文件夹之间移动邮件。\n\n    ![images](img/p159-01.jpg)\n\
  \n8.  轻点左上角的`电子邮件账户名称`，以保存您的选择并返回上一屏幕。\n9.  然后轻点右上角的`完成`按钮，以完成此账户的设置并返回`设置`。\n10.\
  \ 按下`主屏幕`按钮，返回到`主屏幕`。\n\n    ![images](img/p159-02.jpg)\n\n#### 在 iPad 上使用无线同步的数据\n\
  \n设置好无线同步后，您的通讯录和日历信息将迅速流入您的 iPad。如果您有成千上万的联系人，首次同步完成可能需要几分钟。\n\n您可能想先查阅一下第 14 章：“使用通讯录”以及第\
  \ 15 章：“您的日历”，以了解使用这两个应用的详细信息。\n\n**注意**：由于与 Google 或 Exchange 的同步是无线进行的，您需要确保 iPad\
  \ 拥有有效的网络连接。请查看第 5 章：“Wi-Fi 与 3G 连接”了解更多信息。\n\n##### 用于 Google/Exchange 联系人新添加的分组\n\
  \n您添加到 iPad 的每个 Google/Exchange 账户，最终都会在您的`通讯录`应用中形成一个独立的分组。如果您已将某些联系人添加到 iPad，或至少已通过\
  \ iTunes 同步过一次，那么您可能最终会获得额外的联系人分组（参见图 4–2）。\n\n![images](img/0402.jpg)\n\n**图 4–2.**\
  \ *您可能会在通讯录中看到不同的分组。*\n\n`通讯录`列表的默认视图是显示所有已同步账户中的所有联系人。您可以有选择地查看来自不同账户的联系人。要查看您的\
  \ Google 或 Exchange 联系人，请按以下步骤操作：\n\n1.  轻点`通讯录`图标。\n2.  轻点左上角的`分组`标签。\n3.  如果您添加了新联系人，或同步了您的通讯录，您会在顶部看到一个`来自我的\
  \ PC`或`来自我的 Mac` 分组。在它下面，您会看到您的 Google 或 Exchange 电子邮件地址，或者设置该账户时为其分配的描述性名称。在我们的示例中，`Exchange\
  \ - Gmail` 和 `Exchange` 是两个已同步的 Google/Exchange 账户（参见图 4–2）。\n4.  轻点列在您的 Google\
  \ 或 Exchange 电子邮件地址/账户名称下的`通讯录`，以查看所有已同步的联系人。\n\n##### 使用通讯录\n\n要在您的 Google 或 Exchange\
  \ 联系人分组中添加、编辑或删除联系人，请执行以下操作：\n\n1.  按照步骤查看您的 Google 或 Exchange 联系人分组。\n2.  **添加联系人**：轻点`通讯录`列表视图右上角的`+`按钮。添加联系人详细信息（详见第\
  \ 14 章：“使用通讯录”）。然后轻点右上角的`完成`。\n3.  **编辑联系人**：在列表中找到该联系人，并轻点联系人详细信息底部的`编辑`按钮。进行任何更改，然后轻点`完成`按钮。\n\
  4.  **删除联系人**：找到您想要移除的联系人。轻点联系人详细信息下的`编辑`按钮。滚动到详细信息底部，然后轻点`删除联系人`按钮。\n5.  **在 iPad\
  \ 上搜索联系人**：\n    1.  如果您没有看到顶部的`搜索`窗口，请用手指沿着右侧的字母索引一直拖到顶部。\n    2.  轻点`搜索`窗口，输入某人名字、姓氏或公司名称的几个字母来查找他们。\n\
  \    3.  您的`通讯录`列表将立即根据您输入的内容进行过滤。如果您看到了想要的名字，请轻点它。否则，轻点右下角的`搜索`按钮。\n6.  **执行全局地址列表搜索**：\n\
  \    1.  轻点左上角的`分组`标签（参见图 4–2）。\n    2.  轻点 Google/Exchange 联系人分组下的第二个按钮，即`全局地址列表`搜索按钮。如果您的电子邮件地址很长，那么此按钮上只会显示您的电子邮件地址；但是，如果您有一个简短的电子邮件地址或提供了一个简短的描述性名称，那么您会看到类似`Exchange\
  \ - 全局地址列表`的内容（参见图 4–2）。\n    3.  轻点`搜索`窗口，输入某人名字、姓氏或公司名称的几个字母来查找他们。\n    4.  按下`搜索`按钮开始搜索。\n\
  \n最棒的是，您在 iPad 上对 Google 或 Exchange 联系人所做的任何更改都会在几秒钟内通过无线方式同步，并出现在您的 Google 或 Exchange\
  \ 账户中。\n\n**注意**：要在其他分组（非 Google 或 Exchange 分组）中添加、编辑或删除联系人，请先转到该分组（`来自我的 PC` 或\
  \ `来自我的 Mac`），然后进行所需的更改。这些添加、编辑或删除操作不会影响您的 Google 或 Exchange 联系人——它们彼此独立。\n\n#####\
  \ 使用日历\n\n在 iPad 上设置与 Google 或 Exchange 日历的同步后，所有日历事件都会出现在您的 iPad 上——无需有线连线或同步线缆。您还可以邀请他人参加会议并回复会议邀请。\n\
  \n您在 iPad 上更改或更新的任何事件都将与 Google 或 Exchange 进行无线同步。\n\n###### 每个日历都有不同的颜色\n\n| 您还会注意到，添加到\
  \ iPad 的每个新的 Google 或 Exchange 账户都会创建一个带有新颜色的独立日历。要查看每个日历使用的颜色，请轻点左上角的`日历`按钮。在此屏幕上，您可以看到每个日历的颜色。您可以通过轻点`电子邮件地址`有选择地显示日历。要隐藏一个日历，请轻点`电子邮件地址`以取消勾选标记。要显示一个日历，请轻点`电子邮件地址`以添加勾选标记。\
  \ | ![images](img/p162-01.jpg) |\n\n\n\n###### 从你的 iPad 邀请人员参加会议\n\n现在，你可以邀请他人参加你的日历事件。请遵循以下步骤：\n\
  \n1.  点击你的`日历`图标以启动日历。\n2.  点击右下角的`+`按钮来安排一个新事件。\n3.  在`添加事件`屏幕上，输入会议标题和地点，并根据需要调整开始和结束时间。\n\
  4.  点击`受邀人`标签以邀请他人（见图 4–3）。\n5.  要邀请某人，你有几种选择。\n    1.  输入其`电子邮件地址`（所有邀请均通过电子邮件发送）。\n\
  \    2.  输入其名字和姓氏的若干个字母（用空格分隔），如果此人在你的通讯录中，即可快速定位。\n    3.  或者，点击`蓝色加号`，通过浏览你的通讯录来查找某人。\n\
  6.  点击你想使用的`姓名`和`电子邮件地址`。如果某人有多个电子邮件地址，你需要选择一个。\n7.  如果需要，添加更多受邀人，然后点击`完成`退出`添加受邀人`窗口。\n\
  8.  在`添加事件`屏幕上调整其他项目，然后点击`完成`进行保存。\n9.  会议邀请将立即通过电子邮件发送给你邀请的所有人。\n\n![images](img/0403.jpg)\n\
  \n**图 4–3.** *如何邀请人员参加会议。*\n\n###### 在日历上查看受邀人的状态\n\n| 你可以通过查看日历左栏中的邀请状态，来了解谁已接受、拒绝或尚未回复你的邀请。你将看到每位受邀人的回复状态显示在其姓名旁边。你会看到的各种状态指示符包括：\n\
  *   `未回复`\n*   `已接受`\n*   `可能参加`\n*   `已拒绝`\n\n | ![images](img/p164-01.jpg) |\n\
  \n###### 从你的 iPad 回复 Exchange 会议邀请\n\n| 当你连接到 Exchange 电子邮件服务器，并且邀请你参加会议的人也在同一个\
  \ Exchange 服务器上时，你将能够使用日历应用中的`邀请`收件箱。你将在`日历`图标上收到通知，如图所示。在图中，有四个新的会议邀请。 | ![images](img/p164-02.jpg)\
  \ |\n\n请遵循以下步骤来处理日历邀请收件箱中的 Exchange 会议邀请。你的 iPad 屏幕上还会弹出一个类似图 4-4 所示的提醒窗口。如果你准备立即回复会议，请从弹出提醒中点击`查看`。\n\
  \n![images](img/0404.jpg)\n\n**图 4–4.** *通过弹出提醒窗口回复会议邀请*\n\n如果你想稍后回复，只需点击提醒中的`关闭`。然后你可以使用`日历`中的`邀请`收件箱进行回复。\n\
  \n1.  启动你的`日历`应用。\n2.  点击`日历`屏幕左上角的`邀请`收件箱按钮（见图 4–5）。\n3.  如果你只有一个邀请，它将直接打开。如果你有多个邀请，你将看到所有邀请的列表。点击你想回复的邀请。\n\
  4.  要回复邀请，请点击事件屏幕底部的三个按钮之一：`接受`、`可能参加`或`拒绝`。\n5.  如果你选择`接受`或`可能参加`，该日历事件将被添加到你的\
  \ iPad 日历中，回复会立即通过电子邮件发送给会议组织者。完成。\n\n![images](img/0405.jpg)\n\n**图 4–5.** *使用日历邀请收件箱回复\
  \ Exchange 会议邀请*\n\n###### 从你的 iPad 回复 Google 或 Hotmail 会议邀请\n\n如果你使用支持 Exchange\
  \ 同步的 Google 或 Hotmail 日历，你将能够在 iPad 上的`邮件`应用中回复会议邀请。\n\n1.  点击你的`邮件`图标以启动程序。\n\
  2.  导航到包含会议邀请的`收件箱`。\n3.  找到该邀请。\n\n    大多数邀请看起来类似于下图所示。它们通常以`邀请`字样开头。\n\n    ![images](img/p166-01.jpg)\n\
  \n    **提示**：要快速在收件箱中找到所有会议邀请，请在搜索框中输入单词`meet`或`invitation`。点击`主题`按钮，以便仅搜索邮件主题。\n\
  \n4.  点击`会议邀请`以打开它。\n5.  点击`参加？`旁边的`是`、`可能`或`否`来回复邀请。\n6.  一旦你点击了其中一个选项，你的回复就会被发送。你可能会看到一个\
  \ Google 或 Hotmail 日历网页，用于在你的邀请回复中输入可选的详细信息。\n\n    ![images](img/p167-01.jpg)\n\
  \n### 使用 MobileMe 服务进行无线同步\n\n如果你不使用 Google 或 Exchange，但仍希望无线同步信息，另一个选择是使用 Apple\
  \ 的 MobileMe 服务。MobileMe 服务提供了一项出色的服务，可以在你的电脑（PC 或 Mac）与你的 iPad 及其他移动设备（如 iPad）之间无线同步你的个人信息。\n\
  \n**MobileMe 云端**：MobileMe 服务使用有时被称为云端的机制来同步你的所有信息。MobileMe 云端是一个术语，用于描述存储你所有 MobileMe\
  \ 信息的互联网网络服务器。这些服务器以及你在电脑（PC 或 Mac）和移动设备（iPhone、iPad 等）上安装的相关软件，有助于让你的所有移动设备与你的电脑保持同步。其理念是，已更改的信息（如新的日历事件、新的联系人姓名）会从你的\
  \ iPad 发送到云端。然后，云端将这些已更改的信息分发到你 MobileMe 账户中的所有设备，例如你的电脑、iPhone 或 iPad。\n\n一旦你在电脑上设置好\
  \ MobileMe，然后在 iPad 上设置好访问权限，你所有的个人信息（联系人、日历，甚至书签）都将在你的电脑和 iPad 之间进行无线共享。\n\n除了个人信息的无线同步，MobileMe\
  \ 还允许你执行以下操作：\n\n*   创建基于 Web 的相册，你可以从 iPad 访问并向其添加内容。\n*   创建一个`iDisk`，便于你在 iPad\
  \ 和电脑之间共享文档。你也可以用它来共享那些因体积过大而无法通过电子邮件发送的文件（某些电子邮件系统会阻止大于 5MB 的文件）。\n*   使用`查找我的\
  \ iPad`功能（在第 1 章：“快速入门”中描述）查找丢失的 iPad。\n*   使用`远程擦除`功能远程擦除丢失 iPad 上的所有个人数据。\n* \
  \  如果你在家庭或公司中拥有多台 Mac，MobileMe 还允许你在这些 Mac 之间同步`程序坞`、`设置`、`密码`和`其他信息`，并使用`返回我的 Mac`\
  \ 远程桌面来检索文件或共享屏幕。\n\n**注意**：在本书出版时，经过 60 天免费试用后，Apple 对个人 MobileMe 服务收费 $99/年，家庭套餐收费\
  \ $149/年。\n\n然而，同样在出版时，网络上流传着 Apple 可能将 MobileMe 变为免费服务的传言。请查看 MobileMe 网站 (`www.mobileme.com`)\
  \ 以获取最新信息。\n\n\n\n"
- "# 注册 MobileMe 服务（PC 或 Mac）\n\n在注册 iPad 或首次将 iPad 连接到电脑后，Apple 让您能轻松地从 iTunes 了解\
  \ MobileMe。您很可能会看到一则带有“`Try It Free`”按钮的 MobileMe 广告。\n\n如果您使用 iTunes 同步 iPad，您还会在“`Info`”标签页顶部看到一个“`Learn\
  \ More`”按钮（参见图 4–6）。\n\n1. 将 iPad 连接到电脑。\n2. 在 iTunes 左侧导航栏中点击`your iPad`。\n3. 点击顶部的“`Info`”标签页。\n\
  4. 点击 MobileMe 区域中的“`Learn More`”按钮。\n\n![images](img/0406.jpg)\n\n**图 4–6.** *从\
  \ iTunes 的 Info 标签页开始使用 MobileMe*\n\n您也可以直接通过 MobileMe 网站进行注册。\n\n1. 输入您的个人信息以设置帐户，然后点击“`Continue`”按钮。接着输入您的账单信息，并点击底部的“`Sign\
  \ Up`”按钮。\n2. 如果所有信息都正确输入，您将看到一个类似下图所示的“`Signup Complete`”屏幕。\n\n   ![images](img/p169-01.jpg)\n\
  \n现在您已成功创建 MobileMe 帐户。接下来，您将在 Mac 或 PC 以及 iPad 上设置 MobileMe。\n\n如果您是 Windows PC\
  \ 用户，请跳至“在 PC 上设置 MobileMe”部分。\n\n"
- "# 在 Mac 上设置 MobileMe\n\n创建 MobileMe 帐户后，您就可以在 Mac 上设置相关软件了。在 Mac 上运行的 MobileMe\
  \ 软件包含在最新版本的 Leopard（v10.5.8 或更高版本）或 Snow Leopard（v10.6.3 或更高版本）操作系统中。\n\n如果您没有最新版本的\
  \ Mac 系统软件，则必须先安装它，然后配置 MobileMe 软件以同步到 MobileMe 云端，才能开始使用。\n\n1. 点击“`Apple menu`”并选择“`Software\
  \ Update`”，如图所示。\n\n   **提示**：您可以在第 30 章“您的 iTunes 用户指南”中找到关于如何在 Mac 上安装或升级软件的详细分步说明。\n\
  \n   ![images](img/p170-01.jpg)\n\n2. 按照步骤完成软件更新。\n3. 成功安装软件更新后，点击“`Apple menu`”并选择“`System\
  \ Preferences`”。\n\n   ![images](img/p170-02.jpg)\n\n4. 在“系统偏好设置”的“Internet 与无线”部分，点击“`MobileMe`”图标。\n\
  \n   ![images](img/p171-01.jpg)\n\n5. 输入您的 MobileMe“`Member Name`”和“`Password`”。\n\
  6. 点击“`Sign In`”。\n\n   ![images](img/p171-02.jpg)\n\n7. 点击顶部的“`Sync`”标签页，查看此处所示的屏幕。\n\
  8. 勾选“`Synchronize with MobileMe`”旁边的复选框。\n9. 此复选框旁边有一个用于配置同步频率的下拉菜单。默认设置为“`Automatically`”，但您也可以选择每“`Hour`”、“`Day`”、“`Week`”同步一次，或选择“`Manually`”。\n\
  \n   ![images](img/p171-03.jpg)\n\n10. 要同步书签，请勾选“`Bookmarks`”旁边的复选框，并选择您的“`web browser`”。\n\
  11. 要同步通讯录，请勾选“`Contacts`”旁边的复选框。\n12. 要同步日历，请勾选“`Calendars`”旁边的复选框。\n13. 您还可以通过勾选其他项目来同步它们。设置好同步后，您可以点击“`iDisk`”标签页并完成屏幕操作（参见图\
  \ 4–7）来配置您的 iDisk。\n14. 完成后，关闭“`MobileMe`”控制面板。\n\n![images](img/0407.jpg)\n\n**图\
  \ 4–7.** *显示 iDisk 标签页的 MobileMe 控制面板*\n\n关闭 MobileMe 控制面板后，MobileMe 将立即开始将您选定的项目（通讯录、日历和书签）发送到\
  \ MobileMe 网站。\n\n现在您可以跳至“访问 MobileMe 的多种方式”部分，而我们将在下面讨论 Windows 用户如何配置 MobileMe。\n\
  \n"
- "# 在 Windows PC 上设置 MobileMe\n\n创建 MobileMe 帐户后，您需要在 PC 上完成软件设置。您需要在 PC 上安装最新版本的\
  \ iTunes 和 MobileMe 软件，然后将其配置为同步到 MobileMe 云端，才能开始使用。\n\n1. 在您的网页浏览器中，前往 [`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html)。\n\
  2. 如果您没有 iTunes 10 或更高版本，请点击“`iTunes`”链接进行下载。\n\n   **提示**：我们在第 30 章“您的 iTunes 用户指南”中提供了安装或升级\
  \ iTunes 的分步说明。\n\n   点击链接下载适用于 Windows 的 MobileMe 控制面板。\n\n3. 点击此屏幕上的“`Download`”按钮下载安装文件。\n\
  4. 按照屏幕上的步骤在您的电脑上安装软件。\n\n   ![images](img/p173-01.jpg)\n\n5. 软件安装完成后，通过以下两种方法之一启动它：\n\
  \   * 双击 Windows 桌面上的“`MobileMe`”图标\n   * 通过“`Start`”按钮启动，或通过左下角的“`Windows`”图标进行搜索。输入“`MobileMe`”，该图标应出现在“开始”菜单顶部的“`Programs`”下。点击它。\n\
  6. 点击顶部的“`Sync`”标签页。\n7. 勾选“`Sync with MobileMe`”旁边的复选框。\n8. 此复选框旁边有一个用于同步频率的下拉菜单。默认设置为“`Automatically`”，但您也可以选择每“`Hour`”、“`Day`”、“`Week`”同步一次，或选择“`Manually`”。\n\
  9. 要同步通讯录，请勾选“`Contacts`”旁边的复选框，并选择通讯录的存储位置（例如“`Outlook`”、“`Google Contacts`”、“`Yahoo!`”或“`Windows\
  \ Contacts`”）。对于 Google 和 Yahoo!，您需要点击出现的“`Options`”按钮来输入您的用户名和密码（参见图 4–8）。\n\n\
  \   ![images](img/0408.jpg)\n\n   **图 4–8.** *显示“同步”标签页的 MobileMe for Windows 偏好设置控制面板*\n\
  \n10. 要同步日历，请勾选“`Calendars`”旁边的复选框，并选择日历的存储位置（例如“`Outlook`”或其他位置）。\n11. 要同步书签，请勾选“`Bookmarks`”旁边的复选框，并选择您电脑上的网页浏览器（截至出版时，仅支持\
  \ Safari 和 Internet Explorer 同步书签）。\n12. 完成后点击“`OK`”。\n\n点击“`OK`”后，MobileMe 将立即开始将您选定的项目（通讯录、日历和书签）发送到\
  \ MobileMe 网站。\n\n"
- '# 访问 MobileMe 的多种方式


  首次同步后，您将至少拥有以下三种访问已同步信息的方式：


  * 您最初存储通讯录和日历的电脑

  * MobileMe 网站

  * 您的 iPad（或其他移动设备）


  由于您已经知道如何访问电脑上的信息，我们将专注于介绍如何通过 MobileMe 网站和 iPad 访问信息。




