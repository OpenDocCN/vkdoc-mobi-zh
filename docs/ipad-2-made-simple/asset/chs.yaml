- '# 共享你的作品


  `iWork` 中的共享功能在三个程序中都是一样的。轻点`共享`按钮，会出现五个选项供你选择：`电子邮件演示文稿`、`通过 iWork.com 共享`、`发送到
  iTunes`、`拷贝到 iDisk` 和`拷贝到 WebDAV`。


  ![images](img/p496-03.jpg)


