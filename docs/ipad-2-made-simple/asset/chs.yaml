- '# 电子邮件演示文稿


  通过电子邮件发送文稿、电子表格或演示文稿很简单。关闭该文稿、电子表格或演示文稿，然后轻点下方的`共享`命令。


  选择`电子邮件演示文稿`，你的`邮件`应用将会加载并将该文件作为附件显示。按我们在第 13 章：“iPad 上的电子邮件”中介绍的方法添加收件人，输入你的信息，然后轻点`发送`。


  ![images](img/p497-01.jpg)


  '
- '# 通过 iWork 共享


  当你轻点`通过 iWork.com 共享`时，会弹出一个窗口，要求你输入 Apple ID 或 MobileMe ID 及密码。输入正确的信息后，你的文件将存储到网上，以便从任何电脑轻松取用。这是一种共享和协作处理工作的绝佳方式。


  ![images](img/p497-02.jpg)


  当你首次尝试使用 `iWork.com` 服务时，系统会要求你发送一封验证电子邮件。


  查看验证电子邮件并按照指示开始在线共享你的作品。


  ![images](img/p497-03.jpg)


  登录 [`www.iwork.com`](http://www.iwork.com)，用你的 Apple ID 和密码登录，你的`共享文稿`就会显示出来。


  **提示：** 这是一种协作处理工作的好方法，也可以将 iPad 上可能过大而无法通过电子邮件发送的内容发送给别人查看和打印。


  ![images](img/p498-01.jpg)


  '
- '# 打印文件


  要打印任何演示文稿，请轻点`工具`图标（`扳手`图标），然后选择`打印`。接着，你可以选择任何兼容 `AirPrint` 的打印机，并调整打印份数和特定页面。


  **提示：** 我们在第 13 章：“iPad 上的电子邮件”的“打印信息”部分详细介绍了如何使用 `AirPrint` 及兼容打印机。


  '
- '# 通过电子传真服务发送传真


  如果你不在家或办公室，又想快速打印或发送传真，通过电子传真服务发送文件是个很棒的技巧。


  **注意：** 要执行此操作，你首先需要注册一个电子传真服务，例如 [`www.efax.com`](http://www.efax.com)，这样你就可以将传真作为电子邮件附件发送。


  拥有电子传真帐户后，你可以按照以下步骤将文档作为电子邮件附件发送到传真机：


  1.  在任何应用中，选择`共享` ![images](img/U001.jpg)`电子邮件演示文稿`。

  2.  选择`PDF 格式`。

  3.  按照电子传真服务要求的格式，在邮件地址中使用传真号码。某些服务的格式如下：`(传真号码)@faxsend.com` 或 `3865551212@faxsend.com`

  4.  邮件发送后，你的传真服务会将其转换为传真，并发送到相应的传真机。


  '
- '# 导出文件


  按照以下步骤导出 `iWork` 文件：


  1.  在任何 `iWork` 应用中，选择`共享` ![images](img/U001.jpg)`导出`。

  2.  选择你希望文档传输到电脑时的文件类型。

  3.  下次将 iPad 连接到电脑时，传输将通过 iTunes 进行。通常的格式是该特定应用的默认格式。你也可以选择导出为 PDF 格式。


  ![images](img/p499-01.jpg)


  **注意：** `Pages` 可以导出为适用于 Mac 或 PC 的 `Word` 格式，但 `Keynote` 和 `Numbers` 尚不能导出为对应的微软
  PC 格式（`PowerPoint` 和 `Excel`）。你始终可以从 `Pages`、`Numbers` 和 `Keynote` 中选择导出为 PDF 文件。


  在下一节中，我们将介绍如何使用文件共享将文稿导入到你的 iPad。


  '
- "# 文件共享\n\n文件共享是指将你在 `iWork` 中创建的文稿通过 iTunes 进行共享。文件共享在 iTunes 中通过屏幕顶部的`应用`标签进行。点击`应用`，然后向下滚动到屏幕底部的`文件共享`部分。\n\
  \n**提示：** 我们还在第 3 章：“与 iTunes 同步”的“文件共享”部分介绍了如何使用文件共享。\n\niPad 上安装的每个能够进行文件共享的程序都会显示在底部。按照以下步骤将共享的文件取回到你的\
  \ iPad：\n\n1.  点击你从中共享文件的应用（本例中为 `Keynote`）。你在 iPad 上共享的所有文稿都会显示出来。\n\n   ![images](img/p500-01.jpg)\n\
  \n2.  勾选要保存的文稿，然后轻点右下角的`存储到`按钮。\n\n   ![images](img/p500-02.jpg)\n\n3.  接着，只需导航到你想要保存该文稿的文件夹即可。\n\
  4.  现在，该文件已在你的电脑上，可以方便地查看、编辑和打印。\n\n![images](img/p501-01.jpg)\n\n**提示：** `Pages`、`Keynote`\
  \ 和 `Numbers` 的不错替代品是 `Documents to Go` 和 `QuickOffice`。这两款替代品都整合在单个应用中，而不是作为三个独立的应用提供。\n\
  \n"
- "# 第 20 章\n\n## 在 iPad 上使用 iTunes\n\n在本章中，你将学习如何使用 iPad 上的 `iTunes` 应用来查找、购买和下载媒体。通过\
  \ `iTunes` 应用，你将能够下载音乐、电影、电视节目、播客和有声读物。你还可以通过 `iTunes U` 服务下载来自顶尖大学的免费教育内容。你还将学习如何兑换\
  \ iTunes 礼品卡。\n\n我们有些人还记得为了购买新单曲或专辑而去唱片店的日子。翻阅着那些黑胶唱片（或者后来的磁带和 CD），看着我们想要的所有音乐，那种感觉令人兴奋。\n\
  \n随着 iPad 的出现，那些日子已经一去不复返了。所有的音乐、电影、电视节目等等，都可以直接从 iPad 上获取。\n\niTunes 是一个音乐、视频、电视、播客等内容的商店——几乎你可以在\
  \ iPad 上消费的所有媒体类型，都可以直接从 iTunes Store 购买或租借（而且通常可以免费获取）。\n\niTunes 最新推出了一种名为 Ping\
  \ 的新型音乐社交网络功能。你可以使用这项服务关注艺人，查看你的朋友在听什么，等等。\n\n\n\n### iPad 版 iTunes 入门\n\n在本书的前面部分，我们向您展示了如何将电脑\
  \ iTunes 中的音乐传输到 iPad 上（请参阅第 3 章：“将 iPad 与 iTunes 同步”）。您还将在第 26 章：“新媒体：阅读报纸、杂志等”中了解有关在电脑上使用\
  \ iTunes 的更多信息。iTunes 的一大优点是，您可以非常轻松地购买或获取音乐、视频、播客和有声读物，然后在几分钟内即可在 iPad 上使用它们。\n\
  \niPad 允许您直接在设备上访问 iTunes 的移动版本。当您购买或索取免费内容后，它们将下载到您 iPad 上的 `iPod` 应用或 `Videos`\
  \ 应用中。在下一次执行同步时，它们还会自动传输到您电脑上的 iTunes 资料库中，因此您也可以在电脑上欣赏相同的内容。\n\n### 需要网络连接\n\n\
  您需要有效的互联网连接（Wi-Fi 或 3G/蜂窝网络）才能访问 iTunes Store。请查阅第 4 章：“其他同步方法”以了解更多关于网络连接的信息。\n\
  \n#### 启动 iTunes\n\n当您首次拿到 iPad 时，`iTunes` 是第一个 `Home` 主屏幕页面上的图标之一。触摸 `iTunes` 图标，您将进入移动版\
  \ iTunes Store。\n\n![images](img/p504-01.jpg)\n\n**注意：** `iTunes` 应用会频繁更新。由于 `iTunes`\
  \ 应用本质上是一个网站，因此在本书撰写完成与您在 iPad 上查看它之间，它可能发生一些变化。某些屏幕图像或按钮看起来可能与本书中展示的略有不同。\n\n####\
  \ 浏览 iTunes\n\n`iTunes` 应用使用的图标与 iPad 上的其他程序类似，因此在该应用中导航非常容易。顶部有三个按钮，底部有七个图标（*软键*）可帮助您导航应用。请查看图\
  \ 20–1 以了解这些软键和功能。滚动操作与其他任何程序相同；上下移动手指即可查看可用的选项。\n\n![images](img/2001.jpg)\n\n\
  **图 20–1.** *iTunes 布局*\n\n### 使用“精选”、“排行榜”和“天才”寻找音乐\n\n在 iTunes 音乐商店屏幕的顶部有三个按钮：`Featured`、`Top\
  \ Charts` 和 `Genius`。默认情况下，启动 `iTunes` 应用时会显示 `Featured` 精选内容。\n\n#### 排行榜——热门内容\n\
  \n如果您想查看某个特定类别中的热门内容，可以浏览 `Top Charts` 类别。点击顶部的 `Top Charts`，然后点击一个类别或流派，查看该类别中的热门内容。\n\
  \n**警告：** 这些歌曲或视频销量很好，但这并不意味着它们一定会吸引您。在付费之前，务必先预览一下内容并查看用户评价。\n\n![images](img/p506-01.jpg)\n\
  \n点击左上角的 `Genre` 按钮以选择特定流派。例如，如果您点击 `Singer Songwriter`（歌手兼词曲作者），您将只会看到该类别中的前十首歌曲或前十张专辑。\n\
  \n初始视图会在左侧显示 `Top Songs`（热门歌曲），右侧显示 `Top Albums`（热门专辑）。\n\n您可以像在 iPad 上的任何其他程序中一样，直接滚动浏览列表。\n\
  \n![images](img/p506-02.jpg)\n\n#### 流派——音乐类型\n\n点击 `Genres` 按钮，根据流派浏览音乐。如果您有喜欢的音乐类型并想只浏览该类别，这一功能尤其有用。\n\
  \n这里有大量可供浏览的流派；同样，只需像在 iPad 其他程序中那样向下滚动列表即可。\n\n![images](img/p507-01.jpg)\n\n您可以随意浏览音乐，直到找到想要预览或购买的内容。\n\
  \n#### 浏览视频（影片）\n\n点击底部的 `Movies` 或 `TV Shows` 按钮，浏览所有与视频相关的内容（请参阅图 20–2）。\n\n![images](img/p507-02.jpg)\n\
  \n![images](img/2002.jpg)\n\n**图 20–2.** *在 iPad 上的 iTunes 中浏览 `Movies` 类别*\n\n\
  您还可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：\n\n*   `New to Rent or Own`（新片租赁或购买）\n*   `Highlights\
  \ by Genre`（按流派精选）\n*   `All HD Movies`（所有高清影片）\n\n![images](img/p508-01.jpg)\n\n\
  点击任何一部影片或视频以查看更多详情或预览该内容。您可以选择租赁或购买某些影片和电视节目。\n\n**租赁：** 某些影片可以提供在规定天数内的租赁服务。\n\n\
  **注意：** 美国的租赁期限是 24 小时，而加拿大的租赁期限是 48 小时。其他国家可能略有不同；许多国家根本不提供租赁服务。\n\n**购买：** 此选项允许您永久购买并拥有该影片或电视节目。\n\
  \n![images](img/p509-01.jpg)\n\n#### 寻找电视节目\n\n浏览完影片后，点击底部的 `TV Shows` 按钮，查看您喜欢的节目有哪些可看（请参阅图\
  \ 20–3）。\n\n![images](img/p509-02.jpg)\n\n![images](img/p509-03.jpg)\n\n当您点击一个电视剧集时，您将看到可用的单集。点击任意一集可以观看\
  \ 30 秒的预告片。更多关于观看视频的信息，请参阅第 10 章：“观看视频、电视节目等”。预览结束后，点击 `Done` 按钮。\n\n![images](img/2003.jpg)\n\
  \n**图 20–3.** *购买和浏览电视剧集或季度*\n\n当您准备好购买时，您可以选择购买单集或整个电视剧集。许多（但并非所有）电视剧允许您单独购买单集。\n\
  \n例如，也许您想重温一下 *House（豪斯医生）* 并观看您错过的那一集试播集。在 iPad 上可以轻松快速地完成这一点。\n\n**注意：** 还有一个\
  \ `Free TV Episode`（免费电视剧集）类别，您可以在其中获取样片和附加内容。\n\n#### iTunes 中的有声读物\n\n有声读物是无需阅读即可享受书籍的绝佳方式。有些朗读者非常有趣，几乎就像看电影一样。例如，《哈利·波特》系列的朗读者能够出色地演绎几十种不同的声音。我们建议您在\
  \ iPad 上尝试一下有声读物；当您在飞机上想远离其他乘客，但又不想开灯时，有声读物尤其棒。\n\n**提示：** 如果您是一位重度有声读物听众，订阅 `Audible.com`\
  \ 可以以更便宜的价格获得相同的内容。\n\n![images](img/p511-01.jpg)\n\n如果您是有声读物爱好者，请务必查看 iTunes 中的有声读物。\n\
  \n您可以使用顶部的三个按钮来浏览 iTunes 中的有声读物：\n\n*   `Featured`（精选）\n*   `Top Charts`（排行榜）\n\
  *   `Categories`（分类）\n\n![images](img/p511-02.jpg)\n\n### iTunes U——优质教育内容\n\n如果您喜欢教育内容，请查看\
  \ `iTunes U`。您可以浏览您的大学、学院或学校是否拥有自己的专属版块。\n\n![images](img/p511-03.jpg)\n\n例如，我们查找了哈佛大学（请参阅图\
  \ 20–4）。仅浏览了几分钟，我们就发现了一个名为 *Harvard Thinks Big 2* 的系列校园范围内的讨论，内容涉及哈佛最著名的教师。\n\n\
  ![images](img/2004.jpg)\n\n**图 20–4.** *您可以搜索特定大学，然后按该大学浏览 iTunes U。*\n\n如果您所在的位置无线信号良好，您可以点击音频或视频内容的标题，然后以流媒体形式收听或观看。但是，如果信号中断，您将丢失视频的播放位置。如果可以的话，实际下载文件以便稍后观看有很多好处，其中最重要的就是您能对视频观看体验拥有更多控制权。\n\
  \n\n\n### 下载以供离线查看\n\n如果你知道将要离开无线网络覆盖范围一段时间，例如在飞机上或地铁里，你可能会希望下载内容以便稍后离线查看或收听。点击\
  \ `Free` 按钮，它会变为 `Download` 按钮，然后再点击一次。接着，你可以通过点击屏幕右下角的 `Downloads` 按钮来监控下载进度（一些较大的视频可能需要十分钟或更长时间才能完成）。下载完成后，该内容将出现在你的\
  \ `iPad` 图标中的相应区域。\n\n**注意：** 任何大于 20MB 的文件都无法通过 3G 网络下载；较大文件必须使用 Wi-Fi。\n\n###\
  \ 在 iTunes 中搜索\n\n有时你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻阅所有菜单。`Search` 工具正是为你准备的。\n\n在\
  \ `iTunes` 应用的右上角，与几乎所有其他 iPad 应用一样，都有一个 `Search` 窗口。\n\n触摸 `Search`，`Search` 窗口和设备键盘会弹出。一旦你开始输入，iPad\
  \ 就会尝试将你的输入与可能的匹配项进行匹配。\n\n![images](img/p513-01.jpg)\n\n输入你正在搜索的艺术家、歌曲名称、视频名称、播客名称或专辑，iPad\
  \ 会显示详细的匹配结果。你可以根据需要提供概括或具体的信息。如果你只是想浏览某个艺术家的所有特定歌曲，请输入艺术家的名字。如果你想要某首特定的歌曲或专辑，请输入歌曲或专辑的全名。\n\
  \n当你找到歌曲或专辑名称时，只需触摸它，你就会进入购买页面。\n\n### 购买或租赁音乐、视频、播客等\n\n一旦你找到歌曲、视频、电视节目或专辑，你可以触摸\
  \ `Buy` 或（如果出现）`Rent` 按钮。这将使你的媒体开始下载。（如果内容是免费的，你会看到一个 `Free` 按钮，点击后变为 `Download`\
  \ 按钮。）\n\n除非你完全确定想要购买该内容，否则我们建议你先预览或收听试听片段，并查看客户评论。\n\n#### 预览音乐\n\n触摸歌曲标题或其左侧的音轨编号；专辑封面会翻转并启动\
  \ `Preview` 窗口。\n\n你将听到该歌曲 30 秒的代表性片段。\n\n触摸 `Stop` 按钮，音轨编号将再次显示。\n\n![images](img/p514-01.jpg)\n\
  \n#### 查看客户评论\n\niTunes 中的许多内容都提供客户评论。评论范围从低的一星到高的五星。\n\n**警告：** 你需要注意，虽然很多评论是干净的，但有些可能包含露骨的语言。iTunes\
  \ 商店可能不会立即发现这些内容。\n\n阅读评论可以让你相当清楚地了解自己是否愿意购买该商品。\n\n![images](img/p515-01.jpg)\n\
  \n#### 预览视频、电视节目或音乐视频\n\niTunes 上的几乎所有内容都提供预览。有时你会看到一个 `Preview` 按钮，就像音乐视频和电影那样。电视节目略有不同；你需要点击剧集标题来查看\
  \ 30 秒的预览。\n\n大多数电影和电视节目也会提供一个 `HD` 或 `Standard Def` 按钮。请记住，高清电影和剧集通常稍微贵一些。\n\n\
  我们强烈建议在 iTunes 上购买内容之前，先查看评论并尝试预览。\n\n典型的电影预览或预告片会超过 30 秒——有些会长达 2 分 30 秒或更长。\n\n\
  ![images](img/p515-02.jpg)\n\n#### 购买歌曲、视频或其他项目\n\n一旦你确定要购买一首歌曲、视频或其他项目，请按照以下步骤操作：\n\
  \n1.  触摸歌曲的 `Price` 按钮或 `Buy` 按钮。\n2.  该按钮会发生变化，变成一个绿色的 `Buy Now`、`Buy Song`、`Buy\
  \ Single` 或 `Buy Album` 按钮。\n3.  点击 `Buy` 按钮。\n\n    ![images](img/p516-01.jpg)\n\
  \n4.  你会看到一个动画图标跳入购物车。输入你的 iTunes 密码并触摸 `OK` 以完成购买。\n\n    ![images](img/p516-02.jpg)\n\
  \n![images](img/p516-03.jpg)\n\n你可以通过触摸右下角的 `Downloads` 按钮来检查下载进度。\n\n然后，这首歌将成为你音乐库的一部分，下次你将\
  \ iPad 连接到电脑上的 iTunes 时，它将被同步。\n\n下载完成后，你将看到新的歌曲、有声读物、播客或 iTunes U 播客出现在你的 `iPod`\
  \ 应用中的相应类别下。\n\n**注意：** 购买的视频和 iTunes U 视频会进入 `Videos` 应用，而不是 iPad 上的 `iPod` 应用。\n\
  \n![images](img/p517-01.jpg)\n\n#### iTunes 中的播客\n\n播客通常是一系列音频片段；这些片段可能会经常更新（例如来自国家公共广播电台的整点新闻广播），或者根本不更新（例如某个特定主题的一次性讲座录音）。\n\
  \n![images](img/p517-02.jpg)\n\n你可以使用顶部的三个按钮浏览 iTunes 中的播客：\n\n*   `Featured`（精选）\n\
  *   `Top Charts`（排行榜）\n*   `Categories`（分类）\n\n![images](img/p517-03.jpg)\n\n####\
  \ 下载播客\n\n播客有 `Video` 和 `Audio` 两种类型。当你找到播客时，只需触摸播客的标题（参见图 20-5）。幸运的是，大多数播客都是免费的。如果是免费的，你会看到一个\
  \ `Free` 按钮，而不是通常的 `Buy` 按钮。\n\n![images](img/2005.jpg)\n\n**图 20-5.** *下载播客*\n\n\
  当你触摸按钮时，它会变成一个显示 `Download` 的绿色按钮。触摸 `Download`，一个动画图标会跳到底部软键栏中的 `Downloads` 图标。显示为红色的小数字反映了正在下载的文件数量。\n\
  \n![images](img/p518-01.jpg)\n\n#### 下载图标——停止和删除下载\n\n当你下载项目时，它们会出现在你的 `Downloads`\
  \ 界面中。这种行为与你电脑上 iTunes 的行为类似。\n\n你可以触摸底行的 `Downloads` 图标来查看所有下载的进度。\n\n![images](img/p518-02.jpg)\n\
  \n#### 下载内容的存放位置\n\n你所有的下载内容都会显示在你的 `iPod` 应用或 `Videos` 应用中，并按类别整理。换句话说，如果你下载了一个播客，你需要进入你的\
  \ `iPod` 应用，触摸侧边栏上的 `Podcasts` 图标来查看下载好的播客。\n\n**注意：** 如果你在 iPad 上没有完成下载，并且在下载队列中找不到它，你可以尝试进入桌面版\
  \ `iTunes` 应用，点击 `Check for Available Downloads`。\n\n有时，你可能决定不想要你选择的所有下载内容。如果你想停止下载并删除它，请用手指在下载项上滑动以调出\
  \ `Delete` 按钮，然后点击 `Delete`（参见图 20-6）。\n\n![images](img/2006.jpg)\n\n**图 20-6.**\
  \ *在下载文件时将其删除*\n\n### 兑换 iTunes 礼品卡\n\niPad 上 iTunes 的酷功能之一是，就像你电脑上的 iTunes 一样，你可以兑换礼品卡，并在你的\
  \ iTunes 账户中获得用于购买的信用额度。\n\n在 `iTunes` 屏幕的底部，你应该会看到 `Redeem` 按钮（参见图 20-7）。\n\n点击\
  \ `Redeem` 按钮，开始输入你的礼品卡号以获取 iTunes 商店信用额度的流程。\n\n![images](img/2007.jpg)\n\n**图\
  \ 20-7.** *兑换 iTunes 礼品卡*\n\n然后，系统会提示你在框中输入你的 iTunes 礼品卡信息或礼品券信息。完成此操作后，你将拥有在 iTunes\
  \ 商店下载的信用额度——就是这么简单！\n\n**注意：** 如果你有多个 iTunes 账户，你也可以直接在 `iTunes` 应用中登录或登出。\n\n\n\
  \n"
- '# Ping：苹果的音乐社交网络应用


  最近，苹果在`iTunes 10`中推出了`Ping`服务。你可以在第 30 章“你的 iTunes 用户指南”中了解更多关于桌面版的信息。`Ping`也内置于
  iPad 的`iTunes`应用中。


  ![images](img/p520-01.jpg)


  `Ping`让你有机会关注你喜欢的音乐艺术家，并查看他们可能选择发布的视频、图片或内容。`Ping`还允许你关注好友，查看他们在听什么，并对他们的帖子发表评论。


  **注意**：如果你的`Ping`账户是公开的，关注你的每个人都会看到你购买的内容。如果你同时设置了 Twitter，且购买了大量音乐，它可能会刷屏你的时间线。


  ## 在 iPad 上使用 Ping


  `Ping`位于`iTunes`应用底部的虚拟按键中。如果你已从桌面版的`iTunes`应用（更多信息请参见第 30 章）设置了`Ping`，那么你会发现它已经在你的
  iPad（或你拥有的任何其他 iOS 设备）上设置好了。


  **注**：如果在桌面版`iTunes`上启用`Ping`后，它没有出现在你的 iPad 上，你可能需要先同步一次 iPad，它才会出现在`iTunes`应用中。


  你会注意到顶部有三个虚拟按键：`动态`、`人`和`我的资料`。`Ping`启动时，会显示`动态`界面，其中显示了你正在关注的艺术家和好友，以及他们的近期活动。


  ![images](img/p521-01.jpg)


  点击顶部的`人`虚拟按键，将显示你正在关注的人，以及关注你的人。


  ![images](img/p522-01.jpg)


  点击`我的资料`虚拟按键，你也可以查看你关注了谁，并添加评论，让关注你的人看到。


  点击底部的`我的信息`按钮，你可以看到你的照片和你喜欢的音乐——这些是在`iTunes 10`中设置`Ping`账户时选择的。


  ![images](img/p523-01.jpg)


  `Ping`目前还处于起步阶段，但它有望在不久的将来发展成为一个功能更全面、专攻音乐的社交网站。


  '
- '# 第 21 章


  '
- '# 令人惊叹的 App Store


  你已经了解到从 iTunes 直接下载音乐、视频和播客到 iPad 是多么容易。你还学会了如何从 iBooks 商店下载 iBooks。


  从苹果令人惊叹的 App Store 下载新应用也同样简单。应用几乎涵盖了你所能想到的任何功能——游戏、生产力工具、社交网络——一切你能想象的。正如广告所说：“总有对应的应用。”


  在本章中，你将学习如何浏览 App Store，如何搜索应用以及如何下载它们。你还会学习如何在应用下载到 iPad 后进行维护和更新。


  ![images](img/p525-01.jpg)


  **注：** 如果你在旅行途中购买了新的 iPad Wi-Fi 版或解锁版 iPad 3G，并将其带回到尚未销售该设备的国家，你的 iTunes ID 很可能无法用于购买应用。解决方法是，在桌面版
  iTunes 上购买 iPad 应用（此方法可行），然后同步过去。


  ### 了解更多关于应用和 App Store 的信息


  在极短的时间内，App Store 的容量已呈爆炸式增长。应用几乎涵盖了你所能想象的一切。应用价格各异；在很多情况下，它们甚至是免费的。


  ### 一些很酷的应用


  由于商店中拥有超过 35 万个应用，以及 7 万个 iPad 专用应用，我们无法为你列出一个前十名的应用清单。相反，我们列出了一些我们喜欢或听说过的非常酷的应用。表
  20–1 列出了许多有趣、酷炫、实用或单纯娱乐性的应用。此表也显示了应用是否免费；但由于 App Store 中的价格频繁变动，因此未包含其他定价信息。


  ![images](img/t2001.jpg)


  ![images](img/t2001a.jpg)


  #### 在哪里找到应用新闻和评测


  你可以在 App Store 本身找到评测，我们建议你查看 App Store 的评测。然而，有时你可能希望从一些专家那里获取更多信息。博客是查找新闻和评测的好地方。


  以下是与苹果 iPad/iPhone/iPod touch 相关的博客列表，其中包含应用评测：


  *   The iPhone Blog：[`www.tipb.co`](http://www.tipb.co)

  *   Touch Reviews：[`www.touchreviews.net`](http://www.touchreviews.net)

  *   Touch My Apps：[`www.touchmyapps.com`](http://www.touchmyapps.com)

  *   The Unofficial Apple Weblog：[www.tuaw.com](http://www.tuaw.com)

  *   Cult of Mac：[`www.cultofmac.com`](http://www.cultofmac.com)

  *   App Smile：[`www.appsmile.com`](http://www.appsmile.com)


  ## App Store 基础知识


  只需在网站上稍作浏览，你就会发现 App Store 的导航非常直观。然而，有一些基础知识需要熟悉，这会使 App Store 的使用体验更加愉快。


  ### 需要网络连接


  设置好你的 App Store (iTunes)账户后，你仍然需要具备正确的网络连接（Wi-Fi 或 3G/蜂窝网络）才能访问 App Store 并下载应用。查看第
  4 章：“Wi-Fi 和 3G 连接”以了解如何判断是否已连接。


  ### 启动 App Store


  `App Store`图标应该位于`主屏幕`的第一页图标上。点击该图标启动`App Store`。


  ![images](img/p528-01.jpg)


  ### App Store 主页


  与 iTunes 类似，`App Store`应用的顶部有按钮，底部有虚拟按键，帮助你指导购买（参见图 21–1）。


  顶部有`新`应用和`热门`的按钮，以及一个`发布日期`应用列表。底部是`精选`、`Genius`、`排行榜`、`类别`和`更新`的图标。


  滚动操作与 iTunes 和其他程序相同——只需上下移动手指即可滚动页面。


  ![images](img/2101.jpg)


  **图 21–1.** *App Store`主页`的布局*


  你会注意到 App Store 的`主页`上有两个主要部分：`新品推荐`和`编辑推荐`。每个部分都有几页。点击箭头浏览后续页面，或点击`查看全部`标签。


  **注：** 由于 App Store 本质上是一个网站，它会频繁更新。本书印刷后，App Store 的某些细节和细微差别可能会略有不同。


  ### 查看应用详情


  一旦找到你感兴趣的应用，你可以探索许多选项来帮助判断某个应用是否适合你。图 21–2 展示了一些可用选项。


  ![images](img/2102.jpg)


  **图 21–2.** *查看应用详情*


  ## 查找要下载的应用


  首先浏览默认视图，其中显示了`精选`应用。App Store 加载后，页面中央显示`新品推荐`应用供你浏览。点击标题栏中的箭头以浏览后续应用页面。


  你还可以在顶部以“图形”视图方式看到高亮的新应用。只需点击页面顶部的图片之一，即可查看该应用的信息。


  **注：** 与 iTunes 一样，在 3G 网络下，你只能下载小于 21MB 的应用。更大的应用需要 Wi-Fi 连接。


  ### 查看热门应用


  点击顶部的`热门`按钮，商店中最热门的应用将显示在屏幕上。同样，只需滚动浏览这些“热门”应用，看看是否有吸引你的东西。


  **注：** 某个应用属于`热门`类别，并不一定意味着你也会觉得它有用或有趣。在购买任何东西之前，请仔细查看应用描述和评测。


  ![images](img/p531-01.jpg)




  #### 使用类别


  有时所有选项会让人应接不暇。如果你对自己想要的应用类型有所了解，可以点击底部图标栏中的“**类别**”按钮。


  现在应用会按“**类别**”标签页排列，从“**游戏**”到“**财务**”、“**医疗**”、“**摄影**”——以及各种其他可能的类别。


  **注意：** 当你阅读本书时，可能还会新增更多类别；这部分内容在 App Store 中会频繁更新。


  ![images](img/p531-02.jpg)


  找到你要查找的类别并点击对应的标签页。例如，如果你想找一款与天气相关的应用，只需点击“**天气**”标签页。


  随后你可以浏览该类别中精选的“**天气**”应用，或者点击“**排序方式**”按钮，查看按“**名称**”、“**最受欢迎**”或“**发布日期**”排序的所有天气应用。


  ![images](img/p532-01.jpg)


  #### 查看排行榜


  ![images](img/p533-01.jpg)


  点击底部图标栏中的“**排行榜**”图标，“**App Store**”程序会再次切换视图。这次它会显示前十名付费应用和前十名免费应用。左侧一栏显示“**热门付费**”应用，右侧一栏显示“**热门免费**”应用。


  向下滚动到“**排行榜**”页面底部，你会看到第二个类别：“**收入最高**”。对某些人来说，了解一款应用的收入情况很重要。要查看任一类别热门应用的更完整列表，请点击“**显示更多**”![images](img/p533-02.jpg)标签页。


  ![images](img/p533-03.jpg)


  ## 第 22 章


  ## 游戏与娱乐


  你的 iPad 在许多方面都表现出色。它是一台多媒体工作利器，也能记录你的繁忙生活。iPad 真正擅长的两个领域是作为游戏设备，以及承载充分利用其大尺寸高分辨率触摸屏的
  iPad 专属应用。你甚至能在这里找到你可能以为只有在专用游戏主机上才会出现的流行游戏版本。


  iPad 为便携游戏带来了诸多优势：高清屏幕呈现逼真画面，高品质音频提供出色音效，而加速计则让你能与游戏真实互动。例如，在赛车游戏中，你可以通过手持 iPad
  时转动设备来“操控”你的汽车。


  **注意：** 我们写过十几本关于黑莓设备和其他智能手机的书，家里也摆着许多黑莓、WebOS、iOS 和安卓设备。智能手机并不会被孩子们拿进房间；相反，正是 iPad
  —— 我们的孩子（以及我们的配偶）认为它足够有趣，会争相去拿。我们经常发现 iPad 从充电器上不翼而飞，然后不得不大喊：“我的 iPad 呢？我需要用它完成这本书！”


  ### iPad 作为游戏设备


  得益于内置的加速计——本质上是一种检测运动（加速度）的设备，并包含检测倾斜度的内置陀螺仪——iPad 能够实现大多数便携游戏系统无法做到的事情。


  有成千上万款游戏可供选择，你几乎可以在 iPad 上玩任何你想玩的游戏类型。


  **注意：** 有些游戏确实需要你拥有活跃的网络连接（Wi-Fi 或 3G）才能进行多人游戏。


  | 有了 iPad，你可以玩驾驶游戏，并用 iPad 本身来操控方向——只需转动设备即可。你还可以触摸 iPad 来刹车，或向前倾斜设备来加速。 | ![images](img/p536-01.jpg)
  |

  | 这款游戏逼真到可能会让人晕车！ | |

  | 或者，你可以尝试一款第一人称战斗游戏。借助 iPad 的新图形引擎，像 Chair 公司的《`无尽之剑`》这样的游戏画面惊艳，运行也非常流畅。 | |

  | 《`无尽之剑`》中的图形、战斗场景和 3D 环境与 iPad 上其他任何可用内容都截然不同，其质量足以与更昂贵的游戏主机游戏相媲美。 | ![images](img/p536-02.jpg)
  |


  #### 如何获取游戏和娱乐应用


  与所有 iPad 应用一样，游戏可在 App Store 中找到（参见图 22–1）。你可以通过电脑上的 iTunes 或使用设备上的“**App Store**”程序来获取它们。


  ![images](img/2201.jpg)


  **图 22–1.** *App Store “`游戏`” 部分的布局*


  | 要获取游戏，请像上一章那样启动“**App Store**”程序，然后使用“**类别**”图标进入“**游戏**”标签页。你还会在 App Store 的“**精选**”部分以及“**新鲜推荐**”部分找到许多游戏。图
  22–2 展示了一款 iPad 游戏的应用购买页面。 | ![images](img/p538-01.jpg) |


  ![images](img/2202.jpg)


  **图 22–2.** *应用购买页面的布局*


  #### 购买前阅读评论


  | 许多游戏都有用户评论，值得一读。有时，你可以在购买前对游戏有个不错的了解。如果你发现一款看起来很有趣的游戏，不妨在电脑上简单地用`Google`搜索一下，看看是否有主流媒体做过完整评测。**注意：**
  请注意，一些评论可能包含不雅用语。 | ![images](img/p540-01.jpg) |


  #### 寻找免费试用版或精简版


  | 游戏开发者越来越频繁地提供游戏的免费试用版，让用户在购买前看看是否喜欢。你会发现 App Store 中许多游戏同时提供精简版/免费版和完整版。 | ![images](img/p540-02.jpg)
  |

  | 有些游戏是“免费”的，通过应用内包含广告来维持运营。其他一些应用则免费开始，但需要应用内购买才能继续游玩或解锁更多功能。 | |


  #### 游戏时注意安全


  考虑到 iPad 的尺寸，一些游戏已从 iPhone/iPod touch 版本进行了修改。你不需要像 iPhone 版那样用 iPad 来“甩”钓鱼游戏的鱼线；但是，在驾驶游戏和第一人称射击游戏中，你可以稍微移动一下——所以要注意你周围的环境！例如，确保你牢牢握紧设备，以免从手中滑落——我们推荐使用一个好的硅胶保护套来帮助解决这个问题。


  **注意：** 像《`愤怒的小鸟`》这样的游戏可能会让人上瘾并影响工作效率！


  #### 双人游戏


  | iPad 确实为双人游戏提供了可能性。在这个例子中，我们正用 iPad 作为棋盘，与对方玩国际跳棋。其他棋盘游戏，如国际象棋、拼字游戏等，也能找到类似的双人应用。
  | ![images](img/p541-01.jpg) |


  **提示：** 在玩双人游戏（如下棋）时，请像读书时一样，务必*锁定*屏幕方向。通过将“**方向锁定**”开关拨到“**锁定**”位置来实现（参见第 8 章）。


  #### 在线与无线游戏


  | 如果游戏支持，iPad 还允许在线和无线点对点游戏。许多新游戏都采用了这项技术。例如，在《`拼字游戏`》中，你可以让多名玩家各自使用自己的设备。你甚至可以将
  iPad 作为棋盘，并使用最多四部独立的 iPhone 作为无线“字母架”来存放你的字母牌。只需轻轻把字母牌从架上拨出，它们就会飞到棋盘上——非常酷！你还可以在线与
  Facebook 好友对战。你可以通过本地网络进行，或者作为多人形式的*传屏接力*游戏。 | ![images](img/p542-01.jpg) |


  **注意：** 如果你只想与身边的朋友对战，请在多人游戏中选择 Wi-Fi 模式。如果你只是想和陌生人玩，可以尝试在线模式或与 Facebook 好友对战！




  '
- '# 用 iPad 玩音乐


  iPad 上有很多音乐游戏和应用。其屏幕尺寸和设备技术让你几乎可以用 iPad 演奏任何乐器。


  | 多年来，Mac 用户一直能够通过电脑上的 `GarageBand` 应用学习音乐。最近，苹果推出了首个适用于 iPad 的 `GarageBand` 应用，堪称惊艳。`GarageBand`
  让你可以选择演奏架子鼓、键盘、吉他或贝司 — 全部通过 iPad 的触屏操作（参见图 22–3）。 | ![images](img/p543-01.jpg) |


  `GarageBand` 还包含一个录音机，让你可以在 iPad 上创作和录制配乐。你甚至可以插入电吉他（使用第三方适配器），并利用内置的吉他音箱来调整乐器的音色、音量和音调。


  ![images](img/2203.jpg)


  **图 22–3**. *在 `GarageBand` 上演奏架子鼓、吉他或键盘。*


  | 全新一批音乐应用让你能够真正把 iPad 当作乐器来使用。其中一款令人惊叹的新应用叫做 `Magic Fiddle`。这款由 Smule 开发的应用能让你真的去拨弄小提琴的琴弦。`Magic
  Fiddle` 仅售 2.99 美元。下载这款应用，尽情享受吧！如果你有孩子，他们可能也会喜欢。**注意：** 此应用并非要取代你那把价值连城的斯特拉迪瓦里小提琴；不过，它确实为学习小提琴提供了一个有趣的入门方式。
  | ![images](img/p544-01.jpg) |


  ## 演奏 Magic Fiddle


  你可以在 `StoryBook` 模式下演奏 `Magic Fiddle`，可以是在 `Solo` 模式下作为独奏乐器，也可以使用内置的 `Songbook`
  功能演奏流行乐曲（参见图 22–4）。


  要更改琴弦颜色或调性，请点击 `Main` 屏幕上的 `Settings` 图标。


  要在 `Solo` 模式下演奏，请像拿小提琴一样握着 iPad，将其搁在肩上弹奏。


  ![images](img/2204.jpg)


  **图 22–4.** *`Magic Fiddle` 的屏幕与控制界面*


  ## 世界视图


  点击 `Back` 按钮并选择 `World`（参见图 22–5）。这会显示一个地球仪，上面有世界各地的人们在愉快地演奏小提琴。有时你还会看到二重奏。


  如果你喜欢某个人的演奏方式，请点击 `Love` 图标。


  如果你不喜欢正在听的音乐，请点击 `Next` 图标（两个向右的箭头）。


  ![images](img/2205.jpg)


  **图 22–5.** *`Magic Fiddle` 的世界视图——观看他人演奏小提琴*


  '
- '# 游戏中心


  | 去年，苹果为便携游戏引入了一个新概念：`Game Center`。`Game Center` 是一个让你与朋友见面、邀请朋友玩游戏，或分享你与朋友共同玩的游戏成就的地方。
  | ![images](img/p546-01.jpg) |


  ## 设置游戏中心


  | 当你首次从 iPad 上启动 `Game Center` 时，系统会要求你使用 `Apple ID` 和密码或 `MobileMe ID` 和密码登录。输入你的个人信息，然后输入一个电子邮件地址（或多个电子邮件地址）以验证
  `Game Center` 的使用权限。 | ![images](img/p547-01.jpg) |


  **提示**：如果你注册并验证了多个电子邮件地址，你的朋友将更容易在 `Game Center` 上找到你，并邀请你加入他们的 `Game Center` 网络。


  | 请确保 `Allow Game Invites` 和 `Find me By Email` 按钮处于**开启**状态，这样你的朋友才能邀请你一起玩。 | ![images](img/p547-02.jpg)
  |


  ## 使用游戏中心


  一旦你设置好 `Game Center`，乐趣就开始了。启动 `Game Center`，你会看到你有多少位朋友、安装了多少款 `Game Center` 游戏，以及获得了多少成就。所有这些信息都可以在底部的
  `Me` 标签页 ![images](img/p548-01.jpg) 中查看。


  触摸 `Friends` 标签页 ![images](img/p548-02.jpg)，你会看到你有多少位 `Game Center` 好友。这个数量上限似乎是
  500 位好友。


  触摸 `Games` 标签页 ![images](img/p548-03.jpg)，你会看到你的设备上安装了多少款 `Game Center` 游戏。


  **注意**：一旦你拥有了 `Game Center` 账户，你可以从任何 iOS 设备登录，查看你的游戏、好友和成就。


  触摸 `Requests` 标签页 ![images](img/p548-04.jpg)，可以查看待处理的请求，或者触摸 **+** 号按钮，通过电子邮件地址邀请联系人成为你的
  `Game Center` 好友。


  ## 进行多人游戏


  某些 `Game Center` 游戏允许你与一位 `Game Center` 好友进行（并邀请其参加）一对一的游戏。有些游戏会为你匹配在线玩家，而其他游戏则只允许你与朋友分享成就。


  | 右侧的截图显示了启用了几款游戏的 `Game Center`：有些游戏只允许用户分享成就，而另一些则允许用户与朋友对战或进行在线匹配。 | ![images](img/p549-01.jpg)
  |


  在一款多人游戏中（例如 `Adrenaline Golf`），你可以从 `Game Center` 内部启动游戏，也可以从 iPad 上的游戏图标启动。


  | 右侧的截图显示了用户在 `Adrenaline Golf` 中选择 `Play Multiplayer` 时的选项。这样做会弹出 `Automatic Match
  Making` 或 `GameCenter Invite` 选项。选择 `Automatic Match Making` 会提示 iPad 寻找对手与用户对战。
  | ![images](img/p549-02.jpg) |


