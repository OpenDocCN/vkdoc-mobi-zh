- '# AirPlay


  与音乐和视频一样，你可以使用 Apple 专有的**AirPlay**功能将照片“发送”到你的 Apple TV（或其它兼容**AirPlay**的设备）。


  **AirPlay**图标位于顶部图标栏的最右侧。在任何照片或相册中，点击**AirPlay**图标。然后选择要将照片从 iPad“移动”到大屏幕电视的**AirPlay**设备。


  ![images](img/p431-01.jpg)


