- '# 添加幻灯片


  按照以下步骤添加幻灯片：


  1.  点击左下角的**加号**按钮 ![images](img/p495-01.jpg)。

  2.  选择你想添加的幻灯片样式。

  3.  双击以编辑文本，并像之前一样使用工具按钮添加图像或对象。


  ![images](img/p495-02.jpg)


