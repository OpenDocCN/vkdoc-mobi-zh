  \n*   轻点页面的右侧边缘翻到下一页。\n*   缓慢地长按页面右侧边缘的屏幕。在仍触摸屏幕的同时，温和缓慢地将手指向左滑动。\n\n    **提示：**\
  \ 如果您非常缓慢地移动手指，在\"翻\"页时甚至可以实际看到页面背面的文字——非常酷的视觉效果。\n\n*   最后一种翻页方式是使用页面底部的**滑块**控件。当您从左向右缓慢滑动时，您会看到**滑块**控件上方显示页码。松开**滑块**控件即可跳转到该特定页码。\n\
