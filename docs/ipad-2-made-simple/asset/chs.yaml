- "# MobileMe 网站快速导览\n\n通过 MobileMe 网站，您可以完成许多实用且令人惊叹的操作。您可以定位您的 iPad、向其发送信息、让它大声响铃，甚至远程锁定或擦除它。以下是快速导览。\n\
  \n1.  在电脑的网页浏览器中，输入网址 [`www.me.com`](http://www.me.com) 访问 `MobileMe`。\n2.  输入您的用户名和密码，然后点击\
  \ `Log In`。\n\n    ![images](img/p175-01.jpg)\n\n3.  若要查看您的邮件，请点击左上角的`云朵`图标 ![images](img/p175-06.jpg)，然后点击`邮件`图标。\n\
  \n    ![images](img/p175-02.jpg)\n\n4.  这将显示您所有发送到 MobileMe 邮箱地址 [`(membername)@me.com`](http://(membername)@me.com)\
  \ 的`收件箱`。\n\n    ![images](img/p175-03.jpg)\n\n5.  若要查看您的通讯录，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`通讯录`图标。\n\
  \n    ![images](img/p175-04.jpg)\n\n6.  若要查看您的日历，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`日历`图标。请注意顶部有各种用于日历视图的按钮：日、周、月和列表。\n\
  \n    ![images](img/p176-01.jpg)\n\n7.  若要查看您的相册，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`图库`图标。\n\
  8.  若要创建新相册，请点击左下角的`+`。\n\n    ![images](img/p176-02.jpg)\n\n9.  输入您的`相册名称`，并勾选您想要的`允许`和`显示`设置。此外，对于\
  \ Mac 用户，请决定是否要与 `iPhoto` 或 `Aperture` 同步。\n10. 点击`创建`按钮来创建您的新相册。\n\n    ![images](img/p176-03.jpg)\n\
  \n11. 点击`上传箭头`以选择要上传到您 MobileMe 相册的照片或视频。\n12. 浏览至电脑上存储图片的文件夹，点击选中图片或视频，然后点击`打开`按钮。\n\
  \n    **注意**：支持以下图像文件格式：`.png`、`.gif`、`.jpg`、`.jpeg`。支持以下视频类型：`.mov`、`.m4v`、`.mp4`、`.3gp`、`.3g2`、`.mpg`、`.mpeg`、`.avi`。\n\
  \n    ![images](img/p177-01.jpg)\n\n    ![images](img/p177-02.jpg)\n\n13. 点击`云朵`图标\
  \ ![images](img/p175-06.jpg)，然后点击 `iDisk` 图标，查看位于 MobileMe iDisk 上的文件。\n\n    **提示**：您可以轻松地在此\
  \ iDisk 上从电脑和 iPad 存储和检索文件。您甚至可以分享因文件过大而无法通过邮件发送的文件，或使用`公共`文件夹从 iPad 打印的文件。\n\n\
  \    ![images](img/p178-01.jpg)\n\n14. 点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`查找我的\
  \ iPad` 图标来定位您的 iPad。出于安全目的，您需要重新输入密码。此功能假设您已从 iPad 上的`设置`应用登录了 MobileMe。\n\n  \
  \  ![images](img/p178-02.jpg)\n\n15. 点击右上角的您的姓名，然后从下拉列表中选择`帐户`。在您的帐户页面中，您可以调整选项、查看您的帐户类型和试用到期日期（如果您使用的是免费试用版）、获取帮助，或检查\
  \ MobileMe 服务是否正在运行。\n\n    ![images](img/p178-03.jpg)\n\n![images](img/p179-01.jpg)\n\
  \n## 设置您的 iPad 以访问您的 MobileMe 帐户\n\n现在您已经设置好了 MobileMe 帐户，可以准备从 iPad 登录了。我们将在第 1\
  \ 章：“开始使用”的“查找我的 iPad”部分向您展示如何操作。\n\n1.  点击您的`设置`图标。\n2.  点击`邮件、通讯录、日历`。\n3.  点击`添加帐户`。\n\
  4.  对于帐户类型，点击 `MobileMe`。\n5.  输入您的`名称`以及您的 MobileMe `电子邮件地址`和`密码`，然后点击`下一步`。\n\
  6.  现在您将看到 MobileMe 配置屏幕，其中显示您的同步选项。\n7.  要打开或关闭任何同步项目，请点击开关。\n8.  要打开`查找我的 iPad`（该功能会在\
  \ MobileMe 网站的地图上显示您的 iPad），请将开关拨到`开`。\n\n    ![images](img/p179-02.jpg)\n\n   \
  \ **注意**：如果您在 iPad 上有任何现有的联系人、日历或其他信息，这些信息将与您的 MobileMe 联系人和日历分开保存。\n\n9.  完成后，点击`存储`。您应该会返回到“设置”屏幕，并看到您的\
  \ MobileMe 帐户已列出，且选定的项目已开启同步。\n\n![images](img/p180-01.jpg)\n\n## 设置后使用 MobileMe\n\
  \n一旦设置完成，使用 MobileMe 会相当无缝。您在 iPad 上更新联系人和日历，更改会自动出现在您的电脑上。而且，如果您在同一帐户上设置了其他移动设备（如另一台\
  \ iPad），更改也会出现在那里。所有内容都会通过无线方式自动保持同步。\n\nMobileMe 有一些非常酷的功能，我们接下来将重点介绍。\n\n### 查找我的\
  \ iPad、发送信息和远程擦除\n\n从任何网页浏览器中，您都可以使用 MobileMe 的`查找我的 iPad`功能来定位您的 iPad。您可以发送信息并播放响亮的声音来提醒\
  \ iPad 的持有者，即使 iPad 处于锁定状态。您可以使用四位数字代码远程锁定您的 iPad，并远程擦除 iPad 上的所有信息。\n\n请参考第 1 章：“开始使用”中的“查找我的\
  \ iPad”部分。\n\n### Google/Exchange 或 MobileMe 的附加设置\n\n设置好 Google/Exchange 或 MobileMe\
  \ 同步后，您可能会在“设置”屏幕上看到一些除了第 14 章：“处理联系人”和第 15 章：“您的日历”中所示选项之外的新选项。\n\n1.  点击`设置`图标。\n\
  2.  点击左侧栏中的`邮件、通讯录、日历`。\n3.  向下滚动右侧栏至底部，可以看到此处显示的图像。\n4.  通讯录部分的新选项是`默认帐户`。您可以将其设置为\
  \ Exchange/Google 帐户或您的电脑帐户。\n5.  请注意，您可以打开或关闭`新邀请提醒`。\n6.  日历部分的新选项是`同步`，它允许您设置同步日历的时间范围（`2\
  \ 周`、`1 个月`、`3 个月`、`6 个月`或`所有事件`）。\n\n    ![images](img/p181-01.jpg)\n\n7.  您还可以选择添加到\
  \ iPad 的新事件的`默认日历`。创建新事件时，您可以更改此日历。\n\n## 第 5 章\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n"
- "# Wi-Fi 与 3G 连接\n\n我们生活在一个互联的世界。无线网络（Wi-Fi）接入已经成为常态，而非例外——您很可能正在家中或办公室使用 Wi-Fi。现在，您可以利用它来连接您的\
  \ iPad。如果您的 iPad 配备了 3G 模块，那么您还可以在任何有蜂窝网络信号覆盖的地方（这比 Wi-Fi 网络的覆盖范围要广得多）连接到互联网。\n\n\
  在本章中，我们将讨论您的 iPad 的两种连接方式的区别：Wi-Fi（无线局域网）和 3G（蜂窝服务——您的手机所使用的广域数据网络）。我们将向您展示连接或断开这两种网络的所有方法。有时，您可能希望禁用或关闭\
  \ 3G 连接，仅使用 Wi-Fi，以节省数据连接费用。\n\niPad 的美妙之处在于它内置了无线互联网接入功能。一旦将您的 iPad 连接到无线（Wi-Fi\
  \ 或 3G）网络，您就可以在几分钟内发送电子邮件和上网冲浪。而一旦您发现了所有可用的出色应用程序和书籍，您将再也不希望断开连接。\n\n**注意：** 您的\
  \ iPad 可能不具备 3G 连接功能。某些 iPad 仅支持 Wi-Fi 连接，不具备连接 3G 蜂窝网络的能力。\n\n如何知道您拥有的是哪款 iPad？支持\
  \ 3G 的 iPad 在顶部边缘会有一条黑色塑料条，在 iPad 背面更为显眼；该条有助于数据接收（请参见图 5-1）。\n\n![images](img/0501.jpg)\n\
  \n**图 5-1.** *如何判断您的 iPad 是否具备 3G 蜂窝功能*\n\n### 连接到 Wi-Fi 或 3G 网络后，我可以做什么？\n\n以下是连接到\
  \ Wi-Fi 或 3G 网络后可以执行的一些操作：\n\n-   从 `App Store` 访问和下载应用程序（程序）。\n-   使用 iPad 上的 `iTunes`\
  \ 应用访问和下载音乐、视频、播客等内容。\n-   使用 `Safari` 浏览网页。\n-   发送和接收电子邮件。\n-   使用需要互联网连接的社交网站，如\
  \ Facebook、Twitter 等。\n-   使用 `Skype` 应用将您的 iPad 当作电话使用（请参见第 22 章：“社交网络”）。\n-  \
  \ 玩需要实时互联网连接的游戏。\n-   其他任何需要互联网连接的操作。\n\n## Wi-Fi 连接\n\n每台 iPad 都内置了 Wi-Fi 功能。如果您有\
  \ 3G 型号，那么您同时拥有 3G 和 Wi-Fi 功能。那么，让我们来看看如何连接到 Wi-Fi 网络。关于 Wi-Fi 连接需要考虑的事项包括：\n\n\
  -   网络接入和数据下载没有额外费用（如果您在家中、办公室或免费的 Wi-Fi 热点使用 iPad）。\n-   Wi-Fi 通常比蜂窝数据 3G 连接速度更快。\n\
  -   包括飞机在内的越来越多的地方提供 Wi-Fi 接入，但您可能需要支付一次性或月度服务费。\n\n### 设置您的 Wi-Fi 连接\n\n要设置您的 Wi-Fi\
  \ 连接，请按照以下步骤操作：\n\n1.  点击 `设置` 图标。\n2.  点击左侧栏中的 `Wi-Fi` 以查看右侧显示的画面。\n3.  确保 `Wi-Fi`\
  \ 开关已设置为 `开`。\n4.  一旦 Wi-Fi 打开，iPad 将自动开始搜索无线网络。\n5.  可访问的网络列表会显示在 `选择网络...` 选项下方。在此屏幕截图中，您可以看到我们有两个可用网络。\n\
  \n![images](img/p185-01.jpg)\n\n要连接到列出的任何网络，只需点击它。如果该网络是不安全的——即它不需要密码——您将自动连接。\n\
  \n**注意：** 某些地方，如咖啡店，使用基于网页的登录界面，而不是用户名/密码界面。在这种情况下，当您点击一个网络（或尝试使用 `Safari`）时，iPad\
  \ 会滑出一个浏览器界面，您将看到网页以及登录选项。\n\n### 安全 Wi-Fi 网络——输入密码\n\n| 某些 Wi-Fi 网络需要密码才能登录。这由网络管理员在创建无线网络时设置。您必须知道确切的密码，包括是否区分大小写。如果网络确实需要密码，您将进入密码输入界面。请按提供的格式准确输入密码，然后按下屏幕键盘上的\
  \ `回车` 键（此时该键标记为 `加入`）。 | ![Image](img/p186-01.jpg) |\n| 在 `选择网络...` 界面上，您会看到一个`勾选`图标，表示您已连接到该网络。\
  \ | ![Image](img/p186-02.jpg) |\n\n**提示：** 您可以将文本粘贴到密码对话框中。因此，对于较长或随机字符的密码，您可以先将密码传输到您的\
  \ iPad（例如通过电子邮件），然后直接复制粘贴。请记得在执行此操作后立即删除该电子邮件以确保安全。\n\n### 切换到不同的 Wi-Fi 网络\n\n有时，您可能想要更改当前的\
  \ Wi-Fi 网络。这种情况可能发生在您身处酒店、公寓或其他地方，而 iPad 选择的网络并非信号最强的网络，或者您希望使用安全的网络而非不安全的网络时。\n\
  \n要从当前选定的 Wi-Fi 网络切换，请点击 `设置` 图标，点击左侧栏中的 `Wi-Fi`，然后点击您想加入的 Wi-Fi 网络名称。如果该网络需要密码，您需要输入密码才能加入网络（请参见图\
  \ 5-2）。\n\n![images](img/0502.jpg)\n\n**图 5-2.** *切换到不同的 Wi-Fi 网络*\n\n一旦您输入正确的密码（或点击一个开放网络），您的\
  \ iPad 将加入该网络。\n\n### 验证您的 Wi-Fi 连接\n\n| 要验证您是否已连接到 Wi-Fi 网络，请查找旁边带有`勾选`图标的网络名称。当您返回\
  \ `设置` 界面时，您应该在 `选择网络...` 下方的列表中看到您的 Wi-Fi 网络名称旁边有一个`勾选`图标。 | ![Image](img/p187-01.jpg)\
  \ |\n\n## 高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\n有时，您可能看不到您想加入的网络，因为其名称已被管理员隐藏。在下一节中，您将学习如何在\
  \ iPad 上加入此类网络。一旦您加入，下次进入该网络覆盖范围时，您的 iPad 将自动加入，无需询问。您也可以设置让 iPad 每次加入网络时都询问您；我们也会向您展示如何操作。有时，您可能想要擦除或遗忘某个网络。例如，假设您参加了一次性的会议，并且想要删除相关联的网络——您也将学习如何做到这一点。\n\
  \n### 为什么我看不到我想要加入的 Wi-Fi 网络？\n\n有时，出于安全原因，人们不会让他们的网络被发现，您必须手动输入名称和安全选项才能连接。\n\n\
  如 图 5-3 所示，您的可用网络列表包含 `其他`... 点击 `其他` 选项，即可手动输入您想要加入的网络名称。\n\n![images](img/0503.jpg)\n\
  \n**图 5-3.** *您可以手动输入 Wi-Fi 网络的名称。*\n\n输入 Wi-Fi 网络名称，点击 `安全性` 选项，然后选择该网络正在使用的安全类型。如果不确定，您需要向网络管理员确认。\n\
  \n当您拥有所需信息后，将其与正确的密码一同输入。这个新网络将被保存到您的网络列表中，以便将来访问。\n\n\n\n\n#### 重新连接之前加入的 Wi-Fi\
  \ 网络\n\niPad 的妙处在于，当你回到某个之前加入过 Wi-Fi 网络的区域时（无论是开放网络还是需要密码的安全网络），你的 iPad 会自动加入该网络，无需你再次输入密码或提供其他连接信息。当然，你也可以自由关闭此自动加入功能，具体方法将在下一节介绍。\n\
  \n##### 询问是否加入网络\n\n默认情况下，`询问是否加入网络`开关设置为`开`，这意味着你会自动加入已知或可见的 Wi-Fi 网络。如果有你不认识的可用网络，系统会先询问你是否连接。\n\
  \n| 如果开关设置为`关`，你只会自动连接到已知网络，并且必须按照我们之前描述的手动加入未知网络步骤进行操作。为何有人会关闭自动加入网络功能？例如，如果你不想让孩子在不知情的情况下用\
  \ iPad 加入无线网络，这可能是一个很好的安全措施。 | ![图片](img/p189-01.jpg) |\n\n##### 忽略（或删除）网络\n\n如果你发现不想再连接到列表中的某个网络，你可以“忽略”它，即将其从网络列表中移除。请按以下步骤操作：\n\
  \n1.  在`设置`应用的`Wi-Fi`屏幕中，点击该网络旁边的`蓝色`小箭头。随后出现的屏幕会显示该特定连接的详细信息（见图 5-4）。\n2.  点击屏幕顶部的`忽略此网络`。\n\
  3.  系统会弹出警告提示。点击`忽略网络`，该网络将不再显示在你的列表中。\n\n![图片](img/0504.jpg)\n\n**图 5-4.** *如何忽略\
  \ Wi-Fi 网络*\n\n### 3G 蜂窝数据连接\n\n如果你拥有 3G iPad，你还可以连接到蜂窝数据网络；这与 iPhone 或其他手机连接的是同一网络。以下是关于蜂窝数据连接需要考虑的一些事项：\n\
  \n*   3G 蜂窝网络的覆盖范围比 Wi-Fi 更广——你可以在汽车内或远离城市的地方连接 3G，而这些地方通常没有 Wi-Fi。\n*   使用蜂窝数据网络需要支付额外的月服务费。\n\
  *   在美国，根据你购买的 iPad 型号不同，你有两种蜂窝数据选择：AT&T 和 Verizon。\n    *   AT&T 当前套餐：每月 250MB\
  \ 收费 15 美元，每月 2GB（约 2000 MB）收费 25 美元。\n    *   Verizon 当前套餐：每月 1GB 收费 20 美元，每月 3GB\
  \ 收费 35 美元，每月 5GB 收费 50 美元，每月 10GB 收费 80 美元。\n\n以下是使用 1GB 无线数据可以做的事情：\n\n*   浏览\
  \ 6,500 个网页\n*   下载 300 首歌曲\n*   观看 65 个 YouTube 视频\n*   下载 2,000 张照片\n\n**注意：**\
  \ 英国 Orange、英国 Vodafone、O2、加拿大 Rogers 及其他国际运营商可能提供不同的定价方案。\n\n#### 设置你的 3G 连接\n\n\
  在连接到 3G 蜂窝网络之前，你需要从无线运营商处购买蜂窝数据套餐。如前所述，在美国，目前你为 iPad 选择的运营商是 AT&T 和 Verizon。\n\n\
  **提示：** 你可以通过以下方法节省蜂窝数据套餐的费用：\n\n*   尽可能使用 Wi-Fi。\n*   从成本较低、容量较小的蜂窝数据套餐开始。\n* \
  \  整月监控你的蜂窝数据用量，确保不会超出低成本数据套餐的限制。\n\n你可能会发现，如果大多数数据需求都使用 Wi-Fi，那么低成本套餐就够用了。\n\n\
  请按照以下步骤连接到蜂窝数据网络：\n\n1.  点击 iPad 上的`设置`图标。\n2.  点击左侧栏中的`蜂窝数据`。\n3.  将`蜂窝数据`旁边的开关设置为`开`（见图\
  \ 5-5）。\n4.  首次执行此操作时，会弹出一个窗口要求你设置账户：\n    1.  输入你的个人信息、用户名和密码，这些信息仅用于这个新的蜂窝数据套餐。此账户与你的电子邮件账户、手机套餐或任何其他账户无关，因此你可以输入相同的信息，也可以设置不同的信息。\n\
  \n        **注意：** 在本书出版时，美国的无线运营商（AT&T 和 Verizon）提供定期计费套餐。这意味着你只需设置一次套餐，之后每月都会扣费，直到你取消套餐为止。\n\
  \n    2.  向下滚动查看屏幕其余部分，轻点屏幕选择你的数据套餐。\n    3.  输入你的信用卡信息。\n5.  点击`下一步`按钮。\n\n   \
  \ ![图片](img/0505.jpg)\n\n    **图 5-5.** *购买蜂窝数据套餐*\n\n6.  在下一个屏幕上，你需要滑动到协议底部，并点击`同意`才能继续——当然，前提是你同意该协议。\n\
  7.  如果你要携带 iPad 出行，点击`添加国际数据`并按照下一节的步骤操作。\n\n    ![图片](img/p193-01.jpg)\n\n8.  如果此时不想添加国际套餐（你可以随时稍后添加），点击`提交`完成操作。\n\
  9.  点击`提交`后，你会看到一个类似下方的窗口。点击`确定`关闭窗口。\n\n    ![图片](img/p193-02.jpg)\n\n10.  最后，当你的新蜂窝数据套餐设置完成后，你会看到类似下方的弹出消息。\n\
  \n    ![图片](img/p193-03.jpg)\n\n#### 添加国际数据套餐\n\n如果你计划外出旅行，可能想为 iPad 添加一个国际数据套餐。只需按照以下步骤即可轻松操作：\n\
  \n**注意：** 并非所有运营商都为你的 iPad 提供国际漫游套餐。请与你的运营商确认以确保能购买到套餐。如果不行，你可能需要考虑在出国期间关闭 3G 连接，只使用免费的\
  \ Wi-Fi。\n\n1.  点击`设置`图标。\n2.  点击左侧栏中的`蜂窝数据`。\n3.  点击右侧栏中的`查看账户`。\n4.  输入你在创建此账户时使用的蜂窝数据用户名和密码登录账户。\n\
  5.  点击`添加国际套餐`（见图 5-6）。\n6.  在`国际数据套餐`窗口中执行以下操作：\n    1.  选择你的`一次性国际套餐`。\n    2.\
  \  调整你的套餐`开始日期`以匹配你的旅行需求。\n    3.  点击底部的`查看所有支持国家/地区列表`链接，确认该套餐支持你所需的国家/地区。\n  \
  \  4.  点击`完成`。\n    5.  你可能需要在下一个屏幕上确认你的选择。\n\n![图片](img/0506.jpg)\n\n**图 5-6.**\
  \ *购买国际蜂窝数据套餐*\n\n\n\n"
- '# 监控蜂窝数据用量与更改套餐


  如果你购买了限量数据套餐（15 美元/月，含 250MB 流量），则需要定期检查每日数据使用量。


  操作方法如下：


  1.  轻点`设置`图标。

  2.  轻点左侧栏中的`蜂窝数据`。

  3.  轻点右侧栏中的`查看账户`。

  4.  输入创建账户时使用的蜂窝数据用户名和密码登录账户（参见图 5-6）。

  5.  查看顶部`账户概览`区域列出的`数据套餐`、`状态`和`计费周期`。只有购买了限制数据用量的套餐（例如 250MB）时，才会看到以兆字节（MB）为单位的实际数据用量。

  6.  如需更改套餐或增加数据，请轻点`增加数据或更改套餐`，然后按照步骤调整套餐。


  **注：** 当你的 250MB 套餐剩余流量达到 20%、10%和 0%时，iPad 会发出通知。你也可以选择以 14.99 美元续费该套餐，或升级至 30
  美元的不限流量套餐。


  ## 国际旅行——如何避免高额蜂窝（3G）数据漫游费用（仅限 3G 版 iPad 机型）


  我们听说有些人出国旅行后，收到 300 到 400 美元的月度漫游账单时非常惊讶。只需在旅行前和旅行中采取几个简单步骤，即可避免这些费用：


  1.  尽量在海外使用免费 Wi-Fi 网络的 Wi-Fi 连接；这样可以将蜂窝数据漫游费用降至最低。

  2.  如前文“添加国际数据套餐”部分所述，订阅一次性国际数据套餐。在大多数情况下，激活国际数据套餐可以比标准数据漫游费用节省一些钱。

  3.  了解可能产生的数据漫游费用。向你的蜂窝数据供应商咨询数据漫游费用。你可以尝试在手机公司的网站上搜索，但通常需要致电客服，并明确询问你将要访问的国家/地区的
  iPad 数据漫游费用。如果你打算使用电子邮件、地图、网页浏览或任何其他数据服务，应明确询问这些服务是否单独收费。


  探索购买和使用外国 SIM 卡（MicroSIM 规格）。


  你的 iPad 蜂窝数据供应商可能不提供国际数据漫游套餐的特别优惠，或者费率过高。在这种情况下，你可以插入在国外购买的 SIM 卡。


  **警告：** iPad 使用 MicroSIM，而几乎所有其他手机都使用 MiniSIM。这可能导致很难找到提供合适尺寸 SIM 卡的国际运营商。


  通常，插入你所处国家/地区的 SIM 卡可以消除或大幅降低数据漫游费用。不过，请仔细检查该外国 SIM 卡的数据费用。使用外国 SIM 卡可以为你节省数百美元，但最好事先做一些网络调查，或尝试咨询近期去过同一国家/地区的人士以确保无误。


  ## 飞行模式——关闭 3G 和 Wi-Fi


  通常在飞机上飞行时，机组人员会要求你在起飞和降落时关闭所有便携式电子设备。当飞机达到巡航高度后，机组人员会表示“所有经批准的电子设备”可以重新开启。


  你可以通过按住顶部右侧边缘的电源按钮，然后用手指`滑动来关机`来关闭 iPad。


  如果你使用的是 3G/蜂窝数据版 iPad，则可以按如下方式在`设置`图标中开启`飞行模式`：


  1.  轻点`设置`图标。

  2.  将左侧栏顶部的`飞行模式`开关设置为`开启`。


  ![图片](img/p197-01.jpg)


  **提示：** 部分航空公司提供机上 Wi-Fi 网络；在这种情况下，你需要保持 Wi-Fi 处于`开启`状态。


  你可以按照以下步骤将`Wi-Fi`连接`关闭`或`开启`（参见图 5-7）：


  1.  轻点`设置`图标。

  2.  轻点左侧栏顶部的`Wi-Fi`。

  3.  将右侧栏顶部的`Wi-Fi`开关设置为`关闭`。


  ![图片](img/0507.jpg)


  **图 5-7.** *如何`关闭`或`开启`Wi-Fi。*


