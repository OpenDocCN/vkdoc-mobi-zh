- '# 第 13 章


  '
- "# iPad 上的电子邮件\n\n在本章中，我们将帮助您探索 iPad 上 `邮件` 应用中的电子邮件世界。您将学习如何设置多个电子邮件账户、查看各种阅读选项、打开附件以及整理收件箱。\n\
  \n![images](img/p319-01.jpg)\n\n您会对其统一的收件箱功能感到满意，该功能让您可以在一个收件箱中查看所有电子邮件。您还可以选择查看主题邮件，其中与同一主题相关的所有邮件（回复、转发等）都归到一个组中。或者，如果您愿意，可以在“设置”应用中关闭此功能。\n\
  \n当您的电子邮件无法正常工作时，您还将学习一些有用的故障排除技巧，帮助您恢复正常使用。\n\n### 邮件入门\n\n在 iPad 上设置电子邮件相当简单。您可以从\
  \ `iTunes` 同步电子邮件账户设置（参见第 3 章：“将 iPad 与 iTunes 同步”中的“同步电子邮件账户设置”部分），也可以直接在 iPad\
  \ 上设置电子邮件账户。您需要网络连接才能正常使用电子邮件。\n\n\n\n### 需要网络连接\n\n如今移动电子邮件无疑非常流行。你可以在没有网络连接的情况下，查看、阅读和回复已同步到\
  \ iPad 上的邮件；但是，要使用 iPad 发送和/或接收电子邮件，你需要连接 Wi-Fi 网络。请参阅第 5 章：“Wi-Fi 和 3G 连接”了解更多信息。另请参阅第\
  \ 1 部分快速入门指南中的“读取顶部连接状态图标”部分。\n\n**提示：** 如果你正在乘坐飞机，只需在登机前下载所有电子邮件；这样你就可以在离线状态下阅读、回复和撰写邮件。这里有一点很重要——除非你点开邮件进行查看，否则在离线前你可能只下载了邮件标题。换句话说，在起飞前，请确保点开所有重要邮件，确保完整内容已下载到你的\
  \ iPad。你在 iPad 上离线撰写的任何邮件，都将在落地并重新建立网络连接后发送。\n\n## 在 iPad 上设置电子邮件\n\n你有两种选项可在 iPad\
  \ 上设置电子邮件账户：\n\n- 使用 `iTunes` 应用同步电子邮件账户设置。\n- 直接在 iPad 上设置电子邮件账户。\n\n如果你有多个电子邮件账户，并且通过电脑上的电子邮件程序（例如\
  \ `Microsoft Outlook`、`Entourage` 等）访问它们，那么最简便的方法就是使用 `iTunes` 同步你的账户。有关此主题的更多信息，请参阅第\
  \ 3 章：“使用 iTunes 同步你的 iPad”中的“同步电子邮件账户设置”部分。\n\n如果你只有几个账户，或者你未使用 `iTunes` 可同步的电脑电子邮件程序，那么你需要直接在\
  \ iPad 上设置电子邮件账户。\n\n### 输入从 iTunes 同步的电子邮件账户密码\n\n在第 3 章的“同步电子邮件账户设置”部分，我们向你展示了如何将电子邮件账户设置同步到\
  \ iPad。同步完成后，你应该能够通过打开 `设置` 应用来查看 iPad 上的所有电子邮件账户。你只需要输入每个账户的密码即可。\n\n输入账户密码的简单方法是在弹出窗口出现时，直接在其中输入密码。\n\
  \n输入你的 `密码`，然后轻点 `OK` 进行保存。\n\n![images](img/p321-01.jpg)\n\n你也可以在 `设置` 应用中输入电子邮件账户密码并调整其他账户详细信息。要为每个同步的电子邮件账户输入密码，请按照以下步骤操作（参见图\
  \ 13-1）：\n\n1. 轻点 `设置` 图标。\n2. 轻点左侧栏中的 `邮件、通讯录、日历`。\n3. 在右侧栏的 `账户` 下，你应该能看到所有已同步的电子邮件账户列表。\n\
  4. 轻点任一列出的电子邮件账户，然后轻点 `账户` 进入 `账户` 详情界面。\n5. 输入账户 `密码`，然后轻点 `完成`。\n6. 为所有列出的电子邮件账户重复以上步骤。\n\
  \n![images](img/1301.jpg)\n\n**图 13–1.** *为从 `iTunes` 应用同步的每个电子邮件账户输入密码*\n\n###\
  \ 在 iPad 上添加新电子邮件账户\n\n要在 iPad 上添加新电子邮件账户，请按照以下步骤操作：\n\n1. 轻点 `设置` 图标。\n2. 轻点 `邮件、通讯录、日历`。\n\
  3. 在你的电子邮件账户下方，轻点 `添加账户`。\n\n    **提示：** 要编辑任何电子邮件账户，只需轻点该账户。\n\n    ![images](img/p322-01.jpg)\n\
  \n4. 在此界面上选择要添加的电子邮件账户类型：\n\n    - 如果你使用 Microsoft Exchange 电子邮件服务器、Hotmail 或 Gmail，并且希望无线同步联系人和日历，请轻点\
  \ `Microsoft Exchange`。\n    - 如果你使用 Gmail 但不希望无线同步联系人，请轻点 `Gmail`。\n    - 如果你使用这些服务，请轻点\
  \ `MobileMe、Yahoo` 或 `Aol`。\n    - 要设置其他类型的账户，请轻点 `其他`。\n\n    **提示：** 在第 4 章：“其他同步方法”中了解更多关于\
  \ `Google`/`Hotmail/Microsoft Exchange` 和 `MobileMe` 的信息。\n\n    ![images](img/p322-02.jpg)\n\
  \n5. 如果在账户类型中选择 `其他`，你将看到此界面，可以添加以下类型的账户：邮件、通讯录和日历。\n\n    - 要添加邮件账户，请轻点 `添加邮件账户`。\n\
  \    - 要添加通讯录账户，请轻点 `添加 LDAP 账户` 或 `添加 CardDAV 账户`。\n    - 要添加日历账户，请轻点 `添加 CalDAV\
  \ 账户` 或 `添加已订阅的日历`。\n\n    ![images](img/p323-01.jpg)\n\n6. 现在你将能够输入登录凭据。在 `名称`\
  \ 字段中输入你的姓名，以便其他人收到你邮件时看到。如果你选择了通讯录或日历类型的账户，则需要输入 `服务器` 名称、`用户名`、`密码` 和 `描述`。\n\n\
  \    ![images](img/p323-02.jpg)\n\n7. 接下来，在 `地址`、`密码` 和 `描述` 字段中添加适当信息。\n8. 轻点右上角的\
  \ `下一步` 按钮。\n\n#### 指定接收和发送服务器\n\n有时，iPad 无法自动设置你的电子邮件账户。在这种情况下，你需要手动输入更多设置以启用你的电子邮件账户。\n\
  \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和“电子邮件设置”来找到相关设置。例如，如果你使用 Windows Live Hotmail（原名\
  \ Hotmail），则可以搜索“Windows Live Hotmail 的 Microsoft Exchange、POP 或 IMAP 电子邮件设置”。如果找不到这些设置，请联系你的电子邮件提供商寻求帮助。\n\
  \n如果 iPad 仅凭你的电子邮件地址和密码无法登录服务器，你会看到类似这样的界面。\n\n在 `接收邮件服务器` 下，在 `主机名`、`用户名` 和 `密码`\
  \ 字段中输入相应信息。通常，你的接收邮件服务器类似于 `mail.*你的网络服务提供商名称*.com`。\n\n要调整发送服务器名称，请轻点 `发送邮件服务器`。你可以在以下界面上调整发送邮件服务器。这些服务器名称通常看起来像\
  \ `smtp.*你的网络服务提供商名称*.com` 或 `mail.*你的网络服务提供商名称*.com`。\n\n你可以尝试将 `服务器名称` 和 `密码`\
  \ 字段留空。如果不起作用，你随时可以返回并修改它们。\n\n![images](img/p324-01.jpg)\n\n系统可能会询问你是否要使用 SSL（安全套接层），这是一种发送邮件安全类型，你的电子邮件提供商可能要求使用它。如果你不确定是否需要，请向你的电子邮件提供商确认所需的邮件设置。\n\
  \n**提示：** 作者建议尽可能使用 SSL 安全协议。如果不使用 SSL，那么你的登录凭据、邮件以及任何私人信息将以纯文本（未加密）形式发送，容易受到窥探。\n\
  \n#### 验证你的账户是否已设置成功\n\n输入所有信息后，iPad 将尝试配置你的电子邮件账户。你可能会收到一条错误消息；如果发生这种情况，你需要检查输入的信息。\n\
  \n![images](img/p325-01.jpg)\n\n如果系统跳转到显示所有电子邮件账户的界面，请查找新的账户名称。\n\n如果你看到了，说明你的账户已设置成功。\n\
  \n![images](img/p325-02.jpg)\n\n#### 修复“无法获取邮件”错误\n\n如果你轻点 `邮件` 图标并收到“密码错误”的提示，你需要输入密码并轻点\
  \ `OK` 以查看你的电子邮件。\n\n有关更多帮助，请参阅本章的“输入从 iTunes 同步的电子邮件账户密码”部分。\n\n![images](img/p325-03.jpg)\n\
  \n\n\n### 电子邮件基础\n\n在本节中，我们将引导您了解`邮件`应用。我们将解释如何在`竖屏`和`横屏`模式下使用它，以及如何执行阅读、回复、归档、打印和删除邮件等基本操作。\n\
  \n#### 竖屏与横屏邮件界面\n\n既然您已经在 iPad 上设置了电子邮件账户，那么是时候简单了解一下`邮件`应用了。为了更好地掌握如何操作`邮件`程序，了解您的`邮件`应用在`竖屏`和`横屏`视图下的外观会有所帮助（参见图\
  \ 13-2）。\n\n在`横屏`视图中，您始终可以在左侧栏看到收件箱或邮箱，右侧则是电子邮件内容。\n\n在`竖屏`视图中，整封电子邮件内容会填满屏幕。要查看页面左侧垂直弹出窗口中的`收件箱`或`邮箱`，请点击页面左上角的`收件箱`按钮。\n\
  \n![images](img/1302.jpg)\n\n**图 13-2.** *竖屏与横屏视图下的邮件界面*\n\n**提示：** 如果您将 iPad 放在桌子上或放在膝盖上使用，可能需要使用`竖屏锁定`图标将视图锁定在`竖屏`（垂直）模式。这样可以防止屏幕随意旋转。要锁定视图，请按照以下步骤操作：\n\
  \n1.  双击`主屏幕`按钮，然后从左向右滑动。\n2.  点击`竖屏锁定`按钮将屏幕锁定在`竖屏`模式。\n\n#### 查看邮件与未读邮件蓝点\n\n点击任意电子邮件即可在主窗口中查看。\n\
  \n任何未读邮件都会在邮件左侧标有`蓝点`图标 ![images](img/bluebull.jpg)。\n\n![images](img/p327-01.jpg)\n\
  \n#### 调整邮件字体大小\n\n既然谈到了电子邮件，我们来看一个实用的技巧：如何增大邮件中的字体大小。您可以将默认的 10 点或 12 点字体一直调整到\
  \ 56 点（参见图 13-3）。\n\n1.  点击`设置`。\n2.  点击`通用`。\n3.  点击`辅助功能`（右侧栏）。\n4.  点击`大文本`，然后选择您需要的字体大小。\n\
  \n![images](img/p327-02.jpg)\n\n![images](img/1303.jpg)\n\n**图 13-3.** *电子邮件中不同大小的字体*\n\
  \n#### 查看您的邮箱（收件箱与账户文件夹）\n\n顶层界面是您的`邮箱`界面。您可以通过点击左上角的按钮随时进入此界面。持续点击该按钮，直到看不到更多按钮为止。当出现这种情况时，您就处于`邮箱`界面。\n\
  \n从`邮箱`界面，您可以访问以下项目：\n\n*   **统一收件箱：** 点击`所有收件箱`进行操作。\n*   **每个单独账户的收件箱：** 在“收件箱”部分点击该电子邮件账户名称进行操作。\n\
  *   **“账户”部分中每个电子邮件账户的文件夹：** 点击账户名称以查看所有文件夹。\n\n![images](img/p328-01.jpg)\n\n您可以在一个统一收件箱中查看邮件，该收件箱将您的所有电子邮件账户显示在一个收件箱中，或者单独列出每个账户。您也可以选择查看已同步到\
  \ iPad 的任何邮件账户文件夹。\n\n最好对您的各个电子邮件账户有一个整体概念。您的`邮箱`界面位于一棵倒置树的顶端。您可以通过点击顶部的`收件箱`访问每个收件箱，或者通过点击底部的`账户`列表深入到各种同步的邮件文件夹（包括您的收件箱）（参见图\
  \ 13-4）。\n\n![images](img/1304.jpg)\n\n**图 13-4.** *导航到各个收件箱和邮件账户文件夹*\n\n##### 统一收件箱\n\
  \n从`邮箱`界面，点击`所有收件箱`即可查看一个包含您所有账户电子邮件的单一收件箱。\n\n**提示：** 以下是进入`邮箱`界面的方法。\n\n如果您碰巧正在查看某个收件箱或其他邮件文件夹，则需要点击屏幕左上角的按钮一次或两次。\n\
  \n![images](img/p329-01.jpg)\n\n**注意：** 您只会看到在邮件设置过程中选择同步的那些邮件文件夹。例如，您的主邮件账户上可能有\
  \ 20 个邮件文件夹，但在 iPad 上您可能只能看到其中几个。默认同步的邮件文件夹是`收件箱`、`已发送`、`草稿`和`已删除`。\n\n#### 相关邮件在线程中保持在一起\n\
  \n您还会注意到，有些邮件在右侧显示一个数字和一个朝右的`箭头`图标（`>`），如下所示：![images](img/p330-01.jpg)\n\n这表明所显示的邮件有两封相关邮件（回复和转发）。\n\
  \n点击任何邮件即可将其打开。只有当存在相关邮件时，它才无法直接打开。在这种情况下，您首先会看到一个包含所有相关邮件的界面。点击其中任何一封邮件即可打开并查看（参见图\
  \ 13-5）。\n\n![images](img/1305.jpg)\n\n**图 13-5.** *相关邮件被分组成称为线程的群组中。*\n\n**提示：**\
  \ 您可以在`设置`应用中禁用此`线程`视图。点击`设置` ![images](img/U001.jpg) `邮件、通讯录、日历`，然后将`按主题整理`设置为`关闭`。\n\
  \n#### 放大或缩小\n\n与在 iPad 上阅读其他文本一样，您可以放大以查看字更大的电子邮件。您可以通过双击屏幕来实现此操作。您也可以使用`捏合`张开或收拢手势来放大或缩小（有关这些功能的更多信息，请参阅本书第\
  \ 1 部分的“快速入门指南”中的“缩放”部分）。\n\n#### 转到下一封或上一封邮件\n\n在`竖屏`视图中，点击右上角`收件箱`按钮旁边的`上三角`图标\
  \ ![images](img/uparrow.jpg) 或`下三角`图标 ![images](img/downarrow.jpg)。\n\n![images](img/p331-01.jpg)\n\
  \n在`横屏`视图中，您只需点击左侧栏中的邮件，即可在主（右侧栏）预览窗口中查看。\n\n![images](img/p331-02.jpg)\n\n####\
  \ 拷贝与粘贴\n\n以下是选择文本或图片然后从电子邮件中将其拷贝的一些技巧：\n\n*   *双击所需文本以选中一个单词，然后上下拖动蓝色控点以调整选择范围。*\n\
  \    接着，选择`拷贝`。\n\n    ![images](img/p331-03.jpg)\n\n*   长按文本，然后选择`选择`或`全选`。\n\n\
  \    ![images](img/p332-01.jpg)\n\n*   长按图片，然后选择`存储图像`或`拷贝`。\n\n![images](img/p332-02.jpg)\n\
  \n如需更完整的说明，请查看第 2 章中的“拷贝与粘贴”部分：“打字技巧、拷贝/粘贴与搜索”。\n\n#### 移动（归档）邮件\n\n有时，您可能想要整理电子邮件以便日后轻松检索。例如，您可能会收到一封关于即将到来的旅行的电子邮件，并希望将其移动到`旅行`文件夹。有时您会收到需要稍后处理的电子邮件，此时可以将它们移动到`需要关注`文件夹。这可以帮助您记住稍后处理这些邮件。\n\
  \n要开始移动邮件，请点击屏幕右上角的`移动`图标。\n\n![images](img/p332-03.jpg)\n\n当前邮件账户的文件夹列表将显示在屏幕左侧。\n\
  \n点击您想要将邮件移入的文件夹。\n\n**提示：** 虽然您可以将邮件移动到垃圾邮件文件夹，但我们建议您直接删除这些邮件。\n\n![images](img/p333-01.jpg)\n\
  \n\n\n"
- '# 批量移动（归档）邮件


  若要一次移动大量邮件，请打开收件箱并按照以下步骤操作：


  1.  点击收件箱右上角的`编辑`按钮（见图 13-6）。

  2.  点击任意邮件以选中它——选中后，邮件旁边会显示一个`红色对勾`图标。

  3.  点击屏幕底部的`移动`按钮。

  4.  此时将显示你已从邮件账户同步的文件夹列表。在图 13-6 中，我们有多个文件夹；但根据 iPad 的设置方式，你可能只看到两个文件夹：`邮件`和`废纸篓`。


  **提示:** 你可以通过`设置`应用添加更多需要同步的邮件文件夹。依次点击`邮件、通讯录、日历`，然后点击你要调整的账户。如果你看到`要推送的邮件文件夹`选项，则点击它并进行调整。如果未看到该选项，则无法针对你的特定账户同步其他邮件文件夹。


  ![images](img/1306.jpg)


  **图 13–6.** *一次移动多个邮件*


  '
- '# 删除单个邮件


  删除邮件有几种方法。


  在查看邮件时，点击屏幕右上角的`垃圾桶`图标 ![images](img/p334-01.jpg)。


  邮件会缩小，垃圾桶盖会打开，邮件会飞入桶内，然后盖子关闭。这还挺有趣的——试试看吧！


  ![images](img/p334-02.jpg)


  删除单个邮件的另一种方法是从收件箱操作。


  只需在邮件上向左或向右滑动，直到出现`删除`按钮。


  然后，点击`删除`按钮。


  ![images](img/p335-01.jpg)


  **提示:** 你可以通过`设置`应用让 iPad 在删除邮件前进行确认。操作方法是：依次点击`邮件、通讯录、日历`，然后将`删除前询问`旁边的开关设置为`打开`。


  '
- '# 批量删除邮件


  若要一次删除大量邮件，请打开收件箱，并使用前面介绍的将邮件移动到其他文件夹的方法：


  1.  点击收件箱右上角的`编辑`按钮（见图 13-7）。

  2.  点击任意邮件以选中它——选中后，邮件旁边会显示一个`红色对勾`图标。

  3.  点击屏幕底部的`删除`按钮。


  ![images](img/1307.jpg)


  **图 13–7.** *一次移动多个邮件*


  '
- "# 回复邮件\n\n你可能最常用的是`回复`命令。请按以下步骤在 iPad 上回复邮件：\n\n1.  在阅读邮件时，点击右上角的`圆箭头`图标。\n\n \
  \   ![images](img/p336-01.jpg)\n\n2.  从按钮下拉列表中选择`回复`或`全部回复`。\n\n    ![images](img/p337-01.jpg)\n\
  \n3.  输入回复内容，然后点击右上角的`发送`。\n\n    ![images](img/p337-02.jpg)\n\n"
- '# 使用全部回复


  使用`全部回复`选项与使用`回复`功能类似，不同之处在于原始邮件的所有收件人和发件人都会被填入地址栏。原始发件人将出现在`收件人`行，而原始邮件的其他所有收件人将列在`抄送`行。只有当原始邮件有多个收件人时，你才会看到`全部回复`选项。


  **警告:** 使用`全部回复`时要格外小心。如果某些收件人因超出屏幕范围而未显示在原始邮件中，使用此功能可能会很危险。如果你确实使用了`全部回复`，请务必检查`收件人`和`抄送`列表，确保所有收件人都应该收到你的回复。


  '
- '# 转发邮件


  有时，你会收到想要转发给他人的邮件。`转发`命令可以帮你实现这一点（有关处理附件的更多信息，请参见本章的“电子邮件附件”部分）。


  **注意:** 需要转发附件才能将其发送给他人。如果你想把收到的邮件中的附件发送给其他人，则必须选择`转发`选项。（请注意，选择`回复`和`全部回复`选项不会在发件中包含原始邮件的附件。）


  与使用`回复`一样，首先点击右上角的`圆箭头`图标，然后从按钮下拉列表中选择`转发`。


  系统可能会提示你选择是否要包含原始邮件中的附件（如果有的话）。


  此时，按照前面介绍的相同步骤输入邮件内容、添加收件人并发送。


  '
- "# 打印邮件\n\n现在，只要你拥有兼容 Apple `AirPrint`的打印机，或者可以接收电子邮件并打印附件的打印机，就可以从 iPad 上打印邮件。在本节中，我们将向你展示如何使用\
  \ Apple 的`AirPrint`打印邮件。以下是出版时`AirPrint`兼容打印机的列表（见表 14-1）。我们的测试使用的是 HP Photosmart\
  \ e-AiO (D110a) 打印机。\n\n**表 13–1.** *`AirPrint` 兼容打印机列表*\n\n| HP Envy eAll-in-One\
  \ 系列 (D410) | HP LaserJet Pro CM1415fnw 彩色多功能打印机 |\n| HP Photosmart Plus e-AiO (B210)\
  \ | HP LaserJet Pro CP1525n 彩色打印机 |\n| HP Photosmart Premium e-AiO (C310) | HP LaserJet\
  \ Pro CP1525nw 彩色打印机 |\n| HP Photosmart Premium Fax e-AiO (C410) | HP Officejet\
  \ 6500A e-AiO |\n| HP Photosmart e-AiO (D110) | HP Officejet 6500A Plus e-AiO |\n\
  | HP Photosmart Wireless e-AiO (B110)—欧洲和亚太地区 | HP Officejet 7500A 宽幅面 e-AiO |\n\
  | HP Photosmart eStation (C510) | HP Officejet Pro 8500A e-AiO |\n| HP LaserJet\
  \ Pro M1536dnf 多功能打印机 | HP Officejet Pro 8500A Plus e-AiO |\n| HP LaserJet Pro CM1415fn\
  \ 彩色多功能打印机 | HP Officejet Pro 8500A Premium e-AiO |\n\n## 第 1 步：将 AirPrint 兼容打印机连接到网络\n\
  \n在向打印机发送打印任务之前，你需要将其连接到与 iPad 相同的无线 Wi-Fi 网络。Wi-Fi 网络安全设置各不相同，因此本书未提供详细步骤。请使用打印机随附的说明将其连接到网络。\n\
  \n## 第 2 步：从 iPad 打印\n\n打印操作简单直观。请按以下步骤操作：\n\n1.  打开你要打印的邮件。\n2.  点击右上角的`圆箭头`图标，然后选择`打印`。\n\
  \n    ![images](img/p339-01.jpg)\n\n3.  点击`打印机`，从网络中选择你的打印机。（此操作只需执行一次，因为 iPad 会记住你的选择。）\n\
  \n    ![images](img/p339-02.jpg)\n\n4.  选择后，打印机名称将显示出来。使用`加号` (+) 和`减号` (-) 按钮调整打印份数。\n\
  5.  准备就绪后，点击`打印`，文档将通过无线网络在打印机上打印出来。\n\n![images](img/p340-01.jpg)\n\n## 查看正在打印的文档\n\
  \n你可以使用`打印中心`应用查看正在打印的文档状态。请按以下步骤操作：\n\n1.  双击`主屏幕`按钮，直到屏幕底部出现灰色的应用程序图标栏（多任务窗口）。\n\
  2.  你可以看到正在进行的打印作业，如果需要，还可以点击`取消打印`按钮停止打印。\n\n![images](img/p340-02.jpg)\n\n"
- '# 编写新邮件


  在任何邮件界面中，点击右上角的`编写`图标，即可开始撰写新邮件。


  ![images](img/p341-01.jpg)




  ### 指定收件人


  根据收件人是否在你的 iPad `通讯录`中，你有几种选择收件人的方式：


  **选项 1**：输入某人名字的几个字母，然后按`空格`键，再输入此人姓氏的几个字母。此人的名字应会出现在列表中；轻点该名字即可选择此联系人。


  ![images](img/p341-02.jpg)


  **选项 2**：输入一个电子邮件地址。注意键盘上的`@`和`句号`（`.`）键，它们有助于你的输入。


  **提示：** 按住`句号`键可以查看 `.com`、`.edu`、`.org` 以及其他电子邮件域名后缀。


  ![images](img/p342-01.jpg)


  **选项 3**：轻点`加号`（`+`）![images](img/plus.jpg) 以查看完整的`通讯录`列表，然后搜索或从中选择一个名字。


  如果你想使用不同的联系人群组，请轻点左上角的`群组`按钮。


  ![images](img/p342-02.jpg)


  ### 删除收件人


  如果需要从收件人列表（`收件人:`、`抄送:` 或 `密送:`）中删除某个名字，请轻点该名字以选中它![images](img/p342-03.jpg)，然后按`退格`键![images](img/p342-04.jpg)。


  **提示：** 如果你想删除最后一个输入的收件人（且光标位于该名字旁边），请按一次`删除`键以高亮该名字，再按一次即可将其删除。


  ### 添加抄送或密送收件人


  ![images](img/p343-01.jpg) 若要添加`抄送:`(`Cc:`) 或`密送:`(`Bcc:`) 收件人，你需要轻点电子邮件顶部`收件人:`字段正下方的`抄送:/密送:`字段。这样做会打开所轻点的字段。


  ![images](img/p343-02.jpg)


  ### 更改发送邮件的账户


  如果你设置了多个电子邮件账户，iPad 将使用被设为默认账户的账户。（此项在`设置` -> `邮件、通讯录、日历` -> `默认账户`中设置，位于`邮件`部分的底部。）


  请按照以下步骤更改发送邮件的账户：


  1.  轻点电子邮件的`发件人:`字段以将其高亮。

  2.  轻点一个新的电子邮件账户以将其选中。


  ![images](img/p343-03.jpg)


  ### 输入主题


  现在你需要为电子邮件输入一个主题。请按照以下步骤操作：


  1.  触摸`主题:`行，并为电子邮件的`主题:`字段输入文本。

  2.  按`回车`键或轻点电子邮件的`正文`区域，将光标移至`正文`部分。


  ![images](img/p343-04.jpg)


  ### 输入邮件内容


  现在光标位于电子邮件的正文中（主题行下方），你可以开始输入你的电子邮件内容。


  ### 电子邮件签名


  默认的电子邮件签名显示在右侧的图片中：`发自我的 iPad`。


  **提示：** 你可以将此签名更改为任何你想要的内容；请参阅本章后面的“更改电子邮件签名”部分。


  ![images](img/p344-01.jpg)


  **提示：** 如果你的手比较大，键盘更大时可能更容易输入。一旦你习惯了用双手在大键盘上输入，你会发现这比用一根手指输入快得多。同时，你还会看到自动大写和自动更正功能。了解更多输入技巧，请参阅第
  2 章：“输入技巧、复制/粘贴与搜索”以获取更多输入技巧。


  ### 发送邮件


  输入完邮件内容后，轻点右上角的蓝色`发送`按钮。你的邮件将被发送，并且你应该会听到 iPad 的发送邮件声音，这确认了你的邮件已发送。你可以在第 7 章：“个性化设置和保护你的
  iPad”中的“调整 iPad 声音”部分了解如何启用或禁用此声音。


  ![images](img/p344-02.jpg)


  ### 保存为草稿以便稍后发送


  如果你尚未准备好发送邮件，但想将其保存为草稿以便稍后发送，请按照以下步骤操作：


  1.  按照之前所述，撰写你的邮件。

  2.  按下左上角的`取消`按钮。

  3.  选择屏幕底部的`保存草稿`按钮。


  ![images](img/p345-01.jpg)


  稍后，当你想要找到并发送草稿邮件时，请按照以下步骤操作：


  1.  打开撰写该邮件所用的电子邮件账户中的`草稿`文件夹。有关进入`草稿`文件夹的帮助，请参阅本章前面的“在邮件文件夹中导航”部分。

  2.  轻点`草稿`文件夹中的电子邮件以将其打开。

  3.  轻点邮件中的任意位置以进行编辑。

  4.  轻点`发送`按钮。


  ### 检查已发送邮件


  ![images](img/p345-02.jpg)


  请按照以下步骤确认邮件是否正确发送：


  1.  轻点左上角的`电子邮件账户名称`按钮，以查看你刚刚用于发送邮件的账户的邮件文件夹。

  2.  轻点`已发送`文件夹。

  3.  确认列表中你看到的第一封邮件就是你刚刚撰写并发送的那一封。


  **注意：** 只有当你在 iPad 上实际发送或删除了该账户的邮件时，你才会看到`已发送`和`废纸篓`文件夹。如果你的电子邮件账户是 IMAP 账户，你可能会看到比本章描述的更多文件夹。


  ## 处理电子邮件附件


  有些电子邮件附件会被 iPad 自动打开，以至于你甚至没有注意到它们是附件。这些附件的示例包括 Adobe 的可移植文档格式（`PDF`）文件（由`Adobe
  Acrobat`和`Adobe Reader`等应用程序使用）以及某些类型的图像、视频和音频文件。你可能还会收到其他类型的文档作为附件，例如 Apple 的`Pages`、`Numbers`和`Keynote`文件，或者
  Microsoft 的`Word`、`Excel`和`PowerPoint`文件。这些文件需要你手动打开。


  **注意：** 你可以使用`快速查看`功能预览许多类型的文件——例如文字处理和电子表格文档。但是，如果你想要编辑文件，则需要使用`在...中打开`功能，在允许编辑的应用程序中打开它。


  ### 识别何时有附件


  任何带有附件的电子邮件都会在发件人姓名旁边有一个小的`回形针`图标，如右侧所示。当你看到该图标时，就知道其中包含附件。


  ![images](img/p346-01.jpg)


  ### 接收自动打开的附件


  现在假设你收到了一些图片或一个单页的 PDF 文件。（多页 PDF 文件需要你轻点才能打开。）


  当你打开带有此类附件的邮件时，你会直接在邮件正文下方看到它。


  在这个示例中，邮件附带了若干张自动打开的图片。我们只需向下滑动即可查看所有图片。


  ![images](img/p347-01.jpg)


  ### 保存收到的图片


  假设你喜欢收到的一张或多张图片。为了将图片保存到你的 iPad，请长按任意图片，直到出现一个弹出窗口。


  在这个示例中，我们有四张图片，因此我们看到`存储图像`、`存储 4 张图像`和`拷贝`。


  这些图像将存放在你的`照片`应用程序中的`已存储的照片`相册中。有关`照片`应用程序的更多信息，请参阅第 16 章：“iPad 摄影”。


  ![images](img/p347-02.jpg)




  '
- '# 打开邮件附件


  其他类型的附件（如电子表格、文字处理文档和演示文稿文件）不会像我们刚刚描述的那样直接在邮件正文中打开，而需要手动打开。


  ## 轻点进入“`Quick Look`（快速查看）”模式


  请按照以下步骤在“`Quick Look`（快速查看）”模式下打开附件：


  1. 打开带有附件的邮件（参见图 13–8）。

  2. 快速轻点附件，即可立即在“`Quick Look`（快速查看）”模式下打开它。你可以在文档中自由导航。请记住，你可以进行缩放以及向上或向下滑动屏幕。

  3. 如果你打开一个包含多个标签页或工作表的电子表格，你会看到顶部有标签页。触摸另一个标签页即可打开该工作表。

  4. 查看完附件后，轻点文档一次以调出控件，然后轻点左上角的`Done`（完成）。

  5. 如果你安装了能够打开当前所查看附件类型（本例中为电子表格）的应用，那么你会看到右上角出现一个`Open In`（在...中打开）按钮。轻点`Open In`（在...中打开）按钮，即可在另一个应用中打开此文件。


  ![images](img/1308.jpg)


  **图 13–8.** *通过轻点附件快速查看*


  ## 在其他应用中打开文档


  你可能希望在其他应用程序中打开附件。例如，你可能想在`iBooks`、`Stanza`或`GoodReader`中打开一个`PDF`文件。请按照以下步骤操作：


  1. 打开邮件。

  2. 长按附件，直到出现弹出窗口。

  3. 选择`Open In`（在...中打开）选项。

  4. 从列表中选择你想使用的应用程序（参见图 13–9）。

  5. 最后，你可以编辑文档、保存它，并通过电子邮件将其回复给发件人。


  ![images](img/1309.jpg)


  **图 13–9.** *在其他应用中打开和查看附件*


  ## 查看视频附件


  你可能会收到以附件形式发送的视频邮件。某些类型的视频可以在你的 iPad 上观看（有关支持的视频格式列表，请参阅本章后面的“支持的电子邮件附件类型”部分）。请按照以下步骤打开视频附件：


  1. 轻点视频附件以打开它，并在视频播放器中观看。

  2. 观看完视频后，轻点屏幕以调出播放器控件。

  3. 轻点左上角的`Done`（完成）按钮，返回邮件。


  '
- "# 打开和查看压缩的`.zip`文件\n\n除非你安装了诸如`GoodReader`之类的应用程序，否则你的 iPad 将无法打开和查看`.zip`格式的压缩文件。在本书出版时，`GoodReader`仍然是一个免费应用程序，非常值得安装。请按照以下步骤使用`GoodReader`：\n\
  \n**提示：** 你将学习如何安装和使用`GoodReader`，详见第 26 章：“新媒体：阅读报纸、杂志等。”\n\n1. 从 App Store 安装免费的`GoodReader`。\n\
  2. 打开带有`.zip`文件附件的邮件。\n3. 长按`.zip`附件，直到屏幕底部出现一个带有“`Open in GoodReader`（在 GoodReader\
  \ 中打开）”字样的按钮的弹出窗口。轻点该按钮，即可在`GoodReader`中打开`.zip`文件。\n\n    ![images](img/p350-01.jpg)\n\
  \n    **注意：** 不要只是快速轻点附件来打开它。在本书出版时，这样做会导致出现空白白色或黑色屏幕，并且没有任何反应。请确保长按附件，直到看到按钮弹出。\n\
  \n4. 此时`GoodReader`应该会打开，你的`.zip`文件应位于文件列表的顶部。要打开或解压`.zip`文件，请轻点该文件并选择`Unzip`（解压）按钮。\n\
  \n    ![images](img/p350-02.jpg)\n\n5. 现在你应该能看到解压后的文件——在本例中，是一个 Adobe `.pdf`文件，位于`.zip`文件上方的文件列表中。\n\
  6. 轻点该解压后的文件即可查看它。\n\n    ![images](img/p351-01.jpg)\n\n7. 阅读完附件后，双击你的`Home`（主屏幕）按钮，然后轻点`Mail`（邮件）图标，返回阅读你的电子邮件。\n\
  \n"
- '# 打开邮件附件时遇到的问题


  某些类型的附件无法在你的 iPad 上打开。此类附件会显示一个`Question Mark`（问号）（`?`）图标。在此图中，我们尝试点击一个类型为`winmail.dat`的附件，但失败了。


  ![images](img/p351-02.jpg)


  ## 支持的电子邮件附件类型以及音频/视频格式


  你的 iPad 支持以下文件类型作为附件：


  - `.doc`和`.docx`（`Microsoft Word`文档）

  - `.htm`和`.html`（网页）

  - `.key`（`Keynote`演示文稿文档）

  - `.numbers`（`Apple Numbers`电子表格文档）

  - `.pages`（`Apple Pages`文档）

  - `.pdf`（Adobe 可移植文档格式，用于`Adobe Acrobat`和`Adobe Reader`等程序）

  - `.ppt`和`.pptx`（`Microsoft PowerPoint`演示文稿文档）

  - `.txt`（文本文件）

  - `.vcf`（联系人文件）

  - `.xls`和`.xlsx`（`Microsoft Excel`电子表格文档）

  - `.mp3`和`.mov`（音频和视频格式）

  - `.zip`（压缩文件）。请注意，只有在你安装了能够读取这些文件的应用（例如`GoodReader`）时才能读取（参见本章中的“打开和查看压缩的 .zip
  文件”部分）。


  你的 iPad 还支持以下音频格式：


  - HE-AAC (V1)

  - AAC（16 至 320 Kbps）

  - 受保护的 AAC（来自 iTunes Store）

  - MP3（16 至 320 Kbps）

  - MP3 VBR

  - Audible（格式 2、3 和 4）

  - Apple Lossless

  - AIFF

  - WAV


  你的 iPad 还支持以下视频格式：


  - H.264 视频，最高可达 720p，每秒 30 帧

  - Main Profile level 3.1，搭配最高 160 Kbps、48kHz 的 AAC-LC 音频

  - `.m4v`、`.mp4`和`.mov`文件格式中的立体声音频

  - MPEG-4 视频，最高可达 2.5 Mbps，分辨率 640 x 480 像素，每秒 30 帧

  - Simple Profile，搭配最高 160 Kbps、48kHz 的 AAC-LC 音频，`.m4v`、`.mp4`和`.mov`文件格式中的立体声音频

  - Motion JPEG (M-JPEG)，最高可达 35 Mbps，分辨率 1280 x 720 像素，每秒 30 帧，音频格式为 ulaw

  - `.avi`文件格式中的 PCM 立体声音频


