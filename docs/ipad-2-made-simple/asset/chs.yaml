- '# 切换照片


  使用滑动手势可以在照片之间切换。只需在屏幕上向左或向右滑动手指，即可浏览照片。


  **提示**：缓慢拖动手指可以更渐进地浏览照片库。


  ![images](img/p423-01.jpg)


  当浏览到相册末尾时，轻点一次屏幕，左上角会出现一个显示相册名称的标签。点击该标签，即可返回该相册的缩略图页面。


  ![images](img/p423-02.jpg)


  要返回主相册页面，请点击屏幕顶部的**相簿**按钮。


  ![images](img/p423-03.jpg)


  ## 使用缩略图栏切换照片


  除了左右滑动切换照片，你也可以调出屏幕上的软键控件。操作方法是：只需轻点一次屏幕。再次点击则隐藏软键。


  在屏幕最底部，你会看到一个小的**缩略图**栏，你可以用手指在其上轻轻滑动（见图 16–4）。使用此栏可快速浏览整个相册。你也可以直接点击某个缩略图来查看对应的照片。


  ![images](img/1604.jpg)


  **图 16–4.** *使用**缩略图**栏浏览照片。*


  '
- '# 放大和缩小照片


  在 iPad 上有两种方法可以放大和缩小照片：双击和捏合。


  ## 双击


  顾名思义，*双击*就是在屏幕上快速点击两下以放大照片，如图 16–5 所示。你会放大到双击的位置。要缩小，只需再次双击。


  有关双击的更多帮助，请参阅第 1 章“入门指南”。


  ![images](img/1605.jpg)


  **图 16–5.** *双击照片进行缩放*


  ## 捏合


  同样在第 1 章“入门指南”中有所描述，*捏合*是一种更为精确的放大方式。双击只能放大或缩小到固定级别，而捏合允许你只放大或缩小一点，或放大、缩小很多。


  要进行捏合操作，将拇指和食指并拢，然后在接触屏幕的同时慢慢分开它们，使图片变大。要缩小，则将拇指和食指分开，然后合拢。


  **注**：一旦你通过任意方法启用了缩放功能，在将照片恢复为标准尺寸之前，你将无法轻松地在照片之间滑动浏览。


  '
- '# 观看幻灯片


  如果你愿意，可以将相册中的照片以幻灯片形式播放。只需轻点一次屏幕以调出屏幕软键。右上角有一个**幻灯片显示**按钮——点一下即可开始播放幻灯片。你可以从**照片图库**界面或正在查看的任何照片开始播放幻灯片。


  ![images](img/p426-01.jpg)


  **幻灯片显示选项**允许你调整每张照片在屏幕上停留的时间。它还可以让你选择音乐、过渡效果及其他设置，如图 16–6 所示。要结束幻灯片，只需轻点屏幕。


  ![images](img/1606.jpg)


  **图 16–6.** *配置幻灯片*


  ## 调整幻灯片显示选项


  ![images](img/p427-01.jpg)


  要配置幻灯片，你需要更改设置。操作方法是：在**主屏幕**上点击**设置**图标。


  向下滚动到**照片**选项卡并点击屏幕。随后你将看到可用的各种选项，包括四个可针对幻灯片进行调整的选项。


  ![images](img/p427-02.jpg)


  要指定每张幻灯片的播放时长，请点击**每张幻灯片播放时间**选项卡。你可以选择 2 到 20 秒之间的范围。


  ![images](img/p427-03.jpg)


  如果你希望幻灯片中的照片重复播放，只需将**重复**开关拨到**开启**。


  如果你希望照片以不同于列表顺序的方式播放，请选择**随机播放**。与音乐播放器中的**随机播放**命令类似，此选项将使照片以随机顺序播放。


  ![images](img/p428-01.jpg)


  '
- '# 将照片用作 iPad 墙纸


  有关如何选择并使用照片作为 iPad 墙纸（以及更多墙纸选项）的信息，请参阅第 7 章“个性化和保护你的 iPad”。


  **注**：你可以为主屏幕和锁定屏幕设置不同的照片，或对两者使用相同的照片。


  ## 通过电子邮件发送照片


  只要你有活跃的互联网连接（见第 5 章“Wi-Fi 和 3G 连接”），就可以通过电子邮件发送照片集中的任何照片。点击顶部图标栏上的**选项**按钮——通常是最右边那个（如果已启用**AirPlay**，则是右边第二个）。如果看不到图标，请轻点一次屏幕。


  ![images](img/p429-01.jpg)


  选择**电子邮件照片**选项，**邮件**应用将自动启动（见图 16–7）。


  ![images](img/1607.jpg)


  **图 16–7.** *通过电子邮件发送照片*


  像在第 13 章“iPad 上的电子邮件”中那样，点击**收件人**字段，然后选择接收照片的联系人。点击**蓝色 +** 按钮可添加联系人。


  输入主题和消息，然后点击右上角的**发送**。操作就这么简单。


  ![images](img/p430-01.jpg)


