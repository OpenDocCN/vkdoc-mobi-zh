  \ **全部导入** 按钮。\n4. 要导入选定的照片，请先轻点照片进行选择。然后轻点 **导入** 按钮并选择 **导入所选项目**。\n5. 随后，你可以选择**保留**或**删除**相机或\
  \ SD 卡上的照片。\n6. 最近导入的照片将显示在**最近导入**相簿中。所有导入的照片将显示在**已导入**相簿中。\n\n![images](img/p31-01.jpg)\n\
  \n**图 17.** *使用相机连接套件导入照片。*\n\n"
