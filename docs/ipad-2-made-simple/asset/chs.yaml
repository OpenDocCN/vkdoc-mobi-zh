- "# 整理你的 iPad 图标与文件夹\n\n你的新 iPad 具有很高的可定制性。在本章中，我们将向你展示如何移动图标，并把你最常用的应用放在你想要的位置。你最多可以使用\
  \ 11 页图标，并且可以调整这些页面的外观和感觉，使其符合你的品味。\n\n与 Mac 电脑或 iPhone 一样，iPad 有一个*底部程序坞*，你可以在其中放置最常用应用的图标。你的\
  \ iPad 底部程序坞中预设有四个标准图标，但你可以将其替换为其他图标，这样你最常用的应用就能始终显示在屏幕底部。你还可以再添加两个图标，使底部程序坞总共容纳六个项目。你甚至可以将整个应用文件夹移动到底部程序坞。\n\
  \n**提示**：你也可以使用电脑上的 iTunes 移动或删除图标。更多信息请参阅第 29 章：“你的 iTunes 用户指南”。\n\n### 将图标移至底部程序坞——停靠图标\n\
  \n当你打开 iPad 时，会注意到底部程序坞中锁定了四个图标：`Safari`、`Mail`、`Photos`和`iPod`。\n\n你的图标可能有所不同，但你可以轻松更改。\n\
  \n假设你决定将一个或多个现有图标替换为更常用的应用。幸运的是，将图标移入或移出底部程序坞非常简单。\n\n你也可以保留这四个标准图标，再添加两个，使`底部程序坞`中共有六个图标。\n\
  \n![图片](img/p200-01.jpg)\n\n#### 开始移动\n\n按下`主屏幕`按钮返回`主屏幕`。然后，按住`主屏幕`上的任意图标几秒钟。你会注意到所有图标开始晃动。\n\
  \n先尝试移动几个图标。你会发现，当你将某个图标向下移动时，该行中的其他图标会为其让出空间。\n\n当你掌握了图标的移动方式后，就可以用选中的图标替换底部程序坞中的某个图标了。在图标晃动时，将你想要替换的底部程序坞图标向上移动到一个被其他图标覆盖的区域。如果将其移动到大片空白区域，它会跳回程序坞。\n\
  \n**注：** 底部程序坞最多可容纳六个图标；如果已有六个图标，则必须移除一个才能用新图标替换。\n\n假设你想用`App Store`图标替换标准的`iPod`图标。首先，按住`音乐`图标并将其向上移动一行——移出底部程序坞，如图\
  \ 6-1 所示。\n\n要停止图标晃动，请轻点`主屏幕`按钮。\n\n![图片](img/0601.jpg)\n\n**图 6-1.** *在底部程序坞中交换图标*\n\
  \n接下来，找到你的`App Store`图标并将其移到底部程序坞。移动时，图标会变得半透明，直到你将其安放到位。\n\n确定图标位置无误后，再次按下`主屏幕`按钮，图标便会锁定到位。现在，你想要的`App\
  \ Store`图标就出现在底部程序坞中了。\n\n\n\n#### 将图标移动到其他页面\n\niPad 每个页面可容纳 20 个图标（不包括程序坞），你可以通过在**主屏幕**上*向右滑动*来找到这些页面。有了这么多酷炫的\
  \ App，拥有五页、六页甚至更多页图标的情况并不少见。如果你喜欢冒险，最多可以填满 11 页图标！\n\n**注意**：你也可以在任何屏幕（**主屏幕**除外）上从左向右滑动。在**主屏幕**上，从左向右滑动会进入**聚焦搜索**；更多信息请参见第\
  \ 2 章：“输入技巧、拷贝/粘贴与搜索”。\n\n假设你的第一页上有一个很少使用的图标，你想把它移到最后一页。或者，你可能想将经常使用的 App 图标从图标页面的最后一页交换到第一页。这两项操作都非常简单；在页面间移动图标与将图标移动到底部程序坞非常相似。请按照以下步骤在页面间移动图标：\n\
  \n1.  长按任意图标以启动移动过程。\n2.  长按你想要移动的图标。例如，假设你想将 **iBooks** 图标移动到第一页（请参见图 6-2）。\n\n\
  \    ![images](img/0602.jpg)\n\n    **图 6-2.** *将图标从一个页面移动到另一个页面*\n\n3.  现在将图标拖放到另一个页面。为此，请长按\
  \ **iBooks** 图标并将其拖向右侧，你将看到图标页面逐个移动。当到达第一页时，松开图标。这样就能将其放置在最开始的位置。\n4.  按下**主屏幕**键以完成移动并停止图标抖动。\n\
  \n#### 删除图标\n\n小心——删除图标和移动图标一样简单。然而，当你在 iPad 上删除一个图标时，实际上是在删除它代表的程序。这意味着，如果不重新安装或重新下载，你将无法再使用该程序。\n\
  \n**注意**：你可以设置家长控制（**设置**中的**访问限制**）来防止意外删除 App。如果你有把删除 App 当成有趣游戏的小孩，这个功能会非常方便。\n\
  \n根据你在 iTunes 中的**应用同步**设置，该程序可能仍会保留在 iTunes 的**应用**文件夹中。在这种情况下，如果你想要重新安装已删除的 App，只需在\
  \ iTunes 的同步应用列表中勾选该应用即可轻松实现。如果没有，你也可以随时从同一账户免费将其下载到你的设备上。\n\n如图 6-3 所示，删除过程与移动过程类似。长按任意图标以启动删除过程。和之前一样，长按会使图标抖动，这样你就可以移动或删除它们。\n\
  \n**注意**：你只能删除已下载到 iPad 上的程序；预装的图标及其关联程序无法删除。你可以通过图标左上角是否有一个小小的黑色 **x** 来判断哪些程序可以被删除，可以删除的图标包含这个标记。\n\
  \n只需点击你想要删除的图标上的 **x**。系统会提示你删除或取消删除请求。如果你选择**删除**，该图标及其关联的应用将从你的 iPad 上移除。\n\n\
  ![images](img/0603.jpg)\n\n**图 6-3.** *删除图标及其关联的程序*\n\n## 第 7 章\n\n## 个性化与保护你的 iPad\n\
  \n在本章中，你将学习一些个性化设置 iPad 的好方法，以及如何通过密码保护你的 iPad 的安全性。例如，你将学习如何下载一些精美的免费壁纸，并为你的**锁定**屏幕和**主屏幕**更换壁纸。你将学习如何通过调整设置来个性化\
  \ iPad 发出的声音，比如在接收或发送邮件、锁定 iPad、使用键盘打字，或日历事件提醒前是否听到声音。你还将学习如何自定义**相框**设置（这是一个在设备锁定状态下显示照片的应用）。你可以调整显示时长、过渡效果，甚至选择显示哪些相簿中的照片。iPad\
  \ 的许多方面都可以进行微调以满足你的需求和品味，让你的 iPad 更具个性化的外观和感受。\n\n### 更改锁定屏幕和主屏幕壁纸\n\n实际上，你可以通过更换壁纸来个性化\
  \ iPad 上的两个屏幕。\n\n第一个是**锁定**屏幕，在你首次开启或唤醒 iPad 时出现。此屏幕的壁纸图像显示在“滑动来解锁”滑块栏的后方。\n\n\
  第二个是**主屏幕**。其壁纸显示在图标的后方。\n\n你可以使用 iPad 自带的壁纸图片，也可以使用你自己的图片。\n\n**提示：** 你可能会希望**锁定**屏幕的壁纸比**主屏幕**的壁纸更少个人色彩。例如，您可以选择将一张通用的风景图片放在**锁定**屏幕上，而将一张亲人的照片放在**主屏幕**上。\n\
  \n在 iPad 上更换壁纸有几种方法。第一种方法，从设置中更换壁纸，非常简单直接。\n\n#### 从设置中更换壁纸\n\n触摸**设置**图标，然后触摸左侧栏中的**显示与亮度壁纸**标签。亮度和壁纸的设置选项将出现在右侧栏中。\n\
  \n要开始选择壁纸，请触摸屏幕右侧**壁纸**下当前选定壁纸的图片，如图 7-1 所示。\n\n![images](img/0701.jpg)\n\n**图 7-1.**\
  \ *从**设置**图标更换壁纸*\n\n在屏幕右侧（见图 7-1 中的右图），你会看到一些相簿或图片文件夹。你有以下几种选择：\n\n*   点击顶部的**壁纸**标签，查看\
  \ iPad 的所有预载壁纸图片。\n*   点击**已存储的照片**相簿，其中包含你从网页保存的任何图片、截图（同时按住**主屏幕**按钮和**电源/睡眠**键获得），甚至包括从壁纸应用或使用\
  \ iPad 相机拍摄的照片。\n*   点击**已存储的照片**下方显示的任何相簿。只有当你从 iTunes 同步了照片时，这些额外的相簿才会可见。\n\n\
  点击任意相簿后，你将看到该相簿中的所有图片，如图 7-2 所示。\n\n点击相簿中的任意图片，即可在全屏模式下查看。\n\n在全屏预览图片时，你可以执行以下操作：\n\
  \n*   通过双指捏合或张开进行缩放。\n*   如果不喜欢该图片，点击**取消**按钮返回相簿。\n*   点击**设定锁定屏幕**按钮，仅将该图片设定为**锁定**屏幕。\n\
  *   点击**设定主屏幕**按钮，仅将该图片设定为**主屏幕**。\n*   点击**同时设定**按钮，将该图片同时设定为**锁定**和**主**屏幕。\n\n\
  ![images](img/0702.jpg)\n\n**图 7-2.** *从相簿中选择一张图片来更换你的壁纸。*\n\n\n\n"
- '# 从任意图片更换壁纸


  第二种更换壁纸的方法是在**照片**图库中查看任意图片，并将其设为壁纸。


  轻点**照片**图标即可开始。如需了解更多关于处理照片的信息，请参阅第 16 章：“iPad 摄影”。


  ![images](img/p208-01.jpg)


  轻触你想翻阅以寻找壁纸的相簿。


  当你找到想要使用的照片时，轻触它。照片将在屏幕上打开。


  预览图片后（参见图 7-3），轻点屏幕右上角的**设为**图标 ![images](img/p208-02.jpg)，然后选择**用作壁纸**。按需缩放图片，然后将其设为**锁屏**或**主屏幕**壁纸（或两者同时设置），操作如上所述。


  ![images](img/0703.jpg)


  **图 7-3.** *从**照片**应用开始，将现有照片或图片用作壁纸。*


  如果你决定改用其他图片，请选择**取消**并另选一张。


  '
- '# 从免费应用下载精美壁纸


  前往 App Store 搜索**壁纸**（更多信息请参阅第 20 章：“App Store”）。你会发现许多专为 iPad 设计的免费或低价应用。我们喜欢的一款应用叫做
  **壁纸高清**，它拥有数百张精美的壁纸图片，你可以免费下载到 iPad 上。


  **注意：** 使用**壁纸高清**，就像大多数壁纸应用一样，你需要一个实时的互联网连接——无论是 Wi-Fi 还是 3G。由于图片文件通常较大，除非你拥有不限流量的
  3G 数据套餐，否则建议使用 Wi-Fi。


  '
- '# 调整 iPad 的声音


  你可以精细调节 iPad，使其在收到新邮件、发送邮件、日历闹钟响铃、键盘点击或 iPad 锁定时发出或不发出声音。要调整声音，请按以下步骤操作：


  1.  轻点**设置**图标。

  2.  在左侧栏中轻点**通用**。

  3.  在右侧栏中轻点**声音**。

  4.  轻点任意开关，以打开或关闭相应事件发生时的声音。


  ![images](img/p210-01.jpg)


  **提示：** 要使用 iPad 侧边的**音量**按钮调节提醒音量，只需将**用按钮调整**下的开关拨到**开**的位置。


  '
- '# 个性化你的相框


  **相框** 是一款能在锁定 iPad 上播放照片幻灯片的应用。我们将介绍多种自定义显示方式。


  ## 启动或停止相框应用


  你可能已经注意到，当 iPad 锁定时，**滑动来解锁**滑块旁边有一个小图标。这就是**相框**图标。


  轻点此图标即可开启电子相框。


  再次轻点此图标可将其关闭。


  **相框**会循环播放你所有的照片，或者你也可以进行自定义，只显示选定的相簿。


  ![images](img/p211-01.jpg)


  **警告：** 如果你的 iPad 上存有私人照片，而**相框**在**锁定**模式下意外显示了这些照片，可能会非常尴尬。本节将向你展示如何限制用于幻灯片的相簿。


  **注意：** 你可以通过在 iPad 上设置密码安全锁来禁用**相框**。我们将在本章稍后部分介绍具体方法。


  ## 自定义你的相框


  根据 iPad 上存储的照片类型，你很可能需要设置**相框**仅显示你想要的相簿或照片。请按以下步骤操作：


  1.  轻点**设置**图标。

  2.  在左侧栏中轻点**相框**。现在，你可以调整相框的各种设置（参见图 7-4）。

  3.  如果你希望屏幕每次只显示一张照片，请选择**溶解**。如果你希望同时显示两到四张图片，请选择**折叠**。**折叠**模式会在屏幕上显示两到四张图片，并使它们像折纸一样相互折叠。

  4.  **放大面部**选项仅在选择了**溶解**过渡效果时才可选。这是一个很酷的功能，它会放大单张照片中检测到的任何人脸。

  5.  如果你希望**相框**随机显示选定的照片，请将**随机播放**设为**开**。

  6.  如果你希望所有照片都包含在幻灯片中（默认设置），请选择**所有照片**。

  7.  人们通常希望保留一些照片的私密性。为此，请选择**相簿**，然后轻点或勾选你想要包含的相簿。（勾选标记表示该相簿将被包含在内。）


  ![images](img/0704.jpg)


  **图 7-4.** *选择如何自定义**相框***


  **提示：** 要真正掌控**相框**的显示内容，请在电脑上创建一个相簿，只放入你愿意在设备解锁时让所有人看到的图片。然后，使用 iTunes 将该相簿同步到你的
  iPad。如需帮助，请参阅第 3 章：“使用 iTunes 同步你的 iPad”。


  '
- '# 键盘选项


  你可以通过选择不同语言以及更改**自动纠正**和**自动大写**等设置来精细调节键盘（有关键盘选项及如何使用各项功能，请参阅第 2 章：“输入技巧、拷贝/粘贴与搜索”）。


  '
- "# 如何使用密码保护 iPad 安全\n\n你的 iPad 可以存储大量有价值的信息。如果你保存了家人的社会安全号码和生日等信息，这一点尤其重要。确保任何拿起你\
  \ iPad 的人都无法访问所有这些信息是个好主意。此外，如果你的孩子像我们的一样，他们可能会拿起你酷炫的 iPad 开始上网或玩游戏。你可能希望启用一些安全限制来保护孩子的安全。\n\
  \n## 设置密码锁定 iPad\n\n轻点**设置**图标，然后轻点左侧栏中的**通用**选项卡。现在向下滚动，轻点**密码锁定**选项。\n\n在这里，你可以选择设置一个四位数字密码，以防止未经授权访问你的\
  \ iPad 和信息。但是，如果输入了错误的密码，即使是你也无法访问信息。因此，最好使用一个你容易记住的密码，或者将其写下来存放在安全的地方（参见图 7-5）。\n\
  \n使用键盘输入一个四位数字码。然后系统会提示你再次输入密码。\n\n![images](img/0705.jpg)\n\n**图 7-5.** *通过设置密码启用安全保护*\n\
  \n## 密码选项\n\n设置密码后，你将看到以下几个选项：\n\n![images](img/p214-01.jpg)\n\n**关闭密码**\n\n**更改密码**\n\
  \n**需要密码**（立即、1 分钟后、5 分钟后、15 分钟后、1 小时后、4 小时后）\n\n**注意：** 你也可以关闭**简单密码**。这允许你设置一个更长的、更安全的密码，可以包含字母、数字、符号等。\n\
  \n**注意：** 为**需要密码**设置更短的时间更安全。将时间设置为**立即**（默认值）是最安全的选项。然而，使用一分钟的设置可能会让你在意外锁定 iPad\
  \ 时免于重新输入密码的麻烦。\n\n**相框**（默认设置为**开**）：将此选项设为**关**，可防止在**锁定**模式下显示照片。\n\n**抹掉数据**（默认设置为**关**）：如果设为**开**，则在连续十次尝试输入密码失败后，所有数据将被抹除。\n\
  \n**警告：** 如果你有年幼的孩子，他们喜欢在 iPad 从**睡眠**模式唤醒并处于锁定状态时胡乱敲击密码解锁键盘，你可能希望将**抹掉数据**设为**关**。否则，你的\
  \ iPad 可能会频繁被抹掉数据。\n\n\n\n#### 设置内容限制\n\n您可能希望限制孩子在 iPad 上收听带有露骨歌词的音乐，也可能不希望他们访问\
  \ YouTube 或观看您认为不妥的内容。在 iPad 上设置内容限制非常简单。\n\n请再次进入`设置`下的`通用`标签，然后点击`限制`。\n\n您会看到一个写着`启用限制`的大按钮。\n\
  \n点击该按钮后，系统会提示您输入`限制密码`——只需选择一个您能记住的四位数密码即可。\n\n![images](img/p215-01.jpg)\n\n**注意：**\
  \ `限制密码`与您的 iPad 主密码是分开的。您可以将其设置得与主密码相同以便记忆；然而，如果您让家人知道了主密码，但又不想让他们调整限制设置，这样做可能会带来问题。日后关闭限制时，您需要输入此密码。\n\
  \n请注意，您可以使用内容限制来控制某些应用是否允许运行，例如`Safari`、`YouTube`、`iTunes`、`安装应用`或`定位`。\n\n另外，请务必记住：**关闭\
  \ = 已限制**。\n\n您可能会认为**开启**意味着某项功能被限制，但事实恰恰相反。要禁用或限制某项功能，您需要点击其旁边的滑块并将其滑动至**关闭**位置。如果您留意到所有标签上方写着**允许：**这个词，那么这种操作方式就说得通了。\n\
  \n![images](img/p216-01.jpg)\n\n如您所见，您可以限制对`音乐与播客`中歌词的访问，仅允许访问“干净”版本。\n\n您还可以使用基于评级的内容限制，来控制您的\
  \ iPad 上可以播放的`影片`、`电视节目`和`应用`。\n\n在右侧图片的示例中，只有评级不超过 PG-13 的影片才能播放。评级为 R 和 NC-17\
  \ 的影片则无法播放。\n\n## 第 8 章\n\n## 多任务处理与静音/锁定开关\n\n在本章中，我们将介绍如何使用`应用切换器`栏进行多任务处理，或在\
  \ iPad 上的应用之间快速切换。多任务处理是 iPad 上一个非常受欢迎的新功能，这是初代 iPad 发布时所不具备的。这项功能意味着您可以在后台保留一个应用运行的同时，去做其他事情。例如，您可以从游戏中短暂抽身，去\
  \ Facebook 上更新一下状态或在 Twitter 上发条推文，然后再跳回游戏。\n\n`应用切换器`栏还提供了另一项便捷功能，我们将在本章中介绍。在初代\
  \ iPad 上，有一个用于锁定屏幕方向的硬件按钮。当软件更新后，该开关变成了`静音`键。有了新的 iOS 4.3，您可以通过`应用切换器`栏来设定该开关的行为，也可以在`设置`应用中对`锁定/旋转`开关进行调整。\n\
  \n### 多任务处理或应用切换\n\n通过*多任务处理*或*应用切换*，您可以在切换到另一个应用时，让许多应用在后台保持运行，而无需停止当前应用。\n\n**注意：**\
  \ 开发者需要在其应用端实现多任务支持。虽然支持多任务处理的应用和更新每天都在增多，但有些应用仍然不支持，或支持不完全。\n\n**为什么要使用多任务处理？**\
  \ 以下是一些您可能在 iPad 上使用多任务处理的场景：\n\n- 从一个应用（`邮件`）复制粘贴内容到另一个应用（`日历`）。\n- 接听一个`FaceTime`通话或回复一封`电子邮件`，然后无缝跳回正在进行的游戏。\n\
  - 在玩最喜欢的游戏或浏览网页时，继续收听网络电台（如`Pandora`或`Slacker`）。\n- 不再需要等待照片上传到`Facebook`或`Twitter`——它们可以在后台上传，同时您在\
  \ iPad 上做其他事情。\n- 如果您使用`Skype`拨打电话，现在可以让它保持在后台运行以接听来电；这在以前是做不到的。\n- 您还可以在后台保持逐向导航运行，并在通话中或使用其他应用时收听语音指令。与\
  \ VoIP 和流媒体音频一样，导航功能获得了专用的 API。\n\n#### 如何在应用之间切换\n\n要进行多任务处理，您需要调出屏幕底部的`应用切换器`栏。请按以下步骤操作：\n\
  \n1.  在任何应用界面，甚至从`主屏幕`，双击`主屏幕`按钮，即可在屏幕底部调出`应用切换器`（参见图 8–1）。\n2.  所有已打开的应用将显示在`应用切换器`栏上。\n\
  3.  向右或向左滑动以找到您想要的应用，然后点击它。\n4.  如果在`应用切换器`栏上看不到您想要的应用，请按下`主屏幕`按钮，然后从`主屏幕`启动该应用。\n\
  5.  再次双击`主屏幕`按钮，然后点击您刚刚离开的应用，即可跳转回去。\n\n![images](img/0801.jpg)\n\n**图 8–1.** *双击`主屏幕`按钮调出`应用切换器`栏以进行多任务处理*\n\
  \n#### 如何从应用切换器关闭应用\n\n如果您通过单击`主屏幕`按钮退出应用，该应用将在后台继续运行，除非它是一个正在进行的 VOIP 通话、定位/导航应用或某种上传任务。\n\
  \n**注意：** 从技术上讲，任何非 VoIP、流媒体音频和定位类应用都会保存状态并挂起——或者它会先完成诸如上传之类的网络活动，然后保存状态并挂起。但这会占用资源，iOS\
  \ 会在检测到内存不足时关闭应用。如果存在某个失控进程或应用未能被及时终止，从而拖慢 iPad 的内存，手动终止该进程或应用可以解决问题。\n\n有时您需要完全关闭一个应用。例如，您可能会发现\
  \ iPad 运行得比平时稍慢。在这种情况下，完全关闭应用以释放内存是个好主意。请按以下步骤操作：\n\n1.  双击`主屏幕`按钮以调出`应用切换器`栏。\n\
  2.  长按`应用切换器`栏中的任意图标，直到所有图标开始晃动。您会注意到每个图标的左上角出现一个带有减号的`红色圆圈`图标。\n\n    ![images](img/p219-01.jpg)\n\
  \n3.  点击`红色圆圈` ![images](img/p219-02.jpg) 图标即可完全关闭该应用。\n\n**注意：** 以上步骤会终止正在运行的应用或清除保存的状态。通过这种方式关闭的任何应用，下次点击时都必须重新启动。像`邮件`这样的内置应用会自动重启，因此您不会错过任何电子邮件。\n\
  \n\n\n#### iPod 控制与锁定旋转/静音键\n\n在`应用切换器`栏上，您还可以通过从左向右滑动完成另一项操作：查看 iPod 控制和屏幕`方向锁定/静音`图标。\n\
  \n第一代 iPad 仅允许您调整`方向锁定`；但随后的软件更新后，您可以使用`侧边`开关将 iPad 静音。\n\n借助新的 iOS 4.3，您可以将`侧边`开关的功能更改为`锁定旋转`或`静音`。未分配给`侧边`开关的另一个选项将出现在`应用切换器`栏中。\n\
