- "# 《华尔街日报》应用\n\n**《华尔街日报》**应用则采用了不同的方式来提供新闻。应用启动后，系统会提示您创建一个在线账户。\n\n账户创建完成后，您可以查看*《华尔街日报》*的部分内容。\n\
  \n![images](img/p616-01.jpg)\n\n免费账户用户无法访问的内容会标记有一个小的**钥匙** ![images](img/p616-02.jpg)图标，表示该内容被锁定。\n\
  \n如果您完全订阅了**《华尔街日报》**应用，所有文章和工具都可使用。\n\n点击底部的**版块**按钮，可以查看当前报纸的所有版块。\n\n该应用的**主页**顶部显示本周的报纸；在报纸下方，显示**已保存文章、已保存选项**和**我的关注列表**。\n\
  \n在应用的免费版本中，只有最上面一行新闻中的**此刻**版块可以查看。本周的其他所有报纸旁都有**钥匙**图标；如前所述，这表示它们被锁定，只有付费订阅用户才能查看。\n\
  \n![images](img/p617-01.jpg)\n\n没有**钥匙**图标标记的文章供您阅读。点击一篇文章，它就会加载到 iPad 上。\n\n与**《纽约时报》**应用类似，**《华尔街日报》**应用也允许您将屏幕向左滑动以继续阅读文章。\n\
  \n您会注意到，有些文章在通常出现照片的位置嵌入了视频片段。点击视频，它就会直接在报纸内开始播放——这是一个非常酷且富有互动性的功能。\n\n![images](img/p617-02.jpg)\n\
  \n**注意：** 某些应用——比如**《华尔街日报》**应用——兼容**AirPlay**，因此您可以将视频直接发送到电视上（请参阅第 10 章：“观看视频、电视节目及更多内容”）。\n\
  \n## 调整选项：字体大小以及分享、电邮或保存文章\n\n在各种用于阅读报纸和其他内容的应用中，您通常会找到一个更改字体大小的按钮或图标。同一个或附近的按钮也可能允许您分享、保存或将文章电邮给朋友。有些应用允许您将文章分享到社交网络，例如\
  \ Facebook 或 Twitter。\n\n**提示：** 几乎所有报纸或杂志应用都允许您更改字体大小以及电邮或以其他方式分享文章。请寻找标有**工具、选项、设置**或类似字样的按钮或图标。在某些应用中，字体大小调整选项会显示**小写\
  \ A**和**大写 A**图标。\n\n在**《华尔街日报》**应用中，点击右下角的**分享**按钮来分享一篇文章。该应用为您提供了保存或电邮文章的选项：\n\
  \n**电邮文章：** 此选项可将此文章通过电子邮件发送。\n\n**Facebook：** 将文章分享到您的**Facebook**页面。\n\n**Twitter：**\
  \ 将文章链接发布到您的**Twitter**账户。\n\n**《华尔街日报》**应用还为您提供了三种文本大小选择：\n\n![images](img/p618-01.jpg)\n\
  \n* **小号文本**\n* **标准文本**\n* **大号文本**\n\n在**《今日美国》**应用中，**字体大小**和**分享**图标是分开的，如右图所示。\n\
  \n点击**分享**图标可以电邮一篇文章或将其分享到社交网络。\n\n![images](img/p619-01.jpg)\n\n同样，您可以点击**小写 A/大写\
  \ A**图标来调整字体大小。\n\n这样做会弹出一个**滑块**控件，让您可以在小号和大号字体大小之间滑动选择。\n\n![images](img/p619-02.jpg)\n\
  \n点击屏幕上**滑块**控件之外的任意位置即可隐藏该控件。\n\n在**《纽约时报》**应用中，文章屏幕的右下角有一个按钮，允许您调整**设置**。\n\n\
  在此应用及其他应用中，您经常会看到**突发新闻**提示的选项。一旦有重要事件发生并发布到网站，它们会立即向您发送**提醒**通知。\n\n![images](img/p619-03.jpg)\n\
  \n\n\n#### 《今日美国》应用\n\n`USA Today` 应用的外观和感觉与其实体日报非常相似。点击 `USA Today` 图标，你将进入报纸的`首页`。首先映入眼帘的是屏幕顶部一组轮播的报道。\n\
  \n![images](img/p620-01.jpg)\n\n主要报道列在右侧。你可以滚动浏览这些报道；找到想看的报道时，只需点击标题即可。\n\n进入`文章视图`模式后，你可以通过点击右上角的`字体大小`图标来调整字号。你也可以通过点击`分享`图标，然后从下拉列表中选择`电子邮件`来通过邮件发送文章。\n\
  \n如果一篇文章超过一页，你可以向上滚动以继续阅读。从右向左滑动屏幕将跳转到下一篇文章。\n\n![images](img/p620-02.jpg)\n\n**提示：**\
  \ 如果你点击`天气`框，可以通过输入城市名称或邮政编码，将其自定义为本地天气。\n\n要返回`首页`屏幕，请点击左上角的`报纸`图标。\n\n![images](img/p620-03.jpg)\n\
  \n要进入报纸的其他板块，请点击`首页`左上角的`今日美国`图标，然后选择`财经`、`体育`、`生活`、`科技`或`旅游`，即可进入该板块。要返回，请再次点击左上角的同一个图标。\n\
  \n目前使用 `USA Today` 应用无需锁定文章或订阅，但这在未来可能会有所改变。\n\n![images](img/p621-01.jpg)\n\n###\
  \ iPad 上的杂志\n\n众所周知，报纸和杂志的读者数量在过去几年里都有所下降。iPad 提供了一种全新的阅读杂志方式，或许能为这个行业注入所需的活力。\n\
  \n**注意：** 很快，所有现有的杂志应用都需要切换到新的（iOS 4.3）订阅模式。因此，应用内单期购买可能会保留，但很可能会增加订阅选项（有些出版商可能会撤下他们的应用并退出商店）。\n\
  \n在 iPad 上，杂志的图片异常清晰和绚丽。导航通常很简单，报道仿佛跃然纸上——比实体杂志生动得多。想象一下，将视频和声音整合到杂志中，你就会明白 iPad\
  \ 如何真正提升了阅读杂志的体验。\n\n有些杂志，比如《*时代周刊*》，还包含指向实时或频繁更新内容的链接。这些可能被称为`新闻源`、`实时版`或`更新`。请在购买的杂志中留意它们——这些功能将为你提供最新的信息。\n\
  \n**提示：** 在购买杂志或其他应用之前，务必查看用户评分。这样做可以帮你省去一些烦恼和/或金钱！\n\nApp Store 中既有可购买的单独杂志（或可免费查看的有限内容），也有提供多种杂志样张的杂志阅读器，允许你从\
  \ iPad 订阅指定杂志的每周或每月递送。\n\n越来越多的杂志在 App Store 中提供数字版。《*时代周刊*》、《*新闻周刊*》、《*连线*》、《*户外*》、《*GQ*》都有此类版本，而且每天似乎还有更多杂志涌现。\n\
  \n一款广受好评的杂志是 `iPad 版时代周刊`，可免费下载。它包含样本内容以及可按期购买的应用内购买项目。在撰写本文时，大多数单期零售价为 4.99 美元。\n\
  \n![images](img/p622-01.jpg)\n\n与其他媒体不同，你无需点击文章即可阅读杂志；相反，你只需在屏幕之间滑动，逐页翻阅杂志。\n\n\
  为了使文本更易读，`捏合`和`缩放`功能在多数杂志应用中均可使用。\n\nApp Store 中有许多杂志在售，包括《*大众科学*》、《*男士健康*》、《*连线*》、《*户外*》、《*GQ*》、《*时代周刊*》等。大多数单期售价在\
  \ 2.99 美元到 4.99 美元之间。\n\n![images](img/p623-01.jpg)\n\n#### 浏览杂志\n\n如图 26–2 所示，根据杂志的不同，其首页有多种类型。此示例并排展示了\
  \ `Time Magazine` 应用和 `Newsweek` 应用。\n\n`Newsweek` 应用提供一些免费内容供你浏览，而 `Time Magazine`\
  \ 应用则让你*预览*各期杂志，然后购买内容。\n\n![images](img/2602.jpg)\n\n**图 26–2.** *来自 `Time Magazine`\
  \ 和 `Newsweek` 应用的页面*\n\n#### Zinio 杂志应用——一个样张合集\n\n有一款名为 `Zinio` 的应用采用了独特的方法。`Zinio`\
  \ 应用在 App Store 中是免费的，为你提供超过 20 种杂志的样张。每个样张都有几篇完整的文章可供阅读。在 `Zinio` 中阅读文章需要遵循以下几个简单步骤：\n\
  \n1. 首先，点击你想阅读的杂志封面。\n2. 接着，触摸屏幕，你会看到底部出现一个滑动条，显示免费文章的截图。\n3. 要翻页，请从右向左滑动屏幕，或点击底部滑动条上的图片直接跳转到该页。\n\
  4. 有些杂志会免费赠送整期内容。只需点击底部的`精选`按钮，即可查看本周提供的免费内容。点击杂志封面即可下载该期。\n5. 点击`资料库`按钮，可查看已存储在资料库中供阅读的期数。\n\
  \n![images](img/p625-01.jpg)\n\n这张图片来自一期免费的《*汽车与驾驶员*》杂志；它是在我们撰写本章的那一周可供下载的。\n\n\
  要订阅 `Zinio` 中展示的任何杂志，请点击屏幕右下角的`商店`按钮。\n\n![images](img/p626-01.jpg)\n\n你可以通过左侧的分类浏览杂志，也可以滑动底部的图标查看可用的杂志。\n\
  \n你可以从众多热门杂志中进行选择。分类涵盖了从艺术到体育等方方面面。价格各不相同，但通常会提供单期价格和年度订阅价格。\n\n例如，在撰写本文时，《*大众机械*》的最新一期在\
  \ `Zinio` 上的售价为 1.99 美元，年度订阅价格为 7.99 美元。\n\n有些订阅非常划算。*Bike Magazine*（我最喜欢的杂志之一）的单期价格在撰写时为\
  \ 5.99 美元，但年度订阅仅需 9.00 美元。\n\n仔细一看，我发现可供订阅的自行车杂志超过 16 种。\n\n![images](img/p626-02.jpg)\n\
  \n\n\n### iPad 上的漫画书\n\n随着 iPad 的出现，*新媒体*中一种有望复兴的题材是漫画书。iPad 凭借其相对较大的高清屏幕和强大的处理器，让漫画书的页面栩栩如生。\n\
  \n在我们撰写本书时，已经有一些不同的漫画书应用可供使用，但没有一家公司比漫威漫画公司更著名。\n\n在 App Store 中找到 `Marvel Comics`\
  \ 应用。进入 `Categories`，然后进入 `Books`。该应用是免费的，漫画书可以从应用内部购买。\n\n在 `Home` 屏幕底部有三个按钮：`My\
  \ Comics`、`Store` 和 `Settings`。你购买的内容将出现在 `My Comics` 标题下。\n\nApp Store 让你有机会下载免费漫画和单独出售的期刊。大多数每期售价\
  \ 1.99 美元。\n\n你可以看到顶部的四个标签：\n\n![images](img/p627-01.jpg)\n\n- `Featured`\n- `New`\n\
  - `Popular`\n- `Free`\n\n每个标签都会带你进入一个新的漫画列表供你浏览，很像 iTunes 商店。\n\n触摸 `Browse` 按钮，可以按\
  \ `Genre`、`Creator`、`Storylines/Arcs` 或 `Series` 浏览。或者你也可以输入搜索词来查找特定的漫画。\n\n你可以通过两种方式阅读漫画书。第一种，你可以滑动页面，一页一页地阅读。第二种，你可以双击一个画面进行`Zoom`放大，然后点击屏幕前进到连环漫画中的下一个画面。之后，你只需从右向左滑动即可前进一个画面；或者，如果你想后退，从左向右滑动。\n\
  \n要返回 `Home` 屏幕或查看屏幕选项，只需在屏幕上的任意位置触摸并保持大约一秒钟，然后松开。你会在右上角看到一个 `Settings` 按钮，底部有一个页面`Thumbnail`视图（就像\
  \ `Photos` 一样），左上角有一个 `Close` 按钮，可以将你带到 `Home` 屏幕。\n\n![images](img/p628-01.jpg)\n\
  \n**注意：** 此应用的开发者 `ComiXology` 也制作了包含漫威漫画的 `Comics` 应用，以及许多其他漫画，包括阿奇漫画、映像漫画和 Top\
  \ Cow。你还会在 App Store 中看到 DC 漫画和其他供应商。\n\n### 作为 PDF 阅读器的 iPad\n\n在第 12 章中，我们向你展示了如何在电子邮件中打开附件，包括\
  \ PDF 文件。虽然你可以阅读几乎任何类型的附件，但你无法选择将 PDF 文件保存到 iPad 上以供将来查看。\n\n幸运的是，有一些程序可以将 iPad\
  \ 变成一个功能强大的 PDF 查看程序。其中一个具有多种用途的程序是 `GoodReader`。\n\n`GoodReader` 应用在 App Store\
  \ 的 `Productivity` 部分。在出版时，该应用仅售 4.99 美元。\n\n![images](img/p629-01.jpg)\n\n####\
  \ 将文件传输到你的 iPad\n\n`GoodReader` 应用的一大优点是，你可以使用它将大型文件从你的 Mac 或 PC 无线传输到 iPad，以便在\
  \ `GoodReader` 应用中查看。你也可以像我们在第 3 章：“将 iPad 与 iTunes 同步”中讨论的那样，使用 `GoodReader` 在\
  \ iTunes 中进行文档共享。按照以下步骤使用 `GoodReader` 传输文件：\n\n1.  触摸底部的 `Wi-Fi` 图标，调出 `Wi-Fi Transfer\
  \ Utility`。然后系统会提示你在浏览器中输入 IP 地址，如果你使用 `Bonjour` 服务，则输入 Bonjour 地址。\n\n    ![images](img/p629-02.jpg)\n\
  \n    ![images](img/2603.jpg)\n\n    **图 26–3**. *链接 iPad 和电脑以上传文件*\n\n2.  将 `GoodReader`\
  \ 弹出窗口中显示的地址输入到电脑的网页浏览器中。现在，你可以让你的电脑充当服务器。你会看到你的电脑和 iPad 现在已连接（参见图 26–3）。\n3.  在电脑的网页浏览器中点击\
  \ `Choose File` 按钮，找到要上传到 iPad 的文件。\n4.  选择文件后，点击 `Upload Selected File`，文件将自动传输到\
  \ `GoodReader` 中的 iPad 上（参见图 26–4）。\n\n![images](img/2604.jpg)\n\n**图 26–4.** *将文件上传到你的\
  \ iPad*\n\n为什么这很有用？嗯，对其中一位作者（加里）来说，iPad 已经成为存放超过 300 首钢琴乐谱的存储库。这意味着不再需要下载 PDF 文件、打印出来、装进活页夹，然后试图记住哪首歌在哪个活页夹里。现在，他所有的音乐都编录在\
  \ iPad 上。他只需把 iPad 放在钢琴上，就可以在一个地方访问他所有的音乐。\n\n**注意：** 你也可以用同样的方式传输 `Word`、`Excel`\
  \ 和 `PowerPoint` 文件。我们认为，使用 iTunes 中的文档传输工具可能会让这件事更简单一些（更多信息请参见第 19 章：“生产力与文件传输”）。\n\
  \n浏览 `GoodReader` 应用的 PDF 阅读器相当容易。快速点击屏幕中央以调出屏幕控制。然后你可以进入你的资料库，或触摸 `Turn Page` 图标来翻页。\n\
  \n浏览页面最简单的方式就是直接在屏幕上从右向左滑动。\n\n你也可以向上或向下轻拂来翻页。\n\n要转到另一个 PDF 文件或另一份乐谱，只需快速点击 iPad\
  \ 屏幕中央，然后触摸左上角的 `My Documents` 按钮即可。\n\n![images](img/p632-01.jpg)\n\n#### 使用 GoodReader\
  \ 连接到 Google Docs 和其他服务器\n\n你还可以使用 `GoodReader` 连接到 `Google Docs` 和其他服务器。请按照以下步骤操作：\n\
  \n1.  在 `GoodReader` 屏幕右侧的 `Connect to Servers` 标签中，点击 `Add` 按钮（参见图 26–5）。\n2. \
  \ 选择 `Google Docs`。你可以从多个不同的服务器中选择，包括邮件服务器、MobileMe iDisk、Public iDisk、Dropbox、box.net、FilesAnywhere.com、MyDisk.se、WebDAV\
  \ 服务器和 FTP 服务器。\n3.  输入你的 `Google Docs` 用户名和密码进行登录。\n4.  连接成功后，一个新的 `GoogleDocs\
  \ Server` 图标将出现在页面右侧的 `Connect to Server` 标签下。\n5.  点击新的 `Google` 标签以连接到服务器。（需要互联网连接才能连接。）\n\
  6.  现在你将看到存储在你 `Google Docs` 中的所有文档列表。点击任意文档并选择要下载的文件类型。通常 PDF 格式效果很好。\n7.  文件下载完成后，它将出现在\
  \ `GoodReader` 的左侧。只需点击该文件即可打开它。\n\n![images](img/2605.jpg)\n\n**图 26–5.** *将 `GoodReader`\
  \ 连接到其他文档服务器*\n\n## 第 27 章\n\n## 地图\n\n在你的 iPad 上使用地图，无论你拥有的是 3G+Wi-Fi 还是仅 Wi-Fi\
  \ 型号，都非常出色。在本章中，当我们探索 `Maps` 应用的功能时，你将看到如何在地图上找到你的位置——即使你只是使用 Wi-Fi。你将学习如何在 `Classic`、`Satellite`、`Hybrid`\
  \ 和 `Terrain` 视图之间切换。你还将看到，如果需要找出最佳路线，如何使用 `Maps` 查看交通和施工视图。如果你想找到离目的地最近的披萨餐厅、高尔夫球场或酒店，那也很容易。而且你可以直接从你的\
  \ iPad 使用谷歌的 `Street View` 来帮助你到达目的地。将已在地图上标记的地址添加到你的通讯录中也很容易。还有一个数字罗盘功能，非常方便，也很有趣。\n\
  \n\n\n"
- "# 地图使用入门\n\niPad 的魅力在于其应用程序能够相互协作。您已经看到**通讯录**是如何与**地图**应用关联的。\n\n![images](img/p635-01.jpg)\n\
  \n**地图**应用由移动地图技术领域的领导者——谷歌地图提供技术支持。通过**地图**，您可以定位当前位置、获取路线指引、搜索附近地点、查看实时路况等。只需轻点**地图**图标即可开始使用。\n\
  \n## 定位当前位置（蓝色圆点）\n\n启动**地图**程序后，可按以下步骤将其定位至您当前的位置：\n\n1.  轻点顶部导航栏中央的**箭头**图标。\n\
  \n    ![images](img/p636-01.jpg)\n\n    ![images](img/p636-02.jpg)\n\n2.  地图会请求使用您当前的位置——轻触**允许**或**不允许**。我们建议选择**允许**，这样能更轻松地获取从当前位置出发或前往当前位置的路线指引。\n\
  \n![images](img/p636-03.jpg)\n\n**注意：** 即使您只有支持 Wi-Fi 的 iPad，它也能找到您的近似位置。Wi-Fi 版\
  \ iPad 基于路由器位置进行定位。这通常较为准确，但如果有人将旧路由器带到了新的州，iPad 可能会认为您仍在旧位置。\n\n## 不同地图视图\n\n**地图**的默认视图是**经典**视图，这是一种基础地图，具有通用背景并显示街道名称。**地图**还可以显示**卫星**视图，或**卫星**与**经典**视图相结合的**混合**视图。此外，还有全新的**地形**视图，看起来像一张地形图。最后，还有一种**列表**视图，仅在您执行搜索并生成逐向路线列表时出现。您可以使用下一节中描述的步骤在所有视图之间切换。\n\
  \n### 切换地图视图\n\n请按照以下步骤从一种地图视图切换到另一种：\n\n1.  轻触地图右下角的翻起边缘。\n2.  地图的一角会翻起，显示视图选项按钮，包括**交通**、**放置图钉**等（请参见图\
  \ 27–1）。轻点您要切换到的视图：\n    *   **经典：** 显示街道名称的常规地图（请参见图 27–2）。\n    *   **卫星：** 不显示街道名称的卫星图片（请参见图\
  \ 27–1）。\n    *   **混合：** **卫星**与**经典**视图的组合，即带有街道名称的**卫星**视图（图 27–2）。\n    *  \
  \ **地形：** 显示地形（如山脉）的地形图（请参见图 27–3）。\n\n![images](img/2701.jpg)\n\n**图 27–1. *卫星*\
  \ 视图以及如何切换到其他地图视图**\n\n![images](img/2702.jpg)\n\n**图 27–2. 启用了交通信息的 *混合* 视图和 *经典*\
  \ 视图**\n\n![images](img/2703.jpg)\n\n**图 27–3. *地形* 视图——科罗拉多州丹佛以西落基山脉的地形图**\n\n\
  如前所述，**列表**视图仅在搜索产生多个结果（如 `\"pizza 32174\"`）或您请求路线指引时可用，如图 27–4 所示。\n\n![images](img/2704.jpg)\n\
  \n**图 27–4. 路线和搜索结果的 *列表* 视图**\n\n### 查看交通状况\n\n**地图**程序不仅能告诉您如何到达某地，还能沿途检查交通状况。此功能目前仅在美国提供支持。请按照以下步骤查看当地交通状况：\n\
  \n1.  轻触地图右下角以查看选项。\n2.  将**交通**开关打开。\n\n**提示：** 您也可以像翻书一样“翻动”页面来进入此视图。其动画效果与 **iBooks**\
  \ 应用中的完全相同。\n\n![images](img/p640-01.jpg)\n\n如果高速公路上出现交通状况，您通常会看到黄色灯标而非绿色灯标；有时黄色灯标可能会闪烁以提醒您交通延误。您甚至可能看到**施工工人**图标来指示施工区域。\n\
  \n**地图**在主要街道和高速公路上使用以下颜色来指示车辆行驶速度：\n\n绿色 = 时速 50 英里或以上  \n黄色 = 时速 25 – 50 英里  \n\
  红色 = 时速低于 25 英里  \n灰色（或无颜色）= 当前无交通数据可用\n\n![images](img/p640-02.jpg)\n\n## 搜索任何内容\n\
  \n由于**地图**与谷歌地图相关联，您可以搜索并找到几乎任何内容：具体地址、商业类型、城市或其他兴趣点，如图 27–5 所示。请按照以下步骤查找位置：\n\n\
  1.  轻触屏幕右上角的**搜索**栏。\n2.  输入您的地址、兴趣点，或您想在 iPad 上显示地图的城镇和州。\n\n![images](img/p641-01.jpg)\n\
  \n**谷歌地图搜索技巧**\n\n您几乎可以在搜索栏中输入任何内容：\n\n*   名字、姓氏或公司名称（匹配您的通讯录）\n*   主街 123 号，城市（街道地址的部分或全部）\n\
  *   奥兰多机场（查找机场）\n*   水管工、油漆工或屋顶工（商业名称或行业的任何部分）\n*   高尔夫球场 + 城市（查找当地高尔夫球场）\n*   电影院\
  \ + 城市或邮政编码（查找当地影院）\n*   Pizza 32174（搜索邮政编码 32174 附近的披萨餐厅）\n*   95014（美国加州苹果公司总部的邮政编码）\n\
  *   Apress Publishing\n\n![images](img/2705.jpg)\n\n**图 27–5. *在地图应用中搜索**\n\n要输入数字，请轻点键盘上的\
  \ **123** 键。要输入字母，请轻触 **ABC** 键切换回字母键盘。\n\n## 地图选项\n\n当地址显示在**地图**屏幕上后，您会看到一系列可用选项。轻触地址旁边的**蓝色信息**图标\
  \ ![images](img/p642-01.jpg) 以查看部分选项。如果您已映射了某个特定地点或联系人，您将看到图 27–6 所示的详细信息。您还可以获取路线、共享位置或添加为书签。\n\
  \n![images](img/2706.jpg)\n\n**图 27–6. *轻触蓝色信息按钮查看映射位置或联系人详情**\n\n如果您已映射了某个地址或兴趣点，轻触**蓝色信息**按钮后会看到不同的屏幕。您会发现一个小的街景图像，以及用于获取**路线**、**添加到通讯录**、**共享位置**或**添加到书签**的按钮，如右图所示。\n\
  \n![images](img/p643-01.jpg)\n\n### 使用书签\n\n在**地图**中，书签的使用方式与在 **Safari** 网页浏览器应用中非常相似。书签只是记录您访问过或映射过、并希望将来记住的地点。查看书签总是比执行新的搜索更容易。\n\
  \n#### 添加新书签\n\n为某个位置添加书签是方便再次找到该地点的好方法。请按以下步骤操作：\n\n1.  映射一个位置，如图 27–7 所示。\n2.\
  \  轻触地址旁边的**蓝色信息**图标。\n3.  轻触**添加到书签**。\n\n    ![images](img/2707.jpg)\n\n    **图\
  \ 27–7. *添加书签**\n\n4.  编辑书签名称，使其简短且易于识别——在此例中，我们将地址编辑为 *Fenway Park*。\n5.  完成后，轻触右上角的**存储**。\n\
  \n**提示：** 您可以像在通讯录中搜索姓名一样搜索书签名称。\n\n\n\n"
- "# 访问和编辑书签\n\n要查看书签，请按以下步骤操作：\n\n1.  轻点顶行中`搜索`窗口旁的`书签`图标。\n2.  轻点任意书签即可立即跳转。\n3.\
  \  轻点头部的`编辑`按钮来编辑或删除书签：\n    -   要重新排列书签，请触摸并拖动每个书签的右边缘向上或向下移动。\n    -   要编辑书签名称，请触摸它并重新输入名称。编辑名称后，轻点左上角的`书签`按钮返回书签列表。\n\
  \    -   要删除书签，请在书签上向左或向右滑动，然后轻点`删除`按钮。\n4.  完成书签编辑后，轻点`完成`按钮。\n\n![images](img/p645-01.jpg)\n\
  \n## 将地图位置添加到通讯录\n\n将您已定位到地图上的位置添加到通讯录非常简单：\n\n1.  在地图上定位一个地址。\n2.  轻点`蓝色信息`按钮。\n\
  3.  轻点`添加到通讯录`。 ![images](img/p646-01.jpg)\n4.  轻点`创建新联系人`或`添加到现有联系人`。\n5.  如果您选择`添加到现有联系人`，则可以滚动或搜索您的联系人并选择一个名字。该地址将自动添加到该联系人中。\n\
  \n## 搜索您周围的事物（商店、餐厅、酒店、电影及其他）\n\n按以下步骤搜索您当前位置附近的事物：\n\n1.  在地图上定位一个位置，或使用`蓝点`图标标记您当前的位置。\n\
  2.  轻点`搜索`窗口。假设我们想搜索最近的披萨店。输入“pizza”即可在地图上定位所有当地的披萨店。\n\n    ![images](img/p646-02.jpg)\n\
  \n3.  请注意，每个定位到的地点左侧可能有一个`街景`图标，右侧有一个`蓝色信息`图标。\n\n    ![images](img/p647-01.jpg)\n\
  \n4.  如果您想放大或缩小，您可以张开或捏合屏幕，或者双击屏幕。\n5.  与任何已定位的地点一样，当您触摸`蓝色信息`图标时，可以查看所有详细信息，例如披萨店的电话号码、地址和网站。\n\
  6.  如果您想要前往该餐厅的路线，只需触摸`路线到这里`，系统会立即计算出一条路线。\n\n**注意：** 如果您触摸`主页`链接，您将退出`地图`应用并启动`Safari`。之后，您需要在完成浏览后重新启动`地图`应用。\n\
  \n![images](img/p647-02.jpg)\n\n## 放大和缩小\n\n您可以通过双击和捏合这两种熟悉的方式来放大和缩小。要双击放大，只需像在网页或图片上那样双击屏幕即可。\n\
  \n## 放置大头针\n\n假设您正在查看地图，并且发现了某个位置，希望将其设为书签或目的地。\n\n在本例中，我们正在放大查看波士顿市区。我们偶然发现了芬威公园，并决定将其添加到书签中会很好，因此我们在它上面放置了一个大头针，如图\
  \ 27-8 所示：\n\n1.  定位一个地点或将地图移动到你想要放置大头针的位置。\n2.  轻点地图的右下角。 ![images](img/p648-01.jpg)\n\
  3.  轻点`放置大头针`。\n4.  现在，触摸并按住大头针在地图上拖动。在本示例中，我们将其直接移动到芬威公园上。\n\n![images](img/2708.jpg)\n\
  \n**图 27-8.** *如何放置大头针*\n\n**提示：** 如何找到地图上任何位置的街道地址？\n\n当您`放置大头针`时，谷歌地图会显示实际的街道地址。如果您通过查看`卫星`、`混合`或`地形`视图找到了某个位置，但需要获取实际街道地址，这会非常方便。\n\
  \n放置大头针也是记录您停车位置的好方法——在陌生地点（尤其是使用 iPad 3G 时）非常有用。\n\n## 使用街景\n\n在 iPad 的`地图`应用中，谷歌的`街景`（图\
  \ 27-9）真的很有趣。谷歌一直在努力拍摄美国及其他地区几乎每个地址的照片。这些照片随后被输入其数据库，当您想要查看目的地或航点图片时，显示的就是这些内容。\n\
  \n**注意：** 谷歌的`街景`正在走出美国国门。全球多个主要城市现在已被绘制在地图上。\n\n如果有可用的街景，您会在地图上的地址或书签左侧看到一个小的图标——一个`橙色小人`图标。\n\
  \n![images](img/p649-01.jpg)\n\n在本例中，加里想查看他的红袜队圣地——芬威公园的街景：\n\n1.  在此场景下，为地址定位时，我们轻点了通讯录列表中芬威公园下的工作地址。我们也可以通过在海搜窗口中输入地址、搜索某种类型的商家或触摸`通讯录`应用中的地址来实现定位。\n\
  2.  名称左侧是`街景`图标。\n3.  我们轻点该图标，立即切换到该地址的街景视图。\n4.  非常酷的一点是，我们可以通过向左、向右甚至向上或向下滑动，在屏幕上以\
  \ 360 度旋转导航——这让我们能够查看目的地旁边和街对面的地方。\n\n要返回地图，只需触摸屏幕的右下角。\n\n![images](img/2709.jpg)\n\
  \n**图 27-9.** *使用谷歌的`街景`*\n\n"
- "# 获取路线\n\n`地图`程序最有用的功能之一是，我们可以轻松找到前往或来自任何地点的路线。假设我们想使用当前位置，获取从格洛丽亚的商店到波士顿芬威公园的路线。\n\
  \n## 先轻点“当前位置”按钮\n\n要查找前往或来自您当前位置的路线，您无需浪费时间输入当前地址——只需轻点顶部信息栏中央的“当前位置”按钮 ![images](img/p650-01.jpg)\
  \ 来定位自己即可。您可能需要重复此步骤几次，直到屏幕上出现`蓝点`图标。\n\n现在，您可以执行以下两项操作之一：\n\n-   轻点顶部信息栏左端的`路线`按钮。\n\
  -   或者，您可以像之前讨论的那样触摸`蓝色信息`图标，然后选择`路线到这里`（参见图 27-10）。除非您另行指定，否则`地图`将根据您当前的位置计算到目的地的路线。\n\
  \n![images](img/2710.jpg)\n\n**图 27-10.** *选择`路线到这里`，`地图`将为您规划行程。*\n\n## 选择起点或终点\n\
  \n我们可以按照以下步骤为给定路线选择起点或终点：\n\n1.  如果目的地在我们的`书签`中，我们可以触摸`书签`图标。\n2.  接着，我们选择已添加书签的位置。\n\
  3.  我们可以轻点`书签`、`最近查找`或`通讯录`来查找目的地。\n4.  在此情况下，我们轻点`书签`。\n5.  最后，我们轻点`芬威公园`。\n\n\
  \    ![images](img/p652-01.jpg)\n\n    **注意：** 一旦您触摸`从此处出发`按钮，您最近的搜索将被自动显示，如图 27-10\
  \ 所示。您也可以触摸`目的地`框 ![images](img/p652-02.jpg) 并输入一个目的地。\n\n6.  从`书签`中选择芬威公园后，路线规划屏幕会将我们带到一个概览屏幕。\n\
  7.  在起点位置放置一个`绿色图钉`图标，在终点位置（本例中为芬威公园）放置一个`红色图钉`图标。\n\n![images](img/p653-01.jpg)\n\
  \n\n\n"
