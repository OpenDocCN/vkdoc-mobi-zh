  \ `编辑` 按钮。滑动到 `编辑` 屏幕底部，选择 `删除事件`。接着，你需要确认要删除该事件。\n\n##### 忙闲状态\n\n![images](img/p400-01.jpg)\n\
  \n你可以从以下选项中选择你的忙闲状态：`忙碌`（默认）或 `空闲`。根据你的 Exchange 设置，你可能还会看到 `暂定` 或 `外出`。\n\n**注意：**\
  \ 仅当您用于此事件的日历与 MobileMe、Exchange 或 Exchange/Google 设置同步时，你才会看到 `忙闲状态` 字段。\n\n![images](img/p400-02.jpg)\n\
  \n#### 在日历中使用复制粘贴文本\n\niPad 的 `应用程序切换器` 程序意味着你现在可以轻松地在任意两个应用之间跳转。有时你可能需要在 `邮件` 和\
  \ `日历` 应用之间跳转，以复制和粘贴信息。需要复制粘贴的信息可以是任何内容，例如开车路线或会议中急需的关键笔记。请按以下步骤在 `邮件` 和 `日历` 程序之间复制和粘贴信息：\n\
  \n1.  按照本章前面所述，创建一个新的日历事件或编辑一个现有事件。\n\n2.  向下滚动到 `备注` 字段，点击它以将其打开。\n\n3.  双击 `主屏幕`\
