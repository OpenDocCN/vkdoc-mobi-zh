- "# 第 23 章\n\n### 社交网络\n\n你的 iPad 可以通过许多超越传统电子邮件和网页功能的创新方式，让你与他人保持联系。\n\n如今，一些最受欢迎的“连接”场所是那些常被称为*社交网站*的地方——这些站点允许你创建自己的页面，并与朋友和家人联系，了解他们的生活动态。一些最流行的社交网站包括\
  \ Facebook、Twitter 和 LinkedIn。\n\n在本章中，我们将向你展示如何访问这些不同的站点。你将学习如何更新状态、*发推文*，以及跟踪那些对你重要或你感兴趣的人。\n\
  \n我们还将向你推荐一些优秀的第三方应用，它们能以新颖、创新的方式让你使用某些社交网络功能。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\
  \n\n### Facebook\n\nFacebook 创立于 2004 年 2 月。自那时起，它一直是用户与朋友、同事和家人联系、重新建立联系以及分享信息的主要网站。如今，超过\
  \ 4 亿人使用 Facebook 作为他们与最重要的人“保持联系”的主要方式。\n\n**注意：** 你无法在 iPad 上玩 Facebook 游戏。如果你是\
  \ Facebook 游戏的忠实玩家，这可能会让你失望。不过，你可以在 Scrabble 等游戏中与 Facebook 好友对战（参见第 22 章：“游戏与娱乐”）。\n\
  \n在你的 iPad 上，在本书出版时，主要有三种方式访问你的 Facebook 页面：\n\n*   使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
  *   使用像 `Flipboard` 这样的第三方应用（本章后面会介绍）。\n*   使用官方的 iPhone/iPad touch `Facebook` 应用。\n\
  \n![images](img/p554-01.jpg)\n\n**注意**：作者建议目前使用 `Flipboard` 或 `Friendly Facebook\
  \ for iPad` 作为在 iPad 上访问 Facebook 的最佳方案。iPhone/iPad touch 应用的功能比完整网站版本更有限，但更容易导航。请记住，这个应用最初是为\
  \ iPhone/iPod touch 设计的，所以它不会填满整个屏幕。你可以随时点击 `2x` 按钮使其变大——但放大后的屏幕不会像基于桌面的 Facebook\
  \ 网页那样清晰锐利。\n\n#### 从 Safari 登录 facebook.com\n\n| 要登录基于网页的应用，请启动 `Safari` 浏览器并访问\
  \ [`www.facebook.com`](http://www.facebook.com)。就像在电脑上一样登录。**小贴士：** 如果完整网站看起来过于复杂，可以登录\
  \ [`touch.facebook.com`](http://touch.facebook.com) 或 [`m.facebook.com`](http://m.facebook.com)\
  \ 来访问移动版网站。 | ![images](img/p554-02.jpg) |\n\n#### 浏览 facebook.com\n\nfacebook.com\
  \ 的好处在于，如果你曾在电脑上使用过 Facebook，你就已经知道如何浏览这个网站了。它的工作方式基本相同。\n\n点击`左侧导航栏`中的任意链接，即可进入你的`新鲜事`、`消息`、`活动`、`照片`、`好友`等页面（参见图\
  \ 23–1）。\n\n![images](img/2301.jpg)\n\n**图 23–1.** *`Safari` 浏览器中的 facebook.com\
  \ 网页*\n\n#### 状态更新/新鲜事\n\n| 一旦你用 `Safari` 登录 Facebook 网站，你将可以选择写下“你在想什么”，并看到来自好友的`新鲜事`。\
  \ | ![images](img/p555-01.jpg) |\n\n#### 查找 Facebook 好友\n\n| 在基于网页的 Facebook 页面中，你可以通过点击`搜索`字段并开始输入你要找的好友姓名来查找好友。你也可以点击`首页`上的`帐户`下拉框，然后点击左侧的`所有联系人`来查看你的好友。你的好友也会列在左侧边栏的`列表`下。**注意：**\
  \ 如果你使用的是 [`touch.facebook.com`](http://touch.facebook.com) 或 [`m.facebook.com`](http://m.facebook.com)，顶部会有一个`好友`标签；只需点击此标签即可查看你的好友列表。\
  \ | ![images](img/p556-01.jpg) |\n\n#### 向 facebook.com 上传照片\n\n不幸的是，在本书出版时，向 Facebook\
  \ 上传照片存在一个问题：你在台式电脑上使用的简单`上传照片`功能在 `Safari` 浏览器中无法使用。相反，系统会要求你向一个独特的、在你点击`上传照片`后出现在\
  \ Facebook 中的电子邮件地址发送一封邮件。你邮件的主题行将成为上传照片的文字描述。通过电子邮件向 Facebook 上传照片的一个好处是，你可以一次发送一堆照片，让它们在后台上传。这与\
  \ `Facebook` 应用不同，后者要求你等待每张照片上传完成后才能进行下一张。\n\n我们不会向您展示通过电子邮件将照片上传到 Facebook 的详细步骤；相反，我们建议您安装\
  \ `Facebook` 应用并使用它来上传照片。使用这种方法要容易得多。请参阅本章后面的“使用 Facebook 应用上传图片”部分了解上传步骤。\n\n####\
  \ 下载并安装 Facebook 应用\n\n| 要找到该应用，请使用 App Store 中的`搜索`功能并输入 `Facebook`。你也可以进入 App\
  \ Store 的“社交网络”分类，找到官方的 `Facebook` 应用，以及许多其他与 Facebook 相关的应用。**注意**：有些应用可能看起来像官方的\
  \ Facebook 应用，并且需要付费。然而，唯一官方的应用是前面提到的 iPhone/iPod touch 应用。 | ![images](img/p557-01.jpg)\
  \ |\n\n| 要连接到你的 Facebook 帐户，你需要找到刚刚安装的图标并点击它。我们这里以 `Facebook` 应用为例，但这个过程对于其他应用也非常相似。一旦\
  \ `Facebook` 应用成功下载，你应该会看到此处显示的图标。 | ![images](img/p557-02.jpg) |\n\n#### Facebook\
  \ 应用基础\n\n| 一旦 `Facebook` 应用下载并安装完成，你首先会看到`登录`屏幕。输入你的账户信息——你的电子邮件地址和密码。 | ![images](img/p558-01.jpg)\
  \ |\n\n| 首次登录后，你会看到一个`推送通知`警告消息。如果你希望允许这些消息，请点击`确定`，这些消息可能包括其他 Facebook 好友的“戳一下”、备忘、状态更新通知等。登录后，你将看到图\
  \ 23–2 所示的 `Facebook` 屏幕。点击 `Facebook` 标志可以在应用内导航。 | ![images](img/p558-02.jpg)\
  \ |\n\n![images](img/2302.jpg)\n\n**图 23–2.** *使用 `Facebook` 应用*\n\n#### 在 Facebook\
  \ 中导航\n\n| 通过点击页面顶部的 `Facebook` 字样，可以在`导航`图标和当前位置之间切换。例如，如果你在`新鲜事`中，点击 `Facebook`，你将看到所有图标。再次点击\
  \ `Facebook`，你将返回到`新鲜事`。从图标页面，你可以访问你的`新鲜事`、`个人资料`、`好友`、`通知`、`地点`、`请求`、`活动`、`照片`或`聊天`。\
  \ | ![images](img/p559-01.jpg) |\n\n#### 与好友交流\n\n按照以下步骤与你的 Facebook 好友交流：\n\n1.\
  \  点击顶部的 `Facebook` 以查看所有图标。\n2.  点击`好友`图标以查看显示的好友列表。\n3.  点击你想要交流的好友，你将进入她的 Facebook\
  \ 页面。在这里，你可以在`留言板`上留言，并查看好友的`信息`和`照片`。\n\n![images](img/p560-01.jpg)\n\n#### 使用\
  \ Facebook 应用上传图片\n\n用 Facebook 做一件简单又有趣的事情就是上传图片。请按照以下步骤在 `Facebook` 应用中上传图片：\n\
  \n1.  从 `Facebook` 的主图标中，点击`照片`。\n2.  选择一个相册，例如`手机上传`。\n3.  点击“你在想什么？”框旁边的`相机`图标。接下来，点击`拍摄照片或视频`来拍照或录像并上传。或者，你可以点击`从图库选取`来浏览\
  \ iPad 上的照片，直到找到你想要上传的照片。\n\n    ![images](img/p560-02.jpg)\n\n4.  接下来，如果愿意，点击`写说明……`来编写说明文字。\n\
  \n    ![images](img/p561-01.jpg)\n\n5.  要完成上传，请点击蓝色的`上传`按钮。照片将进入你的`手机上传`文件夹。\n\n\
  **注意**：当你上传照片时，图像质量将不会与 iPad 上的原始照片相同。\n\n![images](img/p561-02.jpg)\n\n\n\n#####\
  \ Facebook 通知\n\n根据您对 Facebook 推送通知的设置，您可能会被各种更新、留言墙帖子和邀请淹没。如果你的 Facebook 好友不多，并且希望知道何时有人在你的留言墙上留言或评论你的帖子或照片，只需将推送通知设置为`开启`。\n\
  \n| 当通知到达时，它会显示在屏幕上——即使你的 iPad 已锁定。在这个例子中，Gary 的朋友在他的留言墙上留言了，并且他的收件箱里有一条待处理的消息。`Facebook`图标告诉他有一条待回复或查看的通知。\
  \ | ![images](img/p561-03.jpg) |\n\n| 点击该图标会启动`Facebook`应用，Gary 可以查看并回复消息。他可以在`消息`部分看到一个通知图标，由`红色\
  \ (1)`圆圈标示。他还能在屏幕底部看到一条新的`留言墙帖子`通知。 | ![images](img/p562-01.jpg) |\n\n###### 放大或缩小应用\n\
  \n由于这个`Facebook`应用是为 iPhone 或 iPod touch 的较小屏幕设计的，你会注意到它会在屏幕中央作为一个较小的应用打开。要查看较大尺寸的应用，请点击屏幕右下角的`2x`按钮，如图\
  \ 23-3 所示。\n\n![images](img/2303.jpg)\n\n**图 23-3.** *使用`2x`按钮将应用扩展至全屏。*\n\n######\
  \ 自定义 Facebook 应用的设置\n\n按照以下步骤调整`Facebook`应用的设置：\n\n1.  点击`设置`图标。\n2.  在左侧栏中点击`Facebook`。\n\
  3.  现在您可以调整各种选项：\n    *   `摇动以重新加载`：此功能可在您摇晃 iPad 时重新加载或更新页面。\n    *   `震动`：此功能允许您指定收到通知时所需的震动设置。\n\
  \    *   `推送通知`：这些功能有简单的`开启`/`关闭`开关。触摸`推送通知`可在下一个屏幕上查看详细的开关选项。\n\n![images](img/p563-01.jpg)\n\
  \n您可以在右侧看到`Facebook`应用的`推送通知`设置屏幕。\n\n触摸每个开关以将其打开`开启`或关闭`关闭`。\n\n对于每个处于`开启`位置的开关，当有变化发生时，您将收到推送通知。例如，当您收到有人确认您为好友、在照片中标记您或在您的留言墙上评论的消息时，您的\
  \ iPad 会通知您。\n\n**提示：** 最新版本的`Facebook`应用将允许您使用`Facebook  Places`查看附近的好友。它还具备`新样式`消息和`群组`功能。\n\
  \n![images](img/p564-01.jpg)\n\n#### 使用 Flipboard 和 Friendly Facebook 应用\n\n虽然令人沮丧的是没有“官方”的\
  \ iPad Facebook 应用，但 App Store 中有两个非常好的替代品（均为免费）。这两款应用都能让 Facebook 在 iPad 的大屏幕上体验更佳。\n\
  \n| `Friendly Facebook for iPad`在 App Store 中有免费版本。只需在 App Store 中搜索“Facebook”，您应该就能找到该应用。\
  \ | ![images](img/p565-01.jpg) |\n\n一旦安装了该应用，您可以在应用顶部看到`实时动态`、`活动`和`地点`被标记为按钮（参见图\
  \ 23-4）。只需触摸其中一个按钮即可跳转到相应部分。\n\n在最顶部，您可以找到您的`个人资料`或`好友`的按钮，以及一个`首页`按钮，用于跳转到实时`新闻动态`。\n\
  \n顶部还有一些较小的图标，用于`消息`、`通知`、`请求`，以及一个指向您`Facebook 游戏`页面的便捷链接。\n\n![images](img/2304.jpg)\n\
  \n**图 23-4.** *Friendly Facebook for iPad* *屏幕*\n\n##### iPad 版 Flipboard\n\n作者最喜欢的应用之一是`Flipboard`，它被描述为\
  \ iPad 上的个人社交杂志。\n\n| 基本上，您可以从众多内容提供商中的任何一个向`Flipboard`应用添加版块。从那里，您可以以杂志风格（翻页）浏览任何网站或内容提供商。您可以使用`Flipboard`设置\
  \ Facebook、Twitter 和 Flickr（以及其他账户）的账户。此功能在 Facebook 方面表现非常出色。首先从 App Store 下载`Flipboard`。\
  \ | ![images](img/p566-01.jpg) |\n\n| 当您首次启动`Flipboard`时，您可以在添加版块时设置账户。设置 Facebook\
  \ 很简单，只需触摸`添加版块`，然后输入您的 Facebook 登录信息即可。 | ![images](img/p567-01.jpg) |\n\n然后，您将看到您的\
  \ Facebook 页面以杂志形式呈现。您可以触摸某个项目将其全屏显示，或者可以“翻页”浏览所有 Facebook 帖子。\n\n触摸页面顶部的`Facebook`按钮，您可以跳转到`您的留言墙`、`您的照片`、`新闻动态照片`、`新闻动态链接`、`群组`、`页面`、`好友列表`或`好友`（参见图\
  \ 23-5）。\n\n触摸某位好友的按钮即可跳转到他的页面。\n\n![images](img/2305.jpg)\n\n**图 23-5. Flipboard**\
  \ 的 Facebook 屏幕\n\n### LinkedIn\n\nLinkedIn 与 Facebook 的核心功能非常相似，但它更侧重于商务和职业方向。相比之下，Facebook\
  \ 则更侧重于个人好友和游戏。通过 LinkedIn，您可以与当前和过去的商业伙伴建立联系或重新取得联系。该服务允许您发送消息、了解他人的动态、进行讨论等等。\n\
  \n截至本书出版时，LinkedIn 的状态与 Facebook 非常相似。您可以在`Safari`浏览器上访问常规 LinkedIn 网站，或下载 iPhone\
  \ 版`LinkedIn`应用。\n\n哪个更好？我们觉得 iPhone 版`LinkedIn`应用比在`Safari`中浏览完整的 LinkedIn.com\
  \ 网站略胜一筹。使用`LinkedIn`应用，凭借其大按钮，导航更为便捷，但您在`Safari`版本中可以在屏幕上看到更多内容。我们建议您两种方式都尝试一下，看看自己喜欢哪种——这其实是个人的偏好问题。\n\
  \n#### 在 Safari 浏览器上使用 LinkedIn.com\n\n要在浏览器上访问 LinkedIn，请遵循以下步骤：\n\n1.  点击`Safari`图标。\n\
  2.  点击浏览器顶部的`地址`栏。\n3.  输入此地址：[`www.linkedin.com`](http://www.linkedin.com)。如果在输入时，[`www.linkedin.com`](http://www.linkedin.com)\
  \ 出现在下拉框中，则只需触摸该链接即可跳转。\n4.  输入您的 LinkedIn 用户名和密码登录，即可看到 LinkedIn 的`首页`页面，如图 23-6\
  \ 所示。\n\n![images](img/2306.jpg)\n\n**图 23-6.** *在您的`Safari`网页浏览器上的 LinkedIn `首页`页面*\n\
  \n**提示：** 请记住通过双击或捏合缩放来查看更多网页内容。\n\n您可以在 LinkedIn.com 上像在电脑上一样导航和交互。唯一的区别是您用手指代替鼠标点击链接。\n\
  \n\n\n#### 下载 LinkedIn 应用\n\n获取 `LinkedIn` 应用十分简单。在 iPad 上启动 `App Store` 应用，在 `Search`\
  \ 窗口中输入“LinkedIn”，即可找到该应用。它是免费的，因此点击 `FREE` 按钮即可安装。\n\n![images](img/p570-01.jpg)\n\
  \n##### 登录 LinkedIn 应用\n\n安装好 `LinkedIn` 应用后，点击 `LinkedIn` 图标，输入你的登录信息。\n\n![images](img/p571-01.jpg)\n\
  ![images](img/p571-02.jpg)\n\n##### 浏览 LinkedIn 应用\n\n`LinkedIn` 应用采用了与 Facebook\
  \ 类似的基于图标的导航风格。点击任意图标即可跳转至相应功能，然后点击左上角的 `Home` 图标即可返回 `Home` 屏幕（见图 23–7）。\n\n![images](img/2307.jpg)\n\
  \n**图 23–7.** *`LinkedIn` 应用的 `Home` 屏幕*\n\n##### 与 LinkedIn 联系人沟通\n\n你在使用 `LinkedIn`\
  \ 应用时最常做的事之一就是与联系人沟通。操作方法很简单：\n\n1.  点击 `Connections` 图标。\n2.  滚动浏览联系人列表，或在 `Search`\
  \ 框中输入联系人名称。\n3.  点击你想寻找的联系人。\n4.  点击右上角的 `Send` 图标 ![images](img/p572-02.jpg)，然后选择\
  \ `Send Message`。\n\n![images](img/p572-01.jpg)\n\n### Twitter\n\nTwitter 始于 2006\
  \ 年。它本质上是一个基于短信（SMS）的社交网站，常被称为*微型博客网站*，名人和普通人都可以在上面分享自己的想法。关键在于，你只有 140 个字符来表达你的观点。\n\
  \n在 Twitter 上，你可以订阅（*follow*）那些发布推文（*tweets*）的人。你也会发现有人开始关注你。如果你想关注我们，我们在 Twitter\
  \ 上的账号是 `@mtrautschold`。\n\n### 创建 Twitter 账户\n\n创建 Twitter 账户非常简单。我们建议你首先在 Twitter\
  \ 网站 [`www.twitter.com`](http://www.twitter.com) 上建立你的 Twitter 账户。建立账户时，你需要选择一个唯一的用户名（我们用的是\
  \ `@garymadesimple`）和密码。\n\n![images](img/p573-01.jpg)\n\n随后你会收到一封确认邮件。点击邮件中的链接，你将被带回\
  \ Twitter 网站。你可以在网站上发布推文或选择关注的人，也可以阅读好友的推文。\n\n![images](img/p573-02.jpg)\n\n###\
  \ iPad 上的 Twitter 选项\n\n在 iPad 上使用 Twitter 有很多选择。关注他人和发布推文最简单的方法是使用 App Store 中的\
  \ Twitter 应用。\n\n可供选择的 Twitter 应用很多。本书将重点介绍两款：`TweetDeck` 和官方的 `Twitter` 应用。这两款应用设计都非常出色且易于使用。\n\
  \n![images](img/p573-03.jpg)\n\n**注：** 这两款应用都能让你在 Twitter 上完成几乎相同的操作——这实际上只是个人偏好的问题！\n\
  \n#### 下载 Twitter 应用\n\n前往 App Store，点击 `Categories`，选择 `Social Networking`。你应该会在\
  \ `Social Networking` 区域看到 `TweetDeck` 和 `Twitter`。如果没有，只需点击 `Search` 窗口并输入应用名称。像下载其他应用到\
  \ iPad 一样下载这些应用即可。\n\n![images](img/p574-01.jpg)\n\n#### 首次启动 Twitter 应用\n\n点击任意应用图标，程序将启动。首次使用任一应用都需要你登录\
  \ Twitter。你的用户名就是你最初注册 Twitter 时选择的那个。\n\n![images](img/p574-02.jpg)\n\n#### 使用\
  \ TweetDeck\n\n`TweetDeck` 应用提供了一个非常简洁的 `Home` 屏幕。你可以在屏幕左下角 `All Friends` 标签下看到你关注的人的推文。\n\
  \n在右侧，你通常会看到 `Mentions`，即对你自己推文的回复。这些回复的操作方式类似于短信对话。\n\n`TweetDeck` 的控制按钮位于右上角。共有五个图标供你使用（见图\
  \ 23–8）。\n\n![images](img/2308.jpg)\n\n**图 23–8.** *`TweetDeck` 的 `Home` 页面布局*\n\
  \n##### 查找用户\n\n点击 `Profile` 图标（人物图标）即可看到 `Search` 框，输入你想关注的人的姓名或用户名。\n\n![images](img/p575-01.jpg)\n\
  \n在此示例中，我搜索了我的朋友 Kevin，他的用户名为“CrackBerryKevin”。找到目标用户后，点击 `View Profile` 按钮即可查看他的\
  \ Twitter 资料。\n\n![images](img/p576-01.jpg)\n\n##### 账户与设置\n\n该应用的 `Accounts and\
  \ Settings` 部分有多个可调整的字段。点击 `Manage Accounts` 标签可以添加或编辑 Twitter 账户。点击 `Sign into\
  \ an Account` 可以登录你可能拥有的另一个 Twitter 账户。操作方法是，点击该标签并输入你的用户名和密码。点击 `Settings` 标签可以调整自动更正、自动大写和声音选项。如果你有专门用于将图片上传到\
  \ Twitter 的服务，也可以在此选择你的图片服务。\n\n![images](img/p576-02.jpg)\n\n##### 刷新\n\n点击 `Refresh`\
  \ 按钮即可刷新你的推文。\n\n![images](img/p576-03.jpg)\n\n#### 添加列\n\n`Add Column` 按钮可以为你的\
  \ Twitter `Home` 屏幕添加另一列。只需从右向左滑动，即可在不同列之间切换。底部的圆点表示你需要滑动浏览多少个屏幕。你可以为 `Search`、`Direct\
  \ Messages`、`Mentions`、`Favorites`、`Twitter Trends`、`Twitter Lists`、`Twitter Search`\
  \ 和 `All Friends` 添加列。\n\n![images](img/p577-01.jpg)\n\n##### 撰写推文\n\n点击 `Compose\
  \ Tweet` 图标 ![images](img/p578-01.jpg)，`Tweet composition` 屏幕便会显示。你的 Twitter ID\
  \ 显示在 `From:` 行，你有 140 个字符来表达你的想法。完成后，点击右上角的 `Send` 按钮。\n\n![images](img/p578-02.jpg)\n\
  \n##### 阅读与回复\n\n点击一条推文可将其显示在 `Main` 屏幕上。这会使推文变得很大且清晰，你可以点击推文中的链接来启动 `Web` 视图。如果你想在\
  \ `Safari` 中查看链接，请点击 `View in Safari` 按钮。\n\n![images](img/p578-03.jpg)\n![images](img/p578-04.jpg)\n\
  \n**注：** 在 `Safari` 中查看链接后，你需要关闭 `Safari` 并重启 `TweetDeck`。\n\n在 `Tweet` 窗口的底部，你会看到五个图标：`Reply`、`Forward`、`DM`、`Email`\
  \ 和 `Favorite`。\n\n![images](img/p578-05.jpg)\n\n每个图标都会弹出一个附加窗口和屏幕键盘，供你输入 `Reply`、`Forward`\
  \ 推文，向作者发送 `Direct Message`，`Email` 该推文，或将其设置为 `Favorite`。\n\n#### 使用 Twitter\n\n\
  官方的 `Twitter` 应用采用了一种精简的方式来使用 Twitter。`Home` 屏幕会显示你关注的人的推文。点击完整信息，右侧会出现一个新列。此列显示完整的推文和作者信息，以及\
  \ `Reply`、`Favorite`、`Retweet` 和 `Send` 图标。\n\n你可以在左侧看到五个图标。第一个图标是主要的 `Twitter`\
  \ `Timeline` 信息流。其他图标分别是 `Mentions`、`Direct Messages`、`Links`、`Profile` 和 `Search`。\n\
  \n`Compose Tweet` 图标位于左下角（见图 23–9）。\n\n![images](img/2309.jpg)\n\n**图 23–9.** *`Twitter`\
  \ 应用的 `Home` 页面布局*\n\n\n\n### 刷新你的推文列表\n\n| 要刷新你的推文列表，请下拉**主页**页面，页面顶部会显示**下拉以刷新**通知。将页面下拉后，你会看到**释放以刷新**提示。松开页面即可刷新推文。\
  \ | ![images](img/p580-01.jpg) |\n\n### 你的 Twitter 个人资料\n\n| 点击**个人资料**即可显示你的 Twitter\
  \ 个人资料。要查看你的推文，只需点击**推文**。要查看你标记为收藏的推文，请点击**收藏**按钮。要查看你关注的人，请点击**正在关注**按钮。**注意**：与你粉丝数、关注数、收藏数和推文数对应的数字会显示在相应按钮标题的下方。\
  \ | ![images](img/p580-02.jpg) |\n\n### 撰写按钮\n\n| 点击**撰写**按钮 ![images](img/p581-01.jpg)，会弹出**新推文**屏幕。输入信息时，字符计数器会从\
  \ 140 开始倒计时。在**撰写推文**屏幕底部，你会看到**直接提及**、**话题标签** (`#`)、**图片上传**以及**地理标记**的图标。![images](img/p581-02.jpg)\
  \ 当你点击某个图标时，建议内容会弹出一个单独的窗口显示。 | ![images](img/p581-03.jpg) |\n\n### 推文内的选项\n\n|\
  \ 在 **Twitter** 应用的**主页**屏幕上，点击你的一条推文会弹出一个选项列表。你可以对该推文进行**回复**、**设为收藏**、**转推**和**翻译**/**发送**/**电子邮件**。只需点击相应的按钮即可执行操作。你可以在图\
  \ 23–10 中查看**链接**和**邮件**选项的详细信息。 | ![images](img/p581-04.jpg) |\n\n![images](img/2310.jpg)\n\
  \n**图 23–10.**  **Twitter** 应用中推文内的选项\n\n## 第 24 章\n\n## 告别纸质笔记\n\n在本章中，我们将向你概述**备忘录**应用以及一个名为**印象笔记**的流行替代应用，你可以使用它们来写笔记、制作购物清单，以及列出你想看的电影或想读的书籍清单。我们还将向你展示如何整理甚至通过电子邮件将笔记发送给自己或他人。理想情况下，我们希望**备忘录**在\
  \ iPad 上能变得非常易用，以至于你最终可以摆脱大部分——即使不是全部——纸质便利贴！\n\n### 探索更多备忘录应用\n\n在本章后面部分，我们将深入介绍一个名为**印象笔记**的优秀且免费的**备忘录**应用替代品。App\
  \ Store 中还有各种其他免费或低成本的备忘录应用，但目前**印象笔记**脱颖而出。使用**印象笔记**，你可以为笔记添加标签并进行整理、向笔记添加图片、添加语音笔记，并显示你最初撰写笔记的位置。**印象笔记**的另一个优点是可以将你的笔记与印象笔记网站（以便你可以在电脑上管理笔记）以及你可能拥有的许多其他移动设备自动同步。\n\
  \n| **提示：** iPad 自带的**备忘录**应用非常基础和实用。如果你需要一个更强大的笔记应用，能够排序、分类、导入项目（如 PDF、Word 等）、拥有文件夹、支持搜索等功能，那么你应该看看\
  \ iPad 上的 App Store。搜索“笔记”，你会找到至少十多个与笔记相关的应用，价格从 0.99 美元起。 | ![images](img/p583-01.jpg)\
  \ |\n\n#### 备忘录应用\n\n如果你和许多人一样，你的办公桌或墙上可能贴满了黄色的小便利贴——记录着各种能想到的待办事项。即使有了电脑，我们仍然倾向于留下这些小纸条作为提醒。iPad\
  \ 的一大优点是，你可以在熟悉的黄色便签纸上书写笔记，然后将它们整齐地整理排序。你甚至可以将它们通过电子邮件发送给自己或他人，以确保信息不被遗忘。\n\n| iPad\
  \ 上的**备忘录**应用为你提供了一个便利的地方来保存笔记和简单的“待办事项”列表。你还可以保存简单的列表，例如购物清单，或其他商店（如五金店或宠物店）的清单。如果你随身带着\
  \ iPad，一旦想到需要添加的项目，就可以立即添加到这些列表中，并且可以随时访问和编辑。 | ![images](img/p584-01.jpg) |\n\n\
  #### 同步备忘录\n\n你可以使用我们在第 3 章：“将你的 iPad 与 iTunes 同步”和第 4 章：“其他同步方法”中展示的方法，将备忘录与你的电脑或其他网站同步。图\
  \ 24–1 展示了一个使用 **iTunes** 将** Microsoft Outlook **中的笔记同步到 iPad 上**备忘录**应用的示例。同步笔记的好处在于，你可以在电脑上添加一条笔记，然后它就会“出现”在你的\
  \ iPad 上。之后，当你外出时，你可以编辑那条笔记，并将其同步回你的电脑。你不再需要重新输入或记住事情。你总是随身带着 iPad，因此随时随地做笔记是永不遗忘重要事项的好方法。\n\
  \n![images](img/2401.jpg)\n\n**图 24–1**.  使用 **iTunes** 在 **Microsoft Outlook**\
  \ 和 iPad **备忘录**应用之间同步笔记\n\n#### 开始使用备忘录\n\n![images](img/p585-01.jpg)\n\n与其他任何应用一样，只需轻点**备忘录**图标即可启动它。\n\
  \n启动**备忘录**应用后，你会看到一个典型的黄色记事本。\n\n你的**备忘录**会以标签的形式显示在列表中，可供点击。点击你想要查看或编辑的备忘录名称（参见图\
  \ 24–2）。然后就会显示该备忘录的内容。\n\n你可以像在任何程序中一样在**备忘录**中滚动。你会注意到备忘录最后编辑的日期和时间显示在左上角。\n\n\
  阅读完备忘录后，只需点击左上角的**备忘录**按钮即可返回**备忘录**主屏幕。\n\n![images](img/2402.jpg)\n\n**图 24–2**.\
  \  在**备忘录**应用中导航\n\n##### 多个备忘录账户\n\n如果你恰好同时通过 **iTunes** 同步至少一个 IMAP 电子邮件账户和你的电脑，那么你会看到来自每个账户的备忘录是分开存放的。这与你按电子邮件账户将联系人分到不同组，以及按电子邮件账户将日历分开存放的方式非常相似。\n\
  \n| 要查看多个备忘录账户，你需要在**账户** **设置**屏幕中设置一个开关。当你在**设置** ![images](img/U001.jpg) **邮件、通讯录、日历**中设置你的\
  \ IMAP 电子邮件账户时，你会看到将**备忘录**同步设为**开**或**关**的选项。要查看这些备忘录账户，你需要将**备忘录**开关设为**开**，如此处\
  \ Gmail 账户所示。 | ![images](img/p586-01.jpg) |\n| 要查看不同的备忘录账户，请点击**备忘录**应用左上角的**账户**按钮。\
  \ | ![images](img/p587-01.jpg) |\n| 然后，在下一个屏幕上，你可以点击选项来查看**所有备忘录**或每个账户的备忘录。在此图像中，选项为**\
  \ Gmail **或**来自我的 PC**（本例中是通过 **iTunes** 从 **Microsoft Outlook** 同步的笔记）。你添加到某个账户的备忘录将保留在该账户下。例如，如果你向\
  \ **Gmail** 添加了备忘录，那么这些备忘录只会显示在你的** Gmail **账户中。 | ![images](img/p587-02.jpg) |\n\
  \n\n\n#### 我的笔记是如何排序的？\n\n你会看到所有笔记按时间倒序排列，最近编辑的笔记排在最前面，最旧的排在底部。显示的是该笔记**最后编辑**的日期和时间，而非最初创建的时间。因此你会注意到笔记的顺序在屏幕上会发生变化。这种排序是个好设计，因为你最近（或频繁编辑的）的笔记会始终位于顶部。\n\
  \n**提示：** 如果你想要一款好用的待办事项应用，不妨试试 **Appigo Todo**。目前在 App Store 中的售价为 4.99 美元。\n\n\
  | ![images](img/p588-01.jpg) |     |\n| ----------------------------- | --- |\n\n\
  #### 添加新笔记\n\n要新建笔记，请点击右上角的 **加号 (+)**。\n\n此时记事本为空白状态，键盘会自动弹出供你开始输入。如果你希望隐藏键盘，只需点击右下角的\
  \ **隐藏键盘** 键即可。\n\n**提示：** 你可以在 **设置** 应用中更改 **备忘录** 的字体。Apple 已经更改过一次字体选项，但在本书写作时，可选的三种字体分别是\
  \ Noteworthy、Helvetica 和最初的 Marker Felt。\n\n#### 为笔记添加标题\n\n在按下 **回车** 键之前输入的前几个字将成为笔记的标题。因此，请先想好标题内容再输入。在右侧显示的图片中，“**购物清单**”成为了笔记的标题。每行输入一个新项目，然后按\
  \ **回车** 键换行。\n\n**注意：关于保存笔记**  \n好在你不必点击 **“保存”** 按钮，因为当你完成输入后，笔记会自动保存。\n\n| ![images](img/p589-01.jpg)\
  \ |     |\n| ----------------------------- | --- |\n\n编辑完笔记后，你可以执行以下任一操作：\n\n- 若要退出应用，请按下\
  \ **主屏幕** 按钮退出 **备忘录** 应用。\n- 如果你处于 **竖屏** 模式，请点击左上角的 **备忘录** 按钮 ![images](img/p589-02.jpg)\
  \ 以查看笔记列表。\n- 如果你处于 **横屏** 模式，请点击其他笔记来查看。\n\n#### 搜索笔记\n\n当笔记数量增多时，你会希望知道如何快速找到某条笔记。在笔记列表顶部的\
  \ **搜索** 栏中点击并输入一个或多个词语。所有标题或正文中包含这些词语的笔记会立即显示出来。\n\n| ![images](img/p589-03.jpg)\
  \ |     |\n| ----------------------------- | --- |\n\n#### 编辑笔记\n\n你可以轻松编辑或修改笔记内容。例如，你可以保留一张“待办事项”笔记，并在想到要添加其他项目时快速编辑（或者当家人提醒你需要从商店买某样东西时！）。\n\
  \n从笔记列表中点击“待办事项”笔记，或者点击 **搜索** 窗口并输入“待办事项”以快速找到它。\n\n要开始编辑，请点击屏幕上的任意位置；光标会移动到该位置供你编辑。\n\
  \n如果你双击一个词，将会出现用于复制和粘贴的蓝色手柄。（详见 第 2 章：“打字技巧、复制/粘贴和搜索”，了解更多关于复制与粘贴的内容。）\n\n**提示：**\
  \ 使用蓝色选择手柄是选择大量文本的最佳方式；它既快捷又精准。\n\n请记住：你可以长按某个单词来显示 **放大镜** 图标，从而将光标精确插入到你想要的位置。当你松开手指时，会看到一个包含\
  \ **选择**、**全选** 的弹出菜单——如果你最近复制过文本，还会出现 **粘贴** 选项。\n\n| ![images](img/p590-01.jpg)\
  \ |     |\n| ----------------------------- | --- |\n\n编辑完成后，点击 **主屏幕** 按钮退出；如果你处于\
  \ **竖屏** 视图，请点击 **备忘录** 按钮以调出笔记列表。如果你处于 **横屏** 模式，则可以点击其他笔记来查看。\n\n#### 通过电子邮件发送笔记\n\
  \n**备忘录** 应用的一项便捷功能是能够通过电子邮件发送笔记（见图 24–3）。假设我们写好了一张购物清单，想通过电子邮件发给某人，让其在回家路上顺便采购。在编辑或查看笔记时，我们可以点击屏幕底部的\
  \ **信封** 图标。\n\n![images](img/2403.jpg)\n\n**图 24–3.** *通过电子邮件发送笔记*\n\n##### 查看上一篇或下一篇笔记\n\
  \n要浏览多篇笔记，只需点击屏幕底部的 **箭头** 图标。如果点击 **向前** ![images](img/p591-01.jpg) 箭头，页面会翻转，显示下一则笔记。要返回，只需点击\
  \ **向后** ![images](img/p591-02.jpg) 箭头即可。\n\n| ![images](img/p591-03.jpg) |    \
  \ |\n| ----------------------------- | --- |\n\n##### 删除笔记\n\n要删除笔记，请先在主 **备忘录**\
  \ 屏幕中点击打开该笔记，然后点击底部的 **垃圾桶** 图标。iPad 会提示你 **删除笔记**。点击此按钮即可删除。若要取消，请点击屏幕上 **删除笔记**\
  \ 按钮之外的任意位置。\n\n| ![images](img/p591-04.jpg) |     |\n| -----------------------------\
  \ | --- |\n\n#### 从带有下划线的日期和时间创建新的日历事件\n\n尝试在笔记中输入“明天早上”或“明天晚上 9:30”等词语，然后保存。下次打开该笔记时，你会发现这些词语已被添加下划线。如果你长按带有下划线的词语，会出现一个按钮询问是否要\
  \ **创建事件**。点击该按钮即可为带下划线的日期和时间新建一个 **日历** 事件。\n\n| ![images](img/p592-01.jpg) | \
  \    |\n| ----------------------------- | --- |\n\n**提示：** 每当日期和时间词语带有下划线时，iPad\
  \ 都会将其识别为潜在的 **日历** 事件。此功能适用于笔记、电子邮件以及 iPad 上的其他应用。\n\n\n\n### 另一款笔记应用：印象笔记（基础版免费）\n\
  \n在 App Store 中，你会看到许多专为 iPad 设计的笔记应用。\n\n要了解一些最受欢迎的笔记相关应用，可以查看 TiPb.com 上列出的五款热门应用清单：\n\
  \n`www.tipb.com/2010/03/05/tipb-top-5-iphone-note-apps-2/`\n\n| **印象笔记** 是较为热门的免费基础版笔记应用之一。如果你需要更多存储空间，可以按月或按年付费购买服务计划。请在\
  \ App Store 或 [`www.evernote.com`](http://www.evernote.com) 上查看最新价格和功能。**印象笔记**的强大之处在于，当你在\
  \ **印象笔记** 中输入笔记时，你可以将其与你的 Mac、iPhone、黑莓或 PC 进行*自动同步*。所有文本均可搜索，你甚至可以使用 **印象笔记**\
  \ 进行*地理定位*（让你的 iPad 跟踪你的位置，并将其与特定笔记关联）。 | ![images](img/p592-02.jpg) |\n\n**提示**：你甚至可以使用\
  \ **印象笔记** 录制语音笔记。\n\n### 开始使用印象笔记\n\n| 首先前往 App Store 下载 **印象笔记**。下载并安装完成后，你需要点击\
  \ **印象笔记** 图标启动应用。第一次使用 **印象笔记** 时，系统会提示你注册一个免费账户。输入你的电子邮件地址并设置密码，即可开始使用。 | ![images](img/p593-01.jpg)\
  \ |\n\n### 添加笔记与添加标签\n\n| **主页** 屏幕会显示你的所有笔记。要添加新笔记，只需点击左下角的 **新笔记** 按钮，然后输入你的笔记内容。![images](img/p593-02.jpg)\
  \ | ![images](img/p593-03.jpg) |\n| 为你的笔记取一个独特的标题，然后添加一些标签。这些标签有助于整理笔记，在搜索笔记时也很有用。在此示例中，我们设置了几个标签，包括“书籍”、“待办事项”和“工作”。如果我们将这些标签添加到相应的笔记中，那么笔记就可以按这些标签进行分类。![images](img/p594-01.jpg)\
  \ | ![images](img/p594-02.jpg) |\n\n一旦你输入了几个用逗号分隔的标签，它们就会被添加到一个下拉列表中，方便以后选择。这也有助于避免输错任何标签（请参见图\
  \ 24–4）。\n\n![images](img/2404.jpg)\n\n**图 24–4.** *在 **印象笔记** 中为笔记添加标签*\n\n###\
  \ 在印象笔记中添加语音录音\n\n| 在添加或编辑笔记时，点击顶部栏中的 **麦克风** 图标，你可以录制你的声音（或周围其他声音）并将其添加到当前笔记中（请参见图\
  \ 24–5）。 | ![images](img/p595-01.jpg) |\n\n![images](img/2405.jpg)\n\n**图 24–5.**\
  \ *在 **印象笔记** 中为笔记添加语音录音*\n\n### 从照片库添加图片到笔记\n\n| 你可以通过点击 **编辑笔记** 窗口顶部的 **照片**\
  \ 图标（位于 **保存** 按钮旁边，请参见图 24–6），轻松地将照片库中的任意图片添加到 **印象笔记** 的笔记中。**印象笔记** 甚至能识别图片中的文字，并使这些文字变得可搜索。\
  \ | ![images](img/p595-02.jpg) |\n\n![images](img/2406.jpg)\n\n**图 24–6.** *从照片库添加照片到笔记*\n\
  \n### 通过电子邮件发送、打印、删除或编辑笔记\n\n| 你可以通过点击屏幕底部的 **发送** 图标，然后像在 **备忘录** 应用中那样进行选择，从而通过电子邮件发送或打印你的笔记。\
  \ | ![images](img/p596-01.jpg) |\n| 要删除笔记，请点击底部栏的 **垃圾桶** 图标。 | ![images](img/p596-02.jpg)\
  \ |\n| 有时，你需要确保看到笔记的最新信息，或者你刚添加的信息已同步到印象笔记服务器。为此，点击 **刷新** 图标即可。 | ![images](img/p596-03.jpg)\
  \ |\n| 要编辑笔记，只需点击屏幕底部的 **铅笔** 图标。这会调出 **编辑** 屏幕。 | ![images](img/p596-04.jpg) |\n\
  \n### 印象笔记中的笔记查看方式\n\n你有多种选项可以自定义在 **印象笔记** 中查看笔记的方式。选择主屏幕顶部列出的任意视图：**所有笔记**、**笔记本**、**标签**、**地点**\
  \ 或 **搜索**。\n\n![images](img/p596-05.jpg)\n\n点击 **所有笔记** 查看所有笔记。\n\n点击 **笔记本** 查看所有笔记本（请参见图\
  \ 24–7）。\n\n![images](img/2407.jpg)\n\n**图 24–7.** ***印象笔记** 的 **笔记本**、**标签** 和\
  \ **所有笔记** 视图*\n\n### 印象笔记的地点视图\n\n**印象笔记** 的一个很酷的视图是 **地点** 视图。你可以让 **印象笔记** 根据你创建笔记的地点来标记笔记。例如，如果你旅行到了另一个州、省或国家，**印象笔记**\
  \ 会记录你在该特定区域记过笔记。\n\n图 24–8 显示了一条在加利福尼亚州创建的笔记，以及几条在佛罗里达州创建的笔记。\n\n![images](img/2408.jpg)\n\
  \n**图 24–8.** ***印象笔记地点** 视图*\n\n### 印象笔记视图选项\n\n你有多种选项可以自定义 **印象笔记** 中的笔记视图。点击右上角\
  \ **搜索** 框下的 **视图选项** 标签，即可自定义当前视图。在图 24–9 中，我们通过为 **排序方式** 选择 **标题**，为 **查看方式**\
  \ 选择 **缩略图** 来自定义了视图。\n\n![images](img/2409.jpg)\n\n**图 24–9.** ***印象笔记** 的 **所有笔记**\
  \ 视图及其显示的视图选项*\n\n### 印象笔记同步与设置\n\n要将你的笔记与 **印象笔记** 服务器同步，以便在你的 Mac、PC 或其他连接印象笔记的设备（如黑莓或\
  \ iPhone）上检索，你需要点击屏幕右下角的 **雷达碟** 图标以调出 **设置** 屏幕（请参见图 24–10）。\n\n向下滚动 **设置** 屏幕，你可以查看免费（或付费）账户的总使用量。\n\
  \n免费账户提供 40 MB 的数据，这可以存储超过 100,000 条文本笔记。点击 **近似剩余笔记数** 选项，可以大致了解这相当于多少图片或语音笔记。\n\
  \n如果你的空间不足，可以通过点击 **同步** 窗口顶部的 **升级为高级版** 选项进行升级。\n\n![images](img/2410.jpg)\n\n\
  **图 24–10.** ***印象笔记** 的 **设置** 屏幕*\n\n### 在电脑或其他移动设备上查看或更新印象笔记中的笔记\n\n**印象笔记**\
  \ 的一个很酷之处在于，它可以通过无线方式与你在印象笔记服务器上的账户同步或共享笔记。然后，你可以从你的 PC、Mac、iPhone 或黑莓登录你的账户，查看或更新笔记。如果你拥有多个设备，并希望随时保持最新状态或从任何设备添加笔记，这是一个非常棒的功能。在图\
  \ 24–11 中，我们登录了 [`www.evernote.com`](http://www.evernote.com) 网站，看到了与我们之前在 iPad\
  \ 上创建和查看的相同的笔记。\n\n![images](img/2411.jpg)\n\n**图 24–11. *印象笔记** *会自动将笔记同步到你网络账户中。*\n\
  \n## 第 25 章\n\n\n\n"
- "# iPad 上的蓝牙\n\n在本章中，我们将向您展示如何将 iPad 与任何蓝牙设备配对，无论是另一台电脑、立体声音箱，还是无线键盘配件。许多 iPad 用户惊讶地发现，iPad\
  \ 实际上标配了蓝牙 2.1 及其增强数据速率（EDR）技术。得益于名为 A2DP（立体声蓝牙）的技术，您还可以将音乐流式传输到兼容的蓝牙立体声设备。\n\n\
  **注意：** 您必须拥有兼容的第三方蓝牙适配器或蓝牙立体声设备，才能通过蓝牙技术流式传输音乐。此外，现在支持 AVRCP 配置文件，因此蓝牙设备上的许多音乐控制功能（包括\
  \ `Play`、`Pause` 或 `Skip`）都能正常工作。\n\n您可以将蓝牙视为一种短距离无线技术，它能让 iPad 无需线缆即可连接到各种外围设备。常见的设备包括耳机、电脑和车载音响系统。\n\
  \n蓝牙据信是以丹麦维京国王哈拉尔·蓝牙（Harald Blåtand）命名的，他的名字被翻译为 *Bluetooth*。蓝牙国王生活在十世纪，以统一丹麦和挪威而闻名。同样，蓝牙技术也统一了计算机和电信领域。根据传说，他的名字源于他非常黑的头发，这在维京人中并不常见。Blåtand\
  \ 意为深色肤色。还有一个更流行的故事，说这位国王非常喜欢吃蓝莓，以至于他的牙齿被染成了蓝色。\n\n我们使用以下链接作为此信息的来源；这些链接也是进一步了解蓝牙国王的好去处：\n\
  \n*   [`http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf`](http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf)\n\
  *   [`http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm`](http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm)\n\
  *   [`http://www.britannica.com/eb/topic-254809/Harald-I`](http://www.britannica.com/eb/topic-254809/Harald-I)\n\
  \n### 了解蓝牙\n\n| 蓝牙让您的 iPad 能够与设备进行无线通信。蓝牙是一种小型无线电，从每个设备中发射信号。在使用外围设备与 iPad 搭配之前，您需要先将其与设备进行*配对*以建立连接。许多蓝牙设备可以在距离\
  \ iPad 最远 30 英尺的范围内使用。 | ![images](img/p602-01.jpg) |\n\n#### 可与 iPad 配合使用的蓝牙设备\n\
  \n除其他外，iPad 可与蓝牙耳机、蓝牙立体声系统及适配器、蓝牙车载音响系统和蓝牙无线键盘配合使用。iPad 支持 A2DP，也就是*立体声蓝牙*。\n\n\
  **注意**：搭载 iOS 4.3 的 iPad 2 还可以与 iPhone 3GS 或 iPhone 4 配对，用于蓝牙网络共享。\n\n### 与蓝牙设备配对\n\
  \n您使用蓝牙的主要用途可能是蓝牙耳机、蓝牙立体声适配器或蓝牙键盘。任何蓝牙耳机都应能与您的 iPad 良好配合。要开始使用任何蓝牙设备，您需要先将其与 iPad\
  \ 配对（连接）。\n\n#### 开启蓝牙\n\n使用蓝牙的第一步是打开蓝牙无线电开关 `ON`。请按照以下步骤操作：\n\n![images](img/p602-04.jpg)\n\
  \n1.  轻点 `Settings`（设置）图标。\n\n    ![images](img/p602-02.jpg)\n\n2.  接着，在左栏中触摸 `General`（通用）标签。\n\
  \n    ![images](img/p602-03.jpg)\n\n3.  您会在右栏中看到 `Bluetooth`（蓝牙）标签。默认情况下，iPad 上的蓝牙初始状态为\
  \ `OFF`（关闭）。轻点开关将其切换到 `ON`（开启）位置。\n\n**提示：** 蓝牙会额外消耗电池电量。如果您计划在一段时间内不使用蓝牙，请考虑将开关重新设置为\
  \ `OFF`（关闭）。\n\n![images](img/p603-01.jpg)\n\n#### 将 iPad 与耳机或任何蓝牙设备配对\n\n一旦您将蓝牙设置为\
  \ `ON`（开启），iPad 就会开始搜索附近的蓝牙设备，例如蓝牙耳机或键盘（请参见[图 25–1]）要使 iPad 找到您的蓝牙设备，您需要将该设备置于*配对模式*。请仔细阅读耳机附带的说明书——通常需要按下某种组合按钮才能实现此操作。\n\
  \n**提示：** 有些耳机要求您按住一个按钮五秒钟，直到看到一系列闪烁的蓝色或红/蓝色灯光。某些配件，例如 Apple 无线蓝牙键盘，会自动以配对模式启动。\n\
  \n一旦 iPad 检测到蓝牙设备，它会尝试自动与之配对。如果配对自动完成，您就无需进行任何额外操作。\n\n![images](img/2501.jpg)\n\
  \n**图 25–1.** *已发现但尚未配对的蓝牙设备*\n\n如果[图 25–2]中的图像保持不变，请轻点该设备（例如 Motorola 立体声蓝牙耳机），以弹出一个要求输入配对\
  \ ID 的弹出窗口。\n\n**注意：** 对于键盘等蓝牙设备，您可能需要在键盘上输入一组随机生成的数字（通行码）。其他设备可能根本不需要 PIN 码——只需轻点设备名称，状态就会变为\
  \ `Connected`（已连接）（参见[图 25–2]）。\n\n![images](img/2502.jpg)\n\n**图 25–2.** *要配对蓝牙设备，请轻点列出的设备以输入通行码（如果需要），或直接将设备连接到\
  \ iPad。*\n\n| 如果 iPad 要求输入 PIN 码或通行码，键盘将会显示，您需要输入耳机制造商提供的四位通行码。大多数设备使用 0000 或 1234，这就是为什么\
  \ iPad 可以尝试自动与大多数设备配对。请查看您的耳机文档，以了解您设备的正确通行码或 PIN 码。 | ![images](img/p605-01.jpg)\
  \ |\n\n## 蓝牙立体声（A2DP）\n\n| ![images](img/p605-02.jpg) | 当今先进蓝牙技术的一大特色是能够通过蓝牙无线传输音乐。这项技术的专业名称是\
  \ A2DP，但通常被称为*立体声蓝牙*。 |\n\n### 连接到立体声蓝牙设备\n\n使用立体声蓝牙的第一步是连接到兼容的立体声蓝牙设备。这可以是内置此技术的车载音响系统，也可以是一副蓝牙耳机或音箱。\n\
  \n按照制造商的说明将蓝牙设备置于配对模式，然后按照本章前面演示的方法，从 `Settings`（设置）图标进入蓝牙设置页面。\n\n| 连接后，您将看到新的立体声蓝牙设备列在您的蓝牙设备下。有时它会简单地显示为“Headset”（耳机）。只需轻点该设备，您会在下一个屏幕中\
  \ `Bluetooth`（蓝牙）标签旁边看到实际设备名称，如下所示。 | ![images](img/p605-03.jpg) |\n| 接下来，轻点您的 `iPod`\
  \ 图标，开始播放任何歌曲、播放列表、播客或视频音乐库。您会注意到屏幕左上角的 `AirPlay` 图标（有关 `AirPlay` 的更多信息，请参见第 9 章和第\
  \ 10 章）。`AirPlay` 图标也控制着将音乐发送到蓝牙设备。轻点 `AirPlay` 图标，即可查看可用于流式传输音乐的蓝牙设备。**注意**：在 `Now\
  \ Playing`（正在播放）视图和 `Current`（当前）歌曲视图中，`Bluetooth` 图标都会显示在顶部，靠近 `Volume`（音量）栏的右侧。\
  \ | ![images](img/p606-01.jpg) |\n\n![images](img/2503.jpg)\n\n**图 25–3.** *选择蓝牙设备。*\n\
  \n在前面的屏幕中，您学习了如何通过轻点来选择 `Motorola Bluetooth Headset`（摩托罗拉蓝牙耳机）。您的音乐现在将开始从选定的蓝牙设备播放。您可以通过再次触摸屏幕上的\
  \ `Bluetooth` 图标来确认这一点。您应该会在新的立体声蓝牙设备旁边看到 `Speaker`（扬声器）图标，并且您应该能够听到音乐从该音源发出。\n\n\
  \n\n### 断开或忘记蓝牙设备\n\n有时，你可能想断开 iPad 上某个蓝牙设备的连接。\n\n操作很简单。按本章前文所述进入蓝牙设置。轻点你想断开的设备以进入下一屏幕，然后轻点**忘记此设备**按钮并确认你的选择。\n\
  \n**注意：** 蓝牙的有效范围只有约 30 英尺；如果你附近没有蓝牙设备或未使用蓝牙，应关闭 `Bluetooth`。当你实际需要使用时，可随时重新开启。\n\
  \n执行此操作将删除 iPad 上的蓝牙配置文件（参见图 25–4）。\n\n![images](img/2504.jpg)\n\n**图 25–4.** *忘记或断开蓝牙设备。*\n\
  \n## 第 26 章\n\n## 新媒体：阅读报纸、杂志等\n\n在第 12 章中，我们讨论了 iPad 如何革新了阅读世界。iPad 不仅是在电子书阅读领域无与伦比，在处理在线报纸、杂志、PDF\
  \ 文件等新媒体方面同样无可匹敌。\n\n在本章中，我们将探讨如何利用 iPad 鲜艳的屏幕和出色的触控界面来享受新媒体。iPad 甚至凭借精美且互动性极强的漫画书，让漫画行业重焕生机。\n\
  \n### iPad 上的报纸\n\n还记得报纸被送到家里的日子吗？总是如此，如果人行道上有一个水坑，那准是报纸掉落的地方！你从塑料袋里取出报纸，抖掉水珠，努力辨认第二版的内容——那个被浸湿的版面。\n\
  \n#### 进入 iPad 互动报纸时代\n\n好吧，那些日子可能一去不复返了。用户现在有机会与新闻互动，甚至每天都能收到报纸——不过是送到他们的 iPad\
  \ 上，而不是车道上。\n\n今年新推出的是新闻集团专为 iPad 打造的报纸：**《每日新闻》**。`The Daily` 是一款高度互动的新闻应用，每天早晨（目前仅限美国）直接推送至你的\
  \ iPad。\n\n许多报纸都在为 iPad 开发应用，几乎每天都有新的应用出现。我们还将快速浏览美国几家大报纸为 iPad 开发的应用，看看它们如何革新新闻阅读方式（参见图\
  \ 26–1）。\n\n![images](img/2601.jpg)\n\n**图 26–1.** *各种报纸应用的首页*\n\n#### 《每日新闻》\n\n\
  `The Daily` 值得特别提及，因为它是首款（很可能也是众多同类应用中的先驱）iPad 专属日报。该应用在 App Store 免费下载，并提供两周到一个月左右的免费试用期。\n\
  \n![images](img/p610-01.jpg)\n\n免费试用期结束后，`The Daily` 会转为订阅模式——与传统报纸类似。不过，其收费标准目前比传统报纸更优惠——每周仅需\
  \ 0.99 美元，全年订阅只需 39.99 美元。\n\n当你轻点 `The Daily` 应用图标时，首先会看到当天的新闻正在被检索并传输到 iPad。\n\
  \n![images](img/p610-02.jpg)\n\n新闻传输完成后，`The Daily` 的导航非常直观。体验从典型的 `Front Page`\
  \ 版块开始，显示当日的主要报道。\n\n然而，在页面顶部，你可以快速跳转到 `News`、`Gossip`、`Opinion`、`Arts and Life`、`Apps\
  \ and Games` 或 `Sports` 版块。只需轻点 `Front Page` 顶部所需的版块即可跳转。\n\n![images](img/p611-01.jpg)\n\
  \n顶部有一个 `Visual Browser`。轻点任意文章的顶部，即可查看 `The Daily` 所有页面的小缩略图。滚动浏览并找到你感兴趣的页面。\n\n\
  ![images](img/p611-02.jpg)\n\n轻点右上角的按钮，打开 `The Carousel` 视图，允许你以大型`逐页`图像的方式浏览 `The\
  \ Daily`。\n\n![images](img/p611-03.jpg)\n\n右下角有一个`控制面板`按钮。你可以在此观看每日视频、收听文章朗读，或自动播放\
  \ `The Carousel` 以找到你感兴趣的故事。\n\n![images](img/p612-01.jpg)\n\n轻点`分享`图标 ![images](img/p612-02.jpg)\
  \ ，即可轻松将故事的网络友好版分享给电子邮件联系人、Facebook 好友或 Twitter。\n\n![images](img/p612-03.jpg)\n\
  \n#### 热门选择：《纽约时报》、《华尔街日报》和《今日美国》\n\n这三家报纸的发行量都达数百万读者，每家都采用了不同的方式在 iPad 上为你呈现新闻。\n\
  \n**注意：** 你随时可以访问任何新闻源的专属网站。部分网站针对 iPad 进行了优化，而其他网站则提供完整的网页体验。还有部分网站需要注册和/或付费订阅才能查看报纸的全部内容。\n\
  \n你首先需要在 App Store 中按照几个步骤在 iPad 上查找、下载并安装一个新闻应用：\n\n![images](img/p613-01.jpg)\n\
  \n1.  第一步是在 App Store 中找到你想要的新闻应用。你可以在`精选`版块中找到一款或多款新闻应用。\n2.  接着，轻点页面底部的`类别`按钮，然后轻点`新闻`图标。这将带你进入\
  \ App Store 中的所有新闻应用。像搜索其他应用一样，浏览或搜索你想要的新闻应用。\n3.  找到想要的新闻应用后，像下载其他应用一样下载它。\n\n\
  \    **注意：** 许多新闻应用是免费的。其他一些应用可免费试用，但需要购买才能继续接收。还有一些应用提供有限的免费内容，但你需要订阅才能访问全部内容。\n\
  \n4.  应用下载完成后，轻点其图标即可启动。\n\n\n\n"
- '# 《纽约时报》应用


  *《纽约时报》*在其免费的 iPad 应用中提供了一个精简版的报纸。


  左下角有一个标有**版块**的按钮。点击**版块**按钮，所有可用的版块就会显示出来。


  需要注意的一点是，大多数版块旁边都有一个蓝点，这表示需要注册（订阅）才能查看。


  **要闻**和**最多邮件分享**版块始终可以查看。


  ![images](img/p614-01.jpg)


  **注意**：*《纽约时报》*最近转向了订阅模式。点击任何带有蓝点的版块，您将看到最新的定价。


  浏览**《纽约时报》**应用就像从右向左滑动屏幕一样简单。您可以通过点击一个版块，然后将屏幕向左滑动来查看该版块中的更多页面。再次点击一篇文章，然后再将屏幕向左滑动，即可继续阅读该文章的其余页面。


  要返回**主页**，请点击左下角的**要闻**按钮。


  要通过电子邮件发送文章，只需点击右上角的**邮件文章**按钮 ![images](img/p615-01.jpg)。此按钮仅在您阅读文章时可用，在**主页**上不可用。


  ![images](img/p615-02.jpg)


  ## 浏览与欣赏内容


  在体验了各种不同的**新闻**应用一段时间后，您会意识到，浏览这些应用并没有一个真正的统一标准。这意味着您需要熟悉每个应用及其独特的文章导航方式，以及如何返回**主**屏幕。以下是浏览这类应用的一般性指南：


  **显示或隐藏控制按钮或说明文字：** 轻点屏幕一次通常会显示隐藏的控制按钮或图片说明。再次轻点即可重新隐藏它们。


  **查看文章详情：** 通常，您需要点按文章或其标题才能进入下一个屏幕。


  **翻到文章下一页：** 通常，您向右滑动可以阅读更多内容。有时需要向上滑动。


  **观看视频：** 点按视频即可开始播放。通常，视频会在屏幕的同一区域内播放，不会扩展开。


  **放大视频或图片尺寸：** 您可以尝试在视频或图片内做张开手势，然后双击视频或图片。寻找**展开**按钮；您也可以尝试旋转至**横屏**模式。


  **缩小视频或图片尺寸：** 您可以尝试在视频或图片内做捏合手势。寻找**关闭**或**最小化**按钮；您也可以尝试旋转回**竖屏**模式。


