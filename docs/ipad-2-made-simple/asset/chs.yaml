- '# 自定义阅读体验：亮度、字体与字号


  在图书界面的右上角有三个图标，可帮助您获得更沉浸式的阅读体验（见图 12-2）。


  轻触**亮度**图标，即可调节图书的亮度。


  如果您在非常暗的房间里躺在床上阅读，可能需要将滑块一直向左滑动；而在室外阳光下阅读时，则可能需要一直向右滑动。请注意，调高屏幕亮度是 iPad 上较为耗电的操作之一，因此在不需要如此高亮度时，记得将其调回。


  ![images](img/p304-01.jpg)


  **注意：** 上述操作仅调节**iBooks**应用内的亮度。若要调节 iPad 的整体亮度，请使用**设置**应用中的控制项——点击**设置**图标，然后选择**亮度与墙纸**即可进入。


  ![images](img/1202.jpg)


  **图 12-2.** *在**iBooks**应用中调整字体大小*


  下一个**文本大小**图标可让您调整字号和字体。选中此图标后，可多次点击大**A**按钮来增大字号。


  要减小字号，请多次点击小**A**按钮。


  共有五种字体样式可供选择（您读到本书时，可能已有更多字体）。


  不妨尝试各种字体，享受其中的乐趣。默认字体是 Palatino；不过所有字体看起来都很棒，对部分读者而言，较大的字号能带来不同的阅读感受。目标是灵活调整字体，让这次阅读体验尽可能舒适愉悦。


  ![images](img/p305-01.jpg)


  ## 使用内置词典扩充词汇量


  iBooks 内置了功能强大的词典，当您遇到陌生或生僻的单词时，它会非常有用。


  **提示：** 使用内置词典是在阅读时扩充词汇量的简便绝佳方法。无需翻阅卷边的纸质词典查找单词，释义会立即弹出在弹出窗口中！


  调用词典再简单不过了。只需长按书中的任意单词，就会弹出一个包含以下选项的窗口：使用**词典**、设置**书签**、或使用**搜索**查找该单词的其他出现位置。


  ![images](img/p306-01.jpg)


  ![images](img/p306-02.jpg)


  轻触**词典**，将显示该单词的发音和释义。


  ## 设置页面内书签


  有时您可能希望在文本中设置书签以供日后参考。


  右上角包含一个**书签**图标。点击**书签**图标，该页面上的图标将变为红色书签。


  ![images](img/p306-03.jpg)


  要查看您的书签，请点击屏幕左上角的**目录**图标（位于**书库**图标旁），然后点击**书签**。点击高亮显示的书签，即可跳转到书中的相应章节。


  ![images](img/p307-01.jpg)


  **提示**：无需在每次离开**iBooks**时都设置书签。**iBooks**会自动记住您上次在书中读到哪一页。即使您跳转到另一本书，当返回到刚读的这本书时，也会精确回到上次中断的位置。iBooks
  现在还会与您的 iPhone 或 iPod touch 上的**iBooks**应用同步，因此您可以在不同设备之间切换阅读，并保持进度一致。


  ## 使用高亮和笔记功能


  **iBooks**应用内置了一些非常贴心的“附加功能”。有时您可能想高亮某个单词以便日后回顾；有时则可能想在页边空白处给自己留个笔记。


  在**iBooks**应用中完成这些操作都非常简单。不过，在**iBooks**中查看 PDF 文件时，此功能尚不可用。


  ### 高亮文本


  请按照以下步骤在您正在阅读的书中高亮文本：


  1.  长按任意单词，调出菜单选项。

  2.  从菜单中选择**高亮**。

  3.  若要移除高亮，长按高亮部分，然后选择**移除高亮**。


  若要更改高亮颜色，请执行以下操作：


  1.  长按高亮的单词。

  2.  从菜单中选择**颜色**。

  3.  选择一种新颜色（见图 12-3）。


  ![images](img/1203.jpg)


  **图 12-3.** *在**iBooks**中使用高亮功能*


  ### 添加笔记


  请执行以下操作在页边添加笔记：


  1.  长按任意单词，方法与之前相同。

  2.  从菜单中选择**笔记**。

  3.  输入您的笔记，然后点击**完成**。

  4.  笔记现在将显示在页面的侧边空白处（见图 12-4）。


  **提示**：您的笔记也会显示在标题页的书签下方。点击**标题页**按钮，然后点击**书签**。您写的笔记将位于页面底部。


  ![images](img/1204.jpg)


  **图 12-4.** *在 iBooks 中使用笔记功能*


  ## 使用搜索功能


  **iBooks**应用内置了强大的搜索功能。只需点击**搜索**栏（如同 iPad 上的其他应用程序），内置键盘便会弹出。输入要搜索的单词或短语，就会显示包含该单词的章节列表。


  只需轻触所需选择，即可跳转到书中的相应章节。您还可以通过点击**搜索**窗口底部的相应按钮，直接跳转至 Google 或 Wikipedia 进行搜索。


  ![images](img/p309-01.jpg)


  **注意：** 使用 Wikipedia 或 Google 搜索将带您离开**iBooks**并启动**Safari**。


  ## 删除图书


  从您的**iBooks**书库中删除图书，与从 iPad 上删除应用程序非常相似。


  在**书库**视图中，只需点击右上角的**编辑**按钮。![images](img/p310-01.jpg)


  ![images](img/p310-02.jpg)


  点击**编辑**按钮后，再点击任意图书，就会出现一个蓝色小勾。


  现在点击顶部的**删除** ![images](img/p310-03.jpg) 按钮，系统会提示您**删除**该图书。点击**删除**后，该书将从书架上消失。


  ![images](img/p310-04.jpg)


  ## 整理书架


  书架右上角有两个图标：**封面**视图和**列表**视图。书架默认排列方式是**封面**视图。


  请按照以下步骤切换到**列表**视图：


  1.  点击**封面**视图图标右侧的**列表**视图图标。

  2.  选择您希望图书按**书架**、**标题**、**作者**或**类别**排列。

  3.  点击底部的相应按钮，书架视图将根据您的选择进行变更。


  ![images](img/1205.jpg)


  **图 12-5.** *以**封面**或**列表**视图整理图书*


  ## 合集


  iBooks 新增了存储不同合集的功能。最常见的两个合集是**PDF**和**图书**。


  当您通过电子邮件收到 PDF（参见下一节示例）或通过 iTunes 传输 PDF 文件（参见第 29 章）时，可以选择在**iBooks**中**打开**该 PDF。它随后将被存储到您的
  PDF 合集中。




  '
- '# 在 iBooks 中阅读 PDF 文件


  `iBooks` 的一个非常酷的功能是能够阅读通过电子邮件发送或通过 iTunes 同步的 PDF 文件（参见第 3 章：“将 iPad 与 iTunes 同步”）。


  在本例中，一封包含 PDF 文件的电子邮件已到达，我们希望将其保存并在 `iBooks` 中查看。


  ![images](img/p312-01.jpg)


  请按照以下步骤打开通过电子邮件收到的 PDF 文件：


  1. 从电子邮件中打开该 PDF 文件。

  2. 在右上角，选择“用...打开”，然后选择“iBooks”。此时 PDF 文件将被归入 `iBooks` 的 PDF 类别中。

  3. PDF 文件保存在 PDF 区域。只需轻点文件即可打开它，并像阅读其他 iBook 一样进行阅读。

  4. 要删除 PDF 文件，请按照先前删除 iBook 的说明操作。


  **注意**：当您在电子邮件的 PDF 右上角选择“用...打开”时，所有可用的 PDF 阅读应用都会列出。从列表中选择“iBooks”即可在 `iBooks`
  中打开文件，或选择其他阅读器在该应用中打开文件。


  在您保存第一个 PDF 文件之前，您会看到“合集”列出，但没有任何文件存储。保存第一个 PDF 文件后，您的 PDF 文件将出现在“商店”按钮旁边的“合集”中。


  您可以轻点“合集”按钮，在“图书”和“PDF”类别之间切换。


  ![images](img/p313-01.jpg)


  ## 其他电子书阅读器：Kindle 与更多


  正如我们所提到的，`iBooks` 应用提供了无与伦比的电子书阅读体验。不过，iPad 上还有其他值得一试的电子书阅读器应用。


  ![images](img/p313-02.jpg)


  许多用户已经拥有 Kindle 并投入了不少资金购买 Kindle 书籍。其他用户则使用 `Kobo` 电子阅读器软件（以前称为 `Short covers`），并为该平台购买了书籍库。


  ![images](img/p314-01.jpg)


  幸运的是，这两个电子书平台在 iPad 应用商店中都有对应的应用。当其中任何一个程序被下载并安装后，您可以登录并在 iPad 上阅读您的完整书籍库。


  **注意：** 无论您选择哪种其他电子阅读器，您都只需登录相应的服务，即可查看完整的书籍库，并从上一次阅读的地方继续阅读——即使您是在不同设备上开始阅读的。


  ### 下载电子书阅读器应用


  前往应用商店。轻点“类别”，然后轻点“图书”。您会在显示的应用列表中找到 `Kindle` 和 `Kobo` 阅读器。这两款应用都是免费的，因此只需轻点“免费”按钮即可开始下载。


  **提示：** 如果您知道自己要找的是哪款应用，通常直接按名称*搜索*会更快捷。


  安装好所需的电子书阅读器软件后，轻点其图标启动应用。


  ### Kindle 阅读器


  亚马逊的 `Kindle` 阅读器是世界上最流行的电子阅读器。数百万用户拥有 Kindle 书籍；`Kindle` 阅读器允许他们在 iPad 上阅读这些 Kindle
  书籍。


  **提示：** 如果您使用 Kindle 设备，不必担心在 iPad 上登录的问题。您可以将多台设备绑定到同一个账户上。您将能够在 iPad 上安装的 `Kindle`
  阅读器中尽情享受为您 Kindle 购买的所有书籍。


  只需轻点 `Kindle` 阅读器，然后登录您的 Kindle 账户，或使用用户名和密码创建一个新账户。


  ![images](img/p315-01.jpg)


  登录后，您将在“主页”页面上看到您的 Kindle 书籍。您可以轻点某本书开始阅读，或者轻点“购物车”在 Kindle 商店中开始选购。


  ![images](img/p315-02.jpg)


  **注意：** 轻点“购物车”将启动您的 `Safari` 浏览器。之后，您可以购买 Kindle 书籍。购买完成后，您需要退出 `Safari` 并重新启动
  Kindle 阅读器。


  要阅读 Kindle 书籍，请轻点其封面。阅读选项位于底部的图标栏中。


  您可以通过轻点右上角的“书签”图标来添加书签。设置书签后，会显示一个小书签——就和 `iBooks` 应用中一样。


  您可以通过轻点“转到”按钮，跳转到书籍的封面、目录或任意指定位置（例如开头）。


  字体和页面颜色都可以调整。一个非常有趣的功能是能够将页面改为“黑色”，这在夜间阅读时非常棒。


  要翻到下一页，可以从右向左滑动，或轻点页面的右侧。要返回上一页，只需从左向右滑动，或轻点页面的左侧。


  轻点屏幕，底部会出现一个“滑块”控件。您可以调整此控件来跳转到书中的任意页面。


  ![images](img/p316-01.jpg)


  ### Kobo 阅读器


  与 `Kindle` 阅读器一样，`Kobo` 阅读器启动时会要求您登录现有的 Kobo 书籍账户。您所有的现有 Kobo 书籍随后即可供阅读。


  Kobo 采用类似 `iBooks` 的“书架”方式。轻点您想打开的任何一本书的封面。


  或者，您可以轻点“我正在阅读”选项卡，继续阅读上次阅读的内容。您也可以直接轻点“商店”选项卡前往 Kobo 商店购买书籍。


  ![images](img/p317-01.jpg)


  您可以在 `Kobo` 阅读器的顶部找到三个按钮：“目录”、“概览”和“书签”。


  ![images](img/p317-02.jpg)


  轻点任意按钮即可进入相应的功能。


  您还可以在底部找到四个图标：“字体”、“亮度”、“添加书签”和“显示设置”。轻点任意按钮即可调整您的查看设置。


  ![images](img/p318-01.jpg)


  要在 `Kobo` 阅读器中翻到下一页，请轻点页面右侧。要返回上一页，只需轻点页面左侧。您也可以使用底部的“滑块”控件来翻阅页面。


