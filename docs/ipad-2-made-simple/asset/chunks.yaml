- fmt: "### Saving or Copying Text and Graphics from a Web Site\n\nFrom time to time\
    \ you may see text or a graphic you want to copy from a web site. We tell you\
    \ briefly how to do this in this section, but to see graphically how to get it\
    \ done, including using the `**Cut**` and `**Paste**` functions, please see the\
    \ \"Copy and Paste\" section in [Chapter 2](#Chapter02.html#ch2). Here's a quick\
    \ look:\n\nTo copy a single word, touch and hold the word until you see it highlighted\
    \ and the `**Copy**` button appears. Then tap `**Copy**`.\n\nTo copy a few words\
    \ or entire paragraph, touch and hold a word until it is highlighted. Then drag\
    \ the blue dots left or right to select more text. You can flick up or down to\
    \ select an entire paragraph. Then tap `**Copy**`.\n\n**TIP:** Selecting a single\
    \ word puts it in `**Word Selection**` mode where you can drag to increase or\
    \ decrease the number of words selected. If you go past a single paragraph, it\
    \ will typically switch to `**Element Selection**` mode where instead of corners\
    \ you get edges that you can drag out to select multiple paragraphs, images, etc.\n\
    \nTo `**Save**` or `**Copy**` a graphic, touch and hold the picture or image until\
    \ you see the pop-up asking if you would like to `**Save**` or `**Copy**` the\
    \ image.\n\n### Using Browsing History to Save Time and Find Sites\n\nThe advantage\
    \ of keeping your frequently visited sites in history is that you can load them\
    \ from the `**History**` tab when you go into the browser menu (see [Figure 11-12](#Chapter11.html#fig_11_12)).\
    \ Also, sometimes you want to go back to a certain site, but you can't remember\
    \ the name; checking your history will show you the exact site you wish to visit.\n\
    \n![images](images/1112.jpg)\n\n**Figure 11-12.** *Using Browser History*\n\n\
    ## Chapter 12\n\n## iBooks and E-Books\n\nEver since the iPad was announced, one\
    \ of its most touted features has been its ability as an E-Book reader. In this\
    \ chapter, we will show you that what has emerged is an unparalleled book-reading\
    \ experience. We will cover the `**iBooks**` app, how to buy and download books\
    \ for it, and how to find some great free classic books. We will also show you\
    \ some other E-Book reading options on your iPad, including the third-party `**Kindle**`\
    \ and `**Kobo**` readers.\n\nThe iPad uses Apple's proprietary E-Book reader,\
    \ `**iBooks**`. In this chapter, we will show you how to download the `**iBooks**`\
    \ app, how to shop for books in the iBooks store, and how to take advantage of\
    \ all the features in the `**iBooks**` app.\n\nWith `**iBooks**`, you can interact\
    \ with a book like never before. You can turn pages, adjust font sizes, look up\
    \ words in the built-in dictionary, and search through your text.\n\nIn the App\
    \ Store, you can also find apps for Amazon's `**Kindle**` reader and other popular\
    \ E-Book readers.\n\n![images](images/p297-01.jpg)\n\n### Download iBooks\n\n\
    The first time you open the App Store on your iPad, you will be prompted to download\
    \ the free `**iBooks**` app. Select `**Download**` and `**iBooks**` will be downloaded\
    \ and installed on your iPad.\n\n![images](images/p297-02.jpg)\n\n### The iBooks\
    \ Store\n\nBefore you can start enjoying your reading experience, you need to\
    \ load up your iBooks library with titles. Fortunately, many books can be found\
    \ for free in the iBooks store, including the complete Gutenberg Collection of\
    \ classics and public domain titles.\n\nJust touch the `**Store**` button in the\
    \ upper left-hand corner of your bookshelf, and you will be taken to the iBooks\
    \ store.\n\n![images](images/p298-01.jpg)\n\nThe iBooks store is arranged much\
    \ like the App Store. There is a `**Categories**` button in the top left, next\
    \ to the `**Library**` button. Touch this to see all the available categories\
    \ from which you can choose your books.\n\n![images](images/p298-03.jpg)\n\nFeatured\
    \ books are highlighted on the front page of the store, with `**New**` and `**Notable**`\
    \ titles displayed for browsing.\n\nAt the bottom of the store are five soft keys:\
    \ `**Featured**`, `**NYTimes**`, `**Top Charts**`, `**Browse**`, and `**Purchases**`.\
    \ Touch the `**NYTimes**` button\n\n![images](images/p298-02.jpg)\n\nto see the\
    \ charts for the NYTimes bestsellers in fiction and non-fiction categories.\n\n\
    Touch the `**Top Charts**` button `[images](images/p299-01.jpg)` to see all the\
    \ bestselling and top free books in the store.\n\nTouch the `**Purchases**` `[images](images/p299-02.jpg)`\
    \ button to see all the books you have purchased or downloaded for your library.\n\
    \n![images](images/p299-03.jpg)\n\nPurchasing a book is much like purchasing an\
    \ app. Touch the book title that you are interested in and browse the description\
    \ and customer reviews. When you are ready to purchase the title, touch the `**Price**`\
    \ button.\n\n![images](images/p299-04.jpg)\n\n**NOTE:** Many titles have a sample\
    \ download. This is a great idea if you are not sure whether you want to purchase\
    \ a book. Downloading a sample is a great way to preview a book; you can always\
    \ purchase the full book from within the sample.\n\nOnce you decide to download\
    \ a sample or purchase a title, the view shifts to your bookshelf. At this point,\
    \ you can see the book being deposited onto your bookshelf. Your book is now available\
    \ for reading.\n\n![images](images/p300-01.jpg)\n\n**NOTE**: New downloads will\
    \ have the word “New” along the top of the right-hand corner.\n\n#### Using the\
    \ Search Window\n\nJust like iTunes and the App Store, iBooks gives you a `**Search**`\
    \ window into which you can type virtually any phrase. You can search for an author,\
    \ title, or series. Just touch the `**Search**` window and the on-screen keyboard\
    \ pops up. Type in an author, title, series, or genre of book.\n\n![images](images/p301-01.jpg)\n\
    \n**NOTE**: You can also use the `**Browse**` button at the bottom for searching.\
    \ For example, you can browse by author or category or use the `**Search**` box.\n\
    \n**TIP:** To search for lots of free books, perform a search for “Gutenberg Project”\
    \ to see the thousands of free public domain titles.\n\nYou will see suggestions\
    \ pop up that match your search; touch the appropriate suggestion to go to that\
    \ title.\n\n### Reading iBooks\n\nTouch any title in your bookshelf to open it\
    \ for reading. The book will open to the first page, which is often the title\
    \ page or other front matter in the book.\n\n![images](images/p302-01.jpg)\n\n\
    There is a `**Table of Contents**` button in the upper left-hand corner, next\
    \ to the `**Library**` button (see [Figure 12-1](#Chapter12.html#fig_12_1)). To\
    \ jump to the table of contents, touch either the `**Table of Contents**` button\
    \ or simply turn the pages until you see these pages.\n\n![images](images/1201.jpg)\n\
    \n**Figure 12-1.** *The `**iBooks**` page layout*\n\nYou can turn pages in one\
    \ of three ways:\n\n![images](images/p303-01.jpg)\n\n*   Touch the right-hand\
    \ side of the page to turn to the next page.\n*   Slowly touch and hold the screen\
    \ on the right-hand edge of the page. While still touching the screen, gently\
    \ and slowly move your finger to the left.\n\n    **TIP:** If you move your finger\
    \ very slowly, you can actually see the words on the backside of a page as you\
    \ “turn” it—a very cool visual effect.\n\n*   The last way to turn pages is to\
    \ use the `**Slider**` control at the bottom of the page. As you slowly slide\
    \ from left to right, you will see the page number on top of the `**Slider**`\
    \ control. Release the `**Slider**` control and you can advance to that particular\
    \ page number.\n\n![images](images/p303-02.jpg)"
