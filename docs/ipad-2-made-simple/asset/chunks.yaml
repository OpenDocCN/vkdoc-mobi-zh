- fmt: '### Assigning a Picture to a Contact


    [Chapter 14](#Chapter14.html#ch14): “Working with Contacts” covers how to add
    a picture when editing a contact. You can also find a picture you like and assign
    it to a contact. Begin by finding the photo you want to use.


    As you did when selecting wallpaper and emailing a photo, tap the `Options` button—the
    one furthest to the right of the upper row of soft keys. If you don''t see the
    icons, tap the screen once.


    ![images](images/p432-01.jpg)


    When you touch the `Options` button, you''ll see a drop-down list of choices:
    `Email Photo`, `Assign to Contact`, `Use as Wallpaper`, and `Copy Photo`.


    Touch the `Assign to Contact` button.


    ![images](images/p432-02.jpg)


    You will see your contacts on the screen. You can either perform a search using
    the `Search` bar at the top or just scroll through your contacts.


    ![images](images/p433-01.jpg)


    Once you find the contact to which you would like to add the picture, touch the
    name.


    You will then see the `Move and Scale` screen. Tap and drag the picture to move
    it; use pinch to zoom in or out.


    When you have it just as you want it, touch the `Use` button to assign the picture
    to that contact.


    ![images](images/p434-01.jpg)


    **NOTE**: You will return to your `Photo` library, not to the contact. If you
    want to double-check that the picture was set to your contact, exit the `Photo`
    app, start the `Contact` app, and then search for that contact.


    #### Deleting a Picture


    You might wonder why can''t you delete certain pictures from your iPad (i.e.,
    the `Trash Can` icon is missing).


    You''ll notice that the `Trash Can` icon is not visible for any photo that is
    synced from iTunes. You can delete such pictures only from your computer library.
    Then, the next time you sync your iPad, they will be deleted.


    ![images](images/p435-01.jpg)


    When you are looking through pictures in your `Camera Roll` (which is not synced
    with iTunes, but is comprised of pictures you save from email messages or download
    from the Web), you''ll see the `Trash Can` icon in the `Top` icon bar to the right.
    This `Trash Can` icon does not appear when you are viewing pictures from your
    `Photos` library or other synced albums.


    If you don''t see the bottom row of icons, tap the photo once to activate them.
    Then tap the `Trash Can` icon; you will be prompted with the option to delete
    the picture.


    Touch `Delete Photo` and the picture will be deleted from your iPad.


    ![images](images/p435-02.jpg)


    ### Downloading Pictures from Web Sites


    You now know how to transfer pictures from your computer to your iPad and save
    them from email messages. You can also download and save pictures right from the
    Web onto your iPad.


    **CAUTION**: We strongly encourage you to respect image copyright laws as you
    download and save images from the Web. Unless the web site indicates an image
    is free, you should check with the web site owner before downloading and saving
    any pictures.


    #### Finding a Picture to Download


    The iPad makes it easy to copy and save images from web sites. This can be handy
    when you are looking for a new image to use as wallpaper on your iPad.


    ![images](images/p436-01.jpg)


    First, tap the `Safari` web browser icon and search for iPad wallpaper to locate
    a few sites that might have some interesting possibilities (see [Chapter 11](#Chapter11.html#ch11):
    “Surf the Web with Safari” for help).


    ![images](images/p436-02.jpg)


    Once you find a picture you want to download and save, tap and hold it to bring
    up a new menu of options that includes `Save Image` (among others), as shown in
    [Figure 16–9](#Chapter16.html#fig_16_9). Choose this option to save the picture
    in your `Camera Roll` album.


    ![images](images/1609.jpg)


    **Figure 16–9.** *Saving an image from a web site*


    Now touch your `Photo` icon and you should see the picture in the `Camera Roll`
    album.


    ![images](images/p437-01.jpg)


    ### Photo Booth


    New to the iPad is a very fun piece of software that will be familiar to Mac users:
    `Photo Booth`. `Photo Booth` uses the front camera of the iPad and allows the
    user to create some very cool and different visual effects.


    ![images](images/p438-01.jpg)


    Start by touching the `Photo Booth` icon and you will see nine squares, each with
    a different visual image: `Thermal Camera`, `Mirror`, `X-Ray`, `Kaleidoscope`,
    `Normal`, `Light Tunnel`, `Squeeze`, `Twirl`, and `Stretch`.


    ![images](images/p438-02.jpg)


    Just touch one of the image choices and it will fill the screen.


    To capture one of the images, touch the `Camera` icon, just as if you were taking
    a picture. As you capture images, they will appear in a row towards the bottom
    of the screen.


    To return and choose a different image type, touch the icon in the lower-left
    corner.


    To use the back camera with the associated image type, just touch the `Switch
    Camera` button.


    ![images](images/p439-01.jpg)


    You can have a lot of fun with `Photo Booth`. The pictures you capture will be
    stored in your `Camera Roll`, so you can email them, post them to Facebook, and
    share them with the world!


    ## Chapter 17


    ## Recording and Editing Videos


    Your iPad is a very capable video recorder. You can record and export HD video
    up to 720p. You can then publish that video straight to YouTube or MobileMe or
    even send it to an email recipient. In this chapter, we will also show you how
    to shoot and quickly *trim* your videos, as well as upload them.


    ### Video Recording and Editing


    New to the iPad this year is the capability to record videos using the `Camera`
    app and to edit videos with the `iMovie` app that Mac users have been using for
    some time. With `iMovie`, you can actually create movies by joining movie clips,
    adding pictures and transitions, and then adding your own audio track. When you''re
    finished, you can upload the movie to the Web.


    In the next section, you will learn how to add video clips, audio, pictures, and
    transitions. You will also learn how to produce a high quality, high definition
    video right on your iPad.'
