    ##### Rubber/Silicone Cases ($10-$30)


    **What these do:** Provide a cushioned grip and should absorb iPadbumps and bruises.


    **Pros**: Inexpensive, colorful, and comfortable to hold.


    **Cons**: Not as professionalin appearance as a leather case.


    ##### Waterproof Cases ($10-$40)


    **What these do:** Provide waterproof protection for your iPad and allow you to
    safely use the iPad near water (in the rain, at the pool, at the beach, on a boat,
    and so forth).


    **Pros**: Provide good water protection.


    **Cons**: May make the touch screen harder to use; do not usually protect from
    drops or bumps.


    ##### Hard Plastic/Metal Case ($20-$100)


    **What these do:** Provide hard, solid protection against scratches, bumps, and
    short drops.


    **Pros**: Provide good protection.


    **Cons**: Add some bulk and weight.


    ##### Leather Book or Flip Cases ($40-$100+)


    **What these do:** Provide more of a luxury feel and protect the front and sides,
    as well as the back.


    **Pros**: Provide leather luxury feel and protect the front and the back.


    **Cons**: More expensive and add bulk and weight.


    ##### Screen and Back Cover Protectors ($5-$40)


    **What these do:** Protect the screen and back of the iPadfrom scratches.


    **Pros**: Help prolong life of your iPad and protect against scratches. Also,
    most such cases decrease screen glare.


    **Cons**: Some may increase glare or affect touch sensitivity of the screen.


    ### iPad Basics


    Now that you have your iPad charged with a clean screen, registered, and decked
    out with a new protective case, let''s take a look at some of the basics to help
    you get up and running.


    #### Powering On/Off and Sleep/Wake


    To power on your iPad, press and hold the **Power/Sleep** button on the top edge
    of the iPadfor a few seconds (see [Figure 1-11](#Chapter01.html#fig_1_11)). Simply
    tapping this button quickly won''t power on the iPad if it is completely off—you
    really need to hold it until you see the iPadpower on.


    When you are no longer using your iPad, you have two options: you can either put
    it into **Sleep** mode or turn it off completely.


    ![images](images/0111.jpg)


    **Figure 1-11.** *The **Power/Sleep**and **Home** buttons*


    The advantage of **Sleep** mode is that, when you want to use your iPadagain,
    a quick tap of the **Power/Sleep** button or the **Home** button will bring your
    iPadback awake. According to Apple, the iPad has up to a month of stand-by power.


    If you want to maximize your battery or if you know you won''t be using your iPadfor
    quite some time—say, when you go to sleep—you might want to turn it off completely.
    The way to do this is to press and hold the **Power/Sleep** button until you see
    the **Slide to Power Off** bar appear. Just slide the bar to the right and the
    iPadwill power off.


    #### The Home Button


    | ![Image](images/p67-01.jpg) | The key you will use most often is your **Home**
    button (see [Figure 1-11](#Chapter01.html#fig_1_11)). This button will begin everything
    you do with your iPad. Press it once to wake up your iPad (assuming it is in **Sleep**
    mode.) |


    Pressing the **Home** button will take you out of any application program and
    bring you back to your **Home** screen.


    **TIP:** Double-tapping your **Home**button can be set to do different things,
    such as starting the iPad function, search, and more(see how to configure this
    button in the section that follows).


    #### Multitask by Double-Clicking the Home Button


    One of the nice features of the iPad (new in iOS 4.2 and higher) is multitasking.
    This feature enables you to have more than one app open at a time. To multitask,
    simply double-click the **Home** button, then slide your finger back and forth
    to select an app to jump to.


    **TIP:** You''ll find more details on multitasking in [Chapter 8](#Chapter08.html#ch8):
    “Multitasking and Voice Control.”


    #### Volume Keys


    Located on the upper-right side of the iPad are simple **Volume Up**/**Volume
    Down** keys that you will find very handy (see [Figure 1-12](#Chapter01.html#fig_1_12)).
    In many places, you can also control the volume of the song, video, **FaceTime**
    call, or podcast playing by sliding your finger on the screen volume control.


    ##### FaceTime Ringer Volume


    If you''re not playing a song, video, or other content, pressing these **Volume**
    keys will adjust the volume of your **FaceTime** app''s ringer.


    **Tip**: Hold down the **Volume Down** key for about two seconds to quickly mute
    the sound on the iPad.


    ![images](images/0112.jpg)


    **Figure 1-12.** *The **Mute** / **Screen Rotation Lock** switch, **Volume Up/Down**
    keys, and **Home** button*


    | **TIP:** You can also adjust the volume of music playback using the **Slider**
    control in the upper-left corner of your **ipod** app. | ![Image](images/p69-01.jpg)
    |


    #### Rotation Lock / Mute Switch


    Just above the **Volume** keys, you will find the **Mute** / **Screen Rotation
    Lock** switch (see [Figure 1-12](#Chapter01.html#fig_1_12)).


    This particular switch has had a varied life on the iPad. If you owned an original
    iPad, then you know that this switch started out as a **Screen Rotation Lock**
    switch. Then Apple changed it to be simply a **Mute** switch in IOS 4.2\. With
    iOS 4.3 and later devices, you can now configure the function of this switch.


    To change the function of this switch, follow these steps:


    **5.** Tap **Settings**, then tap **General**.


    **6.** In the **Use Side Switch to:** section, select **Lock Rotation** or **Mute**


    ![Image](images/p70-01.jpg)


    Use this when you want to mute the iPad or force it to stop rotating the screen.
    The **Rotation Lock** is useful when you have your iPad sitting flat on your desk
    or in your lap, and you want to force it to stay in either **Portrait** or **Landscape**orientation.


    **TIP:** This is a great way to read iBooks in bed. Turn your iPad to **Landscape**
    mode, lock the screen rotation, and read your book. Check out [Chapter 12](#Chapter12.html#ch12):
    “iBooks and e-Books” for more.'
  trans: '

    #### 选购保护壳类型


    以下部分列出了几种可供选择的保护壳类型及其价格范围。


    ##### Apple iPad Smart Cover（塑料款约 40 美元，皮革款约 70 美元）


    **功能：** 保护壳上的磁铁可瞬间吸附在 iPad 上，实现稳固贴合。将保护壳向后折叠，即可形成一个舒适的低角度支架。


    **优点：** 颜色多样、重量轻，且由 Apple 专为 iPad 2 设计——这还需要我们多说什么吗？


    **缺点：** 无法很好地保护 iPad 免受磕碰或凹陷（设备背面无保护）。


    ![Image](img/p64-01.jpg)


    ##### 内置键盘的金属保护壳（约 100 美元）


    **功能：** 提供坚固的保护壳和内置蓝牙键盘。如果你经常在 iPad 上输入文字，这是一个非常小巧便捷的选择。


    **优点：** 相比单独购买保护壳和键盘更便宜。打字方便。


    **缺点：** 会增加设备的体积和重量。


    ![Image](img/p65-01.jpg)


    ##### 橡胶/硅胶保护壳（10-30 美元）


    **功能：** 提供缓冲握持感，可吸收 iPad 受到的碰撞和震动。


    **优点：** 价格低廉、颜色鲜艳、握持舒适。


    **缺点：** 外观不如皮革保护壳专业。


    ##### 防水保护壳（10-40 美元）


    **功能：** 为 iPad 提供防水保护，让你可以在靠近水的地方（雨天、泳池边、海滩、船上等）安全使用 iPad。


    **优点：** 提供良好的防水保护。


    **缺点：** 可能使触摸屏更难操作；通常无法防止跌落或碰撞。


    ##### 硬塑料/金属保护壳（20-100 美元）


    **功能：** 提供坚硬牢固的保护，防止刮擦、碰撞和短距离跌落。


    **优点：** 提供良好的保护。


    **缺点：** 会增加一些体积和重量。


    ##### 皮革书本式或翻盖保护壳（40-100 美元以上）


    **功能：** 提供更奢华的手感，并保护正面、侧面以及背面。


    **优点：** 提供皮革的奢华手感，同时保护正面和背面。


    **缺点：** 价格更贵，且会增加体积和重量。


    ##### 屏幕和背膜保护（5-40 美元）


    **功能：** 保护 iPad 屏幕和背面免受刮擦。


    **优点：** 有助于延长 iPad 的使用寿命并防止刮擦。此外，大多数此类保护膜还能减少屏幕眩光。


    **缺点：** 有些可能会增加眩光或影响屏幕触摸灵敏度。


    ### iPad 基础操作


    现在，你的 iPad 已经充满电、屏幕干净、完成注册并装上了崭新的保护壳，接下来让我们了解一些基础操作，帮助你快速上手。


    #### 开机/关机与睡眠/唤醒


    若要开启 iPad，按住 iPad 顶部边缘的`电源/睡眠`按钮几秒钟（参见图 1-11）。如果 iPad 完全关机，仅快速轻点此按钮是无法开机的——你必须按住它，直到看到
    iPad 开机。


    当你不再使用 iPad 时，有两个选择：可以将其置于`睡眠`模式，或者完全关机。


    ![images](img/0111.jpg)


    **图 1-11.** *`电源/睡眠`按钮与`主屏幕`按钮*


    `睡眠`模式的优势在于，当你想再次使用 iPad 时，只需快速轻点`电源/睡眠`按钮或`主屏幕`按钮，即可唤醒 iPad。据 Apple 称，iPad 的待机时间可长达一个月。


    如果你想最大限度地节省电量，或者知道会有相当长一段时间不使用 iPad（例如睡觉时），你可能想将其完全关机。操作方法是：按住`电源/睡眠`按钮，直到出现`滑动来关机`滑块。只需向右滑动滑块，iPad
    就会关机。


    #### 主屏幕按钮


    | ![Image](img/p67-01.jpg) | 你最常用的按键就是`主屏幕`按钮（参见图 1-11）。此按钮将开启你在 iPad 上的一切操作。按一下即可唤醒
    iPad（假设它处于`睡眠`模式）。 |


    按下`主屏幕`按钮将退出任何应用程序，并带你回到`主屏幕`。


    **提示：** 双击`主屏幕`按钮可以设置为执行不同的操作，例如启动 iPad 功能、搜索等（请参阅下一节了解如何配置此按钮）。


    #### 双击主屏幕按钮进行多任务处理


    iPad（iOS 4.2 及更高版本的新功能）的亮点之一是多任务处理。此功能让你可以同时打开多个应用。要进行多任务处理，只需双击`主屏幕`按钮，然后前后滑动手指即可选择要跳转到的应用。


    **提示：** 关于多任务处理的更多详细信息，请参见第 8 章：“多任务处理与语音控制”。


    #### 音量键


    iPad 右上侧设有简单的`音量增大`/`音量减小`键，你会发现它们非常方便（参见图 1-12）。在许多地方，你也可以通过在屏幕音量控制上滑动手指来控制歌曲、视频、`FaceTime`通话或播客的音量。


    ##### FaceTime 铃声音量


    如果你没有播放歌曲、视频或其他内容，按下这些`音量`键将调整你的`FaceTime`应用的铃声音量。


    **提示：** 按住`音量减小`键约两秒钟，可快速将 iPad 静音。


    ![images](img/0112.jpg)


    **图 1-12.** *`静音`/`屏幕旋转锁定`开关、`音量增大/减小`键及`主屏幕`按钮*


    | **提示：** 你也可以使用`ipod`应用左上角的`滑块`控制来调整音乐播放的音量。 | ![Image](img/p69-01.jpg) |


    #### 旋转锁定/静音开关


    就在`音量`键的上方，你可以找到`静音`/`屏幕旋转锁定`开关（参见图 1-12）。


    这个开关在 iPad 上有着多变的功能。如果你拥有初代 iPad，就会知道这个开关最初是作为`屏幕旋转锁定`开关使用的。然后 Apple 在 iOS 4.2
    中将其改为单纯的`静音`开关。在 iOS 4.3 及更高版本的设备中，你现在可以配置此开关的功能。


    要更改此开关的功能，请按以下步骤操作：


    **5.** 轻点`设置`，然后轻点`通用`。


    **6.** 在`使用侧边开关：`部分，选择`锁定屏幕旋转`或`静音`。


    ![Image](img/p70-01.jpg)


    当你想要将 iPad 静音或强制其停止旋转屏幕时，可使用此开关。当你的 iPad 平放在桌面上或腿上时，`旋转锁定`非常有用，你可以强制它保持`竖屏`或`横屏`方向。


    **提示：** 这是在床上阅读 iBooks 的好方法。将 iPad 旋转到`横屏`模式，锁定屏幕旋转，然后开始阅读你的书籍。更多信息请参见第 12 章：“iBooks
    与电子书”。

