    ##### Adding a Voice Recording a Note in Evernote


    | By tapping the **Microphone** icon in the Upper Bar when you are adding or editing
    a note, you can record your voice (or anything else around you) to add to your
    current note (see [Figure 24–5](#Chapter24.html#fig_24_5)). | ![images](images/p595-01.jpg)
    |


    ![images](images/2405.jpg)


    **Figure 24–5.** *Adding a voice recording to a note in **Evernote***


    #### Adding a Picture from Your Library to Your Note


    | You can easily add any picture from your Photo library to a note in **Evernote**
    by touching the **Photos** icon in the top of the **Edit Note** window (next to
    the **Save** button (see [Figure 24–6](#Chapter24.html#fig_24_6)). **Evernote**
    will even identify the text in the picture and make that text searchable. | ![images](images/p595-02.jpg)
    |


    ![images](images/2406.jpg)


    **Figure 24–6.** *Adding a photo from your library to a note in **Evernote***


    #### Emailing, Printing, Deleting, or Editing a Note


    | You may email or print your notes by touching the **Send** icon at the bottom
    of the screen, and then select it just as you would in the **Notes** app. | ![images](images/p596-01.jpg)
    |

    | To delete a note, tap the **Trash Can** icon on the Bottom Bar. | ![images](images/p596-02.jpg)
    |

    | Sometimes, you want to be sure you are seeing the latest information on your
    note, or you want to make sure the information you just added is synced to the
    Evernote server. To do this, tap the **Refresh** icon. | ![images](images/p596-03.jpg)
    |

    | To edit a note, just touch the **Pencil** icon at the bottom of the screen.
    This brings up the **Editing** screen. | ![images](images/p596-04.jpg) |


    #### Various Views of Notes in Evernote


    You have various options for customizing the way you view your notes in **Evernote**.
    Select any of the views listed across the top of the main screen: **All notes**,
    **Notebooks**, **Tags**, **Places**, or **Searches**.


    ![images](images/p596-05.jpg)


    Touch **All notes** to view all your notes.


    Touch **Notebooks** to see all your notebooks (see [Figure 24–7](#Chapter24.html#fig_24_7)).


    ![images](images/2407.jpg)


    **Figure 24–7.** ***Evernote**''s **Notebooks**, **Tags**, and **All Notes** views*


    #### The Evernote Places View


    One cool **Evernote** view is the **Places** view. You can have **Evernote** tag
    your notes by the place where you created them. For example, if you traveled to
    another state, province, or country, **Evernote** would track that you took notes
    in that particular region.


    [Figure 24–8](#Chapter24.html#fig_24_8) shows a note taken in California and several
    taken in Florida.


    ![images](images/2408.jpg)


    **Figure 24–8.** *The **Evernote Places** view*


    #### Evernote Viewing Options


    You have various options to customize the views of your notes in **Evernote**.
    Tap the **View options** tab under the **Search** box in the upper-right corner
    to customize your current view. In [Figure 24–9](#Chapter24.html#fig_24_9), we
    have customized the view by selecting **Title** for **Sort By** and **Thumbnails**
    for **View by**.


    ![images](images/2409.jpg)


    **Figure 24–9\. *Evernote***''s ***All Notes** view with the viewing options shown*


    #### Evernote Synchronization and Settings


    To synchronize your notes with the **Evernote** server for retrieval on your Mac,
    PC, or other Evernote-connected device (such as a BlackBerry or iPhone), you would
    touch the **Radar Dish** icon in the lower-right portion of the screen to make
    the **Settings** screen appear (see [Figure 24–10](#Chapter24.html#fig_24_10)).


    If you scroll down the **Settings** screen, you can check out the total usage
    of your Free (or paid) account.


    The Free account gives you 40 MB of data, which is more than 100,000 text notes.
    Tap the **Approximate notes remaining** option to get a feel for how many picture
    or voice notes this might include.


    If you are running out of space, then you might want to upgrade by touching **Go
    Premium** option in the top of the **Synchronization** window.


    ![images](images/2410.jpg)


    **Figure 24–10\. *Evernote***''s ***Settings** screens*


    #### Viewing or Updating Notes in Evernote on Your Computer or Other Mobile Device


    One of the cool things about **Evernote** is that it wirelessly synchronizes or
    shares notes with your account on the Evernote server. You can then log in to
    your account from your PC, Mac, iPhone, or BlackBerry to check out or update your
    notes. This is a great feature if you have multiple devices, and you would like
    to stay up-to-date or add notes from any of them. In [Figure 24–11](#Chapter24.html#fig_24_11),
    we logged into the [`www.evernote.com`](http://www.evernote.com) site and saw
    the same notes that we were creating and viewing on our iPad.


    ![images](images/2411.jpg)


    **Figure 24–11. *Evernote*** *syncs notes automatically to your account on the
    web.*


    ## Chapter 25'
  trans: '

    ### 另一款笔记应用：印象笔记（基础版免费）


    在 App Store 中，你会看到许多专为 iPad 设计的笔记应用。


    要了解一些最受欢迎的笔记相关应用，可以查看 TiPb.com 上列出的五款热门应用清单：


    `www.tipb.com/2010/03/05/tipb-top-5-iphone-note-apps-2/`


    | **印象笔记** 是较为热门的免费基础版笔记应用之一。如果你需要更多存储空间，可以按月或按年付费购买服务计划。请在 App Store 或 [`www.evernote.com`](http://www.evernote.com)
    上查看最新价格和功能。**印象笔记**的强大之处在于，当你在 **印象笔记** 中输入笔记时，你可以将其与你的 Mac、iPhone、黑莓或 PC 进行*自动同步*。所有文本均可搜索，你甚至可以使用
    **印象笔记** 进行*地理定位*（让你的 iPad 跟踪你的位置，并将其与特定笔记关联）。 | ![images](img/p592-02.jpg) |


    **提示**：你甚至可以使用 **印象笔记** 录制语音笔记。


    ### 开始使用印象笔记


    | 首先前往 App Store 下载 **印象笔记**。下载并安装完成后，你需要点击 **印象笔记** 图标启动应用。第一次使用 **印象笔记** 时，系统会提示你注册一个免费账户。输入你的电子邮件地址并设置密码，即可开始使用。
    | ![images](img/p593-01.jpg) |


    ### 添加笔记与添加标签


    | **主页** 屏幕会显示你的所有笔记。要添加新笔记，只需点击左下角的 **新笔记** 按钮，然后输入你的笔记内容。![images](img/p593-02.jpg)
    | ![images](img/p593-03.jpg) |

    | 为你的笔记取一个独特的标题，然后添加一些标签。这些标签有助于整理笔记，在搜索笔记时也很有用。在此示例中，我们设置了几个标签，包括“书籍”、“待办事项”和“工作”。如果我们将这些标签添加到相应的笔记中，那么笔记就可以按这些标签进行分类。![images](img/p594-01.jpg)
    | ![images](img/p594-02.jpg) |


    一旦你输入了几个用逗号分隔的标签，它们就会被添加到一个下拉列表中，方便以后选择。这也有助于避免输错任何标签（请参见图 24–4）。


    ![images](img/2404.jpg)


    **图 24–4.** *在 **印象笔记** 中为笔记添加标签*


    ### 在印象笔记中添加语音录音


    | 在添加或编辑笔记时，点击顶部栏中的 **麦克风** 图标，你可以录制你的声音（或周围其他声音）并将其添加到当前笔记中（请参见图 24–5）。 | ![images](img/p595-01.jpg)
    |


    ![images](img/2405.jpg)


    **图 24–5.** *在 **印象笔记** 中为笔记添加语音录音*


    ### 从照片库添加图片到笔记


    | 你可以通过点击 **编辑笔记** 窗口顶部的 **照片** 图标（位于 **保存** 按钮旁边，请参见图 24–6），轻松地将照片库中的任意图片添加到
    **印象笔记** 的笔记中。**印象笔记** 甚至能识别图片中的文字，并使这些文字变得可搜索。 | ![images](img/p595-02.jpg) |


    ![images](img/2406.jpg)


    **图 24–6.** *从照片库添加照片到笔记*


    ### 通过电子邮件发送、打印、删除或编辑笔记


    | 你可以通过点击屏幕底部的 **发送** 图标，然后像在 **备忘录** 应用中那样进行选择，从而通过电子邮件发送或打印你的笔记。 | ![images](img/p596-01.jpg)
    |

    | 要删除笔记，请点击底部栏的 **垃圾桶** 图标。 | ![images](img/p596-02.jpg) |

    | 有时，你需要确保看到笔记的最新信息，或者你刚添加的信息已同步到印象笔记服务器。为此，点击 **刷新** 图标即可。 | ![images](img/p596-03.jpg)
    |

    | 要编辑笔记，只需点击屏幕底部的 **铅笔** 图标。这会调出 **编辑** 屏幕。 | ![images](img/p596-04.jpg) |


    ### 印象笔记中的笔记查看方式


    你有多种选项可以自定义在 **印象笔记** 中查看笔记的方式。选择主屏幕顶部列出的任意视图：**所有笔记**、**笔记本**、**标签**、**地点** 或
    **搜索**。


    ![images](img/p596-05.jpg)


    点击 **所有笔记** 查看所有笔记。


    点击 **笔记本** 查看所有笔记本（请参见图 24–7）。


    ![images](img/2407.jpg)


    **图 24–7.** ***印象笔记** 的 **笔记本**、**标签** 和 **所有笔记** 视图*


    ### 印象笔记的地点视图


    **印象笔记** 的一个很酷的视图是 **地点** 视图。你可以让 **印象笔记** 根据你创建笔记的地点来标记笔记。例如，如果你旅行到了另一个州、省或国家，**印象笔记**
    会记录你在该特定区域记过笔记。


    图 24–8 显示了一条在加利福尼亚州创建的笔记，以及几条在佛罗里达州创建的笔记。


    ![images](img/2408.jpg)


    **图 24–8.** ***印象笔记地点** 视图*


    ### 印象笔记视图选项


    你有多种选项可以自定义 **印象笔记** 中的笔记视图。点击右上角 **搜索** 框下的 **视图选项** 标签，即可自定义当前视图。在图 24–9 中，我们通过为
    **排序方式** 选择 **标题**，为 **查看方式** 选择 **缩略图** 来自定义了视图。


    ![images](img/2409.jpg)


    **图 24–9.** ***印象笔记** 的 **所有笔记** 视图及其显示的视图选项*


    ### 印象笔记同步与设置


    要将你的笔记与 **印象笔记** 服务器同步，以便在你的 Mac、PC 或其他连接印象笔记的设备（如黑莓或 iPhone）上检索，你需要点击屏幕右下角的 **雷达碟**
    图标以调出 **设置** 屏幕（请参见图 24–10）。


    向下滚动 **设置** 屏幕，你可以查看免费（或付费）账户的总使用量。


    免费账户提供 40 MB 的数据，这可以存储超过 100,000 条文本笔记。点击 **近似剩余笔记数** 选项，可以大致了解这相当于多少图片或语音笔记。


    如果你的空间不足，可以通过点击 **同步** 窗口顶部的 **升级为高级版** 选项进行升级。


    ![images](img/2410.jpg)


    **图 24–10.** ***印象笔记** 的 **设置** 屏幕*


    ### 在电脑或其他移动设备上查看或更新印象笔记中的笔记


    **印象笔记** 的一个很酷之处在于，它可以通过无线方式与你在印象笔记服务器上的账户同步或共享笔记。然后，你可以从你的 PC、Mac、iPhone 或黑莓登录你的账户，查看或更新笔记。如果你拥有多个设备，并希望随时保持最新状态或从任何设备添加笔记，这是一个非常棒的功能。在图
    24–11 中，我们登录了 [`www.evernote.com`](http://www.evernote.com) 网站，看到了与我们之前在 iPad
    上创建和查看的相同的笔记。


    ![images](img/2411.jpg)


    **图 24–11. *印象笔记** *会自动将笔记同步到你网络账户中。*


    ## 第 25 章

