- fmt: '# Working with Individual Pictures


    Once you locate the picture you want to view, just tap it. The picture then loads
    onto the screen.


    **NOTE**: If your photos were shot in **Landscape** mode, they will not take up
    the full screen on your iPad.


    **TIP**: The picture here was shot in **Landscape** mode. To see it in a full
    screen, you have to turn your iPad on its side or just double-tap it to fill the
    screen.


    ![images](images/p422-01.jpg)


    # Moving Between Pictures


    The swipe gesture is used to move from one picture to the next. Just swipe your
    finger left or right across the screen, and you can move through your pictures.


    **TIP**: Drag your finger slowly to move more gradually through the picture library.


    ![images](images/p423-01.jpg)


    When you reach the end of an album, tap the screen once and you''ll see a tab
    in the upper-left corner that has the name of the photo album. Touch that tab
    and you''ll return to the thumbnail page of that particular album.


    ![images](images/p423-02.jpg)


    To get back to your main photo album page, touch the button that says **Albums**
    at the top of the screen.


    ![images](images/p423-03.jpg)


    ## Use the Thumbnail Bar to Move Between Pictures


    Instead of swiping left and right to move between your pictures, you can bring
    up the soft-key controls on the screen. To do this, simply tap the screen once.
    Tap it again to make the soft keys disappear.


    Along the very bottom of the screen, you''ll see a small **Thumbnail** bar over
    which you can gently slide your finger (see [Figure 16–4](#Chapter16.html#fig_16_4)).
    You can quickly slide through the whole album using this bar. You can also just
    tap a thumbnail to see that particular picture.


    ![images](images/1604.jpg)


    **Figure 16–4.** *Use the **Thumbnail** bar to advance through pictures.*


    # Zooming In and Out of Pictures


    There are two ways to zoom in and out of pictures on your iPad: double-tapping
    and pinching.


    ## Double-Tapping


    As the name suggests, *double-tapping* is a quick double-tap on the screen to
    zoom in on the picture, as shown in [Figure 16–5](#Chapter16.html#fig_16_5). You
    will be zoomed in to the spot where you double-tap. To zoom out, just double-tap
    once more.


    See [Chapter 1](#Chapter01.html#ch1): “Getting Started” for more help on double-tapping.


    ![images](images/1605.jpg)


    **Figure 16–5.** *Double-tapping on a picture to zoom*


    ## Pinching


    Also described in [Chapter 1](#Chapter01.html#ch1):“Getting Started,” *pinching*
    is a much more precise form of zooming in. While double-tapping zooms in or out
    only to one set level, pinching allows you to zoom in or out just a little bit
    or quite a lot.


    To pinch, hold your thumb and forefinger close together and then slowly (while
    touching the screen) separate them, making the picture larger. To zoom out, start
    with your thumb and forefinger apart and move them together.


    **NOTE**: Once you have activated the zoom feature using either method, you will
    not be able to easily swipe through your pictures until you return the picture
    to its standard size.


    # Viewing a Slide Show


    You can view the pictures in your photo album as a slide show if you''d like.
    Just tap the screen once to bring up the on-screen soft keys. In the upper-right
    corner is a **Slideshow** button—just touch it once to start the slide show. You
    can start the slide show from either the **Photo Library** screen of from any
    picture you are viewing.


    ![images](images/p426-01.jpg)


    **SlideshowOptions** let you adjust how long each picture remains on the screen.
    It also lets you choose music, transitions, and other settings, as shown in [Figure
    16–6](#Chapter16.html#fig_16_6). To end the slide show, just tap the screen.


    ![images](images/1606.jpg)


    **Figure 16–6.** *Configuring your slide show*


    ## Adjusting Slideshow Options


    ![images](images/p427-01.jpg)


    To configure a slideshow, you will need to change your settings. To do so, touch
    the **Settings** icon on the **Home** screen.


    Scroll down to the **Photos** tab and touch the screen. You will then see the
    various options you can use, including four options you can adjust for slideshows.


    ![images](images/p427-02.jpg)


    To specify how long to play each slide, touch the **Play Each Slide For** tab.
    You can choose a range between 2 and 20 seconds.


    ![images](images/p427-03.jpg)


    If you want pictures to repeat in a slideshow, just move the **Repeat** switch
    to **ON**.


    If you want the pictures to move in an order different from the way they are listed,
    choose **Shuffle**. Like the **Shuffle** command on the music player, this option
    will cause the pictures to play in a random order.


    ![images](images/p428-01.jpg)


    # Using a Picture as Your iPad Wallpaper


    For information on how to select and use a picture as your iPad wallpaper (and
    more wallpaper options), please go to [Chapter 7](#Chapter07.html#ch7): “Personalize
    and Secure your iPad.”


    **NOTE**: You can have different pictures for your **Home** screen and **Lock**
    screen or use the same picture for both.


    ## Emailing a Picture


    As long as you have an active Internet connection (see [Chapter 5](#Chapter05.html#ch5):
    “Wi-Fi and 3G Connectivity”), you can send any picture in your photo collection
    via email. Tap the **Options** button on the **Top** icon bar—usually the one
    furthest to the right (or second from the right if you have **AirPlay** enabled).
    If you don''t see the icons, tap the screen once.


    ![images](images/p429-01.jpg)


    Choose the **Email Photo** option and the **Mail** app will automatically launch
    (see [Figure 16–7](#Chapter16.html#fig_16_7)).


    ![images](images/1607.jpg)


    **Figure 16–7.** *Emailing a photo*


    Touch the **To** field as you did in [Chapter 13](#Chapter13.html#ch13):“Email
    on your iPad”and select the contact to receive the picture. Tap the **Blue +**
    button to add a contact.


    Type in a subject and a message, and then touch **Send** in the upper-right corner.
    That''s all there is to it.


    ![images](images/p430-01.jpg)


    # Email, Copy, or Delete Several Pictures At Once


    If you have several pictures you want to email, copy, or delete at the same time,
    you can do it from the **Thumbnail** view, as shown in [Figure 16–8](#Chapter16.html#fig_16_8).


    **NOTE**: The **copy** function allows you to copy and paste multiple pictures
    into an email message or other app. **Share** renames the image to `photo.png`;
    **copy-**and-**paste** leaves it with the DCIM folder file name, `.png`. When
    you select **Share**, a pop-up window will ask you if you want to send them in
    small, medium, large, or original size with the size of attachment in MB.


    At publishing time, you could share or email a maximum of five pictures. This
    may change with future software.


    ![images](images/1608.jpg)


    **Figure 16–8.** *Selecting multiple images to email*


    # AirPlay


    Just as with music and videos, you can use Apple''s proprietary **AirPlay** feature
    to “send” your pictures to your Apple TV (or another **AirPlay**-compatible device).


    The **AirPlay** icon is on the Top Icon Bar, furthest to the right. From any picture
    or album, touch the **AirPlay** icon. Next, choose the **AirPlay** device to “move”
    your pictures from your iPad to the larger screen of your TV.


    ![images](images/p431-01.jpg)


    # Printing a Picture


    New to iOS 4.3 is **AirPrint**. **AirPrint** is Apple''s proprietary built-in
    printing function. **AirPrint** works with pictures, documents, and other apps.
    The cool part: You don''t need to install printer drivers as you must on your
    PC or Mac.


    Follow these steps to print a picture:


    1.  Select any picture from your album, as you did previously.

    2.  Touch the **Envelope** icon.

    3.  Choose **Print** from the options.

    4.  **AirPrint** will search for a compatible **AirPrint** printer when you touch
    the **Printer Options** button.

    5.  Choose how many copies you want to print.

    6.  Touch the **Print** button and your picture will print out.


    ![images](images/p431-02.jpg)'
