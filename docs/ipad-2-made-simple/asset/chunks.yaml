  trans: "\n### iPad 上的漫画书\n\n随着 iPad 的出现，*新媒体*中一种有望复兴的题材是漫画书。iPad 凭借其相对较大的高清屏幕和强大的处理器，让漫画书的页面栩栩如生。\n\
    \n在我们撰写本书时，已经有一些不同的漫画书应用可供使用，但没有一家公司比漫威漫画公司更著名。\n\n在 App Store 中找到 `Marvel Comics`\
    \ 应用。进入 `Categories`，然后进入 `Books`。该应用是免费的，漫画书可以从应用内部购买。\n\n在 `Home` 屏幕底部有三个按钮：`My\
    \ Comics`、`Store` 和 `Settings`。你购买的内容将出现在 `My Comics` 标题下。\n\nApp Store 让你有机会下载免费漫画和单独出售的期刊。大多数每期售价\
    \ 1.99 美元。\n\n你可以看到顶部的四个标签：\n\n![images](img/p627-01.jpg)\n\n- `Featured`\n- `New`\n\
    - `Popular`\n- `Free`\n\n每个标签都会带你进入一个新的漫画列表供你浏览，很像 iTunes 商店。\n\n触摸 `Browse` 按钮，可以按\
    \ `Genre`、`Creator`、`Storylines/Arcs` 或 `Series` 浏览。或者你也可以输入搜索词来查找特定的漫画。\n\n你可以通过两种方式阅读漫画书。第一种，你可以滑动页面，一页一页地阅读。第二种，你可以双击一个画面进行`Zoom`放大，然后点击屏幕前进到连环漫画中的下一个画面。之后，你只需从右向左滑动即可前进一个画面；或者，如果你想后退，从左向右滑动。\n\
    \n要返回 `Home` 屏幕或查看屏幕选项，只需在屏幕上的任意位置触摸并保持大约一秒钟，然后松开。你会在右上角看到一个 `Settings` 按钮，底部有一个页面`Thumbnail`视图（就像\
    \ `Photos` 一样），左上角有一个 `Close` 按钮，可以将你带到 `Home` 屏幕。\n\n![images](img/p628-01.jpg)\n\
    \n**注意：** 此应用的开发者 `ComiXology` 也制作了包含漫威漫画的 `Comics` 应用，以及许多其他漫画，包括阿奇漫画、映像漫画和 Top\
    \ Cow。你还会在 App Store 中看到 DC 漫画和其他供应商。\n\n### 作为 PDF 阅读器的 iPad\n\n在第 12 章中，我们向你展示了如何在电子邮件中打开附件，包括\
    \ PDF 文件。虽然你可以阅读几乎任何类型的附件，但你无法选择将 PDF 文件保存到 iPad 上以供将来查看。\n\n幸运的是，有一些程序可以将 iPad\
    \ 变成一个功能强大的 PDF 查看程序。其中一个具有多种用途的程序是 `GoodReader`。\n\n`GoodReader` 应用在 App Store\
    \ 的 `Productivity` 部分。在出版时，该应用仅售 4.99 美元。\n\n![images](img/p629-01.jpg)\n\n####\
    \ 将文件传输到你的 iPad\n\n`GoodReader` 应用的一大优点是，你可以使用它将大型文件从你的 Mac 或 PC 无线传输到 iPad，以便在\
    \ `GoodReader` 应用中查看。你也可以像我们在第 3 章：“将 iPad 与 iTunes 同步”中讨论的那样，使用 `GoodReader`\
    \ 在 iTunes 中进行文档共享。按照以下步骤使用 `GoodReader` 传输文件：\n\n1.  触摸底部的 `Wi-Fi` 图标，调出 `Wi-Fi\
    \ Transfer Utility`。然后系统会提示你在浏览器中输入 IP 地址，如果你使用 `Bonjour` 服务，则输入 Bonjour 地址。\n\
    \n    ![images](img/p629-02.jpg)\n\n    ![images](img/2603.jpg)\n\n    **图 26–3**.\
    \ *链接 iPad 和电脑以上传文件*\n\n2.  将 `GoodReader` 弹出窗口中显示的地址输入到电脑的网页浏览器中。现在，你可以让你的电脑充当服务器。你会看到你的电脑和\
    \ iPad 现在已连接（参见图 26–3）。\n3.  在电脑的网页浏览器中点击 `Choose File` 按钮，找到要上传到 iPad 的文件。\n\
    4.  选择文件后，点击 `Upload Selected File`，文件将自动传输到 `GoodReader` 中的 iPad 上（参见图 26–4）。\n\
    \n![images](img/2604.jpg)\n\n**图 26–4.** *将文件上传到你的 iPad*\n\n为什么这很有用？嗯，对其中一位作者（加里）来说，iPad\
    \ 已经成为存放超过 300 首钢琴乐谱的存储库。这意味着不再需要下载 PDF 文件、打印出来、装进活页夹，然后试图记住哪首歌在哪个活页夹里。现在，他所有的音乐都编录在\
    \ iPad 上。他只需把 iPad 放在钢琴上，就可以在一个地方访问他所有的音乐。\n\n**注意：** 你也可以用同样的方式传输 `Word`、`Excel`\
    \ 和 `PowerPoint` 文件。我们认为，使用 iTunes 中的文档传输工具可能会让这件事更简单一些（更多信息请参见第 19 章：“生产力与文件传输”）。\n\
    \n浏览 `GoodReader` 应用的 PDF 阅读器相当容易。快速点击屏幕中央以调出屏幕控制。然后你可以进入你的资料库，或触摸 `Turn Page`\
    \ 图标来翻页。\n\n浏览页面最简单的方式就是直接在屏幕上从右向左滑动。\n\n你也可以向上或向下轻拂来翻页。\n\n要转到另一个 PDF 文件或另一份乐谱，只需快速点击\
    \ iPad 屏幕中央，然后触摸左上角的 `My Documents` 按钮即可。\n\n![images](img/p632-01.jpg)\n\n####\
    \ 使用 GoodReader 连接到 Google Docs 和其他服务器\n\n你还可以使用 `GoodReader` 连接到 `Google Docs`\
    \ 和其他服务器。请按照以下步骤操作：\n\n1.  在 `GoodReader` 屏幕右侧的 `Connect to Servers` 标签中，点击 `Add`\
    \ 按钮（参见图 26–5）。\n2.  选择 `Google Docs`。你可以从多个不同的服务器中选择，包括邮件服务器、MobileMe iDisk、Public\
    \ iDisk、Dropbox、box.net、FilesAnywhere.com、MyDisk.se、WebDAV 服务器和 FTP 服务器。\n3. \
    \ 输入你的 `Google Docs` 用户名和密码进行登录。\n4.  连接成功后，一个新的 `GoogleDocs Server` 图标将出现在页面右侧的\
    \ `Connect to Server` 标签下。\n5.  点击新的 `Google` 标签以连接到服务器。（需要互联网连接才能连接。）\n6.  现在你将看到存储在你\
    \ `Google Docs` 中的所有文档列表。点击任意文档并选择要下载的文件类型。通常 PDF 格式效果很好。\n7.  文件下载完成后，它将出现在 `GoodReader`\
    \ 的左侧。只需点击该文件即可打开它。\n\n![images](img/2605.jpg)\n\n**图 26–5.** *将 `GoodReader`\
    \ 连接到其他文档服务器*\n\n## 第 27 章\n\n## 地图\n\n在你的 iPad 上使用地图，无论你拥有的是 3G+Wi-Fi 还是仅 Wi-Fi\
    \ 型号，都非常出色。在本章中，当我们探索 `Maps` 应用的功能时，你将看到如何在地图上找到你的位置——即使你只是使用 Wi-Fi。你将学习如何在 `Classic`、`Satellite`、`Hybrid`\
    \ 和 `Terrain` 视图之间切换。你还将看到，如果需要找出最佳路线，如何使用 `Maps` 查看交通和施工视图。如果你想找到离目的地最近的披萨餐厅、高尔夫球场或酒店，那也很容易。而且你可以直接从你的\
    \ iPad 使用谷歌的 `Street View` 来帮助你到达目的地。将已在地图上标记的地址添加到你的通讯录中也很容易。还有一个数字罗盘功能，非常方便，也很有趣。\n"
- fmt: "# Getting Started with Maps\n\nThe beauty of the iPad is that the apps are\
    \ designed to work with one another. You’ve already seen how your **Contacts**\
    \ are linked to the **Maps** app.\n\n![images](images/p635-01.jpg)\n\nThe **Maps**\
    \ app is powered by Google Maps—the leader in mobile mapping technology. With\
    \ **Maps** you can locate your position, get directions, search for things nearby,\
    \ see traffic, and much more. Simply touch the **Maps** icon to get started.\n\
    \n## Determining Your Location (the Blue Dot)\n\nWhen you start the **Maps** program,\
    \ you can follow these steps to have it start at your current location:\n\n1.\
    \  Tap the **Arrow** icon at the center of the Top Nav Bar.\n\n    ![images](images/p636-01.jpg)\n\
    \n    ![images](images/p636-02.jpg)\n\n2.  Maps will ask to use your current location—touch\
    \ **OK** or **Don’t Allow**. We suggest choosing **OK**, which makes it much easier\
    \ to find directions from or to your current location.\n\n![images](images/p636-03.jpg)\n\
    \n**NOTE:** Even if you only have the Wi-Fi-equipped iPad, it will still be able\
    \ to find your approximate location. The Wi-Fi iPad uses router-based locations.\
    \ This is usually accurate, but if someone moved to a new state with an old router,\
    \ the iPad might think you are still in that old location.\n\n## Various Map Views\n\
    \nThe default view for **Maps** is **Classic**, a basic map with a generic background\
    \ and streets shown with their names. **Maps** can also show you a **Satellite**\
    \ view, or a combination of **Satellite** and **Classic** views called **Hybrid**.\
    \ There’s also the new **Terrain** view, which looks like a relief map. Finally,\
    \ another view called **List** view appears only when you perform a search that\
    \ generates a list of turn-by-turn directions. You can switch among all the views\
    \ using the steps described in the next section.\n\n### Changing Your Map Views\n\
    \nFollow these steps to change from one map view to another:\n\n1.  Touch the\
    \ turned-up edge of the map in the lower-right corner.\n2.  The corner of the\
    \ map turns up to reveal buttons for views, **Traffic**, **Drop Pins**, and more\
    \ (see [Figure 27–1](#Chapter27.html#fig_27_1)). Tap the view you’d like to switch\
    \ to:\n    *   **Classic:** a regular map with street names (see [Figure 27–2](#Chapter27.html#fig_27_2)).\n\
    \    *   **Satellite:** a satellite picture with no street names (see [Figure\
    \ 27–1](#Chapter27.html#fig_27_1)).\n    *   **Hybrid:** a combination of **Satellite**\
    \ and **Classic** views; that is, a **Satellite** view with street names ([Figure\
    \ 27–2](#Chapter27.html#fig_27_2)).\n    *   **Terrain:** a relief map showing\
    \ the terrain such as mountains (see [Figure 27–3](#Chapter27.html#fig_27_3)).\n\
    \n![images](images/2701.jpg)\n\n**Figure 27–1. *Satellite*** *view and how to\
    \ change to another map view*\n\n![images](images/2702.jpg)\n\n**Figure 27–2.\
    \ *Hybrid* and *Classic* views with traffic enabled**\n\n![images](images/2703.jpg)\n\
    \n**Figure 27–3. *Terrain* view — a relief map of the Rocky Mountains west of\
    \ Denver, Colorado**\n\nAs noted, **List** view is only available when your search\
    \ produces multiple results (like `\"pizza 32174\"`) or you’ve asked for directions,\
    \ as shown in [Figure 27–4](#Chapter27.html#fig_27_4).\n\n![images](images/2704.jpg)\n\
    \n**Figure 27–4. *List* views for directions and search results**\n\n### Checking\
    \ Traffic\n\nYour **Maps** program can do much more than tell you how to get somewhere;\
    \ it can also check traffic along the way. This feature is supported only in the\
    \ US for now. Follow these steps to check local traffic:\n\n1.  Tap the lower-right\
    \ corner of the map to see the options.\n2.  Turn **Traffic** to **ON**.\n\n**TIP:**\
    \ You can also “turn” the page like a book to get to this view. The animation\
    \ is just like the one in the **iBooks** app.\n\n![images](images/p640-01.jpg)\n\
    \nIf there is a traffic situation on a highway, you usually see yellow lights\
    \ instead of green ones; and sometimes, the yellow lights might be flashing to\
    \ alert you to traffic delays. You may even see **Construction Worker** icons\
    \ to indicate construction zones.\n\n**Maps** uses the following colors on major\
    \ streets and highways to indicate the speed that traffic is moving:\n\nGreen\
    \ = 50 MPH or more  \nYellow = 25 – 50 MPH  \nRed = Less than 25 MPH  \nGray (or\
    \ no color) = No traffic data is currently available\n\n![images](images/p640-02.jpg)\n\
    \n## Search for Anything\n\nBecause **Maps** is tied to Google Maps, you can search\
    \ for and find just about anything: a specific address, a type of business, a\
    \ city, or other point of interest, as shown in [Figure 27–5](#Chapter27.html#fig_27_5).\
    \ Follow these steps to find a location:\n\n1.  Touch the **Search** bar in the\
    \ top-right corner of the screen.\n2.  Type in your address, a point of interest,\
    \ or a town and state you would like to map on your iPad.\n\n![images](images/p641-01.jpg)\n\
    \n**Google Maps Search Tips**\n\nYou can enter just about anything in the search:\n\
    \n*   First Name, Last Name, or Company Name (to match your Contacts)\n*   123\
    \ Main Street, City (some or all of a street address)\n*   Orlando Airport (find\
    \ an airport)\n*   Plumber, painter, or roofer (any part of a business name or\
    \ trade)\n*   Golf courses + city (find local golf courses)\n*   Movies + city\
    \ or ZIP/postal code (find local movie theaters)\n*   Pizza 32174 (search for\
    \ local pizza restaurants in ZIP Code 32174)\n*   95014 (ZIP Code for Apple Computer\
    \ headquarters in California, USA)\n*   Apress Publishing\n\n![images](images/2705.jpg)\n\
    \n**Figure 27–5. *Searching in the Maps app**\n\nTo use numbers, tap the **123**\
    \ key on the keyboard. For letters, touch the **ABC** key to switch back to a\
    \ letter-based keyboard.\n\n## Mapping Options\n\nNow that your address is on\
    \ the **Maps** screen, there are a number of options available to you. Touch the\
    \ **Blue Information** icon ![images](images/p642-01.jpg) next to the address\
    \ to see some of these options. If you have mapped a particular place or one of\
    \ your contacts, you’ll see the details as shown in [Figure 27–6](#Chapter27.html#fig_27_6).\
    \ You can also get directions, share a location, or add as a bookmark.\n\n![images](images/2706.jpg)\n\
    \n**Figure 27–6. *Touch the Blue Information button to see the mapped location\
    \ or contact details**\n\nIf you have mapped an address or point of interest,\
    \ you’ll see a different screen when you tap the **Blue Information** button.\
    \ You’ll find a small street view image and buttons to get **Directions**, **Add\
    \ to Contacts**, **Share Location**, or **Add to Bookmarks**, as shown to the\
    \ right.\n\n![images](images/p643-01.jpg)\n\n### Working with Bookmarks\n\nBookmarks\
    \ work in **Maps** very much as they do in the **Safari** web browser app. A bookmark\
    \ simply sets a record of places you’ve visited or mapped and want to remember\
    \ in the future. It is always easier to look at a bookmark than to perform a new\
    \ search.\n\n#### Adding a New Bookmark\n\nBookmarking a location is a great way\
    \ to make it easy to find that place again. Follow these steps to do so:\n\n1.\
    \  Map a location, as shown in [Figure 27–7](#Chapter27.html#fig_27_7).\n2.  Touch\
    \ the **Blue Information** icon next to the address.\n3.  Touch **Add to Bookmarks**.\n\
    \n    ![images](images/2707.jpg)\n\n    **Figure 27–7. *Adding a bookmark**\n\n\
    4.  Edit the bookmark name to make it short and recognizable—in this case, we\
    \ edited the address to simply say *Fenway Park*.\n5.  When you are done, touch\
    \ **Save** in the top-right corner.\n\n**TIP:** You can search for bookmark names\
    \ just as you search for names in your Contacts."
