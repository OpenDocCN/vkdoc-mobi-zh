    \ however, you can quickly jump sections to **News, Gossip, Opinion, Arts and\
    \ Life, Apps and Games,** or **Sports**. Just touch the desired section at the\
    \ top of the **Front Page** to jump there.\n\n![images](images/p611-01.jpg)\n\n\
    At the top is a **Visual Browser**. Touch the very top of any article and you\
    \ can see small thumbnails of all the pages of **The Daily**. Just scroll through\
    \ and find the page that interests you.\n\n![images](images/p611-02.jpg)\n\nTapping\
    \ the button in the upper-right corner opens up **The Carousel** view, which allows\
    \ you to browse **The Daily** in large **page-by-page** images.\n\n![images](images/p611-03.jpg)\n\
    \nThe lower-right corner has a button for the **Control Panel**. This allows you\
    \ to watch a daily video, listen to stories read aloud, or autoplay through **The\
    \ Carousel** to find a story that interest you.\n\n![images](images/p612-01.jpg)\n\
    \nTap the **Share** icon ![images](images/p612-02.jpg) and you can easily share\
    \ a web-friendly version of the story with e-mail contacts, Facebook Friends,\
    \ or on Twitter.\n\n![images](images/p612-03.jpg)\n\n#### Popular Choices: The\
    \ New York Times, The Wall Street Journal, and USA Today\n\nEach of these three\
    \ papers has a circulation of millions of readers, and each has taken a different\
    \ approach to bringing you the news on the iPad.\n\n**NOTE:** You can always go\
    \ and visit the dedicated web site for any news source. Some are optimized for\
    \ the iPad, while others offer you a full web experience. Others will require\
    \ registration and/or a paid subscription to view the paper's full content.\n\n\
    You must first follow several steps in the App Store to find, download, and install\
    \ a news app on the iPad:\n\n![images](images/p613-01.jpg)\n\n1.  The first step\
    \ is to locate your desired news app in the App Store. You may find one or more\
    \ news apps in the **Featured** section.\n2.  Next, touch the **Categories** button\
    \ at the bottom of the page and then touch the **News** icon. This takes you to\
    \ all the news apps in the App Store. Browse or search for your desired news app,\
    \ just as you would for any other app.\n3.  Once you locate the desired news app,\
    \ download it as you would any other app.\n\n    **NOTE:** Many news apps are\
    \ free. Others are free to try, but require you to buy them to continue receiving\
    \ them. Still others offer limited free content, but you need to subscribe to\
    \ gain access to the full content.\n\n4.  Once the app is downloaded, touch its\
    \ icon to start it."
  trans: "\n### 断开或忘记蓝牙设备\n\n有时，你可能想断开 iPad 上某个蓝牙设备的连接。\n\n操作很简单。按本章前文所述进入蓝牙设置。轻点你想断开的设备以进入下一屏幕，然后轻点**忘记此设备**按钮并确认你的选择。\n\
    \n**注意：** 蓝牙的有效范围只有约 30 英尺；如果你附近没有蓝牙设备或未使用蓝牙，应关闭 `Bluetooth`。当你实际需要使用时，可随时重新开启。\n\
    \n执行此操作将删除 iPad 上的蓝牙配置文件（参见图 25–4）。\n\n![images](img/2504.jpg)\n\n**图 25–4.**\
    \ *忘记或断开蓝牙设备。*\n\n## 第 26 章\n\n## 新媒体：阅读报纸、杂志等\n\n在第 12 章中，我们讨论了 iPad 如何革新了阅读世界。iPad\
    \ 不仅是在电子书阅读领域无与伦比，在处理在线报纸、杂志、PDF 文件等新媒体方面同样无可匹敌。\n\n在本章中，我们将探讨如何利用 iPad 鲜艳的屏幕和出色的触控界面来享受新媒体。iPad\
    \ 甚至凭借精美且互动性极强的漫画书，让漫画行业重焕生机。\n\n### iPad 上的报纸\n\n还记得报纸被送到家里的日子吗？总是如此，如果人行道上有一个水坑，那准是报纸掉落的地方！你从塑料袋里取出报纸，抖掉水珠，努力辨认第二版的内容——那个被浸湿的版面。\n\
    \n#### 进入 iPad 互动报纸时代\n\n好吧，那些日子可能一去不复返了。用户现在有机会与新闻互动，甚至每天都能收到报纸——不过是送到他们的 iPad\
    \ 上，而不是车道上。\n\n今年新推出的是新闻集团专为 iPad 打造的报纸：**《每日新闻》**。`The Daily` 是一款高度互动的新闻应用，每天早晨（目前仅限美国）直接推送至你的\
    \ iPad。\n\n许多报纸都在为 iPad 开发应用，几乎每天都有新的应用出现。我们还将快速浏览美国几家大报纸为 iPad 开发的应用，看看它们如何革新新闻阅读方式（参见图\
    \ 26–1）。\n\n![images](img/2601.jpg)\n\n**图 26–1.** *各种报纸应用的首页*\n\n#### 《每日新闻》\n\
    \n`The Daily` 值得特别提及，因为它是首款（很可能也是众多同类应用中的先驱）iPad 专属日报。该应用在 App Store 免费下载，并提供两周到一个月左右的免费试用期。\n\
    \n![images](img/p610-01.jpg)\n\n免费试用期结束后，`The Daily` 会转为订阅模式——与传统报纸类似。不过，其收费标准目前比传统报纸更优惠——每周仅需\
    \ 0.99 美元，全年订阅只需 39.99 美元。\n\n当你轻点 `The Daily` 应用图标时，首先会看到当天的新闻正在被检索并传输到 iPad。\n\
    \n![images](img/p610-02.jpg)\n\n新闻传输完成后，`The Daily` 的导航非常直观。体验从典型的 `Front Page`\
    \ 版块开始，显示当日的主要报道。\n\n然而，在页面顶部，你可以快速跳转到 `News`、`Gossip`、`Opinion`、`Arts and Life`、`Apps\
    \ and Games` 或 `Sports` 版块。只需轻点 `Front Page` 顶部所需的版块即可跳转。\n\n![images](img/p611-01.jpg)\n\
    \n顶部有一个 `Visual Browser`。轻点任意文章的顶部，即可查看 `The Daily` 所有页面的小缩略图。滚动浏览并找到你感兴趣的页面。\n\
    \n![images](img/p611-02.jpg)\n\n轻点右上角的按钮，打开 `The Carousel` 视图，允许你以大型`逐页`图像的方式浏览\
    \ `The Daily`。\n\n![images](img/p611-03.jpg)\n\n右下角有一个`控制面板`按钮。你可以在此观看每日视频、收听文章朗读，或自动播放\
    \ `The Carousel` 以找到你感兴趣的故事。\n\n![images](img/p612-01.jpg)\n\n轻点`分享`图标 ![images](img/p612-02.jpg)\
    \ ，即可轻松将故事的网络友好版分享给电子邮件联系人、Facebook 好友或 Twitter。\n\n![images](img/p612-03.jpg)\n\
    \n#### 热门选择：《纽约时报》、《华尔街日报》和《今日美国》\n\n这三家报纸的发行量都达数百万读者，每家都采用了不同的方式在 iPad 上为你呈现新闻。\n\
    \n**注意：** 你随时可以访问任何新闻源的专属网站。部分网站针对 iPad 进行了优化，而其他网站则提供完整的网页体验。还有部分网站需要注册和/或付费订阅才能查看报纸的全部内容。\n\
    \n你首先需要在 App Store 中按照几个步骤在 iPad 上查找、下载并安装一个新闻应用：\n\n![images](img/p613-01.jpg)\n\
    \n1.  第一步是在 App Store 中找到你想要的新闻应用。你可以在`精选`版块中找到一款或多款新闻应用。\n2.  接着，轻点页面底部的`类别`按钮，然后轻点`新闻`图标。这将带你进入\
    \ App Store 中的所有新闻应用。像搜索其他应用一样，浏览或搜索你想要的新闻应用。\n3.  找到想要的新闻应用后，像下载其他应用一样下载它。\n\n\
    \    **注意：** 许多新闻应用是免费的。其他一些应用可免费试用，但需要购买才能继续接收。还有一些应用提供有限的免费内容，但你需要订阅才能访问全部内容。\n\
    \n4.  应用下载完成后，轻点其图标即可启动。\n"
- fmt: '# The New York Times App


    *The New York Times* offers a slimmed-down version of the paper in its free iPad
    app.


    At the bottom-left corner is a button labeled **Sections**. Touch the **Sections**
    button and all the available sections are displayed.


    The caveat is that most sections have a blue dot next to them, which signifies
    that registration (subscription) is required to view them.


    The **Top News** and **Most E-Mailed** sections are always available.


    ![images](images/p614-01.jpg)


    **NOTE**: The New York Times have very recently moved to a subscription model.
    Touch any section with a blue dot and you will be taken to the latest pricing.


    Navigating **The New York Times** app is as simple as sliding screens from right
    to left. You can touch a section, and then slide the screen to the left to see
    additional pages in that section. Touch an article again, and then slide the screen
    to the left again to continue reading additional pages in that article.


    To go back to the **Home** page, touch the **Top News** button in the lower-left
    corner.


    To e-mail an article, just touch the **E-mail Article** button ![images](images/p615-01.jpg)
    in the upper-right corner. This button is only available when you are inside an
    article, not on the **Home** page.


    ![images](images/p615-02.jpg)


    ## Moving Through and Enjoying Content


    After you play for a while with all these various **News** apps—you will begin
    to realize that there is no real standard for navigating around them. This means
    you''ll need to become familiar with each app and its own way of navigating articles,
    as well as how to return to the **Main** screen. Here''s a short guide for generally
    navigating these types of apps:


    **Showing or Hiding Control Buttons or Captions:** Tapping the screen once will
    usually show hidden controls or picture captions. You can tap them again to re-hide
    them.


    **Getting to the Details of an Article:** Usually you tap the article or its headline
    to see the next screen.


    **Getting to the Next Page of an Article:** Usually you swipe right to read more.
    Sometimes you swipe up.


    **Viewing a Video:** Tap a video to start playing it. Usually, this plays the
    video in the same portion of the screen without expanding it.


    **Expanding a Video or Image Size:** You can try pinching open inthe video or
    image, and then double-tapping the video or image. Look for an **Expand** button;
    you may also try rotating to **Landscape** mode.


    **Reducing a Video or Image Size:** You can try pinching closed inside the video
    or image. Look for a **Close** or **Minimize** button; you may also try rotating
    back to **Portrait** mode.


    # The Wall Street Journal App


    **TheWall Street Journal** app, however, takes a different approach to delivering
    the news. Once the app is launched, you will be prompted to create an online account.


    Once the account is created, you have access to a subset of content from *The
    Wall Street Journal.*


    ![images](images/p616-01.jpg)


    Material that is unavailable to free account users is marked with a small **Key**
    ![images](images/p616-02.jpg) icon, indicating that material is locked.


    If you fully subscribe to **The Wall Street Journal** app, all articles and tools
    become available.


    Touch the **Sections** button at the bottom to see all the sections of current
    issue of the paper.


    The **Home** page of the app shows this week''s newspapers along the top; it shows
    **Saved Articles, Saved Selections**, and **My Watchlists** below this week''s
    newspapers.


    In the free version of the app, only the **Now** section of the news along the
    top row is viewable. All other papers from the week have the **Key** icon next
    to them; as mentioned earlier, this indicates they are locked and viewable only
    by paying subscribers.


    ![images](images/p617-01.jpg)


    The articles that do not have a small **Key** icon next to them are available
    for you to read. Touch an article and it loads onto the iPad.


    Similar to **TheNew York Times** app, **The Wall Street Journal** app lets you
    slide the screen to the left to continue reading the article.


    You will notice that some articles have a video clip embedded where you would
    normally find a photograph. Touch the video and it will start playing right inside
    the paper—a very cool and interactive feature.


    ![images](images/p617-02.jpg)


    **NOTE:** Some apps—like the **Wall Street Journal** app—are **AirPlay** compatible,
    so you can send your video right to your TV (see [Chapter 10](#Chapter10.html#ch10):
    “Viewing Videos, TV Shows, and More”).


    ## Adjusting Options: Font Sizes and Share, E-mail, or Save an Article


    In the various apps for reading newspapers and other content, you will usually
    find a button or icon to change font sizes. That same button or a button near
    it may also allow you to share, save, or e-mail an article to a friend. Some apps
    allow you to share the article with a social networking site, such as Facebook
    or Twitter.


    **TIP:** Almost all newspaper or magazine apps will allow you to change font sizes
    and e-mail or otherwise share an article. Look for a button or icon that says
    **Tools, Options, Settings**, or something similar. In some apps, the font-size
    adjustment option will show **Small A** and **Large A** icons.


    In the **Wall Street Journal** app, touch the **Share** button in the lower-right
    corner to share an article. This app gives you options to save or e-mail an article:


    **Email Article:** This option sends this article in an e-mail.


    **Facebook:** Share the article on your **Facebook** page.


    **Twitter:** Post a link to the article on your **Twitter** account.


    **The Wall Street Journal** app also gives you three choices for text sizes:


    ![images](images/p618-01.jpg)


    * **Small Text Size**

    * **Standard Text Size**

    * **Large Text Size**


    In the **USA Today** app, the **Font Sizes** and **Share** icons are separated,
    as shown to the right.


    Touch the **Share** icon to e-mail an article or share it with a social networking
    site.


    ![images](images/p619-01.jpg)


    Similarly, you can touch the **Small A/Large A** icons to adjust font sizes.


    Doing so brings up a **Slider** control that lets you slide from smaller to larger
    font sizes.


    ![images](images/p619-02.jpg)


    Tap the screen anywhere off the **Slider** control to hide the control.


    In the **New York Times** app, you have one button in the lower-right corner of
    the article screen that allows you to adjust **Settings**.


    In this app and others, you will often see an option for **Breaking News** alerts.
    These will send you an **Alert** notice as soon as something important happens
    and gets posted to the site.


    ![images](images/p619-03.jpg)'
