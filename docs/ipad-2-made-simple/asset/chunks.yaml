- fmt: "### iTunes and Your iPad\n\nTo activate your iPad and load up your content\
    \ (e.g., music, pictures, videos, and more), you will need to connect the device\
    \ to the `iTunes` app on your computer. The `iTunes` app is also required to backup\
    \ (and later restore) your iPad.\n\nIf you don't have the `iTunes` app, or you\
    \ are not sure if you have the latest version, then you will have to upgrade.\
    \ Connecting your iPad to the `iTunes` service for the first time will activate\
    \ or tie your iPad to your Apple ID. Once you do that, you can buy songs, movies,\
    \ books, and just about anything else right from your iPad or in `iTunes` on your\
    \ computer.\n\n#### Install or Update iTunes on Your Computer\n\nIf you see a\
    \ screen on your iPad showing a USB plug pointing to `iTunes`, then you need to\
    \ connect your iPad to the `iTunes` app on your computer (see [Figure 1-3](#Chapter01.html#fig_1_3)).\n\
    \n![images](images/0103.jpg)\n\n**Figure 1-3.** *An iPad screen showing the need\
    \ to connect to iTunes to get started*\n\nGenerally, you will need to make sure\
    \ you have the latest version of the `iTunes` program installed.\n\nIf you need\
    \ to update the program, start `iTunes`. If you are a Windows user, select `Help`\
    \ and then `Check for Updates`. If you are a Mac user, select `iTunes` and then\
    \ `Check for Updates`. Follow the instructions provided to update `iTunes`.\n\n\
    Need detailed instructions? See our \"iTunes Update\" section in [Chapter 29](#Chapter29.html#ch29):\
    \ \"Your iTunes User Guide.\"\n\nIf you do not have the `iTunes` program loaded\
    \ on your computer, then open a web browser and go to [`www.itunes.com/download`](http://www.itunes.com/download).\
    \ Download the software from the link provided.\n\nNeed detailed instructions?\
    \ Again, see our \"How to Download and Install iTunes\" section in [Chapter 29](#Chapter29.html#ch29):\
    \ \"Your iTunes User Guide.\"\n\n#### Connecting Your iPad to iTunes\n\nOnce you\
    \ have installed or upgraded to the latest version of the `iTunes` program, you\
    \ are ready to connect your iPad to the `iTunes` service on your computer.\n\n\
    **TIP:** Using the `iTunes` app's Home Sharing feature, you can share your purchased\
    \ content from the same iTunes account (music, apps, videos, iBooks, and more)\
    \ on your iPad and across authorized computers on your home network. Also, you\
    \ can sync any of the same content to any iPod/iPhone/iPad under the same iTunes\
    \ account. Learn more about syncing content using `iTunes` in [Chapter 3](#Chapter03.html#ch3):\
    \ \"Sync Your iPad with iTunes\" and learn about Home Sharing in [Chapter 29](#Chapter29.html#ch29):\
    \ \"Your iTunes User Guide.\"\n\nBy connecting your iPad to `iTunes`, you will\
    \ register or associate your iPad (via the device serial number) to a particular\
    \ iTunes Account (Apple ID).\n\n**TIP:** The bonus of this approach is that, if\
    \ you have purchased apps and other content (e.g., music, videos, and more) for\
    \ an iPhone or iPod touch, then you can run most of those apps on your iPad—although\
    \ with a little smaller screen size. Note that you can authorize an iPad on more\
    \ than one iTunes account; however, all content you sync to that iPad has to originate\
    \ from a single computer. Therefore, you need to select your \"main\" computer\
    \ to sync with your iPad.\n\nIf you do not yet have an iTunes account (Apple ID),\
    \ don't worry—you can create one as you register your iPad.\n\n#### Start iTunes\n\
    \nIf the `iTunes` app isn't already running, double-click the `iTunes` icon on\
    \ your desktop:\n\n*   Mac users: Click the `Finder` icon, select the `Go` menu,\
    \ and then select `Applications` to look for `iTunes` (shortcut: `Shift`+`Command`+`A`\
    \ for `Applications`).\n*   Windows users: Click the `Start` menu or `Windows`\
    \ logo in the lower-left corner, select `All Programs`, and then choose `iTunes`.\n\
    \n#### Registering Your iPad the First Time\n\nOnce you have the `iTunes` app\
    \ installed or updated and running on your computer, you are ready to connect\
    \ your iPad for the first time and get it registered or activated. Once you do\
    \ these things, you can start using your new iPad.\n\n**NOTE:** You can skip this\
    \ registration section and jump to the \"Set Up Your iPad\" section later in this\
    \ chapter if your iPad has already been registered. You know if your iPad is already\
    \ registered if you see either `Slide to Unlock` at the bottom of the screen or\
    \ a screen of icons when you tap the `Home` button on the bottom of your device.\n\
    \nFollow these steps to connect to your iPad and register or activate it:\n\n\
    1.  Plug in the white USB connection cable that was supplied with your iPad to\
    \ an available USB port on your computer.\n\n    **NOTE:** When you connect your\
    \ iPad to your computer the first time, your Windows computer should automatically\
    \ install the necessary drivers. If you are on a Mac computer, depending on which\
    \ version of operating system you have installed, Apple may recommend that you\
    \ upgrade to the latest version of the operating system before using your iPad.\n\
    \n2.  Click your `iPad` under `DEVICES` in the left column of iTunes in order\
    \ to get started.\n3.  If you have not already registered your iPad, you should\
    \ see a `Welcome` screen (see [Figure 1-4](#Chapter01.html#fig_1_4)). Click `Continue`\
    \ to start registering your iPad.\n\n    ![images](images/0104.jpg)\n\n    **Figure\
    \ 1-4.** *The iPad `Welcome` screen in `iTunes`*\n\n4.  You will now see the `iPad\
    \ Software License Agreement`.\n5.  Assuming you agree with the legal terms, check\
    \ the box that says `I have read and agree to the iPad Software License Agreement`\
    \ and click the `Continue` button.\n6.  Next, you will be given the opportunity\
    \ to sign in using your Apple ID or to create a new Apple ID. Enter your Apple\
    \ ID and password or click `I do not have an Apple ID` and select your country\
    \ (see [Figure 1-5](#Chapter01.html#fig_1_5)).\n\n    ![images](images/0105.jpg)\n\
    \n    **Figure 1-5.** *The `Apple ID` screen in `iTunes`*\n\n7.  Click the `Continue`\
    \ button.\n    *   If you tried to enter your Apple ID and password and received\
    \ an error message that \"additional security information is required,\" read\
    \ the \"Troubleshooting: Fixing the Apple ID Security Error\" section in [Chapter\
    \ 29](#Chapter29.html#ch29): \"Your iTunes User Guide.\"\n8.  You should now see\
    \ the `Register your iPad` screen (see [Figure 1-6](#Chapter01.html#fig_1_6)).\n\
    \n    ![images](images/0106.jpg)\n\n    **Figure 1-6.** *The `Register Your iPad`\
    \ screen in iTunes*\n\n9.  Type or verify that your information is correct and\
    \ click `Submit` to complete your registration."
