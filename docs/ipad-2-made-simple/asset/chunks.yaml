- fmt: '#### `Song List` View


    Click the leftmost of the view icons to see the `Song List` view (see [Figure
    29–6](#Chapter29.html#fig_29_6)). You can re-sort the list by any column by clicking
    that column''s heading. For example, to sort by name, you would click the `Name`
    column heading. To reverse the sort order, just click the same column heading
    again. `Song List` view can be especially helpful for finding all the songs by
    a particular artist or on a particular album.


    ![images](images/2906.jpg)


    **Figure 29–6.** *`Song List` view*


    #### `Album List` View


    As we mentioned earlier, this is a new view in `iTunes` version 10.0. Click the
    second view icon to see `Album List` view (see [Figure 29–7](#Chapter29.html#fig_29_7)).
    You can re-sort the list by any column by clicking that column''s heading. For
    example, you can sort by name by clicking the `Name` column heading. To reverse
    the sort order, just click the same column heading again. The `Album List` view
    can be especially helpful for finding all the songs by a particular artist or
    on a particular album.


    ![images](images/2907.jpg)


    **Figure 29–7.** *`Album List` view*


    #### `Grid` View


    Click the third icon to show `Grid` view (see [Figure 29–8](#Chapter29.html#fig_29_8)).
    This is a very graphical view, and it is helpful if you want to quickly find album
    or poster art.


    ![images](images/2908.jpg)


    **Figure 29–8.** *`Grid` view*


    #### `Cover Flow` View


    Click the rightmost icon to see `Cover Flow` view (see [Figure 29–9](#Chapter29.html#fig_29_9)).
    This is a fun view because it is visual, and you can quickly flip through the
    images using the slider bar to browse through the album covers. Like `Grid` and
    `Album List` views, this view provides an easy way to find an album when you know
    what the cover looks like.


    ![images](images/2909.jpg)


    **Figure 29–9.** *`Cover Flow` view*


    ### Playing Songs, Videos, and More


    If you are new to `iTunes`, these basic pointers can help you get around the app
    (see [Figure 29–10](#Chapter29.html#fig_29_10)):


    - **Playing a song, video, or podcast:** Double-click an item to start playing
    it.

    - **Controlling the song or video:** Use the `Rewind`, `Pause`, and `Fast Forward`
    buttons, in addition to the `Volume` slider in the upper-left corner, to control
    the playback.

    - **Moving to a different part of the song or video:** Just click the `Diamond`
    icon in the slider bar under the song name at the top of the window and drag it
    left or right as desired.


    ![images](images/2910.jpg)


    **Figure 29–10.** *Playing your songs, videos, and more in `iTunes`*


    ### The `iTunes` Visualizer


    There is a very interesting visual feature in `iTunes` that is quite entertaining.
    It looks like a screen saver that reacts to the music you are playing. There are
    two versions: the iTunes Classic Visualizer and the new iTunes Visualizer. To
    see a visualizer, from the menu select **View ![images](images/U001.jpg) Show
    Visualizer** (alternatively, on Windows you can press `Ctrl+T`, and on the Mac
    you can press `Command+T`). To change between the Classic and New Visualizer versions,
    from the menu select **View ![images](images/U001.jpg) iTunes Visualizer** or
    **iTunes Classic Visualizer**. [Figure 29–11](#Chapter29.html#fig_29_11) shows
    examples of the two visualizers.


    ![images](images/2911.jpg)


    **Figure 29–11.** *The iTunes Classic and New Visualizers*


    #### Using the `iTunes` Equalizer


    You can enhance the sound of your music by matching the built-in equalizer to
    the type of music you are listening to. To view the iTunes Equalizer, from the
    menu select **View ![images](images/U001.jpg) Show Equalizer** (alternatively,
    on Windows you can press `Ctrl+Shift+2`, and on the Mac you can press `Command+J`
    and check **Equalizer**). You can choose from over 20 preset settings, including
    `Classical`, `Rock`, `Pop`, and `R&B`, and you can modify the settings to fit
    your individual tastes.


    ![images](images/p701-01.jpg)


    #### `iTunes` Mini Player


    Sometimes you want to keep `iTunes` playing on your computer, but you don''t want
    it taking so much screen real estate. Luckily, `iTunes` has a built-in miniature
    version called the Mini Player.


    ![images](images/p702-01.jpg)


    To show the Mini Player, from the menu, select **View ![images](images/U001.jpg)
    Switch to Mini Player** (alternatively, on Windows you can press `Ctrl+M`, and
    on the Mac you can press `Shift+Command+M`). To switch back to regular view, press
    the same shortcut key.


    Drag the lower-right corner to see the `Status` window.


    ![images](images/p702-02.jpg)


    #### `iTunes` DJ


    ![images](images/p702-03.jpg)


    If you want to listen to your music in a new order without running out of songs,
    you should try out the iTunes DJ feature. To start it, click `iTunes DJ` at the
    top of your `Playlists` section in the Left Nav Bar.


    ![images](images/p702-04.jpg)


    iTunes DJ will play a continuous mix of music based on your entire music library
    or a single playlist. To adjust the source, click the dropdown menu next to `Source`
    at the bottom of the screen.


    You can see the list of songs that the DJ is about to play in the `iTunes DJ`
    main window. To change the order in which the songs will be played, you can simply
    drag and drop a song higher or lower in the list (see [Figure 29–12](#Chapter29.html#fig_29_12)).


    ![images](images/2912.jpg)


    **Figure 29–12.** *iTunes DJ and changing the order of songs to be played*


    You can also add songs to the iTunes DJ list or play them next by right-clicking
    the song in your library and selecting **Add to iTunes DJ** or **Play Next in
    iTunes DJ**.


    ![images](images/p703-01.jpg)


    #### `Apple Remote` App


    One fun thing to do is to use the `Remote` app on your iPad or other Apple device.
    To get started, open the App Store on your iPad and do a search for "Remote."
    The `Remote` app from Apple is free, so be careful not to purchase one of the
    paid apps that appear. Make sure you are downloading the `Remote` app made by
    Apple.


    After you get the app installed on your iPad, tap it to start it. Next, you need
    to connect the app to `iTunes` on your computer by entering a four-digit passcode:


    1.  On your iPad, tap the `Remote` app to start it (see [Figure 29–13](#Chapter29.html#fig_29_13)).

    2.  If you are starting the `Remote` app for the first time, then tap **Add an
    iTunes Library**. If you have already added Home Sharing or another library, then
    you will need to tap the **Settings** (**Gear** icon) in the upper-right corner
    of the `Remote` app. Next, tap **Add an iTunes Library** and you should see a
    four-digit passcode.

    3.  On your computer, start `iTunes`. In the `Devices` section, your iPad should
    now be displayed with the `Remote` icon next to it. Click it to get started.


    ![images](images/2913.jpg)


    **Figure 29–13.** *Connecting your mobile device (iPad, iPhone, or iPod touch)
    to `iTunes` using Apple''s `Remote` app*


    With your iPad (or other Apple device) connected, you can now remotely control
    `iTunes`. For example, you can play, pause, skip a song, or even change playlists—virtually
    anything you can do related to playing music when sitting at your computer!'
