  trans: "\n#### 设置内容限制\n\n您可能希望限制孩子在 iPad 上收听带有露骨歌词的音乐，也可能不希望他们访问 YouTube 或观看您认为不妥的内容。在\
    \ iPad 上设置内容限制非常简单。\n\n请再次进入`设置`下的`通用`标签，然后点击`限制`。\n\n您会看到一个写着`启用限制`的大按钮。\n\n\
    点击该按钮后，系统会提示您输入`限制密码`——只需选择一个您能记住的四位数密码即可。\n\n![images](img/p215-01.jpg)\n\n**注意：**\
    \ `限制密码`与您的 iPad 主密码是分开的。您可以将其设置得与主密码相同以便记忆；然而，如果您让家人知道了主密码，但又不想让他们调整限制设置，这样做可能会带来问题。日后关闭限制时，您需要输入此密码。\n\
    \n请注意，您可以使用内容限制来控制某些应用是否允许运行，例如`Safari`、`YouTube`、`iTunes`、`安装应用`或`定位`。\n\n另外，请务必记住：**关闭\
    \ = 已限制**。\n\n您可能会认为**开启**意味着某项功能被限制，但事实恰恰相反。要禁用或限制某项功能，您需要点击其旁边的滑块并将其滑动至**关闭**位置。如果您留意到所有标签上方写着**允许：**这个词，那么这种操作方式就说得通了。\n\
    \n![images](img/p216-01.jpg)\n\n如您所见，您可以限制对`音乐与播客`中歌词的访问，仅允许访问“干净”版本。\n\n您还可以使用基于评级的内容限制，来控制您的\
    \ iPad 上可以播放的`影片`、`电视节目`和`应用`。\n\n在右侧图片的示例中，只有评级不超过 PG-13 的影片才能播放。评级为 R 和 NC-17\
    \ 的影片则无法播放。\n\n## 第 8 章\n\n## 多任务处理与静音/锁定开关\n\n在本章中，我们将介绍如何使用`应用切换器`栏进行多任务处理，或在\
    \ iPad 上的应用之间快速切换。多任务处理是 iPad 上一个非常受欢迎的新功能，这是初代 iPad 发布时所不具备的。这项功能意味着您可以在后台保留一个应用运行的同时，去做其他事情。例如，您可以从游戏中短暂抽身，去\
    \ Facebook 上更新一下状态或在 Twitter 上发条推文，然后再跳回游戏。\n\n`应用切换器`栏还提供了另一项便捷功能，我们将在本章中介绍。在初代\
    \ iPad 上，有一个用于锁定屏幕方向的硬件按钮。当软件更新后，该开关变成了`静音`键。有了新的 iOS 4.3，您可以通过`应用切换器`栏来设定该开关的行为，也可以在`设置`应用中对`锁定/旋转`开关进行调整。\n\
    \n### 多任务处理或应用切换\n\n通过*多任务处理*或*应用切换*，您可以在切换到另一个应用时，让许多应用在后台保持运行，而无需停止当前应用。\n\n\
    **注意：** 开发者需要在其应用端实现多任务支持。虽然支持多任务处理的应用和更新每天都在增多，但有些应用仍然不支持，或支持不完全。\n\n**为什么要使用多任务处理？**\
    \ 以下是一些您可能在 iPad 上使用多任务处理的场景：\n\n- 从一个应用（`邮件`）复制粘贴内容到另一个应用（`日历`）。\n- 接听一个`FaceTime`通话或回复一封`电子邮件`，然后无缝跳回正在进行的游戏。\n\
    - 在玩最喜欢的游戏或浏览网页时，继续收听网络电台（如`Pandora`或`Slacker`）。\n- 不再需要等待照片上传到`Facebook`或`Twitter`——它们可以在后台上传，同时您在\
    \ iPad 上做其他事情。\n- 如果您使用`Skype`拨打电话，现在可以让它保持在后台运行以接听来电；这在以前是做不到的。\n- 您还可以在后台保持逐向导航运行，并在通话中或使用其他应用时收听语音指令。与\
    \ VoIP 和流媒体音频一样，导航功能获得了专用的 API。\n\n#### 如何在应用之间切换\n\n要进行多任务处理，您需要调出屏幕底部的`应用切换器`栏。请按以下步骤操作：\n\
    \n1.  在任何应用界面，甚至从`主屏幕`，双击`主屏幕`按钮，即可在屏幕底部调出`应用切换器`（参见图 8–1）。\n2.  所有已打开的应用将显示在`应用切换器`栏上。\n\
    3.  向右或向左滑动以找到您想要的应用，然后点击它。\n4.  如果在`应用切换器`栏上看不到您想要的应用，请按下`主屏幕`按钮，然后从`主屏幕`启动该应用。\n\
    5.  再次双击`主屏幕`按钮，然后点击您刚刚离开的应用，即可跳转回去。\n\n![images](img/0801.jpg)\n\n**图 8–1.**\
    \ *双击`主屏幕`按钮调出`应用切换器`栏以进行多任务处理*\n\n#### 如何从应用切换器关闭应用\n\n如果您通过单击`主屏幕`按钮退出应用，该应用将在后台继续运行，除非它是一个正在进行的\
    \ VOIP 通话、定位/导航应用或某种上传任务。\n\n**注意：** 从技术上讲，任何非 VoIP、流媒体音频和定位类应用都会保存状态并挂起——或者它会先完成诸如上传之类的网络活动，然后保存状态并挂起。但这会占用资源，iOS\
    \ 会在检测到内存不足时关闭应用。如果存在某个失控进程或应用未能被及时终止，从而拖慢 iPad 的内存，手动终止该进程或应用可以解决问题。\n\n有时您需要完全关闭一个应用。例如，您可能会发现\
    \ iPad 运行得比平时稍慢。在这种情况下，完全关闭应用以释放内存是个好主意。请按以下步骤操作：\n\n1.  双击`主屏幕`按钮以调出`应用切换器`栏。\n\
    2.  长按`应用切换器`栏中的任意图标，直到所有图标开始晃动。您会注意到每个图标的左上角出现一个带有减号的`红色圆圈`图标。\n\n    ![images](img/p219-01.jpg)\n\
    \n3.  点击`红色圆圈` ![images](img/p219-02.jpg) 图标即可完全关闭该应用。\n\n**注意：** 以上步骤会终止正在运行的应用或清除保存的状态。通过这种方式关闭的任何应用，下次点击时都必须重新启动。像`邮件`这样的内置应用会自动重启，因此您不会错过任何电子邮件。\n"
- fmt: "#### iPod Controls and Lock Rotation/Mute Key\n\nYou can accomplish one other\
    \ thing on the `App Switcher` bar if you swipe from left to right: see the iPod\
    \ controls and the screen `Orientation Lock/Mute` icon.\n\nThe first generation\
    \ iPad only let you adjust the `Orientation Lock`; after a subsequent software\
    \ update, however, you could mute the iPad with the `Side` switch.\n\nWith the\
    \ new iOS 4.3, you can change the function of the `Side` switch to `Lock Rotation`\
    \ or `Mute`. Whichever is *not* chosen for the `Side` switch will be available\
    \ in the `App Switcher` bar.\n\nFor example, if you have the `Side` switch set\
    \ to `Lock Rotation`, the `App Switcher` bar will give you an icon to `Mute` the\
    \ iPad.\n\n**NOTE**: The `Lock Rotation` feature is very useful is you are in\
    \ an app like `iBooks` and don't want the book you are reading to keep changing\
    \ between `Portrait` and `Landscape` modes if you shift positions or accidentally\
    \ turn the iPad.\n\nFollow these steps to set the function of the `Side` switch:\n\
    \n1.  Tap the `Settings` icon.\n2.  Tap the `General` icon on the left-hand side.\n\
    3.  Scroll down the right-hand side until you see the `Use Side Switch to:` option.\n\
    4.  Choose either `Lock Rotation` or `Mute`. The other option will now be available\
    \ in the `App Switcher` bar, as shown in [Figure 8–2](#Chapter08.html#fig_8_2).\n\
    \n![images](images/0802.jpg)\n\n**Figure 8–2.** *Set the `Side` switch in `Settings`\
    \ and control the other function in the `App Switcher` bar.*\n\nOnce you choose\
    \ your preferred settings, changing the `Lock Rotation` or `Mute` function is\
    \ easy:\n\n1.  From any app or even the `Home` screen, double-tap the `Home` button\
    \ to bring up the `App Switcher` at the bottom of your screen.\n\n    ![images](images/p221-01.jpg)\n\
    \n2.  Swipe left to right to see the iPod controls and the `Lock Rotation/Mute`\
    \ icon.\n3.  Tap the `LockRotation` icon to lock the screen in `Portrait`, or\
    \ `Vertical`, orientation. This orientation will be maintained even if you turn\
    \ the iPad on its side. You know it is locked when you see a `Lock` icon inside\
    \ the button and a `Lock` icon in the top status bar.\n\n    ![images](images/p221-02.jpg)\n\
    \n4.  You can also use the `Previous Track`, `Play/Pause`, and `Next Track` buttons\
    \ in the middle. If you hold down the `Previous Track` or `Next Track` buttons,\
    \ they become `Rewind` or `Fast-Forward` buttons.\n5.  Or, you can tap the `iPod`\
    \ icon to jump to the `iPod` app. If you were controlling background audio with\
    \ another app like `Pandora`, you would see that icon instead.\n6.  You will also\
    \ see control buttons for `AirPlay` (see Chapters 9 and 10), `Brightness`, and\
    \ `Volume` (see [Figure 8–3](#Chapter08.html#fig_8_3)).\n\n![images](images/0803.jpg)\n\
    \n**Figure 8–3.** *iPod controls on the `App Switcher` bar*\n\n## Chapter 9\n\n\
    ## Playing Music\n\nIn this chapter, we show you how to turn your iPad into a\
    \ great music player. The iPad comes from Apple, which popularized electronic\
    \ music players, so you can bet it has some great capabilities. We will show you\
    \ how to play and organize the music you buy from iTunes or sync from your computer.\
    \ We will also show to view playlists in many ways and quickly find songs. Plus\
    \ we will show you how to use the Genius feature to have the iPad locate and group\
    \ similar songs in your library—it's sort of like a radio station that plays only\
    \ music you like.\n\n**TIP:** Learn how to buy music right on your iPad in [Chapter\
    \ 20](#Chapter20.html#ch20): “iTunes on the iPad.” Find out how to buy music using\
    \ iTunes on your computer or load your music CDs onto iTunes so you can sync them\
    \ with your iPad in the “iTunes User Guide” in [Part 4](#Chapter29.html#pt04).\n\
    \nWe will also show you how to stream free music using a free app called `Pandora`.\
    \ With `Pandora`, you can select from a number of Internet radio stations or create\
    \ your own by typing in your favorite artist's name.\n\nFinally, we will discuss\
    \ the `Home Sharing` feature, introduced in the latest version of software on\
    \ the iPad 2. This software allows you to browse and play any content from your\
    \ home network on your iPad while connected to the network.\n\n### Your iPad As\
    \ a Music Player\n\nYour iPad is probably one of the best music players on the\
    \ market today. The generous screen size really allows you to interact with your\
    \ music, playlists, cover art, and the organization of your music library. You\
    \ can even connect your iPad via Bluetooth to your home or car stereo, so you\
    \ can listen to beautiful stereo sound from your iPad!\n\n**TIP:** Check out [Chapter\
    \ 25](#Chapter25.html#ch25): “Bluetooth” to learn how to hook up your iPad to\
    \ your Bluetooth stereo speakers or car stereo.\n\nWhether you use the built-in\
    \ `iPod` music app or an Internet radio app like `Pandora`, you will find that\
    \ you have unprecedented control over your music on the iPad.\n\n### The iPod\
    \ App\n\nMost music is handled through the `iPod` app—its icon is right on the\
    \ `Home` screen. This icon is usually in the Bottom Dock of icons—the last one\
    \ on the right.\n\n![images](images/p224-01.jpg)\n\nTouch the `iPod` icon and,\
    \ as [Figure 9–1](#Chapter09.html#fig_9_1) shows, you'll see five soft keys across\
    \ the bottom:\n\n*   **Songs:** See an alphabetical list of songs (also searchable).\n\
    *   **Artists:** See an alphabetical list of artists (searchable like your Address\
    \ Book).\n*   **Albums:** See an alphabetical list of albums (also searchable).\n\
    *   **Genres:** See your music organized by musical genres.\n*   **Composers:**\
    \ See an alphabetical listing of musical composers.\n\n**Figure 9–1.** *The iPod\
    \ `Home` screen layout*\n\n**TIP:** You can turn the iPad sideways if that makes\
    \ it easier to hold. Everything functions exactly the same on this screen, regardless\
    \ of the orientation of the screen.\n\n#### Playlists View\n\n**Note:** A playlist\
    \ is a list of music you create. It can be made up of any genre, artist, year\
    \ of recording, or collection of songs that interests you.\n\n![images](images/p225-01.jpg)\n\
    \nMany people group together music of a particular genre, like classical or rock.\
    \ Others may create playlists with fast-beat music and call it “workout” or “running\
    \ music.” You can use playlists to organize your music just about any way you\
    \ please.\n\nPlaylists are created either in iTunes on your computer and then\
    \ synced to your iPad (see the “iTunes Guide”). You can also create a playlist\
    \ right on your iPad, as we describe in the next section.\n\nOnce you've synced\
    \ a playlist to your iPad or created one on your iPad, it shows up on the left-hand\
    \ side of the iPod screen, under `Library`.\n\nIn this example, we touch our `Beatles`\
    \ playlist, and all the songs from that playlist are listed.\n\nTo go to a different\
    \ playlist, we just touch a different playlist along the left-hand side.\n\n**NOTE:**\
    \ You can edit the contents of some of your playlists on your iPad. However, Genius\
    \ playlists that are created on your computer or iPad can't be edited on the iPad\
    \ itself."
