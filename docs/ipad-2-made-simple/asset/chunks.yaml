- fmt: '#### Using Categories


    Sometimes all the choices can be a bit overwhelming. If you have a sense of what
    type of app you are looking for, touch the `Categories` button along the bottom
    row of icons.


    The apps are now in `Category` tabs, ranging from `Games` to `Finance` to `Medical`
    to `Photography`—and all sorts of other possibilities.


    **NOTE:** It is possible that more categories will be added at the time you read
    this; this section changes frequently in the App Store.


    ![images](images/p531-02.jpg)


    Find the category of what you are searching for and touch the tab. For example,
    if you are looking for a weather-related app, you can just touch the `Weather`
    tab.


    You can then browse the featured `Weather` apps in the category or touch the `Sort
    by` button to see all the weather apps sorted by `Name`, `Most Popular`, or `Release
    Date`.


    ![images](images/p532-01.jpg)


    #### Looking at the Top Charts


    ![images](images/p533-01.jpg)


    Touch the `Top Charts` icon along the bottom row and the `App Store` program will
    change the view again. This time it will show you the top ten paid and top ten
    free apps. The left-hand column will show the `Top Paid` apps, and the right-hand
    column will show the `Top Free` apps.


    Scroll down to the bottom of the `Top Charts` page and you will see a second category:
    `Top Grossing`. For some, seeing how much an app grosses is important. To see
    a more complete list of either category of top apps, touch the `Show More` ![images](images/p533-02.jpg)
    tab.


    ![images](images/p533-03.jpg)


    ## Chapter 22


    ## Games and Fun


    Your iPad excels at many things. It is a multimedia workhorse, and it can keep
    track of your busy life, as well. Two areas where the iPad really excels are as
    a gaming device and for hosting iPad-specific apps that really take advantage
    of its large, high resolution touch screen. You can even find versions of popular
    games you might only expect to find on dedicated gaming consoles.


    The iPad brings many advantages to portable gaming: the high definition screen
    makes for realistic visuals, the high quality audio provides great sound effects,
    and the accelerometer allows you to really interact with your games. For example,
    in racing games, you can “steer” your car by turning the iPad as you hold it.


    **NOTE:** We have written more than a dozen books about BlackBerry devices and
    other smartphones, and we have many BlackBerry, WebOS, iOS, and Android devices
    lying around the house. The smartphones don''t disappear into our children''s
    rooms; rather, it is the iPad that our children (and our spouses) have decided
    is fun enough to grab. We regularly discover that the iPad has disappeared from
    its charger and have to yell out, “Where is my iPad? I need to finish this book!”


    ### The iPad As a Gaming Device


    Thanks to the built-in accelerometer—essentially a device that detects movement
    (acceleration) and includes a built-in gyroscope that detects tilt—the iPad is
    capable of doing things that most portable game systems can''t.


    With literally thousands of gaming titles to choose from, you can play virtually
    any type of game you wish on your iPad.


    **NOTE:** Some of these games do require that you have an active network connection,
    either Wi-Fi or 3G, to engage in multiplayer games.


    | With the iPad, you can play a driving game and use the iPad itself to steer—just
    by turning the device. You can also touch the iPad to brake or tilt it forward
    to accelerate. | ![images](images/p536-01.jpg) |

    | This game is so realistic that it might make someone car sick! | |

    | Or, you can try a first-person battle game. With the new graphics engine of
    the iPad, games like Chair''s `Infinity Blade` look amazing and play very smoothly.
    | |

    | The graphics, battle scenes, and 3D environment on `Infinity Blade` are unlike
    anything else available for the iPad and rival more expensive console games in
    quality. | ![images](images/p536-02.jpg) |


    #### Where to Get Games and Fun Apps


    Games are found, like all iPad apps, at the App Store (see [Figure 22–1](#Chapter22.html#fig_22_1)).
    You can get them either through iTunes on your computer or by using the device''s
    `App Store` program.


    ![images](images/2201.jpg)


    **Figure 22–1.** *Layout of the App Store''s `Game` section*


    | To get a game, start the `App Store` program as you did in the last chapter,
    and then use the `Categories` icon to take you to the `Games` tab. You will also
    find many games in the `Featured` section of the App Store, as well as in the
    `New and Noteworthy` section. [Figure 22–2](#Chapter22.html#fig_22_2) shows the
    app-purchase page for a game available for the iPad. | ![images](images/p538-01.jpg)
    |


    ![images](images/2202.jpg)


    **Figure 22–2.** *Layout of the app-purchase page*


    #### Read Reviews Before You Buy


    | Many of the games have user reviews that are worth perusing. Sometimes, you
    can get a good sense of the game before you buy it. If you find a game that looks
    interesting, don''t be afraid to do a simple `Google` search on your computer
    to see if any mainstream media outlets have done a full review. **CAUTION:** Beware
    that some reviews may contain explicit language. | ![images](images/p540-01.jpg)
    |


    #### Look for Free Trials or Lite Versions


    | More and more frequently, game developers are giving users free trials of their
    games to see if they like them before they buy. You will find many games have
    both a Lite/Free version and a Full version in the App Store. | ![images](images/p540-02.jpg)
    |

    | Some games are “free,” supported by the inclusion of ads within the app. Other
    apps are free to start, but require in-app purchases for continued play or additional
    features. | |


    #### Be Careful When You Play


    Given the size of the iPad, some games have been modified from their iPhone/iPod
    touch versions. You don''t use the iPad to “cast” your line in a fishing game,
    as you would in the iPhone version; however, you can move around a bit in driving
    and first person shooter games—so be mindful of your surroundings! For example,
    make sure you have a good grip on your device, so it doesn''t slip out of your
    hand—we recommend a good silicone case to help with this.


    **CAUTION**: Games like `Angry Birds` can be quite addictive and hamper productivity!


    #### Two Player Games


    | The iPad really opens up the possibility for two-player gaming. In this example,
    we are playing checkers against one another—using the iPad as a game board. Similar
    two-person apps can also be found for other board games, such as chess, Scrabble,
    and more. | ![images](images/p541-01.jpg) |


    **TIP:** When playing a two-person game such as checkers, make sure you *lock*
    the screen orientation, just as you do when you read a book. Do this by moving
    the `Rotation Lock` switch to the `locked` position (see [Chapter 8](#Chapter08.html#ch8)).


    #### Online and Wireless Games


    | The iPad also allows online and wireless peer-to-peer play if the game supports
    it. Many new games are incorporating this technology. In `Scrabble`, for example,
    you can have multiple players on their own devices. You can even have the iPad
    as your game board and up to four individual iPhones as wireless “racks” to hold
    your letters. Just flick the letters off the rack, and they go onto the board—very
    cool! You can also play Scrabble online against Facebook Friends. You can do this
    over a local network or as a multiplayer *pass-n-play* game. | ![images](images/p542-01.jpg)
    |


    **NOTE:** If you just want to play against a friend who is nearby, select Wi-Fi
    mode for multiplayer games. If you just want to play against new people, try going
    online or against Facebook Friends!'
