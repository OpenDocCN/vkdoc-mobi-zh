    # 关于作者


    ![image](img/martin_trautschold.jpg) **马丁·特劳特肖德**是 Made Simple Learning 的创始人兼首席执行官，该公司是
    Apple iPad、iPhone、iPod touch、BlackBerry、Android 和 Palm webOS 图书及视频教程的领先提供商。自 2001
    年以来，他一直是移动设备培训与软件行业的成功企业家。通过 Made Simple Learning，他利用简短精炼的视频教程帮助培训了数千名智能手机用户。马丁现已合著了二十多本“Made
    Simple”系列指南图书。他还共同创立并运营了一家移动设备软件公司三年，随后将其出售。在此之前，马丁在美国和日本从事了 15 年的技术与商业咨询工作。他拥有普林斯顿大学的工程学学位和西北大学凯洛格管理学院的
    MBA 学位。马丁与妻子朱莉娅育有三个女儿。他喜欢在佛罗里达州代托纳比奇与哈利法克斯赛艇协会一起划船，并和朋友们一起骑行。可通过 `martin@madesimplelearning.com`
    联系马丁。


    ![image](img/gary_mazo.jpg) **加里·马佐**是 Made Simple Learning 的副总裁。加里于 2008 年加入
    Made Simple Learning，并合著了 Made Simple 系列中的后十九本书。加里与马丁以及来自 CrackBerry.com 的凯文·米查鲁克共同撰写了《CrackBerry：黑莓使用与滥用的真实故事》——一本关于黑莓成瘾以及如何掌控黑莓使用的书。加里还在凤凰城大学教授写作、哲学、技术写作等课程。他拥有布兰迪斯大学的人类学学士学位。加里获得了希伯来文学硕士学位，并在俄亥俄州辛辛那提的希伯来联合学院-犹太宗教研究所被任命为拉比。他曾服务过俄亥俄州代顿、新泽西州樱桃山以及马萨诸塞州科德角的教会团体。不写作或教学时，加里喜欢骑行和弹钢琴。加里与格洛丽亚·施瓦茨·马佐结婚，育有六个孩子。可通过
    `gary@madesimplelearning.com` 联系加里。


    ## 关于技术审校


    ![image](img/rene_ritchie.jpg) 雷内·里奇是 TiPb.com 的编辑，该网站是专注于 iPhone、iPod touch 和
    iPad 的博客，涵盖全面的新闻、操作指南以及应用、游戏和配件评测。作为 Smartphone Experts 网络的一部分，TiPb 还提供全面的帮助和社区论坛，并拥有一个活跃的
    YouTube 频道（[`www.youtube.com/theiphoneblog/`](http://www.youtube.com/theiphoneblog/)）、Facebook
    页面（[`www.facebook.com/tipbcom/`](http://www.facebook.com/tipbcom/)）以及 Twitter
    关注者（[`http://twitter.com/tipb`](http://twitter.com/tipb)）。作为一名平面设计师、网页开发者和作家，雷内在蒙特利尔生活和工作。可通过
    `rene@tipb.com` 或在 Twitter 上通过 `@reneritchie` 联系他。


    ## 第一部分


    ## 快速入门指南


    您手中拿着的，是自初代版本以来最令人兴奋的设备之一：全新的 iPad 2。本快速入门指南将帮助您和您的全新 iPad 2 快速启动并运行。您将了解所有按钮、开关和端口。您还将学习如何使用创新且反应灵敏的触摸屏，以及如何使用新的应用切换器栏进行多任务处理。我们的应用参考表格会向您介绍内置应用以及来自
    App Store 的一些有价值的应用——并为您提供快速了解如何完成某项任务的途径。我们还会向您展示一些流行的配件，帮助您更好地利用 iPad。


    ## 快速入门指南


    本快速入门指南旨在成为这样一个工具——一个能帮助您快速上手、在本书中查找信息，并学习基本操作，从而立即享受使用 iPad 乐趣的工具。


    我们从“熟悉您的设备”部分的基础知识开始——了解 iPad 上所有按键、按钮、开关和符号的含义及功能。您将看到一些实用的功能，例如如何双击 `Home` 按钮进行多任务处理；如何配置
    `旋转锁定/静音` 开关；以及如何在菜单、子菜单和设置开关中进行交互——您在 iPad 上几乎每个应用中都会用到这些操作。您还将了解如何查看连接状态，以及在飞机上旅行时该如何处理。


    **提示：** 请查看第 2 章：“打字技巧、复制/粘贴与搜索”以获取绝佳的打字技巧等更多内容。


    在“触摸屏基础”部分，我们帮助您学习如何触摸、滑动、轻拂、缩放等操作。


    在“应用参考表格”中，我们将应用图标组织成通用类别，以便您快速浏览图标并跳转到书中的相应章节，以了解更多关于特定图标所代表的应用的信息。以下是表格：


    *   快速上手（表 2）

    *   保持井然有序（表 3）

    *   享受娱乐（表 4）

    *   保持信息灵通（表 5）

    *   社交网络（表 6）

    *   高效工作（表 7）


    在“其他有趣功能”部分，我们向您展示了电子相框功能以及如何在 iPad 上欣赏视频。


    在“iPad 配件”部分，我们简要概述了一些您可能会感兴趣的常见配件。


    那么，让我们开始吧！


    ### 熟悉您的设备


    为了帮助您熟悉 iPad，我们从基础知识开始——按钮、按键和开关的功能——然后介绍如何启动应用和浏览菜单。iPad 上最重要的状态指示器（除了电池之外）可能就是左上角显示网络状态的指示器。您将了解如何快速识别网络状态图标。


    #### 按键、按钮和开关


    图 1 展示了您可以使用 iPad 上的按钮、按键、开关和端口执行的所有操作。继续尝试一些操作，看看会发生什么。尝试按住 `降低音量` 键两秒钟，双击 `Home`
    按钮，使用 `旋转锁定/静音` 开关，以及按住 `电源/睡眠` 键。尽情熟悉您的设备吧。


    ![images](img/p4-01.jpg)


    **图 1.** *iPad 2 的按钮、端口、开关和按键*


    #### 锁定屏幕旋转或使 iPad 静音


    当您开始触摸 iPad 时，您会注意到屏幕旋转速度惊人地快。但有时您不希望它旋转（这称为`旋转锁定`或有时称为`方向锁定`）——例如，当您将其放在腿上或桌子上时。位于
    iPad 右上边缘、音量按钮上方的开关可设置为执行两种不同的功能。一种功能启用`旋转锁定`，而另一种功能则允许您将设备`静音`。（例如，您可以将来电`FaceTime`视频通话的铃声静音。）您可以在“设置”应用中调整此侧边开关要使用的功能。在该应用中，选择`通用
    ![images](img/U001.jpg) 使用侧边开关 ![images](img/U001.jpg) 旋转锁定`或`静音`。有关如何使用此开关的更多详细信息，请参阅第
    8 章：“多任务处理与静音/锁定开关”。

