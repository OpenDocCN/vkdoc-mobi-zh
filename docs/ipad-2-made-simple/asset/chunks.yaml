- fmt: "# A Network Connection Is Required\n\nMobile email is certainly all the rage\
    \ today. You can view, read, and compose replies to emails already synced to your\
    \ iPad without a network connection; however, you will need to have Wi-Fi network\
    \ connectivity to send and/or receive email from your iPad. Check out [Chapter\
    \ 5](#Chapter05.html#ch5): “Wi-Fi and 3G Connectivity” to learn more. Also check\
    \ out the “Reading the Top Connectivity Status Icons” section in the Quick Start\
    \ Guide in Part 1.\n\n**TIP:** If you are taking an airline trip, simply download\
    \ all your email before you get on the airplane; this lets you read, reply, and\
    \ compose your messages while offline. One important point here—you may only have\
    \ the email header downloaded before you go offline unless you tap the message\
    \ to open and view it. In other words, before you take off, make sure you tap\
    \ to open all important email messages to make sure the full messages get downloaded\
    \ to your iPad. Any emails you compose on your iPad while offline will be sent\
    \ after you land and re-establish your connection to the Internet.\n\n## Setting\
    \ up Email on the iPad\n\nYou have two options for setting up your email accounts\
    \ on the iPad:\n\n- Use the `iTunes` app to sync email account settings.\n- Set\
    \ up your email accounts directly on the iPad.\n\nIf you have a number of email\
    \ accounts that you access from an email program on your computer (e.g., `Microsoft\
    \ Outlook`, `Entourage`, and so on), then the easiest approach is to use `iTunes`\
    \ to sync your accounts. See the “Sync Email Account Settings” section in [Chapter\
    \ 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes” for more information on\
    \ this topic.\n\nIf you only have a few accounts, or you do not use an email program\
    \ on your computer that `iTunes` can sync with, then you will need to set up your\
    \ email accounts directly on the iPad.\n\n### Entering Passwords for Email Accounts\
    \ Synced from iTunes\n\nIn the “Sync Email Account Settings” section of [Chapter\
    \ 3](#Chapter03.html#ch3), we showed you how to sync your email account settings\
    \ to your iPad. After this sync completes, you should be able to view all of the\
    \ email accounts on your iPad by opening the `Settings` app. All you will need\
    \ to do is enter the password for each account.\n\nThe easy way is to enter account\
    \ passwords is to type them into the pop-up window as you see the window appear.\n\
    \nType your `Password` and tap `OK` to save it.\n\n![images](images/p321-01.jpg)\n\
    \nYou can also enter your email account passwords and adjust other account details\
    \ in the `Settings` app. To enter your password for each synced email account,\
    \ follow these steps (see [Figure 13–1](#Chapter13.html#fig_13_1)):\n\n1. Tap\
    \ the `Settings` icon.\n2. Tap `Mail, Contacts, and Calendars` in the left column.\n\
    3. Under `Accounts` in the right column, you should see all your synced email\
    \ accounts listed.\n4. Tap any listed email account, then tap `Account` to get\
    \ to the `Account` details screen.\n5. Type the account `Password` and click `Done`.\n\
    6. Repeat for all listed email accounts.\n\n![images](images/1301.jpg)\n\n**Figure\
    \ 13–1.** *Entering passwords for each email account synced from the `iTunes`\
    \ app*\n\n### Adding a New Email Account on the iPad\n\nTo add a new email account\
    \ on your iPad, follow these steps:\n\n1. Tap the `Settings` icon.\n2. Tap `Mail,\
    \ Contacts, and Calendars`.\n3. Tap `Add Account` below your email accounts.\n\
    \n    **TIP:** To edit any email account, just touch that account.\n\n    ![images](images/p322-01.jpg)\n\
    \n4. Choose which type of email account to add on this screen:\n\n    - Tap `Microsoft\
    \ Exchange` if you use a Microsoft Exchange email server, use Hotmail or Gmail,\
    \ and you want to sync your contacts and calendar wirelessly.\n    - Tap `Gmail`\
    \ if you use Gmail and do not want your contacts synced wirelessly.\n    - Tap\
    \ `MobileMe, Yahoo`, or `Aol` if you use these services.\n    - Tap `Other` to\
    \ set up a different type of account.\n\n    **TIP:** Learn more about `Google`/`Hotmail/Microsoft\
    \ Exchange` and `MobileMe` in [Chapter 4](#Chapter04.html#ch4): “Other Sync Methods.”\n\
    \n    ![images](images/p322-02.jpg)\n\n5. If you select `Other` from the account\
    \ type, then you will see this screen, where you can add the following types of\
    \ accounts: Mail, Contacts, and Calendars.\n\n    - To add an account to Mail,\
    \ tap `Add Mail Account`.\n    - To add an account to Contacts, tap `Add LDAP\
    \ Account` or `Add CardDAV Account`.\n    - To add an account to Calendars, tap\
    \ `Add CalDAV Account` or `Add Subscribed Calendar`.\n\n    ![images](images/p323-01.jpg)\n\
    \n6. Now you will be able to enter your login credentials. Type your name as you\
    \ would like others to see it when they receive mail from you into the `Name`\
    \ field. If you selected a Contacts or Calendars type of account, then you would\
    \ need to enter the `Server` name, `User Name`, `Password`, and `Description`.\n\
    \n    ![images](images/p323-02.jpg)\n\n7. Next, add the appropriate information\
    \ into the `Address`, `Password`, and `Description` fields.\n8. Tap the `Next`\
    \ button in the upper-right corner.\n\n#### Specifying Incoming and Outgoing Servers\n\
    \nSometimes, the iPad will not be able to automatically set up your email account.\
    \ In these cases, you will need to type in a few more settings manually to enable\
    \ your email account.\n\n**TIP:** You may be able to find the settings for your\
    \ email provider by doing a web search for your email provider's name and “email\
    \ settings.” For example, if you use Windows Live Hotmail (formerly known as Hotmail),\
    \ then you might search for “Microsoft Exchange, POP, or IMAP email settings for\
    \ Windows Live Hotmail.” If you cannot find these settings, then contact your\
    \ email provider for assistance.\n\nIf the iPad is unable to log into your server\
    \ with only your email address and password, then you see a screen similar to\
    \ this one.\n\nUnder `Incoming Mail Server`, type the appropriate information\
    \ into the `Host Name`, `User Name`, and `Password` fields. Usually, your incoming\
    \ mail server is something like `mail.*name_of_your_isp*.com`.\n\nTo adjust the\
    \ name of your outgoing server, tap `Outgoing Mail Server`. You can adjust the\
    \ outgoing mail server on the following screen. These server names usually look\
    \ like either `smtp.*name_of_your_isp*.com` or `mail.*name_of_your_isp*.com`.\n\
    \nYou can try to leave the `Server Name` and `Password` fields blank. If that\
    \ doesn't work, you can always go back and change them.\n\n![images](images/p324-01.jpg)\n\
    \nYou may be asked if you want to use SSL (secure socket layer), a type of outgoing\
    \ mail security that may be required by your email provider. If you don't know\
    \ whether you need it, just check the required mail settings with your email provider.\n\
    \n**TIP:** The authors recommend that you use SSL security whenever possible.\
    \ If you do not use SSL, then your login credentials, messages, and any private\
    \ information is sent in plain text (unencrypted), leaving it open to snoopers.\n\
    \n#### Verifying that Your Account Is Set Up\n\nOnce all the information is entered,\
    \ the iPad will attempt to configure your email account. You may get an error\
    \ message; if that happens, you need to review the information you input.\n\n\
    ![images](images/p325-01.jpg)\n\nIf you are taken to the screen that shows all\
    \ your email accounts, look for the new account name.\n\nIf you see it, your account\
    \ was set up correctly.\n\n![images](images/p325-02.jpg)\n\n#### Fixing the Cannot\
    \ Get Mail Error\n\nIf you tap the `Mail` icon and you receive an error that says\
    \ “Password Incorrect,” you will need to enter your password and click `OK` to\
    \ see your email.\n\nReview this chapter's “Enter Passwords for Email Accounts\
    \ Synced from iTunes” section for additional help.\n\n![images](images/p325-03.jpg)"
