- fmt: '#### Taking a Picture


    Taking a picture is as simple as pointing and shooting, yet there are some adjustments
    that you can make if you choose to.


    Once your camera is on, center your subject in the screen of your iPad.


    When you are ready to take a picture, just touch the `Camera` button along the
    bottom. You will hear a shutter sound, and the screen will show an animation indicating
    that the picture is being taken.


    Once the picture is taken, it will drop down into the window in the lower-left
    corner. Touch that small thumbnail, and the `Camera Roll` album of your `Photos`
    app will load.


    ![images](images/p412-02.jpg)


    ##### Using the iPad''s Zoom


    The iPad camera includes a 5x digital zoom.


    **NOTE**: A digital zoom is never as clear as an analog zoom, so be aware that
    picture quality is usually degraded slightly when using the iPad''s zoom feature.


    To use the zoom feature, just touch the screen and move the `Zoom` control slider,
    as shown in [Figure 16–1](#Chapter16.html#fig_16_1).


    #### Switching Cameras


    As mentioned previously, the iPad comes with two cameras: a 0.7-megapixel camera
    for most photography and a VGA camera for self-portraits or for use in `FaceTime`
    video calls (see [Chapter 18](#Chapter18.html#ch18): “FaceTime Video Messaging
    and Skype”).


    ![images](images/p413-01.jpg)


    ![images](images/p413-02.jpg)


    To switch between the cameras, do the following:


    1.  Touch the `Switch Camera` icon in the `Camera` app.

    2.  Wait for the camera to switch to the front-facing camera and line up the shot.

    3.  Touch the `Switch Camera` icon again to switch back to the standard camera.


    **TIP**: Because of the placement of the front-facing camera, faces can look somewhat
    distorted. Try moving your face back a bit and adjusting the camera angle to get
    a better image.


    #### Viewing Pictures You Have Taken


    Your iPad stores pictures you take in what is called your `Camera Roll`. You can
    access the `Camera Roll` from inside both the `Camera` and `Photos` apps. In the
    `Camera` app, touch the `Pictures` icon in the bottom-left corner of the `Camera`
    screen.


    ![images](images/p414-01.jpg)


    Once you touch a picture to view, you can swipe through your pictures to see all
    the pictures in the `Camera Roll`.


    ![images](images/p414-02.jpg) To get back to the `Camera Roll`, press the `Camera
    Roll` button in the upper-left corner.


    ![images](images/p414-03.jpg) To take another picture, touch the `Done` button
    in the upper-right corner.


    Note that the picture to the right was taken using the `Photo Booth` app. Read
    about it at the end of this chapter.


    ![images](images/p414-04.jpg)


    ### Getting Photos onto Your iPad


    You have many options for loading photos onto your device:


    *   *Sync using iTunes:* Probably the simplest way is to use iTunes to sync photos
    from your computer. This is described in detail in [Chapter 3](#Chapter03.html#ch3):
    “Sync Your iPad with iTunes.”

    *   *Receive as email attachments*: While this is not useful for large numbers
    of pictures, it works well for one or a few photos. Check out [Chapter 13](#Chapter13.html#ch13):
    “Email on your iPad” for more details about how to save attachments. (Once saved,
    these images show up in the `Camera Roll` album.)

    *   *Save images from the Web*: Sometimes you''ll see a great image on a web site.
    Press and hold it to see the pop-up menu and then select `Save Image`. (Like other
    saved images, these end up in the `Camera Roll` album.)

    *   *Download images from within an app*: A good example of this is the wallpaper
    image shown in [Chapter 7](#Chapter07.html#ch7): “Personalize and Secure your
    iPad.”

    *   *Sync with iPhoto (for Mac users)*: If you use a Mac computer, your iPad will
    most likely sync automatically with `iPhoto` or `Aperture`.


    Here are a few steps to get iPhoto sync up and running:


    1.  Connect your iPad and start `iTunes`.

    2.  Go to the `Photo` tab along the top row of `Sync Options`.

    3.  Choose the `Albums`, `Events`, `Faces`, or `Places` you want to keep in sync
    with the iPad (see [Figure 16–2](#Chapter16.html#fig_16_2)).


    ![images](images/1602.jpg)


    **Figure 16–2.** *Choosing albums, faces, or events from iTunes to sync with the
    iPad*


    *Drag and drop (for Windows users)*: Once you connect your iPad to your Windows
    computer, it will appear in Windows Explorer as a portable device, as shown in
    [Figure 16–3](#Chapter16.html#fig_16_3). Here are the steps required to drag and
    drop photos between your iPad and computer:


    ![images](images/1603.jpg)


    **Figure 16–3.** *Windows Explorer showing the iPad as a portable device (connected
    with a USB cable)*


    1.  Double-click the iPad image under `Portable Devices` to open it.

    2.  Double-click `Internal Storage` to open it.

    3.  Double-click `DCIM` to open it.

    4.  Double-click `800AAAAA` to open it. (This will have a unique name on your
    PC.)

    5.  You will see all the images in the `Saved Photos` album on your iPad.

    6.  To copy images from your iPad, select and then drag and drop images out of
    this folder onto your computer.


    **TIP:** Here''s how to select multiple images in Windows.


    Draw a box around the images, or click one image and then press `Ctrl+A` to select
    them all. Hold down the `Ctrl` key and click individual pictures to select them.
    Right-click one of the selected pictures and choose `Cut` (to move) or `Copy`
    (to copy) all of the selected images. To paste the images, press and click any
    other disk or folder, such as `My Documents`, and then navigate to where you want
    to move or copy the files. Finally, right-click again and select `Paste`.


    ### Viewing Your Photos


    Now that your photos are on your iPad, you have several cool ways to look through
    them and show them to others.


    #### Launching from the Photos Icon


    If you like using your `Photos` app, you might want to place it in your Bottom
    Dock for easy access if it''s not already there (see [Chapter 6](#Chapter06.html#ch6):
    “Organize your Icons and Folders.”)


    To get started with photos, touch the `Photos` icon.


    ![images](images/p418-01.jpg)


    The first screen shows your photo albums, which were created when you set up your
    iPad and synced it with iTunes. [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad
    with iTunes” showed you how to choose which photos to sync with your iPad. Any
    changes to the library on your computer will be automatically updated on your
    iPad.


    Along the top, there are buttons for five categories of photos (depending on the
    photo software on the PC or Mac with which the iPad is synced). In the image to
    the right, you see `Photos`, `Albums`, `Events`, `Faces`, and `Places`.


    **NOTE**: This iPad was synced to `iPhoto` on a Mac; PC users will see different
    options.


    ![images](images/p419-01.jpg)


    #### Choosing a Library


    From the `Photo Albums` page, touch one of the library buttons to show the photos
    in that album. The screen will immediately change to show you thumbnails of the
    pictures in this library.


    Tap and drag your finger up and down to view all the pictures. You can flick up
    or down to quickly move throughout the album.


    ![images](images/p420-01.jpg)


    #### Preview an Album by Pinching Open


    When you''re trying to locate a particular image, one of the cool things you can
    do on your iPad is to preview a particular album by pinching it open.


    Place two fingers on the album and slowly *pinch open* your fingers. Notice that
    all the images spread out across the screen.


    If you see the photo you want, continue pinching open to fully open the album.
    End your pinch with a flick to open the album.


    If you don''t see the image you want, simply close your fingers again to close
    the album and then try another one.


    **TIP**: You can close an album that is fully open by *pinching closed* across
    the entire screen of thumbnails.


    ![images](images/p421-01.jpg)'
