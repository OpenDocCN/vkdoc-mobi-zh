  trans: "\n### iTunes 能为你做什么\n\n你电脑上的 `iTunes` 软件能让你做很多事情，包括以下内容：\n\n- **购买应用、音乐、视频、电视节目等（或免费下载）：**\
    \ 你可以购买或免费下载应用、音乐、电影、电视节目、播客、`iBooks`、PDF 文件和有声读物。你甚至可以从 `iTunes U`（`iTunes` 中一个专门提供大学和其他学习机构教育内容的特殊区域）下载教育内容。最棒的一点是：其中大部分内容都是免费的！\n\
    - **整理你的媒体资料：** 你可以使用各种视图和自动播放列表，并设置你自己的自定义播放列表。\n- **参与社交网络：** 使用 `iTunes` 中新的\
    \ `Ping` 功能，你可以关注你最喜欢的艺人，了解他们正在谈论什么音乐。你也可以与朋友分享你最喜欢的音乐，甚至可以看到谁要去参加下周末的音乐会。\n-\
    \ **将你的音乐、视频、通讯录等内容同步到 iPad：** 你想把所有的好音乐和视频都带到 iPod 上——使用 `iTunes` 同步你的内容，然后出发（请参见第\
    \ 3 章：“将你的 iPad 与 iTunes 同步”）。\n- **播放你的音乐、视频和音频内容：** `iTunes` 应用是你电脑上一款出色的媒体播放器，可以播放你所有的媒体内容，包括音乐、视频、电视节目和播客。\n\
    - **备份和恢复你的 iPad：** 此选项让你可以备份和恢复你的 iPad 数据。\n\n### 关于 iTunes 的常见问题\n\n以下是一些关于\
    \ `iTunes` 的 iPad 常见问题，以及针对每个问题核心或要点的简短回答。\n\n*我电脑上的 `iTunes` 软件和我 iPad 上的 `iTunes`\
    \ 应用是一样的吗？*\n\n> 你电脑上的 `iTunes` 软件与你 iPad 上的多个应用功能相同。你需要在 iPad 上安装以下应用，才能完成 `iTunes`\
    \ 在你的电脑上所能做的一切：`iPod`、`视频`、`iTunes`、`iBooks` 和 `App Store`。\n> \n> ![images](img/p687-01.jpg)\n\
    \n*我有一部 iPhone 或另一款 iPod；我能和我的新 iPad 共享音乐和视频吗？*\n\n> 可以！你绝对可以在你所有的 Apple 设备（包括你的新\
    \ iPad）上继续收听你所有的音乐并分享你所有的视频。\n\n*我可以使用我现有的 `iTunes` 软件和帐户吗？*\n\n> 可以！你可以使用已安装在电脑上的同一款\
    \ `iTunes` 软件，以及你现有的 iTunes 帐户，来设置你的 iPad。\n\n*我可以使用我在 iPhone 或 iPod touch 上购买的应用吗？*\n\
    \n> 可以，但有局限性。iPhone 和 iPod touch 的应用可以运行；但是，专为 iPhone/iPod touch 设计的应用会在屏幕中间的一个小窗口中显示，并且通常当你将\
    \ iPad 侧向倾斜时不会旋转（`横向`模式）。你可以按下一个小小的 `2×` 按钮来将应用扩展到全屏，但图像看起来会有点颗粒感。\n\n### iTunes\
    \ 导览\n\n在安装了最新版本的 `iTunes` 之后（在编写本书时版本是 10），你就可以开始对电脑上的 `iTunes` 界面进行一次快速导览了。好在它在\
    \ PC 和 Mac 上的界面看起来非常相似。\n\n当你首次启动 `iTunes` 时，你会看到主窗口，顶部有用于播放音乐或视频的控件（请参见图 29–3）。你还会看到**左侧导航栏**，你可以通过它选择你的资料库、iTunes\
    \ Store、你的 iPad（已连接时）、共享媒体、Genius 播放列表以及你自己的播放列表。**顶部导航栏**会根据你在左侧导航栏中的选择而调整。同样地，中央主窗口也会根据你在左侧和顶部导航栏中的选择，以及主窗口本身的内容而调整。\n\
    \n![images](img/2903.jpg)\n\n**图 29–3.** *`iTunes` 主窗口*\n\n从主窗口的左上角开始，你可以看到以下菜单、控件、窗口和其他视觉元素：\n\
    \n- **主菜单：** 位于媒体控件正上方，它们通过一套逻辑清晰且便捷的菜单，提供对 `iTunes` 所有可执行操作的访问。虽然这些菜单中的许多功能也可以通过按钮和工具栏访问，但在这里，你可以通过逻辑列表找到你需要的功能。\n\
    - **媒体控件：** 这些按钮让你可以播放、暂停或跳转到下一首歌曲或下一个视频，以及调节音量。\n- **状态窗口：** 位于 `iTunes` 的中上部区域，这个窗口显示当前操作的状态（同步状态、是否正在播放歌曲/视频，或其他相关信息）。\n\
    - **视图调整按钮：** 这些按钮允许你在`列表`、`网格`或`封面流`视图之间切换。（这些按钮仅在你处于自己的媒体资料库中时才会激活。）\n- **搜索框：**\
    \ 此框允许你根据输入的文本，在你的资料库或 iTunes Store 中搜索特定的歌曲、视频、电视节目或其他任何内容。\n- **登录链接：** 位于右上角`搜索`框的正下方，此按钮允许你登录\
    \ iTunes Store 或创建一个新的 Apple ID。请注意，右侧的图中显示的是 `martin@madesimplelearning.com`，而不是`登录`。这是因为\
    \ Martin 已经用他的 `Apple ID` 登录了。\n\n  ![images](img/p689-01.jpg)\n\n- **顶部导航栏：**\
    \ 这组位于状态窗口下方的按钮，会根据你在左侧导航栏中的选择而变化。有时按钮很少；有时则会横跨整个屏幕。点击其中任何一个按钮，都可以更改主窗口中显示的内容。\n\
    - **左侧导航栏：** 此栏允许你查看你的资料库（例如，音乐、视频、电视节目和播客）、iTunes Store 和 Ping、你已购买的内容、任何当前连接的设备（你的\
    \ iPad、iPod、iPhone 等）、共享资料库、Genius 混曲以及你自己的播放列表。\n- **主窗口：** 在这里，你可以根据你在左侧和顶部导航栏中的选择看到所有内容。例如，如果你在左侧导航栏中选择了你的\
    \ iPad，并在顶部导航栏中选择了`应用`，你将会看到类似于图 29–3 所示的界面。\n\n#### Apple 的 iTunes 视频教程\n\n除了本书提供的所有信息之外，你还可以找到一些来自\
    \ Apple 的优秀视频教程，帮助你开始使用 `iTunes` 应用。你可以直接在 `iTunes` 应用中点击`帮助`菜单并选择`iTunes 教程`来查看这些教程。\n\
    \n### 在 iTunes 中使用 Ping\n\n![images](img/p690-01.jpg)\n\n正如我们所提到的，Ping 是一项专注于音乐的新型社交网络功能；它在\
    \ `iTunes` 10 及更高版本中可用。它允许你关注你最喜欢的艺人，以及你朋友的喜好。该功能还让你可以与人们分享你的好恶，了解当地的音乐会信息，等等。\n"
- fmt: '#### Getting Started and Creating Your Profile


    To get started, click `Ping` in the `Store` section in the Left Nav Bar of `iTunes`.


    **NOTE:** If you have already registered and enabled `Ping`, but are not signed
    into your `iTunes` account with your `Apple ID`, then you will see a message to
    `Turn On Ping` in the main window. Just click the link and log in to see your
    `Ping` account.


    Now click the `Turn On Ping` button ![images](images/p690-02.jpg) in the main
    window. You will need to sign into the `iTunes` service again to get started with
    `Ping`. Next, you will need to create your profile for `Ping`. Enter your first
    and last name, enter your gender, add an optional picture, indicate where you
    live, give a brief bio, and finally select up to three music genres you like.


    Click `Continue` to select how music is displayed on your profile. The default
    is `Automatically display all music I like, rate, review, or purchase`. However,
    you can adjust this to meet your preferences. Click `Continue`.


    ![images](images/p691-01.jpg)


    Finally, you can choose to allow people to follow you with or without approval
    (the default) or not allow them to follow you at all. Select your choice, and
    then click `Done` to finish setting up your `Ping` profile.


    ![images](images/p691-02.jpg)


    After you complete your setup, you will see a page similar to this one, with recommendations
    based on music you have purchased in the `iTunes Store`. To start following artists,
    click the `Follow` buttons at the bottom or type a search to follow a friend or
    artist.


    ![images](images/p691-03.jpg)


    You can also click the `Invite` button to invite your friends to join `Ping`.


    If you want, you can invite your friends by email by clicking the `Invite` button
    and entering their email addresses.


    ![images](images/p691-04.jpg)


    #### Following Your Favorite Artists


    To find artists to follow, type their names in the `Search` window of the `Ping`
    screen. When you see the artists appear, click the `Follow` button. We searched
    for and found The Rolling Stones, but note that this is not the rock group—this
    is a person who has taken the band''s name.


    ![images](images/p692-01.jpg)


    **CAUTION:** Some people have (or have used) the same name as artists, so make
    sure to click the `Show Artists` link to the right of the search window. Otherwise,
    you might end up following Peter Gabriel the beer-drinking German who enjoys alternative,
    electronic, and rock, instead of the artist Peter Gabriel.


    ![images](images/p692-02.jpg)


    #### Following Your Friends and Other People


    Use the same Find feature to locate and follow your friends and others. In the
    next example, Martin has decided to follow Gary Mazo, so Martin searches for Gary''s
    name. After clicking `Follow`, a pop-up window is displayed, telling Martin that
    `Ping` will have to send a name, photo, and email address to Gary, so he can approve
    the request. Notice what Gary will see on his iPad when Martin requests to follow
    him (see [Figure 29–4](#Chapter29.html#fig_29_4)).


    ![images](images/2904.jpg)


    **Figure 29–4.** *A Follow request from the Ping feature in **iTunes** as it appears
    on a mobile device*


    #### Recent Activity Feed


    The heart of Ping is all the updates you receive from the artists and people you
    are following. The default view when you start Ping is shown to the right; however,
    if you are in some other view, then you need to click the `Recent Activity` link
    in the `PING` box in the upper-right corner.


    ![images](images/p693-01.jpg)


    **NOTE:** Everything you or your family purchases on the same Home Share account
    will show up as purchased on your `Ping` account. Hey, at least you can blame
    that lame ballad on your spouse or the gangsta rap on your teenage child.


    The `Recent Activity` view will show all the recent activity for you and your
    followed friends and artists (see [Figure 29–5](#Chapter29.html#fig_29_5)). It''s
    very similar to your Wall in Facebook. It allows you to provide comments, *like*
    what you see posted, and read comments from other followers. Have fun, let your
    opinions be heard, and get in on the conversation!


    If the friends that you follow allow you to see their purchases, you can comment
    on those as well. Of course, the `iTunes` app makes it easy for you to purchase
    albums or songs that your friends purchase with the handy `Buy` button next to
    the listed item.


    ![images](images/2905.jpg)


    **Figure 29–5.** *Ping''s **Recent Activity** page gives you the ability to add
    a comment or say that you like something.*


    #### Navigating Back and Forth in iTunes


    Sometimes you want to simply get back to the page you just left when you clicked
    a link. It might not be obvious, but there are little `Triangle` icons in the
    upper-left corner of the main `iTunes` window that allow you to navigate back
    and forth through pages in Ping and other parts of the `iTunes` app.


    ![images](images/p694-01.jpg)


    #### Concerts: Find Out and Share with Friends


    When you click an artist''s page in `Ping`, you can see if they have any upcoming
    concerts scheduled by looking for the `Concerts` box in the lower-right corner
    of the page. The accompanying image shows upcoming concerts for U2. Click the
    `See All` link in the Title Bar of the box to see all details and tell people
    whether you''re going to any of these concerts.


    ![images](images/p695-01.jpg)


    After clicking the `See All` link, you will see details of all concerts. You can
    click the `I''m Going` button to show others that you''re attending and the `Tickets`
    button to try purchasing tickets. If you click `I''m Going`, you can add a comment
    about your post for your friends to see—for example, maybe you''ll tell them what
    seat you have, so they can find you.


    #### Seeing What Artists Like in Ping


    If you go to some artists'' pages in Ping, you can see what music they like in
    the upper-right corner. In this image, we can see that U2 likes Elbow, TV on the
    Radio, The National, and more. Click any of the album covers to listen to and
    even purchase songs from the album.


    ![images](images/p695-02.jpg)


    #### Using the Ping Dropdown Menu for a Song


    Next to all your songs in most of the `iTunes` views, you will see a little `Ping`
    dropdown menu. Click the `Ping` menu to `Like`, `Post`, or `Show Artist Profile`.
    You can also view the iTunes store to see more songs by that artist, album, or
    even other songs in the same genre, as shown to the right.


    ![images](images/p695-03.jpg)


    ![images](images/p695-04.jpg)


    #### Viewing Ping in the Right Column


    As you move between items in your music library, you will soon notice that Ping
    will show up at the top of the right column. You can say if you `Like` the song
    or `Post` a comment on the song from this column.


    ![images](images/p696-01.jpg)


    #### Ping Mobile


    ![images](images/p696-02.jpg)


    You can access Ping right from the `iTunes` app on your iPad. To see Ping, start
    your `iTunes` app on your iPad, and then tap the `Ping` soft key in the bottom
    row.


    Notice that you can switch between `Activity`, `People`, and `My Profile` by tapping
    those buttons along the top.


    The image to the right shows the `Activity` tab.


    ![images](images/p696-03.jpg)


    ### Changing Views in iTunes


    There are many ways to view your music, videos, and other media in `iTunes` on
    your computer. Getting familiar with these views on your computer will also help
    you understand your iPad because your iPad has many of the same views. There are
    four customizable views in `iTunes`: `Song List`, `Album List`, `Grid`, and `Cover
    Flow`.


    **NOTE:** `Album List` view is new in `iTunes` version 10.0. It is a nice view
    because it groups your songs by album and shows you the album art in the `Album`
    column.'
  raw: '#### Getting Started and Creating Your Profile


    To get started, click **Ping** in the **Store** section in the Left Nav Bar of
    **iTunes**.


    **NOTE:** If you have already registered and enabled Ping, but are not signed
    into your iTunes account with your Apple ID, then you will see a message to **Turn
    On Ping** in the main window. Just click the link and log in to see your Ping
    account.


    Now click the **Turn On Ping** button ![images](images/p690-02.jpg) in the main
    window. You will need to sign into the iTunes service again to get started with
    Ping. Next, you will need to create your profile for Ping. Enter your first and
    last name, enter your gender, add an optional picture, indicate where you live,
    give a brief bio, and finally select up to three music genres you like.


    Click **Continue** to select how music is displayed on your profile. The default
    is **Automatically display all music I like, rate, review, or purchase**. However,
    you can adjust this to meet your preferences. Click **Continue**.


    ![images](images/p691-01.jpg)


    Finally, you can choose to allow people to follow you with or without approval
    (the default) or not allow them to follow you at all. Select your choice, and
    then click **Done** to finish setting up your Ping profile.


    ![images](images/p691-02.jpg)


    After you complete your setup, you will see a page similar to this one, with recommendations
    based on music you have purchased in the iTunes Store. To start following artists,
    click the **Follow** buttons at the bottom or type a search to follow a friend
    or artist.


    ![images](images/p691-03.jpg)


    You can also click the **Invite** button to invite your friends to join Ping.


    If you want, you can invite your friends by email by clicking the **Invite** button
    and entering their email addresses.


    ![images](images/p691-04.jpg)


