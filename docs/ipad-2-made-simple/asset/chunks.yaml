  trans: "\n# 添加幻灯片\n\n按照以下步骤添加幻灯片：\n\n1.  点击左下角的**加号**按钮 ![images](img/p495-01.jpg)。\n\
    2.  选择你想添加的幻灯片样式。\n3.  双击以编辑文本，并像之前一样使用工具按钮添加图像或对象。\n\n![images](img/p495-02.jpg)\n\
    \n# 动画按钮\n\n在 `Keynote` 中，你可以自定义幻灯片之间的过渡动画：\n\n4.  轻点`动画`按钮 ![images](img/p495-03.jpg)，演示文稿中每张幻灯片的旁边就会出现一个`动画`标签。\n\
    \n**注意：** 你还可以添加`神奇移动`，它会复制幻灯片，然后让你更改其外观并让这些更改动起来。\n\n![images](img/p495-04.jpg)\n\
    \n5.  轻点该标签以查看`过渡`菜单。\n6.  选择一个效果，然后轻点底部的`选项`按钮，调整过渡的时长，以及过渡是在轻点屏幕时发生还是在上一个过渡之后发生。\n\
    7.  完成过渡设置后，轻点右上角的`完成`。\n\n![images](img/p496-01.jpg)\n\n# 播放按钮\n\n要播放幻灯片，只需轻点右上角的`播放`按钮。根据你设置的过渡选项，演示文稿将开始播放。\n\
    \n![images](img/p496-02.jpg)\n\n# 共享你的作品\n\n`iWork` 中的共享功能在三个程序中都是一样的。轻点`共享`按钮，会出现五个选项供你选择：`电子邮件演示文稿`、`通过\
    \ iWork.com 共享`、`发送到 iTunes`、`拷贝到 iDisk` 和`拷贝到 WebDAV`。\n\n![images](img/p496-03.jpg)\n\
    \n# 电子邮件演示文稿\n\n通过电子邮件发送文稿、电子表格或演示文稿很简单。关闭该文稿、电子表格或演示文稿，然后轻点下方的`共享`命令。\n\n选择`电子邮件演示文稿`，你的`邮件`应用将会加载并将该文件作为附件显示。按我们在第\
    \ 13 章：“iPad 上的电子邮件”中介绍的方法添加收件人，输入你的信息，然后轻点`发送`。\n\n![images](img/p497-01.jpg)\n\
    \n# 通过 iWork 共享\n\n当你轻点`通过 iWork.com 共享`时，会弹出一个窗口，要求你输入 Apple ID 或 MobileMe ID\
    \ 及密码。输入正确的信息后，你的文件将存储到网上，以便从任何电脑轻松取用。这是一种共享和协作处理工作的绝佳方式。\n\n![images](img/p497-02.jpg)\n\
    \n当你首次尝试使用 `iWork.com` 服务时，系统会要求你发送一封验证电子邮件。\n\n查看验证电子邮件并按照指示开始在线共享你的作品。\n\n![images](img/p497-03.jpg)\n\
    \n登录 [`www.iwork.com`](http://www.iwork.com)，用你的 Apple ID 和密码登录，你的`共享文稿`就会显示出来。\n\
    \n**提示：** 这是一种协作处理工作的好方法，也可以将 iPad 上可能过大而无法通过电子邮件发送的内容发送给别人查看和打印。\n\n![images](img/p498-01.jpg)\n\
    \n# 打印文件\n\n要打印任何演示文稿，请轻点`工具`图标（`扳手`图标），然后选择`打印`。接着，你可以选择任何兼容 `AirPrint` 的打印机，并调整打印份数和特定页面。\n\
    \n**提示：** 我们在第 13 章：“iPad 上的电子邮件”的“打印信息”部分详细介绍了如何使用 `AirPrint` 及兼容打印机。\n\n# 通过电子传真服务发送传真\n\
    \n如果你不在家或办公室，又想快速打印或发送传真，通过电子传真服务发送文件是个很棒的技巧。\n\n**注意：** 要执行此操作，你首先需要注册一个电子传真服务，例如\
    \ [`www.efax.com`](http://www.efax.com)，这样你就可以将传真作为电子邮件附件发送。\n\n拥有电子传真帐户后，你可以按照以下步骤将文档作为电子邮件附件发送到传真机：\n\
    \n1.  在任何应用中，选择`共享` ![images](img/U001.jpg)`电子邮件演示文稿`。\n2.  选择`PDF 格式`。\n3.  按照电子传真服务要求的格式，在邮件地址中使用传真号码。某些服务的格式如下：`(传真号码)@faxsend.com`\
    \ 或 `3865551212@faxsend.com`\n4.  邮件发送后，你的传真服务会将其转换为传真，并发送到相应的传真机。\n\n# 导出文件\n\
    \n按照以下步骤导出 `iWork` 文件：\n\n1.  在任何 `iWork` 应用中，选择`共享` ![images](img/U001.jpg)`导出`。\n\
    2.  选择你希望文档传输到电脑时的文件类型。\n3.  下次将 iPad 连接到电脑时，传输将通过 iTunes 进行。通常的格式是该特定应用的默认格式。你也可以选择导出为\
    \ PDF 格式。\n\n![images](img/p499-01.jpg)\n\n**注意：** `Pages` 可以导出为适用于 Mac 或 PC 的\
    \ `Word` 格式，但 `Keynote` 和 `Numbers` 尚不能导出为对应的微软 PC 格式（`PowerPoint` 和 `Excel`）。你始终可以从\
    \ `Pages`、`Numbers` 和 `Keynote` 中选择导出为 PDF 文件。\n\n在下一节中，我们将介绍如何使用文件共享将文稿导入到你的\
    \ iPad。\n\n# 文件共享\n\n文件共享是指将你在 `iWork` 中创建的文稿通过 iTunes 进行共享。文件共享在 iTunes 中通过屏幕顶部的`应用`标签进行。点击`应用`，然后向下滚动到屏幕底部的`文件共享`部分。\n\
    \n**提示：** 我们还在第 3 章：“与 iTunes 同步”的“文件共享”部分介绍了如何使用文件共享。\n\niPad 上安装的每个能够进行文件共享的程序都会显示在底部。按照以下步骤将共享的文件取回到你的\
    \ iPad：\n\n1.  点击你从中共享文件的应用（本例中为 `Keynote`）。你在 iPad 上共享的所有文稿都会显示出来。\n\n   ![images](img/p500-01.jpg)\n\
    \n2.  勾选要保存的文稿，然后轻点右下角的`存储到`按钮。\n\n   ![images](img/p500-02.jpg)\n\n3.  接着，只需导航到你想要保存该文稿的文件夹即可。\n\
    4.  现在，该文件已在你的电脑上，可以方便地查看、编辑和打印。\n\n![images](img/p501-01.jpg)\n\n**提示：** `Pages`、`Keynote`\
    \ 和 `Numbers` 的不错替代品是 `Documents to Go` 和 `QuickOffice`。这两款替代品都整合在单个应用中，而不是作为三个独立的应用提供。\n\
    \n# 第 20 章\n\n## 在 iPad 上使用 iTunes\n\n在本章中，你将学习如何使用 iPad 上的 `iTunes` 应用来查找、购买和下载媒体。通过\
    \ `iTunes` 应用，你将能够下载音乐、电影、电视节目、播客和有声读物。你还可以通过 `iTunes U` 服务下载来自顶尖大学的免费教育内容。你还将学习如何兑换\
    \ iTunes 礼品卡。\n\n我们有些人还记得为了购买新单曲或专辑而去唱片店的日子。翻阅着那些黑胶唱片（或者后来的磁带和 CD），看着我们想要的所有音乐，那种感觉令人兴奋。\n\
    \n随着 iPad 的出现，那些日子已经一去不复返了。所有的音乐、电影、电视节目等等，都可以直接从 iPad 上获取。\n\niTunes 是一个音乐、视频、电视、播客等内容的商店——几乎你可以在\
    \ iPad 上消费的所有媒体类型，都可以直接从 iTunes Store 购买或租借（而且通常可以免费获取）。\n\niTunes 最新推出了一种名为 Ping\
    \ 的新型音乐社交网络功能。你可以使用这项服务关注艺人，查看你的朋友在听什么，等等。\n"
- fmt: '### Getting Started with iTunes on the iPad


    Earlier in this book, we showed you how to get your music from iTunes on your
    computer into your iPad (see [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad
    with iTunes”). You will also learn more about using iTunes on your computer in
    [Chapter 26](#Chapter26.html#ch26): “New Media: Reading Newspapers, Magazines,
    and More.” One of the great things about iTunes is that it is very easy to buy
    or obtain music, videos, podcasts, and audiobooks, and then use them within minutes
    right on your iPad.


    The iPad allows you to access the mobile version of iTunes right on your device.
    After you purchase or request free items, they will be downloaded to your iPad''s
    `iPod` app or `Videos` app. They will also be automatically transferred to your
    iTunes library on your computer the next time you perform a sync, so you can also
    enjoy the same content on your computer.


    #### A Network Connection Is Required


    You do need an active Internet connection (either Wi-Fi or 3G/cellular) in order
    to access the iTunes store. Check out [Chapter 4](#Chapter04.html#ch4): “Other
    Sync Methods” to learn more about network connectivity.


    #### Starting iTunes


    When you first received your iPad, `iTunes` was one of the icons on the first
    `Home` screen page. Touch the `iTunes` icon and you will be taken to the mobile
    iTunes Store.


    ![images](images/p504-01.jpg)


    **NOTE:** The `iTunes` app changes frequently. Since the `iTunes` app is really
    a web site, it is likely to change somewhat between the time we wrote this book
    and when you are looking at it on your iPad. Some of the screen images or buttons
    may look slightly different than the ones shown in this book.


    #### Navigating iTunes


    The `iTunes` app uses icons similar to other programs on the iPad, so getting
    around the app is quite easy. There are three buttons at the top and seven icons
    (*soft keys*) at the bottom to help you navigate the app. Look at [Figure 20–1](#Chapter20.html#fig_20_1)
    to see the soft keys and features. Scrolling works just like scrolling in any
    other program; move your finger up or down to look at the selections available.


    ![images](images/2001.jpg)


    **Figure 20–1.** *The iTunes layout*


    ### Finding Music with Featured, Top Charts, and Genius


    Along the top of the iTunes music store screen are three buttons: `Featured`,
    `Top Charts`, and `Genius`. By default, you are shown the `Featured` selections
    when you start the `iTunes` app.


    #### Top Charts—the Popular Stuff


    If you like to see what is popular in a particular category, you will want to
    browse the `Top Charts` category. Tap `Top Charts` at the top, and then tap a
    category or genre to see what is popular for that category.


    **CAUTION:** These songs or videos are selling well, but that doesn''t mean that
    they will appeal to you. Always give an item a preview and check out the reviews
    before you pay for it.


    ![images](images/p506-01.jpg)


    Tap the `Genre` button in the upper-left corner to select a particular genre.
    For example, if you touch `Singer Songwriter`, you will see the top ten songs
    or albums in that category only.


    The initial view shows you the `Top Songs` on the left and `Top Albums` on the
    right.


    You simply scroll through the lists as you would in any other program on the iPad.


    ![images](images/p506-02.jpg)


    #### Genres—Types of Music


    Touch the `Genres` button to browse music based on a genre. This is particularly
    helpful if you have a favorite type of music and would like to browse just that
    category.


    There is an extensive list of genres to browse; again, just scroll down the list
    as you would in any other iPad program.


    ![images](images/p507-01.jpg)


    Go ahead and browse through the music until you see something that you would like
    to preview or buy.


    #### Browsing for Videos (Movies)


    Touch the `Movies` or `TV Shows` buttons on the bottom to browse all the video-related
    items (see [Figure 20–2](#Chapter20.html#fig_20_2)).


    ![images](images/p507-02.jpg)


    ![images](images/2002.jpg)


    **Figure 20–2.** *Browsing the `Movies` category in iTunes on your iPad*


    You can also use your finger to scroll all the way to the bottom of the page to
    check out the links there, including these links in particular:


    *   `New to Rent or Own`

    *   `Highlights by Genre`

    *   `All HD Movies`


    ![images](images/p508-01.jpg)


    Tap any movie or video to see more details or preview the selection. You have
    the option to rent or buy some movies and TV shows.


    **Rentals:** Some movies are available for rent for a set number of days.


    **NOTE:** The rental period in the US is 24 hours, while the rental period in
    Canada is 48 hours. Other countries may vary slightly; many have no rentals at
    all.


    **Buy:** This option allows you to purchase and own the movie or TV show forever.


    ![images](images/p509-01.jpg)


    #### Finding TV Shows


    When you''re done checking out the movies, tap the `TV Shows` button at the bottom
    to see what is available for your favorite shows (see [Figure 20–3](#Chapter20.html#fig_20_3)).


    ![images](images/p509-02.jpg)


    ![images](images/p509-03.jpg)


    When you tap a TV series, you will see the individual episodes available. Tap
    any episode to check out the 30-second preview. See [Chapter 10](#Chapter10.html#ch10):
    “Viewing Videos, TV Shows, and More” for more information on watching videos.
    When you''re finished with the preview, tap the `Done` button.


    ![images](images/2003.jpg)


    **Figure 20–3.** *Buying and browsing TV episodes or seasons*


    When you are ready to buy, you can choose to buy an individual episode or the
    entire TV series. Many, but not all TV Series, allow you to purchase individual
    episodes.


    For example, maybe you want to get your fix of *House* and see the pilot episode
    that you missed. You can do this quickly and easily on your iPad.


    **NOTE:** There is also a `Free TV Episode` category, where you can get samples
    and bonus content.


    #### Audiobooks in iTunes


    Audiobooks are a great way to enjoy books without having to read them. Some of
    the narrators are quite entertaining; it is almost like watching a movie. For
    example, the narrator of the Harry Potter series can do dozens of truly amazing
    voices. We recommend that you try out an audiobook on your iPad; audiobooks are
    especially great when you are on an airplane and want to escape from the rest
    of the passengers, but don''t want to have the light on.


    **TIP:** If you''re a big audiobook listener, getting an `Audible.com` subscription
    can get you the same content at cheaper prices.


    ![images](images/p511-01.jpg)


    If you are an audiobook aficionado, be sure to check out the audiobooks in iTunes.


    You can use the top three buttons to browse the audiobooks in iTunes:


    *   `Featured`

    *   `Top Charts`

    *   `Categories`


    ![images](images/p511-02.jpg)


    ### iTunes U—Great Educational Content


    If you like educational content, then check out `iTunes U`. You will be able to
    browse whether your university, college, or school has its own section.


    ![images](images/p511-03.jpg)


    For example, we looked up Harvard University (see [Figure 20–4](#Chapter20.html#fig_20_4)).
    In just a few minutes of browsing, we discovered a campus-wide discussion of Harvard''s
    most renowned faculty in a series called *Harvard Thinks Big 2*.


    ![images](images/2004.jpg)


    **Figure 20–4.** *You can search for a particular university, then browse iTunes
    U by that university.*


    If you are in a location with a good wireless signal, you can tap the title of
    the audio or video item, and then listen to or watch it as a stream. If your signal
    gets interrupted, however, you will lose your place in the video. There are many
    advantages to actually downloading the file (if possible) for later viewing, not
    least of which is that you get more control of the video-watching experience.'
