- fmt: '# About the Authors


    ![image](images/martin_trautschold.jpg) **Martin Trautschold** is the founder
    and CEO of Made Simple Learning, a leading provider of Apple iPad, iPhone, iPod
    touch, BlackBerry, Android, and Palm webOS books and video tutorials. He has been
    a successful entrepreneur in the mobile device training and software business
    since 2001. With Made Simple Learning, he has helped to train thousands of Smartphone
    users with short, to-the-point video tutorials. Martin has now co-authored over
    twenty “Made Simple” guide books. He also co-founded, ran for 3 years, and then
    sold a mobile device software company. Prior to this, Martin spent 15 years in
    technology and business consulting in the US and Japan. He holds an engineering
    degree from Princeton University and an MBA from the Kellogg School at Northwestern
    University. Martin and his wife, Julia, have three daughters. He enjoys rowing
    with the Halifax Rowing Association in Daytona Beach, Florida and cycling with
    friends. Martin can be reached at [`martin@madesimplelearning.com`](mailto:martin@madesimplelearning.com).


    ![image](images/gary_mazo.jpg) **Gary Mazo** is Vice President of Made Simple
    Learning. Gary joined Made Simple Learning in 2008 and has co-authored the last
    nineteen books in the Made Simple series. Along with Martin and Kevin Michaluk
    from CrackBerry.com, Gary co-wrote CrackBerry: True Tales of BlackBerry Use and
    Abuse—a book about BlackBerry addiction and how to get a grip on one''s BlackBerry
    use. Gary also teaches writing, philosophy, technical writing, and more at the
    University of Phoenix. He holds a BA in anthropology from Brandeis University.
    Gary earned his M.A.H.L (Masters in Hebrew Letters) as well as ordination as Rabbi
    from the Hebrew Union College-Jewish Institute of Religion in Cincinnati, Ohio.
    He has served congregations in Dayton, Ohio, Cherry Hill, New Jersey, and Cape
    Cod, Massachusetts. When not writing or teaching, Gary enjoys cycling and playing
    the piano. Gary is married to Gloria Schwartz Mazo; they have six children. Gary
    can be reached at [`gary@madesimplelearning.com`](mailto:gary@madesimplelearning.com).


    ## About the Technical Reviewer


    ![image](images/rene_ritchie.jpg) Rene Ritchie is editor of TiPb.com, the iPhone,
    iPod touch, and iPad blog, which covers the full range of news; how-tos; and app,
    game, and accessory reviews. Part of the Smartphone Experts network, TiPb also
    provides a full range of help and community forums and has a thriving YouTube
    channel ([`www.youtube.com/theiphoneblog/`](http://www.youtube.com/theiphoneblog/)),
    Facebook page ([`www.facebook.com/tipbcom/`](http://www.facebook.com/tipbcom/)),
    and Twitter following ([`http://twitter.com/tipb`](http://twitter.com/tipb)).
    A graphic designer, web developer, and author, Rene lives and works in Montreal.
    He can be reached via [`rene@tipb.com`](mailto:rene@tipb.com) or `@reneritchie`
    on Twitter


    ## Part I


    ## Quick Start Guide


    In your hands is one of the most exciting devices to hit the market since the
    original version: the new iPad 2. This Quick Start Guide will help get you and
    your new iPad 2 up and running in a hurry. You''ll learn all about the buttons,
    switches, and ports. You''ll also learn how to use the innovative and responsive
    touch screen, as well as multitask with the new App Switcher bar. Our App Reference
    Tables introduce you to both the built-in apps and some valuable additions from
    the App Store—and serve as a quick way to find out how to accomplish a task. We
    also show you some popular accessories that will help you get more out of your
    iPad.


    ## Quick Start Guide


    This Quick Start Guide is meant to be just that—a tool that can help you jump
    right in and find information in this book—and learn the basics of how to get
    around and enjoy your iPad right away.


    We start with the nuts and bolts in the “Learning Your Way Around” section—what
    all the keys, buttons, switches, and symbols mean and do on your iPad. You''ll
    see some handy features such as how to double-click the `Home` button to multitask;
    how to configure the `Rotation Lock/Mute` switch; and how to interact with the
    menus, submenus, and set switches—which you do in almost every application on
    your iPad. You''ll also find out how to read your connectivity status and what
    to do when you travel on an airplane.


    **TIP:** Check out [Chapter 2](#Chapter02.html#ch2): “Typing Tips, Copy/Paste,
    & Search” for great typing tips and more.


    In “Touch Screen Basics,” we help you learn how to touch, swipe, flick, zoom,
    and more.


    In “App Reference Tables,” we''ve organized the app icons into general categories,
    so you can quickly browse the icons and jump to a section in the book to learn
    more about the app a particular icon represents. Here are the tables:


    *   Getting Started ([Table 2](#PartI.html#tab2))

    *   Staying Organized ([Table 3](#PartI.html#tab3))

    *   Being Entertained ([Table 4](#PartI.html#tab4))

    *   Staying Informed ([Table 5](#PartI.html#tab5))

    *   Networking Socially ([Table 6](#PartI.html#tab6))

    *   Being Productive ([Table 7](#PartI.html#tab7))


    In “Other Fun Stuff,” we show you the Electronic Picture Frame feature and how
    to enjoy videos on your iPad.


    In “iPad Accessories,” we give you a brief overview of some of the more common
    accessories you might find interesting.


    So let''s get started!


    ### Learning Your Way Around


    To help you get comfortable with your iPad, we start with the basics—what the
    buttons, keys, and switches do—then we move into how you start apps and navigate
    the menus. Probably the most important status indicator on your iPad, besides
    the battery, is the one that shows network status in the upper-left corner. You''ll
    see how to quickly read the network status icons.


    #### Keys, Buttons, and Switches


    [Figure 1](#PartI.html#fig_p1_1) shows all the things you can do with the buttons,
    keys, switches, and ports on your iPad. Go ahead and try out a few things to see
    what happens. Try pressing the `Volume Down` key for two seconds, double-clicking
    the `Home` button, using the `Rotation Lock/Mute` switch, and pressing and holding
    the `Power/Sleep` key. Have some fun getting acquainted with your device.


    ![images](images/p4-01.jpg)


    **Figure 1.** *The iPad 2 buttons, ports, switches, and keys*


    #### Locking the Screen Rotation or Muting Your iPad


    As soon as you start touching the iPad, you''ll notice the screen rotates amazingly
    fast. There are times when you don''t want it to rotate (called `Rotation Lock`
    or sometimes `Orientation Lock`)—for example, when you have it in your lap or
    on the table. The switch above the volume buttons on the upper-right edge of your
    iPad can be set to do two different functions. One function enables `Rotation
    Lock`, while the other enables you to `Mute` your device. (For example, you can
    mute rings from any incoming `FaceTime` video calls.) You can adjust which function
    you want to use for this side switch in the `Settings` app. In that app, select
    `General ![images](images/U001.jpg) Use Side Switch to ![images](images/U001.jpg)
    Rotation Lock` or `Mute`. Please see [Chapter 8](#Chapter08.html#ch8): “Multitasking
    and Mute/Lock Switch” for more details on how to use this switch.'
