    # 用 iPad 玩音乐


    iPad 上有很多音乐游戏和应用。其屏幕尺寸和设备技术让你几乎可以用 iPad 演奏任何乐器。


    | 多年来，Mac 用户一直能够通过电脑上的 `GarageBand` 应用学习音乐。最近，苹果推出了首个适用于 iPad 的 `GarageBand` 应用，堪称惊艳。`GarageBand`
    让你可以选择演奏架子鼓、键盘、吉他或贝司 — 全部通过 iPad 的触屏操作（参见图 22–3）。 | ![images](img/p543-01.jpg)
    |


    `GarageBand` 还包含一个录音机，让你可以在 iPad 上创作和录制配乐。你甚至可以插入电吉他（使用第三方适配器），并利用内置的吉他音箱来调整乐器的音色、音量和音调。


    ![images](img/2203.jpg)


    **图 22–3**. *在 `GarageBand` 上演奏架子鼓、吉他或键盘。*


    | 全新一批音乐应用让你能够真正把 iPad 当作乐器来使用。其中一款令人惊叹的新应用叫做 `Magic Fiddle`。这款由 Smule 开发的应用能让你真的去拨弄小提琴的琴弦。`Magic
    Fiddle` 仅售 2.99 美元。下载这款应用，尽情享受吧！如果你有孩子，他们可能也会喜欢。**注意：** 此应用并非要取代你那把价值连城的斯特拉迪瓦里小提琴；不过，它确实为学习小提琴提供了一个有趣的入门方式。
    | ![images](img/p544-01.jpg) |


    ## 演奏 Magic Fiddle


    你可以在 `StoryBook` 模式下演奏 `Magic Fiddle`，可以是在 `Solo` 模式下作为独奏乐器，也可以使用内置的 `Songbook`
    功能演奏流行乐曲（参见图 22–4）。


    要更改琴弦颜色或调性，请点击 `Main` 屏幕上的 `Settings` 图标。


    要在 `Solo` 模式下演奏，请像拿小提琴一样握着 iPad，将其搁在肩上弹奏。


    ![images](img/2204.jpg)


    **图 22–4.** *`Magic Fiddle` 的屏幕与控制界面*


    ## 世界视图


    点击 `Back` 按钮并选择 `World`（参见图 22–5）。这会显示一个地球仪，上面有世界各地的人们在愉快地演奏小提琴。有时你还会看到二重奏。


    如果你喜欢某个人的演奏方式，请点击 `Love` 图标。


    如果你不喜欢正在听的音乐，请点击 `Next` 图标（两个向右的箭头）。


    ![images](img/2205.jpg)


    **图 22–5.** *`Magic Fiddle` 的世界视图——观看他人演奏小提琴*


    # 游戏中心


    | 去年，苹果为便携游戏引入了一个新概念：`Game Center`。`Game Center` 是一个让你与朋友见面、邀请朋友玩游戏，或分享你与朋友共同玩的游戏成就的地方。
    | ![images](img/p546-01.jpg) |


    ## 设置游戏中心


    | 当你首次从 iPad 上启动 `Game Center` 时，系统会要求你使用 `Apple ID` 和密码或 `MobileMe ID` 和密码登录。输入你的个人信息，然后输入一个电子邮件地址（或多个电子邮件地址）以验证
    `Game Center` 的使用权限。 | ![images](img/p547-01.jpg) |


    **提示**：如果你注册并验证了多个电子邮件地址，你的朋友将更容易在 `Game Center` 上找到你，并邀请你加入他们的 `Game Center`
    网络。


    | 请确保 `Allow Game Invites` 和 `Find me By Email` 按钮处于**开启**状态，这样你的朋友才能邀请你一起玩。 |
    ![images](img/p547-02.jpg) |


    ## 使用游戏中心


    一旦你设置好 `Game Center`，乐趣就开始了。启动 `Game Center`，你会看到你有多少位朋友、安装了多少款 `Game Center`
    游戏，以及获得了多少成就。所有这些信息都可以在底部的 `Me` 标签页 ![images](img/p548-01.jpg) 中查看。


    触摸 `Friends` 标签页 ![images](img/p548-02.jpg)，你会看到你有多少位 `Game Center` 好友。这个数量上限似乎是
    500 位好友。


    触摸 `Games` 标签页 ![images](img/p548-03.jpg)，你会看到你的设备上安装了多少款 `Game Center` 游戏。


    **注意**：一旦你拥有了 `Game Center` 账户，你可以从任何 iOS 设备登录，查看你的游戏、好友和成就。


    触摸 `Requests` 标签页 ![images](img/p548-04.jpg)，可以查看待处理的请求，或者触摸 **+** 号按钮，通过电子邮件地址邀请联系人成为你的
    `Game Center` 好友。


    ## 进行多人游戏


    某些 `Game Center` 游戏允许你与一位 `Game Center` 好友进行（并邀请其参加）一对一的游戏。有些游戏会为你匹配在线玩家，而其他游戏则只允许你与朋友分享成就。


    | 右侧的截图显示了启用了几款游戏的 `Game Center`：有些游戏只允许用户分享成就，而另一些则允许用户与朋友对战或进行在线匹配。 | ![images](img/p549-01.jpg)
    |


    在一款多人游戏中（例如 `Adrenaline Golf`），你可以从 `Game Center` 内部启动游戏，也可以从 iPad 上的游戏图标启动。


    | 右侧的截图显示了用户在 `Adrenaline Golf` 中选择 `Play Multiplayer` 时的选项。这样做会弹出 `Automatic
    Match Making` 或 `GameCenter Invite` 选项。选择 `Automatic Match Making` 会提示 iPad 寻找对手与用户对战。
    | ![images](img/p549-02.jpg) |


    # 其他趣玩：iPad 上的体育赛事


    | 有大量优秀的应用可以为用户在 iPad 上提供无尽的娱乐时光。自 2011 年春季 iPad 2 发布以来，`March Madness`、`NBA Basketball`、`MLB
    Spring Training` 等众多应用便应运而生。`At Bat 2011 for iPad` 是一款售价 14.99 美元的应用，对于任何棒球迷来说都物超所值。它也很好地体现了
    iPad 的能力。 | ![images](img/p550-01.jpg) |

    | `NCAA March Madness On Demand` 应用让用户能够追踪今年大学篮球锦标赛的每一场比赛。`March Madness` 应用实际上提供了实时电视信号，因此每场赛事转播都可以在
    iPad 上播放。这似乎是其他应用正朝着发展的方向，不仅提供比赛统计数据与新闻，还允许用户在 iPad 上观看体育赛事直播。这非常酷！ | ![images](img/p550-02.jpg)
    |


    | `NBA Game Time Courtside` 应用让我能够跟随我的凯尔特人队，走过常规赛，进入季后赛。在每场常规赛期间，我都可以在我的 iPad
    上实时看到谁在场上，并跟踪得分情况！ | ![images](img/p551-01.jpg) |


    # 第 23 章


    # 社交网络


    你的 iPad 可以通过许多超越传统电子邮件和网页功能的创新方式，让你与他人保持联系。


    如今，一些最受欢迎的“连接”场所是那些常被称为*社交网站*的地方——这些站点允许你创建自己的页面，并与朋友和家人联系，了解他们的生活动态。一些最流行的社交网站包括
    Facebook、Twitter 和 LinkedIn。


    在本章中，我们将向你展示如何访问这些不同的站点。你将学习如何更新状态、*发推文*，以及跟踪那些对你重要或你感兴趣的人。


    我们还将向你推荐一些优秀的第三方应用，它们能以新颖、创新的方式让你使用某些社交网络功能。

    '
- fmt: "## Facebook\n\nFacebook was founded in February of 2004. Since that time,\
    \ it has served as the premier site for users to connect, reconnect, and share\
    \ information with friends, co-workers, and family. Today, more than 400 million\
    \ people use Facebook as their primary means of “catching up” with the people\
    \ who matter most to them.\n\n**NOTE:** You cannot play Facebook Games on your\
    \ iPad. This may disappoint you if you are a big Facebook Game player. You can,\
    \ however, play against Facebook Friends in games like Scrabble (see [Chapter\
    \ 22](#Chapter22.html#ch22): “Games and Fun”).\n\nOn your iPad, you have three\
    \ primary ways of accessing your Facebook page at the time of publishing:\n\n\
    *   Use `Safari` to go to the standard (full) web site: [`www.facebook.com`](http://www.facebook.com).\n\
    *   Use a third-party app like `Flipboard` (shown later in chapter).\n*   Use\
    \ the official iPhone/iPad touch `Facebook` app.\n\n![images](images/p554-01.jpg)\n\
    \n**NOTE**: The authors recommend either `Flipboard` or `Friendly Facebook for\
    \ iPad` as the best iPad solutions for accessing Facebook at the moment. The iPhone/iPad\
    \ touch app is more limited than the full site version, but it is easier to navigate.\
    \ Remember that this app was originally created for the iPhone/iPod touch, so\
    \ it will not fill up the screen. You can always touch the `2x` button to make\
    \ it bigger—but an enlarged screen will not look as sharp or clear as the desktop-based\
    \ Facebook web page.\n\n### Logging into facebook.com from Safari\n\n| To log\
    \ in on the web-based app, start up the `Safari` browser and go to [`www.facebook.com`](http://www.facebook.com).\
    \ Log in just as you do on your computer. **TIP:** If the full web site seems\
    \ overwhelming, log in to [`touch.facebook.com`](http://touch.facebook.com) or\
    \ [`m.facebook.com`](http://m.facebook.com) to access the mobile site. | ![images](images/p554-02.jpg)\
    \ |\n\n### Getting Around facebook.com\n\nThe nice thing about facebook.com is\
    \ that you already know how to get around the site if you have ever used Facebook\
    \ on your computer. It works essentially the same way.\n\nTap any of the links\
    \ in the `Left Nav Bar` to get to your `News Feed`, `Messages`, `Events`, `Photos`,\
    \ `Friends`, and so on (see [Figure 23–1](#Chapter23.html#fig_23_1)).\n\n![images](images/2301.jpg)\n\
    \n**Figure 23–1.** *The facebook.com web page in the `Safari` browser*\n\n###\
    \ Status Update/News Feed\n\n| Once you log onto the Facebook web site with `Safari`,\
    \ you will have the option to write “What's on your mind” and see your `News Feed`\
    \ from your friends. | ![images](images/p555-01.jpg) |\n\n### Finding Facebook\
    \ Friends\n\n| In the web-based Facebook page, you can find friends by touching\
    \ the `Search` field and starting to type in the name of the friend you are looking\
    \ for. You can also touch the `Account` dropdown box from your `Home` page and\
    \ then touch `All Connections` on the left side to see your friends. Your friends\
    \ are also listed under `Lists` along the left-hand sidebar. **NOTE:** If you\
    \ are using either [`touch.facebook.com`](http://touch.facebook.com) or [`m.facebook.com`](http://m.facebook.com),\
    \ you will have a `Friends` tab at the top; simply touch this to see your list\
    \ of friends. | ![images](images/p556-01.jpg) |\n\n### Uploading a Photo to facebook.com\n\
    \nUnfortunately, there was an issue with uploading a photo to Facebook at the\
    \ time of publishing: the simple `Upload Photo` that you use from your desktop\
    \ computer did not work with the `Safari` browser. Instead, you were asked to\
    \ send an e-mail to a uniquely generated e-mail address that appears in Facebook\
    \ after you tap `Upload Photo`. The subject of your e-mail becomes the text for\
    \ the uploaded photo. One nice thing about uploading photos to Facebook by e-mail\
    \ is that you can send a bunch of photos at one time and have them upload in the\
    \ background. This differs from the `Facebook` app, which requires that you wait\
    \ for each photo to upload before you do the next.\n\nWe won't show you the detailed\
    \ steps for uploading photos to Facebook via e-mail; instead, we recommend that\
    \ you install the `Facebook` app and use it to upload photos. It is much easier\
    \ to use this approach. See the “Uploading Pictures with the Facebook App” section\
    \ later in this chapter for the upload steps.\n\n### Downloading and Installing\
    \ the Facebook App\n\n| In order to find the app, use the `Search` feature in\
    \ the App Store and type in `Facebook`. You can also go to the Social Networking\
    \ category in the App Store and find the official `Facebook` app, as well as many\
    \ other Facebook-related apps. **NOTE**: Some of the apps may look like official\
    \ Facebook apps, and they do cost money. However, the only official app is the\
    \ iPhone/iPod touch app mentioned previously. | ![images](images/p557-01.jpg)\
    \ |\n\n| In order to connect to your account on Facebook, you will need to locate\
    \ the icon you just installed and click it. We use the example of the `Facebook`\
    \ app here, but the process is very similar for the rest of the apps, as well.\
    \ Once the `Facebook` app is successfully downloaded, you should see the icon\
    \ shown here. | ![images](images/p557-02.jpg) |\n\n### Facebook App Basics\n\n\
    | Once the `Facebook` app is downloaded and installed, the first thing you will\
    \ see is the `Login` screen. Input your account information—your email address\
    \ and password. | ![images](images/p558-01.jpg) |\n\n| After you log in the first\
    \ time, you will see a `Push Notifications` warning message. Click `OK` if you\
    \ want to allow these messages, which can be pokes from other Facebook friends,\
    \ notes, status update notifications, and so on. Once you log in, you will see\
    \ the `Facebook` screen shown in [Figure 23–2](#Chapter23.html#fig_23_2). Tap\
    \ the `Facebook` logo to navigate around the app. | ![images](images/p558-02.jpg)\
    \ |\n\n![images](images/2302.jpg)\n\n**Figure 23–2.** *Using the `Facebook` app*\n\
    \n### Navigating Around Facebook\n\n| Toggle between the `Navigation` icons and\
    \ your current location by tapping the word `Facebook` at the top of the page.\
    \ For example, if you are in the `News Feed` and tap `Facebook`, you will see\
    \ all the icons. Tap `Facebook` again and you will return to the `News Feed`.\
    \ From the icons page, you can access your `News Feed`, `Profile`, `Friends`,\
    \ `Notifications`, `Places`, `Requests`, `Events`, `Photos`, or `Chat`. | ![images](images/p559-01.jpg)\
    \ |\n\n### Communicating with Your Friends\n\nFollow these steps to communicate\
    \ with your Facebook Friends:\n\n1.  Tap `Facebook` at the top to see all the\
    \ icons.\n2.  Tap the `Friends` icon to see your list of friends displayed.\n\
    3.  Touch the friend you want to communicate with, and you will go to her Facebook\
    \ page. From here, you can write on the `Wall` and see your friend's `Info` and\
    \ `Photos`.\n\n![images](images/p560-01.jpg)\n\n### Uploading Pictures with the\
    \ Facebook App\n\nAn easy and fun thing to do with Facebook is to upload pictures.\
    \ Follow these steps to upload pictures in the `Facebook` app:\n\n1.  From the\
    \ `Facebook` main icons, tap `Photos`.\n2.  Choose an album, such as `Mobile Uploads`.\n\
    3.  Tap the `Camera` next to the “What's on your mind?” box. Next, tap `Take Photo\
    \ or Video` to snap a picture or make a video to upload. Or, you can tap `Choose\
    \ From Library` to navigate through the pictures on your iPad until you find the\
    \ picture you wish to upload.\n\n    ![images](images/p560-02.jpg)\n\n4.  Next,\
    \ tap `Write a caption…` to write a caption, if so desired.\n\n    ![images](images/p561-01.jpg)\n\
    \n5.  To finish the upload, tap the blue `Upload` button. The photo will go into\
    \ your `Mobile Uploads` folder.\n\n**NOTE**: When you upload a photo, the image\
    \ quality won't be the same as it was originally on your iPad.\n\n![images](images/p561-02.jpg)"
