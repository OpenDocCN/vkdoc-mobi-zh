- fmt: "### What iTunes Can Do For You\n\nThe `iTunes` software on your computer allows\
    \ you to do many things, including the following:\n\n- **Buy apps, music, videos,\
    \ TV shows, and more (or download them for free):** You can purchase or download\
    \ free apps, music, movies, TV shows, podcasts, `iBooks`, PDF files, and audiobooks.\
    \ You can even download educational content from `iTunes U`, a special area in\
    \ `iTunes` devoted to educational content from universities and other institutions\
    \ of learning. The best part: Much of this content is free!\n- **Organize your\
    \ media:** You can use the various views and automatic playlists, and set up your\
    \ own custom playlists.\n- **Participate in Social Networking:** Using the new\
    \ `Ping` feature in `iTunes`, you can follow your favorite artists and learn what\
    \ music they are talking about. You can also share your favorite music with your\
    \ friends, and you can even see who is going to the concert next weekend.\n- **Sync\
    \ your music, videos, contacts, and more to your iPad:** You want to be able to\
    \ take all your great music and videos with you on your iPod—use `iTunes` to sync\
    \ your content and go (see [Chapter 3](#Chapter03.html#ch3): \"Sync Your iPad\
    \ with iTunes\").\n- **Play your music, videos, and audio content:** The `iTunes`\
    \ app serves as a great media player for your computer, enabling you to play all\
    \ your media, including music, videos, TV shows, and podcasts.\n- **Back up and\
    \ restore your iPad:** This option lets you back up and restore your iPad data.\n\
    \n### Common Questions About iTunes\n\nWhat follows is a list of frequently asked\
    \ questions about `iTunes` for the iPad, followed by short answers that address\
    \ the core concern or issue raised by the question.\n\n*Is the `iTunes` software\
    \ on my computer the same as the `iTunes` app on my iPad?*\n\n> The `iTunes` software\
    \ on your computer does the same job as a number of apps on your iPad. You need\
    \ the following apps on your iPad to do all that `iTunes` can do on your computer:\
    \ `iPod`, `Videos`, `iTunes`, `iBooks`, and the `App Store`.\n> \n> ![images](images/p687-01.jpg)\n\
    \n*I have an iPhone or another iPod; can I share music and videos with my new\
    \ iPad?*\n\n> Yes! You can definitely keep listening to all your music and sharing\
    \ all your videos on all of your Apple devices, including your new iPad.\n\n*Can\
    \ I use my existing `iTunes` software and account?*\n\n> Yes! You can use the\
    \ same `iTunes` software already installed on your computer, as well as your existing\
    \ iTunes account, to set up your iPad.\n\n*Can I use my purchased apps from my\
    \ iPhone or iPod touch?*\n\n> Yes, but with limitations. iPhone and iPod touch\
    \ apps will work; however, iPhone/iPod touch-specific apps will show up in a small\
    \ window in the middle of the screen and typically will not rotate as you tilt\
    \ your iPad on its side (`Landscape` mode). You can press a small `2×` button\
    \ to expand the app to fill the screen, but it will look a little grainy.\n\n\
    ### iTunes Guided Tour\n\nAfter you have the latest version of `iTunes` installed\
    \ (which was version 10 at the time of writing this book), you're ready to take\
    \ a quick guided tour of the `iTunes` interface on your computer. The nice thing\
    \ is that the interface looks very much the same on PCs and Macs.\n\nWhen you\
    \ first start `iTunes`, you will see the main window with controls at the top\
    \ to play your music or videos (see [Figure 29–3](#Chapter29.html#fig_29_3)).\
    \ You will also see the Left Navigation (Nav) Bar, which lets you select from\
    \ your library, the iTunes Store, your iPad (when connected), shared media, Genius\
    \ playlists, and your own playlists. The Top Nav Bar adjusts, depending on what\
    \ you have selected in the Left Nav Bar. Also, the center main window adjusts,\
    \ depending on selections from the Left and Top Nav Bars, as well as what is inside\
    \ the main window itself.\n\n![images](images/2903.jpg)\n\n**Figure 29–3.** *The\
    \ `iTunes` main window*\n\nStarting from the top left of the main window, you\
    \ can see the following menus, controls, windows, and other visual elements:\n\
    \n- **Main menus:** These are located just above the media controls, and they\
    \ provide access to all the actions `iTunes` can perform through a logical and\
    \ convenient set of menus. While a lot of the functionality in these menus is\
    \ available in buttons and toolbars, these menus are where you'll find what you're\
    \ looking for in a logical list.\n- **Media controls:** These buttons let you\
    \ play, pause, or skip to the next song or video, as well as adjust the volume.\n\
    - **Status window:** Located in the top-middle section of `iTunes`, this window\
    \ shows you the status of what is currently going on (sync status, whether you're\
    \ playing a song/video, or any other related messages).\n- **View adjustment buttons:**\
    \ These buttons allow you to adjust views between `List`, `Grid`, or `Cover Flow`\
    \ views. (These are only active when you are in your own media libraries.)\n-\
    \ **Search box:** This box allows you to search your library or the iTunes Store\
    \ for a particular song, video, TV show, or anything else based on the text you\
    \ enter.\n- **Sign-in link:** Located just below the `Search` box in the upper-right\
    \ corner, this button allows you to sign into the iTunes Store or create a new\
    \ Apple ID. Notice that the figure to the right shows `martin@madesimplelearning.com`\
    \ instead of `Sign in`. This is because Martin has already signed in with his\
    \ `Apple ID`.\n\n  ![images](images/p689-01.jpg)\n\n- **Top Nav Bar:** This set\
    \ of buttons under the status window will vary, depending what you have selected\
    \ in the Left Nav Bar. Sometimes there are very few buttons; other times, they\
    \ will stretch across the screen. Click any of these buttons to change the content\
    \ shown in the main window.\n- **Left Nav Bar:** This bar allows you to view your\
    \ library (e.g., music, videos, TV shows, and podcasts), the iTunes Store and\
    \ Ping, your purchased content, any currently connected devices (your iPad, iPod,\
    \ iPhone, and so on), shared libraries, Genius mixes, and your own playlists.\n\
    - **Main window:** This is where you can see all the content based on your selections\
    \ in the Left and Top Nav Bars. For example, if you selected your iPad in the\
    \ Left Nav Bar and `Apps` in the Top Nav Bar, you would see a screen similar to\
    \ the one shown in [Figure 29–3](#Chapter29.html#fig_29_3).\n\n#### Apple Video\
    \ Tutorials for iTunes\n\nIn addition to all the information provided in this\
    \ book, you can find some good video tutorials from Apple to help you start using\
    \ the `iTunes` app. You can check these tutorials out from within the `iTunes`\
    \ app by clicking the `Help` menu and selecting `iTunes Tutorials`.\n\n### Using\
    \ Ping in iTunes\n\n![images](images/p690-01.jpg)\n\nAs we mentioned, Ping is\
    \ the new social networking feature focused on music; it is available in `iTunes`\
    \ version 10 and higher. It allows you to follow your favorite artists, as well\
    \ as those of your friends. The feature also lets you share your likes and dislikes\
    \ with people, find out about local concerts, and more."
