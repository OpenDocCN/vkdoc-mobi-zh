  trans: "\n#### 在 FaceTime 中设置收藏\n\n与使用 iPhone 时类似，您可以在 iPad 上为 `FaceTime` 通话设置`收藏`。您设置的收藏对象必须是拥有\
    \ iPad 2、iPod touch 或 iPhone 4 的用户，且这些用户也需要将设备设置为可进行 `FaceTime` 通话。请按照以下步骤将联系人添加到您的`收藏`中：\n\
    \n1. 像之前一样启动 `FaceTime` 应用。\n2. 点击底部的`收藏`软键（请参见 图 18–4）。\n3. 点击`加号` (`+`)，然后选择一个联系人添加到您的`收藏`中。\n\
    \n**注意**：选择联系人时，请选择该联系人的 iPhone 号码或与其 `FaceTime` 账户关联的电子邮件地址。\n\n![images](img/1804.jpg)\n\
    \n**图 18–4.** *在 `FaceTime` 中添加收藏*\n\n#### 使用 FaceTime 进行多任务处理\n\n新款 iPad 的一大特色是搭载了苹果最新的\
    \ iOS 软件，支持多任务处理（请参阅第 8 章：“多任务处理与语音控制”，了解更多关于如何在应用间切换的内容）。\n\n当您正在进行 `FaceTime`\
    \ 通话时，只需双击`主屏幕`按钮即可查看正在运行的其他应用。切换到另一个应用后，屏幕顶部会出现一个提示栏，显示“轻触以继续 FaceTime 通话”。部分用户反映，通过此方式操作后，有时难以返回\
    \ `FaceTime` 通话。\n\n只需轻触该提示栏即可返回通话。\n\n![images](img/p459-01.jpg)\n\n### 使用 Skype\
    \ 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过像 [`www.facebook.com`](http://www.facebook.com)\
    \ 和 [`www.myspace.com`](http://www.myspace.com) 这样的网站进行被动交流固然不错，但有时，没有什么能替代亲耳听到对方声音的体验。\n\
    \n令人惊喜的是，您可以使用任何 iPad 上的 `Skype` 应用拨打电话。拨打给世界上任何其他 Skype 用户的电话都是免费的。Skype 的一大优点是它能在电脑和多种移动设备上运行，包括\
    \ iPhone 4、iPod touch、部分黑莓智能手机以及其他移动设备。拨打手机和座机电话会产生费用，但资费合理。\n\n![images](img/p459-02.jpg)\n\
    \n**注意**：只有当您拥有前置摄像头（例如 iPad 2、iPhone 4 或 iPod touch 上的那种）时，才能使用 `Skype` 应用进行视频通话。\n\
    \n![images](img/p459-03.jpg)\n\n#### 将 Skype 下载到您的 iPad\n\n您可以从 App Store 免费下载\
    \ `Skype` 应用，方法是搜索“Skype”并进行安装。如果您在操作过程中需要帮助，请查阅第 21 章：“神奇的 App Store”。不过，您应该注意到，与\
    \ `Facebook` 和其他应用类似，`Skype` 并没有原生的 iPad 版本，因此您将使用的是 iPhone 版应用。\n\n#### 在 iPad\
    \ 上创建 Skype 账户\n\n如果您需要设置 Skype 账户，并且尚未在电脑上完成此操作（请参阅本章后面的“在电脑上使用 Skype”部分），请按照以下步骤在\
    \ iPad 上设置 `Skype`：\n\n1. 在`主屏幕`上点击 `Skype` 图标。\n2. 点击`创建账户`按钮。\n3. 在弹出的`无法拨打紧急电话`警告窗口中点击`接受`。\n\
    4. 输入您的`全名`、`Skype 名称`、`密码`和`电子邮件`，然后通过设置底部的开关来决定是否要`接收新闻和优惠`。\n5. 点击`完成`按钮以创建您的账户。\n\
    \n![images](img/p460-01.jpg)\n\n#### 登录 Skype 应用\n\n创建账户后，您就可以在 iPad 上登录 `Skype`\
    \ 了。请按照以下步骤操作：\n\n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击 `Skype` 图标。\n2. 输入您的`Skype 名称`和`密码`。\n\
    3. 点击右上角的`登录`按钮。\n4. 您无需再次输入此登录信息；它已保存在 `Skype` 中。下次您点击 `Skype` 时，它将自动为您登录。\n\n\
    ![images](img/p461-01.jpg)\n\n#### 查找并添加 Skype 联系人\n\n一旦登录 `Skype` 应用，您就可以开始与他人沟通了。为此，您需要找到他们并将其添加到您的\
    \ `Skype` 联系人列表中：\n\n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击 `Skype` 图标，如有提示则登录。\n2. 点击底部的`联系人`软键。\n\
    3. 点击顶部的`搜索`窗口，然后输入某人的姓氏和名字或`SkypeName`。点击`搜索`以查找此人。\n4. 当您看到要添加的人时，点击其姓名。\n\n\
    \   ![images](img/p461-02.jpg)\n\n5. 如果您不确定此人是否正确，请点击`查看完整资料`按钮。\n6. 点击底部的`添加联系人`。\n\
    \n   ![images](img/p462-01.jpg)\n\n7. 适当调整邀请信息。\n8. 点击`发送`按钮，向此人发送邀请，使其成为您的 `Skype`\
    \ 联系人之一。\n\n   ![images](img/p462-02.jpg)\n\n9. 重复此过程以添加更多联系人。\n10. 完成后，点击底部的`联系人`软键。\n\
    11. 在`群组`屏幕中点击`所有联系人`，即可查看您添加的所有新联系人。\n12. 一旦此人接受您为联系人，您将在`所有联系人`屏幕中看到其名字被列为联系人。\n\
    \n**提示：** 有时您可能需要删除某个 `Skype` 联系人。您可以通过在联系人列表中点击她的姓名来移除或屏蔽该联系人。点击`设置`图标（右上角），然后选择`从联系人中移除`或`屏蔽`。\n\
    \n![images](img/p463-01.jpg)\n\n#### 在 iPad 上使用 Skype 拨打电话\n\n到目前为止，您已经创建了账户并添加了联系人。现在，您终于可以在\
    \ iPad 上通过 `Skype` 拨打第一个电话了：\n\n1. 如果您尚未进入 `Skype`，请在`主屏幕`上点击 `Skype` 图标，如有提示则登录。\n\
    2. 点击底部的`联系人`软键。\n3. 点击`所有联系人`以查看您的联系人。\n4. 点击您想要呼叫的联系人姓名（请参见 图 18–5）。\n5. 点击`呼叫`按钮。\n\
    6. 您可能会看到 `Skype` 按钮和`手机`或其他电话按钮。按下 `Skype` 按钮即可拨打免费电话。拨打任何其他类型的电话都需要您使用 `Skype\
    \ 点数` 付费。\n\n![images](img/1805.jpg)\n\n**图 18–5.** *在 iPad 上通过 `Skype` 拨打电话*\n\
    \n**注意：** 您可以使用 iPad 上的 `Skype Out` 免费拨打免费电话号码。以下通知来自 Skype 网站 [`www.skype.com`](http://www.skype.com)：\n\
    \n“以下国家和号码范围受支持，且对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33 800、+33 805、+33 809 波兰：+48 800\
    \ 英国：+44 500、+44 800、+44 808 美国：+1 800、+1 866、+1 877、+1 888 台湾：+886 80。”\n\n####\
    \ 使用 Skype 切换摄像头\n\n就像在 `FaceTime` 应用中一样，您可以通过“切换”到 iPad 的后置摄像头，向 `Skype` 通话对象展示您周围的环境。\n\
    \n只需点击左上角的`摄像头`软键，然后选择您希望在屏幕上显示`前置摄像头`、`后置摄像头`还是`无摄像头`。\n\n如果您选择`无摄像头`，`Skype`\
    \ 仍可正常工作，但您只能进行语音通话——没有视频画面。\n\n![images](img/p465-01.jpg)\n"
- fmt: "# Receiving Calls with Skype on Your iPad\n\nApple’s `iOS` innately supports\
    \ background voice over Internet protocol (VoIP) calls. With the latest version\
    \ of `Skype`, you can have `Skype` running in the background and still be able\
    \ to receive a `Skype` call when it comes in. You can even (theoretically) be\
    \ on a voice call and then answer your `Skype` call!\n\n**TIP:** `Skype` is a\
    \ huge battery drain. If you want to call someone you know who uses `Skype` on\
    \ her iPad, just send her a quick email or give her a quick call to alert her\
    \ to the fact you would like to talk to her using the `Skype` app.\n\n## Buying\
    \ Skype Credits or a Monthly Subscription\n\n`Skype`-to-`Skype` calls are free.\
    \ However, if you want to call people on their landlines or mobile phones from\
    \ `Skype`, then you will need to purchase Skype Credits or purchase a monthly\
    \ subscription plan. If you try to purchase the credits or a subscription from\
    \ within the `Skype` app, it will take you to the Skype web site. For this reason,\
    \ we recommend using `Safari` on your iPad or using your computer’s web browser\
    \ to purchase these credits.\n\n**TIP:** You may want to start with a limited\
    \ amount of Skype Credits to try out the service before you sign up for a subscription\
    \ plan. Subscription plans are the way to go if you plan on using the `Skype`\
    \ app to talk to a lot for non-Skype callers (e.g., regular landlines and mobile\
    \ phones).\n\nFollow these steps to use `Safari` to buy Skype Credits:\n\n1. \
    \ Tap the `Safari` icon.\n2.  Type [`www.skype.com`](http://www.skype.com) in\
    \ the top address bar and tap `Go`.\n3.  Tap the `Sign In` link at the top of\
    \ the page.\n4.  Enter your `Skype Name` and `Password`, and then tap `Sign me\
    \ in`.\n5.  If you are not already on your `Account` screen, tap the `Account`\
    \ tab in the right side of the Top Nav Bar.\n6.  At this point, you can choose\
    \ to buy credits or a subscription:\n    *   Tap the `Buy pre-pay credit` button\
    \ to purchase a fixed amount of credits.\n    *   Tap the `Get a subscription`\
    \ button to buy a monthly subscription account.\n7.  Finally, complete the payment\
    \ instructions for either type of purchase.\n\n## Chatting with Skype\n\nIn addition\
    \ to making phone calls, you can also chat via text with other `Skype` users from\
    \ your iPad. Starting a chat is very similar to starting a call; follow these\
    \ steps to do so:\n\n1.  If you are not already in `Skype`, tap the `Skype` icon\
    \ from your `Home` screen and log in, if asked.\n2.  Tap the `Contacts` soft key\
    \ at the bottom.\n3.  Tap `All Contacts` to see your contacts.\n4.  Tap the name\
    \ of the contact you wish to chat with (see [Figure 18–6](#Chapter18.html#fig_18_6)).\n\
    5.  Tap the `Chat` button.\n6.  Type your chat text and press the `Send` button.\
    \ Your chat will appear in the top of the screen.\n\n![images](images/1806.jpg)\n\
    \n**Figure 18–6.** *Chatting with `Skype` on your iPad*\n\n## Adding Skype to\
    \ Your Computer\n\nYou can use the `Skype` app on your computer, as well. We will\
    \ show you how this works next. You can also use `Skype` to make video calls on\
    \ your computer if you also have a web cam hooked up.\n\nTo create a Skype account\
    \ and download `Skype` software for your computer, follow these steps:\n\n1. \
    \ Open a web browser on your computer.\n2.  Go to [`www.skype.com`](http://www.skype.com).\n\
    3.  Click the `Join` link at the top of the page.\n4.  Create your account by\
    \ completing all required information and clicking the `Continue` button. Notice\
    \ that you only have to enter information in the required fields, which are noted\
    \ with an asterisk. For example, you do not need to enter your gender, birthdate,\
    \ and mobile phone number.\n5.  You are now done with the account setup process.\
    \ Next, you are presented with the option of buying Skype Credits; however, this\
    \ is not required for free `Skype`-to-`Skype` phone calls, video calls, or chats.\n\
    \n    **TIP:** You only need to pay for `Skype` if you want to call someone who\
    \ is not using `Skype`. For example, calls to phones on landlines or mobile phones\
    \ (not using `Skype`) will cost you. At publishing time, pay-as-you-go rates were\
    \ about US 2.1 cents per minute; monthly subscriptions ranged from about US $3\
    \ - $14 for various calling plans.\n\n6.  Next, click the `Get Skype` link in\
    \ the Top Nav Bar of the site to download `Skype` to your computer.\n7.  Click\
    \ the `Get Skype for Windows` button or the `Get Skype for Mac` button.\n8.  Follow\
    \ the instructions to install the software.\n9.  Once the software is installed,\
    \ launch it and log in using your Skype account.\n10.  You are ready to initiate\
    \ (or receive) phone calls, video calls, and chats to anyone else using `Skype`,\
    \ including all your friends with `Skype` on their iPads.\n\n# Chapter 19\n\n\
    # Productivity and File Transfer\n\nYou already know that your iPad is great for\
    \ consuming or enjoying content. It is your music player, your video player, and\
    \ your gaming console; and it brings you news, weather, sports, and more. The\
    \ iPad isn’t just for fun and games, though. In this chapter, we take a look at\
    \ Apple’s three productivity powerhouse apps: `Pages` (compatible with `Microsoft\
    \ Word`), `Keynote` (compatible with `Microsoft PowerPoint`), and `Numbers` (compatible\
    \ with `Microsoft Excel`).\n\nIf you are a Mac user, you may already be familiar\
    \ with `Pages`, `Keynote`, and `Numbers`, which are part of the `iWork for Mac`\
    \ suite. With these three apps on your iPad, you can create content—not just consume\
    \ it.\n\n![images](images/p469-01.jpg)\n\nEach has wonderfully creative tools\
    \ built in, and each can produce professional `Microsoft Office`–compatible documents\
    \ that you can then email, upload to an online account, or present on your iPad.\n\
    \n## File Transfer Options\n\nAs soon as you start working with files on your\
    \ iPad, you will want to know how to transfer files you create on your iPad or\
    \ how to move files from your computer or elsewhere to your iPad. In this chapter,\
    \ we summarize file transfer options (see [Table 19–1](#Chapter19.html#tab_19_1)).\
    \ Some options are described in detail elsewhere in this book, while other apps\
    \ will be described in this chapter.\n\n![images](images/t1901.jpg)\n\nOf course,\
    \ you can always email files to get them on or off your iPad, but usually this\
    \ only works well for a limited number of files or small-sized files. Sometimes,\
    \ files are just too big to send as email attachments. That’s when you need a\
    \ file transfer solution such as `DiskAid` or `Dropbox`.\n\nNext, we’ll cover\
    \ two file transfer options: `DiskAid`, which works by connecting your iPad to\
    \ your computer with the USB cable; and `Dropbox`, which provides wireless file\
    \ transfer."
