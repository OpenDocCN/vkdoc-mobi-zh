  trans: "\n### 电子邮件基础\n\n在本节中，我们将引导您了解`邮件`应用。我们将解释如何在`竖屏`和`横屏`模式下使用它，以及如何执行阅读、回复、归档、打印和删除邮件等基本操作。\n\
    \n#### 竖屏与横屏邮件界面\n\n既然您已经在 iPad 上设置了电子邮件账户，那么是时候简单了解一下`邮件`应用了。为了更好地掌握如何操作`邮件`程序，了解您的`邮件`应用在`竖屏`和`横屏`视图下的外观会有所帮助（参见图\
    \ 13-2）。\n\n在`横屏`视图中，您始终可以在左侧栏看到收件箱或邮箱，右侧则是电子邮件内容。\n\n在`竖屏`视图中，整封电子邮件内容会填满屏幕。要查看页面左侧垂直弹出窗口中的`收件箱`或`邮箱`，请点击页面左上角的`收件箱`按钮。\n\
    \n![images](img/1302.jpg)\n\n**图 13-2.** *竖屏与横屏视图下的邮件界面*\n\n**提示：** 如果您将 iPad\
    \ 放在桌子上或放在膝盖上使用，可能需要使用`竖屏锁定`图标将视图锁定在`竖屏`（垂直）模式。这样可以防止屏幕随意旋转。要锁定视图，请按照以下步骤操作：\n\
    \n1.  双击`主屏幕`按钮，然后从左向右滑动。\n2.  点击`竖屏锁定`按钮将屏幕锁定在`竖屏`模式。\n\n#### 查看邮件与未读邮件蓝点\n\n\
    点击任意电子邮件即可在主窗口中查看。\n\n任何未读邮件都会在邮件左侧标有`蓝点`图标 ![images](img/bluebull.jpg)。\n\n![images](img/p327-01.jpg)\n\
    \n#### 调整邮件字体大小\n\n既然谈到了电子邮件，我们来看一个实用的技巧：如何增大邮件中的字体大小。您可以将默认的 10 点或 12 点字体一直调整到\
    \ 56 点（参见图 13-3）。\n\n1.  点击`设置`。\n2.  点击`通用`。\n3.  点击`辅助功能`（右侧栏）。\n4.  点击`大文本`，然后选择您需要的字体大小。\n\
    \n![images](img/p327-02.jpg)\n\n![images](img/1303.jpg)\n\n**图 13-3.** *电子邮件中不同大小的字体*\n\
    \n#### 查看您的邮箱（收件箱与账户文件夹）\n\n顶层界面是您的`邮箱`界面。您可以通过点击左上角的按钮随时进入此界面。持续点击该按钮，直到看不到更多按钮为止。当出现这种情况时，您就处于`邮箱`界面。\n\
    \n从`邮箱`界面，您可以访问以下项目：\n\n*   **统一收件箱：** 点击`所有收件箱`进行操作。\n*   **每个单独账户的收件箱：** 在“收件箱”部分点击该电子邮件账户名称进行操作。\n\
    *   **“账户”部分中每个电子邮件账户的文件夹：** 点击账户名称以查看所有文件夹。\n\n![images](img/p328-01.jpg)\n\n\
    您可以在一个统一收件箱中查看邮件，该收件箱将您的所有电子邮件账户显示在一个收件箱中，或者单独列出每个账户。您也可以选择查看已同步到 iPad 的任何邮件账户文件夹。\n\
    \n最好对您的各个电子邮件账户有一个整体概念。您的`邮箱`界面位于一棵倒置树的顶端。您可以通过点击顶部的`收件箱`访问每个收件箱，或者通过点击底部的`账户`列表深入到各种同步的邮件文件夹（包括您的收件箱）（参见图\
    \ 13-4）。\n\n![images](img/1304.jpg)\n\n**图 13-4.** *导航到各个收件箱和邮件账户文件夹*\n\n#####\
    \ 统一收件箱\n\n从`邮箱`界面，点击`所有收件箱`即可查看一个包含您所有账户电子邮件的单一收件箱。\n\n**提示：** 以下是进入`邮箱`界面的方法。\n\
    \n如果您碰巧正在查看某个收件箱或其他邮件文件夹，则需要点击屏幕左上角的按钮一次或两次。\n\n![images](img/p329-01.jpg)\n\n\
    **注意：** 您只会看到在邮件设置过程中选择同步的那些邮件文件夹。例如，您的主邮件账户上可能有 20 个邮件文件夹，但在 iPad 上您可能只能看到其中几个。默认同步的邮件文件夹是`收件箱`、`已发送`、`草稿`和`已删除`。\n\
    \n#### 相关邮件在线程中保持在一起\n\n您还会注意到，有些邮件在右侧显示一个数字和一个朝右的`箭头`图标（`>`），如下所示：![images](img/p330-01.jpg)\n\
    \n这表明所显示的邮件有两封相关邮件（回复和转发）。\n\n点击任何邮件即可将其打开。只有当存在相关邮件时，它才无法直接打开。在这种情况下，您首先会看到一个包含所有相关邮件的界面。点击其中任何一封邮件即可打开并查看（参见图\
    \ 13-5）。\n\n![images](img/1305.jpg)\n\n**图 13-5.** *相关邮件被分组成称为线程的群组中。*\n\n**提示：**\
    \ 您可以在`设置`应用中禁用此`线程`视图。点击`设置` ![images](img/U001.jpg) `邮件、通讯录、日历`，然后将`按主题整理`设置为`关闭`。\n\
    \n#### 放大或缩小\n\n与在 iPad 上阅读其他文本一样，您可以放大以查看字更大的电子邮件。您可以通过双击屏幕来实现此操作。您也可以使用`捏合`张开或收拢手势来放大或缩小（有关这些功能的更多信息，请参阅本书第\
    \ 1 部分的“快速入门指南”中的“缩放”部分）。\n\n#### 转到下一封或上一封邮件\n\n在`竖屏`视图中，点击右上角`收件箱`按钮旁边的`上三角`图标\
    \ ![images](img/uparrow.jpg) 或`下三角`图标 ![images](img/downarrow.jpg)。\n\n![images](img/p331-01.jpg)\n\
    \n在`横屏`视图中，您只需点击左侧栏中的邮件，即可在主（右侧栏）预览窗口中查看。\n\n![images](img/p331-02.jpg)\n\n####\
    \ 拷贝与粘贴\n\n以下是选择文本或图片然后从电子邮件中将其拷贝的一些技巧：\n\n*   *双击所需文本以选中一个单词，然后上下拖动蓝色控点以调整选择范围。*\n\
    \    接着，选择`拷贝`。\n\n    ![images](img/p331-03.jpg)\n\n*   长按文本，然后选择`选择`或`全选`。\n\
    \n    ![images](img/p332-01.jpg)\n\n*   长按图片，然后选择`存储图像`或`拷贝`。\n\n![images](img/p332-02.jpg)\n\
    \n如需更完整的说明，请查看第 2 章中的“拷贝与粘贴”部分：“打字技巧、拷贝/粘贴与搜索”。\n\n#### 移动（归档）邮件\n\n有时，您可能想要整理电子邮件以便日后轻松检索。例如，您可能会收到一封关于即将到来的旅行的电子邮件，并希望将其移动到`旅行`文件夹。有时您会收到需要稍后处理的电子邮件，此时可以将它们移动到`需要关注`文件夹。这可以帮助您记住稍后处理这些邮件。\n\
    \n要开始移动邮件，请点击屏幕右上角的`移动`图标。\n\n![images](img/p332-03.jpg)\n\n当前邮件账户的文件夹列表将显示在屏幕左侧。\n\
    \n点击您想要将邮件移入的文件夹。\n\n**提示：** 虽然您可以将邮件移动到垃圾邮件文件夹，但我们建议您直接删除这些邮件。\n\n![images](img/p333-01.jpg)\n"
- fmt: "# Move (File) a Bunch of Messages\n\nTo move many messages at once, open up\
    \ the Inbox and follow these steps:\n\n1. Tap the `Edit` button in the upper-right\
    \ corner of the Inbox (see [Figure 13–6](#Chapter13.html#fig_13_6)).\n2. Tap any\
    \ message to select it—you see a `Red Checkmark` icon appear next to a message\
    \ when it is selected.\n3. Tap the `Move` button at the very bottom of the screen.\n\
    4. Now a list of folders will appear that you have synced from your Mail account.\
    \ In [Figure 13–6](#Chapter13.html#fig_13_6), we have a number of folders; however,\
    \ you may only see two (depending on how your iPad is set up): `Mail` and `Trash`.\n\
    \n**TIP:** You may be able to set up additional mail folders to sync in your `Settings`\
    \ app. Tap `Mail, Contacts, Calendars`, then tap the account you wish to adjust.\
    \ If you see a `Mail Folders to Push` option, then tap that and make adjustments.\
    \ If you do not see that option, then you cannot sync additional mail folders\
    \ with your particular account.\n\n![images](images/1306.jpg)\n\n**Figure 13–6.**\
    \ *Moving a number of messages at once*\n\n# Delete a Single Message\n\nThere\
    \ are a few ways to delete a message.\n\nWhile viewing a message, tap the `Trash\
    \ Can` icon ![images](images/p334-01.jpg) in the upper-right corner of the screen.\n\
    \nThe message will shrink, the garbage can lid will open, the message will fly\
    \ into the can, and the lid will close. It's sort of fun—give it a try!\n\n![images](images/p334-02.jpg)\n\
    \nThe other way to delete an individual message is from the Inbox.\n\nSimply swipe\
    \ left or right over the message until you see the `Delete` button appear.\n\n\
    Then, tap the `Delete` button.\n\n![images](images/p335-01.jpg)\n\n**TIP:** You\
    \ can use the `Settings` app to make your iPad ask you before deleting email.\
    \ To do so, tap `Mail, Contacts, Calendars` and set the switch next to `Ask Before\
    \ Deleting` to `Yes`.\n\n# Deleting a Bunch of Messages\n\nTo delete many messages\
    \ at once, open up the Inbox and use the techniques previously described to move\
    \ a number of messages into a different mail folder:\n\n1. Tap the `Edit` button\
    \ in the upper-right corner of the Inbox (see [Figure 13–7](#Chapter13.html#fig_13_7)).\n\
    2. Tap any message to select it—you will see a `Red Checkmark` icon appear next\
    \ to the message when it is selected.\n3. Tap the `Delete` button at the very\
    \ bottom of the screen.\n\n![images](images/1307.jpg)\n\n**Figure 13–7.** *Moving\
    \ a number of messages at once*\n\n# Reply to Messages\n\nYou will probably use\
    \ the `Reply` command most frequently. Follow these steps to respond to an email\
    \ on your iPad:\n\n1. While reading the mail message, touch the `Rounded Arrow`\
    \ icon in the upper-right corner.\n\n    ![images](images/p336-01.jpg)\n\n2. Tap\
    \ `Reply` or `Reply All` from the dropdown list of buttons.\n\n    ![images](images/p337-01.jpg)\n\
    \n3. Type your reply and press `Send` in the upper-right corner.\n\n    ![images](images/p337-02.jpg)\n\
    \n# Using Reply All\n\nUsing the `Reply All` option is just like using the `Reply`\
    \ function, except that all of the original recipients of the email and the original\
    \ sender are placed in the address lines. The original sender will be in the `To:`\
    \ line, while all other recipients of the original email will be listed on the\
    \ `Cc:` line. You will only see the `Reply All` option if more than one person\
    \ received the original email.\n\n**CAUTION:** Be careful when you use `Reply\
    \ All`. This can be dangerous if some of the recipients are not shown on the original\
    \ email because they stretch off the edge of the screen. If you do use `Reply\
    \ All`, then make sure you check the `To:` and `Cc:` lists to make sure everyone\
    \ should be receiving your reply.\n\n# Forward Messages\n\nSometimes, you get\
    \ an email that you want to send to someone else. The `Forward` command will let\
    \ you do that (see the \"Email Attachments\" section in this chapter for more\
    \ about working with attachments).\n\n**NOTE:** You need to forward attachments\
    \ to send them to others. If you want to send someone an attachment from an email\
    \ you receive, you must choose the `Forward` option. (Note that choosing the `Reply`\
    \ and `Reply All` options will not include the original email attachment(s) in\
    \ your outgoing message.)\n\nJust as when using `Reply`, you first tap the `Rounded\
    \ Arrow` icon in the upper-right corner, then tap `Forward` from the dropdown\
    \ list of buttons.\n\nYou may be prompted to address whether you want to include\
    \ attachments (if there were any) from the original message.\n\nAt this point,\
    \ you follow the same steps described previously to type your message, add recipients,\
    \ and send it.\n\n# Print Messages\n\nYou can now print messages from your iPad,\
    \ as long as you have an Apple `AirPrint`-compatible printer or a printer that\
    \ can receive email messages and print the attachments. In this section, we will\
    \ show you the way to print a message using Apple's `AirPrint`. Here is a list\
    \ of `AirPrint`-compatible printers at the time of publishing (see Table 14–1).\
    \ Our testing was done with the HP Photosmart e-AiO (D110a) printer.\n\n**Table13–1.**\
    \ *A List of `AirPrint`-Compatible Printers*\n\n| HP Envy eAll-in-One series (D410)\
    \ | HP LaserJet Pro CM1415fnw Color Multifunction Printer |\n| HP Photosmart Plus\
    \ e-AiO (B210) | HP LaserJet Pro CP1525n Color Printer |\n| HP Photosmart Premium\
    \ e-AiO (C310) | HP LaserJet Pro CP1525nw Color Printer |\n| HP Photosmart Premium\
    \ Fax e-AiO (C410) | HP Officejet 6500A e-AiO |\n| HP Photosmart e-AiO (D110)\
    \ | HP Officejet 6500A Plus e-AiO |\n| HP Photosmart Wireless e-AiO (B110)—Europe\
    \ and Asia-Pacific | HP Officejet 7500A Wide Format e-AiO |\n| HP Photosmart eStation\
    \ (C510) | HP Officejet Pro 8500A e-AiO |\n| HP LaserJet Pro M1536dnf Multifunction\
    \ Printer | HP Officejet Pro 8500A Plus e-AiO |\n| HP LaserJet Pro CM1415fn Color\
    \ Multifunction Printer | HP Officejet Pro 8500A Premium e-AiO |\n\n## Step 1:\
    \ Connect Your AirPrint-Compatible Printer to the Network\n\nBefore you can print\
    \ to your printer, you need to connect it to the same wireless Wi-Fi network as\
    \ your iPad. Wi-Fi network securities vary, so we did not include detailed steps\
    \ to do so in this book. Please use the instructions that came with your printer\
    \ to connect it to your network.\n\n## Step 2: Print from your iPad\n\nPrinting\
    \ is easy and straightforward. Follow these steps to do so:\n\n1. Open the mail\
    \ message you wish to print.\n2. Tap the `Rounded Arrow` icon in the upper-right\
    \ corner and select `Print`.\n\n    ![images](images/p339-01.jpg)\n\n3. Tap `Printer`\
    \ to select your printer from the network. (You'll only need to do this once because\
    \ the iPad remembers your selection.)\n\n    ![images](images/p339-02.jpg)\n\n\
    4. Once selected, the printer name will appear. Adjust the number of copies using\
    \ the `Plus` (+) and `Minus` (-) buttons.\n5. When you are ready to print, tap\
    \ `Print` and your document will be printed wirelessly on your printer.\n\n![images](images/p340-01.jpg)\n\
    \n## Checking on Your Printing Documents\n\nYou can check on the status of your\
    \ printing documents using the `Print Center` app. Follow these steps to do so:\n\
    \n1. Double-tap the `Home` button until you see the gray bar (multitasking window)\
    \ of icons appear at the bottom of the screen.\n2. You can see the active print\
    \ jobs and, if you desire, stop the printing using the `Cancel Printing` button.\n\
    \n![images](images/p340-02.jpg)\n\n# Compose a New Message\n\nFrom any mail screen,\
    \ tap the `Compose` icon in the upper-right corner to start writing a new email\
    \ message.\n\n![images](images/p341-01.jpg)"
