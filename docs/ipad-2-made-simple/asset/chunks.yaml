  trans: '

    #### 下载 LinkedIn 应用


    获取 `LinkedIn` 应用十分简单。在 iPad 上启动 `App Store` 应用，在 `Search` 窗口中输入“LinkedIn”，即可找到该应用。它是免费的，因此点击
    `FREE` 按钮即可安装。


    ![images](img/p570-01.jpg)


    ##### 登录 LinkedIn 应用


    安装好 `LinkedIn` 应用后，点击 `LinkedIn` 图标，输入你的登录信息。


    ![images](img/p571-01.jpg)

    ![images](img/p571-02.jpg)


    ##### 浏览 LinkedIn 应用


    `LinkedIn` 应用采用了与 Facebook 类似的基于图标的导航风格。点击任意图标即可跳转至相应功能，然后点击左上角的 `Home` 图标即可返回
    `Home` 屏幕（见图 23–7）。


    ![images](img/2307.jpg)


    **图 23–7.** *`LinkedIn` 应用的 `Home` 屏幕*


    ##### 与 LinkedIn 联系人沟通


    你在使用 `LinkedIn` 应用时最常做的事之一就是与联系人沟通。操作方法很简单：


    1.  点击 `Connections` 图标。

    2.  滚动浏览联系人列表，或在 `Search` 框中输入联系人名称。

    3.  点击你想寻找的联系人。

    4.  点击右上角的 `Send` 图标 ![images](img/p572-02.jpg)，然后选择 `Send Message`。


    ![images](img/p572-01.jpg)


    ### Twitter


    Twitter 始于 2006 年。它本质上是一个基于短信（SMS）的社交网站，常被称为*微型博客网站*，名人和普通人都可以在上面分享自己的想法。关键在于，你只有
    140 个字符来表达你的观点。


    在 Twitter 上，你可以订阅（*follow*）那些发布推文（*tweets*）的人。你也会发现有人开始关注你。如果你想关注我们，我们在 Twitter
    上的账号是 `@mtrautschold`。


    ### 创建 Twitter 账户


    创建 Twitter 账户非常简单。我们建议你首先在 Twitter 网站 [`www.twitter.com`](http://www.twitter.com)
    上建立你的 Twitter 账户。建立账户时，你需要选择一个唯一的用户名（我们用的是 `@garymadesimple`）和密码。


    ![images](img/p573-01.jpg)


    随后你会收到一封确认邮件。点击邮件中的链接，你将被带回 Twitter 网站。你可以在网站上发布推文或选择关注的人，也可以阅读好友的推文。


    ![images](img/p573-02.jpg)


    ### iPad 上的 Twitter 选项


    在 iPad 上使用 Twitter 有很多选择。关注他人和发布推文最简单的方法是使用 App Store 中的 Twitter 应用。


    可供选择的 Twitter 应用很多。本书将重点介绍两款：`TweetDeck` 和官方的 `Twitter` 应用。这两款应用设计都非常出色且易于使用。


    ![images](img/p573-03.jpg)


    **注：** 这两款应用都能让你在 Twitter 上完成几乎相同的操作——这实际上只是个人偏好的问题！


    #### 下载 Twitter 应用


    前往 App Store，点击 `Categories`，选择 `Social Networking`。你应该会在 `Social Networking`
    区域看到 `TweetDeck` 和 `Twitter`。如果没有，只需点击 `Search` 窗口并输入应用名称。像下载其他应用到 iPad 一样下载这些应用即可。


    ![images](img/p574-01.jpg)


    #### 首次启动 Twitter 应用


    点击任意应用图标，程序将启动。首次使用任一应用都需要你登录 Twitter。你的用户名就是你最初注册 Twitter 时选择的那个。


    ![images](img/p574-02.jpg)


    #### 使用 TweetDeck


    `TweetDeck` 应用提供了一个非常简洁的 `Home` 屏幕。你可以在屏幕左下角 `All Friends` 标签下看到你关注的人的推文。


    在右侧，你通常会看到 `Mentions`，即对你自己推文的回复。这些回复的操作方式类似于短信对话。


    `TweetDeck` 的控制按钮位于右上角。共有五个图标供你使用（见图 23–8）。


    ![images](img/2308.jpg)


    **图 23–8.** *`TweetDeck` 的 `Home` 页面布局*


    ##### 查找用户


    点击 `Profile` 图标（人物图标）即可看到 `Search` 框，输入你想关注的人的姓名或用户名。


    ![images](img/p575-01.jpg)


    在此示例中，我搜索了我的朋友 Kevin，他的用户名为“CrackBerryKevin”。找到目标用户后，点击 `View Profile` 按钮即可查看他的
    Twitter 资料。


    ![images](img/p576-01.jpg)


    ##### 账户与设置


    该应用的 `Accounts and Settings` 部分有多个可调整的字段。点击 `Manage Accounts` 标签可以添加或编辑 Twitter
    账户。点击 `Sign into an Account` 可以登录你可能拥有的另一个 Twitter 账户。操作方法是，点击该标签并输入你的用户名和密码。点击
    `Settings` 标签可以调整自动更正、自动大写和声音选项。如果你有专门用于将图片上传到 Twitter 的服务，也可以在此选择你的图片服务。


    ![images](img/p576-02.jpg)


    ##### 刷新


    点击 `Refresh` 按钮即可刷新你的推文。


    ![images](img/p576-03.jpg)


    #### 添加列


    `Add Column` 按钮可以为你的 Twitter `Home` 屏幕添加另一列。只需从右向左滑动，即可在不同列之间切换。底部的圆点表示你需要滑动浏览多少个屏幕。你可以为
    `Search`、`Direct Messages`、`Mentions`、`Favorites`、`Twitter Trends`、`Twitter Lists`、`Twitter
    Search` 和 `All Friends` 添加列。


    ![images](img/p577-01.jpg)


    ##### 撰写推文


    点击 `Compose Tweet` 图标 ![images](img/p578-01.jpg)，`Tweet composition` 屏幕便会显示。你的
    Twitter ID 显示在 `From:` 行，你有 140 个字符来表达你的想法。完成后，点击右上角的 `Send` 按钮。


    ![images](img/p578-02.jpg)


    ##### 阅读与回复


    点击一条推文可将其显示在 `Main` 屏幕上。这会使推文变得很大且清晰，你可以点击推文中的链接来启动 `Web` 视图。如果你想在 `Safari` 中查看链接，请点击
    `View in Safari` 按钮。


    ![images](img/p578-03.jpg)

    ![images](img/p578-04.jpg)


    **注：** 在 `Safari` 中查看链接后，你需要关闭 `Safari` 并重启 `TweetDeck`。


    在 `Tweet` 窗口的底部，你会看到五个图标：`Reply`、`Forward`、`DM`、`Email` 和 `Favorite`。


    ![images](img/p578-05.jpg)


    每个图标都会弹出一个附加窗口和屏幕键盘，供你输入 `Reply`、`Forward` 推文，向作者发送 `Direct Message`，`Email` 该推文，或将其设置为
    `Favorite`。


    #### 使用 Twitter


    官方的 `Twitter` 应用采用了一种精简的方式来使用 Twitter。`Home` 屏幕会显示你关注的人的推文。点击完整信息，右侧会出现一个新列。此列显示完整的推文和作者信息，以及
    `Reply`、`Favorite`、`Retweet` 和 `Send` 图标。


    你可以在左侧看到五个图标。第一个图标是主要的 `Twitter` `Timeline` 信息流。其他图标分别是 `Mentions`、`Direct Messages`、`Links`、`Profile`
    和 `Search`。


    `Compose Tweet` 图标位于左下角（见图 23–9）。


    ![images](img/2309.jpg)


    **图 23–9.** *`Twitter` 应用的 `Home` 页面布局*

