- fmt: "### 同步电子邮件账户、浏览器书签和笔记\n\n向下滚动页面，以同步电子邮件账户设置、浏览器书签和笔记。\n\n**注意**：将电子邮件账户设置同步到\
    \ iPad 后，您仍需在 **设置** > **邮箱、通讯录、日历** 中为每个电子邮件账户输入密码。在 iPad 上，每个账户只需执行一次此操作。\n\n\
    1.  在 iTunes 的同一 **信息** 选项卡上，向下滚动到日历设置下方，以查看 **邮件** 账户设置。\n2.  勾选 **同步邮件账户来源**\
    \ 复选框，并调整下拉菜单，选择存储电子邮件的软件或服务（[图 3–4](#Chapter03.html#fig_3_4)）。这可能是 Windows 电脑上的\
    \ Outlook，或 Mac 上的 Entourage 或 Mail。\n\n    ![images](images/0304.jpg)\n\n   \
    \ **图 3–4.** *设置要同步的电子邮件账户、浏览器书签和笔记*\n\n    **注意**：截至出版时，iTunes 仅支持两种用于同步的网页浏览器：Microsoft\
    \ Internet Explorer 和 Apple Safari。如果您使用 Mozilla Firefox 或 Google Chrome，仍可以同步书签，但需要安装免费的书签同步软件（例如来自\
    \ [`www.xmarks.com`](http://www.xmarks.com) 的 `xmarks`），以将书签从 Firefox 或 Chrome\
    \ 同步到 Safari 或 Explorer。然后，您可以通过两步过程同步浏览器书签。`Firefox Home` 应用是 Firefox 用户同步书签的一个不错选择（请访问\
    \ [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8)）。\n\
    \n3.  要同步浏览器书签，请勾选 **同步书签来源** 复选框，并调整下拉菜单，选择您使用的网页浏览器（参见 [图 3–4](#Chapter03.html#fig_3_4)）。目前，您只能选择\
    \ Internet Explorer 或 Safari。\n4.  要同步笔记，请勾选 **同步笔记来源** 复选框，并选择存储笔记的软件或服务。\n5.\
    \  点击 iTunes 屏幕右下角的 **应用** 按钮，开始同步。\n\n**注意**：根据您拥有的信息量（尤其是联系人和日历信息），首次同步可能需要\
    \ 15 分钟或更长时间。\n\n### 将 iPad 与 iTunes 同步\n\n当您将 iPad 连接到电脑的 USB 端口时，同步通常是自动进行的。唯一的例外是您禁用了自动同步。\n\
    \n#### 跟踪同步过程\n\n在 iTunes 顶部的状态窗口中，您可以查看同步的进展情况。您可能会看到 **正在将联系人同步到 [您的姓名] 的 iPad**\
    \ 或 **正在将日历同步到 [您的姓名] 的 iPad**，这能让您了解当前正在同步的内容。\n\n#### 处理同步冲突\n\n有时，iTunes 同步会检测到电脑和\
    \ iPad 上数据之间的冲突，例如两个公司名称不同的相同联系人条目，或两个笔记不同的相同日历条目。处理这些冲突相当简单。\n\n1.  在 **冲突解决器**\
    \ 窗口中，点击正确的信息。这会将背景变为浅蓝色，而未选中的一侧则为白色。参见 [图 3–5](#Chapter03.html#fig_3_5)。\n2.\
    \  如果还有更多冲突，请点击 **下一个** 按钮，直到解决所有冲突。\n\n    ![images](images/0305.jpg)\n\n   \
    \ **图 3–5.** *iTunes 同步冲突解决器*\n\n3.  点击 **完成** 关闭窗口。\n4.  您所做的所有选择将应用于下一次与 iPad\
    \ 的同步。系统会为您提供 **立即同步** 或 **稍后同步** 的选项。\n\n**注意**：冲突可能导致同步过程中止。联系人是首先同步的，然后才是日历。因此，如果发现联系人同步冲突，则在解决联系人冲突之前，日历将不会同步。解决冲突后，请务必重新同步您的\
    \ iPad 以完成同步。\n\n#### 取消正在进行的同步\n\n您可以从 iTunes 或 iPad 上取消同步。\n\n**要取消电脑上 iTunes\
    \ 的同步：**\n\n点击同步状态窗口中的 **X** 按钮，如 [图 3–6](#Chapter03.html#fig_3_6) 所示。\n\n![images](images/0306.jpg)\n\
    \n**图 3–6.** *点击 iTunes 状态窗口中的 **X** 按钮以取消同步*\n\n**要从 iPad 取消同步：**\n\n滑动屏幕底部的滑块条，该滑块条显示\
    \ **滑动来取消**。其位置与常规的 **滑动来解锁** 消息相同。\n\n#### 为什么您可能不希望 iTunes 自动同步？\n\n可能有一些原因需要手动同步而非自动同步：\n\
    \n1.  您不想用过多的音乐和视频文件填满 iPad。\n2.  同步和备份过程耗时较长，因此您不希望每次连接 iPad 到电脑时都执行此操作。\n3.\
    \  您将 iPad 连接到不同的电脑为其充电，但不希望每次都被询问是否要抹掉并重新同步音乐。\n\n**注意**：如果您想拖放音乐和视频，请务必在 iTunes\
    \ 的 **摘要** 选项卡中勾选 **手动管理音乐和视频** 复选框。\n\n#### 在自动同步开始前手动阻止\n\n有时您可能希望在连接 iPad 到电脑时不触发自动同步。这可能是因为您时间不多，只想快速拖放几首新歌到\
    \ iPad 上，而无需同步其他所有内容。\n\n要阻止 iPad 的常规自动同步，您可以在连接 iPad 到电脑时，按住电脑键盘上的某些按键。\n\n**在\
    \ Windows PC 上**：\n\n> 在将 iPad 连接到电脑时，按住 **Shift** + **Ctrl** 键。\n\n**在 Mac 上**：\n\
    \n> 在连接 iPad 时，按住 **Command** + **Option** 键。\n\n#### 永久关闭自动同步\n\n您可以在 iTunes\
    \ 中永久关闭自动同步。如果您更希望对所有同步过程进行手动控制，可能需要这样做。\n\n**警告**：关闭自动同步还会禁止每次将 iPad 连接到电脑时的自动备份。此设置最适合于辅助电脑，您可能仅用它为\
    \ iPad 充电，但绝不希望进行同步。\n\n要在 iTunes 中关闭自动同步，请执行以下步骤：\n\n1.  从 iTunes 菜单中，选择 **编辑**，然后选择\
    \ **偏好设置**。\n2.  点击顶部的 **设备** 选项卡。\n3.  勾选 **防止 iPod、iPhone 和 iPad 自动同步** 复选框（参见\
    \ [图 3–7](#Chapter03.html#fig_3_7)）。\n4.  点击 **确定** 按钮保存您的设置。\n\n![images](images/0307.jpg)\n\
    \n**图 3–7.** *在 iTunes 中禁用自动同步*"
  raw: "#### Syncing Email Accounts, Browser Bookmarks, and Notes\n\nScroll down the\
    \ page to sync email account settings, browser bookmarks, and notes.\n\n**NOTE**:\
    \ After syncing the email account settings to your iPad, you'll still have to\
    \ enter your password for each email account in the **Settings** ![images](images/U001.jpg)\
    \ **Mail, Contacts, Calendars** for each email account. You have to do this only\
    \ once on your iPad for each account.\n\n1.  Scroll down below the Calendar settings\
    \ on the same **Info** tab in iTunes to see the **Mail** account settings.\n2.\
    \  Check the **Sync Mail Accounts from** box and adjust the pull-down menu to\
    \ the software or service that stores your email ([Figure 3–4](#Chapter03.html#fig_3_4)).\
    \ This might be Outlook on a Windows computer or Entourage or Mail on a Mac.\n\
    \n    ![images](images/0304.jpg)\n\n    **Figure 3–4.** *Settingupemail accounts,\
    \ browser bookmarks, and notes to sync*\n\n    **NOTE**:As of publication time,\
    \ iTunes supports only two web browsers for sync: Microsoft Internet Explorer\
    \ and Apple Safari. If you use Mozilla Firefox or Google Chrome, you can still\
    \ sync your bookmarks, but you'll have to install free bookmark sync software\
    \ (such as xmarks from [`www.xmarks.com`](http://www.xmarks.com)) to sync from\
    \ Firefox or Chrome to Safari or Explorer. Then you can sync your browser bookmarks\
    \ in a two-step process. The Firefox Homeapp is a nice option to sync bookmarks\
    \ for Firefox users (visit [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8))\n\
    \n3.  To sync your browser bookmarks, check the **Sync bookmarks with** box and\
    \ adjust the pull-down menu to the web browser you use (see [Figure 3–4](#Chapter03.html#fig_3_4)).\
    \ At this time, you can select only Internet Explorer or Safari.\n4.  To sync\
    \ your notes, check the **Sync notes with** box and select the software or service\
    \ where your notes are stored.\n5.  Click the **Apply** button in the lower-right\
    \ corner of the iTunes screen to start the sync.\n\n**NOTE:** Depending on how\
    \ much information (especially contacts and calendar information) you have, the\
    \ initial sync could take 15 minutes or more.\n\n### Syncing Your iPad with iTunes\n\
    \nThe syncing is normally automatic when you plug in your iPad to your computer's\
    \ USB port. The only exception is if you have disabled the automatic sync.\n\n\
    #### Keeping Track of the Sync\n\nAt the top of iTunes, inside the Status window,\
    \ you can see what is happening with the sync. You may see **Syncing contacts\
    \ with [your name here]'s iPad** or **Syncing calendars with [your name here]'s\
    \ iPad**, which lets you see what is currently being synced.\n\n#### Handling\
    \ Sync Conflicts\n\nSometimes, the iTunes sync will detect conflicts between the\
    \ data in your computer and on your iPad, such as the same contact entry with\
    \ two different company names, or the same calendar entry with two different notes.\
    \ Handling these conflicts is fairly straightforward.\n\n1.  In the **Conflict\
    \ Resolver** window, click the information that is correct. This turns the background\
    \ a light blue, while the side not selected is white. See [Figure 3–5](#Chapter03.html#fig_3_5).\n\
    2.  If there are any more conflicts, click the **Next** button until you finish\
    \ resolving all conflicts.\n\n    ![images](images/0305.jpg)\n\n    **Figure 3–5.**\
    \ *iTunes sync Conflict Resolver*\n\n3.  Click **Done** to close the window.\n\
    4.  All your selections will be applied to the next sync with your iPad. You are\
    \ given the choice to **Sync Now** or **Sync Later**.\n\n**NOTE**: Conflicts can\
    \ cause the sync to stop in mid-process. Contacts are synced first, then the Calendar.\
    \ So if a Contacts sync conflict is found, the Calendar will not sync until the\
    \ Contacts conflict is resolved. Make sure to resync your iPad after you resolve\
    \ conflicts to complete the sync.\n\n#### Cancelling a Sync in Progress\n\nYou\
    \ can cancel a sync from iTunes or from your iPad.\n\n**To cancel the sync from\
    \ iTunes on your computer:**\n\nClick the **X** inside the sync status window,\
    \ as shown in [Figure 3–6](#Chapter03.html#fig_3_6).\n\n![images](images/0306.jpg)\n\
    \n**Figure 3–6.** *Clicking the **X** in the status window in iTunes to cancel\
    \ the sync*\n\n**To cancel the sync from the iPad:**\n\nSlide the slider bar at\
    \ the bottom of the screen that says **Slideto Cancel.** This is in the same place\
    \ as the normal **Slide to Unlock** message.\n\n#### Why Would YouNot Want iTunes\
    \ to Automatically Sync?\n\nThere could be a few reasons to syncmanually instead\
    \ of automatically:\n\n1.  You don't want to fill up your iPad with too many music\
    \ and video files.\n2.  The sync and backup process takes a long time, so you\
    \ don't want it to happen every time you connect your iPad to your computer.\n\
    3.  You plug your iPad into various computers to charge it up, but don't want\
    \ to be asked if you want to erase and resync your music every time.\n\n**NOTE**:\
    \ If you want to drag and drop music and videos, you need to make sure to check\
    \ the **Manually manage music and videos** box in the **Summary** tab in iTunes.\n\
    \n#### Manually Stopping the Auto Sync Before It Starts\n\nThere may be times\
    \ you want to connect your iPad to your computer without the auto sync starting\
    \ up. This could be because you don't have much time and want to quickly drag\
    \ and drop a few new songs to your iPad without syncing everything else.\n\nTo\
    \ stop the normal auto sync of your iPad, you can press certain keys on your computer\
    \ keyboard while connecting your iPad to your computer.\n\n**On a Windows PC**:\n\
    \n> Press and hold **Shift** + **Ctrl** while connecting your iPad to your computer.\n\
    \n**On a Mac**:\n\n> Press and hold**Command** + **Option** while connecting your\
    \ iPad.\n\n#### Turning Off the Auto Sync Permanently\n\nYou can turn off the\
    \ auto sync permanently in iTunes. You might want to do this if you prefer to\
    \ have manual control over all the sync processes.\n\n**CAUTION**: Turning off\
    \ the auto sync also disables the automatic backup of your iPad every time you\
    \ connect it to your computer. This setting is best for a secondary computer,\
    \ which you might use to charge your iPad but would never want to sync.\n\nTo\
    \ turn off the auto sync in iTunes, follow these steps:\n\n1.  From the iTunes\
    \ menu, select **Edit** and then **Preferences**.\n2.  Click the **Devices** tab\
    \ at the top.\n3.  Check the **Prevent iPods, iPhones, and iPads from syncing\
    \ automatically** box (see [Figure 3–7](#Chapter03.html#fig_3_7)).\n4.  Click\
    \ the **OK** button to save your settings.\n\n![images](images/0307.jpg)\n\n**Figure\
    \ 3–7.** *Disabling auto sync in iTunes*"
