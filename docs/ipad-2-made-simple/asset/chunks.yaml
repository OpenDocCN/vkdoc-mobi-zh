    \ any day to jump to the **Day** view for that date. To return to the **Today**\
    \ view, just touch the **Today** tab at the bottom left.\n\n![images](images/p392-02.jpg)\n\
    \nNavigating between months is easy:\n\n*   **Go to the next month:** Tap the\
    \ **Triangle** icon to the right of the **Month** slider at the bottom.\n*   **Go\
    \ to the previous month:** Tap the **Triangle** icon to the left of the **Month**\
    \ slider.\n\n![images](images/p392-03.jpg)\n\nTo advance days in **Day** view,\
    \ just touch the **Arrow** icons to either side of the **Date** slider at the\
    \ bottom.\n\n**NOTE:** While you can scroll in the **Calendar** app, you cannot\
    \ swipe through your days, which runs counter to what you might expect.\n\n####\
    \ Working with Several Calendars\n\nYour iPad's **Calendar** app can track various\
    \ calendars. The number of calendars you see depends on how you set up your synchronization\
    \ using iTunes or other sync methods. In the example that follows, we have categorized\
    \ personal appointments in our **Home** calendar and categorized work appointments\
    \ in a separate **Work** calendar.\n\nIn the appointments in our **Calendar**\
    \ app, we have our **Home** calendar appointments showing up in red and our **Work**\
    \ calendar appointments in orange or green.\n\nWhen you set up your **Sync** settings,\
    \ you were able to specify which calendars you wanted to sync with your iPad.\
    \ You can customize your calendar further by following these instructions:\n\n\
    **Changing the colors:** You will need to change the color of the calendar in\
    \ the program on your computer that is synced to your iPad; this will change the\
    \ colors on your iPad.\n\n**Adding a new calendar:** It's a two-step process to\
    \ add a new calendar to sync with your iPad:\n\n1.  Set up that new calendar on\
    \ your computer's **Calendar** program.\n2.  Adjust your **Sync** settings to\
    \ make sure this new calendar syncs to your iPad.\n\n![images](images/p393-01.jpg)\n\
    \n**Viewing only one calendar:** To view just one calendar at a time, tap the\
    \ **Calendars** button at the top and select only the calendar you wish to see.\n\
    \n### Adding New Calendar Appointments/Events\n\nYou can easily add new appointments\
    \ right on your iPad, and they will be synced (or shared with) your computer the\
    \ next time the sync takes place."
  trans: "\n# 您的日历\n\niPad 让过去挂在冰箱上的旧日历变得过时了。在本章中，我们将向您展示如何充分利用 iPad 上的`日历`应用。我们将向您展示如何安排约会、如何管理多个日历、如何更改日历视图，甚至如何处理会议邀请。\n\
    \n**注：** 在本章的大部分内容中，我们都会讨论将 iPad 日历与另一个日历同步，因为这样您就可以在 iPad 和其他地方访问您的日历。如果您愿意，也可以让\
    \ iPad 以*独立*模式运行，即不与任何其他日历同步。在这种情况下，我们描述的所有添加、查看和管理事件的步骤同样适用于您。但至关重要的是，您要使用 iTunes\
    \ 自动备份功能（或通过无线方式同步到 Google、MobileMe 或 Exchange 日历）来保存日历副本，以防 iPad 出现问题。\n\n##\
    \ 在 iPad 上管理繁忙生活\n\n`日历`应用是一款功能强大且易于使用的应用程序，它能帮助您管理约会、记录待办事项、设置提醒闹钟，甚至创建和回复会议邀请（适用于\
    \ Exchange 用户）。\n\n### 日历图标上显示的今日日期和星期\n\n`日历`图标通常直接位于 iPad 的`主屏幕`上。您会很快注意到，`日历`图标会发生变化，显示当天的日期和星期。右侧的图标显示当天是星期五，并且是当月的\
    \ 16 号。\n\n![images](img/p388-01.jpg)\n\n**提示：** 如果您经常使用 iPad 的`日历`应用，不妨考虑将其固定或移动到\
    \ Dock 栏底部——您已在第 6 章关于固定图标的章节中学习了如何操作。\n\n### 与 iPad 同步或共享日历\n\n如果您在计算机或 Google\
    \ 日历等网站上维护一个日历，您可以通过 iTunes 和同步线缆，或通过设置无线同步（有关同步的更多信息，请参阅第 3 章和第 4 章），来将该日历与 iPad\
    \ 同步或共享。\n\n设置日历同步后，根据您的同步设置，计算机上的所有日历约会将自动与 iPad 日历同步（参见图 15–1）。\n\n如果您使用 iTunes\
    \ 与您的日历（例如`Microsoft Outlook`、`Entourage`或 Apple 的`iCal`）同步，则每次将 iPad 连接到计算机时，约会都会被传输或同步。\n\
    \n如果您使用其他方法同步（例如 Mobile Me、Exchange 或类似服务），则此同步是无线且自动的，并且在初始设置过程之后，您很可能无需进行任何操作即可完成同步。\n\
    \n![images](img/1501.jpg)\n\n**图 15–1.** *将 PC 或 Mac 日历同步到 iPad*\n\n### 查看您的日程并浏览\n\
    \n日历的默认视图是`日`视图。它将让您一目了然地看到当天所有即将到来的约会。约会会显示在您的日历中（参见图 15–2）。如果您在计算机上设置了多个不同的日历，例如`工作`和`家庭`，那么它们在\
    \ iPad 日历上将显示为不同的颜色。\n\n![images](img/1502.jpg)\n\n**图 15–2.** *日历的日视图布局*\n\n\
    您可以通过多种方式操作日历：\n\n*   **逐日移动：** 点击底部`滑块`控制旁边的`三角形`图标，可以向前或向后移动一天。\n*   **更改视图：**\
    \ 使用顶部的`日`、`周`、`月`和`列表`按钮来更改视图。\n\n    **提示：** 通过向左或向右移动底部的`滑块`控制，可以快速逐日推进。\n\n\
    *   **跳转到今天：** 使用左下角的`今天`按钮。\n\n### 日历的四种视图\n\niPad 的`日历`应用提供四种视图：`日`、`周`、`月`和`列表`。您可以通过点击屏幕底部的视图名称来切换视图。以下是这四种视图的简要概述：\n\
    \n**日视图：** 启动`日历`应用时，默认视图通常是`日`视图。这使您可以快速查看当天安排的所有事项。`日历`应用顶部有用于更改视图的按钮。\n\n![images](img/p391-01.jpg)\n\
    \n![images](img/p391-02.jpg)\n\n**列表（或议程）视图：** 点击顶部的`列表`视图按钮，您可以在左侧看到一份约会列表。\n\
    \n根据您安排事项的多少，您可能会看到第二天甚至下一整周的预定活动。\n\n![images](img/p391-03.jpg)\n\n**周视图：** 点击顶部的`周`视图按钮，您可以查看整周的所有约会。\n\
    \n同样，点击任意约会可查看该约会的详细信息。\n\n查看详细信息后，您可以点击`编辑`按钮进行更改。\n\n![images](img/p392-01.jpg)\n\
    \n**月视图：** 点击`月`视图，您可以查看整个月的布局。有约会的日期会显示一个小点。当前日期将以蓝色高亮显示。\n\n**提示：** 双击任意日期可直接跳转到该日期的`日`视图。要返回`今天`视图，只需点击左下角的`今天`选项卡即可。\n\
    \n![images](img/p392-02.jpg)\n\n在月份之间导航非常容易：\n\n*   **转到下个月：** 点击底部`月份`滑块右侧的`三角形`图标。\n\
    *   **转到上个月：** 点击底部`月份`滑块左侧的`三角形`图标。\n\n![images](img/p392-03.jpg)\n\n要在`日`视图中推进日期，只需点击底部`日期`滑块两侧的`箭头`图标。\n\
    \n**注：** 虽然在`日历`应用中可以滚动，但不能通过滑动来切换日期，这可能与您的预期不符。\n\n### 使用多个日历\n\niPad 的`日历`应用可以跟踪多个日历。您看到的日历数量取决于您使用\
    \ iTunes 或其他同步方法设置同步的方式。在下面的示例中，我们将个人约会分类到`家庭`日历中，将工作约会分类到独立的`工作`日历中。\n\n在`日历`应用的约会中，我们的`家庭`日历约会显示为红色，`工作`日历约会显示为橙色或绿色。\n\
    \n在设置`同步`设置时，您可以指定要与 iPad 同步的日历。您可以通过以下说明进一步自定义日历：\n\n**更改颜色：** 您需要在计算机上已与 iPad\
    \ 同步的程序中更改日历的颜色；这将改变 iPad 上的颜色。\n\n**添加新日历：** 添加要与 iPad 同步的新日历分为两步：\n\n1.  在计算机的`日历`程序中设置该新日历。\n\
    2.  调整您的`同步`设置，确保该新日历同步到您的 iPad。\n\n![images](img/p393-01.jpg)\n\n**只查看一个日历：**\
    \ 要一次只查看一个日历，请点击顶部的`日历`按钮，然后仅选择您希望查看的日历。\n\n### 添加新的日历约会/事件\n\n您可以直接在 iPad 上轻松添加新约会，这些约会将在下次同步时与您的计算机同步（或共享）。\n"
- fmt: "#### Adding a New Appointment\n\nYour instinct will most likely be to try\
    \ to touch the screen at a particular time to set an appointment; unfortunately,\
    \ this is not how setting appointments work.\n\n![images](images/p394-01.jpg)\n\
    \nTo add a new calendar event from any calendar view, follow these steps.\n\n\
    1. Tap the `+` icon at the bottom-right corner of the screen. The `Add Event`\
    \ screen will now show.\n\n   ![images](images/p394-02.jpg)\n\n2. Next, touch\
    \ the box marked `Title` and `Location`.\n\n   ![images](images/p395-01.jpg)\n\
    \n3. Type in a title for the event and the location (optional). For example, you\
    \ might type “Meet with Martin” as the title and input the location as “Office.”\
    \ Or, you might choose to type “Lunch with Martin” and then choose a very expensive\
    \ restaurant in New York City.\n\n4. Touch the `Blue Done` button in the upper-right\
    \ corner to return to the `Add Event` screen.\n\n   ![images](images/p395-02.jpg)\n\
    \   ![images](images/p396-01.jpg)\n\n5. Touch the `Starts` or `Ends` tab to adjust\
    \ the event timing. To change the start time, touch the `Starts` field to highlight\
    \ it in blue. Next, move the rotating dials at the bottom to reflect the correct\
    \ date and start time of the appointment.\n\n   ![images](images/p396-02.jpg)\n\
    \n6. To change the end time, touch the `Ends` field and use the rotating dials.\n\
    \n   Alternatively, you can set an all-day event by touching the switch next to\
    \ `All-day` to set it to `ON`.\n\n   ![images](images/p396-03.jpg)\n\n![images](images/p396-04.jpg)\n\
    \n**NOTE:** You will see a tab labeled `Invitees` before the `Repeat` tab only\
    \ if you sync to an Exchange calendar. We show you how to use the `Invitees` tab\
    \ to invite people to calendar events in [Chapter 24](#Chapter24.html#ch24): “Other\
    \ Sync Methods.”\n\n#### Recurring Events and Alerts (Alarms)\n\n![images](images/p397-01.jpg)\n\
    \nSome of your appointments happen every day, week, or month at the same time.\
    \ If the appointment you are scheduling is a repeating or recurring appointment,\
    \ just touch the `Repeat` tab and then select the correct option from the list.\n\
    \nTouch `Done` to get back to the main `Event` screen.\n\n![images](images/p397-02.jpg)\n\
    ![images](images/p397-03.jpg)\n\nAn audible reminder of an upcoming appointment—an\
    \ *alert*—can help keep you from forgetting an important event. Follow these steps\
    \ to create an alert:\n\n1. Touch the `Alert` tab and then select the option for\
    \ a reminder alarm. You can have no alarm at all or set a time anytime from five\
    \ minutes before the event all the way to two days before—whatever works best\
    \ for you.\n\n2. Touch `Done` to get back to the main `Event` screen.\n\n   ![images](images/p397-04.jpg)\n\
    \n3. After you add an alert, you are given the option to add a second (optional)\
    \ alert.\n\n   ![images](images/p398-01.jpg)\n\nThis can be really useful if you\
    \ need a second reminder to ensure you do not miss the event.\n\nFor example,\
    \ if you need to pick up your kids at the bus stop, you might want one alert 15\
    \ minutes ahead of time, then a final alert 5 minutes ahead of time, so you can\
    \ be absolutely certain that you don't miss the pickup.\n\n![images](images/p398-02.jpg)\n\
    ![images](images/p398-03.jpg)\n\n**TIP:** Another good example of creating two\
    \ alerts occurs when you have to take your child out of school for a doctor or\
    \ dentist appointment.\n\nSet the first alert for the night before to write a\
    \ note to the school and give it to your child.\n\nSet the second alert for 30\
    \ minutes prior to the appointment, so you can leave enough time to pick up your\
    \ child and get her to the appointment.\n\n![images](images/p398-03.jpg)\n\n####\
    \ Choosing Which Calendar to Use\n\n![images](images/p399-01.jpg)\n\nIf you use\
    \ more than one calendar in `Outlook`, `Entourage`, `iCal`, or some other program\
    \ and you sync your iPad with that program, you will have various calendars available\
    \ to you.\n\n**NOTE:** If you create an event and choose an Exchange calendar,\
    \ you'll have an option to invite other users to the event.\n\nTouch the `Calendar`\
    \ button in the upper-left corner to see all your calendars.\n\nTap the calendar\
    \ you want to use for this particular event. Usually, the calendar selected is\
    \ the last one you selected for the previous event you scheduled on your iPad.\n\
    \n![images](images/p399-02.jpg)\n\n#### Switching an Event to a Different Calendar\n\
    \nYou will notice that when you edit the calendar event on your iPad, you will\
    \ not have the option to switch calendars.\n\nIf you wish to change the scheduled\
    \ calendar on your iPad, you will need to delete the original event and schedule\
    \ a new event on the preferred calendar.\n\n**TIP:** To delete the calendar event,\
    \ tap the event, and then select the `Edit` button. Swipe to the bottom of the\
    \ `Edit` screen and select `Delete Event`. Next, you will need to confirm that\
    \ you want to delete the event.\n\n#### Availability\n\n![images](images/p400-01.jpg)\n\
    \nYou can choose your availability from the following options: `Busy` (default)\
    \ or `Free`. Depending on your Exchange settings, you might also see `Tentative`\
    \ or `Out of Office`.\n\n**NOTE:** You will only see the `Availability` field\
    \ if the calendar you are using for this event is synced with the MobileMe, Exchange,\
    \ or Exchange/Google settings.\n\n![images](images/p400-02.jpg)\n\n### Using Copy-and-Paste\
    \ Text in the Calendar\n\nThe iPad's `App Switcher` program means you can now\
    \ easily jump between any two apps. There may be times when you want to jump between\
    \ your `Email` and your `Calendar` apps to copy and paste information. The information\
    \ to copy and paste could be anything, such as driving directions or critical\
    \ notes you need at your fingertips for a meeting. Follow these steps to copy\
    \ and paste information between your `Email` and `Calendar` programs:\n\n1. Create\
    \ a new calendar event or edit an existing one, as explained previously in this\
    \ chapter.\n\n2. Scroll down to the `Notes` field and tap it to open it.\n\n3.\
    \ Double-tap the `Home` button to bring up the `App Switcher`.\n\n4. If you see\
    \ the `Mail` icon, tap it. If you don't see the `Mail` icon, swipe left or right\
    \ to look for it. Once you find it, tap it to open the `Mail` app.\n\n   ![images](images/p401-01.jpg)\n\
    \n5. Double-tap a word, then use your fingers to drag the blue handles to select\
    \ the text you want to copy.\n\n6. Tap the `Copy` button.\n\n   ![images](images/p401-02.jpg)\n\
    \n7. Double-tap the `Home` button to bring up the `App Switcher`.\n\n8. Tap the\
    \ `Calendar` icon. It should be the first icon on the left, since you just jumped\
    \ out of it.\n\n   ![images](images/p402-01.jpg)\n\n9. Now tap and hold in the\
    \ `Notes` field. When you let go, you should see the `Paste` pop-up field. If\
    \ you don't see it, then hold your finger down a bit longer until you do see it.\n\
    \n10. Tap `Paste`.\n\n    ![images](images/p402-02.jpg)\n\n11. Now you should\
    \ see the text you copied pasted into the `Notes` field. Tap `Done` to save your\
    \ changes.\n\n![images](images/p402-03.jpg)\n\n#### Adding Notes to Calendar Events\n\
    \n![images](images/p403-01.jpg)\n\nIf you want to add some notes to this calendar\
    \ event, tap `Notes` and type a few notes.\n\n**TIP:** If this is a meeting somewhere\
    \ new, you could type or copy/paste some driving directions. Close and then open\
    \ the appointment again, and then tap the location you just added. Your `Maps`\
    \ app will load to guide you.\n\n![images](images/p403-02.jpg)"
