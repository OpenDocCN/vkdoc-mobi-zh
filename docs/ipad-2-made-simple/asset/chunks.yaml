    \ into it from your iPad. We show you how to do this in the “Find My iPad” section\
    \ of [Chapter 1](#Chapter01.html#ch1): “Getting Started.”\n\n1.  Tap your **Settings**\
    \ icon.\n2.  Tap **Mail, Contacts, Calendars**.\n3.  Tap **Add Account**.\n4.\
    \  Tap **MobileMe** for the account type.\n5.  Enter your **Name** and your MobileMe\
    \ **Email** **Address** and **Password,** then tap **Next**.\n6.  Now you'll see\
    \ the MobileMe configuration screen showing your sync options.\n7.  To turn any\
    \ synced item **On** or **Off**, tap the switch.\n8.  To turn on **Find My iPad**,\
    \ which will show your iPad on a map on the MobileMe web site, move the switch\
    \ to **On**.\n\n    ![images](images/p179-02.jpg)\n\n    **NOTE**: If you have\
    \ any existing contacts, calendars, or other information on your iPad, these will\
    \ be kept separate from your MobileMe contacts and calendars.\n\n9.  When you\
    \ are done, tap **Save.** You should be brought back to the Settings screen and\
    \ see your MobileMe account listed with the selected items turned on for syncing.\n\
    \n![images](images/p180-01.jpg)\n\n#### Using MobileMe After Setup\n\nUsing MobileMe\
    \ is fairly seamless once you get it set up. You update your contacts and calendar\
    \ on your iPad and the changes just appear on your computer. And, if you've set\
    \ up other mobile devices such as an iPad on the same account, the changes appear\
    \ there as well. Everything is kept in sync wirelessly and automatically.\n\n\
    MobileMe has a few very cool features that we will highlight next.\n\n##### Find\
    \ My iPad, Send Messages, and Remote Wipe\n\nFrom any web browser, you can locate\
    \ your iPad using the **Find My iPad** feature in MobileMe. You can send a message\
    \ and play a loud sound to alert someone on your iPad, even if it is locked. You\
    \ can remotely lock your iPad using a four–digit code and remotely erase all information\
    \ on your iPad.\n\nPlease refer to the “Find My iPad” section of [Chapter 1](#Chapter01.html#ch1):\
    \ “Getting Started.”\n\n##### Additional Settings for Google/Exchange or MobileMe\n\
    \nOnce you set up the Google/Exchange or MobileMe sync, you may notice a few new\
    \ options on your Settings screen in addition to the ones shown in [Chapter 14](#Chapter14.html#ch14):\
    \ “Working with Contacts” and [Chapter 15](#Chapter15.html#ch15): “Your Calendar.”\n\
    \n1.  Tap the **Settings** icon.\n2.  Tap **Mail, Contacts, Calendars** in the\
    \ left column.\n3.  Scroll down the right column to the bottom to see the image\
    \ shown here.\n4.  The new option in the Contacts section is the **Default Account**.\
    \ You can set this to be either your Exchange/Google account or your computer's\
    \ account.\n5.  Notice that you can turn your **New Invitation Alerts On** or\
    \ **Off.**\n6.  The new option in the Calendars section is **Sync,** which allows\
    \ you to set how much of your calendar to sync (**2 weeks**, **1 month**, **3\
    \ months**, **6 months**, or **All events**).\n\n    ![images](images/p181-01.jpg)\n\
    \n7.  You can also select which is your **Default Calendar** for new events you\
    \ add to your iPad. You can change this calendar when you create a new event.\n\
    \n## Chapter 5"
  trans: "\n# MobileMe 网站快速导览\n\n通过 MobileMe 网站，您可以完成许多实用且令人惊叹的操作。您可以定位您的 iPad、向其发送信息、让它大声响铃，甚至远程锁定或擦除它。以下是快速导览。\n\
    \n1.  在电脑的网页浏览器中，输入网址 [`www.me.com`](http://www.me.com) 访问 `MobileMe`。\n2.  输入您的用户名和密码，然后点击\
    \ `Log In`。\n\n    ![images](img/p175-01.jpg)\n\n3.  若要查看您的邮件，请点击左上角的`云朵`图标 ![images](img/p175-06.jpg)，然后点击`邮件`图标。\n\
    \n    ![images](img/p175-02.jpg)\n\n4.  这将显示您所有发送到 MobileMe 邮箱地址 [`(membername)@me.com`](http://(membername)@me.com)\
    \ 的`收件箱`。\n\n    ![images](img/p175-03.jpg)\n\n5.  若要查看您的通讯录，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`通讯录`图标。\n\
    \n    ![images](img/p175-04.jpg)\n\n6.  若要查看您的日历，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`日历`图标。请注意顶部有各种用于日历视图的按钮：日、周、月和列表。\n\
    \n    ![images](img/p176-01.jpg)\n\n7.  若要查看您的相册，请点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`图库`图标。\n\
    8.  若要创建新相册，请点击左下角的`+`。\n\n    ![images](img/p176-02.jpg)\n\n9.  输入您的`相册名称`，并勾选您想要的`允许`和`显示`设置。此外，对于\
    \ Mac 用户，请决定是否要与 `iPhoto` 或 `Aperture` 同步。\n10. 点击`创建`按钮来创建您的新相册。\n\n    ![images](img/p176-03.jpg)\n\
    \n11. 点击`上传箭头`以选择要上传到您 MobileMe 相册的照片或视频。\n12. 浏览至电脑上存储图片的文件夹，点击选中图片或视频，然后点击`打开`按钮。\n\
    \n    **注意**：支持以下图像文件格式：`.png`、`.gif`、`.jpg`、`.jpeg`。支持以下视频类型：`.mov`、`.m4v`、`.mp4`、`.3gp`、`.3g2`、`.mpg`、`.mpeg`、`.avi`。\n\
    \n    ![images](img/p177-01.jpg)\n\n    ![images](img/p177-02.jpg)\n\n13. 点击`云朵`图标\
    \ ![images](img/p175-06.jpg)，然后点击 `iDisk` 图标，查看位于 MobileMe iDisk 上的文件。\n\n   \
    \ **提示**：您可以轻松地在此 iDisk 上从电脑和 iPad 存储和检索文件。您甚至可以分享因文件过大而无法通过邮件发送的文件，或使用`公共`文件夹从\
    \ iPad 打印的文件。\n\n    ![images](img/p178-01.jpg)\n\n14. 点击`云朵`图标 ![images](img/p175-06.jpg)，然后点击`查找我的\
    \ iPad` 图标来定位您的 iPad。出于安全目的，您需要重新输入密码。此功能假设您已从 iPad 上的`设置`应用登录了 MobileMe。\n\n\
    \    ![images](img/p178-02.jpg)\n\n15. 点击右上角的您的姓名，然后从下拉列表中选择`帐户`。在您的帐户页面中，您可以调整选项、查看您的帐户类型和试用到期日期（如果您使用的是免费试用版）、获取帮助，或检查\
    \ MobileMe 服务是否正在运行。\n\n    ![images](img/p178-03.jpg)\n\n![images](img/p179-01.jpg)\n\
    \n## 设置您的 iPad 以访问您的 MobileMe 帐户\n\n现在您已经设置好了 MobileMe 帐户，可以准备从 iPad 登录了。我们将在第\
    \ 1 章：“开始使用”的“查找我的 iPad”部分向您展示如何操作。\n\n1.  点击您的`设置`图标。\n2.  点击`邮件、通讯录、日历`。\n3.\
    \  点击`添加帐户`。\n4.  对于帐户类型，点击 `MobileMe`。\n5.  输入您的`名称`以及您的 MobileMe `电子邮件地址`和`密码`，然后点击`下一步`。\n\
    6.  现在您将看到 MobileMe 配置屏幕，其中显示您的同步选项。\n7.  要打开或关闭任何同步项目，请点击开关。\n8.  要打开`查找我的 iPad`（该功能会在\
    \ MobileMe 网站的地图上显示您的 iPad），请将开关拨到`开`。\n\n    ![images](img/p179-02.jpg)\n\n \
    \   **注意**：如果您在 iPad 上有任何现有的联系人、日历或其他信息，这些信息将与您的 MobileMe 联系人和日历分开保存。\n\n9.  完成后，点击`存储`。您应该会返回到“设置”屏幕，并看到您的\
    \ MobileMe 帐户已列出，且选定的项目已开启同步。\n\n![images](img/p180-01.jpg)\n\n## 设置后使用 MobileMe\n\
    \n一旦设置完成，使用 MobileMe 会相当无缝。您在 iPad 上更新联系人和日历，更改会自动出现在您的电脑上。而且，如果您在同一帐户上设置了其他移动设备（如另一台\
    \ iPad），更改也会出现在那里。所有内容都会通过无线方式自动保持同步。\n\nMobileMe 有一些非常酷的功能，我们接下来将重点介绍。\n\n###\
    \ 查找我的 iPad、发送信息和远程擦除\n\n从任何网页浏览器中，您都可以使用 MobileMe 的`查找我的 iPad`功能来定位您的 iPad。您可以发送信息并播放响亮的声音来提醒\
    \ iPad 的持有者，即使 iPad 处于锁定状态。您可以使用四位数字代码远程锁定您的 iPad，并远程擦除 iPad 上的所有信息。\n\n请参考第 1\
    \ 章：“开始使用”中的“查找我的 iPad”部分。\n\n### Google/Exchange 或 MobileMe 的附加设置\n\n设置好 Google/Exchange\
    \ 或 MobileMe 同步后，您可能会在“设置”屏幕上看到一些除了第 14 章：“处理联系人”和第 15 章：“您的日历”中所示选项之外的新选项。\n\n\
    1.  点击`设置`图标。\n2.  点击左侧栏中的`邮件、通讯录、日历`。\n3.  向下滚动右侧栏至底部，可以看到此处显示的图像。\n4.  通讯录部分的新选项是`默认帐户`。您可以将其设置为\
    \ Exchange/Google 帐户或您的电脑帐户。\n5.  请注意，您可以打开或关闭`新邀请提醒`。\n6.  日历部分的新选项是`同步`，它允许您设置同步日历的时间范围（`2\
    \ 周`、`1 个月`、`3 个月`、`6 个月`或`所有事件`）。\n\n    ![images](img/p181-01.jpg)\n\n7.  您还可以选择添加到\
    \ iPad 的新事件的`默认日历`。创建新事件时，您可以更改此日历。\n\n## 第 5 章\n"
- fmt: '# Wi-Fi and 3G Connections


    We live in a connected world. Wireless Internet (Wi-Fi) access has become the
    rule, not the exception—chances are you''re already using Wi-Fi at your home or
    office. Now you can use it to connect your iPad. And if your iPad has a 3G radio,
    you can also connect to the Internet anywhere you have cellular data coverage—a
    much wider area than Wi-Fi networks.


    In this chapter, we''ll talk about the differences between the two types of connections
    for your iPad: Wi-Fi (wireless local area network) and 3G (cellular service—the
    wide area data network used by your mobile phone). We''ll show you all the ways
    to get connected or disconnected from these two types of networks. There may be
    times you want to disable or turn off your 3G connection and only use Wi-Fi to
    save money in data connection charges.


    The beauty of the iPad is that it has wireless Internet access built in. Once
    you connect your iPad to a wireless (Wi-Fi or 3G) network, you can be sending
    email and surfing the Web in minutes. And once you discover all the great apps
    and books available, you''ll never want to be disconnected again.


    **NOTE:** Your iPad may not have a 3G connection. Some iPads come with only the
    Wi-Fi connection and do not have the ability to connect to a 3G cellular network.


    How do you know which iPad you have? A 3G-enabled iPad will have a black plastic
    strip along the top edge that shows more prominently along the back side of the
    iPad; this strip aids in data reception (see [Figure 5-1](#Chapter05.html#fig_5_1)).


    ![images](images/0501.jpg)


    **Figure 5-1.** *How to tell if your iPad has 3G cellular capabilities*


    ### What Can I Do When I''m Connected to a Wi-Fi or 3G Network?


    What follows are some of the things you can do when connected to a Wi-Fi or 3G
    network:


    - Access and download apps (programs) from the `App Store`.

    - Access and download music, videos, podcasts, and more with the `iTunes` app
    on your iPad.

    - Browse the Web using `Safari`.

    - Send and receive email messages.

    - Use social networking sites that require an Internet connection like Facebook,
    Twitter, and so on.

    - Use your iPad as a phone with the `Skype` app (see [Chapter 22](#Chapter22.html#ch22):
    “Social Networking”).

    - Play games that use a live Internet connection.

    - Anything else that requires an Internet connection.


    ## Wi-Fi Connections


    Every iPad comes with Wi-Fi capability built in. If you have a 3G model then you
    have both 3G and Wi-Fi. So let''s take a look at getting connected to the Wi-Fi
    network. Things to consider about Wi-Fi connections include:


    - There is no additional cost for network access and data downloads (if you are
    using your iPad in your home, office, or a free Wi-Fi hotspot).

    - Wi-Fi tends to be faster than a cellular data 3G connection.

    - More and more places, including airplanes, provide Wi-Fi access, but you may
    have to pay a one-time or monthly service fee.


    ### Setting Up Your Wi-Fi Connection


    To setup your Wi-Fi connection, follow these steps:


    1.  Tap the `Settings` icon.

    2.  Tap `Wi-Fi` in the left column to see the screen shown at the right.

    3.  Make sure the `Wi-Fi` switch is set to `ON`.

    4.  Once Wi-Fi is `ON`, the iPad will automatically start looking for wireless
    networks.

    5.  The list of accessible networks is shown below the `Choose a Network...` option.
    You can see in this screenshot that we have two networks available.


    ![images](images/p185-01.jpg)


    To connect to any network listed, just touch it. If the network is unsecure—that
    is, it does not require a password—you will be connected automatically.


    **NOTE:** Some places, like coffee shops, use a web-based login instead of a username/password
    screen. In those cases, when you click a network (or try to use `Safari`), the
    iPad will slide up a browser screen, and you''ll see the web page along with your
    login options.


    ### Secure Wi-Fi Networks—Entering a Password


    | Some Wi-Fi networks require a password to log in. This is set when the network
    administrator creates the wireless network. You will have to know the exact password,
    including whether it is case-sensitive. If the network does require a password,
    you will be taken to the password-entry screen. Type the password exactly as given
    to you and press the `Enter` key on the on-screen keyboard (which is now labeled
    `Join`). | ![Image](images/p186-01.jpg) |

    | On the `Choose a Network...` screen, you''ll see a `Checkmark` icon showing
    that you are connected to the network. | ![Image](images/p186-02.jpg) |


    **TIP:** You can paste text into the password dialog. Thus for longer or random-character
    passwords, you can transfer your passwords to your iPad (in an email message)
    and just copy and paste them. Just remember to delete the email immediately after
    you do this to keep things secure.


    ### Switching to a Different Wi-Fi Network


    At times you may want to change your active Wi-Fi network. This might occur if
    you are in a hotel, apartment, or other place where the network selected by the
    iPad is not the strongest network, or you want to use a secure network instead
    of an unsecure one.


    To switch from the currently selected Wi-Fi network, tap the `Settings` icon,
    touch `Wi-Fi` in the left column, and then touch the name of the Wi-Fi network
    you want to join. If that network requires a password, you''ll need to enter it
    to join the network (see [Figure 5-2](#Chapter05.html#fig_5_2)).


    ![images](images/0502.jpg)


    **Figure 5-2.** *Switching to a different Wi-Fi network*


    Once you type the correct password (or touch an open network), your iPad will
    join that network.


    ### Verifying Your Wi-Fi Connection


    | To verify that you are connected to a Wi-Fi network, look for the network name
    with the `Checkmark` icon next to it. When you go back to the `Settings` screen,
    you should now see the name of your Wi-Fi network with a `Checkmark` icon next
    to it in the list under `Choose a Network...` | ![Image](images/p187-01.jpg) |


    ## Advanced Wi-Fi Options (Hidden or Undiscoverable Networks)


    Sometimes you may not be able to see the network you want to join because the
    name has been hidden by the administrator. In the next section, you will learn
    how to join such networks on your iPad. Once you do so, the next time you come
    into contact with that network, your iPad will join it automatically, without
    asking. You can also tell your iPad to ask every time it joins a network; we will
    show you how to do that, as well. Sometimes you may want to erase or forget a
    network. For example, assume you are at a one-time convention and you want to
    get rid of the associated network—you''ll learn how to do that, too.


    ### Why Can''t I See the Wi-Fi Network I Want to Join?


    Sometimes, for security reasons, people don''t make their networks discoverable,
    and you have to manually enter the name and security options to connect.


    As you can see in [Figure 5-3](#Chapter05.html#fig_5_3), your list of available
    networks includes `Other`... Touch the `Other` tab, and you can manually enter
    the name of a network you would like to join.


    ![images](images/0503.jpg)


    **Figure 5-3.** *You can manually enter the name of a Wi-Fi network.*


    Type in the Wi-Fi network name, touch the `Security` tab, and then choose which
    type of security is being used on that network. If you are unsure, you''ll need
    to find out from the network administrator.


    When you have the information you need, enter it along with the proper password.
    This new network will be saved to your network list for future access.'
