- fmt: "### Moving Icons to a Different Page\n\nThe iPad can hold 20 icons on a page\
    \ (not including the dock), and you can find these pages by *swiping* (right to\
    \ left) on your **Home** screen. With all the cool apps available, it is not uncommon\
    \ to have five, six, or even more pages of icons. You can have up to 11 pages\
    \ filled with icons if you're the adventurous type!\n\n**NOTE**: You can also\
    \ swipe from left to right on any screen except the **Home** screen. On the **Home**\
    \ screen, swiping left to right takes you to **Spotlight Search**; see [Chapter\
    \ 2](#Chapter02.html#ch2): “Typing Tips, Copy/Paste, and Search” for more information.\n\
    \nAssume you may have an icon you rarely use on your first page, and you want\
    \ to move it way off to the last page. Or you may want to swap the icon for an\
    \ app you often use from the last of the icon pages to the first. Both tasks are\
    \ very easy to accomplish; moving icons between pages is very much like moving\
    \ icons to the Bottom Dock. Follow these steps to move icons between pages:\n\n\
    1.  Touch and hold any icon to initiate the moving process.\n2.  Touch and hold\
    \ the icon you wish to move. For example, let's say you want to move the **iBooks**\
    \ icon to the first page (see [Figure 6-2](#Chapter06.html#fig_6_2)).\n\n    ![images](images/0602.jpg)\n\
    \n    **Figure 6-2.** *Moving icons from one page to another*\n\n3.  Now drag\
    \ and drop the icon onto another page. To do this, touch and hold the **iBooks**\
    \ icon and drag it to the left. You'll see all of your pages of icons move by.\
    \ When you get to the first page, release the icon. Doing so will place it at\
    \ the very beginning.\n4.  Press the **Home** key to complete the move and stop\
    \ the icons from shaking.\n\n### Deleting Icons\n\nBe careful—it's as easy to\
    \ delete an icon as it is to move it. However, when you delete an icon on the\
    \ iPad, you are actually deleting the program it represents. This means you won't\
    \ be able to use the program in the future without reinstalling it or redownloading\
    \ it.\n\n**NOTE**: You can set a parental control (**Restriction** in **Settings**)\
    \ to prevent accidental app deletion. This is handy if you have young kids who\
    \ think deleting apps is a fun game.\n\nDepending on your **Application Sync**\
    \ settings in iTunes, the program may still reside in your **Applications** folder\
    \ in iTunes. In that case, you would be able to easily reinstall the deleted app\
    \ if you wanted to by checking that application in the list of apps to sync in\
    \ iTunes. If not, you can always download it again onto your device from the same\
    \ account at no charge.\n\nAs [Figure 6-3](#Chapter06.html#fig_6_3) shows, the\
    \ deleting process is similar to the moving process. Touch and hold any icon to\
    \ initiate the deleting process. As before, touching and holding makes the icons\
    \ shake, allowing you to move or delete them.\n\n**NOTE**: You can delete only\
    \ programs you have downloaded to your iPad; the preinstalled icons and their\
    \ associated programs can't be deleted. You can tell which programs can be deleted\
    \ because the icons that can be deleted contain a small black **x** in the upper-left\
    \ corner.\n\nJust tap the **x** on the icon you'd like to delete. You'll be prompted\
    \ to either delete or cancel the delete request. If you select **Delete**, the\
    \ icon and its related app will be removed from your iPad.\n\n![images](images/0603.jpg)\n\
    \n**Figure 6-3.** *Deleting an icon—and its associated program*\n\n## Chapter\
    \ 7\n\n## Personalize and Secure YouriPad\n\nIn this chapter, you will learn some\
    \ great ways to personalize your iPad, as well as how to protect your iPad with\
    \ passcode security. For example, you will learn how to download some great free\
    \ wallpaper and change the wallpaper for your **Lock** and **Home** screens. You\
    \ will learn how to personalize the sounds your iPad makes by adjusting whether\
    \ you hear a sound when you receive or send e-mail, lock the iPad, type using\
    \ the keyboard, or are alerted before an event on your calendar. You will also\
    \ learn how to customize the **Picture Frame** settings (this is the app that\
    \ shows your pictures when the device is locked). You can vary times, transitions,\
    \ and even select which albums of pictures are shown. Many aspects of the iPad\
    \ can be fine-tuned to meet your needs and tastes, enabling you to give your iPad\
    \ a more personal look and feel.\n\n### Changing Your Lock Screen and Home Screen\
    \ Wallpapers\n\nThere are actually two screens you can personalize on your iPad\
    \ by changing the wallpaper.\n\nThe first is the **Lock** screen, which appears\
    \ when you first turn on or wake up your iPad. The wallpaper for this screen image\
    \ is shown behind the **slide to unlock** slider bar.\n\nThe second is the **Home**\
    \ screen**.** The wallpaper for this is shown behind the icons.\n\nYou can use\
    \ the wallpaper pictures that come with the iPad, or you can use your own images.\n\
    \n**TIP:** You may want the wallpaper for your **Lock** screen to be less personal\
    \ than your **Home** screen wallpaper. For example, you might choose to put a\
    \ generic landscape image on your **Lock** screen and a picture of a loved one\
    \ on your **Home** screen.\n\nThere are a couple of ways to change the wallpaper\
    \ on the iPad. The first way, changing the wallpaper from your settings, is very\
    \ straightforward.\n\n#### Changing Wallpaper from Your Settings\n\nTouch the\
    \ **Settings** icon, then touch the **Brightness & Wallpaper** tab in the left-hand\
    \ column. The settings for brightness and wallpaper will appear in the right-hand\
    \ column.\n\nTo begin selecting wallpaper, touch the images of your currently\
    \ selected wallpaper under **Wallpaper** on the right side of the screen, as shown\
    \ in [Figure 7-1](#Chapter07.html#fig_7_1).\n\n![images](images/0701.jpg)\n\n\
    **Figure 7-1.** *Changing wallpaper from the **Settings** icon*\n\nOn the right\
    \ side of the screen (see the right image in [Figure 7-1](#Chapter07.html#fig_7_1)),\
    \ you'll see some albums or image folders. You have several choices:\n\n*   Tap\
    \ the **Wallpaper** tab at the top to see all the preloaded wallpaper pictures\
    \ for the iPad.\n*   Tap the **Saved Photos** album, which contains any images\
    \ you've saved from the Web, from screenshots (which you take by pressing and\
    \ holding the **Home** button and **Power/Sleep** key simultaneously), or even\
    \ from wallpaper apps or pictures you take with the iPad's cameras.\n*   Tap any\
    \ of the albums displayed below **Saved Photos**. These additional albums will\
    \ be visible only if you have synced photos from iTunes.\n\nOnce you tap any of\
    \ the albums, you'll see all the images within that album, as shown in [Figure\
    \ 7-2](#Chapter07.html#fig_7_2).\n\nTap any of the images in the album to see\
    \ it on the full screen.\n\nWhen previewing the image on the full screen, you\
    \ can accomplish the following:\n\n*   Zoom in or out by pinching your fingers\
    \ open or closed.\n*   Tap the **Cancel** button to return to the album if you\
    \ don't like the image.\n*   Tap the **Set Lock Screen** button to set the image\
    \ only for your **Lock** screen.\n*   Tap the **Set Home Screen** button to set\
    \ the image only for your **Home** screen.\n*   Tap the **Set Both** button to\
    \ set the image for both your **Lock** and **Home** screens.\n\n![images](images/0702.jpg)\n\
    \n**Figure 7-2.** *Select a picture from an album to change your wallpaper.*"
