    \ and **Calendar** programs:\n\n1.  Create a new calendar event or edit an existing\
    \ one, as explained previously in this chapter.\n2.  Scroll down to the **Notes**\
    \ field and tap it to open it.\n3.  Double-tap the **Home** button to bring up\
    \ the **App Switcher.**\n4.  If you see the **Mail** icon, tap it. If you don't\
    \ see the **Mail** icon, swipe left or right to look for it. Once you find it,\
    \ tap it to open the **Mail** app.\n\n    ![images](images/p401-01.jpg)\n\n5.\
    \  Double-tap a word, then use your fingers to drag the blue handles to select\
    \ the text you want to copy.\n6.  Tap the **Copy** button.\n\n    ![images](images/p401-02.jpg)\n\
    \n7.  Double-tap the **Home** button to bring up the **App Switcher.**\n8.  Tap\
    \ the **Calendar** icon. It should be the first icon on the left, since you just\
    \ jumped out of it.\n\n    ![images](images/p402-01.jpg)\n\n9.  Now tap and hold\
    \ in the **Notes** field. When you let go, you should see the **Paste** pop-up\
    \ field. If you don't see it, then hold your finger down a bit longer until you\
    \ do see it.\n10.  Tap **Paste**.\n\n    ![images](images/p402-02.jpg)\n\n11.\
    \  Now you should see the text you copied pasted into the **Notes** field. Tap\
    \ **Done** to save your changes.\n\n![images](images/p402-03.jpg)\n\n#### Adding\
    \ Notes to Calendar Events\n\n![images](images/p403-01.jpg)\n\nIf you want to\
    \ add some notes to this calendar event, tap **Notes** and type a few notes.\n\
    \n**TIP:** If this is a meeting somewhere new, you could type or copy/paste some\
    \ driving directions. Close and then open the appointment again, and then tap\
    \ the location you just added. Your **Maps** app will load to guide you.\n\n![images](images/p403-02.jpg)"
  trans: "\n#### 添加新日程\n\n你的第一反应很可能是尝试在屏幕上点击某个特定时间来设置日程；但遗憾的是，添加日程的操作并非如此。\n\n![images](img/p394-01.jpg)\n\
    \n要从任意日历视图添加新的日历事件，请按以下步骤操作：\n\n1.  点击屏幕右下角的 `+` 图标。此时将显示 `添加事件` 屏幕。\n\n    ![images](img/p394-02.jpg)\n\
    \n2.  接着，点击标有 `标题` 和 `地点` 的输入框。\n\n    ![images](img/p395-01.jpg)\n\n3.  输入事件的标题和地点（可选）。例如，你可以输入“与马丁会面”作为标题，并将地点填写为“办公室”。或者，你也可以输入“与马丁共进午餐”，然后选择纽约市一家非常昂贵的餐厅。\n\
    \n4.  点击右上角的 `蓝色完成` 按钮，返回 `添加事件` 屏幕。\n\n    ![images](img/p395-02.jpg)\n    ![images](img/p396-01.jpg)\n\
    \n5.  点击 `开始` 或 `结束` 标签页来调整事件时间。要更改开始时间，请点击 `开始` 字段使其高亮显示为蓝色。接着，移动底部的旋转拨盘，以反映正确的日期和日程的开始时间。\n\
    \n    ![images](img/p396-02.jpg)\n\n6.  要更改结束时间，请点击 `结束` 字段并使用旋转拨盘。\n\n    或者，你也可以通过点击\
    \ `全天` 旁边的开关，将其设置为 `开`，从而创建一个全天事件。\n\n    ![images](img/p396-03.jpg)\n\n![images](img/p396-04.jpg)\n\
    \n**注意：** 仅当你的 iPad 与 Exchange 日历同步时，你才会在 `重复` 标签页之前看到一个名为 `受邀者` 的标签页。我们将在第 24\
    \ 章：“其他同步方法”中向你展示如何使用 `受邀者` 标签页来邀请他人参加日历事件。\n\n#### 重复事件与提醒（闹铃）\n\n![images](img/p397-01.jpg)\n\
    \n你的一些日程每天、每周或每月都在同一时间发生。如果你正在安排的日程是重复性或周期性日程，只需点击 `重复` 标签页，然后从列表中选择正确的选项即可。\n\
    \n点击 `完成` 返回主 `事件` 屏幕。\n\n![images](img/p397-02.jpg)\n![images](img/p397-03.jpg)\n\
    \n为即将到来的日程设置一个声音提醒——即*提醒*——可以帮助你避免忘记重要事件。按以下步骤创建提醒：\n\n1.  点击 `提醒` 标签页，然后选择一个提醒闹铃选项。你可以完全不加闹铃，也可以设置在事件开始前五分钟到两天之间的任何时间——选择最适合你的方式即可。\n\
    \n2.  点击 `完成` 返回主 `事件` 屏幕。\n\n    ![images](img/p397-04.jpg)\n\n3.  添加提醒后，你将可以选择添加第二个（可选）提醒。\n\
    \n    ![images](img/p398-01.jpg)\n\n如果你需要第二个提醒来确保不错过事件，这会非常有用。\n\n例如，如果你需要在公交车站接孩子，你可能希望提前\
    \ 15 分钟收到一个提醒，然后在提前 5 分钟时收到最后一个提醒，这样你就能绝对确保不会错过接孩子的时间。\n\n![images](img/p398-02.jpg)\n\
    ![images](img/p398-03.jpg)\n\n**提示：** 创建两个提醒的另一个好例子是当你需要带孩子离开学校去看医生或牙医时。\n\n将第一个提醒设置在出发前一晚，以便给学校写个便条让孩子带上。\n\
    \n将第二个提醒设置在预约时间前 30 分钟，这样你就有足够的时间去接孩子并带她赴约。\n\n![images](img/p398-03.jpg)\n\n\
    #### 选择要使用的日历\n\n![images](img/p399-01.jpg)\n\n如果你在 `Outlook`、`Entourage`、`iCal`\
    \ 或其他程序中使用多个日历，并且将 iPad 与该程序同步，那么你将拥有多个可用的日历。\n\n**注意：** 如果你创建事件并选择 Exchange 日历，你将可以选择邀请其他用户参与该事件。\n\
    \n点击左上角的 `日历` 按钮可查看你所有的日历。\n\n点击你想要用于此特定事件的日历。通常情况下，所选日历就是你上次在 iPad 上安排上一个事件时所选的日历。\n\
    \n![images](img/p399-02.jpg)\n\n#### 将事件切换到不同的日历\n\n你会注意到，当你在 iPad 上编辑日历事件时，你无法选择切换日历。\n\
    \n如果你希望在 iPad 上更改已安排的日历，你需要删除原始事件，然后在首选日历上安排一个新事件。\n\n**提示：** 要删除日历事件，请点击该事件，然后选择\
    \ `编辑` 按钮。滑动到 `编辑` 屏幕底部，选择 `删除事件`。接着，你需要确认要删除该事件。\n\n#### 忙闲状态\n\n![images](img/p400-01.jpg)\n\
    \n你可以从以下选项中选择你的忙闲状态：`忙碌`（默认）或 `空闲`。根据你的 Exchange 设置，你可能还会看到 `暂定` 或 `外出`。\n\n**注意：**\
    \ 仅当您用于此事件的日历与 MobileMe、Exchange 或 Exchange/Google 设置同步时，你才会看到 `忙闲状态` 字段。\n\n\
    ![images](img/p400-02.jpg)\n\n### 在日历中使用复制粘贴文本\n\niPad 的 `应用程序切换器` 程序意味着你现在可以轻松地在任意两个应用之间跳转。有时你可能需要在\
    \ `邮件` 和 `日历` 应用之间跳转，以复制和粘贴信息。需要复制粘贴的信息可以是任何内容，例如开车路线或会议中急需的关键笔记。请按以下步骤在 `邮件`\
    \ 和 `日历` 程序之间复制和粘贴信息：\n\n1.  按照本章前面所述，创建一个新的日历事件或编辑一个现有事件。\n\n2.  向下滚动到 `备注` 字段，点击它以将其打开。\n\
    \n3.  双击 `主屏幕` 按钮以调出 `应用程序切换器`。\n\n4.  如果你看到 `邮件` 图标，请点击它。如果你没有看到 `邮件` 图标，请向左或向右滑动来查找它。找到后，点击它打开\
    \ `邮件` 应用。\n\n    ![images](img/p401-01.jpg)\n\n5.  双击一个单词，然后用手指拖动蓝色手柄以选择你要复制的文本。\n\
    \n6.  点击 `复制` 按钮。\n\n    ![images](img/p401-02.jpg)\n\n7.  双击 `主屏幕` 按钮以调出 `应用程序切换器`。\n\
    \n8.  点击 `日历` 图标。它应该是左侧的第一个图标，因为你刚刚从这个程序跳出来。\n\n    ![images](img/p402-01.jpg)\n\
    \n9.  现在在 `备注` 字段中长按。当你松开手指时，你应该会看到 `粘贴` 弹出字段。如果你没有看到它，请将手指按住稍久一点，直到你看到它。\n\n\
    10. 点击 `粘贴`。\n\n    ![images](img/p402-02.jpg)\n\n11. 现在你应该会看到你复制的文本被粘贴到了 `备注`\
    \ 字段中。点击 `完成` 以保存你的更改。\n\n![images](img/p402-03.jpg)\n\n#### 向日历事件添加备注\n\n![images](img/p403-01.jpg)\n\
    \n如果你想为此日历事件添加一些备注，请点击 `备注` 并输入一些笔记。\n\n**提示：** 如果这是一个要去新地方的会议，你可以输入或复制/粘贴一些开车路线。关闭并重新打开该日程，然后点击你刚刚添加的地点。你的\
    \ `地图` 应用将会加载并为你导航。\n\n![images](img/p403-02.jpg)\n"
- fmt: '# Editing Appointments


    Sometimes, the details of an appointment may change and need to be adjusted (see
    [Figure 15–3](#Chapter15.html#fig_15_3)). Fortunately, this is an easy task on
    your iPad.


    First, locate the appointment that needs to change and touch it. In the upper-right
    corner, you will see the `Edit` button. Touch `Edit` and you will return to the
    `Edit Event` screen showing the appointment details.


    ![images](images/1503.jpg)


    **Figure 15–3.** *Editing an appointment*


    Just touch the tab in the field you need to adjust. For example, you can change
    the time of this appointment by touching the `Starts` or `Ends` tab, and then
    adjusting the time for the event''s starting or ending time.


    ## Deleting an Event


    Notice that, at the bottom of the `Edit` screen, you also have the option to delete
    this event. Simply touch `Delete Event` at the bottom of the screen to do so.


    ![images](images/p404-01.jpg)


    ## Meeting Invitations


    For those who use Microsoft Exchange or Microsoft Outlook regularly, meeting invitations
    become a way of life. You receive a meeting invitation in your email, you accept
    the invitation, and then the appointment gets automatically placed in your calendar.


    On your iPad, you will see that invitations you accept get put right into your
    calendar. In the example to the right, if we touch the `Meeting Invitation` icon
    at the bottom of the email, the event will get put right into our calendar.


    **NOTE:** If you use an Exchange or Google calendar, you can invite people and
    reply to meeting invitations on your iPad. See the “Working with the Google or
    Exchange Calendar” section of [Chapter 4](#Chapter04.html#ch4) “Other Sync Methods”
    to learn more.


    ![images](images/p405-01.jpg)


    If you touch the meeting invitation in your calendar, you can see all the details
    that you need: the dial in number, the meeting ID, and any other details that
    might be included in the invitation.


    ![images](images/p406-01.jpg)


    **NOTE:** At the time of writing, you can accept meeting invitations on your iPad
    from your Exchange account, and you can create them as long as you choose the
    Exchange calendar or MobileMe calendar. Invitations will also transfer automatically
    from `Entourage`, `iCal`, or `Outlook` if you have iTunes set to sync with those
    programs.


    ## Calendar Options


    There are just a few options to adjust in your `Calendar` app; you can find these
    in the `Settings` app. Just touch `Settings` from your `Home` screen.


    ![images](images/p406-02.jpg)


    ![images](images/p407-01.jpg)


    Scroll down to the `Mail, Contacts, Calendars` tab and touch it. Scroll down to
    `Calendars`, and you will see three options. The first option is a simple switch
    to be notified of `New Invitation` alerts—if you receive any meeting invites,
    it is good to keep this set in the default `ON` position.


    ![images](images/p407-02.jpg)


    ![images](images/p407-03.jpg)


    Next, you can choose your time zone. This setting should reflect your `Home` settings
    from when you set up your iPad. If you are traveling, however, and want to adjust
    your appointments for a different time zone, you can change this to any other
    city you would like.


    ![images](images/p407-04.jpg)


    ### Changing the Default Calendar


    We mentioned earlier that you can have multiple calendars displayed on your iPad.
    This option allows you to choose which calendar will be your default calendar.


    That means that when you go to schedule any new appointment, this calendar will
    be selected by default.


    If you wish to use a different calendar—say, your `Work` calendar—you can change
    that when you actually set the appointment, as shown earlier in this chapter.


    ![images](images/p407-05.jpg)


    ## Chapter 16


    ## iPad Photography


    Previous versions of the iPad did not include a camera; the iPad 2 rectifies that
    shortcoming with not one, but two cameras: a 0.7-megapixel camera on the back
    and a 0.3-megapixel VGA camera on the front for video chats and self-portraits
    (you will learn more about using the front-facing camera in the new `FaceTime`
    app in [Chapter 18](#Chapter18.html#ch18): “FaceTime Video Messaging and Skype”).


    Also new is the `Photo Booth` app which allows you to take self-portraits and
    really be creative – we show you how at the end of the chapter.


    **NOTE:** The resolution on the iPad makes pictures look beautiful. However, it''s
    nowhere near the quality of the camera on the new iPhone 4, so pictures will lose
    some quality when you sync them and view them on your computer. Think of the iPad
    camera as a video camera that takes stills, not a still camera that captures video.


    Viewing and sharing your pictures on the iPad is truly a joy, due in large part
    to the beautiful, large high-resolution screen. In this chapter, we discuss the
    many ways to get pictures onto your iPad. We also show you how you to use the
    touch screen to navigate through your pictures, zoom in and out, pinch open albums,
    and manipulate your photos.


    **TIP:** Did you know that you could take a picture of the entire screen of your
    iPad by pressing two keys simultaneously? Now you can prove that you got the high
    score on Tetris!


    Here''s how to get it done: press both the `Home` button and the `On/Off/Sleep`
    key on the top-right edge (you can also press one, hold it, and then press the
    other). If you have done this correctly, the screen should flash and you''ll hear
    a camera sound. The screen capture you have taken will be in your `Camera Roll`
    album in the `Photos` app.


    ## Using the Camera App


    The `Camera` app (see [Figure 16–1](#Chapter16.html#fig_16_1)) should be on your
    `Home` page—usually on the first screen at the top. If you don''t see it, then
    swipe left or right until you find it.


    ![images](images/p410-01.jpg)


    Touch the `Camera` icon and the shutter of the camera opens with an animation
    on your screen.


    ![images](images/1601.jpg)


    **Figure 16–1.** *The layout of the `Camera` app*


    ### Geo-Tagging


    Geo-tagging is a feature that puts your GPS (geographic positioning system) coordinates
    into the picture file. If you upload your pictures to services like Flickr, the
    coordinates of your picture can help your friends locate where the picture was
    taken. The iPad supports geo-tagging, not only on the 3G version, but also over
    Wi-Fi. The latter approach requires that you be connected to a Wi-Fi network,
    and it uses Wi-Fi triangulation to embed GPS coordinates into the image.


    Geo-tagging also shows up in the `Places` album of your iPad. Touch the `Places`
    tab and you will see pushpins for all the geo-tagged photos.


    Touch one of the pushpins and a small thumbnail of the geo-tagged photo will show
    up next to the location.


    In this example, I touched the pushpin near Boston, and I found a picture I took
    of my son when I was visiting him at school.


    **CAUTION:** The downside of geo-tagging is that, if you share them online, people
    will know where you live, work, and so on. You may want to be selective about
    using it and what you share when using it.


    ![images](images/p411-01.jpg)


    **NOTE:** If you use a Mac, be aware that the `iPhoto` app uses geo-tagging to
    put photos into the `Places` category of `iPhoto`.


    If you have Location Services turned on (see [Chapter 1](#Chapter01.html#ch1):
    “Getting Started”) when you start the camera, you will be asked if it is OK to
    use your current location.


    To double-check whether it is on, do the following:


    1.  Start your `Settings`.

    2.  Go to `General`.

    3.  Then touch `Location Services`. You will see a screen like the one here.

    4.  Make sure the switch next to `Camera` is toggled to `ON`.


    ![images](images/p412-01.jpg)'
