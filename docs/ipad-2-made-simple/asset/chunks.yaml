    #### 利用自动纠正节省时间


    当你打字一段时间后，就会注意到正在输入的某些单词正下方会出现一个小弹出窗口——这被称为自动纠正功能。（如果你从未见过这个弹出窗口，则需要在 iPad 上的
    `设置` 图标中启用自动纠正。）当你看到弹出窗口猜出了正确的单词时，只需按下键盘底部的 `空格键` 选择该单词，就能节省时间。


    在这个例子中，我们开始输入单词“especially”。当我们输到这个单词中的字母 `c` 时，正确的单词——*especially*——就会出现在下方的弹出窗口中。要选择它，我们只需按下键盘底部的
    `空格键`（见图 2-7）。


    ![images](img/0207.jpg)


    **图 2-7.** *使用自动纠正和建议单词*


    你的第一反应可能是点击弹出的单词，但那样做只会将它从屏幕上清除。实际上，更快的做法是继续打字，或者当看到正确的单词时按下 `空格键`，因为在许多情况下，随着你继续输入，单词要么本来就是正确的，要么会变成正确的。长远来看，这种方法能减少手指的移动距离。


    学会使用 `空格键` 后，你就会发现这个弹出式猜测功能能节省不少时间。毕竟，你本来就需要在单词末尾输入一个空格！


    **提示：** 利用自动纠正，你可以避免在许多常见缩略词中输入撇号，例如“won''t”和“can''t”。自动纠正会在弹出的窗口中显示拼写正确的缩略词；你只需按下
    `空格键` 即可选择纠正后的单词。


    ![Image](img/p82-01.jpg)


    ##### 听取自动纠正单词的读音


    你可以将 iPad 设置为在自动文本和自动纠正单词出现时朗读它们。这有助于你选择正确的单词。请按以下步骤启用此朗读功能：


    1.  点击 `设置` 图标。

    2.  点击左侧栏中的 `通用`。

    3.  点击右侧栏底部的 `辅助功能`。

    4.  将 `朗读自动文本` 旁边的开关设置为 `开启`。


    启用此功能后，每次打字时弹出自动纠正的单词，你都会听到它被朗读出来。如果你喜欢听到的单词，就按下 `空格键` 接受它；否则，继续打字。此功能可以帮你省去从键盘上抬头查看的麻烦，从而节省时间。


    ### 辅助功能选项


    iPad 上有许多有用的功能可以辅助操作。 `旁白` 选项能为你朗读屏幕上的文本。它会告诉你触摸了什么、选中了哪些按钮以及所有选项。它还可以朗读整屏的文本。如果你想让屏幕显示更大，也可以按下一节所述，开启
    `缩放` 功能。


    #### 大文本


    有时，标准字体太小，阅读起来很费力。这种情况下，`大文本` 功能就非常有用了。


    从 `辅助功能` 选项中点击 `大文本`，可以调整 `通讯录`、`邮件` 和 `备忘录` 中的字体大小。


    你可以从 `关闭`（默认约为 12 磅文本）一直选择到 56 磅文本。


    ![Image](img/p83-01.jpg)


    #### 旁白——让 iPad 为你朗读


    iPad 的一个很酷的功能是可以开启 `旁白` 功能，这样 iPad 就会朗读屏幕上显示的任何内容。你甚至可以让它为你朗读任何电子邮件、文本文档，甚至是 iBook
    页面中的内容。


    请按以下步骤启用 `旁白`：


    1.  点击 `设置` 图标。

    2.  点击左侧栏中的 `通用`。

    3.  点击右侧栏底部的 `辅助功能`。

    4.  点击左侧栏中的 `旁白`。

    5.  将 `旁白` 开关设置为 `开启`，然后在弹出窗口中点击 `确定` 确认。


    ![Image](img/p84-01.jpg)


    **注意：** 如右侧屏幕所示，`旁白` 的手势与正常手势不同。请点击 `练习旁白手势` 按钮来熟悉它们。


    请注意，你可以从慢到快调整 `朗读速率`，并进行其他调整，例如 `键入反馈`、`使用语音` 和 `使用音调变化`。不妨尝试一些这些选项，看看哪些最适合你。


    点击 `盲文` 可以通过蓝牙将 iPad 连接到盲文设备。


    点击 `网页转子` 可以调整各种网页功能，以便在 *网页转子* 中包含这些功能（稍后你将了解更多相关信息）。


    类似地，点击 `语言转子` 可以选择用于 `旁白` 的语言（同样，稍后你将了解更多相关信息）。


    在启用 `旁白` 的情况下打字时，默认情况下，你输入的每个字符都会被朗读出来。你可以在刚才提到的设置屏幕中更改这一设置。你可以将其设置为仅朗读单词、仅朗读字符，或者不朗读任何内容。


    要在 `iBooks` 应用中让 iPad 为你朗读整个页面，你需要同时触摸屏幕上文本块的上方和下方。如果你用一根手指点击文本，则只会为你朗读单行文本。


    在 `备忘录` 应用中点击笔记的顶部，会为你朗读整篇笔记。


    ##### 网页转子与语言转子


    使用 `旁白` 时的两个有趣功能是网页转子和语言转子。你可以在之前显示的 `旁白` 设置屏幕中自定义这些转子中出现哪些项目。


    | 要使用网页或语言转子，你需要将两根手指放在屏幕上，同时旋转它们（就像用手指指尖转动刻度盘一样）。完成此操作后，屏幕上会出现一个小型的 `旋转刻度盘` 图标（请参见右侧图片，其中
    `旋转刻度盘` 设置为 `标题`）。接着，用一根手指在屏幕上向下轻扫，就会跳转到所选列表中的下一个项目。例如，如果你将网页转子设置为 `标题`，然后用一根手指向下轻扫，`旁白`
    会跳转到页面的下一个标题。向上轻扫则跳回上一个标题。 | ![Image](img/p85-01.jpg) |

    | 要切换语言，首先在 `旁白` 的“语言转子”设置屏幕中选择若干种语言。将两根手指放在屏幕上并旋转，直到看到指针指向 `语言`。接着，向下轻扫以选择下一个
    `旁白` 语言。向上轻扫则返回之前选择的一种语言。 | ![Image](img/p85-02.jpg) |


    #### 使用缩放放大整个屏幕


    如果你觉得屏幕上的文本、图标、按钮或任何东西看得稍微有些困难，你可以开启 `缩放` 功能。开启 `缩放` 功能后，你可以将整个屏幕放大到几乎两倍大小。这会让所有内容更容易阅读。


    **注意：** `旁白` 和 `缩放` 不能同时使用；你需要选择其中之一。


    请按以下步骤启用 `缩放`：


    1.  点击 `设置` 图标。

    2.  点击左侧栏中的 `通用`。

    3.  点击右侧栏底部的 `辅助功能`。

    4.  点击右侧栏中的 `缩放`。

    5.  将 `缩放` 旁边的开关设置为 `开启`。


    ![Image](img/p86-01.jpg)


    与 `旁白` 类似，`缩放` 使用三指手势。在离开屏幕前，请务必记下这些手势。


    #### 白底黑字


    如果对比度和颜色难以辨认，那么你可能想要开启 `白底黑字` 设置。请按照以下步骤更改此设置：


    1.  如前所示，进入 `设置` 应用中的 `辅助功能` 屏幕。

    2.  将 `白底黑字` 开关设置为 `开启`。


    当此设置开启时，屏幕上所有浅色部分都会变成黑色，而所有深色或黑色部分则会变成白色。

