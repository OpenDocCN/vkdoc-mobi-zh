  trans: "\n# 地图使用入门\n\niPad 的魅力在于其应用程序能够相互协作。您已经看到**通讯录**是如何与**地图**应用关联的。\n\n![images](img/p635-01.jpg)\n\
    \n**地图**应用由移动地图技术领域的领导者——谷歌地图提供技术支持。通过**地图**，您可以定位当前位置、获取路线指引、搜索附近地点、查看实时路况等。只需轻点**地图**图标即可开始使用。\n\
    \n## 定位当前位置（蓝色圆点）\n\n启动**地图**程序后，可按以下步骤将其定位至您当前的位置：\n\n1.  轻点顶部导航栏中央的**箭头**图标。\n\
    \n    ![images](img/p636-01.jpg)\n\n    ![images](img/p636-02.jpg)\n\n2.  地图会请求使用您当前的位置——轻触**允许**或**不允许**。我们建议选择**允许**，这样能更轻松地获取从当前位置出发或前往当前位置的路线指引。\n\
    \n![images](img/p636-03.jpg)\n\n**注意：** 即使您只有支持 Wi-Fi 的 iPad，它也能找到您的近似位置。Wi-Fi\
    \ 版 iPad 基于路由器位置进行定位。这通常较为准确，但如果有人将旧路由器带到了新的州，iPad 可能会认为您仍在旧位置。\n\n## 不同地图视图\n\
    \n**地图**的默认视图是**经典**视图，这是一种基础地图，具有通用背景并显示街道名称。**地图**还可以显示**卫星**视图，或**卫星**与**经典**视图相结合的**混合**视图。此外，还有全新的**地形**视图，看起来像一张地形图。最后，还有一种**列表**视图，仅在您执行搜索并生成逐向路线列表时出现。您可以使用下一节中描述的步骤在所有视图之间切换。\n\
    \n### 切换地图视图\n\n请按照以下步骤从一种地图视图切换到另一种：\n\n1.  轻触地图右下角的翻起边缘。\n2.  地图的一角会翻起，显示视图选项按钮，包括**交通**、**放置图钉**等（请参见图\
    \ 27–1）。轻点您要切换到的视图：\n    *   **经典：** 显示街道名称的常规地图（请参见图 27–2）。\n    *   **卫星：**\
    \ 不显示街道名称的卫星图片（请参见图 27–1）。\n    *   **混合：** **卫星**与**经典**视图的组合，即带有街道名称的**卫星**视图（图\
    \ 27–2）。\n    *   **地形：** 显示地形（如山脉）的地形图（请参见图 27–3）。\n\n![images](img/2701.jpg)\n\
    \n**图 27–1. *卫星* 视图以及如何切换到其他地图视图**\n\n![images](img/2702.jpg)\n\n**图 27–2. 启用了交通信息的\
    \ *混合* 视图和 *经典* 视图**\n\n![images](img/2703.jpg)\n\n**图 27–3. *地形* 视图——科罗拉多州丹佛以西落基山脉的地形图**\n\
    \n如前所述，**列表**视图仅在搜索产生多个结果（如 `\"pizza 32174\"`）或您请求路线指引时可用，如图 27–4 所示。\n\n![images](img/2704.jpg)\n\
    \n**图 27–4. 路线和搜索结果的 *列表* 视图**\n\n### 查看交通状况\n\n**地图**程序不仅能告诉您如何到达某地，还能沿途检查交通状况。此功能目前仅在美国提供支持。请按照以下步骤查看当地交通状况：\n\
    \n1.  轻触地图右下角以查看选项。\n2.  将**交通**开关打开。\n\n**提示：** 您也可以像翻书一样“翻动”页面来进入此视图。其动画效果与\
    \ **iBooks** 应用中的完全相同。\n\n![images](img/p640-01.jpg)\n\n如果高速公路上出现交通状况，您通常会看到黄色灯标而非绿色灯标；有时黄色灯标可能会闪烁以提醒您交通延误。您甚至可能看到**施工工人**图标来指示施工区域。\n\
    \n**地图**在主要街道和高速公路上使用以下颜色来指示车辆行驶速度：\n\n绿色 = 时速 50 英里或以上  \n黄色 = 时速 25 – 50 英里\
    \  \n红色 = 时速低于 25 英里  \n灰色（或无颜色）= 当前无交通数据可用\n\n![images](img/p640-02.jpg)\n\n\
    ## 搜索任何内容\n\n由于**地图**与谷歌地图相关联，您可以搜索并找到几乎任何内容：具体地址、商业类型、城市或其他兴趣点，如图 27–5 所示。请按照以下步骤查找位置：\n\
    \n1.  轻触屏幕右上角的**搜索**栏。\n2.  输入您的地址、兴趣点，或您想在 iPad 上显示地图的城镇和州。\n\n![images](img/p641-01.jpg)\n\
    \n**谷歌地图搜索技巧**\n\n您几乎可以在搜索栏中输入任何内容：\n\n*   名字、姓氏或公司名称（匹配您的通讯录）\n*   主街 123 号，城市（街道地址的部分或全部）\n\
    *   奥兰多机场（查找机场）\n*   水管工、油漆工或屋顶工（商业名称或行业的任何部分）\n*   高尔夫球场 + 城市（查找当地高尔夫球场）\n* \
    \  电影院 + 城市或邮政编码（查找当地影院）\n*   Pizza 32174（搜索邮政编码 32174 附近的披萨餐厅）\n*   95014（美国加州苹果公司总部的邮政编码）\n\
    *   Apress Publishing\n\n![images](img/2705.jpg)\n\n**图 27–5. *在地图应用中搜索**\n\n\
    要输入数字，请轻点键盘上的 **123** 键。要输入字母，请轻触 **ABC** 键切换回字母键盘。\n\n## 地图选项\n\n当地址显示在**地图**屏幕上后，您会看到一系列可用选项。轻触地址旁边的**蓝色信息**图标\
    \ ![images](img/p642-01.jpg) 以查看部分选项。如果您已映射了某个特定地点或联系人，您将看到图 27–6 所示的详细信息。您还可以获取路线、共享位置或添加为书签。\n\
    \n![images](img/2706.jpg)\n\n**图 27–6. *轻触蓝色信息按钮查看映射位置或联系人详情**\n\n如果您已映射了某个地址或兴趣点，轻触**蓝色信息**按钮后会看到不同的屏幕。您会发现一个小的街景图像，以及用于获取**路线**、**添加到通讯录**、**共享位置**或**添加到书签**的按钮，如右图所示。\n\
    \n![images](img/p643-01.jpg)\n\n### 使用书签\n\n在**地图**中，书签的使用方式与在 **Safari** 网页浏览器应用中非常相似。书签只是记录您访问过或映射过、并希望将来记住的地点。查看书签总是比执行新的搜索更容易。\n\
    \n#### 添加新书签\n\n为某个位置添加书签是方便再次找到该地点的好方法。请按以下步骤操作：\n\n1.  映射一个位置，如图 27–7 所示。\n\
    2.  轻触地址旁边的**蓝色信息**图标。\n3.  轻触**添加到书签**。\n\n    ![images](img/2707.jpg)\n\n  \
    \  **图 27–7. *添加书签**\n\n4.  编辑书签名称，使其简短且易于识别——在此例中，我们将地址编辑为 *Fenway Park*。\n5.\
    \  完成后，轻触右上角的**存储**。\n\n**提示：** 您可以像在通讯录中搜索姓名一样搜索书签名称。\n"
- fmt: "# Accessing and Editing Your Bookmarks\n\nTo view your bookmarks, follow these\
    \ steps:\n\n1. Tap the `Bookmarks` icon next to the `Search` window in the top\
    \ row.\n2. Tap any bookmark to immediately jump to it.\n3. Tap the `Edit` button\
    \ at the top of the bookmarks to edit or delete bookmarks:\n   - To reorder the\
    \ bookmarks, touch and drag the right edge of each bookmark up or down.\n   -\
    \ To edit the name of a bookmark, touch it and retype the name. After editing\
    \ the name, touch the `Bookmarks` button in the top left to get back to your list\
    \ of bookmarks.\n   - To delete a bookmark, swipe to the left or right on the\
    \ bookmark and tap the `Delete` button.\n4. Tap the `Done` button when you are\
    \ finished editing your bookmarks.\n\n![images](images/p645-01.jpg)\n\n## Add\
    \ a Mapped Location to Contacts\n\nIt is easy to add a location you mapped to\
    \ your contact list:\n\n1. Map an address.\n2. Tap the `Blue Information` button.\n\
    3. Tap `Add to Contacts`. ![images](images/p646-01.jpg)\n4. Tap either `Create\
    \ a New Contact` or `Add to Existing Contact`.\n5. If you choose `Add to Existing\
    \ Contact`, you then scroll through or search your contacts and select a name.\
    \ The address will automatically be added to that contact.\n\n## Searching for\
    \ Things (Stores, Restaurants, Hotels, Movies, Anything) Around Your Location\n\
    \nFollow these steps to search for things near your current location:\n\n1. Map\
    \ a location on the map or use the `Blue Dot` icon for your current location.\n\
    2. Tap the `Search` window. Let's say we want to search for the closest pizza\
    \ restaurants. Typing “pizza” maps all the local pizza restaurants.\n\n   ![images](images/p646-02.jpg)\n\
    \n3. Notice that each mapped location may have a `Street View` icon on the left\
    \ and the `Blue Information` icon on the right.\n\n   ![images](images/p647-01.jpg)\n\
    \n4. If you want to zoom in or out, you can pinch the screen open or closed, or\
    \ you can double-tap the screen.\n5. Just as with any mapped location, when you\
    \ touch the `Blue Information` icon, you can see all the details, such as the\
    \ pizza restaurant's phone number, address, and web site.\n6. If you want directions\
    \ to the restaurant, just touch `Directions to Here` and a route is instantly\
    \ calculated.\n\n**NOTE:** If you touch the `Home Page` link, you will exit `Maps`\
    \ and `Safari` will start. You will then need to restart `Maps` again when you're\
    \ done.\n\n![images](images/p647-02.jpg)\n\n## Zooming In and Out\n\nYou can zoom\
    \ in and out in the familiar way by double-tapping and pinching. To zoom in by\
    \ double-tapping, just double-tap on the screen as you would on a web page or\
    \ picture.\n\n## Dropping a Pin\n\nLet's say you're looking at the map, and you\
    \ find something you'd like to set either as a bookmark or as a destination.\n\
    \nIn this example, we are zooming in and looking around greater Boston. We stumble\
    \ upon Fenway Park and decide it would be great to add it to our bookmarks, so\
    \ we drop a pin on it, as shown in [Figure 27–8](#Chapter27.html#fig_27_8):\n\n\
    1. Map a location or move the map to a location where you'd like to drop the pin.\n\
    2. Tap the lower-right corner of the map. ![images](images/p648-01.jpg)\n3. Tap\
    \ `Drop Pin`.\n4. Now, drag the pin around the map by touching and holding it.\
    \ In this example, we move it right onto Fenway Park.\n\n![images](images/2708.jpg)\n\
    \n**Figure 27–8.** *How to drop a pin*\n\n**TIP:** How can you find the street\
    \ address of any location on the map?\n\nWhen you `Drop a Pin`, Google Maps will\
    \ show you the actual street address. This is very handy if you find a location\
    \ by looking at `Satellite`, `Hybrid` or `Terrain` view, but need to get the actual\
    \ street address.\n\nDropping a pin is also a great way to keep track of where\
    \ you parked—very helpful in an unfamiliar location (especially with the iPad\
    \ 3G).\n\n## Using Street View\n\nGoogle's `Street View` ([Figure 27–9](#Chapter27.html#fig_27_9))\
    \ is really fun in `Maps` on the iPad. Google has been hard at work photographing\
    \ just about every address across the United States and elsewhere. The pictures\
    \ are then fed into its database and that's what shows up when you want to see\
    \ a picture of your destination or waypoint.\n\n**NOTE:** Google's `Street View`\
    \ is just making its way beyond the US borders. Several major cities in various\
    \ parts of the world are now mapped.\n\nIf there is a street view available, you\
    \ will see a small icon to the left of the address or bookmark on the map—a small\
    \ `Orange Person` icon.\n\n![images](images/p649-01.jpg)\n\nIn this example, Gary\
    \ wants to check the street view of his Red Sox' shrine—Fenway Park:\n\n1. In\
    \ this case, to map the address, we tapped the work address under Fenway Park\
    \ on our `Contacts` list. We could have mapped it by typing an address in the\
    \ search window, by searching for a type of business, or by touching the address\
    \ in the `Contacts` app.\n2. To the left of the name is the `Street View` icon.\n\
    3. We tap the icon to immediately shift to a street view of the address.\n4. What\
    \ is very cool is that we can navigate around the screen in a 360-degree rotation\
    \ by swiping left, right, or even up or down—this lets us look at the places next\
    \ to and across the street from our destination.\n\nTo return to the map, we just\
    \ touch the lower-right corner of the screen.\n\n![images](images/2709.jpg)\n\n\
    **Figure 27–9.** *Using Google's `Street View`*\n\n# Getting Directions\n\nOne\
    \ of the most useful functions of the `Maps` program is that we can easily find\
    \ directions to or from any location. Let's say we want to use our current location\
    \ and get directions from Gloria's store to Fenway Park in Boston.\n\n## Tap the\
    \ Current Location Button First\n\nTo find directions to or from your current\
    \ location, you don't have to waste time typing your current address—just locate\
    \ yourself by tapping the current location button ![images](images/p650-01.jpg)\
    \ in the center of the Top Information Bar. You may need to repeat this step a\
    \ few times until you see the `Blue Dot` icon on the screen.\n\nNow you can do\
    \ one of two things:\n\n- Tap the `Directions` button at the left end of the top\
    \ information bar.\n- Or, you can touch the `Blue Information` icon as discussed\
    \ previously, and then select `Directions to Here` (see [Figure 27–10](#Chapter27.html#fig_27_10)).\
    \ Unless you specify otherwise, `Maps` will then calculate directions from your\
    \ current location to the destination.\n\n![images](images/2710.jpg)\n\n**Figure\
    \ 27–10.** *Choose `Directions to Here` and `Maps` will route your trip.*\n\n\
    ## Choose Start or End Location\n\nWe can follow these steps to choose a start\
    \ or end location for a given route:\n\n1. If the destination is in our `Bookmarks`,\
    \ we can touch the `Bookmarks` icon.\n2. Next, we choose the location that is\
    \ bookmarked.\n3. We could tap `Bookmarks`, `Recents`, or `Contacts` to find our\
    \ destination.\n4. In this case, we tap `Bookmarks`.\n5. Finally, we tap `Fenway\
    \ Park`.\n\n   ![images](images/p652-01.jpg)\n\n   **NOTE:** As soon as you touch\
    \ the `Directions From Here` button, your recent searches will be automatically\
    \ displayed, as shown in [Figure 27–10](#Chapter27.html#fig_27_10). You can also\
    \ touch the `Destination` box ![images](images/p652-02.jpg) and type in a destination.\n\
    \n6. After we select Fenway Park from `Bookmarks`, the routing screen takes us\
    \ to an overview screen.\n7. A `Green Pushpin` icon is dropped at the start location,\
    \ and a `Red Pushpin` icon is dropped at the end location—in this case, Fenway\
    \ Park.\n\n![images](images/p653-01.jpg)"
