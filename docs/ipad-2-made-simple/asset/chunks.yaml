  trans: "\n# Apple iPad 底座\n\n如果你想将 iPad 竖立放置，用作电子相框，或在手持使用时为其提供支撑，可以看看这款售价 29.00\
    \ 美元的 iPad 底座。iPad 底座背面还有一个底座连接端口，因此当 iPad 放置在底座上时，你可以将其连接到电脑或充电器（参见图 15）。\n\n\
    ![images](img/p29-01.jpg)\n\n**图 15** *Apple iPad 底座*\n\n# Apple 相机连接套件\n\n如果你想将数码相机中的照片直接传输到\
    \ iPad，而不必先传输到电脑，可以使用相机连接套件这款配件。这款售价 29.00 美元的配件包含两个小配件——图 16 左侧所示的是 USB 适配器；另一个是\
    \ SD 卡适配器。两者均插入 iPad 底部的底座连接端口。\n\n![images](img/p30-01.jpg)\n\n**图 16.** *Apple\
    \ 相机连接套件*\n\n要使用这些适配器导入照片，请按照以下步骤操作：\n\n1. 将 USB 或 SD 卡配件插入 iPad 底部的底座端口。\n  \
    \ 1. 如果使用 USB 连接器，请将相机上的 USB 线缆插入连接器。\n   2. 如果使用 SD 卡连接器，请从相机中取出 SD 存储卡并插入连接器。\n\
    2. iPad 应处于开机状态。如果已开机，它将立即显示**导入照片**屏幕（参见图 17）。\n3. 要导入所有照片，请轻点右上角的 **全部导入** 按钮。\n\
    4. 要导入选定的照片，请先轻点照片进行选择。然后轻点 **导入** 按钮并选择 **导入所选项目**。\n5. 随后，你可以选择**保留**或**删除**相机或\
    \ SD 卡上的照片。\n6. 最近导入的照片将显示在**最近导入**相簿中。所有导入的照片将显示在**已导入**相簿中。\n\n![images](img/p31-01.jpg)\n\
    \n**图 17.** *使用相机连接套件导入照片。*\n\n# VGA 适配器线缆\n\n如果你正在使用 **Keynote** 应用，并希望通过 iPad\
    \ 在更大的外接 VGA 显示器上播放演示文稿，或者你想播放从 iTunes Store 租赁或购买的电影，那么 VGA 适配器线缆就是为你准备的。\n\n\
    **注意：** 在发布时，VGA 适配器线缆配件仅在非常有限的应用和场景下有效。例如，它仅适用于**播放**模式下的 **Keynote** 应用，以及从\
    \ iTunes 购买或租赁的特定电影。然而，它并不能在插入后立即显示 iPad 屏幕。\n\n这款 VGA 适配器线缆售价 29.00 美元。将一端插入\
    \ iPad 底部的底座连接器，另一端连接到连接外接显示器的 VGA 线缆，如图 18 所示。当你在 **Keynote** 中播放演示文稿时，可以使用 iPad\
    \ 向前或向后切换幻灯片。\n\n![images](img/p32-01.jpg)\n\n**图 18.** *适用于 iPad 的 VGA 适配器线缆*\n\
    \n# 第二部分\n\n# 引言\n\n欢迎使用全新的 iPad 2——以及这本告诉您如何充分利用它所需了解一切的书。在本部分中，我们将向您展示本书的组织方式，以及如何找到您需要的内容。我们甚至向您展示如何通过简短的电子邮件将一些绝佳的技巧和秘诀直接发送到您的\
    \ iPad 2，以及在哪里可以找到简短、切中要点的视频教程，以便更深入地了解您的 iPad。\n\n# 引言\n\n![Image](img/p35-01.jpg)\n\
    \n## 恭喜您拥有 iPad 2！\n\n您手中的是全新增强版的 iPad 2——比初代 iPad 更小、更薄、更强大。它可以说是当今市面上功能最强大、最优雅的媒体播放器、电子书阅读器、游戏机、生活管理工具，几乎无所不能。\n\
    \niPad 2 可以完成您在电脑上所做的近 90% 的工作——而且体验更佳。iPad 2 还可以完成您在智能手机上能做的几乎所有事情。您甚至可以通过 Apple\
    \ 专有的 **FaceTime** 应用或 **Skype** 应用，从 iPad 2 进行视频通话。然而，iPad 既不是电脑也不是智能手机——它介于两者之间，恰是我们许多人的日常使用之选。\n\
    \n**注意：** 请查看第 18 章：“FaceTime 视频通话与 Skype”，其中我们将向您展示如何在 iPad 上使用 **FaceTime**\
    \ 和 **Skype**！\n\n使用您的 iPad，您可以查看照片，并使用与 iPhone 或 iPod touch 相同的触控手势与之交互。您可以捏合缩放、旋转以及通过电子邮件发送照片——所有这些都只需简单的轻点手势。\n\
    \n您还可以以前所未有的方式与内容互动。报纸看起来和读起来既像报纸又像网站，浑然一体。您可以浏览故事、视频和图片，并与新闻互动。\n\n在 iPad 上阅读时，您会真正感觉像在读一本书。翻页可以慢速或快速（当您使用\
    \ **iBooks** 应用时，甚至可以在翻页时看到页面背面的文字）。\n\n您可以以前所未有的方式管理您的媒体库。**iTunes** 和 **iPod**\
    \ 应用在 iPad 上拥有精美的界面。在大尺寸、高清质量的屏幕上，选择音乐、观看视频、整理播放列表等操作变得轻松而有趣。\n\n您有 Netflix 帐户吗？您可以在精美的\
    \ iPad 显示屏上观看您最喜爱的电视节目和电影。您还可以直接在 iPad 上管理内容和整理您的播放队列。\n\n您也无需再在智能手机的小屏幕上更新您的\
    \ Facebook 状态——有了 iPad，您可以在大屏幕上浏览网站，并访问桌面版网站的许多功能，同时还能利用 iPad 的触摸屏以前所未有的方式与 Facebook\
    \ 互动。\n\n最后，通过内置的 Wi-Fi 连接或可选的 3G 连接，您可以随时与网络和电子邮件保持连接。支持所有最新的高速协议，因此您可以随时保持联系并获取最新内容。当您在**横向**模式下使用\
    \ iPad 时，甚至还有一个近乎“全尺寸”的键盘用于输入电子邮件。\n\n## 充分利用 *iPad 2 Made Simple* 这本书\n\n本书可以从头到尾通读，但您也可以按章节或章节内的主题进行模块化阅读。也许您只是想了解\
    \ **App Store**，试试 **iBooks** 应用，或者设置您的电子邮件或通讯录。又或者您只想加载音乐。通过我们的书，您可以做到所有这些，甚至更多。\n\
    \n您很快就会意识到您的 iPad 2 是一个功能非常强大的设备。然而，本书中还有许多“锁在”内部的秘密，我们将帮助您“解锁”它们。\n\n慢慢来——这本书可以帮助您学习如何最好地使用、操作并享受您的新\
    \ iPad。回想一下您第一次尝试使用 Windows 或 Mac 电脑时的情景。熟悉操作方法需要一点时间。iPad 也是如此。使用本书帮助您快速上手，并更快地学习所有最佳技巧和秘诀。\n\
    \n请记住，如此强大的设备一开始并不总是那么容易掌握。\n\n如果您每次阅读书中的一个部分，然后尝试您读到的内容，您将从 iPad 中获得最大收益。我们都知道，阅读后进行实践的记忆保持率远高于单纯阅读。\n\
    \n因此，为了学习和记住您所学的内容，我们建议您执行以下操作：\n\n***读一点，在您的 iPad 上试一点，然后重复！***\n\n## 本书的组织方式\n\
    \n了解本书的组织方式将帮助您更快地找到对您重要的内容。这里我们向您展示本书的主要组织结构。请记住利用我们的精简目录、详细目录以及全面的索引，帮助您快速定位感兴趣的内容。\n"
- fmt: '### Day in the Life of an iPad User


    Located inside the front and back cover, you’ll find this excellent piece of information
    that is full of easy-to-access, cross-referenced chapter numbers. So if you see
    something you want to learn, simply thumb to that chapter and learn it—all in
    just a few minutes.


    ### Part 1: Quick Start Guide


    [Part 1](#PartI.html#p1) of the Quick Start Guide touches on these topics:


    - **Touch Screen Basics:** A host of visual images helps you quickly learn to
    touch, swipe, flick, zoom, and more with your iPad touch screen.

    - **App Reference Tables:** Quickly peruse the icons or apps grouped by category.
    See a thumbnail of what all the apps on your `iPaddo` next to a list of chapters
    where you can jump right to the details of how to get the most out of each app
    covered in this book.

    - **Other Fun Stuff:** Learn about the iPad as a music player, video player, and
    electronic picture frame.

    - **iPad Accessories:** Get a brief overview of some of the more common accessories,
    such as keyboards, cameras, and a new Digital AV adapter to connect your iPad
    to your HDTV. (Check out [Chapter 1](#Chapter01.html#ch1) for more accessory details.)


    ### Part 2: Introduction


    You are here now…


    ### Part 3: You and Your iPad


    This is the meat of the book, organized in 28 easy-to-understand chapters packed
    with loads of pictures to guide you every step of the way.


    ### Part 4: The iPad''s Soul Mate—iTunes


    As a special bonus for our readers, we have provided an extensive iTunes User
    Guide in [Chapter 29](#Chapter29.html#ch29) that shows you how to really get around
    `iTunes` and explore all the possibilities of the desktop application. The more
    comfortable you can get with `iTunes`, the more you can arrange and use content
    from your computer on your iPad—making for a more enjoyable user experience.


    #### Quickly Locating Tips, Cautions, and Notes


    If you flip through this book, you can instantly see tips, cautions, and notes
    based on their formatting. For example, if you wanted to find all the Calendar
    tips, you would flip to the **Calendar** chapter and quickly find them.


    **TIPS, CAUTIONS,** and **NOTES** are all formatted like this, with a gray background,
    to help you see them more quickly.


    #### The iPad Email Tips and Video Tutorials


    Check out the authors’ web site at [`www.madesimplelearning.com`](http://www.madesimplelearning.com)
    for a series of very useful “bite-sized” chunks of iPad tips and tricks. We have
    taken a selection of great tips out of this book and even added a few new ones.
    Click the “Free Tips” section and register for your tips in order to receive a
    tip right in your iPad inbox about once a week. Learning in small chunks is a
    great way to master your iPad!


    Sometimes watching a video makes it much easier to understand a concept than reading
    about it. The authors understand this and are busy working on a series of video
    tutorials to accompany this book. Please visit [`www.madesimplelearning.com`](http://www.madesimplelearning.com)
    or email [`info@madesimplelearning.com`](mailto:info@madesimplelearning.com) to
    learn more about the iPad video tutorials.


    ## Part III


    ### You and Your iPad 2…


    This is the heart of `iPad 2 Made Simple`. In this section, you’ll find clearly
    labeled chapters—each explaining the key features of your iPad 2. You’ll see that
    most chapters focus on an individual app or a specific type of application. Many
    of the chapters discuss applications that come with your iPad 2, but we also include
    some fun and useful apps you can download from the App Store. Sure, the iPad 2
    is for fun, but it’s for a whole lot more, too. We finish with some handy troubleshooting
    tips that can help if your iPad 2 isn’t working quite right.


    ## Chapter 1


    ### Getting Started


    In this chapter, we will take you on a step-by-step tour of your iPad 2, from
    charging it to activating the `iTunes` app for the first time. In the “iPad Basics”
    section at the end of this chapter, we will show you the basics of how to maneuver
    around on your iPad, so you can get up and running quickly.


    #### Getting to Know Your iPad 2


    In this section, we show you how to use everything you get in the box with your
    iPad 2. We also give you some iPad battery and charging tips, help you determine
    if your iPad has already been activated, and take a look at the **Slide to Unlock**
    feature.


    ##### What’s in the Box


    The cardboard box that contains your iPad 2 is barely larger than the iPad itself;
    indeed, it may seem skimpy if you’re new to Apple products. However, it does contain
    everything you need to get started and enjoy your iPad 2—except for a good manual,
    which is why we wrote this book!


    At the very top, as soon as you open the box, you see your new iPad 2.


    Under the plastic holder for the iPad, you’ll find a paper booklet with the text,
    “Designed by Apple in California.” The box also includes the following:


    - **A One Page Reference Guide**: One page?! Yes—it’s just one page, front and
    back! The front shows the buttons, and the back tells you to download `iTunes`
    and connect your iPad to your computer to get started.

    - **The iPad Product Information Guide**: This is a small booklet with a font
    that’s way too small to read. It contains all the legal terms, conditions, warnings,
    and disclaimers related to your iPad.

    - **Apple Logo Stickers**: You get two of those nice white Apple logos you sometimes
    see on car windows. Enjoy!


    At the bottom of the box, you’ll find the rest of your gear, as shown in [Figure
    1-1](#Chapter01.html#fig_1_1).


    ![images](images/0101.jpg)


    **Figure 1-1.** *The USB cable and wall plug charging adapter at the bottom of
    the box*


    ##### Dock Connector to USB Cable


    Your iPad box ships with a Dock to USB cable. This is the cable you use to connect
    to your computer; it also doubles as your power cable.


    ##### Wall Plug Adapter (10 Watt)


    The iPad also comes with a useful piece of hardware called a wall plug adapter
    (see [Figure 1-1](#Chapter01.html#fig_1_1)). This adapter lets you charge your
    iPad directly from a wall outlet without having your computer around. All you
    do is plug the Dock to USB cable into this wall adapter and the other end into
    your iPad.


    **TIP:** Buy an extra adapter, then keep one at home and one at the office. Current
    pricing for this plug adapter is less than US $10 at discount online stores.


    ##### Expected Battery Life and Charging Times


    Apple says battery life for the new, faster iPad 2 with its advanced 25-watt rechargeable
    lithium-polymer battery should be the same as for the original iPad (see [Table
    1-1](#Chapter01.html#tab_1_1)).


    **Table 1-1.** Battery Life Specifications from Apple


    | **Video and Audio Playback** | 10 hours |

    | **Surfing the Web** | 10 hours on Wi-Fi, 9 hours on 3G cellular |

    | **Charging Time** | 2 hours to get 80% in a fast charge, 4 hours to get fully
    charged |


    These battery life durations are in ideal conditions with a new, fully charged
    battery. You will notice that, over time, your actual battery life will diminish.


    **TIP:** If you find that your iPad battery is no longer holding a good charge
    or getting anywhere near the 10-hour expected life, you can have your battery
    replaced by Apple. Visit Apple’s website at [`www.apple.com/batteries/replacements.html`](http://www.apple.com/batteries/replacements.html)
    to learn how to get a new battery for your iPad. Cost at publishing time was $99
    plus shipping.


    ##### Battery and Charging Tips


    There’s nothing worse than running out of juice just when you need it. The key
    question is this: how can you maximize your battery life and make sure your iPad
    is ready when you are? Here are a few tips that can help.'
