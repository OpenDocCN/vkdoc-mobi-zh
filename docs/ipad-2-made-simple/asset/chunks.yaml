- fmt: '### Adjusting the Volume


    There are two ways to adjust the volume on your iPad: using the external `Volume`
    buttons or using the `Volume` slider control on the screen.


    The external `Volume` buttons are on the upper-right side of the device. Press
    the `Volume Up` key (the top button) or the `Volume Down` key to raise or lower
    the volume. You will see the `Volume` slider control move as you adjust the volume.
    You can also just touch and hold the `Volume` slider key to adjust the volume
    up or down.


    ![images](images/p235-01.jpg)


    **TIP:** To quickly mute the sound, press and hold the `Volume Down` key for about
    two seconds. You can also double-click the `Home` key and slide the `App Switcher`
    bar to the right to reveal the Music controls. If the `Side` switch is set to
    `Lock Rotation` (see [Chapter 7](#Chapter07.html#ch7)), then there will be a soft
    key to mute the iPad.


    ![images](images/p235-02.jpg)


    ### Repeating, Shuffling, and Moving Around in a Song


    ![images](images/p235-03.jpg)


    In Play mode, you can activate additional controls by simply tapping the screen
    anywhere on the album cover. You will then see an additional slider (the Scrubber
    Bar) at the top, along with the symbols for `Repeat` and `Shuffle`.


    #### Moving to Another Part of a Song


    Slide the Scrubber Bar to the right and you will see the elapsed time of the song
    (displayed to the far right) change accordingly. If you are looking for a specific
    section of the song, drag the slider, then let go and listen to see if you are
    in the right place.


    ![images](images/p236-01.jpg)


    **TIP:** To make the slider move more slowly (i.e., to fine-tune it), drag your
    finger down the screen. This is called the *scrubbing rate*.


    #### Repeat One Song and Repeat All Songs in Playlist or Album


    To repeat the song you are listening to, touch the `Repeat` symbol at the left
    of the top controls twice until you see it turn blue with a 1 on it.


    ![images](images/p236-02.jpg)


    To repeat all songs in the playlist, song list, or album, touch the `Repeat` icon
    until it turns blue (and does not have a 1 on it).


    ![images](images/p236-03.jpg)


    To turn off the `Repeat` feature, press the icon until it turns white again.


    ![images](images/p236-04.jpg)


    #### Shuffle


    If you are listening to a playlist, album, or any other category or list of music,
    you might decide you do not want to listen to the songs in order. Touching the
    `Shuffle` symbol rearranges the music to play in random order. You know `Shuffle`
    is set to `ON` when the icon is blue and set to `OFF` when it is white.


    ![images](images/p236-05.jpg)


    #### Genius


    Apple has a feature for iTunes called Genius Playlists. If the Genius feature
    is activated in iTunes, you will see the `Genius` symbol shown on the bar to the
    right.


    ![images](images/p237-01.jpg)


    **NOTE:** You must use iTunes on your computer to enable Genius Playlists. Check
    out “[Chapter 29](#Chapter29.html#ch29): Your iTunes User Guide” to learn how.


    ![images](images/p237-02.jpg)


    What the Genius feature does is create a playlist by associating similar songs
    with the one you are listening to. Unlike a random “shuffle” of music, Genius
    will scour your music library and then create a new playlist of 25, 50, or 100
    songs (you set the Genius features in iTunes on your computer).


    ![images](images/p237-03.jpg)


    Genius is a great way to mix up your music and keep it fresh. The simple act of
    playing the type of music you like enables Genius to find some buried songs that
    may not be part of your established playlists.


    **TIP:** To create permanent Genius playlists, just create them in iTunes on your
    computer and sync them to your iPad. The Genius playlists you sync from iTunes
    cannot be edited or changed on the iPad itself, but you can save, refresh, or
    delete Genius playlists created on the iPad.


    #### Now Playing


    Sometimes you are having so much fun exploring your options for playlists or albums
    that you get deeply buried in a menu, and then find yourself just wanting to get
    back to the song you are listening to. Fortunately, this is always very easy to
    do because at the bottom left of most of the music screens, there is a `Now Playing`
    icon you can touch.


    ![images](images/p238-01.jpg)


    **TIP:** To get back to the small album cover view in the bottom-left corner,
    tap the screen to bring up the controls, and then press the `Left Arrow` in the
    lower-left corner to get back to the previous view.


    #### Viewing Other Songs on the Album


    You may decide you want to listen to another song from the same album, rather
    than going to the next song in the playlist or genre list.


    In the lower-right corner of the `Now Playing` screen, you will see a small button
    with three lines on it. (If you do not see any controls, tap the screen once to
    bring them up.)


    ![images](images/p238-02.jpg)


    ![images](images/p239-01.jpg)


    Tap that button and the view switches to a small image of the album cover. The
    screen now displays all the songs on that album.


    Touch another song on the list and that song will begin to play.


    ![images](images/p239-02.jpg)


    **NOTE:** If you were in the middle of a playlist or a Genius Playlist and you
    start listening to another song from an album, you will not be taken back to that
    playlist. Instead, you will need to either go back to your playlist library or
    tap `Genius` to make a new Genius Playlist.


    ### Adjusting Music Settings


    There are several settings you can adjust to tweak your music-playing to suit
    your tastes. You will find these in the `Settings` menu. Just touch the `Settings`
    icon on your `Home` screen to bring up the menu.


    In the middle of the `Settings` screen, touch the `iPod` tab to go to the `iPod`
    music settings screen. There are four settings you can adjust on this screen:
    `Sound Check`, `EQ`, `Volume Limit`, and `Lyrics & Podcast Info`.


    ![images](images/p240-01.jpg)


    #### Using Sound Check (Auto Volume Adjust)


    **TIP:** Because songs are recorded at different volumes, sometimes during playback
    a particular song might sound quite loud compared to another. `Sound Check` can
    eliminate this. If `Sound Check` is set to `ON`, all your songs will play back
    at roughly the same volume.


    ![images](images/p240-02.jpg)


    #### EQ (Sound Equalizer Setting)


    Sound equalization is very personal and subjective. Some people like more bass
    in their music, some like more treble, and some like more of an exaggerated mid-range.
    Whatever your music tastes, there is an `EQ` setting for you.


    ![images](images/p241-01.jpg)


    **NOTE:** Using the `EQ` setting can diminish battery capacity somewhat.


    Just touch the `EQ` tab and then select either the type of music you most often
    listen to or a specific option to boost treble or bass. Experiment, have fun,
    and find the setting that is perfect for you.


    #### Volume Limit (Safely Listen to Music at Reasonable Volumes)


    The `Volume Limit` screen provides a great way for parents to control the volume
    on their kids'' iPads. It is also a good way to make sure you do not listen too
    loudly through headphones, so you do not damage your ears. You just move the slider
    to a volume limit and then lock that limit.


    ![images](images/p241-02.jpg)


    To lock the volume limit, touch the `Lock Volume Limit` button and enter a four-digit
    passcode. You will be prompted to put your passcode in once more and the volume
    limit will then be locked.'
