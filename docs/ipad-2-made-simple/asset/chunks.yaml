  trans: "\n#### iPod 控制与锁定旋转/静音键\n\n在`应用切换器`栏上，您还可以通过从左向右滑动完成另一项操作：查看 iPod 控制和屏幕`方向锁定/静音`图标。\n\
    \n第一代 iPad 仅允许您调整`方向锁定`；但随后的软件更新后，您可以使用`侧边`开关将 iPad 静音。\n\n借助新的 iOS 4.3，您可以将`侧边`开关的功能更改为`锁定旋转`或`静音`。未分配给`侧边`开关的另一个选项将出现在`应用切换器`栏中。\n\
    \n例如，如果您将`侧边`开关设置为`锁定旋转`，则`应用切换器`栏会显示一个用于`静音`iPad 的图标。\n\n**注意**：`锁定旋转`功能在您使用`iBooks`等应用时非常有用，可防止您在变换姿势或意外转动\
    \ iPad 时，正在阅读的书籍在`竖屏`和`横屏`模式之间不断切换。\n\n请按照以下步骤设置`侧边`开关的功能：\n\n1.  点击`设置`图标。\n\
    2.  点击左侧的`通用`图标。\n3.  向下滚动右侧，直到看到`使用侧边开关：`选项。\n4.  选择`锁定旋转`或`静音`。另一个选项现在将出现在`应用切换器`栏中，如图\
    \ 8–2 所示。\n\n![images](img/0802.jpg)\n\n**图 8–2.** *在`设置`中设置`侧边`开关，并在`应用切换器`栏中控制另一个功能。*\n\
    \n选择好首选设置后，更改`锁定旋转`或`静音`功能就很简单了：\n\n1.  在任何应用或甚至`主屏幕`中，双击`主屏幕`按钮以在屏幕底部调出`应用切换器`。\n\
    \n    ![images](img/p221-01.jpg)\n\n2.  从左向右滑动以查看 iPod 控制和`锁定旋转/静音`图标。\n3.  点击`锁定旋转`图标以将屏幕锁定为`竖屏`或垂直方向。即使您将\
    \ iPad 侧放，此方向也会保持不变。当您看到按钮内出现`锁定`图标且顶部状态栏中出现`锁定`图标时，即表示已锁定。\n\n    ![images](img/p221-02.jpg)\n\
    \n4.  您还可以使用中间的`上一曲`、`播放/暂停`和`下一曲`按钮。如果您按住`上一曲`或`下一曲`按钮，它们会变成`快退`或`快进`按钮。\n5.\
    \  或者，您可以点击`iPod`图标跳转到`iPod`应用。如果您正在使用其他应用（如`Pandora`）控制后台音频，您将会看到该应用的图标。\n6.\
    \  您还会看到用于`AirPlay`（请参见第 9 章和第 10 章）、`亮度`和`音量`的控制按钮（请参见 图 8–3）。\n\n![images](img/0803.jpg)\n\
    \n**图 8–3.** *`应用切换器`栏上的 iPod 控制*\n\n## 第 9 章\n\n## 播放音乐\n\n在本章中，我们将向您展示如何将 iPad\
    \ 变成一款出色的音乐播放器。iPad 来自普及了电子音乐播放器的 Apple，所以它肯定具备强大的功能。我们将向您展示如何播放和整理从 iTunes 购买或从电脑同步的音乐。我们还将展示如何以多种方式查看播放列表并快速查找歌曲。此外，我们还会介绍如何使用\
    \ Genius 功能，让 iPad 在您的曲库中定位并分组相似的歌曲——这有点像只播放您喜欢音乐的电台。\n\n**提示：** 了解如何在第 20 章：“iPad\
    \ 上的 iTunes”中直接在 iPad 上购买音乐。了解如何在电脑上使用 iTunes 购买音乐，或将您的音乐 CD 加载到 iTunes 中，以便在第\
    \ 四部分的“iTunes 用户指南”中与 iPad 同步。\n\n我们还将向您展示如何使用名为`Pandora`的免费应用流式播放免费音乐。使用`Pandora`，您可以从多个网络电台中进行选择，或通过输入您最喜爱的艺术家姓名来创建自己的电台。\n\
    \n最后，我们将讨论 iPad 2 最新版本软件中引入的`家庭共享`功能。此功能允许您在连接到家庭网络时，在 iPad 上浏览和播放家庭网络中的任何内容。\n\
    \n### 将 iPad 用作音乐播放器\n\n您的 iPad 很可能是当今市场上最好的音乐播放器之一。其宽大的屏幕让您能够真正与音乐、播放列表、封面艺术以及音乐库的整理进行交互。您甚至可以通过蓝牙将\
    \ iPad 连接到家庭或车载音响，从而从 iPad 欣赏优美的立体声音效！\n\n**提示：** 请查看第 25 章：“蓝牙”，了解如何将 iPad 连接到蓝牙立体声扬声器或车载音响。\n\
    \n无论您使用内置的`iPod`音乐应用还是像`Pandora`这样的网络电台应用，您都会发现在 iPad 上对音乐的控制达到了前所未有的程度。\n\n###\
    \ iPod 应用\n\n大多数音乐处理都通过`iPod`应用完成——其图标就在`主屏幕`上。该图标通常位于底部图标坞中——即最右侧的最后一个图标。\n\n\
    ![images](img/p224-01.jpg)\n\n触摸`iPod`图标，如 图 9–1 所示，您会看到底部有五个软键：\n\n*   **歌曲：**\
    \ 按字母顺序查看歌曲列表（也可搜索）。\n*   **艺术家：** 按字母顺序查看艺术家列表（可像通讯录一样搜索）。\n*   **专辑：** 按字母顺序查看专辑列表（也可搜索）。\n\
    *   **流派：** 查看按音乐流派整理的音乐。\n*   **作曲家：** 按字母顺序查看音乐作曲家列表。\n\n**图 9–1.** *iPod `主屏幕`布局*\n\
    \n**提示：** 如果这样拿着更方便，您可以将 iPad 侧放。无论屏幕方向如何，此屏幕上的所有功能都完全相同。\n\n#### 播放列表视图\n\n**注意：**\
    \ 播放列表是您创建的音乐列表。它可以由任何流派、艺术家、录制年份或您感兴趣的歌曲集合组成。\n\n![images](img/p225-01.jpg)\n\
    \n许多人会将特定流派的音乐归类在一起，比如古典或摇滚。其他人可能会创建快节奏音乐的播放列表，并称之为“健身”或“跑步音乐”。您几乎可以随心所欲地使用播放列表来整理音乐。\n\
    \n播放列表可以在电脑上的 iTunes 中创建，然后同步到您的 iPad（请参见“iTunes 指南”）。您也可以直接在 iPad 上创建播放列表，我们将在下一节中介绍。\n\
    \n一旦您将播放列表同步到 iPad 或在 iPad 上创建了一个播放列表，它就会出现在 iPod 屏幕左侧的`资料库`下方。\n\n在本示例中，我们触摸`Beatles`播放列表，该播放列表中的所有歌曲都会被列出来。\n\
    \n要转到不同的播放列表，只需触摸左侧的不同播放列表即可。\n\n**注意：** 您可以在 iPad 上编辑某些播放列表的内容。但是，在电脑或 iPad 上创建的\
    \ Genius 播放列表无法在 iPad 本身上进行编辑。\n"
- fmt: '# Creating Playlists on the iPad


    The iPad lets you create unique playlists on the device that can be edited and
    even synced with your computer. Let''s say you want a new selection of music in
    your iPad playlist. Just create the playlist—we''ll show you how later in the
    chapter—and add songs. Whenever you want, you can remove those songs and add new
    ones—it couldn''t be easier!


    To create a new playlist on the iPad, touch the `Plus Sign` in the lower-left
    corner.


    ![images](images/p226-01.jpg)


    Give your playlist a unique name (we''ll just call this one “iPad playlist”),
    and then touch `Save`.


    ![images](images/p226-02.jpg)


    The iPad then displays the `Add Songs` screen. Touch anywhere in the song name
    for any song you want to add to the new playlist.


    You know a song is selected and will be added to the playlist when it turns gray.


    ![images](images/p226-03.jpg)


    **NOTE:** Don''t get frustrated trying to remove or deselect a song you tapped
    by mistake. You can''t remove or deselect songs on this screen; you have to click
    `Done`, then remove them on the next screen. (We show you how in a moment.)


    Select `Done` at the top right and the contents of the playlist will be displayed.


    If you tapped a song or two by mistake or changed your mind, after you click `Done`
    you can remove songs on the next screen.


    ![images](images/p227-01.jpg)


    Follow these steps to delete a song:


    1.  Tap the `Red Circle` to the left of the song name.

    2.  Tap the `Delete` button to the right of the song.


    Follow these steps to move a song up or down in a playlist:


    1.  Touch and hold the three gray bars to the right of the song.

    2.  Drag the song up or down and then let go.


    ![images](images/p227-02.jpg)


    When you are sure you are done, just touch `Done` in the upper-right corner and
    your playlist will be set.


    To change the playlist later, touch the `Edit` button and follow the steps described
    previously.


    ![images](images/p227-03.jpg)


    ## Searching for Music


    Almost every view from your `iPod` app (i.e., `Playlists`, `Artists`, `Videos`,
    and `Songs`) has a `Search` window in the upper-right corner, as shown in [Figure
    9–2](#Chapter09.html#fig_9_2). Tap once in that `Search` window and type a few
    letters of the name of an artist, playlist, video, or song to instantly see a
    list of all matching items. This is the best way to quickly find something to
    listen to or watch on your iPad.


    ![images](images/0902.jpg)


    **Figure 9–2.** *Searching for music*


    ## Changing the View in the iPod App


    The `iPod` app is very flexible when it comes to ways to display and categorize
    your music. Sometimes, you might want to look at your songs listed by the artist.
    Other times, you might want to see a particular album or song. The iPad lets you
    easily change the view to help manage and play just the music you want at a given
    moment.


    ### Artists View


    ![images](images/p229-01.jpg)


    The `Artists` view lists all the artists on your iPad; or, if you are in a playlist
    and select `Artists`, it will list the artists in that playlist.


    Flick through the list to move to the first letter of the artist''s name you are
    looking for.


    When you find the artist''s name, touch that name and all the songs by that artist
    will be listed, with a picture of the album art to the left.


    ![images](images/p229-02.jpg)


    **TIP:** Use the same navigation and search features as you do with your `Contacts`
    app (the address book).


    ### Songs View


    ![images](images/p230-01.jpg) Touching the `Songs` tab shows you a list of every
    song on your iPad.


    If you know the exact name of the song, flick through the list or touch the first
    letter of the song in the alphabetical list to the right.


    ![images](images/p230-02.jpg)


    ### Albums View


    ![images](images/p230-03.jpg)


    The music on your iPad is also organized by albums, which you''ll see when you
    touch the `Albums` tab at the bottom.


    Again, you can scroll through the album covers or touch the first letter of the
    album name in the alphabetical list, and then make your selection.


    Once you choose an album, all the songs on that album will be listed.


    To close the pop-up window with the list of songs, simply tap anywhere outside
    that window.


    ![images](images/p230-04.jpg)


    ### Genres


    ![images](images/p231-01.jpg)


    The `Genres` tab arranges your music into music types. This can be an easier way
    to find your music and to have more of a “themed” listening experience.


    At times, you may want to hear a rock or jazz mix; you could select those particular
    genres and start playing some or all of your songs that fit those genres.


    ![images](images/p231-02.jpg)


    In this image, we touched `Rock`, and the iPad popped up a little window showing
    us how many albums and songs we have in that particular genre.


    ![images](images/p231-03.jpg)


    ### Composers


    ![images](images/p232-01.jpg)


    As with the other views, touching the `Composers` tab at the bottom lists your
    music in a specific way.


    Sometimes you forget the title of the song, but you know the composer. Browsing
    the `Composers` on your iPad can help you find just what you are looking for.


    Similar to other views, the `Composer` view tells you how many albums and songs
    you have by each composer.


    ![images](images/p232-02.jpg)


    ## Viewing Songs in an Album


    When you''re in `Albums` view, just touch an album cover and the cover will flip,
    showing you the songs on that album (see [Figure 9–3](#Chapter09.html#fig_9_3)).


    **TIP**: When you start playing an album, the album cover may expand to fill the
    screen. Tap the screen once to bring up (or hide) the controls at the top and
    bottom. You can use these controls to manage the song and screen, as we''ll describe
    in the next section.


    To see the songs on an album that is playing, tap the `List` button. The album
    cover will turn over, revealing all the songs on that album. The song that is
    playing will have a small `Blue Arrow` next to it.


    ![images](images/p232-03.jpg)


    ![images](images/0903.jpg)


    **Figure 9–3.** *Touch the album cover to see the songs on it.*


    Tap the `Title Bar` above the list of songs and the album cover will return to
    its place in your music library.


    **NOTE:** This only works when you are in `Album` view. If you touch an album
    cover in `Artists` view, the song associated with that album cover will start
    to play.


    ## Playing Your Music


    Now that you know how to find your music, it is time to play it! Find a song or
    browse to a playlist using any of the methods listed previously. Simply tap the
    song name and it will begin to play.


    This screen shows a picture of the album from which the song originates and the
    name of the song at the top.


    Along the top of the screen, you''ll find the `Volume` slider bar and the `Previous
    Song`, `Play/Pause`, and `Next Song` buttons.


    If you want to see other songs on the album, just double-tap the album cover,
    and the screen will flip to show the other songs on that album.


    To just view a list of songs in the album, touch the `List` button in the lower-right
    corner.


    ![images](images/p234-01.jpg)


    ### Pausing and Playing


    Tap the `Pause` symbol (if your song is playing) or the `Play` arrow (if the music
    is paused) to play or resume your song.


    ### Playing the Previous or Next Song


    If you are in a playlist, touching the `Next` arrow (to the right of the `Play/Pause`
    button) will advance you to the next song in the list. If you are searching through
    your music by album, touching `Next` will advance to the next song on the album.
    Touching the `Previous` button will do the reverse.


    **NOTE:** If you''re at the beginning of a song, `Previous` will take you to the
    previous song. If the song is already playing, `Previous` will go to the beginning
    of the current song (and a second tap will take you to the previous song).'
