  trans: "\n# 查看路线\n\n在开始行程之前，您会在屏幕右下角看到一个`开始`按钮。轻点`开始`按钮，路线导航就会开始。`开始`按钮会变为`箭头`按钮，让您能够在行程中的各个步骤之间切换。\n\
    \n![images](img/p653-02.jpg)\n\n![images](img/p653-03.jpg)\n\n如图 27–11 所示，您既可以将路线视为地图上的一条路径，也可以将其视为一个列表。\n\
    \n![images](img/2711.jpg)\n\n**图 27–11.** *查看路线的两种方式*\n\n您可以用手指移动屏幕来查看路线，或者只需点击底部的`箭头`图标\
    \ ![images](img/p654-01.jpg)，即可逐步查看路线快照。\n\n您也可以轻点`列表` ![images](img/p654-02.jpg)\
    \ 按钮，它会显示详细的分步路线。\n\n# 在驾车、公共交通与步行路线之间切换\n\n在开始导航之前，您可以通过轻点路线屏幕底部蓝色条左侧的图标来选择驾车、使用公共交通或步行模式，如图\
    \ 图 27–12 所示。\n\n![images](img/2712.jpg)\n\n**图 27–12.** *选择您的交通方式和后续步骤*\n\n#\
    \ 反向路线\n\n如需反向路线，请轻点位于`起点`和`终点`字段之间的`反向` ![images](img/p655-01.jpg) 按钮。如果您不擅长自行反向导航，或者您的路线包含许多单行道，此功能会非常有用。\n\
    \n# 地图设置\n\n![images](img/p656-01.jpg)\n\n目前，唯一影响`地图`应用的设置是`定位服务`，它对确定您的当前位置至关重要。请按照以下步骤调整这些设置：\n\
    \n1.  轻点`设置`图标。\n\n    ![images](img/p656-02.jpg)\n\n2.  现在找到`定位服务`选项卡并轻点它。将`定位服务`开关拨到`开`位置。\n\
    3.  确保`地图`旁边的开关也设置为`开`位置，这样`地图`就能估算您的位置。\n\n**注意：** 将`定位服务`开关保持为`开`会略微缩短电池续航时间。如果您从不使用`地图`应用或不关心您的位置，请将其设置为`关`以节省电池电量。\n\
    \n# 使用数字指南针\n\niPad 内置了一个非常酷的数字指南针功能。当您需要确定方位并找出哪边是北时，它会很有帮助。\n\n## 校准和使用数字指南针\n\
    \n在使用数字指南针之前，您需要对其进行校准。通常仅在首次使用时需要校准。请按照以下步骤操作：\n\n1.  像平时一样启动`地图`。\n2.  轻点`当前位置`箭头两次——它会从\
    \ ![images](img/p657-01.jpg) 变为 ![images](img/p657-02.jpg)。\n3.  您会看到屏幕上出现一个小的数字指南针，如图\
    \ 图 27–13 所示。\n4.  首次使用数字指南针时，屏幕上会出现校准符号。 ![images](img/p657-03.jpg)\n5.  按照屏幕上的提示，以“8”字形移动您的\
    \ iPad。\n\n    **注意：** 在校准过程中，iPad 可能会要求您远离任何干扰源。\n\n6.  将 iPad 与地面保持水平。如果校准成功，指南针将会旋转并指向北方。\n\
    \n![images](img/2713.jpg)\n\n**图 27–13.** *使用数字指南针*\n\n# 第 28 章\n\n# 故障排除\n\n\
    iPad 通常高度可靠。但偶尔，就像您的电脑或任何复杂的电子设备一样，您可能需要重置设备或解决某个问题。在本章中，我们将为您提供一些有用的工具，帮助您尽快让\
    \ iPad 恢复正常运行。我们从一些基本的快速故障排除开始，然后在后面的“高级故障排除”部分深入介绍更复杂的问题和解决方法。\n\n我们还会涉及一些与 iPad\
    \ 相关的其他零散问题，并为您提供一个资源列表，您可以在其中找到有关 iPad 的更多帮助。\n\n## 基本故障排除\n\n我们首先介绍一些让您的 iPad\
    \ 恢复正常运行的基本技巧与窍门。\n\n### 如果 iPad 停止响应该怎么办\n\n有时，您的 iPad 会对触摸没有反应——它会在某个程序中卡住。如果发生这种情况，请按顺序尝试以下步骤，看看\
    \ iPad 是否会开始响应（参见 图 28–1）。\n\n1.  按下`主屏幕`按钮，看看是否能退出到`主屏幕`。\n\n    ![images](img/p659-01.jpg)\n\
    \n2.  如果某个特定应用导致了问题，请尝试双击`主屏幕`按钮以打开`应用切换器`栏。然后按住`应用切换器`栏中的*任意*图标，直到它们都开始晃动并且图标左上角出现一个带有减号的红色圆圈。轻点`红色圆圈`图标以关闭该应用。\n\
    3.  如果 iPad 仍然没有响应，请尝试按下`睡眠/唤醒`键，直到看到`滑动来关机`。然后按住`主屏幕`按钮，直到您返回到`主屏幕`——这应该会退出程序。\n\
    4.  确保您的 iPad 电量没有耗尽。尝试为其充电或连接到电脑（如果已连接），看看它是否会开始响应。\n5.  如果按住`主屏幕`按钮不起作用，您需要尝试按住`电源/睡眠`按钮三到四秒钟来关闭\
    \ iPad。然后，滑动屏幕顶部的`滑动来关机`滑块。如果您无法关闭 iPad，请参阅下方关于如何重置 iPad 的说明。\n6.  关闭 iPad 后，等待大约一分钟，然后按住同一个`电源`按钮几秒钟以开启\
    \ iPad。\n7.  您应该会看到屏幕上出现 Apple 标志。等待 iPad 启动完成，您应该就能访问您的程序和数据了。\n\n![images](img/2801.jpg)\n\
    \n**图 28–1.** *基本故障排除步骤*\n\n如果这些步骤不起作用，您将需要重置您的 iPad。\n\n### 如何强制重启您的 iPad\n\n\
    在 iPad 没有响应时，重置是您的最后选择。这是完全安全的，而且通常能解决许多类型的问题（参见 图 28–2）。\n\n![images](img/2802.jpg)\n\
    \n**图 28–2.** *重置您的 iPad*\n\n请按照以下步骤强制重启您的 iPad：\n\n1.  用双手同时按住`主屏幕`按钮和`电源/睡眠`按钮。\n\
    2.  同时按住这两个按钮大约八到十秒钟。您会看到`滑动来关机`滑块。忽略它，并继续按住两个按钮，直到屏幕变黑。\n3.  再过几秒钟，您应该会看到 Apple\
    \ 标志出现。看到标志后，松开按钮，您的 iPad 就会重置。\n"
- fmt: "# How to Soft-Reset Your iPad\n\nThere are various things you can reset in\
    \ the **Settings** app, from the **Home** screen layout, to the network settings,\
    \ to all data on your device. Follow these steps to perform a soft-reset:\n\n\
    1.  Tap the **Settings** icon.\n2.  Tap **General** in the left column.\n3.  Tap\
    \ **Reset** at the bottom of the right column.\n4.  Tap **Reset All Settings**\
    \ to reset network, keyboard, home screen layout, and location warnings. Tap **Reset**\
    \ to confirm from the pop-up window.\n5.  Tap **Erase All Content and Settings**\
    \ to erase absolutely everything from your iPad. Then tap **Erase** to confirm\
    \ this action in the pop-up window.\n\n    ![images](images/p663-01.jpg)\n\n6.\
    \  Tap **Reset Network Settings** to clear out all your Wi-Fi (and 3G) network\
    \ settings.\n7.  Tap **Reset Keyboard Dictionary** to reset the spelling dictionary.\n\
    8.  Tap **Reset Home Screen Layout** to return to the factory layout; this is\
    \ the state of the device when you first received your iPad.\n9.  Tap **Reset\
    \ Location Warnings** to reset the warning messages you receive about allowing\
    \ apps to use your current location.\n\n**NOTE:** If you still cannot get your\
    \ iPad working, try using the steps described in the “Device Firmware Update (DFU)\
    \ Mode” section later in this chapter.\n\n## No Sound in Music or Video\n\nThere\
    \ are few things more frustrating than hoping to listen to music or watch a video,\
    \ only to find that no sound comes out of the iPad. Usually, there is an easy\
    \ fix for this problem:\n\n1.  Check the volume by using the **Volume Up** key\
    \ in the upper-right edge of your iPad. You might have accidentally lowered the\
    \ volume all the way or muted it.\n2.  If you are using wired headphones from\
    \ the headphone jack, unplug your headphones and then put them back in. Sometimes,\
    \ the headset jack isn't connected well.\n3.  If you are using wireless Bluetooth\
    \ headphones or a Bluetooth stereo setup, try these steps:\n\n    1.  Check the\
    \ volume setting (if available on the headphones or stereo).\n    2.  Check to\
    \ make sure the Bluetooth device is connected. Go into the **Settings** icon.\
    \ Tap **General** in the left column and **Bluetooth** in the right column. Make\
    \ sure you see your device listed and that its status is **Connected**. If it\
    \ is not connected, then touch it and follow the directions to pair it with the\
    \ iPad.\n\n    **NOTE:** Sometimes you may actually be connected to a Bluetooth\
    \ device and not know it. If you are connected to a Bluetooth Stereo device, no\
    \ sound will come out of the actual iPad.\n\n4.  Make sure the song or video is\
    \ not in **Pause** mode.\n5.  Bring up the music or video controls by double-clicking\
    \ the **Home** button, then swipe to the right to see the music or video controls\
    \ at the bottom (as shown in the image to the right). Once you bring up the controls,\
    \ verify that the song is not paused and that the volume is not turned down all\
    \ the way, as shown here.\n6.  Check the **Settings** icon to see if you (or someone\
    \ else) has set the **Volume Limit** on the iPad:\n\n    1.  Touch the **Settings**\
    \ icon.\n    2.  Tap **iPod** in the left column.\n    3.  See if the **Volume\
    \ Limit** is **ON**. Touch **Volume Limit** to check the setting level. If the\
    \ limit is unlocked, simply slide the volume to a higher level. If it is locked,\
    \ you need to unlock it first by tapping the **Unlock Volume Limit** button and\
    \ entering the four-digit code (see [Figure 28–3](#Chapter28.html#fig_28_3)).\n\
    \n![images](images/2803.jpg)\n\n**Figure 28–3.** *Checking the volume limit in\
    \ **Settings***\n\nIf none of these steps help, check out the “Additional Troubleshooting\
    \ and Help Resources” section later in this chapter. If that doesn't help, then\
    \ try to restore your iPad from a backup file using the steps described in the\
    \ “Restore Your iPad from a Backup” section in this chapter. Finally, if that\
    \ does not help, then contact the store or business that sold you your iPad for\
    \ assistance.\n\n## If You Can't Make Purchases from iTunes or the App Store\n\
    \nYou have this new, cool device. So you go to the iTunes Store or the App Store,\
    \ but you receive an error message or you find you are not allowed to make a purchase.\
    \ Follow these steps to try to fix the problem:\n\n1.  Both stores require an\
    \ active internet connection. Make sure you have either a Wi-Fi connection or\
    \ a cellular data connection. Check out [Chapter 4](#Chapter04.html#ch4): “Wi-Fi\
    \ and 3G Connections” for assistance.\n2.  Verify that you have an active iTunes\
    \ account. We show you how to set up a new iTunes account in the “Create an iTunes\
    \ Account” section of [Chapter 26](#Chapter26.html#ch26): “Bonus iTunes User Guide.”\n\
    \n**NOTE:** If you are traveling to a country where iPads are not yet sold, then\
    \ you may not have an on-device App Store or **iTunes** app. If this is the case,\
    \ you will need to purchase items using **iTunes** on your computer and sync them\
    \ to your iPad.\n\n## Advanced Troubleshooting\n\nNow we will delve into some\
    \ more advanced troubleshooting steps.\n\n### Device Firmware Update (DFU) Mode\n\
    \nWhen none of the other steps described previously get your iPad working again,\
    \ as a last resort you can put the iPad into **Device Firmware Update** (**DFU**)\
    \ mode and restore your data using iTunes. These steps are courtesy of the iPhone,\
    \ iPad, and iPod touch Blog (`www.tipb.com`).\n\nGetting your iPad into **DFU**\
    \ mode can take a few tries; it's quite tricky. After you do this, you will need\
    \ to use **iTunes** to restore your data from a recent backup of your iPad:\n\n\
    1.  Plug your iPad into your Mac or Windows PC and make sure **iTunes** is running.\n\
    2.  Hold down both the **Power/Sleep** button (on top of your device) and the\
    \ **Home** button (on the front underneath the screen).\n3.  Keep them both held\
    \ down from about 10 seconds. (If you see the Apple logo, you've held them too\
    \ long, and you will need to start again.)\n4.  Let go of the **Power/Sleep**\
    \ button but keep holding the **Home** button for about five seconds. (If you\
    \ see the **Plus into iTunes** screen, then you held it too long and will need\
    \ to start again.)\n5.  If the screen stays black, that's it! Your iPad should\
    \ now be in **DFU** mode.\n6.  Now, **iTunes** should say that it has detected\
    \ your device in **Recovery** mode and that it needs to be restored.\n7.  Follow\
    \ the instructions to restore your device. We show you more details about this\
    \ in the “Restore your iPad Operating System” section later in this chapter.\n\
    \n### Physical iPad Damage (Apple Care vs. Alternatives)\n\nIf you accidentally\
    \ damage your iPad—perhaps you get it wet, drop it, break the screen, dent the\
    \ back, or otherwise damage it—you may think that the Apple Care Extended Warranty\
    \ will cover the damage. This is not the case.\n\n**CAUTION:** The Apple Care\
    \ Extended Warranty does not cover accidental damage (e.g., water, broken screen,\
    \ drop, dent, and so on).\n\nThere are several alternative warranties available.\
    \ If you purchase your iPad from a major retailer such as Best Buy, you can buy\
    \ an extended warranty that does cover accidental damage. However, these retailer\
    \ warranties can be quite expensive. We found one warranty that was more affordable\
    \ and still covers accidental damage. This warranty is from SquareTrade (`www.squaretrade.com`);\
    \ at the time of publishing, it cost about $95 USD for two years of coverage.\n\
    \nIf you don't want to buy an extended warranty, then you can do a web search\
    \ to try to find an iPad repair store. There are several options online, and they\
    \ change frequently. Do some research on the web and find one that looks reputable\
    \ and has some solid customer reviews.\n\n**TIP:** Call the iPad repair store\
    \ and ask in detail about their policies regarding your specific damage and who\
    \ pays for the shipping charges. Also ask what happens if they cannot repair the\
    \ iPad."
