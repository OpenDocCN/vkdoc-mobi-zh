- fmt: "#### Adjust or Disable the Auto-Lock Time Out Feature\n\nYou will notice that\
    \ your iPad will Auto-Lock and go into `Sleep` mode with the screen blank after\
    \ a short amount of time. You can change the time interval before this happens\
    \ or even disable this feature altogether using the `Settings` icon:\n\n1.  Touch\
    \ the `Settings` icon from your `Home` screen.\n2.  Touch `General` in the left\
    \ column, then touch `Auto-Lock` in the right column.\n3.  You will see your current\
    \ time interval next to `Auto-Lock` on this page (Figure 1-15). The default setting\
    \ is that the iPad locks after five minutes of sitting idle (to save battery life).\
    \ The choices you have for this setting range from two to fifteen minutes, or\
    \ `Never`.\n\n    ![Image](images/p70-02.jpg)\n\n4.  Touch the desired setting\
    \ to select it—you know it's selected when you see the `Checkmark` icon next to\
    \ it.\n5.  Then, tap the `General` button in the top row to get back to the `General`\
    \ screen. You should see your change now reflected next to `Auto-Lock`.\n\n**BATTERY\
    \ LIFE TIP:**\n\nSetting the `Auto-Lock` shorter (for example, 2 minutes) will\
    \ help you save battery life.\n\n#### Adjusting the Date and Time\n\nUsually,\
    \ the date and time is either set for you or adjusts when you connect your iPad\
    \ to your computer, which we cover in [Chapter 3](#Chapter03.html#ch3): “Sync\
    \ Your iPad with iTunes.” You can, however, manually adjust your date and time\
    \ quite easily. You may want to do this when you are traveling with your iPad\
    \ and need to adjust the time zone when you land. Follow these steps to do so:\n\
    \n1.  Touch the `Settings` icon.\n2.  Touch `General` in the left column and `Date\
    \ & Time` in the right column to see the `Date & Time` settings screen.\n3.  If\
    \ you prefer to see 09:30 and 14:30 instead of 9:30 AM and 2:30 PM, respectively,\
    \ then tap the `24-Hour Time` setting switch to `ON`.\n\n    ![Image](images/p71-01.jpg)\n\
    \n    ![Image](images/p71-02.jpg)\n\n4.  To set the date and time, touch the `Set\
    \ Date & Time` button to see the pop-up window with the wheels that rotate as\
    \ you touch and move them.\n5.  Touch and slide the `hour`, `minute`, and `AM/PM`\
    \ wheels to move them up or down.\n6.  Similarly, to change the date, tap the\
    \ `Date` (in this image `Wednesday, March 23, 2011`).\n\n#### Setting Your Time\
    \ Zone\n\nFollow these steps to set the time zone:\n\n1.  Tap `Time Zone` on the\
    \ same `Date & Time` screen shown in the previous section.\n2.  Start to type\
    \ in the name of the desired city (see [Figure 1-13](#Chapter01.html#fig_1_13)).\n\
    3.  Touch the name of the city to select it and the screen will automatically\
    \ move back to the `Date & Time` screen.\n\n![images](images/0113.jpg)\n\n**Figure\
    \ 1-13.** *Setting your time zone*\n\n#### Adjusting the Brightness\n\nYour iPad\
    \ has an `Auto-Brightness` control available, which is usually set to `ON` by\
    \ default (see [Figure 1-14](#Chapter01.html#fig_1_14)). This uses the built-in\
    \ light sensor to adjust the brightness of the screen. Generally, we advise that\
    \ you keep this set to `ON`.\n\nIf you want to adjust the brightness, you certainly\
    \ can. From your `Home` screen, touch the `Settings` icon. Then touch the `Brightness\
    \ & Wallpaper` tab, which is near the top of the left column, and move the `Slider`\
    \ control to adjust the brightness.\n\n![images](images/0114.jpg)\n\n**Figure\
    \ 1-14.** *Setting the brightness of your iPad*\n\n**TIP**: Setting the brightness\
    \ lower will help you save battery life. A little less than 1/2 way across seems\
    \ to work fine.\n\n## Chapter 2\n\n## Typing Tips, Copy/Paste, and Search\n\n\
    In this chapter, we will show you some good ways to type and save valuable time\
    \ typing on your iPad, whether you use the `Portrait` (vertical/smaller) keyboard\
    \ or the `Landscape` (horizontal/larger) keyboard. We will show you how to select\
    \ different language keyboards, how to type symbols, and other tips. We will also\
    \ show you some tips and tricks when working with various external keyboard accessories\
    \ for your iPad.\n\nLater in this chapter, we will tell you about the `Spotlight\
    \ Search` and the `Copy and Paste` function. `Copy and Paste` will save you lots\
    \ of time, as well as increase your accuracy when working with your iPad.\n\n\
    ### Typing on Your iPad\n\nYou will quickly find two on-screen keyboards on your\
    \ iPad: the smaller one visible when you hold your iPad in a vertical orientation,\
    \ and the larger `Landscape` keyboard visible when you hold the iPad in a horizontal\
    \ orientation. The nice thing is that you can choose whichever keyboard works\
    \ best for you. And if you prefer a physical keyboard, we will show you the ins-and-outs\
    \ of a few nice accessory keyboards from Apple and ZAGG (see [Figure 2-1](#Chapter02.html#fig_2_1)).\n\
    \n![images](images/0201.jpg)\n\n**Figure 2-1.** *Several keyboard accessories\
    \ from Apple and ZAGG*\n\n#### Typing on the Screen with the Portrait Keyboard\n\
    \nYou will find when you first start out with your iPad that you can type most\
    \ easily with one finger—usually your index finger—while holding the iPad with\
    \ the other hand.\n\nAfter a little while, you should be able to experiment with\
    \ thumb typing (as you see so many people doing with their iPhone or BlackBerry\
    \ smartphones). Once you practice a little, typing with two thumbs instead of\
    \ a single finger will really boost your speed. Just be patient; it does take\
    \ practice to become proficient at typing quickly with your two thumbs.\n\nYou\
    \ will actually notice after a while that the keyboard touch sensitivity assumes\
    \ you are typing with two thumbs. What this means is that the letters on the left\
    \ side of your keyboard are meant to be pressed on the left side, and the keys\
    \ on the right are meant to be pressed on the right side (see [Figure 2-2](#Chapter02.html#fig_2_2)).\n\
    \n![images](images/0202.jpg)\n\n**Figure 2-2.** *Typing with two thumbs while\
    \ holding the iPad in `Portrait` mode*\n\n**TIP:** If you have larger hands and\
    \ find typing on the smaller vertical keyboard challenging, then flip your iPad\
    \ on its side to get the larger `Landscape` keyboard (see [Figure 2-3](#Chapter02.html#fig_2_3)).\n\
    \n#### Typing on the Screen with the Larger Landscape Keyboard\n\nSimply turn\
    \ the iPad sideways in almost any app and the keyboard will change to a larger\
    \ `Landscape` keyboard to make it easier to type (see [Figure 2-3](#Chapter02.html#fig_2_3)).\
    \ Follow these steps to type on the `Landscape` keyboard:\n\n1.  It helps if you\
    \ place the iPad at a slight incline as you type; this makes it easier to see\
    \ the screen. You can also simply lay the iPad on a flat surface. It usually helps\
    \ if you either have the iPad in a case (see [Chapter 1](#Chapter01.html#ch1):\
    \ “Getting Started” to learn about various cases) or sitting on a soft surface\
    \ so it does not rock as you are typing.\n2.  Type with two hands as you would\
    \ on a normal computer keyboard. With some practice, you can almost type as fast\
    \ on this larger keyboard as you do on a regular physical keyboard.\n\n**TIP:**\
    \ Try recycling an old mouse pad to use as a rest for your iPad while you type.\n\
    \n![images](images/0203.jpg)\n\n**Figure 2-3.** *Typing with two hands when in\
    \ `Landscape` orientation*\n\n**TIP:** For the frequent traveler, using the virtual\
    \ keyboards on your iPad saves a ton of space in those cramped airline seats compared\
    \ to any laptop computer!\n\n#### Typing with External Keyboards (Purchase as\
    \ Separate Accessories)\n\nIf you need to do a lot of typing or are simply uncomfortable\
    \ with the “typing on glass” feel of the virtual keyboards, you can buy external\
    \ keyboards that work with the iPad. We have tested two from Apple, but we know\
    \ there are more keyboard dock and Bluetooth options available. We showed you,\
    \ but have not tested, a keyboard/case combination called the ZAGGmate earlier\
    \ in this chapter (see Figure –1). Check out the iPad/iPhone/iPod blogs or online\
    \ stores (e.g., [`www.amazon.com`](http://www.amazon.com)) to find keyboards and\
    \ other accessories. You can also do a quick web search for “iPad external keyboard”\
    \ to find other options."
