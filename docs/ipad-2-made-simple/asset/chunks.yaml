    \ Exchange account or a Google Account.\n\n**TIP**: You can now wirelessly sync\
    \ multiple Exchange accounts on your iPad. If you have several Google, Hotmail,\
    \ or Microsoft Exchange accounts, you can wirelessly sync all accounts at the\
    \ same time to your iPad.\n\n#### Why Do We Say Google/Exchange?\n\nWe use the\
    \ words Google and Exchange interchangeably here because you set up your Google\
    \ sync using the Exchange setting on your iPad. Google has licensed Microsoft\
    \ Exchange ActiveSync so you can now set up your Google account just like an Exchange\
    \ account and enjoy the same push email, contacts, and calendar functionality.\
    \ We know it is a little confusing, but you set up both your Google and Exchange\
    \ accounts in the identical manner, using the Exchange settings on your iPad—so\
    \ we say Google/Exchange.\n\nBetween the time of writing the original iPad book\
    \ and this iPad 2 book, Hotmail has also added ActiveSync capabilities, so we\
    \ have included information in this chapter about setting up Hotmail as well.\n\
    \n#### If You Want a Google Account, Create One\n\nIf you don't have a Microsoft\
    \ Exchange account, but you still want a wireless sync, then you should set up\
    \ a free Google account to store your contacts and calendar. The account will\
    \ allow you to start using Google Mail (Gmail), Contacts, and Calendar.\n\nTo\
    \ set up your Google account, follow these steps:\n\n1.  From your computer web\
    \ browser (you can't create a Gmail account your iPad) type in: [`www.gmail.com`](http://www.gmail.com).\n\
    2.  Click the **Create an account** button.\n\n    ![images](images/p152-01.jpg)\n\
    \n3.  On the next screen, enter the information requested and click the button\
    \ at the bottom of the page that says **I accept. Create my account.**\n4.  If\
    \ successful, you'll see a screen that says **Congratulations!** Click the **Show\
    \ me my account** button to get started.\n5.  To see your Calendar, click the\
    \ **Calendar** link in the upper left corner (see [Figure 4–1](#Chapter04.html#fig_4_1)).\n\
    6.  To see your Contacts, click the **Contacts** link in the left side of the\
    \ Gmail Inbox page.\n\n![images](images/0401.jpg)\n\n**Figure 4–1.** *Navigating\
    \ around to see your Gmail Inbox, Contacts, and Calendar*\n\nAs soon as you set\
    \ up the sync as shown in this chapter, you will begin to see all changes to your\
    \ contacts and calendar from Google magically appear on your iPad. The same goes\
    \ for any changes or additions from your iPad—they will automatically appear in\
    \ Google in moments.\n\n**TIP**: It is extremely easy for your Google Contacts\
    \ list grow into the thousands because it automatically includes everyone you\
    \ have ever emailed from your Gmail account. You may want to clean up your list\
    \ before you set up the sync to your iPad.\n\n#### Set Up Your Google, Hotmail,\
    \ or Exchange Account on Your iPad\n\nThe following steps show you how to set\
    \ up the wireless sync for either your Exchange account or your Google contacts\
    \ and calendar:\n\n1.  Touch the **Settings** icon on your iPad.\n2.  Touch **Mail,\
    \ Contacts, and Calendars**.\n3.  In the right column, you'll see a list of your\
    \ email accounts and, below that, the **Add Account** option.\n\n    ![images](images/p153-01.jpg)\n\
    \n    If you have no accounts set up, you will see only **Add Account**. In either\
    \ case, tap **Add Account.**\n\n4.  On the next screen, choose **Microsoft Exchange**.\n\
    \n    **NOTE**: You should choose Microsoft Exchange if you want to have the wireless\
    \ sync with your Google Contacts and Calendar. If you select Gmail, you will not\
    \ be able to wirelessly sync your Google Contacts and Notes, but not your Calendar.\n\
    \n    ![images](images/p154-01.jpg)\n\n5.  Type your email address.\n\n    **TIP**:\
    \ To type the **.com** (or .net, .edu, .org, etc.) in the email address, press\
    \ and hold the period key until you see the **.com** key appear above it. Slide\
    \ over and press **.com**.\n\n    ![images](images/p154-02.jpg)\n\n    ![images](images/p154-03.jpg)\n\
    \n6.  Many times, your email address is also your username. If so, it's easier\
    \ to copy and paste than re-type. To copy your e-mail address into the Username\
    \ field, follow these steps:\n    1.  Touch and hold the **email address** until\
    \ you see the black pop-up appear above it. Tap **Select All**.\n\n        ![images](images/p154-04.jpg)\n\
    \n    2.  Tap **Copy**.\n\n        ![images](images/p155-01.jpg)\n\n    3.  Double-tap\
    \ in the **Username** field (you can also touch and hold) until you see the pop-up\
    \ appear and tap **Paste**.\n\n        ![images](images/p155-02.jpg)\n\n7.  For\
    \ Gmail, leave the **Domain** blank.\n\n    For Exchange email, you may need to\
    \ enter the Domain name supplied by your administrator.\n\n    Type your **Password.**\n\
    \n    If you want, you can adjust the **Description** of the account, which defaults\
    \ to your email address.\n\n    ![images](images/p155-03.jpg)\n\n8.  Tap the **Next**\
    \ button in the upper right corner.\n9.  You may see an **Unable to Verify Certificate**\
    \ screen as shown. If you do see it, click **Accept** to continue.\n\n    ![images](images/p155-04.jpg)\n\
    \n10.  For Gmail, type **m.google.com** in the **Server** field.\n\n    For Hotmail,\
    \ type **m.hotmail.com** In the **Server** field.\n\n    For Exchange email, enter\
    \ your server address. (Example: **mobile.servername.com**)\n\n11.  Click **Next**\
    \ in the upper right corner.\n\n    ![images](images/p156-01.jpg)\n\n12.  On this\
    \ screen you have the option to turn the **Mail,** **Contacts,** and **Calendars**\
    \ wireless sync **On** or **Off**. For each sync you'd like to turn on, tap the\
    \ switch to change it to **On**.\n\n    ![images](images/p156-02.jpg)\n\n    ![images](images/p156-03.jpg)\n\
    \n    **NOTE**: If you already have contacts or calendar items on your iPad, you\
    \ may see warning pop-up messages after you tap Yes next to Contacts and Calendar.\n\
    \n    Your choices are to **Keep on My iPad** or **Delete**. If you choose **Cancel**\
    \ it stops setting up your Exchange account.\n\n    Select **Keep on My iPad**\
    \ to keep all existing contacts and calendar events on your iPad. These items\
    \ will not end up on your Google or Exchange account—they will stay on your iPad.\n\
    \n    You may end up with some duplicate contacts or calendar events on your iPad\
    \ if the same ones already exist on your Google or Exchange account.\n\n    Select\
    \ **Delete** if you already have these contacts or calendar items in your Exchange\
    \ or Google account and do not want to duplicate them.\n\n13.  Tap **Save** to\
    \ save your settings.\n\n    ![images](images/p157-01.jpg)\n\n14.  You're done\
    \ with the initial setup of your account. You should see your new account listed\
    \ under the **Accounts** heading on the **Mail, Contacts, Calendars** screen.\n\
    \n    ![images](images/p157-02.jpg)"
  trans: "\n## 其他同步方式\n\n在第 3 章“用 iTunes 同步你的 iPad”中，你学习了如何将 iPad 连接到电脑并使用 iTunes\
    \ 同步你的个人信息、音乐、视频等。在本章中，我们将探索一些替代方法，用于将信息无线同步到你的 iPad。无线方式的好处在于，你无需将 iPad 连接到电脑即可更新信息。一切通过无线网络自动完成。我们将涵盖的两种方法是\
    \ Apple 的 MobileMe 服务和 Exchange/Google 同步。\n\n**注**：如果你使用`Gmail`账户设置（而非本章所述的`Exchange`）来设置你的\
    \ Gmail，你将能够无线同步你的电子邮件、日历和备忘录，但不能同步你的 Google 通讯录。因此，如果你不需要同步 Google 通讯录，可以使用`Gmail`设置来代替`Exchange`。\n\
    \n### 无线同步你的 Google、Hotmail 或 Exchange 信息\n\n使用我们在此描述的步骤，你的 iPad 可以通过 Microsoft\
    \ Exchange 账户或 Google 账户无线同步你的电子邮件、通讯录和日历。\n\n**提示**：你现在可以在 iPad 上无线同步多个 Exchange\
    \ 账户。如果你有多个 Google、Hotmail 或 Microsoft Exchange 账户，你可以同时将它们全部无线同步到你的 iPad。\n\n\
    #### 为什么我们说 Google/Exchange？\n\n我们在此交替使用 Google 和 Exchange 这两个词，因为你是在 iPad 上使用`Exchange`设置来配置你的\
    \ Google 同步功能。Google 已获得 Microsoft Exchange ActiveSync 的授权，因此你现在可以像设置 Exchange\
    \ 账户一样设置你的 Google 账户，并享受同样的推送电子邮件、通讯录和日历功能。我们知道这有点令人困惑，但无论是 Google 账户还是 Exchange\
    \ 账户，你都是以完全相同的方式，在 iPad 上使用`Exchange`设置来配置的——所以我们说 Google/Exchange。\n\n从编写原版 iPad\
    \ 图书到编写这本 iPad 2 图书期间，Hotmail 也增加了 ActiveSync 功能，因此我们在本章中加入了关于如何设置 Hotmail 的内容。\n\
    \n#### 如果你需要一个 Google 账户，就创建一个\n\n如果你没有 Microsoft Exchange 账户，但仍希望进行无线同步，那么你应该设置一个免费的\
    \ Google 账户来存储你的通讯录和日历。该账户将允许你开始使用 Google 邮件 (Gmail)、通讯录和日历。\n\n若要设置你的 Google\
    \ 账户，请按照以下步骤操作：\n\n1.  在你的电脑浏览器中（你无法在 iPad 上创建 Gmail 账户）输入：[`www.gmail.com`](http://www.gmail.com)。\n\
    2.  点击**创建账户**按钮。\n\n    ![图片](img/p152-01.jpg)\n\n3.  在下一个屏幕上，输入要求的信息，然后点击页面底部的按钮，该按钮显示**我接受。创建我的账户。**\n\
    4.  如果成功，你将看到一个显示**恭喜！**的屏幕。点击**显示我的账户**按钮以开始使用。\n5.  若要查看你的日历，请点击左上角的**日历**链接（参见图\
    \ 4–1）。\n6.  若要查看你的通讯录，请点击 Gmail 收件箱页面左侧的**通讯录**链接。\n\n![图片](img/0401.jpg)\n\n\
    **图 4–1.** *导航查看你的 Gmail 收件箱、通讯录和日历*\n\n一旦你按照本章所示设置了同步，你就会开始看到来自 Google 的通讯录和日历的所有更改神奇地出现在你的\
    \ iPad 上。同样，你在 iPad 上所做的任何更改或添加内容，也会在片刻之后自动出现在 Google 中。\n\n**提示**：你的 Google 通讯录列表非常容易增长到数千条，因为它会自动包含你曾经用\
    \ Gmail 账户发过邮件的每个人。你可能希望在设置与 iPad 同步之前先清理一下你的通讯录列表。\n\n#### 在你的 iPad 上设置你的 Google、Hotmail\
    \ 或 Exchange 账户\n\n以下步骤向你展示如何为你的 Exchange 账户或你的 Google 通讯录和日历设置无线同步：\n\n1.  触摸\
    \ iPad 上的**设置**图标。\n2.  点击**邮件、通讯录、日历**。\n3.  在右侧列中，你将看到你的电子邮件账户列表，在其下方是**添加账户**选项。\n\
    \n    ![图片](img/p153-01.jpg)\n\n    如果你没有设置任何账户，你将只看到**添加账户**。无论哪种情况，均点击**添加账户**。\n\
    \n4.  在下一个屏幕上，选择**Microsoft Exchange**。\n\n    **注**：如果你想与你的 Google 通讯录和日历进行无线同步，你应该选择\
    \ Microsoft Exchange。如果你选择`Gmail`，你将无法无线同步你的 Google 通讯录，并且备忘录也无法与你的日历同步。\n\n \
    \   ![图片](img/p154-01.jpg)\n\n5.  输入你的电子邮件地址。\n\n    **提示**：要在电子邮件地址中输入 **.com**（或\
    \ `.net`、`.edu`、`.org` 等），请按住句点键，直到看到 **.com** 键出现在其上方。滑动手指并按下 **.com**。\n\n \
    \   ![图片](img/p154-02.jpg)\n\n    ![图片](img/p154-03.jpg)\n\n6.  很多时候，你的电子邮件地址也是你的用户名。如果是这样，复制粘贴比重新输入更容易。要将你的电子邮件地址复制到用户名字段，请按照以下步骤操作：\n\
    \    1.  按住**电子邮件地址**，直到看到黑色弹出窗口出现在其上方。点击**全选**。\n\n        ![图片](img/p154-04.jpg)\n\
    \n    2.  点击**拷贝**。\n\n        ![图片](img/p155-01.jpg)\n\n    3.  在**用户名**字段中双击（你也可以按住），直到看到弹出窗口出现，然后点击**粘贴**。\n\
    \n        ![图片](img/p155-02.jpg)\n\n7.  对于 Gmail，将**域**字段留空。\n\n    对于 Exchange\
    \ 电子邮件，你可能需要输入由你的管理员提供的域名。\n\n    输入你的**密码。**\n\n    如果你愿意，可以调整账户的**描述**，该描述默认为你的电子邮件地址。\n\
    \n    ![图片](img/p155-03.jpg)\n\n8.  点击右上角的**下一步**按钮。\n9.  你可能会看到一个**无法验证证书**屏幕，如下所示。如果看到了，请点击**接受**以继续。\n\
    \n    ![图片](img/p155-04.jpg)\n\n10.  对于 Gmail，在**服务器**字段中输入 `m.google.com`。\n\n\
    \    对于 Hotmail，在**服务器**字段中输入 `m.hotmail.com`。\n\n    对于 Exchange 电子邮件，请输入你的服务器地址。（示例：`mobile.servername.com`）\n\
    \n11.  点击右上角的**下一步**。\n\n    ![图片](img/p156-01.jpg)\n\n12.  在此屏幕上，你可以选择将**邮件**、**通讯录**和**日历**的无线同步**开启**或**关闭**。对于你想要开启的每个同步，点击开关将其更改为**开启**。\n\
    \n    ![图片](img/p156-02.jpg)\n\n    ![图片](img/p156-03.jpg)\n\n    **注**：如果你的 iPad\
    \ 上已有通讯录或日历项目，在点击通讯录和日历旁边的**是**之后，你可能会看到警告弹出消息。\n\n    你的选择是**保留在 iPad 上**或**删除**。如果你选择**取消**，则会停止设置你的\
    \ Exchange 账户。\n\n    选择**保留在 iPad 上**以保留 iPad 上所有现有的通讯录和日历事件。这些项目不会出现在你的 Google\
    \ 或 Exchange 账户中——它们将保留在你的 iPad 上。\n\n    如果你的 Google 或 Exchange 账户中已存在相同的通讯录或日历事件，你的\
    \ iPad 上最终可能会出现一些重复的通讯录或日历事件。\n\n    如果你已经在你的 Exchange 或 Google 账户中有这些通讯录或日历项目，并且不希望重复，请选择**删除**。\n\
    \n13.  点击**存储**以保存你的设置。\n\n    ![图片](img/p157-01.jpg)\n\n14.  你已完成账户的初始设置。你应该会在**邮件、通讯录、日历**屏幕上的**账户**标题下看到你的新账户被列出。\n\
    \n    ![图片](img/p157-02.jpg)\n"
- fmt: "#### Edit or Delete Your Google, Hotmail, or Exchange Account\n\nAfter you\
    \ set up your Google, Hotmail, or Exchange account on your iPad, you may want\
    \ to adjust some of the default settings, such as which mail folders are synced\
    \ (only the inbox by default), number of days of mail to sync (default is three\
    \ days), and other settings. You would also use the steps shown here to remove\
    \ or delete the account.\n\n1.  Get into your Mail settings screen as you did\
    \ when you first set up your account (tap the `Settings` icon, tap `Mail, Contacts,\
    \ Calendars`).\n2.  Tap the mail account you wish to adjust or remove.\n\n   \
    \ ![images](images/p157-03.jpg)\n\n3.  In order to change your account username,\
    \ account name, or password, tap `Account` at the top. You will see the information\
    \ you saw when you first set up this account.\n4.  If you want to remove this\
    \ account from your iPad, tap `Delete Account` at the bottom and confirm your\
    \ selection.\n\n    ![images](images/p158-01.jpg)\n\n5.  To enable or disable\
    \ wireless syncing for `Mail`, `Contacts`, and `Calendar` items, tap the switches\
    \ to set them `On` or `Off`.\n\n    **NOTE**: If you set any switch to Off for\
    \ these items, they will all be deleted from your iPad. For example, all synced\
    \ contacts would immediately be deleted from your `Contacts` app.\n\n6.  To adjust\
    \ how much mail is synced to your iPad, tap `Mail Days to Sync` and adjust to\
    \ suit your needs (you can go from `1 Day` to `No Limit`, with 3 Days as the default).\n\
    \n    Tap the button with your `Email Account Name` in the upper left corner to\
    \ save your choices and return to the previous screen.\n\n    ![images](images/p158-02.jpg)\n\
    \n7.  `Tap Mail Folders to Push to` specify which mail folders should sync to\
    \ your iPad.\n\n    The default is just the `Inbox`, but you can tap to select\
    \ any number of folders. (Each selected folder is shown with a check mark.)\n\n\
    \    **TIP**: You can only move mail between these folders on your iPad if you\
    \ have selected them here to sync.\n\n    ![images](images/p159-01.jpg)\n\n8.\
    \  Tap the `Email Account Name` in the upper left corner to save your choices\
    \ and return to the previous screen.\n9.  Then tap the `Done` button in the upper\
    \ right corner to finish with this account and return to your `Settings`.\n10.\
    \  Press the `Home` button to return to the `Home` screen.\n\n    ![images](images/p159-02.jpg)\n\
    \n#### Working with Wirelessly Synced Data on Your iPad\n\nOnce you set up the\
    \ wireless sync, your Contacts and Calendar information will flow quickly into\
    \ your iPad. If you have thousands of contacts, it could take several minutes\
    \ for the first sync to complete.\n\nYou may want to jump ahead and review [Chapter\
    \ 14](#Chapter14.html#ch14): “Working with Contacts” and [Chapter 15](#Chapter15.html#ch15):\
    \ “Your Calendar” for details about working with both apps.\n\n**NOTE**: Since\
    \ the sync with Google or Exchange is wireless, you'll need to make sure you have\
    \ an active network connection from your iPad. Check out [Chapter 5](#Chapter05.html#ch5):\
    \ “Wi-Fi and 3G Connectivity” to learn more.\n\n##### New Group for Google/Exchange\
    \ Contacts\n\nFor each Google/Exchange account you add to your iPad, you will\
    \ end up with a separate group in your `Contacts` app. If you've added some contacts\
    \ to your iPad or synced it at least once with iTunes, you may end up with additional\
    \ groups of contacts (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\n![images](images/0402.jpg)\n\
    \n**Figure 4–2.** *You may see various groups in your Contacts.*\n\nThe default\
    \ view in your `Contacts` list is to see all contacts from all synced accounts.\
    \ You can selectively view contacts from various accounts. To view your Google\
    \ or Exchange contacts, follow these steps:\n\n1.  Tap the `Contacts` icon.\n\
    2.  Tap the `Groups` tab in the upper left corner.\n3.  If you've added new contacts\
    \ or synced your address book, you'll see a `From My PC` or `From My Mac` group\
    \ at the top. Under that you will see your Google or Exchange email address or\
    \ the descriptive name assigned to that account when you set it up. `Exchange\
    \ - Gmail` and `Exchange` are the two Google/Exchange accounts synced in our example\
    \ (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n4.  Tap the `Contacts` listed\
    \ under your Google or Exchange email address/account name to see all your synced\
    \ contacts.\n\n##### Working with Contacts\n\nTo add, edit, or delete contacts\
    \ in your Google or Exchange contacts group, do the following:\n\n1.  Follow the\
    \ steps to view your Google or Exchange contacts group.\n2.  **To add a contact**:\
    \ Tap the `+` button in the upper right corner of the `Contacts` list view. Add\
    \ contact details (covered in [Chapter 14](#Chapter14.html#ch14): “Working with\
    \ Contacts.”) Touch `Done` in the upper right corner.\n3.  **To edit a contact**:\
    \ Locate the contact in the list and tap the `Edit` button at the bottom under\
    \ the contact details. Make any changes and press the `Done` button.\n4.  **To\
    \ delete a contact**: Locate the contact you want to remove. Tap the `Edit` button\
    \ under the contact details. Scroll to the bottom of the details and tap the `Delete\
    \ Contact` button.\n5.  **To search for a contact on your iPad**:\n    1.  If\
    \ you don't see the `Search` window at the top, drag your finger all the way up\
    \ the right-side alphabet to the top.\n    2.  Tap in the `Search` window and\
    \ type a few letters of someone's first name, last name, or company name to find\
    \ them.\n    3.  Your `Contacts` list will immediately be filtered by what you\
    \ type. If you see the name you want, tap it. Otherwise, tap the `Search` button\
    \ in the lower right corner.\n6.  **To perform a global address list search:**\n\
    \    1.  Tap the `Groups` tab in the upper left corner (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\
    \    2.  Tap the second button under the Google/Exchange contacts group, the `Global\
    \ Address List` search button. If your email address is long, then you will see\
    \ only your email address on this button; however, if you have a short email address\
    \ or have provided a short descriptive name, then you will see something like\
    \ `Exchange - Global Address List` (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\
    \    3.  Tap in the `Search` window and type a few letters of someone's first\
    \ name, last name, or company name to find them.\n    4.  Press the `Search` button\
    \ to start searching.\n\nThe great thing is that any changes you make to your\
    \ Google or Exchange contacts on your iPad are wirelessly communicated and appear\
    \ in your Google or Exchange account in just a few seconds.\n\n**NOTE**: To add,\
    \ edit, or delete contacts in your other group (not the Google or Exchange group),\
    \ first go to that group (`From My PC` or `From My Mac`), then make the changes\
    \ you want. These additions, edits, or deletions will not affect your Google or\
    \ Exchange contacts—they are kept separate.\n\n##### Working with the Calendar\n\
    \nAfter you set up the sync with the Google or Exchange calendar on your iPad,\
    \ all the calendar events will appear on your iPad—no wires or sync cable required.\
    \ You will also be able to invite people to meetings and respond to meeting invitations.\n\
    \nAny event you change or update on your iPad will be wirelessly synced with Google\
    \ or Exchange.\n\n###### Each Calendar Has a Different Color\n\n| You will also\
    \ notice that every new Google or Exchange account you add to your iPad will create\
    \ a separate calendar with a new color.To see the color used for each calendar,\
    \ tap the `Calendars` button in the upper left corner.On this screen you can see\
    \ the color for each calendar.You can selectively show calendars by tapping on\
    \ the `email address`.To hide a calendar, tap the `email address` to remove the\
    \ checkmark.To show a calendar, tap the `email address` to add the checkmark.\
    \ | ![images](images/p162-01.jpg) |"
  raw: "#### Edit or Delete Your Google, Hotmail, or Exchange Account\n\nAfter you\
    \ set up your Google, Hotmail, or Exchange account on your iPad, you may want\
    \ to adjust some of the default settings, such as which mail folders are synced\
    \ (only the inbox by default), number of days of mail to sync (default is three\
    \ days), and other settings. You would also use the steps shown here to remove\
    \ or delete the account.\n\n1.  Get into your Mail settings screen as you did\
    \ when you first set up your account (tap the **Settings** icon, tap **Mail, Contacts,\
    \ Calendars**).\n2.  Tap the mail account you wish to adjust or remove.\n\n  \
    \  ![images](images/p157-03.jpg)\n\n3.  In order to change your account username,\
    \ account name, or password, tap **Account** at the top. You will see the information\
    \ you saw when you first set up this account.\n4.  If you want to remove this\
    \ account from your iPad, tap **Delete Account** at the bottom and confirm your\
    \ selection.\n\n    ![images](images/p158-01.jpg)\n\n5.  To enable or disable\
    \ wireless syncing for **Mail**, **Contacts**, and **Calendar** items, tap the\
    \ switches to set them **On** or **Off**.\n\n    **NOTE**: If you set any switch\
    \ to Off for these items, they will all be deleted from your iPad. For example,\
    \ all synced contacts would immediately be deleted from your **Contacts** app.\n\
    \n6.  To adjust how much mail is synced to your iPad, tap **Mail Days to Sync**\
    \ and adjust to suit your needs (you can go from **1 Day** to **No Limit**, with\
    \ 3 Days as the default).\n\n    Tap the button with your **Email Account** **Name**\
    \ in the upper left corner to save your choices and return to the previous screen.\n\
    \n    ![images](images/p158-02.jpg)\n\n7.  **Tap Mail Folders to Push to** specify\
    \ which mail folders should sync to your iPad.\n\n    The default is just the\
    \ **Inbox**, but you can tap to select any number of folders. (Each selected folder\
    \ is shown with a check mark.)\n\n    **TIP**: You can only move mail between\
    \ these folders on your iPad if you have selected them here to sync.\n\n    ![images](images/p159-01.jpg)\n\
    \n8.  Tap the **Email Account Name** in the upper left corner to save your choices\
    \ and return to the previous screen.\n9.  Then tap the **Done** button in the\
    \ upper right corner to finish with this account and return to your **Settings**.\n\
    10.  Press the **Home** button to return to the **Home** screen.\n\n    ![images](images/p159-02.jpg)\n\
    \n#### Working with Wirelessly Synced Data on Your iPad\n\nOnce you set up the\
    \ wireless sync, your Contacts and Calendar information will flow quickly into\
    \ your iPad. If you have thousands of contacts, it could take several minutes\
    \ for the first sync to complete.\n\nYou may want to jump ahead and review [Chapter\
    \ 14](#Chapter14.html#ch14): “Working with Contacts” and [Chapter 15](#Chapter15.html#ch15):\
    \ “Your Calendar” for details about working with both apps.\n\n**NOTE**: Since\
    \ the sync with Google or Exchange is wireless, you'll need to make sure you have\
    \ an active network connection from your iPad. Check out [Chapter 5](#Chapter05.html#ch5):\
    \ “Wi-Fi and 3G Connectivity” to learn more.\n\n##### New Group for Google/Exchange\
    \ Contacts\n\nFor each Google/Exchange account you add to your iPad, you will\
    \ end up with a separate group in your **Contacts** app. If you've added some\
    \ contacts to your iPad or synced it at least once with iTunes, you may end up\
    \ with additional groups of contacts (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\
    \n![images](images/0402.jpg)\n\n**Figure 4–2.** *You may see various groups in\
    \ your Contacts.*\n\nThe default view in your **Contacts** list is to see all\
    \ contacts from all synced accounts. You can selectively view contacts from various\
    \ accounts. To view your Google or Exchange contacts, follow these steps:\n\n\
    1.  Tap the **Contacts** icon.\n2.  Tap the **Groups** tab in the upper left corner.\n\
    3.  If you've added new contacts or synced your address book, you'll see a **From\
    \ My PC** or **From My Mac** group at the top. Under that you will see your Google\
    \ or Exchange email address or the descriptive name assigned to that account when\
    \ you set it up. **Exchange - Gmail** and **Exchange** are the two Google/Exchange\
    \ accounts synced in our example (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\
    4.  Tap the **Contacts** listed under your Google or Exchange email address/account\
    \ name to see all your synced contacts.\n\n##### Working with Contacts\n\nTo add,\
    \ edit, or delete contacts in your Google or Exchange contacts group, do the following:\n\
    \n1.  Follow the steps to view your Google or Exchange contacts group.\n2.  **To\
    \ add a contact**: Tap the **+** button in the upper right corner of the **Contacts**\
    \ list view. Add contact details (covered in [Chapter 14](#Chapter14.html#ch14):\
    \ “Working with Contacts.”) Touch **Done** in the upper right corner.\n3.  **To\
    \ edit a contact**: Locate the contact in the list and tap the **Edit** button\
    \ at the bottom under the contact details. Make any changes and press the **Done**\
    \ button.\n4.  **To delete a contact**: Locate the contact you want to remove.\
    \ Tap the **Edit** button under the contact details. Scroll to the bottom of the\
    \ details and tap the **Delete Contact** button.\n5.  **To search for a contact\
    \ on your iPad**:\n    1.  If you don't see the **Search** window at the top,\
    \ drag your finger all the way up the right-side alphabet to the top.\n    2.\
    \  Tap in the **Search** window and type a few letters of someone's first name,\
    \ last name, or company name to find them.\n    3.  Your **Contacts** list will\
    \ immediately be filtered by what you type. If you see the name you want, tap\
    \ it. Otherwise, tap the **Search** button in the lower right corner.\n6.  **To\
    \ perform a global address list search:**\n    1.  Tap the **Groups** tab in the\
    \ upper left corner (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n    2.  Tap\
    \ the second button under the Google/Exchange contacts group, the **Global Address\
    \ List** search button. If your email address is long, then you will see only\
    \ your email address on this button; however, if you have a short email address\
    \ or have provided a short descriptive name, then you will see something like\
    \ **Exchange - Global Address List** (see [Figure 4–2](#Chapter04.html#fig_4_2)).\n\
    \    3.  Tap in the **Search** window and type a few letters of someone's first\
    \ name, last name, or company name to find them.\n    4.  Press the **Search**\
    \ button to start searching.\n\nThe great thing is that any changes you make to\
    \ your Google or Exchange contacts on your iPad are wirelessly communicated and\
    \ appear in your Google or Exchange account in just a few seconds.\n\n**NOTE**:\
    \ To add, edit, or delete contacts in your other group (not the Google or Exchange\
    \ group), first go to that group (**From My PC** or **From My Mac**), then make\
    \ the changes you want. These additions, edits, or deletions will not affect your\
    \ Google or Exchange contacts—they are kept separate.\n\n##### Working with the\
    \ Calendar\n\nAfter you set up the sync with the Google or Exchange calendar on\
    \ your iPad, all the calendar events will appear on your iPad—no wires or sync\
    \ cable required. You will also be able to invite people to meetings and respond\
    \ to meeting invitations.\n\nAny event you change or update on your iPad will\
    \ be wirelessly synced with Google or Exchange.\n\n###### Each Calendar Has a\
    \ Different Color\n\n| You will also notice that every new Google or Exchange\
    \ account you add to your iPad will create a separate calendar with a new color.To\
    \ see the color used for each calendar, tap the **Calendars** button in the upper\
    \ left corner.On this screen you can see the color for each calendar.You can selectively\
    \ show calendars by tapping on the **email address**.To hide a calendar, tap the\
    \ **email address** to remove the checkmark.To show a calendar, tap the **email\
    \ address** to add the checkmark. | ![images](images/p162-01.jpg) |"
  trans: "\n#### 编辑或删除您的 Google、Hotmail 或 Exchange 账户\n\n在 iPad 上设置好 Google、Hotmail\
    \ 或 Exchange 账户后，您可能需要调整一些默认设置，例如同步哪些邮件文件夹（默认仅同步收件箱）、同步多少天内的邮件（默认为三天）以及其他设置。您也可以按照此处所示的步骤来移除或删除该账户。\n\
    \n1.  进入邮件设置界面，就像首次设置账户时那样（轻点`设置`图标，轻点`邮件、通讯录、日历`）。\n2.  轻点您想要调整或移除的邮件账户。\n\n\
    \    ![images](img/p157-03.jpg)\n\n3.  若要更改您的账户用户名、账户名称或密码，请轻点顶部的`账户`。您将看到首次设置此账户时所看到的信息。\n\
    4.  若要从 iPad 上移除该账户，请轻点底部的`删除账户`并确认您的选择。\n\n    ![images](img/p158-01.jpg)\n\n\
    5.  若要启用或禁用`邮件`、`通讯录`和`日历`项目的无线同步，请将对应的开关设为`开`或`关`。\n\n    **注意**：如果将这些项目中的任一开关设为“关”，它们都将从您的\
    \ iPad 中删除。例如，所有已同步的通讯录联系人会立即从您的`通讯录`应用中删除。\n\n6.  若要调整同步到 iPad 上的邮件数量，请轻点`邮件同步天数`并根据需求进行调整（您可以选择从`1\
    \ 天`到`无限制`，默认设置为 3 天）。\n\n    轻点左上角的`电子邮件账户名称`按钮，以保存您的选择并返回上一屏幕。\n\n    ![images](img/p158-02.jpg)\n\
    \n7.  `轻点要推送的邮件文件夹`，以指定哪些邮件文件夹应同步到您的 iPad。\n\n    默认情况下仅同步`收件箱`，但您可以轻点选择任意数量的文件夹。（每个选中的文件夹会显示一个勾选标记。）\n\
    \n    **提示**：只有当您在此处选择了要同步的文件夹后，您才能在 iPad 上在这些文件夹之间移动邮件。\n\n    ![images](img/p159-01.jpg)\n\
    \n8.  轻点左上角的`电子邮件账户名称`，以保存您的选择并返回上一屏幕。\n9.  然后轻点右上角的`完成`按钮，以完成此账户的设置并返回`设置`。\n\
    10. 按下`主屏幕`按钮，返回到`主屏幕`。\n\n    ![images](img/p159-02.jpg)\n\n#### 在 iPad 上使用无线同步的数据\n\
    \n设置好无线同步后，您的通讯录和日历信息将迅速流入您的 iPad。如果您有成千上万的联系人，首次同步完成可能需要几分钟。\n\n您可能想先查阅一下第 14\
    \ 章：“使用通讯录”以及第 15 章：“您的日历”，以了解使用这两个应用的详细信息。\n\n**注意**：由于与 Google 或 Exchange 的同步是无线进行的，您需要确保\
    \ iPad 拥有有效的网络连接。请查看第 5 章：“Wi-Fi 与 3G 连接”了解更多信息。\n\n##### 用于 Google/Exchange 联系人新添加的分组\n\
    \n您添加到 iPad 的每个 Google/Exchange 账户，最终都会在您的`通讯录`应用中形成一个独立的分组。如果您已将某些联系人添加到 iPad，或至少已通过\
    \ iTunes 同步过一次，那么您可能最终会获得额外的联系人分组（参见图 4–2）。\n\n![images](img/0402.jpg)\n\n**图\
    \ 4–2.** *您可能会在通讯录中看到不同的分组。*\n\n`通讯录`列表的默认视图是显示所有已同步账户中的所有联系人。您可以有选择地查看来自不同账户的联系人。要查看您的\
    \ Google 或 Exchange 联系人，请按以下步骤操作：\n\n1.  轻点`通讯录`图标。\n2.  轻点左上角的`分组`标签。\n3.  如果您添加了新联系人，或同步了您的通讯录，您会在顶部看到一个`来自我的\
    \ PC`或`来自我的 Mac` 分组。在它下面，您会看到您的 Google 或 Exchange 电子邮件地址，或者设置该账户时为其分配的描述性名称。在我们的示例中，`Exchange\
    \ - Gmail` 和 `Exchange` 是两个已同步的 Google/Exchange 账户（参见图 4–2）。\n4.  轻点列在您的 Google\
    \ 或 Exchange 电子邮件地址/账户名称下的`通讯录`，以查看所有已同步的联系人。\n\n##### 使用通讯录\n\n要在您的 Google 或\
    \ Exchange 联系人分组中添加、编辑或删除联系人，请执行以下操作：\n\n1.  按照步骤查看您的 Google 或 Exchange 联系人分组。\n\
    2.  **添加联系人**：轻点`通讯录`列表视图右上角的`+`按钮。添加联系人详细信息（详见第 14 章：“使用通讯录”）。然后轻点右上角的`完成`。\n\
    3.  **编辑联系人**：在列表中找到该联系人，并轻点联系人详细信息底部的`编辑`按钮。进行任何更改，然后轻点`完成`按钮。\n4.  **删除联系人**：找到您想要移除的联系人。轻点联系人详细信息下的`编辑`按钮。滚动到详细信息底部，然后轻点`删除联系人`按钮。\n\
    5.  **在 iPad 上搜索联系人**：\n    1.  如果您没有看到顶部的`搜索`窗口，请用手指沿着右侧的字母索引一直拖到顶部。\n    2.\
    \  轻点`搜索`窗口，输入某人名字、姓氏或公司名称的几个字母来查找他们。\n    3.  您的`通讯录`列表将立即根据您输入的内容进行过滤。如果您看到了想要的名字，请轻点它。否则，轻点右下角的`搜索`按钮。\n\
    6.  **执行全局地址列表搜索**：\n    1.  轻点左上角的`分组`标签（参见图 4–2）。\n    2.  轻点 Google/Exchange\
    \ 联系人分组下的第二个按钮，即`全局地址列表`搜索按钮。如果您的电子邮件地址很长，那么此按钮上只会显示您的电子邮件地址；但是，如果您有一个简短的电子邮件地址或提供了一个简短的描述性名称，那么您会看到类似`Exchange\
    \ - 全局地址列表`的内容（参见图 4–2）。\n    3.  轻点`搜索`窗口，输入某人名字、姓氏或公司名称的几个字母来查找他们。\n    4. \
    \ 按下`搜索`按钮开始搜索。\n\n最棒的是，您在 iPad 上对 Google 或 Exchange 联系人所做的任何更改都会在几秒钟内通过无线方式同步，并出现在您的\
    \ Google 或 Exchange 账户中。\n\n**注意**：要在其他分组（非 Google 或 Exchange 分组）中添加、编辑或删除联系人，请先转到该分组（`来自我的\
    \ PC` 或 `来自我的 Mac`），然后进行所需的更改。这些添加、编辑或删除操作不会影响您的 Google 或 Exchange 联系人——它们彼此独立。\n\
    \n##### 使用日历\n\n在 iPad 上设置与 Google 或 Exchange 日历的同步后，所有日历事件都会出现在您的 iPad 上——无需有线连线或同步线缆。您还可以邀请他人参加会议并回复会议邀请。\n\
    \n您在 iPad 上更改或更新的任何事件都将与 Google 或 Exchange 进行无线同步。\n\n###### 每个日历都有不同的颜色\n\n|\
    \ 您还会注意到，添加到 iPad 的每个新的 Google 或 Exchange 账户都会创建一个带有新颜色的独立日历。要查看每个日历使用的颜色，请轻点左上角的`日历`按钮。在此屏幕上，您可以看到每个日历的颜色。您可以通过轻点`电子邮件地址`有选择地显示日历。要隐藏一个日历，请轻点`电子邮件地址`以取消勾选标记。要显示一个日历，请轻点`电子邮件地址`以添加勾选标记。\
    \ | ![images](img/p162-01.jpg) |\n"
- fmt: "###### Invite People to Meetings from Your iPad\n\nNow you can invite people\
    \ to your calendar events. Here are the steps to follow:\n\n1.  Tap your `Calendar`\
    \ icon to start your calendar.\n2.  Touch the `+` button in the lower right corner\
    \ to schedule a new event.\n3.  On the `Add Event` screen, enter the meeting title\
    \ and location and adjust the starting and ending time as required.\n4.  Tap the\
    \ `Invitees` tab to invite people (see [Figure 4–3](#Chapter04.html#fig_4_3).)\n\
    5.  In order to invite someone, you have a few options.\n    1.  Type his or her\
    \ `email address` (all invitations are sent via email).\n    2.  Type a few letters\
    \ of his or her first and last name separated by a space to instantly locate the\
    \ person if he or she is in your contact list.\n    3.  Or, tap the `blue plus\
    \ sign` to find someone by browsing your contact list.\n6.  Touch the `name` and\
    \ `email address` you want to use. If someone has more than one email address,\
    \ you'll need to select one.\n7.  Add more invitees if you desire, then tap `Done`\
    \ to exit the `Add Invitees` window.\n8.  Adjust any other items in the `Add Event`\
    \ screen and tap `Done` to save.\n9.  The meeting invitation(s) will be sent via\
    \ email immediately to everyone you invited.\n\n![images](images/0403.jpg)\n\n\
    **Figure 4–3.** *How to invite people to meetings.*\n\n###### Seeing the Status\
    \ of Invitees on Your Calendar\n\n| You can see who has accepted, rejected, or\
    \ not replied your invitations by viewing the status of the invitations in the\
    \ left column of your Calendar.You will see the status of each person's reply\
    \ shown next to their status. The various status indicators you will see are:\
    \ \n*   `No reply`\n*   `Accepted`\n*   `Maybe`\n*   `Declined`\n\n | ![images](images/p164-01.jpg)\
    \ |\n\n###### Responding to Exchange Meeting Invitations from Your iPad\n\n| When\
    \ you are connected to an Exchange email server and the person who invited you\
    \ to a meeting is also on the same Exchange server, you will be able to use the\
    \ `Invitations` inbox inside your Calendar app.You will receive notifications\
    \ on your `Calendar` icon, shown here. In this image, there are four new meeting\
    \ invitations. | ![images](images/p164-02.jpg) |\n\nFollow these steps to work\
    \ with Exchange meeting invitations in your Calendar invitations inbox. You will\
    \ also receive an alert pop-up on the iPad screen similar to the one shown in\
    \ [Figure 4–4](#Chapter04.html#fig_4_4). If you are ready to respond immediately\
    \ to the meeting, tap `View` from the pop-up alert.\n\n![images](images/0404.jpg)\n\
    \n**Figure 4–4.** *Reply to meeting invitations from the pop-up alert window*\n\
    \nIf you want to reply later, simply tap `Close` from the alert. Then you can\
    \ use the `Invitations` inbox in your `Calendar` to reply.\n\n1.  Start your `Calendar`\
    \ app.\n2.  Tap the `Invitations` inbox button in the upper left corner of the\
    \ `Calendar` screen (see [Figure 4–5](#Chapter04.html#fig_4_5)).\n3.  If you only\
    \ have one invitation, it will open. If you have multiple invitations, you will\
    \ see all your invitations listed. Tap the invitation to which you wish to respond.\n\
    4.  To respond to the invitation, tap one of the three buttons at the bottom of\
    \ the Event screen: `Accept`, `Maybe`, or `Decline`.\n5.  If you select `Accept`\
    \ or `Maybe`, the calendar event is added to your iPad calendar and the response\
    \ is sent immediately via email to the meeting organizer. You're done.\n\n![images](images/0405.jpg)\n\
    \n**Figure 4–5.** *Replying to Exchange meeting invitations using the calendar\
    \ Invitations inbox*\n\n###### Responding to Google or Hotmail Meeting Invitations\
    \ from Your iPad\n\nIf you are using Google or Hotmail Calendar with Exchange\
    \ sync, you will be able to reply to meeting invitations in the `Mail` app on\
    \ your iPad.\n\n1.  Tap your `Mail` icon to start the program.\n2.  Navigate to\
    \ the `Inbox`, which has the meeting invitation.\n3.  Locate the invitation.\n\
    \n    Most invitations look something like the image shown here. Usually they\
    \ start with the word `Invitation`.\n\n    ![images](images/p166-01.jpg)\n\n \
    \   **TIP**: To quickly find all meeting invitations in your inbox, type the word\
    \ `meet` or `invitation` in the search box. Tap the `Subject` button to search\
    \ only the message subjects.\n\n4.  Tap the `Meeting Invitation` to open it.\n\
    5.  Tap `Yes`, `Maybe`, or `No` next to `Going?` to reply to the invitation.\n\
    6.  As soon as you tap one of the choices, your reply will be sent. You may be\
    \ shown a Google or Hotmail Calendar web page to type optional details in your\
    \ invitation reply.\n\n    ![images](images/p167-01.jpg)\n\n### Wireless Sync\
    \ Using the MobileMe Service\n\nAnother option if you do not use Google or Exchange\
    \ and still want to wirelessly sync your information is to use the MobileMe service\
    \ from Apple. The MobileMe service provides a great service to wirelessly sync\
    \ your personal information between your computer (PC or Mac) and your iPad and\
    \ other mobile devices, such as an iPad.\n\n**The MobileMe Cloud**: The MobileMe\
    \ service uses what is sometimes called a cloud to sync all your information.\
    \ The MobileMe Cloud is a term used to describe the web servers where all your\
    \ MobileMe information is stored on the Internet. The servers and the associated\
    \ software you install on your computer (PC or Mac) and your mobile devices (iPhone,\
    \ iPad, etc.) help keep all your mobile devices in sync with your computer. The\
    \ idea is that changed information (a new calendar event, a new contact name)\
    \ gets sent from your iPad to the cloud. Then the cloud disperses the changed\
    \ information to all the devices in your MobileMe account, such as your computer,\
    \ iPhone, or iPad.\n\nOnce you set up MobileMe from your computer and then set\
    \ up access from your iPad, all your personal information (contacts, calendar,\
    \ even bookmarks) will be shared wirelessly between your computer and your iPad.\n\
    \nIn addition to the wireless sync of personal information, MobileMe lets you\
    \ do the following:\n\n*   Create a web-based photo gallery that you can access\
    \ and add to from your iPad.\n*   Create an `iDisk` that allows you to share documents\
    \ easily between your iPad and your computer. You can also use it to share files\
    \ that are too large to email (some email systems block files larger than about\
    \ 5MB).\n*   Find your lost iPad using the `Find My iPad` feature (described in\
    \ [Chapter 1](#Chapter01.html#ch1): \"Getting Started\").\n*   Erase all of the\
    \ personal data on your lost iPad remotely using the `Remote Wipe` feature.\n\
    *   If you have multiple Macs in your home or business, MobileMe also allows you\
    \ to sync `docks`, `settings`, `passwords`, and `other information` between your\
    \ Macs, and use `Back to my Mac` remote desktop to retrieve files or share screens.\n\
    \n**NOTE**: As of publishing time, after your 60-day free trial, Apple charges\
    \ $99/year for individual MobileMe service and $149/year for a family plan.\n\n\
    However, also at publishing time, there was a rumor floating around the web that\
    \ Apple may make MobileMe a free service. Check with the MobileMe web site (`www.mobileme.com`)\
    \ to find out the latest information."
  raw: "###### Invite People to Meetings from Your iPad\n\nNow you can invite people\
    \ to your calendar events. Here are the steps to follow:\n\n1.  Tap your **Calendar**\
    \ icon to start your calendar.\n2.  Touch the **+** button in the lower right\
    \ corner to schedule a new event.\n3.  On the **Add Event** screen, enter the\
    \ meeting title and location and adjust the starting and ending time as required.\n\
    4.  Tap the **Invitees** tab to invite people (see [Figure 4–3](#Chapter04.html#fig_4_3).)\n\
    5.  In order to invite someone, you have a few options.\n    1.  Type his or her\
    \ **email address** (all invitations are sent via email).\n    2.  Type a few\
    \ letters of his or her first and last name separated by a space to instantly\
    \ locate the person if he or she is in your contact list.\n    3.  Or, tap the\
    \ **blue plus sign** to find someone by browsing your contact list.\n6.  Touch\
    \ the **name** and **email address** you want to use. If someone has more than\
    \ one email address, you'll need to select one.\n7.  Add more invitees if you\
    \ desire, then tap **Done** to exit the **Add Invitees** window.\n8.  Adjust any\
    \ other items in the **Add Event** screen and tap **Done** to save.\n9.  The meeting\
    \ invitation(s) will be sent via email immediately to everyone you invited.\n\n\
    ![images](images/0403.jpg)\n\n**Figure 4–3.** *How to invite people to meetings.*\n\
    \n###### Seeing the Status of Invitees on Your Calendar\n\n| You can see who has\
    \ accepted, rejected, or not replied your invitations by viewing the status of\
    \ the invitations in the left column of your Calendar.You will see the status\
    \ of each person's reply shown next to their status. The various status indicators\
    \ you will see are: \n*   **No reply**\n*   **Accepted**\n*   **Maybe**\n*   **Declined**\n\
    \n | ![images](images/p164-01.jpg) |\n\n###### Responding to Exchange Meeting\
    \ Invitations from Your iPad\n\n| When you are connected to an Exchange email\
    \ server and the person who invited you to a meeting is also on the same Exchange\
    \ server, you will be able to use the **Invitations** inbox inside your Calendar\
    \ app.You will receive notifications on your **Calendar** icon, shown here. In\
    \ this image, there are four new meeting invitations. | ![images](images/p164-02.jpg)\
    \ |\n\nFollow these steps to work with Exchange meeting invitations in your Calendar\
    \ invitations inbox. You will also receive an alert pop-up on the iPad screen\
    \ similar to the one shown in [Figure 4–4](#Chapter04.html#fig_4_4). If you are\
    \ ready to respond immediately to the meeting, tap **View** from the pop-up alert.\n\
    \n![images](images/0404.jpg)\n\n**Figure 4–4.** *Reply to meeting invitations\
    \ from the pop-up alert window*\n\nIf you want to reply later, simply tap **Close**\
    \ from the alert. Then you can use the **Invitations** inbox in your **Calendar**\
    \ to reply.\n\n1.  Start your **Calendar** app.\n2.  Tap the **Invitations** inbox\
    \ button in the upper left corner of the **Calendar** screen (see [Figure 4–5](#Chapter04.html#fig_4_5)).\n\
    3.  If you only have one invitation, it will open. If you have multiple invitations,\
    \ you will see all your invitations listed. Tap the invitation to which you wish\
    \ to respond.\n4.  To respond to the invitation, tap one of the three buttons\
    \ at the bottom of the Event screen: **Accept**, **Maybe**, or **Decline.**\n\
    5.  If you select **Accept** or **Maybe**, the calendar event is added to your\
    \ iPad calendar and the response is sent immediately via email to the meeting\
    \ organizer. You're done.\n\n![images](images/0405.jpg)\n\n**Figure 4–5.** *Replying\
    \ to Exchange meeting invitations using the calendar Invitations inbox*\n\n######\
    \ Responding to Google or Hotmail Meeting Invitations from Your iPad\n\nIf you\
    \ are using Google or Hotmail Calendar with Exchange sync, you will be able to\
    \ reply to meeting invitations in the **Mail** app on your iPad.\n\n1.  Tap your\
    \ **Mail** icon to start the program.\n2.  Navigate to the **Inbox**, which has\
    \ the meeting invitation.\n3.  Locate the invitation.\n\n    Most invitations\
    \ look something like the image shown here. Usually they start with the word **Invitation**.\n\
    \n    ![images](images/p166-01.jpg)\n\n    **TIP**: To quickly find all meeting\
    \ invitations in your inbox, type the word **meet** or **invitation** in the search\
    \ box. Tap the **Subject** button to search only the message subjects.\n\n4. \
    \ Tap the **Meeting Invitation** to open it.\n5.  Tap **Yes**, **Maybe**, or **No**\
    \ next to **Going?** to reply to the invitation.\n6.  As soon as you tap one of\
    \ the choices, your reply will be sent. You may be shown a Google or Hotmail Calendar\
    \ web page to type optional details in your invitation reply.\n\n    ![images](images/p167-01.jpg)\n\
    \n### Wireless Sync Using the MobileMe Service\n\nAnother option if you do not\
    \ use Google or Exchange and still want to wirelessly sync your information is\
    \ to use the MobileMe service from Apple. The MobileMe service provides a great\
    \ service to wirelessly sync your personal information between your computer (PC\
    \ or Mac) and your iPad and other mobile devices, such as an iPad.\n\n**The MobileMe\
    \ Cloud**: The MobileMe service uses what is sometimes called a cloud to sync\
    \ all your information. The MobileMe Cloud is a term used to describe the web\
    \ servers where all your MobileMe information is stored on the Internet. The servers\
    \ and the associated software you install on your computer (PC or Mac) and your\
    \ mobile devices (iPhone, iPad, etc.) help keep all your mobile devices in sync\
    \ with your computer. The idea is that changed information (a new calendar event,\
    \ a new contact name) gets sent from your iPad to the cloud. Then the cloud disperses\
    \ the changed information to all the devices in your MobileMe account, such as\
    \ your computer, iPhone, or iPad.\n\nOnce you set up MobileMe from your computer\
    \ and then set up access from your iPad, all your personal information (contacts,\
    \ calendar, even bookmarks) will be shared wirelessly between your computer and\
    \ your iPad.\n\nIn addition to the wireless sync of personal information, MobileMe\
    \ lets you do the following:\n\n*   Create a web-based photo gallery that you\
    \ can access and add to from your iPad.\n*   Create an **iDisk** that allows you\
    \ to share documents easily between your iPad and your computer. You can also\
    \ use it to share files that are too large to email (some email systems block\
    \ files larger than about 5MB).\n*   Find your lost iPad using the **Find My iPad**\
    \ feature (described in [Chapter 1](#Chapter01.html#ch1): \"Getting Started\"\
    ).\n*   Erase all of the personal data on your lost iPad remotely using the **Remote\
    \ Wipe** feature.\n*   If you have multiple Macs in your home or business, MobileMe\
    \ also allows you to sync **docks**, **settings**, **passwords**, and **other\
    \ information** between your Macs, and use **Back to my Mac** remote desktop to\
    \ retrieve files or share screens.\n\n**NOTE**: As of publishing time, after your\
    \ 60-day free trial, Apple charges $99/year for individual MobileMe service and\
    \ $149/year for a family plan.\n\nHowever, also at publishing time, there was\
    \ a rumor floating around the web that Apple may make MobileMe a free service.\
    \ Check with the MobileMe web site ([`www.mobileme.com`](http://www.mobileme.com))\
    \ to find out the latest information."
  trans: "\n###### 从你的 iPad 邀请人员参加会议\n\n现在，你可以邀请他人参加你的日历事件。请遵循以下步骤：\n\n1.  点击你的`日历`图标以启动日历。\n\
    2.  点击右下角的`+`按钮来安排一个新事件。\n3.  在`添加事件`屏幕上，输入会议标题和地点，并根据需要调整开始和结束时间。\n4.  点击`受邀人`标签以邀请他人（见图\
    \ 4–3）。\n5.  要邀请某人，你有几种选择。\n    1.  输入其`电子邮件地址`（所有邀请均通过电子邮件发送）。\n    2.  输入其名字和姓氏的若干个字母（用空格分隔），如果此人在你的通讯录中，即可快速定位。\n\
    \    3.  或者，点击`蓝色加号`，通过浏览你的通讯录来查找某人。\n6.  点击你想使用的`姓名`和`电子邮件地址`。如果某人有多个电子邮件地址，你需要选择一个。\n\
    7.  如果需要，添加更多受邀人，然后点击`完成`退出`添加受邀人`窗口。\n8.  在`添加事件`屏幕上调整其他项目，然后点击`完成`进行保存。\n9.\
    \  会议邀请将立即通过电子邮件发送给你邀请的所有人。\n\n![images](img/0403.jpg)\n\n**图 4–3.** *如何邀请人员参加会议。*\n\
    \n###### 在日历上查看受邀人的状态\n\n| 你可以通过查看日历左栏中的邀请状态，来了解谁已接受、拒绝或尚未回复你的邀请。你将看到每位受邀人的回复状态显示在其姓名旁边。你会看到的各种状态指示符包括：\n\
    *   `未回复`\n*   `已接受`\n*   `可能参加`\n*   `已拒绝`\n\n | ![images](img/p164-01.jpg) |\n\
    \n###### 从你的 iPad 回复 Exchange 会议邀请\n\n| 当你连接到 Exchange 电子邮件服务器，并且邀请你参加会议的人也在同一个\
    \ Exchange 服务器上时，你将能够使用日历应用中的`邀请`收件箱。你将在`日历`图标上收到通知，如图所示。在图中，有四个新的会议邀请。 | ![images](img/p164-02.jpg)\
    \ |\n\n请遵循以下步骤来处理日历邀请收件箱中的 Exchange 会议邀请。你的 iPad 屏幕上还会弹出一个类似图 4-4 所示的提醒窗口。如果你准备立即回复会议，请从弹出提醒中点击`查看`。\n\
    \n![images](img/0404.jpg)\n\n**图 4–4.** *通过弹出提醒窗口回复会议邀请*\n\n如果你想稍后回复，只需点击提醒中的`关闭`。然后你可以使用`日历`中的`邀请`收件箱进行回复。\n\
    \n1.  启动你的`日历`应用。\n2.  点击`日历`屏幕左上角的`邀请`收件箱按钮（见图 4–5）。\n3.  如果你只有一个邀请，它将直接打开。如果你有多个邀请，你将看到所有邀请的列表。点击你想回复的邀请。\n\
    4.  要回复邀请，请点击事件屏幕底部的三个按钮之一：`接受`、`可能参加`或`拒绝`。\n5.  如果你选择`接受`或`可能参加`，该日历事件将被添加到你的\
    \ iPad 日历中，回复会立即通过电子邮件发送给会议组织者。完成。\n\n![images](img/0405.jpg)\n\n**图 4–5.** *使用日历邀请收件箱回复\
    \ Exchange 会议邀请*\n\n###### 从你的 iPad 回复 Google 或 Hotmail 会议邀请\n\n如果你使用支持 Exchange\
    \ 同步的 Google 或 Hotmail 日历，你将能够在 iPad 上的`邮件`应用中回复会议邀请。\n\n1.  点击你的`邮件`图标以启动程序。\n\
    2.  导航到包含会议邀请的`收件箱`。\n3.  找到该邀请。\n\n    大多数邀请看起来类似于下图所示。它们通常以`邀请`字样开头。\n\n   \
    \ ![images](img/p166-01.jpg)\n\n    **提示**：要快速在收件箱中找到所有会议邀请，请在搜索框中输入单词`meet`或`invitation`。点击`主题`按钮，以便仅搜索邮件主题。\n\
    \n4.  点击`会议邀请`以打开它。\n5.  点击`参加？`旁边的`是`、`可能`或`否`来回复邀请。\n6.  一旦你点击了其中一个选项，你的回复就会被发送。你可能会看到一个\
    \ Google 或 Hotmail 日历网页，用于在你的邀请回复中输入可选的详细信息。\n\n    ![images](img/p167-01.jpg)\n\
    \n### 使用 MobileMe 服务进行无线同步\n\n如果你不使用 Google 或 Exchange，但仍希望无线同步信息，另一个选择是使用 Apple\
    \ 的 MobileMe 服务。MobileMe 服务提供了一项出色的服务，可以在你的电脑（PC 或 Mac）与你的 iPad 及其他移动设备（如 iPad）之间无线同步你的个人信息。\n\
    \n**MobileMe 云端**：MobileMe 服务使用有时被称为云端的机制来同步你的所有信息。MobileMe 云端是一个术语，用于描述存储你所有\
    \ MobileMe 信息的互联网网络服务器。这些服务器以及你在电脑（PC 或 Mac）和移动设备（iPhone、iPad 等）上安装的相关软件，有助于让你的所有移动设备与你的电脑保持同步。其理念是，已更改的信息（如新的日历事件、新的联系人姓名）会从你的\
    \ iPad 发送到云端。然后，云端将这些已更改的信息分发到你 MobileMe 账户中的所有设备，例如你的电脑、iPhone 或 iPad。\n\n一旦你在电脑上设置好\
    \ MobileMe，然后在 iPad 上设置好访问权限，你所有的个人信息（联系人、日历，甚至书签）都将在你的电脑和 iPad 之间进行无线共享。\n\n\
    除了个人信息的无线同步，MobileMe 还允许你执行以下操作：\n\n*   创建基于 Web 的相册，你可以从 iPad 访问并向其添加内容。\n* \
    \  创建一个`iDisk`，便于你在 iPad 和电脑之间共享文档。你也可以用它来共享那些因体积过大而无法通过电子邮件发送的文件（某些电子邮件系统会阻止大于\
    \ 5MB 的文件）。\n*   使用`查找我的 iPad`功能（在第 1 章：“快速入门”中描述）查找丢失的 iPad。\n*   使用`远程擦除`功能远程擦除丢失\
    \ iPad 上的所有个人数据。\n*   如果你在家庭或公司中拥有多台 Mac，MobileMe 还允许你在这些 Mac 之间同步`程序坞`、`设置`、`密码`和`其他信息`，并使用`返回我的\
    \ Mac` 远程桌面来检索文件或共享屏幕。\n\n**注意**：在本书出版时，经过 60 天免费试用后，Apple 对个人 MobileMe 服务收费 $99/年，家庭套餐收费\
    \ $149/年。\n\n然而，同样在出版时，网络上流传着 Apple 可能将 MobileMe 变为免费服务的传言。请查看 MobileMe 网站 (`www.mobileme.com`)\
    \ 以获取最新信息。\n"
- fmt: "# Sign Up for the MobileMe Service (PC or Mac)\n\nApple makes it easy for\
    \ you to learn about MobileMe from iTunes after you register your iPad or the\
    \ first time you connect your iPad to your computer. You will most likely see\
    \ an ad for MobileMe with a `Try It Free` button.\n\nIf you use iTunes to sync\
    \ your iPad, you will also see a `Learn More` button at the top of the `Info`\
    \ tab (see [Figure 4–6](#Chapter04.html#fig_4_6)).\n\n1. Connect your iPad to\
    \ your computer.\n2. Click on `your iPad` in the left nav bar of iTunes.\n3. Click\
    \ the `Info` tab at the top.\n4. Click the `Learn More` button in the MobileMe\
    \ section.\n\n![images](images/0406.jpg)\n\n**Figure 4–6.** *Get started with\
    \ MobileMe from the iTunes Info tab*\n\nYou can also sign up for MobileMe directly\
    \ from their web site.\n\n1. Type your personal information to set up your account\
    \ and click the `Continue` button. Then enter your billing information and click\
    \ the `Sign Up` button at the bottom.\n2. If everything was entered correctly,\
    \ you'll see a `Signup Complete` screen similar to the one shown here.\n\n   ![images](images/p169-01.jpg)\n\
    \nYou have now created your MobileMe account. Now you'll set up MobileMe on your\
    \ Mac or PC and your iPad.\n\nIf you are a Windows PC user, skip to the “Set Up\
    \ MobileMe on Your PC” section.\n\n# Set Up MobileMe on Your Mac\n\nAfter you\
    \ have created your MobileMe account, you are ready to set up the software on\
    \ your Mac. The MobileMe software that runs on your Mac is included in the latest\
    \ version of the Leopard (v10.5.8 or higher) or Snow Leopard (v10.6.3 or higher)\
    \ operating systems.\n\nIf you don't have the latest version of the Mac system\
    \ software, you'll have to install it and configure the MobileMe software to sync\
    \ to the MobileMe cloud to get started.\n\n1. Click on the `Apple menu` and select\
    \ `Software Update` as shown.\n\n   **TIP**: You'll find extensive step-by-step\
    \ instructions showing you how to install or upgrade software on your Mac in Chapter\
    \ 30: “Your iTunes User Guide.”\n\n   ![images](images/p170-01.jpg)\n\n2. Follow\
    \ the steps to complete the software update.\n3. After you have successfully installed\
    \ the software update, click on the `Apple menu` and select `System Preferences`.\n\
    \n   ![images](images/p170-02.jpg)\n\n4. Click on the `MobileMe` icon in the Internet\
    \ & Wireless section of System Preferences.\n\n   ![images](images/p171-01.jpg)\n\
    \n5. Enter your MobileMe `Member Name` and `Password`.\n6. Click `Sign In`.\n\n\
    \   ![images](images/p171-02.jpg)\n\n7. Click the `Sync` tab at the top to see\
    \ the screen shown here.\n8. Check the box next to `Synchronize with MobileMe`.\n\
    9. Next to this check box is a drop-down for configuring the sync frequency. The\
    \ default is `Automatically`, but you can sync every `Hour`, `Day`, `Week`, or\
    \ `Manually`.\n\n   ![images](images/p171-03.jpg)\n\n10. To sync bookmarks, check\
    \ the box next to `Bookmarks` and select your `web browser`.\n11. To sync contacts,\
    \ check the box next to `Contacts`.\n12. To sync calendars, check the box next\
    \ to `Calendars`.\n13. You can also sync various other items by checking them.\
    \ After you have set up syncing, you can configure your iDisk by clicking the\
    \ `iDisk` tab and completing the screen (see [Figure 4–7](#Chapter04.html#fig_4_7)).\n\
    14. When you are done, close the `MobileMe` control panel.\n\n![images](images/0407.jpg)\n\
    \n**Figure 4–7.** *MobileMe control panel showing the iDisk tab*\n\nAs soon as\
    \ you close the MobileMe control panel, MobileMe will start sending your selected\
    \ items—Contacts, Calendars, and Bookmarks— to the MobileMe web site.\n\nNow you\
    \ can skip to the “Multiple Ways to Access MobileMe” section while we discuss\
    \ how Windows users configure MobileMe.\n\n# Set Up MobileMe on Your Windows PC\n\
    \nAfter creating your MobileMe account, you need get the software set up on your\
    \ PC. You will install the latest version of iTunes and the MobileMe software\
    \ on your PC and then configure it to sync to the MobileMe cloud to get started.\n\
    \n1. In your web browser, go to [`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html).\n\
    2. If you don't have iTunes version 10 or later, click the `iTunes` link to download\
    \ it.\n\n   **TIP**: We provide step-by-step instructions for installing or upgrading\
    \ iTunes in Chapter 30: “Your iTunes User Guide.”\n\n   Click the link to download\
    \ the MobileMe Control Panel for Windows.\n\n3. Click the `Download` button on\
    \ this screen to download the installation file.\n4. Follow the steps on the screen\
    \ to install the software on your computer.\n\n   ![images](images/p173-01.jpg)\n\
    \n5. Once the software is installed, start it up by one of these two methods:\n\
    \   * Clicking on the `MobileMe` icon on your Windows desktop\n   * Starting it\
    \ from your `Start` button or searching for via the `Windows` icon in the lower\
    \ left corner. Type `MobileMe` and the icon should appear at the top of the Start\
    \ menu under `Programs`. Click it.\n6. Click the `Sync` tab at the top.\n7. Check\
    \ the box next to `Sync with MobileMe`.\n8. Next to this check box is a drop-down\
    \ for the sync frequency. The default is `Automatically`, but you can choose to\
    \ sync every `Hour`, `Day`, `Week`, or `Manually`.\n9. To sync contacts, check\
    \ the box next to `Contacts` and select where your contacts are stored (such as\
    \ `Outlook`, `Google Contacts`, `Yahoo!`, or `Windows Contacts`). For Google and\
    \ Yahoo!, you will need to enter your username and password by clicking the `Options`\
    \ button that appears (see [Figure 4–8](#Chapter04.html#fig_4_8)).\n\n   ![images](images/0408.jpg)\n\
    \n   **Figure 4–8.** *MobileMe for Windows preferences control panel showing the\
    \ Sync tab*\n\n10. To sync calendars, check the box next to `Calendars` and select\
    \ where your Calendars are stored (e.g., `Outlook` or elsewhere).\n11. To sync\
    \ bookmarks, check the box next to `Bookmarks` and select your computer's web\
    \ browser (only Safari and Internet Explorer were supported for syncing bookmarks\
    \ at publishing time).\n12. Click `OK` when done.\n\nAs soon as you click `OK`,\
    \ MobileMe will start sending your selected items—Contacts, Calendars, and Bookmarks—to\
    \ the MobileMe web site.\n\n# Multiple Ways to Access MobileMe\n\nAfter the first\
    \ sync, you will have at least the following three ways to access your synced\
    \ information:\n\n* The computer where you originally stored your contacts and\
    \ calendar\n* The MobileMe web site\n* Your iPad (or other mobile device)\n\n\
    Since you already know how to get to the information on your computer, we will\
    \ focus on how to access information from the MobileMe web site and your iPad."
