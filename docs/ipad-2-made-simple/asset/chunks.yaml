    As you can see in [Figure 5-3](#Chapter05.html#fig_5_3), your list of available
    networks includes **Other**... Touch the **Other** tab, and you can manually enter
    the name of a network you would like to join.


    ![images](images/0503.jpg)


    **Figure 5-3.** *You can manually enter the name of a Wi-Fi network.*


    Type in the Wi-Fi network name, touch the **Security** tab, and then choose which
    type of security is being used on that network. If you are unsure, you''ll need
    to find out from the network administrator.


    When you have the information you need, enter it along with the proper password.
    This new network will be saved to your network list for future access.'
  trans: '好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。



    # Wi-Fi 与 3G 连接


    我们生活在一个互联的世界。无线网络（Wi-Fi）接入已经成为常态，而非例外——您很可能正在家中或办公室使用 Wi-Fi。现在，您可以利用它来连接您的 iPad。如果您的
    iPad 配备了 3G 模块，那么您还可以在任何有蜂窝网络信号覆盖的地方（这比 Wi-Fi 网络的覆盖范围要广得多）连接到互联网。


    在本章中，我们将讨论您的 iPad 的两种连接方式的区别：Wi-Fi（无线局域网）和 3G（蜂窝服务——您的手机所使用的广域数据网络）。我们将向您展示连接或断开这两种网络的所有方法。有时，您可能希望禁用或关闭
    3G 连接，仅使用 Wi-Fi，以节省数据连接费用。


    iPad 的美妙之处在于它内置了无线互联网接入功能。一旦将您的 iPad 连接到无线（Wi-Fi 或 3G）网络，您就可以在几分钟内发送电子邮件和上网冲浪。而一旦您发现了所有可用的出色应用程序和书籍，您将再也不希望断开连接。


    **注意：** 您的 iPad 可能不具备 3G 连接功能。某些 iPad 仅支持 Wi-Fi 连接，不具备连接 3G 蜂窝网络的能力。


    如何知道您拥有的是哪款 iPad？支持 3G 的 iPad 在顶部边缘会有一条黑色塑料条，在 iPad 背面更为显眼；该条有助于数据接收（请参见图 5-1）。


    ![images](img/0501.jpg)


    **图 5-1.** *如何判断您的 iPad 是否具备 3G 蜂窝功能*


    ### 连接到 Wi-Fi 或 3G 网络后，我可以做什么？


    以下是连接到 Wi-Fi 或 3G 网络后可以执行的一些操作：


    -   从 `App Store` 访问和下载应用程序（程序）。

    -   使用 iPad 上的 `iTunes` 应用访问和下载音乐、视频、播客等内容。

    -   使用 `Safari` 浏览网页。

    -   发送和接收电子邮件。

    -   使用需要互联网连接的社交网站，如 Facebook、Twitter 等。

    -   使用 `Skype` 应用将您的 iPad 当作电话使用（请参见第 22 章：“社交网络”）。

    -   玩需要实时互联网连接的游戏。

    -   其他任何需要互联网连接的操作。


    ## Wi-Fi 连接


    每台 iPad 都内置了 Wi-Fi 功能。如果您有 3G 型号，那么您同时拥有 3G 和 Wi-Fi 功能。那么，让我们来看看如何连接到 Wi-Fi 网络。关于
    Wi-Fi 连接需要考虑的事项包括：


    -   网络接入和数据下载没有额外费用（如果您在家中、办公室或免费的 Wi-Fi 热点使用 iPad）。

    -   Wi-Fi 通常比蜂窝数据 3G 连接速度更快。

    -   包括飞机在内的越来越多的地方提供 Wi-Fi 接入，但您可能需要支付一次性或月度服务费。


    ### 设置您的 Wi-Fi 连接


    要设置您的 Wi-Fi 连接，请按照以下步骤操作：


    1.  点击 `设置` 图标。

    2.  点击左侧栏中的 `Wi-Fi` 以查看右侧显示的画面。

    3.  确保 `Wi-Fi` 开关已设置为 `开`。

    4.  一旦 Wi-Fi 打开，iPad 将自动开始搜索无线网络。

    5.  可访问的网络列表会显示在 `选择网络...` 选项下方。在此屏幕截图中，您可以看到我们有两个可用网络。


    ![images](img/p185-01.jpg)


    要连接到列出的任何网络，只需点击它。如果该网络是不安全的——即它不需要密码——您将自动连接。


    **注意：** 某些地方，如咖啡店，使用基于网页的登录界面，而不是用户名/密码界面。在这种情况下，当您点击一个网络（或尝试使用 `Safari`）时，iPad
    会滑出一个浏览器界面，您将看到网页以及登录选项。


    ### 安全 Wi-Fi 网络——输入密码


    | 某些 Wi-Fi 网络需要密码才能登录。这由网络管理员在创建无线网络时设置。您必须知道确切的密码，包括是否区分大小写。如果网络确实需要密码，您将进入密码输入界面。请按提供的格式准确输入密码，然后按下屏幕键盘上的
    `回车` 键（此时该键标记为 `加入`）。 | ![Image](img/p186-01.jpg) |

    | 在 `选择网络...` 界面上，您会看到一个`勾选`图标，表示您已连接到该网络。 | ![Image](img/p186-02.jpg) |


    **提示：** 您可以将文本粘贴到密码对话框中。因此，对于较长或随机字符的密码，您可以先将密码传输到您的 iPad（例如通过电子邮件），然后直接复制粘贴。请记得在执行此操作后立即删除该电子邮件以确保安全。


    ### 切换到不同的 Wi-Fi 网络


    有时，您可能想要更改当前的 Wi-Fi 网络。这种情况可能发生在您身处酒店、公寓或其他地方，而 iPad 选择的网络并非信号最强的网络，或者您希望使用安全的网络而非不安全的网络时。


    要从当前选定的 Wi-Fi 网络切换，请点击 `设置` 图标，点击左侧栏中的 `Wi-Fi`，然后点击您想加入的 Wi-Fi 网络名称。如果该网络需要密码，您需要输入密码才能加入网络（请参见图
    5-2）。


    ![images](img/0502.jpg)


    **图 5-2.** *切换到不同的 Wi-Fi 网络*


    一旦您输入正确的密码（或点击一个开放网络），您的 iPad 将加入该网络。


    ### 验证您的 Wi-Fi 连接


    | 要验证您是否已连接到 Wi-Fi 网络，请查找旁边带有`勾选`图标的网络名称。当您返回 `设置` 界面时，您应该在 `选择网络...` 下方的列表中看到您的
    Wi-Fi 网络名称旁边有一个`勾选`图标。 | ![Image](img/p187-01.jpg) |


    ## 高级 Wi-Fi 选项（隐藏或不可发现的网络）


    有时，您可能看不到您想加入的网络，因为其名称已被管理员隐藏。在下一节中，您将学习如何在 iPad 上加入此类网络。一旦您加入，下次进入该网络覆盖范围时，您的
    iPad 将自动加入，无需询问。您也可以设置让 iPad 每次加入网络时都询问您；我们也会向您展示如何操作。有时，您可能想要擦除或遗忘某个网络。例如，假设您参加了一次性的会议，并且想要删除相关联的网络——您也将学习如何做到这一点。


    ### 为什么我看不到我想要加入的 Wi-Fi 网络？


    有时，出于安全原因，人们不会让他们的网络被发现，您必须手动输入名称和安全选项才能连接。


    如 图 5-3 所示，您的可用网络列表包含 `其他`... 点击 `其他` 选项，即可手动输入您想要加入的网络名称。


    ![images](img/0503.jpg)


    **图 5-3.** *您可以手动输入 Wi-Fi 网络的名称。*


    输入 Wi-Fi 网络名称，点击 `安全性` 选项，然后选择该网络正在使用的安全类型。如果不确定，您需要向网络管理员确认。


    当您拥有所需信息后，将其与正确的密码一同输入。这个新网络将被保存到您的网络列表中，以便将来访问。


