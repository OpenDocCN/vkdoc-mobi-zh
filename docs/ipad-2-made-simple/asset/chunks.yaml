  trans: '

    ### 调节音量


    在 iPad 上调节音量有两种方式：使用外置的 `Volume` 按钮，或使用屏幕上的 `Volume` 滑块控制。


    外置的 `Volume` 按钮位于设备右上侧。按下 `Volume Up` 键（上方按钮）或 `Volume Down` 键可提高或降低音量。调节音量时，你会看到屏幕上的
    `Volume` 滑块随之移动。你也可以直接按住 `Volume` 滑块键上下拖动来调节音量。


    ![images](img/p235-01.jpg)


    **提示：** 若要快速静音，请按住 `Volume Down` 键约两秒钟。你也可以双击 `Home` 键，然后将 `App Switcher` 栏向右滑动，以显示音乐控制。如果
    `Side` 开关设置为 `Lock Rotation`（请参阅第 7 章），则会出现一个用于静音 iPad 的软键。


    ![images](img/p235-02.jpg)


    ### 在歌曲中重复、随机播放和跳转


    ![images](img/p235-03.jpg)


    在播放模式下，你只需点击屏幕上的专辑封面任意位置即可激活其他控制。随后你将在顶部看到一个额外的滑块（进度条），以及 `Repeat` 和 `Shuffle`
    符号。


    #### 跳转到歌曲的其他部分


    向右拖动进度条，你会看到歌曲的已播放时间（显示在最右侧）随之变化。如果你要寻找歌曲的某个特定段落，请拖动滑块，然后松开并试听，确认是否定位准确。


    ![images](img/p236-01.jpg)


    **提示：** 若要让滑块移动得更慢（即进行微调），请将手指向屏幕下方拖动。这被称为*scrubbing rate*（拖拽速率）。


    #### 重复播放单首歌曲与重复播放播放列表或专辑中的所有歌曲


    若要重复播放当前收听的歌曲，触摸顶部控件左侧的 `Repeat` 符号两次，直到它变为蓝色并显示数字 1。


    ![images](img/p236-02.jpg)


    若要重复播放播放列表、歌曲列表或专辑中的所有歌曲，触摸 `Repeat` 图标直到它变为蓝色（且不显示数字 1）。


    ![images](img/p236-03.jpg)


    若要关闭 `Repeat` 功能，按下图标直到它再次变为白色。


    ![images](img/p236-04.jpg)


    #### 随机播放


    如果你在收听播放列表、专辑或任何其他类别的音乐列表，你可能会决定不想按顺序收听歌曲。触摸 `Shuffle` 符号可将音乐重新排列为随机顺序播放。当图标为蓝色时，表示
    `Shuffle` 设为 `ON`；图标为白色时，表示设为 `OFF`。


    ![images](img/p236-05.jpg)


    #### Genius


    Apple 为 iTunes 提供了一个名为 Genius 播放列表的功能。如果 Genius 功能在 iTunes 中已激活，你将看到右侧栏上显示 `Genius`
    符号。


    ![images](img/p237-01.jpg)


    **注意：** 你必须使用电脑上的 iTunes 来启用 Genius 播放列表。请参阅“第 29 章：你的 iTunes 用户指南”了解操作方法。


    ![images](img/p237-02.jpg)


    Genius 功能的作用是将与你当前收听歌曲相似的歌曲关联起来，从而创建一个播放列表。与随机的“随机播放”不同，Genius 会搜索你的音乐库，然后创建一个包含
    25、50 或 100 首歌曲的新播放列表（你可以在电脑上的 iTunes 中设置 Genius 功能）。


    ![images](img/p237-03.jpg)


    Genius 是混合播放音乐并保持新鲜感的绝佳方式。仅需播放你喜欢的音乐类型，Genius 就能找到一些可能未被收录在你现有播放列表中的冷门歌曲。


    **提示：** 若要创建永久的 Genius 播放列表，只需在电脑上的 iTunes 中创建它们，然后同步到你的 iPad。从 iTunes 同步过来的 Genius
    播放列表无法在 iPad 本身上进行编辑或更改，但你可以在 iPad 上保存、刷新或删除在 iPad 上创建的 Genius 播放列表。


    #### 正在播放


    有时，你在浏览播放列表或专辑选项时玩得太投入，以至于深入菜单层级，然后发现自己只想回到当前收听的歌曲。幸运的是，这总是很容易做到，因为在大多数音乐屏幕的左下角，都有一个
    `Now Playing` 图标可供点击。


    ![images](img/p238-01.jpg)


    **提示：** 若要返回左下角的小专辑封面视图，请点击屏幕调出控件，然后按下左下角的 `Left Arrow` 返回上一个视图。


    #### 查看专辑中的其他歌曲


    你可能想收听同一专辑中的另一首歌曲，而不是去播放列表或流派列表中的下一首。


    在 `Now Playing` 屏幕的右下角，你会看到一个带有三条横线的小按钮。（如果看不到任何控件，请点击屏幕一次以调出它们。）


    ![images](img/p238-02.jpg)


    ![images](img/p239-01.jpg)


    点击该按钮，视图将切换到专辑封面小图。屏幕现在会显示该专辑中的所有歌曲。


    触摸列表中的另一首歌曲，该歌曲将开始播放。


    ![images](img/p239-02.jpg)


    **注意：** 如果你正在播放列表或 Genius 播放列表中，并开始收听专辑中的另一首歌曲，系统不会将你带回原来的播放列表。相反，你需要返回播放列表库，或者点击
    `Genius` 来创建一个新的 Genius 播放列表。


    ### 调整音乐设置


    你可以调整多项设置来定制音乐播放体验，使其符合个人喜好。你可以在 `Settings` 菜单中找到这些设置。只需点击 `Home` 屏幕上的 `Settings`
    图标即可调出菜单。


    在 `Settings` 屏幕的中间位置，点击 `iPod` 标签进入 iPod 音乐设置屏幕。你可以在此屏幕上调整四项设置：`Sound Check`、`EQ`、`Volume
    Limit` 和 `Lyrics & Podcast Info`。


    ![images](img/p240-01.jpg)


    #### 使用 Sound Check（自动音量调节）


    **提示：** 由于歌曲的录制音量不同，有时在播放过程中，某首歌曲可能会比另一首歌曲听起来响亮得多。`Sound Check` 可以消除这种情况。如果 `Sound
    Check` 设置为 `ON`，你所有的歌曲将大致以相同的音量播放。


    ![images](img/p240-02.jpg)


    #### EQ（均衡器设置）


    声音均衡是非常个人化和主观的。有些人喜欢音乐中有更多低音，有些人喜欢更多高音，还有些人喜欢更夸张的中音。无论你的音乐品味如何，总有一款 `EQ` 设置适合你。


    ![images](img/p241-01.jpg)


    **注意：** 使用 `EQ` 设置可能会在一定程度上降低电池续航能力。


    只需触摸 `EQ` 标签，然后选择你最常听的音乐类型，或者选择增强高音或低音的特定选项。尝试一下，享受乐趣，找到最适合你的设置。


    #### Volume Limit（以合理音量安全听音乐）


    `Volume Limit` 屏幕为家长控制孩子 iPad 的音量提供了一个很好的方法。这也是确保你使用耳机时音量不会过大、从而保护听力的好方法。只需将滑块移动到音量限制位置，然后锁定该限制。


    ![images](img/p241-02.jpg)


    若要锁定音量限制，请触摸 `Lock Volume Limit` 按钮并输入一个四位数的密码。系统会提示你再次输入密码，随后音量限制将被锁定。

    '
- fmt: '# Showing Music Controls When Your iPad Is Locked


    You can control your music even if your iPad is locked. Just double-click the
    `Home` button (when iPad is locked) and the controls for adjusting the music show
    up on the top locked screen. There is no reason to unlock the screen and then
    go to the `iPod` app to find the controls.


    ![images](images/p242-01.jpg)


    Notice that the screen is still locked in the image to the right—yet the music
    controls are now visible along the top. You can pause, skip, go to a previous
    song, or adjust the volume without actually unlocking the iPad.


    ## Home Sharing


    New to the iPad this year is the ability to share your home iTunes library via
    Apple''s proprietary Home Sharing function.


    Essentially, Home Sharing allows you to browse and play anything from your home
    library (usually on your desktop or network drive) on your iPad.


    One great advantage of this feature is that you aren''t constrained by the limited
    storage on the iPad; this feature gives you access to your entire library whenever
    you are connected to your home network.


    Follow these steps to enable Home Sharing:


    1. Tap the `Settings` icon on the `Home` page.

    2. Touch the `iPod` icon in the left-hand column.

    3. Input your `Apple ID` and `Password` under the `Home Sharing` heading on the
    right. Make sure you enter the same Apple ID and password as the computer on the
    network that has Home Sharing enabled (see [Chapter 29](#Chapter29.html#ch29)).

    4. Touch the `Done` button on the keyboard.

    5. Start up the `iPod` app and notice the new category in the top left entitled
    `Library`.

    6. Touch `Library` and see the available network libraries to browse.

    7. Choose your `Network` library and now browse and play any item from your home
    network on the iPad (see [Figure 9–4](#Chapter09.html#fig_9_4)).


    **Figure 9–4.** *Using Home Sharing on the iPad*


    ## AirPlay


    The `AirPlay` program is another Apple proprietary function built into the iPad.
    `AirPlay` is available across a wide range of apps, but here we will just look
    at `AirPlay` and the `iPod` app.


    `AirPlay` essentially is built-in wireless streaming of your music to an `AirPlay`-compatible
    device, such as an Apple TV or wireless speaker system.


    With an Apple TV hooked up, you can choose `AirPlay` and have whatever is playing
    on your iPad stream automatically to your home theater setup.


    Using `AirPlay` is easy; follow these steps to do so:


    1. Start your iPod app.

    2. Play any song or album.

    3. Touch the `AirPlay` icon.

    4. Choose the `AirPlay` device to which you wish to send your music (see [Figure
    9–5](#Chapter09.html#fig_9_5)).


    ![images](images/0905.jpg)


    **Figure 9–5.** *Using `AirPlay` on the iPad*


    ## Listening to Free Internet Radio (Pandora)


    While your iPad gives you unprecedented control over your personal music library,
    there may be times when you want to just “mix it up” and listen to some other
    music.


    **TIP:** A basic Pandora account is free and can save you considerable money compared
    with buying lots of new songs from the iTunes Store.


    `Pandora` grew out of the Music Genome Project. This was a huge undertaking. A
    large team of musical analysts looked at just about every song ever recorded,
    and then developed a complex algorithm of attributes to associate with each song.


    **NOTE:** Pandora may have some competition by the time you read this book. Right
    now there''s one other competitor called `Slacker Personal Radio`, but there will
    probably be more. If you want to find more options, try searching the App Store
    for “iPad Internet Radio.” Please also note that `Pandora` is a US-only application.
    `Slacker` is available only in the US and Canada, while `Spotfly` is big in Europe.
    Hopefully, more options will begin to pop up for international users.


    ### Getting Started with Pandora


    `Pandora` lets you design your own unique radio stations built around artists
    you like. Best of all, it is completely free!


    ![images](images/p245-01.jpg)


    Start by downloading the `Pandora` app from the App Store. Just go to the App
    Store and search for “Pandora.”


    Now just touch the `Pandora` icon to start the app.


    The first time you start `Pandora`, you''ll be asked to either create an account
    or to sign in if you already have an account. Just fill in the appropriate information—an
    email address and a password are required—and you can start designing your own
    music-listening experience.


    ![images](images/p245-02.jpg)


    `Pandora` is also available for Windows or Mac computers, as well as for most
    smartphone platforms. If you already have a Pandora account, all you have to do
    is sign in.


    ![images](images/p245-03.jpg)


    ### Pandora''s Main Screen


    Your stations are listed along the left-hand side. Just touch one of your stations
    and it will begin to play. Usually, the first song will be from the actual artist
    chosen and the next songs will be from similar artists.


    ![images](images/p246-01.jpg)


    The large screen of the iPad lets you see lots of information.


    In the middle of the page, you''ll see a nice bio of the artist, which changes
    with each new song.


    There will also be a small advertisement in the window in the lower-left corner—if
    you upgrade to `Pandora One`, you will see a different window very much like the
    `Now Playing` album cover in the `iPod` music app.


    ![images](images/p246-02.jpg)


    ### Thumbs Up or Thumbs Down in Pandora


    If you like a particular song, touch the `Thumbs Up` icon and you''ll hear more
    from that particular artist.


    Conversely, if you don''t like an artist on this station, touch the `Thumbs Down`
    icon and you won''t hear that artist again.


    You can also pause the song and come back later, or skip to the next selection
    on your station.


    ![images](images/p247-01.jpg)


    **NOTE:** With a free Pandora account, you are limited with the number of skips
    per hour you can make. You also will occasionally hear advertising. To get rid
    of these restrictions, upgrade to a paid Pandora One account, as explained momentarily.


    ### Pandora''s Menu


    Above the bio to the right is a `Menu` button. Touch this and you can bookmark
    the artist or song, or go to the iTunes Store to buy music from this artist.


    ![images](images/p247-02.jpg)


    ### Creating a New Station in Pandora


    Just touch the `Search` window where you see `Artist, Song or Composer` in the
    upper-left corner and type in the name of an artist, song, or composer.


    When you find what you are looking for, touch the selection and `Pandora` will
    immediately start to build a station around your choice.


    ![images](images/p247-03.jpg)


    You''ll then see the new station listed with your other stations.


    You can build up to 100 stations in Pandora.


    ![images](images/p248-01.jpg)


    **TIP:** You can organize your stations by pressing the `By Date` or `ABC` buttons
    in the bottom-left corner of the screen.'
