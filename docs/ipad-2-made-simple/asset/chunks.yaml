  trans: "\n### 下载以供离线查看\n\n如果你知道将要离开无线网络覆盖范围一段时间，例如在飞机上或地铁里，你可能会希望下载内容以便稍后离线查看或收听。点击\
    \ `Free` 按钮，它会变为 `Download` 按钮，然后再点击一次。接着，你可以通过点击屏幕右下角的 `Downloads` 按钮来监控下载进度（一些较大的视频可能需要十分钟或更长时间才能完成）。下载完成后，该内容将出现在你的\
    \ `iPad` 图标中的相应区域。\n\n**注意：** 任何大于 20MB 的文件都无法通过 3G 网络下载；较大文件必须使用 Wi-Fi。\n\n###\
    \ 在 iTunes 中搜索\n\n有时你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻阅所有菜单。`Search` 工具正是为你准备的。\n\n\
    在 `iTunes` 应用的右上角，与几乎所有其他 iPad 应用一样，都有一个 `Search` 窗口。\n\n触摸 `Search`，`Search`\
    \ 窗口和设备键盘会弹出。一旦你开始输入，iPad 就会尝试将你的输入与可能的匹配项进行匹配。\n\n![images](img/p513-01.jpg)\n\
    \n输入你正在搜索的艺术家、歌曲名称、视频名称、播客名称或专辑，iPad 会显示详细的匹配结果。你可以根据需要提供概括或具体的信息。如果你只是想浏览某个艺术家的所有特定歌曲，请输入艺术家的名字。如果你想要某首特定的歌曲或专辑，请输入歌曲或专辑的全名。\n\
    \n当你找到歌曲或专辑名称时，只需触摸它，你就会进入购买页面。\n\n### 购买或租赁音乐、视频、播客等\n\n一旦你找到歌曲、视频、电视节目或专辑，你可以触摸\
    \ `Buy` 或（如果出现）`Rent` 按钮。这将使你的媒体开始下载。（如果内容是免费的，你会看到一个 `Free` 按钮，点击后变为 `Download`\
    \ 按钮。）\n\n除非你完全确定想要购买该内容，否则我们建议你先预览或收听试听片段，并查看客户评论。\n\n#### 预览音乐\n\n触摸歌曲标题或其左侧的音轨编号；专辑封面会翻转并启动\
    \ `Preview` 窗口。\n\n你将听到该歌曲 30 秒的代表性片段。\n\n触摸 `Stop` 按钮，音轨编号将再次显示。\n\n![images](img/p514-01.jpg)\n\
    \n#### 查看客户评论\n\niTunes 中的许多内容都提供客户评论。评论范围从低的一星到高的五星。\n\n**警告：** 你需要注意，虽然很多评论是干净的，但有些可能包含露骨的语言。iTunes\
    \ 商店可能不会立即发现这些内容。\n\n阅读评论可以让你相当清楚地了解自己是否愿意购买该商品。\n\n![images](img/p515-01.jpg)\n\
    \n#### 预览视频、电视节目或音乐视频\n\niTunes 上的几乎所有内容都提供预览。有时你会看到一个 `Preview` 按钮，就像音乐视频和电影那样。电视节目略有不同；你需要点击剧集标题来查看\
    \ 30 秒的预览。\n\n大多数电影和电视节目也会提供一个 `HD` 或 `Standard Def` 按钮。请记住，高清电影和剧集通常稍微贵一些。\n\n\
    我们强烈建议在 iTunes 上购买内容之前，先查看评论并尝试预览。\n\n典型的电影预览或预告片会超过 30 秒——有些会长达 2 分 30 秒或更长。\n\
    \n![images](img/p515-02.jpg)\n\n#### 购买歌曲、视频或其他项目\n\n一旦你确定要购买一首歌曲、视频或其他项目，请按照以下步骤操作：\n\
    \n1.  触摸歌曲的 `Price` 按钮或 `Buy` 按钮。\n2.  该按钮会发生变化，变成一个绿色的 `Buy Now`、`Buy Song`、`Buy\
    \ Single` 或 `Buy Album` 按钮。\n3.  点击 `Buy` 按钮。\n\n    ![images](img/p516-01.jpg)\n\
    \n4.  你会看到一个动画图标跳入购物车。输入你的 iTunes 密码并触摸 `OK` 以完成购买。\n\n    ![images](img/p516-02.jpg)\n\
    \n![images](img/p516-03.jpg)\n\n你可以通过触摸右下角的 `Downloads` 按钮来检查下载进度。\n\n然后，这首歌将成为你音乐库的一部分，下次你将\
    \ iPad 连接到电脑上的 iTunes 时，它将被同步。\n\n下载完成后，你将看到新的歌曲、有声读物、播客或 iTunes U 播客出现在你的 `iPod`\
    \ 应用中的相应类别下。\n\n**注意：** 购买的视频和 iTunes U 视频会进入 `Videos` 应用，而不是 iPad 上的 `iPod` 应用。\n\
    \n![images](img/p517-01.jpg)\n\n#### iTunes 中的播客\n\n播客通常是一系列音频片段；这些片段可能会经常更新（例如来自国家公共广播电台的整点新闻广播），或者根本不更新（例如某个特定主题的一次性讲座录音）。\n\
    \n![images](img/p517-02.jpg)\n\n你可以使用顶部的三个按钮浏览 iTunes 中的播客：\n\n*   `Featured`（精选）\n\
    *   `Top Charts`（排行榜）\n*   `Categories`（分类）\n\n![images](img/p517-03.jpg)\n\n\
    #### 下载播客\n\n播客有 `Video` 和 `Audio` 两种类型。当你找到播客时，只需触摸播客的标题（参见图 20-5）。幸运的是，大多数播客都是免费的。如果是免费的，你会看到一个\
    \ `Free` 按钮，而不是通常的 `Buy` 按钮。\n\n![images](img/2005.jpg)\n\n**图 20-5.** *下载播客*\n\
    \n当你触摸按钮时，它会变成一个显示 `Download` 的绿色按钮。触摸 `Download`，一个动画图标会跳到底部软键栏中的 `Downloads`\
    \ 图标。显示为红色的小数字反映了正在下载的文件数量。\n\n![images](img/p518-01.jpg)\n\n#### 下载图标——停止和删除下载\n\
    \n当你下载项目时，它们会出现在你的 `Downloads` 界面中。这种行为与你电脑上 iTunes 的行为类似。\n\n你可以触摸底行的 `Downloads`\
    \ 图标来查看所有下载的进度。\n\n![images](img/p518-02.jpg)\n\n#### 下载内容的存放位置\n\n你所有的下载内容都会显示在你的\
    \ `iPod` 应用或 `Videos` 应用中，并按类别整理。换句话说，如果你下载了一个播客，你需要进入你的 `iPod` 应用，触摸侧边栏上的 `Podcasts`\
    \ 图标来查看下载好的播客。\n\n**注意：** 如果你在 iPad 上没有完成下载，并且在下载队列中找不到它，你可以尝试进入桌面版 `iTunes` 应用，点击\
    \ `Check for Available Downloads`。\n\n有时，你可能决定不想要你选择的所有下载内容。如果你想停止下载并删除它，请用手指在下载项上滑动以调出\
    \ `Delete` 按钮，然后点击 `Delete`（参见图 20-6）。\n\n![images](img/2006.jpg)\n\n**图 20-6.**\
    \ *在下载文件时将其删除*\n\n### 兑换 iTunes 礼品卡\n\niPad 上 iTunes 的酷功能之一是，就像你电脑上的 iTunes 一样，你可以兑换礼品卡，并在你的\
    \ iTunes 账户中获得用于购买的信用额度。\n\n在 `iTunes` 屏幕的底部，你应该会看到 `Redeem` 按钮（参见图 20-7）。\n\n\
    点击 `Redeem` 按钮，开始输入你的礼品卡号以获取 iTunes 商店信用额度的流程。\n\n![images](img/2007.jpg)\n\n\
    **图 20-7.** *兑换 iTunes 礼品卡*\n\n然后，系统会提示你在框中输入你的 iTunes 礼品卡信息或礼品券信息。完成此操作后，你将拥有在\
    \ iTunes 商店下载的信用额度——就是这么简单！\n\n**注意：** 如果你有多个 iTunes 账户，你也可以直接在 `iTunes` 应用中登录或登出。\n"
- fmt: '# Ping: Apple’s Music Social Networking App


    Recently, Apple introduced the `Ping` service as part of `iTunes 10`. You can
    read more about the desktop version in Chapter 30: “Your iTunes User Guide.” `Ping`
    is also built into the `iTunes` app on the iPad.


    ![images](images/p520-01.jpg)


    `Ping` gives you the opportunity to follow your favorite music artists and view
    videos, pictures, or content the artist might choose to post. `Ping` also allows
    you to follow friends, see what they are listening to, and make comments to their
    posts.


    **CAUTION**: If your `Ping` account is public, everyone who follows you will see
    what you buy. If you also have Twitter set up, it can spam your timeline if you
    buy a lot of music.


    ## Using Ping on the iPad


    `Ping` is located along the bottom soft keys of the `iTunes` app. If you set up
    `Ping` from your desktop `iTunes` app (see Chapter 30 for more information), then
    you will find that it is already set up on your iPad (or any other iOS device
    you have).


    **NOTE**: If `Ping` doesn''t show up on your iPad after you''ve enabled it on
    a desktop version of `iTunes`, you might need to sync your iPad once before it
    appears on the `iTunes` app.


    You will notice three soft keys across the top: `Activity`, `People`, and `My
    Profile`. When `Ping` launches, it displays the `Activity` screen, which shows
    the artists and friends you are following, as well as their recent activity.


    ![images](images/p521-01.jpg)


    Touching the `People` soft key at the top will show you the people you are following,
    as well as those who are following you.


    ![images](images/p522-01.jpg)


    Touch the `My Profile` soft key, and you can also see who you are following and
    add comments to be seen by those who are following you.


    Touch the `My Info` button at the bottom, and you can see your picture and the
    music that you like, which you chose when you set up your `Ping` account in `iTunes
    10`.


    ![images](images/p523-01.jpg)


    `Ping` is in its infancy now, but it promises to become a more full-featured social
    networking site devoted exclusively to music in the not-too-distant future.


    # Chapter 21


    # The Amazing App Store


    You have just seen how easy it is download music, videos, and podcasts from iTunes
    right onto your iPad. You have also learned how to download iBooks from the iBooks
    store.


    It is just as easy to download new applications from Apple''s amazing App Store.
    Apps are available for just about any function you can think of—games, productivity
    tools, and social networking—whatever you can imagine. As the advertising says:
    “There''s an app for that.”


    In this chapter, you will learn how to navigate the App Store, how to search for
    apps, and how to download them. You will also learn how to maintain and update
    your apps once they are downloaded onto your iPad.


    ![images](images/p525-01.jpg)


    **NOTE:** If you purchase a new iPad Wi-Fi or unlocked iPad 3G while travelling
    and bring it home to a country where it''s not yet sold, there''s a good chance
    your iTunes ID won''t work to buy apps. The work-around is to buy iPad apps on
    a desktop version of iTunes (which does work) and sync them over.


    ## Learning More About Apps and the App Store


    In a very short amount of time, the App Store has exploded in volume. There are
    apps for just about anything you can imagine. Apps come in all prices; in many
    cases, they are even free.


    ## A Few Cool Apps


    With more than 350,000 apps in the store and 70,000 iPad-specific apps, it is
    impossible to give you a top-ten list of apps. Instead, we''ve listed a number
    of apps that we like or have heard are really cool. [Table 20–1](#Chapter21.html#tab_20_1)
    lists of a number of fun, cool, useful, or simply entertaining apps. The table
    also shows whether an app is free; however, it does not otherwise include pricing
    because prices change frequently in the App Store.


    ![images](images/t2001.jpg)


    ![images](images/t2001a.jpg)


    ### Where to Find Apps News and Reviews


    You can find reviews in the App Store itself, and we recommend you check out the
    App Store reviews. However, sometimes you will probably want more information
    from some experts. The blogs are a great place to find news and reviews.


    Here is a list of Apple iPad/iPhone/iPod touch-related blogs with reviews of apps:


    *   The iPhone Blog: [`www.tipb.co`](http://www.tipb.co)

    *   Touch Reviews: [`www.touchreviews.net`](http://www.touchreviews.net)

    *   Touch My Apps: [`www.touchmyapps.com`](http://www.touchmyapps.com)

    *   The Unofficial Apple Weblog: [www.tuaw.com](http://www.tuaw.com)

    *   Cult of Mac: [`www.cultofmac.com`](http://www.cultofmac.com)

    *   App Smile: [`www.appsmile.com`](http://www.appsmile.com)


    ## App Store Basics


    After only a short time on the site, you should find the App Store to be quite
    intuitive to navigate. However, there are some basics to familiarize yourself
    with that will make the App Store experience much more enjoyable.


    ### A Network Connection Is Required


    After you set up your App Store (iTunes) account, you still need to have the right
    network connectivity (either Wi-Fi or 3G/cellular) to access the App Store and
    download apps. Check out [Chapter 4](#Chapter04.html#ch4): “Wi-Fi and 3G Connectivity”
    to learn how to tell if you are connected.


    ### Starting the App Store


    The `App Store` icon should be on your first page of icons on the `Home` screen.
    Tap the icon to launch the `App Store`.


    ![images](images/p528-01.jpg)


    ### The App Store Home Page


    Like iTunes, the `App Store` app has buttons on top and soft keys at the bottom
    that help direct you in your purchases (see [Figure 21–1](#Chapter21.html#fig_21_1)).


    Along the top, there are buttons for `New` apps and `What''s Hot`, as well as
    a `Release Date` app listing. Along the bottom are icons for `Featured`, `Genius`,
    `Top Charts`, `Categories`, and `Update`.


    Scrolling is handled the same way as in iTunes and in other programs—just move
    your finger up and down to scroll through the page.


    ![images](images/2101.jpg)


    **Figure 21–1.** *Layout of the App Store''s `Home` page*


    You will notice that there are two main sections on the App Store''s `Home` page:
    `New and Noteworthy` and `Staff Favorites`. Each section has several pages. Touch
    the arrows to advance through the pages or touch the `See All` tab.


    **NOTE:** Since the App Store is essentially a web site, it will change frequently.
    Some of the details and nuances of the App Store might be a bit different after
    this book goes to print.


    ### Viewing App Details


    Once you find an app that interests you, you can explore many options to help
    you decide whether a particular app is for you. [Figure 21–2](#Chapter21.html#fig_21_2)
    shows you some of the options available.


    ![images](images/2102.jpg)


    **Figure 21–2.** *Viewing details about an app*


    ## Finding an App to Download


    Begin by looking around the default view, which shows the `Featured` apps. The
    App Store loads with the `New and Noteworthy` apps in the middle of the page for
    browsing. Touch the arrows in the title bar to advance through the screens of
    apps.


    You can also see highlighted new apps at the top in a “graphic” view. Just touch
    one of the images at the top of the page to see information about that app.


    **NOTE:** As with iTunes, you can download only apps under 21MB while on 3G. Bigger
    apps require a Wi-Fi connection.


    ### View What''s Hot


    Touch the `What''s Hot` button on the top and the hottest apps in the store will
    now be visible on the screen. Again, just scroll through the “hot” apps to see
    if something catches your eye.


    **NOTE:** The fact that an app is in the `What''s Hot` category does not necessarily
    mean you will also believe it is useful or fun. Check out the app descriptions
    and reviews carefully before you purchase anything.


    ![images](images/p531-01.jpg)'
