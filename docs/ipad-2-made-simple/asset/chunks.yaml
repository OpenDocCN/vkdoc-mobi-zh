- fmt: "# Add a Slide\n\nFollow these steps to add a slide:\n\n1. Touch the **Plus**\
    \ button ![images](images/p495-01.jpg) in the lower-left corner.\n2. Choose the\
    \ style of slide you wish to add.\n3. Double-tap to edit the text and use the\
    \ tool buttons to add images or objects as you did before.\n\n![images](images/p495-02.jpg)\n\
    \n# Animation Button\n\nIn `Keynote`, you can customize the transition animation\
    \ from one slide to the next:\n\n4. Touch the `Animation` button ![images](images/p495-03.jpg)\
    \ to see an `Animation` tab next to each slide in the presentation.\n\n**NOTE:**\
    \ You can also add `Magic Moves`, which copies the slide and then lets you change\
    \ aspects and animate those changes.\n\n![images](images/p495-04.jpg)\n\n5. Touch\
    \ the tab to see the `Transitions` menu.\n6. Choose an effect and then tap the\
    \ `Options` button at the bottom to adjust the timing of the transition and whether\
    \ it occurs when tapping the screen or after the previous transition.\n7. Tap\
    \ `Done` in the upper-right corner when you are finished working with transitions.\n\
    \n![images](images/p496-01.jpg)\n\n# The Play Button\n\nTo play the slideshow,\
    \ just touch the `Play` button in the top-right corner. Based on the transition\
    \ settings you set, the presentation will begin to play.\n\n![images](images/p496-02.jpg)\n\
    \n# Sharing Your Work\n\nThe Share function in `iWork` is the same in each of\
    \ the three programs. Touch the `Share` button and five options are presented\
    \ to you: `Email Presentation`, `Share via iWork.com`, `Send to iTunes`, `Copy\
    \ to iDisk`, and `Copy to WebDAV`.\n\n![images](images/p496-03.jpg)\n\n# Email\
    \ Presentation\n\nSending a document, spreadsheet, or presentation via email is\
    \ easy. Close the document, spreadsheet, or presentation, and then tap the `Share`\
    \ command underneath.\n\nChoose `Email Presentation` and your `Mail` app will\
    \ load with the file shown as an attachment. Add a recipient as we showed you\
    \ in [Chapter 13](#Chapter13.html#ch13): “Email on your iPad,” type in your message,\
    \ and then tap `Send`.\n\n![images](images/p497-01.jpg)\n\n# Share via iWork\n\
    \nWhen you touch `Share via iWork.com`, a window pops up, asking you to input\
    \ your Apple ID or your MobileMe ID and password. Input the correct information\
    \ and your file is now stored online for easy retrieval from any computer. This\
    \ is a great way to share and collaborate on work.\n\n![images](images/p497-02.jpg)\n\
    \nOnce you try to use the `iWork.com` service for the first time, you will be\
    \ asked to send a verification email.\n\nCheck the verification email and follow\
    \ the instructions to begin sharing your work online.\n\n![images](images/p497-03.jpg)\n\
    \nLog in to [`www.iwork.com`](http://www.iwork.com), sign in with your Apple ID\
    \ and password, and your `Shared Documents` will now be available.\n\n**TIP:**\
    \ This is a great way to collaborate on work and also to send something from your\
    \ iPad that might be too large to email to someone to view and print.\n\n![images](images/p498-01.jpg)\n\
    \n# Printing a File\n\nTo print any presentation, tap the `Tools` icon (the `Wrench`\
    \ icon) and select `Print`. Then you can select any `AirPrint`-compatible printer\
    \ and adjust number of copies and specific pages to print.\n\n**TIP:** We show\
    \ you details about how to use `AirPrint` and compatible printers in the “Print\
    \ Messages” section of [Chapter 13](#Chapter13.html#ch13): “Email on Your iPad.”\n\
    \n# Faxing a File via E-Fax Service\n\nFaxing a file via an e-fax service is a\
    \ great trick if you are away from your home or office, and you want to get a\
    \ quick print-out or send a quick fax.\n\n**NOTE:** In order to do this, you have\
    \ to first sign up for an electronic fax service such as [`www.efax.com`](http://www.efax.com),\
    \ so you can send faxes as email attachments.\n\nOnce you have your e-fax account,\
    \ you can send the document to a fax machine as an email attachment by following\
    \ these steps:\n\n1. Choose the `Share` ![images](images/U001.jpg) `Email Presentation`\
    \ in any of the apps.\n2. Choose `PDF format`.\n3. Address the email message with\
    \ the fax number in the format required by your e-fax service. Some of the services\
    \ have the following format: `(fax number)@faxsend.com` or `3865551212@faxsend.com`\n\
    4. Once the email is sent, it is converted to a fax by your fax service and sent\
    \ to the appropriate fax machine.\n\n# Export a File\n\nFollow these steps to\
    \ export an `iWork` file:\n\n1. Choose `Share` ![images](images/U001.jpg) `Export`\
    \ in any of the `iWork` apps.\n2. Choose the file type in which you would like\
    \ the document to be transferred to the computer.\n3. Transfers are handled through\
    \ iTunes the next time you connect your iPad to the computer. The usual formats\
    \ are the default for the particular application. You also have a PDF option for\
    \ export.\n\n![images](images/p499-01.jpg)\n\n**NOTE:** `Pages` can export to\
    \ `Word` for Mac or PC, but `Keynote` and `Numbers` cannot yet export to their\
    \ Microsoft PC equivalents (`PowerPoint` and `Excel`). You can always choose to\
    \ export to a PDF file from `Pages`, `Numbers`, and `Keynote`.\n\nIn the next\
    \ section, we will cover how to import these documents into your iPad using file\
    \ sharing.\n\n# File Sharing\n\nFile sharing is the ability to take a document\
    \ that you create in `iWork` and share it via iTunes. File sharing takes place\
    \ in iTunes through the `Apps` tab at the top of the screen. Click `Apps` and\
    \ scroll down to the `File Sharing` section at the bottom of the screen.\n\n**TIP:**\
    \ We also show you how to use file sharing in the “File Sharing” section of [Chapter\
    \ 3](#Chapter03.html#ch3): “Sync with iTunes.”\n\nEach program that is installed\
    \ on your iPad and capable of file sharing is shown at the bottom. Follow these\
    \ steps to retrieve a shared file to your iPad:\n\n1. Click the app from which\
    \ you have shared the file (in this case, `Keynote`). All the documents that you\
    \ have shared on your iPad are shown.\n\n   ![images](images/p500-01.jpg)\n\n\
    2. Highlight the document to save and then touch the `Save To` button in the lower-right\
    \ corner.\n\n   ![images](images/p500-02.jpg)\n\n3. From there, you simply navigate\
    \ to the folder in which you want to save the document.\n4. Now the file is on\
    \ your computer for easy viewing, editing, and printing.\n\n![images](images/p501-01.jpg)\n\
    \n**TIP:** Good alternatives to `Pages`, `Keynote`, and `Numbers` are `Documents\
    \ to Go` and `QuickOffice`. Both of these alternatives are combined into a single\
    \ app, rather than being available as three separate apps.\n\n# Chapter 20\n\n\
    ## iTunes on Your iPad\n\nIn this chapter, you will learn how to locate, buy,\
    \ and download media using the `iTunes` app right on your iPad. With the `iTunes`\
    \ app, you will be able to download music, movies, TV shows, podcasts, and audiobooks.\
    \ You will also be able to download free educational content from leading universities\
    \ with the `iTunes U` service. You will also learn how to redeem iTunes gift cards.\n\
    \nSome of us still remember going to the record store when that new single or\
    \ album came out. It was an exciting feeling, browsing through all the vinyl albums\
    \ (or later, through tapes and CDs), and looking at all the music we wanted.\n\
    \nThose days are pretty much gone with the iPad. All the music, movies, TV shows,\
    \ and more are available right from the iPad itself.\n\niTunes is a music, video,\
    \ TV, podcast, and more store—virtually every type of media you can consume on\
    \ your iPad is available for purchase or rent (and often for free) right from\
    \ the iTunes store.\n\nJust released for iTunes is a new sort of music social\
    \ networking aspect called Ping. You can use this service to follow artists, see\
    \ what your friends are listening to, and more."
