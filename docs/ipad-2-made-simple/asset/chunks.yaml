  trans: '

    #### iPad 相关博客


    拥有 `iPad` 的一大好处是，您会立刻成为全球 `iPad` 用户大家庭的一员。


    许多 `iPad` 用户可归类为“发烧友”，并且是众多 `iPad` 用户群组中的一员。这些用户群组，连同各种论坛和网站，为 `iPad` 用户提供了极好的资源。


    其中许多资源可以直接在您的 `iPad` 上获取，而另一些则是您可能想在电脑上访问的网站。


    有时，您可能想与其他 `iPad` 爱好者交流、提出技术问题，或者了解最新、最劲爆的传言。博客是进行这些活动的好地方。


    以下是一些流行的 `iPad`（以及 `iPhone` 或 `iPod touch`）博客：


    *   [`www.tipb.com`](http://www.tipb.com)

    *   [`www.iphonefreak.com`](http://www.iphonefreak.com)

    *   [`www.gizmodo.com`](http://www.gizmodo.com)（`iPad` 专区）


    **提示：** 在上述任何博客上发布新问题之前，请先在博客中搜索，确保您的问题尚未被提问和回答过。同时，请确保您将问题发布在博客的合适板块（例如，`iPad`）。否则，您可能会因不事先“做功课”而招致社区成员的愤怒！


    此外，您也可以在网上搜索“iPad 博客”或“iPad 新闻与评论”，以找到更多博客。


    ## 第四部分


    ## iPad 2 的灵魂伴侣：iTunes…


    您的 `iPad 2` 与 Apple 的电子商务中心 `iTunes` 密不可分。`iTunes` 不仅是您购买音乐、视频和应用程序的地方，也是您整理可在
    `iPad 2` 上使用的所有精彩内容的地方。使用 `iTunes` 中全新的 `Ping` 社交网络功能，随时了解您最喜爱的艺术家和朋友们的音乐品味。您甚至可以使用
    `Ping` 与朋友会面，并为即将到来的音乐会购买门票。学习如何购买激动人心的新内容——甚至如何免费找到它们。通过 `iTunes U` 学习新知识，或者使用
    `Genius 混曲` 功能为您的音乐库带来全新感受。我们甚至会教您如何利用 `iTunes` 的“家庭共享”功能省钱，该功能现在也适用于您的 `iPad`！


    ## 第 29 章


    ## 您的 iTunes 用户指南


    ![images](img/p683-01.jpg)


    在本章中，我们将向您展示如何使用 `iTunes` 进行几乎所有您可能想要进行的操作。我们涵盖了带有名为 `Ping` 的新酷社交网络功能的 `iTunes`
    10 版本（参见图 29–1）。我们将帮助您安装和更新 `iTunes`，然后带您进行一次导览。我们还将描述用于整理和查看您的音乐与视频的所有绝佳方法，以及如何为您将它们传输到
    `iPad` 做好准备。


    在出版时，`iTunes` 应用程序的最新版本是 10.2.1.1。当您阅读本书时，您的版本可能会稍高，但绝大部分内容将是相似的。


    ![images](img/p683-02.jpg)


    除了 `Ping`，我们还将介绍 `iTunes DJ`、`Genius` 功能以及省钱的 `家庭共享` 功能。我们还将向您展示如何导入音乐 CD、DVD、PDF
    和电子书文件，以及如何为您所有的音乐获取专辑封面。我们甚至会教您如何授权电脑通过 `iTunes` 共享内容。最后，我们将为 `iTunes` 提供一些有用的故障排除技巧。


    **注：** 如果您是初次设置 `iPad`，请查看第 1 章：“开始使用。”如果您正尝试使用 `iTunes` 将电脑与 `iPad` 同步，请查看第 3
    章：“将您的 iPad 与 iTunes 同步。”


    如果您需要在电脑上安装 `iTunes` 软件，请直接跳转到本章稍后的“下载和安装 iTunes 软件”部分。如果您已经安装了 `iTunes` 软件，则请转到“更新
    iTunes 软件”部分，以确保您拥有最新版本。


    ![images](img/2901.jpg)


    **图 29–1.** *显示了 `iTunes` 10.0 版新增的 `Ping` 功能的屏幕*


    ### 检查 iTunes 是否已安装


    ![images](img/p684-01.jpg)


    如果您是 Windows PC 用户，请首先在桌面上寻找 `iTunes` 图标并双击它。如果找不到，请单击左下角的 `Windows` 徽标或 `开始`
    按钮，然后输入“iTunes”。如果在搜索结果中没有看到 `iTunes` 应用程序，那么您可能没有安装 `iTunes`。如果是这种情况，请按照下一节“下载和安装
    iTunes 软件”中的步骤操作。如果 `iTunes` 已安装，您会看到它出现——只需单击其图标启动它，然后跳到“iTunes 导览”部分。


    如果您是 Mac 用户，`iTunes` 默认安装在您的电脑上。检查 `iTunes` 图标是否在您的桌面或桌面 Dock 上。如果看到了，请双击它并跳到“iTunes
    导览”部分。如果您没有看到 `iTunes` 图标，请启动 `Finder`，单击 `应用程序`，然后在按字母顺序排列的应用程序列表中找到 `iTunes`。


    ### 下载和安装 iTunes 软件


    如果您以前从未在电脑上安装过 `iTunes`，可以通过以下步骤直接从 Apple 网站下载软件：


    1.  在电脑上打开一个网页浏览器，例如 Apple 的 `Safari`、Microsoft 的 `Internet Explorer`、Google 的
    `Chrome` 或 Mozilla 的 `Firefox`。

    2.  在浏览器顶部的地址栏中输入网址 [`www.itunes.com/download`](http://www.itunes.com/download)，然后按
    `Enter` 键。该网址同时适用于 Windows PC 和 Mac 用户。

    3.  接下来，如果有选择，请选择匹配您电脑操作系统的软件。

    4.  如果有“运行”或“保存”的选项，请选择 `运行`，以便下载完成后自动开始安装。

    5.  如果安装没有立即开始，请找到您下载的文件（Windows 用户应查找名称类似 `iTunes.exe` 的文件，Mac 用户应查找类似 `iTunes_Install.dmg`
    的文件）。双击安装文件以开始安装。

    6.  按照屏幕上的提示安装 `iTunes`。


    ### 更新 iTunes 软件


    更新您的 `iTunes` 软件很容易，因为该程序默认会检查其版本状态，如果有更新的版本可供下载，它会自动通知您。启动 `iTunes` 后，如果存在更新的
    `iTunes` 版本，您会看到一个弹出窗口。如前所述，版本号将高于图 29–2 中所示的 10.0。


    ![images](img/2902.jpg)


    **图 29–2.** *Apple `软件更新` 屏幕*


    **提示：** 如果您想确保使用的是最新版本，请从 `iTunes` 菜单中选择 `帮助` ![images](img/U001.jpg) `检查更新`。


    ![images](img/p686-01.jpg)


    点击 `下载 iTunes` 后，您将被带到 `iTunes` 网站。为您的电脑选择相应的软件，然后点击 `立即下载` 按钮。


    您也可以通过访问 [`www.iTunes.com`](http://www.itunes.com) 并点击 `下载 iTunes` 按钮来进入此下载页面。


    按照屏幕上的说明在您的电脑上安装更新的 `iTunes`。


    **提示：** 要确定您在 Windows 上的电脑操作系统，请单击左下角的 `开始` 按钮或 `Windows` 徽标。然后，右键单击 `计算机` 并选择
    `属性`。在 Mac 上，单击左上角的 `Apple` 徽标，然后从菜单中选择 `关于本机`。


    ![images](img/p686-02.jpg)

