- fmt: '# Playing Music with Your iPad


    There are many music games and apps for the iPad. The size of the screen and the
    technology of the device make it possible to play just about any instrument using
    the iPad.


    | For years, Mac users have had the ability to learn music using the `GarageBand`
    app on their computers. Recently, Apple introduced the first `GarageBand` app
    for the iPad, and it is spectacular. `GarageBand` allows you to choose whether
    you want to play drums, keyboard, guitar, or bass—all using the touch screen on
    the iPad (see [Figure 22–3](#Chapter22.html#fig_22_3)). | ![images](images/p543-01.jpg)
    |


    `GarageBand` also contains an audio recorder that allows you to create and record
    soundtracks on the iPad. You can even plug in your electric guitar (using a third-party
    adapter) and use the built-in guitar amp to adjust the sound, volume, and tone
    of your instrument.


    ![images](images/2203.jpg)


    **Figure 22–3**. *Play drums, guitar, or keyboards on `GarageBand`.*


    | The new crop of music apps allows you to really use the iPad as an instrument.
    One amazing new app is called `Magic Fiddle`. Made by Smule, this app actually
    lets you play the strings of a violin. `Magic Fiddle` is just US $2.99. Download
    the app and just have fun with it! If you have children, they might enjoy it,
    as well. **NOTE:** This app is not meant to replace your priceless Stradivarius;
    however, it does provide a fun introduction to the violin. | ![images](images/p544-01.jpg)
    |


    ## Playing Magic Fiddle


    You can play `Magic Fiddle` in `StoryBook` mode, either as a solo instrument in
    `Solo` mode or by using the built-in `Songbook` feature to play popular pieces
    (see [Figure 22–4](#Chapter22.html#fig_22_4)).


    To change a string color or key, tap the `Settings` icon on the `Main` screen.


    To play in `Solo` mode, hold the iPad like a violin, resting it on your shoulder
    to play.


    ![images](images/2204.jpg)


    **Figure 22–4.** *`Magic Fiddle`''s screens and controls*


    ## The World View


    Tap the `Back` button and select `World` (see [Figure 22–5](#Chapter22.html#fig_22_5)).
    This shows you a globe with people happily playing the violin in various places
    around the world. Sometimes you will see a duet.


    If you like the way someone is playing, then hit the `Love` icon.


    If you do not like the music you are hearing, then hit the `Next` icon (the two
    right arrows).


    ![images](images/2205.jpg)


    **Figure 22–5.** *`Magic Fiddle`''s World view—watching others play the violin*


    # Game Center


    | Last year, Apple introduced a new concept to portable gaming: `Game Center`.
    `Game Center` is a place for you to meet up with friends, invite friends to play
    a game, or to share accomplishments from games you and your friends both play.
    | ![images](images/p546-01.jpg) |


    ## Setting up Game Center


    | The first time you start `Game Center` from your iPad, you will be asked to
    either sign in using your `Apple ID` and password or your `MobileMe ID` and password.
    Input your biographical information and then input an email address (or several
    email addresses) to authenticate `Game Center` use. | ![images](images/p547-01.jpg)
    |


    **TIP**: If you register and verify several email addresses, it will be easier
    for your friends to find you on `Game Center` and invite you to become part of
    their `Game Center` network.


    | Make sure that the `Allow Game Invites` and `Find me By Email` buttons are turned
    **ON**, so that your friends can ask you to play. | ![images](images/p547-02.jpg)
    |


    ## Using Game Center


    Once you have set up `Game Center`, the fun begins. Start `Game Center` and you
    will see how many friends you have, how many `Game Center` games you have, and
    how many achievements you have earned. All this is visible from the `Me` tab ![images](images/p548-01.jpg)
    at the bottom.


    Touch the `Friends` tab ![images](images/p548-02.jpg) and you will see how many
    `Game Center` friends you have. It appears that this maxes out at 500 friends.


    Touch the `Games` tab ![images](images/p548-03.jpg) and you will see how many
    `Game Center` games are on your device.


    **NOTE**: Once you have a `Game Center` account, you can log in from any iOS device
    to see your games, friends, and achievements.


    Touch the `Requests` tab ![images](images/p548-04.jpg) to either see pending requests
    or touch the **+** sign to invite contacts (through email addresses) to become
    your `Game Center` friends.


    ## Playing a Multiplayer Game


    Some `Game Center` games allow you to play (and invite) a `Game Center` friend
    to a one-on-one game. Some games will match you up with other players online,
    while others only allow you to share your achievements with your friends.


    | The screenshot to the right shows the `Game Center` with several games enabled:
    Some games only allow the user to share achievements, whereas others allow the
    user to play against friends or to get matched up online. | ![images](images/p549-01.jpg)
    |


    In a multiplayer game (like `Adrenaline Golf`), you can start the game either
    from within `Game Center` or from the game''s icon on the iPad.


    | The screenshot to the right displays your options when a user chooses `Play
    Multiplayer` in `Adrenaline Golf`. Doing so brings up options for `Automatic Match
    Making` or `GameCenter Invite`. Choosing `Automatic Match Making` prompts the
    iPad to find opponents for the user to play against. | ![images](images/p549-02.jpg)
    |


    # Other Fun Stuff: Sports on the iPad


    | There are so many great apps that can provide users with endless hours of entertainment
    on the iPad. Since the iPad 2 was released just before Spring of 2011, `March
    Madness`, `NBA Basketball`, `MLB Spring Training`, and many more apps were underway.
    `At Bat 2011 for iPad` is a US $14.99 application that is well worth the entry
    fee for any baseball fan. It also highlights the iPad''s capabilities. | ![images](images/p550-01.jpg)
    |

    | The `NCAA March Madness On Demand` app allowed users to keep track of every
    game of this year''s college basketball tournament. The `March Madness` app actually
    had a live TV feed, so that every game broadcast could be played on the iPad.
    This seems to be the direction that other apps are moving in, providing not only
    game-time stats and news, but also allowing users to watch live sports on the
    iPad. This is very cool! | ![images](images/p550-02.jpg) |


    | The `NBA Game Time Courtside` app allows me to follow my Celtics on their march
    through the regular season and into the playoffs. During each regular season game,
    I can see who is on the court and follow the scoring in real time right on my
    iPad! | ![images](images/p551-01.jpg) |


    # Chapter 23


    # Social Networking


    Your iPad can help keep you in touch with others in lots of innovative ways that
    go far beyond what e-mail and the Web traditionally enable.


    Some of the most popular places to “connect” these days are those sites that are
    often called *social networking sites*—places that allow you to create your own
    page and connect with friends and family to see what is going in their lives.
    Some of the most popular web sites for social networking include Facebook, Twitter,
    and LinkedIn.


    In this chapter, we will show you how to access these various sites. You will
    learn how to update your status, *tweet*, and keep track of those who are both
    important or simply of interest to you.


    We will also introduce you to some great third-party apps that give you access
    to some of the social networking features in a new, innovative manner.'
