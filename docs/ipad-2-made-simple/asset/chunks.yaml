    \ to see, then you might want to turn on the **White on Black** setting. Follow\
    \ these steps to change this setting:\n\n1.  Get into the **Accessibility** screen\
    \ in the **Settings** app, as shown previously.\n2.  Set the **White on Black**\
    \ switch to **ON**.\n\nWith this setting **ON**, everything that is light on the\
    \ screen becomes black, and everything that is dark or black becomes white."
