- fmt: "#### How Are My Notes Sorted?\n\nYou see that all notes are listed in reverse\
    \ chronological order, with the most recently edited notes at the top and the\
    \ oldest at the bottom. The date that is shown is the last time and date that\
    \ the particular note was edited, not when it was first created. Thus you will\
    \ notice the order of your notes moving around on the screen. This sorting can\
    \ be a good thing because your most recent (or frequently edited) notes will be\
    \ right at the top.\n\n**TIP:** If you want a nice app to keep track of your to-do\
    \ lists, you should check out the **Appigo Todo.** It is currently US $4.99 in\
    \ the App Store.\n\n| ![images](images/p588-01.jpg) |     |\n| -----------------------------\
    \ | --- |\n\n#### Adding a New Note\n\nTo start a new note, touch the **Plus Sign\
    \ (+)** in the upper-right corner.\n\nThe notepad is blank, and the keyboard pops\
    \ up for you to begin typing. You can hide the keyboard if you wish by tapping\
    \ the **Hide Keyboard** key in the bottom-right corner.\n\n**TIP:** You can change\
    \ the font for **Notes** in your **Settings** app. Apple has changed the choices\
    \ once already, but at publishing time the three choices were Noteworthy, Helvetica,\
    \ and the original Marker Felt.\n\n#### Adding a Title to the Note\n\nThe first\
    \ few words you type before you hit the **Return** key will become the title of\
    \ the note. So think about what you want as the title and type that first. In\
    \ the image shown to the right, “**Grocery list**” becomes the title of the note.\
    \ Put a new item on each line and tap the **Return** key to go to the next line.\n\
    \n**NOTE: ABOUT SAVING NOTES**  \nThe nice thing is that you never have to click\
    \ a **\"Save\"** button because your note is saved automatically as soon as you\
    \ are done typing it.\n\n| ![images](images/p589-01.jpg) |     |\n| -----------------------------\
    \ | --- |\n\nWhen you are done editing your note, you can do any of the following:\n\
    \n- To exit the app, press the **Home** button to exit the **Notes** app.\n- If\
    \ you are in **Portrait** mode, tap the **Notes** button ![images](images/p589-02.jpg)\
    \ in the top-left corner to see the list of notes.\n- If you are in **Landscape**\
    \ mode, tap any other note to view it.\n\n#### Searching for Notes\n\nAfter you\
    \ end up with more than a few notes, you'll want to know how to quickly find a\
    \ note. Tap in the **Search** bar at the top of the list of notes and type one\
    \ or more words. All the notes where those words exist in the note's title or\
    \ body will be instantly listed.\n\n| ![images](images/p589-03.jpg) |     |\n\
    | ----------------------------- | --- |\n\n#### Editing Your Notes\n\nYou can\
    \ easily edit or change the contents of a note. For example, you might keep a\
    \ “Things to Do” note and quickly edit it when you think of something else to\
    \ add to the list (or when your family reminds you to get something from the store!).\n\
    \nTap the “Things to Do” note from the list of notes or tap the **Search** window\
    \ and type “things” to quickly find it.\n\nTo start editing, touch the screen\
    \ anywhere; the cursor moves to that spot for editing.\n\nIf you double-tap a\
    \ word, the blue handles used in copy and paste appear. (See [Chapter 2](#Chapter02.html#ch2):\
    \ “Typing Tips, Copy/Paste, and Search” to learn more about copy and paste.)\n\
    \n**TIP:** Using the blue selection handles is the best way to select a large\
    \ amount of text; it is both faster and more precise.\n\nRemember: You can touch\
    \ and hold your finger on a word to make the **Magnifying Glass** icon appear,\
    \ so you can insert the cursor on the exact spot you are looking for. When you\
    \ release your finger, you will see a pop-up menu that has **Select**, **Select\
    \ All**, and—if you've recently copied text—**Paste**.\n\n| ![images](images/p590-01.jpg)\
    \ |     |\n| ----------------------------- | --- |\n\nWhen done editing, tap the\
    \ **Home** button to exit or, if you are in the **Portrait** view, touch the **Notes**\
    \ button to bring up the list of notes. If you are in **Landscape** mode, you\
    \ can tap any other note to view it.\n\n#### Sending a Note via Email\n\nOne convenient\
    \ feature of the **Notes** app is the ability to email a note (see [Figure 24–3](#Chapter24.html#fig_24_3)).\
    \ Let's say we wrote a grocery note and wanted to email it to someone to pick\
    \ up the groceries on the way home. While editing or viewing the note, we could\
    \ touch the **Envelope** icon at the bottom of the screen.\n\n![images](images/2403.jpg)\n\
    \n**Figure 24–3.** *Emailing a note*\n\n##### See the Next or Previous Notes\n\
    \nTo move through multiple notes, just touch the **Arrow** icons at the bottom\
    \ of the screen. If you touch the **Forward** ![images](images/p591-01.jpg) arrow,\
    \ the page turns, and you can see the next note. To go back, just hit the **Back**\
    \ ![images](images/p591-02.jpg) arrow.\n\n| ![images](images/p591-03.jpg) |  \
    \   |\n| ----------------------------- | --- |\n\n##### Deleting Notes\n\nTo delete\
    \ a note, tap it to open it from the main **Notes** screen and then touch the\
    \ **Trash Can** icon at the bottom. The iPad then prompts you to **Delete Note.**\
    \ Click this button to do so. To cancel, tap your finger anywhere else on the\
    \ screen besides the **Delete Note** button.\n\n| ![images](images/p591-04.jpg)\
    \ |     |\n| ----------------------------- | --- |\n\n#### Creating a New Calendar\
    \ Event from an Underlined Day and Time\n\nTry typing in the words “tomorrow morning”\
    \ or “at 9:30pm tomorrow” in a note, and then save it. The next time you open\
    \ that note, you will see that the words have been underlined. If you touch and\
    \ hold the underlined words, you will see a button asking if you want to **Create\
    \ Event**. Tap the button to create a new **Calendar** event for the underlined\
    \ date and time.\n\n| ![images](images/p592-01.jpg) |     |\n| -----------------------------\
    \ | --- |\n\n**TIP:** Whenever date and time words are underlined, the iPad recognizes\
    \ them as potential **Calendar** events. This works in notes, email messages,\
    \ and other places on your iPad."
  raw: '#### How Are My Notes Sorted?


    | You see that all notes are listed in reverse chronological order, with the most
    recently edited notes at the top and the oldest at the bottom.The date that is
    shown is the last time and date that the particular note was edited, not when
    it was first created. Thus you will notice the order of your notes moving around
    on the screen.This sorting can be a good thing because your most recent (or frequently
    edited) notes will be right at the top.**TIP:** If you want a nice app to keep
    track of your to-do lists, you should check out the **Appigo Todo.** It is currently
    US $4.99 in the App Store. | ![images](images/p588-01.jpg) |


    #### Adding a New Note


    To start a new note, touch the **Plus Sign (+)** in the upper-right corner.


    The notepad is blank, and the keyboard pops up for you to begin typing. You can
    hide the keyboard if you wish by tapping the **Hide Keyboard** key in the bottom-right
    corner.


    **TIP:** You can change the font for **Notes** in your **Settings** app. Apple
    has changed the choices once already, but at publishing time the three choices
    were Noteworthy, Helvetica, and the original Marker Felt.


    #### Adding a Title to the Note


    | The first few words you type before you hit the **Return** key will become the
    title of the note. So think about what you want as the title and type that first.
    In the image shown to the right, “**Grocery list**” becomes the title of the note.Put
    a new item on each line and tap the **Return** key to go to the next line.**NOTE:
    ABOUT SAVING NOTES**The nice thing is that you never have to click a **"Save"**
    button because your note is saved automatically as soon as you are done typing
    it. | ![images](images/p589-01.jpg) |


    When you are done editing your note, you can do any of the following:


    *   To exit the app, press the **Home** button to exit the **Notes** app.

    *   If you are in **Portrait** mode, tap the **Notes** button ![images](images/p589-02.jpg)
    in the top-left corner to see the list of notes.

    *   If you are in **Landscape** mode, tap any other note to view it.


    #### Searching for Notes


    | After you end up with more than a few notes, you''ll want to know how to quickly
    find a note. Tap in the **Search** bar at the top of the list of notes and type
    one or more words.All the notes where those words exist in the note''s title or
    body will be instantly listed. | ![images](images/p589-03.jpg) |


    #### Editing Your Notes


    You can easily edit or change the contents of a note. For example, you might keep
    a “Things to Do” note and quickly edit it when you think of something else to
    add to the list (or when your family reminds you to get something from the store!).


    Tap the “Things to Do” note from the list of notes or tap the **Search** window
    and type “things” to quickly find it.


    To start editing, touch the screen anywhere; the cursor moves to that spot for
    editing.


    If you double-tap a word, the blue handles used in copy and paste appear. (See
    [Chapter 2](#Chapter02.html#ch2): “Typing Tips, Copy/Paste, and Search” to learn
    more about copy and paste.)


    **TIP:** Using the blue selection handles is the best way to select a large amount
    of text; it is both faster and more precise.


    | Remember: You can touch and hold your finger on a word to make the **Magnifying
    Glass** icon appear, so you can insert the cursor on the exact spot you are looking
    for.When you release your finger, you will see a pop-up menu that has **Select**,
    **Select All**, and—if you''ve recently copied text—**Paste**. | ![images](images/p590-01.jpg)
    |


    When done editing, tap the **Home** button to exit or, if you are in the **Portrait**
    view, touch the **Notes** button to bring up the list of notes. If you are in
    **Landscape** mode, you can tap any other note to view it.


    #### Sending a Note via Email


    One convenient feature of the **Notes** app is the ability to email a note (see
    [Figure 24–3](#Chapter24.html#fig_24_3)). Let''s say we wrote a grocery note and
    wanted to email it to someone to pick up the groceries on the way home. While
    editing or viewing the note, we could touch the **Envelope** icon at the bottom
    of the screen.


    ![images](images/2403.jpg)


    **Figure 24–3.** *Emailing a note*


    ##### See the Next or Previous Notes


    | To move through multiple notes, just touch the **Arrow** icons at the bottom
    of the screen. If you touch the **Forward** ![images](images/p591-01.jpg) arrow,
    the page turns, and you can see the next note. To go back, just hit the **Back**
    ![images](images/p591-02.jpg) arrow. |

    | ![images](images/p591-03.jpg) |


    ##### Deleting Notes


    | To delete a note, tap it to open it from the main **Notes** screen and then
    touch the **Trash Can** icon at the bottom.The iPad then prompts you to **Delete
    Note.** Click this button to do so.To cancel, tap your finger anywhere else on
    the screen besides the **Delete Note** button. | ![images](images/p591-04.jpg)
    |


    #### Creating a New Calendar Event from an Underlined Day and Time


    | Try typing in the words “tomorrow morning” or “at 9:30pm tomorrow” in a note,
    and then save it.The next time you open that note, you will see that the words
    have been underlined. If you touch and hold the underlined words, you will see
    a button asking if you want to **Create Event**.Tap the button to create a new
    **Calendar** event for the underlined date and time. | ![images](images/p592-01.jpg)
    |


    **TIP:** Whenever date and time words are underlined, the iPad recognizes them
    as potential **Calendar** events. This works in notes, email messages, and other
    places on your iPad.'
  trans: "\n#### 我的笔记是如何排序的？\n\n你会看到所有笔记按时间倒序排列，最近编辑的笔记排在最前面，最旧的排在底部。显示的是该笔记**最后编辑**的日期和时间，而非最初创建的时间。因此你会注意到笔记的顺序在屏幕上会发生变化。这种排序是个好设计，因为你最近（或频繁编辑的）的笔记会始终位于顶部。\n\
    \n**提示：** 如果你想要一款好用的待办事项应用，不妨试试 **Appigo Todo**。目前在 App Store 中的售价为 4.99 美元。\n\
    \n| ![images](img/p588-01.jpg) |     |\n| ----------------------------- | ---\
    \ |\n\n#### 添加新笔记\n\n要新建笔记，请点击右上角的 **加号 (+)**。\n\n此时记事本为空白状态，键盘会自动弹出供你开始输入。如果你希望隐藏键盘，只需点击右下角的\
    \ **隐藏键盘** 键即可。\n\n**提示：** 你可以在 **设置** 应用中更改 **备忘录** 的字体。Apple 已经更改过一次字体选项，但在本书写作时，可选的三种字体分别是\
    \ Noteworthy、Helvetica 和最初的 Marker Felt。\n\n#### 为笔记添加标题\n\n在按下 **回车** 键之前输入的前几个字将成为笔记的标题。因此，请先想好标题内容再输入。在右侧显示的图片中，“**购物清单**”成为了笔记的标题。每行输入一个新项目，然后按\
    \ **回车** 键换行。\n\n**注意：关于保存笔记**  \n好在你不必点击 **“保存”** 按钮，因为当你完成输入后，笔记会自动保存。\n\n|\
    \ ![images](img/p589-01.jpg) |     |\n| ----------------------------- | --- |\n\
    \n编辑完笔记后，你可以执行以下任一操作：\n\n- 若要退出应用，请按下 **主屏幕** 按钮退出 **备忘录** 应用。\n- 如果你处于 **竖屏**\
    \ 模式，请点击左上角的 **备忘录** 按钮 ![images](img/p589-02.jpg) 以查看笔记列表。\n- 如果你处于 **横屏** 模式，请点击其他笔记来查看。\n\
    \n#### 搜索笔记\n\n当笔记数量增多时，你会希望知道如何快速找到某条笔记。在笔记列表顶部的 **搜索** 栏中点击并输入一个或多个词语。所有标题或正文中包含这些词语的笔记会立即显示出来。\n\
    \n| ![images](img/p589-03.jpg) |     |\n| ----------------------------- | ---\
    \ |\n\n#### 编辑笔记\n\n你可以轻松编辑或修改笔记内容。例如，你可以保留一张“待办事项”笔记，并在想到要添加其他项目时快速编辑（或者当家人提醒你需要从商店买某样东西时！）。\n\
    \n从笔记列表中点击“待办事项”笔记，或者点击 **搜索** 窗口并输入“待办事项”以快速找到它。\n\n要开始编辑，请点击屏幕上的任意位置；光标会移动到该位置供你编辑。\n\
    \n如果你双击一个词，将会出现用于复制和粘贴的蓝色手柄。（详见 第 2 章：“打字技巧、复制/粘贴和搜索”，了解更多关于复制与粘贴的内容。）\n\n**提示：**\
    \ 使用蓝色选择手柄是选择大量文本的最佳方式；它既快捷又精准。\n\n请记住：你可以长按某个单词来显示 **放大镜** 图标，从而将光标精确插入到你想要的位置。当你松开手指时，会看到一个包含\
    \ **选择**、**全选** 的弹出菜单——如果你最近复制过文本，还会出现 **粘贴** 选项。\n\n| ![images](img/p590-01.jpg)\
    \ |     |\n| ----------------------------- | --- |\n\n编辑完成后，点击 **主屏幕** 按钮退出；如果你处于\
    \ **竖屏** 视图，请点击 **备忘录** 按钮以调出笔记列表。如果你处于 **横屏** 模式，则可以点击其他笔记来查看。\n\n#### 通过电子邮件发送笔记\n\
    \n**备忘录** 应用的一项便捷功能是能够通过电子邮件发送笔记（见图 24–3）。假设我们写好了一张购物清单，想通过电子邮件发给某人，让其在回家路上顺便采购。在编辑或查看笔记时，我们可以点击屏幕底部的\
    \ **信封** 图标。\n\n![images](img/2403.jpg)\n\n**图 24–3.** *通过电子邮件发送笔记*\n\n##### 查看上一篇或下一篇笔记\n\
    \n要浏览多篇笔记，只需点击屏幕底部的 **箭头** 图标。如果点击 **向前** ![images](img/p591-01.jpg) 箭头，页面会翻转，显示下一则笔记。要返回，只需点击\
    \ **向后** ![images](img/p591-02.jpg) 箭头即可。\n\n| ![images](img/p591-03.jpg) |  \
    \   |\n| ----------------------------- | --- |\n\n##### 删除笔记\n\n要删除笔记，请先在主 **备忘录**\
    \ 屏幕中点击打开该笔记，然后点击底部的 **垃圾桶** 图标。iPad 会提示你 **删除笔记**。点击此按钮即可删除。若要取消，请点击屏幕上 **删除笔记**\
    \ 按钮之外的任意位置。\n\n| ![images](img/p591-04.jpg) |     |\n| -----------------------------\
    \ | --- |\n\n#### 从带有下划线的日期和时间创建新的日历事件\n\n尝试在笔记中输入“明天早上”或“明天晚上 9:30”等词语，然后保存。下次打开该笔记时，你会发现这些词语已被添加下划线。如果你长按带有下划线的词语，会出现一个按钮询问是否要\
    \ **创建事件**。点击该按钮即可为带下划线的日期和时间新建一个 **日历** 事件。\n\n| ![images](img/p592-01.jpg) |\
    \     |\n| ----------------------------- | --- |\n\n**提示：** 每当日期和时间词语带有下划线时，iPad\
    \ 都会将其识别为潜在的 **日历** 事件。此功能适用于笔记、电子邮件以及 iPad 上的其他应用。\n"
- fmt: '### Another Note App: Evernote (Free for Basic Use)


    A visit to the App Store will show you many note-taking apps designed for the
    iPad.


    To learn about some of the most popular notes-related apps, check out this list
    of the top five such apps from TiPb.com:


    `www.tipb.com/2010/03/05/tipb-top-5-iphone-note-apps-2/`


    | **Evernote** is one of the more popular notes apps that is free for basic use.
    If you need to have more storage space, you can pay a monthly or annual service
    plan. Check on the App Store or [`www.evernote.com`](http://www.evernote.com)
    for the latest prices and features. **Evernote** is great because, when you enter
    a note in **Evernote**, you can *auto-synchronize* it with your Mac, iPhone, BlackBerry,
    or PC. All text is searchable, and you can even use **Evernote** to *geo-locate*
    (have your iPad track your location and tie it to a particular note). | ![images](images/p592-02.jpg)
    |


    **TIP**: You can even record voice notes with **Evernote**.


    ### Getting Started with Evernote


    | Start by going to the App Store and downloading **Evernote**. Once **Evernote**
    is downloaded and installed, you need to touch the **Evernote** icon to start
    the application. The first time you use **Evernote**, you will be prompted to
    sign up for a free account. Type in your email address and set a password, and
    you are ready to start. | ![images](images/p593-01.jpg) |


    ### Adding and Tagging Notes


    | The **Home** screen shows you your notes. To add a new note, just touch the
    **New note** button in the lower-left corner and type your note. ![images](images/p593-02.jpg)
    | ![images](images/p593-03.jpg) |

    | Give your note a unique title and then add some tags to the note. These tags
    are used to help organize your notes, and they can be useful when searching through
    your notes. In this example, we have set several tags, including "book," "todo,"
    and "work." If we add those tags to appropriate notes, then the notes can be sorted
    by those individual tags. ![images](images/p594-01.jpg) | ![images](images/p594-02.jpg)
    |


    Once you type a few tags separated by commas, these are added to a pulldown list,
    so they are easier to select in the future. This also helps you avoid mistyping
    any of your tags (see [Figure 24–4](#Chapter24.html#fig_24_4)).


    ![images](images/2404.jpg)


    **Figure 24–4.** *Tagging a note in **Evernote***


    ### Adding a Voice Recording a Note in Evernote


    | By tapping the **Microphone** icon in the Upper Bar when you are adding or editing
    a note, you can record your voice (or anything else around you) to add to your
    current note (see [Figure 24–5](#Chapter24.html#fig_24_5)). | ![images](images/p595-01.jpg)
    |


    ![images](images/2405.jpg)


    **Figure 24–5.** *Adding a voice recording to a note in **Evernote***


    ### Adding a Picture from Your Library to Your Note


    | You can easily add any picture from your Photo library to a note in **Evernote**
    by touching the **Photos** icon in the top of the **Edit Note** window (next to
    the **Save** button (see [Figure 24–6](#Chapter24.html#fig_24_6)). **Evernote**
    will even identify the text in the picture and make that text searchable. | ![images](images/p595-02.jpg)
    |


    ![images](images/2406.jpg)


    **Figure 24–6.** *Adding a photo from your library to a note in **Evernote***


    ### Emailing, Printing, Deleting, or Editing a Note


    | You may email or print your notes by touching the **Send** icon at the bottom
    of the screen, and then select it just as you would in the **Notes** app. | ![images](images/p596-01.jpg)
    |

    | To delete a note, tap the **Trash Can** icon on the Bottom Bar. | ![images](images/p596-02.jpg)
    |

    | Sometimes, you want to be sure you are seeing the latest information on your
    note, or you want to make sure the information you just added is synced to the
    Evernote server. To do this, tap the **Refresh** icon. | ![images](images/p596-03.jpg)
    |

    | To edit a note, just touch the **Pencil** icon at the bottom of the screen.
    This brings up the **Editing** screen. | ![images](images/p596-04.jpg) |


    ### Various Views of Notes in Evernote


    You have various options for customizing the way you view your notes in **Evernote**.
    Select any of the views listed across the top of the main screen: **All notes**,
    **Notebooks**, **Tags**, **Places**, or **Searches**.


    ![images](images/p596-05.jpg)


    Touch **All notes** to view all your notes.


    Touch **Notebooks** to see all your notebooks (see [Figure 24–7](#Chapter24.html#fig_24_7)).


    ![images](images/2407.jpg)


    **Figure 24–7.** ***Evernote**''s **Notebooks**, **Tags**, and **All Notes** views*


    ### The Evernote Places View


    One cool **Evernote** view is the **Places** view. You can have **Evernote** tag
    your notes by the place where you created them. For example, if you traveled to
    another state, province, or country, **Evernote** would track that you took notes
    in that particular region.


    [Figure 24–8](#Chapter24.html#fig_24_8) shows a note taken in California and several
    taken in Florida.


    ![images](images/2408.jpg)


    **Figure 24–8.** *The **Evernote Places** view*


    ### Evernote Viewing Options


    You have various options to customize the views of your notes in **Evernote**.
    Tap the **View options** tab under the **Search** box in the upper-right corner
    to customize your current view. In [Figure 24–9](#Chapter24.html#fig_24_9), we
    have customized the view by selecting **Title** for **Sort By** and **Thumbnails**
    for **View by**.


    ![images](images/2409.jpg)


    **Figure 24–9\. *Evernote***''s ***All Notes** view with the viewing options shown*


    ### Evernote Synchronization and Settings


    To synchronize your notes with the **Evernote** server for retrieval on your Mac,
    PC, or other Evernote-connected device (such as a BlackBerry or iPhone), you would
    touch the **Radar Dish** icon in the lower-right portion of the screen to make
    the **Settings** screen appear (see [Figure 24–10](#Chapter24.html#fig_24_10)).


    If you scroll down the **Settings** screen, you can check out the total usage
    of your Free (or paid) account.


    The Free account gives you 40 MB of data, which is more than 100,000 text notes.
    Tap the **Approximate notes remaining** option to get a feel for how many picture
    or voice notes this might include.


    If you are running out of space, then you might want to upgrade by touching **Go
    Premium** option in the top of the **Synchronization** window.


    ![images](images/2410.jpg)


    **Figure 24–10\. *Evernote***''s ***Settings** screens*


    ### Viewing or Updating Notes in Evernote on Your Computer or Other Mobile Device


    One of the cool things about **Evernote** is that it wirelessly synchronizes or
    shares notes with your account on the Evernote server. You can then log in to
    your account from your PC, Mac, iPhone, or BlackBerry to check out or update your
    notes. This is a great feature if you have multiple devices, and you would like
    to stay up-to-date or add notes from any of them. In [Figure 24–11](#Chapter24.html#fig_24_11),
    we logged into the [`www.evernote.com`](http://www.evernote.com) site and saw
    the same notes that we were creating and viewing on our iPad.


    ![images](images/2411.jpg)


    **Figure 24–11. *Evernote*** *syncs notes automatically to your account on the
    web.*


    ## Chapter 25'
