- fmt: "# Bluetooth on the iPad\n\nIn this chapter, we will show you how to pair your\
    \ iPad with any Bluetooth device, whether it be another computer, stereo speakers,\
    \ or a wireless keyboard accessory. Many iPad users are surprised to find out\
    \ that the iPad actually ships with Bluetooth 2.1 and its enhanced data rate (EDR)\
    \ technology. Thanks to the technology known as A2DP (Stereo Bluetooth), you can\
    \ also stream your music to a capable Bluetooth stereo.\n\n**NOTE:** You must\
    \ have a capable third-party Bluetooth adapter or Bluetooth stereo to stream your\
    \ music via Bluetooth technology. Also, there is now AVRCP profile support, so\
    \ many music controls on a Bluetooth device (including `Play`, `Pause`, or `Skip`)\
    \ will work fine.\n\nYou can think of Bluetooth as a short-range, wireless technology\
    \ that allows your iPad to connect to various peripheral devices without wires.\
    \ Popular devices are headsets, computers, and vehicle sound systems.\n\nBluetooth\
    \ is believed to be named after a Danish Viking and king, Harald Blåtand, whose\
    \ name has been translated as *Bluetooth*. King Blåtand lived in the tenth century\
    \ and is famous for uniting Denmark and Norway. Similarly, Bluetooth technology\
    \ unites computers and telecom. According to legend, his name derives from his\
    \ very dark hair, which was unusual for Vikings. Blåtand means dark complexion.\
    \ There does exist a more popular story that the king loved to eat blueberries,\
    \ so much so that his teeth became stained the color blue.\n\nWe used the following\
    \ links as our sources for this information; they also serve as good places to\
    \ learn more about King Blåtand:\n\n*   [`http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf`](http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf)\n\
    *   [`http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm`](http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm)\n\
    *   [`http://www.britannica.com/eb/topic-254809/Harald-I`](http://www.britannica.com/eb/topic-254809/Harald-I)\n\
    \n## Understanding Bluetooth\n\n| Bluetooth allows your iPad to communicate with\
    \ things wirelessly. Bluetooth is a small radio that transmits from each device.\
    \ Before you can use a peripheral with the iPad, you have to *pair* it with that\
    \ device to connect it to the peripheral. Many Bluetooth devices can be used up\
    \ to 30 feet away from the iPad. | ![images](images/p602-01.jpg) |\n\n### Bluetooth\
    \ Devices that Work with the iPad\n\nAmong other things, the iPad works with Bluetooth\
    \ headphones, Bluetooth stereo systems and adapters, Bluetooth car stereo systems,\
    \ and Bluetooth wireless keyboards. The iPad supports A2DP, which is known as\
    \ *Stereo Bluetooth*.\n\n**NOTE**: With iOS 4.3, the iPad 2, can also pair with\
    \ an iPhone 3GS or iPhone 4 for BT tethering.\n\n## Pairing with a Bluetooth Device\n\
    \nYour primary uses for Bluetooth might be with Bluetooth headphones, Bluetooth\
    \ stereo adapters, or a Bluetooth keyboard. Any Bluetooth headphones should work\
    \ well with your iPad. To start using any Bluetooth device, you need to first\
    \ pair (connect) it with your iPad.\n\n### Turn on Bluetooth\n\nThe first step\
    \ to using Bluetooth is to turn the Bluetooth radio `ON`. Follow these steps to\
    \ do so:\n\n![images](images/p602-04.jpg)\n\n1.  Tap your `Settings` icon.\n\n\
    \    ![images](images/p602-02.jpg)\n\n2.  Next, touch the `General` tab in the\
    \ left column.\n\n    ![images](images/p602-03.jpg)\n\n3.  You will see the `Bluetooth`\
    \ tab in the right-hand column. By default, Bluetooth is initially `OFF` on the\
    \ iPad. Tap the switch to move it to the `ON` position.\n\n**TIP:** Bluetooth\
    \ is an added drain on your battery. If you don't plan on using Bluetooth for\
    \ a period of time, think about setting the switch back to `OFF`.\n\n![images](images/p603-01.jpg)\n\
    \n### Pairing an iPad with Headphones or Any Bluetooth Device\n\nAs soon as you\
    \ set Bluetooth to `ON`, the iPad will begin to search for any nearby Bluetooth\
    \ devices—like a Bluetooth headset or keyboard (see [Figure 25–1](#Chapter25.html#fig_25_1)).\
    \ For the iPad to find your Bluetooth device, you need to put that device into\
    \ *pairing mode*. Read the instructions carefully that came with your headset—usually\
    \ there is a combination of buttons to push to achieve this.\n\n**TIP:** Some\
    \ headsets require you to press and hold a button for five seconds until you see\
    \ a series of flashing blue or red/blue lights. Some accessories, such as the\
    \ Apple wireless Bluetooth keyboard, automatically start up in pairing mode.\n\
    \nOnce the iPad detects the Bluetooth device, it will attempt to automatically\
    \ pair with it. If pairing takes place automatically, there is nothing more for\
    \ you to do.\n\n![images](images/2501.jpg)\n\n**Figure 25–1.** *A Bluetooth device\
    \ discovered, but not yet paired*\n\nIf the image in [Figure 25–2](#Chapter25.html#fig_25_2)\
    \ stays unchanged, then tap the device (e.g., the Motorola Stereo Bluetooth Headphones)\
    \ to bring up a pop-up window that asks for a pairing ID.\n\n**NOTE:** In the\
    \ case of a Bluetooth device such as a keyboard, you maybe asked to enter a randomly-generated\
    \ series of numbers (passkey) on the keyboard itself. Other devices may not ask\
    \ for a PIN at all—just touch the device name and the status will change to `Connected`\
    \ (see [Figure 25–2](#Chapter25.html#fig_25_2).)\n\n![images](images/2502.jpg)\n\
    \n**Figure 25–2.** *To pair a Bluetooth device, touch the listed device for the\
    \ passkey (if needed) or simply connect the device to the iPad.*\n\n| If the iPad\
    \ asks for a PIN or pass code to be entered, the keyboard will be displayed, and\
    \ you will need to enter the four-digit pass code supplied by the headset manufacturer.\
    \ Most devices use 0000 or 1234, which is why the iPad can try to automatically\
    \ pair with most devices. Check your headset documentation to learn the correct\
    \ pass code or PIN for your device. | ![images](images/p605-01.jpg) |\n\n## Bluetooth\
    \ Stereo (A2DP)\n\n| ![images](images/p605-02.jpg) | One of the great features\
    \ of today's advanced Bluetooth technology is the ability to stream your music\
    \ without wires via Bluetooth. The fancy name for this technology is A2DP, but\
    \ it is usually referred to as *Stereo Bluetooth*. |\n\n### Connect to a Stereo\
    \ Bluetooth Device\n\nThe first step to using Stereo Bluetooth is to connect to\
    \ a capable Stereo Bluetooth device. This can be a car stereo with this technology\
    \ built in, or a pair of Bluetooth headphones or speakers.\n\nPut the Bluetooth\
    \ device into pairing mode per the manufacturer's instructions, and then go to\
    \ the Bluetooth settings page from the `Settings` icon, as demonstrated earlier\
    \ in the chapter.\n\n| Once connected, you will see the new Stereo Bluetooth device\
    \ listed under your Bluetooth devices. Sometimes it will simply be listed as “Headset.”\
    \ Just touch the device and you will see the name of the actual device next to\
    \ the `Bluetooth` tab in the next screen, as shown here. | ![images](images/p605-03.jpg)\
    \ |\n| Next, tap your `iPod` icon and start any song, playlist, podcast, or video\
    \ music library. You will notice the `AirPlay` icon in the upper-left corner of\
    \ the screen (see Chapters 9 and 10 for more information on `AirPlay`). The `AirPlay`\
    \ icon also controls sending your music to a Bluetooth device. Tap the `AirPlay`\
    \ icon to see the available Bluetooth devices for streaming your music (see [Figure\
    \ 25–3](#Chapter25.html#fig_25_3)). **NOTE**: In both the `Now Playing` view and\
    \ the `Current` song view, the `Bluetooth` icon will be up at the top, towards\
    \ the right-hand side of the `Volume` bar. | ![images](images/p606-01.jpg) |\n\
    \n![images](images/2503.jpg)\n\n**Figure 25–3.** *Select a Bluetooth device.*\n\
    \nIn the previous screens, you learned how to select the `Motorola Bluetooth Headset`\
    \ by tapping it. Your music will now start to play from the selected Bluetooth\
    \ device. You can verify this by touching the `Bluetooth` icon on the screen once\
    \ more. You should see the `Speaker` icon next to the new Stereo Bluetooth device,\
    \ and you should hear your music coming from that sound source, as well."
