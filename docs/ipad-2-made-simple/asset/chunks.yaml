- fmt: "# Opening Email Attachments\n\nInstead of immediately opening in the body\
    \ of the email as we just described, other types of attachments, such as spreadsheets,\
    \ word processing documents, and presentation files, will need to be opened manually.\n\
    \n## Tap for `Quick Look` Mode\n\nFollow these steps to open attachments in `Quick\
    \ Look` mode:\n\n1. Open the message with an attachment (see [Figure 13–8](#Chapter13.html#fig_13_8)).\n\
    2. Quickly tap the attachment to instantly open it in `Quick Look` mode. You can\
    \ navigate around the document. Remember you can zoom in or out and swipe up or\
    \ down.\n3. If you open a spreadsheet with multiple tabs or spreadsheets, you\
    \ will see tabs across the top. Touch another tab to open that spreadsheet.\n\
    4. When you are done looking at the attachment, tap the document once to bring\
    \ up the controls, and then tap `Done` in the upper-left corner.\n5. If you have\
    \ apps installed that can open the type of attachment you are viewing (in this\
    \ case, a spreadsheet), then you will see an `Open In` button in the upper-right\
    \ corner. Tap the `Open In` button to open this file in another app.\n\n![images](images/1308.jpg)\n\
    \n**Figure 13–8.** *Quickly viewing attachments by tapping them*\n\n## Opening\
    \ Docs in Other Apps\n\nYou may want to open the attachment in another application.\
    \ For example, you might want to open a `PDF` file in `iBooks`, `Stanza`, or `GoodReader`.\
    \ Follow these steps to do so:\n\n1. Open the email message.\n2. Press and hold\
    \ the attachment until you see the pop-up window.\n3. Select the `Open In` option.\n\
    4. Select the application you would like to use from the list (see [Figure 13–9](#Chapter13.html#fig_13_9)).\n\
    5. Finally, you can edit the document, save it, and email it back to the sender.\n\
    \n![images](images/1309.jpg)\n\n**Figure 13–9.** *Opening and viewing attachments\
    \ in other apps*\n\n## Viewing a Video Attachment\n\nYou may receive a video as\
    \ an attachment to an email. Certain types of videos can be viewed on your iPad\
    \ (see the “Supported Email Attachment Types” section later in this chapter for\
    \ a list of supported video formats). Follow these steps to open a video attachment:\n\
    \n1. Tap the video attachment to open it and view it in the video player.\n2.\
    \ When you are done viewing the video, tap the screen to bring up the player controls.\n\
    3. Tap the `Done` button in the upper-left corner to return to the email message.\n\
    \n# Opening and Viewing Compressed `.zip` Files\n\nYour iPad will not be able\
    \ to open and view a compressed file of `.zip` format unless you install an app\
    \ such as `GoodReader`. At the time of publishing, `GoodReader` was still a free\
    \ app and well worth installing. Follow these steps to use `GoodReader`:\n\n**TIP:**\
    \ Learn how to install and use `GoodReader` in [Chapter 26](#Chapter26.html#ch26):\
    \ “New Media: Reading Newspapers, Magazines, and More.”\n\n1. Install the free\
    \ `GoodReader` from the App Store.\n2. Open the email message with the `.zip`\
    \ file attachment.\n3. Touch and hold the `.zip` attachment until you see a pop-up\
    \ window at the bottom with a button that says, `“Open in GoodReader.”` Tap that\
    \ button to open the `.zip` in `GoodReader`.\n\n    ![images](images/p350-01.jpg)\n\
    \n    **CAUTION:** Do not just quickly tap the attachment to open it. At the time\
    \ of publishing, this resulted in a blank white or black screen with nothing happening.\
    \ Make sure to touch and hold the attachment until you see the button pop-up.\n\
    \n4. `GoodReader` should now open, and your `.zip` file should be at the top of\
    \ the list of files. To open or uncompress the `.zip` file, tap the file and select\
    \ the `Unzip` button.\n\n    ![images](images/p350-02.jpg)\n\n5. Now you should\
    \ see the uncompressed file—in this case, an Adobe `.pdf` file in the list of\
    \ files above the `.zip` file.\n6. Tap that uncompressed file to view it.\n\n\
    \    ![images](images/p351-01.jpg)\n\n7. When you are done reading the attachment,\
    \ double-click your `Home` button and tap the `Mail` icon to return to your reading\
    \ your email.\n\n# Issues When Opening Email Attachments\n\nSome types of attachments\
    \ cannot be opened on your iPad. Such attachments show up with a `Question Mark`\
    \ (`?`) icon. In this image, we tried to click an attachment of the type `winmail.dat`,\
    \ which failed.\n\n![images](images/p351-02.jpg)\n\n## Supported Email Attachment\
    \ Types and Audio/Video Formats\n\nYour iPad supports the following file types\
    \ as attachments:\n\n- `.doc` and `.docx` (`Microsoft Word` documents)\n- `.htm`\
    \ and `.html` (web pages)\n- `.key` (a `Keynote` presentation document)\n- `.numbers`\
    \ (an `Apple Numbers` spreadsheet document)\n- `.pages` (an `Apple Pages` document)\n\
    - `.pdf` (Adobe's portable document format, used by programs such as `Adobe Acrobat`\
    \ and `Adobe Reader`)\n- `.ppt` and `.pptx` (a `Microsoft PowerPoint` presentation\
    \ document)\n- `.txt` (a text file)\n- `.vcf` (a contact file)\n- `.xls` and `.xlsx`\
    \ (a `Microsoft Excel` spreadsheet document)\n- `.mp3` and `.mov` (audio and video\
    \ formats)\n- `.zip` (compressed files). Note that these are only readable if\
    \ you have an app installed that can read them, such as `GoodReader` (see the\
    \ “Opening and Viewing Compressed .zip Files” section in this chapter).\n\nYour\
    \ iPad also supports the following audio formats:\n\n- HE-AAC (V1)\n- AAC (16\
    \ to 320 Kbps)\n- Protected AAC (from iTunes Store)\n- MP3 (16 to 320 Kbps)\n\
    - MP3 VBR\n- Audible (formats 2, 3, and 4)\n- Apple Lossless\n- AIFF\n- WAV\n\n\
    Your iPad also supports the following video formats:\n\n- H.264 video up to 720p\
    \ at 30 frames per second\n- Main Profile level 3.1 with AAC-LC audio up to 160\
    \ Kbps, 48kHz\n- Stereo audio in `.m4v`, `.mp4`, and `.mov` file formats\n- MPEG-4\
    \ video, up to 2.5 Mbps, 640 by 480 pixels, and at 30 frames per second\n- Simple\
    \ Profile with AAC-LC audio up to 160 Kbps, 48kHz, stereo audio in `.m4v`, `.mp4`,\
    \ and `.mov` file formats\n- Motion JPEG (M-JPEG) up to 35 Mbps, 1280 by 720 pixels,\
    \ 30 frames per second, and audio in ulaw\n- PCM stereo audio in `.avi` file format\n\
    \n# Searching for Email Messages\n\nThe iPad has some good built-in search functionality\
    \ to help you find your emails. You can search your `Inbox` by the `From`, `To`,\
    \ `Subject`, or `All` fields. This helps you quickly locate exactly the messages\
    \ you want to find.\n\n![images](images/p352-01.jpg)"
