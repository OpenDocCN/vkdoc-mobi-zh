  trans: "\n### 激活电子邮件搜索\n\n您可以搜索单个收件箱，或通过进入通用收件箱（`所有收件箱`）来同时搜索所有收件箱。\n\n如果向上滚动到顶部，您现在将在`收件箱`顶部看到熟悉的`搜索`栏（请参见图\
    \ 13–10）。\n\n如果您的电子邮件帐户支持此功能，您还可以在服务器上搜索电子邮件消息。在撰写本书时，部分受支持的可搜索电子邮件帐户类型包括`Exchange`、`MobileMe`和`Gmail\
    \ IMAP`。请按照以下步骤在服务器上搜索您的电子邮件：\n\n1.  点击`搜索`栏，查看`搜索`栏下方出现的新软键菜单。\n2.  输入您要搜索的文本。\n\
    3.  点击`搜索`窗口下方的某个软键：\n    1.  `发件人`：仅搜索发件人的电子邮件地址。\n    2.  `收件人`：仅搜索收件人的电子邮件地址。\n\
    \    3.  `主题`：仅搜索消息的`主题`字段。\n    4.  `全部`：搜索消息的所有部分。\n\n例如，假设我想在收件箱中搜索一封来自 Martin\
    \ 的电子邮件。我会在`搜索`框中输入 Martin 的名字，然后点击`发件人`。我的收件箱随后会被过滤，仅显示来自 Martin 的电子邮件。\n\n**注意：**如果您有多个电子邮件帐户，则无法同时搜索所有收件箱，因为您的\
    \ iPad 一次只允许您搜索一个收件箱。要在 iPad 上进行更全局的搜索，请使用第 2 章：“输入技巧、复制/粘贴和搜索”中“使用 Spotlight\
    \ 搜索查找内容”一节介绍的`Spotlight 搜索`功能。\n\n![images](img/1310.jpg)\n\n**图 13–10.** *使用`发件人`、`收件人`、`主题`或`全部`文本字段搜索电子邮件*\n\
    \n### 微调您的电子邮件设置\n\n您可以使用`设置`应用中提供的众多选项，在 iPad 上对您的电子邮件帐户进行微调。\n\n请按照以下步骤更改这些设置：\n\
    \n1.  点击`设置`图标。\n2.  点击`邮件、通讯录、日历`。\n\n以下部分将说明您可以进行的调整。\n\n#### 自动检索电子邮件（获取新数据）\n\
    \n除了`高级`选项之外，您还可以使用`邮件`设置来配置电子邮件被获取（或称*拉取*）到 iPad 的频率。默认情况下，当服务器*推送*新邮件或其他通讯录或日历更新时，您的\
    \ iPad 会自动接收。\n\n您可以按照以下步骤调整此设置：\n\n1.  点击`设置`图标。\n2.  点击`邮件、通讯录、日历`。\n3.  在列出的电子邮件帐户下，点击`获取新数据`。\n\
    \n    ![images](img/p355-01.jpg)\n\n4.  将`推送`设置为`开`（默认），以自动让服务器推送数据。将其设为`关`以节省电池电量。\n\
    5.  调整从服务器拉取数据的时间计划。这决定了应用从服务器拉取新数据的频率。\n\n**注意：**如果您将此选项设置为`每 15 分钟`，您将更频繁地收到更新，但与设置为`每小时`相比，会牺牲电池续航时间。\n\
    \n![images](img/p355-02.jpg)\n\n如果您只想打开 iPad 就看到有新消息，那么自动检索功能非常方便；否则，您需要记得手动检查。\n\
    \n##### 高级推送选项\n\n在`获取新数据`屏幕底部，`每小时`和`手动`设置的下方，您可以点击`高级`按钮，查看一个新屏幕，其中列出了您所有的电子邮件帐户。\n\
    \n点击任意电子邮件帐户以调整其设置。\n\n![images](img/p356-01.jpg)\n\n大多数帐户可以按照您设定的计划`获取`，或设置为`手动`。`手动`选项要求您使用`更新`按钮来检索数据。此屏幕使您能够为您设置的每个帐户调整`获取`、`手动`，某些情况下还有`推送`的设置。\n\
    \n![images](img/p356-02.jpg)\n\n#### 调整您的邮件设置\n\n在`帐户`部分下，您可以在`邮件`中看到所有列出的电子邮件设置。`默认`设置可能对您来说已经适用；但如果需要调整其中任何一项，您可以按照以下步骤操作。\n\
    \n`显示`：这设置了从服务器拉取的邮件数量。您可以指定 25 到 200 条消息（默认为最近的 50 条消息）。\n\n`预览`：此选项允许您设置在`收件箱`预览中，除了`主题`之外还显示多少行文本。您可以将此值从`无`调整为`5\
    \ 行`（默认为`2 行`）。\n\n![images](img/p356-03.jpg)\n\n`最小字体大小`：这是首次打开邮件时显示的默认字体大小。也是您在查看邮件时允许缩放到的最小字号。您的选项有`小`、`中`、`大`、`特大`和`巨大`（默认为`中`）。\n\
    \n`显示收件人/抄送标签`：当此选项为`开`时，您会在收件箱中看到主题前有一个小的`收件人`或`抄送`标签。此标签显示您的地址被放置在了哪个字段中（此选项的默认状态为`关`）。\n\
    \n![images](img/p357-01.jpg)\n\n`删除前询问`：将此选项设为`开`，则每次尝试删除消息时都会询问您（默认为`关`）。\n\n\
    `载入远程图像`：此选项允许您的 iPad 加载某些电子邮件消息中包含的所有图形（远程图像）（此选项的默认值为`开`）。\n\n![images](img/p357-02.jpg)\n\
    \n`按主题整理`：此选项将相关的电子邮件分组在一起。它只显示一条消息，旁边带有一个数字。该数字表示存在多少封相关的邮件。此功能为您提供了一个将所有讨论集中在一个位置的好方法（此选项的默认值为`开`）。\n\
    \n![images](img/p357-03.jpg)\n\n`始终密送给自己`：此选项会向您从 iPad 发送的每封电子邮件发送一封密件抄送（`Bcc:`）到您的电子邮件帐户（此选项的默认值为`关`）。\n\
    \n![images](img/p357-04.jpg)\n\n#### 更改您的电子邮件签名\n\n默认情况下，您发送的电子邮件会显示“发自我的 iPad”。请按照以下步骤更改电子邮件的`签名`行：\n\
    \n1.  点击`签名`选项卡。\n\n    ![images](img/p358-01.jpg)\n\n2.  点击`清除`按钮，然后输入您希望出现在所有从\
    \ iPad 发送的电子邮件底部的新电子邮件签名。\n\n    ![images](img/p358-02.jpg)\n\n3.  完成编辑`签名`字段后，点击左上角的`邮件、通讯录…`按钮。这将使您返回到`邮件`设置屏幕。\n\
    \n#### 更改您的默认邮件帐户（发送自）\n\n如果您在 iPad 上设置了多个电子邮件帐户，您应该将其中一个（通常是您最常用的那个）设置为您的`默认帐户`。当您从`邮件`屏幕选择`写邮件`时，默认帐户总是被选中。此外，如果您在其他应用中点击电子邮件地址来撰写新邮件，也将选择此`默认帐户`。请按照以下步骤更改您默认发送邮件的电子邮件帐户：\n\
    \n1.  点击`默认帐户`选项，您将看到所有电子邮件帐户的列表。\n\n    ![images](img/p358-03.jpg)\n\n2.  点击您希望用作`默认帐户`的那个。\n\
    \n    ![images](img/p359-01.jpg)\n\n3.  完成后，点击`邮件、通讯录…`按钮以返回`邮件`设置菜单。\n\n####\
    \ 切换接收和发送电子邮件的提示音\n\n您可能会注意到每次发送或接收电子邮件时都会有点音效。您听到的是 iPad 上的默认设置。\n\n如果您想禁用此选项或更改它，可以在`设置`程序中进行：\n\
    \n1.  点击您的`设置`图标。\n2.  点击左侧栏中的`通用`。\n3.  点击右侧栏中的`声音`。\n4.  您将看到用于打开或关闭音效的各种开关。点击`新邮件`和`已发送邮件`以调整`开`或`关`选项。\n\
    \n    ![images](img/p359-02.jpg)\n"
- fmt: '### Advanced Email Options


    **NOTE:** Email accounts set up as Exchange, IMAP, or MobileMe will not have this
    **Advanced** email settings screen. This only applies to POP3 email accounts.


    To get to the **Advanced** options for each email account, follow these steps:


    1.  Touch the **Settings** icon.

    2.  Touch **Mail, Contacts, Calendars**.

    3.  Touch an email address listed under **Accounts**.

    4.  At the bottom of the mail settings pop-up window, tap the **Advanced** button
    to bring up the **Advanced** dialog.


    ![images](images/p360-01.jpg)


    #### Removing Email Messages from the iPad After Deletion


    You can select how frequently you want email removed completely from your iPad
    once it is deleted.


    Touch the **Remove** tab and select the option that is best for you; the default
    setting is **Never**.


    ![images](images/p360-02.jpg)


    #### Using SSL/Authentication


    `SSL`/`Authentication` features were discussed previously, but the **Advanced**
    email options screen supplies another location to access these features for a
    particular email account.


    #### Deleting Messages from the Server


    You can configure your iPad to handle the deletion of messages from your email
    server. Usually, this setting is left at **Never**, and this function is handled
    on your main computer. If you use your iPad as your main email device, however,
    you might want to handle that feature from the phone itself. Follow these steps
    to use your iPad to remove deleted emails on the server:


    1.  Touch the **Delete from Server** tab to select the feature that best suits
    your needs: **Never**, **Seven Days**, or **When removed from Inbox**.

    2.  The default setting is **Never**. If you want to choose **Seven Days**, that
    option should give you enough time to check email on your computer, as well as
    your iPad, and then decide what to keep and what to get rid of.


    ![images](images/p361-01.jpg)


    #### Changing the Incoming Server Port


    As you did with the **Outgoing Server Port** earlier, you can change the **Incoming
    Server Port** if you are having trouble receiving email. It is very rare that
    your troubles will be related to the port you receive mail on, which means that
    you will rarely need to change this number. If your email service provider gives
    you a different number, just touch the numbers and input a new port. The value
    for an **Incoming Server Port** is usually `995`, `993`, or `110`; however, the
    port value could also be another number.


    ### Troubleshooting Email Problems


    Usually, your email works flawlessly on your iPad. Sometimes—whether it is a server
    issue, a network connectivity issue, or an email service provider requirement—email
    may not work as flawlessly as you would hope.


    More often than not, there is a simple setting that needs to be adjusted or a
    password that needs to be re-entered.


    If you try out some of the troubleshooting tips that follow and your email is
    still not working, then your email server may just be down temporarily. Check
    with your email service provider to make sure your mail server is up and running;
    you might also check whether your provider has made any recent changes that would
    affect your settings.


    **TIP:** If these tips that follow do not solve the problem, please check out
    [Chapter 28](#Chapter28.html#ch28): “Troubleshooting” for more helpful tips and
    resources.


    #### Email Isn''t Being Received or Sent


    If you can''t send or receive email, your first step should be to verify you are
    connected to the Internet. Look for Wi-Fi or 3G connectivity in the upper-left
    corner of your **Home** screen (see the “How Do I Know When I''m Connected?” section
    of “Quick Start Guide” for details.)


    Sometimes, you need to adjust the outgoing port for email to be sent properly.
    Do so by following these steps.


    1.  Tap **Settings**.

    2.  Touch **Mail, Contacts, and Calendars**.

    3.  Touch your email account that is having trouble sending messages under **Accounts**.

    4.  Touch **SMTP** and verify that your outgoing mail server is set correctly;
    also check that it is set to **ON**.

    5.  Touch **Outgoing Mail Server** at the top and verify all the settings, such
    as **Host Name**, **User Name**, **Password**, **SSL**, **Authentication**, and
    **Server Port**. You might also try `587`, `995`, or `110` for the **Server Port**
    value; sometimes that helps.

    6.  Click **Done** and the email account name in the upper-left corner to return
    to the **Email** settings screen for this account.

    7.  Scroll down to the bottom and touch **Advanced**.

    8.  You can also try a different port setting for the server port on this screen,
    such as `587`, `995`, or `110`. If those values don''t work, contact your email
    service provider to get a different port number and verify your settings.'
