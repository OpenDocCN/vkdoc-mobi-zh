- fmt: '#### Changing the Size of the Video (Widescreen vs. Fullscreen)


    Most of your videos will play in widescreen format. However, if you have a video
    that was not converted for your iPad or is not optimized for its screen resolution,
    you can touch the `Expand` button, which is to the right of the upper `Status`
    bar.


    You will notice that there are two arrows. If you are in `Fullscreen` mode, the
    arrows point in, towards each other. If you are in `Widescreen` mode, the arrows
    point out, away from each other.


    ![images](images/p255-01.jpg)


    In a widescreen movie that is not taking up the full screen of the iPad, touching
    the `Expand` button will zoom in a bit. Touching it again will zoom out.


    **NOTE:** You can also *double-tap* the screen to zoom in and fill the screen.
    Be aware that, just like on your widescreen TV, forcing a non-widescreen video
    into widescreen format can sometimes cause you to lose part of the picture.


    #### Using the Chapters Feature


    Most full-length movies purchased from the iTunes store, and some movies that
    are converted for the iPad, will give you a Chapters feature. This feature makes
    watching a movie on your iPad very much like watching a DVD on your home TV.


    Just bring up the controls for the video by tapping the screen, and then select
    `Done`.


    ![images](images/p255-02.jpg)


    This will bring you back to the main page for the movie.


    Touch the `Chapters` button in the upper-right corner, scroll to the chapter you
    wish to watch, and then touch it.


    ![images](images/p256-01.jpg)


    #### Viewing the Chapters


    You can scroll or flick through quickly to locate the scene or chapter that you
    wish to watch.


    You will also notice that the exact time that the chapter begins (relative to
    the start of the movie) displays to the right of each chapter image.


    ![images](images/p256-02.jpg)


    In addition to the chapter menu mentioned previously, you can also quickly advance
    to the previous or next chapter in a movie by tapping the `Rewind` or `Fast-Forward`
    buttons. One tap moves you one chapter in either direction.


    **NOTE:** The Chapters feature usually works only with movies that are purchased
    from the iTunes store. Movies that are converted and loaded onto your iPad usually
    will not have chapters.


    ### Watching a TV Show


    ![images](images/p257-01.jpg)


    The iPad is great for watching your favorite TV shows. You can purchase TV shows
    from the iTunes store. You can also download sample shows from some iPad apps,
    like the `ABC` app.


    Just touch the `TV Shows` tab at the top to see the shows you have downloaded
    on your iPad. Scroll through your available shows and touch `Play`. The video
    controls work just like the movie controls.


    ![images](images/p257-02.jpg)


    ### Watching Podcasts


    ![images](images/p257-03.jpg)


    We normally think of podcasts as being audio-only broadcasts that can be downloaded
    through iTunes. Video podcasts are now quite prevalent and can be found on any
    number of sites, including many public broadcasting websites and on iTunes U.
    The latter provides a listing of university podcasts and other school-related
    information through iTunes.


    Consider this iTunes U story from Gary Mazo:


    “Recently, I was browsing the `iTunes U` section inside the `iTunes` app on the
    iPad with my son, who had just been accepted to Caltech. We were wondering about
    the housing situation and, lo and behold, we found a video podcast showing a tour
    of the Caltech dorms. We downloaded it, and the podcast went right into the podcast
    directory for future viewing. We were able to do a complete virtual tour of the
    housing without flying out to the school''s location in California from the East
    Coast.”


    ![images](images/p258-01.jpg)


    ### Watching Music Videos


    ![images](images/p258-02.jpg)


    Music videos are available for your iPad from a number of sources. Often, if you
    buy a *Deluxe* album from iTunes, it might include a music video or two. Music
    videos can also be purchased from the iTunes store, and many record companies
    and recording artists make them available for free on their websites.


    Music videos will automatically get sorted into the `Music Videos` section of
    your `Videos` app.


    Touch the `Music Videos` tab and start playing the video. The controls work just
    as they do in all other video applications.


    ![images](images/p259-01.jpg)


    ### Video Options


    As in your music player, there are a few options that you can adjust for the video
    player. These options are accessed through the `Settings` icon from your `Home`
    screen.


    Touch the `Settings` icon and then scroll down to touch the `Video` options.


    ![images](images/p259-02.jpg)


    #### Start Playing Option


    Sometimes, you will have to stop watching a particular video. The `Start Playing`
    option lets you decide what to do the next time you want to watch the video. Your
    options are to either watch the video from the beginning or from where you left
    off. Just select the option that you desire and that will be the action your `Videos`
    app takes from now on.


    ![images](images/p259-03.jpg)


    #### Closed Captioned


    If your video has closed-captioned capabilities, closed captioning will be shown
    on your screen when this switch is turned to `ON`.


    #### TV-Out: Widescreen


    There are many third-party gadgets out there that allow you to watch the video
    from your iPad on some external source, such as a TV or computer screen, or even
    an array of video glasses that simulate watching on a very large-screen monitor.
    Most of these options require that your `Widescreen` setting under the `TV Out`
    option be set to `ON`. By default, it is set to `OFF`.


    **TIP:** You can purchase a VGA adapter to plug your iPad into a VGA computer
    monitor to watch movies. There is now an HDMI adapter available from Apple, as
    well.


    See the “Accessories” section of the Quick Start Guide for more information.


    ![images](images/p260-01.jpg)


    #### TV Signal


    There are some advanced ways of taking content from your iPad and playing it on
    your TV or DVR with the right cable. You also need to have the right TV signal
    setting. This is typically changed only if you use your iPad in another country.
    If you live in the U.S., your TV works with the NTSC standard.


    However, most European countries use PAL. If you are not sure which standard you
    use, contact your TV, cable, or satellite company.


    ![images](images/p260-02.jpg)


    ### Deleting Videos


    To delete a video (to save space on your iPad), just choose the category from
    which you wish to delete the video—as you did at the start of this chapter (see
    [Figure 10–3](#Chapter10.html#fig_10_3)).


    **NOTE:** If you''re syncing videos from iTunes, make sure to uncheck it there
    as well, or iTunes just might sync it right back to the iPad on the next sync!


    Next, touch and hold on a particular video you wish to delete. Just as when deleting
    an app, a small black `×` will appear in the top left-hand corner. Touch the `×`
    and you will be prompted to delete the video.


    Touch the `Delete` button, and the video will be deleted from your system.


    **NOTE:** This deletes the video only from your iPad—a copy will still remain
    in your video library in iTunes if you want to load it back onto your iPad at
    a later date. However, if you delete a rented movie from the iPad, it will be
    deleted permanently!


    ![images](images/1003.jpg)


    **Figure 10–3.** *Deleting a video*'
  raw: '#### Changing the Size of the Video (Widescreen vs. Fullscreen)


    Most of your videos will play in widescreen format. However, if you have a video
    that was not converted for your iPad or is not optimized for its screen resolution,
    you can touch the **Expand** button, which is to the right of the upper **Status**
    bar.


    You will notice that there are two arrows. If you are in **Fullscreen** mode,
    the arrows point in, towards each other. If you are in **Widescreen** mode, the
    arrows point out, away from each other.


    ![images](images/p255-01.jpg)


    In a widescreen movie that is not taking up the full screen of the iPad, touching
    the **Expand** button will zoom in a bit. Touching it again will zoom out.


    **NOTE:** You can also *double-tap* the screen to zoom in and fill the screen.
    Be aware that, just like on your widescreen TV, forcing a non-widescreen video
    into widescreen format can sometimes cause you to lose part of the picture.


    #### Using the Chapters Feature


    Most full-length movies purchased from the iTunes store, and some movies that
    are converted for the iPad, will give you a Chapters feature. This feature makes
    watching a movie on your iPad very much like watching a DVD on your home TV.


    Just bring up the controls for the video by tapping the screen, and then select
    **Done**.


    ![images](images/p255-02.jpg)


    This will bring you back to the main page for the movie.


    Touch the **Chapters** button in the upper-right corner, scroll to the chapter
    you wish to watch, and then touch it.


    ![images](images/p256-01.jpg)


    #### Viewing the Chapters


    You can scroll or flick through quickly to locate the scene or chapter that you
    wish to watch.


    You will also notice that the exact time that the chapter begins (relative to
    the start of the movie) displays to the right of each chapter image.


    ![images](images/p256-02.jpg)


    In addition to the chapter menu mentioned previously, you can also quickly advance
    to the previous or next chapter in a movie by tapping the **Rewind** or **Fast-Forward**
    buttons. One tap moves you one chapter in either direction.


    **NOTE:** The Chapters feature usually works only with movies that are purchased
    from the iTunes store. Movies that are converted and loaded onto your iPad usually
    will not have chapters.


    ### Watching a TV Show


    ![images](images/p257-01.jpg)


    The iPad is great for watching your favorite TV shows. You can purchase TV shows
    from the iTunes store. You can also download sample shows from some iPad apps,
    like the **ABC** app.


    Just touch the **TV Shows** tab at the top to see the shows you have downloaded
    on your iPad. Scroll through your available shows and touch **Play**. The video
    controls work just like the movie controls.


    ![images](images/p257-02.jpg)


    ### Watching Podcasts


    ![images](images/p257-03.jpg)


    We normally think of podcasts as being audio-only broadcasts that can be downloaded
    through iTunes. Video podcasts are now quite prevalent and can be found on any
    number of sites, including many public broadcasting websites and on iTunes U.
    The latter provides a listing of university podcasts and other school-related
    information through iTunes.


    Consider this iTunes U story from Gary Mazo:


    “Recently, I was browsing the **iTunes U** section inside the **iTunes** app on
    the iPad with my son, who had just been accepted to Caltech. We were wondering
    about the housing situation and, lo and behold, we found a video podcast showing
    a tour of the Caltech dorms. We downloaded it, and the podcast went right into
    the podcast directory for future viewing. We were able to do a complete virtual
    tour of the housing without flying out to the school''s location in California
    from the East Coast.”


    ![images](images/p258-01.jpg)


    ### Watching Music Videos


    ![images](images/p258-02.jpg)


    Music videos are available for your iPad from a number of sources. Often, if you
    buy a *Deluxe* album from iTunes, it might include a music video or two. Music
    videos can also be purchased from the iTunes store, and many record companies
    and recording artists make them available for free on their websites.


    Music videos will automatically get sorted into the **Music Videos** section of
    your **Videos** app.


    Touch the **Music Videos** tab and start playing the video. The controls work
    just as they do in all other video applications.


    ![images](images/p259-01.jpg)


    ### Video Options


    As in your music player, there are a few options that you can adjust for the video
    player. These options are accessed through the **Settings** icon from your **Home**
    screen.


    Touch the **Settings** icon and then scroll down to touch the **Video** options.


