  trans: "\n# 需要网络连接\n\n如今移动电子邮件无疑非常流行。你可以在没有网络连接的情况下，查看、阅读和回复已同步到 iPad 上的邮件；但是，要使用\
    \ iPad 发送和/或接收电子邮件，你需要连接 Wi-Fi 网络。请参阅第 5 章：“Wi-Fi 和 3G 连接”了解更多信息。另请参阅第 1 部分快速入门指南中的“读取顶部连接状态图标”部分。\n\
    \n**提示：** 如果你正在乘坐飞机，只需在登机前下载所有电子邮件；这样你就可以在离线状态下阅读、回复和撰写邮件。这里有一点很重要——除非你点开邮件进行查看，否则在离线前你可能只下载了邮件标题。换句话说，在起飞前，请确保点开所有重要邮件，确保完整内容已下载到你的\
    \ iPad。你在 iPad 上离线撰写的任何邮件，都将在落地并重新建立网络连接后发送。\n\n## 在 iPad 上设置电子邮件\n\n你有两种选项可在\
    \ iPad 上设置电子邮件账户：\n\n- 使用 `iTunes` 应用同步电子邮件账户设置。\n- 直接在 iPad 上设置电子邮件账户。\n\n如果你有多个电子邮件账户，并且通过电脑上的电子邮件程序（例如\
    \ `Microsoft Outlook`、`Entourage` 等）访问它们，那么最简便的方法就是使用 `iTunes` 同步你的账户。有关此主题的更多信息，请参阅第\
    \ 3 章：“使用 iTunes 同步你的 iPad”中的“同步电子邮件账户设置”部分。\n\n如果你只有几个账户，或者你未使用 `iTunes` 可同步的电脑电子邮件程序，那么你需要直接在\
    \ iPad 上设置电子邮件账户。\n\n### 输入从 iTunes 同步的电子邮件账户密码\n\n在第 3 章的“同步电子邮件账户设置”部分，我们向你展示了如何将电子邮件账户设置同步到\
    \ iPad。同步完成后，你应该能够通过打开 `设置` 应用来查看 iPad 上的所有电子邮件账户。你只需要输入每个账户的密码即可。\n\n输入账户密码的简单方法是在弹出窗口出现时，直接在其中输入密码。\n\
    \n输入你的 `密码`，然后轻点 `OK` 进行保存。\n\n![images](img/p321-01.jpg)\n\n你也可以在 `设置` 应用中输入电子邮件账户密码并调整其他账户详细信息。要为每个同步的电子邮件账户输入密码，请按照以下步骤操作（参见图\
    \ 13-1）：\n\n1. 轻点 `设置` 图标。\n2. 轻点左侧栏中的 `邮件、通讯录、日历`。\n3. 在右侧栏的 `账户` 下，你应该能看到所有已同步的电子邮件账户列表。\n\
    4. 轻点任一列出的电子邮件账户，然后轻点 `账户` 进入 `账户` 详情界面。\n5. 输入账户 `密码`，然后轻点 `完成`。\n6. 为所有列出的电子邮件账户重复以上步骤。\n\
    \n![images](img/1301.jpg)\n\n**图 13–1.** *为从 `iTunes` 应用同步的每个电子邮件账户输入密码*\n\n###\
    \ 在 iPad 上添加新电子邮件账户\n\n要在 iPad 上添加新电子邮件账户，请按照以下步骤操作：\n\n1. 轻点 `设置` 图标。\n2. 轻点\
    \ `邮件、通讯录、日历`。\n3. 在你的电子邮件账户下方，轻点 `添加账户`。\n\n    **提示：** 要编辑任何电子邮件账户，只需轻点该账户。\n\
    \n    ![images](img/p322-01.jpg)\n\n4. 在此界面上选择要添加的电子邮件账户类型：\n\n    - 如果你使用 Microsoft\
    \ Exchange 电子邮件服务器、Hotmail 或 Gmail，并且希望无线同步联系人和日历，请轻点 `Microsoft Exchange`。\n\
    \    - 如果你使用 Gmail 但不希望无线同步联系人，请轻点 `Gmail`。\n    - 如果你使用这些服务，请轻点 `MobileMe、Yahoo`\
    \ 或 `Aol`。\n    - 要设置其他类型的账户，请轻点 `其他`。\n\n    **提示：** 在第 4 章：“其他同步方法”中了解更多关于 `Google`/`Hotmail/Microsoft\
    \ Exchange` 和 `MobileMe` 的信息。\n\n    ![images](img/p322-02.jpg)\n\n5. 如果在账户类型中选择\
    \ `其他`，你将看到此界面，可以添加以下类型的账户：邮件、通讯录和日历。\n\n    - 要添加邮件账户，请轻点 `添加邮件账户`。\n    - 要添加通讯录账户，请轻点\
    \ `添加 LDAP 账户` 或 `添加 CardDAV 账户`。\n    - 要添加日历账户，请轻点 `添加 CalDAV 账户` 或 `添加已订阅的日历`。\n\
    \n    ![images](img/p323-01.jpg)\n\n6. 现在你将能够输入登录凭据。在 `名称` 字段中输入你的姓名，以便其他人收到你邮件时看到。如果你选择了通讯录或日历类型的账户，则需要输入\
    \ `服务器` 名称、`用户名`、`密码` 和 `描述`。\n\n    ![images](img/p323-02.jpg)\n\n7. 接下来，在 `地址`、`密码`\
    \ 和 `描述` 字段中添加适当信息。\n8. 轻点右上角的 `下一步` 按钮。\n\n#### 指定接收和发送服务器\n\n有时，iPad 无法自动设置你的电子邮件账户。在这种情况下，你需要手动输入更多设置以启用你的电子邮件账户。\n\
    \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和“电子邮件设置”来找到相关设置。例如，如果你使用 Windows Live Hotmail（原名\
    \ Hotmail），则可以搜索“Windows Live Hotmail 的 Microsoft Exchange、POP 或 IMAP 电子邮件设置”。如果找不到这些设置，请联系你的电子邮件提供商寻求帮助。\n\
    \n如果 iPad 仅凭你的电子邮件地址和密码无法登录服务器，你会看到类似这样的界面。\n\n在 `接收邮件服务器` 下，在 `主机名`、`用户名` 和 `密码`\
    \ 字段中输入相应信息。通常，你的接收邮件服务器类似于 `mail.*你的网络服务提供商名称*.com`。\n\n要调整发送服务器名称，请轻点 `发送邮件服务器`。你可以在以下界面上调整发送邮件服务器。这些服务器名称通常看起来像\
    \ `smtp.*你的网络服务提供商名称*.com` 或 `mail.*你的网络服务提供商名称*.com`。\n\n你可以尝试将 `服务器名称` 和 `密码`\
    \ 字段留空。如果不起作用，你随时可以返回并修改它们。\n\n![images](img/p324-01.jpg)\n\n系统可能会询问你是否要使用 SSL（安全套接层），这是一种发送邮件安全类型，你的电子邮件提供商可能要求使用它。如果你不确定是否需要，请向你的电子邮件提供商确认所需的邮件设置。\n\
    \n**提示：** 作者建议尽可能使用 SSL 安全协议。如果不使用 SSL，那么你的登录凭据、邮件以及任何私人信息将以纯文本（未加密）形式发送，容易受到窥探。\n\
    \n#### 验证你的账户是否已设置成功\n\n输入所有信息后，iPad 将尝试配置你的电子邮件账户。你可能会收到一条错误消息；如果发生这种情况，你需要检查输入的信息。\n\
    \n![images](img/p325-01.jpg)\n\n如果系统跳转到显示所有电子邮件账户的界面，请查找新的账户名称。\n\n如果你看到了，说明你的账户已设置成功。\n\
    \n![images](img/p325-02.jpg)\n\n#### 修复“无法获取邮件”错误\n\n如果你轻点 `邮件` 图标并收到“密码错误”的提示，你需要输入密码并轻点\
    \ `OK` 以查看你的电子邮件。\n\n有关更多帮助，请参阅本章的“输入从 iTunes 同步的电子邮件账户密码”部分。\n\n![images](img/p325-03.jpg)\n"
- fmt: "### Email Basics\n\nIn this section, we give you a guided tour around your\
    \ `Mail` app. We explain how to use it in both `Portrait` and `Landscape` modes,\
    \ as well as how to perform the basics of reading, replying, filing, printing,\
    \ and deleting messages.\n\n#### Portrait and Landscape Mail Screens\n\nNow that\
    \ you have set up your email accounts on your iPad, it's time to take a brief\
    \ tour of the `Mail` app. To better understand how to get around your `Mail` program,\
    \ it helps to have a picture of how your `Mail` app looks in `Portrait` and `Landscape`\
    \ views (see [Figure 13–2](#Chapter13.html#fig_13_2)).\n\nIn `Landscape` view,\
    \ you always see your Inbox or Mailboxes in the left column with the email message\
    \ in the right.\n\nIn `Portrait` view, you see the entire email message fill the\
    \ screen. To see the `Inbox` or `Mailboxes` in a vertical pop-up window on the\
    \ left side of the page, tap the `Inbox` button in the upper-left corner of the\
    \ page.\n\n![images](images/1302.jpg)\n\n**Figure 13–2.** *Portrait and Landscape\
    \ view Mail screens*\n\n**TIP:** If you are setting your iPad down on a desk or\
    \ holding it in your lap, then you may want to use the `Portrait Lock` icon to\
    \ lock your view in `Portrait` (vertical) mode. This will prevent the image from\
    \ flipping around unnecessarily. To lock the view, follow these steps:\n\n1. \
    \ Double-tap the `Home` button and swipe left to right.\n2.  Tap the `Portrait\
    \ Lock` button to lock the screen in `Portrait` mode.\n\n#### Viewing Messages\
    \ and the Unread Message Blue Dot\n\nTap any email message to view it In the main\
    \ window.\n\nAny unread messages are marked with a `Blue Dot` icon ![images](images/bluebull.jpg)\
    \ to the left of the message.\n\n![images](images/p327-01.jpg)\n\n#### Adjusting\
    \ Mail Font Size\n\nWhile we're on the topic of email, let's look at a useful\
    \ tip on how to increase the font size of your email messages. You can go from\
    \ the default of 10 or 12 points all the way up to 56 points (see [Figure 13–3](#Chapter13.html#fig_13_3)).\n\
    \n1.  Tap `Settings`.\n2.  Tap `General`.\n3.  Tap `Accessibility` (right column).\n\
    4.  Tap `Large Text` and then select the font size you desire.\n\n![images](images/p327-02.jpg)\n\
    \n![images](images/1303.jpg)\n\n**Figure 13–3.** *Various font sizes in an email*\n\
    \n#### Viewing Your Mailboxes (Inboxes and Account Folders)\n\nThe top-level screen\
    \ is your `Mailboxes` screen. You can always get to it by tapping the button in\
    \ the upper-left corner. Keep tapping this button until you see no more buttons.\
    \ When that happens, you are in the `Mailboxes` screen.\n\nFrom the `Mailboxes`\
    \ screen, you can access the following items:\n\n*   **The unified inbox:** Do\
    \ so by tapping `All inboxes`.\n*   **The inbox for each individual account:**\
    \ Do this by tapping that email account name in the Inboxes section.\n*   **The\
    \ folders for each email account in the Accounts section:** Do so by tapping the\
    \ account name to see all folders.\n\n![images](images/p328-01.jpg)\n\nYou can\
    \ view your mail in a unified inbox that shows all your email accounts in a single\
    \ inbox or lists each account separately. You can also choose to view any mail\
    \ account folders that are synced to your iPad.\n\nIt's good to get a mental picture\
    \ of your various email accounts. Your `Mailboxes` screen sits at the top an upside-down\
    \ tree. You can access each inbox can by clicking `Inboxes` at the top, or you\
    \ can dig into the various synced mail folders (including your inboxes) by tapping\
    \ the `Accounts` listed at the bottom (see [Figure 13–4](#Chapter13.html#fig_13_4)).\n\
    \n![images](images/1304.jpg)\n\n**Figure 13–4.** *Navigating to various inboxes\
    \ and mail account folders*\n\n##### Unified Inbox\n\nFrom the `Mailboxes` screen,\
    \ tap `All Inboxes` to view a single inbox that contains email from every one\
    \ of your accounts together.\n\n**TIP:** Here's how you get to the `Mailboxes`\
    \ screen.\n\nIf you happen to be viewing an inbox or another mail folder, you\
    \ will have to tap the button in the upper-left corner of the screen once or twice.\n\
    \n![images](images/p329-01.jpg)\n\n**NOTE:** You will only see those mail folders\
    \ you have chosen to sync during the mail setup process. For example, you might\
    \ have 20 mail folders on your main mail account, but you might only see a few\
    \ folders on your iPad. The default synced mail folders are `Inbox`, `Sent`, `Draft`,\
    \ and `Deleted Items`.\n\n#### Related Messages Are Kept Together in Threads\n\
    \nYou will also notice that some messages show a number and a right-facing `Arrow`\
    \ icon (`>`) to the right of the message, like this: ![images](images/p330-01.jpg)\n\
    \nThis shows that there are two related messages (replies and forwards) to the\
    \ message shown.\n\nTap any message to open it. The only time it will not open\
    \ is if there are related messages. In that case, you will first see a screen\
    \ with all the related messages. Tap any of those messages to open and view it\
    \ (see [Figure 13–5](#Chapter13.html#fig_13_5)).\n\n![images](images/1305.jpg)\n\
    \n**Figure 13–5.** *Related messages are kept together in groups called threads.*\n\
    \n**TIP:** You can disable this `Threaded` view in your `Settings` app. Tap `Settings`\
    \ ![images](images/U001.jpg) `Mail, Contacts, Calendars`, and set `Organize by\
    \ Thread` to `OFF`.\n\n#### Zooming In or Out\n\nAs when reading other text on\
    \ your iPad, you can zoom in to see your email in larger text. You can do this\
    \ by double-tapping the screen. You can also use the `Pinch` open or closed gesture\
    \ to zoom in or out (see the “Zooming” section in our Quick Start Guide in Part\
    \ 1 of this book for more information on these features).\n\n#### Go to Next Message\
    \ or Previous Message\n\nIn `Portrait` view, tap the `Up Triangle` icon ![images](images/uparrow.jpg)\
    \ or `Down Triangle` icon ![images](images/downarrow.jpg) next to the `Inbox`\
    \ button in the upper-right corner.\n\n![images](images/p331-01.jpg)\n\nIn `Landscape`\
    \ view, you can simply tap the message in the left column to view it in the main\
    \ (right column) preview window.\n\n![images](images/p331-02.jpg)\n\n#### Copy\
    \ and Paste\n\nHere are a few tips to select text or pictures and then copy them\
    \ from an email message:\n\n*   *Double-tap the desired text to select a word,\
    \ and then drag the blue handles up or down to adjust the selection.*\n    Next,\
    \ select `Copy`.\n\n    ![images](images/p331-03.jpg)\n\n*   Press and hold the\
    \ text, and then choose `Select` or `Select All`.\n\n    ![images](images/p332-01.jpg)\n\
    \n*   Press and hold an image, and then select `Save Image` or `Copy`.\n\n![images](images/p332-02.jpg)\n\
    \nFor a more complete description, please check out the “Copy and Paste” section\
    \ in [Chapter 2](#Chapter02.html#ch2): “Typing Tips, Copy/Paste, and Search.”\n\
    \n#### Move (File) a Message\n\nSometimes, you may want to organize your email\
    \ for easy retrieval later. For example, you might receive an email about an upcoming\
    \ trip and want to move it to the `Travel` folder. Sometimes you receive emails\
    \ that require attention later, in which case you can move them to the `Requires\
    \ Attention` folder. This can help you remember to work on such emails later.\n\
    \nTo start moving a message, tap the `Move` icon in the upper-right corner of\
    \ the screen.\n\n![images](images/p332-03.jpg)\n\nThe list of folders for your\
    \ current mail account will appear in the left side of the screen.\n\nTap the\
    \ folder to which you want to move the message.\n\n**TIP:** While you can move\
    \ messages to the Spam folder, we recommend instead that you simply delete these\
    \ messages.\n\n![images](images/p333-01.jpg)"
