- fmt: '### Activating Spotlight Search


    Begin by starting the **Spotlight Search**, which resides to the left of the first
    page of the **Home** screen.


    ![Image](images/p103-01.jpg)


    On the left side of the first circle (indicating the first page of your **Home**
    screen), you can see a very small **Magnifying Glass** icon. Swipe to the right
    of this first page of icons to get to the **Spotlight Search** page.


    ![Image](images/p103-02.jpg)


    #### Search for Apps


    One great way to use the **Spotlight Search** is to quickly find your apps. If
    you have more than two or three pages of **Home** screens, you may want to use
    it. Start the search and type a few letters of the app name, such as **Weather**.
    This will find all your weather-related apps.


    ![Image](images/p103-03.jpg)


    #### Search the Web or Wikipedia


    If you know you want to search the web or Wikipedia, skip the step of going to
    the **Safari** web browser and typing the information into the **Search** bar.
    You can save even more time by skipping the step of going to the Wikipedia site.


    For example, you might want to know where Zip Code 10708 is located in the US.
    Simply type `"10708"` into **Spotlight Search** and tap **Search Web** (see Figure
    –16).


    ![images](images/0216.jpg)


    **Figure 2-16.** *Search the Web or Wikipedia from **Spotlight Search**.*


    #### Search for Mail, Contacts, Videos, Songs, Appointments, and More


    The beauty of the **Spotlight Search** is that it can search for virtually anything
    on your iPad. You may want to find a contact, video, song, calendar appointment,
    or other item. It''s easy to use; just start typing in the **Search** page (see
    Figure –17).


    **TIP:** If you are looking for a person, type his full name to more accurately
    find items from only that person (e.g., `"Martin Trautschold"`). This will eliminate
    any other Martins who might be in your iPad and make sure you find items only
    related to Martin Trautschold.


    In the search result, you''ll see all emails, appointments, meeting invitations,
    and contact information the search finds. Tap one of the results in the list to
    view its contents.


    ![images](images/0217.jpg)


    **Figure 2-17.** *Search your iPad for all types of content with **Spotlight Search**.*


    Your search results stay there until you clear them, so you can go back to **Spotlight
    Search** once again by swiping to the right from your **Home** screen.


    To clear the **Search** field, just touch the **X** in the **Search** bar. To
    exit **Spotlight Search**, just press the **Home** key or swipe to the left.


    #### Customizing Spotlight Search


    There may be times you want to selectively search for only certain items. Other
    times, you may want to remove specific items (such as mail messages) from the
    search. You can do this by adjusting the options for **Spotlight Search** in your
    **Settings** app. Follow these steps to do so:


    1.  Tap the **Settings** icon.

    2.  Tap **General**.

    3.  Tap **Spotlight Search** in the right column to see the screen shown here.

    4.  Tap any item to check or uncheck it.

    5.  Touch and hold the icon on the right edge of each item to slide it up or down
    the list.


    ![Image](images/p106-01.jpg)


    ## Chapter 3


    ## Sync Your iPad with iTunes


    In this chapter we will show you the steps to get set up to synchronize information
    between your iPad and your Windows or Mac computer. Besides syncing, iTunes can
    do so much more, like organize your music, create playlists, buy songs, videos;
    it also has Home Sharing and Genius features. To learn about these features, please
    check out [Chapter 29](#Chapter29.html#ch29).


    **NOTE:** If you do not maintain a calendar or contact list on your computer or
    elsewhere, nor have any photos, videos, music, audiobooks or pictures on your
    computer, you still need to connect your iPad to iTunes on your computer to at
    minimum backup your iPad as well as perform software updates when they become
    available.


    We will also show you what to consider before you sync, how to set up the automatic
    sync of your personal information, and how to manually transfer information. With
    iTunes, you can sync or transfer contacts, calendar, notes, apps, music, videos,
    documents, and picture libraries. iTunes also has the added benefit that it automatically
    will backup your iPad whenever you connect it to your computer. We even show you
    a few simple troubleshooting tips if things are not working quite right. Finally,
    we show you how to check for updates and install updated operating system software
    for your iPad.


    **TIP:** If you are new to iTunes, we strongly recommend you check out [Chapter
    29](#Chapter29.html#ch29), “Your iTunes User Guide,” to help you get the most
    out of iTunes.


    ### Before You Set Up Your iTunes Sync


    There are a few things you need before you can start syncing using iTunes. We
    cover the prerequisites and answer a few common questions about the reasons to
    use iTunes. We also help you understand what happens if you own another Apple
    device, such as an iPhone or iPod, and start syncing with your iPad.


    #### Prerequisites Before You Sync


    There are just a few things you need before you start syncing your iPad with iTunes.


    1.  Make sure you have the latest version of iTunes installed on your computer.
    For how to install or update iTunes, see [Chapter 29](#Chapter29.html#ch29): “Your
    iTunes User Guide.”

    2.  Create an iTunes account (Apple ID); see the “Create iTunes Account” section
    in [Chapter 29](#Chapter29.html#ch29).

    3.  Get the white sync cable that came with your iPad. One end plugs into the
    dock port in the bottom of your iPad near the **Home** button and the other plugs
    into the USB port on your computer.


    #### Can I Sync iTunes with Another iPhone, iPod touch, or iPod and My iPad?


    **Yes!** As long as you are syncing to the same computer, you can sync many Apple
    devices (Apple says up to five, but we have heard of people syncing more) to the
    same iTunes account on a single computer.


    **CAUTION:** You can''t sync the same iPad, iPhone, or iPod to two different computers.
    When you attempt to do this, you will see a message similar to this: “Would you
    like to wipe this device (iPad, iPhone, iPod) and re-sync the new library?” If
    you select Yes, then all the music and videos on the device will be erased.


    #### Other Sync Options: MobileMe and Exchange/Google


    There are other ways to synchronize your personal information and email, such
    as Exchange/Google and MobileMe, which we cover in [Chapter 4](#Chapter04.html#ch4):
    “Other Sync Methods.” Keep in mind, however, that even if you choose to go with
    these other ways to sync, you will still need to use iTunes to


    *   Backup and restore your iPad.

    *   Update the iPad operating system software.

    *   Sync and manage your applications, also known as “apps.”

    *   Sync your music library and playlists.

    *   Sync movies, TV shows, podcasts, and iTunes U content.

    *   Sync books.

    *   Sync photos.


    #### Considering Other Sync Options


    [Table 3–1](#Chapter03.html#tab_3_1) summarizes your other synchronization options.
    What you choose to use for synchronization should be driven by where you currently
    store your email, contacts, and calendar—your environment.


    **NOTE:** As you can see in [Table 3–1](#Chapter03.html#tab_3_1), with some environments
    you can wirelessly sync your contacts and calendars to your iPad.


    ![images](images/p109-01.jpg)


    ![images](images/p110-01.jpg)


    ### Setup Your iTunes Sync


    We show you all the steps to perform both automated syncs and manual transfers
    of information to your iPad using iTunes.'
