- fmt: '### Refreshing Your List of Tweets


    | To refresh your list of tweets, pull down the **Main** page and you will see
    the **Pull down to refresh** notification at the top. Once the page is pulled
    down, you will see a **Release to refresh** note. Release the page and it will
    refresh the tweets. | ![images](images/p580-01.jpg) |


    ### Your Twitter Profile


    | You touch **Profile** to display your Twitter profile. To see your tweets, just
    touch **Tweets**. To see those tweets you have labeled as favorites, touch the
    **Favorites** button. To see those individuals who you are following, touch the
    **Following** button. **NOTE**: Numbers corresponding to your followers, those
    you are following, your favorites, and your tweets are displayed below the title
    of the appropriate button. | ![images](images/p580-02.jpg) |


    ### Compose Button


    | Touch the **Compose** button ![images](images/p581-01.jpg) and the **New Tweet**
    screen pops up. The character counter will count down from 140 as you type your
    message. At the bottom of the **Compose Tweet** screen, you will see icons for
    **Direct Mentions**, **Hash Tags** (`#`), **Picture Uploads**, and **GeoTagging**
    the tweet. ![images](images/p581-02.jpg) As you touch an icon, suggestions will
    pop up in a separate window. | ![images](images/p581-03.jpg) |


    ### Options Within Tweet


    | From the **Twitter** app''s **Home** screen, touch one of your tweets to bring
    up a list of options. You can **Reply**, **Set as Favorite**, **Retweet**, and
    **Translate**/**Send/Email** the Tweet. Just touch the corresponding button to
    initiate the action. You can see the details for the **Link** and **Mail** options
    shown in [Figure 23–10](#Chapter23.html#fig_23_10). | ![images](images/p581-04.jpg)
    |


    ![images](images/2310.jpg)


