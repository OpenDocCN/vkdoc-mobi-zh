  trans: "\n# 打开邮件附件\n\n其他类型的附件（如电子表格、文字处理文档和演示文稿文件）不会像我们刚刚描述的那样直接在邮件正文中打开，而需要手动打开。\n\
    \n## 轻点进入“`Quick Look`（快速查看）”模式\n\n请按照以下步骤在“`Quick Look`（快速查看）”模式下打开附件：\n\n1.\
    \ 打开带有附件的邮件（参见图 13–8）。\n2. 快速轻点附件，即可立即在“`Quick Look`（快速查看）”模式下打开它。你可以在文档中自由导航。请记住，你可以进行缩放以及向上或向下滑动屏幕。\n\
    3. 如果你打开一个包含多个标签页或工作表的电子表格，你会看到顶部有标签页。触摸另一个标签页即可打开该工作表。\n4. 查看完附件后，轻点文档一次以调出控件，然后轻点左上角的`Done`（完成）。\n\
    5. 如果你安装了能够打开当前所查看附件类型（本例中为电子表格）的应用，那么你会看到右上角出现一个`Open In`（在...中打开）按钮。轻点`Open\
    \ In`（在...中打开）按钮，即可在另一个应用中打开此文件。\n\n![images](img/1308.jpg)\n\n**图 13–8.** *通过轻点附件快速查看*\n\
    \n## 在其他应用中打开文档\n\n你可能希望在其他应用程序中打开附件。例如，你可能想在`iBooks`、`Stanza`或`GoodReader`中打开一个`PDF`文件。请按照以下步骤操作：\n\
    \n1. 打开邮件。\n2. 长按附件，直到出现弹出窗口。\n3. 选择`Open In`（在...中打开）选项。\n4. 从列表中选择你想使用的应用程序（参见图\
    \ 13–9）。\n5. 最后，你可以编辑文档、保存它，并通过电子邮件将其回复给发件人。\n\n![images](img/1309.jpg)\n\n**图\
    \ 13–9.** *在其他应用中打开和查看附件*\n\n## 查看视频附件\n\n你可能会收到以附件形式发送的视频邮件。某些类型的视频可以在你的 iPad\
    \ 上观看（有关支持的视频格式列表，请参阅本章后面的“支持的电子邮件附件类型”部分）。请按照以下步骤打开视频附件：\n\n1. 轻点视频附件以打开它，并在视频播放器中观看。\n\
    2. 观看完视频后，轻点屏幕以调出播放器控件。\n3. 轻点左上角的`Done`（完成）按钮，返回邮件。\n\n# 打开和查看压缩的`.zip`文件\n\n\
    除非你安装了诸如`GoodReader`之类的应用程序，否则你的 iPad 将无法打开和查看`.zip`格式的压缩文件。在本书出版时，`GoodReader`仍然是一个免费应用程序，非常值得安装。请按照以下步骤使用`GoodReader`：\n\
    \n**提示：** 你将学习如何安装和使用`GoodReader`，详见第 26 章：“新媒体：阅读报纸、杂志等。”\n\n1. 从 App Store 安装免费的`GoodReader`。\n\
    2. 打开带有`.zip`文件附件的邮件。\n3. 长按`.zip`附件，直到屏幕底部出现一个带有“`Open in GoodReader`（在 GoodReader\
    \ 中打开）”字样的按钮的弹出窗口。轻点该按钮，即可在`GoodReader`中打开`.zip`文件。\n\n    ![images](img/p350-01.jpg)\n\
    \n    **注意：** 不要只是快速轻点附件来打开它。在本书出版时，这样做会导致出现空白白色或黑色屏幕，并且没有任何反应。请确保长按附件，直到看到按钮弹出。\n\
    \n4. 此时`GoodReader`应该会打开，你的`.zip`文件应位于文件列表的顶部。要打开或解压`.zip`文件，请轻点该文件并选择`Unzip`（解压）按钮。\n\
    \n    ![images](img/p350-02.jpg)\n\n5. 现在你应该能看到解压后的文件——在本例中，是一个 Adobe `.pdf`文件，位于`.zip`文件上方的文件列表中。\n\
    6. 轻点该解压后的文件即可查看它。\n\n    ![images](img/p351-01.jpg)\n\n7. 阅读完附件后，双击你的`Home`（主屏幕）按钮，然后轻点`Mail`（邮件）图标，返回阅读你的电子邮件。\n\
    \n# 打开邮件附件时遇到的问题\n\n某些类型的附件无法在你的 iPad 上打开。此类附件会显示一个`Question Mark`（问号）（`?`）图标。在此图中，我们尝试点击一个类型为`winmail.dat`的附件，但失败了。\n\
    \n![images](img/p351-02.jpg)\n\n## 支持的电子邮件附件类型以及音频/视频格式\n\n你的 iPad 支持以下文件类型作为附件：\n\
    \n- `.doc`和`.docx`（`Microsoft Word`文档）\n- `.htm`和`.html`（网页）\n- `.key`（`Keynote`演示文稿文档）\n\
    - `.numbers`（`Apple Numbers`电子表格文档）\n- `.pages`（`Apple Pages`文档）\n- `.pdf`（Adobe\
    \ 可移植文档格式，用于`Adobe Acrobat`和`Adobe Reader`等程序）\n- `.ppt`和`.pptx`（`Microsoft PowerPoint`演示文稿文档）\n\
    - `.txt`（文本文件）\n- `.vcf`（联系人文件）\n- `.xls`和`.xlsx`（`Microsoft Excel`电子表格文档）\n-\
    \ `.mp3`和`.mov`（音频和视频格式）\n- `.zip`（压缩文件）。请注意，只有在你安装了能够读取这些文件的应用（例如`GoodReader`）时才能读取（参见本章中的“打开和查看压缩的\
    \ .zip 文件”部分）。\n\n你的 iPad 还支持以下音频格式：\n\n- HE-AAC (V1)\n- AAC（16 至 320 Kbps）\n\
    - 受保护的 AAC（来自 iTunes Store）\n- MP3（16 至 320 Kbps）\n- MP3 VBR\n- Audible（格式 2、3\
    \ 和 4）\n- Apple Lossless\n- AIFF\n- WAV\n\n你的 iPad 还支持以下视频格式：\n\n- H.264 视频，最高可达\
    \ 720p，每秒 30 帧\n- Main Profile level 3.1，搭配最高 160 Kbps、48kHz 的 AAC-LC 音频\n- `.m4v`、`.mp4`和`.mov`文件格式中的立体声音频\n\
    - MPEG-4 视频，最高可达 2.5 Mbps，分辨率 640 x 480 像素，每秒 30 帧\n- Simple Profile，搭配最高 160\
    \ Kbps、48kHz 的 AAC-LC 音频，`.m4v`、`.mp4`和`.mov`文件格式中的立体声音频\n- Motion JPEG (M-JPEG)，最高可达\
    \ 35 Mbps，分辨率 1280 x 720 像素，每秒 30 帧，音频格式为 ulaw\n- `.avi`文件格式中的 PCM 立体声音频\n\n#\
    \ 搜索电子邮件\n\niPad 内置了一些实用的搜索功能，可以帮助你查找电子邮件。你可以通过`From`（发件人）、`To`（收件人）、`Subject`（主题）或`All`（全部）字段在你的`Inbox`（收件箱）中进行搜索。这有助于你快速精准地定位到想要查找的邮件。\n\
    \n![images](img/p352-01.jpg)\n"
- fmt: "### Activating Email Search\n\nYou can search an individual inbox, or search\
    \ all inboxes together by going to the universal inbox (`All Inboxes`).\n\nIf\
    \ you scroll up to the top, you will now see the familiar `Search` bar at the\
    \ top of your `Inbox` (see [Figure 13–10](#Chapter13.html#fig_13_10)).\n\nIf your\
    \ email account supports the feature, you can also search the server for email\
    \ messages. At the time of writing, a few of the supported types of searchable\
    \ email accounts include `Exchange`, `MobileMe`, and `Gmail IMAP`. Follow these\
    \ steps to search through your email on a server:\n\n1.  Touch the `Search` bar\
    \ to see a new menu of soft keys under the `Search` bar.\n2.  Type the text you\
    \ wish to search for.\n3.  Touch one of the soft keys under the `Search` window:\n\
    \    1.  `From`: Searches only the sender's email addresses.\n    2.  `To`: Searches\
    \ only the recipients' email addresses.\n    3.  `Subject`: Searches only message\
    \ `Subject` fields.\n    4.  `All`: Searches every part of the message.\n\nFor\
    \ example, assume I want to search my Inbox for an email I received from Martin.\
    \ I would type Martin's name into the `Search` box and then touch `From`. My Inbox\
    \ would then be filtered to show only the emails from Martin.\n\n**NOTE:** If\
    \ you have multiple email accounts, you will not be able to search all of your\
    \ inboxes at the same time because your iPad only lets you search one inbox at\
    \ a time. For a more global search on your iPad, use the `Spotlight Search` feature\
    \ shown in the “Finding Things with Spotlight Search” section of [Chapter 2](#Chapter02.html#ch2):\
    \ “Typing Tips, Copy/Paste, and Search.”\n\n![images](images/1310.jpg)\n\n**Figure\
    \ 13–10.** *Searching for email using the `From`, `To`, `Subject`, or `All` text\
    \ fields*\n\n### Fine-Tuning Your Email Settings\n\nYou can fine-tune your email\
    \ accounts on your iPad with the myriad options available in the `Settings` app.\n\
    \nFollow these steps to change these settings:\n\n1.  Tap the `Settings` icon.\n\
    2.  Tap `Mail, Contacts, Calendars`.\n\nThe sections that follow explain the adjustments\
    \ you can make.\n\n#### Automatically Retrieve Email (Fetch New Data)\n\nIn addition\
    \ to the options under `Advanced`, you can use the `Email` settings to configure\
    \ how often your email is fetched, or *pulled*, to your iPad. By default, your\
    \ iPad automatically receives mail or other contact or calendar updates when they\
    \ are *pushed* from the server.\n\nYou can adjust this setting by taking the following\
    \ steps:\n\n1.  Touch the `Settings` icon.\n2.  Touch `Mail, Contacts, Calendars`.\n\
    3.  Touch `Fetch New Data` under the email accounts listed.\n\n    ![images](images/p355-01.jpg)\n\
    \n4.  Set `Push` to `ON` (default) to automatically have the server push data.\
    \ Turn It `OFF` to conserve your battery life.\n5.  Adjust the timing schedule\
    \ to pull data from the server. This is how frequently applications should pull\
    \ new data from the server.\n\n**NOTE:** If you set this option to `Every 15 Minutes`,\
    \ you will receive more frequent updates, but sacrifice battery life compared\
    \ to a setting of `Hourly`.\n\n![images](images/p355-02.jpg)\n\nHaving automatic\
    \ retrieval is very handy if you just want to turn on your iPad and see that you\
    \ have messages; otherwise, you need to remember to check.\n\n##### Advanced Push\
    \ Options\n\nAt the bottom of the `Fetch New Data` screen, below the `Hourly`\
    \ and `Manually` settings, you can touch the `Advanced` button to see a new screen\
    \ with all your email accounts listed.\n\nTap any email account to adjust its\
    \ settings.\n\n![images](images/p356-01.jpg)\n\nMost accounts can be `Fetched`\
    \ on the schedule you set or set to `Manual`. The `Manual` option requires that\
    \ you retrieve data using the `Update` button. This screen gives you the ability\
    \ to adjust `Fetch`, `Manual`, or in some cases `Push` settings for each account\
    \ you have set up.\n\n![images](images/p356-02.jpg)\n\n#### Adjusting Your Mail\
    \ Settings\n\nUnder the `Accounts` section, you can see all the email settings\
    \ listed under `Mail`. The `Default` settings may work well for you; but if you\
    \ need to adjust any of these, you can follow these steps.\n\n`Show`: This sets\
    \ how many emails are pulled from the server. You can specify anywhere from 25\
    \ to 200 messages (the default is 50 recent messages).\n\n`Preview`: This option\
    \ lets you set how many lines of text in addition to the `Subject` are shown in\
    \ the `Inbox` preview. You can adjust this value from `None` to `5 Lines` (the\
    \ default is `2 Lines`).\n\n![images](images/p356-03.jpg)\n\n`Minimum Font Size`:\
    \ This is the default font size shown when opening an email for the first time.\
    \ It is also smallest font size that you are allowed to zoom out to when viewing\
    \ an email. Your options are `Small`, `Medium`, `Large`, `Extra Large`, and `Giant`\
    \ (the default is `Medium`).\n\n`Show To/Cc Label`: With this option `ON`, you\
    \ will see a small `To` or `Cc` label in your Inbox before the subject. This label\
    \ shows which field your address was placed in (the default state of this option\
    \ is `OFF`).\n\n![images](images/p357-01.jpg)\n\n`Ask Before Deleting`: Turn this\
    \ option `ON` to be asked every time you try to delete a message (the default\
    \ is `OFF`).\n\n`Load Remote Images`: This option allows your iPad to load all\
    \ the graphics (remote images) that are placed in some email messages (the default\
    \ value for this option is `ON`).\n\n![images](images/p357-02.jpg)\n\n`Organize\
    \ by Thread`: This option groups related emails together. It shows only one message,\
    \ with a number next to it. That number indicates how many related emails exist.\
    \ This feature gives you a good way to keep all discussions together in one place\
    \ (the default value of this option is `ON`).\n\n![images](images/p357-03.jpg)\n\
    \n`Always Bcc Myself`: This option sends a blind carbon copy (`Bcc:`) of every\
    \ email you send from your iPad to your email account (the default value of this\
    \ option is `OFF`).\n\n![images](images/p357-04.jpg)\n\n#### Changing Your Email\
    \ Signature\n\nBy default, emails you send will say “Sent from my iPad.” Follow\
    \ these steps to change the `Signature` line of the email:\n\n1.  Tap the `Signature`\
    \ tab.\n\n    ![images](images/p358-01.jpg)\n\n2.  Tap the `Clear` button and\
    \ type in the new email signature you would like to appear at the bottom of all\
    \ emails sent from your iPad.\n\n    ![images](images/p358-02.jpg)\n\n3.  When\
    \ you are done editing the `Signature` field, tap the `Mail, Contacts…` button\
    \ in the upper-left corner. This will return you to the `Mail` settings screen.\n\
    \n#### Changing Your Default Mail Account (Sent From)\n\nIf you have multiple\
    \ email accounts set up on your iPad, you should set one of them—usually, the\
    \ one you use most—as your `Default Account`. When you select `Compose` from the\
    \ `Email` screen, the default account is always chosen. Also, if you click an\
    \ email address in any other app to compose a new message, this `Default Account`\
    \ will be selected. Follow these steps to change the email account you send from\
    \ by default:\n\n1.  Tap the `Default Account` option, and you will see a list\
    \ of all your email accounts.\n\n    ![images](images/p358-03.jpg)\n\n2.  Tap\
    \ the one you wish to use as your `Default Account` choice.\n\n    ![images](images/p359-01.jpg)\n\
    \n3.  When you are done, touch the `Mail, Contacts…` button to return to the `Mail`\
    \ settings menu.\n\n#### Toggling Sounds for Receiving and Sending Email\n\nYou\
    \ may notice a little sound effect every time you send or receive email. What\
    \ you hear is the default setting on your iPad.\n\nIf you want to disable this\
    \ option or change it, you do so in the `Settings` program:\n\n1.  Tap your `Settings`\
    \ icon.\n2.  Tap `General` in the left column.\n3.  Tap `Sounds` in the right\
    \ column.\n4.  You will see various switches to turn sound effects on or off.\
    \ Tap `New Mail` and `Sent Mail` to adjust the `ON` or `OFF` options.\n\n    ![images](images/p359-02.jpg)"
