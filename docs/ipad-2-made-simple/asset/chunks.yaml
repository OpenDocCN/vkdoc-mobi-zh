    \ port in the bottom of your iPad near the **Home** button and the other plugs\
    \ into the USB port on your computer.\n\n#### Can I Sync iTunes with Another iPhone,\
    \ iPod touch, or iPod and My iPad?\n\n**Yes!** As long as you are syncing to the\
    \ same computer, you can sync many Apple devices (Apple says up to five, but we\
    \ have heard of people syncing more) to the same iTunes account on a single computer.\n\
    \n**CAUTION:** You can't sync the same iPad, iPhone, or iPod to two different\
    \ computers. When you attempt to do this, you will see a message similar to this:\
    \ “Would you like to wipe this device (iPad, iPhone, iPod) and re-sync the new\
    \ library?” If you select Yes, then all the music and videos on the device will\
    \ be erased.\n\n#### Other Sync Options: MobileMe and Exchange/Google\n\nThere\
    \ are other ways to synchronize your personal information and email, such as Exchange/Google\
    \ and MobileMe, which we cover in [Chapter 4](#Chapter04.html#ch4): “Other Sync\
    \ Methods.” Keep in mind, however, that even if you choose to go with these other\
    \ ways to sync, you will still need to use iTunes to\n\n*   Backup and restore\
    \ your iPad.\n*   Update the iPad operating system software.\n*   Sync and manage\
    \ your applications, also known as “apps.”\n*   Sync your music library and playlists.\n\
    *   Sync movies, TV shows, podcasts, and iTunes U content.\n*   Sync books.\n\
    *   Sync photos.\n\n#### Considering Other Sync Options\n\n[Table 3–1](#Chapter03.html#tab_3_1)\
    \ summarizes your other synchronization options. What you choose to use for synchronization\
    \ should be driven by where you currently store your email, contacts, and calendar—your\
    \ environment.\n\n**NOTE:** As you can see in [Table 3–1](#Chapter03.html#tab_3_1),\
    \ with some environments you can wirelessly sync your contacts and calendars to\
    \ your iPad.\n\n![images](images/p109-01.jpg)\n\n![images](images/p110-01.jpg)\n\
    \n### Setup Your iTunes Sync\n\nWe show you all the steps to perform both automated\
    \ syncs and manual transfers of information to your iPad using iTunes."
