    # iPad 摘要屏幕


    将 iPad 连接到电脑后，您可以查看重要信息，例如 iPad 的 GB 容量、已安装的软件版本和序列号。您还可以检查软件版本更新或恢复 iPad 上的数据。此屏幕上提供了其他几个选项。


    ## iTunes 导航基础


    熟悉左侧导航栏。点击左侧导航栏中的各个项目，并注意主显示窗口会随之变化（参见图 3-1）。


    主窗口顶部的导航栏也会根据您在左侧导航栏中选择的内容而变化。


    例如，当您在左侧导航栏中点击您的 iPad 时，主窗口顶部会显示与您设备相关的标签。


    当您在左侧导航栏中单击 iTunes Store 时，主窗口中会显示与商店相关的标签。


    要查看 `iPadSummary` 屏幕：


    1. 在您的电脑上启动 iTunes 软件。

    2. 使用设备附带的白色 USB 数据线将 iPad 连接到电脑。将线的一端插入 iPad 底部靠近 `Home` 按钮的位置，另一端插入电脑的 USB 端口。

    3. 如果连接成功，您应该在左侧导航栏的 `DEVICES` 下看到您的 iPad。

    4. 点击左侧导航栏中的 iPad，然后点击主窗口左侧边缘的 `Summary` 标签（参见图 3-1）。

    5. 如果您希望能够将音乐和视频拖放到 iPad 上，则需要勾选 `Manually manage music and videos` 旁边的复选框。

    6. 如果您希望每次连接 iPad 时自动打开 iTunes 并进行同步，请勾选 `Open iTunes when this iPad is connected`
    复选框。


    **注意：** 您可能会在摘要屏幕的“选项”区域看到 `Open iTunes when this iPad is connected` 旁边的文本和复选框呈灰色（不可点击）。这是因为在
    iTunes“编辑”>“偏好设置”![images](img/U001.jpg) “设备”标签屏幕中，`Prevent iPods, iPhones and
    iPads from syncing automatically` 旁边的复选框已被勾选。如果您在“偏好设置”![images](img/U001.jpg)
    “设备”标签中取消勾选此框，则可以使 `Open iTunes when this iPad is connected` 再次变为可点击项目。


    ![images](img/p111-01.jpg)


    ![images](img/0301.jpg)


    **图 3-1.** *iTunes 中的 iPad 摘要屏幕*


    ### iTunes 导航基础


    熟悉左侧导航栏。点击左侧导航栏中的各个项目，并注意主显示窗口会随之变化。


    主窗口顶部的导航栏也会根据您在左侧导航栏中选择的内容而变化。例如，当您在左侧导航栏中点击您的 `iPad` 时，主窗口顶部会显示与您设备相关的标签。当您在左侧导航栏中点击
    `iTunes Store` 时，主窗口中会显示与商店相关的标签。


    ## 进入同步设置屏幕（信息标签）


    您的第一步是进入同步联系人、日历、电子邮件等内容的设置屏幕。您可以按照前面描述的进入 `Summary` 屏幕的相同步骤操作，但现在需要在主 iTunes
    窗口顶部点击 `Info` 标签来查看联系人（以及其他同步设置）。


    ## 同步您的联系人和日历


    让我们从设置联系人和日历的同步开始。


    1. 勾选 `Sync Contacts with` 复选框，并调整下拉菜单以选择存储联系人的软件或服务。在本书出版时，Windows 电脑上可用的选项有
    Outlook、Google 联系人、Windows 联系人和 Yahoo! 通讯录。参见图 3-2。您还可以选择 `All contacts` 或 `Selected
    groups`。

    2. 要同步日历，请勾选 `Sync Calendars with` 复选框，并调整下拉列表以匹配您在电脑上存储日历的软件，如图 3-2 所示。您还可以选择
    `All calendars` 或 `Selected calendars`。


    ![images](img/0302.jpg)


    **图 3-2.** *选择用于同步联系人的软件 (Windows)*


    **警告**: 每当您在这些同步设置屏幕（称为同步提供商）中的软件和服务之间切换时，都会影响到连接到您 iTunes 帐户的每一个移动设备。例如，如果您将联系人同步到
    iPhone 或 iPod touch（除了您的 iPad 之外），这些更改也会影响到 MobileMe。您将更改您的 iTunes 帐户所连接的任何其他设备同步联系人的方式。


    ![images](img/p114-01.jpg)


    ### Google 和 Yahoo! 同步


    如果您选择 Google 或 Yahoo! 同步，系统将提示您输入您的 Google ID 或 Yahoo! ID 和密码。


    **注意**：您在 `Info` 标签和其他下拉框中看到的选项会根据您电脑上安装的软件略有不同。例如，在 Mac 上，联系人同步没有下拉列表；相反，其他服务（例如
    Google 联系人和 Yahoo!）会显示为单独的复选框。


    要继续设置您的电子邮件帐户、书签等，请向下滚动页面。如果您不想设置其他任何内容进行同步，请点击 iTunes 屏幕右下角的 `Apply` 按钮开始同步。


    **提示**：如果您是使用 Microsoft Entourage 的 Mac 用户，则需要启用 Entourage 与 iCal 的同步。为此，请进入 Entourage
    的“偏好设置”，然后转到“同步服务”并勾选与 iCal 和通讯簿同步的复选框，如图 3-3 所示。如果您是 Office for Mac 2011 的用户，则需要安装
    SP1（Service Pack 1）才能通过 iTunes 同步到您的 iPad。在本书撰写之时，SP1 更新尚未发布。根据 Microsoft 的 Office
    for Mac 网站，您应该能够使用 Apple 同步服务来同步 Outlook 的日历、联系人、备忘录和任务。


    ![images](img/0303.jpg)


    **图 3-3.** *Microsoft Entourage 和 Outlook 设置 (Apple Mac)*

