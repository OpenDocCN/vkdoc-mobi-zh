- fmt: "#### AirPlay: Wirelessly Stream Your iTunes Music Around Your House\n\nApple\
    \ has had the `AirTunes` app for a while. This app allows you to stream your `iTunes`\
    \ music to specially designed wireless speakers throughout your house. Recently,\
    \ Apple changed the app's name to `AirPlay`, and it has expanded the number of\
    \ manufacturers that build this new standard into their speaker, dock, and stereo\
    \ systems. `AirPlay` even transmits information from `iTunes` about the currently\
    \ playing song, including the song name, artist name, time played, and time remaining.\
    \ `AirPlay` will work audio-only with `Airport Express` and also stream video\
    \ with `Apple TV`.\n\nTo make sure the next speakers, dock, or stereo you purchase\
    \ is compatible, look for language such as \"Apple AirPlay Compatible\" in the\
    \ product description or packaging. Many manufacturers have products with this\
    \ new standard already, including `iHome`, `Sony`, `Denon`, `Marantz`, `B&W`,\
    \ and `JBL`.\n\n**TIP:** You can use the `Apple Remote` app (described in the\
    \ \"Apple Remote App\" section of this chapter) to control `iTunes` when you have\
    \ music streaming through your wireless speakers—even when you are nowhere near\
    \ your computer! This is a great feature to help you enjoy and control your music\
    \ throughout your house with your iPad.\n\n### Using iTunes Search\n\nIf your\
    \ library does not already contain hundreds or thousands of songs and other media,\
    \ it will soon! How do you quickly find that special song you are in the mood\
    \ for right now? The quickest way to locate an individual song or video is to\
    \ use the search field in the upper-right corner of the `iTunes` app.\n\nFirst,\
    \ in the Left Nav Bar, click the type of content you wish to find. For example,\
    \ click `Music` to find songs, `Podcasts` to find podcasts, `Apps` to find apps,\
    \ and so on.\n\nAfter selecting the category of media in the Left Nav Bar, click\
    \ in the `Search` field and start typing any part of the name of a song, artist,\
    \ composer, album, podcast, TV show, app, or audiobook.\n\nYou will notice that,\
    \ as soon as you type the first letter, `iTunes` will narrow your search results\
    \ (shown in the main window) by that letter. In this case, `iTunes` is finding\
    \ all matching songs/videos that have the letter (or series of letters) that match\
    \ any part of the artist, album, composer, or song/video name.\n\nIn the example\
    \ shown in [Figure 29–14](#Chapter29.html#fig_29_14), we clicked `Podcasts` and\
    \ typed \"Marketplace\" into the `Search` window to find the podcasts of the NPR\
    \ radio show, *Marketplace* (see [Figure 29–14](#Chapter29.html#fig_29_14)).\n\
    \n![images](images/2914.jpg)\n\n**Figure 29–14.** *Searching for media in `iTunes`*\n\
    \n**TIP:** If you want to narrow your search by a specific category such as artist,\
    \ composer, song name, or title, then click the little `Magnifying Glass` icon\
    \ in the `Search` field to see a dropdown list. Click any item in the dropdown\
    \ list to narrow the search using that item.\n\n![images](images/p706-01.jpg)\n\
    \n#### Ways to Search iTunes\n\nYou can type any combination of words to match\
    \ the item you are trying to find. For example, assume you know that the song\
    \ you want has the word \"love\" in the title, and the song is by `U2`. You could\
    \ just type in those two words, separated by a space—\"Love U2\"—and you will\
    \ immediately be shown all matching items (see [Figure 29–15](#Chapter29.html#fig_29_15)).\
    \ In this case, only two songs match, so you can quickly double-click the song\
    \ you want to listen to. Search is also contextual. This means that if you are\
    \ in your music library, the search function will search for music; if you are\
    \ in your apps library, the search will look only for apps. In every search, both\
    \ your own library and the `App Store` (if you have a live Internet connection)\
    \ will be searched.\n\n![images](images/2915.jpg)\n\n**Figure 29–15.** *Use two\
    \ or more words separated by spaces to quickly narrow the search results.*\n\n\
    When you are done searching, click the little `×` in the circle next to the search\
    \ words to clear out the search and see all your songs and videos again.\n\n###\
    \ Creating a New Playlist\n\nYou may be used to listening to all the music on\
    \ a particular album, but you will soon find the benefits of creating your own\
    \ custom playlists. These are lists of particular songs that you group together.\
    \ You can create a normal playlist or a smart playlist.\n\nYou can group playlists\
    \ however you like, as in this example:\n\n- Workout music\n- Favorite U2 songs\n\
    - Traveling music\n\n**TIP:** You can create playlists in your `iTunes` library\
    \ or directly on your `iPad`. To create a playlist for your computer, click any\
    \ existing playlist under the `Playlists` heading in the Left Nav Bar. To create\
    \ a new playlist directly on your `iPad`, click your `iPad`, listed under `Devices`\
    \ in the Left Nav Bar. Depending on what you have highlighted in the Left Nav\
    \ Bar, your new playlist will be created either on the computer or on the `iPad`.\n\
    \n#### Creating a Normal Playlist\n\nA normal playlist is one in which you can\
    \ drag and drop songs manually onto your new playlist.\n\nOnce you have decided\
    \ whether to create your playlist on your `iPad` or on your computer, you are\
    \ ready to get started. Follow these steps to create a new normal playlist:\n\n\
    ![images](images/p707-01.jpg)\n\n1.  Press `Ctrl+N` (or `Command+N` on the Mac)\
    \ to select a new playlist from the `File` menu. Or, you can simply click the\
    \ `New Playlist` button in the lower-left corner of `iTunes`, as shown to the\
    \ right.\n2.  Type the name of your playlist in the entry that appears in the\
    \ Left Nav Bar.\n\n    **TIP:** If you want to create a new playlist with songs\
    \ very similar to another playlist, then right-click the playlist and select `Duplicate`.\n\
    \nAfter creating and naming your playlist, you are ready to add songs to your\
    \ new playlist (see [Figure 29–16](#Chapter29.html#fig_29_16)). To select from\
    \ your entire library, click `Music` on the `Library` tab.\n\nTo select songs\
    \ from an existing playlist, click that playlist.\n\n![images](images/2916.jpg)\n\
    \n**Figure 29–16.** *Locating songs to add to a playlist*\n\n##### Adding Individual\
    \ Songs\n\nYou can easily add individual songs to your new playlist:\n\n1.  Click\
    \ any individual song to select it, and then keep holding down the mouse button\
    \ as you drag the song over to your new playlist.\n2.  To put the song into the\
    \ playlist, drop it by letting go of the mouse button when the song name you are\
    \ dragging is over the name of the playlist.\n\n    ![images](images/p709-01.jpg)\n\
    \n##### Adding Multiple Songs or Videos (Not in a List)\n\nYou can add multiple\
    \ items in two simple steps:\n\n1.  To add selected songs that are not listed\
    \ sequentially, press and hold the `Ctrl` key (Windows) or the `Command` key (Mac),\
    \ and then click the individual songs/videos. Once you are done selecting songs/videos,\
    \ release the `Ctrl`/`Command` key.\n2.  After all the songs/videos are selected\
    \ (highlighted), click one of the selected songs, and then drag and drop the entire\
    \ selected group onto your playlist.\n\n    ![images](images/p709-02.jpg)\n\n\
    ##### Adding a List of Songs or Videos\n\nYou can also add a list of songs/videos\
    \ using this pair of steps:\n\n![images](images/p710-01.jpg)\n\n1.  To add a list\
    \ of songs/videos to a playlist all at once, press and hold the `Shift` key. While\
    \ pressing the `Shift` key, click the top item in the list and then click the\
    \ bottom item. Both items clicked, as well as all the items between them, will\
    \ be selected.\n2.  After all the songs/videos are selected (highlighted), click\
    \ one of the selected songs, and drag and drop the entire selected group onto\
    \ your simple playlist."
  raw: "#### AirPlay: Wirelessly Stream Your iTunes Music Around Your House\n\nApple\
    \ has had the **AirTunes** app for a while. This app allows you to stream your\
    \ iTunes music to specially designed wireless speakers throughout your house.\
    \ Recently, Apple changed the app's name to **AirPlay**, and it has expanded the\
    \ number of manufacturers that build this new standard into their speaker, dock,\
    \ and stereo systems. **AirPlay** even transmits information from **iTunes** about\
    \ the currently playing song, including the song name, artist name, time played,\
    \ and time remaining. **AirPlay** will work audio-only with **Airport Express**\
    \ and also stream video with **Apple TV**.\n\nTo make sure the next speakers,\
    \ dock, or stereo you purchase is compatible, look for language such as “Apple\
    \ AirPlay Compatible” in the product description or packaging. Many manufacturers\
    \ have products with this new standard already, including iHome, Sony, Denon,\
    \ Marantz, B&W, and JBL.\n\n**TIP:** You can use the **Apple Remote** app (described\
    \ in the “Apple Remote App” section of this chapter) to control **iTunes** when\
    \ you have music streaming through your wireless speakers—even when you are nowhere\
    \ near your computer! This is a great feature to help you enjoy and control your\
    \ music throughout your house with your iPad.\n\n### Using iTunes Search\n\nIf\
    \ your library does not already contain hundreds or thousands of songs and other\
    \ media, it will soon! How do you quickly find that special song you are in the\
    \ mood for right now? The quickest way to locate an individual song or video is\
    \ to use the search field in the upper-right corner of the **iTunes** app.\n\n\
    First, in the Left Nav Bar, click the type of content you wish to find. For example,\
    \ click **Music** to find songs, **Podcasts** to find podcasts, **Apps** to find\
    \ apps, and so on.\n\nAfter selecting the category of media in the Left Nav Bar,\
    \ click in the **Search** field and start typing any part of the name of a song,\
    \ artist, composer, album, podcast, TV show, app, or audiobook.\n\nYou will notice\
    \ that, as soon as you type the first letter, **iTunes** will narrow your search\
    \ results (shown in the main window) by that letter. In this case, **iTunes**\
    \ is finding all matching songs/videos that have the letter (or series of letters)\
    \ that match any part of the artist, album, composer, or song/video name.\n\n\
    In the example shown in [Figure 29–14](#Chapter29.html#fig_29_14), we clicked\
    \ **Podcasts** and typed “Marketplace” into the **Search** window to find the\
    \ podcasts of the NPR radio show, *Marketplace* (see [Figure 29–14](#Chapter29.html#fig_29_14)).\n\
    \n![images](images/2914.jpg)\n\n**Figure 29–14.** *Searching for media in **iTunes***\n\
    \n**TIP:** If you want to narrow your search by a specific category such as artist,\
    \ composer, song name, or title, then click the little **Magnifying Glass** icon\
    \ in the **Search** field to see a dropdown list. Click any item in the dropdown\
    \ list to narrow the search using that item.\n\n![images](images/p706-01.jpg)\n\
    \n#### Ways to Search iTunes\n\nYou can type any combination of words to match\
    \ the item you are trying to find. For example, assume you know that the song\
    \ you want has the word “love” in the title, and the song is by U2\\. You could\
    \ just type in those two words, separated by a space—“Love U2”—and you will immediately\
    \ be shown all matching items (see [Figure 29–15](#Chapter29.html#fig_29_15)).\
    \ In this case, only two songs match, so you can quickly double-click the song\
    \ you want to listen to. Search is also contextual. This means that if you are\
    \ in your music library, the search function will search for music; if you are\
    \ in your apps library, the search will look only for apps. In every search, both\
    \ your own library and the **App Store** (if you have a live Internet connection)\
    \ will be searched.\n\n![images](images/2915.jpg)\n\n**Figure 29–15.** *Use two\
    \ or more words separated by spaces to quickly narrow the search results.*\n\n\
    When you are done searching, click the little **×** in the circle next to the\
    \ search words to clear out the search and see all your songs and videos again.\n\
    \n### Creating a New Playlist\n\nYou may be used to listening to all the music\
    \ on a particular album, but you will soon find the benefits of creating your\
    \ own custom playlists. These are lists of particular songs that you group together.\
    \ You can create a normal playlist or a smart playlist.\n\nYou can group playlists\
    \ however you like, as in this example:\n\n*   Workout music\n*   Favorite U2\
    \ songs\n*   Traveling music\n\n**TIP:** You can create playlists in your iTunes\
    \ library or directly on your iPad. To create a playlist for your computer, click\
    \ any existing playlist under the **Playlists** heading in the Left Nav Bar. To\
    \ create a new playlist directly on your iPad, click your iPad, listed under **Devices**\
    \ in the Left Nav Bar. Depending on what you have highlighted in the Left Nav\
    \ Bar, your new playlist will be created either on the computer or on the iPad.\n\
    \n#### Creating a Normal Playlist\n\nA normal playlist is one in which you can\
    \ drag and drop songs manually onto your new playlist.\n\nOnce you have decided\
    \ whether to create your playlist on your iPad or on your computer, you are ready\
    \ to get started. Follow these steps to create a new normal playlist:\n\n![images](images/p707-01.jpg)\n\
    \n1.  Press **Ctrl+N** (or **Command+N** on the Mac) to select a new playlist\
    \ from the **File** menu. Or, you can simply click the **New Playlist** button\
    \ in the lower-left corner of **iTunes**, as shown to the right.\n2.  Type the\
    \ name of your playlist in the entry that appears in the Left Nav Bar.\n\n   \
    \ **TIP:** If you want to create a new playlist with songs very similar to another\
    \ playlist, then right-click the playlist and select **Duplicate**.\n\nAfter creating\
    \ and naming your playlist, you are ready to add songs to your new playlist (see\
    \ [Figure 29–16](#Chapter29.html#fig_29_16)). To select from your entire library,\
    \ click **Music** on the **Library** tab.\n\nTo select songs from an existing\
    \ playlist, click that playlist.\n\n![images](images/2916.jpg)\n\n**Figure 29–16.**\
    \ *Locating songs to add to a playlist*\n\n##### Adding Individual Songs\n\nYou\
    \ can easily add individual songs to your new playlist:\n\n1.  Click any individual\
    \ song to select it, and then keep holding down the mouse button as you drag the\
    \ song over to your new playlist.\n2.  To put the song into the playlist, drop\
    \ it by letting go of the mouse button when the song name you are dragging is\
    \ over the name of the playlist.\n\n    ![images](images/p709-01.jpg)\n\n#####\
    \ Adding Multiple Songs or Videos (Not in a List)\n\nYou can add multiple items\
    \ in two simple steps:\n\n1.  To add selected songs that are not listed sequentially,\
    \ press and hold the **Ctrl** key (Windows) or the **Command** key (Mac), and\
    \ then click the individual songs/videos. Once you are done selecting songs/videos,\
    \ release the **Ctrl**/**Command** key.\n2.  After all the songs/videos are selected\
    \ (highlighted), click one of the selected songs, and then drag and drop the entire\
    \ selected group onto your playlist.\n\n    ![images](images/p709-02.jpg)\n\n\
    ##### Adding a List of Songs or Videos\n\nYou can also add a list of songs/videos\
    \ using this pair of steps:\n\n![images](images/p710-01.jpg)\n\n1.  To add a list\
    \ of songs/videos to a playlist all at once, press and hold the **Shift** key.\
    \ While pressing the **Shift** key, click the top item in the list and then click\
    \ the bottom item. Both items clicked, as well as all the items between them,\
    \ will be selected.\n2.  After all the songs/videos are selected (highlighted),\
    \ click one of the selected songs, and drag and drop the entire selected group\
    \ onto your simple playlist."
  trans: "\n#### AirPlay：通过无线方式将 iTunes 音乐传输至家中各处\n\n苹果公司推出 `AirTunes` 应用已有一段时间。该应用可让你将\
    \ `iTunes` 音乐流式传输到家中的特殊无线音箱。近期，苹果将其更名为 `AirPlay`，并扩大了采用此新标准的制造商范围，这些制造商将 `AirPlay`\
    \ 集成到其音箱、基座及立体声音响系统中。`AirPlay` 甚至能传输 `iTunes` 中当前播放歌曲的信息，包括歌曲名、歌手名、已播放时间和剩余时间。`AirPlay`\
    \ 可配合 `Airport Express` 实现纯音频传输，也能配合 `Apple TV` 传输视频。\n\n为确保你接下来购买的音箱、基座或立体声音响兼容，请在产品描述或包装上寻找诸如“兼容\
    \ Apple AirPlay”之类的字样。许多制造商已推出支持此新标准的产品，包括 `iHome`、`Sony`、`Denon`、`Marantz`、`B&W`\
    \ 和 `JBL`。\n\n**提示：** 当音乐通过无线音箱流式播放时，即使你远离电脑，也可以使用 `Apple Remote` 应用（在本章“Apple\
    \ Remote App”部分介绍）来控制 `iTunes`！这是一个很棒的功能，可帮助你通过 iPad 在家中各处享受并控制你的音乐。\n\n### 使用\
    \ iTunes 搜索\n\n即使你的资料库目前尚未包含成百上千首歌曲或其他媒体，它很快也会达到这个规模！如何快速找到此刻你想听的那首特定歌曲？定位单首歌曲或视频的最快方法是使用\
    \ `iTunes` 应用右上角的搜索字段。\n\n首先，在左侧导航栏中，点击你要查找的内容类型。例如，点击 `Music` 查找歌曲，点击 `Podcasts`\
    \ 查找播客，点击 `Apps` 查找应用，以此类推。\n\n在左侧导航栏中选择了媒体类别后，点击 `Search` 字段，开始输入歌曲、歌手、作曲家、专辑、播客、电视节目、应用或有声书的名称的任何部分。\n\
    \n你会注意到，一旦输入第一个字母，`iTunes` 就会根据该字母缩小搜索结果（显示在主窗口中）。在这种情况下，`iTunes` 会找出所有匹配的歌曲/视频，这些歌曲/视频的名称、歌手、专辑或作曲家中的任何部分都包含该字母（或连续的字母序列）。\n\
    \n在图 29-14 所示的示例中，我们点击了 `Podcasts`，并在 `Search` 窗口中输入了“Marketplace”，以查找 NPR 广播节目\
    \ *Marketplace* 的播客（见图 29-14）。\n\n![images](img/2914.jpg)\n\n**图 29-14.** *在 `iTunes`\
    \ 中搜索媒体*\n\n**提示：** 如果想按特定类别（如歌手、作曲家、歌曲名或标题）缩小搜索范围，请点击 `Search` 字段中的小`放大镜`图标，查看下拉列表。点击下拉列表中的任意项，即可使用该项缩小搜索范围。\n\
    \n![images](img/p706-01.jpg)\n\n#### 在 iTunes 中搜索的方法\n\n你可以输入任意单词组合来匹配要查找的项目。例如，假设你知道想要的那首歌标题中包含“love”一词，并且是\
    \ `U2` 乐队的歌曲。你可以直接输入这两个单词，用空格隔开——例如“Love U2”——然后所有匹配的项目将立即显示出来（见图 29-15）。在这个例子中，只有两首歌曲匹配，因此你可以快速双击想要收听的歌曲。搜索也是上下文相关的。这意味着，如果你在音乐资料库中，搜索功能将搜索音乐；如果你在应用资料库中，搜索将只查找应用。每次搜索时，都会在你的个人资料库和\
    \ `App Store`（如果处于联网状态）中进行搜索。\n\n![images](img/2915.jpg)\n\n**图 29-15.** *使用两个或更多由空格分隔的单词快速缩小搜索结果范围*\n\
    \n完成搜索后，点击搜索词旁边圆圈内的小 `×`，清除搜索并重新查看所有歌曲和视频。\n\n### 创建新播放列表\n\n你可能习惯于收听某张专辑中的所有音乐，但很快你就会发现创建自定义播放列表的好处。这些列表是你将特定歌曲组合在一起而形成的列表。你可以创建普通播放列表或智能播放列表。\n\
    \n你可以随心所欲地对播放列表进行分组，例如：\n\n- 健身音乐\n- 最喜欢的 U2 歌曲\n- 旅行音乐\n\n**提示：** 你可以直接在 `iTunes`\
    \ 资料库中创建播放列表，也可以直接在 `iPad` 上创建。要在电脑上创建播放列表，请点击左侧导航栏中 `Playlists` 标题下的任意现有播放列表。要直接在\
    \ `iPad` 上创建新播放列表，请点击左侧导航栏中 `Devices` 下列出的你的 `iPad`。根据你在左侧导航栏中高亮选中的内容，你的新播放列表将在电脑上或\
    \ `iPad` 上创建。\n\n#### 创建普通播放列表\n\n普通播放列表是指你可以手动将歌曲拖放到新播放列表中的列表。\n\n确定是在 `iPad`\
    \ 上还是在电脑上创建播放列表后，就可以开始操作了。请按照以下步骤创建新的普通播放列表：\n\n![images](img/p707-01.jpg)\n\n\
    1.  按下 `Ctrl+N`（在 Mac 上为 `Command+N`），从 `File` 菜单中选择新建播放列表。或者，你也可以直接点击 `iTunes`\
    \ 左下角的 `New Playlist` 按钮，如右图所示。\n2.  在左侧导航栏中出现的条目内，输入播放列表的名称。\n\n    **提示：** 如果你想创建一个与另一个播放列表歌曲非常相似的新播放列表，可以右键点击该播放列表，然后选择\
    \ `Duplicate`。\n\n创建并命名播放列表后，就可以向新播放列表中添加歌曲了（见图 29-16）。要从整个资料库中选择，请点击 `Library`\
    \ 选项卡上的 `Music`。\n\n要从现有播放列表中选择歌曲，请点击该播放列表。\n\n![images](img/2916.jpg)\n\n**图\
    \ 29-16.** *定位要添加到播放列表的歌曲*\n\n##### 添加单首歌曲\n\n你可以轻松地将单首歌曲添加到新播放列表：\n\n1.  点击任意一首歌曲以将其选中，然后按住鼠标左键，将歌曲拖到你的新播放列表上。\n\
    2.  当拖动的歌曲名称位于播放列表名称上方时，松开鼠标按钮，即可将歌曲放入播放列表。\n\n    ![images](img/p709-01.jpg)\n\
    \n##### 添加多首歌曲或视频（不在列表中）\n\n你可以通过两个简单步骤添加多个项目：\n\n1.  要添加并非连续排列的选中歌曲，请按住 `Ctrl`\
    \ 键（Windows）或 `Command` 键（Mac），然后依次点击单个歌曲/视频。选择完所有歌曲/视频后，松开 `Ctrl`/`Command` 键。\n\
    2.  选中（高亮显示）所有歌曲/视频后，点击其中一个选中的歌曲，然后将整个选中组拖放到你的播放列表中。\n\n    ![images](img/p709-02.jpg)\n\
    \n##### 添加歌曲或视频列表\n\n你也可以通过以下两步操作来添加歌曲/视频列表：\n\n![images](img/p710-01.jpg)\n\n\
    1.  要一次性将歌曲/视频列表添加到播放列表，请按住 `Shift` 键。在按住 `Shift` 键的同时，点击列表中的第一个项目，然后点击最后一个项目。点击的两个项目及其之间的所有项目都将被选中。\n\
    2.  选中（高亮显示）所有歌曲/视频后，点击其中一个选中的歌曲，然后将整个选中组拖放到你的普通播放列表中。\n"
- fmt: "### Creating a New Smart Playlist\n\nA smart playlist is one that `iTunes`\
    \ creates for you based on your selections. For example, you can create a smart\
    \ playlist for your ten most-played songs, specific artists, or a specific genre,\
    \ and you can even limit the playlist to a certain size based on the number of\
    \ songs or their size (in MB or GB).\n\nTo start creating a smart playlist, select\
    \ `File` `![images](images/U001.jpg)` `New Smart Playlist` (alternatively, on\
    \ Windows you can press `Ctrl+Alt+N` and then select `New Smart Playlist` from\
    \ the `File` menu; and on the Mac you can press `Command+Option+N` and just input\
    \ the search parameters).\n\n`[Figure 29–17](#Chapter29.html#fig_29_17)` illustrates\
    \ that you have many options for creating a smart playlist. All of the default\
    \ playlists you see in `iTunes` are smart playlists. Default categories include\
    \ `90's Music`, `Classical Music`, `Music Videos`, `My Top Rated`, `Recently Added`,\
    \ `Recently Played`, and `Top 25 Most Played`.\n\n![images](images/2917.jpg)\n\
    \n**Figure 29–17.** *The `Smart Playlist` settings screen*\n\n#### Editing a Smart\
    \ Playlist\n\nThe best way to get a feel for how the smart playlist function works\
    \ is probably to check out some of the preset smart playlists. To edit a smart\
    \ playlist, select `Edit Smart Playlist` from the `File` menu. In `[Figure 29–18](#Chapter29.html#fig_29_18)`,\
    \ you can see the smart playlist for `90's Music`; you can also see that it will\
    \ pull all music and music videos from 1990 to 1999. Check out a few other default\
    \ smart playlists to begin learning how the myriad options interact to create\
    \ a very powerful playlist function.\n\n![images](images/2918.jpg)\n\n**Figure\
    \ 29–18.** *The `Smart Playlist` settings screen for `90's Music`*\n\n**NOTE:**\
    \ The `Live Updating` feature of smart playlists allows them to scan whenever\
    \ you play a song or add any new media (e.g., songs and videos) to your library;\
    \ it then includes any new songs that it deems may fit the criteria of the smart\
    \ playlist. This makes the playlists really dynamic.\n\n### The iTunes Genius\
    \ Feature\n\nThe iTunes Genius feature can do all sorts of fun things to help\
    \ enhance your music and video library in `iTunes`. You can take advantage of\
    \ it by following these steps:\n\n1.  Click `Genius` in the Left Nav Bar, and\
    \ then click the `Turn On Genius` button. If you don't see the `Genius` item,\
    \ then click `Store` and `Turn On Genius` from the `iTunes` menu.\n2.  If you\
    \ are not already logged into the iTunes Store, you will be asked to log in. If\
    \ you do not yet have an Apple ID, then please jump to the \"Creating an iTunes\
    \ Account\" section later in this chapter to learn how to create one.\n3.  Read\
    \ and agree to the Genius license agreement to continue.\n4.  Next, you will see\
    \ a window on your screen for some time (longer if your library is large) that\
    \ says the Genius feature is starting.\n5.  In order for the Genius feature to\
    \ work correctly, `iTunes` needs to understand the types of music and videos you\
    \ have in your library. It will use this information to help make suggestions\
    \ on similar music or videos that you don't yet own, but might want to purchase.\
    \ When this step is done, you will see a final success screen telling you Genius\
    \ is now set up. Now you are ready to start using the Genius feature!\n\n**TIP:**\
    \ You can use the Genius feature on your iPad, but only after you have enabled\
    \ it on your computer (as just described).\n\nYou can think of the Genius feature\
    \ as your personal shopper, one who knows your tastes and makes good recommendations\
    \ (Genius suggestions). You can also think of the Genius feature as your personal\
    \ DJ, one who knows the music that goes well together and will create a great\
    \ playlist for you (Genius playlists).\n\n#### Creating Genius Mixes and Playlists\n\
    \nFollow these steps to create a Genius mix and playlist:\n\n1.  Right-click a\
    \ song in your library that you would like for your Genius playlist and select\
    \ `Start Genius`.\n\n    ![images](images/p713-01.jpg)\n\n2.  After you click\
    \ the `Start Genius` dropdown item, the screen will immediately change to show\
    \ you the `Genius` mix of all songs that `iTunes` thinks match the type of song\
    \ you selected (see `[Figure 29–19](#Chapter29.html#fig_29_19)`); these suggestions\
    \ are based on computer algorithms and feedback from other `iTunes` users. You\
    \ may be surprised at the list of music or even artists that you would not normally\
    \ put together into a playlist.\n\n    **TIP:** Genius mixes and playlists provide\
    \ a great way to keep your music library fresh, helping you to put together songs\
    \ that go well together—often in combinations that you might not have thought\
    \ about yourself.\n\n    ![images](images/2919.jpg)\n\n    **Figure 29–19.** *The\
    \ options for the `Genius Mix` screen*\n\n3.  On the `Genius Mix` screen, you\
    \ have options to choose between 25, 50, 75, or 100 songs. Click the `Refresh`\
    \ button to see a new (usually slightly different) mix/playlist.\n4.  If you like\
    \ the mix and want to save it as a playlist, click the `Save Playlist` button\
    \ in the upper-right corner. Notice that the playlist is saved under the `Genius`\
    \ section in the left column. The default name of the playlist is the name of\
    \ the song you first clicked. You can change this name by double-clicking the\
    \ playlist name. You will see it turn into editable text; from here, you can type\
    \ a new name.\n\n    ![images](images/p714-01.jpg)\n\n#### Turning Off Genius\n\
    \nTo turn off the Genius feature and remove all your Genius mixes and playlists,\
    \ select `Store` from the `iTunes` menu, and then choose `Turn Off Genius`.\n\n\
    #### Updating Genius\n\nIf you have added a lot of music, videos, or other content\
    \ to your iTunes library, periodically you will want to send an update to the\
    \ Genius function in `iTunes`. To send this update, select `Store` from the `iTunes`\
    \ menu, and then choose `Update Genius`.\n\n### How to Back Up and Restore Your\
    \ iTunes Library\n\nIn order to protect the sizable investment in your iTunes\
    \ music, videos, and more, you should periodically back up your library. You can\
    \ use the built-in CD or DVD burner in your computer to back up your library,\
    \ but this process becomes cumbersome if you have a large media library. When\
    \ you have a larger iTunes library, you should backup your library to an external\
    \ hard disk.\n\n#### Back up with CDs or DVDs (for Smaller Libraries)\n\nFor smaller\
    \ iTunes libraries, you can use CDs or DVDs to backup your media. To do this,\
    \ select `File` `![images](images/U001.jpg)` `Library` `![images](images/U001.jpg)`\
    \ `Backup to Disc` from the `iTunes` menu. You will see a window with several\
    \ options (see `[Figure 29–20](#Chapter29.html#fig_29_20)`). We recommend selecting\
    \ the default and backing up everything; however, you could also choose to back\
    \ up just purchases from the iTunes Store. After you insert all the disks required\
    \ for the backup, you will see a backup complete message. If you have recently\
    \ backed up to disk, then you can save time and space by checking the `Only back\
    \ up items added or changed since last backup` box.\n\n**TIP:** If you need to\
    \ back up to DVD or CDs, we highly recommend opting for the DVD method to do the\
    \ backup, since it can hold four to eight times the content of a CD.\n\n![images](images/2920.jpg)\n\
    \n**Figure 29–20.** *The options for `iTunes` backup*\n\n#### To Restore from\
    \ CDs or DVDs\n\nAll you need to do to start restoring your library is to insert\
    \ the first backup CD or DVD, and `iTunes` will ask you if you would like to restore\
    \ from the backup disk.\n\n**TIP:** You can also restore individual files by clicking\
    \ the backup disk under the `Devices` section listed in the Left Nav Bar, and\
    \ then dragging-and-dropping files from the backup to your library. However, a\
    \ few items are lost from restored files, such as bookmarks of the last played\
    \ content."
  raw: "### Creating a New Smart Playlist\n\nA smart playlist is one that **iTunes**\
    \ creates for you based on your selections. For example, you can create a smart\
    \ playlist for your ten most-played songs, specific artists, or a specific genre,\
    \ and you can even limit the playlist to a certain size based on the number of\
    \ songs or their size (in MB or GB).\n\nTo start creating a smart playlist, select\
    \ **File ![images](images/U001.jpg) New Smart Playlist** (alternatively, on Windows\
    \ you can press **Ctrl+Alt+N** and then select **New Smart Playlist** from the\
    \ **File** menu; and on the Mac you can press **Command+Option+N** and just input\
    \ the search parameters).\n\n[Figure 29–17](#Chapter29.html#fig_29_17) illustrates\
    \ that you have many options for creating a smart playlist. All of the default\
    \ playlists you see in **iTunes** are smart playlists. Default categories include\
    \ **90's Music**, **Classical Music**, **Music Videos**, **My Top Rated**, **Recently\
    \ Added**, **Recently Played**, and **Top 25 Most Played**.\n\n![images](images/2917.jpg)\n\
    \n**Figure 29–17.** *The **Smart Playlist** settings screen*\n\n#### Editing a\
    \ Smart Playlist\n\nThe best way to get a feel for how the smart playlist function\
    \ works is probably to check out some of the preset smart playlists. To edit a\
    \ smart playlist, select **Edit Smart Playlist** from the **File** menu. In [Figure\
    \ 29–18](#Chapter29.html#fig_29_18), you can see the smart playlist for **90's\
    \ Music**; you can also see that it will pull all music and music videos from\
    \ 1990 to 1999\\. Check out a few other default smart playlists to begin learning\
    \ how the myriad options interact to create a very powerful playlist function.\n\
    \n![images](images/2918.jpg)\n\n**Figure 29–18.** *The **Smart Playlist** settings\
    \ screen for **90's Music***\n\n**NOTE:** The **Live Updating** feature of smart\
    \ playlists allows them to scan whenever you play a song or add any new media\
    \ (e.g., songs and videos) to your library; it then includes any new songs that\
    \ it deems may fit the criteria of the smart playlist. This makes the playlists\
    \ really dynamic.\n\n### The iTunes Genius Feature\n\nThe iTunes Genius feature\
    \ can do all sorts of fun things to help enhance your music and video library\
    \ in **iTunes**. You can take advantage of it by following these steps:\n\n1.\
    \  Click **Genius** in the Left Nav Bar, and then click the **Turn On Genius**\
    \ button. If you don't see the **Genius** item, then click **Store** and **Turn\
    \ On Genius** from the **iTunes** menu.\n2.  If you are not already logged into\
    \ the iTunes Store, you will be asked to log in. If you do not yet have an Apple\
    \ ID, then please jump to the “Creating an iTunes Account” section later in this\
    \ chapter to learn how to create one.\n3.  Read and agree to the Genius license\
    \ agreement to continue.\n4.  Next, you will see a window on your screen for some\
    \ time (longer if your library is large) that says the Genius feature is starting.\n\
    5.  In order for the Genius feature to work correctly, **iTunes** needs to understand\
    \ the types of music and videos you have in your library. It will use this information\
    \ to help make suggestions on similar music or videos that you don't yet own,\
    \ but might want to purchase. When this step is done, you will see a final success\
    \ screen telling you Genius is now set up. Now you are ready to start using the\
    \ Genius feature!\n\n**TIP:** You can use the Genius feature on your iPad, but\
    \ only after you have enabled it on your computer (as just described).\n\nYou\
    \ can think of the Genius feature as your personal shopper, one who knows your\
    \ tastes and makes good recommendations (Genius suggestions). You can also think\
    \ of the Genius feature as your personal DJ, one who knows the music that goes\
    \ well together and will create a great playlist for you (Genius playlists).\n\
    \n#### Creating Genius Mixes and Playlists\n\nFollow these steps to create a Genius\
    \ mix and playlist:\n\n1.  Right-click a song in your library that you would like\
    \ for your Genius playlist and select **Start Genius**.\n\n    ![images](images/p713-01.jpg)\n\
    \n2.  After you click the **Start Genius** dropdown item, the screen will immediately\
    \ change to show you the **Genius** mix of all songs that **iTunes** thinks match\
    \ the type of song you selected (see [Figure 29–19](#Chapter29.html#fig_29_19));\
    \ these suggestions are based on computer algorithms and feedback from other **iTunes**\
    \ users. You may be surprised at the list of music or even artists that you would\
    \ not normally put together into a playlist.\n\n    **TIP:** Genius mixes and\
    \ playlists provide a great way to keep your music library fresh, helping you\
    \ to put together songs that go well together—often in combinations that you might\
    \ not have thought about yourself.\n\n    ![images](images/2919.jpg)\n\n    **Figure\
    \ 29–19.** *The options for the **Genius Mix** screen*\n\n3.  On the **Genius\
    \ Mix** screen, you have options to choose between 25, 50, 75, or 100 songs. Click\
    \ the **Refresh** button to see a new (usually slightly different) mix/playlist.\n\
    4.  If you like the mix and want to save it as a playlist, click the **Save Playlist**\
    \ button in the upper-right corner. Notice that the playlist is saved under the\
    \ **Genius** section in the left column. The default name of the playlist is the\
    \ name of the song you first clicked. You can change this name by double-clicking\
    \ the playlist name. You will see it turn into editable text; from here, you can\
    \ type a new name.\n\n    ![images](images/p714-01.jpg)\n\n#### Turning Off Genius\n\
    \nTo turn off the Genius feature and remove all your Genius mixes and playlists,\
    \ select **Store** from the **iTunes** menu, and then choose **Turn Off Genius**.\n\
    \n#### Updating Genius\n\nIf you have added a lot of music, videos, or other content\
    \ to your iTunes library, periodically you will want to send an update to the\
    \ Genius function in **iTunes**. To send this update, select **Store** from the\
    \ **iTunes** menu, and then choose **Update Genius**.\n\n### How to Back Up and\
    \ Restore Your iTunes Library\n\nIn order to protect the sizable investment in\
    \ your iTunes music, videos, and more, you should periodically back up your library.\
    \ You can use the built-in CD or DVD burner in your computer to back up your library,\
    \ but this process becomes cumbersome if you have a large media library. When\
    \ you have a larger iTunes library, you should backup your library to an external\
    \ hard disk.\n\n#### Back up with CDs or DVDs (for Smaller Libraries)\n\nFor smaller\
    \ iTunes libraries, you can use CDs or DVDs to backup your media. To do this,\
    \ select **File** ![images](images/U001.jpg) **Library** ![images](images/U001.jpg)\
    \ **Backup to Disc** from the **iTunes** menu. You will see a window with several\
    \ options (see [Figure 29–20](#Chapter29.html#fig_29_20)). We recommend selecting\
    \ the default and backing up everything; however, you could also choose to back\
    \ up just purchases from the iTunes Store. After you insert all the disks required\
    \ for the backup, you will see a backup complete message. If you have recently\
    \ backed up to disk, then you can save time and space by checking the **Only back\
    \ up items added or changed since last backup** box.\n\n**TIP:** If you need to\
    \ back up to DVD or CDs, we highly recommend opting for the DVD method to do the\
    \ backup, since it can hold four to eight times the content of a CD.\n\n![images](images/2920.jpg)\n\
    \n**Figure 29–20.** *The options for **iTunes** backup*\n\n#### To Restore from\
    \ CDs or DVDs\n\nAll you need to do to start restoring your library is to insert\
    \ the first backup CD or DVD, and **iTunes** will ask you if you would like to\
    \ restore from the backup disk.\n\n**TIP:** You can also restore individual files\
    \ by clicking the backup disk under the **Devices** section listed in the Left\
    \ Nav Bar, and then dragging-and-dropping files from the backup to your library.\
    \ However, a few items are lost from restored files, such as bookmarks of the\
    \ last played content."
  trans: "\n### 创建智能播放列表\n\n智能播放列表是由 `iTunes` 根据您的选择自动创建的播放列表。例如，您可以创建一个包含播放次数最多的十首歌曲、特定艺人或特定流派的智能播放列表，甚至可以限制播放列表的大小（基于歌曲数量或其文件大小）。\n\
    \n要开始创建智能播放列表，请选择 `文件` `![images](img/U001.jpg)` `新建智能播放列表`（或者，在 Windows 上您可以按\
    \ `Ctrl+Alt+N`，然后从 `文件` 菜单中选择 `新建智能播放列表`；在 Mac 上您可以按 `Command+Option+N`，然后直接输入搜索参数）。\n\
    \n`图 29–17` 展示了您在创建智能播放列表时拥有的众多选项。您在 `iTunes` 中看到的所有默认播放列表都是智能播放列表。默认类别包括 `90\
    \ 年代音乐`、`古典音乐`、`音乐视频`、`我的最爱`、`最近添加`、`最近播放` 和 `播放次数最多的前 25 名`。\n\n![images](img/2917.jpg)\n\
    \n**图 29–17.** *`智能播放列表` 设置界面*\n\n#### 编辑智能播放列表\n\n了解智能播放列表功能工作原理的最佳方式可能是查看一些预设的智能播放列表。要编辑智能播放列表，请从\
    \ `文件` 菜单中选择 `编辑智能播放列表`。在 `图 29–18` 中，您可以看到 `90 年代音乐` 的智能播放列表；您还可以看到它将提取 1990\
    \ 年至 1999 年的所有音乐和音乐视频。查看其他一些默认的智能播放列表，开始了解众多选项如何相互作用，从而创建一个非常强大的播放列表功能。\n\n![images](img/2918.jpg)\n\
    \n**图 29–18.** *`90 年代音乐` 的 `智能播放列表` 设置界面*\n\n**注意：** 智能播放列表的 `动态更新` 功能允许它们在您播放任何歌曲或向资料库添加任何新媒体（例如歌曲和视频）时进行扫描；然后，它将收录其认为符合智能播放列表条件的任何新歌曲。这使播放列表真正具有动态性。\n\
    \n### iTunes“天才”功能\n\niTunes“天才”功能可以执行各种有趣的操作，帮助您在 `iTunes` 中优化您的音乐和视频资料库。您可以通过以下步骤利用此功能：\n\
    \n1.  单击左侧导航栏中的 `“天才”`，然后单击 `开启“天才”` 按钮。如果您看不到 `“天才”` 项目，请单击 `Store`，然后从 `iTunes`\
    \ 菜单中选择 `开启“天才”`。\n2.  如果您尚未登录 iTunes Store，系统将要求您登录。如果您还没有 Apple ID，请跳转到本章后面的“创建\
    \ iTunes 帐户”部分，了解如何创建一个。\n3.  阅读并同意“天才”许可协议以继续。\n4.  接下来，您的屏幕上将出现一个窗口（如果您的资料库很大，则时间会更长），显示“天才”功能正在启动。\n\
    5.  为了使“天才”功能正常工作，`iTunes` 需要了解您资料库中拥有的音乐和视频的类型。它将利用这些信息来帮助推荐您尚未拥有、但可能想要购买的类似音乐或视频。当此步骤完成时，您将看到一个最终的成功界面，告知您“天才”现已设置完毕。现在您可以开始使用“天才”功能了！\n\
    \n**提示：** 您可以在 iPad 上使用“天才”功能，但前提是您已在电脑上启用它（如上所述）。\n\n您可以将“天才”功能视为您的私人购物顾问，他了解您的品味并提出很好的推荐（“天才”建议）。您也可以将“天才”功能视为您的私人\
    \ DJ，他了解哪些音乐可以完美搭配，并会为您创建出色的播放列表（“天才”播放列表）。\n\n#### 创建“天才”混合曲目和播放列表\n\n按照以下步骤创建“天才”混合曲目和播放列表：\n\
    \n1.  在您的资料库中右键单击一首您想用于“天才”播放列表的歌曲，然后选择 `启动“天才”`。\n\n    ![images](img/p713-01.jpg)\n\
    \n2.  单击 `启动“天才”` 下拉项后，屏幕将立即更改为显示 `“天才”` 混合曲目，其中包含 `iTunes` 认为与您选择的歌曲类型匹配的所有歌曲（参见\
    \ `图 29–19`）；这些建议基于计算机算法和其他 `iTunes` 用户的反馈。您可能会对列表中的音乐甚至艺人感到惊讶，这些内容通常您不会放到同一个播放列表中。\n\
    \n    **提示：** “天才”混合曲目和播放列表提供了一种很好的方式来保持您的音乐资料库的新鲜感，帮助您将搭配良好的歌曲组合在一起——这些组合通常是您自己可能没有想到的。\n\
    \n    ![images](img/2919.jpg)\n\n    **图 29–19.** *`“天才”混合曲目` 界面的选项*\n\n3.  在\
    \ `“天才”混合曲目` 界面上，您可以选择 25、50、75 或 100 首歌曲。单击 `刷新` 按钮可以查看新的（通常略有不同的）混合曲目/播放列表。\n\
    4.  如果您喜欢该混合曲目并想将其保存为播放列表，请单击右上角的 `保存播放列表` 按钮。请注意，该播放列表将保存在左侧列 `“天才”` 部分下。播放列表的默认名称是您最初单击的那首歌的名称。您可以通过双击播放列表名称来更改此名称。您将看到它变为可编辑文本；在此处，您可以输入新名称。\n\
    \n    ![images](img/p714-01.jpg)\n\n#### 关闭“天才”功能\n\n要关闭“天才”功能并移除所有“天才”混合曲目和播放列表，请从\
    \ `iTunes` 菜单中选择 `Store`，然后选择 `关闭“天才”`。\n\n#### 更新“天才”功能\n\n如果您向 iTunes 资料库添加了大量音乐、视频或其他内容，您应定期向\
    \ `iTunes` 中的“天才”功能发送更新。要发送此更新，请从 `iTunes` 菜单中选择 `Store`，然后选择 `更新“天才”`。\n\n###\
    \ 如何备份和恢复您的 iTunes 资料库\n\n为了保护您在 iTunes 音乐、视频等方面的大量投资，您应定期备份您的资料库。您可以使用电脑内置的 CD\
    \ 或 DVD 刻录机备份资料库，但如果您的媒体资料库很大，此过程会变得繁琐。当您拥有较大的 iTunes 资料库时，应将资料库备份到外部硬盘。\n\n####\
    \ 使用 CD 或 DVD 备份（适用于较小资料库）\n\n对于较小的 iTunes 资料库，您可以使用 CD 或 DVD 来备份您的媒体。为此，请从 `iTunes`\
    \ 菜单中选择 `文件` `![images](img/U001.jpg)` `资料库` `![images](img/U001.jpg)` `备份到光盘`。您将看到一个包含多个选项的窗口（参见\
    \ `图 29–20`）。我们建议选择默认选项并备份所有内容；但是，您也可以选择仅备份从 iTunes Store 购买的内容。插入备份所需的所有光盘后，您将看到一条备份完成消息。如果您最近备份过到光盘，则可以通过选中\
    \ `仅备份上次备份后添加或更改的项目` 框来节省时间和空间。\n\n**提示：** 如果您需要备份到 DVD 或 CD，我们强烈建议选择使用 DVD 方法进行备份，因为它可以容纳\
    \ CD 四到八倍的内容。\n\n![images](img/2920.jpg)\n\n**图 29–20.** *`iTunes` 备份选项*\n\n####\
    \ 从 CD 或 DVD 恢复\n\n您只需插入第一张备份 CD 或 DVD 即可开始恢复资料库，然后 `iTunes` 会询问您是否要从备份光盘进行恢复。\n\
    \n**提示：** 您也可以通过单击左侧导航栏 `设备` 部分下列出的备份光盘，然后将文件从备份拖放到您的资料库中来恢复单个文件。但是，恢复的文件中会丢失少量项目，例如上次播放内容的书签。\n"
- fmt: "# Back up to an External Hard Disk (for Larger Libraries)\n\nAs your iTunes\
    \ library grows larger, it could take you dozens or even a hundred or more DVDs\
    \ or CDs to complete the backup, so you should use an external hard disk instead.\
    \ This method works best only when your iTunes library is located in a single\
    \ folder.\n\n## Step 1: Make Sure All Media Is in a Single Folder\n\nYou can use\
    \ `iTunes` to move all your media to a single folder by following these steps:\n\
    \n![images](images/p716-01.jpg)\n\n1. From the `iTunes` menu, select `Edit` ![images](images/U001.jpg)\
    \ `Preferences` (Windows) or `iTunes` ![images](images/U001.jpg) `Preferences`\
    \ (Mac).\n2. Click the `Advanced` tab and check the box next to `Copy files to\
    \ iTunes Media folder when adding to library` in the middle of the page.\n3. Click\
    \ `OK`.\n4. From the `iTunes` menu, select `File` ![images](images/U001.jpg) `Library`\
    \ ![images](images/U001.jpg) `Organize Library` to see the window to the right.\n\
    5. Check both checkboxes as shown and click `OK`.\n6. This will cause all your\
    \ media to be copied to a single iTunes media folder.\n\n![images](images/p716-02.jpg)\n\
    \n## Step 2: Drag and Drop Your Library to an External Hard Disk\n\nThis assumes\
    \ you have purchased and connected an external hard disk. If you don't have one,\
    \ you can find one by visiting your local computer store or doing a web search\
    \ for “external hard disk” for your computer operating system type, whether it's\
    \ a Windows or Mac. Follow these steps to copy your library to an external hard\
    \ disk:\n\n1. Open a window on your computer and locate your iTunes library. The\
    \ default media location for your iTunes library is:\n   - **Windows XP:** `\\\
    Documents and Settings\\username\\My Documents\\My Music\\`\n   - **Windows Vista\
    \ or Windows 7:** `\\Users\\username\\music\\iTunes\\iTunes music\\`\n   - **Mac\
    \ OX X:** `/Users/username/Music/`\n2. Open another window on your computer for\
    \ your external hard disk.\n3. Drag and drop the iTunes library onto the external\
    \ hard disk window to copy all the files. This will take quite a while if your\
    \ library is very large, but at least you won't be swapping disks every few minutes!\n\
    \n# Restoring from an External Hard Disk Backup\n\nRestoring from an external\
    \ hard disk backup is a multistep process. Begin by closing `iTunes`, and then\
    \ follow the steps outlined in the sections that follow.\n\n## Step 1: Copy Your\
    \ Library Back to Your Computer\n\nReverse the steps described previously to drag\
    \ and drop your library from the external hard disk back onto your computer. You\
    \ may want to put the library in the same location as the original iTunes library\
    \ for the sake of simplicity. Refer to the previously mentioned default locations\
    \ if you need to.\n\n## Step 2: Open iTunes and Select the Library\n\nTo open\
    \ the newly copied library, you have to open iTunes in a special way:\n\n1. On\
    \ Windows, hold down the `Shift` key while you open `iTunes`. On a Mac, hold down\
    \ the `Option` key. Make sure to keep the key pressed until you see the small\
    \ window shown to the right. If you let go too soon, then `iTunes` will open normally.\n\
    \n   ![images](images/p717-01.jpg)\n\n2. Select `Choose Library` and locate the\
    \ library you just copied from your external hard disk.\n3. Click `Open` (Windows)\
    \ or `Choose` (Mac) to open the iTunes library file.\n\nFollowing these steps\
    \ should allow you to restore your iTunes library by opening the file you just\
    \ copied from your external hard disk.\n\n# The Home Sharing Feature\n\nIf you\
    \ have several people in your home who use iTunes, and they are all connected\
    \ together on a home network, then the Home Sharing feature will help you share\
    \ your content (music, videos, and more) across your computers and now, for the\
    \ first time ever, your iPad or other mobile Apple device. Follow these steps\
    \ to take advantage of the Home Sharing feature:\n\n1. Pick the account to use\
    \ for the Home Sharing feature. All computers and mobile devices connected with\
    \ the Home Sharing feature have to use the same iTunes account and password to\
    \ log in and be connected. You will usually want to pick the account that has\
    \ the most purchased content or the content you would like to share across all\
    \ the computers.\n\n**NOTE:** New with iOS 4.3: You can now enjoy the Home Sharing\
    \ feature on your iPad or other iOS mobile device (iPhone or iPod touch).\n\n\
    2. Set up the Home Sharing feature and authorize each of the other computers.\
    \ You can get started with Home Sharing much as you can with the Genius feature.\
    \ On your computer in iTunes, click `Home Sharing` under the `Shared` heading\
    \ in the `iTunes` app's Left Nav Bar (see [Figure 29–21](#Chapter29.html#fig_29_21)).\
    \ If you do not see Home Sharing in the Left Nav Bar, then from the menu go to\
    \ `Advanced` ![images](images/U001.jpg) `Turn Off Home Sharing`, and then `Advanced`\
    \ ![images](images/U001.jpg) `Turn On Home Sharing`. That should fix the issue.\n\
    \n**NOTE:** All versions of videos and movies purchased or rented from the iTunes\
    \ Store are protected by digital rights management (DRM) using FairPlay. However,\
    \ such DRM-protected content can be played on up to five authorized computers\
    \ (PC or Mac). Rented DRM content, such as a rented movie, must be physically\
    \ transferred to one machine or device at a time. Protected music can be authorized\
    \ on up to five computers, and music can be synced to a large number of mobile\
    \ devices, as long as those mobile devices sync to only a single computer.\n\n\
    ![images](images/2921.jpg)\n\n**Figure 29–21.** *Starting the Home Sharing feature*\n\
    \n**TIP:** Check out [Chapter 9](#Chapter09.html#ch9): “Playing Music” to learn\
    \ how to enable Home Sharing in the `iPod` app on your iPad.\n\n3. You can control\
    \ a Home Sharing library on your iPad or other mobile device by following these\
    \ steps:\n   1. Download and install Apple's free `Remote` app from the iTunes\
    \ Store on your iPad.\n   2. Tap `Remote` to start it.\n\n   ![images](images/p719-01.jpg)\n\
    \n   3. Tap `Turn on Home Sharing`.\n   4. Enter the Apple ID that was used to\
    \ create the original Home Share to log in.\n   5. Once logged in, you will see\
    \ a screen similar to this one, with instructions for controlling `iTunes`.\n\
    \   6. Tap `Done` to close the window.\n\n   ![images](images/p720-01.jpg)\n\n\
    \   7. Now you will see all libraries on the next screen. In this case, it shows\
    \ just `Martin's Library`. Tap the library to open it and play the content right\
    \ on Martin's computer running `iTunes`.\n\n   ![images](images/p720-02.jpg)\n\
    \n4. Repeat Steps 2 and 3 on every computer and mobile device you want to give\
    \ access to your home-shared content. Make sure that you use the same iTunes account\
    \ on every computer; this could be a little confusing at first, but it's important\
    \ to use the same account. On the other computers, you will probably have to authorize\
    \ the computer to play content from your iTunes library. The `iTunes` app will\
    \ notify you if you need to authorize the computer by popping up a window.\n\n\
    **NOTE:** Up to five computers and mobile devices can be authorized as home-sharing\
    \ devices.\n\n5. Click `Yes` to continue. Once authorization is complete, you\
    \ will see a screen showing how many of your five total authorizations have been\
    \ used up. To learn more about authorizing or deauthorizing computers, see the\
    \ “Authorizing and Deauthorizing Computers” section later in this chapter.\n6.\
    \ Start enjoying the shared content. Once the Home Sharing feature is enabled\
    \ on at least two computers, the second computer will then see the shared content\
    \ underneath the `Shared` heading in the `Left Nav Bar` in `iTunes`. To start\
    \ viewing, playing, and importing this shared content, click the shared library\
    \ (see [Figure 29–22](#Chapter29.html#fig_29_22)).\n\n![images](images/2922.jpg)\n\
    \n**Figure 29–22.** *Viewing a home-shared library and filtering to view all items\
    \ or those not in your own library*"
  raw: "#### Back up to an External Hard Disk (for Larger Libraries)\n\nAs your iTunes\
    \ library grows larger, it could take you dozens or even a hundred or more DVDs\
    \ or CDs to complete the backup, so you should use an external hard disk instead.\
    \ This method works best only when your iTunes library is located in a single\
    \ folder.\n\n##### Step 1: Make Sure All Media Is in a Single Folder\n\nYou can\
    \ use **iTunes** to move all your media to a single folder by following these\
    \ steps:\n\n![images](images/p716-01.jpg)\n\n1.  From the **iTunes** menu, select\
    \ **Edit** ![images](images/U001.jpg) **Preferences** (Windows) or **iTunes**\
    \ ![images](images/U001.jpg) **Preferences** (Mac).\n2.  Click the **Advanced**\
    \ tab and check the box next to **Copy files to iTunes Media folder when adding\
    \ to library** in the middle of the page.\n3.  Click **OK**.\n4.  From the **iTunes**\
    \ menu, select **File** ![images](images/U001.jpg) **Library** ![images](images/U001.jpg)\
    \ **Organize Library** to see the window to the right.\n5.  Check both checkboxes\
    \ as shown and click **OK.**\n6.  This will cause all your media to be copied\
    \ to a single iTunes media folder.\n\n    ![images](images/p716-02.jpg)\n\n#####\
    \ Step 2: Drag and Drop Your Library to an External Hard Disk\n\nThis assumes\
    \ you have purchased and connected an external hard disk. If you don't have one,\
    \ you can find one by visiting your local computer store or doing a web search\
    \ for “external hard disk” for your computer operating system type, whether it's\
    \ a Windows or Mac. Follow these steps to copy your library to an external hard\
    \ disk:\n\n1.  Open a window on your computer and locate your iTunes library.\
    \ The default media location for your iTunes library is:\n    *   **Windows XP:**\
    \ `\\Documents and Settings\\username\\My Documents\\My Music\\`\n    *   **Windows\
    \ Vista or Windows 7**: `\\Users\\username\\music\\iTunes\\iTunes music\\`\n \
    \   *   **Mac OX X**: `/Users/username/Music/`\n2.  Open another window on your\
    \ computer for your external hard disk.\n3.  Drag and drop the iTunes library\
    \ onto the external hard disk window to copy all the files. This will take quite\
    \ a while if your library is very large, but at least you won't be swapping disks\
    \ every few minutes!\n\n#### Restoring from an External Hard Disk Backup\n\nRestoring\
    \ from an external hard disk backup is a multistep process. Begin by closing **iTunes**,\
    \ and then follow the steps outlined in the sections that follow.\n\n##### Step\
    \ 1: Copy Your Library Back to Your Computer\n\nReverse the steps described previously\
    \ to drag and drop your library from the external hard disk back onto your computer.\
    \ You may want to put the library in the same location as the original iTunes\
    \ library for the sake of simplicity. Refer to the previously mentioned default\
    \ locations if you need to.\n\n##### Step 2: Open iTunes and Select the Library\n\
    \nTo open the newly copied library, you have to open iTunes in a special way:\n\
    \n1.  On Windows, hold down the **Shift** key while you open **iTunes**. On a\
    \ Mac, hold down the **Option** key. Make sure to keep the key pressed until you\
    \ see the small window shown to the right. If you let go too soon, then **iTunes**\
    \ will open normally.\n\n    ![images](images/p717-01.jpg)\n\n2.  Select **Choose\
    \ Library** and locate the library you just copied from your external hard disk.\n\
    3.  Click **Open** (Windows) or **Choose** (Mac) to open the iTunes library file.\n\
    \nFollowing these steps should allow you to restore your iTunes library by opening\
    \ the file you just copied from your external hard disk.\n\n### The Home Sharing\
    \ Feature\n\nIf you have several people in your home who use iTunes, and they\
    \ are all connected together on a home network, then the Home Sharing feature\
    \ will help you share your content (music, videos, and more) across your computers\
    \ and now, for the first time ever, your iPad or other mobile Apple device. Follow\
    \ these steps to take advantage of the Home Sharing feature:\n\n1.  Pick the account\
    \ to use for the Home Sharing feature. All computers and mobile devices connected\
    \ with the Home Sharing feature have to use the same iTunes account and password\
    \ to log in and be connected. You will usually want to pick the account that has\
    \ the most purchased content or the content you would like to share across all\
    \ the computers.\n\n**NOTE:** New with iOS 4.3: You can now enjoy the Home Sharing\
    \ feature on your iPad or other iOS mobile device (iPhone or iPod touch).\n\n\
    2.  Set up the Home Sharing feature and authorize each of the other computers.\
    \ You can get started with Home Sharing much as you can with the Genius feature.\
    \ On your computer in iTunes, click **Home Sharing** under the **Shared** heading\
    \ in the **iTunes** app's Left Nav Bar (see [Figure 29–21](#Chapter29.html#fig_29_21)).\
    \ If you do not see Home Sharing in the Left Nav Bar, then from the menu go to\
    \ **Advanced** ![images](images/U001.jpg) **Turn Off Home Sharing**, and then\
    \ **Advanced** ![images](images/U001.jpg) **Turn On Home Sharing**. That should\
    \ fix the issue.\n\n**NOTE:** All versions of videos and movies purchased or rented\
    \ from the iTunes Store are protected by digital rights management (DRM) using\
    \ FairPlay. However, such DRM-protected content can be played on up to five authorized\
    \ computers (PC or Mac). Rented DRM content, such as a rented movie, must be physically\
    \ transferred to one machine or device at a time. Protected music can be authorized\
    \ on up to five computers, and music can be synced to a large number of mobile\
    \ devices, as long as those mobile devices sync to only a single computer.\n\n\
    ![images](images/2921.jpg)\n\n**Figure 29–21.** *Starting the Home Sharing feature*\n\
    \n**TIP:** Check out [Chapter 9](#Chapter09.html#ch9): “Playing Music” to learn\
    \ how to enable Home Sharing in the **iPod** app on your iPad.\n\n3.  You can\
    \ control a Home Sharing library on your iPad or other mobile device by following\
    \ these steps:\n    1.  Download and install Apple's free **Remote** app from\
    \ the iTunes Store on your iPad.\n    2.  Tap **Remote** to start it.\n\n![images](images/p719-01.jpg)\n\
    \n3.  Tap **Turn on Home Sharing**.\n    4.  Enter the Apple ID that was used\
    \ to create the original Home Share to log in.\n    5.  Once logged in, you will\
    \ see a screen similar to this one, with instructions for controlling **iTunes**.\n\
    \    6.  Tap **Done** to close the window.\n\n![images](images/p720-01.jpg)\n\n\
    7.  Now you will see all libraries on the next screen. In this case, it shows\
    \ just **Martin's Library**. Tap the library to open it and play the content right\
    \ on Martin's computer running **iTunes**.\n\n![images](images/p720-02.jpg)\n\n\
    4.  Repeat Steps 2 and 3 on every computer and mobile device you want to give\
    \ access to your home-shared content. Make sure that you use the same iTunes account\
    \ on every computer; this could be a little confusing at first, but it's important\
    \ to use the same account. On the other computers, you will probably have to authorize\
    \ the computer to play content from your iTunes library. The **iTunes** app will\
    \ notify you if you need to authorize the computer by popping up a window.\n\n\
    **NOTE:** Up to five computers and mobile devices can be authorized as home-sharing\
    \ devices.\n\n5.  Click **Yes** to continue. Once authorization is complete, you\
    \ will see a screen showing how many of your five total authorizations have been\
    \ used up. To learn more about authorizing or deauthorizing computers, see the\
    \ “Authorizing and Deauthorizing Computers” section later in this chapter.\n6.\
    \  Start enjoying the shared content. Once the Home Sharing feature is enabled\
    \ on at least two computers, the second computer will then see the shared content\
    \ underneath the **Shared** heading in the **Left Nav Bar** in **iTunes**. To\
    \ start viewing, playing, and importing this shared content, click the shared\
    \ library (see [Figure 29–22](#Chapter29.html#fig_29_22)).\n\n![images](images/2922.jpg)\n\
    \n**Figure 29–22.** *Viewing a home-shared library and filtering to view all items\
    \ or those not in your own library*"
  trans: "\n# 备份到外部硬盘（适用于大型资料库）\n\n随着 iTunes 资料库不断增大，完成备份可能需要数十张甚至上百张 DVD 或 CD，因此建议改用外部硬盘。此方法仅在\
    \ iTunes 资料库位于单个文件夹时效果最佳。\n\n## 步骤 1：确保所有媒体位于单个文件夹\n\n可按照以下步骤使用 `iTunes` 将所有媒体移至单个文件夹：\n\
    \n![images](img/p716-01.jpg)\n\n1. 从 `iTunes` 菜单中，选择 `编辑` ![images](img/U001.jpg)\
    \ `偏好设置` (Windows) 或 `iTunes` ![images](img/U001.jpg) `偏好设置` (Mac)。\n2. 点击 `高级`\
    \ 选项卡，勾选页面中部 `添加到资料库时拷贝文件到 iTunes Media 文件夹` 旁边的复选框。\n3. 点击 `确定`。\n4. 从 `iTunes`\
    \ 菜单中，选择 `文件` ![images](img/U001.jpg) `资料库` ![images](img/U001.jpg) `整理资料库`，即可看到右侧窗口。\n\
    5. 如图所示勾选两个复选框，然后点击 `确定`。\n6. 这样所有媒体都会被复制到单个 iTunes 媒体文件夹中。\n\n![images](img/p716-02.jpg)\n\
    \n## 步骤 2：将资料库拖放到外部硬盘\n\n此步骤假设您已购买并连接了外部硬盘。若尚未购买，可前往当地电脑商店或通过网络搜索适用于您电脑操作系统（Windows\
    \ 或 Mac）的 “外部硬盘”。请按以下步骤将资料库复制到外部硬盘：\n\n1. 在电脑上打开一个窗口，找到您的 iTunes 资料库。iTunes 资料库的默认媒体位置为：\n\
    \   - **Windows XP：**`\\Documents and Settings\\username\\My Documents\\My Music\\\
    `\n   - **Windows Vista 或 Windows 7：**`\\Users\\username\\music\\iTunes\\iTunes\
    \ music\\`\n   - **Mac OS X：**`/Users/username/Music/`\n2. 为外部硬盘打开另一个窗口。\n3. 将\
    \ iTunes 资料库文件夹拖放到外部硬盘窗口中，以复制所有文件。若资料库非常大，此过程将耗时较长，但至少无需每隔几分钟更换一次光盘！\n\n# 从外部硬盘备份中恢复\n\
    \n从外部硬盘备份中恢复需要多个步骤。首先关闭 `iTunes`，然后按照以下各节所述步骤操作。\n\n## 步骤 1：将资料库复制回电脑\n\n逆向执行前述步骤，将资料库从外部硬盘拖放回电脑。为简便起见，建议将资料库放回原\
    \ iTunes 资料库的相同位置。如有需要，可参考前面提到的默认位置。\n\n## 步骤 2：打开 iTunes 并选择资料库\n\n要打开新复制的资料库，需以特殊方式打开\
    \ `iTunes`：\n\n1. 在 Windows 上，按住 `Shift` 键的同时打开 `iTunes`。在 Mac 上，按住 `Option` 键。请务必保持按键按下，直至看到右侧的小窗口。如果过早松开，`iTunes`\
    \ 将正常打开。\n\n   ![images](img/p717-01.jpg)\n\n2. 选择 `选取资料库`，然后找到刚从外部硬盘复制的资料库。\n\
    3. 点击 `打开` (Windows) 或 `选取` (Mac) 以打开 iTunes 资料库文件。\n\n按照这些步骤，通过打开从外部硬盘复制的文件，即可恢复\
    \ iTunes 资料库。\n\n# 家庭共享功能\n\n如果家中有多人使用 iTunes，且所有设备都连接在同一家庭网络中，那么家庭共享功能将帮助您在电脑之间共享内容（音乐、视频等），并且首次支持在\
    \ iPad 或其他 Apple 移动设备上共享。请按以下步骤使用家庭共享功能：\n\n1. 选择用于家庭共享功能的账户。所有通过家庭共享功能连接的电脑和移动设备必须使用相同的\
    \ iTunes 账户和密码登录并建立连接。通常应选择拥有最多已购内容或您希望在多台电脑间共享内容的账户。\n\n**注意：** iOS 4.3 新增功能：您现在可以在\
    \ iPad 或其他 iOS 移动设备（iPhone 或 iPod touch）上使用家庭共享功能。\n\n2. 设置家庭共享功能并授权每台其他电脑。您可以像启用\
    \ Genius 功能一样开始使用家庭共享。在电脑的 iTunes 中，点击 `iTunes` 应用左侧导航栏中 `共享` 标题下的 `家庭共享`（参见图\
    \ 29-21）。如果在左侧导航栏中看不到 `家庭共享`，请从菜单中依次选择 `高级` ![images](img/U001.jpg) `关闭家庭共享`，然后选择\
    \ `高级` ![images](img/U001.jpg) `开启家庭共享`。这应能解决问题。\n\n**注意：** 从 iTunes Store 购买或租赁的所有版本视频和电影均受\
    \ FairPlay 数字版权管理（DRM）保护。但此类受 DRM 保护的内容最多可在五台已授权的电脑（PC 或 Mac）上播放。租赁的 DRM 内容（如租借的电影）必须每次物理传输到一台设备。受保护的音乐可在最多五台电脑上授权，并且可以同步到大量移动设备，前提是这些移动设备仅与一台电脑同步。\n\
    \n![images](img/2921.jpg)\n\n**图 29-21.** *启动家庭共享功能*\n\n**提示：** 请参阅第 9 章：“播放音乐”，了解如何在\
    \ iPad 的 `iPod` 应用中启用家庭共享。\n\n3. 您可以通过以下步骤在 iPad 或其他移动设备上控制家庭共享资料库：\n   1. 从 iPad\
    \ 的 iTunes Store 下载并安装 Apple 免费的 `Remote` 应用。\n   2. 点击 `Remote` 启动它。\n\n   ![images](img/p719-01.jpg)\n\
    \n   3. 点击 `开启家庭共享`。\n   4. 输入用于创建原始家庭共享的 Apple ID 进行登录。\n   5. 登录后，您将看到类似这样的屏幕，其中包含控制\
    \ `iTunes` 的说明。\n   6. 点击 `完成` 关闭窗口。\n\n   ![images](img/p720-01.jpg)\n\n   7.\
    \ 现在您将在下一个屏幕上看到所有资料库。本例中仅显示 `Martin 的资料库`。点击该资料库即可打开并直接在运行 `iTunes` 的 Martin 电脑上播放内容。\n\
    \n   ![images](img/p720-02.jpg)\n\n4. 在您希望授权访问家庭共享内容的每台电脑和移动设备上重复步骤 2 和 3。确保每台电脑使用相同的\
    \ iTunes 账户；一开始可能会有些混淆，但使用相同账户至关重要。在其他电脑上，您可能需要授权该电脑才能播放 iTunes 资料库中的内容。`iTunes`\
    \ 应用会通过弹出窗口通知您是否需要授权电脑。\n\n**注意：** 最多可授权五台电脑和移动设备作为家庭共享设备。\n\n5. 点击 `是` 继续。授权完成后，您将看到一个屏幕，显示总共有五次授权机会，目前已使用几次。有关授权或取消授权电脑的更多信息，请参阅本章后面的\
    \ “授权和取消授权电脑” 部分。\n6. 开始享受共享内容。一旦家庭共享功能在至少两台电脑上启用，第二台电脑将在 `iTunes` 的 `左侧导航栏` 的\
    \ `共享` 标题下看到共享内容。要开始查看、播放和导入这些共享内容，请点击共享资料库（参见图 29-22）。\n\n![images](img/2922.jpg)\n\
    \n**图 29-22.** *查看家庭共享资料库并过滤以显示所有项目或不在自己资料库中的项目*\n"
- fmt: "### Filtering a Home-Shared Library to Only Show Items Not in Your Library\n\
    \nOnce you get up and running with a home-shared library, you will notice that\
    \ there is a switch at the bottom of the screen that allows you to show only those\
    \ items that are not in your library (see [Figure 29–22](#Chapter29.html#fig_29_22)).\
    \ This is a great way to quickly assess what you might need to add (i.e., import)\
    \ to your library from the shared library.\n\n### Two Types of Shared Libraries\n\
    \nYou will see two logos in the `Shared` category on the Left Nav Bar of `iTunes`.\
    \ Each type of logo shows you whether the library is a fully shared library (the\
    \ `House` icon) or a listen-only type of library (the `Stack of Papers` icon).\
    \ [Table 29–1](#Chapter29.html#tab_29_1) describes the differences.\n\n**Table\
    \ 29–1**. *Fully Shared vs. Listen-Only Libraries*\n\n| Types of Shared Libraries\
    \ | What This Means |\n| --- | --- |\n| ![images](images/p722-01.jpg) Fully Shared\
    \ Library (the `House` icon) | Martin's library is fully enabled for home sharing—you\
    \ can view, listen, and import (add) items from this library. |\n| ![images](images/p722-02.jpg)\
    \ Listen-Only Library (the `Stack of Papers` icon) | `LS-WTGL7AC` is a listen-only\
    \ and view-only library. You cannot import any songs from this library to your\
    \ own library. |\n\n### Importing Shared Content into Your Library\n\nWhen you\
    \ are viewing a home-shared library, you can listen to anything in that library,\
    \ as long as your computer has been authorized to do so. If you hit any authorization\
    \ issues, please refer back to [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad\
    \ with iTunes.” In that chapter, we show you how to authorize your computers for\
    \ iTunes.\n\nYou can manually drag and drop content into your library, or you\
    \ can set up the Home Sharing feature to automatically import all new purchases\
    \ from the home-shared iTunes account.\n\n#### Importing by Manually Dragging\
    \ and Dropping\n\nThe drag-and-drop method for importing works well if you want\
    \ to grab a few songs or videos from the shared library. Simply click the songs\
    \ or videos to highlight them, and then drag them over to your library.\n\nYou\
    \ can also click the songs/videos to highlight them, and then click the `Import`\
    \ button in the lower-right corner to do the same thing.\n\n#### Automatically\
    \ Importing New Purchases\n\nFollow these steps if you want to share all new purchases\
    \ from the home-shared iTunes account to the library on another device or computer\
    \ automatically:\n\n1.  Click the home-shared library you would like to import\
    \ from in the Left Nav Bar.\n2.  Click the `Settings` button in the lower-right\
    \ corner of the `iTunes` screen.\n3.  Now you will see a small window pop up that\
    \ is similar to the one shown to the right. Check off those items to be automatically\
    \ transferred from the home-shared library into your library.\n\n    ![images](images/p723-01.jpg)\n\
    \n4.  Click `OK` to save your Home Sharing settings.\n\n### Toggling Home Sharing\
    \ Off and On\n\nOnce you have enabled the Home Sharing feature, you may want to\
    \ turn it off at some point. You do this by going to the `Advanced` menu of `iTunes`\
    \ and selecting `Turn Off Home Sharing`. To turn it back on, repeat the steps\
    \ described previously by going to the same `Advanced` menu and selecting `Turn\
    \ On Home Sharing`.\n\n### Troubleshooting Home Sharing\n\nSometimes you may see\
    \ a “Computer Not Authorized” error, even though your computer has already been\
    \ authorized on the Home Sharing account. Usually this happens because the content\
    \ (e.g., song or video) that you are trying to view or listen to from the home-sharing\
    \ account was purchased by an account other than the home-shared iTunes account.\
    \ To correct this problem, follow these steps:\n\n1.  Locate the person in your\
    \ home who originally purchased the song.\n2.  Ask him to authorize your computer.\
    \ (If you hit any authorization issues, then you'll find [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync Your iPad with iTunes” useful; this chapter explains how to authorize\
    \ your computers for the iTunes service.)\n3.  Once your computer is authorized,\
    \ you should be able to enjoy the music or video.\n\n### Creating an iTunes Account\n\
    \nIf you have already registered for an iTunes account using an Apple ID or AOL\
    \ screen name, then you need to sign in (see the “Signing into the iTunes Store”\
    \ section later in this chapter for information on how to do this).\n\nIf you\
    \ want to buy or download free songs, books, apps, videos, TV shows, and more,\
    \ you will need to acquire them from the iTunes Store. You can do so by following\
    \ these steps:\n\n1.  Click the `Sign In` button in the upper-right corner (see\
    \ [Figure 29–23](#Chapter29.html#fig_29_23)). If you do not yet have an iTunes\
    \ account, then click the `Create New Account` button and follow the instructions\
    \ to create your new account. If you already have an account, enter your Apple\
    \ ID or AOL screen name and password, click the `Sign In` button, and skip ahead\
    \ to the “Signing into the iTunes Store” section. This is where you'll enter your\
    \ Apple ID or AOL account details, if you have them.\n\n    ![images](images/2923.jpg)\n\
    \n    **Figure 29–23.** *The iTunes Store `Sign In` screen, where you can start\
    \ creating a new account*\n\n2.  When you click the `Create New Account` button,\
    \ you will see a new account `Welcome` screen; click `Continue` to move on.\n\
    3.  Read and accept the terms and conditions by clicking the checkbox at the bottom\
    \ of the screen, then click `Continue` to move on.\n4.  On the next screen, you\
    \ set up your Apple ID (your login name for the iTunes Store), your password,\
    \ and your secret question and email preferences. If you do not want email notification,\
    \ be sure to uncheck the boxes at the bottom of the page. Click `Continue` to\
    \ move on.\n5.  On the next screen, you are asked to enter your billing information.\
    \ Note that you can create a US-based account without billing information. Also,\
    \ you can enter an iTunes gift card to receive credit, so you do not need to enter\
    \ a credit card or PayPal account. This screen contains your preferred billing\
    \ information, which will be used when you buy music, videos, and iPad apps (from\
    \ the App Store app on your iPad). Click `Continue` to move on. Please note that\
    \ the contents of this screen may vary slightly, depending on the country in which\
    \ you are located.\n6.  Depending on your locale, you may need to verify your\
    \ county, province, or other local taxing authority. Click `Done`.\n7.  Now you\
    \ should see a screen that asserts you have correctly set up your iTunes account.\
    \ Click `Done` to finish.\n\n### Signing into the iTunes Store\n\nIf you've successfully\
    \ created an iTunes account or you already own one, then the wonders of the iTunes\
    \ Store are now yours to explore! The following sections show you most of the\
    \ things you can do once you're signed in. But first you need to sign in.\n\n\
    To do this, begin by clicking the iTunes `Sign In` button to go to the `Sign In`\
    \ screen, where you'll then be asked to enter your Apple ID and password. Alternatively,\
    \ you can enter your AOL screen name and password.\n\n#### Getting to the iTunes\
    \ Store\n\nYou can always get back to the iTunes Store by clicking the `iTunes\
    \ Store` link under `Store` in the Left Nav Bar."
  raw: "#### Filtering a Home-Shared Library to Only Show Items Not in Your Library\n\
    \nOnce you get up and running with a home-shared library, you will notice that\
    \ there is a switch at the bottom of the screen that allows you to show only those\
    \ items that are not in your library (see [Figure 29–22](#Chapter29.html#fig_29_22)).\
    \ This is a great way to quickly assess what you might need to add (i.e., import)\
    \ to your library from the shared library.\n\n#### Two Types of Shared Libraries\n\
    \nYou will see two logos in the **Shared** category on the Left Nav Bar of **iTunes**.\
    \ Each type of logo shows you whether the library is a fully shared library (the\
    \ **House** icon) or a listen-only type of library (the **Stack of Papers** icon).\
    \ [Table 29–1](#Chapter29.html#tab_29_1) describes the differences.\n\n**Table\
    \ 29–1**. *Fully Shared vs. Listen-Only Libraries*\n\n| **Types of Shared Libraries**\
    \ | **What This Means** |\n| --- | --- |\n| ![images](images/p722-01.jpg) Fully\
    \ Shared Library (the **House** icon) | Martin's library is fully enabled for\
    \ home sharing—you can view, listen, and import (add) items from this library.\
    \ |\n| ![images](images/p722-02.jpg) Listen-Only Library (the **Stack of Papers**\
    \ icon) | LS-WTGL7AC is a listen-only and view-only library. You cannot import\
    \ any songs from this library to your own library. |\n\n#### Importing Shared\
    \ Content into Your Library\n\nWhen you are viewing a home-shared library, you\
    \ can listen to anything in that library, as long as your computer has been authorized\
    \ to do so. If you hit any authorization issues, please refer back to [Chapter\
    \ 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes.” In that chapter, we show\
    \ you how to authorize your computers for iTunes.\n\nYou can manually drag and\
    \ drop content into your library, or you can set up the Home Sharing feature to\
    \ automatically import all new purchases from the home-shared iTunes account.\n\
    \n##### Importing by Manually Dragging and Dropping\n\nThe drag-and-drop method\
    \ for importing works well if you want to grab a few songs or videos from the\
    \ shared library. Simply click the songs or videos to highlight them, and then\
    \ drag them over to your library.\n\nYou can also click the songs/videos to highlight\
    \ them, and then click the **Import** button in the lower-right corner to do the\
    \ same thing.\n\n##### Automatically Importing New Purchases\n\nFollow these steps\
    \ if you want to share all new purchases from the home-shared iTunes account to\
    \ the library on another device or computer automatically:\n\n1.  Click the home-shared\
    \ library you would like to import from in the Left Nav Bar.\n2.  Click the **Settings**\
    \ button in the lower-right corner of the **iTunes** screen.\n3.  Now you will\
    \ see a small window pop up that is similar to the one shown to the right. Check\
    \ off those items to be automatically transferred from the home-shared library\
    \ into your library.\n\n    ![images](images/p723-01.jpg)\n\n4.  Click **OK**\
    \ to save your Home Sharing settings.\n\n#### Toggling Home Sharing Off and On\n\
    \nOnce you have enabled the Home Sharing feature, you may want to turn it off\
    \ at some point. You do this by going to the **Advanced** menu of **iTunes** and\
    \ selecting **Turn Off Home Sharing**. To turn it back on, repeat the steps described\
    \ previously by going to the same **Advanced** menu and selecting **Turn On Home\
    \ Sharing**.\n\n#### Troubleshooting Home Sharing\n\nSometimes you may see a “Computer\
    \ Not Authorized” error, even though your computer has already been authorized\
    \ on the Home Sharing account. Usually this happens because the content (e.g.,\
    \ song or video) that you are trying to view or listen to from the home-sharing\
    \ account was purchased by an account other than the home-shared iTunes account.\
    \ To correct this problem, follow these steps:\n\n1.  Locate the person in your\
    \ home who originally purchased the song.\n2.  Ask him to authorize your computer.\
    \ (If you hit any authorization issues, then you'll find [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync Your iPad with iTunes” useful; this chapter explains how to authorize\
    \ your computers for the iTunes service.)\n3.  Once your computer is authorized,\
    \ you should be able to enjoy the music or video.\n\n### Creating an iTunes Account\n\
    \nIf you have already registered for an iTunes account using an Apple ID or AOL\
    \ screen name, then you need to sign in (see the “Signing into the iTunes Store”\
    \ section later in this chapter for information on how to do this).\n\nIf you\
    \ want to buy or download free songs, books, apps, videos, TV shows, and more,\
    \ you will need to acquire them from the iTunes Store. You can do so by following\
    \ these steps:\n\n1.  Click the **Sign In** button in the upper-right corner (see\
    \ [Figure 29–23](#Chapter29.html#fig_29_23)). If you do not yet have an iTunes\
    \ account, then click the **Create New Account** button and follow the instructions\
    \ to create your new account. If you already have an account, enter your Apple\
    \ ID or AOL screen name and password, click the **Sign In** button, and skip ahead\
    \ to the “Signing into the iTunes Store” section. This is where you'll enter your\
    \ Apple ID or AOL account details, if you have them.\n\n    ![images](images/2923.jpg)\n\
    \n    **Figure 29–23.** *The iTunes Store **Sign In** screen, where you can start\
    \ creating a new account*\n\n2.  When you click the **Create New Account** button,\
    \ you will see a new account **Welcome** screen; click **Continue** to move on.\n\
    3.  Read and accept the terms and conditions by clicking the checkbox at the bottom\
    \ of the screen, then click **Continue** to move on.\n4.  On the next screen,\
    \ you set up your Apple ID (your login name for the iTunes Store), your password,\
    \ and your secret question and email preferences. If you do not want email notification,\
    \ be sure to uncheck the boxes at the bottom of the page. Click **Continue** to\
    \ move on.\n5.  On the next screen, you are asked to enter your billing information.\
    \ Note that you can create a US-based account without billing information. Also,\
    \ you can enter an iTunes gift card to receive credit, so you do not need to enter\
    \ a credit card or PayPal account. This screen contains your preferred billing\
    \ information, which will be used when you buy music, videos, and iPad apps (from\
    \ the App Store app on your iPad). Click **Continue** to move on. Please note\
    \ that the contents of this screen may vary slightly, depending on the country\
    \ in which you are located.\n6.  Depending on your locale, you may need to verify\
    \ your county, province, or other local taxing authority. Click **Done**.\n7.\
    \  Now you should see a screen that asserts you have correctly set up your iTunes\
    \ account. Click **Done** to finish.\n\n### Signing into the iTunes Store\n\n\
    If you've successfully created an iTunes account or you already own one, then\
    \ the wonders of the iTunes Store are now yours to explore! The following sections\
    \ show you most of the things you can do once you're signed in. But first you\
    \ need to sign in.\n\nTo do this, begin by clicking the iTunes **Sign In** button\
    \ to go to the **Sign In** screen, where you'll then be asked to enter your Apple\
    \ ID and password. Alternatively, you can enter your AOL screen name and password.\n\
    \n#### Getting to the iTunes Store\n\nYou can always get back to the iTunes Store\
    \ by clicking the **iTunes Store** link under **Store** in the Left Nav Bar."
  trans: "\n### 过滤家庭共享资料库，仅显示您资料库中没有的项目\n\n使用家庭共享资料库后，您会注意到屏幕底部有一个开关，可以只显示那些您资料库中没有的项目（参见图\
    \ 29–22）。这是快速评估您可能需要从共享资料库中添加（即导入）哪些内容的好方法。\n\n### 两种类型的共享资料库\n\n您会在 `iTunes`\
    \ 左侧导航栏的 `共享` 类别中看到两个图标。每种图标指示资料库是完全共享型（`房屋` 图标）还是仅供收听型（`文件堆` 图标）。表 29–1 描述了其区别。\n\
    \n**表 29–1**. *完全共享与仅供收听资料库*\n\n| 共享资料库类型 | 含义 |\n| --- | --- |\n| ![images](img/p722-01.jpg)\
    \ 完全共享资料库（`房屋` 图标） | Martin 的资料库已完全开启家庭共享——您可以查看、收听和导入（添加）此资料库中的项目。 |\n| ![images](img/p722-02.jpg)\
    \ 仅供收听资料库（`文件堆` 图标） | `LS-WTGL7AC` 是仅限收听和查看的资料库。您无法从此资料库向您自己的资料库导入任何歌曲。 |\n\n\
    ### 将共享内容导入您的资料库\n\n当您查看家庭共享资料库时，只要您的电脑已获得授权，就可以收听该资料库中的任何内容。如果遇到任何授权问题，请参考第 3\
    \ 章：“将 iPad 与 iTunes 同步”。在该章节中，我们介绍了如何为 iTunes 授权您的电脑。\n\n您可以手动拖放内容到您的资料库中，也可以设置家庭共享功能，自动从家庭共享的\
    \ iTunes 帐户导入所有新购买项目。\n\n#### 通过手动拖放导入\n\n如果您想从共享资料库中抓取几首歌曲或几个视频，拖放导入法非常有效。只需点击歌曲或视频以高亮显示，然后将它们拖到您的资料库中即可。\n\
    \n您也可以点击歌曲/视频以高亮显示，然后点击右下角的 `导入` 按钮来执行相同操作。\n\n#### 自动导入新购买项目\n\n如果您希望将家庭共享 iTunes\
    \ 帐户的所有新购买项目自动共享到其他设备或电脑上的资料库中，请按照以下步骤操作：\n\n1.  在左侧导航栏中，点击您要从中导入内容的家庭共享资料库。\n\
    2.  点击 `iTunes` 屏幕右下角的 `设置` 按钮。\n3.  此时会弹出一个与右侧所示类似的小窗口。勾选那些要从家庭共享资料库自动传输到您资料库中的项目。\n\
    \n    ![images](img/p723-01.jpg)\n\n4.  点击 `好` 保存您的家庭共享设置。\n\n### 开关家庭共享功能\n\n\
    启用家庭共享功能后，您可能希望在某些时候将其关闭。为此，请前往 `iTunes` 的 `高级` 菜单，选择 `关闭家庭共享`。要重新开启，请重复之前描述的步骤，进入同一个\
    \ `高级` 菜单并选择 `开启家庭共享`。\n\n### 家庭共享故障排除\n\n有时，即使您的电脑已在家庭共享帐户上获得授权，也可能会看到“电脑未授权”错误。通常这是因为您试图从家庭共享帐户查看或收听的内容（例如歌曲或视频）是由非家庭共享\
    \ iTunes 帐户的其他帐户购买的。要解决此问题，请按照以下步骤操作：\n\n1.  在家中找出最初购买该歌曲的人。\n2.  请他授权您的电脑。（如果您遇到任何授权问题，那么请查阅第\
    \ 3 章：“将 iPad 与 iTunes 同步”；该章节解释了如何为 iTunes 服务授权您的电脑。）\n3.  一旦您的电脑获得授权，您应该就可以欣赏该音乐或视频了。\n\
    \n### 创建 iTunes 帐户\n\n如果您已使用 Apple ID 或 AOL 用户名注册了 iTunes 帐户，那么您需要进行登录（有关如何执行此操作的信息，请参阅本章后面的“登录\
    \ iTunes Store”部分）。\n\n如果您想购买或下载免费的歌曲、图书、应用、视频、电视节目等，您需要从 iTunes Store 获取它们。您可以按照以下步骤进行操作：\n\
    \n1.  点击右上角的 `登录` 按钮（参见图 29–23）。如果您还没有 iTunes 帐户，请点击`创建新帐户`按钮并按照说明创建您的新帐户。如果您已有帐户，请输入您的\
    \ Apple ID 或 AOL 用户名和密码，点击`登录`按钮，然后直接跳转到“登录 iTunes Store”部分。如果您已有 Apple ID 或 AOL\
    \ 帐户详细信息，您将在此处输入它们。\n\n    ![images](img/2923.jpg)\n\n    **图 29–23.** *iTunes\
    \ Store 的 `登录` 界面，您可以在此开始创建新帐户*\n\n2.  当您点击`创建新帐户`按钮时，您将看到一个新的帐户`欢迎`界面；点击`继续`以进行下一步。\n\
    3.  阅读并接受条款和条件，勾选屏幕底部的复选框，然后点击`继续`以进行下一步。\n4.  在下一个屏幕上，您需要设置您的 Apple ID（您的 iTunes\
    \ Store 登录名）、密码、安全问题以及电子邮件偏好。如果您不希望接收电子邮件通知，请务必取消勾选页面底部的复选框。点击`继续`以进行下一步。\n5.\
    \  在下一个屏幕上，系统会要求您输入账单信息。请注意，您可以创建一个美国地区帐户而无需输入账单信息。此外，您可以输入一张 iTunes 礼品卡来充值金额，因此无需输入信用卡或\
    \ PayPal 帐户信息。此屏幕包含您的首选账单信息，当您购买音乐、视频和 iPad 应用（通过 iPad 上的 App Store 应用）时将使用该信息。点击`继续`以进行下一步。请注意，此屏幕的内容可能因您所在的国家或地区而略有不同。\n\
    6.  根据您所在的地区，您可能需要验证您的县、省或其他地方税务机构。点击`完成`。\n7.  现在您应该会看到一个确认您已成功设置 iTunes 帐户的界面。点击`完成`以结束操作。\n\
    \n### 登录 iTunes Store\n\n如果您已成功创建了 iTunes 帐户或您已拥有一个帐户，那么 iTunes Store 的精彩内容就等您探索了！以下部分将向您展示登录后可以执行的大部分操作。但首先您需要登录。\n\
    \n为此，请首先点击 iTunes 的 `登录` 按钮，进入 `登录` 界面，然后系统会要求您输入 Apple ID 和密码。或者，您可以输入您的 AOL\
    \ 用户名和密码。\n\n#### 进入 iTunes Store\n\n您随时可以通过点击左侧导航栏中 `Store` 下的 `iTunes Store`\
    \ 链接返回 iTunes Store。\n"
- fmt: "### Buying or Getting Free Media from the iTunes Store\n\nAfter signing in\
    \ or creating a new account, you will be able to search the store for any artist,\
    \ album, composer, or title.\n\nTo find all the songs by a particular artist,\
    \ type that artist's name into the `Search` box in the upper-right corner. You\
    \ could also search by part or all of a particular song's name. Once you press\
    \ the `Enter` key, you will be presented with all the matching items from the\
    \ iTunes Store (see [Figure 29–24](#Chapter29.html#fig_29_24)).\n\n**TIP:** Use\
    \ the `Power Search` feature shown in the upper-left corner of the main `iTunes`\
    \ window to further narrow your search. Also note that you can refine your search\
    \ by using the `Filter by Media Type` box just below `Power Search`. Filter the\
    \ search by music, movies, TV shows, apps, audiobooks, podcasts, iTunes U, or\
    \ Ping.\n\nYou can then navigate around and purchase individual songs with the\
    \ `Buy` buttons at the bottom.\n\n![images](images/2924.jpg)\n\n**Figure 29–24.**\
    \ *Searching for and buying songs in the iTunes Store*\n\nAfter you click the\
    \ `Buy` button, you will need to log in, unless you have previously instructed\
    \ `iTunes` to keep you logged in for your purchases.\n\n**CAUTION:** If you are\
    \ at a public computer or are worried that someone might access your computer\
    \ and buy stuff without you knowing, then don't check the `Remember password for\
    \ purchasing` box!\n\nAfter you log in, you will see a pop-up window if you have\
    \ just clicked the `Buy` button.\n\nIf you don't want to see this dialog box every\
    \ time you buy something, check the box at the bottom pop-up window that says\
    \ `Don't ask me about buying songs again`, and then click the `Buy` button.\n\n\
    Now the song, video, or other item you purchased will be queued up to be downloaded\
    \ to your local library in the `iTunes` app on your computer.\n\n#### Making Sure\
    \ All Items Are Downloaded\n\nAfter you purchase a song, video, app, or other\
    \ item from the App Store—or if you have just authorized this computer on your\
    \ account—you should click the `Downloads` link that appears under the `Store`\
    \ category heading in the Left Nav Bar.\n\n![images](images/p727-01.jpg)\n\nAny\
    \ items currently being downloaded will show a `Status` bar in the main `Downloads`\
    \ window. You will see a `Done` status message when the items are completely downloaded\
    \ to your computer.\n\n![images](images/p727-02.jpg)\n\n![images](images/p727-03.jpg)\n\
    \nYou will need to see a status of `Done` before you can put the purchased item\
    \ onto your iPad. If you see a pop-up window asking whether you want `iTunes`\
    \ to download all your purchased items, then click `Yes`.\n\n### Redeeming iTunes\
    \ Gift Cards or App Promo Codes\n\nAt some point, you may receive an iTunes gift\
    \ card or a Promo Code for free apps. Follow these steps to learn how to redeem\
    \ the value of the card to your iTunes account:\n\n**NOTE:** iTunes gift cards\
    \ are country-specific. In other words, a US gift card will only work for a US\
    \ iTunes account.\n\n1. If you are not already signed in, then sign into your\
    \ iTunes account by clicking the `Sign In` link in the upper-right corner of `iTunes`.\n\
    2. Click the little `Dropdown Arrow` to the right of your iTunes Apple ID where\
    \ you saw the `Sign In` link, and then select `Redeem` from the dropdown list.\n\
    \   \n   ![images](images/p728-01.jpg)\n\n3. On the `Redeem` screen, you will\
    \ need to enter the code from the back of the gift card or Promo Code (see [Figure\
    \ 29–25](#Chapter29.html#fig_29_25)). You may need to scratch off the silver/gray\
    \ covering to see the card's code.\n4. Click the `Redeem` button.\n   \n   ![images](images/2925.jpg)\n\
    \   \n   **Figure 29–25.** *The iTunes Redeem screen.*\n\n5. To verify that the\
    \ gift card is being applied to the correct iTunes account, you will need to sign\
    \ in or re-enter your password.\n6. Click the `Sign In` button or the `View Account`\
    \ button (if you're already signed in).\n7. When the gift card has been successfully\
    \ applied to your account, you will see the total amount of the card in the upper-right\
    \ corner of the `iTunes` screen, right next to your sign-in name. Now you can\
    \ use this gift card credit to buy stuff from the iTunes Store.\n\n### Getting\
    \ Your Stuff into iTunes\n\nIf you have music CDs, DVDs, E-Books, and PDF files\
    \ you want to enjoy on your iPad, you will first have to import them into your\
    \ iTunes library on your computer. We show you how in the upcoming sections.\n\
    \n#### Importing Music CDs\n\nIf you are of legal drinking age, then it's likely\
    \ that you have a few music CDs in your home library. If you are over 40, that\
    \ likelihood goes up to 100 percent. So, how do you get all your best CDs loaded\
    \ onto your iPad? Accomplishing this is a two-step process:\n\n1. First, you must\
    \ load the CDs into `iTunes`.\n2. Second, you must sync or manually transfer those\
    \ CD songs to your iPhone. (We show you how to sync or manually transfer content\
    \ with `iTunes` in [Chapter 3](#Chapter03.html#ch3): “Sync Your iPhone with iTunes.”)\n\
    \nIn order to import your music from a CD, insert the CD into your computer's\
    \ CD drive. You may see a pop-up window inside `iTunes` that asks whether you\
    \ would like to import the CD as shown. Click `Yes` to import the CD.\n\n![images](images/p729-01.jpg)\n\
    \nIf you did not receive this pop-up window, then you can manually start the CD\
    \ import into `iTunes` by clicking the `Import CD` button in the lower-right corner.\
    \ Also notice that the CD appears under the `Devices` list in the left column\
    \ (see [Figure 29–26](#Chapter29.html#fig_29_26)).\n\n![images](images/2926.jpg)\n\
    \n**Figure 29–26.** *Working with a music CD inside `iTunes`*\n\n#### Importing\
    \ Movies from DVDs\n\nSome of the more recent DVDs and Blu-rays that you can purchase\
    \ may have two versions of the movie: one for your DVD or Blu-ray player and an\
    \ extra digital copy that can be loaded automatically into `iTunes`.\n\nUsually,\
    \ there will be text on the DVD box that states that there is an extra digital\
    \ copy for your computer. You can check whether this copy exists by inserting\
    \ the DVD into your computer's DVD drive and opening `iTunes`. If the digital\
    \ copy exists, then `iTunes` will automatically detect it and ask whether you\
    \ would like to import the movie.\n\n**CAUTION:** Most DVDs or Blu-rays do not\
    \ provide this extra digital version, which is meant to be loaded and watched\
    \ on your computer and mobile devices. Standard DVDs or Blu-rays are copy-protected\
    \ and cannot normally be loaded into `iTunes`. However, if you do a web search\
    \ for “load DVD into iTunes,” you may find some software products (such as `Handbrake`;\
    \ see [`http://handbrake.fr`](http://handbrake.fr)) that allow you to *rip* or\
    \ *burn* your DVDs into `iTunes`. We strongly urge you to obey copyright laws;\
    \ if you use software like this, you should only use the DVD on your own computer\
    \ or iPad and never share the movie or otherwise violate the copyright agreement."
  raw: "### Buying or Getting Free Media from the iTunes Store\n\nAfter signing in\
    \ or creating a new account, you will be able to search the store for any artist,\
    \ album, composer, or title.\n\nTo find all the songs by a particular artist,\
    \ type that artist's name into the **Search** box in the upper-right corner. You\
    \ could also search by part or all of a particular song's name. Once you press\
    \ the **Enter** key, you will be presented with all the matching items from the\
    \ iTunes Store (see [Figure 29–24](#Chapter29.html#fig_29_24)).\n\n**TIP:** Use\
    \ the **Power Search** feature shown in the upper-left corner of the main **iTunes**\
    \ window to further narrow your search. Also note that you can refine your search\
    \ by using the **Filter by Media Type** box just below **Power Search**. Filter\
    \ the search by music, movies, TV shows, apps, audiobooks, podcasts, iTunes U,\
    \ or Ping.\n\nYou can then navigate around and purchase individual songs with\
    \ the **Buy** buttons at the bottom.\n\n![images](images/2924.jpg)\n\n**Figure\
    \ 29–24.** *Searching for and buying songs in the iTunes Store*\n\nAfter you click\
    \ the **Buy** button, you will need to log in, unless you have previously instructed\
    \ **iTunes** to keep you logged in for your purchases.\n\n**CAUTION:** If you\
    \ are at a public computer or are worried that someone might access your computer\
    \ and buy stuff without you knowing, then don't check the **Remember password\
    \ for purchasing** box!\n\nAfter you log in, you will see a pop-up window if you\
    \ have just clicked the **Buy** button.\n\nIf you don't want to see this dialog\
    \ box every time you buy something, check the box at the bottom pop-up window\
    \ that says **Don't ask me about buying songs again**, and then click the **Buy**\
    \ button.\n\nNow the song, video, or other item you purchased will be queued up\
    \ to be downloaded to your local library in the **iTunes** app on your computer.\n\
    \n#### Making Sure All Items Are Downloaded\n\nAfter you purchase a song, video,\
    \ app, or other item from the App Store—or if you have just authorized this computer\
    \ on your account—you should click the **Downloads** link that appears under the\
    \ **Store** category heading in the Left Nav Bar.\n\n![images](images/p727-01.jpg)\n\
    \nAny items currently being downloaded will show a **Status** bar in the main\
    \ **Downloads** window. You will see a **Done** status message when the items\
    \ are completely downloaded to your computer.\n\n![images](images/p727-02.jpg)\n\
    \n![images](images/p727-03.jpg)\n\nYou will need to see a status of **Done** before\
    \ you can put the purchased item onto your iPad. If you see a pop-up window asking\
    \ whether you want **iTunes** to download all your purchased items, then click\
    \ **Yes**.\n\n### Redeeming iTunes Gift Cards or App Promo Codes\n\nAt some point,\
    \ you may receive an iTunes gift card or a Promo Code for free apps. Follow these\
    \ steps to learn how to redeem the value of the card to your iTunes account:\n\
    \n**NOTE:** iTunes gift cards are country-specific. In other words, a US gift\
    \ card will only work for a US iTunes account.\n\n1.  If you are not already signed\
    \ in, then sign into your iTunes account by clicking the **Sign In** link in the\
    \ upper-right corner of **iTunes**.\n2.  Click the little **Dropdown Arrow** to\
    \ the right of your iTunes Apple ID where you saw the **Sign In** link, and then\
    \ select **Redeem** from the dropdown list.\n\n    ![images](images/p728-01.jpg)\n\
    \n3.  On the **Redeem** screen, you will need to enter the code from the back\
    \ of the gift card or Promo Code (see [Figure 29–25](#Chapter29.html#fig_29_25)).\
    \ You may need to scratch off the silver/gray covering to see the card's code.\n\
    4.  Click the **Redeem** button.\n\n    ![images](images/2925.jpg)\n\n    **Figure\
    \ 29–25.** *The iTunes Redeem screen.*\n\n5.  To verify that the gift card is\
    \ being applied to the correct iTunes account, you will need to sign in or re-enter\
    \ your password.\n6.  Click the **Sign In** button or the **View Account** button\
    \ (if you're already signed in).\n7.  When the gift card has been successfully\
    \ applied to your account, you will see the total amount of the card in the upper-right\
    \ corner of the **iTunes** screen, right next to your sign-in name. Now you can\
    \ use this gift card credit to buy stuff from the iTunes Store.\n\n### Getting\
    \ Your Stuff into iTunes\n\nIf you have music CDs, DVDs, E-Books, and PDF files\
    \ you want to enjoy on your iPad, you will first have to import them into your\
    \ iTunes library on your computer. We show you how in the upcoming sections.\n\
    \n#### Importing Music CDs\n\nIf you are of legal drinking age, then it's likely\
    \ that you have a few music CDs in your home library. If you are over 40, that\
    \ likelihood goes up to 100 percent. So, how do you get all your best CDs loaded\
    \ onto your iPad? Accomplishing this is a two-step process:\n\n1.  First, you\
    \ must load the CDs into **iTunes**.\n2.  Second, you must sync or manually transfer\
    \ those CD songs to your iPhone. (We show you how to sync or manually transfer\
    \ content with **iTunes** in [Chapter 3](#Chapter03.html#ch3): “Sync Your iPhone\
    \ with iTunes.”)\n\nIn order to import your music from a CD, insert the CD into\
    \ your computer's CD drive. You may see a pop-up window inside **iTunes** that\
    \ asks whether you would like to import the CD as shown. Click **Yes** to import\
    \ the CD.\n\n![images](images/p729-01.jpg)\n\nIf you did not receive this pop-up\
    \ window, then you can manually start the CD import into **iTunes** by clicking\
    \ the **Import CD** button in the lower-right corner. Also notice that the CD\
    \ appears under the **Devices** list in the left column (see [Figure 29–26](#Chapter29.html#fig_29_26)).\n\
    \n![images](images/2926.jpg)\n\n**Figure 29–26.** *Working with a music CD inside\
    \ **iTunes***\n\n#### Importing Movies from DVDs\n\nSome of the more recent DVDs\
    \ and Blu-rays that you can purchase may have two versions of the movie: one for\
    \ your DVD or Blu-ray player and an extra digital copy that can be loaded automatically\
    \ into **iTunes**.\n\nUsually, there will be text on the DVD box that states that\
    \ there is an extra digital copy for your computer. You can check whether this\
    \ copy exists by inserting the DVD into your computer's DVD drive and opening\
    \ **iTunes**. If the digital copy exists, then **iTunes** will automatically detect\
    \ it and ask whether you would like to import the movie.\n\n**CAUTION:** Most\
    \ DVDs or Blu-rays do not provide this extra digital version, which is meant to\
    \ be loaded and watched on your computer and mobile devices. Standard DVDs or\
    \ Blu-rays are copy-protected and cannot normally be loaded into **iTunes**. However,\
    \ if you do a web search for “load DVD into iTunes,” you may find some software\
    \ products (such as **Handbrake**; see [`http://handbrake.fr`](http://handbrake.fr))\
    \ that allow you to *rip* or *burn* your DVDs into **iTunes**. We strongly urge\
    \ you to obey copyright laws; if you use software like this, you should only use\
    \ the DVD on your own computer or iPad and never share the movie or otherwise\
    \ violate the copyright agreement."
  trans: "\n### 从 iTunes Store 购买或获取免费媒体\n\n登录或创建新帐户后，你将能够搜索商店中的任何艺术家、专辑、作曲家或曲目标题。\n\
    \n要查找某位特定艺术家的所有歌曲，请将该艺术家的名字输入到右上角的`搜索`框中。你也可以通过输入某首歌曲的部分或完整名称进行搜索。按下`回车`键后，你将看到\
    \ iTunes Store 中所有匹配的项目（参见图 29–24）。\n\n**提示：** 使用主`iTunes`窗口左上角显示的`强力搜索`功能可以进一步缩小搜索范围。另请注意，你可以使用`强力搜索`正下方的`按媒体类型筛选`框来优化搜索。你可以按音乐、影片、电视节目、App、有声读物、播客、iTunes\
    \ U 或 Ping 来筛选搜索。\n\n然后你可以浏览并使用底部的`购买`按钮购买单首歌曲。\n\n![images](img/2924.jpg)\n\n\
    **图 29–24.** *在 iTunes Store 中搜索和购买歌曲*\n\n点击`购买`按钮后，你需要登录，除非你之前已经指示`iTunes`保持登录状态以便购买。\n\
    \n**警告：** 如果你在使用公共计算机，或者担心他人可能未经你允许访问你的计算机并购买商品，那么请不要勾选`记住购买密码`复选框！\n\n登录后，如果你刚刚点击了`购买`按钮，将会看到一个弹出窗口。\n\
    \n如果你不想每次购买时都看到此对话框，请勾选底部弹出窗口中显示`不再询问购买歌曲事宜`的复选框，然后点击`购买`按钮。\n\n现在，你购买的歌曲、视频或其他项目将会被排队下载到你计算机上的`iTunes`应用本地资料库中。\n\
    \n#### 确保所有项目均已下载\n\n从 App Store 购买歌曲、视频、App 或其他项目后——或者如果你刚刚在此计算机上对你的帐户进行了授权——你应该点击左侧导航栏中`商店`类别标题下出现的`下载`链接。\n\
    \n![images](img/p727-01.jpg)\n\n任何正在下载的项目都会在主`下载`窗口中显示一个`状态`栏。当项目完全下载到你的计算机时，你将看到一条`完成`状态消息。\n\
    \n![images](img/p727-02.jpg)\n\n![images](img/p727-03.jpg)\n\n在你可以将购买的项目放入你的 iPad\
    \ 之前，你需要看到状态为`完成`。如果你看到一个弹出窗口询问是否希望`iTunes`下载你所有已购买的项目，请点击`是`。\n\n### 兑换 iTunes\
    \ 礼品卡或应用推广码\n\n在某些时候，你可能会收到 iTunes 礼品卡或免费应用的推广码。请按照以下步骤了解如何将卡内金额兑换到你的 iTunes 帐户：\n\
    \n**注：** iTunes 礼品卡是特定于国家/地区的。换句话说，美国礼品卡仅适用于美国 iTunes 帐户。\n\n1. 如果你尚未登录，请点击`iTunes`右上角的`登录`链接登录到你的\
    \ iTunes 帐户。\n2. 点击你之前看到`登录`链接处的 iTunes Apple ID 右侧的小`下拉箭头`，然后从下拉列表中选择`兑换`。\n\
    \   \n   ![images](img/p728-01.jpg)\n\n3. 在`兑换`界面，你需要输入礼品卡背面或推广码上的代码（参见图 29–25）。你可能需要刮掉银/灰色的覆盖层才能看到卡片代码。\n\
    4. 点击`兑换`按钮。\n   \n   ![images](img/2925.jpg)\n   \n   **图 29–25.** *iTunes 兑换界面*\n\
    \n5. 要验证礼品卡是否已应用于正确的 iTunes 帐户，你需要登录或重新输入密码。\n6. 点击`登录`按钮或`查看帐户`按钮（如果你已登录）。\n\
    7. 当礼品卡成功应用到你的帐户后，你将在`iTunes`屏幕的右上角、登录名旁边看到卡的总金额。现在你可以使用此礼品卡信用额度从 iTunes Store\
    \ 购买商品。\n\n### 将内容导入 iTunes\n\n如果你有想在 iPad 上欣赏的音乐 CD、DVD、电子书和 PDF 文件，你首先需要将它们导入到计算机上的\
    \ iTunes 资料库中。在接下来的小节中，我们将向你展示如何操作。\n\n#### 导入音乐 CD\n\n如果你已达到法定饮酒年龄，那么你的家庭资料库中很可能有几张音乐\
    \ CD。如果你超过 40 岁，这个概率会上升到 100%。那么，如何将所有你最喜欢的 CD 加载到 iPad 上呢？完成此操作需要两个步骤：\n\n1.\
    \ 首先，你必须将 CD 加载到`iTunes`中。\n2. 其次，你必须同步或手动将这些 CD 歌曲传输到你的 iPhone。（我们将在第 3 章：“将你的\
    \ iPhone 与 iTunes 同步”中向你展示如何同步或手动传输内容。）\n\n为了从 CD 导入音乐，请将 CD 插入计算机的 CD 驱动器。你可能会在`iTunes`内看到一个弹出窗口，询问你是否要如图所示导入\
    \ CD。点击`是`导入 CD。\n\n![images](img/p729-01.jpg)\n\n如果你没有收到此弹出窗口，你可以通过点击右下角的`导入\
    \ CD`按钮手动开始在`iTunes`中导入 CD。另请注意，该 CD 会出现在左侧列中的`设备`列表下（参见图 29–26）。\n\n![images](img/2926.jpg)\n\
    \n**图 29–26.** *在`iTunes`中处理音乐 CD*\n\n#### 从 DVD 导入影片\n\n你购买的一些较新的 DVD 和蓝光光盘可能有两个版本的影片：一个用于你的\
    \ DVD 或蓝光播放器，另一个是可以自动加载到`iTunes`中的额外数字副本。\n\n通常，DVD 包装盒上会印有文字说明存在供计算机使用的额外数字副本。你可以通过将\
    \ DVD 插入计算机的 DVD 驱动器并打开`iTunes`来检查是否存在此副本。如果存在数字副本，`iTunes`将自动检测到它并询问你是否要导入该影片。\n\
    \n**警告：** 大多数 DVD 或蓝光光盘并不提供这种额外的数字版本，该版本旨在加载到你的计算机和移动设备上观看。标准 DVD 或蓝光光盘受复制保护，通常无法加载到`iTunes`中。但是，如果你在网上搜索“将\
    \ DVD 加载到 iTunes”，你可能会找到一些软件产品（例如`Handbrake`；参见[`http://handbrake.fr`](http://handbrake.fr)），它们允许你将你的\
    \ DVD *翻录*或*刻录*到`iTunes`中。我们强烈敦促你遵守版权法；如果你使用此类软件，则只应在自己的计算机或 iPad 上使用该 DVD，切勿分享影片或以其他方式违反版权协议。\n"
- fmt: "#### Importing E-Book (PDF and iBook Format) Files\n\nIf you want to read\
    \ a PDF file or E-Book (in the industry standard ePub format set by the International\
    \ Digital Publishing Forum) on your iPad, you will first need to get the file\
    \ into `iTunes` to sync it to your iPad. There are a couple of ways to get E-Books\
    \ into `iTunes`. You can use the drag-and-drop method or the menu commands to\
    \ add files or folders to the library.\n\n##### The Drag-and-Drop Method\n\nThis\
    \ is a great way to add a single file or just a few files. Follow these steps\
    \ to do so:\n\n1.  Locate the file on your computer.\n2.  Click and drag that\
    \ file onto your iTunes library. Let go of the mouse to drop this file into your\
    \ library. A box will be drawn around your library, as shown in the image to the\
    \ right. When you see the box, you can let go of the mouse button.\n3.  Since\
    \ the file is readable by the `iBooks` app, you should then see the file appear\
    \ in the `Books` section of your library.\n\n    ![images](images/p731-01.jpg)\n\
    \n##### Using Menu Commands\n\nUsing menus works well if you have an entire folder\
    \ or multiple folders of files you want to move into `iTunes`.\n\n**TIP:** This\
    \ method works for E-Books and also other content such as music.\n\n1.  From the\
    \ `iTunes` menu, choose `File` and then select `Add Folder to Library` to add\
    \ an entire folder of content or `Add File to Library` if you have only one file\
    \ to add.\n2.  Now navigate to the folder or file you wish to add and click `Select\
    \ Folder` (or `Open` for a single file).\n3.  All iBooks-readable files will be\
    \ added to `iTunes`.\n\n    ![images](images/p732-01.jpg)\n\n#### Getting Album\
    \ Artwork\n\n`iTunes` can automatically get the album art for most songs and videos;\
    \ however, if you need to manually retrieve this artwork, follow these steps:\n\
    \n1.  Start `iTunes`.\n2.  Go to the `Advanced` menu.\n3.  Select `Get Album Artwork`.\n\
    \n    ![images](images/p732-02.jpg)\n\n**NOTE:** You will need to have an iTunes\
    \ account already and be logged in for this to work correctly.\n\n### Authorizing\
    \ and Deauthorizing Computers\n\nAs mentioned previously, you can authorize up\
    \ to five different computers to play your iTunes media (e.g., music and movies).\n\
    \n**CAUTION:** Once you hit five authorized computers, you can deauthorize them\
    \ all, but only once a year.\n\nHere's a question that you may hear quite often:\
    \ *Someone else has authorized my computer to play her songs; can I now load and\
    \ listen to these “authorized songs” on my iPad?*\n\nThe short answer is maybe.\
    \ The answer is no for all songs purchased on iTunes prior to January 2009\\.\
    \ It is also no for all songs purchased with DRM protection. These songs are tied\
    \ specifically to one person's mobile device (i.e., iPad, iPhone, or iPad).\n\n\
    The answer is yes for all songs purchased without DRM protection enabled. Early\
    \ in 2009, iTunes announced that it would start selling some songs and videos\
    \ without DRM protection, which means they can be played on multiple iPhones and\
    \ iPads. Follow these steps to authorize or deauthorize your computer for being\
    \ able to play songs on your computer and possibly your iPad from someone else's\
    \ iTunes library:\n\n1.  Start up `iTunes`.\n2.  To authorize a computer, go to\
    \ the `Store` menu and select `Authorize This Computer…` To deauthorize a computer,\
    \ go to the `Store` menu and select `Deauthorize This Computer…`\n\n    **NOTE:**\
    \ You will need to know your iTunes or AOL username and password for this to work.\n\
    \n    ![images](images/p733-01.jpg)\n\n3.  Enter your Apple ID, or if you prefer,\
    \ click the radio button next to AOL, and enter your AOL screen name and password.\n\
    4.  Next, click the `Authorize` or `Deauthorize` button.\n\n### iTunes Troubleshooting\n\
    \nIn this section, we will provide a few tips and tricks to help you deal with\
    \ some common issues you might encounter when using `iTunes`. We also have an\
    \ entire chapter devoted to troubleshooting (see [Chapter 28](#Chapter28.html#ch28):\
    \ “Troubleshooting”) if you cannot find answers to the problems you encounter\
    \ in this section.\n\n#### What to Do If the iTunes Automatic Update Fails\n\n\
    The automatic update may fail if you have the `About iTunes.rtf` text file open,\
    \ or you have another related file open that cannot be closed by the installer\
    \ automatically. If you locate and close the problem file, you should be able\
    \ to retry the automatic update.\n\nIf you see a message similar to the one shown\
    \ to the right, then you will have to manually install the update. Follow these\
    \ steps to do so:\n\n![images](images/p734-01.jpg)\n\n1.  From the `Apple Software\
    \ Update` screen, select the `Tools` menu and then `Download Only`.\n\n    ![images](images/p734-02.jpg)\n\
    \n2.  You will see the `Download` status screen (shown in the image to the right\
    \ of step 1). Once the download is finished, a new window should pop up, showing\
    \ the downloaded files ready for you to install manually (see [Figure 29–27](#Chapter29.html#fig_29_27)).\n\
    \n    ![images](images/2927.jpg)\n\n    **Figure 29–27.** *The Apple Software\
    \ Update manual installation folder (Windows PC)*\n\n3.  To manually start the\
    \ install, double-click the `iTunes` installer file (see [Figure 29–27](#Chapter29.html#fig_29_27)).\
    \ The file may be slightly different from the one shown in the figure (e.g., `iTunes.msi`\
    \ or `iTunes64.msi`), depending on the operating system on your computer.\n4.\
    \  From here, you need to follow the `iTunes` installation screens.\n\n#### Fixing\
    \ the Apple ID Security Error\n\nIf you try to log in with your Apple ID, you\
    \ might receive an error message at the top of the screen that looks similar to\
    \ this one:\n\n![images](images/p735-01.jpg)\n\nIf this happens, then you will\
    \ have to log in to the Apple Store web site, enter a security question/answer,\
    \ and then add the month and day of your birth.\n\nTo correct this error, follow\
    \ these steps:\n\n1.  Open a web browser on your computer and go to [`www.apple.com`](http://www.apple.com).\n\
    2.  Click the `Store` link in the left portion of the Top Nav Bar, and then hover\
    \ your mouse over the `Account` link in the upper-right corner to see a dropdown\
    \ list. Select `Account Information` from this list (see [Figure 29–28](#Chapter29.html#fig_29_28)).\n\
    \n    ![images](images/2928.jpg)\n\n    **Figure 29–28.** *Getting to your account\
    \ information to correct your security information*\n\n3.  If you clicked `Account`,\
    \ then you will need to select the `Change account information` link from the\
    \ next screen.\n4.  Log in with your Apple ID and password (the one that caused\
    \ the error).\n5.  Most likely, your security question and answer or your birth\
    \ month and date are blank. You need to add this information, type your password\
    \ twice, scroll to the bottom of the screen, and then click the `Continue` button.\n\
    \nYou should now be able to use your Apple ID and password to register your iPad.\n\
    \n**CAUTION:** Apple will never send you an email asking you for your password\
    \ or asking you to log in and enter your password. If you receive such an email,\
    \ it is probably a scam. Don't click any links in such an email. If you are concerned\
    \ about your iTunes account, log in through the `iTunes` app to manage it."
  raw: "#### Importing E-Book (PDF and iBook Format) Files\n\nIf you want to read\
    \ a PDF file or E-Book (in the industry standard ePub format set by the International\
    \ Digital Publishing Forum) on your iPad, you will first need to get the file\
    \ into **iTunes** to sync it to your iPad. There are a couple of ways to get E-Books\
    \ into **iTunes**. You can use the drag-and-drop method or the menu commands to\
    \ add files or folders to the library.\n\n##### The Drag-and-Drop Method\n\nThis\
    \ is a great way to add a single file or just a few files. Follow these steps\
    \ to do so:\n\n1.  Locate the file on your computer.\n2.  Click and drag that\
    \ file onto your iTunes library. Let go of the mouse to drop this file into your\
    \ library. A box will be drawn around your library, as shown in the image to the\
    \ right. When you see the box, you can let go of the mouse button.\n3.  Since\
    \ the file is readable by the **iBooks** app, you should then see the file appear\
    \ in the **Books** section of your library.\n\n    ![images](images/p731-01.jpg)\n\
    \n##### Using Menu Commands\n\nUsing menus works well if you have an entire folder\
    \ or multiple folders of files you want to move into **iTunes**.\n\n**TIP:** This\
    \ method works for E-Books and also other content such as music.\n\n1.  From the\
    \ **iTunes** menu, choose **File** and then select **Add Folder to Library** to\
    \ add an entire folder of content or **Add File to Library** if you have only\
    \ one file to add.\n2.  Now navigate to the folder or file you wish to add and\
    \ click **Select Folder** (or **Open** for a single file).\n3.  All iBooks-readable\
    \ files will be added to **iTunes**.\n\n    ![images](images/p732-01.jpg)\n\n\
    #### Getting Album Artwork\n\n**iTunes** can automatically get the album art for\
    \ most songs and videos; however, if you need to manually retrieve this artwork,\
    \ follow these steps:\n\n1.  Start **iTunes**.\n2.  Go to the **Advanced** menu.\n\
    3.  Select **Get Album Artwork**.\n\n    ![images](images/p732-02.jpg)\n\n**NOTE:**\
    \ You will need to have an iTunes account already and be logged in for this to\
    \ work correctly.\n\n### Authorizing and Deauthorizing Computers\n\nAs mentioned\
    \ previously, you can authorize up to five different computers to play your iTunes\
    \ media (e.g., music and movies).\n\n**CAUTION:** Once you hit five authorized\
    \ computers, you can deauthorize them all, but only once a year.\n\nHere's a question\
    \ that you may hear quite often: *Someone else has authorized my computer to play\
    \ her songs; can I now load and listen to these “authorized songs” on my iPad?*\n\
    \nThe short answer is maybe. The answer is no for all songs purchased on iTunes\
    \ prior to January 2009\\. It is also no for all songs purchased with DRM protection.\
    \ These songs are tied specifically to one person's mobile device (i.e., iPad,\
    \ iPhone, or iPad).\n\nThe answer is yes for all songs purchased without DRM protection\
    \ enabled. Early in 2009, iTunes announced that it would start selling some songs\
    \ and videos without DRM protection, which means they can be played on multiple\
    \ iPhones and iPads. Follow these steps to authorize or deauthorize your computer\
    \ for being able to play songs on your computer and possibly your iPad from someone\
    \ else's iTunes library:\n\n1.  Start up **iTunes**.\n2.  To authorize a computer,\
    \ go to the **Store** menu and select **Authorize This Computer…** To deauthorize\
    \ a computer, go to the **Store** menu and select **Deauthorize This Computer…**\n\
    \n    **NOTE:** You will need to know your iTunes or AOL username and password\
    \ for this to work.\n\n    ![images](images/p733-01.jpg)\n\n3.  Enter your Apple\
    \ ID, or if you prefer, click the radio button next to AOL, and enter your AOL\
    \ screen name and password.\n4.  Next, click the **Authorize** or **Deauthorize**\
    \ button.\n\n### iTunes Troubleshooting\n\nIn this section, we will provide a\
    \ few tips and tricks to help you deal with some common issues you might encounter\
    \ when using **iTunes**. We also have an entire chapter devoted to troubleshooting\
    \ (see [Chapter 28](#Chapter28.html#ch28): “Troubleshooting”) if you cannot find\
    \ answers to the problems you encounter in this section.\n\n#### What to Do If\
    \ the iTunes Automatic Update Fails\n\nThe automatic update may fail if you have\
    \ the `About iTunes.rtf` text file open, or you have another related file open\
    \ that cannot be closed by the installer automatically. If you locate and close\
    \ the problem file, you should be able to retry the automatic update.\n\nIf you\
    \ see a message similar to the one shown to the right, then you will have to manually\
    \ install the update. Follow these steps to do so:\n\n![images](images/p734-01.jpg)\n\
    \n1.  From the **Apple Software Update** screen, select the **Tools** menu and\
    \ then **Download Only**.\n\n    ![images](images/p734-02.jpg)\n\n2.  You will\
    \ see the **Download** status screen (shown in the image to the right of step\
    \ 1). Once the download is finished, a new window should pop up, showing the downloaded\
    \ files ready for you to install manually (see [Figure 29–27](#Chapter29.html#fig_29_27)).\n\
    \n    ![images](images/2927.jpg)\n\n    **Figure 29–27.** *The Apple Software\
    \ Update manual installation folder (Windows PC)*\n\n3.  To manually start the\
    \ install, double-click the **iTunes** installer file (see [Figure 29–27](#Chapter29.html#fig_29_27)).\
    \ The file may be slightly different from the one shown in the figure (e.g., `iTunes.msi`\
    \ or `iTunes64.msi`), depending on the operating system on your computer.\n4.\
    \  From here, you need to follow the **iTunes** installation screens.\n\n####\
    \ *Fixing the Apple ID Security Error*\n\nIf you try to log in with your Apple\
    \ ID, you might receive an error message at the top of the screen that looks similar\
    \ to this one:\n\n![images](images/p735-01.jpg)\n\nIf this happens, then you will\
    \ have to log in to the Apple Store web site, enter a security question/answer,\
    \ and then add the month and day of your birth.\n\nTo correct this error, follow\
    \ these steps:\n\n1.  Open a web browser on your computer and go to [`www.apple.com`](http://www.apple.com).\n\
    2.  Click the **Store** link in the left portion of the Top Nav Bar, and then\
    \ hover your mouse over the **Account** link in the upper-right corner to see\
    \ a dropdown list. Select **Account Information** from this list (see [Figure\
    \ 29–28](#Chapter29.html#fig_29_28)).\n\n    ![images](images/2928.jpg)\n\n  \
    \  **Figure 29–28.** *Getting to your account information to correct your security\
    \ information*\n\n3.  If you clicked **Account**, then you will need to select\
    \ the **Change account information** link from the next screen.\n4.  Log in with\
    \ your Apple ID and password (the one that caused the error).\n5.  Most likely,\
    \ your security question and answer or your birth month and date are blank. You\
    \ need to add this information, type your password twice, scroll to the bottom\
    \ of the screen, and then click the **Continue** button.\n\nYou should now be\
    \ able to use your Apple ID and password to register your iPad.\n\n**CAUTION:**\
    \ Apple will never send you an email asking you for your password or asking you\
    \ to log in and enter your password. If you receive such an email, it is probably\
    \ a scam. Don't click any links in such an email. If you are concerned about your\
    \ iTunes account, log in through the **iTunes** app to manage it."
  trans: "\n#### 导入电子书（PDF 和 iBook 格式）文件\n\n如果你想在 iPad 上阅读 PDF 文件或电子书（国际数字出版论坛制定的行业标准\
    \ ePub 格式），你首先需要将该文件导入 `iTunes`，以便同步到你的 iPad。有几种方法可以将电子书导入 `iTunes`。你可以使用拖放方法或菜单命令将文件或文件夹添加到资料库。\n\
    \n##### 拖放方法\n\n这是添加单个文件或少量文件的绝佳方式。请按照以下步骤操作：\n\n1.  在你的电脑上找到该文件。\n2.  点击该文件并将其拖到你的\
    \ iTunes 资料库中。松开鼠标将该文件放入资料库。你的资料库周围会出现一个方框，如右图所示。看到方框后，即可松开鼠标按钮。\n3.  由于 `iBooks`\
    \ 应用可以读取此文件，你应该会看到该文件出现在资料库的 `图书` 部分。\n\n    ![images](img/p731-01.jpg)\n\n#####\
    \ 使用菜单命令\n\n如果你有一个完整的文件夹或多个文件夹的文件需要移入 `iTunes`，使用菜单命令会很方便。\n\n**提示：** 此方法适用于电子书，也适用于音乐等其他内容。\n\
    \n1.  从 `iTunes` 菜单中，选择 `文件`，然后选择 `将文件夹添加到资料库` 以添加整个文件夹的内容，或者如果只有一个文件要添加，则选择 `将文件添加到资料库`。\n\
    2.  现在导航到你想要添加的文件夹或文件，点击 `选择文件夹`（或对于单个文件点击 `打开`）。\n3.  所有 iBooks 可读的文件都将被添加到 `iTunes`。\n\
    \n    ![images](img/p732-01.jpg)\n\n#### 获取专辑封面\n\n`iTunes` 可以自动获取大多数歌曲和视频的专辑封面；但是，如果你需要手动获取这些封面，请按照以下步骤操作：\n\
    \n1.  启动 `iTunes`。\n2.  进入 `高级` 菜单。\n3.  选择 `获取专辑封面`。\n\n    ![images](img/p732-02.jpg)\n\
    \n**注意：** 你需要拥有一个 iTunes 帐户并已登录，此功能才能正常工作。\n\n### 授权和取消授权计算机\n\n如前所述，你可以授权最多五台不同的电脑来播放你的\
    \ iTunes 媒体（例如音乐和电影）。\n\n**警告：** 一旦达到授权五台电脑的上限，你可以取消所有电脑的授权，但每年只能执行一次。\n\n以下是一个你可能经常听到的问题：*其他人已授权她的电脑播放她的歌曲；我现在可以在我的\
    \ iPad 上加载并收听这些“授权歌曲”吗？*\n\n简短的回答是：可能可以。对于 2009 年 1 月之前在 iTunes 上购买的所有歌曲，答案是否定的。对于所有带有\
    \ DRM 保护的歌曲，答案也是否定的。这些歌曲与特定个人的移动设备（即 iPad、iPhone 或 iPad）绑定。\n\n对于未启用 DRM 保护购买的所有歌曲，答案是肯定的。2009\
    \ 年初，iTunes 宣布将开始销售一些没有 DRM 保护的歌曲和视频，这意味着它们可以在多部 iPhone 和 iPad 上播放。请按照以下步骤授权或取消授权你的电脑，以便在你的电脑上，以及可能在你的\
    \ iPad 上播放来自他人 iTunes 资料库的歌曲：\n\n1.  启动 `iTunes`。\n2.  要授权一台电脑，请进入 `商店` 菜单并选择\
    \ `授权此电脑…` 要取消授权一台电脑，请进入 `商店` 菜单并选择 `取消授权此电脑…`\n\n    **注意：** 你需要知道你的 iTunes 或\
    \ AOL 用户名和密码，此操作才能成功。\n\n    ![images](img/p733-01.jpg)\n\n3.  输入你的 Apple ID，或者如果你愿意，点击\
    \ AOL 旁边的单选按钮，然后输入你的 AOL 用户名和密码。\n4.  接下来，点击 `授权` 或 `取消授权` 按钮。\n\n### iTunes 故障排除\n\
    \n在本节中，我们将提供一些提示和技巧，以帮助你处理在使用 `iTunes` 时可能遇到的一些常见问题。如果你在本节中找不到所遇到问题的答案，我们还有整整一章专门讨论故障排除（请参阅第\
    \ 28 章：“故障排除”）。\n\n#### 如果 iTunes 自动更新失败怎么办\n\n如果你打开了 `About iTunes.rtf` 文本文件，或者打开了其他安装程序无法自动关闭的相关文件，则自动更新可能会失败。如果你找到并关闭了有问题的文件，应该可以重试自动更新。\n\
    \n如果你看到一条类似于右侧所示的消息，那么你将需要手动安装更新。请按照以下步骤操作：\n\n![images](img/p734-01.jpg)\n\n\
    1.  在 `Apple 软件更新` 屏幕上，选择 `工具` 菜单，然后选择 `仅下载`。\n\n    ![images](img/p734-02.jpg)\n\
    \n2.  你将看到 `下载` 状态屏幕（如步骤 1 右侧图片所示）。下载完成后，应会弹出一个新窗口，显示已下载的文件，供你手动安装（请参阅图 29–27）。\n\
    \n    ![images](img/2927.jpg)\n\n    **图 29–27.** *Apple 软件更新手动安装文件夹（Windows PC）*\n\
    \n3.  要手动开始安装，请双击 `iTunes` 安装文件（请参阅图 29–27）。根据你电脑的操作系统，该文件可能与图中所示略有不同（例如 `iTunes.msi`\
    \ 或 `iTunes64.msi`）。\n4.  从这一步开始，你需要按照 `iTunes` 安装屏幕的提示进行操作。\n\n#### 修复 Apple\
    \ ID 安全错误\n\n如果你尝试使用你的 Apple ID 登录，屏幕顶部可能会收到一条类似这样的错误消息：\n\n![images](img/p735-01.jpg)\n\
    \n如果发生这种情况，你将需要登录 Apple Store 网站，输入一个安全问题/答案，然后添加你的出生月份和日期。\n\n要更正此错误，请按照以下步骤操作：\n\
    \n1.  在你的电脑上打开一个网页浏览器，访问 [`www.apple.com`](http://www.apple.com)。\n2.  点击顶部导航栏左侧的\
    \ `商店` 链接，然后将鼠标悬停在右上角的 `帐户` 链接上，查看下拉列表。从该列表中选择 `帐户信息`（请参阅图 29–28）。\n\n    ![images](img/2928.jpg)\n\
    \n    **图 29–28.** *访问你的帐户信息以更正你的安全信息*\n\n3.  如果你点击了 `帐户`，则需要在下一个屏幕上选择 `更改帐户信息`\
    \ 链接。\n4.  使用你的 Apple ID 和密码登录（即导致错误的那个密码）。\n5.  很可能你的安全问题与答案，或者你的出生月份与日期是空白的。你需要添加此信息，输入两次密码，滚动到屏幕底部，然后点击\
    \ `继续` 按钮。\n\n你现在应该能够使用你的 Apple ID 和密码注册你的 iPad。\n\n**警告：** Apple 绝不会向你发送电子邮件询问你的密码，或要求你登录并输入密码。如果你收到此类电子邮件，这很可能是一个骗局。不要点击此类电子邮件中的任何链接。如果你担心你的\
    \ iTunes 帐户，请通过 `iTunes` 应用登录进行管理。\n"
- fmt: '#### Getting Your Music Back If Your Computer Crashes


    The good news is that you''ll probably have a lot, or perhaps all, of your music
    on your iPad. We can''t help you get your computer back up and running in this
    book if the initial reboot isn''t successful. However, we can tell you about how
    you can get your music back from your iPad to your `iTunes` app once your computer
    is running again.


    So, if your only copy of your music, videos, and other content resides on your
    iPad, iPod, iPhone, or iPod touch, then you need to use a third-party tool to
    copy your music from that mobile device back into the `iTunes` app on your computer,
    once you get your computer up and running again.


    Do a web search for "copy iPad or iPod to iTunes" and you will find a number of
    both free and paid software tools to accomplish this task. We recommend using
    a free trial of any software before purchasing it to make sure it will meet your
    needs.


    This solution will also help if you encounter the problem where all your iPad
    music is grayed out when you view it from `iTunes`. In that case, you will need
    to copy all your iPad music to `iTunes`, and then start fresh with the sync or
    manual transfer steps described in [Chapter 3](#Chapter03.html#ch3): "Sync Your
    iPad with iTunes."


    **CAUTION:** Please do not use this third-party software to create unauthorized
    copies of music, videos, or other content that you have not legitimately purchased.


