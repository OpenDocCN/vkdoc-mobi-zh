- fmt: "#### Setting Favorites in FaceTime\n\nJust as when using an iPhone, you can\
    \ set `Favorites` for `FaceTime` calling on your iPad. The favorites that you\
    \ set need to be individuals who have an iPad 2, an iPod touch, or an iPhone 4.\
    \ These people also need to set up their device for `FaceTime` calls. Follow these\
    \ steps to add people to your `Favorites`:\n\n1. Start the `FaceTime` app as you\
    \ did previously.\n2. Touch the `Favorites` soft key at the bottom (see [Figure\
    \ 18–4](#Chapter18.html#fig_18_4)).\n3. Touch the `Plus` (`+`) sign and then choose\
    \ a contact to add to your `Favorites`.\n\n**NOTE**: When choosing a contact,\
    \ choose either the person's iPhone number or the email address associated with\
    \ the person's `FaceTime` account.\n\n![images](images/1804.jpg)\n\n**Figure 18–4.**\
    \ *Adding a favorite in `FaceTime`*\n\n#### Multitasking Using FaceTime\n\nOne\
    \ of the great features of your new iPad is that it uses the latest iOS software\
    \ from Apple, which allows you to multitask (see [Chapter 8](#Chapter08.html#ch8):\
    \ “Multitasking and Voice Control” to learn more about how to switch between apps).\n\
    \nWhen you are in a `FaceTime` call, just double-click the `Home` button to see\
    \ other apps that are running. Go to another app and you will see a bar at the\
    \ top of the screen that says, “Touch to resume FaceTime.” Some users have reported\
    \ difficulty getting back to the `FaceTime` call after this method.\n\nSimply\
    \ touch that bar to go back to the call.\n\n![images](images/p459-01.jpg)\n\n\
    ### Making Phone Calls and More with Skype\n\nSocial networking is all about keeping\
    \ in touch with our friends, colleagues, and family. Passive communication through\
    \ sites such as [`www.facebook.com`](http://www.facebook.com) and [`www.myspace.com`](http://www.myspace.com)\
    \ is nice; however, sometimes there is just no substitute for hearing someone's\
    \ voice.\n\nAmazingly, you can make phone calls using the `Skype` app from any\
    \ iPad. Calls to other Skype users anywhere in the world are free. A nice thing\
    \ about Skype is that it works on computers and many mobile devices, including\
    \ iPhone 4s, iPod touches, some BlackBerry smartphones, and other mobile devices.\
    \ You will be charged for calls to mobile phones and landlines, but the rates\
    \ are reasonable.\n\n![images](images/p459-02.jpg)\n\n**NOTE**: You can only make\
    \ a video call with the `Skype` app if you have a front-facing camera like the\
    \ ones on the iPad 2, iPhone 4, or iPod touch.\n\n![images](images/p459-03.jpg)\n\
    \n#### Downloading Skype to Your iPad\n\nYou can download the free `Skype` app\
    \ from the App Store by searching for “Skype” and installing it. If you need help\
    \ getting this done, please check out [Chapter 21](#Chapter21.html#ch21): “The\
    \ Amazing App Store.” You should be aware, however, that like `Facebook` and other\
    \ apps, there is no native iPad version of `Skype`, so you will be using an iPhone\
    \ app.\n\n#### Creating Your Skype Account on Your iPad\n\nIf you need to set\
    \ up your Skype account and have not already done so from your computer (see the\
    \ “Using Skype on Your Computer” section later in this chapter), then follow these\
    \ steps to set up `Skype` on your iPad:\n\n1. Tap the `Skype` icon from your `Home`\
    \ screen.\n2. Tap the `Create Account` button.\n3. Tap `Accept` if you accept\
    \ the `No Emergency Calls` pop-up warning window.\n4. Enter your `Full Name`,\
    \ `Skype Name`, `Password`, and `Email`, and then decide whether you want to `Get\
    \ News and Offers` by setting the switch at the bottom.\n5. Tap the `Done` button\
    \ to create your account.\n\n![images](images/p460-01.jpg)\n\n#### Log into the\
    \ Skype App\n\nAfter you create your account, you're ready to log into `Skype`\
    \ on your iPad. To do so, follow these steps:\n\n1. If you are not already in\
    \ `Skype`, tap the `Skype` icon from your `Home` screen.\n2. Type your `Skype\
    \ Name` and `Password`.\n3. Tap the `Sign In` button in the upper-right corner.\n\
    4. You should not have to enter this login information again; it is saved in `Skype`.\
    \ The next time you tap `Skype`, it will automatically log you in.\n\n![images](images/p461-01.jpg)\n\
    \n#### Finding and Adding Skype Contacts\n\nOnce you have logged into the `Skype`\
    \ app, you will want to start communicating with people. To do so, you will have\
    \ to find them and add them to your `Skype` contacts list:\n\n1. If you are not\
    \ already in `Skype`, tap the `Skype` icon from your `Home` screen and log in,\
    \ if asked.\n2. Tap the `Contacts` soft key at the bottom.\n3. Tap the `Search`\
    \ window at the top, and then type someone's first and last name or `SkypeName`.\
    \ Tap `Search` to locate that person.\n4. Once you see the person you want to\
    \ add, tap his name.\n\n   ![images](images/p461-02.jpg)\n\n5. If you are not\
    \ sure whether this is the correct person, tap the `View Full Profile` button.\n\
    6. Tap `Add Contact` at the bottom.\n\n   ![images](images/p462-01.jpg)\n\n7.\
    \ Adjust the invitation message appropriately.\n8. Tap the `Send` button to send\
    \ this person an invitation to become one of your `Skype` contacts.\n\n   ![images](images/p462-02.jpg)\n\
    \n9. Repeat the procedure to add more contacts.\n10. When you are done, tap the\
    \ `Contacts` soft key at the bottom.\n11. Tap `All Contacts` from the `Groups`\
    \ screen to see all new contacts you have added.\n12. Once this person accepts\
    \ you as a contact, you will see him listed as a contact in your `All Contacts`\
    \ screen.\n\n**TIP:** Sometimes you want to get rid of a `Skype` contact. You\
    \ can remove or block a contact by tapping her name from the contact list. Tap\
    \ the `Settings` icon (upper-right corner) and select either `Remove from Contacts`\
    \ or `Block`.\n\n![images](images/p463-01.jpg)\n\n#### Making Calls with Skype\
    \ on Your iPad\n\nSo far you have created your account and added your contacts.\
    \ Now you are ready to finally make that first call with `Skype` on your iPad:\n\
    \n1. If you are not already in `Skype`, tap the `Skype` icon from your `Home`\
    \ screen and log in, if asked.\n2. Tap the `Contacts` soft key at the bottom.\n\
    3. Tap `All Contacts` to see your contacts.\n4. Tap the contact name you wish\
    \ to call (see [Figure 18–5](#Chapter18.html#fig_18_5)).\n5. Tap the `Call` button.\n\
    6. You may see a `Skype` button and a `Mobile` or other phone button. Press the\
    \ `Skype` button to make the free call. Making any other kind of call requires\
    \ that you pay for it with `Skype Credits`.\n\n![images](images/1805.jpg)\n\n\
    **Figure 18–5.** *Placing calls from `Skype` on your iPad*\n\n**NOTE:** You can\
    \ call toll free numbers for free using `Skype Out` on your iPad. The following\
    \ notice comes from the Skype web site at [`www.skype.com`](http://www.skype.com):\n\
    \n“The following countries and number ranges are supported and are free of charge\
    \ to all users. We're working on the rest of the world. France: +33 800, +33 805,\
    \ +33 809Poland: +48 800UK: +44 500, +44 800, +44 808USA: +1 800, +1 866, +1 877,\
    \ +1 888Taiwan: +886 80.”\n\n#### Switching Cameras with Skype\n\nJust as you\
    \ can in the `FaceTime` app, you can show the individual with whom you are talking\
    \ on `Skype` your surroundings by “switching” to the back camera of the iPad.\n\
    \nSimply touch the `Camera` soft key in the top-left corner and choose whether\
    \ you wish to display the `Front Camera`, `Back Camera`, or `No Camera` on the\
    \ screen.\n\nIf you choose `No Camera`, `Skype` will still work, but you will\
    \ have only a voice call — and no video image.\n\n![images](images/p465-01.jpg)"
