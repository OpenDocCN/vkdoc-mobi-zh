    \ wheels to move them up or down.\n6.  Similarly, to change the date, tap the\
    \ **Date** (in this image **Wednesday, March 23, 2011**).\n\n#### Setting Your\
    \ Time Zone\n\nFollow these steps to set the time zone:\n\n1.  Tap **Time Zone**\
    \ on the same **Date & Time** screen shown in the previous section.\n2.  Start\
    \ to type in the name of the desired city (see [Figure 1-13](#Chapter01.html#fig_1_13)).\n\
    3.  Touch the name of the city to select it and the screen will automatically\
    \ move back to the **Date & Time** screen.\n\n![images](images/0113.jpg)\n\n**Figure\
    \ 1-13.** *Setting your time zone*\n\n#### Adjusting the Brightness\n\nYouriPadhas\
    \ an **Auto-Brightness** control available, which is usually set to **ON** by\
    \ default (see [Figure 1-14](#Chapter01.html#fig_1_14)). This uses the built-in\
    \ light sensor to adjust the brightness of the screen. Generally, we advise that\
    \ you keep this set to **ON**.\n\nIf you want to adjust the brightness, you certainly\
    \ can. From your **Home** screen, touch the **Settings** icon. Then touch the\
    \ **Brightness& Wallpaper** tab, which is near the top of the left column, and\
    \ move the **Slider** control to adjust the brightness.\n\n![images](images/0114.jpg)\n\
    \n**Figure 1-14.** *Setting the brightness of your iPad*\n\n**TIP**: Setting the\
    \ brightness lower will help you save battery life. A little less than 1/2 way\
    \ across seems to work fine.\n\n## Chapter 2\n\n## Typing Tips, Copy/Paste, and\
    \ Search\n\nIn this chapter, we will show you some good ways to type and save\
    \ valuable time typing on your iPad, whether you use the **Portrait** (vertical/smaller)\
    \ keyboard or the **Landscape** (horizontal/larger) keyboard. We will show you\
    \ how to select different language keyboards, how to type symbols, and other tips.\
    \ We will also show you some tips and tricks when working with various external\
    \ keyboard accessories for your iPad.\n\nLater in this chapter, we will tell you\
    \ about the **Spotlight Search** and the **Copy and Paste** function. **Copy and\
    \ Paste** will save you lots of time, as well as increase your accuracy when working\
    \ with your iPad.\n\n### Typing on Your iPad\n\nYou will quickly find two on-screen\
    \ keyboards on your iPad: the smaller one visible when you hold your iPad in a\
    \ vertical orientation, and the larger **Landscape** keyboard visible when you\
    \ hold the iPad in a horizontal orientation. The nice thing is that you can choose\
    \ whichever keyboard works best for you. And if you prefer a physical keyboard,\
    \ we will show you the ins-and-outs of a few nice accessory keyboards from Apple\
    \ and ZAGG (see [Figure 2-1](#Chapter02.html#fig_2_1)).\n\n![images](images/0201.jpg)\n\
    \n**Figure 2-1.** *Several keyboard accessories from Apple and ZAGG*\n\n#### Typing\
    \ on the Screen with the Portrait Keyboard\n\nYou will find when you first start\
    \ out with your iPad that you can type most easily with one finger—usually your\
    \ index finger—while holding the iPad with the other hand.\n\nAfter a little while,\
    \ you should be able to experiment with thumb typing (as you see so many people\
    \ doing with their iPhone or BlackBerry smartphones). Once you practice a little,\
    \ typing with two thumbs instead of a single finger will really boost your speed.\
    \ Just be patient; it does take practice to become proficient at typing quickly\
    \ with your two thumbs.\n\nYou will actually notice after a while that the keyboard\
    \ touch sensitivity assumes you are typing with two thumbs. What this means is\
    \ that the letters on the left side of your keyboard are meant to be pressed on\
    \ the left side, and the keys on the right are meant to be pressed on the right\
    \ side (see [Figure 2-2](#Chapter02.html#fig_2_2)).\n\n![images](images/0202.jpg)\n\
    \n**Figure 2-2.** *Typing with two thumbs while holding the iPad in **Portrait**\
    \ mode*\n\n**TIP:** If you have larger hands and find typing on the smaller vertical\
    \ keyboard challenging, then flip your iPad on its side to get the larger **Landscape**\
    \ keyboard (see [Figure 2-3](#Chapter02.html#fig_2_3)).\n\n#### Typing on the\
    \ Screen with the Larger Landscape Keyboard\n\nSimply turn the iPad sideways in\
    \ almost any app and the keyboard will change to a larger **Landscape** keyboard\
    \ to make it easier to type (see [Figure 2-3](#Chapter02.html#fig_2_3)). Follow\
    \ these steps to type on the **Landscape** keyboard:\n\n1.  It helps if you place\
    \ the iPad at a slight incline as you type; this makes it easier to see the screen.\
    \ You can also simply lay the iPad on a flat surface. It usually helps if you\
    \ either have the iPad in a case (see [Chapter 1](#Chapter01.html#ch1): “Getting\
    \ Started” to learn about various cases) or sitting on a soft surface so it does\
    \ not rock as you are typing.\n2.  Type with two hands as you would on a normal\
    \ computer keyboard. With some practice, you can almost type as fast on this larger\
    \ keyboard as you do on a regular physical keyboard.\n\n**TIP:** Try recycling\
    \ an old mouse pad to use as a rest for your iPad while you type.\n\n![images](images/0203.jpg)\n\
    \n**Figure 2-3.** *Typing with two hands when in **Landscape** orientation*\n\n\
    **TIP:** For the frequent traveler, using the virtual keyboards on your iPad saves\
    \ a ton of space in those cramped airline seats compared to any laptop computer!\n\
    \n#### Typing with External Keyboards (Purchase as Separate Accessories)\n\nIf\
    \ you need to do a lot of typing or are simply uncomfortable with the “typing\
    \ on glass” feel of the virtual keyboards, you can buy external keyboards that\
    \ work with the iPad. We have tested two from Apple, but we know there are more\
    \ keyboard dock and Bluetooth options available. We showed you, but have not tested,\
    \ a keyboard/case combination called the ZAGGmate earlier in this chapter (see\
    \ Figure –1). Check out the iPad/iPhone/iPod blogs or online stores (e.g., [`www.amazon.com`](http://www.amazon.com))\
    \ to find keyboards and other accessories. You can also do a quick web search\
    \ for “iPad external keyboard” to find other options."
  trans: "\n#### 调整或禁用自动锁定超时功能\n\n你会注意到，iPad 在闲置一小段时间后会自动锁定并进入`休眠`模式，屏幕变黑。你可以更改此前的间隔时间，或者使用`设置`图标完全禁用此功能：\n\
    \n1.  从`主屏幕`触摸`设置`图标。\n2.  触摸左侧栏中的`通用`，然后触摸右侧栏中的`自动锁定`。\n3.  你会看到此页面上`自动锁定`旁边的当前时间间隔（图\
    \ 1-15）。默认设置是 iPad 在闲置五分钟后锁定（以节省电池寿命）。此设置的选项范围从两分钟到十五分钟，或`永不`。\n\n    ![图片](img/p70-02.jpg)\n\
    \n4.  触摸所需设置以选中它——当你看到它旁边出现`勾号`图标时，即表示已选中。\n5.  然后，点击顶行的`通用`按钮返回`通用`屏幕。你应该会看到你的更改现在已反映在`自动锁定`旁边。\n\
    \n**电池寿命小贴士：**\n\n将`自动锁定`时间设置得更短（例如，2 分钟）将有助于节省电池寿命。\n\n#### 调整日期和时间\n\n通常情况下，日期和时间会在你连接\
    \ iPad 到电脑时自动设置或调整，我们在第 3 章：“将 iPad 与 iTunes 同步”中介绍过。不过，你也可以非常轻松地手动调整日期和时间。当你在旅途中使用\
    \ iPad 并需要在降落后调整时区时，你可能需要这样做。请按以下步骤操作：\n\n1.  触摸`设置`图标。\n2.  触摸左侧栏中的`通用`和右侧栏中的`日期与时间`以查看`日期与时间`设置屏幕。\n\
    3.  如果你更喜欢看到 09:30 和 14:30，而不是上午 9:30 和下午 2:30，请将`24 小时制`设置开关拨到`开启`。\n\n    ![图片](img/p71-01.jpg)\n\
    \n    ![图片](img/p71-02.jpg)\n\n4.  要设置日期和时间，请触摸`设置日期与时间`按钮，查看弹出的滚轮窗口，触摸并移动滚轮即可转动。\n\
    5.  触摸并滑动`小时`、`分钟`和`上午/下午`滚轮，使其上下移动。\n6.  同样地，要更改日期，请点击`日期`（在此图片中为`2011 年 3 月\
    \ 23 日，星期三`）。\n\n#### 设置时区\n\n请按照以下步骤设置时区：\n\n1.  在上节显示的同一`日期与时间`屏幕上点击`时区`。\n\
    2.  开始输入所需城市的名称（参见图 1-13）。\n3.  触摸城市名称以选中它，屏幕将自动返回`日期与时间`屏幕。\n\n![图片](img/0113.jpg)\n\
    \n**图 1-13.** *设置时区*\n\n#### 调整亮度\n\n你的 iPad 带有`自动亮度`控制功能，通常默认设置为`开启`（参见图 1-14）。此功能使用内置光线传感器来调整屏幕亮度。通常，我们建议你将其保持为`开启`状态。\n\
    \n如果你想调整亮度，当然可以。从`主屏幕`触摸`设置`图标。然后触摸靠近左侧栏顶部的`亮度与墙纸`标签，并移动`滑块`控制来调整亮度。\n\n![图片](img/0114.jpg)\n\
    \n**图 1-14.** *设置 iPad 的亮度*\n\n**小贴士**：将亮度调低将有助于节省电池寿命。将滑块调整到略低于一半的位置似乎效果不错。\n\
    \n## 第 2 章\n\n## 输入技巧、复制/粘贴和搜索\n\n在本章中，我们将向你展示一些在 iPad 上高效输入和节省宝贵时间的好方法，无论你是使用`竖屏`（垂直/较小）键盘还是`横屏`（水平/较大）键盘。我们将介绍如何选择不同的语言键盘、如何输入符号以及其他技巧。我们还将展示在使用各种适用于\
    \ iPad 的外部键盘配件时的一些技巧和诀窍。\n\n在本章后面，我们将介绍`聚焦搜索`和`拷贝与粘贴`功能。`拷贝与粘贴`将为你节省大量时间，同时提高你在使用\
    \ iPad 时的准确性。\n\n### 在 iPad 上输入\n\n你很快就会在 iPad 上发现两个屏幕键盘：一个是垂直方向持握 iPad 时可见的较小键盘，另一个是水平方向持握\
    \ iPad 时可见的较大`横屏`键盘。好处是你可以选择最适合你的键盘。如果你更喜欢实体键盘，我们还将为你介绍 Apple 和 ZAGG 的几款不错配件键盘的详情（参见图\
    \ 2-1）。\n\n![图片](img/0201.jpg)\n\n**图 2-1.** *来自 Apple 和 ZAGG 的几款键盘配件*\n\n####\
    \ 使用竖屏键盘在屏幕上输入\n\n你会发现，刚开始使用 iPad 时，用一根手指（通常是食指）输入最方便，同时用另一只手握住 iPad。\n\n过一小段时间后，你应该可以尝试用拇指输入（就像你看到很多人用\
    \ iPhone 或黑莓智能手机那样）。稍加练习后，用两个拇指输入会比单指输入大大提升速度。请耐心些；要熟练地用双拇指快速输入确实需要练习。\n\n实际上，过一段时间你会注意到，键盘的触摸灵敏度会假定你正在用两个拇指输入。这意味着键盘左侧的字母应由左手按压，右侧的按键应由右手按压（参见图\
    \ 2-2）。\n\n![图片](img/0202.jpg)\n\n**图 2-2.** *在`竖屏`模式下持握 iPad 时用两个拇指输入*\n\n**小贴士：**\
    \ 如果你的手比较大，觉得在较小的竖屏键盘上输入有挑战性，那么把你的 iPad 侧转过来，就能得到更大的`横屏`键盘（参见图 2-3）。\n\n#### 使用更大的横屏键盘在屏幕上输入\n\
    \n几乎在任何应用中，只需将 iPad 侧转，键盘就会变为更大的`横屏`键盘，使输入更容易（参见图 2-3）。请按照以下步骤在`横屏`键盘上输入：\n\n\
    1.  将 iPad 稍微倾斜放置会有助于输入；这样能更容易看到屏幕。你也可以简单地将 iPad 平放在平坦表面上。通常，将 iPad 放在保护套中（参见第\
    \ 1 章：“开始使用”以了解各种保护套）或放在柔软的表面上会有所帮助，这样在输入时它不会晃动。\n2.  像在普通电脑键盘上一样用双手输入。经过一些练习后，你几乎可以像在普通实体键盘上一样快速地在较大的屏幕上输入。\n\
    \n**小贴士：** 尝试重复利用旧的鼠标垫作为你输入时 iPad 的垫子。\n\n![图片](img/0203.jpg)\n\n**图 2-3.** *在`横屏`方向时用双手输入*\n\
    \n**小贴士：** 对于经常旅行的人来说，与任何笔记本电脑相比，使用 iPad 上的虚拟键盘能在拥挤的飞机座位上节省大量空间！\n\n#### 使用外部键盘（需另行购买配件）\n\
    \n如果你需要大量输入，或者只是不习惯虚拟键盘那种“在玻璃上输入”的感觉，你可以购买适用于 iPad 的外部键盘。我们已经测试过 Apple 的两款，但我们知道还有更多的键盘底座和蓝牙选项可供选择。我们在本章前面展示过但未测试过一款名为\
    \ ZAGGmate 的键盘/保护套组合（参见图 2-1）。请查看 iPad/iPhone/iPod 博客或在线商店（例如 [`www.amazon.com`](http://www.amazon.com)）来寻找键盘和其他配件。你也可以快速搜索“iPad\
    \ external keyboard”来找到其他选择。\n"
- fmt: '### External Keyboard Shortcuts


    Once you connect an external keyboard to your iPad, you can use many of the shortcuts
    on your keyboard that you have become familiar with on your computer keyboard.
    The following shortcuts should save you some time when typing on your iPad:


    - **Select Text with Arrows:** `Command-Shift-Arrow` keys

    - **Cut Selected Text:** `Command + X`

    - **Copy Selected Text:** `Command + C`

    - **Paste Selected Text:** `Command + V`

    - **Undo:** `Command + Z`

    - **Redo:** `Command + Y`


    **TIP:** If you plan to do a lot of typing on your iPad, investing some money
    in one of these external keyboards can be worth its weight in gold! In our testing,
    we preferred the Apple iPad Keyboard Dock because it held the iPad at a very nice
    angle for typing. If you use the Bluetooth keyboard, you really need to invest
    in a case that will hold your iPad up at an angle, so that it is easier to read
    while typing.


    **CAUTION:** A few iPad apps only work in Landscape orientation and will not work
    with the Keyboard Dock because the whole app will look sideways when in the vertical
    orientation—**Apple Keynote** is one prominent example.


    ### Apple Wireless Keyboard (Bluetooth)—About US $70


    Besides being easier and faster to type on, external keyboards give you the added
    benefit of showing you more of the iPad screen because the virtual keyboard is
    gone.


    **TIP:** If you own another Apple computer, you may already own the Wireless Keyboard—it
    is the same Wireless Keyboard that Apple has made for a while.


    #### Getting Your iPad Connected


    Your iPad uses a wireless Bluetooth connection, so you must first connect, or
    *pair*, this keyboard with your iPad (see [Chapter 25](#Chapter25.html#ch25):
    “Bluetooth” for more information). You can use these steps to connect virtually
    any wireless keyboard to your iPad:


    1.  Tap the **Settings** icon (see [Figure 2-4](#Chapter02.html#fig_2_4)).

    2.  Tap **General** in the left column.

    3.  Tap **Bluetooth** in the right column.

    4.  Make sure the Bluetooth receiver is set to **ON** by tapping the switch if
    it shows **OFF**.

    5.  Turn on your Apple Wireless Keyboard by pressing the **On/Off** button on
    the right edge of the round tube under the top of the keyboard. You will know
    when the keyboard is on and has batteries when the green light in the upper-right
    corner is on or flashing.

    6.  Once the Wireless Keyboard is powered on, you should see it listed under **Devices**
    in the **Bluetooth** screen on the iPad. Tap the keyboard listed under **Devices**
    to have the iPad generate a pairing number (see [Figure 2-4](#Chapter02.html#fig_2_4)).

    7.  Type in the pairing code number from the iPad on the Wireless Keyboard and
    press the **Enter/Return** key on the keyboard.

    8.  Sometimes it takes two or three tries to get the keyboard to pair with your
    iPad. Keep trying; it will work eventually!


    ![images](images/0204.jpg)


    **Figure 2-4.** *Pairing a Bluetooth Wireless Keyboard with your iPad*


    #### Switching Between the Wireless and On-Screen Keyboards


    It''s easy to switch between a wireless keyboard and the built-in on-screen keyboard—and
    vice versa. Simply press the **Eject** key ![Image](images/p79-01.jpg) in the
    upper-right corner of the keyboard to temporarily disconnect the Wireless Keyboard
    and see the on-screen keyboard.


    Press the **Eject** key again to reconnect the Wireless Keyboard and make the
    on-screen keyboard disappear.


    ### Apple iPad Keyboard Dock—About US $70


    Besides giving you the physical keyboard to type on, the Keyboard Dock also gives
    you the added benefit of holding your iPad up at an angle like a regular computer
    screen. It is very nice!


    **NOTE:** At the time of publishing, the original iPad dock had not been updated
    by Apple, so it will hold both the iPad and iPad 2 (if a little loosely). We believe
    there may be an updated iPad dock specifically designed for the iPad 2 released
    soon.


    Other benefits of this keyboard are that it is designed by Apple specifically
    for the iPad, so you have specially designed keys, as shown in [Figure 2-5](#Chapter02.html#fig_2_5).
    To the right of these keys, along the top, you also have media control keys: **Previous
    Track**, **Play/Pause**, **Next Track**, and **Volume**. You also have a **Lock**
    key.


    ![images](images/0205.jpg)


    **Figure 2-5.** *Special keys on the iPad Keyboard Dock*


    **TIP:** To wake up the sleeping iPad, you can simply tap any key on the iPad
    Keyboard Dock.


    Unlike a laptop computer, the angle at which the iPad sits in the dock is fixed
    and cannot be adjusted; however, this angle seemed to work perfectly for us when
    we tested it.


    **CAUTION:** The iPad can be a little unstable in the Keyboard Dock. We recommend
    a good flat, stable surface. Also, be careful if you have little people (or really
    big dogs) running around—they could easily knock the iPad off the dock by accident.


    #### Connecting Your iPad to the Keyboard Dock


    Connecting your iPad to the Keyboard Dock is very simple—just set it on the dock
    to plug it into the port on the bottom of your iPad, as shown in [Figure 2-6](#Chapter02.html#fig_2_6).


    ![images](images/0206.jpg)


    **Figure 2-6.** *An iPad sitting in the Keyboard Dock—great for typing long documents*


    **NOTE:** If you have put your iPad in a case, you will most likely have to remove
    it before you connect the iPad to the Keyboard Dock. This has the added benefit
    of allowing the iPad to dissipate heat if you are charging it while it is in the
    dock.


    You can then plug your USB sync and charging cable to the back of the Keyboard
    Dock to simultaneously connect the iPad to your computer or charge it in the wall
    socket.


    Simply pull the iPad up and out of the Keyboard Dock to disconnect it.


    **CAUTION:** At the time of publishing, standard keyboard tricks such as `Command-C`
    for copy, `Command-V` for paste worked with the two keyboard accessories; however,
    the iPad auto-capitalization, auto-correction, and double-tapping the **Space**
    key for period shortcuts did not work.


    #### Connecting Two Keyboards at Once


    If you happen to have both the Wireless Keyboard and the Keyboard Dock, we have
    discovered that you can simultaneously type with both keyboards on the iPad. So,
    you could potentially take turns typing on the same document, have dueling keyboards,
    or even try duet typing. In any case, it''s a strange but true capability of these
    keyboards.'
