  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\n\n## Facebook\n\n\
    Facebook 创立于 2004 年 2 月。自那时起，它一直是用户与朋友、同事和家人联系、重新建立联系以及分享信息的主要网站。如今，超过 4 亿人使用\
    \ Facebook 作为他们与最重要的人“保持联系”的主要方式。\n\n**注意：** 你无法在 iPad 上玩 Facebook 游戏。如果你是 Facebook\
    \ 游戏的忠实玩家，这可能会让你失望。不过，你可以在 Scrabble 等游戏中与 Facebook 好友对战（参见第 22 章：“游戏与娱乐”）。\n\n\
    在你的 iPad 上，在本书出版时，主要有三种方式访问你的 Facebook 页面：\n\n*   使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
    *   使用像 `Flipboard` 这样的第三方应用（本章后面会介绍）。\n*   使用官方的 iPhone/iPad touch `Facebook`\
    \ 应用。\n\n![images](img/p554-01.jpg)\n\n**注意**：作者建议目前使用 `Flipboard` 或 `Friendly\
    \ Facebook for iPad` 作为在 iPad 上访问 Facebook 的最佳方案。iPhone/iPad touch 应用的功能比完整网站版本更有限，但更容易导航。请记住，这个应用最初是为\
    \ iPhone/iPod touch 设计的，所以它不会填满整个屏幕。你可以随时点击 `2x` 按钮使其变大——但放大后的屏幕不会像基于桌面的 Facebook\
    \ 网页那样清晰锐利。\n\n### 从 Safari 登录 facebook.com\n\n| 要登录基于网页的应用，请启动 `Safari` 浏览器并访问\
    \ [`www.facebook.com`](http://www.facebook.com)。就像在电脑上一样登录。**小贴士：** 如果完整网站看起来过于复杂，可以登录\
    \ [`touch.facebook.com`](http://touch.facebook.com) 或 [`m.facebook.com`](http://m.facebook.com)\
    \ 来访问移动版网站。 | ![images](img/p554-02.jpg) |\n\n### 浏览 facebook.com\n\nfacebook.com\
    \ 的好处在于，如果你曾在电脑上使用过 Facebook，你就已经知道如何浏览这个网站了。它的工作方式基本相同。\n\n点击`左侧导航栏`中的任意链接，即可进入你的`新鲜事`、`消息`、`活动`、`照片`、`好友`等页面（参见图\
    \ 23–1）。\n\n![images](img/2301.jpg)\n\n**图 23–1.** *`Safari` 浏览器中的 facebook.com\
    \ 网页*\n\n### 状态更新/新鲜事\n\n| 一旦你用 `Safari` 登录 Facebook 网站，你将可以选择写下“你在想什么”，并看到来自好友的`新鲜事`。\
    \ | ![images](img/p555-01.jpg) |\n\n### 查找 Facebook 好友\n\n| 在基于网页的 Facebook 页面中，你可以通过点击`搜索`字段并开始输入你要找的好友姓名来查找好友。你也可以点击`首页`上的`帐户`下拉框，然后点击左侧的`所有联系人`来查看你的好友。你的好友也会列在左侧边栏的`列表`下。**注意：**\
    \ 如果你使用的是 [`touch.facebook.com`](http://touch.facebook.com) 或 [`m.facebook.com`](http://m.facebook.com)，顶部会有一个`好友`标签；只需点击此标签即可查看你的好友列表。\
    \ | ![images](img/p556-01.jpg) |\n\n### 向 facebook.com 上传照片\n\n不幸的是，在本书出版时，向 Facebook\
    \ 上传照片存在一个问题：你在台式电脑上使用的简单`上传照片`功能在 `Safari` 浏览器中无法使用。相反，系统会要求你向一个独特的、在你点击`上传照片`后出现在\
    \ Facebook 中的电子邮件地址发送一封邮件。你邮件的主题行将成为上传照片的文字描述。通过电子邮件向 Facebook 上传照片的一个好处是，你可以一次发送一堆照片，让它们在后台上传。这与\
    \ `Facebook` 应用不同，后者要求你等待每张照片上传完成后才能进行下一张。\n\n我们不会向您展示通过电子邮件将照片上传到 Facebook 的详细步骤；相反，我们建议您安装\
    \ `Facebook` 应用并使用它来上传照片。使用这种方法要容易得多。请参阅本章后面的“使用 Facebook 应用上传图片”部分了解上传步骤。\n\n\
    ### 下载并安装 Facebook 应用\n\n| 要找到该应用，请使用 App Store 中的`搜索`功能并输入 `Facebook`。你也可以进入\
    \ App Store 的“社交网络”分类，找到官方的 `Facebook` 应用，以及许多其他与 Facebook 相关的应用。**注意**：有些应用可能看起来像官方的\
    \ Facebook 应用，并且需要付费。然而，唯一官方的应用是前面提到的 iPhone/iPod touch 应用。 | ![images](img/p557-01.jpg)\
    \ |\n\n| 要连接到你的 Facebook 帐户，你需要找到刚刚安装的图标并点击它。我们这里以 `Facebook` 应用为例，但这个过程对于其他应用也非常相似。一旦\
    \ `Facebook` 应用成功下载，你应该会看到此处显示的图标。 | ![images](img/p557-02.jpg) |\n\n### Facebook\
    \ 应用基础\n\n| 一旦 `Facebook` 应用下载并安装完成，你首先会看到`登录`屏幕。输入你的账户信息——你的电子邮件地址和密码。 | ![images](img/p558-01.jpg)\
    \ |\n\n| 首次登录后，你会看到一个`推送通知`警告消息。如果你希望允许这些消息，请点击`确定`，这些消息可能包括其他 Facebook 好友的“戳一下”、备忘、状态更新通知等。登录后，你将看到图\
    \ 23–2 所示的 `Facebook` 屏幕。点击 `Facebook` 标志可以在应用内导航。 | ![images](img/p558-02.jpg)\
    \ |\n\n![images](img/2302.jpg)\n\n**图 23–2.** *使用 `Facebook` 应用*\n\n### 在 Facebook\
    \ 中导航\n\n| 通过点击页面顶部的 `Facebook` 字样，可以在`导航`图标和当前位置之间切换。例如，如果你在`新鲜事`中，点击 `Facebook`，你将看到所有图标。再次点击\
    \ `Facebook`，你将返回到`新鲜事`。从图标页面，你可以访问你的`新鲜事`、`个人资料`、`好友`、`通知`、`地点`、`请求`、`活动`、`照片`或`聊天`。\
    \ | ![images](img/p559-01.jpg) |\n\n### 与好友交流\n\n按照以下步骤与你的 Facebook 好友交流：\n\n\
    1.  点击顶部的 `Facebook` 以查看所有图标。\n2.  点击`好友`图标以查看显示的好友列表。\n3.  点击你想要交流的好友，你将进入她的\
    \ Facebook 页面。在这里，你可以在`留言板`上留言，并查看好友的`信息`和`照片`。\n\n![images](img/p560-01.jpg)\n\
    \n### 使用 Facebook 应用上传图片\n\n用 Facebook 做一件简单又有趣的事情就是上传图片。请按照以下步骤在 `Facebook` 应用中上传图片：\n\
    \n1.  从 `Facebook` 的主图标中，点击`照片`。\n2.  选择一个相册，例如`手机上传`。\n3.  点击“你在想什么？”框旁边的`相机`图标。接下来，点击`拍摄照片或视频`来拍照或录像并上传。或者，你可以点击`从图库选取`来浏览\
    \ iPad 上的照片，直到找到你想要上传的照片。\n\n    ![images](img/p560-02.jpg)\n\n4.  接下来，如果愿意，点击`写说明……`来编写说明文字。\n\
    \n    ![images](img/p561-01.jpg)\n\n5.  要完成上传，请点击蓝色的`上传`按钮。照片将进入你的`手机上传`文件夹。\n\
    \n**注意**：当你上传照片时，图像质量将不会与 iPad 上的原始照片相同。\n\n![images](img/p561-02.jpg)\n"
- fmt: "#### Facebook Notifications\n\nDepending on your settings for Facebook push\
    \ notifications, you can be inundated by updates, wall posts, and invitations.\
    \ If you don't have too many Facebook friends, and you want to know when someone\
    \ is writing something on your wall or commenting on a post or picture, just set\
    \ your push notification to `On`.\n\n| When a notification comes in, it will appear\
    \ on your screen—even if your iPad is locked. In this example, Gary's friend posted\
    \ on his wall, and he has a message waiting in his inbox. The `Facebook` icon\
    \ tells him he has a waiting notification to respond to or view. | ![images](images/p561-03.jpg)\
    \ |\n\n| Tapping the icon launched the `Facebook` app, and Gary could see and\
    \ respond to the message. He was able to see a notification icon in the `Messages`\
    \ section, which was indicated by the `Red (1)` circle. He was also able to see\
    \ that he had a new `Wall Post` notification at the bottom of the screen. | ![images](images/p562-01.jpg)\
    \ |\n\n##### Expanding or Reducing the Size of the App\n\nSince this `Facebook`\
    \ app was designed for the smaller screen of the iPhone or iPod touch, you will\
    \ notice it opens up as a smaller app in the center of the screen. To see a larger\
    \ size app, tap the `2x` in the bottom-right portion of the screen, as shown in\
    \ [Figure 23–3](#Chapter23.html#fig_23_3).\n\n![images](images/2303.jpg)\n\n**Figure\
    \ 23–3.** *Expand the app to full screen with the `2x` button.*\n\n##### Settings\
    \ to Customize Your Facebook App\n\nFollow these steps to adjust settings for\
    \ the `Facebook` app:\n\n1.  Tap the `Settings` icon.\n2.  Tap `Facebook` in the\
    \ left column.\n3.  You can now adjust various options:\n    *   `Shake to Reload`:\
    \ This feature reloads or updates the page when you shake your iPad.\n    *  \
    \ `Vibrate`: This feature lets you specify your desired vibration settings when\
    \ you receive notifications.\n    *   `Push Notifications`: These features have\
    \ simple `ON`/`OFF` toggle switches. Touch `Push Notifications` to see the detailed\
    \ switches on the next screen.\n\n![images](images/p563-01.jpg)\n\nYou can see\
    \ the `Push Notifications` settings screen for the `Facebook` app on the right.\n\
    \nTouch each switch to turn it `ON` or `OFF`.\n\nFor each switch that is in the\
    \ `ON` position, you will receive push notifications when something changes. For\
    \ example, your iPad will notify you when you receive a message that somebody\
    \ has confirmed you as a friend, tagged you in a photo, or commented on your wall.\n\
    \n**TIP:** The latest version of the `Facebook` app will allow you to use `Facebook\
    \ Places` to see nearby friends. It also features `New Style` messages and `Groups`.\n\
    \n![images](images/p564-01.jpg)\n\n### Using the Flipboard and Friendly Facebook\
    \ Apps\n\nWhile it is frustrating that there is no \"official\" iPad Facebook\
    \ app, there are two very good alternatives (both free) in the App Store. Both\
    \ can make the Facebook experience more enjoyable on the iPad's big screen.\n\n\
    | `Friendly Facebook for iPad` has a free version available in the App Store.\
    \ Just search for \"Facebook\" in the App Store and you should find the app. |\
    \ ![images](images/p565-01.jpg) |\n\nOnce the app is installed, you can see your\
    \ `Live Feed`, `Events`, and `Places` marked as buttons across the top of the\
    \ app (see [Figure 23–4](#Chapter23.html#fig_23_4)). Just touch one of the buttons\
    \ to jump to that particular section.\n\nAt the very top, you can find buttons\
    \ for your `Profile` or `Friends`, as well as a `Home` button to go to the live\
    \ `News Feed`.\n\nThere are also smaller icons at the top for `Messages`, `Notifications`,\
    \ `Requests`, and a handy link to your `Facebook Games` page.\n\n![images](images/2304.jpg)\n\
    \n**Figure 23–4. *Friendly Facebook for iPad*** *screens*\n\n#### Flipboard for\
    \ iPad\n\nOne of the authors' favorite apps is `Flipboard`, which is billed as\
    \ a personal social magazine for the iPad.\n\n| Essentially, you can add sections\
    \ to the `Flipboard` app from any of numerous content providers. From there, you\
    \ can \"browse\" in a magazine style (flipping the pages) to any web site or content\
    \ provider. You can use `Flipboard` to set up accounts for Facebook, Twitter,\
    \ and Flickr (among other accounts). This feature works great with regards to\
    \ Facebook. Begin by downloading `Flipboard` from the App Store. | ![images](images/p566-01.jpg)\
    \ |\n\n| When you start `Flipboard` for the first time, you can set up accounts\
    \ as you add sections. Setting up Facebook is as easy as touching `Add a Section`\
    \ and then entering your Facebook login information. | ![images](images/p567-01.jpg)\
    \ |\n\nYou will then see your Facebook page as a magazine. You can touch an item\
    \ to bring it to full screen, or you can \"flip\" the pages to go through all\
    \ the Facebook posts.\n\nTouch the `Facebook` button at the top of the page and\
    \ you can jump to `Your Wall`, `Photos of You`, `News Feed Photos`, `News Feed\
    \ Links`, `Groups`, `Pages`, `Friends Lists`, or `Friends` (see [Figure 23–5](#Chapter23.html#fig_23_5)).\n\
    \nTouch a friend's button to jump to his page.\n\n![images](images/2305.jpg)\n\
    \n**Figure 23–5. Flipboard**'s Facebook screens\n\n### LinkedIn\n\nLinkedIn has\
    \ very similar core functionality to Facebook, but it tends to be more business\
    \ and career focused. Facebook, on the other hand, is focused more on personal\
    \ friends and games. With LinkedIn, you can connect and reconnect with current\
    \ and past business associates. The service lets you send messages, see what people\
    \ are up to, have discussions, and more.\n\nAs the time of publishing, the status\
    \ of LinkedIn was very similar to Facebook. You can go to the regular LinkedIn\
    \ site on the `Safari` browser or download the `LinkedIn` app for the iPhone.\n\
    \nWhich is better? We liked the `LinkedIn` app for the iPhone slightly better\
    \ than the full LinkedIn.com site in `Safari`. The service was easier to navigate\
    \ using the `LinkedIn` app with the large buttons, but you could see more on the\
    \ screen in the `Safari` version. We recommend giving both options a try and seeing\
    \ which you like better—it is really a matter of personal preference.\n\n####\
    \ LinkedIn.com on the Safari Browser\n\nTo get to LinkedIn on your browser, follow\
    \ these steps:\n\n1.  Tap the `Safari` icon.\n2.  Tap the `Address` bar at the\
    \ top of the browser.\n3.  Type in this address: [`www.linkedin.com`](http://www.linkedin.com).\
    \ If you see [`www.linkedin.com`](http://www.linkedin.com) appear in the dropdown\
    \ box as you are typing it, then just touch the link to jump to it.\n4.  Enter\
    \ your LinkedIn username and password to log in and see the LinkedIn `Home` page,\
    \ as shown in [Figure 23–6](#Chapter23.html#fig_23_6).\n\n![images](images/2306.jpg)\n\
    \n**Figure 23–6.** *The LinkedIn `Home` page on your `Safari` web browser*\n\n\
    **TIP:** Remember to zoom by double-tapping or pinching open/closed to see more\
    \ of the web page.\n\nYou navigate around and interact with LinkedIn.com just\
    \ as you would on your computer. The only difference is that you use your finger\
    \ instead of the mouse to click links."
