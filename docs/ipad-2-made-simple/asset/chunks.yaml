    \ 窗口中，点击正确的信息。这会将背景变为浅蓝色，而未选中的一侧则为白色。参见 图 3–5。\n2.  如果还有更多冲突，请点击 **下一个** 按钮，直到解决所有冲突。\n\
    \n    ![images](img/0305.jpg)\n\n    **图 3–5.** *iTunes 同步冲突解决器*\n\n3.  点击 **完成**\
    \ 关闭窗口。\n4.  您所做的所有选择将应用于下一次与 iPad 的同步。系统会为您提供 **立即同步** 或 **稍后同步** 的选项。\n\n**注意**：冲突可能导致同步过程中止。联系人是首先同步的，然后才是日历。因此，如果发现联系人同步冲突，则在解决联系人冲突之前，日历将不会同步。解决冲突后，请务必重新同步您的\
    \ iPad 以完成同步。\n\n#### 取消正在进行的同步\n\n您可以从 iTunes 或 iPad 上取消同步。\n\n**要取消电脑上 iTunes\
    \ 的同步：**\n\n点击同步状态窗口中的 **X** 按钮，如 图 3–6 所示。\n\n![images](img/0306.jpg)\n\n**图\
    \ 3–6.** *点击 iTunes 状态窗口中的 **X** 按钮以取消同步*\n\n**要从 iPad 取消同步：**\n\n滑动屏幕底部的滑块条，该滑块条显示\
    \ **滑动来取消**。其位置与常规的 **滑动来解锁** 消息相同。\n\n#### 为什么您可能不希望 iTunes 自动同步？\n\n可能有一些原因需要手动同步而非自动同步：\n\
    \n1.  您不想用过多的音乐和视频文件填满 iPad。\n2.  同步和备份过程耗时较长，因此您不希望每次连接 iPad 到电脑时都执行此操作。\n3.\
    \  您将 iPad 连接到不同的电脑为其充电，但不希望每次都被询问是否要抹掉并重新同步音乐。\n\n**注意**：如果您想拖放音乐和视频，请务必在 iTunes\
    \ 的 **摘要** 选项卡中勾选 **手动管理音乐和视频** 复选框。\n\n#### 在自动同步开始前手动阻止\n\n有时您可能希望在连接 iPad 到电脑时不触发自动同步。这可能是因为您时间不多，只想快速拖放几首新歌到\
    \ iPad 上，而无需同步其他所有内容。\n\n要阻止 iPad 的常规自动同步，您可以在连接 iPad 到电脑时，按住电脑键盘上的某些按键。\n\n**在\
    \ Windows PC 上**：\n\n> 在将 iPad 连接到电脑时，按住 **Shift** + **Ctrl** 键。\n\n**在 Mac 上**：\n\
    \n> 在连接 iPad 时，按住 **Command** + **Option** 键。\n\n#### 永久关闭自动同步\n\n您可以在 iTunes\
    \ 中永久关闭自动同步。如果您更希望对所有同步过程进行手动控制，可能需要这样做。\n\n**警告**：关闭自动同步还会禁止每次将 iPad 连接到电脑时的自动备份。此设置最适合于辅助电脑，您可能仅用它为\
    \ iPad 充电，但绝不希望进行同步。\n\n要在 iTunes 中关闭自动同步，请执行以下步骤：\n\n1.  从 iTunes 菜单中，选择 **编辑**，然后选择\
    \ **偏好设置**。\n2.  点击顶部的 **设备** 选项卡。\n3.  勾选 **防止 iPod、iPhone 和 iPad 自动同步** 复选框（参见\
    \ 图 3–7）。\n4.  点击 **确定** 按钮保存您的设置。\n\n![images](img/0307.jpg)\n\n**图 3–7.** *在\
    \ iTunes 中禁用自动同步*\n"
- fmt: "#### Getting a Clean Start with the Sync\n\nSometimes you'll have issues with\
    \ the sync and just need to get a fresh start. There are a few things you can\
    \ do in this regard with iTunes: you can erase or reset the sync history so iTunes\
    \ thinks it is syncing for the first time with your iPad, and you can force all\
    \ information on the iPad to be replaced with information from your computer.\n\
    \n##### Resetting Sync History (Make iTunes Think It Is Syncing for the First\
    \ Time)\n\nTo reset your sync history in iTunes, follow these steps:\n\n1.  Select\
    \ the **Edit** menu and then click **Preferences**.\n2.  Click the **Devices**\
    \ tab at the top of the iTunes Preferences window.\n3.  Click the **Reset Sync\
    \ History** button at the bottom, as shown in [Figure 3–8](#Chapter03.html#fig_3_8).\n\
    4.  Confirm your selection by clicking **Reset Sync History** in the pop-up window.\n\
    \n![images](images/0308.jpg)\n\n**Figure 3–8.** *Resetting sync history in iTunes*\n\
    \n##### Replacing All Information on the iPad (Next Sync Only)\n\nSometimes you\
    \ may need to get a fresh start with your iPad information. For whatever reason,\
    \ you want to get rid of all the information on your iPad in one or all the synced\
    \ apps and just start over. Follow these steps:\n\n1.  As you did to set up the\
    \ sync previously, connect your iPad to your computer, start iTunes, click your\
    \ **iPad** in the left nav bar, and click the **Info** tab at the top of the main\
    \ window.\n2.  Scroll all the way down to the **Advanced** section (see [Figure\
    \ 3–9](#Chapter03.html#fig_3_9)).\n3.  Check one, some, or all of the boxes as\
    \ you desire.\n\n    ![images](images/0309.jpg)\n\n    **Figure 3–9.** *In the\
    \ Advanced area, select the information you want to replace.*\n\n4.  When you\
    \ are ready, click the **Apply** button in the lower-right corner. The sync should\
    \ happen immediately. All of the information for the apps you have checked will\
    \ be erased from the iPad and replaced with the information from your computer.\n\
    \n### Apps: Syncing and Managing Them\n\nWith iTunes, you can sync and manage\
    \ your apps on your iPad. It's easy to drag and drop your app icons around on\
    \ a particular **Home** screen page or even between pages on your iPad.\n\n####\
    \ Syncing Apps in iTunes\n\nFollow these steps to sync and manage apps:\n\n1.\
    \  As you did to set up the sync previously, connect your iPad to your computer,\
    \ start iTunes, and click your **iPad** in the left nav bar.\n2.  Click the **Apps**\
    \ tab on the top of the main window.\n3.  Check the **Sync Apps** box to see all\
    \ apps stored on your iPad and your **Home** screens, as shown in [Figure 3–10](#Chapter03.html#fig_3_10).\n\
    \n![images](images/0310.jpg)\n\n**Figure 3–10.** *Sync Apps screen in iTunes*\n\
    \n#### Moving Apps, Working with Folders, or Deleting App Icons\n\nIt is easy\
    \ to move around and organize your application icons in this screen in iTunes.\n\
    \n**To move an app within a screen:** Click it and drag it around the screen.\n\
    \n**To move an app between Home screen pages:** Click and drag it to the new page\
    \ in the right column. The new page expands; drop it on the new page.\n\n**To\
    \ dock an app on the bottom dock:** Remove one icon if there are already six icons.\
    \ Then click and drag the icon to the dock.\n\n| **To remove an icon:** Hover\
    \ over it to see the X and then click the X.**NOTE: You can't remove icons such\
    \ as Contacts, Settings, Safari and other pre-installed core icons.** | ![images](images/p123-01.jpg)\
    \ |\n| **To create a new folder:** Drag and drop one icon onto another icon.**To\
    \ move an app into an existing folder:** Drag and drop the icon onto the Folder\
    \ icon.**To move an app out of a folder:** Click the folder to open it. Then drag\
    \ and drop the icon outside of that folder.**To view another Home screen page:**\
    \ Click that page in the right column.**To delete a folder:** Remove all apps\
    \ from that folder (drag them out) and it will disappear. | ![images](images/p124-01.jpg)\
    \ |\n\n#### Removing and Reinstalling Apps\n\nTo remove an app from your iPad,\
    \ simply uncheck the box next to it and confirm your selection, as shown in [Figure\
    \ 3–11](#Chapter03.html#fig_3_11). Don't worry—since you are syncing apps to your\
    \ computer in iTunes, you still have a copy of the app inside iTunes.\n\n![images](images/0311.jpg)\n\
    \n**Figure 3–11.** *Unchecking an app to delete it from your iPad*\n\n**TIP**:\
    \ Even if you delete an app from your iPad, if you have chosen to sync apps as\
    \ shown, you can still reinstall that app by rechecking the box next to it. The\
    \ app will be reloaded onto your iPad during the next sync."
