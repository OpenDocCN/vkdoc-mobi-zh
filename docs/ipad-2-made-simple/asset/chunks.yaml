  trans: "\n# 在 iPad 上使用 Skype 接听电话\n\nApple 的 `iOS` 系统原生支持后台网络语音 (VoIP) 通话。借助最新版本的\
    \ `Skype`，你可以让 `Skype` 在后台运行，并且仍然能够在有来电时接听 `Skype` 电话。你甚至（理论上）可以在一次语音通话中接听你的 `Skype`\
    \ 电话！\n\n**提示：** `Skype` 非常耗电。如果你想给某个在 iPad 上使用 `Skype` 的人打电话，只需给她发一封简短的邮件，或者快速打个电话提醒她，你想通过\
    \ `Skype` 应用和她通话。\n\n## 购买 Skype 点数或月度订阅套餐\n\n`Skype` 用户之间通话是免费的。但是，如果你想通过 `Skype`\
    \ 拨打对方的座机或手机，则需要购买 Skype 点数或购买月度订阅套餐。如果你尝试在 `Skype` 应用内购买点数或订阅，它会跳转到 Skype 网站。因此，我们建议使用\
    \ iPad 上的 `Safari` 或电脑上的网页浏览器来购买这些点数。\n\n**提示：** 你可能想先从少量的 Skype 点数开始，试用一下服务，然后再注册订阅套餐。如果你打算使用\
    \ `Skype` 应用与大量非 Skype 用户（例如，普通座机和手机）通话，那么订阅套餐会是更好的选择。\n\n按照以下步骤使用 `Safari` 购买\
    \ Skype 点数：\n\n1.  点击 `Safari` 图标。\n2.  在顶部的地址栏中输入 [`www.skype.com`](http://www.skype.com)，然后点击\
    \ `Go`。\n3.  点击页面顶部的 `Sign In` 链接。\n4.  输入你的 `Skype Name` 和 `Password`，然后点击 `Sign\
    \ me in`。\n5.  如果你尚未进入 `Account` 界面，请点击顶部导航栏右侧的 `Account` 标签页。\n6.  此时，你可以选择购买点数或订阅：\n\
    \    *   点击 `Buy pre-pay credit` 按钮购买固定金额的点数。\n    *   点击 `Get a subscription`\
    \ 按钮购买月度订阅账户。\n7.  最后，根据所选的购买类型完成付款指示。\n\n## 使用 Skype 聊天\n\n除了拨打电话，你还可以通过文本与 iPad\
    \ 上的其他 `Skype` 用户聊天。开始聊天与开始通话非常相似；按照以下步骤操作：\n\n1.  如果你还未进入 `Skype`，请从 `Home` 屏幕点击\
    \ `Skype` 图标，如有提示则登录。\n2.  点击底部的 `Contacts` 软键。\n3.  点击 `All Contacts` 查看你的联系人。\n\
    4.  点击你想聊天的联系人的名字（参见 图 18–6）。\n5.  点击 `Chat` 按钮。\n6.  输入你的聊天文本，然后按 `Send` 按钮。你的聊天内容将出现在屏幕顶部。\n\
    \n![images](img/1806.jpg)\n\n**图 18–6.** *在 iPad 上使用 `Skype` 聊天*\n\n## 将 Skype\
    \ 添加到你的电脑\n\n你也可以在电脑上使用 `Skype` 应用。接下来我们将向你展示如何操作。如果你还连接了网络摄像头，还可以使用 `Skype` 在电脑上进行视频通话。\n\
    \n要创建 Skype 账户并为你的电脑下载 `Skype` 软件，请按照以下步骤操作：\n\n1.  在你的电脑上打开网页浏览器。\n2.  访问 [`www.skype.com`](http://www.skype.com)。\n\
    3.  点击页面顶部的 `Join` 链接。\n4.  通过填写所有必填信息并点击 `Continue` 按钮来创建账户。请注意，你只需输入标记有星号的必填字段的信息。例如，你不需要输入性别、出生日期和手机号码。\n\
    5.  现在，账户设置过程就完成了。接下来，你会看到购买 Skype 点数的选项；不过，对于免费的 `Skype` 电话、视频通话和聊天来说，这不是必需的。\n\
    \n    **提示：** 只有当你想要给未使用 `Skype` 的人打电话时，才需要为 `Skype` 付费。例如，拨打座机或手机（未使用 `Skype`）的电话会产生费用。在本书出版时，即付即用费率约为每分钟\
    \ 2.1 美分；月度订阅费用根据不同的通话套餐，大约在 3 到 14 美元之间。\n\n6.  接下来，点击网站顶部导航栏中的 `Get Skype` 链接，将\
    \ `Skype` 下载到你的电脑。\n7.  点击 `Get Skype for Windows` 按钮或 `Get Skype for Mac` 按钮。\n\
    8.  按照说明安装软件。\n9.  软件安装完成后，启动它并使用你的 Skype 账户登录。\n10.  你现在可以开始向任何使用 `Skype` 的人发起（或接听）电话、视频通话和聊天了，包括所有在\
    \ iPad 上使用 `Skype` 的朋友。\n\n# 第 19 章\n\n# 生产力与文件传输\n\n你已经知道你的 iPad 非常适合消费或享受内容。它是你的音乐播放器、视频播放器和游戏机；它还能为你带来新闻、天气、体育等信息。不过，iPad\
    \ 不仅仅用于娱乐和游戏。在本章中，我们将介绍 Apple 的三款生产力强效应用：`Pages`（与 `Microsoft Word` 兼容）、`Keynote`（与\
    \ `Microsoft PowerPoint` 兼容）和 `Numbers`（与 `Microsoft Excel` 兼容）。\n\n如果你是一位 Mac\
    \ 用户，你可能已经熟悉作为 `iWork for Mac` 套件一部分的 `Pages`、`Keynote` 和 `Numbers`。在你的 iPad 上使用这三个应用，你可以创建内容——而不仅仅是消费内容。\n\
    \n![images](img/p469-01.jpg)\n\n每个应用都内置了出色的创意工具，并且都能生成专业的、兼容 `Microsoft Office`\
    \ 的文档，之后你可以通过电子邮件发送、上传到在线账户或在 iPad 上演示这些文档。\n\n## 文件传输选项\n\n一旦你开始在 iPad 上处理文件，你就会想知道如何传输你在\
    \ iPad 上创建的文件，或者如何将文件从电脑或其他地方传输到你的 iPad。在本章中，我们总结了一些文件传输选项（参见 表 19–1）。其中一些选项将在本书的其他地方详细描述，而另一些应用将在本章中进行介绍。\n\
    \n![images](img/t1901.jpg)\n\n当然，你始终可以通过电子邮件将文件传入或传出 iPad，但这通常只适用于数量有限或体积较小的文件。有时，文件太大而无法作为电子邮件附件发送。这时，你就需要诸如\
    \ `DiskAid` 或 `Dropbox` 之类的文件传输解决方案。\n\n接下来，我们将介绍两种文件传输选项：`DiskAid`，它通过 USB 数据线将\
    \ iPad 连接到电脑来工作；以及 `Dropbox`，它提供无线文件传输。\n"
- fmt: '# DiskAid File Transfer


    If you prefer to use a USB cable and really gain access to all the files on your
    iPad, including spreadsheets, word processing documents, presentation files, pictures,
    videos, and even things like FaceTime call history, voice memos, and notes—then
    `DiskAid` is a good choice.


    `DiskAid` works on both a PC and a Mac. At publishing time, you can download a
    free 14-day trial. This trial lets you give the software a test run before you
    pay the US $9.90 purchase price.


    You can obtain the software directly from the DiskAid web site at [`www.digidna.net/products/diskaid/download`](http://www.digidna.net/products/diskaid/download).


    After you run `DiskAid` on your computer and connect your iPad using the USB cable
    to your computer, you should see the main screen showing you the apps installed
    on your iPad (see [Figure 19–1](#Chapter19.html#fig_19_1)).


    To copy files, you need to do the following:


    1.  Select an iPad app in the left column of `DiskAid`. In this example, we chose
    `GoodReader`.

    2.  Open a window to browse files from your computer and drag and drop selected
    files onto the main window on the right side of `DiskAid`.

    3.  Next, disconnect your iPad and check the app (in this case, `GoodReader`).
    You should see the files you just dragged and dropped.


    **TIP:** To copy files from your iPad to your computer, follow the reverse procedure—drag
    and drop the file from your iPad to your computer folder. You can also delete
    files from your iPad by highlighting them in `DiskAid` and pressing the `Delete`
    key on your computer keyboard.


    ![images](images/1901.jpg)


    **Figure 19–1.** *Copying files using `DiskAid`*


    # Dropbox File Transfer


    `Dropbox` is different from `DiskAid` in a few ways. First, it is wireless; no
    USB cable connection to your computer is required. Second, `Dropbox` allows you
    to sync files between, not just your iPad and computer, but to multiple computers
    (e.g., Windows, Mac, and Linux) and the Dropbox web site. Third, you need to install
    an app on your iPad and your computer. The nice thing is that you can store and
    transfer up to 2 GB (gigabytes) of files for free. If you want to store up to
    50 GB, then the price is US $9.99/month or US $99.00/year. Larger plans are available.


    **TIP:** With `Dropbox`, you can also secure your files with pin codes to further
    protect them. This means you could securely store and access personal information,
    tax information, and personal photos on your mobile device.


    Follow these steps to use `Dropbox` on your iPad:


    1.  Sign up for your free account and download the computer (PC or Mac) app from
    [`www.dropbox.com`](http://www.dropbox.com).

    2.  Next, go to the App Store on your iPad and locate and download the free `Dropbox`
    app.

    3.  Log into `Dropbox` on your iPad using the same username and password you created
    when you first set up your account.

    4.  Any files or folders you drag into the `Dropbox` folder on your computer will
    be wirelessly synchronized to the `Dropbox` app on your iPad (see [Figure 19–2](#Chapter19.html#fig_19_2)).


    ![images](images/1902.jpg)


    **Figure 19–2.** *Copying files using `Dropbox`*


    Files placed in the `Dropbox` app on your iPad will also appear in the Dropbox
    folder on your computer, as well as on the [`www.dropbox.com`](http://www.dropbox.com)
    web site. In other words, important files are backed up automatically at [`www.dropbox.com`](http://www.dropbox.com).


    You can even share specific folders on your Dropbox account with others, such
    as colleagues, friends, or family members. This is a great way to share files
    both small and large since you don''t have to worry about the size limitations
    sometimes encountered when sending email attachments.


    Now that you know the basics of how to transfer small and large files to and from
    your iPad, you''re ready to dig into some good productivity apps.


    # Productivity Apps


    As we mentioned previously, using `Pages` as your word processor, `Numbers` as
    your spreadsheet, and `Keynote` for presentations can really boost your mobile
    productivity with your iPad.


    ## Downloading Pages, Keynote, and Numbers


    `Pages`, `Keynote`, and `Numbers` are all available to be purchased and downloaded
    from the App Store. At publishing time, each app costs US $9.99.


    It is probably easiest to search for `Pages` by typing it into the `Search` window
    in the upper-right corner.


    Next, from the `Pages` download page, get to `Keynote` and `Numbers` by looking
    in the `More iPad Apps by Apple` section in the lower-left corner.


    ![images](images/p474-01.jpg)


    # Using Pages


    `Pages` is Apple''s word processing program. If you use a Mac, you will be familiar
    with the layout and functionality of the Pages program. While not meant to be
    a full substitute for a desktop word processor, Pages is quite capable and can
    allow you to edit and create very professional-looking documents.


    With `Pages` you can do much more than create documents; you can also then send
    them via email or upload them to an online account for easy viewing, sharing,
    and printing.


    ## Using Pages for the First Time


    When you first start `Pages`, you will see that there is one sample document entitled
    “Getting Started.” This is a great tutorial for many of the features found within
    `Pages`. We recommend going through this document and reading about the various
    styles, objects, and toolbars associated with `Pages`.


    ![images](images/p475-01.jpg)


    To start a new document, touch the `New Document` button at the bottom. When you
    touch the `New Document` button, you have the option of either starting a new
    document from scratch or duplicating the document that is showing.


    ![images](images/p475-02.jpg)


    **TIP:** If you want to use an existing document as a template, it is useful to
    choose `Duplicate Document`. Otherwise, choose `New Document` to create a new
    document.


    ## Choosing a New Document Template


    When you choose `New Document`, you have 16 available templates from which to
    choose. The templates are general, like `Poster`, `Proposal`, or `Term Paper`.
    You can choose to start with a template (which might make the formatting easier)
    or simply choose `Blank` (at the top left) to start with a blank page (see [Figure
    19–3](#Chapter19.html#fig_19_3)).


    Everything within the template can be changed or adjusted, so don''t be afraid
    to experiment.


    **NOTE:** Templates are very helpful for documents that require a certain format
    and presentation, such as resumes and letters.


    Once you make your selection, you are ready to start writing and editing to turn
    the template into the perfect document.


    ![images](images/p476-01.jpg)


    ![images](images/1903.jpg)


    **Figure 19–3.** *The page layout in `Pages`*


    ## Working With Tools and Styles


    Like most word processors, `Pages` gives you many options for adding various styles
    to the document. The built-in toolbars give you easy access to most of the features
    for customizing your document.


    There are four specific buttons on the toolbar in the upper-right corner that
    will prove to be quite useful in your writing: `Information`, `Picture/Object`,
    `Tools`, and `Full Screen`.


    ![images](images/p477-01.jpg)'
