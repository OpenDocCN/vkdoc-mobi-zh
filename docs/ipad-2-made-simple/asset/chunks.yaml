  trans: "\n### iTunes 与您的 iPad\n\n要激活您的 iPad 并加载内容（例如音乐、图片、视频等），您需要将设备连接到电脑上的 `iTunes`\
    \ 应用。备份（以及日后恢复）您的 iPad 也需要使用 `iTunes` 应用。\n\n如果您没有 `iTunes` 应用，或者不确定是否拥有最新版本，则需要进行升级。首次将\
    \ iPad 连接到 `iTunes` 服务时，将会激活您的 iPad，或将其与您的 Apple ID 关联。完成此操作后，您就可以直接在 iPad 上或电脑的\
    \ `iTunes` 中购买歌曲、影片、图书以及几乎任何其他内容。\n\n#### 在电脑上安装或更新 iTunes\n\n如果您的 iPad 屏幕上显示一个指向\
    \ `iTunes` 的 USB 插头，那么您需要将 iPad 连接到电脑上的 `iTunes` 应用（请参见图 1-3）。\n\n![images](img/0103.jpg)\n\
    \n**图 1-3.** *显示需要连接至 iTunes 才能开始的 iPad 屏幕*\n\n通常，您需要确保安装了最新版本的 `iTunes` 程序。\n\
    \n如果需要更新程序，请启动 `iTunes`。如果您是 Windows 用户，请选择 `帮助`，然后选择 `检查更新`。如果您是 Mac 用户，请选择 `iTunes`，然后选择\
    \ `检查更新`。按照提供的说明来更新 `iTunes`。\n\n需要详细说明？请参阅第 29 章：“您的 iTunes 用户指南”中的“iTunes 更新”部分。\n\
    \n如果您的电脑上没有安装 `iTunes` 程序，请打开网络浏览器，访问 [`www.itunes.com/download`](http://www.itunes.com/download)。从提供的链接下载该软件。\n\
    \n需要详细说明？同样，请参阅第 29 章：“您的 iTunes 用户指南”中的“如何下载并安装 iTunes”部分。\n\n#### 将 iPad 连接到\
    \ iTunes\n\n一旦您安装或升级到最新版本的 `iTunes` 程序，就可以将您的 iPad 连接到电脑上的 `iTunes` 服务了。\n\n**提示：**\
    \ 使用 `iTunes` 应用的“家庭共享”功能，您可以在 iPad 上以及家庭网络中已授权的电脑之间，共享来自同一 iTunes 帐户的已购内容（音乐、应用、视频、iBooks\
    \ 等）。此外，您可以将任何相同的内容同步到同一 iTunes 帐户下的任何 iPod/iPhone/iPad。要了解更多关于使用 `iTunes` 同步内容的信息，请参阅第\
    \ 3 章：“将 iPad 与 iTunes 同步”，并了解关于家庭共享的信息，请参阅第 29 章：“您的 iTunes 用户指南”。\n\n通过将 iPad\
    \ 连接到 `iTunes`，您可以将您的 iPad（通过设备序列号）注册或关联到特定的 iTunes 帐户（Apple ID）。\n\n**提示：** 这样做的好处是，如果您已为\
    \ iPhone 或 iPod touch 购买了应用和其他内容（例如音乐、视频等），那么您可以在 iPad 上运行其中的大部分应用——尽管屏幕尺寸会稍小一些。请注意，您可以在多个\
    \ iTunes 帐户上授权一台 iPad；但是，您同步到该 iPad 的所有内容都必须来自同一台电脑。因此，您需要选择您的“主”电脑来与 iPad 同步。\n\
    \n如果您还没有 iTunes 帐户（Apple ID），请不要担心——您可以在注册 iPad 时创建一个。\n\n#### 启动 iTunes\n\n如果\
    \ `iTunes` 应用尚未运行，请双击桌面上的 `iTunes` 图标：\n\n*   Mac 用户：点击 `Finder` 图标，选择 `前往` 菜单，然后选择\
    \ `应用程序` 以查找 `iTunes`（快捷键：`Shift`+`Command`+`A` 用于打开 `应用程序`）。\n*   Windows 用户：点击左下角的\
    \ `开始` 菜单或 `Windows` 徽标，选择 `所有程序`，然后选择 `iTunes`。\n\n#### 首次注册您的 iPad\n\n一旦 `iTunes`\
    \ 应用已安装或更新并在电脑上运行，您就可以准备首次连接您的 iPad 并进行注册或激活了。完成这些操作后，您就可以开始使用您的新 iPad 了。\n\n\
    **注意：** 如果您的 iPad 已经注册，您可以跳过此注册部分，直接跳至本章后面的“设置您的 iPad”部分。如果您在屏幕底部看到 `滑动来解锁`，或者在按下设备底部的\
    \ `主屏幕` 按钮时看到图标屏幕，则表明您的 iPad 已经注册。\n\n请按照以下步骤连接您的 iPad 并进行注册或激活：\n\n1.  将 iPad\
    \ 附带的白色 USB 连接线插入电脑上的可用 USB 端口。\n\n    **注意：** 首次将 iPad 连接到电脑时，Windows 电脑应会自动安装必要的驱动程序。如果您使用的是\
    \ Mac 电脑，根据您安装的操作系统版本，Apple 可能会建议您在开始使用 iPad 之前，先将操作系统升级到最新版本。\n\n2.  点击 iTunes\
    \ 左侧栏中 `设备` 下的 `iPad`，以开始操作。\n3.  如果您尚未注册 iPad，您应该会看到一个 `欢迎` 屏幕（请参见图 1-4）。点击 `继续`\
    \ 以开始注册您的 iPad。\n\n    ![images](img/0104.jpg)\n\n    **图 1-4.** *`iTunes` 中的\
    \ iPad `欢迎` 屏幕*\n\n4.  接下来您会看到 `iPad 软件许可协议`。\n5.  如果您同意这些法律条款，请勾选标有 `我已阅读并同意\
    \ iPad 软件许可协议` 的方框，并点击 `继续` 按钮。\n6.  接下来，您将有机会使用您的 Apple ID 登录，或创建一个新的 Apple ID。输入您的\
    \ Apple ID 和密码，或者点击 `我没有 Apple ID` 并选择您的国家/地区（请参见图 1-5）。\n\n    ![images](img/0105.jpg)\n\
    \n    **图 1-5.** *`iTunes` 中的 `Apple ID` 屏幕*\n\n7.  点击 `继续` 按钮。\n    *   如果您尝试输入\
    \ Apple ID 和密码后收到一条错误信息，提示“需要额外的安全信息”，请阅读第 29 章：“您的 iTunes 用户指南”中的“故障排除：修复 Apple\
    \ ID 安全错误”部分。\n8.  现在您应该会看到 `注册您的 iPad` 屏幕（请参见图 1-6）。\n\n    ![images](img/0106.jpg)\n\
    \n    **图 1-6.** *iTunes 中的 `注册您的 iPad` 屏幕*\n\n9.  输入或核验您的信息是否正确，然后点击 `提交` 以完成注册。\n"
- fmt: "#### Setting up the Find My iPad Service\n\nAfter you register your iPad,\
    \ you may see a screen similar asking if you would like to set up the free Find\
    \ My iPad service (see [Figure 1-7](#Chapter01.html#fig_1_7)). Click the **Set\
    \ up Find My iPad** button and follow the on-screen instructions to get started.\
    \ This service enables you to locate your iPad (whenever it is powered on and\
    \ connected to the network) using the MobileMe Apple website ([`http://me.com`](http://me.com)).\n\
    \n**TIP:** Please check out the MobileMe service detailed description in [Chapter\
    \ 4](#Chapter04.html#ch4): \"Other Sync Methods\" to learn all about the various\
    \ features of the service.\n\n![images](images/0107.jpg)\n\n**Figure 1-7.** *Set\
    \ up the Free Find My iPad service*\n\nIf you do not see this screen, follow these\
    \ steps to get set up on your iPad:\n\n**TIP:** You can also watch a video and\
    \ learn more on Apple's site here: [`www.apple.com/ipad/find-my-ipad-setup/`](http://www.apple.com/ipad/find-my-ipad-setup/).\n\
    \n1. Your iPad may be busy syncing with **iTunes** at this point. You'll have\
    \ to wait until the sync is completed, and you see either the **Home** or **Slide\
    \ to Unlock** screen; at that point, you can get started.\n2. Tap the **Setup**\
    \ app.\n3. Tap **Mail, Contacts, Calendars**.\n4. Tap **Add Account** and select\
    \ **Mobile Me**.\n5. Enter your **Apple ID** and **Password** and tap **Next**\
    \ to login. You can click a link to create a free Apple ID if you don't have one.\
    \ You may need to agree to the **Terms of Service** if this is the first time\
    \ you are using your **Apple ID** with the Mobile Me service.\n6. You should then\
    \ receive an email message at your main email account connected to your Apple\
    \ ID. You need to click the link in the email message you receive to **Verify**\
    \ your account.\n7. After a successful login, you should see a little pop-up window\
    \ asking **Allow MobileMe to Use the Location of your iPad?** As you probably\
    \ guessed, you definitely need to answer **OK** to have this service work correctly.\n\
    8. Make sure to set the **Find My iPad** to **ON**, as shown here. Then tap **Save**\
    \ to complete the setup process.\n\n![Image](images/p54-01.jpg)\n\n#### Disable\
    \ or Adjust Find My iPad\n\nYou can also disable the service or change the MobileMe\
    \ account used by returning to MobileMe's **Accounts** screen, as follows:\n\n\
    1. Tap the **Setup** app.\n2. Tap **Mail, Contacts, Calendars**.\n3. Tap the **Mobile\
    \ Me** account under the **Accounts** screen in the right column.\n\n   ![Image](images/p54-02.jpg)\n\
    \n4. From this screen, you may:\n   - Tap **Account** to adjust the account used.\n\
    \   - Set **Find My iPad** to **ON** or **OFF**.\n   - **Delete** your MobileMe\
    \ account from this iPad.\n5. Tap **Done** to save your changes.\n\n![Image](images/p54-03.jpg)\n\
    \n#### Using Find My iPad from the Me.com Website\n\nYou can use the Find My iPad\
    \ service from almost any web browser, whether it is on your computer or another\
    \ mobile device. Follow these steps to use the service:\n\n1. Open up a web browser\
    \ and go to [`www.me.com`](http://www.me.com).\n2. Log in with your same Apple\
    \ ID and password.\n\n   ![Image](images/p55-01.jpg)\n\n3. You should now see\
    \ the **Find My iPad** (or iPhone) screen, which immediately shows the last known\
    \ location of your device. Notice that, if you have multiple devices, you can\
    \ select a different device in the left column to locate it.\n\n   ![Image](images/p55-02.jpg)\n\
    \n   **NOTE:** A **Clock** icon next to the name of the device on the map ![Image](images/p55-03.jpg)\
    \ indicates that it has been a little while since the last update. If your device\
    \ has been powered off, then the last known location will be the location mapped\
    \ when it was turned off.\n\n4. Click the name of the device to see more options.\
    \ You can do the following:\n\n   ![Image](images/p56-01.jpg)\n\n   ![Image](images/p56-02.jpg)\n\
    \n   - Click **Lock** to remotely lock your iPad. This protects your private information\
    \ by adding a four-digit passcode.\n   - Click **Wipe** to remotely erase all\
    \ your private information. Remember that you will have everything saved on your\
    \ computer from the point of your last backup on iTunes, which is usually the\
    \ last time you connected your iPad to iTunes on your computer. Check the box\
    \ at the bottom and click **Erase All Data** to complete the process.\n\n    \
    \ ![Image](images/p57-01.jpg)\n\n   - Click **Display Message** or **Play Sound**\
    \ to send a message to be displayed on your iPad or to play a sound for 2 minutes\
    \ to help you locate your device. The sound is like the sonar sound on a ship,\
    \ so it's pretty distinctive!\n\n     If you check this box, the message to the\
    \ right will be displayed on your iPad and a sound will be played within a few\
    \ seconds—a pretty nice feature!\n\n     ![Image](images/p57-02.jpg)\n\n     ![Image](images/p57-03.jpg)\n\
    \n#### Using Find My iPad from Another iOS Mobile Device\n\nYou can also access\
    \ the Find My iPad service using a free app (called **Find My iPhone**) you download\
    \ from the App Store. Follow these steps to use the app:\n\n| **NOTE:** At the\
    \ time of publishing, the app was called **Find My iPhone**, its original name.\
    \ So, if that is the only app you find in the App Store, go ahead and download\
    \ it for your iPad. | ![Image](images/p58-01.jpg) |\n\n1. Tap the **Find iPhone**\
    \ app and log in using your **Apple ID** and **Password**.\n2. Immediately you\
    \ should be taken to the **Map** view showing your iPad.\n3. Just as with the\
    \ web-based version described previously, you can tap the name of the device to\
    \ **Display a message** / **play a sound** on, remotely **Wipe** (erase), or remotely\
    \ **Lock** (with a four-digit passcode) the device.\n\n   **NOTE:** None of these\
    \ options (i.e., **Display**, **Wipe**, or **Lock**) will work if you are using\
    \ your iPad to view itself.\n\n4. As on the [`me.com`](http://www.me.com) website,\
    \ if you have more than one Apple device running iOS 4.2 or higher (e.g. iPhone\
    \ or iPod touch), you can view these devices right from the app on your iPad.\
    \ Simply tap the **Devices** button in the upper-right corner to see all your\
    \ devices.\n\n![Image](images/p58-02.jpg)\n\n#### Apple's MobileMe Sync Service\n\
    \nAfter registering your iPad for the first time, you may see a screen advertising\
    \ the MobileMe wireless sync service from Apple. To keep setting up your iPad,\
    \ click the **No Thanks** button to continue to the next screen.\n\n**What is\
    \ MobileMe?**\n\nAs you saw in the earlier \"Find My iPad\" section, MobileMe\
    \ provides the iPad location service for free. However, MobileMe does much more\
    \ than that; it also provides a way to keep your email, contacts, calendar, and\
    \ web bookmarks shared across all your computers and mobile devices. At publishing\
    \ time, photo-sharing is limited to Mac computers with MobileMe **iPhoto** folders.\
    \ MobileMe is free for a limited time (currently 60 days), and then it costs US\
    \ $99.00 for a single user or US $149.00 for a family plan. See our \"MobileMe\
    \ Tour\" section in [Chapter 4](#Chapter04.html#ch4): \"Other Sync Methods.\""
  raw: "#### Setting up the Find My iPad Service\n\nAfter you register your iPad,\
    \ you may see a screen similar asking if you would like to set up the free Find\
    \ My iPad service (see[Figure 1-7](#Chapter01.html#fig_1_7)). Click the **Set\
    \ up Find My iPad** button and follow the on-screen instructions to get started.\
    \ This service enables you to locate your iPad (whenever it is powered on and\
    \ connected to the network) using the MobileMe Apple website ([`http://me.com`](http://me.com)).\n\
    \n**TIP:** Please check out the MobileMe service detailed description in [Chapter\
    \ 4](#Chapter04.html#ch4): “Other Sync Methods” to learn all about the various\
    \ features of the service.\n\n![images](images/0107.jpg)\n\n**Figure 1-7.** *Set\
    \ up the Free Find My iPad service*\n\nIf you do not see this screen, follow these\
    \ steps to get set up on your iPad:\n\n**TIP:** You can also watch a video and\
    \ learn more on Apple's site here: [`www.apple.com/ipad/find-my-ipad-setup/`](http://www.apple.com/ipad/find-my-ipad-setup/).\n\
    \n1.  Your iPad may be busy syncing with **iTunes** at this point. You'll have\
    \ to wait until the sync is completed, and you see either the **Home** or **Slide\
    \ to Unlock** screen; at that point, you can get started.\n2.  Tap the **Setup**\
    \ app.\n3.  Tap **Mail, Contacts, Calendars**.\n4.  Tap **Add Account** and select\
    \ **Mobile Me**.\n5.  Enter your **Apple ID** and **Password** and tap **Next**\
    \ to login. You can click a link to create a free Apple ID if you don't have one.\
    \ You may need to agree to the **Terms of Service** if this is the first time\
    \ you are using your **Apple ID** with the Mobile Me service.\n6.  You should\
    \ then receive an email message at your main email account connected to your Apple\
    \ ID. You need to click the link in the email message you receive to **Verify**\
    \ your account.\n7.  After a successful login, you should see a little pop-up\
    \ window asking **Allow MobileMe to Use the Location of your iPad?** As you probably\
    \ guessed, you definitely need to answer **OK** to have this service work correctly.\n\
    8.  Make sure to set the **Find My iPad** to **ON**, as shown here. Then tap **Save**\
    \ to complete the setup process.\n\n![Image](images/p54-01.jpg)\n\n#### Disable\
    \ or Adjust Find My iPad\n\nYou can also disable the service or change the MobileMe\
    \ account used by returning to MobileMe's **Accounts** screen, as follows:\n\n\
    1.  Tap the **Setup** app.\n2.  Tap **Mail, Contacts, Calendars**.\n3.  Tap the\
    \ **Mobile Me** account under the **Accounts** screen in the right column.\n\n\
    \    ![Image](images/p54-02.jpg)\n\n4.  From this screen, you may:\n    *   Tap\
    \ **Account** to adjust the account used.\n    *   Set **Find My iPad** to **ON**\
    \ or **OFF**.\n    *   **Delete** your MobileMe account from this iPad.\n5.  Tap\
    \ **Done** to save your changes.\n\n![Image](images/p54-03.jpg)\n\n#### Using\
    \ Find My iPad from the Me.com Website\n\nYou can use the Find My iPad service\
    \ from almost any web browser, whether it is on your computer or another mobile\
    \ device. Follow these steps to use the service:\n\n1.  Open up a web browser\
    \ and go to [`www.me.com`](http://www.me.com).\n2.  Log in with your same Apple\
    \ ID and password.\n\n    ![Image](images/p55-01.jpg)\n\n3.  You should now see\
    \ the **Find My iPad** (or iPhone) screen, which immediately shows the last known\
    \ location of your device. Notice that, if you have multiple devices, you can\
    \ select a different device in the left column to locate it.\n\n    ![Image](images/p55-02.jpg)\n\
    \n    **NOTE:** A **Clock** icon next to the name of the device on the map ![Image](images/p55-03.jpg)\
    \ indicates that it has been a little while since the last update. If your device\
    \ has been powered off, then the last known location will be the location mapped\
    \ when it was turned off.\n\n4.  Click the name of the device to see more options.\
    \ You can do the following:\n\n    ![Image](images/p56-01.jpg)\n\n    ![Image](images/p56-02.jpg)\n\
    \n    *   Click **Lock** to remotely lock your iPad. This protects your private\
    \ information by adding a four-digit passcode.\n    *   Click **Wipe** to remotely\
    \ erase all your private information. Remember that you will have everything saved\
    \ on your computer from the point of your last backup on iTunes, which is usually\
    \ the last time you connected your iPad to iTunes on your computer. Check the\
    \ box at the bottom and click **Erase All Data** to complete the process.\n\n\
    \        ![Image](images/p57-01.jpg)\n\n    *   Click **Display Message** or **Play\
    \ Sound** to send a message to be displayed on your iPad or to play a sound for\
    \ 2 minutes to help you locate your device. The sound is like the sonar sound\
    \ on a ship, so it's pretty distinctive!\n\n        If you check this box, the\
    \ message to the right will be displayed on your iPad and a sound will be played\
    \ within a few seconds—a pretty nice feature!\n\n        ![Image](images/p57-02.jpg)\n\
    \n        ![Image](images/p57-03.jpg)\n\n#### Using Find My iPad from Another\
    \ iOS Mobile Device\n\nYou can also access the Find My iPad service using a free\
    \ app (called **Find My iPhone**) you download from the App Store. Follow these\
    \ steps to use the app:\n\n| **NOTE:** At the time of publishing, the app was\
    \ called **Find My iPhone**, its original name. So, if that is the only app you\
    \ find in the App Store, go ahead and download it for your iPad. | ![Image](images/p58-01.jpg)\
    \ |\n\n1.  Tap the **Find iPhone** app and log in using your **Apple ID** and\
    \ **Password**.\n2.  Immediately you should be taken to the **Map** view showing\
    \ your iPad.\n3.  Just as with the web-based version described previously, you\
    \ can tap the name of the device to **Display a message**/**play a sound** on,\
    \ remotely **Wipe** (erase), or remotely **Lock** (with a four-digit passcode)\
    \ the device.\n\n    **NOTE:** None of these options (i.e., **Display**, **Wipe**,\
    \ or **Lock**) will work if you are using your iPad to view itself.\n\n4.  As\
    \ on the [`me.com`](http://www.me.com) website, if you have more than one Apple\
    \ device running iOS 4.2 or higher (e.g. iPhone or iPod touch), you can view these\
    \ devices right from the app on your iPad. Simply tap the **Devices** button in\
    \ the upper-right corner to see all your devices.\n\n![Image](images/p58-02.jpg)\n\
    \n#### Apple's MobileMe Sync Service\n\nAfter registering your iPad for the first\
    \ time, you may see a screen advertising the MobileMe wireless sync service from\
    \ Apple. To keep setting up your iPad, click the **No Thanks** button to continue\
    \ to the next screen.\n\n**What is MobileMe?**\n\nAs you saw in the earlier “Find\
    \ My iPad” section, MobileMe provides the iPad location service for free. However,\
    \ MobileMe does much more than that; it also provides a way to keep your email,\
    \ contacts, calendar, and web bookmarks shared across all your computers and mobile\
    \ devices. At publishing time, photo-sharing is limited to Mac computers with\
    \ MobileMe **iPhoto** folders. MobileMe is free for a limited time (currently\
    \ 60 days), and then it costs US $99.00 for a single user or US $149.00 for a\
    \ family plan. See our “MobileMe Tour” section in [Chapter 4](#Chapter04.html#ch4):\
    \ “Other Sync Methods.”"
  trans: "\n#### 设置“查找我的 iPad”服务\n\n注册 iPad 后，您可能会看到一个类似的屏幕，询问您是否要设置免费的“查找我的 iPad”服务（参见图\
    \ 1-7）。点击**设置“查找我的 iPad”**按钮，然后按照屏幕上的说明开始操作。这项服务让您能够通过 MobileMe 苹果网站 ([`http://me.com`](http://me.com))\
    \ 定位您的 iPad（只要它处于开机状态并连接到网络）。\n\n**提示：** 请查阅第 4 章：“其他同步方法”中的 MobileMe 服务详细说明，以了解该服务的各项功能。\n\
    \n![images](img/0107.jpg)\n\n**图 1-7.** *设置免费的“查找我的 iPad”服务*\n\n如果您没有看到此屏幕，请按照以下步骤在您的\
    \ iPad 上进行设置：\n\n**提示：** 您还可以在苹果官网观看视频并了解更多信息：[`www.apple.com/ipad/find-my-ipad-setup/`](http://www.apple.com/ipad/find-my-ipad-setup/)。\n\
    \n1. 此时，您的 iPad 可能正忙于与 **iTunes** 同步。您需要等待同步完成，直到看到**主屏幕**或**滑动以解锁**屏幕；这时，您就可以开始操作了。\n\
    2. 轻点**设置**应用。\n3. 轻点**邮件、通讯录、日历**。\n4. 轻点**添加帐户**，然后选择 **Mobile Me**。\n5. 输入您的\
    \ **Apple ID** 和**密码**，然后轻点**下一步**进行登录。如果您没有 Apple ID，可以点击链接免费创建一个。如果这是您首次将 **Apple\
    \ ID** 用于 MobileMe 服务，您可能需要同意**服务条款**。\n6. 随后，您应会收到一封发送至您与 Apple ID 关联的主邮箱的电子邮件。您需要点击收到的邮件中的链接以**验证**您的帐户。\n\
    7. 成功登录后，您会看到一个小弹出窗口，询问**是否允许 MobileMe 使用您 iPad 的位置？** 您可能已经猜到，要使此服务正常工作，您必须回答**好**。\n\
    8. 确保将**查找我的 iPad** 设置为**开启**，如图所示。然后轻点**存储**以完成设置过程。\n\n![Image](img/p54-01.jpg)\n\
    \n#### 停用或调整“查找我的 iPad”功能\n\n您也可以停用此服务或更改所使用的 MobileMe 帐户，方法是返回 MobileMe 的**帐户**屏幕，具体操作如下：\n\
    \n1. 轻点**设置**应用。\n2. 轻点**邮件、通讯录、日历**。\n3. 在右侧栏的**帐户**屏幕下，轻点 **Mobile Me** 帐户。\n\
    \n   ![Image](img/p54-02.jpg)\n\n4. 在此屏幕上，您可以：\n   - 轻点**帐户**以调整使用的帐户。\n   - 将**查找我的\
    \ iPad** 设置为**开启**或**关闭**。\n   - **删除**此 iPad 上的 MobileMe 帐户。\n5. 轻点**完成**以保存更改。\n\
    \n![Image](img/p54-03.jpg)\n\n#### 通过 Me.com 网站使用“查找我的 iPad”\n\n您几乎可以通过任何网页浏览器使用“查找我的\
    \ iPad”服务，无论是在电脑上还是其他移动设备上。请按照以下步骤使用该服务：\n\n1. 打开网页浏览器，访问 [`www.me.com`](http://www.me.com)。\n\
    2. 使用相同的 Apple ID 和密码登录。\n\n   ![Image](img/p55-01.jpg)\n\n3. 您现在应该会看到**查找我的 iPad**（或\
    \ iPhone）屏幕，它会立即显示您设备的最后已知位置。请注意，如果您有多台设备，可在左侧栏中选择另一台设备进行定位。\n\n   ![Image](img/p55-02.jpg)\n\
    \n   **注意：** 地图上设备名称旁边的**时钟**图标 ![Image](img/p55-03.jpg) 表示距离上次更新已有一段时间。如果您的设备已关机，则最后已知位置将是其关机时在地图上标记的位置。\n\
    \n4. 点击设备名称可查看更多选项。您可以执行以下操作：\n\n   ![Image](img/p56-01.jpg)\n\n   ![Image](img/p56-02.jpg)\n\
    \n   - 点击**锁定**以远程锁定您的 iPad。这会通过添加四位数字密码来保护您的私人信息。\n   - 点击**抹掉**以远程清除您的所有私人信息。请记住，您电脑上会保留从上次备份到\
    \ iTunes 时的所有数据，通常这是您上次将 iPad 连接到电脑上 iTunes 的时间。勾选底部的复选框，然后点击**抹掉所有数据**以完成此过程。\n\
    \n     ![Image](img/p57-01.jpg)\n\n   - 点击**显示信息**或**播放声音**，以发送一条消息显示在您的 iPad\
    \ 上，或播放持续 2 分钟的声音以帮助您定位设备。这个声音类似于船上的声纳音，非常独特！\n\n     如果您勾选此框，右侧的消息将显示在您的 iPad\
    \ 上，并且几秒钟内会播放声音——这是一个非常不错的功能！\n\n     ![Image](img/p57-02.jpg)\n\n     ![Image](img/p57-03.jpg)\n\
    \n#### 通过其他 iOS 移动设备使用“查找我的 iPad”\n\n您也可以使用从 App Store 下载的免费应用（名为**“查找我的 iPhone”**）来访问“查找我的\
    \ iPad”服务。请按照以下步骤使用该应用：\n\n| **注意：** 在本书出版时，该应用的原名为 **“查找我的 iPhone”**。因此，如果您在\
    \ App Store 中只找到这个应用，请放心下载到您的 iPad 上使用。 | ![Image](img/p58-01.jpg) |\n\n1. 轻点**查找\
    \ iPhone** 应用，并使用您的 **Apple ID** 和**密码**登录。\n2. 系统会立即将您带到**地图**视图，并显示您的 iPad。\n\
    3. 与前面描述的网页版类似，您可以点击设备名称以**显示信息**/**播放声音**、远程**抹掉**（擦除）或远程**锁定**（使用四位数字密码）设备。\n\
    \n   **注意：** 如果您正在使用 iPad 查看自身位置，则这些选项（即**显示**、**抹掉**或**锁定**）均无效。\n\n4. 与在 [`me.com`](http://www.me.com)\
    \ 网站上一样，如果您有多个运行 iOS 4.2 或更高版本的苹果设备（例如 iPhone 或 iPod touch），您可以直接在 iPad 上的应用中查看这些设备。只需轻点右上角的**设备**按钮即可查看您所有的设备。\n\
    \n![Image](img/p58-02.jpg)\n\n#### 苹果的 MobileMe 同步服务\n\n第一次注册 iPad 后，您可能会看到一个宣传苹果\
    \ MobileMe 无线同步服务的屏幕。要继续设置您的 iPad，请点击**不了，谢谢**按钮以进入下一个屏幕。\n\n**什么是 MobileMe？**\n\
    \n正如您在之前的“查找我的 iPad”部分所见，MobileMe 免费提供 iPad 定位服务。然而，MobileMe 的功能远不止于此；它还提供了一种在您所有电脑和移动设备之间共享电子邮件、通讯录、日历和网页书签的方式。在本书出版时，照片共享仅限于安装了\
    \ MobileMe **iPhoto** 文件夹的 Mac 电脑。MobileMe 在有限时间内（目前为 60 天）免费使用，之后单人计划费用为 99.00\
    \ 美元，家庭计划费用为 149.00 美元。请参阅第 4 章：“其他同步方法”中的“MobileMe 导览”部分。\n"
- fmt: "# Set Up Your iPad\n\nThe first time you connect your iPad, you have the chance\
    \ to give it a name and select some other options (see [Figure 1-8](#Chapter01.html#fig_1_8)).\n\
    \nIf you instead see a screen that asks about restoring from a backup, then skip\
    \ to the “Set up or Restore from Backup” section later in this chapter.\n\n![images](images/0108.jpg)\n\
    \n**Figure 1-8.** Set up your iPad screen\n\n**NOTE:** If you are going to actively\
    \ use two iPads, then we recommend you set up your second iPad as a new device\
    \ and do not restore from a backup file. Otherwise, you might end up with two\
    \ iPads with the same device name and cause confusion.\n\n1. Give your iPad a\
    \ **Name**. Each time you plug in your iPad—to this or any other computer—your\
    \ iPad will show the name you choose here. In this case, we will call this one:\
    \ `Martin's iPad`.\n\n   **TIP: Setting up an iPad Quickly**\n\n   To get moving\
    \ quickly, uncheck all three boxes on the screen shown in [Figure 1-9](#Chapter01.html#fig_1_9)\
    \ and click **Done**. You can check or uncheck these boxes within the tabs you\
    \ find in the `iTunes` app later. We show you the details in [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync Your iPad with iTunes” and in [Chapter 29](#Chapter29.html#ch29): ”Your\
    \ iTunes User Guide.”\n\n2. Check the box next to **Automatically sync songs and\
    \ videos to my iPad** if you want all of your music and videos stored in your\
    \ computer's `iTunes` library on your new iPad.\n\n   **CAUTION:** Your iPad does\
    \ not have as much memory as your computer, so be careful when selecting automatically\
    \ sync if you have thousands of songs, photos, or many videos in your computer's\
    \ `iTunes` library.\n\n3. Check the box next to **Automatically add photos to\
    \ my iPad** if you want all your photos in specific folders on your computer synced\
    \ to your new iPad.\n\n4. Check the box next to **Automatically sync applications\
    \ to my iPad** if you would like applications you purchase on your iPad backed\
    \ up to your computer. This option allows you to update apps from the `iTunes`\
    \ app on your computer; it also enables you to manage and arrange your app icons\
    \ and **Home** screens using the `iTunes` app on your computer. We recommend you\
    \ check this box.\n\n5. Click **Done** to complete the **Set Up** screen.\n\n\
    ## Set up or Restore from Backup\n\nIf you have already synced a similar device\
    \ such as an iPhone or iPod touch to your iTunes, then you will probably see the\
    \ **Set Up Your iPad** screen with options to **Set Up as a new iPad** or restore\
    \ from a backup (see [Figure 1-9](#Chapter01.html#fig_1_9)).\n\n![images](images/0109.jpg)\n\
    \n**Figure 1-9.** Setting up or restoring an iPad\n\n1. Now you have several choices\
    \ depending on your particular situation:\n   1. If you are using an iPad for\
    \ the first time, then select **Set up as a new iPad**. ![Image](images/p61-01.jpg)\n\
    \   2. If you have previously synced your computer with another iPad and you want\
    \ to restore from that backup file, select **Restore from the backup of** and\
    \ then select the correct iPad backup file from the dropdown list.\n   3. If you\
    \ have backed up another iOS device besides an iPad (e.g., an iPhone or iPod touch),\
    \ we recommend you select **Set up as a new iPad**. ![Image](images/p61-02.jpg)\
    \ You can later sync your apps, pictures, songs, and more to your iPad from iTunes;\
    \ this approach is safer than using the backup file from a non-iPad device.\n\n\
    \   **CAUTION:** We have heard of people experiencing problems (lock-ups, lower\
    \ battery life, and so forth) when they restore a backup from a non-iPad (iPhone/iPod\
    \ touch) to the iPad. Also, selecting restore here assumes you have first made\
    \ a backup of your old device (iPhone/iPod touch) in order to restore the latest\
    \ information to your new iPad.\n\n2. Click the **Continue** button.\n\n**NOTE:**\
    \ If you want to keep your existing iPhone and/or iPod Touch and set up your new\
    \ iPad, then you should select **Setup a New iPad**.\n\n## Setup Complete: The\
    \ iPad Summary Screen\n\nOnce you confirm your choices and click **Done** (see\
    \ [Figure 1-8](#Chapter01.html#fig_1_8)) or click **Continue** from the **Set\
    \ up/Restore** screen (see [Figure 1-9](#Chapter01.html#fig_1_9)), you will be\
    \ taken to the main **Summary** screen ([Figure 1-10](#Chapter01.html#fig_1_10)).\n\
    \n![images](images/0110.jpg)\n\n**Figure 1-10.** The iPad **Summary** screen in\
    \ iTunes\n\n## Maintaining Your iPad\n\nNow that you have set up your iPad, you\
    \ will want to know how to safely clean the screen and then keep it protected\
    \ with various cases.\n\n### Cleaning Your iPad Screen\n\nAfter using your iPad\
    \ a little while, you will see that your fingers (and possibly other fingers besides\
    \ yours) have left smudges and oil on the formerly pristine screen. You will want\
    \ to know how to safely clean the screen. One way to keep the screen cleaner throughout\
    \ the day is to place a protective screen cover on the iPad, which may also have\
    \ the added benefit of cutting down on glare (discussed in the next section).\n\
    \nWe also recommend doing the following:\n\n1. Turn off your iPad by pressing\
    \ and holding the **Sleep/Power** key on the top edge, then use the **Slider**\
    \ bar to turn it off.\n2. Remove any cables, such as the USB Sync cable.\n3. Rub\
    \ the screen with a soft, dry, lint-free cloth (such as a cloth supplied to clean\
    \ eyeglasses or something similar).\n4. If the dry cloth does not work, then try\
    \ adding a tiny bit of water to dampen the cloth. If you use a damp cloth, try\
    \ not to get any water in the openings.\n\n**CAUTION:** Never use household cleaners,\
    \ abrasive cleaners such as `Soft Scrub`, ammonia-based cleaners such as `Windex`,\
    \ alcohol, aerosol sprays, or solvents.\n\n### Cases and Protective Covers for\
    \ Your iPad\n\nOnce you have your iPad in your hands, you will notice how beautifully\
    \ it is constructed. You will also notice that it can be fairly slippery and could\
    \ slip out of your hands or rock around a bit. It's also possible for the back\
    \ of the iPad to get scratched when you are typing on it.\n\nWe recommend buying\
    \ a protective case for your iPad. Average cases run about US $10-40 and fancy\
    \ leather cases can run US $100 or more. Spending a little to protect your iPad\
    \ that costs $500 or more makes good sense.\n\n### Where to Buy Your Covers\n\n\
    You can purchase your iPad protective cover at any of the following locations:\n\
    \n* Amazon.com ([`www.amazon.com`](http://www.amazon.com))\n* The Apple Accessory\
    \ Store ([`http://store.apple.com`](http://store.apple.com))\n* iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
    * TiPB – The iPhone + iPad Blog Store ([`http://store.tipb.com/`](http://store.tipb.com/))\n\
    \nYou could also do a web search for “iPad cases” or “iPad protective covers.”\n\
    \n**TIP**: You *may* be able to use a case designed for another type of computer\
    \ for your iPad; for example, a case for a netbook or small tablet computer might\
    \ work well. If you go this route to try and save some money, however, just make\
    \ sure your iPad fits securely in the case or cover."
  raw: "#### Set Up Your iPad\n\nThe first time you connect your iPad, you have the\
    \ chance to give it a name and select some other options (see [Figure 1-8](#Chapter01.html#fig_1_8)).\n\
    \nIf you instead see a screen that asks about **Restoring from a backup**, then\
    \ skip to the “Set up or Restore from Backup” section later in this chapter.\n\
    \n![images](images/0108.jpg)\n\n**Figure 1-8.** *Set up your iPad screen*\n\n\
    **NOTE:** If you are going to actively use two iPads, then we recommend you set\
    \ up your second iPad as a new device and do not restore from a backup file. Otherwise,\
    \ you might end up with two iPads with the same device name and cause confusion.\n\
    \n1.  Give your iPad a **Name**. Each time you plug in your iPad—to this or any\
    \ other computer—your iPad will show the name you choose here. In this case, we\
    \ will call this one: **Martin's iPad**.\n\n    **TIP:Setting up an iPad Quickly**\n\
    \n    To get moving quickly, uncheck all three boxes on the screen shown in [Figure\
    \ 1-9](#Chapter01.html#fig_1_9) and click **Done**. You can check or uncheck these\
    \ boxes within the tabs you find in the **iTunes** app later. We show you the\
    \ details in [Chapter 3](#Chapter03.html#ch3): “Sync Your iPadwith iTunes” and\
    \ in [Chapter 29](#Chapter29.html#ch29): ”Your iTunes User Guide.”\n\n2.  Check\
    \ the box next to **Automatically sync songs and videos to my iPad** if you want\
    \ all of your music and videosstored in your computer's iTunes library on your\
    \ new iPad.\n\n    **CAUTION:** Your iPad does not have as much memory as your\
    \ computer, so be careful when selecting automatically sync if you have thousands\
    \ of songs, photos, or many videos in your computer's iTunes library.\n\n3.  Check\
    \ the box next to **Automatically addphotos to my iPad** if you wantall your photos\
    \ in specific folders on your computer synced to your new iPad.\n4.  Check the\
    \ box next to **Automatically sync applications to my iPad** if you would like\
    \ applications you purchase on your iPad backed up to your computer. This option\
    \ allows you toupdate apps from the **iTunes** app on your computer; it also enables\
    \ you to manage and arrange your app icons and **Home** screens using the **iTunes**\
    \ app on your computer. We recommend you check this box.\n5.  Click **Done** to\
    \ complete the **Set Up** screen.\n\n#### Set up or Restore from Backup\n\nIf\
    \ you have already synced a similar device such as an iPhone or iPod touch to\
    \ your iTunes, then you will probably see the **Set Up Your iPad** screen with\
    \ options to **Set Up as a new iPad** orrestore from a backup (see [Figure 1-9](#Chapter01.html#fig_1_9)).\n\
    \n![images](images/0109.jpg)\n\n**Figure 1-9.** *Setting up or restoring an iPad*\n\
    \n1.  Now you have several choices depending on your particular situation:\n \
    \   1.  If you are using an iPad for the first time, then select **Set up as a\
    \ new iPad**. ![Image](images/p61-01.jpg)\n    2.  If you have previously synced\
    \ your computer with another iPad and you want to restore from that backup file,\
    \ select **Restore from the backup of** and then select the correct iPad backup\
    \ file from dropdown list.\n    3.  If you have backed up another iOS device besides\
    \ an iPad (e.g., an iPhone or iPod touch), we recommend you select **Set up as\
    \ a new iPad**. ![Image](images/p61-02.jpg) You can later sync your apps, pictures,\
    \ songs, and more to your iPad from iTunes; this approach is safer than using\
    \ the backup file from a non-iPad device.\n\n    **CAUTION:** We have heard of\
    \ people experiencing problems (lock-ups, lower battery life, and so forth) when\
    \ they restore a backup from a non-iPad (iPhone/iPod touch) to the iPad. Also,\
    \ selecting restore here assumes you have first made a backup of your old device\
    \ (iPhone/iPod touch) in order to restore the latest information to your new iPad.\n\
    \n2.  Click the **Continue** button.\n\n**NOTE:** If you want to keep your existing\
    \ iPhone and/or iPod Touch and set up your new iPad, then you should select **Setup\
    \ a New iPad**.\n\n#### Setup Complete: The iPad Summary Screen\n\nOnce you confirm\
    \ your choices and click **Done** (see [Figure 1-8](#Chapter01.html#fig_1_8))\
    \ or click **Continue** from the **Set up/Restore** screen (see [Figure 1-9](#Chapter01.html#fig_1_9)),\
    \ you will be taken to the main **Summary**screen([Figure 1-10](#Chapter01.html#fig_1_10)).\n\
    \n![images](images/0110.jpg)\n\n**Figure 1-10.** *The iPad **Summary** screen\
    \ in iTunes*\n\n### Maintaining Your iPad\n\nNow that you have set up your iPad,\
    \ you will want to know how to safely clean the screen and then keep it protected\
    \ with various cases.\n\n#### Cleaning Your iPad Screen\n\nAfter using your iPad\
    \ a little while, you will see that your fingers (and possibly other fingers besides\
    \ yours) have left smudges and oil on the formerly pristine screen. You will want\
    \ to know how to safely clean the screen. One way to keep the screen cleaner throughout\
    \ the day is to place a protective screen cover on the iPad, which may also have\
    \ the added benefit of cutting down on glare (discussed in the next section).\n\
    \nWe also recommend doing the following:\n\n1.  Turn off your iPad by pressing\
    \ and holding the **Sleep/Power** key on the top edge, then use the **Slider**\
    \ bar to turn it off.\n2.  Remove any cables, such as the USB Sync cable.\n3.\
    \  Rub the screen with a soft, dry, lint-free cloth (such as a cloth supplied\
    \ to clean eyeglasses or something similar).\n4.  If the dry cloth does not work,\
    \ then try adding a tiny bit of water to dampen the cloth. If you use a damp cloth,\
    \ try not to get any water in the openings.\n\n**CAUTION:** Never use household\
    \ cleaners, abrasive cleaners such as Soft Scrub, ammonia-based cleaners such\
    \ as Windex, alcohol, aerosol sprays, or solvents.\n\n#### Cases and Protective\
    \ Covers for Your iPad\n\nOnce you have your iPadin your hands, you will notice\
    \ how beautifully it is constructed. You will also notice that it can be fairly\
    \ slippery and could slip out of your hands or rock around a bit. It's also possible\
    \ for the back of the iPad to get scratched when you are typing on it.\n\nWe recommend\
    \ buying a protective case for your iPad. Average cases run about US $10-40 and\
    \ fancy leather cases can run US $100 or more. Spending a little to protect your\
    \ iPad that costs $500 or more makes good sense.\n\n#### Where to Buy Your Covers\n\
    \nYou can purchase your iPad protective cover at any of the following locations:\n\
    \n*   Amazon.com ([`www.amazon.com`](http://www.amazon.com))\n*   The Apple Accessory\
    \ Store ([`http://store.apple.com`](http://store.apple.com))\n*   iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
    *   TiPB – The iPhone + iPad Blog Store ([`http://store.tipb.com/`](http://store.tipb.com/))\n\
    \nYou could also do a web search for “iPadcases” or “iPad protective covers.”\n\
    \n**TIP**: You *may* be able to use a case designed for another type of computer\
    \ for your iPad; for example, a case for a netbook or small tablet computer might\
    \ work well. If you go this route to try and save some money, however, just make\
    \ sure your iPad fits securely in the case or cover."
  trans: "\n# 设置你的 iPad\n\n首次连接 iPad 时，你可以为其命名并选择其他一些选项（参见图 1-8）。\n\n如果你看到的屏幕询问是否要从备份恢复，请直接跳至本章稍后的“从备份设置或恢复”部分。\n\
    \n![图片](img/0108.jpg)\n\n**图 1-8.** 设置 iPad 屏幕\n\n**注意：** 如果你打算同时使用两台 iPad，我们建议你将第二台\
    \ iPad 设置为新设备，而不要从备份文件恢复。否则，两台 iPad 可能具有相同的设备名称，导致混淆。\n\n1. 为你的 iPad 起一个**名称**。每次你将\
    \ iPad 连接到这台电脑或其他任何电脑时，iPad 都会显示你在此处选择的名称。在此例中，我们将这台 iPad 命名为：`Martin's iPad`。\n\
    \n   **提示：快速设置 iPad**\n\n   要快速完成设置，请取消选中图 1-9 所示屏幕上的所有三个复选框，然后单击**完成**。你稍后可以在\
    \ `iTunes` 应用的标签页中勾选或取消勾选这些复选框。我们将在第 3 章：“将 iPad 与 iTunes 同步”和第 29 章：“你的 iTunes\
    \ 使用指南”中介绍具体细节。\n\n2. 如果你希望将电脑 `iTunes` 资料库中的所有音乐和视频同步到新 iPad 上，请勾选**自动将歌曲和视频同步到我的\
    \ iPad** 旁边的复选框。\n\n   **警告：** 你的 iPad 内存不如电脑大，因此如果你的电脑 `iTunes` 资料库中有成千上万首歌曲、照片或许多视频，在选择自动同步时请务必小心。\n\
    \n3. 如果你希望将电脑特定文件夹中的所有照片同步到新 iPad 上，请勾选**自动将照片添加到我的 iPad** 旁边的复选框。\n\n4. 如果你希望在\
    \ iPad 上购买的应用能备份到电脑上，请勾选**自动将应用同步到我的 iPad** 旁边的复选框。此选项允许你从电脑上的 `iTunes` 应用更新应用；同时，你也可以使用电脑上的\
    \ `iTunes` 应用来管理和排列应用图标及**主**屏幕。我们建议你勾选此复选框。\n\n5. 单击**完成**以完成**设置**屏幕。\n\n##\
    \ 从备份设置或恢复\n\n如果你已经将类似设备（如 iPhone 或 iPod touch）与 iTunes 同步过，那么你很可能会看到**设置你的 iPad**\
    \ 屏幕，其中包含**设置为新 iPad** 或从备份恢复的选项（参见图 1-9）。\n\n![图片](img/0109.jpg)\n\n**图 1-9.**\
    \ 设置或恢复 iPad\n\n1. 现在，根据你的具体情况，有几种选择：\n   1. 如果你是首次使用 iPad，请选择**设置为新 iPad**。![图片](img/p61-01.jpg)\n\
    \   2. 如果你之前已将电脑与另一台 iPad 同步过，并希望从该备份文件恢复，请选择**从以下备份恢复**，然后从下拉列表中选择正确的 iPad 备份文件。\n\
    \   3. 如果你已备份过除 iPad 以外的其他 iOS 设备（例如 iPhone 或 iPod touch），我们建议你选择**设置为新 iPad**。![图片](img/p61-02.jpg)\
    \ 稍后，你可以将应用、图片、歌曲等内容从 iTunes 同步到 iPad；这种方法比使用非 iPad 设备的备份文件更安全。\n\n   **警告：**\
    \ 我们听说有人在将非 iPad 设备（iPhone/iPod touch）的备份恢复到 iPad 时遇到了问题（如死机、电池续航缩短等）。此外，在此处选择恢复，前提是你已对旧设备（iPhone/iPod\
    \ touch）进行过备份，以便将最新信息恢复到新 iPad 上。\n\n2. 单击**继续**按钮。\n\n**注意：** 如果你想保留现有的 iPhone\
    \ 和/或 iPod Touch 并设置新的 iPad，则应选择**设置新 iPad**。\n\n## 设置完成：iPad 摘要屏幕\n\n确认你的选择并单击**完成**（参见图\
    \ 1-8），或从**设置/恢复**屏幕单击**继续**（参见图 1-9）后，你将进入主**摘要**屏幕（图 1-10）。\n\n![图片](img/0110.jpg)\n\
    \n**图 1-10.** iTunes 中的 iPad **摘要**屏幕\n\n## 维护你的 iPad\n\n设置好 iPad 后，你将需要了解如何安全地清洁屏幕，以及如何使用各种保护壳来保护它。\n\
    \n### 清洁你的 iPad 屏幕\n\n使用 iPad 一段时间后，你会发现手指（可能还有其他人的手指）在原本光洁的屏幕上留下了污迹和油渍。你需要知道如何安全地清洁屏幕。一种全天保持屏幕清洁的方法是在\
    \ iPad 上贴一张保护膜，这还可能额外减少反光（下一节将讨论）。\n\n我们还建议执行以下操作：\n\n1. 按住顶部边缘的**睡眠/电源**键关闭 iPad，然后使用**滑动**条将其关机。\n\
    2. 拔下所有线缆，例如 USB 同步线。\n3. 用柔软、干燥、不起毛的布（例如用于清洁眼镜的布或类似物品）擦拭屏幕。\n4. 如果干布不起作用，可尝试加少量水将布微微润湿。如果使用湿布，请注意不要让水进入任何开口。\n\
    \n**警告：** 切勿使用家用清洁剂、研磨性清洁剂（如 `Soft Scrub`）、含氨清洁剂（如 `Windex`）、酒精、喷雾剂或溶剂。\n\n###\
    \ iPad 的保护壳和保护套\n\n当你拿到 iPad 时，你会注意到其构造多么精美。你也会注意到它相当光滑，可能会从手中滑落或轻微晃动。当你使用 iPad\
    \ 打字时，其背面也可能被刮花。\n\n我们建议为你的 iPad 购买一个保护壳。普通保护壳的价格大约在 10-40 美元之间，高档皮革保护壳的价格可能达到\
    \ 100 美元或以上。花点小钱来保护你花费 500 美元或更多购买的 iPad，是非常明智的。\n\n### 购买保护壳的地点\n\n你可以在以下任何地点购买\
    \ iPad 保护壳：\n\n* Amazon.com ([`www.amazon.com`](http://www.amazon.com))\n* Apple\
    \ 配件商店 ([`http://store.apple.com`](http://store.apple.com))\n* iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
    * TiPB – The iPhone + iPad Blog Store ([`http://store.tipb.com/`](http://store.tipb.com/))\n\
    \n你也可以在网上搜索“iPad 保护壳”或“iPad 保护套”。\n\n**提示**：你*可能*可以将为其他类型电脑设计的保护套用于你的 iPad；例如，为上网本或小型平板电脑设计的保护套可能效果不错。不过，如果你选择这种节省开支的方式，请务必确保你的\
    \ iPad 能牢固地放入保护套或保护壳中。\n"
- fmt: '#### What Cases to Buy


    The following sections list some types of cases from which to choose and their
    price ranges.


    ##### Apple iPad Smart Cover (about $40 for plastic, $70 for leather)


    **What these do:** Magnets on the case instantly draw the cover to the iPad for
    a solid fit. You can fold the cover back to create a nice, low stand.


    **Pros:** Many colors, lightweight, and designed by Apple specifically for the
    iPad 2—need we say more?


    **Cons:** Will not protect the iPad as well from dings or dents (no protection
    on back of device).


    ![Image](images/p64-01.jpg)


    ##### Metal Case with Keyboard Built-in (about $100)


    **What these do:** Provide a solid case and a built-in Bluetooth keyboard. If
    you are typing a lot on your iPad, this is a nice compact option.


    **Pros:** Inexpensive compared to a separate case and keyboard. Easy to type with.


    **Cons:** Add bulk and weight to the device.


    ![Image](images/p65-01.jpg)


    ##### Rubber/Silicone Cases ($10-$30)


    **What these do:** Provide a cushioned grip and should absorb iPad bumps and bruises.


    **Pros:** Inexpensive, colorful, and comfortable to hold.


    **Cons:** Not as professional in appearance as a leather case.


    ##### Waterproof Cases ($10-$40)


    **What these do:** Provide waterproof protection for your iPad and allow you to
    safely use the iPad near water (in the rain, at the pool, at the beach, on a boat,
    and so forth).


    **Pros:** Provide good water protection.


    **Cons:** May make the touch screen harder to use; do not usually protect from
    drops or bumps.


    ##### Hard Plastic/Metal Case ($20-$100)


    **What these do:** Provide hard, solid protection against scratches, bumps, and
    short drops.


    **Pros:** Provide good protection.


    **Cons:** Add some bulk and weight.


    ##### Leather Book or Flip Cases ($40-$100+)


    **What these do:** Provide more of a luxury feel and protect the front and sides,
    as well as the back.


    **Pros:** Provide leather luxury feel and protect the front and the back.


    **Cons:** More expensive and add bulk and weight.


    ##### Screen and Back Cover Protectors ($5-$40)


    **What these do:** Protect the screen and back of the iPad from scratches.


    **Pros:** Help prolong life of your iPad and protect against scratches. Also,
    most such cases decrease screen glare.


    **Cons:** Some may increase glare or affect touch sensitivity of the screen.


    ### iPad Basics


    Now that you have your iPad charged with a clean screen, registered, and decked
    out with a new protective case, let''s take a look at some of the basics to help
    you get up and running.


    #### Powering On/Off and Sleep/Wake


    To power on your iPad, press and hold the `Power/Sleep` button on the top edge
    of the iPad for a few seconds (see [Figure 1-11](#Chapter01.html#fig_1_11)). Simply
    tapping this button quickly won''t power on the iPad if it is completely off—you
    really need to hold it until you see the iPad power on.


    When you are no longer using your iPad, you have two options: you can either put
    it into `Sleep` mode or turn it off completely.


    ![images](images/0111.jpg)


    **Figure 1-11.** *The `Power/Sleep` and `Home` buttons*


    The advantage of `Sleep` mode is that, when you want to use your iPad again, a
    quick tap of the `Power/Sleep` button or the `Home` button will bring your iPad
    back awake. According to Apple, the iPad has up to a month of stand-by power.


    If you want to maximize your battery or if you know you won''t be using your iPad
    for quite some time—say, when you go to sleep—you might want to turn it off completely.
    The way to do this is to press and hold the `Power/Sleep` button until you see
    the `Slide to Power Off` bar appear. Just slide the bar to the right and the iPad
    will power off.


    #### The Home Button


    | ![Image](images/p67-01.jpg) | The key you will use most often is your `Home`
    button (see [Figure 1-11](#Chapter01.html#fig_1_11)). This button will begin everything
    you do with your iPad. Press it once to wake up your iPad (assuming it is in `Sleep`
    mode.) |


    Pressing the `Home` button will take you out of any application program and bring
    you back to your `Home` screen.


    **TIP:** Double-tapping your `Home` button can be set to do different things,
    such as starting the iPad function, search, and more (see how to configure this
    button in the section that follows).


    #### Multitask by Double-Clicking the Home Button


    One of the nice features of the iPad (new in iOS 4.2 and higher) is multitasking.
    This feature enables you to have more than one app open at a time. To multitask,
    simply double-click the `Home` button, then slide your finger back and forth to
    select an app to jump to.


    **TIP:** You''ll find more details on multitasking in [Chapter 8](#Chapter08.html#ch8):
    “Multitasking and Voice Control.”


    #### Volume Keys


    Located on the upper-right side of the iPad are simple `Volume Up`/`Volume Down`
    keys that you will find very handy (see [Figure 1-12](#Chapter01.html#fig_1_12)).
    In many places, you can also control the volume of the song, video, `FaceTime`
    call, or podcast playing by sliding your finger on the screen volume control.


    ##### FaceTime Ringer Volume


    If you''re not playing a song, video, or other content, pressing these `Volume`
    keys will adjust the volume of your `FaceTime` app''s ringer.


    **Tip:** Hold down the `Volume Down` key for about two seconds to quickly mute
    the sound on the iPad.


    ![images](images/0112.jpg)


    **Figure 1-12.** *The `Mute` / `Screen Rotation Lock` switch, `Volume Up/Down`
    keys, and `Home` button*


    | **TIP:** You can also adjust the volume of music playback using the `Slider`
    control in the upper-left corner of your `ipod` app. | ![Image](images/p69-01.jpg)
    |


    #### Rotation Lock / Mute Switch


    Just above the `Volume` keys, you will find the `Mute` / `Screen Rotation Lock`
    switch (see [Figure 1-12](#Chapter01.html#fig_1_12)).


    This particular switch has had a varied life on the iPad. If you owned an original
    iPad, then you know that this switch started out as a `Screen Rotation Lock` switch.
    Then Apple changed it to be simply a `Mute` switch in iOS 4.2. With iOS 4.3 and
    later devices, you can now configure the function of this switch.


    To change the function of this switch, follow these steps:


    **5.** Tap `Settings`, then tap `General`.


    **6.** In the `Use Side Switch to:` section, select `Lock Rotation` or `Mute`.


    ![Image](images/p70-01.jpg)


    Use this when you want to mute the iPad or force it to stop rotating the screen.
    The `Rotation Lock` is useful when you have your iPad sitting flat on your desk
    or in your lap, and you want to force it to stay in either `Portrait` or `Landscape`
    orientation.


    **TIP:** This is a great way to read iBooks in bed. Turn your iPad to `Landscape`
    mode, lock the screen rotation, and read your book. Check out [Chapter 12](#Chapter12.html#ch12):
    “iBooks and e-Books” for more.'
