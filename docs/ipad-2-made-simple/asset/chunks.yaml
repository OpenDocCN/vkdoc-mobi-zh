  trans: "\n# 如何软重置你的 iPad\n\n你可以在**“设置”**应用中重置多项内容，从**主屏幕**布局、网络设置，到设备上的所有数据。请按照以下步骤执行软重置操作：\n\
    \n1.  轻点**“设置”**图标。\n2.  轻点左栏中的**“通用”**。\n3.  轻点右栏底部的**“传输或还原 iPad”**。\n4.  轻点**“还原所有设置”**，可重置网络、键盘、主屏幕布局和定位提醒。在弹出窗口中轻点**“还原”**进行确认。\n\
    5.  轻点**“抹掉所有内容和设置”**，可将 iPad 上的所有内容彻底抹除。然后在弹出窗口中轻点**“抹掉”**以确认此操作。\n\n    ![images](img/p663-01.jpg)\n\
    \n6.  轻点**“还原网络设置”**，以清除所有 Wi-Fi（及 3G）网络设置。\n7.  轻点**“还原键盘词典”**，以还原拼写词典。\n8. \
    \ 轻点**“还原主屏幕布局”**，以恢复出厂布局；即你第一次拿到 iPad 时设备的状态。\n9.  轻点**“还原定位提醒”**，以重置你收到的关于允许应用使用你当前位置的警告信息。\n\
    \n**注意：** 如果仍然无法让你的 iPad 正常工作，请尝试使用本章后面“设备固件更新（DFU）模式”部分中描述的步骤。\n\n## 播放音乐或视频时没有声音\n\
    \n没有什么比满心期待地听音乐或看视频，却发现 iPad 发不出任何声音更令人沮丧的了。通常，这个问题有一个简单的解决方法：\n\n1.  使用 iPad\
    \ 右上边缘的**“音量+”**键检查音量。你可能不小心把音量调到了最低或开启了静音。\n2.  如果你使用的是有线耳机，请拔下耳机再重新插入。有时候，耳机插孔可能没有连接好。\n\
    3.  如果你使用的是无线蓝牙耳机或蓝牙音响系统，请尝试以下步骤：\n\n    1.  检查音量设置（如果耳机或音响上可用）。\n    2.  检查确认蓝牙设备已连接。进入**“设置”**图标。轻点左栏中的**“通用”**和右栏中的**“蓝牙”**。确认能看到你的设备已列出，并且其状态为**“已连接”**。如果未连接，则轻点它并按照说明与\
    \ iPad 配对。\n\n    **注意：** 有时候你可能实际上连接到了一个蓝牙设备却不自知。如果连接到了蓝牙音响设备，iPad 本身就不会发出声音。\n\
    \n4.  确保歌曲或视频没有处于**“暂停”**模式。\n5.  双击**主屏幕**按钮调出音乐或视频控制项，然后向右滑动以查看底部的音乐或视频控制项（如右图所示）。调出控制项后，确认歌曲没有暂停，并且音量没有调到最低，如此处所示。\n\
    6.  查看**“设置”**图标，检查你是否（或其他人）在 iPad 上设置了**“音量限制”**：\n\n    1.  轻点**“设置”**图标。\n\
    \    2.  轻点左栏中的**“iPod”**。\n    3.  查看**“音量限制”**是否为**“开启”**。轻点**“音量限制”**以检查设置级别。如果限制是解锁状态，直接滑动滑块将音量调高即可。如果已锁定，你需要先轻点**“解锁音量限制”**按钮并输入四位数字密码才能解锁（请参见图\
    \ 28-3）。\n\n![images](img/2803.jpg)\n\n**图 28-3.** *在**设置**中检查音量限制*\n\n如果以上步骤均无效，请查看本章后面的“其他故障排除和帮助资源”部分。如果仍然无效，请尝试使用本章“从备份恢复\
    \ iPad”部分中描述的步骤，从备份文件恢复你的 iPad。最后，如果还是不行，请联系销售你 iPad 的商店或企业寻求帮助。\n\n## 无法从 iTunes\
    \ 或 App Store 购买项目\n\n你刚入手了这款炫酷的新设备，于是前往 iTunes Store 或 App Store 购物，却收到了错误信息或发现不允许购买。请按照以下步骤尝试解决此问题：\n\
    \n1.  两个商店都需要有效的互联网连接。确保你有 Wi-Fi 连接或蜂窝数据连接。关于连接设置请参见第 4 章：“Wi-Fi 与 3G 连接”。\n2.\
    \  确认你拥有有效的 iTunes 账户。我们在第 26 章：“iTunes 用户附加指南”的“创建 iTunes 账户”部分中，介绍了如何设置一个新的\
    \ iTunes 账户。\n\n**注意：** 如果你正在 iPad 尚未销售的国家/地区旅行，那么你的设备上可能没有 App Store 或**iTunes**应用。如果是这种情况，你需要使用电脑上的**iTunes**购买项目，然后再同步到\
    \ iPad 上。\n\n## 高级故障排除\n\n现在，我们将深入探讨一些更高级的故障排除步骤。\n\n### 设备固件更新（DFU）模式\n\n当先前描述的所有其他步骤都无法让\
    \ iPad 重新正常工作时，最后的手段是让 iPad 进入**设备固件更新（DFU）**模式，并使用 iTunes 恢复你的数据。这些步骤来源于 iPhone、iPad\
    \ 和 iPod touch 博客（`www.tipb.com`）。\n\n让 iPad 进入**DFU**模式可能需要尝试几次；这相当有难度。完成此操作后，你需要使用**iTunes**从最近的\
    \ iPad 备份中恢复你的数据：\n\n1.  将你的 iPad 连接到 Mac 或 Windows PC，并确保**iTunes**正在运行。\n2.\
    \  同时按住**电源/睡眠**按钮（设备顶部）和**主屏幕**按钮（屏幕正下方的前部）。\n3.  按住这两个按钮大约 10 秒。（如果你看到了 Apple\
    \ 标志，说明你按的时间太长了，需要重新开始。）\n4.  松开**电源/睡眠**按钮，但继续按住**主屏幕**按钮大约 5 秒。（如果你看到了**“连接到\
    \ iTunes”**屏幕，说明你按的时间太长了，需要重新开始。）\n5.  如果屏幕保持黑屏，那就对了！你的 iPad 现在应该处于**DFU**模式。\n\
    6.  现在，**iTunes**应该会提示它已检测到你的设备处于**恢复**模式，并且需要恢复。\n7.  按照说明恢复你的设备。我们在本章后面的“恢复\
    \ iPad 操作系统”部分提供了更多详细信息。\n\n### iPad 物理损坏（Apple Care 与替代方案）\n\n如果你不小心损坏了 iPad——比如进水、摔落、屏幕破裂、外壳凹陷或其他损坏——你可能会认为\
    \ Apple Care 延保计划能够覆盖此类损失。但事实并非如此。\n\n**警告：** Apple Care 延保计划不覆盖意外损坏（例如，进水、屏幕破碎、摔落、凹陷等）。\n\
    \n有一些可用的替代保修方案。如果你从百思买这样的主要零售商处购买 iPad，可以购买覆盖意外损坏的延保计划。然而，这些零售商的保修可能相当昂贵。我们找到了一个价格更实惠且仍覆盖意外损坏的保修计划。这个计划来自\
    \ SquareTrade（`www.squaretrade.com`）；在本书出版时，两年保修的售价约为 95 美元。\n\n如果你不想购买延保计划，那么可以通过网络搜索寻找\
    \ iPad 维修店。网上有多种选择，并且它们经常变化。在网上做一些研究，找到一家看起来信誉良好且拥有可靠客户评价的维修店。\n\n**提示：** 致电 iPad\
    \ 维修店，详细咨询他们针对你具体损坏情况的保修政策，以及由谁承担运费。同时询问如果他们无法修复 iPad 会如何处理。\n"
- fmt: "#### Re-register with Your iTunes Account\n\nEvery iPad is associated with\
    \ or tied to an iTunes account. That association allows you to purchase iTunes\
    \ music and videos, as well as apps from your iPad. It is also that association\
    \ that allows you to play music from your `iTunes` account on your computer on\
    \ your iPad.\n\nSometimes, your iPad might “lose” its registration and connection\
    \ with the `iTunes` service. Usually, this is a very simple fix. Just connect\
    \ your iPad to the computer via the USB cable, and the `iTunes` app will walk\
    \ you through the process of re-associating your iPad with your `iTunes` account.\
    \ We show the detailed steps of how to do this in [Chapter 1](#Chapter01.html#ch1):\
    \ “Getting Started.”\n\nIf you have trouble registering your iPad through iTunes,\
    \ then Apple provides an online resource that you can get to from your computer\
    \ or iPad web browser.\n\nYou can access the site at this URL:\n\n[`https://register.apple.com/cgi-bin/WebObjects/GlobaliReg.woa`](https://register.apple.com/cgi-bin/webobjects/globalireg.woa)\n\
    \nYou should see a screen similar to the one shown in [Figure 28–4](#Chapter28.html#fig_28_4).\n\
    \n![images](images/2804.jpg)\n\n**Figure 28–4.** *The online registration site\
    \ from Apple's login page*\n\nFollow these steps once you access Apple's online\
    \ registration site:\n\n1.  Complete the information, enter your Apple ID and\
    \ password, and click **Continue**.\n2.  Select whether you are registering **One\
    \ product** or **More than one product**. In this case, we chose **One product**\
    \ (see [Figure 28–5](#Chapter28.html#fig_28_5)).\n\n    ![images](images/2805.jpg)\n\
    \n    **Figure 28–5.** *Step 1 on Apple's online registration site*\n\n3.  Now,\
    \ choose the category, product line, and product. In this case, we chose **iPad**\
    \ category, **iPad** product line, and **iPad Wi-Fi**. This moved us through Steps\
    \ 2–4 at once (see [Figure 28–6](#Chapter28.html#fig_28_6)).\n\n    ![images](images/2806.jpg)\n\
    \n    **Figure 28–6.** *Steps 2–4 on Apple's online registration site*\n\n4. \
    \ Now you need to enter your iPad serial number and other information about how\
    \ you will use the iPad.\n\n    **TIP:** To locate the serial number, connect\
    \ your iPad to your computer and load the `iTunes` app. Click your iPad in the\
    \ Left Nav Bar and click **Summary** in the Top Nav Bar. The serial number is\
    \ at the top of the **Summary** screen (see [Figure 28–7](#Chapter28.html#fig_28_7)).\n\
    \n    ![images](images/2807.jpg)\n\n    **Figure 28–7.** *Locating your iPad serial\
    \ number in `iTunes` and Step 5 on Apple's online registration site*\n\n5.  Now\
    \ click **Continue** and you should have successfully registered your iPad.\n\n\
    ### iPad Does Not Show Up in iTunes\n\nOccasionally, when you connect your iPad\
    \ to your PC or Mac, your iPad may not be recognized in the `iTunes` screen.\n\
    \nIn the first screen—and this is what you should see—your iPad will be listed\
    \ under DEVICES (see [Figure 28–8](#Chapter28.html#fig_28_8)). In the second screenshot,\
    \ you will notice that there is no device shown, even though your iPad is connected\
    \ to the computer.\n\n![images](images/2808.jpg)\n\n**Figure 28–8.** *Verifying\
    \ that your iPad is listed in the Left Nav Bar in `iTunes` when connected to your\
    \ computer*\n\nFollow these steps if you don't see your device listed:\n\n1. \
    \ Check the battery charge of the iPad by looking at the battery level in the\
    \ top right of the **Home** screen. If you have let the battery run too far down,\
    \ `iTunes` won't see it until the level of the battery rises a bit.\n2.  If the\
    \ battery is charged, try connecting the iPad to a different USB port on the computer.\
    \ Sometimes, if you have always used one USB port for the iPad and switch it to\
    \ another port, the computer won't see it.\n3.  If this still does not fix the\
    \ problem, try disconnecting the iPad and restarting the computer. Then, reconnect\
    \ the iPad to the USB port.\n4.  If this still does not work, download the latest\
    \ update to `iTunes` or completely uninstall and re-install `iTunes` on the computer\
    \ again. If you choose this option, just make sure that you back up all the information\
    \ in `iTunes`.\n5.  We have included detailed steps showing you how to upgrade\
    \ to the latest version of `iTunes` in the “Upgrade iTunes” section of [Chapter\
    \ 26](#Chapter26.html#ch26): “Bonus iTunes User Guide.”\n\n### Synchronization\
    \ Problems\n\nSometimes, you might be having errors when synchronizing your iPad\
    \ with your computer (PC or Mac). Follow these steps to try to resolve such problems:\n\
    \n1.  Begin by following all the steps we outlined in the “iPad Does Not Show\
    \ Up in iTunes” section.\n2.  If the iPad still will not sync, but you can see\
    \ it in your `iTunes` Left Nav Bar, go back to [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync Your iPad with iTunes” and check your sync settings very carefully.\n\n\
    #### Resolving Issues with Apple's Mobile Me or Microsoft Exchange\n\nMicrosoft\
    \ Exchange is a push email and content server usually set up by an enterprise\
    \ administrator. `Mobile Me` is Apple's own wireless sync program that you can\
    \ set up (for a fee). This program will keep your information wirelessly in sync.\
    \ However, if you are using `Mobile Me` or Exchange to sync personal information,\
    \ you won't be able to sync this through `iTunes`.\n\nOn your iPad, go to your\
    \ **Settings** icon and tap **Mail, Contacts, and Calendars** in the left column.\n\
    \nIf `Mobile Me` or Exchange is set up, it will show up in your list of **Accounts**\
    \ at the top of the right column. If you don't see one of these on the list, then\
    \ you are not using them to sync to your iPad.\n\nIf you do see one of these items\
    \ listed, touch the account and then uncheck any categories or items that you\
    \ would prefer to sync through `iTunes`.\n\nNow, when you go back into `iTunes`,\
    \ those categories should show up as Microsoft sync options.\n\n**NOTE:** If you\
    \ do uncheck or deselect **Calendars** or **Contacts** in the Mobile Me or Exchange\
    \ accounts, you won't be able to see that information anymore on the iPad until\
    \ you set up the synchronization from the computer via `iTunes` (see [Chapter\
    \ 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes”)."
