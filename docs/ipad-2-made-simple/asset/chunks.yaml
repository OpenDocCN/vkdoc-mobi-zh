    You can also pinch open or closed to zoom in or out. This works in many places,
    such as web pages, mail messages, and pictures (see [Figure 10](#PartI.html#fig_p1_10)).
    Follow these steps to use the pinching gesture:


    1. To zoom in, place two fingers touching on the screen.

    2. Gradually slide your fingers open. The screen zooms in.

    3. To zoom out, place two fingers with space between them on the screen.

    4. Gradually slide your fingers closed so they touch. The screen zooms out.


    ![images](images/p16-01.jpg)


    **Figure 10.** *Pinch open to zoom in and pinch closed to zoom out.*


    ### The Two-Finger Twist


    This trick works in all the `iWork` apps (`Pages`, `Numbers`, and `Keynote`).
    This also works if you have turned on `Accessibility` ![images](images/U001.jpg)
    `Web Rotor` or `Language Rotor`. Touch an image with two fingers at the same time,
    then rotate your hand on the screen to rotate the image (see [Figure 11](#PartI.html#fig_p1_11)).
    It works temporarily in the `Photos` app, but the images rotate back to their
    previous orientation when you let go.


    ![images](images/p17-01.jpg)


    **Figure 11.** *Twist with two fingures to rotate an image.*


    ## App Reference Tables


    This section gives you a number of tables that group the apps on your iPad, as
    well as other apps you can download, into handy reference tables. Each table gives
    you a brief description of the app and tells where to find more information about
    it in this book.


    ### Getting Started


    [Table 2](#PartI.html#tab2) provides some quick links to help you connect your
    iPad to the Web (using Wi-Fi or 3G), buy and enjoy songs or videos (`iTunes`,
    `iPod`, and `Videos`), get out of apps, sleep, power off, unlock your iPad, use
    the Electronic Picture Frame feature, and more.


    ![Image](images/p18-01.jpg)


    ### Staying Organized


    [Table 3](#PartI.html#tab3) gives you links to everything from organizing and
    finding your contacts to managing your calendar; from reading and responding to
    your email to getting driving directions; and more.


    ![Image](images/p19-01.jpg)


    ### Being Entertained


    You can have lots of fun with your iPad; [Table 4](#PartI.html#tab4) shows you
    how. You can buy or rent movies, check out free Internet radio with `Pandora`,
    and buy a book and enjoy it in a whole new way using `iBooks`. If you already
    use a Kindle, you can sync all your Kindle books to your iPad and enjoy them right
    away. Choose from over 350,000 apps from the App Store to make your iPad even
    more amazing, fun, and useful. Rent a movie from the Netflix or iTunes service
    and download it immediately for later viewing (say on an airplane or train). If
    you have a favorite ABC TV show, chances are you can find and watch it using the
    `ABC` app.


    ![Image](images/p20-01.jpg)


    ![Image](images/p21-01.jpg)


    ### Staying Informed


    You can also use your iPad to stay informed. For example, you can use it to read
    your favorite magazine or newspaper with up-to-the-minute and vibrant pictures
    and videos (see [Table 5](#PartI.html#tab5)) or check out the latest weather like
    never before. You can do much more than simply browse the Web—you can interact
    with it using `Safari` on your iPad.


    ![Image](images/p22-01.jpg)


    ### Networking Socially


    Your iPad also lets you connect and stay up to date with friends, colleagues,
    and professional networks using various social networking tools (see [Table 6](#PartI.html#tab6)).


    ![Image](images/p23-01.jpg)


    ### Being Productive


    You can work with documents, spreadsheets, and presentation files using the `Pages`,
    `Numbers`, and `Keynote` apps—and the touch screen interface on the iPad. You
    can grab images to size, rotate, or move around in documents and presentations
    by just dragging, expanding, or rotating them with your fingers. You can access
    and read just about any PDF file or other document with the `GoodReader` app.
    You can also take notes with the basic `Notes` app or step up to the advanced
    `Evernote` app, which has amazing capabilities for integrating audio, pictures,
    and text notes, as well as syncing everything to a web site (see [Table 7](#PartI.html#tab7)).


    ![Image](images/p24-01.jpg)


    ![Image](images/p25-01.jpg)


    ## Other Fun Stuff


    The iPad can be used as a fantastic electronic picture frame—we show you the basics
    here. And you''ll love your iPad as a video player! In this section, we give you
    a few quick tips for getting around your video and music player, as well as for
    getting the most out of videos you see embedded in web pages.


    ### The iPad as an Electronic Picture Frame


    You may wonder what that little `Flower` icon next to the `Slide to Unlock` switch
    does when you lock your iPad. This starts the Electronic Picture Frame feature—a
    great way to share your pictures with others or simply enjoy your own pictures.
    To enjoy the Electronic Picture Frame feature, you need to do the following:


    1. Load up your iPad with your pictures using `iTunes` (see the “Photos—Automatically
    Sync” section in [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes”).

    2. Tap the `Picture Frame` icon to turn on the Electronic Picture Frame feature.

    3. Tap the icon again to turn it off.


    ![Image](images/p25-02.jpg)


    The Electronic Picture Frame will cycle through all your pictures, or it can be
    customized to show only selected photo albums.


    **TIP:** You can customize the way your picture frame operates, select specific
    albums, and more. See the “Personalize Your Picture Frame” section in [Chapter
    6](#Chapter06.html#ch6): “Personalize & Secure Your iPad.”


    ### Navigating Around Your Music and Video Player


    When playing a song or video, just tap anywhere in the middle of the screen to
    show or hide the controls at the top of the screen, as shown in [Figure 12](#PartI.html#fig_p1_12).


    ![images](images/p26-01.jpg)


    **Figure 12.** *Navigate around your music and video player.*


    ### Watching Videos in Web Pages


    A really fun thing to do is watch supported video formats right in their web pages.
    Unfortunately, the iPad does not support the Adobe Flash video format, which is
    used by many web sites. But there are many videos you can watch, such as the videos
    on the front page of the *New York Times* web page, as shown in [Figure 13](#PartI.html#fig_p1_13).
    Follow these steps to watch a video in a web page on this site:


    1. Tap the `Safari` icon.

    2. Tap the Address bar at the top and type in: [`www.nytimes.com`](http://www.nytimes.com).

    3. Locate and tap any video; usually you''ll see a `Play` icon like this ![images](images/p27-01.jpg)
    in the middle of the picture.

    4. The video will start playing right in the web page.

    5. To expand the video to full screen, pinch open right inside the video. Put
    two fingers in the video and expand them while sliding them on the screen.

    6. To watch the video in widescreen, tilt your iPad to `Landscape` mode.


    ![images](images/p27-02.jpg)


    **Figure 13.** *How to enjoy videos in web pages.*


