  trans: '

    # DiskAid 文件传输


    如果你更喜欢使用 USB 连接线，并且希望能够真正访问 iPad 上的所有文件，包括电子表格、文字处理文档、演示文稿文件、图片、视频，甚至是 FaceTime
    通话记录、语音备忘录和备忘录等内容，那么 `DiskAid` 是一个不错的选择。


    `DiskAid` 支持在 PC 和 Mac 上运行。在本文撰写时，你可以下载一个免费试用 14 天的版本。这个试用版让你在支付 9.90 美元购买之前，可以先对软件进行测试。


    你可以直接从 DiskAid 网站获取该软件，网址是 [`www.digidna.net/products/diskaid/download`](http://www.digidna.net/products/diskaid/download)。


    在你的电脑上运行 `DiskAid` 并通过 USB 线将 iPad 连接到电脑后，你应该会看到主屏幕，上面显示了你 iPad 上安装的应用程序（参见 图
    19–1）。


    要复制文件，你需要执行以下操作：


    1.  在 `DiskAid` 的左侧栏中选择一个 iPad 应用。在本示例中，我们选择了 `GoodReader`。

    2.  打开一个窗口浏览你电脑中的文件，然后将选中的文件拖放到 `DiskAid` 右侧的主窗口上。

    3.  接着，断开 iPad 的连接并检查该应用（此处为 `GoodReader`）。你应该能看到刚刚拖放过来的文件。


    **提示：** 要将文件从 iPad 复制到电脑，请执行相反的操作——将文件从 iPad 拖放到你的电脑文件夹中。你也可以通过选中 `DiskAid` 中的文件，然后按电脑键盘上的
    `Delete` 键来删除 iPad 上的文件。


    ![images](img/1901.jpg)


    **图 19–1.** *使用 `DiskAid` 复制文件*


    # Dropbox 文件传输


    `Dropbox` 与 `DiskAid` 在一些方面有所不同。首先，它是无线的；无需 USB 连接线连接到电脑。其次，`Dropbox` 不仅允许你在 iPad
    和电脑之间同步文件，还能在多台电脑（例如 Windows、Mac 和 Linux）以及 Dropbox 网站之间同步文件。第三，你需要在 iPad 和电脑上都安装一个应用。好处是你可以免费存储和传输最多
    2 GB（千兆字节）的文件。如果你想存储多达 50 GB 的文件，价格是 9.99 美元/月或 99.00 美元/年。还有更大的存储方案可供选择。


    **提示：** 使用 `Dropbox`，你还可以通过 PIN 码来保护你的文件，以进一步增强安全性。这意味着你可以在移动设备上安全地存储和访问个人信息、税务信息和个人照片。


    请按照以下步骤在 iPad 上使用 `Dropbox`：


    1.  注册一个免费账户，并从 [`www.dropbox.com`](http://www.dropbox.com) 下载电脑（PC 或 Mac）应用。

    2.  接着，前往 iPad 上的 App Store，找到并下载免费的 `Dropbox` 应用。

    3.  使用你首次设置账户时创建的用户名和密码登录 iPad 上的 `Dropbox`。

    4.  你拖入电脑 `Dropbox` 文件夹的任何文件或文件夹，都将无线同步到 iPad 上的 `Dropbox` 应用（参见 图 19–2）。


    ![images](img/1902.jpg)


    **图 19–2.** *使用 `Dropbox` 复制文件*


    放入 iPad 上 `Dropbox` 应用的文件，也会出现在电脑的 Dropbox 文件夹中，以及 [`www.dropbox.com`](http://www.dropbox.com)
    网站上。换句话说，重要文件会在 [`www.dropbox.com`](http://www.dropbox.com) 上自动备份。


    你甚至可以与其他人（比如同事、朋友或家人）分享你 Dropbox 账户中的特定文件夹。这是一种分享大小文件的绝佳方式，因为你无需担心发送电子邮件附件时有时会遇到的大小限制。


    现在你已经了解了如何在 iPad 之间传输大小文件的基本知识，可以开始探索一些高效的办公应用了。


    # 办公应用


    正如我们之前提到的，使用 `Pages` 作为文字处理器，`Numbers` 作为电子表格，`Keynote` 进行演示，可以极大地提升你在 iPad 上的移动办公效率。


    ## 下载 Pages、Keynote 和 Numbers


    `Pages`、`Keynote` 和 `Numbers` 都可以在 App Store 购买和下载。在本文撰写时，每个应用的价格为 9.99 美元。


    最简便的方法可能是在右上角的 `Search`（搜索）窗口中输入 `Pages` 来查找。


    接下来，在 `Pages` 下载页面中，通过查看左下角 `More iPad Apps by Apple`（更多 Apple 出品的 iPad 应用）部分来找到
    `Keynote` 和 `Numbers`。


    ![images](img/p474-01.jpg)


    # 使用 Pages


    `Pages` 是 Apple 的文字处理程序。如果你使用 Mac，你会熟悉 Pages 程序的布局和功能。虽然它并非旨在完全替代桌面文字处理器，但 `Pages`
    功能相当强大，可以让你编辑和创建出非常专业的文档。


    使用 `Pages`，你不仅可以创建文档；还可以通过电子邮件发送它们，或将其上传到在线账户，以便轻松查看、共享和打印。


    ## 首次使用 Pages


    当你首次启动 `Pages` 时，你会看到一个名为“Getting Started”的示例文档。这是了解 `Pages` 许多功能的一个很好的教程。我们建议你通读此文档，了解与
    `Pages` 相关的各种样式、对象和工具栏。


    ![images](img/p475-01.jpg)


    要开始一个新文档，请触摸底部的 `New Document`（新建文档）按钮。当你触摸 `New Document` 按钮时，你可以选择从头开始创建新文档，或者复制当前显示的文档。


    ![images](img/p475-02.jpg)


    **提示：** 如果你想把现有文档用作模板，选择 `Duplicate Document`（复制文档）会很有用。否则，请选择 `New Document`
    来创建新文档。


    ## 选择新文档模板


    当你选择 `New Document` 时，有 16 个可用的模板供你选择。这些模板都是通用型的，比如 `Poster`（海报）、`Proposal`（提案）或
    `Term Paper`（学期论文）。你可以选择从一个模板开始（这可能会使格式设置更容易），或者直接选择 `Blank`（空白）（位于左上角）从空白页开始（参见
    图 19–3）。


    模板中的所有内容都可以更改或调整，所以请大胆尝试。


    **注意：** 对于需要特定格式和外观的文档（如简历和信函），模板非常有用。


    一旦做出选择，你就可以开始编写和编辑，将模板变成完美的文档。


    ![images](img/p476-01.jpg)


    ![images](img/1903.jpg)


    **图 19–3.** *`Pages` 中的页面布局*


    ## 使用工具和样式


    与大多数文字处理器一样，`Pages` 为你提供了许多为文档添加各种样式的选项。内置工具栏让你可以轻松访问自定义文档的大部分功能。


    右上角工具栏上有四个特定的按钮，它们在你的写作中会非常有用：`Information`（信息）、`Picture/Object`（图片/对象）、`Tools`（工具）和
    `Full Screen`（全屏）。


    ![images](img/p477-01.jpg)

    '
- fmt: '# Information Button


    The `Information` button only works after you select text or another item, such
    as a graphic.


    ![images](images/p477-02.jpg)


    This button enables you to accomplish the following:


    - Set a particular style, such as Heading, Subheading, or Caption

    - Change the font, font size, or color

    - Change the settings for lists with bullets and numbers

    - Change the alignment/justification and line spacing


    Follow these steps to adjust a style in a document:


    1. Select text in the document.

    2. Tap the `Information` button.

    3. Tap the `Style` button.

    4. Scroll through the list to choose the appropriate style and then touch it.
    A `Checkmark` icon will then appear next to the style you have chosen.


    You can also add `Bold`, `Italics`, Underline, or `Strikethrough` by touching
    the appropriate button.


    ![images](images/p478-01.jpg)


    # Selecting Text to Apply a Style to or Cut/Copy


    The style you select can be applied to the next text you type, or it can be applied
    to selected text already in the document.


    Do this to select text you have typed:


    ![images](images/p478-02.jpg)


    1. Double-tap to select a word.

    2. Triple-tap to select a paragraph.


    Do this to select text in a `Pages` template:


    1. Press and hold a word to select it.

    2. Double-tap to select a paragraph.


    Once the text is selected, choose the style to apply to the text you have selected
    by using the tool bar or the `Information` (`i`) button, as shown.


    # Picture/Object Button


    Next to the `Information` button, you will find the `Picture/Object` button. Touch
    this button to insert media, tables, charts, or shapes into the document.


    When you first touch this button, you will see the `Media` tab highlighted, and
    all your photo albums will be visible.


    To choose a photo, navigate through the available albums and select the desired
    photo to use.


    To add a table to the document, touch the `Table` tab and choose from the various
    table formats shown.


    ![images](images/p479-01.jpg)


    **NOTE:** There are six screens of tables; swipe from right to left to advance
    through the screens.


    Follow these steps to insert a chart:


    1. Touch the `Chart` tab and swipe through the screens.

    2. Tap the chart you want to insert.


    Follow these steps to edit the data behind the chart (see [Figure 19–4](#Chapter19.html#fig_19_4)):


    1. Double-tap the chart so that it flips around, showing you a data table.

    2. Type the data needed to create the chart.

    3. Press `Done` in the upper-right corner when finished to see the updated chart.


    ![images](images/p479-02.jpg)


    ![images](images/1904.jpg)


    **Figure 19–4.** *How to edit chart data in `Pages`*


    Do this to insert a shape:


    1. Touch the `Shape` tab and swipe through the screens.

    2. Tap the shape you want to insert.


    Do this to move or resize the shape:


    1. Press and hold the shape to drag it around the page.

    2. Touch the two corners and pinch open or closed to make it smaller or larger.

    3. Put two fingers inside the shape and spin it around to rotate the shape.


    ![images](images/p480-01.jpg)


    To move or resize the picture, chart, or object, simply tap once to bring up the
    blue dots. Touch and hold the object and move it anywhere you wish on the page.
    You will notice that text will move around the object as you move it.


    ![images](images/p481-01.jpg)


    **TIP:** To change or adjust the text wrapping, simply touch the `Information`
    button while the picture or object is highlighted and choose `Arrange`. Touch
    the `Wrap` button and choose a style for the word wrap.


    ## The Tools Button (Print, Find, Settings, and Help)


    Next to the `Pictures/Objects` button is the `Tools` button. Touch this to access
    the `Find`, `Print`, `Document Setup`, `Settings`, and `Go to Help` tools.


    ![images](images/p481-02.jpg)


    The `Settings` option allows you to turn `ON` or `OFF` the `Check Spelling` option
    and choose whether to display various features: `Word Count`, `Center Guides`,
    and `Edge Guides`.


    ![images](images/p482-01.jpg)


    Touch the `Document Setup` tool and you will see what looks like a blueprint.
    To add or edit a header or footer, touch the `Tap to Edit Header/Footer` buttons.


    To adjust the margins, just drag the triangles in from the sides or from the top
    and bottom of the page.


    When you are done with your adjustments, simply touch the `Done` button in the
    upper-left corner.


    ![images](images/p482-02.jpg)


    ![images](images/p482-03.jpg)


    To hide all tool bars and just focus on a blank screen for writing, touch the
    `Full Screen` icon in the upper-right corner. To enable the tool bar again, just
    tap the screen.


    ## The Style Buttons and Ruler


    The `Style` buttons and ruler are visible only when you are in a field with editable
    text. Simply touch the screen anywhere text can be input or edited and you will
    see the ruler at the top (see [Figure 19–5](#Chapter19.html#fig_19_5)).


    **NOTE:** If you turn your iPad to `Landscape` orientation, the menus and style
    bar disappear. To get the menus and style bar back, turn your iPad back to `Portrait`
    orientation.


    At both edges of the ruler, there are sliding guides for tabs and indentations.
    Simply slide to adjust the margins and tabs for your document.


    ![images](images/1905.jpg)


    **Figure 19–5.** *The `Style` buttons*


    On top of the ruler, you will find many of the same buttons that you saw when
    you touched the `Information` button. You can adjust the paragraph and character
    styles; align or justify text; and set tabs, page breaks, and column breaks by
    touching the appropriate button.


    # Navigator


    `Navigator` is a very cool tool built into `Pages`. Follow these steps to use
    it:


    1. Hold your finger along the right-hand edge of the page and slowly drag down
    or up.

    2. A small `Magnifying Glass` icon appears with a little “snapshot” of the pages
    in the document.

    3. Each little bit you move downwards shows the next page.

    4. When you find the page you wish to read or edit, remove your finger from the
    screen and you will jump to that page.


    ![images](images/p483-01.jpg)


