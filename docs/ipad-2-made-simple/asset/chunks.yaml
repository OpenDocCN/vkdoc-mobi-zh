  trans: '

    #### 开始使用并创建个人资料


    首先，点击 `iTunes` 左侧导航栏的“商店”板块中的 `Ping` 选项。


    **注意：** 如果你已经注册并启用了 `Ping`，但尚未使用你的 `Apple ID` 登录 `iTunes` 账户，那么你将在主窗口中看到一条“开启
    Ping”的消息。只需点击该链接并登录，即可查看你的 `Ping` 账户。


    现在，点击主窗口中的 `开启 Ping` 按钮 ![images](img/p690-02.jpg) 。你需要重新登录 `iTunes` 服务才能开始使用
    `Ping`。接下来，你需要为 `Ping` 创建个人资料。输入你的名和姓，选择性别，添加可选的头像，注明居住地，提供简短的个人简介，最后选择最多三种你喜欢的音乐类型。


    点击 `继续` 以选择音乐在你的个人资料中的显示方式。默认设置是“自动显示我喜欢、评分、评论或购买的所有音乐”。当然，你也可以根据自己的偏好进行调整。点击
    `继续`。


    ![images](img/p691-01.jpg)


    最后，你可以选择允许他人关注你时是否需要经过你的批准（默认设置是无需批准），或者完全不允许他人关注你。做出选择后，点击 `完成` 以结束 `Ping` 个人资料的设置。


    ![images](img/p691-02.jpg)


    完成设置后，你会看到一个类似下图的页面，其中包含基于你在 `iTunes Store` 中购买的音乐的推荐。要开始关注艺人，请点击底部的 `关注` 按钮，或输入搜索词来关注朋友或艺人。


    ![images](img/p691-03.jpg)


    你也可以点击 `邀请` 按钮，邀请你的朋友加入 `Ping`。


    如果你愿意，可以通过点击 `邀请` 按钮并输入朋友的电子邮件地址来邀请他们。


    ![images](img/p691-04.jpg)


    #### 关注你喜欢的艺人


    要寻找想关注的艺人，只需在 `Ping` 界面的 `搜索` 窗口中输入他们的名字。当看到艺人出现时，点击 `关注` 按钮。我们搜索并找到了“滚石乐队”，但请注意，这并非那个摇滚乐队——而是一个使用了该乐队名称的个人用户。


    ![images](img/p692-01.jpg)


    **警告：** 有些人拥有（或曾经使用过）与艺人相同的名字，因此请务必点击搜索窗口右侧的 `显示艺人` 链接。否则，你最终关注的可能会是喜欢另类、电子和摇滚音乐的德国啤酒爱好者彼得·盖布瑞尔（Peter
    Gabriel），而不是真正的艺人彼得·盖布瑞尔。


    ![images](img/p692-02.jpg)


    #### 关注你的朋友和其他人


    使用相同的“查找”功能来定位和关注你的朋友及其他用户。在下一个示例中，马丁决定关注加里·马佐，因此马丁搜索了加里的名字。点击 `关注` 后，会弹出一个窗口，告知马丁
    `Ping` 需要向加里发送姓名、照片和电子邮件地址，以便加里批准请求。请注意，当马丁请求关注加里时，加里在他的 iPad 上会看到什么（参见图 29–4）。


    ![images](img/2904.jpg)


    **图 29–4.** *来自 **iTunes** 中 Ping 功能的关注请求，显示在移动设备上的效果*


    #### 近期活动动态


    Ping 的核心是你从所关注的艺人和朋友那里收到的所有更新。启动 Ping 时的默认视图显示在右侧；不过，如果你在其他视图中，则需要点击右上角 `PING`
    框中的 `近期活动` 链接。


    ![images](img/p693-01.jpg)


    **注意：** 你或你的家人在同一“家庭共享”账户中购买的所有内容，都会作为已购买项目显示在你的 `Ping` 账户上。嘿，至少你可以把那首无聊的情歌归咎于你的配偶，或者把那种匪帮说唱归咎于你十几岁的孩子。


    `近期活动` 视图会显示你以及你所关注的朋友和艺人的所有近期动态（参见图 29–5）。这与 Facebook 上的“个人主页”非常相似。你可以发表评论，*喜欢*你看到的帖子，并阅读其他关注者的评论。尽情享受吧，让你的意见被听到，并参与到对话中来！


    如果你所关注的朋友允许你查看他们的购买记录，你也可以对这些购买进行评论。当然，`iTunes` 应用通过在所列项目旁边提供便捷的 `购买` 按钮，让你可以轻松购买朋友购买的专辑或歌曲。


    ![images](img/2905.jpg)


    **图 29–5.** *Ping 的 **近期活动** 页面让你能够添加评论或表示喜欢某样东西。*


    #### 在 iTunes 中前后导航


    有时，你只是想简单地返回到刚才点击链接离开的页面。可能不太明显，但在主 `iTunes` 窗口的左上角有小的 `三角形` 图标，可以让你在 Ping 和 `iTunes`
    应用的其他部分之间前后翻页。


    ![images](img/p694-01.jpg)


    #### 音乐会：了解并和朋友分享


    当你在 `Ping` 中点击某位艺人的页面时，可以通过寻找页面右下角的 `音乐会` 框来查看他们是否有已安排的即将到来的演出。附图中显示的是 U2 乐队的即将到来演出。点击该框标题栏中的
    `查看全部` 链接，可以查看所有详细信息，并告诉别人你是否要参加这些音乐会。


    ![images](img/p695-01.jpg)


    点击 `查看全部` 链接后，你将看到所有演出的详细信息。你可以点击 `我要去` 按钮告诉其他人你正在参加，以及点击 `门票` 按钮尝试购票。如果你点击了 `我要去`，还可以为你的帖子添加评论供朋友们查看——例如，你可能会告诉他们你的座位号，以便他们能找到你。


    #### 查看艺人在 Ping 中喜欢的内容


    如果你在 Ping 中访问某些艺人的页面，可以在右上角看到他们喜欢的音乐。在这张图片中，我们可以看到 U2 乐队喜欢 Elbow、TV on the Radio、The
    National 等乐队。点击任何一张专辑封面，即可试听甚至购买该专辑中的歌曲。


    ![images](img/p695-02.jpg)


    #### 使用歌曲的 Ping 下拉菜单


    在大多数 `iTunes` 视图中，你所有歌曲的旁边都会有一个小的 `Ping` 下拉菜单。点击 `Ping` 菜单可以“喜欢”、“发布”或“显示艺人简介”。你还可以查看
    iTunes 商店，以浏览该艺人更多的歌曲、更多专辑，甚至同类型的其他歌曲，如下方所示。


    ![images](img/p695-03.jpg)


    ![images](img/p695-04.jpg)


    #### 在右侧栏中查看 Ping


    当你在音乐库中的项目之间切换时，你会很快注意到 Ping 会显示在右侧栏的顶部。你可以从这个栏目表示你`喜欢`这首歌，或者`发布`对这首歌的评论。


    ![images](img/p696-01.jpg)


    #### Ping 移动版


    ![images](img/p696-02.jpg)


    你可以直接从 iPad 上的 `iTunes` 应用访问 Ping。要查看 Ping，请在 iPad 上启动 `iTunes` 应用，然后点击底部一行的 `Ping`
    快捷键。


    请注意，你可以通过点击顶部的那些按钮，在“动态”、“用户”和“我的资料”之间切换。


    右侧的图片显示的是“动态”标签。


    ![images](img/p696-03.jpg)


    ### 更改 iTunes 中的视图


    在电脑上的 `iTunes` 中，有多种方式查看你的音乐、视频和其他媒体。熟悉电脑上的这些视图也有助于你理解 iPad，因为你的 iPad 上有许多相同的视图。`iTunes`
    中有四种可自定义的视图：`歌曲列表`、`专辑列表`、`网格` 和 `封面流`。


    **注意：** `专辑列表` 视图是 `iTunes` 10.0 版本中的新功能。这是一个很好的视图，因为它按专辑对你的歌曲进行分组，并在 `专辑` 列中显示专辑封面。

