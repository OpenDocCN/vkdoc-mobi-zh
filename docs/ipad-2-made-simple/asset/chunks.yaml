  trans: "\n### 将图标移动到其他页面\n\niPad 每个页面可容纳 20 个图标（不包括程序坞），你可以通过在**主屏幕**上*向右滑动*来找到这些页面。有了这么多酷炫的\
    \ App，拥有五页、六页甚至更多页图标的情况并不少见。如果你喜欢冒险，最多可以填满 11 页图标！\n\n**注意**：你也可以在任何屏幕（**主屏幕**除外）上从左向右滑动。在**主屏幕**上，从左向右滑动会进入**聚焦搜索**；更多信息请参见第\
    \ 2 章：“输入技巧、拷贝/粘贴与搜索”。\n\n假设你的第一页上有一个很少使用的图标，你想把它移到最后一页。或者，你可能想将经常使用的 App 图标从图标页面的最后一页交换到第一页。这两项操作都非常简单；在页面间移动图标与将图标移动到底部程序坞非常相似。请按照以下步骤在页面间移动图标：\n\
    \n1.  长按任意图标以启动移动过程。\n2.  长按你想要移动的图标。例如，假设你想将 **iBooks** 图标移动到第一页（请参见图 6-2）。\n\
    \n    ![images](img/0602.jpg)\n\n    **图 6-2.** *将图标从一个页面移动到另一个页面*\n\n3.  现在将图标拖放到另一个页面。为此，请长按\
    \ **iBooks** 图标并将其拖向右侧，你将看到图标页面逐个移动。当到达第一页时，松开图标。这样就能将其放置在最开始的位置。\n4.  按下**主屏幕**键以完成移动并停止图标抖动。\n\
    \n### 删除图标\n\n小心——删除图标和移动图标一样简单。然而，当你在 iPad 上删除一个图标时，实际上是在删除它代表的程序。这意味着，如果不重新安装或重新下载，你将无法再使用该程序。\n\
    \n**注意**：你可以设置家长控制（**设置**中的**访问限制**）来防止意外删除 App。如果你有把删除 App 当成有趣游戏的小孩，这个功能会非常方便。\n\
    \n根据你在 iTunes 中的**应用同步**设置，该程序可能仍会保留在 iTunes 的**应用**文件夹中。在这种情况下，如果你想要重新安装已删除的\
    \ App，只需在 iTunes 的同步应用列表中勾选该应用即可轻松实现。如果没有，你也可以随时从同一账户免费将其下载到你的设备上。\n\n如图 6-3 所示，删除过程与移动过程类似。长按任意图标以启动删除过程。和之前一样，长按会使图标抖动，这样你就可以移动或删除它们。\n\
    \n**注意**：你只能删除已下载到 iPad 上的程序；预装的图标及其关联程序无法删除。你可以通过图标左上角是否有一个小小的黑色 **x** 来判断哪些程序可以被删除，可以删除的图标包含这个标记。\n\
    \n只需点击你想要删除的图标上的 **x**。系统会提示你删除或取消删除请求。如果你选择**删除**，该图标及其关联的应用将从你的 iPad 上移除。\n\n\
    ![images](img/0603.jpg)\n\n**图 6-3.** *删除图标及其关联的程序*\n\n## 第 7 章\n\n## 个性化与保护你的\
    \ iPad\n\n在本章中，你将学习一些个性化设置 iPad 的好方法，以及如何通过密码保护你的 iPad 的安全性。例如，你将学习如何下载一些精美的免费壁纸，并为你的**锁定**屏幕和**主屏幕**更换壁纸。你将学习如何通过调整设置来个性化\
    \ iPad 发出的声音，比如在接收或发送邮件、锁定 iPad、使用键盘打字，或日历事件提醒前是否听到声音。你还将学习如何自定义**相框**设置（这是一个在设备锁定状态下显示照片的应用）。你可以调整显示时长、过渡效果，甚至选择显示哪些相簿中的照片。iPad\
    \ 的许多方面都可以进行微调以满足你的需求和品味，让你的 iPad 更具个性化的外观和感受。\n\n### 更改锁定屏幕和主屏幕壁纸\n\n实际上，你可以通过更换壁纸来个性化\
    \ iPad 上的两个屏幕。\n\n第一个是**锁定**屏幕，在你首次开启或唤醒 iPad 时出现。此屏幕的壁纸图像显示在“滑动来解锁”滑块栏的后方。\n\n\
    第二个是**主屏幕**。其壁纸显示在图标的后方。\n\n你可以使用 iPad 自带的壁纸图片，也可以使用你自己的图片。\n\n**提示：** 你可能会希望**锁定**屏幕的壁纸比**主屏幕**的壁纸更少个人色彩。例如，您可以选择将一张通用的风景图片放在**锁定**屏幕上，而将一张亲人的照片放在**主屏幕**上。\n\
    \n在 iPad 上更换壁纸有几种方法。第一种方法，从设置中更换壁纸，非常简单直接。\n\n#### 从设置中更换壁纸\n\n触摸**设置**图标，然后触摸左侧栏中的**显示与亮度壁纸**标签。亮度和壁纸的设置选项将出现在右侧栏中。\n\
    \n要开始选择壁纸，请触摸屏幕右侧**壁纸**下当前选定壁纸的图片，如图 7-1 所示。\n\n![images](img/0701.jpg)\n\n**图\
    \ 7-1.** *从**设置**图标更换壁纸*\n\n在屏幕右侧（见图 7-1 中的右图），你会看到一些相簿或图片文件夹。你有以下几种选择：\n\n* \
    \  点击顶部的**壁纸**标签，查看 iPad 的所有预载壁纸图片。\n*   点击**已存储的照片**相簿，其中包含你从网页保存的任何图片、截图（同时按住**主屏幕**按钮和**电源/睡眠**键获得），甚至包括从壁纸应用或使用\
    \ iPad 相机拍摄的照片。\n*   点击**已存储的照片**下方显示的任何相簿。只有当你从 iTunes 同步了照片时，这些额外的相簿才会可见。\n\n\
    点击任意相簿后，你将看到该相簿中的所有图片，如图 7-2 所示。\n\n点击相簿中的任意图片，即可在全屏模式下查看。\n\n在全屏预览图片时，你可以执行以下操作：\n\
    \n*   通过双指捏合或张开进行缩放。\n*   如果不喜欢该图片，点击**取消**按钮返回相簿。\n*   点击**设定锁定屏幕**按钮，仅将该图片设定为**锁定**屏幕。\n\
    *   点击**设定主屏幕**按钮，仅将该图片设定为**主屏幕**。\n*   点击**同时设定**按钮，将该图片同时设定为**锁定**和**主**屏幕。\n\
    \n![images](img/0702.jpg)\n\n**图 7-2.** *从相簿中选择一张图片来更换你的壁纸。*\n"
- fmt: '# Changing Wallpaper from Any Picture


    The second way to change your wallpaper is to view any picture in your **Photos**
    collection and select it as your wallpaper.


    Tap the **Photos** icon to get started. To learn more about working with photos,
    check out [Chapter 16](#Chapter16.html#ch16): “iPad Photography.”


    ![images](images/p208-01.jpg)


    Touch the photo album you want to look through to find your wallpaper.


    When you find a photo you want to use, touch it. It will open on your screen.


    After you preview the image (see [Figure 7-3](#Chapter07.html#fig_7_3)), tap the
    **Set As** icon ![images](images/p208-02.jpg) on the top-right corner of the screen
    and select **Use As Wallpaper**. Zoom in or out as you desire and then set the
    image as either your **Lock** or **Home** screen (or both), as just described.


    ![images](images/0703.jpg)


    **Figure 7-3.** *Start from the **Photos** app to use an existing photo or image
    as wallpaper.*


    If you decide you''d rather use a different picture, choose **Cancel** and pick
    a different one.


    # Download Great Wallpaper from Free Apps


    Go to the App Store and do a search for **Backgrounds** (see [Chapter 20](#Chapter20.html#ch20):
    “App Store” for more information). You''ll find a number of free and low-cost
    apps designed specifically for your iPad. One app that we like is called **Backgrounds
    HD,** which has hundreds of beautiful background images you can download for free
    to your iPad.


    **NOTE:** With **Backgrounds HD,** as with most wallpaper apps, you will need
    a live Internet connection—either Wi-Fi or 3G. Because image files tend to be
    quite large, you should probably stick with Wi-Fi unless you have an unlimited
    monthly data plan for your 3G cellular data network.


    # Adjusting Sounds on Your iPad


    You can fine-tune your iPad so that it does or does not make sounds when you receive
    new mail, send mail, the calendar alarm rings, the keyboard clicks, or your iPad
    is locked. To adjust sounds, follow these steps:


    1.  Tap your **Settings** icon.

    2.  Tap **General** in the left column.

    3.  Tap **Sounds** in the right column.

    4.  Tap any of the switches to turn **ON** or **OFF** the sound when the event
    occurs.


    ![images](images/p210-01.jpg)


    **TIP:** To use the **Volume** buttons on the side of the iPad to adjust your
    alert volume, just move the toggle under **Change with Buttons** to the **ON**
    position.


    # Personalize Your Picture Frame


    **Picture Frame** is the app that lets you display a slideshow of photos on your
    locked iPad. We''ll describe the many ways you can customize the display.


    ## Starting or Stopping the Picture Frame App


    You may have noticed the little icon next to the **slide to unlock** slider bar
    when your iPad is locked. This is the **Picture Frame** icon.


    Tap this icon to turn on the electronic picture frame.


    Tap the icon again to turn it off.


    **Picture Frame** will cycle through all your pictures, or you can customize it
    to show only selected photo albums.


    ![images](images/p211-01.jpg)


    **CAUTION:** If you have private pictures stored on your iPad, it could get quite
    embarrassing if **Picture Frame** accidentally displays these photos while in
    **Locked** mode. This section shows you how to restrict the albums that are used
    for the slideshow.


    **NOTE:** You can disable **Picture Frame** by setting a passcode security lock
    on your iPad. We show you how later in this chapter.


    ## Customizing Your Picture Frame


    Depending on the types of pictures you have stored on your iPad, you will almost
    certainly want to set up your **Picture Frame** to display just the albums or
    photos you want. Follow these steps to do so:


    1.  Tap the **Settings** icon.

    2.  Tap **Picture Frame** in the left column. Now, you can adjust various settings
    for the picture frame (see [Figure 7-4](#Chapter07.html#fig_7_4)).

    3.  If you want to show only one picture on the screen at a time, select **Dissolve**.
    If you want to show two to four images at once, select **Origami**. **Origami**
    will show two to four images on the screen and have them fold over on each other,
    as though you were folding paper.

    4.  **Zoom in on Faces** is selectable only if you''ve chosen the **Dissolve**
    transition. This is a neat feature that will zoom in on any faces detected in
    the individual photos,

    5.  Set **Shuffle** to **ON** if you want **Picture Frame** to display the selected
    photos randomly.

    6.  If you want all your photos to be included in the slideshow (the default setting),
    select **All Photos**.

    7.  People often want to keep some photos private. To do so, select **Albums**,
    then tap or check the albums to include. (The check indicates that an album will
    be included.)


    ![images](images/0704.jpg)


    **Figure 7-4.** *Choosing how to customize **Picture Frame***


    **TIP:** To really control what **Picture Frame** displays, set up an album on
    your computer with only the images you are happy to have everyone see when the
    device is locked. Next, sync that album to your iPad using iTunes. For help with
    this, check out [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes.”


    # Keyboard Options


    You can fine-tune your keyboard by selecting various languages and changing settings
    such as **Auto-Correction** and **Auto-Capitalization** (see [Chapter 2](#Chapter02.html#ch2):
    “Typing Tips, Copy/Paste, & Search” for keyboard options and how to use the various
    features).


    # How to Secure Your iPad with a Passcode


    Your iPad can hold a great deal of valuable information. This is especially true
    if you save information such as the Social Security numbers and the birth dates
    of your family members. It is a good idea to make sure that anyone who picks up
    your iPad can''t access all that information. Also, if your children are like
    ours, they''ll probably pick up your cool iPad and start surfing the Web or playing
    a game. You might want to enable some security restrictions to keep your kids
    safe.


    ## Setting a Passcode to Lock Your iPad


    Touch the **Settings** icon and then the **General** tab in the left column. Now
    scroll down and tap the **Passcode Lock** item.


    Here you have the option of setting a four-digit passcode that prevents unauthorized
    access to your iPad and your information. If the wrong passcode is entered, however,
    even you won''t be able to access your information. So it is a good idea to use
    a code you''ll remember easily or to write it down somewhere secure (see [Figure
    7-5](#Chapter07.html#fig_7_5)).


    Use the keyboard to enter a four-digit code. You will then be prompted to enter
    your code once more.


    ![images](images/0705.jpg)


    **Figure 7-5.** *Enabling security by setting a passcode*


    ## Passcode Options


    Once you have set your passcode, you will be presented with a few options:


    ![images](images/p214-01.jpg)


    **Turn Passcode Off**


    **Change Passcode**


    **Require Passcode** (Immediately, 1 min., 5 min., 15 min., 1 hour, 4 hours)


    **NOTE**: You can also turn off **Simple Passcode**. This enables you to set a
    longer, more secure password with letters, numbers, symbols, and so on.


    **NOTE:** Setting a shorter time for **Require Passcode** is more secure. Setting
    the time to **Immediately** (the default) is the most secure option. However,
    using a setting of one minute may save you the headache of retyping your passcode
    if you accidentally lock your iPad.


    **Picture Frame** (the default is **ON**): Set this to **OFF** to prevent the
    pictures from being seen in **Locked** mode.


    **Erase Data** (the default is **OFF**): If this is set to **ON,** all data will
    be erased after ten unsuccessful attempts to enter the passcode.


    **CAUTION:** You may want to set **Erase Data** to **OFF** if you have young children
    who like to bang away at the security to unlock the keyboard when it comes out
    of **Sleep** mode and is locked. Otherwise, you may end up with your iPad being
    erased frequently.'
