  trans: '好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。



    # 验证您的邮件帐户设置


    请按照以下步骤验证您的帐户设置：


    1.  点击**设置**图标。

    2.  点击**邮件、通讯录、日历**。

    3.  如果您收到来自某个特定电子邮件帐户的错误信息，请触摸该帐户。

    4.  确认**帐户**设置为**开启**。

    5.  确认您的电子邮件**地址**在 **POP 帐户信息**部分是正确的。

    6.  确认**主机名**、**用户名**和**密码**字段中的所有信息都是正确的。

    7.  如果您在尝试发送电子邮件时收到错误信息，问题很可能出在**发件服务器**区域的 **SMTP** 设置中。

    8.  点击 **SMTP** 以调整更多设置。


    ![images](img/p363-01.jpg)


    9.  触摸**主服务器**选项卡，并确保其设置为**开启**。

    10. 在**主服务器**选项卡下方，您会看到用于您的其他电子邮件帐户的其他 SMTP 服务器。一种选择是使用您已知正常工作的其他 SMTP 服务器之一。在这种情况下，只需触摸该服务器的选项卡，并将其开关转到**开启**。


    ![images](img/p363-02.jpg)


    11. 点击**主服务器**地址以查看和调整更多设置。

    12. 确认**主服务器**是**开启**状态。

    13. 联系您的电子邮件服务提供商以验证其他设置，例如**主机名**、**用户名**、**密码**、**SSL**、**身份验证**和**服务器端口**。我们将在后续章节中分享有关这些设置的更多详细信息和一些技巧。

    14. 完成后点击**完成**按钮，然后点击左上角列有您电子邮件帐户的按钮返回上一屏幕。或者，您可以点击**主屏幕**按钮退出到您的**主屏幕**。


    ![images](img/p364-01.jpg)


    ### 使用 SSL


    某些 SMTP 服务器需要使用安全套接字层（“SSL”）安全性。如果您在发送电子邮件时遇到问题，并且**使用 SSL** 开关设置为**关闭**，请尝试将其设置为**开启**，看看是否有帮助。


    ### 更改身份验证方法


    在 SSL 开关下方是一个**身份验证**选项卡。通常，**密码**是该开关的正确设置。我们不建议您更改此设置，除非您的电子邮件服务提供商有具体指示要求更改。


    ![images](img/p364-02.jpg)


    ### 更改服务器端口


    通常情况下，当您配置电子邮件帐户时，服务器端口会自动为您设置。但有时，可能需要根据您的互联网服务提供商 (ISP) 进行一些微调。


    如果您从 ISP 那里获得了特定设置，您可以更改服务器端口，以尝试解决您可能遇到的任何错误。请按照以下步骤更改**服务器端口**设置：


    1.  返回到您帐户的特定 **SMTP** 设置。

    2.  触摸**主服务器**的选项卡，就像您在“验证邮件帐户设置”部分中所做的那样。

    3.  向下滚动到**服务器端口**，并触摸屏幕上显示的数字。

    4.  这将会弹出一个键盘，您可以使用它输入一个新的端口号（由您的 ISP 提供）。大多数情况下，ISP 提供的端口号是 995、993、587 或 110；但是，如果给您的是不同的数字，直接输入即可。

    5.  完成后，触摸左上角的 **SMTP** 选项卡返回上一屏幕。


    # 第 14 章


    # 使用通讯录


    您的 iPad 让您可以立即访问所有重要信息。就像您的电脑或智能手机一样，您的 iPad 可以存储数千个联系人以便快速检索。在本章中，我们将向您展示如何添加新联系人（包括如何从电子邮件地址添加），如何通过添加新字段来自定义您的联系人，如何通过群组来组织您的联系人，如何快速搜索或浏览联系人，甚至如何使用
    iPad 上的**地图** App 来显示联系人的位置。我们还将向您展示如何自定义您的**通讯录**视图，使其按照您喜欢的方式进行排序和显示。最后，您将学习一些故障排除技巧，当您遇到困难时，这些技巧可以为您节省时间。


    iPad 的美妙之处在于它如何集成您的所有应用程序，因此您可以直接从**联系人**录入屏幕发送电子邮件和定位您的联系人。


    ## 将联系人加载到 iPad 上


    在第 3 章：“使用 iTunes 同步您的 iPad”中，我们向您展示了如何使用 Mac 或 Windows 电脑上的 **iTunes** App 将联系人加载到
    iPad 上。您也可以使用第 4 章：“其他同步方法”中描述的 Exchange (Active Sync) 或 MobileMe 服务。


    ## 您的通讯录何时最有用？


    当满足以下两个条件时，**通讯录** App 最有用：


    1.  其中包含大量姓名和地址。

    2.  您能够轻松找到所需内容。


    ### 改进通讯录的两个简单规则


    我们有几条基本规则，可以帮助您使 iPad 上的**通讯录**列表更有用。


    **规则 1：将所有内容都添加到通讯录 App 中。**


    > 您永远不知道什么时候会需要那个不起眼的餐馆名称、那个水管工的电话号码或其他商业或专业联系人的信息。


    **规则 2：在添加条目时，务必考虑将来如何找到它们（名字、姓氏、公司）。**


    > 我们在本章中提供了许多提示和技巧，帮助您输入姓名，以便在需要时可以立即找到它们。


    **提示：** 以下是查找餐馆的一个好方法：每当您将一家餐馆输入到**通讯录**列表时，请务必将“restaurant”这个词放入公司名称字段，即使它本身不是餐馆名称的一部分。然后，当您输入字母“rest”时，您应该立即能找到所有的餐馆！


    ## 直接在 iPad 上添加新联系人


    您始终可以在 iPad 上直接添加联系人。当您远离电脑——但随身带着 iPad——并且需要将某人添加到您的**通讯录**列表时，这非常方便。操作非常简单；我们将在下一节中向您展示如何操作。


    ![images](img/p368-01.jpg)


    ### 点击加号添加联系人


    从您的**主屏幕**开始，触摸**通讯录**图标，您将看到**所有联系人**列表（参见图 14-1）。点击**通讯录**列表右下角的**加号 (+)** 以添加新联系人。


    ![images](img/p368-02.jpg)


    ![images](img/1401.jpg)


    **图 14-1.** *在 iPad 上输入联系人*


    点击任一字段（名、姓、公司等）以输入信息。


    **提示：** 请记住，**通讯录**列表的搜索功能会使用名字、姓氏和公司字段。当您添加或编辑联系人时，在公司字段中添加一个特殊关键词可以帮助您以后找到特定联系人。例如，在公司字段中添加“Cece
    的朋友”这个词，可以使用搜索功能快速找到 Cece 的所有朋友。


    ### 添加新字段和更改标签


    您会注意到，添加联系人的初始屏幕只显示几个用于输入信息的字段：移动（电话号码）、电子邮件（电子邮件地址）、主页（网页地址）、添加新地址（街道地址）、备注和添加字段。


    Apple 特意这样做是为了让屏幕不那么杂乱。您会注意到，当您开始输入电话号码、电子邮件地址或街道地址时，在您正在输入的字段下方会立即出现一个新字段。这使您可以轻松添加多个项目。如果您愿意，可以点击字段名称（例如，移动）并将其更改为其他名称（例如，住宅或工作）。


    ![images](img/p370-01.jpg)

    '
- fmt: '### Adding a Contact Photo


    It''s easier to identify people with pictures, so you may want to add pictures
    for your contacts, where available. To add a photo to a contact, tap the **add
    photo** button next to the First and Last fields.


    ![images](images/p370-02.jpg)


    If you are changing a photo, you''ll see **edit** at the bottom of the existing
    photo when you are in “edit contact” mode.


    After you touch the **add photo** button, you''ll see that you can do the following:


    ![images](images/p370-03.jpg)


    - **Take a Photo** (for iPad 2 with its camera)

    - **Choose a Photo**


    If there''s a photo already in place, you will also see these options:


    - **Edit a Photo**

    - **Delete a Photo**


    If you select **Choose Photo**, then you will be able to navigate to one of your
    photo albums and select a photo by tapping it.


    ![images](images/p371-01.jpg)


    You''ll notice that the top and bottom of the photo become grayed out and that
    you can manipulate the picture by dragging it around with your finger. You can
    also pinch to zoom in or out.


    Once the picture is sitting where you want it, just touch the **Use** button in
    the upper-right corner and that picture will be set for the contact.


    ### Adding a New Phone Number


    Tap in the Phone field and use the number keys to type the phone number.


    ![images](images/p371-02.jpg)


    **TIP:** Don''t worry about parentheses, dashes, or dots; the iPad will put the
    number into the correct format. Just type the digits of the area code and number.
    If you know the country code, it''s a good idea to put that in, as well.


    Let''s say that this the phone number you just typed is not a mobile phone, but
    some other type of phone. The good news is that you can change it. Tap the label
    of the field—**mobile**, in this case—and change the label to **home**, **work**,
    or some other type (see [Figure 14–2](#Chapter14.html#fig_14_2)).


    ![images](images/1402.jpg)


    **Figure 14–2.** *Changing the field label of the phone number*


    **TIP:** Sometimes you need to add a pause to a phone number. For example, you
    might need to do so when the phone number is for someone at an organization where
    you have to dial the main number and then an extension. This is easy to do on
    the iPad. You just add a comma between the main number and the extension, like
    this:


    `386-555-1234, 19323`


    If you dialed this number (from your iPhone, for example), the phone would dial
    the main number, pause for two seconds, and then dial the extension. If you need
    more of a pause, you would simply add more commas.


    ### Adding Email Addresses and a Web Site Address


    Tap the **Email** tab and enter the email address for your contact. You may also
    be able to tap the label to the left of the email address and select whether this
    is a home, work, or other email address (sometimes you cannot change this label,
    depending on what type of contact system you are synchronizing with).


    Under the Email field, you''ll also find a home page field in which you can enter
    the address of your contact''s web site.


    ![images](images/p373-01.jpg)


    ### Adding New Contact Fields


    If you need to add more fields to the contact entry, just tap the **add field**
    button at the bottom of the **Contact** entry screen.


    Next, select any of the available fields to add to that particular contact.


    For example, to add a Birthday field to this contact, just touch **Birthday**.


    ![images](images/p373-02.jpg)


    When you touch **Birthday**, you''re presented with a wheel. You can turn the
    wheel to the corresponding date to add the birthday to the contact information.


    ![images](images/p374-01.jpg)


    **TIP:** Suppose you''ve met someone at the bus stop—someone you want to remember.
    Of course you should enter your new friend''s first and last name (if you know
    it). But you should also enter the words “bus stop” in the Company field. Then,
    when you type the letters “bus” or “stop,” you should instantly find everyone
    you''ve met at the bus stop, even if you can''t remember their names!


    ### Adding the Street Address


    To add a street or physical address, tap the add new address field. You will see
    all the required fields appear on the screen (Street, City, State, Zip Code, and
    Country). As you did with the phone number, you can change the label to show whether
    this is a home, work, or other address.


    When you are done, just touch the **Done** button in the upper-right corner of
    the **New Contact** form.


    ![images](images/p374-02.jpg)


    **TIP:** If you''ve just moved into a new neighborhood, it can be quite daunting
    to remember everyone''s name. A good practice to follow is to add the word “neighbor”
    into the Company field for every neighbor you meet. Then, to instantly call up
    all your neighbors, simply type the letters “neigh” to find everyone you''ve met!'
