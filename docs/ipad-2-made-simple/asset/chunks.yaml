- fmt: '#### USA Today App


    `USA Today` app has a very similar look and feel to the print version of its daily
    newspaper. Touch the `USA Today` icon and you will be taken to the `Home` section
    of the paper. One of the first things you will notice is a group of rotating stories
    along the top of the screen.


    ![images](images/p620-01.jpg)


    The main stories are listed along the right-hand side. You can scroll through
    these stories; when you find a story you wish to view, just touch the headline.


    When you are in the `Article View` mode, you can adjust the font size by touching
    the `Font Size` icon in the upper-right corner. You can also e-mail the article
    by touching the `Share` icon and touching `E-mail` from the dropdown-box list.


    If an article is more than one page long, you can scroll upwards to continue reading
    the article. Sliding the screen from right to left will advance you to the next
    article.


    ![images](images/p620-02.jpg)


    **TIP:** If you touch the `Weather` box, you can customize it for your local weather
    by entering a city name or zip code.


    To go to back to the `Home` screen, touch the `Newspaper` icon in the upper-left
    corner.


    ![images](images/p620-03.jpg)


    To go to another section of the paper, touch the `USA Today` icon at the top-left
    corner of the `Home` page, and then choose either `Money`, `Sports`, `Life`, `Tech`,
    or `Travel` to advance to that section of the paper. To go back, touch the same
    icon in the upper-left corner.


    There are currently no locked articles or subscriptions required to use the `USA
    Today` app, but this may change at some point in the future.


    ![images](images/p621-01.jpg)


    ### Magazines on the iPad


    It is no secret that both newspapers and magazines have suffered declines in readership
    over the last few years. The iPad offers a totally new way of reading magazines
    that might just give the industry the boost it needs.


    **NOTE**: Soon, all current magazine apps will be required to switch to the new
    (iOS 4.3) subscription model. As a consequence, in-app purchase of individual
    issues may remain, but subscription offers will likely be added (and some publishers
    may pull their apps and leave the store instead).


    Pictures are incredibly clear and brilliant on magazines for the iPad. Navigation
    is usually easy, and stories seem to come to life—much more so than in their print
    counterparts. Imagine adding video and sound integration right into the magazine,
    and you can see how the iPad truly enhances the magazine-reading experience.


    Some magazines, such as *Time Magazine*, also include links to live or frequently
    updated content. These might be called `Newsfeeds`, `Live Edition`, or `Updates`.
    Check for them in the magazine you purchase—these will give you the most up-to-date
    information.


    **TIP:** Make sure to check the user ratings for a magazine or other app before
    you purchase it. Doing so may save you some grief and/or some money!


    The App Store is filled with both individual magazines that can be purchased (or
    limited content that can be viewed for free) and magazine readers that provide
    a sampling of many magazines, allowing you to subscribe to weekly or monthly delivery
    of a given magazine from your iPad.


    More and more magazines are offering digital editions in the App Store. *Time*,
    *Newsweek*, *Wired*, *Outside*, *GQ* have such editions, and many more seem to
    be popping up each day.


    One magazine with strong reviews is `Time Magazine for the iPad`, which is free
    to download. It includes sample content as well as in-app purchases that can be
    made on a per-issue basis. Most issues retailed for US $4.99 at the time of writing.


    ![images](images/p622-01.jpg)


    Unlike when using other media, you don''t touch an article to read the magazine;
    instead, you simply slide from screen to screen paging through the magazine.


    To make the text more viewable, `Pinch` and `Zoom` both work in many of the magazine
    apps.


    Many magazines are for sale in the App Store, including *Popular Science*, *Men''s
    Health*, *WIRED*, *Outside*, *GQ*, *Time*, and others. Most are priced from $2.99
    to $4.99 per issue.


    ![images](images/p623-01.jpg)


    #### Navigating Around Magazines


    As [Figure 26–2](#Chapter26.html#fig_26_2) shows, there are various types of home
    pages, depending on the magazine. This example shows the `Time Magazine` app and
    the `Newsweek` app side-by-side.


    The `Newsweek` app gives you some free content to browse, whereas the `Time Magazine`
    app lets you *preview* issues and then buy content.


    ![images](images/2602.jpg)


    **Figure 26–2.** *Pages from the `Time Magazine` and `Newsweek` apps*


    #### The Zinio Magazine App—a Sampler


    One app, `Zinio`, takes a unique approach. The `Zinio` app is free in the App
    Store, giving you a sampling of more than 20 magazines. Each sample has a few
    full articles to read. Reading an article in `Zinio` requires following a few
    simple steps:


    1. Begin by touching the cover of the magazine you wish to read.

    2. Next, touch the screen and you will see a sliding bar across the bottom that
    shows screen shots of the articles available for free.

    3. To advance pages, slide the screen from right to left or touch the image along
    the bottom bar to jump to that page.

    4. Some magazines will be giving away full, free issues. Just touch the `Featured`
    button at the bottom to see what is available for the week. Touch the magazine
    cover to download the issue.

    5. Touch the `Library` button to see those issues stored in your library for viewing.


    ![images](images/p625-01.jpg)


    This image is from a free issue of *Car and Driver*; it was available for download
    in the week we composed this chapter.


    To subscribe to any of the magazines featured in `Zinio`, touch the `Shop` button
    at the bottom right of the screen.


    ![images](images/p626-01.jpg)


    You can navigate magazines by category along the left-hand side, or you can slide
    the icons at the bottom to see available magazines.


    There are many popular magazines from which you can choose. The categories cover
    everything from art to sports and much more. Prices vary, but you will often find
    a price for a single issue and a price for a yearly subscription.


    For example, at the time of writing the newest issue of *Popular Mechanics* was
    $1.99 on `Zinio`, with a yearly subscription of $7.99.


    Some of the subscriptions make great sense. A single issue of *Bike Magazine*
    (one of my favorites) was $5.99 at the time of writing, but a yearly subscription
    was only $9.00.


    A closer look showed me that there were more than 16 cycling magazines that one
    could subscribe to.


    ![images](images/p626-02.jpg)'
