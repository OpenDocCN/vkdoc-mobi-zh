  trans: "\n#### 重新连接之前加入的 Wi-Fi 网络\n\niPad 的妙处在于，当你回到某个之前加入过 Wi-Fi 网络的区域时（无论是开放网络还是需要密码的安全网络），你的\
    \ iPad 会自动加入该网络，无需你再次输入密码或提供其他连接信息。当然，你也可以自由关闭此自动加入功能，具体方法将在下一节介绍。\n\n##### 询问是否加入网络\n\
    \n默认情况下，`询问是否加入网络`开关设置为`开`，这意味着你会自动加入已知或可见的 Wi-Fi 网络。如果有你不认识的可用网络，系统会先询问你是否连接。\n\
    \n| 如果开关设置为`关`，你只会自动连接到已知网络，并且必须按照我们之前描述的手动加入未知网络步骤进行操作。为何有人会关闭自动加入网络功能？例如，如果你不想让孩子在不知情的情况下用\
    \ iPad 加入无线网络，这可能是一个很好的安全措施。 | ![图片](img/p189-01.jpg) |\n\n##### 忽略（或删除）网络\n\n\
    如果你发现不想再连接到列表中的某个网络，你可以“忽略”它，即将其从网络列表中移除。请按以下步骤操作：\n\n1.  在`设置`应用的`Wi-Fi`屏幕中，点击该网络旁边的`蓝色`小箭头。随后出现的屏幕会显示该特定连接的详细信息（见图\
    \ 5-4）。\n2.  点击屏幕顶部的`忽略此网络`。\n3.  系统会弹出警告提示。点击`忽略网络`，该网络将不再显示在你的列表中。\n\n![图片](img/0504.jpg)\n\
    \n**图 5-4.** *如何忽略 Wi-Fi 网络*\n\n### 3G 蜂窝数据连接\n\n如果你拥有 3G iPad，你还可以连接到蜂窝数据网络；这与\
    \ iPhone 或其他手机连接的是同一网络。以下是关于蜂窝数据连接需要考虑的一些事项：\n\n*   3G 蜂窝网络的覆盖范围比 Wi-Fi 更广——你可以在汽车内或远离城市的地方连接\
    \ 3G，而这些地方通常没有 Wi-Fi。\n*   使用蜂窝数据网络需要支付额外的月服务费。\n*   在美国，根据你购买的 iPad 型号不同，你有两种蜂窝数据选择：AT&T\
    \ 和 Verizon。\n    *   AT&T 当前套餐：每月 250MB 收费 15 美元，每月 2GB（约 2000 MB）收费 25 美元。\n\
    \    *   Verizon 当前套餐：每月 1GB 收费 20 美元，每月 3GB 收费 35 美元，每月 5GB 收费 50 美元，每月 10GB\
    \ 收费 80 美元。\n\n以下是使用 1GB 无线数据可以做的事情：\n\n*   浏览 6,500 个网页\n*   下载 300 首歌曲\n*  \
    \ 观看 65 个 YouTube 视频\n*   下载 2,000 张照片\n\n**注意：** 英国 Orange、英国 Vodafone、O2、加拿大\
    \ Rogers 及其他国际运营商可能提供不同的定价方案。\n\n#### 设置你的 3G 连接\n\n在连接到 3G 蜂窝网络之前，你需要从无线运营商处购买蜂窝数据套餐。如前所述，在美国，目前你为\
    \ iPad 选择的运营商是 AT&T 和 Verizon。\n\n**提示：** 你可以通过以下方法节省蜂窝数据套餐的费用：\n\n*   尽可能使用 Wi-Fi。\n\
    *   从成本较低、容量较小的蜂窝数据套餐开始。\n*   整月监控你的蜂窝数据用量，确保不会超出低成本数据套餐的限制。\n\n你可能会发现，如果大多数数据需求都使用\
    \ Wi-Fi，那么低成本套餐就够用了。\n\n请按照以下步骤连接到蜂窝数据网络：\n\n1.  点击 iPad 上的`设置`图标。\n2.  点击左侧栏中的`蜂窝数据`。\n\
    3.  将`蜂窝数据`旁边的开关设置为`开`（见图 5-5）。\n4.  首次执行此操作时，会弹出一个窗口要求你设置账户：\n    1.  输入你的个人信息、用户名和密码，这些信息仅用于这个新的蜂窝数据套餐。此账户与你的电子邮件账户、手机套餐或任何其他账户无关，因此你可以输入相同的信息，也可以设置不同的信息。\n\
    \n        **注意：** 在本书出版时，美国的无线运营商（AT&T 和 Verizon）提供定期计费套餐。这意味着你只需设置一次套餐，之后每月都会扣费，直到你取消套餐为止。\n\
    \n    2.  向下滚动查看屏幕其余部分，轻点屏幕选择你的数据套餐。\n    3.  输入你的信用卡信息。\n5.  点击`下一步`按钮。\n\n \
    \   ![图片](img/0505.jpg)\n\n    **图 5-5.** *购买蜂窝数据套餐*\n\n6.  在下一个屏幕上，你需要滑动到协议底部，并点击`同意`才能继续——当然，前提是你同意该协议。\n\
    7.  如果你要携带 iPad 出行，点击`添加国际数据`并按照下一节的步骤操作。\n\n    ![图片](img/p193-01.jpg)\n\n8.\
    \  如果此时不想添加国际套餐（你可以随时稍后添加），点击`提交`完成操作。\n9.  点击`提交`后，你会看到一个类似下方的窗口。点击`确定`关闭窗口。\n\
    \n    ![图片](img/p193-02.jpg)\n\n10.  最后，当你的新蜂窝数据套餐设置完成后，你会看到类似下方的弹出消息。\n\n   \
    \ ![图片](img/p193-03.jpg)\n\n#### 添加国际数据套餐\n\n如果你计划外出旅行，可能想为 iPad 添加一个国际数据套餐。只需按照以下步骤即可轻松操作：\n\
    \n**注意：** 并非所有运营商都为你的 iPad 提供国际漫游套餐。请与你的运营商确认以确保能购买到套餐。如果不行，你可能需要考虑在出国期间关闭 3G\
    \ 连接，只使用免费的 Wi-Fi。\n\n1.  点击`设置`图标。\n2.  点击左侧栏中的`蜂窝数据`。\n3.  点击右侧栏中的`查看账户`。\n\
    4.  输入你在创建此账户时使用的蜂窝数据用户名和密码登录账户。\n5.  点击`添加国际套餐`（见图 5-6）。\n6.  在`国际数据套餐`窗口中执行以下操作：\n\
    \    1.  选择你的`一次性国际套餐`。\n    2.  调整你的套餐`开始日期`以匹配你的旅行需求。\n    3.  点击底部的`查看所有支持国家/地区列表`链接，确认该套餐支持你所需的国家/地区。\n\
    \    4.  点击`完成`。\n    5.  你可能需要在下一个屏幕上确认你的选择。\n\n![图片](img/0506.jpg)\n\n**图 5-6.**\
    \ *购买国际蜂窝数据套餐*\n"
- fmt: '# Monitoring Your Cellular Data Usage and Changing Your Plan


    If you purchase the limited-use data plan (the $15 plan for 250MB/month), you
    will want to check periodically to see how much data you are using on a daily
    basis.


    To do this, follow these steps:


    1. Tap the `Settings` icon.

    2. Tap `Cellular Data` in the left column.

    3. Tap `View Account` in the right column.

    4. Log in to the account by entering the cellular data username and password you
    used when you created this account (see [Figure 5-6](#Chapter05.html#fig_5_6)).

    5. Look at your `data plan`, `status`, and `billing period` listed in the `Account
    Overview` section at the top. You will only see actual data usage in megabytes
    (MB) if you have purchased a plan that limits the amount of data you can use (e.g.,
    250 MB).

    6. If you want to change your plan or add data, then tap `Add Data or Change Plan`
    and follow the steps presented to adjust your plan.


    **NOTE:** Your iPad will notify you when you have 20%, 10%, and 0% of data usage
    left on your 250MB plan. You''ll also have the option to renew that plan for another
    $14.99 or upgrade to the $30 unlimited plan.


    ## International Travel—How to Avoid Large Cellular (3G) Data Roaming Bills (for
    3G iPad Models Only)


    We''ve heard of people who traveled to another country being surprised with $300
    or $400 of monthly roaming charges after their trip. You can avoid these charges
    by taking a few easy steps before and during your trip:


    1. Try to use your Wi-Fi connection at free Wi-Fi networks overseas; this will
    keep your cellular data roaming charges to a minimum.

    2. Sign up for a one-time international data plan, as explained earlier in the
    “Adding an International Data Plan” section. In most cases, activating the international
    data plan allows you to save some money over the standard data roaming charges.

    3. Learn about any potential data roaming charges. Check with your cellular data
    supplier about any data roaming charges. You can try searching on your phone company''s
    web site, but usually you''ll have to call the help desk and specifically ask
    what the iPad data roaming charges are for the country or countries you''ll be
    visiting. If you plan to use email, mapping, web browsing, or any other data services,
    you should specifically ask about whether any of these services are charged separately.


    Explore buying and using a foreign SIM Card (MicroSIM format).


    Your iPad cellular data supplier may not offer special deals on international
    data roaming plans or may have rates that are unreasonably high. In such cases,
    you can insert a SIM card that you''ll purchase in the foreign country.


    **CAUTION:** The iPad uses a MicroSIM, and almost all other phones use a MiniSIM.
    This may make it hard to find an international carrier with a SIM card that will
    fit.


    Often, inserting a SIM card for the country you''re in will eliminate or greatly
    reduce data roaming charges. However, do carefully check the cost of data on that
    foreign SIM card. Using a foreign SIM card may save you hundreds of dollars, but
    it''s best to do some Web research or try to talk to someone who recently traveled
    to the same country to make sure.


    ## Airplane Mode—Turn Off 3G and Wi-Fi


    Often when you are flying on an airplane, the flight crew will ask you to turn
    off all portable electronic devices for takeoff and landing. Then, when you get
    to altitude, the crew will say “all approved electronic devices” can be turned
    back on.


    You can turn off the iPad by pressing and holding the power button on the top
    right edge, then `Slide to Power Off` with your finger.


    If you have a 3G/cellular data iPad, then you can turn on `Airplane Mode` in the
    `Settings` icon as follows:


    1. Tap the `Settings` icon.

    2. Set the switch next to `Airplane Mode` in the top of the left column to `ON`.


    ![Image](images/p197-01.jpg)


    **TIP:** Some airlines have in-flight Wi-Fi networks; in that case, you will want
    to leave your Wi-Fi turned `ON`.


    You can turn your `Wi-Fi` connection `OFF` or `ON` by following these steps (see
    [Figure 5-7](#Chapter05.html#fig_5_7)):


    1. Tap the `Settings` icon.

    2. Tap `Wi-Fi` in the top of the left column.

    3. Set the switch next to `Wi-Fi` in the top of the right column to `OFF`.


    ![images](images/0507.jpg)


    **Figure 5-7.** *How to Turn Wi-Fi `OFF` or `ON`.*


    # Chapter 6


    # Organize Your iPad Icons and Folders


    Your new iPad is very customizable. In this chapter, we''ll show you how to move
    icons around and put your favorites just where you want them. You''ve got up to
    11 pages of icons to work with, and you can adjust the look-and-feel of those
    pages so it suits your tastes.


    Like a Mac computer or an iPhone, the iPad has a *Bottom Dock* where you can put
    the icons for your favorite apps. Your iPad comes with four standard icons in
    the Bottom Dock, but you can replace these with others so your favorite apps are
    always available at the bottom of your screen. You can also add two more icons
    for a total of six items in the Bottom Dock. You can even move an entire folder
    of apps to the Bottom Dock.


    **TIP**: You can also move or delete icons using iTunes on your computer. Check
    out [Chapter 29](#Chapter29.html#ch29): “Your iTunes User Guide” for more information.


    ## Moving Icons to the Bottom Dock—Docking Them


    When you turn your iPad on, you''ll notice the four icons locked to the Bottom
    Dock: `Safari`, `Mail`, `Photos`, and `iPod`.


    It is possible that your icons may be different, but you can easily change them.


    Suppose you decide you want to swap out one or more of the existing icons for
    apps you use more often. Fortunately, moving icons to and from the Bottom Dock
    is easy.


    If you prefer, you can keep the standard four and add two more for a total of
    six icons in the `Bottom Dock`.


    ![images](images/p200-01.jpg)


    ### Starting the Move


    Press the `Home` button to get to your `Home` screen. Now, touch and hold any
    icon on the `Home` screen for a couple of seconds. You''ll notice that all the
    icons start to shake.


    Try moving just a couple of icons around at first. You''ll see that when you move
    an icon down, the other icons in the row move to make space for it.


    Once you have a feel for how the icons move, you''re ready to replace one of the
    Bottom Dock icons with one of your choosing. While the icons are shaking, take
    the icon you want to replace from the Bottom Dock and move it up to an area covered
    by other icons. If you move it to a large blank area, it will jump back to the
    dock.


    **NOTE**: You can have up to six icons in the Bottom Dock; if you already have
    six icons there, you''ll have to remove one to replace it with a new one.


    Suppose you want to replace the standard `iPod` icon with your `App Store` icon.
    The first thing to do is hold the `Music` icon and move it up a row—out of the
    Bottom Dock, as shown in [Figure 6-1](#Chapter06.html#fig_6_1).


    To stop the icons from shaking, tap your `Home` button.


    ![images](images/0601.jpg)


    **Figure 6-1.** *Swapping icons in the Bottom Dock*


    Next, locate your `App Store` icon and move it to the Bottom Dock. As you do this,
    the icon will become sort of transparent until you actually set it into place.


    When you are sure you have the icons just where you want them, press the `Home`
    button once and the icons will lock into place. Now you have the `App Store` icon
    in the Bottom Dock, where you want it.'
