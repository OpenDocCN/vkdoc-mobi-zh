- fmt: '#### Starting the Video Recorder


    The software for the video recorder is actually part of the **Camera** app (see
    [Figure 17–1](#Chapter17.html#fig_17_1)). Follow these steps to use the built-in
    video recorder:


    1.  Start the **Camera** app (see [Chapter 16](#Chapter16.html#ch16): “iPad Photography”
    for more information on how to do this).

    2.  Move the slider in the lower-right corner from the **Camera** icon to the
    **Video Recorder** icon.

    3.  Try to keep the iPad steady as you record your scene.

    4.  Touch the **Stop** button when you are done recording.


    ![images](images/1701.jpg)


    **Figure 17–1.** *The layout and controls of the video recorder*


    ##### Adjust Point of White Balance


    The iPad video camera is fixed focus. You can adjust the point of white balance
    of the video based on the subject. Follow these steps to take advantage of this
    feature:


    1.  To focus on something in the foreground of the video, touch the screen in
    the foreground. This brings up a small box that shows the area of white balance.

    2.  To switch the white balance to a subject in the background, touch another
    part of the screen. The box will temporarily display the new area of white balance.


    ##### Trimming the Video


    The iPad allows you to perform edits on your video right on the phone. Once the
    video has been recorded and you press the **Stop** button, the video immediately
    goes into your **Camera Roll**.


    Touch the small image of the video in the lower-left corner to bring up the video.
    At the top of the screen, you will see a timeline with all the frames of your
    video at the top of the screen (see [Figure 17–2](#Chapter17.html#fig_17_2)).
    Follow these steps to edit your just recorded video:


    1.  Drag either end of the timeline and you will see that the video goes into
    **Trim** mode.

    2.  Drag the ends of the video on either end until it is the length you desire.

    3.  When the video is the correct length, touch the **Trim** button in the upper-right
    corner.

    4.  Next, select either **Trim Original** or **Save as New Clip**. The latter
    option saves another version of the newly trimmed video.


    ![images](images/1702.jpg)


    **Figure 17–2.** *Trimming a video*


    **NOTE**: Videos are much larger than pictures; make sure you keep an eye on your
    storage space if you save many videos to the **Camera Roll**.


    ##### Sending the Video


    As with photos, you have several options for using your iPad to send recorded
    video to others. Follow these steps to send a video from your iPad:


    1.  Touch the **Send** icon ![images](images/p444-01.jpg) in the upper-right corner.

    2.  Choose your preferred option for sending the video: **Email**, **MMS**, **MobileMe**,
    **YouTube**, or **Copy**.

    3.  The next screen you see will depend on the choice you made in Step 2. If you
    selected **Email**, your **Email** app will launch.


    ##### Uploading to YouTube


    The iPad allows you to upload an HD (720p) video right to your **YouTube** account.
    You just need to be connected to a Wi-Fi network. Follow these steps to upload
    a video to YouTube:


    1.  Locate the video you wish to upload in your **Camera Roll**.

    2.  Touch the **Send** icon.

    3.  Choose **Send to YouTube**.

    4.  Enter a title, description, and *tags* for the video.

    5.  Choose Standard Definition or HD.

    6.  Choose a category for the video.


    ![images](images/1703.jpg)


    **Figure 17–3.** *Uploading a video to YouTube*


    **NOTE**: To upload a video to MobileMe or YouTube, you need to have an account
    with the site you want to upload to (see [Chapter 4](#Chapter04.html#ch4): “Other
    Sync Methods” to learn more about MobileMe).


    #### Using iMovie


    Mac users have been enjoying the **iMovie** app for years. This app lets you combine
    movie clips with pictures and music, enabling you to add fancy transitions between
    scenes to make a professional-looking movie.


    ![images](images/p445-01.jpg)


    One great feature of the new iPad is that users can enjoy the power of **iMovie**
    right on their iPad. The **iMovie** app is a US $4.99 download from the App Store.
    It is usually listed under either the **Featured** apps or the **Enhanced for
    iPad 2** apps sections. You can also just search the App Store for “iMovie” to
    go straight to the download page (see [Chapter 21](#Chapter21.html#ch21): “The
    Amazing App Store” for more information on searching the App Store for content).


    ![images](images/p446-01.jpg)


    #### Getting Started with iMovie


    The **iMovie** app works with projects. If you have stored projects, they appear
    on the **Projects** page. This will most likely be your first time using the app,
    so you won''t have any projects. Follow these steps to start an **iMovie** project:


    1.  Tap the **Plus sign** icon ![images](images/p446-02.jpg) to start a new project.

    2.  Touch the **Settings** icon and select a theme for the project. Glide through
    the available themes. Current themes include **Modern**, **Bright**, **Travel**,
    **Playful**, **Neon**, **Travel**, **Simple**, **News**, and **CNN Report**.

    3.  Select **Theme Music ON** if you want to use specific music designed for that
    theme.

    4.  Tap one of the **Insert Media** icons to choose media for your movie. To choose
    a video, touch the **Video** soft key at the left. To choose photos, touch the
    **Photos** soft key next to it. Finally, to choose a sound track from your own
    music files, touch the **Audio** soft key and navigate to the song desired (see
    [Figure 17–4](#Chapter17.html#fig_17_4)).


    ![images](images/1704.jpg)


    **Figure 17–4.** *Choosing media to add to your **iMovie** project*


    ##### Constructing Your Movie


    Creating a movie in **iMovie** is as simple as adding new content, transitions,
    and audio. Follow these steps to build your movie:


    1.  Tap the **Insert Media** button again and choose a movie clip or photo from
    your **Photos** app.

    2.  Adjust the length of the clip by moving the **Yellow Dots** at either end
    towards the center. Notice the time of the clip changes as it is adjusted.

    3.  Tap the **Blue Arrow** when you are ready to add the clip to the Project timeline.

    4.  Add another video clip or photo to the timeline, repeating the steps described
    previously.

    5.  There is now a small **Double Arrow** icon between the different media in
    the project. This is the **Transition** icon. Double-tap the **Transition** icon
    to bring up the **Transitions Settings** menu (see [Figure 17–5](#Chapter17.html#fig_17_5)).

    6.  Choose a transition (currently there are only three choices: **None**, **Cross
    Dissolve**, and **Theme**).

    7.  Choose a transition length. These can range from .5 seconds to 2.0 seconds.

    8.  Next, touch either the **Up Arrow** or **Down Arrow** below the **Transition**
    icon to adjust the overlap and transition from one clip or photo into another.

    9.  Touch the **Transition** icon to exit the menu.

    10.  Add music by touching the **Audio** button and choosing a soundtrack from
    your **Music** library.

    11.  Touch the **Waveform** button to see the actual audio waveforms and where
    they will be in the video.

    12.  Touch the **Record** button to add a voice over recording to the video.


    ![images](images/1705.jpg)


    **Figure 17–5.** *Adding transitions to the **iMovie** project*


    Follow these steps to preview the movie:


    1.  Slide the **Timeline** control at the bottom to the beginning, and then touch
    the **Play** ![images](images/p448-01.jpg) button.

    2.  When you are done, touch the **MyProjects** ![images](images/p448-02.jpg)
    button in the top center of your screen. This will return you to the **Projects**
    screen.'
