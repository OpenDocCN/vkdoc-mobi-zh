    \nIf you don't have the latest version of the Mac system software, you'll have\
    \ to install it and configure the MobileMe software to sync to the MobileMe cloud\
    \ to get started.\n\n1.  Click on the **Apple menu** and select **Software Update**\
    \ as shown.\n\n    **TIP**: You'll find extensive step-by-step instructions showing\
    \ you how to install or upgrade software on your Mac in Chapter 30: “Your iTunes\
    \ User Guide.”\n\n    ![images](images/p170-01.jpg)\n\n2.  Follow the steps to\
    \ complete the software update.\n3.  After you have successfully installed the\
    \ software update, click on the **Apple menu** and select **System Preferences**.\n\
    \n    ![images](images/p170-02.jpg)\n\n4.  Click on the **MobileMe** icon in the\
    \ Internet & Wireless section of System Preferences.\n\n    ![images](images/p171-01.jpg)\n\
    \n5.  Enter your MobileMe **Member Name** and **Password**.\n6.  Click **Sign\
    \ In**.\n\n    ![images](images/p171-02.jpg)\n\n7.  Click the **Sync** tab at\
    \ the top to see the screen shown here.\n8.  Check the box next to **Synchronize\
    \ with MobileMe.**\n9.  Next to this check box is a drop-down for configuring\
    \ the sync frequency. The default is **Automatically**, but you can sync every\
    \ **Hour**, **Day**, **Week**, or **Manually**.\n\n    ![images](images/p171-03.jpg)\n\
    \n10.  To sync bookmarks, check the box next to **Bookmarks** and select your\
    \ **web browser**.\n11.  To sync contacts, check the box next to **Contacts**.\n\
    12.  To sync calendars, check the box next to **Calendars.**\n13.  You can also\
    \ sync various other items by checking them. After you have set up syncing, you\
    \ can configure your iDisk by clicking the **iDisk** tab and completing the screen\
    \ (see [Figure 4–7](#Chapter04.html#fig_4_7)).\n14.  When you are done, close\
    \ the **MobileMe** control panel.\n\n![images](images/0407.jpg)\n\n**Figure 4–7.**\
    \ *MobileMe control panel showing the iDisk tab*\n\nAs soon as you close the MobileMe\
    \ control panel, MobileMe will start sending your selected items—Contacts, Calendars,\
    \ and Bookmarks— to the MobileMe web site.\n\nNow you can skip to the “Multiple\
    \ Ways to Access MobileMe” section while we discuss how Windows users configure\
    \ MobileMe.\n\n#### Set Up MobileMe on Your Windows PC\n\nAfter creating your\
    \ MobileMe account, you need get the software set up on your PC. You will install\
    \ the latest version of iTunes and the MobileMe software on your PC and then configure\
    \ it to sync to the MobileMe cloud to get started.\n\n1.  In your web browser,\
    \ go to [`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html).\n\
    2.  If you don't have iTunes version 10 or later, click the **iTunes** link to\
    \ download it.\n\n    **TIP**: We provide step-by-step instructions for installing\
    \ or upgrading iTunes in Chapter 30: “Your iTunes User Guide.”\n\n    Click the\
    \ link to download the MobileMe Control Panel for Windows.\n\n3.  Click the **Download**\
    \ button on this screen to download the installation file.\n4.  Follow the steps\
    \ on the screen to install the software on your computer.\n\n    ![images](images/p173-01.jpg)\n\
    \n5.  Once the software is installed, start it up by one of these two methods:\n\
    \    *   Clicking on the **MobileMe** icon on your Windows desktop\n    *   Starting\
    \ it from your **Start** button or searching for via the **Windows** icon in the\
    \ lower left corner. Type **MobileMe** and the icon should appear at the top of\
    \ the Start menu under **Programs**. Click it.\n6.  Click the **Sync** tab at\
    \ the top.\n7.  Check the box next to **Sync with MobileMe.**\n8.  Next to this\
    \ check box is a drop-down for the sync frequency. The default is **Automatically**,\
    \ but you can choose to sync every **Hour**, **Day**, **Week**, or **Manually**.\n\
    9.  To sync contacts, check the box next to **Contacts** and select where your\
    \ contacts are stored (such as **Outlook**, **Google Contacts**, **Yahoo!**, or\
    \ **Windows Contacts**). For Google and Yahoo!, you will need to enter your username\
    \ and password by clicking the **Options** button that appears (see [Figure 4–8](#Chapter04.html#fig_4_8)).\n\
    \n    ![images](images/0408.jpg)\n\n    **Figure 4–8.** *MobileMe for Windows\
    \ preferences control panel showing the Sync tab*\n\n10.  To sync calendars, check\
    \ the box next to **Calendars** and select where your Calendars are stored (e.g.,\
    \ **Outlook** or elsewhere).\n11.  To sync bookmarks, check the box next to **Bookmarks**\
    \ and select your computer's web browser (only Safari and Internet Explorer were\
    \ supported for syncing bookmarks at publishing time).\n12.  Click **OK** when\
    \ done.\n\nAs soon as you click **OK**, MobileMe will start sending your selected\
    \ items—Contacts, Calendars, and Bookmarks—to the MobileMe web site.\n\n#### Multiple\
    \ Ways to Access MobileMe\n\nAfter the first sync, you will have at least the\
    \ following three ways to access your synced information:\n\n*   The computer\
    \ where you originally stored your contacts and calendar\n*   The MobileMe web\
    \ site\n*   Your iPad (or other mobile device)\n\nSince you already know how to\
    \ get to the information on your computer, we will focus on how to access information\
    \ from the MobileMe web site and your iPad."
  trans: "\n# 注册 MobileMe 服务（PC 或 Mac）\n\n在注册 iPad 或首次将 iPad 连接到电脑后，Apple 让您能轻松地从\
    \ iTunes 了解 MobileMe。您很可能会看到一则带有“`Try It Free`”按钮的 MobileMe 广告。\n\n如果您使用 iTunes\
    \ 同步 iPad，您还会在“`Info`”标签页顶部看到一个“`Learn More`”按钮（参见图 4–6）。\n\n1. 将 iPad 连接到电脑。\n\
    2. 在 iTunes 左侧导航栏中点击`your iPad`。\n3. 点击顶部的“`Info`”标签页。\n4. 点击 MobileMe 区域中的“`Learn\
    \ More`”按钮。\n\n![images](img/0406.jpg)\n\n**图 4–6.** *从 iTunes 的 Info 标签页开始使用\
    \ MobileMe*\n\n您也可以直接通过 MobileMe 网站进行注册。\n\n1. 输入您的个人信息以设置帐户，然后点击“`Continue`”按钮。接着输入您的账单信息，并点击底部的“`Sign\
    \ Up`”按钮。\n2. 如果所有信息都正确输入，您将看到一个类似下图所示的“`Signup Complete`”屏幕。\n\n   ![images](img/p169-01.jpg)\n\
    \n现在您已成功创建 MobileMe 帐户。接下来，您将在 Mac 或 PC 以及 iPad 上设置 MobileMe。\n\n如果您是 Windows\
    \ PC 用户，请跳至“在 PC 上设置 MobileMe”部分。\n\n# 在 Mac 上设置 MobileMe\n\n创建 MobileMe 帐户后，您就可以在\
    \ Mac 上设置相关软件了。在 Mac 上运行的 MobileMe 软件包含在最新版本的 Leopard（v10.5.8 或更高版本）或 Snow Leopard（v10.6.3\
    \ 或更高版本）操作系统中。\n\n如果您没有最新版本的 Mac 系统软件，则必须先安装它，然后配置 MobileMe 软件以同步到 MobileMe 云端，才能开始使用。\n\
    \n1. 点击“`Apple menu`”并选择“`Software Update`”，如图所示。\n\n   **提示**：您可以在第 30 章“您的 iTunes\
    \ 用户指南”中找到关于如何在 Mac 上安装或升级软件的详细分步说明。\n\n   ![images](img/p170-01.jpg)\n\n2. 按照步骤完成软件更新。\n\
    3. 成功安装软件更新后，点击“`Apple menu`”并选择“`System Preferences`”。\n\n   ![images](img/p170-02.jpg)\n\
    \n4. 在“系统偏好设置”的“Internet 与无线”部分，点击“`MobileMe`”图标。\n\n   ![images](img/p171-01.jpg)\n\
    \n5. 输入您的 MobileMe“`Member Name`”和“`Password`”。\n6. 点击“`Sign In`”。\n\n   ![images](img/p171-02.jpg)\n\
    \n7. 点击顶部的“`Sync`”标签页，查看此处所示的屏幕。\n8. 勾选“`Synchronize with MobileMe`”旁边的复选框。\n\
    9. 此复选框旁边有一个用于配置同步频率的下拉菜单。默认设置为“`Automatically`”，但您也可以选择每“`Hour`”、“`Day`”、“`Week`”同步一次，或选择“`Manually`”。\n\
    \n   ![images](img/p171-03.jpg)\n\n10. 要同步书签，请勾选“`Bookmarks`”旁边的复选框，并选择您的“`web\
    \ browser`”。\n11. 要同步通讯录，请勾选“`Contacts`”旁边的复选框。\n12. 要同步日历，请勾选“`Calendars`”旁边的复选框。\n\
    13. 您还可以通过勾选其他项目来同步它们。设置好同步后，您可以点击“`iDisk`”标签页并完成屏幕操作（参见图 4–7）来配置您的 iDisk。\n14.\
    \ 完成后，关闭“`MobileMe`”控制面板。\n\n![images](img/0407.jpg)\n\n**图 4–7.** *显示 iDisk 标签页的\
    \ MobileMe 控制面板*\n\n关闭 MobileMe 控制面板后，MobileMe 将立即开始将您选定的项目（通讯录、日历和书签）发送到 MobileMe\
    \ 网站。\n\n现在您可以跳至“访问 MobileMe 的多种方式”部分，而我们将在下面讨论 Windows 用户如何配置 MobileMe。\n\n#\
    \ 在 Windows PC 上设置 MobileMe\n\n创建 MobileMe 帐户后，您需要在 PC 上完成软件设置。您需要在 PC 上安装最新版本的\
    \ iTunes 和 MobileMe 软件，然后将其配置为同步到 MobileMe 云端，才能开始使用。\n\n1. 在您的网页浏览器中，前往 [`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html)。\n\
    2. 如果您没有 iTunes 10 或更高版本，请点击“`iTunes`”链接进行下载。\n\n   **提示**：我们在第 30 章“您的 iTunes\
    \ 用户指南”中提供了安装或升级 iTunes 的分步说明。\n\n   点击链接下载适用于 Windows 的 MobileMe 控制面板。\n\n3.\
    \ 点击此屏幕上的“`Download`”按钮下载安装文件。\n4. 按照屏幕上的步骤在您的电脑上安装软件。\n\n   ![images](img/p173-01.jpg)\n\
    \n5. 软件安装完成后，通过以下两种方法之一启动它：\n   * 双击 Windows 桌面上的“`MobileMe`”图标\n   * 通过“`Start`”按钮启动，或通过左下角的“`Windows`”图标进行搜索。输入“`MobileMe`”，该图标应出现在“开始”菜单顶部的“`Programs`”下。点击它。\n\
    6. 点击顶部的“`Sync`”标签页。\n7. 勾选“`Sync with MobileMe`”旁边的复选框。\n8. 此复选框旁边有一个用于同步频率的下拉菜单。默认设置为“`Automatically`”，但您也可以选择每“`Hour`”、“`Day`”、“`Week`”同步一次，或选择“`Manually`”。\n\
    9. 要同步通讯录，请勾选“`Contacts`”旁边的复选框，并选择通讯录的存储位置（例如“`Outlook`”、“`Google Contacts`”、“`Yahoo!`”或“`Windows\
    \ Contacts`”）。对于 Google 和 Yahoo!，您需要点击出现的“`Options`”按钮来输入您的用户名和密码（参见图 4–8）。\n\n\
    \   ![images](img/0408.jpg)\n\n   **图 4–8.** *显示“同步”标签页的 MobileMe for Windows\
    \ 偏好设置控制面板*\n\n10. 要同步日历，请勾选“`Calendars`”旁边的复选框，并选择日历的存储位置（例如“`Outlook`”或其他位置）。\n\
    11. 要同步书签，请勾选“`Bookmarks`”旁边的复选框，并选择您电脑上的网页浏览器（截至出版时，仅支持 Safari 和 Internet Explorer\
    \ 同步书签）。\n12. 完成后点击“`OK`”。\n\n点击“`OK`”后，MobileMe 将立即开始将您选定的项目（通讯录、日历和书签）发送到 MobileMe\
    \ 网站。\n\n# 访问 MobileMe 的多种方式\n\n首次同步后，您将至少拥有以下三种访问已同步信息的方式：\n\n* 您最初存储通讯录和日历的电脑\n\
    * MobileMe 网站\n* 您的 iPad（或其他移动设备）\n\n由于您已经知道如何访问电脑上的信息，我们将专注于介绍如何通过 MobileMe 网站和\
    \ iPad 访问信息。\n"
- fmt: "# A Quick Tour of the MobileMe Web Site\n\nYou can do many useful and amazing\
    \ things from the MobileMe web site. You can locate your iPad, send messages to\
    \ it, make it beep loudly, and remotely lock or erase it. Here's a quick tour.\n\
    \n1.  Go to the `MobileMe` from a web browser on your computer by typing [`www.me.com`](http://www.me.com).\n\
    2.  Type your username and password and click `Log In`.\n\n    ![images](images/p175-01.jpg)\n\
    \n3.  To view your mail, click the `Cloud` icon ![images](images/p175-06.jpg)\
    \ in the upper left corner, then click the `Mail` icon.\n\n    ![images](images/p175-02.jpg)\n\
    \n4.  This will show your MobileMe `inbox` for all email going to your Mobile\
    \ Me email address: [`(membername)@me.com`](http://(membername)@me.com).\n\n \
    \   ![images](images/p175-03.jpg)\n\n5.  To view your contacts, click the `Cloud`\
    \ icon ![images](images/p175-06.jpg) then click the `Contacts` icon.\n\n    ![images](images/p175-04.jpg)\n\
    \n6.  To view your calendar, click the `Cloud` icon ![images](images/p175-06.jpg)\
    \ then the `Calendar` icon. Note that there are various buttons at the top for\
    \ the calendar views: Day, Week, Month and List.\n\n    ![images](images/p176-01.jpg)\n\
    \n7.  To view your photo albums, click the `Cloud` icon ![images](images/p175-06.jpg)\
    \ then the `Gallery` icon.\n8.  To create a new album, click the `+` in the lower\
    \ left corner.\n\n    ![images](images/p176-02.jpg)\n\n9.  Enter your `Album Name`,\
    \ and check the `Allow` and `Show` settings you want. Also, for Mac users, decide\
    \ whether you want to sync with `iPhoto` or `Aperture`.\n10.  Click the `Create`\
    \ button to create your new album.\n\n    ![images](images/p176-03.jpg)\n\n11.\
    \  Click the `Upload Arrow` to select photos or videos to upload to your MobileMe\
    \ album.\n12.  Navigate to the folder on your computer where your pictures are\
    \ stored, click the picture or video to select it, and then click the `Open` button.\n\
    \n    **NOTE**: The following image file formats are supported: `.png`, `.gif`,\
    \ `.jpg`, `.jpeg`. The following video types are supported: `.mov`, `.m4v`, `.mp4`,\
    \ `.3gp`, `.3g2`, `.mpg`, `.mpeg`, `.avi`.\n\n    ![images](images/p177-01.jpg)\n\
    \n    ![images](images/p177-02.jpg)\n\n13.  Click the `Cloud` icon ![images](images/p175-06.jpg)\
    \ then the `iDisk` icon to view the files located on the MobileMe iDisk.\n\n \
    \   **TIP**: You can easily store and retrieve files on this iDisk from your computer\
    \ and your iPad. You can even share files that are too large to email or that\
    \ you'd like to print from your iPad using the `Public` folder.\n\n    ![images](images/p178-01.jpg)\n\
    \n14.  Click the `Cloud` icon ![images](images/p175-06.jpg) then the `Find My\
    \ iPad` icon to locate your iPad. You will need to re-enter your password for\
    \ security purposes. This feature assumes you have already logged into MobileMe\
    \ from the `Settings` app on your iPad.\n\n    ![images](images/p178-02.jpg)\n\
    \n15.  Click your name in the upper right corner, then select `Account` from the\
    \ drop-down list. In your account page, you can adjust the options, see your account\
    \ type and trial expiration date (if you are on a free trial), get help, or check\
    \ whether the MobileMe service is running.\n\n    ![images](images/p178-03.jpg)\n\
    \n![images](images/p179-01.jpg)\n\n## Setting Up Your iPad to Access Your MobileMe\
    \ Account\n\nNow that you've set up your MobileMe account, you are ready to sign\
    \ into it from your iPad. We show you how to do this in the \"Find My iPad\" section\
    \ of [Chapter 1](#Chapter01.html#ch1): \"Getting Started.\"\n\n1.  Tap your `Settings`\
    \ icon.\n2.  Tap `Mail, Contacts, Calendars`.\n3.  Tap `Add Account`.\n4.  Tap\
    \ `MobileMe` for the account type.\n5.  Enter your `Name` and your MobileMe `Email\
    \ Address` and `Password`, then tap `Next`.\n6.  Now you'll see the MobileMe configuration\
    \ screen showing your sync options.\n7.  To turn any synced item `On` or `Off`,\
    \ tap the switch.\n8.  To turn on `Find My iPad`, which will show your iPad on\
    \ a map on the MobileMe web site, move the switch to `On`.\n\n    ![images](images/p179-02.jpg)\n\
    \n    **NOTE**: If you have any existing contacts, calendars, or other information\
    \ on your iPad, these will be kept separate from your MobileMe contacts and calendars.\n\
    \n9.  When you are done, tap `Save`. You should be brought back to the Settings\
    \ screen and see your MobileMe account listed with the selected items turned on\
    \ for syncing.\n\n![images](images/p180-01.jpg)\n\n## Using MobileMe After Setup\n\
    \nUsing MobileMe is fairly seamless once you get it set up. You update your contacts\
    \ and calendar on your iPad and the changes just appear on your computer. And,\
    \ if you've set up other mobile devices such as an iPad on the same account, the\
    \ changes appear there as well. Everything is kept in sync wirelessly and automatically.\n\
    \nMobileMe has a few very cool features that we will highlight next.\n\n### Find\
    \ My iPad, Send Messages, and Remote Wipe\n\nFrom any web browser, you can locate\
    \ your iPad using the `Find My iPad` feature in MobileMe. You can send a message\
    \ and play a loud sound to alert someone on your iPad, even if it is locked. You\
    \ can remotely lock your iPad using a four–digit code and remotely erase all information\
    \ on your iPad.\n\nPlease refer to the \"Find My iPad\" section of [Chapter 1](#Chapter01.html#ch1):\
    \ \"Getting Started.\"\n\n### Additional Settings for Google/Exchange or MobileMe\n\
    \nOnce you set up the Google/Exchange or MobileMe sync, you may notice a few new\
    \ options on your Settings screen in addition to the ones shown in [Chapter 14](#Chapter14.html#ch14):\
    \ \"Working with Contacts\" and [Chapter 15](#Chapter15.html#ch15): \"Your Calendar.\"\
    \n\n1.  Tap the `Settings` icon.\n2.  Tap `Mail, Contacts, Calendars` in the left\
    \ column.\n3.  Scroll down the right column to the bottom to see the image shown\
    \ here.\n4.  The new option in the Contacts section is the `Default Account`.\
    \ You can set this to be either your Exchange/Google account or your computer's\
    \ account.\n5.  Notice that you can turn your `New Invitation Alerts On` or `Off`.\n\
    6.  The new option in the Calendars section is `Sync`, which allows you to set\
    \ how much of your calendar to sync (`2 weeks`, `1 month`, `3 months`, `6 months`,\
    \ or `All events`).\n\n    ![images](images/p181-01.jpg)\n\n7.  You can also select\
    \ which is your `Default Calendar` for new events you add to your iPad. You can\
    \ change this calendar when you create a new event.\n\n## Chapter 5"
