  trans: '

    ### iPad 版 iTunes 入门


    在本书的前面部分，我们向您展示了如何将电脑 iTunes 中的音乐传输到 iPad 上（请参阅第 3 章：“将 iPad 与 iTunes 同步”）。您还将在第
    26 章：“新媒体：阅读报纸、杂志等”中了解有关在电脑上使用 iTunes 的更多信息。iTunes 的一大优点是，您可以非常轻松地购买或获取音乐、视频、播客和有声读物，然后在几分钟内即可在
    iPad 上使用它们。


    iPad 允许您直接在设备上访问 iTunes 的移动版本。当您购买或索取免费内容后，它们将下载到您 iPad 上的 `iPod` 应用或 `Videos`
    应用中。在下一次执行同步时，它们还会自动传输到您电脑上的 iTunes 资料库中，因此您也可以在电脑上欣赏相同的内容。


    #### 需要网络连接


    您需要有效的互联网连接（Wi-Fi 或 3G/蜂窝网络）才能访问 iTunes Store。请查阅第 4 章：“其他同步方法”以了解更多关于网络连接的信息。


    #### 启动 iTunes


    当您首次拿到 iPad 时，`iTunes` 是第一个 `Home` 主屏幕页面上的图标之一。触摸 `iTunes` 图标，您将进入移动版 iTunes Store。


    ![images](img/p504-01.jpg)


    **注意：** `iTunes` 应用会频繁更新。由于 `iTunes` 应用本质上是一个网站，因此在本书撰写完成与您在 iPad 上查看它之间，它可能发生一些变化。某些屏幕图像或按钮看起来可能与本书中展示的略有不同。


    #### 浏览 iTunes


    `iTunes` 应用使用的图标与 iPad 上的其他程序类似，因此在该应用中导航非常容易。顶部有三个按钮，底部有七个图标（*软键*）可帮助您导航应用。请查看图
    20–1 以了解这些软键和功能。滚动操作与其他任何程序相同；上下移动手指即可查看可用的选项。


    ![images](img/2001.jpg)


    **图 20–1.** *iTunes 布局*


    ### 使用“精选”、“排行榜”和“天才”寻找音乐


    在 iTunes 音乐商店屏幕的顶部有三个按钮：`Featured`、`Top Charts` 和 `Genius`。默认情况下，启动 `iTunes` 应用时会显示
    `Featured` 精选内容。


    #### 排行榜——热门内容


    如果您想查看某个特定类别中的热门内容，可以浏览 `Top Charts` 类别。点击顶部的 `Top Charts`，然后点击一个类别或流派，查看该类别中的热门内容。


    **警告：** 这些歌曲或视频销量很好，但这并不意味着它们一定会吸引您。在付费之前，务必先预览一下内容并查看用户评价。


    ![images](img/p506-01.jpg)


    点击左上角的 `Genre` 按钮以选择特定流派。例如，如果您点击 `Singer Songwriter`（歌手兼词曲作者），您将只会看到该类别中的前十首歌曲或前十张专辑。


    初始视图会在左侧显示 `Top Songs`（热门歌曲），右侧显示 `Top Albums`（热门专辑）。


    您可以像在 iPad 上的任何其他程序中一样，直接滚动浏览列表。


    ![images](img/p506-02.jpg)


    #### 流派——音乐类型


    点击 `Genres` 按钮，根据流派浏览音乐。如果您有喜欢的音乐类型并想只浏览该类别，这一功能尤其有用。


    这里有大量可供浏览的流派；同样，只需像在 iPad 其他程序中那样向下滚动列表即可。


    ![images](img/p507-01.jpg)


    您可以随意浏览音乐，直到找到想要预览或购买的内容。


    #### 浏览视频（影片）


    点击底部的 `Movies` 或 `TV Shows` 按钮，浏览所有与视频相关的内容（请参阅图 20–2）。


    ![images](img/p507-02.jpg)


    ![images](img/2002.jpg)


    **图 20–2.** *在 iPad 上的 iTunes 中浏览 `Movies` 类别*


    您还可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：


    *   `New to Rent or Own`（新片租赁或购买）

    *   `Highlights by Genre`（按流派精选）

    *   `All HD Movies`（所有高清影片）


    ![images](img/p508-01.jpg)


    点击任何一部影片或视频以查看更多详情或预览该内容。您可以选择租赁或购买某些影片和电视节目。


    **租赁：** 某些影片可以提供在规定天数内的租赁服务。


    **注意：** 美国的租赁期限是 24 小时，而加拿大的租赁期限是 48 小时。其他国家可能略有不同；许多国家根本不提供租赁服务。


    **购买：** 此选项允许您永久购买并拥有该影片或电视节目。


    ![images](img/p509-01.jpg)


    #### 寻找电视节目


    浏览完影片后，点击底部的 `TV Shows` 按钮，查看您喜欢的节目有哪些可看（请参阅图 20–3）。


    ![images](img/p509-02.jpg)


    ![images](img/p509-03.jpg)


    当您点击一个电视剧集时，您将看到可用的单集。点击任意一集可以观看 30 秒的预告片。更多关于观看视频的信息，请参阅第 10 章：“观看视频、电视节目等”。预览结束后，点击
    `Done` 按钮。


    ![images](img/2003.jpg)


    **图 20–3.** *购买和浏览电视剧集或季度*


    当您准备好购买时，您可以选择购买单集或整个电视剧集。许多（但并非所有）电视剧允许您单独购买单集。


    例如，也许您想重温一下 *House（豪斯医生）* 并观看您错过的那一集试播集。在 iPad 上可以轻松快速地完成这一点。


    **注意：** 还有一个 `Free TV Episode`（免费电视剧集）类别，您可以在其中获取样片和附加内容。


    #### iTunes 中的有声读物


    有声读物是无需阅读即可享受书籍的绝佳方式。有些朗读者非常有趣，几乎就像看电影一样。例如，《哈利·波特》系列的朗读者能够出色地演绎几十种不同的声音。我们建议您在
    iPad 上尝试一下有声读物；当您在飞机上想远离其他乘客，但又不想开灯时，有声读物尤其棒。


    **提示：** 如果您是一位重度有声读物听众，订阅 `Audible.com` 可以以更便宜的价格获得相同的内容。


    ![images](img/p511-01.jpg)


    如果您是有声读物爱好者，请务必查看 iTunes 中的有声读物。


    您可以使用顶部的三个按钮来浏览 iTunes 中的有声读物：


    *   `Featured`（精选）

    *   `Top Charts`（排行榜）

    *   `Categories`（分类）


    ![images](img/p511-02.jpg)


    ### iTunes U——优质教育内容


    如果您喜欢教育内容，请查看 `iTunes U`。您可以浏览您的大学、学院或学校是否拥有自己的专属版块。


    ![images](img/p511-03.jpg)


    例如，我们查找了哈佛大学（请参阅图 20–4）。仅浏览了几分钟，我们就发现了一个名为 *Harvard Thinks Big 2* 的系列校园范围内的讨论，内容涉及哈佛最著名的教师。


    ![images](img/2004.jpg)


    **图 20–4.** *您可以搜索特定大学，然后按该大学浏览 iTunes U。*


    如果您所在的位置无线信号良好，您可以点击音频或视频内容的标题，然后以流媒体形式收听或观看。但是，如果信号中断，您将丢失视频的播放位置。如果可以的话，实际下载文件以便稍后观看有很多好处，其中最重要的就是您能对视频观看体验拥有更多控制权。

    '
- fmt: "### Download for Offline Viewing\n\nIf you know you are going to be out of\
    \ wireless coverage for a while, such as on an airplane or in the subway, you\
    \ will want to download the content for later offline viewing or listening. Tap\
    \ the `Free` button to change it to a `Download` button, and then tap it again.\
    \ You can then monitor the download progress (some larger videos may take ten\
    \ minutes or more to complete) by tapping the `Downloads` button at the bottom\
    \ right of the screen. When the download is complete, the item will show up in\
    \ the correct area in your `iPad` icon.\n\n**NOTE:** Any file larger than 20MB\
    \ cannot be downloaded over the 3G network; you must use Wi-Fi for larger files.\n\
    \n### Searching iTunes\n\nSometimes you have a good idea of what you want, but\
    \ you are unsure where it is located or perhaps you don't feel like browsing or\
    \ navigating all the menus. The `Search` tool is for you.\n\nIn the top-right\
    \ corner of the `iTunes` app, as in virtually every other iPad app, you have a\
    \ `Search` window.\n\nTouch `Search`, and the `Search` window and the on device\
    \ keyboard will pop up. Once you start typing, the iPad will begin to try to match\
    \ your entry with possibilities.\n\n![images](images/p513-01.jpg)\n\nType in the\
    \ artist, song name, video name, podcast name, or album you are searching for,\
    \ and the iPad will display detailed matches. Be as general or as specific as\
    \ you like. If you are just looking to browse all particular songs by an artist,\
    \ type the artist's name. If you want a specific song or album, enter the full\
    \ name of the song or album.\n\nWhen you locate the song or album name, simply\
    \ touch it and you will be taken to the purchase page.\n\n### Purchasing or Renting\
    \ Music, Videos, Podcasts, and More\n\nOnce you locate a song, video, TV show,\
    \ or album, you can touch the `Buy` or (if you see it) `Rent` button. This will\
    \ cause your media to start downloading. (If the content is free, then you will\
    \ see `Free` button that you tap turn into a `Download` button.)\n\nWe suggest\
    \ you view or listen to the preview, as well as check out the customer reviews\
    \ first, unless you are absolutely sure you want to purchase the item.\n\n####\
    \ Previewing Music\n\nTouch either the title of the song or its track number to\
    \ the left of the song title; the album cover will flip over and launch the `Preview`\
    \ window.\n\nYou will hear a representative clip of 30 seconds of the song.\n\n\
    Touch the `Stop` button and the track number will be displayed again.\n\n![images](images/p514-01.jpg)\n\
    \n#### Check out Customer Reviews\n\nMany items in iTunes offer customer reviews.\
    \ The reviews range from a low of one star to a high of five stars.\n\n**CAUTION:**\
    \ You need to be aware that, while many reviews are clean, some can have explicit\
    \ language. that may not be caught by the iTunes store right away.\n\nReading\
    \ the reviews might give you a fairly good idea of whether you would like to buy\
    \ the item.\n\n![images](images/p515-01.jpg)\n\n#### Previewing a Video, TV Show,\
    \ or Music Video\n\nPretty much everything on iTunes offers a preview. Sometimes\
    \ you will see a `Preview` button, as with music videos and movies. TV shows are\
    \ a little different; you tap the episode title to see the 30-second preview.\n\
    \nMost movies and TV shows also give you an `HD` or `Standard Def` button. Remember\
    \ that HD movies and episodes are usually a bit more expensive.\n\nWe highly recommend\
    \ checking out the reviews, as well as trying the preview before purchasing items\
    \ on iTunes.\n\nTypical movie previews or trailers will be longer than 30 seconds—some\
    \ are 2 minutes 30 seconds or longer.\n\n![images](images/p515-02.jpg)\n\n####\
    \ Purchasing a Song, Video, or Other Item\n\nOnce you are sure you want to purchase\
    \ a song, video, or other item, follow these steps to buy it:\n\n1.  Touch the\
    \ `Price` button of the song or the `Buy` button.\n2.  The button will change\
    \ and turn into a green `Buy Now`, `Buy Song`, `Buy Single`, or `Buy Album` button.\n\
    3.  Tap the `Buy` button.\n\n    ![images](images/p516-01.jpg)\n\n4.  You will\
    \ see an animated icon jump into the shopping cart. Type in your iTunes password\
    \ and touch `OK` to complete the sale.\n\n    ![images](images/p516-02.jpg)\n\n\
    ![images](images/p516-03.jpg)\n\nYou can check the progress of the download by\
    \ touching the `Downloads` button in the lower-right corner.\n\nThe song will\
    \ then become part of your music library, and it will be synced with your computer\
    \ the next time you connect your iPad to iTunes on your computer.\n\nAfter the\
    \ download is complete, you will see the new song, audiobook, podcast, or iTunes\
    \ U podcast inside the correct category within your `iPod` app.\n\n**NOTE:** Purchased\
    \ videos and iTunes U videos go into the `Videos` app, not the `iPod` app on your\
    \ iPad.\n\n![images](images/p517-01.jpg)\n\n#### Podcasts in iTunes\n\nPodcasts\
    \ are usually a series of audio segments; these may be updated frequently (such\
    \ as hourly news reports from National Public Radio) or not updated at all (such\
    \ as a recording of a one-time lecture on a particular topic).\n\n![images](images/p517-02.jpg)\n\
    \nYou can use the top three buttons to browse the podcasts in iTunes:\n\n*   `Featured`\n\
    *   `Top Charts`\n*   `Categories`\n\n![images](images/p517-03.jpg)\n\n#### Downloading\
    \ a Podcast\n\nPodcasts are available in `Video` and `Audio` varieties. When you\
    \ locate a podcast, just touch the title of the podcast (see [Figure 20–5](#Chapter20.html#fig_20_5)).\
    \ Luckily, most podcasts are free. If it is free, you will see a `Free` button\
    \ instead of the typical `Buy` button.\n\n![images](images/2005.jpg)\n\n**Figure\
    \ 20–5.** *Downloading a podcast*\n\nWhen you touch the button, it turns into\
    \ a green button that says `Download`. Touch `Download` and an animated icon jumps\
    \ into your `Downloads` icon at the bottom bar of soft keys. A small number displayed\
    \ in red reflects the number of files downloading.\n\n![images](images/p518-01.jpg)\n\
    \n#### The Downloads Icon—Stopping and Deleting Downloads\n\nAs you download items,\
    \ they appear in your `Downloads` screen. This behavior is just like the behavior\
    \ of iTunes on your computer.\n\nYou can touch the `Downloads` icon along the\
    \ bottom row to see the progress of all your downloads.\n\n![images](images/p518-02.jpg)\n\
    \n#### Where the Downloads Go\n\nAll of your downloads will be visible in either\
    \ your `iPod` app or your `Videos` app, organized by category. In other words,\
    \ if you download a podcast, you will need to go into your `iPod` app and touch\
    \ the `Podcasts` icon on the sidebar to see the downloaded podcast.\n\n**NOTE**:\
    \ If you don't finish a download on your iPad, and you can't find it in the download\
    \ queue, you can try going to a desktop `iTunes` app and hitting `Check for Available\
    \ Downloads`.\n\nSometimes, you may decide that you do not want the all downloads\
    \ you selected. If you want to stop a download and delete it, swipe your finger\
    \ over the download to bring up the `Delete` button, and then tap `Delete` (see\
    \ [Figure 20–6](#Chapter20.html#fig_20_6)).\n\n![images](images/2006.jpg)\n\n\
    **Figure 20–6.** *Deleting a file while downloading it*\n\n### Redeeming an iTunes\
    \ Gift Card\n\nOne of the cool things about iTunes on your iPad is that, just\
    \ as with iTunes on your computer, you can redeem a gift card and receive credit\
    \ in your iTunes account for your purchases.\n\nAt the bottom of the `iTunes`\
    \ screen, you should see the `Redeem` button (see [Figure 20–7](#Chapter20.html#fig_20_7)).\n\
    \nTap the `Redeem` button to start the process of entering your Gift Card Number\
    \ for an iTunes store credit.\n\n![images](images/2007.jpg)\n\n**Figure 20–7.**\
    \ *Redeem an iTunes gift card*\n\nYou will then be prompted to enter your iTunes\
    \ gift card info or gift certificate info in the box. Once you do this, you will\
    \ have credit for downloads in the iTunes store—it is that easy!\n\n**NOTE:**\
    \ If you have more than one iTunes account, you can log in or out right in the\
    \ `iTunes` app, as well."
