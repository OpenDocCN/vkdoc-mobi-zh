    ## Chapter 24


    ## Eliminate Your Paper Notes


    In this chapter, we will give you an overview of the **Notes** app and a popular
    alternative app called **Evernote**, which you can use to write notes, make grocery
    lists, and make lists of movies you''d like to watch or books you''d like to read.
    We will also show you how to organize and even email notes to yourself or others.
    Ideally, we hope that **Notes** will become so easy to use on the iPad that you
    can eventually get rid of most, if not all, of your paper sticky notes!


    ### Exploring Additional Notes Apps


    Later in this chapter, we will give you an in-depth view of an excellent—and free—alternative
    to the **Notes** app called **Evernote**. There are various other free or low-cost
    notes apps in the App Store, but **Evernote** stands apart at this time. With
    **Evernote**, you can tag and organize your notes, add pictures to notes, add
    voice notes, and show the location where you originally wrote your note. Another
    nice thing about **Evernote** is that it will auto-synchronize your notes with
    the Evernote web site (so you can manage notes from your computer) and many other
    mobile devices you might own.


    | **TIP:** The **Notes** app that comes with the iPad is pretty basic and utilitarian.
    If you need a more robust notes application that can sort, categorize, import
    items into an app (PDF, word, and so on), have folders, search, and more; then
    you should check out the app Store on your iPad. Do a search for “notes” and you
    will find at least a dozen notes-related apps ranging from $0.99 and up. | ![images](images/p583-01.jpg)
    |


    #### The Notes App


    If you are like many people, your desk or wall is filled with little yellow sticky
    notes—notes to do with everything imaginable. Even with our computers, we still
    tend to leave these little notes as reminders. One of the great things about the
    iPad is that you can write your notes on familiar yellow notepaper, and then keep
    them neatly organized and sorted. You can even email them to yourself or someone
    else to make sure that the information is not forgotten.


    | The **Notes** app on the iPad gives you a convenient place to keep your notes
    and simple “to do” lists. You can also keep simple lists, such as a grocery list,
    or a list for other stores, such as a hardware or pet store. If you have your
    iPad with you, you can add items to these lists as soon as they occur to you,
    and they can be accessed and edited at any time. | ![images](images/p584-01.jpg)
    |


    #### Sync Notes


    You can sync notes with your computer or other web site using the methods we show
    you in [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes” and [Chapter
    4](#Chapter04.html#ch4): “Other Sync Methods.” [Figure 24–1](#Chapter24.html#fig_24_1)
    shows an example of using **iTunes** to sync notes from **Microsoft Outlook**
    to the **Notes** app on an iPad. The nice thing about syncing notes is that you
    can add a note on your computer and have it just “appear” on your iPad. Then,
    when you are out and about, you can edit that note and have it synced back to
    your computer. You no longer need to retype or remember things. You always have
    your iPad with you, so taking notes anywhere at anytime can be a great way to
    never forget anything important.


    ![images](images/2401.jpg)


    **Figure 24–1**. *Syncing notes between **Microsoft Outlook** and the iPad **Notes**
    app using **iTunes***


    #### Getting Started with Notes


    ![images](images/p585-01.jpg)


    As with any other application, simply tap the **Notes** icon to start it.


    After starting the **Notes** app, you see what looks like a typical yellow note
    pad.


    Your **Notes** appear in the list as tabs to touch. Touch the name of the note
    you wish to view or edit (see [Figure 24–2](#Chapter24.html#fig_24_2)). The contents
    of the note are then displayed.


    You can scroll in **Notes** as you do in any program. You will notice that the
    date and time the note was last edited appears in the upper-left corner.


    When you are done reading the note, just touch the **Notes** button in the top-left
    corner to return to the main **Notes** screen.


    ![images](images/2402.jpg)


    **Figure 24–2**. *Getting around the **Notes** app*


    ##### Multiple Notes Accounts


    If you happen to be syncing at least one IMAP email account and your computer
    using **iTunes**, then you will see that your notes from each of these accounts
    are kept separate. This is very similar to how your contacts are kept in separate
    groups by your email account and how your calendars are kept separate by your
    email account.


    | In order to see multiple notes accounts, you have to set a switch in the **Account**
    **Setup** screen. When you set up your IMAP email account in **Settings** ![images](images/U001.jpg)
    **Mail, Contacts, Calendars**, you will see options to turn **Notes** syncing
    **ON** or **OFF**. In order to see these notes accounts, you have to set the **Notes**
    switch to **ON**, as shown for this Gmail account. | ![images](images/p586-01.jpg)
    |

    | To view the various Notes accounts, tap the **Accounts** button in the upper-left
    corner of the **Notes** app. | ![images](images/p587-01.jpg) |

    | Then, on the next screen, you can tap selections to view **All Notes** or your
    notes for each account. In this image, the options are **Gmail** or **From My
    PC** (notes synced in this case from **Microsoft Outlook** using **iTunes**).
    Notes you add to an individual account will be kept with that account. For example,
    if you add notes to **Gmail**, then those notes would show up only on your **Gmail**
    account. | ![images](images/p587-02.jpg) |'
