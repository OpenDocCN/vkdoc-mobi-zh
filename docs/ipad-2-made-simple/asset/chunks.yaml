- fmt: '###### Getting More from Each Charge


    To extend your battery life, try these tips:


    - **Put the iPad into Sleep mode.** Tap the `Power/Sleep` button on the upper-right
    edge of the device to put it into Sleep mode.

    - **Turn off Wi-Fi or 3G when not needed.** The Wi-Fi and 3G antennas use power
    even if you''re not connected to a Wi-Fi or 3G network, so turn them off when
    you don''t need them. Tap `Settings`, then set `Airplane Mode` to ON.

    - **Lower your screen brightness:** Tap `Settings` and then `Brightness & Wallpaper`.
    Use the Slider bar to lower your brightness to a level less than halfway across
    that still works for you. Also, make sure `Auto-Brightness` is set to ON.

    - **Turn off Location Services:** If you don''t need your actual location to be
    transmitted to your apps, you can turn this off. Tap `Settings`, then `Location
    Services`. Set `Location Services` to OFF. If you start an app that wants your
    location, you''ll be reminded to turn it back on.

    - **Set a Shorter Auto-Lock:** Shortening the time your iPad takes to turn off
    the screen when not being used and go into Sleep mode can help save your battery.
    To do this, tap `Settings`, `General`, and `Auto-Lock`. Set `Auto-Lock` as short
    as possible—you can set this as short as 2 minutes if you like.

    - **Turn off push email and push notifications:** Tap `Settings`, and then `Mail,
    Contacts, Calendars`. Next, tap `Fetch New Data` and set `Push` to OFF.

    - **Learn more about battery life** and get more cool iPad-related tips from the
    Apple website at [`www.apple.com/batteries/ipad.html`](http://www.apple.com/batteries/ipad.html).


    ###### Making the Battery Last Longer


    A rechargeable battery loses its ability to maintain a charge over time, and it
    has only a limited number of cycles during its useful life. You can extend the
    life of your iPad battery by making sure you run it down completely at least once
    a month. The rechargeable battery will last longer if you perform this complete
    draining on a regular basis.


    ###### iPad Charging Accessories


    No matter what you do, if you use your iPad a lot, you''ll want to find more places
    and more ways to charge it. [Table 1-2](#Chapter01.html#tab_1_2) lists some other
    options for charging your iPad besides using your power cord or connecting it
    to your computer.


    **Table 1-2.** *Other Places and Ways to Charge Your iPad*


    | Airport Charging Station | Today most airports have wall sockets available where
    you can top off your iPad while waiting for your flight. Some airports have designated
    charging stations, while others just have wall sockets that may even be hidden
    behind chairs or other objects. You may have to do a bit of hunting to beat out
    all those other power-hungry travelers! |

    | External Battery Pack | This accessory allows you to extend the life of your
    iPad battery by two to three times. You can buy such packs for about US $70–150\.
    Search for “external iPad battery pack” on the Web to find the latest and greatest
    options. |

    | Car Charger | If you are using your iPad heavily for phone calls during the
    day, you may want to invest in a car charger or another way to give it a little
    more juice in the middle of a long day. Some of these chargers give you powered
    USB outlets from your car cigarette lighter socket, while others give you a dock
    port connector to plug into the bottom of your iPad. Most run about US $15–30.
    |

    | Car Power Inverter | If you are taking a long car trip, you can buy a power
    inverter to convert your 12V car power outlets into a power outlet where you can
    plug in your iPad charger. Do a Web search for “power inverter for cars” to find
    many options for US $50-100. |

    | Other Accessories | As mentioned previously, you can also charge your iPad in
    many accessories designed to do other things, like play your music over speakers.
    Just look for the plug or lightning bolt icons to make sure your iPad is charging
    in such accessories. |


    #### Charging and Battery Tips


    Your iPad may already have some battery life, but you might want to charge it
    completely, so you can enjoy uninterrupted hours of use after you get it set up.
    This charging time will give you a chance to check out the rest of this chapter,
    install or update iTunes, or browse all the cool iPad apps in the iTunes App Store
    (see [Chapter 21](#Chapter21.html#ch21): “The Amazing App Store”).


    The Dock to USB cable also doubles as your charger cable. It is located under
    the little white booklet beneath your iPad in the box that says, “Designed by
    Apple in California.” Plug the wide end of the cable into the bottom of your iPad
    (next to the `Home` button), then plug the USB cable end into the small white
    box that has the fold-out plug for the electrical socket.


    | To make sure your device is plugged in correctly and getting charged, look for
    the small Plug icon inside the battery indicator in the upper-right corner of
    the iPad screen. If the screen is blank, tap the `Home` button once to light up
    the screen. You see the 100% next to the battery icon in this image to the right
    because we went into `Settings` ![Image](images/U001.jpg) (`General` and set `Battery
    Percentage` to ON. | ![Image](images/p45-01.jpg) |


    **Will my iPad charge when connected to my computer?**


    The answer is: “It depends.”


    Your iPad *is* charging if you see the Plug icon inside the Battery icon when
    you connect your iPad to your computer with the USB cable. Most Mac computers,
    some Windows computers, and some powered USB hubs (an accessory that you can purchase
    that is plugged into the wall and has USB ports) provide enough power to charge
    your iPad while it is “awake” (the screen is on).


    This is harder to determine when the iPad is in Sleep mode (screen off), and you
    see a “Not Charging” message next to the Battery icon on your iPad after you connect
    it to your computer. In this case, your iPad will probably be charging when it
    is in Sleep mode. You will have to experiment with your computer and iPad to make
    an accurate determination for a given condition. We discovered that, with a Windows
    laptop, the iPad definitely charged fine in Sleep mode, even though it said “Not
    Charging” when it was awake.


    #### Your iPad Activation May Already Have Been Completed


    For example, you may see a `Slide to Unlock` screen or a screen of icons on your
    Home screen when you turn on your iPad or tap the `Home` button (at the bottom
    of the device). If so, your iPad has already been activated. If you see a black
    screen showing a USB cable that needs to be plugged into iTunes (see [Figure 1-3](#Chapter01.html#fig_1_3)),
    then you still need to activate the device.


    #### Slide to Unlock


    When you first power on your iPad, you will see the `Slide to Unlock` screen.
    Just follow the path of the Arrow icon and gently slide the Unlock button to the
    right.


    Once you do that, you will see your Home screen.


    You will see four icons locked in the Bottom Dock (see [Figure 1-2](#Chapter01.html#fig_1_2),
    bottom-right), while the rest of the icons can move back and forth in *pages*
    above this Bottom Dock. Learn how to move your favorite icons into the Bottom
    Dock in the “Moving Icons” section in [Chapter 7](#Chapter07.html#ch7): “Personalize
    and Secure Your iPad.”


    ![images](images/0102.jpg)


    **Figure 1-2.** *Slide to Unlock, moving around your Home screen, and the Bottom
    Dock*'
