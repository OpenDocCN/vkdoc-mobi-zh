- fmt: '# Adding Folders, Editing and Deleting Bookmarks


    It''s very easy to accumulate quite a collection of bookmarks since it''s so easy
    to set them up. You may find you no longer need a particular bookmark, or you
    may want to organize them by adding new folders.


    To manage your bookmarks, tap the `Edit` button at the bottom left corner of your
    Bookmarks menu.


    You will notice that a red `minus sign` (`-`) appears to the left, and each bookmark
    turns into a tab that can be touched (see [Figure 11-9](#Chapter11.html#fig_11_9)).


    ![images](images/1109.jpg)


    **Figure 11-9.** *Reorder and delete bookmarks*


    To delete the bookmark, just touch the red `minus sign` and you''ll see the `Delete`
    button pop up. Touch `Delete`, confirm the delete, and the bookmark will disappear
    from your menu.


    To reorder bookmarks, just touch the icon at the right edge of each bookmark and
    drag up or down as you like.


    To add a new folder, touch the `New Folder` button in the upper left corner. Type
    the name of the folder, select the location (folder) in which to place your new
    folder, and click `Done`.


    ## Using the New Pages Button


    On our home computers, many of us have come to rely on tabbed browsing— it allows
    us to have more than one web page open at a time so we can quickly move from one
    to another. The iPad has a similar feature you can access by touching the `New
    Page` icon at the top left of the of the web status bar. (This is the same icon
    you used to move through open pages earlier in this chapter.)


    ![images](images/p290-01.jpg)


    When you first touch this button, the web page you are currently viewing becomes
    small and moves to the left side of the screen.


    Touch the `New Page` button and the browser will load a blank page, ready for
    you to input a new web address.


    ![images](images/p290-02.jpg)


    Now, just add a web address by touching the `Address Bar`, which brings up the
    keyboard. Type in the web address you want. Notice that there''s no space bar
    on this keyboard—just touch the period (`.`) for the dot, or the `.com` button
    to fill out the address if the site has "com" at the end of the name.


    ![images](images/p290-03.jpg)


    Now when you touch the `New Page` icon, you can just touch the page you wish to
    view and it will load into the screen. As you did before, you can also touch the
    `New Page` button to load yet another new page into the browser window.


    ![images](images/p291-01.jpg)


    ## Zooming In and Out in Web Pages


    Zooming in and out of web pages is very easy on the iPad. There are two primary
    ways of zooming—double-tapping and pinching.


    *Double-tapping:* If you tap twice on a column of a web page, the page will zoom
    in on that particular column. This lets you home in on exactly the right place
    on the web page, which is very helpful for pages that aren''t formatted for a
    mobile screen.


    To zoom out, just double-tap once more. See how this looks graphically in the
    Quick Start Guide.


    *Pinching:* This technique lets you zoom in on a particular section of a page.
    It takes a little bit of practice, but will soon become second nature. Take a
    look in the Quick Start Guide to see how it looks graphically.


    Use your thumb and forefinger and place them close together at the section of
    the web page you wish to zoom into. Slowly pinch out, separating your fingers.
    You will see the web page zoom in (note that it may takes a couple of seconds
    for the web page to focus).


    To zoom out to where you were before, just start with your fingers apart and move
    them slowly together; the page will zoom out to its original size.


    ## Activating Links from Web Pages


    When you''re surfing the Web, often you''ll come across a link that will take
    you to another web site. Because Safari is a full-function browser, you can just
    touch the link and you will jump to a new page.


    If you want to return to the previous page, just press the `Back` arrow as shown
    earlier.


    ![images](images/p292-01.jpg)


    ## Adjusting Browser Settings


    As with other settings you''ve adjusted so far, the settings for Safari are found
    in the `Settings` app.


    To access this app, touch the `Settings` icon and then touch `Safari`.


    ![images](images/p292-02.jpg)


    ### Changing the Search Engine


    By default, the search engine for the Safari browser is `Google`. To change this
    to `Yahoo`, just touch the `Search Engine` tab and then choose `Yahoo`. You can
    also choose `Bing` as your default search engine.


    ![images](images/p293-01.jpg)


    ### Adjusting Security Options


    Under the `Security` heading, `JavaScript`, and `Block Pop-ups` should, by default,
    be set to `ON`. You can modify either of these by just sliding the switch to `OFF`.


    ![images](images/p293-02.jpg)


    **NOTE:** Many popular sites like Facebook require `JavaScript` to be `ON`.


    You''ll also see the `Accept Cookies` tab here, which you can adjust to accept
    cookies `Always`, `Never`, or `From visited`.


    ![images](images/p293-03.jpg)


    ### Speed Up Your Browser: Clear History and Cookies


    On the bottom of the Safari `Settings` screen, you can see the `Clear History`
    and `Clear Cookies` buttons.


    If you notice your web browsing getting sluggish, it''s probably a good time to
    clear out both your `History` and `Cookies`.


    ![images](images/p293-04.jpg)


    **TIP:** This is also a good privacy measure as it prevents others from seeing
    where you''ve been browsing.


    To preempt that sluggishness, it''s a good idea to clear out your history and
    cookies on a fairly regular basis.


    ### AutoFill Name, Password, Email, Address, and More


    `AutoFill` is a convenient way to have the browser automatically fill out web
    page forms that ask for your name, address, phone number, or even username and
    password.


    To enable `AutoFill`, touch the `AutoFill` tab in the Safari `Settings`. To use
    `AutoFill` to input your contact information, move the slider next to `Use Contact
    Info` to the `On` position.


    To have `AutoFill` fill in names and passwords, move the slider next to `Names
    and Passwords` to `On`.


    To set the correct `Contact Info`, touch the `My Info` tab and your contact list
    will be displayed. Choose your own contact information, as shown in [Figure 11-10](#Chapter11.html#fig_11_10).


    ![images](images/1110.jpg)


    **Figure 11-10.** *Setting up My Info in AutoFill*


    Once `AutoFill` is enabled, just go to any web page that has a field to fill out.
    As soon as you touch the field, the keyboard will come up at the bottom of the
    screen. At the top of the keyboard, you will see a small button that says `AutoFill`.
    Touch it and the web form should be filled out automatically ([Figure 11-11](#Chapter11.html#fig_11_11)).


    **CAUTION:** Setting your name and password to be entered automatically means
    that anyone who picks up your iPad will be able to access your personal sites
    and information.


    ![images](images/1111.jpg)


    **Figure 11-11.** *Using Auto Fill to automatically enter an email address and
    password*'
