- fmt: "#### Reconnecting to Previously Joined Wi-Fi Networks\n\nThe nice thing about\
    \ the iPad is that, when you return to an area with a Wi-Fi network you have previously\
    \ joined (whether it was an open or a secure, password-protected network), your\
    \ iPad will automatically join the network without prompting you for a password\
    \ or other connection information. However, you are free to turn off this automatic-joining\
    \ feature, as described in the next section.\n\n##### Ask to Join Networks\n\n\
    By default, the `Ask to Join Networks` switch is set to `ON`, which means you\
    \ will join known or visible Wi-Fi networks automatically. If networks are available\
    \ that are not known to you, you will be asked before being connected.\n\n| If\
    \ the switch is set to `OFF`, you will be automatically connected only to known\
    \ networks, and you'll have to follow the procedures we described previously for\
    \ manually joining unknown networks. Why might someone turn off automatically\
    \ joining a network? This could be a good security measure if, for example, you\
    \ don't want your kids to be able to join a wireless network on the iPad without\
    \ your knowledge. | ![Image](images/p189-01.jpg) |\n\n##### Forget (or Erase)\
    \ a Network\n\nIf you find that you no longer want to connect to a network on\
    \ your list, you can “forget” it—i.e., take it off your list of networks. Follow\
    \ these steps to do so:\n\n1.  From the `Wi-Fi` screen in the `Settings` app,\
    \ tap the small `Blue` arrow next to that network. The screen that follows shows\
    \ the network details of that particular connection (see [Figure 5-4](#Chapter05.html#fig_5_4)).\n\
    2.  Tap `Forget this Network` at the top of the screen.\n3.  You will be prompted\
    \ with a warning. Tap `Forget Network` and the network will no longer show up\
    \ on your list.\n\n![images](images/0504.jpg)\n\n**Figure 5-4.** *How to forget\
    \ a Wi-Fi network*\n\n### 3G Cellular Data Connection\n\nIf you have a 3G iPad,\
    \ you will also be able to connect to a cellular data network; this is the same\
    \ network you connect to with an iPhone or other mobile phone. Here are some things\
    \ to consider about cellular data connections:\n\n*   A 3G cellular network has\
    \ wider availability than a Wi-Fi connection—you can connect to 3G in a car or\
    \ away from a city, whereas Wi-Fi is not typically available in these locations.\n\
    *   You face extra monthly service fees for access to the cellular data network.\n\
    *   In the US, you have two options for cellular data, depending on which iPad\
    \ you purchased: AT&T and Verizon.\n    *   AT&T's current plans are $15 for 250MB\
    \ per month and $25 for 2GB (about 2,000 MB) data.\n    *   Verizon's current\
    \ plans are $20 for 1GB, $35 for 3GB, $50 for 5GB, and $80 for 10GB of data.\n\
    \nHere are some things you can do with 1GB of wireless data:\n\n*   Browse 6,500\
    \ web pages\n*   Download 300 songs\n*   Watch 65 YouTube videos\n*   Download\
    \ 2,000 photos\n\n**NOTE:** Orange UK, Vodafone UK, O2, Rogers Canada, and other\
    \ international carriers may have different pricing plans.\n\n#### Setting Up\
    \ Your 3G Connection\n\nBefore you can connect to the 3G cellular network, you\
    \ have to purchase a cellular data plan from your wireless carrier. As mentioned\
    \ previously, your carrier choices for the iPad in the US are currently AT&T and\
    \ Verizon.\n\n**TIP:** You might be able to spare yourself some money on your\
    \ cellular data plan by doing the following:\n\n*   Always use Wi-Fi when possible.\n\
    *   Start with a lower cost, lower capacity cellular data plan.\n*   Monitor your\
    \ cellular data usage throughout the month to make sure you are not going to exceed\
    \ the lower cost data plan.\n\nYou may find that you can live with the lower cost\
    \ plan if you use Wi-Fi for most of your data needs.\n\nFollow these steps to\
    \ connect to a cellular data network:\n\n1.  Tap the `Settings` icon on your iPad.\n\
    2.  Tap `Cellular Data` in the left column.\n3.  Set the switch next to `Cellular\
    \ Data` to `ON` (see [Figure 5-5](#Chapter05.html#fig_5_5)).\n4.  The first time\
    \ you do this, you will see a pop-up window asking you to set up your account:\n\
    \    1.  Enter your personal information, a username, and a password that are\
    \ specific to this new cellular data plan. This account is not connected to your\
    \ email account, cell phone plan, or any other account, so you can enter the same\
    \ information or make it different.\n\n        **NOTE:** At the time of publishing,\
    \ the wireless carriers in the US (AT&T and Verizon) offer recurring billing plans.\
    \ This means that you set up the plan once, and you are billed every month until\
    \ you cancel the plan.\n\n    2.  Scroll down to see the rest of the screen and\
    \ select your data plan by tapping the screen.\n    3.  Enter your credit card\
    \ information.\n5.  Tap the `Next` button.\n\n    ![images](images/0505.jpg)\n\
    \n    **Figure 5-5.** *Buying a cellular data plan*\n\n6.  On the next screen,\
    \ you will need to swipe to the bottom of the agreement and tap `Agree` to continue—assuming\
    \ you agree, of course.\n7.  If you are traveling with your iPad, then tap `Add\
    \ International Data` and follow the steps in the next section.\n\n    ![Image](images/p193-01.jpg)\n\
    \n8.  If you do not want to add the international plan at this time (you can always\
    \ add it later), then tap `Submit` to finish.\n9.  After tapping `Submit`, you\
    \ will see a window similar to this one. Tap `OK` to close the window.\n\n   \
    \ ![Image](images/p193-02.jpg)\n\n10.  Finally, when your new cellular data plan\
    \ is set up, you will see a pop-up message similar to this one.\n\n    ![Image](images/p193-03.jpg)\n\
    \n#### Adding an International Data Plan\n\nIf you plan on taking a trip, you\
    \ may want to add an international data plan to your iPad. It is easy to do so\
    \ by following these steps:\n\n**CAUTION:** Not all carriers provide international\
    \ roaming plans for your iPad. Please check with your carrier to make sure you\
    \ can purchase a plan. If not, then you may want to consider turning off your\
    \ 3G connection while you are out of the country and using Wi-Fi only, which is\
    \ free.\n\n1.  Tap the `Settings` icon.\n2.  Tap `Cellular Data` in the left column.\n\
    3.  Tap `View Account` in the right column.\n4.  Log in to the account by entering\
    \ the cellular data username and password you used when you created this account.\n\
    5.  Tap `Add International Plan` (see [Figure 5-6](#Chapter05.html#fig_5_6)).\n\
    6.  Do the following on the `International Data Plan` window:\n    1.  Select\
    \ your `One-Time International Plan`.\n    2.  Adjust your plan `Start Date` to\
    \ match your travel needs.\n    3.  Tap the `View Full List of Countries` link\
    \ at the bottom to verify the plan will support the countries you need.\n    4.\
    \  Tap `Done`.\n    5.  You may need to confirm your selection on the following\
    \ screen.\n\n![images](images/0506.jpg)\n\n**Figure 5-6.** *Buying an international\
    \ cellular data plan*"
