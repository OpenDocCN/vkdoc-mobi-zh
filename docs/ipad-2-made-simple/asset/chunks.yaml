- fmt: '# iPad Summary Screen


    Once you connect your iPad to your computer, you can see important information,
    like your iPad''s memory capacity in GB, installed software version, and serial
    number. You can also check for updates to the software version or restore data
    to your iPad. There are several other options that are available on this screen.


    ## iTunes Navigation Basics


    Get a feel for the left nav bar. Click on various items in this left nav bar and
    notice that the main display window changes (see [Figure 3–1](#Chapter03.html#fig_3_1)).


    The top nav bar inside the main window also changes based on what you have selected
    in the left nav bar.


    For example, when you click on your iPad in the left nav bar, you will see tabs
    across the top of the main window that show information related to your device.


    When you click on the iTunes store in the left nav bar, you see tabs related to
    the store in the main window.


    To see the `iPadSummary` screen:


    1. Start up iTunes software on your computer.

    2. Connect your iPad to your computer with the white USB cable supplied with the
    device. Plug one end into the bottom of the iPad near the `Home` button and plug
    the other end into a USB port on your computer.

    3. If you have successfully connected your iPad, you should see your iPad listed
    under `DEVICES` in the left nav bar.

    4. Click on your iPad in the left nav bar, then click on the `Summary` tab on
    the left edge of the main window (see [Figure 3–1](#Chapter03.html#fig_3_1)).

    5. If you want to be able to drag and drop music and videos onto your iPad, you
    need to check the box next to `Manually manage music and videos`.

    6. If you want to have iTunes open and sync your iPad automatically whenever you
    connect it to your computer, check the `Open iTunes when this iPad is connected`
    box.


    **NOTE:** You may see the text and checkbox next to `Open iTunes when this iPad
    is connected` in the Options area on this Summary screen grayed out (not-clickable).
    This is because of a setting in the iTunes Edit Preferences ![images](images/U001.jpg)
    Device tab screen, the checkbox next to `Prevent iPods, iPhones and iPads from
    syncing automatically` has been checked. If you uncheck this box in the Preferences
    ![images](images/U001.jpg) Device tab, then you can make the `Open iTunes when
    this iPad is connected` a clickable item again.


    ![images](images/p111-01.jpg)


    ![images](images/0301.jpg)


    **Figure 3–1.** *The iPad summary screen in iTunes*


    ### iTunes Navigation Basics


    Get a feel for the left nav bar. Click various items in this left nav bar and
    note that the main display window changes.


    The top nav bar inside the main window also changes based on what you have selected
    in the left nav bar. For example, when you click your `iPad` in the left nav bar,
    you''ll see tabs across the top of the main window that show information related
    to your device. When you click the `iTunes store` in the left nav bar, you see
    tabs related to the store in the main window.


    ## Getting to the Sync Setup Screen (Info Tab)


    Your first step is to get to the setup screen for syncing your contacts, calendar,
    email, and so forth. You follow the same steps described previously for getting
    to the `Summary` screen, except now you click the `Info` tab at the top to see
    the Contacts (and other sync settings) in the main iTunes window.


    ## Sync Your Contacts and Calendars


    Let''s start by setting up syncing of your contacts and calendars.


    1. Check the `Sync Contacts with` box and adjust the pull-down menu to the software
    or service where your contacts are stored. At publication time, on a Windows computer
    these are Outlook, Google Contacts, Windows Contacts, and Yahoo! Address Book.
    See [Figure 3–2](#Chapter03.html#fig_3_2). You can also select `All contacts`
    or `Selected groups`.

    2. To sync Calendars, check the `Sync Calendars with` box and adjust the drop-down
    list to match the software where you store your calendar on your computer, as
    shown in [Figure 3–2](#Chapter03.html#fig_3_2). You may also select `All calendars`
    or `Selected calendars`.


    ![images](images/0302.jpg)


    **Figure 3–2.** *Selecting software for syncing contacts (Windows)*


    **CAUTION**: Whenever you switch between software and services in these Sync Settings
    screens (called the sync provider), it affects every one of the mobile devices
    connected to your iTunes account. For example, if you sync contacts to your iPhone
    or iPod touch (in addition to your iPad), these changes will also affect MobileMe.
    You will be changing the way contacts sync for any other devices connected to
    your iTunes account.


    ![images](images/p114-01.jpg)


    ### Google and Yahoo! Sync


    If you select Google or Yahoo! sync, you''ll be prompted to enter your Google
    ID or Yahoo! ID and password.


    **NOTE**: The options you see in this and other drop-down boxes on the `Info`
    tab will vary slightly depending on the software installed on your computer. For
    example, on a Mac, the contacts sync does not have a drop-down list; instead the
    other services, such as Google Contacts and Yahoo!, are shown as separate check
    boxes.


    To continue setting up your email accounts, bookmarks, and more, scroll down the
    page. If you don''t want to set anything else up for syncing, click the `Apply`
    button in the lower-right corner of the iTunes screen to start the sync.


    **TIP**: If you''re a Mac user who uses Microsoft Entourage, you''ll need to enable
    Entourage to sync with iCal. To do this, go into the Preferences settings in Entourage,
    then go to Sync Services and check the boxes for synchronizing with iCal and Address
    book, as shown in [Figure 3–3](#Chapter03.html#fig_3_3). If you are a user of
    Office for Mac 2011, you will need to install SP1 (Service Pack 1) to allow syncing
    to your iPad through iTunes. As of writing this book, the SP1 update had not yet
    been released. Based on Microsoft''s Office for Mac website, you should be able
    to use Apple Sync Services to sync Outlook calendar, contacts, notes and tasks.


    ![images](images/0303.jpg)


    **Figure 3–3.** *Microsoft Entourage and Outlook settings (Apple Mac)*'
