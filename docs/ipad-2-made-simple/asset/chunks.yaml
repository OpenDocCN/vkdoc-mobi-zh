- fmt: '#### Moving Backward or Forward Through Open Web Pages


    Now that you know how to enter web addresses, you''ll probably be jumping to various
    web sites. The **Forward** and **Back** arrows make it very easy to go to recently
    visited pages in either direction, as [Figure 11-3](#Chapter11.html#fig_11_3)
    shows. If the **Back** arrow is grayed out, the section below about using the
    **Open Pages** button can help.


    ![images](images/1103.jpg)


    **Figure 11-3.** *Returning to a previously viewed web page*


    Let''s say you were looking at the news on the New York Times web site, then you
    jumped to ESPN to check sports scores. To go back to the New York Times page,
    just hit the **Back** arrow. To return to the ESPN site again, touch the **Forward**
    arrow.


    #### Moving Between Web Pages


    Sometimes when you click a link, the web page you were viewing moves to the background
    and a new window pops up with new content (another web page, a video, etc.). In
    such cases, the **Back** arrow in the new browser may not work!


    Instead, you have to tap the **Open Pages** icon (just to the right of the arrows)
    to see a list of open web pages and then tap the one you want. In [Figure 11-4](#Chapter11.html#fig_11_4),
    we touched a link that opened a new browser window. The best way to get back to
    the old one is to tap the **Open Pages** icon and select the desired page.


    ![images](images/1104.jpg)


    **Figure 11-4.** *Jumping between open web pages*


    #### Jumping to the Top of the Web Page


    Sometimes web pages can be quite long, which can make scrolling back to the top
    of the page a bit laborious. One easy trick is to just tap on the black title
    bar of the web page and you''ll automatically jump to the top of the page, as
    shown in [Figure 11-5](#Chapter11.html#fig_11_5).


    ![images](images/1105.jpg)


    **Figure 11-5.** *Jump quickly to the top of a web page by tapping at the top*


    #### Emailing a Web Page


    Sometimes you find a page so compelling that you just have to send it to a friend.
    Touch the **Action** button ![images](images/p282-01.jpg) next to the **Address
    Bar** and select **Mail Link to this Page** (see [Figure 11-6](#Chapter11.html#fig_11_6)).
    This creates an email message with the link that you can send.


    ![images](images/1106.jpg)


    **Figure 11-6.** *Email a link to a web page*


    #### How to Print a Web Page


    The iPad now comes with a built-in **Print** command. If you have an **AirPrint**
    compatible printer (a full list of compatible printers can be found at [`www.apple.com/ipad/features/airprint.html`](http://www.apple.com/ipad/features/airprint.html))
    just connect your printer to your home network and select **Print** from the menu
    displayed when you touch the **Action** button. If you don''t have an AirPrint-compatible
    printer, you still have a few options, but none of them are quite as simple as
    AirPrint.


    **NOTE:** Both the iPad and the printer need to be on the same Wi-Fi network.
    In other words, the iPad can''t be on 3G.


    *Option 1:* Email yourself or a colleague the web page link and print it from
    that printer. If you are traveling and staying at a hotel with a business center,
    you may be able to send it to someone at the business center or front desk to
    print the page.


    *Option 2:* Buy a network printing app from the App Store that allows you to print
    to a networked printer. Of course, this only works if you have access to a networked
    printer. It''s usually best if you do this from your home or office network and
    can get help setting up, as it can be quite challenging.


    ### Adding Bookmarks


    Just like on your home computer, you can set bookmarks on your iPad. To add a
    new bookmark, simply touch the plus sign (`+`) at the top of the web screen.


    After touching ![images](images/p284-01.jpg) you''ll see three options. Choose
    **Add Bookmark** to add a new bookmark.


    ![images](images/p284-02.jpg)


    After adding the new bookmark, you can edit its name (the web address is shown
    underneath the editing window). You can also choose the folder where you''d like
    the bookmark to appear. By default, it will go in your **Bookmarks** folder, but
    you can place it in any folder available to you, such as News or Popular.


    ![images](images/p284-03.jpg)


    Press **Save** to save your changes.


    ![images](images/p284-04.jpg)


    **TIP:** If you add a bookmark to the Bookmark Bar, it will appear when you activate
    the URL field. Similar to desktop Safari, it gives you a drop-down menu of sites—very
    handy for quickly finding where you want to go.


    #### Using Your Bookmarks


    Once bookmarks are set, simply touch the **Bookmarks** icon from any web page
    to see them.


    When you touch the **Bookmarks** icon, you''ll find tabs for your **History**,
    **Bookmarks Bar**, and **Bookmarks Menu**. Under that you''ll see preinstalled
    bookmarks for your iPad.


    ![images](images/p285-01.jpg)


    Bookmarks you add will, by default, go into your **Bookmarks Bar** unless you
    specify another spot.


    ![images](images/p285-02.jpg)


    **TIP:** When you are creating your bookmarks, adjust the folder where the bookmark
    is stored by tapping the **Folder** name under the name of the Bookmark.


    ### Searching the Web


    Sometimes, you need to search for a particular topic, item, or web page. Searching
    the web couldn''t be easier on the iPad.


    The following steps show you how to set your default search engine in the **Safari**
    settings. When you first get your iPad, the default search engine is Google.


    The **Searchbar** is right next to the Web Address Bar. To perform a web search,
    follow these steps:


    1.  Touch the **Search bar** and the keyboard will appear.

    2.  Type in the name, web site, or topic you wish to search.

    3.  If a match pops up, just touch it to jump to the page or touch the **Search
    key** on the keyboard.

    4.  Your search results will be displayed using the default search engine (see
    [Figure 11-7](#Chapter11.html#fig_11_7)).


    ![images](images/1107.jpg)


    **Figure 11-7.** *Perform a web search using the Search bar in Safari*


    **TIP:** There''s also the “On this page” listing at the bottom of the search
    results which lets you find words on the web page currently loaded in Safari (like
    `cmd/ctl+F` on the desktop).


    ### Adding a Web Page Icon to Your Home Screen


    If you love a web site or page, it''s very easy to add it as an icon to your **Home
    Screen**. That way, you can instantly access the web page without going through
    the **Safari** ![images](images/U001.jpg) **Bookmarks** ![images](images/U001.jpg)
    select bookmark process. You''ll save lots of steps by putting the icon on your
    **Home Screen** (see [Figure 11-8](#Chapter11.html#fig_11_8)). This is especially
    good for quickly launching web apps, like Gmail or Buzz from Google, or web app
    games.


    Here''s how to add the icon:


    1.  Touch the **Action** button ![images](images/p287-01.jpg) next to the address
    bar in the top of the browser.

    2.  Touch **Add to Home Screen**.

    3.  Adjust the name. You may want to put in the name of the site, but keep it
    short because there''s not much room below the icons.

    4.  Tap the **Add** button in the upper right corner.


    ![images](images/1108.jpg)


    **Figure 11-8.** *How to add an icon for a web page to your Home Screen*


    #### Browsing from Web History


    A very useful tool on your iPad is the ability to browse the web from your **History**,
    just as you would on a computer.


    Touch the **Bookmarks** icon and you''ll see a tab marked **History**.


    ![images](images/p288-01.jpg)


    Touch the **History** tab and your recent web travels will be listed. If you haven''t
    cleared your history lately, you may see one tab that says **Earlier Today** and
    another for other dates with stored history.


    ![images](images/p288-02.jpg)


    Just touch the name of a web site on the list, and Safari will load that page
    in the browser window.


    ![images](images/p288-03.jpg)


    To remove all the sites in your **History**, touch the **Clear History** button
    in the upper right, then the red **Clear History** button.'
