- fmt: '#### Starting Apps and Using Soft Keys


    Some apps have soft keys at the bottom of the screen, such as the `iPod` app shown
    in [Figure 2](#PartI.html#fig_p1_2).


    For the soft keys to work in the `iPod` app, you must have some content (e.g.,
    music, videos, and podcasts) on your iPad. See [Chapter 3](#Chapter03.html#ch3):
    “Sync with iTunes,” for help syncing your music, videos, and more. Follow these
    steps to use the soft keys in the `iPod` app:


    1.  Tap the `iPod` icon to start the `iPod` app.

    2.  Touch the `Albums` soft key at the bottom to view your albums.

    3.  Touch the `Artists` soft key to view a list of your artists.

    4.  Try all the soft keys in `iPod` and other apps.


    **TIP:** You know which soft key is selected because it is highlighted—either
    with dark gray or with a color. The unselected soft keys are light gray or white.


    ![images](images/p6-01.jpg)


    **Figure 2.** *Working with soft keys in apps*


    #### Menus, Options, and Switches


    Once you are in a program, you can select any menu item by simply touching it.
    In the `Settings` app, tap any item in the left column to see more options appear
    in the right column. Tap any item with a `Greater Than` symbol (`>`) to see another
    screen with options that you can adjust, such as `Show Each Photo For` (see [Figure
    3](#PartI.html#fig_p1_3)).


    **TIP:** You know there is a list of options if you see the `Greater Than` symbol
    (`>`) next to the menu item.


    How do you get back to the previous screen or menu? Tap the button in the top
    left of the `Options` screen that shows the name of the previous screen. If you''re
    in the `Show Each Photo For` screen, for example, you''d touch the `Picture Frame`
    button.


    You''ll see a number of switches on the iPad, such as the one next to `Zoom In
    on Faces` shown in [Figure 3](#PartI.html#fig_p1_3). To set a switch (e.g., from
    `ON` to `OFF`), just touch it.


    ![images](images/p7-01.jpg)


    **Figure 3.** *Selecting menu items, navigating submenus, and setting switches*


    #### Reading the Connectivity Status Icons


    Since most of the functions on your iPad work only when you are connected to the
    Internet (e.g., email, the Web, the `App Store`, and `iTunes`), you need to know
    when you''re connected. Understanding how to read the Status bar can save you
    time and frustration.


    **Cellular (3G) Data Signal Strength (1-5 bars):**


    | **Strong** | ![images](images/p7-02.jpg) |

    | Weak | ![images](images/p7-03.jpg) |

    | Radio Off—Airplane Mode | ![images](images/p7-04.jpg) |


    **Wi-Fi Network Signal Strength (1-3 symbols):**


    | **Strong** | ![images](images/p7-05.jpg) |

    | Weak | ![images](images/p7-06.jpg) |

    | Off | ![images](images/p7-07.jpg) |


    You can tell if you are connected to a network—and the general speed of the connection—by
    looking at the left end of your iPad''s Top Status bar. [Table 1](#PartI.html#tab1)
    shows what you may see.


    ![images](images/p8-01.jpg)


    [Chapter 5](#Chapter05.html#ch5): “Wi-Fi and 3G Connectivity” shows you how to
    connect your iPad to a Wi-Fi or 3G Cellular Data Network.


    #### Traveling with your iPad—Airplane Mode and Wi-Fi


    When you''re flying on an airplane, the flight crew usually asks you to turn off
    all portable electronic devices for takeoff and landing. Then, when you get to
    altitude, they say “all approved electronic devices” can be turned back on.


    You can turn off the iPad by pressing and holding the `Sleep/Wake` button on the
    top-right edge until the slider appears. Next, use the `Slide to Power Off` switch
    with your finger.


    If you have a 3G/Cellular Data iPad, you can turn on `Airplane Mode` in the `Settings`
    icon as follows:


    1.  Tap the `Settings` icon.

    2.  Set the switch next to `Airplane Mode` in the top of the left column to `ON`.


    ![Image](images/p9-01.jpg)


    **TIP:** Some airlines do have in-flight Wi-Fi networks; in this case, you''ll
    want to leave your Wi-Fi turned on.


    It''s easy to turn off your Wi-Fi connection (see [Figure 4](#PartI.html#fig_p1_4)):


    1.  Tap the `Settings` icon.

    2.  Tap `Wi-Fi` in the top of the left column.

    3.  Set the switch next to `Wi-Fi` in the top of the right column to `OFF`.


    ![images](images/p9-02.jpg)


    **Figure 4.** *Turning Wi-Fi `OFF` or `ON`*


    ### Multitasking or App Switching


    One of the great features on your iPad is the ability to *multitask*, or jump
    between applications, while leaving things like music playing in the background
    (see [Figure 5](#PartI.html#fig_p1_5)).


    Check out [Chapter 8](#Chapter08.html#ch8): “Multitasking and Mute/Lock Switch”
    for more information.


    Double-click the `Home` button to bring up the `App Switcher` app at the bottom
    of the screen. Next, swipe right to see more icons of any app that is running.
    Tap the icon of any app you want to start. If you don''t see the icon you want,
    then click the `Home` button to see the entire `Home` screen. Repeat these steps
    to jump back to the app you just left. The nice thing is that the app you just
    left is always shown as the first app on the `App Switcher` bar. Swipe to the
    left to see music controls and the opposite of the function you set for your side
    switch. For example, if you set your side switch to `Rotation Lock`, then you
    will see the `Mute` control here (and vice versa).


    ![images](images/p10-01.jpg)


    **Figure 5.** Double-click the `Home` button to switch apps or multitask on your
    iPad.


    ### Touch Screen Basics


    In this section, we describe how to interact with the iPad touch screen.


    #### Touch Screen Gestures


    The iPad has an amazingly sensitive and intuitive touch screen. Apple—renowned
    for making the iPhone, iPod touch, and iPod easy to use—has come up with an excellent
    larger touch-screen device.


    If you are used to a physical keyboard and a trackball or trackpad, or an iPod''s
    intuitive scroll wheel, this touch screen will take a little effort to master.
    With a little practice, though, you''ll soon become comfortable interacting with
    your iPad.


    You can do almost anything on your iPad by using a combination of the following:


    *   Touch screen *gestures*

    *   Touching icons or soft keys on the screen

    *   Tapping the `Home` button at the bottom


    The following section describes the various gestures.


    ### Tapping and Flicking


    To start an app, confirm a selection, select a menu item, or select an answer,
    simply tap the screen. To move quickly through contacts, lists, and the music
    library in `List` mode, flick side to side or up and down to scroll through items
    (see [Figure 6](#PartI.html#fig_p1_6)).


    ![images](images/p12-01.jpg)


    **Figure 6.** *Basic touch-screen gestures*


    ### Swiping


    To swipe, gently touch and move your finger (see [Figure 7](#PartI.html#fig_p1_7)).
    You can also do this to move between open `Safari` web pages and pictures. Swiping
    also works in lists, such as the `Contacts` list.


    ![images](images/p13-01.jpg)


    **Figure 7.** *Touch and swipe to move between pictures and web pages.*


    #### Scrolling


    Simply tap and slide your finger to move or scroll around the screen (see [Figure
    8](#PartI.html#fig_p1_8)). You can use this gesture in messages (email), the `Safari`
    web browser, menus, and more.


    ![images](images/p14-01.jpg)


    **Figure 8.** *Touch and slide your finger to scroll around a web page, a zoomed
    picture, and more.*


    #### Double-Tapping to Zoom In or Out


    You can double-tap the screen to zoom in and then double-tap again to zoom back
    out. This works in many places, such as web pages, mail messages, and pictures
    (see [Figure 9](#PartI.html#fig_p1_9)).


    ![images](images/p15-01.jpg)


    **Figure 9.** *Double-tapping to zoom in or out*'
