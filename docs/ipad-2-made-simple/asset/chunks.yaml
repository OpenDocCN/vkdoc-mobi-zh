    ## 第 11 章


    ## 使用 Safari 上网


    现在，我们将带你了解在 iPad 上能做的最有趣的事情之一：上网冲浪。你可能听说过，在 iPad 上上网比以往任何时候都更亲密——我们同意！我们将向你展示如何通过
    iPad 上的 Safari，以前所未有的方式进行触摸、缩放和与网页互动。你将学习如何设置和使用书签，通过搜索引擎快速查找内容，打开并在多个浏览器窗口间切换，甚至轻松地从网页中复制文本和图形。


    ### 在 iPad 上浏览网页


    你可以通过 Wi-Fi 或 iPad 的 3G 连接（在 Wi-Fi + 3G 机型上）随心所欲地浏览网页。许多人认为，iPad 提供了目前最强大的移动浏览体验。网页看起来非常像你在电脑上看到的网页。借助
    iPad 的缩放功能，你甚至不必担心较小的屏幕尺寸会限制你的浏览体验。简而言之，在 iPad 上浏览网页是一种更加个性化的体验。


    你可以选择纵向或横向模式浏览。你也可以通过双击或捏合展开来快速放大视频，这对你来说很自然，因为缩放文本和图形也是同样的操作。


    **为什么有些视频和网站无法显示？（需要 Flash Player）**


    ![images](img/p276-01.jpg)


    一些网站是使用 Adobe Flash Player 设计的，但截至本书出版时，iPad 尚不支持 Adobe Flash。苹果似乎已决定不支持 Flash
    Player。如果你轻点一个视频但无法播放，或者看到类似“需要 Flash 插件”、“下载最新的 Flash 插件以观看此视频”或“需要 Adobe Flash
    才能查看此站点”的信息，你将无法观看该视频或网页。


    现在，App Store 中有一些浏览器，如`Skyfire`和`iSwifter`，它们会在服务器端将 Flash 转码为 H.264 视频，因此可以在
    iPad 上使用。


    #### 需要网络连接


    你需要在 iPad 上拥有有效的互联网连接——无论是 Wi-Fi 还是 3G（蜂窝数据）——才能上网。请参阅第 5 章的“连接”部分了解更多信息。


    #### 启动网页浏览器


    你可以在`主屏幕`上找到`Safari`图标；这就是你的网页浏览器。通常，`Safari`图标位于`底部 Dock 栏`的左下角。


    ![images](img/p276-02.jpg)


    轻点`Safari`图标，你将进入浏览器的首页。通常，这会是苹果的 iPad 页面。


    当你找到喜欢的网站时，可以设置书签以便日后轻松跳转到这些网站。我们将在本章后面部分向你展示如何操作。


    ![images](img/p277-01.jpg)


    #### Safari 网页浏览器屏幕布局


    图 11-1 展示了网页在 Safari 中的显示效果，以及你可以在浏览器中执行的不同操作。


    ![images](img/1101.jpg)


    **图 11-1.** *Safari 网页浏览器页面布局*


    查看屏幕时，请注意`地址栏`位于屏幕的左上角。它显示当前的网址。右侧是`搜索`窗口。默认情况下，这设置为 Google 搜索，但你可以根据需要更改。


    屏幕顶部有五个图标：`后退`、`前进`、`打开页面`、`书签`和`操作`按钮。


    #### 输入网址


    你首先需要学习的是如何访问你最喜欢的网页。就像在电脑上一样，你需要在浏览器中输入网址（URL）。首先，轻点浏览器顶部的`地址栏`，如图 Figure 11-2
    所示。键盘会弹出，浏览器窗口会展开。开始输入网址，然后按`前往`键以转到该页面。


    **提示：** 记得使用底部的冒号、斜杠、下划线、点号和`.com`键以节省时间。


    ![images](img/1102.jpg)


    **图 11-2.** *输入网址*


    **提示：** 长按`.com`键可查看所有选项：`.org`、`.edu`、`.net`、`.de` 等。

