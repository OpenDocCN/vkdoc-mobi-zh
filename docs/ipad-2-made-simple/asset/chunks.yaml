    \ window into which you can type virtually any phrase. You can search for an author,\
    \ title, or series. Just touch the **Search** window and the on-screen keyboard\
    \ pops up. Type in an author, title, series, or genre of book.\n\n![images](images/p301-01.jpg)\n\
    \n**NOTE**: You can also use the **Browse** button at the bottom for searching.\
    \ For example, you can browse by author or category or use the **Search** box.\n\
    \n**TIP:** To search for lots of free books, perform a search for “Gutenberg Project”\
    \ to see the thousands of free public domain titles.\n\nYou will see suggestions\
    \ pop up that match your search; touch the appropriate suggestion to go to that\
    \ title.\n\n### Reading iBooks\n\nTouch any title in your bookshelf to open it\
    \ for reading. The book will open to the first page, which is often the title\
    \ page or other front matter in the book.\n\n![images](images/p302-01.jpg)\n\n\
    There is a **Table of Contents** button in the upper left-hand corner, next to\
    \ the **Library** button (see [Figure 12-1](#Chapter12.html#fig_12_1)). To jump\
    \ to the table of contents, touch either the **Table of Contents** button or simply\
    \ turn the pages until you see these pages.\n\n![images](images/1201.jpg)\n\n\
    **Figure 12-1.** *The **iBooks** page layout*\n\nYou can turn pages in one of\
    \ three ways:\n\n![images](images/p303-01.jpg)\n\n*   Touch the right-hand side\
    \ of the page to turn to the next page.\n*   Slowly touch and hold the screen\
    \ on the right-hand edge of the page. While still touching the screen, gently\
    \ and slowly move your finger to the left.\n\n    **TIP:** If you move your finger\
    \ very slowly, you can actually see the words on the backside of a page as you\
    \ “turn” it—a very cool visual effect.\n\n*   The last way to turn pages is to\
    \ use the **Slider** control at the bottom of the page. As you slowly slide from\
    \ left to right, you will see the page number on top of the **Slider** control.\
    \ Release the **Slider** control and you can advance to that particular page number.\n\
    \n![images](images/p303-02.jpg)"
  trans: "\n### 从网站保存或复制文本与图像\n\n有时您可能会看到想从网站复制的文本或图像。本节将简要介绍操作方法，但如需直观了解包括使用**剪切**和**粘贴**功能在内的完整过程，请参阅第\
    \ 2 章中的\"复制与粘贴\"部分。以下是快速指南：\n\n要复制单个词语，长按该词语直至其被高亮显示并出现**复制**按钮，然后轻点**复制**。\n\n\
    要复制几个词语或整个段落，长按某个词语直至其被高亮显示。然后向左或向右拖动蓝色圆点以选择更多文本。您可以向上或向下滑动以选择整个段落。最后轻点**复制**。\n\
    \n**提示：** 选择单个词语会进入**词语选择**模式，在此模式下您可以通过拖动来增加或减少所选词语的数量。如果选择范围超过单个段落，通常会切换至**元素选择**模式，此时您会看到边缘而非角落，您可以向外拖动这些边缘来选择多个段落、图像等内容。\n\
    \n要**保存**或**复制**图像，长按图片或图像直至弹出窗口询问您是否要**保存**或**复制**该图像。\n\n### 利用浏览历史节省时间并查找网站\n\
    \n将常访问的网站保留在历史记录中的好处在于，您可以在进入浏览器菜单时从**历史记录**标签页中加载它们（参见图 11-12）。此外，有时您想返回某个特定网站却记不起名称，查看历史记录将显示您想访问的确切网站。\n\
    \n![images](img/1112.jpg)\n\n**图 11-12.** *使用浏览器历史记录*\n\n## 第 12 章\n\n## iBooks\
    \ 与电子书\n\n自 iPad 发布以来，其最受推崇的功能之一便是作为电子书阅读器的能力。在本章中，我们将向您展示一种无与伦比的阅读体验。我们将介绍**iBooks**应用，如何为其购买和下载书籍，以及如何找到一些优秀的免费经典书籍。我们还将向您介绍\
    \ iPad 上的其他电子书阅读选项，包括第三方应用**Kindle**和**Kobo**阅读器。\n\niPad 使用苹果专有的电子书阅读器**iBooks**。在本章中，我们将向您展示如何下载**iBooks**应用，如何在\
    \ iBooks 商店中选购书籍，以及如何充分利用**iBooks**应用的所有功能。\n\n有了**iBooks**，您能以前所未有的方式与书籍互动。您可以翻页、调整字体大小、在内置词典中查词以及在文本中搜索。\n\
    \n在 App Store 中，您还可以找到亚马逊**Kindle**阅读器及其他流行电子书阅读器的应用。\n\n![images](img/p297-01.jpg)\n\
    \n### 下载 iBooks\n\n当您首次在 iPad 上打开 App Store 时，系统会提示您下载免费的**iBooks**应用。选择**下载**，**iBooks**便会下载并安装到您的\
    \ iPad 上。\n\n![images](img/p297-02.jpg)\n\n### iBooks 商店\n\n在您开始享受阅读体验之前，需要先为\
    \ iBooks 书库添加书籍。幸运的是，iBooks 商店中有许多免费书籍可供查找，包括完整的古腾堡经典作品集和公有领域图书。\n\n只需轻点书架左上角的**商店**按钮，您便会进入\
    \ iBooks 商店。\n\n![images](img/p298-01.jpg)\n\niBooks 商店的布局与 App Store 非常相似。左上角有一个**分类**按钮，位于**书库**按钮旁边。轻点此按钮可查看所有可用的分类，您可以根据这些分类选择书籍。\n\
    \n![images](img/p298-03.jpg)\n\n精选图书会突出显示在商店首页，并展示**新书**和**热门**图书供您浏览。\n\n商店底部有五个虚拟按键：**精选**、**纽约时报**、**排行榜**、**浏览**和**已购项目**。轻点**纽约时报**按钮\n\
    \n![images](img/p298-02.jpg)\n\n可查看纽约时报虚构类和非虚构类畅销书排行榜。\n\n轻点**排行榜**按钮`images`可查看商店中所有畅销书和热门免费书籍。\n\
    \n轻点**已购项目**`images`按钮可查看您为书库购买或下载的所有书籍。\n\n![images](img/p299-03.jpg)\n\n购买书籍与购买应用类似。轻点您感兴趣的书籍标题，浏览其描述和用户评论。当您准备购买此书时，轻点**价格**按钮。\n\
    \n![images](img/p299-04.jpg)\n\n**注：** 许多图书提供试读样本下载。如果您不确定是否要购买某本书，这是个不错的办法。下载样本是预览图书的好方法；您可以随时从样本内购买完整图书。\n\
    \n一旦您决定下载样本或购买图书，视图会切换至您的书架。此时，您可以看到书籍正在存入书架。您的图书现在可供阅读。\n\n![images](img/p300-01.jpg)\n\
    \n**注**：新下载的图书会在右上角显示“New”字样。\n\n#### 使用搜索窗口\n\n与 iTunes 和 App Store 一样，iBooks\
    \ 为您提供了一个**搜索**窗口，您几乎可以在其中输入任何短语。您可以搜索作者、书名或系列。只需轻点**搜索**窗口，屏幕键盘便会弹出。输入作者、书名、系列或书籍类型。\n\
    \n![images](img/p301-01.jpg)\n\n**注**：您也可以使用底部的**浏览**按钮进行搜索。例如，您可以按作者或分类浏览，或使用**搜索**框。\n\
    \n**提示：** 要搜索大量免费书籍，可以搜索\"古腾堡项目\"以查看数千种免费公有领域图书。\n\n您会看到与搜索内容匹配的建议弹出；轻点相应的建议即可跳转到该书籍。\n\
    \n### 阅读 iBooks\n\n轻点书架上的任意书籍即可打开阅读。书籍将打开至第一页，通常为书名页或其他前置内容。\n\n![images](img/p302-01.jpg)\n\
    \n左上角有一个**目录**按钮，位于**书库**按钮旁边（参见图 12-1）。要跳转到目录，请轻点**目录**按钮，或者直接翻页直至看到这些页面。\n\n\
    ![images](img/1201.jpg)\n\n**图 12-1.** *`**iBooks**`页面布局*\n\n您可以通过以下三种方式之一翻页：\n\
    \n![images](img/p303-01.jpg)\n\n*   轻点页面的右侧边缘翻到下一页。\n*   缓慢地长按页面右侧边缘的屏幕。在仍触摸屏幕的同时，温和缓慢地将手指向左滑动。\n\
    \n    **提示：** 如果您非常缓慢地移动手指，在\"翻\"页时甚至可以实际看到页面背面的文字——非常酷的视觉效果。\n\n*   最后一种翻页方式是使用页面底部的**滑块**控件。当您从左向右缓慢滑动时，您会看到**滑块**控件上方显示页码。松开**滑块**控件即可跳转到该特定页码。\n\
    \n![images](img/p303-02.jpg)\n"
- fmt: '# Customizing Your Reading Experience: Brightness, Fonts, and Font Sizes


    In the upper right-hand corner of the book, there are three icons available to
    help make your reading experience more immersive (see [Figure 12-2](#Chapter12.html#fig_12_2)).


    Touch the **Brightness** icon and you can adjust the brightness of the book.


    If you are reading in bed in a very dark room, you might want to slide it all
    the way down to the left. If you are out in the sunlight, however, you may need
    to slide it all the way to the right. Keep in mind that turning up the screen
    brightness is one of the more power-intensive things you can do on an iPad, so
    remember to turn it back down when you don''t need the screen to be so bright
    anymore.


    ![images](images/p304-01.jpg)


    **NOTE:** The preceding example adjusts the brightness only within the **iBooks**
    app. To adjust the global brightness of the iPad, use the control in the **Settings**
    app, which you can access by clicking the **Settings** icon and then choosing
    **Brightness & Wallpaper**.


    ![images](images/1202.jpg)


    **Figure 12-2.** *Adjusting font sizes in the **iBooks** app*


    The next **Text Size** icon lets you adjust the font size and type. After selecting
    this icon, you can increase the font size by tapping the large **A** button multiple
    times.


    To decrease the font size, tap the small **A** button multiple times.


    There are five available font styles. (There may well be more fonts when you read
    this book.)


    Have fun and try out some of the various fonts. The default selection is the Palatino
    font; however, all of the fonts look great, and the larger font sizes can make
    a difference for some. The goal is to manipulate the fonts to make this reading
    experience as comfortable and as enjoyable as possible.


    ![images](images/p305-01.jpg)


    ## Grow Your Vocabulary Using the Built-in Dictionary


    iBooks contains a very powerful built-in dictionary, which can be quite helpful
    when you run across a word that is new or unfamiliar.


    **TIP:** Using the built-in dictionary is an easy and fantastic way to build your
    vocabulary as you read. Instead of thumbing through a dog-eared dictionary to
    find the word, you will see the definition instantly appear in the pop-up window!


    Accessing the dictionary could not be easier. Just touch and hold any word in
    the book. A pop-up will appear with the following options: use the **Dictionary**,
    set a **Bookmark**, or use **Search** to find other occurrences of this particular
    word.


    ![images](images/p306-01.jpg)


    ![images](images/p306-02.jpg)


    Touch **Dictionary**, and a pronunciation and definition of the word will be displayed.


    ## Setting an In-Page Bookmark


    There may be times when you wish to set an in-text bookmark for future reference.


    The upper right-hand corner includes a **Bookmark** icon. Touch the **Bookmark**
    icon and it will change to a red bookmark on the page.


    ![images](images/p306-03.jpg)


    To view your bookmarks, touch the **Table of Contents** icon at the top left of
    the screen (next to the **Library** icon) and then touch **Bookmarks**. Touch
    the bookmark highlighted and you will jump to that section in the book.


    ![images](images/p307-01.jpg)


    **TIP**: You do not need to set a bookmark every time you leave **iBooks**. **iBooks**
    will automatically remember where you left off in your book. Even if you jump
    to another book, you will return to exactly where you left off when you return
    to the book you were just reading. iBooks will now also sync with your iPhone
    or iPod touch **iBooks** app, so you can move back and forth between devices and
    keep your place.


    ## Using Highlighting and Notes


    There are some very nice "added touches" to the **iBooks** app. There may be times
    when you want to highlight a particular word to come back to at another time.
    There may be other times you want to leave yourself a note in the margin.


    Both of these tasks are very easy to accomplish in the **iBooks** app. This feature
    is not yet available when viewing PDF files in **iBooks**.


    ### Highlighting Text


    Follow these steps to highlight text in a book you''re reading:


    1.  Touch and hold any word to bring up the menu options.

    2.  Choose **Highlight** from the menu options.

    3.  To remove the highlight, touch and hold the highlighted section, and then
    select **Remove Highlight**.


    To change the color of the highlight, do the following:


    1.  Touch and hold the highlighted word.

    2.  Choose **Colors** from the menu.

    3.  Choose a new color (see [Figure 12-3](#Chapter12.html#fig_12_3)).


    ![images](images/1203.jpg)


    **Figure 12-3.** *Using the highlighting feature in **iBooks***


    ### Adding Notes


    Do the following to add a note in the margin:


    1.  Touch and hold any word, as you did previously.

    2.  Choose **Note** from the menu.

    3.  Type in your note and then touch **Done**.

    4.  The note now appears on the side of the page in the margin (see [Figure 12-4](#Chapter12.html#fig_12_4)).


    **TIP**: Your notes will also appear under your bookmarks on the title page. Touch
    the **Title Page** button and then touch **Bookmarks**. The notes you write will
    be at the bottom of the page.


    ![images](images/1204.jpg)


    **Figure 12-4.** *Using the Notes feature in iBooks*


    ## Using Search


    The **iBooks** app contains a powerful search feature built right in. Just touch
    the **Search** bar (as in other programs on the iPad) and the built-in keyboard
    will pop up. Type in the word or phrase for which you are searching and a list
    of chapters is shown where that word occurs.


    Simply touch the selection desired and you will jump to that section in the book.
    You also have the option of jumping right to Google or Wikipedia by touching the
    appropriate buttons at the bottom of the **Search** window.


    ![images](images/p309-01.jpg)


    **NOTE:** Using the Wikipedia or Google search will take you out of **iBooks**
    and launch **Safari**.


    ## Deleting Books


    Deleting books from your **iBooks** library is very similar to deleting applications
    from the iPad.


    In the **Library** view, just touch **Edit** in the top right-hand corner. ![images](images/p310-01.jpg)


    ![images](images/p310-02.jpg)


    Once you touch the **Edit** button, touch any book and a small blue check mark
    will appear.


    Now touch the **Delete** ![images](images/p310-03.jpg) button at the top and you
    will be prompted to **Delete** the book. Once you touch **Delete**, the book will
    disappear from the shelf.


    ![images](images/p310-04.jpg)


    ## Arranging Your Shelf


    The upper right-hand corner of the bookshelf has two icons: **Cover** view and
    **List** view. The default arrangement for your bookshelf is to use the **Cover**
    view.


    Follow these steps to change to **List** view:


    1.  Touch the **List** view icon to the right of the **Cover** view icon.

    2.  Choose whether you wish your books to be listed by **Bookshelf**, **Titles**,
    **Authors**, or **Categories**.

    3.  Touch the corresponding button at the bottom and your view of the shelf will
    change to reflect your choice.


    ![images](images/1205.jpg)


    **Figure 12-5.** *Arranging books in either **Cover** or **List** view*


    ## Collections


    New to iBooks is the ability to store various collections. The two most common
    collections are **PDFs** and **Books**.


    When you receive a PDF in an email (see the example in the next section) or transfer
    a PDF file via iTunes (see [Chapter 29](#Chapter29.html#ch29)), you can choose
    to **Open** the PDF in **iBooks**. It will then be stored in your PDF collection.'
