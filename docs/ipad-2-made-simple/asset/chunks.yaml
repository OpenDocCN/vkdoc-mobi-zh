  trans: '

    # 在 iPad 锁定时显示音乐控制


    即使你的 iPad 处于锁定状态，你仍可以控制音乐。只需（在 iPad 锁定时）双击 `Home` 按钮，用于调节音乐的控制选项便会出现在锁定屏幕的顶部。无需解锁屏幕再前往
    `iPod` 应用查找控制选项。


    ![images](img/p242-01.jpg)


    请注意，右侧图片中的屏幕仍处于锁定状态——但音乐控制选项已显示在顶部。你可以暂停、跳过、返回上一首歌曲或调节音量，而无需实际解锁 iPad。


    ## 家庭共享


    今年 iPad 新增的功能是可通过苹果专有的家庭共享功能共享你的家庭 iTunes 资料库。


    本质上，家庭共享允许你在 iPad 上浏览和播放家庭资料库（通常位于你的台式电脑或网络驱动器上）中的任何内容。


    此功能的一大优势是你不受 iPad 有限存储空间的限制；只要连接到家庭网络，此功能就能让你访问整个资料库。


    请按照以下步骤启用家庭共享：


    1.  点击 `Home` 页面上的 `设置` 图标。

    2.  触摸左侧栏中的 `iPod` 图标。

    3.  在右侧的 `家庭共享` 标题下输入你的 `Apple ID` 和 `密码`。请确保输入的网络中已启用家庭共享的电脑所使用的 Apple ID 和密码相同（参见第
    29 章）。

    4.  触摸键盘上的 `完成` 按钮。

    5.  启动 `iPod` 应用，注意左上角出现了一个名为 `资料库` 的新类别。

    6.  触摸 `资料库`，查看可供浏览的网络资料库。

    7.  选择你的 `网络` 资料库，即可在 iPad 上浏览和播放家庭网络中的任何项目（参见图 9–4）。


    **图 9–4.** *在 iPad 上使用家庭共享*


    ## AirPlay


    `AirPlay` 程序是 iPad 内置的另一项苹果专有功能。`AirPlay` 可在多种应用中调用，但此处我们仅关注 `AirPlay` 和 `iPod`
    应用。


    `AirPlay` 本质上是一种内置的无线音乐流媒体功能，可将音乐流传输到兼容 `AirPlay` 的设备上，例如 Apple TV 或无线扬声器系统。


    连接好 Apple TV 后，你可以选择 `AirPlay`，iPad 上播放的任何内容都会自动流传输到你的家庭影院系统中。


    使用 `AirPlay` 很简单；请按照以下步骤操作：


    1.  启动你的 iPod 应用。

    2.  播放任意歌曲或专辑。

    3.  触摸 `AirPlay` 图标。

    4.  选择你想要发送音乐的 `AirPlay` 设备（参见图 9–5）。


    ![images](img/0905.jpg)


    **图 9–5.** *在 iPad 上使用 `AirPlay`*


    ## 收听免费网络电台 (Pandora)


    虽然你的 iPad 能让你以前所未有的方式控制个人音乐资料库，但有时你可能只想“换换口味”听听其他音乐。


    **提示：** 一个基础的 Pandora 账户是免费的，与从 iTunes Store 购买大量新歌相比，可以为你节省不少钱。


    `Pandora` 源于音乐基因组计划。这是一项浩大的工程。一大群音乐分析师审视了几乎所有录制过的歌曲，然后为每首歌曲开发了一套复杂的属性算法。


    **注意：** 当你读到本书时，Pandora 可能会有一些竞争对手。目前有一个名为 `Slacker Personal Radio` 的竞争对手，但未来可能会有更多。如果你想寻找更多选择，可以尝试在
    App Store 中搜索“iPad Internet Radio”。另请注意，`Pandora` 是一款仅限于美国的应用程序。`Slacker` 仅在美国和加拿大可用，而
    `Spotfly` 在欧洲很流行。希望未来国际用户能有更多选择。


    ### Pandora 入门


    `Pandora` 允许你围绕自己喜欢的艺术家创建独特的个性化电台。最棒的是，它完全免费！


    ![images](img/p245-01.jpg)


    首先，从 App Store 下载 `Pandora` 应用。只需前往 App Store 搜索“Pandora”即可。


    现在，触摸 `Pandora` 图标启动应用。


    首次启动 `Pandora` 时，系统会要求你创建账户（若已有账户则登录）。只需填写相应信息——需要提供电子邮件地址和密码——你就可以开始设计自己的音乐聆听体验了。


    ![images](img/p245-02.jpg)


    `Pandora` 也适用于 Windows 或 Mac 电脑，以及大多数智能手机平台。如果你已有 Pandora 账户，只需登录即可。


    ![images](img/p245-03.jpg)


    ### Pandora 主屏幕


    你的电台会列在左侧。只需触摸其中一个电台，它就会开始播放。通常，第一首歌会来自你选择的艺术家本人，后续歌曲则来自风格相似的艺术家。


    ![images](img/p246-01.jpg)


    iPad 的大屏幕让你能看到大量信息。


    在页面中间，你会看到艺术家的精美简介，并且会随每首新歌而变化。


    左下角的窗口中还会有一个小广告——如果你升级到 `Pandora One`，你会看到一个与 `iPod` 音乐应用中“正在播放”专辑封面非常相似的窗口。


    ![images](img/p246-02.jpg)


    ### 在 Pandora 中点赞或踩


    如果你喜欢某首特定歌曲，触摸 `点赞` 图标，你将听到更多来自该艺术家的歌曲。


    相反，如果你不喜欢此电台中的某位艺术家，触摸 `踩` 图标，你将不会再听到该艺术家的歌曲。


    你也可以暂停歌曲稍后再回来听，或者跳过当前曲目，播放下一个选择。


    ![images](img/p247-01.jpg)


    **注意：** 使用免费 Pandora 账户时，你每小时可以跳过的次数是有限的。你还会偶尔听到广告。要消除这些限制，可以升级到付费的 Pandora One
    账户，下文会稍作说明。


    ### Pandora 菜单


    在简介右上方有一个 `菜单` 按钮。触摸它，你可以收藏艺术家或歌曲，或者前往 iTunes Store 购买该艺术家的音乐。


    ![images](img/p247-02.jpg)


    ### 在 Pandora 创建新电台


    只需触摸左上角显示 `艺术家、歌曲或作曲家` 的 `搜索` 窗口，并输入艺术家、歌曲或作曲家的名称。


    找到你想找的内容后，触摸该选择项，`Pandora` 会立即围绕你的选择开始构建电台。


    ![images](img/p247-03.jpg)


    然后你会看到新电台与你的其他电台一起列出。


    在 Pandora 中你可以创建多达 100 个电台。


    ![images](img/p248-01.jpg)


    **提示：** 你可以通过点击屏幕左下角的 `按日期` 或 `ABC` 按钮来整理你的电台。

    '
- fmt: '# Adjusting Pandora''s Settings—Your Account, Upgrade, and More


    You can sign out of your Pandora account, adjust the audio quality, and even upgrade
    to **Pandora One** (which removes advertising) by tapping the **Settings** icon
    in the lower-left corner of the screen (see [Figure 7-5](#Chapter07.html#fig_7_5)).


    ![images](images/0906.jpg)


    **Figure 9–6.** *Setting options in **Pandora***


    To sign out, tap your account name.


    To adjust the sound quality, move the switch under **Cell Network Audio Quality**
    to either **ON** or **OFF**. When you are on a cellular network, setting this
    to **OFF**is probably better; otherwise, you may hear more skips and pauses in
    the playback.


    **NOTE:** You can only adjust the **Cell Network Audio Quality** on the iPad +
    3G models.


    When you are on a strong Wi-Fi connection, you can set this to **ON** for better
    quality. See [Chapter 5](#Chapter05.html#ch5): “Wi-Fi and 3G Connections” to learn
    more about the various connections.


    To save your battery life, you should set the **Auto-Lock** to **ON**, which is
    the default. If you want the force the screen to stay lit, then switch this to
    setting to **OFF**.


    To remove all advertising, tap the **Upgrade to Pandora One** button. A web browser
    window will open, and you''ll be take to Pandora''s web site to enter your credit
    card information. At the time of publishing, the annual account cost is $36.00,
    but that may be different by the time you read this book.


    ## Using AirPlay in Pandora


    You can magically “send” your music from **Pandora** to any **AirPlay** compatible
    device, just as you did earlier from the **iPod** app. The only difference is
    that, in order to access the **AirPlay** controls, you need to access the **App
    Switcher** bar.


    Follow these steps to do so:


    1.  Double click the **Home** button to bring up the **App Switcher** bar.

    2.  Slide the **App Switcher** bar from left to right to show the **Music** controls.
    If you have many apps open, you may need to slide a couple of times.

    3.  Touch the **AirPlay** icon in the **Music** controls and select the **AirPlay**-compatible
    device to send your music to.


    ![images](images/0907.jpg)


    **Figure 9–7.** *Using **Airplay** in **Pandora***


    # Chapter 10


    # Viewing Videos, TV Shows, and More


    The iPadis an amazing “media consumption” device. Nowhere is this more apparent
    than in the various video-viewing applications available.


    In this chapter, we will show you how to watch movies, TV shows, podcasts, and
    music videos on your iPad. You can buy or download such content for free from
    the iTunes store or iTunes University (iTunes U). You can also link your iPad
    to your Netflix account (and most likely other video rental services soon), allowing
    you to watch streaming TV shows and movies.


    With your iPad, you can also watch YouTube videos and videos from the Web on your
    Safari browser and through various apps like the **ABC** app from the App Store.


    **NOTE:** Some apps, such as Canada''s **Global**, are exclusive in each region.
    Video apps can vary by region, so check your local App Store and be sure to search
    for local TV network names like ABC or Global.


    ## Using Your iPad As a Video Player


    The iPad is more than a capable music player; it is also a fantastic, portable
    video-playing system. Its widescreen, fast processor, and great operating system
    make watching anything from music videos to TV shows and full-length motion pictures
    a real joy. The size of the iPad is perfect for watching shows while sitting back
    in a chair or while on an airplane. It is also great for the kids in the back
    seat of long car trips. The ten-hour battery life means you can even go on a coast-to-coast
    flight and not run out of power! You can also buy a *power inverter* for your
    car to keep the iPad charged even longer (see the “Charging Your iPad and Battery
    Tips” section in [Chapter 1](#Chapter01.html#ch1) for more information).


    ## Loading Videos onto Your iPad


    You can load videos on your iPad just as you do your music, using iTunes from
    your computer or right from the **iTunes** icon on your iPad.


    If you purchase or rent videos and TV shows from iTunes on your computer, then
    you can manually or automatically sync them to your iPad.


    ## Watching Videos on the iPad


    To watch videos on your iPad, click the **Videos** icon, which is usually on the
    first page of icons on your **Home** screen.


    **NOTE:** You can also watch videos from the **YouTube** icon, the **Safari**
    icon, and other video-related apps you download from the App Store.


    ![images](images/p252-01.jpg)


    ### Video Categories


    You can see several category buttons along the top of the **Videos** screen: **Movies,
    TV Shows**, **Podcasts**, and **Music Videos**.


    **NOTE:** If you enabled Home Sharing (see [Chapter 9](#Chapter09.html#ch9)),
    you will also see a button for **Shared**.


    ![images](images/p252-02.jpg)


    ![images](images/p252-03.jpg)


    The default view is the **Movies** view; if you have any movies loaded on the
    iPad, they will be visible.


    You may see more or fewer categories depending on the types of videos you have
    loaded on your iPad. If you have only **Movies** and **iTunes U** videos, then
    you will see only those two category buttons. Touch any of the other categories
    to show the corresponding videos in each category.


    ### Playing a Movie


    ![images](images/p253-01.jpg)


    Just Simply touch the movie you wish to watch, and it will begin to play (see
    [Figure 10-1](#Chapter10.html#fig_10_1)). Most videos take advantage of the iPad''s
    relatively large screen, playing in **Widescreen** (also known as **Landscape**)
    mode. Just turn your iPad to watch them.


    ![images](images/1001.jpg)


    **Figure 10–1.** *Playing a video*


    When a video starts to play, you will see only that video; you won''t see any
    menus, controls, or anything else on the screen.


    #### To Pause or Access Controls


    Touch anywhere on the screen, and the control bars and options will become visible
    (see [Figure 10–2](#Chapter10.html#fig_10_2)). Most controls are similar to those
    in the **Music Player** app. Tap the **Pause** button, and the video will pause.


    ![images](images/1002.jpg)


    **Figure 10–2.** *The controls of the **Videos** app*


    #### Fast-Forward or Rewind the Video


    You can see the expected **Fast-Forward** and **Rewind** buttons of the **Videos**
    app on either side of the **Play/Pause** button. To jump to the next chapter-specific
    part of the video, just touch and hold the **Fast-Forward** button (to the right
    of the **Play/Pause** button). When you get to the desired spot in the video,
    release the **Fast-Forward** button. The video will begin playing normally.


    To rewind to the beginning on the video, tap the **Rewind** button. To rewind
    to a specific part or location, touch and hold the **Rewind** button, just as
    you did when fast-forwarding the video.


    **NOTE:** If you''re viewing a full-length movie with several chapters, tapping
    either **Reverse** or **Fast-Forward** will move either back or ahead one chapter.


    #### Using the Time Slider Bar


    At the top of the video screen is a slider that shows you the elapsed time of
    the video. If you know exactly (or approximately) which point in the video you
    wish to watch, just hold and drag the slider to that location. Some people find
    this to be a little more exact than holding down the **Fast-Forward** or **Rewind**
    buttons.


    **TIP:** Drag your finger down to move the slider more slowly. In other words,
    start by touching the **Slider** control, then drag your finger down the screen—notice
    that the further down the screen your finger is, the slower the slider moves left
    or right.'
  raw: '#### Adjusting Pandora''s Settings—Your Account, Upgrade, and More


    You can sign out of your Pandora account, adjust the audio quality, and even upgrade
    to **Pandora One** (which removes advertising) by tapping the **Settings** icon
    in the lower-left corner of the screen (see [Figure 7-5](#Chapter07.html#fig_7_5)).


    ![images](images/0906.jpg)


    **Figure 9–6.** *Setting options in **Pandora***


    To sign out, tap your account name.


    To adjust the sound quality, move the switch under **Cell Network Audio Quality**
    to either **ON** or **OFF**. When you are on a cellular network, setting this
    to **OFF**is probably better; otherwise, you may hear more skips and pauses in
    the playback.


    **NOTE:** You can only adjust the **Cell Network Audio Quality** on the iPad +
    3G models.


    When you are on a strong Wi-Fi connection, you can set this to **ON** for better
    quality. See [Chapter 5](#Chapter05.html#ch5): “Wi-Fi and 3G Connections” to learn
    more about the various connections.


    To save your battery life, you should set the **Auto-Lock** to **ON**, which is
    the default. If you want the force the screen to stay lit, then switch this to
    setting to **OFF**.


    To remove all advertising, tap the **Upgrade to Pandora One** button. A web browser
    window will open, and you''ll be take to Pandora''s web site to enter your credit
    card information. At the time of publishing, the annual account cost is $36.00,
    but that may be different by the time you read this book.


    ### Using AirPlay in Pandora


    You can magically “send” your music from **Pandora** to any **AirPlay** compatible
    device, just as you did earlier from the **iPod** app. The only difference is
    that, in order to access the **AirPlay** controls, you need to access the **App
    Switcher** bar.


    Follow these steps to do so:


    1.  Double click the **Home** button to bring up the **App Switcher** bar.

    2.  Slide the **App Switcher** bar from left to right to show the **Music** controls.
    If you have many apps open, you may need to slide a couple of times.

    3.  Touch the **AirPlay** icon in the **Music** controls and select the **AirPlay**-compatible
    device to send your music to.


    ![images](images/0907.jpg)


    **Figure 9–7.** *Using **Airplay** in **Pandora***


