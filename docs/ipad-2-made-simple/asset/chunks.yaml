    \n##### Step 2: Print from your iPad\n\nPrinting is easy and straightforward.\
    \ Follow these steps to do so:\n\n1.  Open the mail message you wish to print.\n\
    2.  Tap the **Rounded Arrow** icon in the upper-right cornerand select **Print**.\n\
    \n    ![images](images/p339-01.jpg)\n\n3.  Tap **Printer** to select your printer\
    \ from the network. (You'll only need to do this once because the iPad remembers\
    \ your selection.)\n\n    ![images](images/p339-02.jpg)\n\n4.  Once selected,\
    \ the printer name will appear. Adjust the number of copies using the **Plus**\
    \ (+) and **Minus** (-) buttons.\n5.  When you are ready to print, tap **Print**\
    \ and your document will be printed wirelessly on your printer.\n\n![images](images/p340-01.jpg)\n\
    \n##### Checking on Your Printing Documents\n\nYou can check on the status of\
    \ your printing documents using the **Print Center** app. Follow these steps to\
    \ do so:\n\n1.  Double-tap the **Home** button until you see the gray bar **(multitasking\
    \ window)** of icons appear at the bottom of the screen.\n2.  You can see the\
    \ active print jobs and, if you desire, stop the printing using the **Cancel Printing**\
    \ button.\n\n![images](images/p340-02.jpg)\n\n#### Compose a New Message\n\nFrom\
    \ any mail screen, tap the **Compose** icon in the upper-right corner to start\
    \ writing a new email message.\n\n![images](images/p341-01.jpg)"
  trans: "\n# 批量移动（归档）邮件\n\n若要一次移动大量邮件，请打开收件箱并按照以下步骤操作：\n\n1.  点击收件箱右上角的`编辑`按钮（见图\
    \ 13-6）。\n2.  点击任意邮件以选中它——选中后，邮件旁边会显示一个`红色对勾`图标。\n3.  点击屏幕底部的`移动`按钮。\n4.  此时将显示你已从邮件账户同步的文件夹列表。在图\
    \ 13-6 中，我们有多个文件夹；但根据 iPad 的设置方式，你可能只看到两个文件夹：`邮件`和`废纸篓`。\n\n**提示:** 你可以通过`设置`应用添加更多需要同步的邮件文件夹。依次点击`邮件、通讯录、日历`，然后点击你要调整的账户。如果你看到`要推送的邮件文件夹`选项，则点击它并进行调整。如果未看到该选项，则无法针对你的特定账户同步其他邮件文件夹。\n\
    \n![images](img/1306.jpg)\n\n**图 13–6.** *一次移动多个邮件*\n\n# 删除单个邮件\n\n删除邮件有几种方法。\n\
    \n在查看邮件时，点击屏幕右上角的`垃圾桶`图标 ![images](img/p334-01.jpg)。\n\n邮件会缩小，垃圾桶盖会打开，邮件会飞入桶内，然后盖子关闭。这还挺有趣的——试试看吧！\n\
    \n![images](img/p334-02.jpg)\n\n删除单个邮件的另一种方法是从收件箱操作。\n\n只需在邮件上向左或向右滑动，直到出现`删除`按钮。\n\
    \n然后，点击`删除`按钮。\n\n![images](img/p335-01.jpg)\n\n**提示:** 你可以通过`设置`应用让 iPad 在删除邮件前进行确认。操作方法是：依次点击`邮件、通讯录、日历`，然后将`删除前询问`旁边的开关设置为`打开`。\n\
    \n# 批量删除邮件\n\n若要一次删除大量邮件，请打开收件箱，并使用前面介绍的将邮件移动到其他文件夹的方法：\n\n1.  点击收件箱右上角的`编辑`按钮（见图\
    \ 13-7）。\n2.  点击任意邮件以选中它——选中后，邮件旁边会显示一个`红色对勾`图标。\n3.  点击屏幕底部的`删除`按钮。\n\n![images](img/1307.jpg)\n\
    \n**图 13–7.** *一次移动多个邮件*\n\n# 回复邮件\n\n你可能最常用的是`回复`命令。请按以下步骤在 iPad 上回复邮件：\n\n1.\
    \  在阅读邮件时，点击右上角的`圆箭头`图标。\n\n    ![images](img/p336-01.jpg)\n\n2.  从按钮下拉列表中选择`回复`或`全部回复`。\n\
    \n    ![images](img/p337-01.jpg)\n\n3.  输入回复内容，然后点击右上角的`发送`。\n\n    ![images](img/p337-02.jpg)\n\
    \n# 使用全部回复\n\n使用`全部回复`选项与使用`回复`功能类似，不同之处在于原始邮件的所有收件人和发件人都会被填入地址栏。原始发件人将出现在`收件人`行，而原始邮件的其他所有收件人将列在`抄送`行。只有当原始邮件有多个收件人时，你才会看到`全部回复`选项。\n\
    \n**警告:** 使用`全部回复`时要格外小心。如果某些收件人因超出屏幕范围而未显示在原始邮件中，使用此功能可能会很危险。如果你确实使用了`全部回复`，请务必检查`收件人`和`抄送`列表，确保所有收件人都应该收到你的回复。\n\
    \n# 转发邮件\n\n有时，你会收到想要转发给他人的邮件。`转发`命令可以帮你实现这一点（有关处理附件的更多信息，请参见本章的“电子邮件附件”部分）。\n\
    \n**注意:** 需要转发附件才能将其发送给他人。如果你想把收到的邮件中的附件发送给其他人，则必须选择`转发`选项。（请注意，选择`回复`和`全部回复`选项不会在发件中包含原始邮件的附件。）\n\
    \n与使用`回复`一样，首先点击右上角的`圆箭头`图标，然后从按钮下拉列表中选择`转发`。\n\n系统可能会提示你选择是否要包含原始邮件中的附件（如果有的话）。\n\
    \n此时，按照前面介绍的相同步骤输入邮件内容、添加收件人并发送。\n\n# 打印邮件\n\n现在，只要你拥有兼容 Apple `AirPrint`的打印机，或者可以接收电子邮件并打印附件的打印机，就可以从\
    \ iPad 上打印邮件。在本节中，我们将向你展示如何使用 Apple 的`AirPrint`打印邮件。以下是出版时`AirPrint`兼容打印机的列表（见表\
    \ 14-1）。我们的测试使用的是 HP Photosmart e-AiO (D110a) 打印机。\n\n**表 13–1.** *`AirPrint`\
    \ 兼容打印机列表*\n\n| HP Envy eAll-in-One 系列 (D410) | HP LaserJet Pro CM1415fnw 彩色多功能打印机\
    \ |\n| HP Photosmart Plus e-AiO (B210) | HP LaserJet Pro CP1525n 彩色打印机 |\n| HP\
    \ Photosmart Premium e-AiO (C310) | HP LaserJet Pro CP1525nw 彩色打印机 |\n| HP Photosmart\
    \ Premium Fax e-AiO (C410) | HP Officejet 6500A e-AiO |\n| HP Photosmart e-AiO\
    \ (D110) | HP Officejet 6500A Plus e-AiO |\n| HP Photosmart Wireless e-AiO (B110)—欧洲和亚太地区\
    \ | HP Officejet 7500A 宽幅面 e-AiO |\n| HP Photosmart eStation (C510) | HP Officejet\
    \ Pro 8500A e-AiO |\n| HP LaserJet Pro M1536dnf 多功能打印机 | HP Officejet Pro 8500A\
    \ Plus e-AiO |\n| HP LaserJet Pro CM1415fn 彩色多功能打印机 | HP Officejet Pro 8500A Premium\
    \ e-AiO |\n\n## 第 1 步：将 AirPrint 兼容打印机连接到网络\n\n在向打印机发送打印任务之前，你需要将其连接到与 iPad 相同的无线\
    \ Wi-Fi 网络。Wi-Fi 网络安全设置各不相同，因此本书未提供详细步骤。请使用打印机随附的说明将其连接到网络。\n\n## 第 2 步：从 iPad\
    \ 打印\n\n打印操作简单直观。请按以下步骤操作：\n\n1.  打开你要打印的邮件。\n2.  点击右上角的`圆箭头`图标，然后选择`打印`。\n\n\
    \    ![images](img/p339-01.jpg)\n\n3.  点击`打印机`，从网络中选择你的打印机。（此操作只需执行一次，因为 iPad\
    \ 会记住你的选择。）\n\n    ![images](img/p339-02.jpg)\n\n4.  选择后，打印机名称将显示出来。使用`加号` (+)\
    \ 和`减号` (-) 按钮调整打印份数。\n5.  准备就绪后，点击`打印`，文档将通过无线网络在打印机上打印出来。\n\n![images](img/p340-01.jpg)\n\
    \n## 查看正在打印的文档\n\n你可以使用`打印中心`应用查看正在打印的文档状态。请按以下步骤操作：\n\n1.  双击`主屏幕`按钮，直到屏幕底部出现灰色的应用程序图标栏（多任务窗口）。\n\
    2.  你可以看到正在进行的打印作业，如果需要，还可以点击`取消打印`按钮停止打印。\n\n![images](img/p340-02.jpg)\n\n#\
    \ 编写新邮件\n\n在任何邮件界面中，点击右上角的`编写`图标，即可开始撰写新邮件。\n\n![images](img/p341-01.jpg)\n"
- fmt: '### Address the Message


    You have a few options for selecting recipients, depending on whether the person
    is in your `Contact` list on your iPad:


    **Option 1**: Type a few letters of someone''s first name, then hit the `Space`
    key and then type a few letters of that person''s last name. The person''s name
    should appear in the list; tap that person''s name to select that contact.


    ![images](images/p341-02.jpg)


    **Option 2**: Type an email address. Notice the `@` and `Period` (`.`) keys on
    the keyboard, which help your typing.


    **TIP:** Press and hold the `Period` key to see `.com`, `.edu`, `.org`, and other
    email domain name suffixes.


    ![images](images/p342-01.jpg)


    **Option 3**: Hit the `Plus` (`+`) sign ![images](images/plus.jpg) to view your
    entire `Contact` list and search or select a name from it.


    If you want to use a different contact group, tap the `Groups` button in the upper-left
    corner.


    ![images](images/p342-02.jpg)


    ### Deleting a Recipient


    If you need to delete a name from the recipients list (`To:`, `Cc:`, or `Bcc:`),
    tap the name to select it ![images](images/p342-03.jpg) and hit the `Backspace`
    key ![images](images/p342-04.jpg).


    **TIP:** If you want to delete the last recipient you typed (and the cursor is
    sitting next to that name), hit the `Delete` key once to highlight the name and
    hit it a second time to delete it.


    ### Adding a CC or BCC Recipient


    ![images](images/p343-01.jpg) To add a carbon copy (`Cc:`) or blind carbon copy
    (`Bcc:`) recipient, you need to tap the `Cc:/Bcc:` field just under the `To:`
    field at the top of the email message. Doing so opens up the tapped field.


    ![images](images/p343-02.jpg)


    ### Changing the Email Account to Send From


    If you have more than one email account set up, the iPad will use whichever account
    is set as the default account. (This is set in `Settings` -> `Mail, Contacts,
    Calendars` -> `Default Account` at the bottom of the `Mail` section.)


    Follow these steps to change the email account you send from:


    1.  Tap an email''s `From:` field to highlight it.

    2.  Tap a new email account to select it.


    ![images](images/p343-03.jpg)


    ### Type Your Subject


    Now you need to enter a subject for your email. Follow these steps to do so:


    1.  Touch the `Subject:` line and enter text for the `Subject:` field of the email.

    2.  Press the `Return` key or tap the `Body` section of the email to move the
    cursor to the `Body` section.


    ![images](images/p343-04.jpg)


    ### Typing Your Message


    Now that the cursor is in the body of the email (under the subject line), you
    can start typing your email message.


    ### Email Signature


    The default email signature is shown in the image to the right: `Sent from my
    iPad`.


    **TIP:** You can change this signature to be anything you want; see the “Changing
    Your Email Signature” section later in this chapter.


    ![images](images/p344-01.jpg)


    **TIP:** If you have larger hands, it might be easier to type when the keyboard
    is larger. Once you get the hang of typing on the larger keyboard with two hands,
    you will find that it is much faster than typing with one finger. Also, you will
    see auto-capitalization and auto-correction happening. Learn more about typing
    in [Chapter 2](#Chapter02.html#ch2): “Typing Tips, Copy/Paste, and Search” for
    more typing tips.


    ### Send Your Email


    Once you have typed your message, tap the blue `Send` button in the top-right
    corner. Your email will be sent, and you should hear the iPad''s sent mail sound,
    which confirms that your email was sent. You can learn how to enable or disable
    this sound in the “Adjusting Sounds on your iPad” section of [Chapter 7](#Chapter07.html#ch7):
    “Personalize and Secure your iPad.”


    ![images](images/p344-02.jpg)


    ### Save As Draft to Send Later


    If you are not ready to send your message, but want to save it as a draft message
    to send later, follow these steps:


    1.  Compose your message, as described earlier.

    2.  Press the `Cancel` button in the upper-left corner.

    3.  Select the `Save Draft` button at the bottom of the screen.


    ![images](images/p345-01.jpg)


    Later, when you want to locate and send your draft message, follow these steps:


    1.  Open the `Drafts` folder in the email account from which you composed this
    message. See the “Moving Around in Mail Folders” section earlier in this chapter
    for help getting into the `Drafts` folder.

    2.  Tap the email message in the `Drafts` folder to open it.

    3.  Tap anywhere in the message to edit it.

    4.  Tap the `Send` button.


    ### Checking Sent Messages


    ![images](images/p345-02.jpg)


    Follow these steps to confirm that the email was sent correctly:


    1.  Tap the `Email account name` button in the upper-left corner to see the mail
    folders for the account you just used to send your message.

    2.  Tap the `Sent` folder.

    3.  Verify that that the top email you see in the list is the one you just composed
    and sent.


    **NOTE:** You will only see the `Sent` and `Trash` folders if you have actually
    sent or deleted email from that account on the iPad. If your email account is
    an IMAP account, you may see many folders other than those described in this chapter.


    ## Working With Email Attachments


    Some email attachments are opened automatically by the iPad, so you don''t even
    notice that they were attachments. Examples of these include Adobe''s portable
    document format (`PDF`) files (used by `Adobe Acrobat` and `Adobe Reader`, among
    other apps) and some types of image, video, and audio files. You may also receive
    other documents as attachments, such as Apple''s `Pages`, `Numbers`, and `Keynote`
    files or Microsoft''s `Word`, `Excel`, and `PowerPoint` files. You will need to
    open these manually.


    **NOTE:** You can preview many types of files—for example, word processing and
    spreadsheet documents—using the `Quick View` function. However, if you want to
    edit a file, you need to open it in an app that allows for editing using the `Open
    In` feature.


    ### Knowing When You Have an Attachment


    Any email with an attachment will have a little `Paperclip` icon next to the sender''s
    name, as shown to the right. When you see that icon, you know you have an attachment.


    ![images](images/p346-01.jpg)


    ### Receiving an Auto-Open Attachment


    Now assume you received a few pictures or a one-page PDF file. (Multipage PDF
    files require that you tap to open them.)


    Once you open the mail message with this kind of attachment, you will see it directly
    below the message.


    In this example, there were several photos attached to this message that automatically
    opened. We just need to swipe down to see all the photos.


    ![images](images/p347-01.jpg)


    ### Saving Pictures You Receive


    Say you liked one or more of the pictures you received. In order to save a photo
    on your iPad, press and hold any picture until you see a pop-up window appear.


    In this example, we have four pictures, so we see `Save Image`, `Save 4 Images`,
    and `Copy`.


    These images will be in your `Photos` app in the `Saved Photos` album. See [Chapter
    16](#Chapter16.html#ch16): “iPad Photography” for more information about your
    `Photos` app.


    ![images](images/p347-02.jpg)'
