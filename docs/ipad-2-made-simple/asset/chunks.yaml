- fmt: '#### Sharing Your Movie


    Touch the `Share` button and `iMovie` gives you the option to share your movie
    to `YouTube`, `Facebook`, `Vimeo`, or `CNNiReport`. It also gives you the option
    to send the project to `iTunes`.


    ![images](images/p449-01.jpg)


    Choose the site to which you wish to share the project. An options screen will
    appear that lets you choose the export size of the movie. You can choose to export
    your movie as an HD (720p), large (540p), or medium (360p) movie file.


    ![images](images/p449-02.jpg)


    **NOTE**: HD 720p movies have the best quality; however, these can be quite large,
    depending on the length of the movie. Obviously, it will take longer to email
    or upload an HD movie than an equivalent-length large- or medium-sized movie.


    The `Export` screen marks the progress of the movie export. Follow these steps
    to share a project from your `Camera Roll`:


    1.  Choose `Camera Roll` from the options in the `Share` menu.

    2.  Go to your `Camera Roll` (see [Chapter 16](#Chapter16.html#ch16): “iPad Photography”
    for more information on how to do this).

    3.  Find the new movie in the `Camera Roll`. You will see a `Video` icon at the
    bottom of the picture; the image will also show the length of the video.

    4.  Touch the video from the `Camera Roll`.

    5.  Choose `Share` from the soft keys at the bottom.

    6.  Choose to send your project through one of the following methods: `Email`,
    `MobileMe`, `YouTube`, or `Copy`.


    **NOTE**: To maintain your high quality 720p video, you should sync it back to
    your computer. Manual uploads over Wi-Fi will possibly let you share your movie
    at the highest quality. Syncing your movies to iTunes will ensure that the original
    quality is preserved.


    ##### Uploading to YouTube


    The iPad allows you to upload an HD (720p) `iMovie` project right to your YouTube
    account. You just need to be connected to a Wi-Fi network. Follow these steps
    to upload a video to YouTube:


    1.  Locate the project you wish to upload in your `iMovie` projects.

    2.  Touch the `Share` icon.

    3.  Choose `YouTube`.

    4.  Enter a `Title`, `Description`, and `Tags` for the video.

    5.  Choose `Medium`, `Large`, or `HD` for the `Size`.

    6.  Choose a `Category` for the video.

    7.  Touch the `Share` button when done.

    8.  Finally, choose to either `View on YouTube` or to `Tell a Friend` (via email)
    that the video has been published (see [Figure 17–6](#Chapter17.html#fig_17_6)).


    ![images](images/1706.jpg)


    **Figure 17–6.** *Uploading an `iMovie` project to YouTube*


    ## Chapter 18


    ## FaceTime Video Messaging and Skype


    Your iPad brings many new capabilities to your life, some of which seemed like
    science fiction just a few years ago. For example, video calling is now not only
    possible, but also extremely easy to use with the new `FaceTime` app.


    ![images](images/p453-01.jpg)


    As long as you and your caller are on iOS device and you''re both on a Wi-Fi network,
    you can have unlimited video calls. In this chapter, we will show you how to enable
    and use the `FaceTime` program, as well as how to start having fun with this great
    new feature.


    Making calls over Wi-Fi is also possible with `Skype`, the popular video calling
    and chat program that many of us use on our computers. We will show you how you
    can also use the `Skype` app on your iPad.


    ### Video Calling


    For many years, we have watched TV episodes and movies debut future technology
    like this. For example, many of these episodes and movies have shown people talking
    on small, portable phones and having video conversations. Even *The Jetsons* cartoon
    in the 1970s had this as a future concept.


    The iPad makes that future thinking a reality today.


    #### Setting up FaceTime


    `FaceTime` needs to be set up the first time you use it on your iPad. The process
    is usually pretty painless. Because the iPad is not a phone, `FaceTime` needs
    to be associated with an email address to work. Follow these steps to associate
    `FaceTime` with an email address:


    1.  Touch the `FaceTime` icon (it''s usually located on the first `Home` screen
    of the iPad).

    2.  Sign into your Apple account using either your `Apple ID` or your `MobileMe`
    user name and password. If you don''t have an account (or if you want to create
    new one specifically for `FaceTime` purposes), just touch the `Create New Account`
    button (see [Figure 18–1](#Chapter18.html#fig_18_1)).

    3.  Once the account is set up, you can choose the email address you want to use
    for placing `FaceTime` calls. You can also add other email addresses to use with
    your `FaceTime` account.


    **NOTE:** Once `FaceTime` is set up, you can always make adjustments or add additional
    email addresses by going to `Settings` and then to the `FaceTime` tab. From this
    tab, you can choose to add more email addresses or change your caller ID for `FaceTime`
    calls.


    ![images](images/1801.jpg)


    **Figure 18–1.** *Setting up a FaceTime account on your iPad*


    #### Video Calling with FaceTime


    `FaceTime` is the featured app highlighted in many of Apple''s iPhone and iPad
    commercials. Essentially, `FaceTime` is free over Wi-Fi calling that allows you
    to see the caller on the other end of the conversation through the phone''s front-facing
    camera.


    **NOTE**: For now `FaceTime` is only available on the Mac, the new iPhone 4, iPod
    touch, and the newest iPad 2 devices running iOS 4.3 and higher; also, it''s only
    available over a Wi-Fi network.


    ##### Enabling FaceTime Calling on Your iPad


    When you first use your iPad, `FaceTime` is not yet enabled. To enable the iPad
    to receive and make `FaceTime` calls, follow these steps:


    1.  Go to your `Settings` icon and touch it.

    2.  Scroll down to the `FaceTime` option tab.

    3.  Toggle the `FaceTime` switch to the `ON` position.


    #### Using FaceTime


    Once `FaceTime` is enabled, you can place a `FaceTime` call from the `FaceTime`
    app or from the `FaceTime` button at the bottom of a contact page. `FaceTime`
    will only work, however, if the other caller is on an iPad 2, iPod touch or iPhone
    4, and the `FaceTime` feature is enabled on both devices.


    ![images](images/p455-01.jpg)


    To initiate a `FaceTime` call, follow these steps:


    1.  Touch the `FaceTime` icon (initially on the first `Home` screen) on your iPad.

    2.  Choose a `Favorite`, a `Recent`, or a `Contact` who is capable of receiving
    a `FaceTime` call. The app will ask the caller on the other end to `Accept` the
    `FaceTime` call.


    Accepting a call from someone else is also easy. Simply `Accept` the `FaceTime`
    call from the other caller by touching `Accept` button or by `Sliding to Answer`
    if the iPod is in `Sleep` mode (see [Figure 18–2](#Chapter18.html#fig_18_2)).


    ![images](images/1802.jpg)


    **Figure 18–2.** *Accepting a `FaceTime` call*


    Once a `FaceTime` call is initiated, follow these steps to conduct a video conference:


    1.  Hold the phone away from you a bit.

    2.  Make sure you are *framed* properly in the window.

    3.  You can move the small image of yourself around the screen to a convenient
    spot.

    4.  Touch the `Switch Camera` button to show the `FaceTime` caller you are looking
    at. The `Switch Camera` button will now use the standard camera on the back of
    the iPad. In [Figure 18–3](#Chapter18.html#fig_18_3), I get to see what my friend''s
    daughter is doing and she gets to see her mom and me in the lower-right corner.

    5.  Touch the `End` button to end the `FaceTime` call.

    6.  Touch the `Mute` button to temporarily mute the call.


    ![images](images/1803.jpg)


    **Figure 18–3.** *Switching camera views on a `FaceTime` call*


    **NOTE**: You can use `FaceTime` in both `Portrait` and `Landscape` modes on the
    iPad 2. Just remember that, when you are in `Landscape` mode, the camera will
    be off to the side of the device.'
