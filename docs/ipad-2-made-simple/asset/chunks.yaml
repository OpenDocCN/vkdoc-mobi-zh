- fmt: '# AirPlay


    `AirPlay` is another Apple proprietary function built into the iPad. `AirPlay`
    is available across a wide range of apps, but here we will just look at `AirPlay`
    and the `Videos` app.


    `AirPlay` essentially is built-in wireless streaming of your music to an AirPlay-compatible
    device, such as an Apple TV or a wireless-speaker system.


    With an Apple TV hooked up, you can choose `AirPlay` and have whatever is playing
    on your iPad stream automatically to your TV or home theater setup.


    Using `AirPlay` is as simple as following these steps:


    1. Start your `Videos` app.

    2. Play any movie, TV show, or podcast.

    3. Touch the `AirPlay` icon.

    4. Choose the `AirPlay` device to which you wish to send your music (see [Figure
    10–4](#Chapter10.html#fig_10_4)).


    ![images](images/1004.jpg)


    **Figure 10–4.** *Using `AirPlay` on the iPad*


    # Home Sharing


    New to the iPad this year is the ability to share your home iTunes library via
    Apple''s proprietary `Home Sharing` function.


    Essentially, `Home Sharing` allows you to browse and play anything from your home
    library (usually on your desktop or network drive) on your iPad.


    Begin by following the instructions for setting up `Home Sharing` as described
    in [Chapter 9](#Chapter09.html#ch9). At this point, the `Shared` button will appear
    as described previously. Touch the `Shared` button, and you will see all videos
    stored on your network drive available for viewing on your iPad.


    # YouTube on Your iPad


    Watching YouTube videos is certainly one of the most popular things for people
    to do on their computers these days. YouTube is as close to you as your iPad.


    ![images](images/p262-01.jpg)


    You can find a `YouTube` icon right on your `Home` screen. Just touch the `YouTube`
    icon and you will be taken to the `YouTube` app.


    ## Searching for Videos


    When you first start the `YouTube` app, you will usually see the `Featured` videos
    on YouTube for that day.


    You can now scroll through the video choices, just as you do in other apps.


    ![images](images/p263-01.jpg)


    ## Using the Bottom Icons


    You can see seven icons along the bottom of the `YouTube` app: `Featured`, `Top
    Rated`, `Most Viewed`, `Favorites`, `Subscriptions`, `My videos`, and `History`.
    Each is fairly self-explanatory.


    ![images](images/p263-02.jpg)


    To see the videos that YouTube is featuring that day, touch the `Featured` icon.
    To see those videos that are most-viewed online, touch the `Most Viewed` icon.


    After you watch a particular video, you will have the option to set it as a favorite
    on `YouTube` for easy retrieval later on. If you have set bookmarks, they will
    appear when you touch the `Favorite` icon.


    ![images](images/p264-01.jpg)


    You can also search the huge library of YouTube videos. Touch the search box just
    as you have in previous apps, and the keyboard will pop up. Next, type in a phrase,
    topic, or even the name of a video.


    In this example, I am looking for the newest Made Simple Learning video tutorial.
    I type in “Made Simple Learning” to see a list of videos to watch.


    When I find the video I want to watch, I can touch it to see more information.
    I can even rate the video by touching the video during playback and selecting
    the `Thumbs up` or `Thumbs down` (like and dislike) buttons available in `Portrait`
    mode.


    ![images](images/p264-02.jpg)


    ## Playing Videos


    Once you make your choice, touch the video you want to watch. Your iPad will begin
    playing the YouTube video in `Portrait` or `Landscape` mode (see [Figure 10–5](#Chapter10.html#fig_10_5)).


    **NOTE**: You will see an `AirPlay` icon on YouTube videos, as well. Just touch
    the `AirPlay` icon and you can send the video right to your Apple TV or other
    `AirPlay` device.


    ![images](images/1005.jpg)


    **Figure 10–5.** *Video playing in `Portrait` mode*


    ## Video Controls


    Once the video begins to play, the on-screen controls disappear, so you see only
    the video. To stop, pause, or activate other options while the video is playing,
    just tap the screen (see [Figure 10–6](#Chapter10.html#fig_10_6)).


    ![images](images/1006.jpg)


    **Figure 10–6.** *Options within YouTube*


    The on-screen options are very similar what you see when watching any other video.
    Along the bottom is the `Slider` control, which shows your place in the video.
    To move to another part in the video, just drag the slider.


    To fast-forward through the video, just touch and hold the `Fast-Forward` arrow.
    To quickly move in reverse, touch and hold the `Reverse` arrow. To advance to
    the next video in the YouTube list, tap the `Fast-Forward/Next` arrow. To watch
    the previous video in the list, tap the `Reverse/Back` arrow.


    ![images](images/p266-01.jpg)


    To set a favorite, touch the `Favorite` icon.


    To email the video, touch the `Share` icon. Your email will start with a link
    to the video in the body of the email. Next, type the recipient; you will learn
    more about sending email and attachments via email in [Chapter 13](#Chapter13.html#ch13).


    ![images](images/p267-01.jpg)


    ## Checking and Clearing Your History


    Touch the `History` icon


    ![images](images/p268-01.jpg)


    in the lower right-hand corner of the page. Your recently viewed videos will appear.


    If you want to clear your history, just touch the `Clear` button in the upper-left
    corner.


    To watch a video from your history, touch it and it will start to play.


    ![images](images/p268-02.jpg)


    ## Netflix on the iPad


    In recent years, Netflix has grown to become a leading source of video rentals
    for consumers. Most recently, Netflix added video *streaming* of content that
    is delivered wirelessly to computers and other set-top boxes for your TV.


    Now Netflix is available to iPad users through the `Netflix` app in the App Store.


    Go to the App Store, as shown in [Chapter 21](#Chapter21.html#ch21): "The Amazing
    App Store," and search for the Netflix app.


    Choose the `Download` button (the app is free) and you are on your way.


    ![images](images/p269-01.jpg)


    You need an active Netflix account to use this service, so either create one when
    you start the app or just sign into your Netflix account if you already have one.


    The beauty of the `Netflix` app is that you can add DVDs to your queue and have
    them sent out to you. You can also watch TV shows and movies instantly—streaming
    them right to the iPad.


    ![images](images/p269-02.jpg)


    Navigating Netflix is very easy and just like using Netflix on your computer.
    You have a top bar with tabs for `Watch Movies Instantly`, `Watch TV Shows Instantly`,
    `Browse DVDs`, and `Your Queue`.


    When you make your selection, you will see what you have recently watched (so
    you can resume watching), as well as video categories based on the preferences
    you selected when you established your Netflix account.


    Each row of videos has a `See More` tab to show you more options. If you don''t
    find what you are looking for, just touch the `Search` button at the bottom and
    type in the name of a movie, actor, director, or genre.


    ![images](images/p270-01.jpg)


    Once you find the movie or TV show you want to watch, touch `Play Now` and the
    movie will begin to stream to your iPad. The video controls are similar to those
    in all the other video-playing apps for the iPad; however, there is no `AirPlay`
    option for Netflix at this time.


    **CAUTION:** Netflix uses a great deal of data, so make sure you have a strong
    Wi-Fi signal if you are streaming over Wi-Fi. Alternatively, if you are using
    3G cellular data, make sure you have an adequate data plan.'
  raw: '### AirPlay


    **AirPlay** is another Apple proprietary function built into the iPad. **AirPlay**
    is available across a wide range of apps, but here we will just look at **AirPlay**
    and the **Videos** app.


    **AirPlay** essentially is built-in wireless streaming of your music to an AirPlay-compatible
    device, such as an Apple TV or a wireless-speaker system.


    With an Apple TV hooked up, you can choose **AirPlay** and have whatever is playing
    on your iPad stream automatically to your TV or home theater setup.


    Using **AirPlay** is as simple as following these steps:


    1.  Start your **Videos** app.

    2.  Play any movie, TV show, or podcast.

    3.  Touch the **AirPlay** icon.

    4.  Choose the **AirPlay** device to which you wish to send your music (see [Figure
    10–4](#Chapter10.html#fig_10_4)).


    ![images](images/1004.jpg)


    **Figure 10–4.** *Using **AirPlay** on the iPad*


    ### Home Sharing


    New to the iPad this year is the ability to share your home iTunes library via
    Apple''s proprietary **Home Sharing** function.


    Essentially, **Home Sharing** allows you to browse and play anything from your
    home library (usually on your desktop or network drive) on your iPad.


    Begin by following the instructions for setting up **Home Sharing** as described
    in [Chapter 9](#Chapter09.html#ch9). At this point, the **Shared** button will
    appear as described previously. Touch the **Shared** button, and you will see
    all videos stored on your network drive available for viewing on your iPad.


    ### youtube_on_your_ipad


    Watching YouTube videos is certainly one of the most popular things for people
    to do on their computers these days. YouTube is as close to you as your iPad.


    ![images](images/p262-01.jpg)


    You can find a **YouTube** icon right on your **Home** screen. Just touch the
    **YouTube** icon and you will be taken to the **YouTube** app.


    #### Searching for Videos


    When you first start the **YouTube** app, you will usually see the **Featured**
    videos on YouTube for that day.


    You can now scroll through the video choices, just as you do in other apps.


    ![images](images/p263-01.jpg)


    #### Using the Bottom Icons


    You can see seven icons along the bottom of the **YouTube** app: **Featured**,
    **Top Rated**, **Most Viewed**, **Favorites**, **Subscriptions, My videos,** and
    **History**. Each is fairly self-explanatory.


    ![images](images/p263-02.jpg)


    To see the videos that YouTube is featuring that day, touch the **Featured** icon.
    To see those videos that are most-viewed online, touch the **Most Viewed** icon.


    After you watch a particular video, you will have the option to set it as a favorite
    on **YouTube** for easy retrieval later on. If you have set bookmarks, they will
    appear when you touch the **Favorite** icon.


    ![images](images/p264-01.jpg)


    You can also search the huge library of YouTube videos. Touch the search box just
    as you have in previous apps, and the keyboard will pop up. Next, type in a phrase,
    topic, or even the name of a video.


    In this example, I am looking for the newest Made Simple Learning video tutorial.
    I type in “Made Simple Learning” to see a list of videos to watch.


    When I find the video I want to watch, I can touch it to see more information.
    I can even rate the video by touching the video during playback and selecting
    the **Thumbs up** or **Thumbs down** (like and dislike) buttons available in **Portrait**
    mode.


    ![images](images/p264-02.jpg)


    #### Playing Videos


    Once you make your choice, touch the video you want to watch. Your iPad will begin
    playing the YouTube video in **Portrait** or **Landscape** mode (see [Figure 10–5](#Chapter10.html#fig_10_5)).


    **NOTE**: You will see an **AirPlay** icon on YouTube videos, as well. Just touch
    the **AirPlay** icon and you can send the video right to your Apple TV or other
    **AirPlay** device.


    ![images](images/1005.jpg)


    **Figure 10–5.** *Video playing in **Portrait** mode*


    #### Video Controls


    Once the video begins to play, the on-screen controls disappear, so you see only
    the video. To stop, pause, or activate other options while the video is playing,
    just tap the screen (see [Figure 10–6](#Chapter10.html#fig_10_6)).


    ![images](images/1006.jpg)


    **Figure 10–6.** *Options within YouTube*


    The on-screen options are very similar what you see when watching any other video.
    Along the bottom is the **Slider** control, which shows your place in the video.
    To move to another part in the video, just drag the slider.


    To fast-forward through the video, just touch and hold the **Fast-Forward** arrow.
    To quickly move in reverse, touch and hold the **Reverse** arrow. To advance to
    the next video in the YouTube list, tap the **Fast**-**Forward/Next** arrow. To
    watch the previous video in the list, tap the **Reverse/Back** arrow.


    ![images](images/p266-01.jpg)


    To set a favorite, touch the **Favorite** icon.


    To email the video, touch the **Share** icon. Your email will start with a link
    to the video in the body of the email. Next, type the recipient; you will learn
    more about sending email and attachments via email in [Chapter 13](#Chapter13.html#ch13).


    ![images](images/p267-01.jpg)


    #### Checking and Clearing Your History


    Touch the **History** icon


    ![images](images/p268-01.jpg)


    in the lower right-hand corner of the page. Your recently viewed videos will appear.


    If you want to clear your history, just touch the **Clear** button in the upper-left
    corner.


    To watch a video from your history, touch it and it will start to play.


    ![images](images/p268-02.jpg)


    #### Netflix on the iPad


    In recent years, Netflix has grown to become a leading source of video rentals
    for consumers. Most recently, Netflix added video *streaming* of content that
    is delivered wirelessly to computers and other set-top boxes for your TV.


    Now Netflix is available to iPad users through the **Netflix** app in the App
    Store.


    Go to the App Store, as shown in [Chapter 21](#Chapter21.html#ch21): "The Amazing
    App Store," and search for the Netflix app.


    Choose the **Download** button (the app is free) and you are on your way.


    ![images](images/p269-01.jpg)


    You need an active Netflix account to use this service, so either create one when
    you start the app or just sign into your Netflix account if you already have one.


    The beauty of the **Netflix** app is that you can add DVDs to your queue and have
    them sent out to you. You can also watch TV shows and movies instantly—streaming
    them right to the iPad.


    ![images](images/p269-02.jpg)


    Navigating Netflix is very easy and just like using Netflix on your computer.
    You have a top bar with tabs for **Watch Movies Instantly**, **Watch TV Shows
    Instantly**, **Browse DVDs**, and **Your Queue.**


    When you make your selection, you will see what you have recently watched (so
    you can resume watching), as well as video categories based on the preferences
    you selected when you established your Netflix account.


    Each row of videos has a **See More** tab to show you more options. If you don''t
    find what you are looking for, just touch the **Search** button at the bottom
    and type in the name of a movie, actor, director, or genre.


    ![images](images/p270-01.jpg)


    Once you find the movie or TV show you want to watch, touch **Play Now** and the
    movie will begin to stream to your iPad. The video controls are similar to those
    in all the other video-playing apps for the iPad; however, there is no **AirPlay**
    option for Netflix at this time.


    **CAUTION:** Netflix uses a great deal of data, so make sure you have a strong
    Wi-Fi signal if you are streaming over Wi-Fi. Alternatively, if you are using
    3G cellular data, make sure you have an adequate data plan.'
  trans: '

    # AirPlay


    `AirPlay` 是 iPad 内置的另一项苹果专有功能。`AirPlay` 在许多应用中都可用，但此处我们仅探讨 `AirPlay` 与 `Videos`
    应用的配合使用。


    `AirPlay` 本质上是一种内置的无线流媒体功能，可将音乐流传输至兼容 `AirPlay` 的设备，例如 Apple TV 或无线音响系统。


    连接 Apple TV 后，你可以选择 `AirPlay`，iPad 上正在播放的内容将自动串流到电视或家庭影院设备上。


    使用 `AirPlay` 的操作非常简单，只需遵循以下步骤：


    1. 启动 `Videos` 应用。

    2. 播放任意电影、电视节目或播客。

    3. 点击 `AirPlay` 图标。

    4. 选择要发送音乐的 `AirPlay` 设备（参见图 10–4）。


    ![images](img/1004.jpg)


    **图 10–4.** *在 iPad 上使用 `AirPlay`*


    # 家庭共享


    今年 iPad 新增了一项功能，即通过苹果的专有 `Home Sharing`（家庭共享）功能共享您的家庭 iTunes 资料库。


    本质上，`Home Sharing` 允许您在 iPad 上浏览并播放家庭资料库（通常位于您的台式电脑或网络驱动器上）中的任何内容。


    首先，按照第 9 章中的说明设置 `Home Sharing`。此时，如前所述，将出现 `Shared`（共享）按钮。点击 `Shared` 按钮，您将看到网络驱动器上存储的所有视频，并可在
    iPad 上观看。


    # iPad 上的 YouTube


    如今，在电脑上观看 YouTube 视频无疑是人们最常做的事情之一。而 YouTube 离您仅有一台 iPad 的距离。


    ![images](img/p262-01.jpg)


    您可以在 `Home`（主屏幕）上直接找到 `YouTube` 图标。只需点击 `YouTube` 图标，即可进入 `YouTube` 应用。


    ## 搜索视频


    首次启动 `YouTube` 应用时，您通常会看到 YouTube 当天的 `Featured`（精选）视频。


    现在，您可以像在其他应用中一样，滚动浏览视频选项。


    ![images](img/p263-01.jpg)


    ## 使用底部图标


    您可以在 `YouTube` 应用底部看到七个图标：`Featured`（精选）、`Top Rated`（最高评分）、`Most Viewed`（最多观看）、`Favorites`（收藏）、`Subscriptions`（订阅）、`My
    videos`（我的视频）和 `History`（历史记录）。每个图标的功能不言而喻。


    ![images](img/p263-02.jpg)


    要查看 YouTube 当天推荐的视频，请点击 `Featured`（精选）图标。要查看在线观看次数最多的视频，请点击 `Most Viewed`（最多观看）图标。


    观看完特定视频后，您可以将其设为 `YouTube` 上的收藏，以便日后轻松查找。如果您设置了书签，点击 `Favorite`（收藏）图标时它们就会显示出来。


    ![images](img/p264-01.jpg)


    您还可以搜索 YouTube 海量的视频库。像在之前的应用中一样，点击搜索框，键盘便会弹出。接着，输入一个短语、主题甚至视频名称。


    在本示例中，我正在寻找最新的 Made Simple Learning 视频教程。我输入"Made Simple Learning"来查看可观看的视频列表。


    当找到想看的视频时，我可以点击它以查看更多信息。我甚至可以在播放期间点击视频，然后选择 `竖屏` 模式下可用的`赞`或`踩`按钮来为视频评分。


    ![images](img/p264-02.jpg)


    ## 播放视频


    做出选择后，点击您想观看的视频。您的 iPad 将开始在`竖屏`或`横屏`模式下播放 YouTube 视频（参见图 10–5）。


    **注意**：YouTube 视频上也会出现 `AirPlay` 图标。只需点击 `AirPlay` 图标，即可将视频直接发送到您的 Apple TV 或其他
    `AirPlay` 设备。


    ![images](img/1005.jpg)


    **图 10–5.** *在`竖屏`模式下播放视频*


    ## 视频控制


    视频开始播放后，屏幕上的控制项会消失，因此您只能看到视频。要在视频播放期间停止、暂停或激活其他选项，只需轻点屏幕即可（参见图 10–6）。


    ![images](img/1006.jpg)


    **图 10–6.** *YouTube 内的选项*


    屏幕上的选项与观看其他任何视频时看到的非常相似。底部是`滑块`控制条，显示您在视频中的播放位置。要跳到视频的另一部分，只需拖动滑块。


    要快进视频，只需长按`快进`箭头。要快速后退，长按`后退`箭头。要跳转到 YouTube 列表中的下一个视频，请点击`快进/下一个`箭头。要观看列表中的上一个视频，请点击`后退/上一个`箭头。


    ![images](img/p266-01.jpg)


    要设置收藏，请点击`收藏`图标。


    要通过电子邮件发送视频，请点击`分享`图标。您的电子邮件正文将以视频链接开头。接着，输入收件人；您将在第 13 章中了解更多关于通过电子邮件发送邮件和附件的知识。


    ![images](img/p267-01.jpg)


    ## 查看和清除历史记录


    点击页面右下角的`历史记录`图标


    ![images](img/p268-01.jpg)


    您最近观看过的视频将会显示出来。


    如果您想清除历史记录，只需点击左上角的`清除`按钮。


    要观看历史记录中的视频，点击它即可开始播放。


    ![images](img/p268-02.jpg)


    ## iPad 上的 Netflix


    近年来，Netflix 已发展成为消费者视频租赁的主要来源。最近，Netflix 增加了视频*流媒体*服务，可将内容无线传输到电脑以及其他电视机上盒设备。


    现在，iPad 用户可以通过 App Store 中的 `Netflix` 应用使用 Netflix。


    如第 21 章：“神奇的 App Store”所示，前往 App Store 并搜索 Netflix 应用。


    选择`下载`按钮（该应用免费），您就可以开始使用了。


    ![images](img/p269-01.jpg)


    你需要一个有效的 Netflix 账户才能使用此服务，因此请在启动应用时创建一个账户，或者如果您已有账户，直接登录即可。


    `Netflix` 应用的精妙之处在于，您可以将 DVD 添加到队列中，让他们寄送给您。您还可以即时观看电视节目和电影——直接流式传输到 iPad 上。


    ![images](img/p269-02.jpg)


    浏览 Netflix 非常简单，就像在电脑上使用 Netflix 一样。顶部有一个标签栏，包含`即时观看电影`、`即时观看电视节目`、`浏览 DVD`和`您的队列`。


    当您做出选择后，您将看到最近观看过的内容（以便继续观看），以及根据您建立 Netflix 账户时选择的偏好设置而定的视频类别。


    每行视频都有一个`查看更多`标签，用于显示更多选项。如果找不到想要的内容，只需点击底部的`搜索`按钮，然后输入电影、演员、导演或类型名称。


    ![images](img/p270-01.jpg)


    一旦找到想看的电影或电视节目，点击`立即播放`，电影将开始流式传输到您的 iPad 上。视频控件类似于 iPad 上所有其他视频播放应用的控件；但是，目前
    Netflix 中没有 `AirPlay` 选项。


    **注意：** Netflix 会消耗大量数据，因此如果您通过 Wi-Fi 进行流式传输，请确保有强劲的 Wi-Fi 信号。或者，如果您使用 3G 蜂窝数据，请确保您有足够的数据套餐。

    '
- fmt: '### Watching Other TV Shows


    New apps are introduced all the time, as are new options for watching other network
    shows and movies. This continues to change quickly; and, by the time you read
    this, even more TV shows will be available, with more to be added every month.


    One of the best options at launch time was the `ABC` app, which is available as
    a free download in the App Store.


    ![images](images/p271-01.jpg)


    Once the app is downloaded, your favorite ABC TV shows will be available for streaming.
    ABC streams its most popular shows, making several full episodes available. The
    `ABC` app also uses large amounts of data, so make sure you have a good Wi-Fi
    connection or an unlimited 3G plan before you stream TV shows.


    ![images](images/p271-02.jpg)


    #### Hulu on the iPad


    In recent years, Hulu has become a leading source of video streaming of content
    delivered wirelessly to computers and other set-top boxes for your TV.


    ![images](images/p272-01.jpg)


    Just after launch of the original iPad, the `Hulu Plus` app was released in the
    App Store. Hulu Plus is a subscription-based service of `$7.99` a month, but there
    is also free content available.


    With a full subscription to this service, pretty much every episode of every TV
    show you watch or have ever watched is now available to stream to your iPad.


    Launch the app and you will see five icons at the top: `Free Gallery`, `Main`,
    `TV`, `Movies`, and `Search`.


    Scroll through the `Free Gallery` to see which shows are available now for free
    viewing.


    Touch a show and it immediately begins playing. Hold the iPad in `Landscape` mode
    to make the video fill the screen.


    ![images](images/p272-02.jpg)


    ##### Searching for Videos


    Touch the `Search` icon at the bottom and type in the name of a particular TV
    show. You can also browse the `Featured` or `Popular` categories. When you find
    your show, all the videos available will be available to watch.


    ![images](images/p273-01.jpg)


    **NOTE:** If you do not have a Hulu Plus subscription, you will not be able to
    view the videos.


    ##### Choosing What to Watch


    Touch any one of the middle row of icons to see the `Featured`, `Most Popular`,
    or `Recently Added` videos.


    Touch the `All` tab to choose between `Episodes`, `Movies`, or `Clips`.


    ![images](images/p273-02.jpg)


    ##### Video Controls in Hulu Plus


    The video controls are a bit different in the `Hulu Plus` app. Touch the screen
    when watching a show and, as when watching any other video, the video controls
    appear as shown in [Figure 10–7](#Chapter10.html#fig_10_7).


    There is a `Play/Pause` button at the left, as well as a timeline for the video.
    Simply drag your finger along the timeline to advance to another part of the video.


    ![images](images/1007.jpg)


    **Figure 10–7.** *Video controls in the `Hulu Plus` app*


    **NOTE:** You cannot advance through commercials in `Hulu Plus`. During a commercial,
    an icon will appear in the upper right-hand corner that resembles the `Share`
    icon. ![images](images/p274-01.jpg) If you touch this icon, you will go to the
    website of the advertiser.


    **CAUTION:** `Hulu Plus` uses a great deal of data, so make sure you have a strong
    Wi-Fi signal.


    ## Chapter 11


    ## Surf the Web with Safari


    Now we''ll take you through one of the most fun things to do on your iPad: surfing
    the web. You may have heard web surfing on the iPad is a more intimate experience
    than ever before—we agree! We''ll show you how to touch, zoom around, and interact
    with the Web like never before with Safari on your iPad. You''ll learn how to
    set and use bookmarks, quickly find things with the search engine, open and switch
    between multiple browser windows, and even easily copy text and graphics from
    web pages.


    ### Web Browsing on the iPad


    You can browse the web to your heart''s content via Wi-Fi or with your iPad''s
    3G connection (on Wi-Fi + 3G models.) The iPad has what many feel is the most
    capable mobile browsing experience available today. Web pages look very much like
    web pages on your computer. With the iPad''s ability to zoom in, you don''t even
    have to worry about the smaller screen size inhibiting your web browsing experience.
    In short, web browsing is a much more personal experience on the iPad.


    You can browse in portrait or landscape mode, whichever you prefer. You can also
    quickly zoom into a video by double-tapping it or pinching open on it, which is
    natural to you because those are the motions to zoom in text and graphics.


    **Why Do Some Videos and Sites Not Appear? (Flash Player Required)**


    ![images](images/p276-01.jpg)


    Some web sites are designed with Adobe Flash player, and as of publishing time,
    the iPad does not support Adobe Flash. Apple seems to have made a decision to
    not support the Flash Player. If you tap on a video and the video does not play,
    or you see something like “Flash Plugin Required,” “Download the Latest Flash
    Plugin to view this video,” or “Adobe Flash Required to view this site,” you will
    not be able to view the video or web page.


    There are now browsers in the App Store like `Skyfire` and `iSwifter` that transcode
    Flash into H.264 video on the server side so they work on iPad.


    #### An Internet Connection Is Required


    You do need a live Internet connection on your iPad—either Wi-Fi or 3G (cellular
    data)—in order to browse the web. Check out the "Connectivity" section in [Chapter
    5](#Chapter05.html#ch5) to learn more.


    #### Launching the Web Browser


    You should find the `Safari` icon on your `Home Screen`; this is your web browser.
    Usually, the `Safari` icon is in the lower left of the `Bottom Dock`.


    ![images](images/p276-02.jpg)


    Touch the `Safari` icon and you will be taken to the browser''s home page. Most
    likely, this will be Apple''s iPad page.


    As you find web sites you like, you can set bookmarks to easily jump to them at
    a later date. We will show you how later in this chapter.


    ![images](images/p277-01.jpg)


    #### Layout of Safari Web Browser Screen


    [Figure 11-1](#Chapter11.html#fig_11_1) shows how a web page looks in Safari,
    and the different actions you can take in the browser.


    ![images](images/1101.jpg)


    **Figure 11-1.** *Safari web browser page layout*


    As you look at your screen, notice that the `Address Bar` is in the upper left
    side of the screen. This displays the current web address. To the right is the
    `Search` window. By default, this is set to Google search, but you can change
    it if you want.


    At the top of the screen are five icons; `Back`, `Forward`, `Open Pages`, `Bookmarks`,
    and the `Action` button.


    #### Typing a Web Address


    The first thing you''ll want to learn is how to get to your favorite web pages.
    Just as you would on your computer, you type in the web address (URL) into the
    browser. To start, tap the `Address Bar` at the top of the browser, as shown in
    [Figure 11-2](#Chapter11.html#fig_11_2). The keyboard will appear and the window
    for the browser will expand. Start typing and press the `Go` key to go to that
    page.


    **TIP:** Remember to use the colon, forward slash, underscore, dot, and `.com`
    keys at the bottom to save time.


    ![images](images/1102.jpg)


    **Figure 11-2.** *Typing in a web address*


    **TIP:** Press and hold the `.com` key to see all the options: `.org`, `.edu`,
    `.net`, `.de`, etc.'
  raw: '### Watching Other TV Shows


    New apps are introduced all the time, as are new options for watching other network
    shows and movies. This continues to change quickly; and, by the time you read
    this, even more TV shows will be available, with more to be added every month.


    One of the best options at launch time was the **ABC** app, which is available
    as a free download in the App Store.


    ![images](images/p271-01.jpg)


    Once the app is downloaded, your favorite ABC TV shows will be available for streaming.
    ABC streams its most popular shows, making several full episodes available. The
    **ABC** app also uses large amounts of data, so make sure you have a good Wi-Fi
    connection or an unlimited 3G plan before you stream TV shows.


    ![images](images/p271-02.jpg)


    #### Hulu on the iPad


    In recent years, Hulu has become a leading source of video streaming of content
    delivered wirelessly to computers and other set-top boxes for your TV.


    ![images](images/p272-01.jpg)


    Just after launch of the original iPad, the **Hulu Plus** app was released in
    the App Store. Hulu Plus is a subscription-based service of $7.99 a month, but
    there is also free content available.


    With a full subscription to this service, pretty much every episode of every TV
    show you watch or have ever watched is now available to stream to your iPad.


    Launch the app and you will see five icons at the top: **Free Gallery**, **Main**,
    **TV**, **Movies**, and **Search**.


    Scroll through the **Free Gallery** to see which shows are available now for free
    viewing.


    Touch a show and it immediately begins playing. Hold the iPad in **Landscape**
    mode to make the video fill the screen.


    ![images](images/p272-02.jpg)


    ##### Searching for Videos


    Touch the **Search** icon at the bottom and type in the name of a particular TV
    show. You can also browse the **Featured** or **Popular** categories. When you
    find your show, all the videos available will be available to watch.


    ![images](images/p273-01.jpg)


    **NOTE**: If you do not have a Hulu Plus subscription, you will not be able to
    view the videos.


    ##### Choosing What to Watch


    Touch any one of the middle row of icons to see the **Featured**, **Most Popular**,
    or **Recently Added** videos.


    Touch the **All** tab to choose between **Episodes**, **Movies**, or **Clips**.


    ![images](images/p273-02.jpg)


    ##### Video Controls in Hulu Plus


    The video controls are a bit different in the **Hulu Plus** app. Touch the screen
    when watching a show and, as when watching any other video, the video controls
    appear as shown in [Figure 10–7](#Chapter10.html#fig_10_7).


    There is a **Play/Pause** button at the left, as well as a timeline for the video.
    Simply drag your finger along the timeline to advance to another part of the video.


    ![images](images/1007.jpg)


    **Figure 10–7.** *Video controls in the **Hulu Plus** app*


    **NOTE**: You cannot advance through commercials in **Hulu Plus**. During a commercial,
    an icon will appear in the upper right-hand corner that resembles the **Share**
    icon. ![images](images/p274-01.jpg) If you touch this icon, you will go to the
    website of the advertiser.


    **CAUTION: Hulu Plus** uses a great deal of data, so make sure you have a strong
    Wi-Fi signal.


    ## Chapter 11


    ## Surf the Web with Safari


    Now we''ll take you through one of the most fun things to do on your iPad: surfing
    the web. You may have heard web surfing on the iPad is a more intimate experience
    than ever before—we agree! We''ll show you how to touch, zoom around, and interact
    with the Web like never before with Safari on your iPad. You''ll learn how to
    set and use bookmarks, quickly find things with the search engine, open and switch
    between multiple browser windows, and even easily copy text and graphics from
    web pages.


    ### Web Browsing on the iPad


    You can browse the web to your heart''s content via Wi-Fi or with your iPad''s
    3G connection (on Wi-Fi + 3G models.) The iPad has what many feel is the most
    capable mobile browsing experience available today. Web pages look very much like
    web pages on your computer. With the iPad''s ability to zoom in, you don''t even
    have to worry about the smaller screen size inhibiting your web browsing experience.
    In short, web browsing is a much more personal experience on the iPad.


    You can browse in portrait or landscape mode, whichever you prefer. You can also
    quickly zoom into a video by double-tapping it or pinching open on it, which is
    natural to you because those are the motions to zoom in text and graphics.


    **Why Do Some Videos and Sites Not Appear? (Flash Player Required)**


    ![images](images/p276-01.jpg)


    Some web sites are designed with Adobe Flash player, and as of publishing time,
    the iPad does not support Adobe Flash. Apple seems to have made a decision to
    not support the Flash Player. If you tap on a video and the video does not play,
    or you see something like “Flash Plugin Required,” “Download the Latest Flash
    Plugin to view this video,” or “Adobe Flash Required to view this site,” you will
    not be able to view the video or web page.


    There are now browsers in the App Store like **Skyfire** and **iSwifter** that
    transcode Flash into H.264 video on the server side so they work on iPad.


    #### An Internet Connection Is Required


    You do need a live Internet connection on your iPad—either Wi-Fi or 3G (cellular
    data)—in order to browse the web. Check out the "Connectivity" section in [Chapter
    5](#Chapter05.html#ch5) to learn more.


    #### Launching the Web Browser


    You should find the **Safari** icon on your **Home Screen**; this is your web
    browser. Usually, the **Safari** icon is in the lower left of the **Bottom Dock**.


    ![images](images/p276-02.jpg)


    Touch the **Safari** icon and you will be taken to the browser''s home page. Most
    likely, this will be Apple''s iPad page.


    As you find web sites you like, you can set bookmarks to easily jump to them at
    a later date. We will show you how later in this chapter.


    ![images](images/p277-01.jpg)


    #### Layout of Safari Web Browser Screen


    [Figure 11-1](#Chapter11.html#fig_11_1) shows how a web page looks in Safari,
    and the different actions you can take in the browser.


    ![images](images/1101.jpg)


    **Figure 11-1.** *Safari web browser page layout*


    As you look at your screen, notice that the **Address Bar** is in the upper left
    side of the screen. This displays the current web address. To the right is the
    **Search** window. By default, this is set to Google search, but you can change
    it if you want.


    At the top of the screen are five icons; **Back**, **Forward**, **Open Pages,
    Bookmarks**, and the **Action** button.


    #### Typing a Web Address


    The first thing you''ll want to learn is how to get to your favorite web pages.
    Just as you would on your computer, you type in the web address (URL) into the
    browser. To start, tap the **Address Ba**r at the top of the browser, as shown
    in [Figure 11-2](#Chapter11.html#fig_11_2). The keyboard will appear and the window
    for the browser will expand. Start typing and press the **Go** key to go to that
    page.


    **TIP:** Remember to use the colon, forward slash, underscore, dot, and .com keys
    at the bottom to save time.


    ![images](images/1102.jpg)


    **Figure 11-2.** *Typing in a web address*


    **TIP:** Press and hold the .com key to see all the options: .org, .edu, .net,
    .de, etc.'
