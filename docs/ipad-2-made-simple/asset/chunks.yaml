    \ \nAlso, common proper nouns will be correctly capitalized. For example, if you\
    \ were to type “New york,” you would be prompted to change it to “New York”—again,\
    \ just pressing the **Space** key wouldimplement the correction. If you backspace\
    \ over a capital letter, the iPad will assume the new letter you type should be\
    \ a capital, as well.\n\nThis feature is also set to **ON** by default. | ![Image](images/p93-02.jpg)\
    \ |\n\n#### Auto-Correction ON / OFF\n\nUsing the built-in dictionary, the Auto-Correctionfeature\
    \ will automatically make changes to commonly misspelled words.\n\n**TIP:** If\
    \ the Auto-Correction feature changes a word incorrectly, you can hit the **Backspace**\
    \ key immediately to bring up to bring up a pop-up window with the original word\
    \ (prior to Auto-Correction).\n\nFor example, if you type in “wont,” Auto-Correction\
    \ will change it to “won't” on the fly. You need to make sure Auto-Correction\
    \ is **ON** if you want this feature to work (**ON** is the default setting).\n\
    \n#### Check Spelling\n\nYour iPad will check your spelling automatically because\
    \ the default setting for this option is **ON**. However, if you would prefer\
    \ to disable spell check, simply switch **CheckSpelling** to **OFF**.\n\n**TIP:**\
    \ When spelling is turned on, any words that the spell checker thinks are misspelled\
    \ will be underlined. Tap any underlined word to see a list of suggested corrections.\n\
    \n#### Enable Caps Lock\n\nSometimes when you type, you may want to lock the caps\
    \ by pressing and holding the **Caps** key (**up-arrow** key)—just as you do on\
    \ a computer keyboard. Enabling **Caps Lock** will allow you to do this.\n\nThis\
    \ is set to **OFF**by default.\n\n#### The “.” Shortcut\n\nIf you are aniPhone\
    \ user or BlackBerry user, you might be familiar with the feature that will automatically\
    \ put in a period at the end of the sentence when you double-tap the **Space**\
    \ key. This is exactly the same feature that you can enable on the iPad. By default,\
    \ this is also set to **ON**."
  trans: "\n#### 三次点击主屏幕按钮选项\n\n你可以设置三次点击 `主屏幕` 按钮来执行与辅助功能相关的各种操作：\n\n1.  进入 `设置`\
    \ 应用中的 `辅助功能` 屏幕，如前所示。\n2.  轻点右侧列底部附近的 `三次点击主屏幕按钮`。\n3.  从 `关闭`、`切换旁白`、`切换黑底白字`\
    \ 或 `询问` 中选择。\n\n### 用于编辑文本/放置光标的放大镜\n\n你是否曾多次在输入文字时，想要将光标精确地放置在两个单词或字母之间？在你掌握放大镜技巧之前，这可能很难做到。具体操作如下：用手指按住你想要放置光标的位置（参见图\
    \ 2-8）。一两秒后，你会看到 `放大镜` 图标出现。然后，在手指按住屏幕的同时，滑动手指来定位光标。当你松开手指时，会看到 `拷贝/粘贴` 弹出菜单，但你可以忽略它。\n\
    \n![images](img/0208.jpg)\n\n**图 2-8.** *按住屏幕以调出 `放大镜` 图标并放置光标。*\n\n### 输入数字和符号\n\
    \n你可能想知道如何使用 iPad 屏幕键盘输入数字或符号。输入时，轻点左下角的 `.?123` 键即可看到数字和常用符号，例如 `$ ! ~ & = #\
    \ . _ - +`。如果你需要更多符号，请从数字键盘上轻点 `#+=` 键，该键位于左下角 `ABC` 键的正上方（参见图 2-9）。\n\n**提示：**\
    \ 当你按下 `.?123` 键时，甚至会出现一个 `撤销` 键——对任何键盘来说都是一个不错的补充！\n\n![images](img/0209.jpg)\n\
    \n**图 2-9.** *在字母、数字和高级符号键盘之间切换*\n\n**提示：** 请注意，`数字` 和 `符号` 键盘将保持激活状态，直到你按下 `空格`\
    \ 键或轻点另一个键盘（如 `ABC`）的按键为止。\n\n#### 触控并滑动技巧\n\n以下技巧由 iPhone/iPad Blog（[`www.tipb.com`](http://www.tipb.com)）的\
    \ Rene Ritchie 提供。\n\n##### 输入大写字母\n\n| 通常，你需要先轻点 `Shift` 键，再轻点字母来输入大写字母。然而，对于需要\
    \ `Shift` 键的单个大写字母或符号，更快的输入方法是：触摸 `Shift` 键，手指不离开键盘，滑动到你想要的按键上，然后松开。例如，要输入大写字母“M”，触摸右侧的\
    \ `Shift` 键，然后滑动到“M”键上并松开。 | ![Image](img/p89-01.jpg) |\n\n##### 快速输入单个数字\n\n\
    如果你只需输入一个数字，那么请触摸 `.?123` 键，并将手指向上滑动到该数字上。但是，要连续输入多个数字，最好先轻点 `.?123` 键并松开手指，然后逐个轻点每个数字。\n\
    \n##### 输入需要 Shift 键的符号\n\n问号和感叹号亦是如此，它们需要你在字母键盘上按下 `Shift` 键。触摸 `Shift` 键，然后滑动并松开手指于\
    \ `?` 键上。\n\n##### 输入撇号\n\n按住 `逗号/感叹号` 键可看到撇号弹出窗口。撇号会以蓝色高亮显示，因此只需松开按键即可输入它。\n\n\
    ![Image](img/p90-01.jpg)\n\n**提示：** 对于大多数常见的缩略词，你的自动纠正词典应能自动插入撇号。例如，输入“dont”，然后按下\
    \ `空格` 键即可插入撇号，变成“don't”。\n\n#### 长按键盘快捷键以输入符号等\n\n| 你可能还想知道如何输入键盘上未显示的其他符号。**提示：**\
    \ 你可以输入的符号比屏幕上显示的要多。你只需长按与你想要的符号相关的字母、数字或符号；这将调出一个特殊的上下文菜单。 | ![Image](img/p90-02.jpg)\
    \ |\n| 例如，如果你想输入欧元符号（€），请按住 `$` 键，直到看到其他选项。接着，向上滑动手指以高亮显示，然后在欧元符号上松开手指。 | ![Image](img/p91-01.jpg)\
    \ |\n| 这个技巧也适用于 `Safari` 浏览器中的 `.com` 键。你可以通过按住此键来获取更多的网站后缀。右侧的屏幕显示其选项中有 `.co.uk`\
    \ 和 `.ie` 键。这些键在标准的美式键盘上没有出现，但在这里存在，是因为我们安装了英语（英国）国际键盘（有关国际键盘的帮助，请参考本章前面的部分）。\
    \ | ![Image](img/p91-02.jpg) |\n\n**提示：** 在 `数字` 屏幕上有一个很好的圆点符号（或度数符号，取决于你如何看待它）。你可以通过按住\
    \ `零` 键（`0`）来访问它。你也可以按住 `?` 和 `!` 键来获取它们对应的西班牙语倒置符号。\n\n#### 左右箭头（国际语言）\n\n| 如果（且仅当）你激活了从右向左输入的国际语言键盘（例如希伯来语或日语），你会注意到在文本上方的弹出窗口右端出现一个带有一对箭头的按钮。点击这个\
    \ `箭头` ![Image](img/p92-01.jpg) 按钮，你可以调整文本在 iPad 上的输入方式——从右向左或从左向右。 | ![Image](img/p92-02.jpg)\
    \ |\n\n### 键盘选项与设置\n\n| 有一些键盘选项可以让你的 iPad 输入更加轻松。键盘选项位于 `设置` 应用的 `通用` 标签中。请按照以下步骤更改你的键盘设置：\n\
    1.  轻点 `设置` 图标。\n2.  轻点右侧列中的 `通用`。\n3.  轻点左侧列中的 `键盘` 以查看此屏幕。\n | ![Image](img/p93-01.jpg)\
    \ |\n\n#### 自动大写\n\n| 当你开始一个新句子时，如果 `自动大写` 设置为 `开`，第一个单词将自动大写。此外，常见的专有名词也会被正确大写。例如，如果你输入“New\
    \ york”，系统会提示你将其更改为“New York”——同样，只需按下 `空格` 键即可执行更正。如果你用退格键删除了一个大写字母，iPad 会假定你接下来输入的字母也应该是大写。此功能默认也为\
    \ `开`。 | ![Image](img/p93-02.jpg) |\n\n#### 自动纠正 开 / 关\n\n使用内置词典，“自动纠正”功能会自动对常见的拼写错误进行更改。\n\
    \n**提示：** 如果“自动纠正”功能错误地更改了一个单词，你可以立即按 `退格` 键，调出一个包含原始单词（在自动纠正之前）的弹出窗口。\n\n例如，如果你输入“wont”，自动纠正会即时将其更改为“won't”。如果你希望此功能生效，需要确保“自动纠正”设置为\
    \ `开`（默认设置为 `开`）。\n\n#### 检查拼写\n\n你的 iPad 会自动检查你的拼写，因为此选项的默认设置为 `开`。但是，如果你更想禁用拼写检查，只需将\
    \ `检查拼写` 切换到 `关` 即可。\n\n**提示：** 当拼写检查开启时，拼写检查器认为拼写错误的任何单词都会被加下划线。轻点任何带下划线的单词即可查看建议的更正值列表。\n\
    \n#### 启用大写锁定\n\n有时在输入时，你可能想像在电脑键盘上一样，通过按住 `大写` 键（`上箭头` 键）来锁定大写。启用 `大写锁定` 可以让你做到这一点。此功能默认设置为\
    \ `关`。\n\n#### “.” 快捷键\n\n如果你是 iPhone 或 BlackBerry 用户，你可能熟悉双击 `空格` 键会在句子末尾自动输入句号的功能。这正是你在\
    \ iPad 上可以启用的相同功能。默认情况下，此功能也设置为 `开`。\n"
- fmt: '#### Typing in Other Languages—International Keyboards


    At the time of publishing, the iPad enables you to type in over a dozen different
    languages. Some of the Asian languages, such as Japanese and Chinese, offer two
    or three keyboards for different typing methods.


    To enable various language keyboards, follow these steps:


    1. Touch the `Settings` icon (see [Figure 2-10](#Chapter02.html#fig_2_10)).

    2. Tap `General` in the left column.

    3. Tap `Keyboard` near the bottom of the right column.

    4. Tap `International Keyboards`.

    5. Tap `Add New Keyboard` to add additional international keyboards.

    6. Tap any keyboard/language listed to add that keyboard.

    7. Now you will see that keyboard listed in the available keyboards.

    8. To adjust keyboard options, tap the listed keyboard.


    ![images](images/0210.jpg)


    **Figure 2-10.** *Adding and customizing international keyboards*


    ##### Editing or Deleting International Keyboards


    It''s also easy to edit or delete international keyboards:


    1. Return to the `Keyboards` screen showing the list of all the keyboards (see
    Figure –11).

    2. Tap `Edit` in the top-right corner to change the keyboard order or delete a
    keyboard.

    3. To change the order of the listed keyboards, drag the left edge of the listed
    keyboard up or down.

    4. To delete a keyboard, tap the `Red Minus Sign` icon, then tap `Delete`.


    ![images](images/0211.jpg)


    **Figure 2-11.** *Editing and deleting international keyboards*


    Once you have enabled a number of keyboards, tap the `Globe` key to cycle between
    all the languages (see [Figure 2-12](#Chapter02.html#fig_2_12)).


    Japanese and some other languages provide several keyboard options to meet your
    typing preferences.


    In some of the languages (such as Japanese, shown in [Figure 2-12](#Chapter02.html#fig_2_12)),
    you will see the letters typed change into characters. You will also see a row
    of other character combinations above the keyboard. When you see the combination
    you want, tap it.


    ![images](images/0212.jpg)


    **Figure 2-12.** *Tap the `Globe` key to cycle between international keyboards.*


    ### Copy and Paste


    There are lots of ways to copy and paste text. For example, the `Copy and Paste`
    feature is very useful for taking text from your calendar and putting it in an
    email. It''s also great for taking a note and placing it in an email or in your
    calendar. You can even copy text from your `Safari` web browser and paste it into
    a note or a mail message.


    #### Selecting Text


    If you are reading or typing text, you can select the text in a few ways. For
    example, you can tap or double-tap the text to start selecting text for the copy.
    This works in mail, messages, and notes.


    ##### Double-Tap and Drag Blue Handles


    One way to select text is to double-tap a word then drag the blue handles.


    You will see a box with blue dots (handles) at opposite corners. Just drag the
    handles to select the text you wish to highlight and copy, as shown in [Figure
    2-13](#Chapter02.html#fig_2_13).


    ![images](images/0213.jpg)


    **Figure 2-13.** *Double-tap to start selecting text, then drag the blue dots
    to expand the selection.*


    ##### Using Select or Select All


    | The other way to select text while you are typing something is to tap the text
    once and then choose `Select` or `Select All` from the pop-up window. This same
    pop-up window will also appear if you double-tap anywhere on the screen, except
    on the text itself. | ![Image](images/p98-01.jpg) |


    #### Selecting Text with Two-Finger Touch


    The other way to select text requires that you touch the screen simultaneously
    with two fingers. This seems to work best if you are holding your iPad with one
    hand and use your thumb and forefinger from your other hand to touch the screen.
    What you want to do is touch the screen at the beginning and end of the text you
    want to select. Don''t worry if you cannot get the selection exactly on the first
    touch. After the first touch, use the blue handles to drag the beginning and end
    of the selection to the correct position (see [Figure 2-14](#Chapter02.html#fig_2_14)).


    ![images](images/0214.jpg)


    **Figure 2-14.** *Select text by touching the screen at the same time with two
    fingers.*


    #### Selecting Web Site or Other non-Editable Text with Touch and Hold


    | In the `Safari` web browser and other places where you cannot edit the text,
    you can hold your finger on some text and a word or the entire paragraph will
    become highlighted with handles at each of the corners. Drag the handles if you
    want to select even more text.


    **NOTE:** Drag up or down to quickly select entire paragraphs or more. You can
    drag smaller than a paragraph to use the fine-text mode selector with the blue
    handles. | ![Image](images/p99-01.jpg) |


    #### Cut or Copy the Text


    | Once you have the text that you wish to copy highlighted, just touch the `Copy`
    tab at the top of the screen. The tab will turn blue, indicating that the text
    is on the clipboard. **NOTE:** If you have previously cut or copied text, then
    you will also see the `Paste` option, as shown here. | ![Image](images/p99-02.jpg)
    |


    #### Pasting the Text


    Follow these steps if you are pasting the text into the same note or mail message:


    1. Use your finger to move the cursor to where you want to paste the text. Remember
    the `Magnifying Glass` trick (described earlier in this chapter) to help you position
    the cursor.

    2. Once you let go of the screen, you should see a pop-up window asking you to
    `Select`, `Select All`, or `Paste`.

    3. If you don''t see this pop-up window, then double-tap the screen.

    4. Select `Paste` to paste your selection.


    ![Image](images/p100-01.jpg)


    #### Pasting Text or an Image into Another App


    Follow these steps to paste the text or image you have copied into another app:


    1. Press the `Home` button (see Figure –15).

    2. Tap the app into which you want to paste the text. In this case, let''s tap
    `Mail`.

    3. Tap the `Compose` icon ![Image](images/p101-01.jpg) to write a new email.

    4. Double-tap anywhere in the body of the message.

    5. Tap `Paste`.


    ![images](images/0215.jpg)


    **Figure 2-15.** *Bring up the `Paste` command by either double-tapping or pressing,
    holding, and releasing.*


    Move the cursor to the body of the text and either double-tap or touch, hold,
    and release your finger. This will bring up the `Paste` pop-up window. Tap `Paste`
    and the text on the clipboard will be pasted right into the body of the email.


    #### Shake to Undo Paste or Typing


    | One of the great new features in the Copy and Paste feature is the ability to
    undo either typing or the text you just pasted. All you have to do is shake the
    iPad after the paste. A new pop-up window appears, giving you the option to undo
    what you have just done.


    Tap `Undo Paste` or `Undo Typing` to correct the mistake. **TIP:** There is an
    `Undo` button on the keyboard as well. Just press the `.?123` key; it is in the
    lower-left corner. | ![Image](images/p102-01.jpg) |


    **TIP: Delete Text by Selecting It and Pressing Backspace**


    This tip is for you if you ever want to delete a number of lines of text, a paragraph,
    or even all the text you just typed with one or two taps. Use the techniques described
    previously to select the text you want to delete. Next, simply press the `Delete`
    key ![Image](images/p102-02.jpg) in the lower-left corner of the keyboard to delete
    all the selected text.


    ### Finding Things with Spotlight Search


    A great feature on your iPad for finding information is the `Spotlight Search`,
    Apple''s proprietary search method. This feature provides your iPad with a global
    search for a name, event, or subject.


    The concept is simple. Let''s say you are looking for something related to Martin.
    You cannot remember if it was an email, a note, or a calendar event; however,
    you do know it was related to Martin.


    This is the perfect time to use the `Spotlight Search` feature to find everything
    related to Martin on your iPad.'
