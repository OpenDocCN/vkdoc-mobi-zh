- fmt: "#### Triple-Click Home Button Options\n\nYou can set a triple-click of the\
    \ `Home` button to do various things related to accessibility:\n\n1.  Get into\
    \ the `Accessibility` screen in the `Settings` app, as shown previously.\n2. \
    \ Tap `Triple-click the Home Button` near the bottom of the right column.\n3.\
    \  Choose from `Off`, `Toggle VoiceOver`, `Toggle White on Black`, or `Ask`.\n\
    \n### Magnifying Glass for Editing Text/Placing the Cursor\n\nHow many times have\
    \ you been typing something and wanted to move the cursor precisely between two\
    \ words or letters? This can be hard to do until you figure out the magnifying\
    \ glass trick. What you do is this: touch and hold your finger on the place where\
    \ you want the cursor (see [Figure 2-8](#Chapter02.html#fig_2_8)). After a second\
    \ or two, you will see the `Magnifying Glass` icon appear. Then, while you hold\
    \ your finger on the screen, slide it around to position the cursor. When you\
    \ let go, you will see the `Copy/Paste` pop-up menu, but you can ignore it.\n\n\
    ![images](images/0208.jpg)\n\n**Figure 2-8.** *Touch and hold the screen to bring\
    \ up the `Magnifying Glass` icon and place the cursor.*\n\n### Typing Numbers\
    \ and Symbols\n\nYou might wonder how you type a number or a symbol using the\
    \ on-screen keyboard on the iPad. When you are typing, tap the `.?123` key in\
    \ the lower-left corner to see numbers and common symbols such as `$ ! ~ & = #\
    \ . _ - +`. If you need more symbols, tap the `#+=` key from the number keyboard,\
    \ just above the `ABC` key in the lower-left corner (see [Figure 2-9](#Chapter02.html#fig_2_9)).\n\
    \n**TIP:** You even get an `Undo` key when you press the `.?123` key—a nice addition\
    \ to any keyboard!\n\n![images](images/0209.jpg)\n\n**Figure 2-9.** *Switching\
    \ between the Letters, Numbers, and Advanced Symbol keyboards*\n\n**TIP:** Notice\
    \ that the `Numbers` and `Symbols` keyboards will stay active until you either\
    \ hit the `Space` key or tap the key for another keyboard, such as `ABC`.\n\n\
    #### Touch and Slide Trick\n\nThe following tips are courtesy of Rene Ritchie\
    \ from the iPhone/iPad Blog ([`www.tipb.com`](http://www.tipb.com)).\n\n#####\
    \ Typing Uppercase Letters\n\n| Normally, you would tap the `Shift` key and then\
    \ tap the letter to type an uppercase letter. However, a faster way to type a\
    \ single uppercase letter or symbol that requires the `Shift` key is to touch\
    \ the `Shift` key, keep your finger on the keyboard, slide over to the key you\
    \ want, and then release. For example, to type an uppercase “M,” touch the right\
    \ `Shift` key, then slide over to the “M” key and release. | ![Image](images/p89-01.jpg)\
    \ |\n\n##### Rapidly Typing a Single Number\n\nIf you have to type just a single\
    \ number, then touch the `.?123` key and slide your finger up to the number. However,\
    \ to type several numbers in a row, it's best to tap the `.?123` key, let go,\
    \ and then tap each number.\n\n##### Typing Symbols that Require Shift\n\nThe\
    \ same goes for the question and exclamation marks, which require you to press\
    \ `Shift` on the Letters keyboard. Touch the `Shift` key, then slide over and\
    \ let go on the `?` key.\n\n##### Typing Typing the Apostrophe\n\nPress and hold\
    \ the `Comma/Exclamation` key to see the apostrophe pop-up window. The apostrophe\
    \ is highlighted in blue, so simply let go of the key to type it.\n\n![Image](images/p90-01.jpg)\n\
    \n**TIP:** For most common contractions, your Auto-Correction dictionary should\
    \ automatically insert the apostrophe. For example, type “dont” and then press\
    \ the `Space` key to have the apostrophe inserted: “don't.”\n\n#### Press and\
    \ Hold Keyboard Shortcut for Typing Symbols and More\n\n| You might also wonder\
    \ how you type the symbols not shown on the keyboard. **TIP:** You can type more\
    \ symbols than are shown on the screen. All you do is press and hold a letter,\
    \ number, or symbol that is related to the symbol you want; this will bring up\
    \ a special context menu. | ![Image](images/p90-02.jpg) |\n| For example, if you\
    \ want to type the EURO symbol (€), you press and hold the `$` key until you see\
    \ the other options. Next, you slide up your finger to highlight, and then let\
    \ go on the EURO symbol. | ![Image](images/p91-01.jpg) |\n| This tip also works\
    \ with the `.com` key in the `Safari` web browser. You can get additional web\
    \ site suffixes by pressing and holding this key. The screen on the right shows\
    \ the `.co.uk` and `.ie` keys among its options. These keys are not on the standard\
    \ US keyboard, but they are present because we have installed the English (UK)\
    \ international keyboard (refer to the earlier section in this chapter for help\
    \ with international keyboards). | ![Image](images/p91-02.jpg) |\n\n**TIP:** There\
    \ is a good bullet point character (or degree sign, depending on how you look\
    \ at it) on the `Numbers` screen. You access it by pressing and holding the `Zero`\
    \ key (`0`). You can also press and hold the `?` and `!` keys to get their Spanish-inverted\
    \ cousins.\n\n#### Left and Right Arrows (International Languages)\n\n| If (and\
    \ only if) you have activated an international language keyboard where typing\
    \ is done from right to left (e.g., Hebrew or Japanese), you will notice a button\
    \ with a pair of arrows appear in the right end of the pop-up window above the\
    \ text. Clicking this `Arrows` ![Image](images/p92-01.jpg) button lets you adjust\
    \ the way text is typed on your iPad—either from right to left or left to right.\
    \ | ![Image](images/p92-02.jpg) |\n\n### Keyboard Options & Settings\n\n| There\
    \ are a few keyboard options to make typing on your iPad easier. The keyboard\
    \ options are located in the `General` tab of your `Settings`. Follow these steps\
    \ to change your keyboard settings: \n1.  Touch the `Settings` icon.\n2.  Touch\
    \ `General` in the right column.\n3.  Touch `Keyboard` in the left column to see\
    \ this screen.\n\n | ![Image](images/p93-01.jpg) |\n\n#### Auto-Capitalization\n\
    \n| When you start a new sentence, the first word will automatically be capitalized\
    \ if `Auto-Capitalization` is `ON`. Also, common proper nouns will be correctly\
    \ capitalized. For example, if you were to type “New york,” you would be prompted\
    \ to change it to “New York”—again, just pressing the `Space` key would implement\
    \ the correction. If you backspace over a capital letter, the iPad will assume\
    \ the new letter you type should be a capital, as well. This feature is also set\
    \ to `ON` by default. | ![Image](images/p93-02.jpg) |\n\n#### Auto-Correction\
    \ ON / OFF\n\nUsing the built-in dictionary, the Auto-Correction feature will\
    \ automatically make changes to commonly misspelled words.\n\n**TIP:** If the\
    \ Auto-Correction feature changes a word incorrectly, you can hit the `Backspace`\
    \ key immediately to bring up a pop-up window with the original word (prior to\
    \ Auto-Correction).\n\nFor example, if you type in “wont,” Auto-Correction will\
    \ change it to “won't” on the fly. You need to make sure Auto-Correction is `ON`\
    \ if you want this feature to work (`ON` is the default setting).\n\n#### Check\
    \ Spelling\n\nYour iPad will check your spelling automatically because the default\
    \ setting for this option is `ON`. However, if you would prefer to disable spell\
    \ check, simply switch `Check Spelling` to `OFF`.\n\n**TIP:** When spelling is\
    \ turned on, any words that the spell checker thinks are misspelled will be underlined.\
    \ Tap any underlined word to see a list of suggested corrections.\n\n#### Enable\
    \ Caps Lock\n\nSometimes when you type, you may want to lock the caps by pressing\
    \ and holding the `Caps` key (`up-arrow` key)—just as you do on a computer keyboard.\
    \ Enabling `Caps Lock` will allow you to do this. This is set to `OFF` by default.\n\
    \n#### The “.” Shortcut\n\nIf you are an iPhone user or BlackBerry user, you might\
    \ be familiar with the feature that will automatically put in a period at the\
    \ end of the sentence when you double-tap the `Space` key. This is exactly the\
    \ same feature that you can enable on the iPad. By default, this is also set to\
    \ `ON`."
