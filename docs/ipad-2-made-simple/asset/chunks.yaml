- fmt: '#### Saving Time with Auto-Correction


    When you have been typing for a while, you will begin to notice a little pop-up
    window directly below some of the words you are typing—this is called Auto-Correction.
    (If you never see this pop-up window, then you will have to enable Auto-Correction
    in your `Settings` icon on your iPad.) You can save yourself time when you see
    the correct word guessed by just pressing the `Space` key at the bottom of the
    keyboard to select that word.


    In this example, we start typing the word “especially.” When we get to the `c`
    in the word, the correct word—*especially*—appears below in a pop-up window. To
    select it, we simply press the `Space` key at the bottom (see [Figure 2-7](#Chapter02.html#fig_2_7)).


    ![images](images/0207.jpg)


    **Figure 2-7.** *Using Auto-Correction and suggested words*


    Your first inclination might be to tap the pop-up word, but that simply erases
    it from the screen. It is ultimately faster to keep typing or press the `Space`
    key when you see the correct word, as there will be more situations in which the
    word is either correct or will become correct as you keep typing. This approach
    results in less finger travel in the long run.


    After you learn to use the `Space` key, you will see that this pop-up guessing
    can be quite a time saver. After all, you were going to have to type a space at
    the end of the word, anyway!


    **Tip:** With Auto-Correction, you can save time by avoiding typing the apostrophe
    in many common contractions, such as “won''t” and “can''t.” Auto-Correction will
    show you a little pop-up window with the contraction spelled correctly; all you
    need to do to select the correction is to press the `Space` key.


    ![Image](images/p82-01.jpg)


    ##### Hearing Auto-Correction Words Out Loud


    You can set your iPad to speak the Auto-Text and Auto-Correction words as they
    appear. This might be helpful to you when selecting the correct word. Follow these
    steps to enable this type of speaking:


    1.  Tap the `Settings` icon.

    2.  Tap `General` in the left column.

    3.  Tap `Accessibility` near the bottom of the right column.

    4.  Set the switch next to `Speak Auto-text` to `ON`.


    After you enable this feature, you will hear the Auto-Correction word that pops
    up whenever you are typing. If you like the word you hear, then press the `Space`
    key to accept it; otherwise, keep typing. This feature can save you some time
    by sparing you the need to look up from the keyboard.


    ### Accessibility Options


    There are a number of useful features on the iPad to help with accessibility.
    The `VoiceOver` option will read the text from the screen to you. It will tell
    you what you tap on, what buttons are selected, and all the options. It will read
    entire screens of text, as well. If you like to see things larger, you can also
    turn on the `Zoom` feature, as described in the next section.


    #### Large Text


    Sometimes, the standard font is just too small to be easily read. In these cases,
    the `Large Text` feature is a great help.


    Tap `Large Text` from the `Accessibility` options to adjust the font size in `Contacts`,
    `Mail`, and `Notes`.


    You can select from `Off` (the default is about 12-point text) all the way up
    to 56-point text.


    ![Image](images/p83-01.jpg)


    #### VoiceOver—Getting Your iPad to Speak To You


    One cool feature of the iPad is that you can turn on the `VoiceOver` feature,
    so that the iPad will speak anything shown on the screen. You can even get it
    to read to you from any email, text document, or even an iBook page.


    Follow these steps to enable `VoiceOver`:


    1.  Tap the `Settings` icon.

    2.  Tap `General` in the left column.

    3.  Tap `Accessibility` near the bottom of the right column.

    4.  Tap `VoiceOver` in the left column.

    5.  Set the `VoiceOver` switch to `ON` and select `OK` from the pop-up window
    to confirm.


    ![Image](images/p84-01.jpg)


    **CAUTION:** As shown on the screen to the right, the `VoiceOver` gestures are
    different from the normal gestures. Tap the `Practice VoiceOver Gestures` button
    to get used to them.


    Notice that you can adjust the `Speaking Rate` from slow to fast and make other
    adjustments, such as `Typing Feedback`, `Use Phonetics`, and `Use Pitch Change`.
    Give some of these a try to see which options work best for you.


    Tap `Braille` to connect your iPad to a Braille device with Bluetooth.


    Tap `Web Rotor` to adjust the various web site features to include in the *web
    rotor* (you''ll learn more about this momentarily).


    Similarly, tap `Language Rotor` to select languages to include for use with `VoiceOver`
    (again, you''ll learn more about this momentarily).


    When you type with `VoiceOver` enabled, by default every character you type will
    be spoken. You can change this in the settings screen just mentioned. You can
    make it speak just words, just characters, or nothing.


    To have an entire page read to you in the `iBooks` app, you need to simultaneously
    touch the bottom and top of the block of text on the screen. If you tap in the
    text with one finger, only a single line is read to you.


    Tapping the top of a note in the `Notes` app will read the entire note to you.


    ##### Web Rotor and Language Rotor


    Two interesting features when using `VoiceOver` are the Web Rotor and Language
    Rotor. You can customize what items appear in these rotors in the `VoiceOver`
    setting screen shown previously.


    | To use the Web or Language Rotors, you need to place two fingers on the screen
    and simultaneously rotate them around (as though you were turning a dial with
    your fingertips). Once you do this, a small `Rotating Dial` icon appears on the
    screen (see the image to the right with the `Rotating Dial` set to `Headings`).
    Next, a simple swipe down with one finger on the screen will jump to the next
    item in the selected list. For example, if you set the Web Rotor to `Headings`,
    then swipe down with a single finger, the `VoiceOver` will jump down to the next
    heading on the page. Swipe up to jump back to the previous heading. | ![Image](images/p85-01.jpg)
    |

    | To switch languages, first select a number of languages from the `VoiceOver`
    Language Rotor settings screen. Put two fingers on the screen and rotate until
    you see the pointer set to `Language`. Next, swipe down to select the next `VoiceOver`
    language. Swipe up to go back to a previously selected language. | ![Image](images/p85-02.jpg)
    |


    #### Using Zoom to Magnify the Entire Screen


    You may want to turn on the `Zoom` feature if you find that the text, icons, buttons,
    or anything on the screen is a little too hard to see. With the `Zoom` feature
    turned on, you can zoom the entire screen to almost twice the size. This makes
    everything much easier to read.


    **NOTE:** You cannot use `VoiceOver` and `Zoom` at the same time; you need to
    choose one or the other.


    Follow these steps to enable `Zoom`:


    1.  Tap the `Settings` icon.

    2.  Tap `General` in the left column.

    3.  Tap `Accessibility` near the bottom of the right column.

    4.  Tap `Zoom` in the right column.

    5.  Set the switch next to `Zoom` to `ON`.


    ![Image](images/p86-01.jpg)


    Similar to `VoiceOver`, `Zoom` uses the three-fingered gestures. Make sure to
    take note of them before you leave the screen.


    #### White on Black


    If the contrast and colors are difficult to see, then you might want to turn on
    the `White on Black` setting. Follow these steps to change this setting:


    1.  Get into the `Accessibility` screen in the `Settings` app, as shown previously.

    2.  Set the `White on Black` switch to `ON`.


    With this setting `ON`, everything that is light on the screen becomes black,
    and everything that is dark or black becomes white.'
