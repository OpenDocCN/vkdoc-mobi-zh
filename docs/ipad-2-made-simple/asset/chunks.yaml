  trans: "\n# 访问和编辑书签\n\n要查看书签，请按以下步骤操作：\n\n1.  轻点顶行中`搜索`窗口旁的`书签`图标。\n2.  轻点任意书签即可立即跳转。\n\
    3.  轻点头部的`编辑`按钮来编辑或删除书签：\n    -   要重新排列书签，请触摸并拖动每个书签的右边缘向上或向下移动。\n    -   要编辑书签名称，请触摸它并重新输入名称。编辑名称后，轻点左上角的`书签`按钮返回书签列表。\n\
    \    -   要删除书签，请在书签上向左或向右滑动，然后轻点`删除`按钮。\n4.  完成书签编辑后，轻点`完成`按钮。\n\n![images](img/p645-01.jpg)\n\
    \n## 将地图位置添加到通讯录\n\n将您已定位到地图上的位置添加到通讯录非常简单：\n\n1.  在地图上定位一个地址。\n2.  轻点`蓝色信息`按钮。\n\
    3.  轻点`添加到通讯录`。 ![images](img/p646-01.jpg)\n4.  轻点`创建新联系人`或`添加到现有联系人`。\n5.  如果您选择`添加到现有联系人`，则可以滚动或搜索您的联系人并选择一个名字。该地址将自动添加到该联系人中。\n\
    \n## 搜索您周围的事物（商店、餐厅、酒店、电影及其他）\n\n按以下步骤搜索您当前位置附近的事物：\n\n1.  在地图上定位一个位置，或使用`蓝点`图标标记您当前的位置。\n\
    2.  轻点`搜索`窗口。假设我们想搜索最近的披萨店。输入“pizza”即可在地图上定位所有当地的披萨店。\n\n    ![images](img/p646-02.jpg)\n\
    \n3.  请注意，每个定位到的地点左侧可能有一个`街景`图标，右侧有一个`蓝色信息`图标。\n\n    ![images](img/p647-01.jpg)\n\
    \n4.  如果您想放大或缩小，您可以张开或捏合屏幕，或者双击屏幕。\n5.  与任何已定位的地点一样，当您触摸`蓝色信息`图标时，可以查看所有详细信息，例如披萨店的电话号码、地址和网站。\n\
    6.  如果您想要前往该餐厅的路线，只需触摸`路线到这里`，系统会立即计算出一条路线。\n\n**注意：** 如果您触摸`主页`链接，您将退出`地图`应用并启动`Safari`。之后，您需要在完成浏览后重新启动`地图`应用。\n\
    \n![images](img/p647-02.jpg)\n\n## 放大和缩小\n\n您可以通过双击和捏合这两种熟悉的方式来放大和缩小。要双击放大，只需像在网页或图片上那样双击屏幕即可。\n\
    \n## 放置大头针\n\n假设您正在查看地图，并且发现了某个位置，希望将其设为书签或目的地。\n\n在本例中，我们正在放大查看波士顿市区。我们偶然发现了芬威公园，并决定将其添加到书签中会很好，因此我们在它上面放置了一个大头针，如图\
    \ 27-8 所示：\n\n1.  定位一个地点或将地图移动到你想要放置大头针的位置。\n2.  轻点地图的右下角。 ![images](img/p648-01.jpg)\n\
    3.  轻点`放置大头针`。\n4.  现在，触摸并按住大头针在地图上拖动。在本示例中，我们将其直接移动到芬威公园上。\n\n![images](img/2708.jpg)\n\
    \n**图 27-8.** *如何放置大头针*\n\n**提示：** 如何找到地图上任何位置的街道地址？\n\n当您`放置大头针`时，谷歌地图会显示实际的街道地址。如果您通过查看`卫星`、`混合`或`地形`视图找到了某个位置，但需要获取实际街道地址，这会非常方便。\n\
    \n放置大头针也是记录您停车位置的好方法——在陌生地点（尤其是使用 iPad 3G 时）非常有用。\n\n## 使用街景\n\n在 iPad 的`地图`应用中，谷歌的`街景`（图\
    \ 27-9）真的很有趣。谷歌一直在努力拍摄美国及其他地区几乎每个地址的照片。这些照片随后被输入其数据库，当您想要查看目的地或航点图片时，显示的就是这些内容。\n\
    \n**注意：** 谷歌的`街景`正在走出美国国门。全球多个主要城市现在已被绘制在地图上。\n\n如果有可用的街景，您会在地图上的地址或书签左侧看到一个小的图标——一个`橙色小人`图标。\n\
    \n![images](img/p649-01.jpg)\n\n在本例中，加里想查看他的红袜队圣地——芬威公园的街景：\n\n1.  在此场景下，为地址定位时，我们轻点了通讯录列表中芬威公园下的工作地址。我们也可以通过在海搜窗口中输入地址、搜索某种类型的商家或触摸`通讯录`应用中的地址来实现定位。\n\
    2.  名称左侧是`街景`图标。\n3.  我们轻点该图标，立即切换到该地址的街景视图。\n4.  非常酷的一点是，我们可以通过向左、向右甚至向上或向下滑动，在屏幕上以\
    \ 360 度旋转导航——这让我们能够查看目的地旁边和街对面的地方。\n\n要返回地图，只需触摸屏幕的右下角。\n\n![images](img/2709.jpg)\n\
    \n**图 27-9.** *使用谷歌的`街景`*\n\n# 获取路线\n\n`地图`程序最有用的功能之一是，我们可以轻松找到前往或来自任何地点的路线。假设我们想使用当前位置，获取从格洛丽亚的商店到波士顿芬威公园的路线。\n\
    \n## 先轻点“当前位置”按钮\n\n要查找前往或来自您当前位置的路线，您无需浪费时间输入当前地址——只需轻点顶部信息栏中央的“当前位置”按钮 ![images](img/p650-01.jpg)\
    \ 来定位自己即可。您可能需要重复此步骤几次，直到屏幕上出现`蓝点`图标。\n\n现在，您可以执行以下两项操作之一：\n\n-   轻点顶部信息栏左端的`路线`按钮。\n\
    -   或者，您可以像之前讨论的那样触摸`蓝色信息`图标，然后选择`路线到这里`（参见图 27-10）。除非您另行指定，否则`地图`将根据您当前的位置计算到目的地的路线。\n\
    \n![images](img/2710.jpg)\n\n**图 27-10.** *选择`路线到这里`，`地图`将为您规划行程。*\n\n## 选择起点或终点\n\
    \n我们可以按照以下步骤为给定路线选择起点或终点：\n\n1.  如果目的地在我们的`书签`中，我们可以触摸`书签`图标。\n2.  接着，我们选择已添加书签的位置。\n\
    3.  我们可以轻点`书签`、`最近查找`或`通讯录`来查找目的地。\n4.  在此情况下，我们轻点`书签`。\n5.  最后，我们轻点`芬威公园`。\n\n\
    \    ![images](img/p652-01.jpg)\n\n    **注意：** 一旦您触摸`从此处出发`按钮，您最近的搜索将被自动显示，如图\
    \ 27-10 所示。您也可以触摸`目的地`框 ![images](img/p652-02.jpg) 并输入一个目的地。\n\n6.  从`书签`中选择芬威公园后，路线规划屏幕会将我们带到一个概览屏幕。\n\
    7.  在起点位置放置一个`绿色图钉`图标，在终点位置（本例中为芬威公园）放置一个`红色图钉`图标。\n\n![images](img/p653-01.jpg)\n"
- fmt: "# Looking at the Route\n\nBefore you start the trip, you will see a `Start`\
    \ button in the lower-right corner of the screen. Tap the `Start` button and the\
    \ routing directions begin. The `Start` button changes to `Arrow` buttons that\
    \ allow you to move between the steps in the trip.\n\n![images](images/p653-02.jpg)\n\
    \n![images](images/p653-03.jpg)\n\nAs [Figure 27–11](#Chapter27.html#fig_27_11)\
    \ shows, you can look at the route as either a path on the map or as a list.\n\
    \n![images](images/2711.jpg)\n\n**Figure 27–11.** *Two ways of viewing directions*\n\
    \nYou can move the screen with your finger to look at the route, or just touch\
    \ the `Arrow` icons ![images](images/p654-01.jpg) at the bottom to show the route\
    \ in step-by-step snapshots.\n\nYou can also touch the `List` ![images](images/p654-02.jpg)\
    \ button, which will show detailed step-by-step directions.\n\n# Switching between\
    \ Driving, Transit, and Walking Directions\n\nBefore you start your directions,\
    \ you can choose whether you are driving, using public transportation, or walking\
    \ by tapping the icons on the left side of the blue bar at the bottom of the directions\
    \ screen, as shown in [Figure 27–12](#Chapter27.html#fig_27_12).\n\n![images](images/2712.jpg)\n\
    \n**Figure 27–12.** *Choosing your mode of transportation and your next steps*\n\
    \n# Reversing the Route\n\nTo reverse the route, touch the `Reverse` ![images](images/p655-01.jpg)\
    \ button, which is at the top between the `Start` and `End` fields. This can be\
    \ useful if you're not great at reversing directions on your own or if your route\
    \ uses lots of one-way streets.\n\n# Maps Options\n\n![images](images/p656-01.jpg)\n\
    \nCurrently, the only setting that affects your `Maps` app is `Location Services`,\
    \ which is critical for determining your current location. Follow these steps\
    \ to adjust these settings:\n\n1.  Touch the `Settings` icon.\n\n    ![images](images/p656-02.jpg)\n\
    \n2.  Now find the `Location Services` tab and touch it. Move the `Location Services`\
    \ switch to the `ON` position.\n3.  Make sure the switch next to `Maps` is also\
    \ set to the `ON` position, so `Maps` can approximate your location.\n\n**NOTE:**\
    \ Keeping the `Location Services` switch set to `ON` will reduce battery life\
    \ by a small amount. If you never use the `Maps` app or don't care about your\
    \ location, set it to `OFF` to save your battery life.\n\n# Using the Digital\
    \ Compass\n\nThe iPad has a very cool digital compass feature built in. This can\
    \ be helpful when you need to literally get your bearings and figure out which\
    \ way is north.\n\n## Calibrating and Using the Digital Compass\n\nBefore you\
    \ can use the digital compass, you need to calibrate it. You should only need\
    \ to calibrate the compass the first time you use it. Follow these steps to do\
    \ so:\n\n1.  Start `Maps` as you normally would.\n2.  Tap the `Current Location`\
    \ arrow twice—it changes from ![images](images/p657-01.jpg) to ![images](images/p657-02.jpg).\n\
    3.  You'll see a small digital compass appear on the screen, as shown in [Figure\
    \ 27–13](#Chapter27.html#fig_27_13).\n4.  The first time you use digital compass,\
    \ the calibration symbol appears on the screen. ![images](images/p657-03.jpg)\n\
    5.  Move your iPad in a “figure 8” pattern, as shown on the screen.\n\n    **NOTE:**\
    \ The iPad may ask you to move away from any source of interference while you\
    \ go through the calibration process.\n\n6.  Hold your iPad level to the ground.\
    \ If you calibrated it successfully, the compass will rotate and point north.\n\
    \n![images](images/2713.jpg)\n\n**Figure 27–13.** *Using the digital compass*\n\
    \n# Chapter 28\n\n# Troubleshooting\n\nThe iPad is usually highly reliable. Occasionally,\
    \ like your computer or any complicated electronic device, you might have to reset\
    \ the device or troubleshoot a problem. In this chapter, we give you some useful\
    \ tools to help get your iPad back up and running as quickly as possible. We start\
    \ with some basic quick troubleshooting and move into more in-depth problems and\
    \ resolutions later in the “Advanced Troubleshooting” section.\n\nWe also cover\
    \ some other odds and ends related to your iPad and give you a list of resources\
    \ where you can find more help with your iPad.\n\n## Basic Troubleshooting\n\n\
    We will begin by covering a few basic tips and tricks to get your iPad back up\
    \ and running.\n\n### What to Do If the iPad Stops Responding\n\nSometimes, your\
    \ iPad won't respond to your touch—it freezes in the middle of a program. If this\
    \ happens, try these steps in order to see if the iPad will start responding (see\
    \ [Figure 28–1](#Chapter28.html#fig_28_1)).\n\n1.  Press the `Home` button to\
    \ see if that exits to the `Home` screen.\n\n    ![images](images/p659-01.jpg)\n\
    \n2.  If one particular app is causing trouble, try double-clicking the `Home`\
    \ button to open the `App Switcher` bar. Then press and hold *any* icon in the\
    \ `App Switcher` bar until they all shake and a red circle with a minus sign appears\
    \ in the upper-left corner of the icon. Tap the `Red Circle` icon to close the\
    \ app.\n3.  If the iPad continues to be unresponsive, try pressing the `Sleep/Power`\
    \ key until you see `Slide to Power Off`. Then press and hold the `Home` button\
    \ until you return to the `Home` screen—this should quit the program.\n4.  Make\
    \ sure your iPad isn't running out of power. Try plugging it in or attaching it\
    \ to your computer (if it's plugged in) and see if it will start to respond.\n\
    5.  If holding the `Home` button doesn't work, you will need to try to turn off\
    \ your iPad by pressing and holding the `Power/Sleep` button for three to four\
    \ seconds. Next, slide the `Slide to Power Off` slider at the top of the screen.\
    \ If you cannot power off the iPad, then see the following instructions about\
    \ how to reset the iPad.\n6.  After you power off the iPad, wait a minute or so,\
    \ and then turn on the iPad by holding the same `Power` button for a few seconds.\n\
    7.  You should see the Apple logo appear on the screen. Wait until the iPad starts\
    \ up, and you should be able to access your programs and data.\n\n![images](images/2801.jpg)\n\
    \n**Figure 28–1.** *Basic troubleshooting steps*\n\nIf these steps don't work,\
    \ you will need to reset your iPad.\n\n### How to Hard-Reset Your iPad\n\nResetting\
    \ your iPad is your last option for dealing with an unresponsive iPad. It is perfectly\
    \ safe, and it usually fixes many types of problems (see [Figure 28–2](#Chapter28.html#fig_28_2)).\n\
    \n![images](images/2802.jpg)\n\n**Figure 28–2.** *Resetting your iPad*\n\nFollow\
    \ these steps to hard-reset your iPad:\n\n1.  Using two hands, press and hold\
    \ the `Home` button and the `Power/Sleep` button at the same time.\n2.  Keep both\
    \ buttons held down for about eight to ten seconds. You will see the `Slide to\
    \ Power Off` slider. Ignore that and keep holding both buttons until the screen\
    \ goes blank.\n3.  After a few more seconds, you should see the Apple logo appear.\
    \ When you see the logo, just release the buttons, and your iPad will be reset."
