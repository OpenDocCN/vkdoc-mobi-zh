  trans: "\n#### Facebook 通知\n\n根据您对 Facebook 推送通知的设置，您可能会被各种更新、留言墙帖子和邀请淹没。如果你的 Facebook\
    \ 好友不多，并且希望知道何时有人在你的留言墙上留言或评论你的帖子或照片，只需将推送通知设置为`开启`。\n\n| 当通知到达时，它会显示在屏幕上——即使你的\
    \ iPad 已锁定。在这个例子中，Gary 的朋友在他的留言墙上留言了，并且他的收件箱里有一条待处理的消息。`Facebook`图标告诉他有一条待回复或查看的通知。\
    \ | ![images](img/p561-03.jpg) |\n\n| 点击该图标会启动`Facebook`应用，Gary 可以查看并回复消息。他可以在`消息`部分看到一个通知图标，由`红色\
    \ (1)`圆圈标示。他还能在屏幕底部看到一条新的`留言墙帖子`通知。 | ![images](img/p562-01.jpg) |\n\n##### 放大或缩小应用\n\
    \n由于这个`Facebook`应用是为 iPhone 或 iPod touch 的较小屏幕设计的，你会注意到它会在屏幕中央作为一个较小的应用打开。要查看较大尺寸的应用，请点击屏幕右下角的`2x`按钮，如图\
    \ 23-3 所示。\n\n![images](img/2303.jpg)\n\n**图 23-3.** *使用`2x`按钮将应用扩展至全屏。*\n\n#####\
    \ 自定义 Facebook 应用的设置\n\n按照以下步骤调整`Facebook`应用的设置：\n\n1.  点击`设置`图标。\n2.  在左侧栏中点击`Facebook`。\n\
    3.  现在您可以调整各种选项：\n    *   `摇动以重新加载`：此功能可在您摇晃 iPad 时重新加载或更新页面。\n    *   `震动`：此功能允许您指定收到通知时所需的震动设置。\n\
    \    *   `推送通知`：这些功能有简单的`开启`/`关闭`开关。触摸`推送通知`可在下一个屏幕上查看详细的开关选项。\n\n![images](img/p563-01.jpg)\n\
    \n您可以在右侧看到`Facebook`应用的`推送通知`设置屏幕。\n\n触摸每个开关以将其打开`开启`或关闭`关闭`。\n\n对于每个处于`开启`位置的开关，当有变化发生时，您将收到推送通知。例如，当您收到有人确认您为好友、在照片中标记您或在您的留言墙上评论的消息时，您的\
    \ iPad 会通知您。\n\n**提示：** 最新版本的`Facebook`应用将允许您使用`Facebook  Places`查看附近的好友。它还具备`新样式`消息和`群组`功能。\n\
    \n![images](img/p564-01.jpg)\n\n### 使用 Flipboard 和 Friendly Facebook 应用\n\n虽然令人沮丧的是没有“官方”的\
    \ iPad Facebook 应用，但 App Store 中有两个非常好的替代品（均为免费）。这两款应用都能让 Facebook 在 iPad 的大屏幕上体验更佳。\n\
    \n| `Friendly Facebook for iPad`在 App Store 中有免费版本。只需在 App Store 中搜索“Facebook”，您应该就能找到该应用。\
    \ | ![images](img/p565-01.jpg) |\n\n一旦安装了该应用，您可以在应用顶部看到`实时动态`、`活动`和`地点`被标记为按钮（参见图\
    \ 23-4）。只需触摸其中一个按钮即可跳转到相应部分。\n\n在最顶部，您可以找到您的`个人资料`或`好友`的按钮，以及一个`首页`按钮，用于跳转到实时`新闻动态`。\n\
    \n顶部还有一些较小的图标，用于`消息`、`通知`、`请求`，以及一个指向您`Facebook 游戏`页面的便捷链接。\n\n![images](img/2304.jpg)\n\
    \n**图 23-4.** *Friendly Facebook for iPad* *屏幕*\n\n#### iPad 版 Flipboard\n\n作者最喜欢的应用之一是`Flipboard`，它被描述为\
    \ iPad 上的个人社交杂志。\n\n| 基本上，您可以从众多内容提供商中的任何一个向`Flipboard`应用添加版块。从那里，您可以以杂志风格（翻页）浏览任何网站或内容提供商。您可以使用`Flipboard`设置\
    \ Facebook、Twitter 和 Flickr（以及其他账户）的账户。此功能在 Facebook 方面表现非常出色。首先从 App Store 下载`Flipboard`。\
    \ | ![images](img/p566-01.jpg) |\n\n| 当您首次启动`Flipboard`时，您可以在添加版块时设置账户。设置 Facebook\
    \ 很简单，只需触摸`添加版块`，然后输入您的 Facebook 登录信息即可。 | ![images](img/p567-01.jpg) |\n\n然后，您将看到您的\
    \ Facebook 页面以杂志形式呈现。您可以触摸某个项目将其全屏显示，或者可以“翻页”浏览所有 Facebook 帖子。\n\n触摸页面顶部的`Facebook`按钮，您可以跳转到`您的留言墙`、`您的照片`、`新闻动态照片`、`新闻动态链接`、`群组`、`页面`、`好友列表`或`好友`（参见图\
    \ 23-5）。\n\n触摸某位好友的按钮即可跳转到他的页面。\n\n![images](img/2305.jpg)\n\n**图 23-5. Flipboard**\
    \ 的 Facebook 屏幕\n\n### LinkedIn\n\nLinkedIn 与 Facebook 的核心功能非常相似，但它更侧重于商务和职业方向。相比之下，Facebook\
    \ 则更侧重于个人好友和游戏。通过 LinkedIn，您可以与当前和过去的商业伙伴建立联系或重新取得联系。该服务允许您发送消息、了解他人的动态、进行讨论等等。\n\
    \n截至本书出版时，LinkedIn 的状态与 Facebook 非常相似。您可以在`Safari`浏览器上访问常规 LinkedIn 网站，或下载 iPhone\
    \ 版`LinkedIn`应用。\n\n哪个更好？我们觉得 iPhone 版`LinkedIn`应用比在`Safari`中浏览完整的 LinkedIn.com\
    \ 网站略胜一筹。使用`LinkedIn`应用，凭借其大按钮，导航更为便捷，但您在`Safari`版本中可以在屏幕上看到更多内容。我们建议您两种方式都尝试一下，看看自己喜欢哪种——这其实是个人的偏好问题。\n\
    \n#### 在 Safari 浏览器上使用 LinkedIn.com\n\n要在浏览器上访问 LinkedIn，请遵循以下步骤：\n\n1.  点击`Safari`图标。\n\
    2.  点击浏览器顶部的`地址`栏。\n3.  输入此地址：[`www.linkedin.com`](http://www.linkedin.com)。如果在输入时，[`www.linkedin.com`](http://www.linkedin.com)\
    \ 出现在下拉框中，则只需触摸该链接即可跳转。\n4.  输入您的 LinkedIn 用户名和密码登录，即可看到 LinkedIn 的`首页`页面，如图 23-6\
    \ 所示。\n\n![images](img/2306.jpg)\n\n**图 23-6.** *在您的`Safari`网页浏览器上的 LinkedIn `首页`页面*\n\
    \n**提示：** 请记住通过双击或捏合缩放来查看更多网页内容。\n\n您可以在 LinkedIn.com 上像在电脑上一样导航和交互。唯一的区别是您用手指代替鼠标点击链接。\n"
- fmt: '#### Downloading the LinkedIn App


    It''s easy to acquire the `LinkedIn` app. Start the `App Store` app on your iPad,
    type “LinkedIn” into the `Search` window, and locate the app. It''s free, so tap
    the `FREE` button to install it.


    ![images](images/p570-01.jpg)


    ##### Logging In to LinkedIn App


    Once the `LinkedIn` app is installed, click the `LinkedIn` icon and enter your
    login information.


    ![images](images/p571-01.jpg)

    ![images](images/p571-02.jpg)


    ##### Navigating the LinkedIn App


    The `LinkedIn` app has an icon-based navigation style similar to Facebook. Tap
    any icon to move to that function, and then tap the `Home` icon in the upper-left
    corner to return to the `Home` screen (see [Figure 23–7](#Chapter23.html#fig_23_7)).


    ![images](images/2307.jpg)


    **Figure 23–7.** *The `LinkedIn` app''s `Home` screen*


    ##### Communicating with LinkedIn Connections


    One of the things you will likely do the most with the `LinkedIn` app is communicate
    with your connections. Here''s the easy way to do so:


    1.  Touch the `Connections` icon.

    2.  Scroll through your connections or type in a connection name in the `Search`
    box.

    3.  Touch the contact you are looking for.

    4.  Touch the `Send` icon ![images](images/p572-02.jpg) in the upper-right corner
    and then choose `Send Message`.


    ![images](images/p572-01.jpg)


    ### Twitter


    Twitter was started in 2006. Twitter is essentially an SMS (text message)-based
    social networking site. It is often referred to as a *micro-blogging site* where
    the famous and not-so-famous share what''s on their mind. The catch is that you
    have only 140 characters to get your point across.


    With Twitter, you subscribe to *follow* someone who *tweets* messages. You might
    also find that people will start to follow you. If you want to follow us, we are
    `@mtrautschold` on Twitter.


    ### Making a Twitter Account


    Making a Twitter account is very easy. We do recommend that you first establish
    your Twitter account on the Twitter web site at [`www.twitter.com`](http://www.twitter.com).
    When you establish your account, you will be asked to choose a unique user name—we
    use `@garymadesimple`—and a password.


    ![images](images/p573-01.jpg)


    You will then be sent an e-mail confirmation. Click the link in your e-mail and
    you will be taken back to the Twitter web site. You can make tweets or choose
    people to follow on the web site; you can also read tweets from your friends.


    ![images](images/p573-02.jpg)


    ### Twitter Options for the iPad


    There are many options for using Twitter on the iPad. The easiest way to follow
    others and to tweet is to use one of the Twitter apps from the App Store.


    There are many Twitter apps from which to choose. We will highlight two Twitter
    apps in this book: `TweetDeck` and the official `Twitter` app. Both are very well
    designed and easy to use.


    ![images](images/p573-03.jpg)


    **NOTE:** Both of these apps allow you to perform essentially the same tasks on
    Twitter—it really is a matter of personal preference!


    #### Download Twitter Apps


    Go to the App Store, touch `Categories`, and choose `Social Networking`. You should
    see both `TweetDeck` and `Twitter` in the `Social Networking` section. If not,
    simply touch the `Search` window and type in either app name. Download the apps
    as you would any other app to the iPad.


    ![images](images/p574-01.jpg)


    #### Starting the Twitter App for the First Time


    Touch either app icon and the program will start. The first time using either
    app will require you to sign in to Twitter. Your user name is the one you picked
    when you first signed up for Twitter.


    ![images](images/p574-02.jpg)


    #### Using TweetDeck


    The `TweetDeck` app gives you a very clean `Home` screen. You see the tweets from
    those you are following along the bottom-left section of the screen under the
    `All Friends` label.


    To the right, you usually see the `Mentions`, which are responses to your tweets.
    These work almost like a text message conversation.


    The controls for `TweetDeck` are in the upper-right corner. There are five icons
    available to you (see [Figure 23–8](#Chapter23.html#fig_23_8)).


    ![images](images/2308.jpg)


    **Figure 23–8.** *The layout of `TweetDeck`''s `Home` page*


    ##### People


    Tap the `Profile` icon (person) to see the `Search` box and type in the name or
    username of the individual you are looking to follow.


    ![images](images/p575-01.jpg)


    In this example, I looked for my friend Kevin who goes by “CrackBerryKevin.” When
    you find desired the user, touch the `View Profile` button to see his Twitter
    profile.


    ![images](images/p576-01.jpg)


    ##### Accounts and Settings


    There are several adjustable fields in the `Accounts and Settings` section of
    the app. Touch the `Manage Accounts` tab to add or edit a Twitter account. Touch
    `Sign into an Account` to sign in to another Twitter account you may have. To
    do this, touch the tab and input your username and password. Touch the `Settings`
    tab to adjust auto correction, auto capitalization, and sound options. You can
    also choose your picture service if you have a specific service for uploading
    pictures to Twitter.


    ![images](images/p576-02.jpg)


    ##### Refresh


    Touching the `Refresh` button simply refreshes your tweets.


    ![images](images/p576-03.jpg)


    #### Add Column


    The `Add Column` button adds another column to your Twitter `Home` screen. Just
    slide from right to left to advance from one column to the next. The dots at the
    bottom indicate how many screens you have to move through. You can add a column
    for `Search`, `Direct Messages`, `Mentions`, `Favorites`, `Twitter Trends`, `Twitter
    Lists`, `Twitter Search`, and `All Friends`.


    ![images](images/p577-01.jpg)


    ##### Compose Tweet


    Touch the `Compose Tweet` icon ![images](images/p578-01.jpg) and the `Tweet composition`
    screen is displayed. Your Twitter ID is in the `From:` line, and you have 140
    characters to express what is on your mind. When you are done, touch the `Send`
    button in the upper-right corner.


    ![images](images/p578-02.jpg)


    ##### Reading and Replying


    Touch a tweet to bring it to the `Main` screen. This makes the tweet nice and
    large, and you can touch a link within the tweet to launch the `Web` view. If
    you want to view the link in `Safari`, touch the `View in Safari` button.


    ![images](images/p578-03.jpg)

    ![images](images/p578-04.jpg)


    **NOTE:** After you view the link in `Safari`, you need to close `Safari` and
    restart `TweetDeck`.


    At the bottom of the `Tweet` window, you will see five icons: `Reply`, `Forward`,
    `DM`, `Email`, and `Favorite`.


    ![images](images/p578-05.jpg)


    Each icon will bring up an additional window and the onscreen keyboard for you
    to type your `Reply`, `Forward` the tweet, send a `Direct Message` to the author,
    `Email` the tweet, or set it as a `Favorite`.


    #### Using Twitter


    The official `Twitter` app takes a streamlined approach to using Twitter. The
    `Home` screen shows you the tweets from those you are following. Touch the full
    message and a new column appears on the right. This column shows the full tweet
    and information about the author, as well as icons for `Reply`, `Favorite`, `Retweet`,
    and `Send`.


    You can see five icons along the left-hand side. The first icon is the main `Twitter`
    `Timeline` feed. The other icons are `Mentions`, `Direct Messages`, `Links`, `Profile`,
    and `Search`.


    The `Compose Tweet` icon is in the lower-left corner (see [Figure 23–9](#Chapter23.html#fig_23_9)).


    ![images](images/2309.jpg)


    **Figure 23–9.** *The layout of the `Twitter` app''s `Home` page*'
