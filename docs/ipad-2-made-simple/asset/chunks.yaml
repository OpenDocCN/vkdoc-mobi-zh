    3.  If you don't see this pop-up window, then double-tap the screen.\n4.  Select\
    \ **Paste** to paste your selection.\n\n![Image](images/p100-01.jpg)\n\n#### PastingText\
    \ or an Image into Another App\n\nFollow these steps to paste the text or image\
    \ you have copied into another app:\n\n1.  Press the **Home** button (see Figure\
    \ –15).\n2.  Tap the app into which you want to paste the text. In this case,\
    \ let's tap **Mail**.\n3.  Tap the **Compose** icon ![Image](images/p101-01.jpg)\
    \ to write a new email.\n4.  Double-tap anywhere in the body of the message.\n\
    5.  Tap **Paste**.\n\n![images](images/0215.jpg)\n\n**Figure 2-15.** *Bring up\
    \ the **Paste** command by either double-tapping or pressing, holding, and releasing.*\n\
    \nMove the cursor to the body of the text and either double-tap or touch, hold,\
    \ and release your finger. This will bring up the **Paste** pop-up window. Tap\
    \ **Paste** and the text on the clipboard will be pasted right into the body of\
    \ the email.\n\n#### Shake to Undo Paste or Typing\n\n| One of the great new features\
    \ in the Copy and Pastefeature is the ability to undo either typing or the text\
    \ you just pasted. \nAll you have to do is shake the iPad after the paste. A new\
    \ pop-up window appears, giving you the option to undo what you have just done.\n\
    \nTap **Undo Paste** or **Undo Typing** to correct the mistake.\n**TIP:** There\
    \ is an **Undo** button on the keyboard as well. Just press the **.?123** key;\
    \ it is in the lower-left corner. | ![Image](images/p102-01.jpg) |\n\n**TIP:Delete\
    \ Text by Selecting It and Pressing Backspace**\n\nThis tip is for you if you\
    \ ever want to delete a number of lines of text, a paragraph, or even all the\
    \ text you just typed with one or two taps. Use the techniques described previously\
    \ to select the text you want to delete. Next, simply press the **Delete** key\
    \ ![Image](images/p102-02.jpg) in the lower-left corner of the keyboard to delete\
    \ all the selected text.\n\n### Finding Things with Spotlight Search\n\nA great\
    \ feature on your iPad for finding information is the **Spotlight Search**, Apple's\
    \ proprietary search method. This feature providesyour iPad with a global search\
    \ for a name, event, or subject.\n\nThe concept is simple. Let's say you are looking\
    \ for something related to Martin. You cannot remember if it was an email, a note,\
    \ or a calendar event; however, you do know it was related to Martin.\n\nThis\
    \ is the perfect time to use the **Spotlight Search** feature to find everything\
    \ related to Martin on your iPad."
  trans: '

    #### 使用其他语言输入——国际键盘


    截至本书出版时，iPad 支持你使用超过十几种语言进行输入。部分亚洲语言（如日语和中文）提供了两到三种键盘，对应不同的输入法。


    若要启用多种语言键盘，请按照以下步骤操作：


    1.  轻点`设置`图标（请参阅图 2-10）。

    2.  在左侧栏中轻点`通用`。

    3.  在右侧栏底部附近轻点`键盘`。

    4.  轻点`国际键盘`。

    5.  轻点`添加新键盘`以添加其他国际键盘。

    6.  轻点列表中的任意键盘/语言以添加该键盘。

    7.  此时该键盘将出现在可用键盘列表中。

    8.  若要调整键盘选项，请轻点列表中的键盘。


    ![images](img/0210.jpg)


    **图 2-10.** *添加并自定义国际键盘*


    ##### 编辑或删除国际键盘


    编辑或删除国际键盘也十分简单：


    1.  返回到显示所有键盘列表的`键盘`屏幕（见图 2-11）。

    2.  轻点右上角的`编辑`以更改键盘顺序或删除键盘。

    3.  若要更改键盘列表的顺序，请向上或向下拖动列表键盘的左边缘。

    4.  若要删除键盘，请轻点`红色减号`图标，然后轻点`删除`。


    ![images](img/0211.jpg)


    **图 2-11.** *编辑和删除国际键盘*


    一旦你启用了多个键盘，轻点`地球`键即可在所有语言之间循环切换（请参阅图 2-12）。


    日语和其他一些语言提供了多个键盘选项，以满足你的输入偏好。


    在某些语言中（例如图 2-12 中显示的日语），你会看到输入的字母自动转换为字符。你还会在键盘上方看到一行其他字符组合。看到你想要的组合时，轻点它即可。


    ![images](img/0212.jpg)


    **图 2-12.** *轻点`地球`键在国际键盘之间循环切换。*


    ### 拷贝与粘贴


    拷贝和粘贴文本有多种方法。例如，`拷贝和粘贴`功能对于从日历中获取文本并放入电子邮件中非常有用。它也很适合将笔记放入电子邮件或日历中。你甚至可以从你的`Safari`网页浏览器中拷贝文本，然后粘贴到笔记或邮件中。


    #### 选择文本


    如果你正在阅读或输入文本，可以通过几种方式选择文本。例如，你可以轻点或双击文本以开始选择文本进行拷贝。此操作在邮件、信息和笔记中均有效。


    ##### 双击并拖动蓝色手柄


    选择文本的一种方式是双击一个单词，然后拖动蓝色手柄。


    你会看到一个带有蓝色圆点（手柄）的选框位于对角。只需拖动这些手柄即可选择你想要高亮显示并拷贝的文本，如图 2-13 所示。


    ![images](img/0213.jpg)


    **图 2-13.** *双击开始选择文本，然后拖动蓝色圆点以扩展选区。*


    ##### 使用“选择”或“全选”


    | 在输入内容时选择文本的另一种方法是轻点文本一次，然后从弹出窗口中选择`选择`或`全选`。除了在文本本身之外，如果你在屏幕上的任意位置双击，也会出现相同的弹出窗口。
    | ![Image](img/p98-01.jpg) |


    #### 使用双指触摸选择文本


    另一种选择文本的方法要求你同时用两根手指触摸屏幕。如果你用一只手握住 iPad，用另一只手的拇指和食指触摸屏幕，这种方法效果最佳。你要做的是在你想要选择文本的开始和结束位置同时触摸屏幕。如果第一次触摸未能精确选中，请不要担心。在第一次触摸后，使用蓝色手柄将选区的起始和结束位置拖动到正确位置（请参阅图
    2-14）。


    ![images](img/0214.jpg)


    **图 2-14.** *通过同时用两根手指触摸屏幕来选择文本。*


    #### 通过长按选择网站或其他不可编辑文本


    | 在`Safari`网页浏览器以及其他无法编辑文本的地方，你可以将手指放在某些文本上，一个单词或整个段落将会被高亮显示，并在每个角落出现手柄。如果你想要选择更多文本，可以拖动这些手柄。


    **注意：** 向上或向下拖动可快速选择整个段落或更多内容。你可以拖动小于一个段落的距离，以使用带有蓝色手柄的精细文本模式选择器。 | ![Image](img/p99-01.jpg)
    |


    #### 剪切或拷贝文本


    | 一旦你想要拷贝的文本被高亮显示，只需轻点屏幕顶部的`拷贝`选项卡。该选项卡会变为蓝色，表示文本已在剪贴板上。**注意：** 如果你之前已经剪切或拷贝过文本，那么你还会看到`粘贴`选项，如图所示。
    | ![Image](img/p99-02.jpg) |


    #### 粘贴文本


    如果你要将文本粘贴到同一个笔记或邮件中，请按照以下步骤操作：


    1.  用手指将光标移动到你想要粘贴文本的位置。请记住使用“放大镜”技巧（本章前面已描述）来帮助你定位光标。

    2.  松开屏幕后，你应该会看到一个弹出窗口，询问你是要`选择`、`全选`还是`粘贴`。

    3.  如果没有看到这个弹出窗口，请双击屏幕。

    4.  选择`粘贴`以粘贴你的选择内容。


    ![Image](img/p100-01.jpg)


    #### 将文本或图像粘贴到另一个应用


    按照以下步骤将你拷贝的文本或图像粘贴到另一个应用：


    1.  按下`主屏幕`按钮（见图 2-15）。

    2.  轻点你想要粘贴文本的目标应用。在此例中，我们轻点`邮件`。

    3.  轻点`编写`图标 ![Image](img/p101-01.jpg) 以撰写新电子邮件。

    4.  在邮件正文中的任意位置双击。

    5.  轻点`粘贴`。


    ![images](img/0215.jpg)


    **图 2-15.** *通过双击或按压、按住并松开的方式调出`粘贴`命令。*


    将光标移动到文本正文处，然后双击或触摸、按住并松开手指。这将调出`粘贴`弹出窗口。轻点`粘贴`，剪贴板上的文本便会立即粘贴到电子邮件正文中。


    #### 摇动以撤销粘贴或输入


    | 拷贝和粘贴功能中的一个出色新特性是能够撤销输入或刚刚粘贴的文本。你只需在粘贴后摇晃 iPad。一个新的弹出窗口会出现，让你选择撤销刚才的操作。


    轻点`撤销粘贴`或`撤销输入`来纠正错误。**提示：** 键盘上也有一个`撤销`按钮。只需按下`.?123`键；它位于左下角。 | ![Image](img/p102-01.jpg)
    |


    **提示：通过选择文本并按退格键来删除文本**


    如果你想用一两次轻点来删除多行文本、一个段落甚至所有刚输入的文本，这个技巧对你会有帮助。使用前面介绍的方法选择你想要删除的文本。然后，只需按下键盘左下角的`删除`键
    ![Image](img/p102-02.jpg) 即可删除所有选中的文本。


    ### 使用 Spotlight 搜索查找内容


    iPad 上一个非常出色的信息查找功能是`Spotlight 搜索`，这是苹果专有的搜索方法。此功能让你的 iPad 能够全局搜索姓名、事件或主题。


    其概念很简单。假设你在寻找与 Martin 相关的内容。你不记得它是邮件、笔记还是日历事件；但你确定它与 Martin 有关。


    此时正是使用`Spotlight 搜索`功能在 iPad 上查找所有与 Martin 相关内容的绝佳时机。

