    We touched `Chart Options` and can now choose everything from text size to font
    to the type of chart. The options are truly staggering.


    Take some time to walk through the `Numbers` “Getting Started” guide to see all
    the options available.


    ![images](images/p487-03.jpg)


    **TIP:** We could write a full book on each of these programs. Take some time
    to just touch icons and options to see for yourself how things change as you make
    individual selections. Have fun—this is very powerful and creative software to
    work and play with!


    #### Picture/Object Button


    Next to the `Information` button, you will find the `Picture/Object` button. Touch
    this button to insert media, tables, charts, or shapes into the document. In `Numbers`,
    this button functions exactly the same as it does in `Pages`.


    ![images](images/p488-01.jpg)


    #### Tools Button


    Next to the `Pictures/Objects` button is the `Tools` button. Touch this to access
    the `Find`, `Print`, `Settings`, and `Go to Help` tools.


    ![images](images/p488-02.jpg)


    Use the `Find` button to search for any word or phrase in a `Numbers` document—just
    like `Pages`.


    ![images](images/p489-01.jpg)


    When the word is located, the text will be highlighted.


    ![images](images/p489-02.jpg)


    Use `Go to Help` to jump to the Apple web site for support with `Numbers`.


    #### Editing Cells, Charts, and Graphs


    `Numbers` is a very powerful spreadsheet program. Just like a traditional spreadsheet
    program on your computer, it can be used to edit each cell, input formulas, and
    customize charts and graphs.


    ##### Working with Charts and Graphs


    The first time you work with `Numbers`, we suggest you open one of the templates.
    In this example, we are using the `Budget` template. Notice the pie chart, which
    is based on four criteria:


    1.  Double-tap the chart to select it, and the cells used to create the chart
    are highlighted.

    2.  Double-tap an individual cell, and the formula calculator pops up.


    `Numbers` senses what type of field you are trying to enter. In the `Budget` template,
    `Numbers` knows we need to enter dollar amounts. We can simply type in a new amount
    and press the `Done` button; the changes are reflected in the chart shown previously.


    ![images](images/p489-03.jpg)


    #### Working with Tables


    If you have spent any time at all working with spreadsheets, you know that tables
    are a mainstay of spreadsheet construction.


    Tap any table in your spreadsheet to highlight it.


    You add columns to the table by holding and dragging the column handle left or
    right (see [Figure 19–7](#Chapter19.html#fig_19_7)).


    ![images](images/p490-01.jpg)


    Similarly, you add or remove rows by holding and dragging the row handle up or
    down.


    ![images](images/p490-02.jpg)


    To move the table entirely, just touch and hold the top bar and reposition the
    table where you desire.


    ![images](images/1907.jpg)


    **Figure 19–7.** *Adding and removing rows and columns in tables*


    **TIP:** It is easy to make mistakes when using `Numbers`. If something doesn''t
    look right, just touch the `Undo` button to undo the last edit or addition. Touch
    `Undo` a couple of times to keep undoing things you might not have wanted to do.


    There really is so much more to do with `Numbers`—again, we encourage you to read
    the “Getting Started” guide to see additional features!


    ### Keynote Presentations


    `Keynote` is the third jewel in the triple crown of `iWork`. `Keynote` is comparable
    to `Keynote` on your Mac or `Microsoft PowerPoint` on your PC. Like `Pages` and
    `Numbers`, `Keynote` is a very powerful and capable piece of presentation software.
    We won''t be able to cover every aspect of this software, but we can get you started
    and working with presentations using `Keynote`.


    ![images](images/p491-01.jpg)


    #### Using Keynote for the First Time


    Just like `Pages` and `Numbers`, `Keynote` comes with a “Getting Started” file
    to help you with some of the various features of the program. It is a very good
    idea to thumb through this guide before you start creating your own spreadsheets.


    **NOTE:** Unlike `Pages` and `Numbers`, `Keynote` works only in `Landscape` mode
    since this is presentation software.


    ![images](images/p491-02.jpg)


    #### Choosing a Template


    As with `Pages`, the `New Presentation` button gives you the option of starting
    a new presentation or using a duplicate presentation.


    **NOTE:** You need to have the presentation you wish to “duplicate” visible in
    the main window.


    Touch the `New Presentation` button and you will be asked to choose a template.


    You can select from several blank presentations (“White,” “Black,” or “Gradient”)
    to start from scratch, or you can choose one of the templates or themes provided
    to get started.


    In the following example, we chose the `Parchment` template to work with.


    ![images](images/p492-01.jpg)


    #### Using the Toolbar in Keynote


    In the upper-right corner, just like in `Pages` and `Numbers`, you will find the
    `Keynote` toolbar. The icons are similar to those in `Pages` and `Numbers`, but
    the functions are a bit different, as shown in [Figure 19–8](#Chapter19.html#fig_19_8).


    ![images](images/1908.jpg)


    **Figure 19–8.** *The page layout in `Keynote`*


    ##### The Information Button


    The `Information` button looks identical and sits in the same place as it does
    in `Pages`. In order to use the `Information` button, you need to have a text
    box, picture, graph, or object highlighted. Simply touch anywhere to activate
    the object and then tap the `Information` button.


    Touch a text box and the text options are displayed. Touch a picture and the picture
    options are displayed.


    In this example, we touched a text box and then touched the `Information` button.


    We touched `Text Options`, and now we can choose everything from the text size
    to the font to the style of text.


    The options are truly staggering. Take some time to walk through the “Getting
    Started” guide to see all the options available.


    ![images](images/p493-01.jpg)


    **TIP:** We could write a full book on each of these apps. Take some time to just
    touch icons and options to see for yourself how things change as you make individual
    selections. Have fun—this is very powerful and creative software to work and play
    with!


    #### Picture/Object Button


    Next to the `Information` button in `Keynote`, you will find the `Picture/Object`
    button. Touch this button to insert media, tables, charts, or shapes into the
    document. This button functions exactly the same as it does in `Pages` and `Numbers`.


    ![images](images/p494-01.jpg)


    **TIP:** In all three programs, pictures can be rotated just by touching and holding
    two fingers on the picture and rotating your fingers—very cool!


    #### Tools Button


    Next to the `Pictures/Objects` button is the `Tools` button. Touch this to access
    the `Find`, `Go to Help`, `Edge Guides`, `Slide Numbers`, and `Check Spelling`
    tools.


    Use the `Find` button to search for any word or phrase in the document—just like
    `Pages` and `Numbers`. When the word is located, the text will be highlighted
    in yellow. Just touch to edit.


    Use `Go to Help` to jump to the Apple web site for support with this app.


    ![images](images/p494-02.jpg)


    The `Edge Guides`, `Slide Numbers`, and `Check Spelling` toggles are exactly the
    same as in `Pages`.'
