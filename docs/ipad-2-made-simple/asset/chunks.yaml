- fmt: "# The Apple iPad Dock\n\nIf you want to set up your iPad in a vertical orientation\
    \ to use it as an electronic picture frame or have it held for you while you use\
    \ it, check out the $29.00 iPad Dock. The iPad Dock also has a dock connector\
    \ port in the back, so you can connect it to your computer or charger while the\
    \ iPad is in sitting in the dock (see [Figure 15](#PartI.html#fig_p1_15)).\n\n\
    ![images](images/p29-01.jpg)\n\n**Figure 15**. *The Apple iPad Dock*\n\n# The\
    \ Apple Camera Connection Kit\n\nIf you want to transfer your pictures from your\
    \ digital camera to your iPad directly, but without first transferring them to\
    \ your computer, you can do it with the Camera Connection Kit accessory. This\
    \ $29.00 accessory gives you two small accessories—the one shown on the left of\
    \ [Figure 16](#PartI.html#fig_p1_16) is the USB adapter; the other is the SD Card\
    \ adapter. Both plug into the dock connector port on the bottom of your iPad.\n\
    \n![images](images/p30-01.jpg)\n\n**Figure 16.** *The Apple Camera Connection\
    \ Kit*\n\nTo import photos using these adapters, follow these steps:\n\n1. Plug\
    \ either the USB or the SD Card accessory into the dock port at the bottom of\
    \ your iPad.\n   1. If you are using the USB connector, plug the USB cable from\
    \ your camera into the connector.\n   2. If you are using the SD card connector,\
    \ remove the SD memory card from your camera and insert it into the connector.\n\
    2. Your iPad should be turned on. If it is, it will immediately bring you to the\
    \ **Import Photos** screen (see [Figure 17](#PartI.html#fig_p1_17)).\n3. To import\
    \ all photos, tap the **Import All** button in the upper-right corner.\n4. To\
    \ import selected photos, begin by tapping pictures to select them. Next, tap\
    \ the **Import** button and choose **Import Selected**.\n5. You then have the\
    \ option to **Keep** or **Delete** the photos on the camera or SD card.\n6. The\
    \ most recent imported photos will show up in the **Last Import** photo album.\
    \ All imported photos will show up in the **All Imported** photo album.\n\n![images](images/p31-01.jpg)\n\
    \n**Figure 17.** *Import photos using the Camera Connection Kit.*\n\n# VGA Adapter\
    \ Cable\n\nThe VGA Adapter Cable is for you if you are using the **Keynote** app\
    \ and want to play a presentation on a larger external VGA monitor from your iPad,\
    \ or you want to play movies you rent or purchase from the iTunes Store.\n\n**CAUTION:**\
    \ At the time of publishing, the VGA Adapter Cable accessory worked only in very\
    \ limited apps and situations. For example, it worked only for the **Keynote**\
    \ app in **Play** mode, and for certain movies purchased or rented from iTunes.\
    \ However, it did not display the iPad screen as soon as you plugged it in.\n\n\
    This VGA Adapter Cable costs $29.00. You plug one end into your dock connector\
    \ on the bottom of your iPad and connect the other end to the VGA cable going\
    \ to the external monitor, as shown in [Figure 18](#PartI.html#fig_p1_18). When\
    \ you play your presentation in **Keynote**, you can advance slides or jump between\
    \ slides using your iPad.\n\n![images](images/p32-01.jpg)\n\n**Figure 18.** *The\
    \ VGA Adapter Cable for the iPad*\n\n# Part II\n\n# Introduction\n\nWelcome to\
    \ your new iPad 2—and to the book that tells you what you need to know to get\
    \ the most out of it. In this part, we show you how the book is organized and\
    \ where to go to find what you need. We even show you how to get some great tips\
    \ and tricks sent right to your iPad 2 via short email messages, as well as where\
    \ to find short, to-the-point video tutorials to learn more about your iPad.\n\
    \n# Introduction\n\n![Image](images/p35-01.jpg)\n\n## Congratulations on Your\
    \ iPad 2!\n\nIn your hands is the newly enhanced iPad 2—smaller, thinner, and\
    \ more powerful than the original iPad. It is arguably the most powerful and elegant\
    \ media player, E-Book reader, gaming machine, life organizer, and just about\
    \ everything else available today.\n\nThe iPad 2 can do close to 90% of what you\
    \ already do on your computer—only better. The iPad 2 can also do virtually everything\
    \ you can do on your smartphone. You can even make video calls from your iPad\
    \ 2 with Apple's proprietary **FaceTime** app or the **Skype** app. Yet the iPad\
    \ is neither computer nor smartphone—it is nestled somewhere in between, where\
    \ many of us live.\n\n**NOTE:** Take a look at [Chapter 18](#Chapter18.html#ch18):\
    \ “FaceTime Video Messaging and Skype,” where we show you how to use **FaceTime**\
    \ and **Skype** on your iPad!\n\nWith your iPad, you can view your photos and\
    \ interact with them using the same touch-screen gestures as an iPhone or iPod\
    \ touch. You can pinch and zoom, rotate, and email your photos—all with simple\
    \ taps gestures.\n\nYou can also interact with your content like never before.\
    \ Newspapers look and read like newspapers and a web site all in one. You can\
    \ flip through stories, videos, and pictures; and interact with your news.\n\n\
    And you can really feel like you are reading a book when you read on your iPad.\
    \ Pages turn slowly or quickly (you can even see the words on the back of the\
    \ pages as you turn them when you use the **iBooks** app).\n\nYou can manage your\
    \ media library like never before. **iTunes** and the **iPod** app have a beautiful\
    \ interface on the iPad. Choosing music, watching videos, organizing playlists,\
    \ and more is effortless and fun on the large, high definition–quality screen.\n\
    \nDo you have a Netflix account? You can watch your favorite TV shows and movies\
    \ on the beautiful iPad display. You can also manage your content and organize\
    \ your queue right on the iPad.\n\nYou also no longer need to update your Facebook\
    \ status on the tiny screen of your smartphone—with the iPad, you can see the\
    \ web site on a large screen and have access to many of the features of your desktop\
    \ version, yet also be able to interact with Facebook like never before, using\
    \ the iPad's touch screen.\n\nFinally, you can stay connected to the web and your\
    \ email with the built-in Wi-Fi connection or the optional 3G connection of the\
    \ iPad. All the latest high-speed protocols are supported, so you can always be\
    \ in touch and get the latest content. There is even an almost “full-size” keyboard\
    \ to type out emails when you use the iPad in **Landscape** mode.\n\n## Getting\
    \ the Most Out of *iPad 2 Made Simple*\n\nThis book can be read cover-to-cover,\
    \ but you can also peruse it in a modular fashion, by chapter or by topic within\
    \ a chapter. Maybe you just want to check out the **App Store**, try the **iBooks**\
    \ app, or get set up with your email or contacts. Or maybe you just want to load\
    \ up your music. You can do all this and more with our book.\n\nYou will soon\
    \ realize that your iPad 2 is a very powerful device. There are, however, many\
    \ secrets “locked” inside that we help you “unlock” throughout this book.\n\n\
    Take your time—this book can help you on your way to learning how to best use,\
    \ work, and have fun with your new iPad. Think back to when you tried to use your\
    \ first Windows or Mac computer. It took a little while to get familiar with how\
    \ to do things. It's the same with the iPad. Use this book to help you get up\
    \ to speed and learn all the best tips and tricks more quickly.\n\nRemember that\
    \ devices this powerful are not always easy to grasp—at first.\n\nYou'll get the\
    \ most out of your iPad if you read the book a section at a time and then try\
    \ out what you read. We all know that reading and then performing an activity\
    \ gives us a much higher retention rate than simply reading alone.\n\nSo, in order\
    \ to learn and remember what you learn, we recommend you do the following:\n\n\
    ***Read a little, try a little on your iPad, and repeat!***\n\n## How This Book\
    \ Is Organized\n\nKnowing how this book is organized will help you locate things\
    \ that are important to you more quickly. Here we show you the main organization\
    \ of this book. Remember to take advantage of our abridged table of contents,\
    \ the detailed table of contents, and our comprehensive index to help you quickly\
    \ pinpoint items of interest."
