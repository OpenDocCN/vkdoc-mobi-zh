- fmt: "### Comic Books on the iPad\n\nOne genre of *new media* poised for a comeback\
    \ with the advent of the iPad is the comic book. The iPad, with its relatively\
    \ large high-definition screen and powerful processor, makes the pages of comic\
    \ books come alive.\n\nThere were already a few different comic book apps available\
    \ when we wrote this book, but none from a company more famous than Marvel Comics.\n\
    \nLocate the `Marvel Comics` app in the App Store. Go to `Categories` and then\
    \ go to `Books`. The app is free, and comic books can be purchased from inside\
    \ the app.\n\nAt the bottom of the `Home` screen are three buttons: `My Comics`,\
    \ `Store`, and `Settings`. Purchases you make will be under the `My Comics` heading.\n\
    \nThe App Store gives you the opportunity to download both free comics and individual\
    \ issues for sale. Most sell for $1.99 per issue.\n\nYou can see four tabs along\
    \ the top:\n\n![images](images/p627-01.jpg)\n\n- `Featured`\n- `New`\n- `Popular`\n\
    - `Free`\n\nEach tab takes you to a new list of comics to browse, much like the\
    \ iTunes store.\n\nTouch the `Browse` button to browse by `Genre`, `Creator`,\
    \ `Storylines/Arcs`, or `Series`. Or you can type in a search to find a particular\
    \ comic.\n\nYou can read a comic book in one of two ways. First, you can swipe\
    \ through the pages and read one after the other. Second, you can double-tap a\
    \ frame to `Zoom` in and then tap the screen to advance to the next frame in the\
    \ comic strip. From there, you can just swipe from right to left to advance a\
    \ frame; or, if you want to go back, swipe from left to right.\n\nTo return to\
    \ the `Home` screen or see the on-screen options, just touch and hold anywhere\
    \ on the screen for about a second and then release. You will see a `Settings`\
    \ button in the top-right corner, a page `Thumbnail` view (just like `Photos`)\
    \ at the bottom, and a `Close` button in the upper-left corner that will take\
    \ you to the `Home` screen.\n\n![images](images/p628-01.jpg)\n\n**NOTE:** The\
    \ makers of this app, `ComiXology`, also make the `Comics` app that contains the\
    \ Marvel comics, as well as a bunch of others, including Archie, Image, and Top\
    \ Cow. You will also see DC Comics and other vendors in the App Store.\n\n###\
    \ The iPad As a PDF Reader\n\nIn [Chapter 12](#Chapter12.html#ch12), we showed\
    \ you how to open attachments in your e-mail, including PDF files. While you can\
    \ read just about any type of attached file, you don't have the option of saving\
    \ PDF files on the iPad for future viewing.\n\nFortunately, there are a few programs\
    \ available that turn the iPad into a very capable PDF viewing program. One such\
    \ program with multiple uses is `GoodReader`.\n\nThe `GoodReader` app is in the\
    \ App Store in the `Productivity` section. At the time of publishing, this app\
    \ was only US $4.99.\n\n![images](images/p629-01.jpg)\n\n#### Transferring Files\
    \ to Your iPad\n\nOne of the great things about the `GoodReader` app is that you\
    \ can use it to wirelessly transfer large files from your Mac or PC to the iPad\
    \ for viewing in the `GoodReader` app. You can also use `GoodReader` for document\
    \ sharing in iTunes, as we discussed in [Chapter 3](#Chapter03.html#ch3): “Sync\
    \ Your iPad with iTunes.” Follow these steps to transfer a file with `GoodReader`:\n\
    \n1.  Touch the small `Wi-Fi` icon at the bottom to bring up the `Wi-Fi Transfer\
    \ Utility`. You are then prompted to type in either an IP address into your browser\
    \ or a Bonjour address if you use the `Bonjour` service.\n\n    ![images](images/p629-02.jpg)\n\
    \n    ![images](images/2603.jpg)\n\n    **Figure 26–3**. *Linking iPad and a computer\
    \ to upload files*\n\n2.  Type the address shown in the pop-up window from the\
    \ `GoodReader` into a web browser on your computer. Now, you can make your computer\
    \ act as a server. You will see that your computer and iPad are now connected\
    \ (see [Figure 26–3](#Chapter26.html#fig_26_3)).\n3.  Click the `Choose File`\
    \ button inside your web browser on your computer to locate files to upload to\
    \ your iPad.\n4.  Once you have selected the file, click `Upload Selected File`\
    \ and the file will be automatically transferred to your iPad inside `GoodReader`\
    \ (see [Figure 26–4](#Chapter26.html#fig_26_4)).\n\n![images](images/2604.jpg)\n\
    \n**Figure 26–4.** *Uploading a file to your iPad*\n\nWhy is this useful? Well,\
    \ for one of the authors (Gary), the iPad has become a repository for more than\
    \ 300 pieces of piano sheet music. This means no more downloading PDF files, printing\
    \ them out, putting them into binders, and then trying to remember which song\
    \ is in which binder. Now, all his music is catalogued on the iPad. All he has\
    \ to do is put the iPad on the piano, and he has access to all his music in one\
    \ place.\n\n**NOTE:** You can also transfer `Word`, `Excel`, and `PowerPoint`\
    \ files in the same manner. We believe that using the document transfer utility\
    \ in iTunes might make this a bit easier (see [Chapter 19](#Chapter19.html#ch19):\
    \ “Productivity and File Transfer” for more information).\n\nNavigating the `GoodReader`\
    \ app's PDF viewer is quite easy. Tap the center of the screen quickly to bring\
    \ up the onscreen controls. You can then go to your library or touch the `Turn\
    \ Page` icon to turn the page.\n\nThe easiest way to move through pages is simply\
    \ to swipe from right to left on the screen.\n\nYou can also flick up or down\
    \ to turn pages.\n\nTo go to another PDF file or another piece of sheet music,\
    \ just touch the center of the iPad quickly and touch the `My Documents` button\
    \ in the upper-left corner.\n\n![images](images/p632-01.jpg)\n\n#### Connecting\
    \ to Google Docs and Other Servers with GoodReader\n\nYou can also connect to\
    \ `Google Docs` and other servers with `GoodReader`. Follow these steps to do\
    \ so:\n\n1.  In the `Connect to Servers` tab on the right-hand side of the `GoodReader`\
    \ screen, click the `Add` button (see [Figure 26–5](#Chapter26.html#fig_26_5)).\n\
    2.  Select `Google Docs`. You can select from a number of different servers, including\
    \ mail servers, MobileMe iDisk, Public iDisk, Dropbox, box.net, FilesAnywhere.com,\
    \ MyDisk.se, WebDAV Server, and FTP Servers.\n3.  Enter your `Google Docs` username\
    \ and password to log in.\n4.  Once you have made the connection, a new `GoogleDocs\
    \ Server` icon will appear under the `Connect to Server` tab on the right-hand\
    \ side of the page.\n5.  Tap the new `Google` tab to connect to the server. (An\
    \ Internet connection is required to connect.)\n6.  Now you will see a list of\
    \ all the documents you have stored on `Google Docs`. Tap any document and select\
    \ the file type to download it. Usually PDF works well for this.\n7.  Once the\
    \ file is downloaded, it will appear on the left-hand side of `GoodReader`. Simply\
    \ touch the file to open it.\n\n![images](images/2605.jpg)\n\n**Figure 26–5.**\
    \ *Connecting `GoodReader` to other document servers*\n\n## Chapter 27\n\n## Maps\n\
    \nMapping on your iPad, whether you have a 3G+Wi-Fi or a Wi-Fi-only model, is\
    \ pretty amazing. As we explore the power of the `Maps` app in this chapter, you'll\
    \ see how to find your location on the map—even if you're just using Wi-Fi. You'll\
    \ learn how to change views between `Classic`, `Satellite`, `Hybrid`, and `Terrain`.\
    \ You'll also see how, if you need to find out the best route, you can check out\
    \ the traffic and construction view using `Maps`. If you want to find the closest\
    \ pizza restaurant, golf course, or hotel to your destination, that's easy, too.\
    \ And you can use Google's `Street View` right from your iPad to help you get\
    \ to your destination. It is easy to add an address you have mapped to your contacts.\
    \ There's also a digital compass feature that can be quite handy and is fun to\
    \ play with."
