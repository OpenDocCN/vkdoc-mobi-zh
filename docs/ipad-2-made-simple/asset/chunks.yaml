    ### 启动聚焦搜索


    首先启动**聚焦搜索**，它位于**主屏幕**第一页的左侧。


    ![图片](img/p103-01.jpg)


    在第一个圆点（表示**主屏幕**的第一页）的左侧，你可以看到一个非常小的**放大镜**图标。从这第一页图标向右滑动，即可进入**聚焦搜索**页面。


    ![图片](img/p103-02.jpg)


    #### 搜索应用


    使用**聚焦搜索**的一个好方法是快速查找应用。如果你的**主屏幕**超过两到三页，你可能会想用它。启动搜索并输入应用名称的几个字母，例如**天气**。这将找到所有与天气相关的应用。


    ![图片](img/p103-03.jpg)


    #### 搜索网页或维基百科


    如果你确定要搜索网页或维基百科，可以跳过打开**Safari**浏览器并在**搜索**栏中输入信息的步骤。通过跳过进入维基百科网站的步骤，你可以节省更多时间。


    例如，你可能想知道美国邮政编码 10708 的位置。只需在**聚焦搜索**中输入`"10708"`，然后轻点**搜索网页**（见图 -16）。


    ![图片](img/0216.jpg)


    **图 2-16.** *从**聚焦搜索**中搜索网页或维基百科。*


    #### 搜索邮件、通讯录、视频、歌曲、日程等


    **聚焦搜索**的美妙之处在于，它几乎可以搜索 iPad 上的任何内容。你可能想查找联系人、视频、歌曲、日历日程或其他项目。使用起来很简单：只需在**搜索**页面中开始输入即可（见图
    -17）。


    **提示：** 如果你在找人，请输入其全名，以便更精确地只找到与该人相关的项目（例如`"Martin Trautschold"`）。这将会排除 iPad 中所有其他叫
    Martin 的人，确保只找到与 Martin Trautschold 相关的项目。


    在搜索结果中，你会看到搜索找到的所有电子邮件、日程、会议邀请和联系信息。轻点列表中的某个结果即可查看其内容。


    ![图片](img/0217.jpg)


    **图 2-17.** *使用**聚焦搜索**在你的 iPad 上搜索所有类型的内容。*


    你的搜索结果会一直保留，直到你手动清除，因此你可以随时从**主屏幕**向右滑动，再次回到**聚焦搜索**。


    要清除**搜索**栏，只需轻点**搜索**栏中的 **X** 按键。要退出**聚焦搜索**，只需按下**主屏幕**按键或向左滑动。


    #### 自定义聚焦搜索


    有时你可能希望有选择地只搜索特定项目。另一些时候，你可能希望从搜索中移除某些特定项目（例如邮件）。你可以通过调整**设置**应用中的**聚焦搜索**选项来实现。请按照以下步骤操作：


    1.  轻点**设置**图标。

    2.  轻点**通用**。

    3.  轻点右侧栏中的**聚焦搜索**，即可看到此处所示的屏幕。

    4.  轻点任意项目以勾选或取消勾选。

    5.  长按每个项目右侧边缘的图标，在列表中向上或向下拖动。


    ![图片](img/p106-01.jpg)


    ## 第 3 章


    ## 用 iTunes 同步你的 iPad


    在本章中，我们将向你展示如何设置，以便在 iPad 与 Windows 或 Mac 电脑之间同步信息。除了同步功能外，iTunes 还能做更多事情，比如整理音乐、创建播放列表、购买歌曲和视频；它还具备家庭共享和
    Genius 功能。要了解这些功能，请查看第 29 章。


    **注意：** 如果你的电脑或其他地方没有维护日历或通讯录，电脑上也没有照片、视频、音乐、有声读物或图片，你仍然需要将 iPad 连接到电脑上的 iTunes，至少要为
    iPad 进行备份，并在有可用更新时进行软件更新。


    我们还将向你展示同步前需要考虑的事项、如何设置个人信息的自动同步，以及如何手动传输信息。通过 iTunes，你可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、文档和照片库。iTunes
    还有一个额外的好处，那就是只要你将 iPad 连接到电脑，它就会自动备份你的 iPad。如果同步出现问题，我们甚至还会向你展示一些简单的故障排除技巧。最后，我们将向你展示如何检查更新以及为
    iPad 安装更新的操作系统软件。


    **提示：** 如果你是 iTunes 新手，我们强烈建议你查看第 29 章，“你的 iTunes 用户指南”，以帮助你充分利用 iTunes。


    ### 在设置 iTunes 同步之前


    在开始使用 iTunes 同步之前，你需要准备几样东西。我们将介绍先决条件，并回答一些关于为何使用 iTunes 的常见问题。我们还将帮助你了解，如果你拥有其他
    Apple 设备（如 iPhone 或 iPod），并与 iPad 同步时会发生什么。


    #### 同步前的先决条件


    在开始使用 iTunes 同步你的 iPad 之前，你只需要准备好以下几样东西。


    1.  确保你的电脑上安装了最新版本的 iTunes。关于如何安装或更新 iTunes，请参见第 29 章：“你的 iTunes 用户指南”。

    2.  创建一个 iTunes 账户（Apple ID）；请参阅第 29 章中的“创建 iTunes 账户”部分。

    3.  找到 iPad 附带的白色同步线缆。线缆的一端插入 iPad 底部靠近**主屏幕**按键的底座接口，另一端插入电脑的 USB 端口。


    #### 我可以在 iPad 与另一部 iPhone、iPod touch 或 iPod 之间同步 iTunes 吗？


    **可以！** 只要你是同步到同一台电脑，就可以将多个 Apple 设备（Apple 说最多五个，但我们听说有人同步了更多）同步到单台电脑上的同一个 iTunes
    账户。


    **警告：** 你不能将同一部 iPad、iPhone 或 iPod 同步到两台不同的电脑。当你尝试这样做时，会看到类似这样的信息：“是否要擦除此设备（iPad、iPhone、iPod）并重新同步新资料库？”
    如果你选择“是”，那么该设备上的所有音乐和视频都将被抹掉。


    #### 其他同步选项：MobileMe 和 Exchange/Google


    还有其他同步个人信息和电子邮件的方法，例如 Exchange/Google 和 MobileMe，我们将在第 4 章：“其他同步方法”中介绍。然而请记住，即使你选择使用这些其他的同步方式，你仍然需要使用
    iTunes 来：


    *   备份和恢复你的 iPad。

    *   更新 iPad 操作系统软件。

    *   同步和管理你的应用程序，也称为“应用”。

    *   同步你的音乐资料库和播放列表。

    *   同步电影、电视节目、播客和 iTunes U 内容。

    *   同步图书。

    *   同步照片。


    #### 考虑其他同步选项


    表 3–1 总结了你的其他同步选项。你选择使用哪种同步方式，应该取决于你当前存储电子邮件、通讯录和日历的地方——也就是你的使用环境。


    **注意：** 正如你在表 3–1 中所见，在某些环境下，你可以将通讯录和日历无线同步到你的 iPad。


    ![图片](img/p109-01.jpg)


    ![图片](img/p110-01.jpg)


    ### 设置你的 iTunes 同步


    我们将向你展示使用 iTunes 对 iPad 执行自动同步和手动传输信息的所有步骤。

