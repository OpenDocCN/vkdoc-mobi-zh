  trans: "\n#### 同步功能的全新开始\n\n有时你会遇到同步问题，只需重新开始即可。在 iTunes 中，你可以采取以下措施：清除或重置同步历史记录，让\
    \ iTunes 认为它是第一次与你的 iPad 同步；你也可以强制 iPad 上的所有信息被电脑上的信息所替换。\n\n##### 重置同步历史记录（让\
    \ iTunes 认为它正在首次同步）\n\n要在 iTunes 中重置同步历史记录，请按以下步骤操作：\n\n1.  选择**编辑**菜单，然后点击**偏好设置**。\n\
    2.  在 iTunes 偏好设置窗口顶部，点击**设备**选项卡。\n3.  点击底部的**重置同步历史记录**按钮，如图 3–8 所示。\n4.  在弹出的窗口中点击**重置同步历史记录**以确认你的选择。\n\
    \n![图片](img/0308.jpg)\n\n**图 3–8.** *在 iTunes 中重置同步历史记录*\n\n##### 替换 iPad 上的所有信息（仅限下一次同步）\n\
    \n有时你可能需要让 iPad 上的信息焕然一新。无论出于何种原因，你想清除 iPad 上一个或所有已同步应用中的信息，然后重新开始。请按以下步骤操作：\n\
    \n1.  与之前设置同步一样，将 iPad 连接到电脑，启动 iTunes，在左侧导航栏中点击你的**iPad**，然后在主窗口顶部点击**信息**选项卡。\n\
    2.  向下滚动到底部的**高级**区域（参见图 3–9）。\n3.  根据需要勾选一个、几个或所有复选框。\n\n    ![图片](img/0309.jpg)\n\
    \n    **图 3–9.** *在高级区域中，选择你要替换的信息。*\n\n4.  准备就绪后，点击右下角的**应用**按钮。同步应立即开始。你勾选的应用的所有信息将从\
    \ iPad 中删除，并替换为电脑中的信息。\n\n### 应用：同步与管理\n\n通过 iTunes，你可以同步和管理 iPad 上的应用。你可以轻松地在某个特定**主**屏幕页面上拖放应用图标，甚至可以在\
    \ iPad 的页面之间拖放。\n\n#### 在 iTunes 中同步应用\n\n请按以下步骤同步和管理应用：\n\n1.  与之前设置同步一样，将 iPad\
    \ 连接到电脑，启动 iTunes，在左侧导航栏中点击你的**iPad**。\n2.  点击主窗口顶部的**应用**选项卡。\n3.  勾选**同步应用**复选框，即可查看存储在\
    \ iPad 上的所有应用以及你的**主**屏幕，如图 3–10 所示。\n\n![图片](img/0310.jpg)\n\n**图 3–10.** *iTunes\
    \ 中的同步应用屏幕*\n\n#### 移动应用、处理文件夹或删除应用图标\n\n在此 iTunes 屏幕中，你可以轻松移动并整理应用图标。\n\n**在屏幕内移动应用：**\
    \ 点击它并将其在屏幕内拖拽。\n\n**在主屏幕页面之间移动应用：** 点击并将其拖拽到右栏中的新页面。该新页面会展开；将其放到新页面上。\n\n**将应用停靠到底部程序坞：**\
    \ 如果已有六个图标，请先移除一个。然后点击并将图标拖拽到程序坞上。\n\n| **移除图标：** 将鼠标悬停在其上，看到 X 后点击该 X。**注意：你无法移除通讯录、设置、Safari\
    \ 浏览器和其他预装的核心图标。** | ![图片](img/p123-01.jpg) |\n| **创建新文件夹：** 将一个图标拖拽到另一个图标上。**将应用移入现有文件夹：**\
    \ 将图标拖拽到文件夹图标上。**将应用移出文件夹：** 点击文件夹以将其打开。然后将图标拖拽到文件夹外部。**查看另一个主屏幕页面：** 在右栏中点击该页面。**删除文件夹：**\
    \ 从该文件夹中移除所有应用（将它们拖出），文件夹便会消失。 | ![图片](img/p124-01.jpg) |\n\n#### 移除与重新安装应用\n\n\
    要从 iPad 上移除应用，只需取消勾选它旁边的复选框并确认你的选择，如图 3–11 所示。无需担心——由于你在 iTunes 中将应用同步到了电脑，你在\
    \ iTunes 中仍然保留着一份应用副本。\n\n![图片](img/0311.jpg)\n\n**图 3–11.** *取消勾选应用以将其从 iPad\
    \ 中删除*\n\n**提示**：即使你从 iPad 上删除了某个应用，只要你已按图示选择同步应用，你仍可通过重新勾选其旁边的复选框来重新安装该应用。该应用将在下一次同步期间重新加载到你的\
    \ iPad 上。\n"
- fmt: "#### Getting Downloaded Items into iTunes to Sync Them\n\nIf you buy or download\
    \ content from the `iBookstore`, `iTunes store`, or `App Store` within `iTunes`,\
    \ it automatically appears in your own `iTunes` library. But how do you get content\
    \ that you have downloaded from the Web into `iTunes`? (It does not automatically\
    \ appear in `iTunes`.) What happens if something you downloaded is compressed\
    \ in a `.zip` file, like an audiobooks? In this section, we help you understand\
    \ the basic steps of downloading content from the Web to your computer and then\
    \ getting it into `iTunes` so you can sync it to your `iPad`.\n\n**TIP**: You\
    \ can also find great audiobooks (both free and paid) from `Audible.com`.\n\n\
    ##### Step 1: Download the content to your computer\n\n| Go to the web site where\
    \ you want to download content. In this case, we want a free audiobook from [`http://librivox.org`](http://librivox.org).\
    \ We have searched for titles by Mark Twain and want to download the entire set\
    \ of chapters for *Roughing It*. Click the link `Zip file of the entire book`\
    \ in the left column of links. (This 488 MB file will take you between 15 minutes\
    \ and 4 hours to download depending on the speed of your Internet connection.)\
    \ | ![images](images/p125-01.jpg) |\n\n##### Step 2: Unzip the file, if necessary\n\
    \n| Next, locate the file you just downloaded. It will usually be in your `Downloads`\
    \ folder. Unzip or uncompress all the files. | ![images](images/p125-02.jpg) |\n\
    | ![images](images/p126-01.jpg) This unzipping process will vary depending on\
    \ what software you have installed on your PC or Mac. However, it usually involves\
    \ double-clicking to open the zip file. Then select `Unzip`, `Unzip All`, `Extract`,\
    \ or `Extract All`. Most often, all these files will be unzipped either directly\
    \ into the `Downloads` folder, or a folder within the `Downloads` folder with\
    \ the name of the zip file. | ![images](images/p126-02.jpg) |\n\n##### Step 3:\
    \ Drag and drop the content into iTunes\n\n| Next, locate the files you extracted\
    \ and highlight them all. You can select all files in a list by holding the `Shift`\
    \ key on your computer keyboard and clicking the top file and then the bottom\
    \ file in the list. Then, drag the entire highlighted list over to `iTunes` and\
    \ drop it on your library in the top of the left column. You can also use the\
    \ `File` ![images](images/U001.jpg) `Add File to Library` menu command instead\
    \ of the drag-and-drop method. | ![images](images/p126-03.jpg) |\n\n##### Step\
    \ 4: Select content to sync to your device\n\nUse the steps shown in the sections\
    \ later in this chapter to sync the downloaded content to your `iPad`.\n\n#####\
    \ How to make sure an Audiobook shows up as an Audiobook (not music)\n\n**TIP:**\
    \ Some audiobook files appear in your `Music` library. Here's how to correct this.\
    \ If you downloaded a free audiobook from `Librivox.org`, then the audiobook will\
    \ probably appear in your `Music` library, but you can change this. In order to\
    \ put the files into the correct `Audiobook` library, perform the steps listed\
    \ below.\n\n1.  View your audio books in Album view to easily select all chapters\
    \ or parts at once.\n2.  Then right-click on the audiobook album cover and select\
    \ `Get Info` or press the shortcut keys `Command + I` (Mac) or `Control + I` (PC).\
    \ Say `Yes` to the warning pop-up about edit information for multiple items, if\
    \ you see it.\n3.  Click on the `Options` tab on the top of the `Multiple Item\
    \ Information` window.\n4.  Click the checkbox next to `Media Kind` and select\
    \ `Audiobook`. (See image above.)\n\n| ![images](images/p127-01.jpg) |\n\n###\
    \ File Sharing (File Transfer) Between Your iPad and Your Computer\n\nAs long\
    \ as you have an app installed that works with files, such as `GoodReader` or\
    \ `Stanza`, you can use `iTunes` to transfer files between your computer and your\
    \ `iPad`. You perform this file transfer using the bottom of the `Apps` tab in\
    \ `iTunes`—below all the application icon screens.\n\n**TIP**: Some apps, such\
    \ as `GoodReader`, come with wireless methods for transferring and sharing files.\
    \ Check out the `GoodReader` section in [Chapter 27](#Chapter27.html#ch27): “New\
    \ Media: Reading Newspapers, Magazines, and More” for more information.\n\n####\
    \ Copying Files from Your Computer to Your iPad\n\nTo copy files from your computer\
    \ to your `iPad`, follow these steps:\n\n1.  As you did to set up the previous\
    \ sync, connect your `iPad` to your computer, start `iTunes`, and click your `iPad`\
    \ in the left nav bar.\n2.  Click the `Apps` tab on the top of the main window.\n\
    3.  Scroll down to the `File Sharing` section below the apps, as shown in [Figure\
    \ 3–12](#Chapter03.html#fig_3_12).\n\n    ![images](images/0312.jpg)\n\n    **Figure\
    \ 3–12.** *Transferring files to your iPad*\n\n4.  Click any app in the left column,\
    \ and then click the `Add` button in the lower-right corner.\n5.  A window will\
    \ pop up. Select a file to transfer and click the `Open` button. The file will\
    \ be transferred immediately to your `iPad`.\n\n#### Copying Files from Your iPad\
    \ to Your Computer\n\nTo copy files from your `iPad` to your computer, follow\
    \ these steps:\n\n1.  Connect your `iPad` to your computer, start `iTunes`, and\
    \ click your `iPad` in the left nav bar.\n2.  Click the `Apps` tab at the top\
    \ of the main window.\n3.  Scroll down to the `File Sharing` section below the\
    \ apps (see [Figure 3–13](#Chapter03.html#fig_3_13)).\n\n    ![images](images/0313.jpg)\n\
    \n    **Figure 3–13.** *Transferring files from your iPad*\n\n4.  Click any app\
    \ from which you want to transfer the files in the left column.\n5.  Select one\
    \ or several files using any of these methods:\n    1.  Click a single file.\n\
    \    2.  Hold the `Control` key (Windows) or `Option` key (Mac) and click any\
    \ number of files.\n    3.  Hold the `Shift` key and click the top and bottom\
    \ file in a list to select all files in that list.\n6.  After the file(s) are\
    \ selected, click the `Save To` button in the lower-right corner.\n7.  A window\
    \ will pop up asking you to select a folder on your computer to receive the files\
    \ from your `iPad`. Locate and click the folder, and then click the `Select Folder`\
    \ button. The file(s) will be transferred immediately to your computer.\n\n###\
    \ Syncing Media and More\n\nNow let's look at how to set up an automatic sync\
    \ for music, movies, `iBooks`, `iTunes U` content, and more.\n\n**CAUTION**: Make\
    \ sure you're logged into `iTunes` with the same `iTunes` account you want to\
    \ use on your `iPad`, as Digital Rights Management (`DRM`)–protected content (music,\
    \ videos, and more) won't sync unless both accounts match. You can logout and\
    \ log in to `iTunes` on both your desktop and your `iPad` to make sure you are\
    \ logged into the right accounts.\n\n#### Keeping an Eye on Capacity (Available\
    \ Space)\n\nAs you begin to select ringtones, music, videos, books, podcasts,\
    \ and more to sync, you will want to keep an eye on the capacity bar at the bottom\
    \ of each of the `iTunes` sync screens. If you see that you are nearing or exceeding\
    \ capacity with any of your selections, you know you need to make a few adjustments.\
    \ Sometimes you just can't take it all with you! [Figure 3–14](#Chapter03.html#fig_3_14)\
    \ shows that we currently have 15.6 GB (gigabytes) free on our `iPad` for more\
    \ content—so we have plenty of free space.\n\n![images](images/0314.jpg)\n\n**Figure\
    \ 3–14.** *Watch the free space available as you make sync selections in iTunes*"
  raw: "#### Getting Downloaded Items into iTunes to Sync Them\n\nIf you buy or download\
    \ content from the iBookstore, iTunes store, or App Store within iTunes, it automatically\
    \ appears in your own iTunes library. But how do you get content that you have\
    \ downloaded from the Web into iTunes? (It does not automatically appear in iTunes.)\
    \ What happens if something you downloaded is compressed in a .zip file, like\
    \ an audiobooks? In this section, we help you understand the basic steps of downloading\
    \ content from the Web to your computer and then getting it into iTunes so you\
    \ can sync it to your iPad.\n\n**TIP**: You can also find great audiobooks (both\
    \ free and paid) from **Audible.com.**\n\n##### Step 1: Download the content to\
    \ your computer\n\n| Go to the web site where you want to download content. In\
    \ this case, we want a free audiobook from [`http://librivox.org`](http://librivox.org).\
    \ We have searched for titles by Mark Twain and want to download the entire set\
    \ of chapters for *Roughing It*.Click the link **Zip file of the entire book**\
    \ in the left column of links. (This 488 MB file will take you between 15 minutes\
    \ and 4 hours to download depending on the speed of your Internet connection.)\
    \ | ![images](images/p125-01.jpg) |\n\n##### Step 2: Unzip the file, if necessary\n\
    \n| Next, locate the file you just downloaded. It will usually be in your Downloads\
    \ folder. Unzip or uncompress all the files. | ![images](images/p125-02.jpg) |\n\
    | ![images](images/p126-01.jpg)This unzipping process will vary depending on what\
    \ software you have installed on your PC or Mac. However, it usually involves\
    \ double-clicking to open the zip file. Then select **Unzip**, **Unzip All**,\
    \ **Extract**, or **Extract All**. Most often, all these files will be unzipped\
    \ either directly into the **Downloads** folder, or a folder within the **Downloads**\
    \ folder with the name of the zip file. | ![images](images/p126-02.jpg) |\n\n\
    ##### Step 3: Drag and drop the content into iTunes\n\n| Next, locate the files\
    \ you extracted and highlight them all. You can select all files in a list by\
    \ holding the Shift key on your computer keyboard and clicking the top file and\
    \ then the bottom file in the list.Then, drag the entire highlighted list over\
    \ to iTunes and drop it on your library in the top of the left column. You can\
    \ also use the File ![images](images/U001.jpg) Add File to Library menu command\
    \ instead of the drag-and-drop method. | ![images](images/p126-03.jpg) |\n\n#####\
    \ Step 4: Select content to sync to your device\n\nUse the steps shown in the\
    \ sections later in this chapter to sync the downloaded content to your iPad.\n\
    \n##### How to make sure an Audiobook shows up as an Audiobook (not music)\n\n\
    | **TIP:** some audiobook files appear in your Music Library. Here's how to correct\
    \ this.If you downloaded a free audiobook from Librivox.org, then the audiobook\
    \ will probably appear in your **Music** library, but you can change this. In\
    \ order to put the files into the correct **Audiobook** library, perform the steps\
    \ listed below. \n1.  View your audio books in Album view to easily select all\
    \ chapters or parts at once.\n2.  Then right-click on the audiobook album cover\
    \ and select **Get Info** or press the shortcut keys **Command + I** (Mac) or\
    \ **Control + I** (PC). Say **Yes** to the warning pop-up about edit information\
    \ for multiple items, if you see it.\n3.  Click on the **Options** tab on the\
    \ top of the **Multiple Item Information** window.\n4.  Click the checkbox next\
    \ to **Media Kind** and select **Audiobook**. (See image above.)\n\n | ![images](images/p127-01.jpg)\
    \ |\n\n### File Sharing (File Transfer) Between Your iPad and Your Computer\n\n\
    As long as you have an app installed that works with files, such as GoodReader\
    \ or Stanza, you can use iTunes to transfer files between your computer and your\
    \ iPad. You perform this file transfer using the bottom of the **Apps** tab in\
    \ iTunes—below all the application icon screens.\n\n**TIP**: Some apps, such as\
    \ GoodReader, come with wireless methods for transferring and sharing files. Check\
    \ out the GoodReader section in [Chapter 27](#Chapter27.html#ch27): “New Media:\
    \ Reading Newspapers, Magazines, and More” for more information.\n\n#### Copying\
    \ Files from Your Computer to Your iPad\n\nTo copy files from your computer to\
    \ your iPad, follow these steps:\n\n1.  As you did to set up the previous sync,\
    \ connect your iPad to your computer, start iTunes, and click your **iPad** in\
    \ the left nav bar.\n2.  Click the **Apps** tab on the top of the main window.\n\
    3.  Scroll down to the **File Sharing** section below the apps, as shown in [Figure\
    \ 3–12](#Chapter03.html#fig_3_12).\n\n    ![images](images/0312.jpg)\n\n    **Figure\
    \ 3–12.** *Transferring files to your iPad*\n\n4.  Click any app in the left column,\
    \ and then click the **Add** button in the lower-right corner.\n5.  A window will\
    \ pop up. Select a file to transfer and click the **Open** button. The file will\
    \ be transferred immediately to your iPad.\n\n#### Copying Files from Your iPad\
    \ to Your Computer\n\nTo copy files from your iPad to your computer, follow these\
    \ steps:\n\n1.  Connect your iPad to your computer, start iTunes, and click your\
    \ **iPad** in the left nav bar.\n2.  Click the **Apps** tab at the top of the\
    \ main window.\n3.  Scroll down to the **File Sharing** section below the apps\
    \ (see [Figure 3–13](#Chapter03.html#fig_3_13)).\n\n    ![images](images/0313.jpg)\n\
    \n    **Figure 3–13.** *Transferring files from your iPad*\n\n4.  Click any app\
    \ from which you want to transfer the files in the left column.\n5.  Select one\
    \ or several files using any of these methods:\n    1.  Click a single file.\n\
    \    2.  Hold the **Control** key (Windows) or **Option** key (Mac) and click\
    \ any number of files.\n    3.  Hold the **Shift** key and click the top and bottom\
    \ file in a list to select all files in that list.\n6.  After the file(s) are\
    \ selected, click the **Save To** button in the lower-right corner.\n7.  A window\
    \ will pop up asking you to select a folder on your computer to receive the files\
    \ from your iPad. Locate and click the folder, and then click the **Select Folder**\
    \ button. The file(s) will be transferred immediately to your computer.\n\n###\
    \ Syncing Media and More\n\nNow let's look at how to set up an automatic sync\
    \ for music, movies, iBooks, iTunes U content, and more.\n\n**CAUTION**: Make\
    \ sure you're logged into iTunes with the same iTunes account you want to use\
    \ on your iPad, as Digital Rights Management (DRM)–protected content (music, videos,\
    \ and more) won't sync unless both accounts match. You can logout and log in to\
    \ iTunes on both your desktop and youriPad to make sure you arelogged into the\
    \ right accounts.\n\n#### Keeping an Eye on Capacity (Available Space)\n\nAs you\
    \ begin to select ringtones, music, videos, books, podcasts, and more to sync,\
    \ you will want to keep an eye on the capacity bar at the bottom of each of the\
    \ iTunes sync screens. If you see that you are nearing or exceeding capacity with\
    \ any of your selections, you know you need to make a few adjustments. Sometimes\
    \ you just can't take it all with you! [Figure 3–14](#Chapter03.html#fig_3_14)\
    \ shows that we currently have 15.6 GB (gigabytes) free on our iPad for more content—so\
    \ we have plenty of free space.\n\n![images](images/0314.jpg)\n\n**Figure 3–14.**\
    \ *Watch the free space available as you make sync selections in iTunes*"
  trans: "\n#### 将下载的内容导入 iTunes 进行同步\n\n如果在 `iTunes` 内从 `iBookstore`、`iTunes Store`\
    \ 或 `App Store` 购买或下载内容，这些内容会自动出现在你的 `iTunes` 资料库中。但如何将从网络下载的内容导入 `iTunes` 呢？（它们不会自动出现在\
    \ `iTunes` 中。）如果下载的内容是压缩文件（如有声书 `.zip` 文件），该怎么办？在本节中，我们将帮助你了解从网络下载内容到电脑，再将其导入\
    \ `iTunes`，以便同步到 `iPad` 的基本步骤。\n\n**提示**: 你还可以从 `Audible.com` 找到很棒的免费和付费有声书。\n\
    \n##### 第 1 步：将内容下载到电脑\n\n| 访问想要下载内容的网站。本例中，我们要从 [`http://librivox.org`](http://librivox.org)\
    \ 下载一本免费有声书。我们搜索了马克·吐温的作品，并希望下载《苦行记》*Roughing It* 的全套章节。点击左侧链接栏中的 `整本书的 Zip 文件`\
    \ 链接。（这个 488 MB 的文件根据你的网速需要 15 分钟到 4 小时完成下载。） | ![images](img/p125-01.jpg) |\n\
    \n##### 第 2 步：必要时解压文件\n\n| 接下来，找到刚下载的文件。它通常位于你的 `Downloads` 文件夹中。解压所有文件。 | ![images](img/p125-02.jpg)\
    \ |\n| ![images](img/p126-01.jpg) 解压过程因电脑或 Mac 上安装的软件而异。但通常只需双击打开 zip 文件。然后选择\
    \ `Unzip`、`Unzip All`、`Extract` 或 `Extract All`。大多数情况下，这些文件会直接解压到 `Downloads`\
    \ 文件夹，或 `Downloads` 文件夹中一个以 zip 文件命名的子文件夹内。 | ![images](img/p126-02.jpg) |\n\n\
    ##### 第 3 步：将内容拖拽到 iTunes\n\n| 接下来，找到解压后的文件并全部选中。可以按住键盘上的 `Shift` 键，先点击列表中的第一个文件，再点击最后一个文件，即可选中列表中的所有文件。然后，将整个高亮列表拖拽到\
    \ `iTunes` 左侧栏顶部的资料库上释放。也可以使用 `文件` ![images](img/U001.jpg) `将文件添加到资料库` 菜单命令来代替拖放操作。\
    \ | ![images](img/p126-03.jpg) |\n\n##### 第 4 步：选择要同步到设备的内容\n\n按照本章后续小节中的步骤，将下载的内容同步到\
    \ `iPad`。\n\n##### 如何确保有声书显示为有声书（而非音乐）\n\n**提示：** 某些有声书文件会出现在你的 `音乐` 资料库中。以下是修正方法。如果你从\
    \ `Librivox.org` 下载了免费有声书，它可能出现在 `音乐` 资料库中，但你可以更改这一设置。要将其放入正确的 `有声书` 资料库，请执行以下步骤。\n\
    \n1.  用专辑视图查看有声书，以便轻松一次选中所有章节或部分。\n2.  然后右键点击有声书专辑封面，选择 `显示简介`，或按快捷键 `Command\
    \ + I`（Mac）或 `Control + I`（PC）。如果看到关于编辑多个项目信息的警告弹窗，点击 `是`。\n3.  点击 `多个项目简介` 窗口顶部的\
    \ `选项` 标签。\n4.  勾选 `媒体种类` 旁的复选框，并选择 `有声书`。（见上图。）\n\n| ![images](img/p127-01.jpg)\
    \ |\n\n### iPad 与电脑之间的文件共享（文件传输）\n\n只要安装了支持文件的应用（如 `GoodReader` 或 `Stanza`），就可以使用\
    \ `iTunes` 在电脑和 `iPad` 之间传输文件。文件传输通过 `iTunes` 中 `App` 标签页底部（所有应用图标屏幕下方）进行。\n\n\
    **提示**：某些应用（如 `GoodReader`）自带无线传输和共享文件的方法。有关更多信息，请查看第 27 章：“新媒体：阅读报纸、杂志等”中的 `GoodReader`\
    \ 部分。\n\n#### 将文件从电脑复制到 iPad\n\n要将文件从电脑复制到 `iPad`，请按以下步骤操作：\n\n1.  如同设置之前的同步一样，将\
    \ `iPad` 连接到电脑，启动 `iTunes`，然后点击左侧导航栏中的 `iPad`。\n2.  点击主窗口顶部的 `App` 标签。\n3.  向下滚动到应用下方的\
    \ `文件共享` 部分，如图 3–12 所示。\n\n    ![images](img/0312.jpg)\n\n    **图 3–12.** *将文件传输到\
    \ iPad*\n\n4.  点击左侧栏中的任意应用，然后点击右下角的 `添加` 按钮。\n5.  弹出一个窗口。选择要传输的文件并点击 `打开`。文件将立即传输到你的\
    \ `iPad`。\n\n#### 将文件从 iPad 复制到电脑\n\n要将文件从 `iPad` 复制到电脑，请按以下步骤操作：\n\n1.  将 `iPad`\
    \ 连接到电脑，启动 `iTunes`，然后点击左侧导航栏中的 `iPad`。\n2.  点击主窗口顶部的 `App` 标签。\n3.  向下滚动到应用下方的\
    \ `文件共享` 部分（见图 3–13）。\n\n    ![images](img/0313.jpg)\n\n    **图 3–13.** *从 iPad\
    \ 传输文件*\n\n4.  点击左侧栏中要传输文件的应用。\n5.  使用以下任意方法选择一个或多个文件：\n    1.  单击单个文件。\n    2.\
    \  按住 `Control` 键（Windows）或 `Option` 键（Mac），再单击多个文件。\n    3.  按住 `Shift` 键，点击列表中的第一个和最后一个文件，以选中该列表中的所有文件。\n\
    6.  选中文件后，点击右下角的 `存储到` 按钮。\n7.  弹出一个窗口，要求你在电脑上选择一个文件夹来接收来自 `iPad` 的文件。找到并点击该文件夹，然后点击\
    \ `选择文件夹`。文件将立即传输到你的电脑。\n\n### 同步媒体及其他内容\n\n现在来看看如何为音乐、电影、`iBooks`、`iTunes U`\
    \ 等内容设置自动同步。\n\n**注意**：请确保你在 `iTunes` 中登录的账号与 `iPad` 上使用的 `iTunes` 账号一致，因为受数字版权管理（`DRM`）保护的内容（音乐、视频等）只有在账号匹配时才能同步。你可以在电脑和\
    \ `iPad` 上分别退出并重新登录 `iTunes`，以确保登录了正确的账号。\n\n#### 关注容量（可用空间）\n\n当开始选择要同步的铃声、音乐、视频、图书、播客等内容时，请留意每个\
    \ `iTunes` 同步屏幕底部的容量条。如果发现任何选择已接近或超出容量，就需要做出调整。有时你无法将所有内容都带走！图 3–14 显示我们的 `iPad`\
    \ 上目前还有 15.6 GB（吉字节）可用空间——所以空间很充裕。\n\n![images](img/0314.jpg)\n\n**图 3–14.** *在\
    \ iTunes 中进行同步选择时，注意可用空间*\n"
- fmt: "### Syncing Ringtones\n\nWhen you click the `Ringtones` tab, you can choose\
    \ to sync your entire ringtone library or selected items. Ringtones are used for\
    \ `FaceTime` calls on the iPad.\n\n1. Connect your iPad to your computer, start\
    \ iTunes, and click your `iPad` in the left nav bar.\n2. Click the `Ringtones`\
    \ tab at the top of the main window.\n3. Check the `Sync Ringtones` box, shown\
    \ to the right.\n4. The default is to sync all ringtones. To sync only specific\
    \ ones, click the radio button next to `Selected ringtones`.\n5. When you are\
    \ done with your selections, click the `Apply` button to start the ringtone sync.\n\
    \n| ![images](images/p131-01.jpg) |\n\n**TIP**: Learn how to assign ringtones\
    \ to your contacts, purchase custom ringtones, and create your own ringtones from\
    \ your music in [Chapter 18](#Chapter18.html#ch18): “FaceTime Video Messaging\
    \ and Skype.”\n\n### Syncing Music\n\nWhen you click the `Music` tab, you can\
    \ choose to sync your entire music library or selected items.\n\n**CAUTION**:\
    \ If you have manually transferred some music, music videos, or voice memos to\
    \ your iPad already, you'll receive a warning message that all existing content\
    \ on your iPad will be removed and replaced with the selected music library from\
    \ your computer.\n\nTo sync music from your computer to your iPad, follow these\
    \ steps:\n\n1. Connect your iPad to your computer, start iTunes, and click your\
    \ `iPad` in the left nav bar.\n2. Click the `Music` tab on the top of the main\
    \ window.\n3. Check the `Sync Music` box (see [Figure 3–15](#Chapter03.html#fig_3_15)).\n\
    4. Click next to `Entire music library` only if you are *sure* your music library\
    \ will not be too large for your iPad.\n5. Click next to `Selected playlists,\
    \ artists, and genres` if you are unsure whether your music library is too large,\
    \ or if you want to sync only specific playlists or artists.\n6. You can choose\
    \ whether to include music videos and voice memos by checking those boxes.\n7.\
    \ You can also automatically fill free space with songs.\n\n    **CAUTION**: We\
    \ don't recommend checking this option because it will take up all the space in\
    \ your iPad and leave no room for all those cool apps!\n\n8. Now check off any\
    \ of the playlists or artists in the two columns on the bottom of the screen.\
    \ You can even use the search box at the top of the `Artists` column to search\
    \ for particular artists.\n\n![images](images/0315.jpg)\n\n**Figure 3–15.** *Syncing\
    \ music with your iPad*\n\n### Syncing Movies\n\nWhen you click the `Movies` tab,\
    \ you can choose to sync specific, recent, or unwatched movies, or all of them.\n\
    \nTo sync movies from your computer to your iPad, follow these steps:\n\n1. Connect\
    \ your iPad to your computer, start iTunes, and click your `iPad` in the left\
    \ nav bar.\n2. Click the `Movies` tab on the top of the main window.\n3. Check\
    \ the `Sync Movies` box (see [Figure 3–16](#Chapter03.html#fig_3_16)).\n4. If\
    \ you'd like to sync recent or unwatched movies, check the `Automatically include`\
    \ box and use the pull-down to select `All, 1 most recent, All unwatched, 5 most\
    \ recent unwatched`, etc.\n\n    ![images](images/0316.jpg)\n\n    **Figure 3–16.**\
    \ *Configuring movie sync to automatically include selections*\n\n5. If you selected\
    \ any item besides `All`, you have the choice to sync specific movies or videos\
    \ to your iPad. Simply check the boxes next to the movies you want to include\
    \ in the sync.\n\n### Syncing TV Shows\n\nWhen you click the `TV Shows` tab, you\
    \ can choose to sync specific, recent, or unwatched TV shows, or all of them.\n\
    \nTo sync TV shows from your computer to your iPad, follow these steps:\n\n1.\
    \ Connect your iPad to your computer, start iTunes, and click your `iPad` in the\
    \ left nav bar.\n2. Click the `TV Shows` tab on the top of the main window.\n\
    3. Check the `Sync TV Shows` box (see [Figure 3–17](#Chapter03.html#fig_3_17)).\n\
    4. If you'd like to sync recent or unwatched TV shows, check the `Automatically\
    \ include` box and use the pull-down to select `All, 1 newest, All unwatched,\
    \ 5 oldest unwatched`, `10 newest unwatched`, etc.\n\n    ![images](images/0317.jpg)\n\
    \n    **Figure 3–17.** *Configuring TV show sync to automatically include selections*\n\
    \n5. Choose `all Shows` or `selected Shows` next to `episodes of`.\n6. If you\
    \ choose `Selected Shows`, you can choose individual shows and even individual\
    \ episodes in the two sections in the middle of the screen.\n7. If you have playlists\
    \ of TV shows, you can select those for inclusion by checking the boxes in the\
    \ bottom section of the screen.\n\n### Syncing Podcasts\n\nWhen you click the\
    \ `Podcasts` tab, you can choose to sync specific, recent, or unplayed podcasts,\
    \ or all of them.\n\n**TIP**: Podcasts are audio or video shows that are usually\
    \ regularly scheduled (e.g., daily, weekly, or monthly). Most are free to subscribe\
    \ to in the iTunes store. When you subscribe and set up the auto sync as shown\
    \ in this section, you'll receive all your favorite podcasts on your iPad.\n\n\
    Many of your favorite radio shows are recorded and broadcast as podcasts. We encourage\
    \ you to check out the `Podcast` section of the iTunes store to see what might\
    \ interest you. You'll find podcasts of movie reviews, news shows, law school\
    \ test reviews, game shows, old radio shows, educational content, and much more.\n\
    \nTo sync podcasts from your computer to your iPad, follow these steps:\n\n1.\
    \ Connect your iPad to your computer, start iTunes, and click your `iPad` in the\
    \ left nav bar.\n2. Click the `Podcasts` tab on the top of the main window.\n\
    3. Check the `Sync Podcasts` box (see [Figure 3–18](#Chapter03.html#fig_3_18)).\n\
    4. If you'd like to sync recent or unplayed podcasts, check the `Automatically\
    \ include` box and use the pull-down to select `All, 1 newest, All unplayed, 5\
    \ newest`, `10 most recent unplayed`, etc.\n\n    ![images](images/0318.jpg)\n\
    \n    **Figure 3–18.** *Configuring podcast sync to automatically include selections*\n\
    \n5. Choose `All Podcasts` or `Selected Podcasts` next to `episodes of`.\n6. If\
    \ you choose `Selected Podcasts`, you can choose individual podcasts and even\
    \ individual episodes in the two sections in the middle of the screen.\n7. If\
    \ you have playlists of podcasts, you can select those for inclusion by checking\
    \ the boxes in the bottom section of the screen.\n\n**TIP**: After you sync these\
    \ podcasts, you can enjoy them in the `Podcasts` section of the `Music` app on\
    \ your device."
  raw: "#### Syncing Ringtones\n\nWhen you click the **Ringtones** tab, you can choose\
    \ to sync your entire ringtone library or selected items. Ringtones are used for\
    \ **FaceTime** calls on the iPad.\n\n|  \n1.  Connect your iPad to your computer,\
    \ start iTunes, and click your **iPad** in the left nav bar.\n2.  Click the **Ringtones**\
    \ tabat the top of the main window.\n3.  Check the **Sync Ringtones** box, shown\
    \ to the right.\n4.  The default is to sync all ringtones. To sync only specific\
    \ ones, click the radio button next to **Selected ringtones**.\n5.  When you are\
    \ done with your selections, click the **Apply** button to start the ringtone\
    \ sync.\n\n | ![images](images/p131-01.jpg) |\n\n**TIP**: Learn how to assign\
    \ ringtones to your contacts, purchase custom ringtones, and create your own ringtones\
    \ from your music in [Chapter 18](#Chapter18.html#ch18): “FaceTime Video Messaging\
    \ and Skype.”\n\n#### Syncing Music\n\nWhen you click the **Music** tab, you can\
    \ choose to sync your entire music library or selected items.\n\n**CAUTION**:\
    \ If you have manually transferred some music, music videos, or voice memos to\
    \ your iPad already, you'll receive a warning message that all existing content\
    \ on your iPad will be removed and replaced with the selected music library from\
    \ your computer.\n\nTo sync music from your computer to your iPad, follow these\
    \ steps:\n\n1.  Connect your iPad to your computer, start iTunes, and click your\
    \ **iPad** in the left nav bar.\n2.  Click the **Music** tab on the top of the\
    \ main window.\n3.  Check the **Sync Music** box (see [Figure 3–15](#Chapter03.html#fig_3_15)).\n\
    4.  Click next to **Entire music library** only if you are *sure* your music library\
    \ will not be too large for your iPad.\n5.  Click next to **Selected playlists,\
    \ artists, and genres** if you are unsure whether your music library is too large,\
    \ or if you want to sync only specific playlists or artists.\n6.  You can choose\
    \ whether to include music videos and voice memos by checking those boxes.\n7.\
    \  You can also automatically fill free space with songs.\n\n    **CAUTION**:\
    \ We don't recommend checking this option because it will take up all the space\
    \ in your iPad and leave no room for all those cool apps!\n\n8.  Now check off\
    \ any of the playlists or artists in the two columns on the bottom of the screen.\
    \ You can even use the search box at the top of the **Artists** column to search\
    \ for particular artists.\n\n![images](images/0315.jpg)\n\n**Figure 3–15.** *Syncing\
    \ music with your iPad*\n\n#### Syncing Movies\n\nWhen you click the **Movies**\
    \ tab, you can choose to sync specific, recent, or unwatched movies, or all of\
    \ them.\n\nTo sync movies from your computer to your iPad, follow these steps:\n\
    \n1.  Connect your iPad to your computer, start iTunes, and click your **iPad**\
    \ in the left nav bar.\n2.  Click the **Movies** tab on the top of the main window.\n\
    3.  Check the **Sync Movies** box (see [Figure 3–16](#Chapter03.html#fig_3_16)).\n\
    4.  If you'd like to sync recent or unwatched movies, check the **Automatically\
    \ include** box and use the pull-down to select **All, 1 most recent, All unwatched,\
    \ 5 most recent unwatched**, etc.\n\n    ![images](images/0316.jpg)\n\n    **Figure\
    \ 3–16.** *Configuring movie sync to automatically include selections*\n\n5. \
    \ If you selected any item besides **All**, you have the choice to sync specific\
    \ movies or videos to your iPad. Simply check the boxes next to the movies you\
    \ want to include in the sync.\n\n#### Syncing TV Shows\n\nWhen you click the\
    \ **TV Shows** tab, you can choose to sync specific, recent, or unwatched TV shows,\
    \ or all of them.\n\nTo sync TV shows from your computer to your iPad, follow\
    \ these steps:\n\n1.  Connect your iPad to your computer, start iTunes, and click\
    \ your **iPad** in the left nav bar.\n2.  Click the **TV Shows** tab on the top\
    \ of the main window.\n3.  Check the **Sync TV Shows** box (see [Figure 3–17](#Chapter03.html#fig_3_17)).\n\
    4.  If you'd like to sync recent or unwatched TV shows, check the **Automatically\
    \ include** box and use the pull-down to select **All, 1 newest, All unwatched,\
    \ 5 oldest unwatched**, **10 newest unwatched**, etc.\n\n    ![images](images/0317.jpg)\n\
    \n    **Figure 3–17.** *Configuring TV showsync to automatically include selections*\n\
    \n5.  Choose **all Shows** or **selected Shows** next to **episodes of**.\n6.\
    \  If you choose **SelectedShows**, you can choose individual shows and even individual\
    \ episodes in the two sections in the middle of the screen.\n7.  If you have playlists\
    \ of TV shows, you can select those for inclusion by checking the boxes in the\
    \ bottom section of the screen.\n\n#### Syncing Podcasts\n\nWhen you click the\
    \ **Podcasts** tab, you can choose to sync specific, recent, or unplayed podcasts,\
    \ or all of them.\n\n**TIP**: Podcasts are audio or video shows that are usually\
    \ regularly scheduled (e.g., daily, weekly, or monthly). Most are free to subscribe\
    \ to in the iTunes store. When you subscribe and set up the auto sync as shown\
    \ in this section, you'll receive all your favorite podcasts on your iPad.\n\n\
    Many of your favorite radio shows are recorded and broadcast as podcasts. We encourage\
    \ you to check out the **Podcast** section of the iTunes store to see what might\
    \ interest you. You'll find podcasts of movie reviews, news shows, law school\
    \ test reviews, game shows, old radio shows, educational content, and much more.\n\
    \nTo sync podcasts from your computer to your iPad, follow these steps.\n\n1.\
    \  Connect your iPad to your computer, start iTunes, and click your **iPad** in\
    \ the left nav bar.\n2.  Click the **Podcasts** tab on the top of the main window.\n\
    3.  Check the **Sync Podcasts** box (see [Figure 3–18](#Chapter03.html#fig_3_18)).\n\
    4.  If you'd like to sync recent or unplayed podcasts, check the **Automatically\
    \ include** box and use the pull-down to select **All, 1 newest, All unplayed,\
    \ 5 newest**, **10 most recent unplayed**, etc.\n\n    ![images](images/0318.jpg)\n\
    \n    **Figure 3–18.** *Configuring podcast sync to automatically include selections*\n\
    \n5.  Choose **All Podcasts** or **Selected Podcasts** next to **episodes of**.\n\
    6.  If you choose **SelectedPodcasts**, you can choose individual podcasts and\
    \ even individual episodes in the two sections in the middle of the screen.\n\
    7.  If you have playlists of podcasts, you can select those for inclusion by checking\
    \ the boxes in the bottom section of the screen.\n\n**TIP**: After you sync these\
    \ podcasts, you can enjoy them in the **Podcasts** section of the **Music** app\
    \ on your device."
  trans: "\n### 同步铃声\n\n当你点击`Ringtones`（铃声）标签时，可以选择同步整个铃声库或选定的项目。铃声用于 iPad 上的 `FaceTime`\
    \ 通话。\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n2. 点击主窗口顶部的 `Ringtones`（铃声）标签。\n\
    3. 勾选右侧显示的 `Sync Ringtones`（同步铃声）复选框。\n4. 默认设置为同步所有铃声。若只同步特定铃声，请点击 `Selected ringtones`（选定的铃声）旁边的单选按钮。\n\
    5. 完成选择后，点击 `Apply`（应用）按钮开始同步铃声。\n\n| ![图片](img/p131-01.jpg) |\n\n**提示**：了解如何在第\
    \ 18 章：“FaceTime 视频消息和 Skype”中为联系人分配铃声、购买自定义铃声以及从音乐中创建自己的铃声。\n\n### 同步音乐\n\n当你点击\
    \ `Music`（音乐）标签时，可以选择同步整个音乐库或选定的项目。\n\n**警告**：如果你已经手动将部分音乐、音乐视频或语音备忘录传输到 iPad，你将会收到一条警告信息，提示\
    \ iPad 上的所有现有内容将被移除，并替换为从电脑选定的音乐库。\n\n要将音乐从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad\
    \ 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n2. 点击主窗口顶部的 `Music`（音乐）标签。\n3. 勾选 `Sync\
    \ Music`（同步音乐）复选框（参见图 3–15）。\n4. 仅当你*确定*你的音乐库不会太大而无法容纳在 iPad 上时，才点击 `Entire music\
    \ library`（整个音乐库）旁边的按钮。\n5. 如果不确定音乐库是否过大，或者只想同步特定的播放列表或艺人，请点击 `Selected playlists,\
    \ artists, and genres`（选定的播放列表、艺人和风格）旁边的按钮。\n6. 你可以通过勾选相应复选框来选择是否包含音乐视频和语音备忘录。\n\
    7. 你还可以选择自动用歌曲填充剩余空间。\n\n    **警告**：我们不建议勾选此选项，因为它会占用 iPad 上的所有空间，导致无法安装那些很酷的应用程序！\n\
    \n8. 现在勾选屏幕底部两列中的任何播放列表或艺人。你甚至可以使用 `Artists`（艺人）列顶部的搜索框搜索特定艺人。\n\n![图片](img/0315.jpg)\n\
    \n**图 3–15.** *与 iPad 同步音乐*\n\n### 同步影片\n\n当你点击 `Movies`（影片）标签时，可以选择同步特定影片、最近影片、未观看影片或全部影片。\n\
    \n要将影片从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
    2. 点击主窗口顶部的 `Movies`（影片）标签。\n3. 勾选 `Sync Movies`（同步影片）复选框（参见图 3–16）。\n4. 如果你希望同步最近或未观看的影片，请勾选\
    \ `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1 most recent`（最近 1 个）、`All\
    \ unwatched`（所有未观看）、`5 most recent unwatched`（最近 5 个未观看）等。\n\n    ![图片](img/0316.jpg)\n\
    \n    **图 3–16.** *配置影片同步以自动包含选择内容*\n\n5. 如果你选择了 `All`（全部）之外的任何项目，则可以选择将特定影片或视频同步到\
    \ iPad。只需勾选你想要包含在同步中的影片旁边的复选框即可。\n\n### 同步电视节目\n\n当你点击 `TV Shows`（电视节目）标签时，可以选择同步特定节目、最近节目、未观看节目或全部节目。\n\
    \n要将电视节目从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
    2. 点击主窗口顶部的 `TV Shows`（电视节目）标签。\n3. 勾选 `Sync TV Shows`（同步电视节目）复选框（参见图 3–17）。\n\
    4. 如果你希望同步最近或未观看的电视节目，请勾选 `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1\
    \ newest`（最新 1 个）、`All unwatched`（所有未观看）、`5 oldest unwatched`（最早 5 个未观看）、`10 newest\
    \ unwatched`（最新 10 个未观看）等。\n\n    ![图片](img/0317.jpg)\n\n    **图 3–17.** *配置电视节目同步以自动包含选择内容*\n\
    \n5. 在 `episodes of`（...的剧集）旁边选择 `all Shows`（所有节目）或 `selected Shows`（选定的节目）。\n\
    6. 如果选择 `Selected Shows`（选定的节目），你可以在屏幕中间的两个区域中选择单个节目甚至单个剧集。\n7. 如果你有电视节目的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些节目。\n\
    \n### 同步播客\n\n当你点击 `Podcasts`（播客）标签时，可以选择同步特定播客、最近播客、未播放播客或全部播客。\n\n**提示**：播客是通常定期更新的音频或视频节目（例如每日、每周或每月更新）。大多数都可以在\
    \ iTunes Store 免费订阅。当你订阅并按照本节所述设置自动同步后，你将在 iPad 上收到所有喜爱的播客。\n\n许多你喜爱的广播节目都会以播客形式录制和播出。我们鼓励你浏览\
    \ iTunes Store 的 `Podcast`（播客）部分，看看哪些内容可能让你感兴趣。你会找到电影评论、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等众多播客。\n\
    \n要将播客从电脑同步到 iPad，请按照以下步骤操作：\n\n1. 将 iPad 连接到电脑，启动 iTunes，然后点击左侧导航栏中的 `iPad`。\n\
    2. 点击主窗口顶部的 `Podcasts`（播客）标签。\n3. 勾选 `Sync Podcasts`（同步播客）复选框（参见图 3–18）。\n4. 如果你希望同步最近或未播放的播客，请勾选\
    \ `Automatically include`（自动包含）复选框，并使用下拉菜单选择 `All`（全部）、`1 newest`（最新 1 个）、`All\
    \ unplayed`（所有未播放）、`5 newest`（最新 5 个）、`10 most recent unplayed`（最近 10 个未播放）等。\n\
    \n    ![图片](img/0318.jpg)\n\n    **图 3–18.** *配置播客同步以自动包含选择内容*\n\n5. 在 `episodes\
    \ of`（...的剧集）旁边选择 `All Podcasts`（所有播客）或 `Selected Podcasts`（选定的播客）。\n6. 如果选择 `Selected\
    \ Podcasts`（选定的播客），你可以在屏幕中间的两个区域中选择单个播客甚至单集。\n7. 如果你有播客的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些节目。\n\
    \n**提示**：同步这些播客后，你可以在设备上的 `Music`（音乐）应用中的 `Podcasts`（播客）部分欣赏它们。\n"
- fmt: "#### Syncing iTunes U\n\nWhen you click the `iTunes U` tab, you can choose\
    \ to sync specific, recent, or unplayed iTunes U content, or all content.\n\n\
    **Tip**: `iTunes U` podcasts are similar to other audio or video podcasts, except\
    \ that they focus on educational content and are mostly produced by colleges and\
    \ universities. Most are free to subscribe to in the iTunes store. When you subscribe\
    \ and set up the auto sync as shown in this section, you'll receive all your favorite\
    \ `iTunes U` podcasts on your iPad.\n\nBe sure to check out the `iTunes U` section\
    \ in the iTunes store. You may find your favorite college or university has shows\
    \ to teach you biology, astronomy, or a whole lot more. There's even a Stanford\
    \ University course on how to develop iPad apps! Many of the top universities\
    \ broadcast class lectures from famous professors in `iTunes U`. Go ahead and\
    \ check it out—what you'll find is amazing!\n\nTo sync `iTunes U` content from\
    \ your computer to your iPad, follow these steps.\n\n1.  Connect your iPad to\
    \ your computer, start iTunes, and click your `iPad` in the left nav bar.\n2.\
    \  Click the `iTunes U` tab on the top of the main window.\n3.  Check the `Sync\
    \ iTunes U` box (see [Figure 3–19](#Chapter03.html#fig_3_19)).\n4.  If you'd like\
    \ to sync recent or unplayed items, check the `Automatically include` box and\
    \ use the pull-down to select `All`, `1 newest`, `All unplayed`, `5 newest`, `10\
    \ most recent unplayed`, etc.\n\n    ![images](images/0319.jpg)\n\n    **Figure\
    \ 3–19.** *Configuring iTunes U sync to automatically include selections*\n\n\
    5.  Choose `All Collections` or `Selected Collections` next to `items of`.\n6.\
    \  If you choose `Selected Collections`, you can choose individual collections\
    \ and even individual items in the two sections in the middle of the screen.\n\
    7.  If you have playlists of `iTunes U` podcasts, you can select those for inclusion\
    \ by checking the boxes in the bottom section of the screen under `Include Items\
    \ from Playlists`.\n\n#### Syncing iBooks, PDF files, and Audiobooks\n\nWhen you\
    \ click the `Books` tab, you can choose to sync all or selected books and audiobooks.\n\
    \n**Tip**: Books on the iPad are electronic versions of their paper cousins. They\
    \ are in a specific electronic format called `ePub`. You can buy them in the iBookstore\
    \ on the iPad or acquire them from other locations and sync them to your iPad\
    \ using the steps described here. Books you acquire elsewhere must be unprotected\
    \ or “DRM-free” in order to sync them to your iPad. You read these books in the\
    \ `iBooks` app or in other book reader apps on your iPad. See [Chapter 12](#Chapter12.html#ch12):\
    \ “iBooks and E-Books” to learn more.\n\nTo sync books, PDF files, or audiobooks\
    \ between your computer and your iPad, follow these steps:\n\n**Tip**: You can\
    \ find free iBooks to download by doing a search for “project gutenberg” in the\
    \ iBookstore. You can find free audiobooks to download by going to [`http://librivox.org`](http://librivox.org)\
    \ from your computer web browser and downloading public domain audiobooks. (These\
    \ free audiobooks are typically not read by professional actors but by volunteers,\
    \ so the quality may vary.) See the section “Getting Downloaded Items into iTunes\
    \ to Sync Them” in this chapter to see exactly how to download and sync free audiobooks.\n\
    \n1.  Connect your iPad to your computer, start iTunes, and click your `iPad`\
    \ in the left nav bar.\n2.  Click the `Books` tab on the top of the main window.\n\
    3.  Check the `Sync Books` and `Sync Audiobooks` boxes (see [Figure 3–20](#Chapter03.html#fig_3_20)).\n\
    4.  If you'd like to sync all books, leave the default `All books` selection.\n\
    5.  Otherwise, choose `Selected books` and make your choices by checking specific\
    \ books in the window.\n\n    **Tip**: In order to sync iBooks, PDF files, and\
    \ other similar documents to your iPad, you need to first drag and drop your file\
    \ from your computer into your iTunes library. Grab the file from any folder on\
    \ your computer, and drag and drop it right on your library in the upper left\
    \ column in iTunes.\n\n    ![images](images/0320.jpg)\n\n    **Figure 3–20.**\
    \ *Configuring books and audiobooks sync to automatically include selections*\n\
    \n6.  If you would like to sync all audiobooks, leave the default `All audiobooks`\
    \ selection.\n7.  Otherwise, choose `Selected audiobooks` and make your choices\
    \ by checking off specific audiobooks in the window below this selection item.\n\
    \n**Tip**: After you sync these books, you can enjoy them in the `iBooks` app\
    \ on your device. You can listen to audiobooks in the `iPod` app, where the `Audiobooks`\
    \ tab is on the left side.\n\n**Note**: Audiobooks from `Audible` require that\
    \ you first authorize your computer with your `Audible` account before you can\
    \ sync them to your iPad from your computer.\n\n#### Syncing Photos\n\nWhen you\
    \ click the `Photos` tab, you can choose to sync photos from all folders or selected\
    \ folders and you can even include videos.\n\n**Tip**: You can create a beautiful\
    \ electronic picture frame and share your photos on the stunning iPad screen (see\
    \ Chapter: 16 “iPad Photography”). You can even use your photos to set the background\
    \ wallpaper and screen-lock wallpaper (see [Chapter 7](#Chapter07.html#ch7): “Personalize\
    \ and Secure Your iPad” for more information).\n\nTo sync photos from your computer\
    \ to your iPad, follow these steps:\n\n1.  Connect your iPad to your computer,\
    \ start iTunes, and click your `iPad` in the left nav bar.\n\n    **Tip**: Mac\
    \ users can also sync photos using `iPhoto` or `Aperture`, including Events (time-based\
    \ sync), Faces (person-based sync), and Places (location-based sync).\n\n2.  Click\
    \ the `Photos` tab on the top of the main window.\n3.  Check the `Sync Photos\
    \ from` box (see [Figure 3–21](#Chapter03.html#fig_3_21)).\n\n    ![images](images/0321.jpg)\n\
    \n    **Figure 3–21.** *Configuring photo sync to automatically include selections*\n\
    \n4.  Click the pull-down menu next to `Sync Photos from` and select a folder\
    \ where your photos are stored. If you want to grab all your photos, go to the\
    \ highest folder level possible (e.g., `C:` on your Windows computer or `/` on\
    \ your Apple Mac).\n5.  If you'd like to sync all photos from the selected folder\
    \ on your computer, select `All folders`, shown in [Figure 3–21](#Chapter03.html#fig_3_21).\n\
    \n    **Caution**: Because your photo library on your computer may be too large\
    \ to fit on your iPad, be careful about checking `All folders`.\n\n6.  Otherwise,\
    \ choose `Selected folders` and make your choices by checking specific folders\
    \ in the window below, as shown in [Figure 3–21](#Chapter03.html#fig_3_21).\n\
    7.  You can also include any videos in the folders by checking the `Include videos`\
    \ box, as shown in [Figure 3–21](#Chapter03.html#fig_3_21).\n8.  When you are\
    \ done choosing your photos to sync, click the `Apply` button to save your settings\
    \ and start the sync.\n9.  When the sync starts, you'll see the status in the\
    \ middle-top status window in iTunes.\n\n### How to Know What Is New or Unplayed\
    \ in iTunes\n\nYou may notice little numbers next to items in the left nav bar\
    \ of iTunes (see [Figure 3–22](#Chapter03.html#fig_3_22)). There are similar little\
    \ blue numbers in the upper-right corner of items in the main window. These numbers\
    \ show how many items are unplayed, unwatched, or, in the case of apps, require\
    \ updates.\n\n![images](images/0322.jpg)\n\n**Figure 3–22.** *Quickly seeing the\
    \ number of unplayed items*"
  raw: "#### Syncing iTunes U\n\nWhen you click the **iTunes U** tab, you can choose\
    \ to sync specific, recent, or unplayed iTunes U content, or all content.\n\n\
    **TIP**: iTunes U podcasts are similar to other audio or video podcasts, except\
    \ that they focus on educational content and are mostly produced by colleges and\
    \ universities. Most are free to subscribe to in the iTunes store. When you subscribe\
    \ and set up the auto sync as shown in this section, you'll receive all your favorite\
    \ iTunes U podcasts on your iPad.\n\nBe sure to check out the **iTunes U** section\
    \ in the iTunes store. You may find your favorite college or university has shows\
    \ to teach you biology, astronomy, or a whole lot more. There's even a Stanford\
    \ University course on how to develop iPad apps! Many of the top universities\
    \ broadcast class lectures from famous professors in iTunes U. Go ahead and check\
    \ it out—what you'll find is amazing!\n\nTo sync iTunes U content from your computer\
    \ to your iPad, follow these steps.\n\n1.  Connect your iPad to your computer,\
    \ start iTunes, and click your **iPad** in the left nav bar.\n2.  Click the **iTunes\
    \ U** tab on the top of the main window.\n3.  Check the **SynciTunes U** box (see\
    \ [Figure 3–19](#Chapter03.html#fig_3_19)).\n4.  If you'd like to sync recent\
    \ or unplayed items, check the **Automatically include** box and use the pull-down\
    \ to select **All, 1 newest, All unplayed, 5 newest**, **10 most recent unplayed**,\
    \ etc.\n\n    ![images](images/0319.jpg)\n\n    **Figure 3–19.** *Configuring\
    \ iTunes Usync to automatically include selections*\n\n5.  Choose **All Collections**\
    \ or **Selected Collections** next to **items of**.\n6.  If you choose **SelectedCollections**,\
    \ you can choose individual collections and even individual items in the two sections\
    \ in the middle of the screen.\n7.  If you have playlists of iTunes U podcasts,\
    \ you can select those for inclusion by checking the boxes in the bottom section\
    \ of the screen under **Include Items from Playlists**.\n\n#### Syncing iBooks,\
    \ PDF files, and Audiobooks\n\nWhen you click the **Books** tab, you can choose\
    \ to sync all or selected books and audiobooks.\n\n**TIP**: Books on the iPad\
    \ are electronic versions of their paper cousins. They are in a specific electronic\
    \ format called *ePub*. You can buy them in the iBookstore on the iPad or acquire\
    \ them from other locations and sync them to your iPad using the steps described\
    \ here. Books you acquire elsewhere must be unprotected or “DRM-free” in order\
    \ to sync them to your iPad. You read these books in the **iBooks** app or in\
    \ other book reader apps on your iPad. See [Chapter 12](#Chapter12.html#ch12):\
    \ “iBooks and E-Books” to learn more.\n\nTo sync books, PDF files, or audiobooks\
    \ between your computer and your iPad, follow these steps:\n\n**TIP:** You can\
    \ find free iBooks to download by doing a search for “project gutenberg” in the\
    \ iBookstore. You can find free audiobooks to download by going to [`http://librivox.org`](http://librivox.org)\
    \ from your computer web browser and downloading public domain audiobooks. (These\
    \ free audiobooks are typically not read by professional actors but by volunteers,\
    \ so the quality may vary.) See the section “Getting Downloaded Items into iTunes\
    \ to Sync Them” in this chapter to see exactly how to download and sync free audiobooks.\n\
    \n1.  Connect your iPad to your computer, start iTunes, and click your **iPad**\
    \ in the left nav bar.\n2.  Click the **Books** tab on the top of the main window.\n\
    3.  Check the **Sync Books** and **Sync Audiobooks** boxes (see [Figure 3–20](#Chapter03.html#fig_3_20)).\n\
    4.  If you'd like to sync all books, leave the default **All books** selection.\n\
    5.  Otherwise, choose **Selected books** and make your choices by checking specific\
    \ books in the window.\n\n    **TIP**: In order to sync iBooks, PDF files, and\
    \ other similar documents to your iPad, you need to first drag and drop your file\
    \ from your computer into your iTunes library. Grab the file from any folder on\
    \ your computer, and drag and drop it right on your library in the upper left\
    \ column in iTunes.\n\n    ![images](images/0320.jpg)\n\n    **Figure 3–20.**\
    \ *Configuring books and audiobooks sync to automatically include selections*\n\
    \n6.  If you would like to sync all audiobooks, leave the default **All audiobooks**\
    \ selection.\n7.  Otherwise, choose **Selected audiobooks** and make your choices\
    \ by checking off specific audiobooks in the window below this selection item.\n\
    \n**TIP**: After you sync these books, you can enjoy them in the **iBooks** app\
    \ on your device. You can listen to audiobooks in the **iPod** app, where the\
    \ **Audiobooks** tab is on the left side.\n\n**NOTE**: Audiobooks from **Audible**\
    \ require that you first authorize your computer with your **Audible** account\
    \ before you can sync them to your iPad from your computer.\n\n#### Syncing Photos\n\
    \nWhen you click the **Photos** tab, you can choose to sync photos from all folders\
    \ or selected folders and you can even include videos.\n\n**TIP**: You can create\
    \ a beautiful electronic picture frame and share your photos on the stunning iPad\
    \ screen (see Chapter: 16 “iPad Photography”). You can even use your photos to\
    \ set the background wallpaper and screen-lock wallpaper (see [Chapter 7](#Chapter07.html#ch7):\
    \ “Personalize and Secure Your iPad” for more information).\n\nTo sync photos\
    \ from your computer to your iPad, follow these steps:\n\n1.  Connect your iPad\
    \ to your computer, start iTunes, and click your **iPad** in the left nav bar.\n\
    \n    **TIP**: Mac users can also sync photos using **iPhoto** or**Aperture**,\
    \ including Events (time-based sync), Faces (person-based sync), and Places (location-based\
    \ sync).\n\n2.  Click the **Photos** tab on the top of the main window.\n3.  Check\
    \ the **Sync Photos from** box (see [Figure 3–21](#Chapter03.html#fig_3_21)).\n\
    \n    ![images](images/0321.jpg)\n\n    **Figure 3–21.** *Configuring photo sync\
    \ to automatically include selections*\n\n4.  Click the pull-down menu next to\
    \ **Sync Photos from** and select a folder where your photos are stored. If you\
    \ want to grab all your photos, go to the highest folder level possible (e.g.,\
    \ C: on your Windows computer or “**/** ” on your Apple Mac).\n5.  If you'd like\
    \ to sync all photos from the selected folder on your computer, select **All folders**,\
    \ shown in[Figure 3–21](#Chapter03.html#fig_3_21).\n\n    **CAUTION**: Because\
    \ your photo library on your computer may be too large to fit on your iPad, be\
    \ careful about checking **All folders**.\n\n6.  Otherwise, choose **Selected\
    \ folders** and make your choices by checking specific folders in the window below,\
    \ as shown in [Figure 3–21](#Chapter03.html#fig_3_21).\n7.  You can also include\
    \ any videos in the folders by checking the **Include videos** box, as shown in\
    \ [Figure 3–21](#Chapter03.html#fig_3_21).\n8.  When you are done choosing your\
    \ photos to sync, click the **Apply** button to save your settings and start the\
    \ sync.\n9.  When the sync starts, you'll see the status in the middle-top status\
    \ window in iTunes.\n\n### How to Know What Is New or Unplayed in iTunes\n\nYou\
    \ may notice little numbers next to items in the left nav bar of iTunes (see [Figure\
    \ 3–22](#Chapter03.html#fig_3_22)). There are similar little blue numbers in the\
    \ upper-right corner of items in the main window. These numbers show how many\
    \ items are unplayed, unwatched, or, in the case of apps, require updates.\n\n\
    ![images](images/0322.jpg)\n\n**Figure 3–22.** *Quickly seeing the number of unplayed\
    \ items*"
  trans: "\n#### 同步 iTunes U\n\n当你点击 `iTunes U` 标签页时，可以选择同步特定、最近或未播放的 iTunes U 内容，或者同步所有内容。\n\
    \n**提示**：`iTunes U` 播客与其他音频或视频播客类似，但侧重于教育内容，且大多由高校制作。在 iTunes Store 中，大多数可免费订阅。当你按照本节的说明订阅并设置自动同步后，你将在\
    \ iPad 上收到所有你喜爱的 `iTunes U` 播客。\n\n请务必查看 iTunes Store 中的 `iTunes U` 版块。你可能会发现你心仪的大学或学院提供了教授生物学、天文学或更多知识的节目。甚至还有斯坦福大学关于如何开发\
    \ iPad 应用的课程！许多顶尖大学都在 `iTunes U` 中播放知名教授的课堂讲座。快去看看吧——你会发现的内容令人惊叹！\n\n要将 `iTunes\
    \ U` 内容从电脑同步到 iPad，请按照以下步骤操作：\n\n1.  将 iPad 连接到电脑，启动 iTunes，然后在左侧导航栏中点击你的`iPad`。\n\
    2.  点击主窗口顶部的 `iTunes U` 标签页。\n3.  勾选 `同步 iTunes U` 复选框（参见图 3–19）。\n4.  如果你想同步最近或未播放的项目，请勾选\
    \ `自动包含` 复选框，并使用下拉菜单选择 `全部`、`最新 1 个`、`所有未播放`、`最新 5 个`、`最近 10 个未播放` 等选项。\n\n  \
    \  ![images](img/0319.jpg)\n\n    **图 3–19.** *配置 iTunes U 同步以自动包含所选内容*\n\n5.\
    \  在 `项目` 旁边选择 `所有合集` 或 `所选合集`。\n6.  如果选择 `所选合集`，你可以选择单个合集，甚至可以选择屏幕中间两个区域中的单个项目。\n\
    7.  如果你有 `iTunes U` 播客的播放列表，可以通过勾选屏幕底部 `从播放列表中包含项目` 下的复选框来选择包含这些播放列表。\n\n####\
    \ 同步 iBooks、PDF 文件和有声读物\n\n当你点击 `图书` 标签页时，可以选择同步全部或部分的图书及有声读物。\n\n**提示**：iPad\
    \ 上的图书是纸质图书的电子版。它们采用一种名为 `ePub` 的特定电子格式。你可以在 iPad 上的 iBookstore 中购买，或从其他来源获取，并使用此处描述的步骤将其同步到\
    \ iPad。从其他来源获取的图书必须没有保护或“无 DRM”才能同步到 iPad。你可以在 iPad 上的 `iBooks` 应用或其他图书阅读器中阅读这些图书。详见第\
    \ 12 章：“iBooks 与电子书”。\n\n要在电脑和 iPad 之间同步图书、PDF 文件或有声读物，请按照以下步骤操作：\n\n**提示**：你可以在\
    \ iBookstore 中搜索“project gutenberg”来查找免费的 iBooks。你也可以通过电脑浏览器访问 [`http://librivox.org`](http://librivox.org)，下载公共领域的有声读物，从而获得免费的音频书。（这些免费有声读物通常并非由专业演员录制，而是由志愿者录制，因此质量可能参差不齐。）请参阅本章中的“将下载的项目导入\
    \ iTunes 以进行同步”部分，了解如何下载和同步免费有声读物的具体方法。\n\n1.  将 iPad 连接到电脑，启动 iTunes，然后在左侧导航栏中点击你的`iPad`。\n\
    2.  点击主窗口顶部的 `图书` 标签页。\n3.  勾选 `同步图书` 和 `同步有声读物` 复选框（参见图 3–20）。\n4.  如果你想同步所有图书，请保留默认的\
    \ `所有图书` 选项。\n5.  否则，请选择 `所选图书`，并勾选窗口中的特定图书以进行选择。\n\n    **提示**：为了将 iBooks、PDF\
    \ 文件和其他类似文档同步到 iPad，你需要先将文件从电脑拖放到你的 iTunes 资料库中。从电脑上的任何文件夹中抓取文件，然后将其直接拖放到 iTunes\
    \ 左上角列中的资料库上。\n\n    ![images](img/0320.jpg)\n\n    **图 3–20.** *配置图书和有声读物同步以自动包含所选内容*\n\
    \n6.  如果你想同步所有有声读物，请保留默认的 `所有有声读物` 选项。\n7.  否则，请选择 `所选有声读物`，并通过勾选此选项下方窗口中的特定有声读物进行选择。\n\
    \n**提示**：同步这些图书后，你可以在设备上的 `iBooks` 应用中享受阅读。你可以在 `iPod` 应用中收听有声读物，该应用左侧有 `有声读物`\
    \ 标签页。\n\n**注**：来自 `Audible` 的有声读物要求你首先使用你的 `Audible` 账户对电脑进行授权，然后才能从电脑将其同步到 iPad。\n\
    \n#### 同步照片\n\n当你点击 `照片` 标签页时，可以选择同步所有文件夹或所选文件夹中的照片，甚至还可以包含视频。\n\n**提示**：你可以在令人惊艳的\
    \ iPad 屏幕上创建精美的电子相框并分享你的照片（参见第 16 章：“iPad 摄影”）。你甚至可以使用照片来设置背景墙纸和锁定屏幕墙纸（更多信息请参见第\
    \ 7 章：“个性化你的 iPad 并确保其安全”）。\n\n要将照片从电脑同步到 iPad，请按照以下步骤操作：\n\n1.  将 iPad 连接到电脑，启动\
    \ iTunes，然后在左侧导航栏中点击你的`iPad`。\n\n    **提示**：Mac 用户也可以使用 `iPhoto` 或 `Aperture`\
    \ 同步照片，包括事件（基于时间的同步）、面孔（基于人的同步）和地点（基于位置的同步）。\n\n2.  点击主窗口顶部的 `照片` 标签页。\n3.  勾选\
    \ `同步照片来源` 复选框（参见图 3–21）。\n\n    ![images](img/0321.jpg)\n\n    **图 3–21.** *配置照片同步以自动包含所选内容*\n\
    \n4.  点击 `同步照片来源` 旁边的下拉菜单，选择存储照片的文件夹。如果你想抓取所有照片，请选择最高层级的文件夹（例如，Windows 电脑上的 `C:`\
    \ 或 Apple Mac 上的 `/`）。\n5.  如果你想同步电脑上选定文件夹中的所有照片，请选择 `所有文件夹`，如图 3–21 所示。\n\n \
    \   **警告**：由于电脑上的照片资料库可能过大而无法容纳在 iPad 上，因此勾选 `所有文件夹` 时请务必谨慎。\n\n6.  否则，请选择 `所选文件夹`，并通过勾选下方窗口中的特定文件夹进行选择，如图\
    \ 3–21 所示。\n7.  你还可以通过勾选 `包含视频` 复选框来包含文件夹中的任何视频，如图 3–21 所示。\n8.  完成要同步的照片选择后，点击\
    \ `应用` 按钮以保存设置并开始同步。\n9.  当同步开始时，你将在 iTunes 中间顶部的状态窗口中看到同步状态。\n\n### 如何了解 iTunes\
    \ 中哪些是新的或未播放的\n\n你可能会注意到 iTunes 左侧导航栏中项目旁边的小数字（参见图 3–22）。主窗口中项目的右上角也有类似的蓝色小数字。这些数字显示了有多少项目未播放、未观看，或者对于应用而言，需要更新。\n\
    \n![images](img/0322.jpg)\n\n**图 3–22.** *快速查看未播放项目的数量*\n"
- fmt: "### Manually Transferring Music, Movies, Podcasts, and More on Your iPad (Drag-and-Drop\
    \ Method)\n\nThe Auto Sync sections showed you how to automatically sync content\
    \ to your iPad. Here you'll learn how to manually transfer songs, videos, books,\
    \ audiobooks, and more. The process is the same for all types of content, so we'll\
    \ show you how to do it for just one type.\n\n**TIP**: Use these same drag-and-drop\
    \ techniques to add items to a playlist.\n\nTo manually transfer content from\
    \ your computer to your iPad, follow these steps:\n\n**NOTE**: Be sure to check\
    \ `Manually manage music and videos` on the `Summary` tab in iTunes before you\
    \ try to drag and drop music or videos. If you've chosen to automatically sync\
    \ content (e.g., music, movies, podcasts, etc.), you won't be able to use this\
    \ drag-and-drop method to copy items to your iPad.\n\n1. Connect your iPad to\
    \ your computer, and start iTunes.\n2. In the left nav bar, click your `iPad`.\
    \ Then click the `Summary` tab at the top. Near the bottom of the screen, make\
    \ sure the `Manually manage music and videos` box is checked. You may see a warning\
    \ message if you have previously synced music or videos to your iPad, saying that\
    \ all previously synced music and videos will be replaced with your iTunes library.\
    \ This is OK.\n\n   ![images](images/p143-01.jpg)\n\n3. In the left nav bar, under\
    \ the `LIBRARY` heading, click the type of content (`Music`, `Movies, TV Shows,\
    \ Podcasts, iTunes U`, etc.) you'd like to transfer.\n4. In the main window, you'll\
    \ see your library of content. It's usually easiest to select `List View` from\
    \ the top of iTunes, as shown in Figure 3–23. This allows you to see all the content\
    \ in a list and easily select a single item or group of items.\n\n   ![images](images/0323.jpg)\n\
    \n   **Figure 3–23.** *Selecting media to drag and drop onto your device*\n\n\
    5. Here is how to select content individually, in a list or separated:\n   1.\
    \ To select an individual item, simply click it to highlight it.\n\n      ![images](images/p144-01.jpg)\n\
    \n   2. To select items that are not in a continuous list, Windows users press\
    \ and hold the `Control` key while clicking items, and Mac users press and hold\
    \ the `Command` key while clicking items.\n\n      ![images](images/p144-02.jpg)\n\
    \n   3. To select items in a continuous list, press and hold the `Shift` key while\
    \ clicking first the top item and then the bottom item in the list. All the items\
    \ in between will be selected.\n\n      ![images](images/p145-01.jpg)\n\n6. Then,\
    \ to copy these items to your iPad, simply click and drag the selected item(s)\
    \ over to your iPad and let go of the mouse button. All selected items will then\
    \ be copied to your iPad in the left column under `DEVICES`.\n\n### Troubleshooting\
    \ iTunes and the Sync\n\nSometimes iTunes does not behave exactly as you'd expect\
    \ it to, so here are a few simple troubleshooting tips.\n\n#### Check Out the\
    \ Apple Knowledgebase for Helpful Articles\n\nThe first step when you're having\
    \ a problem is to check out Apple's support pages, where you'll find lots of helpful\
    \ information. On your iPad or computer's web browser, go to this web page and\
    \ click a topic or device for help:\n\n[http://www.apple.com/support/ipad/](http://www.apple.com/support/ipad/)\n\
    \n#### iTunes Locked Up and Will Not Respond (Windows Computer)\n\n1. Bring up\
    \ the `Windows Task Manager` by simultaneously pressing the `Ctrl` + `Alt` + `Del`\
    \ keys on your keyboard. The `Task Manager` should look something like Figure\
    \ 3–24.\n\n   ![images](images/0324.jpg)\n\n   **Figure 3–24.** *Locating `iTunes.exe`\
    \ in Windows Task Manager to terminate it*\n\n2. Then, to end the process, click\
    \ `End process` from the pop-up window.\n3. Now, iTunes should be forced to close.\n\
    4. Try restarting iTunes.\n5. If iTunes will not start or it locks up again, reboot\
    \ your computer and try again.\n\n#### iTunes Locked Up and Will Not Respond (Mac\
    \ Computer)\n\n**TIP**: Pressing `Command` + `Option` + `Escape` is the shortcut\
    \ to bring up the `Force Quit Applications` window shown in Figure 3–25.\n\n1.\
    \ Go up to the iTunes Menu at the top and click.\n2. Click `Quit iTunes.`\n3.\
    \ If that doesn't work, go to any other program and click the small Apple in the\
    \ upper left-hand corner.\n4. Click `Force Quit` and the list of running programs\
    \ will be displayed.\n5. Highlight iTunes and click the `Force Quit` button.\n\
    6. If this does not help, try restarting your Mac.\n\n![images](images/0325.jpg)\n\
    \n**Figure 3–25.** *Force Quit Applications window on Mac computers*\n\n### Updating\
    \ Your iPad Operating System\n\nYou can check for updated software and install\
    \ updated operating system (called \"iOS\") software using iTunes.\n\n**NOTE**:\
    \ Do this update when you won't mind being without your iPad for 30 minutes or\
    \ more, depending on the amount of information on your iPad and the speed of your\
    \ computer and Internet connection.\n\nNormally, iTunes will automatically check\
    \ for updates on a set schedule, about every two weeks. If no update is found,\
    \ iTunes will tell you when it will check for another update.\n\nTo manually check\
    \ for updated iOS software in iTunes and install it, perform the following steps:\
    \ and see Figure 3–26:\n\n1. Start iTunes.\n2. Connect your iPad to your computer.\n\
    3. Click your `iPad`, listed under `DEVICES` in the left nav bar.\n4. Click the\
    \ `Summary` tab in the top nav bar.\n5. Click the `Check for Update` button in\
    \ the center of the screen in the `Version` section.\n\n   ![images](images/0326.jpg)\n\
    \n   **Figure 3–26.** *Checking for updated software*\n\n6. If you have the latest\
    \ version, you'll see a pop-up window saying something like \"This version of\
    \ the iPad software (4.x.x) is the current version.\" Click `OK` to close the\
    \ window. You are done with the update process.\n7. If you don't have the latest\
    \ version, a window similar to the one shown to the right will tell you a new\
    \ version is available and ask if you would like to update. Click `Download and\
    \ Update`.\n\n   ![images](images/p149-01.jpg)\n\n8. iTunes will take you through\
    \ a few screens that describe the update and ask you to agree to the software\
    \ license. If you agree, click `Next` and `Agree` to download the latest iOS software\
    \ from Apple. This will take about 5–10 minutes.\n\n   ![images](images/p149-02.jpg)\n\
    \n   **TIP**: We show you all the screens you might see in this update process\
    \ in the \"Reinstalling the iPad Operating System\" section of Chapter 29: \"\
    Troubleshooting.\"\n\n9. Next, iTunes will back up your iPad, which might take\
    \ 10 minutes or more if your iPad is filled with data.\n10. Now the new iOS will\
    \ be installed and your iPad erased.\n11. Finally, you'll be presented with the\
    \ screen allowing you to set your iPad up as a new one or restore it from a backup.\n\
    \    1. Choose `Set up as a new iPad` if you want to erase all your data after\
    \ the update process.\n    2. Choose `Restore from the backup of`, and make sure\
    \ you select the correct backup file (usually the most recent one).\n\nNow your\
    \ iPad will be restored or set up as you selected and your iPad OS update is complete."
  raw: "### Manually Transferring Music, Movies, Podcasts, and More on YouriPad (Drag-and-Drop\
    \ Method)\n\nThe Auto Sync sections showed you how to automatically sync content\
    \ to your iPad. Here you'll learn how to manually transfer songs, videos, books,\
    \ audiobooks, and more. The process is the same for all types of content, so we'll\
    \ show you how to do it for just one type.\n\n**TIP**: Use these same drag-and-drop\
    \ techniques to add items to a playlist.\n\nTo manually transfer content from\
    \ your computer to your iPad, follow these steps:\n\n**NOTE**: Be sure to check\
    \ **Manually manage music and videos** on the **Summary** tab in iTunes before\
    \ you try to drag and drop music or videos. If you've chosen to automatically\
    \ sync content (e.g., music, movies, podcasts, etc.), you won't be able to use\
    \ this drag-and-drop method to copy items to your iPad.\n\n1.  Connect your iPad\
    \ to your computer, and start iTunes.\n2.  In the left nav bar, click your **iPad**.\
    \ Then click the **Summary** tab at the top. Near the bottom of the screen, make\
    \ sure the **Manually manage music and videos** box is checked. You may see a\
    \ warning message if you have previously synced music or videos to your iPad,\
    \ saying that all previously synced music and videos will be replaced with your\
    \ iTunes library. This is OK.\n\n    ![images](images/p143-01.jpg)\n\n3.  In the\
    \ left nav bar, under the **LIBRARY** heading, click the type of content (**Music**,\
    \ **Movies, TV Shows, Podcasts, iTunes U**, etc.) you'd like to transfer.\n4.\
    \  In the main window, you'll see your library of content. It's usually easiest\
    \ to select **List View** from the top of iTunes, as shown in [Figure 3–23](#Chapter03.html#fig_3_23).\
    \ This allows you to see all the content in a list and easily select a single\
    \ item or group of items.\n\n    ![images](images/0323.jpg)\n\n    **Figure 3–23.**\
    \ *Selecting media to drag and drop onto your device*\n\n5.  Here is how to select\
    \ content individually, in a list or separated:\n    1.  To select an individual\
    \ item, simply click it to highlight it.\n\n        ![images](images/p144-01.jpg)\n\
    \n    2.  To select items that are not in a continuous list, Windows users press\
    \ and hold the **Control** key while clicking items, and Mac users press and hold\
    \ the **Command** key while clicking items.\n\n        ![images](images/p144-02.jpg)\n\
    \n    3.  To select items in a continuous list, press and hold the **Shift** key\
    \ while clicking first the top item and then the bottom item in the list. All\
    \ the items in between will be selected.\n\n        ![images](images/p145-01.jpg)\n\
    \n6.  Then, to copy these items to your iPad, simply click and drag the selected\
    \ item(s) over to your iPad and let go of the mouse button. All selected items\
    \ will then be copied to your iPad in the left column under DEVICES.\n\n### Troubleshooting\
    \ iTunes and the Sync\n\nSometimes iTunes does not behave exactly as you'd expect\
    \ it to, so here are a few simple troubleshooting tips.\n\n#### Check Out the\
    \ Apple Knowledgebase for Helpful Articles\n\nThe first step when you're having\
    \ a problem is to check out Apple's support pages, where you'll find lots of helpful\
    \ information. On your iPad or computer's web browser, go to this web page and\
    \ click a topic or device for help:\n\n[`http://www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/)\n\
    \n#### iTunes Locked Up and Will Not Respond (Windows Computer)\n\n1.  Bring up\
    \ the **WindowsTask Manager** by simultaneously pressing the **Ctrl** + **Alt**\
    \ + **Del** keys on your keyboard. The **Task Manager** should look something\
    \ like [Figure 3–24](#Chapter03.html#fig_3_24).\n\n    ![images](images/0324.jpg)\n\
    \n    **Figure 3–24.** *Locating `iTunes.exe` in Windows Task Manager to terminate\
    \ it*\n\n2.  Then, to end the process, click **End process** from the pop-up window.\n\
    3.  Now, iTunes should be forced to close.\n4.  Try restarting iTunes.\n5.  If\
    \ iTunes will not start or it locks up again, reboot your computer and try again.\n\
    \n#### iTunes Locked Up and Will Not Respond (Mac Computer)\n\n**TIP**: Pressing\
    \ **Command** + **Option** + **Escape** is the shortcut to bring up the **Force\
    \ Quit Applications** window shown in [Figure 3–25](#Chapter03.html#fig_3_25).\n\
    \n1.  Go up to the iTunes Menu at the top and click.\n2.  Click **Quit iTunes.**\n\
    3.  If that doesn't work, go to any other program and click the small Apple in\
    \ the upper left-hand corner.\n4.  Click **Force Quit** and the list of running\
    \ programs will be displayed.\n5.  Highlight iTunes and click the **Force Quit**\
    \ button.\n6.  If this does not help, try restarting your Mac.\n\n![images](images/0325.jpg)\n\
    \n**Figure 3–25.** *Force Quit Applications window on Mac computers*\n\n### Updating\
    \ Your iPad Operating System\n\nYou can check for updated software and install\
    \ updated operating system (called “iOS”) software using iTunes.\n\n**NOTE**:\
    \ Do this update when you won't mind being without your iPad for 30 minutes or\
    \ more, depending on the amount of information on your iPad and the speed of your\
    \ computer and Internet connection.\n\nNormally, iTunes will automatically check\
    \ for updates on a set schedule, about every two weeks. If no update is found,\
    \ iTunes will tell you when it will check for another update.\n\nTo manually check\
    \ for updated iOS software in iTunes and install it, perform the following steps:\
    \ and see [Figure 3–26](#Chapter03.html#fig_3_26):\n\n1.  Start iTunes.\n2.  Connect\
    \ your iPad to your computer.\n3.  Click your **iPad**, listed under **DEVICES**\
    \ in the left nav bar.\n4.  Click the **Summary** tab in the top nav bar.\n5.\
    \  Click the **Check for Update** button in the center of the screen in the **Version**\
    \ section.\n\n    ![images](images/0326.jpg)\n\n    **Figure 3–26.** *Checking\
    \ for updated software*\n\n6.  If you have the latest version, you'll see a pop-up\
    \ window saying something like “This version of the iPad software (4.x.x) is the\
    \ current version.” Click **OK** to close the window. You are done with the update\
    \ process.\n7.  If you don't have the latest version, a window similar to the\
    \ one shown to the right will tell you a new version is available and ask if you\
    \ would like to update. Click **Download and Update**.\n\n    ![images](images/p149-01.jpg)\n\
    \n8.  iTunes will take you through a few screens that describe the update and\
    \ ask you to agree to the software license. If you agree, click **Next** and **Agree**\
    \ to download the latest iOS software from Apple. This will take about 5–10 minutes.\n\
    \n    ![images](images/p149-02.jpg)\n\n    **TIP**: We show you all the screens\
    \ you might see in this update process in the “Reinstalling the iPad Operating\
    \ System” section of [Chapter 29](#Chapter29.html#ch29): “Troubleshooting.”\n\n\
    9.  Next, iTunes will back up your iPad, which might take 10 minutes or more if\
    \ your iPad is filled with data.\n10.  Now the new iOS will be installed and your\
    \ iPad erased.\n11.  Finally, you'll be presented with the screen allowing you\
    \ to set your iPad up as a new one or restore it from a backup.\n    1.  Choose\
    \ **Set up as a new iPad** if you want to erase all your data after the update\
    \ process\n    2.  Choose **Restore from the backup of**, and make sure you select\
    \ the correct backup file (usually the most recent one).\n\nNow your iPad will\
    \ be restored or set up as you selected and your iPad OS update is complete.\n\
    \n## Chapter 4"
  trans: "\n### 在 iPad 上手动传输音乐、影片、播客等（拖放法）\n\n“自动同步”部分展示了如何自动将内容同步到 iPad。这里你将学习如何手动传输歌曲、视频、图书、有声读物等内容。所有类型内容的传输过程都相同，因此我们仅以其中一种类型为例进行说明。\n\
    \n**提示**：使用相同的拖放技巧可将项目添加到播放列表中。\n\n要将内容从电脑手动传输到 iPad，请按照以下步骤操作：\n\n**注意**：在尝试拖放音乐或视频之前，请务必在\
    \ iTunes 的“摘要”标签页中勾选“手动管理音乐和视频”。如果你已选择自动同步内容（例如音乐、影片、播客等），则无法使用此拖放方法将项目复制到 iPad。\n\
    \n1. 将 iPad 连接到电脑，并启动 iTunes。\n2. 在左侧导航栏中，点击你的 `iPad`。然后点击顶部的“摘要”标签页。在屏幕底部附近，确保勾选了“手动管理音乐和视频”复选框。如果你之前在\
    \ iPad 上同步过音乐或视频，可能会出现一条警告消息，提示所有先前同步的音乐和视频将被你的 iTunes 资料库替换。这没有关系。\n\n   ![images](img/p143-01.jpg)\n\
    \n3. 在左侧导航栏的“资料库”标题下，点击你要传输的内容类型（“音乐”、“影片、电视节目、播客、iTunes U”等）。\n4. 在主窗口中，你将看到你的内容资料库。通常最简单的方法是选择\
    \ iTunes 顶部的“列表视图”，如图 3–23 所示。这使你能够以列表形式查看所有内容，并轻松选择单个项目或一组项目。\n\n   ![images](img/0323.jpg)\n\
    \n   **图 3–23.** *选择要拖放到设备上的媒体*\n\n5. 以下是如何单独、以列表形式或分散选择内容的方法：\n   1. 要选择单个项目，只需单击它将其高亮显示。\n\
    \n      ![images](img/p144-01.jpg)\n\n   2. 要选择不连续列表中的项目，Windows 用户请按住 `Control`\
    \ 键并同时单击项目，Mac 用户请按住 `Command` 键并同时单击项目。\n\n      ![images](img/p144-02.jpg)\n\
    \n   3. 要选择连续列表中的项目，请按住 `Shift` 键，先单击列表中的第一个项目，再单击最后一个项目。中间的所有项目将被选中。\n\n    \
    \  ![images](img/p145-01.jpg)\n\n6. 然后，要将这些项目复制到 iPad，只需单击选中的项目并将其拖到你的 iPad 上，然后松开鼠标按钮。所有选中的项目将被复制到左侧“设备”栏下的\
    \ iPad 中。\n\n### iTunes 与同步故障排除\n\n有时 iTunes 的行为可能并不完全如你所预期，因此这里提供一些简单的故障排除技巧。\n\
    \n#### 查阅 Apple 知识库获取有帮助的文章\n\n遇到问题时的第一步是查阅 Apple 的支持页面，那里有大量有用信息。在 iPad 或电脑的网页浏览器中，访问以下网页并点击某个主题或设备以获取帮助：\n\
    \n[`www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/)\n\n####\
    \ iTunes 无响应并锁定（Windows 电脑）\n\n1. 同时按下键盘上的 `Ctrl` + `Alt` + `Del` 键，调出“Windows\
    \ 任务管理器”。“任务管理器”应类似于图 3–24 所示。\n\n   ![images](img/0324.jpg)\n\n   **图 3–24.**\
    \ *在 Windows 任务管理器中定位 `iTunes.exe` 以终止它*\n\n2. 然后，要结束该进程，从弹出窗口中点击“结束进程”。\n3. 现在，iTunes\
    \ 应被强制关闭。\n4. 尝试重新启动 iTunes。\n5. 如果 iTunes 无法启动或再次锁定，请重启电脑并重试。\n\n#### iTunes\
    \ 无响应并锁定（Mac 电脑）\n\n**提示**：按下 `Command` + `Option` + `Escape` 是调出图 3–25 所示“强制退出应用程序”窗口的快捷键。\n\
    \n1. 向上点击顶部 iTunes 菜单。\n2. 点击“退出 iTunes”。\n3. 如果这不起作用，请转到任何其他程序，点击左上角的小苹果图标。\n\
    4. 点击“强制退出”，将显示正在运行的程序列表。\n5. 高亮 iTunes 并点击“强制退出”按钮。\n6. 如果这仍无帮助，请尝试重启你的 Mac。\n\
    \n![images](img/0325.jpg)\n\n**图 3–25.** *Mac 电脑上的“强制退出应用程序”窗口*\n\n### 更新 iPad\
    \ 操作系统\n\n你可以使用 iTunes 检查更新的软件并安装更新的操作系统（称为“iOS”）。\n\n**注意**：请在你不介意至少 30 分钟无法使用\
    \ iPad 时进行此更新，具体时间取决于 iPad 上的信息量以及你的电脑和网络连接速度。\n\n通常，iTunes 会按照设定计划（大约每两周）自动检查更新。如果未找到更新，iTunes\
    \ 会告知你下次检查更新的时间。\n\n要手动检查 iTunes 中的 iOS 更新软件并安装，请执行以下步骤，并参见图 3–26：\n\n1. 启动 iTunes。\n\
    2. 将 iPad 连接到电脑。\n3. 在左侧导航栏的“设备”下，点击你的 `iPad`。\n4. 点击顶部导航栏中的“摘要”标签页。\n5. 在屏幕中央的“版本”部分，点击“检查更新”按钮。\n\
    \n   ![images](img/0326.jpg)\n\n   **图 3–26.** *检查更新软件*\n\n6. 如果你已拥有最新版本，你将看到弹出窗口提示类似“此\
    \ iPad 软件版本 (4.x.x) 为当前版本”。点击“确定”关闭窗口。更新过程就此完成。\n7. 如果你没有最新版本，右侧会显示类似窗口，告知有新版本可用，并询问是否要更新。点击“下载并更新”。\n\
    \n   ![images](img/p149-01.jpg)\n\n8. iTunes 将引导你浏览几个屏幕，其中描述更新并要求你同意软件许可。如果你同意，点击“下一步”和“同意”，以下载\
    \ Apple 提供的最新 iOS 软件。这大约需要 5–10 分钟。\n\n   ![images](img/p149-02.jpg)\n\n   **提示**：我们将在第\
    \ 29 章“故障排除”的“重新安装 iPad 操作系统”部分，展示此更新过程中你可能会看到的所有屏幕。\n\n9. 接下来，iTunes 将备份你的 iPad，如果你的\
    \ iPad 存有大量数据，这可能需要 10 分钟或更长时间。\n10. 现在将安装新的 iOS，你的 iPad 数据将被擦除。\n11. 最后，你将看到屏幕，允许你将\
    \ iPad 设置为新设备或从备份恢复。\n    1.  如果你想在更新过程后擦除所有数据，请选择“设置为新的 iPad”。\n    2.  选择“从以下备份恢复”，并确保选择了正确的备份文件（通常是最新的那个）。\n\
    \n现在你的 iPad 将按照你的选择进行恢复或设置，iPad 操作系统更新完成。\n"
- fmt: "## Other Sync Methods\n\nIn [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad\
    \ with iTunes,” you learned how to connect your iPad to your computer and use\
    \ iTunes to sync your personal information, music, videos, and more. In this chapter,\
    \ we explore some alternative ways to wirelessly synchronize information to your\
    \ iPad. The benefit of the wireless methods is that you don't need to connect\
    \ your iPad to your computer to have the information updated. Everything happens\
    \ over the air—automatically. The two methods we cover are Apple's MobileMe Service\
    \ and Exchange/Google Sync.\n\n**NOTE**: If you use the `Gmail` account setting\
    \ instead of `Exchange` (as we describe in this chapter) to set up your Gmail,\
    \ you will be able to wirelessly sync your email, calendar, and notes, but not\
    \ your Google contacts. So if you don't need Google Contacts synced, you can use\
    \ the `Gmail` setting instead of `Exchange`.\n\n### Wireless Sync of Your Google,\
    \ Hotmail or Exchange Information\n\nUsing the steps we describe here, your iPad\
    \ can wirelessly sync your email, contacts, and calendar from a Microsoft Exchange\
    \ account or a Google Account.\n\n**TIP**: You can now wirelessly sync multiple\
    \ Exchange accounts on your iPad. If you have several Google, Hotmail, or Microsoft\
    \ Exchange accounts, you can wirelessly sync all accounts at the same time to\
    \ your iPad.\n\n#### Why Do We Say Google/Exchange?\n\nWe use the words Google\
    \ and Exchange interchangeably here because you set up your Google sync using\
    \ the `Exchange` setting on your iPad. Google has licensed Microsoft Exchange\
    \ ActiveSync so you can now set up your Google account just like an Exchange account\
    \ and enjoy the same push email, contacts, and calendar functionality. We know\
    \ it is a little confusing, but you set up both your Google and Exchange accounts\
    \ in the identical manner, using the `Exchange` settings on your iPad—so we say\
    \ Google/Exchange.\n\nBetween the time of writing the original iPad book and this\
    \ iPad 2 book, Hotmail has also added ActiveSync capabilities, so we have included\
    \ information in this chapter about setting up Hotmail as well.\n\n#### If You\
    \ Want a Google Account, Create One\n\nIf you don't have a Microsoft Exchange\
    \ account, but you still want a wireless sync, then you should set up a free Google\
    \ account to store your contacts and calendar. The account will allow you to start\
    \ using Google Mail (Gmail), Contacts, and Calendar.\n\nTo set up your Google\
    \ account, follow these steps:\n\n1.  From your computer web browser (you can't\
    \ create a Gmail account your iPad) type in: [`www.gmail.com`](http://www.gmail.com).\n\
    2.  Click the **Create an account** button.\n\n    ![images](images/p152-01.jpg)\n\
    \n3.  On the next screen, enter the information requested and click the button\
    \ at the bottom of the page that says **I accept. Create my account.**\n4.  If\
    \ successful, you'll see a screen that says **Congratulations!** Click the **Show\
    \ me my account** button to get started.\n5.  To see your Calendar, click the\
    \ **Calendar** link in the upper left corner (see [Figure 4–1](#Chapter04.html#fig_4_1)).\n\
    6.  To see your Contacts, click the **Contacts** link in the left side of the\
    \ Gmail Inbox page.\n\n![images](images/0401.jpg)\n\n**Figure 4–1.** *Navigating\
    \ around to see your Gmail Inbox, Contacts, and Calendar*\n\nAs soon as you set\
    \ up the sync as shown in this chapter, you will begin to see all changes to your\
    \ contacts and calendar from Google magically appear on your iPad. The same goes\
    \ for any changes or additions from your iPad—they will automatically appear in\
    \ Google in moments.\n\n**TIP**: It is extremely easy for your Google Contacts\
    \ list grow into the thousands because it automatically includes everyone you\
    \ have ever emailed from your Gmail account. You may want to clean up your list\
    \ before you set up the sync to your iPad.\n\n#### Set Up Your Google, Hotmail,\
    \ or Exchange Account on Your iPad\n\nThe following steps show you how to set\
    \ up the wireless sync for either your Exchange account or your Google contacts\
    \ and calendar:\n\n1.  Touch the **Settings** icon on your iPad.\n2.  Touch **Mail,\
    \ Contacts, and Calendars**.\n3.  In the right column, you'll see a list of your\
    \ email accounts and, below that, the **Add Account** option.\n\n    ![images](images/p153-01.jpg)\n\
    \n    If you have no accounts set up, you will see only **Add Account**. In either\
    \ case, tap **Add Account.**\n\n4.  On the next screen, choose **Microsoft Exchange**.\n\
    \n    **NOTE**: You should choose Microsoft Exchange if you want to have the wireless\
    \ sync with your Google Contacts and Calendar. If you select `Gmail`, you will\
    \ not be able to wirelessly sync your Google Contacts and Notes, but not your\
    \ Calendar.\n\n    ![images](images/p154-01.jpg)\n\n5.  Type your email address.\n\
    \n    **TIP**: To type the **.com** (or `.net`, `.edu`, `.org`, etc.) in the email\
    \ address, press and hold the period key until you see the **.com** key appear\
    \ above it. Slide over and press **.com**.\n\n    ![images](images/p154-02.jpg)\n\
    \n    ![images](images/p154-03.jpg)\n\n6.  Many times, your email address is also\
    \ your username. If so, it's easier to copy and paste than re-type. To copy your\
    \ e-mail address into the Username field, follow these steps:\n    1.  Touch and\
    \ hold the **email address** until you see the black pop-up appear above it. Tap\
    \ **Select All**.\n\n        ![images](images/p154-04.jpg)\n\n    2.  Tap **Copy**.\n\
    \n        ![images](images/p155-01.jpg)\n\n    3.  Double-tap in the **Username**\
    \ field (you can also touch and hold) until you see the pop-up appear and tap\
    \ **Paste**.\n\n        ![images](images/p155-02.jpg)\n\n7.  For Gmail, leave\
    \ the **Domain** blank.\n\n    For Exchange email, you may need to enter the Domain\
    \ name supplied by your administrator.\n\n    Type your **Password.**\n\n    If\
    \ you want, you can adjust the **Description** of the account, which defaults\
    \ to your email address.\n\n    ![images](images/p155-03.jpg)\n\n8.  Tap the **Next**\
    \ button in the upper right corner.\n9.  You may see an **Unable to Verify Certificate**\
    \ screen as shown. If you do see it, click **Accept** to continue.\n\n    ![images](images/p155-04.jpg)\n\
    \n10.  For Gmail, type `m.google.com` in the **Server** field.\n\n    For Hotmail,\
    \ type `m.hotmail.com` In the **Server** field.\n\n    For Exchange email, enter\
    \ your server address. (Example: `mobile.servername.com`)\n\n11.  Click **Next**\
    \ in the upper right corner.\n\n    ![images](images/p156-01.jpg)\n\n12.  On this\
    \ screen you have the option to turn the **Mail,** **Contacts,** and **Calendars**\
    \ wireless sync **On** or **Off**. For each sync you'd like to turn on, tap the\
    \ switch to change it to **On**.\n\n    ![images](images/p156-02.jpg)\n\n    ![images](images/p156-03.jpg)\n\
    \n    **NOTE**: If you already have contacts or calendar items on your iPad, you\
    \ may see warning pop-up messages after you tap **Yes** next to Contacts and Calendar.\n\
    \n    Your choices are to **Keep on My iPad** or **Delete**. If you choose **Cancel**\
    \ it stops setting up your Exchange account.\n\n    Select **Keep on My iPad**\
    \ to keep all existing contacts and calendar events on your iPad. These items\
    \ will not end up on your Google or Exchange account—they will stay on your iPad.\n\
    \n    You may end up with some duplicate contacts or calendar events on your iPad\
    \ if the same ones already exist on your Google or Exchange account.\n\n    Select\
    \ **Delete** if you already have these contacts or calendar items in your Exchange\
    \ or Google account and do not want to duplicate them.\n\n13.  Tap **Save** to\
    \ save your settings.\n\n    ![images](images/p157-01.jpg)\n\n14.  You're done\
    \ with the initial setup of your account. You should see your new account listed\
    \ under the **Accounts** heading on the **Mail, Contacts, Calendars** screen.\n\
    \n    ![images](images/p157-02.jpg)"
