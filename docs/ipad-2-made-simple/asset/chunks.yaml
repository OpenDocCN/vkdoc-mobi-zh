    ## 第 24 章


    ## 告别纸质笔记


    在本章中，我们将向你概述**备忘录**应用以及一个名为**印象笔记**的流行替代应用，你可以使用它们来写笔记、制作购物清单，以及列出你想看的电影或想读的书籍清单。我们还将向你展示如何整理甚至通过电子邮件将笔记发送给自己或他人。理想情况下，我们希望**备忘录**在
    iPad 上能变得非常易用，以至于你最终可以摆脱大部分——即使不是全部——纸质便利贴！


    ### 探索更多备忘录应用


    在本章后面部分，我们将深入介绍一个名为**印象笔记**的优秀且免费的**备忘录**应用替代品。App Store 中还有各种其他免费或低成本的备忘录应用，但目前**印象笔记**脱颖而出。使用**印象笔记**，你可以为笔记添加标签并进行整理、向笔记添加图片、添加语音笔记，并显示你最初撰写笔记的位置。**印象笔记**的另一个优点是可以将你的笔记与印象笔记网站（以便你可以在电脑上管理笔记）以及你可能拥有的许多其他移动设备自动同步。


    | **提示：** iPad 自带的**备忘录**应用非常基础和实用。如果你需要一个更强大的笔记应用，能够排序、分类、导入项目（如 PDF、Word 等）、拥有文件夹、支持搜索等功能，那么你应该看看
    iPad 上的 App Store。搜索“笔记”，你会找到至少十多个与笔记相关的应用，价格从 0.99 美元起。 | ![images](img/p583-01.jpg)
    |


    #### 备忘录应用


    如果你和许多人一样，你的办公桌或墙上可能贴满了黄色的小便利贴——记录着各种能想到的待办事项。即使有了电脑，我们仍然倾向于留下这些小纸条作为提醒。iPad 的一大优点是，你可以在熟悉的黄色便签纸上书写笔记，然后将它们整齐地整理排序。你甚至可以将它们通过电子邮件发送给自己或他人，以确保信息不被遗忘。


    | iPad 上的**备忘录**应用为你提供了一个便利的地方来保存笔记和简单的“待办事项”列表。你还可以保存简单的列表，例如购物清单，或其他商店（如五金店或宠物店）的清单。如果你随身带着
    iPad，一旦想到需要添加的项目，就可以立即添加到这些列表中，并且可以随时访问和编辑。 | ![images](img/p584-01.jpg) |


    #### 同步备忘录


    你可以使用我们在第 3 章：“将你的 iPad 与 iTunes 同步”和第 4 章：“其他同步方法”中展示的方法，将备忘录与你的电脑或其他网站同步。图 24–1
    展示了一个使用 **iTunes** 将** Microsoft Outlook **中的笔记同步到 iPad 上**备忘录**应用的示例。同步笔记的好处在于，你可以在电脑上添加一条笔记，然后它就会“出现”在你的
    iPad 上。之后，当你外出时，你可以编辑那条笔记，并将其同步回你的电脑。你不再需要重新输入或记住事情。你总是随身带着 iPad，因此随时随地做笔记是永不遗忘重要事项的好方法。


    ![images](img/2401.jpg)


    **图 24–1**.  使用 **iTunes** 在 **Microsoft Outlook** 和 iPad **备忘录**应用之间同步笔记


    #### 开始使用备忘录


    ![images](img/p585-01.jpg)


    与其他任何应用一样，只需轻点**备忘录**图标即可启动它。


    启动**备忘录**应用后，你会看到一个典型的黄色记事本。


    你的**备忘录**会以标签的形式显示在列表中，可供点击。点击你想要查看或编辑的备忘录名称（参见图 24–2）。然后就会显示该备忘录的内容。


    你可以像在任何程序中一样在**备忘录**中滚动。你会注意到备忘录最后编辑的日期和时间显示在左上角。


    阅读完备忘录后，只需点击左上角的**备忘录**按钮即可返回**备忘录**主屏幕。


    ![images](img/2402.jpg)


    **图 24–2**.  在**备忘录**应用中导航


    ##### 多个备忘录账户


    如果你恰好同时通过 **iTunes** 同步至少一个 IMAP 电子邮件账户和你的电脑，那么你会看到来自每个账户的备忘录是分开存放的。这与你按电子邮件账户将联系人分到不同组，以及按电子邮件账户将日历分开存放的方式非常相似。


    | 要查看多个备忘录账户，你需要在**账户** **设置**屏幕中设置一个开关。当你在**设置** ![images](img/U001.jpg) **邮件、通讯录、日历**中设置你的
    IMAP 电子邮件账户时，你会看到将**备忘录**同步设为**开**或**关**的选项。要查看这些备忘录账户，你需要将**备忘录**开关设为**开**，如此处
    Gmail 账户所示。 | ![images](img/p586-01.jpg) |

    | 要查看不同的备忘录账户，请点击**备忘录**应用左上角的**账户**按钮。 | ![images](img/p587-01.jpg) |

    | 然后，在下一个屏幕上，你可以点击选项来查看**所有备忘录**或每个账户的备忘录。在此图像中，选项为** Gmail **或**来自我的 PC**（本例中是通过
    **iTunes** 从 **Microsoft Outlook** 同步的笔记）。你添加到某个账户的备忘录将保留在该账户下。例如，如果你向 **Gmail**
    添加了备忘录，那么这些备忘录只会显示在你的** Gmail **账户中。 | ![images](img/p587-02.jpg) |

