    \ Bluetooth stereo adapters, or a Bluetooth keyboard. Any Bluetooth headphones\
    \ should work well with your iPad. To start using any Bluetooth device, you need\
    \ to first pair (connect) it with your iPad.\n\n#### Turn on Bluetooth\n\nThe\
    \ first step to using Bluetooth is to turn the Bluetooth radio **ON**. Follow\
    \ these steps to do so:\n\n![images](images/p602-04.jpg)\n\n1.  Tap your **Settings**\
    \ icon.\n\n    ![images](images/p602-02.jpg)\n\n2.  Next, touch the **General**\
    \ tab in the left column.\n\n    ![images](images/p602-03.jpg)\n\n3.  You will\
    \ see the **Bluetooth** tab in the right-hand column. By default, Bluetooth is\
    \ initially **OFF** on the iPad. Tap the switch to move it to the **ON** position.\n\
    \n**TIP:** Bluetooth is an added drain on your battery. If you don't plan on using\
    \ Bluetooth for a period of time, think about setting the switch back to **OFF**.\n\
    \n![images](images/p603-01.jpg)\n\n#### Pairing an iPad with Headphones or Any\
    \ Bluetooth Device\n\nAs soon as you set Bluetooth to **ON**, the iPad will begin\
    \ to search for any nearby Bluetooth devices—like a Bluetooth headset or keyboard\
    \ (see [Figure 25–1](#Chapter25.html#fig_25_1)). For the iPad to find your Bluetooth\
    \ device, you need to put that device into *pairing mode*. Read the instructions\
    \ carefully that came with your headset—usually there is a combination of buttons\
    \ to push to achieve this.\n\n**TIP:** Some headsets require you to press and\
    \ hold a button for five seconds until you see a series of flashing blue or red/blue\
    \ lights. Some accessories, such as the Apple wireless Bluetooth keyboard, automatically\
    \ start up in pairing mode.\n\nOnce the iPad detects the Bluetooth device, it\
    \ will attempt to automatically pair with it. If pairing takes place automatically,\
    \ there is nothing more for you to do.\n\n![images](images/2501.jpg)\n\n**Figure\
    \ 25–1.** *A Bluetooth device discovered, but not yet paired*\n\nIf the image\
    \ in [Figure 25–2](#Chapter25.html#fig_25_2) stays unchanged, then tap the device\
    \ (e.g., the Motorola Stereo Bluetooth Headphones) to bring up a pop-up window\
    \ that asks for a pairing ID.\n\n**NOTE:** In the case of a Bluetooth device such\
    \ as a keyboard, you maybe asked to enter a randomly-generated series of numbers\
    \ (passkey) on the keyboard itself. Other devices may not ask for a PIN at all—just\
    \ touch the device name and the status will change to **Connected** (see [Figure\
    \ 25–2](#Chapter25.html#fig_25_2).)\n\n![images](images/2502.jpg)\n\n**Figure\
    \ 25–2.** *To pair a Bluetooth device, touch the listed device for the passkey\
    \ (if needed) or simply connect the device to the iPad.*\n\n| If the iPad asks\
    \ for a PIN or pass code to be entered, the keyboard will be displayed, and you\
    \ will need to enter the four-digit pass code supplied by the headset manufacturer.\
    \ Most devices use 0000 or 1234, which is why the iPad can try to automatically\
    \ pair with most devices. Check your headset documentation to learn the correct\
    \ pass code or PIN for your device. | ![images](images/p605-01.jpg) |\n\n### Bluetooth\
    \ Stereo (A2DP)\n\n| ![images](images/p605-02.jpg) | One of the great features\
    \ of today's advanced Bluetooth technology is the ability to stream your music\
    \ without wires via Bluetooth. The fancy name for this technology is A2DP, but\
    \ it is usually referred to as *Stereo Bluetooth*. |\n\n#### Connect to a Stereo\
    \ Bluetooth Device\n\nThe first step to using Stereo Bluetooth is to connect to\
    \ a capable Stereo Bluetooth device. This can be a car stereo with this technology\
    \ built in, or a pair of Bluetooth headphones or speakers.\n\nPut the Bluetooth\
    \ device into pairing mode per the manufacturer's instructions, and then go to\
    \ the Bluetooth settings page from the **Settings** icon, as demonstrate dearlier\
    \ in the chapter.\n\n| Once connected, you will see the new Stereo Bluetooth device\
    \ listed under your Bluetooth devices. Sometimes it will simply be listed as “Headset.”\
    \ Just touch the device and you will see the name of the actual device next to\
    \ the **Bluetooth** tab in the next screen, as shown here. | ![images](images/p605-03.jpg)\
    \ |\n| Next, tap your **iPod** icon and start any song, playlist, podcast, or\
    \ video music library. You will notice the **AirPlay** icon in the upper-left\
    \ corner of the screen (see Chapters 9 and 10 for more information on **AirPlay**).The\
    \ **AirPlay** icon also controls sending your music to a Bluetooth device.Tap\
    \ the **AirPlay** icon to see the available Bluetooth devices for streaming your\
    \ music (see [Figure 25–3](#Chapter25.html#fig_25_3)).**NOTE**: In both the **Now\
    \ Playing** view and the **Current** song view, the **Bluetooth** icon will be\
    \ up at the top, towards the right-hand side of the **Volume** bar. | ![images](images/p606-01.jpg)\
    \ |\n\n![images](images/2503.jpg)\n\n**Figure 25–3.** *Select a Bluetooth device.*\n\
    \nIn the previous screens, you learned how to select the **Motorola Bluetooth\
    \ Headset** by tapping it. Your music will now start to play from the selected\
    \ Bluetooth device. You can verify this by touching the **Bluetooth** icon on\
    \ the screen once more. You should see the **Speaker** icon next to the new Stereo\
    \ Bluetooth device, and you should hear your music coming from that sound source,\
    \ as well."
  trans: "\n# iPad 上的蓝牙\n\n在本章中，我们将向您展示如何将 iPad 与任何蓝牙设备配对，无论是另一台电脑、立体声音箱，还是无线键盘配件。许多\
    \ iPad 用户惊讶地发现，iPad 实际上标配了蓝牙 2.1 及其增强数据速率（EDR）技术。得益于名为 A2DP（立体声蓝牙）的技术，您还可以将音乐流式传输到兼容的蓝牙立体声设备。\n\
    \n**注意：** 您必须拥有兼容的第三方蓝牙适配器或蓝牙立体声设备，才能通过蓝牙技术流式传输音乐。此外，现在支持 AVRCP 配置文件，因此蓝牙设备上的许多音乐控制功能（包括\
    \ `Play`、`Pause` 或 `Skip`）都能正常工作。\n\n您可以将蓝牙视为一种短距离无线技术，它能让 iPad 无需线缆即可连接到各种外围设备。常见的设备包括耳机、电脑和车载音响系统。\n\
    \n蓝牙据信是以丹麦维京国王哈拉尔·蓝牙（Harald Blåtand）命名的，他的名字被翻译为 *Bluetooth*。蓝牙国王生活在十世纪，以统一丹麦和挪威而闻名。同样，蓝牙技术也统一了计算机和电信领域。根据传说，他的名字源于他非常黑的头发，这在维京人中并不常见。Blåtand\
    \ 意为深色肤色。还有一个更流行的故事，说这位国王非常喜欢吃蓝莓，以至于他的牙齿被染成了蓝色。\n\n我们使用以下链接作为此信息的来源；这些链接也是进一步了解蓝牙国王的好去处：\n\
    \n*   [`http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf`](http://cp.literature.agilent.com/litweb/pdf/5980-3032EN.pdf)\n\
    *   [`http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm`](http://www.cs.utk.edu/~dasgupta/bluetooth/history.htm)\n\
    *   [`http://www.britannica.com/eb/topic-254809/Harald-I`](http://www.britannica.com/eb/topic-254809/Harald-I)\n\
    \n## 了解蓝牙\n\n| 蓝牙让您的 iPad 能够与设备进行无线通信。蓝牙是一种小型无线电，从每个设备中发射信号。在使用外围设备与 iPad 搭配之前，您需要先将其与设备进行*配对*以建立连接。许多蓝牙设备可以在距离\
    \ iPad 最远 30 英尺的范围内使用。 | ![images](img/p602-01.jpg) |\n\n### 可与 iPad 配合使用的蓝牙设备\n\
    \n除其他外，iPad 可与蓝牙耳机、蓝牙立体声系统及适配器、蓝牙车载音响系统和蓝牙无线键盘配合使用。iPad 支持 A2DP，也就是*立体声蓝牙*。\n\n\
    **注意**：搭载 iOS 4.3 的 iPad 2 还可以与 iPhone 3GS 或 iPhone 4 配对，用于蓝牙网络共享。\n\n## 与蓝牙设备配对\n\
    \n您使用蓝牙的主要用途可能是蓝牙耳机、蓝牙立体声适配器或蓝牙键盘。任何蓝牙耳机都应能与您的 iPad 良好配合。要开始使用任何蓝牙设备，您需要先将其与 iPad\
    \ 配对（连接）。\n\n### 开启蓝牙\n\n使用蓝牙的第一步是打开蓝牙无线电开关 `ON`。请按照以下步骤操作：\n\n![images](img/p602-04.jpg)\n\
    \n1.  轻点 `Settings`（设置）图标。\n\n    ![images](img/p602-02.jpg)\n\n2.  接着，在左栏中触摸\
    \ `General`（通用）标签。\n\n    ![images](img/p602-03.jpg)\n\n3.  您会在右栏中看到 `Bluetooth`（蓝牙）标签。默认情况下，iPad\
    \ 上的蓝牙初始状态为 `OFF`（关闭）。轻点开关将其切换到 `ON`（开启）位置。\n\n**提示：** 蓝牙会额外消耗电池电量。如果您计划在一段时间内不使用蓝牙，请考虑将开关重新设置为\
    \ `OFF`（关闭）。\n\n![images](img/p603-01.jpg)\n\n### 将 iPad 与耳机或任何蓝牙设备配对\n\n一旦您将蓝牙设置为\
    \ `ON`（开启），iPad 就会开始搜索附近的蓝牙设备，例如蓝牙耳机或键盘（请参见[图 25–1]）要使 iPad 找到您的蓝牙设备，您需要将该设备置于*配对模式*。请仔细阅读耳机附带的说明书——通常需要按下某种组合按钮才能实现此操作。\n\
    \n**提示：** 有些耳机要求您按住一个按钮五秒钟，直到看到一系列闪烁的蓝色或红/蓝色灯光。某些配件，例如 Apple 无线蓝牙键盘，会自动以配对模式启动。\n\
    \n一旦 iPad 检测到蓝牙设备，它会尝试自动与之配对。如果配对自动完成，您就无需进行任何额外操作。\n\n![images](img/2501.jpg)\n\
    \n**图 25–1.** *已发现但尚未配对的蓝牙设备*\n\n如果[图 25–2]中的图像保持不变，请轻点该设备（例如 Motorola 立体声蓝牙耳机），以弹出一个要求输入配对\
    \ ID 的弹出窗口。\n\n**注意：** 对于键盘等蓝牙设备，您可能需要在键盘上输入一组随机生成的数字（通行码）。其他设备可能根本不需要 PIN 码——只需轻点设备名称，状态就会变为\
    \ `Connected`（已连接）（参见[图 25–2]）。\n\n![images](img/2502.jpg)\n\n**图 25–2.** *要配对蓝牙设备，请轻点列出的设备以输入通行码（如果需要），或直接将设备连接到\
    \ iPad。*\n\n| 如果 iPad 要求输入 PIN 码或通行码，键盘将会显示，您需要输入耳机制造商提供的四位通行码。大多数设备使用 0000 或\
    \ 1234，这就是为什么 iPad 可以尝试自动与大多数设备配对。请查看您的耳机文档，以了解您设备的正确通行码或 PIN 码。 | ![images](img/p605-01.jpg)\
    \ |\n\n## 蓝牙立体声（A2DP）\n\n| ![images](img/p605-02.jpg) | 当今先进蓝牙技术的一大特色是能够通过蓝牙无线传输音乐。这项技术的专业名称是\
    \ A2DP，但通常被称为*立体声蓝牙*。 |\n\n### 连接到立体声蓝牙设备\n\n使用立体声蓝牙的第一步是连接到兼容的立体声蓝牙设备。这可以是内置此技术的车载音响系统，也可以是一副蓝牙耳机或音箱。\n\
    \n按照制造商的说明将蓝牙设备置于配对模式，然后按照本章前面演示的方法，从 `Settings`（设置）图标进入蓝牙设置页面。\n\n| 连接后，您将看到新的立体声蓝牙设备列在您的蓝牙设备下。有时它会简单地显示为“Headset”（耳机）。只需轻点该设备，您会在下一个屏幕中\
    \ `Bluetooth`（蓝牙）标签旁边看到实际设备名称，如下所示。 | ![images](img/p605-03.jpg) |\n| 接下来，轻点您的\
    \ `iPod` 图标，开始播放任何歌曲、播放列表、播客或视频音乐库。您会注意到屏幕左上角的 `AirPlay` 图标（有关 `AirPlay` 的更多信息，请参见第\
    \ 9 章和第 10 章）。`AirPlay` 图标也控制着将音乐发送到蓝牙设备。轻点 `AirPlay` 图标，即可查看可用于流式传输音乐的蓝牙设备。**注意**：在\
    \ `Now Playing`（正在播放）视图和 `Current`（当前）歌曲视图中，`Bluetooth` 图标都会显示在顶部，靠近 `Volume`（音量）栏的右侧。\
    \ | ![images](img/p606-01.jpg) |\n\n![images](img/2503.jpg)\n\n**图 25–3.** *选择蓝牙设备。*\n\
    \n在前面的屏幕中，您学习了如何通过轻点来选择 `Motorola Bluetooth Headset`（摩托罗拉蓝牙耳机）。您的音乐现在将开始从选定的蓝牙设备播放。您可以通过再次触摸屏幕上的\
    \ `Bluetooth` 图标来确认这一点。您应该会在新的立体声蓝牙设备旁边看到 `Speaker`（扬声器）图标，并且您应该能够听到音乐从该音源发出。\n"
- fmt: "### Disconnect or Forget a Bluetooth Device\n\nSometimes, you might want to\
    \ disconnect a Bluetooth device from your iPad.\n\nIt is easy to do this. Get\
    \ into the Bluetooth settings as described earlier in this chapter. Touch the\
    \ device you want to disconnect from in order to bring up the next screen, then\
    \ tap the **Forget this Device** button and confirm your choice.\n\n**NOTE:**\
    \ Bluetooth has a range of only about 30 feet; if you are not nearby or using\
    \ a Bluetooth device, you should turn off `Bluetooth`. You can always turn it\
    \ back on when you are actually going to be using it.\n\nDoing this will delete\
    \ the Bluetooth profile from the iPad (see [Figure 25–4](#Chapter25.html#fig_25_4).)\n\
    \n![images](images/2504.jpg)\n\n**Figure 25–4.** *Forget or disconnect a Bluetooth\
    \ device.*\n\n## Chapter 26\n\n## New Media: Reading Newspapers, Magazines, and\
    \ More\n\nIn [Chapter 12](#Chapter12.html#ch12), we spoke about how the iPad has\
    \ revolutionized the world of reading. The iPad is not only unparalleled in the\
    \ realm of reading E-Books, but it is also unparalleled in dealing with new media\
    \ such as online newspapers and magazines, PDF files, and more.\n\nIn this chapter,\
    \ we will explore how to enjoy new media with your iPad and its vivid screen and\
    \ terrific touch interface. The iPad is even set to revitalize the comic book\
    \ industry with comic books that look beautiful and are amazingly interactive.\n\
    \n### Newspapers on the iPad\n\nRemember the days when newspapers were delivered\
    \ to the house? Invariably, if there was one puddle in the sidewalk, that was\
    \ where the newspaper landed! You took it out of that plastic bag, shook it off,\
    \ and tried to make out what was in section two—the section that got soaked.\n\
    \n#### Enter the iPad Interactive Newspaper\n\nWell, those days may be gone forever.\
    \ Users now have the opportunity to interact with their news and even get their\
    \ paper delivered every day—but to their iPad instead of their driveway.\n\nNew\
    \ this year is an iPad-only newspaper from News Corps.: **The Daily**. `The Daily`\
    \ is a highly interactive news app that is delivered new each morning (currently\
    \ US only) right to your iPad.\n\nMany newspapers are developing apps for the\
    \ iPad, with new apps seeming to appear every day. We will also take a quick look\
    \ at several apps for the iPad from the largest newspapers in the United States\
    \ and examine how they revolutionize reading the news (see [Figure 26–1](#Chapter26.html#fig_26_1)).\n\
    \n![images](images/2601.jpg)\n\n**Figure 26–1.** *The front pages of various newspaper\
    \ apps*\n\n#### The Daily\n\n`The Daily` deserves special mention because it is\
    \ the first (of most likely many) iPad-specific daily newspapers. The app is free\
    \ to download in the App Store, and it comes with a free trial of two weeks to\
    \ a month or so.\n\n![images](images/p610-01.jpg)\n\nAfter the free trial, `The\
    \ Daily` reverts to a subscription model—not unlike a traditional newspaper. However,\
    \ the rates are more favorable than a traditional newspaper at this time—just\
    \ $.99 a week or $39.99 for an entire year.\n\nWhen you touch the icon for `The\
    \ Daily` app, you will first see that the days' news is being retrieved and delivered\
    \ to the iPad.\n\n![images](images/p610-02.jpg)\n\nOnce the news is delivered,\
    \ navigating `The Daily` is quite intuitive. The experience starts with a typical\
    \ `Front Page` section that displays the main story of the day.\n\nAt the top,\
    \ however, you can quickly jump sections to `News`, `Gossip`, `Opinion`, `Arts\
    \ and Life`, `Apps and Games`, or `Sports`. Just touch the desired section at\
    \ the top of the `Front Page` to jump there.\n\n![images](images/p611-01.jpg)\n\
    \nAt the top is a `Visual Browser`. Touch the very top of any article and you\
    \ can see small thumbnails of all the pages of `The Daily`. Just scroll through\
    \ and find the page that interests you.\n\n![images](images/p611-02.jpg)\n\nTapping\
    \ the button in the upper-right corner opens up `The Carousel` view, which allows\
    \ you to browse `The Daily` in large `page-by-page` images.\n\n![images](images/p611-03.jpg)\n\
    \nThe lower-right corner has a button for the `Control Panel`. This allows you\
    \ to watch a daily video, listen to stories read aloud, or autoplay through `The\
    \ Carousel` to find a story that interest you.\n\n![images](images/p612-01.jpg)\n\
    \nTap the `Share` icon ![images](images/p612-02.jpg) and you can easily share\
    \ a web-friendly version of the story with e-mail contacts, Facebook Friends,\
    \ or on Twitter.\n\n![images](images/p612-03.jpg)\n\n#### Popular Choices: The\
    \ New York Times, The Wall Street Journal, and USA Today\n\nEach of these three\
    \ papers has a circulation of millions of readers, and each has taken a different\
    \ approach to bringing you the news on the iPad.\n\n**NOTE:** You can always go\
    \ and visit the dedicated web site for any news source. Some are optimized for\
    \ the iPad, while others offer you a full web experience. Others will require\
    \ registration and/or a paid subscription to view the paper's full content.\n\n\
    You must first follow several steps in the App Store to find, download, and install\
    \ a news app on the iPad:\n\n![images](images/p613-01.jpg)\n\n1.  The first step\
    \ is to locate your desired news app in the App Store. You may find one or more\
    \ news apps in the `Featured` section.\n2.  Next, touch the `Categories` button\
    \ at the bottom of the page and then touch the `News` icon. This takes you to\
    \ all the news apps in the App Store. Browse or search for your desired news app,\
    \ just as you would for any other app.\n3.  Once you locate the desired news app,\
    \ download it as you would any other app.\n\n    **NOTE:** Many news apps are\
    \ free. Others are free to try, but require you to buy them to continue receiving\
    \ them. Still others offer limited free content, but you need to subscribe to\
    \ gain access to the full content.\n\n4.  Once the app is downloaded, touch its\
    \ icon to start it."
