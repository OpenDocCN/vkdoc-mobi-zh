    \ icon with number next to it) in the bottom of the **Contact** screen.\n\n  \
    \  ![images](images/p376-03.jpg)\n\n6.  You know you have linked contacts because,\
    \ instead of seeing **Info** at the top, it now says **Unified Info.** Tap the\
    \ **Done** button in the upper-right corner to save the linking of contacts.\n\
    \n![images](images/p376-04.jpg)\n\nWhen you're done, you will now see only a single\
    \ contact entry for all the contacts you have linked together. You know these\
    \ are linked or *Unified* contacts because there is a **Unified Info** link at\
    \ the bottom and a **Person** icon with a number showing the number of linked\
    \ contacts (see [Figure 14–3](#Chapter14.html#fig_14_3)).\n\n![images](images/1403.jpg)\n\
    \n**Figure 14–3.** *Viewing linked contacts on your iPad*\n\n**TIP**: Learning\
    \ the names of the parents of your school-age children's friends can be fairly\
    \ challenging. In the First field, however, you can add not just the name of your\
    \ child's friend, but the names of the child's parents, as well (e.g., **First:\
    \ Samantha (Mom: Susan, Dad: Ron)**). Then, in the Company field, add the name\
    \ of your child and “school friend” (e.g., **Cece school friend**). Now just typing\
    \ your child's name in your **All Contacts** search box instantly finds every\
    \ person you've ever met at your child's school. Now you can say, “Hello, Susan,\
    \ great to see you again!” without missing a beat. *Try your best to covertly\
    \ look up the name!*\n\n### Sharing Contacts\n\nIf someone asks you for contact\
    \ information from your iPad, there is no need to copy and paste it or read it\
    \ out loud. Instead, you can click the **Share** button and email it to this person\
    \ as an email attachment. The attachment is sent in a vCard (`.vcf`) format, which\
    \ is a standard format for electronic business cards. Follow these steps to share\
    \ contact information:\n\n1.  Open your **Contacts** list and locate the contact\
    \ you wish to send.\n2.  Tap the **Share** button under the contact details.\n\
    \n    ![images](images/p378-01.jpg)\n\n3.  Next, address the email message and\
    \ send it. You have now sent all the contact details in vCard (`.vcf`) format.\
    \ Your recipient should be able to open the email message and tap (or save) the\
    \ contact information to add it to her own contact list—all without retyping anything!\n\
    \n![images](images/p378-02.jpg)\n\n### Start a FaceTime Video Call with a Contact\n\
    \nIf you like to use **FaceTime** to make video calls, you can do that right from\
    \ your **Contacts** list. Open up your **Contacts** list and locate the contact.\
    \ Next, tap the **FaceTime** button at the bottom of the **Contact** details screen.\n\
    \n![images](images/p378-03.jpg)\n\nTo learn all about **FaceTime** calls, please\
    \ see [Chapter 18](#Chapter18.html#ch18): “FaceTime Video Messaging and Skype.”\n\
    \n### Making a Contact a FaceTime Favorite\n\nIf you use **FaceTime** video chat\
    \ a lot with someone, you may want to make her a *Favorite*. To do this, open\
    \ up your **Contacts** list and locate the contact. Next, tap the **Add to Favorites**\
    \ button at the bottom of the **Contact** details screen.\n\n![images](images/p379-01.jpg)\n\
    \n### Deleting Contacts\n\nSometimes, you want to get rid of contacts on your\
    \ iPad. Follow these steps to do so:\n\n**CAUTION:** Remember that, if you sync\
    \ your contacts to your computer or online **Contacts** list, then deleting a\
    \ contact from your iPad will also delete that contact from your computer or online\
    \ contact list (e.g., Google or Hotmail).\n\n1.  Locate the contact you wish to\
    \ delete and tap the **Edit** button under the **Contact** details screen.\n\n\
    \    ![images](images/p379-02.jpg)\n\n2.  Scroll all the way to the bottom of\
    \ the **Edit Contact** screen to see the **Delete Contact** button. Tap **Delete\
    \ Contact**.\n\n    ![images](images/p379-03.jpg)\n\n3.  You may then see a pop-up\
    \ confirmation. Tap **Delete** to remove this contact.\n\n![images](images/p380-01.jpg)\n\
    \n### Searching Your Contacts\n\nLet's say you need to find a specific phone number\
    \ or email address. Just touch your **Contacts** icon as described previously,\
    \ and you'll see a **Search** box at the top of your **All Contacts** list (see\
    \ [Figure 14–4](#Chapter14.html#fig_14_4)).\n\n![images](images/1404.jpg)\n\n\
    **Figure 14–4.** *The **Search** box for **All Contacts***\n\nEnter the first\
    \ few letters of any of these three searchable fields:\n\n*   First Name\n*  \
    \ Last Name\n*   Company Name\n\nThe iPad begins to filter immediately and displays\
    \ only those contacts that match the letters typed.\n\n![images](images/p380-02.jpg)\n\
    \n**TIP:** To further narrow the search, hit the space key and type a few more\
    \ letters.\n\nWhen you see the correct name, just touch it and that individual's\
    \ contact information will appear.\n\n#### Quickly Jump to a Letter by Tapping\
    \ and Sliding on the Alphabet\n\nIf you hold your finger on the alphabet on the\
    \ left edge of the screen and drag it up or down, you can jump to that letter.\n\
    \n#### Search by Flicking\n\nIf you don't want to manually input letters, you\
    \ can just move your finger and flick from the bottom up to see your contacts\
    \ move quickly on the screen. Just continue to flick or scroll until you see the\
    \ name you want. Tapa name and the contact information will appear."
  trans: "\n### 关联名片（统一联系人）\n\n**注意：** 仅当你在 iPad 上设置了至少两个独立的联系人账户，并且不同账户中有重名的联系人的“姓”和“名”（但前缀、后缀或中间名不能不同）时，**“关联”**（**“统一联系人”**\
    \ 视图）功能才会出现。例如，如果你有一个 Gmail 账户和一个 Exchange 或 iTunes 同步的联系人账户，且两者都有名为“John Smith”的联系人，那么\
    \ iPad 上的**“通讯录”**应用将在**“编辑”**屏幕底部显示**“关联”**选项，如本节所示。\n\n随着你的**“通讯录”**列表随时间增长，最终出现多个包含部分信息的重复联系人条目是很常见的。例如，你可能根据某人的电子邮件地址或手机号添加了一个新联系人，但之前已经用略有不同的名字（例如，**Peter**\
    \ 与 **Pete**）保存了他的信息。\n\n![images](img/p375-01.jpg)\n\n在 iPad 上，你可以合并或*关联*两个或多个名片，以查看\
    \ iPad 所谓的*统一联系人*中的所有信息。请按照以下步骤来关联名片：\n\n1.  选择其中一个重复的联系人条目，然后轻点**“联系人”**详情屏幕下的**“编辑”**按钮。\n\
    \n    ![images](img/p375-02.jpg)\n\n2.  进入编辑联系人界面后，轻点屏幕底部的**“关联名片”**按钮（一个带加号的**“人物”**图标）。\n\
    3.  接下来，找到并轻点正确的联系人。你可以通过轻点顶部的**“群组”**按钮选择其他群组，使用顶部的**“搜索”**窗口，或向上或向下滑动来查找联系人。\n\
    \n    ![images](img/p376-01.jpg)\n\n4.  现在你可以看到所选联系人的详细信息，并通过轻点右上角的**“关联”**来确认关联联系人。如果这不是你要关联的联系人，请按右上角的**“所有联系人”**按钮并选择另一个联系人。\n\
    \n    ![images](img/p376-02.jpg)\n\n5.  要关联更多联系人或取消关联联系人，请轻点**“联系人”**屏幕底部的**“关联和取消关联联系人”**按钮（一个旁边带有数字的**“人物”**图标）。\n\
    \n    ![images](img/p376-03.jpg)\n\n6.  你可以识别出已关联的联系人，因为屏幕顶部显示的不再是**“信息”**，而是**“统一信息”**。轻点右上角的**“完成”**按钮以保存关联操作。\n\
    \n![images](img/p376-04.jpg)\n\n完成后，对于所有关联在一起的联系人，你只会看到一个单独的联系人条目。你可以通过底部的**“统一信息”**链接和显示已关联联系人数量的**“人物”**图标（参见图\
    \ 14–3）来识别这些已关联或*统一*的联系人。\n\n![images](img/1403.jpg)\n\n**图 14–3.** *在 iPad 上查看关联的联系人*\n\
    \n**提示：** 记住学龄孩子朋友父母的名字相当有挑战性。但是，在“名字”字段中，你不仅可以添加孩子朋友的名字，还可以添加其父母的名字（例如，**名字：Samantha\
    \ (妈妈：Susan, 爸爸：Ron)**）。然后，在“公司”字段中，添加你孩子的名字和“学校朋友”（例如，**Cece 学校朋友**）。现在，只需在**“所有联系人”**搜索框中输入你孩子的名字，就能立刻找到你在孩子学校见过的每一个人。这样你就可以自然而然地打招呼：“你好，Susan，很高兴再次见到你！”\
    \ *尽力不动声色地查看名字！*\n\n### 共享联系人\n\n如果有人向你要 iPad 上的联系人信息，无需复制粘贴或大声朗读。相反，你可以轻点**“共享”**按钮，以电子邮件附件的形式发送给他。附件将以\
    \ vCard (`.vcf`) 格式发送，这是一种电子名片的标准格式。请按照以下步骤共享联系人信息：\n\n1.  打开你的**“通讯录”**列表，找到你想要发送的联系人。\n\
    2.  轻点联系人详情下的**“共享”**按钮。\n\n    ![images](img/p378-01.jpg)\n\n3.  接下来，填写邮件地址并发送。现在，你已经将联系人详情以\
    \ vCard (`.vcf`) 格式全部发送出去。收件人应该能够打开电子邮件，并轻点（或保存）该联系人信息以将其添加到自己的联系人列表中——完全无需重新输入任何内容！\n\
    \n![images](img/p378-02.jpg)\n\n### 与联系人开始 FaceTime 视频通话\n\n如果你喜欢使用**“FaceTime”**进行视频通话，可以直接从**“通讯录”**列表中发起。打开你的**“通讯录”**列表并找到该联系人。接着，轻点**“联系人”**详情屏幕底部的**“FaceTime”**按钮。\n\
    \n![images](img/p378-03.jpg)\n\n要了解关于**“FaceTime”**通话的所有信息，请参阅第 18 章：“FaceTime\
    \ 视频消息和 Skype”。\n\n### 将联系人设为 FaceTime 个人收藏\n\n如果你经常与某人使用**“FaceTime”**视频聊天，你可能想将其设为*个人收藏*。为此，打开你的**“通讯录”**列表并找到该联系人。接着，轻点**“联系人”**详情屏幕底部的**“添加到个人收藏”**按钮。\n\
    \n![images](img/p379-01.jpg)\n\n### 删除联系人\n\n有时，你想删除 iPad 上的联系人。请按照以下步骤操作：\n\n\
    **注意：** 请记住，如果你将联系人同步到电脑或在线**“通讯录”**列表，那么从 iPad 上删除一个联系人也会从你的电脑或在线联系人列表（例如，Google\
    \ 或 Hotmail）中删除该联系人。\n\n1.  找到你想要删除的联系人，并轻点**“联系人”**详情屏幕下的**“编辑”**按钮。\n\n    ![images](img/p379-02.jpg)\n\
    \n2.  向下滚动到**“编辑联系人”**屏幕的底部，找到**“删除联系人”**按钮。轻点**“删除联系人”**。\n\n    ![images](img/p379-03.jpg)\n\
    \n3.  此时可能会弹出一个确认对话框。轻点**“删除”**以移除该联系人。\n\n![images](img/p380-01.jpg)\n\n### 搜索联系人\n\
    \n假设你需要查找特定的电话号码或电子邮件地址。只需按之前所述轻点你的**“通讯录”**图标，你就会在**“所有联系人”**列表顶部看到一个**“搜索”**框（参见图\
    \ 14–4）。\n\n![images](img/1404.jpg)\n\n**图 14–4.** *用于搜索**“所有联系人”**的**“搜索”**框*\n\
    \n输入以下三个可搜索字段中任意一个的前几个字母：\n\n*   名字\n*   姓氏\n*   公司\n\niPad 会立即开始筛选，并仅显示与键入字母匹配的联系人。\n\
    \n![images](img/p380-02.jpg)\n\n**提示：** 要进一步缩小搜索范围，请按空格键并再键入几个字母。\n\n当看到正确的名字时，只需轻点它，该联系人的信息就会显示出来。\n\
    \n#### 通过轻点并滑动字母快速跳转到某个字母\n\n如果你将手指放在屏幕左边缘的字母表上并向上或向下拖动，就可以跳转到那个字母。\n\n#### 通过滑动搜索\n\
    \n如果你不想手动输入字母，只需移动手指从底部向上滑动，即可让屏幕上的联系人快速滚动。继续滑动或滚动，直到看到你想要的名字。轻点一个名字，联系人信息就会显示出来。\n"
- fmt: '# Search Using Groups


    If you have your contacts sorted by groups on your PC or Mac and you sync your
    iPad with the computer, those groups will be synced to your iPad. Just touch the
    `Groups` tab at the top left of the `All Contacts` window and select which group
    you''d like to search within.


    ![images](images/p381-01.jpg)


    This example shows two groups—one is from a Microsoft Exchange account (i.e.,
    a company email account), and one is from regular contacts.


    ![images](images/p381-02.jpg)


    If you have an Exchange ActiveSync account and your company has enabled it, your
    Exchange Global Address List shows up under the `Groups` tab, as well. You can
    search to find anyone in your company there.


    **NOTE:** You can''t create groups on the iPad. Instead, they must be created
    on your computer or on another contact list (e.g., a MobileMe web site or `Outlook`)
    and synced to your iPad.


    ## Adding Contacts from Emails


    Often you''ll receive an email and realize that the contact is not in your address
    book. Adding a new contact from an email is easy.


    Open the email from the contact you''d like to add to your `Contacts` list. Then,
    in the email''s From field, touch the name of the sender next to the `From:` tag.


    ![images](images/p382-01.jpg)


    If the sender is not in your address book, you''ll be taken to a screen that lets
    you choose whether to add that email address to an existing contact or to create
    a new one.


    If you select `Create a New Contact`, you''ll be taken to the same `New Contact`
    screen we saw earlier (see [Figure 14–1](#Chapter14.html#fig_14_1)).


    But suppose this is someone''s personal email address, and you already have an
    entry for that person with the work email. In that case, you would select `Add
    to Existing Contact` and choose the correct person. Next, you''d give this email
    address a tag—*personal*, in this case.


    ![images](images/p382-02.jpg)


    ## Sending a Picture to a Contact


    If you want to send a picture to a contact, you will need to do that from the
    `Photos` app (see [Chapter 16](#Chapter16.html#ch16): “iPad Photography”).


    ## Sending an Email Message from Contacts


    Since many of the core apps (`Contacts`, `Mail`, and `Messages`) are fully integrated,
    one app can easily launch another. So, if you want to send an email to one of
    your contacts, open the contact and tap the email address. The `Mail` app will
    launch, and you can compose and send an email message to this person.


    Start your `Contacts` by touching the `Contacts` icon. Either search or flick
    through your contacts until you find the contact you need.


    ![images](images/p383-01.jpg)


    In the contact information, touch the email address of the contact you''d like
    to use.


    You''ll see that the `Mail` program launches automatically with the contact''s
    name in the To: field of the email. Type and send the message.


    ![images](images/p383-02.jpg)


    ## Showing Your Contacts Addresses on the Map


    One of the great things about the iPad is its integration with the `Google Maps`
    app. This is very evident in the `Contacts` app. Let''s say you want to map the
    home or work address of any contact in your address book. In the old days (pre-iPad),
    you''d have to use Google or MapQuest or some other service and laboriously retype
    or copy and paste the address information. It was very time-consuming; fortunately,
    you don''t have to do this on the iPad.


    Simply open the contact as you did earlier. This time, touch the address at the
    bottom of the contact information.


    ![images](images/p383-03.jpg)


    Your `Maps` app (which is powered by `Google Maps`) immediately loads and drops
    a `Pushpin` icon at the exact location of the contact. The contact name will appear
    above the `Pushpin`.


    ![images](images/p383-04.jpg)


    ![images](images/p384-01.jpg)


    Touch the tab on the top of the `Pushpin` to get to the `Info` screen.


    Now you can select `Directions To Here` or `Directions From Here`.


    Next, type the correct start or end address and touch the `Route` button in the
    lower-right corner. If you decide you don''t want the directions, just tap the
    `Clear` button in the top left.


    What if you have just typed the address in your `Maps` app, but have not clicked
    away from your `Contacts` list? In that case, you might want to touch `Add to
    Contacts` to add this address.


    ![images](images/p384-02.jpg)


    **TIP:** To return to your contact information, tap the `Home` button and then
    tap `Contacts`.


    ## Changing Your Contact Sort Order and Display Order


    Like other settings, the options for the `Contacts` are accessible via the `Settings`
    icon.


    Touch the `Settings` icon, scroll down to `Mail, Contacts, Calendars`, and touch
    the tab.


    Scroll down and you''ll see `Contacts` with two options underneath. To change
    the sort order, touch the `Sort Order` tab and select whether you want your contacts
    sorted first by first name or last name.


    ![images](images/p384-03.jpg)


    You may want to change how your contacts are displayed. Here''s where you get
    it done; you can choose `First, Last` or `Last, First`. Tap the `Display Order`
    tab and choose whether you want your contact displayed in first-name or last-name
    order. Tap the `Mail, Contacts…` button in the upper-left corner to save your
    settings changes.


    ![images](images/p385-01.jpg)


    ## Searching for Global Address List Contacts


    Sometimes you will want to search your Global Address List (GAL) contacts. Open
    your `Contacts` app as you normally would and touch the `Groups` button in the
    top-left corner. Look for the group that has `Global` next to it in your `Group`
    list and touch it. This gives you access to your Global Address List if you are
    connected to your organization''s server.


    ![images](images/p385-02.jpg)


    ## Contact Troubleshooting


    Sometimes, your `Contacts` app might not work the way you expect. If you don''t
    see all your contacts, review the steps in the [Chapter 3](#Chapter03.html#ch3):
    “Sync Your iPad with iTunes” or [Chapter 4](#Chapter04.html#ch4): “Other Sync
    Methods” to learn how to sync with your `Address Book` application. Make sure
    you have selected `All Groups` in the settings in `iTunes`.


    **TIP:** If you are syncing with another contact application, such as `Contacts`
    in Gmail, make sure you select the option closest to `All Contacts`, rather than
    a subset like a particular group.


    ### When Global Address List Contacts Don''t Show Up


    This next section is for Microsoft Exchange users. Sometimes you may encounter
    a problem where your GAL contacts don''t show up. If this happens, begin by making
    sure you are connected to a Wi-Fi or 3G cellular data network.


    Next, check your Exchange settings and verify you have the correct server and
    login information. To do so, tap the `Settings` button, then scroll to and touch
    `Mail, Contacts, and Calendar`. Find your Exchange account on the list and touch
    it to look at the settings. You may need to contact technical support at your
    organization to make sure your Exchange settings are correct.


