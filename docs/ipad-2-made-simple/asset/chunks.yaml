  trans: "\n#### 使用您的 iTunes 账户重新注册\n\n每台 iPad 都与一个 iTunes 账户相关联或绑定。这种关联使您能够使用 iPad\
    \ 购买 iTunes 音乐、视频以及应用程序。也正是这种关联，让您能够从计算机上播放 `iTunes` 账户中的音乐并在 iPad 上收听。\n\n有时，您的\
    \ iPad 可能会“丢失”与 `iTunes` 服务的注册信息和连接。通常，这个问题很容易解决。只需通过 USB 线将 iPad 连接到计算机，`iTunes`\
    \ 应用就会引导您完成将 iPad 与 `iTunes` 账户重新关联的流程。我们将在第 1 章：“入门指南”中展示如何执行此操作的详细步骤。\n\n如果您在通过\
    \ iTunes 注册 iPad 时遇到问题，苹果公司提供了一个在线资源，您可以通过计算机或 iPad 的网络浏览器访问。\n\n您可以通过以下网址访问该站点：\n\
    \n[`https://register.apple.com/cgi-bin/WebObjects/GlobaliReg.woa`](https://register.apple.com/cgi-bin/webobjects/globalireg.woa)\n\
    \n您应该会看到一个类似于图 28–4 所示的屏幕。\n\n![images](img/2804.jpg)\n\n**图 28–4.** *来自苹果登录页面的在线注册网站*\n\
    \n访问苹果在线注册网站后，请遵循以下步骤：\n\n1.  填写信息，输入您的 Apple ID 和密码，然后点击**继续**。\n2.  选择您要注册**一件产品**还是**多件产品**。在本例中，我们选择了**一件产品**（参见图\
    \ 28–5）。\n\n    ![images](img/2805.jpg)\n\n    **图 28–5.** *苹果在线注册网站上的步骤 1*\n\n\
    3.  现在，选择类别、产品系列和产品。在本例中，我们选择了 **iPad** 类别、**iPad** 产品系列和 **iPad Wi-Fi**。这使我们一次性完成了步骤\
    \ 2-4（参见图 28–6）。\n\n    ![images](img/2806.jpg)\n\n    **图 28–6.** *苹果在线注册网站上的步骤\
    \ 2-4*\n\n4.  现在，您需要输入 iPad 序列号以及其他有关您将如何使用 iPad 的信息。\n\n    **提示：** 要查找序列号，请将\
    \ iPad 连接到计算机并加载 `iTunes` 应用。在左侧导航栏中点击您的 iPad，然后在顶部导航栏中点击**摘要**。序列号位于**摘要**屏幕的顶部（参见图\
    \ 28–7）。\n\n    ![images](img/2807.jpg)\n\n    **图 28–7.** *在 `iTunes` 中定位您的 iPad\
    \ 序列号及苹果在线注册网站上的步骤 5*\n\n5.  现在点击**继续**，您应该已成功注册 iPad。\n\n### iPad 未显示在 iTunes\
    \ 中\n\n有时，当您将 iPad 连接到 PC 或 Mac 时，您的 iPad 可能无法在 `iTunes` 屏幕中被识别。\n\n在第一个屏幕中——这是您应该看到的——您的\
    \ iPad 会列在“设备”下（参见图 28–8）。在第二个屏幕截图中，您会注意到即使 iPad 已连接到计算机，也没有显示任何设备。\n\n![images](img/2808.jpg)\n\
    \n**图 28–8.** *验证您的 iPad 在连接到计算机时是否列于 `iTunes` 的左侧导航栏中*\n\n如果未看到您的设备列出，请遵循以下步骤：\n\
    \n1.  通过查看**主屏幕**右上角的电池电量来检查 iPad 的电池电量。如果电池电量耗尽太多，`iTunes` 需要等到电池电量稍微回升后才能检测到它。\n\
    2.  如果电池已充电，请尝试将 iPad 连接到计算机上的另一个 USB 端口。有时，如果您一直使用某个 USB 端口连接 iPad，而换到另一个端口，计算机可能无法识别。\n\
    3.  如果这仍然无法解决问题，请尝试断开 iPad 并重新启动计算机。然后，将 iPad 重新连接到 USB 端口。\n4.  如果这仍然不起作用，请下载\
    \ `iTunes` 的最新更新，或者完全卸载并重新在计算机上安装 `iTunes`。如果您选择此选项，请确保备份 `iTunes` 中的所有信息。\n5.\
    \  我们在第 26 章：“附赠 iTunes 用户指南”的“升级 iTunes”部分中，包含了如何升级到最新版本 `iTunes` 的详细步骤。\n\n\
    ### 同步问题\n\n有时，您在将 iPad 与计算机（PC 或 Mac）同步时可能会遇到错误。请遵循以下步骤尝试解决此类问题：\n\n1.  首先，请遵循我们在“iPad\
    \ 未显示在 iTunes 中”部分中概述的所有步骤。\n2.  如果 iPad 仍然无法同步，但您能在 `iTunes` 的左侧导航栏中看到它，请返回第\
    \ 3 章：“将 iPad 与 iTunes 同步”并非常仔细地检查您的同步设置。\n\n#### 解决 Apple Mobile Me 或 Microsoft\
    \ Exchange 问题\n\nMicrosoft Exchange 是通常由企业管理员设置的推送式电子邮件和内容服务器。`Mobile Me` 是苹果公司自己的无线同步程序（需付费）供您设置。此程序将保持您的信息无线同步。但是，如果您使用\
    \ `Mobile Me` 或 Exchange 同步个人信息，则无法通过 `iTunes` 同步这些信息。\n\n在您的 iPad 上，前往**设置**图标，然后在左侧栏中点击**邮件、通讯录、日历**。\n\
    \n如果设置了 `Mobile Me` 或 Exchange，它将显示在右侧栏顶部的**账户**列表中。如果在列表中未看到其中任何一个，则说明您未使用它们同步\
    \ iPad。\n\n如果您确实看到了这些项目之一，请点击该账户，然后取消勾选您希望改为通过 `iTunes` 同步的任何类别或项目。\n\n现在，当您返回\
    \ `iTunes` 时，这些类别应会作为 Microsoft 同步选项显示。\n\n**注意：** 如果您在 Mobile Me 或 Exchange 账户中取消勾选或取消选择**日历**或**通讯录**，则在通过\
    \ `iTunes` 从计算机设置同步之前，您将无法在 iPad 上看到这些信息（参见第 3 章：“将 iPad 与 iTunes 同步”）。\n"
- fmt: "### Reinstalling the iPad Operating System (With or Without a Restore)\n\n\
    Sometimes, you might have to do a clean install of your iPad operating system\
    \ to get your iPad back up and running smoothly.\n\n**Tip**: This process is virtually\
    \ identical to the process to update your iPad with a new version of the operating\
    \ system.\n\nDuring this process you will have three choices:\n\n1. If you want\
    \ to get the iPad back to its normal state with all your data, you will have to\
    \ use the `iTunes` Restore function.\n2. If you plan on getting a clean start\
    \ and tying the iPad to an `iTunes` account, you would use the “Setup a new iPad”\
    \ function at the end of this process.\n3. If you plan on giving away or selling\
    \ your iPad, then you would simply eject the iPad from `iTunes` at the end of\
    \ this process (before doing a restore or new setup).\n\n**CAUTION:** This “restore\
    \ process” will wipe your iPad totally clean. You will need to resynchronize and\
    \ re-install all of your apps and re-enter your account information, such as the\
    \ details of your email accounts. This process could take 30 minutes or longer,\
    \ depending on how much information you have synced to your iPad.\n\nFollow these\
    \ steps to re-install the iPad operating system software with the option of restoring\
    \ data to your iPad from a previous backup:\n\n1. Connect your iPad to your computer\
    \ and load up `iTunes`.\n2. Click your **iPad** in the `DEVICES` category in the\
    \ Left Nav Bar.\n3. Click **Summary** in the Top Nav Bar.\n4. Now you will see\
    \ the iPad's **Information** screen. Click the **Restore** button in the middle\
    \ screen (see [Figure 28–9](#Chapter28.html#fig_28_9)).\n \n![images](images/2809.jpg)\n\
    \ \n**Figure 28–9.** *Connecting your iPad and clicking the **Restore** button\
    \ in `iTunes` in the **Summary** screen*\n\n5. Now you may be asked if you want\
    \ to back up your iPad. Click **Backup** just to be safe.\n6. You may then be\
    \ warned that all data will be erased. Click **Restore** to continue (see [Figure\
    \ 28–10](#Chapter28.html#fig_28_10)).\n \n![images](images/2810.jpg)\n \n**Figure\
    \ 28–10.** *Backing-up before you restore in `iTunes`*\n\n7. You will now see\
    \ an **iPad Software Update** screen. Click **Next** ![images](images/U001.jpg)\
    \ to continue.\n8. Next, you will see the **Software License Agreement** screen.\
    \ Click **Agree** to continue and start the process.\n9. Now, `iTunes` will download\
    \ the latest iPad software, back up and sync your iPad, and then re-install the\
    \ iPad software completely. This process will erase all data and restore your\
    \ iPad to its original “clean” state. You will see status messages at the top\
    \ of `iTunes` similar to the one shown in [Figure 28–11](#Chapter28.html#fig_28_11).\n\
    \ \n![images](images/2811.jpg)\n \n**Figure 28–11.** *The software update/restore\
    \ process: the status window at top of `iTunes`*\n\n10. After your iPad is backed\
    \ up and synced, its screen will go black. The Apple logo will appear, and you\
    \ will see a status bar under the logo. Finally, a small pop-up window will appear\
    \ in `iTunes` to tell you the update process is complete. Click **OK** to be brought\
    \ to the **Set Up your iPad** screen (see [Figure 28–13](#Chapter28.html#fig_28_13)):\n\
    \n    - If you want to keep your iPad clean (i.e., without any of your personal\
    \ data), then select the top option, **Setup as a new iPad**. You might want to\
    \ use this option if you are setting up this iPad for someone else (you will need\
    \ the person's Apple ID and password).\n    - If you are giving away or selling\
    \ your iPad, simply click the **Eject** icon next to the iPad and you're done\
    \ (see [Figure 28–12](#Chapter28.html#fig_28_12)).\n \n![images](images/2812.jpg)\n\
    \ \n**Figure 28–12.** *Ejecting the iPad if you are giving it away or selling\
    \ it*\n\n    - Select **Restore from the backup of:** and verify the pulldown\
    \ option is set to the correct device.\n\n11. Finally, click **Continue** (see\
    \ [Figure 28–13](#Chapter28.html#fig_28_13)).\n \n![images](images/2813.jpg)\n\
    \ \n**Figure 28–13.** *Setting up a device as a new iPad or restoring from a backup\
    \ file*\n\n12. If you chose to restore, then after a little while you will see\
    \ a **Restore in Progress** screen on your iPad and a status window in `iTunes`\
    \ that says, “Restoring iPad from backup...” This screen also shows a time estimate.\n\
    13. Next, you will see a little pop-up window saying, “The settings for your iPad\
    \ have been restored.” In a few seconds, you will see your iPad appear in the\
    \ Left Nav Bar under `DEVICES` in `iTunes`:\n\n    - If you sync your information\
    \ with `iTunes`, all data will be synced now.\n    - If you use `MobileMe`, Exchange,\
    \ or another sync process, you will probably have to re-enter passwords on your\
    \ iPad to get those sync processes back up and running.\n\n### Additional Troubleshooting\
    \ and Help Resources\n\nSometimes you may encounter a particular issue or question\
    \ that you cannot find an answer to in this book. In the sections that follow,\
    \ we provide some good resources that you can access from the iPad itself and\
    \ from your computer's web browser. The iPad on-device user guide is easy to navigate\
    \ and may provide some quick information that you seek. The Apple Knowledgebase\
    \ is helpful if you are facing a troubleshooting problem that is proving especially\
    \ difficult to resolve. The iPhone/iPad-related web blogs and forums are also\
    \ good places to locate answers and even ask unique questions you might be facing.\n\
    \n#### The On-Device iPad User Guide\n\nOpen up your `Safari` web browser to view\
    \ the online user guide for your iPad:\n\n1. Tap the **Bookmarks** button next\
    \ to where you enter a web site address.\n2. Select **iPad User Guide**.\n\n![images](images/p677-01.jpg)\n\
    \nIf you don't see that bookmark, then type this into the `Safari` address bar\
    \ on your iPad:\n\n`help.apple.com/ipad`\n\n**TIP:** To view the manual in PDF\
    \ format from your computer, go to [`http://help.apple.com/ipad/4/interface/`](http://help.apple.com/ipad/4/interface/).\n\
    \nOnce you get to the guide on your iPad, you should see a screen similar to the\
    \ one shown in [Figure 28–14](#Chapter28.html#fig_28_14).\n\nThe nice thing is\
    \ that you already know how to navigate around the guide. Tap any topic in the\
    \ left column to reveal that topic in the right column.\n\nRead the topic or touch\
    \ another link from the right column to learn more.\n\nTap the button at the top\
    \ of the right column to back out one level.\n\n![images](images/2814.jpg)\n\n\
    **Figure 28–14.** *Using the iPad manual from `Safari` on your iPad*\n\n#### Check\
    \ out the Apple Knowledgebase for Helpful Articles\n\nOn your iPad or computer's\
    \ web browser, go to this web page:\n\n[`http://www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/)\n\
    \nNext, click a topic in the Left Nav Bar (see Figure 25–15).\n\n![images](images/2815.jpg)\n\
    \n**Figure 28–15.** *The Apple Knowledgebase web site for the iPad*"
