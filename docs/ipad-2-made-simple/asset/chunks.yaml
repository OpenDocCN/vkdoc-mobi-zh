  trans: '

    #### `Song List` 视图


    点击视图图标最左侧可查看`Song List`视图（请参见图 29–6）。您可以通过点击任意列的标题来重新对列表进行排序。例如，要按名称排序，请点击`Name`列标题。要反转排序顺序，只需再次点击同一列标题即可。`Song
    List`视图在查找特定艺术家或特定专辑的所有歌曲时特别有用。


    ![images](img/2906.jpg)


    **图 29–6.** *`Song List`视图*


    #### `Album List` 视图


    如前所述，这是`iTunes` 10.0 版本中的一个新视图。点击第二个视图图标可查看`Album List`视图（请参见图 29–7）。您可以通过点击任意列的标题来重新对列表进行排序。例如，要按名称排序，请点击`Name`列标题。要反转排序顺序，只需再次点击同一列标题即可。`Album
    List`视图在查找特定艺术家或特定专辑的所有歌曲时特别有用。


    ![images](img/2907.jpg)


    **图 29–7.** *`Album List`视图*


    #### `Grid` 视图


    点击第三个图标可显示`Grid`视图（请参见图 29–8）。这是一个非常图形化的视图，如果您想快速找到专辑封面或海报艺术，它会很有帮助。


    ![images](img/2908.jpg)


    **图 29–8.** *`Grid`视图*


    #### `Cover Flow` 视图


    点击最右侧的图标可查看`Cover Flow`视图（请参见图 29–9）。这是一个有趣的视图，因为它非常直观，您可以使用滑块快速翻看图片，浏览专辑封面。与`Grid`视图和`Album
    List`视图一样，当您知道封面长什么样时，该视图提供了一种查找专辑的简便方法。


    ![images](img/2909.jpg)


    **图 29–9.** *`Cover Flow`视图*


    ### 播放歌曲、视频等


    如果您是`iTunes`新手，以下基本提示可以帮助您熟悉该应用（请参见图 29–10）：


    - **播放歌曲、视频或播客：** 双击某个项目即可开始播放。

    - **控制歌曲或视频：** 使用`Rewind`、`Pause`和`Fast Forward`按钮，以及左上角的`Volume`滑块来控制播放。

    - **跳转到歌曲或视频的不同部分：** 只需点击窗口顶部歌曲名称下方滑块条中的`Diamond`图标，然后根据需要向左或向右拖动即可。


    ![images](img/2910.jpg)


    **图 29–10.** *在`iTunes`中播放您的歌曲、视频等*


    ### `iTunes` 可视化效果


    `iTunes`中有一个非常有趣的视觉功能，相当有娱乐性。它看起来像一个屏幕保护程序，会随着您正在播放的音乐做出反应。有两个版本：iTunes 经典可视化效果和新的
    iTunes 可视化效果。要查看可视化效果，请从菜单中选择**视图 ![images](img/U001.jpg) 显示可视化效果**（或者在 Windows
    上按`Ctrl+T`，在 Mac 上按`Command+T`）。要在经典和新可视化效果版本之间切换，请从菜单中选择**视图 ![images](img/U001.jpg)
    iTunes 可视化效果**或**iTunes 经典可视化效果**。图 29–11 展示了两种可视化效果的示例。


    ![images](img/2911.jpg)


    **图 29–11.** *iTunes 经典和新可视化效果*


    #### 使用`iTunes`均衡器


    您可以通过将内置均衡器与您正在聆听的音乐类型相匹配来增强音乐的音效。要查看 iTunes 均衡器，请从菜单中选择**视图 ![images](img/U001.jpg)
    显示均衡器**（或者在 Windows 上按`Ctrl+Shift+2`，在 Mac 上按`Command+J`并勾选**均衡器**）。您可以从超过 20
    种预设设置中进行选择，包括`Classical`、`Rock`、`Pop`和`R&B`，并且可以修改这些设置以符合您的个人品味。


    ![images](img/p701-01.jpg)


    #### `iTunes` 迷你播放器


    有时您希望让`iTunes`在电脑上继续播放，但又不希望它占用太多屏幕空间。幸运的是，`iTunes`内置了一个名为迷你播放器的精简版本。


    ![images](img/p702-01.jpg)


    要显示迷你播放器，请从菜单中选择**视图 ![images](img/U001.jpg) 切换到迷你播放器**（或者在 Windows 上按`Ctrl+M`，在
    Mac 上按`Shift+Command+M`）。要切换回常规视图，请按下相同的快捷键。


    拖动右下角可查看`Status`窗口。


    ![images](img/p702-02.jpg)


    #### `iTunes` DJ


    ![images](img/p702-03.jpg)


    如果您想以新的顺序聆听音乐，而又不想让歌曲中断，可以试试 iTunes DJ 功能。要启动它，请点击左侧导航栏中`Playlists`部分顶部的`iTunes
    DJ`。


    ![images](img/p702-04.jpg)


    iTunes DJ 会根据您的整个音乐库或单个播放列表，连续混合播放音乐。要调整来源，请点击屏幕底部`Source`旁边的下拉菜单。


    您可以在`iTunes DJ`主窗口中看到 DJ 即将播放的歌曲列表。要更改歌曲的播放顺序，您只需在列表中将歌曲拖放到更高或更低的位置即可（请参见图 29–12）。


    ![images](img/2912.jpg)


    **图 29–12.** *iTunes DJ 及更改待播放歌曲的顺序*


    您还可以通过在资料库中右键点击歌曲，然后选择**添加到 iTunes DJ** 或**在 iTunes DJ 中下一首播放**，将歌曲添加到 iTunes
    DJ 列表中或使其下一首播放。


    ![images](img/p703-01.jpg)


    #### `Apple Remote` 应用


    一件有趣的事情是在您的 iPad 或其他 Apple 设备上使用`Remote`应用。要开始使用，请打开 iPad 上的 App Store 并搜索“Remote”。来自
    Apple 的`Remote`应用是免费的，所以请注意不要购买那些出现的付费应用。请确保您下载的是由 Apple 制作的`Remote`应用。


    在您的 iPad 上安装该应用后，点击它启动。接下来，您需要通过输入一个四位数的密码将应用连接到您电脑上的`iTunes`：


    1.  在您的 iPad 上，点击`Remote`应用启动它（请参见图 29–13）。

    2.  如果您是第一次启动`Remote`应用，请点击**添加 iTunes 资料库**。如果您已经添加了家庭共享或其他资料库，则需要点击`Remote`应用右上角的**设置**（**齿轮**图标）。然后，点击**添加
    iTunes 资料库**，您应该会看到一个四位数的密码。

    3.  在您的电脑上，启动`iTunes`。在`Devices`部分，您的 iPad 现在应该会显示出来，旁边带有`Remote`图标。点击它以开始使用。


    ![images](img/2913.jpg)


    **图 29–13.** *使用 Apple 的`Remote`应用将移动设备 (iPad, iPhone 或 iPod touch) 连接到`iTunes`*


    成功连接您的 iPad（或其他 Apple 设备）后，您现在可以远程控制`iTunes`。例如，您可以播放、暂停、跳过一首歌曲，甚至更改播放列表——几乎您在电脑前操作时与播放音乐相关的任何操作都可以实现！

