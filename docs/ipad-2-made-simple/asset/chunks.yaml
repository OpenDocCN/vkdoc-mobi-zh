- fmt: '# Verifying Your Mail Account Settings


    Follow these steps to verify your account settings:


    1. Tap the **Settings** icon.

    2. Tap **Mail, Contacts, Calendars**.

    3. If you received an error message from a particular email account, touch that
    account.

    4. Verify that the **Account** is set to **ON**.

    5. Verify that your email **Address** is correct in the **POP Account Information**
    section.

    6. Verify that all the information in the **Host Name**, **User Name**, and **Password**
    fields is correct.

    7. If you received an error message while trying to send an email, the issue will
    be most likely in the **SMTP** settings in your **Outgoing Mail Server** area.

    8. Tap **SMTP** to adjust more settings.


    ![images](images/p363-01.jpg)


    9. Touch the **Primary Server** tab and make sure that it is set to **ON**.

    10. Underneath the **Primary Server** tab, you will see other SMTP servers that
    are used for your other email accounts. One option is to use one of the other
    SMTP servers that you know is working. In that case, just touch the tab for that
    server and turn that switch to **ON**.


    ![images](images/p363-02.jpg)


    11. Tap the **Primary Server** address to view and adjust more settings.

    12. Verify that the **Primary Server** is **ON**.

    13. Contact your email service provider to verify other settings, such as **Host
    Name**, **User Name**, **Password**, **SSL**, **Authentication**, and **Server
    Port**. We will share more details and some tips about these settings in the sections
    that follow.

    14. Tap the **Done** button when finished and then tap the button with your email
    account listed in the upper-left corner to return to previous screens. Or, you
    can tap the **Home** button to exit to your **Home** screen.


    ![images](images/p364-01.jpg)


    ### Using SSL


    Some SMTP servers require the use of Secure Socket Layer (“SSL”) security. If
    you are having trouble sending email and the **Use SSL** switch is set to **OFF**,
    try setting it to **ON** to see if that helps.


    ### Changing the Method of Authentication


    Under the SSL switch is an **Authentication** tab. Usually, **Password** is the
    correct setting for this switch. We don''t recommend that you change this setting
    unless you have specific directions from your email service provider to make a
    change.


    ![images](images/p364-02.jpg)


    ### Changing the Server Port


    Most often, when you configure your email account, the server port is set for
    you. Sometimes, there are tweaks that need to be made that are specific to your
    ISP.


    If you have been given specific settings from your ISP, you can change the server
    port to try to alleviate any errors you might be seeing. Follow these steps to
    change the **Server Port** settings:


    1. Go back to the specific **SMTP** settings for your account.

    2. Touch the tab for the **Primary Server**, as you did in the “Verify Mail Account
    Settings” section.

    3. Scroll down to **Server Port** and touch the screen on the number indicated.

    4. This causes a keyboard to pop up that you can use to input a new port number
    (the one given you by your ISP). Most often, the number provided by your ISP will
    be 995, 993, 587, or 110; however, if you''re given a different number, just input
    it.

    5. When you are done, touch the **SMTP** tab in the upper-left corner to return
    to the previous screen.


    # Chapter 14


    # Working with Contacts


    Your iPad gives you immediate access to all your important information. Just like
    your computer or your smartphone, your iPad can store thousands of contacts for
    easy retrieval. In this chapter, we''ll show you how to add new contacts (including
    how to do so from an email address), customize your contacts by adding new fields,
    organize your contacts with groups, quickly search or scroll through contacts,
    and even display a contact''s location with the **Maps** app on the iPad. We will
    also show you how to customize your **Contacts** view, so it is sorted and displayed
    just the way you like it. Finally, you will learn a few troubleshooting tips that
    will save you some time when you run into difficulties.


    The beauty of the iPad is how it integrates all of your apps, so you can email
    and map your contacts right from the **Contact** entry screen.


    ## Loading Your Contacts onto the iPad


    In [Chapter 3](#Chapter03.html#ch3): “Sync Your iPad with iTunes,” we show you
    how to load your contacts onto the iPad using the **iTunes** app on your Mac or
    Windows computer. You can also use the Exchange (Active Sync) or MobileMe services
    described in the [Chapter 4](#Chapter04.html#ch4): “Other Sync Methods.”


    ## When Is Your Contact List Most Useful?


    The **Contacts** app is most useful when two things are true:


    1. You have many names and addresses in it.

    2. You can easily find what you need.


    ### Two Simple Rules to Improve Your Contact List


    We have a couple of basic rules to help make your **Contacts** list on your iPad
    more useful.


    **Rule 1: Add anything and everything in to your Contacts app.**


    > You never know when you might need that obscure restaurant name, that plumber''s
    number, or other business or professional contact''s information.


    **Rule 2: As you add entries, make sure you think about how to find them in the
    future (First Name, Last Name, Company).**


    > We have many tips and tricks in this chapter to help you enter names, so that
    they can be instantly located when you need them.


    **TIP:** Here''s a good way to find restaurants: Whenever you enter a restaurant
    into your **Contacts** list, make sure to put the word “restaurant” into the company
    name field, even if it''s not part of the name. Then, when you type the letters
    “rest,” you should instantly find all your restaurants!


    ## Adding a New Contact Right on Your iPad


    You can always add your contacts right on your iPad. This is handy when you''re
    away from your computer—but have your iPad—and need to add someone to your **Contacts**
    list. It''s very easy to do; we''ll show you how in the next section.


    ![images](images/p368-01.jpg)


    ### Tap the Plus Sign to Add a Contact


    From your **Home** screen, touch the **Contacts** icon and you''ll see the **All
    Contacts** list (see [Figure 14–1](#Chapter14.html#fig_14_1)). Tap the **Plus
    Sign (+)** in the lower-right corner of the **Contacts** list to add a new contact.


    ![images](images/p368-02.jpg)


    ![images](images/1401.jpg)


    **Figure 14–1.** *Entering a contact into your iPad*


    Tap any of the fields (First, Last, Company, and so on) to type in information.


    **TIP:** Keep in mind that the search feature of the **Contacts** list uses the
    First, Last, and Company fields. When you add or edit contacts, adding a special
    word to the Company field can help you find a particular contact later. For example,
    adding the words “Cece friend” to the Company field can help you find all of Cece''s
    friends quickly using the search feature.


    ### Adding New Fields and Changing Labels


    You will notice that the initial screen for adding a contact shows only a few
    fields for entering information: mobile (phone numbers), email (email addresses),
    home page (web page address), add new address (street address), notes, and add
    field.


    Apple has purposely done this to make the screen less cluttered. You will notice
    that, as you start typing a phone number, email address, or street address, a
    new field appears immediately under the one you are typing. This allows you to
    add multiple items easily. If you want, you may tap the name of the field (e.g.,
    mobile) and change it to something else like (e.g., home or work).


