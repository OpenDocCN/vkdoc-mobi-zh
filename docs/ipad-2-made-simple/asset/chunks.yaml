- fmt: "#### Setting Content Restrictions\n\nYou might decide you don't want your\
    \ kids listening to explicit lyrics in music on your iPad. You may also not want\
    \ them to visit YouTube and watch content you find objectionable. Setting content\
    \ restrictions is quite easy on your iPad.\n\nOnce again, touch the `General`\
    \ tab under `Settings` and tap `Restrictions`.\n\nYou will see a large button\
    \ that says `Enable Restrictions`.\n\nWhen you touch this, you'll be prompted\
    \ to enter a `Restrictions Passcode`—just pick a four-digit code you will remember.\n\
    \n![images](images/p215-01.jpg)\n\n**NOTE:** The `Restrictions Passcode` is a\
    \ separate passcode from your main iPad passcode. You could set it so it's the\
    \ same as your main iPad passcode to make it easy to remember; however, that could\
    \ be problematic if you let your family know the main passcode, but do not want\
    \ them adjusting the restrictions. You will need to enter this passcode to turn\
    \ off restrictions later.\n\nNote that you can use the content restrictions to\
    \ control whether certain apps run at all, such as `Safari`, `YouTube`, `iTunes`,\
    \ `Installing Apps`, or `Location`.\n\nAlso, you should keep in mind that **OFF\
    \ = RESTRICTED**.\n\nYou might think that **ON** means something is restricted,\
    \ but it is the opposite. To disable or restrict something, you need to touch\
    \ the slider next to it and set it to **OFF**. If you look at the word **Allow:**\
    \ above all the tabs, then this approach makes sense.\n\n![images](images/p216-01.jpg)\n\
    \nAs you can see, you can restrict access to lyrics for `Music & Podcasts` to\
    \ what is `Clean`.\n\nYou can also use ratings-based restrictions to control the\
    \ content of `Movies`, `TV Shows`, and `Apps` that can be played on your iPad.\n\
    \nIn the example in the image to the right, only movies with ratings up to PG-13\
    \ can be played. Movies with ratings of R and NC-17 can't be played.\n\n## Chapter\
    \ 8\n\n## Multitasking and Mute/Lock Switch\n\nIn this chapter, we will describe\
    \ how to use the `App Switcher` bar to multitask, or jump between apps on your\
    \ iPad. Multitasking is a new and very welcome feature on the iPad, one that was\
    \ not available when the first iPad launched. This feature means you can leave\
    \ one app running in the background while you do something else. For example,\
    \ you might take a quick break from a game to go and update your status on Facebook\
    \ or send a tweet on Twitter, and then jump back to your game.\n\nThe `App Switcher`\
    \ bar provides another nice piece of functionality that we'll cover in this chapter.\
    \ On the first iPad, there was a hardware button that locked the screen orientation.\
    \ When the software was updated, that switch became a `Mute` key. With the new\
    \ iOS 4.3, you can use the `App Switcher` bar to dictate how you want that switch\
    \ to behave as well as make adjustments in the `Settings` app for the `Lock/Rotation`\
    \ switch.\n\n### Multitasking or App Switching\n\nWith *multitasking*, or *App\
    \ Switching*, you can leave many of your apps running in the background as you\
    \ switch over to another without stopping the current app.\n\n**NOTE**: Developers\
    \ have to implement multitasking on their end. While more and more multitasking-aware\
    \ apps and updates are appearing every day, some apps still don't do it or don't\
    \ do it fully.\n\n**Why might you want to use multitasking?** Here are a few scenarios\
    \ where you might want to use multitasking on your iPad:\n\n- Copy and paste from\
    \ one app (`Mail`) to another (`Calendar`).\n- Answer a `FaceTime` call or reply\
    \ to an `Email` message, and then jump back into the game you were playing without\
    \ missing a beat.\n- Continue listening to Internet radio (such as `Pandora` or\
    \ `Slacker`) while playing your favorite game or browsing the Web.\n- You no longer\
    \ have to wait for photos to upload to `Facebook` or `Twitter`—they can be uploading\
    \ in the background while you go and do other things on your iPad.\n- If you use\
    \ `Skype` to call people, you can now leave it running in the background to receive\
    \ incoming calls; this was not possible before.\n- You can also now keep turn-by-turn\
    \ navigation running in the background and get voice directions while on a call\
    \ or in another app. Like VoIP and streaming audio, navigation got a dedicated\
    \ API.\n\n#### How to Jump Between Apps\n\nIn order to multitask, you need to\
    \ bring up the `App Switcher` bar at the bottom of the screen. Follow these steps\
    \ to do so:\n\n1.  From any app or even the `Home` screen, double-click the `Home`\
    \ button to bring up the `App Switcher` at the bottom of your screen (see [Figure\
    \ 8–1](#Chapter08.html#fig_8_1)).\n2.  All open apps will be shown on the `App\
    \ Switcher` bar.\n3.  Swipe right or left to find the app you want and tap it.\n\
    4.  If you don't see the app you want on the `App Switcher` bar, press the `Home`\
    \ button and start it from the `Home` screen.\n5.  Double-click the `Home` button\
    \ again and tap the app you just left to jump back to it.\n\n![images](images/0801.jpg)\n\
    \n**Figure 8–1.** *Double-clicking the `Home` button to bring up the `App Switcher`\
    \ bar to multitask*\n\n#### How to Close Apps from the App Switcher\n\nIf you\
    \ exit an app using a single click of the `Home` button, that app will stay running\
    \ in the background, unless it is an active VOIP call, a location/navigation app,\
    \ or some sort of upload.\n\n**NOTE**: Technically, any app other than VoIP, streaming\
    \ audio, and location-aware apps will save state and suspend–or it will finish\
    \ Internet activity such as uploading, and then save state and suspend. This takes\
    \ up resources, however, and the iOS will shut apps when it determines memory\
    \ is low. If there is a rogue process or an app that isn't killed quickly enough\
    \ and chokes the iPad's memory, manually killing that process or app can fix things.\n\
    \nThere are times when you want to completely close an app. For example, sometimes\
    \ you may find your iPad running a little slower than you might like. In such\
    \ cases, it can be a good idea to close apps completely and free up memory. Follow\
    \ these steps to do so:\n\n1.  Double-click the `Home` button to bring up the\
    \ `App Switcher` bar.\n2.  Press and hold any icon in the `App Switcher` bar until\
    \ they all shake. You will notice that a `Red Circle` icon with a minus sign appears\
    \ in the upper-left corner of each icon.\n\n    ![images](images/p219-01.jpg)\n\
    \n3.  Tap the `Red Circle` ![images](images/p219-02.jpg) icon to completely close\
    \ the app.\n\n**NOTE**: The preceding steps kill running apps or flush the saved\
    \ state. Any app you close this way must restart the next time you tap it. Built-in\
    \ apps like `Mail` will restart automatically, so you won't miss any emails."
