  trans: "\n### 重新安装 iPad 操作系统（可选择是否恢复数据）\n\n有时，你需要对 iPad 操作系统执行一次全新安装，才能让 iPad 恢复正常并顺畅运行。\n\
    \n**提示**：此过程与使用新版本操作系统更新 iPad 的过程基本相同。\n\n在此过程中，你将面临三个选择：\n\n1.  如果你想将 iPad 恢复到包含所有数据的正常状态，则必须使用\
    \ `iTunes` 的“恢复”功能。\n2.  如果你打算从零开始，并将 iPad 绑定到一个 `iTunes` 账户，则应在该过程结束时使用“设置新的\
    \ iPad”功能。\n3.  如果你打算赠送或出售你的 iPad，那么在该过程结束时（在执行恢复或新设置之前），只需从 `iTunes` 中弹出 iPad\
    \ 即可。\n\n**注意：** 此“恢复过程”将完全清除你的 iPad。你需要重新同步并重新安装所有应用程序，并重新输入你的账户信息，例如电子邮件账户的详细信息。此过程可能需要\
    \ 30 分钟或更长时间，具体取决于你同步到 iPad 的信息量。\n\n按照以下步骤重新安装 iPad 操作系统软件，并可以选择从以前的备份中恢复数据到你的\
    \ iPad：\n\n1.  将 iPad 连接到电脑并启动 `iTunes`。\n2.  在左侧导航栏的 `DEVICES`（设备）类别中，点击你的 **iPad**。\n\
    3.  点击顶部导航栏中的 **Summary**（摘要）。\n4.  现在你将看到 iPad 的 **Information**（信息）屏幕。点击屏幕中间的\
    \ **Restore**（恢复）按钮（参见图 28-9）。\n\n![images](img/2809.jpg)\n\n**图 28-9.** *连接你的\
    \ iPad 并在 `iTunes` 的 **Summary**（摘要）屏幕中点击 **Restore**（恢复）按钮*\n\n5.  系统可能会询问你是否要备份你的\
    \ iPad。为安全起见，请点击 **Backup**（备份）。\n6.  随后你可能会收到警告，提示所有数据将被擦除。点击 **Restore**（恢复）继续（参见图\
    \ 28-10）。\n\n![images](img/2810.jpg)\n\n**图 28-10.** *在 `iTunes` 中恢复之前进行备份*\n\n\
    7.  现在你将看到一个 **iPad Software Update**（iPad 软件更新）屏幕。点击 **Next** ![images](img/U001.jpg)（下一步）继续。\n\
    8.  接下来，你将看到 **Software License Agreement**（软件许可协议）屏幕。点击 **Agree**（同意）继续并启动该过程。\n\
    9.  现在，`iTunes` 将下载最新的 iPad 软件，备份并同步你的 iPad，然后完全重新安装 iPad 软件。此过程将擦除所有数据，并将你的 iPad\
    \ 恢复到原始“干净”状态。你将在 `iTunes` 顶部看到状态消息，类似于图 28-11 所示。\n\n![images](img/2811.jpg)\n\
    \n**图 28-11.** *软件更新/恢复过程：`iTunes` 顶部的状态窗口*\n\n10. 在备份并同步你的 iPad 后，其屏幕将变黑。苹果标志会出现，你会在标志下方看到一个进度条。最后，`iTunes`\
    \ 中会弹出一个小的弹出窗口，告知你更新过程已完成。点击 **OK**（确定）即可进入 **Set Up your iPad**（设置你的 iPad）屏幕（参见图\
    \ 28-13）：\n\n    -   如果你想保持 iPad 干净（即不含任何个人数据），请选择第一个选项 **Setup as a new iPad**（设置为新的\
    \ iPad）。如果你正在为其他人设置此 iPad（你需要此人的 Apple ID 和密码），可能会用到此选项。\n    -   如果你要赠送或出售你的\
    \ iPad，只需点击 iPad 旁边的 **Eject**（弹出）图标即可完成（参见图 28-12）。\n\n![images](img/2812.jpg)\n\
    \n**图 28-12.** *如果赠送或出售 iPad，则将其弹出*\n\n    -   选择 **Restore from the backup of:**（从...的备份中恢复：）并确认下拉选项设置为正确的设备。\n\
    \n11. 最后，点击 **Continue**（继续）（参见图 28-13）。\n\n![images](img/2813.jpg)\n\n**图 28-13.**\
    \ *将设备设置为新的 iPad 或从备份文件恢复*\n\n12. 如果选择恢复，稍后你将在 iPad 上看到一个 **Restore in Progress**（恢复进行中）屏幕，并在\
    \ `iTunes` 中看到一个状态窗口，显示“正在从备份恢复 iPad...”。此屏幕还会显示预计时间。\n13. 接下来，你将看到一个小弹出窗口，显示“你的\
    \ iPad 设置已恢复”。几秒钟后，你将看到你的 iPad 出现在 `iTunes` 中 `DEVICES`（设备）下方的左侧导航栏里：\n\n    -\
    \   如果你与 `iTunes` 同步信息，所有数据现在都将同步。\n    -   如果你使用 `MobileMe`、Exchange 或其他同步过程，你可能需要在\
    \ iPad 上重新输入密码才能让这些同步过程重新启动并运行。\n\n### 其他故障排除和帮助资源\n\n有时，你可能会遇到本书中找不到答案的特定问题或疑问。在接下来的部分中，我们提供了一些你可以从\
    \ iPad 本身以及电脑的网页浏览器访问的好资源。iPad 设备上的用户指南易于浏览，可能能为你快速提供所需信息。如果你面临一个特别难以解决的故障排除问题，苹果知识库会很有帮助。与\
    \ iPhone/iPad 相关的网络博客和论坛也是寻找答案甚至提出你遇到的独特问题的好地方。\n\n#### iPad 设备上的用户指南\n\n打开你的\
    \ `Safari` 网页浏览器以查看 iPad 的在线用户指南：\n\n1.  在输入网址的地方旁边，点击 **Bookmarks**（书签）按钮。\n\
    2.  选择 **iPad User Guide**（iPad 用户指南）。\n\n![images](img/p677-01.jpg)\n\n如果你没有看到该书签，请在你的\
    \ iPad 上的 `Safari` 地址栏中输入：\n\n`help.apple.com/ipad`\n\n**提示：** 要查看电脑上的 PDF 格式手册，请访问\
    \ [`http://help.apple.com/ipad/4/interface/`](http://help.apple.com/ipad/4/interface/)。\n\
    \n进入 iPad 上的指南后，你应该会看到一个类似于图 28-14 所示的屏幕。\n\n好处是你已经知道如何在指南中导航。点击左侧栏中的任何主题，即可在右侧栏中显示该主题。\n\
    \n阅读该主题或点击右侧栏中的另一个链接以了解更多信息。\n\n点击右侧栏顶部的按钮可返回上一级。\n\n![images](img/2814.jpg)\n\
    \n**图 28-14.** *在你的 iPad 上通过 `Safari` 使用 iPad 手册*\n\n#### 查阅苹果知识库以获取有用的文章\n\n\
    在你的 iPad 或电脑的网页浏览器中，访问以下网页：\n\n[`http://www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/)\n\
    \n接下来，点击左侧导航栏中的一个主题（参见图 25-15）。\n\n![images](img/2815.jpg)\n\n**图 28-15.** *iPad\
    \ 的苹果知识库网站*\n"
- fmt: '#### iPad-Related Blogs


    One of the great things about owning an `iPad` is that you immediately become
    a part of a worldwide camaraderie of `iPad` owners.


    Many `iPad` owners would be classified as “enthusiasts” and are part of any number
    of `iPad` user groups. These user groups, along with various forums and web sites,
    serve as a great resource for `iPad` users.


    Many of these resources are available right from your `iPad`, and others are web
    sites that you might want to visit on your computer.


    Sometimes you might want to connect with other `iPad` enthusiasts, ask a technical
    question, or keep up with the latest and greatest rumors. The blogs are a great
    place to do that.


    Here are a few popular `iPad` (and `iPhone` or `iPod touch`) blogs:


    *   [`www.tipb.com`](http://www.tipb.com)

    *   [`www.iphonefreak.com`](http://www.iphonefreak.com)

    *   [`www.gizmodo.com`](http://www.gizmodo.com) (`iPad` section)


    **TIP:** Before you post a new question on any of these blogs, please do a search
    on the blog to make sure your question has not already been asked and answered.
    Also, make sure you are posting your question on the right section (e.g., `iPad`)
    of the blog. Otherwise, you may incur the wrath of the community for not doing
    your homework first!


    Also, do a web search for “iPad blogs” or “iPad news and reviews” to locate more
    blogs.


    ## Part IV


    ## iPad 2''s Soul Mate: iTunes…


    Your `iPad 2` is inextricably tied to `iTunes`—the e-commerce center of Apple.
    `iTunes` is not only where you buy music, videos, and apps, but it''s also where
    you organize all of the great content you can use on your `iPad 2`. Use the new
    `Ping` social networking feature in `iTunes` to keep up to date with your favorite
    artists'' and friends'' taste in music. You can even use `Ping` to meet up with
    friends and buy tickets for upcoming concerts. Learn how to purchase exciting
    new content—and even how to find it for free. Learn something new with `iTunes
    U` or find give your music library a fresh new feel using the `Genius mix`. We
    even help you learn how to save money with the `iTunes` Home Sharing feature,
    which now works on your `iPad`, too!


    ## Chapter 29


    ## Your iTunes User Guide


    ![images](images/p683-01.jpg)


    In this chapter, we will show you how to do virtually everything you might want
    to do with `iTunes`. We cover `iTunes` version 10 with the cool social networking
    feature called `Ping` (see [Figure 29–1](#Chapter29.html#fig_29_1)). We will help
    you get `iTunes` installed and updated, then take you on a guided tour. We will
    also describe all the great ways to organize and view your music and videos, as
    well as how to prepare for putting them on your `iPad`.


    At the time of publishing, the latest version of the `iTunes` app was 10.2.1.1.
    When you read this, your version may be slightly higher, but the vast majority
    of the content will be similar.


    ![images](images/p683-02.jpg)


    Besides `Ping`, we will cover `iTunes DJ`, the `Genius` feature, and the money-saving
    `Home Sharing` feature. We will also show you how to import music CDs, DVDs, PDFs,
    and E-Book files, as well as how to get album artwork for all your music. We will
    even teach you about authorizing computers to share content using `iTunes`. Finally,
    we will provide some useful troubleshooting tips for `iTunes`.


    **NOTE:** If you are looking to set up your `iPad` for the first time, please
    check out [Chapter 1](#Chapter01.html#ch1): “Getting Started.” If you are trying
    to sync your computer to your `iPad` using `iTunes`, please check out [Chapter
    3](#Chapter03.html#ch3): “Sync Your iPad with iTunes.”


    If you need to install the `iTunes` software on your computer, please jump to
    the “Downloading and Installing iTunes Software” section later in this chapter.
    If you already have the `iTunes` software installed, then go to the “Updating
    iTunes Software” section to make sure you have the latest version.


    ![images](images/2901.jpg)


    **Figure 29–1.** *The `iTunes` screen showing the `Ping` feature, which is new
    in version 10.0*


    ### Seeing If iTunes Is Already Installed


    ![images](images/p684-01.jpg)


    If you are a Windows PC user, then begin by looking for the `iTunes` icon on your
    desktop and double-clicking it. If you don''t find it, then click the `Windows`
    logo or the `Start` button in the lower-left corner and type “iTunes.” If you
    don''t see the `iTunes` app appear in the search results, then you might not have
    `iTunes` installed. If that''s the case, then follow the steps in the next section,
    “Downloading and Installing iTunes Software.” If `iTunes` is installed, you will
    see it appear—just click its icon to start it and skip to the “iTunes Guided Tour”
    section.


    If you are a Mac user, `iTunes` is installed by default on your computer. Check
    to see if the `iTunes` icon is on your desktop or Desktop Dock. If you see it,
    then double-click it and skip to the “iTunes Guided Tour” section. If you do not
    see the `iTunes` icon, then start the `Finder`, click `Applications`, and look
    for `iTunes` in the alphabetical list of apps.


    ### Downloading and Installing iTunes Software


    If you have never installed `iTunes` before on your computer, you can download
    the software directly from the Apple web site by following these steps:


    1.  Open a web browser on your computer, such as Apple''s `Safari`, Microsoft''s
    `Internet Explorer`, Google''s `Chrome`, or Mozilla''s `Firefox`.

    2.  Type the web address [`www.itunes.com/download`](http://www.itunes.com/download)
    into the top of your browser, and then press `Enter`. This web address works for
    both Windows PC and Mac users.

    3.  Next, select the software that matches your computer''s operating system,
    assuming that you''re given a choice.

    4.  If you are given a choice to run or save the software, choose `Run` so that
    the installation will start automatically once the download is complete.

    5.  If the installation does not start right away, then locate the file you downloaded
    (Windows users should look for a file with a name like `iTunes.exe`, and Mac users
    should look for something like `iTunes_Install.dmg`). Double-click the install
    file to start the installation.

    6.  Follow the on-screen instructions to install `iTunes`.


    ### Updating iTunes Software


    It''s easy to update your `iTunes` software because the program checks its version
    status by default and will automatically let you know if a newer version is available
    for download. After you start `iTunes`, if a newer version of `iTunes` is available,
    you will see a pop-up window. As noted previously, the version number will be
    higher than the 10.0 shown in [Figure 29–2](#Chapter29.html#fig_29_2).


    ![images](images/2902.jpg)


    **Figure 29–2.** *The Apple `Software Update` screen*


    **TIP:** If you want to be sure you are using the latest version, then select
    `Help` ![images](images/U001.jpg) `Check for Updates` from the `iTunes` menu.


    ![images](images/p686-01.jpg)


    After you click `Download iTunes`, you will be taken to the `iTunes` web site.
    Select the appropriate software for your computer and click the `Download Now`
    button.


    You can also get to this download page by going to [`www.iTunes.com`](http://www.itunes.com)
    and clicking the `Download iTunes` button.


    Follow the on-screen instructions to install the updated `iTunes` on your computer.


    **TIP:** To determine your computer operating system on Windows, click the `Start`
    button or `Windows` logo in the lower-left corner. Next, right-click `Computer`
    and select `Properties`. On the Mac, click the `Apple` logo in the upper-left
    corner and select `About This Mac` from the menu.


    ![images](images/p686-02.jpg)'
