  trans: '

    ###### 充分利用每次充电


    要延长电池续航时间，请尝试以下技巧：


    - **将 iPad 置于睡眠模式。** 点击设备右上角的 `电源/睡眠` 按钮，将其置于睡眠模式。

    - **在不使用时关闭 Wi-Fi 或 3G。** 即使未连接 Wi-Fi 或 3G 网络，Wi-Fi 和 3G 天线也会消耗电量，因此在不需使用时请关闭它们。点击
    `设置`，然后将 `飞行模式` 设为开启。

    - **降低屏幕亮度：** 点击 `设置`，然后点击 `亮度与墙纸`。使用滑块将亮度调低至不到一半但仍适合您使用的水平。同时，确保 `自动亮度` 设为开启。

    - **关闭定位服务：** 如果您不需要将实际位置传输给应用程序，可以将其关闭。点击 `设置`，然后点击 `定位服务`。将 `定位服务` 设为关闭。如果启动需要您位置的应用程序，系统会提醒您重新开启。

    - **设置较短的自动锁定时间：** 缩短 iPad 在不使用时关闭屏幕并进入睡眠模式的时间，有助于节省电量。操作方法是：点击 `设置`、`通用` 和 `自动锁定`。将
    `自动锁定` 设置为尽可能短的时间——如果您喜欢，可以短至 2 分钟。

    - **关闭推送邮件和推送通知：** 点击 `设置`，然后点击 `邮件、通讯录、日历`。接着点击 `获取新数据`，并将 `推送` 设为关闭。

    - **了解更多关于电池续航的信息**，并从 Apple 网站 [`www.apple.com/batteries/ipad.html`](http://www.apple.com/batteries/ipad.html)
    获取更多实用的 iPad 相关技巧。


    ###### 延长电池使用寿命


    可充电电池保持电量的能力会随时间推移而下降，并且在其使用周期内的充放电次数是有限的。您可以通过确保每月至少将电池完全耗尽一次来延长 iPad 电池的使用寿命。如果定期进行完全放电，可充电电池的寿命会更长。


    ###### iPad 充电配件


    无论您做什么，如果您经常使用 iPad，您会希望找到更多地方和更多方式来为其充电。表 1-2 列出了除使用电源线或连接电脑之外的一些其他充电选项。


    **表 1-2.** *为 iPad 充电的其他地点和方式*


    | 机场充电站 | 如今大多数机场都有墙上插座，您可以在候机时给 iPad 充电。有些机场设有指定的充电站，而其他机场只有墙上插座，甚至可能隐藏在椅子或其他物体后面。您可能需要费点功夫，才能抢在那些同样需要充电的旅客前面！
    |

    | 外接电池组 | 这种配件可以将 iPad 的电池续航时间延长两到三倍。您可以用大约 70 到 150 美元的价格购买此类电池组。在网络上搜索“ipad
    外接电池组”，即可找到最新、最出色的选择。 |

    | 车载充电器 | 如果您白天大量使用 iPad 进行通话，可能想投资一个车载充电器或其他方式，在漫长一天的中途为它补充电量。有些充电器可以通过汽车点烟器插座提供供电的
    USB 接口，而其他充电器则提供一个基座端口连接器，用于插入 iPad 底部。大多数售价约为 15 到 30 美元。 |

    | 车载电源逆变器 | 如果您进行长途汽车旅行，可以购买一个电源逆变器，将 12V 汽车电源插座转换为普通电源插座，以便插入 iPad 充电器。在网上搜索“车载电源逆变器”，可以找到许多价格为
    50 到 100 美元的选择。 |

    | 其他配件 | 如前所述，您也可以在具有其他功能（如通过扬声器播放音乐）的许多配件中为 iPad 充电。只需寻找插头或闪电图标，以确保您的 iPad 在此类配件中正在充电。
    |


    #### 充电与电池小贴士


    您的 iPad 可能已有一些电量，但您可能希望将其完全充满，这样便可享受数小时不间断的使用。这段时间恰好可以浏览本章剩余内容、安装或更新 iTunes，或者在
    iTunes App Store 中浏览所有酷炫的 iPad 应用（请参见第 21 章：“令人惊叹的 App Store”）。


    基座转 USB 连接线也可兼作充电线。它位于 iPad 下方那个印有“Designed by Apple in California”字样的白色小册子下面。将连接线较宽的一端插入
    iPad 底部（靠近 `主屏幕` 按钮的位置），然后将 USB 连接线的一端插入带有可折叠插头的小白盒。


    | 要确保设备正确连接并正在充电，请查看 iPad 屏幕右上角电池指示器内的小插头图标。如果屏幕空白，请点击一次 `主屏幕` 按钮点亮屏幕。您会看到此图片右侧电池图标旁边的
    100% 字样，这是因为我们进入了 `设置` ![Image](img/U001.jpg)（`通用` 并将 `电池百分比` 设为开启。 | ![Image](img/p45-01.jpg)
    |


    **将 iPad 连接到电脑时，它会充电吗？**


    答案是：“这得看情况。”


    当您通过 USB 连接线将 iPad 连接到电脑时，如果在电池图标内看到插头图标，说明 iPad *正在*充电。大多数 Mac 电脑、部分 Windows
    电脑以及部分有源 USB 集线器（一种可购买的插入墙插并带有 USB 端口的配件）在 iPad 处于“唤醒”状态（屏幕亮起）时能够提供足够电力为其充电。


    当 iPad 处于睡眠模式（屏幕关闭）时，这一点更难判断，因为将 iPad 连接到电脑后，您可能会在电池图标旁看到“未在充电”的信息。在这种情况下，iPad
    在睡眠模式下很可能仍会充电。您需要亲自用电脑和 iPad 进行试验，才能针对特定情况做出准确判断。我们发现，在使用 Windows 笔记本电脑时，即使 iPad
    在唤醒状态下显示“未在充电”，它在睡眠模式下也肯定能正常充电。


    #### 您的 iPad 激活可能已完成


    例如，当您开启 iPad 或点击 `主屏幕` 按钮（位于设备底部）时，可能会看到 `滑动以解锁` 屏幕或主屏幕上的图标屏幕。如果是这样，说明您的 iPad
    已经激活。如果您看到黑色屏幕上显示需要插入 iTunes 的 USB 连接线（参见图 1-3），则说明您仍需激活设备。


    #### 滑动以解锁


    首次开启 iPad 时，您会看到 `滑动以解锁` 屏幕。只需沿着箭头图标的方向，轻轻向右滑动解锁按钮即可。


    完成此操作后，您将看到主屏幕。


    您会看到底部程序坞中有四个锁定的图标（参见图 1-2 右下角），而其余图标则可以在底部程序坞上方的 *页面* 中来回移动。了解如何在第 7 章：“个性化设置与保护您的
    iPad”中的“移动图标”部分，将您喜爱的图标移动到底部程序坞中。


    ![images](img/0102.jpg)


    **图 1-2.** *滑动以解锁、浏览主屏幕以及底部程序坞*

