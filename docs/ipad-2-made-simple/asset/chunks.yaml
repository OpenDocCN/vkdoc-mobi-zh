- fmt: "# Your Calendar\n\nThe iPad makes the old calendar that used to hang on the\
    \ fridge obsolete. In this chapter, we will show you how to utilize the `Calendar`\
    \ app on the iPad to its full potential. We will show you how to schedule appointments,\
    \ how to manage multiple calendars, how to change views on your calendar, and\
    \ even how to deal with meeting invitations.\n\n**NOTE:** Throughout most of this\
    \ chapter, we talk about syncing your iPad calendar with another calendar because\
    \ it is nice to have your calendar accessible on your iPad and in other places.\
    \ If you choose, you can also use your iPad in a *standalone* mode, where you\
    \ do not sync to any other calendar. In this case, all the steps we describe for\
    \ adding, viewing, and managing events apply equally to you. It is critical, however,\
    \ that you use the iTunes automatic backup feature (or sync wirelessly to a Google,\
    \ MobileMe, or Exchange calendar) to save a copy of your calendar, just in case\
    \ something happens to your iPad.\n\n## Manage Your Busy Life on Your iPad\n\n\
    The `Calendar` app is a powerful and easy-to-use application that helps you manage\
    \ your appointments, keep track of what you have to do, set reminder alarms, and\
    \ even create and respond to meeting invitations (for Exchange users).\n\n###\
    \ Today's Day and Date Shown on the Calendar Icon\n\nThe `Calendar` icon is usually\
    \ right on your iPad `Home` screen. You will quickly notice that your `Calendar`\
    \ icon changes to show today's date and day of the week. The icon to the right\
    \ shows that it is a Friday and the 16th of the month.\n\n![images](images/p388-01.jpg)\n\
    \n**TIP:** If you use your iPad's `Calendar` app often, you might want to think\
    \ about pinning or moving it to the Bottom Dock — you learned how to do this in\
    \ the section on docking icons in [Chapter 6](#Chapter06.html#ch6).\n\n### Syncing\
    \ or Sharing Your Calendar(s) with Your iPad\n\nIf you maintain a calendar on\
    \ your computer or on a web site such as Google Calendar, you can synchronize\
    \ or share that calendar with your iPad either using iTunes and your sync cable\
    \ or by setting up a wireless synchronization (see Chapters 3 and 4 for more information\
    \ on syncing).\n\nAfter you set up the calendar sync, all of your computer calendar\
    \ appointments will be synced with your iPad calendar automatically, based on\
    \ your sync settings (see [Figure 15–1](#Chapter15.html#fig_15_1)).\n\nIf you\
    \ use iTunes to sync with your calendar (e.g., `Microsoft Outlook`, `Entourage`,\
    \ or Apple's `iCal`), your appointments will be transferred or synced every time\
    \ you connect your iPad to your computer.\n\nIf you use another method to sync\
    \ (e.g., Mobile Me, Exchange, or similar), this sync is wireless and automatic,\
    \ and it will most likely happen without you having to do anything after the initial\
    \ setup process.\n\n![images](images/1501.jpg)\n\n**Figure 15–1.** *Synching a\
    \ PC or Mac calendar to the iPad*\n\n### Viewing Your Schedule and Getting Around\n\
    \nThe default view for the calendar is your `Day` view. It will show you at a\
    \ glance any upcoming appointments for your day. Appointments are shown in your\
    \ calendar (see [Figure 15–2](#Chapter15.html#fig_15_2)). If you happen to have\
    \ several different calendars that you have set up on your computer, such as `Work`\
    \ and `Home`, then you will see these as separate colors on your iPad's calendar.\n\
    \n![images](images/1502.jpg)\n\n**Figure 15–2.** *The calendar's Day view layout*\n\
    \nYou can manipulate the calendar in various ways:\n\n* **Move a day at a time:**\
    \ If you tap the `Triangle` icons next to the `Slider` control at the bottom,\
    \ you move forward or backward a day.\n* **Change views:** Use the `Day`, `Week`,\
    \ `Month`, and `List` buttons at the top to change the view.\n\n    **TIP:** Drag\
    \ the `Slider` control at the bottom by moving left or right to advance quickly\
    \ through days.\n\n* **Jump to today:** Use the `Today` button at the bottom-left\
    \ corner.\n\n### The Calendar's Four Views\n\nYour iPad's `Calendar` app comes\
    \ with four views: `Day`, `Week`, `Month`, and `List`. You can switch views by\
    \ tapping the name of the view at the bottom of the screen. Here's a quick overview\
    \ of the four views:\n\n**Day view:** When you start the `Calendar` app, the default\
    \ view is usually the `Day` view. This allows you to quickly see everything you\
    \ have scheduled for the day. At the top of the `Calendar` app are buttons to\
    \ change the view.\n\n![images](images/p391-01.jpg)\n\n![images](images/p391-02.jpg)\n\
    \n**List (or Agenda) view:** Touch the `List` view button at the top, and you\
    \ can see a list of your appointments along the left-hand side.\n\nDepending on\
    \ how much you have scheduled, you might see the next day's or even the next week's\
    \ worth of scheduled events.\n\n![images](images/p391-03.jpg)\n\n**Week view:**\
    \ Touch the `Week` view button at the top and you can see all your appointments\
    \ for the week.\n\nSimilarly, tap any appointment to see details about that appointment.\n\
    \nOnce you see the details, you can tap the `Edit` button to change them.\n\n\
    ![images](images/p392-01.jpg)\n\n**Month view:** Touch the `Month` view and you\
    \ can see a layout of the full month. Days with appointments have a small dot\
    \ in them. The current day will show up highlighted in blue.\n\n**Tip:** Double-tap\
    \ any day to jump to the `Day` view for that date. To return to the `Today` view,\
    \ just touch the `Today` tab at the bottom left.\n\n![images](images/p392-02.jpg)\n\
    \nNavigating between months is easy:\n\n* **Go to the next month:** Tap the `Triangle`\
    \ icon to the right of the `Month` slider at the bottom.\n* **Go to the previous\
    \ month:** Tap the `Triangle` icon to the left of the `Month` slider.\n\n![images](images/p392-03.jpg)\n\
    \nTo advance days in `Day` view, just touch the `Arrow` icons to either side of\
    \ the `Date` slider at the bottom.\n\n**NOTE:** While you can scroll in the `Calendar`\
    \ app, you cannot swipe through your days, which runs counter to what you might\
    \ expect.\n\n### Working with Several Calendars\n\nYour iPad's `Calendar` app\
    \ can track various calendars. The number of calendars you see depends on how\
    \ you set up your synchronization using iTunes or other sync methods. In the example\
    \ that follows, we have categorized personal appointments in our `Home` calendar\
    \ and categorized work appointments in a separate `Work` calendar.\n\nIn the appointments\
    \ in our `Calendar` app, we have our `Home` calendar appointments showing up in\
    \ red and our `Work` calendar appointments in orange or green.\n\nWhen you set\
    \ up your `Sync` settings, you were able to specify which calendars you wanted\
    \ to sync with your iPad. You can customize your calendar further by following\
    \ these instructions:\n\n**Changing the colors:** You will need to change the\
    \ color of the calendar in the program on your computer that is synced to your\
    \ iPad; this will change the colors on your iPad.\n\n**Adding a new calendar:**\
    \ It's a two-step process to add a new calendar to sync with your iPad:\n\n1.\
    \  Set up that new calendar on your computer's `Calendar` program.\n2.  Adjust\
    \ your `Sync` settings to make sure this new calendar syncs to your iPad.\n\n\
    ![images](images/p393-01.jpg)\n\n**Viewing only one calendar:** To view just one\
    \ calendar at a time, tap the `Calendars` button at the top and select only the\
    \ calendar you wish to see.\n\n### Adding New Calendar Appointments/Events\n\n\
    You can easily add new appointments right on your iPad, and they will be synced\
    \ (or shared with) your computer the next time the sync takes place."
