    \ Pin, A0\n\nvoid setup() {\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = analogRead(ez1Analog);\n   if (val > 0) {\n \
    \     val = val / 2;\n      float cm = float(val)*2.54;\n      Serial.println(\
    \ int(cm) ); // cm\n   }\n}\n```\n\n## Pulse Width Output\n\nAn alternative to\
    \ using the AN pin on the EZ1 sensor is to use the PW pin and make use of the\
    \ pulse width output.\n\n### Note\n\nThe pulse width is 58 ms per cm, or 147 ms\
    \ per in.\n\nIf you disconnect the AN pin, and connect the EZ1’s PW pin to digital\
    \ pin 5 on the Arduino, which is one of the pins that supports PWM, the following\
    \ sketch replicates the functionality of the sketch in the preceding section in\
    \ a slightly different fashion:\n\n```\nint ez1Pulse = 5; // Digital Pin 5 (with\
    \ PWM)\n\nvoid setup() {\n   pinMode(ez1Pulse,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = pulseIn(ez1Pulse, HIGH);\n   if (val > 0) {\n\
    \      float cm = val / 58; // pulse width is 58 microsecs per cm\n      Serial.println(\
    \ int(cm) ); // cm\n   }\n}\n```\n\n## RS-232 Serial Output\n\nOne of the main\
    \ reasons I selected the EZ1 as our example sensor for this chapter is that this\
    \ sensor offers asynchronous serial reporting of measurements in addition to analog\
    \ and pulse width outputs. This means that we can bypass the Arduino board and\
    \ the RS-232 to TTL adaptor, and connect the sensor directly to the Redpark cable.\
    \ We’ll look at how to do that toward the end of the chapter.\n\n### Note\n\n\
    The TX output delivers asynchronous serial with an RS-232 format (although voltage\
    \ range is 0–Vcc). Output is an ASCII capital “R”, followed by three ASCII character\
    \ digits representing the range in inches (up to a maximum of 255), followed by\
    \ a carriage return (ASCII character 13).\n\nAlthough the voltage of 0–Vcc is\
    \ outside the RS-232 standard, most RS-232 devices have sufficient margin to read\
    \ 0–Vcc serial data. The baud rate is 9600, 8 bits, no parity, with one stop bit.\n\
    \n# MaxSonar Range Finder for iPhone\n\nAt least in the first instance, we’re\
    \ going to make use of the sensor in analog mode, and connect it to our Arduino\
    \ board, which in turn will be connected to our iPhone via the Redpark cable.\n\
    \nOpen Xcode, choose to create a new project, select a View-based application\
    \ for the iPhone device family, and when prompted name it “MaxSonar” and save\
    \ it to the Desktop.\n\n## Adding the Serial Library\n\nOpen your copy of the\
    \ Redpark Serial SDK and grab the *redparkSerial.h* and *rscMgr.h* header files\
    \ from the *inc/* folder, and the *libRscMgrUniv.a* static libraries from *lib/*.\
    \ Drag and drop them into your new MaxSonar project, remembering to tick the “Copy\
    \ items into destination group’s folder (if needed)” checkbox when prompted.\n\
    \nWe also need to add the External Accessories framework, so click on the project\
    \ icon at the top of the Project pane in Xcode, and click on the MaxSonar Target\
    \ and then on the Build Phases tab. Finally, click on the Link Binary with Libraries\
    \ item to open up the list of linked frameworks, and click on the + symbol to\
    \ add a new framework. Select the External Accessory framework from the drop-down\
    \ list and click the Add button.\n\nFinally, we need to declare support for the\
    \ cable. Click on the *SerialConsole-Info.plist* file to open it in the editor.\
    \ Right-click on the bottommost row of the list and select Add Row from the menu.\
    \ An extra row will be added to the table, and you’ll be presented with a drop-down\
    \ menu. Type **`UISupportedExternalAccessoryProtocols`** into the box. This will\
    \ change to the human-readable text “Supported external accessory protocols.”\
    \ Type the string **`com.redpark.hobdb9`** into Item 0 to declare our support\
    \ for the cable.\n\n## The CorePlot Library\n\nUnsurprisingly perhaps when dealing\
    \ with sensor data, the need to display a graph or a plot of some kind comes up\
    \ fairly often when you’re developing applications. Unfortunately, there is no\
    \ native support for graphs in the iOS SDK. The Core Plot library fills that hole\
    \ (see [Figure 4-3](#ch04s02.html#the_coreplot_test_application_running_in \"\
    Figure 4-3. The CorePlot test application running in the iPhone Simulator\")).\n\
    \n![The CorePlot test application running in the iPhone Simulator](httpatomoreillycomsourceoreillyimages895927.png.jpg)\n\
    \nFigure 4-3. The CorePlot test application running in the iPhone Simulator\n\n\
    The Core Plot library is a third-party 2D plotting framework for iOS and Mac OS\
    \ X, tightly integrated with Core Animation and under active development. At the\
    \ time of this writing, the latest release was version 0.4\\. You can download\
    \ it from [http://code.google.com/p/core-plot/](http://code.google.com/p/core-plot/).\n\
    \n### Note\n\nIf you want to live on the bleeding edge, you can check out the\
    \ source code straight from Core Plot’s repository using Mercurial:\n\n```\nhg\
    \ clone http://core-plot.googlecode.com/hg/ core-plot\n```\n\nMercurial doesn’t\
    \ ship with Xcode, so unless you’ve already installed it, your first step before\
    \ doing that will probably be to install Mercurial itself. You can download the\
    \ latest version of Mercurial from [http://mercurial.selenic.com/wiki/](http://mercurial.selenic.com/wiki/)."
  trans: "\n# 第 4 章 使用 iPhone 的外部传感器\n\n到目前为止，我们已经成功地在 Arduino 板和 iPhone 之间来回传递消息，接着又从\
    \ iPad 直接控制开发板。在本章中，我们将再进一步，构建一个能够开启远程传感器、解析从传感器获取的数值并实时绘制结果测量值的应用程序。\n\n# LV-MaxSonar-EZ1\
    \ 超声波测距传感器\n\n本章将使用的传感器是由 MaxBotics 公司生产的 LV-MaxSonar-EZ1 超声波测距传感器（见图 4-1），工作电压为\
    \ 5V 或 3.3V。\n\n![LV-MaxSonar-EZ1 超声波测距传感器](img/httpatomoreillycomsourceoreillyimages895923.png.jpg)\n\
    \n图 4-1. LV-MaxSonar-EZ1 超声波测距传感器\n\nEZ1 是一款多功能超声波测距仪，可从多家供应商处广泛购买，包括 [SparkFun](http://www.sparkfun.com/products/639)，售价约为\
    \ 25 美元。\n\n### 注\n\nLV-MaxSonar-EZ1 可检测 0 至 6.45 米（约 21 英尺）范围内的物体，对于超过 15 厘米（6\
    \ 英寸）的距离，分辨率为 2.5 厘米（1 英寸）。0 至 15 厘米之间的物体将显示为 15 厘米。\n\n有趣的是，该传感器提供了三种不同的接口：模拟电压输出、脉宽输出和串行数字输出。所有三个接口同时激活。更多信息请参阅[产品数据手册](http://www.maxbotix.com/documents/MB1010_Datasheet.pdf)。\n\
    \n## 模拟输出\n\n连接 EZ1 传感器最简单且最常用的方式可能是利用其模拟输出。我们只需要将三根线连接到传感器的 GND、+5V 和 AN 引脚。详情请参见图\
    \ 4-1 和图 4-2。\n\n![为模拟输出接线的 EZ1](img/httpatomoreillycomsourceoreillyimages895925.png.jpg)\n\
    \n图 4-2. 为模拟输出接线的 EZ1\n\n在此模式下使用 EZ1 传感器相当简单。如果将 5V 和 GND 引脚分别连接到 Arduino 板上的对应引脚，并将\
    \ AN 引脚连接到模拟引脚 A0，以下草图将距离测量值发送到 Arduino 的串行引脚（RX、TX）以及 USB 连接：\n\n```\nint ez1Analog\
    \ = 0; // 模拟引脚, A0\n\nvoid setup() {\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = analogRead(ez1Analog);\n   if (val > 0) {\n \
    \     val = val / 2;\n      float cm = float(val)*2.54;\n      Serial.println(\
    \ int(cm) ); // 厘米\n   }\n}\n```\n\n## 脉宽输出\n\n另一种可选方法是使用 EZ1 传感器上的 PW 引脚，利用其脉宽输出。\n\
    \n### 注\n\n脉宽为每厘米 58 微秒，或每英寸 147 微秒。\n\n如果断开 AN 引脚，并将 EZ1 的 PW 引脚连接到 Arduino 上支持\
    \ PWM 的引脚之一——数字引脚 5，以下草图以略微不同的方式复制了上一节草图的功能：\n\n```\nint ez1Pulse = 5; // 数字引脚\
    \ 5（带有 PWM）\n\nvoid setup() {\n   pinMode(ez1Pulse,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = pulseIn(ez1Pulse, HIGH);\n   if (val > 0) {\n\
    \      float cm = val / 58; // 脉宽为每厘米 58 微秒\n      Serial.println( int(cm) );\
    \ // 厘米\n   }\n}\n```\n\n## RS-232 串行输出\n\n我选择 EZ1 作为本章示例传感器的主要原因之一是，该传感器除了模拟和脉宽输出外，还提供测量值的异步串行报告。这意味着我们可以绕过\
    \ Arduino 板和 RS-232 转 TTL 适配器，将传感器直接连接到 Redpark 线缆。我们将在本章末尾探讨如何实现这一点。\n\n### 注\n\
    \nTX 输出提供具有 RS-232 格式的异步串行数据（尽管电压范围为 0–Vcc）。输出为一个 ASCII 大写字母“R”，后跟三个 ASCII 字符数字，表示以英寸为单位的距离（最大\
    \ 255），最后跟一个回车符（ASCII 字符 13）。\n\n尽管 0–Vcc 的电压超出了 RS-232 标准，但大多数 RS-232 设备具有足够的余量来读取\
    \ 0–Vcc 的串行数据。波特率为 9600，8 位数据位，无奇偶校验，1 位停止位。\n\n# 适用于 iPhone 的 MaxSonar 测距仪\n\n\
    至少在最初阶段，我们将以模拟模式使用该传感器，并将其连接到 Arduino 板，Arduino 板再通过 Redpark 线缆连接到我们的 iPhone。\n\
    \n打开 Xcode，选择创建一个新项目，为 iPhone 设备系列选择基于视图的应用程序，在提示时将其命名为“MaxSonar”并保存到桌面。\n\n##\
    \ 添加串行库\n\n打开你的 Redpark 串行 SDK 副本，从 `inc/` 文件夹中获取 `redparkSerial.h` 和 `rscMgr.h`\
    \ 头文件，并从 `lib/` 文件夹中获取 `libRscMgrUniv.a` 静态库。将它们拖放到你的新 MaxSonar 项目中，记得在提示时勾选“将项目复制到目标组的文件夹中（如果需要）”复选框。\n\
    \n我们还需要添加 External Accessories 框架，因此点击 Xcode 项目窗格顶部的项目图标，然后点击 MaxSonar 目标，接着点击\
    \ Build Phases 选项卡。最后，点击“Link Binary with Libraries”项以打开链接框架列表，并点击 + 符号添加新框架。从下拉列表中选择\
    \ External Accessory 框架，然后点击 Add 按钮。\n\n最后，我们需要声明对线缆的支持。点击 `SerialConsole-Info.plist`\
    \ 文件以在编辑器中打开它。右键点击列表最底部的行，从菜单中选择“Add Row”。表格中会添加一个额外的行，并出现一个下拉菜单。在框中输入 `UISupportedExternalAccessoryProtocols`。这将变为人类可读文本“Supported\
    \ external accessory protocols”。在 Item 0 中输入字符串 `com.redpark.hobdb9` 以声明我们对线缆的支持。\n\
    \n## CorePlot 库\n\n在处理传感器数据时，开发应用程序时经常需要显示某种图表或图形，这也许并不令人意外。不幸的是，iOS SDK 中没有原生的图表支持。Core\
    \ Plot 库填补了这一空白（见图 4-3）。\n\n![在 iPhone 模拟器中运行的 CorePlot 测试应用程序](img/httpatomoreillycomsourceoreillyimages895927.png.jpg)\n\
    \n图 4-3. 在 iPhone 模拟器中运行的 CorePlot 测试应用程序\n\nCore Plot 库是一个用于 iOS 和 Mac OS X 的第三方\
    \ 2D 绘图框架，与 Core Animation 紧密集成，并处于积极开发中。在撰写本文时，最新版本是 0.4。你可以从 [`code.google.com/p/core-plot/`](http://code.google.com/p/core-plot/)\
    \ 下载。\n\n### 注\n\n如果你想尝鲜，可以直接使用 Mercurial 从 Core Plot 的仓库中检出源代码：\n\n```\nhg clone\
    \ http://core-plot.googlecode.com/hg/ core-plot\n```\n\nMercurial 并未随 Xcode 一起提供，因此除非你已经安装，否则在此之前的第一步可能是安装\
    \ Mercurial 本身。你可以从 [`mercurial.selenic.com/wiki/`](http://mercurial.selenic.com/wiki/)\
    \ 下载最新版本的 Mercurial。\n"
- fmt: '### Compiling the Core Plot library from source code


    Download the `CorePlot_0.4.zip` file from the Core Plot website, or check the
    latest version out of the project’s Mercurial repository. Open up the `CorePlot/framework/`
    folder and click on the `CorePlot-CocoaTouch.xcodeproj` project file to open it
    in Xcode.


    Select “Universal Library | iOSDevice” from the Scheme drop-down menu and then
    Build (`⌘B`) from the Product menu to build a universal (fat) static library that
    we can use on both the device and in the iPhone Simulator.


    After building, move one folder back up and go into the newly created `build`
    directory. Inside the `build/Release-universal/` directory you’ll find the `libCorePlot-CocoaTouch.a`
    static library; however, in addition to this, we need the associated header files.
    The custom build script, which created the universal library, doesn’t copy these
    header files from the individual build directories. However you can find them
    in the `build/Release-iphoneos/usr/local/include/` or `build/Release-iphonesimulator/usr/local/include/`
    directories. Which set of header files you use in your project isn’t really relevant;
    both sets are identical.


    ### Adding the Core Plot library to the project


    Drag and drop the `libCorePlot-CocoaTouch.a` static library from the `build/Release-universal/`
    folder into your project, remembering to tick the “Copy items into destination
    group’s folder (if needed)” checkbox when prompted. Then copy one of the two sets
    of header files, all of them, into your project. Again remember to tick the “Copy
    items into destination group’s folder (if needed)” checkbox.


    Click on the MaxSonar project file at the top of the Project pane, select the
    MaxSonar Target, and click on the Build Settings tab. Find the Other Linker Flags
    setting (under the Linking section) and double-click to open the pop-up window
    and add the `-ObjC -all_load` flags to the target (see [Figure 4-4](#ch04s02.html#adding_the_other_linker_flags_to_your_ta
    "Figure 4-4. Adding the other linker flags to your target")).


    Finally, since the Core Plot library makes use of the QuartzCore framework, we
    need to add this to our project. Click on the Build Phases tab and then on the
    Link Binary with Libraries item to open up the list of linked frameworks, and
    click on the + symbol to add a new framework. Select the QuartzCore framework
    from the drop-down list and click the Add button.


    ![Adding the other linker flags to your target](httpatomoreillycomsourceoreillyimages895929.png.jpg)


    Figure 4-4. Adding the other linker flags to your target


    ## Building the User Interface


    Now that we’ve added the third-party infrastructure we’ll need to build the application,
    it’s time to build out the user interface. Click on the `MaxSonarViewController.xib`
    file to open it in Interface Builder and drag and drop a `UINavigationBar`, a
    `UISwitch`, a couple of `UILabel` elements, and finally a generic `UIView` into
    your View. Arrange them as shown in [Figure 4-5](#ch04s02.html#building_the_user_interface-id2
    "Figure 4-5. Building the user interface"). Change the text in the navigation
    bar to read “LV-MaxSonar-EZ1” and the text in the two labels to be “Distance:”
    and “0.00”.


    ![Building the user interface](httpatomoreillycomsourceoreillyimages895932.png.jpg)


    Figure 4-5. Building the user interface


    Click on the generic `UIView` in your View and open up the Identity inspector
    in the Utilities pane on the right. We need to change the Class of our View from
    `UIView` to be a `CPTGraphHostingView`. See [Figure 4-6](#ch04s02.html#setting_a_custom_view
    "Figure 4-6. Setting a custom view").


    ### Warning


    Depending on which version of the Core Plot library you are working with, you
    may need to specify the custom view as a `CPGraphHostingView` instead.


    This custom view is the one we’re going to use to plot our real-time graph of
    the sensor readings coming from the EZ1 sensor via the Arduino and the serial
    link to our iPhone.


    ![Setting a custom view](httpatomoreillycomsourceoreillyimages895934.png.jpg)


    Figure 4-6. Setting a custom view


    After changing the view’s class, close the Utilities panel and open up the Assistant
    Editor. Make sure it’s in Automatic mode and Ctrl-click and drag from the `CPTGraphHostingView`
    to the `MaxSonarViewController.h` interface file to create a `graph` instance
    variable and property. Similarly, Ctrl-click and drag from the right-hand `UILabel`
    and `UISwitch` to create `distance` and `toggle` instance variables and properties.
    Finally, Ctrl-click and drag one more time from the `UISwitch` to a `toggled`
    method and `IBAction`, as in [Figure 4-7](#ch04s02.html#connecting_the_outlets_and_actions-id2
    "Figure 4-7. Connecting the outlets and actions").


    ![Connecting the outlets and actions](httpatomoreillycomsourceoreillyimages895936.png.jpg)


    Figure 4-7. Connecting the outlets and actions


    Save your changes, switch back to the Standard Editor, and click on the `MaxSonarViewController.h`
    interface file to open it in the editor. You should notice that we’ve got an error
    next to the `CPTGraphHostingView` instance variable; that’s because Xcode doesn’t
    know what it is yet. Go ahead and add the following import statement at the top
    of your code:


    ```

    #import "CorePlot-CocoaTouch.h"

    ```


    If you select Build (`⌘B`) from the Product menu to build your project at this
    point, everything should compile. If that’s not the case, you should probably
    make sure you’ve added the External Accessory and QuartzCore frameworks to your
    project before you begin looking elsewhere.'
