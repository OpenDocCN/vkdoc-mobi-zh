    \ to go through the code and instrument up your delegate methods with a few `NSLog`\
    \ statements and redeploy the code to your device. If you do that, you might see\
    \ something like [Figure 2-20](#ch02s07.html#the_log_viewer_in_action \"Figure\
    \ 2-20. The log viewer in action\").\n\n# Summary\n\nIn this chapter we’ve built\
    \ a simple serial console for iOS, and passed messages back and forth between\
    \ our iPhone and our Arduino board. We’ve also built a log window view controller\
    \ that we can reuse in other projects, which will be useful when we’re debugging.\n\
    \nIn the next chapter, we’re going to build something a bit more ambitious, this\
    \ time for the iPad.\n\n![The log viewer in action](httpatomoreillycomsourceoreillyimages895898.png.jpg)\n\
    \nFigure 2-20. The log viewer in action\n\n# Chapter 3. Controlling the Arduino\
    \ from the iPad\n\nIn the previous chapter, we passed messages back and forth\
    \ between the Arduino and the iPhone using the Redpark Serial Cable and the SDK.\
    \ Now let’s make the Arduino do something other than sending messages, and turn\
    \ some LEDs on and off directly from our iPad.\n\n# An Arduino on Your iPad\n\n\
    We’re going to go ahead and build a simple application for the iPad that will\
    \ let you pull an arbitrary pin on the Arduino HIGH or set it LOW. While we’ll\
    \ be building the application for the iPad, because I want to take advantage of\
    \ all that screen real estate, the code will run just fine on the iPhone (or the\
    \ iPod touch) if you want to build it as an application for the iPhone without\
    \ any modification.\n\nOpen Xcode, choose to create a new project, select a View-based\
    \ application for the iPad device family, and when prompted name it \"Paduino\"\
    \ and save it to the Desktop. When the project opens, deselect Landscape Left\
    \ and Landscape Right as supported orientations. We’re going to be working in\
    \ portrait mode.\n\n## Adding the Serial Library\n\nThis time, let’s start by\
    \ adding the Redpark library. Open up your copy of the Redpark Serial SDK, grab\
    \ the `redparkSerial.h` and `rscMgr.h` header files from the `inc/` folder and\
    \ the `libRscMgrUniv.a` static libraries from `lib/`, and then drag and drop them\
    \ into your new Paduino project, remembering to tick the \"Copy items into destination\
    \ group’s folder (if needed)\" checkbox when prompted.\n\nWe also need to add\
    \ the External Accessories framework, so click on the project icon at the top\
    \ of the Project pane in Xcode and click on the Paduino Target, and then on the\
    \ Build Phases tab. Finally, click on the Link Binary with Libraries item to open\
    \ up the list of linked frameworks, and click on the + symbol to add a new framework.\
    \ Select the External Accessory framework from the drop-down list, and click the\
    \ Add button.\n\nFinally, we need to declare support for the cable. Click on the\
    \ `SerialConsole-Info.plist` file to open it in the editor. Right-click on the\
    \ bottommost row of the list and select Add Row from the menu. An extra row will\
    \ be added to the table, and you’ll be presented with a drop-down menu. Type `UISupportedExternalAccessoryProtocols`\
    \ into the box. This will change to the human-readable text \"Supported external\
    \ accessory protocols.\" Type the string `com.redpark.hobdb9` into Item 0 to declare\
    \ our support for the cable.\n\n## Building the User Interface\n\nThe first thing\
    \ we’re going to need is a high-resolution picture of an Arduino. There are plenty\
    \ of these available on the Web, or you can use an image of your own."
