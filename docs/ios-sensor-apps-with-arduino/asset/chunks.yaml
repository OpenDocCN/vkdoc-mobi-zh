    # 将 XBee 连接到你的 Mac


    由于我手头恰好有几个闲置的，我打算使用 Adafruit 的扩展板，这款扩展板在[Maker Shed](http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD13)也有售。它的设计是与
    FTDI 线缆配合使用的（参见图 5-3），正因如此，它也可以轻松与面包板配合使用，将 XBee 连接到 Arduino，这样我就不需要单独的转接板了。


    ![安装在 Adafruit 适配器套件上的 XBee 模块，连接 FTDI 线缆用于编程](img/httpatomoreillycomsourceoreillyimages895961.png.jpg)


    图 5-3. 安装在 Adafruit 适配器套件上的 XBee 模块，连接 FTDI 线缆用于编程


    虽然 Digi 自己的配置工具 X-CTU 可以免费获取，但它仅支持 Windows 系统。除非你在 BootCamp 或虚拟机中运行 Windows，否则无法使用它。幸运的是，只需偶尔用它来更新
    XBee 模块的固件。对于配置无线电模块，我们通常只需要一个终端程序即可。


    ### 注意


    Mac OS X 系统上有很多终端程序可用。我将使用[Roger Meier 开发的 CoolTerm](http://freeware.the-meiers.org/)。这是一个相对简单的应用程序，非常适合用来配置你的
    XBee 无线电模块。


    将你的 XBee 无线电模块插入适配器板，然后将板子连接到你的 Mac。如果你像我一样使用 Adafruit 的板子，你应该会看到板子上的绿色（ASC）LED
    灯开始闪烁。


    打开你的终端应用程序，并确保它设置到了正确的串行端口。你可以通过命令行找出可用的串行端口：


    ```

    % ls /dev/tty.*

    crw-rw-rw-  1 root  wheel   11,   2  8 Jul 09:01 /dev/tty.Bluetooth-Modem

    crw-rw-rw-  1 root  wheel   11,   0  8 Jul 09:01 /dev/tty.Bluetooth-PDA-Sync

    crw-rw-rw-  1 root  wheel   11,  66  3 Aug 14:15 /dev/tty.usbserial-FTE4XVKD

    ```


    XBee 模块正确的端口（至少通常来说）应该相当明显。在我的例子中，它是`/dev/tty.usbserial-FTE4XVKD`。如果你使用的是 CoolTerm，你可以通过点击工具栏中的
    Options 按钮来更改连接的串行端口（参见图 5-4）。


    ### 注意


    默认情况下，CoolTerm 的本地回显是关闭的。你可能需要在 Options 菜单中启用此功能，以便操作更轻松。如果它被关闭，你将看不到自己输入的内容，只会显示
    XBee 无线电模块的响应。


    ![在 CoolTerm 选项中配置端口和本地回显](img/httpatomoreillycomsourceoreillyimages895963.png.jpg)


    图 5-4. 在 CoolTerm 选项中配置端口和本地回显


    如果你的终端程序默认设置不是这样，请将其设置为使用 9600 波特率和 8-N-1，且无流控制。


    一旦你确认终端程序设置正确，就将其连接到选定的串行端口。在 CoolTerm 中，你只需点击工具栏中的 Connect 按钮即可完成此操作。此时，在主窗口中输入`+++`（快速连续输入三个加号）。如果一切连接正确，你应该会从
    XBee 无线电模块收到一个`OK`响应（参见图 5-5）。


    ![XBee 无线电模块已正确连接到你的 Mac](img/httpatomoreillycomsourceoreillyimages895965.png.jpg)


    图 5-5. XBee 无线电模块已正确连接到你的 Mac


    通过输入这三个加号，我们已将 XBee 置于配置模式。此时我们可以向模块发送`AT`命令，以便配置无线电模块。过一会儿，XBee 会超时并返回到直通连接模式。如果在配置过程中发生这种情况，只需再次输入`+++`，它就会重新开始响应。


    XBee 的基本配置包括：串行通信的波特率、网络标识符（PAN）、节点地址（MY）以及目标节点地址（DL）。


    # XBee 寻址


    802.15.4 协议使用寻址来区分不同的无线电模块，并防止数据包重复。每个模块拥有唯一的源地址（MY）非常重要，这样可以防止非重复消息因被误判为重复而被忽略。


    模块之间存在两种基本的寻址形式：广播和单播。广播消息是指定 PAN 上所有模块都会接收到的消息。该消息仅发送一次且不会重发，因此无法保证任何特定节点能接收到该消息。要发送广播消息，请将目标节点地址（DL）设置为`0xFFFF`。通过这些设置，所有在广播节点范围内的
    XBee 模块都将收到该消息。


    单播消息更可靠。它根据模块的寻址方式从一个模块发送到另一个模块。如果消息被正确接收，接收方的无线电模块将发回一个确认（或 ACK）。如果发送模块未收到 ACK，它将尝试
    MAC 层重试，每次传输重试三次，总共尝试四次，直到收到 ACK。这大大提高了数据到达目的地的概率。要发送单播消息，请将目标节点地址（DL）设置为你希望通信的节点的节点地址（MY）。

