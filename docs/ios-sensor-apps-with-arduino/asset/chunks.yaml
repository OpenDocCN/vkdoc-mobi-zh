  trans: "\n## 编写 Arduino 程序\n\n打开 Arduino 开发环境，输入以下代码并上传到你的 Arduino 板。我们将使用模拟引脚 `0`（大多数板上通常标记为\
    \ `A0`）作为 EZ1 传感器的模拟输入：\n\n```\nint statusLed = 13;\nint ez1Analog = 0;\n\nvoid\
    \ setup() {\n   pinMode(statusLed,OUTPUT);\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = analogRead(ez1Analog);\n   if (val > 0) {\n \
    \     val = val / 2;\n      float cm = float(val)*2.54;\n      Serial.println(\
    \ int(cm) );\n   }\n   blinkLed( statusLed, 100 );\n\n}\n\nvoid blinkLed(int pin,\
    \ int ms) {\n   digitalWrite(pin,LOW);\n   digitalWrite(pin,HIGH);\n   delay(ms);\n\
    \   digitalWrite(pin,LOW);\n   delay(ms);\n}\n```\n\n![1](img/#ch04s02.html#co12_id)\n\
    \n这里我们使用一个简便方法来闪烁板载 LED（引脚 `13`），闪烁持续时间为 `100` 毫秒。这样做一方面是为了确认程序确实在运行，另一方面也是为了在发送到手机的读数之间加入时间间隔。\n\
    \n## 组装全部组件\n\n通常情况下，EZ1 需要 `5` V 电压；但根据数据手册，我们也可以在 `3.3` V 电压下运行它，不过性能会有所降低。这简化了将所有组件连接到\
    \ Arduino 板的过程。将 EZ1 的 `+VE` 线插入 Arduino 板的 `3.3V` 引脚，将 `GND` 线插入任意一个可用的 `GND`\
    \ 引脚，然后将 `AN` 线连接到模拟引脚 `0`（`A0`）。最后，照常将 RS-232 转 TTL 串口适配器连接到 `5V`、`GND`、`RX`\
    \ 和 `TX` 引脚（参见 图 4-9）。\n\n![连接所有组件](img/httpatomoreillycomsourceoreillyimages895940.png.jpg)\n\
    \n图 4-9. 连接所有组件\n\n如果你确实想将 EZ1 连接到 `+5V` 引脚而非 `3.3V` 引脚，最简单的办法可能就是使用一块面包板和一些跳线。\n\
    \n确认所有连接正确无误后，给 Arduino 板上电并启动应用程序。将 EZ1 指向天花板以获取一个较远的距离测量值，然后将手放在传感器上方。你应该会看到测得的距离急剧下降。慢慢抬起手，保持在传感器上方，观察读数变化。此时，你应该能看到类似于图\
    \ 4-10 所示的效果。\n\n![在 iPhone 上运行的 MaxSonar 应用程序](img/httpatomoreillycomsourceoreillyimages895942.png.jpg)\n\
    \n图 4-10. 在 iPhone 上运行的 MaxSonar 应用程序\n\n## 控制开关\n\n你可能已经注意到，我们还没有对拨动开关进行任何处理。现在让我们来让它变得可用。首先，我们需要修改\
    \ Arduino 程序：\n\n```\nint statusLed = 13;\nint powerLed = 12;\nint ez1Analog =\
    \ 0;\n\nint aByte;\nint flag = 0;\n\nvoid setup() {\n   pinMode(statusLed,OUTPUT);\n\
    \   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\n   pinMode(powerLed,OUTPUT);\n\
    \   blinkLed( statusLed, 500 );\n}\n\nvoid loop() {\n\n   if (Serial.available()\
    \ > 0) {\n          aByte = Serial.read();\n          if ( flag == 0 ) {\n   \
    \         flag = 1;\n            digitalWrite(powerLed, HIGH);\n          } else\
    \ {\n            flag = 0;\n            digitalWrite(powerLed, LOW);\n       \
    \   }\n    }\n\n   if ( flag == 1 ) {\n     int val = analogRead(ez1Analog);\n\
    \n     if ( val > 0 ) {\n         val = val / 2;\n         float cm = float(val)*2.54;\n\
    \         Serial.println( int(cm) ); // cm\n         blinkLed( statusLed, 100);\n\
    \      }\n   }\n\n}\n\nvoid blinkLed(int pin, int ms) {\n   digitalWrite(pin,LOW);\n\
    \   digitalWrite(pin,HIGH);\n   delay(ms);\n   digitalWrite(pin,LOW);\n   delay(ms);\n\
    }\n```\n\n这里我们重写了 `loop()` 函数，使得 Arduino 仅在接收到来自手机的字节从而被“打开”时，才向 iPhone 发送数据；收到另一个字节后，则停止发送数据。我还使用了引脚\
    \ `12` 上的第二个 LED 来指示数据正在发送，但这完全是可选的，如果你不想费事在 Arduino 板上再连接一个 LED，可以省略它。\n\n你会注意到，我们假设初始状态为“关闭”，但目前我们的用户界面初始状态是“打开”。我们需要修复这个问题，因此在\
    \ Interface Builder 中打开 `MaxSonarViewController.xib` 文件，点击视图中的开关，然后在工具面板的属性检查器中，将开关的初始状态改为“关闭”。\n\
    \n最后，为了将所有部分整合在一起，我们在切换回调中添加一些代码：\n\n```\n- (IBAction)toggled:(id)sender {\n \
    \   txBuffer[0] = 1;\n    int bytesWritten = [rscMgr write:txBuffer Length:1];\n\
    \n}\n```\n\n现在，如果你重新构建并重新将 MaxSonar 应用程序部署到 iPhone 上，应该就能使用开关来启动和停止从手机接收数据了。\n"
- fmt: '# Connecting Directly to the Cable


    Because the `EZ1` has an `RS-232` connection, it’s actually possible to connect
    it directly to the `Redpark` cable without using the `Arduino` board at all. The
    `Redpark Serial Cable` is wired in a standard fashion, terminating with a male
    `DB-9` connector; the pin out for this connector is shown in [Figure 4-11](#ch04s03.html#the_redpark_serial_cable_db-9_connector)
    and described in [Table 4-1](#ch04s03.html#the_redpark_serial_cable_db-9_open_paren).


    ![The Redpark Serial cable DB-9 connector](httpatomoreillycomsourceoreillyimages895945.png.jpg)


    **Figure 4-11.** The Redpark Serial cable DB-9 connector


    **Table 4-1.** The Redpark Serial Cable DB-9 (male) Connector Pin Out


    | Pin Number | Function | I/O | Description |

    | --- | --- | --- | --- |

    | 1 | `DCD` | I | Data carrier detect |

    | 2 | `RX` | I | Receive |

    | 3 | `TX` | O | Transmit |

    | 4 | `DTR` | O | Data terminal ready |

    | 5 | `GND` | - | Ground |

    | 6 | `DSR` | I | Data set ready |

    | 7 | `RTS` | O | Request to send |

    | 8 | `CTS` | I | Clear to send |

    | 9 | `RI` | I | Ring indicator |


    Comparing [Figure 4-1](#ch04.html#the_lv-maxsonarr-ez1t) and [Figure 4-11](#ch04s03.html#the_redpark_serial_cable_db-9_connector),
    we’ll need to wire up only 3 of the 9 available pins: `GND`, `RX`, and `TX`. Taking
    a female `DB-9` connector, you should therefore wire it as in [Figure 4-12](#ch04s03.html#pin_wiring_for_the_lv-maxsonar-ez1_conne).
    Comparing [Figure 4-11](#ch04s03.html#the_redpark_serial_cable_db-9_connector)
    and [Figure 4-12](#ch04s03.html#pin_wiring_for_the_lv-maxsonar-ez1_conne), you
    should notice that in the female connector, we wire pin 2 to `TX` and pin 3 to
    `RX`. This means that `TX` from the `EZ1` is connected to `RX` on the cable, and
    vice versa.


    ![Pin wiring for the LV-MaxSonar-EZ1 connecting to DB9 (female)](httpatomoreillycomsourceoreillyimages895947.png.jpg)


    **Figure 4-12.** Pin wiring for the LV-MaxSonar-EZ1 connecting to DB9 (female)


    After wiring this cable, go ahead and solder a header block onto the `EZ1` sensor
    board (see [Figure 4-13](#ch04s03.html#header_block_soldered_to_the_ez1_sensor)).


    ![Header block soldered to the EZ1 sensor](httpatomoreillycomsourceoreillyimages895949.png.jpg)


    **Figure 4-13.** Header block soldered to the EZ1 sensor


    When wiring the `EZ1` sensor, you should be careful not to obstruct the sensor
    head itself; doing so means that you’ll get inaccurate measurements when you power
    it on. Depending on your application, you may want to attach the header pins to
    the rear of the board or use a right angle header block so that there is no chance
    of obstructing the sensor.


    Once you’ve soldered the header block to the sensor board, you should find an
    appropriate 3.3 V or 5 V power supply. I’m using `2 × 1.5 V` batteries to provide
    a 3 V supply, which should be sufficient to test the sensor. We then need to gather
    our ground connections and power the sensor. The easiest way to do this is probably
    to use a breadboard (see [Figure 4-14](#ch04s03.html#wiring_the_ez1_sensor_comma_cable_and_ba)).


    ![Wiring the EZ1 sensor, cable, and battery pack](httpatomoreillycomsourceoreillyimages895951.png.jpg)


    **Figure 4-14.** Wiring the EZ1 sensor, cable, and battery pack


    Now that the hardware is complete, let’s look and see what we need to do on the
    software side. Looking at the datasheet, we see that the output from the sensors
    is an ASCII capital `"R"`, followed by three ASCII character digits representing
    the range in inches (up to a maximum of 255), followed by a carriage return (ASCII
    character 13), for a message length of 5 bytes in total.


    We’ve already written some software that will handle that sort of output just
    fine, our `SerialConsole` application from [Chapter 2](#ch02.html). Connect your
    `Redpark` cable to the female `DB9` connector and to your `iPhone` and run the
    `SerialConsole` application. You should see something like [Figure 4-15](#ch04s03.html#the_output_from_the_ez1_inside_the_seria).


    ![The output from the EZ1 inside the SerialConsole application](httpatomoreillycomsourceoreillyimages895953.png.jpg)


    **Figure 4-15.** The output from the EZ1 inside the SerialConsole application


    You’ll see that the datasheet isn’t strictly accurate; a copyright notice is displayed
    the first time the sensor is powered on. Good thing we checked. If you type something
    in the text entry widget and tap on send, you’ll see another reading appears in
    the console view (see [Figure 4-16](#ch04s03.html#the_serialconsole_application_showing_mu)).


    ![The SerialConsole application showing multiple readings from the EZ1](httpatomoreillycomsourceoreillyimages895955.png.jpg)


    **Figure 4-16.** The SerialConsole application showing multiple readings from
    the EZ1


    From here, it’s a relatively simple job to modify our existing `readBytesAvailable:`
    method to look for a string of the form matching the distance readings from the
    `EZ1`’s `RS-232` interface.


    # Chapter 5. Connecting to an XBee Network


    All of the incarnations of the iPhone, iPod touch, and iPad come with WiFi networking,
    or more formally, IEEE 802.11. This is a set of standards for implementing wireless
    local area networking (WLAN) computer communication in the 2.4, 3.6, and 5 GHz
    frequency bands, although none of the existing iOS-based devices support anything
    other than the 2.4 GHz band.


    However, there are many other standards for wireless communication, many of which
    also make use of the 2.4 GHz band, which are intended for other purposes and hence
    designed in a different fashion. They may use the same wavelength bands, but the
    protocols are very different.


    One of the most commonly used protocols when dealing with sensor networks is IEEE
    802.15.4. In contrast to IEEE 802.11, this protocol focuses on low-cost, low-speed
    communication between devices and is intended for low-power scenarios. It is the
    basis for the higher-level ZigBee protocol, also commonly found when dealing with
    sensor networks, which further extends the standard by developing the upper layer
    protocols to enable mesh networking between devices.


    While many other bands of 802.15.4-based hardware exist, probably the most heavily
    used are the XBee branded radios. They’re in common use, both by professionals
    who use them for prototyping, and in the hobbyist market, because they’re especially
    easy for beginners to use. For this and other reasons I’m going to focus on the
    XBee-branded radio modules that are manufactured by [Digi International](http://www.digi.com/).'
