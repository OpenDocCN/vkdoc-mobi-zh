    # Chapter 5. Connecting to an XBee Network


    All of the incarnations of the iPhone, iPod touch, and iPad come with WiFi networking,
    or more formally, IEEE 802.11\. This is a set of standards for implementing wireless
    local area networking (WLAN) computer communication in the 2.4, 3.6, and 5 GHz
    frequency bands, although none of the existing iOS-based devices support anything
    other than the 2.4 GHz band.


