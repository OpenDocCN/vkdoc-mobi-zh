    # 使用 Arduino 开发 iOS 传感器应用


    ### 阿拉斯代尔·艾伦


    #### 编辑


    ### 布莱恩·杰普森


    #### 编辑


    ### 肖恩·华莱士


    版权所有 © 2011 阿拉斯代尔·艾伦


    O’Reilly 书籍可用于教育、商业或销售推广目的。大多数书籍也提供在线版本 ([`my.safaribooksonline.com`](http://my.safaribooksonline.com/?portal=oreilly))。如需更多信息，请联系我们的企业/机构销售部门：(800)
    998-9938 或 corporate@oreilly.com。


    Nutshell Handbook、Nutshell Handbook 徽标以及 O’Reilly 徽标是 O’Reilly Media, Inc. 的注册商标。*使用
    Arduino 开发 iOS 传感器应用*、刺豚鼠图像及相关商业装潢是 O’Reilly Media, Inc. 的商标。


    制造商和销售商用于区分其产品的许多标识被视为商标。当这些标识出现在本书中，且 O’Reilly Media, Inc. 已知晓相关商标声明时，这些标识将以全大写或首字母大写形式印刷。


    尽管在编写本书时已采取一切预防措施，但出版商和作者对其中可能存在的错误、遗漏或因使用本书所含信息而造成的损失概不负责。


    ![](img/oreilly_large.gif)


    O''Reilly Media


    * * *


    # 前言


    iPhone（iPod touch 和 iPad）平台配备了一系列日益丰富的内置传感器：GPS、加速度计、磁力计以及最新的陀螺仪。这些设备还拥有几乎无处不在的数据连接，无论是通过本地无线热点还是运营商数据网络，并可通过多种方法（包括
    GPS）进行用户定位。它们堪称分布式传感器网络的卓越中心。


    然而，直到最近，要将这些原本有趣的设备与 iPhone 连接起来仍然相当困难。苹果专有的底座连接器是一大主要障碍。现在情况已经改变，读完本书后，你将能够将你的手机用作传感器网络的中心，使其成为物联网的一部分。


    # 谁应该阅读本书？


    本书介绍了如何将你的 iOS 设备连接到现实世界。为此，我们将广泛使用 [Arduino](http://arduino.cc/) 开源电子原型平台。如果你是有一定
    iPhone 开发经验的程序员，本书将帮助你连接 iOS 设备与外部硬件。如果你是一位经验丰富的 Mac 程序员，已熟悉 Objective-C，本书将向你介绍
    iPhone 编程中与硬件相关的部分。


    # 你应该具备哪些知识？


    本书假设你已有一些 Objective-C 语言的经验。此外，还假设你对 iPhone 平台有一定了解。如果你是 iPhone 平台的新手，可能对阿拉斯代尔·艾伦的另一本著作
    *[学习 iPhone 编程](http://oreilly.com/catalog/9780596806439/)*（O''Reilly）感兴趣。本书不要求或期望读者熟悉
    Arduino 平台。本书面向希望学习如何与外部硬件通信的 Objective-C 程序员。不过，如果你完全不熟悉 Arduino 平台，你可能想阅读马西莫·班齐所著的
    *[Arduino 入门](http://oreilly.com/catalog/9780596155520)*（O''Reilly）。


    ### 警告


    本书假设你具备如何构建和部署应用到你的 iPhone、iPod touch 或 iPad 的工作知识。如果你没有 iOS 经验，建议你结合 *[学习 iPhone
    编程](http://oreilly.com/catalog/9780596806439/)* 来阅读本书。


    # 你将学到什么？


    本书将引导你为 iOS 平台开发应用程序，利用 [Redpark 串行电缆](http://www.redpark.com/) 和 External Accessory
    框架，将你的 iPhone、iPod touch 或 iPad 连接到任何标准串行（RS-232）设备。除此之外，我们还会探讨一些不那么官方（但可能更有趣）的方法来实现相同目标。


    # 本书内容概览


    第 1 章


    本章面向不熟悉 Arduino 的 Objective-C 程序员。它将向你介绍该平台，并带你完成硬件的“Hello World”范例——闪烁的 LED。我们还将讨论如何使用
    Arduino 和你的开发机器之间的串行连接。


    第 2 章


    本章将介绍 Redpark 串行电缆，并引导你构建两个基本应用。第一个将允许 Arduino 与 iPhone 通信，第二个将允许 iPhone 与 Arduino
    通信。


    第 3 章


    本章将指导你为 iPad 构建一个完整的应用程序，以便通过用户友好的界面实现对 Arduino 的任意控制。


    第 4 章


    在本章中，我们将把传感器连接到 Arduino，然后使用串行电缆将读数传输到 iPhone。我们还将研究用于绘制图表的 Core Plot 库。


    第 5 章


    本章介绍 Digi XBee 无线电模块，并指导你将它们连接到 Arduino 和 iOS 平台。


    第 6 章


    本章探讨将 iPhone 或 iPad 连接到串行设备的其他方法。我们将研究使用 MIDI 协议（iOS SDK 官方支持），以及使用 iOS 设备的耳机插孔作为软件调制解调器。


    # 本书使用的约定


    本书使用以下排版约定：


    *斜体*


    表示新术语、URL、电子邮件地址、文件名和文件扩展名。


    `等宽字体`


    用于程序清单，以及在段落中引用程序元素，如变量或函数名、数据库、数据类型、环境变量、语句和关键字。


    **`等宽粗体`**


    表示应由用户原样输入的命令或其他文本。


    *`等宽斜体`*


    表示应替换为用户提供的值或由上下文确定的值的文本。


    ### 注意


    此图标表示提示、建议或一般性说明。


    ### 警告


    此图标表示警告或注意事项。


    # 使用代码示例


    本书旨在帮助你完成工作。通常，你可以在自己的程序和文档中使用本书中的代码。除非你复制了代码的实质性部分，否则无需联系我们获得许可。例如，编写一个使用本书中多个代码段的程序无需许可。出售或分发
    O''Reilly 书籍示例的 CD-ROM 则需要许可。通过引用本书并引用示例代码来回答问题无需许可。将本书中的大量示例代码整合到你产品的文档中则需要许可。


    我们感谢署名，但并非强制要求。署名通常包括书名、作者、出版商和 ISBN。例如：“*使用 Arduino 开发 iOS 传感器应用*，阿拉斯代尔·艾伦著（O''Reilly）。版权所有
    2011 阿拉斯代尔·艾伦，978-1-449-30848-3。”


    如果你认为你对代码示例的使用超出了合理使用或此处授予的许可范围，请随时通过 permissions@oreilly.com 联系我们。


    ### 警告


    本书中的几乎所有代码都无法在 iPhone 或 iPad 模拟器上运行，必须在你的设备上直接部署和测试。


