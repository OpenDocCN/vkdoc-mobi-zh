    * * *


    # Preface


    The iPhone (iPod touch and iPad) platform comes with a growing range of built-in
    sensors: GPS, accelerometer, magnetometer, and most recently a gyroscope. The
    devices also have near-ubiquitous data connections, whether via a local wireless
    hotspot or via carrier data, and user positioning via multiple methods, including
    the GPS. They make excellent hubs for a distributed sensor network.


    However, until recently, it was actually quite difficult to interface these otherwise
    interesting devices and connect them to your iPhone. Apple’s proprietary dock
    connector is a major stumbling block. This has now changed, and by the end of
    the book, you’ll be able to use your phone as the hub of a sensor network, making
    it part of the Internet of Things.


    # Who Should Read This Book?


    This book provides an introduction to connecting your iOS device to the real world.
    As part of that, we’ll make extensive use of the [Arduino](http://arduino.cc/)
    open source electronics prototyping platform. If you are a programmer who has
    had some experience with the iPhone before, this book will help you connect your
    iOS device to external hardware. If you are an experienced Mac programmer, already
    familiar with Objective-C, this book will give you an introduction to the hardware-specific
    parts of iPhone programming.


    # What Should You Already Know?


    The book assumes some previous experience with the Objective-C language. Additionally,
    some familiarity with the iPhone platform is assumed. If you’re new to the iPhone
    platform you may be interested in *[Learning iPhone Programming](http://oreilly.com/catalog/9780596806439/)*
    (O’Reilly), also by Alasdair Allan. Little or no familiarity with the Arduino
    platform is assumed or expected. This book is intended for Objective-C programmers
    who want to learn how to talk to external hardware. However, if you are totally
    unfamiliar with the Arduino platform, you might want to take a look at *[Getting
    Started with Arduino](http://oreilly.com/catalog/9780596155520)* by Massimo Banzi
    (O’Reilly).


    ### Warning


    This book assumes a working knowledge of how to build and deploy applications
    onto your iPhone, iPod touch, or iPad. If you have no experience with iOS, you
    should probably read this book in conjunction with [Learning iPhone Programming](http://oreilly.com/catalog/9780596806439/).


    # What Will You Learn?


    This book will guide you through developing applications for the iOS platform
    that make use of the [Redpark Serial Cable](http://www.redpark.com/) and the External
    Accessory framework to connect your iPhone, iPod touch, or iPad to any standard
    serial (RS-232) capable device. Beyond this, we’ll also take a look at less official
    (but possibly more fun) ways to accomplish the same ends.


    # What’s in This Book?


    [Chapter 1](#ch01.html "Chapter 1. Introduction to the Arduino")


    This chapter is intended for Objective-C programmers new to Arduino. It will introduce
    you to the platform and walk you through the hardware equivalent of “Hello World,”
    the blinking LED. We’ll also discuss how to use the serial connection between
    the Arduino and your development machine.


    [Chapter 2](#ch02.html "Chapter 2. Connecting the iPhone to the Arduino")


    This chapter will introduce the Redpark Serial Cable and walk you through building
    two basic applications. The first will allow the Arduino to talk to the iPhone,
    and the second will allow the iPhone to talk to the Arduino.


    [Chapter 3](#ch03.html "Chapter 3. Controlling the Arduino from the iPad")


    This chapter walks through building a full-scale application for the iPad to allow
    arbitrary control over an Arduino from a user-friendly interface.


    [Chapter 4](#ch04.html "Chapter 4. Using External Sensors from the iPhone")


    In this chapter, we will attach sensors to the Arduino and then use the serial
    cable to communicate the readings to the iPhone. We’ll also look at the Core Plot
    library for graphing.


    [Chapter 5](#ch05.html "Chapter 5. Connecting to an XBee Network")


    This chapter introduces the Digi XBee radio and walks you through connecting them
    to both the Arduino and iOS platforms.


    [Chapter 6](#ch06.html "Chapter 6. Other Ways to Connect")


    This chapter looks at other ways to connect your iPhone or iPad to serial devices.
    We look at using the MIDI protocol, which is officially supported by the iOS SDK,
    but also at using the headphone jack of your iOS device as a soft modem.


    # Conventions Used in This Book


    The following typographical conventions are used in this book:


    *Italic*


    Indicates new terms, URLs, email addresses, filenames, and file extensions.


    `Constant width`


    Used for program listings, as well as within paragraphs to refer to program elements
    such as variable or function names, databases, data types, environment variables,
    statements, and keywords.


    **`Constant width bold`**


    Shows commands or other text that should be typed literally by the user.


    *`Constant width italic`*


    Shows text that should be replaced with user-supplied values or by values determined
    by context.


    ### Note


    This icon signifies a tip, suggestion, or general note.


    ### Warning


    This icon signifies a warning or caution.


    # Using Code Examples


    This book is here to help you get your job done. In general, you may use the code
    in this book in your programs and documentation. You do not need to contact us
    for permission unless you’re reproducing a significant portion of the code. For
    example, writing a program that uses several chunks of code from this book does
    not require permission. Selling or distributing a CD-ROM of examples from O’Reilly
    books does require permission. Answering a question by citing this book and quoting
    example code does not require permission. Incorporating a significant amount of
    example code from this book into your product’s documentation does require permission.


    We appreciate, but do not require, attribution. An attribution usually includes
    the title, author, publisher, and ISBN. For example: “*iOS Sensor Apps with Arduino*,
    by Alasdair Allan (O’Reilly). Copyright 2011 Alasdair Allan, 978-1-449-30848-3.”


    If you feel your use of code examples falls outside fair use or the permission
    given here, feel free to contact us at [permissions@oreilly.com](mailto:permissions@oreilly.com).


    ### Warning


    Almost all of the code in this book will not run on the iPhone or iPad Simulator
    and must be deployed and tested directly on your device.


