    \n```\n#define LENGTH 2\n\nint rxBuffer[128];\nint rxIndex  = 0;\n\nvoid setup()\
    \ {\n\n  Serial.begin(9600);\n  Serial.println(\"Arduino reset\");\n\n  pinMode(2,\
    \ OUTPUT);\n  pinMode(3, OUTPUT);\n  pinMode(4, OUTPUT);\n  pinMode(5, OUTPUT);\n\
    \  pinMode(6, OUTPUT);\n  pinMode(7, OUTPUT);\n  pinMode(8, OUTPUT);\n  pinMode(9,\
    \ OUTPUT);\n  pinMode(10, OUTPUT);\n  pinMode(11, OUTPUT);\n  pinMode(12, OUTPUT);\n\
    \  pinMode(13, OUTPUT);\n\n  digitalWrite( 12, HIGH);\n  digitalWrite( 13, HIGH);\n\
    \  delay(500);\n  digitalWrite( 12, LOW );\n  digitalWrite( 13, LOW );\n}\n\n\
    void loop (){\n\n if (Serial.available() > 0) {\n\n   rxBuffer[rxIndex++] = Serial.read();\n\
    \   if (rxIndex == LENGTH) {\n\n       Serial.print( \"Set: \" );\n       Serial.print(\
    \ rxBuffer[0], DEC );\n       Serial.print( \" to: \" );\n       Serial.println(\
    \ rxBuffer[1], DEC );\n\n       if( rxBuffer[1] == 0 ) {\n         digitalWrite((int)rxBuffer[0],\
    \ LOW);\n       } else {\n         digitalWrite((int)rxBuffer[0], HIGH);\n   \
    \    }\n       rxIndex = 0;\n   }\n }\n delay(10);\n\n}\n```\n\n[![1](callouts/1.png)](#ch03s02.html#co8_id)\n\
    \nWe have bytes available, so read a single byte from the serial buffer and put\
    \ it into the `rxBuffer` array at the next available free index. Then post-increment\
    \ our index into the buffer.\n\n[![2](callouts/2.png)](#ch03s02.html#co9_id)\n\
    \nIf we have received `LENGTH` bytes (in this case `LENGTH` is 2 bytes), we have\
    \ the entire message from the remote host and we should deal with it now. If not,\
    \ loop and read more bytes from the serial buffer.\n\n[![3](callouts/3.png)](#ch03s02.html#co10_id)\n\
    \nIf the second byte was a 0, we’re going to set the pin to LOW. Read the first\
    \ byte of the buffer, as that’s the pin number, and pull that pin LOW.\n\n[![4](callouts/4.png)](#ch03s02.html#co11_id)\n\
    \nAlternatively, if the second received byte was a 1, we’re going to set the pin\
    \ to HIGH. Read the first byte of the buffer, as that’s the pin number, and pull\
    \ that pin HIGH.\n\nUnless we have a voltmeter handy, there isn’t any way to know\
    \ if a pin on the Arduino board is LOW or HIGH, so we’re going to need some way\
    \ to tell. An easy way to do this is to put an LED on each pin. We could wire\
    \ each pin separately, but an easy hack is shown in [Figure 3-7](#ch03s02.html#wiring_some_leds_together\
    \ \"Figure 3-7. Wiring some LEDs together\"). Here I’ve wired the ground legs\
    \ of three LEDs together to a jumper wire that we can then insert in the GND pin\
    \ of the Arduino board.\n\n![Wiring some LEDs together](httpatomoreillycomsourceoreillyimages895912.png.jpg)\n\
    \nFigure 3-7. Wiring some LEDs together\n\nThe three other legs will go into pins\
    \ 13, 12, and 11, respectively; see [Figure 3-8](#ch03s02.html#connecting_the_led_bundle_to_the_arduino\
    \ \"Figure 3-8. Connecting the LED bundle to the Arduino\").\n\n![Connecting the\
    \ LED bundle to the Arduino](httpatomoreillycomsourceoreillyimages895914.png.jpg)\n\
    \nFigure 3-8. Connecting the LED bundle to the Arduino"
  trans: "\n# 集成串行库\n\n如果你跟随着上一章的进度，紧密集成用户界面和串行库的步骤应该看起来非常熟悉。实际上，你甚至可以复制粘贴来节省时间。如果这样做，记得要小心；复制粘贴错误可能会让人头疼。\n\
    \n将以下高亮行添加到 `PaduinoViewController.h` 接口文件中：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\n@interface PaduinoViewController\
    \ : UIViewController <RscMgrDelegate> {\n\n    UISwitch *pin13;\n    UISwitch\
    \ *pin12;\n    UISwitch *pin11;\n    UISwitch *pin10;\n    UISwitch *pin9;\n \
    \   UISwitch *pin8;\n    UISwitch *pin7;\n    UISwitch *pin6;\n    UISwitch *pin5;\n\
    \    UISwitch *pin4;\n    UISwitch *pin3;\n    UISwitch *pin2;\n\n    RscMgr *rscMgr;\n\
    \    UInt8 rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UISwitch *pin13;\n@property (nonatomic, retain)\
    \ IBOutlet UISwitch *pin12;\n@property (nonatomic, retain) IBOutlet UISwitch *pin11;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin10;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin9;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin8;\n\n@property (nonatomic, retain) IBOutlet UISwitch *pin7;\n@property\
    \ (nonatomic, retain) IBOutlet UISwitch *pin6;\n@property (nonatomic, retain)\
    \ IBOutlet UISwitch *pin5;\n@property (nonatomic, retain) IBOutlet UISwitch *pin4;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin3;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin2;\n\n- (IBAction)toggle:(id)sender;\n\n@end\n\
    ```\n\n保存更改并切换到对应的实现文件，取消注释 `viewDidLoad:` 方法，并按如下方式初始化 Redpark 串行电缆管理器：\n\n```\n\
    - (void)viewDidLoad {\n    [super viewDidLoad];\n    rscMgr = [[RscMgr alloc]\
    \ init];\n    [rscMgr setDelegate:self];\n}\n```\n\n完成此操作后，将以下必需的委托方法添加到你的实现中：\n\
    \n```\n- (void) cableConnected:(NSString *)protocol {\n    [rscMgr setBaud:9600];\n\
    \    [rscMgr open];\n}\n\n- (void) cableDisconnected {\n}\n\n- (void) portStatusChanged\
    \ {\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes {\n    int bytesRead =\
    \ [rscMgr read:rxBuffer Length:numBytes];\n    NSLog( @\"Read %d bytes from serial\
    \ cable.\", bytesRead );\n\n    NSString *string = nil;\n    for(int i = 0;i <\
    \ numBytes;++i) {\n        if ( string ) {\n            string =  [NSString stringWithFormat:@\"\
    %@%c\", string, rxBuffer[i]];\n        } else {\n            string =  [NSString\
    \ stringWithFormat:@\"%c\", rxBuffer[i]];\n        }\n    }\n    NSLog(@\"Received:\
    \ %@\", string);\n}\n\n- (BOOL) rscMessageReceived:(UInt8 *)msg TotalLength:(int)len\
    \ {\n    return FALSE;\n}\n\n- (void) didReceivePortConfig {\n}\n```\n\n所有这些应该看起来和上一章非常相似。那么让我们继续看看我们的\
    \ `toggle:` 方法：\n\n```\n- (IBAction)toggle:(id)sender {\n\n    NSLog(@\"Toggled\
    \ output pin %i to %i\", [sender tag], [(UISwitch *)sender isOn] );\n    txBuffer[0]\
    \ = [sender tag];\n    txBuffer[1] = [(UISwitch *)sender isOn];\n    int bytesWritten\
    \ = [rscMgr write:txBuffer Length:2];\n    NSLog( @\"Wrote %d bytes to serial\
    \ cable.\", bytesWritten);\n}\n```\n\n虽然代码很短，但这却是我们应用程序的核心。你还记得吗，在构建界面时，我确保每个\
    \ `UISwitch` 都有一个与开关编号对应的唯一标签？这里我们正是使用这个标签来构建发送给 Arduino 板的两字节消息。第一个字节是开关编号，第二个字节是\
    \ 1 或 0，对应开关的开启或关闭状态。在 Arduino 端，这将对应于引脚状态 `HIGH` 或 `LOW`。\n\n至此，至少目前我们完成了 iPad\
    \ 端的代码。确保所有更改都已保存，然后点击 Xcode 工具栏中的运行按钮，构建并将应用程序部署到你的 iPad 上。一旦成功加载，点击停止按钮，将 iPad\
    \ 放在一边。\n\n# 在 Arduino 上监听消息\n\n打开 Arduino 开发环境，输入以下代码，并将其上传到你的 Arduino 板（如果不确定如何操作，请重新查看第\
    \ 1 章和第 2 章）：\n\n```\n#define LENGTH 2\n\nint rxBuffer[128];\nint rxIndex  = 0;\n\
    \nvoid setup() {\n\n  Serial.begin(9600);\n  Serial.println(\"Arduino reset\"\
    );\n\n  pinMode(2, OUTPUT);\n  pinMode(3, OUTPUT);\n  pinMode(4, OUTPUT);\n  pinMode(5,\
    \ OUTPUT);\n  pinMode(6, OUTPUT);\n  pinMode(7, OUTPUT);\n  pinMode(8, OUTPUT);\n\
    \  pinMode(9, OUTPUT);\n  pinMode(10, OUTPUT);\n  pinMode(11, OUTPUT);\n  pinMode(12,\
    \ OUTPUT);\n  pinMode(13, OUTPUT);\n\n  digitalWrite( 12, HIGH);\n  digitalWrite(\
    \ 13, HIGH);\n  delay(500);\n  digitalWrite( 12, LOW );\n  digitalWrite( 13, LOW\
    \ );\n}\n\nvoid loop (){\n\n if (Serial.available() > 0) {\n\n   rxBuffer[rxIndex++]\
    \ = Serial.read();\n   if (rxIndex == LENGTH) {\n\n       Serial.print( \"Set:\
    \ \" );\n       Serial.print( rxBuffer[0], DEC );\n       Serial.print( \" to:\
    \ \" );\n       Serial.println( rxBuffer[1], DEC );\n\n       if( rxBuffer[1]\
    \ == 0 ) {\n         digitalWrite((int)rxBuffer[0], LOW);\n       } else {\n \
    \        digitalWrite((int)rxBuffer[0], HIGH);\n       }\n       rxIndex = 0;\n\
    \   }\n }\n delay(10);\n\n}\n```\n\n我们有可用的字节，因此从串行缓冲区读取一个字节，并将其放入 `rxBuffer` 数组的下一个可用索引位置。然后对缓冲区索引进行后递增。\n\
    \n如果我们已经接收到 `LENGTH` 个字节（在本例中 `LENGTH` 为 2 个字节），我们就得到了来自远程主机的完整消息，现在应该处理它。如果没有，则循环并从串行缓冲区读取更多字节。\n\
    \n如果第二个字节是 0，我们将把引脚设置为 `LOW`。读取缓冲区的第一个字节，因为那是引脚编号，并将该引脚拉低为 `LOW`。\n\n或者，如果接收到的第二个字节是\
    \ 1，我们将把引脚设置为 `HIGH`。读取缓冲区的第一个字节，因为那是引脚编号，并将该引脚拉高为 `HIGH`。\n\n除非我们手头有电压表，否则无法知道\
    \ Arduino 板上的某个引脚是 `LOW` 还是 `HIGH`，因此我们需要某种方式来确认。一个简单的方法是在每个引脚上放置一个 LED。我们可以单独为每个引脚接线，但图\
    \ 3-7 展示了一个简便的方法。这里我将三个 LED 的接地引脚连接到一个跳线上，然后可以将其插入 Arduino 板的 GND 引脚。\n\n![将一些\
    \ LED 连接在一起](img/httpatomoreillycomsourceoreillyimages895912.png.jpg)\n\n图 3-7.\
    \ 将一些 LED 连接在一起\n\n另外三个引脚将分别插入引脚 13、12 和 11，如图 3-8 所示。\n\n![将 LED 组连接到 Arduino](img/httpatomoreillycomsourceoreillyimages895914.png.jpg)\n\
    \n图 3-8. 将 LED 组连接到 Arduino\n"
- fmt: "# Putting It All Together\n\nWe’ve now finished writing the code on both sides\
    \ of the serial connection. Unplug whatever was plugged into your Mac, and connect\
    \ all of the cables together. Start up the Paduino application and toggle one\
    \ or two switches. You should see something that looks a lot like [Figure 3-9](#ch03s03.html#the_ipad_connected_to_the_arduino_using\
    \ \"Figure 3-9. The iPad connected to the Arduino using the Redpark cable (top),\
    \ and a close up of the UISwitch positions and LEDs on the Arduino board (bottom)\"\
    ) below.\n\nRemember, once you’ve toggled a pin to `HIGH`, you can go ahead and\
    \ unplug the serial cable from your iPad and the Arduino, because the pin state\
    \ will be persistent.\n\n![The iPad connected to the Arduino using the Redpark\
    \ cable (top), and a close up of the UISwitch positions and LEDs on the Arduino\
    \ board (bottom)](httpatomoreillycomsourceoreillyimages895916.png.jpg)\n\nFigure\
    \ 3-9. The iPad connected to the Arduino using the Redpark cable (top), and a\
    \ close up of the UISwitch positions and LEDs on the Arduino board (bottom)\n\n\
    # Going Further\n\nThere are some obvious improvements that could be made to our\
    \ application. Right now, there is no indication of what’s going on behind the\
    \ scenes, which makes debugging difficult. Let’s start to fix that by adding a\
    \ label to our user interface and hooking this up to the `cableConnected` and\
    \ `cableDisconnected` delegate methods so we know for sure whether the cable is\
    \ properly connected to our iPad.\n\nClick on the *PaduinoViewController.xib*\
    \ interface file to open it in Interface Builder and drag and drop two `UILabel`\
    \ elements into the view. Position them at the top of your interface and in the\
    \ top left corner. Change the text of the first label to be \"Cable:\" and position\
    \ the second to the right of that. You can leave the second label with its default\
    \ text intact, or change it to be something more reasonable for an initial state\
    \ (like Disconnected). Open up the Assistant Editor and then Ctrl-click and drag\
    \ from the second label to the associated interface file to create an instance\
    \ variable and property (see [Figure 3-10](#ch03s04.html#connecting_the_uilabel_to_the_interface\
    \ \"Figure 3-10. Connecting the UILabel to the interface file\")).\n\n![Connecting\
    \ the UILabel to the interface file](httpatomoreillycomsourceoreillyimages895919.png.jpg)\n\
    \nFigure 3-10. Connecting the UILabel to the interface file\n\nSave your changes,\
    \ then switch to the Standard Editor and return to the *PaduinoViewController.m*\
    \ implementation file. Go to the `cableConnected` and `cableDisconnected` delegate\
    \ methods and add the highlighted code:\n\n```\n- (void) cableConnected:(NSString\
    \ *)protocol {\n    [rscMgr setBaud:9600];\n    [rscMgr open];\n    self.statusLabel.text\
    \ = @\"CONNECTED\";\n    self.statusLabel.textColor = [UIColor greenColor];\n\
    }\n\n- (void) cableDisconnected {\n    self.statusLabel.text = @\"DISCONNECTED\"\
    ;\n    self.statusLabel.textColor = [UIColor redColor];\n}\n```\n\nThis should\
    \ change the status text and color when we connect and disconnect the cable.\n\
    \n## Adding a Log Window\n\nIt’s actually fairly easy to reuse the log window\
    \ we wrote in the previous chapter.\n\nOpen the SerialConsole from the previous\
    \ chapter, and select the *LogController.h*, *LogController.m*, and *LogController.xib*\
    \ files from the Project pane. Drag and drop them into the Paduino project, remembering\
    \ to check the \"Copy files into destination group’s folder (if needed)\" checkbox.\n\
    \nOnce you’ve done that, open the *PaduinoViewController.xib* file in Interface\
    \ Builder and drag and drop a `UIBarButtonItem` from the Object library into the\
    \ navigation bar. Change the title of the button to \"Log.\" Close the Utilities\
    \ pane and open up the Assistant Editor. Then Ctrl-click and drag from the Log\
    \ button into the associated header file in the editor to create an `IBAction`\
    \ method called `openLog:` (see [Figure 3-11](#ch03s04.html#connecting_the_log_button_to_the_view_co\
    \ \"Figure 3-11. Connecting the log button to the view controller.\")).\n\n![Connecting\
    \ the log button to the view controller.](httpatomoreillycomsourceoreillyimages895921.png.jpg)\n\
    \nFigure 3-11. Connecting the log button to the view controller.\n\nSwitch back\
    \ to the standard editor, save your changes, and then click on the *PaduinoViewController.h*\
    \ file to open it in the editor. Add the highlighted code below:\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n#import \"LogController.h\"\n\n#define\
    \ BUFFER_LEN 1024\n\n@interface PaduinoViewController : UIViewController <RscMgrDelegate>\
    \ {\n\n    UISwitch *pin13;\n    UISwitch *pin12;\n    UISwitch *pin11;\n    UISwitch\
    \ *pin10;\n    UISwitch *pin9;\n    UISwitch *pin8;\n    UISwitch *pin7;\n   \
    \ UISwitch *pin6;\n    UISwitch *pin5;\n    UISwitch *pin4;\n    UISwitch *pin3;\n\
    \    UISwitch *pin2;\n    UILabel *statusLabel;\n\n    RscMgr *rscMgr;\n    UInt8\
    \ rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\n    LogController\
    \ *logWindow;\n}\n\n@property (nonatomic, retain) IBOutlet UISwitch *pin13;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin12;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin11;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin10;\n@property (nonatomic, retain) IBOutlet UISwitch *pin9;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin8;\n\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin7;\n@property (nonatomic, retain) IBOutlet UISwitch *pin6;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin5;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin4;\n@property (nonatomic, retain) IBOutlet UISwitch *pin3;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin2;\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *statusLabel;\n\n@property (nonatomic, retain) IBOutlet LogController *logWindow;\n\
    \n- (IBAction)toggle:(id)sender;\n- (IBAction)openLog:(id)sender;\n\n@end\n```\n\
    \nThen, switching to the corresponding *PaduinoViewController.m* implementation\
    \ file, you should remember to:\n\n```\n@synthesize logWindow;\n```\n\nbefore\
    \ going on to add the following code to initialize the log window in the `viewDidLoad:`\
    \ method:\n\n```\n self.logWindow = [[LogController alloc] initWithNibName:@\"\
    LogController\" \n                                            bundle:nil];\n```\n\
    \nand release it in the `dealloc` method:\n\n```\n [logWindow release];\n```\n\
    \nFinally, in the `openLog:` method you should modally present the log controller:\n\
    \n```\n- (IBAction)openLog:(id)sender {\n    [self presentModalViewController:self.logWindow\
    \ animated:YES];\n}\n```\n\nSave your changes and then click on the *main.m* file,\
    \ which is located in the Supporting Files group in the Project pane. As we did\
    \ in the previous chapter, add the highlighted lines below to it:\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\nint main(int argc, char *argv[]){\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\n    NSArray *paths =\n       NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ \n                     @\"ns.log\"];\n\n    NSFileManager *fileMgr = [NSFileManager\
    \ defaultManager];\n    [fileMgr removeItemAtPath:log error:nil];\n\n    freopen([log\
    \ fileSystemRepresentation], \"a\", stderr);\n\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```\n\nThis will\
    \ redirect the `stderr` output to a file called *ns.log* inside the application’s\
    \ Documents directory.\n\nAt this stage, you should go ahead and add `NSLog` messages\
    \ in various vital places, such as the `RscMgr` delegate methods, to report what’s\
    \ going on inside your application. If you now save your changes, and click on\
    \ the Run button in the Xcode editor to build and deploy the application to your\
    \ device, you should have a lot more feedback when you plug and unplug the cable.\n\
    \n# Summary\n\nIn this chapter, we built a simple application to control your\
    \ Arduino directly from your iPad. In the next chapter we’ll go a step further\
    \ and start gathering sensor measurements."
