  trans: '

    # XBee 模块


    Digi 公司生产了一系列令人眼花缭乱的 XBee 品牌无线电模块；粗略统计显示，至少有 30 种不同的硬件、固件和天线组合，并且这个数字只会越来越大。不幸的是，面对日益增多的
    XBee 品牌无线电模块，人们很容易感到困惑。


    有两种引脚兼容的 XBee 模块。Series 1 模块适用于点对点和点对多点应用，而 Series 2 模块则适用于需要网状网络的应用。在本章中，我将使用
    Series 1 无线电模块（见图 5-1）。


    ![带芯片天线的 XBee Series 1 模块](img/httpatomoreillycomsourceoreillyimages895957.png.jpg)


    图 5-1. 带芯片天线的 XBee Series 1 模块


    我使用 Series 1 无线电模块，主要是因为它们对初学者来说非常易于使用和配置，而且或许更重要的是，它们很容易买到。你可以从多家供应商那里买到 Series
    1 无线电模块，包括 SparkFun，它提供种类繁多的模块（见 [`www.sparkfun.com/categories/111`](http://www.sparkfun.com/categories/111)）。尽管其展示的种类令人眼花缭乱，但仍未涵盖所有型号。你也可以从
    Maker Shed 购买这些无线电模块（[`www.makershed.com/ProductDetails.asp?ProductCode=MKAD14`](http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD14)）。


    ## Series 1 还是 Series 2？


    在处理 XBee 模块时，一个常见的误解是认为 Series 2 模块比 Series 1 模块“更好”。事实并非如此。实际上，这两种类型是为不同的用途而设计的。Series
    1 模块深受爱好者市场的欢迎，非常适合直接替代线缆或用于小型网络。Series 2 模块则实现了完整的 ZigBee 协议，适用于较大的网络。


    ### 警告


    虽然 XBee Series 1 和 XBee Series 2 模块具有相同的尺寸且引脚完全兼容，但它们的芯片组不同，运行的协议也不同，因此它们在无线通信上并不兼容。你不能在同一个无线网络中混合使用
    Series 1 和 Series 2 模块。


    Series 1 模块开箱即可用于点对点通信（即替代线缆），无需任何配置，这也是我们在本章中使用它们的方式。因此，如果你是刚开始接触无线网络，我建议你从 Series
    1 无线电模块开始。


    如果你对构建基于 XBee 的更大网络感兴趣，可以看看 Robert Faludi 所著的《构建无线传感器网络》（O''Reilly 出版）。虽然那本书专门使用了
    Series 2 模块，但它对你了解 Series 1 网络也有帮助，因为 Series 1 的命令在很大程度上只是 Series 2 命令集的一个子集。Tom
    Igoe 在《让物体说话》（O''Reilly 出版）中也有几个有趣的项目用到了我在本章中提到的 Series 1 模块。


    ## 普通版还是 Pro 版？


    Series 1 和 Series 2 模块都有两种版本：普通版和 Pro 版。Pro 版模块尺寸稍大，不过尽管如此，它们仍然引脚兼容，但功耗更高。然而最关键的是，它们的通信距离要远得多。可以预见的是，它们的价格也高得多，所以除非你需要它们提供的更远通信距离，否则坚持使用普通版
    XBee 模块即可。由于它们引脚兼容，如果你后来决定需要更远的通信距离（并且能承受更高的功耗），随时可以在你的项目中换用 Pro 版。


    ## 802.15.4 还是 ZigBee？


    关于这两种 XBee 协议存在很多混淆。Series 1 模块使用 IEEE 802.15.4 标准协议，支持点对点和点对多点网络，不过它们也有一个专有的网状网络协议。Series
    2 模块使用 ZigBee 协议，这是一种基于 802.15.4 协议构建的网状网络标准，该协议不仅限于 XBee 无线电模块，还被许多其他硬件所使用。


    ## 选择哪种天线？


    有四种不同类型的天线可供选择：芯片天线、线状天线、UFL 天线和 RP-SMA 天线。芯片天线和线状天线预装在无线电模块上；而 UFL 和 RP-SMA 版本发货时仅在板上带有连接器，你需要购买带有相应连接器的合适天线才能让它们工作。除非你打算将项目封装在盒子中，此时使用
    UFL 或 RP-SMA 天线将天线安装在盒子外部可能是个好主意，或者你需要它们提供的高功率传输性能，否则坚持使用芯片天线或线状天线就足够安全了。


    # 如何配置 XBee Series 1 无线电模块


    要配置 XBee 模块，我们需要能够与其通信。通常，我们会使用你的 Mac 来配置 XBee，当然我们也可以编写 iPhone 或 iPad 应用程序来实现配置。不过目前，我们需要找到一种方法将
    XBee 连接到你的 Mac 的 USB 端口。


    由于 XBee 模块设计为直接焊接到 PCB 上，因此它们遗憾地使用了 2 毫米间距的排针，而不是我们更熟悉的 0.1 英寸间距排针。因此，它们通常需要某种转接板才能在标准面包板或原型板上使用，还需要一个适配器才能连接到你的
    Mac。


    市场上有多种转接板。通常，你只需要一个能将 XBee 引脚转接到标准 0.1 英寸排针的简单板子，比如 SparkFun 的 [XBee 模块转接板](http://www.sparkfun.com/products/8276)。


    要将 XBee 连接到你的电脑，你需要一个更复杂的板子，它负责将输入电压调节到模块所需的 3.3V、进行信号调理并提供基本的活动指示 LED 灯。同样，这类产品在市场上有很多，比如
    SparkFun 的 [XBee Explorer Regulated](http://www.sparkfun.com/products/9132) 和
    Adafruit 的 [XBee 适配器套件](http://www.adafruit.com/products/126)。见图 5-2。


    甚至还有允许你将 XBee 直接插入 Mac USB 端口的板子，比如 SparkFun 的 [XBee Explorer Dongle](http://www.sparkfun.com/products/9819)；再次参见图
    5-2。


    ### 注意


    几乎所有的 XBee USB 适配器都需要 [FTDI 的驱动程序](http://www.ftdichip.com/Drivers/VCP.htm)。在使用适配器之前，请确保你已经安装了这些驱动程序。如果你有一块较旧的
    Arduino 板，由于 Uno 之前的板子使用了相同的 USB 芯片组，你可能已经安装了正确的驱动程序。


    ![Adafruit XBee 适配器（左）和 SparkFun XBee Explorer（右）](img/httpatomoreillycomsourceoreillyimages895959.png.jpg)


    图 5-2. Adafruit XBee 适配器（左）和 SparkFun XBee Explorer（右）

    '
- fmt: '# Connecting the XBee to Your Mac


    Because I already had a couple lying around, I’m going to use the Adafruit board,
    which is also carried in the [Maker Shed](http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD13).
    It’s designed to be used with an FTDI cable (see [Figure 5-3](#ch05s02.html#xbee_module_mounted_on_an_adafruit_adapt
    "Figure 5-3. XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI
    cable for programming")), and because of that, it can also be easily used with
    a breadboard to connect the XBee to an Arduino, so I won’t need a separate breakout
    board.


    ![XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI cable for
    programming](httpatomoreillycomsourceoreillyimages895961.png.jpg)


    Figure 5-3. XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI
    cable for programming


    While Digi’s own configuration tool, X-CTU, is available for free, it’s also Windows-only.
    Unless you’re running Windows under BootCamp or in a virtual machine, you won’t
    be able to use it. Luckily, it’s only needed infrequently to update the firmware
    of the XBee modules. For configuring the radios, we can generally just use a terminal
    program.


    ### Note


    There are many terminal programs available for Mac OS X. I’m going to use [CoolTerm
    by Roger Meier](http://freeware.the-meiers.org/). This is a relatively simple
    application that’s perfectly suited to allow you configure your XBee radios.


    Plug your XBee radio module into your adaptor board, and connect the board to
    your Mac. If you’re using the Adafruit board as I am, you should see the green
    (ASC) LED on the board start to flash.


    Open up your terminal application and make sure it’s set to the correct serial
    port. You can find out which serial ports are available by using the command line:


    ```

    % ls /dev/tty.*

    crw-rw-rw-  1 root  wheel   11,   2  8 Jul 09:01 /dev/tty.Bluetooth-Modem

    crw-rw-rw-  1 root  wheel   11,   0  8 Jul 09:01 /dev/tty.Bluetooth-PDA-Sync

    crw-rw-rw-  1 root  wheel   11,  66  3 Aug 14:15 /dev/tty.usbserial-FTE4XVKD

    ```


    The correct port for the XBee module should (at least normally) be fairly obvious.
    In my case, it is `/dev/tty.usbserial-FTE4XVKD`. If you are using CoolTerm, you
    can change the attached serial port by clicking on the Options button in the toolbar
    (see [Figure 5-4](#ch05s02.html#configuring_the_port_and_local_echo_in_c "Figure
    5-4. Configuring the port and local echo in CoolTerm options")).


    ### Note


    By default, CoolTerm has Local Echo turned off. You may want to enable this in
    the Options menu to make things easier on yourself. If it’s turned off, you won’t
    see what you’re typing, and only the responses from the XBee radio will be displayed.


    ![Configuring the port and local echo in CoolTerm options](httpatomoreillycomsourceoreillyimages895963.png.jpg)


    Figure 5-4. Configuring the port and local echo in CoolTerm options


    If your terminal program doesn’t default to it, set it to use 9,600 baud and 8-N-1
    with no flow control.


    Once you’re sure you have your terminal program set up correctly, connect it to
    the selected serial port. In CoolTerm you do this by clicking on the Connect button
    in the toolbar. At this point, type `+++` (three plus signs in fairly quick succession)
    into the main window. If everything is connected correctly, you should get an
    `OK` back from the XBee radio module (see [Figure 5-5](#ch05s02.html#the_xbee_radio_module_is_correctly_conne
    "Figure 5-5. The XBee radio module is correctly connected to your Mac")).


    ![The XBee radio module is correctly connected to your Mac](httpatomoreillycomsourceoreillyimages895965.png.jpg)


    Figure 5-5. The XBee radio module is correctly connected to your Mac


    By typing the three plus symbols, we have put the XBee into configuration mode.
    At this point we can send `AT` commands to the module, which will allow us to
    configure the radio. After a while, the XBee will time out and go back to pass-through
    connection mode. If that happens while you’re configuring it, just type in `+++`
    and it will start responding once again.


    The basic configuration on the XBee consists of the baud rate for serial communication,
    a network identifier (PAN), the node address (MY), and the destination node address
    (DL).


    # XBee Addressing


    The 802.15.4 protocol uses addressing to distinguish one radio from the next,
    and to prevent duplicate packets. It is very important that each module have a
    unique source address (MY) to prevent nonduplicate messages from being ignored
    as duplicates.


    There are two basic forms of addressing between the modules: Broadcast and Unicast.
    A Broadcast message is a message that will be received by all modules on any given
    PAN. The message is sent only once and not repeated, so there is no guarantee
    of any given node receiving the message. In order to send a Broadcast message,
    set the destination node address (DL) to `0xFFFF`. With these settings, all XBee
    modules within range of the broadcasting node will receive the message.


    A Unicast message is more reliable. It is sent from one module to any other module
    based on the module’s addressing. If the message is properly received, the receiving
    radio will send back an acknowledgment (or ACK). If the transmitting module doesn’t
    receive an ACK, it will attempt MAC level retries, three retries for every transmission,
    for a total of four attempts, until it receives an ACK. This greatly increases
    the probability of getting the data through to the destination. In order to send
    a Unicast message, set the destination node address (DL) to be the node address
    (MY) of the node with which you wish to communicate.'
  raw: '## Connecting the XBee to Your Mac


    Because I already had a couple lying around, I’m going to use the Adafruit board,
    which is also carried in the [Maker Shed](http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD13).
    It’s designed to be used with an FTDI cable (see [Figure 5-3](#ch05s02.html#xbee_module_mounted_on_an_adafruit_adapt
    "Figure 5-3. XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI
    cable for programming")), and because of that, it can also be easily used with
    a breadboard to connect the XBee to an Arduino, so I won’t need a separate breakout
    board.


    ![XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI cable for
    programming](httpatomoreillycomsourceoreillyimages895961.png.jpg)


    Figure 5-3. XBee module mounted on an Adafruit Adaptor Kit connected to an FTDI
    cable for programming


    While Digi’s own configuration tool, X-CTU, is available for free, it’s also Windows-only.
    Unless you’re running Windows under BootCamp or in a virtual machine, you won’t
    be able to use it. Luckily, it’s only needed infrequently to update the firmware
    of the XBee modules. For configuring the radios, we can generally just use a terminal
    program.


    ### Note


    There are many terminal programs available for Mac OS X. I’m going to use [CoolTerm
    by Roger Meier](http://freeware.the-meiers.org/). This is a relatively simple
    application that’s perfectly suited to allow you configure your XBee radios.


    Plug your XBee radio module into your adaptor board, and connect the board to
    your Mac. If you’re using the Adafruit board as I am, you should see the green
    (ASC) LED on the board start to flash.


    Open up your terminal application and make sure it’s set to the correct serial
    port. You can find out which serial ports are available by using the command line:


    ```

    % ls /dev/tty.*

    crw-rw-rw-  1 root  wheel   11,   2  8 Jul 09:01 /dev/tty.Bluetooth-Modem

    crw-rw-rw-  1 root  wheel   11,   0  8 Jul 09:01 /dev/tty.Bluetooth-PDA-Sync

    crw-rw-rw-  1 root  wheel   11,  66  3 Aug 14:15 /dev/tty.usbserial-FTE4XVKD

    ```


    The correct port for the XBee module should (at least normally) be fairly obvious.
    In my case, it is `/dev/tty.usbserial-FTE4XVKD`. If you are using CoolTerm, you
    can change the attached serial port by clicking on the Options button in the toolbar
    (see [Figure 5-4](#ch05s02.html#configuring_the_port_and_local_echo_in_c "Figure 5-4. Configuring
    the port and local echo in CoolTerm options")).


    ### Note


    By default, CoolTerm has Local Echo turned off. You may want to enable this in
    the Options menu to make things easier on yourself. If it’s turned off, you won’t
    see what you’re typing, and only the responses from the XBee radio will be displayed.


    ![Configuring the port and local echo in CoolTerm options](httpatomoreillycomsourceoreillyimages895963.png.jpg)


    Figure 5-4. Configuring the port and local echo in CoolTerm options


    If your terminal program doesn’t default to it, set it to use 9,600 baud and 8-N-1
    with no flow control.


    Once you’re sure you have your terminal program set up correctly, connect it to
    the selected serial port. In CoolTerm you do this by clicking on the Connect button
    in the toolbar. At this point, type **`+++`** (three plus signs in fairly quick
    succession) into the main window. If everything is connected correctly, you should
    get an **`OK`** back from the XBee radio module (see [Figure 5-5](#ch05s02.html#the_xbee_radio_module_is_correctly_conne
    "Figure 5-5. The XBee radio module is correctly connected to your Mac")).


    ![The XBee radio module is correctly connected to your Mac](httpatomoreillycomsourceoreillyimages895965.png.jpg)


    Figure 5-5. The XBee radio module is correctly connected to your Mac


    By typing the three plus symbols, we have put the XBee into configuration mode.
    At this point we can send **`AT`** commands to the module, which will allow us
    to configure the radio. After a while, the XBee will time out and go back to pass-through
    connection mode. If that happens while you’re configuring it, just type in **`+++`**
    and it will start responding once again.


    The basic configuration on the XBee consists of the baud rate for serial communication,
    a network identifier (PAN), the node address (MY), and the destination node address
    (DL).


    ## XBee Addressing


    The 802.15.4 protocol uses addressing to distinguish one radio from the next,
    and to prevent duplicate packets. It is very important that each module have a
    unique source address (MY) to prevent nonduplicate messages from being ignored
    as duplicates.


    There are two basic forms of addressing between the modules: Broadcast and Unicast.
    A Broadcast message is a message that will be received by all modules on any given
    PAN. The message is sent only once and not repeated, so there is no guarantee
    of any given node receiving the message. In order to send a Broadcast message,
    set the destination node address (DL) to `0xFFFF`. With these settings, all XBee
    modules within range of the broadcasting node will receive the message.


    A Unicast message is more reliable. It is sent from one module to any other module
    based on the module’s addressing. If the message is properly received, the receiving
    radio will send back an acknowledgment (or ACK). If the transmitting module doesn’t
    receive an ACK, it will attempt MAC level retries, three retries for every transmission,
    for a total of four attempts, until it receives an ACK. This greatly increases
    the probability of getting the data through to the destination. In order to send
    a Unicast message, set the destination node address (DL) to be the node address
    (MY) of the node with which you wish to communicate.'
