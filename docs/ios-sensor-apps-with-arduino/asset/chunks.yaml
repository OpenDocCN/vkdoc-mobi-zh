  trans: "\n# 日志消息\n\n使用 Redpark 数据线调试应用的难度很快就会让你感到恼火。连接数据线后，你将无法在调试控制台中看到输出内容：例如，你通常使用\
    \ `NSLog` 方法打印到控制台的日志消息。\n\n幸运的是，有办法解决这个问题。我们可以将原本显示在调试区域的 `stderr` 输出重定向到一个文件，然后在应用内部查看该文件。\n\
    \n在 Xcode 中打开 `SerialConsole` 项目，点击位于项目面板 Supporting Files 组中的 `main.m` 文件，并添加以下高亮显示的行：\n\
    \n```\n#import <UIKit/UIKit.h>\n\nint main(int argc, char *argv[]){\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\nNSArray *paths =\n       NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ @\"ns.log\"];\n\nNSFileManager *fileMgr = [NSFileManager defaultManager];\n\
    \    [fileMgr removeItemAtPath:log error:nil];\n\nfreopen([log fileSystemRepresentation],\
    \ \"a\", stderr);\n\nint retVal = UIApplicationMain(argc, argv, nil, nil);\n \
    \   [pool release];\n    return retVal;\n}\n```\n\n这将把 `stderr` 输出重定向到应用 Documents\
    \ 目录下名为 `ns.log` 的文件中。每次应用启动时，该文件都会被删除并重新创建。\n\n完成上述操作后，我们需要创建一个视图控制器来查看日志。右键点击项目面板，选择\
    \ **新建文件...**，从下拉列表中选择一个 `UIViewController` 子类（即 `UIViewController` 的子类），并确保勾选“附带\
    \ XIB 用户界面”复选框。按提示将新类命名为 `LogController`。\n\n点击 `LogController.xib` 文件在 Interface\
    \ Builder 中打开，然后从对象库中拖拽一个 `UINavigationBar` 和一个 `UIBarButtonItem` 到视图中。将按钮项放置在导航栏左侧，并将其文本改为“完成”。接着在属性检查器中，将按钮样式从\
    \ Plain 改为 Done。还应将导航栏标题改为“NSLog”。\n\n现在，从对象库中拖拽一个 `UITextView` 到视图中，填充剩余空间。删除示例文本，并在属性检查器中取消勾选“可编辑”复选框。\n\
    \n接下来，关闭实用工具面板，打开助理编辑器。确保其设置为自动模式，然后按住 Ctrl 键并从 `UITextView` 拖拽到显示的 `LogController.h`\
    \ 接口文件，创建一个名为 `logWindow` 的属性和 `IBOutlet`。同样地，按住 Ctrl 键并从“完成”按钮拖拽到接口文件，创建一个名为\
    \ `done:` 的 `IBAction`；参见图 2-18。\n\n![将输出口和操作连接到用户界面](img/httpatomoreillycomsourceoreillyimages895893.png.jpg)\n\
    \n**图 2-18.** 将输出口和操作连接到用户界面\n\n保存更改，返回标准编辑器，点击 `LogController.h` 接口文件在 Xcode\
    \ 编辑器中打开。添加以下高亮显示的行：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface LogController\
    \ : UIViewController {\n\nUITextView *logWindow;\n    BOOL firstOpen;\n\n}\n\n\
    @property (nonatomic, retain) IBOutlet UITextView *logWindow;\n\n- (IBAction)done:(id)sender;\n\
    - (void)setWindowScrollToVisible;\n\n@end\n```\n\n然后点击对应的 `LogController.m` 实现文件。首先需要按如下方式修改\
    \ `initWithNibName:` 方法：\n\n```\n- (id)initWithNibName:(NSString *)nibNameOrNil\
    \ bundle:(NSBundle *)nibBundleOrNil {\n    self = [super initWithNibName:nibNameOrNil\
    \ bundle:nibBundleOrNil];\n    if (self) {\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
    \           NSDocumentDirectory, NSUserDomainMask, YES);\n        NSString *log\
    \ =\n          [[paths objectAtIndex:0] stringByAppendingPathComponent: @\"ns.log\"\
    ];\n        NSFileHandle *fh = [NSFileHandle fileHandleForReadingAtPath:log];\n\
    \n[fh seekToEndOfFile];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                 selector:@selector(getData:)\n             \
    \                    name:@\"NSFileHandleReadCompletionNotification\"\n      \
    \                           object:fh];\n        [fh readInBackgroundAndNotify];\n\
    \        firstOpen = YES;\n    }\n    return self;\n}\n```\n\n接着，需要添加 `viewDidAppear:`\
    \ 方法：\n\n```\n- (void)viewDidAppear:(BOOL)animated {\n    [super viewDidAppear:animated];\n\
    \    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ @\"ns.log\"];\n\nif ( firstOpen ) {\n        NSString* content = [NSString stringWithContentsOfFile:log\
    \ encoding:NSUTF8StringEncoding error:NULL];\n        logWindow.editable = TRUE;\n\
    \        logWindow.text = [logWindow.text stringByAppendingString: content];\n\
    \        logWindow.editable = FALSE;\n        firstOpen = NO;\n    }\n}\n```\n\
    \n然后需要添加 `getData:` 方法，当类收到日志文件发生变化的通知时会调用该方法，同时添加一些辅助方法：\n\n```\n#pragma mark\
    \ - NSLog 重定向方法\n\n- (void) getData: (NSNotification *)aNotification {\n    NSData\
    \ *data = [[aNotification userInfo] objectForKey:NSFileHandleNotificationDataItem];\n\
    \    if ([data length]) {\n        NSString *aString = [[[NSString alloc] initWithData:data\
    \ encoding:NSUTF8StringEncoding] autorelease];\n\nlogWindow.editable = TRUE;\n\
    \        logWindow.text = [logWindow.text stringByAppendingString: aString];\n\
    \        logWindow.editable = FALSE;\n\n[self setWindowScrollToVisible];\n   \
    \     [[aNotification object] readInBackgroundAndNotify];\n    } else {\n    \
    \    [self performSelector:@selector(refreshLog:) withObject:aNotification afterDelay:1.0];\n\
    \    }\n}\n- (void) refreshLog: (NSNotification *)aNotification {\n    [[aNotification\
    \ object] readInBackgroundAndNotify];\n}\n\n-(void)setWindowScrollToVisible {\n\
    \    NSRange txtOutputRange;\n    txtOutputRange.location = [[logWindow text]\
    \ length];\n    txtOutputRange.length = 0;\n    logWindow.editable = TRUE;\n \
    \   [logWindow scrollRangeToVisible:txtOutputRange];\n    [logWindow setSelectedRange:txtOutputRange];\n\
    \    logWindow.editable = FALSE;\n}\n```\n\n最后，应修改 `done:` 方法，使其关闭视图控制器：\n\n```\n\
    -(IBAction)done:(id)sender{\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n快完成了。保存更改，点击 `SerialConsoleViewController.xib` 文件在 Interface Builder\
    \ 中打开。从对象库中拖拽一个 `UIBarButtonItem` 到导航栏中标题的左侧，并将其名称改为“日志”。\n\n关闭实用工具面板，切换到助理编辑器，确保其处于自动模式。按住\
    \ Ctrl 键并从“日志”按钮拖拽到 `SerialConsoleViewController.h` 接口文件，创建一个名为 `openLog:` 的操作，如图\
    \ 2-19 所示。\n\n![将日志按钮连接到 openLog: 操作](img/httpatomoreillycomsourceoreillyimages895896.png.jpg)\n\
    \n**图 2-19.** 将日志按钮连接到 `openLog:` 操作\n\n保存更改，切换到标准编辑器，点击 `SerialConsoleViewController.h`\
    \ 接口文件，并添加以下实例变量：\n\n```\n#import <UIKit/UIKit.h>\n#import \"LogController.h\"\
    \n#import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\n@interface SerialConsoleViewController\
    \ : UIViewController <RscMgrDelegate> {\n```\n"
