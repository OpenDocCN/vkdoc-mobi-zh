    \ \"Chapter 1. Introduction to the Arduino\") to print “Hello World” to the serial\
    \ port. Connect your Arduino board to your Mac and upload the following sketch:\n\
    \n```\nvoid setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  while (Serial.available()\
    \ <= 0) {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n}\n```\n\
    \n### Warning\n\nYou cannot upload a sketch from your Mac to the board with the\
    \ XBee, or any other hardware, connected to pins 0 (RX) and 1 (TX), as this interferes\
    \ with the USB serial connection from your Mac. You therefore must detach the\
    \ XBee from your Arduino board before uploading your sketch.\n\nDisconnect your\
    \ Arduino board from your Mac and connect it to an external power supply.\n\n\
    Once you’ve done that, attach one of the XBee radios to your Mac and open up the\
    \ CoolTerm application once again. Connect to the appropriate serial port so that\
    \ you can see the output from the radio.\n\nThen go ahead and connect the other\
    \ radio to your Arduino board, as in [Figure 5-8](#ch05s04.html#an_arduino_uno_and_adafruit_xbee_adaptor\
    \ \"Figure 5-8. An Arduino Uno and Adafruit XBee adaptor connected together\"\
    ), and power it on. You should see something very much like [Figure 5-10](#ch05s04.html#the_arduino_says_lhello_worldr_over_an\
    \ \"Figure 5-10. The Arduino says “Hello World” over an XBee connection\") in\
    \ your terminal program.\n\n![The Arduino says “Hello World” over an XBee connection](httpatomoreillycomsourceoreillyimages895976.png.jpg)\n\
    \nFigure 5-10. The Arduino says “Hello World” over an XBee connection\n\n# Connecting\
    \ an XBee to an iOS Device\n\nNow that we’ve tested things between our Arduino\
    \ board and our Mac, what do we need to do the same thing between our Arduino\
    \ board and our iPhone?"
  trans: "\n# 配置两个 XBee 无线电模块\n\n现在我们将配置两个 XBee 无线电模块，将其作为直连电缆的替代方案。换言之，第一个模块将配置为向第二个模块发送消息，反之亦然。\n\
    \n按照上一节的方法，将两个无线电模块中的第一个插入你的 Mac，并通过终端程序向相应的串口发送 `+++`，使其进入命令模式。\n\n我们需要做的第一件事是设置波特率。在配置模式下输入\
    \ `ATBD`。你应该会返回一个 0 到 7 之间的数字，如下所示：\n\n```\nATBD\n```\n\n该数字表示无线电模块当前设置为 9600\
    \ 波特。我们暂时保留 9600 波特。不过，如果你希望设置不同的波特率，可以输入命令 `ATDB n`，其中 `n` 是一个值，对应表 5-1 中你想要的波特率。\n\
    \n**表 5-1. ATBD 命令返回的值及对应波特率**\n\n| ATBD 值 | 波特率 |\n| --- | --- |\n| 0 | 1200\
    \ |\n| 1 | 2400 |\n| 2 | 4800 |\n| 3 | 9600 |\n| 4 | 19200 |\n| 5 | 38400 |\n\
    | 6 | 57600 |\n| 7 | 115200 |\n\n因此，例如要将模块设置为 57600 波特，我们可以输入命令 `ATBD6`：\n\n```\n\
    ATBD6\nOK\n```\n\n然后，我们可以再次输入 `ATBD` 命令，检查波特率是否已设置。这次应该返回六：\n\n```\nATBD\n```\n\
    \n设置完波特率后，我们需要继续使用 `ATID` 命令设置 PAN ID，使用 `ATMY` 命令设置节点地址，并使用 `ATDL` 命令设置目标节点地址。最后，我们需要通过写入命令\
    \ `ATWR` 来提交更改，以保存设置。\n\n因此，对于两个模块中的第一个，我们应该输入以下命令：\n\n```\n+++\nATBD 3\nATID\
    \ 1111\nATMY 2345\nATDL 7890\nATWR\n```\n\n在所有情况下，你都应该从调制解调器收到 `OK` 响应。你可能希望沿途检查这些值；例如，参见图\
    \ 5-6。\n\n![配置两个 XBee 模块中的第一个](img/httpatomoreillycomsourceoreillyimages895967.png.jpg)\n\
    \n**图 5-6. 配置两个 XBee 模块中的第一个**\n\n配置完第一个模块后，断开串口连接，并从适配器上拔下 XBee 模块。然后将第二个模块插入适配器，连接到相应的串口，并输入以下命令：\n\
    \n```\n+++\nATBD 3\nATID 1111\nATMY 7890\nATDL 2345\nATWR\n```\n\n这将第二个模块配置为第一个模块的目标，反之亦然。参见表\
    \ 5-2。\n\n**表 5-2. 无线电模块配置**\n\n| 无线电模块 | PAN | MY | DL |\n| --- | --- | --- |\
    \ --- |\n| 1 | 1111 | 2345 | 7890 |\n| 2 | 1111 | 7890 | 2345 |\n\n配置完第二个模块后将其拔下。我们稍后再回来处理\
    \ XBee 模块。不过，既然已经配置完成，我们现在就继续测试连接，将一个模块连接到 Arduino，另一个连接到我们的 Mac。\n\n# 将 XBee\
    \ 连接到 Arduino\n\n实际上，你可以直接利用 Arduino 板上的 3.3V 引脚为 XBee 模块提供稳压电源，从而将其直接连接到 Arduino。参见图\
    \ 5-7。\n\n![将 XBee 连接到 Arduino](img/httpatomoreillycomsourceoreillyimages895969.png.jpg)\n\
    \n**图 5-7. 将 XBee 连接到 Arduino**\n\n不过，如果你使用转接板或合适的适配器板（例如我们之前用来将 XBee 连接到 Mac\
    \ 的 Adafruit 板），会容易得多（参见图 5-8）。\n\n或者，如果你要大量使用 XBee 模块，可以考虑购买一个 Arduino Fio 板（参见图\
    \ 5-9），这是一块带有 XBee 插座的 Arduino 板。你可以从 [SparkFun 购买 Arduino Fio](http://www.sparkfun.com/products/9712)。\n\
    \n![连接在一起的 Arduino Uno 和 Adafruit XBee 适配器](img/httpatomoreillycomsourceoreillyimages895971.png.jpg)\n\
    \n**图 5-8. 连接在一起的 Arduino Uno 和 Adafruit XBee 适配器**\n\n![连接了 LiPo 电池的 Arduino\
    \ Fio 与 XBee](img/httpatomoreillycomsourceoreillyimages895973.png.jpg)\n\n**图\
    \ 5-9. 连接了 LiPo 电池的 Arduino Fio 与 XBee**\n\n我们将使用在第 1 章中用到的那段简单草图，将 \"Hello World\"\
    \ 打印到串口。将 Arduino 板连接到你的 Mac，并上传以下草图：\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    }\n\nvoid loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"\
    Hello world\");\n    delay(300);\n  }\n}\n```\n\n### 警告\n\n如果 XBee 或其他硬件连接到引脚\
    \ 0（RX）和 1（TX），你将无法将草图从 Mac 上传到开发板，因为这会干扰来自 Mac 的 USB 串口连接。因此，在上传草图之前，必须先从 Arduino\
    \ 板上断开 XBee 模块。\n\n断开 Arduino 板与 Mac 的连接，并将其连接到外部电源。\n\n完成此操作后，将一个 XBee 模块连接到你的\
    \ Mac，并再次打开 CoolTerm 应用程序。连接到相应的串口，以便查看模块的输出。\n\n然后，将另一个模块连接到你的 Arduino 板上，如图\
    \ 5-8 所示，并为其供电。你应该会在终端程序中看到与图 5-10\n\n**图 5-10. Arduino 通过 XBee 连接输出“Hello World”**\n\
    \n# 将 XBee 连接到 iOS 设备\n\n既然我们已经在 Arduino 板和 Mac 之间完成了测试，那么要在 Arduino 板和 iPhone\
    \ 之间做同样的事情，需要做些什么呢？\n"
- fmt: "## XBee to RS-232 Serial\n\nThe first thing we need is an RS-232 adaptor.\
    \ Fortunately SparkFun sells the [XBee Explorer Serial](http://www.sparkfun.com/products/9111)\
    \ for $29.95 (see [Figure 5-11](#ch05s05.html#the_sparkfun_xbee_explorer_serial\
    \ \"Figure 5-11. The SparkFun XBee Explorer Serial\")).\n\nI don’t know of any\
    \ others on the market that are as easily available, although if you don’t want\
    \ to purchase the SparkFun adaptor, it should be moderately easy to breadboard\
    \ an adaptor using your RS-232 to TTL serial adaptor that we’ve been using up\
    \ till this point.\n\nHowever, if you do that, you should remember that the XBee\
    \ module runs at 3.3 V and the Redpark cable is at 5 V. You’ll need a voltage\
    \ level shifter between the 3.3 V RX and TX of the XBee module and the 5 V of\
    \ the TTL serial adaptor.\n\n![The SparkFun XBee Explorer Serial](httpatomoreillycomsourceoreillyimages895978.png.jpg)\n\
    \nFigure 5-11. The SparkFun XBee Explorer Serial\n\nGo ahead and unplug the XBee\
    \ that was originally attached to your Mac and plug it into the serial adaptor.\
    \ Then plug the serial adaptor into your Redpark cable, and that in turn into\
    \ your iPhone. Attach a power supply and turn it on; you should get something\
    \ like [Figure 5-12](#ch05s05.html#everything_connected_together_and_workin \"\
    Figure 5-12. Everything connected and working\").\n\n![Everything connected and\
    \ working](httpatomoreillycomsourceoreillyimages895980.png.jpg)\n\nFigure 5-12. Everything\
    \ connected and working\n\nCongratulations, you’ve successfully connected your\
    \ Arduino and your iPhone via an XBee serial pass-through connection.\n\n## Going\
    \ Further\n\nA fairly trivial exercise at this point would be to take the sonar\
    \ example from the previous chapter and substitute an XBee for the direct cable\
    \ connection. There aren’t any software changes needed, just hardware. Compare\
    \ [Figure 5-13](#ch05s06.html#connecting_the_ez1_example_from_chapter \"Figure 5-13. Connecting\
    \ the EZ1 example from Chapter 4 using XBee modules\") below to [Figure 4-9](#ch04s02.html#connecting_all_the_components_together\
    \ \"Figure 4-9. Connecting all the components\") in the previous chapter.\n\n\
    ![Connecting the EZ1 example from using XBee modules](httpatomoreillycomsourceoreillyimages895982.png.jpg)\n\
    \nFigure 5-13. Connecting the EZ1 example from [Chapter 4](#ch04.html \"Chapter 4. Using\
    \ External Sensors from the iPhone\") using XBee modules\n\nIf all goes well,\
    \ you should see exactly the same thing you saw in the previous chapter.\n\n#\
    \ Chapter 6. Other Ways to Connect\n\nI’ve spent most of this book talking about\
    \ the Redpark Serial Cable, and that’s because it’s the easiest way to connect\
    \ external hardware directly to your iPhone or iPad. However, before the Redpark\
    \ cable came along, we had to be somewhat more creative, and in this chapter,\
    \ I’m going to look at some of the other ways you can connect external hardware\
    \ to your iOS device.\n\n## Using the Network\n\nI haven’t talked about networking\
    \ very much, but, as we’re all well aware, the availability of ubiquitous data\
    \ is the thing that changed everything. If we can Internet-enable our sensor,\
    \ or other hardware, and make it part of the Internet of Things, our iPhone (or\
    \ iPad) is already well equipped to talk to it.\n\n### Using Ethernet\n\nThe easiest\
    \ way to Internet-enable a piece of arbitrary sensor hardware is (probably quite\
    \ predictably by this stage) by making use of an Arduino. There are several ways\
    \ you can accomplish this, but if you have a static sensor platform, the simplest\
    \ way is probably to use wired Ethernet. See [Figure 6-1](#ch06.html#arduino_ethershield_open_parenthesis_top\
    \ \"Figure 6-1. Arduino Ethershield (top) and Arduino Uno (bottom)\").\n\n####\
    \ Note\n\nAn Arduino shield is a board that can be plugged on top of the Arduino\
    \ PCB, extending its capabilities. It may make use of some, or all, of the Arduino\
    \ pins. However, those pins that are not used are generally passed through and\
    \ exposed for other uses. See [http://shieldlist.org/](http://shieldlist.org/)\
    \ for a good list of the pin usage of many Arduino shields.\n\nYou can buy the\
    \ official Arduino Ethernet Shield from various vendors, including both the [Maker\
    \ Shed](http://www.makershed.com/ProductDetails.asp?ProductCode=MKSP7) and [SparkFun](http://www.sparkfun.com/products/9026).\n\
    \n![Arduino Ethershield (top) and Arduino Uno (bottom)](httpatomoreillycomsourceoreillyimages895984.png.jpg)\n\
    \nFigure 6-1. Arduino Ethershield (top) and Arduino Uno (bottom)\n\nOnce you’ve\
    \ attached the Ethernet shield to the Arduino, and plugged the shield into your\
    \ network, a simple web client is fairly easy to put together. The code below\
    \ establishes a network connection, and then carries out a Google search for the\
    \ term “Arduino” and dispatches the page returned by the request to the serial\
    \ connection:\n\n```\n#include <Ethernet.h>\n\nbyte mac[] = { 0xDE, 0xAD, 0xBE,\
    \ 0xEF, 0xFE, 0xED };\nbyte ip[] = { 144,173,229,19 };\nbyte server[] = { 64,\
    \ 233, 187, 99 }; // Google\n\nClient client(server, 80);\n\nvoid setup()\n{\n\
    \  Ethernet.begin(mac, ip);\n  Serial.begin(9600);\n\ndelay(1000);\n\nSerial.println(\"\
    connecting...\");\n\nif (client.connect()) {\n    Serial.println(\"connected\"\
    );\n    client.println(\"GET /search?q=arduino HTTP/1.0\");\n    client.println();\n\
    \  } else {\n    Serial.println(\"connection failed\");\n  }\n}\n\nvoid loop()\n\
    {\n  if (client.available()) {\n    char c = client.read();\n    Serial.print(c);\n\
    \  }\n\nif (!client.connected()) {\n    Serial.println();\n    Serial.println(\"\
    disconnecting.\");\n    client.stop();\n    for(;;)\n      ;\n  }\n}\n```\n\n\
    [![1](callouts/1.png)](#ch06.html#co13_id)\n\nThe Arduino Ethernet library requires\
    \ that you define a MAC address for the Ethernet Shield. This is something that\
    \ is normally done by the manufacturer, and most system administrators won’t look\
    \ kindly on your attempts to provide a random MAC for your Arduino. If you’re\
    \ going to connect your Arduino + Ethernet Shield to a network you do not directly\
    \ control, you should consult with your system administrator beforehand.\n\n[![2](callouts/2.png)](#ch06.html#co14_id)\n\
    \nAnother problem with the official Ethernet library is that it doesn’t yet support\
    \ DHCP and you must therefore supply your sketch with a static IP address. Again,\
    \ this is something your system administrator might have issues with, as most\
    \ modern networks make use of DHCP to provide dynamic allocation of IP addresses.\
    \ If you’re connecting your Arduino to a network you do not directly control,\
    \ you should again consult your system administrator beforehand.\n\nYou can make\
    \ use of the serial console provided by the Arduino development environment, or\
    \ the `SerialConsole` application we wrote earlier in the book, to see the results\
    \ returned by this sketch.\n\n**How do I generate a MAC address?**\n\nThe purpose\
    \ of a Medium Access Control (MAC) address is to distinguish physical devices\
    \ on your network. Each device on your network must have a unique MAC address,\
    \ and normally networked devices have a semiunique MAC embedded in their firmware\
    \ by the manufacturer. However, in this case you are the manufacturer, and your\
    \ sketch is (effectively) the firmware of the embedded device you are creating.\
    \ Therefore, it’s up to you to provide the MAC address for the device.\n\nThe\
    \ first 6 octets of the MAC address are unique to the manufacturer of the device;\
    \ the IEEE administers allocation of these addresses. However, you can assign\
    \ a locally administered address in your code.\n\nThere are two bits in the first\
    \ octet of a MAC address that are used to define certain aspects of the MAC address.\
    \ The least significant bit of the first octet of the MAC address is the Individual/Group\
    \ (I/G) address bit, while the next-to-least significant bit is the Universally\
    \ or Locally (U/L) administered address bit."
