  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n这段代码将初始化 `Redpark Serial\
    \ Cable Manager` 并将其委托设置为当前类。完成此操作后，我们需要添加必须实现的委托回调：\n\n```\n#pragma mark - RscMgrDelegate\
    \ methods\n\n- (void) cableConnected:(NSString *)protocol {\n    [rscMgr setBaud:9600];\n\
    \    [rscMgr open];\n}\n\n- (void) cableDisconnected {\n\n}\n\n- (void) portStatusChanged\
    \ {\n\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes {\n    int bytesRead\
    \ = [rscMgr read:rxBuffer Length:numBytes];\n    NSLog( @\"Read %d bytes from\
    \ serial cable.\", bytesRead );\n    for(int i = 0;i < numBytes;++i) {\n     \
    \   self.serialView.text =\n            [NSString stringWithFormat:@\"%@%c\",\n\
    \                          self.serialView.text,\n                         ((char\
    \ *)rxBuffer)[i]];\n    }\n}\n\n- (BOOL) rscMessageReceived:(UInt8 *)msg TotalLength:(int)len\
    \ {\n    return FALSE;\n}\n\n- (void) didReceivePortConfig {\n\n}\n```\n\n![1](img/#ch02s05.html#co6_id)\n\
    \n这里我们将 `rxBuffer` 实例变量作为引用传递给 `rscMgr` 的 `read:Length:` 方法，该方法会直接修改原始数据。这并非 Objective-C\
    \ 方法的常规行为，因此需要小心处理。\n\n![2](img/#ch02s05.html#co7_id)\n\n这里我们将新填充的 `rxBuffer`\
    \ 数组中的字符追加到 `UITextView` 中已有的文本之后。\n\n尽管我们必须实现所有必须的方法，但在这个精简的实现中，我们实际上只关心 `cableConnected:`\
    \ 和 `readBytesAvailable:` 这两个回调。\n\n## 连接 Arduino\n\n现在是一个停下来测试代码的好时机；点击 Xcode\
    \ 工具栏中的“运行”按钮，将代码构建并部署到你的 iPhone 上。一旦应用程序被安装到 iPhone 上，点击“停止”按钮停止运行，然后将你的 iPhone\
    \ 从 Mac 上拔下。\n\n要测试代码，我们可以使用上一章用过的简单串口草图：\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    }\n\nvoid loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"\
    Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"Goodbye world\");\n\
    \  while(1) { }\n}\n```\n\n如果你尚未将草图加载到 Arduino 上，请打开 Arduino 开发环境并加载它。然后将 Arduino\
    \ 连接到 Redpark 数据线，再将 Redpark 数据线连接到你的 iPhone。最后点击 SerialConsole 应用程序以恢复运行。\n\n\
    如果你已经正确连接好所有部件，你应该会看到类似图 2-15 的画面。就像你的 Mac 上的串口控制台一样，Arduino 会打印出“Hello World”。\n\
    \n![连接到 Arduino 的 SerialConsole 应用程序](img/httpatomoreillycomsourceoreillyimages895887.png.jpg)\n\
    \n图 2-15. 连接到 Arduino 的 SerialConsole 应用程序\n\n## 向 Arduino 发送数据\n\n虽然你的 iPhone\
    \ 现在可以接收来自 Arduino 的数据，但我们还不能发送数据。别担心；实际上这比接收数据要容易得多。点击 `SerialConsoleViewController.m`\
    \ 实现文件，向下滚动直到找到 `sendString:` 方法。添加以下几行：\n\n```\n- (IBAction)sendString:(id)sender\
    \ {\n    [self.textEntry resignFirstResponder];\n\n    NSString *text = self.textEntry.text;\n\
    \    int bytesToWrite = text.length;\n    for ( int i = 0; i < bytesToWrite; i++\
    \ ) {\n        txBuffer[i] = (int)[text characterAtIndex:i];\n    }\n    int bytesWritten\
    \ = [rscMgr write:txBuffer Length:bytesToWrite];\n}\n```\n\n这里我们获取 `UITextField`\
    \ 控件中的文本，并将字符串逐字节地打包到 `txBuffer` 中。然后我们使用 `rscMgr` 将缓冲区中的数据写入串口。\n\n继续，将你的 iPhone\
    \ 从 Redpark 数据线上拔下，然后重新插回你的 Mac。当 Xcode 再次检测到该设备后，点击 Xcode 中的“运行”按钮，再次构建并将应用部署到你的\
    \ iPhone 上。应用启动后，点击“停止”按钮，断开 iPhone 与 Mac 的连接，然后重新连接 Redpark 数据线。点击 `SerialConsole`\
    \ 应用程序以恢复执行。\n\n当你看到“Hello World”信息在文本视图中滚动时，点击文本输入控件并输入几个字符。然后点击“发送”按钮。你应该会看到类似图\
    \ 2-16 的画面，以及“Goodbye World”信息。\n\n![连接到 Arduino 的应用（左）、输入字符（中）、Arduino 已收到字符（右）](img/httpatomoreillycomsourceoreillyimages895889.png.jpg)\n\
    \n图 2-16. 连接到 Arduino 的应用（左）、输入字符（中）、Arduino 已收到字符（右）\n\n如果你想添加一个闪烁的 LED，可以像我们在上一章中那样，将一个\
    \ LED 插入引脚 13，并在我们的草图中添加以下熟悉的代码：\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    \  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  while (Serial.available() <= 0)\
    \ {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"\
    Goodbye world\");\n  while(1) {\n    digitalWrite(13, HIGH);\n    delay(1000);\n\
    \    digitalWrite(13, LOW);\n    delay(1000);\n  }\n}\n```\n\n如果你将这个修改后的草图上传到你的\
    \ Arduino 板，除了在通过串口接收到字节时打印“Goodbye world”外，Arduino 还会开始每秒一次地闪烁连接在引脚 13 上的 LED。请参见图\
    \ 2-17。\n\n![SerialConsole 应用程序、数据线缆和 Arduino](img/httpatomoreillycomsourceoreillyimages895891.png.jpg)\n\
    \n图 2-17. SerialConsole 应用程序、数据线缆和 Arduino\n"
- fmt: "# Log Messages\n\nOne of the things that’s going to start to irritate you\
    \ fairly quickly is how hard it is to debug applications using the Redpark cable.\
    \ With the cable plugged in, you’re going to be unable to see output to the debug\
    \ console: for instance, log messages you might normally print to the console\
    \ using the `NSLog` method.\n\nFortunately, there is a way around this. We can\
    \ actually redirect the `stderr` output that would normally appear in the Debug\
    \ area to a file, which we can then view inside our application itself.\n\nOpen\
    \ up the `SerialConsole` project in Xcode and click on the `main.m` file, which\
    \ is located in the Supporting Files group in the Project pane, and add the highlighted\
    \ lines below to it:\n\n```\n#import <UIKit/UIKit.h>\n\nint main(int argc, char\
    \ *argv[]){\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\
    \nNSArray *paths =\n       NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ @\"ns.log\"];\n\nNSFileManager *fileMgr = [NSFileManager defaultManager];\n\
    \    [fileMgr removeItemAtPath:log error:nil];\n\nfreopen([log fileSystemRepresentation],\
    \ \"a\", stderr);\n\nint retVal = UIApplicationMain(argc, argv, nil, nil);\n \
    \   [pool release];\n    return retVal;\n}\n```\n\nThis will redirect the `stderr`\
    \ output to a file called `ns.log` inside the application’s Documents directory.\
    \ The file will be deleted and recreated each time the application is started.\n\
    \nNow that we’ve done this, we need to create a view controller to allow us to\
    \ look at the log. Right-click on the Project pane and select New File..., select\
    \ a `UIViewController` subclass from the drop-down list, which is a subclass of\
    \ `UIViewController` itself, and make sure the “With XIB for user interface” checkbox\
    \ is checked. Name the new class `LogController` when prompted.\n\nClick on the\
    \ `LogController.xib` file to open it in Interface Build, and drag a `UINavigationBar`\
    \ and a `UIBarButtonItem` from the Object library into your view. Position the\
    \ bar button item on the left of the navigation bar and change the text to be\
    \ “Done.” Then in the Attributes inspector, change the button style to Done rather\
    \ than Plain. You should also change the title of the navigation bar to “NSLog.”\n\
    \nNow drag a `UITextView` from the Object library into the view to fill the remaining\
    \ space. Delete the Lorem ipsum text, and in the Attributes inspector, uncheck\
    \ the Editable checkbox.\n\nNext, close the Utilities pane and open the Assistant\
    \ Editor. Make sure it’s on Automatic, and Ctrl-click and drag from the `UITextView`\
    \ to the displayed `LogController.h` interface file to create a property and `IBOutlet`\
    \ called `logWindow`. Then, similarly, Ctrl-click and drag from the Done button\
    \ the interface file to create an `IBAction` called `done:`; see [Figure 2-18](#ch02s06.html#connecting_the_outlets_and_actions-id1\
    \ \"Figure 2-18. Connecting the outlets and actions to the user interface\").\n\
    \n![Connecting the outlets and actions to the user interface](httpatomoreillycomsourceoreillyimages895893.png.jpg)\n\
    \n**Figure 2-18.** Connecting the outlets and actions to the user interface\n\n\
    Save your changes, return to the Standard Editor, and click on the `LogController.h`\
    \ interface file to open it in the Xcode editor. Add the highlighted lines below:\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface LogController : UIViewController\
    \ {\n\nUITextView *logWindow;\n    BOOL firstOpen;\n\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UITextView *logWindow;\n\n- (IBAction)done:(id)sender;\n- (void)setWindowScrollToVisible;\n\
    \n@end\n```\n\nThen, click on the corresponding `LogController.m` implementation\
    \ file. The first thing we need to do is modify the `initWithNibName:` method\
    \ as follows:\n\n```\n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle\
    \ *)nibBundleOrNil {\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n\
    \    if (self) {\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
    \           NSDocumentDirectory, NSUserDomainMask, YES);\n        NSString *log\
    \ =\n          [[paths objectAtIndex:0] stringByAppendingPathComponent: @\"ns.log\"\
    ];\n        NSFileHandle *fh = [NSFileHandle fileHandleForReadingAtPath:log];\n\
    \n[fh seekToEndOfFile];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                 selector:@selector(getData:)\n             \
    \                    name:@\"NSFileHandleReadCompletionNotification\"\n      \
    \                           object:fh];\n        [fh readInBackgroundAndNotify];\n\
    \        firstOpen = YES;\n    }\n    return self;\n}\n```\n\nFrom there we need\
    \ to add the `viewDidAppear:` method:\n\n```\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n    [super viewDidAppear:animated];\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ @\"ns.log\"];\n\nif ( firstOpen ) {\n        NSString* content = [NSString stringWithContentsOfFile:log\
    \ encoding:NSUTF8StringEncoding error:NULL];\n        logWindow.editable = TRUE;\n\
    \        logWindow.text = [logWindow.text stringByAppendingString: content];\n\
    \        logWindow.editable = FALSE;\n        firstOpen = NO;\n    }\n}\n```\n\
    \nThen we need to add the `getData:` method called when the class is notified\
    \ there is a change in the log file, along with some supporting methods:\n\n```\n\
    #pragma mark - NSLog Redirection Methods\n\n- (void) getData: (NSNotification\
    \ *)aNotification {\n    NSData *data = [[aNotification userInfo] objectForKey:NSFileHandleNotificationDataItem];\n\
    \    if ([data length]) {\n        NSString *aString = [[[NSString alloc] initWithData:data\
    \ encoding:NSUTF8StringEncoding] autorelease];\n\nlogWindow.editable = TRUE;\n\
    \        logWindow.text = [logWindow.text stringByAppendingString: aString];\n\
    \        logWindow.editable = FALSE;\n\n[self setWindowScrollToVisible];\n   \
    \     [[aNotification object] readInBackgroundAndNotify];\n    } else {\n    \
    \    [self performSelector:@selector(refreshLog:) withObject:aNotification afterDelay:1.0];\n\
    \    }\n}\n- (void) refreshLog: (NSNotification *)aNotification {\n    [[aNotification\
    \ object] readInBackgroundAndNotify];\n}\n\n-(void)setWindowScrollToVisible {\n\
    \    NSRange txtOutputRange;\n    txtOutputRange.location = [[logWindow text]\
    \ length];\n    txtOutputRange.length = 0;\n    logWindow.editable = TRUE;\n \
    \   [logWindow scrollRangeToVisible:txtOutputRange];\n    [logWindow setSelectedRange:txtOutputRange];\n\
    \    logWindow.editable = FALSE;\n}\n```\n\nFinally, you should modify the `done:`\
    \ method so that it dismisses the view controller:\n\n```\n-(IBAction)done:(id)sender{\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nAlmost done. Save\
    \ your changes and click on the `SerialConsoleViewController.xib` file to open\
    \ it in Interface Builder. Drag and drop a `UIBarButtonItem` from the Object library\
    \ into the navigation bar, on the left of the title, and change the name to Log.\n\
    \nClose the Utilities pane and switch to the Assistant Editor, making sure it’s\
    \ in Automatic mode, and Ctrl-click and drag from the Log button to the `SerialConsoleViewController.h`\
    \ interface file to create an `openLog:` action, as in [Figure 2-19](#ch02s06.html#connecting_the_log_button_the_openlog_co\
    \ \"Figure 2-19. Connecting the Log button to the openLog: action\").\n\n![Connecting\
    \ the Log button to the openLog: action](httpatomoreillycomsourceoreillyimages895896.png.jpg)\n\
    \n**Figure 2-19.** Connecting the Log button to the `openLog:` action\n\nSave\
    \ your changes, switch to the Standard editor and click on the `SerialConsoleViewController.h`\
    \ interface file, and add the following instance variable:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"LogController.h\"\n#import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\
    \n@interface SerialConsoleViewController : UIViewController <RscMgrDelegate> {\n\
    ```"
