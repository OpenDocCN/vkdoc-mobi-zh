    \ pane and open up the Assistant Editor. Then Ctrl-click and drag from the Log\
    \ button into the associated header file in the editor to create an `IBAction`\
    \ method called `openLog:` (see [Figure 3-11](#ch03s04.html#connecting_the_log_button_to_the_view_co\
    \ \"Figure 3-11. Connecting the log button to the view controller.\")).\n\n![Connecting\
    \ the log button to the view controller.](httpatomoreillycomsourceoreillyimages895921.png.jpg)\n\
    \nFigure 3-11. Connecting the log button to the view controller.\n\nSwitch back\
    \ to the standard editor, save your changes, and then click on the *PaduinoViewController.h*\
    \ file to open it in the editor. Add the highlighted code below:\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n#import \"LogController.h\"\n\n#define\
    \ BUFFER_LEN 1024\n\n@interface PaduinoViewController : UIViewController <RscMgrDelegate>\
    \ {\n\n    UISwitch *pin13;\n    UISwitch *pin12;\n    UISwitch *pin11;\n    UISwitch\
    \ *pin10;\n    UISwitch *pin9;\n    UISwitch *pin8;\n    UISwitch *pin7;\n   \
    \ UISwitch *pin6;\n    UISwitch *pin5;\n    UISwitch *pin4;\n    UISwitch *pin3;\n\
    \    UISwitch *pin2;\n    UILabel *statusLabel;\n\n    RscMgr *rscMgr;\n    UInt8\
    \ rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\n    LogController\
    \ *logWindow;\n}\n\n@property (nonatomic, retain) IBOutlet UISwitch *pin13;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin12;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin11;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin10;\n@property (nonatomic, retain) IBOutlet UISwitch *pin9;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin8;\n\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin7;\n@property (nonatomic, retain) IBOutlet UISwitch *pin6;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin5;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin4;\n@property (nonatomic, retain) IBOutlet UISwitch *pin3;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin2;\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *statusLabel;\n\n@property (nonatomic, retain) IBOutlet LogController *logWindow;\n\
    \n- (IBAction)toggle:(id)sender;\n- (IBAction)openLog:(id)sender;\n\n@end\n```\n\
    \nThen, switching to the corresponding *PaduinoViewController.m* implementation\
    \ file, you should remember to:\n\n```\n@synthesize logWindow;\n```\n\nbefore\
    \ going on to add the following code to initialize the log window in the `viewDidLoad:`\
    \ method:\n\n```\n self.logWindow = [[LogController alloc] initWithNibName:@\"\
    LogController\" \n                                            bundle:nil];\n```\n\
    \nand release it in the `dealloc` method:\n\n```\n [logWindow release];\n```\n\
    \nFinally, in the `openLog:` method you should modally present the log controller:\n\
    \n```\n- (IBAction)openLog:(id)sender {\n    [self presentModalViewController:self.logWindow\
    \ animated:YES];\n}\n```\n\nSave your changes and then click on the *main.m* file,\
    \ which is located in the Supporting Files group in the Project pane. As we did\
    \ in the previous chapter, add the highlighted lines below to it:\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\nint main(int argc, char *argv[]){\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\n    NSArray *paths =\n       NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ \n                     @\"ns.log\"];\n\n    NSFileManager *fileMgr = [NSFileManager\
    \ defaultManager];\n    [fileMgr removeItemAtPath:log error:nil];\n\n    freopen([log\
    \ fileSystemRepresentation], \"a\", stderr);\n\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```\n\nThis will\
    \ redirect the `stderr` output to a file called *ns.log* inside the application’s\
    \ Documents directory.\n\nAt this stage, you should go ahead and add `NSLog` messages\
    \ in various vital places, such as the `RscMgr` delegate methods, to report what’s\
    \ going on inside your application. If you now save your changes, and click on\
    \ the Run button in the Xcode editor to build and deploy the application to your\
    \ device, you should have a lot more feedback when you plug and unplug the cable.\n\
    \n# Summary\n\nIn this chapter, we built a simple application to control your\
    \ Arduino directly from your iPad. In the next chapter we’ll go a step further\
    \ and start gathering sensor measurements."
  trans: "\n# 整合所有内容\n\n至此，我们已经完成了串行连接两端代码的编写。拔掉之前插入 Mac 的所有设备，将所有线缆连接起来。启动 Paduino\
    \ 应用程序，并拨动一到两个开关。您应该会看到类似下图（图 3-9）的画面。\n\n请记住，一旦您将某个引脚拨至 `HIGH` 状态，就可以拔掉 iPad\
    \ 和 Arduino 之间的串行线缆，因为该引脚的状态会保持不变。\n\n![iPad 通过 Redpark 线缆连接至 Arduino 板（上方），以及\
    \ Arduino 板上 UISwitch 位置和 LED 的局部特写（下方）](img/httpatomoreillycomsourceoreillyimages895916.png.jpg)\n\
    \n图 3-9. iPad 通过 Redpark 线缆连接至 Arduino 板（上方），以及 Arduino 板上 UISwitch 位置和 LED 的局部特写（下方）\n\
    \n# 更进一步\n\n我们的应用程序显然还有改进空间。目前，后台发生了什么完全没有提示，这使得调试变得困难。让我们开始解决这个问题：向用户界面添加一个标签，并将其连接到\
    \ `cableConnected` 和 `cableDisconnected` 委托方法，这样我们就能确切知道线缆是否正确连接到了 iPad。\n\n点击\
    \ *PaduinoViewController.xib* 接口文件，在 Interface Builder 中打开它，然后将两个 `UILabel` 元素拖放到视图中。将它们放在界面的顶部以及左上角。将第一个标签的文本改为\
    \ \"Cable:\"，并将第二个标签放在其右侧。您可以保留第二个标签的默认文本不变，或者将其改为更适合初始状态的文本（例如 \"Disconnected\"\
    ）。打开 Assistant Editor，然后按住 Ctrl 键点击第二个标签并拖拽到关联的接口文件中，以创建一个实例变量和属性（参见图 3-10）。\n\
    \n![将 UILabel 连接到接口文件](img/httpatomoreillycomsourceoreillyimages895919.png.jpg)\n\
    \n图 3-10. 将 UILabel 连接到接口文件\n\n保存您的更改，然后切换到 Standard Editor 并返回到 *PaduinoViewController.m*\
    \ 实现文件。找到 `cableConnected` 和 `cableDisconnected` 委托方法，并添加以下高亮显示的代码：\n\n```\n-\
    \ (void) cableConnected:(NSString *)protocol {\n    [rscMgr setBaud:9600];\n \
    \   [rscMgr open];\n    self.statusLabel.text = @\"CONNECTED\";\n    self.statusLabel.textColor\
    \ = [UIColor greenColor];\n}\n\n- (void) cableDisconnected {\n    self.statusLabel.text\
    \ = @\"DISCONNECTED\";\n    self.statusLabel.textColor = [UIColor redColor];\n\
    }\n```\n\n这样，当我们连接和断开线缆时，状态文本及其颜色将会改变。\n\n## 添加日志窗口\n\n实际上，重用我们在前一章编写的日志窗口相当容易。\n\
    \n打开上一章的 SerialConsole，从项目管理窗格中选择 *LogController.h*、*LogController.m* 和 *LogController.xib*\
    \ 文件。将它们拖放到 Paduino 项目中，记得勾选 \"Copy files into destination group’s folder (if\
    \ needed)\" 复选框。\n\n完成此操作后，在 Interface Builder 中打开 *PaduinoViewController.xib*\
    \ 文件，并从对象库中将一个 `UIBarButtonItem` 拖放到导航栏中。将该按钮的标题改为 \"Log\"。关闭 Utilities 窗格，打开\
    \ Assistant Editor。然后按住 Ctrl 键点击 Log 按钮并拖拽到编辑器中关联的头文件，创建一个名为 `openLog:` 的 `IBAction`\
    \ 方法（参见图 3-11）。\n\n![将日志按钮连接到视图控制器](img/httpatomoreillycomsourceoreillyimages895921.png.jpg)\n\
    \n图 3-11. 将日志按钮连接到视图控制器\n\n切换回标准编辑器，保存更改，然后点击 *PaduinoViewController.h* 文件在编辑器中打开。添加以下高亮显示的代码：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n#import \"LogController.h\"\
    \n\n#define BUFFER_LEN 1024\n\n@interface PaduinoViewController : UIViewController\
    \ <RscMgrDelegate> {\n\n    UISwitch *pin13;\n    UISwitch *pin12;\n    UISwitch\
    \ *pin11;\n    UISwitch *pin10;\n    UISwitch *pin9;\n    UISwitch *pin8;\n  \
    \  UISwitch *pin7;\n    UISwitch *pin6;\n    UISwitch *pin5;\n    UISwitch *pin4;\n\
    \    UISwitch *pin3;\n    UISwitch *pin2;\n    UILabel *statusLabel;\n\n    RscMgr\
    \ *rscMgr;\n    UInt8 rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\
    \n    LogController *logWindow;\n}\n\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin13;\n@property (nonatomic, retain) IBOutlet UISwitch *pin12;\n@property\
    \ (nonatomic, retain) IBOutlet UISwitch *pin11;\n@property (nonatomic, retain)\
    \ IBOutlet UISwitch *pin10;\n@property (nonatomic, retain) IBOutlet UISwitch *pin9;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin8;\n\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin7;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin6;\n@property (nonatomic, retain) IBOutlet UISwitch *pin5;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin4;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin3;\n@property (nonatomic, retain) IBOutlet UISwitch *pin2;\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *statusLabel;\n\n@property (nonatomic, retain) IBOutlet\
    \ LogController *logWindow;\n\n- (IBAction)toggle:(id)sender;\n- (IBAction)openLog:(id)sender;\n\
    \n@end\n```\n\n然后，切换到相应的 *PaduinoViewController.m* 实现文件，您应该记得进行：\n\n```\n@synthesize\
    \ logWindow;\n```\n\n接着添加以下代码，在 `viewDidLoad:` 方法中初始化日志窗口：\n\n```\n self.logWindow\
    \ = [[LogController alloc] initWithNibName:@\"LogController\" \n             \
    \                               bundle:nil];\n```\n\n并在 `dealloc` 方法中释放它：\n\n\
    ```\n [logWindow release];\n```\n\n最后，在 `openLog:` 方法中，您应该以模态方式呈现日志控制器：\n\n```\n\
    - (IBAction)openLog:(id)sender {\n    [self presentModalViewController:self.logWindow\
    \ animated:YES];\n}\n```\n\n保存您的更改，然后点击位于项目管理窗格中 Supporting Files 组内的 *main.m*\
    \ 文件。如同我们在上一章所做的那样，向其添加以下高亮显示的行：\n\n```\n#import <UIKit/UIKit.h>\n\nint main(int\
    \ argc, char *argv[]){\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc]\
    \ init];\n\n    NSArray *paths =\n       NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *log = [[paths objectAtIndex:0] stringByAppendingPathComponent:\
    \ \n                     @\"ns.log\"];\n\n    NSFileManager *fileMgr = [NSFileManager\
    \ defaultManager];\n    [fileMgr removeItemAtPath:log error:nil];\n\n    freopen([log\
    \ fileSystemRepresentation], \"a\", stderr);\n\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    [pool release];\n    return retVal;\n}\n```\n\n这会将 `stderr`\
    \ 输出重定向到应用程序 Documents 目录下名为 *ns.log* 的文件中。\n\n此时，您应该继续在各个关键位置（例如 `RscMgr` 委托方法）添加\
    \ `NSLog` 消息，以报告应用程序内部发生的情况。现在，如果您保存更改，并点击 Xcode 编辑器中的 Run 按钮，将应用程序构建并部署到您的设备上，那么当您插入和拔出线缆时，应该会获得更多的反馈信息。\n\
    \n# 总结\n\n在本章中，我们构建了一个简单的应用程序，用于直接从 iPad 控制您的 Arduino。在下一章中，我们将更进一步，开始采集传感器测量数据。\n"
- fmt: "# Chapter 4. Using External Sensors from the iPhone\n\nSo far we’ve successfully\
    \ passed messages back and forth between the Arduino board and our iPhone, and\
    \ then gone on to control the board directly from our iPad. In this chapter, we’re\
    \ going to take another step and build an application that can turn a remote sensor\
    \ on, parse the values it gets from the sensor, and then plot the resulting measurements,\
    \ all in real time.\n\n# The LV-MaxSonar-EZ1\n\nThe sensor we’re going to be using\
    \ in this chapter is the LV-MaxSonar-EZ1 manufactured by MaxBotics (see [Figure\
    \ 4-1](#ch04.html#the_lv-maxsonarr-ez1t \"Figure 4-1. The LV-MaxSonar-EZ1\")),\
    \ operating at 5 or 3.3 V.\n\n![The LV-MaxSonar-EZ1](httpatomoreillycomsourceoreillyimages895923.png.jpg)\n\
    \nFigure 4-1. The LV-MaxSonar-EZ1\n\nThe EZ1 is a versatile ultrasonic range finder\
    \ and is widely available from various suppliers, including [SparkFun](http://www.sparkfun.com/products/639),\
    \ for around $25.\n\n### Note\n\nThe LV-MaxSonar-EZ1 detects objects from 0 to\
    \ 6.45 m (approximately 21 ft) with a resolution of 2.5 cm (1 in) for distances\
    \ beyond 15 cm (6 in). Objects between 0 and 15 cm will range as 15 cm.\n\nInterestingly\
    \ for our purposes, the sensor provides three different interfaces: analog voltage\
    \ output, pulse width output, and serial digital output. All three interfaces\
    \ are active simultaneously. For more information see the [product datasheet](http://www.maxbotix.com/documents/MB1010_Datasheet.pdf).\n\
    \n## Analog Output\n\nPerhaps the easiest, and most familiar, way to wire the\
    \ EZ1 sensor is to make use of its analog output. We need only three wires to\
    \ the sensor, connected to the GND, +5V, and AN pins. See [Figure 4-1](#ch04.html#the_lv-maxsonarr-ez1t\
    \ \"Figure 4-1. The LV-MaxSonar-EZ1\") and [Figure 4-2](#ch04.html#the_ez1_wired_for_analog_output\
    \ \"Figure 4-2. The EZ1 wired for analog output\") for details.\n\n![The EZ1 wired\
    \ for analog output](httpatomoreillycomsourceoreillyimages895925.png.jpg)\n\n\
    Figure 4-2. The EZ1 wired for analog output\n\nMaking use of the EZ1 sensor operating\
    \ in this mode is fairly trivial. If you connect the 5V and GND pins to their\
    \ respective counterparts on the Arduino board, and the AN pin to Analog pin A0,\
    \ the following sketch will send distance measurements to the Arduino’s serial\
    \ pins (RX, TX) and to the USB connection:\n\n```\nint ez1Analog = 0; // Analog\
    \ Pin, A0\n\nvoid setup() {\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = analogRead(ez1Analog);\n   if (val > 0) {\n \
    \     val = val / 2;\n      float cm = float(val)*2.54;\n      Serial.println(\
    \ int(cm) ); // cm\n   }\n}\n```\n\n## Pulse Width Output\n\nAn alternative to\
    \ using the AN pin on the EZ1 sensor is to use the PW pin and make use of the\
    \ pulse width output.\n\n### Note\n\nThe pulse width is 58 ms per cm, or 147 ms\
    \ per in.\n\nIf you disconnect the AN pin, and connect the EZ1’s PW pin to digital\
    \ pin 5 on the Arduino, which is one of the pins that supports PWM, the following\
    \ sketch replicates the functionality of the sketch in the preceding section in\
    \ a slightly different fashion:\n\n```\nint ez1Pulse = 5; // Digital Pin 5 (with\
    \ PWM)\n\nvoid setup() {\n   pinMode(ez1Pulse,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = pulseIn(ez1Pulse, HIGH);\n   if (val > 0) {\n\
    \      float cm = val / 58; // pulse width is 58 microsecs per cm\n      Serial.println(\
    \ int(cm) ); // cm\n   }\n}\n```\n\n## RS-232 Serial Output\n\nOne of the main\
    \ reasons I selected the EZ1 as our example sensor for this chapter is that this\
    \ sensor offers asynchronous serial reporting of measurements in addition to analog\
    \ and pulse width outputs. This means that we can bypass the Arduino board and\
    \ the RS-232 to TTL adaptor, and connect the sensor directly to the Redpark cable.\
    \ We’ll look at how to do that toward the end of the chapter.\n\n### Note\n\n\
    The TX output delivers asynchronous serial with an RS-232 format (although voltage\
    \ range is 0–Vcc). Output is an ASCII capital “R”, followed by three ASCII character\
    \ digits representing the range in inches (up to a maximum of 255), followed by\
    \ a carriage return (ASCII character 13).\n\nAlthough the voltage of 0–Vcc is\
    \ outside the RS-232 standard, most RS-232 devices have sufficient margin to read\
    \ 0–Vcc serial data. The baud rate is 9600, 8 bits, no parity, with one stop bit.\n\
    \n# MaxSonar Range Finder for iPhone\n\nAt least in the first instance, we’re\
    \ going to make use of the sensor in analog mode, and connect it to our Arduino\
    \ board, which in turn will be connected to our iPhone via the Redpark cable.\n\
    \nOpen Xcode, choose to create a new project, select a View-based application\
    \ for the iPhone device family, and when prompted name it “MaxSonar” and save\
    \ it to the Desktop.\n\n## Adding the Serial Library\n\nOpen your copy of the\
    \ Redpark Serial SDK and grab the `redparkSerial.h` and `rscMgr.h` header files\
    \ from the `inc/` folder, and the `libRscMgrUniv.a` static libraries from `lib/`.\
    \ Drag and drop them into your new MaxSonar project, remembering to tick the “Copy\
    \ items into destination group’s folder (if needed)” checkbox when prompted.\n\
    \nWe also need to add the External Accessories framework, so click on the project\
    \ icon at the top of the Project pane in Xcode, and click on the MaxSonar Target\
    \ and then on the Build Phases tab. Finally, click on the Link Binary with Libraries\
    \ item to open up the list of linked frameworks, and click on the + symbol to\
    \ add a new framework. Select the External Accessory framework from the drop-down\
    \ list and click the Add button.\n\nFinally, we need to declare support for the\
    \ cable. Click on the `SerialConsole-Info.plist` file to open it in the editor.\
    \ Right-click on the bottommost row of the list and select Add Row from the menu.\
    \ An extra row will be added to the table, and you’ll be presented with a drop-down\
    \ menu. Type `UISupportedExternalAccessoryProtocols` into the box. This will change\
    \ to the human-readable text “Supported external accessory protocols.” Type the\
    \ string `com.redpark.hobdb9` into Item 0 to declare our support for the cable.\n\
    \n## The CorePlot Library\n\nUnsurprisingly perhaps when dealing with sensor data,\
    \ the need to display a graph or a plot of some kind comes up fairly often when\
    \ you’re developing applications. Unfortunately, there is no native support for\
    \ graphs in the iOS SDK. The Core Plot library fills that hole (see [Figure 4-3](#ch04s02.html#the_coreplot_test_application_running_in\
    \ \"Figure 4-3. The CorePlot test application running in the iPhone Simulator\"\
    )).\n\n![The CorePlot test application running in the iPhone Simulator](httpatomoreillycomsourceoreillyimages895927.png.jpg)\n\
    \nFigure 4-3. The CorePlot test application running in the iPhone Simulator\n\n\
    The Core Plot library is a third-party 2D plotting framework for iOS and Mac OS\
    \ X, tightly integrated with Core Animation and under active development. At the\
    \ time of this writing, the latest release was version 0.4. You can download it\
    \ from [http://code.google.com/p/core-plot/](http://code.google.com/p/core-plot/).\n\
    \n### Note\n\nIf you want to live on the bleeding edge, you can check out the\
    \ source code straight from Core Plot’s repository using Mercurial:\n\n```\nhg\
    \ clone http://core-plot.googlecode.com/hg/ core-plot\n```\n\nMercurial doesn’t\
    \ ship with Xcode, so unless you’ve already installed it, your first step before\
    \ doing that will probably be to install Mercurial itself. You can download the\
    \ latest version of Mercurial from [http://mercurial.selenic.com/wiki/](http://mercurial.selenic.com/wiki/)."
