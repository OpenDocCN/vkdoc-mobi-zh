  trans: '

    ### 备注


    你可以在 [Arduino 项目网站](http://arduino.cc/en/uploads/Main/ArduinoUnoFront.jpg)上找到一幅清晰的
    Arduino Uno 图片。如有需要，可使用预览应用程序旋转图片，使电源和 USB 接口位于画面顶部，然后保存更改。将图片拖放到项目中。


    完成上述操作后，让我们在继续将视图连接到视图控制器之前，先构建用户界面。点击 `PaduinoViewController.xib` 文件，在 Interface
    Builder 中打开它。从对象库中拖入一个 `UINavigationBar`，并将其放置在视图顶部。将标题改为“Paduino”。然后从库中拖入一个 `UIImageView`，将其调整到填充剩余视图的位置。


    在属性检查器中，将视图模式设置为“纵横填充”，并将图像设置为刚才添加到项目中的 Arduino 图片。你应该会看到类似 图 3-1 的效果。


    接下来，从对象库中拖入十二个 `UISwitch` 元素，按照 图 3-2 所示的位置进行摆放，排成两列，每列六个开关，分别对应数字引脚 2 到 13。我们将用这些开关来切换
    Arduino 数字引脚的状态，从 `LOW` 变为 `HIGH`，再变回 `LOW`。


    ![基本用户界面](img/httpatomoreillycomsourceoreillyimages895900.png.jpg)


    图 3-1. 基本用户界面


    ![定位 UISwitch 元素](img/httpatomoreillycomsourceoreillyimages895902.png.jpg)


    图 3-2. 定位 UISwitch 元素


    对于每个开关，在属性检查器中将其状态设置为“关”。这将对应 Arduino 引脚保持为 `LOW` 状态；我们将编写 Arduino 代码，以此作为初始状态。然后，在同一检查器窗口中，将视图的标签（tag）设置为与引脚编号相同，参见
    图 3-3。


    ![设置视图的标签属性](img/httpatomoreillycomsourceoreillyimages895904.png.jpg)


    图 3-3. 设置视图的标签属性


    完成上述操作后，切换到标识检查器，将开关的标签（label）设置为引脚名称（参见 图 3-4）。虽然这不是绝对必要的，但在后续连接输出口和操作时，这将帮助我们识别各个开关。


    ![设置视图的标签属性](img/httpatomoreillycomsourceoreillyimages895906.png.jpg)


    图 3-4. 设置视图的标签属性


    完成这些设置后，关闭工具面板并打开辅助编辑器。确保其设置为“自动”，然后按住 Ctrl 键点击并从每个开关拖拽到 `PaduinoViewController.h`
    接口文件，为每个开关创建实例变量和属性。


    完成之后，点击其中一个开关将其选中，然后按住 Ctrl 键点击并拖拽到接口文件，创建一个名为 `toggle:` 的 `IBAction`（参见 图 3-5）。之后，按住
    Ctrl 键点击并从所有其他开关拖拽到同一个方法。更改任意开关的状态都将调用这一个方法，并将该 `UISwitch` 作为发送者参数传递进去。


    ![将所有十二个开关连接到 toggle: 方法](img/httpatomoreillycomsourceoreillyimages895908.png.jpg)


    图 3-5. 将所有十二个开关连接到 toggle: 方法


    完成这些操作后，如果你在对象视图中右键点击“File’s Owner”，应该会看到类似 图 3-6 的内容。这个弹出窗口显示了 File’s Owner（在本例中为
    `PaduinoViewController`）与视图中各个元素之间的连接。


    ![File’s Owner 与用户界面元素之间的连接](img/httpatomoreillycomsourceoreillyimages895910.png)


    图 3-6. File’s Owner 与用户界面元素之间的连接


    目前的工作暂时告一段落。我们做了很多更改，请确保已保存文件，然后点击 `PaduinoViewController.h` 接口文件，在标准编辑器中打开它。

