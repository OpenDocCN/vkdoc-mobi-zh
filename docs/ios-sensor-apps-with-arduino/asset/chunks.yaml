- fmt: "# A Simple Serial Application\n\nOur first application making use of the serial\
    \ cable will be a simple serial terminal, replicating the functionality of the\
    \ serial console in the Arduino development environment. Open Xcode, choose to\
    \ create a new project, select a View-based Application for the iPhone, and when\
    \ prompted name it \"SerialConsole\" and save it to the Desktop.\n\nLet's start\
    \ by building our interface. Click on the `SerialConsoleViewController.xib` file\
    \ to open it in Interface Builder. Open up the Utilities pane and then drag and\
    \ drop a `UINavigationBar`, `UITextField`, `UIButton`, and a `UITextView` into\
    \ the View from the Object library. Arrange them in a fashion similar to [Figure\
    \ 2-9](#ch02s05.html#building_the_serialconsole_appas_user_in \"Figure 2-9. Building\
    \ the SerialConsole app's user interface\").\n\n![Building the SerialConsole app's\
    \ user interface](httpatomoreillycomsourceoreillyimages895875.png.jpg)\n\nFigure\
    \ 2-9. Building the SerialConsole app's user interface\n\nWe're going to make\
    \ use of the real estate offered by the navigation bar later in the chapter to\
    \ add a `UIBarButtonItem`. But for now, change the title text to read \"Serial\
    \ Console,\" and we'll come back to it later on.\n\nFinally, select and delete\
    \ the Lorem ipsum text from the `UITextView`, and uncheck the Editable checkbox\
    \ in the Attributes tab of the Utilities pane so that users won't be able to obscure\
    \ the view of the text window by accidentally popping up the keyboard.\n\nClose\
    \ the Utilities pane and open the Assistant Editor, making sure it's set to Automatic\
    \ and is displaying the `SerialConsoleViewController.h` file.\n\nThen Ctrl-click\
    \ and drag from the `UITextField`, `UIButton`, and `UITextView` to the editor\
    \ window to create an `IBOutlet` property for each item, named `textEntry`, `sendButton`,\
    \ and `serialView`, respectively.\n\nThen Ctrl-click and drag once again from\
    \ the `UIButton` to create an `IBAction` called `sendString:` (see [Figure 2-10](#ch02s05.html#connecting_the_outlets_and_actions\
    \ \"Figure 2-10. Connecting the outlets and actions\")). Finally, right-click\
    \ on the `UITextField` to bring up the Text Fields outlets, events, and actions\
    \ pane and click and drag to connect the Did End on Exit event to the same `sendString:`\
    \ method. Doing this means that the same `sendString:` method is called either\
    \ when you tap on the Send button or tap on Return when entering characters into\
    \ the text entry field itself.\n\n![Connecting the outlets and actions](httpatomoreillycomsourceoreillyimages895877.png.jpg)\n\
    \nFigure 2-10. Connecting the outlets and actions\n\nAfter connecting your UI\
    \ elements to the interface file, your `SerialConsoleViewController.h` header\
    \ file should look something like this:\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ SerialConsoleViewController : UIViewController {\n\n    UITextField *textEntry;\n\
    \    UIButton *sendButton;\n    UITextView *serialView;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet UITextField *textEntry;\n@property (nonatomic, retain) IBOutlet\
    \ UIButton *sendButton;\n@property (nonatomic, retain) IBOutlet UITextView *serialView;\n\
    \n- (IBAction)sendString:(id)sender;\n\n@end\n```\n\nwith corresponding changes\
    \ in the implementation file. Now click on the `SerialConsoleViewController.m`\
    \ implementation file, and add the following line to the `sendString:` method:\n\
    \n```\n- (IBAction)sendString:(id)sender {\n    [self.textEntry resignFirstResponder];\n\
    \n    // Add code here\n}\n```\n\nThis will ensure that the keyboard is dismissed\
    \ when the user presses the Send button to send a string of characters. We'll\
    \ come back to this later in the chapter.\n\n## Adding the Redpark Serial Library\n\
    \nNow we've got the bare bones of a user interface; let's go ahead and start filling\
    \ in behind the scenes. Open up your copy of the Redpark Serial SDK and grab the\
    \ `redparkSerial.h` and `rscMgr.h` header files from the `inc/` folder, and the\
    \ `libRscMgrUniv.a` static library from `lib/` (see [Figure 2-11](#ch02s05.html#the_redpark_serial_sdk\
    \ \"Figure 2-11. The Redpark Serial SDK\")). The `libRscMgrUniv.a` library is\
    \ a universal (fat) library supporting the x86 architecture for use in the Simulator\
    \ as well as the armv6 and armv7 architectures for use on the device hardware\
    \ itself.\n\n![The Redpark Serial SDK](httpatomoreillycomsourceoreillyimages895879.png.jpg)\n\
    \nFigure 2-11. The Redpark Serial SDK\n\nDrag and drop them into your SerialConsole\
    \ project, remembering to tick the \"Copy items into destination group's folder\
    \ (if needed)\" checkbox when prompted.\n\nSince the SDK makes use of the External\
    \ Accessory framework, we also need to add this to the project at this stage.\
    \ Click on the project icon at the top of the Project pane in Xcode, then click\
    \ on the SerialConsole Target, and then on the Build Phases tab. Finally, click\
    \ on the Link Binary with Libraries item to open up the list of linked frameworks,\
    \ and click on the `+` symbol to add a new framework. Select the External Accessory\
    \ framework from the drop-down list and click the Add button (as in [Figure 2-12](#ch02s05.html#adding_the_external_accessory_framework\
    \ \"Figure 2-12. Adding the External Accessory framework to the project\")).\n\
    \n![Adding the External Accessory framework to the project](httpatomoreillycomsourceoreillyimages895881.png.jpg)\n\
    \nFigure 2-12. Adding the External Accessory framework to the project\n\nFinally,\
    \ we need to declare support for the cable in our application's `Info.plist` file.\
    \ If we don't do this, we'll get something that looks like [Figure 2-13](#ch02s05.html#the_unsupported_external_accessory_windo\
    \ \"Figure 2-13. The unsupported External Accessory window\") every time we plug\
    \ the cable into the device.\n\n![The unsupported External Accessory window](httpatomoreillycomsourceoreillyimages895883.png.jpg)\n\
    \nFigure 2-13. The unsupported External Accessory window\n\nClick on the `SerialConsole-Info.plist`\
    \ file to open it in the editor. Right-click on the bottommost row of the list\
    \ and select Add Row from the menu. An extra row will be added to the table, and\
    \ you'll be presented with a drop-down menu. Type `UISupportedExternalAccessoryProtocols`\
    \ into the box. This will change to the human-readable text \"Supported external\
    \ accessory protocols.\" Type the string `com.redpark.hobdb9` into Item 0, as\
    \ in [Figure 2-14](#ch02s05.html#declaring_support_for_the_cable_in_the_i \"Figure\
    \ 2-14. Declaring support for the cable in the Info.plist file\").\n\nNow that\
    \ we've added the necessary files to our project and configured our application\
    \ to support the cable, click on the `SerialConsoleViewController.h` header file\
    \ and add the code highlighted below to the file:\n\n![Declaring support for the\
    \ cable in the Info.plist file](httpatomoreillycomsourceoreillyimages895885.png.jpg)\n\
    \nFigure 2-14. Declaring support for the cable in the `Info.plist` file\n\n```\n\
    #import <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\n@interface\
    \ SerialConsoleViewController : UIViewController <RscMgrDelegate> {\n\nRscMgr\
    \ *rscMgr;\n    UInt8 rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\
    \nUITextField *textEntry;\n    UIButton *sendButton;\n    UITextView *serialView;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UITextField *textEntry;\n@property\
    \ (nonatomic, retain) IBOutlet UIButton *sendButton;\n@property (nonatomic, retain)\
    \ IBOutlet UITextView *serialView;\n\n- (IBAction)sendString:(id)sender;\n\n@end\n\
    ```\n\nThen, in the corresponding `SerialConsoleViewController.m` implementation\
    \ file, uncomment the `viewDidLoad` method and add the following highlighted lines:\n\
    \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    rscMgr = [[RscMgr\
    \ alloc] init];\n    [rscMgr setDelegate:self];\n}\n```"
