    \ [`my.safaribooksonline.com`](http://my.safaribooksonline.com)。\n\n# 如何联系我们\n\
    \n请将与本书相关的评论和问题发送给出版商：\n\nO’Reilly Media, Inc.  \n1005 Gravenstein Highway North\
    \  \nSebastopol, CA 95472  \n800-998-9938（美国或加拿大）  \n707-829-0515（国际或本地）  \n707-829-0104（传真）\n\
    \n我们为本书设立了一个网页，其中列出了勘误、示例以及任何补充信息。您可以通过以下网址访问该页面：\n\n[`oreilly.com/catalog/9781449308483`](http://oreilly.com/catalog/9781449308483)\n\
    \n补充材料也可在以下网址获取：\n\n[`www.programmingiphonesensors.com/`](http://www.programmingiphonesensors.com/)\n\
    \n若要就本书发表评论或提出技术问题，请发送电子邮件至：\n\nbookquestions@oreilly.com\n\n有关我们的书籍、会议、资源中心以及\
    \ O’Reilly Network 的更多信息，请访问我们的网站：\n\n[`www.oreilly.com`](http://www.oreilly.com)\n\
    \n# 第 1 章 Arduino 简介\n\n每隔一段时间，总会有一种技术成为撬动世界的杠杆，哪怕只是微小的改变。Arduino 就是这样的杠杆之一。尽管它最初只是一个让艺术家能够使用嵌入式微处理器进行交互设计项目的工具，但我认为它最终会作为现代世界的基石之一走进博物馆。它让嵌入式系统的原型开发变得快速而廉价，将曾经相当棘手的硬件问题转化为更简单的软件问题。\n\
    \nArduino，以及与之共同成长并某种程度上围绕其发展的开源硬件运动，正在让一代高科技爱好者能够凭借相当有限的硬件知识构思新想法并制作原型。\n\n#\
    \ Arduino 平台\n\n尽管市面上有许多其他微控制器平台，但对于物理计算领域的新手来说，最易上手的可能还是 Arduino（见图 1-1）。这部分归功于其庞大的社区支持，同时，Arduino\
    \ 从一开始就是为新手易于使用而设计的。\n\n![搭载 ATmega328 微控制器的 Arduino Uno 板](img/httpatomoreillycomsourceoreillyimages895842.png.jpg)\n\
    \n图 1-1. 搭载 ATmega328 微控制器的 Arduino Uno 板\n\n当前版本的 Arduino 板被称为 Arduino Uno。该板基于\
    \ ATmega328 微控制器。它有 14 个数字输入/输出引脚，其中 6 个可用作脉冲宽度调制 (PWM) 输出，以及 6 个额外的模拟输入引脚。详见表\
    \ 1-1。\n\n表 1-1. Arduino Uno 板的技术规格\n\n| Arduino Uno |\n| --- |\n| 微控制器 | ATmega328\
    \ |\n| 工作电压 | 5 V |\n| 输入电压（推荐） | 7–12 V |\n| 输入电压（极限） | 6–20 V |\n| 数字 I/O 引脚\
    \ | 14（其中 6 个提供 PWM） |\n| 模拟输入引脚 | 6 |\n| 每个 I/O 引脚的直流电流 | 40 mA |\n| 3.3 V 引脚的直流电流\
    \ | 50 mA |\n| 闪存 | 32 KB |\n| SRAM | 2 KB |\n| EEPROM | 1 KB |\n| 时钟速度 | 16 MHz\
    \ |\n\nArduino 平台拥有支持板载微控制器所需的一切。它通过 USB 连接直接连接到您的 Mac 进行编程，并且可以通过同一 USB 连接或外部电源供电——如果您在编程后希望将板与\
    \ Mac 断开连接的话。\n\n### 注意\n\n为简洁起见，本教程假设您使用的是较新的 Arduino 板，例如 Arduino Uno、Duemilanove\
    \ 或 Diecimila。但是，如果您使用的是较旧版本的板或众多 Arduino 兼容克隆板，则很可能只需进行少量修改。请参阅 [`arduino.cc/en/Main/Hardware`](http://arduino.cc/en/Main/Hardware)\
    \ 获取针对其他各种电路板的入门指南链接。\n\n## 为电路板供电\n\nArduino Uno 可以通过 USB 连接或外部电源供电。与之前的 Arduino\
    \ 版本不同，电源是自动选择的。如果您使用的是早期型号，则必须使用电路板上的跳线手动在 USB 和外部电源之间切换。该跳线通常位于 USB 接口和电源接口之间。\n\
    \n该电路板可在 6 至 20 伏的外部电源下工作。最简单的选择是使用 9V 电池或电源适配器，因为这些是常见的。\n\n## 输入与输出\n\nUno 上的\
    \ 14 个引脚中的每一个都可用作输入或输出。它们在 5 V 电压下工作，最大电流为 40 mA。每个引脚还有一个 20–50 kOhm 的内部上拉电阻，但默认情况下是断开的。\n\
    \n### 注意\n\n某些引脚具有专门功能。其中对我们本书最重要的可能是引脚 0 和 1。这些引脚可用于接收 (RX) 和发送 (TX) TTL 串行数据。这些引脚连接到\
    \ ATmega8U2 的相应引脚，进而连接到与 Mac 的 USB-串口连接。\n\n## 与电路板通信\n\nATmega328 在 5 V 下提供 UART\
    \ TTL 串行通信，该通信在数字引脚 0 (RX) 和 1 (TX) 上可用。Arduino Uno 板上有一个 ATmega8U2 芯片，可将此串行通信重定向到\
    \ USB，使 Arduino 在 Mac 上的软件看来如同一个虚拟串行端口。如果您使用的是较旧的电路板，例如 Duemilanove 或 Diecimila，这些板使用\
    \ FTDI USB 转串行驱动芯片来完成相同的任务，但与较新的 Uno 板不同，您需要安装驱动程序以便您的 Mac 能够正确识别该板。\n\n## 安装软件\n\
    \n从 [Arduino.cc 网站](http://www.arduino.cc/) 下载最新版本的开发环境。\n\n### 注意\n\n最新版本的 Arduino\
    \ 开发环境可在 [`arduino.cc/en/Main/Software`](http://arduino.cc/en/Main/Software) 获取。在撰写本文时，版本为\
    \ Arduino 022。\n\n与大多数 Mac 应用程序一样，开发环境以磁盘映像（`*.dmg` 文件）形式提供，下载后通常会自动挂载。如果没有，请双击手动打开。打开后，只需将\
    \ `Arduino.app` 应用程序拖拽到您的 `/Applications` 文件夹中。如果您使用的是需要安装 FTDI USB 转串行驱动程序的较旧电路板，还应双击磁盘映像中包含的\
    \ `FTDIUSBSerialDriver.mpkg` 文件以安装必要的驱动程序。\n\n安装完开发环境后，将其拖入废纸篓以推出磁盘映像，然后双击 `Arduino.app`\
    \ 应用程序图标启动 IDE。您应该会看到类似图 1-2 的画面。\n\n![开发环境](img/httpatomoreillycomsourceoreillyimages895844.png)\n\
    \n图 1-2. 开发环境\n"
- fmt: "# Connecting to the Board\n\nConnect the Arduino to your Mac with an appropriate\
    \ USB cable. In the case of an Arduino Uno, Duemilanove, or Diecimila, you’ll\
    \ need a USB-A (Mac) to USB-B (Arduino) cable, the same sort needed for most USB\
    \ printers. The green power LED (labeled `PWR`) should go on, and if you’re using\
    \ the Arduino Uno, a dialog box will appear telling you that a new network interface\
    \ has been detected. Just hit the Apply button. While the new interface will claim\
    \ to be “Not Configured” if you inspect it in System Preferences, it is working\
    \ correctly.\n\nAfter connecting your board to your Mac, go to the Tools→Board\
    \ menu item in the Arduino development environment and select your board from\
    \ the list of supported boards in the drop-down menu (see [Figure 1-3](#ch01.html#selecting_the_correct_board_type\
    \ \"Figure 1-3. Selecting the correct board type\")).\n\n![Selecting the correct\
    \ board type](httpatomoreillycomsourceoreillyimages895846.png.jpg)\n\nFigure 1-3. Selecting\
    \ the correct board type\n\nThen go to the Tools→Serial Port menu and select the\
    \ correct serial port for your board (see [Figure 1-4](#ch01.html#choosing_the_correct_serial_port\
    \ \"Figure 1-4. Choosing the correct serial port\")). On the Mac, the name will\
    \ start with `/dev/tty.usbmodem` for the Uno or `/dev/tty.usbserial` for older\
    \ boards.\n\n![Choosing the correct serial port](httpatomoreillycomsourceoreillyimages895848.png)\n\
    \nFigure 1-4. Choosing the correct serial port\n\nIf you’re unsure which serial\
    \ port corresponds to your board, you can always unplug and then replug the USB\
    \ cable connecting your Mac to the Arduino board to see how the menu changes.\n\
    \n# Blinking an LED\n\nNow that we have our Arduino connected to our Mac, let’s\
    \ go ahead and walk through the hardware equivalent of “Hello World,” the blinking\
    \ LED.\n\n### Note\n\nAn Arduino program is normally referred to as a *sketch*.\n\
    \nThere are a number of example sketches included in the development environment.\
    \ The one we’re looking for can be found by selecting File→Examples→1.Basics→Blink.\
    \ The example sketch will open in a new window; see [Figure 1-5](#ch01s02.html#the_blink_example\
    \ \"Figure 1-5. The Blink example\").\n\n![The Blink example](httpatomoreillycomsourceoreillyimages895850.png)\n\
    \nFigure 1-5. The Blink example\n\nEvery Arduino sketch consists of two parts:\
    \ the setup and the loop. Every time the board is powered up or the board’s reset\
    \ button is pushed, the `setup()` routine is run. After that finishes, the board\
    \ runs the loop routine. When that completes, and perhaps somewhat predictably,\
    \ the `loop()` is run again and again. Effectively the contents of the `loop()`\
    \ sit inside an infinite `while` loop.\n\nBefore we go ahead and build and deploy\
    \ this example to our Arduino, let’s take a look at the code:\n\n```\nvoid setup()\
    \ {\n  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n \
    \ delay(1000);\n  digitalWrite(13, LOW);\n  delay(1000);\n}\n```\n\n[![1](callouts/1.png)](#ch01s02.html#co1_id)\n\
    \nArduino pins default to INPUT. However, here we set pin 13 to behave as an OUTPUT\
    \ pin. In this state, the pin can provide up to 40 mA of current to other devices.\
    \ This is enough current to brightly light up an LED or run many sensors, but\
    \ not enough current to run most relays, solenoids, or motors. See [http://arduino.cc/en/Tutorial/DigitalPins](http://arduino.cc/en/Tutorial/DigitalPins).\n\
    \n[![2](callouts/2.png)](#ch01s02.html#co2_id)\n\nIf the pin has been configured\
    \ for OUTPUT, its voltage will be set to the corresponding value: 5 V for HIGH,\
    \ 0 V (ground) for LOW.\n\nEffectively, then, this piece of code causes the voltage\
    \ on pin 13 to be brought `HIGH` for a second (1,000 ms) and then `LOW` for a\
    \ further second before the loop starts again, bringing the voltage `HIGH` once\
    \ more.\n\nAs I mentioned before, some of the digital pins on the Arduino board\
    \ are specialized; pin 13 is one of these. On most boards (including the Uno),\
    \ it has an LED and resistor attached to it that’s soldered onto the board itself.\
    \ Therefore, the effect of this sketch will be to turn the embedded LED on and\
    \ off with a periodicity of 1 second.\n\nWhile there is already a built-in LED\
    \ on the board, this will look more impressive if we add a “real” LED as well.\
    \ While any LED will do, LEDs are directional components and must not be inserted\
    \ backward. Look carefully at the two legs of the LED; one should be shorter than\
    \ the other. The shorter leg corresponds to the ground, while the longer leg is\
    \ the positive.\n\nInsert the short leg into the GND pin, and the longer leg into\
    \ pin 13, as shown in [Figure 1-6](#ch01s02.html#an_led_connected_to_pin_13_comma_the_sho\
    \ \"Figure 1-6. An LED connected to pin 13; the short leg is inserted into the\
    \ GND pin\").\n\n![An LED connected to pin 13; the short leg is inserted into\
    \ the GND pin](httpatomoreillycomsourceoreillyimages895852.png.jpg)\n\nFigure 1-6. An\
    \ LED connected to pin 13; the short leg is inserted into the GND pin\n\n## Uploading\
    \ the Sketch\n\nThe first step of getting the sketch ready for transfer to the\
    \ Arduino is to click on the Verify/Compile button (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    )). This will compile your code, checking it for errors, and then translate your\
    \ program into something that is compatible with the Arduino architecture. After\
    \ a few seconds, you should see the message “Done compiling” in the status bar\
    \ and something along the lines of “Binary sketch size: 1018 bytes (of a 32256\
    \ byte maximum)” in the Notification area.\n\nOnce you see that message, go ahead\
    \ and click on the Upload button (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again). This will initiate the transfer of the compiled code to the board via\
    \ the USB connection.\n\nWait a few seconds; you should see the RX and TX LEDs\
    \ on the board flashing as the data is transferred over the serial connection\
    \ from your Mac to the board. If the upload is successful, the message “Done uploading”\
    \ will appear in the status bar.\n\nA few seconds after the upload finishes, you\
    \ should see the pin 13 LED on the board (labeled L on the PCB) start to blink\
    \ (in orange), along with the LED we inserted into pin 13. One second on, one\
    \ second off. If you see that, congratulations, you’ve just successfully got the\
    \ hardware equivalent to “Hello World” to compile and run on the Arduino board.\n\
    \n![The Arduino development environment with various controls highlighted](httpatomoreillycomsourceoreillyimages895854.png.jpg)\n\
    \nFigure 1-7. The Arduino development environment with various controls highlighted"
  raw: "## Connecting to the Board\n\nConnect the Arduino to your Mac with an appropriate\
    \ USB cable. In the case of an Arduino Uno, Duemilanove, or Diecimila, you’ll\
    \ need a USB-A (Mac) to USB-B (Arduino) cable, the same sort needed for most USB\
    \ printers. The green power LED (labeled `PWR`) should go on, and if you’re using\
    \ the Arduino Uno, a dialog box will appear telling you that a new network interface\
    \ has been detected. Just hit the Apply button. While the new interface will claim\
    \ to be “Not Configured” if you inspect it in System Preferences, it is working\
    \ correctly.\n\nAfter connecting your board to your Mac, go to the Tools→Board\
    \ menu item in the Arduino development environment and select your board from\
    \ the list of supported boards in the drop-down menu (see [Figure 1-3](#ch01.html#selecting_the_correct_board_type\
    \ \"Figure 1-3. Selecting the correct board type\")).\n\n![Selecting the correct\
    \ board type](httpatomoreillycomsourceoreillyimages895846.png.jpg)\n\nFigure 1-3. Selecting\
    \ the correct board type\n\nThen go to the Tools→Serial Port menu and select the\
    \ correct serial port for your board (see [Figure 1-4](#ch01.html#choosing_the_correct_serial_port\
    \ \"Figure 1-4. Choosing the correct serial port\")). On the Mac, the name will\
    \ start with */dev/tty.usbmodem* for the Uno or */dev/tty.usbserial* for older\
    \ boards.\n\n![Choosing the correct serial port](httpatomoreillycomsourceoreillyimages895848.png)\n\
    \nFigure 1-4. Choosing the correct serial port\n\nIf you’re unsure which serial\
    \ port corresponds to your board, you can always unplug and then replug the USB\
    \ cable connecting your Mac to the Arduino board to see how the menu changes.\n\
    \n# Blinking an LED\n\nNow that we have our Arduino connected to our Mac, let’s\
    \ go ahead and walk through the hardware equivalent of “Hello World,” the blinking\
    \ LED.\n\n### Note\n\nAn Arduino program is normally referred to as a *sketch*.\n\
    \nThere are a number of example sketches included in the development environment.\
    \ The one we’re looking for can be found by selecting File→Examples→1.Basics→Blink.\
    \ The example sketch will open in a new window; see [Figure 1-5](#ch01s02.html#the_blink_example\
    \ \"Figure 1-5. The Blink example\").\n\n![The Blink example](httpatomoreillycomsourceoreillyimages895850.png)\n\
    \nFigure 1-5. The Blink example\n\nEvery Arduino sketch consists of two parts:\
    \ the setup and the loop. Every time the board is powered up or the board’s reset\
    \ button is pushed, the `setup()` routine is run. After that finishes, the board\
    \ runs the loop routine. When that completes, and perhaps somewhat predictably,\
    \ the `loop()` is run again and again. Effectively the contents of the `loop()`\
    \ sit inside an infinite `while` loop.\n\nBefore we go ahead and build and deploy\
    \ this example to our Arduino, let’s take a look at the code:\n\n```\nvoid setup()\
    \ {\n  pinMode(13, OUTPUT);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n \
    \ delay(1000);\n  digitalWrite(13, LOW);\n  delay(1000);\n}\n```\n\n[![1](callouts/1.png)](#ch01s02.html#co1_id)\n\
    \nArduino pins default to INPUT. However, here we set pin 13 to behave as an OUTPUT\
    \ pin. In this state, the pin can provide up to 40 mA of current to other devices.\
    \ This is enough current to brightly light up an LED or run many sensors, but\
    \ not enough current to run most relays, solenoids, or motors. See [http://arduino.cc/en/Tutorial/DigitalPins](http://arduino.cc/en/Tutorial/DigitalPins).\n\
    \n[![2](callouts/2.png)](#ch01s02.html#co2_id)\n\nIf the pin has been configured\
    \ for OUTPUT, its voltage will be set to the corresponding value: 5 V for HIGH,\
    \ 0 V (ground) for LOW.\n\nEffectively, then, this piece of code causes the voltage\
    \ on pin 13 to be brought `HIGH` for a second (1,000 ms) and then `LOW` for a\
    \ further second before the loop starts again, bringing the voltage `HIGH` once\
    \ more.\n\nAs I mentioned before, some of the digital pins on the Arduino board\
    \ are specialized; pin 13 is one of these. On most boards (including the Uno),\
    \ it has an LED and resistor attached to it that’s soldered onto the board itself.\
    \ Therefore, the effect of this sketch will be to turn the embedded LED on and\
    \ off with a periodicity of 1 second.\n\nWhile there is already a built-in LED\
    \ on the board, this will look more impressive if we add a “real” LED as well.\
    \ While any LED will do, LEDs are directional components and must not be inserted\
    \ backward. Look carefully at the two legs of the LED; one should be shorter than\
    \ the other. The shorter leg corresponds to the ground, while the longer leg is\
    \ the positive.\n\nInsert the short leg into the GND pin, and the longer leg into\
    \ pin 13, as shown in [Figure 1-6](#ch01s02.html#an_led_connected_to_pin_13_comma_the_sho\
    \ \"Figure 1-6. An LED connected to pin 13; the short leg is inserted into the\
    \ GND pin\").\n\n![An LED connected to pin 13; the short leg is inserted into\
    \ the GND pin](httpatomoreillycomsourceoreillyimages895852.png.jpg)\n\nFigure 1-6. An\
    \ LED connected to pin 13; the short leg is inserted into the GND pin\n\n## Uploading\
    \ the Sketch\n\nThe first step of getting the sketch ready for transfer to the\
    \ Arduino is to click on the Verify/Compile button (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    )). This will compile your code, checking it for errors, and then translate your\
    \ program into something that is compatible with the Arduino architecture. After\
    \ a few seconds, you should see the message “Done compiling” in the status bar\
    \ and something along the lines of “Binary sketch size: 1018 bytes (of a 32256\
    \ byte maximum)” in the Notification area.\n\nOnce you see that message, go ahead\
    \ and click on the Upload button (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again). This will initiate the transfer of the compiled code to the board via\
    \ the USB connection.\n\nWait a few seconds; you should see the RX and TX LEDs\
    \ on the board flashing as the data is transferred over the serial connection\
    \ from your Mac to the board. If the upload is successful, the message “Done uploading”\
    \ will appear in the status bar.\n\nA few seconds after the upload finishes, you\
    \ should see the pin 13 LED on the board (labeled L on the PCB) start to blink\
    \ (in orange), along with the LED we inserted into pin 13\\. One second on, one\
    \ second off. If you see that, congratulations, you’ve just successfully got the\
    \ hardware equivalent to “Hello World” to compile and run on the Arduino board.\n\
    \n![The Arduino development environment with various controls highlighted](httpatomoreillycomsourceoreillyimages895854.png.jpg)\n\
    \nFigure 1-7. The Arduino development environment with various controls highlighted"
  trans: "\n# 连接开发板\n\n使用合适的 USB 线将 Arduino 连接到 Mac。对于 Arduino Uno、Duemilanove 或 Diecimila\
    \ 型号，你需要一根 USB-A（Mac 端）转 USB-B（Arduino 端）的线缆，这与大多数 USB 打印机所需的线缆相同。绿色电源 LED（标有`PWR`字样）应会亮起；如果你使用的是\
    \ Arduino Uno，还会弹出一个对话框，提示检测到了一个新的网络接口。只需点击“应用”按钮即可。如果你在“系统偏好设置”中检查这个新接口，虽然它会显示为“未配置”，但实际工作正常。\n\
    \n将开发板连接到 Mac 后，在 Arduino 开发环境中打开“工具”→“开发板”菜单项，并从下拉菜单支持的开发板列表中选择你的开发板（参见图 1-3）。\n\
    \n![选择正确的开发板类型](img/httpatomoreillycomsourceoreillyimages895846.png.jpg)\n\n图\
    \ 1-3. 选择正确的开发板类型\n\n然后进入“工具”→“串口”菜单，为你的开发板选择正确的串口（参见图 1-4）。在 Mac 上，Uno 的名称以`/dev/tty.usbmodem`开头，而旧版开发板的名称则以`/dev/tty.usbserial`开头。\n\
    \n![选择正确的串口](img/httpatomoreillycomsourceoreillyimages895848.png)\n\n图 1-4. 选择正确的串口\n\
    \n如果你不确定哪个串口对应你的开发板，可以拔掉再重新插入连接 Mac 和 Arduino 的 USB 线，观察菜单的变化。\n\n# 点亮 LED\n\n\
    现在我们已经将 Arduino 连接到 Mac，接下来让我们一起完成硬件版的“Hello World”程序——点亮 LED。\n\n### 备注\n\nArduino\
    \ 程序通常被称为*草图*。\n\n开发环境中包含许多示例草图。我们所需要的一个可以通过选择“文件”→“示例”→“1.Basics”→“Blink”找到。示例草图会以新窗口打开，参见图\
    \ 1-5。\n\n![Blink 示例](img/httpatomoreillycomsourceoreillyimages895850.png)\n\n\
    图 1-5. Blink 示例\n\n每个 Arduino 草图都由两部分组成：初始化部分和循环部分。每次开发板上电或按下复位按钮时，都会运行`setup()`函数。该函数执行完毕后，开发板会运行循环函数。循环函数执行完毕后，`loop()`函数会一遍又一遍地重复运行。实际上，`loop()`函数的内容位于一个无限`while`循环之内。\n\
    \n在我们继续构建并将此示例部署到 Arduino 之前，先来看一下代码：\n\n```\nvoid setup() {\n  pinMode(13, OUTPUT);\n\
    }\n\nvoid loop() {\n  digitalWrite(13, HIGH);\n  delay(1000);\n  digitalWrite(13,\
    \ LOW);\n  delay(1000);\n}\n```\n\n![1](img/#ch01s02.html#co1_id)\n\nArduino 引脚默认为输入模式。但在这里，我们将引脚\
    \ 13 设置为输出引脚。在此状态下，该引脚可向其他设备提供高达 40 mA 的电流。这足以点亮 LED 或驱动许多传感器，但不足以驱动大多数继电器、电磁阀或电机。请参见\
    \ [`arduino.cc/en/Tutorial/DigitalPins`](http://arduino.cc/en/Tutorial/DigitalPins)。\n\
    \n![2](img/#ch01s02.html#co2_id)\n\n如果引脚已配置为输出模式，其电压将设置为相应值：HIGH 对应 5V，LOW 对应\
    \ 0V（接地）。\n\n因此，这段代码实际上会使引脚 13 的电压变为 `HIGH` 一秒钟（1000 毫秒），然后变为 `LOW` 再持续一秒，之后循环重新开始，电压再次变为\
    \ `HIGH`。\n\n正如我之前提到的，Arduino 开发板上的某些数字引脚是专用的；引脚 13 就是其中之一。在大多数开发板（包括 Uno）上，都焊接了一个\
    \ LED 和电阻连接到该引脚。因此，这个草图的效果就是让板载 LED 以 1 秒的周期亮灭。\n\n虽然开发板上已经有一个内置 LED，但如果我们再添加一个“真正的”LED，效果会更令人印象深刻。任何\
    \ LED 都可以使用，但 LED 是方向性元件，不能插反。仔细看 LED 的两个引脚，其中一根应该比另一根短。较短的引脚对应接地，较长的引脚为正极。\n\n\
    将短引脚插入 GND 引脚，长引脚插入引脚 13，如图 1-6  所示。\n\n![LED 连接到引脚 13；短引脚插入 GND 引脚](img/httpatomoreillycomsourceoreillyimages895852.png.jpg)\n\
    \n图 1-6. LED 连接到引脚 13；短引脚插入 GND 引脚\n\n## 上传草图\n\n准备将草图传输到 Arduino 的第一步是点击“验证/编译”按钮（参见图\
    \ 1-7）。这将编译你的代码，检查错误，然后将程序转换为与 Arduino 架构兼容的格式。几秒钟后，你应该会在状态栏看到“编译完成”的消息，并在通知区域看到类似“二进制草图大小：1018\
    \ 字节（最大 32256 字节）”的信息。\n\n看到该消息后，继续点击“上传”按钮（再次参见图 1-7）。这将启动通过 USB 连接将编译后的代码传输到开发板的过程。\n\
    \n等待几秒钟；你应该会看到开发板上的 RX 和 TX LED 在数据通过串口连接从 Mac 传输到开发板时闪烁。如果上传成功，状态栏将显示“上传完成”的消息。\n\
    \n上传完成后几秒钟，你应该会看到开发板上的引脚 13 LED（PCB 上标有 L）开始（以橙色）闪烁，同时我们插入引脚 13 的 LED 也会闪烁。亮一秒，灭一秒。如果你看到了这种效果，恭喜你，你已经成功地在\
    \ Arduino 开发板上编译并运行了硬件版的“Hello World”程序。\n\n![高亮显示各种控件的 Arduino 开发环境](img/httpatomoreillycomsourceoreillyimages895854.png.jpg)\n\
    \n图 1-7. 高亮显示各种控件的 Arduino 开发环境\n"
- fmt: "# Making a Serial Connection\n\nNow that we’ve seen how a basic Arduino sketch\
    \ works, let’s move on to sending and receiving data from the Arduino board. We’ll\
    \ need to know how to do this because this is how we’ll control the Arduino or\
    \ get sensor readings from it when we connect it to our iOS device. For now, however,\
    \ we’re going to use the Serial Monitor (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again), inside the development environment.\n\nOpen a new sketch by clicking\
    \ `File → New` (`⌘N`) to open a new window:\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    }\n\nvoid loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"\
    Hello world\");\n    delay(300);\n  }\n}\n```\n\n[![1](callouts/1.png)](#ch01s03.html#co3_id)\
    \  \nSets the data rate in bits per second (baud) for serial data transmission.\n\
    \n[![2](callouts/2.png)](#ch01s03.html#co4_id)  \nHere we get the number of bytes\
    \ available for reading from the serial port. If there are no bytes waiting in\
    \ the buffer, we loop until some arrive.\n\n[![3](callouts/3.png)](#ch01s03.html#co5_id)\
    \  \nFinally, here inside the loop we print `\"Hello World\"` to the serial connection.\n\
    \nEffectively this code will send the string `\"Hello World\"` to the serial connection\
    \ every 300 ms until the board receives a byte (character), at which point it\
    \ will stop.\n\nSave the contents of the sketch to a file using the `File → Save`\
    \ (`⌘S`) menu item, and then click on the Verify button to compile your sketch.\
    \ If all goes well, click the Upload button to upload it to the board. You should\
    \ see the RX and TX LEDs light up as the code is transferred. When you see the\
    \ “Done uploading” message in the status bar, click on the Serial Console button\
    \ (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with \"\
    Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again) in the development environment to open the serial console.\n\nDoing so\
    \ will reset the Arduino, at which point you should see the phrase `\"Hello World\"\
    ` appear on the console every 300 ms (see [Figure 1-8](#ch01s03.html#the_arduino_says_lhello_worldr_in_the_se\
    \ \"Figure 1-8. The Arduino says “Hello World” in the serial console\")), accompanied\
    \ by a flash of the TX LED on the Arduino board itself.\n\nEntering a character\
    \ or string in the text entry box and hitting the Send button will transmit those\
    \ characters to the board, at which point the board should stop sending the string\
    \ `\"Hello world\"` to the serial port.\n\nLet’s make that a bit more specific.\
    \ Add the following highlighted lines to your sketch and re-upload it to the Arduino:\n\
    \n```\nvoid setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  while (Serial.available()\
    \ <= 0) {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"\
    Goodbye world\");\n  while(1) { }\n}\n```\n\nThe serial console will close automatically\
    \ when you upload new code to the board, so reopen it and you should see things\
    \ much as before ([Figure 1-8](#ch01s03.html#the_arduino_says_lhello_worldr_in_the_se\
    \ \"Figure 1-8. The Arduino says “Hello World” in the serial console\")). However,\
    \ this time if you send a string to the board you should receive the string `\"\
    Goodbye world\"` back.\n\n![The Arduino says “Hello World” in the serial console](httpatomoreillycomsourceoreillyimages895856.png.jpg)\n\
    \nFigure 1-8. The Arduino says “Hello World” in the serial console\n\n# Summary\n\
    \nIn this chapter we’ve learned how to use the microcontroller to blink an LED,\
    \ and then how to get messages from, and send messages to, the board from our\
    \ Mac. While we will be dealing with sensors later, you can actually work through\
    \ a fair number of the code examples in this book with just the bare Arduino board,\
    \ a USB cable, an LED, and the Redpark Serial Cable and RS-232 to TTL serial converter.\n\
    \n# Chapter 2. Connecting the iPhone to the Arduino\n\nThe arrival of the External\
    \ Accessory framework with iOS 3 was seen, initially at least, as having the potential\
    \ to open the iOS platform up to a host of external accessories and additional\
    \ sensors. Sadly, little of the innovation people were expecting actually occurred,\
    \ and while there are finally starting to be some interesting products arriving\
    \ on the market, for the most part the External Accessory framework is being used\
    \ to support a fairly predictable range of audio and video accessories from big-name\
    \ manufacturers.\n\n# The Apple MFi Program\n\nThe reason for this lack of innovation\
    \ is usually laid at the feet of Apple’s Made for iPod (MFi) licensing program.\
    \ The MFi Program is entirely separate from the Apple Developer Program. Being\
    \ a registered Apple Developer or a member of the iOS Developer Program does not\
    \ automatically admit you to the MFi Program. However, to develop hardware accessories\
    \ that connect to the iPod, iPhone, or iPad, you must be an MFi licensee.\n\n\
    ### Note\n\nIf you are interested in developing your own hardware, more information\
    \ about the MFi licensing program can be found at [http://developer.apple.com/programs/mfi/](http://developer.apple.com/programs/mfi/).\
    \ Licensed developers gain access to technical documentation, hardware components,\
    \ and technical support that will allow them to build external hardware that can\
    \ connect to the iPod, iPhone, or iPad.\n\nUnfortunately, becoming a member of\
    \ the MFi program is not as simple as signing up as an Apple Developer, and it\
    \ is a fairly lengthy process. From personal experience I can confirm that the\
    \ process of becoming an MFi licensee is not for the faint-hearted. And once you’re\
    \ a member of the program, getting your hardware out of prototype stage and approved\
    \ by Apple for distribution and sale is not necessarily a simple process.\n\n\
    # The Redpark Serial Cable\n\nUntil recently, the restrictions placed on developers\
    \ by the existence of the MFi program meant that if you were an independent developer,\
    \ or even a small company, you probably couldn’t get access to the documentation\
    \ and components you needed to connect your iOS device to an arbitrary piece of\
    \ existing hardware.\n\nSince many of those pieces of existing hardware have serial\
    \ (RS-232) interfaces, the arrival of the Redpark Serial Cable makes connecting\
    \ to such hardware fairly easy. The cable arrives in a plain white box; inside\
    \ is the cable itself (Apple Dock Connector to male 9-pin RS-232 serial) and a\
    \ loopback test adaptor that allows you to test the cable (see [Figure 2-1](#ch02s02.html#the_redpark_serial_cable_open_parenthesi\
    \ \"Figure 2-1. The Redpark Serial Cable (left) and loopback adaptor (right)\"\
    )).\n\n![The Redpark Serial Cable (left) and loopback adaptor (right)](httpatomoreillycomsourceoreillyimages895858.png.jpg)\n\
    \nFigure 2-1. The Redpark Serial Cable (left) and loopback adaptor (right)\n\n\
    The Redpark cable is available in the Maker Shed as the [“Redpark iPhone Breakout\
    \ Pack for Arduino”](https://www.makershed.com/ProductDetails.asp?ProductCode=MSRP02)\
    \ or [directly from the manufacturer](http://www.redpark.com/c2db9.html).\n\n\
    ### Note\n\nThe Redpark Serial Cable SDK comes as a `*.dmg*` file. You can download\
    \ the latest version of the SDK from [http://www.redpark.com/c2db9_Downloads.html](http://www.redpark.com/c2db9_Downloads.html)."
  raw: "# Making a Serial Connection\n\nNow that we’ve seen how a basic Arduino sketch\
    \ works, let’s move on to sending and receiving data from the Arduino board. We’ll\
    \ need to know how to do this because this is how we’ll control the Arduino or\
    \ get sensor readings from it when we connect it to our iOS device. For now, however,\
    \ we’re going to use the Serial Monitor (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with\
    \ \"Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again), inside the development environment.\n\nOpen a new sketch by clicking\
    \ File→New (⌘N) to open a new window:\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    }\n\nvoid loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"\
    Hello world\");\n    delay(300);\n  }\n}\n```\n\n[![1](callouts/1.png)](#ch01s03.html#co3_id)\n\
    \nSets the data rate in bits per second (baud) for serial data transmission.\n\
    \n[![2](callouts/2.png)](#ch01s03.html#co4_id)\n\nHere we get the number of bytes\
    \ available for reading from the serial port. If there are no bytes waiting in\
    \ the buffer, we loop until some arrive.\n\n[![3](callouts/3.png)](#ch01s03.html#co5_id)\n\
    \nFinally, here inside the loop we print “Hello World” to the serial connection.\n\
    \nEffectively this code will send the string “Hello World” to the serial connection\
    \ every 300 ms until the board receives a byte (character), at which point it\
    \ will stop.\n\nSave the contents of the sketch to a file using the File→Save\
    \ (⌘S) menu item, and then click on the Verify button to compile your sketch.\
    \ If all goes well, click the Upload button to upload it to the board. You should\
    \ see the RX and TX LEDs light up as the code is transferred. When you see the\
    \ “Done uploading” message in the status bar, click on the Serial Console button\
    \ (see [Figure 1-7](#ch01s02.html#the_arduino_development_environment_with \"\
    Figure 1-7. The Arduino development environment with various controls highlighted\"\
    ) again) in the development environment to open the serial console.\n\nDoing so\
    \ will reset the Arduino, at which point you should see the phrase “Hello World”\
    \ appear on the console every 300 ms (see [Figure 1-8](#ch01s03.html#the_arduino_says_lhello_worldr_in_the_se\
    \ \"Figure 1-8. The Arduino says “Hello World” in the serial console\")), accompanied\
    \ by a flash of the TX LED on the Arduino board itself.\n\nEntering a character\
    \ or string in the text entry box and hitting the Send button will transmit those\
    \ characters to the board, at which point the board should stop sending the string\
    \ “Hello world” to the serial port.\n\nLet’s make that a bit more specific. Add\
    \ the following highlighted lines to your sketch and re-upload it to the Arduino:\n\
    \n```\nvoid setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  while (Serial.available()\
    \ <= 0) {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"\
    Goodbye world\");\n  while(1) { }\n}\n```\n\nThe serial console will close automatically\
    \ when you upload new code to the board, so reopen it and you should see things\
    \ much as before ([Figure 1-8](#ch01s03.html#the_arduino_says_lhello_worldr_in_the_se\
    \ \"Figure 1-8. The Arduino says “Hello World” in the serial console\")). However,\
    \ this time if you send a string to the board you should receive the string “Goodbye\
    \ world” back.\n\n![The Arduino says “Hello World” in the serial console](httpatomoreillycomsourceoreillyimages895856.png.jpg)\n\
    \nFigure 1-8. The Arduino says “Hello World” in the serial console\n\n# Summary\n\
    \nIn this chapter we’ve learned how to use the microcontroller to blink an LED,\
    \ and then how to get messages from, and send messages to, the board from our\
    \ Mac. While we will be dealing with sensors later, you can actually work through\
    \ a fair number of the code examples in this book with just the bare Arduino board,\
    \ a USB cable, an LED, and the Redpark Serial Cable and RS-232 to TTL serial converter.\n\
    \n# Chapter 2. Connecting the iPhone to the Arduino\n\nThe arrival of the External\
    \ Accessory framework with iOS 3 was seen, initially at least, as having the potential\
    \ to open the iOS platform up to a host of external accessories and additional\
    \ sensors. Sadly, little of the innovation people were expecting actually occurred,\
    \ and while there are finally starting to be some interesting products arriving\
    \ on the market, for the most part the External Accessory framework is being used\
    \ to support a fairly predictable range of audio and video accessories from big-name\
    \ manufacturers.\n\n# The Apple MFi Program\n\nThe reason for this lack of innovation\
    \ is usually laid at the feet of Apple’s Made for iPod (MFi) licensing program.\
    \ The MFi Program is entirely separate from the Apple Developer Program. Being\
    \ a registered Apple Developer or a member of the iOS Developer Program does not\
    \ automatically admit you to the MFi Program. However, to develop hardware accessories\
    \ that connect to the iPod, iPhone, or iPad, you must be an MFi licensee.\n\n\
    ### Note\n\nIf you are interested in developing your own hardware, more information\
    \ about the MFi licensing program can be found at [http://developer.apple.com/programs/mfi/](http://developer.apple.com/programs/mfi/).\
    \ Licensed developers gain access to technical documentation, hardware components,\
    \ and technical support that will allow them to build external hardware that can\
    \ connect to the iPod, iPhone, or iPad.\n\nUnfortunately, becoming a member of\
    \ the MFi program is not as simple as signing up as an Apple Developer, and it\
    \ is a fairly lengthy process. From personal experience I can confirm that the\
    \ process of becoming an MFi licensee is not for the faint-hearted. And once you’re\
    \ a member of the program, getting your hardware out of prototype stage and approved\
    \ by Apple for distribution and sale is not necessarily a simple process.\n\n\
    # The Redpark Serial Cable\n\nUntil recently, the restrictions placed on developers\
    \ by the existence of the MFi program meant that if you were an independent developer,\
    \ or even a small company, you probably couldn’t get access to the documentation\
    \ and components you needed to connect your iOS device to an arbitrary piece of\
    \ existing hardware.\n\nSince many of those pieces of existing hardware have serial\
    \ (RS-232) interfaces, the arrival of the Redpark Serial Cable makes connecting\
    \ to such hardware fairly easy. The cable arrives in a plain white box; inside\
    \ is the cable itself (Apple Dock Connector to male 9-pin RS-232 serial) and a\
    \ loopback test adaptor that allows you to test the cable (see [Figure 2-1](#ch02s02.html#the_redpark_serial_cable_open_parenthesi\
    \ \"Figure 2-1. The Redpark Serial Cable (left) and loopback adaptor (right)\"\
    )).\n\n![The Redpark Serial Cable (left) and loopback adaptor (right)](httpatomoreillycomsourceoreillyimages895858.png.jpg)\n\
    \nFigure 2-1. The Redpark Serial Cable (left) and loopback adaptor (right)\n\n\
    The Redpark cable is available in the Maker Shed as the [“Redpark iPhone Breakout\
    \ Pack for Arduino”](https://www.makershed.com/ProductDetails.asp?ProductCode=MSRP02)\
    \ or [directly from the manufacturer](http://www.redpark.com/c2db9.html).\n\n\
    ### Note\n\nThe Redpark Serial Cable SDK comes as a *.dmg* file. You can download\
    \ the latest version of the SDK from [http://www.redpark.com/c2db9_Downloads.html](http://www.redpark.com/c2db9_Downloads.html)."
  trans: "\n# 建立串行连接\n\n既然我们已经了解了基本的 Arduino 程序结构，接下来让我们学习如何从 Arduino 板发送和接收数据。我们需要掌握这项技能，因为当我们把\
    \ Arduino 连接到 iOS 设备时，需要通过它来控制 Arduino 或获取传感器读数。不过现在，我们将在开发环境中使用串行监视器（再次参见图 1-7）。\n\
    \n点击 `File → New` (`⌘N`) 打开一个新窗口，创建新程序：\n\n```\nvoid setup() {\n  Serial.begin(9600);\n\
    }\n\nvoid loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"\
    Hello world\");\n    delay(300);\n  }\n}\n```\n\n![1](img/#ch01s03.html#co3_id)\
    \  \n设置串行数据传输的比特率（波特率）。\n\n![2](img/#ch01s03.html#co4_id)  \n这里我们获取串行端口可读取的字节数。如果缓冲区中没有等待的字节，我们就循环等待，直到接收到数据。\n\
    \n![3](img/#ch01s03.html#co5_id)  \n最后，在循环内部，我们将字符串 `\"Hello World\"` 发送到串行连接。\n\
    \n实际上，这段代码会每隔 300 毫秒向串行连接发送字符串 `\"Hello World\"`，直到 Arduino 板接收到一个字节（字符）为止，此时发送会停止。\n\
    \n使用 `File → Save` (`⌘S`) 菜单项保存程序内容，然后点击“验证”按钮编译程序。如果一切顺利，请点击“上传”按钮将程序上传到开发板。你应该能看到\
    \ RX 和 TX 指示灯在代码传输过程中亮起。当状态栏显示“Done uploading”消息时，点击开发环境中的“串行控制台”按钮（再次参见图 1-7）打开串行控制台。\n\
    \n这样做会重置 Arduino，此时你应该看到短语 `\"Hello World\"` 每隔 300 毫秒在控制台上出现一次（参见图 1-8），同时伴随着\
    \ Arduino 板上 TX LED 的闪烁。\n\n在文本输入框中输入一个字符或字符串，然后点击“发送”按钮，这些字符将被传输到开发板，此时开发板应停止向串行端口发送字符串\
    \ `\"Hello world\"`。\n\n让我们更具体地说明这一点。将以下高亮显示的行添加到程序中，然后重新上传到 Arduino：\n\n```\n\
    void setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  while (Serial.available()\
    \ <= 0) {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"\
    Goodbye world\");\n  while(1) { }\n}\n```\n\n当你向开发板上传新代码时，串行控制台会自动关闭，因此请重新打开它，你应该会看到与之前类似的情况（图\
    \ 1-8）。不过，这次如果你向开发板发送一个字符串，你应该会收到字符串 `\"Goodbye world\"` 作为回复。\n\n![Arduino 在串行控制台显示“Hello\
    \ World”](img/httpatomoreillycomsourceoreillyimages895856.png.jpg)\n\n图 1-8. Arduino\
    \ 在串行控制台显示“Hello World”\n\n# 总结\n\n在本章中，我们学习了如何使用微控制器让 LED 闪烁，以及如何从 Mac 向开发板发送消息和接收消息。虽然我们稍后会处理传感器，但仅凭一块裸\
    \ Arduino 板、一根 USB 线、一个 LED 以及 Redpark 串行电缆和 RS-232 转 TTL 串行转换器，你实际上就能完成本书中的许多代码示例。\n\
    \n# 第 2 章 将 iPhone 连接到 Arduino\n\niOS 3 中引入 External Accessory 框架，最初被视为具有将 iOS\
    \ 平台开放给大量外部配件和额外传感器的潜力。遗憾的是，人们期待的创新几乎没有发生，尽管市场上终于开始出现一些有趣的产品，但大多数情况下，External\
    \ Accessory 框架仍被用于支持来自知名制造商的一批相当可预测的音频和视频配件。\n\n# Apple MFi 计划\n\n造成这种缺乏创新的原因通常归咎于\
    \ Apple 的“Made for iPod”（MFi）许可计划。MFi 计划与 Apple Developer Program 完全独立。成为注册的 Apple\
    \ 开发者或 iOS Developer Program 的成员并不会自动让你加入 MFi 计划。然而，要开发连接 iPod、iPhone 或 iPad 的硬件配件，你必须是\
    \ MFi 的被许可方。\n\n### 注意\n\n如果你有兴趣开发自己的硬件，可以在 [`developer.apple.com/programs/mfi/`](http://developer.apple.com/programs/mfi/)\
    \ 找到更多关于 MFi 许可计划的信息。获得许可的开发者可以访问技术文档、硬件组件和技术支持，从而能够构建连接到 iPod、iPhone 或 iPad 的外部硬件。\n\
    \n不幸的是，加入 MFi 计划并不像注册成为 Apple 开发者那样简单，而且这是一个相当漫长的过程。根据个人经验，我可以确认成为 MFi 被许可方的过程不适合胆小的人。而且一旦你成为该计划的成员，让你的硬件走出原型阶段并得到\
    \ Apple 的批准以进行分发和销售，也未必是一个简单的过程。\n\n# Redpark 串行电缆\n\n直到最近，MFi 计划的存在对开发者施加的限制意味着，如果你是一名独立开发者，甚至是一家小公司，你可能无法获得将\
    \ iOS 设备连接到任意现有硬件所需的文档和组件。\n\n由于许多现有硬件都具有串行（RS-232）接口，Redpark 串行电缆的出现使得连接此类硬件变得相当容易。电缆装在一个简单的白色盒子中；里面是电缆本身（Apple\
    \ Dock 连接器转公头 9 针 RS-232 串行）和一个回环测试适配器，允许你测试电缆（参见图 2-1）。\n\n![Redpark 串行电缆（左）和回环适配器（右）](img/httpatomoreillycomsourceoreillyimages895858.png.jpg)\n\
    \n图 2-1. Redpark 串行电缆（左）和回环适配器（右）\n\nRedpark 电缆可在 Maker Shed 以 [“Redpark iPhone\
    \ Breakout Pack for Arduino”](https://www.makershed.com/ProductDetails.asp?ProductCode=MSRP02)\
    \ 的名称购买，或[直接从制造商处购买](http://www.redpark.com/c2db9.html)。\n\n### 注意\n\nRedpark\
    \ 串行电缆 SDK 以 `*.dmg*` 文件形式提供。你可以从 [`www.redpark.com/c2db9_Downloads.html`](http://www.redpark.com/c2db9_Downloads.html)\
    \ 下载最新版本的 SDK。\n"
- fmt: '# Testing the Cable


    There are two ways to test that your cable works correctly before we go ahead
    and start writing code to use it. First, when the cable is plugged in, there should
    be a new entry in the Settings application; if you go to `General→About→Serial
    Cable`, you should see something like [Figure 2-2](#ch02s02.html#checking_the_cable_in_the_settings_appli
    "Figure 2-2. Checking the cable in the Settings application"). If the cable is
    plugged into your iOS device and you do not see this settings entry, or there
    seems to be something wrong with it, there may be something wrong with your cable.


    ![Checking the cable in the Settings application](httpatomoreillycomsourceoreillyimages895860.png.jpg)


    Figure 2-2. Checking the cable in the Settings application


    Additionally, the Redpark Serial Cable ships with a loopback adaptor (see [Figure
    2-3](#ch02s02.html#performing_a_loopback_test_in_the_rsc_de "Figure 2-3. Performing
    a loopback test in the Rsc Demo Application")) and a demo application called `Rsc
    Demo`. If you open the demo application in Xcode and then build and deploy it
    onto your device, you should be able to perform a loopback test using this adaptor.


    Plug the adaptor into the RS-232 end of the cable, and then plug the cable into
    the dock connector. Run the `Rsc Demo` application and tap on the `Loop Test`
    button. If you do not see a `UIAlertView`, as in [Figure 2-3](#ch02s02.html#performing_a_loopback_test_in_the_rsc_de
    "Figure 2-3. Performing a loopback test in the Rsc Demo Application"), informing
    you that the loopback test has been successful, then, again, there may be something
    wrong with your cable.


    Assuming your new cable passes both of these tests, however, you should assume
    that all is well, and we can now go ahead and write some code.


    ![Performing a loopback test in the Rsc Demo Application](httpatomoreillycomsourceoreillyimages895862.png.jpg)


    Figure 2-3. Performing a loopback test in the Rsc Demo Application


    # Connecting to the Arduino


    While the original Arduino board used RS-232 serial to connect to the development
    machine, more recent models use USB. We therefore need an adaptor to translate
    from RS-232 serial used by the Redpark cable to the TTL serial that we can easily
    connect to the Arduino transmit/receive (TX/RX) pins (pin 1 and 0, respectively).


    To do this conversion I’m using the SparkFun RS-232 Shifter (see [Figure 2-4](#ch02s03.html#the_sparkfun_rs-232_shifter_smd_open_par
    "Figure 2-4. The SparkFun RS-232 Shifter SMD (sku: PRT-00449)"); [http://www.sparkfun.com/products/449](http://www.sparkfun.com/products/449);
    $13.95), although any equivalent unit would suffice. For instance, the Maker Shed
    carries the equally effective but slightly cheaper ($7) [P4 Adapter Kit](http://www.makershed.com/ProductDetails.asp?ProductCode=MKMD2).


    ![The SparkFun RS-232 Shifter SMD (sku: PRT-00449)](httpatomoreillycomsourceoreillyimages895864.png.jpg)


    Figure 2-4. The SparkFun RS-232 Shifter SMD (sku: PRT-00449)


    As you can see from [Figure 2-4](#ch02s03.html#the_sparkfun_rs-232_shifter_smd_open_par
    "Figure 2-4. The SparkFun RS-232 Shifter SMD (sku: PRT-00449)"), the TTL end has
    four wires: `RX`, `TX`, `GND`, and `VCC` (5V). The easiest way to connect this
    to our Arduino is to solder some snapable header pins to four lengths of single
    core wire (see [Figure 2-5](#ch02s03.html#single_core_wire_open_parenthesis_top_cl
    "Figure 2-5. Single core wire (top) and snapable header pins (bottom)")) and build
    a custom jumper cable (see [Figure 2-6](#ch02s03.html#the_completed_jumper_cable
    "Figure 2-6. The completed jumper cable")). You can, of course, just make use
    of premade jumper cables; the Maker Shed, for instance, sells a set of [Breadboard
    Jumper Wires](http://www.makershed.com/ProductDetails.asp?ProductCode=MKSEEED3)
    that you could use instead of soldering up your own cable.


    ![Single core wire (top) and snapable header pins (bottom)](httpatomoreillycomsourceoreillyimages895866.png.jpg)


    Figure 2-5. Single core wire (top) and snapable header pins (bottom)


    ![The completed jumper cable](httpatomoreillycomsourceoreillyimages895869.png.jpg)


    Figure 2-6. The completed jumper cable


    Once you have bought or built your jumper cable, connect the Redpark Serial Cable
    to your RS-232 to TTL serial adaptor, and that in turn (using your jumper cable)
    to your Arduino board, as shown in [Figure 2-7](#ch02s03.html#connecting_the_cable_to_the_arduino
    "Figure 2-7. Connecting the cable to the Arduino").


    ![Connecting the cable to the Arduino](httpatomoreillycomsourceoreillyimages895871.png.jpg)


    Figure 2-7. Connecting the cable to the Arduino


    To do so, connect the `VCC` pin of your adaptor to the 5V pin on the Arduino,
    the `GND` pin to one of the available `GND` pins on the Arduino, the `RX` pin
    on the adaptor to the `TX` pin on the Arduino, and the `TX` pin on the adaptor
    to the `RX` pin on the Arduino.


    ### Warning


    The receive (RX) pin on your Arduino board (pin 0) must be routed to the transmit
    (TX) pin on your adaptor, and the transmit (TX) pin on the Arduino board (pin
    1) must in turn be connected to the receive (RX) pin on your adaptor. If these
    are not correctly connected, your applications will not work. Do *not* connect
    `RX` to `RX` and `TX` to `TX`.


    You can power the Arduino board either via a USB cable, plugged into your Mac
    or a wall adaptor, or via a battery pack. Since I had one lying around, I used
    a battery pack, but it’s entirely up to you.


    # Connecting to an iOS Device


    Once you’ve powered your Arduino, and hence the RS-232 to TTL serial adaptor,
    the only thing left to do is plug the Redpark Serial Cable into your iOS device
    ([Figure 2-8](#ch02s04.html#powering_the_arduino_comma_and_connectin "Figure 2-8.
    Powering the Arduino, and connecting the cable to the iPhone")).


    Unfortunately, we’re going to spend a lot of time plugging and unplugging our
    iPhone or iPad from the Redpark cable, as we’ll need to plug the device into our
    Mac to deploy our development code to it.


    ![Powering the Arduino, and connecting the cable to the iPhone](httpatomoreillycomsourceoreillyimages895873.png.jpg)


    Figure 2-8. Powering the Arduino, and connecting the cable to the iPhone


    For now, however, we’re good to go. Let’s go ahead and write some code to demonstrate
    the cable.'
