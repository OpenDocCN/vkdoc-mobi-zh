  trans: "\n# 构建后端\n\n用户界面已经完成。现在需要将我们的界面与 Arduino 板传入的测量数据连接起来。显然，首先要做的是将 Redpark\
    \ 库集成到代码中。这部分代码与我们在前几章中看到的代码几乎完全相同。不过，我们还需要为图表建立一些基础设施。为此，我们将使用一个简单的 XY 散点图。\n\
    \n打开 `MaxSonarViewController.h` 接口文件，添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"CorePlot-CocoaTouch.h\"\n#import \"RscMgr.h\"\n\n#define BUFFER_LEN\
    \ 1024\n#define MAX_POINTS 200\n\n@interface MaxSonarViewController : UIViewController\n\
    \                                    <CPTPlotDataSource, RscMgrDelegate> {\n\n\
    CPTGraphHostingView *graph;\n\nCPTXYGraph *plot;\n    NSMutableArray *dataForPlot;\n\
    \nUILabel *distance;\n    UISwitch *toggle;\n\nRscMgr *manager;\n    UInt8 rxBuffer[BUFFER_LEN];\n\
    \    UInt8 txBuffer[BUFFER_LEN];\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ CPTGraphHostingView *graph;\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *distance;\n@property (nonatomic, retain) IBOutlet UISwitch *toggle;\n@property\
    \ (nonatomic, retain) NSMutableArray *dataForPlot;\n\n- (IBAction)toggled:(id)sender;\n\
    \n- (NSNumber *) yValueForIndex:(NSUInteger)index;\n\n@end\n```\n\n这使我们的类既成为 Core\
    \ Plot 的数据源，也成为 Redpark 串行电缆的委托对象。现在打开对应的 `MaxSonarViewController.m` 实现文件。我们需要记得合成新属性：\n\
    \n```\n@synthesize dataForPlot;\n```\n\n然后在 `dealloc` 方法中释放它：\n\n```\n [dataForPlot\
    \ release];\n```\n\n最后在 `viewDidUnload` 方法中将其设为 nil：\n\n```\n [self setDataForPlot:nil];\n\
    ```\n\n我们继续添加 `viewDidLoad` 方法。这里我们将像往常一样设置电缆管理器对象，同时也要设置 Core Plot 的绘图对象。进行这些设置涉及大量样板代码，这里我不打算详细讨论，因为这与我们实际要做的事情略有偏离：\n\
    \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n// 电缆管理器\n    rscMgr\
    \ = [[RscMgr alloc] init];\n    [rscMgr setDelegate:self];\n\n// 通过主题创建图表\n  \
    \  plot = [[CPTXYGraph alloc] initWithFrame:CGRectZero];\n    CPTTheme *theme\
    \ = [CPTTheme themeNamed:kCPTPlainBlackTheme];\n    [plot applyTheme:theme];\n\
    \    graph.collapsesLayers = NO;\n    graph.hostedGraph = plot;\n\nplot.paddingLeft\
    \ = 10.0;\n    plot.paddingTop = 10.0;\n    plot.paddingRight = 10.0;\n    plot.paddingBottom\
    \ = 10.0;\n\n// 设置绘图空间\n    CPTXYPlotSpace *plotSpace = (CPTXYPlotSpace *)plot.defaultPlotSpace;\n\
    \    plotSpace.allowsUserInteraction = YES;\n    plotSpace.xRange = [CPTPlotRange\
    \ plotRangeWithLocation:CPTDecimalFromFloat(1.0) \n                          \
    \           length:CPTDecimalFromFloat(MAX_POINTS)];\n    plotSpace.yRange = [CPTPlotRange\
    \ plotRangeWithLocation:CPTDecimalFromFloat(1.0) \n                          \
    \           length:CPTDecimalFromFloat(MAX_POINTS)];\n\n// 坐标轴\n    CPTXYAxisSet\
    \ *axisSet = (CPTXYAxisSet *)plot.axisSet;\n\nCPTXYAxis *x = axisSet.xAxis;\n\
    \    x.majorIntervalLength = CPTDecimalFromString(@\"100\");\n    x.minorTicksPerInterval\
    \ = 4;\n    x.minorTickLength = 5.0f;\n    x.majorTickLength = 7.0f;\n\nCPTXYAxis\
    \ *y = axisSet.yAxis;\n    y.majorIntervalLength = CPTDecimalFromString(@\"50\"\
    );\n    axisSet.yAxis.minorTicksPerInterval = 2;\n    axisSet.yAxis.minorTickLength\
    \ = 5.0f;\n    axisSet.yAxis.majorTickLength = 7.0f;\n\n// 创建一个绿色绘图区域\n    CPTScatterPlot\
    \ *line = [[[CPTScatterPlot alloc] init] autorelease];\n    CPTMutableLineStyle\
    \ *lineStyle = [CPTMutableLineStyle lineStyle];\n    lineStyle.miterLimit = 1.0f;\n\
    \    lineStyle.lineWidth = 3.0f;\n    lineStyle.lineColor = [CPTColor greenColor];\n\
    \    line.dataLineStyle = lineStyle;\n    line.identifier = @\"Green Plot\";\n\
    \    line.dataSource = self;\n    [plot addPlot:line];\n\n// 添加绿色渐变\n    CPTColor\
    \ *areaColor = [CPTColor colorWithComponentRed:0.3 \n                        \
    \            green:1.0 blue:0.3 alpha:0.8];\n    CPTGradient *areaGradient = [CPTGradient\
    \ gradientWithBeginningColor:areaColor \n                                    \
    \         endingColor:[CPTColor clearColor]];\n    areaGradient.angle = −90.0f;\n\
    \    CPTFill *areaGradientFill = [CPTFill fillWithGradient:areaGradient];\n  \
    \  line.areaFill = areaGradientFill;\n    line.areaBaseValue = [[NSDecimalNumber\
    \ zero] decimalValue];\n\n// 添加绘图符号\n    CPTMutableLineStyle *symbolLineStyle\
    \ = [CPTMutableLineStyle lineStyle];\n    symbolLineStyle.lineColor = [CPTColor\
    \ blackColor];\n    CPTPlotSymbol *plotSymbol = [CPTPlotSymbol ellipsePlotSymbol];\n\
    \    plotSymbol.fill = [CPTFill fillWithColor:[CPTColor greenColor]];\n    plotSymbol.lineStyle\
    \ = symbolLineStyle;\n    plotSymbol.size = CGSizeMake(10.0, 10.0);\n    line.plotSymbol\
    \ = plotSymbol;\n\nCABasicAnimation *fadeInAnimation = [CABasicAnimation \n  \
    \                                       animationWithKeyPath:@\"opacity\"];\n\
    \    fadeInAnimation.duration = 1.0f;\n    fadeInAnimation.removedOnCompletion\
    \ = NO;\n    fadeInAnimation.fillMode = kCAFillModeForwards;\n    fadeInAnimation.toValue\
    \ = [NSNumber numberWithFloat:1.0];\n\n// 添加一些初始数据\n    NSMutableArray *contentArray\
    \ = [NSMutableArray arrayWithCapacity:200];\n    self.dataForPlot = contentArray;\n\
    }\n```\n\n现在我们需要添加 CorePlot `CPTPlotDataSource` 数据源方法：\n\n```\n#pragma mark -\
    \ CPTPlotDataSource 方法\n\n-(void)pointReceived:(NSNumber *)point{\n\nCPTPlot *thisPlot\
    \ = [plot plotWithIdentifier:@\"Green Plot\"];\n    [self.dataForPlot addObject:point];\n\
    \    [thisPlot insertDataAtIndex:self.dataForPlot.count-1 numberOfRecords:1];\n\
    \    self.distance.text = [NSString stringWithFormat:@\"%@\", point];\n\n}\n\n\
    -(NSUInteger)numberOfRecordsForPlot:(CPTPlot *)plot {\n    return [dataForPlot\
    \ count];\n}\n\n-(NSNumber *)numberForPlot:(CPTPlot *)plot field:(NSUInteger)fieldEnum\
    \ recordIndex:(NSUInteger)index {\n\nif (fieldEnum == CPTScatterPlotFieldX) {\n\
    \        return [NSNumber numberWithInteger:index];\n    } else {\n        return\
    \ [self yValueForIndex:index];\n    }\n}\n```\n\n以及我们的 `yValueForIndex:` 便捷方法：\n\
    \n```\n- (NSNumber *) yValueForIndex:(NSUInteger)index {\n     return [self.dataForPlot\
    \ objectAtIndex:index];\n}\n```\n\n最后添加 Redpark 串行委托方法：\n\n```\n#pragma mark -\
    \ RscMgrDelegate 方法\n\n- (void) cableConnected:(NSString *)protocol {\n    [rscMgr\
    \ setBaud:9600];\n    [rscMgr open];\n\n}\n\n- (void) cableDisconnected {\n}\n\
    \n- (void) portStatusChanged {\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes\
    \ {\n    int bytesRead = [rscMgr read:rxBuffer Length:numBytes];\n\nNSString *string\
    \ = nil;\n    for(int i = 0;i < numBytes;++i) {\n        if ( string ) {\n   \
    \         string =  [NSString stringWithFormat:@\"%@%c\", string, rxBuffer[i]];\n\
    \        } else {\n            string =  [NSString stringWithFormat:@\"%c\", rxBuffer[i]];\n\
    \        }\n    }\n    [self pointReceived:[NSNumber numberWithInt:[string intValue]]];\n\
    \n}\n\n- (BOOL) rscMessageReceived:(UInt8 *)msg TotalLength:(int)len {\n    return\
    \ FALSE;\n}\n\n- (void) didReceivePortConfig {\n}\n```\n\n通过在模拟器中运行应用来检查一切是否构建并正常运行。你应该会看到类似[图\
    \ 4-8](http://example.com/placeholder) 的内容。如果看起来没问题，就切换到设备上，在你的 iPhone 上构建并部署应用。\n\
    \n![MaxSonar 应用在 iPhone 模拟器中运行](img/httpatomoreillycomsourceoreillyimages895938.png.jpg)\n\
    \n**图 4-8.** MaxSonar 应用在 iPhone 模拟器中运行\n\n如果一切顺利，现在我们需要暂时把 iPhone 应用以及 Xcode\
    \ 本身放到一边。是时候看看我们构建的 Arduino 端了。\n"
- fmt: "## Writing the Arduino Sketch\n\nOpen up the Arduino development environment\
    \ and enter the following code and upload it to your Arduino board. We’ll be using\
    \ analog pin `0`, normally marked as `A0` on most boards, for the analog input\
    \ from the EZ1 sensor:\n\n```\nint statusLed = 13;\nint ez1Analog = 0;\n\nvoid\
    \ setup() {\n   pinMode(statusLed,OUTPUT);\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    }\n\nvoid loop() {\n   int val = analogRead(ez1Analog);\n   if (val > 0) {\n \
    \     val = val / 2;\n      float cm = float(val)*2.54;\n      Serial.println(\
    \ int(cm) );\n   }\n   blinkLed( statusLed, 100 );\n\n}\n\nvoid blinkLed(int pin,\
    \ int ms) {\n   digitalWrite(pin,LOW);\n   digitalWrite(pin,HIGH);\n   delay(ms);\n\
    \   digitalWrite(pin,LOW);\n   delay(ms);\n}\n```\n\n[![1](callouts/1.png)](#ch04s02.html#co12_id)\n\
    \nWe’ll use a convenience method here to blink the board LED on pin `13` for `100`\
    \ ms. First, so we know something is actually happening, but also to space out\
    \ the readings being sent to the phone.\n\n## Putting It All Together\n\nNominally\
    \ the EZ1 requires `5` V; however, according to the datasheet, we can operate\
    \ it at `3.3` V, albeit with somewhat reduced performance. This simplifies connecting\
    \ all of our components to the Arduino board. Plug the `+VE` wire from the EZ1\
    \ into the `3.3V` pin on the Arduino board, and the `GND` wire into one of the\
    \ available `GND` pins, then connect the `AN` wire to analog pin `0` (`A0`). Finally\
    \ connect your RS-232 to TTL serial adaptor to the `5V`, `GND`, `RX`, and `TX`\
    \ pins as normal (see [Figure 4-9](#ch04s02.html#connecting_all_the_components_together\
    \ \"Figure 4-9. Connecting all the components\")).\n\n![Connecting all the components](httpatomoreillycomsourceoreillyimages895940.png.jpg)\n\
    \nFigure 4-9. Connecting all the components\n\nIf you do want to connect the EZ1\
    \ to the `+5V` pin rather than the `3.3V` pin, probably the easiest thing to do\
    \ would be to use a breadboard and some jumper wires.\n\nOnce you’re satisfied\
    \ that everything is connected correctly, power on the Arduino board and start\
    \ up the application. Point the EZ1 toward the ceiling to get a decent distance\
    \ measurement, and then place your hand over the sensor. You should see the measured\
    \ distance drop dramatically. Slowly raise your hand, holding it above the sensor\
    \ to see the reading change. Hopefully you’ll see something that looks a lot like\
    \ [Figure 4-10](#ch04s02.html#the_maxsonar_application_running_on_the \"Figure 4-10. The\
    \ MaxSonar application running on the iPhone\") at this point.\n\n![The MaxSonar\
    \ application running on the iPhone](httpatomoreillycomsourceoreillyimages895942.png.jpg)\n\
    \nFigure 4-10. The MaxSonar application running on the iPhone\n\n## Turning Things\
    \ On and Off\n\nYou’ve probably noticed that we haven’t done anything with the\
    \ toggle switch. Let’s go ahead and make that usable now. First of all, we’ll\
    \ need to change our Arduino sketch:\n\n```\nint statusLed = 13;\nint powerLed\
    \ = 12;\nint ez1Analog = 0;\n\nint aByte;\nint flag = 0;\n\nvoid setup() {\n \
    \  pinMode(statusLed,OUTPUT);\n   pinMode(ez1Analog,INPUT);\n   Serial.begin(9600);\n\
    \n   pinMode(powerLed,OUTPUT);\n   blinkLed( statusLed, 500 );\n}\n\nvoid loop()\
    \ {\n\n   if (Serial.available() > 0) {\n          aByte = Serial.read();\n  \
    \        if ( flag == 0 ) {\n            flag = 1;\n            digitalWrite(powerLed,\
    \ HIGH);\n          } else {\n            flag = 0;\n            digitalWrite(powerLed,\
    \ LOW);\n          }\n    }\n\n   if ( flag == 1 ) {\n     int val = analogRead(ez1Analog);\n\
    \n     if ( val > 0 ) {\n         val = val / 2;\n         float cm = float(val)*2.54;\n\
    \         Serial.println( int(cm) ); // cm\n         blinkLed( statusLed, 100);\n\
    \      }\n   }\n\n}\n\nvoid blinkLed(int pin, int ms) {\n   digitalWrite(pin,LOW);\n\
    \   digitalWrite(pin,HIGH);\n   delay(ms);\n   digitalWrite(pin,LOW);\n   delay(ms);\n\
    }\n```\n\nHere we’ve rewritten our `loop()` so that the Arduino only sends data\
    \ to the iPhone if it has been toggled on, by receiving a byte from the phone,\
    \ and then stops transmitting data if it receives another byte. I’m also using\
    \ a second LED in pin `12` to indicate that data is being sent, but that’s purely\
    \ optional, and you can omit it if you can’t be bothered to wire another LED up\
    \ to your Arduino board.\n\nYou’ll notice that we’re assuming an initial state\
    \ of “off,” but that currently our user interface has an initial state of “on.”\
    \ We need to fix that, so open up the `MaxSonarViewController.xib` file in Interface\
    \ Build, click on the switch in the view, and in the Attributes inspector in the\
    \ Utilities panel, change the initial switch state to “off.”\n\nFinally, to glue\
    \ everything together, we add some code to the toggled callback:\n\n```\n- (IBAction)toggled:(id)sender\
    \ {\n    txBuffer[0] = 1;\n    int bytesWritten = [rscMgr write:txBuffer Length:1];\n\
    \n}\n```\n\nNow if you rebuild and then redeploy the MaxSonar application to the\
    \ iPhone, you should be able to stop and start the data coming from the phone\
    \ using the switch."
