    \ to support the cable, click on the *SerialConsoleViewController.h* header file\
    \ and add the code highlighted below to the file:\n\n![Declaring support for the\
    \ cable in the Info.plist file](httpatomoreillycomsourceoreillyimages895885.png.jpg)\n\
    \nFigure 2-14. Declaring support for the cable in the *Info.plist* file\n\n```\n\
    #import <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\n@interface\
    \ SerialConsoleViewController : UIViewController <RscMgrDelegate> {\n\nRscMgr\
    \ *rscMgr;\n    UInt8 rxBuffer[BUFFER_LEN];\n    UInt8 txBuffer[BUFFER_LEN];\n\
    \nUITextField *textEntry;\n    UIButton *sendButton;\n    UITextView *serialView;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UITextField *textEntry;\n@property\
    \ (nonatomic, retain) IBOutlet UIButton *sendButton;\n@property (nonatomic, retain)\
    \ IBOutlet UITextView *serialView;\n\n- (IBAction)sendString:(id)sender;\n\n@end\n\
    ```\n\nThen, in the corresponding *SerialConsoleViewController.m* implementation\
    \ file, uncomment the `viewDidLoad` method and add the following highlighted lines:\n\
    \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    rscMgr = [[RscMgr\
    \ alloc] init];\n    [rscMgr setDelegate:self];\n}\n```"
  trans: "\n# 一个简单的串行应用\n\n我们的第一个利用串行线缆的应用将是一个简单的串行终端，仿照 Arduino 开发环境中串行控制台的功能。打开\
    \ Xcode，选择创建新项目，为 iPhone 选一个基于视图的应用程序，当提示时将其命名为“SerialConsole”并保存到桌面。\n\n我们先从构建界面开始。点击\
    \ `SerialConsoleViewController.xib` 文件在界面生成器中打开。打开实用工具面板，然后从对象库中拖放一个 `UINavigationBar`、`UITextField`、`UIButton`\
    \ 和一个 `UITextView` 到视图中。按照类似图 2-9 的方式排列它们。\n\n![构建 SerialConsole 应用程序的用户界面](img/httpatomoreillycomsourceoreillyimages895875.png.jpg)\n\
    \n图 2-9. 构建 SerialConsole 应用程序的用户界面\n\n我们将在本章后面利用导航栏的空间来添加一个 `UIBarButtonItem`。但目前，将标题文字改为“Serial\
    \ Console”，我们稍后再回来处理。\n\n最后，从 `UITextView` 中选中并删除 Lorem ipsum 文本，然后在实用工具面板的“属性”标签中取消勾选“可编辑”复选框，这样用户就不会因为意外弹出键盘而遮挡文本窗口的视图。\n\
    \n关闭实用工具面板并打开助理编辑器，确保它设置为“自动”并显示 `SerialConsoleViewController.h` 文件。\n\n然后按住 Ctrl\
    \ 键点击并从 `UITextField`、`UIButton` 和 `UITextView` 拖动到编辑器窗口，为每个项目创建一个名为 `textEntry`、`sendButton`\
    \ 和 `serialView` 的 `IBOutlet` 属性。\n\n接着再次按住 Ctrl 键点击并拖动 `UIButton` 来创建一个名为 `sendString:`\
    \ 的 `IBAction`（参见图 2-10）。最后，右键点击 `UITextField` 打开文本字段的输出口、事件和动作面板，点击并拖动将“Did End\
    \ on Exit”事件连接到同一个 `sendString:` 方法。这样做意味着，当你点击发送按钮或在文本输入框中输入字符后按回车时，都会调用同一个 `sendString:`\
    \ 方法。\n\n![连接输出口和动作](img/httpatomoreillycomsourceoreillyimages895877.png.jpg)\n\
    \n图 2-10. 连接输出口和动作\n\n将你的 UI 元素连接到接口文件后，你的 `SerialConsoleViewController.h` 头文件应大致如下：\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface SerialConsoleViewController : UIViewController\
    \ {\n\n    UITextField *textEntry;\n    UIButton *sendButton;\n    UITextView\
    \ *serialView;\n}\n\n@property (nonatomic, retain) IBOutlet UITextField *textEntry;\n\
    @property (nonatomic, retain) IBOutlet UIButton *sendButton;\n@property (nonatomic,\
    \ retain) IBOutlet UITextView *serialView;\n\n- (IBAction)sendString:(id)sender;\n\
    \n@end\n```\n\n同时在实现文件中也有相应的变化。现在点击 `SerialConsoleViewController.m` 实现文件，并在 `sendString:`\
    \ 方法中添加以下一行代码：\n\n```\n- (IBAction)sendString:(id)sender {\n    [self.textEntry\
    \ resignFirstResponder];\n\n    // 在此处添加代码\n}\n```\n\n这将确保当用户按下发送按钮发送一串字符时，键盘被取消。我们将在本章后面再回来处理这个逻辑。\n\
    \n## 添加 Redpark 串行库\n\n现在我们有了用户界面的基本框架；让我们继续深入填充后台功能。打开你的 Redpark 串行 SDK 副本，从\
    \ `inc/` 文件夹中获取 `redparkSerial.h` 和 `rscMgr.h` 头文件，以及从 `lib/` 文件夹中获取 `libRscMgrUniv.a`\
    \ 静态库（参见图 2-11）。`libRscMgrUniv.a` 库是一个通用（胖）库，支持在模拟器中使用的 x86 架构以及在实际设备硬件上使用的 armv6\
    \ 和 armv7 架构。\n\n![Redpark 串行 SDK](img/httpatomoreillycomsourceoreillyimages895879.png.jpg)\n\
    \n图 2-11. Redpark 串行 SDK\n\n将它们拖放到你的 SerialConsole 项目中，记住在提示时勾选“将项目复制到目标组文件夹（如果需要）”复选框。\n\
    \n由于 SDK 使用了 External Accessory 框架，我们还需要在此阶段将其添加到项目中。点击 Xcode 中项目窗格顶部的项目图标，然后点击\
    \ SerialConsole 目标，接着点击“构建阶段”标签。最后，点击“与库链接二进制文件”项打开链接框架列表，点击 `+` 符号添加一个新框架。从下拉列表中选择\
    \ External Accessory 框架，并点击“添加”按钮（如图 2-12 所示）。\n\n![将 External Accessory 框架添加到项目](img/httpatomoreillycomsourceoreillyimages895881.png.jpg)\n\
    \n图 2-12. 将 External Accessory 框架添加到项目\n\n最后，我们需要在应用的 `Info.plist` 文件中声明对线缆的支持。如果不这样做，每次将线缆插入设备时，我们都会看到类似图\
    \ 2-13 的界面。\n\n![不支持的 External Accessory 窗口](img/httpatomoreillycomsourceoreillyimages895883.png.jpg)\n\
    \n图 2-13. 不支持的 External Accessory 窗口\n\n点击 `SerialConsole-Info.plist` 文件在编辑器中打开。右键点击列表的最底部行，从菜单中选择“添加行”。表格中会添加一个额外行，并出现一个下拉菜单。在框中输入\
    \ `UISupportedExternalAccessoryProtocols`。它会变为人类可读的文字“Supported external accessory\
    \ protocols”。在 Item 0 中输入字符串 `com.redpark.hobdb9`，如图 2-14 所示。\n\n现在我们已经将必要的文件添加到项目中，并配置应用以支持线缆，点击\
    \ `SerialConsoleViewController.h` 头文件，并将下面高亮显示的代码添加到文件中：\n\n![在 Info.plist 文件中声明对线缆的支持](img/httpatomoreillycomsourceoreillyimages895885.png.jpg)\n\
    \n图 2-14. 在 `Info.plist` 文件中声明对线缆的支持\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n\n@interface SerialConsoleViewController\
    \ : UIViewController <RscMgrDelegate> {\n\nRscMgr *rscMgr;\n    UInt8 rxBuffer[BUFFER_LEN];\n\
    \    UInt8 txBuffer[BUFFER_LEN];\n\nUITextField *textEntry;\n    UIButton *sendButton;\n\
    \    UITextView *serialView;\n}\n\n@property (nonatomic, retain) IBOutlet UITextField\
    \ *textEntry;\n@property (nonatomic, retain) IBOutlet UIButton *sendButton;\n\
    @property (nonatomic, retain) IBOutlet UITextView *serialView;\n\n- (IBAction)sendString:(id)sender;\n\
    \n@end\n```\n\n然后，在相应的 `SerialConsoleViewController.m` 实现文件中，取消注释 `viewDidLoad`\
    \ 方法，并添加以下高亮显示的行：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n  \
    \  rscMgr = [[RscMgr alloc] init];\n    [rscMgr setDelegate:self];\n}\n```\n"
- fmt: "This will initialize the `Redpark Serial Cable Manager` and set its delegate\
    \ to be this class. After doing so, we need to add the mandatory delegate callbacks:\n\
    \n```\n#pragma mark - RscMgrDelegate methods\n\n- (void) cableConnected:(NSString\
    \ *)protocol {\n    [rscMgr setBaud:9600];\n    [rscMgr open];\n}\n\n- (void)\
    \ cableDisconnected {\n\n}\n\n- (void) portStatusChanged {\n\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes\
    \ {\n    int bytesRead = [rscMgr read:rxBuffer Length:numBytes];\n    NSLog( @\"\
    Read %d bytes from serial cable.\", bytesRead );\n    for(int i = 0;i < numBytes;++i)\
    \ {\n        self.serialView.text =\n            [NSString stringWithFormat:@\"\
    %@%c\",\n                          self.serialView.text,\n                   \
    \      ((char *)rxBuffer)[i]];\n    }\n}\n\n- (BOOL) rscMessageReceived:(UInt8\
    \ *)msg TotalLength:(int)len {\n    return FALSE;\n}\n\n- (void) didReceivePortConfig\
    \ {\n\n}\n```\n\n[![1](callouts/1.png)](#ch02s05.html#co6_id)\n\nHere we pass\
    \ the `rxBuffer` instance variable by reference into the `rscMgr`'s `read:Length:`\
    \ method, which will modify it in-place. This isn’t normal behavior for an Objective-C\
    \ method, so be careful.\n\n[![2](callouts/2.png)](#ch02s05.html#co7_id)\n\nHere\
    \ we’re appending the characters in the newly populated `rxBuffer` array to the\
    \ text already in the `UITextView`.\n\nAlthough we have to implement all of the\
    \ mandatory methods, in our bare-bones implementation we’re really only interested\
    \ in the `cableConnected:` and `readBytesAvailable:` callbacks.\n\n## Connecting\
    \ the Arduino\n\nWe’ve reached a good point to stop and test the code; click on\
    \ the Run button in the Xcode toolbar to build and deploy the code onto your iPhone.\
    \ Once the application has been put onto the iPhone, click on the Stop button\
    \ to stop it running and unplug your phone from your Mac.\n\nTo test the code,\
    \ we can use the simple serial sketch we used in the previous chapter:\n\n```\n\
    void setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  while (Serial.available()\
    \ <= 0) {\n    Serial.println(\"Hello world\");\n    delay(300);\n  }\n\n  Serial.println(\"\
    Goodbye world\");\n  while(1) { }\n}\n```\n\nIf you don’t already have the sketch\
    \ loaded onto an Arduino, open up the Arduino development environment and load\
    \ the sketch. Then connect the Arduino to the Redpark cable, and the Redpark cable\
    \ to your iPhone. Then tap on the SerialConsole app to resume execution.\n\nIf\
    \ you’ve plumbed everything together correctly, you should get something that\
    \ looks very much like [Figure 2-15](#ch02s05.html#the_serialconsole_app_connected_to_an_ar\
    \ \"Figure 2-15. The SerialConsole app connected to an Arduino\"). Just like the\
    \ serial console on your Mac, the Arduino says “Hello World.”\n\n![The SerialConsole\
    \ app connected to an Arduino](httpatomoreillycomsourceoreillyimages895887.png.jpg)\n\
    \nFigure 2-15. The SerialConsole app connected to an Arduino\n\n## Sending Data\
    \ Back to the Arduino\n\nWhile your iPhone can now receive data from the Arduino,\
    \ we can’t yet send data. Don’t worry; this is actually a lot easier than receiving\
    \ data. Click on the `SerialConsoleViewController.m` implementation file and scroll\
    \ down until you find the `sendString:` method. Add the following lines:\n\n```\n\
    - (IBAction)sendString:(id)sender {\n    [self.textEntry resignFirstResponder];\n\
    \n    NSString *text = self.textEntry.text;\n    int bytesToWrite = text.length;\n\
    \    for ( int i = 0; i < bytesToWrite; i++ ) {\n        txBuffer[i] = (int)[text\
    \ characterAtIndex:i];\n    }\n    int bytesWritten = [rscMgr write:txBuffer Length:bytesToWrite];\n\
    }\n```\n\nHere we take the text in the `UITextField` widget and pack the string\
    \ into the `txBuffer` one byte at a time. We then use the `rscMgr` and write the\
    \ buffer to the serial port.\n\nGo ahead and unplug your iPhone from the Redpark\
    \ cable, and plug it back into your Mac. Once it’s visible again to Xcode, click\
    \ on the Run button in Xcode to build and deploy the application to your iPhone\
    \ once again. After it starts up, click on the Stop button and disconnect the\
    \ iPhone from your Mac and reconnect the Redpark cable. Tap on the `SerialConsole`\
    \ application to resume execution.\n\nWhen you see the “Hello World” messages\
    \ scroll up the text view, tap on the text entry widget and type a few characters.\
    \ Then tap the Send button. You should see something like [Figure 2-16](#ch02s05.html#application_connected_to_the_arduino_ope\
    \ \"Figure 2-16. Application connected to the Arduino (left), entering characters\
    \ (middle), which have been received by the Arduino (right)\"), and the “Goodbye\
    \ World” message.\n\n![Application connected to the Arduino (left), entering characters\
    \ (middle), which have been received by the Arduino (right)](httpatomoreillycomsourceoreillyimages895889.png.jpg)\n\
    \nFigure 2-16. Application connected to the Arduino (left), entering characters\
    \ (middle), which have been received by the Arduino (right)\n\nIf you want to\
    \ add a blinking light at this point, you could insert an LED into pin 13, as\
    \ we did in the previous chapter, and add the following familiar code to our sketch:\n\
    \n```\nvoid setup() {\n  Serial.begin(9600);\n  pinMode(13, OUTPUT);\n}\n\nvoid\
    \ loop() {\n  while (Serial.available() <= 0) {\n    Serial.println(\"Hello world\"\
    );\n    delay(300);\n  }\n\n  Serial.println(\"Goodbye world\");\n  while(1) {\n\
    \    digitalWrite(13, HIGH);\n    delay(1000);\n    digitalWrite(13, LOW);\n \
    \   delay(1000);\n  }\n}\n```\n\nIf you upload this modified sketch to your Arduino\
    \ board, as well as printing “Goodbye world” when it receives bytes over the serial\
    \ port, the Arduino will begin to blink the LED on pin 13 on and off once a second.\
    \ See [Figure 2-17](#ch02s05.html#the_serialconsole_application_comma_cabl \"\
    Figure 2-17. The SerialConsole application, cabling, and the Arduino\").\n\n![The\
    \ SerialConsole application, cabling, and the Arduino](httpatomoreillycomsourceoreillyimages895891.png.jpg)\n\
    \nFigure 2-17. The SerialConsole application, cabling, and the Arduino"
