  trans: "```objc\nRscMgr *rscMgr;\nUInt8 rxBuffer[BUFFER_LEN];\nUInt8 txBuffer[BUFFER_LEN];\n\
    \nUITextField *textEntry;\nUIButton *sendButton;\nUITextView *serialView;\nUIBarButtonItem\
    \ *openLog;\n\nLogController *logWindow;\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UITextField *textEntry;\n@property (nonatomic, retain) IBOutlet UIButton *sendButton;\n\
    @property (nonatomic, retain) IBOutlet UITextView *serialView;\n@property (nonatomic,\
    \ retain) LogController *logWindow;\n\n- (IBAction)sendString:(id)sender;\n- (IBAction)openLog:(id)sender;\n\
    \n@end\n```\n\n然后，单击 `SerialConsoleViewController.m` 实现文件，在 Xcode 编辑器中打开它，并记得合成我们的新属性：\n\
    \n```objc\n@synthesize logWindow;\n```\n\n修改 `viewDidLoad:` 方法如下：\n\n```objc\n\
    - (void)viewDidLoad {\n    [super viewDidLoad];\n    rscMgr = [[RscMgr alloc]\
    \ init];\n    [rscMgr setDelegate:self];\n\n    self.logWindow = [[LogController\
    \ alloc] initWithNibName:@\"LogController\" bundle:nil];\n}\n```\n\n以及 `openLog:`\
    \ 方法，以便在点击日志按钮时显示日志视图控制器：\n\n```objc\n- (IBAction)openLog:(id)sender {\n    [self\
    \ presentModalViewController:self.logWindow animated:YES];\n}\n```\n\n保存所有更改，然后点击\
    \ Xcode 工具栏中的运行按钮，构建代码并将其部署到你的设备上。在操作之前，请确保你的 iPhone 已通过 USB 连接到 Mac，而不是 Redpark\
    \ 数据线。\n\n应用程序加载到你的 iPhone 后，点击 Xcode 工具栏中的停止按钮，并断开手机连接。重新启动应用程序，然后点击导航栏中的日志按钮。如果一切正常，你将看到类似于以下内容的输出：\n\
    \n```\n2011-07-15 15:56:06.542 SerialConsole[4686:707] ACC Connect\n```\n\n这是\
    \ Redpark SDK 在告诉你它已经完成了初始化。此时，你可能想浏览代码，用一些 `NSLog` 语句来植入你的委托方法，然后重新部署代码到设备上。如果你这样做，可能会看到类似\
    \ 图 2-20 的内容。\n\n# 总结\n\n在本章中，我们为 iOS 构建了一个简单的串行控制台，并在 iPhone 和 Arduino 板之间来回传递消息。我们还构建了一个日志窗口视图控制器，它可以在其他项目中重复使用，这在调试时非常有用。\n\
    \n在下一章中，我们将构建一个更具雄心的项目，这次是针对 iPad 的。\n\n![日志查看器运行中](img/httpatomoreillycomsourceoreillyimages895898.png.jpg)\n\
    \n图 2-20. 日志查看器运行中\n\n# 第 3 章 从 iPad 控制 Arduino\n\n在上一章中，我们使用 Redpark 串行数据线和 SDK\
    \ 在 Arduino 和 iPhone 之间来回传递消息。现在，让我们让 Arduino 做些除了发送消息之外的事情，直接从我们的 iPad 上打开或关闭一些\
    \ LED 灯。\n\n# 在你的 iPad 上运行 Arduino\n\n我们将为 iPad 构建一个简单的应用程序，让你可以将 Arduino 上的任意引脚拉高（HIGH）或拉低（LOW）。虽然我们将为\
    \ iPad 构建此应用程序，因为我想充分利用其大屏幕空间，但如果你希望将其构建为 iPhone 应用，代码也可以在 iPhone（或 iPod touch）上完美运行，无需任何修改。\n\
    \n打开 Xcode，选择创建新项目，选择设备系列为 iPad 的基于视图的应用程序，并在提示时将其命名为 \"Paduino\"，保存到桌面。项目打开后，取消选择\
    \ Landscape Left 和 Landscape Right 作为支持的屏幕方向。我们将以竖屏模式工作。\n\n## 添加串行库\n\n这次，让我们先添加\
    \ Redpark 库。打开你复制的 Redpark Serial SDK，从 `inc/` 文件夹中获取 `redparkSerial.h` 和 `rscMgr.h`\
    \ 头文件，从 `lib/` 文件夹中获取 `libRscMgrUniv.a` 静态库，然后将它们拖放到你的新 Paduino 项目中，记得在提示时勾选 \"\
    Copy items into destination group's folder (if needed)\" 复选框。\n\n我们还需要添加 External\
    \ Accessories 框架，因此点击 Xcode 项目面板顶部的项目图标，然后点击 Paduino 目标，接着点击 Build Phases 标签。最后，点击\
    \ Link Binary with Libraries 项以打开已链接框架列表，点击 + 符号添加新框架。从下拉列表中选择 External Accessory\
    \ 框架，然后点击 Add 按钮。\n\n最后，我们需要声明对数据线的支持。点击 `SerialConsole-Info.plist` 文件在编辑器中打开。右键点击列表最底部的一行，从菜单中选择\
    \ Add Row。表格中会新增一行，并出现一个下拉菜单。在框中输入 `UISupportedExternalAccessoryProtocols`。这将会变为人类可读的文本\
    \ \"Supported external accessory protocols\"。在 Item 0 中输入字符串 `com.redpark.hobdb9`，以声明我们对数据线的支持。\n\
    \n## 构建用户界面\n\n我们首先需要一张高分辨率的 Arduino 图片。网上有很多这样的图片，或者你也可以使用自己的图片。"
- fmt: '### Note


    A good image of the Arduino Uno can be found on the [Arduino Project website](http://arduino.cc/en/uploads/Main/ArduinoUnoFront.jpg).
    If you need to, rotate the image using the Preview application so that the power
    and USB connections are at the top of the frame, and save your changes. Drag and
    drop your image into the project.


    Now that we’ve done that, let’s build our user interface before going ahead and
    wiring it up to our view controller. Click on the `PaduinoViewController.xib`
    file to open it in Interface Builder. Drag and drop a `UINavigationBar` from the
    Object library and position it at the top of the view. Change the title to be
    “Paduino.” Then drag a `UIImageView` from the library and position it so it fills
    the remaining view.


    In the Attributes inspector, set the View mode to be Aspect Fill, and the Image
    to be the Arduino image you added to your project a few moments ago. You should
    see something like [Figure 3-1](#ch03.html#the_basic_user_interface "Figure 3-1. The
    basic user interface").


    Next drag twelve `UISwitch` elements from the Object library and position them
    as in [Figure 3-2](#ch03.html#positioning_the_uiswitch_elements "Figure 3-2. Positioning
    the UISwitch elements"), in two blocks of six switches next to digital pins 2
    through 13. We’re going to use these switches to switch the Arduino’s digital
    pins from `LOW` to `HIGH` and back again.


    ![The basic user interface](httpatomoreillycomsourceoreillyimages895900.png.jpg)


    Figure 3-1. The basic user interface


    ![Positioning the UISwitch elements](httpatomoreillycomsourceoreillyimages895902.png.jpg)


    Figure 3-2. Positioning the UISwitch elements


    For each of the switches, in the Attributes inspector, set the switch state to
    be off. This will correspond to holding the Arduino pin `LOW`; we’re going to
    write our Arduino code so this will be the initial state. Then, in the same inspector
    window, set the view’s tag to be the same as the pin number, see [Figure 3-3](#ch03.html#setting_the_viewas_tag_property
    "Figure 3-3. Setting the view’s tag property").


    ![Setting the view’s tag property](httpatomoreillycomsourceoreillyimages895904.png.jpg)


    Figure 3-3. Setting the view’s tag property


    Having done that, flip to the Identity inspector and set the switch label to be
    the pin name (see [Figure 3-4](#ch03.html#setting_the_viewas_label_property "Figure 3-4. Setting
    the view’s label property")). While this isn’t strictly necessary, it is going
    to help us out later when we need to identify the switches as we’re connecting
    outlets and actions.


    ![Setting the view’s label property](httpatomoreillycomsourceoreillyimages895906.png.jpg)


    Figure 3-4. Setting the view’s label property


    Now that we’ve done that, close the Utilities panel and open the Assistant Editor.
    Make sure it’s on Automatic and Ctrl-click and drag to the `PaduinoViewController.h`
    interface file from each of the switches to create an instance variable and property
    for each.


    After doing that, click on one of the switches to select it, then Ctrl-click and
    drag to the interface file to create an `IBAction` called `toggle:` (see [Figure 3-5](#ch03.html#connecting_all_twelve_switches_to_the_to
    "Figure 3-5. Connecting all twelve switches to the toggle: method")). After doing
    this, Ctrl-click and drag from all of the other switches to the same method. Changing
    the state of any of the switches will call this single method, passing the `UISwitch`
    in as the sender.


    ![Connecting all twelve switches to the toggle: method](httpatomoreillycomsourceoreillyimages895908.png.jpg)


    Figure 3-5. Connecting all twelve switches to the toggle: method


    After doing this, if you right-click on File’s Owner in the object’s view, you
    should see something like [Figure 3-6](#ch03.html#connections_from_fileas_owner_to_the_use
    "Figure 3-6. Connections from File’s Owner to the user interface elements"). This
    pop up shows the connections from File’s Owner, which in this case is the `PaduinoViewController`,
    to the various elements in the view.


    ![Connections from File’s Owner to the user interface elements](httpatomoreillycomsourceoreillyimages895910.png)


    Figure 3-6. Connections from File’s Owner to the user interface elements


    We’re done for now. We’ve made a lot of changes, so make sure you’ve saved, and
    click on the `PaduinoViewController.h` interface file and open it in the Standard
    Editor.'
  raw: '### Note


    A good image of the Arduino Uno can be found on the [Arduino Project website](http://arduino.cc/en/uploads/Main/ArduinoUnoFront.jpg).


    If you need to, rotate the image using the Preview application so that the power
    and USB connections are at the top of the frame, and save your changes. Drag and
    drop your image into the project.


    Now that we’ve done that, let’s build our user interface before going ahead and
    wiring it up to our view controller. Click on the *PaduinoViewController.xib*
    file to open it in Interface Builder. Drag and drop a `UINavigationBar` from the
    Object library and position it at the top of the view. Change the title to be
