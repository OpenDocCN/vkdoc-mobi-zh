    \ (I/G) address bit, while the next-to-least significant bit is the Universally\
    \ or Locally (U/L) administered address bit."
  trans: "\n## XBee 转 RS-232 串行接口\n\n我们首先需要一个 RS-232 适配器。幸运的是，SparkFun 出售 [XBee Explorer\
    \ Serial](http://www.sparkfun.com/products/9111)，售价 29.95 美元（参见 图 5-11）。\n\n据我所知，目前市场上没有其他同样容易买到的适配器；不过，如果你不想购买\
    \ SparkFun 的适配器，用我们之前一直使用的 RS-232 转 TTL 串行适配器在面包板上搭建一个适配器也应该是相当容易的。\n\n但是，如果你这样做，请记住\
    \ XBee 模块的工作电压是 3.3 V，而 Redpark 线缆的工作电压是 5 V。你需要在 XBee 模块的 3.3 V RX 和 TX 引脚与 TTL\
    \ 串行适配器的 5 V 引脚之间添加一个电压电平转换器。\n\n![SparkFun XBee Explorer Serial 串行接口](img/httpatomoreillycomsourceoreillyimages895978.png.jpg)\n\
    \n图 5-11. SparkFun XBee Explorer Serial 串行接口\n\n接下来，拔掉原来连接到 Mac 的 XBee 模块，并将其插入串行适配器。然后将串行适配器插入\
    \ Redpark 线缆，再将线缆插入你的 iPhone。连接电源并打开电源；你应该会看到类似 图 5-12 的样子。\n\n![一切连接并正常工作](img/httpatomoreillycomsourceoreillyimages895980.png.jpg)\n\
    \n图 5-12. 一切连接并正常工作\n\n恭喜你，你已经成功通过 XBee 串行直通连接，将你的 Arduino 和 iPhone 连接起来了。\n\n\
    ## 进一步探索\n\n此时，一个相当简单的练习是获取上一章中的声纳示例，并用 XBee 替代直接线缆连接。无需任何软件更改，只需更改硬件。将下面的 图 5-13\
    \ 与上一章的 图 4-9 进行比较。\n\n![使用 XBee 模块连接第 4 章的 EZ1 示例](img/httpatomoreillycomsourceoreillyimages895982.png.jpg)\n\
    \n图 5-13. 使用 XBee 模块连接第 4 章中的 EZ1 示例\n\n如果一切顺利，你应该会看到与上一章完全相同的效果。\n\n# 第 6 章.\
    \ 其他连接方式\n\n本书大部分内容都在讨论 Redpark 串行线缆，因为这是将外部硬件直接连接到 iPhone 或 iPad 的最简单方法。然而，在\
    \ Redpark 线缆出现之前，我们必须更具创造性，在本章中，我将介绍一些将外部硬件连接到 iOS 设备的其他方法。\n\n## 使用网络\n\n我之前没有过多讨论网络，但众所周知，无处不在的数据可用性改变了一切。如果我们可以将传感器或其他硬件连接到互联网，使其成为物联网的一部分，那么我们的\
    \ iPhone（或 iPad）就已经具备了与之通信的能力。\n\n### 使用以太网\n\n将任意传感器硬件连接到互联网的最简单方法（到了这个阶段可能相当可预测）是使用\
    \ Arduino。有几种方法可以实现这一点，但如果你有一个静态传感器平台，最简单的方法可能是使用有线以太网。参见 图 6-1。\n\n#### 注意\n\n\
    Arduino 扩展板是一种可以插在 Arduino PCB 顶部的电路板，用于扩展其功能。它可能会使用部分或全部 Arduino 引脚。但是，未使用的引脚通常会直通引出，供其他用途使用。参见\
    \ [`shieldlist.org/`](http://shieldlist.org/) 以获取许多 Arduino 扩展板的引脚使用情况列表。\n\n\
    你可以从多家供应商处购买官方的 Arduino Ethernet Shield，包括 [Maker Shed](http://www.makershed.com/ProductDetails.asp?ProductCode=MKSP7)\
    \ 和 [SparkFun](http://www.sparkfun.com/products/9026)。\n\n![Arduino Ethershield（顶部）和\
    \ Arduino Uno（底部）](img/httpatomoreillycomsourceoreillyimages895984.png.jpg)\n\n\
    图 6-1. Arduino Ethershield（顶部）和 Arduino Uno（底部）\n\n一旦你将 Ethernet Shield 连接到 Arduino，并将扩展板插入网络，就可以相当容易地搭建一个简单的\
    \ web 客户端。下面的代码建立了一个网络连接，然后对“Arduino”一词执行 Google 搜索，并将请求返回的页面发送到串行连接：\n\n```\n\
    #include <Ethernet.h>\n\nbyte mac[] = { 0xDE, 0xAD, 0xBE, 0xEF, 0xFE, 0xED };\n\
    byte ip[] = { 144,173,229,19 };\nbyte server[] = { 64, 233, 187, 99 }; // Google\n\
    \nClient client(server, 80);\n\nvoid setup()\n{\n  Ethernet.begin(mac, ip);\n\
    \  Serial.begin(9600);\n\ndelay(1000);\n\nSerial.println(\"connecting...\");\n\
    \nif (client.connect()) {\n    Serial.println(\"connected\");\n    client.println(\"\
    GET /search?q=arduino HTTP/1.0\");\n    client.println();\n  } else {\n    Serial.println(\"\
    connection failed\");\n  }\n}\n\nvoid loop()\n{\n  if (client.available()) {\n\
    \    char c = client.read();\n    Serial.print(c);\n  }\n\nif (!client.connected())\
    \ {\n    Serial.println();\n    Serial.println(\"disconnecting.\");\n    client.stop();\n\
    \    for(;;)\n      ;\n  }\n}\n```\n\n![1](img/#ch06.html#co13_id)\n\nArduino\
    \ Ethernet 库要求你为 Ethernet Shield 定义一个 MAC 地址。这通常由制造商完成，大多数系统管理员不会喜欢你试图为 Arduino\
    \ 提供一个随机 MAC 的做法。如果你打算将 Arduino + Ethernet Shield 连接到一个你不直接控制的网络，你应该事先咨询你的系统管理员。\n\
    \n![2](img/#ch06.html#co14_id)\n\n官方 Ethernet 库的另一个问题是它尚不支持 DHCP，因此你必须为你的草图提供一个静态\
    \ IP 地址。同样，这可能是你的系统管理员有异议的问题，因为大多数现代网络都使用 DHCP 来动态分配 IP 地址。如果你将 Arduino 连接到一个你不直接控制的网络，你应该再次事先咨询你的系统管理员。\n\
    \n你可以使用 Arduino 开发环境提供的串行控制台，或者我们之前在本书中编写的 `SerialConsole` 应用程序，来查看此草图返回的结果。\n\
    \n**如何生成 MAC 地址？**\n\n介质访问控制（MAC）地址的目的是区分网络上的物理设备。你网络上的每个设备都必须具有唯一的 MAC 地址，通常联网设备的\
    \ MAC 地址由制造商嵌入其固件中，是半唯一的。但是，在这种情况下，你就是制造商，而你的草图（实际上）就是你正在创建的嵌入式设备的固件。因此，你需要为设备提供\
    \ MAC 地址。\n\nMAC 地址的前 6 个八位字节对设备制造商来说是唯一的；IEEE 负责管理这些地址的分配。但是，你可以在代码中分配一个本地管理的地址。\n\
    \nMAC 地址的第一个八位字节中有两个位用于定义 MAC 地址的某些方面。MAC 地址第一个八位字节的最低有效位是单播/组播（I/G）地址位，而次最低有效位是全局或本地（U/L）管理地址位。\n"
- fmt: "I/G 位用于指示目标 MAC 地址是单播地址还是多播地址。如果该位设置为 0，则为单播地址。如果该位设置为 1，则为多播地址。在分配本地管理地址时，应将此位设置为\
    \ 0。\n\nU/L 位用于指示 MAC 地址是固化地址（BIA）还是本地管理地址。当该位设置为 1 时，该 MAC 地址被识别为本地管理地址。\n\n\
    因此，有四组本地管理地址可以在你的网络上使用而无需担心冲突，假设没有其他开发者使用它们。这些地址是 `X2:XX:XX:XX:XX:XX`、`X6:XX:XX:XX:XX:XX`、`XA:XX:XX:XX:XX:XX`\
    \ 和 `XE:XX:XX:XX:XX:XX`（其中 `X` 应替换为适当的十六进制值）。\n\nIEEE 分配的 MAC 地址块的完整列表可在 [http://standards.ieee.org/develop/regauth/oui/oui.txt](http://standards.ieee.org/develop/regauth/oui/oui.txt)\
    \ 中找到。\n\n或许更有用的是，这里有一个如何构建一个简单 web 服务器的示例，该服务器向请求的客户端返回一个简短的 HTML 文档：\n\n```cpp\n\
    #include <Ethernet.h>\n\n#define HTTP_HEADER \"HTTP/1.0 200 OK\\r\\nServer: arduino\\\
    r\\nContent-Type: text/html\\r\\n\\r\\n\"\n\nint LED = 9;\n\n// network configuration.\
    \  gateway and subnet are optional.\nbyte mac[] = { 0xDE, 0xAD, 0xBE, 0xEF, 0xFE,\
    \ 0xED };\nbyte ip[] = { 192, 168, 1, 99 };\nbyte gateway[] = { 192, 168, 1, 1\
    \ };\nbyte subnet[] = { 255, 255, 255, 0 };\n\nServer server = Server(8080);\n\
    \nvoid setup()\n{\n  // sets the digital pin as output\n   pinMode(LED, OUTPUT);\n\
    \n// Start talking to the serial port\n  Serial.begin(9600);\n  Serial.println(\
    \ \"Start setup()\");\n\n// initialize the ethernet device\n  Serial.println(\"\
    Ethernet.begin()\");\n  Ethernet.begin(mac, ip, gateway, subnet );\n\n// start\
    \ listening for clients\n  Serial.println(\"server.begin()\");\n  server.begin();\n\
    \n// Flash the LED twice\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n  delay(1000);\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n\nSerial.println( \"Done setup()\\n\");\n\n}\n\nvoid loop(){\n  Client\
    \ client = server.available();\n  if (client) {\n\nSerial.println(\"Connection\
    \ from client\");\n    boolean current_line_is_blank = true;\n    while (client.connected())\
    \ {\n      digitalWrite(LED, HIGH);\n      if (client.available()) {\n       \
    \ char c = client.read();\n        Serial.print(c);\n\nif (c == '\\n' && current_line_is_blank)\
    \ {\n          client.println( HTTP_HEADER );\n          client.println();\n \
    \         Serial.println(\"Sent header\");\n\nclient.println(\"<html><head><title>Test</title></head><body>\"\
    );\n          client.println(\"<p>Test String</p>\");\n          client.println(\"\
    </body></html>\");\n          Serial.println(\"Sent page\");\n          break;\n\
    \        }\n        if (c == '\\n') {\n          current_line_is_blank = true;\n\
    \        } else if (c != '\\r') {\n          current_line_is_blank = false;\n\
    \        }\n      }\n    }\n    client.stop();\n    Serial.println(\"Closed client\
    \ connection\\n\");\n    digitalWrite(LED, LOW);\n\n}\n}\n```\n\n![1](callouts/1.png)\n\
    \nHTTP 请求以空行结束。我们在此处查找它，以便找到请求数据包的结尾。如果我们已经到达该行的末尾（接收到换行字符）并且该行为空，则 HTTP 请求已结束，我们现在可以发送回复。\n\
    \n![2](callouts/2.png)\n\n我们发送标准的 HTTP HEADER 响应。这与 HTML `<HEAD>` 块不同，而是所有 web\
    \ 服务器在发送请求的 HTML 页面之前返回的单独标头。\n\n虽然实现一个 web 服务器相对简单，但你也可以考虑使用 `Webduino` 库。这是一个用于\
    \ Arduino 的通用 web 服务器库，可在 [https://github.com/sirleech/Webduino](https://github.com/sirleech/Webduino)\
    \ 找到。它支持 URL 参数解析、处理 GET 和 POST 方法、Web 表单和图像，以及 JSON，并且重要的是，开箱即用支持 RESTful 接口。\n\
    \n下面的代码使用通用库重新实现了我们的简单 web 服务器：\n\n```cpp\n#include \"SPI.h\"\n#include \"Ethernet.h\"\
    \n#include \"WebServer.h\"\n\nstatic uint8_t mac[] = { 0xDE, 0xAD, 0xBE, 0xEF,\
    \ 0xFE, 0xED };\nstatic uint8_t ip[] = { 192, 168, 1, 99 };\n\n#define PREFIX\
    \ \"/\"\nWebServer webserver(PREFIX, 80);\n\nvoid helloCmd(WebServer &server,\
    \ WebServer::ConnectionType type, char *, bool) {\n  server.httpSuccess();\n \
    \ if (type != WebServer::HEAD){\n    P(helloMsg) = \"<html><head><title>Test</title></head><body><p>Test\
    \ String</p><body></html>\";\n    server.printP(helloMsg);\n  }\n}\n\nvoid setup()\
    \ {\n  Ethernet.begin(mac, ip);\n  webserver.setDefaultCommand(&helloCmd);\n \
    \ webserver.addCommand(\"index.html\", &helloCmd);\n  webserver.begin();\n}\n\n\
    void loop() {\n  char buff[64];\n  int len = 64;\n  webserver.processConnection(buff,\
    \ &len);\n}\n```\n\n现在我们有了一个 web 服务器，相对简单地提供一个 RESTful 接口，返回一个包含当前传感器读数的静态 JSON\
    \ 片段就变得可行了。解析此类文档是大多数 iPhone 应用的生命线，对于大多数人来说也将很熟悉。我不打算在此详述，但我在 *[Learning iPhone\
    \ Programming](http://oreilly.com/catalog/9780596806439/)* 中做了深入讨论。\n\n## 解析 JSON\n\
    \nJSON 是一种轻量级的数据交换格式，几乎人类可读，同时仍然易于机器解析。虽然 XML 面向文档，但 JSON 面向数据。如果你需要传输高度结构化的数据，应该使用\
    \ XML 来呈现它。然而，如果你的数据交换需求不那么苛刻，JSON 可能是一个不错的选择。\n\nJSON 相比于 XML 的明显优势在于，由于它面向数据并且（几乎）可以作为哈希映射来解析，因此不需要重量级的解析库。此外，JSON\
    \ 文档比等效的 XML 文档小得多。在带宽有限的情况下，例如在 iPhone 上可能会遇到的情况，这可能非常重要。传输相同数据时，JSON 文档通常消耗大约相当于等效\
    \ XML 文档一半的带宽。\n\n虽然 Cocoa Touch 框架本身不支持 JSON，但 Stig Brautaset 的 `json-framework`\
    \ 库同时实现了 JSON 解析器和生成器，并且可以相当简单地集成到你的项目中。你可以从 [http://code.google.com/p/json-framework/](http://code.google.com/p/json-framework/)\
    \ 下载包含该库最新版本的磁盘映像。"
  raw: "The I/G bit is used to signify if the destination MAC address is a unicast\
    \ or a multicast address. If the bit is set to 0, it is a unicast address. If\
    \ the bit is set to 1, it is a multicast address. You should set this bit to 0\
    \ when assigning locally administered addresses.\n\nThe U/L bit is used to tell\
    \ if the MAC address is the burned-in-address (BIA) or a locally administered\
    \ address. When the bit is set to 1, the MAC address is recognized as a locally\
    \ administered address.\n\nThere are therefore four sets of locally administered\
    \ addresses that can be used on your network without fear of conflict, assuming\
    \ there are no other developers making use of them. These are ***`X`**`2`**`:XX:XX:XX:XX:XX`***,\
    \ ***`X`**`6`**`:XX:XX:XX:XX:XX`***, ***`X`**`A`**`:XX:XX:XX:XX:XX`***, and ***`X`**`E`**`:XX:XX:XX:XX:XX`***\
    \ (where ***`X`*** should be replaced with an appropriate hexadecimal value).\n\
    \nA complete list of MAC address blocks assigned by the IEEE can be found at [http://standards.ieee.org/develop/regauth/oui/oui.txt](http://standards.ieee.org/develop/regauth/oui/oui.txt).\n\
    \nPerhaps more usefully, here is an example of how to build a simple web server\
    \ that returns a short HTML document to the requesting client:\n\n```\n#include\
    \ <Ethernet.h>\n\n#define HTTP_HEADER \"HTTP/1.0 200 OK\\r\\nServer: arduino\\\
    r\\nContent-Type: text/html\\r\\n\\r\\n\"\n\nint LED = 9;\n\n// network configuration.\
    \  gateway and subnet are optional.\nbyte mac[] = { 0xDE, 0xAD, 0xBE, 0xEF, 0xFE,\
    \ 0xED };\nbyte ip[] = { 192, 168, 1, 99 };\nbyte gateway[] = { 192, 168, 1, 1\
    \ };\nbyte subnet[] = { 255, 255, 255, 0 };\n\nServer server = Server(8080);\n\
    \nvoid setup()\n{\n  // sets the digital pin as output\n   pinMode(LED, OUTPUT);\n\
    \n// Start talking to the serial port\n  Serial.begin(9600);\n  Serial.println(\
    \ \"Start setup()\");\n\n// initialize the ethernet device\n  Serial.println(\"\
    Ethernet.begin()\");\n  Ethernet.begin(mac, ip, gateway, subnet );\n\n// start\
    \ listening for clients\n  Serial.println(\"server.begin()\");\n  server.begin();\n\
    \n// Flash the LED twice\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n  delay(1000);\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n\nSerial.println( \"Done setup()\\n\");\n\n}\n\nvoid loop(){\n  Client\
    \ client = server.available();\n  if (client) {\n\nSerial.println(\"Connection\
    \ from client\");\n    boolean current_line_is_blank = true;\n    while (client.connected())\
    \ {\n      digitalWrite(LED, HIGH);\n      if (client.available()) {\n       \
    \ char c = client.read();\n        Serial.print(c);\n\nif (c == '\\n' && current_line_is_blank)\
    \ {\n          client.println( HTTP_HEADER );\n          client.println();\n \
    \         Serial.println(\"Sent header\");\n\nclient.println(\"<html><head><title>Test</title></head><body>\"\
    );\n          client.println(\"<p>Test String</p>\");\n          client.println(\"\
    </body></html>\");\n          Serial.println(\"Sent page\");\n          break;\n\
    \        }\n        if (c == '\\n') {\n          current_line_is_blank = true;\n\
    \        } else if (c != '\\r') {\n          current_line_is_blank = false;\n\
    \        }\n      }\n    }\n    client.stop();\n    Serial.println(\"Closed client\
    \ connection\\n\");\n    digitalWrite(LED, LOW);\n\n}\n}\n```\n\n[![1](callouts/1.png)](#ch06.html#co15_id)\n\
    \nAn HTTP request ends with a blank line. We look for it here so we can find the\
    \ end of the request packet. If we’ve gotten to the end of the line (received\
    \ a newline character) and the line is blank, the HTTP request has ended, and\
    \ we can now send a reply.\n\n[![2](callouts/2.png)](#ch06.html#co16_id)\n\nWe\
    \ send the standard HTTP HEADER response. This is not the same thing as the HTML\
    \ <HEAD> block, but instead is a separate header that all web servers return before\
    \ sending the requested HTML page.\n\nWhile it’s relatively simple to implement\
    \ a web server, you may want to make use of the Webduino library instead. This\
    \ is a generic web server library for the Arduino, and it can be found at [https://github.com/sirleech/Webduino](https://github.com/sirleech/Webduino).\
    \ It supports URL parameter parsing, handling of GET and POST methods, and web\
    \ forms and images, as well as JSON and, importantly, support for RESTful interfaces\
    \ out of the box.\n\nThe code below reimplements our simple web server using the\
    \ generic library:\n\n```\n#include \"SPI.h\"\n#include \"Ethernet.h\"\n#include\
    \ \"WebServer.h\"\n\nstatic uint8_t mac[] = { 0xDE, 0xAD, 0xBE, 0xEF, 0xFE, 0xED\
    \ };\nstatic uint8_t ip[] = { 192, 168, 1, 99 };\n\n#define PREFIX \"/\"\nWebServer\
    \ webserver(PREFIX, 80);\n\nvoid helloCmd(WebServer &server, WebServer::ConnectionType\
    \ type, char *, bool) {\n  server.httpSuccess();\n  if (type != WebServer::HEAD){\n\
    \    P(helloMsg) = \"<html><head><title>Test</title></head><body><p>Test String</p><body></html>\"\
    ;\n    server.printP(helloMsg);\n  }\n}\n\nvoid setup() {\n  Ethernet.begin(mac,\
    \ ip);\n  webserver.setDefaultCommand(&helloCmd);\n  webserver.addCommand(\"index.html\"\
    , &helloCmd);\n  webserver.begin();\n}\n\nvoid loop() {\n  char buff[64];\n  int\
    \ len = 64;\n  webserver.processConnection(buff, &len);\n}\n```\n\nNow that we\
    \ have a web server, it’s relatively simple to provide a RESTful interface returning\
    \ a static piece of JSON with a current sensor reading embedded in it. Parsing\
    \ such documents is the lifeblood of most iPhone applications and will be familiar\
    \ to most of you. I’m not going to talk about it here, but I did cover it extensively\
    \ in *[Learning iPhone Programming](http://oreilly.com/catalog/9780596806439/)*.\n\
    \nParsing JSON\n\nJSON is a lightweight data-interchange format that is more or\
    \ less human-readable but still easily machine-parsable. While XML is document-oriented,\
    \ JSON is data-oriented. If you need to transmit a highly structured piece of\
    \ data, you should probably render it in XML. However, if your data exchange needs\
    \ are somewhat less demanding, JSON might be a good option.\n\nThe obvious advantage\
    \ JSON has over XML is that since it is data-oriented and (almost) parsable as\
    \ a hash map, there is no requirement for heavyweight parsing libraries. Additionally,\
    \ JSON documents are much smaller than the equivalent XML documents. In bandwidth-limited\
    \ situations, such as you might find on the iPhone, this can be important. JSON\
    \ documents normally consume around half of the bandwidth of an equivalent XML\
    \ document to transfer the same data.\n\nWhile there is no native support for\
    \ JSON in the Cocoa Touch framework, Stig Brautaset’s *json-framework* library\
    \ implements both a JSON parser and a generator and can be integrated into your\
    \ project fairly simply. You can download the disk image with the latest version\
    \ of the library from [http://code.google.com/p/json-framework/](http://code.google.com/p/json-framework/)."
  trans: "\nI/G 位用于指示目标 MAC 地址是**单播地址**还是**多播地址**。如果该位设置为 0，则为单播地址。如果该位设置为 1，则为多播地址。在分配本地管理地址时，应将此位设置为\
    \ 0。\n\nU/L 位用于指示 MAC 地址是固化地址（BIA）还是**本地管理地址**。当该位设置为 1 时，该 MAC 地址被识别为本地管理地址。\n\
    \n因此，有四组本地管理地址可以在你的网络上使用而无需担心冲突，假设没有其他开发者使用它们。这些地址是 `X2:XX:XX:XX:XX:XX`、`X6:XX:XX:XX:XX:XX`、`XA:XX:XX:XX:XX:XX`\
    \ 和 `XE:XX:XX:XX:XX:XX`（其中 `X` 应替换为适当的十六进制值）。\n\nIEEE 分配的 MAC 地址块的完整列表可在 [`standards.ieee.org/develop/regauth/oui/oui.txt`](http://standards.ieee.org/develop/regauth/oui/oui.txt)\
    \ 中找到。\n\n或许更有用的是，这里有一个如何构建一个简单 web 服务器的示例，该服务器向请求的客户端返回一个简短的 HTML 文档：\n\n```cpp\n\
    #include <Ethernet.h>\n\n#define HTTP_HEADER \"HTTP/1.0 200 OK\\r\\nServer: arduino\\\
    r\\nContent-Type: text/html\\r\\n\\r\\n\"\n\nint LED = 9;\n\n// network configuration.\
    \  gateway and subnet are optional.\nbyte mac[] = { 0xDE, 0xAD, 0xBE, 0xEF, 0xFE,\
    \ 0xED };\nbyte ip[] = { 192, 168, 1, 99 };\nbyte gateway[] = { 192, 168, 1, 1\
    \ };\nbyte subnet[] = { 255, 255, 255, 0 };\n\nServer server = Server(8080);\n\
    \nvoid setup()\n{\n  // sets the digital pin as output\n   pinMode(LED, OUTPUT);\n\
    \n// Start talking to the serial port\n  Serial.begin(9600);\n  Serial.println(\
    \ \"Start setup()\");\n\n// initialize the ethernet device\n  Serial.println(\"\
    Ethernet.begin()\");\n  Ethernet.begin(mac, ip, gateway, subnet );\n\n// start\
    \ listening for clients\n  Serial.println(\"server.begin()\");\n  server.begin();\n\
    \n// Flash the LED twice\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n  delay(1000);\n  digitalWrite(LED, HIGH);\n  delay(1000);\n  digitalWrite(LED,\
    \ LOW);\n\nSerial.println( \"Done setup()\\n\");\n\n}\n\nvoid loop(){\n  Client\
    \ client = server.available();\n  if (client) {\n\nSerial.println(\"Connection\
    \ from client\");\n    boolean current_line_is_blank = true;\n    while (client.connected())\
    \ {\n      digitalWrite(LED, HIGH);\n      if (client.available()) {\n       \
    \ char c = client.read();\n        Serial.print(c);\n\nif (c == '\\n' && current_line_is_blank)\
    \ {\n          client.println( HTTP_HEADER );\n          client.println();\n \
    \         Serial.println(\"Sent header\");\n\nclient.println(\"<html><head><title>Test</title></head><body>\"\
    );\n          client.println(\"<p>Test String</p>\");\n          client.println(\"\
    </body></html>\");\n          Serial.println(\"Sent page\");\n          break;\n\
    \        }\n        if (c == '\\n') {\n          current_line_is_blank = true;\n\
    \        } else if (c != '\\r') {\n          current_line_is_blank = false;\n\
    \        }\n      }\n    }\n    client.stop();\n    Serial.println(\"Closed client\
    \ connection\\n\");\n    digitalWrite(LED, LOW);\n\n}\n}\n```\n\n![1](img/1.png)\n\
    \nHTTP 请求以空行结束。我们在此处查找它，以便找到请求数据包的结尾。如果我们已经到达该行的末尾（接收到换行字符）并且该行为空，则 HTTP 请求已结束，我们现在可以发送回复。\n\
    \n![2](img/2.png)\n\n我们发送标准的 HTTP HEADER 响应。这与 HTML `<HEAD>` 块不同，而是所有 web 服务器在发送请求的\
    \ HTML 页面之前返回的单独标头。\n\n虽然实现一个 web 服务器相对简单，但你也可以考虑使用 `Webduino` 库。这是一个用于 Arduino\
    \ 的通用 web 服务器库，可在 [`github.com/sirleech/Webduino`](https://github.com/sirleech/Webduino)\
    \ 找到。它支持 URL 参数解析、处理 GET 和 POST 方法、Web 表单和图像，以及 JSON，并且重要的是，开箱即用支持 RESTful 接口。\n\
    \n下面的代码使用通用库重新实现了我们的简单 web 服务器：\n\n```cpp\n#include \"SPI.h\"\n#include \"Ethernet.h\"\
    \n#include \"WebServer.h\"\n\nstatic uint8_t mac[] = { 0xDE, 0xAD, 0xBE, 0xEF,\
    \ 0xFE, 0xED };\nstatic uint8_t ip[] = { 192, 168, 1, 99 };\n\n#define PREFIX\
    \ \"/\"\nWebServer webserver(PREFIX, 80);\n\nvoid helloCmd(WebServer &server,\
    \ WebServer::ConnectionType type, char *, bool) {\n  server.httpSuccess();\n \
    \ if (type != WebServer::HEAD){\n    P(helloMsg) = \"<html><head><title>Test</title></head><body><p>Test\
    \ String</p><body></html>\";\n    server.printP(helloMsg);\n  }\n}\n\nvoid setup()\
    \ {\n  Ethernet.begin(mac, ip);\n  webserver.setDefaultCommand(&helloCmd);\n \
    \ webserver.addCommand(\"index.html\", &helloCmd);\n  webserver.begin();\n}\n\n\
    void loop() {\n  char buff[64];\n  int len = 64;\n  webserver.processConnection(buff,\
    \ &len);\n}\n```\n\n现在我们有了一个 web 服务器，相对简单地提供一个 RESTful 接口，返回一个包含当前传感器读数的静态 JSON\
    \ 片段就变得可行了。解析此类文档是大多数 iPhone 应用的生命线，对于大多数人来说也将很熟悉。我不打算在此详述，但我在 *[Learning iPhone\
    \ Programming](http://oreilly.com/catalog/9780596806439/)* 中做了深入讨论。\n\n## 解析 JSON\n\
    \nJSON 是一种轻量级的数据交换格式，几乎人类可读，同时仍然易于机器解析。虽然 XML 面向文档，但 JSON 面向数据。如果你需要传输高度结构化的数据，应该使用\
    \ XML 来呈现它。然而，如果你的数据交换需求不那么苛刻，JSON 可能是一个不错的选择。\n\nJSON 相比于 XML 的明显优势在于，由于它面向数据并且（几乎）可以作为哈希映射来解析，因此不需要重量级的解析库。此外，JSON\
    \ 文档比等效的 XML 文档小得多。在带宽有限的情况下，例如在 iPhone 上可能会遇到的情况，这可能非常重要。传输相同数据时，JSON 文档通常消耗大约相当于等效\
    \ XML 文档一半的带宽。\n\n虽然 Cocoa Touch 框架本身不支持 JSON，但 Stig Brautaset 的 `json-framework`\
    \ 库同时实现了 JSON 解析器和生成器，并且可以相当简单地集成到你的项目中。你可以从 [`code.google.com/p/json-framework/`](http://code.google.com/p/json-framework/)\
    \ 下载包含该库最新版本的磁盘映像。\n"
- fmt: '# Using WiFi


    If your sensor bundle or equipment isn’t stationary, or conveniently close to
    wired Ethernet, there are also WiFi shields available. One of the more commonly
    used shields is SparkFun’s `WiFly` shield (see [Figure 6-2](#ch06.html#arduino_wifly_shield_open_parenthesis_to
    "Figure 6-2. Arduino WiFly Shield (top) and Arduino Diecimila (bottom)")). The
    `WiFly` shield can be bought directly from [SparkFun](http://www.sparkfun.com/products/9954)
    for $89.95. A library to allow you to make easy use of the shield can be downloaded
    from [https://github.com/sparkfun/WiFly-Shield](https://github.com/sparkfun/WiFly-Shield).
    Unfortunately, the `WiFly`, along with most other WiFi shields currently on the
    market, is quite expensive.


    ![Arduino WiFly Shield (top) and Arduino Diecimila (bottom)](httpatomoreillycomsourceoreillyimages895986.png.jpg)


    Figure 6-2. Arduino WiFly Shield (top) and Arduino Diecimila (bottom)


    Interestingly, having dealt with `XBee` radio modules earlier in the book, there
    is also now an `XBee WiFi` radio module that supports the IEEE 802.11 wireless
    standard rather than the IEEE 802.15.4 point-to-point standard. This module is
    pin-compatible with the existing Series 1 and 2 modules. More information can
    be found at [http://www.digi.com/products/wireless-wired-embedded-solutions/zigbee-rf-modules/point-multipoint-rfmodules/xbee-wi-fi#overview](http://www.digi.com/products/wireless-wired-embedded-solutions/zigbee-rf-modules/point-multipoint-rfmodules/xbee-wi-fi#overview).


    If you’re making extensive use of `XBee` modules, this option might allow you
    bridge your sensor network onto the Internet without a large additional expense.


    # Using a Soft Modem


    Until the arrival of the `Redpark` cable, the easiest way to connect hardware
    directly was by using a soft modem. A well-known example of this practice is the
    Square credit card reader (see [Figure 6-3](#ch06s02.html#the_square_credit_card_reader
    "Figure 6-3. The Square credit card reader")).


    ![The Square credit card reader](httpatomoreillycomsourceoreillyimages895988.png.jpg)


    Figure 6-3. The Square credit card reader


    When you swipe the credit card with the Square reader, it reads the data and converts
    it into an analog audio signal. The audio signal is then picked up by the microphone,
    processed, and routed to the Square iOS app, where it is converted back into digital.


    ## Switch Science Board


    The Audio Jack Modem for iPhone and Android from Switch Science is [available
    from SparkFun](http://www.sparkfun.com/products/10331) for $11.95 (see [Figure
    6-4](#ch06s02.html#the_switch_science_softmodem_board "Figure 6-4. The Switch
    Science SoftModem Board")).


    ![The Switch Science SoftModem Board](httpatomoreillycomsourceoreillyimages895990.png.jpg)


    Figure 6-4. The Switch Science SoftModem Board


    This is a fairly simple board that more-or-less mimics the Square reader solution,
    except that it provides `TTL` serial. See [http://code.google.com/p/arms22/wiki/SoftModemBreakoutBoard](http://code.google.com/p/arms22/wiki/SoftModemBreakoutBoard)
    for more details about the `SoftModem Board`, along with sample code and the supporting
    libraries for both iOS and Arduino.


    ### Warning


    The documentation for this board is in Japanese. However between Google Translate
    and the code samples available on the page, it’s not too hard to work out how
    to use the board.


    ## HiJack Board


    While it makes use of similar technology, the `HiJack` board (see [Figure 6-5](#ch06s02.html#the_hijack_board_open_parenthesis_right
    "Figure 6-5. The HiJack board (right) and programmer (left)")) is slightly different
    from the `Switch Science` board. Interestingly, it includes its own microcontroller
    on board, which is powered by harvesting power directly from the iPhone. The harvester
    can supply 7.4 mW to a load with 47% power conversion efficiency when driven by
    a 22 kHz tone. It was developed at the University of Michigan and was intended
    to allow the development of simple medical hardware that could be easily deployed
    into the developing world. More information about `HiJack` project can be found
    at [http://www.eecs.umich.edu/~prabal/projects/hijack/](http://www.eecs.umich.edu/~prabal/projects/hijack/).


    ![The HiJack board (right) and programmer (left)](httpatomoreillycomsourceoreillyimages895992.png.jpg)


    Figure 6-5. The HiJack board (right) and programmer (left)


    You can purchase a `HiJack` board as part of a development kit that includes a
    board, a programmer, two proto-boards, and jumper wires from Seeed Studio ([http://www.seeedstudio.com/depot/hijack-development-pack-p-865.html](http://www.seeedstudio.com/depot/hijack-development-pack-p-865.html))
    for $79.


    More information about the development kit can be found on the [vendor’s wiki
    site](http://garden.seeedstudio.com/index.php?title=Hijack#Introduction).


    # Using the MIDI Protocol


    With the arrival of the iPad and the camera connection kit (available from the
    Apple Store, [http://store.apple.com/us/product/MC531ZM/A](http://store.apple.com/us/product/MC531ZM/A)),
    it became possible to directly connect USB devices to the iPad (see [Figure 6-6](#ch06s03.html#the_usb_dongle_from_the_ipad_camera_conn
    "Figure 6-6. The USB dongle from the iPad Camera Connection Kit")). While most
    USB-HID profiles are not supported, and the connector was originally intended
    only to allow you to transfer images from a connected camera onto your iPad, there
    is an interesting exception. The connector also allows your iPad to talk directly
    to USB MIDI devices.


    ![The USB dongle from the iPad Camera Connection Kit](httpatomoreillycomsourceoreillyimages895994.png.jpg)


    Figure 6-6. The USB dongle from the iPad Camera Connection Kit


    ### Note


    Before iOS 4.x, the USB dongle from the iPad Camera Connection Kit also allowed
    you to connect USB accessories to the iPhone 4. Unfortunately, with this revision
    of the operating system, a change to the phone’s firmware was made that meant
    that a lower amperage was provided to the Dock connector and USB devices no longer
    had enough power to function.


    There are a number of MIDI shields for the Arduino on the market including the
    [SparkFun shield](http://www.sparkfun.com/products/9595) (see [Figure 6-7](#ch06s03.html#arduino_uno_with_midi_shield
    "Figure 6-7. Arduino Uno with MIDI shield")). [Figure 6-8](#ch06s03.html#an_arduino_connected_to_an_ipad_running
    "Figure 6-8. An Arduino connected to an iPad running standard off-the-shelf MIDI-enabled
    software via a MIDI shield and the Camera Connection Kit") shows this shield connected
    via a `Screw Shield` to an `Arduino Uno` board. This project (see [https://github.com/bjepson/iPad-MIDI-Simple-Demo](https://github.com/bjepson/iPad-MIDI-Simple-Demo)
    for more details) allows you to control off-the-shelf MIDI software on your iPad
    directly from an Arduino board.


    ![Arduino Uno with MIDI shield](httpatomoreillycomsourceoreillyimages895996.png.jpg)


    Figure 6-7. Arduino Uno with MIDI shield


    ![An Arduino connected to an iPad running standard off-the-shelf MIDI-enabled
    software via a MIDI shield and the Camera Connection Kit](httpatomoreillycomsourceoreillyimages895998.png.jpg)


    Figure 6-8. An Arduino connected to an iPad running standard off-the-shelf MIDI-enabled
    software via a MIDI shield and the Camera Connection Kit


    Interestingly, the availability and flexibility of the `MIDI` protocol means that
    when talking to an Arduino, pretending to be a MIDI device, there isn’t any real
    need for the `MIDI` protocol to do what most people expect of it. Effectively
    we can pervert the protocol to allow you to embed arbitrary serial data in the
    `MIDI` packets. While I doubt such an application abusing the protocol would make
    it past the review team into the `App Store` (by some measures of things quite
    rightly so), it is possible.'
