    # 使用 WiFi


    如果你的传感器组件或设备不是固定安装的，或者不方便靠近有线以太网，也可以使用 WiFi 扩展板。目前比较常用的扩展板之一是 SparkFun 的 `WiFly`
    扩展板（见图 6-2）。`WiFly` 扩展板可以直接从 [SparkFun](http://www.sparkfun.com/products/9954)
    购买，价格为 89.95 美元。你可以从 [`github.com/sparkfun/WiFly-Shield`](https://github.com/sparkfun/WiFly-Shield)
    下载相关库，从而轻松使用该扩展板。遗憾的是，`WiFly` 以及市面上大多数其他 WiFi 扩展板都相当昂贵。


    ![Arduino WiFly Shield (top) and Arduino Diecimila (bottom)](img/httpatomoreillycomsourceoreillyimages895986.png.jpg)


    图 6-2. Arduino WiFly 扩展板（上）与 Arduino Diecimila（下）


    有趣的是，既然本书前面已经介绍过 `XBee` 无线电模块，现在市面上还出现了一种 `XBee WiFi` 无线电模块，它支持 IEEE 802.11 无线标准，而非
    IEEE 802.15.4 点对点标准。该模块与现有的 Series 1 和 Series 2 模块引脚兼容。更多信息可访问 [`www.digi.com/products/wireless-wired-embedded-solutions/zigbee-rf-modules/point-multipoint-rfmodules/xbee-wi-fi#overview`](http://www.digi.com/products/wireless-wired-embedded-solutions/zigbee-rf-modules/point-multipoint-rfmodules/xbee-wi-fi#overview)。


    如果你正在大量使用 `XBee` 模块，此选项可能让你无需花费额外大成本即可将传感器网络连接到互联网。


    # 使用软调制解调器


    在 `Redpark` 数据线问世之前，将硬件直接连接到设备的最简单方法是使用软调制解调器。这种做法的一个著名例子是 Square 信用卡读卡器（见图 6-3）。


    ![The Square credit card reader](img/httpatomoreillycomsourceoreillyimages895988.png.jpg)


    图 6-3. Square 信用卡读卡器


    当你在 Square 读卡器上刷卡时，它会读取数据并将其转换成模拟音频信号。然后，音频信号被麦克风拾取、处理并传输到 iOS 版 Square 应用中，在那里再转换回数字信号。


    ## Switch Science 板


    Switch Science 推出的适用于 iPhone 和 Android 的音频插孔调制解调器可从 [SparkFun](http://www.sparkfun.com/products/10331)
    购买，价格为 11.95 美元（见图 6-4）。


    ![The Switch Science SoftModem Board](img/httpatomoreillycomsourceoreillyimages895990.png.jpg)


    图 6-4. Switch Science 软调制解调器板


    这是一块相当简单的板子，或多或少地模仿了 Square 读卡器的方案，区别在于它提供了 `TTL` 串行接口。有关 `SoftModem Board` 的更多详细信息，以及适用于
    iOS 和 Arduino 的示例代码和支持库，请访问 [`code.google.com/p/arms22/wiki/SoftModemBreakoutBoard`](http://code.google.com/p/arms22/wiki/SoftModemBreakoutBoard)。


    ### 警告


    该板子的文档是日文的。不过，借助谷歌翻译和页面上的代码示例，弄清楚如何使用该板子并不太难。


    ## HiJack 板


    虽然使用了类似的技术，但 `HiJack` 板（见图 6-5）与 `Switch Science` 板略有不同。有趣的是，它板载了自己的微控制器，该控制器直接通过从
    iPhone 获取的能量供电。当由 22 kHz 音调驱动时，能量捕获器能以 47% 的功率转换效率向负载提供 7.4 mW 的电力。该板由密歇根大学开发，旨在支持开发可轻松部署到发展中国家的简易医疗硬件。更多关于
    `HiJack` 项目的信息可访问 [`www.eecs.umich.edu/~prabal/projects/hijack/`](http://www.eecs.umich.edu/~prabal/projects/hijack/)。


    ![The HiJack board (right) and programmer (left)](img/httpatomoreillycomsourceoreillyimages895992.png.jpg)


    图 6-5. HiJack 板（右）与编程器（左）


    你可以从 Seeed Studio ([`www.seeedstudio.com/depot/hijack-development-pack-p-865.html`](http://www.seeedstudio.com/depot/hijack-development-pack-p-865.html))
    购买 `HiJack` 板，作为开发套件的一部分，该套件包含一块板子、一个编程器、两块原型板和跳线，价格为 79 美元。


    有关该开发套件的更多信息，请访问 [供应商的维基网站](http://garden.seeedstudio.com/index.php?title=Hijack#Introduction)。


    # 使用 MIDI 协议


    随着 iPad 和相机连接套件（可从苹果商店购买，[`store.apple.com/us/product/MC531ZM/A`](http://store.apple.com/us/product/MC531ZM/A)）的问世，将
    USB 设备直接连接到 iPad 成为可能（见图 6-6）。虽然大多数 USB-HID 配置文件不受支持，并且该连接器最初仅用于让你将已连接相机的图像传输到
    iPad，但有一个有趣的例外。该连接器还允许你的 iPad 直接与 USB MIDI 设备通信。


    ![The USB dongle from the iPad Camera Connection Kit](img/httpatomoreillycomsourceoreillyimages895994.png.jpg)


    图 6-6. iPad 相机连接套件中的 USB 适配器


    ### 注意


    在 iOS 4.x 之前，iPad 相机连接套件中的 USB 适配器也允许你将 USB 配件连接到 iPhone 4。不幸的是，在这次操作系统更新中，对手机固件进行了更改，导致提供给
    Dock 连接器的电流降低，USB 设备因此不再有足够的电力运行。


    市面上有多种适用于 Arduino 的 MIDI 扩展板，包括 [SparkFun 的扩展板](http://www.sparkfun.com/products/9595)（见图
    6-7）。图 6-8 展示了该扩展板通过一个 `Screw Shield` 连接到一个 `Arduino Uno` 板。该项目（详见 [`github.com/bjepson/iPad-MIDI-Simple-Demo`](https://github.com/bjepson/iPad-MIDI-Simple-Demo)）允许你直接从
    Arduino 板控制 iPad 上现成的 MIDI 软件。


    ![Arduino Uno with MIDI shield](img/httpatomoreillycomsourceoreillyimages895996.png.jpg)


    图 6-7. 带有 MIDI 扩展板的 Arduino Uno


    ![An Arduino connected to an iPad running standard off-the-shelf MIDI-enabled
    software via a MIDI shield and the Camera Connection Kit](img/httpatomoreillycomsourceoreillyimages895998.png.jpg)


    图 6-8. 通过 MIDI 扩展板和相机连接套件连接到运行标准现成 MIDI 软件的 iPad 的 Arduino


    有趣的是，`MIDI` 协议的可用性和灵活性意味着，在与 Arduino 通信（使其模拟成 MIDI 设备）时，实际上并不需要 `MIDI` 协议去完成大多数人期望它做的事情。实际上，我们可以扭曲该协议，从而允许你在
    `MIDI` 数据包中嵌入任意串行数据。虽然我怀疑这种滥用协议的应用能否通过审核团队进入 `App Store`（从某些标准来看，这完全合理），但技术上是可行的。

    '
- fmt: '## The HIDDUINO


    The latest generation of Arduino boards, including the Arduino Uno, replaces the
    commonly used FTDI USB chip with an `Atmega8u2` microcontroller. This is an interesting
    development, as this means that the latest generation of Arduinos are effectively
    dual-core, and if you''re not intending to make use of the USB connection, the
    secondary microcontroller intended for USB serial communication can be reused
    for other purposes. Among these would be to replace the current firmware with
    new firmware conforming to the USB-HID protocol. In essence, this means the Arduino
    board can appear to be a mouse, keyboard, joystick, or any other USB device to
    the host computer. Importantly, this can be done without the addition of any new
    driver software on the host computer end. To your Mac, the Arduino will just look
    like a normal USB device.


    ### Note


    The `Atmega8u2` can be easy reprogrammed with an off-the-shelf AVR programmer
    or flashed with a new firmware using the DFU bootloader.


    One of the things that can be done is to reflash the microcontroller to enable
    the Arduino to be seen as a MIDI HID device, thus removing the need for custom
    interpretation or conversion software. MIDI-enabled programs on your iPad will
    be able to see the Arduino directly, without the need for a MIDI shield or other
    hardware. You''ll also be able to talk to the Arduino board using the MIDI framework,
    which is part of the iOS SDK. See [http://mtiid.calarts.edu/research/hiduino](http://mtiid.calarts.edu/research/hiduino)
    for more details.


    ## Summary


    The method you use to connect hardware to your iOS device obviously depends quite
    critically on what hardware you''re using, and why you wanted to connect the hardware
    to your iPhone or iPad in the first place. Hopefully this chapter has pointed
    you toward some alternative solutions if directly connecting the hardware to your
    iPhone via a serial connection isn''t what you needed to do.


    ## About the Author


    Alasdair Allan is a senior research fellow in Astronomy at the University of Exeter,
    where he is building an autonomous, distributed peer-to-peer network of telescopes
    that reactively schedule observations of time-critical events. He also runs a
    small technology consulting business writing bespoke software and building open
    hardware, and is currently developing a series of iPhone applications to monitor
    and manage cloud-based services and distributed sensor networks.'
  raw: '## The HIDDUINO


    The latest generation of Arduino boards, including the Arduino Uno, replaces the
    commonly used FTDI USB chip with an Atmega8u2 microcontroller. This is an interesting
    development, as this means that the latest generation of Arduinos are effectively
    dual-core, and if you’re not intending to make use of the USB connection, the
    secondary microcontroller intended for USB serial communication can be reused
    for other purposes. Among these would be to replace the current firmware with
    new firmware conforming to the USB-HID protocol. In essence, this means the Arduino
    board can appear to be a mouse, keyboard, joystick, or any other USB device to
    the host computer. Importantly, this can be done without the addition of any new
    driver software on the host computer end. To your Mac, the Arduino will just look
    like a normal USB device.


    ### Note


    The Atmega8u2 can be easy reprogrammed with an off-the-shelf AVR programmer or
    flashed with a new firmware using the DFU bootloader.


    One of the things that can be done is to reflash the microcontroller to enable
    the Arduino to be seen as a MIDI HID device, thus removing the need for custom
    interpretation or conversion software. MIDI-enabled programs on your iPad will
    be able to see the Arduino directly, without the need for a MIDI shield or other
    hardware. You’ll also be able to talk to the Arduino board using the MIDI framework,
    which is part of the iOS SDK. See [http://mtiid.calarts.edu/research/hiduino](http://mtiid.calarts.edu/research/hiduino)
    for more details.


    # Summary


    The method you use to connect hardware to your iOS device obviously depends quite
    critically on what hardware you’re using, and why you wanted to connect the hardware
    to your iPhone or iPad in the first place. Hopefully this chapter has pointed
    you toward some alternative solutions if directly connecting the hardware to your
    iPhone via a serial connection isn’t what you needed to do.


    # About the Author


    Alasdair Allan is a senior research fellow in Astronomy at the University of Exeter,
    where he is building an autonomous, distributed peer-to-peer network of telescopes
    that reactively schedule observations of time-critical events. He also runs a
    small technology consulting business writing bespoke software and building open
    hardware, and is currently developing a series of iPhone applications to monitor
    and manage cloud-based services and distributed sensor networks.'
  trans: "  \n## HIDDUINO  \n\n最新一代的 Arduino 开发板（包括 Arduino Uno）将常用的 FTDI USB 芯片替换为\
    \ `Atmega8u2` 微控制器。这是一个有趣的进展，因为这意味著最新一代的 Arduino 实际上具有双核处理能力——如果你不打算使用 USB 连接，原本用于\
    \ USB 串行通信的辅助微控制器可以被重新用于其他用途。其中一种用途是将其当前固件替换为符合 USB-HID 协议的新固件。本质上，这意味着 Arduino\
    \ 开发板可以在主机电脑上被识别为鼠标、键盘、摇杆或任何其他 USB 设备。重要的是，这一切无需在主机电脑端安装任何新驱动软件。对于你的 Mac 而言，Arduino\
    \ 看起来就是一个普通的 USB 设备。  \n\n### 注意  \n\n`Atmega8u2` 可以使用现成的 AVR 编程器轻松重新编程，或者通过 DFU\
    \ 引导加载程序刷写新固件。  \n\n其中一种可操作的方式是重新刷写该微控制器，使 Arduino 被识别为 MIDI HID 设备，从而无需自定义解析或转换软件。你的\
    \ iPad 上支持 MIDI 的程序将能直接识别 Arduino，无需 MIDI 扩展板或其他硬件。你还可以使用 iOS SDK 中的 MIDI 框架与\
    \ Arduino 开发板进行通讯。详情请参见 [`mtiid.calarts.edu/research/hiduino`](http://mtiid.calarts.edu/research/hiduino)。\
    \  \n\n## 总结  \n\n将硬件连接到 iOS 设备的方法显然在很大程度上取决于你使用的硬件类型，以及最初将硬件连接到 iPhone 或 iPad\
    \ 的目的。如果你不需要通过串行连接直接将硬件连接到 iPhone，希望本章为你提供了一些替代方案。  \n\n## 关于作者  \n\nAlasdair\
    \ Allan 是埃克塞特大学天文学系的高级研究员，正在构建一个自主、分布式、对等网络的望远镜系统，该系统能够反应式地调度对时间关键事件的观测。他还经营一家小型技术咨询公司，专注于编写定制软件和构建开源硬件，并正在开发一系列用于监控和管理云端服务及分布式传感器网络的\
    \ iPhone 应用程序。  \n"
