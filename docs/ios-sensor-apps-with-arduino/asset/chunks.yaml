    ![The SparkFun RS-232 Shifter SMD (sku: PRT-00449)](httpatomoreillycomsourceoreillyimages895864.png.jpg)


    Figure 2-4. The SparkFun RS-232 Shifter SMD (sku: PRT-00449)


    As you can see from [Figure 2-4](#ch02s03.html#the_sparkfun_rs-232_shifter_smd_open_par
    "Figure 2-4. The SparkFun RS-232 Shifter SMD (sku: PRT-00449)"), the TTL end has
    four wires: RX, TX, GND, and VCC (5V). The easiest way to connect this to our
    Arduino is to solder some snapable header pins to four lengths of single core
    wire (see [Figure 2-5](#ch02s03.html#single_core_wire_open_parenthesis_top_cl
    "Figure 2-5. Single core wire (top) and snapable header pins (bottom)")) and build
    a custom jumper cable (see [Figure 2-6](#ch02s03.html#the_completed_jumper_cable
    "Figure 2-6. The completed jumper cable")). You can, of course, just make use
    of premade jumper cables; the Maker Shed, for instance, sells a set of [Breadboard
    Jumper Wires](http://www.makershed.com/ProductDetails.asp?ProductCode=MKSEEED3)
    that you could use instead of soldering up your own cable.


    ![Single core wire (top) and snapable header pins (bottom)](httpatomoreillycomsourceoreillyimages895866.png.jpg)


    Figure 2-5. Single core wire (top) and snapable header pins (bottom)


    ![The completed jumper cable](httpatomoreillycomsourceoreillyimages895869.png.jpg)


    Figure 2-6. The completed jumper cable


    Once you have bought or built your jumper cable, connect the Redpark Serial Cable
    to your RS-232 to TTL serial adaptor, and that in turn (using your jumper cable)
    to your Arduino board, as shown in [Figure 2-7](#ch02s03.html#connecting_the_cable_to_the_arduino
    "Figure 2-7. Connecting the cable to the Arduino").


    ![Connecting the cable to the Arduino](httpatomoreillycomsourceoreillyimages895871.png.jpg)


    Figure 2-7. Connecting the cable to the Arduino


    To do so, connect the VCC pin of your adaptor to the 5V pin on the Arduino, the
    GND pin to one of the available GND pins on the Arduino, the RX pin on the adaptor
    to the TX pin on the Arduino, and the TX pin on the adaptor to the RX pin on the
    Arduino.


    ### Warning


    The receive (RX) pin on your Arduino board (pin 0) must be routed to the transmit
    (TX) pin on your adaptor, and the transmit (TX) pin on the Arduino board (pin
    1) must in turn be connected to the receive (RX) pin on your adaptor. If these
    are not correctly connected, your applications will not work. Do *not* connect
    RX to RX and TX to TX.


    You can power the Arduino board either via a USB cable, plugged into your Mac
    or a wall adaptor, or via a battery pack. Since I had one lying around, I used
    a battery pack, but it’s entirely up to you.


    # Connecting to an iOS Device


    Once you’ve powered your Arduino, and hence the RS-232 to TTL serial adaptor,
    the only thing left to do is plug the Redpark Serial Cable into your iOS device
    ([Figure 2-8](#ch02s04.html#powering_the_arduino_comma_and_connectin "Figure 2-8. Powering
    the Arduino, and connecting the cable to the iPhone")).


    Unfortunately, we’re going to spend a lot of time plugging and unplugging our
    iPhone or iPad from the Redpark cable, as we’ll need to plug the device into our
    Mac to deploy our development code to it.


    ![Powering the Arduino, and connecting the cable to the iPhone](httpatomoreillycomsourceoreillyimages895873.png.jpg)


    Figure 2-8. Powering the Arduino, and connecting the cable to the iPhone


    For now, however, we’re good to go. Let’s go ahead and write some code to demonstrate
    the cable.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将以下英文文本翻译成中文。



    # 测试线缆


    在我们开始编写使用线缆的代码之前，有两种方法可以测试线缆是否工作正常。首先，当线缆插入后，“设置”应用程序中应该会出现一个新条目；如果你转到 `通用→关于本机→串行线缆`，你应该能看到类似
    图 2-2 的内容。如果线缆已插入 iOS 设备，但你没有看到此设置条目，或者条目似乎有问题，那么你的线缆可能存在问题。


    ![在“设置”应用程序中检查线缆](img/httpatomoreillycomsourceoreillyimages895860.png.jpg)


    图 2-2. 在“设置”应用程序中检查线缆


    此外，Redpark 串行线缆附赠了一个环回适配器（参见 图 2-3）和一个名为 `Rsc Demo` 的演示应用程序。如果你在 Xcode 中打开该演示应用程序，然后构建并将其部署到你的设备上，你应该能够使用此适配器执行环回测试。


    将适配器插入线缆的 RS-232 端，然后将线缆插入底座连接器。运行 `Rsc Demo` 应用程序并点击 `Loop Test` 按钮。如果你没有看到像
    图 2-3 中那样的 `UIAlertView` 通知你环回测试已成功，那么同样，你的线缆可能存在问题。


    不过，假设你的新线缆通过了这两项测试，那么你应该认为一切正常，我们现在可以继续编写代码了。


    ![在 Rsc 演示应用程序中执行环回测试](img/httpatomoreillycomsourceoreillyimages895862.png.jpg)


    图 2-3. 在 Rsc 演示应用程序中执行环回测试


    # 连接到 Arduino


    虽然最初的 Arduino 板使用 RS-232 串口连接到开发机器，但较新的型号使用 USB。因此，我们需要一个适配器来将 Redpark 线缆使用的 RS-232
    串口转换为我们可以轻松连接到 Arduino 的发送/接收（TX/RX）引脚（分别为引脚 1 和 0）的 TTL 串口。


    为了进行此转换，我使用了 SparkFun RS-232 转换器（参见 图 2-4；[`www.sparkfun.com/products/449`](http://www.sparkfun.com/products/449)；售价
    13.95 美元），不过任何等效的单元都可以。例如，Maker Shed 销售效果相同但稍便宜（7 美元）的 [P4 适配器套件](http://www.makershed.com/ProductDetails.asp?ProductCode=MKMD2)。


    ![SparkFun RS-232 转换器 SMD（SKU: PRT-00449）](img/httpatomoreillycomsourceoreillyimages895864.png.jpg)


    图 2-4. SparkFun RS-232 转换器 SMD（SKU: PRT-00449）


    从 图 2-4 可以看出，TTL 端有四根线：`RX`、`TX`、`GND` 和 `VCC`（5V）。将其连接到我们的 Arduino 的最简单方法是将一些可插拔排针焊接到四段单芯导线上（参见
    图 2-5），并构建一个自定义的跨接线缆（参见 图 2-6）。当然，你也可以直接使用预制跨接线缆；例如，Maker Shed 销售一套 [面包板跨接线](http://www.makershed.com/ProductDetails.asp?ProductCode=MKSEEED3)，你可以使用它们来代替自己焊接线缆。


    ![单芯导线（上方）和可插拔排针（下方）](img/httpatomoreillycomsourceoreillyimages895866.png.jpg)


    图 2-5. 单芯导线（上方）和可插拔排针（下方）


    ![完成的跨接线缆](img/httpatomoreillycomsourceoreillyimages895869.png.jpg)


    图 2-6. 完成的跨接线缆


    购买或制作好跨接线缆后，将 Redpark 串行线缆连接到你的 RS-232 到 TTL 串行适配器，然后（使用你的跨接线缆）将该适配器连接到你的 Arduino
    板，如图 图 2-7 所示。


    ![将线缆连接到 Arduino](img/httpatomoreillycomsourceoreillyimages895871.png.jpg)


    图 2-7. 将线缆连接到 Arduino


    为此，请将适配器的 `VCC` 引脚连接到 Arduino 上的 5V 引脚，将 `GND` 引脚连接到 Arduino 上可用的 `GND` 引脚之一，将适配器上的
    `RX` 引脚连接到 Arduino 上的 `TX` 引脚，并将适配器上的 `TX` 引脚连接到 Arduino 上的 `RX` 引脚。


    ### 警告


    Arduino 板上的接收（RX）引脚（引脚 0）必须连接到适配器上的发送（TX）引脚，而 Arduino 板上的发送（TX）引脚（引脚 1）则必须连接到适配器上的接收（RX）引脚。如果这些连接不正确，你的应用程序将无法工作。*切勿*将
    `RX` 连接到 `RX`，将 `TX` 连接到 `TX`。


    你可以通过 USB 线缆（插入 Mac 或墙壁适配器）或通过电池组为 Arduino 板供电。因为我手头正好有一个电池组，所以我用了它，但这完全取决于你。


    # 连接到 iOS 设备


    一旦你为 Arduino（以及 RS-232 到 TTL 串行适配器）供电，剩下唯一要做的就是将 Redpark 串行线缆插入你的 iOS 设备（图 2-8）。


    不幸的是，我们将花费大量时间将 iPhone 或 iPad 从 Redpark 线缆上插入和拔出，因为我们需要将设备插入 Mac 以将开发代码部署到其上。


    ![为 Arduino 供电，并将线缆连接到 iPhone](img/httpatomoreillycomsourceoreillyimages895873.png.jpg)


    图 2-8. 为 Arduino 供电，并将线缆连接到 iPhone


    不过，到目前为止，我们已经准备就绪。让我们继续编写一些代码来演示线缆的使用。

