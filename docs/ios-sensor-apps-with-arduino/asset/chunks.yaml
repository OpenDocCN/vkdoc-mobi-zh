    Digi manufactures a confusingly large array of XBee-branded radios; a quick count
    shows that there are at least 30 different combinations of hardware, firmware,
    and antenna options, and this number is only going to get larger. Unfortunately,
    it’s very easy to get confused by the growing range of XBee-branded radio modules.


    There are two types of pin-compatible XBee modules. The Series 1 module is intended
    for point-to-point and point-to-multipoint applications, while the Series 2 module
    is intended for applications that require mesh networking. In this chapter I’ll
    be using the Series 1 radio modules (see [Figure 5-1](#ch05.html#an_xbee_series_1_module_with_a_chip_ante
    "Figure 5-1. An XBee Series 1 module with a chip antenna")).


    ![An XBee Series 1 module with a chip antenna](httpatomoreillycomsourceoreillyimages895957.png.jpg)


    Figure 5-1. An XBee Series 1 module with a chip antenna


    I use Series 1 radios mainly because they’re very easy for beginners to use and
    to configure and, perhaps more importantly, easy to obtain. You can get Series
    1 radios from a number of vendors, including SparkFun, which carries a wide range
    of modules (see [http://www.sparkfun.com/categories/111](http://www.sparkfun.com/categories/111)),
    although, despite the dizzying range on display, they still don’t carry them all.
    You can also get the radios from Maker Shed ([http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD14](http://www.makershed.com/ProductDetails.asp?ProductCode=MKAD14)).


    ## Series 1 or Series 2?


    One of the misunderstandings when dealing with XBee modules is that somehow Series
    2 modules are “better” than Series 1 modules. That’s just not true. Instead, the
    two types are intended for different purposes. The Series 1 modules are popular
    with the hobbyist market, and they are an excellent fit for a straightforward
    cable replacement or for small networks. Series 2 implements the full ZigBee protocol,
    and the modules are intended for larger networks.


    ### Warning


    While the XBee Series 1 and XBee Series 2 modules have the same form factor and
    are pin-for-pin compatible, they are based on different chipsets and are running
    different protocols, so they are not over-the-air compatible. You cannot mix Series
    1 and Series 2 modules in the same wireless network.


    A Series 1 module will work out of the box for point-to-point communication (i.e.,
    cable replacement) without any work, which is what we’re going to be using them
    for in this chapter. So if you’re just starting out with wireless networks, I’d
    recommend you start with the Series 1 radios.


    If you’re interested in building larger XBee-based networks, you might want to
    look at [Building Wireless Sensor Networks](http://oreilly.com/catalog/9780596807740)
    by Robert Faludi (O’Reilly). While that book uses Series 2 modules exclusively,
    it can also help you with Series 1 networks, as Series 1 commands are, for the
    most part, just a subset of the Series 2 command set. There are also several interesting
    projects that make use of the Series 1 modules I talk about in this chapter in
    [Making Things Talk](http://oreilly.com/catalog/0636920010920) by Tom Igoe (O’Reilly).


    ## Regular Versus Pro?


    Both Series 1 and Series 2 modules come in two flavors: regular and Pro. The Pro
    versions of the modules are slightly larger, although despite this they are still
    pin-compatible, and they use more power. Crucially, however, they have a much
    longer range. Predictably, they also cost a lot more, so unless you need the extended
    range they offer, you should stick with the regular XBee modules. Since they’re
    pin-compatible, you can always drop a Pro into your build later on if you decide
    you need the extended range (and can afford the increased power load).


    ## 802.15.4 or ZigBee?


    There is a lot of confusion surrounding the two XBee protocols. Series 1 modules
    use the IEEE 802.15.4 standard protocol, which allows point-to-point and point-to-multipoint
    networking, although they also have a proprietary mesh networking protocol. Series
    2 modules use the ZigBee protocol, which is a mesh networking standard, built
    on top of the 802.15.4 protocol, which is spoken by numerous other pieces of hardware,
    not just the XBee radio modules.


    ## Which Aerial?


    There are four different types of antenna on offer: chip, wire, UFL, and RP-SMA.
    The chip and wire antennas come preconnected to the radio module; however, the
    UFL and RP-SMA offerings ship with connectors only on the board. You’ll need to
    purchase an appropriate aerial with the proper connector to get them to function.
    Unless you’re intending to enclose your project in a box, at which point mounting
    the antenna outside the box using a UFL or RP-SMA aerial is probably a good idea,
    or need the high-power transmission they provide, you should be safe enough to
    stick with chip- or wire-based aerials.


    # How to Configure an XBee Series 1 Radio


    To configure an XBee module, we need to be able to talk to it. Generally, we’ll
    be using your Mac to configure your XBee, although there is nothing stopping us
    from writing an iPhone or iPad application to allow us to do this configuration.
    For now, we’ll need a way to connect the XBee to your Mac’s USB port.


    Since they were designed to be soldered directly to a PCB, XBee modules rather
    unfortunately use 2 mm headers instead of the more familiar 0.1 in headers we
    are all so used to. They therefore generally require a breakout board of some
    kind before they can be used on a standard bread- or proto-board, and an adaptor
    before they can be connected to your Mac.


    There are a number of breakout boards on the market. Generally, you’ll just need
    a simple board that breaks the XBee pins out to standard 0.1 in header blocks,
    like SparkFun’s [Breakout Board for XBee Module](http://www.sparkfun.com/products/8276).


    To connect the XBee to your computer, you’ll need a more complicated board that
    takes care of regulating the input voltage to the 3.3 V required by the module,
    signal conditioning, and providing basic activity indicator LEDs. Again, there
    are a large number of these on the market, like SparkFun’s [XBee Explorer Regulated](http://www.sparkfun.com/products/9132)
    and Adafruit’s [XBee Adaptor Kit](http://www.adafruit.com/products/126). See [Figure 5-2](#ch05s02.html#adafruit_xbee_adaptor_open_parenthesis_l
    "Figure 5-2. Adafruit XBee Adaptor (left) and the SparkFun XBee Explorer (right)").


    There are even boards allowing you to plug the XBee directly into your Mac’s USB
    port, such as SparkFun’s [XBee Explorer Dongle](http://www.sparkfun.com/products/9819);
    see [Figure 5-2](#ch05s02.html#adafruit_xbee_adaptor_open_parenthesis_l "Figure 5-2. Adafruit
    XBee Adaptor (left) and the SparkFun XBee Explorer (right)") again.


    ### Note


    Almost invariably, XBee USB adaptors require [drivers from FTDI](http://www.ftdichip.com/Drivers/VCP.htm).
    You need to make sure you have installed these before using your adaptor. If you
    have an older Arduino board, you may have already installed the correct driver
    as boards before the Uno made use of the same USB chipset.


    ![Adafruit XBee Adaptor (left) and the SparkFun XBee Explorer (right)](httpatomoreillycomsourceoreillyimages895959.png.jpg)


