- fmt: "# Configuring Two XBee Radios\n\nWe’re now going to configure two XBee radios\
    \ as a straight cable replacement. In other words, the first will be configured\
    \ to send messages to the second, and vice versa.\n\nGo ahead and plug the first\
    \ of the two radios into your Mac, and place it into command mode, as in the previous\
    \ section, by sending a `+++` to the appropriate serial port from your terminal\
    \ program.\n\nThe first thing we need to do is set the baud rate. When in configuration\
    \ mode, enter `ATBD`. You should get a number between 0 and 7 returned, as below:\n\
    \n```\nATBD\n```\n\nThis number indicates that the radio is set to 9,600 baud.\
    \ We’ll leave our radio at 9,600 baud for now. However, if you wanted to set the\
    \ radio to a different baud rate, you’d issue the command `ATDB n`, where `n`\
    \ was a value corresponding to the baud rate you wanted from [Table 5-1](#ch05s03.html#the_value_returned_by_the_atbd_command\
    \ \"Table 5-1. The value returned by the ATBD command and corresponding baud rate\"\
    ).\n\n**Table 5-1. The value returned by the ATBD command and corresponding baud\
    \ rate**\n\n| ATBD Value | Baud Rate |\n| --- | --- |\n| 0 | 1200 |\n| 1 | 2400\
    \ |\n| 2 | 4800 |\n| 3 | 9600 |\n| 4 | 19200 |\n| 5 | 38400 |\n| 6 | 57600 |\n\
    | 7 | 115200 |\n\nSo, for example, to set our radio to 57,600 baud, we’d issue\
    \ the command `ATBD6`:\n\n```\nATBD6\nOK\n```\n\nWe can then check the baud rate\
    \ has been set, by again issuing the `ATBD` command. This time it should return\
    \ a six:\n\n```\nATBD\n```\n\nHaving set the baud rate, we need to go ahead and\
    \ similarly set the PAN ID using the `ATID` command, the node address using the\
    \ `ATMY` command, and the destination node address using the `ATDL` command. Finally,\
    \ we need to commit our changes by issuing a write command, `ATWR`, to save our\
    \ settings.\n\nTherefore, for the first of our two radios, we should issue the\
    \ following commands:\n\n```\n+++\nATBD 3\nATID 1111\nATMY 2345\nATDL 7890\nATWR\n\
    ```\n\nYou should get an `OK` back from the modem in all cases. You may want to\
    \ check the values along the way; see, for instance, [Figure 5-6](#ch05s03.html#configuring_the_first_of_the_two_xbee_mo\
    \ \"Figure 5-6. Configuring the first of the two XBee modules\").\n\n![Configuring\
    \ the first of the two XBee modules](httpatomoreillycomsourceoreillyimages895967.png.jpg)\n\
    \n**Figure 5-6. Configuring the first of the two XBee modules**\n\nOnce you’ve\
    \ configured the first radio, disconnect the serial port and unplug the XBee module\
    \ from the adaptor. Then plug the second module into the adaptor, connect to the\
    \ appropriate serial port, and issue the following commands:\n\n```\n+++\nATBD\
    \ 3\nATID 1111\nATMY 7890\nATDL 2345\nATWR\n```\n\nThis configures the second\
    \ radio as the destination of the first, and vice versa. See [Table 5-2](#ch05s03.html#radio_configuration\
    \ \"Table 5-2. Radio configuration\").\n\n**Table 5-2. Radio configuration**\n\
    \n| Radio | PAN | MY | DL |\n| --- | --- | --- | --- |\n| 1 | 1111 | 2345 | 7890\
    \ |\n| 2 | 1111 | 7890 | 2345 |\n\nUnplug the second radio once you’ve finished\
    \ configuring it. We’ll get back to the XBee modules later. However, now that\
    \ we’ve configured them, we’re going to go ahead and test out the connection by\
    \ attaching one of them to an Arduino and the other to our Mac.\n\n# Connecting\
    \ an XBee to an Arduino\n\nYou can actually directly connect an XBee radio module\
    \ to an Arduino by making use of the 3.3V pin on the Arduino board to provide\
    \ a regulated voltage for the module. See [Figure 5-7](#ch05s04.html#connecting_an_xbee_to_an_arduin\
    \ \"Figure 5-7. Connecting an XBee to an Arduino\").\n\n![Connecting an XBee to\
    \ an Arduino](httpatomoreillycomsourceoreillyimages895969.png.jpg)\n\n**Figure\
    \ 5-7. Connecting an XBee to an Arduino**\n\nHowever, it’s a lot easier if you\
    \ make use of a breakout board, or an appropriate adaptor board, like the Adafruit\
    \ board we used to connect the XBee to our Mac earlier (see [Figure 5-8](#ch05s04.html#an_arduino_uno_and_adafruit_xbee_adaptor\
    \ \"Figure 5-8. An Arduino Uno and Adafruit XBee adaptor connected together\"\
    )).\n\nAlternatively, if you’re going to be making a lot of use of XBee modules,\
    \ you might want to invest in an Arduino Fio board (see [Figure 5-9](#ch05s04.html#the_arduino_fio_with_xbee_connected_to_a\
    \ \"Figure 5-9. The Arduino Fio with XBee connected to a LiPo battery\")), which\
    \ is an Arduino board with an attached XBee socket. You can buy an [Arduino Fio\
    \ from SparkFun](http://www.sparkfun.com/products/9712).\n\n![An Arduino Uno and\
    \ Adafruit XBee adaptor connected together](httpatomoreillycomsourceoreillyimages895971.png.jpg)\n\
    \n**Figure 5-8. An Arduino Uno and Adafruit XBee adaptor connected together**\n\
    \n![The Arduino Fio with XBee connected to a LiPo battery](httpatomoreillycomsourceoreillyimages895973.png.jpg)\n\
    \n**Figure 5-9. The Arduino Fio with XBee connected to a LiPo battery**\n\nWe’re\
    \ going to use the same simple sketch on our Arduino that we used in [Chapter\
    \ 1](#ch01.html \"Chapter 1. Introduction to the Arduino\") to print “Hello World”\
    \ to the serial port. Connect your Arduino board to your Mac and upload the following\
    \ sketch:\n\n```\nvoid setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n\
    \  while (Serial.available() <= 0) {\n    Serial.println(\"Hello world\");\n \
    \   delay(300);\n  }\n}\n```\n\n### Warning\n\nYou cannot upload a sketch from\
    \ your Mac to the board with the XBee, or any other hardware, connected to pins\
    \ 0 (RX) and 1 (TX), as this interferes with the USB serial connection from your\
    \ Mac. You therefore must detach the XBee from your Arduino board before uploading\
    \ your sketch.\n\nDisconnect your Arduino board from your Mac and connect it to\
    \ an external power supply.\n\nOnce you’ve done that, attach one of the XBee radios\
    \ to your Mac and open up the CoolTerm application once again. Connect to the\
    \ appropriate serial port so that you can see the output from the radio.\n\nThen\
    \ go ahead and connect the other radio to your Arduino board, as in [Figure 5-8](#ch05s04.html#an_arduino_uno_and_adafruit_xbee_adaptor\
    \ \"Figure 5-8. An Arduino Uno and Adafruit XBee adaptor connected together\"\
    ), and power it on. You should see something very much like [Figure 5-10](#ch05s04.html#the_arduino_says_lhello_worldr_over_an\
    \ \"Figure 5-10. The Arduino says “Hello World” over an XBee connection\") in\
    \ your terminal program.\n\n![The Arduino says “Hello World” over an XBee connection](httpatomoreillycomsourceoreillyimages895976.png.jpg)\n\
    \n**Figure 5-10. The Arduino says “Hello World” over an XBee connection**\n\n\
    # Connecting an XBee to an iOS Device\n\nNow that we’ve tested things between\
    \ our Arduino board and our Mac, what do we need to do the same thing between\
    \ our Arduino board and our iPhone?"
