- fmt: "# Integrating the Serial Library\n\nIf you were following along last chapter,\
    \ closely integrating out user interface and the serial library should look very\
    \ familiar. In fact, you might even be able to save yourself some time using copy\
    \ and paste. If you do, remember to be careful; copy and paste errors can get\
    \ irritating.\n\nAdd the following highlighted lines to the `PaduinoViewController.h`\
    \ interface file:\n\n```\n#import <UIKit/UIKit.h>\n#import \"RscMgr.h\"\n\n#define\
    \ BUFFER_LEN 1024\n\n@interface PaduinoViewController : UIViewController <RscMgrDelegate>\
    \ {\n\n    UISwitch *pin13;\n    UISwitch *pin12;\n    UISwitch *pin11;\n    UISwitch\
    \ *pin10;\n    UISwitch *pin9;\n    UISwitch *pin8;\n    UISwitch *pin7;\n   \
    \ UISwitch *pin6;\n    UISwitch *pin5;\n    UISwitch *pin4;\n    UISwitch *pin3;\n\
    \    UISwitch *pin2;\n\n    RscMgr *rscMgr;\n    UInt8 rxBuffer[BUFFER_LEN];\n\
    \    UInt8 txBuffer[BUFFER_LEN];\n\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UISwitch *pin13;\n@property (nonatomic, retain) IBOutlet UISwitch *pin12;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin11;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin10;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin9;\n@property (nonatomic, retain) IBOutlet UISwitch *pin8;\n\n@property\
    \ (nonatomic, retain) IBOutlet UISwitch *pin7;\n@property (nonatomic, retain)\
    \ IBOutlet UISwitch *pin6;\n@property (nonatomic, retain) IBOutlet UISwitch *pin5;\n\
    @property (nonatomic, retain) IBOutlet UISwitch *pin4;\n@property (nonatomic,\
    \ retain) IBOutlet UISwitch *pin3;\n@property (nonatomic, retain) IBOutlet UISwitch\
    \ *pin2;\n\n- (IBAction)toggle:(id)sender;\n\n@end\n```\n\nSave your changes and\
    \ switch to the corresponding implementation file, uncomment the `viewDidLoad:`\
    \ method, and initialize the Redpark Serial Cable Manager as below:\n\n```\n-\
    \ (void)viewDidLoad {\n    [super viewDidLoad];\n    rscMgr = [[RscMgr alloc]\
    \ init];\n    [rscMgr setDelegate:self];\n}\n```\n\nHaving done that, add the\
    \ following mandatory delegates to your implementation:\n\n```\n- (void) cableConnected:(NSString\
    \ *)protocol {\n    [rscMgr setBaud:9600];\n    [rscMgr open];\n}\n\n- (void)\
    \ cableDisconnected {\n}\n\n- (void) portStatusChanged {\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes\
    \ {\n    int bytesRead = [rscMgr read:rxBuffer Length:numBytes];\n    NSLog( @\"\
    Read %d bytes from serial cable.\", bytesRead );\n\n    NSString *string = nil;\n\
    \    for(int i = 0;i < numBytes;++i) {\n        if ( string ) {\n            string\
    \ =  [NSString stringWithFormat:@\"%@%c\", string, rxBuffer[i]];\n        } else\
    \ {\n            string =  [NSString stringWithFormat:@\"%c\", rxBuffer[i]];\n\
    \        }\n    }\n    NSLog(@\"Received: %@\", string);\n}\n\n- (BOOL) rscMessageReceived:(UInt8\
    \ *)msg TotalLength:(int)len {\n    return FALSE;\n}\n\n- (void) didReceivePortConfig\
    \ {\n}\n```\n\nAll of this should look fairly familiar from the previous chapter.\
    \ So let’s go ahead and look at our `toggle:` method:\n\n```\n- (IBAction)toggle:(id)sender\
    \ {\n\n    NSLog(@\"Toggled output pin %i to %i\", [sender tag], [(UISwitch *)sender\
    \ isOn] );\n    txBuffer[0] = [sender tag];\n    txBuffer[1] = [(UISwitch *)sender\
    \ isOn];\n    int bytesWritten = [rscMgr write:txBuffer Length:2];\n    NSLog(\
    \ @\"Wrote %d bytes to serial cable.\", bytesWritten);\n}\n```\n\nDespite being\
    \ short, this is the core of our application. Do you remember that while we were\
    \ building out our interface I ensured that each `UISwitch` had a unique tag corresponding\
    \ to the switch number? Here we’re using that tag to build a two-byte message\
    \ to the Arduino board. The first byte is the switch number and the second byte\
    \ is a 1 or a 0, corresponding to the state of the switch, on or off. On the Arduino\
    \ side of things, that’s going to correspond to a pin state of `HIGH` or `LOW`.\n\
    \nWe’re done, at least for now, with the code for the iPad. Make sure all your\
    \ changes are saved, and click on the Run button in the Xcode toolbar to build\
    \ and deploy your application onto your iPad. Once it has been successfully loaded,\
    \ click on the Stop button and put your iPad to one side.\n\n# Listening for Messages\
    \ on the Arduino\n\nOpen up the Arduino development environment, enter the following\
    \ code, and upload it to your Arduino board (if you’re unsure how to do that,\
    \ have a look at Chapters [1](#ch01.html \"Chapter 1. Introduction to the Arduino\"\
    ) and [2](#ch02.html \"Chapter 2. Connecting the iPhone to the Arduino\") again):\n\
    \n```\n#define LENGTH 2\n\nint rxBuffer[128];\nint rxIndex  = 0;\n\nvoid setup()\
    \ {\n\n  Serial.begin(9600);\n  Serial.println(\"Arduino reset\");\n\n  pinMode(2,\
    \ OUTPUT);\n  pinMode(3, OUTPUT);\n  pinMode(4, OUTPUT);\n  pinMode(5, OUTPUT);\n\
    \  pinMode(6, OUTPUT);\n  pinMode(7, OUTPUT);\n  pinMode(8, OUTPUT);\n  pinMode(9,\
    \ OUTPUT);\n  pinMode(10, OUTPUT);\n  pinMode(11, OUTPUT);\n  pinMode(12, OUTPUT);\n\
    \  pinMode(13, OUTPUT);\n\n  digitalWrite( 12, HIGH);\n  digitalWrite( 13, HIGH);\n\
    \  delay(500);\n  digitalWrite( 12, LOW );\n  digitalWrite( 13, LOW );\n}\n\n\
    void loop (){\n\n if (Serial.available() > 0) {\n\n   rxBuffer[rxIndex++] = Serial.read();\n\
    \   if (rxIndex == LENGTH) {\n\n       Serial.print( \"Set: \" );\n       Serial.print(\
    \ rxBuffer[0], DEC );\n       Serial.print( \" to: \" );\n       Serial.println(\
    \ rxBuffer[1], DEC );\n\n       if( rxBuffer[1] == 0 ) {\n         digitalWrite((int)rxBuffer[0],\
    \ LOW);\n       } else {\n         digitalWrite((int)rxBuffer[0], HIGH);\n   \
    \    }\n       rxIndex = 0;\n   }\n }\n delay(10);\n\n}\n```\n\nWe have bytes\
    \ available, so read a single byte from the serial buffer and put it into the\
    \ `rxBuffer` array at the next available free index. Then post-increment our index\
    \ into the buffer.\n\nIf we have received `LENGTH` bytes (in this case `LENGTH`\
    \ is 2 bytes), we have the entire message from the remote host and we should deal\
    \ with it now. If not, loop and read more bytes from the serial buffer.\n\nIf\
    \ the second byte was a 0, we’re going to set the pin to `LOW`. Read the first\
    \ byte of the buffer, as that’s the pin number, and pull that pin `LOW`.\n\nAlternatively,\
    \ if the second received byte was a 1, we’re going to set the pin to `HIGH`. Read\
    \ the first byte of the buffer, as that’s the pin number, and pull that pin `HIGH`.\n\
    \nUnless we have a voltmeter handy, there isn’t any way to know if a pin on the\
    \ Arduino board is `LOW` or `HIGH`, so we’re going to need some way to tell. An\
    \ easy way to do this is to put an LED on each pin. We could wire each pin separately,\
    \ but an easy hack is shown in Figure 3-7. Here I’ve wired the ground legs of\
    \ three LEDs together to a jumper wire that we can then insert in the GND pin\
    \ of the Arduino board.\n\n![Wiring some LEDs together](httpatomoreillycomsourceoreillyimages895912.png.jpg)\n\
    \nFigure 3-7. Wiring some LEDs together\n\nThe three other legs will go into pins\
    \ 13, 12, and 11, respectively; see Figure 3-8.\n\n![Connecting the LED bundle\
    \ to the Arduino](httpatomoreillycomsourceoreillyimages895914.png.jpg)\n\nFigure 3-8. Connecting\
    \ the LED bundle to the Arduino"
