  trans: '

    ### 从源代码编译 Core Plot 库


    从 Core Plot 网站下载 `CorePlot_0.4.zip` 文件，或从项目的 Mercurial 仓库中获取最新版本。打开 `CorePlot/framework/`
    文件夹，点击 `CorePlot-CocoaTouch.xcodeproj` 项目文件，在 Xcode 中打开它。


    从方案下拉菜单中选择“Universal Library | iOSDevice”，然后从产品菜单中选择构建 (`⌘B`)，以构建一个通用（胖）静态库，以便我们在设备和
    iPhone 模拟器上都能使用。


    构建完成后，向上回退一级文件夹，进入新创建的 `build` 目录。在 `build/Release-universal/` 目录中，你会找到 `libCorePlot-CocoaTouch.a`
    静态库；但除此之外，我们还需要相关的头文件。创建通用库的自定义构建脚本不会从各个构建目录复制这些头文件。不过，你可以在 `build/Release-iphoneos/usr/local/include/`
    或 `build/Release-iphonesimulator/usr/local/include/` 目录中找到它们。你在项目中使用哪组头文件其实无关紧要；这两组文件是相同的。


    ### 将 Core Plot 库添加到项目中


    将 `libCorePlot-CocoaTouch.a` 静态库从 `build/Release-universal/` 文件夹拖放到你的项目中，记得在提示时勾选“将项目复制到目标组的文件夹中（如果需要）”复选框。然后，将两组头文件中的任意一组（全部文件）复制到你的项目中。再次记得勾选“将项目复制到目标组的文件夹中（如果需要）”复选框。


    点击项目窗格顶部的 MaxSonar 项目文件，选择 MaxSonar 目标，然后点击构建设置标签页。找到其他链接器标志设置（位于链接部分下），双击打开弹出窗口，为目标添加
    `-ObjC -all_load` 标志（参见图 4-4）。


    最后，由于 Core Plot 库使用了 QuartzCore 框架，我们需要将其添加到项目中。点击构建阶段标签页，然后点击“将二进制文件与库链接”项，打开链接框架列表，点击
    + 符号添加一个新框架。从下拉列表中选择 QuartzCore 框架，然后点击添加按钮。


    ![为目标添加其他链接器标志](img/httpatomoreillycomsourceoreillyimages895929.png.jpg)


    图 4-4. 为目标添加其他链接器标志


    ## 构建用户界面


    现在我们已经添加了构建应用程序所需的第三方基础设施，是时候构建用户界面了。点击 `MaxSonarViewController.xib` 文件，在 Interface
    Builder 中打开它，然后将一个 `UINavigationBar`、一个 `UISwitch`、几个 `UILabel` 元素，最后是一个通用的 `UIView`
    拖放到你的视图中。按图 4-5 所示排列它们。将导航栏中的文本改为“LV-MaxSonar-EZ1”，将两个标签中的文本分别改为“距离：”和“0.00”。


    ![构建用户界面](img/httpatomoreillycomsourceoreillyimages895932.png.jpg)


    图 4-5. 构建用户界面


    在视图中点击通用的 `UIView`，然后打开右侧实用工具窗格中的标识检查器。我们需要将视图的类从 `UIView` 更改为 `CPTGraphHostingView`。参见图
    4-6。


    ### 警告


    根据你使用的 Core Plot 库版本，你可能需要将自定义视图指定为 `CPGraphHostingView`。


    这个自定义视图将用于绘制来自 EZ1 传感器（通过 Arduino 和串行链路连接到我们的 iPhone）的实时传感器读数图表。


    ![设置自定义视图](img/httpatomoreillycomsourceoreillyimages895934.png.jpg)


    图 4-6. 设置自定义视图


    更改视图类后，关闭实用工具面板，打开辅助编辑器。确保它处于自动模式，然后按住 Control 键从 `CPTGraphHostingView` 拖拽到 `MaxSonarViewController.h`
    接口文件，以创建一个 `graph` 实例变量和属性。类似地，按住 Control 键从右侧的 `UILabel` 和 `UISwitch` 拖拽，创建 `distance`
    和 `toggle` 实例变量和属性。最后，再次按住 Control 键从 `UISwitch` 拖拽到一个 `toggled` 方法和 IBAction，如图
    4-7 所示。


    ![连接输出口和操作](img/httpatomoreillycomsourceoreillyimages895936.png.jpg)


    图 4-7. 连接输出口和操作


    保存更改，切换回标准编辑器，然后点击 `MaxSonarViewController.h` 接口文件，在编辑器中打开它。你应该注意到 `CPTGraphHostingView`
    实例变量旁边有一个错误；这是因为 Xcode 还不知道它是什么。继续在代码顶部添加以下导入语句：


    ```

    #import "CorePlot-CocoaTouch.h"

    ```


    如果在此时从产品菜单中选择构建 (`⌘B`) 来构建你的项目，一切应该都能编译通过。如果情况并非如此，你应该在开始排查其他问题之前，先确认已将 External
    Accessory 和 QuartzCore 框架添加到项目中。

    '
- fmt: "# Building the Backend\n\nWe’re done with the user interface. What we need\
    \ to do now is connect our interface to the incoming measurements from our Arduino\
    \ board. Obviously the first thing we need to do is integrate the Redpark library\
    \ into our code. The code for this is going to look almost identical to the code\
    \ we’ve seen in the last couple of chapters. However, we’re also going to have\
    \ to establish some infrastructure for our plot. We’ll use a simple XY scatter\
    \ plot for that task.\n\nOpen the `MaxSonarViewController.h` interface file and\
    \ add the following code:\n\n```\n#import <UIKit/UIKit.h>\n#import \"CorePlot-CocoaTouch.h\"\
    \n#import \"RscMgr.h\"\n\n#define BUFFER_LEN 1024\n#define MAX_POINTS 200\n\n\
    @interface MaxSonarViewController : UIViewController\n                       \
    \             <CPTPlotDataSource, RscMgrDelegate> {\n\nCPTGraphHostingView *graph;\n\
    \nCPTXYGraph *plot;\n    NSMutableArray *dataForPlot;\n\nUILabel *distance;\n\
    \    UISwitch *toggle;\n\nRscMgr *manager;\n    UInt8 rxBuffer[BUFFER_LEN];\n\
    \    UInt8 txBuffer[BUFFER_LEN];\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ CPTGraphHostingView *graph;\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *distance;\n@property (nonatomic, retain) IBOutlet UISwitch *toggle;\n@property\
    \ (nonatomic, retain) NSMutableArray *dataForPlot;\n\n- (IBAction)toggled:(id)sender;\n\
    \n- (NSNumber *) yValueForIndex:(NSUInteger)index;\n\n@end\n```\n\nThis makes\
    \ our class both a Core Plot data source and a Redpark Serial Cable delegate object.\
    \ Now open the corresponding `MaxSonarViewController.m` implementation file. We\
    \ need to remember to synthesize our new property:\n\n```\n@synthesize dataForPlot;\n\
    ```\n\nand then release it in the `dealloc` method:\n\n```\n [dataForPlot release];\n\
    ```\n\nand finally set it to nil in `viewDidUnload` method:\n\n```\n [self setDataForPlot:nil];\n\
    ```\n\nWe want to go ahead and add a `viewDidLoad` method. Here we’re going to\
    \ set up the cable manager object as usual, but also our Core Plot plot object.\
    \ Doing that setup involves a lot of boilerplate code, and I’m not really going\
    \ to talk about it in detail here, as it’s all a bit tangential to what we’re\
    \ actually doing:\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n\
    // cable manager\n    rscMgr = [[RscMgr alloc] init];\n    [rscMgr setDelegate:self];\n\
    \n// Create plot from theme\n    plot = [[CPTXYGraph alloc] initWithFrame:CGRectZero];\n\
    \    CPTTheme *theme = [CPTTheme themeNamed:kCPTPlainBlackTheme];\n    [plot applyTheme:theme];\n\
    \    graph.collapsesLayers = NO;\n    graph.hostedGraph = plot;\n\nplot.paddingLeft\
    \ = 10.0;\n    plot.paddingTop = 10.0;\n    plot.paddingRight = 10.0;\n    plot.paddingBottom\
    \ = 10.0;\n\n// Setup plot space\n    CPTXYPlotSpace *plotSpace = (CPTXYPlotSpace\
    \ *)plot.defaultPlotSpace;\n    plotSpace.allowsUserInteraction = YES;\n    plotSpace.xRange\
    \ = [CPTPlotRange plotRangeWithLocation:CPTDecimalFromFloat(1.0) \n          \
    \                           length:CPTDecimalFromFloat(MAX_POINTS)];\n    plotSpace.yRange\
    \ = [CPTPlotRange plotRangeWithLocation:CPTDecimalFromFloat(1.0) \n          \
    \                           length:CPTDecimalFromFloat(MAX_POINTS)];\n\n// Axes\n\
    \    CPTXYAxisSet *axisSet = (CPTXYAxisSet *)plot.axisSet;\n\nCPTXYAxis *x = axisSet.xAxis;\n\
    \    x.majorIntervalLength = CPTDecimalFromString(@\"100\");\n    x.minorTicksPerInterval\
    \ = 4;\n    x.minorTickLength = 5.0f;\n    x.majorTickLength = 7.0f;\n\nCPTXYAxis\
    \ *y = axisSet.yAxis;\n    y.majorIntervalLength = CPTDecimalFromString(@\"50\"\
    );\n    axisSet.yAxis.minorTicksPerInterval = 2;\n    axisSet.yAxis.minorTickLength\
    \ = 5.0f;\n    axisSet.yAxis.majorTickLength = 7.0f;\n\n// Create a green plot\
    \ area\n    CPTScatterPlot *line = [[[CPTScatterPlot alloc] init] autorelease];\n\
    \    CPTMutableLineStyle *lineStyle = [CPTMutableLineStyle lineStyle];\n    lineStyle.miterLimit\
    \ = 1.0f;\n    lineStyle.lineWidth = 3.0f;\n    lineStyle.lineColor = [CPTColor\
    \ greenColor];\n    line.dataLineStyle = lineStyle;\n    line.identifier = @\"\
    Green Plot\";\n    line.dataSource = self;\n    [plot addPlot:line];\n\n// Do\
    \ a green gradient\n    CPTColor *areaColor = [CPTColor colorWithComponentRed:0.3\
    \ \n                                    green:1.0 blue:0.3 alpha:0.8];\n    CPTGradient\
    \ *areaGradient = [CPTGradient gradientWithBeginningColor:areaColor \n       \
    \                                      endingColor:[CPTColor clearColor]];\n \
    \   areaGradient.angle = −90.0f;\n    CPTFill *areaGradientFill = [CPTFill fillWithGradient:areaGradient];\n\
    \    line.areaFill = areaGradientFill;\n    line.areaBaseValue = [[NSDecimalNumber\
    \ zero] decimalValue];\n\n// Add plot symbols\n    CPTMutableLineStyle *symbolLineStyle\
    \ = [CPTMutableLineStyle lineStyle];\n    symbolLineStyle.lineColor = [CPTColor\
    \ blackColor];\n    CPTPlotSymbol *plotSymbol = [CPTPlotSymbol ellipsePlotSymbol];\n\
    \    plotSymbol.fill = [CPTFill fillWithColor:[CPTColor greenColor]];\n    plotSymbol.lineStyle\
    \ = symbolLineStyle;\n    plotSymbol.size = CGSizeMake(10.0, 10.0);\n    line.plotSymbol\
    \ = plotSymbol;\n\nCABasicAnimation *fadeInAnimation = [CABasicAnimation \n  \
    \                                       animationWithKeyPath:@\"opacity\"];\n\
    \    fadeInAnimation.duration = 1.0f;\n    fadeInAnimation.removedOnCompletion\
    \ = NO;\n    fadeInAnimation.fillMode = kCAFillModeForwards;\n    fadeInAnimation.toValue\
    \ = [NSNumber numberWithFloat:1.0];\n\n// Add some initial data\n    NSMutableArray\
    \ *contentArray = [NSMutableArray arrayWithCapacity:200];\n    self.dataForPlot\
    \ = contentArray;\n}\n```\n\nNow we need to add the CorePlot `CPTPlotDataSource`\
    \ data source methods:\n\n```\n#pragma mark - CPTPlotDataSource Methods\n\n-(void)pointReceived:(NSNumber\
    \ *)point{\n\nCPTPlot *thisPlot = [plot plotWithIdentifier:@\"Green Plot\"];\n\
    \    [self.dataForPlot addObject:point];\n    [thisPlot insertDataAtIndex:self.dataForPlot.count-1\
    \ numberOfRecords:1];\n    self.distance.text = [NSString stringWithFormat:@\"\
    %@\", point];\n\n}\n\n-(NSUInteger)numberOfRecordsForPlot:(CPTPlot *)plot {\n\
    \    return [dataForPlot count];\n}\n\n-(NSNumber *)numberForPlot:(CPTPlot *)plot\
    \ field:(NSUInteger)fieldEnum recordIndex:(NSUInteger)index {\n\nif (fieldEnum\
    \ == CPTScatterPlotFieldX) {\n        return [NSNumber numberWithInteger:index];\n\
    \    } else {\n        return [self yValueForIndex:index];\n    }\n}\n```\n\n\
    Along with our `yValueForIndex:` convenience method:\n\n```\n- (NSNumber *) yValueForIndex:(NSUInteger)index\
    \ {\n     return [self.dataForPlot objectAtIndex:index];\n}\n```\n\nFinally add\
    \ the Redpark Serial delegate methods:\n\n```\n#pragma mark - RscMgrDelegate methods\n\
    \n- (void) cableConnected:(NSString *)protocol {\n    [rscMgr setBaud:9600];\n\
    \    [rscMgr open];\n\n}\n\n- (void) cableDisconnected {\n}\n\n- (void) portStatusChanged\
    \ {\n}\n\n- (void) readBytesAvailable:(UInt32)numBytes {\n    int bytesRead =\
    \ [rscMgr read:rxBuffer Length:numBytes];\n\nNSString *string = nil;\n    for(int\
    \ i = 0;i < numBytes;++i) {\n        if ( string ) {\n            string =  [NSString\
    \ stringWithFormat:@\"%@%c\", string, rxBuffer[i]];\n        } else {\n      \
    \      string =  [NSString stringWithFormat:@\"%c\", rxBuffer[i]];\n        }\n\
    \    }\n    [self pointReceived:[NSNumber numberWithInt:[string intValue]]];\n\
    \n}\n\n- (BOOL) rscMessageReceived:(UInt8 *)msg TotalLength:(int)len {\n    return\
    \ FALSE;\n}\n\n- (void) didReceivePortConfig {\n}\n```\n\nCheck that everything\
    \ builds and runs by running the app in the simulator. You should see something\
    \ like [Figure 4-8](http://example.com/placeholder). If that looks good, switch\
    \ to the device and build and deploy the application onto your iPhone.\n\n![The\
    \ MaxSonar app running in the iPhone Simulator](httpatomoreillycomsourceoreillyimages895938.png.jpg)\n\
    \n**Figure 4-8.** The MaxSonar app running in the iPhone Simulator\n\nIf everything\
    \ has gone well, at this point we need to put the iPhone application, along with\
    \ Xcode itself, to one side for now. It’s time to look at the Arduino end of our\
    \ build."
