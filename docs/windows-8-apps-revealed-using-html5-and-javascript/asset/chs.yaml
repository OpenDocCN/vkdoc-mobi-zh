  \ `this` 的假设存在冲突）。为避免此问题，应像示例中那样在视图模型外部定义列表。\n\n使用 `List` 对象与使用数组并不相同。最重要的区别在于，不能使用数组索引器来读取或写入数据值。相反，必须使用\
  \ `getAt` 和 `setAt` 方法。`List` 支持其他数组成员，如 `push` 和 `pop`，并且还提供了一些用于排序和投影 `List` 对象内容的有用附加功能。\n\
