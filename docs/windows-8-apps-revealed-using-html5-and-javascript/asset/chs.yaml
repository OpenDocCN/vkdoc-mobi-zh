  \ **工具 ➤ 选项**，导航到 **文本编辑器 ➤ CSS ➤ 格式设置**，然后取消选中“层次结构缩进”选项来更改 Visual Studio 显示 CSS\
  \ 的方式。\n\n通过我的补充，我为应用定义了一个背景色，这遵循了 Windows 8 中明显的柔和色彩趋势。我做的其他补充是将 CSS3 网格布局应用于我在\
  \ `default.html` 中定义的 `div` 元素。你可以在 Windows 8 应用中使用任何新的 CSS3 布局模型（实际上，任何 CSS 布局都可以），但网格布局的规范尚未最终确定，因此我必须在布局属性前加上\
  \ `-ms` 前缀。\n\n**CSS3 网格布局快速介绍**\n\n你可能从未使用过网格布局，因为它并未在主流 Web 浏览器中一致地实现。幸运的是，在开发\
  \ Windows 8 Web 应用时，你只需要担心 Internet Explorer 10，它用于向用户显示 JavaScript Windows 应用商店应用。在此边栏中，我将向你快速介绍\
  \ CSS3 网格布局的基本特性。要开始使用网格布局，你必须设置 `display` 属性，并为将包含网格的元素指定行数和列数，如下所示：\n\n```\n#contentGrid\
  \ {\n    display: -ms-grid;\n    -ms-grid-rows: 1fr 1fr;\n    -ms-grid-columns:\
  \ 60% 60%;\n}\n```\n\n`display` 属性必须设置为 `-ms-grid`。`-ms-grid-rows` 和 `-ms-grid-columns`\
  \ 属性指定网格的尺寸。这些尺寸可以指定为分数单位（表示为 `fr`）、可用空间的百分比或固定尺寸。我指定了两个等高的行和两列，列的宽度设置为父元素宽度的 60%。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 1 章 ■ 入门指南**\n\n在 Windows\
  \ 应用商店应用中（或者至少在目前开发的那些应用中很常见），通常会提供一个比屏幕更宽的内容区域，并允许用户从左向右滚动以访问应用的不同区域。将累计宽度设置为 120%\
  \ 即可实现此行为，你将在本章稍后运行示例 Web 应用时看到这一点。\n\n对于单个项目，你需要指定它们应显示在哪一行和哪一列，如下所示：\n\n```\n\
  #leftContainer {\n    -ms-grid-column: 1;\n    -ms-grid-row: 1;\n    -ms-grid-row-span:\
  \ 2;\n}\n```\n\n`-ms-grid-column` 和 `-ms-grid-row` 属性在网格中定位元素。这两个属性都是基于 1 的，这意味着将元素定位在第\
  \ 1 列和第 1 行将把它放置在网格的左上角位置。默认情况下，元素占据一个网格方块，但你可以使用 `-ms-grid-row-span` 和 `-ms-grid-column-span`\
  \ 属性来更改这一点。在示例中，我让 `leftContainer` 元素跨越了两行。另一个值得关注的属性是 `-ms-grid-column-align`，我在示例中没有使用它。该属性指定元素在网格方块内的对齐方式，可以设置为\
  \ `start`、`end`、`center` 或 `stretch`。如果你使用的是从左到右的语言（如英语），那么 `start` 和 `end` 值会分别将元素左对齐和右对齐。`center`\
  \ 值将元素居中，而 `stretch` 值则会调整元素大小，使其完全填满其分配的空间。\n\n你可以使用网格属性创建一些非常复杂的布局。有关详细信息，请参阅\
  \ [www.w3.org/TR/css3-grid](http://www.w3.org/TR/css3-grid) 上的完整规范，但请注意，这还不是一个已批准的标准。\n\
