  ### 本书的结构是怎样的？


  我专注于构成 `Windows 8` 应用的关键技术和特性。您已经知道如何编写 `HTML` 以及如何使用表单元素（例如 `input` 元素）来收集用户数据，我不会浪费您的时间去教您已经知道的东西。


  本书旨在将您的 Web 应用开发经验转化为 `Windows 8` 世界中的技能，这意味着要专注于 `Windows 8` 应用的独特之处。


  我采用了一种轻松的方式来混合不同的主题。除了每章的主线内容外，您还会找到一些必要的背景知识，用以解释为什么某些功能很重要以及为什么应该实现它们。在此过程中，我将向您展示编写
  `JavaScript` `Windows 应用商店` 应用的约定，并尽可能多地介绍 `Windows 8` 功能。到本书结束时，您将理解如何构建一个能够正确集成到
  `Windows 8` 中，并提供与使用其他技术（如 `XAML`/`C#`）编写的 `Windows 应用商店` 应用相一致的用户体验的 `Windows 8`
  应用。


  这是一本入门指南，帮助您开始编写 `Windows 应用商店` 应用。它并非全面的教程；因此，我重点介绍了构成 `Windows 8` 应用主要构建模块的那些主题。有很多信息无法纳入这本薄薄的书中。您可以在我的另一本由
