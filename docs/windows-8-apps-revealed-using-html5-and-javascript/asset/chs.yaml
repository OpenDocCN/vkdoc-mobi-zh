  \n**提示** 使用 HTML5 和 JavaScript 开发 Windows 8 的一个乐趣在于，某些关键功能领域（包括地理位置服务）你可以选择使用 HTML5\
  \ API 还是 Windows API。本示例中我使用了 Windows API，但采用 HTML5 等效 API 同样能完美运行。\n\n为了管理新元素的布局，我在`/css/default.css`文件中新增了属性，如代码清单\
