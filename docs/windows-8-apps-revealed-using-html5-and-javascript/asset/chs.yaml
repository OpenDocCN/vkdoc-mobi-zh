  WinJS.UI.AppBarCommand\"\ndata-win-options=\"{section: 'global', label: 'New Item',\
  \ icon: 'add', type:'flyout', flyout: 'addItemFlyout'}\">\n</button>\n<button data-win-control=\"\
  WinJS.UI.AppBarCommand\"\ndata-win-options=\"{section: 'global', label: 'Stores',\
  \ icon: 'shop'}\">\n</button>\n<button data-win-control=\"WinJS.UI.AppBarCommand\"\
  \ndata-win-options=\"{section: 'global', label: 'Zip Code', icon: 'home'}\">\n</button>\n\
