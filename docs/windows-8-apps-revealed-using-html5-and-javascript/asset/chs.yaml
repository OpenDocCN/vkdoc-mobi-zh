- "# 第 3 章 ■ 应用程序控件\n\n## **清单 3-1.** 在`appbar.html`文件中定义`AppBar`\n\n```html\n<div\
  \ id=\"appBar\" data-win-control=\"WinJS.UI.AppBar\">\n  <button data-win-control=\"\
  WinJS.UI.AppBarCommand\"\n          data-win-options=\"{section: 'global', label:\
  \ 'New Item', icon: 'add'}\">\n  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\
  \n          data-win-options=\"{section: 'global', label: 'Stores', icon: 'shop'}\"\
  >\n  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n        \
  \  data-win-options=\"{section: 'global', label: 'Zip Code', icon: 'home'}\">\n\
  \  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n          data-win-options=\"\
  {id: 'done', disabled: true, section: 'selection', label: 'Done', icon: 'accept'}\"\
  >\n  </button>\n</div>\n```\n\n`AppBar`由一个`div`元素表示，该元素的`data-win-control`属性设置为`WinJS.AppBar`。一个`AppBar`包含一个或多个`button`元素，这些元素的`data-win-control`属性设置为`WinJS.UI.AppBarCommand`。每个按钮都需要配置信息，这些信息通过`data-win-options`属性提供，格式为一个简单的\
  \ JavaScript 对象。我稍后将解释这些配置属性的含义。\n\n**提示：** 你也可以使用一系列嵌套的 HTML 元素来指定`AppBar`按钮，这样就不需要类似\
  \ JavaScript 的配置对象了。我不喜欢将代码片段嵌入到标记中，但这是 WinJS 普遍存在的方式，所以我倾向于使用清单中所示的方法。它虽然不太美观，但与其他控件的使用方式保持一致。\n\
  \n## **清单 3-2.** 将 HTML 片段导入`default.html`\n\n```html\n<!DOCTYPE html>\n<html>\n\
  <head>\n  <meta charset=\"utf-8\">\n  <title>MetroGrocer</title>\n\n  <!-- WinJS\
