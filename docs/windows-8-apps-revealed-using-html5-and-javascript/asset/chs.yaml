  \ {\n\n            return this._preferredStores;\n\n        },\n\n        addStore:\
  \ function (newStore) {\n\n            this._preferredStores.push(newStore);\n\n\
  \        },\n\n        getItems: function () {\n\n            return this._shoppingItems;\n\
  \n        },\n\n        addItem: function (newName, newQuantity, newStore) {\n\n\
  \            this._shoppingItems.push({\n\n                item: newName,\n\n  \
  \              quantity: newQuantity,\n\n                store: newStore\n\n   \
  \         });\n\n        }\n\n    });\n\n    ViewModel.UserData.homeZipCode = \"\
  NY 10118\";\n    ViewModel.UserData.addStore(\"Whole Foods\");\n    ViewModel.UserData.addStore(\"\
  Kroger\");\n\n    ViewModel.UserData.addStore(\"Costco\");\n\n    ViewModel.UserData.addStore(\"\
  Walmart\");\n\n    ViewModel.UserData.addItem(\"Apples\", 4, \"Whole Foods\");\n\
  \    ViewModel.UserData.addItem(\"Hotdogs\", 12, \"Costco\");\n    ViewModel.UserData.addItem(\"\
  Soda\", \"4 pack\", \"Costco\");\n\n})();\n```\n\n我稍后会回到视图模型，但首先我需要解释代码的其他部分及其代表的约定。对于后续的\
  \ JavaScript 文件我不会重复这样做，但在你开始 Windows 8 开发时，提供一些有用的背景信息是很有必要的。\n\n## 使用代码补全\n\n\
  Visual Studio 在编辑器中支持 JavaScript 代码补全，这使得编写代码更简单且不易出错。你必须使用引用元素将 JavaScript 文件引入代码补全的作用域，对于不在本地目录中的文件，如下所示：\n\
  \n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n///\
  \ <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n```\n\n在引用元素前加上三个斜杠（`/`）字符会将引用引起\
  \ Visual Studio 的注意，并使 JavaScript 运行时将此语句视为注释。完成这些添加后，`viewmodel.js`文件就获得了对 WinJS\
  \ API 的代码补全支持。如果你希望获得 WinJS 的代码补全，需要将这些引用元素添加到你的每个 JavaScript 文件中。\n\n## 减少全局命名空间污染\n\
  \nJavaScript 中最严重的问题之一是变量名冲突。在函数外部定义的 JavaScript 变量是全局可用的，而由于有意义的变量名数量有限，不同代码区域尝试为不同目的使用相同变量名只是时间问题。全局变量被认为是*全局命名空间*的一部分，定义全局变量通常被称为*污染全局命名空间*。Windows\
  \ 8 JavaScript 文件遵循三种不同的约定来减少命名空间污染，你都应该采用。\n\n### 创建命名空间\n\nWinJS API 通过`Namespace`对象的`define`方法帮助减少全局命名空间污染：\n\
  \n```javascript\nWinJS.Namespace.define(\"ViewModel.UserData\", {\n\n//\n\n. . .\n\
  \n*此处定义了 `ViewModel.UserData` 对象的成员*\n\n. . .\n\n});\n```\n\n\n`define`方法的第一个参数是你要分配给对象的全局名称。在本例中，我指定了`ViewModel.UserData`，这创建了一个名为`ViewModel`的全局变量，该变量具有`UserData`属性。`UserData`属性的值是我作为第二个参数传递给`define`方法的对象，这实际上导出了该对象的成员，使它们可以通过`ViewModel`全局访问。\n\
  \n`UserData`。稍后我将数据应用到标记时，你会看到它的工作方式。\n\n使用`define`方法有两个原因，而不是自己处理。首先，`ViewModel`对象仅在尚不存在时才会被创建。\n\
  \n这意味着我可以通过多次调用`define`方法来轻松构建视图模型的能力。其理念是，我可以在单个全局命名空间对象下关联复杂的对象和函数，并减少变量名冲突的可能性。\n\
  \n**提示** 有一种更复杂的方法来处理这个问题，称为异步模块定义（AMD）。AMD 技术通过允许 JavaScript 文件的消费者选择访问 JavaScript\
  \ 库的变量名称，从而有效消除了全局变量名冲突。Windows 8 不直接支持 AMD 模块，但你可以使用支持 AMD 的脚本加载器，例如`require.js`。\n\
  \n使用`define`方法的第二个原因是，它不会导出任何以下划线字符开头的属性，这是定义私有成员的常见 JavaScript 约定。这意味着当我导出`UserData`对象时，`_shoppingItems`和`_preferredStores`属性不会全局可用。\n\
  \n这是一个很好的技巧，它意味着全局对象的私有实现细节保持私有，但正如你将了解到的，它确实会与其他 WinJS 功能引起一些轻微的问题。\n\n### 使用自执行函数\n\
  \n第二个约定是在 JavaScript 文件中使用自执行函数。自执行函数的基本形式如下：\n```\n(function() {\n    // ... statements\
  \ go here ...\n})();\n```\n将函数包裹在圆括号中，然后立即添加另一对圆括号，会导致函数被定义并立即执行。\n\n你在函数内部定义的任何变量都限定在函数本身的作用域内，并且不会污染全局命名空间。当函数执行完成后，JavaScript\
  \ 运行时会自动清理任何未全局导出的变量。\n\n### 使用严格模式\n\n`use strict`语句对使用 JavaScript 的方式施加了一些约束。\n\
  \n其中一个约束是，在函数中隐式创建全局变量会变成错误。当你没有使用`var`关键字时，会隐式创建全局变量：\n```\nvar color1 = \"blue\"\
  ; // 正确 - 作用域限定在函数内\ncolor2 = \"red\"; // 错误 - 这是一个全局变量\n```\n如果你定义了一个隐式全局变量，JavaScript\
  \ 运行时会生成一个错误。使用严格模式完全是可选的，但这是一个好的实践，它会禁用一些更危险和奇怪的 JavaScript 行为。你可以通过阅读 ECMAScript\
  \ 语言规范附录 C（位于`www.ecma-international.org/publications/files/ECMA-ST/Ecma-262.pdf`）来获取严格模式强制执行变更的完整详细信息。\n\
  \n### 回到视图模型\n\n现在我已经解释了 Windows 8 JavaScript 文件的上下文和约定，我可以转向视图模型的定义。示例 Windows\
  \ 8 应用程序的视图模型将很简单，这部分由`ViewModel.UserData`对象表示，将包含用户特定的数据：用户的家庭邮政编码、购物清单以及他们购买杂货的商店。\n\
  \n我定义了两个数组，用于保存购物清单上项目的详细信息以及用户偏好的商店：`_shoppingItems`和`_preferredStores`。这些属性不作为`ViewModel.UserData`对象的一部分导出，因为它们以下划线开头。为了提供对数据的访问，我定义了一组函数，这些函数返回数组数据并接受要添加到数组中的新项目。`homeZipCode`属性是公开的，并构成全局可用的`ViewModel.UserData`对象的一部分。你可以直接读取和更改此属性的值。\n\
  \n**注意**  `UserData`对象的形状和结构有点奇怪，因为我想展示 WinJS API 的不同方面。在实际项目中，你会以更一致的方式处理数据项。\n\
  \n为了在应用程序中有一些数据可供使用，我在自执行函数中添加了一些语句，用于定义邮政编码、添加一些商店，并在购物清单上放置一些简单的项目：\n```\nViewModel.UserData.homeZipCode\
  \ = \"NY 10118\";\nViewModel.UserData.addStore(\"Whole Foods\");\nViewModel.UserData.addStore(\"\
  Kroger\");\nViewModel.UserData.addStore(\"Costco\");\nViewModel.UserData.addStore(\"\
  Walmart\");\nViewModel.UserData.addItem(\"Apples\", 4, \"Whole Foods\");\nViewModel.UserData.addItem(\"\
  Hotdogs\", 12, \"Costco\");\nViewModel.UserData.addItem(\"Soda\", \"4 pack\", \"\
  Costco\");\n```\n## 使用数据绑定\n\n数据绑定是一种机制，通过它你可以将视图模型中的数据包含在向用户显示的 HTML 中。WinJS API\
  \ 通过`WinJS.Binding`命名空间支持绑定。数据绑定是在 Windows 应用商店应用中使用视图模型的关键。如果你想构建可扩展且稳健的 Windows\
  \ 8 应用程序，我建议投入时间学习如何充分利用 WinJS 绑定功能。\n\n**提示** WinJS 数据绑定不如一些更广泛使用的 Web 应用 JavaScript\
  \ 库（如`Knockout.js`、`Backbone`和`Angular.js`）那样完整或灵活。你可以轻松地在 Windows 应用商店应用中使用这些库，但我建议花时间理解\
  \ WinJS 功能，因为它已集成到 WinJS API 中包含的一些 UI 控件中。\n\n### 使用基本声明式绑定\n\n使用绑定的最简单方式是声明式地，这意味着你直接在\
  \ HTML 标记中包含视图模型数据的详细信息。清单 2-2 展示了如何在`default.html`中绑定到`homeZipCode`值。\n\n**清单 2-2.**\
  \ 一个简单的声明式绑定\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\"\
  >\n    <title>MetroGrocer</title>\n    <!-- WinJS references -->\n    <link href=\"\
  //Microsoft.WinJS.1.0/css/ui-dark.css\" rel=\"stylesheet\">\n    <script src=\"\
