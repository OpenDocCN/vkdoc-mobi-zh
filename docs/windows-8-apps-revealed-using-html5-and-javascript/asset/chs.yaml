  \ 应用商店应用的 Internet Explorer 10 *确实* 支持 getter 和 setter，这意味着你可以像示例中那样直接赋值。\n\n##\
  \ 创建可观察数组\n\n让数组变得可观察需要多费些功夫。首先，必须使用 `WinJS.Binding.List` 类为要操作的数组创建一个包装器。\n\n清单\
