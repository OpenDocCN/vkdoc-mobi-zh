  >\n  <script src=\"//Microsoft.WinJS.1.0/js/base.js\"></script>\n  <script src=\"\
  //Microsoft.WinJS.1.0/js/ui.js\"></script>\n\n  <!-- MetroGrocer 引用 -->\n  <link\
  \ href=\"/css/list.css\" rel=\"stylesheet\">\n  <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\">\n  <script src=\"/js/viewmodel.js\"></script>\n  <script src=\"\
  /js/ui.js\"></script>\n  <script src=\"/js/default.js\"></script>\n</head>\n<body>\n\
  \  <div id=\"contentGrid\">\n    <div id=\"leftContainer\" class=\"gridLeft\">\n\
  \      <h1 class=\"win-type-xx-large\">购物清单</h1>\n      <table id=\"listTable\"\
  \ class=\"type-table-header\">\n        <thead>\n          <tr>\n            <th>数量</th>\n\
  \            <th class=\"itemName\">项目</th>\n            <th class=\"store\">商店</th>\n\
  \          </tr>\n        </thead>\n        <tbody id=\"itemBody\"></tbody>\n  \
  \    </table>\n    </div>\n    <div id=\"topRightContainer\" class=\"gridRight\"\
  >\n      <h1 class=\"win-type-xx-large\">右上容器</h1>\n    </div>\n    <div id=\"bottomRightContainer\"\
  \ class=\"gridRight\">\n      <h1 class=\"win-type-xx-large\">右下容器</h1>\n    </div>\n\
  \  </div>\n\n  <!-- 导入 HTML 片段 -->\n  <div data-win-control=\"WinJS.UI.HtmlControl\"\
  \n       data-win-options=\"{uri: '/html/appbar.html'}\"></div>\n  <!-- HTML 片段结束\
  \ -->\n\n  <!-- 购物清单项目模板 -->\n  <table>\n    <tbody id=\"itemTemplate\" data-win-control=\"\
  WinJS.Binding.Template\">\n      <tr class=\"groceryItem\">\n        <td data-win-bind=\"\
  innerText: quantity\"></td>\n        <td data-win-bind=\"innerText: item\"></td>\n\
  \        <td data-win-bind=\"innerText: store\"></td>\n      </tr>\n    </tbody>\n\
  \  </table>\n  <!-- 购物清单项目模板结束 -->\n\n</body>\n</html>\n```\n\n当你调用`WinJS.UI.processAll`方法时，WinJS\
  \ 会查找所有`data-win-control`属性设置为`WinJS.UI.HtmlControl`的`div`元素，并将其内容设置为`data-win-options`属性中指定的\
  \ HTML 片段。你不能直接指定片段文件，而必须使用清单中所示的类 JSON 格式，将文件名指定为`uri`属性的值。\n\n**提示：** `HTMLControl`仅用于加载不需要执行脚本或定义任何\
  \ CSS 的内容片段。这在我们的示例中是可行的，因为从 HTML 片段设置`AppBar`的 JavaScript 代码是`default.js`的一部分，而该文件已经与主\
  \ HTML 文档关联。并且，正如我稍后将描述的，我必须采取预防措施，确保在执行`AppBar`设置之前，HTML 片段已被加载。在本章后面，我将向你介绍 WinJS\
  \ *页面*，它支持自己的 CSS 和 JavaScript。\n\n加载文件的内容会自动处理，WinJS 会查找并配置我的`AppBar`。你无需担心如何让`AppBar`显示和隐藏。这由\
  \ WinJS 配置，当用户右键单击或从屏幕底部向上滑动时，`AppBar`会出现。图 3-1 展示了`AppBar`的显示效果。\n\n**图 3-1.**\
  \ 为示例应用程序添加`AppBar`\n\n我在图中放大了几个按钮，以便更容易地看到应用于每个`AppBar`按钮的配置属性的效果。`id`和`disabled`属性设置了`button`元素上的相应属性，而`label`属性则设置了按钮下方显示的文本。\n\
  \n`AppBar`有两个区域，`section`属性指定按钮出现在哪个区域。如果`section`属性设置为`global`，则按钮将位于`AppBar`的右侧。此区域用于影响整个应用程序的操作。`section`属性为`selection`的按钮执行适用于当前选中项目的操作，并显示在`AppBar`的左侧。\n\
  \n`icon`属性设置按钮图像。你可以为此属性指定自定义 PNG 文件，或使用 Segoe UI Symbol 字体中定义的符号字符之一。你可以通过指定`WinJS.UI.AppBarIcon`枚举中的值，或直接指定其字符代码（可以通过\
  \ Windows 8 字符映射表工具获取）来引用这些图标。例如，我为其中一个按钮指定了`add`图标，它对应于`WinJS.UI.AppBarIcon.add`值或字符代码`\\\
  uE109`。\n\n**提示：** 可供选择的图标非常多，远多于 API 文档中所列的。打开 References 部分中的`js/ui.js`文件，搜索*icon*即可查看枚举定义的列表。该枚举仅包含常用图标；字体本身定义了更多图标。\n\
  \n### 实现应用栏按钮\n\n在本节中，我将添加代码来实现我添加到`AppBar`中、专用于选择操作的`Done`按钮。为此，我在`ui.js`文件中定义了一个`UI.AppBar`命名空间，并创建了`setupButtons`函数，如清单\
  \ 3-3 所示。\n\n## **清单 3-3.** 为`AppBar`按钮设置支持\n\n```javascript\n/// <reference path=\"\
  //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
  \ />\n(function () {\n  \"use strict\";\n\n  WinJS.Namespace.define(\"UI.AppBar\"\
  , {\n    setupButtons: function () {\n      ViewModel.State.bind(\"selectedItemIndex\"\
  ,\n        function (newValue, oldValue) {\n          done.disabled = (newValue\
  \ == -1);\n      });\n\n      done.addEventListener(\"click\", function (e) {\n\
  \        var selectedIndex = ViewModel.State.selectedItemIndex;\n        ViewModel.UserData.getItems().splice(selectedIndex,\
  \ 1);\n        ViewModel.State.selectedItemIndex = -1;\n      });\n    }\n  });\n\
  \n  WinJS.Namespace.define(\"UI.List\", {\n    //\n    // . . . 为简洁起见，代码已省略 . .\
  \ .\n    //\n  });\n})();\n```\n\n由于`AppBar`按钮是由 HTML 的`button`元素创建的，我可以使用标准的`disabled`属性来控制按钮状态，并通过处理`click`事件来响应用户交互。\n\
  \n我想根据`ViewModel`的变化来控制按钮的状态。\n\n\n\n`State.selectedItemIndex`属性在视图模型中。要监视具有可观察属性的对象，您可以使用`bind`方法来注册一个函数，该函数会在属性值变化时执行。在此列表中，我为`selectedItemIndex`属性创建了一个绑定，以便在用户进行选择时更改按钮的状态。这很好地演示了如何使用\
  \ WinJS 数据绑定将视图模型数据、事件处理函数和 HTML 元素联系起来。\n\n最后一步是在`default.js`文件的`performInitialSetup`中调用`setupButtons`函数，如列表\
  \ 3-4 所示。请注意，我再次在`Promise`对象提供的`then`回调中调用该函数，以确保在开始对包含的元素执行操作之前，我的 HTML 片段已被加载并处理。\n\
  \n**列表 3-4.** 调用`setupButtons`函数\n\n. . .\n\n```\nfunction performInitialSetup(e)\
  \ {\n    WinJS.UI.processAll().then(function () {\n        UI.List.displayListItems();\n\
  \        UI.List.setupListEvents();\n        UI.AppBar.setupButtons();\n    });\n\
  }\n```\n\n. . .\n\n通过这些添加，我已基本实现了一个`AppBar`。如果您在购物列表中选择一个项目，“完成”按钮将被启用，允许您打开`AppBar`并将该项目标记为已完成，同时将其从列表中移除。我不会为所有`AppBar`按钮实现功能，但在下一节中，我将连接“添加”按钮，以演示如何创建和使用`Flyout`。\n\
  \n## 添加 Flyouts\n\n`Flyout`是弹出窗口，可用于向用户提供信息或收集数据。`Flyout`通常与`AppBar`按钮结合使用，在本节中，我将展示如何使用`Flyout`来完成“添加项目”`AppBar`按钮的功能。\n\
  \n首先，我在`html`文件夹中创建了一个名为`addItemFlyout.html`的新文件，其内容如列表 3-5 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**列表 3-5.** 定义`Flyout`\n\n```\n<div id=\"addItemFlyout\" class=\"flyout\" data-win-control=\"\
  WinJS.UI.Flyout\">\n    <div>\n        <label for=\"groceryItem\">项目：</label>\n\
  \        <input id=\"groceryItem\" placeholder=\"例如 苹果\">\n    </div>\n    <div>\n\
  \        <label for=\"quantity\">数量：</label>\n        <input id=\"quantity\" placeholder=\"\
  例如 4\"/>\n    </div>\n    <div>\n        <label for=\"stores\">商店：</label>\n   \
  \     <select id=\"stores\"></select>\n    </div>\n    <div class=\"rightAlign\"\
  >\n        <button id=\"addItemButton\">添加</button>\n    </div>\n</div>\n```\n\n\
  **提示** 如果您习惯于开发 Web 应用，通常会围绕 HTML 表单元素构建数据收集交互。在 Windows 8 应用中，`form`元素并不那么重要，因为大多数交互完全在客户端处理，即使数据是通过\
  \ Ajax 请求发送到远程服务器的。\n\n`Flyout`由`data-win-control`属性设置为`WinJS.UI.Flyout`的`div`元素表示。这是创建`Flyout`的唯一限制，并且我可以在`div`元素内自由添加任何需要的内容以支持与用户的交互。在此示例中，我使用了一些标准的\
  \ HTML 表单控件来收集用户的新项目详细信息。为了设置`Flyout`中元素的样式，我在 Visual Studio 项目的`css`文件夹中添加了一个名为`flyout.css`的文件。您可以在列表\
  \ 3-6 中查看该文件的内容。\n\n**列表 3-6.** `/css/flyouts.css`文件的内容\n\n```\n#addItemFlyout {\
  \ background-color: #85C54C; font-weight: bold;}\ndiv.flyout input { margin-bottom:\
  \ 5px; width: calc(100% - 5px); }\ndiv.flyout select { margin-top: 0px; width: 100%\
  \ }\ndiv.rightAlign { margin-top: 10px; float: right;}\n```\n\n我已将`link`元素添加到`default.html`文件的`head`部分，以将`flyout.css`文件纳入作用域，如列表\
  \ 3-7 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**列表 3-7.** 将`flyout.css`文件引入`default.html`文件\n\
  \n. . .\n\n```\n<head>\n    <meta charset=\"utf-8\">\n    <title>MetroGrocer</title>\n\
  ```\n\n\n\n<!-- WinJS 引用 -->\n\n<link href=\"//Microsoft.WinJS.1.0/css/ui-dark.css\"\
  \ rel=\"stylesheet\">\n<script src=\"//Microsoft.WinJS.1.0/js/base.js\"></script>\n\
  <script src=\"//Microsoft.WinJS.1.0/js/ui.js\"></script>\n\n<!-- MetroGrocer 引用\
  \ -->\n<link href=\"/css/list.css\" rel=\"stylesheet\">\n<link href=\"/css/flyout.css\"\
  \ rel=\"stylesheet\">\n<link href=\"/css/default.css\" rel=\"stylesheet\">\n<script\
  \ src=\"/js/viewmodel.js\"></script>\n<script src=\"/js/ui.js\"></script>\n<script\
  \ src=\"/js/default.js\"></script>\n</head>\n\n...\n\n### 将浮出控件与应用栏命令关联\n\n定义好浮出控件后，我现在可以将其与我的应用栏关联起来。为此，我需要在\
  \ `appbar.html` 文件中为“新建项目”按钮元素添加配置属性，如清单 3-8 所示。\n\n***清单 3-8.*** 将浮出控件与应用栏按钮关联\n\
