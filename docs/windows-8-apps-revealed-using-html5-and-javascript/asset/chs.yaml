  \ center;\n  margin: 20px;\n  padding-bottom: 5px;\n  border-bottom: thin solid\
  \ white;\n}\n```\n\n## 控制任务\n\n对于地理定位和 Ajax 请求，这里仅作简要说明，因为本示例的重点是创建周期性重复的后台任务。任务的具体功能并不重要。`location.js`文件中最重要的部分是`startTracking`和`stopTracking`函数。当调用`startTracking`函数时，我会创建一个新的`Promise`对象来代表整个后台任务。\n\
  \n**提示** 我使用`Promise`对象作为两个内部`Promise`对象的包装器，这两个内部`Promise`分别代表位置数据请求和后续的 Ajax 请求。当两个内部`Promise`对象都完成后，我会调用`complete`函数，该函数作为回调参数传入我创建`Promise`对象时所使用的回调函数。关于`WinJS.Promise`对象的更多信息，请参阅\
  \ API 参考文档。\n\n每次请求完成后，我会创建另一个封装新请求的`Promise`，只要`tracking`变量为`true`，就会重复此过程。我每五秒启动一个新的请求周期。\n\
  \n当调用`stopTracking`函数时，我将`tracking`变量设置为`false`，并返回代表当前请求周期的`Promise`。我返回的`Promise`表示两种状态之一的请求周期：第一种状态是请求处于活动状态，意味着我正在等待地理定位数据或\
  \ Ajax 请求完成，或者在向 DOM 应用更新。如果对活动`Promise`调用`then`方法，回调函数将直到周期完成后才会执行。第二种状态是请求已完成，并且在下一个周期开始前处于间歇期。对已完成的`Promise`调用`then`方法将导致回调函数立即执行。\n\
  \n基于此，我能够利用不同生命周期事件的处理程序将后台任务集成到`default.js`中，如代码清单 5-5 所示。\n\n***代码清单 5-5*** 使用生命周期事件控制后台任务\n\
  \n```javascript\n(function () {\n  \"use strict\";\n\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
  activated\", performInitialSetup);\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
  resuming\", performResume);\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
  suspending\", performSuspend);\n\n  function performInitialSetup(e) {\n    WinJS.UI.processAll().then(function\
  \ () {\n      UI.List.displayListItems();\n      UI.List.setupListEvents();\n  \
  \    UI.AppBar.setupButtons();\n      UI.Flyouts.setupAddItemFlyout();\n      ViewModel.State.bind(\"\
  selectedItemIndex\", function (newValue) {\n        var targetElement = document.getElementById(\"\
  itemDetailTarget\");\n        WinJS.Utilities.empty(targetElement);\n        var\
  \ url = newValue == -1 ? \"/html/noSelection.html\"\n                          \
  \        : \"/pages/itemDetail/itemDetail.html\";\n        WinJS.UI.Pages.render(url,\
  \ targetElement);\n      });\n      WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
  , document.getElementById(\"storeDetailTarget\"));\n      //Tiles.sendTileUpdate();\n\
  \      //Tiles.sendBadgeUpdate();\n      Location.startTracking();\n    });\n  }\n\
  \n  function performResume(e) {\n    Location.startTracking();\n  }\n\n  function\
  \ performSuspend(e) {\n    var promise = Location.stopTracking();\n    if (promise)\
  \ {\n      var deferral = e.suspendingOperation.getDeferral();\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n```javascript\npromise.then(function () {\n    deferral.complete();\n});\n\
  })();\n```\n\n针对激活（activated）和恢复（resuming）事件的改动很简单：在这两种情况下，我都希望启动后台任务，因此只需调用 `Location.startTracking`\
  \ 方法即可。这段代码中最为有趣的部分，也是我将此示例纳入本章的原因，在于我如何处理挂起（suspending）事件。\n\n**提示** 请注意，我已注释掉了应用磁贴和徽章更新的代码行。这样做是为了让示例应用能在模拟器中运行。同时，我也禁用了\
  \ `tiles.js` 文件中的事件处理程序。\n\n我的问题是，当 Windows 挂起我的应用时，任何正在活动的后台任务都会在应用恢复时自动继续执行。根据任务在被挂起时所处请求周期的位置，我可能会遇到错误（例如，尝试读取在挂起期间已超时的网络请求数据），或获取到过期数据（因为我的任务在应用被挂起前正准备更新\
  \ DOM）。\n\n为帮助解决这些问题，`suspending` 事件定义了一个名为 `suspendingOperation` 的属性，该属性返回一个 `Windows.ApplicationModel.SuspendingOperation`\
  \ 对象。调用此对象的 `getDeferral` 方法，是请求 Windows 为你的应用提供更多时间来准备挂起。当完成后台任务的收尾工作后，你在 `getDeferral`\
  \ 方法返回的对象上调用 `complete` 方法，向 Windows 发出信号，表明你的应用现在已准备好被挂起。\n\n请求延迟操作会额外获得五秒钟的时间来准备挂起。这听起来可能不多，但考虑到\
  \ Windows 可能承受着很大的压力来让你的应用让出系统资源，这已经是相当宽裕的时间了。\n\n**警告** 如果应用未能在五秒的允许时间内调用延迟对象上的\
  \ `complete` 方法，Windows 将终止该应用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
