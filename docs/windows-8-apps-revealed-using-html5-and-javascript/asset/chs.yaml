  >移除项目</button>\n\n</div>\n\n</div>\n\n. . .\n\n这些元素中没有特殊的数据属性，只是普通的 HTML。所有操作都在\
  \ `default.js` 文件中完成，如清单 2-11 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-52_1.jpg)\n\n## 第 2 章 ■ 数据与绑定\n\n**清单 2-11.** 使用 JavaScript 桥接 HTML\
  \ 元素和 `WinJS.Binding.List`\n\n. . .\n\n```\nfunction performInitialSetup(e) {\n\n\
  WinJS.Utilities.query(‘button’).listen(\"click\", function (e) {\n\nif (this.id\
  \ == \"addItemButton\") {\n\nViewModel.UserData.addItem(\"Ice Cream\", 1, \"Vanilla\"\
  , \"Walmart\");\n\n} else {\n\nViewModel.UserData.getItems().pop();\n\n}\n\n});\n\
  \nvar setValue = function () {\n\nvar list = ViewModel.UserData.getItems();\n\n\
