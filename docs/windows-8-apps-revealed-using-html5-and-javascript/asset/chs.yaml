- "# 第 2 章\n\n## 数据与绑定\n\n在本章中，我将向你展示如何定义和使用构成 Windows 8 应用程序核心的数据。为此，我将松散地遵循*视图模型*模式，该模式允许我将数据与用于向用户呈现数据的\
  \ HTML 清晰地分离开来。这使得应用程序更易于编写、测试和维护。\n\n你可能已经从模型-视图-控制器（MVC）和模型-视图-视图控制器（MVVC）等设计模式中熟悉了模型和视图模型。\n\
  \n我不打算在本书中深入探讨这些模式的细节。关于 MVC 和 MVVC 有很多优秀的信息可供参考，从维基百科开始就有一些非常平衡且富有洞察力的描述。\n\n我发现使用视图模型的好处巨大，对于所有但最简单的\
  \ Windows 8 项目而言，都非常值得考虑，我建议你认真考虑遵循同样的路线。我并非模式狂热者，我坚信应该采纳那些能解决实际问题的模式和技术的部分，并使其适应特定项目。因此，你会发现我对视图模型的使用方式持有相当宽松的看法。\n\
  \n本章主要关注 Windows 应用商店应用程序后台的底层机制。我会从简单开始，向你展示将 JavaScript 代码添加到 Windows 8 项目的约定，以及如何使用\
  \ Windows 8 的 JavaScript 特性来减少全局命名空间污染。接着，我会定义一个简单的视图模型，并演示将数据从视图模型带入应用程序显示的不同技术。本章旨在为\
  \ Windows 应用商店应用程序打下坚实基础，并让你掌握核心的 Windows 8 JavaScript 功能。表 2-1 提供了本章摘要。\n\n***表\
  \ 2-1.** 本章摘要*\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 创建一个视图模型。 | 使用 `WinJS.Namespace.define`\
  \ 方法创建一个包含应用程序数据的全局对象。 | |\n| 显示视图模型中的值。 | 使用 `data-win-bind` 属性创建声明式绑定，并调用 `WinJS.Binding.processAll`\
  \ 方法进行处理。 | 2, 3 |\n\n（*续*）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n***表 2-1.***（*续*）\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 创建动态绑定。 | 使用 `WinJS.Binding.as`\
  \ 方法创建一个可观察的数据属性。为该属性分配新值以触发 HTML 中的更新。 | 4, 6–8 |\n| 在全局可用的命名空间对象中创建可观察的数据属性。 |\
  \ 确保具有可观察属性的对象不是由 `WinJS.Namespace.define` 方法直接导出的。 | |\n| 创建可观察的数组。 | 使用 `WinJS.Binding.List`\
  \ 对象。 | 9–11 |\n| 从可观察的数组生成 HTML 元素。 | 使用 WinJS 模板功能。 | 12–17 |\n\n## 创建 JavaScript\
  \ 文件\n\n第一步是创建一个新的 JavaScript 文件。与 Web 应用程序不同，没有必要减少 Windows 应用商店应用程序中 JavaScript\
  \ 文件的数量，因为当应用程序启动时，它们已经驻留在用户的计算机上。这意味着我不需要合并文件，也不需要考虑最小化代码以减小脚本文件的大小。\n\n相反，我可以为每个主要的应用程序功能创建独立的文件。\n\
  \n在解决方案资源管理器窗口中右键点击`js`文件夹，从菜单中选择添加 ➤ 新建项来添加一个新文件。从列表中选择 JavaScript 文件，将名称设置为`viewmodel.js`，然后点击添加按钮创建该文件。Visual\
  \ Studio 将在项目中添加一个空的新文件并打开它以供编辑。添加清单 2-1 中所示的语句。\n\n***清单 2-1.** 视图模型类的初始内容*\n\n\
  ```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n///\
  \ <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n\n    \"\
  use strict\";\n\n    WinJS.Namespace.define(\"ViewModel.UserData\", {\n\n      \
  \  // 私有成员\n\n        _shoppingItems: [],\n\n        _preferredStores: [],\n\n \
