  \n第 3 章 ■ 应用程序控件\n\n**T**\n\n■ **提示** 除了 `flyout` 值，你还可以将 `type` 属性设置为 `toggle`，以创建一个用户可开启或关闭的应用栏按钮。`button`\
  \ 值相当于完全不设置 `type` 属性，此时应用栏按钮的工作方式与常规 HTML 按钮相同（本章前面已有演示）。\n\n为了指定与按钮关联的浮出控件，我将\
  \ `type` 属性设置为 `flyout`，并将 `flyout` 属性设置为浮出控件元素的 `id`。\n\n### 导入浮出控件内容\n\n要将我的浮出控件\
  \ HTML 片段引入应用程序，我需要更新 `default.html` 并再次使用 `HTMLControl`：\n\n```\n...\n<!-- 导入 HTML\
  \ 片段 -->\n<div data-win-control=\"WinJS.UI.HtmlControl\"\ndata-win-options=\"{uri:\
  \ '/html/appbar.html'}\"></div>\n<div data-win-control=\"WinJS.UI.HtmlControl\"\n\
  data-win-options=\"{uri: '/html/addItemFlyout.html'}\"></div>\n<!-- HTML 片段结束 -->\n\
  ...\n```\n\n当用户点击按钮时，我的浮出控件会自动显示，如图 3-2 所示。\n\n***图 3-2.*** 将浮出控件与应用栏按钮关联\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 ■ 应用程序控件\n\n### 连接浮出控件中的控件\n\n点击“新建项目”应用栏命令按钮会显示浮出控件，但它包含的元素尚未与应用程序的其余部分连接。为了完成浮出控件，我需要用视图模型中商店的详细信息填充\
  \ `select` 元素，并处理“添加”按钮的点击事件，以便将新项目添加到列表中。\n\n清单 3-9 展示了 `ui.js` 文件中 `UI` 命名空间新增的代码，用于处理这两个任务。\n\
  \n***清单 3-9.*** 为 UI 命名空间添加浮出控件支持\n\n```\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\"\
  \ />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" /> (function () {\n\
  \"use strict\";\n\nWinJS.Namespace.define(\"UI.Flyouts\", {\nsetupAddItemFlyout:\
  \ function () {\n\nWinJS.Utilities.empty(stores);\n\nvar list = ViewModel.UserData.getStores();\n\
  \nlist.forEach(function (item) {\nvar newOption = document.createElement(\"option\"\
  ); newOption.text = item;\nstores.add(newOption);\n});\n\naddItemButton.addEventListener(\"\
  click\", function () {\nViewModel.UserData.addItem(groceryItem.value, quantity.value,\
  \ stores.value);\naddItemFlyout.winControl.hide();\nappBar.winControl.hide();\n\
  });\n}\n});\n\n//\n... *为简洁起见，省略了其他命名空间定义*\n})();\n```\n\n我创建了一个 `UI.Flyouts` 对象，其中定义了\
  \ `setupAddItemFlyout` 函数。\n\n该函数从视图模型中填充 `select` 控件，当点击“添加”按钮时，它会读取 `input` 和\
  \ `select` 元素的值，并使用它们在购物清单中创建一个项目。\n\n当我处理完浮出控件后，我定位到 `div` 元素并使用 `winControl` 属性来获取\
  \ WinJS 中特定于浮出控件的成员。`hide` 方法会关闭浮出控件，并将用户返回到主布局。我对 `AppBar` 元素也执行了相同的操作，否则当浮出控件关闭时，应用栏仍会保持可见。\n\
  \n有关 `AppBar` 和 `Flyout` 元素的 `winControl` 属性提供的其他方法的详细信息，请参阅 WinJS API 文档。\n\n当然，仅仅定义这段代码是不够的；我还需要从\
  \ `default.js` 文件中调用该函数，如清单 3-10 所示。\n\n***清单 3-10.*** 调用代码设置浮出控件\n\n```\n...\n\
  function performInitialSetup(e) {\nWinJS.UI.processAll().then(function () {\nUI.List.displayListItems();\n\
  UI.List.setupListEvents();\nUI.AppBar.setupButtons();\nUI.Flyouts.setupAddItemFlyout();\n\
  });\n}\n...\n```\n\n这些添加的效果是为用户提供一个可供选择的商店下拉列表，当用户点击“添加”按钮时，他们添加的详细信息将用于在视图模型中创建一个新的数据项。你可以在图\
  \ 3-3 中看到填充后的 `select` 元素的效果。\n\n***图 3-3.*** 在浮出控件中填充 select 元素\n\n## 使用页面\n\n\
  在本章前面，我使用了 `HTMLControl` 将片段导入到我的主 HTML 文档中。使用 `HTMLControl` 的主要限制在于，你无法安排在内容加载时收到通知。对于只是利用片段来重用标记区域的场景来说，这没问题，但如果你想要根据用户输入动态加载内容片段，`HTMLControl`\
  \ 就没什么太大帮助了。\n\n`HTMLControl` 是围绕一个更复杂的 WinJS 功能（称为*页面*）的简单声明式封装。页面必须在 JavaScript\
  \ 中进行设置和管理，但它们提供了一组更丰富的函数，并且关键的是，它们支持回调，这些回调可用于在应用程序生命周期的任何点集成内容。\n\n为了演示页面功能，我将实现布局的右上角区域，允许用户编辑当前选中项目的内容，并在未进行任何选择时显示一条有用的消息。\n\
  \n我需要做三件事来使用一个页面。第一是定义 HTML，第二是编写加载 HTML 时将执行的 JavaScript，第三是加载并显示该 HTML 作为应用程序的一部分。\n\
  \n### 定义 HTML\n\n第一步，我在项目的 `html` 文件夹中创建了一个名为 `noSelection.html` 的文件。清单 3-11 显示了该文件的内容。这是当用户未选择任何购物清单项目时将显示给用户的标记。\n\
  \n***清单 3-11.*** noSelection.html 文件\n\n```\n<div id=\"noselectionContainer\" class=\"\
  win-type-x-large\">\n<p>你的清单上有 <span id=\"numberCount\"></span> 个项目</p>\n<p>选择以编辑</p>\n\
  </div>\n```\n\n这就是 HTML 文件的完整内容；它只包含我想要插入到文档中的元素，这与之前使用 `HTMLControl` 功能时的方法相同。我稍后会向你展示如何使用完整的\
  \ HTML 文档，但我想强调的是，页面功能可以非常轻松地处理标记片段，这也是我分解应用程序的常用方式。\n\n### 创建 JavaScript 回调\n\n\
  第二步是定义 HTML 加载时将执行的代码。\n\n\n\n记住，这是使用`pages`特性的主要好处；我可以依赖于每次显示片段时执行指定的代码，从而配置元素以匹配应用的当前状态。`Listing\
  \ 3-12`显示了我在`js`文件夹中创建的`pages.js`文件的内容。\n\n***Listing 3-12.*** 定义页面片段加载时执行的代码\n\n\
  ```\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference\
  \ path=\"//Microsoft.WinJS.1.0/js/ui.js\" /> (function () {\n\n\"use strict\";\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 3 ■ APPLICATION CONTROLS\n\
  \nWinJS.UI.Pages.define(\"/html/noselection.html\", {\n\nready: function (targetElement)\
  \ {\n\nnumberCount.innerText = ViewModel.UserData.getItems().length;\n\n}\n\n});\n\
  \n})();\n```\n\n回调函数通过`WinJS.UI.Pages.define`方法设置。参数是待加载的 HTML 文件的 URL 和一个对象，该对象的属性定义了在此过程中执行的函数。支持多个属性名称，但最有用的是`ready`，分配给此属性的函数将在\
  \ HTML 加载并由 Windows 8 运行时处理后执行。\n\n在此示例中，我的`ready`回调函数定位`noSelection.html`标记中`id`属性值为`numberCount`的`span`元素，并将其内容设置为购物清单中的项目数量。我已在`default.html`文件中添加了一个`script`元素来加载`pages.js`：\n\
  \n```\n. . .\n\n<head>\n<meta charset=\"utf-8\">\n<title>MetroGrocer</title>\n\n\
  <!-- WinJS references -->\n<link href=\"//Microsoft.WinJS.1.0/css/ui-dark.css\"\
  \ rel=\"stylesheet\">\n<script src=\"//Microsoft.WinJS.1.0/js/base.js\"></script>\n\
  <script src=\"//Microsoft.WinJS.1.0/js/ui.js\"></script>\n\n<!-- MetroGrocer references\
  \ -->\n<link href=\"/css/list.css\" rel=\"stylesheet\">\n<link href=\"/css/flyout.css\"\
  \ rel=\"stylesheet\">\n<link href=\"/css/default.css\" rel=\"stylesheet\">\n<script\
  \ src=\"/js/viewmodel.js\"></script>\n<script src=\"/js/ui.js\"></script>\n<script\
  \ src=\"/js/pages.js\"></script>\n<script src=\"/js/default.js\"></script>\n</head>\n\
  \n. . .\n```\n\n**提示：** 我将此功能的 HTML 和 JavaScript 定义放在不同文件中，以便能在一个地方构建 JavaScript\
  \ 功能。另一种流行的做法是将调用`WinJS.UI.Pages.define`方法的代码放在与 HTML 相同的文件的`script`元素中。\n\n---\n\
  \n### 加载和显示 HTML\n\n`define`方法不会加载 HTML；它仅设置回调。我的下一步是在`default.html`文件中添加一个目标元素，我将使用`pages`特性向其中加载内容。您可以在`Listing\
  \ 3-13`中看到我添加的元素。占位符不需要特殊属性；一个普通的`div`元素即可，最好带有`id`属性以便稍后轻松定位。\n\n***Listing 3-13.***\
  \ 在`default.html`中添加页面占位符元素\n\n```\n. . .\n\n<div id=\"topRightContainer\" class=\"\
  gridRight\">\n    <h1 class=\"win-type-xx-large\">Item Detail</h1>\n    <div id=\"\
  itemDetailTarget\"></div>\n</div>\n\n. . .\n```\n\n最后一步是在目标元素中显示页面。您可以在`Listing\
  \ 3-14`中看到对`default.js`文件的添加内容。\n\n***Listing 3-14.*** 加载 WinJS 页面\n\n```\n. . .\n\
  \nfunction performInitialSetup(e) {\n    WinJS.UI.processAll().then(function ()\
  \ {\n        UI.List.displayListItems();\n        UI.List.setupListEvents();\n \
  \       UI.AppBar.setupButtons();\n        UI.Flyouts.setupAddItemFlyout();\n  \
  \      WinJS.Utilities.empty(itemDetailTarget)\n        WinJS.UI.Pages.render(\"\
  /html/noSelection.html\", itemDetailTarget);\n    });\n}\n\n. . .\n```\n\n第一个新语句移除目标元素中已存在的任何子元素。第二个新语句是关键：我通过调用`WinJS.UI.Pages.render`方法来显示页面。该方法的参数是\
  \ HTML 文档的 URL 和内容将被插入的占位符元素。\n\n\n\n当我调用 `render` 方法时，`WinJS` 不仅会将指定文件中的 HTML 插入文档，还会确保我的\
  \ `ready` 回调函数（即在 `pages.js` 中定义的函数）得到执行。这让我能够处理这些元素——在此例中，即插入关于购物清单上物品数量的详细信息，如图\
  \ 3-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-76_1.jpg)\n\
  \n## 第 3 章 ■ 应用程序控件\n\n**图 3-4.** *使用页面将回调函数与 HTML 片段关联*\n\n现在，我正在向布局中右上角的元素添加内容，为此我已注释掉在第\
  \ 1 章中添加的 CSS `background-color` 属性，以演示如何在 Visual Studio 中重新加载应用程序。您可以在清单 3-15 中看到我对\
  \ `/css/default.css` 文件所做的修改，即将该元素恢复为应用程序中其他地方使用的默认背景颜色。\n\n**清单 3-15.** 注释掉 `default.css`\
  \ 文件中的 `background-color` 属性\n\n```\n. . .\n\n#topRightContainer {\n  -ms-grid-column:\
  \ 2;\n  -ms-grid-row: 1;\n  /*background-color: #808080;*/\n}\n\n. . .\n```\n\n\
  ### 加载完整的 HTML 文档\n\n页面示例的一个变体是处理完整的 HTML 文档，而非片段。基本方法相同，但我可以包含 `script` 和 `link`\
  \ 元素来加载特定于此文档的 JavaScript 和 CSS 文件。这意味着我可以将回调定义代码和 CSS 样式与应用程序的其他部分分离开。首先，我创建一个名为\
  \ `pages` 的新文件夹，并在其中创建另一个名为 `itemDetail` 的文件夹。然后，我添加一个名为 `itemDetail.html` 的新 HTML\
  \ 文件，如清单 3-16 所示。\n\n**清单 3-16.** `itemDetail.html` 文件\n\n```\n<!DOCTYPE html>\n\
  <html>\n<head>\n  <title></title>\n  <script src=\"itemDetail.js\"></script>\n \
  \ <link href=\"itemDetail.css\" rel=\"stylesheet\">\n</head>\n<body>\n<div id=\"\
  itemEditor\">\n  <div>\n    <label for=\"itemInput\">Item:</label><input id=\"itemInput\"\
  >\n  </div>\n  <div>\n    <label for=\"quantityInput\">Quantity:</label>\n    <input\
  \ id=\"quantityInput\">\n  </div>\n  <div>\n    <label for=\"storeSelect\">Store:</label>\n\
  \    <select id=\"storeSelect\" size=\"3\"></select>\n  </div>\n</div>\n</body>\n\
  </html>\n```\n\n此文件中的标记提供了一个 `select` 元素和两个 `input` 元素，允许用户编辑购物清单项目的详细信息。与上一个示例的不同之处在于，这是一个完整的\
  \ HTML 文档，其中包含一个导入 `itemDetail.js` 文件的 `script` 元素和一个导入 `itemDetail.css` 文件的 `link`\
  \ 元素，我已将这两个文件与 `itemDetail.html` 一同创建在 `pages/itemDetail` 文件夹中。\n\n`/pages/itemDetail/itemDetail.css`\
  \ 文件包含一些基本样式，用于布局 HTML 文件中的元素。您可以在清单 3-17 中看到该文件的内容。这只是标准的 CSS，该文件不包含任何 Windows\
  \ 8 特定的功能。\n\n**清单 3-17.** `itemDetail.css` 的内容\n\n```\n#itemEditor {font-weight:\
  \ bold;margin-top: 20px;}\n#itemEditor input {margin-bottom: 5px;display: block;\
  \ font-size: 16pt;}\n#itemEditor select {font-size: 16pt;}\n#itemEditor select,\
  \ #itemEditor textarea {margin-top: 0px;display: block;}\n#buttons {margin-top:\
  \ 20px;}\niframe {width: calc(100% - 10px);margin-top: 20px;height: 100%;}\n#storeDetailTarget,\
  \ #storeSelectionContainer {height: 100%;}\n```\n\n`/pages/itemDetail/itemDetail.js`\
  \ 文件包含页面加载时的回调，如清单 3-18 所示。\n\n**清单 3-18.** 为 `itemDetail.html` 页面定义页面回调\n\n```\n\
  /// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"\
  //Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n  \"use strict\";\n\n  WinJS.UI.Pages.define(\"\
  /pages/itemDetail/itemDetail.html\", {\n    ready: function (targetElement) {\n\
  \      var selectedIndex = ViewModel.State.selectedItemIndex;\n      var selectedItem\
  \ = ViewModel.UserData.getItems()\n        .getAt(selectedIndex);\n      itemInput.value\
  \ = selectedItem.item;\n      quantityInput.value = selectedItem.quantity;\n   \
  \   WinJS.Utilities.empty(storeSelect);\n      var list = ViewModel.UserData.getStores();\n\
  \      list.forEach(function (item) {\n        var newOption = document.createElement(\"\
  option\");\n        newOption.text = item;\n        if (selectedItem.store == item)\
  \ {\n          newOption.selected = true;\n        }\n        storeSelect.add(newOption);\n\
  \      });\n      WinJS.Utilities.query('#itemEditor input, #itemEditor select')\n\
  \        .listen(\"change\", function () {\n          ViewModel.UserData.getItems().setAt(selectedIndex,\
  \ {\n            item: itemInput.value,\n            quantity: quantityInput.value,\n\
  \            store: storeSelect.value\n          });\n        });\n    }\n  })\n\
  })();\n```\n\n当我调用 `define` 方法时，必须指定想要被通知的 HTML 文档的*完整*路径。这意味着要写 `pages/itemDetail/itemDetail.html`，而不仅仅是\
  \ `itemDetail.html`。这与 `itemDetail.html` 内部定义的 CSS 和 JavaScript 文件的链接不同，那些链接是相对路径（即仅\
  \ `itemDetail.js`）。\n\n由于用于 JavaScript 应用的 Windows 8 运行时本质上是一个常规浏览器，因此一旦 `script`\
  \ 元素被处理，JavaScript 代码就会立即执行。这意味着回调函数在文档完全加载之前就已注册，并且在文档处理完成后会被调用。这为保持页面自包含提供了一种很好的方式，并且您不需要将回调定义与主应用代码放在一起。\n\
  \n此示例中的回调函数非常简单，只是使用 `input` 和 `select` 元素中的值，通过 `WinJS.Binding.List.setAt` 方法来修改购物清单项目。`setAt`\
  \ 方法完全替换列表中的项目，并触发一个 `itemchanged` 事件，我在第 2 章中向您展示过。此事件会导致显示列表项目的 `table` 元素根据用户所做的更改进行更新。\n\
  \n### 在页面之间切换\n\n现在我有两个页面，我可以在主布局中切换它们。我想在未选择任何项目时显示 `noSelection.html` 页面，并在做出选择时显示\
  \ `itemDetail.html` 页面。实现此目的最简单的方法是绑定到 `ViewModel.State.selectedItemIndex` 属性。清单\
  \ 3-19 显示了 `default.js` 文件中的更改。\n\n**清单 3-19.** 响应视图模型更新，在两个页面之间切换\n\n```\n. . .\n\
  function performInitialSetup(e) {\n  WinJS.UI.processAll().then(function () {\n\
  \    UI.List.displayListItems();\n    UI.List.setupListEvents();\n    UI.AppBar.setupButtons();\n\
  \    UI.Flyouts.setupAddItemFlyout();\n    ViewModel.State.bind(\"selectedItemIndex\"\
  , function (newValue) {\n      WinJS.Utilities.empty(itemDetailTarget)\n      var\
  \ url = newValue == -1 ? \"/html/noSelection.html\" :\n        \"/pages/itemDetail/itemDetail.html\"\
  \n      WinJS.UI.Pages.render(url, itemDetailTarget);\n    });\n  });\n}\n. . .\n\
  ```\n\n我通过改变传递给 `WinJS.UI.Pages.render` 方法的 URL 参数的值来响应 `selectedItemIndex` 属性的更改。每次显示一个页面时，都会执行相应的回调函数，我的内容会更新并呈现给用户。\n\
  \n**提示** 请注意，当您使用 `bind` 方法时，您的回调函数将使用您正在监视的属性的当前值来执行。这确保即使尚未进行选择，也能显示正确的页面。\n\n\
  这些添加的结果是，单击列表中的项目允许用户编辑其详细信息，而将项目标记为完成或添加新项目则会清除选择并隐藏详细信息页面。您可以在图 3-5 中看到效果。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-80_1.jpg)\n\n\
  ## 第 3 章 ■ 应用程序控件\n\n\n\n### 图 3-5：允许用户编辑购物清单项目的详细信息\n\n页面回调中的代码会在该页面*每次*显示时执行。你需要确保代码不会对页面元素的状态做出假设，除非它们已被加载并添加到主布局中。由于页面是在主布局的上下文中加载的，你可以安全地使用主\
  \ HTML 文档中 JavaScript 代码定义的函数。在我的示例中，这包括视图模型。同样，你的元素将受到主文档定义的 CSS 样式影响。\n\n**提示**\
  \ 请注意，我在 `select` 元素上使用了 `size` 属性，以便一次性显示多个选项。这是 Windows 8 中属于主应用程序布局的 `select`\
  \ 元素的约定。然而，对于浮出控件（例如我在本章前面创建的），约定是使用单行 `select`，它会打开一个下拉选项列表。\n\n## 显示外部内容\n\nWinJS\
  \ 页面功能仅适用于属于应用程序的内容。如果你使用 `WinJS.UI.Pages.render` 方法请求外部 URL，将会产生错误。相反，如果你想显示外部\
  \ HTML 文档，则必须使用 `iframe` 元素，但如果你希望将应用程序分解为可管理的小块以获取益处，可以将此元素与 WinJS 页面功能结合使用。为了演示这一点，我在\
  \ `html` 目录中创建了一个名为 `storeDetail.html` 的新文件。清单 3-20 显示了此文件的内容。\n\n### 清单 3-20：`storeDetail.html`\
  \ 文件\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<title></title>\n</head>\n<body>\n\
  <div id=\"noStoreSelectionContainer\" class=\"win-type-x-large\">\n<p>在列表中选择一个项目</p>\n\
  </div>\n<div id=\"storeSelectionContainer\">\n<iframe id=\"storeFrame\" seamless\
  \ sandbox=\"\"></iframe>\n</div>\n</body>\n</html>\n```\n\n这是一个简单的文档，充当 `iframe`\
  \ 元素和占位元素（当未选择列表项时显示）的包装器。当然，最重要的元素是 `iframe`。`seamless` 属性指定不应在 `iframe` 周围绘制边框，而将\
  \ `sandbox` 属性设置为空字符串可防止嵌入的内容运行任何脚本、导航到新页面以及提交表单。我将使用 `iframe` 显示与所选项目关联的杂货店主页。这些页面包含各种跟踪脚本和一些极易出错的代码，我希望我的用户不必处理这些。\n\
  \n## 添加回调\n\n我将采用与加载片段时相同的方法来定义回调。我已将回调函数添加到 `pages.js` 文件中，你可以在清单 3-21 中看到这些添加的内容。\n\
  \n### 清单 3-21：为页面定义回调\n\n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\"\
  \ />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n\
  \    \"use strict\";\n    WinJS.UI.Pages.define(\"/html/noselection.html\", {\n\
  \        ready: function (targetElement) {\n            numberCount.innerText =\
  \ ViewModel.UserData.getItems().length;\n        }\n    });\n    WinJS.UI.Pages.define(\"\
  /html/storeDetail.html\", {\n        ready: function (targetElement) {\n       \
  \     ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n      \
  \          noStoreSelectionContainer.style.display =\n                    (newValue\
  \ != -1 ? \"none\" : \"\");\n                storeSelectionContainer.style.display\
  \ =\n                    (newValue == -1 ? \"none\" : \"\");\n                if\
  \ (newValue != -1) {\n                    var store = ViewModel.UserData.getItems()\n\
  \                        .getAt(newValue).store;\n                    var url =\
  \ \"http://\" + store.replace(\" \", \"\") + \".com\";\n                    document.getElementById(\"\
  storeFrame\").src = url;\n                }\n            });\n        }\n    })\n\
  })();\n```\n\n在此页面的 `ready` 回调中，我绑定到 `selectedItemIndex` 属性。当用户选择一个项目时，我使用 `iframe`\
  \ 显示相关商店的主页。更改 `style.display` 属性的值让我可以在占位元素和当前商店的详细信息之间切换。我根据商店名称创建 URL 的技术非常基础。我只是删除所有空格，并在名称末尾添加\
  \ `.com`。这对于实际项目来说是不够的，但对于我的简单示例来说已经足够了。\n\n**注意** 请注意，我使用 `document.getElementById`\
  \ 方法获取 `iframe` 元素。如果你通过全局变量引用该元素，则在尝试设置 `src` 属性时会引发安全异常。如果你通过 DOM API 获取该元素，则不会出现此问题。\n\
  \n## 显示页面\n\n你必须避免使用 `ready` 回调为不总是显示的页面设置绑定，因为 JavaScript 代码每次加载页面时都会执行。随着时间的推移，你最终会得到一系列执行相同任务的绑定。WinJS\
  \ 并没有提供在页面内容从布局中移除时进行清理的机制，因此最好的方法是将绑定移到应用程序的主 JavaScript 文件中。\n\n对于 `storeDetails.html`\
  \ 页面来说，这不是问题，因为它只加载一次，并且永远不会从文档中移除。在这种情况下，我使用 WinJS 页面功能只是为了将我的 Windows 8 应用分解为独立的模块，以便于开发和维护。如你在清单\
  \ 3-22 中所见，我只显示 `storeDetails.html` 页面一次，这意味着我可以预期回调中的代码也只会执行一次。\n\n### 清单 3-22：显示页面\n\
  \n```javascript\n...\nfunction performInitialSetup(e) {\n    WinJS.UI.processAll().then(function\
  \ () {\n        UI.List.displayListItems();\n        UI.List.setupListEvents();\n\
  \        UI.AppBar.setupButtons();\n        UI.Flyouts.setupAddItemFlyout();\n \
  \       ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n    \
  \        WinJS.Utilities.empty(itemDetailTarget)\n            var url = newValue\
  \ == -1 ? \"/html/noSelection.html\" :\n                \"/pages/itemDetail/itemDetail.html\"\
  \n            WinJS.UI.Pages.render(url, itemDetailTarget);\n        });\n     \
  \   WinJS.UI.Pages.render(\"/html/storeDetail.html\", storeDetailTarget);\n    });\n\
  }\n...\n```\n\n最后一步是更新 `default.html` 中的布局元素，如下所示：\n\n```html\n...\n<div id=\"bottomRightContainer\"\
  \ class=\"gridRight\">\n    <h1 class=\"win-type-xx-large\">商店详情</h1>\n    <div\
  \ id=\"storeDetailTarget\"></div>\n</div>\n...\n```\n\n最终结果是，选择主列表中的某个项目将显示相关商店的主页，如图\
  \ 3-6 所示。\n\n![图 3-6](img/index-84_1.jpg)\n\n### 图 3-6：显示外部内容\n\n**警告** 我在本例中使用的网站内容经常变化，并且我发现有时会有一段时间内容无法在应用中显示，因为网页上的\
  \ JavaScript 代码干扰了 Windows 应用的安全策略。如果是这种情况，你可以通过使用“更安全”的网站来查看效果。我发现 Apress.com 是一个很好的替代品。\n\
  \n## 检查清单权限\n\nWindows 8 应用受到安全沙盒的限制。要获得对外部内容的访问权限，你的应用必须在其清单文件中获得一个或多个权限。为确保你拥有所需的访问权限，请从解决方案资源管理器打开\
  \ `package.appxmanifest` 文件，然后转到“功能”选项卡。\n\n你将看到可以请求的功能列表。当用户在 Windows 8 商店中查看你的应用时，会向他们显示这些信息，以便他们能够就授予你应用哪些访问权限做出明智的选择。（嗯，理论上是这样；在实践中，用户通常不会关注这些声明，直到应用做出一些让他们感到意外的事情。）\n\
  \n\n\n"
