  Windows 8 应用程序，并简要介绍了在运行代码时触发 Visual Studio 调试器中断的两种方式。在下一章中，我将开始为示例添加一些功能，并开始使用
  WinJS API 的部分特性。首先我会定义一个视图模型，并演示如何将其包含的数据绑定到 Windows 8 应用程序布局上；这是构建易于构建、扩展和维护的健壮应用程序的基本技术。


