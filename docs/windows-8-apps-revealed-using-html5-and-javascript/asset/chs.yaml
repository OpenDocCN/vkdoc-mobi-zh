  \  <script src=\"/js/pages.js\"></script>\n  <script src=\"/js/tiles.js\"></script>\n\
  \  <script src=\"/js/default.js\"></script>\n</head>\n```\n\n### 测试磁贴更新\n\n在测试我的更新磁贴之前，需要完成几个准备步骤。首先，Visual\
  \ Studio 模拟器不支持更新磁贴，这意味着我将不得不直接在开发机器上进行测试。为此，我需要将 Visual Studio 的部署目标更改为“本地计算机”，如图\
  \ 4-10 所示。\n\n**图 4-10.** 选择本地计算机进行调试\n\n第二步是从“开始”屏幕卸载我的示例应用程序（通过从应用栏中选择“卸载”来完成）。似乎存在某种“粘性”，即之前依赖静态磁贴的应用程序无法正确处理更新。\n\
  \n\n\n完成排版后的内容如下：\n\n完成上述两个步骤后，我就可以通过从“调试”菜单中选择“启动调试”，在 Visual Studio 中启动我的应用程序。应用程序启动后，我可以对购物清单进行修改，而前三个项目的简短摘要将显示在开始磁贴上，如图\
  \ 4-11 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-108_1.jpg)\n\
  \n## 第 4 章 ■ 布局与磁贴\n\n**图 4-11.** *更新应用程序磁贴*\n\n**提示** 如果你一直在使用模拟器，可能无法在开始屏幕上找到该磁贴。如果遇到这种情况，请通过输入应用名称的前几个字母来搜索该应用。\n\
  点击较小的搜索结果图标，磁贴便会显示。如果该方法无效，请重启并在本地启动应用程序，确保不要启动模拟器。\n\n### 更新宽磁贴\n\n如果你希望仅更新应用程序的方形*或*宽磁贴，上一节介绍的技术非常有用。但是，除非你对数据的呈现有非常特殊的需求，否则你应该同时提供方形和宽磁贴的更新，因为你不知道用户会选择哪一种。\n\
  \n要更新两种尺寸的磁贴，你需要将两个 XML 模板合并成一个包含两个更新内容的片段。在本节中，我将合并 `tileSquareText03` 和 `tileWideBlockAndText01`\
  \ 模板。宽模板有几个额外的字段，我将用它们来显示用户为了获取购物清单上的所有商品需要访问的商店数量。你可以在**清单 4-12** 中看到我想要生成的内容——一个遵循单一模板格式但合并了两个\
  \ `binding` 元素的片段。\n\n**清单 4-12.** *编写一个单一的 XML 片段*\n\n```xml\n<tile>\n<visual lang=\"\
  en-US\">\n<binding template=\"TileSquareText03\">\n<text id=\"1\">Apples</text>\n\
  <text id=\"2\">Hotdogs</text>\n<text id=\"3\">Soda</text>\n<text id=\"4\"></text>\n\
  </binding>\n<binding template=\"TileWideBlockAndText01\">\n<text id=\"1\">Apples\
  \ (Whole Foods)</text>\n<text id=\"2\">Hotdogs (Costco)</text>\n<text id=\"3\">Soda\
  \ (Costco)</text> 95\n<text id=\"4\"></text>\n<text id=\"5\">2</text>\n<text id=\"\
  6\">Stores</text>\n</binding>\n</visual>\n</tile>\n```\n\n没有现成的便捷 API 用于合并模板。我所采用的方法是使用\
  \ XML 处理支持来分别填充模板，然后在过程的最后将它们合并。你可以在**清单 4-13** 中看到我是如何做到这一点的，该清单显示了我对 `tiles.js`\
  \ 文件所做的修改。\n\n**清单 4-13.** *为方形和宽磁贴生成一个单一更新*\n\n```javascript\n/// <reference path=\"\
  //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
  \ /> (function () {\n\"use strict\";\nWinJS.Namespace.define(\"Tiles\", {\nsendTileUpdate:\
  \ function () {\nvar storeCounter = { count: 0 };\nViewModel.UserData.getItems().forEach(function\
  \ (listItem) {\nif (!storeCounter[listItem.store]) {\nstoreCounter[listItem.store]\
  \ = true;\nstoreCounter.count++;\n}\n});\nvar tn = Windows.UI.Notifications;\nvar\
  \ squareXmlFragment = tn.TileUpdateManager\n.getTemplateContent(tn.TileTemplateType.tileSquareText03);\
  \ var wideXmlFragment = tn.TileUpdateManager\n.getTemplateContent(tn.TileTemplateType.tileWideBlockAndText01);\
  \ var squareTextNodes =\nsquareXmlFragment.getElementsByTagName(\"text\"); var wideTextNodes\
  \ =\nwideXmlFragment.getElementsByTagName(\"text\"); var items = ViewModel.UserData.getItems();\n\
  for (var i = 0; i < squareTextNodes.length; i++) {\nvar listItem = items.getAt(i);\n\
  if (listItem) {\nsquareTextNodes[i].innerText = listItem.item;\nwideTextNodes[i].innerText\
  \ = listItem.item + \" (\"\n+ listItem.store + \")\";\n}\n}\nwideTextNodes[4].innerText\
  \ = storeCounter.count;\nwideTextNodes[5].innerText = \"Stores\";\nvar wideBindingElement\
  \ =\nwideXmlFragment.getElementsByTagName(\"binding\")[0]; var importedNode = squareXmlFragment.importNode(wideBindingElement,\
  \ true);\n```\n\n\n```javascript\nvar squareVisualElement =\n    squareXmlFragment.getElementsByTagName\n\
  \    (\"visual\")[0];\nsquareVisualElement.appendChild(importedNode);\nfor (var\
  \ i = 0; i < 5; i++) {\n    tn.TileUpdateManager.createTileUpdaterForApplication()\n\
  \        .update(new tn.TileNotification(squareXmlFragment))\n}\n}\n});\nvar eventTypes\
  \ = [\"itemchanged\", \"iteminserted\",\n    \"itemmoved\", \"itemremoved\"];\n\
  var itemsList = ViewModel.UserData.getItems();\neventTypes.forEach(function (type)\
  \ {\n    itemsList.addEventListener(type, Tiles.sendTileUpdate);\n});\n})();\n```\n\
  \n宽格式的磁贴让我有机会在每一行向用户展示更多信息。在此示例中，除了显示所需访问商店的总次数外，我还加入了关于应从哪家商店购买商品的信息。\n\n组合模板并非难以掌握的技巧，但合并两个\
  \ XML 片段时需格外谨慎。我以方形磁贴的模板为基础进行组合更新。当需要添加来自宽模板的绑定元素时，我必须先将其导入方形 XML 文档中，具体操作如下：\n\n\
  ```javascript\nvar importedNode = squareXmlFragment.importNode(wideBindingElement,\
  \ true);\n```\n\n`importNode` 方法会在方形文档的上下文中创建宽绑定元素的新副本。该方法的参数包括：要导入的元素，以及指示是否同时导入子节点的布尔值（显然我需要导入子节点）。创建新元素后，我通过\
  \ `appendChild` 方法将其插入方形 XML 中：\n\n```javascript\nsquareVisualElement.appendChild(importedNode);\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-111_1.jpg)\n\
  \n## 第 4 章 ■ 布局与磁贴\n\n最终得到的组合文档如清单 4-12 所示。图 4-12 展示了两种磁贴尺寸的外观。（你可以在 Windows 开始屏幕中选择磁贴，右键单击或滑动以显示应用栏，从而在方形和宽版本之间切换。通过\"\
  缩小\"和\"放大\"按钮可将磁贴切换为宽配置或恢复原状。）\n\n***图 4-12.** 更新宽磁贴*\n\n### 应用徽章\n\nWindows 8 在磁贴中集成了许多功能，包括支持*徽章*——即磁贴上的小图标或数字覆盖层。后者属于\"\
  磁贴即广告\"的范畴，因为除引导用户启动应用外，数字标识几乎别无他用。为演示徽章功能，我将基于购物清单中的商品数量显示一个简单指示器。清单 4-14 展示了 `tiles.js`\
  \ 文件的修改内容。\n\n***清单 4-14.** 添加对磁贴徽章的支持*\n\n```javascript\n/// <reference path=\"\
  //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
  \ />\n(function () {\n    \"use strict\";\n    WinJS.Namespace.define(\"Tiles\"\
  , {\n        sendBadgeUpdate: function () {\n            var itemCount = ViewModel.UserData.getItems().length;\n\
  \            var tn = Windows.UI.Notifications;\n            var templateType =\
  \ itemCount ? tn.BadgeTemplateType.badgeGlyph\n                : tn.BadgeTemplateType.badgeNumber;\n\
  \            var badgeXml =\n                tn.BadgeUpdateManager.getTemplateContent(templateType);\n\
  \            var badgeAttribute = badgeXml.getElementsByTagName(\"badge\")[0];\n\
  \            badgeAttribute.setAttribute(\"value\",\n                itemCount >\
  \ 3 ? \"alert\" : itemCount);\n            for (var i = 0; i < 5; i++) {\n     \
  \           var badgeNotification = new tn.BadgeNotification(badgeXml);\n      \
  \          tn.BadgeUpdateManager.createBadgeUpdaterForApplication()\n          \
  \          .update(badgeNotification);\n            }\n        },\n        sendTileUpdate:\
  \ function () {\n            //\n            // *...为简洁起见已省略代码...*\n           \
  \ // *\n        }\n    });\n    var eventTypes = [\"itemchanged\", \"iteminserted\"\
  ,\n        \"itemmoved\", \"itemremoved\"];\n    var itemsList = ViewModel.UserData.getItems();\n\
  \    eventTypes.forEach(function (type) {\n        itemsList.addEventListener(type,\
  \ function () {\n            Tiles.sendTileUpdate();\n            Tiles.sendBadgeUpdate();\n\
  \        });\n    });\n})();\n```\n\n徽章的工作方式与磁贴通知类似：获取 XML 模板，填充内容，然后通过开始菜单向用户展示信息。\n\
  \n\n"
- "# 两种徽章模板\n\n两种徽章模板可用。第一种将显示 1 到 99 之间的数值，第二种将显示由 Windows 定义的有限范围内的小图像。\n\n数值和图标模板使用相同的\
  \ XML 表示，如列表 4-15 所示，它们比用于磁贴的模板简单得多。\n\n***列表 4-15.*** 数值和图像徽章的模板\n\n```\n<badge\
  \ value=\"\"/>\n```\n\n目标是将`value`属性设置为数值或图标名称。如果购物清单上有三个或更少的项目，我会显示数值徽章。如果有超过三个项目，我会使用图标来指示用户应关注其购物义务的范围。\n\
  \n创建徽章的过程始于选择模板。两种模板类型是`Windows.UI.Notifications.BadgeTemplateType`：对于数值徽章，使用`badgeNumber`模板；对于图标，使用`badgeGlyph`模板。你可以在两种情况下使用相同的模板，因为它们返回相同的\
  \ XML。这在以后的版本或更新中可能会改变，因此即使内容相同，谨慎选择正确的模板也是明智的。\n\n下一步是定位 XML 中的`value`属性，并将其设置为数值或图标名称。徽章的数值范围非常具体：从\
  \ 1 到 99。如果你将值设置为小于 1，徽章将根本不会显示。任何大于 99 的值都会导致徽章显示 99。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 4 章 ■ 布局和磁贴\n\n图标列表同样具有规定性。你不能使用自己的图标，必须从 Windows 支持的十个图标列表中选择。你可以在 http://msdn.microsoft.com/en-us/library/windows/apps/hh761458.aspx\
  \ 查看图标列表。\n\n在此示例中，我选择了警报图标，它看起来像一个星号。一旦 XML 填充完毕，就创建一个新的`BadgeNotification`对象并使用它来发布更新。与磁贴一样，我发现并非所有徽章更新都会被处理，因此我重复更新五次以确保其通过：\n\
  \n```\n...\nfor (var i = 0; i < 5; i++) {\n    var badgeNotification = new tn.BadgeNotification(badgeXml);\
  \ \n    tn.BadgeUpdateManager.createBadgeUpdaterForApplication()\n        .update(badgeNotification);\n\
  }\n...\n```\n\n剩下的就是确保我的徽章更新被创建。为此，我更改了购物清单事件的事件处理程序，以便磁贴和徽章一起更新。我还需要在`/js/default.js`文件中添加对`sendBadgeUpdate`方法的调用，你可以在列表\
  \ 4-16 中看到。这确保了应用启动时徽章立即更新。\n\n***列表 4-16.*** 应用启动时更新徽章\n\n```\n...\nfunction performInitialSetup(e)\
  \ {\n    WinJS.UI.processAll().then(function () {\n        UI.List.displayListItems();\n\
  \        UI.List.setupListEvents();\n        UI.AppBar.setupButtons();\n       \
  \ UI.Flyouts.setupAddItemFlyout();\n        ViewModel.State.bind(\"selectedItemIndex\"\
  , function (newValue) {\n            WinJS.Utilities.empty(itemDetailTarget)\n \
  \           var url = newValue == -1 ? \"/html/noSelection.html\" :\n          \
  \      \"/pages/itemDetail/itemDetail.html\"\n            WinJS.UI.Pages.render(url,\
  \ itemDetailTarget);\n        });\n        WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
  , storeDetailTarget); \n        function setOrientationClass() {\n            if\
  \ (Windows.UI.ViewManagement.ApplicationView.value\n                == Windows.UI.ViewManagement.ApplicationViewState\n\
  \                .fullScreenPortrait) {\n                WinJS.Utilities.addClass(contentGrid,\
  \ \"flex\"); \n            } else {\n                WinJS.Utilities.removeClass(contentGrid,\
  \ \"flex\");\n            }\n        };\n        window.addEventListener(\"resize\"\
  , setOrientationClass); \n        setOrientationClass();\n        unsnapButton.addEventListener(\"\
  click\", function (e) {\n            Windows.UI.ViewManagement.ApplicationView.tryUnsnap();\n\
  \        });\n        Tiles.sendTileUpdate();\n        Tiles.sendBadgeUpdate();\n\
  \    });\n}\n...\n```\n\n你可以在图 4-13 中看到四种不同的徽章/磁贴配置：宽磁贴和方形磁贴，带有数字和图标徽章。\n\n***图\
  \ 4-13.*** 在磁贴上显示徽章\n\n## 总结\n\n在本章中，我向你展示了如何适应 Windows 8 的贴靠和填充布局，以及如何使用磁贴向用户提供启动应用的诱因或避免启动所需的数据。这些功能对于交付一个融入更广泛\
  \ Windows 8 体验的应用至关重要。\n\n你可能会觉得贴靠布局中的可用空间过于有限，无法提供任何严肃的功能，但经过仔细考虑，可以专注于你所提供的服务的本质，并省略其他所有内容。要充分利用磁贴和徽章，也需要仔细考虑。精心设计的徽章可以显著提高应用的吸引力或实用性，但考虑不周的磁贴则令人烦恼或完全无用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 5 章


  '
- "# 生命周期事件\n\n在本书的最后一章中，我将向你展示如何通过响应关键的 Windows 事件来控制 Windows 8 应用的生命周期。我将展示如何替换\
  \ Visual Studio 添加到项目中的代码，如何正确处理应用被挂起和恢复，以及如何实现将你的应用融入 Windows 8 提供的更广泛用户体验的合约。在此过程中，我将演示地理位置功能的使用，并展示如何设置和管理一个循环的后台任务。表\
  \ 5-1 提供了本章的总结。\n\n***表 5-1.*** 章节总结\n\n| 问题 | 解决方案 | 列表 |\n|------|----------|------|\n\
  | 确保你的应用接收挂起和恢复事件。 | 订阅来自`Windows.UI.WebUI.WebUIApplication`对象的事件。 | |\n| 创建一个循环的后台任务。\
  \ | 使用`WinJS.Promise`对象作为其他异步活动的包装器。 | 2–4 |\n| 在应用被挂起前请求更多时间。 | 调用传递给挂起处理程序函数的事件上的`suspendingOperation.getDeferral`方法。\
  \ | 5 |\n| 实现一个合约。 | 在清单中声明合约，并响应激活事件中的类型信息。 | 6–8 |\n\n## 处理应用生命周期\n\n在第 1 章中，我向你展示了\
  \ Visual Studio 放置在`default.js`文件中的骨架代码，以便为我的示例项目提供快速启动。这段代码处理 Windows 8 应用的*生命周期事件*，确保我能适当响应操作系统发送给我的信号。Windows\
  \ 8 应用的生命周期有三个关键阶段。\n\n第一阶段，*激活*，发生在 Windows 希望你的应用执行某些任务时。最常见的任务是 Windows 希望启动你的应用并显示给用户，但也有其他任务，你将在本章后面看到我展示如何实现*合约*时看到一个例子。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 生命周期事件\n\n用户不会关闭\
  \ Windows 8 应用；他们只是切换到另一个应用，让 Windows 来处理一切。这就是 Windows 8 UI 上没有关闭按钮或菜单栏的原因。不再需要的\
  \ Windows 8 应用会进入第二阶段，被*挂起*。在挂起状态下，不会执行任何应用代码，也不会与用户进行交互。\n\n如果用户切换回一个被挂起的应用，则会发生第三阶段：应用被*恢复*。执行继续后，应用将显示给用户。\n\
  \n挂起的应用并不总是被恢复。例如，如果设备内存不足，Windows 可能会简单地*终止*一个挂起的应用。\n\n## 修正 Visual Studio 事件代码\n\
  \n\n\nVisual Studio 添加到新项目中的代码足够让一个基础应用启动并运行，但它并未支持全部的生命周期事件。它能够很好地处理激活和挂起操作，却阻止了应用在恢复时收到通知。幸运的是，API\
  \ 中还有其他地方可以让我注册以接收生命周期事件，因此本章我的首要任务是更新 `default.js`，以便在我的应用进入全部三个生命周期阶段时能够正确收到通知。清单\
  \ 5-1 展示了这些更改。\n\n**清单 5-1.** 注册生命周期事件通知\n\n```javascript\n(function () {\n    \"\
  use strict\";\n\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"activated\"\
  , performInitialSetup);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
  resuming\", performResume);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
  suspending\", performSuspend);\n\n    function performInitialSetup(e) {\n      \
  \  WinJS.UI.processAll().then(function () {\n            UI.List.displayListItems();\n\
  \            UI.List.setupListEvents();\n            UI.AppBar.setupButtons();\n\
  \            UI.Flyouts.setupAddItemFlyout();\n            ViewModel.State.bind(\"\
  selectedItemIndex\", function (newValue) {\n                WinJS.Utilities.empty(itemDetailTarget)\n\
  \                var url = newValue == -1 ? \"/html/noSelection.html\" :\n     \
  \               \"/pages/itemDetail/itemDetail.html\"\n                WinJS.UI.Pages.render(url,\
  \ itemDetailTarget);\n            });\n            WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
  , storeDetailTarget);\n\n            function setOrientationClass() {\n        \
  \        if (Windows.UI.ViewManagement.ApplicationView.value ==\n              \
  \      Windows.UI.ViewManagement.ApplicationViewState.fullScreenPortrait) {\n  \
  \                  WinJS.Utilities.addClass(contentGrid, \"flex\");\n          \
  \      } else {\n                    WinJS.Utilities.removeClass(contentGrid, \"\
  flex\");\n                }\n            };\n            window.addEventListener(\"\
  resize\", setOrientationClass);\n            setOrientationClass();\n          \
  \  unsnapButton.addEventListener(\"click\", function (e) {\n                Windows.UI.ViewManagement.ApplicationView.tryUnsnap();\n\
  \            });\n            Tiles.sendTileUpdate();\n            Tiles.sendBadgeUpdate();\n\
  \        });\n    }\n\n    function performResume(e) {\n        WinJS.Utilities.query(\"\
  #topRightContainer h1\")[0].innerText = \"Resumed\";\n    }\n\n    function performSuspend(e)\
  \ {\n        WinJS.Utilities.query(\"#leftContainer h1\")[0].innerText = \"Suspended\"\
  ;\n    }\n})();\n```\n\n我使用了通过 `Windows.UI.WebUI.WebUIApplication` 类提供的事件，这些事件与生命周期事件完美对应。我的示例\
  \ Windows 8 应用当前并未执行任何受应用挂起和恢复影响的任务，但我想向你展示如何测试这些事件。为此，我在 `performResume` 和 `performSuspend`\
  \ 函数中添加了语句，这些语句会更改 HTML 文档中 `h1` 元素的值，以指示何时接收到挂起和恢复事件。\n\nVisual Studio 包含在调试器中模拟挂起和恢复事件的支持，但我建议你学习如何在操作系统中直接触发这些事件，这样你就不需要使用\
  \ Visual Studio 进行测试了。\n\n问题在于 Visual Studio 必须禁用真实的操作系统事件，以便 Windows 8 应用进程始终处于其控制之下。这意味着\
  \ Visual Studio 可能会创建一种与用户使用你的应用时所看到的略微不同的体验。\n\n不幸的是，当你不使用 Visual Studio 工作时，你将无法访问\
  \ JavaScript 控制台窗口等有用的工具，当然也包括调试器本身。你必须找到另一种机制来观察应用生命周期的变化，这就是我通过更改布局中 `h1` 元素显示的文本来处理恢复和挂起事件的原因，如下所示：\n\
  \n```javascript\n...\nWinJS.Utilities.query(\"#leftContainer h1\")[0].innerText\
  \ = \"Suspended\";\n...\n```\n\n通过使用布局来记录接收到的生命周期事件，我能够确保我的应用收到了我所期望的事件。现在，我已经修复了\
  \ `default.js` 文件中的事件处理代码，并通过更改应用布局增加了记录事件接收的支持，接下来我将向你展示生成这些事件的不同方法：通过 Visual Studio\
  \ 以及直接使用 Windows 8。\n\n## 使用 Visual Studio 模拟生命周期事件\n\n要使用 Visual Studio 模拟生命周期事件，请从\
  \ **调试** 菜单中选择 **开始调试** 来启动应用。Visual Studio 会在工具栏上显示一个弹出菜单，如图 5-1 所示，其中包含挂起和恢复应用的选项；这些选项会向应用发送挂起和恢复事件。还有一个选项会发送挂起事件然后终止应用（这实际上会终止应用，而不仅仅是模拟效果）。\n\
  \n**图 5-1.** 使用 Visual Studio 模拟生命周期事件\n\n> **提示：** 对于某些版本的 Visual Studio，只有在 **视图**\
  \ > **工具栏** 菜单中选中 **调试位置** 选项后，工具栏菜单才会显示。\n\n要测试 Visual Studio 对生命周期事件的支持，请启动应用，然后从菜单中选择\
  \ **挂起** 项。应用将收到挂起事件，并且不再显示。稍等片刻，然后从 Visual Studio 菜单中选择 **恢复**；应用将重新出现，你会看到屏幕顶部的\
  \ `h1` 元素已更新，反映了已收到挂起和恢复事件的事实，如图 5-2 所示。\n\n**图 5-2.** 使用应用布局中的元素记录生命周期事件\n\n##\
  \ 触发生命周期事件\n\n在接下来的部分中，我将向你展示如何在不使用 Visual Studio 的情况下触发生命周期事件。使用真实事件测试你的应用行为非常重要，而不要仅仅依赖\
  \ Visual Studio 支持的模拟生命周期。\n\n### 激活应用\n\n要触发激活事件，请从 Visual Studio 的 **调试** 菜单中选择\
  \ **开始执行（不调试）** 来启动应用程序。你也可以从 **开始** 屏幕启动应用，无论是在模拟器中还是在本地机器上。关键是不使用调试器来启动应用。\n\n\
  ### 挂起应用\n\n挂起应用最简单的方法是按下 `Win+D` 切换到桌面。打开 **任务管理器**，右键单击你的 Windows 8 应用对应的项，然后从弹出菜单中选择\
  \ **转到详细信息**。任务管理器将切换到 **详细信息** 选项卡。（你可能需要先单击 **更多详细信息** 按钮，然后才能选择 **详细信息** 选项卡。）在\
  \ **详细信息** 选项卡上，你会看到一个或多个 `WWAHost.exe` 进程，每个进程对应一个 Windows 8 应用。你可以通过以下方式判断哪个是示例应用：几秒钟后，**状态**\
  \ 列中显示的值将从 `Running` 变为 `Suspended`，这告诉你 Windows 已挂起该应用，如图 5-3 所示。\n\n**图 5-3.**\
  \ 显示已挂起的 Windows 8 应用的 Windows 任务管理器\n\n### 恢复应用\n\n切换回应用将恢复它。你会看到布局顶部显示的 `h1` 元素表明恢复和挂起事件都已由\
  \ Windows 发送。\n\n恢复后的应用状态与挂起时的状态完全相同。你的布局、数据、事件处理程序以及其他所有内容都将保持不变。例如，在处理恢复事件时，你无需调用\
  \ `processAll`。\n\n\n\n你的应用可能已被挂起很长时间，尤其是当设备进入低电量状态（如睡眠模式）时。网络连接将被你之前通信的所有服务器关闭（这就是为什么你在收到挂起事件时应显式关闭它们的原因），并且在你的应用恢复运行时必须重新打开连接。你还需要刷新可能已过时的数据，这包括位置数据，因为设备可能在你应用被挂起期间移动过位置。\n\
  \n## 添加异步活动\n\n现在我已确认应用能够接收并响应恢复和挂起事件，接下来可以添加需要周期性任务的功能。在本示例中，我将使用地理定位服务来报告当前设备位置。为此，我创建了一个名为\
  \ `location.js` 的新 JavaScript 文件，其内容如清单 5-2 所示。\n\n**清单 5-2.** 追踪设备位置\n\n```\n///\
  \ <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"\
  //Microsoft.WinJS.1.0/js/ui.js\" />\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n(function () {\n    \"use strict\";\n\n    var currentPromise;\n    var tracking\
  \ = false;\n\n    function trackLocation() {\n        currentPromise = new WinJS.Promise(function\
  \ (complete) {\n            var geo = new Windows.Devices.Geolocation.Geolocator();\n\
  \            if (geo) {\n                geo.getGeopositionAsync().then(function\
  \ (position) {\n                    WinJS.xhr({\n                        url: \"\
  http://nominatim.openstreetmap.org\"\n                            + \"/reverse?format=json&lat=\"\
  \n                            + position.coordinate.latitude\n                 \
  \           + \"&lon=\" + position.coordinate.longitude\n                    }).then(function\
  \ (data) {\n                        var dataObject = JSON.parse(data.response);\n\
  \                        if (dataObject.address.road) {\n                      \
  \      var date = new Date();\n                            var time = date.getHours()\
  \ + \":\" + date.getMinutes()\n                                + \":\" + date.getSeconds();\n\
  \                            document.getElementById(\"geo\").innerText =\n    \
  \                            dataObject.address.road + \" (\" + time + \")\";\n\
  \                        }\n                    });\n                });\n     \
  \       }\n            complete();\n        });\n\n        currentPromise.then(function\
  \ () {\n            if (tracking) {\n                setTimeout(trackLocation, 5000);\n\
  \            }\n        });\n    }\n\n    WinJS.Namespace.define(\"Location\", {\n\
  \        startTracking: function () {\n            tracking = true;\n          \
  \  trackLocation();\n        },\n        stopTracking: function () {\n         \
  \   tracking = false;\n            return currentPromise;\n        }\n    });\n\
  })();\n```\n\n## 使用位置追踪\n\nWindows 8 的地理定位服务可通过 `Windows.Devices.Geolocation.Geolocator`\
  \ 对象使用。你可以订阅位置信息变化时的事件，但我想演示一个重复的后台任务，因此使用了 `getGeopositionAsync` 方法，该方法会生成当前位置的快照。这是一个异步操作，因此\
  \ `getGeopositionAsync` 方法返回一个 `WinJS.Promise` 对象，该对象在位置信息可用时被完成。\n\n获取位置数据后，我使用\
  \ `WinJS.xhr` 对象进行 Ajax 调用，该对象是标准浏览器 `XmlHttpRequest` 对象的 `Promise` 封装。我的 Ajax 请求发送到反向地理编码服务，这样我就能将地理定位服务提供的纬度和经度信息转换为街道地址。地理编码服务返回\
  \ JSON 字符串，我将其解析为 JavaScript 对象，从中读取街道名称，以便连同显示上次位置更新的时间戳一起展示给用户。\n\n**提示：** 我使用了\
  \ OpenStreetMap 的地理编码服务，因为它不需要唯一的账户令牌。这意味着你无需创建 Google Maps 或 Bing Maps 账户即可运行本示例。\n\
  \n我在 `default.html` 文件中添加了一些简单元素，以便向用户显示位置信息。你可以在清单 5-3 中看到这些添加内容。\n\n**清单 5-3.**\
  \ 向 `default.html` 添加元素以显示位置信息\n\n```\n...\n<script src=\"/js/tiles.js\"></script>\n\
  <script src=\"/js/location.js\"></script>\n<script src=\"/js/default.js\"></script>\n\
  </head>\n<body>\n<div class=\"midtitle\">\n    <h2>你的当前位置是：<span id=\"geo\"></span></h2>\n\
  </div>\n<div id=\"contentGrid\">\n```\n\n\n\n"
