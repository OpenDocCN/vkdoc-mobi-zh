  8` 开发介绍。


  以下各节总结了本书的各章内容。


  #### 第 1 章：入门


  除了介绍本书之外，我还将向您展示如何为贯穿本书的示例 `Windows 8` 应用创建 `Visual Studio` 项目。我将展示如何使用 `Visual
  Studio` 中的 `JavaScript` 工具，如何在 `Visual Studio` 模拟器中测试您的 `Windows 应用商店` 应用，以及如何使用调试器。


  #### 第 2 章：数据与绑定


  数据是任何 `Windows 8` 应用的核心，在本章中，我将向您展示如何定义视图模型，以及如何使用 `Windows 8` 数据绑定将这些数据引入到您的应用布局中。这些技术对于构建易于扩展、易于测试且易于维护的
  `Windows 应用商店` 应用至关重要。在此过程中，我将向您展示如何定义 `Windows 8` `JavaScript` 命名空间、创建可观察数组、使用
  `JavaScript` promise 以及使用模板生成内容。


  #### 第 3 章：应用程序控件


  某些用户界面控件是所有 `Windows 应用商店` 应用通用的，无论使用何种语言创建它们。在本章中，我将向您展示如何创建和配置 `AppBar` 和 `Flyout`，这是这些通用控件中最重要的两个；它们共同构成了您与用户交互的主干。我还将向您展示如何将
  `Windows 8` 的内容和代码分解成若干部分，以便于管理应用，以及如何在运行时将这些部分组合在一起。


  #### 第 4 章：布局与磁贴


  `Windows 8` 应用的功能扩展到了 `Windows 8` 的“开始”菜单，该菜单提供了多种方式向用户展示附加信息。在本章中，我将向您展示如何创建和更新动态的“开始”磁贴，以及如何为这些磁贴添加徽章。




