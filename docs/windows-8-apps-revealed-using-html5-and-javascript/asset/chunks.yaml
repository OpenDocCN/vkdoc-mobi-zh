    \ API 通过`WinJS.Binding`命名空间支持绑定。数据绑定是在 Windows 应用商店应用中使用视图模型的关键。如果你想构建可扩展且稳健的\
    \ Windows 8 应用程序，我建议投入时间学习如何充分利用 WinJS 绑定功能。\n\n**提示** WinJS 数据绑定不如一些更广泛使用的 Web\
