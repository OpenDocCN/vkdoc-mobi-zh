    With both of these steps completed, I can now start my application from Visual
    Studio by selecting `Start Debugging` from the `Debug` menu. When the application
    has started, I can make changes to the grocery list, and a pithy summary of the
    first three items will be shown on the start tile, as shown in Figure 4-11.


