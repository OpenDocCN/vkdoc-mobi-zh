- fmt: '# Adapting to Orientation and View Changes


    Two mechanisms are available for responding to orientation changes. You can use
    CSS, or you can use JavaScript. You can, if you want, mix and match the approaches,
    and that’s what I’ll be doing in the sections that follow to demonstrate both
    approaches.


    ## Adapting with CSS


    Microsoft has defined a custom CSS media query property and a set of values that
    can be used to change the CSS for a Windows 8 app when the orientation or view
    is changed.


    These are added to the `default.css` file when Visual Studio creates a new Windows
    8 application project, as shown in Listing 4-1.


    **Listing 4-1.** The Orientation and View Media Queries


    ```

    /*

    **...MetroGrocer styles removed for brevity...*

    */


    @media screen and (-ms-view-state: fullscreen-landscape) {


    }


    @media screen and (-ms-view-state: filled) {


    }


    @media screen and (-ms-view-state: snapped) {


    }


    @media screen and (-ms-view-state: fullscreen-portrait) {


    }

    ```


    The property name is `-ms-view-state`, and you can see the range of supported
    values in the listing, which cover the orientation and view permutations. (Remember
    that the `filled` and `snapped` views are available only when the device is in
    the landscape orientation.) To adapt to a given orientation of view, you simply
    define CSS styles in the corresponding media query. The styles you define will
    be applied only when the user changes the orientation or view, and as a demonstration,
    Listing 4-2 shows how I have defined styles that are applied only when the user
    puts the app into the `snapped` view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Listing 4-2.** Defining Styles for the Snapped View


    ```

    /*

    ... *MetroGrocer styles removed for brevity*...

    */


    @media screen and (-ms-view-state: fullscreen-landscape) {


    }


    @media screen and (-ms-view-state: filled) {


    }


    @media screen and (-ms-view-state: snapped) {


    #contentGrid div.gridRight, #listTable td:last-child, #listTable th {


    display: none;


    }


    #listTable td { white-space: nowrap;}


    #listTable td:first-child { border-right: thin solid white;}


    #contentGrid div.gridLeft { margin-left: 0.5em;}


    #contentGrid {-ms-grid-columns: 1fr;}


    }


    @media screen and (-ms-view-state: fullscreen-portrait) {


    }

    ```


    For my example application, the snapped view presents too little space to display
    the entire layout. As you can see in the listing, I have used the `snapped` media
    query to hide some elements and change the appearance and behavior of others.
    You can see how these styles are applied in the snapped view in Figure 4-4, where
    my styles present the user with a reduced view of the data in the app.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-92_1.jpg)


    **Figure 4-4.** Adapting the app layout using CSS media queries


    Notice that Windows adapts the Windows 8 structural elements automatically, such
    as removing the labels from `AppBar` buttons in the snapped layout.


    > **Tip:** The normal CSS precedence rules apply to styles defined within these
    queries, which means you would normally want to make the link element for the
    `default.css` file the last one to appear in the `default.html` file.


    ## Adapting with JavaScript


    You can do a surprising amount to adapt to different layouts using just CSS, but
    there comes a point where you need to be able to adapt in JavaScript as well.
    The `Windows.UI.ViewManagement` namespace defines an object called `ApplicationView`
    that provides details about the current layout. You can receive notification when
    the orientation or the view changes by handling the standard DOM `resize` event.
    In Listing 4-3, you can see how I have added a handler function for the `resize`
    event to the `default.js` file.


    **Listing 4-3.** Adapting to Changes in the `default.js` File


    ```

    ...

    function performInitialSetup(e) {


    WinJS.UI.processAll().then(function () {


    UI.List.displayListItems();


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    UI.List.setupListEvents();


    UI.AppBar.setupButtons();


    UI.Flyouts.setupAddItemFlyout();


    ...

    ```'
