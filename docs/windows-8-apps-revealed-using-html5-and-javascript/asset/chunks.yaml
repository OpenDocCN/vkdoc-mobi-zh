    ■


    Microsoft uses the term *Windows Store app* . I can’t bring myself to use this
    awkward term, so I am just refer to *Windows Store apps* and, often, just *apps*
    . I’ll leave you to mentally insert the official term as needed.


    Creating the Project


    To create the example project, start Visual Studio and select New Project, either
    from the File menu or from the link on the start page. In the New Project dialog,
    navigate to Installed ➤ Templates ➤ JavaScript. Select the Blank App template,
    set the name of the project to be MetroGrocer, and click the OK button to create
    the project, as shown in Figure 1-2 .


