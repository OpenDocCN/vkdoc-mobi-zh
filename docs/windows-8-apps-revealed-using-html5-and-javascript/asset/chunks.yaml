    apparent Windows 8 trend toward muted colors. The other additions I have made
    apply a CSS3 grid layout to the div elements I defined in default.html . You can
    use any of the new CSS3 layout models in a Windows 8 app (or any CSS layout for
    that matter), but the specification for the grid layout has yet to be finalized,
    so I have to prefix my layout properties with –ms .


    **A QUICK INTRODUCTION TO CSS3 GRID LAYOUTS**


    You may not have used the grid layout because it is not consistently implemented
    in mainstream web browsers. Fortunately, when developing Windows 8 web apps, you
    need to worry only about Internet Explorer 10, which is used to display JavaScript
    Windows Store apps to the user. In this sidebar, I provide you with a very quick
    introduction to the basic features of CSS3 grid layouts. To get started with a
    grid layout, you must set the display property and specify the number of rows
    and columns for the element that will contain the grid, like this:


    #contentGrid {


    display: -ms-grid;


    -ms-grid-rows: 1fr 1fr;


    -ms-grid-columns: 60% 60%;


    }


    The display property must be set to –ms-grid . The –ms-grid-rows and –ms-grid-columns
    properties specify the dimensions of the grid. These can be specified as fractional
    units (expressed as fr ), as a percentage of the available space, or as fixed
    dimensions. I have specified two equal-sized rows and two columns, the width of
    which is set to be 60 percent of the width of the parent element.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ GETTING STARTED


    It is common in Windows Store apps (or at least common in the ones developed so
    far) to provide a content area that is wider than the screen and allow the user
    to scroll from left to right to access different regions of the app. Setting the
    cumulative width to 120 percent sets up that behavior, which you will be able
    to see when I run the example web app later in this chapter.


    For individual items, you specify which row and column they should appear in,
    like this:


    #leftContainer {


    -ms-grid-column: 1;


    -ms-grid-row: 1;


    -ms-grid-row-span: 2;


    }


    The –ms-grid-column and –ms-grid-row properties locate an element in the grid.


    Both properties are 1-based, meaning that locating an element in column 1 and
    row 1 will place it in the top-left position in the grid. By default, elements
    occupy one grid square, but you can change this using the –ms-grid-row-span and
    –ms-grid-column-span properties. In the example, I have made the leftContainer
    element span two rows. The only other property of interest is –ms-grid-column-align
    , which I have not used in my example. This property specifies the alignment of
    an element within a grid square and can be set to start , end center , or stretch
    . If you are using a left-to-right language such as English, the start and end
    values left- and right-justify the element. The center value centers the element,
    and the stretch value resizes the element so that it completely fills its allocated
    space.


    You can create some very complex layouts using the grid properties. See the full
    specification at www.w3.org/TR/css3-grid for details, bearing in mind that this
    is not yet a ratified standard.


    Exploring the default.js File


    The last of the important files that Visual Studio has created is default.js ,
    which is referenced in default.html using a standard script element. You can see
    the content of this file in Listing 1-5\. I have not made any changes to this
    file aside from formatting the code so that it fits on the page.


    ***Listing 1-5.*** The Content of the default.js File


