- fmt: '# Windows Store App 开发入门


    `Windows Store` apps can be developed using a range of languages, including `C#`,
    `Visual Basic`, `C++`, and, the topic of this book, `JavaScript`. `Windows 8`
    is the first version of `Windows` that embraces the skills and knowledge of web
    application developers and makes `JavaScript` and `HTML` first-class citizens
    in application development.


    In this book, I show you how you can build on your knowledge of web app development
    to create `Windows Store` apps using `HTML` and `JavaScript`. The result is apps
    that look and feel like an integral part of the `Windows` experience and that
    take advantage of core platform facilities.


    This book gives you an essential jump start into the world of `Windows 8`; by
    the end, you will understand how to use the controls and features that define
    the core `Windows 8` experience.


    ## About This Book


    This book is for experienced `HTML` and `JavaScript` developers who want to get
    a head start creating apps for `Windows 8`. I explain the concepts and techniques
    you need to get up to speed quickly and to boost your `Windows 8` development
    techniques and knowledge.


    ## What Do You Need to Know Before You Read This Book?


    You need to have a good understanding of `HTML` and `JavaScript`, ideally from
    creating rich web apps. You need to understand the `DOM API`, know how events
    work, and have a solid grasp of the `HTML` elements and their `DOM` object counterparts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 1 GETTING STARTED


    ### Do You Need to Know About HTML5?


    No. You can use some of the `HTML5` `JavaScript` APIs when developing `Windows
    Store` apps, but that is not the focus of this book. A good basic knowledge of
    `HTML4` or `HTML5` will be enough, combined with solid `JavaScript` experience.


    ### What Software Do You Need for This Book?


    You need two things for `Windows 8` app development: a PC running `Windows 8`
    and `Visual Studio 2012`. If you get serious about `Windows 8` development, then
    you''ll need to buy a copy of `Windows 8`, but if you are just curious, then you
    can get a 90-day trial from `Microsoft` here: [http://msdn.microsoft.com/en-us/evalcenter](http://msdn.microsoft.com/en-us/evalcenter).
    You''ll find what you need by clicking the `Release` link in the `Windows and
    Platform Development` section.


    You are required to create a `Microsoft` account to get the evaluation, but you''ll
    need one of those anyway to get set up as a developer. `Microsoft` accounts are
    free to create, and there are instructions to follow if you don''t already have
    one.


    **Tip** You can run `Windows 8` in a virtual machine, but for the best results
    I recommend installing the operating system directly onto a PC.


    `Visual Studio 2012` is `Microsoft`''s development environment. The good news
    is that `Microsoft` makes a basic version of `Visual Studio`, available for free,
    and that''s the version I''ll be using in this book. It has the catchy name of
    `Visual Studio 2012 Express for Windows 8`, and you can download the installer
    from [www.microsoft.com/visualstudio/11/en-us/products/express](http://www.microsoft.com/visualstudio/11/en-us/products/express).
    Several flavors are available, each of which can be used to develop a specific
    kind of application. For `Windows 8` development, you will need `Visual Studio
    Express 2012 for Windows 8`. The names of the different flavors are confusingly
    similar, so be sure to download the right one.


    `Visual Studio Express 2012 for Windows 8` doesn''t have all of the testing and
    integration features that some of the paid-for versions of `Visual Studio` contain,
    but you don''t need those features to create `Windows Store` apps. In all other
    respects, the free version of `Visual Studio` is fully featured and does everything
    you will need.


    **Tip** Don''t worry if you have a paid-for version of `Visual Studio 2012`. You
    won''t need all of the features in your edition, but all of the instructions and
    examples in this book will work without any problems or modification.


    Install `Visual Studio` as you would any other app. Although the software is free,
    you will need to activate it, which requires the `Microsoft` account you created
    earlier. After you have gone through the process, you''ll end up with a code that
    you can use to activate `Visual Studio`. You will also need a developer license,
    which is free. When you first start `Visual Studio 2012`, you will be prompted
    to obtain a license; it takes only a second, and once again, it requires the `Microsoft`
    account you created earlier.


    ### What Is the Structure of This Book?


    I focus on the key techniques and features that make a `Windows 8` app. You already
    know how to write `HTML` and use form elements, such as the `input` element, to
    gather data from the user, and I am not going to waste your time teaching you
    what you already know.


    This book is about translating your web app development experience into the `Windows
    8` world, and that means focusing on what makes a `Windows 8` app special.


    I have taken a relaxed approach to mixing topics. Aside from the main theme in
    each chapter, you''ll find some essential context to explain why features are
    important and why you should implement them. Along the way, I''ll show you the
    conventions for writing `JavaScript` `Windows Store` apps and introduce as many
    `Windows 8` features as I can. By the end of this book, you will understand how
    to build a `Windows 8` app that integrates properly into `Windows 8` and presents
    a user experience that is consistent with `Windows Store` apps written using other
    technologies, such as `XAML`/`C#`.


    This is a primer to get you started on programming `Windows Store` apps. It isn''t
    a comprehensive tutorial; as a consequence, I have focused on those topics that
    are the major building blocks for a `Windows 8` app. There is a lot of information
    that I just couldn''t fit into such a slim volume. You can find more comprehensive
    coverage of `Windows 8` development in my *Pro Windows 8 Development with HTML5
    and JavaScript* book, also from Apress.


    The following sections summarize the chapters in this book.


    #### Chapter 1: Getting Started


    Aside from introducing this book, I show you how to create the `Visual Studio`
    project for the example `Windows 8` app that I use throughout this book. I show
    you how to use the `JavaScript` tools in `Visual Studio`, how to test your `Windows
    Store` apps in the `Visual Studio` simulator, and how to use the debugger.


    #### Chapter 2: Data and Bindings


    Data is at the heart of any `Windows 8` app, and in this chapter I show you how
    to define a view model and how to use `Windows 8` data bindings to bring that
    data into your app layouts. These techniques are essential to building `Windows
    Store` apps that are easy to extend, easy to test, and easy to maintain. Along
    the way, I''ll show you how to define `Windows 8` `JavaScript` namespaces, create
    observable arrays, use `JavaScript` promises, and generate content using templates.


    #### Chapter 3: Application Controls


    Certain user interface controls are common to all `Windows Store` apps, regardless
    of which language is used to create them. In this chapter, I show you how to create
    and configure `AppBars` and `Flyouts`, which are the two most important of these
    common controls; together they form the backbone of your interaction with the
    user. I also show you how to break up your `Windows 8` content and code into pieces
    to make your app easy to manage and how to bring those pieces together at runtime.


    #### Chapter 4: Layouts and Tiles


    The functionality of a `Windows 8` app extends to the `Windows 8` Start menu,
    which offers a number of ways to present the user with additional information.
    In this chapter, I show you how to create and update dynamic Start tiles and how
    to apply badges to those tiles.'
