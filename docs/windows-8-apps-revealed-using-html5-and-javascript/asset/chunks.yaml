    # 适应方向与视图变化


    有两种机制可用于响应方向变化：你可以使用 CSS，也可以使用 JavaScript。如果愿意，还可以混合使用这两种方法，接下来的章节我将同时演示这两种方式。


    ## 使用 CSS 适配


    微软定义了一个自定义 CSS 媒体查询属性和一组值，当方向或视图发生变化时，可用于更改 Windows 8 应用的 CSS 样式。


    当 Visual Studio 创建新的 Windows 8 应用程序项目时，这些属性会被添加到 `default.css` 文件中，如代码清单 4-1 所示。


    **代码清单 4-1.** 方向与视图媒体查询


    ```

    /*

    **...为简洁起见，省略了 MetroGrocer 样式...*

    */


    @media screen and (-ms-view-state: fullscreen-landscape) {


    }


    @media screen and (-ms-view-state: filled) {


    }


    @media screen and (-ms-view-state: snapped) {


    }


    @media screen and (-ms-view-state: fullscreen-portrait) {


    }

    ```


    该属性名称为 `-ms-view-state`，你可以在代码清单中看到所支持的取值范围，这些值涵盖了方向和视图的各种组合。（请记住，`filled` 和 `snapped`
    视图仅在设备处于横向模式时可用。）要适应某个特定的方向或视图，只需在相应的媒体查询中定义 CSS 样式即可。你定义的样式只会在用户更改方向或视图时才会应用。作为演示，代码清单
    4-2 展示了如何定义仅在用户将应用切换到 `snapped` 视图时才应用的样式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **代码清单 4-2.** 为贴靠视图定义样式


    ```

    /*

    ... *为简洁起见，省略了 MetroGrocer 样式*...

    */


    @media screen and (-ms-view-state: fullscreen-landscape) {


    }


    @media screen and (-ms-view-state: filled) {


    }


    @media screen and (-ms-view-state: snapped) {


    #contentGrid div.gridRight, #listTable td:last-child, #listTable th {


    display: none;


    }


    #listTable td { white-space: nowrap;}


    #listTable td:first-child { border-right: thin solid white;}


    #contentGrid div.gridLeft { margin-left: 0.5em;}


    #contentGrid {-ms-grid-columns: 1fr;}


    }


    @media screen and (-ms-view-state: fullscreen-portrait) {


    }

    ```


    对于我的示例应用来说，贴靠视图提供的空间太小，无法显示完整的布局。如代码清单所示，我使用了 `snapped` 媒体查询来隐藏某些元素，并更改其他元素的显示和行为。你可以在图
    4-4 中看到这些样式在贴靠视图中的应用效果，在该图中，我的样式为用户呈现了应用中数据的精简视图。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-92_1.jpg)


    **图 4-4.** 使用 CSS 媒体查询调整应用布局


    请注意，Windows 会自动调整 Windows 8 的结构元素，例如在贴靠布局中移除 `AppBar` 按钮上的标签。


    > **提示：** 常规的 CSS 优先级规则同样适用于这些查询中定义的样式，这意味着通常应确保 `default.css` 文件的 `<link>` 元素在
    `default.html` 文件中最后出现。


    ## 使用 JavaScript 适配


    仅使用 CSS 就能实现相当多的布局适配，但有时也需要在 JavaScript 中进行适配。`Windows.UI.ViewManagement` 命名空间定义了一个名为
    `ApplicationView` 的对象，它提供有关当前布局的详细信息。你可以通过处理标准 DOM `resize` 事件来接收方向或视图变化的通知。在代码清单
    4-3 中，你可以看到我如何在 `default.js` 文件中为 `resize` 事件添加处理函数。


    **代码清单 4-3.** 在 `default.js` 文件中适配变化


    ```

    ...

    function performInitialSetup(e) {


    WinJS.UI.processAll().then(function () {


    UI.List.displayListItems();


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    UI.List.setupListEvents();


    UI.AppBar.setupButtons();


    UI.Flyouts.setupAddItemFlyout();


    ...

    ```

