    CHAPTER 1 ■ GETTING STARTED


    Summary


    In this chapter, I introduced the structure of the book and provided a brief preview
    of what you will find in the chapters that follow. I also showed you the anatomy
    of a basic Windows 8 project and created the example project that I will build
    on for the rest of the book. Finally, I showed you how to use the simulator to
    run a Windows 8 app and briefly touched on the two ways to cause the Visual Studio
    debugger to break when running your code. In the next chapter, I’ll start to add
    some functionality to the example and begin using some of the features of the
    WinJS API. I start by defining a view model and demonstrating how to bind the
    data it contains to the Windows 8 app layout; this is an essential technique for
    building robust apps that are easily to build, scale, and maintain.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2**


    **Data and Bindings**


    In this chapter, I show you how to define and use the data that forms the core
    of a Windows 8 app. To do this, I will be loosely following the *view model* pattern,
    which allows me to cleanly separate the data from the HTML that is used to present
    it to the user. This makes apps easier to write, test, and maintain.


    You may already be familiar with models and view models from design patterns such
    as Model-View-Controller (MVC) and Model-View-View Controller (MVVC).


    I am not going to get into the details of these patterns in this book. There is
    a lot of good information about MVC and MVVC available, starting with Wikipedia,
    which has some very balanced and insightful descriptions.


    I find the benefits of using a view model to be enormous and well worth considering
    for all but the simplest Windows 8 projects, and I recommend you seriously consider
    following the same path. I am not a pattern zealot, and I firmly believe in taking
    the parts of patterns and techniques that solve real problems and adapting them
    to work in specific projects. To that end, you will find that I take a pretty
    liberal view of how a view model should be used.


    This chapter is largely focused on the behind-the-scenes plumbing in a Windows
    Store app. I start slowly, showing you the conventions for adding JavaScript code
    to a Windows 8 project and how to use the Windows 8 JavaScript features to reduce
    global namespace pollution. From there, I define a simple view model and demonstrate
    different techniques for bringing the data from the view model into the app display.
    This chapter is all about creating a solid foundation for a Windows Store app
    and getting to grips with the core Windows 8 JavaScript functionality. Table 2-1
    provides the summary for this chapter.


