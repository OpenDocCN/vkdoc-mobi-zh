    \ | 1, 3, 4 |\n| 导入一段静态内容。 | 使用`HTMLControl`功能。 | 2 |\n| 指示一个`Flyout`。 | 定义一个`div`元素，其`data-win-control`属性为`WinJS.UI.Flyout`。\
    \ | 5–7 |\n| 将`Flyout`与`AppBar`按钮关联。 | 配置`button`元素，使其`type`属性为`flyout`，且`flyout`属性设置为`flyout`的`div`元素的`id`。\
    \ | 8 |\n| 管理一个`Flyout`。 | 使用 DOM API 管理`Flyout`中的控件，并使用`Flyout`的`div`元素的`winControl`属性成员管理`Flyout`功能。\
    \ | 9, 10 |\n| 将内容加载到 Windows 8 应用中。 | 创建 HTML 片段，并使用`WinJS.UI.Pages.define`方法注册一个在内容加载时执行的回调函数。使用`WinJS.UI.Pages.render`方法加载内容。\
    \ | 11–15 |\n| 将 HTML、JavaScript 和 CSS 一起加载到 Windows 8 应用中。 | 创建一个 HTML 文档，并使用`script`和`link`元素引用\
    \ JavaScript 和 CSS 文件。使用`WinJS.UI.Pages.define`和`WinJS.UI.Pages.render`方法注册回调函数并加载文档。\
    \ | 16–19 |\n| 显示 Windows 8 应用外部的内容。 | 使用`iframe`，并确保在应用的清单中声明了 Internet (客户端)\
    \ 权限。 | 20–22 |\n\n### 添加 AppBar\n\n*AppBar*会在用户向上滑动手指或用鼠标右键单击时出现在屏幕底部。Windows\
    \ 8 应用 UI 的重点似乎是主布局上的控件越少越好，并依赖`AppBar`作为除立即可用功能之外的任何交互机制。\n\n我本可以直接在`default.html`中定义`AppBar`的\
    \ HTML，但正如本章开头所提到的，WinJS 支持动态加载和插入 HTML 片段。为了演示此功能，我在解决方案资源管理器中创建了一个`html`文件夹，并使用“添加新项”对话框中的“HTML\
    \ 页面”项创建了一个`appbar.html`文件。\n\n清单 3-1 展示了`appbar.html`的内容，其中包含我的`AppBar`定义。\n\n\
    **提示** 确保在创建`html`文件夹时没有运行调试器。如果正在运行，Visual Studio 将创建一个名为`NewFolder`的文件夹，并且在调试器停止之前不允许你更改名称。\n"
- fmt: "# CHAPTER 3 ■ APPLICATION CONTROLS\n\n## **Listing 3-1.** Defining an `AppBar`\
    \ in the `appbar.html` File\n\n```html\n<div id=\"appBar\" data-win-control=\"\
    WinJS.UI.AppBar\">\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n  \
    \        data-win-options=\"{section: 'global', label: 'New Item', icon: 'add'}\"\
    >\n  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n      \
    \    data-win-options=\"{section: 'global', label: 'Stores', icon: 'shop'}\">\n\
    \  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n        \
    \  data-win-options=\"{section: 'global', label: 'Zip Code', icon: 'home'}\">\n\
    \  </button>\n  <button data-win-control=\"WinJS.UI.AppBarCommand\"\n        \
    \  data-win-options=\"{id: 'done', disabled: true, section: 'selection', label:\
    \ 'Done', icon: 'accept'}\">\n  </button>\n</div>\n```\n\nThe `AppBar` is denoted\
    \ by a `div` element that has the `data-win-control` set to `WinJS.AppBar`. An\
    \ `AppBar` contains one or more `button` elements whose `data-win-control` attribute\
    \ is set to `WinJS.UI.AppBarCommand`. Each button requires configuration information,\
    \ and this is provided through the `data-win-options` attribute, following the\
    \ format of a simple JavaScript object. I'll explain the meaning of the configuration\
    \ properties shortly.\n\n**Tip:** You can also specify `AppBar` buttons using\
    \ a series of nested HTML elements, which obviates the need for the JavaScript-like\
    \ configuration object. I don't like having to embed fragments of code into my\
    \ markup, but it is something that pervades WinJS, so I tend to stick with the\
    \ approach shown in the listing. It is ugly, but it is consistent with the way\
    \ other controls work.\n\n## **Listing 3-2.** Importing an HTML Fragment into\
    \ `default.html`\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n  <meta charset=\"\
    utf-8\">\n  <title>MetroGrocer</title>\n\n  <!-- WinJS references -->\n  <link\
    \ href=\"//Microsoft.WinJS.1.0/css/ui-dark.css\" rel=\"stylesheet\">\n  <script\
    \ src=\"//Microsoft.WinJS.1.0/js/base.js\"></script>\n  <script src=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    ></script>\n\n  <!-- MetroGrocer references -->\n  <link href=\"/css/list.css\"\
    \ rel=\"stylesheet\">\n  <link href=\"/css/default.css\" rel=\"stylesheet\">\n\
    \  <script src=\"/js/viewmodel.js\"></script>\n  <script src=\"/js/ui.js\"></script>\n\
    \  <script src=\"/js/default.js\"></script>\n</head>\n<body>\n  <div id=\"contentGrid\"\
    >\n    <div id=\"leftContainer\" class=\"gridLeft\">\n      <h1 class=\"win-type-xx-large\"\
    >Grocery List</h1>\n      <table id=\"listTable\" class=\"type-table-header\"\
    >\n        <thead>\n          <tr>\n            <th>Quantity</th>\n          \
    \  <th class=\"itemName\">Item</th>\n            <th class=\"store\">Store</th>\n\
    \          </tr>\n        </thead>\n        <tbody id=\"itemBody\"></tbody>\n\
    \      </table>\n    </div>\n    <div id=\"topRightContainer\" class=\"gridRight\"\
    >\n      <h1 class=\"win-type-xx-large\">Top Right Container</h1>\n    </div>\n\
    \    <div id=\"bottomRightContainer\" class=\"gridRight\">\n      <h1 class=\"\
    win-type-xx-large\">Bottom Right Container</h1>\n    </div>\n  </div>\n\n  <!--\
    \ import HTML fragments -->\n  <div data-win-control=\"WinJS.UI.HtmlControl\"\n\
    \       data-win-options=\"{uri: '/html/appbar.html'}\"></div>\n  <!-- end of\
    \ HTML fragments -->\n\n  <!-- template for grocery list items -->\n  <table>\n\
    \    <tbody id=\"itemTemplate\" data-win-control=\"WinJS.Binding.Template\">\n\
    \      <tr class=\"groceryItem\">\n        <td data-win-bind=\"innerText: quantity\"\
    ></td>\n        <td data-win-bind=\"innerText: item\"></td>\n        <td data-win-bind=\"\
    innerText: store\"></td>\n      </tr>\n    </tbody>\n  </table>\n  <!-- end of\
    \ template for grocery list items -->\n\n</body>\n</html>\n```\n\nWhen you call\
    \ the `WinJS.UI.processAll` method, WinJS finds all `div` elements whose `data-win-control`\
    \ attribute is set to `WinJS.UI.HtmlControl` and sets their content to the HTML\
    \ fragment specified in the `data-win-options` attribute. You can't specify the\
    \ fragment file directly; instead, you have to use the JSON-like format I have\
    \ shown in the listing, specifying the file name as the value for the `uri` property.\n\
    \n**Tip:** The `HTMLControl` is only for loading fragments of content that don't\
    \ need to execute script or define any CSS. This works in my example because the\
    \ JavaScript that sets up the `AppBar` from the HTML fragment is part of `default.js`,\
    \ which is already associated with the main HTML document. And, as I describe\
    \ in a moment, I have to take precautions to make sure that the HTML fragment\
    \ is loaded before performing the `AppBar` setup. Later in this chapter, I show\
    \ you WinJS *pages*, which support their own CSS and JavaScript.\n\nThe contents\
    \ of the loaded file are processed automatically, and WinJS finds and configures\
    \ my `AppBar`. You don't have to worry about making the `AppBar` appear and disappear.\
    \ This is configured by WinJS, and the `AppBar` will appear when the user right-clicks\
    \ or swipes up from the bottom of the screen. You can see how the `AppBar` appears\
    \ in Figure 3-1.\n\n**Figure 3-1.** Adding an `AppBar` to the example application\n\
    \nI have magnified a couple of the buttons in the figure to make them easier to\
    \ see the effect of the configuration properties applied to each `AppBar` button.\
    \ The `id` and `disabled` properties set the corresponding attributes on the `button`\
    \ element, and the `label` property sets the text displayed underneath the button.\n\
    \nThere are two regions on an `AppBar`, and the `section` property specifies which\
    \ one a button appears in. If the `section` property is set to `global`, then\
    \ the button will be toward the right side of the `AppBar`. This area is for actions\
    \ that affect the entire application. A button whose `section` is `selection`\
    \ performs actions that apply to the currently selected item and are displayed\
    \ on the left of the `AppBar`.\n\nThe `icon` property sets the button image. You\
    \ can specify a custom PNG file for this property or use one of the symbol characters\
    \ defined in the Segoe UI Symbol font. You can refer to these icons either by\
    \ specifying one of the values from the `WinJS.UI.AppBarIcon` enumeration or by\
    \ specifying its character code directly (which you can get using the Windows\
    \ 8 Character Map tool). As an example, I specified the `add` icon for one of\
    \ the buttons, which corresponds to the `WinJS.UI.AppBarIcon.add` value or the\
    \ character code `\\uE109`.\n\n**Tip:** There are a lot of icons to choose from,\
    \ far more than the API documentation suggests. Open the `js/ui.js` file in the\
    \ References section and search for *icon* to see the list defined by the enumeration.\
    \ The enumeration just contains common icons; there are even more defined by the\
    \ font itself.\n\n## Implementing App Bar Buttons\n\nIn this section, I will add\
    \ the code to implement the selection-specific `Done` button I added to the `AppBar`.\
    \ To do this, I have defined a `UI.AppBar` namespace in the `ui.js` file and created\
    \ the `setupButtons` function, which you can see in Listing 3-3.\n\n## **Listing\
    \ 3-3.** Setting Up Support for the `AppBar` Buttons\n\n```javascript\n/// <reference\
    \ path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    \ />\n(function () {\n  \"use strict\";\n\n  WinJS.Namespace.define(\"UI.AppBar\"\
    , {\n    setupButtons: function () {\n      ViewModel.State.bind(\"selectedItemIndex\"\
    ,\n        function (newValue, oldValue) {\n          done.disabled = (newValue\
    \ == -1);\n      });\n\n      done.addEventListener(\"click\", function (e) {\n\
    \        var selectedIndex = ViewModel.State.selectedItemIndex;\n        ViewModel.UserData.getItems().splice(selectedIndex,\
    \ 1);\n        ViewModel.State.selectedItemIndex = -1;\n      });\n    }\n  });\n\
    \n  WinJS.Namespace.define(\"UI.List\", {\n    //\n    // . . . code removed for\
    \ brevity . . .\n    //\n  });\n})();\n```\n\nSince `AppBar` buttons are created\
    \ from HTML `button` elements, I can use the standard `disabled` property to control\
    \ the button state and handle the `click` event to respond to user interaction.\n\
    \nI want to control the state of the button in response to changes to the `ViewModel`."
