    content using the pages feature. You can see the element I have added in Listing
    3-13\. No special attributes are required for the placeholder; a regular div element
    will do, ideally with an id attribute so you can easily locate it later.


    ***Listing 3-13.*** Adding a Page Placeholder Element in default.html


    . . .


    <div id="topRightContainer" class="gridRight">


