    ## 第 3 章 ■ 应用程序控件\n\n**图 3-4.** *使用页面将回调函数与 HTML 片段关联*\n\n现在，我正在向布局中右上角的元素添加内容，为此我已注释掉在第\
    \ 1 章中添加的 CSS `background-color` 属性，以演示如何在 Visual Studio 中重新加载应用程序。您可以在清单 3-15\
    \ 中看到我对 `/css/default.css` 文件所做的修改，即将该元素恢复为应用程序中其他地方使用的默认背景颜色。\n\n**清单 3-15.**\
    \ 注释掉 `default.css` 文件中的 `background-color` 属性\n\n```\n. . .\n\n#topRightContainer\
    \ {\n  -ms-grid-column: 2;\n  -ms-grid-row: 1;\n  /*background-color: #808080;*/\n\
    }\n\n. . .\n```\n\n## 加载完整的 HTML 文档\n\n页面示例的一个变体是处理完整的 HTML 文档，而非片段。基本方法相同，但我可以包含\
    \ `script` 和 `link` 元素来加载特定于此文档的 JavaScript 和 CSS 文件。这意味着我可以将回调定义代码和 CSS 样式与应用程序的其他部分分离开。首先，我创建一个名为\
    \ `pages` 的新文件夹，并在其中创建另一个名为 `itemDetail` 的文件夹。然后，我添加一个名为 `itemDetail.html` 的新\
    \ HTML 文件，如清单 3-16 所示。\n\n**清单 3-16.** `itemDetail.html` 文件\n\n```\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n  <title></title>\n  <script src=\"itemDetail.js\"></script>\n\
    \  <link href=\"itemDetail.css\" rel=\"stylesheet\">\n</head>\n<body>\n<div id=\"\
    itemEditor\">\n  <div>\n    <label for=\"itemInput\">Item:</label><input id=\"\
    itemInput\">\n  </div>\n  <div>\n    <label for=\"quantityInput\">Quantity:</label>\n\
    \    <input id=\"quantityInput\">\n  </div>\n  <div>\n    <label for=\"storeSelect\"\
    >Store:</label>\n    <select id=\"storeSelect\" size=\"3\"></select>\n  </div>\n\
    </div>\n</body>\n</html>\n```\n\n此文件中的标记提供了一个 `select` 元素和两个 `input` 元素，允许用户编辑购物清单项目的详细信息。与上一个示例的不同之处在于，这是一个完整的\
    \ HTML 文档，其中包含一个导入 `itemDetail.js` 文件的 `script` 元素和一个导入 `itemDetail.css` 文件的 `link`\
    \ 元素，我已将这两个文件与 `itemDetail.html` 一同创建在 `pages/itemDetail` 文件夹中。\n\n`/pages/itemDetail/itemDetail.css`\
    \ 文件包含一些基本样式，用于布局 HTML 文件中的元素。您可以在清单 3-17 中看到该文件的内容。这只是标准的 CSS，该文件不包含任何 Windows\
    \ 8 特定的功能。\n\n**清单 3-17.** `itemDetail.css` 的内容\n\n```\n#itemEditor {font-weight:\
    \ bold;margin-top: 20px;}\n#itemEditor input {margin-bottom: 5px;display: block;\
    \ font-size: 16pt;}\n#itemEditor select {font-size: 16pt;}\n#itemEditor select,\
    \ #itemEditor textarea {margin-top: 0px;display: block;}\n#buttons {margin-top:\
    \ 20px;}\niframe {width: calc(100% - 10px);margin-top: 20px;height: 100%;}\n#storeDetailTarget,\
    \ #storeSelectionContainer {height: 100%;}\n```\n\n`/pages/itemDetail/itemDetail.js`\
    \ 文件包含页面加载时的回调，如清单 3-18 所示。\n\n**清单 3-18.** 为 `itemDetail.html` 页面定义页面回调\n\n```\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n  \"use strict\";\n\n  WinJS.UI.Pages.define(\"\
    /pages/itemDetail/itemDetail.html\", {\n    ready: function (targetElement) {\n\
    \      var selectedIndex = ViewModel.State.selectedItemIndex;\n      var selectedItem\
    \ = ViewModel.UserData.getItems()\n        .getAt(selectedIndex);\n      itemInput.value\
    \ = selectedItem.item;\n      quantityInput.value = selectedItem.quantity;\n \
    \     WinJS.Utilities.empty(storeSelect);\n      var list = ViewModel.UserData.getStores();\n\
    \      list.forEach(function (item) {\n        var newOption = document.createElement(\"\
    option\");\n        newOption.text = item;\n        if (selectedItem.store ==\
    \ item) {\n          newOption.selected = true;\n        }\n        storeSelect.add(newOption);\n\
    \      });\n      WinJS.Utilities.query('#itemEditor input, #itemEditor select')\n\
    \        .listen(\"change\", function () {\n          ViewModel.UserData.getItems().setAt(selectedIndex,\
    \ {\n            item: itemInput.value,\n            quantity: quantityInput.value,\n\
    \            store: storeSelect.value\n          });\n        });\n    }\n  })\n\
    })();\n```\n\n当我调用 `define` 方法时，必须指定想要被通知的 HTML 文档的*完整*路径。这意味着要写 `pages/itemDetail/itemDetail.html`，而不仅仅是\
    \ `itemDetail.html`。这与 `itemDetail.html` 内部定义的 CSS 和 JavaScript 文件的链接不同，那些链接是相对路径（即仅\
    \ `itemDetail.js`）。\n\n由于用于 JavaScript 应用的 Windows 8 运行时本质上是一个常规浏览器，因此一旦 `script`\
    \ 元素被处理，JavaScript 代码就会立即执行。这意味着回调函数在文档完全加载之前就已注册，并且在文档处理完成后会被调用。这为保持页面自包含提供了一种很好的方式，并且您不需要将回调定义与主应用代码放在一起。\n\
    \n此示例中的回调函数非常简单，只是使用 `input` 和 `select` 元素中的值，通过 `WinJS.Binding.List.setAt` 方法来修改购物清单项目。`setAt`\
    \ 方法完全替换列表中的项目，并触发一个 `itemchanged` 事件，我在第 2 章中向您展示过。此事件会导致显示列表项目的 `table` 元素根据用户所做的更改进行更新。\n\
    \n## 在页面之间切换\n\n现在我有两个页面，我可以在主布局中切换它们。我想在未选择任何项目时显示 `noSelection.html` 页面，并在做出选择时显示\
    \ `itemDetail.html` 页面。实现此目的最简单的方法是绑定到 `ViewModel.State.selectedItemIndex` 属性。清单\
    \ 3-19 显示了 `default.js` 文件中的更改。\n\n**清单 3-19.** 响应视图模型更新，在两个页面之间切换\n\n```\n. .\
    \ .\nfunction performInitialSetup(e) {\n  WinJS.UI.processAll().then(function\
    \ () {\n    UI.List.displayListItems();\n    UI.List.setupListEvents();\n    UI.AppBar.setupButtons();\n\
    \    UI.Flyouts.setupAddItemFlyout();\n    ViewModel.State.bind(\"selectedItemIndex\"\
    , function (newValue) {\n      WinJS.Utilities.empty(itemDetailTarget)\n     \
    \ var url = newValue == -1 ? \"/html/noSelection.html\" :\n        \"/pages/itemDetail/itemDetail.html\"\
    \n      WinJS.UI.Pages.render(url, itemDetailTarget);\n    });\n  });\n}\n. .\
    \ .\n```\n\n我通过改变传递给 `WinJS.UI.Pages.render` 方法的 URL 参数的值来响应 `selectedItemIndex`\
    \ 属性的更改。每次显示一个页面时，都会执行相应的回调函数，我的内容会更新并呈现给用户。\n\n**提示** 请注意，当您使用 `bind` 方法时，您的回调函数将使用您正在监视的属性的当前值来执行。这确保即使尚未进行选择，也能显示正确的页面。\n\
    \n这些添加的结果是，单击列表中的项目允许用户编辑其详细信息，而将项目标记为完成或添加新项目则会清除选择并隐藏详细信息页面。您可以在图 3-5 中看到效果。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-80_1.jpg)\n\
    \n## 第 3 章 ■ 应用程序控件\n"
- fmt: "# Figure 3-5: Allowing the User to Edit the Details of a Grocery List Item\n\
    \nThe code in the callback for a page is executed *every time* that page is displayed.\
    \ You need to ensure that your code doesn’t make assumptions about the state of\
    \ the elements in your page, other than they have been loaded and added to the\
    \ main layout. Since a page is loaded within the context of the main layout, you\
    \ can safely use the functions defined by JavaScript code used by the main HTML\
    \ document. In my example, this includes the view model. Similarly, your elements\
    \ will be subject to the CSS styles that the main document defines.\n\n**Tip**\
    \ Notice that I have used the `size` attribute on the `select` element so that\
    \ several choices are shown at once. This is the Windows 8 convention for `select`\
    \ elements that are part of the main application layout. However, for flyouts,\
    \ such as the one I created earlier in this chapter, the convention is a single-line\
    \ `select` that opens a drop-down list of options.\n\n## Displaying External Content\n\
    \nThe WinJS page feature works only on content that is part of the application.\
    \ You will generate an error if you request an external URL using the `WinJS.UI.Pages.render`\
    \ method. Instead, you must use an `iframe` element if you want to display an\
    \ external HTML document, but you can combine this element with the WinJS page\
    \ feature if you want to get the benefit of breaking your application down into\
    \ small and manageable pieces. To demonstrate this, I have created a new file\
    \ in the `html` directory called `storeDetail.html`. Listing 3-20 shows the contents\
    \ of this file.\n\n### Listing 3-20: The `storeDetail.html` File\n\n```html\n\
    <!DOCTYPE html>\n<html>\n<head>\n<title></title>\n</head>\n<body>\n<div id=\"\
    noStoreSelectionContainer\" class=\"win-type-x-large\">\n<p>Select an item on\
    \ the list</p>\n</div>\n<div id=\"storeSelectionContainer\">\n<iframe id=\"storeFrame\"\
    \ seamless sandbox=\"\"></iframe>\n</div>\n</body>\n</html>\n```\n\nThis is a\
    \ simple document that acts as a wrapper around the `iframe` element and a placeholder\
    \ element to display when no list item has been selected. The most important element\
    \ is, of course, the `iframe`. The `seamless` attribute specifies that no border\
    \ should be drawn around the `iframe`, and setting the `sandbox` attribute to\
    \ the empty string prevents the embedded content from running any scripts, navigating\
    \ to new pages, and submitting forms. I am going to use the `iframe` to display\
    \ the home page of the grocery store associated with the selected item. These\
    \ pages contain all sorts of tracking scripts and some very exception-prone code,\
    \ all of which I want to spare my user from having to deal with.\n\n## Adding\
    \ the Callback\n\nI am going to use the same approach for defining a callback\
    \ as I did when loading a fragment. I have added the callback function to the\
    \ `pages.js` file, and you can see the additions in Listing 3-21.\n\n### Listing\
    \ 3-21: Defining a Callback for the Page\n\n```javascript\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    \ />\n(function () {\n    \"use strict\";\n    WinJS.UI.Pages.define(\"/html/noselection.html\"\
    , {\n        ready: function (targetElement) {\n            numberCount.innerText\
    \ = ViewModel.UserData.getItems().length;\n        }\n    });\n    WinJS.UI.Pages.define(\"\
    /html/storeDetail.html\", {\n        ready: function (targetElement) {\n     \
    \       ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n  \
    \              noStoreSelectionContainer.style.display =\n                   \
    \ (newValue != -1 ? \"none\" : \"\");\n                storeSelectionContainer.style.display\
    \ =\n                    (newValue == -1 ? \"none\" : \"\");\n               \
    \ if (newValue != -1) {\n                    var store = ViewModel.UserData.getItems()\n\
    \                        .getAt(newValue).store;\n                    var url\
    \ = \"http://\" + store.replace(\" \", \"\") + \".com\";\n                   \
    \ document.getElementById(\"storeFrame\").src = url;\n                }\n    \
    \        });\n        }\n    })\n})();\n```\n\nIn the `ready` callback for this\
    \ page, I bind to the `selectedItemIndex` property. When the user selects an item,\
    \ I use the `iframe` to display the home page of the relevant store. Changing\
    \ the value of the `style.display` property lets me switch between the placeholder\
    \ element and the detail for the current store. My technique to creating a URL\
    \ from a store name is pretty basic. I just remove any spaces and add `.com` to\
    \ the end of the name. This won’t suffice for a real project, but it will do just\
    \ fine for my simple example.\n\n**Note** Notice that I obtain the `iframe` element\
    \ by using the `document.getElementById` method. If you refer to the element via\
    \ its global variable, you will cause a security exception when you try to set\
    \ the `src` attribute. This problem doesn’t occur if you obtain the element via\
    \ the DOM API.\n\n## Showing the Page\n\nYou must avoid using `ready` callbacks\
    \ to set up bindings for pages that are not always displayed, because the JavaScript\
    \ code will be executed each time the page is loaded. Over time, you end up with\
    \ a series of bindings, all of which perform the same task. WinJS doesn’t provide\
    \ a mechanism for cleaning up when the content of a page is removed from the layout,\
    \ so the best approach is to move bindings into the main JavaScript files for\
    \ the application.\n\nThis isn’t a problem for the `storeDetails.html` page because\
    \ it is loaded only once and never removed from the document. In this case, I\
    \ am using the WinJS page feature only so that I can decompose my Windows 8 app\
    \ into self-contained pieces to make development and maintenance easier. As you\
    \ can see in Listing 3-22, I display the `storeDetails.html` page just once, meaning\
    \ that I can expect the code in my callback to be executed just once as well.\n\
    \n### Listing 3-22: Displaying the Page\n\n```javascript\n...\nfunction performInitialSetup(e)\
    \ {\n    WinJS.UI.processAll().then(function () {\n        UI.List.displayListItems();\n\
    \        UI.List.setupListEvents();\n        UI.AppBar.setupButtons();\n     \
    \   UI.Flyouts.setupAddItemFlyout();\n        ViewModel.State.bind(\"selectedItemIndex\"\
    , function (newValue) {\n            WinJS.Utilities.empty(itemDetailTarget)\n\
    \            var url = newValue == -1 ? \"/html/noSelection.html\" :\n       \
    \         \"/pages/itemDetail/itemDetail.html\"\n            WinJS.UI.Pages.render(url,\
    \ itemDetailTarget);\n        });\n        WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
    , storeDetailTarget);\n    });\n}\n...\n```\n\nThe final step is to update the\
    \ layout element in `default.html`, as follows:\n\n```html\n...\n<div id=\"bottomRightContainer\"\
    \ class=\"gridRight\">\n    <h1 class=\"win-type-xx-large\">Store Detail</h1>\n\
    \    <div id=\"storeDetailTarget\"></div>\n</div>\n...\n```\n\nThe result is that\
    \ selecting an item on the main list will display the home page of the relevant\
    \ store, as shown in Figure 3-6.\n\n![Figure 3-6](index-84_1.jpg)\n\n### Figure\
    \ 3-6: Displaying External Content\n\n**Caution** The content of the web sites\
    \ that I have used in this example change often, and I have found that sometimes\
    \ there are periods when the content won’t appear in the app because the JavaScript\
    \ code on the web page upsets the app security policy applied by Windows. If this\
    \ is the case, you can see the effect by using a \"safer\" web site. I find that\
    \ Apress.com works well as a substitute.\n\n## Checking Manifest Permissions\n\
    \nWindows 8 apps are subject to a security sandbox. To obtain access to external\
    \ content, your app must be granted one or more permissions in its manifest file.\
    \ To ensure you have the access you need, open the `package.appxmanifest` file\
    \ from the Solution Explorer and go to the Capabilities tab.\n\nYou will see a\
    \ list of capabilities you can request. These are presented to the user when they\
    \ view your app in the Windows 8 Store so that they can make an informed choice\
    \ about what access they grant to your application. (Well, that’s the theory;\
    \ in practice, users don’t generally pay attention to these declarations until\
    \ an app does something that surprises them.)"
