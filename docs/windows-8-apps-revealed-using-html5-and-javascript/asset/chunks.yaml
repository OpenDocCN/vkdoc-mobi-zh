    **A QUICK INTRODUCTION TO CSS3 FLEXBOX LAYOUTS**


    In Listing 4-4, I have applied the CSS3 *flexbox* layout, which is more properly
    known as the flexible box layout. This is another part of CSS3 that has not yet
    been finalized and that is accessed through an –ms vendor prefix, in this case
    –ms-flexbox .


    Flexbox layouts make it easy to create fluid and adaptable layouts, in contrast
    to the precision offered by the grid layout that I described in Chapter 1 . In
    this sidebar, I provide you with a very quick introduction to the basic features
    of CSS3 flexbox layouts.


    To create a flexbox layout, you must set the display property to –ms-flexbox and
    specify how the child elements will be laid out, like this:


    #contentGrid.flex {


    display: -ms-flexbox;


    -ms-flex-direction: column;


    -ms-flex-align: stretch;


    -ms-flex-pack: start;


    }


    The –ms-flex-direction property specifies the direction that elements will laid
    out. The most commonly used values are column (which lays out elements top to
    bottom) and row (which lays out elements left to right).


    The –ms-flex-pack property specifies how the elements will be laid out along the
    axis you have set with the –ms-flex-direction property. I have used the start
    value, which stacks elements next to each other at the start of the axis. The
    other commonly used values are end (which stacks elements at the end of the axis),
    distribute (which spaces out the elements along the axis), and justify (which
    resizes the elements so they fully occupy the space available).


    The –ms-flex-align property specifies how elements are positioned in the other
    direction. I have used the stretch value, which resizes elements so they fill
    the space available. Other commonly used values are start , end , and center ,
    which position the elements to the leading or trailing edge of the container or
    position them centrally.


    The best way to understand the effect of these properties is to experiment with
    them and with a bit of practice, you can create very flexible and adaptable layouts.
    See the full specification at http://www.w3.org/TR/css3-flexbox for full details,
    bearing in mind that this is still a draft standard.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


