- fmt: "When I call the `render` method, `WinJS` not only inserts the HTML from the\
    \ specified file into the document but ensures that my `ready` callback function,\
    \ the one I defined in `pages.js`, is executed. This allows me to process the\
    \ elements, in this case, to insert details about how many items are on the grocery\
    \ list, as shown in Figure 3-4.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-76_1.jpg)\n\n## CHAPTER 3 ■ APPLICATION CONTROLS\n\n**Figure 3-4.**\
    \ *Using a page to associate a callback function with a fragment of HTML*\n\n\
    Now that I am adding content to the top-right element in the layout, I have commented\
    \ out the CSS `background-color` property I added in Chapter 1 to demonstrate\
    \ how reloading an app in Visual Studio works. You can see the change I have made\
    \ to the `/css/default.css` file to restore the element to the default background\
    \ color used elsewhere in the app in Listing 3-15.\n\n**Listing 3-15.** Commenting\
    \ Out the `background-color` Property from the `default.css` File\n\n```\n. .\
    \ .\n\n#topRightContainer {\n  -ms-grid-column: 2;\n  -ms-grid-row: 1;\n  /*background-color:\
    \ #808080;*/\n}\n\n. . .\n```\n\n## Loading a Complete HTML Document\n\nA variation\
    \ on the page example is to work with complete HTML documents, rather than fragments.\
    \ The basic approach is the same, but I can include `script` and `link` elements\
    \ to load JavaScript and CSS files that are specific to the document. This means\
    \ I can keep my callback definition code and CSS styles separate from the rest\
    \ of the application. To begin, I create a new folder called `pages` and another\
    \ one called `itemDetail` inside it. I then add a new HTML file called `itemDetail.html`,\
    \ which is shown in Listing 3-16.\n\n**Listing 3-16.** The `itemDetail.html` File\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n  <title></title>\n  <script src=\"itemDetail.js\"\
    ></script>\n  <link href=\"itemDetail.css\" rel=\"stylesheet\">\n</head>\n<body>\n\
    <div id=\"itemEditor\">\n  <div>\n    <label for=\"itemInput\">Item:</label><input\
    \ id=\"itemInput\">\n  </div>\n  <div>\n    <label for=\"quantityInput\">Quantity:</label>\n\
    \    <input id=\"quantityInput\">\n  </div>\n  <div>\n    <label for=\"storeSelect\"\
    >Store:</label>\n    <select id=\"storeSelect\" size=\"3\"></select>\n  </div>\n\
    </div>\n</body>\n</html>\n```\n\nThe markup in this file provides a `select` and\
    \ two `input` elements to allow the user to edit the details of a grocery list\
    \ item. The difference from the previous example is that this is a complete HTML\
    \ document that contains a `script` element that imports the `itemDetail.js` file\
    \ and a `link` element that imports the `itemDetail.css` file, both of which I\
    \ have created in the same `pages/itemDetail` folder, alongside `itemDetail.html`.\n\
    \nThe `/pages/itemDetail/itemDetail.css` file contains some basic styles to lay\
    \ out the elements in the HTML file. You can see the contents of the file in Listing\
    \ 3-17. This is just standard CSS, and the file contains no Windows 8–specific\
    \ features.\n\n**Listing 3-17.** The Contents of `itemDetail.css`\n\n```\n#itemEditor\
    \ {font-weight: bold;margin-top: 20px;}\n#itemEditor input {margin-bottom: 5px;display:\
    \ block; font-size: 16pt;}\n#itemEditor select {font-size: 16pt;}\n#itemEditor\
    \ select, #itemEditor textarea {margin-top: 0px;display: block;}\n#buttons {margin-top:\
    \ 20px;}\niframe {width: calc(100% - 10px);margin-top: 20px;height: 100%;}\n#storeDetailTarget,\
    \ #storeSelectionContainer {height: 100%;}\n```\n\nThe `/pages/itemDetail/itemDetail.js`\
    \ file contains the callback for when the page is loaded, as shown in Listing\
    \ 3-18.\n\n**Listing 3-18.** Defining the Page Callback for the `itemDetail.html`\
    \ Page\n\n```\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n///\
    \ <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n  \"\
    use strict\";\n\n  WinJS.UI.Pages.define(\"/pages/itemDetail/itemDetail.html\"\
    , {\n    ready: function (targetElement) {\n      var selectedIndex = ViewModel.State.selectedItemIndex;\n\
    \      var selectedItem = ViewModel.UserData.getItems()\n        .getAt(selectedIndex);\n\
    \      itemInput.value = selectedItem.item;\n      quantityInput.value = selectedItem.quantity;\n\
    \      WinJS.Utilities.empty(storeSelect);\n      var list = ViewModel.UserData.getStores();\n\
    \      list.forEach(function (item) {\n        var newOption = document.createElement(\"\
    option\");\n        newOption.text = item;\n        if (selectedItem.store ==\
    \ item) {\n          newOption.selected = true;\n        }\n        storeSelect.add(newOption);\n\
    \      });\n      WinJS.Utilities.query('#itemEditor input, #itemEditor select')\n\
    \        .listen(\"change\", function () {\n          ViewModel.UserData.getItems().setAt(selectedIndex,\
    \ {\n            item: itemInput.value,\n            quantity: quantityInput.value,\n\
    \            store: storeSelect.value\n          });\n        });\n    }\n  })\n\
    })();\n```\n\nWhen I call the `define` method, I have to specify the *complete*\
    \ path to the HTML document that I want to be notified about. This means `pages/itemDetail/itemDetail.html`\
    \ rather than just `itemDetail.html`. This is different from the links to the\
    \ CSS and JavaScript files defined inside `itemDetail.html`, which are relative\
    \ (i.e., just `itemDetail.js`).\n\nSince the Windows 8 runtime for JavaScript\
    \ apps is essentially a regular browser, the JavaScript code is executed as soon\
    \ as the `script` element is processed. This means that the callback function\
    \ is registered before the document has been completely loaded and will then be\
    \ called once the document has been completely processed. This provides the foundation\
    \ for a nice way to keep pages self-contained, and you don’t need to have the\
    \ callbacks defined alongside the main app code.\n\nThe callback function in this\
    \ example is pretty simple and just uses the values from the `input` and `select`\
    \ elements to modify the list of grocery items using the `WinJS.Binding.List.setAt`\
    \ method. The `setAt` method completely replaces the item in the list and triggers\
    \ an `itemchanged` event, which I showed you in Chapter 2. This event causes the\
    \ `table` element displaying the list items to be updated with the changes the\
    \ user has made.\n\n## Switching Between Pages\n\nNow that I have two pages, I\
    \ can switch between them in the main layout. I want to display the `noSelection.html`\
    \ page when no item has been selected and the `itemDetail.html` page when a selection\
    \ has been made. The simplest way to arrange this is to bind to the `ViewModel.State.selectedItemIndex`\
    \ property. Listing 3-19 shows the changes in the `default.js` file.\n\n**Listing\
    \ 3-19.** Switching Between Two Pages in Response to a View Model Update\n\n```\n\
    . . .\nfunction performInitialSetup(e) {\n  WinJS.UI.processAll().then(function\
    \ () {\n    UI.List.displayListItems();\n    UI.List.setupListEvents();\n    UI.AppBar.setupButtons();\n\
    \    UI.Flyouts.setupAddItemFlyout();\n    ViewModel.State.bind(\"selectedItemIndex\"\
    , function (newValue) {\n      WinJS.Utilities.empty(itemDetailTarget)\n     \
    \ var url = newValue == -1 ? \"/html/noSelection.html\" :\n        \"/pages/itemDetail/itemDetail.html\"\
    \n      WinJS.UI.Pages.render(url, itemDetailTarget);\n    });\n  });\n}\n. .\
    \ .\n```\n\nI respond to changes in the `selectedItemIndex` property by altering\
    \ the value of the URL argument I pass to the `WinJS.UI.Pages.render` method.\
    \ Each time a page is displayed, the relevant callback function is executed, and\
    \ my content is updated and presented to the user.\n\n**Tip** Note that when you\
    \ use the `bind` method, your callback function will be executed with the current\
    \ value of the property you are monitoring. This allows me to ensure that the\
    \ correct page is displayed, even when the user has yet to make a selection.\n\
    \nThe result of these additions is that clicking an item in the list allows the\
    \ user to edit its details, while marking the item done or adding a new item clears\
    \ the selection and hides the detail page. You can see the effect in Figure 3-5.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-80_1.jpg)\n\n\
    ## CHAPTER 3 ■ APPLICATION CONTROLS"
