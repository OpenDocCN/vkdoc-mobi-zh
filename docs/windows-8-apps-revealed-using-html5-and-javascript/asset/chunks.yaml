    # 互联网（客户端）功能


    默认情况下会勾选`Internet (Client)`（互联网（客户端））功能，但根据你的内容来源，可能还需要`Private Networks (Client
    & Server)`（专用网络（客户端和服务器））功能。请勾选所需功能并保存清单文件。我将在第 4 章中回到清单文件的配置，来设置其他一些选项。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 3 章：应用程序控件


    ## 本章小结


    在本章中，我介绍了 Windows 8 应用的三个重要结构特性：`AppBars`（应用栏）、`Flyouts`（浮出控件）以及导航模型。这些机制开始弥合通用
    Web 应用与将应用程序分解为可管理模块的工具之间的差距。


    你不必非要使用`AppBars`和`Flyouts`，但如果不用，你的应用将无法融入 Windows 8 模型。Windows 8 的魅力之一在于能够运用你的
    HTML5 和 JavaScript 技能来创建 Windows 应用程序。如果创建的应用不遵循 Windows 8 的惯例，那就错过了 Windows 8
    为 Web 程序员提供的机遇。


    同样，你也可以选择使用单个 HTML 文档来构建你的 Windows 8 应用。但话说回来，这同样会错失良机。驱动 Web 应用走向内容整合的那些限制条件，在
    Windows 8 应用中并不存在，这意味着因分解内容和代码而带来的开发、测试和维护上的便利是值得探索的。`HTMLControl`和页面功能是实现这种开发风格的关键要素。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 4 章：布局与磁贴


    在本章中，我将介绍两种让应用融入 Windows 8 更广泛用户体验的功能。第一个功能是应用可以被*贴靠*和*填充*，从而让两个应用可以并排查看。我将展示当你的应用被置于这些布局之一时如何进行适配，以及当你的交互操作不符合布局限制时如何更改布局。


    第二个功能是 Windows 8 的*磁贴*模型。磁贴是 Windows 8 取代“开始”屏幕的核心。在最简单的形式下，它们是用于启动应用的静态按钮，但稍加处理，它们就能为用户提供应用状态的一个宝贵快照，让用户无需运行应用本身即可获得概览。在本章中，我将展示如何通过应用更新以及使用一个相关功能——*徽章*，来创建*动态磁贴*。表
    4-1 提供了本章的摘要。


    **表 4-1.** 章节摘要


    | 问题 | 解决方案 | 清单编号 |

    |------|----------|----------|

    | 当应用被置于贴靠或填充布局时，调整其布局。 | 使用带有 Windows 8 特定属性的 CSS 媒体查询。 | 1, 2 |

    | 在代码中检测应用布局的变化。 | 使用`Windows.UI.ViewManagement`命名空间。 | 3, 4 |

    | 从贴靠视图脱离出来。 | 调用`tryUnsnap()`方法。 | 5–7 |

    | 更新磁贴。 | 使用 XML 磁贴模板和`Windows.UI.Notifications`命名空间。 | 8–11 |

    | 更新方形和宽形磁贴。 | 填充并组合两个 XML 磁贴模板。 | 12, 13 |

    | 为磁贴应用徽章。 | 填充并应用一个 XML 徽章模板。 | 14–16 |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 处理 Windows 8 的屏幕方向与视图


    Windows 8 应用支持一系列*屏幕方向*和*布局*，以响应设备配置的变化。当设备旋转时，屏幕方向会发生改变，这在配备有方向传感器的设备上很常见，包括大多数平板电脑以及一些笔记本电脑和混合设备。屏幕方向有两种：*横向*和*纵向*。


    此外，Windows 8 应用还支持*视图*。默认视图是*全屏*，这也是本书中示例迄今为止你所看到的样子。应用占据整个屏幕，其他应用不可见。Windows
    8 应用也可以被*贴靠*到一个 320 像素宽的屏幕条中，这样用户就能同时看到两个应用。另一个应用则占据除那 320 像素之外的所有显示区域，这被称为*填充*状态。


    确保你的应用能够适应不同的屏幕方向和视图，对于向用户提供完整的 Windows 8 体验至关重要。


    **注意** 屏幕方向和视图的更改由用户负责，而应用则负责进行适配。这意味着你不能通过编程方式进入新的屏幕方向，也不能强制你的应用进入填充或贴靠视图。同样，你也不能编写一个拒绝进入填充或贴靠视图的
    Windows 8 应用。你可以选择在某些视图中不向用户提供任何有用的功能，但这会严重限制你应用的价值，我不建议采用这种方法。


    ## 模拟屏幕方向与视图的更改


    了解屏幕方向和视图更改的最佳起点是学习如何在 Visual Studio 模拟器中创建它们。这让你无需配备方向传感器的设备（出于显而易见的原因，开发 PC
    上很少配备此类传感器）就能测试应用的反应。


    ### 模拟屏幕方向更改


    Visual Studio 模拟器有两个专用按钮用于模拟屏幕方向更改，如图 4-1 所示。点击这些按钮可模拟按按钮图标所示方向将设备旋转 90 度的效果。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-88_1.jpg)


    **图 4-1.** Visual Studio 模拟器屏幕方向按钮


    该图还显示了示例应用在设备旋转到纵向方向时布局的变化。正如你所见，我分配给 HTML 中各个元素的大小，在累加后占用的空间超过了该方向下可用的空间，这导致了应用部分内容重叠。


    ### 模拟视图更改


    贴靠视图和填充视图仅在横向屏幕方向下、且显示器的水平分辨率达到 1366 像素或更高时可用。这意味着更改视图的第一步是将模拟器旋转至横向，并确保分辨率设置适当（你可以使用屏幕方向更改按钮正下方的按钮来更改模拟器的分辨率）。


    更改视图最简单的方法是按下`Win+.`（Windows 键和句点键）。这将激活贴靠视图，应用会显示在 320 像素宽的狭窄条中，如图 4-2 所示。我的示例应用尚未适配视图更改，你可以看到将所有
    HTML 元素塞入如此小的空间所产生的影响。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-89_1.jpg)


    ![](img/index-89_2.jpg)


    **图 4-2.** 在贴靠视图中显示的示例应用


    Windows 会在显示的两个应用之间显示一条分隔条。拖动该条可将应用移至填充视图，如图 4-3 所示。


    **图 4-3.** 在填充视图中显示的示例应用


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    示例应用展示了相当常见的默认行为。在填充视图中损失 320 像素对布局影响不大，尤其是在较大分辨率的屏幕上。如图 4-3 所示，应用布局处理得还算不错，尽管某些元素的内容被折成两行，但应用的基本核心得以保留。


    相比之下，贴靠视图使得应用完全失去了作用；当你在编写 HTML 和 CSS 时假设有更多的空间可用时，320 像素的空间确实非常有限。

