    ■ **ip** When I show partial listings like these, only the bold area has changed.
    The rest of the file remains just as it was in earlier listings. I know some readers
    prefer that all code listings be shown complete, but I need to pack a lot of information
    into a slim book, and this is an excellent way of increasing the content density.
    Don’t forget that you can get the complete source code, without charge, from Apress.com.


    Figure 1-6 shows the Visual Studio controls that control the execution of the
    Windows 8 app in the simulator. The first three pause, stop, and restart execution.
    These are the traditional debugger controls that Visual Studio has had for as
    long as I can remember.


    ***Figure 1-6 .** Controls for restarting and reloading the Windows 8 app* The
    addition is the reload button, which I have highlighted and which is to the right
    of the other controls. Clicking this button quickly reloads the content of your
    Windows 8


    app and immediately reflects any changes. You can also reload the project by pressing
    the F4 key or by selecting Debug ➤ Refresh Windows App. You can see the effect
    of my HTML


    and CSS changes in Figure 1-7 .


