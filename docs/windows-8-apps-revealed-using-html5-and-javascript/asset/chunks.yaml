    \ 参数, 65\n    - 设置支持, 52\n    - 视图模型切换, 65\n    - `setupButtons` 函数, 53\n  - 页面,\
    \ 58–62\n    - `WinJS.UI.processAll` 方法, 51\n    - 关联回调, 62\n    - 应用基础结构, 47\n\
    \    - 回调函数, 60\n    - 外部内容, 66–70\n    - `color` 属性, 62\n    - 回调, 67\n    -\
