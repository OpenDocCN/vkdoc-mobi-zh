    Getting Up and Running


    In this section, I will create the project for the example Windows 8 app that
    I will build up throughout the book. The app is a simple grocery list tracker;
    it’s a tool that is simple enough to complete in this short book but that has
    enough features to demonstrate the most important aspects of Windows Store development.


