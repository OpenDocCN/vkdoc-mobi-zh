    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 生命周期事件\n\n用户不会关闭\
    \ Windows 8 应用；他们只是切换到另一个应用，让 Windows 来处理一切。这就是 Windows 8 UI 上没有关闭按钮或菜单栏的原因。不再需要的\
    \ Windows 8 应用会进入第二阶段，被*挂起*。在挂起状态下，不会执行任何应用代码，也不会与用户进行交互。\n\n如果用户切换回一个被挂起的应用，则会发生第三阶段：应用被*恢复*。执行继续后，应用将显示给用户。\n\
    \n挂起的应用并不总是被恢复。例如，如果设备内存不足，Windows 可能会简单地*终止*一个挂起的应用。\n\n## 修正 Visual Studio 事件代码\n"
- fmt: "The code that Visual Studio adds to a new project is sufficient to get a basic\
    \ app up and running, but it doesn't support the full range of life-cycle events.\
    \ It deals with activation and suspension quite happily, but it prevents the application\
    \ from being notified when it is being resumed. Fortunately, there are other places\
    \ in the API where I can register to receive the life-cycle events, so my first\
    \ task in this chapter is to update `default.js` so that I am properly notified\
    \ when my app enters all three life-cycle stages. You can see the changes in Listing\
    \ 5-1.\n\n**Listing 5-1.** Registering for Life-Cycle Event Notifications\n\n\
    ```javascript\n(function () {\n    \"use strict\";\n\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    activated\", performInitialSetup);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    resuming\", performResume);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    suspending\", performSuspend);\n\n    function performInitialSetup(e) {\n    \
    \    WinJS.UI.processAll().then(function () {\n            UI.List.displayListItems();\n\
    \            UI.List.setupListEvents();\n            UI.AppBar.setupButtons();\n\
    \            UI.Flyouts.setupAddItemFlyout();\n            ViewModel.State.bind(\"\
    selectedItemIndex\", function (newValue) {\n                WinJS.Utilities.empty(itemDetailTarget)\n\
    \                var url = newValue == -1 ? \"/html/noSelection.html\" :\n   \
    \                 \"/pages/itemDetail/itemDetail.html\"\n                WinJS.UI.Pages.render(url,\
    \ itemDetailTarget);\n            });\n            WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
    , storeDetailTarget);\n\n            function setOrientationClass() {\n      \
    \          if (Windows.UI.ViewManagement.ApplicationView.value ==\n          \
    \          Windows.UI.ViewManagement.ApplicationViewState.fullScreenPortrait)\
    \ {\n                    WinJS.Utilities.addClass(contentGrid, \"flex\");\n  \
    \              } else {\n                    WinJS.Utilities.removeClass(contentGrid,\
    \ \"flex\");\n                }\n            };\n            window.addEventListener(\"\
    resize\", setOrientationClass);\n            setOrientationClass();\n        \
    \    unsnapButton.addEventListener(\"click\", function (e) {\n               \
    \ Windows.UI.ViewManagement.ApplicationView.tryUnsnap();\n            });\n  \
    \          Tiles.sendTileUpdate();\n            Tiles.sendBadgeUpdate();\n   \
    \     });\n    }\n\n    function performResume(e) {\n        WinJS.Utilities.query(\"\
    #topRightContainer h1\")[0].innerText = \"Resumed\";\n    }\n\n    function performSuspend(e)\
    \ {\n        WinJS.Utilities.query(\"#leftContainer h1\")[0].innerText = \"Suspended\"\
    ;\n    }\n})();\n```\n\nI have used the events provided through the `Windows.UI.WebUI.WebUIApplication`\
    \ class, and they neatly map to the life-cycle events. My example Windows 8 app\
    \ doesn't currently perform any tasks that are affected by the application being\
    \ suspended and resumed, but I want to show you how to test for the events. To\
    \ that end, I have added statements to the `performResume` and `performSuspend`\
    \ functions that change the value of `h1` elements in the HTML document to indicate\
    \ when the suspending and resuming events are received.\n\nVisual Studio contains\
    \ support for simulating the suspending and resuming events in the debugger, but\
    \ I suggest that you learn how to trigger these events directly in the operating\
    \ system so that you can test without needing to use Visual Studio.\n\nThe problem\
    \ is that Visual Studio has to disable the real operating system events so that\
    \ the Windows 8 app process remains under its control at all times. This means\
    \ that Visual Studio can create a slightly different experience from what the\
    \ user will see when they use your app.\n\nUnfortunately, when you work without\
    \ Visual Studio, you lose access to helpful tools like the JavaScript Console\
    \ window and, of course, the debugger itself. You have to find an alternative\
    \ mechanism for observing changes in the app lifecycle, which is why I handle\
    \ the resuming and suspending events by changing the text displayed by `h1` elements\
    \ in the layout, like this:\n\n```javascript\n...\nWinJS.Utilities.query(\"#leftContainer\
    \ h1\")[0].innerText = \"Suspended\";\n...\n```\n\nBy using the layout to record\
    \ receipt life cycle events, I am able to ensure that my app is getting the events\
    \ I expect. Now that I have fixed the event-handling code in the `default.js`\
    \ file and added support for recording the receipt of the events by changing the\
    \ layout of the app, I will show you the different ways you can generate the events,\
    \ through Visual Studio and by using Windows 8 directly.\n\n## Simulating Life-Cycle\
    \ Events Using Visual Studio\n\nTo use Visual Studio to simulate the life-cycle\
    \ events, start the app by selecting **Start Debugging** from the **Debug** menu.\
    \ Visual Studio will display a pop-up menu on the toolbar, as shown in Figure\
    \ 5-1, that has options to suspend and resume the app; these options send the\
    \ suspending and resuming events to the app. There is also an option that will\
    \ send the suspending event and then terminate the app (this will actually terminate\
    \ the app and not just simulate the effect).\n\n**Figure 5-1.** Using Visual Studio\
    \ to simulate life-cycle events\n\n> **Tip:** For some editions of Visual Studio,\
    \ the toolbar menu won't appear until you select the **Debug Location** option\
    \ on the **View** > **Toolbars** menu.\n\nTo test the Visual Studio support for\
    \ the life-cycle events, start the app and then select the **Suspend** item from\
    \ the menu. The app will be sent the suspending event and will no longer be displayed.\
    \ Wait a moment and then select **Resume** from the Visual Studio menu; the app\
    \ will reappear, and you will see that the `h1` elements along the top edge of\
    \ the screen have been updated to reflect the fact that the suspending and resuming\
    \ events have been received, as shown in Figure 5-2.\n\n**Figure 5-2.** Using\
    \ the elements in the app layout to record life-cycle events\n\n## Triggering\
    \ Life-Cycle Events\n\nIn the sections that follow, I show you how to trigger\
    \ the life-cycle events without using Visual Studio. It is important that you\
    \ test your app behavior using the real events and not just rely on the simulated\
    \ life cycle that Visual Studio supports.\n\n### Activate the Application\n\n\
    To trigger the activated event, start the application by selecting **Start Without\
    \ Debugging** from the Visual Studio **Debug** menu. You can also start the app\
    \ from the **Start** screen, either in the simulator or on your local machine.\
    \ The important thing is not to use the debugger to start the app.\n\n### Suspend\
    \ the Application\n\nThe easiest way to suspend the application is to switch to\
    \ the desktop by pressing `Win+D`. Open the **Task Manager**, right-click the\
    \ item for your Windows 8 app, and select **Go to Details** from the pop-up menu.\
    \ The Task Manager will switch to the **Details** tab. (You may have to click\
    \ the **More Details** button before you can select the **Details** tab.) On the\
    \ **Details** tab, you will see one or more `WWAHost.exe` processes, each of which\
    \ corresponds to a Windows 8 app. You can tell which one is the example app because\
    \ after a few seconds, the value shown in the **Status** column will change from\
    \ `Running` to `Suspended`, which tells you that Windows has suspended the app,\
    \ as shown in Figure 5-3.\n\n**Figure 5-3.** The Windows Task Manager showing\
    \ a suspended Windows 8 app\n\n### Resuming the Application\n\nSwitching back\
    \ to the application will resume it. You will see that the `h1` elements displayed\
    \ at the top of the layout show that both the resuming and suspending events were\
    \ sent by Windows.\n\nThe state of a resumed application is exactly as it was\
    \ at the moment it was suspended. Your layout, data, event handlers, and everything\
    \ else will be just as it was. You don't have to call `processAll` when handling\
    \ the resuming event, for example."
