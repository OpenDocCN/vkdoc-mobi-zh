    12, "Costco"); ViewModel.UserData.addItem("Soda", "4 pack", "Costco");


    })();


    I’ll return to the view model in a moment, but first I need to explain some of
    the other parts of the code and the conventions they represent. I won’t do this
    for subsequent JavaScript files, but there is some useful context to put in place
    as you get started with Windows 8 development.


    Using Code Completion


    Visual Studio supports JavaScript code completion in the editor, which makes writing
    code simpler and less error-prone. You must use a reference element to bring JavaScript
    files into scope for code completion for files that are not in the local directory,
    like this:


    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />


    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> Prefixing the reference
    element with three slash ( / ) characters brings the reference to the attention
    of Visual Studio and causes the JavaScript runtime to treat the statement like
    a comment. With these additions, code-competition support for the WinJS API is
    23


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ DATA AND BINDINGS


    added to the viewmodel.js file. You need to add these reference elements to each
    of your JavaScript files if you want WinJS completion.


    Reducing Global Namespace Pollution


    One of the biggest problems in JavaScript is variable name collision. JavaScript
    variables defined outside a function are globally available, and since there are
    only so many meaningful variable names, it is only a matter of time before two
    different regions of code try to use the same variable name for different purposes.
    Global variables are said to be part of the *global namespace* , and defining
    global variables is often described as *polluting* *the global namespace* . Windows
    8 JavaScript files follow three different conventions to reduce namespace pollution,
    all of which you should adopt.


    Creating Namespaces


    The WinJS API helps reduce global namespace pollution through the define method
    of the Namespace object:


    WinJS.Namespace.define("ViewModel.UserData", {


    //


    . . .


    *members for the ViewModel.UserData object are defined here*


    . . .


    });'
  trans: "\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 1 章 ■ 开始入门\n\n\
    ## 本章小结\n\n在本章中，我介绍了本书的结构，并简要预览了后续各章的内容。我还向你展示了一个基本 Windows 8 项目的结构，并创建了一个贯穿全书始终的示例项目。最后，我演示了如何使用模拟器运行\
    \ Windows 8 应用程序，并简要介绍了在运行代码时触发 Visual Studio 调试器中断的两种方式。在下一章中，我将开始为示例添加一些功能，并开始使用\
    \ WinJS API 的部分特性。首先我会定义一个视图模型，并演示如何将其包含的数据绑定到 Windows 8 应用程序布局上；这是构建易于构建、扩展和维护的健壮应用程序的基本技术。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 2 章\n\n## 数据与绑定\n\n\
    在本章中，我将向你展示如何定义和使用构成 Windows 8 应用程序核心的数据。为此，我将松散地遵循*视图模型*模式，该模式允许我将数据与用于向用户呈现数据的\
    \ HTML 清晰地分离开来。这使得应用程序更易于编写、测试和维护。\n\n你可能已经从模型-视图-控制器（MVC）和模型-视图-视图控制器（MVVC）等设计模式中熟悉了模型和视图模型。\n\
    \n我不打算在本书中深入探讨这些模式的细节。关于 MVC 和 MVVC 有很多优秀的信息可供参考，从维基百科开始就有一些非常平衡且富有洞察力的描述。\n\n\
    我发现使用视图模型的好处巨大，对于所有但最简单的 Windows 8 项目而言，都非常值得考虑，我建议你认真考虑遵循同样的路线。我并非模式狂热者，我坚信应该采纳那些能解决实际问题的模式和技术的部分，并使其适应特定项目。因此，你会发现我对视图模型的使用方式持有相当宽松的看法。\n\
    \n本章主要关注 Windows 应用商店应用程序后台的底层机制。我会从简单开始，向你展示将 JavaScript 代码添加到 Windows 8 项目的约定，以及如何使用\
    \ Windows 8 的 JavaScript 特性来减少全局命名空间污染。接着，我会定义一个简单的视图模型，并演示将数据从视图模型带入应用程序显示的不同技术。本章旨在为\
    \ Windows 应用商店应用程序打下坚实基础，并让你掌握核心的 Windows 8 JavaScript 功能。表 2-1 提供了本章摘要。\n\n***表\
    \ 2-1.** 本章摘要*\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 创建一个视图模型。 | 使用 `WinJS.Namespace.define`\
    \ 方法创建一个包含应用程序数据的全局对象。 | |\n| 显示视图模型中的值。 | 使用 `data-win-bind` 属性创建声明式绑定，并调用 `WinJS.Binding.processAll`\
    \ 方法进行处理。 | 2, 3 |\n\n（*续*）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n***表 2-1.***（*续*）\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 创建动态绑定。 | 使用\
    \ `WinJS.Binding.as` 方法创建一个可观察的数据属性。为该属性分配新值以触发 HTML 中的更新。 | 4, 6–8 |\n| 在全局可用的命名空间对象中创建可观察的数据属性。\
    \ | 确保具有可观察属性的对象不是由 `WinJS.Namespace.define` 方法直接导出的。 | |\n| 创建可观察的数组。 | 使用 `WinJS.Binding.List`\
    \ 对象。 | 9–11 |\n| 从可观察的数组生成 HTML 元素。 | 使用 WinJS 模板功能。 | 12–17 |\n\n## 创建 JavaScript\
    \ 文件\n\n第一步是创建一个新的 JavaScript 文件。与 Web 应用程序不同，没有必要减少 Windows 应用商店应用程序中 JavaScript\
    \ 文件的数量，因为当应用程序启动时，它们已经驻留在用户的计算机上。这意味着我不需要合并文件，也不需要考虑最小化代码以减小脚本文件的大小。\n\n相反，我可以为每个主要的应用程序功能创建独立的文件。\n\
    \n在解决方案资源管理器窗口中右键点击`js`文件夹，从菜单中选择添加 ➤ 新建项来添加一个新文件。从列表中选择 JavaScript 文件，将名称设置为`viewmodel.js`，然后点击添加按钮创建该文件。Visual\
    \ Studio 将在项目中添加一个空的新文件并打开它以供编辑。添加清单 2-1 中所示的语句。\n\n***清单 2-1.** 视图模型类的初始内容*\n\
    \n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n\n\
    \    \"use strict\";\n\n    WinJS.Namespace.define(\"ViewModel.UserData\", {\n\
    \n        // 私有成员\n\n        _shoppingItems: [],\n\n        _preferredStores:\
    \ [],\n\n        // 公有成员\n\n        homeZipCode: null,\n\n        getStores: function\
    \ () {\n\n            return this._preferredStores;\n\n        },\n\n        addStore:\
    \ function (newStore) {\n\n            this._preferredStores.push(newStore);\n\
    \n        },\n\n        getItems: function () {\n\n            return this._shoppingItems;\n\
    \n        },\n\n        addItem: function (newName, newQuantity, newStore) {\n\
    \n            this._shoppingItems.push({\n\n                item: newName,\n\n\
    \                quantity: newQuantity,\n\n                store: newStore\n\n\
    \            });\n\n        }\n\n    });\n\n    ViewModel.UserData.homeZipCode\
    \ = \"NY 10118\";\n    ViewModel.UserData.addStore(\"Whole Foods\");\n    ViewModel.UserData.addStore(\"\
    Kroger\");\n\n    ViewModel.UserData.addStore(\"Costco\");\n\n    ViewModel.UserData.addStore(\"\
    Walmart\");\n\n    ViewModel.UserData.addItem(\"Apples\", 4, \"Whole Foods\");\n\
    \    ViewModel.UserData.addItem(\"Hotdogs\", 12, \"Costco\");\n    ViewModel.UserData.addItem(\"\
    Soda\", \"4 pack\", \"Costco\");\n\n})();\n```\n\n我稍后会回到视图模型，但首先我需要解释代码的其他部分及其代表的约定。对于后续的\
    \ JavaScript 文件我不会重复这样做，但在你开始 Windows 8 开发时，提供一些有用的背景信息是很有必要的。\n\n## 使用代码补全\n\n\
    Visual Studio 在编辑器中支持 JavaScript 代码补全，这使得编写代码更简单且不易出错。你必须使用引用元素将 JavaScript 文件引入代码补全的作用域，对于不在本地目录中的文件，如下所示：\n\
    \n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n```\n\n在引用元素前加上三个斜杠（`/`）字符会将引用引起\
    \ Visual Studio 的注意，并使 JavaScript 运行时将此语句视为注释。完成这些添加后，`viewmodel.js`文件就获得了对 WinJS\
    \ API 的代码补全支持。如果你希望获得 WinJS 的代码补全，需要将这些引用元素添加到你的每个 JavaScript 文件中。\n\n## 减少全局命名空间污染\n\
    \nJavaScript 中最严重的问题之一是变量名冲突。在函数外部定义的 JavaScript 变量是全局可用的，而由于有意义的变量名数量有限，不同代码区域尝试为不同目的使用相同变量名只是时间问题。全局变量被认为是*全局命名空间*的一部分，定义全局变量通常被称为*污染全局命名空间*。Windows\
    \ 8 JavaScript 文件遵循三种不同的约定来减少命名空间污染，你都应该采用。\n\n### 创建命名空间\n\nWinJS API 通过`Namespace`对象的`define`方法帮助减少全局命名空间污染：\n\
    \n```javascript\nWinJS.Namespace.define(\"ViewModel.UserData\", {\n\n//\n\n. .\
    \ .\n\n*此处定义了 `ViewModel.UserData` 对象的成员*\n\n. . .\n\n});\n```"
- fmt: "`define`方法的第一个参数是你要分配给对象的全局名称。在本例中，我指定了`ViewModel.UserData`，这创建了一个名为`ViewModel`的全局变量，该变量具有`UserData`属性。`UserData`属性的值是我作为第二个参数传递给`define`方法的对象，这实际上导出了该对象的成员，使它们可以通过`ViewModel`全局访问。\n\
    \n`UserData`。稍后我将数据应用到标记时，你会看到它的工作方式。\n\n使用`define`方法有两个原因，而不是自己处理。首先，`ViewModel`对象仅在尚不存在时才会被创建。\n\
    \n这意味着我可以通过多次调用`define`方法来轻松构建视图模型的能力。其理念是，我可以在单个全局命名空间对象下关联复杂的对象和函数，并减少变量名冲突的可能性。\n\
    \n**提示** 有一种更复杂的方法来处理这个问题，称为异步模块定义（AMD）。AMD技术通过允许JavaScript文件的消费者选择访问JavaScript库的变量名称，从而有效消除了全局变量名冲突。Windows\
    \ 8不直接支持AMD模块，但你可以使用支持AMD的脚本加载器，例如`require.js`。\n\n使用`define`方法的第二个原因是，它不会导出任何以下划线字符开头的属性，这是定义私有成员的常见JavaScript约定。这意味着当我导出`UserData`对象时，`_shoppingItems`和`_preferredStores`属性不会全局可用。\n\
    \n这是一个很好的技巧，它意味着全局对象的私有实现细节保持私有，但正如你将了解到的，它确实会与其他WinJS功能引起一些轻微的问题。\n\n### 使用自执行函数\n\
    \n第二个约定是在JavaScript文件中使用自执行函数。自执行函数的基本形式如下：\n```\n(function() {\n    // ... statements\
    \ go here ...\n})();\n```\n将函数包裹在圆括号中，然后立即添加另一对圆括号，会导致函数被定义并立即执行。\n\n你在函数内部定义的任何变量都限定在函数本身的作用域内，并且不会污染全局命名空间。当函数执行完成后，JavaScript运行时会自动清理任何未全局导出的变量。\n\
    \n### 使用严格模式\n\n`use strict`语句对使用JavaScript的方式施加了一些约束。\n\n其中一个约束是，在函数中隐式创建全局变量会变成错误。当你没有使用`var`关键字时，会隐式创建全局变量：\n\
    ```\nvar color1 = \"blue\"; // 正确 - 作用域限定在函数内\ncolor2 = \"red\"; // 错误 - 这是一个全局变量\n\
    ```\n如果你定义了一个隐式全局变量，JavaScript运行时会生成一个错误。使用严格模式完全是可选的，但这是一个好的实践，它会禁用一些更危险和奇怪的JavaScript行为。你可以通过阅读ECMAScript语言规范附录C（位于`www.ecma-international.org/publications/files/ECMA-ST/Ecma-262.pdf`）来获取严格模式强制执行变更的完整详细信息。\n\
    \n### 回到视图模型\n\n现在我已经解释了Windows 8 JavaScript文件的上下文和约定，我可以转向视图模型的定义。示例Windows 8应用程序的视图模型将很简单，这部分由`ViewModel.UserData`对象表示，将包含用户特定的数据：用户的家庭邮政编码、购物清单以及他们购买杂货的商店。\n\
    \n我定义了两个数组，用于保存购物清单上项目的详细信息以及用户偏好的商店：`_shoppingItems`和`_preferredStores`。这些属性不作为`ViewModel.UserData`对象的一部分导出，因为它们以下划线开头。为了提供对数据的访问，我定义了一组函数，这些函数返回数组数据并接受要添加到数组中的新项目。`homeZipCode`属性是公开的，并构成全局可用的`ViewModel.UserData`对象的一部分。你可以直接读取和更改此属性的值。\n\
    \n**注意**  `UserData`对象的形状和结构有点奇怪，因为我想展示WinJS API的不同方面。在实际项目中，你会以更一致的方式处理数据项。\n\
    \n为了在应用程序中有一些数据可供使用，我在自执行函数中添加了一些语句，用于定义邮政编码、添加一些商店，并在购物清单上放置一些简单的项目：\n```\nViewModel.UserData.homeZipCode\
    \ = \"NY 10118\";\nViewModel.UserData.addStore(\"Whole Foods\");\nViewModel.UserData.addStore(\"\
    Kroger\");\nViewModel.UserData.addStore(\"Costco\");\nViewModel.UserData.addStore(\"\
    Walmart\");\nViewModel.UserData.addItem(\"Apples\", 4, \"Whole Foods\");\nViewModel.UserData.addItem(\"\
    Hotdogs\", 12, \"Costco\");\nViewModel.UserData.addItem(\"Soda\", \"4 pack\",\
    \ \"Costco\");\n```\n## 使用数据绑定\n\n数据绑定是一种机制，通过它你可以将视图模型中的数据包含在向用户显示的HTML中。WinJS\
    \ API通过`WinJS.Binding`命名空间支持绑定。数据绑定是在Windows应用商店应用中使用视图模型的关键。如果你想构建可扩展且稳健的Windows\
    \ 8应用程序，我建议投入时间学习如何充分利用WinJS绑定功能。\n\n**提示** WinJS数据绑定不如一些更广泛使用的Web应用JavaScript库（如`Knockout.js`、`Backbone`和`Angular.js`）那样完整或灵活。你可以轻松地在Windows应用商店应用中使用这些库，但我建议花时间理解WinJS功能，因为它已集成到WinJS\
    \ API中包含的一些UI控件中。\n\n### 使用基本声明式绑定\n\n使用绑定的最简单方式是声明式地，这意味着你直接在HTML标记中包含视图模型数据的详细信息。清单2-2展示了如何在`default.html`中绑定到`homeZipCode`值。\n\
    \n**清单2-2.** 一个简单的声明式绑定\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
    utf-8\">\n    <title>MetroGrocer</title>\n    <!-- WinJS references -->\n    <link\
    \ href=\"//Microsoft.WinJS.1.0/css/ui-dark.css\" rel=\"stylesheet\">\n    <script\
    \ src=\"//Microsoft.WinJS.1.0/js/base.js\"></script>\n    <script src=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    ></script>\n    <!-- MetroGrocer references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\">\n    <script src=\"/js/viewmodel.js\"></script>\n    <script\
    \ src=\"/js/default.js\"></script>\n</head>\n<body>\n    <div id=\"contentGrid\"\
    >\n        <div id=\"leftContainer\" class=\"gridLeft\">\n            <h1 class=\"\
    win-type-xx-large\">Left Full Container</h1>\n            <div class=\"win-type-x-large\"\
    >\n                The zip code is:\n                <span data-win-bind=\"innerText:\
    \ UserData.homeZipCode\"></span>\n            </div>\n        </div>\n       \
    \ <div id=\"topRightContainer\" class=\"gridRight\">\n            <h1 class=\"\
    win-type-xx-large\">Top Right Container</h1>\n        </div>\n        <div id=\"\
    bottomRightContainer\" class=\"gridRight\">\n            <h1 class=\"win-type-xx-large\"\
    >Bottom Right Container</h1>\n        </div>\n    </div>\n</body>\n</html>\n```\n\
    \n我添加了一个`script`元素，将`viewmodel.js`引入HTML文档。然而，最重要的添加是`span`元素及其`data-win-bind`属性。"
  raw: 'The first argument to the define method is the global name that you want to
    assign to your object. In this case, I have specified ViewModel.UserData , which
    creates a global variable called ViewModel that has a UserData property. The value
    of the UserData property is the object that I pass as the second argument to the
    define method, effectively exporting the members of the object so that they are
    available globally via ViewModel.


    UserData . You’ll see how this works when I come to apply the data to markup shortly.


    There are a couple of reasons to use the define method, as opposed to handling
    this yourself. First, the ViewModel object will be created only if it doesn’t
    already exist.


    This means I can easily build up the capabilities of my view model through multiple
    calls to the define method. The idea is that I can associate complex objects and
    functions together under a single global namespace object and reduce the likelihood
    of a variable name collision.


    **T**


    ■ **ip** There is a more sophisticated approach to dealing with this issue, known
    as the *Asynchronous Module Definition* (AMD) . The AMD technique effectively
    eliminates global variable name collisions by allowing the consumer of a JavaScript
    file to pick the name of the variable through which a JavaScript library is accessed.
    Windows 8 doesn’t support AMD


    modules directly, but you can use an AMD-aware script loader such as require.js
    .


    The second reason to use the define method is because it doesn’t export any property
    that begins with an underscore character, which is a common JavaScript 24


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ DATA AND BINDINGS


    convention for defining private members. This means that when I export my UserData
    object, the _shoppingItems and _preferredStores properties are not globally available.


    This is a nice trick, and it means that the private implementation details of
    your global objects remain private, but, as you’ll learn, it does cause some mild
    issues with other WinJS features.


    Using Self-executing Functions


    The second convention is to use self-executing functions in your JavaScript files.
    The basic shape of a self-executing function looks like this: (function() {


    //


    . . . *statements go here* . . .


    })();


    Wrapping a function in parentheses and then adding another pair of parentheses
    immediately afterward causes the function to be defined and then executed right
    away.


    Any variables you define inside the function are scoped to the function itself
    and don’t pollute the global namespace. When the function has been executed, the
    JavaScript runtime automatically cleans up any variables that have not been exported
    globally.


    Using Strict Mode


    The use strict statement applies some constraints on the way you can use JavaScript.


    One constraint is that it becomes an error to implicitly create a global variable
    in a function. You implicitly create a global variable when you don’t use the
    var keyword: var color1 = "blue"; // OK - scope is local to function color2 =
    "red"; // Not OK - this is a global variable The JavaScript runtime will generate
    an error if you define a variable that is implicitly global. Using strict mode
    is entirely optional, but it is good practice, and it disables some of the more
    dangerous and odd JavaScript behaviors. You can get full details of the changes
    that strict mode enforces by reading Appendix C of the ECMAScript Language Specification
    at


    www.ecma-international.org/publications/files/ECMA-ST/Ecma-262.pdf


    .


    Returning to the View Model


    Now that I have explained the context and conventions of a Windows 8 JavaScript
    file, I can turn to the definition of the view model. The view model for the example
    Windows 8


    app will be simple, and this part of it, represented by the ViewModel.UserData
    object, will contain the data that is specific to the user: the user’s home zip
    code, their grocery list, and the stores from which they buy groceries.


    I defined two arrays that will hold details of the items on the shopping list
    and the user’s preferred stores, _shoppingItems and _preferredStores . These properties
    are not exported as part of the ViewModel.UserData object because they start with
    an 25


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ DATA AND BINDINGS


    underscore. To provide access to the data, I have defined a set of functions that
    return the array data and that accept new items to be added to the arrays. The
    homeZipCode property *is* public and forms part of the globally available ViewModel.UserData
    object. You can read and change the value of this property directly.


    **Note**


    ■


    The shape and structure of the UserData object are a little odd because I want
    to show different aspects of the WinJS API. In a real project, you would treat
    the data items in a more consistent manner.


    So that there is some data to work with in the app, I have added some statements
    to the self-executing function to define a zip code, add some stores, and put
    a few simple items on the shopping list:


    ViewModel.UserData.homeZipCode = "NY 10118"; ViewModel.UserData.addStore("Whole
    Foods"); ViewModel.UserData.addStore("Kroger");


    ViewModel.UserData.addStore("Costco");


    ViewModel.UserData.addStore("Walmart");


    ViewModel.UserData.addItem("Apples", 4, "Whole Foods"); ViewModel.UserData.addItem("Hotdogs",
    12, "Costco"); ViewModel.UserData.addItem("Soda", "4 pack", "Costco"); Using Data
    Binding


    *Data binding* is the mechanism by which you include data from your view model
    in the HTML that is displayed to the user. The WinJS API supports binding through
    the WinJS.


    Binding namespace. Data binding is the key to being able to use a view model in
    a Windows Store app. I recommend investing time to learn how to use the WinJS
    binding capabilities fully if you want to build scalable and robust Windows 8
    apps.


    **T**


    ■ **ip** WinJS data binding isn’t as complete or flexible as some of the more
    widely used web app JavaScript libraries such as Knockout.js, Backbone, and Angular.js.
    You can easily use these libraries in your Windows Store app, but my recommendation
    is to take the time to understand the WinJS functionality, because it is integrated
    into some of the UI controls contained in the WinJS API.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ DATA AND BINDINGS


    Using Basic Declarative Bindings


    The simplest way to use bindings is *declaratively* , meaning that you include
    details of the view model data directly in your HTML markup. Listing 2-2 shows
    how I can bind to the homeZipCode value in default.html.


    ***Listing 2-2.*** A Simple Declarative Binding


    <!DOCTYPE html>


