    Adding an AppBar


    The *AppBar* appears at the bottom of the screen when the user makes an upward
    swiping gesture or right-clicks with the mouse. The emphasis in the Windows 8
    app UI seems to be to have as few controls as is possible on the main layout and
    rely on the AppBar as the mechanism for any interaction that is not about the
    immediately available functionality.


    I could define the HTML for AppBars directly in default.html , but as I mentioned
    at the start of this chapter, WinJS supports dynamically loading and inserting
    fragments of HTML. To demonstrate this feature, I have created an html folder
