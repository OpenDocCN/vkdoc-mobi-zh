  trans: "\n你的应用可能已被挂起很长时间，尤其是当设备进入低电量状态（如睡眠模式）时。网络连接将被你之前通信的所有服务器关闭（这就是为什么你在收到挂起事件时应显式关闭它们的原因），并且在你的应用恢复运行时必须重新打开连接。你还需要刷新可能已过时的数据，这包括位置数据，因为设备可能在你应用被挂起期间移动过位置。\n\
    \n## 添加异步活动\n\n现在我已确认应用能够接收并响应恢复和挂起事件，接下来可以添加需要周期性任务的功能。在本示例中，我将使用地理定位服务来报告当前设备位置。为此，我创建了一个名为\
    \ `location.js` 的新 JavaScript 文件，其内容如清单 5-2 所示。\n\n**清单 5-2.** 追踪设备位置\n\n```\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/ui.js\" />\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n(function () {\n    \"use strict\";\n\n    var currentPromise;\n    var tracking\
    \ = false;\n\n    function trackLocation() {\n        currentPromise = new WinJS.Promise(function\
    \ (complete) {\n            var geo = new Windows.Devices.Geolocation.Geolocator();\n\
    \            if (geo) {\n                geo.getGeopositionAsync().then(function\
    \ (position) {\n                    WinJS.xhr({\n                        url:\
    \ \"http://nominatim.openstreetmap.org\"\n                            + \"/reverse?format=json&lat=\"\
    \n                            + position.coordinate.latitude\n               \
    \             + \"&lon=\" + position.coordinate.longitude\n                  \
    \  }).then(function (data) {\n                        var dataObject = JSON.parse(data.response);\n\
    \                        if (dataObject.address.road) {\n                    \
    \        var date = new Date();\n                            var time = date.getHours()\
    \ + \":\" + date.getMinutes()\n                                + \":\" + date.getSeconds();\n\
    \                            document.getElementById(\"geo\").innerText =\n  \
    \                              dataObject.address.road + \" (\" + time + \")\"\
    ;\n                        }\n                    });\n                });\n \
    \           }\n            complete();\n        });\n\n        currentPromise.then(function\
    \ () {\n            if (tracking) {\n                setTimeout(trackLocation,\
    \ 5000);\n            }\n        });\n    }\n\n    WinJS.Namespace.define(\"Location\"\
    , {\n        startTracking: function () {\n            tracking = true;\n    \
    \        trackLocation();\n        },\n        stopTracking: function () {\n \
    \           tracking = false;\n            return currentPromise;\n        }\n\
    \    });\n})();\n```\n\n## 使用位置追踪\n\nWindows 8 的地理定位服务可通过 `Windows.Devices.Geolocation.Geolocator`\
    \ 对象使用。你可以订阅位置信息变化时的事件，但我想演示一个重复的后台任务，因此使用了 `getGeopositionAsync` 方法，该方法会生成当前位置的快照。这是一个异步操作，因此\
    \ `getGeopositionAsync` 方法返回一个 `WinJS.Promise` 对象，该对象在位置信息可用时被完成。\n\n获取位置数据后，我使用\
    \ `WinJS.xhr` 对象进行 Ajax 调用，该对象是标准浏览器 `XmlHttpRequest` 对象的 `Promise` 封装。我的 Ajax\
    \ 请求发送到反向地理编码服务，这样我就能将地理定位服务提供的纬度和经度信息转换为街道地址。地理编码服务返回 JSON 字符串，我将其解析为 JavaScript\
    \ 对象，从中读取街道名称，以便连同显示上次位置更新的时间戳一起展示给用户。\n\n**提示：** 我使用了 OpenStreetMap 的地理编码服务，因为它不需要唯一的账户令牌。这意味着你无需创建\
    \ Google Maps 或 Bing Maps 账户即可运行本示例。\n\n我在 `default.html` 文件中添加了一些简单元素，以便向用户显示位置信息。你可以在清单\
    \ 5-3 中看到这些添加内容。\n\n**清单 5-3.** 向 `default.html` 添加元素以显示位置信息\n\n```\n...\n<script\
    \ src=\"/js/tiles.js\"></script>\n<script src=\"/js/location.js\"></script>\n\
    <script src=\"/js/default.js\"></script>\n</head>\n<body>\n<div class=\"midtitle\"\
    >\n    <h2>你的当前位置是：<span id=\"geo\"></span></h2>\n</div>\n<div id=\"contentGrid\"\
    >\n```\n"
- fmt: "# Grocery List\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER\
    \ 5 ■ LIFE-CYCLE EVENTS\n\n**Tip** One of the pleasures of working with Windows\
    \ 8 using HTML5 and JavaScript is that you can choose between the HTML5 and Windows\
    \ APIs for some key areas of functionality, including geolocation. I have used\
    \ the Windows API in this example, but the HTML5 equivalent would have worked\
    \ just as well.\n\nTo manage the layout of the new elements, I have added new\
    \ properties to the `/css/default.css` file, as shown in Listing 5-4.\n\n***Listing\
    \ 5-4.*** Adding New Properties to the `default.css` File\n\n```css\ndiv.midtitle\
    \ {\n  text-align: center;\n  margin: 20px;\n  padding-bottom: 5px;\n  border-bottom:\
    \ thin solid white;\n}\n```\n\n## Controlling the Task\n\nI am describing the\
    \ geolocation and Ajax requests only in passing because the point of this example\
    \ is the creation of a periodically repeating background task. It doesn’t really\
    \ matter what the task does. The most important part of the `location.js` file\
    \ is the `startTracking` and `stopTracking` functions. When I call the `startTracking`\
    \ function, I create a new `Promise` object that represents the overall background\
    \ task.\n\n**Tip** I have used the `Promise` object as a wrapper around the two\
    \ `Promise` objects representing the request for location data and the subsequent\
    \ Ajax request. When both my inner `Promise` objects have finished, I call the\
    \ `complete` function, which is passed to the callback function I used when I\
    \ created the `Promise` object. See the API reference for more information about\
    \ the `WinJS.Promise` object.\n\nEach time the request completes, I create another\
    \ `Promise` encapsulating a new request, repeating as long as the `tracking` variable\
    \ is `true`. I start a new request cycle every five seconds.\n\nWhen I call the\
    \ `stopTracking` function, I set the `tracking` variable to `false` and return\
    \ the `Promise` representing the current request cycle. The `Promise` I return\
    \ represents a request cycle in one of two states. The first state is when the\
    \ request is active, meaning that I am waiting for the geolocation data or the\
    \ Ajax request to complete, or I am applying an update to the DOM. If you call\
    \ the `then` method on an active `Promise`, the callback function won’t be executed\
    \ until the cycle is complete. The second state is when the request is complete\
    \ and I am in the lull before the next cycle starts. Calling the `then` method\
    \ on a completed `Promise` will cause the callback function to be executed without\
    \ delay.\n\nWith this in mind, I am able to integrate my background task into\
    \ `default.js` using the handlers for the different life-cycle events, as shown\
    \ in Listing 5-5.\n\n***Listing 5-5.*** Using the Life-Cycle Events to Control\
    \ a Background Task\n\n```javascript\n(function () {\n  \"use strict\";\n\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    activated\", performInitialSetup);\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    resuming\", performResume);\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    suspending\", performSuspend);\n\n  function performInitialSetup(e) {\n    WinJS.UI.processAll().then(function\
    \ () {\n      UI.List.displayListItems();\n      UI.List.setupListEvents();\n\
    \      UI.AppBar.setupButtons();\n      UI.Flyouts.setupAddItemFlyout();\n   \
    \   ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n      \
    \  var targetElement = document.getElementById(\"itemDetailTarget\");\n      \
    \  WinJS.Utilities.empty(targetElement);\n        var url = newValue == -1 ? \"\
    /html/noSelection.html\"\n                                  : \"/pages/itemDetail/itemDetail.html\"\
    ;\n        WinJS.UI.Pages.render(url, targetElement);\n      });\n      WinJS.UI.Pages.render(\"\
    /html/storeDetail.html\", document.getElementById(\"storeDetailTarget\"));\n \
    \     //Tiles.sendTileUpdate();\n      //Tiles.sendBadgeUpdate();\n      Location.startTracking();\n\
    \    });\n  }\n\n  function performResume(e) {\n    Location.startTracking();\n\
    \  }\n\n  function performSuspend(e) {\n    var promise = Location.stopTracking();\n\
    \    if (promise) {\n      var deferral = e.suspendingOperation.getDeferral();\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
