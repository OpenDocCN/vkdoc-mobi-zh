    Implementing the Activated Event Handler


    As I mentioned earlier, the activated event is used by Windows to signal a range
    of instructions. Previously, I treated all activated events as an instruction
    to launch the app, but in order to support the search contract, I have to check
    the activated event to figure out what my app is being asked to do. You can see
    how I have updated my handler for the activated event in the /js/default.js file
    in Listing 5-8.


    ***Listing 5-8.*** Determining the Activation Detail in an Event (function ()
    {


