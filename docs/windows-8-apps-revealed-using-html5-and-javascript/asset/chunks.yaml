  trans: "\n# 数据与绑定\n\n在 Windows 应用商店应用中使用 Internet Explorer 专属特性时，我经历了一段时间才得心应手，但其中有些特性确实能节省大量时间，而我自己也一直在使用这个特定功能。不过需要提醒一句：如果\
    \ HTML 中有多个元素的 `id` 属性值相同，那么对应全局变量的值将是一个包含所有匹配元素的数组。\n\n添加处理函数的效果是，用户可以在输入元素中输入新邮政编码，点击按钮后，视图模型中的邮政编码值就会更新。由于这个更新作用于可观察属性，`span`\
    \ 元素的内容会通过绑定自动更新以显示新值，如图 2-2 所示。\n\n**图 2-2.** *更新视图模型中的可观察值*\n\n**提示** 如果你使用过\
    \ Knockout.js 等 Web 应用视图模型库，可能习惯通过调用方法来更新视图模型值，例如：`ViewModel.UserData.homeZipCode(myNewValue)`。Knockout\
    \ 使用这种方法是为了兼容不支持 getter 和 setter 的旧版浏览器（包括多数旧版 Internet Explorer）。而用于显示 HTML5\
    \ Windows 应用商店应用的 Internet Explorer 10 *确实* 支持 getter 和 setter，这意味着你可以像示例中那样直接赋值。\n\
    \n## 创建可观察数组\n\n让数组变得可观察需要多费些功夫。首先，必须使用 `WinJS.Binding.List` 类为要操作的数组创建一个包装器。\n\
    \n清单 2-9 展示了在 `viewmodel.js` 文件中将 `List` 类应用于我的视图模型。\n\n**清单 2-9.** *使用 List 类创建可观察数组*\n\
    \n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n  \
    \  \"use strict\";\n\n    var shoppingItemsList = new WinJS.Binding.List();\n\
    \    var preferredStoresList = new WinJS.Binding.List();\n\n    WinJS.Namespace.define(\"\
    ViewModel\", {\n        UserData: WinJS.Binding.as({\n            homeZipCode:\
    \ null,\n            getStores: function () {\n                return preferredStoresList;\n\
    \            },\n            addStore: function (newStore) {\n               \
    \ preferredStoresList.push(newStore);\n            },\n            getItems: function\
    \ () {\n                return shoppingItemsList;\n            },\n          \
    \  addItem: function (newName, newQuantity, newStore) {\n                shoppingItemsList.push({\n\
    \                    item: newName,\n                    quantity: newQuantity,\n\
    \                    store: newStore\n                });\n            }\n   \
    \     })\n    });\n\n    // 为简洁起见，省略了添加测试数据的语句\n})();\n```\n\n创建 `List` 很简单，但如果试图在已传递给\
    \ `WinJS.Binding.as` 方法的对象作用域内创建它，就会遇到问题（因为对特殊变量 `this` 的假设存在冲突）。为避免此问题，应像示例中那样在视图模型外部定义列表。\n\
    \n使用 `List` 对象与使用数组并不相同。最重要的区别在于，不能使用数组索引器来读取或写入数据值。相反，必须使用 `getAt` 和 `setAt`\
    \ 方法。`List` 支持其他数组成员，如 `push` 和 `pop`，并且还提供了一些用于排序和投影 `List` 对象内容的有用附加功能。\n\n\
    另一个重要区别是，不能通过声明式绑定访问数组值。相反，必须使用 JavaScript 在 DOM 中设置值，并处理 `List` 对象发出的事件以保持这些值的最新状态。清单\
    \ 2-10 展示了 `default.html` 文件中的元素，这些元素显示视图模型列表中某一列表的项目数量，以及一些用于添加和删除项目的按钮。\n\n\
