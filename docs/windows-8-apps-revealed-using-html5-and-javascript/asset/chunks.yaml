    Creating a List is simple, but you will encounter problems if you try to do so
    within the scope of an object that has passed to the WinJS.Binding.as method (there
    is a clash of assumptions over the value of the special this variable). To avoid
    this problem, define your lists outside of the view model, as I have done in the
    example.


    Using a List object isn’t the same as using an array. The most important difference
    is that you cannot use array indexers to read or write data values. Instead, you
    must use the getAt and setAt methods. Other array members, such as push and pop
    , are supported by List , and there are some useful additions for sorting and
    projecting the contents of List objects.


    Another important difference is that you cannot access array values using declarative
    bindings. Instead, you must set values in the DOM using JavaScript and handle
    events emitted by the List object to keep those values up-to-date. Listing 2-10
