    in practice, users don’t generally pay attention to these declarations until an
    app does something that surprises them.)'
  trans: "\n# 图 3-5：允许用户编辑购物清单项目的详细信息\n\n页面回调中的代码会在该页面*每次*显示时执行。你需要确保代码不会对页面元素的状态做出假设，除非它们已被加载并添加到主布局中。由于页面是在主布局的上下文中加载的，你可以安全地使用主\
    \ HTML 文档中 JavaScript 代码定义的函数。在我的示例中，这包括视图模型。同样，你的元素将受到主文档定义的 CSS 样式影响。\n\n**提示**\
    \ 请注意，我在 `select` 元素上使用了 `size` 属性，以便一次性显示多个选项。这是 Windows 8 中属于主应用程序布局的 `select`\
    \ 元素的约定。然而，对于浮出控件（例如我在本章前面创建的），约定是使用单行 `select`，它会打开一个下拉选项列表。\n\n## 显示外部内容\n\n\
    WinJS 页面功能仅适用于属于应用程序的内容。如果你使用 `WinJS.UI.Pages.render` 方法请求外部 URL，将会产生错误。相反，如果你想显示外部\
    \ HTML 文档，则必须使用 `iframe` 元素，但如果你希望将应用程序分解为可管理的小块以获取益处，可以将此元素与 WinJS 页面功能结合使用。为了演示这一点，我在\
    \ `html` 目录中创建了一个名为 `storeDetail.html` 的新文件。清单 3-20 显示了此文件的内容。\n\n### 清单 3-20：`storeDetail.html`\
    \ 文件\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<title></title>\n</head>\n<body>\n\
    <div id=\"noStoreSelectionContainer\" class=\"win-type-x-large\">\n<p>在列表中选择一个项目</p>\n\
    </div>\n<div id=\"storeSelectionContainer\">\n<iframe id=\"storeFrame\" seamless\
    \ sandbox=\"\"></iframe>\n</div>\n</body>\n</html>\n```\n\n这是一个简单的文档，充当 `iframe`\
    \ 元素和占位元素（当未选择列表项时显示）的包装器。当然，最重要的元素是 `iframe`。`seamless` 属性指定不应在 `iframe` 周围绘制边框，而将\
    \ `sandbox` 属性设置为空字符串可防止嵌入的内容运行任何脚本、导航到新页面以及提交表单。我将使用 `iframe` 显示与所选项目关联的杂货店主页。这些页面包含各种跟踪脚本和一些极易出错的代码，我希望我的用户不必处理这些。\n\
    \n## 添加回调\n\n我将采用与加载片段时相同的方法来定义回调。我已将回调函数添加到 `pages.js` 文件中，你可以在清单 3-21 中看到这些添加的内容。\n\
    \n### 清单 3-21：为页面定义回调\n\n```javascript\n/// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\"\
    \ />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\" />\n(function ()\
    \ {\n    \"use strict\";\n    WinJS.UI.Pages.define(\"/html/noselection.html\"\
    , {\n        ready: function (targetElement) {\n            numberCount.innerText\
    \ = ViewModel.UserData.getItems().length;\n        }\n    });\n    WinJS.UI.Pages.define(\"\
    /html/storeDetail.html\", {\n        ready: function (targetElement) {\n     \
    \       ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n  \
    \              noStoreSelectionContainer.style.display =\n                   \
    \ (newValue != -1 ? \"none\" : \"\");\n                storeSelectionContainer.style.display\
    \ =\n                    (newValue == -1 ? \"none\" : \"\");\n               \
    \ if (newValue != -1) {\n                    var store = ViewModel.UserData.getItems()\n\
    \                        .getAt(newValue).store;\n                    var url\
    \ = \"http://\" + store.replace(\" \", \"\") + \".com\";\n                   \
    \ document.getElementById(\"storeFrame\").src = url;\n                }\n    \
    \        });\n        }\n    })\n})();\n```\n\n在此页面的 `ready` 回调中，我绑定到 `selectedItemIndex`\
    \ 属性。当用户选择一个项目时，我使用 `iframe` 显示相关商店的主页。更改 `style.display` 属性的值让我可以在占位元素和当前商店的详细信息之间切换。我根据商店名称创建\
    \ URL 的技术非常基础。我只是删除所有空格，并在名称末尾添加 `.com`。这对于实际项目来说是不够的，但对于我的简单示例来说已经足够了。\n\n**注意**\
    \ 请注意，我使用 `document.getElementById` 方法获取 `iframe` 元素。如果你通过全局变量引用该元素，则在尝试设置 `src`\
    \ 属性时会引发安全异常。如果你通过 DOM API 获取该元素，则不会出现此问题。\n\n## 显示页面\n\n你必须避免使用 `ready` 回调为不总是显示的页面设置绑定，因为\
    \ JavaScript 代码每次加载页面时都会执行。随着时间的推移，你最终会得到一系列执行相同任务的绑定。WinJS 并没有提供在页面内容从布局中移除时进行清理的机制，因此最好的方法是将绑定移到应用程序的主\
    \ JavaScript 文件中。\n\n对于 `storeDetails.html` 页面来说，这不是问题，因为它只加载一次，并且永远不会从文档中移除。在这种情况下，我使用\
    \ WinJS 页面功能只是为了将我的 Windows 8 应用分解为独立的模块，以便于开发和维护。如你在清单 3-22 中所见，我只显示 `storeDetails.html`\
    \ 页面一次，这意味着我可以预期回调中的代码也只会执行一次。\n\n### 清单 3-22：显示页面\n\n```javascript\n...\nfunction\
    \ performInitialSetup(e) {\n    WinJS.UI.processAll().then(function () {\n   \
    \     UI.List.displayListItems();\n        UI.List.setupListEvents();\n      \
    \  UI.AppBar.setupButtons();\n        UI.Flyouts.setupAddItemFlyout();\n     \
    \   ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {\n      \
    \      WinJS.Utilities.empty(itemDetailTarget)\n            var url = newValue\
    \ == -1 ? \"/html/noSelection.html\" :\n                \"/pages/itemDetail/itemDetail.html\"\
    \n            WinJS.UI.Pages.render(url, itemDetailTarget);\n        });\n   \
    \     WinJS.UI.Pages.render(\"/html/storeDetail.html\", storeDetailTarget);\n\
    \    });\n}\n...\n```\n\n最后一步是更新 `default.html` 中的布局元素，如下所示：\n\n```html\n...\n\
    <div id=\"bottomRightContainer\" class=\"gridRight\">\n    <h1 class=\"win-type-xx-large\"\
    >商店详情</h1>\n    <div id=\"storeDetailTarget\"></div>\n</div>\n...\n```\n\n最终结果是，选择主列表中的某个项目将显示相关商店的主页，如图\
    \ 3-6 所示。\n\n![图 3-6](img/index-84_1.jpg)\n\n### 图 3-6：显示外部内容\n\n**警告** 我在本例中使用的网站内容经常变化，并且我发现有时会有一段时间内容无法在应用中显示，因为网页上的\
    \ JavaScript 代码干扰了 Windows 应用的安全策略。如果是这种情况，你可以通过使用“更安全”的网站来查看效果。我发现 Apress.com\
    \ 是一个很好的替代品。\n\n## 检查清单权限\n\nWindows 8 应用受到安全沙盒的限制。要获得对外部内容的访问权限，你的应用必须在其清单文件中获得一个或多个权限。为确保你拥有所需的访问权限，请从解决方案资源管理器打开\
    \ `package.appxmanifest` 文件，然后转到“功能”选项卡。\n\n你将看到可以请求的功能列表。当用户在 Windows 8 商店中查看你的应用时，会向他们显示这些信息，以便他们能够就授予你应用哪些访问权限做出明智的选择。（嗯，理论上是这样；在实践中，用户通常不会关注这些声明，直到应用做出一些让他们感到意外的事情。）\n"
- fmt: '# The Internet (Client) Capability


    The `Internet (Client)` capability is checked by default, but you may also require
    the `Private Networks (Client & Server)` capability, depending on where your content
    is coming from. Check the capabilities you require and save the manifest. I’ll
    return to the manifest in Chapter 4 to configure some of the other settings.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 3: Application Controls


    ## Summary


    In this chapter, I introduced three important structural features for a Windows
    8 app: `AppBars`, `Flyouts`, and the navigation model. These facilities start
    to bridge the gap between a generic web app and the tools for decomposing your
    application into manageable chunks.


    You don’t have to use `AppBars` and `Flyouts`, but your application won’t fit
    into the Windows 8 model if you don’t. Part of the attraction of Windows 8 is
    to be able to use your HTML5 and JavaScript skills to create Windows applications.
    Creating an app that doesn’t follow the Windows 8 conventions is to miss the opportunity
    that Windows 8 presents to the web programmer.


    Equally, you could elect to build your Windows 8 app using a single HTML document.
    But, once again, this would be a missed opportunity. The constraints that drive
    web apps toward content consolidation don’t exist for Windows 8 apps, which means
    that the ease of development, testing, and maintenance that come from decomposing
    your content and code are worth exploring. The `HTMLControl` and pages features
    are key enablers to this development style.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 4: Layouts and Tiles


    In this chapter, I describe two of the features that allow an app to fit into
    the wider user experience presented by Windows 8. The first of these features
    is the way that apps can be *snapped* and *filled* so that two apps can be viewed
    side by side. I show you how to adapt when your app is placed into one of these
    layouts and how to change the layout when your interactions don’t fit inside the
    layout constraints.


    The second feature is the Windows 8 *tile* model. Tiles are at the heart of the
    Windows 8 replacement for the Start screen. At their simplest, they are static
    buttons that can be used to launch your app, but with a little work they can present
    the user with an invaluable snapshot of the state of your application, allowing
    the user to get an overview without having to run the application itself. In this
    chapter, I show you how to create *live* *tiles* by applying updates and by using
    a related feature, *badges*. Table 4-1 provides the summary for this chapter.


    **Table 4-1.** Chapter Summary


    | Problem | Solution | Listing |

    |---------|----------|---------|

    | Adapt an app’s layout when it has been placed into a snapped or filled layout.
    | Use CSS media queries with Windows 8–specific properties. | 1, 2 |

    | Detect changes in an app’s layout in code. | Use the `Windows.UI.ViewManagement`
    namespace. | 3, 4 |

    | Break out from the snapped view. | Call the `tryUnsnap()` method. | 5–7 |

    | Update for a tile. | Use an XML tile template and use the `Windows.UI.Notifications`
    namespace. | 8–11 |

    | Update square and wide tiles. | Populate and combine two XML tile templates.
    | 12, 13 |

    | Apply a badge to a tile. | Populate and apply an XML badge template. | 14–16
    |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Dealing with Windows 8 Orientations and Views


    Windows 8 apps support a range of *orientations* and *layouts* to respond to changes
    in the device configuration. Orientation changes occur when the device is rotated,
    which is a common occurrence when devices are equipped with an orientation sensor.
    This includes most tablets and some laptop and hybrid devices. There are two orientations:
    *landscape* and *portrait*.


    In addition, Windows 8 apps support *views*. The default view is *full-screen*
    and this is what you have seen so far with the examples in the book. The app occupies
    the entire screen, and no other apps are visible. Windows 8 apps can also be *snapped*
    into a 320-pixel strip of the screen so that the user can see two applications
    at once. The other app, which occupies all of the display aside from those 320
    pixels, is said to be *filled*.


    Ensuring that your application can adapt to different orientations and views is
    essential to providing the full Windows 8 experience to your users.


    **Note** The user is responsible for changing the orientation and view, and the
    app is responsible for adapting. This means you can’t programmatically enter a
    new orientation or force your app into the filled or snapped view. Equally, you
    can’t write a Windows 8 app that refuses to enter the filled or snapped views.
    You can elect not to present the user with any useful functionality in certain
    views, but this will severely limit the value your app offers, and I recommend
    against this approach.


    ## Simulating Orientation and View Changes


    The best place to start with orientations and view changes is to learn how to
    create them in the Visual Studio simulator. This lets you test the way that your
    app responds without needing a device equipped with an orientation sensor (which,
    for obvious reasons, are rarely found on development PCs).


    ### Simulating Orientation Changes


    The Visual Studio simulator has two dedicated buttons for simulating orientation
    changes, which I have shown in Figure 4-1. Clicking these buttons simulates the
    effect of rotating the device by 90 degrees in the direction shown by the button
    icon.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-88_1.jpg)


    **Figure 4-1.** The Visual Studio simulator orientation buttons


    The figure also shows what happens to the layout of the example app when the device
    is rotated to the portrait orientation. As you can see, the sizes that I allocated
    to the various elements in the HTML cumulatively occupy more space than is available
    in this orientation, which causes parts of the app to overlap.


    ### Simulating Views Changes


    The snapped and filled views are available only in the landscape orientation and
    when the horizontal resolution of the display is 1,366 pixels or greater. This
    means that the first step in changing the view is to orient the simulator to landscape
    and ensure that the resolution is set appropriately (you can change the resolution
    of the simulator using the button immediately below those used for orientation
    changes).


    The simplest way to change the view is to press `Win+.` (the Windows and period
    keys). This will activate the snapped view, where the app is displayed in the
    small 320-pixel strip, as shown in Figure 4-2. My example app doesn’t yet adapt
    to view changes, and you can see the effect of trying to fit all of the HTML elements
    in such a small space.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-89_1.jpg)


    ![](index-89_2.jpg)


    **Figure 4-2.** The example app shown in the snapped view


    Windows displays a divider bar between the two apps that are displayed. Drag the
    bar to move the app into the filled view, which I have shown in Figure 4-3.


    **Figure 4-3.** The example app shown in the filled view


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The example app shows pretty common default behavior. The loss of the 320 pixels
    in the filled view doesn’t have much of an effect, especially on larger-resolution
    screens. As you can see in Figure 4-3, the app layout has coped reasonably well,
    and while the content of some elements has been wrapped across two lines, the
    basic essence of the app is preserved.


    By contrast, the snapped view has rendered the app entirely useless; 320 pixels
    isn’t a lot of space when you have been writing HTML and CSS that assumes you
    have a lot more room to cope with.'
