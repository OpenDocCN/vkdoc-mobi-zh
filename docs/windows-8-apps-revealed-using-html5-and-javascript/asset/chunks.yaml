  trans: "\n# 采购清单\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章\
    \ ■ 生命周期事件\n\n**提示** 使用 HTML5 和 JavaScript 开发 Windows 8 的一个乐趣在于，某些关键功能领域（包括地理位置服务）你可以选择使用\
    \ HTML5 API 还是 Windows API。本示例中我使用了 Windows API，但采用 HTML5 等效 API 同样能完美运行。\n\n\
    为了管理新元素的布局，我在`/css/default.css`文件中新增了属性，如代码清单 5-4 所示。\n\n***代码清单 5-4*** 向`default.css`文件添加新属性\n\
    \n```css\ndiv.midtitle {\n  text-align: center;\n  margin: 20px;\n  padding-bottom:\
    \ 5px;\n  border-bottom: thin solid white;\n}\n```\n\n## 控制任务\n\n对于地理定位和 Ajax\
    \ 请求，这里仅作简要说明，因为本示例的重点是创建周期性重复的后台任务。任务的具体功能并不重要。`location.js`文件中最重要的部分是`startTracking`和`stopTracking`函数。当调用`startTracking`函数时，我会创建一个新的`Promise`对象来代表整个后台任务。\n\
    \n**提示** 我使用`Promise`对象作为两个内部`Promise`对象的包装器，这两个内部`Promise`分别代表位置数据请求和后续的 Ajax\
    \ 请求。当两个内部`Promise`对象都完成后，我会调用`complete`函数，该函数作为回调参数传入我创建`Promise`对象时所使用的回调函数。关于`WinJS.Promise`对象的更多信息，请参阅\
    \ API 参考文档。\n\n每次请求完成后，我会创建另一个封装新请求的`Promise`，只要`tracking`变量为`true`，就会重复此过程。我每五秒启动一个新的请求周期。\n\
    \n当调用`stopTracking`函数时，我将`tracking`变量设置为`false`，并返回代表当前请求周期的`Promise`。我返回的`Promise`表示两种状态之一的请求周期：第一种状态是请求处于活动状态，意味着我正在等待地理定位数据或\
    \ Ajax 请求完成，或者在向 DOM 应用更新。如果对活动`Promise`调用`then`方法，回调函数将直到周期完成后才会执行。第二种状态是请求已完成，并且在下一个周期开始前处于间歇期。对已完成的`Promise`调用`then`方法将导致回调函数立即执行。\n\
    \n基于此，我能够利用不同生命周期事件的处理程序将后台任务集成到`default.js`中，如代码清单 5-5 所示。\n\n***代码清单 5-5***\
    \ 使用生命周期事件控制后台任务\n\n```javascript\n(function () {\n  \"use strict\";\n\n  Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
