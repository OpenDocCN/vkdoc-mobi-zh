    Windows.UI.WebUI.WebUIApplication


    and resuming events.


    object.


    Create a recurring


    Use the WinJS.Promise object as a wrapper


    2–4


    background task.


    around other asynchronous activities.


    Request more time before


    Call the suspendingOperation.getDeferral


    your app is suspended.


    method on the event passed to your


    suspending handler function.


    Implement a contract.


    Declare the contract in the manifest


    6–8


    and respond to the type information


    in the activation event.


    Dealing with the App Life Cycle


    In Chapter 1 , I showed you the skeletal code that Visual Studio placed into the
    default.js file to give me a jump-start with my example project. This code handles
    the Windows 8 application *life-cycle events* , ensuring that I can respond appropriately
    to the signals that the operating system is sending me. There are three key stages
    in the life of a Windows 8 app.


    The first stage, *activation* , occurs when Windows wants your app to perform
    some task. The most common task is when Windows wants to launch your app and display
    it to the user, but there are other tasks as well, and you’ll see one example
    when I show you how to implement a *contract* later in this chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ LIFE-CYCLE EVENTS


    Users don’t close Windows 8 apps; they just move to another application and leave
    Windows to sort things out. This is why there are no close buttons or menu bars
    on a Windows 8 UI. A Windows 8 app that is no longer required is moved into the
    second stage and is *suspended* . While suspended, no execution of the app code
    takes place, and there is no interaction with the user.


    If the user switches back to a suspended app, then the third stage occurs: the
    application is *resumed* . The app is displayed to the user once execution continues.


    Suspended applications are not always restored. If the device is low on memory,
    for example, Windows may simply *terminate* a suspended app.


