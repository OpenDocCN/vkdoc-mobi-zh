    ViewModel.UserData.addItem("Ice Cream", 1, "Vanilla", "Walmart");


    } else {


    ViewModel.UserData.getItems().pop();


    }


    });


    var setValue = function () {


    var list = ViewModel.UserData.getItems();


    listInfo.innerText = list.getAt(list.length - 1).item;


    };


    var eventTypes = ["itemchanged", "iteminserted",


    "itemmoved", "itemremoved"];


    eventTypes.forEach(function (type) {


    ViewModel.UserData.getItems().addEventListener(type, setValue);


    });


    setValue();


    }

    ```


    . . .


    `List` 对象定义了四个在数据项发生变化时触发的事件。这些事件包括 `itemchanged`、`iteminserted`、`itemmoved` 和
    `itemremoved`。`List` 对象定义了一个 `addEventListener` 方法，用于注册这些事件的事件处理函数。在清单中，我为所有四个事件注册了同一个处理函数；该函数更新
    `span` 元素的 `innerText` 属性，以显示 `List` 中第一个元素的 `item` 属性。


    两个按钮元素分别用于向 `List` 中添加和移除项目。我将 `addItem` 方法保留在视图模型中，因为我倾向于使用这样的小型辅助函数来使数据对象的结构更加一致，但我也可以直接调用
    `List` 对象的 `push` 方法来达到同样的效果。结果如图 2-3 所示。


    **图 2-3.** 在 HTML 元素中显示 `List` 对象的详细信息 37


