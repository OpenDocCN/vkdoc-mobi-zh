    \n问题在于，与搜索相关的`activated`事件可能有两种含义。如果我的应用已经在运行，那么搜索`activated`事件仅意味着“执行此搜索”。但如果我的应用尚未运行，则该事件意味着“启动应用*并*执行此搜索”。\n\
    \n弄清我正在处理哪种含义非常重要。即使应用在用户发起搜索时未运行，您也只会收到一个`activated`事件。如果我的应用已在运行，而我却调用了`performInitialSetup`，则会创建重复的绑定和事件处理程序。这会导致各种奇怪的行为，但最明显的问题是布局中的右列会包含两套内容，因为最终调用了太多次`WinJS.Pages.render`方法。相比之下，如果我的应用未在运行，而我却未能调用`performInitialSetup`，那么将没有任何绑定和事件处理程序，也就不会显示任何内容。\n\
    \n我需要小心操作：当我的应用之前未运行时调用`performInitialSetup`函数，而如果它已在运行则避免调用该函数。我通过查看传递给`activated`处理函数的事件对象的`previousExecutionState`属性来实现这一点，该属性报告了我的应用在`activated`事件发送前一刻的执行状态。此属性的可能值范围由`Windows.ApplicationModel.Activation.ApplicationExecutionState`枚举定义，但为了解决这个问题，我唯一关心的值是`suspended`，它告诉我应用设置已经执行过：\n\
    \n```javascript\nif (e.previousExecutionState != actNS.ApplicationExecutionState.suspended)\
    \ {\n    performInitialSetup(e);\n}\n```\n\n## 测试搜索合约\n\n要测试此合约，请启动您的应用。无论是否使用调试器启动，以及启动后是退出还是挂起应用都无关紧要。关键是要确保应用出现在模拟器上。\n\
    \n接下来，切换到“开始”屏幕。如果您的应用仍在运行，它将被切换到后台，并在几秒钟后挂起。要开始搜索，只需开始输入。您希望搜索可以匹配的内容，因此请输入`hot`（这样您的搜索将匹配购物清单中的热狗项目）。\n\
    \n当您输入时，Windows 会自动开始标准搜索，查找名称中包含`hot`的应用。您将看到类似于图 5-10 的画面，因为默认的 Windows 8 安装中没有此类应用。\n\
    \n**图 5-10.** 发起搜索\n"
- fmt: "# Markdown 排版处理\n\nTo switch to an application-specific search, click the\
    \ app’s name on the list below the search box. This will send the `search activated`\
    \ event to the app. For my example app, I have clicked the `MetroGrocer` item\
    \ in the list, and the `activated` event triggers my simple search handler, the\
    \ result of which is shown in Figure 5-11 .\n\n**Figure 5-11.** *Performing an\
    \ application-specific search*\n\n> **Tip** If you start a search from the charms\
    \ bar while your app is being displayed, then Windows will automatically select\
    \ it from the list, focusing the initial search on your app.\n\n## Summary\n\n\
    In this chapter, I showed you how to use the life-cycle events to respond to the\
    \ way in which Windows manages apps. I described each of the key events and showed\
    \ you how to use the app layout to ensure that your app is receiving and processing\
    \ them correctly.\n\nParticular care must be taken to cleanly wrap up background\
    \ tasks when an app is being suspended, and I showed you how to get control of\
    \ this process by requesting a suspension deferral, allowing an extra few seconds\
    \ to minimize the risk of potential errors or stale data when the app is resumed.\n\
    \nFinally, I showed you how the `activated` event is used to signal different\
    \ requests, including obligations to fulfill the contracts that bind an app to\
    \ the wider Windows platform. I showed you the search contract, but there are\
    \ several others, and I recommend you take the time to explore them fully. The\
    \ more contracts you implement, the more integrated your app becomes.\n\nIn this\
    \ short book, I set out to show you the core system features that will jump-start\
    \ your Windows 8 app development. I have shown you how to use data bindings, how\
    \ to use the major structural controls, how to deal with snapped and filled layouts,\
    \ how to customize your application’s tile, and, in this chapter, how to take\
    \ control of the application life cycle. With these skills as your foundation,\
