- fmt: "要使用`Promise`对象，我调用该对象的`then`方法，传入一个将在任务完成时执行的函数。在我的示例中，这个函数调用依赖于`processAll`方法已完成工作的`UI.List`命名空间。\n\
    \n`then`方法接受可选的第二和第三参数，它们定义在发生错误时执行的函数以及接收进度信息的函数，但本书中我假设所有后台任务都能正确完成。我建议你在自己的项目中花时间妥善处理任何错误。\n\
    \n这是JavaScript Promise最基本和常见的用法。查看`WinJS.Promise`对象的API定义，了解其他可用功能。\n\n### 为模板元素设置样式\n\
    \n为了样式化模板生成的元素，我在`css`文件夹中添加了一个名为`list.css`的新文件。你可以在清单2-16中看到此文件的内容。\n\n```\n\
    【list.css 内容】\n#listTable {margin-top: 30px;border-collapse: collapse;}\n#listTable\
    \ th, #listTable td {padding-right: 20px;padding-left: 10px;}\n#listTable th {font-size:\
    \ 30pt; text-align: left;}\n#listTable td {font-size: 26pt;padding-top: 5px;padding-bottom:\
    \ 5px;}\n#listTable tbody tr.selected {background-color: #85C54C;}\n#listTable\
    \ th.itemName, #listTable th.store {width: 40%;}\n```\n\n该文件包含标准CSS，未使用任何特定于Windows应用商店应用开发的功能。\n\
    \n### 导入JavaScript和CSS\n\n应用模板的最后一步是将`/js/ui.js`和`/css/list.css`文件添加到`default.html`中，如清单2-17所示。\n\
    \n**清单2-17.** 将`ui.js`文件添加到`default.html`\n\n```html\n<html>\n<head>\n<meta charset=\"\
    utf-8\">\n<title>MetroGrocer</title>\n<!-- WinJS references -->\n<link href=\"\
    //Microsoft.WinJS.1.0/css/ui-dark.css\" rel=\"stylesheet\">\n<script src=\"//Microsoft.WinJS.1.0/js/base.js\"\
    ></script>\n<script src=\"//Microsoft.WinJS.1.0/js/ui.js\"></script>\n<!-- MetroGrocer\
    \ references -->\n<link href=\"/css/default.css\" rel=\"stylesheet\">\n<link href=\"\
    /css/list.css\" rel=\"stylesheet\">\n<script src=\"/js/viewmodel.js\"></script>\n\
    <script src=\"/js/ui.js\"></script>\n<script src=\"/js/default.js\"></script>\n\
    </head>\n... \n</html>\n```\n\n### 测试模板\n\n使用模板填充表格的结果如图2-4所示。请注意，即使模板在`default.html`文件中定义，你也看不到它本身。这是因为`WinJS.UI.processAll`方法将CSS的`display`属性设置为`none`，使得模板对用户不可见。\n\
    \n**图2-4.** 使用模板和`List`对象生成表格行\n\n## 总结\n\n在本章中，我向你展示了如何在Windows 8应用中创建视图模型、如何使其全局可用，以及如何使数据项可观察。WinJS\
    \ API的当前状态使得这个过程有些繁琐，但回报是能够使用声明式绑定和模板，用应用数据填充你的HTML。\n\n---\n\n# 第三章：应用控件\n\n\
    大多数情况下，你在Windows 8应用中使用的用户界面控件与创建常规HTML Web应用时使用的控件相同。如果你想从用户那里收集数据，可以使用`select`、`input`和`textarea`等元素。如果你想允许用户启动操作，可以使用`button`元素，依此类推。这些元素在你应用中的外观由项目中的CSS和Internet\
    \ Explorer 10的功能共同控制。\n\n除了这些基本控件，WinJS API还定义了一些特定于Windows 8的控件。在本章中，我将向你展示如何使用这些最重要的控件，重点介绍那些对实现Windows\
    \ 8应用体验（无论对用户还是开发者）至关重要的控件。\n\n我首先向你展示`AppBar`和`Flyout`控件。`AppBar`是所有Windows 8应用的核心功能，是用户执行无法直接在主应用布局中使用数据和控件进行的交互的机制。`Flyout`是一种为用户提供一致弹出窗口的方式，并且与`AppBar`紧密关联。\n\
    \n并非所有WinJS控件都是为了用户利益。在本章中，我将向你展示如何使用`HTMLControl`将HTML片段导入你的应用程序。`HTMLControl`仅适用于静态HTML内容，因此我还将展示如何使用*Pages*功能加载HTML及其关联的JavaScript和CSS。这些技术允许有效划分应用内容和功能，从而带来更轻松的开发体验以及更简单的测试和维护。为了完整性，我将在本章最后展示如何将外部内容导入Windows\
    \ 8应用，如果你已投资于现有内容基础设施并希望将其整合到应用中，这会很有用。表3-1提供了本章摘要。\n\n**表3-1.** 章节摘要\n\n| 问题\
    \ | 解决方案 | 清单 |\n| :--- | :--- | :--- |\n| 指示一个`AppBar`。 | 定义一个`div`元素，其`data-win-control`属性为`WinJS.UI.AppBar`。\
    \ | 1, 3, 4 |\n| 导入一段静态内容。 | 使用`HTMLControl`功能。 | 2 |\n| 指示一个`Flyout`。 | 定义一个`div`元素，其`data-win-control`属性为`WinJS.UI.Flyout`。\
    \ | 5–7 |\n| 将`Flyout`与`AppBar`按钮关联。 | 配置`button`元素，使其`type`属性为`flyout`，且`flyout`属性设置为`flyout`的`div`元素的`id`。\
    \ | 8 |\n| 管理一个`Flyout`。 | 使用DOM API管理`Flyout`中的控件，并使用`Flyout`的`div`元素的`winControl`属性成员管理`Flyout`功能。\
    \ | 9, 10 |\n| 将内容加载到Windows 8应用中。 | 创建HTML片段，并使用`WinJS.UI.Pages.define`方法注册一个在内容加载时执行的回调函数。使用`WinJS.UI.Pages.render`方法加载内容。\
    \ | 11–15 |\n| 将HTML、JavaScript和CSS一起加载到Windows 8应用中。 | 创建一个HTML文档，并使用`script`和`link`元素引用JavaScript和CSS文件。使用`WinJS.UI.Pages.define`和`WinJS.UI.Pages.render`方法注册回调函数并加载文档。\
    \ | 16–19 |\n| 显示Windows 8应用外部的内容。 | 使用`iframe`，并确保在应用的清单中声明了Internet (客户端) 权限。\
    \ | 20–22 |\n\n### 添加AppBar\n\n*AppBar*会在用户向上滑动手指或用鼠标右键单击时出现在屏幕底部。Windows 8应用UI的重点似乎是主布局上的控件越少越好，并依赖`AppBar`作为除立即可用功能之外的任何交互机制。\n\
    \n我本可以直接在`default.html`中定义`AppBar`的HTML，但正如本章开头所提到的，WinJS支持动态加载和插入HTML片段。为了演示此功能，我在解决方案资源管理器中创建了一个`html`文件夹，并使用“添加新项”对话框中的“HTML页面”项创建了一个`appbar.html`文件。\n\
    \n清单3-1展示了`appbar.html`的内容，其中包含我的`AppBar`定义。\n\n**提示** 确保在创建`html`文件夹时没有运行调试器。如果正在运行，Visual\
    \ Studio将创建一个名为`NewFolder`的文件夹，并且在调试器停止之前不允许你更改名称。"
  raw: 'To use the Promise object, I call the then method on the object, passing in
    a function that will be executed when the task has completed. In my example, this
    function makes the calls to the UI.List namespace that depend on the processAll
    method having completed its work.


    The then method takes optional second and third arguments that define functions
    that will be executed if there is an error and that will receive process information,
    but for this book I just assume that all background tasks complete properly. I
    recommend you take the time to handle any errors properly in your own projects.


    This is the most basic and common use of a JavaScript promise. Take a look at
    the API definition for the WinJS.Promise object to learn about the other capabilities
    available.


