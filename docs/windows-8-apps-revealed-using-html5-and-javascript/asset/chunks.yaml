- fmt: '# The `default.js` File and Windows Store Apps


    The `default.js` file is where Windows Store apps begin to depart from the standard
    web app environment and you start to see some of the Windows-specific APIs poke
    through. Windows Store apps have a life cycle that is more complex than a web
    app, and the code added to `default.js` by Visual Studio provides some basic support
    for handling different application states. It isn’t as bad as it looks, and I’ll
    explain what you need to know about the Windows 8 app life cycle, and how to respond
    to it, in Chapter 5.


    ## Using Your Favorite JavaScript Libraries with Windows 8


    By this point, you will have realized that a lot of your experience in web app
    development is directly transferable to the world of Windows 8 development. You
    can get a head start on your Windows 8 projects by using your favorite JavaScript
    libraries. I am a huge fan of jQuery, for example, as anyone who has read my *Pro
    jQuery* book will know. For the most part, you shouldn’t have any problems using
    well-written libraries as long as you avoid areas where Windows 8 follows a different
    model than mainstream browsers. So, for example, jQuery works well in Windows
    Store apps, but be careful when using the `ready` event. In a Windows 8 app, you
    need to respond directly to the life-cycle events.


    Another area to avoid is asynchronous script loading; the JavaScript files for
    a Windows 8 app are installed locally and are loaded very quickly. There is no
    need to manage the script loading process, and since I have had some problems
    in this area with Windows 8, I have found it simpler just to load code using a
    regular script element.


    There are some libraries, however, that it just doesn’t make much sense to use.
    Examples include user interface toolkits such as jQuery UI and jQuery Mobile.
    You can make these work in Windows 8, but you end up with an app that doesn’t
    follow the distinctive Windows 8 style and that may not respond to touch events
    in quite the same way as other Windows Store apps.


    As a general guide, I recommend you get used to the capabilities of the `WinJS`
    API before you start using your favorite JavaScript packages. Microsoft has provided
    a reasonably solid set of foundation capabilities, including interface controls,
    data binding, and even a cut-down version of jQuery. These sometimes have flaws,
    some of which you will see in this book, but I suggest you learn what `WinJS`
    has to offer before adding other JavaScript libraries.


    ## Starting and Debugging a JavaScript Windows 8 App


    The best way of testing and debugging a Windows 8 app is using the *simulator*,
    which is included as part of the Visual Studio installation. In the Visual Studio
    window, you will see a right arrow next to the words *Local Machine*. Click the
    small down arrow to the right of the words, and select Simulator from the menu,
    as shown in Figure 1-4.


    ***Figure 1-4.** Selecting the simulator for a Windows 8 app*


    To start the Windows 8 app, click the button, which will now read Simulator. A
    new window will appear that displays the Windows 8 app, as shown in Figure 1-5.


    ***Figure 1-5.** The Windows 8 simulator*


    This is the best mechanism for testing Windows Store apps because it allows you
    to simulate device capabilities that are not natively available on your development
    machine. If you explore the buttons on the right edge of the simulator window,
    you will see options for changing the screen resolution, changing the orientation
    of the device, and simulating touch interactions and location data.


    **Note:** You will recall that I set the width of the grid layout to 120 percent
    of the available space when I added styles to the `default.css` file earlier in
    this chapter. You can see the effect of this in the figure. The text for the bottom-right
    container is clipped, and part of the layout isn’t immediately visible. You can
    slide the view by touch or by using the mouse.


    ## Reloading the Windows 8 App


    One of the nice aspects of using JavaScript to develop Windows Store apps is that
    you don’t have to stop and restart the app on the simulator to reflect changes
    you make. To demonstrate this, I have made a couple of simple changes. First,
    I have changed the text contained in one of the `div` elements in `default.html`,
    as shown in Listing 1-6.


    ***Listing 1-6.** Making an HTML Change*


    ```html

    . . .

    <div id="leftContainer" class="gridLeft">

    <h1 class="win-type-xx-large">Left Full Container</h1>

    </div>

    . . .

    ```


    I have also made a change to `default.css`, as shown in Listing 1-7, assigning
    a different background color to another element.


    ***Listing 1-7.** Making a CSS Change*


    ```css

    . . .

    #topRightContainer {

    -ms-grid-column: 2;

    -ms-grid-row: 1;

    background-color: #808080;

    }

    . . .

    ```


    **Tip:** When I show partial listings like these, only the bold area has changed.
    The rest of the file remains just as it was in earlier listings. I know some readers
    prefer that all code listings be shown complete, but I need to pack a lot of information
    into a slim book, and this is an excellent way of increasing the content density.
    Don’t forget that you can get the complete source code, without charge, from Apress.com.


    Figure 1-6 shows the Visual Studio controls that control the execution of the
    Windows 8 app in the simulator. The first three pause, stop, and restart execution.
    These are the traditional debugger controls that Visual Studio has had for as
    long as I can remember.


    ***Figure 1-6.** Controls for restarting and reloading the Windows 8 app*


    The addition is the reload button, which I have highlighted and which is to the
    right of the other controls. Clicking this button quickly reloads the content
    of your Windows 8 app and immediately reflects any changes. You can also reload
    the project by pressing the F4 key or by selecting Debug ➤ Refresh Windows App.
    You can see the effect of my HTML and CSS changes in Figure 1-7.


    ***Figure 1-7.** The Windows 8 simulator now showing the HTML5 and CSS changes*


    It isn’t just the HTML and CSS that are reloaded. The JavaScript for the app is
    refreshed as well. This is a nice, quick way of getting an iterative write-and-test
    development cycle going for Windows Store apps.


    **Tip:** You can’t reload an app if you have added new files, but Visual Studio
    will warn you when this happens and offer to reload the app instead.


    ## Debugging Windows Store Apps


    Visual Studio has an excellent debugger, and it can be used very easily to track
    down problems in JavaScript Windows Store apps. In my own app code, I find it
    easiest to add the `debugger` keyword to my code. When the runtime encounters
    the keyword, the debugger breaks, and I can step through my code, inspect variables,
    and execute little snippets of code using the JavaScript console.


    You can use the `debugger` keyword only for code you can modify, however, which
    means that I have to take a different approach when I want to break the debugger
    on a statement in one of the Microsoft `base.js` and `ui.js` JavaScript files.
    To do this, I have to select the statement I am interested in, right-click, and
    select Breakpoint ➤ Insert Breakpoint from the pop-up menu. The effect is the
    same, but no modifications are made to the file.


    I recommend exploring the Visual Studio debugger; it is more sophisticated than
    the developer tools available in browsers, and it is well worth a couple of hours
    to get to grips with how it works.'
