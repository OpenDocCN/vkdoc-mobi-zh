    ## CHAPTER 4 ■ LAYOUTS AND TILES


    **Figure 4-11.** *Updating an application tile*


    **Tip** You may not be able to find the tile on the Start screen if you have been
    using the simulator. If this is the case, search for the app by typing the first
    few letters of its name.

    Clicking the small search result icon will cause the tile to appear. If that doesn''t
    work, then reboot and start the application locally, making sure not to start
    the simulator.


    ### Updating Wide Tiles


    The technique I showed you in the previous section is useful if you want to be
    able to update the square *or* the wide tile for your application. But, unless
    you have very specific presentation needs for your data, you should provide updates
    for both square and wide tiles since you have no idea which your users will select.


    To update both tile sizes, you need to combine two XML templates to create a single
    fragment that contains both updates. In this section, I am going to combine the
    `tileSquareText03` and `tileWideBlockAndText01` templates. The wide template has
    a couple of additional fields, which I will use to display the number of stores
    that the user has to visit to get all of the items on the grocery list. You can
    see what I am aiming to produce in **Listing 4-12**—a fragment that follows the
    same format as a single template but that combines two `binding` elements.


    **Listing 4-12.** *Composing a Single XML Fragment*


    ```xml

    <tile>

