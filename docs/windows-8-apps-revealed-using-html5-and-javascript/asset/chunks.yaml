- fmt: '# Document Formatting


    There are two new table elements in this document. The first one, with the `id`
    attribute of `listTable`, is what the user will see. This table has a header with
    column titles, but the `tbody` element is empty. This is where I will use a template
    to insert a row for each item in the grocery list.


    The second table element contains the template. The template itself is defined
    by the `tbody` element, but it is an oddity of WinJS templates that they need
    to be within well-formed HTML. You can’t just define the `tbody` element as a
    child of the `body`, for example, because `tbody` elements aren’t allowed to be
    children of `body` elements. This means you end up with some redundant elements
    in the HTML document when using templates.


    ## Using the Template


    The template is denoted by a `data-win-control` value of `WinJS.Binding.Template`.
    This tells WinJS to process the element, look for declarative bindings, and add
    some special properties to the `HTMLElement` object that represents the template
    element in the DOM.


    As mentioned previously, I like to break my projects up so that there are JavaScript
    files for each area of functionality. To that end, I have created a new JavaScript
    file called `ui.js`, which is shown in Listing 2-13.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2 ■ DATA AND BINDINGS**


    ***Listing 2-13.** * Using a Template in the `ui.js` File


    ```

    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />

    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> (function () {


    "use strict";


    WinJS.Namespace.define("UI.List", {


    displayListItems: function () {


    WinJS.Utilities.empty(itemBody);


    var list = ViewModel.UserData.getItems();


    for (var i = 0; i < list.length; i++) {


    itemTemplate.winControl.render(list.getAt(i), itemBody);


    }


    WinJS.Utilities.children(itemBody).listen("click", function (e) {


    ViewModel.State.selectedItemIndex = this.rowIndex - 1; WinJS.Utilities.children(itemBody).removeClass("selected");
    WinJS.Utilities.addClass(this, "selected");


    });


    },


    setupListEvents: function () {


    var eventTypes = ["itemchanged", "iteminserted",


    "itemmoved", "itemremoved"];


    var itemsList = ViewModel.UserData.getItems();


    eventTypes.forEach(function (type) {


    itemsList.addEventListener(type, UI.List.displayListItems);


    });


    },


    });


    })();

    ```


    I have defined a `UI` namespace, which contains a `List` object with `displayListItems`
    and `setupListEvents` functions. In the `displayListItems` function, I locate
    the `HTMLElement` objects that represent the template and the target for the generated
    elements. I have used the `document.getElementById` method to locate the elements
    by their `id` attribute values.


    The `WinJS.Utilities.empty` method removes the children for an element, which
    I do so that I don’t just add new rows to the table each time the function is
    called.


    To iterate through the items in the `WinJS.Binding.List` object, call the `winControl.render`
    method on the template object for each one. The `winControl` is created by the
    `WinJS.UI.processAll` method, and it returns the Windows 8–specific properties
    created for different types of user interface controls.


    The `render` method is added to those elements whose `data-win-control` attribute
    is `WinJS.Binding.Template`. The arguments to the `render` method are the data
    item to process and the target element to which the newly generated content will
    be added. So, by calling the `render` method for each item in my grocery `List`
    object, I am able to create table rows to populate my Windows Store app layout.


    Once I have created the table rows, I use the `WinJS.Utilities.children` method
    to set up an event listener for the `click` events on the newly created `tr` elements.


    Finally, I set the `ViewModel.State.selectedItemIndex` property (which I will
    define shortly) to indicate which row has been selected when the `click` event
    is received, using the `rowIndex` property that is available for `tr` elements
    and ensuring that the `selected` class is applied only to the row the user has
    selected.


    ## Responding to List Changes


    The other function I defined in the `UI` namespace is `setupListEvents`. This
    function listens for each of the list events I described in the previous section
    and, when they are received, calls the `displayListItems` function.


    This allows me to use my template to render the contents of the table element
    whenever the contents of the list change. This is a crude way of handling list
    changes, but it is sufficient for a simple example. The event object passed to
    the handler function contains details of which list element has changed, which
    is essential information when implementing a more elegant approach.


    > **Tip** I set up the event handlers in a separate function so that I can call
    `displayListItems` repeatedly. If I had set up the event handlers inside the `displayListItems`
    function, then a new set of handlers would be created each time the contents of
    the list changed.


    ## Tracking the Selected Item


    In the `displayListItems` function, I updated the value of the `ViewModel.State.selectedItemIndex`
    property to keep track of which item in the table element had been selected. It
    is now time to define this property. Listing 2-14 shows the addition to the `viewmodel.js`
    file.


    ***Listing 2-14.** * Defining the `selectedItemIndex` Property


    ```

    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />

    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> (function () {


    "use strict";


    var shoppingItemsList = new WinJS.Binding.List();


    var preferredStoresList = new WinJS.Binding.List();


    WinJS.Namespace.define("ViewModel", {


    UserData: WinJS.Binding.as({


    homeZipCode: null,


    getStores: function () {


    return preferredStoresList;


    },


    addStore: function (newStore) {


    preferredStoresList.push(newStore);


    },


    getItems: function () {


    return shoppingItemsList;


    },


    addItem: function (newName, newQuantity, newStore) {


    shoppingItemsList.push({


    item: newName,


    quantity: newQuantity,


    store: newStore


    });


    }


    }),


    State: WinJS.Binding.as({


    selectedItemIndex: -1


    })


    });


    //

    *. . .test data removed for brevity . . .*


    })();

    ```


    I use the `State` object to differentiate between data required for the current
    state of the app and data created by the user (which is represented by the `UserData`
    object).


    ## Applying the Template to the App


    Before you use a template, you must ensure that the `WinJS.UI.processAll` method
    has been called. This method processes the HTML document, looking for elements
    that have the `data-win-control` attribute and configuring their capabilities.
    This includes finding and processing templates.


    Listing 2-15 shows the changes to the `performInitialSetup` function defined in
    the `default.js` file where I added the call to the `displayListItems` and `setupListEvents`
    functions after the call to `WinJS.UI.processAll` (and where I removed the code
    for the previous example from the `performInitialSetup` function).


    ***Listing 2-15.** * Ensuring That Elements Are Processed Before Using a Template


    ```

    . . .


    function performInitialSetup(e) {


    WinJS.UI.processAll().then(function () {


    UI.List.displayListItems();


    UI.List.setupListEvents();


    });


    }


    . . .

    ```


    The `processAll` method does its work in the background, allowing the JavaScript
    statements that follow a call to `processAll` to be executed at the same time.
    Using background tasks is a good idea, but since my `displayListItems` function
    relies on the `winControl` property that is created by `processAll`, I need to
    make sure that the background task has been completed before I use my template.


    **UNDERSTANDING PROMISES**


    Windows Store apps rely on the JavaScript `Promise` pattern to represent background
    tasks. The result from the `processAll` method is a `WinJS.Promise` object, which
    is the Windows 8 implementation of the JavaScript `Promise` pattern.'
