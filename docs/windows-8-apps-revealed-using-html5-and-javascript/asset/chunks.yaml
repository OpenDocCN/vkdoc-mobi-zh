    \ `start`、`end` 和 `center`，它们将元素定位到容器的起始边缘、结束边缘或居中位置。\n\n理解这些属性效果的最佳方法是进行实验；稍加练习，你就能创建出非常灵活且适应性强的布局。有关完整详细信息，请参阅完整规范：<http://www.w3.org/TR/css3-flexbox>，请注意这仍是一个草案标准。\n\
