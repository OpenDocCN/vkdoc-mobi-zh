    innerText: store\"></td>\n      </tr>\n    </tbody>\n  </table>\n  <!-- 购物清单项目模板结束\
    \ -->\n\n</body>\n</html>\n```\n\n当你调用`WinJS.UI.processAll`方法时，WinJS 会查找所有`data-win-control`属性设置为`WinJS.UI.HtmlControl`的`div`元素，并将其内容设置为`data-win-options`属性中指定的\
    \ HTML 片段。你不能直接指定片段文件，而必须使用清单中所示的类 JSON 格式，将文件名指定为`uri`属性的值。\n\n**提示：** `HTMLControl`仅用于加载不需要执行脚本或定义任何\
    \ CSS 的内容片段。这在我们的示例中是可行的，因为从 HTML 片段设置`AppBar`的 JavaScript 代码是`default.js`的一部分，而该文件已经与主\
    \ HTML 文档关联。并且，正如我稍后将描述的，我必须采取预防措施，确保在执行`AppBar`设置之前，HTML 片段已被加载。在本章后面，我将向你介绍\
    \ WinJS *页面*，它支持自己的 CSS 和 JavaScript。\n\n加载文件的内容会自动处理，WinJS 会查找并配置我的`AppBar`。你无需担心如何让`AppBar`显示和隐藏。这由\
    \ WinJS 配置，当用户右键单击或从屏幕底部向上滑动时，`AppBar`会出现。图 3-1 展示了`AppBar`的显示效果。\n\n**图 3-1.**\
    \ 为示例应用程序添加`AppBar`\n\n我在图中放大了几个按钮，以便更容易地看到应用于每个`AppBar`按钮的配置属性的效果。`id`和`disabled`属性设置了`button`元素上的相应属性，而`label`属性则设置了按钮下方显示的文本。\n\
    \n`AppBar`有两个区域，`section`属性指定按钮出现在哪个区域。如果`section`属性设置为`global`，则按钮将位于`AppBar`的右侧。此区域用于影响整个应用程序的操作。`section`属性为`selection`的按钮执行适用于当前选中项目的操作，并显示在`AppBar`的左侧。\n\
    \n`icon`属性设置按钮图像。你可以为此属性指定自定义 PNG 文件，或使用 Segoe UI Symbol 字体中定义的符号字符之一。你可以通过指定`WinJS.UI.AppBarIcon`枚举中的值，或直接指定其字符代码（可以通过\
    \ Windows 8 字符映射表工具获取）来引用这些图标。例如，我为其中一个按钮指定了`add`图标，它对应于`WinJS.UI.AppBarIcon.add`值或字符代码`\\\
    uE109`。\n\n**提示：** 可供选择的图标非常多，远多于 API 文档中所列的。打开 References 部分中的`js/ui.js`文件，搜索*icon*即可查看枚举定义的列表。该枚举仅包含常用图标；字体本身定义了更多图标。\n\
    \n## 实现应用栏按钮\n\n在本节中，我将添加代码来实现我添加到`AppBar`中、专用于选择操作的`Done`按钮。为此，我在`ui.js`文件中定义了一个`UI.AppBar`命名空间，并创建了`setupButtons`函数，如清单\
    \ 3-3 所示。\n\n## **清单 3-3.** 为`AppBar`按钮设置支持\n\n```javascript\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    \ />\n(function () {\n  \"use strict\";\n\n  WinJS.Namespace.define(\"UI.AppBar\"\
    , {\n    setupButtons: function () {\n      ViewModel.State.bind(\"selectedItemIndex\"\
    ,\n        function (newValue, oldValue) {\n          done.disabled = (newValue\
    \ == -1);\n      });\n\n      done.addEventListener(\"click\", function (e) {\n\
    \        var selectedIndex = ViewModel.State.selectedItemIndex;\n        ViewModel.UserData.getItems().splice(selectedIndex,\
    \ 1);\n        ViewModel.State.selectedItemIndex = -1;\n      });\n    }\n  });\n\
    \n  WinJS.Namespace.define(\"UI.List\", {\n    //\n    // . . . 为简洁起见，代码已省略 .\
    \ . .\n    //\n  });\n})();\n```\n\n由于`AppBar`按钮是由 HTML 的`button`元素创建的，我可以使用标准的`disabled`属性来控制按钮状态，并通过处理`click`事件来响应用户交互。\n\
    \n我想根据`ViewModel`的变化来控制按钮的状态。\n"
