  trans: "\nVisual Studio 添加到新项目中的代码足够让一个基础应用启动并运行，但它并未支持全部的生命周期事件。它能够很好地处理激活和挂起操作，却阻止了应用在恢复时收到通知。幸运的是，API\
    \ 中还有其他地方可以让我注册以接收生命周期事件，因此本章我的首要任务是更新 `default.js`，以便在我的应用进入全部三个生命周期阶段时能够正确收到通知。清单\
    \ 5-1 展示了这些更改。\n\n**清单 5-1.** 注册生命周期事件通知\n\n```javascript\n(function () {\n  \
    \  \"use strict\";\n\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    activated\", performInitialSetup);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    resuming\", performResume);\n    Windows.UI.WebUI.WebUIApplication.addEventListener(\"\
    suspending\", performSuspend);\n\n    function performInitialSetup(e) {\n    \
    \    WinJS.UI.processAll().then(function () {\n            UI.List.displayListItems();\n\
    \            UI.List.setupListEvents();\n            UI.AppBar.setupButtons();\n\
    \            UI.Flyouts.setupAddItemFlyout();\n            ViewModel.State.bind(\"\
    selectedItemIndex\", function (newValue) {\n                WinJS.Utilities.empty(itemDetailTarget)\n\
    \                var url = newValue == -1 ? \"/html/noSelection.html\" :\n   \
    \                 \"/pages/itemDetail/itemDetail.html\"\n                WinJS.UI.Pages.render(url,\
    \ itemDetailTarget);\n            });\n            WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
    , storeDetailTarget);\n\n            function setOrientationClass() {\n      \
    \          if (Windows.UI.ViewManagement.ApplicationView.value ==\n          \
    \          Windows.UI.ViewManagement.ApplicationViewState.fullScreenPortrait)\
    \ {\n                    WinJS.Utilities.addClass(contentGrid, \"flex\");\n  \
    \              } else {\n                    WinJS.Utilities.removeClass(contentGrid,\
    \ \"flex\");\n                }\n            };\n            window.addEventListener(\"\
    resize\", setOrientationClass);\n            setOrientationClass();\n        \
    \    unsnapButton.addEventListener(\"click\", function (e) {\n               \
    \ Windows.UI.ViewManagement.ApplicationView.tryUnsnap();\n            });\n  \
    \          Tiles.sendTileUpdate();\n            Tiles.sendBadgeUpdate();\n   \
    \     });\n    }\n\n    function performResume(e) {\n        WinJS.Utilities.query(\"\
    #topRightContainer h1\")[0].innerText = \"Resumed\";\n    }\n\n    function performSuspend(e)\
    \ {\n        WinJS.Utilities.query(\"#leftContainer h1\")[0].innerText = \"Suspended\"\
    ;\n    }\n})();\n```\n\n我使用了通过 `Windows.UI.WebUI.WebUIApplication` 类提供的事件，这些事件与生命周期事件完美对应。我的示例\
    \ Windows 8 应用当前并未执行任何受应用挂起和恢复影响的任务，但我想向你展示如何测试这些事件。为此，我在 `performResume` 和 `performSuspend`\
    \ 函数中添加了语句，这些语句会更改 HTML 文档中 `h1` 元素的值，以指示何时接收到挂起和恢复事件。\n\nVisual Studio 包含在调试器中模拟挂起和恢复事件的支持，但我建议你学习如何在操作系统中直接触发这些事件，这样你就不需要使用\
    \ Visual Studio 进行测试了。\n\n问题在于 Visual Studio 必须禁用真实的操作系统事件，以便 Windows 8 应用进程始终处于其控制之下。这意味着\
    \ Visual Studio 可能会创建一种与用户使用你的应用时所看到的略微不同的体验。\n\n不幸的是，当你不使用 Visual Studio 工作时，你将无法访问\
    \ JavaScript 控制台窗口等有用的工具，当然也包括调试器本身。你必须找到另一种机制来观察应用生命周期的变化，这就是我通过更改布局中 `h1` 元素显示的文本来处理恢复和挂起事件的原因，如下所示：\n\
    \n```javascript\n...\nWinJS.Utilities.query(\"#leftContainer h1\")[0].innerText\
    \ = \"Suspended\";\n...\n```\n\n通过使用布局来记录接收到的生命周期事件，我能够确保我的应用收到了我所期望的事件。现在，我已经修复了\
    \ `default.js` 文件中的事件处理代码，并通过更改应用布局增加了记录事件接收的支持，接下来我将向你展示生成这些事件的不同方法：通过 Visual\
    \ Studio 以及直接使用 Windows 8。\n\n## 使用 Visual Studio 模拟生命周期事件\n\n要使用 Visual Studio\
    \ 模拟生命周期事件，请从 **调试** 菜单中选择 **开始调试** 来启动应用。Visual Studio 会在工具栏上显示一个弹出菜单，如图 5-1\
    \ 所示，其中包含挂起和恢复应用的选项；这些选项会向应用发送挂起和恢复事件。还有一个选项会发送挂起事件然后终止应用（这实际上会终止应用，而不仅仅是模拟效果）。\n\
    \n**图 5-1.** 使用 Visual Studio 模拟生命周期事件\n\n> **提示：** 对于某些版本的 Visual Studio，只有在\
    \ **视图** > **工具栏** 菜单中选中 **调试位置** 选项后，工具栏菜单才会显示。\n\n要测试 Visual Studio 对生命周期事件的支持，请启动应用，然后从菜单中选择\
    \ **挂起** 项。应用将收到挂起事件，并且不再显示。稍等片刻，然后从 Visual Studio 菜单中选择 **恢复**；应用将重新出现，你会看到屏幕顶部的\
    \ `h1` 元素已更新，反映了已收到挂起和恢复事件的事实，如图 5-2 所示。\n\n**图 5-2.** 使用应用布局中的元素记录生命周期事件\n\n\
    ## 触发生命周期事件\n\n在接下来的部分中，我将向你展示如何在不使用 Visual Studio 的情况下触发生命周期事件。使用真实事件测试你的应用行为非常重要，而不要仅仅依赖\
    \ Visual Studio 支持的模拟生命周期。\n\n### 激活应用\n\n要触发激活事件，请从 Visual Studio 的 **调试** 菜单中选择\
    \ **开始执行（不调试）** 来启动应用程序。你也可以从 **开始** 屏幕启动应用，无论是在模拟器中还是在本地机器上。关键是不使用调试器来启动应用。\n\
    \n### 挂起应用\n\n挂起应用最简单的方法是按下 `Win+D` 切换到桌面。打开 **任务管理器**，右键单击你的 Windows 8 应用对应的项，然后从弹出菜单中选择\
    \ **转到详细信息**。任务管理器将切换到 **详细信息** 选项卡。（你可能需要先单击 **更多详细信息** 按钮，然后才能选择 **详细信息** 选项卡。）在\
    \ **详细信息** 选项卡上，你会看到一个或多个 `WWAHost.exe` 进程，每个进程对应一个 Windows 8 应用。你可以通过以下方式判断哪个是示例应用：几秒钟后，**状态**\
    \ 列中显示的值将从 `Running` 变为 `Suspended`，这告诉你 Windows 已挂起该应用，如图 5-3 所示。\n\n**图 5-3.**\
    \ 显示已挂起的 Windows 8 应用的 Windows 任务管理器\n\n### 恢复应用\n\n切换回应用将恢复它。你会看到布局顶部显示的 `h1`\
    \ 元素表明恢复和挂起事件都已由 Windows 发送。\n\n恢复后的应用状态与挂起时的状态完全相同。你的布局、数据、事件处理程序以及其他所有内容都将保持不变。例如，在处理恢复事件时，你无需调用\
    \ `processAll`。\n"
- fmt: "Your application could have been suspended for a long time, especially if\
    \ the device was put into a low-power state (such as sleeping). Network connections\
    \ will have been closed by any servers you were talking to (which is why you should\
    \ close them explicitly when you get the suspending event) and will have to be\
    \ reopened when your application is resumed. You will also have to refresh data\
    \ that may have become stale. This includes location data, since the device may\
    \ have been moved during the period your app was suspended.\n\n## Adding an Asynchronous\
    \ Activity\n\nNow that I have confirmed that my app can get and respond to the\
    \ resuming and suspending events, I can add some functionality that requires a\
    \ recurring task. For this example, I am going to use the geolocation service\
    \ to report on the current device location. To do this, I have created a new JavaScript\
    \ file called `location.js`, the contents of which are shown in Listing 5-2.\n\
    \n**Listing 5-2.** Tracking the Device Location\n\n```\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"//Microsoft.WinJS.1.0/js/ui.js\"\
    \ />\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n(function () {\n   \
    \ \"use strict\";\n\n    var currentPromise;\n    var tracking = false;\n\n  \
    \  function trackLocation() {\n        currentPromise = new WinJS.Promise(function\
    \ (complete) {\n            var geo = new Windows.Devices.Geolocation.Geolocator();\n\
    \            if (geo) {\n                geo.getGeopositionAsync().then(function\
    \ (position) {\n                    WinJS.xhr({\n                        url:\
    \ \"http://nominatim.openstreetmap.org\"\n                            + \"/reverse?format=json&lat=\"\
    \n                            + position.coordinate.latitude\n               \
    \             + \"&lon=\" + position.coordinate.longitude\n                  \
    \  }).then(function (data) {\n                        var dataObject = JSON.parse(data.response);\n\
    \                        if (dataObject.address.road) {\n                    \
    \        var date = new Date();\n                            var time = date.getHours()\
    \ + \":\" + date.getMinutes()\n                                + \":\" + date.getSeconds();\n\
    \                            document.getElementById(\"geo\").innerText =\n  \
    \                              dataObject.address.road + \" (\" + time + \")\"\
    ;\n                        }\n                    });\n                });\n \
    \           }\n            complete();\n        });\n\n        currentPromise.then(function\
    \ () {\n            if (tracking) {\n                setTimeout(trackLocation,\
    \ 5000);\n            }\n        });\n    }\n\n    WinJS.Namespace.define(\"Location\"\
    , {\n        startTracking: function () {\n            tracking = true;\n    \
    \        trackLocation();\n        },\n        stopTracking: function () {\n \
    \           tracking = false;\n            return currentPromise;\n        }\n\
    \    });\n})();\n```\n\n## Using Location Tracking\n\nThe Windows 8 geolocation\
    \ service is available through the `Windows.Devices.Geolocation.Geolocator` object.\
    \ You can subscribe to receive events when the location information changes, but\
    \ I want to demonstrate a repeating background task, so I have used the `getGeopositionAsync`\
    \ method, which produces a snapshot of the current location. This is an asynchronous\
    \ operation, and so the `getGeopositionAsync` method returns a `WinJS.Promise`\
    \ object that is fulfilled when the location information is available.\n\nWhen\
    \ I get the location data, I make an Ajax call using the `WinJS.xhr` object, which\
    \ is a `Promise` wrapper around the standard browser `XmlHttpRequest` object.\
    \ My Ajax request is to a reverse geocoding service, which allows me to translate\
    \ the latitude and longitude information from the geolocation service into a street\
    \ address. The geocoding service returns a JSON string, which I parse into a JavaScript\
    \ object from which I read the street so that I can display it to the user, along\
    \ with a timestamp indicating the last location update.\n\n**Tip:** I have used\
    \ the OpenStreetMap geocoding service because it doesn’t require a unique account\
    \ token. This means you can run the example without having to create a Google\
    \ Maps or Bing Maps account.\n\nI have added some simple elements to the `default.html`\
    \ file so that I can display the location to the user. You can see the additions\
    \ in Listing 5-3.\n\n**Listing 5-3.** Adding Elements to `default.html` to Display\
    \ Location Information\n\n```\n...\n<script src=\"/js/tiles.js\"></script>\n<script\
    \ src=\"/js/location.js\"></script>\n<script src=\"/js/default.js\"></script>\n\
    </head>\n<body>\n<div class=\"midtitle\">\n    <h2>Your location is: <span id=\"\
    geo\"></span></h2>\n</div>\n<div id=\"contentGrid\">\n```"
