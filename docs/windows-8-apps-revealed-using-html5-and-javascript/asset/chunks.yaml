    `tryUnsnap`, which attempts to break the app out of the snapped view. The result
    from this method is `true` if the view of the app was successfully changed and
    `false` otherwise. You can call this method at any time, but it will have an effect
    only if your app is visible to the user and is in the snapped view. This may seem
    obvious, but a result of `false` is usually attributed to one of these conditions
    not being met.


    **Note**


    ■


    The effect of `tryUnsnap` will depend on whether there is an app in the filled
    view. If there is, then the views for the two on-screen apps will be reversed
    so that your app is in the filled view and the other app is in the snapped view.
    If there is no app in the filled view, then your app will be expanded to fill
    the screen.


    ## Using Tiles and Badges


    Tiles are the representation of your application on the Start screen. At their
    simplest, tiles are just static icons for starting your app. However, with a little
    effort, you can use your tile to present the user with a useful summary of your
    app’s state and to draw their attention to activities they may want to perform.


    In the sections that follow, I demonstrate how to present information through
    the tile of my example Windows 8 app. There are two possible, and conflicting,
    goals when you create a live tile; you are trying to either encourage the user
    to run your app or dissuade them from running it. If you are trying to attract
    the user, then your tile becomes an ad for the experience, insights, or content
    you offer. This is appropriate for entertainment apps or those that present external
    content such as news.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ LAYOUTS AND TILES


    Dissuading the user from running an app may seem like a strange goal, but it can
    significantly improve the user experience. Consider productivity apps as an example.
    I dread to think the hours I have lost waiting for calendar or to-do apps to load
    just so I can check where my next appointment is or what my most urgent action
    requires. You can reduce the friction and frustration that your users experience
    when using your app and create a more pleasing and immediate experience by displaying
    the information that the user needs in your app tile.


    Both goals require careful thought. The overall Windows 8 experience is simple
    and subdued. If you are using your tile as an ad, then the muted nature of Windows
    8 makes it easy to create tiles that stand out. If you go too far, though, you
    will create something that is discordant and jarring and is more of an eyesore
    than an attraction.


    If your goal is to reduce the number of times the user needs to run your app,
    then you need to present the right information at the right time. This requires
    a good understanding of what drives your users to adopt your app and the ability
    to customize the data that is presented. Adaptability is essential; there is no
    point showing me the most urgent work action on my task list on a Saturday morning,
    for example. Every time you present the user with the wrong information, you force
    them to run your app to get what they do need.


    ## Improving Static Tiles


    The simplest way to improve the appearance of your application in the Start screen
    is to change the images used for your app’s tile. You should customize the images
    for your app, even if you don’t use any other tile features.


    To do this, you will need a set of three images of specific sizes: 30x30 pixels,
    150x150 pixels, and 310x150 pixels. These images should contain the logo or text
    you want to display but be otherwise transparent. I used a barcode motif for my
    example app, creating images called `tile30.png`, `tile150.png`, and `tile310.png`
    and placing them in the `images` folder of my Visual Studio project, as shown
    in Figure 4-7. The `tile620.png` file is a 620x300 pixel, which I will use as
    the splash screen for the app that is shown as the app is being launched. This
    is not a tile-related feature, but it is applied through the same mechanism, so
    I will demonstrate its use here.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-101_1.png)


    CHAPTER 4 ■ LAYOUTS AND TILES


    ***Figure 4-7 .** Adding tile images to the images folder of the example project*


