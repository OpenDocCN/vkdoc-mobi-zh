    code in the default.js file and added support for recording the receipt of the
    events by changing the layout of the app, I will show you the different ways you
    can generate the events, through Visual Studio and by using Windows 8 directly.


    Simulating Life-Cycle Events Using Visual Studio


    To use Visual Studio to simulate the life-cycle events, start the app by selecting
    Start Debugging from the Debug menu. Visual Studio will display a pop-up menu
    on the toolbar, as shown in Figure 5-1 , that has options to suspend and resume
