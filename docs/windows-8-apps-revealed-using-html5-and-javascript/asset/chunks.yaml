    CHAPTER 5 ■ LIFE-CYCLE EVENTS


    Windows provides information about why your application has been sent the activated
    event through the kind property of the Event object passed to your handler function.
    The range of possible values is enumerated by Windows.ApplicationModel.


    Activation.ActivationKind . There are different kinds of activation for different
    contracts for printing, for opening a file, for working with a device camera,
    and, of course, for handling search requests. By checking the value of the kind
    property, I can discover whether the activated event has been sent for a search
    request:


    ...


    if (e.kind == actNS.ActivationKind.search) {


    Search.searchAndSelect(e.queryText);


    }


    ...


    The search term that the user has provided is available through the event’s queryText
    property. If my activated event has been sent for a search request, then I call
    the searchAndSelect function, passing in the queryText value. This has the effect
    of locating and selecting the first matching item in the grocery list.


    Ensuring Application Setup


    My technique for servicing search requests relies on the performInitialSetup function
    having been called before I call searchAndSelect , because I rely on the view
    model and its associated bindings to translate a change in the selectedItemIndex
    property into changes in the display.


    The problem is that the search-related activated event can have two meanings.
    If my app is already running, the search activated event means just “perform this
    search.”


    But, if my app isn’t running, then the event means “start the app *and* perform
    this search.”


    Working out which meaning I am dealing with is important. You get only one activated
    event, even if your app isn’t running when the user initiated the search.


    I create duplicate bindings and event handlers if I call performInitialSetup when
    my app is already running. All sorts of odd behaviors emerge when this happens,
    but the most visible problem is that the right column in the layout contains two
    sets of content because I end up calling the WinJS.Pages.render method too many
    times. By contrast, if I fail to call performInitialSetup when my app wasn’t running,
    then I don’t have any bindings and event handlers, and I don’t display any content
    at all.


    I need to be careful to call the performInitialSetup function when my app hasn’t
    been running and avoid calling it the function if it has. I do this by looking
    at the previousExecutionState property of the event passed to the activated handler
    function, which reports on the execution state of my app just before the activated
    event was sent. The range of values for this property is enumerated by Windows.


    ApplicationModel.Activation.ApplicationExecutionState , but the only value I care
    121


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-134_1.jpg)


    CHAPTER 5 ■ LIFE-CYCLE EVENTS


    about to solve this problem is suspended , which tells me that the app setup has
    already been performed:


    ...


    if (e.previousExecutionState != actNS.ApplicationExecutionState.suspended) {


    performInitialSetup(e);


    }


    ...


    Testing the Search Contract


    To test the contract, start your app. It doesn’t matter if you start it with or
    without the debugger, and it doesn’t matter if you exit or suspend the app after
    you start it. The key thing is to make sure it is present on the simulator.


    Next, switch to the Start screen. Your app, if it was still running, will be switched
    to the background and, after a few seconds, will be suspended. To begin a search,
    just start typing. You want to search for something that will make a match, so
    type *hot* (so that your search will match against the hot dogs item in the grocery
    list).


    As you type, Windows will automatically begin a standard search, looking for applications
    whose names contain *hot* . You will see something similar to Figure 5-10 , since
    there are no such apps in the default Windows 8 installation.


    ***Figure 5-10 .** Initiating a search*'
