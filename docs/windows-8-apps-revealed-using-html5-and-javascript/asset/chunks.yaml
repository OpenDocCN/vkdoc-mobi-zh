  raw: 'State.selectedItemIndex property in the view model. To monitor an object with
    observable properties, you use the bind method to register a function that will
    be executed when the value the property changes. In this listing, I have created
    a binding for the selectedItemIndex property so that I can change the status of
    the button when the user makes a selection. This is a nice demonstration of how
    you can use WinJS data bindings to tie together view model data, event handler
    functions, and HTML elements.


    The last step is to call the setupButtons function from within performInitialSetup
    in the default.js file, as shown in Listing 3-4. Notice that, once again, I make
    the call to my function within the then callback provided by the Promise object
    so that I can be sure my HTML fragment has been loaded and processed before I
    start performing operations on the elements it contains.


    ***Listing 3-4.*** Calling the setupButtons Function


    . . .


    function performInitialSetup(e) {


    WinJS.UI.processAll().then(function () {


    UI.List.displayListItems();


    UI.List.setupListEvents();


    UI.AppBar.setupButtons();


    });


    }


    . . .


    And, with these additions, I have a basic AppBar in place. If you select an item
    in the grocery list, the Done button will be enabled, allowing you to reveal the
    AppBar and mark the item as completed, removing it from the list. I am not going
    to implement functionality for all of the AppBar buttons, but in the following
    section I’ll wire up the Add button so that I can demonstrate how to create and
    use a Flyout.


    Adding Flyouts


    Flyouts are pop-up windows that you can use to provide information to, or gather
    data from, the user. Flyouts are often used in conjunction with AppBar buttons,
    and in this section I show you how to use a Flyout to complete the Add Item AppBar
    button.


    To begin, I have created a new file in the html folder called addItemFlyout.html
    , the contents of which are shown in Listing 3-5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ APPLICATION CONTROLS


    ***Listing 3-5.*** Defining a Flyout


    <div id="addItemFlyout" class="flyout" data-win-control="WinJS.UI.Flyout">


    <div>


    <label for="groceryItem">Item:</label>


    <input id="groceryItem" placeholder="e.g. Apples">


    </div>


    <div>


    <label for="quantity">Quantity:</label>


    <input id="quantity" placeholder="e.g. 4"/>


    </div>


    <div>


    <label for="stores">Store:</label>


    <select id="stores"></select>


    </div>


    <div class="rightAlign">


    <button id="addItemButton">Add</button>


    </div>


    </div>


    **T**


    ■ **ip** If you are used to developing web apps, you will be accustomed to building
    data-gathering interactions around the HTML form element. In a Windows 8 app,
    the form element isn’t that important because the majority of interactions are
    handled entirely within the client, even if the data is being sent to a remote
    server as part of an Ajax request.


    Flyouts are denoted by a div element whose data-win-control attribute is set to
    WinJS.UI.Flyout . This is the only limitation to creating a flyout, and I am free
    to add any content inside the div element that I need to support my interaction
    with the user. In this example, I have used some standard HTML form controls to
    gather details of the new item from the user. To style the elements in the flyout,
    I have added a file called flyout.


    css to the css folder in the Visual Studio project. You can see the contents of
    this file in Listing 3-6.


    ***Listing 3-6.*** The Contents of the /css/flyouts.css File


    #addItemFlyout { background-color: #85C54C; font-weight: bold;}


    div.flyout input { margin-bottom: 5px; width: calc(100% - 5px); }


    div.flyout select { margin-top: 0px; width: 100% }


    div.rightAlign { margin-top: 10px; float: right;}


    I have added a link element to the head section of the default.html file to bring
    the flyout.css file into scope, as shown in Listing 3-7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ APPLICATION CONTROLS


    ***Listing 3-7.*** Bringing the flyout.css File into the default.html File


    . . .


    <head>


    <meta charset="utf-8">


    <title>MetroGrocer</title>'
