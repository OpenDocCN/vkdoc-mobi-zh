    Wiring Up the Controls in a Flyout


    Clicking the New Item AppBar command button shows the flyout, but the elements
    it contains are not yet wired up to the rest of the app. To complete the flyout,
    I need to populate the select element with details of the stores in the view model
    and handle the click event for the Add button so that the new item is added to
    the list.


    Listing 3-9 shows the additions to the UI namespace in the ui.js file to handle
    both of these tasks.


    ***Listing 3-9.*** Adding Support for the Flyout Controls to the UI Namespace


    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />


    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> (function () {


