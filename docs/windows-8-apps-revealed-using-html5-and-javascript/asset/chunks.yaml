    <h1 class="win-type-xx-large">Left Full Container</h1>


    <div class="win-type-x-large">


    The zip code is:


    <span data-win-bind="innerText: UserData.homeZipCode"></span>


    </div>


    </div>


    <div id="topRightContainer" class="gridRight">


