    ***Figure 2-4 .** Generating table rows using a template and a List object* Summary


    In this chapter, I showed you how to create a view model in a Windows 8 app, how
    to make it available globally, and how to make data items observable. The current
    state of the WinJS API makes this a somewhat awkward process, but the reward is
    the ability to use declarative bindings and templates to populate your HTML with
    app data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 3**


    **Application Controls**


    For the most part, the user interface controls you use in a Windows 8 app are
    the same as the ones you use when creating a regular HTML web app. If you want
    to gather data from the user, then you can use elements such as select , input
    , and textarea . If you want to allow the user to commence an action, then you
    can use button elements, and so on. The appearance of these elements in your app
    is controlled by a combination of the CSS in your project and the capabilities
    of Internet Explorer 10.


    In addition to these basic controls, the WinJS API defines some that are specific
    to Windows 8\. In this chapter, I show you how to use the most important of these
    controls, focusing on those that are essential to implementing the Windows 8 app
    experience, both for the user and for the developer.


    I begin by showing you the AppBar and Flyout controls. The AppBar is a core feature
    of all Windows 8 apps and is the mechanism by which users perform interactions
    that are not directly possible using the data and controls in the main application
    layout. Flyouts are a way of providing consistent pop-ups to users and are closely
    associated with AppBars.


    Not all WinJS controls are for the benefit of the user. In this chapter, I show
    you how to use the HTMLControl to import fragments of HTML into your application.
    The HTMLControl is useful only for static HTML content, so I also show you how
    to use the *Pages* feature to load HTML and its associated JavaScript and CSS.
    These techniques allow for the effective partitioning of application content and
    functionality, which makes for an easier development experience and simpler testing
    and maintenance. For completeness, I finish this chapter showing you how to import
    external content into your Windows 8 app, which can be useful if you have invested
    in an existing content infrastructure and want to incorporate it into your application.
