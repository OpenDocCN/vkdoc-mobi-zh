- fmt: "# Class Names Beginning with `win-type`\n\nClass names that begin with `win-type`\
    \ are defined in `ui-dark.css` (or `ui-light.css` if you have switched) and are\
    \ used to set the size of text in a Windows 8 app. There are a series of styles\
    \ that relate to gradations in text size from largest to smallest: `win-type-xx-large`,\
    \ `win-type-x-large`, `win-type-large`, `win-type-medium`, `win-type-small`, and\
    \ `win-type-x-small`. There are two other `win-type` styles: `win-type-ellipsis`\
    \ uses an ellipsis (`...`) when text doesn’t fit into its parent element, and\
    \ `win-type-interactive` makes an element resemble a link. In `default.html`,\
    \ I have used the `win-type-xx-large` style to create placeholder headers in the\
    \ layout.\n\n## Exploring the `default.css` File\n\nListing 1-4 shows the contents\
    \ of the `/css/default.css` file. By convention, the `css` folder is where you\
    \ put the files that define your CSS styles, and the `default.css` file is created\
    \ automatically by Visual Studio, which adds a corresponding `link` element in\
    \ the `default.html` file.\n\nWindows 8 projects rely on standard CSS with some\
    \ vendor-specific prefixes. Microsoft used to be terrible for introducing its\
    \ own CSS properties, but the ones you’ll encounter in this book exist either\
    \ because the relevant W3C standard is still unfinished or because there are properties\
    \ that are specific to Windows 8 functionality that need to be expressed to Windows\
    \ Store apps. You can see examples of both in the listing. The file that Visual\
    \ Studio creates is very simple, and my additions are shown in bold.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1 ■ GETTING STARTED**\n\n***Listing 1-4.*** The Contents of the `default.css`\
    \ File\n\n```\nbody {\n    background-color: #4A8C43;\n}\n\n#contentGrid {\n \
    \   display: -ms-grid;\n    -ms-grid-rows: 1fr 1fr;\n    -ms-grid-columns: 60%\
    \ 60%;\n    height: 100%;\n    overflow: scroll;\n}\n\n#contentGrid div.gridLeft\
    \ {\n    margin-left: 1em;\n    margin-right: 1em;\n}\n\n#contentGrid div.gridRight\
    \ {\n    margin-right: 1em;\n}\n\n#leftContainer {\n    -ms-grid-column: 1;\n\
    \    -ms-grid-row: 1;\n    -ms-grid-row-span: 2;\n}\n\n#topRightContainer {\n\
    \    -ms-grid-column: 2;\n    -ms-grid-row: 1;\n}\n\n#bottomRightContainer {\n\
    \    -ms-grid-column: 2;\n    -ms-grid-row: 2;\n}\n\n@media screen and (-ms-view-state:\
    \ fullscreen-landscape) {\n}\n\n@media screen and (-ms-view-state: filled) {\n\
    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**CHAPTER 1 ■ GETTING\
    \ STARTED**\n\n```\n@media screen and (-ms-view-state: snapped) {\n}\n\n@media\
    \ screen and (-ms-view-state: fullscreen-portrait) {\n}\n```\n\nThe `@media` rules\
    \ work like regular media queries, but the property that they are responding to\
    \ is specific to Windows 8 and represents different orientations and usage scenarios\
    \ (which I will explain and demonstrate in Chapter 4).\n\n**TIP** Visual Studio\
    \ indents CSS styles to create a visual hierarchy. This drives me crazy for some\
    \ reason, so I have disabled this feature for all of the listings in this book.\
    \ You can change the way that Visual Studio displays CSS by selecting **Tools\
    \ ➤ Options**, navigating to **Text Editor ➤ CSS ➤ Formatting**, and unchecking\
    \ the \"Hierarchical indentation\" option.\n\nWith my additions, I have defined\
    \ a background color for the app, following the apparent Windows 8 trend toward\
    \ muted colors. The other additions I have made apply a CSS3 grid layout to the\
    \ `div` elements I defined in `default.html`. You can use any of the new CSS3\
    \ layout models in a Windows 8 app (or any CSS layout for that matter), but the\
    \ specification for the grid layout has yet to be finalized, so I have to prefix\
    \ my layout properties with `-ms`.\n\n**A QUICK INTRODUCTION TO CSS3 GRID LAYOUTS**\n\
    \nYou may not have used the grid layout because it is not consistently implemented\
    \ in mainstream web browsers. Fortunately, when developing Windows 8 web apps,\
    \ you need to worry only about Internet Explorer 10, which is used to display\
    \ JavaScript Windows Store apps to the user. In this sidebar, I provide you with\
    \ a very quick introduction to the basic features of CSS3 grid layouts. To get\
    \ started with a grid layout, you must set the `display` property and specify\
    \ the number of rows and columns for the element that will contain the grid, like\
    \ this:\n\n```\n#contentGrid {\n    display: -ms-grid;\n    -ms-grid-rows: 1fr\
    \ 1fr;\n    -ms-grid-columns: 60% 60%;\n}\n```\n\nThe `display` property must\
    \ be set to `-ms-grid`. The `-ms-grid-rows` and `-ms-grid-columns` properties\
    \ specify the dimensions of the grid. These can be specified as fractional units\
    \ (expressed as `fr`), as a percentage of the available space, or as fixed dimensions.\
    \ I have specified two equal-sized rows and two columns, the width of which is\
    \ set to be 60 percent of the width of the parent element.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1 ■ GETTING STARTED**\n\nIt is common in Windows Store apps (or at\
    \ least common in the ones developed so far) to provide a content area that is\
    \ wider than the screen and allow the user to scroll from left to right to access\
    \ different regions of the app. Setting the cumulative width to 120 percent sets\
    \ up that behavior, which you will be able to see when I run the example web app\
    \ later in this chapter.\n\nFor individual items, you specify which row and column\
    \ they should appear in, like this:\n\n```\n#leftContainer {\n    -ms-grid-column:\
    \ 1;\n    -ms-grid-row: 1;\n    -ms-grid-row-span: 2;\n}\n```\n\nThe `-ms-grid-column`\
    \ and `-ms-grid-row` properties locate an element in the grid. Both properties\
    \ are 1-based, meaning that locating an element in column 1 and row 1 will place\
    \ it in the top-left position in the grid. By default, elements occupy one grid\
    \ square, but you can change this using the `-ms-grid-row-span` and `-ms-grid-column-span`\
    \ properties. In the example, I have made the `leftContainer` element span two\
    \ rows. The only other property of interest is `-ms-grid-column-align`, which\
    \ I have not used in my example. This property specifies the alignment of an element\
    \ within a grid square and can be set to `start`, `end`, `center`, or `stretch`.\
    \ If you are using a left-to-right language such as English, the `start` and `end`\
    \ values left- and right-justify the element. The `center` value centers the element,\
    \ and the `stretch` value resizes the element so that it completely fills its\
    \ allocated space.\n\nYou can create some very complex layouts using the grid\
    \ properties. See the full specification at [www.w3.org/TR/css3-grid](http://www.w3.org/TR/css3-grid)\
    \ for details, bearing in mind that this is not yet a ratified standard.\n\n##\
    \ Exploring the `default.js` File\n\nThe last of the important files that Visual\
    \ Studio has created is `default.js`, which is referenced in `default.html` using\
    \ a standard `script` element. You can see the content of this file in Listing\
    \ 1-5. I have not made any changes to this file aside from formatting the code\
    \ so that it fits on the page.\n\n***Listing 1-5.*** The Content of the `default.js`\
    \ File\n\n```\n// For an introduction to the Blank template, see the following\
