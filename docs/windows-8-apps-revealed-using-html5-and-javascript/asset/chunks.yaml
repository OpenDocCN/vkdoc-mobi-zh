    \ 属性。\n\n`query` 方法返回的是一个元素数组。由于没有与 jQuery 的 `val` 方法等价的函数，因此我将返回结果视为数组，获取代表与选择器匹配的第一个元素的\
    \ `HTMLElement` 对象，然后读取其 `value` 属性。实现相同结果的另一种方法是将元素的 `id` 属性值作为全局变量进行定位。在常规 Web\
