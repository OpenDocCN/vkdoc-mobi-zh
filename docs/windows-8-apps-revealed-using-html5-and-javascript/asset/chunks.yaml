    You can see the four different badge/tile configurations in Figure 4-13 , wide
    and square tiles, with number and icon badges.


    ***Figure 4-13 .** Displaying a badge on a tile* Summary


    In this chapter, I showed you how to adapt to the Windows 8 snapped and filled
    layouts and how to use tiles to provide your users with enticements to run your
    app or the data they require to avoid doing so. These features are essential in
    delivering an app that is integrated into the broader Windows 8 experience.


    You may feel that the amount of space available in a snapped layout is too limited
    to offer any serious functionality, but with some careful consideration, it is
    possible to focus on the essence of the service that you offer and omit everything
    else. Careful consideration is also required to get the most from tiles and badges.
    Well-thought-out badges can significantly improve the attractiveness or utility
    of your app, but ill-considered tiles are annoying or just plain useless.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5**


    **Life-Cycle Events**


    In this, the final chapter in this book, I show you how to take control of the
    Windows 8


    app life cycle by responding to key Windows events. I show you how to replace
    code that Visual Studio adds to projects, how to properly deal with your app being
    suspended and resumed, and how to implement contracts that tie your app into the
    wider user experience that Windows 8 offers. Along the way, I’ll demonstrate the
    use of the geolocation feature and show you how to set up and manage a recurring
    asynchronous task. Table 5-1 provides the summary for this chapter.


    ***Table 5-1.** Chapter Summary*


    **Problem**


    **Solution**


    **Listing**


    Ensure that your app


    Subscribe to events from the


