- fmt: '# Windows 8 App Development with HTML5 and JavaScript


    ## Introduction


    Windows 8 apps are an important addition to Microsoft Windows 8, providing the
    cornerstone for a single, consistent programming and interaction model across
    desktops, tablets, and smartphones. The Windows 8 app user experience is very
    different from previous generations of Windows applications: Windows 8 apps are
    full-screen and favor a usability style that is simple, direct, and free from
    distractions.


    Windows 8 app development represents a complete departure from previous versions
    of Windows. There are entirely new APIs, new interaction controls, and a very
    different approach to managing the life cycle of applications.


    Windows 8 apps can be developed using a range of languages, including `C#`, `Visual
    Basic`, `C++`, and, the topic of this book, `JavaScript`. Windows 8 is the first
    version of Windows that embraces the skills and knowledge of web application developers
    and makes `JavaScript` and `HTML` first-class citizens in application development.


    In this book, I show you how you can build on your knowledge of web app development
    to create Windows 8 apps using HTML and JavaScript. The result is apps that look
    and feel like an integral part of the Windows experience and that take advantage
    of core platform facilities.


    This book gives you an essential jump start into the world of Windows 8; by the
    end, you will understand how to use the controls and features that define the
    core Windows 8 experience.


    ## About This Book


    This book is for experienced HTML and JavaScript developers who want to get a
    head start creating Windows 8 applications for Windows 8 using the Consumer Preview
    test release. I explain the concepts and techniques you need to get up to speed
    quickly and to boost your Windows 8 development techniques and knowledge before
    the final version of Windows 8 is released.


    ### What Do You Need to Know Before You Read This Book?


    You need to have a good understanding of `HTML` and `JavaScript`, ideally from
    creating rich web apps. You need to understand the `DOM` API, know how events
    work, and have a solid grasp of the HTML elements and their DOM object counterparts.


    ### Do You Need to Know About HTML5?


    No. You can use some of the HTML5 JavaScript APIs when developing Windows 8 apps,
    but that is not the focus of this book. A good basic knowledge of `HTML4` or `HTML5`
    will be enough, combined with solid JavaScript experience.


    ### What Software Do You Need for This Book?


    You will need the Windows 8 Consumer Preview and the Visual Studio 11 Express
    Beta for Windows 8. You can download both of them from http://preview.windows.com.


    You don’t need any other tools to develop Windows 8 applications or for the examples
    in this book.


    Windows 8 Consumer Preview is not a finished product, and it has some stability
    issues. You’ll get the best experience if you install Windows 8 directly onto
    a well-specified PC, but you can get by with a virtual machine if you are not
    ready to make the switch.


    ### What Is the Structure of This Book?


    I focus on the key techniques and features that make a Windows 8 app. You already
    know how to write HTML and use form elements to gather input from the user, and
    I am not going to waste your time teaching you what you already know. This book
    is about translating your web app development experience into the Windows 8 world,
    and that means focusing on what makes a Windows 8 app special.


    I have taken a relaxed approach to mixing topics. Aside from the main theme in
    each chapter, you’ll find some essential context to explain why features are important
    and why you should implement them. Along the way, I’ll show you the conventions
    for writing JavaScript Windows 8 apps and introduce as many Windows 8 features
    as I can.


    By the end of this book, you will understand how to build a Windows 8 app that
    integrates properly into Windows 8 and presents a user experience that is consistent
    with Windows 8 apps written using other technologies, such as `XAML`/`C#`.


    This is a primer to get you started on Windows 8 programming for Windows 8. It
    isn’t a comprehensive tutorial; as a consequence, I have focused on those topics
    that are the major building blocks for a Windows 8 app. There is a lot of information
    that I just couldn’t fit into such a slim volume. If you do want more comprehensive
    coverage of Windows 8 development, then Apress will be publishing my *Pro Windows
    8 Development with HTML5 and JavaScript* book for the final release of Windows
    8.


    The following sections summarize the chapters in this book.


    #### Chapter 1: Getting Started


    Aside from introducing this book, I show you how to create the Visual Studio project
    for the example Windows 8 app that I use throughout this book. I show you how
    to use the JavaScript tools in Visual Studio, how to test your Windows 8 apps
    in the Visual Studio simulator, and how to use the debugger.


    #### Chapter 2: Data and Bindings


    Data is at the heart of any Windows 8 application, and in this chapter I show
    you how to define a view model and how to use Windows 8 data bindings to bring
    that data into your application layouts. These techniques are essential to building
    Windows 8 apps that are easy to extend, easy to test, and easy to maintain. Along
    the way, I’ll show you how to define Windows 8 JavaScript namespaces, create observable
    arrays, use JavaScript promises, and generate content using templates.


    #### Chapter 3: Application Controls


    Certain user interface controls are common to all Windows 8 apps, regardless of
    which language is used to create them. In this chapter, I show you how to create
    and configure `AppBar`s and `Flyout`s, which are the two most important of these
    common controls; together they form the backbone of your interaction with the
    user. I also show you how to break up your Windows 8 content and code into pieces
    to make your app easy to manage and show how to bring those pieces together at
    runtime.


    #### Chapter 4: Layouts and Tiles


    The functionality of a Windows 8 application extends to the Windows 8 Start menu,
    which offers a number of ways to present the user with additional information.
    In this chapter, I show you how to create and update dynamic Start tiles and how
    to apply badges to those tiles.


    I also show you how to deal with the Windows 8 *snapped* and *filled* layouts,
    which allow a Windows 8 user to use two Windows 8 apps side by side. You can adapt
    to these layouts using CSS or JavaScript, and I show you both approaches.


    #### Chapter 5: Life-Cycle Events


    Windows applies a very specific life-cycle model to Windows 8 apps. In this chapter,
    I explain how the model works, show you how to receive and respond to critical
    life-cycle events, and describe how to manage the transitions between suspended
    and running applications. I demonstrate how to create and manage asynchronous
    tasks and how to bring them under *control* when your application is suspended.
    Finally, I show you how to support Windows 8 contracts, which allow your application
    to seamlessly integrate into the wider Windows 8 experience.'
