  trans: "\n# Markdown 排版处理\n\n要切换至特定应用的搜索，请点击搜索框下方列表中的应用名称。这将向该应用发送 `search activated`\
    \ 事件。以我的示例应用为例，我点击了列表中的 `MetroGrocer` 项，随后 `activated` 事件触发了我简单的搜索处理程序，其结果显示在**图\
    \ 5-11** 中。\n\n**图 5-11.** *执行特定应用的搜索*\n\n> **提示** 如果在显示你的应用时从超级按钮栏启动搜索，Windows\
    \ 将会自动从列表中选中你的应用，并将初始搜索聚焦在你的应用上。\n\n## 总结\n\n在本章中，我向你展示了如何使用生命周期事件来响应 Windows\
    \ 管理应用的方式。我描述了每个关键事件，并向你展示了如何使用应用布局来确保你的应用能够正确地接收和处理这些事件。\n\n当应用被挂起时，必须特别小心地干净地结束后台任务，我向你展示了如何通过请求挂起延迟来获得对此过程的控制权，允许额外几秒钟的时间，以在应用恢复时最小化潜在错误或陈旧数据的风险。\n\
    \n最后，我向你展示了 `activated` 事件如何用于发出不同的请求，包括履行将应用与更广泛的 Windows 平台绑定在一起的契约义务。我演示了搜索契约，但还有其他几种契约，我建议你花时间全面地探索它们。你实现的契约越多，你的应用集成度就越高。\n\
    \n在这本简短的书里，我旨在向你展示核心系统功能，这些功能将帮助你快速起步进行 Windows 8 应用开发。我已经向你展示了如何使用数据绑定、如何使用主要的结构控件、如何处理贴靠和填充布局、如何自定义应用磁贴，以及在本章中，如何控制应用生命周期。以这些技能为基础，你将能够创建功能丰富且富有表现力的应用，并在\
    \ Windows 8 开发中抢占先机。\n\n祝愿你在 Windows 8 应用开发项目中取得圆满成功。\n\n## 索引\n\n**„ A, B, C**\n\
    \n- UI 命名空间, 57\n  - 连接, 57\n- 应用程序控件, 47\n  - HTML 文档, 62–66\n  - AppBar, 48–49,\
    \ 51–53\n    - 代码执行, 66\n    - 外观, 51\n    - 完整路径, 64\n    - 属性, 51\n    - `css`\
    \ 文件的内容, 63\n    - 按钮实现, 52\n    - 编辑列表, 66\n    - `data-win-control`, 49\n  \
