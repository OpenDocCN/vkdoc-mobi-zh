    ## 更新磁贴


    对于我的示例应用程序，我将显示购物清单中的前几个项目。磁贴更新基于预配置的模板，这些模板包含图形和文本的混合，并针对标准或宽磁贴设计。您首先要做的是选择所需的模板。最简单的方法是查看`Windows.UI.Notifications.TileTemplateType`枚举的API文档，该文档位于`http://msdn.microsoft.com/en-us/library/windows/apps/windows.ui.notifications.tiletemplatetype.aspx`。


    模板系统基于XML片段。我选择了`tileSquareText03`模板。这是一个方形磁贴，包含四行不换行文本，没有任何图像。您可以在清单4-8中看到表示该磁贴的XML片段。


    **清单4-8.** `tileSquareText03`磁贴模板的XML片段


    ```

    <tile>

    <visual lang="en-US">

    <binding template="TileSquareText03">

    <text id="1">Text Field 1</text>

    <text id="2">Text Field 2</text>

    <text id="3">Text Field 3</text>

    <text id="4">Text Field 4</text>

    </binding>

    </visual>

    </tile>

    ```


    其思路是用应用程序中的信息填充`text`元素，并将结果传递给Windows通知系统。为了演示此功能，我向项目中添加了一个名为`tiles.js`的新JavaScript文件，其内容如清单4-9所示。


    **清单4-9.** `tiles.js`文件


    ```

    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />

    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" />

    (function () {

    "use strict";

    WinJS.Namespace.define("Tiles", {

    sendTileUpdate: function () {

    var tn = Windows.UI.Notifications;

    var xmlFragment = tn.TileUpdateManager

    .getTemplateContent(tn.TileTemplateType.tileSquareText03);

    var textNodes = xmlFragment.getElementsByTagName("text");

    var items = ViewModel.UserData.getItems();

    for (var i = 0; i < textNodes.length; i++) {

    var listItem = items.getAt(i);

    if (listItem) {

    textNodes[i].innerText = listItem.item;

    }

    }

    for (var i = 0; i < 5; i++) {

    tn.TileUpdateManager.createTileUpdaterForApplication()

    .update(new tn.TileNotification(xmlFragment));

    }

    }

    });

    var eventTypes = ["itemchanged", "iteminserted",

    "itemmoved", "itemremoved"];

    var itemsList = ViewModel.UserData.getItems();

    eventTypes.forEach(function (type) {

    itemsList.addEventListener(type, Tiles.sendTileUpdate);

    });

    })();

    ```


    **注意：** `Windows.UI.Notifications`命名空间的长度足以导致印刷页面上代码的布局问题，因此我创建了一个名为`tn`的变量作为简写，并将该命名空间分配给它。


    **提示：** 请注意，模板名称的第一个字母是小写的。如果您使用大写字母，则您将获得默认模板，而不是您想要的模板。


    ## 填充XML模板


    为了获取模板XML片段，我调用了`TileUpdateManager.getTemplateContent`方法，并使用`TileTemplateType`中的值指定所需的模板。


    这会给我一个`Windows.Data.Xml.Dom.XmlDocument`对象，我可以对其应用标准DOM方法来设置模板中`text`元素的值。嗯，差不多是这样——因为`XmlDocument`对象的`getElementById`实现不起作用，我必须使用`getElementsByTagName`方法来获取包含XML中所有`text`元素的数组。这些元素按照它们在XML片段中定义的顺序返回，因此我可以遍历并将每个元素的`innerText`属性设置为我购物清单中的一个项目。


    **提示：** XML模板定义的四个`text`元素中，只有三个在“开始”菜单上对用户可见。最后一个元素被应用程序名称或图标遮挡。'
  raw: 'Larger or Smaller buttons from the AppBar. You can see the square and wide
    tile formats for the example application in Figure 4-9 .


    ***Figure 4-9 .** The updated static normal wide tiles* Updating Tiles


    For my example app, I am going to display the first few items on the grocery list.
    Tile updates are based on preconfigured templates, which contain a mix of graphics
    and text and are designed for either standard or wide tiles. The first thing you
    must do is pick the template you want. The easiest way to do this is to look at
    the API documentation for the Windows.UI.Notifications.TileTemplateType enumeration,
    which is available at http://msdn.microsoft.com/en-us/library/windows/apps/windows.


    ui.notifications.tiletemplatetype.aspx .


    The template system is based on XML fragments. I have chosen the tileSquareText03
    template. This is for a square tile and has four lines of nonwrapping text, without
    any images. You can see the XML fragment that represents the tile in Listing 4-8.


    ***Listing 4-8.*** The XML Fragment for the tileSquareText03 Tile Template


    <tile>


    <visual lang="en-US">


    <binding template="TileSquareText03">


    <text id="1">Text Field 1</text>


    <text id="2">Text Field 2</text>


    <text id="3">Text Field 3</text>


    <text id="4">Text Field 4</text>


    </binding>


    </visual>


    </tile>


    The idea is to populate the text elements with information from the application
    and pass the result to the Windows notifications system. To demonstrate this feature,
    I had added a new JavaScript file to the project called tiles.js , the content
    of which is shown in Listing 4-9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ LAYOUTS AND TILES


    ***Listing 4-9.*** The tiles.js File


    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />


    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> (function () {


    "use strict";


    WinJS.Namespace.define("Tiles", {


    sendTileUpdate: function () {


    var tn = Windows.UI.Notifications;


    var xmlFragment = tn.TileUpdateManager


    .getTemplateContent(tn.TileTemplateType.tileSquareText03); var textNodes = xmlFragment.getElementsByTagName("text");
    var items = ViewModel.UserData.getItems();


    for (var i = 0; i < textNodes.length; i++) {


    var listItem = items.getAt(i);


    if (listItem) {


    textNodes[i].innerText = listItem.item;


    }


    }


    for (var i = 0; i < 5; i++) {


    tn.TileUpdateManager.createTileUpdaterForApplication()


    .update(new tn.TileNotification(xmlFragment));


    }


    }


    });


    var eventTypes = ["itemchanged", "iteminserted",


    "itemmoved", "itemremoved"];


    var itemsList = ViewModel.UserData.getItems();


    eventTypes.forEach(function (type) {


    itemsList.addEventListener(type, Tiles.sendTileUpdate);


    });


    })();


    **Note**


    ■


    The length of the Windows.UI.Notifications namespace is long enough to cause layout
    problems for code on the printed page, so I have created a variable called tn
    as shorthand and assigned the namespace to it.


    **T**


    ■ **ip** Notice that the first letter of the template name is lowercase. If you
    use an uppercase letter, then you will get the default template rather than the
    one you wanted.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ LAYOUTS AND TILES


    Populating the XML Template


    To get the template XML fragment, I call the TileUpdateManager.getTemplateContent
    method, specifying the template I want with a value from the TileTemplateType
    .


    This gives me a Windows.Data.Xml.Dom.XmlDocument object to which I can apply standard
    DOM methods to set the value of the text elements in the template. Well, sort
    of—because the XmlDocument object’s implementation of getElementById doesn’t work,
    I have to use the getElementsByTagName method to get an array containing all of
    the text elements in the XML. These elements are returned in the order they are
    defined in the XML fragment, so I can iterate through and set the innerText property
    of each element to one of my grocery list items.


    **T**


    ■ **ip** Only three of the four text elements defined by the XML template will
    be visible by the user on the Start menu. The last element is obscured by the
    application name or icon.'
