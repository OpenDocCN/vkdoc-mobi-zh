    function. This function accepts the term that the user is searching for and performs
    a basic case-insensitive search through the items in the view model. If there
    is a match, then I set the selectedItemIndex property in the view model, which,
    through the magic of binding, will cause the matched item to be highlighted and
    for its details to be displayed. To bring this code into the app, I have added
