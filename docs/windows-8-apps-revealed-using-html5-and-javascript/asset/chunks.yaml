    **T**


    ■ **ip** In addition to the `flyout` value, you can also set the `type` property
    to `toggle` to create an AppBar button that the user can switch on or off. A value
    of `button` is equivalent to not setting a `type` property at all, and AppBar
    buttons work just like regular HTML buttons (as demonstrated earlier in this chapter).


    To specify the flyout associated with the button, I set the `type` property to
    `flyout` and the `flyout` property to the `id` of the flyout element.


    ## Importing the Flyout Content


    To bring my flyout HTML fragment into the application, I have to update `default.html`
    and make use of `HTMLControl` again:


    ```

    ...

    <!-- import HTML fragments -->

    <div data-win-control="WinJS.UI.HtmlControl"

    data-win-options="{uri: ''/html/appbar.html''}"></div>

    <div data-win-control="WinJS.UI.HtmlControl"

    data-win-options="{uri: ''/html/addItemFlyout.html''}"></div>

    <!-- end of HTML fragments -->

    ...

    ```


    When the user clicks the button, my flyout is automatically displayed, as shown
    in Figure 3-2.


    ***Figure 3-2.** Associating a Flyout with an AppBar button*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ APPLICATION CONTROLS


    ## Wiring Up the Controls in a Flyout


    Clicking the New Item AppBar command button shows the flyout, but the elements
    it contains are not yet wired up to the rest of the app. To complete the flyout,
    I need to populate the `select` element with details of the stores in the view
    model and handle the click event for the Add button so that the new item is added
    to the list.


    Listing 3-9 shows the additions to the `UI` namespace in the `ui.js` file to handle
    both of these tasks.


    ***Listing 3-9.*** Adding Support for the Flyout Controls to the UI Namespace


    ```

    /// <reference path="//Microsoft.WinJS.1.0/js/base.js" />

    /// <reference path="//Microsoft.WinJS.1.0/js/ui.js" /> (function () {

    "use strict";


    WinJS.Namespace.define("UI.Flyouts", {

    setupAddItemFlyout: function () {


    WinJS.Utilities.empty(stores);


    var list = ViewModel.UserData.getStores();


    list.forEach(function (item) {

    var newOption = document.createElement("option"); newOption.text = item;

    stores.add(newOption);

    });


    addItemButton.addEventListener("click", function () {

    ViewModel.UserData.addItem(groceryItem.value, quantity.value, stores.value);

    addItemFlyout.winControl.hide();

    appBar.winControl.hide();

    });

    }

    });


    //

    ... *other namespace definitions omitted for brevity*

    })();

    ```


    I have created a `UI.Flyouts` object that defines the `setupAddItemFlyout` function.


    This function populates the `select` control from the view model, and when the
    Add button is clicked, it reads the values from the `input` and `select` elements
    and uses them to create an item in the grocery list.


    When I am done with the flyout, I locate the `div` element and use the `winControl`
    property to get the WinJS members that are specific to flyouts. The `hide` method
    dismisses the Flyout and returns the user to the main layout. I perform the same
    task on the `AppBar` element, which would otherwise be left visible when the Flyout
    is closed.


    See the WinJS API documentation for details of the other methods available through
    the `winControl` property of `AppBar` and `Flyout` elements.


    Of course, defining this code isn’t enough; I have to call the function from the
    `default.js` file, as shown in Listing 3-10.


    ***Listing 3-10.*** Calling the Code to Set Up the Flyout Controls


    ```

    ...

    function performInitialSetup(e) {

    WinJS.UI.processAll().then(function () {

    UI.List.displayListItems();

    UI.List.setupListEvents();

    UI.AppBar.setupButtons();

    UI.Flyouts.setupAddItemFlyout();

    });

    }

    ...

    ```


    The effect of these additions is to provide the user with a drop-down list of
    stores to pick from, and when the user clicks the Add button, the details they
    have added will be used to create a new data item in the view model. You can see
    the effect of the populated `select` element in Figure 3-3.


    ***Figure 3-3.** Populating the select element in the Flyout*


    ## Using Pages


    Earlier in the chapter, I used `HTMLControl` to import fragments into my main
    HTML document. The main limitation in using `HTMLControl` is that you can’t arrange
    to be notified when your content is loaded. This is fine for content when you
    are using fragments just to reuse regions of markup, but the `HTMLControl` isn’t
    much help if you want to load content fragments dynamically in response to user
    input.


    `HTMLControl` is a simple declarative wrapper around a more complex WinJS feature
    called *pages*. Pages must be set up and managed in JavaScript, but they provide
    a richer set of functions and, crucially, support callbacks that can be used to
    integrate content at any point in the application’s life cycle.


    To demonstrate the pages feature, I am going to implement the top-right region
    of the layout, allowing the user to edit the contents of the currently selected
    item and display a useful message when no selection has been made.


    I need to do three things to use a page. The first is to define the HTML, the
    second is to write the JavaScript that will be executed when the HTML is loaded,
    and the third thing is to load and display the HTML as part of the application.


    ### Defining the HTML


    For the first step, I have created a file called `noSelection.html` in the `html`
    folder of the project. Listing 3-11 shows the contents of this file. This is the
    markup that will be displayed to the user when no grocery list item has been selected.


    ***Listing 3-11.*** The noSelection.html File


    ```

    <div id="noselectionContainer" class="win-type-x-large">

    <p>There are <span id="numberCount"></span> items on your list</p>

    <p>Select to edit</p>

    </div>

    ```


    This is the complete content of the HTML file; it contains just the elements I
    want to insert into the document, which is the same approach when I used the `HTMLControl`
    feature previously. I’ll show you how to use complete HTML documents shortly,
    but I wanted to emphasize that the pages feature will quite happily operate on
    fragments of markup, which is how I tend to break up my applications.


    ### Creating the JavaScript Callback


    The second step is to define the code that will be executed when the HTML is loaded.'
