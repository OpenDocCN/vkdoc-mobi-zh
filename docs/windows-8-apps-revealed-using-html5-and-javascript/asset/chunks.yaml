- fmt: "# 两种徽章模板\n\n两种徽章模板可用。第一种将显示1到99之间的数值，第二种将显示由Windows定义的有限范围内的小图像。\n\n数值和图标模板使用相同的XML表示，如列表4-15所示，它们比用于磁贴的模板简单得多。\n\
    \n***列表4-15.*** 数值和图像徽章的模板\n\n```\n<badge value=\"\"/>\n```\n\n目标是将`value`属性设置为数值或图标名称。如果购物清单上有三个或更少的项目，我会显示数值徽章。如果有超过三个项目，我会使用图标来指示用户应关注其购物义务的范围。\n\
    \n创建徽章的过程始于选择模板。两种模板类型是`Windows.UI.Notifications.BadgeTemplateType`：对于数值徽章，使用`badgeNumber`模板；对于图标，使用`badgeGlyph`模板。你可以在两种情况下使用相同的模板，因为它们返回相同的XML。这在以后的版本或更新中可能会改变，因此即使内容相同，谨慎选择正确的模板也是明智的。\n\
    \n下一步是定位XML中的`value`属性，并将其设置为数值或图标名称。徽章的数值范围非常具体：从1到99。如果你将值设置为小于1，徽章将根本不会显示。任何大于99的值都会导致徽章显示99。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第4章 ■ 布局和磁贴\n\n图标列表同样具有规定性。你不能使用自己的图标，必须从Windows支持的十个图标列表中选择。你可以在http://msdn.microsoft.com/en-us/library/windows/apps/hh761458.aspx\
    \ 查看图标列表。\n\n在此示例中，我选择了警报图标，它看起来像一个星号。一旦XML填充完毕，就创建一个新的`BadgeNotification`对象并使用它来发布更新。与磁贴一样，我发现并非所有徽章更新都会被处理，因此我重复更新五次以确保其通过：\n\
    \n```\n...\nfor (var i = 0; i < 5; i++) {\n    var badgeNotification = new tn.BadgeNotification(badgeXml);\
    \ \n    tn.BadgeUpdateManager.createBadgeUpdaterForApplication()\n        .update(badgeNotification);\n\
    }\n...\n```\n\n剩下的就是确保我的徽章更新被创建。为此，我更改了购物清单事件的事件处理程序，以便磁贴和徽章一起更新。我还需要在`/js/default.js`文件中添加对`sendBadgeUpdate`方法的调用，你可以在列表4-16中看到。这确保了应用启动时徽章立即更新。\n\
    \n***列表4-16.*** 应用启动时更新徽章\n\n```\n...\nfunction performInitialSetup(e) {\n   \
    \ WinJS.UI.processAll().then(function () {\n        UI.List.displayListItems();\n\
    \        UI.List.setupListEvents();\n        UI.AppBar.setupButtons();\n     \
    \   UI.Flyouts.setupAddItemFlyout();\n        ViewModel.State.bind(\"selectedItemIndex\"\
    , function (newValue) {\n            WinJS.Utilities.empty(itemDetailTarget)\n\
    \            var url = newValue == -1 ? \"/html/noSelection.html\" :\n       \
    \         \"/pages/itemDetail/itemDetail.html\"\n            WinJS.UI.Pages.render(url,\
    \ itemDetailTarget);\n        });\n        WinJS.UI.Pages.render(\"/html/storeDetail.html\"\
    , storeDetailTarget); \n        function setOrientationClass() {\n           \
    \ if (Windows.UI.ViewManagement.ApplicationView.value\n                == Windows.UI.ViewManagement.ApplicationViewState\n\
    \                .fullScreenPortrait) {\n                WinJS.Utilities.addClass(contentGrid,\
    \ \"flex\"); \n            } else {\n                WinJS.Utilities.removeClass(contentGrid,\
    \ \"flex\");\n            }\n        };\n        window.addEventListener(\"resize\"\
    , setOrientationClass); \n        setOrientationClass();\n        unsnapButton.addEventListener(\"\
    click\", function (e) {\n            Windows.UI.ViewManagement.ApplicationView.tryUnsnap();\n\
    \        });\n        Tiles.sendTileUpdate();\n        Tiles.sendBadgeUpdate();\n\
    \    });\n}\n...\n```\n\n你可以在图4-13中看到四种不同的徽章/磁贴配置：宽磁贴和方形磁贴，带有数字和图标徽章。\n\n***图4-13.***\
    \ 在磁贴上显示徽章\n\n## 总结\n\n在本章中，我向你展示了如何适应Windows 8的贴靠和填充布局，以及如何使用磁贴向用户提供启动应用的诱因或避免启动所需的数据。这些功能对于交付一个融入更广泛Windows\
    \ 8体验的应用至关重要。\n\n你可能会觉得贴靠布局中的可用空间过于有限，无法提供任何严肃的功能，但经过仔细考虑，可以专注于你所提供的服务的本质，并省略其他所有内容。要充分利用磁贴和徽章，也需要仔细考虑。精心设计的徽章可以显著提高应用的吸引力或实用性，但考虑不周的磁贴则令人烦恼或完全无用。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第5章\n\n# 生命周期事件\n\n在本书的最后一章中，我将向你展示如何通过响应关键的Windows事件来控制Windows\
    \ 8应用的生命周期。我将展示如何替换Visual Studio添加到项目中的代码，如何正确处理应用被挂起和恢复，以及如何实现将你的应用融入Windows\
    \ 8提供的更广泛用户体验的合约。在此过程中，我将演示地理位置功能的使用，并展示如何设置和管理一个循环的后台任务。表5-1提供了本章的总结。\n\n***表5-1.***\
    \ 章节总结\n\n| 问题 | 解决方案 | 列表 |\n|------|----------|------|\n| 确保你的应用接收挂起和恢复事件。 |\
    \ 订阅来自`Windows.UI.WebUI.WebUIApplication`对象的事件。 | |\n| 创建一个循环的后台任务。 | 使用`WinJS.Promise`对象作为其他异步活动的包装器。\
    \ | 2–4 |\n| 在应用被挂起前请求更多时间。 | 调用传递给挂起处理程序函数的事件上的`suspendingOperation.getDeferral`方法。\
    \ | 5 |\n| 实现一个合约。 | 在清单中声明合约，并响应激活事件中的类型信息。 | 6–8 |\n\n## 处理应用生命周期\n\n在第1章中，我向你展示了Visual\
    \ Studio放置在`default.js`文件中的骨架代码，以便为我的示例项目提供快速启动。这段代码处理Windows 8应用的*生命周期事件*，确保我能适当响应操作系统发送给我的信号。Windows\
    \ 8应用的生命周期有三个关键阶段。\n\n第一阶段，*激活*，发生在Windows希望你的应用执行某些任务时。最常见的任务是Windows希望启动你的应用并显示给用户，但也有其他任务，你将在本章后面看到我展示如何实现*合约*时看到一个例子。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第5章 ■ 生命周期事件\n\n用户不会关闭Windows\
    \ 8应用；他们只是切换到另一个应用，让Windows来处理一切。这就是Windows 8 UI上没有关闭按钮或菜单栏的原因。不再需要的Windows 8应用会进入第二阶段，被*挂起*。在挂起状态下，不会执行任何应用代码，也不会与用户进行交互。\n\
    \n如果用户切换回一个被挂起的应用，则会发生第三阶段：应用被*恢复*。执行继续后，应用将显示给用户。\n\n挂起的应用并不总是被恢复。例如，如果设备内存不足，Windows可能会简单地*终止*一个挂起的应用。\n\
    \n## 修正Visual Studio事件代码"
  raw: 'Two types of badge template are available. The first will display a numeric
    value between 1 and 99, and the second will display a small image from a limited
    range defined by Windows.


    The numeric and iconic templates are represented using the same XML and, as Listing
    4-15 shows, are much simpler than the ones I used for tiles.


    ***Listing 4-15.*** The Template for Numeric and Image Badges


    <badge value=""/>


    The objective is to set the value attribute to either a numeric value or the name
    of an icon. I display a numeric badge if there are three or fewer items on the
    grocery list. If there are more than three items, then I use an icon to indicate
    that the user should be concerned about the extent of their shopping obligations.


    The process for creating a badge begins with selecting a template. The two template
    types are Windows.UI.Notifications.BadgeTemplateType : for numeric badges you
    use the badgeNumber template, and for icons you use the badgeGlyph template. You
    could use the same template in both situations because they return the same XML.
    This may change in later releases or updates, so it is prudent to select the right
    template, even though the content is the same.


    The next step is to locate the value attribute in the XML and assign it either
    a numeric value or the name of an icon. The numeric range for badges is very specific;
    it is from 1 to 99\. If you set the value to less than 1, the badge won’t be displayed
    at all. Any value greater than 99 results in a badge showing 99.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ LAYOUTS AND TILES


