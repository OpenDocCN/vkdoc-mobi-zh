- fmt: "`ViewModel.State.bind(\"selectedItemIndex\", function (newValue) {`\n\n`WinJS.Utilities.empty(itemDetailTarget)`\n\
    \n`var url = newValue == -1 ? \"/html/noSelection.html\" : \"/pages/itemDetail/itemDetail.html\"\
    `\n\n`WinJS.UI.Pages.render(url, itemDetailTarget);`\n\n`});`\n\n`WinJS.UI.Pages.render(\"\
    /html/storeDetail.html\", storeDetailTarget);` \n\n`function setOrientationClass()\
    \ {`\n\n`if (Windows.UI.ViewManagement.ApplicationView.value == Windows.UI.ViewManagement.ApplicationViewState.fullScreenPortrait)\
    \ {`\n\n`WinJS.Utilities.addClass(contentGrid, \"flex\");`\n\n`} else {`\n\n`WinJS.Utilities.removeClass(contentGrid,\
    \ \"flex\");`\n\n`}`\n\n`};`\n\n`window.addEventListener(\"resize\", setOrientationClass);`\
    \ \n`setOrientationClass();`\n\n`});`\n\n`}`\n\nI have defined a function called\
    \ `setOrientationClass`, which reads the `value` property of the `ApplicationView`\
    \ object in the `Windows.UI.ViewManagement` namespace.\n\nThis property returns\
    \ one of the values defined in the `ApplicationViewState` object, which can also\
    \ be found in the `Windows.UI.ViewManagement` namespace; these values correspond\
    \ to the CSS media query properties and are `fullScreenLandscape`, `filled`, `snapped`,\
    \ and `fullScreenPortrait`. In my `setOrientationClass` function, I add a CSS\
    \ class called `flex` to the `contentGrid` element if the `value` property returns\
    \ `fullScreenPortrait`. For all of the other orientation and view values, I remove\
    \ the `flex` class.\n\nI use the `setOrientationClass` as the handler function\
    \ for the `resize` event, which is emitted by the DOM `window` object. You will\
    \ receive the `resize` event only when the user changes the view or orientation\
    \ after the app has changed, so I also call the `setOrientationClass` function\
    \ directly to ensure that I apply my CSS `flex` class if the app is started while\
    \ the device is in the portrait mode. To support this code, I have added the CSS\
    \ styles shown in Listing 4-4 to the `/css/default.css` file. You can respond\
    \ to the `resize` event in any way that makes sense in your app, but for the most\
    \ part, the easiest way to control the layout of a Windows 8 app is just the same\
    \ as for a regular web app: by adding and removing CSS classes and styles.\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-94_1.jpg)\n\n##\
    \ CHAPTER 4 ■ LAYOUTS AND TILES\n\n### ***Listing 4-4.*** Additions to the `/css/default.css`\
    \ File to Support JavaScript Orientation Changes\n\n```\n...\n\n#contentGrid.flex\
    \ {\n    display: -ms-flexbox;\n    -ms-flex-direction: column;\n    -ms-flex-align:\
    \ stretch;\n    -ms-flex-pack: start;\n}\n\n#contentGrid.flex > * {\n    background-color:\
    \ gray;\n    padding: 20px;\n    margin: 10px;\n    border: medium solid white;\n\
    }\n\n...\n```\n\nFor this example, I am relying on the flexbox layout feature,\
    \ which I describe in the “A Quick Introduction to CSS3 Flexbox layouts” sidebar.\
    \ You can see the effect of adapting to the orientation in this way in Figure\
    \ 4-5, which shows what happens when I put the Visual Studio simulator into a\
    \ portrait orientation.\n\n### ***Figure 4-5 .** Adapting to the portrait orientation\
    \ using JavaScript*\n\nAs you can see, the CSS I have applied changes the layout\
    \ of the app so that the functional areas are stacked vertically—a layout particularly\
    \ well suited to the portrait orientation.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 4 ■ LAYOUTS AND TILES\n\n### A QUICK INTRODUCTION TO CSS3 FLEXBOX\
    \ LAYOUTS\n\nIn Listing 4-4, I have applied the CSS3 *flexbox* layout, which is\
    \ more properly known as the flexible box layout. This is another part of CSS3\
    \ that has not yet been finalized and that is accessed through an `–ms` vendor\
    \ prefix, in this case `–ms-flexbox`.\n\nFlexbox layouts make it easy to create\
    \ fluid and adaptable layouts, in contrast to the precision offered by the grid\
    \ layout that I described in Chapter 1. In this sidebar, I provide you with a\
    \ very quick introduction to the basic features of CSS3 flexbox layouts.\n\nTo\
    \ create a flexbox layout, you must set the `display` property to `–ms-flexbox`\
    \ and specify how the child elements will be laid out, like this:\n\n```\n#contentGrid.flex\
    \ {\n    display: -ms-flexbox;\n    -ms-flex-direction: column;\n    -ms-flex-align:\
    \ stretch;\n    -ms-flex-pack: start;\n}\n```\n\nThe `–ms-flex-direction` property\
    \ specifies the direction that elements will be laid out. The most commonly used\
    \ values are `column` (which lays out elements top to bottom) and `row` (which\
    \ lays out elements left to right).\n\nThe `–ms-flex-pack` property specifies\
    \ how the elements will be laid out along the axis you have set with the `–ms-flex-direction`\
