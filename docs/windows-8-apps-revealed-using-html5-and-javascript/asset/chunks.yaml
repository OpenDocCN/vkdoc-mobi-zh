- fmt: '# CHAPTER 1 ■ GETTING STARTED


    **Tip** If this is the first time you have used Visual Studio, then you will be
    prompted to obtain a developer license and perform some other initial configuration
    steps.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-22_1.jpg)


    ***Figure 1-2 .** Creating the example project* **T**


    **Tip** Visual Studio includes templates preconfigured for some basic project
    scenarios. They are not much use, and, to my mind at least, they direct the programmer
    down a path that doesn’t reflect the strengths of HTML5 and JavaScript. I recommend
    starting with a blank project and building your app from the ground up, which
    is the approach I have taken in this book.


    The Solution Explorer shows the contents of the project, which you can see in
    Figure 1-3. The `References` folder contains the Microsoft JavaScript and CSS
    files that are required for Windows 8 development. The `default.html` file is
    the page that will be loaded when the app is started, and the `css`, `images`,
    and `js` folders contain the resources that the app will depend on.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-23_1.png)


    ***Figure 1-3 .** The blank example project as shown by the Solution Explorer*
    The essential files are `default.html`, `default.css`, and `default.js`. These
    files define the structure of the layout, the styles applied to it, and the code
    that manages the data and the interactions with the user. The fact that these
    files are the same ones you would generally see in web app development reflects
    the way in which Windows 8 app development embraces web development techniques
    and tools.


    In the sections that follow, I’ll show you each of the most important files in
    the project, explain what they do, and make some initial changes to create the
    structure I’ll need later in this book.


    ## Exploring the default.html File


    The `default.html` file is the one that Windows 8 loads when the Windows 8 app
    is started. You can change the start file by opening the `package.appxmanifest`
    file and changing the value for the Start Page setting, but I am going to stick
    with the default.


    Don’t worry about the rest of the `package.appxmanifest` file; I’ll come back
    to that in later chapters. Windows 8 HTML files are just like regular HTML files,
    and all of the HTML5 features and support available in Internet Explorer 10 are
    available for use in your Windows Store apps. Listing 1-2 shows the initial contents
    of `default.html` as created by Visual Studio.


    ***Listing 1-2.*** The Initial Contents of the `default.html` File


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <meta charset="utf-8" />

    <title>MetroGrocer</title>

    <!-- WinJS references -->

    <link href="//Microsoft.WinJS.1.0/css/ui-dark.css" rel="stylesheet" />

    <script src="//Microsoft.WinJS.1.0/js/base.js"></script>

    <script src="//Microsoft.WinJS.1.0/js/ui.js"></script>

    <!-- MetroGrocer references -->

    <link href="/css/default.css" rel="stylesheet" />

    <script src="/js/default.js"></script>

    </head>

    <body>

    <p>Content goes here</p>

    </body>

    </html>

    ```


    When Visual Studio creates the file, it adds `link` and `script` elements to import
    the core files that are required for a Windows 8 app. The `default.js` and `default.css`
    files are where you put the JavaScript and CSS styles for your project, and I’ll
    get to those files shortly. You can rename or replace these files as you see fit
    (as long as you change the `link` or `script` elements as well), but I will stick
    with the defaults to keep things simple.


    Visual Studio also adds some `link` and `script` elements that have nonstandard
    URLs, as follows:


    ```

    <link href="//Microsoft.WinJS.1.0/css/ui-dark.css" rel="stylesheet" />

    <script src="//Microsoft.WinJS.1.0/js/base.js"></script>

    <script src="//Microsoft.WinJS.1.0/js/ui.js"></script>

    ```


    The `base.js` and `ui.js` files contain the JavaScript code for the WinJS API,
    which you use to create JavaScript Windows Store apps. I’ll introduce some of
    the most useful parts of WinJS in later chapters.


    ### THE WORLD OF WINDOWS 8 APIS


    You have access to several different APIs when writing Windows Store apps. There
    is the Windows API, which is shared across all Windows Store apps, regardless
    of the language used to write them. There is the WinJS API, which is just for
    JavaScript Windows Store apps and which acts as a bridge between the capabilities
    of HTML/JavaScript and Windows. Finally, you have the standard Document Object
    Model API, which you can use to navigate the HTML markup in your app, register
    event handlers, and so on. JavaScript is a first-class citizen in the Windows
    8 world, and your web app development knowledge will be very useful as you start
    your development projects.


    For the most part, the WinJS API is where you will spend most of your development
    time, and this is my focus for the first part of this book. The Windows API comes
    into its own when you want to integrate your app into the wider Windows 8 platform,
    which I describe in Chapters 4 and 5.


    The `ui-dark.css` file contains the styles that Windows 8 uses for Windows Store
    apps, tailored for use with a dark color scheme (meaning white text on a dark
    background). There is a corresponding file called `ui-light.css` that you can
    use if you want to have dark text on a light background instead. The CSS files
    provide styles for all of the common HTML elements so that they fit into the Windows
    8 visual theme and are consistent with Windows Store apps written in other languages,
    such as C#/XAML. You can customize these styles by overriding them in your app,
    but for the most part, it is important to retain consistency with other Windows
    Store apps.


    **Tip** It is worth opening and reading these files. One of the nice things about
    developing Windows Store apps with web technologies is that you can read the source
    code for the WinJS library and the CSS files. You can’t edit the files, but you
    can see what is going on and, most usefully, set breakpoints in the WinJS code
    when using the debugger (which I demonstrate later in this chapter).


    The `body` element in the `default.html` file is created with a simple placeholder
    element. In Listing 1-3, you can see how I have replaced this element with the
    content for my app. My additions are shown in bold, and I will use these elements
    to provide the basic structure for the content layout.


    ***Listing 1-3.*** The Revised Contents of the `default.html` File


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <meta charset="utf-8" />

    <title>MetroGrocer</title>

    <!-- WinJS references -->

    <link href="//Microsoft.WinJS.1.0/css/ui-dark.css" rel="stylesheet" />

    <script src="//Microsoft.WinJS.1.0/js/base.js"></script>

    <script src="//Microsoft.WinJS.1.0/js/ui.js"></script>

    <!-- MetroGrocer references -->

    <link href="/css/default.css" rel="stylesheet" />

    <script src="/js/default.js"></script>

    </head>

    <body>

    <div id="contentGrid">

    <div id="leftContainer" class="gridLeft">

    <h1 class="win-type-xx-large">Left Container</h1>

    </div>

    <div id="topRightContainer" class="gridRight">

    <h1 class="win-type-xx-large">Top Right Container</h1>

    </div>

    <div id="bottomRightContainer" class="gridRight">

    <h1 class="win-type-xx-large">Bottom Right Container</h1>

    </div>

    </div>

    </body>

    </html>

    ```


    I have added a `div` element whose `id` is `contentGrid`. This will be the container
    for most of the content in my example app, and it contains three other `div` elements:
    `leftContainer`, `topRightContainer`, and `bottomRightContainer`. I’ll add content
    to these elements as we proceed through the book.'
