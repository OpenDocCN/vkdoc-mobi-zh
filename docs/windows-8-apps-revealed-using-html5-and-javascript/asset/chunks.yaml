- fmt: "# Data and Bindings\n\nIt took a while before I was happy using Internet Explorer–specific\
    \ features in my Windows Store apps, but some of them can be real time-saver,\
    \ and I find myself using this particular feature all the time. One word of caution,\
    \ though: if there is more than one element in the HTML with the same `id` attribute\
    \ value, then the value of the corresponding global variable is an array containing\
    \ all of the matching elements.\n\nThe result of adding the handler function is\
    \ that the user can enter a new zip code in the input element, and when the button\
    \ is clicked, the view model zip code value is updated. Since the update is applied\
    \ to an observable property, the content of the `span` element is updated automatically\
    \ to show the new value through its binding, as illustrated by Figure 2-2.\n\n\
    **Figure 2-2.** *Updating an observable value in the view model*\n\n**Tip** If\
    \ you have used a web app view model library such as Knockout.js, you might be\
    \ used to updating view model values by calling methods, like this: `ViewModel.UserData.homeZipCode(myNewValue)`.\
    \ Knockout uses methods to preserve compatibility with older browsers that don’t\
    \ support getters and setters, including most previous versions of Internet Explorer.\
    \ Internet Explorer 10, which is used to display HTML5 Windows Store apps, *does*\
    \ support getters and setters, which means you can assign values directly, just\
    \ as I did in the example.\n\n## Creating Observable Arrays\n\nMaking arrays observable\
    \ requires a little more effort. To begin with, you must use the `WinJS.Binding.List`\
    \ class to create a wrapper around the array you want to work with.\n\nListing\
    \ 2-9 shows the `List` class applied to my viewmodel in the `viewmodel.js` file.\n\
    \n**Listing 2-9.** *Using the List Class to Create Observable Arrays*\n\n```javascript\n\
    /// <reference path=\"//Microsoft.WinJS.1.0/js/base.js\" />\n/// <reference path=\"\
    //Microsoft.WinJS.1.0/js/ui.js\" />\n(function () {\n    \"use strict\";\n\n \
    \   var shoppingItemsList = new WinJS.Binding.List();\n    var preferredStoresList\
    \ = new WinJS.Binding.List();\n\n    WinJS.Namespace.define(\"ViewModel\", {\n\
    \        UserData: WinJS.Binding.as({\n            homeZipCode: null,\n      \
    \      getStores: function () {\n                return preferredStoresList;\n\
    \            },\n            addStore: function (newStore) {\n               \
    \ preferredStoresList.push(newStore);\n            },\n            getItems: function\
    \ () {\n                return shoppingItemsList;\n            },\n          \
    \  addItem: function (newName, newQuantity, newStore) {\n                shoppingItemsList.push({\n\
    \                    item: newName,\n                    quantity: newQuantity,\n\
    \                    store: newStore\n                });\n            }\n   \
    \     })\n    });\n\n    // statements to add test data removed for brevity\n\
    })();\n```\n\nCreating a `List` is simple, but you will encounter problems if\
    \ you try to do so within the scope of an object that has passed to the `WinJS.Binding.as`\
    \ method (there is a clash of assumptions over the value of the special `this`\
    \ variable). To avoid this problem, define your lists outside of the view model,\
    \ as I have done in the example.\n\nUsing a `List` object isn’t the same as using\
    \ an array. The most important difference is that you cannot use array indexers\
    \ to read or write data values. Instead, you must use the `getAt` and `setAt`\
    \ methods. Other array members, such as `push` and `pop`, are supported by `List`,\
    \ and there are some useful additions for sorting and projecting the contents\
    \ of `List` objects.\n\nAnother important difference is that you cannot access\
    \ array values using declarative bindings. Instead, you must set values in the\
    \ DOM using JavaScript and handle events emitted by the `List` object to keep\
    \ those values up-to-date. Listing 2-10 shows elements in the `default.html` file\
    \ that display the number of items in one of the view model lists and some buttons\
    \ to add and remove items.\n\n**Listing 2-10.** *Elements for Interacting with\
    \ a List Object*\n\n```html\n<div id=\"leftContainer\" class=\"gridLeft\">\n \
    \   <h1 class=\"win-type-xx-large\">Left Full Container</h1>\n    <div class=\"\
    win-type-x-large\">\n        The last item is <span id=\"listInfo\"></span>\n\
    \    </div>\n    <div class=\"win-type-x-large\">\n```"
