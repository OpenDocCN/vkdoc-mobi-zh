  raw: 'To switch to an application-specific search, click the app’s name on the list
    below the search box. This will send the search activated event to the app. For
    my example app, I have clicked the MetroGrocer item in the list, and the activated
    event triggers my simple search handler, the result of which is shown in Figure
    5-11 .


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-135_1.jpg)


    CHAPTER 5 ■ LIFE-CYCLE EVENTS


    ***Figure 5-11 .** Performing an application-specific search* **T**


    ■ **ip** If you start a search from the charms bar while your app is being displayed,
    then Windows will automatically select it from the list, focusing the initial
    search on your app.


    Summary


    In this chapter, I showed you how to use the life-cycle events to respond to the
    way in which Windows manages apps. I described each of the key events and showed
    you how to use the app layout to ensure that your app is receiving and processing
    them correctly.


    Particular care must be taken to cleanly wrap up background tasks when an app
    is being suspended, and I showed you how to get control of this process by requesting
    a suspension deferral, allowing an extra few seconds to minimize the risk of potential
    errors or stale data when the app is resumed.


    Finally, I showed you how the activated event is used to signal different requests,
    including obligations to fulfill the contracts that bind an app to the wider Windows
    platform. I showed you the search contract, but there are several others, and
    I recommend you take the time to explore them fully. The more contracts you implement,
    the more integrated your app becomes.


    In this short book, I set out to show you the core system features that will jump-start
    your Windows 8 app development. I have shown you how to use data bindings, how
    to use the major structural controls, how to deal with snapped and filled layouts,
    how to customize your application’s tile, and, in this chapter, how to take control
    of the application life cycle. With these skills as your foundation, you will
    be able to create rich and expressive apps and get a head start on Windows 8 development.


    I wish you every success in your Windows 8 app development projects.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


