    Dynamic Bindings


    The binding that I used in the previous example is *static* , meaning that there
    is no ongoing relationship between the value of the view model property and the
    value of the span element that contains the binding declaration. Static bindings
    are like a snapshot of a view model value. Once the snapshot has been taken, the
    value in the markup is fixed, even if the value of the property changes.


    *Dynamic bindings* , where property changes *do* result in updated elements, are
    more useful for most apps. In WinJS, declarative bindings are automatically dynamic
    when the data property they depend on is *observable* . To create an observable
    property, I have to use the WinJS.Binding.as method in my view model, as Listing
    2-4 shows.


