- fmt: '# Chapter 10: Monetizing via the Apple App Store


    This chapter will not cover what makes a good in-app purchase or whether your
    application should be free or available for a fee. It will cover the basics of
    setting up in-app purchases and explain the different types of purchases available.


    ## In-App Purchases


    In-app purchases are virtual items or services found within an app that are available
    for a fee. Many different applications take advantage of in-app purchases to make
    money—not just games. Some non-game examples include downloading articles or comics,
    cooking recipes, and detailed map data. Some in-game examples include additional
    levels, new powers, extra game money, and novelty items for customizing the look
    of the game.


    We will be continuing with our example code from the game Belt Commander. In Figure
    10–1, you can see the in-app purchase options for Belt Commander.


    In Figure 10–1, we see a screenshot from the game Belt Commander. There are three
    buttons, each specifying which type of actors should be present in the game when
    it is played. The game comes with asteroids available by default; the two buttons
    on the right are used to purchase additional types of actors in the game. The
    button in the middle is for saucers, which were already purchased but won’t be
    included in the next game (Inactive). The button to the right indicates that the
    user may choose to purchase the ability to include power-up actors in the game.
    The user initiates the purchase by clicking the button and walking through the
    purchase dialogs.


    L. Jordan, *Beginning iOS 5 Games Development* © Lucas Jordan 2011 [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Figure 10–1.** *In-app purchases in Belt Commander*


    Before we implement these features, we will look at the different types of in-app
    purchases available and how to enable in-app purchases in our application.


    ## Overview of Purchase Types


    There are four distinct types of in-app purchases, each supporting a different
    business need. If these four types of in-app purchases do not fit your business
    needs, you will have to roll your own. Writing your own in-app purchase service
    could be very time consuming. I would recommend seeing if your business needs
    can be adapted to fit Apple’s model. The benefit is not only a decrease in development
    time, but also there is a benefit the user. When you use Apple’s system, your
    user will see a familiar interface and login with a familiar set of credentials:
    their Apple ID. The four types of in-app purchases are as follows:


    - Non-consumable

    - Consumable

    - Subscriptions

    - Auto-renewing subscriptions


    Let’s take a closer look at each of the four types of in-app purchases.


    ### Non-consumable


    Non-consumable in-app purchases are items that are purchased once and grant persistent
    access to some item or service. Non-consumable items can be re-downloaded by the
    user, and should be available on all of the user’s devices. Non-consumable purchases
    can include additional game levels, new types of enemies to fight, or silly hats
    to customize your user’s game character.


    ### Consumable


    Consumable in-app purchases are designed to support items or services that are
    consumed. In a game, this might include additional lives, points for buying in-game
    items, or other things that can be used up. Consumable purchases are designed
    to be repeated.


    Consumable purchases cannot be downloaded again, so by their nature they will
    not be available across a user’s devices unless you implement your own server
    to share this information across accounts.


    ### Subscriptions


    Subscriptions are purchases with a time limit. After a given amount of time, the
    user will no longer have access to the purchase. These types of purchases might
    include access to articles, location information, or some other valuable set of
    data. Subscription purchases cannot be re-downloaded and must be repurchased to
    get the same service after a device restore (if backup fails) or on a second iOS
    device owned by the user.


    ### Auto-Renewing Subscriptions


    Auto-renewing subscriptions are purchases for items or services for a duration
    of time, much like regular subscriptions. The difference is that auto-renewing
    subscriptions are re-downloadable. They represent access to a service that is
    associated with the user, not the device. The user can access this purchase on
    any iOS device they own.


    Now let’s look at what is required to ready an application for in-app purchases.


    ## Preparing for In-app Purchases


    Much like Game Center, an application must be enabled in iTunes Connect to include
    in-app purchases. The requirements are exactly the same: you have to use an App
    ID that does not have a wildcard. In Chapter 9, we cover the process of creating
    an App ID in your provisioning center that works with Game Center. You can follow
    the directions to create a second App ID, or simply add in-app purchases to that
    same game.


    ## Enabling and Creating In-App Purchases


    Once you have an app in iTunes Connect, enabling in-app purchases is done by pressing
    the Manage In-App Purchases button, as shown in Figure 10–2.


    **Figure 10–2.** *Enabling In-app Purchases in iTunes Connect*


    In Figure 10–2, we see the view in iTunes Connect for configuring an application.
    Item A shows the button to click to enable in-app purchases. After clicking this
    button, you will be able to add items to your app that users may purchase. Figure
    10–3 shows the items I prepared for Belt Commander.


    **Figure 10–3.** *In-App purchases available for Belt Commander*


    In Figure 10–3, we see the screen in iTunes Connect where in-app purchases are
    listed. We can see that we added two: one for each additional type of actor the
    user can add to the game. For each in-app purchase, we see a reference name, a
    product ID, a product type, and the product status. The reference name is for
    internal use—it will not be seen by the user. The product ID is a unique name,
    used across all iOS applications, that identifies the purchase. The product ID
    will be how we reference this purchase in code.


    The type refers to the different purchase types we discussed earlier—in this case,
    non-consumable. The status value indicates what is required for this in-app purchase
    to be accepted by Apple. Apple must review each in-app purchase you create, much
    like how each app must be reviewed before sale. In this case, we are informed
    that Apple is waiting for screenshots of the purchase before it will review it.
    The screenshots are not shown to the user—they just give context to Apple about
    what the in-app purchase is. In Figure 10–4, we see the view in iTunes Connect
    that is used to create a new in-app purchase.


    **Figure 10–4.** *A new in-app purchase*


    Item A in Figure 10–4 shows where we enter our reference name for the in-app purchase.
    Item B shows the Product ID for the in-app purchase. In order for you to create
    the in-app purchase, you must provide the localized strings for the in-app purchase
    by clicking the Add Language button (item C).'
