    Note that we are creating UITapGestureRecognizer for each possible combination
    of taps and touches, instead of trying to use a single UITapGestureRecognizer
    to recognize the various combinations.


    Although it is possible in some cases to do this, everything works a lot better
    when you are as concise as possible with UIGestureRecognizers, as there are some
    subtle interactions between gesture recognizers. For example, the recognizer responsible
    for detecting triple taps has to cancel those responsible for double and single
    taps.


