    \ as the next section discusses.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00122.png)\n\n![](images/00344.jpeg)\n\n**CHAPTER 2: Setting Up Your\
    \ Game Project**\n\n**33**\n\n## Creating New IBOutlets from Interface Builder\n\
    \nAn `IBOutlet` is a connection between an item defined in a XIB file and a variable\
    \ declared in a class. To specify a field as an `IBOutlet`, you simply put the\
    \ keyword before the declaration of a field in a class’s header file. Another\
    \ way to create an `IBOutlet` is to create it through `Interface Builder`. Figure\
    \ 2–17 shows creating an `IBOutlet` in `Interface Builder`.\n\n**Figure 2–17.**\
    \ *Creating an IBOutlet in Interface Builder*\n\nIn Figure 2–17, we see the steps\
    \ to create an `IBOutlet` in `Interface Builder`. This is done by right-clicking\
    \ on the object you want to create an `IBOutlet` for (A), in this case the `Portrait\
