  trans: "\n# 我们也知道，在找到匹配行后，`CoinsController` 需要随机化所有匹配项，为用户的下一个回合做好准备。这是通过任务 `randomizeRows:`\
    \ 和 `randomizeCols:` 完成的。任务 `randomizeRows:` 如代码清单 4–19 所示。\n\n**代码清单 4–19.**\
    \ *`CoinsGame.m` (`randomizeRows:`)*\n\n```\n-(void)randomizeRows:(NSMutableArray*)matchingRows{\n\
    \n    for (NSNumber* row in matchingRows){\n\n        for (int c=0;c<colCount;c++){\n\
    \n            int index = [self indexForCoord:CoordMake([row intValue], c)];\n\
    \n            int newCoin = arc4random()%3;\n\n            [coins replaceObjectAtIndex:index\
    \ withObject:[NSNumber\nnumberWithInt:newCoin]];\n\n        }\n\n    }\n\n}\n\
    ```\n\n任务 `randomizeRows:` 接收一个填充了 `NSNumber` 对象的 `NSMutableArray`。每个 `NSNumber`\
    \ 代表一行。通过遍历每一行，我们为该行中的每个硬币设置一个新的随机值。\n\n`randomizeCols:` 的实现类似；我们只是对传入的列中的每个硬币进行随机化。\n\
