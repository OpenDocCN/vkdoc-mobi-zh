    \  \n\nIn Figure 8–8, we see a number of asteroids. These asteroids used to be\
    \ a single asteroid, but a few shake events caused it to break apart. The class\
    \ for this example is called `ShakeController` and extends `GameController`. There\
    \ is nothing particularly interesting about its header file, so let’s just jump\
    \ to its `doSetup` task, shown in Listing 8–30.\n\n**Listing 8–30.** *`ShakeController.m`\
    \ (`doSetup`)*\n\n```\n-(BOOL)doSetup{\n\nif ([super doSetup]){\n\n[self setGameAreaSize:CGSizeMake(320,\
    \ 480)];\n\nNSMutableArray* classes = [NSMutableArray new];\n\n[classes addObject:[Asteroid\
    \ class]];\n\n[self setSortedActorClasses:classes];\n\nreturn YES;\n\n}\n\nreturn\
    \ NO;\n\n}\n```\n\nIn Listing 8–30, we see the task `doSetup` that configures\
    \ the `ShakeController`, marking `Asteroid` as a class of `Actor` we will want\
    \ to get access to later. We add our `Asteroid` in the task `updateScene`. We\
    \ do this since we want to only add a new `Asteroid` when there are no `Asteroid`\
    \ objects in the scene, as can be seen in Listing 8–31.\n\n**Listing 8–31.** *`ShakeController`\
    \ (`updateScene`)*\n\n```\n-(void)updateScene{\n\nif ([[self actorsOfType:[Asteroid\
    \ class]] count] ==0 ){\n\nAsteroid* asteroid = [Asteroid asteroid:self];\n\n\
    [self addActor:asteroid];\n\n}\n\n[super updateScene];\n\n}\n```\n\nIn Listing\
    \ 8–31, we see the `updateScene` task that is called in order to move the game\
    \ forward through each step of the animation. In this task, we check to see if\
    \ there are `Asteroid` objects in the scene; if there are none, we go ahead and\
    \ add one. Lastly, we call the super implementation of `updateScene` to drive\
    \ the game forward.\n\nNow the question is, how do we respond to shake events\
    \ so we can blow up the asteroid? Informing the application that the top view\
    \ can become the “first responder” and implement the appropriate method to respond\
    \ to a motion event achieves this. A `UIView` that is the first responder is a\
    \ `UIView` that gets the first crack at interpreting user input. There are two\
    \ steps to getting a view to be first responder. First you have to inform the\
    \ application that the `view` property of a `UIViewController` can be the first\
    \ responder, and then you have to make a request to become first responder. Listing\
    \ 8–32 shows the code to accomplish this.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 211\n\n## CHAPTER 8: Building Your Game: Understanding Gestures and Movements\
    \  \n\n**Listing 8–32.** *`ShakeController` (first responder related tasks)*\n\
    \n```\n-(BOOL)canBecomeFirstResponder {\n\nreturn YES;\n\n}\n\n-(void)viewDidAppear:(BOOL)animated\
    \ {\n\n[super viewDidAppear:animated];\n\n[self becomeFirstResponder];\n\n}\n\n\
    - (void)viewWillDisappear:(BOOL)animated {\n\n[self resignFirstResponder];\n\n\
    [super viewWillDisappear:animated];\n\n}\n```\n\nIn Listing 8–32, we see three\
    \ tasks. The first task, `canBecomeFirstResponder`, simply informs the application\
    \ that the `view` property of this `UIViewController` is eligible to be first\
    \ responder, and that this `UIViewController` will handle its events. The next\
    \ two tasks are part of a `UIViewController`'s life cycle: `viewDidAppear:` is\
    \ called when this `UIViewController` instance’s `view` property is displayed;\
    \ when this happens we can become first responder by calling `becomeFirstResponder`.\
    \ Conversely, when this `UIViewController` is removed from the screen, we no longer\
    \ want this `UIViewController` to be first responder, so we call `resignFirstResponder`.\
    \ These three tasks simply make this class eligible to receive motion events;\
    \ these are handled in the implementation of the tasks `motionBegan:withEvent:`\
    \ and `motionEnded:withEvent:`. We only need to implement one of these in our\
    \ example; the implementation of `motionBegan:withEvent:` is shown in Listing\
    \ 8–33.\n\n**Listing 8–33.** *`ShakeController.m` (`motionBegan:withEvent:`)*\n\
    \n```\n- (void)motionBegan:(UIEventSubtype)motion withEvent:(UIEvent *)event\n\
    \n{\n\nif (motion == UIEventSubtypeMotionShake)\n\n{\n\nfor (Asteroid* asteroid\
    \ in [self actorsOfType:[Asteroid class]]){\n\n[asteroid doHit:self];\n\n}\n\n\
    }\n\n}\n```"
