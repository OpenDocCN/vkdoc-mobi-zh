- fmt: "\n在清单7-22中，我们看到构造函数`particleAt:WithRep:Steps:`相当直接。我们创建了一个新的`Particle`对象，并向其传入提供的`Representation`对象。我们还设置了`totalStepsAlive`属性，并创建了一个`ExpiresAfterTime`行为。请注意，`particle`被设置为`expire`的委托，这将导致每次执行`expires`时都会调用任务`stepsUpdated:In:`。\n\
    \n在任务`stepsUpdated:In:`中，我们仅根据粒子生命周期所处的阶段来调整其`alpha`值。在更复杂的粒子实现中，这种淡出行为将是可配置的，不仅限于开启或关闭，还包括粒子淡出的速率。在这个简单的实现中，每个粒子只是线性地淡出。\n\
    \n我们已经查看了`Asteroid`和`Particle`的实现，并发现在我们的场景中创建粒子效果非常简单。在下一节中，我们将查看`Comet`角色，并看到一个视觉上更引人注目的例子，尽管其实现同样简单。\n\
    \n## 创建基于矢量的粒子\n\n在前面的例子中，我们研究了由图像序列表示的粒子。由于我们有一种灵活的方式来渲染角色，我们可以同样轻松地创建通过程序绘制出来的粒子。在这个例子中，我们将创建停留在原地的粒子，但我们会移动它们被创建的点。这将为我们的`Comet`角色提供一个漂亮的发光尾巴，就像任何彗星应该有的那样。图7-5展示了我们的新角色——`Comet`。\n\
    \n**图7-5.** *彗星细节*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00284.png)\n\
    \n**176**\n\n**第7章：构建你的游戏：矢量角色与粒子**\n\n在图7-5中，我们看到一个彗星的放大细节图。它由许多粒子组成，每个粒子在原地慢慢淡出，从而产生彗星的尾巴。让我们看看`Comet`类，了解这个视觉效果是如何创建的。清单7-23展示了`Comet`类的头文件。\n\
    \n**清单7-23.** *Comet.h*\n\n```\nenum{\n    VARIATION_RED = 0,\n    VARIATION_GREEN,\n\
    \    VARIATION_BLUE,\n    VARIATION_CYAN,\n    VARIATION_MAGENTA,\n    VARIATION_YELLOW,\n\
    \    VARIATION_COUNT\n};\n\n@interface Comet : Actor<VectorRepresentationDelegate>\
    \ {\n}\n\n+(id)comet:(GameController*)controller;\n\n@end\n```\n\n在清单7-23中，我们看到`Comet`继承了`Actor`并遵循`VectorRepresentationDelegate`协议。有一个单一的构造函数，接受一个`GameController`作为唯一参数。让我们看看这个构造函数的实现，如清单7-24所示。\n\
    \n**清单7-24.** *Comet.m (comet:)*\n\n```\n+(id)comet:(GameController*)controller{\n\
    \    CGSize gameSize = [controller gameAreaSize];\n    CGPoint gameCenter = CGPointMake(gameSize.width/2.0,\
    \ gameSize.height/2.0);\n    float directionOffScreen = arc4random()%100/100.0\
    \ * M_PI*2;\n    float distanceFromCenter = MAX(gameCenter.x,gameCenter.y) * 1.2;\n\
    \    CGPoint center = CGPointMake(gameCenter.x +\n        cosf(directionOffScreen)*distanceFromCenter,\
    \ gameCenter.y +\n        sinf(directionOffScreen)*distanceFromCenter);\n    ImageRepresentation*\
    \ rep = [ImageRepresentation imageRep];\n    Comet* comet = [[Comet alloc] initAt:center\
    \ WithRadius:16 AndRepresentation:rep];\n    [rep setDelegate:comet];\n    [comet\
    \ setVariant:arc4random()%VARIATION_COUNT];\n    float direction = arc4random()%100/100.0\
    \ * M_PI*2;\n    LinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
    \ AtSpeed:1];\n    [motion setWrap:YES];\n    [comet addBehavior: motion];\n \
