  raw: 'UIGestureRecognizerStateBegan is the state when a gesture has started, but
    not yet changed or completed. For a pinch gesture, this would be when both fingers
    have landed on the screen. UIGestureRecognizerStateChanged is the state of gesture
    in progress. A gesture will be over when one of the three following states has
    occurred, UIGestureRecognizerStateEnded, UIGestureRecognizerStateCancelled, or
    UIGestureRecognizerStateFailed. The state UIGestureRecognizerStateEnded corresponds
    the successful completion of a gesture.


    UIGestureRecognizerStateCancelled is the state of a gesture that cannot be completed.


    UIGestureRecognizerStateFailed is the state of a gesture that has received touch
    events in contradiction to the gesture. The last state,


    UIGestureRecognizerStateRecognized, has the same value as


    UIGestureRecognizerStateEnded and simply provides a semantic difference that might
    be useful in code.


    While the states in Listing 8–7 provided a comprehensive description of the states
    a gesture recognizer can go through, not all gesture recognizers use all of these
    states.


    For example, UITapGestureRecognizer is known as a “discrete” gesture recognizer
    and does not report changes. Further, discrete gestures cannot fail or be cancelled.
    They simply call the selector task once, with the state of


    UIGestureRecognizerStateRecognized (e.g., UIGestureRecognizerStateEnded).


    It is possible to implement a new UIGestureRecognizer, but we will not be covering
    that.


    We will, however, take each gesture recognizer and explore how it works with an
    example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


