    **CHAPTER 6: Create Your Characters: Game Engine, Image Actors, and Behaviors**\
    \ **135**\n\n**Actor类**\n\n`Actor`类是游戏中所有演员的超类。它主要提供关于演员位置的信息，但也描述了指示演员在屏幕上如何行为和呈现的协议。在本节中，我们将看到`Actor`是如何实现的，然后是一些具体的例子。我们先来看看`Actor`类的头文件，如清单6–9所示。\n\
