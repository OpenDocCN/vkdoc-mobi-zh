    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **209**


    We are not going to go into the details of how the Comet class is implemented;
    we have discussed that at length already. If you are really interested, please
    review the source code provided.


    We have looked at the built-in gesture recognizers available in iOS and have explored
    the basics of how they work. In the next section, we will explore how movements
    of the device can be incorporated into an application.


    **Interpreting Device Movements**


    Starting with the iPhone 4, iOS devices have an accelerometer and a gyroscopic
    sensor built into them. There are several ways to use these sensors in an application.
    The two most common ways are to simply respond to a motion event, which corresponds
    to shaking the device. The other and more fine-tuned way is to access the orientation
    data of these sensors directly through the UIAccelerometer class. Let’s take a
    look at the shake example first.


    **Responding a to Motion Event (Shaking)**


    Whenever an iOS device is shaken, a motion event is generated for the application
    to consume. Personally, I find using the shake in an application to be super annoying;
    however, some people think it is a good idea, so let’s look at how we can take
    advantage of this feature. Figure 8–8 shows our example.


    **Figure 8–8.** *Asteroids breaking apart from a device shake*


