  trans: '

    ## **图 A–14.** *三种不同尺寸的硬币*


    在图 A–14 中，我们看到文件 `coin_circle0029` 的三种不同版本。通过提供这些不同分辨率，我们确保图像能以 1:1 的像素比例（图像像素与屏幕像素一一对应）进行渲染。这保证了我们尽最大努力来渲染这些图像。接下来，我们来了解一些用于创建图形资源的工具。


    ## **工具**


    以下是三款可用于创建精美图形资源的开源图形工具的简要介绍。这些工具是我在本书中创作大部分美术文件时使用的。这些工具不仅是开源的，而且可以在 Windows、OS
    X、Linux 以及其他平台上运行。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00152.png)


    ![](img/00190.jpeg)


    **附录 A：设计与创建图形**


    **301**


    ## **GIMP**


    GNU 图像处理程序（简称 GIMP）是一款开源的图像编辑应用程序。它提供了类似 Adobe Photoshop 的功能，而价格却低至免费。在游戏开发过程中，我们有必要拥有一款图像处理程序来处理众多任务。图
    A–15 展示了 GIMP 的一个示例。


    **图 A–15.** *在 GIMP 中调整飞船颜色*


    在图 A–15 中，我们看到了前面章节中的飞船在 GIMP 中打开的样子。GIMP 允许你调整图像的颜色以生成其变体。在图 A–15 中，我们从一个具有蓝色高光的飞船开始，并将其转换为绿色，或许是为了实现多人游戏场景。


    使用 GIMP (www.gimp.org)，你可以：


    - 查看图像

    - 裁剪图像

    - 调整图像大小

    - 调整颜色


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00243.png)


    ![](img/00262.jpeg)


    **302**


    **附录 A：设计与创建图形**


    - 合并图像

    - 精细调整图像

    - 执行游戏开发中其他上千种与图像相关的任务


    ## **Blender 3D**


    Blender 3D 是一款用于创建 3D 动画和辅助 3D 游戏开发的 3D 建模工具。对于 2D 游戏开发，Blender 提供了一种创建风格非常统一的美术资源的绝佳方式。我个人画画不太好，但我已经学会了如何在
    Blender 中“绘制”物体，并让它完成应用光照、阴影、反射以及从光线追踪图像中获得的其它酷炫效果等艰巨工作。图 A–16 展示了 Blender 的界面。


    **图 A–16.** *Blender 3D*


    在图 A–16 中，我们看到的是 Blender 的用户界面。老实说，Blender 需要学习的东西很多。但掌握这个应用程序的每一个新技术都非常有成就感。Blender
    的开发者最近对整个应用程序进行了改造，使其更易于使用。如果你过去尝试过 Blender 但感到沮丧，请再给它一次机会。它现在好用多了。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00295.png)


    ![](img/00333.jpeg)


    **附录 A：设计与创建图形**


    **303**


    使用 Blender (www.blender.org)，你可以：


    1. 创建在游戏中用作角色的 2D 图像

    2. 为过场动画预渲染高质量影片

    3. 渲染高质量背景图像

    4. 渲染图像序列以创建动画角色

    5. 创建等距瓦片集


    ## **Inkscape**


    Inkscape 是一款矢量绘图应用程序。虽然大多数游戏在运行时不会大量使用矢量绘图，但矢量编辑应用程序非常擅长进行所见即所得的布局。


    对于使用 GIMP 和 Blender 创建的所有精美艺术品的布局，Inkscape 无与伦比。图 A–17 展示了 Inkscape 应用程序。


    **图 A–17.** *Inkscape*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00391.png)


    **304**


    **附录 A：设计与创建图形**


    该图展示了我为《Belt Commander》应用程序欢迎界面所做的早期布局工作。如你所见，我导入了贯穿本书使用的星空背景图像，并开始添加标题文本。


    使用 Inkscape (http://inkscape.org)，你可以：


    1. 创建文本图像

