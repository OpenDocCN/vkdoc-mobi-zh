    if ([super doSetup]){


    [self setGameAreaSize:CGSizeMake(320, 480)];


    viper = [Viper viper:self];


    [self addActor:viper];


    UIAccelerometer* theAccelerometer = [UIAccelerometer sharedAccelerometer]; theAccelerometer.updateInterval
    = 1 / 50.0;


    theAccelerometer.delegate = self;


