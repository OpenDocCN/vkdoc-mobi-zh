    basic declarations, allowing a number of different views to be accessed. The IBOutletCollection
    definitions represent a new type of connection for us. An IBOutletCollection acts
    very much like an IBOutlet, except it allows you to connect multiple items to
    a single NSArray. In our case, we have two labels for displaying the score: landscape
    and portrait. Instead of having an IBOutlet (and variable) for each of these,
    we can simply use an IBOutletCollection, so the NSArray scoreLabels will contain
    both of these labels at runtime. When it is time to update the UI with a new score,
    we simply update the text of all of the UILabels in the array scoreLabels. We
    follow the same pattern for the labels that display the remaining turns, where
    each is stored in the NSArray remainingTurnsLabels.


    **Bringing the Views onto the Screen**


    That completes our overview of how the different views are defined. Now let’s
    take a look at how each of these views is brought onto the screen, starting with
    the Loading view.


    We know that the Main view for the class GameController is displayed when the
    application loads, just like it did in Chapter 2\. However, the Main view for
    GameController is empty—it is effectively the root component for our application.
    When we change views in the application, we will be adding and removing views
    from this root view. Listing 3–2 shows the viewDidLoad task from GameController,
    where we add the first view we want the user to see.


    **Listing 3–2.** *GameController.m (viewDidLoad)*


    - (void)viewDidLoad


    {


    [super viewDidLoad];


    [self.view addSubview:loadingView];


    NSOperationQueue *queue = [NSOperationQueue mainQueue];


    NSInvocationOperation *operation = [[NSInvocationOperation alloc]


    initWithTarget:self selector:@selector(loadImages) object:nil];


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00382.png)


    **CHAPTER 3: Explore the Game Application Life Cycle**


    **47**


    [queue addOperation:operation];


    [operation release];


    }


    The viewDidLoad tasks, as shown in Listing 3–2, is called when an instance of
    GameController is loaded from an XIB file. Because an instance of GameController
    is in each MainWindow XIB file, this happens as soon as the application starts.
    After calling the super implementation of viewDidLoad, which is required, we add
    the UIView loadingView to the main view of the GameController class. The task
    addSubview: displays the new sub-view at the location and size as define by the
    sub-views frame property. Because loadingView is defined in the XIB file, its
    frame is defined there.


    After we get the Loading view on the screen, we want to load any initial resources
    so we can prevent an untimed pause later in the application life cycle. It is
    not technically required in this app to load the images asynchronously, but if
    we wanted to display a progress bar, this would be required. In order to perform
    a task asynchronously, we get access to the main NSOperationQueue by calling mainQueue.
    An NSOperationQueue provides a context for our code to perform work on another
    thread. The class NSInvocationOperation is a way to define a unit of work. In
    our case, the unit of work is calling the task loadImages on this GameController
    object. So we initialize an NSInvocationOperation by calling the task initWithTarget:selector:object:
    and passing self, a selector for the task loadImages, and nil. Lastly, we get
    the execution started by calling addOperation: and passing the NSInvocationOperation.
    The loadImage task is shown in Listing 3–3.


    **Listing 3–3.** *GameController.m (loadImage)*


    -(void)loadImages{


    //sleeping so we can see the loading view. In a production app, don''t sleep :)


    [NSThread sleepForTimeInterval:1.0];


    [coinsController loadImages];


    [loadingView removeFromSuperview];


    [self.view addSubview:welcomeView];


