    **168**


    **第7章：构建你的游戏：矢量演员与粒子**


    **为你的游戏添加粒子系统**


    游戏中的粒子系统是由许多（通常是小尺寸的）图像组合在一起形成的集合，用以创造整体效果。粒子系统在计算机图形学中有许多不同的应用；一些常见的例子包括火、水、头发、草地等等。在我们的示例中，我们将创建一个名为`Particle`的新演员，用于绘制`Comet`演员，并通过使其看起来碎裂来改进我们的`Asteroid`演员。图7–3展示了这个新示例的运行效果。


    **图7–3.** *彗星与可摧毁的小行星*


    在图7–3中，我们看到三颗彗星穿过屏幕。我们还看到许多小行星处于不同的爆炸状态。小行星从屏幕外飘入，当你点击屏幕时，它们会爆炸成许多更小的小行星。除了创建新的、更小的小行星外，我们还会发射出许多看起来像小行星碎片的粒子。这为较大行星的毁灭增加了更多的真实感，因为大块的岩石很少能干净利落地碎成小块。这两种不同的粒子效果——彗星和小行星碎片——截然不同，但各自都使用相同的基类`Particle`实现。让我们仔细看看`Example03Controller`类，以便在深入了解每个新演员的细节之前，更好地理解这个示例的工作原理。清单7–14展示了`Example03Controller`的重要部分。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00119.png)


    **第7章：构建你的游戏：矢量演员与粒子**


    **169**


    **清单7–14.** *`Example03Controller.m` (`doSetup` 和 `updateScene`)*


    ```

    -(BOOL)doSetup{


    if ([super doSetup]){


    NSMutableArray* classes = [NSMutableArray new];


    [classes addObject:[Asteroid class]];


    [self setSortedActorClasses:classes];


    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(tapGesture:)];


    [tapRecognizer setNumberOfTapsRequired:1];


    [tapRecognizer setNumberOfTouchesRequired:1];


    [actorsView addGestureRecognizer:tapRecognizer];


    return YES;


    }


    return NO;


    }


    -(void)updateScene{


    if (self.stepNumber % (60*5) == 0){


    [self addActor:[Comet comet:self]];


    }


    if ([[self actorsOfType:[Asteroid class]] count] == 0){


    int count = arc4random()%4+1;


    for (int i=0;i<count;i++){


    [self addActor:[Asteroid asteroid:self]];


    }


    }


    [super updateScene];


    }

    ```


    在清单7–14中，我们看到了`Example03Controller`类的两个任务：`doSetup`和`updateScene`。`doSetup`任务遵循我们已经熟悉的模式，即通过调用`setSortedActorClass:`任务来识别我们想要高效访问的演员类，在本例中是`Asteroid`。我们还创建了一个名为`tapRecognizer`的`UITapGestureRecognizer`，并将其注册到`actorsView`对象上。通过这种方式，当我们点击屏幕时，`tapGesture:`任务将被调用。


    `updateScene`任务，如清单7–14所示，每五秒（`60*5`）添加一个新的`Comet`演员，并且每当场景中零个小行星时，添加一到四个`Asteroid`演员。与之前的示例一样，控制器类中的代码相对简单。示例中大部分真正的逻辑存在于不同的演员类中。在我们查看`Asteroid`类之前，先考虑一下`tapGesture:`任务，如清单7–15所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00179.png)


    **170**


    **第7章：构建你的游戏：矢量演员与粒子**


    **清单7–15.** *`Example03Controller.m` (`tapGesture:`) *


    ```

    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{


    for (Asteroid* asteroid in [self actorsOfType:[Asteroid class]]){


    [asteroid doHit:self];


    }


    }

    ```


    在清单7–15中，我们看到`tapGesture:`任务会在用户点击屏幕时被调用。它只是遍历场景中的每一个`Asteroid`，并对其调用`doHit:`。正是因为这个任务，我们才需要确保能够方便地访问场景中的`Asteroid`。


    以下部分描述了`Asteroid`演员的实现细节，以及每个`Asteroid`爆炸时产生的粒子效果。


    **简单粒子系统**


    最简单的粒子系统涉及在屏幕上创建一堆短命的元素，这些元素相对较快地衰减或消失。让我们来看看`Asteroid`类，并了解如何创建一个非常简单的粒子效果。


    **`Asteroid`类**


    在我们研究如何为`Asteroid`的毁灭添加粒子效果之前，让我们花点时间全面了解`Asteroid`类。这将为我们理解粒子效果，同时构建另一个`Actor`类提供上下文。`Asteroid`类的头文件如清单7–16所示。


    **清单7–16.** *`Asteroid.h`*


    ```

    @interface Asteroid : Actor{


    }


    @property (nonatomic) int level;


    +(id)asteroid:(GameController*)aController;


    +(id)asteroidOfLevel:(int)aLevel At:(CGPoint)aCenter;


    -(void)doHit:(GameController*)controller;


    @end

    ```


    在清单7–16中，我们看到了`Asteroid`类的声明。我们看到`Asteroid`类扩展了`Actor`，并有两个构造函数。构造函数`asteroid:`被`Example03Controller`用来将最大的小行星添加到场景中。构造函数`asteroidOfLevel:At:`用于在点击事件后调用的`doHit:`任务中创建和添加更小的小行星。清单7–17展示了`Asteroid`类的第一个构造函数。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00301.png)


    **第7章：构建你的游戏：矢量演员与粒子**


    **171**


    **清单7–17.** *`Asteroid.m` (`asteroid:`) *


    ```

    +(id)asteroid:(GameController*)acontroller{


    CGSize gameSize = [acontroller gameAreaSize];


    CGPoint gameCenter = CGPointMake(gameSize.width/2.0, gameSize.height/2.0); float
    directionOffScreen = arc4random()%100/100.0 * M_PI*2;


    float distanceFromCenter = MAX(gameCenter.x,gameCenter.y) * 1.2;


    CGPoint center = CGPointMake(gameCenter.x +


    cosf(directionOffScreen)*distanceFromCenter, gameCenter.y +


    sinf(directionOffScreen)*distanceFromCenter);


    return [Asteroid asteroidOfLevel:4 At:center];


    }

    ```


    在清单7–17中，我们看到了`asteroid:`任务，它通过调用另一个构造函数创建了一个大小为4的新`Asteroid`。大部分工作只是为`Asteroid`找到一个屏幕外的起始点。这与第6章中用于查找`Powerup`演员点的代码相同。详细信息可参见图6-3。`Asteroid`的第二个构造函数如清单7–18所示。


    **清单7–18.** *`Asteroid.m` (`asteroidOfLevel:At:`) *


    ```

    +(id)asteroidOfLevel:(int)aLevel At:(CGPoint)aCenter{


    ImageRepresentation* rep = [ImageRepresentation


    imageRepWithDelegate:[AsteroidRepresentationDelegate instance]];


    [rep setBackwards:arc4random()%2 == 0];


    if (aLevel >= 4){


    [rep setStepsPerFrame:arc4random()%2+2];


    } else {


    [rep setStepsPerFrame:arc4random()%4+1];


    }


    Asteroid* asteroid = [[Asteroid alloc] initAt:aCenter WithRadius:4 + aLevel*7


    AndRepresentation:rep];


    [asteroid setLevel:aLevel];


    [asteroid setVariant:arc4random()%AST_VARIATION_COUNT];


    [asteroid setRotation: (arc4random()%100)/100.0*M_PI*2];


    float direction = arc4random()%100/100.0 * M_PI*2;


    LinearMotion* motion = [LinearMotion linearMotionInDirection:direction AtSpeed:1];


    [motion setWrap:YES];


    [asteroid addBehavior:motion];


    return asteroid;


    }

    ```'
