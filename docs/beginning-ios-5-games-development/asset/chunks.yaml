    This lets us put all of our orientation logic in one place, because we don’t have
    to deal with the special case of initialization. However, depending on whether
    this is the first time shouldAutorotateToInterfaceOrientation: is called, the
    state of these objects will be different. For example, the first time this task
    is called, neither the portraitView nor the landscapeView are attached to the
    scene, so the call to removeFromSubview will be a non-operation, without error.
    When this task is called on subsequent rotations, rockPaperScissorsController’s
    view will be attached to the scene; however, when a view is added as a subview,
    it is automatically removed from its parent view, if it has one.


    The fact that removeFromSuperview and addSubview: have these reasonable default
    behaviors makes life pretty easy when it comes to manipulating views. It cuts
    down on error-prone clean-up code.


    If you run the project, you will see the app running on both the iPad and the
    iPhone, changing its layout based on orientation.


    **Summary**


    In this chapter, we looked at how to create an Xcode project suitable for developing
    a universal application. We explored the initialization process of an iOS application,
    and saw where to start modifying the project to create the application we want.
    We looked at how XIB files and classes interact, and at how iOS exploits MVC with
    the UIViewController class. We created an application that seamlessly supports
    running on an iPhone or an iPad in all orientations, setting the stage for game
    development.


