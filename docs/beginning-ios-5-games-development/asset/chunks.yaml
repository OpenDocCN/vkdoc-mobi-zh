    # 在清单 9–8 中，我们看到由 `FBSessionDelegate` 定义、`RootViewController` 实现的任务 `fbDidLogin`。当用户成功通过身份验证时，会调用此任务。为了优化用户体验，我们将访问令牌和到期日期记录在标准用户默认设置中，以便在下次应用程序启动时能够检索它们，如清单
    9–7 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00116.png)


    ![](img/00131.jpeg)


    **234**


    # 第 1 章：App Cubby


    ## 通过 Facebook 进行身份验证


    一旦 `Facebook` 对象被创建并配置好，我们就可以进行身份验证了。在我们的示例应用程序中，我们将让用户点击欢迎屏幕上的 Facebook 按钮来进行身份验证。在其他应用程序中，也许在其它时间尝试进行身份验证更合理。只要你在使用
    `Facebook` 对象执行任何其他操作之前进行身份验证，具体何时验证其实并不重要。清单 9–9 展示了身份验证代码。


    **清单 9–9.** *RootViewController.m (facebookButtonClicked:)*


    ```

    - (IBAction)facebookButtonClicked:(id)sender {


    NSMutableArray* permissions = [NSMutableArray new];


    [permissions addObject: @"publish_stream"];


    [permissions addObject:@"publish_checkins"];


    [permissions addObject:@"user_about_me"];


    [facebook authorize:permissions];


    }

    ```


    在清单 9–9 中，我们看到了点击 Facebook 按钮时调用的代码。在此任务中，我们创建了一个 `NSMutableArray`，其中包含我们请求的每个
    Facebook 权限的 `NSString` 实例。在本例中，我们希望能够发布到信息流、发布签到信息以及获取用户的一些基本信息。这些基本上是该应用程序的示例权限——我们真正需要的只是
    `publish_stream`。权限数组被简单地传递给 `authorize`，后者随后会调出任何适当的授权机制，无论是原生 Facebook、Safari，还是弹出窗口中的
    `UIWebView`。


    如前所述，为了支持原生 Facebook 身份验证或 Safari 身份验证，应用程序必须配置为打开一个 URL，该 URL 将 Facebook 应用程序名称作为
    URL 的协议部分。图 9–16 显示了此配置的第一步。


    **图 9–16.** *设置 `URL types` 以响应具有给定协议的 URL*


    在图 9–16 中，我们看到了 Xcode 中信息面板的一部分。我们添加了一个类型为数组的新行，名为 `URL types`。在该数组的第一项中，我们添加了一个字典，其中包含另一个名为
    `URL Schemes` 的数组。`URL Schemes` 中的第一项值为 `fb[your_fb_app_id]`，如图所示，其应用 ID 对应 Facebook
    应用程序 Belt Commander。配置应用程序以正确使用 Facebook 进行身份验证的下一步是让应用程序委托响应 `application:handleOpenURL:`，如清单
    9–10 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00232.png)


    **第 1 章：App Cubby**


    **235**


    **清单 9–10.** *AppDelegate.m (application:handleOpenURL:)*


    ```

    -(BOOL)application:(UIApplication *)application handleOpenURL:(NSURL *)url{


    UIWindow* window = [application.windows objectAtIndex:0];


    RootViewController* rvc = (RootViewController*)[window rootViewController]; Facebook*
    facebook = [rvc facebook];


    return [facebook handleOpenURL:url];


    }

    ```


    在清单 9–10 中，我们看到了由 `AppDelegate` 定义的任务 `application:handleOpenURL:`。当 Safari 或原生
    Facebook 应用程序试图将控制权交还给我们的应用程序时，会调用此任务。通过在我们 `Facebook` 对象上调用 `handleOpenURL` 并传入
    URL，我们完成了 Facebook 身份验证设置。当这被调用时，`fbDidLogin` 将被调用（来自清单 9–8），并且我们可以记录身份验证信息。更重要的是，我们现在可以代表我们的用户进行
    Facebook API 调用。接下来我们来看看这个。


    ## Facebook API 调用


    既然我们已经了解了如何设置 Facebook 进行身份验证，我们想进一步探讨如何使用 Facebook 进行 API 调用。这才是我们想要在应用程序中集成
    Facebook 的真正原因。Facebook 提供了许多有用的任务来配合其社交图谱 API 执行操作。我们不打算涵盖此 API 的所有细节。Facebook
    的优秀文档可以在以下位置找到：


    [`developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/).


    在我们的示例应用程序中，我们将在每次游戏结束时发布一条消息，报告我们的得分。实现此功能的代码如清单 9–11 所示。


    **清单 9–11.** *RootViewController.m (notifyFacebook)*


    ```

    -(void)notifyFacebook{


    if ([facebook isSessionValid]){


    NSString* desc = [[@"I just scored " stringByAppendingFormat:@"%i",


    [beltCommanderController score]] stringByAppendingString:@" points, on Belt Commander"];
    NSString* appLink = @"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8";


    NSMutableDictionary* params = [NSMutableDictionary dictionaryWithObjectsAndKeys:
    FB_APP_ID, @"app_id",


    appLink, @"link",


    @"Presented by ClayWare Games, LLC", @"caption", desc, @"description",


    @"A new high score!", @"message",


    nil];


    [facebook requestWithGraphPath:@"me/feed" andParams:params andHttpMethod:@"POST"


    andDelegate:self];


    }


    }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00287.png)


    ![](img/00277.jpeg)


    **236**


    **第 1 章：App Cubby**


    在清单 9–11 中，我们看到了由 `RootViewController` 定义的任务 `notifyFacebook`。此任务在每场游戏结束时被调用。我们做的第一件事是检查用户是否已经通过
    Facebook 进行了身份验证。如果她已认证，那么我们将消息的所有部分组装到一个 `NSMutableDictionary` 中。将包含的唯一项是键为 `app_id`
    的 Facebook 应用程序 ID。请注意，我们还包含了一个指向我们应用程序 iTunes Store 页面的链接；这有望从我们用户的 Facebook
    好友那里带来更多的下载量。


    一旦消息的所有部分都组装完毕，我们只需调用 `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`。通过指定
    POST，我们表明我们希望将此内容发布到用户的信息流（`me/feed`），而无需用户交互。通过将委托设置为 `self`，如果此操作成功（或失败），我们将收到通知。在这个简单的示例中，我们实际上并不关心它是否成功。如果一切顺利，用户将看到类似图
    9–17 的内容。


    **图 9–17.** *在 Facebook 上成功发布*


    在图 9–17 中，我们看到发布到我 Facebook 页面的帖子成功了。如我之前所说，你可以用 Facebook 做更多事情，我鼓励读者深入研究一下。


    正如我们所见，Facebook API 不像内置的 Twitter 支持那样易于使用。但我仍然认为，一旦你第一次完成整个过程，它就相当简单了。看看 Facebook
    是否会像 Twitter 那样获得苹果 iOS 开发人员的同等待遇，这将会很有趣。


    ## 摘要


    在本章中，我们探讨了 Game Center，并介绍了它为用户提供的服务。我们通过 `GameKit` 探讨了这些功能，了解了如何将用户的分数发布到排行榜以及颁发成就。延续社交趋势，我们研究了
    iOS 5 中对 Twitter 的内置支持。最后，我们探讨了如何将 Facebook 集成到 iOS 应用程序中。我们涵盖了如何处理身份验证，以及如何向用户的信息流发布简单的消息。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00077.png)


    ![](img/00173.png)


    # 第 10 章


    ## 通过 Apple App Store 实现货币化


    在 Apple App Store 中通过应用程序赚钱主要有三种方式。最明显的方式就是直接为应用程序收费。第二种是免费提供应用程序，但包含广告。另一种适用于免费和付费应用程序的方式，是在应用程序内销售物品。这被称为应用内购买，在某些类型的游戏中非常流行。

