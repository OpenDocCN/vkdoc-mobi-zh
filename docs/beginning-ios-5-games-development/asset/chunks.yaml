    This header file starts by defining two enumerations. The first enumeration defines
    the values for the two states of Powerup, STATE_GLOW or STATE_NO_GLOW. The second
    enumeration defines the values for the three variations of Powerup. Both of these
    enumerations end with a value that has the word COUNT in it. For those developers
    who are not coming from a C background, this is an old trick used to create a
    constant for the number of items in an enumeration. For example, in the first
    enumeration, STATE_GLOW has a value of 0, so STATE_NO_GLOW has a value of 1\.
    This gives PWR_STATE_COUNT a value of 2, which is the number of states there are.
    Clever, no?


    The class Powerup as defined in Listing 6–12 extends Actor. It also conforms to
    the protocols ImageRepresentationDelegate and ExpireAfterTimeDelegate. We will
    look at the tasks that come with these protocols when we look at the details of
    the ImageRepresentation and ExpireAfterTime. The only new task defined for the
