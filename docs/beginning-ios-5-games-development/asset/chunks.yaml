    \ `STATE_GLOW` 切换为 `STATE_NO_GLOW`，反之亦然。\n\n更改状态就足以改变代表 `Powerup` 演员的图像，因为（回顾清单\
    \ 6-10）我们知道设置演员的状态会将其 `needViewUpdated` 属性置为 `YES`。此外，如果演员的 `needViewUpdated`\
    \ 属性为 `YES`，并且该演员正在使用 `ImageRepresentation`，那么该 `ImageRepresentation` 会在任务 `updateView:In:`\
    \ 中为演员获取正确的图像（如前文清单 6-19 所示）。\n\n## 总结\n\n在本章中，我们研究了我们基础游戏引擎中的类 `GameController`\
    \ 和 `Actor`，并学习了如何使用这些类创建一个简单的场景来演练我们的新演员——增益道具。我们探讨了协议 `Behavior`，它为我们提供了一个框架，用于创建可复用的游戏逻辑片段以应用于我们的演员。我们还将渲染基于图像的演员所需的逻辑整合到了类\
    \ `ImageRepresentation` 中。这同时也为下一章将要讨论的基于矢量的演员奠定了基础。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00361.png)\n\n![](img/00397.png)\n\n# **第 7 章**\n\n# **构建你的游戏：矢量演员与粒子系统**\n\
    \nCore Graphics 是一个强大的二维绘图库，负责渲染 iOS 和 OS X 的很大一部分内容。在本章中，我们将了解如何使用这个库在我们的游戏中绘制演员。目标是让演员能够根据游戏状态动态绘制。为了说明这一点，我们将创建两个使用\
    \ Core Graphics 绘制的示例演员：一个用于显示演员剩余生命值的生命条，以及一个根据其威力大小以特定颜色绘制的子弹。这两个示例将说明如何在简单游戏引擎的上下文中使用\
    \ Core Graphics。\n\n我们将通过创建一个名为 `VectorRepresentation` 的新类来实现这一点，该类与上一章中的类 `ImageRepresentation`\
    \ 类似。类 `VectorRepresentation` 将用于创建一个 `UIView` 来代表我们的演员，并使用 Core Graphics 的自定义代码进行绘制。"
- fmt: "# We’ll also look at another popular technique used in games to create a compelling\
    \ visual: the particle system. Stated simply, a particle system is anything in\
    \ a game that generates lots of little graphics that, when composed on the screen,\
    \ create an overall effect more interesting than the sum of its parts. Particle\
    \ systems are used in games to create fire effects, water effects, and spell effects,\
    \ to name a few.\n\nIn this chapter, we use particle systems to create comets\
    \ that are composed of a large number of simple particle actors to give the comets\
    \ a glowing, fluid feel. We are also going to use this technique to illustrate\
    \ a little realism when an asteroid breaks apart.\n\nThe sample code for this\
    \ chapter can be found in the Xcode project `Sample 06+07`.\n\nL. Jordan, *Beginning\
    \ iOS 5 Games Development*\n\n©\n\nLucas Jordan 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Saucers, Bullets, Shields, and Health Bars\n\nIn this example, we will look\
    \ at four new actors: saucers, bullets, shields, and health bars. The code for\
    \ this section is found under the group `Example 2`, in the Xcode project `Sample\
    \ 06+07`.\n\nThe health bar and bullet actors will be rendered programmatically\
    \ with Core Graphics instead of using a pre-rendered image. The other actors—saucers\
    \ and shields—exist in this example to provide a little context (got to have something\
    \ to shoot with the bullets) and flesh out our example from the last chapter in\
    \ terms of behaviors. Figure 7–1 shows the saucers, bullets, shields, and health\
    \ bars in action.\n\n**Figure 7–1.** *Saucers, bullets, shields, and health bars*\
    \ In Figure 7–1, we see a flying saucer in the middle of the screen. Coming from\
    \ the right and traveling left are a number of circular bullets. The bullets come\
    \ in three different sizes, which reflect their potential for damage. If a bullet\
    \ collides with the saucer, a shield effect is added to the flying saucer and\
    \ the health bar goes down, indicating the damage done. In this example, the bullets\
    \ will keep coming until the saucer’s health is zero, at which point it is removed\
    \ and a new flying saucer is added. Figure 7–2 shows the three difference saucers\
    \ used in this example, as well as the graphic used for the shield.\n\n**Figure\
    \ 7–2.** *Three saucers and a shield*\n\nThe shield image is partially transparent\
    \ and is designed be drawn over a saucer, as can be seen in the scaled up saucer\
    \ with the shield drawn over it.\n\nTo understand how all the parts and pieces\
    \ of this example fit together, we will start by looking at the implementation\
    \ of the class `Example02Controller`, starting with the `doSetup` task, shown\
    \ in Listing 7–1.\n\n**Listing 7–1.** *Example02Controller.m (doSetup)*\n\n```\n\
    -(BOOL)doSetup\n{\n    if ([super doSetup]){\n        NSMutableArray* classes\
    \ = [NSMutableArray new];\n        [classes addObject:[Saucer class]];\n     \
    \   [classes addObject:[Bullet class]];\n        [self setSortedActorClasses:classes];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\nIn Listing 7–1, we see\
    \ the `doSetup` task of the class `Example02Controller`. This method simply indicates\
    \ that we want to keep actors of type `Saucer` and `Bullet` sorted for easy access\
    \ later on. We do this by creating an `NSMutableArray` called `classes` and adding\
    \ the class objects for two classes in which we are interested. The `NSMutableArray\
    \ classes` are then passed to `setSortedActorClasses:`. This way, when we call\
    \ `actorsOfType:` in the future, we will not have to sort through all of the actors\
    \ to find them. Next, we want to take a look at the code that describes the action\
    \ in this example that is found in the task `updateScene` of class `Example02Controller`.\
    \ See Listing 7–2.\n\n**Listing 7–2.** *Example02Controller.m (updateScene)*\n\
    \n```\n-(void)updateScene{\n    NSMutableSet* suacers = [self actorsOfType:[Saucer\
    \ class]];\n    if ([suacers count] == 0){\n        Saucer* saucer = [Saucer saucer:self];\n\
    \        [self addActor: saucer];\n    }\n    if (self.stepNumber % (30) == 0){\n\
    \        float direction = M_PI - M_PI/30.0;\n        float rand = (arc4random()%100)/100.0\
    \ * M_PI/15.0;\n        direction += rand;\n        Bullet* bullet = [Bullet bulletAt:CGPointMake(1000,\
    \ 768/2)\n                         WithDirection:direction];\n        [self addActor:\
    \ bullet];\n        if (arc4random()%4 == 0){\n            if (arc4random()%2\
    \ == 0){\n                [bullet setDamage:20.0];\n            } else {\n   \
    \             [bullet setDamage:30.0];\n            }\n        }\n    }\n    NSMutableSet*\
    \ bullets = [self actorsOfType:[Bullet class]];\n    for (Bullet* bullet in bullets){\n\
    \        for (Saucer* saucer in suacers){\n            if ([bullet overlapsWith:saucer]){\n\
    \                [saucer doHit:bullet with:self];\n            }\n        }\n\
    \    }\n    [super updateScene];\n}\n```\n\nIn Listing 7–2, we first get all instances\
    \ of `Saucer` in the scene and check to see if any exist. If none do, we create\
    \ a new `Saucer` and add it to the scene with the `addActor:` task. This insures\
    \ that there is always exactly one `Saucer` in the middle of the screen.\n\nThen,\
    \ every 30 steps, we create a new `Bullet` using the task `bullatAt:WithDirection:`.\
    \ The location of the bullet is specified in game coordinates, and the right-most\
    \ point at the vertical center. The direction specified will cause the bullet\
    \ to travel toward the left, possibly hitting the saucer. Once the bullet is added\
    \ to the scene, the damage is randomly assigned.\n\nThe last thing the `updateScene`\
    \ task does is check to see if any bullet has collided with the saucer. This is\
    \ done by calling `actorsOfType:` and getting all `Bullet` objects in the scene\
    \ stored in the `NSMutableSet* bullets`. We simply iterate over each bullet and\
    \ saucer and check if there is a hit by calling `overlapsWith:`. If there is a\
    \ hit, we call the `doHit:with:` task on `saucer`.\n\nLet’s take a closer look\
    \ at the implementation of the actor classes used in this example.\n\n## The Actor\
    \ Classes\n\nIn this section, we learn about the `Saucer` actor and the `HealthBar`\
    \ Actor classes. The `HealthBar` is different from other Actors we have looked\
    \ at up until this point. It is different because its location in the scene is\
    \ dependent on the location of another Actor, in this case, a `Saucer`. Once we\
    \ have reviewed the classes `Saucer` and `HealthBar`, we will look at the `Behavior`\
    \ class `FollowActor` and see how we implement this feature.\n\n### Instantiating\
    \ the Saucer Class\n\nWe will start by looking at the constructor for the class\
    \ `Saucer`. We want to start with the `Saucer`'s constructor, because this is\
    \ where we create the `HealthBar`. In this way, we don’t have to worry about adding\
    \ a `HealthBar` when we create a new `Saucer`, because one will be created automatically\
    \ every time we create a `Saucer`. The constructor for `Saucer` is shown in Listing\
    \ 7–3.\n\n**Listing 7–3.** *Saucer.m (saucer:)*\n\n```\n+(id)saucer:(GameController*)controller{\n\
    \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint gameCenter\
    \ = CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);\n    ImageRepresentation*\
    \ rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2\
    \ == 0];\n    [rep setStepsPerFrame:3];\n    Saucer* saucer = [[Saucer alloc]\
    \ initAt:gameCenter WithRadius:32\n                          AndRepresentation:rep];\n\
    \    [rep setDelegate:saucer];\n    [saucer setVariant:arc4random()%VARIATION_COUNT];\n\
    \    [saucer setMaxHealth:100];\n    [saucer setCurrentHealth:100];\n    HealthBar*\
    \ healthBar = [HealthBar healthBar:saucer];\n    [healthBar setPercent:1];\n \
    \   [saucer setHealthBar:healthBar];\n    [controller addActor:healthBar];\n \
    \   return saucer;\n}\n```"
  raw: 'We’ll also look at another popular technique used in games to create a compelling
    visual: the particle system. Stated simply, a particle system is anything in a
    game that generates lots of little graphics that, when composed on the screen,
    create an overall effect more interesting than the sum of its parts. Particle
    systems are used in games to create fire effects, water effects, and spell effects,
    to name a few.


    In this chapter, we use particle systems to create comets that are composed of
    a large number of simple particle actors to give the comets a glowing, fluid feel.
    We are also going to use this technique to illustrate a little realism when an
    asteroid breaks apart.


    The sample code for this chapter can be found in the Xcode project Sample 06+07.


    L. Jordan, *Beginning iOS 5 Games Development*


    ©


    Lucas Jordan 2011


