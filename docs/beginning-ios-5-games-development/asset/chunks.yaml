- fmt: 'We now want to create some buttons that enable us to navigate from one view
    to the other. The first step is to add the buttons, and then to configure the
    navigation. Figure 1–7 shows these views being wired up for navigation.


    **Figure 1–7.** *Storyboard with navigation*


    In Figure 1–7, we see that we have dragged a `UIButton` from the library item
    A onto each of the views. We gave the `UIButton` on the left the label Play, and
    the `UIButton` on the right the label Back. To make the Play button navigate to
    the view on the right, we right-drag from the Play button (item B) to the view
    on the right and release at item C. When we do this, a context dialog pops up,
    allowing us to select which type of transition we want. I selected Model. We can
    repeat the process for the Back button: right-drag it to the view on the left
    and select which transition you want for the return trip. You can run the application
    at this point and navigate between these two views. In order to make it a game,
    though, we need to include the Rock, Paper, Scissors view and buttons.


    ## Adding the Rock, Paper, Scissors View


    To add the Rock, Paper, Scissors view, we need to include a class from the sample
    code in the project you are building. The easiest way to do this is to open the
    sample project and drag the files `RockPaperScissorsView.h` and `RockPaperScissorsView.m`
    from the sample project to the new project. Figure 1–8 shows the dialog that pops
    up when you drag files into an Xcode project.


    **Figure 1–8.** *Dragging files into an Xcode project*


    In Listing 1–8, we see the dialog confirming we want to drag new files into an
    Xcode project. Be sure the Destination box is checked. Otherwise, the Xcode will
    not copy the files to the location of the target project. It is good practice
    to keep all project resources under the root folder of a project. Xcode is flexible
    enough to not require that you do this, but I have been burned too many times
    by this flexibility. Anyway, now that we have the required class in our project
    let’s wire up our interface to include it.


    ## Customizing a UIView


    The last step in creating a simple application is to create a new `UIView` in
    our interface that is of the class `RockPaperScissorsView`. Figure 1–9 shows how
    this is done.


    **Figure 1–9.** *A customized UIView*


    In Figure 1–9, we see a `UIView` added to the view on the right. We did this by
    dragging the icon from item A onto the storyboard in item B. After adjusting the
    size of the new `UIView`, we set its class to be `RockPaperScissorsView`, as shown
    in item C. At this point, we are technically done. You have created our first
    game! Obviously, we have not looked at the implementation of `RockPaperScissorsView`,
    which is discussed on the next chapter.


    The rest of this book will use Sample 1 as a starting place. We will learn many
    new techniques for customizing a simple app to make a truly complete game.


    ## Summary


    In this chapter, you have taken a quick tour through Xcode, learning how to create
    a project with it and build a simple navigation using Storyboard. The chapters
    that follow will add to the basic lessons learned here to build a complete game.


    # Chapter 2: Setting Up Your Game Project


    Like all software projects, iOS game development benefits from starting on good
    footing. In this chapter, we will discuss setting up a new Xcode project that
    is a suitable starting point for many games. This will include creating a project
    that can be used for the deployment on the iPhone and the iPad, handling both
    landscape and portrait orientations.


    We look at how an iOS application is initialized and where we can start customizing
    behavior to match our expectations of how the application should perform. We will
    also explore how user interface (UI) elements are created and modified in an iOS
    application, paying special attention to managing different devices and orientations.


    The game we create in this chapter will be very much like the simple example from
    Chapter 1—in fact, it will play exactly the same. But we will be building a foundation
    for future chapters while practicing some key techniques, such as working with
    `UIViewControllers` and Interface Builder.


    We will explore how an iOS application is put together, and explain the key classes.


    We’ll also create new UI elements and learn how to customize them with Interface
    Builder, and we will explore using the MVC pattern to create flexible, reusable
    code elements. At the end of this chapter, we will have created the Rock, Paper,
    Scissors application shown in Figure 2–1.


    **Figure 2–1.** *An application design to work on the iPhone and iPad in all orientations*


    Figure 2–1 shows the application running on an iPhone and iPad simulator. This
    is a so-called *universal* application: it can run on both devices and would be
    presented in the App Store as such. Unless there are specific business reasons
    for writing an app that only works on the iPhone or the iPad, it makes a lot of
    sense to make your app universal. It will save you time down the road, even if
    you only intend to release your app on one of the devices to start.


    Our sample application is so simple that it may be difficult to see the differences
