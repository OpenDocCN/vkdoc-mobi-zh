    ![](images/00153.jpeg)


    ■ INTRODUCTION


    ***Figure 10.** An action shot in Belt Commander*


    In Figure 10, we see all of the main screens of the game Belt Commander. By the
    end of this chapter, you will know how each works. At that point, you will have
    learned all that you need to know to create compelling games on your own.


    ## Appendix A


    Appendix A takes a break from Belt Commander and looks at some techniques that
    can be used to make graphics for games. We also explore some of the reasoning
    that goes into figuring out what size you final art assets should be. Figure 12
    shows one of the diagrams from Appendix A.


    xxii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00019.jpeg)


    ■ INTRODUCTION


    ***Figure 12.** Comparative graphic sizes*


    In Figure 12, we see the three screen sizes for an iOS devices. This diagram shows
    how to decide what sizes your images should be when you implement your game. Image
    size is important because of memory usage and image quality when displayed on
    the screen.


    Appendix A also spells out how to create and identify the images that support
    your app. For example, we look at creating icon images that support all three
    iOS devices. Appendix A also takes a moment to talk about style in a game. This
    discussion describes the importance of consistency over quality when it comes
    to art.


