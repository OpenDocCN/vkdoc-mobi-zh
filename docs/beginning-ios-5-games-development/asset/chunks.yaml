    **54**


    **CHAPTER 3: Explore the Game Application Life Cycle**


    @interface HighscoreController : UIViewController {


    IBOutlet UIView* highscoresView;


    Highscores* highscores;


    }


    -(void)saveHighscores;


    -(void)layoutScores:(Score*)latestScore;


    -(void)addScore:(Score*)newScore;


    @end

    ```


    As can be seen in Listing 3–8, `HighscoreController` has two fields. The first
    field, `highscoresView`, is an `IBOutlet`. This is the `UIView` that will be used
    to lay out the actual scores on the screen. The `UIView` `highscoresView` is assumed
    to be a sub-view of the `view` property that comes with the class `UIViewController`.
    It does not have to be a direct sub-view—it just has to appear somewhere in the
    view hierarchy. This is a slightly different pattern from other `UIViewControllers`
    we have seen. It was done this way so an instance of `HighscoreController` could
    be added to both the iPhone and iPad XIB files and the layout of the Views could
    be controlled in there. Inspect the iPhone XIB file and you will see that the
    layout for the highscore view is defined directly within the `HighscoreController`.


    The field `highscores` is of type `Highscores`. This is a simple class that contains
    an array of `Score` objects. We will take a closer look at the classes `Highscores`
    and `Score` after looking at the implementation of the three tasks defined in
    `HighscoreController`.


    ## `HighscoreController` Implementation and Layout


    Once an application has the views for `HighscoreController` wired up, the most
    important task is the `addScore:` task. This task is called when a game is over
    and the application should update the High Score view as well as make sure the
    high score information is stored. Listing 3–9 shows the implementation of `addScore:`.


    **Listing 3–9.** *HighscoreController.m (addScore:)*


    ```

    -(void)addScore:(Score*)newScore{


    [highscores addScore:newScore];


    [self saveHighscores];


    [self layoutScores: newScore];


    }

    ```


    In Listing 3–9, we see that the `addScore:` task takes a new `Score` as an argument.
    The `newScore` object is passed onto the `addScore:` task of the object `highscores`,
    where it is either discarded if it is not high enough to be a high score or inserted
    into the array of ten `Scores` stored in `highscores`. We also see that the task
    in Listing 3–9 calls a `saveHighscores` task and then updates the layout of the
    views by calling `layoutScores:`.


    Let’s take a look at how the views are updated before we look at saving the high
    scores. Listing 3–10 shows the implementation of `layoutScores:`.


    **Listing 3–10.** *HighscoreController.m (layoutScores:)*


    ```

    -(void)layoutScores:(Score*)latestScore{


    for (UIView* subview in [highscoresView subviews]){


    [subview removeFromSuperview];


    }


    CGRect hvFrame = [highscoresView frame];


    float oneTenthHeight = hvFrame.size.height/10.0;


    float halfWidth = hvFrame.size.width/2.0;


    NSDateFormatter *dateFormat = [[NSDateFormatter alloc] init];


    [dateFormat setDateFormat:@"yyyy-MM-dd"];


    int index = 0;


    for (Score* score in [highscores theScores]){


    CGRect dateFrame = CGRectMake(0, index*oneTenthHeight, halfWidth,


    oneTenthHeight);


    UILabel* dateLabel = [[UILabel alloc] initWithFrame:dateFrame];


    [dateLabel setText: [dateFormat stringFromDate:[score date]]];


    [dateLabel setTextAlignment:UITextAlignmentLeft];


    [highscoresView addSubview:dateLabel];


    CGRect scoreFrame = CGRectMake(halfWidth, index*oneTenthHeight, halfWidth, oneTenthHeight);


    UILabel* scoreLabel = [[UILabel alloc] initWithFrame:scoreFrame];


    [scoreLabel setText:[NSString stringWithFormat:@"%d", [score score]]];


    [scoreLabel setTextAlignment:UITextAlignmentRight];


    [highscoresView addSubview:scoreLabel];


    if (latestScore != nil && latestScore == score){


    [dateLabel setTextColor:[UIColor blueColor]];


    [scoreLabel setTextColor:[UIColor blueColor]];


    } else {


    [dateLabel setTextColor:[UIColor blackColor]];


    [scoreLabel setTextColor:[UIColor blackColor]];


    }


    index++;


    }


    }

    ```


    The task `layoutScores:` from Listing 3–10 takes a `Score` object as an argument.
    This `Score` object represents the most recent score the player has achieved.
    This allows `HighscoreController` to mark the newest score in blue; the other
    scores will be drawn in black. The first loop in `layoutScores:` simply removes
    all sub-views from the `UIView` `highscoreView`. The next three lines inspect
    the size of `highscoreView` and pre-compute some size values that will be used
    later.


    The second loop in `layoutScores:` iterates through all of the `Score` objects
    contained in the `highscores` object. For each `Score`, two `UILabels` are created.
    The first `UILabel`, called `dateLabel` is created with the `CGRect` `dateFrame`,
    which defines the region where the `UILabel` should be drawn. Basically, `dateFrame`
    specifies the left half of a row on `highscoreView`. The text for `dateLabel`
    is set based on the `date` property of the `Score` object. Similarly, this process
    is repeated for the `UILabel` `scoreLabel`; however it will display the score
    the user achieved and will be placed on the right.


    Lastly, we check to see if the score we are displaying is the object `latestScore`.
    If it is, we adjust the colors of the `UILabels` to blue.


    If we take a look back at Listing 3–9, we see that the high scores are saved before
    we update the views by calling the task `saveHighscores`, as shown in Listing
    3–11.


    **Listing 3–11.** *HighscoreController.m (saveHighscores)*


    ```

    -(void)saveHighscores{


    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];


    NSData* highscoresData = [NSKeyedArchiver archivedDataWithRootObject: highscores];


    [defaults setObject:highscoresData forKey: KEY_HIGHSCORES];


    [defaults synchronize];


    }

    ```


    The `saveHighscores` task, shown in Listing 3–11, is responsible for archiving
    the `highscores` object and writing it somewhere permanent. The strategy here
    is to stick the `highscores` object into the users preferences for this application.
    This way, the high scores will be preserved if the users delete the app after
    a sync with iTunes. To know the user’s preferences, we call `standardUserDefaults`
    on the class `NSUserDefaults`.'
