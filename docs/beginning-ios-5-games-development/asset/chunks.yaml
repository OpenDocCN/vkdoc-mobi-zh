- fmt: "```objectivec\nBeltCommanderController* bc = (BeltCommanderController*)gameController;\n\
    \n[gameController addActor:[Bullet bulletAt:[self center] TowardPoint:[bc viper].center\
    \ From:self]];\n```\n\n在清单11-22中，我们看到了`Saucer`类中`step:`方法的实现。在此任务中，我们检查`Saucer`的生命值是否低于零。如果是，则增加`gameController`的分数并从游戏中移除`Saucer`。`step:`任务的下一部分是确定`Saucer`是否因离开屏幕而需要改变方向。`step:`任务的最后一部分负责发射子弹。为此，我们获取`gameController`的`viper`属性，以便将子弹瞄准它。这是第一次需要将`gameController`强制转换为`BeltCommanderController`的情况。这引发了一个问题：如何在不依赖类定义的情况下，添加一种通用方式来引用特定角色（如`viper`）。但这是另一个练习了。\n\
    \n我们最后要查看的角色是`Powerup`。\n\n## `Powerup`类\n\n`Powerup`类实际上非常简单。它只是一个从右向左移动的角色。我们在其他章节中已介绍过它如何看起来在旋转，以及如何在生命结束时闪烁。在本游戏中，有趣之处在于它对`Viper`产生的影响。此功能在`doHitOn:in:`任务中实现，如清单11-23所示。\n\
    \n**清单11-23.** *Powerup.m (doHitOn:in:)*\n\n```objectivec\n-(void)doHitOn:(Viper*)viper\
    \ in:(GameController*)gameController{\n    if (self.variant == VARIATION_HEALTH){\n\
    \        [viper incrementHealth:30];\n    } else if (self.variant == VARIATION_DAMAGE){\n\
    \        [viper incrementDamage:gameController];\n    } else if (self.variant\
    \ == VARIATION_CASH){\n        [gameController incrementScore:1000];\n    }\n\
    \    [gameController removeActor:self];\n}\n```\n\n在清单11-23中，我们看到了`Powerup`类的`doHitOn:in:`任务。当`Powerup`与`Viper`碰撞时调用此方法。实现非常直接：我们只需检查`Powerup`的变体并应用正确的效果。对于`VARIATION_HEALTH`，我们将`Viper`的生命值增加30。对于`VARIATION_DAMAGE`，我们增加`Viper`的伤害值。最后，对于`VARIATION_CASH`，我们仅将分数增加1000。我认为此任务的简洁性直接源于我们使用`Actor`的方式。事实证明，这是一个强大的面向对象模型。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第11章：一个完整的视图——`Belt Commander`\n\
    \n### 总结\n\n在本章中，我们将本书讨论的所有技术整合在一起。我们首先探索了我们的游戏`Belt Commander`是什么以及如何玩。然后我们回顾了应用程序的流程，并了解了如何使用`UINavigationController`类实现视图之间的切换。接着，我们研究了`BeltCommanderController`类，并学习了如何实现游戏的主要部分。最后，我们查看了一些具体的实现选择，这些选择为我们的`Actor`注入了活力。\n\
    \n在创建游戏时，总会涉及独特的代码和技术。每个游戏都是独一无二的，需要独特的努力才能实现。要写一本解释游戏开发者可能面临的每一个挑战的书是不可能的。\n\n\
    然而，许多开发者和游戏设计师将面临与我在此概述的非常相似的需求。我希望本书展示了如何解决这些常见挑战。从最基本的屏幕切换和用户数据保存问题，到更复杂的主题（如粒子动画和应用内购买），我认为本书是构成游戏基础设施的代码和类的地图。最终，由每个开发者来填充中间部分并创建新的游戏。感谢您阅读本书。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 附录A\n\n### 设计与制作图形\n\n\
    在本附录中，我们将涵盖三个主要主题：设计图形、制作图形以及一些用于此目的的开源工具。\n\n在创建视频游戏时，大量工作投入到制作游戏中使用的图形。在本附录中，我们将考虑2D游戏。这些图形将是游戏中角色、背景、按钮和其他装饰物的图像。这些图像是游戏的重要组成部分；它们是人们首先看到的东西，并且可以决定人们是否会下载游戏。图像是吸引人们注意力的东西。人们记住的是林克或马里奥的图像——而不是碰撞检测算法。这并不是说没有流行游戏使用简单的图形，因为确实有。但即使是成功游戏（使用简单图形）的创作者也会花费大量时间确保他们的艺术作品符合统一的设计目标。\n\
    \n除了风格考虑之外，游戏设计师还必须考虑创建适合构建游戏的图像所需的条件。我们必须考虑最终图像的大小以及图像的组织方式。我们是否应该为所有内容使用单独的图像，还是可以创建背景的合成图像？我们如何组织图像以便轻松修改？我们是否有包含图像兆字节数的预算？这些只是我将在本附录中解决的几个问题。\n\
    \n本附录的最后部分将快速回顾一些适用于游戏设计者的优秀开源工具。这些工具不仅对小游戏开发者很重要，而且对本书的编写也至关重要。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 视频游戏中的艺术\n\n在创建视频游戏之前，有人对游戏玩法及其外观有一个想法。那个最初的愿景可能会也可能不会进入最终发布版本。无论如何，最好由一个人或一组人负责塑造游戏的艺术，使其具有一致的风格。一旦游戏有了艺术指导，就会开始构建游戏的资源。随着游戏的成型，将创建其他艺术作品以支持游戏，例如网站或广告。这些其他作品应保持相同的视觉风格。在本节中，我们将快速回顾什么是艺术风格以及它如何塑造用户的期望。\n\
    \n#### 视频游戏中的风格\n\n视频游戏的风格是指设计师和艺术家为创造游戏艺术而做出的所有选择，以及这些艺术如何组合在一起。游戏的风格与其他产品的风格没有什么不同。例如，考虑一瓶照烧酱。用看起来像来自远东的字体绘制单词“teriyaki”并非不合理，也许像图A-1中的单词那样。\n\
    \n**图A-1.** *以远东风格呈现的“Teriyaki”*\n\n图A-1显示了一个单词以其风格匹配照烧酱用户预期的形式呈现。多年来，许多照烧酱制造商设定了这种期望。并非所有产品都有社会期望的风格可供借鉴。事实上，如果你正在制作一种新类型的新游戏，用户可能对风格完全没有期望。如果你正在制作一个关于骑士和城堡的游戏，用户会欢迎看起来是中世纪风格的游戏。无论如何，在整个游戏中保持艺术风格的一致性很重要。\n\
    \n保持一致的风格并不要求艺术过于复杂。目标仅仅是让艺术看起来是由同一只手创作的，如图A-2中的示例所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
