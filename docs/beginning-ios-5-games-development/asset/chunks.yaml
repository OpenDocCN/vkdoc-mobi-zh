    We have looked at touch events so we can understand the touch event lifecycle.
    We also took a quick look at the UITapGestureRecognizer class. The following section
    will discuss the UITapGestureRecognizer in more detail.


    **Understanding Gesture Recognizers**


    iOS allows the user to interact with an application with a rich set of gestures.
    These include taps, swipes, pinches, and so on. Each of these gestures is comprised
    of some reasonably complex logic to interpret touch events into a cohesive gesture.
    If this was left up to each developer to implement, the user experience with be
    pretty bad, as each developer would inevitably make different assumptions about
    each gesture. For example, the long press gesture has a default duration. We would
    want this consistent across all applications, because we don’t want to “retrain”
    each user for each application as to what a long press is. In this spirit, Apple
    provides a number of classes that are designed to identify the most common gestures
    a developer is going need.


    Each of the gesture recognizers extends the abstract base class UIGestureRecognizer
    and is shown in Listing 8–6.


    **Listing 8–6.** *Concrete Implementations of UIGestureRecognizer* UITapGestureRecognizer


    UIPinchGestureRecognizer


    UIRotateGestureRecognizer


    UISwipeGestureRecognizer


    UIPanGestureRecognizer


    UILongPressGestureRecognizer


    In Listing 8–6, we see each subclass of UIGestureRecognizer that is built into
    iOS 5\. Tap is probably the most common gesture iOS, and needs no description.
    The pinch gesture


