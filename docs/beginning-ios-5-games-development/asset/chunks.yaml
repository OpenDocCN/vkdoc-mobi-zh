- fmt: '使用 GameKit 来启用排行榜和成就功能出乎意料地简单，前提是 Game Center 已设置包含这些功能。以下章节将讨论如何连接用户的 Game
    Center 账户，将他的分数提交到排行榜，以及获取成就。


    **为用户启用 Game Center**


    当游戏启用了 Game Center 时，用户仍需选择加入 Game Center 功能。用户需要使用 Game Center 创建一个账户，并在当前 iOS
    设备上使用该账户进行身份验证。值得庆幸的是，苹果公司简化了 Game Center 的入门流程。


    要开始使用 Game Center，所有应用都必须获取代表本地玩家的 `GKLocalPlayer` 实例，并对其进行身份验证。清单 9-1 展示了执行此操作的典型示例。


    **清单 9-1.** *RootViewController.m (initGameCenter)*


    ```

    -(void)initGameCenter{


    Class gkClass = NSClassFromString(@"GKLocalPlayer");


    BOOL iosSupported = [[[UIDevice currentDevice] systemVersion] compare:@"4.1"


    options:NSNumericSearch] != NSOrderedAscending;


    if (gkClass && iosSupported){


    localPlayer = [GKLocalPlayer localPlayer];


    [localPlayer authenticateWithCompletionHandler:^(NSError *error) {


    if (localPlayer.authenticated){


    [leaderBoardButton setEnabled:YES];


    } else {


    [leaderBoardButton setEnabled:NO];


    }


    }];


    }


    }

    ```


    在清单 9-1 中，我们看到了 `RootViewController` 类的任务 `initGameCenter`。此任务在应用程序启动时被调用一次。它首先通过查找
    `GKLocalPlayer` 类来检查此 iOS 设备上是否可用 GameKit。该任务还会检查 iOS 版本是否足够新以支持 Game Center。


    如果检查通过，我们通过调用 `GKLocalPlayer` 类的 `localPlayer` 方法来获取一个指向本地玩家的指针。


    为了对本地玩家进行身份验证，我们只需调用 `authenticateWithCompletionHandler:` 并传入一个代码块，该代码块将在用户完成身份验证（或取消）时异步执行。代码块是一种将函数声明为可传递值的方式。在此例中，我们使用代码块的方式与在
    Java 等语言中使用匿名类的方式相同。此代码首次运行时，用户将看到类似图 9-9 的界面。


    **图 9-9.** *首次使用 Game Center 进行身份验证*


    在图 9-9 中，我们看到了调用 GameKit 身份验证任务的结果。系统会提示用户使用现有账户登录 Game Center、创建新账户或取消登录。如果用户多次取消，应用程序将不再显示此对话框。在取消操作发生之前用户必须取消的确切次数似乎随不同版本而改变。对于
    iOS 5，大约是三次。一旦用户成功通过身份验证，应用程序就会连接到该用户账户的 Game Center。当应用程序再次运行时，对 `authenticateWithCompletionHandler:`
    的调用将执行处理代码，而不会再次打扰用户登录。用户将看到类似图 9-2 的界面。


    一旦 Game Center 启用，我们将开始利用其功能。下一节将介绍如何向排行榜报告分数。


    **向排行榜提交分数**


    Game Center 提供的最佳功能之一是一个内置机制，用于跨设备跟踪用户的高分。它允许用户将自己的分数与朋友的分数以及全球其他玩家的分数进行比较。提交分数的代码非常直接，如清单
    9-2 所示。


    **清单 9-2.** *RootViewController.m (notifyGameCenter)*


    ```

    -(void)notifyGameCenter{


    if ([localPlayer isAuthenticated]){


    GKScore* score = [[GKScore alloc] initWithCategory:@"beltcommander.highscores"];
    score.value = ([beltCommanderController score];


    [score reportScoreWithCompletionHandler:^(NSError *error){


    if (error){


    //handle error


    }


    }];


    }


    }

    ```


    在清单 9-2 中，我们看到了每次游戏结束时调用的任务 `notifyGameCenter`。在此任务中，我们检查 `localPlayer` 是否已验证。如果是，我们只需创建一个
    `GKScore` 对象，指定我们提交分数所对应的排行榜 ID，在本例中为 “beltcommander.highscores”。一旦获得 `GKScore`
    对象的引用，我们将 `score` 属性设置为上一局游戏的分数。`score` 属性可以是任何类型的数字——在此例中它是一个长整型。最后，我们调用 `reportScoreWithCompletionHandler:`
    并传入一个代码块来处理任何错误。在我们的示例中，我们没有对错误进行任何处理。


    **注意：** 如果用户离线或出现某种网络问题，GameKit 将在未来运行时自动重新提交分数，确保玩家的辛勤工作得到正确记录。


    图 9-10 显示了排行榜上的一个分数。


    **图 9-10.** *包含示例分数的排行榜*


    在图 9-10 中，我们看到排行榜上显示了一个分数。目前只有一个分数，因为截图是在游戏开发期间拍摄的。在顶部，我们可以看到三个查看高分的选项：今日、本周或全部。


    显示高分的组件是一个预构建的组件，称为 `GKLeaderboardViewController`，它随 GameKit 提供；调出此组件的代码如清单 9-3
    所示。


    **清单 9-3.** *RootViewController.m (leaderBoardClicked:)*


    ```

    - (IBAction)leaderBoardClicked:(id)sender {


    GKLeaderboardViewController* leaderBoardController =


    [[GKLeaderboardViewController alloc] init];


    leaderBoardController.category = @"beltcommander.highscores"; leaderBoardController.leaderboardDelegate
    = self;


    [self presentModalViewController:leaderBoardController animated:YES];


    }

    ```


    在清单 9-3 中，我们看到了当用户点击排行榜按钮时被调用的任务 `leaderBoardClicked:`。此类被调用在 `RootViewController`
    实例上，`RootViewController` 是我们示例游戏 Belt Commander 的主 `UIViewController`。我们不需要了解
    `RootViewController` 的太多细节，只需要知道它是一个 `UIViewContoller` 并遵循 `GKLeaderboardViewControllerDelegate`
    协议。要显示图 9-10 所示的视图，首先创建一个 `GKLeaderboardView` 并将 `category` 属性设置为我们排行榜的 ID。然后在
    `self` 上调用 `presentModalViewController:animated:`，这将显示排行榜视图。为了在用户点击“完成”时移除排行榜，将
