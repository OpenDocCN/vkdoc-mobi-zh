- fmt: "**Listing 4–11.** `CoinsController.m (createAndLayoutImages)`\n\n```\n-(void)createAndLayoutImages{\n\
    \nint rowCount = [coinsGame rowCount];\n\nint colCount = [coinsGame colCount];\n\
    \nCGRect coinsFrame = [coinsView frame];\n\nfloat width = coinsFrame.size.width/colCount;\n\
    \nfloat height = coinsFrame.size.height/rowCount;\n\nfor (int r=0;r<rowCount;r++){\n\
    \nfor (int c=0;c<colCount;c++){\n\nUIImageView* imageView = [[UIImageView alloc]\
    \ init];\n\nCGRect frame = CGRectMake(c*width, r*height, width, height);\n\n[imageView\
    \ setFrame:frame];\n\n[coinsView addSubview: imageView];\n\n[self spinCoinAt:CoordMake(r,\
    \ c)];\n\n}\n\n}\n\n}\n```\n\n`Listing 4–11` shows the number of rows and columns\
    \ to be used in the game. In this example, these are both five. The frame of `coinsView`\
    \ is stored in the variable `coinsFrame` for easy reference, and the width and\
    \ height of each coin view is calculated. The two `for` loops create an `imageView`,\
    \ set its frame, and add it to `coinsView` for each row and column. In the nested\
    \ loops, `spinCoinAt:` is called, which creates the spinning coin effect. Note\
    \ that the argument being passed to `spinCoinAt:` is the result of the function\
    \ `CoordMake`. We will take a look at this function and the class `CoinsGame`\
    \ after looking at `spinCoinAt:`, shown in `Listing 4–12`.\n\n**Listing 4–12.**\
    \ `CoinsController.m (spinCoinAt:)`\n\n```\n-(void)spinCoinAt:(Coord)coord{\n\n\
    UIImageView* coinView = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\
    \nNSNumber* coin = [coinsGame coinForCoord:coord];\n\nNSArray* images = [imageSequences\
