- fmt: 'After the animation is set up, the next thing we do (as shown in Listing 4–4)
    is make the changes to our scene that we want animated. Because this task is responsible
    for switching the displayed view from the High Score view to the Welcome view,
    we simply remove the view `highscoreController.view` from its super view (`self.view`)
    and add the `welcomeView` to `self.view`. Finally, we commit the animation, causing
    it to be displayed to the user.


    We can use these static tasks of `UIView` to create other animations, not just
    the ones provided by iOS. Let’s update the transition from the Welcome screen
    to the High Score screen so one fades into the other, as seen in Figure 4–5.


    **Figure 4–5.** *Fade transition animation*


    In this fade transition, the Welcome view is replaced with the High Score view.
    This is accomplished by changing the opacity of each view over a period of time.
    During this animation, both views are part of the scene. At the end, we want to
    remove the Welcome view, to stay consistent with how we are managing views in
    the game. The code that creates this transition is shown in Listing 4–5.


    **Listing 4–5.** *GameController.m (highScoresClicked:)*


    ```

    - (IBAction)highScoresClicked:(id)sender {

    //Make high score view 100% clear and add it on top of the welcome view.

    [highscoreController.view setAlpha:0.0];

    [self.view addSubview:highscoreController.view];

    //set up animation

    [UIView beginAnimations:nil context:@"fadeInHighScoreView"];

    [UIView setAnimationDuration:1.0];

    [UIView setAnimationDelegate:self];

    [UIView setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];

    //make changes

    [welcomeView setAlpha:0.0];

    [highscoreController.view setAlpha:1.0];

    [UIView commitAnimations];

    }

    ```


    The task shown in Listing 4–5 is called when the user touches the Highscores button
    in the Home view. To create the fade effect, we utilize the static animation task
    from the class `UIView`, but first we have to set up a few things. We start by
    setting the alpha property of the view associated with the `highscoreController`
    to `0.0`, or completely translucent. We then add the High Score view to the root
    view. This places it onto the already present `welcomeView`, but because it is
    clear, we see only the Welcome screen.


    The animation is set up by calling the task `beginAnimations:context:`, and the
    duration is set with the task `setAnimationDuration:`. The next step is to set
    a delegate for the animation that is being created. We also want to set which
    task should be called when the animation is complete by calling `setAnimationDidStopSelector:`.
    After the animation is set up, we simply set the alpha property of `welcomeView`
    to `0.0` and set the High Score view’s alpha to `1.0`. This indicates that at
    the end of the animation, we want the Welcome view to be transparent and the High
    Score view to be fully opaque. We then indicate that we have set our finished
    state by calling `commitAnimations`.


    We set `self` to be the delegate for the animation and set up the task `animationDidStop:finished:context:`
    to be called when we want the animation to be over. We did this so we could do
    a little cleanup at the end of the animation and ensure that our application is
    in the correct state. Listing 4–6 shows the implementation of this callback method.


    **Listing 4–6.** *GameController.m (animationDidStop:finished:context:)*


    ```

    - (void)animationDidStop:(NSString *)animationID finished:(NSNumber *)finished
    context:(void *)context{

    if ([@"fadeInHighScoreView" isEqual:context]){

    [welcomeView removeFromSuperview];

    [welcomeView setAlpha:1.0];

    }

    }

    ```


    The task in Listing 4–6 is called at the end of the fade animation. In this task,
    we want to remove `welcomeView` from the scene and reset its alpha to `1.0`. We
    remove it, because that is the expected state for the other transitions. Setting
    the alpha back to `1.0` ensures that `welcomeView` is visible when it is added
    back into the scene.


    You have seen how a view is added to a super view by using the property `frame`.
    You have also learned how to create animations that affect the properties of a
    `UIView` by exploring the fade transition. We are going to combine these concepts
