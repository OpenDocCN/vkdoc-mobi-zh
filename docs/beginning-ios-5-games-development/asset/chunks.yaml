  trans: "\n# 第 5 章：快速构建逐帧游戏\n\n## 列表 5–1. `Example01Controller.h`\n\n```objc\n#import\
    \ <UIKit/UIKit.h>\n#import <QuartzCore/CADisplayLink.h>\n#import \"Viper01.h\"\
    \n\n@interface Example01Controller : UIViewController {\n    CADisplayLink* displayLink;\n\
    \    Viper01* viper;\n}\n\n-(void)updateScene;\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer;\n\
    @end\n```\n\n在列表 5–1 中，我们看到该类继承自`UIViewController`，并包含两个字段。第一个字段名为`displayLink`，类型为`CADisplayLink`，该类型从`QuartzCore`框架中导入。第二个字段名为`viper`，类型为`Viper01`，用于表示飞船。此外，还定义了两个任务：第一个是`updateScene`，用于更新构成场景的`UIViews`；第二个是`viewTapped`，用于管理用户输入。让我们看看列表\
    \ 5–2 中的`Viper01`头文件，了解飞船是如何表示的。\n\n## 列表 5–2. `Viper01.h`\n\n```objc\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Viper01 : UIImageView {\n}\n\n@property\
    \ float speed;\n@property CGPoint moveToPoint;\n\n-(void)updateLocation;\n@end\n\
    ```\n\n在列表 5–2 中，我们看到`Viper01`继承自`UIImageView`，并包含两个属性。`speed`属性描述了毒蛇的移动速度，`moveToPoint`属性则记录了飞船在屏幕上的目标移动点。任务`updateLocation`负责逐步更新飞船的位置。\n\
    \n## 实现类\n\n我们已经了解了本示例中将要使用的类的定义，现在来看看具体实现，首先从列表 5–3 中`Example01Controller`类的`viewDidLoad`任务开始。\n\
    \n## 列表 5–3. `Example01Controller.m` (viewDidLoad)\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [self setTitle:@\"简单移动\"];\n    UITapGestureRecognizer*\
    \ tapRecognizer = [[UITapGestureRecognizer alloc]\n        initWithTarget:self\
    \ action:@selector(viewTapped:)];\n    [self.view addGestureRecognizer:tapRecognizer];\n\
    \n    viper = [Viper01 new];\n    CGRect frame = [self.view frame];\n    viper.center\
    \ = CGPointMake(frame.size.width/2.0, frame.size.height/2.0);\n    [self.view\
    \ addSubview:viper];\n    [viper setMoveToPoint:viper.center];\n\n    displayLink\
    \ = [CADisplayLink displayLinkWithTarget:self\n                              \
    \              selector:@selector(updateScene)];\n    [displayLink addToRunLoop:[NSRunLoop\
    \ currentRunLoop]\n                      forMode:NSDefaultRunLoopMode];\n}\n```\n\
    \n在列表 5–3 中，设置标题后，我们创建了一个`UITapGestureRecognizer`，并将其添加到与该`UIViewController`关联的根`UIView`上。将`UITapGestureRecognizer`添加到`UIView`中，当用户点击屏幕时，会调用`viewTapped:`任务，从而让我们有机会更新飞船的移动目标位置。\n\
    \n下一步是创建`Viper01`的新实例，并将其放置在根`UIView`的中心。我们还将`viper`的`moveToPoint`属性设置为屏幕中心，这样毒蛇一开始就保持静止。\n\
    \n最后要做的是指定一个需要周期性调用的任务，以便更新飞船的位置并创建动画。我们通过创建一个`CADisplayLink`并指定`updateScene`任务来实现这一点。一旦调用`addToRunLoop`，每次屏幕刷新时都会调用`updateScene`。下一节我们将研究`CADisplayLink`和`NSRunLoop`类，了解它们的具体作用。接下来，我们看看列表\
    \ 5–4 中的`updateScene`。\n\n## 列表 5–4. `Example01Controller.m` (updateScene)\n\n\
    ```objc\n-(void)updateScene{\n    [viper updateLocation];\n}\n```\n\n在列表 5–4 中，任务`updateScene`只是简单地调用了对象`viper`的`updateLocation`方法。在后续的示例中，我们会在`updateScene`任务中做更多操作，但这里我们只关注如何实现单艘飞船的移动。\n\
    \n## 移动飞船\n\n每次调用`updateScene`时，都需要更新飞船的位置。这需要通过一些几何计算来确定飞船在动画每一帧的新位置。我们来看看`updateLocation`，了解该任务如何移动飞船。见列表\
    \ 5–5。\n\n## 列表 5–5. `Viper01.m` (updateLocation)\n\n```objc\n-(void)updateLocation{\n\
    \    CGPoint c = [self center];\n    float dx = (moveToPoint.x - c.x);\n    float\
    \ dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n    float dxf =\
    \ cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n    if (dx\
    \ < 0){\n        dxf *= -1;\n        dyf *= -1;\n    }\n    c.x += dxf;\n    c.y\
    \ += dyf;\n    if (abs(moveToPoint.x - c.x) < speed && abs(moveToPoint.y - c.y)\
    \ < speed){\n        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n    }\n\
    \    [self setCenter:c];\n}\n```\n\n在列表 5–5 中，我们看到`Viper01`类的`updateLocation`任务。该任务负责将飞船向`moveToPoint`方向移动一帧的距离。由于类`Viper01`继承自`UIImageView`，我们只需设置用于指定其相对于父视图位置的标准属性即可移动它。我们可以使用`frame`属性，但还有一个名为`center`的属性，它是操作`UIView`框架的简写方式。\n\
    \n我们首先获取飞船当前中心点的副本，并将其存储在变量`c`中，然后开始计算新的中心位置。接下来，我们计算当前位置与目标位置在 X 轴和 Y 轴上的差值，分别存储在`dx`和`dy`中。查阅高中几何教材后，我们通过将`dy`除以`dx`并将结果传递给`atan`（反正切）函数，计算出描述移动方向的角度，结果存储在`theta`中。\n\
    \n我们希望飞船以`speed`个点的速度向`theta`方向移动。为了计算 X 和 Y 方向上的具体位移，需要进行一些几何运算。要计算 X 方向上的位移，我们取`theta`的余弦值乘以`speed`，结果存储在`dxf`中。类似地，要计算本帧在\
    \ Y 方向上的位移，我们取`theta`的正弦值乘以`speed`，结果存储在`dyf`中。为了最终确定这些值，我们检查`dx`是否为负值；如果是，则反转`dxf`和`dyf`的符号。\n\
    \n计算出`dxf`和`dyf`后，将它们分别加到变量`c`的`x`和`y`分量上。最后要做的是用`c`中的新值设置`center`属性。然而，如果飞船距离`moveToPoint`不到`speed`个点，就会超过目标点。我们不希望超过目标点，因为下一帧它会向相反方向再次超调，导致飞船在屏幕上抖动。为了解决这个问题，当飞船接近目标点时，我们直接将\
    \ X 和 Y 值设置为与`moveToPoint`的 X 和 Y 值相同。图 5–5 展示了所涉及的几何关系。\n\n## 图 5–5. `updateLocation`任务涉及的几何关系\n\
    \n在图 5–5 中，我们看到 X 轴和 Y 轴，原点位于左上角，Y 轴正方向向下。飞船的框架显示为灰色矩形，起始中心点位于其中间。虚线三角形说明了如何根据`dx`、`dy`以及目标点的位置计算`theta`。黑色箭头的长度为`speed`，显示了一帧后中心点应处的位置。点状三角形展示了如何根据角度计算`dxf`和`dyf`。\n\
    \n## 响应用户点击\n"
- fmt: '# We now know we can make the ship move, one frame at a time.


    But we have not looked at how we tell the ship *where* to move. Recall that we
    registered a `UITapGestureRecognizer` on the root `UIView` of `Example01Controlller`.
    This `UITapGestureRecognizer` is configured to call the task `viewTapped:`. This
    is shown in Listing 5–6.


    **Listing 5–6.** *Example01Controller.m (viewTapped:)*


    ```

    -(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer{


    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)aGestureRecognizer;
    CGPoint tapPoint = [tapRecognizer locationInView:self.view];


    [viper setMoveToPoint: tapPoint];


    }

    ```


    In Listing 5–6, the first thing we do in `viewTapped:` is to cast the passed in
    `UIGestureRecognizer` to `UITapGestureRecognizer`. We then find the point where
    the tap occurred in the root view by calling `locationInView:`. Once we have the
    point where the tap occurred, we simply set the `moveToPoint` property on the
    `viper` object. Notice we did not have to interrupt any existing animation—we
    simply update the state of the `viper` object and, when its `updateLocation` task
    is called again, it will start moving toward this new point. This is a very simple
    example, but I hope it illustrates an advantage that frame-by-frame animations
    have over the predefined animations we looked at in the last chapter.


    We have looked at how this simple animation is set up and how it is driven by
    repeated calls to `updateScene` from Listing 5–4. We should take a little time
    and understand the classes responsible for making these repeated calls.


    ## Understanding `CADisplayLink` and `NSRunLoop`


    In general, to create a smooth looking animation, a picture has to be updated
    at least 25 times a second to avoid the eye seeing each individual frame. That
    means our game must find a way to call `updateScene` at 25 times a second to achieve
    a smooth animation. This could be done by creating an `NSTimer` that calls `updateScene`
    at any rate we choose. If we do that, however, our code that updates the scene
    will not necessarily be in sync with the hardware’s native refresh rate of the
    screen. The framework Core Animation provides a class specifically designed for
    creating the type of animation we are trying to create: `CADisplayLink`.


    In Listing 5–3, we created a `CADisplayLink`, specifying that it should call `updateScene`
    whenever the screen is ready to redraw. We then added the `CADisplayLink` to the
    same run loop that called `viewDidLoad` by calling `currentRunLoop` on the class
    `NSRunLoop`. The class `NSRunLoop` manages a thread to produce the kind of loop
    shown in Figure 5–1. An `NSRunLoop` is responsible for processing input from the
    user and from the `CADisplayLink` and scheduling when corresponding task in `Example01Controller`
    should be called. We don’t have to understand too much about how `NSRunLoop` works;
    we just have to understand that the tasks `viewTapped:` and `updateScene` will
    be called by the same thread so we don’t have to worry about multi threaded complexity.


    As mentioned, `CADisplayLink`—working with our main threads `NSRunLoop`—causes
    the task `updateScene` to be called once for each time the screen redraws. The
    property `duration` of `CADisplayLink` reports, in seconds, the time between each
    screen redraw. A little investigation shows that this property reports a slightly
    different value each time `updateScene` is called, but hovers around the value
    `0.0166648757`. This value is just shy of 60 frames per second, so we are well
    above the required 25 frames per second.


    In more complex applications, it is entirely likely that the state of the game
    cannot be updated in 1.5 milliseconds; there may simply be too much book keeping.
    If this is the case, you can set the `frameInterval` property of `CADisplayLink`
    to value greater than one. This will cause `CADisplayLink` to skip screen redraws.
    Figure 5–6 shows four different scenarios that can occur when using the `CADisplayLink`.


    **Figure 5–6.** *Screen refresh scenarios*


    In Figure 5–6, we see four scenarios listed on the left. To the right of each
    scenario are a number of dots representing screen refreshes for that scenario.
    Looking at the top scenario, where there is no work to be done between screen
    refreshes, each dot is equally spaced, meaning that the screen refreshes happen
    at even intervals as time progresses to the right. The second scenario shows the
    case when there is a little bit of work to do between screen refreshes, indicated
    by the lines coming off to the right of each dot. The length of each line is shorter
    than the distance between each dot, indicating that the work is done in the time
    between screen refreshes. The third scenario shows the case where there is too
    much work to get done between screen refreshes, but the programmer did not account
    for this. Each time the work exceeds the normal amount of time between screen
    refreshes, the drawing of the next screen is delayed.


    Because the amount of time it takes to update a game between frames varies, the
    rate at which the screen is refreshed becomes irregular. When the screen refresh
    is irregular, the animation looks choppy and is perceived poorly by the user.
    To avoid this, we configure `CADisplayLink` to only trigger an update every other
    frame by setting `frameInterval` to `2`. This doubles the amount of time we have
    to get our work done, allowing for a smooth animation.


    This strategy can seem counter-intuitive to some developers, because in the fourth
    scenario there can be long stretches of time where no work is being done. In fact,
    for a given stretch of time, scenario 3 gets more frames rendered than scenario
    4. The fact of the matter is that the choppy updates are almost always more annoying
    to a user than a game that does not move as fast. Also keep in mind that the native
    refresh rate for iOS devices is 60 frames a second, so if every other frame is
    skipped, the animation rate is still 30 frames per second. That’s plenty to create
    a convincing animation.


    We have looked at a simple frame-by-frame animation, and you should now understand
    the basic principles. The next two examples will build on this pattern to create
    animations with more than one thing on the screen, as well as do a little refactoring
    to start making a framework suitable for complex games.


    ## Abstracting the UI


    In the previous example, we looked at the basics of creating a frame-by-frame
    animation. We looked how we can use the class `CADisplayLink` in conjunction with
    the existing event loop to call a task where we can implement our animation. We
    animated a single image around the screen based on user input. This was a very
    simple example. I left out a number of practical considerations so we could focus
    on the basic idea of creating animations in this way. In this section, we will
    do a little refactoring in order to better support more complicated games. Figure
    5–7 shows the example we will be building.


    **Figure 5–7.** *Abstracted UI*


    In Figure 5–7, we see some differences from the first example. The first thing
    to note is that the play area of the game does not take up the full screen. The
    slider at the bottom of the screen changes the size of the play area without changing
    how the game plays.


    There is also a second item on the screen, an asteroid. Asteroids are created
    every 10 seconds and start at the top of the screen, moving straight down. If
    an asteroid collides'
