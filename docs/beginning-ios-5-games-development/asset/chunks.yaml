    在图 11–4 中，我们看到用户点击屏幕右下角的触摸按钮时弹出的对话框。该对话框允许用户通过点击“是”退出游戏，或通过点击“否”继续游戏。如果用户正在玩游戏而应用程序被另一个启动的应用程序发送到后台，那么当用户将游戏带回前台时，将显示此对话框。当用户生命值归零时，游戏结束。将显示图
    11–5 所示的对话框。


