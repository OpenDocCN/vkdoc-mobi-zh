    **第 2 章：设置你的游戏项目**


    **图 2-5.** *支持所有设备方向*


    ## 定制通用应用程序


    为了理解我们将对此项目进行的定制，最好先了解我们的起点是什么。空白项目本身是可运行的，尽管它显然没什么意思。花点时间运行一下这个应用。运行效果类似于图 2-6。接下来，我们将移除状态栏，并探索开始向项目添加自定义代码的最佳位置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00303.png)


    ![](img/00359.jpeg)


    **第 2 章：设置你的游戏项目**


    **17**


    **图 2-6.** *一个新的通用 iOS 应用程序*


    在图 2-6 中，我们看到一个新的通用应用正在 iPhone 模拟器上运行。若要在 iPad 模拟器上运行该应用，请从 Xcode 中“停止”按钮右侧的“方案”下拉菜单中选择“iPad
    模拟器”。我们可以看到，应用是空的；只有灰色背景。另一件需要注意的事情是，应用顶部的状态栏是显示的。尽管在很多应用中有充分的理由包含状态栏，但许多游戏可能希望移除状态栏以创造更具沉浸感的体验。要移除状态栏，请点击项目导航器（Project
    Navigator，即 Xcode 左侧的树形结构）中的根元素。选择目标（Target），然后点击右侧的“信息”（Info）标签页。图 2-7 显示了正确的视图。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00353.png)


    ![](img/00458.jpeg)


    **18**


    **第 2 章：设置你的游戏项目**


    **图 2-7.** *配置状态栏*


    一旦看到图 2-7 所示的视图，右键点击最顶层的元素（A），然后选择“添加行”（Add Row）。这将在项目列表中添加一个新元素。你需要将键（Key）值设置为“状态栏最初是隐藏的”（Status
    bar is initially hidden），并将值（Value）设置为“是”（Yes）。你在这里所做的实际上是编辑“Supporting Files”组下的
    `plist` 文件。Xcode 只是为你提供了一个友好的界面来编辑这个配置文件。


    **提示：** 导航到“Supporting Files”组下以 `info.plist` 结尾的文件。右键点击它，选择“打开方式 > 源代码”（Open
    As > Source Code）。这将显示 `plist` 文件的源代码内容。


    请注意，键值实际上是以常量形式存储的，而不是“信息”编辑器（Info editor）中显示的人类可读文本。


    当我们再次运行应用时，状态栏就被移除了，如图 2-8 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00089.png)


    ![](img/00167.jpeg)


    **第 2 章：设置你的游戏项目**


    **19**


    **图 2-8.** *没有状态栏的默认应用*


    既然我们已经探索了一种开始定制应用的简单方法，现在是时候研究一下 iOS 应用是如何组合起来的，这样我们就能做出明智的决策来添加自己的功能。


    ## iOS 应用的初始化方式


    我们知道，iOS 应用主要用 Objective C 编写，而 Objective C 是 C 的超集。Xcode 很好地隐藏了应用构建的细节，但在底层，我们知道它使用的是
    LLVM 和其他常见的 Unix 工具来完成实际工作。


    因为我们知道项目本质上是一个 C 应用，所以我们会预期应用的入口点是一个 C 语言的 `main` 函数。事实上，如果你查看“Supporting Files”组，你会找到
    `main.m` 文件，如代码清单 2-1 所示。


    **代码清单 2-1.** *main.m*


    ```

    #import <UIKit/UIKit.h>


    #import "AppDelegate.h"


    int main(int argc, char *argv[])


    {


    @autoreleasepool {


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00268.png)


    **20**


    **第 2 章：设置你的游戏项目**


    return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));


    }


    }

    ```


    代码清单 2-1 中的 `main` 函数是一个 C 函数，但你会注意到函数体显然是 Objective C 语法。一个 `@autoreleasepool`
    包裹了对 `UIApplicationMain` 的调用。`@autoreleasepool` 为这个应用设置了内存管理上下文；我们实际上无需担心这个。`UIApplicationMain`
    函数为你做了很多方便的事情——它通过查看你的 `info.plist` 文件来初始化应用，设置事件循环，并通常以正确的方式启动一切。事实上，我从未有过任何理由需要修改这个函数，因为
    iOS 提供了一个明确的位置来开始添加你的启动代码。开始添加初始化代码的最佳位置是在应用委托类（App Delegate）的实现文件中找到的 `application:didFinishLaunchingWithOptions:`
    任务。在本例中，应用委托类名为 `AppDelegate`。代码清单 2-2 显示了来自 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`
    任务的实现。


    **代码清单 2-2.** *application:didFinishLaunchingWithOptions:*


    ```

    - (BOOL)application:(UIApplication *)application


    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions


    {


    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]


    autorelease];


    // 应用启动后用于自定义的覆盖点。


    if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)
    {


    self.viewController = [[[ViewController_iPhone alloc]


    initWithNibName:@"ViewController_iPhone" bundle:nil] autorelease];


    } else {


    self.viewController = [[[ViewController_iPad alloc]


    initWithNibName:@"ViewController_iPad" bundle:nil] autorelease];


    }


    self.window.rootViewController = self.viewController;


    [self.window makeKeyAndVisible];


    return YES;


    }

    ```

