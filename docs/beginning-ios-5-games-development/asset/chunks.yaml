    \n## 总结\n\n在本章中，我们探讨了一个完整游戏所需的支持元素。这些元素包括建立应用程序的流程以及管理构成该流程的视图。我们研究了一种使用委托模式协调游戏行为（例如分数变化或游戏结束）与应用程序其他部分的方法。我们还研究了两种持久化数据的方法：通过用户设置或在磁盘上存储对象。这两种技术都使用了通过`NSCoding`协议公开的相同归档和解归档技术。\n\
    \n## 第4章 快速构建输入驱动型游戏\n\n所有游戏都由用户输入驱动，但根据游戏在用户操作之间的行为方式，游戏可以分为两种类型。一种是动作游戏，无论用户是否提供输入，屏幕上的事件都会展开。动作游戏将在第5章中探讨。在本章中，我们将研究等待用户做出选择的游戏。这类游戏包括益智游戏和策略游戏。在本章中，我们将其称为\
    \ *输入驱动型游戏*。\n\n尽管输入驱动型游戏的酷炫程度肯定不如动作游戏，但市场上仍有许多成功的此类游戏。从扫雷到数独再到愤怒的小鸟，这类游戏吸引了大量用户，因此理解这类游戏是如何实现的非常重要。图4-1展示了一个输入驱动型游戏的典型生命周期。\n\
    \n**图4-1.** *Coin Sorter——一个简单的输入驱动型游戏*\n\n在图4-1中，在任何初始设置之后，应用程序等待用户采取某些操作。当用户执行操作时，游戏状态会更新，并创建动画来反映用户的操作。由用户操作创建的动画可以很简单，例如高亮显示选择项，也可以很复杂，例如整个物理模拟。动画完成后，应用程序测试是否已达到游戏结束条件。如果没有，则应用程序再次等待用户输入。\n\
    \n在本章中，您将探索如何创建遵循图4-1所述流程的游戏。您还将了解将内容显示到屏幕以及创建动画的细节。\n\n### 探索如何将内容显示到屏幕\n\n在上一章中，我们组装了视图来创建一个完整的应用程序。我们使用Interface\
    \ Builder创建UI元素，并且大多只是用一个视图替换另一个视图，从而将用户从一个视图移动到另一个视图。在本章中，我们将更深入地研究`UIView`以及如何使用它以编程方式创建动态内容。其中包括如何将组件放置在屏幕上以及如何为其设置动画。\n\
    \n#### 理解UIView\n\n类`UIView`是UIKit的基础组件类。所有其他UI元素（例如按钮、开关和滚动视图等）都是`UIView`的子类。甚至`UIWindow`类也是`UIView`的子类，因此当我们在屏幕上操作内容时，很多工作都涉及与`UIView`类交互。\n\
    \n`UIView`类的工作方式与其他编程环境中的基础UI组件类非常相似。每个`UIView`定义一个屏幕区域，并拥有许多子视图，这些子视图相对于其父视图进行绘制。图4-2展示了`UIView`实例的示例布局。\n\
    \n**图4-2.** *嵌套的UIView实例*\n\n在图4-2中，您可以在后面看到示例应用程序的根`UIWindow`。当用户看到游戏视图时，`UIWindow`有一个子视图，即与`GameController`类关联的`view`属性。当用户单击New\
    \ Game按钮时，`GameController`将Portrait Play视图作为其`view`的子视图放置。Portrait Play视图有五个子视图，在XIB文件中定义。其中四个子视图是`UILabel`，用于显示和跟踪用户的分数和剩余回合。第五个`UIView`是Portrait\
    \ Game Holder视图，它负责定义放置来自`CoinsController`的视图的区域。来自`CoinsController`的视图有多个子视图，这些子视图构成了游戏的交互部分。稍后将更详细地研究这些视图，但就目前而言，请理解这些视图以与其他视图完全相同的方式添加到场景中。\n\
    \n关于图4-2的另一点需要注意的是，并非所有视图都放置在其父视图的相同相对位置。例如，Portrait Play视图放置在`GameController`视图的左上角，而Portrait\
    \ Game Holder视图放置在其父视图Portrait Play的大约一半高度处。子视图的`frame`属性决定了其相对于父视图的位置。图4-3更详细地展示了这一点。\n\
    \n**图4-3.** *UIView的frame*\n\n如图4-3所示，`UIView`的`frame`不仅描述了子视图的位置，还描述了视图的大小。通常，`frame`被认为描述了一个子视图的区域。`frame`属性是一个`CGRect`类型的结构体，由另外两个结构体`origin`和`size`组成。字段`origin`是`CGPoint`类型，以点为单位描述子视图左上角的位置。字段`size`是`CGSize`类型，描述子视图的宽度和高度（以点为单位）。\n\
