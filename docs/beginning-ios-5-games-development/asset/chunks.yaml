    **CHAPTER 6: Create Your Characters: Game Engine, Image Actors, and Behaviors**
    Here the protocol Representation is defined. This protocol must be conformed to
    by any object that is to manage the UIView associated with an actor. The idea
    here is that there are at least two kinds of UIViews used to draw an actor: those
    based on images and those based on programmatic drawing. There can be other ways
    to implement a UIView that represents an actor, such as a UIView with subviews.
    We don’t cover that example in this chapter, but we do look at image-based actors
    in this chapter and vector-based actors in the next.


    Regardless of how an actor’s UIView is implemented, the class GameController is
    going to have to know how to get a reference to the correct UIView and give the
    Representation the chance to update how it looks. Hence, we have the two required
    tasks getViewForActor:In: and updateView:ForActor:In:.


    In the preceding listing, we see a second protocol named Behavior. We are going
    to create some simple classes that describe a particular behavior of an actor
    that can be shared among different types of actors. For example, we will create
    a behavior called LinearMotion that describes how an actor can move across the
    screen. Several types of actors will use this behavior. This is where the protocol
    Behavior comes in; it provides us with a single required task called applyToActor:From:
    that will be called by a GameController for every step of the game.


    The listing also shows a number of properties. Many of these should be familiar
    from the previous chapter—including center, speed, and radius. Some new properties
    have also been added to make the Actor class as reusable as possible. The two
    properties added and removed are used to keep track of whether the actor has been
    added or removed from game.


    The property behaviors is an NSMutableArray containing objects that conform to
    the protocol Behavior. By adding Behavior objects to the property behaviors, we
    can customize how each actor behaves. This can be as simple as describing the
    actor’s motion or sophisticated artificial intelligence. We provide a special
    task called addBehavior:, which is shorthand for getting the NSMutableArray behaviors
    and adding a Behavior object. The addBehavior: task also gives us a chance to
    lazy load the NSMutableArray behaviors so we don’t create it if we don’t need
    it.


    You can also see in Listing 6–9 that we added a variant and state property. It
    is very common for actors to require these two properties, so they are included
    in the class Actor for simplicity. The last property is alpha, which is used to
    describe the transparency of the actor on the screen.


    The tasks defined in Listing 6–9 are basically the same as the task described
    in the preceding chapter for the class Actor. The only real difference here is
    that when an actor is initialized, a Representation must be passed in. We have
    also added a utility task, randomPointAround:At:, which is used to create a random
    point on a circle of aRadius size around point aPoint.


