    Let’s take a look at authenticating our user next.


    **Facebook Authentication**


    If you are using Facebook in a browser, you obviously authenticate through a web
    page that is owned by Facebook. In this way, you are trusting that the password
    information is going directly to Facebook and no one else. This makes a lot of
    sense on the web,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00310.png)


    ![](images/00012.jpeg)


    **232**


    **CHAPTER 1: App Cubby**


    because we you don’t want other web sites handling your user’s credentials. Honestly,
    as an app developer, I am happy to never have to worry about the user’s credentials
    for a third-party service.


    However, when it comes to developing applications outside of the browser, this
    authentication mechanism can be a bit of a nuisance, since you have to bring up
    a browser window to handle the authentication and then pass the appropriate authentication
    information back your application. It’s a pain. To make life simpler, Facebook
    implements all of this for you, and it’s done in a way that enables single sign
    on for the user. Meaning, if a user has already authenticated with Facebook through
    another app that used the Facebook iOS SDK, he don’t have to reenter his username
    and password. However, the user still needs to grant your application permissions.


    Figure 9–15 shows Facebook asking a user to grant permissions.


    **Figure 9–15.** *Facebook asking a user to grant permission to an application*
    In Figure 9–15, we see a Facebook page in Safari asking for the user to grant
    permissions to the Facebook application named Belt Commander. This web page was
    brought up when the iOS application Belt Commander asked to authenticate the user
    through Facebook. The Facebook code we included in our project will use Safari
    to authenticate the user if the native Facebook application is not installed;
    otherwise, the native one will be used. To enable Facebook to use either the native
    Facebook application or Safari, our application must be registered to open a URL
    containing our Facebook application ID.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00218.png)


    **CHAPTER 1: App Cubby**


    **233**


    **NOTE:** If the application is not configured to open a URL, then Facebook will
    fall back to using a UIWebView in a popup within the application. I think the
    best user experience is to shoot for either the native application or Safari,
    by making sure your application will open the correct URL.


    We will take another look at this in a bit.


    **Initializing Facebook**


    Before we can authenticate we have to create and initialize our Facebook object
    so we can perform our authentication process. Let’s take a look at how we initialize
    Facebook in our application, as shown in Listing 9–7.


    **Listing 9–7.** *RootViewController.m (initFacebook)*


    -(void)initFacebook{


    facebook = [[Facebook alloc] initWithAppId:FB_APP_ID andDelegate:self]; NSUserDefaults*
    defaults = [NSUserDefaults standardUserDefaults];


    facebook.accessToken = [defaults objectForKey:@"AccessToken"]; facebook.expirationDate
    = [defaults objectForKey:@"ExpirationDate"];


    }


    In Listing 9–7, we see the task initFacebook that is called once when the parent
    UIViewController is loaded. In this task, we create a new Facebook object by passing
    in an NSString containing our application id and specifying self as the delegate.
    After that, we pull two objects out of the standard user defaults: an access token
    and an expiration date. These objects, if they exist, are from a previous authentication
    session and will prevent the user from needing to authenticate when we call authenticate
    later.


    The delegate object passed to initWithAppId:andDelegate: must conform to the protocol
    FBSessionDelegate, which defines the tasks fbDidLogin, fbDidNotLogin, and fbDidLogout.
    For this example, we only care about fbDidLogin, as shown in Listing 9–8.


    **Listing 9–8.** *RootViewController.m (fbDidLogin)*


    - (void)fbDidLogin{


    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];


    [defaults setObject:facebook.accessToken forKey:@"AccessToken"];


    [defaults setObject:facebook.expirationDate forKey:@"ExpirationDate"];


    [defaults synchronize];


    }'
  trans: "\n# 将 Facebook 集成到 iOS 应用中\n\n很难说集成 Twitter 还是集成 Facebook 是更常见的需求。\n\n值得庆幸的是，Facebook\
    \ 在提供自身集成方面已经完成了最困难的部分。与 Twitter 类似，Facebook 提供了一组可用于与其社交图谱集成的 Web 服务。但这是比较困难的方式；简单的方式是使用一个名为\
    \ **Facebook iOS SDK** 的库，该库同样由 Facebook 编写。\n\n## 开始使用 iOS 与 Facebook\n\n最好的入手点是从\
    \ GitHub 上的 `facebook-ios-sdk` 项目下载源代码。该项目可以在以下地址找到：\n\nhttps://github.com/facebook/facebook-ios-sdk\n\
    \n下载后，你会发现代码是以 Xcode 项目形式发布的，方便打开和浏览。将重要代码引入你项目的最简单方法是，只需将名为 `FBConnect` 的文件组从\
    \ Facebook 项目拖拽到你的项目中。图 9-13 显示了 `FBConnect` 项目的内容。\n\n![图 9-13](img/00079.png)\
    \  \n![图 9-13](img/00114.jpeg)\n\n**图 9–13.** *Facebook iOS Xcode 项目中的重要类*\n\n\
    在图 9-13 中，我们看到了来自 Facebook iOS 项目的多个文件。以 `FB` 开头的类是 Facebook 专用的，而 `JSON` 组中的类是用于处理\
    \ JSON 字符串的通用类，并且是 Facebook 类的依赖项。文件 `FBConnect.h` 是主头文件，很可能就是你想要导入的文件。`Facebook`\
    \ 类是与 Facebook 交互的主类。\n\n通常，你会创建这个类的一个单例，并通过它来执行所有与 Facebook 相关的操作。\n\n不过，在查看源代码之前，我们需要先登录我们的\
    \ Facebook 账号，并创建一个 Facebook 应用。\n\n## 创建一个 Facebook 应用\n\n可以将 Facebook 应用视为我们应用中的\
    \ Facebook 组件。Facebook 要求我们这样做，是为了确保代表用户执行的任何 Facebook 操作都有一个关联的身份。Facebook 也将该\
    \ Facebook 应用用作一个安全上下文。当用户同意让我们的应用进行发帖时，他们实际上是在授权我们新创建的 Facebook 应用能够进行发帖。\n\n\
    ![Facebook 应用](img/00149.png)  \n![Facebook 应用](img/00320.jpeg)\n\n图 9-14 显示了我为示例游戏\
    \ *Belt Commander* 创建的 Facebook 应用。\n\n**图 9–14.** *Facebook 应用*\n\n在图 9-14 中，我们看到了一个\
    \ Facebook 应用的设置页面。在项目 A 处，你可以看到**应用 ID**。我们在代码中创建 `Facebook` 对象并进行身份验证时，会用到这个值。在项目\
    \ B 处，你会注意到 Facebook 要求你添加 **iOS 包标识符**。我不知道它用这个信息做什么。我在编写本章代码时，填错了这个值，但一切运行正常。你的情况可能会有所不同。创建\
    \ Facebook 应用并不难，但我不想在此处详细说明，因为这个过程似乎每隔几个月就会变化。基本上，你需要将你的 Facebook 账号注册为开发者，然后添加一个新应用。具体指南可以在\
    \ https://developers.facebook.com/apps 找到。\n\n一旦你将源代码复制到你的项目中并创建好 Facebook 应用，就可以开始将\
    \ Facebook 集成到应用中去了。接下来，让我们先看一下如何验证用户身份。\n\n## Facebook 身份验证\n\n如果你在浏览器中使用 Facebook，显然是通过\
    \ Facebook 拥有的网页进行身份验证。通过这种方式，你可以信任密码信息直接发送给 Facebook，而不会被其他人截获。这在 Web 上非常有意义，因为你不想让其他网站处理你的用户凭据。老实说，作为应用开发者，我很高兴永远不必担心用户用于第三方服务的凭据。\n\
    \n然而，对于在浏览器之外开发应用来说，这种身份验证机制可能会有些麻烦，因为你需要弹出一个浏览器窗口来处理身份验证，然后将相应的身份验证信息传递回你的应用。这挺烦人的。为了让事情更简单，Facebook\
    \ 为你实现了所有这些功能，并且实现方式能够为用户启用单点登录。这意味着，如果用户已经通过另一个使用 Facebook iOS SDK 的应用与 Facebook\
    \ 进行了身份验证，他们就无需重新输入用户名和密码。不过，用户仍然需要授权给你的应用。\n\n图 9-15 展示了 Facebook 请求用户授予权限的界面。\n\
    \n**图 9–15.** *Facebook 请求用户授权应用*\n\n在图 9-15 中，我们看到了 Safari 中的一个 Facebook 页面，要求用户授权给名为\
    \ *Belt Commander* 的 Facebook 应用。这个页面是在 iOS 应用 *Belt Commander* 要求通过 Facebook\
    \ 验证用户身份时弹出的。我们包含在项目中的 Facebook 代码，如果本地 Facebook 应用未安装，则会使用 Safari 来验证用户身份；否则，会使用本地应用。为了让\
    \ Facebook 能够使用本地 Facebook 应用或 Safari，我们的应用必须注册为能够打开一个包含我们 Facebook 应用 ID 的 URL。\n\
    \n**注意：** 如果应用未配置为能打开某个 URL，那么 Facebook 将退而使用应用内的 `UIWebView` 弹出窗口进行验证。我认为最佳的用户体验是通过确保你的应用能够打开正确的\
    \ URL，来争取使用本地应用或 Safari。\n\n我们稍后会再讨论这一点。\n\n## 初始化 Facebook\n\n在进行身份验证之前，我们必须创建并初始化我们的\
    \ `Facebook` 对象，以便执行身份验证流程。让我们看看如何在应用中初始化 Facebook，如列表 9-7 所示。\n\n**列表 9–7.**\
    \ *RootViewController.m (initFacebook)*\n\n```\n-(void)initFacebook{\n\n    facebook\
    \ = [[Facebook alloc] initWithAppId:FB_APP_ID andDelegate:self];\n    NSUserDefaults*\
    \ defaults = [NSUserDefaults standardUserDefaults];\n\n    facebook.accessToken\
    \ = [defaults objectForKey:@\"AccessToken\"];\n    facebook.expirationDate = [defaults\
    \ objectForKey:@\"ExpirationDate\"];\n\n}\n```\n\n在列表 9-7 中，我们看到了 `initFacebook`\
    \ 任务，它在父级 `UIViewController` 加载时被调用一次。在这个任务中，我们通过传入一个包含应用 ID 的 `NSString` 并将 `self`\
    \ 指定为委托，来创建一个新的 `Facebook` 对象。之后，我们从标准的用户默认设置中取出两个对象：一个**访问令牌**和一个**过期日期**。如果这些对象存在，它们来自之前的身份验证会话，可以防止用户在稍后调用验证方法时需要重新验证。\n\
    \n传递给 `initWithAppId:andDelegate:` 的委托对象必须遵循 `FBSessionDelegate` 协议，该协议定义了 `fbDidLogin`、`fbDidNotLogin`\
    \ 和 `fbDidLogout` 这些任务。对于这个示例，我们只关心 `fbDidLogin`，如列表 9-8 所示。\n\n**列表 9–8.** *RootViewController.m\
    \ (fbDidLogin)*\n\n```\n- (void)fbDidLogin{\n\n    NSUserDefaults* defaults =\
    \ [NSUserDefaults standardUserDefaults];\n\n    [defaults setObject:facebook.accessToken\
    \ forKey:@\"AccessToken\"];\n    [defaults setObject:facebook.expirationDate forKey:@\"\
    ExpirationDate\"];\n    [defaults synchronize];\n\n}\n```\n"
- fmt: '# In `Listing 9–8`, we see the task `fbDidLogin` defined by `FBSessionDelegate`
    and implemented by `RootViewController`. This task is called when the user is
    successfully authenticated. To streamline our user experience, we record the access
    token and the expiration date in the standard user defaults so we can retrieve
    them next time the application starts, as shown in `Listing 9–7`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00116.png)


    ![](images/00131.jpeg)


    **234**


    # CHAPTER 1: App Cubby


    ## Authentication with Facebook


    Once the `Facebook` object is created and configured, we are ready to authenticate.
    In our example application, we are going to have the user click the Facebook button
    on the Welcome screen in order to authenticate them. In other applications, it
    might make sense to try and authenticate at some other time. It doesn’t really
    matter when you authenticate, as long as you do it before you perform any other
    operations with the `Facebook` object. `Listing 9–9` shows the authentication
    code.


    **Listing 9–9.** *RootViewController.m (facebookButtonClicked:)*


    ```

    - (IBAction)facebookButtonClicked:(id)sender {


    NSMutableArray* permissions = [NSMutableArray new];


    [permissions addObject: @"publish_stream"];


    [permissions addObject:@"publish_checkins"];


    [permissions addObject:@"user_about_me"];


    [facebook authorize:permissions];


    }

    ```


    In `Listing 9–9`, we see that code that is called the Facebook button is clicked.
    In this task, we create an `NSMutableArray` containing `NSString` instances for
    each Facebook permission we are requesting. In this case, we want to be able to
    publish to streams, publish check-ins, and get some basic information about the
    user. These are basically example permissions for this application—all we really
    need is `publish_stream`. The array of permissions is simply passed to `authorize`,
    which in turn will bring up whichever authorization mechanism is appropriate,
    native Facebook, Safari, or a `UIWebView` in a popup.


    As mentioned, to support either native Facebook authentication or Safari authentication,
    the application must be configured to open a URL containing the Facebook application
    name as the protocol section of the URL. `Figure 9–16` shows the first step in
    this configuration.


    **Figure 9–16.** *Setting `URL types` to respond to a URL with a given protocol*


    In `Figure 9–16`, we see section of the Info panel in Xcode. We have added a new
    row called `URL types` of type array. In the first item in that array, we added
    a dictionary with another array named `URL Schemes`. The first item in `URL Schemes`
    has a value of `fb[your_fb_app_id]`, as shown with the app ID for the Facebook
    application Belt Commander. The next step to configure your application to properly
    authenticate with Facebook is to make your application delegate respond to `application:handleOpenURL:`,
    as shown in `Listing 9–10`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00232.png)


    **CHAPTER 1: App Cubby**


    **235**


    **Listing 9–10.** *AppDelegate.m (application:handleOpenURL:)*


    ```

    -(BOOL)application:(UIApplication *)application handleOpenURL:(NSURL *)url{


    UIWindow* window = [application.windows objectAtIndex:0];


    RootViewController* rvc = (RootViewController*)[window rootViewController]; Facebook*
    facebook = [rvc facebook];


    return [facebook handleOpenURL:url];


    }

    ```


    In `Listing 9–10`, we see the task `application:handleOpenURL:` as defined by
    `AppDelegate`. This task gets called when Safari or the native Facebook applications
    tries to pass control back to our application. By calling `handleOpenURL` on our
    `Facebook` object and passing in the URL, we complete our Facebook authentication
    setup. When this gets called, `fbDidLogin` will be called (from `Listing 9–8`)
    and we can record our authentication information. More important, we can now make
    Facebook API calls on behalf of our user. Let’s look at this next.


    ## Facebook API Calls


    Now that we have looked at setting up Facebook for authentication, we want to
    explore a little about making API calls with Facebook. This is the real reason
    we wanted to include Facebook in our application. Facebook provides a number of
    helpful tasks to perform operations with its Social Graph API. We are not going
    to cover all of the details of this API. Facebook’s excellent document can be
    found at:


    [http://developers.facebook.com/docs/reference/api/](http://developers.facebook.com/docs/reference/api/).


    In our sample application we are going to post a message every time we end a game,
    reporting our score. The code to do this is shown in `Listing 9–11`.


    **Listing 9–11.** *RootViewController.m (notifyFacebook)*


    ```

    -(void)notifyFacebook{


    if ([facebook isSessionValid]){


    NSString* desc = [[@"I just scored " stringByAppendingFormat:@"%i",


    [beltCommanderController score]] stringByAppendingString:@" points, on Belt Commander"];
    NSString* appLink = @"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8";


    NSMutableDictionary* params = [NSMutableDictionary dictionaryWithObjectsAndKeys:
    FB_APP_ID, @"app_id",


    appLink, @"link",


    @"Presented by ClayWare Games, LLC", @"caption", desc, @"description",


    @"A new high score!", @"message",


    nil];


    [facebook requestWithGraphPath:@"me/feed" andParams:params andHttpMethod:@"POST"


    andDelegate:self];


    }


    }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00287.png)


    ![](images/00277.jpeg)


    **236**


    **CHAPTER 1: App Cubby**


    In `Listing 9–11`, we see the task `notifyFacebook` as defined by `RootViewController`.
    This task is called at the end of every game. The first thing we do is check to
    see if the user has authenticated with Facebook. If she has, then we assemble
    all of the pieces of our message in an `NSMutableArray`. The only item that will
    be included is the ID of our Facebook application with the key `app_id`. Notice
    that we are also including a link to the iTunes Store for our application; this
    will hopefully drive a few more downloads from our user’s Facebook friends.


    Once the parts of our message are all assembled, we simply call `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`.
    By specifying a POST, we are indicating that we simply want to apply this to our
    user’s feed (`me/feed`) without their interaction. By setting the delegate to
    `self`, we will be notified if this operation succeeds (or not). In this simple
    example, we don’t actually care if it succeeds. If all goes well, the user will
    see something like `Figure 9–17`.


    **Figure 9–17.** *Successful posting on Facebook*


    In `Figure 9–17`, we see that the post to my Facebook page was successful. Like
    I said earlier, there is a lot more you can do with Facebook, and I encourage
    the reader to look into it.


    As we can see, the Facebook API is not as easy to use as the built-in Twitter
    support. But I still think it is pretty easy once you work through it the first
    time. It will be interesting to see if Facebook gets the same sort of treatment
    as Twitter did by the iOS developers at Apple.


    ## Summary


    In this chapter, we explored Game Center and introduced what services it provides
    to the user. We explored those features in terms of `GameKit` to see how we can
    post the user’s score to a leaderboard and award achievements. Continuing with
    the social trend, we looked at the built-in support for Twitter in iOS 5. Lastly,
    we looked at integrating Facebook into an iOS application. We covered how to handle
    authentication as well as post a simple message to the user''s feed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00077.png)


    ![](images/00173.png)


    # 10 Chapter


    ## Monetizing via the Apple App Store


    There are three main ways to make money by having apps in the Apple App Store.
    The most obvious way is to simply charge for the application. The second is to
    give the app away for free, but include ads. Another way, which can work for free
    and paid apps, is to include things for sale within the app. These are called
    in-app purchases, and are very popular with some styles of games.'
