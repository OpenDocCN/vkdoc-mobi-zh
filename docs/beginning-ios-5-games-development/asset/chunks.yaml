    Protocol


    Each implementation of the tasks defined by the `CoinsControllerDelegate` protocol
    for the class `GameController` is shown in Listing 3–7. When a `CoinsController`
    starts a new game, it calls `gameDidStart:with:` on the delegate object. In our
    case, we want to make sure the remaining turns labels and the score labels reflect
    the starting values of the game. These could be just about anything, because we
    don’t know if we are starting a new game or continuing an old game. Similarly,
    these labels are updated whenever the tasks `scoreIncreases:with:` and `turnsRemainingDecreased:with:`
    are called.


    Lastly, in Listing 3–7, the task `gameOver:with:` is called when the game is over.
    In this task, we record the high score and switch to the High Score view. Because
    we allow the game to be played in landscape or portrait orientation, the phone
    might be in landscape when the game is over. If that is the case, we want to make
    sure the interface orientation is correct, so the High Score view is displayed
    correctly. One way to do this is to simply reset our `UIWindow`’s `rootViewController`
    property. This causes `shouldAutorotateToInterfaceOrientation:` to be called and
    makes sure our views are shown in the correct orientation.


    ## `HighscoreController`: A Simple, Reusable Component


    The `HighscoreController` class is responsible for managing a view for displaying
    high scores as well as persisting those high scores. The `HighscoreController`
    is a pretty simple class—the header file for the class is shown in Listing 3–8.


    **Listing 3–8.** *HighscoreController.h*


    ```

    #define KEY_HIGHSCORES @"KEY_HIGHSCORES"


    #import <UIKit/UIKit.h>


    #import "Highscores.h"


    #import "Score.h"


    [www.it-ebooks.info](http://www.it-ebooks.info/)


