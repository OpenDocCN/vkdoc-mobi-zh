    # 第一步：为产品命名


    我们要做的第一件事就是为产品命名。你可以选择任何喜欢的名称。公司标识符（Company Identifier）将在应用提交过程中用于识别应用。你可以将公司标识符设置为任意值，但通常的做法是使用反向域名。如图
    2-3 所示，套装标识符（Bundle Identifier）由产品名称和公司标识符合并而成。套装标识符之后可以修改——向导仅仅展示了默认值。当你将游戏提交至
    App Store 时，套装标识符用于指明你上传的是哪个应用。


    通过从“设备系列”列表中选择“通用”（Universal），你是在告知 Xcode 创建一个能同时在 iPhone 和 iPad 上运行的项目。在本例中，我们将不使用
    Storyboard 或自动引用计数（Automatic Reference Counting）。同样地，我们也不会创建任何单元测试，因此“包含单元测试”选项也应取消勾选。点击“下一步”会提示你保存项目。Xcode
    会在所选目录中创建一个新文件夹，因此如果你不想手动创建文件夹，也无需操作。保存新项目后，你会看到类似于图 2-4 的界面。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00058.png)


    ![](img/00254.jpeg)


    **第 2 章：设置你的游戏项目**


