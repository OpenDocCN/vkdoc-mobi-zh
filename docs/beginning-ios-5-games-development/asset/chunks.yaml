    that represents it. The variable viper of type Viper02 is a references to our
    spaceship, and the last variable, stepNumber, keeps track of how many frames of
    the game we have stepped through. Like most UIViewController classes, understanding
    how it works starts by looking at the viewDidLoad task shown in Listing 5–14.


