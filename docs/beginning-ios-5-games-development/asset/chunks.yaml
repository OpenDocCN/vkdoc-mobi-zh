    \ a dollar sign, a dot, and a cross. When this example is running, each cylinder\
    \ travels in a straight line. When a cylinder reaches the edge of the screen,\
    \ it wraps around to the opposite edge. As each cylinder travels, it also appears\
    \ to spin or tumble about itself. After a few seconds, the bands and symbol on\
    \ each cylinder will start flashing, announcing that it is about to disappear.\
