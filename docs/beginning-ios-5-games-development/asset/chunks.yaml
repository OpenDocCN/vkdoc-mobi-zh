    Shield* shield = [Shield shieldProtecting:saucer From:bullet];


    [self addActor:shield];


    [self removeActor:bullet];


    break;


    }


    }


    }


    }


    for (Powerup* powerup in powerups){


    if ([powerup overlapsWith:viper]){


    [powerup doHitOn:viper in:self];


    }


    }


    }


    In Listing 11–15, we continue looking at the task doCollisionDetection. While
    iterating over all of the Bullets, we start by considering the interactions between
    Bullets and the Vipers. We do this by checking the source property on bullet.
    If the source was a Saucer, then the Bullet was intended for the Viper and cannot
    hurt a Saucer. If the Bullet overlaps with the Viper we decrement the Viper’s
    health, add a Shield, and remove the Bullet from the game.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00316.png)


    **CHAPTER 11: A Completed View Belt Commander**


    **277**


    If the Bullet was not shot by a Saucer, it must have come from the Viper. So we
    check to see if bullet overlaps with any of the Saucers. If it does, we decrement
    the health of the Saucer, add a Shield to the Saucer, and remove the Bullet.


    The last relationship we have to consider in doCollisionDetection is that between
    Powerups and the Viper. We iterate over all of the Powerups in the game and check
    if they overlap. If they do we call doHitOn:in: on the Powerup to apply the bonus.
    The implementation of doHit:in: will be described when we consider the Powerup
    class in detail.


    We have now looked at all of the interactions between the different actors, before
    look at each of the different Actor classes, let’s take a look how we update the
    score and the health bar on the screen.


