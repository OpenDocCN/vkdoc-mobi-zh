    ## CHAPTER 5: Quickly Build a Frame-by-Frame Game


    ### Simple Movement


    Simple Movement sets up the application to continuously update the position of
    a spaceship. The spaceship will move to any point the user taps, as shown in **Figure
    5–4**.


    **Figure 5–4.** *Simple Movement*


    In **Figure 5–4**, we see a spaceship from a top-down perspective with a star
    field in the background. When the user touches any point on the screen, the ship
    will animate to that point. This type of animation could easily be accomplished
    using the type of animations presented in the previous chapter, but this will
    provide us with a good starting point. In terms of views, what you are seeing
    in **Figure 5–4**, ignoring the top navigation bar, is a `UIView` with two `UIImageView`
    subviews. One of the `UIImageView`s is the background star field and the other
    is the spaceship. The basic idea here is that we can periodically update the location
    of the `UIImageView` of the spaceship to create an animation. Like our other examples,
