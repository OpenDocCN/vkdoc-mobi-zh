    @end


    In Listing 11–1, we see the header for the class RootViewController. The class
    RootViewController is responsible for managing the application state that does
    not involve the actual playing of the game. This includes transitioning from view
    to view, handling application startup, and managing the social services from Chapter
    9\. As we can see in Listing 11–1, we have IBOutlets for the three UIViewControllers;
    welcomeController, beltCommanderController, and extrasController.


    Listing 11–1 also shows that the class RootViewController has IBOutlets for two
    buttons: leaderBoardButton and tweetButton. A reference to these objects is required,
    as they will be enabled or disabled at runtime. The GKLocalPlayer is used to manage
    Game Center and the Facebook object is used to manage interactions with Facebook.


    Let’s take a look at how we handle the navigation across views.


    **View Navigation**


    In order to change views when a user clicks a button, we have created a number
    of IBAction tasks in the implementation of RootViewController and are wired up
    in the XIB


    file to the corresponding buttons. Listing 11–2 shows two of these IBAction tasks.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00214.png)


    **262**


    **CHAPTER 11: A Completed View Belt Commander**


    **Listing 11–2.** *RootViewController.m (extrasButtonClicked: and playButtonClicked:)*


    - (IBAction)extrasButtonClicked:(id)sender {


    [self pushViewController:extrasController animated:YES];


    }


    - (IBAction)playButtonClicked:(id)sender {


    [self pushViewController:beltCommanderController animated:YES];


    [beltCommanderController doNewGame: [extrasController gameParams]];


    }


    In Listing 11–2, we see two tasks responsible for handling a button click. The
    task extrasButtonClicked: is called when the user presses the Extras button on
    the start view. This task simply uses task pushViewController:animated:, as defined
    by UINavigationController, to present the view associated with extrasController.


    Similarly, the task playButtonClicked: uses the same task to display the view
    associated with beltCommandController as well as calls doNewGame: on beltCommanderController.
    Listing 11–3 shows how we navigate back to the start view.


    **Listing 11–3.** *RootViewController.m (backFromExtras:)*


    - (IBAction)backFromExtras:(id)sender {


    [self popViewControllerAnimated:YES];


    }


    In Listing 11–3, we see the task backFromExtras: that is called when the user
    clicks the Back button on the extras view. To navigate back to the start view,
    we call popViewControllerAnimated: to remove the extras view show the start view.
    The task popViewControllerAnimated: is defined by UINavigationController, which
    RootViewController is a subclass of.


    There is one last piece of code that handles navigation and that is the code that
    response to the two dialogs that appear on the game view, as shown in Listing
    11–4.


    **Listing 11–4.** *RootViewController.m (alertView:clickedButtonIndex:)*


    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex{


    if (alertView == pauseGameAlerTView){


    if (buttonIndex == 0) {


    [self endOfGameCleanup];


    [self popViewControllerAnimated:YES];


    } else {


    [beltCommanderController setIsPaused:NO];


    }


    }


    if (alertView == newGameAlertView){


    if (buttonIndex == 0) {


    [beltCommanderController doNewGame: [extrasController gameParams]];


    } else {


    [self popViewControllerAnimated:YES];


    }


    }


    }


    In Listing 11–4, we see the task alertView:clickedButtonAtIndex:, which is defined
    by the protocol UIAlertViewDelegate and implemented by RootViewController. In
    this task, we first check which UIAlertView was clicked.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00406.png)


    **CHAPTER 11: A Completed View Belt Commander**


    **263**


    If alertView is equal to pauseGameAlertView, then we know that the user has clicked
    the pause button on the game view and is responding to the dialog that is presented.
    If the user clicks Yes on the dialog (buttonIndex == 0), then the user wants to
    exit their current game. We call endOfGameCleanup and popViewControllerAnimated:;
    the latter of course returns us the start view. The task endOfGameCleanup is responsible
    for reporting on the social media services and we will look at it shortly. If
    the user had clicked No, we simply un-pause the game calling setIsPaused: and
    beltCommanderController and pass in NO.


    In Listing 11–4, there are two possible UIAlertViews that might be responsible
    for alertView:clickedButtonAtIndex: being called. We looked at the case for the
    UIAlertView pauseGameAlertView; the other option is that it was the newGameAlertView
    is responsible. This UIAlertView is displayed at the end of a game when the user
    has lost all of his health. This dialog allows the user to simply start a new
    game or return to the start view. As can be seen, starting a new game is as simple
    as calling doNewGame: on beltCommanderController. To return to the start view,
    we use the now familiar task popViewControllerAnimated:.


    The code responsible for displaying the two different UIAlertView is very similar;
