    In this example, these two objects—the actor and the delegate—will be the same
    object, either a Bullet or a HealthBar. The implementation of the class VectorActorView
    is very simple, as can be seen in Listing 7–10.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00162.png)


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **165**


    **Listing 7–10.** *VectorActorView.m*


    - (void)drawRect:(CGRect)rect


    {


    CGContextRef context = UIGraphicsGetCurrentContext();


    [delegate drawActor:actor WithContext:context InRect:rect];


    }


    In Listing 7–10, we see that the implementation is the class VectorActorView a
    single method, the implementation of the task drawRect:. In this method, we get
    a reference to the current graphics context by calling UIGraphicsGetCurrentContext
    and passing the context and the actor to the delegate to be drawn in the CGRect
    specified. Let’s now take a look at a specific example.


    **Drawing a HealthBar**


    As mentioned, the vector-based actors used in this example are their own delegates
    in terms of drawing, so let’s look at the HealthBar class again and see how it
    draws itself.


    See Listing 7–11.


    **Listing 7–11.** *HealthBar.m (drawActor:WithContext:InRect:)*


    -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect{


    CGContextClearRect(context,rect);


    float height = 10;


    CGRect backgroundArea = CGRectMake(0, self.radius-height/2, self.radius*2, height);


    [self.backgroundColor setFill];


    CGContextFillRect(context, backgroundArea);


    CGRect healthArea = CGRectMake(0, self.radius-height/2, self.radius*2*percent,
    height);


    [self.color setFill];


    CGContextFillRect(context, healthArea);


    }


    In Listing 7–11, we start by calling CGContectClearRect. This erases any old content
    in the given rect, getting us ready to do our real drawing. To draw the HealthBar,
    all we have to do is draw two rectangles, one for the background and another on
    top of the background representing the current percent of the health bar. To draw
    a rectangular area (as apposed to drawing the edges of a rectangle), we define
    a rect by calling CGRectMake. Then we specify the color to be used by calling
    setFill on the UIColor object backgroundColor, which is a property of HealthBar.


    To actually change the color of the pixels of the UIView being drawn, we call
    CGContextFillRect passing in our context and the CGRect backgroundArea. To draw
    the foreground rectangle, we repeat the process, but the width of our top rectangle,
    healthArea, is calculated based the value of the property percent. This indicates
    that every time the percent of the HealthBar changes, we have to redraw the HealthBar.
    To make sure this happens, we have to provide our own implementation of setPercent:
    instead of relying on the default implementation that would be provided by a synthesized


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00444.png)


    **166**


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    property. Listing 7–12 shows the custom implementation of setPercent: for the
    class HealthBar.


    **Listing 7–12.** *HealthBar.m (setPercent:)*


    -(void)setPercent:(float)aPercent{


    if (percent != aPercent){


    percent = aPercent;


    if (percent < 0){


    percent = 0;


    }


    if (percent > 1){


    percent = 1;


    }


    [self setNeedsViewUpdated:YES];


    }


    }


    Listing 7–12 shows our custom implementation of setPercent:. First we check to
    see if the values of percent (the backing variable for the property) and the passed
    in value aPercent have different values. If they do, we set percent to aPercent
    and we normalize the values by insuring it is between the values 0 and 1\. Lastly,
    we call setNeedsViewUpdate: with Yes. This insures that the HealthBar will be
    redrawn during the next step in the animation. Let’s now take a look at how the
    Bullet class is drawn.


    **Drawing the Bullet Class**


    We have looked at the class HealthBar and inspected how it is drawn. We only used
    a single drawing function, CGContextFillRect, to create our visual effect. Of
    course there are many, many more drawing functions that allow you to create any
    visual effect you want. We are not going to cover all of these functions, but
    there is fantastic documentation available online. That being said, let’s take
    a look at the drawing implementation of the class Bullet. See Listing 7–13.


    **Listing 7–13.** *Bullet.m (drawRect:WithContext:InRect:)*


    -(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect{


    CGContextAddEllipseInRect(context, rect);


    CGContextClip(context);


    CGFloat locations[2];


    locations[0] = 0.0;


    locations[1] = 1.0;


    CGColorSpaceRef space = CGColorSpaceCreateDeviceRGB();


    UIColor* color1 = nil;


    UIColor* color2 = nil;


    if (damage >= 30){


    color1 = [UIColor colorWithRed:1.0 green:0.8 blue:0.8 alpha:1.0];


    color2 = [UIColor colorWithRed:1.0 green:0.0 blue:0.0 alpha:1.0];


    } else if (damage >= 20){


