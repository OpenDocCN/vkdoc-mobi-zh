    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    In Figure 7–5 we see a zoomed in detail of a comet. It is composed of many particles,
    each one slowly fading in place to produce the tail of the comet. Let’s take a
    look at the Comet class and see how this visual is created. Listing 7–23 shows
    the header for the Comet class.


