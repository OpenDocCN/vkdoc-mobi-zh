- fmt: "# Support Images\n\nNow let’s take a look at how we specify other support\
    \ images based on device type, such as icons and splash screens.\n\n## Support\
    \ Images\n\nEvery iOS application has a number of images that must accompany the\
    \ application. At the very least, an icon must be specified. Optionally, an image\
    \ can be specified that is displayed as the application is launched. It is generally\
    \ a good idea to provide a launch image, especially if your application takes\
    \ a moment to start. Specifying which image to use is very simple: Xcode provides\
    \ places where images can be dragged to specify icons and launch images, as shown\
    \ in Figures A–7 and A–8.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00080.png)\n\n![](images/00138.jpeg)\n\n![](images/00171.jpeg)\n\n\
    ### APPENDIX A: Designing and Creating Graphics\n\n**295**\n\n**Figure A–7.**\
    \ *Specifying icons and launch images for the iPhone* **Figure A–8.** *Specifying\
    \ icons and launch images for the iPad*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00416.png)\n\n![](images/00128.png)\n\n**296**\n\n### APPENDIX A:\
    \ Designing and Creating Graphics\n\nIn Figure A–7, we see four places where images\
    \ can be dragged for the iPhone version of the application; Figure A–8 shows the\
    \ iPad version. Note that, for the iPad, a landscape and portrait version can\
    \ be specified, while the iPhone only allows a portrait image. In Figure A–7 and\
    \ A–8, the images are labeled “No image specified.” The top two allow you to specify\
    \ the icon for the application. You are allowed to specify a different image for\
    \ the retina display, so you can provide a high-resolution version. To specify\
    \ an image, simply drag the image into one of these places. The image can either\
    \ be part of the project already, or can be some other image. Xcode will check\
    \ to make sure the image you are dragging into one of these boxes is appropriate\
    \ for that role. If it is not, you will be prompted with an error dialog, like\
    \ the one shown in Figure A–9.\n\n**Figure A–9.** *Inappropriate image specified\
    \ as an icon*\n\nFigure A–9 shows an error dialog that is triggered when an image\
    \ of an incorrect size is dragged into the application icon spot in Xcode. Even\
    \ though a simple drag-and-drop interface is provided, it can actually be a little\
    \ tricky to get all of the images formatted correctly. This is tricky because\
    \ there is incorrect information about image sizes on most web sites, including\
    \ Apple’s. I hope that by the time you are reading this, Apple has fixed this\
    \ problem on its site. Table A–2 list the correct image sizes for each support\
    \ image.\n\n**Table A–2.** *Support Image Sizes*\n\n| **Device** | **Icon** |\
    \ **Launch (Portrait)** | **Launch (Landscape)** |\n|------------|----------|-----------------------|------------------------|\n\
    | iPhone 3GS, iPod Touch 3 | 57x57 | 320x480 | NA |\n| iPhone 4, iPod Touch 4\
    \ | 114x114 | 640x960 | NA |\n| iPad 1 + 2 | 72x72 | 768x1024 | 1024x768 |\n\n\
    Once you create the files in the correct size, you can drag them into the appropriate\
    \ spots on Xcode. Xcode will automatically copy the files into the project directory\
    \ (if required) and add the files to the project. Older versions of iOS relied\
    \ on a naming convention to specify which file was which. This was pretty buggy\
    \ and hard to maintain.\n\nThe newer versions of iOS and Xcode allow you to name\
    \ your files anything you want.\n\nListing A–2 shows how this information is represented\
    \ in our `info.plist` file.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00172.png)\n\n### APPENDIX A: Designing and Creating Graphics\n\n\
    **297**\n\n**Listing A–2.** *Sample A–Info.plist*\n\n```\n<key>CFBundlePrimaryIcon</key>\n\
    <dict>\n    <key>CFBundleIconFiles</key>\n    <array>\n        <string>my_icon_file.png</string>\n\
    \        <string>my_icon_file_retina.png</string>\n        <string>my_icon_file_ipad.png</string>\n\
    \    </array>\n    <key>UIPrerenderedIcon</key>\n    <false/>\n</dict>\n```\n\n\
    In Listing A–2, we see that the filenames are simply stored in an array. The names\
    \ of files are the names I gave them, and can be anything—they are not names assigned\
    \ by Xcode.\n\nWe have looked at two examples of how we can have a single logical\
    \ image, but have a few different versions of it at different resolutions. The\
    \ following section talks briefly about how best to create the same image at different\
    \ resolutions.\n\n## Multi-Resolution Images\n\nThere are several cases where\
    \ an application has two different images files, at different resolutions, that\
    \ are being used as the same logical image in the application. This is done so\
    \ that the application can provide the best user experience based on which device\
    \ the user has. The ideal situation for any application is displaying images at\
    \ a 1:1 ratio (number pixels in the image to the number of pixels on the screen).\
    \ We want to avoid scaling where possible, because the scaling produces lower\
    \ quality images and is an extra and potentially expensive operation.\n\nApple\
    \ computers seem to really excel at scaling images. If you have the opportunity,\
    \ try playing an old-fashioned DVD (not a high-definition video) on one of the\
    \ new 27–inch iMacs. When played in full-screen mode, the images are scaled up\
    \ a lot, yet still look excellent. Whatever this magic scaling algorithm is, it\
    \ seems to be included iOS devices as well. As a result, it is tempting to simply\
    \ use high-definition images for everything and let iOS scale the images down\
    \ when the application is running on a lower resolution device. This will work;\
    \ the quality of the scaled images is very good. However, when it comes to animations,\
    \ it really starts to pay off to provide those smaller images for the low-res\
    \ device. Remember that the iPhone 3GS not only has a smaller screen, it is less\
    \ of a computer than the iPhone 4. By having the iPhone 3GS scale down the images,\
    \ you are asking a device with less computing power to do more. It is worth the\
    \ trouble to maintain two sets of images in most cases.\n\nWhen creating a high-resolution\
    \ and low-resolution set of images, we could just create the high-resolution set\
    \ and create a script that scales down each one to make a low-res version. This\
    \ strategy will definitely prevent the slower device from having to do the scaling,\
    \ but it can hurt quality, especially with text. If your art assets are part of\
    \ a rendering process of any kind, say from a 3D representation or from vector\
    \ art, it makes sense to render each image twice, once for high-resolution and\
    \ then again for low.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![](images/00014.png)\n\n![](images/00051.jpeg)\n\n**298**\n\n### APPENDIX A:\
    \ Designing and Creating Graphics\n\n## A Multi-Resolution Example\n\nLet’s look\
    \ at an example. Say you are creating an icon for your application with Adobe\
    \ Illustrator (or similar application). If you create a new file that is 57 pt\
    \ x 57 pt, you can export this file at 72 dpi and get an image that is 57 pixels\
    \ x 57 pixels, perfect for the low-res iPhone icon. You can then export this image\
    \ again at 144 dpi and get an image that is 114 pixels x 114 pixels, which is\
    \ perfect for the retina version of the iPhone. To make the icon for the iPad,\
    \ you can export again at 92 dpi, making an image that is 72 pixels x 72 pixels.\
    \ Figure A–10 shows the difference between rendering at different scales verses\
    \ scaling down.\n\n**Figure A–10.** *Rendering verses scaling*\n\nIn Figure A–10,\
    \ we see three different versions of an icon. In the middle is a vector presentation,\
    \ nice and smooth. On the left is the image produced by Illustrator when asked\
    \ to export a 57x57 version of the image in the middle. The image looks pixelated\
    \ because it is scaled up so we can see the quality of the rendering. The image\
    \ on the right is the result of Illustrator creating an 114x114 image and then\
    \ having GIMP scale it down to 57x57 (Sinc Lanczos3). Even this simple two-step\
    \ process introduces noise."
  raw: 'Now let’s take a look at how we specify other support images based on device
    type, such as icons and splash screens.


    **Support Images**


    Every iOS application has a number of images that must accompany the application.
    At the very least, an icon must be specified. Optionally, an image can be specified
    that is displayed as the application is launched. It is generally a good idea
    to provide a launch image, especially if your application takes a moment to start.
    Specifying which image to use is very simple: Xcode provides places where images
    can be dragged to specify icons and launch images, as shown in Figures A–7 and
    A–8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00080.png)


    ![](images/00138.jpeg)


    ![](images/00171.jpeg)


    **APPENDIX A: Designing and Creating Graphics**


    **295**


    **Figure A–7.** *Specifying icons and launch images for the iPhone* **Figure A–8.**
    *Specifying icons and launch images or the iPad*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00416.png)


    ![](images/00128.png)


    **296**


    **APPENDIX A: Designing and Creating Graphics**


    In Figure A–7, we see four places where images can be dragged for the iPhone version
    of the application; Figure A–8 shows the iPad version. Note that, for the iPad,
    a landscape and portrait version can be specified, while the iPhone only allows
    a portrait image. In Figure A–7 and A–8, the images are labeled “No image specified.”
    The top two allow you to specify the icon for the application. You are allowed
    to specify a different image for the retina display, so you can provide a high-resolution
    version. To specify an image, simply drag the image into one of these places.
    The image can either be part of the project already, or can be some other image.
    Xcode will check to make sure the image you are dragging into one of these boxes
    is appropriate for that role. If it is not, you will be prompted with an error
    dialog, like the one shown in Figure A–9.


    **Figure A–9.** *Inappropriate image specified as an icon*


    Figure A–9 shows an error dialog that is triggered when an image of an incorrect
    size is dragged into the application icon spot in Xcode. Even though a simple
    drag-and-drop interface is provided, it can actually be a little tricky to get
    all of the images formatted correctly. This is tricky because there is incorrect
    information about image sizes on most web sites, including Apple’s. I hope that
    by the time you are reading this, Apple has fixed this problem on its site. Table
    A–2 list the correct image sizes for each support image.


    **Table A–2.** *Support Image Sizes*


    **Device**


    **Icon**


    **Launch (Portrait)**


    **Launch (Landscape)**


    iPhone 3GS, iPod Touch 3


    57x57


    320x480


    NA


    iPhone 4, iPod Touch 4


    114x114


    640x960


    NA


    iPad 1 + 2


    72x72


    768x1024


    1024x768


    Once you create the files in the correct size, you can drag them into the appropriate
    spots on Xcode. Xcode will automatically copy the files into the project directory
    (if required) and add the files to the project. Older versions of iOS relied on
    a naming convention to specify which file was which. This was pretty buggy and
    hard to maintain.


    The newer versions of iOS and Xcode allow you to name your files anything you
    want.


    Listing A–2 shows how this information is represented in our info.plist file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00172.png)


    **APPENDIX A: Designing and Creating Graphics**


    **297**


    **Listing A–2.** *Sample A–Info.plist*


    <key>CFBundlePrimaryIcon</key>


    <dict>


    <key>CFBundleIconFiles</key>


    <array>


    <string>my_icon_file.png</string>


    <string>my_icon_file_retina.png</string>


    <string>my_icon_file_ipad.png</string>


    </array>


    <key>UIPrerenderedIcon</key>


    <false/>


    </dict>


    In Listing A–2, we see that the filenames are simply stored in an array. The names
    of files are the names I gave them, and can be anything—they are not names assigned
    by Xcode.


    We have looked at two examples of how we can have a single logical image, but
    have a few different versions of it at different resolutions. The following section
    talks briefly about how best to create the same image at different resolutions.


    **Mutli-Resolution Images**


    There are several cases where an application has two different images files, at
    different resolutions, that are being used as the same logical image in the application.
    This is done so that the application can provide the best user experience based
    on which device the user has. The ideal situation for any application is displaying
    images at a 1:1


    ratio (number pixels in the image to the number of pixels on the screen). We want
    to avoid scaling where possible, because the scaling produces lower quality images
    and is an extra and potentially expensive operation.


    Apple computers seem to really excel at scaling images. If you have the opportunity,
    try playing an old-fashioned DVD (not a high-definition video) on one of the new
    27–inch iMacs. When played in full-screen mode, the images are scaled up a lot,
    yet still look excellent. Whatever this magic scaling algorithm is, it seems to
    be included iOS devices as well. As a result, it is tempting to simply use high-definition
    images for everything and let iOS scale the images down when the application is
    running on a lower resolution device. This will work; the quality of the scaled
    images is very good. However, when it comes to animations, it really starts to
    pay off to provide those smaller images for the low-res device. Remember that
    the iPhone 3GS not only has a smaller screen, it is less of a computer than the
    iPhone 4\. By having the iPhone 3GS scale down the images, you are asking a device
    with less computing power to do more. It is worth the trouble to maintain two
    sets of images in most cases.


    When creating a high-resolution and low-resolution set of images, we could just
    create the high-resolution set and create a script that scales down each one to
    make a low-res version. This strategy will definitely prevent the slower device
    from having to do the scaling, but it can hurt quality, especially with text.
    If your art assets are part of a rendering process of any kind, say from a 3D
    representation or from vector art, it makes sense to render each image twice,
    once for high-resolution and then again for low.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00014.png)


    ![](images/00051.jpeg)


    **298**


    **APPENDIX A: Designing and Creating Graphics**


    **A Multi-Resolution Example**


    Let’s look at an example. Say you are creating an icon for your application with
    Adobe Illustrator (or similar application). If you create a new file that is 57
    pt x 57 pt, you can export this file at 72 dpi and get an image that is 57 pixels
    x 57 pixels, perfect for the low-res iPhone icon. You can then export this image
    again at 144 dpi and get an image that is 114 pixels x 114 pixels, which is perfect
    for the retina version of the iPhone. To make the icon for the iPad, you can export
    again at 92 dpi, making an image that is 72


    pixels x 72 pixels. Figure A–10 shows the difference between rendering at different
    scales verses scaling down.


    **Figure A–10.** *Rendering verses scaling*


    In Figure A–10, we see three different versions of an icon. In the middle is a
    vector presentation, nice and smooth. On the left is the image produced by Illustrator
    when asked to export a 57x57 version of the image in the middle. The image looks
    pixelated because it is scaled up so we can see the quality of the rendering.
    The image on the right is the result of Illustrator creating an 114x114 image
    and then having GIMP scale it down to 57x57 (Sinc Lanczos3). Even this simple
    two-step process introduces noise.'
  trans: "\n# 支持图片\n\n现在让我们来看看如何根据设备类型指定其他支持图片，例如图标和启动画面。\n\n## 支持图片\n\n每个 iOS 应用程序都附带一些必须随应用提供的图片。至少，必须指定一个图标。可选地，可以指定一张在应用程序启动时显示的图片。通常，提供一张启动图片是个好主意，特别是当你的应用程序需要一点时间才能启动时。指定要使用哪张图片非常简单：Xcode\
    \ 提供了可以拖放图片以指定图标和启动图片的位置，如图 A-7 和图 A-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00080.png)\n\n![](img/00138.jpeg)\n\n![](img/00171.jpeg)\n\n### 附录 A：设计与创建图形\n\
    \n**295**\n\n**图 A–7.** *为 iPhone 指定图标和启动图片* **图 A–8.** *为 iPad 指定图标和启动图片*\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00416.png)\n\n![](img/00128.png)\n\
    \n**296**\n\n### 附录 A：设计与创建图形\n\n在图 A-7 中，我们看到 iPhone 版本应用有四个可以拖放图片的位置；图 A-8 显示了\
    \ iPad 版本。请注意，对于 iPad，可以指定横屏和竖屏版本，而 iPhone 只允许竖屏图片。在图 A-7 和图 A-8 中，图片被标记为“未指定图片”。顶部两个位置允许您指定应用程序的图标。您可以为\
    \ Retina 显示屏指定不同的图片，从而提供高分辨率版本。要指定图片，只需将图片拖入这些位置之一。该图片可以是项目已有的，也可以是其他图片。Xcode\
    \ 会检查您拖入这些框中的图片是否适合该角色。如果不适合，系统会提示一个错误对话框，如图 A-9 所示。\n\n**图 A–9.** *指定为图标的图片不合适*\n\
    \n图 A-9 显示了一个错误对话框，当尺寸不正确的图片被拖入 Xcode 中的应用程序图标位置时触发。尽管提供了简单的拖放界面，但要正确格式化所有图片实际上可能有点棘手。之所以棘手，是因为包括苹果网站在内的大多数网站上的图片尺寸信息都不准确。我希望等到你读到这些内容时，苹果已经在其网站上解决了这个问题。表\
    \ A-2 列出了每种支持图片的正确尺寸。\n\n**表 A–2.** *支持图片尺寸*\n\n| **设备** | **图标** | **启动（竖屏）**\
    \ | **启动（横屏）** |\n|------------|----------|-----------------------|------------------------|\n\
    | iPhone 3GS, iPod Touch 3 | 57x57 | 320x480 | 无 |\n| iPhone 4, iPod Touch 4 |\
    \ 114x114 | 640x960 | 无 |\n| iPad 1 + 2 | 72x72 | 768x1024 | 1024x768 |\n\n一旦你创建了正确尺寸的文件，就可以将它们拖入\
    \ Xcode 的相应位置。Xcode 会自动将文件复制到项目目录（如果需要），并将文件添加到项目中。较旧版本的 iOS 依赖于命名约定来指定哪个文件对应哪个功能。这相当容易出错且难以维护。\n\
    \n较新版本的 iOS 和 Xcode 允许你随意命名文件。\n\n清单 A-2 显示了这些信息如何体现在我们的 `info.plist` 文件中。\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00172.png)\n\n###\
    \ 附录 A：设计与创建图形\n\n**297**\n\n**清单 A–2.** *示例 A–Info.plist*\n\n```\n<key>CFBundlePrimaryIcon</key>\n\
    <dict>\n    <key>CFBundleIconFiles</key>\n    <array>\n        <string>my_icon_file.png</string>\n\
    \        <string>my_icon_file_retina.png</string>\n        <string>my_icon_file_ipad.png</string>\n\
    \    </array>\n    <key>UIPrerenderedIcon</key>\n    <false/>\n</dict>\n```\n\n\
    在清单 A-2 中，我们看到文件名只是存储在一个数组中。这些文件名是我自己命名的，可以是任何名称——它们不是由 Xcode 分配的名称。\n\n我们已经看到了两个示例，说明我们如何拥有一个逻辑上的同一张图片，但却有不同分辨率的几个版本。下一节将简要讨论如何最佳地创建同一张图片的不同分辨率版本。\n\
    \n## 多分辨率图片\n\n在某些情况下，应用程序会使用两个不同分辨率的不同图片文件，这些文件在应用程序中用作同一张逻辑图片。这样做是为了让应用程序能够根据用户拥有的设备提供最佳用户体验。任何应用的理想情况都是以\
    \ 1:1 的比例显示图片（即图片像素数量与屏幕像素数量相等）。我们希望尽可能避免缩放，因为缩放会产生质量较低的图片，并且是一种额外且可能代价高昂的操作。\n\
    \n苹果电脑似乎在图片缩放方面表现非常出色。如果有机会，试着在一台新的 27 英寸 iMac 上播放一张老式的 DVD（非高清视频）。在全屏模式下播放时，图片被放大了很多，但看起来仍然非常出色。不管这个神奇的缩放算法是什么，它似乎也包含在\
    \ iOS 设备中。因此，人们很容易想直接对所有内容使用高清图片，让 iOS 在应用运行于低分辨率设备时自行缩小图片。这种方法可行；缩放后的图片质量很好。然而，在动画方面，为低分辨率设备提供较小的图片确实物有所值。请记住，iPhone\
    \ 3GS 不仅屏幕更小，其计算能力也不如 iPhone 4。让 iPhone 3GS 缩小图片，相当于要求一台计算能力较弱的设备做更多工作。因此，在大多数情况下，维护两套图片是值得的。\n\
    \n在创建高分辨率和低分辨率图片集时，我们可以只创建高分辨率图片集，然后创建一个脚本将每张图片缩小以制作低分辨率版本。这种策略确实可以防止较慢的设备进行缩放，但可能会损害质量，尤其是文本。如果你的美术素材是任何渲染过程的一部分，例如来自\
    \ 3D 表示或矢量图，那么最好将每张图片渲染两次，一次用于高分辨率，另一次用于低分辨率。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00014.png)\n\n![](img/00051.jpeg)\n\n**298**\n\n### 附录 A：设计与创建图形\n\n\
    ## 多分辨率示例\n\n让我们来看一个例子。假设你正在使用 Adobe Illustrator（或类似应用程序）为你的应用程序创建一个图标。如果你创建一个\
    \ 57 点 x 57 点的新文件，你可以以 72 dpi 导出此文件，得到一个 57 像素 x 57 像素的图片，这正好适用于低分辨率 iPhone 图标。然后，你可以再次以\
    \ 144 dpi 导出此图片，得到一个 114 像素 x 114 像素的图片，这对于 iPhone 的 Retina 版本来说完美。要为 iPad 制作图标，你可以再次以\
    \ 92 dpi 导出，生成一个 72 像素 x 72 像素的图片。图 A-10 展示了以不同比例渲染与缩小图片之间的区别。\n\n**图 A–10.**\
    \ *渲染 vs 缩放*\n\n在图 A-10 中，我们看到了图标的三个不同版本。中间是一个矢量表示，漂亮且光滑。左边是 Illustrator 在导出中间图片的\
    \ 57x57 版本时生成的图片。该图片看起来有像素感，因为被放大了，以便我们能看清渲染质量。右边的图片是 Illustrator 创建了一个 114x114\
    \ 的图片，然后由 GIMP 将其缩小到 57x57（Sinc Lanczos3）的结果。即使是这个简单的两步过程也引入了噪点。\n"
- fmt: "#### 注意右侧字母 i 的点周围的浅色像素。  \n在这种情况下，或许影响不大，但我觉得，如果你愿意花费时间（和金钱）创作高质量的艺术作品，那么额外花点功夫来避免这类问题是值得的。\n\
    \n遵循本章关于质量和渲染的理念，接下来将通过一个示例，引导你了解如何为应用程序选择最终的图像尺寸。\n\n## 创建最终资源\n\n我们已经了解了如何用多种分辨率表示图像，以及为何这很重要。但在游戏艺术方面，我们仍未解答一个问题：图像应该有多大？在本节中，我们将以一个同时在\
    \ iPad 和两种 iPhone 版本上运行的游戏为例，找出该游戏所用图像的最佳尺寸。我们将使用第 3 章“硬币分拣器”中的游戏。\n\n由于我们要处理三种可能的图像尺寸——一种用于\
    \ iPad，两种用于 iPhone——因此需要查看这些屏幕的像素相对尺寸，以了解它们在尺寸上的差异。图 A-11 展示了不同的屏幕尺寸。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00187.png)\n\n![](images/00290.png)\n\n![](images/00371.jpeg)\n\n\
    **附录 A：设计与创建图形**\n\n**299**\n\n**图 A-11.** *不同屏幕的相对分辨率*  \n在图 A-11 中，我们看到一个矩形代表市场上每款\
    \ iOS 设备的屏幕尺寸。最左边的图像是 iPhone 3GS（及其前两代）的尺寸。左数第二个矩形显示了 iPhone 4 的尺寸，其像素数量是 iPhone\
    \ 3GS 的四倍。第三个矩形代表 iPad 1 和 iPad 2 的像素尺寸。请注意，iPhone 4 的像素数量几乎与 iPad 1 和 iPad 2\
    \ 相当。最右边的矩形很可能是下一代 iPad 3（或任何其他名称）的分辨率。让我们看看这些不同尺寸如何影响我们在布局游戏时的决策。\n\n## 屏幕可用空间\n\
    \n虽然我们有三种不同的屏幕尺寸（以像素计），但只有两种宽高比。两款 iPhone 的宽高比相同，均为 2:3，而 iPad 的宽高比为 3:4。针对这些差异，我们希望找出如何布局应用程序，以最佳方式利用屏幕空间。让我们从第\
    \ 3 章中游戏的布局开始，如图 A-12 所示。\n\n**图 A-12.** *iPhone（视网膜屏）和 iPad 上的硬币分拣器*  \n在图 A-12\
    \ 中，左侧是游戏在 iPhone 横屏模式下运行，右侧是游戏在 iPad 横屏模式下运行。两种情况下，我们都使用右侧被灰色边框包围的游戏区域。由于游戏区域是正方形，我们只需计算一个维度，但仍需根据游戏区域占用的空间，找出硬币图像的最佳尺寸。图\
    \ A-13 显示了这两个区域的大小以及它们与硬币尺寸的关系。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00006.png)\n\n![](images/00084.jpeg)\n\n![](images/00073.jpeg)\n\n\
    **300**\n\n**附录 A：设计与创建图形**\n\n**图 A-13.** *游戏区域和硬币图像的相对尺寸（以像素计）*  \n在图 A-13 中，我们看到了三个设备的屏幕尺寸。对于两款\
    \ iPhone 版本，带有粗灰色边框的白色游戏区域在点（`points`）上大小相同，都是 300x300。当然，iPhone 4 版本是 600x600\
    \ 像素，而 iPhone 3GS 是 300x300 像素，但因为我们关心的是找到图像的最佳尺寸，所以我们关注的是像素，而不是点。iPad 1 和 iPad\
    \ 2 右侧的游戏区域大小为 720 像素（也是 720 点）。因此，要计算每个硬币图像的尺寸，只需除以 5。我们得到：3GS 为 60x60，iPhone\
    \ 4 为 120x120，iPad 为 144x144。图 A-14 显示了其中一个硬币图像在所有三种尺寸下的效果。"
  raw: 'Notice the lighter pixels around the dot of the i on the right. Maybe in this
    case, it doesn’t matter too much, but it seems to me if you are going to spend
    the time (and money) to create high-quality art, it is worth going the extra mile
    and preventing this type of issue.


    Keeping with the ideas presented here about quality and rendering, the following
    section walks you through an example of how to select the final image size for
    an application.


    **Creating Final Assets**


    We have taken a look at how to represent images with multiple resolutions and
    why that is important. But when it comes to game art, we still have not answered
    the question, how big should my images be? In this section, we will take an example
    game that runs on both the iPad and both versions of the iPhone and figure out
    the best sizes for images used in that game. We will be using the game from Chapter
    3, Coin Sorter.


    Because we are working with three possible image size—one for the iPad and two
    for iPhone—we should look at the relative sized (in pixels) of these screens and
    get sense of the differences in size. Figure A–11 shows the different screen size.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00187.png)


    ![](images/00290.png)


    ![](images/00371.jpeg)


    **APPENDIX A: Designing and Creating Graphics**


    **299**


    **Figure A–11.** *Relative resolution of the different screens* In Figure A–11,
    we see a rectangle representing the screen size for each of the iOS


    devices on the market. The left-most image is the size of the iPhone 3GS (and
    its two predecessors). The second rectangle from the left shows the size of the
    iPhone 4, which has four times as many pixels as the iPhone 3GS. The third rectangle
    represents the size, in pixels, of the iPad 1 and iPad 2\. Note that the iPhone
    4 has almost as many pixels as the iPad 1 and iPad 2\. The rectangle all the way
    on the right is most probably the resolution for the next iPad 3 (or whatever
    it will be called). Let’s take a look at how these different sizes affect our
    decisions when it comes to laying out our game.


    **Screen Real Estate**


    Though we have three different screen sizes in terms of pixels, we only have two
    different aspect ratios. The aspect ratio of the two iPhones is the same at 2:3,
    while the aspect ratio of the iPad is 3:4. Working with these differences, we
    want to figure out how to lay out our applications to make the best use of the
    screen space. Let’s start by looking at the layout of the game from Chapter 3,
    as shown in Figure A–12.


    **Figure A–12.** *Coin Sorter on iPhone (retina) and iPad*


    In Figure A–12, we see on the left the game running on the iPhone in landscape,
    and on the right we the game running on the iPad in landscape. In both cases,
    we use the game area on the right surrounded by a grey border. Because the game
    area is square, we only have to figure out one dimension, but we still have to
    figure out the best sizes for


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00006.png)


    ![](images/00084.jpeg)


    ![](images/00073.jpeg)


    **300**


    **APPENDIX A: Designing and Creating Graphics**


    our coin images based on how much space the game area takes up. Figure A–13 shows
    the size of these two areas and how it relates to size of coins.


    **Figure A–13.** *Relative size of game area and coin images in pixels* In Figure
    A–13, we see the screen size of our three devices. For the two iPhone versions,
    the white game area with the thick grey border are the same size in terms of points,
    300x300\. Of course, the iPhone 4 version 600x600 pixels versus the 300x300 pixels
    of the iPhone 3GS, but because we are concerned with finding the best size for
    our images, we are concerned with pixels and not points. The size of the game
    area on the right for the iPad 1 and iPad 2 is 720 pixels (and points). So, to
    calculate the size of each coin image, we simply divide by 5\. We get 60x60 for
    the 3GS, 120x120 for the iPhone 4, and 144x144 for the iPads. Figure A–14 shows
    one of the coin images in all three sizes.'
