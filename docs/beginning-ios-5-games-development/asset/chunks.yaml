    +(id)readFromDefaults;


    -(void)writeToDefaults;


    @end


    In Listing 10–4, we see the header for the class GameParameters. We have three
    BOOL


    properties to keep track of which actors the user wants in the game. We also have
    an NSMutableSet called purchases that is used to store a set of product ID strings.
    The constructor gameParameters will create a new GameParameters object with no
    purchases and only includeAsteroids set to true (implementation not shown). The
    class task readFromDefaults is used to pull a GameParameter out of the default
    NSUserDefaults whereas writeToDefaults is used to serialize a GameParameter back
    to the default NSUserDefautls. Listing 10–5 shows both readFromDefaults and writeToDeafaults.'
