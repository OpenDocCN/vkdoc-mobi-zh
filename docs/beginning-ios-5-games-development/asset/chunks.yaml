    ## CHAPTER 5: Quickly Build a Frame-by-Frame Game


    ### Setting Up Your First Frame-by-Frame Animation


    The sample code accompanying this chapter is a collection of three examples. Each
    example builds on the last to illustrate different concepts. When you run the
    sample code you will see a screen similar to **Figure 5–3**.


    **Figure 5–3.** *Examples menu*


    In **Figure 5–3**, we see the buttons for each of our three examples. Clicking
    each button will animate the screen and display the example. Let’s start at the
    top with Simple Movement.


