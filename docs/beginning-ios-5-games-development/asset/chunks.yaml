    health`属性设置为100。接下来，让我们继续看看`HealthBar`类。


    ### 实例化`HealthBar`类


    为了在飞碟下方渲染血条，我们创建一个`HealthBar`对象，并传入它要跟随的对象——`actor saucer`。我们还将`saucer`的`healthBar`属性设置为新创建的`healthBar`，这样当飞碟受到伤害时，`saucer`对象可以更新血条显示的百分比。最后，将`healthBar`添加到场景中。让我们看看`HealthBar`的构造方法，并理解它是如何设置和运作的。参见`Listing
    7–4`。


    **Listing 7–4.** *HealthBar.m (healthBar:)*


    ```

    +(id)healthBar:(Actor*)anActor{


    VectorRepresentation* rep = [VectorRepresentation vectorRepresentation]; HealthBar*
    healthBar = [[HealthBar alloc] initAt:anActor.center


    WithRadius:anActor.radius AndRepresentation:rep];


    [rep setDelegate:healthBar];


    [healthBar setColor:[UIColor blueColor]];


    [healthBar setBackgroundColor:[UIColor colorWithRed:0 green:0 blue:0 alpha:.5]];
    FollowActor* follow = [FollowActor followActor:anActor];


    [follow setYOffset:[anActor radius]];


    [healthBar addBehavior:follow];


    return healthBar;


    }

    ```


    在`Listing 7–4`中，我们看到了构造方法`healthBar:`，它接受一个`Actor`作为参数。这个`Actor anActor`就是该`HealthBar`在其移动时要跟随的演员。在这个例子中，与之关联的`Saucer`不会移动，但我们在后续的示例中会使用这个类，届时其演员是可以移动的。在查看`FollowActor`行为之前，请注意`HealthBar`是通过传入一个`VectorRepresentation`实例而非`ImageRepresentation`对象来初始化的。这表明我们希望以编程方式绘制该对象。我们将在下一节中了解其工作原理。现在，让我们继续探讨这个例子。接下来我们要检查的类是`FollowActor`。


    ### `FollowActor`行为类


    负责让`HealthBar`保持在`Saucer`附近的类是`FollowActor`。这个类是一种行为（Behavior），提供了与之前行为类相同的抽象。让我们通过查看`FollowActor`类来了解这一切是如何协同工作的。参见`Listing
    7–5`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00055.png)


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **161**


    **Listing 7–5.** *FollowActor.m*


    ```

    #import "FollowActor.h"


    #import "GameController.h"


    @implementation FollowActor


    @synthesize actorToFollow;


    @synthesize xOffset;


    @synthesize yOffset;


    +(id)followActor:(Actor*)anActorToFollow{


    FollowActor* follow = [FollowActor new];


    [follow setActorToFollow:anActorToFollow];


    return follow;


    }


    -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{


    if (![actorToFollow removed]){


    CGPoint c = [actorToFollow center];


    c.x += xOffset;


    c.y += yOffset;


    [anActor setCenter: c];


    } else {


    [gameController removeActor:anActor];


    }


    }


    @end

    ```'
