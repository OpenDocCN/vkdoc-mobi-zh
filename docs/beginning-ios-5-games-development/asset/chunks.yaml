    }


    return NO;


    }

    ```


    在`Listing 8–35`中，我们进行常规设置，指定游戏区域大小并添加将用加速计数据移动的`viper`。要开始接收加速计数据，我们必须获得与正在运行的应用程序关联的单例`UIAccelerometer`。为此，我们使用`UIAccelerometer`类的静态任务`sharedAccelerometer`，然后将`self`设置为代理。另一件需要注意的事情是，我们必须指定获取数据的频率。在本例中，我们请求每秒获取50次数据，这对于实时输入来说已经足够快了。数据实际上是通过对`accelerometer:didAccelerate:`的调用接收的，如`Listing
    8–36`所示。


