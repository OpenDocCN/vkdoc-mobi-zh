    # 本章示例均取自项目《Belt Commander》。我们将继续在接下来几页中运用所学知识，作为最后两章的示例，一同探索一个完整的游戏。


    L. Jordan，*《Beginning iOS 5 Games Development》*


    ©


    Lucas Jordan 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Game Center


    从用户的角度来看，Game Center 是 iOS 设备上的一款应用，用于聚合用户游戏的相关信息。这些信息包括登录及管理账户的入口、好友列表以及游戏列表。对于列出的每款游戏，都有多个用于显示得分的排行榜，以及游戏中可获得的成就列表。图
    9–1 展示了一个典型的 Game Center 界面。


    **图 9–1.** *展示游戏的 Game Center*


    在图 9–1 中，我们看到九款已安装的支持 Game Center 的游戏。选择一款游戏即可查看其排行榜以及用户已获得的任何成就。


    从开发者的角度来看，Game Center 是一组用于与 Game Center 交互以定义排行榜和成就的类。这些类统称为 `GameKit`，是标准 iOS
    SDK 安装包的一部分。


    一旦将 `GameKit` 集成到你的游戏中，你就能让用户登录并代表她执行 `GameKit` 操作。图 9–2 展示了用户正在登录 `GameKit` 的过程。


    **图 9–2.** *登录 GameKit*


    在图 9–2 中，我们看到游戏《Belt Commander》的欢迎界面。顶部有一条来自 Game Center 的通知，告知用户本游戏正在使用 `GameKit`，并显示了用户账户。同时我们还能看到“沙盒”字样。这提示我们当前并非在使用
    Game Center 的正式版本，而是开发版本。在大多数情况下，你无需为此担心；在开发过程中，你将完全使用沙盒环境。


    要在你的项目中启用 `GameKit`，显然你需要使用 `GameKit` 中的类，但你还必须告知 Apple 你希望特定游戏获得 `GameKit` 支持。下一节将介绍如何在
    iTunes Connect 中设置 `GameKit`。


    ### 在 iTunes Connect 中启用 Game Center


    Game Center 不仅仅是 iOS 设备上的一个应用或一组库，它还是由 Apple 托管的一组 Web 服务，提供了大量功能。为了让你的游戏能使用这些服务，你需要配置你的应用。你必须在配置门户中创建一个
    App ID，配置 Xcode 使用生成的 Bundle Identifier，并在 iTunes Connect 中配置你的应用以使用 Game Center。假设我们正在制作一款新游戏，并从配置门户开始，如图
    9–3 所示。


    **图 9–3.** *在配置门户中创建 App ID*


    在图 9–3 中，我们看到用于创建 App ID 的表单。顶部的“描述”字段可以填写任何你希望提醒自己创建此 App ID 原因的内容。你可以选择任何你想要的
    Bundle Seed ID，但我发现有一个重要理由不直接使用默认值：选择默认的 `Bundle Seed ID` 会省去使用 `Xcode` 时的一些配置步骤。


    最后一项是 Bundle Identifier。它用于在运行时标识你的应用。对于需要支持 Game Center 的游戏，你必须指定一个不含通配符的 `Bundle
    Identifier`。点击“提交”后，你应该在 `Xcode` 中打开你的游戏项目。


    `Bundle Identifier` 必须在 `Xcode` 中设置，这样 iOS 才能知道如何将设备上运行的二进制文件与 iTunes Connect
    中定义的应用关联起来。图 9–4 展示了设置 `Bundle Identifier` 的位置。

