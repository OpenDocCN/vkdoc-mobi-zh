    **Project**


    Like all software projects, iOS game development benefits from starting on good
    footing. In this chapter, we will discuss setting up a new Xcode project that
    is a suitable starting point for many games. This will include creating a project
    that can be used for the deployment on the iPhone and the iPad, handling both
    landscape and portrait orientations.


    We look at how an iOS application is initialized and where we can start customizing
    behavior to match our expectations of how the application should perform. We will
    also explore how user interface (UI) elements are created and modified in an iOS
    application, paying special attention to managing different devices and orientations.


    The game we create in this chapter will be very much like the simple example from
    Chapter 1—in fact, it will play exactly the same. But we will be building a foundation
    for future chapters while practicing some key techniques, such as working with
    UIViewControllers and Interface Builder.


    We will explore how an iOS application is put together, and explain the key classes.


    We’ll also create new UI elements and learn how to customize them with Interface
    Builder, and we will explore using the MVC pattern to create flexible, reusable
    code elements. At the end of this chapter, we will have created the Rock, Paper,
    Scissors application shown in Figure 2–1.


