    **Summary**


    In this chapter, we explored supporting elements required by a complete game.
    These included establishing a flow of an application and managing the views that
    comprise this flow. We looked at a way to coordinate the game behaviors, such
    as a change in score, or the end of a game with the rest of the application using
    the delegate pattern. We also looked at two ways of persisting data: through the
    user settings or by storing an object on disk. Both techniques use the same archiving
    and unarchiving techniques exposed thought the protocol NSCoding.


