    [queue finishTransaction:transaction];


    }


    }


    }


    In Listing 10–8, we see the tasks paymentQueue:updatedTransactions: as implemented
    by the class ExtrasController. In this task, we iterate through each SKPaymentTransaction
    in the array transactions. For each SKPaymentTransaction we check to see if the
    state is SKPaymentTransactionStatePurchase or


    SKPaymentTransactionStateRestore. If it is, we add the product ID of the transaction
    to our gamePagam’s purchases property and save it. We also update the UI by calling
    setGameParams:. Lastly, we inform the queue that we are done working with the
    transaction by calling finishTransaction:.


    Technically speaking, if the task paymentQueue:updatedTransactions: as a result
    of the user making a new purchase the state of the transaction would be


    SKPaymentTransactionStatePurchased. But because the type or products we are using
    are non-consumable, we need to make sure the user has a way to restore his purchases
    if his device is reset or if he made the purchase on another iOS device. In order
    to handle this, we make sure we allow the transaction state to be


    SKPaymentTransactionStateRestored and treat it the same as a new purchase. In
    order to allow the user to restore we provide a restore purchases button that
    calls the code in Listing 10–9.


    Listing 10–9\. ExtrasController.m (restorePurchasesClicked:)


    - (IBAction)restorePurchasesClicked:(id)sender {


    [[SKPaymentQueue defaultQueue] restoreCompletedTransactions];


    }


    In Listing 10–9, we see the task trestorePurchasesClicked that gets called when
    the user clicks the restore purchases button. In this task, we simply call restoreCompletedTransactions
    on the default SKPaymentQueue. This causes StoreKit to contact the iTunes Store
    and re-download all product IDs for the current app and user.


    When it has done that, it calls paymentQueue:updatedTransaction:, as shown in
    Listing 10–8\. This is all that is required to allow the user to get access to
    her purchases.


    **Summary**


    In this chapter, we reviewed what in-app purchases are and the four different
    types. We also looked at how we implemented the purchasing of in-app products
    in our Belt Commander game. We reviewed how to get a valid list of product IDs
    from the iTunes Store and how to create a UI based on that list. We also looked
    at how to trigger a purchase process and how to respond to a successful completion,
    keeping in mind how to store a record of that purchase for the user.


