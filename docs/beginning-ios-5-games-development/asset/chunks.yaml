    the size 160 x 240 is exactly one quarter of the number of points of an iPhone.
    Even though we want to separate the coordinate system of your game from the coordinate
    system of the UIView hierarchy, the fact is that an iPhone has a screen ration
    of 2:3, and any game we want to play on that device should consider that.


    After specifying the gameAreaSize, we initialize actors and actorViews. Then we
    add our first actor. To add the star field behind the other actors, we can add
    new Actor02 to the scene, specifying the star_field_iphone image. Because the
    base Actor02 class does not specify any behavior, this actor will simply sit in
    the background, providing the nice stars. The advantage to using an actor for
    the background is that it will scale and stretch along with the other actors.
    The disadvantage is that it will be treated like the other actors in the game
    and consume a little computation time.


