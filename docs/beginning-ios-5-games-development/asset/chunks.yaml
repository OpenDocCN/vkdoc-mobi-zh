- fmt: "In the previous section, we looked at the classes `GameController` and `Actor`\
    \ and learned that the `Actor` class requires a `Representation` object to be\
    \ displayed. The `Representation` protocol describes what is required of a class\
    \ to manage the `UIView` associated with an actor. In this section, we will explore\
    \ the class `ImageRepresentation` and see how it uses images to represent an actor.\
    \ In the preceding chapter, we used images to draw different actors. In this section,\
    \ we will show how we can combine those techniques into a simple, reusable class\
    \ called `ImageRepresentation`.\n\nTo illustrate `ImageRepresentation`, in our\
    \ first example we will create power-ups and animate them across the screen, as\
    \ shown in Figure 6–1.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![](images/00159.png)\n![](images/00276.jpeg)\n\n**CHAPTER 6: Create Your Characters:\
    \ Game Engine, Image Actors, and Behaviors** **139**\n\n**Figure 6–1.** *Example\
