    **303**


    With Blender (www.blender.org) you can:


    1. Create 2D images to be used with as actors in game

    2. Pre-render high-quality movies for cut scenes

    3. Render high-quality background images

    4. Render sequences of image to created animated actors

    5. Create isometric tile sets


    ## **Inkscape**


    Inkscape is a vector drawing application. Although most games won’t do a lot of
    vector drawing at runtime, vector-editing applications are very good at doing
    WYSIWYG layout.


    For laying out all of the great art you created with GIMP and Blender, Inkscape
    can’t be beat. Figure A–17 shows the Inkscape application.


    **Figure A–17.** *Inkscape*


