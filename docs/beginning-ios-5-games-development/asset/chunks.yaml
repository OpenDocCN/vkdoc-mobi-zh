    actors. We are going to expand on the last examples and add two effects. The first
    is to make the asteroids look like they are tumbling through space. The second
    is to make the spaceship rotate before moving. Both of these techniques will update
    the image used to represent each actor to create the visual effect. We will also
    add some state logic to the spaceship to we can keep track of what the ship should
    be dong, staying put, rotating, or traveling to the target point. Figure 5–10
    shows this next example in action.


