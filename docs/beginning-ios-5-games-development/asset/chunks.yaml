    **CHAPTER 2: Setting Up Your Game Project**


    **17**


    **Figure 2–6.** *A fresh universal iOS application*


    In Figure 2–6, we see a new universal app running on the iPhone simulator. To
    run the application on the iPad simulator, select iPad Simulator from the Scheme
    pull-down menu to the right of the Stop button in Xcode. As we can see, the app
    is empty; there is only a gray background. Another thing to note is that the status
    bar at the top of the application is displayed. Although there are plenty of good
    reasons to include the status bar in an application, many games may wish to remove
    the status bar in order to create a more immersive experience. To remove the status
    bar, click on the root element in the Project Navigator (the tree on the left
    in Xcode). Select the target and then click the Info tab on the right. Figure
    2–7 shows the correct view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00353.png)


    ![](images/00458.jpeg)


    **18**


    **CHAPTER 2: Setting Up Your Game Project**


    **Figure 2–7.** *Configuring the status bar*


    Once you see the view shown in Figure 2–7, right-click on the top-most element
    (A) and select Add Row. This will add a new element to the list of items. You
    will want to set the key value to “Status bar is initially hidden” and the value
    to “Yes”. What you are doing here is editing the plist file found under the group
    Supporting Files. Xcode is simply providing you with a nice interface for editing
    this configuration file.


    **TIP:** Navigate to the file ending with info.plist under the group Supporting
    Files. Right-click on it and select Open As >Source Code. This will show you the
    contents of the plist file source.


    Note that the key values are actually stored as constants and not as the human
    readable text used in the Info editor.


    When we run the application again, the status bar is removed, as shown in Figure
    2–8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00089.png)


    ![](images/00167.jpeg)


    **CHAPTER 2: Setting Up Your Game Project**


    **19**


    **Figure 2–8.** *The default application without the status bar* Now that we have
    explored a simple way to start customizing our application, it is time to investigate
    just how an iOS application is put together, so we can make smart decisions about
    adding our own functionality.


    **How an iOS Application Initializes**


    As we know, iOS applications are written largely in Objective C, which is a super
    set of C. Xcode does a good job of hiding the details of how an application is
    built, but under the covers we know it is using LLVM and other common Unix tools
    to do the real work.


    Because we know that our project is ultimately a C application, we would expect
    the starting point for our application to be a C main function. In fact, if you
    look under the Supporting Files group, you will find the main.m, as shown in Listing
    2–1.


    **Listing 2–1.** *main.m*


    #import <UIKit/UIKit.h>


    #import "AppDelegate.h"


    int main(int argc, char *argv[])


    {


    @autoreleasepool {


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00268.png)


    **20**


    **CHAPTER 2: Setting Up Your Game Project**


    return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));


    }


    }


    The main function in Listing 2–1 is a C function, but you will notice that the
    body of the function is clearly Objective C syntax. An @autoreleasepool wraps
    a call to UIApplicationMain. The @autoreleasepool sets up the memory management
    context for this application, we don’t really need to worry about that. The function
    UIApplicationMain does a lot of handy stuff for you—it initializes your application
    by looking at your info.plist file, sets up an event loop, and generally gets
    things going in the right way. In fact, I have never had any reason to modify
    this function, because iOS


    provides a concise place to start adding your startup code. The best place to
    start adding initialization code is the task application:didFinishLaunchingWithOptions:
    found in the implementation file of your app delegate class. In this example,
    the app delegate class is called AppDelegate. Listing 2–2 shows the implementation
    of the application:didFinishLaunchingWithOptions: task from AppDelegate.m.


    **Listing 2–2.** *application:didFinishLaunchingWithOptions:*


    - (BOOL)application:(UIApplication *)application


    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions


    {


    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]


    autorelease];


    // Override point for customization after application launch.


    if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)
    {


    self.viewController = [[[ViewController**_iPhone** alloc]


    initWithNibName:@"ViewController_iPhone" bundle:nil] autorelease];


    } else {


    self.viewController = [[[ViewController**_iPad** alloc]


    initWithNibName:@"ViewController_iPad" bundle:nil] autorelease];


    }


    self.window.rootViewController = self.viewController;


    [self.window makeKeyAndVisible];


    return YES;


