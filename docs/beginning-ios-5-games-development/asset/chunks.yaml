    在`Listing 8–10`中，我们看到了任务`tapGesture:`，只要12个`UITapGestureRecognizer`中的任何一个识别到点击手势时，就会调用该任务。注意，我们没有检查`UITapGestureRecognizer`的状态，因为点击手势被认为是离散的，不使用状态信息。我们使用任务`numberOfTapsRequired`和`numberOfTouches`来确定哪个`UITapGestureRecognizer`做出了响应，并将这些值分别存储到`taps`和`touches`中。这些值告诉我们应该启用的`Powerup`在`NSMutableArray`（即`powerups`）中的索引。一旦我们找到了正确的`Powerup`，就创建一个`TemporaryBehavior`并将`self`设置为代理。


    然后，该强化道具的行为会被设置为新创建的`TemporaryBehavior`，同时其状态被设置为`STATE_GLOW`。这使强化道具开始旋转。接下来，让我们仔细看看`TemporaryBehavior`类。


    **The TemporaryBehavior Class**


    类`TemporaryBehavior`为一个角色应用一个行为，持续固定的步骤数。


    在本例中，我们实际上并不想应用任何行为；我们只是想知道何时过了五秒钟。让我们快速看一下`TemporaryBehavior`类，了解它是如何工作的。`TemporaryBehavior`的声明如`Listing
    8–11`所示。


    **Listing 8–11.** *TemporaryBehavior.h*


    ```objectivec

    @class TemporaryBehavior;


    @protocol TemporaryBehaviorDelegate


    -(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior In:(GameController*)controller;


    @end


    @interface TemporaryBehavior : NSObject <Behavior>{


    }


    @property (nonatomic) long stepsRemaining;


    @property (nonatomic, strong) NSObject<Behavior>* behavior;


    @property (nonatomic, strong) NSObject<TemporaryBehaviorDelegate>* delegate;


    +(id)temporaryBehavior:(NSObject<Behavior>*)aBehavior for:(long)aNumberOfSteps;


    @end

    ```


    在`Listing 8–11`中，我们看到了`TemporaryBehavior`类的定义。我们注意到它定义了一个名为`TemporaryBehaviorDelegate`的协议，`TapGestureController`遵循该协议（参见`Listing
    8–8`）。`TemporaryBehavior`的构造方法接受一个`Behavior`和一个步骤数作为参数。`Listing 8–12`展示了`TemporaryBehavior`的实现。


