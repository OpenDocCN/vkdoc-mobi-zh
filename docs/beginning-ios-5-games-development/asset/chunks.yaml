    The implementation of the class Highscores shown in Listing 3–13 is pretty compact.


    The task initWithDefaults initializes the NSMutableArray theScore and then fills
    theScores with ten new Score objects. The task addScore: adds a new Score object
    to the theScores, sorts it by the score achieved by the player, and then removes
    any extra Scores. This may result in the Score newScore not actually being in
    the NSMutableArray theScores. This is implemented in this way so the caller does
    not have to consider the fact that the theScore might not be high enough to be
    considered an actual high score.


    The last two tasks, encodeWithCoder: and initWithCoder:, are from the protocol
    NSCoding. These tasks describe how a Highscores object is archived and unarchived.


    Note that the object passed to both of these arguments is of the same type: NSCoder.'
