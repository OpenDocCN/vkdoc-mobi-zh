    **Summary**


    In this chapter, we explored how to create an input-driven game. This included
    understanding the management of a game state, the basics of user input, and the
    use of core animation to create animations. Game state is managed by creating
    a class to hold the data required to re-create the game in a display-agnostic
    way. To allow the user to interact with the game, basic gesture recognizers must
    be added to the correct views. A controller class interprets each user gesture
    in a game-specific context and produces animations that reflect a change in the
    game state.


