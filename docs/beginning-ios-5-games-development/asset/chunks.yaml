    # Chapter 1: A Simple First Game


    In this chapter, we are going to build a very simple game of Rock, Paper, Scissors.
    We will use the Storyboard feature of Xcode to create an application with two
    views and the navigation between them.


    Included with this book are sample Xcode projects; all of the code examples are
    taken directly from these projects. In this way, you can follow along with each
    one in Xcode. I used version 4.2 of Xcode when creating the projects for this
    book. The project that accompanies this chapter is called `Sample 1`. The project
    is a very simple game in which we use Storyboard to create two scenes. The first
    scene is the starting view, and the second scene is where the user can play the
    Rock, Paper, Scissors game. The second scene is where you will add a `UIView`
    and specify the class as `RockPapaerScissorView`.


    We will walk through each of these steps, but first let’s take a quick look at
    our game, shown in Figure 1–1.


    On the left of Figure 1–1 we see the starting view. It just has a simple title
    and a Play button. When the user clicks the Play button, he is transitioned to
    the second view, shown on the right of the figure. In this view, the user can
    play Rock, Paper, Scissors. If the user wishes to return to the starting view,
    or home screen, he can press the Back button. This simple game is composed of
    a Storyboard layout in Xcode and a custom class that implements the game.


    Let’s take a look at how I created this game and at some ways you can customize
    a project.


