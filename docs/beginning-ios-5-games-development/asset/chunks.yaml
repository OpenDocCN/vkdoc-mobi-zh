    我们通过调用`coinsGame`上的`findMatchingRows`和`findMatchinCols`来找到所有匹配的行和列。获取这些匹配数组后，我们希望将所有参与匹配的硬币动画化到屏幕外。如果存在`matchingRows`，我们为每个硬币创建一个新的`CABasicAnimation`，修改底层`CALayer`对象的`x`位置值。无需设置`x`的精确起始值和结束值，只需指定`byValue`，并将其设为`coinsView`的宽度。通过指定`byValue`，我们可以将此动画应用于行中所有硬币，因为该动画会自动推断`fromValue`为每个硬币视图的起始`x`值，而`toValue`将为`fromValue
    + byValue`。


    创建完匹配行和列的动画后，我们检查本轮总共产生了多少匹配。如果此值大于零，则更新`coinsGame`对象的分数，并通知委托分数已更改。如果未找到匹配，我们检查游戏是否结束。如果游戏结束，我们使用`NSTimer`类在
    1 秒后调用`doEndGame`。此延迟是出于美观考虑；在显示高分之前稍作停顿是很好的。如果游戏尚未结束，我们只需重新开始接受输入。**列表 4–28**展示了任务`doEndGame`，它只是通知委托游戏已结束。


