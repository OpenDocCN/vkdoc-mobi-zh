    [imageView setFrame:frame];


    }

    ```


    在代码清单 5-17 中，我们首先查找哪个 `UIImageView` 代表传入的角色。我们通过角色的 `actorId` 作为键，在 `NSMutableArray
    actorViews` 中查找 `UIImageView` 来实现。如果找不到 `UIImageView`，说明该角色是刚刚添加的，因此需要创建它。


    创建 `UIImageView` 非常简单：只需根据角色的 `imageName` 创建一个 `UIImage`，然后用它创建一个新的 `UIImageView`。接着，我们再次使用角色
    ID 作为键，将 `UIImageView` 放入 `NSMutableDictionary actorViews` 中。最后，将新的 `UIImageView`
    添加到 `actorView` 中。我们将新 `UIImageView` 的 frame 设置为大小为零的 frame，以防止出现重绘问题。反正其 frame
    很快就会更新。


    **在屏幕上放置 UIImageView**


    在创建 `UIImageView`（如果需要）之后，我们必须确定它应该绘制在屏幕上的位置。第一步是计算游戏区域大小与屏幕上 `actorView` 实际大小之间的比例关系。我们可以简单地将
    `actorView` 的宽度除以游戏区域的宽度来得到 `xFactor`。对高度执行相同操作，得到 `yFactor`。一旦得到这些比例，就可以计算 `UIImageView`
    的 frame。当我们计算出构成 `UIImageView` 新 frame 的四个值后，就对其进行设置。图 5-10 展示了这些值是如何计算的。


    在图 5-10 中，左侧我们看到游戏区域，右侧是描述 `actorView` frame 的 `CGRect`。左侧的圆形是一个需要转换为 `actorView`
    上 `CGRect` 的 `Actor02`。我们首先通过找到 `Actor02` 的左上角点来确定其 frame 的原点。通过从 `Actor02` 的中心
    X 值减去其半径来找到左上角点的 X 值。通过从 `Actor02` 的中心 Y 值减去其半径来找到 Y 值。要将这些点转换到 `actorView` 的坐标空间，我们只需将左上角点的
    X 值乘以 `xFactor`，Y 值乘以 `yFactor`。`xFactor` 和 `yFactor` 是 `gameAreaSize` 的宽度和高度与
    `actorView` 的 frame 的宽度和高度之间的比例。为了找到 `actorView` 上 frame 的大小，我们只需将半径乘以 `xFactor`
    和 `yFactor` 来得到宽度和高度。


    **图 5–10.** *将游戏坐标转换为屏幕坐标*


    当用户触摸 `UIView actorView` 时，我们必须反向执行此过程：将 `actorView` 上的点转换为游戏空间中的点。此转换在 `tapGesture:`
    任务中完成，如代码清单 5-18 所示。


    **代码清单 5–18.** *Example02Controller.h (tapGuesture:)*


    ```

    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{


    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;
    CGPoint pointOnView = [tapRecognizer locationInView:actorView];


    float xFactor = actorView.frame.size.width/self.gameAreaSize.width; float yFactor
    = actorView.frame.size.height/self.gameAreaSize.height; CGPoint pointInGame =
    CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);


    [viper setMoveToPoint:pointInGame];


    }

    ```


    在代码清单 5-18 中，我们通过调用 `tapRecognizer` 上的 `locationInView:` 方法并传入 `actorView` 来找到用户触摸的位置，并将结果存储在
    `pointOnView` 中。重新计算 `xFactor` 和 `yFactor` 值后，我们只需将 `pointOnView` 的 X 和 Y 值除以
    `xFactor` 和 `yFactor`，得到 `pointInGame`。使用这个值，我们只需用 `pointInGame` 设置 `viper` 的
    `moveToPoint` 属性。


    为了结束这个例子，让我们看一下改变 `actorView` 大小的代码，如代码清单 5-19 所示。


