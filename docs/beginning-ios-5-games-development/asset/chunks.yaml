    # 第 2 章：设置你的游戏项目


    与所有软件项目一样，iOS 游戏开发从一开始就打下良好基础会受益匪浅。在本章中，我们将讨论如何设置一个新的 Xcode 项目，使其适合作为许多游戏的起点。这将包括创建一个可用于在
    iPhone 和 iPad 上部署的项目，并同时处理横屏和竖屏方向。


    我们将了解 iOS 应用程序是如何初始化的，以及我们可以从何处开始自定义行为，以匹配我们对应用程序应如何执行的期望。我们还将探索如何在 iOS 应用程序中创建和修改用户界面（UI）元素，并特别关注管理不同设备和屏幕方向。


    本章创建的游戏将与第 1 章的简单示例非常相似——实际上，它的玩法完全相同。但我们将为后续章节打下基础，同时练习一些关键技术，例如使用`UIViewControllers`和
    Interface Builder。


    我们将探索 iOS 应用程序是如何组合在一起的，并解释关键的类。


    我们还将创建新的 UI 元素，学习如何使用 Interface Builder 自定义它们，并探索使用 MVC 模式创建灵活、可重用的代码元素。在本章结束时，我们将创建图
    2-1 所示的石头、剪刀、布应用程序。


    **图 2-1.** *一个设计为在所有方向上适用于 iPhone 和 iPad 的应用程序*


    图 2-1 显示了在 iPhone 和 iPad 模拟器上运行的应用程序。这是一个所谓的*通用*应用程序：它可以在两种设备上运行，并以此方式在 App Store
    中呈现。除非有特定的业务原因需要编写仅适用于 iPhone 或 iPad 的应用程序，否则将应用程序做成通用的非常有意义。即使你最初只打算在一个设备上发布应用，这也会为你日后节省时间。


    我们的示例应用程序非常简单，以至于可能很难看出图 2-1 中四种状态之间的差异。在左上角，iPhone 处于竖屏方向时，灰色区域的位置与左下角横屏时的布局不同。文本的布局也不同。应用程序在
    iPad 上以横屏和竖屏方式运行时也是如此。让我们开始了解如何设置项目以适应这些不同的设备和方向。


