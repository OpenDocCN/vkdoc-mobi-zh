    The next section explains how `GameController` interacts with the `CoinsController`,
    not only to know when to transition the user to the High Score view, but also
    when to update the remaining turns and score labels.


    ## Using a Delegate to Communicate Application State


    A common pattern for one object to communicate with another in iOS development
    is the delegate pattern. A delegate is simply any object that conforms to some
    predefined protocol that another object knows about. For example, say we have
    class A and it has a property called delegate that must conform to the protocol
    P. We can assign an instance of class B to the delegate property of A, if class
    B conforms to the protocol P. The delegate pattern is very much like the listener
    pattern found in other languages, like Java.


    ### Declaring CoinsControllerDelegate


