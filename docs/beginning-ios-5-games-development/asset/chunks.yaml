- fmt: "# When an Application Starts\n\nWhen an application is fully initialized and\
    \ ready to start running the code that comprises it, the task `application:didFinishLaunchingWithOptions:`\
    \ is called, as seen in Listing 2–2.\n\nThis task, besides having an incredibly\
    \ long name, takes an instance of `UIApplication` and `NSDictionary` as arguments.\
    \ The `UIApplication` is an object that represents the state of the running application.\
    \ The instance of `AppDelegate` that receives this message is the delegate to\
    \ the `UIApplication` object. This means that we modify the application’s behavior\
    \ by implementing tasks in `AppDelegate`. The protocol `UIApplicationDelegate`,\
    \ which `AppDelegate` implements, defines the tasks that will be called on the\
    \ application’s behalf.\n\nIf we take a look at the implementation of `application:didFinishLaunchingWithOptions:`\
    \ we start by creating a new `UIWindow` with a size equal to the size of the screen.\
    \ Once the `UIWindow` is instantiated we need to create a `UIViewController` that\
    \ will manage the UI of our application. A new Xcode project, like the one we\
    \ created, starts out with a single `ViewController` class to manage our UI. We\
    \ are going to create device specific subclasses of our `ViewController`, so that\
    \ we have a place to put device specific code. We will look at the process of\
    \ creating these subclasses shortly. To make sure that we instantiate the correct\
    \ `ViewController` subclass we need to add the bold code in Listing 2–2.\n\nOnce\
    \ our `ViewController` is created we set it as the `rootViewController` of `window`\
    \ and call `makeKeyAndVisible`. The `window` object is an instance of `UIWindow`\
    \ and is the root graphical component of your application. The task `makeKeyAndVisible`\
    \ essentially displays the window. Any custom components we add to our application\
    \ will be subviews of this `window` object.\n\nIf your application requires that\
    \ configuration be done before the UI is loaded, you put that initialization code\
    \ before the call to `makeKeyAndVisible`. This might include reading an app-specific\
    \ configuration file, initializing a database, setting up the location service,\
    \ or any number of other things.\n\nNext we will take a general look at how a\
    \ UI is organized in an iOS application before looking at the details of working\
    \ with Interface Builder.\n\n# Understanding UIViewControllers\n\niOS development\
    \ and the associated libraries make heavy use of the Model View Controller (MVC)\
    \ pattern. In general, MVC is a strategy for separating the presentation (View),\
    \ data (Model), and business logic (Controller). In specific terms, the model\
    \ is simply data, like a `Person` class or an `Address`. The view is responsible\
    \ for rendering the data to the screen. In iOS development, that means a subclass\
    \ of `UIView`. iOS provides a special class to act as the controller for a `UIView`,\
    \ which is aptly named `UIViewController`.\n\n`UIViewController` has two key characteristics:\
    \ it is often associated with an XIB file and it has a property called \"view\"\
    \ that is of type `UIView`. By creating a subclass of `UIViewController`, we can\
    \ also make an XIB file with the same name as the class. By default, when you\
    \ instantiate a `UIViewController` subclass, it will load a XIB with the same\
    \ name. The root `UIView` in the XIB will be wired up as the `view` property of\
    \ `UIViewController`.\n\nBesides providing a clean separation between the UI layout\
    \ and the logic that drives it, iOS provides a number of `UIViewController` subclasses\
    \ that expect to work with other `UIViewController`s instead of `UIView`s. An\
    \ example of this is the `UINavigationController` that implements the type of\
    \ navigation found in the Settings app. In code, when you want to advance to the\
    \ next view, you pass a `UIViewController` and not a `UIView`, though it is the\
    \ `view` property of the `UIViewController` that is displayed on the screen.\n\
    \nAdmittedly, for our example application in this chapter it does not make a lot\
    \ of difference if we use a `UIViewController`. In Chapter 1, we extended `UIView`\
    \ when we created the `RockPaperScissorsView` class and it worked fine. However,\
    \ understanding how `UIViewController`s and their views work together will make\
    \ life easier in Chapter 3, where we explore a game's application life cycle.\n\
    \nUsing the `RockPaperScissorsView` from Chapter 1, let's take a look at how this\
    \ functionality would look if it were implemented as a `UIViewController`. Listing\
    \ 2–3 shows the file `RockPaperScissorsController.h`.\n\n**Listing 2–3.** *RockPaperScissorsController.h*\n\
    \n```\n@interface RockPaperScissorsController : UIViewController {\n\n    UIView*\
    \ buttonView;\n\n    UIButton*\n    rockButton;\n\n    UIButton*\n    paperButton;\n\
    \n    UIButton*\n    scissersButton;\n\n    UIView*\n    resultView;\n\n    UILabel*\n\
    \    resultLabel;\n\n    UIButton*\n    continueButton;\n\n    BOOL isSetup;\n\
    }\n\n-(void)setup:(CGSize)size;\n-(void)userSelected:(id)sender;\n-(void)continueGame:(id)sender;\n\
    -(NSString*)getLostTo:(NSString*)selection;\n-(NSString*)getWonTo:(NSString*)selection;\n\
    \n@end\n```\n\nIn listing 2–3, we see the class `RockPaperScissorsController`\
    \ extends `UIViewController`. Among other things, this means that `RockPaperScissorsController`\
    \ has a property called \"view\" that will be the root `UIView` for this controller.\
    \ Like `RockPaperScissorsView`, we will have other `UIView`s that are subviews\
    \ of the root view, such as the buttons for selecting your choice. Although these\
    \ buttons could conceivably have their own `UIViewController`s, there comes a\
    \ point when it makes sense to allow a `UIViewController` to manage all of the\
    \ `UIView`s with which it is concerned. There are very few changes required on\
    \ the implementation side of things to complete this transition from `UIView`\
    \ to `UIViewController`. Basically, wherever we used the keyword \"self,\" we\
    \ simply say `self.view` instead. Listing 2–4 shows the required changes.\n\n\
    **Listing 2–4.** *RockPaperScissorsController.m (Partial)*\n\n```\n-(void)setup:(CGSize)size{\n\
    \n    if (!isSetup){\n\n        isSetup = true;\n\n        srand(time(NULL));\n\
    \n        buttonView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, size.width,\
    \ size.height)];\n\n        [buttonView setBackgroundColor:[UIColor lightGrayColor]];\n\
    \n        [self.view addSubview:buttonView];\n\n        float sixtyPercent = size.width\
    \ * .6;\n\n        float twentyPercent = size.width * .2;\n\n        float twentFivePercent\
    \ = size.height/4;\n\n        float thirtyThreePercent = size.height/3;\n\n  \
    \      rockButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\n   \
    \     [rockButton setFrame:CGRectMake(twentyPercent, twentFivePercent, sixtyPercent,\
    \ 40)];\n\n        [rockButton setTitle:@\"Rock\" forState:UIControlStateNormal];\n\
    \n        [rockButton addTarget:self action:@selector(userSelected:)\n       \
    \         forControlEvents:UIControlEventTouchUpInside];\n\n        paperButton\
    \ = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\n        [paperButton\
    \ setFrame:CGRectMake(twentyPercent, twentFivePercent*2, sixtyPercent, 40)];\n\
    \n        [paperButton setTitle:@\"Paper\" forState:UIControlStateNormal];\n\n\
    \        [paperButton addTarget:self action:@selector(userSelected:)\n       \
    \         forControlEvents:UIControlEventTouchUpInside];\n\n        scissersButton\
    \ = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\n        [scissersButton\
    \ setFrame:CGRectMake(twentyPercent, twentFivePercent*3, sixtyPercent, 40)];\n\
    \n        [scissersButton setTitle:@\"Scissers\" forState:UIControlStateNormal];\n\
    \n        [scissersButton addTarget:self action:@selector(userSelected:)\n   \
    \             forControlEvents:UIControlEventTouchUpInside];\n\n        [buttonView\
    \ addSubview:rockButton];\n\n        [buttonView addSubview:paperButton];\n\n\
    \        [buttonView addSubview:scissersButton];\n\n        resultView = [[UIView\
    \ alloc] initWithFrame:CGRectMake(0, 0, size.width, size.height)];\n\n       \
    \ [resultView setBackgroundColor:[UIColor lightGrayColor]];\n\n        resultLabel\
    \ = [[UILabel new] initWithFrame:CGRectMake(twentyPercent, thirtyThreePercent,\
    \ sixtyPercent, 40)];\n\n        [resultLabel setAdjustsFontSizeToFitWidth:YES];\n\
    \n        [resultView addSubview:resultLabel];\n```"
