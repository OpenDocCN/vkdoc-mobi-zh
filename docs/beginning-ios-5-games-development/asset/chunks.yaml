- fmt: "# CHAPTER 5: Quickly Build a Frame-by-Frame Game\n\n## Listing 5–1. `Example01Controller.h`\n\
    \n```objc\n#import <UIKit/UIKit.h>\n#import <QuartzCore/CADisplayLink.h>\n#import\
    \ \"Viper01.h\"\n\n@interface Example01Controller : UIViewController {\n    CADisplayLink*\
    \ displayLink;\n    Viper01* viper;\n}\n\n-(void)updateScene;\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer;\n\
    @end\n```\n\nWe see in Listing 5–1 that the class extends `UIViewController` and\
    \ has two fields. The first field is called `displayLink` and is of type `CADisplayLink`\
    \ that is imported from the `QuartzCore` framework. The second field is called\
    \ `viper` and is of type `Viper01`. It is used to represent the spaceship. There\
    \ are also two tasks defined: the first is called `updateScene` and will be used\
    \ to update the `UIViews` that make up the scene. The second is called `viewTapped`,\
    \ and it is used to manage user input. Let’s take a look at the `Viper01` header\
    \ file in Listing 5–2 and see how we are representing the spaceship.\n\n## Listing\
    \ 5–2. `Viper01.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Viper01 : UIImageView {\n}\n\n@property float speed;\n@property CGPoint moveToPoint;\n\
    \n-(void)updateLocation;\n@end\n```\n\nIn Listing 5–2, we see that `Viper01` extends\
    \ `UIImageView` and has two properties. The `speed` property describes how fast\
    \ the viper will move, and the `moveToPoint` property keeps track of which point\
    \ on the screen the spaceship is moving. The task `updateLocation` does the work\
    \ of incrementally updating the location of the spaceship.\n\n## Implementing\
    \ the Classes\n\nNow that we have seen the definitions of the classes we will\
    \ be using in this example, let’s take a look at the implementation, starting\
    \ with the `viewDidLoad` task of `Example01Controller` class shown in Listing\
    \ 5–3.\n\n## Listing 5–3. `Example01Controller.m` (viewDidLoad)\n\n```objc\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self setTitle:@\"Simple\
    \ Movement\"];\n    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer\
    \ alloc]\n        initWithTarget:self action:@selector(viewTapped:)];\n    [self.view\
    \ addGestureRecognizer:tapRecognizer];\n\n    viper = [Viper01 new];\n    CGRect\
    \ frame = [self.view frame];\n    viper.center = CGPointMake(frame.size.width/2.0,\
    \ frame.size.height/2.0);\n    [self.view addSubview:viper];\n    [viper setMoveToPoint:viper.center];\n\
    \n    displayLink = [CADisplayLink displayLinkWithTarget:self\n              \
    \                              selector:@selector(updateScene)];\n    [displayLink\
    \ addToRunLoop:[NSRunLoop currentRunLoop]\n                      forMode:NSDefaultRunLoopMode];\n\
    }\n```\n\nIn Listing 5–3, after setting the title, we create a `UITapGestureRecognizer`\
    \ and add it to the root `UIView` associated with this `UIViewController`. Adding\
    \ the `UITapGestureRecognizer` to the `UIView` will cause the task `viewTapped:`\
    \ to be called when the user taps the screen, giving us a chance to update the\
    \ location to which the spaceship is moving.\n\nThe next step is to create a new\
    \ instance of `Viper01` and place it in the center of the root `UIView`. We also\
    \ set the `moveToPoint` property of `viper` to the center of the screen, so the\
    \ viper starts out stationary.\n\nThe last thing we have to do is specify a task\
    \ that we want called periodically so we can update the location of the spaceship\
    \ and create our animation. We do this by creating a `CADisplayLink` and specifying\
    \ the task `updateScene`. Once we call `addToRunLoop`, `updateScene` will be called\
    \ every time the screen refreshes. In the next section we will look at the class\
    \ `CADisplayLink` and `NSRunLoop` and see what they are all about. Let’s look\
    \ next at the `updateScene`, as shown in Listing 5–4.\n\n## Listing 5–4. `Example01Controller.m`\
    \ (updateScene)\n\n```objc\n-(void)updateScene{\n    [viper updateLocation];\n\
    }\n```\n\nIn Listing 5–4, in the task `updateScene`, we simply call `updateLocation`\
    \ on the object `viper`. In future examples we will do more in the task `updateScene`,\
    \ but for now let’s just look at how we implement moving the one ship.\n\n## Moving\
    \ the Spaceship\n\nEach time `updateScene` is called, we have to update the location\
    \ of the spaceship. This is accomplished with a little geometry to figure out\
    \ the new location of the ship for each frame of the animation. Let’s just look\
    \ at `updateLocation` and understand how that task moves the spaceship. See Listing\
    \ 5–5.\n\n## Listing 5–5. `Viper01.m` (updateLocation)\n\n```objc\n-(void)updateLocation{\n\
    \    CGPoint c = [self center];\n    float dx = (moveToPoint.x - c.x);\n    float\
    \ dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n    float dxf =\
    \ cos(theta) * self.speed;\n    float dyf = sin(theta) * self.speed;\n    if (dx\
    \ < 0){\n        dxf *= -1;\n        dyf *= -1;\n    }\n    c.x += dxf;\n    c.y\
    \ += dyf;\n    if (abs(moveToPoint.x - c.x) < speed && abs(moveToPoint.y - c.y)\
    \ < speed){\n        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n    }\n\
    \    [self setCenter:c];\n}\n```\n\nIn Listing 5–5, we see the `updateLocation`\
    \ task of the class `Viper01`. This task is responsible for moving the spaceship\
    \ one frame’s worth of movement toward the point `moveToPoint`. Because the class\
    \ `Viper01` extends `UIImageView`, we can move it by simply setting the standard\
    \ properties used to specify its location relative to its parent. We could use\
    \ the `frame` property, but there is a property called `center` that is a shorthand\
    \ way of manipulating a `UIView`’s frame.\n\nWe start calculating the spaceship’s\
    \ new center location by first getting a copy of its current center and storing\
    \ that in the variable `c`. Next, we calculate the difference between the current\
    \ location and the location we are moving to for both the X and Y axis, storing\
    \ the values in `dx` and `dy`. After looking up the formula in our high school\
    \ geometry books, we calculate the angle that describes the direction we are moving,\
    \ by dividing `dy` by `dx` and passing the result to the `atan` (arc tangent)\
    \ function, storing the result as `theta`.\n\nWe want to move the spaceship `speed`\
    \ a number of points in the direction of `theta`. To calculate what that means\
    \ in terms X and Y points, we have to do a little geometry. To calculate the number\
    \ of X points we will be moving, we take the cosine of `theta` and multiply it\
    \ by `speed`, storing the value in `dxf`. Similarly, to calculate the number of\
    \ Y points we have to move in this frame, we take the sine of `theta` and multiply\
    \ by `speed`, storing the result in `dyf`. To finalize these values, we check\
    \ to see if `dx` is negative; if it is, we switch the signs of `dxf` and `dyf`.\n\
    \nOnce `dxf` and `dyf` are calculated, we add those values to the `x` and `y`\
    \ parts of the variable `c`. The last thing we are going to do is set the `center`\
    \ property with the new value stored in `c`. However, if we are less than `speed`\
    \ points from the `moveToPoint`, we will overshoot it. We don’t want to overshoot\
    \ the point, because come next frame we will overshoot again in the opposite direction,\
