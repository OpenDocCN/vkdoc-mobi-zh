    In Listing 8–17, we see the header for the class `PanGestureController`, which
    again extends `GameController`. We keep an ordered list of the asteroids in the
    `NSMutableArray asteroids`. We also have two variables keeping track of state
    for the duration of a gesture: the `int asteroidIndex` and the `CGPoint startCenter`.
    The properties `minYValue` and `maxYValue` specify how far each `Asteroid` may
    move up or down. The task `panGesture:` is called by the `UIPanGestureRecognizer`
    when a pan gesture is detected.


    The meat of this example is found in the implementation of the class `PanGestureController`,
    let’s start with the `doSetup` tasks, as shown in Listing 8–18.


    **Listing 8–18.** *PanGestureController.m (doSetup)*

    ```objc

    -(BOOL)doSetup{


    if ([super doSetup]){


    [self setGameAreaSize:CGSizeMake(320, 480)];


    [self setMinYValue:72.0f];


    [self setMaxYValue:480-[self minYValue]];


    asteroids = [NSMutableArray new];


    for (int i=0;i<3;i++){


    Asteroid* asteroid = [Asteroid asteroid:self];


    [[asteroid behaviors] removeAllObjects];


    [self addActor:asteroid];


    [asteroids addObject:asteroid];


    CGPoint center = CGPointMake(i*320.0/3.0+320.0/6.0, [self minYValue]);


    [asteroid setCenter:center];


    }


    UIPanGestureRecognizer* panRecognizer = [[UIPanGestureRecognizer alloc]


    initWithTarget:self action:@selector(panGesture:)];


    [panRecognizer setMinimumNumberOfTouches:1];


    [actorsView addGestureRecognizer:panRecognizer];


    return YES;


    }


    return NO;


    }

    ```


    In Listing 8–18, we see the task `doSetup` for the class `PanGestureController`.
    The first thing we do after specifying the size of the game area is specify the
    `minYValue` and the `maxYValue` for the asteroids, so they can not move with 72
    points of the top or bottom of the screen. Next, we create our three `Asteroid`
    objects, add them to the scene, and add them to the `NSMutableArray asteroids`.
    Each `Asteroid` starts at the top of the screen.


    The last thing we do in `doSetup` is create a `UIPanGestureRecognizer`, configure
    it to call `panGesture:`, and add it to `actorsView`. The next section explains
    how we respond to these gestures to create the desired behavior.


    ## Responding to Pan Gestures


    We have reviewed how to set up the class `UIPanGestureRecognizer`. Now we will
    explore how to respond to this gesture in the task `panGesture:`, as shown in
    Listing 8–19.


    **Listing 8–19.** *PanGestureController.m (panGesture:)*

    ```objc

    -(void)panGesture:(UIPanGestureRecognizer*)panRecognizer{


    if ([panRecognizer state] == UIGestureRecognizerStateBegan){


    CGSize gameAreaSize = [self gameAreaSize];


    CGPoint locationInView = [panRecognizer locationInView:actorsView]; if (locationInView.x
    < gameAreaSize.width/3.0){


    asteroidIndex = 0;


    } else if (locationInView.x > gameAreaSize.width/3.0*2){


    asteroidIndex = 2;


    } else {


    asteroidIndex = 1;


    }


    Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];


    startCenter = [asteroid center];


    [asteroid setAnimationPaused:YES];


    } else if ([panRecognizer state] == UIGestureRecognizerStateChanged){


    Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];


    CGPoint locationInView = [panRecognizer locationInView:actorsView]; CGPoint center
    = [asteroid center];


    center.y = locationInView.y;


    if (center.y < [self minYValue]){


    center.y = [self minYValue];


    }


    if (center.y > [self maxYValue]){


    center.y = [self maxYValue];


    }


    [asteroid setCenter:center];


    } else if ([panRecognizer state] == UIGestureRecognizerStateEnded){


    Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];


    [asteroid setAnimationPaused:NO];


    } else if ([panRecognizer state] == UIGestureRecognizerStateCancelled){


    Asteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];


    [asteroid setAnimationPaused:NO];


    [asteroid setCenter:startCenter];


    }


    }

