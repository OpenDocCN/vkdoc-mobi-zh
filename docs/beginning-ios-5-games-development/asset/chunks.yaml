    Image Not Found: %@\", imageName);\n    }\n    return result;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00476.png)\n\n**148** **CHAPTER 6: Create Your Characters: Game Engine,\
