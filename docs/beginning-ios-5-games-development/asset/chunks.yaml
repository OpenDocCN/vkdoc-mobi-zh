    gameCenter`和`ImageRepresentation rep`被传递给父类的初始化方法`initAt:WithRadius:AndRepresenation:`，以创建一个半径为32的`Saucer`对象。然后，`saucer`对象被设置为`ImageRepresenation`的委托，这样我们就可以通过`Saucer`类来指定表示细节。这与第六章中的演员（Actors）的工作方式完全相同。请查看源代码以了解这些任务具体是如何实现的。


