    \n## Adding UI Elements to an XIB File\n\nWe have looked at the basic elements\
    \ in a XIB file. We know there is a `File’s Owner` object reference that represents\
    \ the `UIViewController` loading the XIB file. We also know that we have a root\
    \ `UIView` for the XIB file. We are going to add additional `UIViews` to our XIB\
    \ file and look at how we customize the application to support not only the different\
    \ devices, but also have different layouts based on orientation. Figure 2–14 shows\
    \ the iPhone’s XIB file with a few items added to it.\n\n**Figure 2–14.** *iPhone’s\
    \ XIB file partially configured*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00467.png)\n\n![](images/00072.jpeg)\n\n**CHAPTER 2: Setting Up Your\
    \ Game Project**\n\n**31**\n\nIn Figure 2–14, we see the XIB file with additional\
    \ `UIView` objects added. To add a new component you simply drag it from the lower\
    \ right box to either the `Objects` list or directly onto the scene in the middle.\
    \ In this case we added two `UIView` objects named `Landscape` and `Portrait`\
    \ as siblings to the `UIView` named `View (A)`. Collectively we will refer to\
    \ these two `UIView` objects as the orientation views. On each of these new `UIView`\
    \ objects we added a `UILabel` by dragging it from the library at the lower right\
    \ into the visual representation on the middle of the screen (B). The text for\
    \ each label will identify which view we are currently displaying. To make sure\
    \ our layout is correct the size of the `Landscape` and `Portrait` `UIView` objects\
    \ is set in the properties panel to the right (C). In the center of the screen,\
    \ you can see the `Landscape` `UIView` displayed over the `Portrait` `UIView`\
    \ (D).\n\nThe next step is to add a new `UIView` to each orientation view. This\
