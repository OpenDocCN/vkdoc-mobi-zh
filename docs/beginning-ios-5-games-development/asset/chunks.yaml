    **CHAPTER 11: A Completed View Belt Commander**


    **Belt Commander: Game Recap**


    Belt Commander is an action game in which you control a spaceship that is traveling
    through an asteroid belt. Destroying asteroids and alien flying saucers rewards
    the player with points. During play, a power-up occasionally floats onto the screen,
    giving the player a chance to heal some damage, earn some bonus points, or upgrade
    weapons. This is a relatively fast-paced game with simple interactions. Let’s
    take a look at the opening screen of the game, shown in Figure 11–2.


    **Figure 11–2.** *Belt Commander’s opening screen*


    In Figure 11–2, we see the first screen of the game. We have a title at the top
    of the screen as well as a number of buttons. The Facebook, Tweet, and Leaderboards
    buttons enable the various social functions that we discussed in Chapter 9\. The
    extras button allows the user to configure the game and purchase new parts of
    the game. How purchases are handled is described in Chapter 10\. For this chapter,
    we will assume all of the extras are purchased. The Play button will take the
    user into the action part of the game, as shown in Figure 11–3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00170.png)


    ![](images/00345.jpeg)


    **CHAPTER 11: A Completed View Belt Commander**


