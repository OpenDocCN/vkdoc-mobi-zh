- fmt: "# CHAPTER 11: A Completed View Belt Commander\n\n## 279\n\nunderstand what\
    \ the key customizations are to make them work the way we want. In several earlier\
    \ chapters, we have implemented Actors of different types. In that light, we are\
    \ only going to look at the bits of code that make each interesting feature of\
    \ the Actor work. If you would like a refresher on how to implement Actors, check\
    \ out Chapters 6 and 7. Also, you can always look at the full source code. Let’s\
    \ start with the class `Viper`.\n\n## The Viper Actor\n\nThe `Viper` class represents\
    \ the spaceship at the left side of the screen. This is the Actor that the user\
    \ controls to achieve a high score. The `Viper` fires Bullets continuously to\
    \ the right. To move the `Viper`, the user taps the screen indicating a point\
    \ above or below the `Viper` where it should travel. When traveling the graphic\
    \ changes to show thrusters on the top or bottom of the craft. Also, a `Viper`\
    \ can intercept a Powerup that improves its guns. Lastly, the `Viper` has a fixed\
    \ amount of health that slowly regenerates. In summary, the key features of the\
