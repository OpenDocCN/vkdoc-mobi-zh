    In Listing 11–6, we see the task endOfGameCleanup that is called when the game
    ends, either by the user losing all her health or by quitting her active game
    from the pause dialog. In this task, we record that we are no longer playing by
    setting isPlaying to NO.


    The tasks notifyGameCenter and notifyFacebook inform those two services of the
    users score, and are described in Chapter 9.


    We have looked at how the application is organized by inspecting the XIB file,
    understanding the flow of the application and how we implemented it. Next, we
    want to look at the game itself and understand how the class BeltCommanderController,
    along with the Actor subclasses, create the game.


    **Implementing the Game**


    We have looked at an overview of how the application is put together. We know
    how the views got on the screen and looked at the life cycle of the application.
    In this section we are going to focus on just the game mechanics. We will look
    at how do we get actors into the game, how they behave, and how they interact.


    First we will review the classes we created throughout this book to create a simple
    game framework. We will then explore the class BeltCommanderController and understand
    how it manages the game. Lastly, we will look at each Actor and understand how
    its implementation makes it work the way that it does.


    **Game Classes**


    In previous chapters, we have built a collection of classes for implementing a
    game. We have the class GameController that is responsible for adding and removing
    actors from the game, as well as rendering them into the screen. We also have
    the class Actor that represents the characters and interactive elements of the
    game. Subclasses of Actor specify a Representation, a collection of Behaviors,
    and some custom code. The following is a review of these classes.


    GameControllerThe class GameController is the beating heart of the game; subclasses
    of this class need only add actors and animations will start happening. To customize
    the GameController, subclasses should implement the task applyGameLogic to perform
    any game specific logic, such as add or remove actors, check for victory or failure
    conditions, or anything else unique to a particular game.


    In addition to updating the Actors and game logic, GameController is responsible
    for rendering the Actors to the screen. GameController does this in two ways.
    First GameController extends UIControllerView so it has a primary UIView called
    view that can be part of an applications scene. Second, GameController has a UIView
    called actorsView that is the super view for all of the UIViews that represent
    actors in the game.


    By specifying the view and actorsView in a XIB file, an instance of GameController
    can draw to the screen. The second way that GameController is responsible for
    rendering the game is by working with the Representation of each Actor to create
    a UIView to add as a child to actorsView. For each step of the animation, GameController
    changes the


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00389.png)


    **CHAPTER 11: A Completed View Belt Commander**


    **265**


    location, scale, and transparency for each Actor’s UIView. The key tasks for GameController
    are as follows:


    doSetup. In the task doSetup a subclass of GameController should


    specify the subclasses of Actor that should be kept sorted by calling setSortedActorClasses:.


    applyGameLogic. The task applyGameLogic is called once for every step of the animation.
    It is in this task that subclasses should implement all game logic, including


    Setting end-of-game conditions


    Adding and removing Actors


    Keeping score


    Tracking achievements


    Updating heads-up display (HUD)


    Managing user input (touches, gestures, and so on)'
