    \ 7–11`中，我们首先调用`CGContectClearRect`。这会擦除给定矩形区域中的任何旧内容，为实际绘制做好准备。要绘制`HealthBar`，我们只需绘制两个矩形：一个用于背景，另一个位于背景之上，表示生命条的当前百分比。要绘制一个矩形区域（而不是绘制矩形的边缘），我们通过调用`CGRectMake`定义了一个矩形。然后通过调用`UIColor`对象`backgroundColor`的`setFill`来指定要使用的颜色，该对象是`HealthBar`的一个属性。\n\
