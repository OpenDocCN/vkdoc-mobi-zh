    We will continue using what you learn over the following pages as examples for
    the final two chapters, as we explore a complete game.


    L. Jordan, *Beginning iOS 5 Games Development*


    ©


    Lucas Jordan 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Game Center


    Game Center, as the user sees it, is an application on an iOS device where information
    about a user’s games is aggregated. This information includes a place to log in
    and manage your account, a list of friends, and a list of games. For each listed
    game, there are a number of leaderboards for displaying scores, as well as a list
    of the achievements available in the game. Figure 9–1 shows a typical Game Center
    screen.


    **Figure 9–1.** *Game Center showing games*


    In Figure 9–1, we see nine installed games that support Game Center. Select a
    game to view its leaderboards and any achievements the user has earned.


    From a developer’s perspective, Game Center is a set of classes used to interact
    with Game Center to define the leaderboards and achievements. Collectively, these
    classes are called `GameKit`, which is available as part of your standard iOS
    SDK installation.


    Once `GameKit` is integrated with your game, you will be able to sign the user
    in and perform `GameKit` operations on her behalf. Figure 9–2 shows the user being
    signed into `GameKit`.


    **Figure 9–2.** *Signing into GameKit*


    In Figure 9–2, we see the Welcome screen for the game Belt Commander. At the top,
    we see a notification from Game Center letting the user know that this game is
    using `GameKit` with the user account displayed. We also see the word “sandbox.”
    This is informing us that we’re not using the live version of Game Center, but
    rather the development version. For the most part, you don’t have to worry about
    this; while developing, you will be using the sandbox exclusively.


    To enable `GameKit` in your project, you obviously use classes from `GameKit`,
    but you also have to tell Apple that you want `GameKit` support for a given game.
    The following section describes how to set up `GameKit` in iTunes Connect.


    ### Enabling Game Center in iTunes Connect


    Game Center is not just an app or set of libraries on your iOS device. It is also
    a set of web services hosted by Apple that provide much of the functionality.
    In order for your game to use these services, you have to configure your application.
    You will have to create an App ID in the provisioning portal, configure Xcode
    to use the resultant Bundle Identifier, and configure your application in iTunes
    Connect to use Game Center. Let’s assume we are making a new game and start with
    the Provisioning Portal, as shown in Figure 9–3.


    **Figure 9–3.** *Creating an App ID in the Provisioning Portal*


    In Figure 9–3, we see the form used to create an App ID. The top field labeled
    Description can be anything you want to remind you why you created this App ID.
    You can select any Bundle Seed ID you want, but I have found an important reason
    not to just use the default: selecting the default `Bundle Seed ID` removes a
    number of configuration steps when working with `Xcode`.


    The last item is the Bundle Identifier. This is used to identify your application
    at runtime. For games that are meant to support Game Center, you have to specify
    a `Bundle Identifier` without a wildcard. Once you press Submit, you should open
    your game project in `Xcode`.


    The `Bundle Identifier` must be set on `Xcode`, so iOS knows how to associate
    the binary running on your device to the application defined by iTunes Connect.
    Figure 9–4 shows where to set the `Bundle Identifier`.'
  raw: 'The examples in this chapter are taken from the project Belt Commander. We
    will continue using what you learn over the following pages as examples for the
    final two chapters, as we explore a complete game.


    L. Jordan, *Beginning iOS 5 Games Development*


    ©


    Lucas Jordan 2011


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00446.png)


    ![](images/00053.jpeg)


    **216**


    **CHAPTER 1: App Cubby**


    **Game Center**


    Game Center, as the user sees it, is an application on an iOS device where information
    about a user’s games is aggregated. This information includes a place to log in
    and manage your account, a list of friends, and a list of games. For each listed
    game, there are a number of leaderboards for displaying scores, as well as a list
    of the achievements available in the game. Figure 9–1 shows a typical Game Center
    screen.


    **Figure 9–1.** *Game Center showing games*


    In Figure 9–1, we see nine installed games that support Game Center. Select a
    game to view its leaderboards and any achievements the user has earned.


    From a developer’s perspective, Game Center is a set of classes used to interact
    with Game Center to define the leaderboards and achievements. Collectively, these
    classes are called GameKit, which is available as part of your standard iOS SDK
    installation.


    Once GameKit is integrated with your game, will be able to sign the user in and
    perform GameKit operations on her behalf. Figure 9–2 shows the user being signed
    into GameKit.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00236.png)


    ![](images/00293.jpeg)


    **CHAPTER 1: App Cubby**


    **217**


    **Figure 9–2.** *Signing into GameKit*


    In Figure 9–2, we see the Welcome screen for the game Belt Commander. At the top,
    we see a notification from Game Center letting the user know that this game is
    using GameKit with the user account displayed. We also see the word “sandbox.”
    This is informing us that we’re not using the live version of Game Center, but
    rather the development version. For the most part, you don’t have to worry about
    this; while developing, you will be using the sandbox exclusively.


    To enable GameKit in your project, you obviously use classes from GameKit, but
    you also have to tell Apple that you want GameKit support for a given game. The
    following section describes how to set up GameKit in iTunes Connect.


    **Enabling Game Center in iTunes Connect**


    Game Center is not just an app or set of libraries on your iOS device. It is also
    a set of web services hosted by Apple that provide much of the functionality.
    In order for your game to use these services, you have to configure your application.
    You will have to create an App ID in the provisioning portal, configure Xcode
    to use the resultant Bundle Identifier, and configure your application in iTunes
    Connect to use Game Center. Let’s assume we are making a new game and start with
    the Provisioning Portal, as shown in Figure 9–3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00261.png)


    ![](images/00364.jpeg)


    **218**


    **CHAPTER 1: App Cubby**


    **Figure 9–3.** *Creating an App ID in the Provisioning Portal* In Figure 9–3,
    we see the form used to create an App ID. The top field labeled Description can
    be anything you want to remind you why you created this App ID. You can select
    any Bundle Seed ID you want, but I have found an important reason not to just
    use the default: selecting the default Bundle Seed ID removes a number configuration
    steps when working with Xcode.


    The last item is the Bundle Identifier. This is used to identify your application
    at runtime.


    For games that are meant to support Game Center, you have to specify a Bundle
    Identifier without a wildcard. Once you press Submit, you should open your game
    project in Xcode.


    The Bundle Identifier must be set on Xcode, so iOS knows how to associate the
    binary running on your device to the application defined by iTunes connect. Figure
    9–4 shows where to set the Bundle Identifier.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00302.png)


    ![](images/00343.jpeg)'
