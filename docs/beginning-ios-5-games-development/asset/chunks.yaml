    Once you have had a chance to play a little with the different view setups available
    in Xcode, you can move on and add a new view to your project. Arrange Xcode so
    the right-most panel is visible, and hide the left-most panel if you want. Xcode
    should look something like Figure 1–6.


    **Figure 1–6.** *Storyboard with second view*


    In Figure 1–6, we see that we have added a second view to the storyboard. Like
    any good Apple desktop application, most of the work is done through dragging
    and dropping. To add the second view we enter the words `UIView` into the bottom
    right text field, item A. This filters the list so we can drag the icon labeled
    item B on the work area in the center. Click on the new view so it is selected
