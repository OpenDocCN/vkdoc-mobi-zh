    The task doSwitch:With: is responsible for updating the model and creating the
    animations. To update the model, we simply call swap:With: on coinsGame. To create
    the animations, we have to work with a class called CABasicAnimation. A CABasicAnimation
    object describes a change in a CALayer. A CALayer is an object that represents
    the visual content of a UIView.


    Up until this point, we have said that a UIView provides the content on the screen,
    and that is still true, but a UIView uses the Core Animation layer to implement
    how it is drawn. As such, each UIView has a layer property of type CALayer. You
    need to understand this in order to understand how CABasicAnimation works. Looking
    at Listing 4–25, you can see that a CABasicAnimation is created by specifying
    a path. In our case, the path is transform.scale. This is a path into the CALayer
    object associated with the UIView we wish to animate.


    For each UIView, coinViewA and coinViewB, we will be creating two CABasicAnimation
    objects. When we create the CABasicAnimation object animScaleDown, we specify
    that this CABasicAnimation will be manipulating the value of scale on the property
    transform.


    We specify the starting value of the scale by setting the fromValue of animScaleDown,
    and we specify the ending value by setting the toValue. The value duration indicates
    how many seconds we want this animation to take. By specifying the timingFunction,
    we control the rate at which this animation will take place. In this case, we
    indicate kCAMediaTimingFunctionEaseIn, which tells the CABasicAnimation to start
    out slow and then speed up.


    The CABasicAnimation animScaleUp is similar to animScaleDown. The big difference
    is that the fromValue and toValue are opposite. We also set the value for beginTime
    to 1


    second in the future. The idea here is that we want the animation animScaleDown
    to run for a second, making the coin get small enough to vanish, and then we want
    the animation animScaleUp to run when animScaleDown is done, scaling the coin
    back up.'
