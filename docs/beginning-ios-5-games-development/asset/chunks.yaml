  raw: 'The task doAddActors iterates through all actors in the NSMutableSet actorsToBeAdded
    and adds each one to the NSMutableSet actors. Additionally, a UIView for each
    actor is retrieved from the actor’s representation property and added as a subview
    of actorsView. The property representation is an NSObject that conforms to the
    protocol Representation (as defined in Actor.h in Listing 6–9). After adding the
    view, we find the NSMutableSet sorted that corresponds to the actor’s class in
    the NSMutableDictionary actorClassToActorSet. The actor is then added to the NSMutableSet
    sorted. In this way, we can later find all actors of a particular type with a
    quick lookup in the NSMutableDictionary actorClassToActorSet. The last step in
    doAddActors is to remove all of the actors from the set actorsToBeRemoved.


    In the preceding listing, we see the task doRemoveActors that parallels the task
    doAddActors. In doRemoveActors, each actor in the NSMutableSet actorsToBeRemoved
    has its associated UIView removed from its super view and is removed from the
    corresponding NSMutableSet sorted. Each actor is also removed from the NSMutableSet
    actors. Finally, the NSMutableSet actorsToBeRemoved is cleared of all actors by
    calling removeAllObjects.


    **Adding and Removing Actors**


    To add or remove an actor from the game, we call addActor or removeActor, respectively,
    as shown in Listing 6–6.


    **Listing 6–6.** *GameController.m (addActor and removeActor)*


    -(void)addActor:(Actor*)actor{


    [actor setAdded:YES];


    [actorsToBeAdded addObject:actor];


    }


    -(void)removeActor:(Actor*)actor{


    [actor setRemoved:YES];


    [actorsToBeRemoved addObject:actor];


    }


