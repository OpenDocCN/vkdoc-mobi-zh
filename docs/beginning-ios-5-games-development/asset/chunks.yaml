    **Swipe Gesture**


    The swipe gesture is probably most recognizable as the gesture used to switch
    the set of apps you see on the home screen. This gesture is often used to switch
    context, like with the home screen. Other examples include the four-finger swipe
    used to switch the foreground application on the iPad 2\. It is sort of like pawing
    your way through your running applications. In our example, we are going to use
    swipe gestures to add comets to the scene, as shown in Figure 8–7.


