    \n    [`saucer setRadius:startRadius`];\n\n    [`saucer setAnimationPaused:NO`];\n\
    \n}\n\n}\n\n在清单 8–16 中，我们看到任务`pinchGesture:`，每当在`UIView`的`actorsView`上检测到捏合手势时，就会调用该任务。在此示例中，我们检查手势识别器的状态。状态信息指示手势刚刚开始（`UIGestureRecognizerStateBegan`）、正在进行（`UIGestureRecognizerStateChanged`）还是已终止（`UIGestureRecognizerStateEnded`\
    \ 或 `UIGestureRecognizerStateCancelled`）。\n\n手势开始时，我们记录`saucer`的半径并将其存储在变量`startRadius`中。我们还在`saucer`上调用`setAnimationPaused:`，以在缩放时停止其动画。这并不是必须停止动画的要求。我们这样做只是为了在手机上玩示例时能够观察手势识别器状态的变化。\n\
    \n手势进行时，我们获取手势的比例和速度。比例值是从手势开始以来的比例变化。换句话说，比例是累积的，这就是为什么我们将比例应用于`startRadius`，而不是`saucer`的当前半径。一旦计算出新的半径，我们就将其应用于`saucer`。速度是每秒的比例因子。此值可用于计算在手势结束后应用于动画的漂移量。我们除了记录该值外，没有使用它。\n\
    \n手势结束时，通常我们只需将`saucer`的`animationPaused`属性设置为`NO`。这会使`saucer`再次开始动画。如果手势被取消，我们将`saucer`重置为其原始半径并取消暂停动画。要测试取消状态，请先将`saucer`一直缩小，然后用一只手开始放大它，同时另一只手按下\
    \ iPhone 顶部的电源按钮。这将把你踢出应用程序。然后重新启动示例应用程序，并注意`saucer`回到了其原始的小尺寸。\n\n捏合手势是我们在本章中看到的第一个多状态手势。接下来我们将看到的手势是平移或拖拽手势，这是另一种多状态手势。我们会发现它的行为与捏合手势非常相似。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00092.png)\n\n![](img/00329.jpeg)\n\
    \n**第 8 章：构建游戏：理解手势与动作** **197**\n\n**平移（或拖拽）手势**\n\n平移手势是你在“地图”应用中用来查看地图不同部分的手势。拖拽手势也用于解锁手机或下拉通知中心。如果你仔细想想，这些手势实际上是同一回事；用户将手指放下，沿大致直线移动，然后抬起。区别在于应用程序的响应方式。当视图在内容（例如地图或图像）上平移时，我们称之为平移手势。当你在屏幕上移动\
    \ UI 组件（例如滑块旋钮）时，我们称之为拖拽。无论我们在描述中如何称呼，此手势都是通过`UIPanGestureRecognizer`类（抱歉，拖拽）实现的。图\
    \ 8–4 展示了一个使用`UIPanGestureRecognizer`的示例。\n\n**图 8–4.** *平移或拖拽示例*\n\n在图 8–4 中，我们看到了三颗小行星。每颗小行星可以沿一条不可见的路径向上或向下拖拽。拖拽小行星时，你可以将手指一直向右或向左移动。这使得操作更加容易，因为用户一旦让目标小行星开始移动，就无需太在意手指移动的具体位置。\n\
    \n这个简单的示例从类`PanGestureController`的头文件开始，如清单 8–17 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00407.png)\n\n**198**\n\n**第 8 章：构建游戏：理解手势与动作** **清单 8–17.** *PanGestureController.h*\n\
