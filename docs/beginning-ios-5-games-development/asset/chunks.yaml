    the views are organized and how the application game logic is implemented. We
    will discuss the different actors in the game and how they are added. In some
    ways, this chapter is a review of the techniques we learned in previous chapters.
    However, exploring how these techniques fit together will give you a roadmap that
    will help you put together your own games. In fact, feel free to start out with
    the sample code for this chapter for your own game. It is my intention to do just
    that and release a commercial version of Belt Commander in the iTunes Store. So
    let’s get started.


