    In Figure 8–6, we see a ship toward the bottom of the screen. There are a number
    of circles above the ship; these are bullets that are shot out of the ship based
    on user gestures. The cluster of three circles toward the upper left are the basic
    bullets created from a simple tap. The circle closest to the bottom is a bigger
    bullet created when the user does a long press. If the user does a touch that
    is longer than two seconds, an even bigger bullet is fired, as can be seen in
    the upper right of Figure 8–6. Let’s take a look at the header file for the class
    `LongPressController` in Listing 8–23.


    **Listing 8–23.** `LongPressController.h`


    ```

    @interface LongPressController : GameController{


    Viper* viper;


    NSDate* longStart;


    }


    -(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;


    -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer;


    -(void)fireBulletAt:(CGPoint)point WithDamage:(float)bulletSize;


    @end

    ```


    In Listing 8–23, we see the header for the class `LongPressController`, which
    shows that we have a reference to the ship as well as an `NSDate` that is used
    to keep track of when a long press gesture starts. The task `tapGesture:` is used
    when the user simply taps the screen to fire a small bullet. The task `longPressGesture:`
    is called when the user performs a long press gesture to fire a larger bullet.
    The last task is used to create a `Bullet` actor and add it to the scene. Let’s
    start by looking at the `doSetup` task of `LongPressController`. See in Listing
    8–24.


    **Listing 8–24.** `LongPressController.m (doSetup)`


    ```

    -(BOOL)doSetup{


    if ([super doSetup]){


    [self setGameAreaSize:CGSizeMake(320, 480)];


    viper = [Viper viper:self];


    [self addActor:viper];


    CGPoint center = [viper center];


    center.y = [self gameAreaSize].height/5.0*4.0;


    [viper setCenter:center];


    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(tapGesture:)];


    [actorsView addGestureRecognizer:tapRecognizer];


    UILongPressGestureRecognizer* longPressRecognizer =


    [[UILongPressGestureRecognizer alloc] initWithTarget:self


    action:@selector(longPressGesture:)];


    [longPressRecognizer setMinimumPressDuration:1.0f];


    [actorsView addGestureRecognizer: longPressRecognizer];


    return YES;


    }


    return NO;


    }

    ```


