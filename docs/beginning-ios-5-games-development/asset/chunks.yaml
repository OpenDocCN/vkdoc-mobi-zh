- fmt: '# with the Spaceship


    The spaceship resets to the center of the screen and the asteroid is removed.
    The object of this simple game is to avoid the incoming asteroids.


    One of the goals of this section is to explain how the game logic can be separated
    from how the game is drawn on the screen. In the first example we simply extended
    `UIImageView` and added our logic about the spaceship. This worked well enough,
    but there are lots of good reasons for separating the logic of the game from how
    it is displayed. For starters, if you want to run this game on an iPad instead
    of an iPhone, you probably want to make the play area bigger. Also, to support
    things like zooming into the game or showing a mini map, it makes sense to have
    the location of each item in the game stored in a display-agnostic way. Down the
    road, you may decide you want to port your game to another platform. Having a
    clean separation of game logic from display logic will save you a lot of work
    in such a case.


    To support this abstraction between the game logic and the display logic we introduce
    a new class called `Actor02`. Normally this class would simply be called `Actor`.
    The `02` in the name simply indicates it is part of the second example in this
    chapter. The following section explains what an actor is and how it helps implement
    an abstraction between the game logic and display.


    ## Understanding Actors


    Actors are the moving items in a game. In our case, the spaceship and the asteroid
    are actors. This is distinguished from other things that might be in a game, like
    a label for displaying the score, or other components.


    Actors are sometimes called sprites, but I prefer the term actor, because the
    word sprite can also describe the image used to display the game item. In casual
    conversation, it makes little difference what term you use—but let’s call them
    actors.


    ## Example2Controller Overview


    In our example, we will define the class `Actor02` and show how we can subclass
    `Actor02` to create our game items, the spaceship and the asteroids. Listing 5–7
    shows the header file for the class `Actor02`.


    ### Listing 5–7. *Actor02.h*


    ```

    #import <Foundation/Foundation.h>


    @class Example02Controller;


    long nextId;


    @interface Actor02 : NSObject {


    }


    @property (nonatomic, retain) NSNumber* actorId;


    @property (nonatomic) CGPoint center;


    @property (nonatomic) float speed;


    @property (nonatomic) float radius;


    @property (nonatomic, retain) NSString* imageName;


    -(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndImage:(NSString*)anImageName;


    -(void)step:(Example02Controller*)controller;


    -(BOOL)overlapsWith: (Actor02*) actor;


    @end

    ```


    In Listing 5–7, we see the header file for the class `Actor02`. There are five
    properties that represent the basic attributes required for this example. The
    property `actorId` is used to identify the actor; we will see how we use this
    to map each `Actor02` to an `UIImageView`.


    The property `center` tells us the location of each `Actor02`. The property `speed`
    indicates how fast this actor moves. The property `radius` represents the size
    of this actor. Finally, the property `imageName` describes how this actor should
    be drawn on the screen.


    The type of the property `center` is `CGPoint`. Strictly speaking, we will not
    be directly using this `CGPoint` to set the location of a `UIView` or other Core
    Graphics component. But `CGPoint` is a simple way to wrap an X and Y value, and
    we are already familiar with it. For this example, it makes little difference
    if we use `CGPoint` or a struct of our creation to represent a point. However,
    if you wanted to make sure your code was not dependent on Core Graphics in anyway,
    you would want to define your own type for representing a point.


    Also of note in Listing 5–7 is that an `Actor02` does not have a width or height,
    just a radius. This is done to simplify the example, and also because many games
    only require a single dimension to describe the size of an actor. If you build
    your own game framework, you may choose to have your actors include a width and
    height—it really depends on the game. Certainly if you look at prebuilt game engines
    you will find that their base type has all sorts of features you may or may not
    use. It may make a lot of sense to use a game engine, but here we are trading
    complexity for understanding.


    ## A Simple Actor


    Listing 5–7 shows that the `Actor02` has three tasks defined. Listing 5–8 shows
    the implementation of these tasks.


    ### Listing 5–8. *Actor02.m*


    ```

    #import "Actor02.h"


    @implementation Actor02


    @synthesize actorId;


    @synthesize center;


    @synthesize speed;


    @synthesize radius;


    @synthesize imageName;


    -(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius AndImage:(NSString*)anImageName{


    self = [super init];


    if (self != nil){


    [self setActorId:[NSNumber numberWithLong:nextId++]];


    [self setCenter:aPoint];


    [self setRadius:aRadius];


    [self setImageName:anImageName];


    }


    return self;


    }


    -(void)step:(Example02Controller*)controller{


    //implemented by subclasses.


    }


    -(BOOL)overlapsWith: (Actor02*) actor {


    float xdist = abs(self.center.x - actor.center.x);


    float ydist = abs(self.center.y - actor.center.y);


    float distance = sqrtf(xdist*xdist+ydist*ydist);


    return distance < self.radius + actor.radius;


    }


    @end

    ```


    In Listing 5–8 we see the implementation of the class `Actor02`. The task `initAt:WithRadius:AndImage:`
    is used to initialize an `Actor02` with some basic information. This task also
    assigns a random `actorId` value by using the value `nextId` and incrementing
    it. Because `nextId` is of type `long`, you will have to create an incredible
    number of actors before you get two actors with the same id.


    The task `step:` takes an instance of `Example02Controller` and is used incrementally
    to update the location and state of this `Actor02`. Subclasses will provide an
    implementation to this task to provide custom behavior and animations.


    The last task, `overlapsWith:`, is used to check to see if this `Actor02` overlaps
    another `Actor02`. This task is used to check for collisions in this example.


    ## Actor Subclasses: Viper02


    As we know, there are two types of actors in this example, the asteroids and the
    spaceship. Let’s take a look at the class `Viper02` and see how it is different
    from `Viper01`. The header for `Viper02` is shown in Listing 5–9.


    ### Listing 5–9. *Viper02.h*


    ```

    @class Example02Controller;


    @interface Viper02 : Actor02 {


    }


    @property CGPoint moveToPoint;


    +(id)viper:(Example02Controller*)controller;


    -(void)doCollision:(Actor02*)actor In:(Example02Controller*)controller;


    @end

    ```


    In Listing 5–9, we see that the header for `Viper02` is not much different from
    `Viper01`, as shown in Listing 5–2. `Viper02` extends the class `Actor02` instead
    of `UIImageView`. We have the property `moveToPoint`, which is the same, but the
    property `speed` is absent, because that is inherited from `Actor02`. We have
    a new constructor to simplify the creation of a `Viper02` and a new task called
    `doCollision:In:` that is used to handle the new functionality of colliding with
    an asteroid. Listing 5–10 shows the implementation of the class `Viper02`.


    ### Listing 5–10. *Viper02.m*


    ```

    #import "Viper02.h"


    #import "Example02Controller.h"


    @implementation Viper02


    @synthesize moveToPoint;


    +(id)viper:(Example02Controller*)controller{


    CGSize gameAreaSize = [controller gameAreaSize];


    CGPoint center = CGPointMake(gameAreaSize.width/2, gameAreaSize.height/2); Viper02*
    viper = [[Viper02 alloc] initAt:center WithRadius:16 AndImage:@"viper"];


    [viper setMoveToPoint:center];


    [viper setSpeed:.8];


    return [viper autorelease];


    }

    ```'
