    to a swipe gesture, there is no way to tell which direction the gesture was in.
    Only by creating a recognizer for each direction can we tell which direction the
    user’s gesture was in.


    Let’s look at the task swipeGesture:. See Listing 8–29.


    **Listing 8–29.** *SwipeGestureController.m (swipeGesture:)*


    -(void)swipeGesture:(UISwipeGestureRecognizer*)swipeRecognizer{


    CGSize gameSize = [self gameAreaSize];


    UISwipeGestureRecognizerDirection direction = [swipeRecognizer direction]; CGPoint
    locationInView = [swipeRecognizer locationInView:actorsView]; CGPoint center =
    CGPointMake(0, 0);


    float directionInRadians = DIRECTION_DOWN;


    if (direction == UISwipeGestureRecognizerDirectionRight){


    center.x = -20;


    center.y = locationInView.y;


    directionInRadians = DIRECTION_RIGHT;


    } else if (direction == UISwipeGestureRecognizerDirectionDown){


    center.x = locationInView.x;


    center.y = -20;


    directionInRadians = DIRECTION_DOWN;


    } else if (direction == UISwipeGestureRecognizerDirectionLeft){


    center.x = gameSize.width+20;


    center.y = locationInView.y;


    directionInRadians = DIRECTION_LEFT;


    } else if (direction == UISwipeGestureRecognizerDirectionUp){


    center.x = locationInView.x;


    center.y = gameSize.height+20;


    directionInRadians = DIRECTION_UP;


    }


    Comet* comet = [Comet comet:self withDirection:directionInRadians andCenter:center];


    [self addActor:comet];


    }


    In Listing 8–29, we see the code that is called when a swipe gesture is recognized.
    To create the effect we want, we are simply going to create a new Comet actor
    with the correct location and direction. To figure out where the Comet should
    be placed and in what direction it travels, we simply look at the direction property
    of swipeRecognizer.


