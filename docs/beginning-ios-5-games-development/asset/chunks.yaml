    **图 2-4.** *一个新创建的项目*


    在图 2-4 左侧，有一个包含项目元素的树形结构，其中根元素处于选中状态（A）。右侧则选中了“摘要”（Summary）标签页（B）。在“摘要”标签页中，我们需要选择支持的设备方向（C）。若要支持每个设备上的所有方向，请点击“倒置”（Upside
    Down）按钮。向下滚动，确保 iPad 的所有方向也均已选中。图 2-5 显示了正确的设置。现在项目已创建，是时候开始定制它以符合我们的需求了。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00093.png)


