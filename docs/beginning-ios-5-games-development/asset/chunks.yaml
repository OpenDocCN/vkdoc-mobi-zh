    **Inspecting ImageRepresentation**


    Because we want to separate the game logic regarding an actor and how it is drawn,
    we are introducing the class ImageRepresentation. This class is responsible for
    creating the objects necessary for rendering an actor with a UIView. Primarily,
    ImageRepresentation will be created UIImageViews with the PNG files in order to
    draw our actors. Let’s take a look at the header of ImageRepresentation, shown
    in Listing 6–14.


    **Listing 6–14.** *ImageRepresentation.h*


    #import <Foundation/Foundation.h>


    #import "Actor.h"


    @protocol ImageRepresentationDelegate


    @required


    -(NSString*)baseImageName;


    @optional


    -(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState;


    -(NSString*)getNameForVariant:(int)aVariant;


    -(NSString*)getNameForState:(int)aState;


    @end


    @interface ImageRepresentation : NSObject<Representation> {


    UIView* view;


    }


    @property (nonatomic, assign) NSObject<ImageRepresentationDelegate>* delegate;


    @property (nonatomic, retain) NSString* baseImageName;


    @property (nonatomic) int currentFrame;


    @property (nonatomic) BOOL backwards;


    @property (nonatomic) int stepsPerFrame;


    +(id)imageRep;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00148.png)


    **144**


    **CHAPTER 6: Create Your Characters: Game Engine, Image Actors, and Behaviors**


    +(id)imageRepWithName:(NSString*)aBaseImageName;


    +(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;


    -(void)advanceFrame:(Actor*)actor ForStep:(int)step;


    -(NSString*)getImageNameForActor:(Actor*)actor;


    -(UIImage*)getImageForActor:(Actor*)actor;


    @end


    The goal of the ImageRepresentation class is to encapsulate code for handling
    the common ways images will be used to represent an actor. These include the following
    cases:


    A single image representing the actor


    A series of images representing the actor


    Actors with multiple states


    Actors with multiple variations


    Actors with a different number of images for every combination of


    states and variations


    Each actor we create that uses an ImageRepresentation will fit one of the preceding
    cases. We indicate which one of these cases we intend by setting a delegate of
    type ImageRepresentationDelegate, as shown in Listing 6–14\. This allows an instance
    of ImageRepresentationDelegate to indicate the name of the image that should be
    used at any given time.


    The ImageRepresentationDelegate must specify a baseImageName, which is used in
    all of the use cases of ImageRepresentation. If the ImageRepresentationDelegate
    implements only baseImageName:, this indicates that a single image will be used
    for all instances of the actor. If a sequence of images is to be used, the delegate
    object must implement the task getFrameCountForVariant:AndState:. If a different
    sequence of images is to be used based on the state or variant of the actor, the
    delegate must implement getNameForState: and getNameForVariant:, respectively.
    Technically speaking, if just a single image is going to be used to represent
    all actors of a particular type, it is not required to specify a delegate to an
    ImageRepresentation. However, the ImageRepresentation still requires baseImageName
    to be specified.


    **Creating the Implementation of Powerup**


    The class Powerup must define how it is drawn as well as its basic behavior. Because
    the class Powerup will use a different sequence of images for each combination
    of state and variation, the delegate for ImageRepresentation must implement all
    four of these tasks.


    For simplicity, we specified that the class Powerup conforms to the protocol ImageRepresentationDelegate.
    Let’s take a look at the implementation of these methods in Listing 6–15.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00227.png)


    **CHAPTER 6: Create Your Characters: Game Engine, Image Actors, and Behaviors**
    **145**


    **Listing 6–15.** *Powerup.m (ImageRepresentationDelegate tasks)*


    -(NSString*)baseImageName{


    return @"powerup";


    }


    -(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState{


    return 63;


    }


    -(NSString*)getNameForVariant:(int)aVariant{


    if (aVariant == VARIATION_HEALTH){


    return @"health";


    } else if (aVariant == VARIATION_CASH){


    return @"cash";


    } else if (aVariant == VARIATION_DAMAGE){


    return @"damage";


    } else {


    return nil;


    }


    }


    -(NSString*)getNameForState:(int)aState{


    if (aState == STATE_GLOW){


    return @"glow";


    } else if (aState == STATE_NO_GLOW){


    return @"noglow";


    } else {


    return nil;


    }


    }


    In this listing, we see the four tasks required by an ImageRepresentationDelegate
    to create an actor represented by a different sequence of images for each combination
    of states and variations. The task baseImageName returns the NSString “powerup”,
    indicating that all of the images for this actor will start with “powerup”. The
    task getFrameCountForVariant:AndState: simply returns 63, because there are 63
    images in for each combination of state and variation. Other types of actors may
    wish to have a different number of images for each combination of state and variation
    and are free to return different numbers in getFrameCountForVariant:AndState:.


    The tasks getNameForVariant: and getNameForState: return string representations
    for each variation and state that apply to power-ups and allow ImageRepresentation
    to figure out exactly what image should be used at a given time.


    **Finding the Correct Image for an Actor**


    Let’s take a look at ImageRepresentation’s task getImageNameForActor: so you can
    understand how the four tasks from ImageRepresentationDelegate are used to identify
    an image name. See Listing 6–16.


    **Listing 6–16.** *ImageRepresentation.m (getImageNameForActor:)*


    -(NSString*)getImageNameForActor:(Actor*)actor{


    NSString* imageName = baseImageName;


    if (imageName == nil){


    imageName = [delegate baseImageName];


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00252.png)


    **146**


    **CHAPTER 6: Create Your Characters: Game Engine, Image Actors, and Behaviors**


    }


    NSString* variant = nil;


    if ([delegate respondsToSelector:@selector(getNameForVariant:)]){


    variant = [delegate getNameForVariant:[actor variant]];


    }


    NSString* state = nil;


    if ([delegate respondsToSelector:@selector(getNameForState:)]){


    state = [delegate getNameForState:[actor state]];


    }


    int frameCount = 0;


    if ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){


    frameCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor
    state]];


    }


    if (variant != nil){


    imageName = [[imageName stringByAppendingString:@"_"]


    stringByAppendingString:variant];


    }


    if (state != nil){


    imageName = [[imageName stringByAppendingString:@"_"]


    stringByAppendingString:state];


    }


    if (frameCount != 0){


    imageName = [[imageName stringByAppendingString:@"_"]


    stringByAppendingString:[NSString stringWithFormat:@"%04d", currentFrame] ];


    }


    return imageName;


    }


    The goal here is to establish the correct name of the image that should be used
    to represent the actor. The final image name will be stored in the variable imageName.
    The first thing we do is establish the baseImageName. This can be either the baseImageName
    property of the ImageRepresentation or from the delegate.


    The next step is to get the string representation of the actor’s variation. We
    test to see whether the delegate responds to the task getNameForVariant. If it
    does, we assign variant to the result. We follow the same pattern to get a string
    representation for state.'
