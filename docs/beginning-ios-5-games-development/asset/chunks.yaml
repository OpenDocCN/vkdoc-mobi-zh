    #import \"Actor.h\"\n#import \"ImageRepresentation.h\"\n#import \"ExpireAfterTime.h\"\
    \n\nenum{\n    STATE_GLOW = 0,\n    STATE_NO_GLOW,\n    PWR_STATE_COUNT\n};\n\n\
    enum{\n    VARIATION_HEALTH = 0,\n    VARIATION_CASH,\n    VARIATION_DAMAGE,\n\
    \    PWR_VARIATION_COUNT\n};\n\n@interface Powerup : Actor <ImageRepresentationDelegate,ExpireAfterTimeDelegate>{\n\
    }\n+(id)powerup:(GameController*)aController;\n@end\n```\n\nThis header file starts\
    \ by defining two enumerations. The first enumeration defines the values for the\
