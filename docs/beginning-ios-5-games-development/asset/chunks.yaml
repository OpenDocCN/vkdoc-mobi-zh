    In Listing 8–10, we see the task tapGesture:, which is called whenever one of
    the 12


    UITapGestureRecognizers recognizes a tap gesture. Note that we are not checking
    the state of the UITapGestureRecognizer, because tap gestures are considered discrete
    and don’t use the state information. We use the tasks numberOfTapsRequired and
    numberOfTouches to figure out which UITapGestureRecognizer has responded and store
    these values in taps and touches, respectively. These values tell us the index
    of the Powerup that should be enabled and is found in the NSMutableArray powerups.
    Once we have the correct Powerup, we create a TemporaryBehavior and set self as
    the delegate.


