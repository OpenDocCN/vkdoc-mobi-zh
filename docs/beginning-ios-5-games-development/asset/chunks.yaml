    ![](images/00099.png)\n\n![](images/00433.jpeg)\n\n**30**\n\n**CHAPTER 2: Setting\
    \ Up Your Game Project**\n\n**TIP:** Technically speaking, an XIB file contains\
    \ information that is used to create an instance of a particular class. In practice,\
    \ I find myself simply thinking, “the XIB file contains an object,” which is not\
