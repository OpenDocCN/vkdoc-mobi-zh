    ![](images/00064.jpeg)\n\n**CHAPTER 2: Setting Up Your Game Project**\n\n**29**\n\
    \n**Figure 2–13.** *Xcode configured for UI work*\n\nUnder the `Objects` section\
    \ of Figure 2–10, there is a single item named `View (D)`. This `View` is a `UIView`\
    \ and will be the root view when the application is running. In the center of\
    \ Figure 2–10, you can see how this view will look.\n\nUnder the section `Placeholders`\
    \ we see two items. We don’t have to concern ourselves with the `First Responder`\
