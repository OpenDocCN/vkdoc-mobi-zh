    ## 构建游戏 Coin Sorter


    到目前为止，我们已经探讨了将内容显示到屏幕上的部分细节。


    在前面的章节中，我们探讨了控制器类的角色以及它们如何管理数据和视图之间的关系。创建 Coin Sorter 游戏的最后一步是结合这些概念。本节将详细介绍 `CoinController`
    类的生命周期，并涉及我们已探讨过的基本概念。图 4-6 显示了由 `CoinController` 类控制的屏幕区域。


    在这个 5x5 的硬币网格中，用户可以选择两枚硬币交换位置。目标是创建相同硬币的行或列以形成匹配组合。当创建匹配时，屏幕上的硬币会有动画效果，并且用户的分数会增加。用户有
    10 次机会尽可能多地创建匹配。图 4-7 显示了游戏的生命周期。


    **图 4-6.** *CoinController 的视图*


    图 4-7 展示了单次游戏的应用程序流程。设置完成后，应用程序等待用户选择一枚硬币。如果未选择第一枚硬币，应用程序仅记录该硬币被选中并返回等待用户。当用户第二次选择硬币时，应用程序会检查刚选中的硬币是否与第一次选中的相同。如果是，则取消选中该硬币。这允许用户改变主意。如果用户选择了不同的硬币，则通过修改
    `CoinGame` 对象来更新游戏状态，并创建动画，展示两枚硬币交换位置。当硬币交换动画完成后，应用程序检查是否存在任何匹配。如果存在，则动画化其移除过程，并用新硬币更新
    `CoinGame` 以替换刚刚移除的硬币。由于添加新硬币可能会产生额外的匹配，应用程序会再次检查匹配。


    这个过程理论上可能永远持续下去，但实际上并不会。最终，将没有需要移除的匹配。


    当没有匹配时，应用程序检查用户是否还有剩余次数。如果有，则返回等待用户输入。如果没有，则游戏结束。


    **图 4-7.** *Coin Sorter 生命周期*


