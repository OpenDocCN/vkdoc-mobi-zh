    ## Chapter 11


    In Chapter 11, we review all you have learned by walking through the sample game,
    Belt Commander. We look at how the application is organized in terms of views
    and the navigation between them. We look at the specifics of extending `GameController`
    to define the logic that governs how the game is played and the interactions between
    the actors. We also look at the code that gives each actor in the game its unique
    behavior. In short we show the game Belt Commander is implemented, as shown in
    Figure 11.


