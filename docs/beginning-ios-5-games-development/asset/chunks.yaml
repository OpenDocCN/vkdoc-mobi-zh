- fmt: "`NSUserDefaults`类型的对象本质上是用于存储键值对的映射。键必须是`NSString`，值必须是属性列表，包括`NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`和`NSDictionary`——基本上是核心的\
    \ iOS 对象类型。我们想要存储一个`Highscores`类型的对象，但它不在这个列表中。为了实现这一点，我们必须从`highscores`对象中存储的数据创建一个`NSData`对象。\n\
    \n要将对象归档为`NSData`对象，我们使用`NSKeyedArchiver`类，并将`highscores`对象传递给`archivedDataWithRootObject:`方法。顾名思义，`archivedDataWithRootObject`用于归档一组对象图。在我们的例子中，根对象是`highscores`，我们知道它包含多个`Score`对象。所以看起来我们走对了方向。要使对象能被`NSKeyedArchiver`归档，它必须遵循`NSCoding`协议。最后一步是在`defaults`上调用`synchronize`；这可以确保我们的更改被保存。\n\
    \n## Highscores 类\n\n`Highscores`类的实例存储一个排序后的`Score`对象列表，并处理向列表添加`Score`对象的细节。让我们看看`Highscores`类的头文件，了解这一切是如何工作的，如列表\
    \ 3-12 所示。\n\n**列表 3-12** `Highscores.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    \n#import \"Score.h\"\n\n@interface Highscores : NSObject <NSCoding>{\n\nNSMutableArray*\
    \ theScores;\n\n}\n@property (nonatomic, retain) NSMutableArray* theScores;\n\n\
    -(id)initWithDefaults;\n-(void)addScore:(Score*)newScore;\n\n@end\n```\n\n列表 3-12\
    \ 展示了`Highscores`类的接口。正如我们所见，`Highscores`确实遵循了`NSCoding`协议。我们还可以看到它包含一个名为`theScores`的`NSMutableArray`，可以作为属性访问。定义了两个方法：一个用于用十个默认分数初始化`Highscore`，另一个用于添加新的`Scores`对象。列表\
    \ 3-13 展示了这个类的实现。\n\n**列表 3-13** `Highscores.m`\n\n```\n#import \"Highscores.h\"\
    \n\n@implementation Highscores\n\n@synthesize theScores;\n\n-(id)initWithDefaults{\n\
    \    self = [super init];\n    if (self != nil){\n        theScores = [NSMutableArray\
    \ new];\n        for (int i=0;i<10;i++){\n            [self addScore:[Score score:1\
    \ At:[NSDate date]]];\n        }\n    }\n    return self;\n}\n\n-(void)addScore:(Score*)newScore{\n\
    \    [theScores addObject:newScore];\n    [theScores sortUsingSelector:@selector(compare:)];\n\
    \    while ([theScores count] > 10){\n        [theScores removeObjectAtIndex:10];\n\
    \    }\n}\n\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder encodeObject:theScores\
    \ forKey:@\"theScores\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder{\n    theScores\
    \ = [[decoder decodeObjectForKey:@\"theScores\"] retain];\n    return self;\n\
    }\n\n-(void)dealloc{\n    for (Score* score in theScores){\n        [score release];\n\
    \    }\n    [theScores release];\n    [super dealloc];\n}\n\n@end\n```\n\n列表 3-13\
    \ 中展示的`Highscores`类的实现非常紧凑。\n\n`initWithDefaults`方法初始化`NSMutableArray theScore`，然后用十个新的`Score`对象填充`theScores`。`addScore:`方法将一个新的`Score`对象添加到`theScores`中，按玩家获得的分数排序，然后移除任何多余的`Scores`。这可能导致`newScore`这个`Score`实际上并不在`NSMutableArray\
    \ theScores`中。这样实现是为了让调用者不必考虑`theScore`可能不够高而不能被视为实际高分的情况。\n\n最后两个方法`encodeWithCoder:`和`initWithCoder:`来自`NSCoding`协议。这些方法描述了`Highscores`对象如何被归档和解档。\n\
    \n注意，这两个方法的参数传入的对象类型相同：`NSCoder`。"
  raw: 'Objects of type NSUserDefaults are basically maps for storing key value pairs.
    The keys are NSStrings and the values must be a property list. This includes NSData,
    NSString, NSNumber, NSDate, NSArray, and NSDictionary—basically the core iOS objects
    types. We want to store an object of type Highscores, which is not included in
    this list. In order accomplish this, we must create an NSData object from the
    data stored in the highscores object.


    To archive an object to an NSData object, we use the class NSKeyedArchiver and
    pass the highscores object to the tasks archivedDataWithRootObject:. As the name
    implies, archivedDataWithRootObject is designed to archive a graph of objects.
    In our case, the root object is highscores and we know it contains a number of
    Score objects. So it looks like we are on the right track. In order for an object
    to be archived by an NSKeyedArchiver, it must conform to the protocol NSCoding.
    The final step is to call synchronize on defaults; this makes sure our changes
    are saved.


    **The Highscores Class**


