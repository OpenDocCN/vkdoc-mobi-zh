    **Summary**


    In this chapter, we brought all of the techniques we have discussed in this book
    together. We started by exploring what our game, Belt Commander, is and how it
    is played. We then reviewed the flow of the application and looked at how we used
    the UINavigationController class to implement switching between views. We continued
    by looking at the class BeltCommanderController and learned how to implement the
    major parts of the game. Lastly, we looked at a few specific implementation choices
    that added life to our Actors.


    When creating a game, there will always be unique code and techniques involved.
    Each game is one of a kind and requires unique effort to bring to life. It would
    be impossible to write a book that explains every possible challenge a game developer
    can face.


    However, many developers and game designers are going to face requirements that
    are very similar to what I have outlined here. It is my hope that this book shows
    how to work through a number of these common challenges. From the most basic issue
    of switching screens and saving user data to the more complex topics like particle
    animations and inapp purchases, I think of this book as a map of the code and
    classes that are the infrastructure a game. Ultimately it is up to each developer
    to fill in the middle parts and create a new game. Thank you for reading this
    book.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00024.png)


    ![](images/00347.png)


    **A**


    ******Appendix**


    **Designing and Creating**


    **Graphics**


    In this appendix, we’ll cover three main topics: designing graphics, creating
    graphics, and some open source tools to use in doing so.


    When creating a video game, a lot of the work is put into creating the graphics
    used in the game. In this appendix, we will be considering 2D games. These graphics
    will be images for the actors in the game, backgrounds, buttons, and other decorations.
    These images are a large part of the game; they are the first thing people see,
    and they can dictate whether people are going to download the game. Images are
    what grab people’s attention. It is the image of Link or Mario that people remember—not
    the collision detection algorithm. It is not to say that there are not popular
    games with simple graphics, because there definitely are. But even creators of
    successful games with simple graphics spend a lot of time to make sure their art
    conforms to a unified design goal.


    In addition to concerns of style, a game designer must also consider what is required
    to create images suitable for building a game. We must consider the size of the
    final images as well as how the images are organized. Should we use separate images
    for everything, or can we create composite image for backgrounds? How do we organize
    our images so we can easily make changes? Do we have a budget of how many megabytes
    of images we can include? These are just a couple of the questions I will be addressing
    in this Appendix.


    The last part of this appendix will be a quick review of some of the great open
    source tools available to a game designer. These tools are not only important
    for small game developers, but they were critical in the writing of this book.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00157.png)


    ![](images/00256.png)


    **288**


    **APPENDIX A: Designing and Creating Graphics**


    **The Art in Video Games**


    Before a video game is created, someone has an idea about how the game is played
    and what it looks like. That initial vision may or may not make it into the final
    release. In any case, it is ideal to have a single person, or group of people,
    responsible for shaping the art of the game so it has a consistent style. Once
    a game has art direction, work will commence on building the assets for the game.
    As the game comes together, other pieces of artwork will be created to support
    the game, such as a web site or an advertisement. These other pieces of work should
    be in the same visual style. In this section, we will do a quick review of what
    art style is and how that shapes users expectations.


    **Style in Video Games**


    The style of a video game refers to all of the choices the designers and artists
    made to create the art in a game, and how that art fits together. The style of
    a game is no different than style in other products. For example, consider a bottle
    of teriyaki sauce. It would not be unreasonable for the word *teriyaki* to be
    drawn in a typeface that looks like it came from the Far East, perhaps like the
    word in Figure A–1.


    **Figure A–1.** *“Teriyaki” rendered in a Far East style*


    Figure A–1 shows a word rendered with a style that matches the expectations of
    the users of teriyaki sauce. The many makers of teriyaki sauce set this expectation
    over the years. Not all products have a socially expected style to draw from.
    In fact, if you are making a new game in a new genre, users may have no expectation
    at all about the style. If you are making a game about knights and castles, the
    user will welcome a style that looks medieval. In any case, it is important that
    the style of the art be consistent throughout the game.


    Having a consistent style does not require the art to be overly elaborate. The
    goal is simply to make the art appear to be created by a single hand, as the example
    in Figure A–2 shows.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00409.png)


    ![](images/00041.jpeg)


    **APPENDIX A: Designing and Creating Graphics**


