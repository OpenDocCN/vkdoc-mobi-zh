- fmt: "`touchesCancelled:withEvent:`任务在切换应用或弹出对话框时可能被调用。另一个更常见的触摸事件取消方式是手势识别器（gesture\
    \ recognizer）被触发。手势识别器由`UIGestureRecognizer`类定义，它是一个检查`UIView`上触摸事件的对象，并在触摸可以被视为特定手势（如轻点、捏合或滑动）时做出响应。\n\
    \n要试验`touchesCancelled:withEvent:`任务，请执行双指双击操作。\n\n注意，第一次轻点后，手指触摸的位置会出现两个`Sparks`。第二次轻点后，之前添加的`Spark`对象会被移除。这是因为当双指双击手势识别器被触摸事件激活时，调用了`touchesCancelled:withEvent:`。\n\
    \n手势识别器能够取消触摸事件这一特性，允许开发者在`UIView`上混合搭配任意数量的手势，而无需担心手势冲突。除了取消触摸事件，手势之间也可以相互取消。例如，捏合手势和双指拖拽手势都以相同的方式开始——两根手指大约同时落在屏幕上。如果没有一种机制来相互取消，这两种手势很容易发生冲突。\n\
    \n我们继续看看这些触摸事件如何应用于游戏相关的类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00423.png)\n\n**186** **第8章：构建你的游戏：理解手势与动作** **将触摸事件应用于角色**\n\n让我们快速浏览一下`TouchEventsController`类，看看我们如何设置演示来响应轻点手势。`TouchEventsController.m`的重要部分如代码清单8-4所示。\n\
    \n**代码清单8-4.** *TouchEventsController.m (doSetup)*\n\n```\n-(BOOL)doSetup{\n \
    \   if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
    \        [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark class]]];\n\
    \        UITapGestureRecognizer* doubleTapTwoTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapTwoTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapTwoTouch setNumberOfTouchesRequired:2];\n\
    \        UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapOneTouch\
    \ setNumberOfTapsRequired:2];\n        [doubleTapOneTouch setNumberOfTouchesRequired:1];\n\
    \        [actorsView addGestureRecognizer:doubleTapOneTouch];\n        [actorsView\
    \ addGestureRecognizer:doubleTapTwoTouch];\n        return YES;\n    }\n    return\
    \ NO;\n}\n```\n\n在代码清单8-4中，我们看到了来自`TouchEventsController`类的`doSetup`任务。当这个`UIViewController`实例的视图被加载时，该任务被调用。在设置了游戏区域大小并将`Spark`类标记为排序角色类之后，我们创建了两个`UITapGestureRecognizer`实例。第一个`UITapGestureRecognizer`实例名为`doubleTapTwoTouch`，配置为响应双指双击。第二个`UITapGestureRecognizer`名为`doubleTapOneTouch`，配置为响应单指双击。这两个`UITapGestureRecognizer`都通过`addGestureRecognizer:`任务添加到`actorsView`中。\n\
    \n查看用于创建这些手势识别器的构造函数，我们看到一个引用`doubleTap:`任务的选择器。每当这两个任务之一识别出一个手势时，就会调用此任务。我们本可以让每个手势识别器调用不同的任务，这在更复杂的应用中可能是可取的。在本例中，在`doubleTap:`任务中区分这两个手势识别器很容易，如代码清单8-5所示。\n\
    \n**代码清单8-5.** *TouchEventsController.m (doubleTap:)*\n\n```\n-(void)doubleTap:(UITapGestureRecognizer*)doubleTap{\n\
    \    float scale;\n    if ([doubleTap numberOfTouches] == 1){\n        scale =\
    \ 2.0;\n    } else {\n        scale = 0.5;\n    }\n    NSLog(@\"Touches: %i\"\
    , [doubleTap numberOfTouches]);\n    for (Spark* spark in [self actorsOfType:[Spark\
    \ class]]){\n        float radius = [spark radius]*scale;\n        if (radius\
    \ < 2){\n            radius = 2;\n        } else if (radius > 128){\n        \
    \    radius = 128;\n        }\n        [spark setRadius:radius];\n    }\n}\n```\n\
    \n在代码清单8-5中，我们检查触发此任务的`UITapGestureRecognizer doubleTap`是否配置为单指触摸。根据检查结果，我们将`scale`的值设置为`2.0`或`0.5`。这样，单指双击将增大`Spark`对象的比例，而双指双击将减小`Spark`对象的尺寸。一旦我们得到了`scale`的正确值，只需遍历场景中的所有`Spark`对象，并根据`scale`调整它们的半径。\n\
    \n我们已经研究了触摸事件，以理解触摸事件的生命周期。我们还快速浏览了`UITapGestureRecognizer`类。下一节将更详细地讨论`UITapGestureRecognizer`。\n\
    \n**理解手势识别器**\n\niOS允许用户通过丰富的手势集与应用程序交互。这些手势包括轻点、轻扫、捏合等。每种手势都包含一些相当复杂的逻辑，用于将触摸事件解释为连贯的手势。如果这留给每个开发者去实现，用户体验将会很差，因为每个开发者不可避免地会对每个手势做出不同的假设。例如，长按手势有一个默认持续时间。我们希望在所有应用程序中保持一致，因为我们不想为每个应用程序“重新训练”每个用户什么是长按。本着这种精神，苹果提供了许多类，用于识别开发者最可能需要的常见手势。\n\
    \n每个手势识别器都继承自抽象基类`UIGestureRecognizer`，如代码清单8-6所示。\n\n**代码清单8-6.** *`UIGestureRecognizer`的具体实现*\n\
    \n```\nUITapGestureRecognizer\nUIPinchGestureRecognizer\nUIRotateGestureRecognizer\n\
    UISwipeGestureRecognizer\nUIPanGestureRecognizer\nUILongPressGestureRecognizer\n\
    ```\n\n在代码清单8-6中，我们看到了iOS 5内置的`UIGestureRecognizer`的每个子类。轻点可能是iOS中最常见的手势，无需描述。捏合手势是两根手指相互靠近或远离。旋转手势是两根手指在屏幕上移动，就像打开一瓶番茄酱。\n\
    \n轻扫手势是一根或多根手指在屏幕上快速拂过，就像翻阅杂志的一页。平移手势类似于轻扫，但更慢、更有意。长按手势很像轻点，但手指在屏幕上停留时间更长。\n\n\
    这些类中的每一个都为开发者提供了一种简单的方法，以请求在特定`UIView`上发生任何手势时调用一个任务。除了调用任务之外，每个手势都会随时间发生，并且在回调任务被调用时，它会处于几种状态之一。这些状态如代码清单8-7所示。\n\
    \n**代码清单8-7.** *枚举`UIGestureRecognizerState`的值*\n\n```\nUIGestureRecognizerStatePossible\n\
    UIGestureRecognizerStateBegan\nUIGestureRecognizerStateChanged\nUIGestureRecognizerStateEnded\n\
    UIGestureRecognizerStateCancelled\nUIGestureRecognizerStateFailed\nUIGestureRecognizerStateRecognized\
    \ = UIGestureRecognizerStateEnded\n```\n\n在代码清单8-7中，我们看到了手势识别器可能处于的七种状态，它们类似于触摸事件调用的四个任务（参见代码清单8-1）。默认状态是`UIGestureRecognizerStatePossible`，如果没有触摸事件发生，所有`UIGestureRecognizer`实例都将处于此状态。"
  raw: 'The touchesCancelled:withEvent: task can be called when switching applications
    or having a dialog popup. Another perhaps more common way for touch events to
    be cancelled is if a gesture recognizer is triggered. A gesture recognizer, as
    defined by the class UIGestureRecognizer, is an object that inspects the touch
    events on a UIView and responds when the touches can be considered a specific
    gesture, like a tap, pinch, or swipe.


    To experiment with the touchesCancelled:withEvent: tasks, do a two-finger double
    tap.


    Notice that after the first tap, there are two Sparks where you fingers touched.
    After the second tap, the Spark objects that where added get removed. This is
    because touchesCancelled:withEvent: was called when the two-figure double-tap
    gesture recognizer was activated by the touch events.


    The fact that gesture recognizers are able to cancel touch events allows developers
    to mix and match any number of gestures together on a UIView without worrying
    about the gestures conflicting. In addition to canceling the touch events, gestures
    can also cancel each other. For example, a pinch gesture and a two-finger drag
    gesture both start the same way, with two fingers landing on the screen at about
    the same time. These two gestures could easily conflict if there was no mechanism
    in place to cancel each other.


    Let’s move on a see how these touch events apply to the game related classes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00423.png)


    **186**


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **Applying
    Touch Events to Actors**


    Let’s take a quick look at the class TouchEventsController and see how we set
    up the demo to respond to tap gestures. The important part of TouchEventsController.m
    is shown in Listing 8–4.


    **Listing 8–4.** *TouchEventsController.m (doSetup)*


    -(BOOL)doSetup{


    if ([super doSetup]){


    [self setGameAreaSize:CGSizeMake(320, 480)];


    [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark class]]]; UITapGestureRecognizer*
    doubleTapTwoTouch = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(doubleTap:)];


    [doubleTapTwoTouch setNumberOfTapsRequired:2];


    [doubleTapTwoTouch setNumberOfTouchesRequired:2];


    UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(doubleTap:)];


    [doubleTapOneTouch setNumberOfTapsRequired:2];


    [doubleTapOneTouch setNumberOfTouchesRequired:1];


    [actorsView addGestureRecognizer:doubleTapOneTouch];


    [actorsView addGestureRecognizer:doubleTapTwoTouch];


    return YES;


    }


    return NO;


    }


    In Listing 8–4, we see the task doSetup, from the class TouchEventsController.
    This task is called when this UIViewController instance’s view is loaded. After
    setting up the game area size and marking the class Spark as a sorted actor class,
    we create two instances of UITapGestureRecognizer. The first instance of UITapGestureRecognizer
    is called doubleTapTwoTouch and is configured to respond when two fingers do a
    double tap. The second UITapGestureRecognizer is called doubleTapOneTouch and
    is configured for a single-finger double tap. Both of these UITapGestureRecognizer
    are added to actorsView with the task addGestureRecognizer:.


    Looking at the constructor used to create these gesture recognizers, we see a
    selector referencing the task doubleTap:. This task is called whenever one of
    these two tasks recognizes a gesture. We could have had each gesture recognizer
    call different tasks, and that may be desirable in a more complex application.
    In this example, it is easy enough to distinguish these two gesture recognizers
    in the doubleTap: tasks, as shown in Listing 8–5.


    **Listing 8–5.** *TouchEventsController.m (doubleTap:)*


    -(void)doubleTap:(UITapGestureRecognizer*)doubleTap{


    float scale;


    if ([doubleTap numberOfTouches] == 1){


