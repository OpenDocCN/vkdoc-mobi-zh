    **CHAPTER 10: Monetizing via the Apple App Store**


    **In-App Purchase Implementation**


    As we discussed, the process of making a purchase is really just two calls to
    the iTunes Store. We will see in this section that it really only involves a handful
    of classes. In our example, we will be handling most of the details of working
    with StoreKit and handling the UI in a single class called ExtrasController, whose
    header is shown in Listing 10–1.


    **Listing 10–1.** *ExtrasController.h*


    @interface ExtrasController : UIViewController<SKPaymentTransactionObserver, SKProductsRequestDelegate>{


    GameParameters* gameParams;


    }


    @property (strong, nonatomic) IBOutlet UIButton *asteroidButton;


    @property (strong, nonatomic) IBOutlet UIButton *saucerButton;


    @property (strong, nonatomic) IBOutlet UIButton *powerupButton;


    -(void)setGameParams:(GameParameters*)params;


    @end


    In Listing 10–1, we see the header for the class ExtrasController. The class ExtrasController
    plays two roles: it manages the purchasing process and updates the three buttons
    accordingly. The object gameParams is responsible for storing which actors are
    enabled in the game and which purchases have been made. In order to interact with
    StoreKit, ExtrasController conforms to the protocols SKPaymentTransactionObserver
    and SKProductsRequestDelegate. These protocols provide everything you need for
    your application to respond to interactions with the store. We will see how ExtrasController
    implements the tasks from these two protocols as we work through the code.


    The first step when working StoreKit is to set up an object that responds to changes
    in the state of purchases. We create an object that responds to changes in purchases
    by adding an observer to the default SKPaymentQueue, as shown in Listing 10–2.


    **Listing 10–2.** *ExtrasController.m (viewDidLoad)*


    #define PURCHASE_INGAME_SAUCERS @"com.beltcommander.ingame.saucers"


    #define PURCHASE_INGAME_POWERUPS @"com.beltcommander.ingame.powerups"


    //….


    - (void)viewDidLoad


    {


    [super viewDidLoad];


    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];


    //Get set of product ids


    NSSet* potentialProcucts = [NSSet setWithObjects:PURCHASE_INGAME_POWERUPS, PURCHASE_INGAME_SAUCERS,
    nil];'
