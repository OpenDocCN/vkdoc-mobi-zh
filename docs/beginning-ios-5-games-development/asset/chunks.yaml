    the new location of each actor’s `UIImageView`. This is done in the `updateActorView:`
    task, as shown in Listing 5–17.


    **Listing 5–17.** *Example02Controller.m (updateActorView:)*


    ```

    -(void)updateActorView:(Actor02*)actor{


    UIImageView* imageView = [actorViews objectForKey:[actor actorId]]; if (imageView
    == nil){


    UIImageView* imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:[actor
    imageName]]];


    [actorViews setObject:imageView forKey:[actor actorId]];


    [imageView setFrame:CGRectMake(0, 0, 0, 0)];


    [actorView addSubview:imageView];


    }


    float xFactor = actorView.frame.size.width/self.gameAreaSize.width;


    float yFactor = actorView.frame.size.height/self.gameAreaSize.height; float x
    = (actor.center.x-actor.radius)*xFactor;


    float y = (actor.center.y-actor.radius)*yFactor;


    float width = actor.radius*xFactor*2;


    float height = actor.radius*yFactor*2;


    CGRect frame = CGRectMake(x, y, width, height);


    [imageView setFrame:frame];


    }

    ```


    In Listing 5–17, the first thing we do is find which `UIImageView` is representing
    the actor that was passed in. We find it by looking up the `UIImageView` in the
    `NSMutableArray actorViews`, using the actor’s `actorId` as the key. If we don’t
    find a `UIImageView`, then this actor must have just been added, so we have to
    create it.


    Creating the `UIImageView` is as simple as creating a `UIImage` based on the `imageName`
    of the actor and creating a new `UIImageView` with it. We then put the `UIImageView`
    into the `NSMutableDictionary actorViews`, again using the actor’s ID as the key.
    Lastly, we add the new `UIImageView` to `actorView`. We set the frame of the new
    `UIImageView` to a size zero frame to prevent some redraw issues. The frame will
    be updated shortly anyway.


    **Placing UIImageView in the Screen**


    After creating the `UIImageView` (if required) we have to figure out where on
    the screen it should be drawn. The first step is to figure out the relationship
    between the size of the game area and the actual size of `actorView` on the screen.
    We can simply divide width of the `actorView` by the width of the game area to
    establish our `xFactor`. We do the same operation with the heights to figure out
    our `yFactor`. Once we have these ratios we can calculate the frame of the `UIImageView`.
    Once the four values that make up the new frame of the `UIImageView` we set it.
    Figure 5–10 illustrates how these values are calculated.


    In Figure 5–10, on the left we see the game area and on the right is the `CGRect`
    that describes the `actorView`’s frame. The circle on the left is an `Actor02`
    that needs to be converted into `CGRect` on `actorView`. We start by figuring
    out the origin of the GCFrame by first finding the upper-left point of the `Actor02`.
    We find the X value of the upper-left point by subtracting the radius of the `Actor02`
    from the `Actor02`’s center X value. To find the Y value, we subtract the radius
    from the `Actor02`’s center Y values. To convert these points into the coordinate
    space of `actorView`, we simply multiple by the X value of the upper left point
    by `xFactor` and multiple the Y value by `yFactor`. The values `xFactor` and `yFactor`
    are the ratios between the `gameAreaSize`s width and height and the `actorView`’s
    frame’s width and height. To find the size of `actorView`’s frame, we simply multiply
    the radius by `xFactor` and `yFactor` to find the width and height.


    **Figure 5–10.** *Converting game coordinates into screen coordinates*


    When the user touches the `UIView actorView`, we have to do this process in reverse:
    convert the point on the `actorView` to a point with our game space. This conversion
    happens in the task `tapGesture:`, as shown in Listing 5–18.


    **Listing 5–18.** *Example02Controller.h (tapGuesture:)*


    ```

    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{


    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;
    CGPoint pointOnView = [tapRecognizer locationInView:actorView];


    float xFactor = actorView.frame.size.width/self.gameAreaSize.width; float yFactor
    = actorView.frame.size.height/self.gameAreaSize.height; CGPoint pointInGame =
    CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);


    [viper setMoveToPoint:pointInGame];


    }

    ```


    In Listing 5–18, we find where the user touched by calling `locationInView:` on
    `tapRecognizer` and passing in `actorView` and storing the result in `pointOnView`.
    After recalculating `xFactor` and `yFactor` values, we simply divide `pointOnView`’s
    X and Y values by `xFactor` and `yFactor`, giving us `pointInGame`. Using this
    value we simply, set the `moveToPoint` property of `viper` with `pointInGame`.


    To wrap up this example, let’s take a look at the code that changes the size of
    `actorView`, as shown in Listing 5–19.


    **Listing 5–19.** *Example02Controller.m (sliderValueChanged:)*


    ```

    - (IBAction)sliderValueChanged:(id)sender {


    UISlider* slider = (UISlider*)sender;


    float newWidth = [slider value];


    float newHeight = gameAreaSize.height/gameAreaSize.width*newWidth; CGRect parentFrame
    = [[actorView superview] frame];


    float newX = (parentFrame.size.width-newWidth)/2.0;


    float newY = (parentFrame.size.height-newHeight)/2.0;


    CGRect newFrame = CGRectMake(newX, newY, newWidth, newHeight);


    [actorView setFrame:newFrame];


    }

    ```


    The task `sliderValueChanged:` in Listing 5–19 is called when the user adjust
    the slider at the bottom of the screen. The slider is configured to have a value
    between 80 and 320, which we use as the value as `newWidth`. We calculate the
    `newHeight` based on the `newWidth`, preserving our aspect ratio. Once we have
    the new width and height for `actorView`, we find the X and Y values that will
    keep `actorView` centered. Once we have all of the value values for the `actorView`’s
    new frame, we simply set it.


    ## Actor State and Animations


