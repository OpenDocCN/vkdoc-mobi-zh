    We find all matching rows and columns by calling findMatchingRows and findMatchinCols
    on coinsGame. After we have these arrays of matches, we want to animate all of
    the coins involved in a match of the screen. If there are matchingRows, we create
    a new CABasicAnimation for each coin that modifies the position value of x of
    the underlying CALayer object. Instead of setting the exact starting and ending
    values of x, we can simply specify the byValue, which we make the width of the
    coinsView. By specifying the byValue, we can use this animation for all coins
    in the row, because this animation will simply infer that the fromValue is the
    starting x value for each coin view, and the toValue with be fromValue + byValue.


    After the animations for matching rows and columns are created, we check to see
    how many matches in total were created on this turn. If this value is bigger than
    zero, we update the score of the coinsGame object and inform the delegate that
    the score has changed. If no matches are found, we check whether the game is over.
    If it is over, we use the NSTimer class to call doEndGame in 1 second. This delay
    is for aesthetic reasons; it is nice to have a little pause before the high scores
    are shown. If it is not the end of the game, we simply start accepting input again.
    Listing 4–28 shows the task doEndGame, which simply informs the delegate that
    the game is over.


    **Listing 4–28.** *CoinsController.m (doEndGame)*


    -(void)doEndGame{


    [delegate gameOver:self with: coinsGame];


    }


    The animations created earlier in Listing 4–27 will call the task


    animationDidStop:finished: when they are done, in the same way the scaling animations
    did. We use this callback to randomize the matches and call updateCoinViews, shown
    in Listing 4–29.


    **Listing 4–29.** *CoinsController.m (updateCoinViews)*


    -(void)updateCoinViews{


    int rowCount = [coinsGame rowCount];


    int colCount = [coinsGame colCount];


    for (NSNumber* row in matchingRows){


    for (int c=0;c<colCount;c++){


    Coord coord = CoordMake([row intValue], c);


    [self spinCoinAt:coord];


    }


    }


    for (NSNumber* col in matchingCols){


    for (int r=0;r<rowCount;r++){


    Coord coord = CoordMake(r, [col intValue]);


    [self spinCoinAt:coord];


    }


    }


    [self checkMatches];


    }


    The task updateCoinView is called when the UIImageViews that represent the coins
    are fully offscreen. This task goes though each set of rows and columns from that
    previously matched and sets the coins spinning again in their original locations,
    but with images


