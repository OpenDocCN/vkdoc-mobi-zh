    to reflect the user’s action. The animation created by this user action can be
    simple, such as highlighting a selection, or complex, like an entire physics simulation.
    After the animation is completed, the application tests to see whether the end
    of the game has been reached. If it has not, the application once again waits
    for user input.


    In this chapter, you will explore how to create a game that follows the process
    outlined in Figure 4–1\. You will also look at the details of getting content
    onto the screen and creating animations.


    **Exploring How to Get Content on the Screen**


    In the preceding chapter, we assembled views to create a complete application.
    We used Interface Builder to create UI elements, and for the most part, simply
    replaced one view with another to move the user from view to view. In this chapter,
    we are going to take a closer look at the UIView and how it can be used to programmatically
    create dynamic content. This includes an exploration of how to place components
    on the screen as well as animate them.


    **Understanding UIView**


    The class UIView is the base component class of UIKit. All other UI elements,
    such as buttons, switches, and scroll views, to name a few, are subclasses of
    UIView. Even the class UIWindow is a subclass of UIView, so when we manipulate
    content on the screen, a lot of what we will be doing is interacting with the
    UIView class.


    The UIView class works a lot like the base UI component class in other programming
    environments. Each UIView defines a region of the screen and has a number of children,
    or subviews, which are drawn relative to their parent. Figure 4–2 shows an example
    layout of UIView instances.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00402.png)


    ![](images/00461.png)


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **67**


    **Figure 4–2.** *Nested UIView instances*


    In Figure 4–2, you can see in the back the root UIWindow for our sample application.


    When the user is seeing the game view, the UIWindow has a single subview, which
    is the view property associated with the GameController class. The GameController
    places the Portrait Play view as a subview of its view when the user clicks the
    New Game button.


    The Portrait Play view has five subviews, as defined in the XIB file. Four of
    these subviews are UILabels for displaying and tracking the user’s score and remaining
    turns.


    The fifth UIView is the Portrait Game Holder view, which is responsible for defining
    the region where the view from the CoinsController is placed. The view from the
    CoinsController has several subviews, which make up the interactive part of the
    game.


    You will be looking at those views in more detail later, but for now, understand
    that those views are added to the scene in exactly the same way as the rest of
    the views.


    Another thing to notice about Figure 4–2 is that not all of the views are placed
    in the same position relative to their parent. For example, the Portrait Play
    view is placed at the upper left of the GameController view, while the Portrait
    Game Holder view is placed about halfway down its parent, the Portrait Play view.
    The property frame of the subview dictates where it is placed relative to its
    parent. Figure 4–3 shows this in more detail.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00462.png)


    ![](images/00184.png)


    **68**


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **Figure 4–3.** *The frame of a UIView*


    As shown in Figure 4–3, the frame of a UIView describes not only the location
    of a subview, but also the size of the view. Generally speaking, the frame is
    said to describe the region of a subview. The property frame is a struct of type
    CGRect and is composed of two other structs, origin and size. The field origin
    is of type CGPoint and describes the location of the upper-left corner of the
    subview in terms of points. The field size is of type CGSize and describes the
    number of points the subview is wide and high.


