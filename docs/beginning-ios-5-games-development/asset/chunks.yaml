    After creating the UIImageView (if required) we have to figure out where on the
    screen it should be drawn. The first step is to figure out the relationship between
    the size of the game area and the actual size of actorView on the screen. We can
    simply divide width of the actorView by the width of the game area to establish
    our xFactor. We do the same operation with the heights to figure out our yFactor.
    Once we have these ratios we can calculate the frame of the UIImageView. Once
    the four values that make up the new frame of the UIImageView we set it. Figure
    5–10 illustrates how these values are calculated.


    In Figure 5–10, on the left we see the game area and on the right is the CGRect
    that describes the actorView’s frame. The circle on the left is an Actor02 that
    needs to be converted into CGRect on actorView. We start by figuring out the origin
    of the GCFrame by first finding the upper-left point of the Actor02\. We find
    the X value of the upper-left point by subtracting the radius of the Actor02 from
    the Actor02’s center X value. To find the Y value, we subtract the radius from
    the Actor02’s center Y values. To convert these points into the coordinate space
    of actorView, we simply multiple by the X value of the upper left point by xFactor
    and multiple the Y value by yFactor. The values xFactor and yFactor are the ratios
    between the gameAreaSizes width and height and the actorView’s frame’s width and
    height. To find the size of actorView’s frame, we simply multiply the radius by
    xFactor and yFactor to find the width and height.


