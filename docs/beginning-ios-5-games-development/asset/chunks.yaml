    ## A Project’s File Structure


    After saving a new project, Xcode will create a single new folder within the folder
    you select. This folder will contain the project. You can move this folder later
    if you want without affecting the project. Figure 1–4 shows the files created
    by Xcode.


    **Figure 1–4.** *Files created by Xcode*


    In Figure 1–4, we see a Finder window showing the file structure created. I selected
    that I wanted the project saved on my desktop, so Xcode created a root folder
    name `Sample 1` that contains the `Sample 1.xcodeproj` file. The `xcodeproj` file
    is the file that describes the project to Xcode, and all resources are by default
    relative to that file. Once you have saved your project, Xcode will open your
    new project automatically. Then you can start customizing it as you like.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00061.png)


    ![](images/00431.jpeg)


    **CHAPTER 1: A Simple First Game**


