    \n![](images/00028.png)\n\n**CHAPTER 7: Build Your Game: Vector Actors and Particles**\n\
    \n**167**\n\n在`Listing 7–13`中，我们看到在屏幕上绘制每个子弹的代码。这段代码根据`Bullet`的伤害值绘制一个带有渐变的圆形。在我看来，完成这么简单的事情需要这么多代码。让我们逐段分析。任务的第一行根据提供的矩形为图形上下文创建一个椭圆形裁剪区域。\n\
    \n这意味着后续的绘图操作将仅在此椭圆形区域内可见。\n\n下一步是创建绘图操作所需的渐变。渐变由两个主要部分组成。第一部分是一个数组，指定渐变中每种颜色应应用的位置。在我们的例子中，我们只使用双色渐变，所以我们创建了一个名为`locations`的数组，将第一个值设为0，第二个值设为1。这意味着颜色应从渐变起点到终点均匀混合。\n\
