    ### Tap Gestures


    点击手势在 iOS 中广泛使用。从启动应用程序到在地图应用中放置图钉，点击手势是 iOS 界面的核心。这很合理，因为它们与桌面操作系统中的鼠标点击非常相似。


    点击手势与鼠标点击有相似之处；例如，在 OS X 中从系统 Dock 启动应用程序只需单击一次，而在 iOS 中启动应用程序则只需轻点一次。如果考虑 OS
    X 上的“辅助点击”（也称为控制点击或右键点击），这种类比仍然成立；这类似于 iOS 中的双指轻点。事实上，如果你使用 Mac 笔记本电脑，触控板可以配置为将双指轻点视为“辅助点击”。


    在本例中，我们将配置一组`UITapGestureRecognizer`来响应不同的点击次数和手指数量（触摸点）组合。图 8–2 展示了此示例的实际效果。


