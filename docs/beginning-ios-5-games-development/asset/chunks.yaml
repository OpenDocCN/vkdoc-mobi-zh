    ***Figure 8.** User input example list with one example*


    On the left of Figure 8 we see eight buttons, each labeled with a type of user
    input. In Chapter 8, we will systematically go through each input type and build
    an example that shows how it works.


    On the right side of Figure 8, we see the example for Touch Events. We use the
    classes we defined in Chapters 6 and 7 to build each example, so we understand
    not just the gestures in general, but how they relate to working with our game
    classes.


    ## Chapter 9


    The great thing about building games these days is that a network connection is
    ubiquitous. This network connection allows our game to reach outside of the device
    it is running on and use the vast resources of the Internet. For games, this means
    social networking. In Chapter 9, we learn about Apple''s Game Center and related
    `GameKit` library. We also look at Twitter and Facebook.


    Figure 9 shows an example of using these services.


    xix


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00275.jpeg)


    ■ INTRODUCTION


    ***Figure 9.** In-game social media*


    In Figure 9, we see on the left the Achievement view from Game Center for our
    example app, Belt Commander. On the right we see a tweet with default text. (Facebook
    is not shown.) The code that enables these services is implemented in project
    for our sample game Belt Commander. In this way, we learn about these services
    with the context of applying them to a real game.


    In addition to implementing the code required to enable these services, we look
    at how each of these services must be enabled outside of our game code. For example,
    to use Game Center features in your application, you have to enable that service
    in iTunes Connect. We also look at what is required outside of the code to get
    Facebook and Twitter working.


    ## Chapter 10


    The last chapter in this book is dedicated to monetizing your game. We look at
    the details of including in-app purchases in your application. We walk through
    the details of setting up in-app purchases in iTunes Connect as well as the code
    within the app. Ideally, we want the user to be able to easily reach the dialog
    shown in Figure 10.


