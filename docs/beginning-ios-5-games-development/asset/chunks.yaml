    In Listing 8–35, we do the usual setup, specifying the game size area and adding
    the viper that we will be moving around with accelerometer data. To start receiving
    accelerometer data, we have to get access to the singleton UIAccelerometer associated
    with the running application. To do this, we use the static task sharedAccelermoter
