    ****Chapter**


    **Game Center and Social**


    **Media**


    One of the key ways to market your game these days is to integrate your application
    with one or more social media services. The idea is that users will promote your
    game as they play and share their experience with their friends. To get users
    to play your game more often, it is also very common to provide a mechanism for
    users to compare their scores with other players. Providing a way for users to
    track their scores against others and to post their progress is so common in game
    development that Apple provides libraries to support these requirements.


    The primary service provided by Apple is called Game Center, which is implemented
    in the library called GameKit. Game Center is a service that allows users to compare
    their scores with other players on what is called a leaderboard. Game Center also
    allows users to reach what are called achievements. Achievements are defined by
    each game and are intended as incentives to keep people playing. For example,
    if you have an achievement that is hard to achieve, people will want to earn it
    to set them apart from their friends playing the same game. Game Center also provides
    a mechanism for multiplayer games, but we will focus more on the social aspects
    of its services in this chapter.


    To broadcast a player’s progress in a game, it is common to use an existing social
    media site such as Twitter or Facebook, so the user’s friends will be notified.
    A new feature in iOS 5 is the inclusion of a built-in Twitter account. In this
    chapter, we will look at how to use the classes that expose a Twitter account
    to send a tweet on behalf of the user. Although Facebook is not built into iOS
    5, there is an excellent library provided by Facebook to facilitate an experience
    almost as integrated as that of Twitter. We will look at how to use Facebook on
    iOS to facilitate user authenticating as well as posting on his wall.'
