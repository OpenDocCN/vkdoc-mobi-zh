    sinf(directionOffScreen)*distanceFromCenter);


    return [Asteroid asteroidOfLevel:4 At:center];


    }


    In Listing 7–17, we see the task asteroid:, which creates a new Asteroid of size
    4 by calling the other constructor. Most of the work being done is simply finding
    the starting point for the Asteroid off screen. This is identical to the code
    used to find a point for the Powerup actor in Chapter 6\. The details can be found
    in Figure 6-3\. The second constructor for Asteroid is shown in Listing 7–18.


    **Listing 7–18.** *Asteroid.m (asteroidOfLevel:At:)*


