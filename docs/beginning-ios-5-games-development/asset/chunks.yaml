    ![](images/00381.png)


    **118**


    **CHAPTER 5: Quickly Build a Frame-by-Frame Game**


    **Figure 5–10.** *Converting game coordinates into screen coordinates* When the
    user touches the UIView actorView, we have to do this process in reverse: convert
    the point on the actorView to a point with our game space. This conversion happens
    in the task tapGesture:, as shown in Listing 5–18.


    **Listing 5–18.** *Example02Controller.h (tapGuesture:)*


    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{


    UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;
    CGPoint pointOnView = [tapRecognizer locationInView:actorView];


    float xFactor = actorView.frame.size.width/self.gameAreaSize.width; float yFactor
    = actorView.frame.size.height/self.gameAreaSize.height; CGPoint pointInGame =
    CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);


    [viper setMoveToPoint:pointInGame];


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00408.png)


    **CHAPTER 5: Quickly Build a Frame-by-Frame Game**


    **119**


    In Listing 5–18, we find where the user touched by calling locationInView: on
    tapRecognizer and passing in actorView and storing the result in pointOnView.
    After recalculating xFactor and yFactor values, we simply divide pointOnView’s
    X and Y


    values by xFactor and yFactor, giving us pointInGame. Using this value we simply,
    set the moveToPoint property of viper with pointInGame.


    To wrap up this example, let’s take a look at the code that changes the size of
    actorView, as shown in Listing 5–19.


    **Listing 5–19.** *Example02Controller.m (sliderValueChanged:)*


    - (IBAction)sliderValueChanged:(id)sender {


    UISlider* slider = (UISlider*)sender;


    float newWidth = [slider value];


    float newHeight = gameAreaSize.height/gameAreaSize.width*newWidth; CGRect parentFrame
    = [[actorView superview] frame];


    float newX = (parentFrame.size.width-newWidth)/2.0;


    float newY = (parentFrame.size.height-newHeight)/2.0;


    CGRect newFrame = CGRectMake(newX, newY, newWidth, newHeight);


    [actorView setFrame:newFrame];


    }


    The task sliderValueChanged: in Listing 5–19 is called when the user adjust the
    slider at the bottom of the screen. The slider is configured to have a value between
    80 and 320, which we use as the value as newWidth. We calculate the newHeight
    based on the newWidth, preserving our aspect ratio. Once we have the new width
    and height for actorView, we find the X and Y values that will keep actorView
    centered. Once we have all of the value values for the actorView’s new frame,
    we simply set it.


