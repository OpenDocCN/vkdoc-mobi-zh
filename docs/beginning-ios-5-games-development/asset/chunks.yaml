- fmt: '# Extending UIView to Receive Touch Events


    I think the last technique is the most robust in most cases, because it provides
    a way for users to interact with your application using a set of known gestures.
    However, there are perfectly good reasons to use the second technique, implementing
    the touch related tasks, especially if the user interaction you are shooting for
    is not a gesture per se. An example might be a drawing application, where you
    simply want access to all points of contact on the screen to do your drawing.


    The following section will review the touch-related tasks of `UIView`. We will
    then move on and explore `UIGestureRecognizer` classes and motion events.


    The sample code that accompanies this chapter is found in the project Sample 08.
    While most of the code in this book can be run on either a device or the emulator,
    I highly recommend running this code on an iPhone (or iPod touch)—if possible,
    iOS 4.2 or later—because the complex gestures are hard to simulate on the emulator.
    To really get a feel for the user experience, it is best it perform the actual
    gestures with your hand and see how each one feels.


    `UIView` has four tasks that get called when a user touches it on the screen.
    I am collectively calling these the touch-related tasks. They are shown in Listing
    8–1.


    **Listing 8–1.** *The four touch related tasks*

    ```

    -(void)touchesBegan:withEvent:


    -(void)touchesCancelled:withEvent:


    -(void)touchesEnded:withEvent:


    -(void)touchesMoved:withEvent:

    ```


    The first argument of each of these tasks is an `NSSet` that contains a `UITouch`
    for each discrete touch on the screen. The second argument is a `UIEvent` that
    is basically a generic wrapper for the three different input types available on
    iOS: touch events, motion events, and remote-control events. We won''t be covering
    remote-control events; those are events generated by accessories, like an external
    keyboard.


    The task `touchesBegan:withEvent:` is called as soon as a finger (or fingers)
    touch the screen. The task `touchesEnded:withEvent:` is called when the fingers
    are removed. If the fingers slide around, the `touchesMoved:withEvent:` would
    be called. The task `touchesCancelled:withEvent:` is call if the system has to
    take control of the screen. For example, if another application is launched, the
    `touchesCancelled:withEvent:` is called on the first application before control
    is passed to the new app. The sample code provides an example of using these tasks,
    as shown in Figure 8–1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00185.png)


    ![](images/00245.jpeg)


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **183**


    **Figure 8–1.** *Touch events*


    In Figure 8–1, we see a several lines comprised of dots. Each one of these lines
    is the result of a finger being dragged across the screen. The top-most line was
    created when a single figure was moved across the screen—it is drawn with red
    dots. The second top-most line was created by dragging two fingers across the
    screen, as was the one below it, and both are drawn with green dots. The bottom
    three lines were drawn with three fingers and is made of blue dots. If you can
    see Figure 8–1 in color (if you have the ebook), take a look at the left-most
    dots on the bottom line. Notice that one is red and the other is green. This is
    because I did not get all three of my fingers to land on the screen at the same
    time.


    In this first example, besides drawing dots with your finger, you can scale the
    dots up or down by tapping with a single finger or two fingers respectively. The
    scaling feature demonstrates how touch events and gestures can work together.
    We will explore this in more detail once we understand the basics of the touch
    events.


    # Looking At the Event Code


    The implementation of this simple demonstration shows how we receive the touch
    events and create actors out of each touch on the screen. There are two classes
    involved: `TouchEventsController` that extends `GameController` and `TouchEventsView`
    that extends `UIView`. Let''s start by looking the class `TouchEventsView`. The
    header is shown in Listing 8–2.


    **Listing 8–2.** *TouchEventsView.h*

    ```

    @interface TouchEventsView : UIView{


    IBOutlet TouchEventsController* controller;


    NSMutableArray* sparks;


    }


    @end

    ```


    In Listing 8–2, we see an `IBOutlet` so we can wire the `TouchEventsView` up to
    a `TouchEventsController`. We also see an `NSMutableArray` called `sparks`. This
    collection is used to keep track of sparks as they are being added; as mentioned,
    the touch event can be cancelled. By keeping track of the sparks that we add,
    we can clean up any sparks that are added before `touchCancelled:withEvent:` is
    called. Let''s take a look at the implementation of the class `TouchEventsView`,
    as shown on Listing 8–3.


    **Listing 8–3.** *TouchEventsView.m*

    ```

    @implementation TouchEventsView


    - (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Begin: %i", [touches count]);


    sparks = [NSMutableArray new];


    }


    - (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Cancelled: %i", [touches count]);


    for (Spark* spark in sparks){


    [controller removeActor:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Ended: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Moved: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    }


    @end

    ```


    In Listing 8–3, we see the four tasks discussed earlier. The class `UIResponder`
    defines each task, which is the super class of `UIView`. These methods are called
    as the user interacts with the screen. By implementing them, we can add our custom
    behavior. The task `touchesBegan:withEvent:` is called when a finger touches the
    screen. When this happens, we create a new `NSMutableArray` to keep track of all
    of the sparks we are going to add. Any of the other three tasks could be called
    next. If the user moves his or her finger, or places another new finger on the
    screen, the task `touchesMoved:withEvent:` is called. In this task, we create
    and a new `Spark` for each touch. We use the number of touches, minus 1, to specify
    the variant or color of the `Spark`, which is then added the scene. The spark
    is just a simple particle-like class that removes itself after five seconds.


    There are two ways that a touch event can end. The first way is when `touchesEnded:withEvent:`
    is called after the user has removed all of his fingers. In this case, we do the
    same thing we did in `touchesMoved:withEvent:`: we create a `Spark` for each touch.
    We also clear the `NSMutableArray` sparks, to remove reference to the spark objects.


    The other way a touch event can end is by it being cancelled. An event is cancelled
    when something else in the system happens that makes completing the event inappropriate.
    When this tasks is called, we removed all of the `Spark` objects we have created
    since `touchesBegan:withEvent:` was last called, undoing the work we have done
    up until this point.'
