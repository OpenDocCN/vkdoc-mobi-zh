- fmt: '## **Figure A–14.** *Coin in three different sizes*


    In Figure A–14, we see three different versions of the file `coin_circle0029`.
    By providing these different resolutions, we have insured that our images get
    rendered at a 1:1 ratio for the number of pixels in the image versus the number
    of pixels on the screen. This assures we are doing our part to render these images
    as best we can. Next, let’s take a look at some of the tools used to create graphical
    assets.


    ## **Tools**


    The following is short description of three open source graphics tools that can
    be used to create compelling graphical assets. These are the tools I have used
    to create the majority of the art files for this book. Not only are these tools
    open source, they run on Windows, OS X, Linux, and probably other platforms as
    well.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00152.png)


    ![](images/00190.jpeg)


    **APPENDIX A: Designing and Creating Graphics**


    **301**


    ## **GIMP**


    The GNU Image Manipulation Program (or GIMP) is an open source image editing application.
    It provides Adobe Photoshop-like functionality with the low, low price of free.
    During game development, it is necessary to have an image manipulation program
    for many tasks. Figure A–15 shows an example of the GIMP.


    **Figure A–15.** *Adjusting the color of a spaceship in GIMP*


    In Figure A–15, we see our spaceship from previous chapters open in GIMP. GIMP
    allows you to adjust the color of an image to make variations of it. In Figure
    A–15, we started with a ship that had blue highlights and have converted them
    to green, perhaps for a multiplayer scenario.


    With GIMP (www.gimp.org) you can:


    - View images

    - Crop images

    - Resize image

    - Adjustment color


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00243.png)


    ![](images/00262.jpeg)


    **302**


    **APPENDIX A: Designing and Creating Graphics**


    - Combine images

    - Fine-tune images

    - Perform the other thousand image related tasks in game development


    ## **Blender 3D**


    Blender 3D is a 3D modeling tool designed for creating 3D animations and assisting
    in 3D game development. For 2D game development, Blender provides a great way
    to create art assets that are very consistent. I personally can’t draw very well,
    but I have been able to learn how to “draw” objects in Blender and let it do the
    hard work of applying lighting, shading, reflections, and the other cool effects
    you get from a ray traced imaged. Figure A–16 shows Blenders interface.


    **Figure A–16.** *Blender 3D*


    In Figure A–16, we see the UI for Blender. I will be honest: there is a lot to
    learn about Blender. But it is very rewarding to master each new technique with
    this application. The folks who make Blender recently revamped the entire application,
