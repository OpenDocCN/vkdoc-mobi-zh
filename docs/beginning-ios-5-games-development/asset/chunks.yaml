    ## CHAPTER 4: Quickly Build an Input-Driven Game


    ### Summary


    In this chapter, we explored how to create an input-driven game. This included
    understanding the management of a game state, the basics of user input, and the
    use of core animation to create animations. Game state is managed by creating
    a class to hold the data required to re-create the game in a display-agnostic
    way. To allow the user to interact with the game, basic gesture recognizers must
    be added to the correct views. A controller class interprets each user gesture
    in a game-specific context and produces animations that reflect a change in the
    game state.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00478.jpeg)


    ![](images/00083.png)


    ![](images/00141.png)


    ## 5 Chapter


    ## Quickly Build a Frame-by-Frame Game


    We have already looked at a simple game where the action is solely driven by user
    input. In this chapter, we will be looking at games that animate continuously,
    regardless of whether the user provides input. Action games are typical examples
    of such games. We are not going to make a full game in this chapter, but will
    implement part of one. **Figure 5–1** shows one of the scenes we will create.


