- fmt: "# Building Your Game: Understanding Gestures and Movements\n\nIn `Listing\
    \ 8–19`, we can see that the task `panGesture:` is broken up by the state of `panRecognizer`\
    \ in the same way as with the pinch-out example. If the state of `panRecognizer`\
    \ equals `UIGestureRecognizerStateBegan`, we calculate which of the three asteroids\
    \ the gesture is closest to horizontally. Once we record which asteroid we are\
    \ working with in `asteroidIndex`, we can get the active `Asteroid` object from\
    \ the `NSMutableArray` `asteroids` and record its location in `startCenter`. Lastly,\
    \ we stop it from spinning by setting `animationPaused` to `NO`.\n\nIn subsequent\
    \ calls to `panGesture:` the `panRecognizer` will have the state of `UIGestureRecognizerStateChanged`.\
    \ When this happens, we simply set the Y value of the selected asteroid to the\
    \ Y value of the gesture, using the task `locationInView:` of `panRecognizer`.\n\
    \nLike our previous example, the gesture either terminates with either the state\
    \ `UIGestureRecognizerStateEnded` or `UIGestureRecognizerStateCancelled`. In both\
    \ cases, we want to restart the animation in the cancel state; we also want to\
    \ revert the center of the selected asteroid back to `startCenter`.\n\nI hope\
    \ by this point a pattern is emerging as to how these gesture recognizers work.\
    \ The basic pattern is to set up the recognizer to detect gestures on a `UIView`,\
    \ configure the callback task to record the starting state of whatever is being\
    \ manipulated (saucer, asteroid, and so on), apply changes to the scene, or rollback\
    \ the changes in the case of cancelation. Let’s look at the rotation gesture next.\n\
    \n## Rotation Gesture\n\nThe rotation gesture is not as common as the previously\
    \ covered gestures in the core iOS applications. In fact, I could not find a single\
    \ example in the applications that ship with the iPhone, but I may be overlooking\
    \ something. The rotation gesture, however, does show up in a number puzzle games,\
    \ where you need to rotate an object this way or that. The rotation gesture is\
    \ performed by putting two fingers on the screen and spinning your hand, like\
    \ you are opening a bottle. Figure 8–5 shows a rotation example.\n\nIn Figure\
    \ 8–5 we see a spaceship being rotated counter clockwise. We know the ship is\
    \ being rotated counter clockwise because its starboard-maneuvering thruster is\
    \ firing. If the ship were rotating clockwise, we would see the port maneuvering\
    \ thruster firing. The class that is responsible for this example is `RotationGestureController`,\
    \ whose header file is shown in Listing 8–20.\n\n**Figure 8–5.** *Rotating a spaceship\
    \ with the rotation gesture*\n\n**Listing 8–20.** *RotationGestureController.h*\n\
    \n```\n@interface RotationGestureController : GameController{\n\n    Viper* viper;\n\
    \n    float startRotation;\n\n}\n\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer;\n\
    \n@end\n```\n\nIn Listing 8–20, we see the header file for the class `RotationGestureController`.\
    \ We see that we have a reference to the spaceship, called `viper`. We also keep\
    \ track of the starting rotation of the spaceship in the variable `startRotation`.\
    \ The task `rotationGesture:` is called when a `UIRotationGestureRecognizer` recognizes\
    \ a gesture.\n\nLet’s take a quick look at the `doSetup` task for the class `RotationGestureController`\
    \ so we understand how the `UIRotationGestureRecognizer` is set up. See Listing\
    \ 8–21.\n\n**Listing 8–21.** *RotationGestureController.m (doSetup)*\n\n```\n\
    -(BOOL)doSetup{\n\n    if ([super doSetup]){\n\n        [self setGameAreaSize:CGSizeMake(320,\
    \ 480)];\n\n        viper = [Viper viper:self];\n\n        [self addActor:viper];\n\
    \n        UIRotationGestureRecognizer* rotationRecognizer = [[UIRotationGestureRecognizer\
    \ alloc] initWithTarget:self action:@selector(rotationGesture:)];\n\n        [actorsView\
    \ addGestureRecognizer:rotationRecognizer];\n\n        return YES;\n\n    }\n\n\
    \    return NO;\n\n}\n```\n\nIn Listing 8–21, we can see the `doSetup` task of\
    \ `RotationGestureController` is very simple. We add a new `Viper` object and\
    \ register a `UIRotationGestureRecognizer`. There should be no surprises at this\
    \ point—we know that the task `rotationGesture:` will be called as the object\
    \ `rotationRecognizer` detects touch events that can be interpreted as a rotation\
    \ gesture. Let’s take a look at the task `rotationGesture:`, as shown in Listing\
    \ 8–22.\n\n**Listing 8–22.** *RotationGestureController.m (rotationGesture:)*\n\
    \n```\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer{\n\
    \n    if ([rotationRecognizer state] == UIGestureRecognizerStateBegan){\n\n  \
    \      startRotation = [viper rotation];\n\n    } else if ([rotationRecognizer\
    \ state] == UIGestureRecognizerStateChanged){\n\n        float rotation = [rotationRecognizer\
    \ rotation];\n\n        float finalRotation = startRotation + rotation*2.0;\n\n\
    \        if (finalRotation > [viper rotation]){\n\n            [viper setState:VPR_STATE_CLOCKWISE];\n\
    \n        } else {\n\n            [viper setState:VPR_STATE_COUNTER_CLOCKWISE];\n\
    \n        }\n\n        [viper setRotation: finalRotation];\n\n    } else if ([rotationRecognizer\
    \ state] == UIGestureRecognizerStateEnded){\n\n        [viper setState:VPR_STATE_STOPPED];\n\
    \n    } else if ([rotationRecognizer state] == UIGestureRecognizerStateCancelled){\n\
    \n        [viper setState:VPR_STATE_STOPPED];\n\n        [viper setRotation:startRotation];\n\
    \n    }\n\n}\n```\n\nIn Listing 8–22, shows the `rotationGesture:` task for the\
    \ class `RotationGestureController`. In this task, we perform the now familiar\
    \ tasks based on the state of the `rotationRecognizer`. If the state is `UIGestureRecognizerStateBegan`,\
    \ we simply record the starting rotation of actor `viper`. If the state is `UIGestureRecognizerStateChanged`,\
    \ we get the rotation value from `rotationRecognizer`.\n\nThe value of rotation\
    \ is relative to where the user first placed his fingers. Since the value of rotation\
    \ is relative to `startRotation`, we have to add rotation to `startRotation` to\
    \ have the ship turn like a knob. We multiply the rotation by 2.0, to make the\
    \ rotation faster and more responsive. This is only done because we might use\
    \ this technique in an action game, where we want the user to be able to rotate\
    \ the ship pretty quickly. Once the value of `finalRotation` is calculated, we\
    \ see if it is bigger or smaller than the current rotation. This allows us to\
    \ set the state of `viper` to either `VPR_STATE_CLOCKWISE` or `VPR_STATE_COUNTER_CLOCKWISE`.\n\
    \nWhen the gesture is over, we simply set the state of `viper` back to `VPR_STATE_STOPPED`.\
    \ Additionally, if the gesture was cancelled, we reset the rotation of the ship\
