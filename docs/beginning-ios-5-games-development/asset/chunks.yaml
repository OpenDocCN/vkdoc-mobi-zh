    up any sparks that are added before touchCancelled:withEvent: is called. Let’s
    take a look at the implementation of the class TouchEventsView, as shown on Listing
    8–3.


    **Listing 8–3.** *TouchEventsView.m*


    @implementation TouchEventsView


    - (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Begin: %i", [touches count]);


    sparks = [NSMutableArray new];


    }


    - (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Cancelled: %i", [touches count]);


    for (Spark* spark in sparks){


    [controller removeActor:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Ended: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Moved: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00247.png)


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **185**


    }


    @end


    In Listing 8–3, we see the four tasks discussed earlier. The class UIResponder
    defines each task, which is the super class of UIView. These methods are called
    as the user interacts with the screen. By implementing them, we can add our custom
    behavior. The task touchesBegan:withEvent: is called when a finger touches the
    screen. When this happens, we create a new NSMutableArray to keep track of all
    of the sparks we are going to add. Any of the other three tasks could be called
    next. If the user moves his or her finger, or places another new finger on the
    screen, the task


    touchesMoved:withEvent: is called. In this task, we create and a new Spark for
    each touch. We use the number of touches, minus 1, to specify the variant or color
    of the Spark, which is then added the scene. The spark is just a simple particle-like
    class that removes itself after five seconds.


    There are two ways that a touch event can end. The first way is when touchesEnded:withEvent:
    is called after the user has removed all of his fingers. In this case, we do the
    same thing we did in touchesMoved:withEvent:: we create a Spark for each touch.
    We also clear the NSMutableArray sparks, to remove reference to the spark objects.


    The other way a touch event can end is by it being cancelled. An event is cancelled
    when something else in the system happens that makes completing the event inappropriate.
    When this tasks is called, we removed all of the Spark objects we have created
    since touchesBegan:withEvent: was last called, undoing the work we have done up
    until this point.'
  trans: '

    # 扩展 UIView 以接收触摸事件


    我认为在大多数情况下，最后一种技术最为稳健，因为它为用户提供了一种通过一组已知手势与应用交互的方式。然而，使用第二种技术（实现触摸相关任务）也有充分的理由，尤其是当你追求的用户交互本身并非手势时。例如，在一个绘图应用中，你只需获取屏幕上所有接触点来进行绘制。


    下一节将回顾 `UIView` 的触摸相关任务。随后，我们将继续探讨 `UIGestureRecognizer` 类和运动事件。


    本章附带的示例代码可在项目 Sample 08 中找到。虽然本书中的大部分代码既可在设备上运行，也可在模拟器上运行，但我强烈建议你在 iPhone（或 iPod
    touch）上运行此代码——如果可能的话，使用 iOS 4.2 或更高版本——因为复杂手势在模拟器上难以模拟。要真正获得用户体验的感受，最好用自己的手执行实际手势，并体会每种手势的感觉。


    当用户在屏幕上触摸 `UIView` 时，该视图有四个任务会被调用。我统称它们为触摸相关任务，如代码清单 8-1 所示。


    **代码清单 8-1.** *四个触摸相关任务*

    ```

    -(void)touchesBegan:withEvent:


    -(void)touchesCancelled:withEvent:


    -(void)touchesEnded:withEvent:


    -(void)touchesMoved:withEvent:

    ```


    每个任务的第一个参数是一个 `NSSet`，其中包含屏幕上每次离散触摸对应的一个 `UITouch`。第二个参数是一个 `UIEvent`，它基本上是 iOS
    上三种不同输入类型（触摸事件、运动事件和远程控制事件）的通用包装器。我们不会涉及远程控制事件；那些是由配件（如外部键盘）生成的事件。


    任务 `touchesBegan:withEvent:` 在手指（或多根手指）触摸屏幕时立即被调用。任务 `touchesEnded:withEvent:`
    在手指移开时被调用。如果手指滑动，则会调用 `touchesMoved:withEvent:`。任务 `touchesCancelled:withEvent:`
    在系统必须接管屏幕时被调用。例如，如果另一个应用被启动，则在对第一个应用的控制权传递给新应用之前，会调用其 `touchesCancelled:withEvent:`
    方法。示例代码提供了使用这些任务的范例，如图 8-1 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00185.png)


    ![](img/00245.jpeg)


    **第 8 章：构建你的游戏：理解手势与运动** **183**


    **图 8–1.** *触摸事件*


    在图 8-1 中，我们看到几条由点组成的线段。每条线段都是手指在屏幕上拖动的结果。最上面的线段是单指在屏幕上移动产生的——用红点绘制。从上数第二条线段是双指在屏幕上拖动产生的，它下面的那条线段同样如此，两者都是用绿点绘制的。下面的三条线段由三指绘制，由蓝点组成。如果你能看到图
    8-1 的彩色版本（如果你有电子书的话），请观察最下面一行最左侧的点。注意，一个是红色，另一个是绿色。这是因为我没能让三根手指同时落在屏幕上。


    在这个第一个示例中，除了用手指绘制点之外，你还可以通过单指或双指轻触分别放大或缩小这些点。缩放功能演示了触摸事件和手势如何协同工作。一旦我们理解了触摸事件的基础知识，将更详细地探讨这一点。


    # 查看事件代码


    这个简单演示的实现展示了我们如何接收触摸事件，并为屏幕上的每次触摸创建角色。涉及两个类：继承 `GameController` 的 `TouchEventsController`
    和继承 `UIView` 的 `TouchEventsView`。让我们从查看 `TouchEventsView` 类开始。其头文件如代码清单 8-2 所示。


    **代码清单 8-2.** *TouchEventsView.h*

    ```

    @interface TouchEventsView : UIView{


    IBOutlet TouchEventsController* controller;


    NSMutableArray* sparks;


    }


    @end

    ```


    在代码清单 8-2 中，我们看到了一个 `IBOutlet`，因此我们可以将 `TouchEventsView` 连接到 `TouchEventsController`。我们还看到了一个名为
    `sparks` 的 `NSMutableArray`。这个集合用于在添加火花时进行追踪；如前所述，触摸事件可能被取消。通过追踪我们添加的火花，我们可以在调用
    `touchCancelled:withEvent:` 之前清理任何已添加的火花。让我们看看 `TouchEventsView` 类的实现，如代码清单 8-3
    所示。


    **代码清单 8-3.** *TouchEventsView.m*

    ```

    @implementation TouchEventsView


    - (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Begin: %i", [touches count]);


    sparks = [NSMutableArray new];


    }


    - (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Cancelled: %i", [touches count]);


    for (Spark* spark in sparks){


    [controller removeActor:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Ended: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    [sparks removeAllObjects];


    }


    - (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event{


    NSLog(@"Moved: %i", [touches count]);


    int count = [touches count];


    for (UITouch* touch in touches){


    Spark* spark = [Spark spark:count-1 At:[touch locationInView:self]];


    [controller addActor:spark];


    [sparks addObject:spark];


    }


    }


    @end

    ```


    在代码清单 8-3 中，我们看到之前讨论的四个任务。`UIResponder` 类（`UIView` 的父类）定义了每个任务。这些方法在用户与屏幕交互时被调用。通过实现它们，我们可以添加自定义行为。任务
    `touchesBegan:withEvent:` 在手指触摸屏幕时被调用。此时，我们创建一个新的 `NSMutableArray` 来追踪我们将要添加的所有火花。接下来可能会调用其他三个任务中的任何一个。如果用户移动手指，或另一根新手指触屏，则会调用任务
    `touchesMoved:withEvent:`。在此任务中，我们为每次触摸创建一个新的 `Spark`。我们使用触摸次数减 1 来指定 `Spark`
    的变体或颜色，然后将其添加到场景中。火花只是一个简单的粒子类对象，会在五秒后自动消失。


    触摸事件可以通过两种方式结束。第一种方式是当用户移开所有手指后，调用 `touchesEnded:withEvent:`。在这种情况下，我们执行与 `touchesMoved:withEvent:`
    中相同的操作：为每次触摸创建一个 `Spark`。同时，我们清空 `NSMutableArray` 中的 `sparks`，以移除对火花对象的引用。


    触摸事件结束的另一种方式是通过取消。当系统发生其他事件导致完成该事件不恰当，或者另一个视图的事件拦截了触摸序列时，事件会被取消。当此任务被调用时，我们将移除自上次调用
    `touchesBegan:withEvent:` 以来创建的所有 `Spark` 对象，撤销到目前为止所做的工作。

