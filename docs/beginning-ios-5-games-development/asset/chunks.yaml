    **3**


    ****Chapter**


    **Explore the Game**


    **Application Life Cycle**


    There is more to a game than just the fun parts. Almost all of the games on the
    market, and definitely the big titles, involve multiple views and a reasonably
    complex life cycle.


    This chapter explores how to turn a simple game into a complete application. We
    will look at how a typical game organizes the different views that comprise it,
    including a Loading view, a Welcome view, a High Score view, and of course the
    game itself.


    Beyond user navigation, an application also has a life cycle. On iOS, that includes
    responding to the application being terminated, recovering from being in the background,
    or starting up for the first time. When an application moves through its life
    cycle, it will want to preserve elements of the user data, like high scores and
    the state of the game. Paying attention to these little details will make your
    game look polished instead of amateurish and annoying.


    While the game presented here is not very exiting and the art is admittedly amateurish,
    you will be able to take the basic outline presented here and drop your own game
    into it.


    You should update your art though!


