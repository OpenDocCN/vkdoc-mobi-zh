    ## 使用委托来通信应用程序状态


    在 iOS 开发中，一种常见的对象间通信模式是委托模式。委托就是任何符合另一个对象所知的某个预定义协议的对象。例如，假设我们有一个类 A，它有一个名为 delegate
    的属性，该属性必须符合协议 P。如果类 B 符合协议 P，我们可以将类 B 的实例分配给 A 的 delegate 属性。委托模式与其他语言（如 Java）中的监听器模式非常相似。


