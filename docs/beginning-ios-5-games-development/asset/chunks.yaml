    In Listing 4–14, we see the initializer task used to create a new CoinsGame object
    with randomized coins. After creating a new NSMutableArray and setting it to the
    variable coins and populate it with the total number of coins we will have in
    the game. The value of the result will be 0, 1, or 2\. After we set up the first
    set of random values, we have to make sure we don’t start the game with any matches.
    This is done by first finding any matched by calling findMatchingRows and findMatchingCols
    and seeing whether they contain anything. If they do, we randomize those matches
    until no more matches are found. Finally, we set the number of remaining turns
    to 10 and make sure the score starts out at 0\. Continuing our exploration of
    the class CoinsGame, let’s look at coinForCoord:, shown in Listing 4–15.


    **Listing 4–15.** *CoinsGame.m (coinForCoord:)*


    -(NSNumber*)coinForCoord:(Coord)coord{


    int index = [self indexForCoord:coord];


    return [coins objectAtIndex:index];


    }


    The task coinForCoord: takes a Coord and returns the type of coin at that location.


    Finding the NSNumber object at the given index in the NSMutableArray coins does
    this.


    The index is determined by calling indexForCoord:, shown in Listing 4–16.


    **Listing 4–16.** *CoinsGame.m (indexForCoord:)*


    -(int)indexForCoord:(Coord)coord{


    return coord.row*colCount + coord.col;


    }


    The task indexForCoord: takes a Coord struct. This simple task multiplies the
    number of columns in the game by the row value of coord and adds the col value.


    There are a few more tasks in CoinsGame.m that should be explored to help you
    understand what CoinsController is doing during different parts of its life cycle.
    Let’s continue by looking at the task swap:With:, shown in Listing 4–17.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00102.png)


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **85**


    **Listing 4–17.** *CoinsGame.m (swap:With:)*


    -(void)swap:(Coord)coordA With:(Coord)coordB{


    int indexA = [self indexForCoord:coordA];


    int indexB = [self indexForCoord:coordB];


    NSNumber* coinA = [coins objectAtIndex:indexA];


    NSNumber* coinB = [coins objectAtIndex:indexB];


    [coins replaceObjectAtIndex:indexA withObject:coinB];


    [coins replaceObjectAtIndex:indexB withObject:coinA];


    }


    The task swap:With: takes two Coords, coordA and coordB. This task switches the
    type of coins at these two coordinates by finding the index of each coordinate,
    the current value of that index in coins, and switching them. We know that after
    coins are swapped, CoinsController will have to look for any matches. This is
    done with the tasks findMatchingRows and findMatchingCols. Listing 4–18 shows
    findMatchingRows.


    **Listing 4–18.** *CoinsGame.m (findMatchingRows)*


    -(NSMutableArray*)findMatchingRows{


    NSMutableArray* matchingRows = [NSMutableArray new];


    for (int r=0;r<rowCount;r++){


    NSNumber* coin0 = [self coinForCoord:CoordMake(r, 0)];


    BOOL mismatch = false;


    for (int c=1;c<colCount;c++){


    NSNumber* coinN = [self coinForCoord:CoordMake(r,c)];


    if (![coin0 isEqual:coinN]){


    mismatch = true;


    break;


    }


    }


    if (!mismatch){


    [matchingRows addObject:[NSNumber numberWithInt:r]];


    }


    }


    return matchingRows;


    }


    The task findMatchingRows creates a new NSMutableArray called matchingRows to
    store any results. Matching rows are found by looking at each row in turn and
    inspecting the coin at each column. This is done by storing the coin at column
    0 as the variable coin0


    and then by comparing coin0 to each coin in the other columns. If a coin is found
    that does not match coin0, we know that there is no match, and mismatch is set
    to true. If no mismatches are found, we add the value r to the NSMutableArray
    matchingRows, which is the result of this task. The implementation for findMatchingCols
    is trivially different and is omitted for brevity.'
