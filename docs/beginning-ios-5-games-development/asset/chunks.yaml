  trans: '

    使用 GameKit 来启用排行榜和成就功能出乎意料地简单，前提是 Game Center 已设置包含这些功能。以下章节将讨论如何连接用户的 Game Center
    账户，将他的分数提交到排行榜，以及获取成就。


    **为用户启用 Game Center**


    当游戏启用了 Game Center 时，用户仍需选择加入 Game Center 功能。用户需要使用 Game Center 创建一个账户，并在当前 iOS
    设备上使用该账户进行身份验证。值得庆幸的是，苹果公司简化了 Game Center 的入门流程。


    要开始使用 Game Center，所有应用都必须获取代表本地玩家的 `GKLocalPlayer` 实例，并对其进行身份验证。清单 9-1 展示了执行此操作的典型示例。


    **清单 9-1.** *RootViewController.m (initGameCenter)*


    ```

    -(void)initGameCenter{


    Class gkClass = NSClassFromString(@"GKLocalPlayer");


    BOOL iosSupported = [[[UIDevice currentDevice] systemVersion] compare:@"4.1"


    options:NSNumericSearch] != NSOrderedAscending;


    if (gkClass && iosSupported){


    localPlayer = [GKLocalPlayer localPlayer];


    [localPlayer authenticateWithCompletionHandler:^(NSError *error) {


    if (localPlayer.authenticated){


    [leaderBoardButton setEnabled:YES];


    } else {


    [leaderBoardButton setEnabled:NO];


    }


    }];


    }


    }

    ```


    在清单 9-1 中，我们看到了 `RootViewController` 类的任务 `initGameCenter`。此任务在应用程序启动时被调用一次。它首先通过查找
    `GKLocalPlayer` 类来检查此 iOS 设备上是否可用 GameKit。该任务还会检查 iOS 版本是否足够新以支持 Game Center。


    如果检查通过，我们通过调用 `GKLocalPlayer` 类的 `localPlayer` 方法来获取一个指向本地玩家的指针。


    为了对本地玩家进行身份验证，我们只需调用 `authenticateWithCompletionHandler:` 并传入一个代码块，该代码块将在用户完成身份验证（或取消）时异步执行。代码块是一种将函数声明为可传递值的方式。在此例中，我们使用代码块的方式与在
    Java 等语言中使用匿名类的方式相同。此代码首次运行时，用户将看到类似图 9-9 的界面。


    **图 9-9.** *首次使用 Game Center 进行身份验证*


    在图 9-9 中，我们看到了调用 GameKit 身份验证任务的结果。系统会提示用户使用现有账户登录 Game Center、创建新账户或取消登录。如果用户多次取消，应用程序将不再显示此对话框。在取消操作发生之前用户必须取消的确切次数似乎随不同版本而改变。对于
    iOS 5，大约是三次。一旦用户成功通过身份验证，应用程序就会连接到该用户账户的 Game Center。当应用程序再次运行时，对 `authenticateWithCompletionHandler:`
    的调用将执行处理代码，而不会再次打扰用户登录。用户将看到类似图 9-2 的界面。


    一旦 Game Center 启用，我们将开始利用其功能。下一节将介绍如何向排行榜报告分数。


    **向排行榜提交分数**


    Game Center 提供的最佳功能之一是一个内置机制，用于跨设备跟踪用户的高分。它允许用户将自己的分数与朋友的分数以及全球其他玩家的分数进行比较。提交分数的代码非常直接，如清单
    9-2 所示。


    **清单 9-2.** *RootViewController.m (notifyGameCenter)*


    ```

    -(void)notifyGameCenter{


    if ([localPlayer isAuthenticated]){


    GKScore* score = [[GKScore alloc] initWithCategory:@"beltcommander.highscores"];
    score.value = ([beltCommanderController score];


    [score reportScoreWithCompletionHandler:^(NSError *error){


    if (error){


    //handle error


    }


    }];


    }


    }

    ```


    在清单 9-2 中，我们看到了每次游戏结束时调用的任务 `notifyGameCenter`。在此任务中，我们检查 `localPlayer` 是否已验证。如果是，我们只需创建一个
    `GKScore` 对象，指定我们提交分数所对应的排行榜 ID，在本例中为 “beltcommander.highscores”。一旦获得 `GKScore`
    对象的引用，我们将 `score` 属性设置为上一局游戏的分数。`score` 属性可以是任何类型的数字——在此例中它是一个长整型。最后，我们调用 `reportScoreWithCompletionHandler:`
    并传入一个代码块来处理任何错误。在我们的示例中，我们没有对错误进行任何处理。


    **注意：** 如果用户离线或出现某种网络问题，GameKit 将在未来运行时自动重新提交分数，确保玩家的辛勤工作得到正确记录。


    图 9-10 显示了排行榜上的一个分数。


    **图 9-10.** *包含示例分数的排行榜*


    在图 9-10 中，我们看到排行榜上显示了一个分数。目前只有一个分数，因为截图是在游戏开发期间拍摄的。在顶部，我们可以看到三个查看高分的选项：今日、本周或全部。


    显示高分的组件是一个预构建的组件，称为 `GKLeaderboardViewController`，它随 GameKit 提供；调出此组件的代码如清单 9-3
    所示。


    **清单 9-3.** *RootViewController.m (leaderBoardClicked:)*


    ```

    - (IBAction)leaderBoardClicked:(id)sender {


    GKLeaderboardViewController* leaderBoardController =


    [[GKLeaderboardViewController alloc] init];


    leaderBoardController.category = @"beltcommander.highscores"; leaderBoardController.leaderboardDelegate
    = self;


    [self presentModalViewController:leaderBoardController animated:YES];


    }

    ```


    在清单 9-3 中，我们看到了当用户点击排行榜按钮时被调用的任务 `leaderBoardClicked:`。此类被调用在 `RootViewController`
    实例上，`RootViewController` 是我们示例游戏 Belt Commander 的主 `UIViewController`。我们不需要了解
    `RootViewController` 的太多细节，只需要知道它是一个 `UIViewContoller` 并遵循 `GKLeaderboardViewControllerDelegate`
    协议。要显示图 9-10 所示的视图，首先创建一个 `GKLeaderboardView` 并将 `category` 属性设置为我们排行榜的 ID。然后在
    `self` 上调用 `presentModalViewController:animated:`，这将显示排行榜视图。为了在用户点击“完成”时移除排行榜，将
    `self` 设置为 `leaderbordDelegate`，这意味着当用户完成操作时，`GKLeaderboardViewControllerDelegate`
    协议中的任务 `leaderboardViewControllerDidFinish:` 将被调用。`leaderboadViewControllerDidFinish:`
    的实现应该如清单 9-4 所示。


    **清单 9-4.** *RootViewController.m (leaderboardViewControllerDidFinish:)*


    ```

    - (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController


    *)viewController{


    [self dismissModalViewControllerAnimated:YES];


    }

    ```


    在清单 9-4 中，我们看到了 `leaderboardViewControllerDidFinish:` 的实现，我们只需调用 `dismissModalViewControllerAnimated:`
    来从屏幕上移除排行榜视图。


    如您所见，使用 GameKit 处理分数和排行榜非常简单——只需不到 10 行代码即可开始。接下来，让我们看看如何处理成就以及如何将成就授予用户。


    **授予成就**

    '
- fmt: "# Achievements\n\nAchievements are little milestones that are reached throughout\
    \ a game. They are intended to encourage the user to continue playing by indicating\
    \ that they have achieved something. In addition to providing a sense of progress,\
    \ you can also make the player feel clever by awarding secret achievements. Previously,\
    \ we looked at how to add an achievement in `iTunes Connect` (see Figure 9–8).\
    \ In our sample game, Belt Commander, the player destroys wave after wave of asteroids.\
    \ We want to give the user an achievement when he destroys his first 10 asteroids—an\
    \ easy achievement, but it will remind the user early in the game that there are\
    \ other achievements to earn. Figure 9–11 shows the achievement in the Game Center\
    \ app.\n\n![Figure 9–11](images/00348.png)\n\nIn Figure 9–11, we see a screenshot\
    \ from the Game Center app displaying the achievements for Belt Commander. We\
    \ can see that the achievement in this view was awarded. Listing 9–5 shows the\
    \ code that awards the achievement.\n\n**Listing 9–5.** *`BeltCommanderController.m`\
    \ (checkAchievements)*\n\n```\n-(void)checkAchievements{\n    if (asteroids_destroyed\
    \ >= 10){\n        GKAchievement* achievement = [[GKAchievement alloc]\n     \
    \       initWithIdentifier:@\"beltcommander.10asteroids\"];\n        achievement.percentComplete\
    \ = 100.0;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n            if (error){\n                // report error\n      \
    \      }\n        }];\n    }\n}\n```\n\nIn Listing 9–5, we see the task `checkAchievements`\
    \ from the class `BeltCommanderController`, which is responsible for handling\
    \ the in-play game logic. The first thing we do is check if `asteroids_destroyed`\
    \ is bigger or equal to 10. The variable `asteroids_destroyed` is simply incremented\
    \ whenever an asteroid in the game is destroyed. If `asteroids_destroyed` is at\
    \ least 10, we get a reference to a `GKAchievement` by passing the achievement’s\
    \ ID (as defined in `iTunes Connect`) to the `initWithIdentifier` task of `GKAchievement`.\
    \ Once we have a reference, we simply assign 100 to the property `percentComplete`,\
    \ call `reportAchievementWithCompletionHandler`, and we are done.\n\nThere are\
    \ a few things to note about achievements. First, as shown in Listing 9–5, achievements\
    \ can be partially complete. We could have set `percentComplete` to 30 or 50.\
    \ This is an important feature for long-running achievements. Say, for example,\
    \ our achievement was to destroy 10,000 asteroids. We would want to let the user\
    \ know how she has progressed to date or she may never pursue it.\n\nAnother thing\
    \ to note about achievements is that each has a value. Our achievement is worth\
    \ 5 points, as shown in Figure 9–11. The value of an achievement can be whatever\
    \ the developer wants. However, you are limited to a total of 1,000 points of\
    \ achievements for a given game. This is so a user knows that he has achieved\
    \ all the achievements for a given game when he hits 1,000 achievement points.\
    \ It prevents the user from having to relearn the relative values of an achievement\
    \ for a given game. A user knows that a 1- or 5-point achievement is not really\
    \ a big deal, but that a 100-point achievement is a real accomplishment.\n\nWe\
    \ have looked at Game Center and GameKit and how to work with leaderboards and\
    \ achievements. As mentioned, GameKit can also be used to coordinate multiplayer\
    \ games. We are not going to get into that topic here, as I believe it is too\
    \ advanced for this book. However, I encourage you to follow up on GameKit’s support\
    \ for multiplayer games, as it should simplify your life considerably. Next, let’s\
    \ look at the Twitter integration new to iOS 5.\n\n## Twitter Integration\n\n\
    Love it or hate it, Twitter exists. As a mobile application developer, it is becoming\
    \ more and more common for clients to ask for social media integration in their\
    \ apps. On the short list of everyone’s social services is Twitter. Twitter provides\
    \ a very nice and useful REST service that can be used to tweet on behalf of a\
    \ user. New to iOS 5 is a feature where a user can do a sort of single-sign on\
    \ with their Twitter account, making it simple for application developers to request\
    \ access to this global account. This feature is great for users, because they\
    \ only have to authenticate once with the device, and still have control over\
    \ which applications are allowed to tweet for them.\n\nThis feature is also great\
    \ for developers. It makes tweeting really, really easy. If you have ever worked\
    \ with any OAuth service on an embedded device, you know there is a bit of a disconnect\
    \ between how OAuth works and native applications. In short, OAuth was designed\
    \ to work within a browser and our application was not written on HTML. One solution\
    \ was to pop up a `UIWebView` and do the authentication through it. This works,\
    \ but it is clumsy. This new approach is much better.\n\nNot only does this new\
    \ Twitter API provide a simple way to authenticate, it provides a simple component\
    \ where the user can enter their tweet, as shown in Figure 9–12.\n\n![Figure 9–12](images/00106.png)\n\
    \nIn Figure 9–12, we see the built-in component for tweeting on iOS. On the top\
    \ we have the place where the 120 characters can be typed. To the right, there\
    \ is a paperclip holding a Safari icon. This indicates that a link was attached\
    \ to this tweet. The user can also add a location, cancel, or send the tweet.\
    \ The code to populate this view with default values and display them is shown\
    \ in Listing 9–6.\n\n**Listing 9–6.** *`RootViewController.m` (tweetButtonClicked:)*\n\
    \n```\n- (IBAction)tweetButtonClicked:(id)sender {\n    TWTweetComposeViewController*\
    \ tweetSheet = [[TWTweetComposeViewController alloc]\n        init];\n    tweetSheet.completionHandler\
    \ = ^(TWTweetComposeViewControllerResult result) {\n        //view result here\n\
    \    };\n    [tweetSheet setInitialText:@\"Check out this iOS game, Belt Commander!\"\
    ];\n    NSURL* url = [NSURL URLWithString:@\"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8\"\
    ];\n    [tweetSheet addURL: url];\n    [self presentModalViewController:tweetSheet\
    \ animated:YES];\n}\n```\n\nIn Listing 9–6, we see the `tweetButtonClicked:` task\
    \ of the class `RootViewController`. This task is called when a user clicks the\
    \ Tweet button. To display the Twitter component, we simply create a new `TWTweetComposeViewController`\
    \ and pass it to `presentModalViewController`. If we want to know if the tweet\
    \ was sent, we can assign a block to the value `completionHandler` of `tweetSheet`.\
    \ To set the initial text of the tweet, we call `setInitialText`, passing in our\
    \ text. URLs and images can be added by calling `addURL:` or `addImage:`.\n\n\
    Of course, not every user will have Twitter set up on their device. As a developer,\
    \ you want to be able to test this, which turns out to be as simple as the code\
    \ in Listing 9–7.\n\n**Listing 9–7.** *`RootViewController.m` (initTwitter)*\n\
    \n```\n-(void)initTwitter{\n    [tweetButton setEnabled:[TWTweetComposeViewController\
    \ canSendTweet]];\n}\n```\n\nIn Listing 9–7, we see the simple task `initTwitter`,\
    \ which is called when the containing `UIViewController` is loaded. In this task,\
    \ we simply call `canSendTweet` to see if we can tweet. By using the returned\
    \ value to set the enabled status of `tweetButton`, we prevent the user from being\
    \ able to click the button until Twitter is enabled on the device.\n\nThe Twitter\
    \ integration is great. It makes life very simple to include this feature. Let’s\
    \ look at including Facebook integration in our app and see how that stacks up\
    \ to this built-in functionality.\n\n## Facebook Integration"
  raw: 'Achievements are little milestones that are reached throughout a game. They
    are intended to encourage the user to continue playing by indicating that they
    have achieved something. In addition to providing a sense of progress, you can
    also make the player feel clever by awarding secrete achievements. Previously,
    we looked at how to add an achievement in iTunes Connect (see Figure 9–8). In
    our sample game, Belt Commander, the player destroys wave after wave of asteroids.
    We want to give the user an achievement when he destroys his first 10 asteroids—an
    easy achievement, but it will remind the user early in the game that there are
    other achievements to earn. Figure 9–11


    shows the achievement in the Game Center app.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00348.png)


    ![](images/00454.jpeg)


    **226**


    **CHAPTER 1: App Cubby**


    **Figure 9–11.** *First achievement in the Game Center app*


    In Figure 9–11, we see a screenshot from the Game Center app displaying the achievements
    for Belt Commander. We can see that the achievement in this view was awarded.
    Listing 9–5 shows the code that awards the achievement.


    **Listing 9–5.** *BeltCommanderController.m (checkAchievements)*


    -(void)checkAchievements{


    if (asteroids_destroyed >= 10){


    GKAchievement* achievement = [[GKAchievement alloc]


    initWithIdentifier:@"beltcommander.10asteroids"];


    achievement.percentComplete = 100.0;


    [achievement reportAchievementWithCompletionHandler:^(NSError *error) {


    if (error){


    // report error


    }


    }];


    }


    }


    In Listing 9–5, we see the task checkAchievements from the class


    BeltCommanderController, which is responsible for handling the in-play game logic.
    The first thing we do is check if the asteroids_destroyed is bigger or equal to
    10\. The variable asteroids_destroyed is simply incremented whenever an asteroid
    in the game is destroyed. If asteroids_destroyed is at least 10, we get a reference
    to a GKAchievement by passing the achievement’s ID (as defined in iTunes Connect)
    to the


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00411.png)


    **CHAPTER 1: App Cubby**


    **227**


    initWithIdentifier task of GKAchievement. Once we have a reference, we simply
    assign 100 to the property percentComplete, call reportAchievementWithCompletionHander,
    and we are done.


    There are a few things to note about achievements. First, as shown in Listing
    9–5, achievements can be partially complete. We could have set percentComplete
    to 30 or 50\. This is an important feature for long-running achievements. Say,
    for example, our achievement was to destroy 10,000 asteroids. We would want to
    let the user know how she has progressed to date or she may never pursue it.


    Another thing to note about achievements is that each has a value. Our achievement
    is worth 5 points, as shown in Figure 9–11\. The value of an achievement can be
    whatever the developer wants. However, you are limited to a total of 1,000 points
    of achievements for a given game. This is so a user knows that he has achieved
    all the achievements for a given game when he hits 1,000 achievement points. It
    prevents the user from having to relearn the relative values of an achievement
    for a given game. A user knows that a 1- or 5-point achievement is not really
    a big deal, but that a 100-point achievement is a real accomplishment.


    We have looked at Game Center and GameKit and how to work with leaderboards and
    achievements. As mentioned, GameKit can also be used to coordinate multiplayer
    games. We are not going to get into that topic here, as I believe it is too advanced
    for this book. However, I encourage you to follow up on GameKit’s support for
    multiplayer games, as it should simplify your life considerably. Next, let’s look
    at the Twitter integration new to iOS 5.


    **Twitter Integration**


    Love it or hate it, Twitter exists. As a mobile application developer, it is becoming
    more and more common for clients to ask for social media integration in their
    apps. On the short list of everyone’s social services is Twitter. Twitter provides
    a very nice and useful REST service that can be used to tweet on behalf of a user.
    New to iOS 5 is a feature where a user can do a sort of single-sign on with their
    Twitter account, making it simple for application developers to request access
    to this global account. This feature is great for users, because they only have
    to authenticate once with the device, and still have control over which applications
    are allowed to tweet for them.


    This feature is also great for developers. It makes tweeting really, really easy.
    If you have ever worked with any OAuth service on an embedded device, you know
    there is a bit of a disconnect between how OAuth works and native applications.
    In short, OAuth was designed to work within a browser and our application was
    not written on HTML. One solution was to pop up a UIWebView and do the authentication
    through it. This works, but it is clumsy. This new approach is much better.


    Not only does this new Twitter API provided a simple way to authenticate, it provides
    a simple component where the user can enter their tweet, as shown in Figure 9–12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00106.png)


    ![](images/00147.jpeg)


    **228**


    **CHAPTER 1: App Cubby**


    **Figure 9–12.** *Tweeting from Belt Commander*


    In Figure 9–12, we see the built-in component for tweeting on iOS. On the top
    we have the place where the 120 characters can be typed. To the right, there is
    a paperclip holding a Safari icon. This indicates that a link was attached to
    this tweet. The user can also add a location, cancel, or send the tweet. The code
    to populate this view with default values and display them is shown in Listing
    9–6.


    **Listing 9–6.** *RootViewController.m (tweetButtonClicked:)*


    - (IBAction)tweetButtonClicked:(id)sender {


    TWTweetComposeViewController* tweetSheet = [[TWTweetComposeViewController alloc]


    init];


    tweetSheet.completionHandler = ^(TWTweetComposeViewControllerResult result) {


    //view result here


    };


    [tweetSheet setInitialText:@"Check out this iOS game, Belt Commander!"]; NSURL*
    url = [NSURL URLWithString:@"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8"];


    [tweetSheet addURL: url];


    [self presentModalViewController:tweetSheet animated:YES];


    }


    In Listing 9–6, we see the tweetButtonClicked: task of the class RootViewController.


    This task is called when a user clicks the Tweet button. To display the Twitter
    component, we simply create a new TWTweetComposeViewController and pass it to
    presentModalViewController. If we want to know if the tweet was sent, we can assign
    a block to the value completionHandler of tweetSheet. To set the initial text
    of the tweet, we call setInitialText, passing in our text. URLs and images can
    be added by calling addURL: or addImage:.


    Of course, not every user will have Twitter set up on their device. As a developer,
    you want to be able to test this, which turns out to be as simple as the code
    in Listing 9–7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00175.png)


    **CHAPTER 1: App Cubby**


    **229**


    **Listing 9–7.** *RootViewController.m (initTwitter)*


    -(void)initTwitter{


    [tweetButton setEnabled:[TWTweetComposeViewController canSendTweet]];


    }


    In Listing 9–7, we see the simple task initTwitter, which is called when the containing
    UIViewContoller is loaded. In this task, we simply set canSendTweet to see if
    we can tweet. By using the returned value to set the enabled status of tweetButton,
    we prevent the user from being able to click the button until Twitter is enabled
    on the device.


    The Twitter integration is great. It makes life very simple to include this feature.
    Let’s look at including Facebook integration in our app and see how that stacks
    up to this built-in functionality.


    **Facebook Integration**'
  trans: "\n# 成就系统\n\n成就是游戏进程中达成的小里程碑。它们旨在通过向玩家展示已取得的成果来鼓励其继续游玩。除了提供进度感外，你还可以通过设置隐藏成就让玩家感觉自己很聪明。此前，我们探讨了如何在`iTunes\
    \ Connect`中添加成就（见图 9-8）。在示例游戏《Belt Commander》中，玩家需要击毁一波波小行星。当玩家首次击毁 10 颗小行星时，我们想授予其成就——虽然这个成就很简单，但它能在游戏早期提醒用户还有其他成就可争取。图\
    \ 9-11 展示了 Game Center 应用中的成就界面。\n\n![图 9-11](img/00348.png)\n\n在图 9-11 中，我们看到\
    \ Game Center 应用展示《Belt Commander》成就的截图。可以看到该视图中的成就已被授予。代码清单 9-5 展示了授予成就的代码。\n\
    \n**代码清单 9-5.** *`BeltCommanderController.m` (checkAchievements)*\n\n```\n-(void)checkAchievements{\n\
    \    if (asteroids_destroyed >= 10){\n        GKAchievement* achievement = [[GKAchievement\
    \ alloc]\n            initWithIdentifier:@\"beltcommander.10asteroids\"];\n  \
    \      achievement.percentComplete = 100.0;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n            if (error){\n                // 报告错误\n            }\n\
    \        }];\n    }\n}\n```\n\n在代码清单 9-5 中，我们看到`BeltCommanderController`类中的`checkAchievements`方法，该方法负责处理游戏逻辑。首先，我们检查`asteroids_destroyed`是否大于等于\
    \ 10。变量`asteroids_destroyed`会在游戏中每颗小行星被摧毁时递增。如果`asteroids_destroyed`至少为 10，我们就通过将成就\
    \ ID（在`iTunes Connect`中定义）传递给`GKAchievement`的`initWithIdentifier`方法来获取`GKAchievement`对象的引用。获得引用后，只需将属性`percentComplete`设为\
    \ 100，然后调用`reportAchievementWithCompletionHandler`即可完成操作。\n\n关于成就，有几点需要注意。首先，如代码清单\
    \ 9-5 所示，成就可以部分完成。我们可以将`percentComplete`设为 30 或 50。这对于长期成就而言是重要功能。举例来说，如果我们的成就是摧毁\
    \ 10,000 颗小行星，我们就需要让用户了解目前的进度，否则他们可能永远不会去追求这个成就。\n\n关于成就的另一要点是每个成就都有分值。如图 9-11\
    \ 所示，我们的成就价值 5 分。成就分值可由开发者任意设定，但单个游戏的总成就分值限制为 1,000 分。这样用户就知道，当达到 1,000 成就分时，就已解锁该游戏的所有成就。这避免了用户需要重新学习每个游戏中成就的相对价值。用户明白\
    \ 1 分或 5 分的成就没什么大不了的，但 100 分的成就才是真正的成就。\n\n我们已经了解了 Game Center 和 GameKit，以及如何使用排行榜和成就。如前所述，GameKit\
    \ 还可用于协调多人游戏。这里我们不打算深入探讨这个话题，因为我认为这对于本书来说过于高级。但我鼓励您继续研究 GameKit 对多人游戏的支持，这应该能大大简化您的工作。接下来，让我们看看\
    \ iOS 5 新增的 Twitter 集成功能。\n\n## Twitter 集成\n\n无论喜爱与否，Twitter 确实存在。作为移动应用开发者，客户要求在其应用中集成社交媒体越来越常见。在社交媒体服务列表中，Twitter\
    \ 始终占有一席之地。Twitter 提供了一个非常出色且实用的 REST 服务，可用于代表用户发布推文。iOS 5 新增了一项功能，允许用户使用其 Twitter\
    \ 账号进行单点登录，从而使应用开发者能够轻松请求访问这个全局账号。这项功能对用户来说非常棒，因为他们只需在设备上认证一次，同时仍能控制哪些应用被允许代表他们发布推文。\n\
    \n这项功能对开发者来说也很棒。它让发布推文变得极其简单。如果你曾在嵌入式设备上使用过 OAuth 服务，就会知道 OAuth 的工作方式与原生应用之间存在一些脱节。简而言之，OAuth\
    \ 是为在浏览器内运行而设计的，而我们的应用并非基于 HTML 编写。一种解决方案是弹出`UIWebView`并通过它进行认证。这种方法可行，但很笨拙。而这种新方法要好得多。\n\
    \n这个新的 Twitter API 不仅提供了简单的认证方式，还提供了一个简单组件，用户可以在其中输入推文，如图 9-12 所示。\n\n![图 9-12](img/00106.png)\n\
    \n在图 9-12 中，我们看到 iOS 内置的推文撰写组件。顶部是输入 120 个字符的区域。右侧有一个回形针图标托着 Safari 图标，表示该推文附带了链接。用户还可以添加位置、取消或发送推文。用于填充默认值并显示此视图的代码如代码清单\
    \ 9-6 所示。\n\n**代码清单 9-6.** *`RootViewController.m` (tweetButtonClicked:)*\n\n\
    ```\n- (IBAction)tweetButtonClicked:(id)sender {\n    TWTweetComposeViewController*\
    \ tweetSheet = [[TWTweetComposeViewController alloc]\n        init];\n    tweetSheet.completionHandler\
    \ = ^(TWTweetComposeViewControllerResult result) {\n        //在这里查看结果\n    };\n\
    \    [tweetSheet setInitialText:@\"看看这款 iOS 游戏《Belt Commander》！\"];\n    NSURL*\
    \ url = [NSURL URLWithString:@\"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8\"\
    ];\n    [tweetSheet addURL: url];\n    [self presentModalViewController:tweetSheet\
    \ animated:YES];\n}\n```\n\n在代码清单 9-6 中，我们看到`RootViewController`类中的`tweetButtonClicked:`方法。当用户点击推文按钮时会调用此方法。要显示\
    \ Twitter 组件，只需创建一个新的`TWTweetComposeViewController`并将其传递给`presentModalViewController`。如果我们想知道推文是否已发送，可以为`tweetSheet`的`completionHandler`属性分配一个代码块。要设置推文的初始文本，我们调用`setInitialText`并传入文本。可以通过调用`addURL:`或`addImage:`添加\
    \ URL 和图片。\n\n当然，并非所有用户都会在设备上设置 Twitter。作为开发者，你需要能够测试这一点，而测试方法就像代码清单 9-7 中的代码一样简单。\n\
    \n**代码清单 9-7.** *`RootViewController.m` (initTwitter)*\n\n```\n-(void)initTwitter{\n\
    \    [tweetButton setEnabled:[TWTweetComposeViewController canSendTweet]];\n}\n\
    ```\n\n在代码清单 9-7 中，我们看到简单的`initTwitter`方法，它在包含的`UIViewController`加载时被调用。在此方法中，我们只需调用`canSendTweet`来检查是否可以发送推文。通过使用返回值设置`tweetButton`的启用状态，我们可以防止用户在该设备未启用\
    \ Twitter 时点击按钮。\n\nTwitter 集成非常棒。它让包含此功能变得非常简单。接下来让我们看看如何在应用中集成 Facebook 功能，并与这个内置功能进行比较。\n\
    \n## Facebook 集成\n"
- fmt: "# Integrating Facebook with iOS\n\nIt is hard to say if Twitter integration\
    \ or Facebook integration is a more common request.\n\nThankfully, Facebook has\
    \ done the hard part when it comes to providing its own integration. Like Twitter,\
    \ Facebook provides a set of web services that can be used to integrate with their\
    \ Social Graph. But that's the hard way to do it; the easy way is to use a library\
    \ called the Facebook iOS SDK, also written by Facebook.\n\n## Getting Started\
    \ with the iOS and Facebook\n\nThe best place to start is to download the source\
    \ code from the project `facebook-ios-sdk` from GitHub. The project can be found\
    \ at:\n\nhttps://github.com/facebook/facebook-ios-sdk\n\nOnce downloaded, you\
    \ will find the code has been distributed as an Xcode project, making it easy\
    \ to open and explore. The easiest way to get the important code into your project\
    \ is to simply drag the file group named `FBConnect` from the Facebook project\
    \ to your project. Figure 9–13 shows the contents of the `FBConnect` project.\n\
    \n![Figure 9-13](images/00079.png)  \n![Figure 9-13](images/00114.jpeg)\n\n**Figure\
    \ 9–13.** *The important classes from the Facebook iOS Xcode project*\n\nIn Figure\
    \ 9–13, we see a number of files from the Facebook iOS project. The classes that\
    \ start with `FB` are Facebook specific, while the classes in the `JSON` group\
    \ are generic classes for dealing with JSON strings and are a dependency for the\
    \ Facebook classes. The file `FBConnect.h` is the main header file, and will be\
    \ the one you probably want to import. The class `Facebook` is the main class\
    \ for working with Facebook.\n\nGenerally, you create a singleton of this class\
    \ and do all Facebook related operations through it.\n\nBefore we can look at\
    \ the source code, though, we need to go to our Facebook account and create a\
    \ Facebook application.\n\n## Creating a Facebook Application\n\nThe Facebook\
    \ application can be thought of as the Facebook component of our application.\
    \ Facebook has us do this so there is an identity associated with any Facebook\
    \ action performed on behalf of the user. Facebook also uses the Facebook application\
    \ as a security context. When the user agrees to let our application make posts,\
    \ they are saying that our new Facebook application is allowed to make posts.\n\
    \n![Facebook Application](images/00149.png)  \n![Facebook Application](images/00320.jpeg)\n\
    \nFigure 9–14 shows the Facebook application I created for the sample game Belt\
    \ Commander.\n\n**Figure 9–14.** *Facebook application*\n\nIn Figure 9–14, we\
    \ see the settings page for a Facebook application. At item A, you can see the\
    \ App ID. We will use this value in our code when we create our `Facebook` object\
    \ and authenticate. At Item B, you will notice that Facebook wants you to add\
    \ the iOS Bundle ID. I don't know what it does with this information. When I was\
    \ developing the code for this chapter, I had the wrong value in there and everything\
    \ worked. Your mileage may vary. Creating a Facebook application is not hard,\
    \ but I don't want to document it here, because the process seems to change every\
    \ few months. Basically, you need to register your Facebook account as a developer\
    \ and add a new application. Directions can be found at https://developers.facebook.com/apps.\n\
    \nOnce you get the source code copied into your project and have created a Facebook\
    \ application, you are ready to start integrating Facebook into an application.\
    \ Let's take a look at authenticating our user next.\n\n## Facebook Authentication\n\
    \nIf you are using Facebook in a browser, you obviously authenticate through a\
    \ web page that is owned by Facebook. In this way, you are trusting that the password\
    \ information is going directly to Facebook and no one else. This makes a lot\
    \ of sense on the web, because you don't want other web sites handling your user's\
    \ credentials. Honestly, as an app developer, I am happy to never have to worry\
    \ about the user's credentials for a third-party service.\n\nHowever, when it\
    \ comes to developing applications outside of the browser, this authentication\
    \ mechanism can be a bit of a nuisance, since you have to bring up a browser window\
    \ to handle the authentication and then pass the appropriate authentication information\
    \ back to your application. It's a pain. To make life simpler, Facebook implements\
    \ all of this for you, and it's done in a way that enables single sign on for\
    \ the user. Meaning, if a user has already authenticated with Facebook through\
    \ another app that used the Facebook iOS SDK, they don't have to reenter their\
    \ username and password. However, the user still needs to grant your application\
    \ permissions.\n\nFigure 9–15 shows Facebook asking a user to grant permissions.\n\
    \n**Figure 9–15.** *Facebook asking a user to grant permission to an application*\n\
    \nIn Figure 9–15, we see a Facebook page in Safari asking for the user to grant\
    \ permissions to the Facebook application named Belt Commander. This web page\
    \ was brought up when the iOS application Belt Commander asked to authenticate\
    \ the user through Facebook. The Facebook code we included in our project will\
    \ use Safari to authenticate the user if the native Facebook application is not\
    \ installed; otherwise, the native one will be used. To enable Facebook to use\
    \ either the native Facebook application or Safari, our application must be registered\
    \ to open a URL containing our Facebook application ID.\n\n**NOTE:** If the application\
    \ is not configured to open a URL, then Facebook will fall back to using a `UIWebView`\
    \ in a popup within the application. I think the best user experience is to shoot\
    \ for either the native application or Safari, by making sure your application\
    \ will open the correct URL.\n\nWe will take another look at this in a bit.\n\n\
    ## Initializing Facebook\n\nBefore we can authenticate we have to create and initialize\
    \ our `Facebook` object so we can perform our authentication process. Let's take\
    \ a look at how we initialize Facebook in our application, as shown in Listing\
    \ 9–7.\n\n**Listing 9–7.** *RootViewController.m (initFacebook)*\n\n```\n-(void)initFacebook{\n\
    \n    facebook = [[Facebook alloc] initWithAppId:FB_APP_ID andDelegate:self];\n\
    \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n\n   \
    \ facebook.accessToken = [defaults objectForKey:@\"AccessToken\"];\n    facebook.expirationDate\
    \ = [defaults objectForKey:@\"ExpirationDate\"];\n\n}\n```\n\nIn Listing 9–7,\
    \ we see the task `initFacebook` that is called once when the parent `UIViewController`\
    \ is loaded. In this task, we create a new `Facebook` object by passing in an\
    \ `NSString` containing our application id and specifying `self` as the delegate.\
    \ After that, we pull two objects out of the standard user defaults: an access\
    \ token and an expiration date. These objects, if they exist, are from a previous\
    \ authentication session and will prevent the user from needing to authenticate\
    \ when we call authenticate later.\n\nThe delegate object passed to `initWithAppId:andDelegate:`\
    \ must conform to the protocol `FBSessionDelegate`, which defines the tasks `fbDidLogin`,\
    \ `fbDidNotLogin`, and `fbDidLogout`. For this example, we only care about `fbDidLogin`,\
    \ as shown in Listing 9–8.\n\n**Listing 9–8.** *RootViewController.m (fbDidLogin)*\n\
    \n```\n- (void)fbDidLogin{\n\n    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n\
    \n    [defaults setObject:facebook.accessToken forKey:@\"AccessToken\"];\n   \
    \ [defaults setObject:facebook.expirationDate forKey:@\"ExpirationDate\"];\n \
    \   [defaults synchronize];\n\n}\n```"
