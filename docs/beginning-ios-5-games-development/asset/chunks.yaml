    In Listing 8–16, we see the task pinchGesture: that is called whenever a pinch
    gesture is detected on the UIView actorsView. In this example, we are checking
    the state of the gesture recognizer. The state information indicates if the gesture
    has just started (UIGestureRecognizerStateBegan), is in progress (UIGestureRecognizerStateChanged),
    or has terminated (UIGestureRecognizerStateEnded or


    UIGestureRecognizerStateCancelled).


    When the gesture starts, we record the radius of saucer and store it in the variable
    startRadius. We also call setAnimationPaused: on saucer to stop if from animating
    while being scaled. It is not a requirement to stop the animation. We are simply
    doing this so we can observe the change of the gesture recognizer’s state as we
    play with the sample on our phone.


    When the gesture is in progress, we get the scale and velocity of the gesture.
    The scale value is the change in scale since the beginning of the gesture. To
    put it another way, the scale is accumulative, and that’s why we apply the scale
    to the startRadius and not to the current radius of saucer. Once we calculate
    our new radius, we apply that to saucer. The velocity is the scale factor per
    second. This value can be used to calculate how much drift to apply to an animation
    after the gesture is over. We are not using the value except to log it.


    When the gesture has ended, normally we simply set the animationPaused property
    of saucer to NO. This starts the saucer animating again. If the gesture was cancelled,
    we reset the saucer back to its original radius and un-pause the animation. To
    test the cancel state, start with the saucer scaled all the way down, start scaling
    it up with one hand while the other hand hits the power button at the top of the
    iPhone. This will kick you out of the application. Then re-launch the sample application
    and notice that the saucer is back at its original small scale.


    The pinch gesture is the first multi-state gesture we have looked at in this chapter.
    The next gesture we are going to look at is the pan or drag gesture, which is
    another multi-state gesture. We will see that it behaves in very much the same
    way as the pinch gesture.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00092.png)


    ![](images/00329.jpeg)


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **197**


    **Pan (or Drag) Gesture**


    A pan gesture is the kind of gesture you use in the Maps application to view different
    parts of the map. A drag gesture is also used to unlock the phone or pull down
    the notification center. If you think about it, these gestures are really the
    same thing; the user puts their finger down, moves it in a mostly straight line,
    and then lifts it. The difference is in how the application responds. We call
    it a pan gesture when the view pans over some content (e.g., a map or image).
    We call it a drag when you move a UI component on the screen (e.g., the knob of
    a slider). Regardless of what we call it in our description, this gesture is implemented
    with the class UIPanGestureRecognizer (sorry, drag). Figure 8–4 shows an example
    using UIPanGestureRecognizer.


    **Figure 8–4.** *Pan or drag example*


    In Figure 8–4 we see three asteroids. Each asteroid can be dragged up or down
    along an invisible path. When dragging an asteroid, you can move your finger all
    the way to the right or the left. This makes it a lot easier to use, because the
    user does not have to be too carful about where she moves the finger once she
    gets the desired asteroid moving.


    This simple example starts with the header file for the class PanGestureController,
    as shown in Listing 8–17.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00407.png)


    **198**


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **Listing
    8–17.** *PanGestureController.h*


