  trans: '

    # `CoinsControllerDelegate` 协议中定义任务的各个实现


    `GameController` 类对 `CoinsControllerDelegate` 协议中定义的任务的实现如代码清单 3–7 所示。当 `CoinsController`
    开始一个新游戏时，它会在委托对象上调用 `gameDidStart:with:`。在我们的场景中，我们需要确保剩余回合标签和得分标签反映了游戏的初始值。这些值几乎可以是任何内容，因为我们不知道是开始一个新游戏还是继续一个旧游戏。类似地，每当调用
    `scoreIncreases:with:` 和 `turnsRemainingDecreased:with:` 任务时，这些标签都会更新。


    最后，在代码清单 3–7 中，当游戏结束时，会调用 `gameOver:with:` 任务。在这个任务中，我们记录最高分并切换到最高分视图。由于我们允许游戏在横屏或竖屏模式下运行，游戏结束时手机可能处于横屏状态。如果是这种情况，我们需要确保界面方向正确，以便最高分视图能正确显示。一种实现方法是简单地重置
    `UIWindow` 的 `rootViewController` 属性。这将导致调用 `shouldAutorotateToInterfaceOrientation:`，从而确保我们的视图以正确的方向显示。


    ## `HighscoreController`：一个简单、可复用的组件


    `HighscoreController` 类负责管理用于显示最高分的视图以及持久化这些最高分。`HighscoreController` 是一个相当简单的类——该类的头文件如代码清单
    3–8 所示。


    **代码清单 3–8.** *HighscoreController.h*


    ```

    #define KEY_HIGHSCORES @"KEY_HIGHSCORES"


    #import <UIKit/UIKit.h>


    #import "Highscores.h"


    #import "Score.h"


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00447.png)


    **54**


    **第 3 章：探索游戏应用程序生命周期**


    @interface HighscoreController : UIViewController {


    IBOutlet UIView* highscoresView;


    Highscores* highscores;


    }


    -(void)saveHighscores;


    -(void)layoutScores:(Score*)latestScore;


    -(void)addScore:(Score*)newScore;


    @end

    ```


    如代码清单 3–8 所示，`HighscoreController` 有两个字段。第一个字段 `highscoresView` 是一个 `IBOutlet`。这是一个
    `UIView`，用于在屏幕上布局实际的分数。`UIView` `highscoresView` 被认为是 `UIViewController` 类自带的
    `view` 属性的一个子视图。它不必是直接子视图——只需出现在视图层次结构中的某个位置即可。这与我们之前看到的其他 `UIViewController`
    的模式略有不同。这样做是为了让 `HighscoreController` 的实例可以同时添加到 iPhone 和 iPad 的 XIB 文件中，并且可以在其中控制视图的布局。检查
    iPhone XIB 文件，你会看到最高分视图的布局直接定义在 `HighscoreController` 内部。


    字段 `highscores` 是 `Highscores` 类型。这是一个包含 `Score` 对象数组的简单类。在查看了 `HighscoreController`
    中定义的三个任务的实现之后，我们将仔细研究 `Highscores` 和 `Score` 类。


    ## `HighscoreController` 的实现与布局


    一旦应用程序为 `HighscoreController` 配置好了视图，最重要的任务就是 `addScore:` 任务。当游戏结束时，会调用此任务，应用程序应更新最高分视图并确保最高分信息被存储。代码清单
    3–9 显示了 `addScore:` 的实现。


    **代码清单 3–9.** *HighscoreController.m (addScore:)*


    ```

    -(void)addScore:(Score*)newScore{


    [highscores addScore:newScore];


    [self saveHighscores];


    [self layoutScores: newScore];


    }

    ```


    在代码清单 3–9 中，我们看到 `addScore:` 任务接受一个新的 `Score` 作为参数。`newScore` 对象被传递给对象 `highscores`
    的 `addScore:` 任务，在该任务中，如果它不够高而无法成为最高分，则会被丢弃，否则会被插入到 `highscores` 中存储的十个 `Score`
    的数组中。我们还看到，代码清单 3–9 中的任务调用了 `saveHighscores` 任务，然后通过调用 `layoutScores:` 来更新视图的布局。


    在查看保存最高分之前，我们先来看看视图是如何更新的。代码清单 3–10 显示了 `layoutScores:` 的实现。


    **代码清单 3–10.** *HighscoreController.m (layoutScores:)*


    ```

    -(void)layoutScores:(Score*)latestScore{


    for (UIView* subview in [highscoresView subviews]){


    [subview removeFromSuperview];


    }


    CGRect hvFrame = [highscoresView frame];


    float oneTenthHeight = hvFrame.size.height/10.0;


    float halfWidth = hvFrame.size.width/2.0;


    NSDateFormatter *dateFormat = [[NSDateFormatter alloc] init];


    [dateFormat setDateFormat:@"yyyy-MM-dd"];


    int index = 0;


    for (Score* score in [highscores theScores]){


    CGRect dateFrame = CGRectMake(0, index*oneTenthHeight, halfWidth,


    oneTenthHeight);


    UILabel* dateLabel = [[UILabel alloc] initWithFrame:dateFrame];


    [dateLabel setText: [dateFormat stringFromDate:[score date]]];


    [dateLabel setTextAlignment:UITextAlignmentLeft];


    [highscoresView addSubview:dateLabel];


    CGRect scoreFrame = CGRectMake(halfWidth, index*oneTenthHeight, halfWidth, oneTenthHeight);


    UILabel* scoreLabel = [[UILabel alloc] initWithFrame:scoreFrame];


    [scoreLabel setText:[NSString stringWithFormat:@"%d", [score score]]];


    [scoreLabel setTextAlignment:UITextAlignmentRight];


    [highscoresView addSubview:scoreLabel];


    if (latestScore != nil && latestScore == score){


    [dateLabel setTextColor:[UIColor blueColor]];


    [scoreLabel setTextColor:[UIColor blueColor]];


    } else {


    [dateLabel setTextColor:[UIColor blackColor]];


    [scoreLabel setTextColor:[UIColor blackColor]];


    }


    index++;


    }


    }

    ```


    来自代码清单 3–10 的任务 `layoutScores:` 接受一个 `Score` 对象作为参数。这个 `Score` 对象代表玩家最近获得的分数。这使得
    `HighscoreController` 能够将最新的分数标记为蓝色；其他分数将用黑色绘制。`layoutScores:` 中的第一个循环简单地删除了 `UIView`
    `highscoreView` 中的所有子视图。接下来的三行检查 `highscoreView` 的大小，并预先计算一些稍后会用到的尺寸值。


    `layoutScores:` 中的第二个循环遍历 `highscores` 对象中包含的所有 `Score` 对象。为每个 `Score` 创建两个 `UILabel`。第一个
    `UILabel` 称为 `dateLabel`，使用 `CGRect` `dateFrame` 创建，该 `CGRect` 定义了 `UILabel` 应绘制的区域。基本上，`dateFrame`
    指定了 `highscoreView` 上一行的左半部分。`dateLabel` 的文本基于 `Score` 对象的 `date` 属性设置。类似地，这个过程对
    `UILabel` `scoreLabel` 重复；但它将显示用户获得的分数，并放置在右侧。


    最后，我们检查正在显示的分数是否是对象 `latestScore`。如果是，我们将 `UILabel` 的颜色调整为蓝色。


    如果我们回顾一下代码清单 3–9，我们会看到在通过调用 `saveHighscores` 任务更新视图之前，最高分已经被保存，如代码清单 3–11 所示。


    **代码清单 3–11.** *HighscoreController.m (saveHighscores)*


    ```

    -(void)saveHighscores{


    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];


    NSData* highscoresData = [NSKeyedArchiver archivedDataWithRootObject: highscores];


    [defaults setObject:highscoresData forKey: KEY_HIGHSCORES];


    [defaults synchronize];


    }

    ```


    代码清单 3–11 中显示的 `saveHighscores` 任务负责归档 `highscores` 对象并将其写入到永久存储位置。这里的策略是将 `highscores`
    对象放入该应用程序的用户偏好设置中。这样，如果用户在同步 iTunes 后删除了应用程序，最高分也会被保留下来。为了获取用户的偏好设置，我们在 `NSUserDefaults`
    类上调用 `standardUserDefaults`。

