    \n## Responding to Changes in Orientation\n\nThe last thing we have to do is add\
    \ some logic that changes which `UIView` is displayed based on the orientation\
    \ of the device. The class `UIViewController` specifies a task that is called\
    \ when the device rotates. This tasks is called `shouldAutorotateToInterfaceOrientation:`\
    \ and it is passed a constant indicating the new orientation of the device. By\
    \ adding logic to this task, we can implement the type of behavior we want.\n\n\
    When a new `UIViewController` is created, an implementation of this task is included\
    \ in the implementation file. The work we did creating the subclasses of the `ViewController`\
    \ class and wiring up the XIB files allows us to use a single implementation of\
    \ the `shouldAutorotateToInterfaceOrientation:` task. So open `ViewController_iPad.m`\
    \ and `ViewController_iPhone.m` and delete the `shouldAutorotateToInterfaceOrientation:`\
    \ task implementation. This will insure that, on both devices, we will be using\
    \ the implementation from the class `ViewController`. Listing 2–7 shows the implementation\
    \ that gives us the behavior we want.\n\n**Listing 2–7.** *GameController.m (shouldAutorotateToInterfaceOrientation:)*\n\
    \n```objc\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientatio\n\
    {\n    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft ||\n  \
    \      interfaceOrientation == UIInterfaceOrientationLandscapeRight){\n\n    \
    \    [portraitView removeFromSuperview];\n        [self.view addSubview:landscapeView];\n\
    \        [rockPaperScissorsController setup:landscapeHolderView.frame.size];\n\
    \        [landscapeHolderView addSubview:rockPaperScissorsController.view];\n\n\
    \    } else {\n\n        [landscapeView removeFromSuperview];\n        [self.view\
    \ addSubview:portraitView];\n        [rockPaperScissorsController setup:portraitHolderView.frame.size];\n\
    \        [portraitHolderView addSubview:rockPaperScissorsController.view];\n \
    \   }\n\n    // Return YES for supported orientations\n    return YES;\n}\n```\n\
    \nIn Listing 2–7, we see that this task has passed the variable `interfaceOrientation`,\
    \ indicating the new orientation of the device. At the very end, we return `YES`,\
    \ because all orientations are supported. If you were creating a game that does\
    \ not support all orientations, you would return `NO` for the undesired orientations.\
    \ Before we return a value, we test `interfaceOrientation` to see if we are in\
    \ landscape or portrait orientation.\n\nBecause the device really has four orientations,\
    \ we have to compare `interfaceOrientation` to both landscape right and landscape\
    \ left. The right/left indicator is describing the position of the Home button.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00350.png)\n\n\
