    I said earlier, there is a lot more you can do with Facebook, and I encourage
    the reader to look into it.


    As we can see the Facebook API is not as easy to use as the built-in Twitter support.


    But I still think it is pretty easy once you work through it the first time. It
    will be interesting to see if Facebook gets the same sort of treatment as Twitter
    did by the iOS


    developers at Apple.


    **Summary**


    In this chapter, we explored Game Center and introduced what services it provides
    to the user. We explored those features in terms of GameKit to see how we can
    post the user’s score to a leaderboard and award achievements. Continuing with
    the social trend, we looked at the built-in support for Twitter in iOS 5\. Lastly,
    we looked at integrating Facebook into an iOS application. We covered how to handle
    authentication as well post a simple message to the users feed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00077.png)


    ![](images/00173.png)


    **10**


    ******Chapter**


    **Monetizing via the Apple**


    **App Store**


    There are three main ways to make money by having apps in the Apple App Store.
    The most obvious way is to simply charge for the application. The second is to
    give the app away for free, but include ads. Another way, which can work for free
    and paid apps, is to include things for sale within the app. These are called
    in-app purchases, and are very popular with some styles of games.'
