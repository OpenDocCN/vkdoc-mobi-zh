    ## Customizing Behavior Based on Device Type


    As mentioned, the project we are using is an example of a universal application,
    configured to run on both the iPhone and the iPad. Because it is likely that an
    application will want to do different things when running on different devices
    we will create subclasses of our `ViewController` specific to each device type.


    To create these subclasses, from the file menu, select new file. You will be presented
    with a dialog like the one shown in Figure 2–9.


    ![Figure 2-9](images/00020.png)


    From the Cocoa Touch section we want to select `UIViewController` subclass and
    hit next. This will allow use to name our new class and pick as specific subclass,
    as shown in Figure 2–10.


    ![Figure 2-10](images/00125.png)


    The name of the class should be `ViewController_iPhone` and it should be a subclass
    of `ViewController`. Remember that the class `ViewController` is a `UIViewController`,
    so `ViewController_iPhone` will be a `UIViewController` as well. In this example,
    we don’t want to have either check box checked, since we already have a XIB file
    to use with this class.


    We want to repeat the process and create an iPad version of our `UIViewController`.
    When you create that class, name it `UIViewController_iPad` and leave both check
    boxes unchecked. When you are done, your project should look like Figure 2–11.


    ![Figure 2-11](images/00182.jpeg)


    In Figure 2–11, we see our project and the new `UIViewController` subclasses we
    just created. To keep things organized I find it handy to put the device specific
    classes in their own group.


    Now we have XIB files and `UIViewController` classes for each type of device,
    iPhones and iPads. If we want to code that is shared behavior we will add it to
    the class `ViewController`. If we want to add code is specific to a particular
    device we would add it to either `ViewController_iPad` or `ViewController_iPhone`.
    Now we can move forward and start implementing our application, let’s look at
    the UI elements first.


    ## Graphically Designing Your UI in a Universal Way


    When building an app for both the iPhone and iPad, we must consider the differences
    in screen size for each device. Because the two devices do not share an aspect
    ratio, we should really create a layout for each device. In this section, we will
    cover how to create a layout for each device type, as well as create classes that
    will be used depending on which device the application is running on.


    Xcode provides a convenient and powerful tool for laying out the graphical elements
    of an application. Historically, that was done with the application Interface
    Builder, which was a stand-alone application. In recent versions of Xcode, the
    functionality of Interface Builder has been rolled into Xcode to provide a seamless
    development environment.


    Although Interface Builder is no longer its own application, I will continue to
    use the term to refer to the UI layout tools within Xcode. This will help us distinguish
    the code editing portions of Xcode from the WYSIWYG elements of Xcode.


    At its heart, Interface Builder is a tool for creating a collection of objects
    and a set of connections between those objects. These objects are UI components
    and objects that specify behavior or data. This collection of objects is saved
    in something called an XIB file. XIB files are read at runtime in order to instantiate
    the objects defined within. The objects that are produced are “wired up” and ready
    to be used by the application. For example, in Interface Builder, you can add
    a button to the scene and specify that it should call a task on a specific object
    when clicked. This is handy, because you don’t have to write the code that links
    the button with the handler object; everything is set up just as you defined it
    in the XIB file.


    **NOTE:** When searching for help on the Internet regarding Interface Builder,
    keep in mind that XIB files used to be called NIB files. Much of the information
    available uses this old term, but is still valid. The same is true of Interface
    Builder; articles on the old version still give valuable insight into the new
    version.


    ### A First Look at Interface Builder


    Under the iPhone group in the Project Explorer is a file called `ViewController_iPhone.xib`.
    This file contains the starting visual components used in this project when the
    application is running on an iPhone. Similarly, there is a file called `ViewController_iPad.xib`
    found under the iPad group, which is used when the application is running on an
    iPad. Let’s focus on the iPhone version for now to see what this file is and how
    it works. Click `ViewController_iPhone.xib` and you should see something like
    Figure 2–12.


    ![Figure 2-12](images/00151.png)


    In Figure 2–12, just to the right of the Project Explorer, is a view with four
    icons (A). These icons represent the root items in the XIB file. For more detail
    about the objects, click the little arrow at the bottom of the view (B). This
    will change the display so it matches the left most view in Figure 2–13. As the
    label indicates, the items under Object are the objects defined within this XIB
    file. The items under Placeholders describe relationships to objects not defined
    in this file. In practice, the item File’s Owner is a reference to the object
    that loads this XIB file; this is most often a subclass of `UIViewController`,
    but more on that later.'
