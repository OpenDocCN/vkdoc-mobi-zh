- fmt: "# 排版后内容\n\n在清单`3–1`中，我们导入了该项目中定义的另外三个类，其中包括对`UIKit`的默认导入语句。其余的`IBOutlet`语句都是基本声明，允许访问多个不同的视图。`IBOutletCollection`的定义为我们提供了一种新型的连接方式。`IBOutletCollection`的行为与`IBOutlet`非常相似，只是它允许你将多个项目连接到一个`NSArray`上。在示例中，我们有两个用于显示分数的标签：横屏和竖屏。我们不需要为每个标签都使用一个`IBOutlet`（和变量），而是可以简单地使用一个`IBOutletCollection`，这样在运行时，`NSArray\
    \ scoreLabels`将包含这两个标签。当需要用新分数更新用户界面时，我们只需更新数组`scoreLabels`中所有`UILabel`的文本。对于显示剩余回合数的标签，我们也遵循相同的模式，每个标签都存储在`NSArray\
    \ remainingTurnsLabels`中。\n\n**将视图显示在屏幕上**\n\n以上就是对不同视图如何定义的概述。现在，让我们来看看每个视图是如何显示到屏幕上的，首先从`Loading`视图开始。\n\
    \n我们知道，当应用加载时，会显示`GameController`类的主视图，就像第2章中一样。但是，`GameController`的主视图是空的——它实际上是应用的根组件。当我们在应用中切换视图时，我们将从这个根视图中添加和移除视图。清单`3–2`展示了`GameController`中的`viewDidLoad`任务，在该任务中，我们添加了希望用户看到的第一个视图。\n\
    \n**清单 3–2.** *GameController.m (viewDidLoad)*\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n    [self.view addSubview:loadingView];\n\n    NSOperationQueue\
    \ *queue = [NSOperationQueue mainQueue];\n    NSInvocationOperation *operation\
    \ = [[NSInvocationOperation alloc]\n                                        initWithTarget:self\
    \ selector:@selector(loadImages) object:nil];\n    [queue addOperation:operation];\n\
    \    [operation release];\n}\n```\n\n如清单`3–2`所示，当从XIB文件加载`GameController`实例时，会调用`viewDidLoad`任务。由于每个`MainWindow`XIB文件中都包含一个`GameController`实例，因此这会在应用启动时立即发生。在调用`viewDidLoad`的父类实现（这是必需的）之后，我们将`UIView\
    \ loadingView`添加到`GameController`类的主视图中。`addSubview:`任务会根据子视图的`frame`属性定义的位置和大小来显示新的子视图。由于`loadingView`是在XIB文件中定义的，因此其`frame`也在其中定义。\n\
    \n将`Loading`视图显示到屏幕上后，我们想要加载任何初始资源，以便防止在应用生命周期的后续阶段出现意外的暂停。从技术上讲，在这个应用中并不需要异步加载图像，但如果我们想显示进度条，则这是必需的。为了异步执行任务，我们通过调用`mainQueue`来获取主`NSOperationQueue`的访问权限。`NSOperationQueue`为我们的代码在另一个线程上执行工作提供了上下文。`NSInvocationOperation`类是一种定义工作单元的方式。在我们的示例中，工作单元是在`GameController`对象上调用`loadImages`任务。因此，我们通过调用`initWithTarget:selector:object:`任务并传入`self`、指向`loadImages`任务的选择器和`nil`来初始化一个`NSInvocationOperation`。最后，我们通过调用`addOperation:`并传入该`NSInvocationOperation`来开始执行。`loadImage`任务如清单`3–3`所示。\n\
    \n**清单 3–3.** *GameController.m (loadImage)*\n\n```\n-(void)loadImages{\n    //sleeping\
    \ so we can see the loading view. In a production app, don't sleep :)\n    [NSThread\
    \ sleepForTimeInterval:1.0];\n    [coinsController loadImages];\n    [loadingView\
    \ removeFromSuperview];\n    [self.view addSubview:welcomeView];\n}\n```"
