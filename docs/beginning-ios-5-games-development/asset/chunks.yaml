    is designed to outline how these supporting views are managed. Figure 3–1 is a
    flowchart of the views used in this game.


    **Figure 3–1.** *Coin Sorter application flow*


    In Figure 3–1, each rectangle is a view in the game. The arrows indicate the transitions
    between these views. Starting on the left, there is a box with the title Launch
    Image. This view is different from the others, as it is just a PNG file that is
