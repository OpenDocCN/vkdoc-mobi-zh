  raw: 'actorsOfType:. The task actorsOfType: is used inside of the


    applyGameLogic to find all Actors of a particular class. The type of actor requested
    needs to be specified during doSetup with the


    setSortedActorClasses: task.


    addActor:/removeActor:. The tasks addActor: and removeActor: are


    how actors get added and removed from the game. These tasks


    collect all Actors added or removed during an animation step and then applies
    those changes all at once at the end of the animation loop.


    This prevents modification of the collections that hold the actors, so any subclass
    of Actor or GameController can add or remove any Actor during their apply task.


    **Actor**


    The Actor class represents anything that is dynamic in a game. In our example,
    the ship, asteroids, saucers, power-ups, health bars, particles, and bullets are
    all actors. When creating a game, a subclass of GameController will handle the
    big details about the game, but it is the subclasses of Actor that provide the
    unique and interesting behaviors of each item in the game. In practice each Actor
    in the game is a composition of its properties, how it is drawn (Representation),
    how it behaves (Behaviors), and the custom code defined in a subclass. We will
    look at Representations and Behaviors after we look at the class Actor. The following
    is a list of the properties of an Actor and what each means.


    long actorId: The actorId is a unique number assigned to each actor.


    This value can be used to provide a soft reference to Actors in the game.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00425.png)


    **266**


    **CHAPTER 11: A Completed View Belt Commander**


    BOOL added/removed: The properties added and removed can be used to test if an
    Actor has successfully been added or removed from a game.


    CGPoint center: The property center defines the location of the center of the
    actor in game coordinates.


    float rotation: The rotation property indicates the rotation of the actor in radians.


    float radius: The radius of the actor describes how big it is.


    Together, center and radius describe the area of the game occupied by the Actor.


    NSMutableArray* behaviors: The behaviors property is a collection of Behavior
    objects. A Behavior object describes some sort of aspect of an actor. It might
    describe how it moves or when it is removed from the game. Each Behavior in the
    behaviors array will be applied to the actor on each step of the game.


    BOOL needsViewUpdated: Throughout a step of the game, an Actor may undergo changes
    that require its UIView to be updated. These might include advancing the image
    that should represent it or a change in state. This flag informs the GameController
    that work is required to synchronize the Actor with its representation.


    NSObject<Representation> representation: Each actor in the game requires an object
    conforming to Representation to describe how to create a UIView to represent it
    in the game. Representations are


    discussed in the next section.


    int variant: It is common to have Actors in a game that differ only slightly.
    Perhaps they are a different color or have a slightly different behavior. Since
    this is a common requirement, the property variant provides a simple way of distinguishing
    Actors of the same class.


    int state: The property state is used to describe the state of an


    Actor. This state can be anything, and is up to the subclass to define exactly
    what this indicates. The property state and variant work with the class ImageRepresentation
    to figure out which image should be


    used for an Actor.


    float alpha: The property alpha describes how opaque an Actor is.


    An Actor with an alpha of 0.0 is fully transparent, while an alpha value of 1.0
    is fully opaque. Transparent regions in an Actor’s


    representation are unaffected.


    BOOL animationPaused: The property animationPaused is used to


    pause any animation that is being applied to the actor. It is up to the implementation
    of the animation to honor this value.


    ImageRepresentation will not update the image, in a sequence of


    images, used to represent an Actor if this property is true.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00485.png)


    **CHAPTER 11: A Completed View Belt Commander**


    **267**


    In addition to the properties that define an Actor, there are a handful of tasks
    that come with the class Actor. These are the following:


    -(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius


    AndRepresentation:(NSObject<Representation>*)aRepresentation: This task is the
    designated constructor for the class Actor. It requires that each Actor has a
    center, a radius, and a representation. All subclasses of Actor should be sure
    that this task gets called when the Actor is created.


    -(void)step:(GameController*)controller: The task step: is called once per game
    step by the GameController. Subclasses of Actor can provide custom logic in their
    implementation of this task.


    -(BOOL)overlapsWith: (Actor*) actor: The task overlapsWith: is used to test if
    an Actor occupies any of the same space as another Actor. This can be used to
    implement simple collision detection.


    -(void)addBehavior:(NSObject<Behavior>*)behavior: The task addBehavior: is a utility
    method for adding Behaviors to an Actor in a single step.


    **Representation**


    Each Actor has to describe how the GameController should render it. The protocol
    Representation (defined in Actor.h) describes how a GameController can get and
    update a UIView for each Actor. There are two concrete implementations of Representation:
    ImageRepresentation and VectorRepresentation. The class ImageRepresentation uses
    UIImages and UIImageViews to create a UIView suitable for presenting the Actor.
    The class VectorRepresentation draws the Actor dynamically using Core Graphics.
    The details for how ImageRepresentation are covered in Chapter 6, while the implementation
    of VectorRepresentation is covered Chapter 7\. There are two tasks defined by
    the protocol:


    -(UIView*)getViewForActor:(Actor*)anActor


    In:(GameController*)aController: This task is called once shortly after an Actor
    is added to a GameController. It is responsible for creating and returning a UIView
    suitable for rendering the Actor.


    -(void)updateView:(UIView*)aView ForActor:(Actor*)anActor


    In:(GameController*)aController: This task is called whenever an Actor’s needsViewUpdated
    property is true. This task should make any changes to the UIView required to
    make it accurately represent the Actor.


    **Behavior**


    When creating a game, a lot of different Actors will require very similar code
    to implement. While it is definitely possible to construct a class hierarchy that
    provides just the right code for each class, I find this cumbersome. One solution
    to this is the Behavior protocol and the classes that implement it. Each instance
    of the protocol


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00023.png)


    **268**


    **CHAPTER 11: A Completed View Belt Commander**


    Behavior is responsible for applying some logic to an Actor one per step. The
    protocol Behavior defines a single a task:


    -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController; The task
    applyToActor:In: is implement by the classes that conform to this protocol to
    provide some sort of behavior to the Actors they are attached to. There are several
    implementations of Behavior included in the game Belt Commander, those are: LinearMotion:
    The class LinearMotion is used to move an Actor in a straight line during the
    game. The class provides several utility


    constructors to make it easy to define the motion based on a direction or a target
    point.


    ExpireAfterTime: The class ExpireAfterTime is used to remove an Actor after a
    given number of steps. This is handy for Particles, where you want to create them,
    add them to the scene and then forget about them.


    FollowActor: This class is used to keep one Actor at a fixed distant from anotherActor.
    This is used by the HealthBars attached to the Saucers to keep them together.'
