    **第8章：构建你的游戏：理解手势与运动** **响应加速计数据**


    作为一名开发者，能够获知设备的朝向对我来说非常酷。它让增强现实等应用成为可能，也带来了许多其他酷炫的功能。本章最后一个示例将使用加速计来操控场景中的角色。我不能保证它像增强现实游戏一样酷，但它应该能为其他开发者铺平道路。图8–9展示了正在运行的加速计示例。


    **图8–9.** *加速计演示的多个屏幕截图*


    在图8–9中，我们看到该示例的多个屏幕截图。在此示例中，`viper`的位置基于`x`和`y`加速计值，因此当iPhone平放时，飞船应位于游戏区域的中心。当设备向左倾斜时，飞船向左移动；当设备向上倾斜时，飞船向上移动，依此类推。图8–8突显了加速计数据的波动性。所有这些截图都是在尝试保持设备水平时拍摄的（尽管同时也在尝试截图）。对于实际应用，加速计数据需要经过平滑处理。


    负责我们示例的类是`AccelerometerController`，其头文件如`Listing 8–34`所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00209.png)


    **第8章：构建你的游戏：理解手势与运动** **213**


    **Listing 8–34.** *`AccelerometerController.h`*


    ```objc

    @interface AccelerometerController : GameController<UIAccelerometerDelegate>{


    Viper* viper;


    }


    @end

    ```


    在`Listing 8–34`中，我们看到了`AccelerometerController`类的头文件。需要注意的是，`AccelerometerController`类遵循`UIAccelerometerDelegate`协议，并且它有一个指向将在屏幕上移动的`Viper`的引用。遵循该协议允许`AccelerometerController`实时接收来自加速计的数据，我们稍后将看到这一点。我们首先来看看如何设置`AccelerometerController`类以使其接收数据，如`Listing
    8–35`所示。


