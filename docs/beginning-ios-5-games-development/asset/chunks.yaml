    \ Figure 2–15 shows this new `UIView` added to the `Portrait` orientation view.\n\
    \n**Figure 2–15.** *Holder views added to the iPhone’s XIB file*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00205.png)\n\n![](images/00483.jpeg)\n\n**32**\n\n**CHAPTER 2: Setting\
    \ Up Your Game Project**\n\nIn Figure 2–15, we see that we have added two new\
    \ `UIView` objects to the XIB file. The first one is called `Portrait Holder View\
    \ (A)` and the second is called `Landscape Holder View`. In the center of the\
    \ screen (B) we see that `Portrait Holder View` is 300x300 (C) points in size\
    \ and a darker color (red). `Landscape Holder View` is a sub view of `Landscape`\
    \ (not shown).\n\n## Add a UIViewController to a XIB\n\nThere is one last item\
    \ we need to add to the XIB file before we are done adding items. We need to add\
    \ a `UIViewController` that is responsible for the sub-views that will be displayed\
    \ in the holder views we just added. The `UIViewController` we are going to add\
    \ will be of the class `RockPaperScissorsController` as defined earlier in this\
    \ chapter. Figure 2–16 shows the XIB file with a new `UIViewController` added.\n\
    \n**Figure 2–16.** *RockPaperScissorsController added to XIB file*\n\nIn Figure\
    \ 2–16, we see that a `View Controller` was dragged from the library (A) to the\
    \ `Objects` section (B) and was set to be the class `RockPaperScissorsController`\
    \ (C). In this way, when this XIB file is instantiated, an instance of `RockPaperScissorsController`\
    \ will be created as well. This raises the question of how do we access the items\
