    It is constructed with the task followActor:, which takes the actor to follow
    as an argument.


    The task applyToActor:In: is called for every step of the game and is responsible
    for repositioning the actor this Behavior is associated with. To do this, we simply
    set the center of the Actor anActor to center of the actor we are following, adjusting
    by xOffest and yOffset. Looking at Listing 7–4, we see that the HealthBar is configured
    to follow the saucer at a xOffset equal to the radius of saucer. This keeps the
    HealthBar centered below saucer. Now let’s explore the Bullet class.


    **The Bullet Class**


    We have seen how the Saucer and the HealthBar classes work together. We now want
    to look at the Bullet class and understand why it behaves the way that it does.
