    **188**


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** is when
    two fingers either move closer or farther away from each other. The rotation gesture
    is when two fingers move on the screen like you are opening a bottle of ketchup.


    The swipe gesture is when one or more fingers are flicked across the screen, as
    if turning a page in a magazine. The pan gesture is similar to swipe, but slower
    and more deliberate. The long press gesture is much like a tap, but the finger
    is held to the screen longer.


    Each of these classes provides an easy way for a developer to request that a task
    be called should any of the gestures happen on a particular UIView. In addition
    to calling a task, each gesture happens over time and will be in one of several
    states as the callback task is called. These states are shown in Listing 8–7.


