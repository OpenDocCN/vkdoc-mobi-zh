- fmt: "# CHAPTER 10: Monetizing via the Apple App Store\n\n**245**\n\nstrings associated\
    \ with the purchase, allowing us to present language-appropriate text to the user\
    \ that matches exactly what was entered into iTunes Connect.\n\nContinuing with\
    \ the workflow shown in Figure 10–6, at some point the user will click a button\
    \ to purchase an item. When this happens, we simply create a payment request and\
    \ submit it, at which point the user will be prompted with a number of dialogs\
    \ confirming the purchase. If all goes well, we will get a callback letting us\
    \ know that purchase was successful. When this happens, we need to record that\
    \ the purchase has been made. We can do this simply by sticking the Product ID\
    \ in the standard `NSUserDefaults`, or we can do something more sophisticated,\
    \ like save it to a web service. The dialogs that the user must work through in\
    \ order to confirm a purchase are shown in Figure 10–7.\n\n**Figure 10–7.** *Making\
    \ a purchase*\n\nThe dialog on the upper left side of the figure will always be\
    \ shown, as well as the one on the lower right. The other two dialogs will be\
    \ shown between the first and last dialog if the user has to log in with his Apple\
    \ ID. It is important to remember that, as a developer, we have no control over\
    \ exactly which dialogs will be displayed or how long the user will take to complete\
    \ the process. It is important not to expect the user to complete this process\
    \ while the action of the game is in process.\n\nNow let’s look at a specific\
    \ example, where we implement the purchase of a non-consumable in-app purchase\
    \ for our game Belt Commander. We are going to implement the view from Figure\
    \ 10–1, where the user can select which actors are involved in the game and purchase\
    \ new actors to be made available.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00288.png)\n\n**246**\n\n## In-App Purchase Implementation\n\nAs\
    \ we discussed, the process of making a purchase is really just two calls to the\
    \ iTunes Store. We will see in this section that it really only involves a handful\
    \ of classes. In our example, we will be handling most of the details of working\
    \ with StoreKit and handling the UI in a single class called `ExtrasController`,\
    \ whose header is shown in Listing 10–1.\n\n**Listing 10–1.** *ExtrasController.h*\n\
    \n```objectivec\n@interface ExtrasController : UIViewController<SKPaymentTransactionObserver,\
    \ SKProductsRequestDelegate>{\n    GameParameters* gameParams;\n}\n\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *asteroidButton;\n@property (strong, nonatomic)\
    \ IBOutlet UIButton *saucerButton;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *powerupButton;\n\n-(void)setGameParams:(GameParameters*)params;\n\n@end\n```\n\
    \nIn Listing 10–1, we see the header for the class `ExtrasController`. The class\
    \ `ExtrasController` plays two roles: it manages the purchasing process and updates\
    \ the three buttons accordingly. The object `gameParams` is responsible for storing\
    \ which actors are enabled in the game and which purchases have been made. In\
    \ order to interact with StoreKit, `ExtrasController` conforms to the protocols\
    \ `SKPaymentTransactionObserver` and `SKProductsRequestDelegate`. These protocols\
    \ provide everything you need for your application to respond to interactions\
    \ with the store. We will see how `ExtrasController` implements the tasks from\
    \ these two protocols as we work through the code.\n\nThe first step when working\
    \ with StoreKit is to set up an object that responds to changes in the state of\
    \ purchases. We create an object that responds to changes in purchases by adding\
    \ an observer to the default `SKPaymentQueue`, as shown in Listing 10–2.\n\n**Listing\
    \ 10–2.** *ExtrasController.m (viewDidLoad)*\n\n```objectivec\n#define PURCHASE_INGAME_SAUCERS\
    \ @\"com.beltcommander.ingame.saucers\"\n#define PURCHASE_INGAME_POWERUPS @\"\
    com.beltcommander.ingame.powerups\"\n\n//….\n\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n\n    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\
    \n    //Get set of product ids\n    NSSet* potentialProcucts = [NSSet setWithObjects:PURCHASE_INGAME_POWERUPS,\
    \ PURCHASE_INGAME_SAUCERS, nil];\n```"
