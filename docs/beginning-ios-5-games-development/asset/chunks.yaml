    @end


    In Listing 7–7, we see that the class VectorRepresentation defines a protocol
    called VectorRepresentationDelegate to which each vector-based actor must conform.
    This protocol requires the task drawActor:WithContext:InRect: to be implemented
    by all classes that conform to it, and is where the actual drawing code should
    be placed.


    The class VectorRepresentation extends NSObject and conforms to the protocol Representation,
    just like the class ImageRepresentation does. The idea here is that most of code
    should not care which type of representation we use—vector or image. We simply
    create the correct Representation object and associate it with each actor.


    We also see that the class VectorRepresentation has a single property view of
    type VectorActorView. A VectorActorView is a subclass of UIView and will ultimately
    call the task drawActor:WithContext:InRect: as defined by the protocol


    VectorRepresentationDelegate. Before looking at the class VectorActorView, let’s
