- fmt: '# Monetizing via the Apple App Store


    ## Pricing and Availability


    Under the *Pricing and Availability* section of Figure 10–4, you must set the
    item as cleared for sale, at item D, for you to test the purchase. You must also
    specify a *Price Tier* at item E. The price tiers are the same as the tiers for
    an application, with the exception that there is no free tier.


    Once you have in-app purchases defined for your application, you must configure
    a test user so you can test your purchases. It is highly recommended that you
    test your in-app purchases before you submit your application.


    ## Creating a Test User


    Once you have in-app purchases defined, you will want to create a test user to
    "purchase" those items in your application. This gives you a chance to test enabling
    or disabling each purchased feature with the same workflow that a real user will
    experience. Figure 10–5 shows where you start the process of adding a test user
    in `iTunes Connect`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Figure 10–5: Creating a test user](images/00150.png)


    In Figure 10–5, we see the option to create a *Test User* from the *Select User
    Type* view. This view is available in `iTunes Connect` by clicking on the *Manage
    Users* button found on the home screen.


    **NOTE:** I am emphasizing the point about making sure you use a test user to
    debug your in-app purchases because trying to debug with a real user will confound
    your efforts.


    Once you click the *Test User* button shown in Figure 10–5, you will be prompted
    to create a new user. There should be nothing surprising—just keep in mind that
    you should not use an e-mail address that is currently an `Apple ID`.


    We have looked at adding in-app purchases to our application in `iTunes Connect`
    and how to make sure we have a test user to debug our application. Next, we will
    look how in-app purchases are integrated into `Belt Commander`, giving us an understanding
    of the classes involved and how to use them.


    ## Classes and Code for In-App Purchases


    Creating in-app purchases in `iTunes Connect` is just the first step in actually
    having in-app purchases available in your application. The next step is to understand
    the process of how in-app purchases are actually purchased and what classes are
    involved. The framework that contains the pertinent classes is called `StoreKit`,
    and is available as part of your `iOS SDK` installation. Using these classes,
    we are going to implement the workflow as shown in Figure 10–6, which shows the
    process of determining which products are available and how to handle the request
    to make a purchase.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Figure 10–6: Purchase Process](images/00013.png)


    Starting at the top-left of Figure 10–6, we begin by getting a set of *Product
    IDs* for products we want to present to the user. This list might come from an
    external web service or just be a hardwired set of strings in the application.
    How you get this list will depend on how you are managing what is for sale in
    your app. If you are adding new products all the time, you probably want to pull
    the list of products from a web service. If you are just getting started with
    in-app purchases, a fixed list might work for you, but you will have to update
    your app to change the list.


    Once we have our list of possible *Product IDs*, make a request to the `iTunes
    Store`, asking which of the IDs we have passed along are valid and ready for sale.
    The IDs returned from the `iTunes Store` represent the items we want to make available
    to the user. The `iTunes Store` will not return *Product IDs* that are unknown
    or not ready for sale. This ensures we are presenting only valid items that have
    gone through Apple''s review process. In addition to letting us know that the
    IDs are valid, the `iTunes Store` also returns the localized


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Additional image](images/00372.png)'
