    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** **189**


    **Tap Gestures**


    Tap gestures are used throughout iOS. From launching an application to dropping
    a pin in the Maps application, tap gestures are the backbone of the iOS interface.
    This makes sense, because they are very similar to mouse clicks on desktop operating
    systems.


    There are similarities between the tap gesture and the mouse click; for example,
    launching an application from the system dock in OS X is done with a single click,
    while launching an iOS application is done with a single tap. The analogy continues
    if we consider the “secondary click” (also known as a control click or right click)
    on OS X; this is similar to the two-finger tap in iOS. In fact, if you are using
    a Mac laptop, the touch pad can be configured to treat a two-finger tap as a “secondary
    click.”


    For this example, we are going to configure a bunch of UITapGestureRecognizers
    to respond to different combinations of tap counts and the number of fingers involved
    (touches). Figure 8–2 shows this example in action.


    **Figure 8–2.** *Power-ups activated by tap gestures*


    In Figure 8–2, we see 12 power-ups organized into three columns and four rows.
    The power-ups start disabled, like the one in the lower right. When the user taps
    the screen, a power-up enables, becoming brighter and spinning. The power-up that
    is enabled is based on the number of fingers used in the gesture and whether one,
    two, or three


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00336.png)


    **190**


    **CHAPTER 8: Building Your Game: Understanding Gestures and Movements** fingers
    are used. For example, a two-finger triple tap enabled the right-most power-up
    on the second row. Similarly, a three-finger single tap enabled the left-most
    power-up on the third row. So, in short, the columns show the number of taps and
    the rows the number fingers involved. If you want to waste an hour of your life,
    try and get all of the power-ups spinning. I *think* I got it to happen, but I
    could not get a screenshot in time to prove it.


    This demo is implemented in the class TapGestureController. Listing 8–8 shows
    the file TapGestureController.h.


