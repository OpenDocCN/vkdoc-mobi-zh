    In Listing 10–2, we see the task viewDidLoad for the class ExtrasController. In
    this task, we start by simply getting the default SKPaymentQueue by calling defaultQueue,
    adding self as an observer. Because self conforms to the protocol


    SKPaymentTransactionObserver, our ExtrasController will be informed of all changes
    in state for a purchase. Once we have a registered observer, we create a set of
    known product IDs. In this case, the NSSet potentialProducts is created from two
    constants: PURCHASE_INGAME_POWERUPS and PURCHASE_INGAME_SAUCERS. As we can see,
    these constants are the same strings that we specified when we created the products
    in iTunes Connect.


    Once we have specified our set of potential products we create an SKProductsRequest,
    set self as the delegate, and call start on it. While StoreKit is working out
    which Product IDs are valid, we call setGameParams and specify that we should
    use the GameParameters object we have stored the default NSUsersDefaults. When
    StoreKit has its results, the tasks productsRequest:didReceiveResponse:, as shown
    in Listing 10–3.


    **Listing 10–3.** *ExtrasController.m (productsRequest:didRecieveResponse:)*


    - (void)productsRequest:(SKProductsRequest *)request


    didReceiveResponse:(SKProductsResponse *)response {


    for (SKProduct* aProduct in response.products){


    if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_SAUCERS]){


    [saucerButton setEnabled:YES];


    [saucerButton setHidden:NO];


    }


    if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_POWERUPS]){


    [powerupButton setEnabled:YES];


    [powerupButton setHidden:NO];


    }


    }


    }


    In Listing 10–3, we see the task productsRequest:didReceiveResponse: that gets
    called when we have a valid set of Product IDs. In this task, we simply iterate
    over all of the products returned and make our buttons visible for purchasing
    saucers and power-ups.


    In this way, we make sure the user only sees viable purchase options.


    We have looked at how we figure out which purchase are valid. Before we look at
    how purchases are actually made, we should look at the class GameParameters. The
    class GameParameters is responsible for storing which products have already been
    purchased and which actors the users wants in their game.


    **Driving the UI from Existing Purchases**


    The three buttons, shown in Figure 10–1, allow the user to select which actors
    are available in the game. The same UI allows the user to purchase new actors.
    In order to keep track of this information we have created the model class GameParameters,
    whose header is shown in Listing 10–4.


