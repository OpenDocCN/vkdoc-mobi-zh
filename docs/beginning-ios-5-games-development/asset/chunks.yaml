    ## Building the Game Coin Sorter


    Thus far we have looked at some of the finer points of getting content onto the
    screen.


    In previous chapters, we explored the role of the controller classes and how they
    manage the relationship between data and the view. The last step in creating the
    game Coin Sorter is combining these concepts. This section will walk through the
    life cycle of the `CoinController` class, touching on the basic concepts we have
    explored. Figure 4–6 shows just the area of the screen controlled by the class
    `CoinController`.


    In this five-by-five grid of coins, the user can select two coins to trade places.
    The goal is to create rows or columns of like coins to create a matching set.
    When a match is created, the coins are animated on the screen, and the user’s
    score is increased. The user has 10 turns to make as many matches as possible.
    Figure 4–7 shows the life cycle of the game.


    **Figure 4–6.** *CoinController’s view*


    Figure 4–7 shows the flow of the application for a single game. After setup, the
    application waits for the user to select a coin. If a first coin is not selected,
    the application simply keeps track that the coin was selected and goes back to
    waiting for the user. When the user selects a coin a second time, the application
    checks whether the coin just selected is the same coin as the first one selected.
    If so, the application unselects the coin. This allows the user to change his
    mind. If the user selects a different coin, the game state updates by modifying
    the `CoinGame` object, and animations are created, showing the two coins trading
    places. When the coin-swapping animation is done, the application checks whether
    any matches exist. If so, it animates their removal and updates `CoinGame` with
    new coins to replace those just removed. Because adding new coins could create
    additional matches, the application checks again for matches.


    This process could theoretically go on forever, but in practice it does not. Eventually,
    there will be no matches to remove.


    When there are no matches, the application checks whether the user has any turns
    remaining. If the user does, it goes back to waiting for the user’s input. If
    the user does not, the game is over.


    **Figure 4–7.** *Coin Sorter life cycle*


