    \n从iPhone 4开始，iOS设备内置了加速度计和陀螺仪传感器。在应用程序中使用这些传感器有几种方法。最常见的两种方法是简单地对运动事件做出响应，这对应于摇动设备。另一种更精细的方法是通过`UIAccelerometer`类直接访问这些传感器的方向数据。让我们先看一下摇晃示例。\n\
