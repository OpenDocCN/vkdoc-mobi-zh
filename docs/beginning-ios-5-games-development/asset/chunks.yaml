    # 第 10 章：通过 Apple App Store 实现盈利


    本章将不会探讨如何打造优质的应用内购买项目，也不讨论你的应用应该免费还是收费。本章将介绍设置应用内购买的基本知识，并解释可用的不同类型购买项目。


    ## 应用内购买


    应用内购买是指应用内可供付费获取的虚拟物品或服务。许多不同类型的应用——不仅仅是游戏——都利用应用内购买来盈利。一些非游戏例子包括下载文章或漫画、烹饪食谱以及详细的地图数据。一些游戏内的例子包括额外关卡、新能力、额外游戏币以及用于定制游戏外观的新奇物品。


    我们将继续使用《Belt Commander》游戏中的示例代码。在图 10-1 中，你可以看到《Belt Commander》的应用内购买选项。


    在图 10-1 中，我们看到一张来自《Belt Commander》游戏的截图。这里有三个按钮，每个按钮指定了游戏运行时应该出现哪种类型的角色。游戏默认带有小行星；右侧的两个按钮用于购买游戏中额外的角色类型。中间的按钮是飞碟，它已被购买但不会包含在下一局游戏中（未激活）。最右边的按钮表示用户可以选择购买在游戏中加入增强道具角色的能力。用户通过点击该按钮并完成购买对话框流程来发起购买。


    L. Jordan, *Beginning iOS 5 Games Development* © Lucas Jordan 2011 [www.it-ebooks.info](http://www.it-ebooks.info/)


    **图 10-1.** *《Belt Commander》中的应用内购买*


    在实现这些功能之前，我们将先了解可用的不同类型的应用内购买，以及如何在我们应用中启用应用内购买。


    ## 购买类型概述


    共有四种不同类型的应用内购买，每种都支持不同的业务需求。如果这四种应用内购买类型不适合你的业务需求，你将不得不自行开发。编写自己的应用内购买服务可能会非常耗时。我建议看看能否调整你的业务需求以适应苹果的模型。这样做的好处不仅在于缩短开发时间，而且对用户也有利。当你使用苹果系统时，你的用户将看到一个熟悉的界面，并使用一组熟悉的凭据登录：他们的
    Apple ID。四种应用内购买类型如下：


    - 非消耗型

    - 消耗型

    - 订阅

    - 自动续期订阅


    让我们仔细看看这四种应用内购买类型中的每一种。


    ### 非消耗型


    非消耗型应用内购买是指一次性购买、并授予对某个物品或服务的持久访问权限的项目。非消耗型物品可被用户重新下载，并且应可在用户的所有设备上使用。非消耗型购买可以包括额外的游戏关卡、新型敌人或用于定制用户游戏角色的搞笑帽子。


    ### 消耗型


    消耗型应用内购买旨在支持会被消耗的物品或服务。在游戏中，这可能包括额外的生命值、用于购买游戏内物品的点数或其他可被用完的东西。消耗型购买被设计为可重复进行。


    消耗型购买无法再次下载，因此其性质决定了它们无法在用户的设备间通用，除非你实现自己的服务器来跨账户共享此信息。


    ### 订阅


    订阅是有时间限制的购买。在给定时间后，用户将不再能访问该购买项目。这些类型的购买可能包括对文章、位置信息或其他一些有价值数据集的访问权限。订阅购买无法重新下载，如果在设备恢复后（备份失败时）或用户在另一台拥有的
    iOS 设备上，必须重新购买才能获得相同的服务。


    ### 自动续期订阅


    自动续期订阅是对在特定期限内可使用的物品或服务的购买，与常规订阅非常相似。区别在于自动续期订阅是可重新下载的。它们代表对一项与用户（而非设备）关联的服务的访问权限。用户可以在他们拥有的任何
    iOS 设备上访问此购买项目。


    现在，让我们看看让应用准备支持应用内购买需要什么条件。


    ## 准备应用内购买


    与 Game Center 非常相似，必须在 iTunes Connect 中启用应用内购买功能的应用才能包含内购项目。要求完全相同：你必须使用不带通配符的
    App ID。在第 9 章中，我们介绍了在配置中心创建可与 Game Center 配合使用的 App ID 的流程。你可以按照说明创建第二个 App ID，或者直接为同一个游戏添加应用内购买功能。


    ## 启用与创建应用内购买


    一旦你在 iTunes Connect 中拥有一个应用，启用应用内购买可通过点击“管理应用内购买”按钮来完成，如图 10-2 所示。


    **图 10-2.** *在 iTunes Connect 中启用应用内购买*


    在图 10-2 中，我们看到 iTunes Connect 中用于配置应用的视图。项目 A 显示了用于启用应用内购买的按钮。点击此按钮后，你将能够向应用添加可供用户购买的项目。图
    10-3 展示了我为《Belt Commander》准备的项目。


    **图 10-3.** *《Belt Commander》可用的应用内购买*


    在图 10-3 中，我们看到了 iTunes Connect 中列出应用内购买项目的界面。我们可以看到我们添加了两个项目：分别对应玩家可以添加到游戏中的每种额外角色类型。对于每个应用内购买项目，我们都能看到参考名称、产品
    ID、产品类型以及产品状态。参考名称用于内部管理——用户不会看到它。产品 ID 是一个在所有 iOS 应用中唯一的名称，用于标识该购买项目。产品 ID 将是在代码中引用此购买项目的方式。


    类型指的是我们之前讨论过的不同购买类型——在这个例子中是非消耗型。状态值指示了该应用内购买项目需要满足什么条件才能被苹果接受。苹果必须审核你创建的每个应用内购买项目，就像每个应用在销售前都必须经过审核一样。在此例中，我们被告知苹果正在等待该购买项目的截图，之后才会进行审核。这些截图不会展示给用户——它们只是向苹果提供关于该应用内购买项目的背景信息。在图
    10-4 中，我们看到了 iTunes Connect 中用于创建新应用内购买项目的界面。


    **图 10-4.** *一个新的应用内购买项目*


    图 10-4 中的项目 A 处是我们输入应用内购买项目参考名称的地方。项目 B 处显示了该应用内购买项目的产品 ID。为了创建应用内购买项目，你必须通过点击“添加语言”按钮（项目
    C）为该应用内购买项目提供本地化字符串。

