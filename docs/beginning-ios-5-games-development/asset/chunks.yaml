    \n} else {\n\n`SKPayment* payRequest = [SKPayment paymentWithProductIdentifier:PURCHASE_INGAME_SAUCERS];`\n\
    \n`[[SKPaymentQueue defaultQueue] addPayment:payRequest];`\n\n}\n\n}\n\n在列表 10-7\
    \ 中，我们看到当用户点击飞碟按钮时调用的任务`saucerButtonClicked`。如果我们已经购买了飞碟功能，我们知道用户只是想切换是否包含飞碟。我们通过翻转`includeSaucers`的值、调用`setGameParams`更新\
    \ UI 以及将更改写入磁盘来响应。如果用户尚未购买飞碟功能，我们知道她想要进行购买。为了启动此过程，我们只需使用相应的产品 ID 创建一个`SKPayment`对象，并将该`SKPayment`对象添加到默认的`SKPaymentQueue`。\n\
    \n这会触发对话框流程，如图 10-7 所示。管理能量增强的代码与列表 10-7 中的代码几乎相同，不值得深入研究。\n\n接下来，让我们看看如何响应成功购买。\n\
    \n## 响应成功购买\n\n为了响应成功购买，我们必须在列表 10-2 中向默认的`SKPaymentQueue`添加一个`SKPaymentTransactionObserver`实例。现在我们准备查看当`SKPaymentQueue`成功处理购买时调用的代码，如列表\
    \ 10-8 所示。\n\n**列表 10-8.** *ExtrasController.m (paymentQueue: updatedTransactions:)*\n\
    \n```\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
    \ *)transactions{\n    for (SKPaymentTransaction* transaction in transactions){\n\
    \        if (transaction.transactionState == SKPaymentTransactionStatePurchased\
    \ ||\n            transaction.transactionState == SKPaymentTransactionStateRestored){\n\
    \            NSString* productIdentifier = transaction.payment.productIdentifier;\n\
    \            [[gameParams purchases] addObject: productIdentifier];\n        \
    \    [gameParams writeToDefaults];\n            [self setGameParams:gameParams];\n\
    \            [queue finishTransaction:transaction];\n        }\n    }\n}\n```\n\
    \n在列表 10-8 中，我们看到由`ExtrasController`类实现的任务`paymentQueue:updatedTransactions:`。在此任务中，我们遍历数组`transactions`中的每个`SKPaymentTransaction`。对于每个`SKPaymentTransaction`，我们检查其状态是否为`SKPaymentTransactionStatePurchased`或`SKPaymentTransactionStateRestored`。如果是，我们将交易的产品\
    \ ID 添加到`gameParams`的`purchases`属性中并保存。我们还通过调用`setGameParams:`更新 UI。最后，我们通过调用`finishTransaction:`通知队列我们已经完成该交易的处理。\n\
    \n从技术上讲，如果任务`paymentQueue:updatedTransactions:`是由于用户进行新购买而被调用，则交易的状态将是`SKPaymentTransactionStatePurchased`。但由于我们使用的产品类型是非消耗品，我们需要确保用户在其设备重置或他在其他\
    \ iOS 设备上进行了购买时能够恢复其购买。为了处理这个问题，我们确保允许交易状态为`SKPaymentTransactionStateRestored`，并像对待新购买一样对待它。为了允许用户恢复，我们提供了一个恢复购买按钮，该按钮会调用列表\
    \ 10-9 中的代码。\n\n**列表 10-9.** *ExtrasController.m (restorePurchasesClicked:)*\n\
    \n```\n- (IBAction)restorePurchasesClicked:(id)sender {\n    [[SKPaymentQueue\
    \ defaultQueue] restoreCompletedTransactions];\n}\n```\n\n在列表 10-9 中，我们看到当用户点击恢复购买按钮时调用的任务`restorePurchasesClicked`。在此任务中，我们只需在默认的`SKPaymentQueue`上调用`restoreCompletedTransactions`。这会使\
    \ StoreKit 联系 iTunes Store，并为当前应用和用户重新下载所有产品 ID。\n\n完成后，它会调用`paymentQueue:updatedTransaction:`，如列表\
    \ 10-8 所示。这就是允许用户访问其购买所需的所有操作。\n\n## 总结\n\n在本章中，我们回顾了应用内购买的概念及其四种不同类型。我们还研究了如何在我们的游戏《Belt\
    \ Commander》中实现应用内产品的购买。我们回顾了如何从 iTunes Store 获取有效的产品 ID 列表，以及如何基于该列表创建 UI。我们还研究了如何触发购买过程，以及如何响应成功完成，同时牢记如何为用户存储购买记录。\n\
    \n---\n\n## 第 11 章\n\n# 完成的视图：Belt Commander\n\n在本书中，我们介绍了构建 iOS 游戏的多种技术。\n\n\
    我们在第 3 章中学习了如何构建游戏的基本应用流程。在第 4 章中学习构建简单的回合制游戏时，我们研究了《Coin Sorter》。接着，我们在第 5 章中进入了逐帧游戏，学习了如何构建不断运动的游戏。在第\
    \ 6 章和第 7 章中，我们探讨了如何创建不同类型的角色来填充我们的游戏。第 8 章涵盖了如何捕捉用户输入以操控游戏元素，而第 9 章则介绍了如何通过 Game\
    \ Center 和其他社交服务与玩家互动。在第 10 章中，我们讨论了如何添加应用内购买以通过游戏盈利。\n\n在本章中，我们将把所有这些元素整合起来，创建一个完整的游戏《Belt\
    \ Commander》。标题图形如图 11-1 所示。\n\n**图 11-1.** *Belt Commander 的标题图形*\n\n在本章中，我们将从高层视角审视《Belt\
    \ Commander》游戏。我们还将逐步讲解游戏是如何组合起来的，包括视图的组织方式以及应用游戏逻辑的实现方式。我们将讨论游戏中的不同角色及其添加方式。从某些方面来说，本章是对前几章所学技术的回顾。然而，探索这些技术如何融合在一起，将为你提供构建自己游戏的路线图。事实上，你可以随意使用本章的示例代码来开始自己的游戏。我本人也打算这样做，并在\
    \ iTunes Store 中发布《Belt Commander》的商业版本。那么，让我们开始吧。\n\n*L. Jordan, 《Beginning iOS\
    \ 5 Games Development》* © Lucas Jordan 2011\n\n---\n\n## Belt Commander：游戏回顾\n\
    \n《Belt Commander》是一款动作游戏，在游戏中你控制一艘穿越小行星带的飞船。摧毁小行星和外星飞碟可以为玩家赢得积分。在游戏过程中，偶尔会有一个能量增强道具飘到屏幕上，让玩家有机会恢复一些损伤、赚取额外积分或升级武器。这是一款节奏相对较快、交互简单的游戏。让我们看一下游戏的开始画面，如图\
    \ 11-2 所示。\n\n**图 11-2.** *Belt Commander 的开始画面*\n\n在图 11-2 中，我们看到了游戏的第一屏。屏幕顶部有一个标题以及多个按钮。Facebook、Tweet\
    \ 和 Leaderboards 按钮启用了我们在第 9 章中讨论的各种社交功能。Extras 按钮允许用户配置游戏并购买游戏的新部分。购买的处理方式在第\
    \ 10 章中已有描述。对于本章，我们将假设所有额外内容都已购买。Play 按钮将带用户进入游戏的动作部分，如图 11-3 所示。\n"
- fmt: '### Figure 11–3. *Belt Commander in action*


    In Figure 11–3, we see the action part of the game. On the left is the spaceship
    controlled by the user. The user can tap on the screen and the ship will travel
    up or down to the location of the tap. This is how the user can avoid the many
    asteroids that travel from the right side of the screen to the left. In addition
    to the asteroids, there are alien saucers that travel up and down on the screen
    shooting bullets at the user’s ship.


    Both the asteroids and the saucer’s bullets do damage to the ship when they hit.
    The game continues until the ship is overwhelmed with damage. To help the player
    along, power-ups appear on the right and travel to the left. If the user can intercept
    a powerup, he receives whatever bonus it gives: health, more damage, or extra
    points.


    In the lower right-hand side of the Figure 11–3, we see a pause button (II). This
    will pause the game and allow the user to quit or continue playing, as shown in
    Figure 11–4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00427.png)


    ![](images/00127.jpeg)


    ![](images/00335.jpeg)


    **CHAPTER 11: A Completed View Belt Commander**


    ### Figure 11–4. *Belt Commander on pause*


    In Figure 11–4, we see the dialog that pops up when the user clicks the touch
    button on the lower right of the screen. This dialog allows the user to exit the
    game by clicking Yes, or to continue by clicking No. If the user is playing the
    game and the application is sent to the background by another app starting, this
    dialog will be presented when the user brings the game back up. When the user
    has no health left, the game is over. The dialog shown in Figure 11–5 appears.


    ### Figure 11–5. *Game over*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00140.png)


    ![](images/00063.jpeg)


    **CHAPTER 11: A Completed View Belt Commander**


    In Figure 11–4, we see the dialog presented at the end of the game. This dialog
    allows the user to get right back into the action by clicking Yes. If the user
    clicks No, she is sent back to the starting screen of the game. The entire application
    flow is shown in Figure 11–6.


    ### Figure 11–6. *Application flow*


    In Figure 11–6, we see the eight screens of the game. The arrows indicate how
    the user navigates from one view to another. Each transition is lettered as described
    in the following:


    The application starts at A, the start view. This is the first thing the user
    sees.


    By pressing the Extras button, the user is taken to the extras view, where they
    can select which actors are in the game: asteroids, saucers, and power-up. They
    return to the start view by clicking the Back button.


    Clicking the Leaderboard button brings up the standard leaderboard view. Clicking
    Done on the upper right returns the user to the start view.


    The Tweet button brings up the Twitter dialog. While not technically a separate
    view, since the Tweet dialog is a pop-up, it still takes up most of the screen.
    The Send or Cancel button returns the user to the start view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00384.png)


    **CHAPTER 11: A Completed View Belt Commander**


    Clicking the Facebook button will exit the app and bring up a Facebook authentication
    screen. When the user enters his credentials, he is brought back to the start
    view.


    Clicking the Play button starts the game proper. In the action view, the user
    plays the game. They move the ship up and down, trying to score as many points
    as possible by destroying asteroids and saucers.


    While playing, the user may click the pause button to stop the game. When the
    pause button is pressed a dialog pops up asking the user if they would like to
    exit the game or not. This dialog is also brought up if the application is sent
    to the background while the game is in progress.


    When the ships health reaches zero the game ends. When this happens a dialog is
    presented asking the user if they would like to play again or not.


    If the user has paused the game and selected not to end it, she is brought back
    to the start view. Similarly, when the game is over, if the user chooses not to
    play again, she is brought back to the main view.


    We have looked at the views that make up the game and have a sense of how the
    game flows from view to view. Next, let’s take a look at how this navigation is
    implemented, starting with the XIB files that make up the game.


    ## Implementing View-to-View Navigation


    We have gone over the views involved in Belt Commander. Let’s take a closer look
    at the how the game is initialized, at the XIB files that make up the game, and
    how we handle navigation programmatically. This information will help you when
    you are building your own game, as there are a number of different techniques
    at work here. Let’s start by looking at how we launch the application.


    ### Launching the Application


    Like all iOS applications, the starting place is the `main` function found in
    the file `main.m`.


    However, in this application, we don’t customize that at all, so we can skip describing
    it.


    The real starting place for this application is the plist file, `Belt Commander-Info.plist`.


    Figure 11–7 shows Xcode’s representation of this file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00016.png)


    ![](images/00097.jpeg)


    **CHAPTER 11: A Completed View Belt Commander**


    ### Figure 11–7. *Belt Commander-Info.plist in Xcode*


    In Figure 11–7, we see file `Belt Commander-Info.plist` as presented by Xcode.
    In this file, we see a pretty standard setup for an iOS application. We see that
    the Bundle identifier is `com.claywaregames.beltcommander` that corresponds to
    the application we created in iTunes Connect that supports in-app purchases and
    Game Center. What is a little different in this file from the other samples in
    this book is that we are specifying the starting XIB files in this file. The starting
    XIB files are indicated by the key values `Main nib file base name (iPad)` and
    `Main nib file base name (iPhone)`. These keys are set to the values `Window_iPad`
    and `Window_iPhone`, respectively. By setting these values, we are requesting
    that the iOS application automatically use these files to create our main `UIWindow`
    and call `makeKeyAndVisible` on it. This removes the need for us to put any code
    in our application delegate’s `application:didFinishLaunchingWithOptions:` task.


    To understand how the other objects in the application relate to each other, let’s
    take a look at XIB files for this game.


    ### The XIB Files


    The XIB files in this application bind instances of the key classes together and
    allow them to coordinate. While this application is a universal one and runs on
    both the iPhone and iPad, we are just going to focus on the iPhone XIB file, because
    the iPad version is different only in layout. By looking at the contents of this
    XIB file, we will understand how the application is put together. An overview
    is shown in Figure 11–8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00195.png)


    ![](images/00260.jpeg)


    **CHAPTER 11: A Completed View Belt Commander**


    ### Figure 11–8. *Overview of iPhone XIB file*


    In Figure 11–8, we see the XIB file for the iPhone version of this game fully
    expanded.


    On the left, at item A, we see a reference to the main `UIWindow` of the game
    as well as a reference to the `AppDelegate`. The view controller at item B is
    an instance of the class `RootViewController`, which is a subclass of `UINavigationController`.
    The view controller `Root View Controller` is wired up to the Window so that it
    is the root controller; this causes the `Root View Controller`’s top-level `UIViewController`
    to be displayed. In short, everything is wired up so the view at item E is displayed
    at launch.'
