    In order to respond to a successful purchase, we had to add an instance of SKPaymentTransactionObserver
    to the default SKPaymentQueue back in Listing 10–2\. We are now ready to look
    at the code that gets called when the SKPaymentQueue successfully processes a
    purchase, as shown in Listing 10–8.


