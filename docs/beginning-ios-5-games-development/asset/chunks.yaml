  raw: 'The class NSCoder provides tasks for encoding and decoding values. NSCoder
    is very much like other iOS classes in that it presents a map-like interface for
    reading and writing data. In the task encodeWithCoder:, we use the NSCoder task
    encodeObject:forKey: to write theScore object to the encoder. We pass in a key
    value NSString that we will use in initWithCoder: to read the theScores back out
    when we unarchive this class. Also note that the object that is returned from
    the decodeObjectForKey: task it retained. This is done to make sure the object
    returned is not reclaimed at some unspecified time.


    When an NSMutableArray is encoded with an NSCoder, it knows to encode the elements
    in the array, but those elements must know how to be encoded. Because theScores
    is an NSMutableArray filled with Score objects, we have to tell the class Score
    how to encode and decode itself for this process to work.


