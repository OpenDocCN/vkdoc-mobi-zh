    **Destroying an Asteroid**


    We have set the groundwork for understanding how an Asteroid is created and represented
    on the screen. Let’s take a look at the task doHit: to understand how these pieces
    are brought together to create the desired behavior. See Listing 7–20.


    **Listing 7–20.** *Asteroid.m (doHit:)*


    -(void)doHit:(GameController*)controller{


    if (level > 1){


    int count = arc4random()%3+1;


    for (int i=0;i<count;i++){


    Asteroid* newAst = [Asteroid asteroidOfLevel:level-1 At:self.center];


    [controller addActor:newAst];


    }


    }


    int particles = arc4random()%5+1;


    for (int i=0;i<particles;i++){


    ImageRepresentation* rep = [ImageRepresentation


    imageRepWithDelegate:[AsteroidRepresentationDelegate instance]];


    Particle* particle = [Particle particleAt:self.center WithRep:rep Steps:25];


    [particle setRadius:6];


    [particle setVariant:arc4random()%AST_VARIATION_COUNT];


    [particle setRotation: (arc4random()%100)/100.0*M_PI*2];


    LinearMotion* motion = [LinearMotion linearMotionRandomDirectionAndSpeed];


    [particle addBehavior:motion];


    [controller addActor: particle];


    }


    [controller removeActor:self];


    }


    In Listing 7–20, we see the task doHit:. This task is called when we tap on the
    screen, causing all Asteroids in the scene to break apart into a number of smaller
    Asteroids.


    We also want to generate a number of asteroid-looking Particles when we do this.
    The first thing we do is make sure the Asteroid we call doHit: on is bigger than
    level one, because those asteroids should not create additional Asteroids. If
    the Asteroid is bigger than level one, we create one to three new Asteroids at
    the same location as the current Asteroid with one level smaller. These new Asteroids
    will travel away from the current Asteroid in a straight line until they also
    explode.


    To create the particle effect in Listing 7–20, we first decide how many particles
    we will be adding to the scene. We then create a new Particle using the Asteroids
    current position, the singleton instance of AsteroidRepresentationDelegate, and
    indicate that the particle should live for 25 steps of animation. The radius of
    particle is set to 6\. This is a purely aesthetic choice; it could be any value.
