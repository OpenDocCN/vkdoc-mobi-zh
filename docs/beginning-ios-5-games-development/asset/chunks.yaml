- fmt: '我们已经了解了如何创建使用 Core Graphics 绘制的演员，这开辟了动态绘制演员的可能性，从而无需为演员的每种可能状态创建图像。在下一节中，我们将讨论另一种绘制演员的策略，即基于粒子的策略。


