    **Initialization and Setup**


    The life of a CoinController object starts when the task viewDidLoad is called.
    This is called automatically because we have an instance of CoinController in
    our XIB files.


    Listing 4–8 shows this task.


    **Listing 4–8.** *CoinController.m (viewDidLoad)*


    - (void)viewDidLoad


    {


    [super viewDidLoad];


    [self.view setBackgroundColor:[UIColor clearColor]];


    CGRect viewFrame = [self.view frame];


    //border is 3.125%


    float border = viewFrame.size.width*.03125;


    float coinsViewWidth = viewFrame.size.width-border*2;


    CGRect coinsFrame = CGRectMake(border, border, coinsViewWidth, coinsViewWidth);
    coinsView = [[UIView alloc] initWithFrame: coinsFrame];


    [coinsView setBackgroundColor:[UIColor whiteColor]];


    [coinsView setClipsToBounds:YES];


    [self.view addSubview:coinsView];


    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(tapGesture:)];


    [tapRecognizer setNumberOfTapsRequired:1];


    [tapRecognizer setNumberOfTouchesRequired:1];


    [coinsView addGestureRecognizer:tapRecognizer];


    }


    In the viewDidLoad task, we have several small items to attend to. First, we call
    the super implementation of viewDidLoad. This is not strictly necessary but is
    just good practice. If we ever wanted to change the super class of CoinsController,
    we might spend a lot of time figuring out why things are not initializing correctly.


    The next part of the task viewDidLoad is to set up some UIView instances to do
    what we want. Looking at Figure 4–6, we see that there is a partially transparent
    border around the white area containing the coins. This partially transparent
    view is actually the holder view, so to make sure this is visible, we set the
    root view for this class to be completely transparent.'
