- fmt: 'Now that we have reviewed the core classes use to create the game `BeltCommander`,
    it is time to look at the subclasses of the classes we just described to understand
    how we can extend and customize them to create the game `BeltCommander`.


    ## Understanding `BeltCommanderController`


    In previous chapters, we have extended the class `GameController` to make our
    examples. To create a whole game, we are going to do the same thing, by creating
    the class `BeltCommanderController`. The class `BeltCommanderController` is responsible
    for managing the `Actors` in the game, determining the end condition, updating
    the health and score, and interpreting input from the user. Let’s take a look
    at the action in the game again and review how the game is played and what challenges
    confront the player. A screenshot of the game is shown in Figure 11–9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00298.png)


    ![](images/00463.jpeg)


    **CHAPTER 11: A Completed View Belt Commander** **269**


    **Figure 11–9.** *Belt Commander, mid-game*


    In Figure 11–9, we see the game `BeltCommander`. The player controls the ship
    on the left by tapping the screen. The ship will move to the same height as the
    tap. The ship constantly fires bullets to the right, as represented by the circle
    just to the lower right of the bright star in the background. From the right,
    moving left, come an endless wave of asteroids. If a bullet collides with an asteroid,
    the asteroids breaks into smaller parts, and the score is incremented. If an asteroid
    collides with the ship, the asteroid is destroyed, but the ship’s health is decremented.
    To add a little chaos to the game, saucers appear on the right side of the game
    and travel up and down, firing bullets at the ship. The bullets will destroy asteroids,
    but their main purpose is to hit the ship and reduce its health. To help out our
    poor ship, three types of power-ups come from the left and travel to the right.
    If the ship is lucky enough to be in the path of a power-up, it gains its benefit.
    These benefits are increased health, more powerful bullets, and extra points.
    The game continues until the ships health is reduced to zero.


    Now that we have an overview of how the game is played, we are going to look at
    the class `BeltCommanderController`, first looking at how a new game is setup
    and then looking at the code that runs every step of the game.


    ## `BeltCommanderController`: Getting Started


    To understand how this game is implemented, we need to understand how the `BeltCommanderController`
    gets set up to play the game. The following section provides an overview of the
    initial code required to get a game up and running. Let’s start with the header
    file for the class `BeltCommanderController`, as shown in Listing 11–7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00469.png)


    **270** **CHAPTER 11: A Completed View Belt Commander**


    **Listing 11–7.** *`BeltCommanderController.h`*


    ```

    @class BeltCommanderDelegate, BeltCommanderController;


    @protocol BeltCommanderDelegate


    @required


    -(void)gameStarted:(BeltCommanderController*)aBeltCommanderController;


    -(void)gameOver:(BeltCommanderController*)aBeltCommanderController;


    @end


    @interface BeltCommanderController : GameController{


    IBOutlet HealthBarView* healthBarView;


    IBOutlet UILabel* scoreLabel;


    GameParameters* gameParameters;


    Viper* viper;


    //achievement tracking


    int asteroids_destroyed;


    }


    @property (nonatomic, retain) IBOutlet NSObject<BeltCommanderDelegate>* delegate;


    -(void)doNewGame:(GameParameters*)aGameParameters;


    -(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;


    -(void)doEndGame;


    -(void)doAddNewTrouble;


