    \ and `ViewController_iPad` will inherit them. Let’s take a look at the complete\
    \ version of `ViewController.h` in Listing 2–5.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00370.png)\n\n**34**\n\n**CHAPTER 2: Setting Up Your Game Project**\n\
    \n### Listing 2–5. `ViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\n#import\
    \ \"RockPaperScissorsController.h\"\n\n@interface ViewController : UIViewController{\n\
    \n    IBOutlet UIView *landscapeView;\n    IBOutlet UIView *landscapeHolderView;\n\
    \    IBOutlet UIView *portraitView;\n    IBOutlet UIView *portraitHolderView;\n\
    \    IBOutlet RockPaperScissorsController *rockPaperScissorsController;\n\n}\n\
    \n@end\n```\n\nIn Listing 2–5, we see that we have references to 5 `IBOutlet`\
    \ references. These will give us programmatic access to these items at runtime.\
    \ When `Interface Builder` created these references it also created some clean-up\
    \ code in the implementation of `ViewController`. Listing 2–6 shows this automatically\
    \ generated code.\n\n### Listing 2–6. `ViewController.m` (partial)\n\n```\n- (void)viewDidUnload\n\
    {\n    [landscapeView release];\n    landscapeView = nil;\n    [landscapeHolderView\
    \ release];\n    landscapeHolderView = nil;\n}\n```"
