    **CHAPTER 1: App Cubby**


    **Figure 9–6.** *Configuration buttons for an application in iTunes Connect* In
    Figure 9–6, we see the `Manage Game Center` button (labeled A). Click this, and
    you will be prompted to enable Game Center and create a leaderboard. Figure 9–7
    shows the page for creating or editing a leaderboard.


    **Figure 9–7.** *Creating or editing a leaderboard*


    **CHAPTER 1: App Cubby**


    **221**


    In Figure 9–7, we see the web page in iTunes Connect for editing and creating
    a leaderboard. At item A, we see a name for the leaderboard. This name is not
    the display name—it is for internal use only and can be anything you want. Item
    B indicates the ID for the leaderboard. This is the value used in code when referring
    to the leaderboard.


    Items C and D indicate how the scores in this leaderboard should be organized.
    We have chosen to display our scores as an integer value (with no decimal places),
    and we consider higher scores better. Item E shows that we have added display
    information for one language. New languages can be added by clicking the `Add
    Language` button and specifying the display name of the leaderboard, as well as
    indicating that the values are called "points" in our case. Creating or editing
    an achievement is very similar to working with a leaderboard, as shown in Figure
    9–8.


    **Figure 9–8.** *Creating or editing an achievement*


    In Figure 9–8, we see the web page for creating and editing an achievement in
    iTunes Connect. Item A shows the internal name used for the achievement. Item
    B is where the ID for the achievement is displayed. Item C indicates that this
    achievement is not hidden. By default, achievements are viewable to users even
    if they have not achieved them. However, it can be fun to specify some achievements
    that are hidden, so the user is surprised when they achieve them. Item E shows
    that we have specified the display text for the English language. Of course, text
    for other languages can be added by clicking the `Add Language` button.


    We have looked at how to create a new App ID and a new application in iTunes Connect.
    We also briefly looked at the screens required to create a leaderboard and an
    achievement. Now, let''s look at the code that takes advantage of these new resources.


