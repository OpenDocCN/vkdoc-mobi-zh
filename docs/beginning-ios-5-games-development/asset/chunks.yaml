    ## About the Author


    Lucas L. Jordan is a lifelong computer enthusiast who has worked for many years
    as a developer focusing on user interface design. He is the author of *JavaFX
    Special Effects: Taking Java RIA to the Extreme with Animation, Multimedia, and
    Game Elements* and the co-author of *Practical Android Projects*, both by Apress.
    Lucas is interested in mobile application development in its many forms. When
    the time is right, he will commit himself fulltime to game development at ClayWare
    Games, LLC.


    ## About the Technical Reviewer


    Tony Hillerson is a software architect at EffectiveUI. He graduated from Ambassador
    University with a BA in Management Information Systems. On any given day, Tony
    might be working with Android, Rails, Objective-C, Java, Flex, or shell scripts.
    He has been interested in developing for Android since the early betas. Hillerson
    has created Android screencasts, has spoken about Android at conferences, and
    has served as technical reviewer on Android books. He also sometimes gets to write
    Android code.


    He is interested in all levels of usability and experience design, from the database
    to the server to the glass.


    In his free time, Hillerson enjoys playing the bass, playing World of Warcraft,
    and making electronic music. Tony lives outside Denver, Colorado, with his wife
    and two sons.


