    **图 A–2.** *《灭虫者》，由 SUMO Productions 制作。© 2011 Table Mountain Church*


    在图的左侧，我们看到游戏的欢迎界面。Phil Hassey 与 Table Mountain Church（拥有版权）的几位青少年合作开发了这款简单的游戏。由于这是
    Phil 与一群缺乏多年图形或游戏设计经验的年轻人合作的成果，他们采用了简单的手绘风格。这一选择使得几位绘画技巧有限的人也能为游戏贡献美术作品。为了在整个游戏中保持这种风格，我们可以看到左侧屏幕角落的四个按钮也是手绘的。右下角的按钮是一个
    Facebook 按钮。通过制作自己的 Facebook 按钮，他们保持了风格的一致性。如果他们使用标准 Facebook 按钮中的某一个，就会与整体视觉体验显得格格不入。我们还应该考虑一款风格不一致的游戏，如图
    A–3 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00120.png)


    **图 A–3.** *《颜色与形状》。© ClayWare Games。背景图由 txd 发布于 Flickr*


    在图 A–3 中，我们看到我为初代 iPhone 制作的一款老游戏，名为《颜色与形状》。左侧是欢迎界面，孩子或家长可以在三项活动中选择一项。对于每项活动，玩家会通过语音和文字提示，完成一系列涉及彩色气球的简单任务。3D
    文字和气球是用 Blender 3D 渲染的，我认为它们相当一致。两者都使用了强烈的原色，并具有深度感——虽然不是完美匹配，但非常接近。然而，我认为背景图不是个好选择。虽然它是一张很漂亮的照片，但与气球完全不搭，并且在视觉上分散注意力。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00281.png)


    **提示:** 知识共享协议提供了一种许可选项，你只需在游戏致谢中包含署名，即可使用其创意作品。Flickr 允许你搜索以该许可发布的图片。《颜色与形状》的背景图就是通过这种方式找到的。


    **品牌与感知**


    如前所述，游戏的美术不仅仅是在屏幕上移动的图像。人们会记住美术，并将其与游戏关联起来。图 A–4 展示了为游戏《太空攻击!!》制作的一则广告。


    **图 A–4.** *《太空攻击》广告*


    这张传单是在一次大会上分发的。制作这张传单时，我正忙于更新游戏的美术资源，所以我决定在传单上使用新美术，尽管当时 App Store 中的游戏尚未更新为新美术。因此，当人们下载游戏时，他们下载的是带有旧美术的版本，如图
    A–5 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00377.png)


    **图 A–5.** *《太空攻击!!》，旧版美术*


    由于游戏内的美术与传单上的美术不匹配，且游戏中的美术质量明显更差，人们感觉被欺骗了，尽管游戏是免费的。我没有意识到用户的期望，结果为此付出了一些负面评价的代价。这本可以通过及时更新游戏以适应大会，或者在广告中使用旧版美术来轻松避免。


    我们快速了解了电子游戏中的风格是什么，以及为什么它很重要。现在，让我们将注意力转移到创建图像文件的更实际问题上。之后，我们将回顾一些用于创建 2D 美术的优秀工具。


    **创建图像文件**


    无论游戏的美术方向如何，最终你都需要一定数量的、特定尺寸的图像文件来实际实现游戏。我们首先将探讨一些命名规范，这些规范将帮助你管理需要为不同设备使用不同图像的情况。然后，我们将回顾所有
    iOS 应用所需的图像——比如图标和启动屏幕。本节的最后，我们将讨论如何选择合适的图像尺寸。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00441.png)


    **命名规范**


    在撰写本文时，创建应用时需要考虑三种不同的屏幕分辨率。根据应用运行在三种分辨率中的哪一种来使用不同的图像，这是非常常见的。为了支持这些分辨率，创建了一种命名规范，以几乎无痛的方式促进这一过程。其思路是，通过以特定方式命名图像，将根据设备加载不同的图像。因此，无需在代码中测试你正在使用的设备。这种命名规范的模式是
    `Basename[@2x][~iphone|~pad].extension`。所以 `basename` 可以是任意名称——例如 `background`。然后你可以选择性地附加
    `@2x` 来表示该图像用于高分辨率显示屏，比如 iPhone 4 的视网膜屏。在指明图像是否为高分辨率版本之后，你可以指定设备类别，即 `iPhone`
    或 `iPad`。最后，像通常一样添加扩展名。表 A–1 展示了对于一个本应名为 `background.png` 的图像，这种命名规范如何工作。


    **表 A–1.** *竖屏背景图像的命名规范*


    | 设备 | 文件名 | 图像像素分辨率 |

    |---|---|---|

    | iPhone 3GS，iPod Touch 第三代 | `background~iphone.png` | 320x480 |

    | iPhone 4，iPod Touch 第四代 | `background@2x~iphone.png` | 640x960 |

    | iPad 1，iPad 2 | `background~ipad.png` | 768x1024 |

    | iPad 3* | `background@2x~ipad.png` | 1536x2048 |


    * 在撰写本文时，iPad 3 尚未发布。我假设 iPad 3 具有像 iPhone 4 那样的视网膜显示屏，从而对命名规范做出逻辑推测。


    在表 A–1 中，我们看到第一列是每行对应的设备集合。为了为每组设备提供全屏竖屏背景图像，我们按照第二列所示的方式命名背景文件。最右列显示了图像的像素分辨率。在本附录的示例代码中，应用的背景图像配置为支持模拟器中可用的设备。我已更改每个背景图像，使其包含指示正在加载哪个文件的文本。图
    A–6 展示了不同设备加载的不同图像。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00484.png)


    **图 A–6.** *每个设备有不同的背景*


    在图的左侧，我们看到 iPhone 运行着与 iPhone 3GS 相同的显示效果。中间是模拟在 iPhone 4 上运行时的屏幕尺寸（相对于 3GS）。右侧是第一代和第二代
    iPad 的屏幕尺寸。清单 A–1 设置了此应用的背景图像。


    **清单 A–1.** *ViewController.m (viewDidLoad)*


    ```objective-c

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    UIImage* image = [UIImage imageNamed:@"background"];

    [backgroundImageView setImage:image];

    }

    ```


    在清单 A–1 中，我们看到 `ViewController` 类的 `viewDidLoad` 任务。我们通过调用 `imageNamed` 并仅传入基本名称来加载一个
    `UIImage`。返回的是根据项目中包含的图像文件名，适用于特定设备的图像。在此例中，我们使用的文件名与表 A–1 中所示的相同。

