    In Listing 11–22, we see the implementation of the class step: from the class
    Saucer. In this task, we check to see if the Saucer’s health is below zero. If
    it is, we increment the gameControllers score and remove the Saucer from the game.
    The next part of the task step: is to determine if the Saucer should change direction
    on account of going off the screen. The last section of the task step: is responsible
    for shooting Bullets. In order to do this, we get the viper property of the gameController
    so we can target the Bullet on it. This is the first case where we had to cast
    gameController to


    BeltCommanderController. It raises the question of how we might add a general
    way to reference particular actors (like the viper) without depending on class
    definition. But, this is an exercise for another time.


    The last Actor we are looking at is Powerup.


    **The Powerup Class**


    The Powerup class is pretty simple, really. It is just an Actor that moves from
    the right to the left. Have reviewed in other chapters how it appears to be spinning
    and how it flashes at the end of its life. In this game, the interesting thing
    is the effect it has on a Viper. This feature is implemented in the task doHitOn:in:,
    as shown in Listing 11–23.


    **Listing 11–23.** *Powerup.m (doHitOn:in:)*


    -(void)doHitOn:(Viper*)viper in:(GameController*)gameController{


    if (self.variant == VARIATION_HEALTH){


    [viper incrementHealth:30];


    } else if (self.variant == VARIATION_DAMAGE){


    [viper incrementDamage:gameController];


    } else if (self.variant == VARIATION_CASH){


    [gameController incrementScore:1000];


    }


    [gameController removeActor:self];


    }


    In Listing 11–23, we see the task doHitOn:in: of the class Powerup. This is called
    when a Powerup collides with the Viper. The implementation could not be more straightforward:
    we simply check the variant of the Powerup and apply the correct effect. For VARIATION_HEALTH,
    we increment the Viper’s health by 30\. For VARIATION _DAMAGE, we increment the
    Viper’s damage. Lastly, for VARIATION_CASH, we just increment the score by 1,000\.
    I think the simplicity of this task is a direct byproduct of using Actors the
    way we do. It turned out to be a strong OO model.


