    ![](images/00244.jpeg)


    **156**


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **Saucers, Bullets, Shields, and Health Bars**


    In this example, we will look at four new actors: saucers, bullets, shields, and
    health bars. The code for this section is found under the group Example 2, in
    the Xcode project Sample 06+07.


    The health bar and bullet actors will be rendered programmatically with Core Graphics
    instead of using a pre-rendered image. The other actors—saucers and shields—exist
    in this example to provide a little context (got to have something to shoot with
    the bullets) and flesh out our example from the last chapter in terms of behaviors.
    Figure 7–1 shows the saucers, bullets, shields, and health bars in action.


    **Figure 7–1.** *Saucers, bullets, shields, and health bars* In Figure 7–1, we
    see a flying saucer in the middle of the screen. Coming from the right and traveling
    left are a number of circular bullets. The bullets come in three different sizes,
    which reflect their potential for damage. If a bullet collides with the saucer,
    a shield effect is added to the flying saucer and the health bar goes down, indicating
    the damage done. In this example, the bullets will keep coming until the saucer’s
    health is zero, at which point it is removed and a new flying saucer is added.
    Figure 7–2 shows the three difference saucers used in this example, as well as
    the graphic used for the shield.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00328.png)


    ![](images/00311.jpeg)


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **157**


    **Figure 7–2.** *Three saucers and a shield*


    The shield image is partially transparent and is designed be drawn over a saucer,
    as can be seen in the scaled up saucer with the shield drawn over it.


    To understand how all the parts and pieces of this example fit together, we will
    start by looking at the implementation of the class Example02Controller, starting
    with the doSetup task, shown in Listing 7–1.


    **Listing 7–1.** *Example02Controller.m (doSetup)*


    -(BOOL)doSetup


    {


    if ([super doSetup]){


    NSMutableArray* classes = [NSMutableArray new];


    [classes addObject:[Saucer class]];


    [classes addObject:[Bullet class]];


    [self setSortedActorClasses:classes];


    return YES;


    }


    return NO;


    }


    In Listing 7–1, we see the doSetup task of the class Example02Controller. This
    method simply indicates that we want to keep actors of type Saucer and Bullet
    sorted for easy access later on. We do this by creating an NSMutableArray called
    classes and adding the class objects for two classes in which we are interested.
    The NSMutableArray classes are then passed to setSortedActorClasses:. This way,
    when we call actorsOfType: in the future, we will not have to sort through all
    of the actors to find them. Next, we want to take a look at the code that describes
    the action in this example that is found in the task updateScene of class Example02Controller.
    See Listing 7–2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00394.png)


    **158**


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **Listing 7–2.** *Example02Controller.m (updateScene)*


    -(void)updateScene{


    NSMutableSet* suacers = [self actorsOfType:[Saucer class]];


    if ([suacers count] == 0){


    Saucer* saucer = [Saucer saucer:self];


    [self addActor: saucer];


    }


    if (self.stepNumber % (30) == 0){


    float direction = M_PI - M_PI/30.0;


    float rand = (arc4random()%100)/100.0 * M_PI/15.0;


    direction += rand;


    Bullet* bullet = [Bullet bulletAt:CGPointMake(1000, 768/2)


    WithDirection:direction];


    [self addActor: bullet];


    if (arc4random()%4 == 0){


    if (arc4random()%2 == 0){


    [bullet setDamage:20.0];


    } else {


    [bullet setDamage:30.0];


    }


    }


    }


    NSMutableSet* bullets = [self actorsOfType:[Bullet class]];


    for (Bullet* bullet in bullets){


    for (Saucer* saucer in suacers){


    if ([bullet overlapsWith:saucer]){


    [saucer doHit:bullet with:self];


    }


    }


    }


    [super updateScene];


    }


    In Listing 7–2, we first get all instances of Saucer in the scene and check to
    see if any exist. If none do, we create a new Saucer and add it to the scene with
    the addActor: task. This insures that there is always exactly one Saucer in the
    middle of the screen.


    Then, every 30 steps, we create a new Bullet using the task bullatAt:WithDirection:.


    The location of the bullet is specified in game coordinates, and the right-most
    point at the vertical center. The direction specified will cause the bullet to
    travel toward the left, possibly hitting the saucer. Once the bullet is added
    to the scene, the damage is randomly assigned.


    The last thing the updateScene task does is check to see if any bullet has collided
    with the saucer. This is done by calling actorsOfType: and getting all Bullet
    objects in the scene stored in the NSMutableSet* bullets. We simply iterate over
    each bullet and saucer and check if there is a hit by calling overlapsWith:. If
    there is a hit, we call the doHit:with: task on saucer.


    Let’s take a closer look at the implementation of the actor classes used in this
    example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00459.png)


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **159**


    **The Actor Classes**


    In this section, we learn about the Saucer actor and the HealthBar Actor classes.
    The HealthBar is different from other Actors we have looked at up until this point.
    It is different because its location in the scene is dependent on the location
    of another Actor, in this case, a Saucer. Once we have reviewed the classes Saucer
    and HealthBar, we will look at the Behavior class FollowActor and see how we implement
    this feature.


    **Instantiating the Saucer Class**


    We will start by looking at the constructor for the class Saucer. We want to start
    with the Saucer’s constructor, because this is where we create the HealthBar.
    In this way, we don’t have to worry about adding a HealthBar when we create a
    new Saucer, because one will be created automatically every time we create a Saucer.
    The constructor for Saucer is shown in Listing 7–3.


    **Listing 7–3.** *Saucer.m (saucer:)*


    +(id)saucer:(GameController*)controller{


    CGSize gameAreaSize = [controller gameAreaSize];


    CGPoint gameCenter = CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);
    ImageRepresentation* rep = [ImageRepresentation imageRep];


    [rep setBackwards:arc4random()%2 == 0];


    [rep setStepsPerFrame:3];


    Saucer* saucer = [[Saucer alloc] initAt:gameCenter WithRadius:32


    AndRepresentation:rep];


    [rep setDelegate:saucer];


    [saucer setVariant:arc4random()%VARIATION_COUNT];


    [saucer setMaxHealth:100];


    [saucer setCurrentHealth:100];


    HealthBar* healthBar = [HealthBar healthBar:saucer];


    [healthBar setPercent:1];


    [saucer setHealthBar:healthBar];


    [controller addActor:healthBar];


    return saucer;


    }'
  trans: "\n# 我们还将探讨游戏中用于创造引人注目的视觉效果的另一项热门技术：粒子系统。简单来说，粒子系统是指游戏中生成大量微型图形元素的任何系统，这些元素在屏幕上组合后，能创造出比各部分简单叠加更令人着迷的整体效果。粒子系统在游戏中常用于创建火焰效果、水体效果和魔法效果，仅举几例。\n\
    \n在本章中，我们将利用粒子系统创建由大量简单粒子角色构成的彗星，使其呈现出流光溢彩、动态流畅的视觉效果。同时，我们还将运用这项技术，在小行星碎裂时展现些许真实感。\n\
    \n本章的示例代码可在 Xcode 项目 `Sample 06+07` 中找到。\n\nL. Jordan, *Beginning iOS 5 Games\
    \ Development*\n\n©\n\nLucas Jordan 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 飞碟、子弹、护盾与生命条\n\n在本例中，我们将探讨四种新角色：飞碟、子弹、护盾和生命条。本节代码位于 Xcode 项目 `Sample 06+07`\
    \ 的 `Example 2` 组中。\n\n生命条和子弹角色将使用 Core Graphics 以编程方式渲染，而非使用预渲染图像。其他角色——飞碟和护盾——在本例中主要用于提供上下文环境（总得有个目标来射击子弹），并从上章示例的行为层面进行扩展。图\
    \ 7-1 展示了飞碟、子弹、护盾和生命条的实际运行效果。\n\n**图 7-1.** *飞碟、子弹、护盾和生命条* 在图 7-1 中，我们看到屏幕中央有一架飞碟。从右侧向左飞来的是一系列圆形子弹。这些子弹有三种不同尺寸，分别代表其潜在伤害值。如果子弹击中飞碟，飞碟上会叠加一层护盾效果，同时生命条会下降，表示受到伤害。在本例中，子弹会持续发射，直到飞碟生命值归零，届时飞碟将被移除，并添加一架新的飞碟。图\
    \ 7-2 展示了本例中使用的三种不同飞碟，以及护盾所用的图形。\n\n**图 7-2.** *三种飞碟与一个护盾*\n\n护盾图像是半透明的，设计用于叠加在飞碟之上，放大后的飞碟上覆盖护盾的效果可见一斑。\n\
    \n为了理解本例中所有组件的配合方式，我们首先来看类 `Example02Controller` 的实现，从 `doSetup` 任务开始，如列表 7-1\
    \ 所示。\n\n**列表 7-1.** *Example02Controller.m (doSetup)*\n\n```\n-(BOOL)doSetup\n\
    {\n    if ([super doSetup]){\n        NSMutableArray* classes = [NSMutableArray\
    \ new];\n        [classes addObject:[Saucer class]];\n        [classes addObject:[Bullet\
    \ class]];\n        [self setSortedActorClasses:classes];\n        return YES;\n\
    \    }\n    return NO;\n}\n```\n\n在列表 7-1 中，我们看到了类 `Example02Controller` 的 `doSetup`\
    \ 任务。该方法仅表明我们希望将类型为 `Saucer` 和 `Bullet` 的角色排序，以便后续轻松访问。我们通过创建一个名为 `classes` 的\
    \ `NSMutableArray`，并添加我们感兴趣的两个类的类对象来实现这一点。然后将 `NSMutableArray classes` 传递给 `setSortedActorClasses:`。这样，将来调用\
    \ `actorsOfType:` 时，我们就不必遍历所有角色来查找它们。接下来，我们来看类 `Example02Controller` 中 `updateScene`\
    \ 任务内描述本例动作的代码。见列表 7-2。\n\n**列表 7-2.** *Example02Controller.m (updateScene)*\n\
    \n```\n-(void)updateScene{\n    NSMutableSet* suacers = [self actorsOfType:[Saucer\
    \ class]];\n    if ([suacers count] == 0){\n        Saucer* saucer = [Saucer saucer:self];\n\
    \        [self addActor: saucer];\n    }\n    if (self.stepNumber % (30) == 0){\n\
    \        float direction = M_PI - M_PI/30.0;\n        float rand = (arc4random()%100)/100.0\
    \ * M_PI/15.0;\n        direction += rand;\n        Bullet* bullet = [Bullet bulletAt:CGPointMake(1000,\
    \ 768/2)\n                         WithDirection:direction];\n        [self addActor:\
    \ bullet];\n        if (arc4random()%4 == 0){\n            if (arc4random()%2\
    \ == 0){\n                [bullet setDamage:20.0];\n            } else {\n   \
    \             [bullet setDamage:30.0];\n            }\n        }\n    }\n    NSMutableSet*\
    \ bullets = [self actorsOfType:[Bullet class]];\n    for (Bullet* bullet in bullets){\n\
    \        for (Saucer* saucer in suacers){\n            if ([bullet overlapsWith:saucer]){\n\
    \                [saucer doHit:bullet with:self];\n            }\n        }\n\
    \    }\n    [super updateScene];\n}\n```\n\n在列表 7-2 中，我们首先获取场景中所有 `Saucer` 实例，并检查是否存在任何实例。如果没有，则创建一个新的\
    \ `Saucer` 并通过 `addActor:` 任务将其添加到场景中。这确保了屏幕中央始终恰好存在一个 `Saucer`。\n\n然后，每 30 步，我们使用\
    \ `bullatAt:WithDirection:` 任务创建一个新的 `Bullet`。子弹的位置以游戏坐标指定，位于最右侧点的垂直中心。指定的方向将使子弹向左飞行，可能击中飞碟。子弹被添加到场景后，会随机分配其伤害值。\n\
    \n`updateScene` 任务最后要做的是检查是否有任何子弹与飞碟碰撞。这通过调用 `actorsOfType:` 获取存储在 `NSMutableSet*\
    \ bullets` 中的所有 `Bullet` 对象来实现。我们简单地对每个子弹和飞碟进行迭代，通过调用 `overlapsWith:` 检查是否命中。如果命中，则在\
    \ `saucer` 上调用 `doHit:with:` 任务。\n\n接下来，让我们更仔细地查看本例中使用的角色类的实现。\n\n## 角色类\n\n在本节中，我们将了解\
    \ `Saucer` 角色和 `HealthBar` 角色类。`HealthBar` 与我们目前看到过的其他角色不同。其不同之处在于，它在场景中的位置依赖于另一个角色（此处为\
    \ `Saucer`）的位置。在回顾了 `Saucer` 和 `HealthBar` 类之后，我们将研究 `Behavior` 类 `FollowActor`，并了解如何实现这一特性。\n\
    \n### 实例化飞碟类\n\n我们首先来看 `Saucer` 类的构造函数。之所以从 `Saucer` 的构造函数开始，是因为这里是创建 `HealthBar`\
    \ 的地方。这样，我们创建新 `Saucer` 时就无需担心添加 `HealthBar`，因为每次创建 `Saucer` 时都会自动创建一个。`Saucer`\
    \ 的构造函数如列表 7-3 所示。\n\n**列表 7-3.** *Saucer.m (saucer:)*\n\n```\n+(id)saucer:(GameController*)controller{\n\
    \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint gameCenter\
    \ = CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);\n    ImageRepresentation*\
    \ rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2\
    \ == 0];\n    [rep setStepsPerFrame:3];\n    Saucer* saucer = [[Saucer alloc]\
    \ initAt:gameCenter WithRadius:32\n                          AndRepresentation:rep];\n\
    \    [rep setDelegate:saucer];\n    [saucer setVariant:arc4random()%VARIATION_COUNT];\n\
    \    [saucer setMaxHealth:100];\n    [saucer setCurrentHealth:100];\n    HealthBar*\
    \ healthBar = [HealthBar healthBar:saucer];\n    [healthBar setPercent:1];\n \
    \   [saucer setHealthBar:healthBar];\n    [controller addActor:healthBar];\n \
    \   return saucer;\n}\n```\n"
