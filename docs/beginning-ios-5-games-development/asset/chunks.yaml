    **Figure 9–4.** *Bundle Identifier in Xcode*


    In Figure 9–4, the `Identifier` field contains our Bundle Identifier in Xcode.
    This value, in combination with the version number, identifies to iTunes Connect
    which application is running. Once you have set the Bundle Identifier, you have
    to create a new application in iTunes Connect, as shown in Figure 9–5.


    **Figure 9–5.** *New application in iTunes Connect*


    In Figure 9–5, we see the first step in creating a new application in iTunes Connect.
    We have specified the App name and selected an SKU number. The SKU number can
    be anything you want; it is included so the producer of the game can track sales
    in their internal systems. We also see that we can select the Bundle ID from a
    pull-down menu; this is the value we specified when we created a new App ID. There
    are a few more steps required to create a new application in iTunes Connect, but
    they are just filling in information about the app and are not required steps
    to getting Game Center working.


    You will be asked to provide a description, copyright information, and other details.
    All of the information added at the last step can be skipped and added later.


    Once the application is created, inspect its details and find the `Manage Game
    Center` button, as shown in Figure 9–6.


