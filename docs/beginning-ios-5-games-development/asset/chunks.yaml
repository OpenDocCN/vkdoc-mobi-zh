    On the left side of the figure, we see the Welcome screen for the game. Phil Hassey
    developed this simple game with a number of teens from Table Mountain Church (who
    own the copyright). Because this game was a collaboration between Phil and a number
    of young people without years of graphics or game design experience, they adopted
    a simple hand-drawn style. This choice allowed several people with limited drawing
    skills to contribute art to the game. In order to maintain the style throughout
    the game, we can see that four buttons, in the corners of the left screen, are
    also drawn by hand. The bottom right button is a Facebook button. By making their
    own Facebook button, they maintain a consistent style. If they used one of the
    stock Facebook buttons, it would look out of place from the entire visual experience.
    We should also consider a game that does not have consistent style, as shown in
    Figure A–3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00120.png)


    **Figure A–3.** *Colors and Shapes. © ClayWare Games. Background by txd on Flickr*


    In Figure A–3, we see an old game I created for the original iPhone called Colors
    and Shapes. On the left is the Welcome screen, where a child or parent can pick
    one of three activities. For each activity, the player is directed by voice and
    text to perform a number of simple tasks involving colored balloons. The 3D text
    and the balloons were rendered with Blender 3D, and I think are pretty consistent.
    They both use strong primary colors and have a sense of depth—not a perfect match,
    but pretty close. However, I don’t think the background was a good choice. While
    it is a very nice photo, it doesn’t match the balloons at all, and is visually
    distracting.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00281.png)


    **TIP:** Creative Commons has a license option where all you have to do to use
    a creative work in your game is include a byline in your credits. Flickr allows
    you to search for images that are published with this license. We found the background
    image for Colors and Shapes this way.


    **Branding and Perception**


    As mentioned, the art for a game is more than just images moving about the screen.
    People remember the art and associate it with the game. Figure A–4 shows an advertisement
    created for the game Space Attack!!.


    **Figure A–4.** *Space Attack ad*


    This flyer was handed out at a convention. When I made this flyer, I was in the
    middle of updating the art for the game, so I decided to use the new art for the
    flyer, even though the game had not been updated in the App Store with the new
    art. So when people downloaded the game, they downloaded the version with the
    old art, as shown in Figure A–5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00377.png)


    **Figure A–5.** *Space Attack!!, old art*


    Because this art did not match the art on the flyer, and the art on the game is
    considerably worse, people felt ripped off, even though the game was free. I failed
    to appreciate my users’ expectations, and paid for it with some negative reviews.
    This could have easily been avoided by either getting the game updated in time
    for the conference or using the older graphics in the ad.


    We have taken a quick look at what style in a video game is and why it is important.
    Let’s now shift our focus to the more practical matters of creating the image
    files. After that, we will review a number of excellent tools for creating 2D
    art.


    **Creating the Images Files**


    Regardless of the art direction of your game, at the end of the day you will need
    a number of images files, at a specific size, to actually implement your game.
    We are going to first explore some naming conventions that will help you manage
    the case where you want different images for different devices. Then we will review
    the images required by all iOS applications—things like icons and launch screens.
    We will conclude this section with a discussion of how to pick appropriate image
    sizes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00441.png)


    **Naming Conventions**


    At the time of writing, there are three different screen resolutions that must
    be accounted for when creating an application. It is very common to want to use
    different images based on which one of the three resolutions the application is
    running on. To support these resolutions, a naming convention was created to facilitate
    this in a mostly painless way. The idea is that by naming the images in a particular
    way, a different image will be loaded depending on the device. So there is no
    need to test which device you are using in your code. The pattern for this naming
    convention is `Basename[@2x][~iphone|~pad].extension`. So `basename` can be whatever
    you want—for example, `background`. You can then optionally append an `@2x` to
    indicate that image is for a high-resolution display, like the retina display
    of the iPhone 4. After indicating whether the image is a high-resolution version,
    you can specify a device class, either `iPhone` or `iPad`. Lastly, you add the
    extension as you normally would. Table A–1 shows how this naming convention works
    for an image that would otherwise be called `background.png`.


    **Table A–1.** *Naming Convention For a Background Image in Portrait*


    | Device | Filename | Resolution of image in Pixels |

    |---|---|---|

    | iPhone 3GS, iPod Touch 3rd Generation | `background~iphone.png` | 320x480 |

    | iPhone 4, iPod Touch 4th Generation | `background@2x~iphone.png` | 640x960 |

    | iPad 1, iPad 2 | `background~ipad.png` | 768x1024 |

    | iPad 3* | `background@2x~ipad.png` | 1536x2048 |


    * As of this writing, there is no iPad 3. I am making a logical conjecture about
    the naming convention, assuming the iPad 3 has a retina display like the iPhone,
    starting with version 4.


    In Table A–1, we see in the first column a set of devices for each row. In order
    to provide a full screen, portrait background image for each set of devices, we
    name our background file as shown in the second column. The right-most column
    shows the resolution of the image in pixels. In the sample code for this appendix,
    the background image of the application is configured to support the devices available
    in the emulator. I have changed each background image to include text indicating
    which file is being loaded. Figure A–6 shows the different devices with the different
    images.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00484.png)


    **Figure A–6.** *A different background for each device*


    On the left of the figure, we see the iPhone running with the same display that
    is found on the iPhone 3GS. In the middle, we see a screen size as if it was running
    on the iPhone 4, relative to the 3GS. On the right is the screen size for the
    first and second iPad. Listing A–1 sets the background image for this application.


    **Listing A–1.** *ViewController.m (viewDidLoad)*


    ```objective-c

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    UIImage* image = [UIImage imageNamed:@"background"];

    [backgroundImageView setImage:image];

    }

    ```


    In Listing A–1, we see the `viewDidLoad` task of the class `ViewController`. We
    load a `UIImage` by calling `imageNamed` and passing in just the base name. What
    is returned is the image appropriate for the specific devices based on the filenames
    of the images included in the project. In this case, we have the same filenames
    as those shown in Table A–1.'
