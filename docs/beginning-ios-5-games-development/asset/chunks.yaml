- fmt: "### 排版后的内容\n\n**Listing 10–5.** *GameParameters.m (readFromDefaults and writeToDefaults)*\n\
    \n```\n+(id)readFromDefaults{\n    NSUserDefaults* defaults = [NSUserDefaults\
    \ standardUserDefaults];\n    NSData* data = [defaults objectForKey:GAME_PARAM_KEY];\n\
    \    if (data == nil){\n        GameParameters* params = [GameParameters gameParameters];\n\
    \        [params writeToDefaults];\n        return params;\n    } else{\n    \
    \    return [NSKeyedUnarchiver unarchiveObjectWithData: data];\n    }\n}\n\n-(void)writeToDefaults{\n\
    \    NSData* data = [NSKeyedArchiver archivedDataWithRootObject:self];\n    NSUserDefaults*\
    \ defaults = [NSUserDefaults standardUserDefaults];\n    [defaults setObject:data\
    \ forKey:GAME_PARAM_KEY];\n    [defaults synchronize];\n}\n```\n\n在`Listing 10–5`中，我们看到任务`readFromDefaults`和`writeToDefaults`。这两个任务是互逆的：`readFromDefaults`将为存储在用户默认设置中的键`GAME_PARAM_KEY`返回一个`GameParameter`。任务`writeToDefaults`为键`GAME_PARAM_KEY`将一个`GameParameter`写入用户默认设置。这两个任务的关键在于，我们通过记录属性`purchases`中的键，在用户默认设置中存储一个`GameParameter`，以记住用户的购买记录。类`GameParameters`可以存储在`NSUserDefaults`中，因为它实现了来自协议`NSCoder`的任务。有关该过程的描述，请参见第2章。\n\
    \n让我们来看看如何使用这个类来驱动用户界面，并设置图10–1中三个不同按钮的状态。这在任务`setGameParameters:`中处理，如`Listing\
