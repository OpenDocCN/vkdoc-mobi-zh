- fmt: "# We also know that after matching rows are found, `CoinsController` will\
    \ have to randomize any matches to prepare for the next turn the user takes. This\
    \ is done with the tasks `randomizeRows:` and `randomizeCols:`. The task `randomizeRows:`\
    \ is shown in Listing 4–19.\n\n**Listing 4–19.** *`CoinsGame.m` (`randomizeRows:`)*\n\
    \n```\n-(void)randomizeRows:(NSMutableArray*)matchingRows{\n\n    for (NSNumber*\
    \ row in matchingRows){\n\n        for (int c=0;c<colCount;c++){\n\n         \
    \   int index = [self indexForCoord:CoordMake([row intValue], c)];\n\n       \
    \     int newCoin = arc4random()%3;\n\n            [coins replaceObjectAtIndex:index\
    \ withObject:[NSNumber\nnumberWithInt:newCoin]];\n\n        }\n\n    }\n\n}\n\
    ```\n\nThe task `randomizeRows:` takes an `NSMutableArray` filled with `NSNumber`s.\
    \ Each `NSNumber` is a row. By iterating over each row, we set a new random value\
    \ for every coin in that row.\n\nThe implementation of `randomizeCols:` is similar;\
    \ we simply randomize each coin for the columns passed in.\n\nNow that you have\
    \ an understanding of the class `CoinsGame`, you can take a further look at `CoinsController`\
    \ and see how this class used the data stored in `CoinsGame` to interpret user\
    \ input, manage the views representing the coins, and create animations based\
    \ on game state.\n\n## Interpreting User Input\n\nWhen the user touches one of\
    \ the coins, we want to mark it as selected. Looking back at Listing 4–8, we know\
    \ that a `UITapGestureRecognizer` was created and added to the UIView `coinsView`.\
    \ This `UITapGestureRecognizer` calls the task `tapGesture:` whenever it registers\
    \ a tap gesture. Let’s look at the first part of `tapGesture:` in Listing 4–20.\n\
    \n**Listing 4–20.** *`CoinsController.m` (`tapGesture:`, partial)*\n\n```\n- (void)tapGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer{\n\n    if ([coinsGame remaingTurns] > 0 && acceptingInput){\n\
    \n        UITapGestureRecognizer* tapRegognizer =\n\n        (UITapGestureRecognizer*)gestureRecognizer;\n\
    \n        CGPoint location = [tapRegognizer locationInView:coinsView];\n\n   \
    \     Coord coinCoord = [self coordFromLocation:location];\n\n        if (!isFirstCoinSelected){//first\
    \ of the pair\n\n            isFirstCoinSelected = true;\n\n            firstSelectedCoin\
    \ = coinCoord;\n\n            [self stopCoinAt: firstSelectedCoin];\n\n      \
    \  } else {\n\n            ///shown in Listing 4–24\n\n        }\n\n    }\n\n\
    }\n```\n\nListing 4–20 takes the `UIGestureRecognizer` that triggered this event\
    \ as an argument.\n\nWe will use this object to figure out where the user tapped.\
    \ The first `if` statement in this task checks that there are remaining turns\
    \ and that we are currently accepting input. The variable `acceptingInput` is\
    \ set to `false` during animations in order to prevent the user from selecting\
    \ coins midtransition, which would probably cause the user some confusion. After\
    \ casting `gestureRecognizer` to a `UITapGestureRecognizer` called `tapRecognizer`,\
    \ we get the location of the tap by calling `locationInView:` and passing in `coinsView`.\
    \ The location of the tap is returned as a `CGPoint` called `location`. In order\
    \ to know which coin was tapped, we convert `location` to `Coord` by calling `coordFromLocation:`,\
    \ shown in Listing 4–21.\n\n**Listing 4–21.** *`CoinsController.m` (`coordFromLocation:`)*\n\
    \n```\n-(Coord)coordFromLocation:(CGPoint) location{\n\n    CGRect coinsFrame\
    \ = [coinsView frame];\n\n    Coord result;\n\n    result.col = location.x / coinsFrame.size.width\
    \ * [coinsGame colCount]; result.row = location.y / coinsFrame.size.height * [coinsGame\
    \ rowCount]; return result;\n\n}\n```\n\nThe task `coordFromLocation:` takes a\
    \ `CGPoint` and converts it into a `Coord` that will tell us which coin the user\
    \ tapped. To find the coin, the x value of the location is divided by the width\
    \ of the `coinsView` and then multiplied by the number of columns. The row is\
    \ calculated in a similar way.\n\nIn Listing 4–20, after we determine which coin\
    \ was tapped and store the result as the variable `coinCoord`, we check whether\
    \ the coin was previously selected. If not, we set `isFirstCoinSelected` to `true`,\
    \ record which coin was selected, and call `stopCoinAt:`, shown in Listing 4–22."
