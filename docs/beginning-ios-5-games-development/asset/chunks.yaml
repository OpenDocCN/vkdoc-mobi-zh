    struct CGRect {\n    CGPoint origin;\n    CGSize size;\n};\ntypedef struct CGRect\
    \ CGRect;\n```\n\n清单 4-1 展示了定义了子视图相对于其父视图区域的每个核心结构体。这些结构体定义在文件`CGGeometry.h`中，该文件属于`Core\
    \ Graphics`框架，是任何 iOS 项目的标准组成部分。注意，`x`、`y`、`width`和`height`值被定义为`CGFloat`。这些值的单位是点（points），而非像素（pixels）。\n\
    \n这种差异起初很微妙，但这里的关键在于，你用这些值指定的坐标和大小是分辨率无关的。关于点与像素的进一步讨论，请参见附录 A。\n\n**提示：** 诸如`CGRect`等结构体名称中的字母`CG`指的是`Core\
    \ Graphics`框架。因此，当需要精确表述时，`CGRect`被称为*Core Graphics Rect*。\n\n要创建清单 4-1 中的任何基本几何类型，`CGGeometry.h`中定义了一个内联工具函数，如清单\
    \ 4-2 所示。\n\n**清单 4-2.** *CGGeometry.h（`CGPointMake`、`CGSizeMake`和`CGRectMake`）*\n\
    \n```\n/*** Definitions of inline functions. ***/\nCG_INLINE CGPoint\nCGPointMake(CGFloat\
    \ x, CGFloat y)\n{\n    CGPoint p; p.x = x; p.y = y; return p;\n}\n\nCG_INLINE\
    \ CGSize\nCGSizeMake(CGFloat width, CGFloat height)\n{\n    CGSize size; size.width\
    \ = width; size.height = height; return size;\n}\n\nCG_INLINE CGRect\nCGRectMake(CGFloat\
    \ x, CGFloat y, CGFloat width, CGFloat height)\n{\n    CGRect rect;\n    rect.origin.x\
    \ = x; rect.origin.y = y;\n    rect.size.width = width; rect.size.height = height;\n\
    \    return rect;\n}\n```\n\n清单 4-2 展示了可用于创建新几何数值的工具函数。这里仅显示了定义，因为这些函数的声明很简单。类型`CGFloat`被简单地定义为`float`。可以推测，这可能会被修改以支持不同的架构。此外，`CG_INLINE`被简单地定义为`static\
    \ inline`，表示编译器可以将编译后的版本注入到调用代码中。\n\n## 使用 Core Graphics 类型\n\n`Core Graphics`定义的类型和函数相当直接。让我们看一个示例来说明它们的用法。清单\
    \ 4-3 展示了一个`UIView`被添加到另一个`UIView`的特定区域。\n\n**清单 4-3.** *添加子视图并指定 Frame 的示例*\n\
    \n```\nUIView* parentView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 480,\
    \ 320)];\nUIView* subView = [UIView new];\n\nCGRect frame = CGRectMake(200, 100,\
    \ 30, 40);\n[subView setFrame:frame];\n[parentView addSubview:subView];\n```\n\
    \n在清单 4-3 中，我们以两种不同的方式创建了两个`UIView`。`UIView`类型的`parentView`以两种方式中更标准的方式创建：调用`alloc`，然后调用`initWithFrame:`并传入一个新的`CGRect`来指定其位置和大小。创建`UIView`的另一种完全有效的方法是简单地调用`new`，然后设置`frame`属性，就像我们对`subView`所做的那样。这段代码中做的最后一件事是通过调用`addSubview:`将`subView`添加到`parentView`。结果将类似于前面展示的图\
    \ 4-3。\n\n现在你已经理解了`UIView`子类的基础知识以及它们如何嵌套和放置，可以看看一些基本的动画了。这将为你提供探索我们简单游戏所需的理解。\n\
    \n## 理解动画\n\n创建事件驱动游戏有两个关键组成部分。第一个是创建动画，第二个是管理游戏状态。在 iOS 应用中有多种创建动画的方式。在前一章中，我们实现了视图间过渡的动画。在本节中，我们将回顾它是如何完成的，并展示一个类似的例子来加深你的理解。在本章末尾，你将看到第三种技术，它探索了前两个示例所使用的后备类。\n\
    \n### UIView 的静态动画任务\n\n类`UIView`具有静态任务，旨在简化基本动画的创建。这些同样的任务可用于触发预设动画，例如用于从一个视图切换到另一个视图的过渡。图\
    \ 4-4 展示了当用户从高分视图切换到欢迎视图时发生的预设动画。\n\n**图 4-4.** *翻转动画*\n\n从图 4-4 的左上角开始，高分视图从左向右翻转，直到它变成一条细缝。动画继续进行，以平滑、视觉上吸引人的过渡方式展示欢迎视图。这只是\
    \ iOS 中许多内置动画之一。用户已经了解到，这种标准过渡表示上下文的变化。要理解这个动画是如何触发的，让我们先看看在第 3 章中执行从高分视图切换到欢迎视图的步骤。这些步骤如清单\
    \ 4-4 所示。\n\n**清单 4-4.** *GameController.m（`highscoreDoneClicked:`）*\n\n```\n\
    - (IBAction)highscoreDoneClicked:(id)sender {\n    [UIView beginAnimations:@\"\
    AnimationId\" context:@\"flipTransitionToBack\"];\n    [UIView setAnimationDuration:1.0];\n\
    \    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft forView:self.view\
    \ cache:YES];\n    [highscoreController.view removeFromSuperview];\n    [self.view\
    \ addSubview: welcomeView];\n    [UIView commitAnimations];\n}\n```\n\n清单 4-4\
    \ 展示了当用户触摸高分视图中的“完成”按钮时调用的任务。该任务的第一行调用了静态任务`beginAnimations:context:`。这个任务有点像启动一个数据库事务，因为它正在创建一个动画对象，并且在调用`commitAnimations`之前对`UIView`实例发生的任何变化都是此动画的一部分。传递给`beginAnimations:context:`的第一个`NSString`是后备动画对象的标识符。第二个`NSString`与第一个类似，用于提供关于动画创建时间的额外上下文。在这个例子中，这两个字符串可以是`nil`，因为我们在定义动画之后实际上并不太关心它。在下一个例子中，我们将利用这些字符串来定义动画完成时要运行的代码。\n\
    \n在调用`beginAnimations:context:`之后，通过调用`setAnimationDuration:`定义动画的持续时间。传入的值是动画应运行的秒数。对`setAnimationTransition:forView:cache:`的调用表明我们希望使用\
    \ iOS 附带的预设动画之一。我们选择的动画是`UIViewAnimationFlipFromLeftForView`。由于这是一个过渡动画，我们指定视图`self.view`，即其内容正在发生变化的父视图。"
  raw: 'Core Graphics defines a number of types, structs, and functions. These include
    the previously mentioned CGRect, CGpoint, and CGSize. Listing 4–1 shows the definitions
    of these three structs.


    **Listing 4–1.** *CGGeometry.h (CGRect, CGPoint, and CGSize)*


    /* Points. */


    struct CGPoint {


    CGFloat x;


    CGFloat y;


    };


    typedef struct CGPoint CGPoint;


    /* Sizes. */


    struct CGSize {


    CGFloat width;


    CGFloat height;


    };


    typedef struct CGSize CGSize;


    /* Rectangles*/


    {


    CGPoint origin;


    CGSize size;


    };


    typedef struct CGRect CGRect;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00230.png)


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **69**


    Listing 4–1 presents each of the core structs that define the region of a subview
    in relation to its parent. These structs are defined in the file CGGeometry.h,
    which is part of the Core Graphics framework, a standard part of any iOS project.
    Notice that x, y, width, and height values are defined as CGFloat. The unit for
    these values is points, not pixels.


    The difference is subtle at first, but the idea here is that the coordinates and
    sizes you are specifying with these values is meant to be resolution independent.
    Further discussion of points vs. pixels can be found in Appendix A.


    **TIP:** The letters *CG* in the names of structs such as CGRect refer to the
    Core Graphics framework. So a CGRect is referred to as a *Core Graphics Rect*
    when you want to be precise.


    To create any of the base geometric types from Listing 4–1, an inline utility
    function is defined in CGGeometry.h, as seen in Listing 4–2.


    **Listing 4–2.** *CGGeometry.h (CGPointMake, CGSizeMake, and CGRectMake)*


    /*** Definitions of inline functions. ***/


    CG_INLINE CGPoint


    CGPointMake(CGFloat x, CGFloat y)


    {


    CGPoint p; p.x = x; p.y = y; return p;


    }


    CG_INLINE CGSize


    CGSizeMake(CGFloat width, CGFloat height)


    {


    CGSize size; size.width = width; size.height = height; return size;


    }


    CG_INLINE CGRect


    CGRectMake(CGFloat x, CGFloat y, CGFloat width, CGFloat height)


    {


    CGRect rect;


    rect.origin.x = x; rect.origin.y = y;


    rect.size.width = width; rect.size.height = height;


    return rect;


    }


    Listing 4–2 shows the utility functions that can be used to create new geometry
    values.


    Only the definition is shown, because the declaration of these functions is trivial.
    The type CGFloat is defined simply as float. Presumably, this could be changed
    to support a different architecture. Also, CG_INLINE is simply defined as static
    inline, indicating that the compiler may inject a compiled version into the calling
    code.


    **Using Core Graphics Types**


    The types and functions defined by Core Graphics are pretty staightforward. Let’s
    look at an example to illustrate their use. Listing 4–3 shows one UIView being
    added to another at a specific region.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00439.png)


    **70**


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **Listing 4–3.** *Example of Adding a Subview and Specifying the Frame* UIView*
    parentView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 480, 320)]; UIView*
    subView = [UIView new];


    CGRect frame = CGRectMake(200, 100, 30, 40);


    [subView setFrame:frame];


    [parentView addSubview:subView];


    In Listing 4–3, we create two UIViews in two different ways. The UIView parentView
    is created in the more standard of the two ways, by calling alloc and then calling
    initWithFrame: and passing in a new CGRect to specify its location and size. Another
    perfectly valid way to create a UIView is by simply calling new and then setting
    the frame property, as we do for subView. The last thing done in this code snippet
    is to add subView to parentView by calling addSubview:. The result would be something
    like Figure 4–3 shown earlier.


    Now that you understand the basics of the UIView subclasses and how they are nested
    and placed, you can take a look at a few basic animations. This will give you
    the understanding required to explore our simple game.


    **Understanding Animations**


    There are two key components to creating an event-driven game. The first is creating
    animations, and the second is managing the game state. There are several ways
    to create animations in an iOS application. In the preceding chapter, we implemented
    animations to transition from view to view. In this section, we will review how
    that was done and show a similar example to flesh out your understanding. At the
    end of this chapter, you will take a look at yet a third technique that explores
    the backing classes used by the first two examples.


    **The Static Animation Tasks of UIView**


    The class UIView has static tasks designed to simplify the creation of basic animations.


    These same tasks can be used to trigger canned animations, such as the transitions
    used to switch from one view to another. Figure 4–4 shows the canned animation
    that occurs when the user switches from the High Score view to the Welcome view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00482.png)


    ![](images/00087.jpeg)


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    **71**


    **Figure 4–4.** *Flip animation*


    Starting at the upper left of Figure 4–4, the High Score view flips from left
    to right until it becomes just a sliver. The animation continues, revealing the
    Welcome view in a smooth, visually appealing transition. This is just one of the
    many built-in animations in iOS. Users have learned that this standard transition
    indicates a change in context. To understand how this animation was triggered,
    let’s start by looking at the steps preformed in Chapter 3 to switch from the
    High Score view to the Welcome view. These steps are shown in Listing 4–4.


    **Listing 4–4.** *GameController.m (highscoreDoneClicked:)*


    - (IBAction)highscoreDoneClicked:(id)sender {


    [UIView beginAnimations:@"AnimationId" context:@"flipTransitionToBack"];


    [UIView setAnimationDuration:1.0];


    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft forView:self.view
    cache:YES];


    [highscoreController.view removeFromSuperview];


    [self.view addSubview: welcomeView];


    [UIView commitAnimations];


    }


    Listing 4–4 shows the task called when the user touches the Done button in the
    High Score view. The first line of this task calls the static task beginAnimations:context:.
    This task is sort of like starting a database transaction, in that it is creating
    an animation object, and any change that occurs to UIView instances before commitAnimations
    is


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00118.png)


    ![](images/00178.jpeg)


    **72**


    **CHAPTER 4: Quickly Build an Input-Driven Game**


    called is part of this animation. The first NSString passed to beginAnimations:context:
    is an identifier for the backing animation object. The second NSString is similar
    to the first in that it is used to give additional context about when the animation
    was created.


    These two strings could be nil in this example, because we don’t really care much
    about this animation after we define it. In the next example, we will take advantage
    of these strings to define code to be run when the animation is done.


    After the call to beginAnimations:context:, the duration of the animation is defined
    by calling setAnimationDuration:. The value passed in is the number of seconds
    the animation should run. The call to setAnimationTransition:forView:cache: indicates
    that we want to use one of the canned animations that comes with iOS. The animation
    we have selected is UIViewAnimationFlipFromLeftForView. Because this is a transition
    animation, we specify the view self.view, which is the super view whose content
    is changing.'
