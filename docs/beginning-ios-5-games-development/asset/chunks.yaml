    **168**


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **Adding Particle Systems to Your Game**


    Particles systems in games are collections of many, usually small, images drawn
    together to create an overall affect. Particle systems are used in many different
    ways in computer graphics; some common examples are fire, water, hair, grass,
    and many more. In our example, we are going to create a new actor called Particle
    that will be used to draw out Comet actor and improve our Asteroid actor by making
    it appear to break up. Figure 7–3 shows this next example in action.


    **Figure 7–3.** *Comets and destructible asteroids*


    In Figure 7–3, we see three comets traveling across the screen. We also see a
    number of asteroids in various states of exploding. The asteroids drift in from
    off the screen, and when you tap the screen they explode into a number of smaller
    asteroids. In addition to creating the new, smaller asteroids, we also send out
    a number of particles that look like asteroids. This gives the destruction of
    the larger asteroid some added realism, because big chunks of rock seldom break
    cleanly into smaller pieces. These two different particle effects, the comets
    and the asteroid debris, are very different, but each is implemented with the
    same base class, Particle. Let’s take a closer look at the class Example03Controller
    to better understand how this example works before diving into the details of
    each new actor. Listing 7–14, shows the important parts of Example03Controller.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00119.png)


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **169**


    **Listing 7–14.** *Example03Controller.m (doSetup and updateScene)*


    -(BOOL)doSetup{


    if ([super doSetup]){


    NSMutableArray* classes = [NSMutableArray new];


    [classes addObject:[Asteroid class]];


    [self setSortedActorClasses:classes];


    UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]


    initWithTarget:self action:@selector(tapGesture:)];


    [tapRecognizer setNumberOfTapsRequired:1];


    [tapRecognizer setNumberOfTouchesRequired:1];


    [actorsView addGestureRecognizer:tapRecognizer];


    return YES;


    }


    return NO;


    }


    -(void)updateScene{


    if (self.stepNumber % (60*5) == 0){


    [self addActor:[Comet comet:self]];


    }


    if ([[self actorsOfType:[Asteroid class]] count] == 0){


    int count = arc4random()%4+1;


    for (int i=0;i<count;i++){


    [self addActor:[Asteroid asteroid:self]];


    }


    }


    [super updateScene];


    }


    In Listing 7–14, we see two tasks of the class Example03Controller: doSetup and
    updateScene. The task doSetup follows our now familiar pattern of identifying
    the actor classes we want efficient access to, in this case Asteroid, by calling
    the task setSortedActorClass:. We also create a UITapGestureRecognizer called
    tapRecognizer and register that with the actorsView object. In this way, the task
    tapGesture: will be called when we tap the screen.


    The task updateScene, as shown in Listing 7–14, adds a new Comet actor every five
    seconds (60*5) and adds one to four Asteroids when ever there are zero Asteroids
    in the scene. As with the previous examples, the code in the controller class
    is relatively simple. Most of the real logic for the example lives in the different
    actor classes. Before we look at the Asteroid class, let’s consider the task tapGesture:,
    shown in Listing 7–


    15.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00179.png)


    **170**


    **CHAPTER 7: Build Your Game: Vector Actors and Particles**


    **Listing 7–15.** *Example03Controller.m (tapGesture:)*


    - (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{


    for (Asteroid* asteroid in [self actorsOfType:[Asteroid class]]){


    [asteroid doHit:self];


    }


    }


    In Listing 7–15, we see that the tapGesture: task, which is called when the user
    taps the screen. It simply iterates through each Asteroid in the scene and calls
    doHit: on it. It is because of this task that we wanted to make sure we had easy
    access to the Asteroids in the scene.


    The following section describes the implementation details of the actor Asteroid,
    as well the particle effect that is created when each Asteroid explodes.


    **Simple Particle System**


    The simplest particle systems involve creating a bunch of short-lived items on
    the screen that decay or disappear relatively quickly. Let’s take a look at the
    Asteroid class and see how we can create a very simple particle effect.


    **The Asteroid Class**


    Before we look at how we add the particle effect to the destruction of the Asteroid,
    let’s take a moment to understand the Asteroid class as whole. This will give
    us the context to understand the particle effect while building another Actor
    class. The header for the Asteroid class is shown in Listing 7–16.


    **Listing 7–16.** *Asteroid.h*


    @interface Asteroid : Actor{


    }


    @property (nonatomic) int level;


    +(id)asteroid:(GameController*)aController;


    +(id)asteroidOfLevel:(int)aLevel At:(CGPoint)aCenter;


    -(void)doHit:(GameController*)controller;


    @end


    In Listing 7–16, we see the declaration of the class Asteroid. We see that Asteroid
    class extends Actor and has two constructors. The constructor asteroid: is used
    by the Example03Controller to add the biggest Asteroids into the scene. The constructor
    asteroidOfLevel:At: is used to create and add the smaller Asteroids in the task
    doHit:, which is called after a tap event. Listing 7–17 shows the first constructors
    for the class Asteroid.


