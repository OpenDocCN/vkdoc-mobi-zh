  **7** **第 1 章：第一个简单游戏**


  现在项目中有了一个新视图，我们需要设置一种在视图之间导航的方式。


  ### 简单导航




  现在我们要创建一些按钮，让我们能够在不同视图之间导航。第一步是添加按钮，然后配置导航。图 1-7 展示了这些视图正在连接导航的过程。


  **图 1-7.** *带导航的故事板*


  在图 1-7 中，我们看到我们将一个`UIButton`从库项目 A 拖到了每个视图上。我们将左侧的`UIButton`标记为"Play"，右侧的`UIButton`标记为"Back"。为了让
  Play 按钮导航到右侧的视图，我们从 Play 按钮（项目 B）向右拖拽到右侧视图，然后在项目 C 处释放。执行此操作时，会弹出一个上下文对话框，让我们选择想要的过渡类型。我选择了
  Model。我们可以对 Back 按钮重复此过程：将其向右拖拽到左侧视图，并选择返回时想要的过渡类型。此时你可以运行应用程序，并在两个视图之间导航。不过，要让它成为一个游戏，我们还需要加入石头、剪刀、布视图和按钮。


  ## 添加石头、剪刀、布视图


  要添加石头、剪刀、布视图，我们需要从正在构建的项目中的示例代码里包含一个类。最简单的方法是打开示例项目，将文件`RockPaperScissorsView.h`和`RockPaperScissorsView.m`从示例项目拖拽到新项目中。图
  1-8 显示了将文件拖入 Xcode 项目时弹出的对话框。


  **图 1-8.** *将文件拖入 Xcode 项目*


  在清单 1-8 中，我们看到确认要将新文件拖入 Xcode 项目的对话框。请确保"Destination"复选框已勾选。否则 Xcode 不会将文件复制到目标项目的位置。最好将所有项目资源保存在项目的根文件夹下。Xcode
  足够灵活，不强制你这样做，但我的确被这种灵活性坑过很多次。不管怎样，既然我们项目中已经有了所需的类，让我们来连接界面以包含它。


  ## 自定义 UIView


  创建简单应用程序的最后一步是在我们的界面中创建一个新的`UIView`，其类为`RockPaperScissorsView`。图 1-9 展示了如何操作。


  **图 1-9.** *自定义的 UIView*


  在图 1-9 中，我们看到在右侧的视图中添加了一个`UIView`。我们通过将项目 A 中的图标拖拽到项目 B 中的故事板上来完成此操作。调整新`UIView`的大小后，我们将其类设置为`RockPaperScissorsView`，如项目
  C 所示。此时，从技术角度来说我们已经完成了。你创建了第一个游戏！显然，我们还没有研究`RockPaperScissorsView`的实现，这将在下一章讨论。


  本书的其余部分将以示例 1 为起点。我们将学习许多新技术，来自定义简单的应用程序，打造一个真正完整的游戏。


  ## 总结


  在本章中，你快速浏览了 Xcode，学习了如何用它创建项目并使用 Storyboard 构建简单的导航。后续章节将在本章所学基础知识之上，构建一个完整的游戏。


