  \ 6 章中进行了完整描述。`Bullet`类中唯一的新特性是`VectorRepresentation`类，该类也被`HealthBar`类用来指示这种类型的演员将使用\
  \ Core Graphics 绘制。\n\n让我们更仔细地查看`VectorRepresentation`类，了解它如何与我们的游戏引擎和演员交互，为使用 Core\
  \ Graphics 渲染演员提供简单的方法。\n\n## 通过`VectorRepresentation`使用 Core Graphics 绘制演员\n\n\
  Core Graphics 库很有趣，因为它不是一个矢量图形库（如 SVG），但它擅长栅格化矢量数据结构。考虑到 Core Graphics 最初基于 PDF，这非常合理。Core\
  \ Graphics 是一个出色的库，用于以分辨率无关的方式渲染高质量图形。这意味着我们的代码不会指定哪个像素是什么颜色，而是描述形状以及它们应如何填充。Core\
  \ Graphics 也被称为 Quartz。完整的可用绘图函数描述可在此处找到：http://goo.gl/6i5gr\n\n在 iOS 中，`UIView`可以通过重写`drawRect:`任务来指定其绘制方式，获取其图形上下文的引用，然后调用一些绘图方法。由于我们的游戏引擎使用`UIView`来表示每个演员，我们知道最终将创建一个`UIView`的子类，并为基于矢量的演员调用绘图代码。`VectorRepresentation`类的工作是管理演员和绘制它的视图之间的关系。\n\
  \n## `VectorRepresentation`类\n\n`VectorRepresentation`类负责创建适合绘制演员的`UIView`。让我们从`VectorRepresentation`的头文件开始探索这个类。参见`Listing7–7`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00081.png)\n\n**第\
  \ 7 章 构建你的游戏：矢量演员与粒子**\n\n**163**\n\n### `Listing 7–7`. *VectorRepresentation.h*\n\
  \n```\n#import <Foundation/Foundation.h>\n\n#import \"Actor.h\"\n\n@class VectorActorView;\n\
  \n@protocol VectorRepresentationDelegate\n\n-(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context\
  \ InRect:(CGRect)rect;\n\n@end\n\n@interface VectorRepresentation : NSObject<Representation>\
  \ {\n\nVectorActorView* view;\n\n}\n\n@property (nonatomic, assign) NSObject<VectorRepresentationDelegate>*\
  \ delegate;\n\n+(id)vectorRepresentation;\n\n@end\n```\n\n在`Listing7–7`中，我们看到`VectorRepresentation`类定义了一个名为`VectorRepresentationDelegate`的协议，所有基于矢量的演员必须遵守该协议。该协议要求所有遵守它的类实现`drawActor:WithContext:InRect:`任务，这是实际绘图代码应放置的地方。\n\
  \n`VectorRepresentation`类扩展了`NSObject`并遵守`Representation`协议，就像`ImageRepresentation`类一样。这里的想法是，大多数代码不应关心我们使用哪种表示类型——矢量还是图像。我们只需创建正确的`Representation`对象，并将其与每个演员关联。\n\
  \n我们还看到`VectorRepresentation`类有一个类型为`VectorActorView`的单一属性`view`。`VectorActorView`是`UIView`的子类，最终将调用由`VectorRepresentationDelegate`协议定义的`drawActor:WithContext:InRect:`任务。在查看`VectorActorView`类之前，让我们先看看`VectorRepresentation`的实现，如`Listing7–8`所示。\n\
  \n### `Listing 7–8`. *VectorRepresentation.m*\n\n```\n#import \"VectorRepresentation.h\"\
  \n\n#import \"VectorActorView.h\"\n\n@implementation VectorRepresentation\n\n@synthesize\
  \ delegate;\n\n+(id)vectorRepresentation{\n\nreturn [VectorRepresentation new];\n\
  \n}\n\n-(UIView*)getViewForActor:(Actor*)anActor In:(GameController*)aController{\n\
  \nif (view == nil){\n\nview = [VectorActorView new];\n\n[view setBackgroundColor:[UIColor\
  \ clearColor]];\n\n[view setActor: anActor];\n\n[view setDelegate:delegate];\n\n\
  [anActor setNeedsViewUpdated:YES];\n\n}\n\nreturn view;\n\n}\n\n-(void)updateView:(UIView*)aView\
  \ ForActor:(Actor*)anActor\n\nIn:(GameController*)aController{\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00440.png)\n\n**164**\n\n**第 7 章 构建你的游戏：矢量演员与粒子**\n\nif ([anActor needsViewUpdated]){\n\
  \n[aView setNeedsDisplay];\n\n[anActor setNeedsViewUpdated:NO];\n\n}\n\n}\n\n@end\n\
  ```\n\n在`Listing7–8`中，我们看到`VectorRepresentation`类的实现，它有一个简单的构造函数。我们还看到它实现了由`Representation`协议定义的`getViewForActor:In:`和`updateView:In:`任务。在`getViewForActor:In:`任务中，我们创建了一个新的`VectorActorView`，并指定要用于绘图的演员和委托。然后我们调用`setNeedsViewUpdated`，确保至少调用一次演员的绘图代码。\n\
  \n在`updateView:In:`任务中，我们检查演员是否需要更新，如果需要，我们在`UIView aView`上调用`setNeedsDisplay`。`setNeedsDisplay`任务由`UIView`类定义，并向底层图形系统指示`UIView`应重新绘制。实际上，这会导致调用`VectorActorView`的`drawRect:`任务，进而调用我们演员的`drawActor:WithContext:InRect:`。接下来，我们想查看`VectorActorView`类的详细信息。\n\
  \n## 用于基于矢量的演员的`UIView`：`VectorActorView`\n\n`VectorActorView`类是`UIView`的子类，用于在场景中表示演员，方式与我们使用`UIImageView`实例表示基于图像的演员类似。让我们看一下`VectorActorView`类，了解它如何组合在一起，从头文件开始。参见`Listing7–9`。\n\
  \n### `Listing 7–9`. *VectorActorView.h*\n\n```\n#import <UIKit/UIKit.h>\n\n#import\
  \ \"Actor.h\"\n\n#import \"VectorRepresentation.h\"\n\n@interface VectorActorView\
  \ : UIView {\n\n}\n\n@property (nonatomic, retain) Actor* actor;\n\n@property (nonatomic,\
  \ retain) NSObject<VectorRepresentationDelegate>* delegate;\n\n@end\n```\n\n\n\n\
  在 `Listing 7–9` 中，我们看到`VectorActorView`继承了`UIView`并有两个属性。第一个属性是一个`Actor`，即要被绘制的主角。第二个属性是`VectorRepresentationDelegate`，负责实际绘制该主角。在此示例中，这两个对象（主角与委托）将是同一个对象，即`Bullet`或`HealthBar`。`VectorActorView`类的实现非常简单，如`Listing\
  \ 7–10`所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00162.png)\n\
  \n**第 7 章：构建你的游戏：矢量主角与粒子**\n\n**165**\n\n**清单 7–10.** *VectorActorView.m*\n\n```\n\
  - (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    [delegate drawActor:actor WithContext:context InRect:rect];\n}\n```\n\n在`Listing\
  \ 7–10`中，我们看到`VectorActorView`类的实现只有一个方法，即`drawRect:`的实现。在此方法中，我们通过调用`UIGraphicsGetCurrentContext`获取当前图形上下文的引用，并将该上下文和主角传递给委托，以便在指定的`CGRect`中进行绘制。现在让我们看一个具体的例子。\n\
  \n**绘制`HealthBar`**\n\n如前所述，本示例中使用的矢量化主角在绘制方面是它们自己的委托，因此我们再次查看`HealthBar`类并了解它如何绘制自身。\n\
  \n参见 `Listing 7–11`。\n\n**清单 7–11.** *HealthBar.m (drawActor:WithContext:InRect:)*\n\
  \n```\n-(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect{\n\
  \    CGContextClearRect(context,rect);\n    float height = 10;\n    CGRect backgroundArea\
  \ = CGRectMake(0, self.radius-height/2, self.radius*2, height);\n    [self.backgroundColor\
  \ setFill];\n    CGContextFillRect(context, backgroundArea);\n    CGRect healthArea\
  \ = CGRectMake(0, self.radius-height/2, self.radius*2*percent, height);\n    [self.color\
  \ setFill];\n    CGContextFillRect(context, healthArea);\n}\n```\n\n在`Listing 7–11`中，我们首先调用`CGContectClearRect`。这会擦除给定矩形区域中的任何旧内容，为实际绘制做好准备。要绘制`HealthBar`，我们只需绘制两个矩形：一个用于背景，另一个位于背景之上，表示生命条的当前百分比。要绘制一个矩形区域（而不是绘制矩形的边缘），我们通过调用`CGRectMake`定义了一个矩形。然后通过调用`UIColor`对象`backgroundColor`的`setFill`来指定要使用的颜色，该对象是`HealthBar`的一个属性。\n\
  \n为了实际改变正在绘制的`UIView`像素的颜色，我们调用`CGContextFillRect`，传入上下文和`CGRect`的`backgroundArea`。要绘制前景矩形，我们重复该过程，但顶部矩形`healthArea`的宽度是根据属性`percent`的值计算的。这表明每次`HealthBar`的百分比发生变化时，我们都必须重绘`HealthBar`。为了确保这一点，我们必须提供自己的`setPercent:`实现，而不是依赖通过合成属性提供的默认实现。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00444.png)\n\n**166**\n\
  \n**第 7 章：构建你的游戏：矢量主角与粒子**\n\n`Listing 7–12`展示了`HealthBar`类中`setPercent:`的自定义实现。\n\
  \n**清单 7–12.** *HealthBar.m (setPercent:)*\n\n```\n-(void)setPercent:(float)aPercent{\n\
  \    if (percent != aPercent){\n        percent = aPercent;\n        if (percent\
  \ < 0){\n            percent = 0;\n        }\n        if (percent > 1){\n      \
  \      percent = 1;\n        }\n        [self setNeedsViewUpdated:YES];\n    }\n\
  }\n```\n\n`Listing 7–12`展示了我们自定义的`setPercent:`实现。首先我们检查`percent`（属性的后备变量）和传入值`aPercent`是否不同。如果不同，我们将`percent`设置为`aPercent`，并通过确保其值在\
  \ 0 和 1 之间对其进行归一化。最后，我们调用`setNeedsViewUpdate:`并传入`YES`。这确保`HealthBar`将在动画的下一步中被重绘。现在让我们看一下`Bullet`类是如何绘制的。\n\
  \n**绘制`Bullet`类**\n\n我们已经查看了`HealthBar`类并检查了它的绘制方式。我们只使用了一个绘图函数`CGContextFillRect`来创建视觉效果。当然，还有更多更多的绘图函数可以让你创建任何想要的视觉效果。我们不会涵盖所有这些函数，但网上有极好的文档可供参考。话虽如此，让我们看看`Bullet`类的绘制实现。参见\
  \ `Listing 7–13`。\n\n**清单 7–13.** *Bullet.m (drawRect:WithContext:InRect:)*\n\n\
  ```\n-(void)drawActor:(Actor*)anActor WithContext:(CGContextRef)context InRect:(CGRect)rect{\n\
  \    CGContextAddEllipseInRect(context, rect);\n    CGContextClip(context);\n  \
  \  CGFloat locations[2];\n    locations[0] = 0.0;\n    locations[1] = 1.0;\n   \
  \ CGColorSpaceRef space = CGColorSpaceCreateDeviceRGB();\n    UIColor* color1 =\
  \ nil;\n    UIColor* color2 = nil;\n    if (damage >= 30){\n        color1 = [UIColor\
  \ colorWithRed:1.0 green:0.8 blue:0.8 alpha:1.0];\n        color2 = [UIColor colorWithRed:1.0\
  \ green:0.0 blue:0.0 alpha:1.0];\n    } else if (damage >= 20){\n        color1\
  \ = [UIColor colorWithRed:0.8 green:1.0 blue:0.8 alpha:1.0];\n        color2 = [UIColor\
  \ colorWithRed:0.0 green:1.0 blue:0.0 alpha:1.0];\n    } else {\n        color1\
  \ = [UIColor colorWithRed:0.8 green:0.8 blue:1.0 alpha:1.0];\n        color2 = [UIColor\
  \ colorWithRed:0.0 green:0.0 blue:1.0 alpha:1.0];\n    }\n    CGColorRef clr[] =\
  \ { [color1 CGColor], [color2 CGColor] };\n    CFArrayRef colors = CFArrayCreate(NULL,\
  \ (const void**)clr, sizeof(clr) / sizeof(CGColorRef), &kCFTypeArrayCallBacks);\n\
  \    CGGradientRef grad = CGGradientCreateWithColors(space, colors, locations);\n\
  \    CGColorSpaceRelease(space);\n    CGContextDrawLinearGradient(context, grad,\
  \ rect.origin, CGPointMake(rect.origin.x + rect.size.width, rect.origin.y + rect.size.height),\
  \ 0);\n    CGGradientRelease(grad);\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00028.png)\n\n**第 7 章：构建你的游戏：矢量主角与粒子**\n\n**167**\n\n在`Listing 7–13`中，我们看到在屏幕上绘制每个子弹的代码。这段代码根据`Bullet`的伤害值绘制一个带有渐变的圆形。在我看来，完成这么简单的事情需要这么多代码。让我们逐段分析。任务的第一行根据提供的矩形为图形上下文创建一个椭圆形裁剪区域。\n\
  \n这意味着后续的绘图操作将仅在此椭圆形区域内可见。\n\n下一步是创建绘图操作所需的渐变。渐变由两个主要部分组成。第一部分是一个数组，指定渐变中每种颜色应应用的位置。在我们的例子中，我们只使用双色渐变，所以我们创建了一个名为`locations`的数组，将第一个值设为\
  \ 0，第二个值设为 1。这意味着颜色应从渐变起点到终点均匀混合。\n\n渐变的第二部分是使用的颜色。在我们的示例中，我们根据`damage`的值指定每种颜色。我们简单地将变量`color1`和`color2`分配给我们想要用来绘制`Bullet`的颜色。一旦我们有了颜色，我们就创建一个`CFArrayRef`来存储颜色。\n\
  \n一旦我们将颜色位置和颜色本身以正确的数组类型存储好之后，我们调用`CGGradientCreateWithColors`并将数组传入，以创建一个名为`grad`的`CGGradientRef`。注意，我们还传入了一个对颜色空间的引用，如`CGColorSpaceRef`的`space`所定义。这是显示器的默认颜色空间，只有在应用程序执行复杂颜色呈现时才需要更改。\n\
  \n一旦`CGGradientRef`创建完成，就调用`CGContextDrawLinearGradient`。它通常会用指定的渐变填充整个`UIView`，但由于我们在任务顶部指定了裁剪区域，我们得到了一个漂亮的圆形，上面均匀地绘制了渐变。\n\
  \n\n\n我们已经了解了如何创建使用 Core Graphics 绘制的演员，这开辟了动态绘制演员的可能性，从而无需为演员的每种可能状态创建图像。在下一节中，我们将讨论另一种绘制演员的策略，即基于粒子的策略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00246.png)\n\n![](img/00065.jpeg)\n\
  \n**168**\n\n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n**为你的游戏添加粒子系统**\n\n游戏中的粒子系统是由许多（通常是小尺寸的）图像组合在一起形成的集合，用以创造整体效果。粒子系统在计算机图形学中有许多不同的应用；一些常见的例子包括火、水、头发、草地等等。在我们的示例中，我们将创建一个名为`Particle`的新演员，用于绘制`Comet`演员，并通过使其看起来碎裂来改进我们的`Asteroid`演员。图\
  \ 7–3 展示了这个新示例的运行效果。\n\n**图 7–3.** *彗星与可摧毁的小行星*\n\n在图 7–3 中，我们看到三颗彗星穿过屏幕。我们还看到许多小行星处于不同的爆炸状态。小行星从屏幕外飘入，当你点击屏幕时，它们会爆炸成许多更小的小行星。除了创建新的、更小的小行星外，我们还会发射出许多看起来像小行星碎片的粒子。这为较大行星的毁灭增加了更多的真实感，因为大块的岩石很少能干净利落地碎成小块。这两种不同的粒子效果——彗星和小行星碎片——截然不同，但各自都使用相同的基类`Particle`实现。让我们仔细看看`Example03Controller`类，以便在深入了解每个新演员的细节之前，更好地理解这个示例的工作原理。清单\
  \ 7–14 展示了`Example03Controller`的重要部分。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00119.png)\n\n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n**169**\n\n**清单 7–14.** *`Example03Controller.m`\
  \ (`doSetup` 和 `updateScene`)*\n\n```\n-(BOOL)doSetup{\n\nif ([super doSetup]){\n\
  \nNSMutableArray* classes = [NSMutableArray new];\n\n[classes addObject:[Asteroid\
  \ class]];\n\n[self setSortedActorClasses:classes];\n\nUITapGestureRecognizer* tapRecognizer\
  \ = [[UITapGestureRecognizer alloc]\n\ninitWithTarget:self action:@selector(tapGesture:)];\n\
  \n[tapRecognizer setNumberOfTapsRequired:1];\n\n[tapRecognizer setNumberOfTouchesRequired:1];\n\
  \n[actorsView addGestureRecognizer:tapRecognizer];\n\nreturn YES;\n\n}\n\nreturn\
  \ NO;\n\n}\n\n-(void)updateScene{\n\nif (self.stepNumber % (60*5) == 0){\n\n[self\
  \ addActor:[Comet comet:self]];\n\n}\n\nif ([[self actorsOfType:[Asteroid class]]\
  \ count] == 0){\n\nint count = arc4random()%4+1;\n\nfor (int i=0;i<count;i++){\n\
  \n[self addActor:[Asteroid asteroid:self]];\n\n}\n\n}\n\n[super updateScene];\n\n\
  }\n```\n\n在清单 7–14 中，我们看到了`Example03Controller`类的两个任务：`doSetup`和`updateScene`。`doSetup`任务遵循我们已经熟悉的模式，即通过调用`setSortedActorClass:`任务来识别我们想要高效访问的演员类，在本例中是`Asteroid`。我们还创建了一个名为`tapRecognizer`的`UITapGestureRecognizer`，并将其注册到`actorsView`对象上。通过这种方式，当我们点击屏幕时，`tapGesture:`任务将被调用。\n\
  \n`updateScene`任务，如清单 7–14 所示，每五秒（`60*5`）添加一个新的`Comet`演员，并且每当场景中零个小行星时，添加一到四个`Asteroid`演员。与之前的示例一样，控制器类中的代码相对简单。示例中大部分真正的逻辑存在于不同的演员类中。在我们查看`Asteroid`类之前，先考虑一下`tapGesture:`任务，如清单\
  \ 7–15 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00179.png)\n\
  \n**170**\n\n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n**清单 7–15.** *`Example03Controller.m` (`tapGesture:`)\
  \ *\n\n```\n- (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{\n\nfor\
  \ (Asteroid* asteroid in [self actorsOfType:[Asteroid class]]){\n\n[asteroid doHit:self];\n\
  \n}\n\n}\n```\n\n在清单 7–15 中，我们看到`tapGesture:`任务会在用户点击屏幕时被调用。它只是遍历场景中的每一个`Asteroid`，并对其调用`doHit:`。正是因为这个任务，我们才需要确保能够方便地访问场景中的`Asteroid`。\n\
  \n以下部分描述了`Asteroid`演员的实现细节，以及每个`Asteroid`爆炸时产生的粒子效果。\n\n**简单粒子系统**\n\n最简单的粒子系统涉及在屏幕上创建一堆短命的元素，这些元素相对较快地衰减或消失。让我们来看看`Asteroid`类，并了解如何创建一个非常简单的粒子效果。\n\
  \n**`Asteroid`类**\n\n在我们研究如何为`Asteroid`的毁灭添加粒子效果之前，让我们花点时间全面了解`Asteroid`类。这将为我们理解粒子效果，同时构建另一个`Actor`类提供上下文。`Asteroid`类的头文件如清单\
  \ 7–16 所示。\n\n**清单 7–16.** *`Asteroid.h`*\n\n```\n@interface Asteroid : Actor{\n\
  \n}\n\n@property (nonatomic) int level;\n\n+(id)asteroid:(GameController*)aController;\n\
  \n+(id)asteroidOfLevel:(int)aLevel At:(CGPoint)aCenter;\n\n-(void)doHit:(GameController*)controller;\n\
  \n@end\n```\n\n在清单 7–16 中，我们看到了`Asteroid`类的声明。我们看到`Asteroid`类扩展了`Actor`，并有两个构造函数。构造函数`asteroid:`被`Example03Controller`用来将最大的小行星添加到场景中。构造函数`asteroidOfLevel:At:`用于在点击事件后调用的`doHit:`任务中创建和添加更小的小行星。清单\
  \ 7–17 展示了`Asteroid`类的第一个构造函数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00301.png)\n\n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n**171**\n\n**清单 7–17.** *`Asteroid.m`\
  \ (`asteroid:`) *\n\n```\n+(id)asteroid:(GameController*)acontroller{\n\nCGSize\
  \ gameSize = [acontroller gameAreaSize];\n\nCGPoint gameCenter = CGPointMake(gameSize.width/2.0,\
  \ gameSize.height/2.0); float directionOffScreen = arc4random()%100/100.0 * M_PI*2;\n\
  \nfloat distanceFromCenter = MAX(gameCenter.x,gameCenter.y) * 1.2;\n\nCGPoint center\
  \ = CGPointMake(gameCenter.x +\n\ncosf(directionOffScreen)*distanceFromCenter, gameCenter.y\
  \ +\n\nsinf(directionOffScreen)*distanceFromCenter);\n\nreturn [Asteroid asteroidOfLevel:4\
  \ At:center];\n\n}\n```\n\n在清单 7–17 中，我们看到了`asteroid:`任务，它通过调用另一个构造函数创建了一个大小为 4\
  \ 的新`Asteroid`。大部分工作只是为`Asteroid`找到一个屏幕外的起始点。这与第 6 章中用于查找`Powerup`演员点的代码相同。详细信息可参见图\
  \ 6-3。`Asteroid`的第二个构造函数如清单 7–18 所示。\n\n**清单 7–18.** *`Asteroid.m` (`asteroidOfLevel:At:`)\
  \ *\n\n```\n+(id)asteroidOfLevel:(int)aLevel At:(CGPoint)aCenter{\n\nImageRepresentation*\
  \ rep = [ImageRepresentation\n\nimageRepWithDelegate:[AsteroidRepresentationDelegate\
  \ instance]];\n\n[rep setBackwards:arc4random()%2 == 0];\n\nif (aLevel >= 4){\n\n\
  [rep setStepsPerFrame:arc4random()%2+2];\n\n} else {\n\n[rep setStepsPerFrame:arc4random()%4+1];\n\
  \n}\n\nAsteroid* asteroid = [[Asteroid alloc] initAt:aCenter WithRadius:4 + aLevel*7\n\
  \nAndRepresentation:rep];\n\n[asteroid setLevel:aLevel];\n\n[asteroid setVariant:arc4random()%AST_VARIATION_COUNT];\n\
  \n[asteroid setRotation: (arc4random()%100)/100.0*M_PI*2];\n\nfloat direction =\
  \ arc4random()%100/100.0 * M_PI*2;\n\nLinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
  \ AtSpeed:1];\n\n[motion setWrap:YES];\n\n[asteroid addBehavior:motion];\n\nreturn\
  \ asteroid;\n\n}\n```\n\n\n\n在`Listing 7–18`中，我们看到了`Asteroid`类的主构造函数。我们还看到我们根据`aLevel`的值创建了具有半径的`Asteroid`。通过这种方式，当小行星破裂时，它们会逐渐变小，因为每个新小行星的等级比其创建者低一级。在`asteroidOfLevel:At:`中，我们做的最后一件事是向`Asteroid`添加一个`LinearMotion`行为，使其沿直线移动并环绕屏幕。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00410.png)\n\n**172**\n\
  \n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n在`Listing 7–8`中需要注意的另一件事是，我们以一种与之前略有不同的方式创建`ImageRepresentation`。以前，我们创建的所有`ImageRepresentation`都使用\
  \ actor 作为委托，这是有道理的，因为它将所有关于`Actor`的信息放在一个文件中。然而，我们希望`Asteroid`类和我们将创建的`Particle`看起来相同，只是大小不同。为了简化这一点，我们创建了一个名为`AsteroidRepresentationDelegate`的新类，它负责指定如何渲染看起来像小行星的东西。让我们继续学习`AsteroidRepresentationDelegate`类。\n\
  \n**使用同一个类表示 Asteroid 和 Particle**\n\n如前所述，`Asteroid`的绘制方式定义在`AsteroidRepresentationDelegate`类中。这个类将用于表示每个`Asteroid`以及在小行星破裂时创建的`Particle`。`AsteroidRepresentationDelegate`的实现如`Listing\
  \ 7–19`所示。\n\n**代码清单 7–19.** *AsteroidRepresentationDelegate.m*\n\n```\n+(AsteroidRepresentationDelegate*)instance{\n\
  \nstatic AsteroidRepresentationDelegate* instance;\n\n@synchronized(self) {\n\n\
  if(!instance)\n\n{\n\ninstance\n\n=\n\n[AsteroidRepresentationDelegate\n\nnew];\n\
  \n}\n\n}\n\nreturn\n\ninstance;\n\n}\n\n-(int)getFrameCountForVariant:(int)aVariant\
  \ AndState:(int)aState{\n\nreturn 31;\n\n}\n\n-(NSString*)getNameForVariant:(int)aVariant{\n\
  \nif (aVariant == VARIATION_A){\n\nreturn @\"A\";\n\n} else if (aVariant == VARIATION_B){\n\
  \nreturn @\"B\";\n\n} else if (aVariant == VARIATION_C){\n\nreturn @\"C\";\n\n}\
  \ else {\n\nreturn nil;\n\n}\n\n}\n\n-(NSString*)baseImageName{\n\nreturn @\"Asteroid\"\
  ;\n\n}\n```\n\n在`Listing 7–19`中，我们看到了定义基于图像的 actor 的预期任务。我们看到图像文件将以字符串`\"Asteroid\"\
  `开头，如`baseImageName`任务所示。\n\n我们还看到，如`getFramesCountForVariant:AndState:`和`getNameForVariant:`所示，每个变体都有\
  \ 31 张图像。\n\n`Listing 7–19`中的`instance`任务对我们来说是新的。这个任务代表了一种为`AsteroidRepresentationDelegate`类创建单例的方法。我们通过同步`Asteroid`的类对象并仅在`instance`变量为`nil`时创建新的`AsteroidRepresentationDelegate`来实现这一点。这允许我们只创建该类的一个实例，即使我们可能有数百个`Asteroid`和`Particle`使用它来指定它们的外观。现在，让我们将所有部分组合起来，看看`Asteroid`是如何被销毁的。\n\
  \n**销毁 Asteroid**\n\n我们已经为理解`Asteroid`如何在屏幕上创建和表示奠定了基础。让我们看看`doHit:`任务，以了解这些部分是如何组合在一起以产生预期行为的。请参阅`Listing\
  \ 7–20`。\n\n**代码清单 7–20.** *Asteroid.m (doHit:)*\n\n```\n-(void)doHit:(GameController*)controller{\n\
  \nif (level > 1){\n\nint count = arc4random()%3+1;\n\nfor (int i=0;i<count;i++){\n\
  \nAsteroid* newAst = [Asteroid asteroidOfLevel:level-1 At:self.center];\n\n[controller\
  \ addActor:newAst];\n\n}\n\n}\n\nint particles = arc4random()%5+1;\n\nfor (int i=0;i<particles;i++){\n\
  \nImageRepresentation* rep = [ImageRepresentation\n\nimageRepWithDelegate:[AsteroidRepresentationDelegate\
  \ instance]];\n\nParticle* particle = [Particle particleAt:self.center WithRep:rep\
  \ Steps:25];\n\n[particle setRadius:6];\n\n[particle setVariant:arc4random()%AST_VARIATION_COUNT];\n\
  \n[particle setRotation: (arc4random()%100)/100.0*M_PI*2];\n\nLinearMotion* motion\
  \ = [LinearMotion linearMotionRandomDirectionAndSpeed];\n\n[particle addBehavior:motion];\n\
  \n[controller addActor: particle];\n\n}\n\n[controller removeActor:self];\n\n}\n\
  ```\n\n在`Listing 7–20`中，我们看到了`doHit:`任务。当我们点击屏幕时，会调用此任务，导致场景中的所有`Asteroid`分裂成许多更小的`Asteroid`。\n\
  \n我们还希望在此过程中生成一些看起来像小行星的`Particle`。我们做的第一件事是确保调用`doHit:`的`Asteroid`等级大于一级，因为这些小行星不应该再创建额外的`Asteroid`。如果`Asteroid`等级大于一级，我们会在当前`Asteroid`的相同位置创建一到三个等级小一级的`Asteroid`。这些新的`Asteroid`将从当前`Asteroid`处沿直线运动，直到它们爆炸。\n\
  \n为了在`Listing 7–20`中创建粒子效果，我们首先确定要添加到场景中的粒子数量。然后，我们使用`Asteroid`的当前位置、`AsteroidRepresentationDelegate`的单例实例创建一个新的`Particle`，并指示该粒子应存活\
  \ 25 个动画步长。粒子的半径设置为`6`。这纯粹是一个美学选择；它可以是任何值。还设置了`variation`和`rotation`属性，以在创建的每个粒子中提供视觉变化。我们对粒子做的最后一件事是在将其添加到场景之前指定一个随机的`LinearMotion`。图\
  \ 7–4 显示了正在创建的新`Asteroid`以及`Particle`的特写。\n\n**图 7–4.** *小行星和粒子，放大视图*\n\n**Particle\
  \ 类**\n\n我们研究了每个`Asteroid`爆炸时`Particle`是如何创建的，现在让我们详细看看`Particle`类以及它是如何实现的，从如`Listing\
  \ 7–21`所示的头文件开始。\n\n**代码清单 7–21.** *Particle.h*\n\n```\n@interface Particle : Actor<ExpireAfterTimeDelegate>\
  \ {\n\n}\n\n@property (nonatomic) float totalStepsAlive;\n\n+(id)particleAt:(CGPoint)aCenter\
  \ WithRep:(NSObject<Representation>*)rep Steps:(float)numStepsToLive;\n\n@end\n\
  ```\n\n在`Listing 7–21`中，`Particle`类的头文件继承自`Actor`并遵循`ExpireAfterTimeDelegate`协议。`Particle`遵循`ExpireAfterTimeDelegate`，因为我们希望改变粒子的不透明度，在其生命周期内淡出。属性`totalStepsAlive`指示`Particle`应在场景中存在多长时间，并在构造函数`particleAt:WithRep:Steps:`中设置。我们还可以看到`Particle`需要一个`Representation`作为参数传递给构造函数。`Particle`的实现如`Listing\
  \ 7–22`所示。\n\n**代码清单 7–22.** *Particle.m*\n\n```\n@implementation Particle\n\n@synthesize\
  \ totalStepsAlive;\n\n+(id)particleAt:(CGPoint)aCenter WithRep:(NSObject<Representation>*)rep\
  \ Steps:(float)numStepsToLive{\n\nParticle* particle = [[Particle alloc] initAt:aCenter\
  \ WithRadius:32\n\nAndRepresentation:rep];\n\n[particle setTotalStepsAlive:numStepsToLive];\n\
  \nExpireAfterTime* expire = [ExpireAfterTime expireAfter:numStepsToLive];\n\n[expire\
  \ setDelegate: particle];\n\n[particle addBehavior:expire];\n\nreturn particle;\n\
  \n}\n\n-(void)stepsUpdated:(ExpireAfterTime*)expire In:(GameController*)controller{\n\
  \nself.alpha = [expire stepsRemaining]/totalStepsAlive;\n\n}\n\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00078.png)\n\n![](img/00136.jpeg)\n\n**第 7 章：构建你的游戏：矢量演员与粒子**\n\n**175**\n\
  \n\n\n\n在清单 7-22 中，我们看到构造函数`particleAt:WithRep:Steps:`相当直接。我们创建了一个新的`Particle`对象，并向其传入提供的`Representation`对象。我们还设置了`totalStepsAlive`属性，并创建了一个`ExpiresAfterTime`行为。请注意，`particle`被设置为`expire`的委托，这将导致每次执行`expires`时都会调用任务`stepsUpdated:In:`。\n\
  \n在任务`stepsUpdated:In:`中，我们仅根据粒子生命周期所处的阶段来调整其`alpha`值。在更复杂的粒子实现中，这种淡出行为将是可配置的，不仅限于开启或关闭，还包括粒子淡出的速率。在这个简单的实现中，每个粒子只是线性地淡出。\n\
  \n我们已经查看了`Asteroid`和`Particle`的实现，并发现在我们的场景中创建粒子效果非常简单。在下一节中，我们将查看`Comet`角色，并看到一个视觉上更引人注目的例子，尽管其实现同样简单。\n\
  \n## 创建基于矢量的粒子\n\n在前面的例子中，我们研究了由图像序列表示的粒子。由于我们有一种灵活的方式来渲染角色，我们可以同样轻松地创建通过程序绘制出来的粒子。在这个例子中，我们将创建停留在原地的粒子，但我们会移动它们被创建的点。这将为我们的`Comet`角色提供一个漂亮的发光尾巴，就像任何彗星应该有的那样。图\
  \ 7-5 展示了我们的新角色——`Comet`。\n\n**图 7-5.** *彗星细节*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00284.png)\n\n**176**\n\n**第 7 章：构建你的游戏：矢量角色与粒子**\n\n在图 7-5 中，我们看到一个彗星的放大细节图。它由许多粒子组成，每个粒子在原地慢慢淡出，从而产生彗星的尾巴。让我们看看`Comet`类，了解这个视觉效果是如何创建的。清单\
  \ 7-23 展示了`Comet`类的头文件。\n\n**清单 7-23.** *Comet.h*\n\n```\nenum{\n    VARIATION_RED\
  \ = 0,\n    VARIATION_GREEN,\n    VARIATION_BLUE,\n    VARIATION_CYAN,\n    VARIATION_MAGENTA,\n\
  \    VARIATION_YELLOW,\n    VARIATION_COUNT\n};\n\n@interface Comet : Actor<VectorRepresentationDelegate>\
  \ {\n}\n\n+(id)comet:(GameController*)controller;\n\n@end\n```\n\n在清单 7-23 中，我们看到`Comet`继承了`Actor`并遵循`VectorRepresentationDelegate`协议。有一个单一的构造函数，接受一个`GameController`作为唯一参数。让我们看看这个构造函数的实现，如清单\
  \ 7-24 所示。\n\n**清单 7-24.** *Comet.m (comet:)*\n\n```\n+(id)comet:(GameController*)controller{\n\
  \    CGSize gameSize = [controller gameAreaSize];\n    CGPoint gameCenter = CGPointMake(gameSize.width/2.0,\
  \ gameSize.height/2.0);\n    float directionOffScreen = arc4random()%100/100.0 *\
  \ M_PI*2;\n    float distanceFromCenter = MAX(gameCenter.x,gameCenter.y) * 1.2;\n\
  \    CGPoint center = CGPointMake(gameCenter.x +\n        cosf(directionOffScreen)*distanceFromCenter,\
  \ gameCenter.y +\n        sinf(directionOffScreen)*distanceFromCenter);\n    ImageRepresentation*\
  \ rep = [ImageRepresentation imageRep];\n    Comet* comet = [[Comet alloc] initAt:center\
  \ WithRadius:16 AndRepresentation:rep];\n    [rep setDelegate:comet];\n    [comet\
  \ setVariant:arc4random()%VARIATION_COUNT];\n    float direction = arc4random()%100/100.0\
  \ * M_PI*2;\n    LinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
  \ AtSpeed:1];\n    [motion setWrap:YES];\n    [comet addBehavior: motion];\n   \
  \ ExpireAfterTime* expire = [ExpireAfterTime expireAfter:60*15];\n    [comet addBehavior:\
  \ expire];\n    return comet;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00273.png)\n\n**第 7 章：构建你的游戏：矢量角色与粒子**\n\n**177**\n\n在清单 7-24 中，我们看到我们再次通过在游戏区域边缘外的一个圆上计算一个名为`center`的`CGPoint`，来在屏幕外创建每个`Comet`。我们还创建了一个`VectorRepesentation`，并将`Comet`用作委托。我们将使用相同的任务来绘制`Comet`和`Comet`的尾部粒子。在指定了`ExpireAfterTime`和`LinearMotion`作为彗星的行为后，它就可以被添加到场景中了。清单\
