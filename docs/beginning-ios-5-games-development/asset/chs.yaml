  \ AtSpeed:3];\n\n[motion setWrap:YES];\n\n[bullet addBehavior: motion];\n\nExpireAfterTime*\
  \ expires = [ExpireAfterTime expireAfter:240];\n\n[bullet addBehavior:expires];\n\
