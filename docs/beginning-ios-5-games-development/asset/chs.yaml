  \    } else if (self.variant == VARIATION_YELLOW){\n        color1 = [UIColor colorWithRed:1.0\
  \ green:1.0 blue:whiter alpha:1.0];\n        color2 = [UIColor colorWithRed:1.0\
  \ green:1.0 blue:0.0 alpha:c2alpha];\n        color3 = [UIColor colorWithRed:1.0\
  \ green:1.0 blue:0.0 alpha:c3aplha];\n    }\n    UIColor* color4 = [UIColor colorWithRed:0.0\
  \ green:0.0 blue:0.0 alpha:0.0];\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00403.png)\n\n**178**\n\n**第 7 章：构建你的游戏：矢量角色与粒子**\n\n```\n    CGColorRef\
  \ clr[] = { [color1 CGColor], [color2 CGColor] , [color3 CGColor], [color4 CGColor]};\n\
  \    CFArrayRef colors = CFArrayCreate(NULL, (const void**)clr, sizeof(clr) / sizeof(CGColorRef),\
  \ &kCFTypeArrayCallBacks);\n    CGGradientRef grad = CGGradientCreateWithColors(space,\
  \ colors, locations);\n    CGColorSpaceRelease(space);\n    CGContextDrawRadialGradient(context,\
  \ grad, CGPointMake(self.radius, self.radius), 0, CGPointMake(self.radius, self.radius),\
  \ self.radius, 0);\n    CGGradientRelease(grad);\n}\n```\n\n在清单 7-25 中，我们希望绘制一个简单的径向渐变，其中心颜色与变体相匹配，边缘为透明。我们必须创建一个四色渐变才能实现好看的彗星效果。第一种颜色几乎是白色且完全不透明，接下来的两种颜色是变体的颜色，但带有两种不同的`alpha`值。最后一种颜色将完全透明。函数`CGContextDrawRadialGradient`在角色的中心绘制了一个径向渐变，从第一种颜色平滑过渡到角色的透明边缘。\n\
  \n既然我们已经了解了每个粒子是如何绘制的，接下来应该看看粒子是如何创建的。清单 7-26 展示了`Comet`的`step:`任务的实现。\n\n**清单 7-26.**\
  \ *Comet.m (step:)*\n\n```\n-(void)step:(GameController*)controller{\n    if ([controller\
  \ stepNumber]%3 == 0){\n```\n\n\n\n```objectivec\nVectorRepresentation* rep = [VectorRepresentation\
  \ vectorRepresentation];\n[rep setDelegate:self];\nint totalStepsAlive = arc4random()%60\
  \ + 60;\nParticle* particle = [Particle particleAt:self.center WithRep:rep Steps:totalStepsAlive];\n\
  [particle setRadius:self.radius];\n[controller addActor: particle];\n```\n\n在`Listing\
  \ 7–26`中，`step:`任务每三个步骤在动画中创建一个新的`Particle`。\n\n对于每个新的`Particle`，都会创建一个`VectorRepresentation`，但请注意，其委托是`Comet`对象。`Particle`的创建带有从\
  \ 1 秒到 2 秒的随机生命周期。这种随机性造成了彗星尾部轻微的闪烁变化。\n\n请注意，此时`Particle`没有添加任何额外的行为，这会导致`Particle`停留在原地并逐渐消失。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00094.png)\n\n**第\
  \ 7 章：打造你的游戏：矢量角色与粒子**\n\n**179**\n\n**总结**\n\n在本章中，我们研究了一种在游戏中以编程方式绘制角色的技术。我们创建了一个名为`VectorRepresentation`的新类，用于处理创建供代码绘制的`UIView`的细节。我们使用这些新的基于矢量的角色创建了一个血条和一个简单的子弹。本章继续展示了两个创建粒子系统的简单示例。第一个示例重用了小行星的艺术资源，以在爆炸小行星时产生碎片效果。第二个示例使用基于矢量的粒子创建了带有发光尾巴的彗星。在本章和上一章中创建的角色将在第\
  \ 10 章中用于创建一个完整的游戏。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00229.png)\n\
  \n![](img/00231.png)\n\n**8**\n\n**第 8 章**\n\n**打造你的游戏：**\n\n**理解手势与动作**\n\n为移动设备创建游戏真正令人兴奋的地方在于用户与游戏交互的独特方式。iOS\
  \ 支持的复杂手势是一种相对较新的与计算机交互的方式，如果用户不熟悉新的界面技术，可能会给他们带来困扰。然而，iOS 用户已经熟悉双击、捏合和滑动等概念，因此在游戏中使用这些手势不会带来可用性问题。\n\
  \n在本章中，我们将探讨如何使用 iOS 提供的内置库向应用程序或游戏添加手势。我们还将探讨如何将特定手势绑定到游戏中的特定角色。到本章结束时，你将了解如何使用所有受支持的手势，并能够利用它们来驱动游戏中的用户交互。在我们的示例中，我们将使用熟悉的类，如`GameController`、`Actor`等。因此，你对这些手势事件的理解将直接与你前几章学到的知识联系起来。\n\
  \n除了简单的屏幕触摸，用户还可以通过较新设备中的加速计或陀螺仪与 iOS 5 应用程序进行交互。将设备的运动作为游戏输入，为用户体验开辟了新的维度。我们将探讨如何使用这些传感器并将其与游戏事件关联起来。\n\
  \n**触摸输入：基础知识**\n\n实际上有三种方式可以接受用户的触摸输入。第一种是使用按钮或其他预构建的小部件，并实现响应用户事件的任务。我不会详细介绍这种输入方式，因为它是最基础的，并且在所有\
  \ iOS 入门书籍中都有详细介绍。第二种方法是创建`UIView`的子类，并实现一系列与触摸相关的任务。最后一种技术是将六个`UIGestureRecognizer`类之一连接到`UIView`，并注册一个对象来响应不同的手势。\n\
  \nL. Jordan, *Beginning iOS 5 Games Development*\n© Lucas Jordan 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00086.png)\n\n**182**\n\n**第 8 章：打造你的游戏：理解手势与动作**\n\n\n\n# 扩展 UIView 以接收触摸事件\n\
  \n我认为在大多数情况下，最后一种技术最为稳健，因为它为用户提供了一种通过一组已知手势与应用交互的方式。然而，使用第二种技术（实现触摸相关任务）也有充分的理由，尤其是当你追求的用户交互本身并非手势时。例如，在一个绘图应用中，你只需获取屏幕上所有接触点来进行绘制。\n\
  \n下一节将回顾 `UIView` 的触摸相关任务。随后，我们将继续探讨 `UIGestureRecognizer` 类和运动事件。\n\n本章附带的示例代码可在项目\
  \ Sample 08 中找到。虽然本书中的大部分代码既可在设备上运行，也可在模拟器上运行，但我强烈建议你在 iPhone（或 iPod touch）上运行此代码——如果可能的话，使用\
  \ iOS 4.2 或更高版本——因为复杂手势在模拟器上难以模拟。要真正获得用户体验的感受，最好用自己的手执行实际手势，并体会每种手势的感觉。\n\n当用户在屏幕上触摸\
  \ `UIView` 时，该视图有四个任务会被调用。我统称它们为触摸相关任务，如代码清单 8-1 所示。\n\n**代码清单 8-1.** *四个触摸相关任务*\n\
  ```\n-(void)touchesBegan:withEvent:\n\n-(void)touchesCancelled:withEvent:\n\n-(void)touchesEnded:withEvent:\n\
  \n-(void)touchesMoved:withEvent:\n```\n\n每个任务的第一个参数是一个 `NSSet`，其中包含屏幕上每次离散触摸对应的一个\
  \ `UITouch`。第二个参数是一个 `UIEvent`，它基本上是 iOS 上三种不同输入类型（触摸事件、运动事件和远程控制事件）的通用包装器。我们不会涉及远程控制事件；那些是由配件（如外部键盘）生成的事件。\n\
  \n任务 `touchesBegan:withEvent:` 在手指（或多根手指）触摸屏幕时立即被调用。任务 `touchesEnded:withEvent:`\
  \ 在手指移开时被调用。如果手指滑动，则会调用 `touchesMoved:withEvent:`。任务 `touchesCancelled:withEvent:`\
  \ 在系统必须接管屏幕时被调用。例如，如果另一个应用被启动，则在对第一个应用的控制权传递给新应用之前，会调用其 `touchesCancelled:withEvent:`\
  \ 方法。示例代码提供了使用这些任务的范例，如图 8-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00185.png)\n\n![](img/00245.jpeg)\n\n**第 8 章：构建你的游戏：理解手势与运动** **183**\n\
  \n**图 8–1.** *触摸事件*\n\n在图 8-1 中，我们看到几条由点组成的线段。每条线段都是手指在屏幕上拖动的结果。最上面的线段是单指在屏幕上移动产生的——用红点绘制。从上数第二条线段是双指在屏幕上拖动产生的，它下面的那条线段同样如此，两者都是用绿点绘制的。下面的三条线段由三指绘制，由蓝点组成。如果你能看到图\
  \ 8-1 的彩色版本（如果你有电子书的话），请观察最下面一行最左侧的点。注意，一个是红色，另一个是绿色。这是因为我没能让三根手指同时落在屏幕上。\n\n在这个第一个示例中，除了用手指绘制点之外，你还可以通过单指或双指轻触分别放大或缩小这些点。缩放功能演示了触摸事件和手势如何协同工作。一旦我们理解了触摸事件的基础知识，将更详细地探讨这一点。\n\
  \n# 查看事件代码\n\n这个简单演示的实现展示了我们如何接收触摸事件，并为屏幕上的每次触摸创建角色。涉及两个类：继承 `GameController` 的\
  \ `TouchEventsController` 和继承 `UIView` 的 `TouchEventsView`。让我们从查看 `TouchEventsView`\
  \ 类开始。其头文件如代码清单 8-2 所示。\n\n**代码清单 8-2.** *TouchEventsView.h*\n```\n@interface TouchEventsView\
  \ : UIView{\n\nIBOutlet TouchEventsController* controller;\n\nNSMutableArray* sparks;\n\
  \n}\n\n@end\n```\n\n在代码清单 8-2 中，我们看到了一个 `IBOutlet`，因此我们可以将 `TouchEventsView` 连接到\
  \ `TouchEventsController`。我们还看到了一个名为 `sparks` 的 `NSMutableArray`。这个集合用于在添加火花时进行追踪；如前所述，触摸事件可能被取消。通过追踪我们添加的火花，我们可以在调用\
  \ `touchCancelled:withEvent:` 之前清理任何已添加的火花。让我们看看 `TouchEventsView` 类的实现，如代码清单 8-3\
  \ 所示。\n\n**代码清单 8-3.** *TouchEventsView.m*\n```\n@implementation TouchEventsView\n\
  \n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event{\n\nNSLog(@\"\
  Begin: %i\", [touches count]);\n\nsparks = [NSMutableArray new];\n\n}\n\n- (void)touchesCancelled:(NSSet\
  \ *)touches withEvent:(UIEvent *)event{\n\nNSLog(@\"Cancelled: %i\", [touches count]);\n\
  \nfor (Spark* spark in sparks){\n\n[controller removeActor:spark];\n\n}\n\n[sparks\
  \ removeAllObjects];\n\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event{\n\nNSLog(@\"Ended: %i\", [touches count]);\n\nint count = [touches count];\n\
  \nfor (UITouch* touch in touches){\n\nSpark* spark = [Spark spark:count-1 At:[touch\
  \ locationInView:self]];\n\n[controller addActor:spark];\n\n[sparks addObject:spark];\n\
  \n}\n\n[sparks removeAllObjects];\n\n}\n\n- (void)touchesMoved:(NSSet *)touches\
  \ withEvent:(UIEvent *)event{\n\nNSLog(@\"Moved: %i\", [touches count]);\n\nint\
  \ count = [touches count];\n\nfor (UITouch* touch in touches){\n\nSpark* spark =\
  \ [Spark spark:count-1 At:[touch locationInView:self]];\n\n[controller addActor:spark];\n\
  \n[sparks addObject:spark];\n\n}\n\n}\n\n@end\n```\n\n在代码清单 8-3 中，我们看到之前讨论的四个任务。`UIResponder`\
  \ 类（`UIView` 的父类）定义了每个任务。这些方法在用户与屏幕交互时被调用。通过实现它们，我们可以添加自定义行为。任务 `touchesBegan:withEvent:`\
  \ 在手指触摸屏幕时被调用。此时，我们创建一个新的 `NSMutableArray` 来追踪我们将要添加的所有火花。接下来可能会调用其他三个任务中的任何一个。如果用户移动手指，或另一根新手指触屏，则会调用任务\
  \ `touchesMoved:withEvent:`。在此任务中，我们为每次触摸创建一个新的 `Spark`。我们使用触摸次数减 1 来指定 `Spark`\
  \ 的变体或颜色，然后将其添加到场景中。火花只是一个简单的粒子类对象，会在五秒后自动消失。\n\n触摸事件可以通过两种方式结束。第一种方式是当用户移开所有手指后，调用\
  \ `touchesEnded:withEvent:`。在这种情况下，我们执行与 `touchesMoved:withEvent:` 中相同的操作：为每次触摸创建一个\
  \ `Spark`。同时，我们清空 `NSMutableArray` 中的 `sparks`，以移除对火花对象的引用。\n\n触摸事件结束的另一种方式是通过取消。当系统发生其他事件导致完成该事件不恰当，或者另一个视图的事件拦截了触摸序列时，事件会被取消。当此任务被调用时，我们将移除自上次调用\
  \ `touchesBegan:withEvent:` 以来创建的所有 `Spark` 对象，撤销到目前为止所做的工作。\n\n\n\n`touchesCancelled:withEvent:`任务在切换应用或弹出对话框时可能被调用。另一个更常见的触摸事件取消方式是手势识别器被触发。手势识别器由`UIGestureRecognizer`类定义，它是一个用于检查`UIView`上触摸事件的对象，并在触摸可以被视为特定手势（如轻点、捏合或滑动）时做出响应。\n\
  \n要试验`touchesCancelled:withEvent:`任务，请执行双指双击操作。\n\n注意，第一次轻点后，手指触摸的位置会出现两个`Sparks`。第二次轻点后，之前添加的`Spark`对象会被移除。这是因为当双指双击手势识别器被触摸事件激活时，调用了`touchesCancelled:withEvent:`。\n\
  \n手势识别器能够取消触摸事件这一特性，允许开发者在`UIView`上混合搭配任意数量的手势，而无需担心手势冲突。除了取消触摸事件，手势之间也可以相互取消。例如，捏合手势和双指拖拽手势都以相同的方式开始——两根手指大约同时落在屏幕上。如果没有一种机制来相互取消，这两种手势很容易发生冲突。\n\
  \n我们继续看看这些触摸事件如何应用于游戏相关的类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00423.png)\n\n**186** **第 8 章：构建你的游戏：理解手势与动作** **将触摸事件应用于角色**\n\n让我们快速浏览一下`TouchEventsController`类，看看我们如何设置演示来响应轻点手势。`TouchEventsController.m`的重要部分如代码清单\
  \ 8-4 所示。\n\n**代码清单 8-4.** *TouchEventsController.m (doSetup)*\n\n```\n-(BOOL)doSetup{\n\
  \    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
  \        [self setSortedActorClasses:[NSMutableArray arrayWithObject:[Spark class]]];\n\
  \        UITapGestureRecognizer* doubleTapTwoTouch = [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapTwoTouch\
  \ setNumberOfTapsRequired:2];\n        [doubleTapTwoTouch setNumberOfTouchesRequired:2];\n\
  \        UITapGestureRecognizer* doubleTapOneTouch = [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self action:@selector(doubleTap:)];\n        [doubleTapOneTouch\
  \ setNumberOfTapsRequired:2];\n        [doubleTapOneTouch setNumberOfTouchesRequired:1];\n\
  \        [actorsView addGestureRecognizer:doubleTapOneTouch];\n        [actorsView\
  \ addGestureRecognizer:doubleTapTwoTouch];\n        return YES;\n    }\n    return\
  \ NO;\n}\n```\n\n在代码清单 8-4 中，我们看到了来自`TouchEventsController`类的`doSetup`任务。当这个`UIViewController`实例的视图被加载时，该任务被调用。在设置了游戏区域大小并将`Spark`类标记为排序角色类之后，我们创建了两个`UITapGestureRecognizer`实例。第一个`UITapGestureRecognizer`实例名为`doubleTapTwoTouch`，配置为响应双指双击。第二个`UITapGestureRecognizer`名为`doubleTapOneTouch`，配置为响应单指双击。这两个`UITapGestureRecognizer`都通过`addGestureRecognizer:`任务添加到`actorsView`中。\n\
  \n查看用于创建这些手势识别器的构造函数，我们看到一个引用`doubleTap:`任务的选择器。每当这两个任务之一识别出一个手势时，就会调用此任务。我们本可以让每个手势识别器调用不同的任务，这在更复杂的应用中可能是可取的。在本例中，在`doubleTap:`任务中区分这两个手势识别器很容易，如代码清单\
  \ 8-5 所示。\n\n**代码清单 8-5.** *TouchEventsController.m (doubleTap:)*\n\n```\n-(void)doubleTap:(UITapGestureRecognizer*)doubleTap{\n\
  \    float scale;\n    if ([doubleTap numberOfTouches] == 1){\n        scale = 2.0;\n\
  \    } else {\n        scale = 0.5;\n    }\n    NSLog(@\"Touches: %i\", [doubleTap\
  \ numberOfTouches]);\n    for (Spark* spark in [self actorsOfType:[Spark class]]){\n\
  \        float radius = [spark radius]*scale;\n        if (radius < 2){\n      \
  \      radius = 2;\n        } else if (radius > 128){\n            radius = 128;\n\
  \        }\n        [spark setRadius:radius];\n    }\n}\n```\n\n在代码清单 8-5 中，我们检查触发此任务的`UITapGestureRecognizer\
  \ doubleTap`是否配置为单指触摸。根据检查结果，我们将`scale`的值设置为`2.0`或`0.5`。这样，单指双击将增大`Spark`对象的比例，而双指双击将减小`Spark`对象的尺寸。一旦我们得到了`scale`的正确值，只需遍历场景中的所有`Spark`对象，并根据`scale`调整它们的半径。\n\
  \n我们已经研究了触摸事件，以理解触摸事件的生命周期。我们还快速浏览了`UITapGestureRecognizer`类。下一节将更详细地讨论`UITapGestureRecognizer`。\n\
  \n**理解手势识别器**\n\niOS 允许用户通过丰富的手势集与应用程序交互。这些手势包括轻点、轻扫、捏合等。每种手势都包含一些相当复杂的逻辑，用于将触摸事件解释为连贯的手势。如果这留给每个开发者去实现，用户体验将会很差，因为每个开发者不可避免地会对每个手势做出不同的假设。例如，长按手势有一个默认持续时间。我们希望在所有应用程序中保持一致，因为我们不想为每个应用程序“重新训练”每个用户什么是长按。本着这种精神，苹果提供了许多类，用于识别开发者最可能需要的常见手势。\n\
  \n每个手势识别器都继承自抽象基类`UIGestureRecognizer`，如代码清单 8-6 所示。\n\n**代码清单 8-6.** *`UIGestureRecognizer`的具体实现*\n\
  \n```\nUITapGestureRecognizer\nUIPinchGestureRecognizer\nUIRotateGestureRecognizer\n\
  UISwipeGestureRecognizer\nUIPanGestureRecognizer\nUILongPressGestureRecognizer\n\
  ```\n\n在代码清单 8-6 中，我们看到了 iOS 5 内置的`UIGestureRecognizer`的每个子类。轻点可能是 iOS 中最常见的手势，无需描述。捏合手势是两根手指相互靠近或远离。旋转手势是两根手指在屏幕上移动，就像打开一瓶番茄酱。\n\
  \n轻扫手势是一根或多根手指在屏幕上快速拂过，就像翻阅杂志的一页。平移手势类似于轻扫，但更慢、更有意。长按手势很像轻点，但手指在屏幕上停留时间更长。\n\n这些类中的每一个都为开发者提供了一种简单的方法，以请求在特定`UIView`上发生任何手势时调用一个任务。除了调用任务之外，每个手势都会随时间发生，并且在回调任务被调用时，它会处于几种状态之一。这些状态如代码清单\
  \ 8-7 所示。\n\n**代码清单 8-7.** *枚举`UIGestureRecognizerState`的值*\n\n```\nUIGestureRecognizerStatePossible\n\
  UIGestureRecognizerStateBegan\nUIGestureRecognizerStateChanged\nUIGestureRecognizerStateEnded\n\
  UIGestureRecognizerStateCancelled\nUIGestureRecognizerStateFailed\nUIGestureRecognizerStateRecognized\
  \ = UIGestureRecognizerStateEnded\n```\n\n在代码清单 8-7 中，我们看到了手势识别器可能处于的七种状态，它们类似于触摸事件调用的四个任务（参见代码清单\
  \ 8-1）。默认状态是`UIGestureRecognizerStatePossible`，如果没有触摸事件发生，所有`UIGestureRecognizer`实例都将处于此状态。\n\
  \n\n\n`UIGestureRecognizerStateBegan` 是手势开始但尚未改变或完成时的状态。对于捏合手势，这表示两个手指都已接触屏幕。`UIGestureRecognizerStateChanged`\
  \ 是手势进行中的状态。当以下三种状态之一发生时，手势将结束：`UIGestureRecognizerStateEnded`、`UIGestureRecognizerStateCancelled`\
  \ 或 `UIGestureRecognizerStateFailed`。状态 `UIGestureRecognizerStateEnded` 对应手势的成功完成。\n\
  \n`UIGestureRecognizerStateCancelled` 是无法完成的手势的状态。\n\n`UIGestureRecognizerStateFailed`\
  \ 是接收到与手势相矛盾的触摸事件的手势的状态。最后一个状态 `UIGestureRecognizerStateRecognized` 与 `UIGestureRecognizerStateEnded`\
  \ 具有相同的值，仅提供可能在代码中有用的语义差异。\n\n尽管清单 8–7 中的状态全面描述了手势识别器可能经历的所有状态，但并非所有手势识别器都使用所有这些状态。\n\
  \n例如，`UITapGestureRecognizer` 被称为“离散”手势识别器，不会报告变化。此外，离散手势不能失败或被取消。它们仅调用一次选择器任务，状态为\
  \ `UIGestureRecognizerStateRecognized`（即 `UIGestureRecognizerStateEnded`）。\n\n可以实现一个新的\
  \ `UIGestureRecognizer`，但我们不会涉及这部分。\n\n然而，我们将逐一介绍每个手势识别器，并通过示例探讨其工作原理。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00270.png)\n\n![](img/00351.jpeg)\n\n## 第 8 章 构建你的游戏：理解手势与动作 189\n\n###\
  \ 轻点手势\n\n轻点手势在 iOS 中广泛使用。从启动应用程序到在地图应用中放置图钉，轻点手势是 iOS 界面的核心。这很合理，因为它们与桌面操作系统中的鼠标点击非常相似。\n\
  \n轻点手势与鼠标点击有相似之处；例如，在 OS X 中从系统 Dock 启动应用程序只需单击一次，而在 iOS 中启动应用程序则只需轻点一次。如果考虑 OS\
  \ X 上的“辅助点击”（也称为控制点击或右键点击），这种类比仍然成立；这类似于 iOS 中的双指轻点。事实上，如果你使用 Mac 笔记本电脑，触控板可以配置为将双指轻点视为“辅助点击”。\n\
  \n在本例中，我们将配置一组`UITapGestureRecognizer`来响应不同的点击次数和手指数量（触摸点）组合。图 8–2 展示了此示例的实际效果。\n\
  \n**图 8–2.** *由轻点手势激活的能力提升项*\n\n在图 8–2 中，我们看到 12 个能力提升项，排列成三列四行。这些能力提升项初始时为禁用状态，如右下角所示。当用户点击屏幕时，某个能力提升项会启用，变得明亮并旋转。启用的能力提升项取决于手势中使用的手指数量，以及是一指、两指还是三指点击。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00336.png)\n\n190\
  \ 第 8 章 构建你的游戏：理解手势与动作\n\n例如，双指三击启用了第二行最右侧的能力提升项。类似地，三指单击启用了第三行最左侧的能力提升项。简而言之，列表示点击次数，行表示手指数量。如果你想浪费一小时的时间，尝试让所有能力提升项都旋转起来。我*觉得*我做到了，但没来得及截图为证。\n\
  \n此演示在类`TapGestureController`中实现。清单 8–8 显示了`TapGestureController.h`文件。\n\n**清单 8–8.**\
  \ *TapGestureController.h*\n\n```\n@interface TapGesutureController : GameController<TemporaryBehaviorDelegate>{\n\
  \nNSMutableArray* powerups;\n\n}\n```\n\n\n\n`- (void)tapGesture:(UITapGestureRecognizer\
  \ *)sender;`\n\n`@end`\n\n在**列表 8–8**中，我们看到`TapGestureController`类的头部，它继承自`GameController`并遵循`TemporaryBehaviorDelegate`协议。我们还看到有一个名为`powerups`的`NSMutableArray`，用于存储本示例中的十二个强化物。在其他示例中，我们依赖`GameController`通过指定需要排序的类来跟踪不同类型的角色。在本示例中，我们使用一个单独的`NSMutableArray`，因为我们希望利用`powerups`中`Powerup`对象的顺序来跟踪行和列。最后，我们看到了任务`tapGesture:`的声明，当`UITapGestureRecognizer`识别到一个手势时，会调用该方法。`TapGestureController`的设置代码实现见**列表\
  \ 8–9**。\n\n**列表 8–9.** *`TapGestureController.m (doSetup)`*\n\n```objc\n-(BOOL)doSetup{\n\
  \    if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
  \        powerups = [NSMutableArray new];\n        for (int tap=0;tap<=2;tap++){\n\
  \            for (int touch=0;touch<=3;touch++){\n                float x = 320.0/6.0\
  \ + tap*320.0/3;\n                float y = 480.0/8.0 + touch*480/4;\n         \
  \       CGPoint center = CGPointMake(x, y);\n                Powerup* powerup =\
  \ [Powerup powerup:self At:center];\n                [self addActor: powerup];\n\
  \                [powerups addObject:powerup];\n            }\n        }\n     \
  \   for (int touch=1;touch<=4;touch++){\n            UITapGestureRecognizer* tripleTap\
  \ = [[UITapGestureRecognizer alloc]\n                initWithTarget:self action:@selector(tapGesture:)];\n\
  \            [tripleTap setNumberOfTapsRequired:3];\n            [tripleTap setNumberOfTouchesRequired:touch];\n\
  \            UITapGestureRecognizer* doubleTap = [[UITapGestureRecognizer alloc]\n\
  \                initWithTarget:self action:@selector(tapGesture:)];\n         \
  \   [doubleTap setNumberOfTapsRequired:2];\n            [doubleTap setNumberOfTouchesRequired:touch];\n\
  \            [doubleTap requireGestureRecognizerToFail:tripleTap];\n           \
  \ UITapGestureRecognizer* singleTap = [[UITapGestureRecognizer alloc]\n        \
  \        initWithTarget:self action:@selector(tapGesture:)];\n            [singleTap\
  \ setNumberOfTapsRequired:1];\n            [singleTap setNumberOfTouchesRequired:touch];\n\
  \            [singleTap requireGestureRecognizerToFail:doubleTap];\n           \
  \ [actorsView addGestureRecognizer:tripleTap];\n            [actorsView addGestureRecognizer:doubleTap];\n\
  \            [actorsView addGestureRecognizer:singleTap];\n        }\n        return\
  \ YES;\n    }\n    return NO;\n}\n```\n\n在**列表 8–9**中，我们看到`TapGestureController`类的任务`doSetup`。在此任务中，我们生成\
  \ 12 个`Powerup`对象并将它们添加为演员。我们还在`NSMutableArray` `powerups`中跟踪每个`Powerup`。创建`Powerup`对象后，我们又创建了\
  \ 12 个`UITapGestureRecognizer`——每个`Powerup`对应一个。每个`UITapGestureRecognizer`通过任务`addGestureRecognizer:`添加到`actorsView`。注意，我们为点击次数和触摸次数的每种可能组合创建了`UITapGestureRecognizer`，而不是试图使用单个`UITapGestureRecognizer`来识别各种组合。\n\
  \n尽管在某些情况下这样做是可行的，但当你尽可能精确地使用`UIGestureRecognizer`时，一切都会好得多，因为手势识别器之间存在一些微妙的交互。例如，负责检测三次点击的识别器必须取消那些负责双击和单击的识别器。\n\
  \n每个`UITapGestureRecognizer`都被配置为在识别到手势时调用`tapGesture:`，如**列表 8–10**所示。\n\n**列表\
  \ 8–10.** *`TapGestureController.m (tapGesture:)`*\n\n```objc\n- (void)tapGesture:(UITapGestureRecognizer\
  \ *)sender{\n    int taps = [sender numberOfTapsRequired];\n    int touches = [sender\
  \ numberOfTouches];\n    int index = (taps-1)*4+(touches-1);\n    Powerup* powerup\
  \ = [powerups objectAtIndex:index];\n    TemporaryBehavior* tempBehav = [TemporaryBehavior\
  \ temporaryBehavior:nil for:60*5];\n    [tempBehav setDelegate:self];\n    NSMutableArray*\
  \ behaviors = [powerup behaviors];\n}\n```\n\n\n\n`[behaviors addObject:tempBehav];`\n\
  \n`[powerup setState:STATE_GLOW];`\n\n`}`\n\n在`Listing 8–10`中，我们看到了任务`tapGesture:`，只要\
  \ 12 个`UITapGestureRecognizer`中的任何一个识别到点击手势时，就会调用该任务。注意，我们没有检查`UITapGestureRecognizer`的状态，因为点击手势被认为是离散的，不使用状态信息。我们使用任务`numberOfTapsRequired`和`numberOfTouches`来确定哪个`UITapGestureRecognizer`做出了响应，并将这些值分别存储到`taps`和`touches`中。这些值告诉我们应该启用的`Powerup`在`NSMutableArray`（即`powerups`）中的索引。一旦我们找到了正确的`Powerup`，就创建一个`TemporaryBehavior`并将`self`设置为代理。\n\
  \n然后，该强化道具的行为会被设置为新创建的`TemporaryBehavior`，同时其状态被设置为`STATE_GLOW`。这使强化道具开始旋转。接下来，让我们仔细看看`TemporaryBehavior`类。\n\
  \n**TemporaryBehavior 类**\n\n类`TemporaryBehavior`为一个角色应用一个行为，持续固定的步骤数。\n\n在本例中，我们实际上并不想应用任何行为；我们只是想知道何时过了五秒钟。让我们快速看一下`TemporaryBehavior`类，了解它是如何工作的。`TemporaryBehavior`的声明如`Listing\
  \ 8–11`所示。\n\n**Listing 8–11.** *TemporaryBehavior.h*\n\n```objectivec\n@class TemporaryBehavior;\n\
  \n@protocol TemporaryBehaviorDelegate\n\n-(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior\
  \ In:(GameController*)controller;\n\n@end\n\n@interface TemporaryBehavior : NSObject\
  \ <Behavior>{\n\n}\n\n@property (nonatomic) long stepsRemaining;\n\n@property (nonatomic,\
  \ strong) NSObject<Behavior>* behavior;\n\n@property (nonatomic, strong) NSObject<TemporaryBehaviorDelegate>*\
  \ delegate;\n\n+(id)temporaryBehavior:(NSObject<Behavior>*)aBehavior for:(long)aNumberOfSteps;\n\
  \n@end\n```\n\n在`Listing 8–11`中，我们看到了`TemporaryBehavior`类的定义。我们注意到它定义了一个名为`TemporaryBehaviorDelegate`的协议，`TapGestureController`遵循该协议（参见`Listing\
  \ 8–8`）。`TemporaryBehavior`的构造方法接受一个`Behavior`和一个步骤数作为参数。`Listing 8–12`展示了`TemporaryBehavior`的实现。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00355.png)\n\n**第\
  \ 8 章：构建你的游戏：理解手势与移动** **193**\n\n**Listing 8–12.** *TemporaryBehavior.m*\n\n```objectivec\n\
  +(id)temporaryBehavior:(NSObject<Behavior>*)aBehavior for:(long)aNumberOfSteps{\n\
  \nTemporaryBehavior* temp = [TemporaryBehavior new];\n\n[temp setBehavior:aBehavior];\n\
  \n[temp setStepsRemaining:aNumberOfSteps];\n\nreturn temp;\n}\n\n-(void)applyToActor:(Actor*)anActor\
  \ In:(GameController*)gameController{\n\nstepsRemaining--;\n\n[behavior applyToActor:anActor\
  \ In:gameController];\n\n[delegate stepsUpdatedOn:anActor By:self In:gameController];\n\
  \nif (stepsRemaining <= 0){\n\n[[anActor behaviors] removeObject:self];\n}\n}\n\n\
  @end\n```\n\n在`Listing 8–12`中，我们看到了`TemporaryBehavior`类的实现。构造方法只是创建了一个`TemporaryBehavior`对象，并使用提供的参数填充它。任务`applyToActor:In:`来自`Behavior`协议（`TemporaryBehavior`遵循该协议），并在游戏的每一步被调用。在这个任务中，我们只是将提供的行为应用到角色上，并通知代理这项工作已完成。继续点击手势的例子，我们来看看`TapGestureController`如何响应任务`stepsUpdatedOn:By:In:`，如`Listing\
  \ 8–13`所示。\n\n**Listing 8–13.** *TapGestureController.m (stepsUpdatedOn:By:In:)*\n\
  \n```objectivec\n-(void)stepsUpdatedOn:(Actor*)anActor By:(TemporaryBehavior*)tempBehavior\
  \ In:(GameController*)controller{\n\nif ([tempBehavior stepsRemaining]==0){\n\n\
  [anActor setState:STATE_NO_GLOW];\n}\n}\n```\n\n在`Listing 8–13`中，我们看到了由`TapGestureController`类定义的任务`stepsUpdatedOn:By:In:`。在这个任务中，我们只是检查`TemporaryBehavior`（即`tempBehavior`）是否处于其生命周期的末尾。如果是，我们将角色的状态设置为`STATE_NO_GLOW`，从而停止强化道具的旋转。\n\
  \n\n\n我们已经详细探讨了`UITapGestureRecognizer`可用的不同配置。下一节将介绍一种新的手势：捏合。\n\n**第 8 章：构建你的游戏：理解手势与动作**\n\
  \n## 捏合手势\n\n在 iOS 中，捏合手势通常用于放大缩小或缩放屏幕上的内容。该手势通过两个手指按下并相互靠近或远离来触发。图 8-3 展示了这一手势的实际效果。\n\
  \n**图 8-3.** *改变飞碟大小的捏合手势*\n\n在图 8-3 中，我们看到了使用捏合手势的示例。左侧的飞碟因向外捏合手势而放大。右侧的同一个飞碟因向内捏合手势而缩小。当飞碟被缩放时，它会停止旋转。我们利用捏合手势的不同状态来控制旋转的启动与停止。\n\
  \n可以通过向`UIView`添加`UIPinchGestureRecognizer`实例来检测捏合手势。`UIPinchGestureRecognizer`不仅会在捏合手势发生时通知你，还会报告与该手势相关的缩放比例和速度值。`UIPinchGestureRecognizer`报告的缩放比例非常实用，因为这是捏合手势最常见的用途之一。\n\
  \n该示例在`PinchGestureController`类中实现。让我们快速看一下其头文件，如代码清单 8-14 所示。\n\n**代码清单 8-14.**\
  \ *PinchGestureController.h*\n\n```\n@interface PinchGestureController : GameController{\n\
  \n    Saucer* saucer;\n\n    float startRadius;\n\n}\n\n-(void)pinchGesture:(UIPinchGestureRecognizer*)sender;\n\
  \n@end\n```\n\n在代码清单 8-14 中，我们看到了`PinchGestureController`类的头文件。与之前的示例类似，它继承自`GameController`，并维护了对`Saucer`对象的引用以及手势开始时`Saucer`对象的半径。任务`pinchGesture:`由手势识别器调用。该类的实现将更清楚地展示此示例的工作原理，首先从`doSetup`任务开始，如代码清单\
  \ 8-15 所示。\n\n**代码清单 8-15.** *PinchGestureController (doSetup)*\n\n```\n-(BOOL)doSetup{\n\
  \n    if ([super doSetup]){\n\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
  \n        saucer = [Saucer saucer:self];\n\n        [self addActor:saucer];\n\n\
  \        UIPinchGestureRecognizer* pinchRecognizer = [[UIPinchGestureRecognizer\
  \ alloc]\n\n            initWithTarget:self action:@selector(pinchGesture:)];\n\n\
  \        [actorsView addGestureRecognizer:pinchRecognizer];\n\n        return YES;\n\
  \n    }\n\n    return NO;\n\n}\n```\n\n在代码清单 8-15 中，`PinchGestureController`类的`doSetup`任务非常简单。我们只需添加一个新的`Saucer`，并设置一个`UIPinchGestureRecognizer`，使其在识别到捏合手势时调用`pinchGesture:`。\n\
  \n接下来，我们看看如何在下一节中响应手势。\n\n## 响应捏合手势\n\n我们已经了解了如何注册捏合手势识别器。`pinchGesture:`的实现如代码清单\
  \ 8-16 所示。\n\n**代码清单 8-16.** *PinchGestureController (pinchGesture:)*\n\n```\n-(void)pinchGesture:(UIPinchGestureRecognizer*)pinchRecognizer{\n\
  \n    if (pinchRecognizer.state == UIGestureRecognizerStateBegan){\n\n        startRadius\
  \ = [saucer radius];\n\n        [saucer setAnimationPaused:YES];\n\n    } else if\
  \ (pinchRecognizer.state == UIGestureRecognizerStateChanged){\n\n        float scale\
  \ = [pinchRecognizer scale];\n\n        float velocity = [pinchRecognizer velocity];\n\
  \n        NSLog(@\"Scale: %f Velocty: %f\",scale, velocity);\n\n        float radius\
  \ = startRadius*scale;\n\n        if (radius < 8){\n\n            radius = 8;\n\n\
  \        } else if (radius > 128.0){\n\n            radius = 128;\n\n        }\n\
  \n        [saucer setRadius:radius];\n\n    } else if (pinchRecognizer.state ==\
  \ UIGestureRecognizerStateEnded){\n\n        [saucer setAnimationPaused:NO]; \n\
  ```\n\n\n\n} else if (`pinchRecognizer.state == UIGestureRecognizerStateCancelled`){\n\
  \n    [`saucer setRadius:startRadius`];\n\n    [`saucer setAnimationPaused:NO`];\n\
  \n}\n\n}\n\n在清单 8–16 中，我们看到任务`pinchGesture:`，每当在`UIView`的`actorsView`上检测到捏合手势时，就会调用该任务。在此示例中，我们检查手势识别器的状态。状态信息指示手势刚刚开始（`UIGestureRecognizerStateBegan`）、正在进行（`UIGestureRecognizerStateChanged`）还是已终止（`UIGestureRecognizerStateEnded`\
  \ 或 `UIGestureRecognizerStateCancelled`）。\n\n手势开始时，我们记录`saucer`的半径并将其存储在变量`startRadius`中。我们还在`saucer`上调用`setAnimationPaused:`，以在缩放时停止其动画。这并不是必须停止动画的要求。我们这样做只是为了在手机上玩示例时能够观察手势识别器状态的变化。\n\
  \n手势进行时，我们获取手势的比例和速度。比例值是从手势开始以来的比例变化。换句话说，比例是累积的，这就是为什么我们将比例应用于`startRadius`，而不是`saucer`的当前半径。一旦计算出新的半径，我们就将其应用于`saucer`。速度是每秒的比例因子。此值可用于计算在手势结束后应用于动画的漂移量。我们除了记录该值外，没有使用它。\n\
  \n手势结束时，通常我们只需将`saucer`的`animationPaused`属性设置为`NO`。这会使`saucer`再次开始动画。如果手势被取消，我们将`saucer`重置为其原始半径并取消暂停动画。要测试取消状态，请先将`saucer`一直缩小，然后用一只手开始放大它，同时另一只手按下\
  \ iPhone 顶部的电源按钮。这将把你踢出应用程序。然后重新启动示例应用程序，并注意`saucer`回到了其原始的小尺寸。\n\n捏合手势是我们在本章中看到的第一个多状态手势。接下来我们将看到的手势是平移或拖拽手势，这是另一种多状态手势。我们会发现它的行为与捏合手势非常相似。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00092.png)\n\n![](img/00329.jpeg)\n\
  \n**第 8 章：构建游戏：理解手势与动作** **197**\n\n**平移（或拖拽）手势**\n\n平移手势是你在“地图”应用中用来查看地图不同部分的手势。拖拽手势也用于解锁手机或下拉通知中心。如果你仔细想想，这些手势实际上是同一回事；用户将手指放下，沿大致直线移动，然后抬起。区别在于应用程序的响应方式。当视图在内容（例如地图或图像）上平移时，我们称之为平移手势。当你在屏幕上移动\
  \ UI 组件（例如滑块旋钮）时，我们称之为拖拽。无论我们在描述中如何称呼，此手势都是通过`UIPanGestureRecognizer`类（抱歉，拖拽）实现的。图\
  \ 8–4 展示了一个使用`UIPanGestureRecognizer`的示例。\n\n**图 8–4.** *平移或拖拽示例*\n\n在图 8–4 中，我们看到了三颗小行星。每颗小行星可以沿一条不可见的路径向上或向下拖拽。拖拽小行星时，你可以将手指一直向右或向左移动。这使得操作更加容易，因为用户一旦让目标小行星开始移动，就无需太在意手指移动的具体位置。\n\
  \n这个简单的示例从类`PanGestureController`的头文件开始，如清单 8–17 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00407.png)\n\n**198**\n\n**第 8 章：构建游戏：理解手势与动作** **清单 8–17.** *PanGestureController.h*\n\
  \n```\n@interface PanGestureController : GameController{\n```\n\n\n\n```objc\nNSMutableArray*\
  \ asteroids;\n\nint asteroidIndex;\n\nCGPoint startCenter;\n\n}\n\n@property (nonatomic)\
  \ float minYValue;\n\n@property (nonatomic) float maxYValue;\n\n-(void)panGesture:(UIPanGestureRecognizer*)panRecognizer;\n\
  \n@end\n```\n\n在清单 8-17 中，我们可以看到类 `PanGestureController` 的头文件，它同样继承了 `GameController`。我们在\
  \ `NSMutableArray asteroids` 中维护了一个小行星的有序列表。此外，我们还有两个变量用于跟踪手势持续期间的状态：`int asteroidIndex`\
  \ 和 `CGPoint startCenter`。属性 `minYValue` 和 `maxYValue` 指定了每个 `Asteroid` 可以上下移动的范围。当检测到平移手势时，任务\
  \ `panGesture:` 会被 `UIPanGestureRecognizer` 调用。\n\n本示例的核心内容位于类 `PanGestureController`\
  \ 的实现中，让我们从 `doSetup` 任务开始，如清单 8-18 所示。\n\n**清单 8-18.** *PanGestureController.m\
  \ (doSetup)*\n```objc\n-(BOOL)doSetup{\n\nif ([super doSetup]){\n\n[self setGameAreaSize:CGSizeMake(320,\
  \ 480)];\n\n[self setMinYValue:72.0f];\n\n[self setMaxYValue:480-[self minYValue]];\n\
  \nasteroids = [NSMutableArray new];\n\nfor (int i=0;i<3;i++){\n\nAsteroid* asteroid\
  \ = [Asteroid asteroid:self];\n\n[[asteroid behaviors] removeAllObjects];\n\n[self\
  \ addActor:asteroid];\n\n[asteroids addObject:asteroid];\n\nCGPoint center = CGPointMake(i*320.0/3.0+320.0/6.0,\
  \ [self minYValue]);\n\n[asteroid setCenter:center];\n\n}\n\nUIPanGestureRecognizer*\
  \ panRecognizer = [[UIPanGestureRecognizer alloc]\n\ninitWithTarget:self action:@selector(panGesture:)];\n\
  \n[panRecognizer setMinimumNumberOfTouches:1];\n\n[actorsView addGestureRecognizer:panRecognizer];\n\
  \nreturn YES;\n\n}\n\nreturn NO;\n\n}\n```\n\n在清单 8-18 中，我们看到了类 `PanGestureController`\
  \ 的 `doSetup` 任务。在指定游戏区域大小之后，我们首先为小行星指定了 `minYValue` 和 `maxYValue`，这样它们就无法移动到距离屏幕顶部或底部\
  \ 72 点以内的区域。接着，我们创建了三个 `Asteroid` 对象，将它们添加到场景中，并加入到 `NSMutableArray asteroids` 里。每个\
  \ `Asteroid` 都从屏幕顶部开始。\n\n在 `doSetup` 中我们做的最后一件事是创建一个 `UIPanGestureRecognizer`，将其配置为调用\
  \ `panGesture:`，并添加到 `actorsView` 中。下一节将解释我们如何响应这些手势以实现所需的行为。\n\n## 响应平移手势\n\n我们已经回顾了如何设置类\
  \ `UIPanGestureRecognizer`。现在我们将探讨如何在任务 `panGesture:` 中响应此手势，如清单 8-19 所示。\n\n**清单\
  \ 8-19.** *PanGestureController.m (panGesture:)*\n```objc\n-(void)panGesture:(UIPanGestureRecognizer*)panRecognizer{\n\
  \nif ([panRecognizer state] == UIGestureRecognizerStateBegan){\n\nCGSize gameAreaSize\
  \ = [self gameAreaSize];\n\nCGPoint locationInView = [panRecognizer locationInView:actorsView];\
  \ if (locationInView.x < gameAreaSize.width/3.0){\n\nasteroidIndex = 0;\n\n} else\
  \ if (locationInView.x > gameAreaSize.width/3.0*2){\n\nasteroidIndex = 2;\n\n} else\
  \ {\n\nasteroidIndex = 1;\n\n}\n\nAsteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];\n\
  \nstartCenter = [asteroid center];\n\n[asteroid setAnimationPaused:YES];\n\n} else\
  \ if ([panRecognizer state] == UIGestureRecognizerStateChanged){\n\nAsteroid* asteroid\
  \ = [asteroids objectAtIndex:asteroidIndex];\n\nCGPoint locationInView = [panRecognizer\
  \ locationInView:actorsView]; CGPoint center = [asteroid center];\n\ncenter.y =\
  \ locationInView.y;\n\nif (center.y < [self minYValue]){\n\ncenter.y = [self minYValue];\n\
  \n}\n\nif (center.y > [self maxYValue]){\n\ncenter.y = [self maxYValue];\n\n}\n\n\
  [asteroid setCenter:center];\n\n} else if ([panRecognizer state] == UIGestureRecognizerStateEnded){\n\
  \nAsteroid* asteroid = [asteroids objectAtIndex:asteroidIndex];\n\n[asteroid setAnimationPaused:NO];\n\
  \n} else if ([panRecognizer state] == UIGestureRecognizerStateCancelled){\n\nAsteroid*\
  \ asteroid = [asteroids objectAtIndex:asteroidIndex];\n\n[asteroid setAnimationPaused:NO];\n\
  \n[asteroid setCenter:startCenter];\n\n}\n\n}\n```\n\n\n\n# 构建你的游戏：理解手势与移动\n\n在`代码清单\
  \ 8-19`中，我们可以看到任务`panGesture:`根据`panRecognizer`的状态被分解，这与捏合放大的例子类似。如果`panRecognizer`的状态等于`UIGestureRecognizerStateBegan`，我们会计算三个小行星中哪个在水平方向上离手势最近。一旦我们在`asteroidIndex`中记录了正在操作的小行星，就可以从`NSMutableArray`（名为`asteroids`）中获取当前活跃的`Asteroid`对象，并将其位置记录在`startCenter`中。最后，我们通过将`animationPaused`设为`NO`来停止其旋转。\n\
  \n在后续对`panGesture:`的调用中，`panRecognizer`的状态将变为`UIGestureRecognizerStateChanged`。此时，我们只需使用`panRecognizer`的任务`locationInView:`，将所选小行星的\
  \ Y 值设置为手势的 Y 值。\n\n与之前的例子类似，手势要么以`UIGestureRecognizerStateEnded`状态结束，要么以`UIGestureRecognizerStateCancelled`状态终止。在这两种情况下，我们都希望在取消状态下重新启动动画；同时，我们还想将所选小行星的中心点恢复为`startCenter`。\n\
  \n我希望到这里，大家已经看出这些手势识别器的工作模式了。基本模式是：设置识别器来检测`UIView`上的手势，配置回调任务以记录被操作对象（飞碟、小行星等）的起始状态，对场景应用变化，或者在取消的情况下回滚这些变化。接下来，我们来看旋转手势。\n\
  \n## 旋转手势\n\n在核心 iOS 应用中，旋转手势并不像之前介绍的手势那样常见。事实上，我在 iPhone 自带的应用中找不到一个旋转手势的例子，不过也可能是我有所遗漏。然而，旋转手势确实出现在一些数字益智游戏中，你需要在游戏中以某种方式旋转一个物体。旋转手势的操作方法是：将两根手指放在屏幕上，然后旋转你的手，就像在开瓶盖一样。图\
  \ 8-5 展示了一个旋转的例子。\n\n在图 8-5 中，我们看到一艘宇宙飞船正在逆时针旋转。我们知道飞船是在逆时针旋转，因为它的右舷机动推进器正在点火。如果飞船是顺时针旋转，我们会看到左舷机动推进器在点火。负责这个例子的类是`RotationGestureController`，其头文件如代码清单\
  \ 8-20 所示。\n\n**图 8-5.** *使用旋转手势旋转一艘宇宙飞船*\n\n**代码清单 8-20.** *RotationGestureController.h*\n\
  \n```\n@interface RotationGestureController : GameController{\n\n    Viper* viper;\n\
  \n    float startRotation;\n\n}\n\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer;\n\
  \n@end\n```\n\n在代码清单 8-20 中，我们看到了类`RotationGestureController`的头文件。我们看到有一个指向飞船的引用，名为`viper`。同时，我们在变量`startRotation`中记录了飞船的起始旋转角度。当`UIRotationGestureRecognizer`识别到一个手势时，会调用任务`rotationGesture:`。\n\
  \n我们来快速看一下类`RotationGestureController`的`doSetup`任务，以便理解`UIRotationGestureRecognizer`是如何设置的。请参见代码清单\
  \ 8-21。\n\n**代码清单 8-21.** *RotationGestureController.m (doSetup)*\n\n```\n-(BOOL)doSetup{\n\
  \n    if ([super doSetup]){\n\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
  \n        viper = [Viper viper:self];\n\n        [self addActor:viper];\n\n    \
  \    UIRotationGestureRecognizer* rotationRecognizer = [[UIRotationGestureRecognizer\
  \ alloc] initWithTarget:self action:@selector(rotationGesture:)];\n\n        [actorsView\
  \ addGestureRecognizer:rotationRecognizer];\n\n        return YES;\n\n    }\n\n\
  \    return NO;\n\n}\n```\n\n在代码清单 8-21 中，我们可以看到`RotationGestureController`的`doSetup`任务非常简单。我们添加了一个新的`Viper`对象，并注册了一个`UIRotationGestureRecognizer`。这一步应该不令人意外——我们知道，当对象`rotationRecognizer`检测到可以解释为旋转手势的触摸事件时，任务`rotationGesture:`将会被调用。我们来看看任务`rotationGesture:`，如代码清单\
  \ 8-22 所示。\n\n**代码清单 8-22.** *RotationGestureController.m (rotationGesture:)*\n\n\
  ```\n-(void)rotationGesture:(UIRotationGestureRecognizer*)rotationRecognizer{\n\n\
  \    if ([rotationRecognizer state] == UIGestureRecognizerStateBegan){\n\n     \
  \   startRotation = [viper rotation];\n\n    } else if ([rotationRecognizer state]\
  \ == UIGestureRecognizerStateChanged){\n\n        float rotation = [rotationRecognizer\
  \ rotation];\n\n        float finalRotation = startRotation + rotation*2.0;\n\n\
  \        if (finalRotation > [viper rotation]){\n\n            [viper setState:VPR_STATE_CLOCKWISE];\n\
  \n        } else {\n\n            [viper setState:VPR_STATE_COUNTER_CLOCKWISE];\n\
  \n        }\n\n        [viper setRotation: finalRotation];\n\n    } else if ([rotationRecognizer\
  \ state] == UIGestureRecognizerStateEnded){\n\n        [viper setState:VPR_STATE_STOPPED];\n\
  \n    } else if ([rotationRecognizer state] == UIGestureRecognizerStateCancelled){\n\
  \n        [viper setState:VPR_STATE_STOPPED];\n\n        [viper setRotation:startRotation];\n\
  \n    }\n\n}\n```\n\n在代码清单 8-22 中，展示了类`RotationGestureController`的`rotationGesture:`任务。在这个任务中，我们根据`rotationRecognizer`的状态，执行现在已很熟悉的操作。如果状态是`UIGestureRecognizerStateBegan`，我们只需记录角色`viper`的起始旋转角度。如果状态是`UIGestureRecognizerStateChanged`，我们从`rotationRecognizer`获取旋转值。\n\
  \n旋转值是相对于用户最初放置手指的位置而言的。由于旋转值是相对于`startRotation`的，我们必须将旋转值加到`startRotation`上，才能让飞船像旋钮一样转动。我们将旋转值乘以\
  \ 2.0，以使旋转更快、反应更灵敏。这样做仅仅是因为我们可能会在动作游戏中使用这种技术，我们希望用户能够相当快速地旋转飞船。一旦计算出`finalRotation`的值，我们就判断它是否大于或小于当前的旋转值。这使我们能够将`viper`的状态设置为`VPR_STATE_CLOCKWISE`（顺时针）或`VPR_STATE_COUNTER_CLOCKWISE`（逆时针）。\n\
  \n当手势结束时，我们只需将`viper`的状态设回`VPR_STATE_STOPPED`。此外，如果手势被取消，我们将飞船的旋转角度重置回`startRotation`。\n\
  \n接下来的例子更类似于点击例子，而非之前的例子，因为它处理的是所谓的长按手势。\n\n## 长按手势\n\n长按手势是指用户触摸手机上的某个点并保持一段时间的手势。它有点像点击，但时间更长——正如其名。用户通常在想要重新排列应用图标时会使用长按手势——当你按住一个应用图标使其开始晃动时，这就是长按。当你在键盘上按下带有子选项的按键时，也会用到长按。例如，打开\
  \ Safari，点击地址栏。键盘弹出后，将手指放在“.com”按钮上。片刻之后，会显示五个备选的顶级域名。在这个例子中，我们将点击与长按结合起来，以改变飞船发射子弹的大小，如图\
  \ 8-6 所示。\n\n**图 8-6.** *一艘飞船发射三种不同大小的子弹*\n\n\n\n# 第八章：构建游戏：理解手势与移动\n\n在图 8-6 中，我们看到屏幕底部有一艘飞船。飞船上方有许多圆形图案，这些是根据用户手势从飞船射出的子弹。左上角聚集的三个圆形是通过简单轻触产生的基础子弹。靠近底部最大的圆形是用户长按时产生的大型子弹。如果用户触摸超过两秒，则会发射出更大的子弹，如图\
  \ 8-6 右上角所示。让我们来看看清单 8-23 中`LongPressController`类的头文件。\n\n**清单 8-23.** `LongPressController.h`\n\
  \n```\n@interface LongPressController : GameController{\n\nViper* viper;\n\nNSDate*\
  \ longStart;\n\n}\n\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer;\n\
  \n-(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer;\n\n\
  -(void)fireBulletAt:(CGPoint)point WithDamage:(float)bulletSize;\n\n@end\n```\n\n\
  在清单 8-23 中，我们看到了`LongPressController`类的头文件，其中显示我们有一个对飞船的引用，以及一个用于记录长按手势开始时间的`NSDate`。当用户轻触屏幕发射小型子弹时，会调用`tapGesture:`任务；当用户执行长按手势发射大型子弹时，会调用`longPressGesture:`任务。最后一个任务用于创建`Bullet`对象并将其添加到场景中。让我们先来看看`LongPressController`的`doSetup`任务，如清单\
  \ 8-24 所示。\n\n**清单 8-24.** `LongPressController.m（doSetup 部分）`\n\n```\n-(BOOL)doSetup{\n\
  \nif ([super doSetup]){\n\n[self setGameAreaSize:CGSizeMake(320, 480)];\n\nviper\
  \ = [Viper viper:self];\n\n[self addActor:viper];\n\nCGPoint center = [viper center];\n\
  \ncenter.y = [self gameAreaSize].height/5.0*4.0;\n\n[viper setCenter:center];\n\n\
  UITapGestureRecognizer* tapRecognizer = [[UITapGestureRecognizer alloc]\n\ninitWithTarget:self\
  \ action:@selector(tapGesture:)];\n\n[actorsView addGestureRecognizer:tapRecognizer];\n\
  \nUILongPressGestureRecognizer* longPressRecognizer =\n\n[[UILongPressGestureRecognizer\
  \ alloc] initWithTarget:self\n\naction:@selector(longPressGesture:)];\n\n[longPressRecognizer\
  \ setMinimumPressDuration:1.0f];\n\n[actorsView addGestureRecognizer: longPressRecognizer];\n\
  \nreturn YES;\n\n}\n\nreturn NO;\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![](img/00059.png)\n\n## 第八章：构建游戏：理解手势与移动 205\n\n在清单 8-24 中，我们看到了`doSetup`任务。在完成了设置游戏区域大小和添加`viper`对象这些常规步骤后，我们注册了两个手势响应器。第一个手势识别器是`UITapGestureRecognizer`，它会调用`tapGesture:`方法。第二个手势识别器是配置为调用`longPressGesture:`方法的`UILongPressGestureRecognizer`。该手势识别器的`minimumPressDuration`属性被设置为`1.0f`，这意味着用户必须按住屏幕一秒钟，该识别器才会将触摸视为长按手势。两个手势识别器都被添加到了`actorsView`中。\n\
  \n## 响应用户操作\n\n在接下来的部分中，我们将根据触发的手势类型，了解如何添加子弹。我们首先处理轻触手势。`tapGesture:`方法的实现如清单 8-25\
  \ 所示。\n\n**清单 8-25.** `LongPressController.m（tapGesture:部分）`\n\n```\n-(void)tapGesture:(UITapGestureRecognizer*)tapRecognizer{\n\
  \n[self fireBulletAt:[tapRecognizer locationInView:actorsView] WithDamage:10];\n\
  \n}\n```\n\n在清单 8-25 中，我们看到每次识别到轻触手势时，都会调用`fireBulletAt:WithDamage:`方法，并指定触摸位置和伤害值`10`。更有趣的交互体现在`longPressGesture:`方法的实现中，如清单\
  \ 8-26 所示。\n\n**清单 8-26.** `LongPressController.m（longPressGesture:部分）`\n\n```\n\
  -(void)longPressGesture:(UILongPressGestureRecognizer*)longPressRecognizer{\n\n\
  if ([longPressRecognizer state] == UIGestureRecognizerStateBegan){\n```\n\n\n```markdown\n\
  \n`[viper setState:VPR_STATE_TRAVELING]`;\n\n`longStart = [NSDate date]`;\n\n} else\
  \ if ([`longPressRecognizer` state] == `UIGestureRecognizerStateEnded`){\n\n`NSDate*\
  \ now = [NSDate date]`;\n\n`float damage = 20`;\n\nif ([`now` `timeIntervalSinceDate:longStart`]\
  \ > 1.0f){\n\n`damage = 30`;\n\n}\n\n`[self fireBulletAt:[longPressRecognizer locationInView:actorsView]\
  \ WithDamage:damage]`;\n\n`[viper setState:VPR_STATE_STOPPED]`;\n\n}\n\n}\n\n在 `列表\
  \ 8–26` 中，我们使用 `longPressRecognizer` 的状态来决定要执行的操作。如果手势已经开始，我们将时间记录在变量 `longStart`\
  \ 中；同时将 `viper` 对象的状态设置为 `VPR_STATE_TRAVELING`，这会显示飞船的推进效果。如果你已经体验过演示应用程序，你会注意到推进效果是在手势相关的\
  \ 1 秒延迟后出现的。这意味着 `longPressGesture:` 在这段最短时间过去之前不会被调用。\n\n如果 `longPressRecognizer`\
  \ 的状态是 `UIGestureRecognizerStateEnded`，则我们知道用户已经松开了手指。当这种情况发生时，我们检查自手势开始以来是否已经过去了超过\
  \ 1 秒。如果是，则将伤害从 20 升级到 30。这意味着如果用户按住手指 1 秒，下一颗子弹将造成 20 点伤害；如果按住 2 秒，伤害将变为 30。当长按手势结束时，我们将\
  \ `viper` 的状态设置回 `VPR_STATE_STOPPED`，并以相应的伤害发射子弹。\n\n**添加子弹**\n\n让我们看看 `fireBulletAt:WithDamage:`\
  \ 的实现来完成这个示例。参见 `列表 8–27`。\n\n**列表 8–27.** *LongPressController.m (fireBulletAt:WithDamage:)*\n\
  \n```\n-(void)fireBulletAt:(CGPoint)point WithDamage:(float)damage{\n    Bullet*\
  \ bullet = [Bullet bulletAt:[viper center] TowardPoint:point];\n    [bullet setDamage:damage];\n\
  \    [self addActor:bullet];\n}\n```\n\n在 `列表 8–27` 中，我们看到我们简单地创建了一个新的 `Bullet`\
  \ 角色，它被配置为向指定点移动，并将其添加到场景中。\n\n**滑动手势**\n\n滑动手势最广为人知的用途可能是切换主屏幕上看到的应用程序集合。这种手势通常用于切换上下文，就像主屏幕一样。其他例子包括在\
  \ iPad 2 上用于切换前台应用程序的四指滑动。这有点像在你正在运行的应用程序中“扒拉”过去。在我们的示例中，我们将使用滑动手势向场景中添加彗星，如图 8–7\
  \ 所示。\n\n在图 8–7 中，我们看到屏幕上有几颗彗星。每颗彗星都是由一个滑动手势创建的，该手势决定了彗星的起始位置和移动方向。例如，向右滑动会导致彗星在左侧创建并向右移动。让我们看看\
  \ `列表 8–28` 中 `SwipeGestureController` 类的 `doSetup` 任务。\n\n**图 8–7.** *滑动创建彗星*\n\
  \n**列表 8–28.** *SwipeGestureController.m (doSetup)*\n\n```\n-(BOOL)doSetup{\n  \
  \  if ([super doSetup]){\n        [self setGameAreaSize:CGSizeMake(320, 480)];\n\
  \        UISwipeGestureRecognizer* down = [[UISwipeGestureRecognizer alloc]\n  \
  \          initWithTarget:self action:@selector(swipeGesture:)];\n        [down\
  \ setDirection:UISwipeGestureRecognizerDirectionDown];\n        [actorsView addGestureRecognizer:down];\n\
  \        UISwipeGestureRecognizer* up = [[UISwipeGestureRecognizer alloc]\n    \
  \        initWithTarget:self action:@selector(swipeGesture:)];\n        [up setDirection:UISwipeGestureRecognizerDirectionUp];\n\
  \        [actorsView addGestureRecognizer:up];\n        UISwipeGestureRecognizer*\
  \ left = [[UISwipeGestureRecognizer alloc]\n            initWithTarget:self action:@selector(swipeGesture:)];\n\
  \        [left setDirection:UISwipeGestureRecognizerDirectionLeft];\n        [actorsView\
  \ addGestureRecognizer:left];\n```\n\n```\n\n\n`UISwipeGestureRecognizer*` `right\
  \ = [[UISwipeGestureRecognizer alloc]`\n\n`initWithTarget:self action:@selector(swipeGesture:)]`;\n\
  \n`[right setDirection:UISwipeGestureRecognizerDirectionRight]`;\n\n`[actorsView\
  \ addGestureRecognizer:right]`;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00309.png)\n\n**208**\n\n**第 8 章：构建你的游戏：理解手势与移动** `return YES;`\n\n`}`\n\
  \n`return NO;`\n\n`}`\n\n在**列表 8–28**中，我们看到注册此示例手势识别器的代码。\n\n我们看到，我们为想要监听的每个方向创建了一个`UISwipeGestureRecognizer`。此示例中唯一令人惊讶的是，它需要四个不同的手势识别器才能实现我们想要的效果。`UISwipeGestureRecognizer`确实允许您为多个方向指定一个识别器。但是，在响应滑动手势时，无法判断手势的方向。只有通过为每个方向创建一个识别器，我们才能判断用户手势的方向。\n\
  \n让我们看看`swipeGesture:`任务。参见**列表 8–29**。\n\n**列表 8–29.** *SwipeGestureController.m\
  \ (swipeGesture:)*\n\n```\n-(void)swipeGesture:(UISwipeGestureRecognizer*)swipeRecognizer{\n\
  \n    CGSize gameSize = [self gameAreaSize];\n\n    UISwipeGestureRecognizerDirection\
  \ direction = [swipeRecognizer direction]; CGPoint locationInView = [swipeRecognizer\
  \ locationInView:actorsView]; CGPoint center = CGPointMake(0, 0);\n\n    float directionInRadians\
  \ = DIRECTION_DOWN;\n\n    if (direction == UISwipeGestureRecognizerDirectionRight){\n\
  \n        center.x = -20;\n\n        center.y = locationInView.y;\n\n        directionInRadians\
  \ = DIRECTION_RIGHT;\n\n    } else if (direction == UISwipeGestureRecognizerDirectionDown){\n\
  \n        center.x = locationInView.x;\n\n        center.y = -20;\n\n        directionInRadians\
  \ = DIRECTION_DOWN;\n\n    } else if (direction == UISwipeGestureRecognizerDirectionLeft){\n\
  \n        center.x = gameSize.width+20;\n\n        center.y = locationInView.y;\n\
  \n        directionInRadians = DIRECTION_LEFT;\n\n    } else if (direction == UISwipeGestureRecognizerDirectionUp){\n\
  \n        center.x = locationInView.x;\n\n        center.y = gameSize.height+20;\n\
  \n        directionInRadians = DIRECTION_UP;\n\n    }\n\n    Comet* comet = [Comet\
  \ comet:self withDirection:directionInRadians andCenter:center];\n\n    [self addActor:comet];\n\
  \n}\n```\n\n在**列表 8–29**中，我们看到当识别到滑动手势时被调用的代码。为了创建我们想要的效果，我们只需创建一个新的`Comet`actor，并为其指定正确的位置和方向。要确定`Comet`应该放置在哪里以及朝哪个方向移动，我们只需查看`swipeRecognizer`的`direction`属性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00296.png)\n\n![](img/00285.jpeg)\n\
  \n**第 8 章：构建你的游戏：理解手势与移动** **209**\n\n我们不打算深入探讨`Comet`类是如何实现的细节；我们已经详细讨论过这一点。如果您真的感兴趣，请查看提供的源代码。\n\
  \n我们已经了解了 iOS 中内置的手势识别器，并探讨了它们的基本工作原理。在下一节中，我们将探讨如何将设备的移动集成到应用程序中。\n\n## 解释设备移动\n\
  \n从 iPhone 4 开始，iOS 设备内置了加速度计和陀螺仪传感器。在应用程序中使用这些传感器有几种方法。最常见的两种方法是简单地对运动事件做出响应，这对应于摇动设备。另一种更精细的方法是通过`UIAccelerometer`类直接访问这些传感器的方向数据。让我们先看一下摇晃示例。\n\
  \n## 响应运动事件（摇晃）\n\n每当 iOS 设备被摇动时，就会生成一个运动事件供应用程序使用。就个人而言，我觉得在应用程序中使用摇晃功能非常烦人；然而，有些人认为这是一个好主意，所以让我们看看如何利用这个功能。图\
  \ 8-8 展示了我们的示例。\n\n**图 8–8.** *小行星因设备摇晃而破碎*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n# 210\n\n# 第 8 章：构建你的游戏：理解手势与动作\n\n在图 8-8 中，我们看到一些**小行星**。这些小行星原本是一个整体，但几次摇晃事件导致它分裂了。本示例的类名为\
  \ `ShakeController`，它继承了 `GameController`。它的头文件没有什么特别之处，所以我们直接来看它的 `doSetup` 任务，如代码清单\
  \ 8-30 所示。\n\n**代码清单 8–30.** *`ShakeController.m` (`doSetup`)*\n\n```\n-(BOOL)doSetup{\n\
  \nif ([super doSetup]){\n\n[self setGameAreaSize:CGSizeMake(320, 480)];\n\nNSMutableArray*\
  \ classes = [NSMutableArray new];\n\n[classes addObject:[Asteroid class]];\n\n[self\
  \ setSortedActorClasses:classes];\n\nreturn YES;\n\n}\n\nreturn NO;\n\n}\n```\n\n\
  在代码清单 8-30 中，我们看到 `doSetup` 任务配置了 `ShakeController`，将 `Asteroid` 标记为我们稍后需要访问的 `Actor`\
  \ 类。我们在 `updateScene` 任务中添加了 `Asteroid`。之所以这样处理，是因为我们希望在场景中没有 `Asteroid` 对象时才添加一个新的\
  \ `Asteroid`，如代码清单 8-31 所示。\n\n**代码清单 8–31.** *`ShakeController` (`updateScene`)*\n\
  \n```\n-(void)updateScene{\n\nif ([[self actorsOfType:[Asteroid class]] count] ==0\
  \ ){\n\nAsteroid* asteroid = [Asteroid asteroid:self];\n\n[self addActor:asteroid];\n\
  \n}\n\n[super updateScene];\n\n}\n```\n\n在代码清单 8-31 中，我们看到 `updateScene` 任务被调用来推进游戏在动画的每一步中前进。在此任务中，我们检查场景中是否存在\
  \ `Asteroid` 对象；如果没有，就继续添加一个。最后，我们调用父类的 `updateScene` 实现，以驱动游戏继续运行。\n\n现在的问题是，我们如何响应摇晃事件来炸毁小行星？通过通知应用顶层视图可以成为“第一响应者”并实现相应的方法来响应运动事件，即可实现这一点。成为第一响应者的\
  \ `UIView` 是优先解释用户输入的 `UIView`。让视图成为第一响应者需要两个步骤。首先，你必须通知应用 `UIViewController` 的\
  \ `view` 属性可以成为第一响应者，然后你需要请求成为第一响应者。代码清单 8-32 展示了实现此功能的代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 211\n\n## 第 8 章：构建你的游戏：理解手势与动作  \n\n**代码清单 8–32.** *`ShakeController`（与第一响应者相关的任务）*\n\
  \n```\n-(BOOL)canBecomeFirstResponder {\n\nreturn YES;\n\n}\n\n-(void)viewDidAppear:(BOOL)animated\
  \ {\n\n[super viewDidAppear:animated];\n\n[self becomeFirstResponder];\n\n}\n\n\
  - (void)viewWillDisappear:(BOOL)animated {\n\n[self resignFirstResponder];\n\n[super\
  \ viewWillDisappear:animated];\n\n}\n```\n\n在代码清单 8-32 中，我们看到三个任务。第一个任务 `canBecomeFirstResponder`\
  \ 只是通知应用此 `UIViewController` 的 `view` 属性有资格成为第一响应者，并且此 `UIViewController` 将处理其事件。接下来的两个任务是\
  \ `UIViewController` 生命周期的一部分：当此 `UIViewController` 实例的 `view` 属性被显示时，会调用 `viewDidAppear:`；此时，我们可以通过调用\
  \ `becomeFirstResponder` 成为第一响应者。相反，当此 `UIViewController` 从屏幕上移除时，我们不再希望它成为第一响应者，因此调用\
  \ `resignFirstResponder`。这三个任务只是让此类能够接收运动事件；这些事件在 `motionBegan:withEvent:` 和 `motionEnded:withEvent:`\
  \ 任务的实现中进行处理。在我们的示例中，只需要实现其中一个；`motionBegan:withEvent:` 的实现如代码清单 8-33 所示。\n\n**代码清单\
  \ 8–33.** *`ShakeController.m` (`motionBegan:withEvent:`)*\n\n```\n- (void)motionBegan:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n\n{\n\nif (motion == UIEventSubtypeMotionShake)\n\n\
  {\n\nfor (Asteroid* asteroid in [self actorsOfType:[Asteroid class]]){\n\n[asteroid\
  \ doHit:self];\n\n}\n\n}\n\n}\n```\n\n\n\n在`Listing 8–33`中，我们看到`motionBegan:withEvent:`任务，首先检查运动子类型是否为`UIEventSubtypeMotionShake`。如果是，我们只需遍历场景中的所有小行星并调用它们的`doHit:`方法。`doHit:`任务将在第\
  \ 7 章讨论。\n\n正如我们所见，响应摇动事件非常简单，与响应触摸事件非常相似。我觉得有点奇怪的是，摇动事件并没有作为手势来实现。我怀疑原因是摇动事件在众多不同的手势识别器加入`SDK`之前就已经存在了。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00025.png)\n\n![](img/00111.jpeg)\n\
  \n**212**\n\n**第 8 章：构建你的游戏：理解手势与运动** **响应加速计数据**\n\n作为一名开发者，能够获知设备的朝向对我来说非常酷。它让增强现实等应用成为可能，也带来了许多其他酷炫的功能。本章最后一个示例将使用加速计来操控场景中的角色。我不能保证它像增强现实游戏一样酷，但它应该能为其他开发者铺平道路。图\
  \ 8–9 展示了正在运行的加速计示例。\n\n**图 8–9.** *加速计演示的多个屏幕截图*\n\n在图 8–9 中，我们看到该示例的多个屏幕截图。在此示例中，`viper`的位置基于`x`和`y`加速计值，因此当\
  \ iPhone 平放时，飞船应位于游戏区域的中心。当设备向左倾斜时，飞船向左移动；当设备向上倾斜时，飞船向上移动，依此类推。图 8–8 突显了加速计数据的波动性。所有这些截图都是在尝试保持设备水平时拍摄的（尽管同时也在尝试截图）。对于实际应用，加速计数据需要经过平滑处理。\n\
  \n负责我们示例的类是`AccelerometerController`，其头文件如`Listing 8–34`所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00209.png)\n\n**第 8 章：构建你的游戏：理解手势与运动** **213**\n\n**Listing 8–34.** *`AccelerometerController.h`*\n\
  \n```objc\n@interface AccelerometerController : GameController<UIAccelerometerDelegate>{\n\
  \nViper* viper;\n\n}\n\n@end\n```\n\n在`Listing 8–34`中，我们看到了`AccelerometerController`类的头文件。需要注意的是，`AccelerometerController`类遵循`UIAccelerometerDelegate`协议，并且它有一个指向将在屏幕上移动的`Viper`的引用。遵循该协议允许`AccelerometerController`实时接收来自加速计的数据，我们稍后将看到这一点。我们首先来看看如何设置`AccelerometerController`类以使其接收数据，如`Listing\
  \ 8–35`所示。\n\n**Listing 8–35.** *`AccelerometerController.m` (`doSetup`)**\n\n```objc\n\
  -(BOOL)doSetup{\n\nif ([super doSetup]){\n\n[self setGameAreaSize:CGSizeMake(320,\
  \ 480)];\n\nviper = [Viper viper:self];\n\n[self addActor:viper];\n\nUIAccelerometer*\
  \ theAccelerometer = [UIAccelerometer sharedAccelerometer]; theAccelerometer.updateInterval\
  \ = 1 / 50.0;\n\ntheAccelerometer.delegate = self;\n\nreturn YES;\n\n}\n\nreturn\
  \ NO;\n\n}\n```\n\n在`Listing 8–35`中，我们进行常规设置，指定游戏区域大小并添加将用加速计数据移动的`viper`。要开始接收加速计数据，我们必须获得与正在运行的应用程序关联的单例`UIAccelerometer`。为此，我们使用`UIAccelerometer`类的静态任务`sharedAccelerometer`，然后将`self`设置为代理。另一件需要注意的事情是，我们必须指定获取数据的频率。在本例中，我们请求每秒获取\
  \ 50 次数据，这对于实时输入来说已经足够快了。数据实际上是通过对`accelerometer:didAccelerate:`的调用接收的，如`Listing\
  \ 8–36`所示。\n\n**Listing 8–36.** *`AccelerometerController.m` (`accelerometer:didAccelerate:`)*\n\
  \n\n\n```objc\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\
  \ *)acceleration{\n    CGSize size = [self gameAreaSize];\n    UIAccelerationValue\
  \ x, y, z;\n    x = acceleration.x;\n    y = acceleration.y;\n    z = acceleration.z;\n\
  \    NSLog(@\"x = %f y = %f z = %f\", x, y, z);\n    CGPoint center = CGPointMake(size.width/2.0\
  \ * x + size.width/2.0, size.height/2.0 * y + size.height/2.0);\n    [viper setCenter:center];\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00265.png)\n\
  \n**214**\n\n**第 8 章：构建你的游戏：理解手势与动作** 在代码清单 8-36 中，我们简单地从`UIAcceleration acceleration`获取了\
  \ x、y 和 z 的值。这些值的范围基于设备的朝向，在-1.0 到 1.0 之间。因为 x 值对应设备（在竖屏模式下）向左或向右倾斜，我们可以直接用 x 的值来指定新中心点的\
  \ x 值。\n\n我们对 y 值也采用相同的方法，并设置`viper`的`center`属性。\n\n这是一个非常简单的例子，但它有望引导你走上正确的方向。在我看来，像这个例子一样，实现基本功能相当简单，但要实现更复杂的用户交互，工作量则要大得多。我建议阅读名为《iOS\
  \ 事件处理指南》的文档，该文档可在 http://developer.apple.com 获取。\n\n**总结**\n\n在本章中，我们探讨了如何响应基本的触摸事件。我们还了解了如何利用`UIGestureRecognizer`的子类将这些触摸事件解释为简洁的手势，比如捏合、长按、旋转等。在最后一节中，我们研究了使用加速度计控制游戏角色的两种方法。第一种方法让我们能够简单地响应摇晃事件。第二种技术展示了如何直接访问加速度计数据来控制应用程序，为比简单摇晃更复杂的基于动作的手势奠定了基础。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00255.png)\n\n![](img/00266.png)\n\
  \n# 第 9 章：Game Center 与社交媒体\n\n如今，推广游戏的关键方式之一是将你的应用程序与一个或多个社交媒体服务整合。其理念是，用户会在游戏过程中推广你的游戏，并与朋友分享他们的体验。为了让用户更频繁地玩你的游戏，提供一种机制让用户与其他玩家比较分数也非常常见。在游戏开发中，为用户提供追踪与他人分数差距以及发布进度的方法非常普遍，以至于苹果公司特意提供了支持这些需求的库。\n\
  \n苹果提供的主要服务被称为 Game Center，它在名为 `GameKit` 的库中实现。Game Center 是一项允许用户在所谓的排行榜上与其他玩家比较分数的服务。Game\
  \ Center 还允许用户达成所谓的成就。成就由每个游戏自行定义，旨在激励玩家持续游戏。例如，如果你有一个难以达成的成就，玩家就会渴望获得它，以便在同玩此游戏的朋友中脱颖而出。Game\
  \ Center 还提供了多人游戏的机制，但本章我们将更侧重于其服务中的社交方面。\n\n为了广播玩家在游戏中的进度，通常会使用现有的社交媒体网站（如 Twitter\
  \ 或 Facebook），以便用户的朋友能够收到通知。iOS 5 的一个新特性是内置了 Twitter 账户。在本章中，我们将研究如何使用公开 Twitter\
  \ 账户的类来代表用户发送推文。虽然 iOS 5 没有内置 Facebook，但 Facebook 提供了一个优秀的库，能实现几乎与 Twitter 一样整合的体验。我们将研究如何在\
  \ iOS 上使用 Facebook，以方便用户进行身份验证以及在个人墙上发帖。\n\n\n\n# 本章示例均取自项目《Belt Commander》。我们将继续在接下来几页中运用所学知识，作为最后两章的示例，一同探索一个完整的游戏。\n\
  \nL. Jordan，*《Beginning iOS 5 Games Development》*\n\n©\n\nLucas Jordan 2011\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Game Center\n\n从用户的角度来看，Game\
  \ Center 是 iOS 设备上的一款应用，用于聚合用户游戏的相关信息。这些信息包括登录及管理账户的入口、好友列表以及游戏列表。对于列出的每款游戏，都有多个用于显示得分的排行榜，以及游戏中可获得的成就列表。图\
  \ 9–1 展示了一个典型的 Game Center 界面。\n\n**图 9–1.** *展示游戏的 Game Center*\n\n在图 9–1 中，我们看到九款已安装的支持\
  \ Game Center 的游戏。选择一款游戏即可查看其排行榜以及用户已获得的任何成就。\n\n从开发者的角度来看，Game Center 是一组用于与 Game\
  \ Center 交互以定义排行榜和成就的类。这些类统称为 `GameKit`，是标准 iOS SDK 安装包的一部分。\n\n一旦将 `GameKit` 集成到你的游戏中，你就能让用户登录并代表她执行\
  \ `GameKit` 操作。图 9–2 展示了用户正在登录 `GameKit` 的过程。\n\n**图 9–2.** *登录 GameKit*\n\n在图 9–2\
  \ 中，我们看到游戏《Belt Commander》的欢迎界面。顶部有一条来自 Game Center 的通知，告知用户本游戏正在使用 `GameKit`，并显示了用户账户。同时我们还能看到“沙盒”字样。这提示我们当前并非在使用\
  \ Game Center 的正式版本，而是开发版本。在大多数情况下，你无需为此担心；在开发过程中，你将完全使用沙盒环境。\n\n要在你的项目中启用 `GameKit`，显然你需要使用\
  \ `GameKit` 中的类，但你还必须告知 Apple 你希望特定游戏获得 `GameKit` 支持。下一节将介绍如何在 iTunes Connect 中设置\
  \ `GameKit`。\n\n### 在 iTunes Connect 中启用 Game Center\n\nGame Center 不仅仅是 iOS 设备上的一个应用或一组库，它还是由\
  \ Apple 托管的一组 Web 服务，提供了大量功能。为了让你的游戏能使用这些服务，你需要配置你的应用。你必须在配置门户中创建一个 App ID，配置 Xcode\
  \ 使用生成的 Bundle Identifier，并在 iTunes Connect 中配置你的应用以使用 Game Center。假设我们正在制作一款新游戏，并从配置门户开始，如图\
  \ 9–3 所示。\n\n**图 9–3.** *在配置门户中创建 App ID*\n\n在图 9–3 中，我们看到用于创建 App ID 的表单。顶部的“描述”字段可以填写任何你希望提醒自己创建此\
  \ App ID 原因的内容。你可以选择任何你想要的 Bundle Seed ID，但我发现有一个重要理由不直接使用默认值：选择默认的 `Bundle Seed\
  \ ID` 会省去使用 `Xcode` 时的一些配置步骤。\n\n最后一项是 Bundle Identifier。它用于在运行时标识你的应用。对于需要支持 Game\
  \ Center 的游戏，你必须指定一个不含通配符的 `Bundle Identifier`。点击“提交”后，你应该在 `Xcode` 中打开你的游戏项目。\n\
  \n`Bundle Identifier` 必须在 `Xcode` 中设置，这样 iOS 才能知道如何将设备上运行的二进制文件与 iTunes Connect\
  \ 中定义的应用关联起来。图 9–4 展示了设置 `Bundle Identifier` 的位置。\n\n\n\n# 第 1 章：App Cubby\n\n**219**\n\
  \n**图 9–4.** *Xcode 中的 Bundle Identifier*\n\n在图 9–4 中，`Identifier` 字段包含了我们在 Xcode\
  \ 中设置的 Bundle Identifier。该值与版本号共同用于向 iTunes Connect 标识当前运行的应用程序。设置好 Bundle Identifier\
  \ 后，你需要在 iTunes Connect 中创建一个新应用，如图 9–5 所示。\n\n**图 9–5.** *iTunes Connect 中的新应用*\n\
  \n在图 9–5 中，我们展示了在 iTunes Connect 中创建新应用的第一步。我们指定了应用名称并选择了 SKU 编号。SKU 编号可以任意设置，其作用是让游戏制作方能够在内部系统中跟踪销量。我们还可以看到，可以通过下拉菜单选择\
  \ Bundle ID，而这个值正是我们在创建新 App ID 时指定的。在 iTunes Connect 中创建新应用还需要几个步骤，但这些步骤仅涉及填写应用信息，并非启用\
  \ Game Center 的必要步骤。\n\n系统会要求你提供描述、版权信息及其他细节。最后一步添加的所有信息都可以跳过，后续再补填。\n\n当应用创建完成后，查看其详细信息并找到\
  \ `Manage Game Center` 按钮，如图 9–6 所示。\n\n**220**\n\n**第 1 章：App Cubby**\n\n**图 9–6.**\
  \ *iTunes Connect 中应用的配置按钮*\n\n在图 9–6 中，我们看到了 `Manage Game Center` 按钮（标记为 A）。点击该按钮，系统将提示你启用\
  \ Game Center 并创建一个排行榜。图 9–7 展示了创建或编辑排行榜的页面。\n\n**图 9–7.** *创建或编辑排行榜*\n\n**第 1 章：App\
  \ Cubby**\n\n**221**\n\n在图 9–7 中，我们看到了 iTunes Connect 中用于编辑和创建排行榜的网页。在项目 A 处，我们看到了排行榜的名称。该名称并非显示名称，仅用于内部使用，可以任意设置。项目\
  \ B 指示了排行榜的 ID。这是代码中引用排行榜时使用的值。\n\n项目 C 和 D 指明了该排行榜中分数的排序方式。我们选择将分数显示为整数值（不含小数位），并且认为分数越高越好。项目\
  \ E 显示我们已为一种语言添加了显示信息。通过点击 `Add Language` 按钮并指定排行榜的显示名称，以及在本例中将数值称为“点数”，可以添加其他语言。创建或编辑成就与操作排行榜非常相似，如图\
  \ 9–8 所示。\n\n**图 9–8.** *创建或编辑成就*\n\n在图 9–8 中，我们看到了在 iTunes Connect 中创建和编辑成就的网页。项目\
  \ A 展示了成就内部使用的名称。项目 B 显示了成就的 ID。项目 C 表明该成就非隐藏状态。默认情况下，即使用户尚未达成成就，这些成就也是可见的。不过，设置一些隐藏成就也会很有趣，这样用户达成时会有惊喜。项目\
  \ E 显示我们已指定了英语的显示文本。当然，通过点击 `Add Language` 按钮，可以添加其他语言的文本。\n\n我们已经了解了如何在 iTunes\
  \ Connect 中创建新的 App ID 和新应用。我们还简要浏览了创建排行榜和成就所需的界面。现在，让我们来看看利用这些新资源的代码。\n\n**222**\n\
  \n**第 1 章：App Cubby**\n\n**在游戏中使用 Game Center**\n\n\n\n使用 GameKit 来启用排行榜和成就功能出乎意料地简单，前提是\
  \ Game Center 已设置包含这些功能。以下章节将讨论如何连接用户的 Game Center 账户，将他的分数提交到排行榜，以及获取成就。\n\n**为用户启用\
  \ Game Center**\n\n当游戏启用了 Game Center 时，用户仍需选择加入 Game Center 功能。用户需要使用 Game Center\
  \ 创建一个账户，并在当前 iOS 设备上使用该账户进行身份验证。值得庆幸的是，苹果公司简化了 Game Center 的入门流程。\n\n要开始使用 Game\
  \ Center，所有应用都必须获取代表本地玩家的 `GKLocalPlayer` 实例，并对其进行身份验证。清单 9-1 展示了执行此操作的典型示例。\n\n\
  **清单 9-1.** *RootViewController.m (initGameCenter)*\n\n```\n-(void)initGameCenter{\n\
  \nClass gkClass = NSClassFromString(@\"GKLocalPlayer\");\n\nBOOL iosSupported =\
  \ [[[UIDevice currentDevice] systemVersion] compare:@\"4.1\"\n\noptions:NSNumericSearch]\
  \ != NSOrderedAscending;\n\nif (gkClass && iosSupported){\n\nlocalPlayer = [GKLocalPlayer\
  \ localPlayer];\n\n[localPlayer authenticateWithCompletionHandler:^(NSError *error)\
  \ {\n\nif (localPlayer.authenticated){\n\n[leaderBoardButton setEnabled:YES];\n\n\
  } else {\n\n[leaderBoardButton setEnabled:NO];\n\n}\n\n}];\n\n}\n\n}\n```\n\n在清单\
  \ 9-1 中，我们看到了 `RootViewController` 类的任务 `initGameCenter`。此任务在应用程序启动时被调用一次。它首先通过查找\
  \ `GKLocalPlayer` 类来检查此 iOS 设备上是否可用 GameKit。该任务还会检查 iOS 版本是否足够新以支持 Game Center。\n\
  \n如果检查通过，我们通过调用 `GKLocalPlayer` 类的 `localPlayer` 方法来获取一个指向本地玩家的指针。\n\n为了对本地玩家进行身份验证，我们只需调用\
  \ `authenticateWithCompletionHandler:` 并传入一个代码块，该代码块将在用户完成身份验证（或取消）时异步执行。代码块是一种将函数声明为可传递值的方式。在此例中，我们使用代码块的方式与在\
  \ Java 等语言中使用匿名类的方式相同。此代码首次运行时，用户将看到类似图 9-9 的界面。\n\n**图 9-9.** *首次使用 Game Center\
  \ 进行身份验证*\n\n在图 9-9 中，我们看到了调用 GameKit 身份验证任务的结果。系统会提示用户使用现有账户登录 Game Center、创建新账户或取消登录。如果用户多次取消，应用程序将不再显示此对话框。在取消操作发生之前用户必须取消的确切次数似乎随不同版本而改变。对于\
  \ iOS 5，大约是三次。一旦用户成功通过身份验证，应用程序就会连接到该用户账户的 Game Center。当应用程序再次运行时，对 `authenticateWithCompletionHandler:`\
  \ 的调用将执行处理代码，而不会再次打扰用户登录。用户将看到类似图 9-2 的界面。\n\n一旦 Game Center 启用，我们将开始利用其功能。下一节将介绍如何向排行榜报告分数。\n\
  \n**向排行榜提交分数**\n\nGame Center 提供的最佳功能之一是一个内置机制，用于跨设备跟踪用户的高分。它允许用户将自己的分数与朋友的分数以及全球其他玩家的分数进行比较。提交分数的代码非常直接，如清单\
  \ 9-2 所示。\n\n**清单 9-2.** *RootViewController.m (notifyGameCenter)*\n\n```\n-(void)notifyGameCenter{\n\
  \nif ([localPlayer isAuthenticated]){\n\nGKScore* score = [[GKScore alloc] initWithCategory:@\"\
  beltcommander.highscores\"]; score.value = ([beltCommanderController score];\n\n\
  [score reportScoreWithCompletionHandler:^(NSError *error){\n\nif (error){\n\n//handle\
  \ error\n\n}\n\n}];\n\n}\n\n}\n```\n\n在清单 9-2 中，我们看到了每次游戏结束时调用的任务 `notifyGameCenter`。在此任务中，我们检查\
  \ `localPlayer` 是否已验证。如果是，我们只需创建一个 `GKScore` 对象，指定我们提交分数所对应的排行榜 ID，在本例中为 “beltcommander.highscores”。一旦获得\
  \ `GKScore` 对象的引用，我们将 `score` 属性设置为上一局游戏的分数。`score` 属性可以是任何类型的数字——在此例中它是一个长整型。最后，我们调用\
  \ `reportScoreWithCompletionHandler:` 并传入一个代码块来处理任何错误。在我们的示例中，我们没有对错误进行任何处理。\n\n\
  **注意：** 如果用户离线或出现某种网络问题，GameKit 将在未来运行时自动重新提交分数，确保玩家的辛勤工作得到正确记录。\n\n图 9-10 显示了排行榜上的一个分数。\n\
  \n**图 9-10.** *包含示例分数的排行榜*\n\n在图 9-10 中，我们看到排行榜上显示了一个分数。目前只有一个分数，因为截图是在游戏开发期间拍摄的。在顶部，我们可以看到三个查看高分的选项：今日、本周或全部。\n\
  \n显示高分的组件是一个预构建的组件，称为 `GKLeaderboardViewController`，它随 GameKit 提供；调出此组件的代码如清单 9-3\
  \ 所示。\n\n**清单 9-3.** *RootViewController.m (leaderBoardClicked:)*\n\n```\n- (IBAction)leaderBoardClicked:(id)sender\
  \ {\n\nGKLeaderboardViewController* leaderBoardController =\n\n[[GKLeaderboardViewController\
  \ alloc] init];\n\nleaderBoardController.category = @\"beltcommander.highscores\"\
  ; leaderBoardController.leaderboardDelegate = self;\n\n[self presentModalViewController:leaderBoardController\
  \ animated:YES];\n\n}\n```\n\n在清单 9-3 中，我们看到了当用户点击排行榜按钮时被调用的任务 `leaderBoardClicked:`。此类被调用在\
  \ `RootViewController` 实例上，`RootViewController` 是我们示例游戏 Belt Commander 的主 `UIViewController`。我们不需要了解\
  \ `RootViewController` 的太多细节，只需要知道它是一个 `UIViewContoller` 并遵循 `GKLeaderboardViewControllerDelegate`\
  \ 协议。要显示图 9-10 所示的视图，首先创建一个 `GKLeaderboardView` 并将 `category` 属性设置为我们排行榜的 ID。然后在\
  \ `self` 上调用 `presentModalViewController:animated:`，这将显示排行榜视图。为了在用户点击“完成”时移除排行榜，将\
  \ `self` 设置为 `leaderbordDelegate`，这意味着当用户完成操作时，`GKLeaderboardViewControllerDelegate`\
  \ 协议中的任务 `leaderboardViewControllerDidFinish:` 将被调用。`leaderboadViewControllerDidFinish:`\
  \ 的实现应该如清单 9-4 所示。\n\n**清单 9-4.** *RootViewController.m (leaderboardViewControllerDidFinish:)*\n\
  \n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\n\
  \n*)viewController{\n\n[self dismissModalViewControllerAnimated:YES];\n\n}\n```\n\
  \n在清单 9-4 中，我们看到了 `leaderboardViewControllerDidFinish:` 的实现，我们只需调用 `dismissModalViewControllerAnimated:`\
  \ 来从屏幕上移除排行榜视图。\n\n如您所见，使用 GameKit 处理分数和排行榜非常简单——只需不到 10 行代码即可开始。接下来，让我们看看如何处理成就以及如何将成就授予用户。\n\
  \n**授予成就**\n\n\n\n## 成就系统\n\n成就是游戏进程中达成的小里程碑。它们旨在通过向玩家展示已取得的成果来鼓励其继续游玩。除了提供进度感外，你还可以通过设置隐藏成就让玩家感觉自己很聪明。此前，我们探讨了如何在`iTunes\
  \ Connect`中添加成就（见图 9-8）。在示例游戏《Belt Commander》中，玩家需要击毁一波波小行星。当玩家首次击毁 10 颗小行星时，我们想授予其成就——虽然这个成就很简单，但它能在游戏早期提醒用户还有其他成就可争取。图\
  \ 9-11 展示了 Game Center 应用中的成就界面。\n\n![图 9-11](img/00348.png)\n\n在图 9-11 中，我们看到 Game\
  \ Center 应用展示《Belt Commander》成就的截图。可以看到该视图中的成就已被授予。代码清单 9-5 展示了授予成就的代码。\n\n**代码清单\
  \ 9-5.** *`BeltCommanderController.m` (checkAchievements)*\n\n```\n-(void)checkAchievements{\n\
  \    if (asteroids_destroyed >= 10){\n        GKAchievement* achievement = [[GKAchievement\
  \ alloc]\n            initWithIdentifier:@\"beltcommander.10asteroids\"];\n    \
  \    achievement.percentComplete = 100.0;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
  \ *error) {\n            if (error){\n                // 报告错误\n            }\n \
  \       }];\n    }\n}\n```\n\n在代码清单 9-5 中，我们看到`BeltCommanderController`类中的`checkAchievements`方法，该方法负责处理游戏逻辑。首先，我们检查`asteroids_destroyed`是否大于等于\
  \ 10。变量`asteroids_destroyed`会在游戏中每颗小行星被摧毁时递增。如果`asteroids_destroyed`至少为 10，我们就通过将成就\
  \ ID（在`iTunes Connect`中定义）传递给`GKAchievement`的`initWithIdentifier`方法来获取`GKAchievement`对象的引用。获得引用后，只需将属性`percentComplete`设为\
  \ 100，然后调用`reportAchievementWithCompletionHandler`即可完成操作。\n\n关于成就，有几点需要注意。首先，如代码清单\
  \ 9-5 所示，成就可以部分完成。我们可以将`percentComplete`设为 30 或 50。这对于长期成就而言是重要功能。举例来说，如果我们的成就是摧毁\
  \ 10,000 颗小行星，我们就需要让用户了解目前的进度，否则他们可能永远不会去追求这个成就。\n\n关于成就的另一要点是每个成就都有分值。如图 9-11 所示，我们的成就价值\
  \ 5 分。成就分值可由开发者任意设定，但单个游戏的总成就分值限制为 1,000 分。这样用户就知道，当达到 1,000 成就分时，就已解锁该游戏的所有成就。这避免了用户需要重新学习每个游戏中成就的相对价值。用户明白\
  \ 1 分或 5 分的成就没什么大不了的，但 100 分的成就才是真正的成就。\n\n我们已经了解了 Game Center 和 GameKit，以及如何使用排行榜和成就。如前所述，GameKit\
  \ 还可用于协调多人游戏。这里我们不打算深入探讨这个话题，因为我认为这对于本书来说过于高级。但我鼓励您继续研究 GameKit 对多人游戏的支持，这应该能大大简化您的工作。接下来，让我们看看\
  \ iOS 5 新增的 Twitter 集成功能。\n\n## Twitter 集成\n\n无论喜爱与否，Twitter 确实存在。作为移动应用开发者，客户要求在其应用中集成社交媒体越来越常见。在社交媒体服务列表中，Twitter\
  \ 始终占有一席之地。Twitter 提供了一个非常出色且实用的 REST 服务，可用于代表用户发布推文。iOS 5 新增了一项功能，允许用户使用其 Twitter\
  \ 账号进行单点登录，从而使应用开发者能够轻松请求访问这个全局账号。这项功能对用户来说非常棒，因为他们只需在设备上认证一次，同时仍能控制哪些应用被允许代表他们发布推文。\n\
  \n这项功能对开发者来说也很棒。它让发布推文变得极其简单。如果你曾在嵌入式设备上使用过 OAuth 服务，就会知道 OAuth 的工作方式与原生应用之间存在一些脱节。简而言之，OAuth\
  \ 是为在浏览器内运行而设计的，而我们的应用并非基于 HTML 编写。一种解决方案是弹出`UIWebView`并通过它进行认证。这种方法可行，但很笨拙。而这种新方法要好得多。\n\
  \n这个新的 Twitter API 不仅提供了简单的认证方式，还提供了一个简单组件，用户可以在其中输入推文，如图 9-12 所示。\n\n![图 9-12](img/00106.png)\n\
  \n在图 9-12 中，我们看到 iOS 内置的推文撰写组件。顶部是输入 120 个字符的区域。右侧有一个回形针图标托着 Safari 图标，表示该推文附带了链接。用户还可以添加位置、取消或发送推文。用于填充默认值并显示此视图的代码如代码清单\
  \ 9-6 所示。\n\n**代码清单 9-6.** *`RootViewController.m` (tweetButtonClicked:)*\n\n```\n\
  - (IBAction)tweetButtonClicked:(id)sender {\n    TWTweetComposeViewController* tweetSheet\
  \ = [[TWTweetComposeViewController alloc]\n        init];\n    tweetSheet.completionHandler\
  \ = ^(TWTweetComposeViewControllerResult result) {\n        //在这里查看结果\n    };\n\
  \    [tweetSheet setInitialText:@\"看看这款 iOS 游戏《Belt Commander》！\"];\n    NSURL*\
  \ url = [NSURL URLWithString:@\"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8\"\
  ];\n    [tweetSheet addURL: url];\n    [self presentModalViewController:tweetSheet\
  \ animated:YES];\n}\n```\n\n在代码清单 9-6 中，我们看到`RootViewController`类中的`tweetButtonClicked:`方法。当用户点击推文按钮时会调用此方法。要显示\
  \ Twitter 组件，只需创建一个新的`TWTweetComposeViewController`并将其传递给`presentModalViewController`。如果我们想知道推文是否已发送，可以为`tweetSheet`的`completionHandler`属性分配一个代码块。要设置推文的初始文本，我们调用`setInitialText`并传入文本。可以通过调用`addURL:`或`addImage:`添加\
  \ URL 和图片。\n\n当然，并非所有用户都会在设备上设置 Twitter。作为开发者，你需要能够测试这一点，而测试方法就像代码清单 9-7 中的代码一样简单。\n\
  \n**代码清单 9-7.** *`RootViewController.m` (initTwitter)*\n\n```\n-(void)initTwitter{\n\
  \    [tweetButton setEnabled:[TWTweetComposeViewController canSendTweet]];\n}\n\
  ```\n\n在代码清单 9-7 中，我们看到简单的`initTwitter`方法，它在包含的`UIViewController`加载时被调用。在此方法中，我们只需调用`canSendTweet`来检查是否可以发送推文。通过使用返回值设置`tweetButton`的启用状态，我们可以防止用户在该设备未启用\
  \ Twitter 时点击按钮。\n\nTwitter 集成非常棒。它让包含此功能变得非常简单。接下来让我们看看如何在应用中集成 Facebook 功能，并与这个内置功能进行比较。\n\
  \n## Facebook 集成\n\n\n\n# 将 Facebook 集成到 iOS 应用中\n\n很难说集成 Twitter 还是集成 Facebook\
  \ 是更常见的需求。\n\n值得庆幸的是，Facebook 在提供自身集成方面已经完成了最困难的部分。与 Twitter 类似，Facebook 提供了一组可用于与其社交图谱集成的\
  \ Web 服务。但这是比较困难的方式；简单的方式是使用一个名为 **Facebook iOS SDK** 的库，该库同样由 Facebook 编写。\n\n\
  ### 开始使用 iOS 与 Facebook\n\n最好的入手点是从 GitHub 上的 `facebook-ios-sdk` 项目下载源代码。该项目可以在以下地址找到：\n\
  \nhttps://github.com/facebook/facebook-ios-sdk\n\n下载后，你会发现代码是以 Xcode 项目形式发布的，方便打开和浏览。将重要代码引入你项目的最简单方法是，只需将名为\
  \ `FBConnect` 的文件组从 Facebook 项目拖拽到你的项目中。图 9-13 显示了 `FBConnect` 项目的内容。\n\n![图 9-13](img/00079.png)\
  \  \n![图 9-13](img/00114.jpeg)\n\n**图 9–13.** *Facebook iOS Xcode 项目中的重要类*\n\n在图\
  \ 9-13 中，我们看到了来自 Facebook iOS 项目的多个文件。以 `FB` 开头的类是 Facebook 专用的，而 `JSON` 组中的类是用于处理\
  \ JSON 字符串的通用类，并且是 Facebook 类的依赖项。文件 `FBConnect.h` 是主头文件，很可能就是你想要导入的文件。`Facebook`\
  \ 类是与 Facebook 交互的主类。\n\n通常，你会创建这个类的一个单例，并通过它来执行所有与 Facebook 相关的操作。\n\n不过，在查看源代码之前，我们需要先登录我们的\
  \ Facebook 账号，并创建一个 Facebook 应用。\n\n### 创建一个 Facebook 应用\n\n可以将 Facebook 应用视为我们应用中的\
  \ Facebook 组件。Facebook 要求我们这样做，是为了确保代表用户执行的任何 Facebook 操作都有一个关联的身份。Facebook 也将该\
  \ Facebook 应用用作一个安全上下文。当用户同意让我们的应用进行发帖时，他们实际上是在授权我们新创建的 Facebook 应用能够进行发帖。\n\n![Facebook\
  \ 应用](img/00149.png)  \n![Facebook 应用](img/00320.jpeg)\n\n图 9-14 显示了我为示例游戏 *Belt\
  \ Commander* 创建的 Facebook 应用。\n\n**图 9–14.** *Facebook 应用*\n\n在图 9-14 中，我们看到了一个\
  \ Facebook 应用的设置页面。在项目 A 处，你可以看到**应用 ID**。我们在代码中创建 `Facebook` 对象并进行身份验证时，会用到这个值。在项目\
  \ B 处，你会注意到 Facebook 要求你添加 **iOS 包标识符**。我不知道它用这个信息做什么。我在编写本章代码时，填错了这个值，但一切运行正常。你的情况可能会有所不同。创建\
  \ Facebook 应用并不难，但我不想在此处详细说明，因为这个过程似乎每隔几个月就会变化。基本上，你需要将你的 Facebook 账号注册为开发者，然后添加一个新应用。具体指南可以在\
  \ https://developers.facebook.com/apps 找到。\n\n一旦你将源代码复制到你的项目中并创建好 Facebook 应用，就可以开始将\
  \ Facebook 集成到应用中去了。接下来，让我们先看一下如何验证用户身份。\n\n### Facebook 身份验证\n\n如果你在浏览器中使用 Facebook，显然是通过\
  \ Facebook 拥有的网页进行身份验证。通过这种方式，你可以信任密码信息直接发送给 Facebook，而不会被其他人截获。这在 Web 上非常有意义，因为你不想让其他网站处理你的用户凭据。老实说，作为应用开发者，我很高兴永远不必担心用户用于第三方服务的凭据。\n\
  \n然而，对于在浏览器之外开发应用来说，这种身份验证机制可能会有些麻烦，因为你需要弹出一个浏览器窗口来处理身份验证，然后将相应的身份验证信息传递回你的应用。这挺烦人的。为了让事情更简单，Facebook\
  \ 为你实现了所有这些功能，并且实现方式能够为用户启用单点登录。这意味着，如果用户已经通过另一个使用 Facebook iOS SDK 的应用与 Facebook\
  \ 进行了身份验证，他们就无需重新输入用户名和密码。不过，用户仍然需要授权给你的应用。\n\n图 9-15 展示了 Facebook 请求用户授予权限的界面。\n\
  \n**图 9–15.** *Facebook 请求用户授权应用*\n\n在图 9-15 中，我们看到了 Safari 中的一个 Facebook 页面，要求用户授权给名为\
  \ *Belt Commander* 的 Facebook 应用。这个页面是在 iOS 应用 *Belt Commander* 要求通过 Facebook 验证用户身份时弹出的。我们包含在项目中的\
  \ Facebook 代码，如果本地 Facebook 应用未安装，则会使用 Safari 来验证用户身份；否则，会使用本地应用。为了让 Facebook 能够使用本地\
  \ Facebook 应用或 Safari，我们的应用必须注册为能够打开一个包含我们 Facebook 应用 ID 的 URL。\n\n**注意：** 如果应用未配置为能打开某个\
  \ URL，那么 Facebook 将退而使用应用内的 `UIWebView` 弹出窗口进行验证。我认为最佳的用户体验是通过确保你的应用能够打开正确的 URL，来争取使用本地应用或\
  \ Safari。\n\n我们稍后会再讨论这一点。\n\n### 初始化 Facebook\n\n在进行身份验证之前，我们必须创建并初始化我们的 `Facebook`\
  \ 对象，以便执行身份验证流程。让我们看看如何在应用中初始化 Facebook，如列表 9-7 所示。\n\n**列表 9–7.** *RootViewController.m\
  \ (initFacebook)*\n\n```\n-(void)initFacebook{\n\n    facebook = [[Facebook alloc]\
  \ initWithAppId:FB_APP_ID andDelegate:self];\n    NSUserDefaults* defaults = [NSUserDefaults\
  \ standardUserDefaults];\n\n    facebook.accessToken = [defaults objectForKey:@\"\
  AccessToken\"];\n    facebook.expirationDate = [defaults objectForKey:@\"ExpirationDate\"\
  ];\n\n}\n```\n\n在列表 9-7 中，我们看到了 `initFacebook` 任务，它在父级 `UIViewController` 加载时被调用一次。在这个任务中，我们通过传入一个包含应用\
  \ ID 的 `NSString` 并将 `self` 指定为委托，来创建一个新的 `Facebook` 对象。之后，我们从标准的用户默认设置中取出两个对象：一个**访问令牌**和一个**过期日期**。如果这些对象存在，它们来自之前的身份验证会话，可以防止用户在稍后调用验证方法时需要重新验证。\n\
  \n传递给 `initWithAppId:andDelegate:` 的委托对象必须遵循 `FBSessionDelegate` 协议，该协议定义了 `fbDidLogin`、`fbDidNotLogin`\
  \ 和 `fbDidLogout` 这些任务。对于这个示例，我们只关心 `fbDidLogin`，如列表 9-8 所示。\n\n**列表 9–8.** *RootViewController.m\
  \ (fbDidLogin)*\n\n```\n- (void)fbDidLogin{\n\n    NSUserDefaults* defaults = [NSUserDefaults\
  \ standardUserDefaults];\n\n    [defaults setObject:facebook.accessToken forKey:@\"\
  AccessToken\"];\n    [defaults setObject:facebook.expirationDate forKey:@\"ExpirationDate\"\
  ];\n    [defaults synchronize];\n\n}\n```\n\n\n\n# 在清单 9–8 中，我们看到由 `FBSessionDelegate`\
  \ 定义、`RootViewController` 实现的任务 `fbDidLogin`。当用户成功通过身份验证时，会调用此任务。为了优化用户体验，我们将访问令牌和到期日期记录在标准用户默认设置中，以便在下次应用程序启动时能够检索它们，如清单\
  \ 9–7 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00116.png)\n\
  \n![](img/00131.jpeg)\n\n**234**\n\n# 第 1 章：App Cubby\n\n### 通过 Facebook 进行身份验证\n\
  \n一旦 `Facebook` 对象被创建并配置好，我们就可以进行身份验证了。在我们的示例应用程序中，我们将让用户点击欢迎屏幕上的 Facebook 按钮来进行身份验证。在其他应用程序中，也许在其它时间尝试进行身份验证更合理。只要你在使用\
  \ `Facebook` 对象执行任何其他操作之前进行身份验证，具体何时验证其实并不重要。清单 9–9 展示了身份验证代码。\n\n**清单 9–9.** *RootViewController.m\
  \ (facebookButtonClicked:)*\n\n```\n- (IBAction)facebookButtonClicked:(id)sender\
  \ {\n\nNSMutableArray* permissions = [NSMutableArray new];\n\n[permissions addObject:\
  \ @\"publish_stream\"];\n\n[permissions addObject:@\"publish_checkins\"];\n\n[permissions\
  \ addObject:@\"user_about_me\"];\n\n[facebook authorize:permissions];\n\n}\n```\n\
  \n在清单 9–9 中，我们看到了点击 Facebook 按钮时调用的代码。在此任务中，我们创建了一个 `NSMutableArray`，其中包含我们请求的每个\
  \ Facebook 权限的 `NSString` 实例。在本例中，我们希望能够发布到信息流、发布签到信息以及获取用户的一些基本信息。这些基本上是该应用程序的示例权限——我们真正需要的只是\
  \ `publish_stream`。权限数组被简单地传递给 `authorize`，后者随后会调出任何适当的授权机制，无论是原生 Facebook、Safari，还是弹出窗口中的\
  \ `UIWebView`。\n\n如前所述，为了支持原生 Facebook 身份验证或 Safari 身份验证，应用程序必须配置为打开一个 URL，该 URL\
  \ 将 Facebook 应用程序名称作为 URL 的协议部分。图 9–16 显示了此配置的第一步。\n\n**图 9–16.** *设置 `URL types`\
  \ 以响应具有给定协议的 URL*\n\n在图 9–16 中，我们看到了 Xcode 中信息面板的一部分。我们添加了一个类型为数组的新行，名为 `URL types`。在该数组的第一项中，我们添加了一个字典，其中包含另一个名为\
  \ `URL Schemes` 的数组。`URL Schemes` 中的第一项值为 `fb[your_fb_app_id]`，如图所示，其应用 ID 对应 Facebook\
  \ 应用程序 Belt Commander。配置应用程序以正确使用 Facebook 进行身份验证的下一步是让应用程序委托响应 `application:handleOpenURL:`，如清单\
  \ 9–10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00232.png)\n\
  \n**第 1 章：App Cubby**\n\n**235**\n\n**清单 9–10.** *AppDelegate.m (application:handleOpenURL:)*\n\
  \n```\n-(BOOL)application:(UIApplication *)application handleOpenURL:(NSURL *)url{\n\
  \nUIWindow* window = [application.windows objectAtIndex:0];\n\nRootViewController*\
  \ rvc = (RootViewController*)[window rootViewController]; Facebook* facebook = [rvc\
  \ facebook];\n\nreturn [facebook handleOpenURL:url];\n\n}\n```\n\n在清单 9–10 中，我们看到了由\
  \ `AppDelegate` 定义的任务 `application:handleOpenURL:`。当 Safari 或原生 Facebook 应用程序试图将控制权交还给我们的应用程序时，会调用此任务。通过在我们\
  \ `Facebook` 对象上调用 `handleOpenURL` 并传入 URL，我们完成了 Facebook 身份验证设置。当这被调用时，`fbDidLogin`\
  \ 将被调用（来自清单 9–8），并且我们可以记录身份验证信息。更重要的是，我们现在可以代表我们的用户进行 Facebook API 调用。接下来我们来看看这个。\n\
  \n### Facebook API 调用\n\n既然我们已经了解了如何设置 Facebook 进行身份验证，我们想进一步探讨如何使用 Facebook 进行\
  \ API 调用。这才是我们想要在应用程序中集成 Facebook 的真正原因。Facebook 提供了许多有用的任务来配合其社交图谱 API 执行操作。我们不打算涵盖此\
  \ API 的所有细节。Facebook 的优秀文档可以在以下位置找到：\n\n[`developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/).\n\
  \n在我们的示例应用程序中，我们将在每次游戏结束时发布一条消息，报告我们的得分。实现此功能的代码如清单 9–11 所示。\n\n**清单 9–11.** *RootViewController.m\
  \ (notifyFacebook)*\n\n```\n-(void)notifyFacebook{\n\nif ([facebook isSessionValid]){\n\
  \nNSString* desc = [[@\"I just scored \" stringByAppendingFormat:@\"%i\",\n\n[beltCommanderController\
  \ score]] stringByAppendingString:@\" points, on Belt Commander\"]; NSString* appLink\
  \ = @\"http://itunes.apple.com/us/app/beltcommander/id460769032?ls=1&mt=8\";\n\n\
  NSMutableDictionary* params = [NSMutableDictionary dictionaryWithObjectsAndKeys:\
  \ FB_APP_ID, @\"app_id\",\n\nappLink, @\"link\",\n\n@\"Presented by ClayWare Games,\
  \ LLC\", @\"caption\", desc, @\"description\",\n\n@\"A new high score!\", @\"message\"\
  ,\n\nnil];\n\n[facebook requestWithGraphPath:@\"me/feed\" andParams:params andHttpMethod:@\"\
  POST\"\n\nandDelegate:self];\n\n}\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00287.png)\n\n![](img/00277.jpeg)\n\n**236**\n\n**第 1 章：App Cubby**\n\n\
  在清单 9–11 中，我们看到了由 `RootViewController` 定义的任务 `notifyFacebook`。此任务在每场游戏结束时被调用。我们做的第一件事是检查用户是否已经通过\
  \ Facebook 进行了身份验证。如果她已认证，那么我们将消息的所有部分组装到一个 `NSMutableDictionary` 中。将包含的唯一项是键为 `app_id`\
  \ 的 Facebook 应用程序 ID。请注意，我们还包含了一个指向我们应用程序 iTunes Store 页面的链接；这有望从我们用户的 Facebook\
  \ 好友那里带来更多的下载量。\n\n一旦消息的所有部分都组装完毕，我们只需调用 `requestWithGraphPath:andParams:andHttpMethod:andDelegate:`。通过指定\
  \ POST，我们表明我们希望将此内容发布到用户的信息流（`me/feed`），而无需用户交互。通过将委托设置为 `self`，如果此操作成功（或失败），我们将收到通知。在这个简单的示例中，我们实际上并不关心它是否成功。如果一切顺利，用户将看到类似图\
  \ 9–17 的内容。\n\n**图 9–17.** *在 Facebook 上成功发布*\n\n在图 9–17 中，我们看到发布到我 Facebook 页面的帖子成功了。如我之前所说，你可以用\
  \ Facebook 做更多事情，我鼓励读者深入研究一下。\n\n正如我们所见，Facebook API 不像内置的 Twitter 支持那样易于使用。但我仍然认为，一旦你第一次完成整个过程，它就相当简单了。看看\
  \ Facebook 是否会像 Twitter 那样获得苹果 iOS 开发人员的同等待遇，这将会很有趣。\n\n## 摘要\n\n在本章中，我们探讨了 Game\
  \ Center，并介绍了它为用户提供的服务。我们通过 `GameKit` 探讨了这些功能，了解了如何将用户的分数发布到排行榜以及颁发成就。延续社交趋势，我们研究了\
  \ iOS 5 中对 Twitter 的内置支持。最后，我们探讨了如何将 Facebook 集成到 iOS 应用程序中。我们涵盖了如何处理身份验证，以及如何向用户的信息流发布简单的消息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00077.png)\n\n![](img/00173.png)\n\
  \n### 第 10 章\n\n## 通过 Apple App Store 实现货币化\n\n在 Apple App Store 中通过应用程序赚钱主要有三种方式。最明显的方式就是直接为应用程序收费。第二种是免费提供应用程序，但包含广告。另一种适用于免费和付费应用程序的方式，是在应用程序内销售物品。这被称为应用内购买，在某些类型的游戏中非常流行。\n\
  \n\n\n# 第 10 章：通过 Apple App Store 实现盈利\n\n本章将不会探讨如何打造优质的应用内购买项目，也不讨论你的应用应该免费还是收费。本章将介绍设置应用内购买的基本知识，并解释可用的不同类型购买项目。\n\
  \n## 应用内购买\n\n应用内购买是指应用内可供付费获取的虚拟物品或服务。许多不同类型的应用——不仅仅是游戏——都利用应用内购买来盈利。一些非游戏例子包括下载文章或漫画、烹饪食谱以及详细的地图数据。一些游戏内的例子包括额外关卡、新能力、额外游戏币以及用于定制游戏外观的新奇物品。\n\
  \n我们将继续使用《Belt Commander》游戏中的示例代码。在图 10-1 中，你可以看到《Belt Commander》的应用内购买选项。\n\n在图\
  \ 10-1 中，我们看到一张来自《Belt Commander》游戏的截图。这里有三个按钮，每个按钮指定了游戏运行时应该出现哪种类型的角色。游戏默认带有小行星；右侧的两个按钮用于购买游戏中额外的角色类型。中间的按钮是飞碟，它已被购买但不会包含在下一局游戏中（未激活）。最右边的按钮表示用户可以选择购买在游戏中加入增强道具角色的能力。用户通过点击该按钮并完成购买对话框流程来发起购买。\n\
  \nL. Jordan, *Beginning iOS 5 Games Development* © Lucas Jordan 2011 [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**图 10-1.** *《Belt Commander》中的应用内购买*\n\n在实现这些功能之前，我们将先了解可用的不同类型的应用内购买，以及如何在我们应用中启用应用内购买。\n\
  \n## 购买类型概述\n\n共有四种不同类型的应用内购买，每种都支持不同的业务需求。如果这四种应用内购买类型不适合你的业务需求，你将不得不自行开发。编写自己的应用内购买服务可能会非常耗时。我建议看看能否调整你的业务需求以适应苹果的模型。这样做的好处不仅在于缩短开发时间，而且对用户也有利。当你使用苹果系统时，你的用户将看到一个熟悉的界面，并使用一组熟悉的凭据登录：他们的\
  \ Apple ID。四种应用内购买类型如下：\n\n- 非消耗型\n- 消耗型\n- 订阅\n- 自动续期订阅\n\n让我们仔细看看这四种应用内购买类型中的每一种。\n\
  \n### 非消耗型\n\n非消耗型应用内购买是指一次性购买、并授予对某个物品或服务的持久访问权限的项目。非消耗型物品可被用户重新下载，并且应可在用户的所有设备上使用。非消耗型购买可以包括额外的游戏关卡、新型敌人或用于定制用户游戏角色的搞笑帽子。\n\
  \n### 消耗型\n\n消耗型应用内购买旨在支持会被消耗的物品或服务。在游戏中，这可能包括额外的生命值、用于购买游戏内物品的点数或其他可被用完的东西。消耗型购买被设计为可重复进行。\n\
  \n消耗型购买无法再次下载，因此其性质决定了它们无法在用户的设备间通用，除非你实现自己的服务器来跨账户共享此信息。\n\n### 订阅\n\n订阅是有时间限制的购买。在给定时间后，用户将不再能访问该购买项目。这些类型的购买可能包括对文章、位置信息或其他一些有价值数据集的访问权限。订阅购买无法重新下载，如果在设备恢复后（备份失败时）或用户在另一台拥有的\
  \ iOS 设备上，必须重新购买才能获得相同的服务。\n\n### 自动续期订阅\n\n自动续期订阅是对在特定期限内可使用的物品或服务的购买，与常规订阅非常相似。区别在于自动续期订阅是可重新下载的。它们代表对一项与用户（而非设备）关联的服务的访问权限。用户可以在他们拥有的任何\
  \ iOS 设备上访问此购买项目。\n\n现在，让我们看看让应用准备支持应用内购买需要什么条件。\n\n## 准备应用内购买\n\n与 Game Center\
  \ 非常相似，必须在 iTunes Connect 中启用应用内购买功能的应用才能包含内购项目。要求完全相同：你必须使用不带通配符的 App ID。在第 9 章中，我们介绍了在配置中心创建可与\
  \ Game Center 配合使用的 App ID 的流程。你可以按照说明创建第二个 App ID，或者直接为同一个游戏添加应用内购买功能。\n\n## 启用与创建应用内购买\n\
  \n一旦你在 iTunes Connect 中拥有一个应用，启用应用内购买可通过点击“管理应用内购买”按钮来完成，如图 10-2 所示。\n\n**图 10-2.**\
  \ *在 iTunes Connect 中启用应用内购买*\n\n在图 10-2 中，我们看到 iTunes Connect 中用于配置应用的视图。项目 A 显示了用于启用应用内购买的按钮。点击此按钮后，你将能够向应用添加可供用户购买的项目。图\
  \ 10-3 展示了我为《Belt Commander》准备的项目。\n\n**图 10-3.** *《Belt Commander》可用的应用内购买*\n\n\
  在图 10-3 中，我们看到了 iTunes Connect 中列出应用内购买项目的界面。我们可以看到我们添加了两个项目：分别对应玩家可以添加到游戏中的每种额外角色类型。对于每个应用内购买项目，我们都能看到参考名称、产品\
  \ ID、产品类型以及产品状态。参考名称用于内部管理——用户不会看到它。产品 ID 是一个在所有 iOS 应用中唯一的名称，用于标识该购买项目。产品 ID 将是在代码中引用此购买项目的方式。\n\
  \n类型指的是我们之前讨论过的不同购买类型——在这个例子中是非消耗型。状态值指示了该应用内购买项目需要满足什么条件才能被苹果接受。苹果必须审核你创建的每个应用内购买项目，就像每个应用在销售前都必须经过审核一样。在此例中，我们被告知苹果正在等待该购买项目的截图，之后才会进行审核。这些截图不会展示给用户——它们只是向苹果提供关于该应用内购买项目的背景信息。在图\
  \ 10-4 中，我们看到了 iTunes Connect 中用于创建新应用内购买项目的界面。\n\n**图 10-4.** *一个新的应用内购买项目*\n\n\
  图 10-4 中的项目 A 处是我们输入应用内购买项目参考名称的地方。项目 B 处显示了该应用内购买项目的产品 ID。为了创建应用内购买项目，你必须通过点击“添加语言”按钮（项目\
  \ C）为该应用内购买项目提供本地化字符串。\n\n\n\n# 通过 Apple App Store 实现盈利\n\n## 定价与上架\n\n在图 10-4 的*定价与上架*部分，你必须将项目\
  \ D 处的商品设置为“已上架销售”，才能测试购买。同时，你还必须在项目 E 处指定一个*价格等级*。这些价格等级与应用程序的价格等级相同，只是没有免费等级。\n\
  \n一旦你为应用程序定义了应用内购买项目，就必须配置一个测试用户，以便测试购买过程。强烈建议你在提交应用之前先对应用内购买功能进行测试。\n\n## 创建测试用户\n\
  \n定义好应用内购买项目后，你需要创建一个测试用户，让其在应用中“购买”这些商品。这样你就有机会按照真实用户将会经历的工作流程，测试启用或禁用每项已购买功能。图\
  \ 10-5 展示了在 `iTunes Connect` 中开始添加测试用户的入口位置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 10-5：创建测试用户](img/00150.png)\n\n在图 10-5 中，我们可以看到从*选择用户类型*视图中创建*测试用户*的选项。在 `iTunes\
  \ Connect` 中，通过点击主屏幕上的*管理用户*按钮即可进入该视图。\n\n**注意：** 我之所以强调务必使用测试用户来调试应用内购买，是因为如果使用真实用户进行调试，会让你的努力事倍功半。\n\
  \n点击图 10-5 中所示的*测试用户*按钮后，系统会提示你创建一个新用户。这没有什么特别之处——只需注意，不要使用当前作为 `Apple ID` 的电子邮件地址即可。\n\
  \n我们已经了解了如何在 `iTunes Connect` 中为应用添加应用内购买项目，以及如何确保拥有测试用户来调试应用。接下来，我们将探讨应用内购买是如何集成到\
  \ `Belt Commander` 中的，从而了解所涉及的类以及如何使用它们。\n\n## 应用内购买的类与代码\n\n在 `iTunes Connect`\
  \ 中创建应用内购买项目只是让应用真正支持应用内购买的第一步。下一步是了解应用内购买的实际购买流程以及涉及哪些类。包含相关类的框架名为 `StoreKit`，它作为\
  \ `iOS SDK` 安装包的一部分提供。我们将使用这些类来实现图 10-6 所示的工作流程，该图展示了确定哪些产品可用以及如何处理购买请求的过程。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 10-6：购买流程](img/00013.png)\n\
  \n从图 10-6 的左上角开始，我们首先获取一组想要呈现给用户的*产品标识符*。这个列表可能来自外部 Web 服务，也可能只是应用中硬编码的一组字符串。如何获取这个列表取决于你如何管理应用中的销售商品。如果你经常添加新产品，你可能希望从\
  \ Web 服务拉取产品列表。如果你刚开始接触应用内购买，使用固定列表可能适合你，但你需要更新应用才能修改列表。\n\n获取可能的*产品标识符*列表后，向 `iTunes\
  \ Store` 发送请求，询问我们传递的哪些标识符是有效的并且可以销售。`iTunes Store` 返回的标识符代表我们想要提供给用户的商品。`iTunes\
  \ Store` 不会返回未知或尚不可用于销售的*产品标识符*。这确保了我们只呈现经过 Apple 审核流程的有效商品。除了告知我们标识符是否有效外，`iTunes\
  \ Store` 还会返回本地化的\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![附加图片](img/00372.png)\n\
  \n\n\n# 第 10 章：通过苹果应用商店实现盈利\n\n**245**\n\n与购买关联的字符串，以便我们向用户展示与 iTunes Connect 中输入的完全匹配的本地化文本。\n\
  \n继续图 10-6 所示的工作流程，用户会在某个时刻点击按钮购买项目。当此操作发生时，我们只需创建一个支付请求并提交，随后用户将看到一系列确认购买的对话框。如果一切顺利，我们将收到一个回调，告知购买成功。此时，我们需要记录购买已完成。我们可以通过将产品\
  \ ID 存入标准的`NSUserDefaults`来实现，或者采用更复杂的方式（如保存到网络服务）。用户为确认购买而需要依次操作的对话框如图 10-7 所示。\n\
  \n**图 10-7.** *进行购买*\n\n图中左上角的对话框将始终显示，右下角的对话框也是如此。如果用户需要使用其 Apple ID 登录，则会在第一个和最后一个对话框之间显示另外两个对话框。作为开发者，务必记住我们无法控制具体显示哪些对话框，也无法控制用户完成流程所需的时间。切记不要期望用户在游戏进程进行中完成此流程。\n\
  \n现在让我们来看一个具体示例：为我们的游戏《腰带指挥官》实现非消耗性应用内购买。我们将实现图 10-1 中的视图，用户可以在其中选择游戏中涉及的角色，并购买新的可用角色。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00288.png)\n\n**246**\n\
  \n## 应用内购买实现\n\n正如我们讨论过的，进行购买的过程实际上只是向 iTunes 商店发起两次调用。在本节中，我们将看到这确实只涉及少数几个类。在我们的示例中，大部分处理\
  \ StoreKit 和 UI 的细节都将在一个名为`ExtrasController`的类中完成，其头文件如代码清单 10-1 所示。\n\n**代码清单 10-1.**\
  \ *ExtrasController.h*\n\n```objectivec\n@interface ExtrasController : UIViewController<SKPaymentTransactionObserver,\
  \ SKProductsRequestDelegate>{\n    GameParameters* gameParams;\n}\n\n@property (strong,\
  \ nonatomic) IBOutlet UIButton *asteroidButton;\n@property (strong, nonatomic) IBOutlet\
  \ UIButton *saucerButton;\n@property (strong, nonatomic) IBOutlet UIButton *powerupButton;\n\
  \n-(void)setGameParams:(GameParameters*)params;\n\n@end\n```\n\n在代码清单 10-1 中，我们看到了`ExtrasController`类的头文件。`ExtrasController`类扮演两个角色：它管理购买流程，并相应地更新三个按钮。`gameParams`对象负责存储哪些角色已在游戏中启用以及哪些购买已完成。为了与\
  \ StoreKit 交互，`ExtrasController`遵循`SKPaymentTransactionObserver`和`SKProductsRequestDelegate`协议。这些协议提供了应用响应商店交互所需的一切。我们将在代码实现过程中看到`ExtrasController`如何实现这两个协议中的任务。\n\
  \n使用 StoreKit 的第一步是设置一个响应购买状态变化的对象。我们通过向默认的`SKPaymentQueue`添加观察者来创建这样一个对象，如代码清单\
  \ 10-2 所示。\n\n**代码清单 10-2.** *ExtrasController.m (viewDidLoad)*\n\n```objectivec\n\
  #define PURCHASE_INGAME_SAUCERS @\"com.beltcommander.ingame.saucers\"\n#define PURCHASE_INGAME_POWERUPS\
  \ @\"com.beltcommander.ingame.powerups\"\n\n//….\n\n- (void)viewDidLoad\n{\n   \
  \ [super viewDidLoad];\n\n    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\
  \n    //获取产品 ID 集合\n    NSSet* potentialProcucts = [NSSet setWithObjects:PURCHASE_INGAME_POWERUPS,\
  \ PURCHASE_INGAME_SAUCERS, nil];\n```\n\n\n\n```objc\nSKProductsRequest* request\
  \ = [[SKProductsRequest alloc]\n    initWithProductIdentifiers:potentialProcucts];\n\
  [request setDelegate:self];\n[request start];\n[self setGameParams: [GameParameters\
  \ readFromDefaults]];\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00200.png)\n\n## 第 10 章：通过苹果 App Store 盈利\n\n**247**\n\n在`Listing 10–2`中，我们看到了类`ExtrasController`的任务`viewDidLoad`。在该任务中，我们首先通过调用`defaultQueue`获取默认的`SKPaymentQueue`，并将`self`添加为观察者。由于`self`遵循`SKPaymentTransactionObserver`协议，我们的`ExtrasController`将获知所有购买状态的变化。一旦注册了观察者，我们便创建一个已知产品\
  \ ID 的集合。在本例中，`NSSet`类型的`potentialProducts`由两个常量`PURCHASE_INGAME_POWERUPS`和`PURCHASE_INGAME_SAUCERS`创建。如我们所见，这些常量与我们在`iTunes\
  \ Connect`中创建产品时指定的字符串相同。\n\n指定了潜在产品集合后，我们创建一个`SKProductsRequest`，将`self`设为代理，并调用其`start`方法。当`StoreKit`正在确定哪些产品\
  \ ID 有效时，我们调用`setGameParams`并指定应使用存储在默认`NSUserDefaults`中的`GameParameters`对象。当`StoreKit`获取结果后，将调用`Listing\
  \ 10–3`中所示的任务`productsRequest:didReceiveResponse:`。\n\n**Listing 10–3.** *ExtrasController.m\
  \ (productsRequest:didRecieveResponse:)*\n\n```objc\n- (void)productsRequest:(SKProductsRequest\
  \ *)request\n    didReceiveResponse:(SKProductsResponse *)response {\n    for (SKProduct*\
  \ aProduct in response.products){\n        if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_SAUCERS]){\n\
  \            [saucerButton setEnabled:YES];\n            [saucerButton setHidden:NO];\n\
  \        }\n        if ([aProduct.productIdentifier isEqualToString:PURCHASE_INGAME_POWERUPS]){\n\
  \            [powerupButton setEnabled:YES];\n            [powerupButton setHidden:NO];\n\
  \        }\n    }\n}\n```\n\n在`Listing 10–3`中，我们看到了当获取到有效的产品 ID 集合时会调用的任务`productsRequest:didReceiveResponse:`。在此任务中，我们简单地遍历所有返回的产品，并使购买飞碟和道具的按钮可见。通过这种方式，我们确保用户只看到可行的购买选项。\n\
  \n我们已经了解了如何确定哪些购买是有效的。在查看实际如何进行购买之前，我们先看看`GameParameters`类。`GameParameters`类负责存储哪些产品已被购买以及用户希望在游戏中启用哪些角色。\n\
  \n## 从已有购买中驱动 UI\n\n图 10-1 所示的三个按钮允许用户在游戏中选择可用的角色。相同的 UI 还允许用户购买新角色。为了跟踪这些信息，我们创建了模型类`GameParameters`，其头文件如`Listing\
  \ 10–4`所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00188.png)\n\
  \n**248**\n\n## 第 10 章：通过苹果 App Store 盈利\n\n**Listing 10–4.** *GameParameters.h*\n\
  \n```objc\n@interface GameParameters : NSObject<NSCoding>\n\n@property (nonatomic)\
  \ BOOL includeAsteroids;\n@property (nonatomic) BOOL includeSaucers;\n@property\
  \ (nonatomic) BOOL includePowerups;\n@property (nonatomic, retain) NSMutableSet*\
  \ purchases;\n\n+(id)gameParameters;\n+(id)readFromDefaults;\n-(void)writeToDefaults;\n\
  \n@end\n```\n\n在`Listing 10–4`中，我们看到了`GameParameters`类的头文件。我们有三个`BOOL`属性来跟踪用户在游戏中希望包含哪些角色。我们还有一个`NSMutableSet`类型的`purchases`，用于存储产品\
  \ ID 字符串的集合。构造函数`gameParameters`将创建一个新的`GameParameters`对象，不包含任何购买，并且仅将`includeAsteroids`设置为`YES`（实现未显示）。类方法`readFromDefaults`用于从默认的`NSUserDefaults`中提取`GameParameters`对象，而`writeToDefaults`则用于将`GameParameters`序列化回默认的`NSUserDefaults`。`Listing\
  \ 10–5`同时展示了`readFromDefaults`和`writeToDefaults`方法。\n\n\n\n### 排版后的内容\n\n**清单 10–5.**\
  \ *GameParameters.m (readFromDefaults 和 writeToDefaults)*\n\n```\n+(id)readFromDefaults{\n\
  \    NSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n    NSData*\
  \ data = [defaults objectForKey:GAME_PARAM_KEY];\n    if (data == nil){\n      \
  \  GameParameters* params = [GameParameters gameParameters];\n        [params writeToDefaults];\n\
  \        return params;\n    } else{\n        return [NSKeyedUnarchiver unarchiveObjectWithData:\
  \ data];\n    }\n}\n\n-(void)writeToDefaults{\n    NSData* data = [NSKeyedArchiver\
  \ archivedDataWithRootObject:self];\n    NSUserDefaults* defaults = [NSUserDefaults\
  \ standardUserDefaults];\n    [defaults setObject:data forKey:GAME_PARAM_KEY];\n\
  \    [defaults synchronize];\n}\n```\n\n在`Listing 10–5`中，我们看到任务`readFromDefaults`和`writeToDefaults`。这两个任务是互逆的：`readFromDefaults`将为存储在用户默认设置中的键`GAME_PARAM_KEY`返回一个`GameParameter`。任务`writeToDefaults`为键`GAME_PARAM_KEY`将一个`GameParameter`写入用户默认设置。这两个任务的关键在于，我们通过记录属性`purchases`中的键，在用户默认设置中存储一个`GameParameter`，以记住用户的购买记录。类`GameParameters`可以存储在`NSUserDefaults`中，因为它实现了来自协议`NSCoder`的任务。有关该过程的描述，请参见第\
  \ 2 章。\n\n让我们来看看如何使用这个类来驱动用户界面，并设置图 10–1 中三个不同按钮的状态。这在任务`setGameParameters:`中处理，如`Listing\
  \ 10–6`所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00479.png)\n\
  \n**第 10 章：通过苹果应用商店盈利**\n\n**249**\n\n**清单 10–6.** *GameParameters.m (setGameParameters:)*\n\
