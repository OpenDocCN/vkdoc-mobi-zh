  \ actors`用于存储游戏中所有当前的演员，演员通过任务`addActor:`和`removeActor:`进行添加和移除。\n\n`NSMutableDictionary\
  \ actorViews`用于将每个演员映射到表示它的`UIImageView`。类型为`Viper02`的变量`viper`是对我们飞船的引用，最后一个变量`stepNumber`用于记录我们已经执行了多少帧游戏。与大多数`UIViewController`类一样，理解其工作原理始于查看`Listing\
  \ 5–14`中所示的`viewDidLoad`任务。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00216.png)\n\n**114**\n\n**第 5 章：快速构建逐帧游戏**\n\n**Listing 5–14.** `Example02Controller.m\
  \ (viewDidLoad)`\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self\
  \ setGameAreaSize:CGSizeMake(160, 240)];\n    actors = [NSMutableArray new];\n \
  \   actorViews = [NSMutableDictionary new];\n    Actor02* background = [[Actor02\
  \ alloc] initAt:CGPointMake(80, 120) WithRadius:120\n                          \
  \           AndImage:@\"star_field_iphone\"];\n    [self addActor: background];\n\
  \    viper = [Viper02 viper:self];\n    // [viper setMoveToPoint:viper.center];\n\
  \    [self addActor:viper];\n    stepNumber = 0;\n    UITapGestureRecognizer* tapRecognizer\
  \ = [[UITapGestureRecognizer alloc]\n                                          \
  \  initWithTarget:self action:@selector(tapGesture:)];\n    [tapRecognizer setNumberOfTapsRequired:1];\n\
  \    [tapRecognizer setNumberOfTouchesRequired:1];\n    [actorView addGestureRecognizer:tapRecognizer];\n\
  \    displayLink = [CADisplayLink displayLinkWithTarget:self\n                 \
  \                           selector:@selector(updateScene)];\n    [displayLink\
  \ addToRunLoop:[NSRunLoop currentRunLoop]\n                    forMode:NSDefaultRunLoopMode];\n\
  }\n```\n\n在`Listing 5–14`中，在调用`viewDidLoad`的父类实现之后，我们设置了属性`gameAreaSize`。在第一个示例中，我们使用`UIView`的坐标空间来描述飞船的位置。在这个示例中，我们必须独立于任何`UIView`来指定游戏区域的大小。然而，请注意，尺寸`160\
  \ x 240`恰好是 iPhone 点数的四分之一。尽管我们希望将游戏的坐标系与`UIView`层次结构的坐标系分开，但事实上 iPhone 的屏幕比例是 2:3，任何我们想在该设备上运行的游戏都应该考虑这一点。\n\
  \n在指定了`gameAreaSize`之后，我们初始化了`actors`和`actorViews`。然后我们添加了第一个演员。为了在其他演员后面添加星空背景，我们可以将一个新的`Actor02`添加到场景中，并指定`star_field_iphone`图像。由于基类`Actor02`没有指定任何行为，该演员将简单地位于背景中，提供漂亮的星空。使用演员作为背景的优点是它会与其他演员一起缩放和拉伸。缺点是将它与游戏中的其他演员同等对待，并消耗一些计算时间。\n\
  \n在添加背景之后，我们创建了`Viper02`，将其赋值给变量`viper`，并将其添加到场景中。我们存储了对它的引用，以便在用户触摸屏幕时可以轻松访问它。这是一个我们知道会频繁执行的操作，所以没有必要每次都在所有演员中搜索以找到正确的那个。对于任何给定的游戏，都需要仔细考虑哪些演员需要以特殊方式引用。\n\
  \n在易用性编程、执行速度和内存使用之间必须达到平衡。不幸的是，关于应该创建哪些额外的数据结构，没有硬性规定。在首次开发游戏（或应用）时，我尽量尽可能少地进行优化，而是等到游戏更加完整时，再尝试找出应用中的热点。在开发早期进行优化可能会使功能开发复杂化；然而，在开发结束时进行优化可能会更加复杂，并且可能永远无法完成。\n\
  \n`Listing 5–14`中的两个步骤是向`actorView`添加一个`UITapGestureRecognizer`以及设置`CADisplayLink`。这些步骤的执行方式与第一个示例完全相同。\n\
  \n在查看场景如何更新之前，让我们先看看任务`addActor:`和`removeActor:`，这样我们就能完整了解演员是如何被添加和移除出场景的。`Listing\
  \ 5–15`显示了这两个任务。\n\n**Listing 5–15.** `Example02Controller.m (addActor: and removeActor:)`\n\
  \n```\n-(void)addActor:(Actor02*)actor{\n    [actors addObject:actor];\n}\n\n-(void)removeActor:(Actor02*)actor{\n\
  \    UIImageView* imageView = [actorViews objectForKey:[actor actorId]];\n    [actorViews\
  \ removeObjectForKey:actor];\n    [imageView removeFromSuperview];\n    [imageView\
  \ release];\n    [actors removeObject:actor];\n    [actor release];\n}\n```\n\n\
  在`Listing 5–15`中，任务`addActor`只是将演员添加到`NSMutableArray actors`中。如果你想跟踪添加的演员，这就是你应该做的地方。\n\
  \n任务`removeActor`找到用于在屏幕上绘制它的`UIImageView`，并将其从`UIView actorViews`中移除。还通过调用`removeFromSuperview`将`UIImageView`从场景中移除，最后将其释放。对象`actor`也会从`NSMutableArray\
  \ actors`中移除并被释放。现在我们已经了解了演员是如何被添加和移除出游戏的，让我们看看任务`updateScene`，它被周期性地调用来将我们的游戏推进一帧，如`Listing\
  \ 5–16`所示。\n\n**Listing 5–16.** `Example02Controller.m (updateScene)`\n\n```\n-(void)updateScene{\n\
  \    if (stepNumber % (60*10) == 0){\n        [self addActor:[Asteroid02 asteroid:self]];\n\
  \    }\n    for (Actor02* actor in actors){\n        [actor step:self];\n    }\n\
  \    for (Actor02* actor in actors){\n        if ([actor isKindOfClass:[Asteroid02\
  \ class]]){\n            if ([viper overlapsWith:actor]){\n                [viper\
  \ doCollision:actor In:self];\n                break;\n            }\n        }\n\
  \    }\n    for (Actor02* actor in actors){\n        [self updateActorView:actor];\n\
  \    }\n    stepNumber++;\n}\n```\n\n在`Listing 5–16`中，我们看到任务`updateScene`，这个任务是游戏的心跳，它大约每秒被调用\
  \ 60 次，是我们推进游戏的地方。我们做的第一件事是检查是否要往游戏中添加新的小行星。这通过计算`stepNumber`除以 600 的余数并判断其值是否为零来实现。实际上，这相当于每\
  \ 10 秒向场景中添加一个新的`Asteroid02`，因为游戏以大约每秒 60 帧的速度运行。\n\n在测试是否应该添加新的小行星之后，我们遍历游戏中的所有演员并调用它们的`step:`方法。这使得每个演员都有机会根据其特定行为来更新其状态。背景将不做任何事，小行星将向下移动，飞船将朝着它的`moveToPoint`移动。在更新了每个演员的位置后，我们需要测试是否发生了碰撞。这通过再次遍历所有演员，找出那些是小行星的演员，并检查碰撞状态来实现。对于这个简单的例子，遍历所有演员来寻找碰撞是可以的。然而，在更复杂的应用中，改进这个算法（即使只是简单的改进）可能很重要。改进方法可以包括将所有小行星保存在它们自己的数组中，并根据位置对它们进行排序。\n\
  \n**为每个演员更新`UIView`**\n\n\n\n我们已经测试过是否存在碰撞，现在需要确定每个角色的 `UIImageView` 的新位置。这一步骤在\
  \ `updateActorView:` 任务中完成，如代码清单 5-17 所示。\n\n**代码清单 5–17.** *Example02Controller.m\
  \ (updateActorView:)*\n\n```\n-(void)updateActorView:(Actor02*)actor{\n\nUIImageView*\
  \ imageView = [actorViews objectForKey:[actor actorId]]; if (imageView == nil){\n\
  \nUIImageView* imageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:[actor\
  \ imageName]]];\n\n[actorViews setObject:imageView forKey:[actor actorId]];\n\n\
  [imageView setFrame:CGRectMake(0, 0, 0, 0)];\n\n[actorView addSubview:imageView];\n\
  \n}\n\nfloat xFactor = actorView.frame.size.width/self.gameAreaSize.width;\n\nfloat\
  \ yFactor = actorView.frame.size.height/self.gameAreaSize.height; float x = (actor.center.x-actor.radius)*xFactor;\n\
  \nfloat y = (actor.center.y-actor.radius)*yFactor;\n\nfloat width = actor.radius*xFactor*2;\n\
  \nfloat height = actor.radius*yFactor*2;\n\nCGRect frame = CGRectMake(x, y, width,\
  \ height);\n\n[imageView setFrame:frame];\n\n}\n```\n\n在代码清单 5-17 中，我们首先查找哪个 `UIImageView`\
  \ 代表传入的角色。我们通过角色的 `actorId` 作为键，在 `NSMutableArray actorViews` 中查找 `UIImageView`\
  \ 来实现。如果找不到 `UIImageView`，说明该角色是刚刚添加的，因此需要创建它。\n\n创建 `UIImageView` 非常简单：只需根据角色的\
  \ `imageName` 创建一个 `UIImage`，然后用它创建一个新的 `UIImageView`。接着，我们再次使用角色 ID 作为键，将 `UIImageView`\
  \ 放入 `NSMutableDictionary actorViews` 中。最后，将新的 `UIImageView` 添加到 `actorView` 中。我们将新\
  \ `UIImageView` 的 frame 设置为大小为零的 frame，以防止出现重绘问题。反正其 frame 很快就会更新。\n\n**在屏幕上放置 UIImageView**\n\
  \n在创建 `UIImageView`（如果需要）之后，我们必须确定它应该绘制在屏幕上的位置。第一步是计算游戏区域大小与屏幕上 `actorView` 实际大小之间的比例关系。我们可以简单地将\
  \ `actorView` 的宽度除以游戏区域的宽度来得到 `xFactor`。对高度执行相同操作，得到 `yFactor`。一旦得到这些比例，就可以计算 `UIImageView`\
  \ 的 frame。当我们计算出构成 `UIImageView` 新 frame 的四个值后，就对其进行设置。图 5-10 展示了这些值是如何计算的。\n\n\
  在图 5-10 中，左侧我们看到游戏区域，右侧是描述 `actorView` frame 的 `CGRect`。左侧的圆形是一个需要转换为 `actorView`\
  \ 上 `CGRect` 的 `Actor02`。我们首先通过找到 `Actor02` 的左上角点来确定其 frame 的原点。通过从 `Actor02` 的中心\
  \ X 值减去其半径来找到左上角点的 X 值。通过从 `Actor02` 的中心 Y 值减去其半径来找到 Y 值。要将这些点转换到 `actorView` 的坐标空间，我们只需将左上角点的\
  \ X 值乘以 `xFactor`，Y 值乘以 `yFactor`。`xFactor` 和 `yFactor` 是 `gameAreaSize` 的宽度和高度与\
  \ `actorView` 的 frame 的宽度和高度之间的比例。为了找到 `actorView` 上 frame 的大小，我们只需将半径乘以 `xFactor`\
  \ 和 `yFactor` 来得到宽度和高度。\n\n**图 5–10.** *将游戏坐标转换为屏幕坐标*\n\n当用户触摸 `UIView actorView`\
  \ 时，我们必须反向执行此过程：将 `actorView` 上的点转换为游戏空间中的点。此转换在 `tapGesture:` 任务中完成，如代码清单 5-18\
  \ 所示。\n\n**代码清单 5–18.** *Example02Controller.h (tapGuesture:)*\n\n```\n- (void)tapGesture:(UIGestureRecognizer\
  \ *)gestureRecognizer{\n\nUITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)gestureRecognizer;\
  \ CGPoint pointOnView = [tapRecognizer locationInView:actorView];\n\nfloat xFactor\
  \ = actorView.frame.size.width/self.gameAreaSize.width; float yFactor = actorView.frame.size.height/self.gameAreaSize.height;\
  \ CGPoint pointInGame = CGPointMake(pointOnView.x/xFactor, pointOnView.y/yFactor);\n\
  \n[viper setMoveToPoint:pointInGame];\n\n}\n```\n\n在代码清单 5-18 中，我们通过调用 `tapRecognizer`\
  \ 上的 `locationInView:` 方法并传入 `actorView` 来找到用户触摸的位置，并将结果存储在 `pointOnView` 中。重新计算\
  \ `xFactor` 和 `yFactor` 值后，我们只需将 `pointOnView` 的 X 和 Y 值除以 `xFactor` 和 `yFactor`，得到\
  \ `pointInGame`。使用这个值，我们只需用 `pointInGame` 设置 `viper` 的 `moveToPoint` 属性。\n\n为了结束这个例子，让我们看一下改变\
  \ `actorView` 大小的代码，如代码清单 5-19 所示。\n\n**代码清单 5–19.** *Example02Controller.m (sliderValueChanged:)*\n\
  \n```\n- (IBAction)sliderValueChanged:(id)sender {\n\nUISlider* slider = (UISlider*)sender;\n\
  \nfloat newWidth = [slider value];\n\nfloat newHeight = gameAreaSize.height/gameAreaSize.width*newWidth;\
  \ CGRect parentFrame = [[actorView superview] frame];\n\nfloat newX = (parentFrame.size.width-newWidth)/2.0;\n\
  \nfloat newY = (parentFrame.size.height-newHeight)/2.0;\n\nCGRect newFrame = CGRectMake(newX,\
  \ newY, newWidth, newHeight);\n\n[actorView setFrame:newFrame];\n\n}\n```\n\n在代码清单\
  \ 5-19 中，当用户调整屏幕底部的滑块时，会调用 `sliderValueChanged:` 任务。滑块配置的值范围为 80 到 320，我们将这个值用作\
  \ `newWidth`。我们基于 `newWidth` 计算 `newHeight`，以保持宽高比。一旦我们为 `actorView` 获得了新的宽度和高度，我们就找到能让\
  \ `actorView` 保持居中的 X 和 Y 值。当我们计算出 `actorView` 新 frame 的所有值后，只需设置它即可。\n\n## 角色状态与动画\n\
  \n现在我们具备了一套基本的动画，是时候为角色增添一些活力了。我们将扩展前面的例子并添加两个效果。第一个是让陨石看起来像是在太空中翻滚。第二个是让飞船在移动之前旋转。这两种技术都会更新用于表示每个角色的图像以营造视觉效果。我们还将为飞船添加一些状态逻辑，以便能够跟踪飞船应该做什么：保持不动、旋转还是向目标点移动。图\
  \ 5-10 展示了这个新示例的运行效果。\n\n**图 5–11.** *为角色添加动画和状态*\n\n### 翻滚效果\n\n在图 5-11 中，我们看到飞船正在向左上方的某个点推进。场景中有四个陨石，每个都有不同的图形。当你运行示例时，你会看到它们似乎在翻滚。这种翻滚效果是通过在动画的每几帧之间更换用于表示陨石的图像来实现的。\n\
  \n这些图像用于创建动画，就像手翻书一样。图 5-12 展示了用于创建动画的图像。\n\n**图 5–12.** *构成陨石变体 B 动画的图像*\n\n\n\
  好的，作为高级文档工程师和翻译员，我已根据您提供的注意事项和示例格式，对给定的英文文本进行了翻译。\n\n\n# 排版后的内容\n\n在图 5-12 中，我们看到了\
  \ 31 张小行星图像。如果这些图像按顺序依次显示，从左上角移动到右下角，就会看起来像小行星在滚动。这个动画是一个循环，因此可以在最后一张图像之后显示第一张图像，从而创建出平滑的动画效果。为了理解我们如何实现这个动画，让我们来看一下更新类`Actor03`的头文件，如清单\
  \ 5-20 所示。\n\n**清单 5-20.** `Actor03.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@class Example03Controller;\n\nlong nextId;\n\n@interface Actor03 : NSObject {\n\
  \n}\n\n@property (nonatomic, retain) NSNumber* actorId;\n\n@property (nonatomic)\
  \ CGPoint center;\n\n@property float rotation;\n\n@property (nonatomic) float speed;\n\
  \n@property (nonatomic) float radius;\n\n@property (nonatomic, retain) NSString*\
  \ imageName;\n\n@property (nonatomic) BOOL needsImageUpdated;\n\n-(id)initAt:(CGPoint)aPoint\
  \ WithRadius:(float)aRadius AndImage:(NSString*)anImageName;\n\n-(void)step:(Example03Controller*)controller;\n\
  \n-(BOOL)overlapsWith: (Actor03*) actor;\n\n@end\n```\n\n在清单 5-20 中，我们看到了一些小的改动。我们添加了两个新属性：`rotation`和`needsImageUpdate`。`rotation`属性并不指小行星的旋转；`rotation`属性将被更新后的`Viper03`类用来指示其面向的方向。`needsImageUpdated`属性是一个指示符，表示应该为该\
  \ actor 使用新的`UIImage`。通过将这个值设置为`Yes`，我们让每一颗小行星在动画过程中请求一张新图像。让我们看看利用此属性的`Asteroid03`类中的改动——见清单\
  \ 5-21。\n\n**清单 5-21.** `Asteroid03.h`和`Asteroid03.m`（部分）\n\n```\n//From Asteroid.h\n\
  \n#define NUMBER_OF_IMAGES 31\n\n…\n\n@property (nonatomic) int imageNumber;\n\n\
  @property (nonatomic, retain) NSString* imageVariant;\n\n//From Asteroid.m\n\n-(NSString*)imageName{\n\
  \nreturn [[imageVariant stringByAppendingString:@\"_\"]\n\nstringByAppendingString:[NSString\
  \ stringWithFormat:@\"%04d\", self.imageNumber]];\n\n}\n\n-(void)step:(Example03Controller*)controller{\n\
  \nif ([controller stepNumber]%2 == 0){\n\nself.imageNumber = imageNumber+1;\n\n\
  if (self.imageNumber > NUMBER_OF_IMAGES) {\n\nself.imageNumber = 1;\n\n}\n\nself.needsImageUpdated\
  \ = YES;\n\n} else {\n\nself.needsImageUpdated = NO;\n\n}\n\nCGPoint newCenter =\
  \ self.center;\n\nnewCenter.y += self.speed;\n\nself.center = newCenter;\n\nif (newCenter.y\
  \ - self.radius > controller.gameAreaSize.height){\n\n[controller removeActor: self];\n\
  \n}\n\n}\n```\n\n在清单 5-12 中，我们为小行星类添加了两个新属性：`imageNumber`和`imageVariant`。`imageNumber`属性跟踪当前应显示的图像。与之前的例子一样，有三种类型的小行星：A、B\
  \ 和 C。`imageVariant`属性记录了应使用这三组图像序列中的哪一组。\n\n在清单 5-12 中，我们可以看到我们添加了一个名为`imageName`的新方法。这个方法覆盖了`Actor03`中定义的合成方法。通过这种方式，我们改变了返回的图像名称。我们获取`imageVariant`并追加图像编号，如果小行星属于\
  \ B 类且`imageNumber`等于 4，则会创建一个形式如“Asteroid_B_0004”的字符串。\n\n查看清单 5-12 中的`step`方法，我们看到我们在开头添加了一个新部分，用于更新应显示的图像。每隔一帧，我们将`imageNumber`的值加\
