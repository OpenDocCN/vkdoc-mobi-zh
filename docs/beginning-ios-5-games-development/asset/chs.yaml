  模拟器”。我们可以看到，应用是空的；只有灰色背景。另一件需要注意的事情是，应用顶部的状态栏是显示的。尽管在很多应用中有充分的理由包含状态栏，但许多游戏可能希望移除状态栏以创造更具沉浸感的体验。要移除状态栏，请点击项目导航器（Project
  Navigator，即 Xcode 左侧的树形结构）中的根元素。选择目标（Target），然后点击右侧的“信息”（Info）标签页。图 2-7 显示了正确的视图。


