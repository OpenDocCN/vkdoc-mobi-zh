  函数为你做了很多方便的事情——它通过查看你的 `info.plist` 文件来初始化应用，设置事件循环，并通常以正确的方式启动一切。事实上，我从未有过任何理由需要修改这个函数，因为
  iOS 提供了一个明确的位置来开始添加你的启动代码。开始添加初始化代码的最佳位置是在应用委托类（App Delegate）的实现文件中找到的 `application:didFinishLaunchingWithOptions:`
  任务。在本例中，应用委托类名为 `AppDelegate`。代码清单 2-2 显示了来自 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`
  任务的实现。


