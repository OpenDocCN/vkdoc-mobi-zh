  \n## 使用委托来通信应用程序状态\n\n在 iOS 开发中，一种常见的对象间通信模式是委托模式。委托就是任何符合另一个对象所知的某个预定义协议的对象。例如，假设我们有一个类\
  \ A，它有一个名为 delegate 的属性，该属性必须符合协议 P。如果类 B 符合协议 P，我们可以将类 B 的实例分配给 A 的 delegate 属性。委托模式与其他语言（如\
  \ Java）中的监听器模式非常相似。\n\n### 声明 CoinsControllerDelegate\n\n为了让我们的 `CoinsController`\
  \ 类与 `GameController` 类通信其状态，我们创建了一个描述这种关系的协议。代码清单 3–6 显示了文件 `CoinsController.h`\
  \ 中协议 `CoinsControllerDelegate` 的声明。\n\n**代码清单 3–6.** *CoinsControllerDelegate（来自\
  \ CoinsController.h）*\n\n`@protocol CoinsControllerDelegate <NSObject>`\n\n`-(void)gameDidStart:(CoinsController*)aCoinsController\
  \ with:(CoinsGame*)game;`\n\n`-(void)scoreIncreases:(CoinsController*)aCoinsController\
  \ with:(int)newScore;`\n\n`-(void)turnsRemainingDecreased:(CoinsController*)aCoinsController`\n\
  \n`with:(int)turnsRemaining;`\n\n`-(void)gameOver:(CoinsController*)aCoinsController\
  \ with:(CoinsGame*)game;`\n\n`@end`\n\n`[www.it-ebooks.info](http://www.it-ebooks.info/)`\n\
  \n`![](img/00426.png)`\n\n**52**\n\n**第 3 章：探索游戏应用程序生命周期**\n\n从代码清单 3–6 可以看出，协议是一个相当简单的东西。协议的名称位于\
  \ `@protocol` 之后。`<NSObject>` 指定了哪些类型的对象可以符合此协议。在 `@protocol` 和 `@end` 之间，声明了许多任务。这些是将要发送给委托对象的消息，因此委托对象需要实现这些任务中的每一个。委托字段在\
  \ `CoinsController` 的接口部分中声明，如下所示：\n\n`IBOutlet id<CoinsControllerDelegate> delegate;`\n\
  \n我们还通过以下属性声明为该字段定义了属性：\n\n`@property (nonatomic, retain) id<CoinsControllerDelegate>\
  \ delegate;`\n\n关于委托属性的声明，有两点需要注意。首先，你可以将任何对象分配为委托。因为它的类型是 `id`，如果分配的对象已知不遵循 `CoinsControllerDelegate`\
  \ 协议，你将收到编译器警告。其次要注意的是，我们将其定义为 `IBOutlet`，这使我们可以实际在 Interface Builder 中设置 `GameController`\
