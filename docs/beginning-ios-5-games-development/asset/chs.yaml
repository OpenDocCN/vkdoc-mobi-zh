  \ 10–6`中，我们看到任务`setGameParameters`。该任务负责使 UI 反映传入的`GameParameters`对象（名为`param`）的状态。对于`asteroidButton`，我们简单地根据属性`includeAsteroids`的值指示应显示哪个图像。对于`saucerButton`，我们执行类似的测试，但仅当飞船的产品\
