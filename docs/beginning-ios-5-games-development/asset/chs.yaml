  ### 添加新视图


  当你稍微尝试了 Xcode 中不同的视图设置后，就可以继续为项目添加新视图了。调整 Xcode 布局，使最右侧面板可见，如果需要，可以隐藏最左侧面板。Xcode
  界面应如图 1-6 所示。


  **图 1-6.** *包含第二个视图的故事板*


  在图 1-6 中，我们看到已向故事板添加了第二个视图。像所有优秀的苹果桌面应用一样，大部分工作都是通过拖放完成的。要添加第二个视图，我们在右下角的文本字段（项目
  A）中输入 `UIView`。这会过滤列表，然后我们可以将标记为项目 B 的图标拖到中央的工作区。点击新视图使其被选中（见项目 C），我们可以看到这与项目 D
  中选中的图标相对应。项目 E 显示了选中项的属性。


