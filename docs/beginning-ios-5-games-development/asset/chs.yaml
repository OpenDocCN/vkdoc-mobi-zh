- "# `CoinsControllerDelegate` 协议中定义任务的各个实现\n\n`GameController` 类对 `CoinsControllerDelegate`\
  \ 协议中定义的任务的实现如代码清单 3–7 所示。当 `CoinsController` 开始一个新游戏时，它会在委托对象上调用 `gameDidStart:with:`。在我们的场景中，我们需要确保剩余回合标签和得分标签反映了游戏的初始值。这些值几乎可以是任何内容，因为我们不知道是开始一个新游戏还是继续一个旧游戏。类似地，每当调用\
  \ `scoreIncreases:with:` 和 `turnsRemainingDecreased:with:` 任务时，这些标签都会更新。\n\n最后，在代码清单\
  \ 3–7 中，当游戏结束时，会调用 `gameOver:with:` 任务。在这个任务中，我们记录最高分并切换到最高分视图。由于我们允许游戏在横屏或竖屏模式下运行，游戏结束时手机可能处于横屏状态。如果是这种情况，我们需要确保界面方向正确，以便最高分视图能正确显示。一种实现方法是简单地重置\
  \ `UIWindow` 的 `rootViewController` 属性。这将导致调用 `shouldAutorotateToInterfaceOrientation:`，从而确保我们的视图以正确的方向显示。\n\
  \n## `HighscoreController`：一个简单、可复用的组件\n\n`HighscoreController` 类负责管理用于显示最高分的视图以及持久化这些最高分。`HighscoreController`\
  \ 是一个相当简单的类——该类的头文件如代码清单 3–8 所示。\n\n**代码清单 3–8.** *HighscoreController.h*\n\n```\n\
  #define KEY_HIGHSCORES @\"KEY_HIGHSCORES\"\n\n#import <UIKit/UIKit.h>\n\n#import\
  \ \"Highscores.h\"\n\n#import \"Score.h\"\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00447.png)\n\n**54**\n\n**第 3 章：探索游戏应用程序生命周期**\n\n@interface HighscoreController\
  \ : UIViewController {\n\nIBOutlet UIView* highscoresView;\n\nHighscores* highscores;\n\
  \n}\n\n-(void)saveHighscores;\n\n-(void)layoutScores:(Score*)latestScore;\n\n-(void)addScore:(Score*)newScore;\n\
  \n@end\n```\n\n如代码清单 3–8 所示，`HighscoreController` 有两个字段。第一个字段 `highscoresView` 是一个\
  \ `IBOutlet`。这是一个 `UIView`，用于在屏幕上布局实际的分数。`UIView` `highscoresView` 被认为是 `UIViewController`\
  \ 类自带的 `view` 属性的一个子视图。它不必是直接子视图——只需出现在视图层次结构中的某个位置即可。这与我们之前看到的其他 `UIViewController`\
  \ 的模式略有不同。这样做是为了让 `HighscoreController` 的实例可以同时添加到 iPhone 和 iPad 的 XIB 文件中，并且可以在其中控制视图的布局。检查\
  \ iPhone XIB 文件，你会看到最高分视图的布局直接定义在 `HighscoreController` 内部。\n\n字段 `highscores` 是\
  \ `Highscores` 类型。这是一个包含 `Score` 对象数组的简单类。在查看了 `HighscoreController` 中定义的三个任务的实现之后，我们将仔细研究\
  \ `Highscores` 和 `Score` 类。\n\n## `HighscoreController` 的实现与布局\n\n一旦应用程序为 `HighscoreController`\
  \ 配置好了视图，最重要的任务就是 `addScore:` 任务。当游戏结束时，会调用此任务，应用程序应更新最高分视图并确保最高分信息被存储。代码清单 3–9\
  \ 显示了 `addScore:` 的实现。\n\n**代码清单 3–9.** *HighscoreController.m (addScore:)*\n\n\
  ```\n-(void)addScore:(Score*)newScore{\n\n[highscores addScore:newScore];\n\n[self\
  \ saveHighscores];\n\n[self layoutScores: newScore];\n\n}\n```\n\n在代码清单 3–9 中，我们看到\
  \ `addScore:` 任务接受一个新的 `Score` 作为参数。`newScore` 对象被传递给对象 `highscores` 的 `addScore:`\
  \ 任务，在该任务中，如果它不够高而无法成为最高分，则会被丢弃，否则会被插入到 `highscores` 中存储的十个 `Score` 的数组中。我们还看到，代码清单\
  \ 3–9 中的任务调用了 `saveHighscores` 任务，然后通过调用 `layoutScores:` 来更新视图的布局。\n\n在查看保存最高分之前，我们先来看看视图是如何更新的。代码清单\
  \ 3–10 显示了 `layoutScores:` 的实现。\n\n**代码清单 3–10.** *HighscoreController.m (layoutScores:)*\n\
  \n```\n-(void)layoutScores:(Score*)latestScore{\n\nfor (UIView* subview in [highscoresView\
  \ subviews]){\n\n[subview removeFromSuperview];\n\n}\n\nCGRect hvFrame = [highscoresView\
  \ frame];\n\nfloat oneTenthHeight = hvFrame.size.height/10.0;\n\nfloat halfWidth\
  \ = hvFrame.size.width/2.0;\n\nNSDateFormatter *dateFormat = [[NSDateFormatter alloc]\
  \ init];\n\n[dateFormat setDateFormat:@\"yyyy-MM-dd\"];\n\nint index = 0;\n\nfor\
  \ (Score* score in [highscores theScores]){\n\nCGRect dateFrame = CGRectMake(0,\
  \ index*oneTenthHeight, halfWidth,\n\noneTenthHeight);\n\nUILabel* dateLabel = [[UILabel\
  \ alloc] initWithFrame:dateFrame];\n\n[dateLabel setText: [dateFormat stringFromDate:[score\
  \ date]]];\n\n[dateLabel setTextAlignment:UITextAlignmentLeft];\n\n[highscoresView\
  \ addSubview:dateLabel];\n\nCGRect scoreFrame = CGRectMake(halfWidth, index*oneTenthHeight,\
  \ halfWidth, oneTenthHeight);\n\nUILabel* scoreLabel = [[UILabel alloc] initWithFrame:scoreFrame];\n\
  \n[scoreLabel setText:[NSString stringWithFormat:@\"%d\", [score score]]];\n\n[scoreLabel\
  \ setTextAlignment:UITextAlignmentRight];\n\n[highscoresView addSubview:scoreLabel];\n\
  \nif (latestScore != nil && latestScore == score){\n\n[dateLabel setTextColor:[UIColor\
  \ blueColor]];\n\n[scoreLabel setTextColor:[UIColor blueColor]];\n\n} else {\n\n\
  [dateLabel setTextColor:[UIColor blackColor]];\n\n[scoreLabel setTextColor:[UIColor\
  \ blackColor]];\n\n}\n\nindex++;\n\n}\n\n}\n```\n\n来自代码清单 3–10 的任务 `layoutScores:`\
  \ 接受一个 `Score` 对象作为参数。这个 `Score` 对象代表玩家最近获得的分数。这使得 `HighscoreController` 能够将最新的分数标记为蓝色；其他分数将用黑色绘制。`layoutScores:`\
  \ 中的第一个循环简单地删除了 `UIView` `highscoreView` 中的所有子视图。接下来的三行检查 `highscoreView` 的大小，并预先计算一些稍后会用到的尺寸值。\n\
  \n`layoutScores:` 中的第二个循环遍历 `highscores` 对象中包含的所有 `Score` 对象。为每个 `Score` 创建两个 `UILabel`。第一个\
  \ `UILabel` 称为 `dateLabel`，使用 `CGRect` `dateFrame` 创建，该 `CGRect` 定义了 `UILabel` 应绘制的区域。基本上，`dateFrame`\
  \ 指定了 `highscoreView` 上一行的左半部分。`dateLabel` 的文本基于 `Score` 对象的 `date` 属性设置。类似地，这个过程对\
  \ `UILabel` `scoreLabel` 重复；但它将显示用户获得的分数，并放置在右侧。\n\n最后，我们检查正在显示的分数是否是对象 `latestScore`。如果是，我们将\
  \ `UILabel` 的颜色调整为蓝色。\n\n如果我们回顾一下代码清单 3–9，我们会看到在通过调用 `saveHighscores` 任务更新视图之前，最高分已经被保存，如代码清单\
  \ 3–11 所示。\n\n**代码清单 3–11.** *HighscoreController.m (saveHighscores)*\n\n```\n-(void)saveHighscores{\n\
  \nNSUserDefaults* defaults = [NSUserDefaults standardUserDefaults];\n\nNSData* highscoresData\
  \ = [NSKeyedArchiver archivedDataWithRootObject: highscores];\n\n[defaults setObject:highscoresData\
  \ forKey: KEY_HIGHSCORES];\n\n[defaults synchronize];\n\n}\n```\n\n代码清单 3–11 中显示的\
  \ `saveHighscores` 任务负责归档 `highscores` 对象并将其写入到永久存储位置。这里的策略是将 `highscores` 对象放入该应用程序的用户偏好设置中。这样，如果用户在同步\
  \ iTunes 后删除了应用程序，最高分也会被保留下来。为了获取用户的偏好设置，我们在 `NSUserDefaults` 类上调用 `standardUserDefaults`。\n\
  \n\n\n`NSUserDefaults`类型的对象本质上是用于存储键值对的映射。键必须是`NSString`，值必须是属性列表，包括`NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`和`NSDictionary`——基本上是核心的\
  \ iOS 对象类型。我们想要存储一个`Highscores`类型的对象，但它不在这个列表中。为了实现这一点，我们必须从`highscores`对象中存储的数据创建一个`NSData`对象。\n\
  \n要将对象归档为`NSData`对象，我们使用`NSKeyedArchiver`类，并将`highscores`对象传递给`archivedDataWithRootObject:`方法。顾名思义，`archivedDataWithRootObject`用于归档一组对象图。在我们的例子中，根对象是`highscores`，我们知道它包含多个`Score`对象。所以看起来我们走对了方向。要使对象能被`NSKeyedArchiver`归档，它必须遵循`NSCoding`协议。最后一步是在`defaults`上调用`synchronize`；这可以确保我们的更改被保存。\n\
  \n## Highscores 类\n\n`Highscores`类的实例存储一个排序后的`Score`对象列表，并处理向列表添加`Score`对象的细节。让我们看看`Highscores`类的头文件，了解这一切是如何工作的，如列表\
  \ 3-12 所示。\n\n**列表 3-12** `Highscores.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  \n#import \"Score.h\"\n\n@interface Highscores : NSObject <NSCoding>{\n\nNSMutableArray*\
  \ theScores;\n\n}\n@property (nonatomic, retain) NSMutableArray* theScores;\n\n\
  -(id)initWithDefaults;\n-(void)addScore:(Score*)newScore;\n\n@end\n```\n\n列表 3-12\
  \ 展示了`Highscores`类的接口。正如我们所见，`Highscores`确实遵循了`NSCoding`协议。我们还可以看到它包含一个名为`theScores`的`NSMutableArray`，可以作为属性访问。定义了两个方法：一个用于用十个默认分数初始化`Highscore`，另一个用于添加新的`Scores`对象。列表\
  \ 3-13 展示了这个类的实现。\n\n**列表 3-13** `Highscores.m`\n\n```\n#import \"Highscores.h\"\
  \n\n@implementation Highscores\n\n@synthesize theScores;\n\n-(id)initWithDefaults{\n\
  \    self = [super init];\n    if (self != nil){\n        theScores = [NSMutableArray\
  \ new];\n        for (int i=0;i<10;i++){\n            [self addScore:[Score score:1\
  \ At:[NSDate date]]];\n        }\n    }\n    return self;\n}\n\n-(void)addScore:(Score*)newScore{\n\
  \    [theScores addObject:newScore];\n    [theScores sortUsingSelector:@selector(compare:)];\n\
  \    while ([theScores count] > 10){\n        [theScores removeObjectAtIndex:10];\n\
  \    }\n}\n\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder encodeObject:theScores\
  \ forKey:@\"theScores\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder{\n    theScores\
  \ = [[decoder decodeObjectForKey:@\"theScores\"] retain];\n    return self;\n}\n\
  \n-(void)dealloc{\n    for (Score* score in theScores){\n        [score release];\n\
  \    }\n    [theScores release];\n    [super dealloc];\n}\n\n@end\n```\n\n列表 3-13\
  \ 中展示的`Highscores`类的实现非常紧凑。\n\n`initWithDefaults`方法初始化`NSMutableArray theScore`，然后用十个新的`Score`对象填充`theScores`。`addScore:`方法将一个新的`Score`对象添加到`theScores`中，按玩家获得的分数排序，然后移除任何多余的`Scores`。这可能导致`newScore`这个`Score`实际上并不在`NSMutableArray\
  \ theScores`中。这样实现是为了让调用者不必考虑`theScore`可能不够高而不能被视为实际高分的情况。\n\n最后两个方法`encodeWithCoder:`和`initWithCoder:`来自`NSCoding`协议。这些方法描述了`Highscores`对象如何被归档和解档。\n\
  \n注意，这两个方法的参数传入的对象类型相同：`NSCoder`。\n\n\n`NSCoder`类提供了用于编码和解码值的任务。`NSCoder`与 iOS 中的许多其他类非常相似，因为它提供了用于读取和写入数据的类映射接口。在`encodeWithCoder:`任务中，我们使用`NSCoder`的`encodeObject:forKey:`任务将`theScore`对象写入编码器。我们传入一个键值`NSString`，在取消归档该类时，将在`initWithCoder:`中使用该键值读取回`theScores`。另外请注意，从`decodeObjectForKey:`任务返回的对象已被保留。这样做是为了确保返回的对象不会在某个未指定的时间被回收。\n\
  \n当使用`NSCoder`编码`NSMutableArray`时，它知道如何编码数组中的元素，但这些元素必须知道如何编码。由于`theScores`是一个填充了`Score`对象的`NSMutableArray`，我们必须告诉`Score`类如何编码和解码自身，此过程才能工作。\n\
  \n## Score 类\n\n`Score`对象表示一个日期和分数值。我们已经看到`Highscores`类如何管理`Score`对象的列表。让我们快速看一下这个简单的类。列表\
  \ 3–14 展示了`Score`类的头文件。\n\n**列表 3–14.** *Score.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Score : NSObject <NSCoding>{\n\nNSDate* date;\n\nint score;\n\n}\n\n\
  @property (nonatomic, retain) NSDate* date;\n\n@property (nonatomic) int score;\n\
  \n+(id)score:(int)aScore At:(NSDate*)aDate;\n\n@end\n```\n\n如列表 3–14 所示，它定义了两个属性：`date`和`score`。还有一个便捷构造函数，用于快速创建一个填充了这两个属性的`Score`对象。如前所述，为了使归档过程正常工作，`Score`类必须遵循`NSCoding`协议。列表\
  \ 3–15 展示了`Score`类的实现。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00305.png)\n\
  \n**第 3 章：探索游戏应用程序生命周期**\n\n**59**\n\n**列表 3–15.** *Score.m*\n\n```\n#import \"\
  Score.h\"\n\n@implementation Score\n\n@synthesize date;\n\n@synthesize score;\n\n\
  +(id)score:(int)aScore At:(NSDate*)aDate{\n\nScore* highscore = [[Score alloc] init];\n\
  \n[highscore setScore:aScore];\n\n[highscore setDate:aDate];\n\nreturn highscore;\n\
  \n}\n\n- (void)encodeWithCoder:(NSCoder *)encoder{\n\n[encoder encodeObject:date\
  \ forKey:@\"date\"];\n\n[encoder encodeInt:score forKey:@\"score\"];\n\n}\n\n- (id)initWithCoder:(NSCoder\
  \ *)decoder{\n\ndate = [[decoder decodeObjectForKey:@\"date\"] retain];\n\nscore\
  \ = [decoder decodeIntForKey:@\"score\"];\n\nreturn self;\n\n}\n\n- (NSComparisonResult)compare:(id)otherObject\
  \ {\n\nScore* otherScore = (Score*)otherObject;\n\nif (score > [otherScore score]){\n\
  \nreturn NSOrderedAscending;\n\n} else if (score < [otherScore score]){\n\nreturn\
  \ NSOrderedDescending;\n\n} else {\n\nreturn NSOrderedSame;\n\n}\n\n}\n\n@end\n\
  ```\n\n列表 3–15 向我们展示了几个要点。我们看到`score:At:`的实现只是创建一个新的`Score`对象并填充属性。`compare:`任务由`Highscores`用于对`Score`对象进行排序（参见列表\
  \ 3–13 中的`addScore`任务）。\n\n最后，我们看到了现在熟悉的用于归档和解归档的任务：`encodeWithCoder:`和`initWithCoder:`。在`Score`类的情况下，我们使用`NSCoder`的对象方法存储`NSDate\
  \ date`。对于`int score`，我们必须使用特殊任务，因为`int`不是对象。`NSCoder`为原始类型提供了特殊任务。在我们的例子中，我们使用了`decodeInt:ForKey:`和`encodeInt:ForKey:`。对于其他原始类型，如`BOOL`、`float`、`double`等，也存在类似的任务。\n\
  \n我们已经查看了我们想要归档（和解归档）的类所需的实现，但尚未查看如何从用户偏好设置中实际解归档对象。列表 3–16 展示了在`HighscoreController`类中如何完成此操作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00385.png)\n\n**60**\n\
  \n**第 3 章：探索游戏应用程序生命周期**\n\n**列表 3–16.** *HighscoreController（viewDidLoad）*\n\n\
  ```\n- (void)viewDidLoad\n\n{\n\n[super viewDidLoad];\n\n[highscores release];\n\
  \nNSData* highscoresData = [[NSUserDefaults standardUserDefaults]\n\ndataForKey:KEY_HIGHSCORES];\n\
  ```\n\n\n`if (highscoresData == nil){`\n\n```\nhighscores = [[[Highscores alloc]\
  \ initWithDefaults] retain];\n[self saveHighscores];\n} else {\nhighscores = [[NSKeyedUnarchiver\
  \ unarchiveObjectWithData: highscoresData] retain];\n}\n[self layoutScores:nil];\n\
  ```\n\n`viewDidLoad`任务（来自代码清单 3–16）在`HighscoreController`的视图加载时被调用。在此任务中，我们希望准备好`HighscoreController`以供使用。这意味着要确保`highscores`处于可用且准确的状态，并且我们希望在添加新分数之前，布置好当前的最高分数集。为了检索当前的最高分数，我们从调用`standardUserDefaults`返回的`NSUserDefaults`对象中读取一个`NSData`对象。如果`NSData`对象为`nil`（首次运行应用时会发生），则初始化一个新的`Highscores`对象并立即保存它。如果`NSData`对象不为`nil`，则通过调用`NSKeyedUnarchiver`的任务`unarchiveObjectWithData`来解档它，并保留结果。\n\
  \n在本节中，我们已经了解了对象如何被归档和解档。现在，我们将使用相同的原理来展示如何归档和解档我们的游戏状态。\n\n## 保留游戏状态\n\n随着 iOS\
  \ 设备上后台执行的出现，保留游戏或应用状态的重要性有所降低。但一个功能完善且用户友好的应用，在应用被终止时，应当能够优雅地处理状态恢复。保留状态所需的步骤与存储其他类型的数据并无本质区别。这是许多应用的一个关键特性。\n\
  \n我们首先需要理解的是，何时应尝试恢复状态或归档状态。图 3–11 是一个流程图，描述了示例应用在初始化方面的生命周期。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00018.png)\n\n![](img/00095.png)\n\n**第 3 章：探索游戏应用生命周期**\n\n**61**\n\n\
  **图 3–11.** *示例应用的初始化生命周期* 在图 3–11 中，我们看到所有应用都始于用户点击应用图标。此后会发生两种情况之一：要么应用（如果已在后台运行）会被带到前台，要么应用会从头启动。如果应用已在运行，它将在屏幕上精确显示为用户离开时的状态；我们无需编写任何代码来重建状态。在动作游戏中，您可能希望在应用被带到前台时暂停游戏；这会让用户在游戏恢复前有机会重新定位。无论是哪种情况，我们都会回到图\
  \ 3–1 所示的应用流程。\n\n如果应用尚未运行，我们照常显示加载屏幕，然后检查游戏状态是否已被归档。如果是，我们想要解档游戏状态并显示“继续”按钮。然后我们继续执行图\
  \ 3–1 所示的流程。为了支持需要解档游戏状态的情况，我们显然需要在某个时间点归档它。让我们先来看归档逻辑，然后再看解档逻辑。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00135.png)\n\n**62**\n\n**第 3 章：探索游戏应用生命周期**\n\n## 归档与解档游戏状态\n\n在示例应用中，我们将游戏状态存储在一个名为`CoinsGame`的类中。\n\
  \n我们将把这个类的一些实现细节留到下一章介绍，但既然我们知道它正在被归档和解档，我们就知道它可能遵循`NSCoding`协议。确实如此——代码清单 3–17\
  \ 展示了这两个`NSCoding`任务的实现。\n\n**代码清单 3–17.** *`CoinsGame.m`（`encodeWithCoder:` 和 `initWithCoder:`）*\n\
  \n```\n- (void)encodeWithCoder:(NSCoder *)encoder{\n    [encoder encodeObject:coins\
  \ forKey:@\"coins\"];\n    [encoder encodeInt:remaingTurns forKey:@\"remaingTurns\"\
  ];\n    [encoder encodeInt:score forKey:@\"score\"];\n}\n```\n\n\n\n`[encoder encodeInt:colCount\
  \ forKey:@\"colCount\"];`\n\n`[encoder encodeInt:rowCount forKey:@\"rowCount\"];`\n\
  \n```\n}\n\n- (id)initWithCoder:(NSCoder *)decoder{\n\ncoins = [[decoder decodeObjectForKey:@\"\
  coins\"] retain];\n\nremaingTurns = [decoder decodeIntForKey:@\"remaingTurns\"];\
  \ score = [decoder decodeIntForKey:@\"score\"];\n\ncolCount = [decoder decodeIntForKey:@\"\
  colCount\"];\n\nrowCount = [decoder decodeIntForKey:@\"rowCount\"];\n\nreturn self;\n\
  \n}\n```\n\n在**清单 3–17**中，我们看到了 `CoinsGame` 用于支持归档和解归档的任务。\n\n在每个任务中，一些属性被编码或解码——我想这并不令人惊讶。对象可以在应用生命周期的任何时间点被归档，但有一些特殊的任务会在应用关闭或终止时被调用。以下是这些任务：\n\
  \n- `(void)applicationWillTerminate:(UIApplication *)application`\n- `(void)applicationDidEnterBackground:(UIApplication\
  \ *)application`\n\n`applicationWillTerminate:` 任务在应用被终止之前被调用。其对应任务 `applicationDidEnterBackground:`\
  \ 类似，但它是在应用被发送到后台时被调用的。如果你的应用支持后台执行（新项目中的默认设置），则 `applicationWillTerminate:` 不会被调用；你必须将归档逻辑放在\
  \ `applicationDidEnterBackground:` 中。这是因为用户可以在任何时间点将应用退出到后台，因此在应用完全活跃时提前完成记账工作是有意义的。应用委托还有其他一些生命周期任务可用。当你在\
  \ Xcode 中创建新项目时，这些任务会自动添加到你的应用委托类中，并附带良好的文档说明。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00191.png)\n\n"
- "# 第 3 章：探索游戏应用生命周期\n\n**63**\n\n## 实现生命周期任务\n\n由于我们的应用支持后台执行，我们将归档逻辑放入 `applicationDidEnterBackground:`\
  \ 任务中，如**清单 3–18**所示。\n\n**清单 3–18.** *Sample_03AppDelegate.m (applicationDidEnterBackground:)*\n\
  \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application\n\n{\n\
  \nNSString* gameArchivePath = [self gameArchivePath];\n\n[NSKeyedArchiver archiveRootObject:[gameController\
  \ currentGame] toFile: gameArchivePath];\n\n}\n```\n\n为了归档我们的游戏状态，**清单 3–18** 显示我们再次使用\
  \ `NSKeyedArchiver` 类来归档 `CoinsGame` 对象，但这次我们将它归档到一个文件中。变量 `gameArchivePath` 是我们将用作归档的文件的路径。我们通过调用\
  \ `gameArchivePath` 任务来获取此路径，如**清单 3–19**所示。\n\n**清单 3–19.** *Sample_03AppDelegate.m\
  \ (gameArchivePath)*\n\n```\n-(NSString*)gameArchivePath{\n\nNSArray* paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n\nNSString* documentDirPath = [paths objectAtIndex:0];\n\
  \nreturn [documentDirPath stringByAppendingPathComponent:@\"GameArchive\"];\n\n\
  }\n```\n\n**清单 3–19**中的 `gameArchivePath` 任务显示，我们使用 `NSSearchPathForDirectoriesInDomains`\
  \ 函数，并传递 `NSDocumentDirectory`，与 `NSUserDomainMask` 进行掩码运算。末尾的 `YES` 表示我们想要将用于指示用户主目录的波浪号（`~`）扩展为完整路径。iOS\
  \ 设备上的每个应用都有一个根目录，文件可以从中读取和写入。通过获取路径数组 `NSArray` 中的第零项，我们可以访问该目录。我们只需通过向 `documentDirPath`\
  \ 的 `stringByAppendingPathComponent` 任务传递一个 `NSString` 来指定要使用的文件名。\n\n当我们需要解归档 `CoinsGame`\
  \ 对象时，显然也需要归档文件的路径。**清单 3–20** 显示了我们解归档该对象的位置。\n\n**清单 3–20.** *Sample_03AppDelegate.m(application:\
  \ didFinishLaunchingWithOptions:)*\n\n```\n- (BOOL)application:(UIApplication *)application\n\
  \ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\n{\n\nNSString*\
  \ gameArchivePath = [self gameArchivePath];\n```\n\n\n\n\n`CoinsGame* existingGame;`\n\
  \n```\n@try {\n    existingGame = [[NSKeyedUnarchiver unarchiveObjectWithFile:gameArchivePath]\
  \ retain];\n}\n@catch (NSException *exception) {\n    existingGame = nil;\n}\n```\n\
  \n`[gameController setPreviousGame:existingGame];`\n`[existingGame release];`\n\
  `[self.window makeKeyAndVisible];`\n`return YES;`\n\n在清单 3-20 中，我们查看的是应用程序完全加载并准备就绪时调用的任务。您应该还记得上一章的最后两行：它们将\
  \ UIWindow 显示在屏幕上并返回一切正常。该任务的前面部分涉及解归档游戏状态。使用`gameArcivePath`，我们在`NSKeyedUnarchiver`类上调用了`unarchiveObjectFromFile`。如果存在，这将返回我们之前归档的`CoinsGame`对象。如果是应用程序首次运行，`existingGame`将是`nil`。此外，如果发生异常，我们也将其设置为`nil`，因为我们知道调用`gameController`的`setPreviousGame:`方法可以处理`nil`值。为了完成这个循环，让我们在清单\
  \ 3-21 中看看`GameController`如何处理这个解归档的`CoinsGame`。\n\n**清单 3-21.** *`GameController.m`\
  \ (`setPreviousGame:`)**\n\n```\n-(void)setPreviousGame:(CoinsGame*)aCoinsGame{\n\
  \    previousGame = [aCoinsGame retain];\n    if (previousGame != nil && [previousGame\
  \ remaingTurns] > 0){\n        [continueButton setHidden:NO];\n    } else {\n  \
  \      [continueButton setHidden:YES];\n    }\n}\n```\n\n在清单 3-21 中，我们看到传入的`CoinsGame`被保存为本地字段`previousGame`并进行了保留。如果`previousGame`不为`nil`并且还有剩余回合，我们显示按钮`continueButton`；否则隐藏它。一旦用户看到\
  \ Welcome 视图，他们就能继续游戏，从上次中断的地方开始。\n\n## 总结\n\n在本章中，我们探讨了一个完整游戏所需的支持元素。这些元素包括建立应用程序的流程以及管理构成该流程的视图。我们研究了一种使用委托模式协调游戏行为（例如分数变化或游戏结束）与应用程序其他部分的方法。我们还研究了两种持久化数据的方法：通过用户设置或在磁盘上存储对象。这两种技术都使用了通过`NSCoding`协议公开的相同归档和解归档技术。\n\
  \n## 第 4 章 快速构建输入驱动型游戏\n\n所有游戏都由用户输入驱动，但根据游戏在用户操作之间的行为方式，游戏可以分为两种类型。一种是动作游戏，无论用户是否提供输入，屏幕上的事件都会展开。动作游戏将在第\
  \ 5 章中探讨。在本章中，我们将研究等待用户做出选择的游戏。这类游戏包括益智游戏和策略游戏。在本章中，我们将其称为 *输入驱动型游戏*。\n\n尽管输入驱动型游戏的酷炫程度肯定不如动作游戏，但市场上仍有许多成功的此类游戏。从扫雷到数独再到愤怒的小鸟，这类游戏吸引了大量用户，因此理解这类游戏是如何实现的非常重要。图\
  \ 4-1 展示了一个输入驱动型游戏的典型生命周期。\n\n**图 4-1.** *Coin Sorter——一个简单的输入驱动型游戏*\n\n在图 4-1 中，在任何初始设置之后，应用程序等待用户采取某些操作。当用户执行操作时，游戏状态会更新，并创建动画来反映用户的操作。由用户操作创建的动画可以很简单，例如高亮显示选择项，也可以很复杂，例如整个物理模拟。动画完成后，应用程序测试是否已达到游戏结束条件。如果没有，则应用程序再次等待用户输入。\n\
  \n在本章中，您将探索如何创建遵循图 4-1 所述流程的游戏。您还将了解将内容显示到屏幕以及创建动画的细节。\n\n### 探索如何将内容显示到屏幕\n\n在上一章中，我们组装了视图来创建一个完整的应用程序。我们使用\
  \ Interface Builder 创建 UI 元素，并且大多只是用一个视图替换另一个视图，从而将用户从一个视图移动到另一个视图。在本章中，我们将更深入地研究`UIView`以及如何使用它以编程方式创建动态内容。其中包括如何将组件放置在屏幕上以及如何为其设置动画。\n\
  \n#### 理解 UIView\n\n类`UIView`是 UIKit 的基础组件类。所有其他 UI 元素（例如按钮、开关和滚动视图等）都是`UIView`的子类。甚至`UIWindow`类也是`UIView`的子类，因此当我们在屏幕上操作内容时，很多工作都涉及与`UIView`类交互。\n\
  \n`UIView`类的工作方式与其他编程环境中的基础 UI 组件类非常相似。每个`UIView`定义一个屏幕区域，并拥有许多子视图，这些子视图相对于其父视图进行绘制。图\
  \ 4-2 展示了`UIView`实例的示例布局。\n\n**图 4-2.** *嵌套的 UIView 实例*\n\n在图 4-2 中，您可以在后面看到示例应用程序的根`UIWindow`。当用户看到游戏视图时，`UIWindow`有一个子视图，即与`GameController`类关联的`view`属性。当用户单击\
  \ New Game 按钮时，`GameController`将 Portrait Play 视图作为其`view`的子视图放置。Portrait Play 视图有五个子视图，在\
  \ XIB 文件中定义。其中四个子视图是`UILabel`，用于显示和跟踪用户的分数和剩余回合。第五个`UIView`是 Portrait Game Holder\
  \ 视图，它负责定义放置来自`CoinsController`的视图的区域。来自`CoinsController`的视图有多个子视图，这些子视图构成了游戏的交互部分。稍后将更详细地研究这些视图，但就目前而言，请理解这些视图以与其他视图完全相同的方式添加到场景中。\n\
  \n关于图 4-2 的另一点需要注意的是，并非所有视图都放置在其父视图的相同相对位置。例如，Portrait Play 视图放置在`GameController`视图的左上角，而\
  \ Portrait Game Holder 视图放置在其父视图 Portrait Play 的大约一半高度处。子视图的`frame`属性决定了其相对于父视图的位置。图\
  \ 4-3 更详细地展示了这一点。\n\n**图 4-3.** *UIView 的 frame*\n\n如图 4-3 所示，`UIView`的`frame`不仅描述了子视图的位置，还描述了视图的大小。通常，`frame`被认为描述了一个子视图的区域。`frame`属性是一个`CGRect`类型的结构体，由另外两个结构体`origin`和`size`组成。字段`origin`是`CGPoint`类型，以点为单位描述子视图左上角的位置。字段`size`是`CGSize`类型，描述子视图的宽度和高度（以点为单位）。\n\
  \n#### 核心图形类型定义\n\n\n\n"
- "# Core Graphics 类型与函数\n\n`Core Graphics`定义了许多类型、结构体和函数，包括之前提到的`CGRect`、`CGPoint`和`CGSize`。清单\
  \ 4-1 展示了这三个结构体的定义。\n\n**清单 4-1.** *CGGeometry.h（`CGRect`、`CGPoint`和`CGSize`）*\n\
  \n```\n/* Points. */\nstruct CGPoint {\n    CGFloat x;\n    CGFloat y;\n};\ntypedef\
  \ struct CGPoint CGPoint;\n\n/* Sizes. */\nstruct CGSize {\n    CGFloat width;\n\
  \    CGFloat height;\n};\ntypedef struct CGSize CGSize;\n\n/* Rectangles */\nstruct\
  \ CGRect {\n    CGPoint origin;\n    CGSize size;\n};\ntypedef struct CGRect CGRect;\n\
  ```\n\n清单 4-1 展示了定义了子视图相对于其父视图区域的每个核心结构体。这些结构体定义在文件`CGGeometry.h`中，该文件属于`Core Graphics`框架，是任何\
  \ iOS 项目的标准组成部分。注意，`x`、`y`、`width`和`height`值被定义为`CGFloat`。这些值的单位是点（points），而非像素（pixels）。\n\
  \n这种差异起初很微妙，但这里的关键在于，你用这些值指定的坐标和大小是分辨率无关的。关于点与像素的进一步讨论，请参见附录 A。\n\n**提示：** 诸如`CGRect`等结构体名称中的字母`CG`指的是`Core\
  \ Graphics`框架。因此，当需要精确表述时，`CGRect`被称为*Core Graphics Rect*。\n\n要创建清单 4-1 中的任何基本几何类型，`CGGeometry.h`中定义了一个内联工具函数，如清单\
  \ 4-2 所示。\n\n**清单 4-2.** *CGGeometry.h（`CGPointMake`、`CGSizeMake`和`CGRectMake`）*\n\
  \n```\n/*** Definitions of inline functions. ***/\nCG_INLINE CGPoint\nCGPointMake(CGFloat\
  \ x, CGFloat y)\n{\n    CGPoint p; p.x = x; p.y = y; return p;\n}\n\nCG_INLINE CGSize\n\
  CGSizeMake(CGFloat width, CGFloat height)\n{\n    CGSize size; size.width = width;\
  \ size.height = height; return size;\n}\n\nCG_INLINE CGRect\nCGRectMake(CGFloat\
  \ x, CGFloat y, CGFloat width, CGFloat height)\n{\n    CGRect rect;\n    rect.origin.x\
  \ = x; rect.origin.y = y;\n    rect.size.width = width; rect.size.height = height;\n\
  \    return rect;\n}\n```\n\n清单 4-2 展示了可用于创建新几何数值的工具函数。这里仅显示了定义，因为这些函数的声明很简单。类型`CGFloat`被简单地定义为`float`。可以推测，这可能会被修改以支持不同的架构。此外，`CG_INLINE`被简单地定义为`static\
  \ inline`，表示编译器可以将编译后的版本注入到调用代码中。\n\n### 使用 Core Graphics 类型\n\n`Core Graphics`定义的类型和函数相当直接。让我们看一个示例来说明它们的用法。清单\
  \ 4-3 展示了一个`UIView`被添加到另一个`UIView`的特定区域。\n\n**清单 4-3.** *添加子视图并指定 Frame 的示例*\n\n\
  ```\nUIView* parentView = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 480, 320)];\n\
  UIView* subView = [UIView new];\n\nCGRect frame = CGRectMake(200, 100, 30, 40);\n\
  [subView setFrame:frame];\n[parentView addSubview:subView];\n```\n\n在清单 4-3 中，我们以两种不同的方式创建了两个`UIView`。`UIView`类型的`parentView`以两种方式中更标准的方式创建：调用`alloc`，然后调用`initWithFrame:`并传入一个新的`CGRect`来指定其位置和大小。创建`UIView`的另一种完全有效的方法是简单地调用`new`，然后设置`frame`属性，就像我们对`subView`所做的那样。这段代码中做的最后一件事是通过调用`addSubview:`将`subView`添加到`parentView`。结果将类似于前面展示的图\
  \ 4-3。\n\n现在你已经理解了`UIView`子类的基础知识以及它们如何嵌套和放置，可以看看一些基本的动画了。这将为你提供探索我们简单游戏所需的理解。\n\
  \n### 理解动画\n\n创建事件驱动游戏有两个关键组成部分。第一个是创建动画，第二个是管理游戏状态。在 iOS 应用中有多种创建动画的方式。在前一章中，我们实现了视图间过渡的动画。在本节中，我们将回顾它是如何完成的，并展示一个类似的例子来加深你的理解。在本章末尾，你将看到第三种技术，它探索了前两个示例所使用的后备类。\n\
  \n#### UIView 的静态动画任务\n\n类`UIView`具有静态任务，旨在简化基本动画的创建。这些同样的任务可用于触发预设动画，例如用于从一个视图切换到另一个视图的过渡。图\
  \ 4-4 展示了当用户从高分视图切换到欢迎视图时发生的预设动画。\n\n**图 4-4.** *翻转动画*\n\n从图 4-4 的左上角开始，高分视图从左向右翻转，直到它变成一条细缝。动画继续进行，以平滑、视觉上吸引人的过渡方式展示欢迎视图。这只是\
  \ iOS 中许多内置动画之一。用户已经了解到，这种标准过渡表示上下文的变化。要理解这个动画是如何触发的，让我们先看看在第 3 章中执行从高分视图切换到欢迎视图的步骤。这些步骤如清单\
  \ 4-4 所示。\n\n**清单 4-4.** *GameController.m（`highscoreDoneClicked:`）*\n\n```\n- (IBAction)highscoreDoneClicked:(id)sender\
  \ {\n    [UIView beginAnimations:@\"AnimationId\" context:@\"flipTransitionToBack\"\
  ];\n    [UIView setAnimationDuration:1.0];\n    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromLeft\
  \ forView:self.view cache:YES];\n    [highscoreController.view removeFromSuperview];\n\
  \    [self.view addSubview: welcomeView];\n    [UIView commitAnimations];\n}\n```\n\
  \n清单 4-4 展示了当用户触摸高分视图中的“完成”按钮时调用的任务。该任务的第一行调用了静态任务`beginAnimations:context:`。这个任务有点像启动一个数据库事务，因为它正在创建一个动画对象，并且在调用`commitAnimations`之前对`UIView`实例发生的任何变化都是此动画的一部分。传递给`beginAnimations:context:`的第一个`NSString`是后备动画对象的标识符。第二个`NSString`与第一个类似，用于提供关于动画创建时间的额外上下文。在这个例子中，这两个字符串可以是`nil`，因为我们在定义动画之后实际上并不太关心它。在下一个例子中，我们将利用这些字符串来定义动画完成时要运行的代码。\n\
  \n在调用`beginAnimations:context:`之后，通过调用`setAnimationDuration:`定义动画的持续时间。传入的值是动画应运行的秒数。对`setAnimationTransition:forView:cache:`的调用表明我们希望使用\
  \ iOS 附带的预设动画之一。我们选择的动画是`UIViewAnimationFlipFromLeftForView`。由于这是一个过渡动画，我们指定视图`self.view`，即其内容正在发生变化的父视图。\n\
  \n\n\n动画设置完成后，下一步（如代码清单 4-4 所示）是对场景进行我们想要动画化的修改。由于此任务负责将显示视图从“高分”视图切换到“欢迎”视图，我们只需将视图\
  \ `highscoreController.view` 从其父视图（`self.view`）中移除，并将 `welcomeView` 添加到 `self.view`\
  \ 中。最后，我们提交动画，使其向用户展示。\n\n我们可以利用这些 `UIView` 的静态任务来创建其他动画，而不仅仅是 iOS 提供的那些。让我们更新从欢迎屏幕到高分屏幕的转场效果，使一个视图淡出到另一个视图，如图\
  \ 4-5 所示。\n\n**图 4-5.** *淡入淡出转场动画*\n\n在此淡入淡出转场中，欢迎视图被替换为高分视图。这是通过在一段时间内改变每个视图的不透明度来实现的。在此动画期间，两个视图都是场景的一部分。最后，我们希望移除欢迎视图，以与我们管理游戏中视图的方式保持一致。创建此转场的代码如代码清单\
  \ 4-5 所示。\n\n**代码清单 4-5.** *GameController.m (highScoresClicked:)*\n\n```\n- (IBAction)highScoresClicked:(id)sender\
  \ {\n// 将高分视图设置为完全透明，并将其添加到欢迎视图之上。\n[highscoreController.view setAlpha:0.0];\n[self.view\
  \ addSubview:highscoreController.view];\n// 设置动画\n[UIView beginAnimations:nil context:@\"\
  fadeInHighScoreView\"];\n[UIView setAnimationDuration:1.0];\n[UIView setAnimationDelegate:self];\n\
  [UIView setAnimationDidStopSelector:@selector(animationDidStop:finished:context:)];\n\
  // 进行修改\n[welcomeView setAlpha:0.0];\n[highscoreController.view setAlpha:1.0];\n\
  [UIView commitAnimations];\n}\n```\n\n当用户在首页视图中点击“高分榜”按钮时，会调用代码清单 4-5 中所示的任务。为了创建淡入淡出效果，我们利用了\
  \ `UIView` 类的静态动画任务，但首先需要设置一些内容。我们首先将与 `highscoreController` 关联的视图的 alpha 属性设置为\
  \ `0.0`，即完全透明。然后，我们将高分视图添加到根视图中。这会将其放置到已有的 `welcomeView` 之上，但由于它是透明的，我们只能看到欢迎屏幕。\n\
  \n通过调用 `beginAnimations:context:` 任务来设置动画，并使用 `setAnimationDuration:` 任务设置持续时间。下一步是为正在创建的动画设置代理。我们还希望调用\
  \ `setAnimationDidStopSelector:` 来设置动画完成时应调用的任务。动画设置完成后，我们只需将 `welcomeView` 的 alpha\
  \ 属性设置为 `0.0`，并将高分视图的 alpha 设置为 `1.0`。这表明在动画结束时，我们希望欢迎视图变为透明，而高分视图变为完全不透明。然后，我们通过调用\
  \ `commitAnimations` 来指示已完成最终状态的设置。\n\n我们将 `self` 设置为动画的代理，并设置任务 `animationDidStop:finished:context:`\
  \ 在动画结束时被调用。这样做是为了在动画结束时进行一些清理工作，并确保应用程序处于正确状态。代码清单 4-6 展示了此回调方法的实现。\n\n**代码清单 4-6.**\
  \ *GameController.m (animationDidStop:finished:context:)*\n\n```\n- (void)animationDidStop:(NSString\
  \ *)animationID finished:(NSNumber *)finished context:(void *)context{\nif ([@\"\
  fadeInHighScoreView\" isEqual:context]){\n[welcomeView removeFromSuperview];\n[welcomeView\
  \ setAlpha:1.0];\n}\n}\n```\n\n代码清单 4-6 中的任务在淡入淡出动画结束时被调用。在此任务中，我们希望从场景中移除 `welcomeView`\
  \ 并将其 alpha 属性重置为 `1.0`。我们将其移除，因为这是其他转场预期的状态。将 alpha 重置为 `1.0` 可确保当 `welcomeView`\
  \ 重新添加回场景时，它是可见的。\n\n你已经了解了如何使用 `frame` 属性将视图添加到父视图。你还通过探索淡入淡出转场，学会了如何创建影响 `UIView`\
  \ 属性的动画。我们将结合这些概念，向你展示如何对游戏中的硬币进行动画处理，但首先你需要了解我们如何设置相关类，以便一切都能说得通。\n\n## 构建游戏 Coin\
  \ Sorter\n\n到目前为止，我们已经探讨了将内容显示到屏幕上的部分细节。\n\n在前面的章节中，我们探讨了控制器类的角色以及它们如何管理数据和视图之间的关系。创建\
  \ Coin Sorter 游戏的最后一步是结合这些概念。本节将详细介绍 `CoinController` 类的生命周期，并涉及我们已探讨过的基本概念。图 4-6\
  \ 显示了由 `CoinController` 类控制的屏幕区域。\n\n在这个 5x5 的硬币网格中，用户可以选择两枚硬币交换位置。目标是创建相同硬币的行或列以形成匹配组合。当创建匹配时，屏幕上的硬币会有动画效果，并且用户的分数会增加。用户有\
  \ 10 次机会尽可能多地创建匹配。图 4-7 显示了游戏的生命周期。\n\n**图 4-6.** *CoinController 的视图*\n\n图 4-7\
  \ 展示了单次游戏的应用程序流程。设置完成后，应用程序等待用户选择一枚硬币。如果未选择第一枚硬币，应用程序仅记录该硬币被选中并返回等待用户。当用户第二次选择硬币时，应用程序会检查刚选中的硬币是否与第一次选中的相同。如果是，则取消选中该硬币。这允许用户改变主意。如果用户选择了不同的硬币，则通过修改\
  \ `CoinGame` 对象来更新游戏状态，并创建动画，展示两枚硬币交换位置。当硬币交换动画完成后，应用程序检查是否存在任何匹配。如果存在，则动画化其移除过程，并用新硬币更新\
  \ `CoinGame` 以替换刚刚移除的硬币。由于添加新硬币可能会产生额外的匹配，应用程序会再次检查匹配。\n\n这个过程理论上可能永远持续下去，但实际上并不会。最终，将没有需要移除的匹配。\n\
  \n当没有匹配时，应用程序检查用户是否还有剩余次数。如果有，则返回等待用户输入。如果没有，则游戏结束。\n\n**图 4-7.** *Coin Sorter 生命周期*\n\
  \n## 实现游戏状态\n\n图 4-7 中展示的逻辑在 `CoinsController` 类中实现。为了帮助你理解 `CoinsController` 类如何创建\
  \ Coin Sorter 游戏，我们来看一下头文件。你可以在其中了解该类的概述，如代码清单 4-7 所示。\n\n**代码清单 4-7.** *CoinsController.h*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"CoinsGame.h\"\n\n@class CoinsController;\n\
  \n@protocol CoinsControllerDelegate <NSObject>\n-(void)gameDidStart:(CoinsController*)aCoinsController\
  \ with:(CoinsGame*)game;\n-(void)scoreIncreases:(CoinsController*)aCoinsController\
  \ with:(int)newScore;\n-(void)turnsRemainingDecreased:(CoinsController*)aCoinsController\n\
  with:(int)turnsRemaining;\n```\n\n\n\n---\n-(void)gameOver:(`CoinsController*`)aCoinsController\
  \ with:(`CoinsGame*`)game;\n\n@end\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00113.png)\n\n**第 4 章：快速构建一个输入驱动的游戏**\n\n**77**\n\n```\n@interface CoinsController\
  \ : UIViewController {\n\nCoinsGame* coinsGame;\n\nUIView* coinsView;\n\nNSMutableArray*\
  \ imageSequences;\n\nBOOL isFirstCoinSelected;\n\nCoord firstSelectedCoin;\n\nCoord\
  \ secondSelectedCoin;\n\nBOOL acceptingInput;\n\nUIImageView* coinViewA;\n\nUIImageView*\
  \ coinViewB;\n\nNSMutableArray* matchingRows;\n\nNSMutableArray* matchingCols;\n\
  \nIBOutlet id<CoinsControllerDelegate> delegate;\n\n}\n\n@property (nonatomic, retain)\
  \ CoinsGame* coinsGame;\n\n@property (nonatomic, retain) id<CoinsControllerDelegate>\
  \ delegate;\n\n+(NSArray*)fillImageArray:(int)coin;\n\n-(void)loadImages;\n\n-(void)newGame;\n\
  \n-(void)continueGame:(CoinsGame*)aCoinsGame;\n\n-(void)createAndLayoutImages;\n\
  \n-(void)tapGesture:(UIGestureRecognizer *)gestureRecognizer;\n\n-(Coord)coordFromLocation:(CGPoint)\
  \ location;\n\n-(void)doSwitch:(Coord)coordA With:(Coord)coordB;\n\n-(void)checkMatches;\n\
  \n-(void)updateCoinViews;\n\n-(void)spinCoinAt:(Coord)coord;\n\n-(void)stopCoinAt:(Coord)coord;\n\
  \n-(void)doEndGame;\n\n@end\n```\n\n这个头文件定义了`CoinsController`类及其委托协议`CoinsControllerDelegate`（已在第\
  \ 3 章讨论）。`CoinsGame`字段用于存储游戏状态，该对象可归档保存游戏状态，或传给`CoinsController`实例以恢复游戏。`UIView\
  \ coinsView`是白色游戏区域。`BOOL isFirstCoinSelected`用于追踪用户是否已选择一枚硬币。两个`Coord`结构体记录当前选中的硬币。我们稍后将介绍`Coord`结构体。`BOOL\
  \ acceptingInput`在动画播放时用于阻止用户输入。\n\n`coinViewA`和`coinViewB`这两个`UIImageView`字段，以及`NSMutableArray`变量`matchingRows`和`matchingCols`，在动画过程中用于追踪动画对象。最后一个字段是该类的委托，必须实现`CoinsControllerDelegate`协议。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00235.png)\n\n**78**\n\
  \n**第 4 章：快速构建一个输入驱动的游戏**\n\n**初始化与设置**\n\n`CoinsController`对象的生命周期始于`viewDidLoad`方法被调用时。因为我们已经在\
  \ XIB 文件中包含了`CoinsController`的实例，所以该方法会被自动调用。\n\n清单 4-8 展示了这个方法的实现。\n\n**清单 4-8**\
  \ `CoinsController.m (viewDidLoad)`\n\n```\n- (void)viewDidLoad\n\n{\n\n[super viewDidLoad];\n\
  \n[self.view setBackgroundColor:[UIColor clearColor]];\n\nCGRect viewFrame = [self.view\
  \ frame];\n\n//border is 3.125%\n\nfloat border = viewFrame.size.width*.03125;\n\
  \nfloat coinsViewWidth = viewFrame.size.width-border*2;\n\nCGRect coinsFrame = CGRectMake(border,\
  \ border, coinsViewWidth, coinsViewWidth); coinsView = [[UIView alloc] initWithFrame:\
  \ coinsFrame];\n\n[coinsView setBackgroundColor:[UIColor whiteColor]];\n\n[coinsView\
  \ setClipsToBounds:YES];\n\n[self.view addSubview:coinsView];\n\nUITapGestureRecognizer*\
  \ tapRecognizer = [[UITapGestureRecognizer alloc]\n\ninitWithTarget:self action:@selector(tapGesture:)];\n\
  \n[tapRecognizer setNumberOfTapsRequired:1];\n\n[tapRecognizer setNumberOfTouchesRequired:1];\n\
  \n[coinsView addGestureRecognizer:tapRecognizer];\n\n}\n```\n\n在`viewDidLoad`方法中，我们需要处理几项小任务。首先，调用父类的`viewDidLoad`实现。这不是绝对必要，但是一种良好实践。如果将来我们想改变`CoinsController`的父类，可能会花费大量时间排查初始化问题。\n\
  \n接着，`viewDidLoad`方法需要设置一些`UIView`实例来实现我们想要的效果。参见图 4-6，可以发现白色硬币区域周围有一个半透明边框。这个半透明视图实际上就是容器视图，因此为了确保其可见，我们将该类的根视图设置为完全透明。\n\
  \n\n\n白色方形区域是`UIView`，名为`coinsView`，它是用于显示硬币的视图的父视图。我们根据父视图的`frame`计算`coinsView`的大小。在\
  \ iPhone 上，`coinsViewWidth`的值为 300 点；在 iPad 上，`coinsViewWidth`为 720 点。将`coinsView`的背景设置为白色后，我们将其`clipToBounds`属性设置为`true`。这将防止硬币在离屏动画过程中被绘制到白色区域之外。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00342.png)\n\n**第\
  \ 4 章：快速构建一个输入驱动的游戏**\n\n**79**\n\n`viewDidLoad`中的最后一个任务是向`coinsView`注册一个手势识别器。在这种情况下，我们希望知道用户何时点击`coinsView`，因此我们使用了一个名为`tapRecognizer`的`UITapGestureRecognizer`。在初始化`tapRecognizer`时，我们将`self`设置为目标，并指定任务`tapGesture:`作为当`tapRecognizer`检测到点击手势时要调用的任务。通过设置所需的点击次数和所需的手指数量，我们确保能够捕捉到用户做出的正确手势。将`tapRecognizer`添加到`coinsView`即完成了手势识别器的设置。\n\
  \n关于 iOS 中手势如何工作的更多信息，请参见第 8 章。\n\n**开始新游戏**\n\n在`viewDidLoad`被调用后，`CoinsController`将用于开始一个新游戏或继续一个旧游戏。首先，我们来看`newGame`任务，如代码清单\
  \ 4-9 所示。\n\n**代码清单 4-9.** *CoinsController.m (newGame)*\n\n```\n-(void)newGame{\n\
  \nfor (UIView* view in [coinsView subviews]){\n\n[view removeFromSuperview];\n\n\
  }\n\n[coinsGame release];\n\ncoinsGame = [[CoinsGame alloc] initRandomWithRows:5\
  \ Cols:5];\n\n[self createAndLayoutImages];\n\n[delegate gameDidStart:self with:\
  \ coinsGame];\n\nacceptingInput = YES;\n\n}\n```\n\n当在欢迎屏幕上点击“新游戏”按钮时，会调用`newGame`任务。首先要做的是从`coinsView`中移除旧的子视图（如果用户刚刚启动应用程序，可能没有任何子视图需要移除）。`coinsGame`对象在被设置为一个预填充随机硬币值的新实例之前被释放。下一步是调用`createAndLayoutImages`，它将在屏幕上放置硬币。该任务同时被`continueGame:`和`newGame`调用，所以我们将在查看`continueGame:`之后再来看它。最后要做的是通知任何委托一个新游戏已开始，并将`acceptingInput`设置为`YES`。\n\
  \n**继续游戏**\n\n如果用户在最后一次退出时游戏正在进行中，则该用户可能希望从上次中断的地方继续游戏。这是通过在欢迎视图中点击“继续”按钮来完成的。当该按钮被按下时，会调用`continueGame`任务，该任务与`newGame`非常相似。代码清单\
  \ 4-10 展示了`continueGame:`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00376.png)\n\n**80**\n\n**第 4 章：快速构建一个输入驱动的游戏**\n\n**代码清单 4-10.** *CoinsController.m\
  \ (continueGame:)*\n\n```\n-(void)continueGame:(CoinsGame*)aCoinsGame{\n\nfor (UIView*\
  \ view in [coinsView subviews]){\n\n[view removeFromSuperview];\n\n}\n\n[coinsGame\
  \ release];\n\ncoinsGame = aCoinsGame;\n\n[self createAndLayoutImages];\n\n[delegate\
  \ gameDidStart:self with: coinsGame];\n\nacceptingInput = YES;\n\n}\n```\n\n`continueGame:`任务接收一个`CoinsGame`对象作为参数，名为`aCoinsGame`。在清除`coinsView`的旧子视图后，我们将`coinsGame`设置为传入的`aCoinsGame`对象。调用`createAndLayoutImages`以将硬币添加到场景中。我们调用委托任务`gameDidStart:coinsGame:`，以便委托有机会更新跟踪当前得分和剩余回合数的`UILabel`对象。最后，我们将`acceptingInput`设置为`YES`。\n\
  \n**初始化每个硬币的 UIView**\n\n如前所述，`createAndLayoutImages`任务被`newGame`和`continueGame:`调用。该任务负责游戏的初始设置，主要是为游戏中的每个硬币创建一个`UIImageView`。该任务如代码清单\
  \ 4-11 所示。\n\n\n\n**列表 4–11.** `CoinsController.m (createAndLayoutImages)`\n\n```\n\
  -(void)createAndLayoutImages{\n\nint rowCount = [coinsGame rowCount];\n\nint colCount\
  \ = [coinsGame colCount];\n\nCGRect coinsFrame = [coinsView frame];\n\nfloat width\
  \ = coinsFrame.size.width/colCount;\n\nfloat height = coinsFrame.size.height/rowCount;\n\
  \nfor (int r=0;r<rowCount;r++){\n\nfor (int c=0;c<colCount;c++){\n\nUIImageView*\
  \ imageView = [[UIImageView alloc] init];\n\nCGRect frame = CGRectMake(c*width,\
  \ r*height, width, height);\n\n[imageView setFrame:frame];\n\n[coinsView addSubview:\
  \ imageView];\n\n[self spinCoinAt:CoordMake(r, c)];\n\n}\n\n}\n\n}\n```\n\n`列表 4–11`\
  \ 展示了游戏中将要使用的行数和列数。在本例中，两者均为五。`coinsView` 的框架存储在变量 `coinsFrame` 中以便引用，并计算了每个硬币视图的宽度和高度。两个\
  \ `for` 循环逐个创建 `imageView`，设置其框架，并将其添加到 `coinsView` 中。在嵌套循环中，调用了 `spinCoinAt:`，该方法用于创建旋转硬币的效果。注意传递给\
  \ `spinCoinAt:` 的参数是函数 `CoordMake` 的返回值。我们将在查看 `spinCoinAt:`（如 `列表 4–12` 所示）之后，再来研究这个函数和\
  \ `CoinsGame` 类。\n\n**列表 4–12.** `CoinsController.m (spinCoinAt:)`\n\n```\n-(void)spinCoinAt:(Coord)coord{\n\
  \nUIImageView* coinView = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\
  \nNSNumber* coin = [coinsGame coinForCoord:coord];\n\nNSArray* images = [imageSequences\
  \ objectAtIndex:[coin intValue]];\n\n[coinView setAnimationImages: images];\n\n\
  NSTimeInterval interval = (random()%4)/10.0+.6;\n\n[coinView setAnimationDuration:\
  \ interval];\n\n[coinView startAnimating];\n\n}\n```\n\n你可以看到 `spinCoinAt:` 接受一个类型为\
  \ `Coord` 的参数。该类型在 `CoinsGame.h` 中定义为结构体，表示特定行和列上的一个硬币。在该方法的第一个代码行中，结构体 `Coord`\
  \ 用于查找代表该特定硬币的 `UIView` 的索引。之所以可行，是因为每个硬币恰好对应一个 `UIImageView`（这是在 `列表 4–11` 中设置的）。找到正确的\
  \ `UIImageView` 后，我们从 `coinsGame` 对象中获取该硬币的值。`NSNumber coin` 代表这组特定坐标下硬币的类型——可能是三角形、正方形或圆形。\n\
  \n利用硬币的 `intValue`，我们从 `imageSequences` 中取出一个名为 `images` 的 `NSArray`。该 `NSArray\
  \ images` 存储了构成旋转硬币动画的所有图像。通过调用 `UIImageView coinView` 上的 `setAnimationImages:`，我们指定该\
  \ `UIImageView` 要循环显示 `images` 中的每个 `UIImage`，以产生动画效果。将动画时长设置为一个随机值并调用 `startAnimating`，即可创建旋转效果。在设置的这一阶段，应用程序看起来会与之前展示的\
  \ `图 4–6` 非常相似。现在，我们准备开始接受用户输入。\n\n在探讨用户输入之前，我们应更仔细地研究 `CoinsGame` 类，以理解我们是如何表示这\
  \ 25 个硬币及其类型的。\n\n**模型**\n\n你现在已经看到了设置代码，它使用 `UIViews` 和 `UIImageViews` 在屏幕上创建了代表游戏场景的界面。你知道游戏由\
  \ 25 个硬币组成，排列在五乘五的网格中。现在，我们来看看负责管理这些数据的类，因此让我们查看 `列表 4–13` 中所示的 `CoinsGame.h`。\n\
  \n**列表 4–13.** `CoinsGame.h`\n\n```\n#import <Foundation/Foundation.h>\n\n#define\
  \ COIN_TRIANGLE 0\n#define COIN_SQUARE 1\n#define COIN_CIRCLE 2\n\nstruct Coord\
  \ {\n    int row;\n    int col;\n};\ntypedef struct Coord Coord;\n\nCG_INLINE Coord\n\
  CoordMake(int r, int c)\n{\n    Coord coord;\n    coord.row = r;\n    coord.col\
  \ = c;\n    return coord;\n}\n\nCG_INLINE BOOL\nCoordEqual(Coord a, Coord b)\n{\n\
  \    return a.col == b.col && a.row == b.row;\n}\n```\n\n\n```objectivec\n@interface\
  \ CoinsGame : NSObject <NSCoding>{\n\nNSMutableArray* coins;\n\nint remainingTurns;\n\
  \nint score;\n\nint colCount;\n\nint rowCount;\n\n}\n\n@property (nonatomic, retain)\
  \ NSMutableArray* coins;\n\n@property (nonatomic) int remainingTurns;\n\n@property\
  \ (nonatomic) int score;\n\n@property (nonatomic) int colCount;\n\n@property (nonatomic)\
  \ int rowCount;\n\n-(id)initRandomWithRows:(int)rows Cols:(int)cols;\n\n-(NSNumber*)coinForCoord:(Coord)coord;\n\
  \n-(int)indexForCoord:(Coord)coord;\n\n-(void)swap:(Coord)coordA With:(Coord)coordB;\n\
  \n-(NSMutableArray*)findMatchingRows;\n\n-(NSMutableArray*)findMatchingCols;\n\n\
  -(void)randomizeRows:(NSMutableArray*)matchingRows;\n\n-(void)randomizeCols:(NSMutableArray*)matchingCols;\n\
  \n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00026.png)\n\
  \n**第 4 章：快速构建一个输入驱动的游戏** 83\n\n`代码清单 4-13`展示了类`CoinsGame`的头文件。在类的顶部，我们定义了三个常量：`COIN_TRIANGLE`、`COIN_SQUARE`和`COIN_CIRCLE`。这些值代表了游戏中的三种硬币类型。我们还定义了一个名为`Coord`的结构体，用于存储行/列值对。`Coord`结构体在之前的`代码清单\
  \ 4-12`中用于标识特定的硬币。此外，还有两个与`Coord`结构体配套的函数。第一个函数`CoordMake`用于根据对应的行和列值创建一个`Coord`。第二个函数`CoordEqual`用于判断两个`Coord`是否指向同一枚硬币。\n\
  \n在`代码清单 4-13`中，类`CoinsGame`的接口声明遵循了`NSCoding`协议，因此我们知道可以对此类的实例进行归档和解档。我们还看到定义了一个名为`coins`的`NSMutableArray`。`coins`对象用于存储代表每个坐标上硬币类型的`NSNumber`值。此外，还使用了`int`类型来跟踪剩余回合数、得分以及本游戏中使用的行数和列数。\n\
  \n类`CoinsGame`定义了各种任务，其中一些任务的含义可能已经一目了然。我们知道需要一种交换两枚硬币的方法，因此`swap:With:`任务的使用应该不难理解。还有两个任务`findMatchingRows`和`findMatchingCols`，用于判断是否存在匹配。任务`randomizeRows`和`randomizeCols`则用于在发现匹配后设置新的硬币值。请注意，`findMatchingRows`返回一个`NSMutableArray`，而`randomizeRows`接收一个`NSMutableArray`。这里的思路是，当发现匹配且动画全部完成后，我们可以使用表示匹配的同一个`NSMutableArray`来指示哪些硬币需要被随机化。\n\
