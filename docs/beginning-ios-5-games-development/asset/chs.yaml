  ## 自定义你的项目


  我们已经了解了如何创建项目。现在，在添加用于实现游戏的新 `UIView` 之前，你将学习一些使用 Xcode 自定义项目的知识。


  ### 调整 Xcode 视图以方便操作


  创建新项目后，你就可以开始自定义它了。此时你应该已打开 Xcode 并加载了新项目。请点击左侧的 `MainStoryboard.storyboard` 文件，这样你的项目界面会如图
  1-5 所示。


  **图 1-5.** *自定义前的 MainStoryboard.storyboard*


  在图 1-5 中，我们看到 `MainStoryboard.storyboard` 文件已被选中（项目 A）。该文件用于描述多个视图以及它们之间的导航关系。它展示了选中的故事板文件，并描述了屏幕右侧的内容。在项目
  B 中，我们看到一个名为“视图控制器”的项。这是项目 C 中描述的视图的控制器。我们将在接下来的几章中更详细地了解 Xcode 的工作原理。我想特别指出标记为项目
  D 的控件。它们用于放大和缩小故事板视图，对于顺利导航至关重要。此外，项目 E 中的按钮用于控制 Xcode 中哪些主面板可见。你可以随意尝试这些按钮。


