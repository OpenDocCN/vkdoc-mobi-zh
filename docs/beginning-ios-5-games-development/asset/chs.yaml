- "# 当应用程序启动时\n\n当应用程序完全初始化并准备好开始运行其组成代码时，会调用 `application:didFinishLaunchingWithOptions:`\
  \ 任务，如代码清单 2–2 所示。\n\n这个任务除了名称极长之外，还接收一个 `UIApplication` 实例和一个 `NSDictionary` 作为参数。`UIApplication`\
  \ 是一个代表正在运行的应用程序状态的对象。接收此消息的 `AppDelegate` 实例是 `UIApplication` 对象的委托。这意味着我们通过在 `AppDelegate`\
  \ 中实现任务来修改应用程序的行为。`AppDelegate` 所实现的协议 `UIApplicationDelegate` 定义了将在应用程序上被调用的任务。\n\
  \n如果我们查看 `application:didFinishLaunchingWithOptions:` 的实现，首先会创建一个与屏幕尺寸相同的新 `UIWindow`。实例化\
  \ `UIWindow` 后，我们需要创建一个 `UIViewController` 来管理应用程序的用户界面。像我们创建的新 Xcode 项目，最初会有一个单一的\
  \ `ViewController` 类来管理界面。我们将创建 `ViewController` 的设备特定子类，以便有地方放置设备特定的代码。我们稍后会探讨创建这些子类的过程。为了确保实例化正确的\
  \ `ViewController` 子类，我们需要添加代码清单 2–2 中加粗的代码。\n\n创建好 `ViewController` 后，我们将其设置为 `window`\
  \ 的 `rootViewController`，并调用 `makeKeyAndVisible`。`window` 对象是 `UIWindow` 的实例，它是应用程序的根图形组件。`makeKeyAndVisible`\
  \ 任务的作用是显示窗口。我们添加到应用程序中的任何自定义组件都将成为此 `window` 对象的子视图。\n\n如果应用程序需要在用户界面加载之前进行配置，应将初始化代码放在调用\
  \ `makeKeyAndVisible` 之前。这可能包括读取应用程序特定的配置文件、初始化数据库、设置定位服务或任何其他操作。\n\n接下来，在详细探讨如何使用\
  \ Interface Builder 之前，我们将大致了解 iOS 应用程序中的用户界面是如何组织的。\n\n## 理解 UIViewController\n\
  \niOS 开发及其相关库大量使用了模型-视图-控制器（MVC）模式。一般来说，MVC 是一种分离表现层（View）、数据层（Model）和业务逻辑层（Controller）的策略。具体来说，模型仅仅是数据，比如一个\
  \ `Person` 类或一个 `Address`。视图负责将数据渲染到屏幕上。在 iOS 开发中，这意味着 `UIView` 的子类。iOS 提供了一个特殊的类来充当\
  \ `UIView` 的控制器，这个类恰当地被命名为 `UIViewController`。\n\n`UIViewController` 有两个关键特征：它通常与一个\
  \ XIB 文件相关联，并且它有一个名为 \"view\" 的属性，类型为 `UIView`。通过创建 `UIViewController` 的子类，我们还可以创建一个与类名相同的\
  \ XIB 文件。默认情况下，当实例化一个 `UIViewController` 子类时，它会加载同名的 XIB。XIB 中的根 `UIView` 将被连接为\
  \ `UIViewController` 的 `view` 属性。\n\n除了提供用户界面布局与其驱动逻辑之间的清晰分离之外，iOS 还提供了许多 `UIViewController`\
  \ 子类，这些子类期望与其他 `UIViewController` 而非 `UIView` 协同工作。一个例子是实现“设置”应用中导航类型的 `UINavigationController`。在代码中，当你想前进到下一个视图时，你传递的是一个\
  \ `UIViewController`，而不是一个 `UIView`，尽管显示在屏幕上的是 `UIViewController` 的 `view` 属性。\n\
  \n诚然，对于本章中的示例应用程序而言，使用 `UIViewController` 并不会带来太大差异。在第一章中，我们创建 `RockPaperScissorsView`\
  \ 类时扩展了 `UIView`，并且效果良好。然而，理解 `UIViewController` 及其视图如何协同工作，将使第三章（我们将探讨游戏应用程序的生命周期）的工作更加轻松。\n\
  \n使用第一章中的 `RockPaperScissorsView`，让我们看看如果将这些功能实现为 `UIViewController` 会是什么样子。代码清单\
  \ 2–3 显示了文件 `RockPaperScissorsController.h`。\n\n**代码清单 2–3.** *RockPaperScissorsController.h*\n\
