  \n## 实现我们的增强道具角色\n\n为了实现我们的增强道具角色，我们需要配置 `GameController` 的子类 `Example01Controller`，以便将增强道具添加到场景中。同时，我们还需要实现增强道具角色本身，赋予它绘制自身以及定义其运动和行为的机制。\n\
  \n关键类是 `ImageRepresentation` 和 `Powerup`，但我们应该从 `Example01Controller` 类中的 `updateScene`\
  \ 任务开始，如代码清单 6-11 所示。\n\n**代码清单 6-11.** *Example01Controller.m (updateScene)*\n\n\
  ```\n-(void)updateScene{\n    if (self.stepNumber % (60*5) == 0){\n        [self\
  \ addActor:[Powerup powerup: self]];\n    }\n    [super updateScene];\n}\n```\n\n\
  这里展示了 `Example01Controller` 类中定义的 `updateScene` 任务。`Example01Controller` 类继承自 `GameController`，因此它继承了该父类中定义的游戏引擎逻辑。`updateScene`\
  \ 任务简单地每 5 秒添加一个新的增强道具，然后调用父类的 `updateScene` 实现。`Powerup` 类的头文件如代码清单 6-12 所示。\n\n\
  **代码清单 6-12.** *Powerup.h*\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
  Actor.h\"\n#import \"ImageRepresentation.h\"\n#import \"ExpireAfterTime.h\"\n\n\
  enum{\n    STATE_GLOW = 0,\n    STATE_NO_GLOW,\n    PWR_STATE_COUNT\n};\n\nenum{\n\
  \    VARIATION_HEALTH = 0,\n    VARIATION_CASH,\n    VARIATION_DAMAGE,\n    PWR_VARIATION_COUNT\n\
  };\n\n@interface Powerup : Actor <ImageRepresentationDelegate,ExpireAfterTimeDelegate>{\n\
  }\n+(id)powerup:(GameController*)aController;\n@end\n```\n\n这个头文件首先定义了两个枚举。第一个枚举定义了\
  \ `Powerup` 的两种状态值：`STATE_GLOW` 或 `STATE_NO_GLOW`。第二个枚举定义了 `Powerup` 的三种变体值。这两个枚举都以包含单词\
  \ `COUNT` 的值结尾。对于非 C 语言背景的开发者来说，这是一种老技巧，用于为枚举中的项数创建一个常量。例如，在第一个枚举中，`STATE_GLOW`\
  \ 的值为 0，那么 `STATE_NO_GLOW` 的值就是 1。这使得 `PWR_STATE_COUNT` 的值为 2，正好是状态的数量。很巧妙，对吧？\n\
  \n如代码清单 6-12 所定义的，`Powerup` 类继承自 `Actor`，并遵循 `ImageRepresentationDelegate` 和 `ExpireAfterTimeDelegate`\
  \ 这两个协议。在我们深入 `ImageRepresentation` 和 `ExpireAfterTime` 的细节时，会查看这些协议包含的任务。`Powerup`\
  \ 类定义的新任务只有构造函数 `powerup:`。让我们看看代码清单 6-13 中的这个任务。\n\n**代码清单 6-13.** *Powerup.m (powerup:（部分）)*\n\
