  \        float dy = (moveToPoint.y - c.y);\n\n        float theta = atan(dy/dx);\n\
  \n        float dxf = cos(theta) * self.speed;\n\n        float dyf = sin(theta)\
  \ * self.speed;\n\n        [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  \        ![](img/00269.png)\n\n        **126**\n\n        **CHAPTER 5: Quickly Build\
