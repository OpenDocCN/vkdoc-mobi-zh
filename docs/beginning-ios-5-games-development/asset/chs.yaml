  \n## Asteroid 类\n\n小行星是 Belt Commander 中的主要对手（大概这个词是\n\n\n\n# 排版后内容\n\n标题中的“belt”指的是小行星带（asteroid\
  \ belt）。这些`Actor`从右侧开始并向左移动。当它们到达左侧时，会从右侧重新开始。我们在本书中多次使用了`Asteroid`类的变体，并且它们有详细的文档记录。然而，使`Asteroid`有趣的功能是它在发射`Particle`时如何分裂成多个更小的小行星。此代码修改自之前的示例，如代码清单\
  \ 11–21 所示。\n\n**代码清单 11–21.** `Asteroid.m` (`doHit:`)\n\n```\n-(void)doHit:(GameController*)controller{\n\
  \nif (level > 1){\n\nint count = 1;\n\nfloat percent = arc4random()%1000/1000.0f;\n\
  \nif (percent > 0.9){\n\ncount = 3;\n\n} else if (percent > 0.5){\n\ncount = 2;\n\
  \n}\n\nfor (int i=0;i<count;i++){\n\nfloat radius = [self radius];\n\nfloat rx =\
  \ arc4random()%1000/1000.0*radius*2 - radius;\n\nfloat ry = arc4random()%1000/1000.0*radius*2\
  \ - radius;\n\nCGPoint newCenter = CGPointMake(self.center.x + rx, self.center.y\
  \ + ry); Asteroid* newAst = [Asteroid asteroidOfLevel:level-1 At: newCenter];\n\n\
  [controller addActor:newAst];\n\n}\n\n}\n\nint particles = arc4random()%4+1;\n\n\
  for (int i=0;i<particles;i++){\n\nImageRepresentation* rep = [ImageRepresentation\n\
  \nimageRepWithDelegate:[AsteroidRepresentationDelegate instance]];\n\nParticle*\
  \ particle = [Particle particleAt:self.center WithRep:rep Steps:25];\n\n[particle\
  \ setRadius:6];\n\n[particle setVariant:arc4random()%AST_VARIATION_COUNT];\n\n[particle\
  \ setRotation: (arc4random()%100)/100.0*M_PI*2];\n\nLinearMotion* motion = [LinearMotion\
  \ linearMotionRandomDirectionAndSpeed];\n\n[particle addBehavior:motion];\n\n[controller\
  \ addActor: particle];\n\n}\n\n[controller removeActor:self];\n\n}\n```\n\n在代码清单\
  \ 11–21 中，我们看到了由`Asteroid`类实现的`doHit:`任务。在此任务中，我们检查当前处理的`Asteroid`是否高于一级。如果是，则需要创建子`Asteroid`来替换当前小行星。在其他示例中，我们只是随机选择要创建的子`Asteroid`数量。然而，在`Belt\
  \ Commander`的试玩过程中，这种做法并不令人满意，因为生成的小行星数量过多。为了减少创建的小行星数量，对`count`的每个可能值都赋予了一个百分比。因此，只有\
  \ 10%的情况下`Asteroid`会创建三个子`Asteroid`，40%的情况下会创建两个子`Asteroid`，其余时间只创建一个`Asteroid`。通过这种方式，游戏达到了平衡，保持了趣味性和可玩性。\n\
  \n关于`doHit:`任务的另一个有趣之处，如代码清单 11–21 所示，是如何创建`Particle`来强调父`Asteroid`的毁灭。通过创建 1 到\
  \ 5 个外观类似小行星的`Particle`，并将它们随机方向发射出去，我们实现了非常令人满意的小行星毁灭效果。\n\n接下来，让我们继续探索一下`Saucer`类。\n\
  \n## Saucer 类\n\n`Saucer`类主要是个捣蛋鬼。它会出现在屏幕的顶部或底部，向`Viper`发射`Bullet`。`Saucer`类之所以麻烦，是因为`Bullet`经常击碎小行星，产生不可预测的模式。本章中`Saucer`类的实现与其它章节中的实现非常相似。但是，对`step:`任务做了一些修改，如代码清单\
  \ 11–22 所示。\n\n**代码清单 11–22.** `Saucer.m` (`step:`)\n\n```\n-(void)step:(GameController*)gameController{\n\
  \nif (health <= 0){\n\n[gameController incrementScore:[self radius]*10];\n\n[gameController\
  \ removeActor:self];\n\nreturn;\n\n}\n\nCGSize gameAreaSize = [gameController gameAreaSize];\n\
  \nCGPoint center = [self center];\n\nif (center.y < -[self radius]){\n\n[linearMotion\
  \ setDirection:DIRECTION_DOWN];\n\n} else if (center.y > gameAreaSize.height + [self\
  \ radius]){\n\n[linearMotion setDirection:DIRECTION_UP];\n\n}\n\nif (arc4random()%180\
  \ == 0){\n```\n\n\n```objectivec\nBeltCommanderController* bc = (BeltCommanderController*)gameController;\n\
  \n[gameController addActor:[Bullet bulletAt:[self center] TowardPoint:[bc viper].center\
  \ From:self]];\n```\n\nIn Listing 11-22, we saw the implementation of the `step:`\
  \ method in the `Saucer` class. In this task, we check if the `Saucer`'s health\
  \ is below zero. If so, we increment the `gameController`'s score and remove the\
  \ `Saucer` from the game. The next part of the `step:` task determines whether the\
  \ `Saucer` needs to change direction because it has moved off-screen. The final\
  \ part of the `step:` task is responsible for firing a bullet. To do this, we obtain\
  \ the `gameController`'s `viper` property so that we can aim the bullet at it. This\
  \ is the first instance where we need to cast `gameController` to `BeltCommanderController`.\
  \ This raises the question of how to add a generic way to reference a specific character\
  \ (like the `viper`) without relying on class definitions. But that is an exercise\
  \ for another time.\n\nThe last character we will examine is `Powerup`.\n\n## The\
  \ `Powerup` Class\n\nThe `Powerup` class is actually quite simple. It is just a\
  \ character that moves from right to left. We have already covered in other chapters\
  \ how it can appear to rotate and how it can flash at the end of its life. In this\
  \ game, the interesting part is the effect it has on the `Viper`. This functionality\
  \ is implemented in the `doHitOn:in:` task, as shown in Listing 11-23.\n\n**Listing\
  \ 11-23.** *Powerup.m (doHitOn:in:)*\n\n```objectivec\n-(void)doHitOn:(Viper*)viper\
  \ in:(GameController*)gameController{\n    if (self.variant == VARIATION_HEALTH){\n\
  \        [viper incrementHealth:30];\n    } else if (self.variant == VARIATION_DAMAGE){\n\
  \        [viper incrementDamage:gameController];\n    } else if (self.variant ==\
  \ VARIATION_CASH){\n        [gameController incrementScore:1000];\n    }\n    [gameController\
  \ removeActor:self];\n}\n```\n\nIn Listing 11-23, we see the `doHitOn:in:` task\
  \ of the `Powerup` class. This method is called when a `Powerup` collides with a\
  \ `Viper`. The implementation is straightforward: we simply check the `Powerup`'s\
  \ variant and apply the correct effect. For `VARIATION_HEALTH`, we increase the\
  \ `Viper`'s health by 30. For `VARIATION_DAMAGE`, we increase the `Viper`'s damage\
  \ value. Finally, for `VARIATION_CASH`, we simply increase the score by 1000. I\
  \ believe the simplicity of this task stems directly from our use of the `Actor`\
  \ model. It turns out that this is a powerful object-oriented design.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## Chapter 11: A Complete View – `Belt Commander`\n\n### Summary\n\nIn this chapter,\
  \ we have brought together all the techniques discussed in this book. We first explored\
  \ what our game, `Belt Commander`, is and how to play it. Then we reviewed the application's\
  \ flow and learned how to switch between views using the `UINavigationController`\
  \ class. Next, we examined the `BeltCommanderController` class and learned how to\
  \ implement the main part of the game. Finally, we looked at some specific implementation\
  \ choices that brought our `Actor` to life.\n\nWhen creating a game, there are always\
  \ unique codes and techniques involved. Every game is unique and requires a unique\
  \ effort to realize. It is impossible to write a book that explains every challenge\
  \ a game developer might face.\n\nHowever, many developers and game designers will\
  \ face requirements very similar to those I have outlined here. I hope this book\
  \ has demonstrated how to solve these common challenges. From the most basic issues\
  \ of screen switching and user data persistence, to more complex topics like particle\
  \ animation and in-app purchases, I consider this book to be a map of the code and\
  \ classes that constitute a game's infrastructure. Ultimately, it is up to each\
  \ developer to fill in the middle part and create new games. Thank you for reading\
  \ this book.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Appendix\
  \ A\n\n### Designing and Making Graphics\n\nIn this appendix, we will cover three\
  \ main topics: designing graphics, making graphics, and some open-source tools for\
  \ this purpose.\n\nWhen creating video games, a significant amount of work goes\
  \ into producing the graphics used in the game. In this appendix, we will consider\
  \ 2D games. These graphics will be images of characters, backgrounds, buttons, and\
  \ other decorative elements within the game. These images are a vital part of the\
  \ game; they are the first thing people see and can determine whether people will\
  \ download the game. Images are what draw people's attention. People remember the\
  \ image of Link or Mario – not the collision detection algorithm. This is not to\
  \ say that no popular games use simple graphics, because there are. But even creators\
  \ of successful games (using simple graphics) spend a great deal of time ensuring\
  \ their artwork meets a unified design goal.\n\nBeyond stylistic considerations,\
  \ game designers must also consider what is required to create images suitable for\
  \ building the game. We must consider the size of the final images and how the images\
  \ are organized. Should we use separate images for everything, or can we create\
  \ composite images of backgrounds? How do we organize images so they can be easily\
  \ modified? Do we have a budget for the megabyte size of our images? These are just\
  \ a few of the questions I will address in this appendix.\n\nThe final part of this\
  \ appendix will offer a quick review of some excellent open-source tools for game\
  \ designers. These tools are not only important for small game developers but were\
  \ also crucial for the writing of this book.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## Art in Video Games\n\nBefore creating a video game, someone has an idea of\
  \ what the gameplay and its appearance will be. That initial vision may or may not\
  \ make it into the final release version. Regardless, it is best for one person\
  \ or a group to be responsible for shaping the game's art so that it has a consistent\
  \ style. Once the game has an art direction, work begins on building the game's\
  \ assets. As the game takes shape, other artwork will be created to support the\
  \ game, such as websites or advertisements. These other works should maintain the\
  \ same visual style. In this section, we will briefly review what an artistic style\
  \ is and how it shapes user expectations.\n\n### Style in Video Games\n\nThe style\
  \ of a video game refers to all the choices made by the designer and artist to create\
  \ the game's art, and how this art fits together. The style of a game is no different\
  \ from the style of other products. For example, consider a bottle of teriyaki sauce.\
  \ It is not unreasonable to draw the word \"teriyaki\" in a font that looks like\
  \ it comes from the Far East, perhaps like the word in Figure A-1.\n\n**Figure A-1.**\
  \ *\"Teriyaki\" Presented in a Far Eastern Style*\n\nFigure A-1 shows a word presented\
  \ in a style that matches the expectations of teriyaki sauce users. Over the years,\
  \ many teriyaki sauce manufacturers have set this expectation. Not all products\
  \ have a socially expected style to draw upon. In fact, if you are creating a new\
  \ game of a new genre, users may have no expectations of style at all. If you are\
  \ making a game about knights and castles, users will welcome a game that looks\
  \ medieval in style. Regardless, it is important to maintain consistency of artistic\
  \ style throughout the game.\n\nMaintaining a consistent style does not require\
  \ the art to be overly complex. The goal is simply to make the art look as if it\
  \ were created by the same hand, as shown in the example in Figure A-2.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  ```\n\n\n**图 A–2.** *《灭虫者》，由 SUMO Productions 制作。© 2011 Table Mountain Church*\n\
  \n在图的左侧，我们看到游戏的欢迎界面。Phil Hassey 与 Table Mountain Church（拥有版权）的几位青少年合作开发了这款简单的游戏。由于这是\
  \ Phil 与一群缺乏多年图形或游戏设计经验的年轻人合作的成果，他们采用了简单的手绘风格。这一选择使得几位绘画技巧有限的人也能为游戏贡献美术作品。为了在整个游戏中保持这种风格，我们可以看到左侧屏幕角落的四个按钮也是手绘的。右下角的按钮是一个\
  \ Facebook 按钮。通过制作自己的 Facebook 按钮，他们保持了风格的一致性。如果他们使用标准 Facebook 按钮中的某一个，就会与整体视觉体验显得格格不入。我们还应该考虑一款风格不一致的游戏，如图\
