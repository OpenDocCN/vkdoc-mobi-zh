  ## 总结\n\n我们回顾了游戏中关于风格的一些简单概念。本附录通过展示风格保持一致的示例和不一致的示例，强调了风格一致的重要性。我们通过演示如何向应用程序添加包括图标和启动屏幕在内的基本辅助图像，继续讨论了应用中的图形处理。我们探讨了如何确定最终美术素材的正确尺寸。我们讨论了为何应首先设计游戏布局，再计算每个元素所需尺寸。最后，我们介绍了三款用于为游戏创建内容且非常实用的开源应用程序。\n\
