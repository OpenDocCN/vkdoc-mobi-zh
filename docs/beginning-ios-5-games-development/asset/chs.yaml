- "# 我们也知道，在找到匹配行后，`CoinsController` 需要随机化所有匹配项，为用户的下一个回合做好准备。这是通过任务 `randomizeRows:`\
  \ 和 `randomizeCols:` 完成的。任务 `randomizeRows:` 如代码清单 4–19 所示。\n\n**代码清单 4–19.** *`CoinsGame.m`\
  \ (`randomizeRows:`)*\n\n```\n-(void)randomizeRows:(NSMutableArray*)matchingRows{\n\
  \n    for (NSNumber* row in matchingRows){\n\n        for (int c=0;c<colCount;c++){\n\
  \n            int index = [self indexForCoord:CoordMake([row intValue], c)];\n\n\
  \            int newCoin = arc4random()%3;\n\n            [coins replaceObjectAtIndex:index\
  \ withObject:[NSNumber\nnumberWithInt:newCoin]];\n\n        }\n\n    }\n\n}\n```\n\
  \n任务 `randomizeRows:` 接收一个填充了 `NSNumber` 对象的 `NSMutableArray`。每个 `NSNumber` 代表一行。通过遍历每一行，我们为该行中的每个硬币设置一个新的随机值。\n\
  \n`randomizeCols:` 的实现类似；我们只是对传入的列中的每个硬币进行随机化。\n\n现在你已经了解了 `CoinsGame` 类，可以进一步查看\
  \ `CoinsController`，了解该类如何使用存储在 `CoinsGame` 中的数据来解释用户输入、管理代表硬币的视图，并根据游戏状态创建动画。\n\
  \n## 解释用户输入\n\n当用户触摸其中一枚硬币时，我们想将其标记为已选中。回顾代码清单 4–8，我们知道创建了一个 `UITapGestureRecognizer`\
  \ 并将其添加到 UIView `coinsView` 中。每当这个 `UITapGestureRecognizer` 检测到点击手势时，它就会调用任务 `tapGesture:`。让我们在代码清单\
  \ 4–20 中看看 `tapGesture:` 的第一部分。\n\n**代码清单 4–20.** *`CoinsController.m` (`tapGesture:`，部分)*\n\
  \n```\n- (void)tapGesture:(UIGestureRecognizer *)gestureRecognizer{\n\n    if ([coinsGame\
  \ remaingTurns] > 0 && acceptingInput){\n\n        UITapGestureRecognizer* tapRegognizer\
  \ =\n\n        (UITapGestureRecognizer*)gestureRecognizer;\n\n        CGPoint location\
  \ = [tapRegognizer locationInView:coinsView];\n\n        Coord coinCoord = [self\
  \ coordFromLocation:location];\n\n        if (!isFirstCoinSelected){//第一枚硬币\n\n\
  \            isFirstCoinSelected = true;\n\n            firstSelectedCoin = coinCoord;\n\
  \n            [self stopCoinAt: firstSelectedCoin];\n\n        } else {\n\n    \
  \        ///见代码清单 4–24\n\n        }\n\n    }\n\n}\n```\n\n代码清单 4–20 将触发此事件的 `UIGestureRecognizer`\
  \ 作为参数。\n\n我们将使用该对象来确定用户点击的位置。此任务中的第一个 `if` 语句检查是否还有剩余回合并且当前正在接受输入。变量 `acceptingInput`\
  \ 在动画期间被设置为 `false`，以防止用户在过渡期间选择硬币，这可能会引起用户的混淆。在将 `gestureRecognizer` 转换为名为 `tapRecognizer`\
  \ 的 `UITapGestureRecognizer` 之后，我们通过调用 `locationInView:` 并传入 `coinsView` 来获取点击的位置。点击的位置以名为\
  \ `location` 的 `CGPoint` 形式返回。为了知道哪个硬币被点击了，我们通过调用 `coordFromLocation:` 将 `location`\
  \ 转换为 `Coord`，如代码清单 4–21 所示。\n\n**代码清单 4–21.** *`CoinsController.m` (`coordFromLocation:`)*\n\
  \n```\n-(Coord)coordFromLocation:(CGPoint) location{\n\n    CGRect coinsFrame =\
  \ [coinsView frame];\n\n    Coord result;\n\n    result.col = location.x / coinsFrame.size.width\
  \ * [coinsGame colCount]; result.row = location.y / coinsFrame.size.height * [coinsGame\
  \ rowCount]; return result;\n\n}\n```\n\n任务 `coordFromLocation:` 接收一个 `CGPoint`\
  \ 并将其转换为一个 `Coord`，该 `Coord` 将告诉我们用户点击了哪个硬币。为了找到硬币，将位置的 x 值除以 `coinsView` 的宽度，然后乘以列数。行数的计算方式类似。\n\
  \n在代码清单 4–20 中，在我们确定了哪个硬币被点击并将结果存储为变量 `coinCoord` 之后，我们检查该硬币是否之前已被选中。如果没有，我们将 `isFirstCoinSelected`\
  \ 设置为 `true`，记录选中的硬币，并调用 `stopCoinAt:`，如代码清单 4–22 所示。\n\n\n\n### `Listing 4–22`.\
  \ `CoinsController.m (stopCoinAt:)`\n\n```\n-(void)stopCoinAt:(Coord)coord{\n\n\
  UIImageView* coinView = [[coinsView subviews] objectAtIndex:[coinsGame indexForCoord:coord]];\n\
  \nNSNumber* coin = [coinsGame coinForCoord:coord];\n\nUIImage* image = imageForCoin([coin\
  \ intValue]);\n\n[coinView stopAnimating];\n\n[coinView setImage: image];\n\n}\n\
  ```\n\n任务`stopCoinAt:`接收要停止旋转的硬币的坐标。首先找到表示该硬币的`UIImageView`，称为`coinView`。我们通过调用`stopAnimation:`来停止旋转动画，但我们不仅希望停止它，还希望显示硬币的正面。我们可以通过先调用`coinsGame`中的`coinForCoord`来确定硬币的类型，然后调用`imageForCoin`来返回我们想要使用的`UIImage`，从而找到正确的图像。我们只需在`coinView`上调用`setImage`并传入名为`image`的`UIImage`。函数`imageForCoin`根据传入的`int`值返回一个`UIImage`，如`Listing\
  \ 4–23`所示。\n\n### `Listing 4–23`. `CoinsController.m (imageForCoin(int))`\n\n```\n\
  UIImage* imageForCoin(int coin){\n\nif (coin == COIN_TRIANGLE){\n\nreturn [UIImage\
  \ imageNamed:@\"coin_triangle0001\"];\n\n} else if (coin == COIN_SQUARE){\n\nreturn\
