  \n**图 5-13.** 用于不同飞船状态的图像\n\n在图 5-13 中，我们看到了四张图像。最左边的图像用于飞船停止时。左起第二张图像用于飞船运动时。右边的两张图像用于飞船转弯时——每个转向方向各一张。让我们看看`Viper03`类的头文件，看看需要做哪些改动才能实现这一点。见清单\
