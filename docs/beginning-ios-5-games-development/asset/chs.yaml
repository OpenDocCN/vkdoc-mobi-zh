  ![](img/00276.jpeg)\n\n**第 6 章：创建你的角色：游戏引擎、图像角色和行为** **139**\n\n**图 6-1.** *示例 1——增强道具*\n\
  \n在图中，你可以看到几个带有三种符号的圆柱体：美元符号、圆点和叉号。示例运行时，每个圆柱体沿着直线移动。当圆柱体到达屏幕边缘时，它会绕到对侧边缘。在移动过程中，每个圆柱体看起来也在自身旋转或翻转。几秒钟后，每个圆柱体上的色带和符号开始闪烁，提示它即将消失。启动示例时，屏幕上没有增强道具，但每过\
