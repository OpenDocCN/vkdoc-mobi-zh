  ***图 8.** 用户输入示例列表，包含一个示例*


  在图 8 的左侧，我们看到八个按钮，每个按钮都标有一种用户输入类型。在第 8 章中，我们将系统地介绍每种输入类型，并构建一个示例来展示其工作原理。


  在图 8 的右侧，我们看到触摸事件的示例。我们使用在第 6 章和第 7 章中定义的类来构建每个示例，因此我们不仅能理解手势本身，还能理解它们如何与我们的游戏类协同工作。


  ### 第 9 章


  如今开发游戏的一大优势是网络连接无处不在。这种网络连接使我们的游戏能够超越运行它的设备，利用互联网的丰富资源。对游戏而言，这意味着社交网络。在第 9 章中，我们将学习苹果的
  Game Center 及相关的`GameKit`库。我们还将探讨 Twitter 和 Facebook。


  图 9 展示了使用这些服务的一个示例。


  xix


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/00275.jpeg)


  ■ 引言


  ***图 9.** 游戏内社交媒体*


  在图 9 中，左侧是我们示例应用 Belt Commander 的 Game Center 成就视图。右侧是一条包含默认文本的推文（未显示 Facebook）。启用这些服务的代码已在我们示例游戏
  Belt Commander 的项目中实现。通过这种方式，我们在将服务应用于真实游戏的背景下学习它们。


  除了实现启用这些服务所需的代码外，我们还研究了如何在游戏代码之外启用这些服务。例如，要在你的应用中使用 Game Center 功能，你必须在 iTunes Connect
