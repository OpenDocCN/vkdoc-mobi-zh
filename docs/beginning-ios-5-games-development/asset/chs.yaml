  \            dyf *= -1;\n\n        }\n\n        c.x += dxf;\n\n        c.y += dyf;\n\
  \n        if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y - c.y)\
  \ < self.speed){\n\n            c.x = moveToPoint.x;\n\n            c.y = moveToPoint.y;\n\
