  \n**品牌与感知**\n\n如前所述，游戏的美术不仅仅是在屏幕上移动的图像。人们会记住美术，并将其与游戏关联起来。图 A–4 展示了为游戏《太空攻击!!》制作的一则广告。\n\
  \n**图 A–4.** *《太空攻击》广告*\n\n这张传单是在一次大会上分发的。制作这张传单时，我正忙于更新游戏的美术资源，所以我决定在传单上使用新美术，尽管当时\
  \ App Store 中的游戏尚未更新为新美术。因此，当人们下载游戏时，他们下载的是带有旧美术的版本，如图 A–5 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00377.png)\n\n**图 A–5.** *《太空攻击!!》，旧版美术*\n\n由于游戏内的美术与传单上的美术不匹配，且游戏中的美术质量明显更差，人们感觉被欺骗了，尽管游戏是免费的。我没有意识到用户的期望，结果为此付出了一些负面评价的代价。这本可以通过及时更新游戏以适应大会，或者在广告中使用旧版美术来轻松避免。\n\
  \n我们快速了解了电子游戏中的风格是什么，以及为什么它很重要。现在，让我们将注意力转移到创建图像文件的更实际问题上。之后，我们将回顾一些用于创建 2D 美术的优秀工具。\n\
  \n**创建图像文件**\n\n无论游戏的美术方向如何，最终你都需要一定数量的、特定尺寸的图像文件来实际实现游戏。我们首先将探讨一些命名规范，这些规范将帮助你管理需要为不同设备使用不同图像的情况。然后，我们将回顾所有\
  \ iOS 应用所需的图像——比如图标和启动屏幕。本节的最后，我们将讨论如何选择合适的图像尺寸。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00441.png)\n\n**命名规范**\n\n在撰写本文时，创建应用时需要考虑三种不同的屏幕分辨率。根据应用运行在三种分辨率中的哪一种来使用不同的图像，这是非常常见的。为了支持这些分辨率，创建了一种命名规范，以几乎无痛的方式促进这一过程。其思路是，通过以特定方式命名图像，将根据设备加载不同的图像。因此，无需在代码中测试你正在使用的设备。这种命名规范的模式是\
  \ `Basename[@2x][~iphone|~pad].extension`。所以 `basename` 可以是任意名称——例如 `background`。然后你可以选择性地附加\
  \ `@2x` 来表示该图像用于高分辨率显示屏，比如 iPhone 4 的视网膜屏。在指明图像是否为高分辨率版本之后，你可以指定设备类别，即 `iPhone`\
  \ 或 `iPad`。最后，像通常一样添加扩展名。表 A–1 展示了对于一个本应名为 `background.png` 的图像，这种命名规范如何工作。\n\n\
  **表 A–1.** *竖屏背景图像的命名规范*\n\n| 设备 | 文件名 | 图像像素分辨率 |\n|---|---|---|\n| iPhone 3GS，iPod\
  \ Touch 第三代 | `background~iphone.png` | 320x480 |\n| iPhone 4，iPod Touch 第四代 | `background@2x~iphone.png`\
  \ | 640x960 |\n| iPad 1，iPad 2 | `background~ipad.png` | 768x1024 |\n| iPad 3* |\
  \ `background@2x~ipad.png` | 1536x2048 |\n\n* 在撰写本文时，iPad 3 尚未发布。我假设 iPad 3 具有像\
  \ iPhone 4 那样的视网膜显示屏，从而对命名规范做出逻辑推测。\n\n在表 A–1 中，我们看到第一列是每行对应的设备集合。为了为每组设备提供全屏竖屏背景图像，我们按照第二列所示的方式命名背景文件。最右列显示了图像的像素分辨率。在本附录的示例代码中，应用的背景图像配置为支持模拟器中可用的设备。我已更改每个背景图像，使其包含指示正在加载哪个文件的文本。图\
  \ A–6 展示了不同设备加载的不同图像。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00484.png)\n\
  \n**图 A–6.** *每个设备有不同的背景*\n\n在图的左侧，我们看到 iPhone 运行着与 iPhone 3GS 相同的显示效果。中间是模拟在 iPhone\
  \ 4 上运行时的屏幕尺寸（相对于 3GS）。右侧是第一代和第二代 iPad 的屏幕尺寸。清单 A–1 设置了此应用的背景图像。\n\n**清单 A–1.**\
  \ *ViewController.m (viewDidLoad)*\n\n```objective-c\n- (void)viewDidLoad\n{\n[super\
  \ viewDidLoad];\nUIImage* image = [UIImage imageNamed:@\"background\"];\n[backgroundImageView\
  \ setImage:image];\n}\n```\n\n在清单 A–1 中，我们看到 `ViewController` 类的 `viewDidLoad` 任务。我们通过调用\
  \ `imageNamed` 并仅传入基本名称来加载一个 `UIImage`。返回的是根据项目中包含的图像文件名，适用于特定设备的图像。在此例中，我们使用的文件名与表\
  \ A–1 中所示的相同。\n\n\n\n## 支持图片\n\n现在让我们来看看如何根据设备类型指定其他支持图片，例如图标和启动画面。\n\n## 支持图片\n\
  \n每个 iOS 应用程序都附带一些必须随应用提供的图片。至少，必须指定一个图标。可选地，可以指定一张在应用程序启动时显示的图片。通常，提供一张启动图片是个好主意，特别是当你的应用程序需要一点时间才能启动时。指定要使用哪张图片非常简单：Xcode\
  \ 提供了可以拖放图片以指定图标和启动图片的位置，如图 A-7 和图 A-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00080.png)\n\n![](img/00138.jpeg)\n\n![](img/00171.jpeg)\n\n"
