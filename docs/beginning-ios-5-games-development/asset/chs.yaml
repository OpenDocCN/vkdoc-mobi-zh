- '# 第 1 章：第一个简单游戏


  在本章中，我们将构建一个非常简单的石头剪刀布游戏。我们将使用 Xcode 的 Storyboard 功能创建一个包含两个视图及它们之间导航的应用。


  本书附带了示例 Xcode 项目；所有代码示例均直接取自这些项目。这样，你可以在 Xcode 中逐一跟着操作。在创建本书项目时，我使用了 Xcode 4.2 版本。本章附带的项目名为`Sample
  1`。该项目是一个使用 Storyboard 创建两个场景的非常简单的游戏。第一个场景是起始视图，第二个场景是用户玩石头剪刀布游戏的地方。在第二个场景中，你将添加一个`UIView`并将其类指定为`RockPapaerScissorView`。


  我们将逐步完成这些步骤，但首先让我们快速浏览一下我们的游戏，如图 1-1 所示。


