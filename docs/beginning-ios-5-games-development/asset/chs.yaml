  \n**6**\n\n**Chapter**\n\n**Create Your Characters:**\n\n**Game Engine, Image**\n\
  \n**Actors, and Behaviors**\n\n在本章及下一章中，我们将创建将在本书完整游戏中使用的角色类。但首先，我们需要重构前面章节的代码，以创建构成简单游戏引擎的可重用类。我们将探讨组成这个游戏引擎的类和协议，以便您理解它们如何协同工作。\n\
  \n我们将通过引入协议`Representation`来进一步抽象角色在屏幕上的绘制方式，该协议允许我们创建基于图像的角色以及通过程序绘制的角色（将在下一章中介绍）。\n\
  \n我们还将通过协议`Behavior`引入行为的概念。该协议为我们提供了一种模式，用于以可重用的方式描述角色在游戏中的行为。\n\n通过构建我们的第一个角色——增强道具，您将开始学习如何使用游戏引擎。我们将创建一个`GameController`子类的示例，让一堆增强道具在屏幕上自由活动，以便您了解这个角色的外观和行为。\n\
  \n**理解游戏引擎类**\n\n我们的简单游戏引擎从两个核心类开始：`GameController`和`Actor`。\n\n`GameController`与前一章的控制器类非常相似，只是它已被优化用于更通用的用途。`Actor`类也进行了类似的改进，以适应更多类型的`Actor`。`Actor`类还定义了两个协议`Representation`和`Behavior`，用于以不同方式描述每个角色。协议`Representation`描述了创建和更新角色`UIView`所需的任务。协议`Behavior`描述了一个由任何希望创建共享、可重用行为的类实现的任务。以下各节将详细介绍这些类和协议。\n\
  \n**GameController 类**\n\n`GameController`类协调游戏中的角色，并最终负责在屏幕上渲染每个角色。这包括将`GameController`设置为`UIViewController`，定义一种通过`CADisplayLink`重复调用`updateScene`任务的方法，最后回顾`updateScene`如何管理场景中的角色。`GameController`还提供了添加和移除角色的机制。让我们看一下`GameController`类的头文件，如`Listing\
  \ 6–1`所示。\n\n**Listing 6–1.** `GameController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
  \n#import <QuartzCore/CADisplayLink.h>\n\n#import \"Actor.h\"\n\n@interface GameController\
  \ : UIViewController {\n\n    IBOutlet UIView* actorsView;\n\n    CADisplayLink*\
  \ displayLink;\n\n    NSMutableSet* actors;\n\n    NSMutableDictionary* actorClassToActorSet;\n\
  \n    NSMutableSet* actorsToBeAdded;\n\n    NSMutableSet* actorsToBeRemoved;\n\n\
  \    BOOL workComplete;\n\n}\n\n@property (nonatomic) long stepNumber;\n\n@property\
  \ (nonatomic) CGSize gameAreaSize;\n\n@property (nonatomic) BOOL isSetup;\n\n@property\
  \ (nonatomic, retain) NSMutableArray* sortedActorClasses;\n\n-(BOOL)doSetup;\n\n\
  -(void)displayLinkCalled;\n\n-(void)updateScene;\n\n-(void)removeActor:(Actor*)actor;\n\
  \n-(void)addActor:(Actor*)actor;\n\n-(void)updateViewForActor:(Actor*)actor;\n\n\
  -(void)doAddActors;\n\n-(void)doRemoveActors;\n\n-(NSMutableSet*)actorsOfType:(Class)class;\n\
  \n@end\n```\n\n如您所见，`GameController`类的头文件扩展了`UIViewController`类。名为`actorsView`的`UIView`是一个`IBOutlet`，是包含游戏中每个角色视图的`UIView`。我们不打算将属性`view`用作角色的根视图，因为我们可能希望为`GameController`关联其他视图，例如背景图像或放置在游戏顶部的其他`UIView`。我们将在未来的章节中利用这种设置。目前，您只需知道`UIView\
  \ actorsView`是属性`view`的子视图，并将包含所有角色视图。\n\n\n\n# 在本列表中，你同样可以看到熟悉的 `CADisplayLink`\
  \ 以及多个集合。`NSMutableSet actor` 存储了游戏中的所有角色。`NSMutableDictionary actorClassToActorSet`\
  \ 用于跟踪特定类型的角色。两个 `NSMutableSets`，即 `actorsToBeAdded` 和 `actorsToBeRemoved`，分别用于跟踪在游戏单步执行期间创建的角色以及应在当前步骤结束后移除的角色。\n\
  \n声明的最后一个字段是 `BOOL workComplete`。该字段用于调试，本章后续探讨 `CADisplayLink` 的使用方式时会进一步说明。除了清单\
  \ 6–1 中声明的字段外，我们还看到了四个属性。第一个属性 `stepNumber` 用于记录游戏开始以来经过的步数。`CGSize gameAreaSize`\
  \ 是以游戏坐标表示的游戏区域尺寸。\n\n`BOOL isSetup` 用于跟踪 `GameController` 是否已完成设置。最后一个属性 `sortedActorClasses`\
  \ 用于告知 `GameController` 需要跟踪哪些类型的角色。\n\n## 设置 GameController\n\n当你查看 `GameController`\
  \ 类的实现时，清单 6–1 中所有字段和属性的用途将变得清晰。我们从清单 6–2 所示的任务 `doSetup` 开始。\n\n**清单 6–2.** *GameController.m\
  \ (doSetup)*\n\n```\n-(BOOL)doSetup\n{\n    if (!isSetup){\n        gameAreaSize\
  \ = CGSizeMake(1024, 768);\n        actors = [NSMutableSet new];\n        actorsToBeAdded\
  \ = [NSMutableSet new];\n        actorsToBeRemoved = [NSMutableSet new];\n     \
  \   stepNumber = 0;\n        workComplete = true;\n        displayLink = [CADisplayLink\
  \ displayLinkWithTarget:self\n                                              selector:@selector(displayLinkCalled)];\n\
  \        [displayLink addToRunLoop:[NSRunLoop currentRunLoop]\n                \
  \         forMode:NSDefaultRunLoopMode];\n        [displayLink setFrameInterval:1];\n\
  \        isSetup = YES;\n        return YES;\n    }\n    return NO;\n}\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n这里你可以看到 `GameController` 类的设置代码。因为我们只想设置\
  \ `GameController` 一次，所以将设置代码放在由变量 `isSetup` 控制的 `if` 语句内。如果执行了设置操作，`isSetup` 任务将返回\
  \ `YES`；否则返回 `NO`。\n\n至于类的实际设置，我们需要初始化几个变量。首先将属性 `gameSizeArea` 设置为默认尺寸。然后初始化集合\
  \ `actors`、`actorsToBeAdded` 和 `actorsToBeRemoved`。最后，将 `stepNumber` 设置为零。\n\n##\
  \ 调用 `displayLinkCalled` 和 `updateScene`\n\n在清单 6–2 中，最后一步是设置 `CADisplayLink`。在本章中，我们设置\
  \ `CADisplayLink` 的方式与之前的示例略有不同。我们没有让 `CADisplayLink` 直接调用 `updateScene`，而是让它调用\
  \ `displayLinkCalled`，后者再依次调用 `updateScene`，如清单 6–3 所示。\n\n**清单 6–3.** *GameController.m\
  \ (displayLinkCalled)*\n\n```\n-(void)displayLinkCalled{\n    if (workComplete){\n\
  \        workComplete = false;\n        @try {\n            [self updateScene];\n\
  \            workComplete = true;\n        }\n        @catch (NSException *exception)\
  \ {\n            NSLog(@\"%@\", [exception reason]);\n            NSLog(@\"%@\"\
  , [exception userInfo]);//此处设置断点\n        }\n    }\n}\n```\n\n任务 `displayLinkCalled`\
  \ 仅在变量 `workComplete` 为 true 时调用 `updateScene`。\n\n变量 `workComplete` 仅在首次调用 `displayLinkCalled`\
  \ 或 `updateScene` 成功完成时才可能为 true。如果 `updateScene` 抛出异常，则会记录异常，并且 `workComplete`\
  \ 不会重置为 true。实际上，这会导致游戏在出现任何错误时停止。这是可取的行为，因为由 `CADisplayLink` 调用的任务抛出的异常会被静默忽略。为了便于调试任务\
  \ `displayLinkCalled`，需要同时记录异常并暂停游戏，让测试人员知道出现了问题。在生产环境中，你可能希望更改此行为；即使出现错误，保持应用继续运行可能更好。具体需要的行为将取决于应用程序。\n\
  \n## 更新 `updateScene`\n\n任务 `updateScene` 也从前一章节进行了更新，如清单 6–4 所示。\n\n**清单 6–4.**\
  \ *GameController.m (updateScene)*\n\n```\n-(void)updateScene{\n    for (Actor*\
  \ actor in actors){\n        [actor step:self];\n    }\n    for (Actor* actor in\
  \ actors){\n        for (NSObject<Behavior>* behavoir in [actor behaviors]){\n \
  \           [behavoir applyToActor:actor In:self];\n        }\n    }\n    for (Actor*\
  \ actor in actors){\n        [self updateViewForActor:actor];\n    }\n    [self\
  \ doAddActors];\n    [self doRemoveActors];\n    stepNumber++;\n}\n```\n\n在这个清单中，我们遍历了游戏中的所有角色三次。在第一个循环中，我们对每个角色调用\
  \ `step:`，使其有机会执行任何自定义代码。在第二个循环中，我们应用与角色关联的每个 `Behavior`。`Behavior` 是一个协议，描述角色之间的一些共享行为（该协议定义在\
  \ `Actor.h` 中，后续清单 6–9 会展示）。在第三个循环中，我们通过调用 `updateViewForActor:` 更新代表每个角色的 `UIView`。\n\
  \n由于角色和行为可以自由添加或移除其他角色，并且我们不想在遍历同一个集合时修改 `NSMutableSet actors`，因此我们必须分两步来添加和移除角色。为了实现这个两步过程，我们将新添加的角色存储在\
  \ `NSMutableSet actorsToBeAdded` 中，然后在任务 `doAddActors` 中处理该数组中的每个角色。对于要移除的角色，我们采用相同的模式，将它们存储在\
  \ `NSMutableSet actorsToBeRemoved` 中，然后在任务 `doRemoveActors` 中处理它们。\n\n## 调用 `doAddActors`\
  \ 和 `doRemoveActors`\n\n我们在 `updateScene` 中采取的最后一步是调用 `doAddActors` 和 `doRemoveActors`，如清单\
  \ 6–5 所示。\n\n**清单 6–5.** *GameController.m (doAddActors 和 doRemoveActors)*\n\n```\n\
  -(void)doAddActors{\n    for (Actor* actor in actorsToBeAdded){\n        [actors\
  \ addObject:actor];\n        UIView* view = [[actor representation] getViewForActor:actor\
  \ In:self];\n        [view setFrame:CGRectMake(0, 0, 0, 0)];\n        [actorsView\
  \ addSubview:view];\n        NSMutableSet* sorted = [actorClassToActorSet valueForKey:[[actor\
  \ class]\n                                                                  description]];\n\
  \        [sorted addObject:actor];\n    }\n    [actorsToBeAdded removeAllObjects];\n\
  }\n\n-(void)doRemoveActors{\n    for (Actor* actor in actorsToBeRemoved){\n    \
  \    UIView* view = [[actor representation] getViewForActor:actor In:self];\n  \
  \      [view removeFromSuperview];\n        NSMutableSet* sorted = [actorClassToActorSet\
  \ valueForKey:[[actor class]\n                                                 \
  \                 description]];\n        [sorted removeObject:actor];\n       \
  \ [actors removeObject:actor];\n    }\n    [actorsToBeRemoved removeAllObjects];\n\
  }\n```\n\n\n好的，作为高级文档工程师和翻译员，我将按照您的要求，将给定的英文文本翻译成中文，并严格遵守格式规范。\n\n\n任务`doAddActors`遍历`NSMutableSet`\
  \ `actorsToBeAdded`中的所有演员，并将每个演员添加到`NSMutableSet` `actors`中。此外，每个演员的`UIView`会从其`representation`属性中获取，并作为子视图添加到`actorsView`中。`representation`属性是一个遵循`Representation`协议（定义在`Actor.h`中，见清单\
  \ 6–9）的`NSObject`对象。添加视图后，我们在`NSMutableDictionary` `actorClassToActorSet`中找到与演员类对应的`NSMutableSet`\
  \ `sorted`。然后，演员被添加到`NSMutableSet` `sorted`中。通过这种方式，我们可以在后续通过`NSMutableDictionary`\
  \ `actorClassToActorSet`快速查找特定类型的所有演员。`doAddActors`的最后一步是从集合`actorsToBeRemoved`中移除所有演员。\n\
  \n在上面的清单中，我们看到与`doAddActors`并行的任务`doRemoveActors`。在`doRemoveActors`中，`NSMutableSet`\
  \ `actorsToBeRemoved`中的每个演员，其关联的`UIView`会从父视图中移除，并会从对应的`NSMutableSet` `sorted`中移除。每个演员也会从`NSMutableSet`\
  \ `actors`中移除。最后，通过调用`removeAllObjects`清空`NSMutableSet` `actorsToBeRemoved`。\n\n\
  **添加和移除演员**\n\n要向游戏中添加或移除演员，我们分别调用`addActor`或`removeActor`，如清单 6–6 所示。\n\n**清单 6–6.**\
  \ *GameController.m (addActor 和 removeActor)*\n\n```\n-(void)addActor:(Actor*)actor{\n\
  \    [actor setAdded:YES];\n    [actorsToBeAdded addObject:actor];\n}\n\n-(void)removeActor:(Actor*)actor{\n\
  \    [actor setRemoved:YES];\n    [actorsToBeRemoved addObject:actor];\n}\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00047.png)\n\n**第\
  \ 6 章：创建你的角色：游戏引擎、图像角色和行为** **133**\n\n在这个清单中，你可以看到两个非常简单的任务：`addActor`和`removeActor`。在`addActor`中，传入的演员会将其`added`属性设置为`YES`，然后添加到`NSMutableSet`\
  \ `actorsToBeAdded`中。同样，在`removeActor`任务中，传入的演员会将其`removed`属性设置为`YES`，并添加到`NSMutableSet`\
  \ `actorsToBeRemoved`中。\n\n之前在清单 6–5 中，当演员被添加或从集合`actors`中移除时，我们也会添加或移除存储在`NSMutableDictionary`\
  \ `actorClassToActorSet`中的集合中的演员。这样做是为了能够在不遍历整个集合`actors`的情况下找到所有给定类型的演员。然而，我们并不希望为游戏中的每种演员类型都维护一个独立的集合。我们只需跟踪游戏逻辑中需要访问的演员类型。\n\
  \n**排序演员**\n\n任务`setSortedActorClasses`用于指定哪些演员应该被排序，如清单 6–7 所示。\n\n**清单 6–7.**\
  \ *GameController.m (setSortedActorClasses:)*\n\n```\n-(void)setSortedActorClasses:(NSMutableArray\
  \ *)aSortedActorClasses{\n    [sortedActorClasses removeAllObjects];\n    [sortedActorClasses\
  \ release];\n    sortedActorClasses = aSortedActorClasses;\n    [actorClassToActorSet\
  \ removeAllObjects];\n    [actorClassToActorSet release];\n    actorClassToActorSet\
  \ = [NSMutableDictionary new];\n    for (Class class in sortedActorClasses){\n \
  \       [actorClassToActorSet setValue: [NSMutableSet new] forKey:[class description]];\n\
  \    }\n    for (Actor* actor in actors){\n        NSMutableSet* sorted = [actorClassToActorSet\
  \ objectForKey:[[actor class] description]];\n        [sorted addObject:actor];\n\
  \    }\n}\n```\n\n我们首先进行一些内存管理：在重新将`sortedActorClasses`赋值给传入的`NSMutableArray` `aSortedActorClasses`之前，移除`NSMutableArray`\
  \ `sortedActorClasses`中的所有对象并释放它。接下来，我们清空并释放旧的`NSMutableDictionary` `actorClassToActorSet`。完成这些管理操作后，我们为`sortedActorClass`中的每个类向`actorClassToActorSet`添加一个新的`NSMutableSet`。最后，我们遍历所有演员，并将每个演员添加到对应的`NSMutableSet`中。最后一步是必要的，以允许在应用程序中多次调用`setSortedActorClasses`；但考虑到这是一个相对昂贵的操作，最好在游戏开始时只调用一次`setSortedActorClasses`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00438.png)\n\n**134**\n\
  \n**第 6 章：创建你的角色：游戏引擎、图像角色和行为** **管理 UIView**\n\n对`GameController`类的最后一个改进是任务`updateViewForActor:`，如清单\
  \ 6–8 所示。\n\n**清单 6–8.** *GameController.m (updateViewForActor:)*\n\n```\n-(void)updateViewForActor:(Actor*)actor{\n\
  \    NSObject<Representation>* rep = [actor representation];\n    UIView* actorView\
  \ = [rep getViewForActor:actor In:self];\n    [rep updateView:actorView ForActor:actor\
  \ In:self];\n    float xFactor = actorsView.frame.size.width/self.gameAreaSize.width;\
  \ \n    float yFactor = actorsView.frame.size.height/self.gameAreaSize.height; \n\
  \    float x = (actor.center.x-actor.radius)*xFactor;\n    float y = (actor.center.y-actor.radius)*yFactor;\n\
  \    float width = actor.radius*xFactor*2;\n    float height = actor.radius*yFactor*2;\n\
  \    CGRect frame = CGRectMake(x, y, width, height);\n    actorView.transform =\
  \ CGAffineTransformIdentity;\n    [actorView setFrame:frame];\n    actorView.transform\
  \ = CGAffineTransformRotate(actorView.transform, [actor rotation]);\n    [actorView\
  \ setAlpha:[actor alpha]];\n}\n```\n\n任务`updateViewForActor:`负责管理与每个演员关联的`UIView`。在该任务的第一行，我们获取演员的`representation`属性并将其存储在变量`rep`中。变量`rep`是一个遵循`Representation`协议的`NSObject`对象。`Representation`协议定义在`Actor.h`中（稍后见清单\
  \ 6–9），描述了如何创建和更新给定演员的`UIView`。\n\n`UIView`在调用`getViewForActor:In:`时被创建。当需要更新`UIView`以反映演员的变化时，会调用任务`updateView:ForActor:In:`。这两个任务将在本章后面讨论。\n\
  \n在确定了`UIView` `actorView`之后，我们计算它应该在父视图中所占的区域。该计算的详细描述见第 5 章。然而，我们增加了两个新特性：我们根据演员的`rotation`属性旋转`actorView`，并且设置`actorView`的`alpha`值，允许演员在游戏中改变透明度。\n\
  \n现在我们已经了解了`GameController`类以及它如何管理游戏中的演员，让我们来看看`Actor`类，以便了解它如何支持游戏中许多不同类型的演员。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00421.png)\n\n**第\
  \ 6 章：创建你的角色：游戏引擎、图像角色和行为** **135**\n\n**Actor 类**\n\n`Actor`类是游戏中所有演员的超类。它主要提供关于演员位置的信息，但也描述了指示演员在屏幕上如何行为和呈现的协议。在本节中，我们将看到`Actor`是如何实现的，然后是一些具体的例子。我们先来看看`Actor`类的头文件，如清单\
  \ 6–9 所示。\n\n**清单 6–9.** *Actor.h*\n\n```\n#import <Foundation/Foundation.h>\n\n\
  @class GameController, Actor;\n\n@protocol Representation\n\n-(UIView*)getViewForActor:(Actor*)anActor\
  \ In:(GameController*)aController;\n\n-(void)updateView:(UIView*)aView ForActor:(Actor*)anActor\n\
  \    In:(GameController*)aController;\n\n@end\n\n@protocol Behavior\n\n-(void)applyToActor:(Actor*)anActor\
  \ In:(GameController*)gameController;\n```\n\n\n\n# Objective-C 代码示例\n\n```objc\n\
  @end\n\nlong nextId;\n\n@interface Actor : NSObject {\n    \n}\n\n//状态\n\n@property\
  \ (nonatomic, retain) NSNumber* actorId;\n\n@property (nonatomic) BOOL added;\n\n\
  @property (nonatomic) BOOL removed;\n\n//几何属性\n\n@property (nonatomic) CGPoint center;\n\
  \n@property (nonatomic) float rotation;\n\n@property (nonatomic) float speed;\n\n\
  @property (nonatomic) float radius;\n\n//行为\n\n@property (nonatomic, retain) NSMutableArray<Behavior>*\
  \ behaviors;\n\n//表现层\n\n@property (nonatomic) BOOL needsViewUpdated;\n\n@property\
  \ (nonatomic, retain) NSObject<Representation>* representation;\n\n@property (nonatomic)\
  \ int variant;\n\n@property (nonatomic) int state;\n\n@property (nonatomic) float\
  \ alpha;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius\nAndRepresentation:(NSObject<Representation>*)aRepresentation;\n\
  \n-(void)step:(GameController*)controller;\n\n-(BOOL)overlapsWith: (Actor*) actor;\n\
  \n-(void)addBehavior:(NSObject<Behavior>*)behavior;\n\n+(CGPoint)randomPointAround:(CGPoint)aCenter\
  \ At:(float)aRadius;\n\n@end\n```\n\n这里定义了`Representation`协议。任何管理`Actor`关联的`UIView`的对象都必须遵守此协议。其核心理念是，至少有两大类`UIView`用于绘制`Actor`：基于图像的和基于程序绘制的。当然，还有其他实现`UIView`的方式，例如包含子视图的`UIView`。本章不涉及这个例子，但我们会研究基于图像的`Actor`（本章）以及基于矢量的`Actor`（下一章）。\n\
  \n无论`Actor`的`UIView`如何实现，`GameController`类都需要知道如何获取正确的`UIView`引用，并让`Representation`有机会更新其外观。因此，我们规定了两个必需的方法：`getViewForActor:In:`和`updateView:ForActor:In:`。\n\
  \n在上述代码中，我们看到了第二个名为`Behavior`的协议。我们将创建一些简单的类，这些类描述`Actor`的特定行为，并且可以在不同类型的`Actor`之间共享。例如，我们将创建一个名为`LinearMotion`的行为，用来描述`Actor`如何在屏幕上移动。多种类型的`Actor`都将使用此行为。这正是`Behavior`协议的用武之地：它为我们提供了一个名为`applyToActor:From:`的必需方法，该方法会在游戏的每一步由`GameController`调用。\n\
  \n代码中还展示了许多属性。其中许多属性应该在上章中已经见过，包括`center`、`speed`和`radius`。此外，还添加了一些新属性，以尽可能提高`Actor`类的可复用性。`added`和`removed`这两个属性用于跟踪该`Actor`是否已被添加或移出游戏。\n\
  \n`behaviors`属性是一个包含遵守`Behavior`协议对象的`NSMutableArray`。通过向`behaviors`属性添加`Behavior`对象，我们可以自定义每个`Actor`的行为。这可以简单到描述`Actor`的运动，也可以复杂到实现人工智能。我们提供了一个名为`addBehavior:`的特殊方法，它是获取`NSMutableArray\
  \ behaviors`并添加`Behavior`对象的快捷方式。`addBehavior:`方法也让我们有机会进行懒加载，这样如果不需要，我们就不会创建`NSMutableArray\
  \ behaviors`。\n\n你还可以在 Listing 6–9 中看到，我们添加了`variant`和`state`属性。`Actor`通常需要这两个属性，因此为了简便，它们被包含在`Actor`类中。最后一个属性是`alpha`，用于描述`Actor`在屏幕上的透明度。\n\
  \nListing 6–9 中定义的方法与上一章中为`Actor`类描述的方法基本相同。唯一真正的区别在于，初始化`Actor`时必须传入一个`Representation`。我们还添加了一个实用方法`randomPointAround:At:`，用于在围绕点`aPoint`、半径为`aRadius`的圆上生成一个随机点。\n\
  \n---\n\n**第六章：创建你的角色：游戏引擎、图像演员和行为** **137**\n\n## 实现 Actor\n\n`Actor`类的实现如 Listing\
  \ 6–10 所示。\n\n**Listing 6–10.** *Actor.m*\n\n```objc\n#import \"Actor.h\"\n\n@implementation\
  \ Actor\n\n@synthesize actorId;\n@synthesize added;\n@synthesize removed;\n@synthesize\
  \ center;\n@synthesize rotation;\n@synthesize speed;\n@synthesize radius;\n@synthesize\
  \ needsViewUpdated;\n@synthesize representation;\n@synthesize variant;\n@synthesize\
  \ state;\n@synthesize alpha;\n@synthesize behaviors;\n\n-(id)initAt:(CGPoint)aPoint\
  \ WithRadius:(float)aRadius\nAndRepresentation:(NSObject<Representation>*)aRepresentation{\n\
  \    self = [super init];\n    if (self != nil){\n        [self setActorId:[NSNumber\
  \ numberWithLong:nextId++]];\n        [self setCenter:aPoint];\n        [self setRotation:0];\n\
  \        [self setRadius:aRadius];\n        [self setRepresentation:aRepresentation];\n\
  \        [self setAlpha:1.0];\n    }\n    return self;\n}\n\n-(void)step:(GameController*)controller{\n\
  \    //由子类实现。\n}\n\n-(BOOL)overlapsWith: (Actor*) actor {\n    float xdist = abs(self.center.x\
  \ - actor.center.x);\n    float ydist = abs(self.center.y - actor.center.y);\n \
  \   float distance = sqrtf(xdist*xdist+ydist*ydist);\n    return distance < self.radius\
  \ + actor.radius;\n}\n\n-(void)setVariant:(int)aVariant{\n    if (aVariant != variant){\n\
  \        variant = aVariant;\n        needsViewUpdated = YES;\n    }\n}\n\n-(void)setState:(int)aState{\n\
  \    if (aState != state){\n        state = aState;\n        needsViewUpdated =\
  \ YES;\n    }\n}\n\n-(void)addBehavior:(NSObject<Behavior>*)behavior{\n    if (behaviors\
  \ == nil){\n        behaviors = [NSMutableArray new];\n    }\n    [behaviors addObject:behavior];\n\
  }\n\n-(void)dealloc{\n    [actorId release];\n    [behaviors removeAllObjects];\n\
  \    [behaviors release];\n    [representation release];\n    [super dealloc];\n\
  }\n\n+(CGPoint)randomPointAround:(CGPoint)aCenter At:(float)aRadius{\n    float\
  \ direction = arc4random()%1000/1000.0 * M_PI*2;\n    return CGPointMake(aCenter.x\
  \ + cosf(direction)*aRadius, aCenter.y +\n                       sinf(direction)*aRadius);\n\
  }\n\n@end\n```\n\n在这个文件的顶部，我们看到对于类的每个属性，我们简单地使用`@synthesize`来创建 getter 和 setter\
  \ 方法，但`state`和`variant`属性除外。我们为`state`和`variant`属性的 setter 方法自定义了实现，以便当这些值发生变化时，将`needsViewUpdated`设置为`YES`。\n\
  \n这样做是为了确保当`Actor`的状态或变体发生变化时，`Actor`的`Representation`能够正确地更新代表此`Actor`的`UIView`。\n\
  \n`initAt:WithRadius:AndRepresentation:`方法简单地初始化`Actor`并设置传入的属性。我们还将`alpha`属性设置为`1.0`，使`Actor`默认完全不透明。\n\
  \n由于`Actor`现在持有了对其他多个对象的引用（例如`representation`和`behaviors`集合），我们必须为此类实现一个`dealloc`方法。如\
  \ Listing 6–10 所示，我们在调用`super dealloc`之前，释放了所有被持有的对象，并从`NSMutableArray behaviors`中移除了所有对象。\n\
  \n## 使用 Power-Up Actor\n\n\n\n在上一节中，我们探讨了 `GameController` 和 `Actor` 类，了解到 `Actor`\
  \ 类需要一个 `Representation` 对象才能被显示。`Representation` 协议描述了管理角色关联的 `UIView` 所必需的类应具备的条件。在本节中，我们将深入探索\
  \ `ImageRepresentation` 类，了解它如何利用图像来呈现角色。在前一章中，我们使用图像绘制了不同的角色。在本节中，我们将展示如何将这些技术整合到一个名为\
  \ `ImageRepresentation` 的简单、可复用的类中。\n\n为了说明 `ImageRepresentation`，在第一个示例中，我们将创建增强道具并让它们动画穿过屏幕，如图\
