  **图 2-7.** *配置状态栏*


  一旦看到图 2-7 所示的视图，右键点击最顶层的元素（A），然后选择“添加行”（Add Row）。这将在项目列表中添加一个新元素。你需要将键（Key）值设置为“状态栏最初是隐藏的”（Status
  bar is initially hidden），并将值（Value）设置为“是”（Yes）。你在这里所做的实际上是编辑“Supporting Files”组下的
