  \n## 根据设备类型自定义行为\n\n如前所述，我们使用的项目是一个通用应用的示例，配置为可在 iPhone 和 iPad 上运行。由于应用在不同设备上运行时可能希望执行不同的操作，我们将为每种设备类型创建`ViewController`的子类。\n\
  \n要创建这些子类，请从文件菜单中选择“新建文件”。您将看到一个如图 2-9 所示的对话框。\n\n![图 2-9](img/00020.png)\n\n从 Cocoa\
  \ Touch 部分，我们选择`UIViewController`子类，然后点击“下一步”。这将允许我们命名新类并选择特定的子类，如图 2-10 所示。\n\n\
  ![图 2-10](img/00125.png)\n\n类名应为`ViewController_iPhone`，且应为`ViewController`的子类。请记住，`ViewController`类本身是一个`UIViewController`，因此`ViewController_iPhone`也将是一个`UIViewController`。在此示例中，我们两个复选框都不勾选，因为我们已经有用于该类的\
  \ XIB 文件。\n\n我们需要重复此过程，为我们的`UIViewController`创建 iPad 版本。创建该类时，将其命名为`UIViewController_iPad`，并保持两个复选框都不勾选。完成后，您的项目应如图\
  \ 2-11 所示。\n\n![图 2-11](img/00182.jpeg)\n\n在图 2-11 中，我们可以看到我们的项目以及刚创建的新的`UIViewController`子类。为了保持组织有序，我发现将特定于设备的类放在它们自己的分组中会很方便。\n\
  \n现在，我们为每种设备类型（iPhone 和 iPad）都拥有了 XIB 文件和`UIViewController`类。如果我们要编写共享行为的代码，我们会将其添加到`ViewController`类中。如果我们要添加特定于某个设备的代码，我们会将其添加到`ViewController_iPad`或`ViewController_iPhone`中。现在，我们可以继续前进并开始实现我们的应用了，我们先来看看\
  \ UI 元素。\n\n## 以通用方式图形化设计用户界面\n\n在为 iPhone 和 iPad 构建应用时，我们必须考虑两种设备屏幕尺寸的差异。由于两种设备的宽高比不同，我们确实应该为每种设备创建一个布局。在本节中，我们将介绍如何为每种设备类型创建布局，以及如何创建根据应用运行设备而调用的类。\n\
  \nXcode 提供了一种便捷而强大的工具，用于布局应用的图形元素。历史上，这是通过独立的应用程序 Interface Builder 来完成的。在近期的 Xcode\
  \ 版本中，Interface Builder 的功能已整合到 Xcode 中，以提供无缝的开发环境。\n\n尽管 Interface Builder 不再是一个独立的应用程序，但我将继续使用该术语来指代\
  \ Xcode 中的 UI 布局工具。这将有助于我们区分 Xcode 的代码编辑部分和所见即所得的部分。\n\nInterface Builder 的核心是一个工具，用于创建对象集合以及这些对象之间的一组连接。这些对象是\
  \ UI 组件以及指定行为或数据的对象。这个对象集合保存在一个称为 XIB 文件的内容中。在运行时，XIB 文件会被读取，以实例化其中定义的对象。生成的对象会被“连接”起来，并准备好供应用使用。例如，在\
  \ Interface Builder 中，您可以向场景添加一个按钮，并指定它被点击时应调用特定对象上的某个任务。这很方便，因为您无需编写将按钮与处理对象链接起来的代码；一切都会像您在\
  \ XIB 文件中定义的那样设置好。\n\n**注意：** 当在互联网上搜索有关 Interface Builder 的帮助时，请记住 XIB 文件过去被称为\
  \ NIB 文件。许多可用信息仍然使用这个旧术语，但仍然是有效的。Interface Builder 也是如此；关于旧版本的文章仍然能为新版本提供有价值的见解。\n\
  \n### Interface Builder 初探\n\n在项目资源管理器的 iPhone 分组下，有一个名为`ViewController_iPhone.xib`的文件。此文件包含应用在\
  \ iPhone 上运行时该项目使用的起始视觉组件。类似地，在 iPad 分组下有一个名为`ViewController_iPad.xib`的文件，用于应用在\
  \ iPad 上运行时。让我们先关注 iPhone 版本，看看这个文件是什么以及它是如何工作的。点击`ViewController_iPhone.xib`，您应该会看到类似图\
  \ 2-12 的内容。\n\n![图 2-12](img/00151.png)\n\n在图 2-12 中，项目资源管理器右侧是一个包含四个图标的视图（A）。这些图标代表\
  \ XIB 文件中的根项目。要获取有关这些对象的更多详细信息，请点击视图底部的小箭头（B）。这将改变显示方式，使其与图 2-13 中最左侧的视图相匹配。如标签所示，“对象”下的项目是此\
  \ XIB 文件中定义的对象。“占位符”下的项目描述了与此文件中未定义对象的关系。实际上，“文件所有者”项是对加载此 XIB 文件的对象的引用；这通常是`UIViewController`的子类，但稍后会详细说明。\n\
  \n\n\n"
