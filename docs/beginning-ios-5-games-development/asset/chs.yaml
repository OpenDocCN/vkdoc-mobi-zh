  \nreturn [UIImage imageNamed:@\"coin_circle0001\"];\n\n}\n\nreturn nil;\n\n}\n```\n\
  \n在`Listing 4–24`中，我们看到当之前选中一个硬币时执行的代码。\n\n### `Listing 4–24`. `CoinsController.m\
  \ (tapGesture:, continued)`\n\n```\nif (CoordEqual(firstSelectedCoin, coinCoord)){//re\
  \ selected the first one.\n\nisFirstCoinSelected = false;\n\n[self spinCoinAt:firstSelectedCoin];\n\
  \n} else {//selected another one, do switch.\n\nacceptingInput = false;\n\n[coinsGame\
  \ setRemaingTurns: [coinsGame remaingTurns] - 1];\n\n[delegate turnsRemainingDecreased:self\
  \ with: [coinsGame remaingTurns]];\n\nisFirstCoinSelected = false;\n\nsecondSelectedCoin\
  \ = coinCoord;\n\n[self stopCoinAt:secondSelectedCoin];\n\n[self doSwitch:firstSelectedCoin\
  \ With:secondSelectedCoin];\n\n}\n```\n\n如果用户选择了同一个硬币，我们只需再次旋转该硬币并将`isFirstCoinSelected`设置为`false`。然而，如果用户选择了不同的硬币，就该进行交换了。我们首先将`acceptingInput`设置为`false`，这样用户就不会在动画执行时中断我们。我们还需要减少剩余回合数，并通知委托这一变化。我们将`isFirstCoinSelected`设置为`false`，因为下次调用此方法时，不应有任何硬币被选中。在将第二个硬币的坐标记录到变量`secondSelectedCoin`后，我们停止选中的硬币并调用`doSwitch:With:`，传入第一个和第二个选中的硬币。任务`doSwitch`将在下一节的`Listing\
  \ 4–25`中展示，它负责创建硬币交换位置的动画。\n\n这引出了我们关于如何在不使用之前描述的静态`UIView`任务的情况下创建动画的讨论。\n\n##\
  \ 使用 Core Animation 实现视图动画\n\n之前我们研究了`UIView`类中用于创建动画的任务。这些任务提供了对 iOS 上动画实现方式的抽象视角。本节将更深入地探讨如何使用名为\
  \ Core Animation 的框架定义动画。Core Animation 是负责 iOS 设备上大多数动画的框架，也是静态`UIView`任务在幕后使用的框架。\n\
  \n理解 Core Animation 的最佳方式是继续我们的示例，看看如何创建硬币交换位置的动画。图 4–8 展示了硬币交换位置的动画。\n\n**Figure\
  \ 4–8.** *硬币交换位置*\n\n\n\n第一列第二行的硬币（正方形）正在与第二列最后一行的硬币（三角形）进行交换。每个硬币会缩小到几乎看不见，然后切换硬币类型，再恢复至正常大小。这一过程在任务\
  \ `doSwitch:With:` 中实现，如代码清单 4–25 所示。\n\n**代码清单 4–25**：`CoinsController.m`（`doSwitch:With:`）\n\
  \n```objc\n-(void)doSwitch:(Coord)coordA With:(Coord)coordB {\n\n    [coinsGame\
  \ swap:coordA With:coordB];\n\n    coinViewA = [[coinsView subviews] objectAtIndex:[coinsGame\
  \ indexForCoord:coordA]];\n    coinViewB = [[coinsView subviews] objectAtIndex:[coinsGame\
  \ indexForCoord:coordB]];\n    for (UIView* coinView in [NSArray arrayWithObjects:coinViewA,\
  \ coinViewB, nil]){\n\n        CABasicAnimation* animScaleDown = [CABasicAnimation\n\
  \            animationWithKeyPath:@\"transform.scale\"];\n        [animScaleDown\
  \ setValue:@\"animScaleDown\" forKey:@\"name\"];\n        animScaleDown.fromValue\
  \ = [NSNumber numberWithFloat:1.0f];\n        animScaleDown.toValue = [NSNumber\
  \ numberWithFloat:0.0f];\n        animScaleDown.duration = 1.0;\n        animScaleDown.timingFunction\
  \ = [CAMediaTimingFunction\n            functionWithName:kCAMediaTimingFunctionEaseIn];\n\
  \n        CABasicAnimation* animScaleUp = [CABasicAnimation\n            animationWithKeyPath:@\"\
  transform.scale\"];\n        [animScaleUp setValue:@\"animScaleUp\" forKey:@\"name\"\
  ];\n        animScaleUp.fromValue = [NSNumber numberWithFloat:0.0f];\n        animScaleUp.toValue\
  \ = [NSNumber numberWithFloat:1.0f];\n        animScaleUp.duration = 1.0;\n    \
  \    animScaleUp.beginTime = CACurrentMediaTime() + 1.0;\n        animScaleUp.timingFunction\
  \ = [CAMediaTimingFunction\n            functionWithName:kCAMediaTimingFunctionEaseOut];\n\
  \n        if (coinViewA == coinView){\n            [animScaleDown setDelegate:self];\n\
  \            [animScaleUp setDelegate:self];\n        }\n\n        [coinView.layer\
  \ addAnimation:animScaleDown forKey:@\"animScaleDown\"];\n        [coinView.layer\
  \ addAnimation:animScaleUp forKey:@\"animScaleUp\"];\n    }\n}\n```\n\n任务 `doSwitch:With:`\
  \ 负责更新模型和创建动画。要更新模型，我们只需在 `coinsGame` 上调用 `swap:With:`。要创建动画，我们需要使用名为 `CABasicAnimation`\
  \ 的类。一个 `CABasicAnimation` 对象描述了对 `CALayer` 的某个变化。`CALayer` 是一个代表 `UIView` 视觉内容的对象。\n\
  \n到目前为止，我们一直认为 `UIView` 提供屏幕上的内容，这依然正确，但 `UIView` 使用 Core Animation 层来实现其绘制方式。因此，每个\
  \ `UIView` 都有一个类型为 `CALayer` 的 `layer` 属性。你需要理解这一点，才能明白 `CABasicAnimation` 是如何工作的。查看代码清单\
  \ 4–25，你会发现 `CABasicAnimation` 是通过指定一个路径来创建的。在我们的例子中，路径是 `transform.scale`。这是一个指向我们想动画的\
  \ `UIView` 所关联的 `CALayer` 对象的路径。\n\n对于每个 `UIView`（`coinViewA` 和 `coinViewB`），我们都会创建两个\
  \ `CABasicAnimation` 对象。当我们创建 `CABasicAnimation` 对象 `animScaleDown` 时，我们指定此 `CABasicAnimation`\
  \ 将操作属性 `transform` 上的 `scale` 值。\n\n我们通过设置 `animScaleDown` 的 `fromValue` 来指定 `scale`\
  \ 的起始值，并通过设置 `toValue` 来指定结束值。`duration` 值表示我们期望此动画持续多少秒。通过指定 `timingFunction`，我们可以控制此动画发生的速率。在这种情况下，我们指定了\
  \ `kCAMediaTimingFunctionEaseIn`，它指示 `CABasicAnimation` 先慢后快。\n\n`CABasicAnimation`\
  \ `animScaleUp` 与 `animScaleDown` 类似。最大的区别在于 `fromValue` 和 `toValue` 是相反的。我们还将其\
  \ `beginTime` 值设置为未来 1 秒钟。这里的思路是：我们希望 `animScaleDown` 动画运行 1 秒钟，使硬币缩小到消失；然后当 `animScaleDown`\
  \ 完成时，我们希望 `animScaleUp` 动画运行，将硬币缩放回原大小。\n\n\n\n诀窍在于，在这两个动画之间，交换两个硬币视图所使用的图片。如果我们处理的是\
  \ `coinViewA`，那么可以通过将 `self` 设置为动画 `animScaleDown` 的代理来实现这一点，因为我们只需要被通知一次。我们还需要知道所有这些动画何时结束，因此我们也将\
  \ `self` 设置为 `animScaleUp` 的代理。设置了代理的动画在完成时会调用任务 `animationDidStop:finished:`，如**列表\
  \ 4-26** 所示。\n\n在这里，我们可以看到任务 `animationDidStop:finished:`。请注意，有三个动画调用了这个任务。前两个 `if`\
  \ 语句用于处理**列表 4-25** 中描述的动画。当 `animScaleDown` 动画完成后，我们交换 `UIImageViews` 所使用的 `UIImages`，以表示两个被选中的硬币。\n\
  \n当动画 `animScaleUp` 完成后，我们需要检查是否有匹配项。调用 `checkMatches` 即完成此操作。我们还需要让最近被选中的硬币重新开始旋转。`checkMatches`\
