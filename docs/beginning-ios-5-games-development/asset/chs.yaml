- '# 我们将专门为 iPhone 开发一款应用，不过你也能在“设备家族”下拉菜单中选择 iPad 或 Universal。点击“下一步”后，系统会提示你选择项目的保存位置。项目可以保存在电脑上的任意位置。


  在继续之前，我们先花点时间了解一下 Xcode 项目的组织结构。


  ## 项目的文件结构


  保存新项目后，Xcode 会在你选定的文件夹内创建一个新的子文件夹。这个子文件夹将包含项目文件。以后如果需要，移动这个文件夹也不会影响项目。图 1-4 展示了
  Xcode 创建的文件。


  **图 1-4.** *Xcode 创建的文件*


  在图 1-4 中，我们看到一个 Finder 窗口，显示了创建的文件结构。我选择了将项目保存在桌面上，因此 Xcode 创建了一个名为 `Sample 1` 的根文件夹，其中包含
  `Sample 1.xcodeproj` 文件。`xcodeproj` 文件用于向 Xcode 描述项目，所有资源默认都是相对于该文件路径的。项目保存后，Xcode
  会自动打开你的新项目，然后你就可以根据需要开始自定义项目了。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/00061.png)


