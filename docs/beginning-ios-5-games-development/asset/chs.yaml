- "# 第 5 章：快速构建逐帧游戏\n\n### 列表 5–1. `Example01Controller.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\
  #import <QuartzCore/CADisplayLink.h>\n#import \"Viper01.h\"\n\n@interface Example01Controller\
  \ : UIViewController {\n    CADisplayLink* displayLink;\n    Viper01* viper;\n}\n\
  \n-(void)updateScene;\n-(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer;\n\
  @end\n```\n\n在列表 5–1 中，我们看到该类继承自`UIViewController`，并包含两个字段。第一个字段名为`displayLink`，类型为`CADisplayLink`，该类型从`QuartzCore`框架中导入。第二个字段名为`viper`，类型为`Viper01`，用于表示飞船。此外，还定义了两个任务：第一个是`updateScene`，用于更新构成场景的`UIViews`；第二个是`viewTapped`，用于管理用户输入。让我们看看列表\
  \ 5–2 中的`Viper01`头文件，了解飞船是如何表示的。\n\n### 列表 5–2. `Viper01.h`\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n\n@interface Viper01 : UIImageView {\n}\n\n@property\
  \ float speed;\n@property CGPoint moveToPoint;\n\n-(void)updateLocation;\n@end\n\
  ```\n\n在列表 5–2 中，我们看到`Viper01`继承自`UIImageView`，并包含两个属性。`speed`属性描述了毒蛇的移动速度，`moveToPoint`属性则记录了飞船在屏幕上的目标移动点。任务`updateLocation`负责逐步更新飞船的位置。\n\
  \n### 实现类\n\n我们已经了解了本示例中将要使用的类的定义，现在来看看具体实现，首先从列表 5–3 中`Example01Controller`类的`viewDidLoad`任务开始。\n\
  \n### 列表 5–3. `Example01Controller.m` (viewDidLoad)\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    [self setTitle:@\"简单移动\"];\n    UITapGestureRecognizer*\
  \ tapRecognizer = [[UITapGestureRecognizer alloc]\n        initWithTarget:self action:@selector(viewTapped:)];\n\
  \    [self.view addGestureRecognizer:tapRecognizer];\n\n    viper = [Viper01 new];\n\
  \    CGRect frame = [self.view frame];\n    viper.center = CGPointMake(frame.size.width/2.0,\
  \ frame.size.height/2.0);\n    [self.view addSubview:viper];\n    [viper setMoveToPoint:viper.center];\n\
  \n    displayLink = [CADisplayLink displayLinkWithTarget:self\n                \
  \                            selector:@selector(updateScene)];\n    [displayLink\
  \ addToRunLoop:[NSRunLoop currentRunLoop]\n                      forMode:NSDefaultRunLoopMode];\n\
  }\n```\n\n在列表 5–3 中，设置标题后，我们创建了一个`UITapGestureRecognizer`，并将其添加到与该`UIViewController`关联的根`UIView`上。将`UITapGestureRecognizer`添加到`UIView`中，当用户点击屏幕时，会调用`viewTapped:`任务，从而让我们有机会更新飞船的移动目标位置。\n\
  \n下一步是创建`Viper01`的新实例，并将其放置在根`UIView`的中心。我们还将`viper`的`moveToPoint`属性设置为屏幕中心，这样毒蛇一开始就保持静止。\n\
  \n最后要做的是指定一个需要周期性调用的任务，以便更新飞船的位置并创建动画。我们通过创建一个`CADisplayLink`并指定`updateScene`任务来实现这一点。一旦调用`addToRunLoop`，每次屏幕刷新时都会调用`updateScene`。下一节我们将研究`CADisplayLink`和`NSRunLoop`类，了解它们的具体作用。接下来，我们看看列表\
  \ 5–4 中的`updateScene`。\n\n### 列表 5–4. `Example01Controller.m` (updateScene)\n\n\
  ```objc\n-(void)updateScene{\n    [viper updateLocation];\n}\n```\n\n在列表 5–4 中，任务`updateScene`只是简单地调用了对象`viper`的`updateLocation`方法。在后续的示例中，我们会在`updateScene`任务中做更多操作，但这里我们只关注如何实现单艘飞船的移动。\n\
  \n### 移动飞船\n\n每次调用`updateScene`时，都需要更新飞船的位置。这需要通过一些几何计算来确定飞船在动画每一帧的新位置。我们来看看`updateLocation`，了解该任务如何移动飞船。见列表\
  \ 5–5。\n\n### 列表 5–5. `Viper01.m` (updateLocation)\n\n```objc\n-(void)updateLocation{\n\
  \    CGPoint c = [self center];\n    float dx = (moveToPoint.x - c.x);\n    float\
  \ dy = (moveToPoint.y - c.y);\n    float theta = atan(dy/dx);\n    float dxf = cos(theta)\
  \ * self.speed;\n    float dyf = sin(theta) * self.speed;\n    if (dx < 0){\n  \
  \      dxf *= -1;\n        dyf *= -1;\n    }\n    c.x += dxf;\n    c.y += dyf;\n\
  \    if (abs(moveToPoint.x - c.x) < speed && abs(moveToPoint.y - c.y) < speed){\n\
  \        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n    }\n    [self setCenter:c];\n\
  }\n```\n\n在列表 5–5 中，我们看到`Viper01`类的`updateLocation`任务。该任务负责将飞船向`moveToPoint`方向移动一帧的距离。由于类`Viper01`继承自`UIImageView`，我们只需设置用于指定其相对于父视图位置的标准属性即可移动它。我们可以使用`frame`属性，但还有一个名为`center`的属性，它是操作`UIView`框架的简写方式。\n\
  \n我们首先获取飞船当前中心点的副本，并将其存储在变量`c`中，然后开始计算新的中心位置。接下来，我们计算当前位置与目标位置在 X 轴和 Y 轴上的差值，分别存储在`dx`和`dy`中。查阅高中几何教材后，我们通过将`dy`除以`dx`并将结果传递给`atan`（反正切）函数，计算出描述移动方向的角度，结果存储在`theta`中。\n\
  \n我们希望飞船以`speed`个点的速度向`theta`方向移动。为了计算 X 和 Y 方向上的具体位移，需要进行一些几何运算。要计算 X 方向上的位移，我们取`theta`的余弦值乘以`speed`，结果存储在`dxf`中。类似地，要计算本帧在\
  \ Y 方向上的位移，我们取`theta`的正弦值乘以`speed`，结果存储在`dyf`中。为了最终确定这些值，我们检查`dx`是否为负值；如果是，则反转`dxf`和`dyf`的符号。\n\
  \n计算出`dxf`和`dyf`后，将它们分别加到变量`c`的`x`和`y`分量上。最后要做的是用`c`中的新值设置`center`属性。然而，如果飞船距离`moveToPoint`不到`speed`个点，就会超过目标点。我们不希望超过目标点，因为下一帧它会向相反方向再次超调，导致飞船在屏幕上抖动。为了解决这个问题，当飞船接近目标点时，我们直接将\
  \ X 和 Y 值设置为与`moveToPoint`的 X 和 Y 值相同。图 5–5 展示了所涉及的几何关系。\n\n### 图 5–5. `updateLocation`任务涉及的几何关系\n\
  \n在图 5–5 中，我们看到 X 轴和 Y 轴，原点位于左上角，Y 轴正方向向下。飞船的框架显示为灰色矩形，起始中心点位于其中间。虚线三角形说明了如何根据`dx`、`dy`以及目标点的位置计算`theta`。黑色箭头的长度为`speed`，显示了一帧后中心点应处的位置。点状三角形展示了如何根据角度计算`dxf`和`dyf`。\n\
  \n### 响应用户点击\n\n\n\n"
- '# 现在我们知道了如何让飞船逐帧移动。


  但我们还没有探讨如何告诉飞船*往哪里*移动。回顾一下，我们在`Example01Controlller`的根`UIView`上注册了一个`UITapGestureRecognizer`。这个`UITapGestureRecognizer`被配置为调用`viewTapped:`方法，如代码清单
  5–6 所示。


  **代码清单 5–6.** *Example01Controller.m (viewTapped:)*


  ```

  -(void)viewTapped:(UIGestureRecognizer*)aGestureRecognizer{


  UITapGestureRecognizer* tapRecognizer = (UITapGestureRecognizer*)aGestureRecognizer;
  CGPoint tapPoint = [tapRecognizer locationInView:self.view];


  [viper setMoveToPoint: tapPoint];


  }

  ```


  在代码清单 5–6 中，我们在`viewTapped:`中做的第一件事是将传入的`UIGestureRecognizer`强制转换为`UITapGestureRecognizer`。然后，我们通过调用`locationInView:`找到点击在根视图中发生的位置。一旦获得了点击发生的位置，我们只需设置`viper`对象上的`moveToPoint`属性。请注意，我们无需中断任何已有的动画——只需更新`viper`对象的状态，当它的`updateLocation`方法再次被调用时，它就会开始向这个新点移动。这是一个非常简单的例子，但我希望它能说明逐帧动画相较于上一章我们看到的预定义动画的优势。


  我们已经了解了这个简单动画是如何设置的，以及它是如何通过代码清单 5–4 中重复调用`updateScene`来驱动的。我们应该花点时间理解负责实现这些重复调用的类。


  ### 理解 `CADisplayLink` 和 `NSRunLoop`


  通常，要创建流畅的动画，画面每秒至少需要更新 25 次，以避免人眼看到单独的帧。这意味着我们的游戏必须找到一种方法，以每秒 25 次的频率调用`updateScene`才能实现流畅的动画。这可以通过创建一个以任意速率调用`updateScene`的`NSTimer`来实现。然而，如果我们这样做，更新场景的代码就不一定能与硬件的屏幕原生刷新率同步。Core
  Animation 框架提供了一个专门用来创建我们正在尝试实现的这种动画的类：`CADisplayLink`。


  在代码清单 5–3 中，我们创建了一个`CADisplayLink`，指定它应该在屏幕准备好重绘时调用`updateScene`。然后，我们通过调用`NSRunLoop`类的`currentRunLoop`方法，将这个`CADisplayLink`添加到调用`viewDidLoad`的同一个运行循环中。`NSRunLoop`类管理一个线程，以产生图
  5–1 所示的那种循环。`NSRunLoop`负责处理来自用户和`CADisplayLink`的输入，并调度何时应调用`Example01Controller`中对应的方法。我们不需要过多了解`NSRunLoop`的工作原理；只需理解`viewTapped:`和`updateScene`方法将会由同一个线程调用，这样我们就不必担心多线程的复杂性了。


  如前所述，`CADisplayLink`与我们主线程的`NSRunLoop`协同工作，使得每次屏幕重绘时`updateScene`方法被调用一次。`CADisplayLink`的`duration`属性以秒为单位报告每次屏幕重绘之间的时间。稍微探究一下可以发现，该属性在每次调用`updateScene`时报告的值略有不同，但大致在`0.0166648757`秒附近波动。这个值略低于每秒
  60 帧，所以远高于所需的每秒 25 帧标准。


  在更复杂的应用中，游戏状态完全有可能无法在 1.5 毫秒内更新完成；可能只是维护的数据太多了。如果是这种情况，你可以将`CADisplayLink`的`frameInterval`属性设置为大于
  1 的值。这将导致`CADisplayLink`跳过一些屏幕重绘。图 5–6 展示了使用`CADisplayLink`时可能出现的四种不同情况。


  **图 5–6.** *屏幕刷新场景*


  在图 5–6 中，我们看到左侧列出了四个场景。每个场景的右侧有一些点，代表了该场景中的屏幕刷新次数。看最上面的场景，在屏幕刷新之间没有需要处理的工作，每个点等距分布，这意味着随着时间的推移，屏幕以均匀的间隔进行刷新。第二个场景展示了屏幕刷新之间有一些工作要做的情况，用每个点向右延伸的线条表示。每条线的长度小于每个点之间的距离，表明工作是在屏幕刷新的间隔时间内完成的。第三个场景展示了屏幕刷新之间需要完成的工作太多，而程序员没有考虑到这一点的情况。每次工作耗时超过屏幕刷新的正常时间间隔时，下一帧的绘制就会被延迟。


  由于帧间更新游戏所需的时间会变化，屏幕刷新的速率就会变得不规律。当屏幕刷新不规律时，动画看起来就会断断续续，给用户带来糟糕的体验。为了避免这种情况，我们通过将`frameInterval`设置为`2`，配置`CADisplayLink`每隔一帧才触发一次更新。这让我们完成工作的时间翻倍，从而能够实现流畅的动画。


  这种策略对某些开发者来说可能反直觉，因为在第四个场景中，可能会出现长时间没有工作在进行的情况。实际上，在给定的时间段内，场景 3 渲染的帧数比场景 4 要多。但事实是，对用户而言，断断续续的更新几乎总是比一个运行不那么快的游戏更令人厌烦。还要记住，iOS
  设备的原生刷新率是每秒 60 帧，所以即使每隔一帧被跳过，动画速率仍然能达到每秒 30 帧。这足以创造出令人信服的动画效果。


  我们已经了解了一个简单的逐帧动画，现在你应该理解了基本原理。接下来的两个例子将基于这种模式进行构建，创建包含屏幕上多个物体的动画，并做一些重构工作，开始搭建一个适用于复杂游戏的框架。


  ## 抽象用户界面


  在前面的例子中，我们了解了创建逐帧动画的基础知识。我们看到了如何使用`CADisplayLink`类与现有的事件循环结合，来调用一个可以实现动画的方法。我们根据用户输入在屏幕上动画显示了一个单独的图像。这是一个非常简单的例子。我略过了一些实际问题，以便我们能专注于以这种方式创建动画的基本理念。在本节中，我们将做一些重构，以便更好地支持更复杂的游戏。图
  5–7 展示了我们将要构建的例子。


  **图 5–7.** *抽象化用户界面*


  在图 5–7 中，我们看到与第一个例子相比有一些不同。首先需要注意的一点是，游戏的可玩区域并未占满整个屏幕。屏幕底部的滑块可以改变可玩区域的大小，而不会影响游戏的玩法。


  屏幕上还有第二个物体，一颗小行星。小行星每 10 秒生成一颗，从屏幕顶部开始，垂直向下移动。如果小行星发生碰撞




  '
- "# 与飞船\n\n飞船将重置到屏幕中央，小行星则被移除。这个简单游戏的目标是躲避迎面而来的小行星。\n\n本节的目标之一是解释如何将游戏逻辑与屏幕绘制逻辑分离开。在第一个示例中，我们直接继承了`UIImageView`并添加了关于飞船的逻辑。这种方法虽然可行，但将游戏逻辑与其显示方式分离有很多充分的理由。首先，如果你想在\
  \ iPad 而不是 iPhone 上运行这个游戏，你很可能希望扩大游戏区域。此外，为了支持诸如游戏内缩放或显示小地图等功能，以不依赖于显示方式的方式存储游戏中每个物体的位置是合理的。将来，你可能会决定将游戏移植到另一个平台。在这种情况下，清晰分离游戏逻辑和显示逻辑将为你节省大量工作。\n\
  \n为了支持这种游戏逻辑与显示逻辑之间的抽象，我们引入了一个名为`Actor02`的新类。通常这个类会直接叫做`Actor`。名称中的`02`仅表示它是本章第二个示例的一部分。下一节将解释什么是\
  \ actor，以及它如何帮助实现游戏逻辑与显示之间的抽象。\n\n## 理解 Actors\n\nActor 是游戏中移动的物体。在我们的例子中，飞船和小行星都是\
  \ actor。这区别于游戏中可能存在的其他东西，比如用于显示分数的标签或其他组件。\n\nActor 有时被称为精灵，但我更倾向于使用 actor 这个词，因为精灵一词也可以指代用于显示游戏物体的图像。在日常交流中，使用哪个术语差别不大——但我们就称它们为\
  \ actor。\n\n## Example2Controller 概览\n\n在我们的示例中，我们将定义类`Actor02`，并展示如何继承`Actor02`来创建我们的游戏物体：飞船和小行星。代码清单\
  \ 5-7 展示了`Actor02`类的头文件。\n\n### 代码清单 5-7. *Actor02.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@class Example02Controller;\n\nlong nextId;\n\n@interface Actor02 : NSObject {\n\
  \n}\n\n@property (nonatomic, retain) NSNumber* actorId;\n\n@property (nonatomic)\
  \ CGPoint center;\n\n@property (nonatomic) float speed;\n\n@property (nonatomic)\
  \ float radius;\n\n@property (nonatomic, retain) NSString* imageName;\n\n-(id)initAt:(CGPoint)aPoint\
  \ WithRadius:(float)aRadius AndImage:(NSString*)anImageName;\n\n-(void)step:(Example02Controller*)controller;\n\
  \n-(BOOL)overlapsWith: (Actor02*) actor;\n\n@end\n```\n\n在代码清单 5-7 中，我们看到`Actor02`类的头文件。其中有五个属性代表了本例所需的基本属性。属性`actorId`用于标识\
  \ actor；我们将会看到如何利用它把每个`Actor02`映射到一个`UIImageView`上。\n\n属性`center`告诉我们每个`Actor02`的位置。属性`speed`表示这个\
  \ actor 的移动速度。属性`radius`代表这个 actor 的大小。最后，属性`imageName`描述了这个 actor 应该如何绘制在屏幕上。\n\
  \n属性`center`的类型是`CGPoint`。严格来说，我们不会直接用这个`CGPoint`来设置`UIView`或其他 Core Graphics 组件的位置。但`CGPoint`是一种封装\
  \ X 和 Y 值的简单方式，而且我们已经对它很熟悉了。对于本例来说，使用`CGPoint`还是我们自定义的结构体来表示一个点，差别不大。然而，如果你想确保代码完全不依赖于\
  \ Core Graphics，你就需要定义自己的类型来表示点。\n\n在代码清单 5-7 中还需注意的是，一个`Actor02`没有宽度或高度，只有一个半径。这样做是为了简化示例，而且许多游戏只需要一个维度来描述\
  \ actor 的大小。如果你构建自己的游戏框架，你可能会选择让 actor 包含宽度和高度——这完全取决于游戏。当然，如果你查看预构建的游戏引擎，会发现它们的基础类型具有各种你可能用上也可能用不上的功能。使用游戏引擎也许很有道理，但在这里，我们为了理解而牺牲了复杂性。\n\
  \n## 一个简单的 Actor\n\n代码清单 5-7 显示`Actor02`定义了三个任务。代码清单 5-8 展示了这些任务的实现。\n\n### 代码清单\
  \ 5-8. *Actor02.m*\n\n```\n#import \"Actor02.h\"\n\n@implementation Actor02\n\n\
  @synthesize actorId;\n\n@synthesize center;\n\n@synthesize speed;\n\n@synthesize\
  \ radius;\n\n@synthesize imageName;\n\n-(id)initAt:(CGPoint)aPoint WithRadius:(float)aRadius\
  \ AndImage:(NSString*)anImageName{\n\nself = [super init];\n\nif (self != nil){\n\
  \n[self setActorId:[NSNumber numberWithLong:nextId++]];\n\n[self setCenter:aPoint];\n\
  \n[self setRadius:aRadius];\n\n[self setImageName:anImageName];\n\n}\n\nreturn self;\n\
  \n}\n\n-(void)step:(Example02Controller*)controller{\n\n//由子类实现。\n\n}\n\n-(BOOL)overlapsWith:\
  \ (Actor02*) actor {\n\nfloat xdist = abs(self.center.x - actor.center.x);\n\nfloat\
  \ ydist = abs(self.center.y - actor.center.y);\n\nfloat distance = sqrtf(xdist*xdist+ydist*ydist);\n\
  \nreturn distance < self.radius + actor.radius;\n\n}\n\n@end\n```\n\n在代码清单 5-8 中，我们看到`Actor02`类的实现。任务`initAt:WithRadius:AndImage:`用于使用一些基本信息初始化`Actor02`。该任务还通过使用`nextId`值并递增它来分配一个随机的`actorId`值。由于`nextId`的类型是`long`，你需要创建数量惊人的\
  \ actor 才能让两个 actor 拥有相同的 id。\n\n任务`step:`接收一个`Example02Controller`的实例，用于逐步更新这个`Actor02`的位置和状态。子类将提供该任务的实现，以实现自定义行为和动画。\n\
  \n最后一个任务`overlapsWith:`用于检查这个`Actor02`是否与另一个`Actor02`重叠。本例中，该任务用于碰撞检测。\n\n## Actor\
  \ 子类：Viper02\n\n我们知道，本例中有两种类型的 actor：小行星和飞船。让我们看看`Viper02`类，并了解它与`Viper01`有何不同。`Viper02`的头文件如代码清单\
  \ 5-9 所示。\n\n### 代码清单 5-9. *Viper02.h*\n\n```\n@class Example02Controller;\n\n@interface\
  \ Viper02 : Actor02 {\n\n}\n\n@property CGPoint moveToPoint;\n\n+(id)viper:(Example02Controller*)controller;\n\
  \n-(void)doCollision:(Actor02*)actor In:(Example02Controller*)controller;\n\n@end\n\
  ```\n\n在代码清单 5-9 中，我们看到`Viper02`的头文件与代码清单 5-2 中所示的`Viper01`没有太大区别。`Viper02`继承的是`Actor02`类，而非`UIImageView`。我们拥有属性`moveToPoint`，这与之前一样，但属性`speed`缺失了，因为它继承自`Actor02`。我们有一个新的构造方法来简化`Viper02`的创建，以及一个名为`doCollision:In:`的新任务，用于处理与小行星碰撞的新功能。代码清单\
  \ 5-10 展示了`Viper02`类的实现。\n\n### 代码清单 5-10. *Viper02.m*\n\n```\n#import \"Viper02.h\"\
  \n\n#import \"Example02Controller.h\"\n\n@implementation Viper02\n\n@synthesize\
  \ moveToPoint;\n\n+(id)viper:(Example02Controller*)controller{\n\nCGSize gameAreaSize\
  \ = [controller gameAreaSize];\n\nCGPoint center = CGPointMake(gameAreaSize.width/2,\
  \ gameAreaSize.height/2); Viper02* viper = [[Viper02 alloc] initAt:center WithRadius:16\
  \ AndImage:@\"viper\"];\n\n[viper setMoveToPoint:center];\n\n[viper setSpeed:.8];\n\
  \nreturn [viper autorelease];\n\n}\n```\n\n\n```markdown\n\n- (void)step:(Example02Controller*)controller\
  \ {\n\n    CGPoint c = [self center];\n\n    float dx = (moveToPoint.x - c.x);\n\
  \n    float dy = (moveToPoint.y - c.y);\n\n    float theta = atan(dy / dx);\n\n\
  \    float dxf = cos(theta) * self.speed;\n\n    float dyf = sin(theta) * self.speed;\n\
  \n    if (dx < 0) {\n        dxf *= -1;\n        dyf *= -1;\n    }\n\n    c.x +=\
  \ dxf;\n    c.y += dyf;\n\n    if (abs(moveToPoint.x - c.x) < self.speed && abs(moveToPoint.y\
  \ - c.y) < self.speed) {\n        c.x = moveToPoint.x;\n        c.y = moveToPoint.y;\n\
  \    }\n\n    [self setCenter:c];\n}\n\n- (void)doCollision:(Actor02*)actor In:(Example02Controller*)controller\
  \ {\n\n    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint centerOfGame\
  \ = CGPointMake(gameAreaSize.width / 2, gameAreaSize.height / 2);\n    self.center\
  \ = centerOfGame;\n    self.moveToPoint = centerOfGame;\n    [controller removeActor:actor];\n\
  }\n\n@end\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00480.png)\n\
  \n# 第 5 章：快速构建逐帧游戏\n\n在代码清单 5-10 中，我们看到构造函数任务`viper:`创建了一个新的`Viper02`对象，并使用父任务`initAt:WithRadius:AndImage`来设置对象的基本属性。此外，属性`moveToPoint`被设置为其当前位置，速度设置为\
  \ 0.8。\n\n任务`step:`是每帧动画调用一次的任务。该任务的实现与类`Actor01`中的任务`updateLocation:`的实现相同，如代码清单\
  \ 5-5 所示。\n\n代码清单 5-10 中的最后一个任务是`doCollision:In:`，当该`Viper02`与`Asteroid02`重叠时调用。该任务将`Viper02`重置回游戏区域中心的起始位置，并从游戏中移除违规的`Asteroid02`。\n\
  \n### Actor 子类：Asteroid02\n\n在查看了类`Viper02`之后，可能不清楚它与`Viper01`到底有何不同。当然，有些事情发生了变动，但它看起来非常相似：它仍然主要负责更新一个中心点。在查看了类`Asteroid02`之后，我们将看到这些\
  \ actor 类是如何用于描述一个场景，而不是场景本身。类`Asteroid02`的头文件如代码清单 5-11 所示。\n\n**代码清单 5-11.** *Asteroid02.h*\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"Actor02.h\"\n\nNSMutableArray*\
  \ imageNameVariations;\n\n@interface Asteroid02 : Actor02 {\n}\n\n+(NSMutableArray*)imageNameVariations;\n\
  +(id)asteroid:(Example02Controller*)controller;\n\n@end\n```\n\n在代码清单 5-11 中，类`Asteroid02`的头文件显示它继承了`Actor02`，并有两个静态任务。还有一个名为`imageNameVariations`的数组。该数组与任务`imageNameVariations`结合，允许我们创建图形相似但略有不同的`Asteroid02`。让我们看看这个类的实现，了解一下这意味着什么，如代码清单\
  \ 5-12 所示。\n\n**代码清单 5-12.** *Asteroid02.m*\n\n```\n#import \"Asteroid02.h\"\n#import\
  \ \"Example02Controller.h\"\n\n@implementation Asteroid02\n\n+(id)asteroid:(Example02Controller*)controller{\n\
  \n    CGSize gameAreaSize = [controller gameAreaSize];\n    float radius = arc4random()%8+8;\n\
  \    float x = radius + arc4random()%(int)(gameAreaSize.width+radius*2);\n    CGPoint\
  \ center = CGPointMake(x, -radius);\n    NSString* imageName = [[Asteroid02 imageNameVariations]\n\
  \                           objectAtIndex:arc4random()%3];\n    Asteroid02* asteroid\
  \ = [[Asteroid02 alloc] initAt:center WithRadius:radius AndImage:imageName];\n \
  \   float speed = (arc4random()%10)/10.0 + .1;\n    [asteroid setSpeed: speed];\n\
  \    return asteroid;\n\n}\n\n+(NSMutableArray*)imageNameVariations{\n    if (imageNameVariations\
  \ == nil){\n        imageNameVariations = [NSMutableArray new];\n        [imageNameVariations\
  \ addObject:@\"AsteroidA\"];\n        [imageNameVariations addObject:@\"AsteroidB\"\
  ];\n        [imageNameVariations addObject:@\"AsteroidC\"];\n    }\n    return imageNameVariations;\n\
  }\n\n-(void)step:(Example02Controller*)controller{\n    CGPoint newCenter = self.center;\n\
  \    newCenter.y += self.speed;\n    self.center = newCenter;\n    if (newCenter.y\
  \ - self.radius > controller.gameAreaSize.height){\n        [controller removeActor:\
  \ self];\n    }\n}\n\n@end\n```\n\n在代码清单 5-12 中，构造函数任务`asteroid:`创建了一个新的`Asteroid02`对象并设置了其初始状态。为了增加多样性，每个小行星被分配一个随机的半径和随机的\
  \ X 位置。起始 Y 位置被设置为负半径，因此小行星从游戏区域顶部之外开始。每个`Asteroid02`还被分配了一个随机速度。\n\n任务`step:`实现了`Asteroid02`的运动——它只是将属性`center`的\
  \ Y 值增加`speed`，直到到达游戏区域底部，此时它将自己从游戏中移除。\n\n如前所述，我们希望用于表示`Asteroid02`的图形也有一定变化。为了实现这一点，我们有任务`imageNameVariations`，它惰性地填充全局的`NSMutableArray`\
  \ `imageNameVariations`。在任务`asteroid:`中，从这个数组中随机抽取一个字符串，并设置为小行星的图形。图 5-8 显示了本例中使用的图像文件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00005.png)\n\n![](img/00085.jpeg)\n\
  \n![](img/00124.jpeg)\n\n**图 5–8.** *用于 actor 的图像*\n\n在图 5-8 中，我们看到了本例中用于 actor\
  \ 的图像。每个图像由类`Actor02`的属性`imageName`指定。对于小行星，我们提供了三个不同的图像，它们被随机分配给每个新的`Asteroid02`对象。\n\
  \n我们已经了解了 actor 类，并看到了它们如何存储游戏中每个项目的基本信息。现在，我们来看看这些类是如何绘制在屏幕上的。\n\n### 在屏幕上绘制 Actor\n\
  \n现在我们有了本例中涉及的 actor 的基本展示。将它们绑定在一起以创建我们游戏的类是`Example02Controller`。与其他`UIViewController`类一样，`Example02Controller`负责在屏幕上显示数据——在我们的例子中，是显示不同的\
  \ actor。`Example02Controller`的技巧在于创建和更新多个`UIImageView`，每个 actor 对应一个。图 5-9 显示了该\
  \ iPhone 版本的类在 Interface Builder 中的设置。\n\n**图 5–9.** *Interface Builder 中的 Example02Controller_iPhone.xin*\n\
