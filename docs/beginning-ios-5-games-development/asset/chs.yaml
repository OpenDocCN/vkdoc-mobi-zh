- "# 第 2 章：设置你的游戏项目\n\n**35**\n\n## 响应屏幕方向变化\n\n最后要做的是添加一些逻辑，根据设备的方向更改显示的 `UIView`。`UIViewController`\
  \ 类指定了一个在设备旋转时调用的任务。该任务名为 `shouldAutorotateToInterfaceOrientation:`，它会收到一个指示设备新方向的常量。通过向此任务添加逻辑，我们可以实现所需的行为类型。\n\
  \n当创建一个新的 `UIViewController` 时，该任务的实现会包含在实现文件中。我们创建 `ViewController` 类的子类并连接 XIB\
  \ 文件所做的工作，使我们能够使用 `shouldAutorotateToInterfaceOrientation:` 任务的单一实现。因此，打开 `ViewController_iPad.m`\
  \ 和 `ViewController_iPhone.m`，并删除 `shouldAutorotateToInterfaceOrientation:` 任务的实现。这将确保在两个设备上，我们都将使用\
  \ `ViewController` 类中的实现。代码清单 2-7 展示了为我们提供所需行为的实现。\n\n**代码清单 2–7.** *GameController.m\
  \ (shouldAutorotateToInterfaceOrientation:)*\n\n```objc\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientatio\n\
  {\n    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft ||\n    \
  \    interfaceOrientation == UIInterfaceOrientationLandscapeRight){\n\n        [portraitView\
  \ removeFromSuperview];\n        [self.view addSubview:landscapeView];\n       \
  \ [rockPaperScissorsController setup:landscapeHolderView.frame.size];\n        [landscapeHolderView\
  \ addSubview:rockPaperScissorsController.view];\n\n    } else {\n\n        [landscapeView\
  \ removeFromSuperview];\n        [self.view addSubview:portraitView];\n        [rockPaperScissorsController\
  \ setup:portraitHolderView.frame.size];\n        [portraitHolderView addSubview:rockPaperScissorsController.view];\n\
  \    }\n\n    // 返回 YES 表示支持的方向\n    return YES;\n}\n```\n\n在代码清单 2-7 中，我们看到此任务接收了变量\
  \ `interfaceOrientation`，指示设备的新方向。最后，我们返回 `YES`，因为所有方向都支持。如果你正在创建不支持所有方向的游戏，则对不希望支持的方向返回\
  \ `NO`。在返回值之前，我们测试 `interfaceOrientation` 以查看当前是横屏还是竖屏方向。\n\n由于设备实际上有四种方向，我们必须将\
  \ `interfaceOrientation` 与横屏右和横屏左进行比较。右/左指示符描述的是 Home 按钮的位置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00350.png)\n\n"
- '# 第 2 章：设置你的游戏项目


  **36**


  如果设备现在处于横屏方向，我们将 `portraitView` 从其父视图中移除——也就是说，将其从屏幕上移除。然后我们将视图 `landscapeView`
  添加到根视图。我们调用 `rockPaperScissorsController` 的 `setup` 方法，以便为其提供布局其子视图的机会（如果尚未布局）。最后，我们将
  `rockPaperScissorsController` 的视图属性作为子视图添加到 `landscapeHolder` 中。




  此任务在应用程序启动时被调用，即使设备发生旋转也是如此。这样我们就可以将所有与屏幕方向相关的逻辑集中在一个地方，因为无需处理初始化这个特殊情况。然而，根据这是否是第一次调用
  `shouldAutorotateToInterfaceOrientation:`，这些对象的状态会有所不同。例如，第一次调用此任务时，`portraitView`
  和 `landscapeView` 都尚未附加到场景中，因此对 `removeFromSubview` 的调用将是一个空操作，不会产生错误。当此任务在后续的屏幕旋转中被调用时，`rockPaperScissorsController`
  的视图将附加到场景中；不过，当一个视图被添加为子视图时，如果它已有父视图，会自动从其父视图中移除。


  `removeFromSuperview` 和 `addSubview:` 具有这些合理的默认行为，这使得操作视图变得非常容易，减少了容易出错的清理代码。


  如果运行该项目，你会看到应用在 iPad 和 iPhone 上都能运行，并根据屏幕方向改变布局。


  ## **总结**


  在本章中，我们了解了如何创建一个适合开发通用应用的 Xcode 项目。我们探索了 iOS 应用的初始化过程，并找到了从何处开始修改项目以创建我们想要的应用。我们研究了
  XIB 文件与类如何交互，以及 iOS 如何通过 `UIViewController` 类利用 MVC 模式。我们创建了一个应用，它能无缝支持在 iPhone
  或 iPad 上以所有屏幕方向运行，为游戏开发奠定了基础。


