  \ randomPointAround:gameCenter At:distanceFromCenter];\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00017.png)\n![](img/00048.png)\n\n**142**\n\n**第 6 章：创建你的角色：游戏引擎、图像角色和行为**\n\
  \n    ImageRepresentation* rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2\
  \ == 0];\n    [rep setStepsPerFrame:1 + arc4random()%3];\n\n    Powerup* powerup\
  \ = [[Powerup alloc] initAt:center WithRadius:32\n                            AndRepresentation:rep];\n\
  \    [rep setDelegate:powerup];\n    float rotation = arc4random()%100/100.0 * M_PI*2;\n\
  \    [powerup setRotation:rotation];\n    [powerup setVariant:arc4random()%PWR_VARIATION_COUNT];\n\
  \n    //省略部分，见代码清单 6-21\n    return [powerup autorelease];\n}\n```\n\n我们首先要计算出将传递给\
  \ `Actor` 的 `initAt:WithRadius:AndRepresentation` 任务的参数值。计算出这些值后，我们创建一个新的增强道具，然后设置一些初始值，例如增强道具的旋转角度和变体。在代码清单\
  \ 6-13 中被省略的部分，我们设置了增强道具的行为。这部分代码见代码清单 6-21，将在本节后面讨论。\n\n在深入 `ImageRepresentation`\
  \ 的细节之前，让我们先简单看一下我们是如何计算增强道具的中心位置的。`CGPoint` 类型的 `center` 是通过在屏幕边界外的一个圆上随机选取一个点来生成的，如图\
  \ 6-3 所示。\n\n**图 6-3.** *屏幕外的随机点*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00109.png)\n\n**第 6 章：创建你的角色：游戏引擎、图像角色和行为** **143**\n\n在这张图中，你可以看到灰色的矩形，其大小与变量\
  \ `gameSize` 相同。中间的圆点是 `CGPoint` 类型的 `gameCenter`。从 `gameCenter` 延伸至 `gameSize`\
  \ 左上角的黑色线段长度即为 `distanceFromCenter`。`distanceFromCenter` 的值是基于 `gameCenter` 的 `x`\
  \ 和 `y` 分量，通过勾股定理计算得出的。利用 `gameCenter` 和 `distanceFromCenter`，我们可以通过调用 `Actor` 类中的\
  \ `randomPointAround:At:` 方法（之前曾在代码清单 6-10 中展示）来获取外圆上的一个随机点。\n\n在代码清单 6-13 中，计算中心点并选择半径为\
  \ 32 之后，我们需要创建一个 `Representation` 对象来处理这个增强道具的绘制。因为我们想使用一系列图像来呈现增强道具，所以创建了一个名为 `rep`\
  \ 的 `ImageRepresentation` 实例，并设置了 `backwards` 和 `stepsPerFrame` 这两个属性。\n\n\n\n`ImageRepresentation`被传递给`Actor`的`initAt:WithRadius:AndRepresentation:`任务，以将`rep`设置为该增强道具的表现层。还需注意，我们将`Powerup`设置为`rep`的委托。这意味着我们正在创建的`Powerup`实例将用于指定绘制该演员所需的信息。\n\
  \n## 检查`ImageRepresentation`\n\n因为我们希望将关于演员的游戏逻辑与绘制方式分离，所以引入了`ImageRepresentation`类。这个类负责创建用`UIView`渲染演员所需的对象。主要来说，`ImageRepresentation`将使用\
  \ PNG 文件创建`UIImageViews`来绘制我们的演员。让我们看一下`ImageRepresentation`的头文件，如代码清单 6-14 所示。\n\
  \n**代码清单 6-14.** *ImageRepresentation.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n#import \"Actor.h\"\n\n@protocol ImageRepresentationDelegate\n\n@required\n\n\
  -(NSString*)baseImageName;\n\n@optional\n\n-(int)getFrameCountForVariant:(int)aVariant\
  \ AndState:(int)aState;\n\n-(NSString*)getNameForVariant:(int)aVariant;\n\n-(NSString*)getNameForState:(int)aState;\n\
  \n@end\n\n@interface ImageRepresentation : NSObject<Representation> {\n\nUIView*\
  \ view;\n\n}\n\n@property (nonatomic, assign) NSObject<ImageRepresentationDelegate>*\
  \ delegate;\n\n@property (nonatomic, retain) NSString* baseImageName;\n\n@property\
  \ (nonatomic) int currentFrame;\n\n@property (nonatomic) BOOL backwards;\n\n@property\
  \ (nonatomic) int stepsPerFrame;\n\n+(id)imageRep;\n\n+(id)imageRepWithName:(NSString*)aBaseImageName;\n\
  \n+(id)imageRepWithDelegate:(NSObject<ImageRepresentationDelegate>*)aDelegate;\n\
  \n-(void)advanceFrame:(Actor*)actor ForStep:(int)step;\n\n-(NSString*)getImageNameForActor:(Actor*)actor;\n\
  \n-(UIImage*)getImageForActor:(Actor*)actor;\n\n@end\n```\n\n`ImageRepresentation`类的目标是封装用于处理表示演员的常见图片方式的代码。这些方式包括以下几种情况：\n\
  \n- 单张图片表示演员\n- 一系列图片表示演员\n- 具有多种状态的演员\n- 具有多种变体的演员\n- 针对每种状态和变体组合，具有不同数量图片的演员\n\
  \n每个我们创建的、使用`ImageRepresentation`的演员都将符合上述情况之一。我们通过设置一个`ImageRepresentationDelegate`类型的委托来指明我们打算使用哪种情况，如代码清单\
  \ 6-14 所示。这使得`ImageRepresentationDelegate`的实例能够指明在任意时刻应使用的图片名称。\n\n`ImageRepresentationDelegate`必须指定一个`baseImageName`，它被用于`ImageRepresentation`的所有用例。如果`ImageRepresentationDelegate`只实现了`baseImageName:`，这表明对于该演员的所有实例都将使用单张图片。如果要使用一系列图片，委托对象必须实现任务`getFrameCountForVariant:AndState:`。如果要根据演员的状态或变体使用不同的图片序列，委托则必须分别实现`getNameForState:`和`getNameForVariant:`。从技术上讲，如果只使用单张图片来表示特定类型的所有演员，则无需为`ImageRepresentation`指定委托。然而，`ImageRepresentation`仍然需要指定`baseImageName`。\n\
  \n## 创建`Powerup`的实现\n\n`Powerup`类必须定义其绘制方式以及基本行为。由于`Powerup`类将为每种状态和变体的组合使用不同的图片序列，因此`ImageRepresentation`的委托必须实现全部这四个任务。\n\
  \n为简单起见，我们指定`Powerup`类遵循`ImageRepresentationDelegate`协议。让我们看一下这些方法在代码清单 6-15 中的实现。\n\
  \n**代码清单 6-15.** *Powerup.m（`ImageRepresentationDelegate` 任务）*\n\n```\n-(NSString*)baseImageName{\n\
  \nreturn @\"powerup\";\n\n}\n\n-(int)getFrameCountForVariant:(int)aVariant AndState:(int)aState{\n\
  \nreturn 63;\n\n}\n\n-(NSString*)getNameForVariant:(int)aVariant{\n\nif (aVariant\
  \ == VARIATION_HEALTH){\n\nreturn @\"health\";\n\n} else if (aVariant == VARIATION_CASH){\n\
  \nreturn @\"cash\";\n\n} else if (aVariant == VARIATION_DAMAGE){\n\nreturn @\"damage\"\
  ;\n\n} else {\n\nreturn nil;\n\n}\n\n}\n\n-(NSString*)getNameForState:(int)aState{\n\
  \nif (aState == STATE_GLOW){\n\nreturn @\"glow\";\n\n} else if (aState == STATE_NO_GLOW){\n\
  \nreturn @\"noglow\";\n\n} else {\n\nreturn nil;\n\n}\n\n}\n```\n\n在这个列表中，我们看到`ImageRepresentationDelegate`为了创建由针对每种状态和变体组合的不同图片序列表示的演员所需的四个任务。任务`baseImageName`返回字符串`@\"\
  powerup\"`，表明该演员的所有图片都将以`\"powerup\"`开头。任务`getFrameCountForVariant:AndState:`简单地返回`63`，因为每种状态和变体组合都有\
  \ 63 张图片。其他类型的演员可能希望为每种状态和变体组合设置不同数量的图片，并且可以在`getFrameCountForVariant:AndState:`中自由返回不同的数字。\n\
  \n任务`getNameForVariant:`和`getNameForState:`为适用于增强道具的每种变体和状态返回字符串表示，使得`ImageRepresentation`能够准确计算出在给定时间应该使用哪张图片。\n\
  \n## 查找演员的正确图片\n\n让我们看一下`ImageRepresentation`的任务`getImageNameForActor:`，以便你了解如何利用`ImageRepresentationDelegate`的四个任务来确定图片名称。参见代码清单\
  \ 6-16。\n\n**代码清单 6-16.** *ImageRepresentation.m（`getImageNameForActor:`）*\n\n```\n\
  -(NSString*)getImageNameForActor:(Actor*)actor{\n\nNSString* imageName = baseImageName;\n\
  \nif (imageName == nil){\n\nimageName = [delegate baseImageName];\n\n}\n\nNSString*\
  \ variant = nil;\n\nif ([delegate respondsToSelector:@selector(getNameForVariant:)]){\n\
  \nvariant = [delegate getNameForVariant:[actor variant]];\n\n}\n\nNSString* state\
  \ = nil;\n\nif ([delegate respondsToSelector:@selector(getNameForState:)]){\n\n\
  state = [delegate getNameForState:[actor state]];\n\n}\n\nint frameCount = 0;\n\n\
  if ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n\
  \nframeCount = [delegate getFrameCountForVariant:[actor variant] AndState:[actor\
  \ state]];\n\n}\n\nif (variant != nil){\n\nimageName = [[imageName stringByAppendingString:@\"\
  _\"]\n\nstringByAppendingString:variant];\n\n}\n\nif (state != nil){\n\nimageName\
  \ = [[imageName stringByAppendingString:@\"_\"]\n\nstringByAppendingString:state];\n\
  \n}\n\nif (frameCount != 0){\n\nimageName = [[imageName stringByAppendingString:@\"\
  _\"]\n\nstringByAppendingString:[NSString stringWithFormat:@\"%04d\", currentFrame]\
  \ ];\n\n}\n\nreturn imageName;\n\n}\n```\n\n这里的目标是确定应用于表示该演员的正确图片名称。最终的图片名称将存储在变量`imageName`中。首先我们要做的是确定`baseImageName`。这可以是`ImageRepresentation`的`baseImageName`属性，也可以来自委托。\n\
  \n下一步是获取演员变体的字符串表示。我们测试委托是否响应任务`getNameForVariant:`。如果是，我们将`variant`赋值给结果。我们遵循相同的模式来获取状态的字符串表示。\n\
  \n\n\n# 最后一块拼图：图片名称解析\n\n我们需要委托完成的最后一项工作是确定该角色在特定状态和变体下是由单张图片还是由一系列图片表示的。如果委托响应了\
  \ `getFrameCountForVariation:AndState:` 方法，我们就将返回值记录在 `frameCount` 中。如果委托没有响应 `getFrameCountForVariation:AndState:`\
  \ 方法，或者该方法返回值为零，则表示我们不应在最终图片名称中包含帧编号。\n\n在调用 `getFrameCountForVariation:AndState:`\
  \ 之后，我们就掌握了确定图片最终名称所需的所有信息。如果 `variant` 的字符串表示不为 nil，我们就在 `NSString imageName` 后追加\
  \ `\"_\"` 和 `variation`。类似地，如果 `state` 不为 nil，我们就在 `imageName` 后追加 `\"_\"` 和 `state`。最后，如果\
  \ `frameCount` 不为零，我们就在图片名称后追加 `currentFrame` 编号。我们不必为图片名称添加文件扩展名，因为 `UIImage` 会根据名称自动找到正确的图片。此任务将查找符合以下模式的图片文件：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00380.png)\n\n**第\
  \ 6 章：创建角色：游戏引擎、图片角色和行为** **147**\n\n```\nbaseImageName.png\nbaseImageName_variant.png\n\
  baseImageName_state.png\nbaseImageName_variant_state.png\nbaseImageName_00FN.png\n\
  baseImageName_state_00FN.png\nbaseImageName_variant_00FN.png\nbaseImageName_variant_state_00FN.png\n\
  ```\n\n现在你知道了 `ImageRepresentation` 和 `ImageRepresentationDelegate` 是如何被用来指定在特定时间应为某个角色使用哪张图片的。回顾一下列表\
  \ 6-8，可以看到角色的表现负责创建和更新与该角色关联的 `UIView`。\n\n# 为角色创建 UIImageView\n\n`ImageRepresentation`\
  \ 的最终目标是创建一个代表该角色的 `UIView`。这是通过实例化一个 `UIImageView` 来实现的，该视图会根据角色的类型、状态和变体，使用正确的图片来表示该角色。我们已经回顾了如何找到正确的图片，剩下的工作就是创建\
  \ `UIImageView`。这项工作在列表 6-17 所示的 `getViewForActor:In:` 任务中完成。\n\n**列表 6-17.** `ImageRepresentation.m\
  \ (getViewForActor:In:)`\n\n```\n-(UIView*)getViewForActor:(Actor*)actor In:(GameController*)aController{\n\
  \    if (view == nil){\n        UIImage* image = [self getImageForActor: actor];\n\
  \        view = [[UIImageView alloc] initWithImage: image];\n    }\n    return view;\n\
  }\n```\n\n`ImageRepresentation` 简单地检查 `view` 是否已被创建，如果尚未创建则创建它。为了创建 `UIImageView`，我们调用\
  \ `getImageForActor:`，然后用返回的 `UIImage` 创建 `UIImageView`。`getImageForActor:` 任务如列表\
  \ 6-18 所示。\n\n**列表 6-18.** `ImageRepresentation.m (getImageForActor:)`\n\n```\n\
  -(UIImage*)getImageForActor:(Actor*)actor{\n    NSString* imageName = [self getImageNameForActor:actor];\n\
  \    UIImage* result = [UIImage imageNamed: imageName];\n    if (result == nil){\n\
  \        NSLog(@\"Image Not Found: %@\", imageName);\n    }\n    return result;\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00476.png)\n\
  \n**148** **第 6 章：创建角色：游戏引擎、图片角色和行为**\n\n`getImageForActor:` 任务简单地调用了 `getImageNameForActor`\
  \ 并基于该名称创建了一个 `UIImage`。如果给定名称的图片不存在，结果将为 nil。在调试应用程序时，在 `NSLog` 语句处设置断点将为你省去很多麻烦，因为一旦角色使用了不存在的图片进行绘制，你将立即收到通知。\n\
  \n# 更新视图\n\n现在我们已经了解了 `ImageRepresentation` 如何创建用于绘制角色的 `UIView`，接下来让我们看看 `ImageRepresentation`\
  \ 如何更新该 `UIView` 以创建循环动画，并响应状态或变体的变化。列表 6-19 展示了 `ImageRepresentation` 的 `updateView:ForActor:In:`\
  \ 任务。\n\n**列表 6-19.** `ImageRepresentation.m (updateView:ForActor:In:)`\n\n```\n\
  -(void)updateView:(UIView*)aView ForActor:(Actor*)anActor\n```\n\n\n\n`In:(GameController*)aController{`\n\
  \n```\nif ([delegate respondsToSelector:@selector(getFrameCountForVariant:AndState:)]){\n\
  \    [self advanceFrame: anActor ForStep:[aController stepNumber]];\n}\n\nif ([anActor\
  \ needsViewUpdated]){\n    UIImageView* imageView = (UIImageView*)aView;\n    UIImage*\
  \ image = [self getImageForActor: anActor];\n    [imageView setImage:image];\n \
  \   [anActor setNeedsViewUpdated:NO];\n}\n}\n```\n\n任务`updateView:ForActor:In:`负责确保使用正确的图像来表示角色`anActor`。第一步是通过检查代理是否响应`getFrameCountForVariation:AndState:`来判断`ImageRepresentation`是否在管理一系列图像。如果使用了一系列图像，则调用`advanceFrame:ForStep:`来推进角色的当前帧，如代码清单\
  \ 6–20 所示。\n\n**代码清单 6–20.** *ImageRepresentation.m (advanceFrame:ForTick:)*\n\n\
  ```\n-(void)advanceFrame:(Actor*)actor ForStep:(int)step{\n    if (step % self.stepsPerFrame\
  \ == 0){\n        if (self.backwards){\n            self.currentFrame -= 1;\n  \
  \      } else {\n            self.currentFrame += 1;\n        }\n\n        int frameCount\
  \ = [delegate getFrameCountForVariant:[actor variant]\n                        \
  \                          AndState:[actor state]];\n\n        if (self.currentFrame\
  \ > frameCount){\n            self.currentFrame = 1;\n        }\n\n        if (self.currentFrame\
  \ < 1){\n            self.currentFrame = frameCount;\n        }\n\n        [actor\
  \ setNeedsViewUpdated:YES];\n    }\n}\n```\n\n仅当`step`对`stepsPerFrame`取模为零时，我们才更改当前帧。如果`backwards`为真，则对`currentFrame`减\
  \ 1；反之则加 1。如果更改了`currentFrame`的值，我们必须确保该值不小于 1 且不大于帧数。请注意这里的`currentFrame`是从 1 开始计数，而非从\
  \ 0 开始。这样设计是为了让`currentFrame`的值与图像文件的命名约定完全匹配，从而在调试时更轻松。在`advanceFrame:ForStep:`中，我们最后要做的事情就是将这个角色标记为需要更新其视图。\n\
  \n回顾代码清单 6–19，在调用`advanceFrame:ForStep:`之后，我们检查`needsViewUpdated`是否为真。如果我们在`advanceFrame:ForStep:`中调整了`currentFrame`的值，那么`needsViewUpdated`将为真。`needsViewUpdated`的值也可能因其他原因而为真（例如角色的状态或变体发生了变化）。无论`needsViewUpdated`是如何被设为\
  \ YES 的，我们只需通过调用`getImageForActor:`来为角色找到正确的图像，并更新`imageView`。最后，我们将`needsViewUpdated`设为\
  \ NO，因为我们知道此时已拥有了完全正确的图像，除非有东西再次将`needsViewUpdated`设回 YES，否则在下一步中无需再寻找不同的图像。\n\n\
  我们已经回顾了`ImageRepresentation`类，以及它如何用于协调角色的各种状态与预期表示它的图像。设计这个类的目标是使其易于促进创建使用它的新`Actor`类。在本章的其他示例中，我们将在各种配置中重用这个类，并观察它如何处理这些其他情况。\n\
  \n关于这个示例，最后需要理解的内容是强化道具如何横穿屏幕移动，以及它们如何改变状态以产生闪烁效果，这将在下一节中讨论。\n\n## 通过示例理解行为\n\n\
  在这个示例中，强化道具在屏幕上翻滚移动。最终，它们会在消失前开始闪烁。这两种截然不同的行为可以直接在`Powerup`类中通过提供任务`step:`来实现。在前一章中，我们正是通过这种方式实现了不同角色的不同行为。而在本章中，我们将引入一种通用机制来定义行为，这些行为可以在不同类型的角色之间共享，或根据单个角色的状态进行更改。\n\
  \n\n\n# 第 6 章：创建你的角色：游戏引擎、图像演员与行为\n\n此前，我们跳过了`Powerup`类构造函数中处理行为的部分。列表 6–21 展示了这部分被省略的代码。\n\
  \n**列表 6–21.** `Powerup.m`（增强道具：部分）\n\n```\n//Powerup* powerup = …\nfloat direction\
  \ = arc4random()%100/100.0 * M_PI*2;\nLinearMotion* motion = [LinearMotion linearMotionInDirection:direction\
  \ AndSpeed:1];\n[motion setWrap:YES];\n[powerup addBehavior: motion];\n\nExpireAfterTime*\
  \ expire = [ExpireAfterTime expireAfter:60*30];\n[expire setDelegate: powerup];\n\
  [powerup addBehavior: expire];\n\nreturn [powerup autorelease];\n```\n\n我们刚刚创建了一个名为`powerup`的新`Powerup`对象，并设置了一些基本属性。下一步是创建`Behavior`对象，并将它们添加到新创建的`Powerup`中，然后再返回该对象。我们创建的第一个行为是一个名为`motion`的`LinearMotion`对象，通过任务`addBehavior:`将其添加到`powerup`中。第二个行为是一个名为`expire`的`ExpireAfterTime`对象。在将`expire`添加到`powerup`之前，我们将`powerup`注册为`expire`的委托。这为我们提供了一种简便方法，使增强道具在接近过期时闪烁。\n\
  \n## 行为：线性运动\n\n这两个行为都将在其他`Actor`类中重复使用，因此值得详细了解。让我们从`LinearMotion`类开始，其头文件如列表 6–22\
  \ 所示。\n\n**列表 6–22.** `LinearMotion.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Actor.h\"\n\n@interface LinearMotion : NSObject <Behavior>{\n    float\
  \ deltaX;\n    float deltaY;\n}\n\n@property (nonatomic) float speed;\n@property\
  \ (nonatomic) float direction;\n@property (nonatomic) BOOL wrap;\n\n+(id)linearMotionInDirection:(float)aDirection\
  \ AtSpeed:(float)aSpeed;\n+(id)linearMotionRandomDirectionAndSpeed;\n\n@end\n```\n\
  \n`LinearMotion`类继承自`NSObject`，并遵循从`Actor.h`导入的`Behavior`协议。`LinearMotion`类有三个属性：`speed`、`direction`和`wrap`。`speed`和`direction`属性的含义应该很明确。`wrap`属性表示角色离开游戏区域后是否应从对侧重新进入。这两个任务是该类的构造函数，用于创建`LinearMotion`对象。我们可能还能为这个类想到更多方便的构造函数，但本章只需要这两个。\n\
  \n让我们通过查看这两个构造函数（如列表 6–23 所示）来开始探索`LinearMotion`类的实现。\n\n**列表 6–23.** `LinearMotion.m`（构造函数）\n\
  \n```\n+(id)linearMotionInDirection:(float)aDirection AtSpeed:(float)aSpeed{\n \
  \   LinearMotion* motion = [LinearMotion new];\n    [motion setDirection:aDirection];\n\
  \    [motion setSpeed:aSpeed];\n    return [motion autorelease];\n}\n\n+(id)linearMotionRandomDirectionAndSpeed{\n\
  \    float direction = (arc4random()%100/100.0)*M_PI*2;\n    float speed = (arc4random()%100/100.0)*3;\n\
  \    return [LinearMotion linearMotionInDirection:direction AtSpeed:speed];\n}\n\
  ```\n\n构造函数`linearMotionInDirection:AtSpeed:`只是创建一个新的`LinearMotion`对象并设置这两个属性。构造函数`linearMotionRandomDirectionAndSpeed`为`direction`和`speed`生成随机值，然后直接调用构造函数`linearMotionInDirection:AtSpeed:`。\n\
  \n列表 6–24 展示了`LinearMotion`类实现的剩余部分。\n\n**列表 6–24.** `LinearMotion.m`\n\n```\n-(void)setSpeed:(float)aSpeed{\n\
  \    speed = aSpeed;\n    deltaX = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n\
  }\n\n-(void)setDirection:(float)aDirection{\n    direction = aDirection;\n    deltaX\
  \ = cosf(direction)*speed;\n    deltaY = sinf(direction)*speed;\n}\n\n-(void)applyToActor:(Actor*)anActor\
  \ In:(GameController*)gameController{\n    CGPoint center = anActor.center;\n  \
  \  center.x += deltaX;\n    center.y += deltaY;\n    if (wrap){\n        CGSize\
  \ gameSize = [gameController gameAreaSize];\n        float radius = [anActor radius];\n\
  ```\n\n\n```c\nif (center.x < -radius && deltaX < 0){\n    center.x = gameSize.width\
  \ + radius;\n} else if (center.x > gameSize.width + radius && deltaX > 0){\n   \
  \ center.x = -radius;\n}\n\nif (center.y < -radius && deltaY < 0){\n    center.y\
  \ = gameSize.height + radius;\n} else if (center.y > gameSize.height + radius &&\
  \ deltaY > 0){\n    center.y = -radius;\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00143.png)\n\n**152**\n\n**第 6 章：创建你的角色：游戏引擎、图像演员和行为**\n\n}\n\n```\n\n\
  `[anActor setCenter:center];`\n\n每当速度或方向值被设置时，我们都会计算 `deltaX` 和 `deltaY` 的值。任务 `applyToActor:In:`\
  \ 由协议 `Behavior` 定义，并由 `GameController` 调用，使 `Behavior` 有机会修改一个演员。在 `applyToActor:In:`\
  \ 方法对类 `LinearMotion` 的实现中，我们首先获取演员的当前中心点，然后将 x 和 y 分量分别增加 `deltaX` 和 `deltaY`。\n\
  \n如果 `wrap` 为真，我们必须检查演员是否在游戏区域之外。这比简单检查中心点是否位于 `gameArea` 内部要稍微复杂一些，因为还必须考虑演员的半径。我们希望演员看起来像是移出屏幕，而不是在触碰屏幕边缘时立即消失。同时，我们只希望在演员正远离游戏区域时移动它。带着这两个考虑，我们测试中心点的\
  \ x 值是否小于 `radius` 且 `deltaX` 为负值。这意味着演员位于游戏区域左侧，并且正在向左移动，远离游戏区域。因此，我们最好将其移动到游戏区域右侧，这样它的左向运动会将演员带回屏幕右侧。如果中心点的\
  \ x 值大于游戏区域宽度，并且正在向右移动，我们执行相反的操作，将演员移动到屏幕左侧。对中心点的 y 值重复这两个测试。\n\n`LinearMotion`\
  \ 的实现非常简单，只是由于环绕的概念而稍显复杂。接下来，我们将探讨类 `ExpireAfterTime`，它用于在经过指定步数后将演员从场景中移除。\n\n\
  ## Behavior: ExpireAfterTime\n\n类 `ExpireAfterTime` 被 `Powerup` 用来在经历一定步数后将其从场景中移除。在移除增益道具之前，我们希望让增益道具通过将其状态从发光切换为不发光来闪烁。为了支持这个附加功能，我们需要在\
  \ `ExpireAfterTime` 对象与其作用的演员之间建立某种通信。清单 6-25 显示了类 `ExpireAfterTime` 的头文件。\n\n**清单\
  \ 6-25.** *ExpireAfterTime.h*\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
  \ \"Actor.h\"\n\n@class ExpireAfterTime;\n@protocol ExpireAfterTimeDelegate\n-(void)stepsUpdated:(ExpireAfterTime*)expire\
  \ In:(GameController*)controller;\n@end\n\n@interface ExpireAfterTime : NSObject\
  \ <Behavior> {\n}\n@property (nonatomic) long stepsRemaining;\n@property (nonatomic,\
  \ assign) Actor<ExpireAfterTimeDelegate>* delegate;\n\n+(id)expireAfter:(long)aNumberOfSteps;\n\
  @end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00223.png)\n\
  \n**第 6 章：创建你的角色：游戏引擎、图像演员和行为** **153**\n\n这里，类 `ExpireAfterTime` 与类 `LinearMotion`\
  \ 一样，遵循协议 `Behavior`。`ExpireAfterTime` 还定义了一个名为 `ExpireAfterTimeDelegate` 的新协议，该协议定义了任务\
  \ `stepsUpdated:In:`，该任务会在每次调用 `applyToActor:In:` 时由 `ExpireAfterTime` 在其委托对象上执行，如清单\
  \ 6-26 所示。\n\n**清单 6-26.** *ExpireAfterTime.m*\n\n```objc\n#import \"ExpireAfterTime.h\"\
  \n#import \"GameController.h\"\n\n@implementation ExpireAfterTime\n@synthesize stepsRemaining;\n\
  @synthesize delegate;\n\n+(id)expireAfter:(long)aNumberOfSteps {\n    ExpireAfterTime*\
  \ expires = [ExpireAfterTime new];\n    [expires setStepsRemaining: aNumberOfSteps];\n\
  \    return [expires autorelease];\n}\n\n-(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\
  \    stepsRemaining--;\n    [delegate stepsUpdated:self In:gameController];\n  \
  \  if (stepsRemaining <= 0){\n        [gameController removeActor:anActor];\n  \
  \  }\n}\n@end\n```\n\n在这个类 `ExpireAfterTime` 的实现中，构造方法 `expireAfter:` 简单地创建一个新的\
  \ `ExpireAfterTime` 对象并设置 `stepsRemaining` 属性。任务 `applyToActor:In:` 由 `GameController`\
  \ 在每个游戏步骤中调用。在此任务中，我们将 `stepsRemaining` 减一，并通知委托步数已更新。如果 `stepsRemaining` 小于或等于零，我们从\
  \ `GameController` 中移除该演员。\n\n在我们向 `Powerup` 对象添加 `ExpireAfterTime` 之前，我们将 `Powerup`\
  \ 对象设置为 `ExpireAfterTime` 的委托。这会导致 `ExpireAfterTime` 在 `Powerup` 对象上调用 `stepsUpdated:In:`。清单\
  \ 6-27 显示了类 `Powerup` 对 `stepsUpdated:In:` 的实现。\n\n**清单 6-27.** *Powerup.m (stepsUpdated:In:)*\n\
  \n```objc\n-(void)stepsUpdated:(ExpireAfterTime*)expire In:(GameController*)controller{\n\
  \    long stepsRemaining = [expire stepsRemaining];\n    if (stepsRemaining < 60*5){\n\
  \        if (stepsRemaining % 25 == 0){\n            if (self.state == STATE_GLOW){\n\
  \                self.state = STATE_NO_GLOW;\n            } else {\n           \
  \     self.state = STATE_GLOW;\n            }\n        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00210.png)\n\n**154** **第 6 章：创建你的角色：游戏引擎、图像演员和行为**\n\n在这个清单中，我们检查 `ExpireAfterTime`\
  \ 对象还剩多少步。如果该值小于 300 步（在每秒 60 帧的情况下为 5 秒），我们希望应用闪烁逻辑。为了使增益道具闪烁，我们将 `Powerup` 的状态从\
  \ `STATE_GLOW` 切换为 `STATE_NO_GLOW`，反之亦然。\n\n更改状态就足以改变代表 `Powerup` 演员的图像，因为（回顾清单\
  \ 6-10）我们知道设置演员的状态会将其 `needViewUpdated` 属性置为 `YES`。此外，如果演员的 `needViewUpdated` 属性为\
  \ `YES`，并且该演员正在使用 `ImageRepresentation`，那么该 `ImageRepresentation` 会在任务 `updateView:In:`\
  \ 中为演员获取正确的图像（如前文清单 6-19 所示）。\n\n## 总结\n\n在本章中，我们研究了我们基础游戏引擎中的类 `GameController`\
  \ 和 `Actor`，并学习了如何使用这些类创建一个简单的场景来演练我们的新演员——增益道具。我们探讨了协议 `Behavior`，它为我们提供了一个框架，用于创建可复用的游戏逻辑片段以应用于我们的演员。我们还将渲染基于图像的演员所需的逻辑整合到了类\
  \ `ImageRepresentation` 中。这同时也为下一章将要讨论的基于矢量的演员奠定了基础。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00361.png)\n\n![](img/00397.png)\n\n# **第 7 章**\n\n# **构建你的游戏：矢量演员与粒子系统**\n\
  \nCore Graphics 是一个强大的二维绘图库，负责渲染 iOS 和 OS X 的很大一部分内容。在本章中，我们将了解如何使用这个库在我们的游戏中绘制演员。目标是让演员能够根据游戏状态动态绘制。为了说明这一点，我们将创建两个使用\
  \ Core Graphics 绘制的示例演员：一个用于显示演员剩余生命值的生命条，以及一个根据其威力大小以特定颜色绘制的子弹。这两个示例将说明如何在简单游戏引擎的上下文中使用\
  \ Core Graphics。\n\n我们将通过创建一个名为 `VectorRepresentation` 的新类来实现这一点，该类与上一章中的类 `ImageRepresentation`\
  \ 类似。类 `VectorRepresentation` 将用于创建一个 `UIView` 来代表我们的演员，并使用 Core Graphics 的自定义代码进行绘制。\n\
  \n\n# 我们还将探讨游戏中用于创造引人注目的视觉效果的另一项热门技术：粒子系统。简单来说，粒子系统是指游戏中生成大量微型图形元素的任何系统，这些元素在屏幕上组合后，能创造出比各部分简单叠加更令人着迷的整体效果。粒子系统在游戏中常用于创建火焰效果、水体效果和魔法效果，仅举几例。\n\
  \n在本章中，我们将利用粒子系统创建由大量简单粒子角色构成的彗星，使其呈现出流光溢彩、动态流畅的视觉效果。同时，我们还将运用这项技术，在小行星碎裂时展现些许真实感。\n\
  \n本章的示例代码可在 Xcode 项目 `Sample 06+07` 中找到。\n\nL. Jordan, *Beginning iOS 5 Games Development*\n\
  \n©\n\nLucas Jordan 2011\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 飞碟、子弹、护盾与生命条\n\n在本例中，我们将探讨四种新角色：飞碟、子弹、护盾和生命条。本节代码位于 Xcode 项目 `Sample 06+07` 的\
  \ `Example 2` 组中。\n\n生命条和子弹角色将使用 Core Graphics 以编程方式渲染，而非使用预渲染图像。其他角色——飞碟和护盾——在本例中主要用于提供上下文环境（总得有个目标来射击子弹），并从上章示例的行为层面进行扩展。图\
  \ 7-1 展示了飞碟、子弹、护盾和生命条的实际运行效果。\n\n**图 7-1.** *飞碟、子弹、护盾和生命条* 在图 7-1 中，我们看到屏幕中央有一架飞碟。从右侧向左飞来的是一系列圆形子弹。这些子弹有三种不同尺寸，分别代表其潜在伤害值。如果子弹击中飞碟，飞碟上会叠加一层护盾效果，同时生命条会下降，表示受到伤害。在本例中，子弹会持续发射，直到飞碟生命值归零，届时飞碟将被移除，并添加一架新的飞碟。图\
  \ 7-2 展示了本例中使用的三种不同飞碟，以及护盾所用的图形。\n\n**图 7-2.** *三种飞碟与一个护盾*\n\n护盾图像是半透明的，设计用于叠加在飞碟之上，放大后的飞碟上覆盖护盾的效果可见一斑。\n\
  \n为了理解本例中所有组件的配合方式，我们首先来看类 `Example02Controller` 的实现，从 `doSetup` 任务开始，如列表 7-1 所示。\n\
  \n**列表 7-1.** *Example02Controller.m (doSetup)*\n\n```\n-(BOOL)doSetup\n{\n    if\
  \ ([super doSetup]){\n        NSMutableArray* classes = [NSMutableArray new];\n\
  \        [classes addObject:[Saucer class]];\n        [classes addObject:[Bullet\
  \ class]];\n        [self setSortedActorClasses:classes];\n        return YES;\n\
  \    }\n    return NO;\n}\n```\n\n在列表 7-1 中，我们看到了类 `Example02Controller` 的 `doSetup`\
  \ 任务。该方法仅表明我们希望将类型为 `Saucer` 和 `Bullet` 的角色排序，以便后续轻松访问。我们通过创建一个名为 `classes` 的 `NSMutableArray`，并添加我们感兴趣的两个类的类对象来实现这一点。然后将\
  \ `NSMutableArray classes` 传递给 `setSortedActorClasses:`。这样，将来调用 `actorsOfType:`\
  \ 时，我们就不必遍历所有角色来查找它们。接下来，我们来看类 `Example02Controller` 中 `updateScene` 任务内描述本例动作的代码。见列表\
  \ 7-2。\n\n**列表 7-2.** *Example02Controller.m (updateScene)*\n\n```\n-(void)updateScene{\n\
  \    NSMutableSet* suacers = [self actorsOfType:[Saucer class]];\n    if ([suacers\
  \ count] == 0){\n        Saucer* saucer = [Saucer saucer:self];\n        [self addActor:\
  \ saucer];\n    }\n    if (self.stepNumber % (30) == 0){\n        float direction\
  \ = M_PI - M_PI/30.0;\n        float rand = (arc4random()%100)/100.0 * M_PI/15.0;\n\
  \        direction += rand;\n        Bullet* bullet = [Bullet bulletAt:CGPointMake(1000,\
  \ 768/2)\n                         WithDirection:direction];\n        [self addActor:\
  \ bullet];\n        if (arc4random()%4 == 0){\n            if (arc4random()%2 ==\
  \ 0){\n                [bullet setDamage:20.0];\n            } else {\n        \
  \        [bullet setDamage:30.0];\n            }\n        }\n    }\n    NSMutableSet*\
  \ bullets = [self actorsOfType:[Bullet class]];\n    for (Bullet* bullet in bullets){\n\
  \        for (Saucer* saucer in suacers){\n            if ([bullet overlapsWith:saucer]){\n\
  \                [saucer doHit:bullet with:self];\n            }\n        }\n  \
  \  }\n    [super updateScene];\n}\n```\n\n在列表 7-2 中，我们首先获取场景中所有 `Saucer` 实例，并检查是否存在任何实例。如果没有，则创建一个新的\
  \ `Saucer` 并通过 `addActor:` 任务将其添加到场景中。这确保了屏幕中央始终恰好存在一个 `Saucer`。\n\n然后，每 30 步，我们使用\
  \ `bullatAt:WithDirection:` 任务创建一个新的 `Bullet`。子弹的位置以游戏坐标指定，位于最右侧点的垂直中心。指定的方向将使子弹向左飞行，可能击中飞碟。子弹被添加到场景后，会随机分配其伤害值。\n\
  \n`updateScene` 任务最后要做的是检查是否有任何子弹与飞碟碰撞。这通过调用 `actorsOfType:` 获取存储在 `NSMutableSet*\
  \ bullets` 中的所有 `Bullet` 对象来实现。我们简单地对每个子弹和飞碟进行迭代，通过调用 `overlapsWith:` 检查是否命中。如果命中，则在\
  \ `saucer` 上调用 `doHit:with:` 任务。\n\n接下来，让我们更仔细地查看本例中使用的角色类的实现。\n\n## 角色类\n\n在本节中，我们将了解\
  \ `Saucer` 角色和 `HealthBar` 角色类。`HealthBar` 与我们目前看到过的其他角色不同。其不同之处在于，它在场景中的位置依赖于另一个角色（此处为\
  \ `Saucer`）的位置。在回顾了 `Saucer` 和 `HealthBar` 类之后，我们将研究 `Behavior` 类 `FollowActor`，并了解如何实现这一特性。\n\
  \n### 实例化飞碟类\n\n我们首先来看 `Saucer` 类的构造函数。之所以从 `Saucer` 的构造函数开始，是因为这里是创建 `HealthBar`\
  \ 的地方。这样，我们创建新 `Saucer` 时就无需担心添加 `HealthBar`，因为每次创建 `Saucer` 时都会自动创建一个。`Saucer`\
  \ 的构造函数如列表 7-3 所示。\n\n**列表 7-3.** *Saucer.m (saucer:)*\n\n```\n+(id)saucer:(GameController*)controller{\n\
  \    CGSize gameAreaSize = [controller gameAreaSize];\n    CGPoint gameCenter =\
  \ CGPointMake(gameAreaSize.width/2.0, gameAreaSize.height/2.0);\n    ImageRepresentation*\
  \ rep = [ImageRepresentation imageRep];\n    [rep setBackwards:arc4random()%2 ==\
  \ 0];\n    [rep setStepsPerFrame:3];\n    Saucer* saucer = [[Saucer alloc] initAt:gameCenter\
  \ WithRadius:32\n                          AndRepresentation:rep];\n    [rep setDelegate:saucer];\n\
  \    [saucer setVariant:arc4random()%VARIATION_COUNT];\n    [saucer setMaxHealth:100];\n\
  \    [saucer setCurrentHealth:100];\n    HealthBar* healthBar = [HealthBar healthBar:saucer];\n\
  \    [healthBar setPercent:1];\n    [saucer setHealthBar:healthBar];\n    [controller\
  \ addActor:healthBar];\n    return saucer;\n}\n```\n\n\n\n在`Listing 7–3`中，我们首先找到游戏区域的中心，并将该值存储在`CGPoint\
  \ gameCenter`中。接着，我们创建一个名为`rep`的`ImageRepresentation`。我们指示`rep`应在半数时间内以每帧动画 3 步的速度向后旋转飞碟。`CGRect\
  \ gameCenter`和`ImageRepresentation rep`被传递给父类的初始化方法`initAt:WithRadius:AndRepresenation:`，以创建一个半径为\
  \ 32 的`Saucer`对象。然后，`saucer`对象被设置为`ImageRepresenation`的委托，这样我们就可以通过`Saucer`类来指定表示细节。这与第六章中的演员（Actors）的工作方式完全相同。请查看源代码以了解这些任务具体是如何实现的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00021.png)\n\n**160**\n\
  \n**第 7 章：构建你的游戏：向量演员与粒子**\n\n创建`saucer`对象后，我们想为其初始化一些细节。我们通过调用`setVariant:`方法来选择要使用的三种变体之一。我们还将`max\
  \ health`和`current health`属性设置为 100。接下来，让我们继续看看`HealthBar`类。\n\n### 实例化`HealthBar`类\n\
  \n为了在飞碟下方渲染血条，我们创建一个`HealthBar`对象，并传入它要跟随的对象——`actor saucer`。我们还将`saucer`的`healthBar`属性设置为新创建的`healthBar`，这样当飞碟受到伤害时，`saucer`对象可以更新血条显示的百分比。最后，将`healthBar`添加到场景中。让我们看看`HealthBar`的构造方法，并理解它是如何设置和运作的。参见`Listing\
  \ 7–4`。\n\n**列表 7–4.** *HealthBar.m (healthBar:)*\n\n```\n+(id)healthBar:(Actor*)anActor{\n\
  \nVectorRepresentation* rep = [VectorRepresentation vectorRepresentation]; HealthBar*\
  \ healthBar = [[HealthBar alloc] initAt:anActor.center\n\nWithRadius:anActor.radius\
  \ AndRepresentation:rep];\n\n[rep setDelegate:healthBar];\n\n[healthBar setColor:[UIColor\
  \ blueColor]];\n\n[healthBar setBackgroundColor:[UIColor colorWithRed:0 green:0\
  \ blue:0 alpha:.5]]; FollowActor* follow = [FollowActor followActor:anActor];\n\n\
  [follow setYOffset:[anActor radius]];\n\n[healthBar addBehavior:follow];\n\nreturn\
  \ healthBar;\n\n}\n```\n\n在`Listing 7–4`中，我们看到了构造方法`healthBar:`，它接受一个`Actor`作为参数。这个`Actor\
  \ anActor`就是该`HealthBar`在其移动时要跟随的演员。在这个例子中，与之关联的`Saucer`不会移动，但我们在后续的示例中会使用这个类，届时其演员是可以移动的。在查看`FollowActor`行为之前，请注意`HealthBar`是通过传入一个`VectorRepresentation`实例而非`ImageRepresentation`对象来初始化的。这表明我们希望以编程方式绘制该对象。我们将在下一节中了解其工作原理。现在，让我们继续探讨这个例子。接下来我们要检查的类是`FollowActor`。\n\
  \n### `FollowActor`行为类\n\n负责让`HealthBar`保持在`Saucer`附近的类是`FollowActor`。这个类是一种行为（Behavior），提供了与之前行为类相同的抽象。让我们通过查看`FollowActor`类来了解这一切是如何协同工作的。参见`Listing\
  \ 7–5`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00055.png)\n\
  \n**第 7 章：构建你的游戏：向量演员与粒子**\n\n**161**\n\n**列表 7–5.** *FollowActor.m*\n\n```\n#import\
  \ \"FollowActor.h\"\n\n#import \"GameController.h\"\n\n@implementation FollowActor\n\
  \n@synthesize actorToFollow;\n\n@synthesize xOffset;\n\n@synthesize yOffset;\n\n\
  +(id)followActor:(Actor*)anActorToFollow{\n\nFollowActor* follow = [FollowActor\
  \ new];\n\n[follow setActorToFollow:anActorToFollow];\n\nreturn follow;\n\n}\n\n\
  -(void)applyToActor:(Actor*)anActor In:(GameController*)gameController{\n\nif (![actorToFollow\
  \ removed]){\n\nCGPoint c = [actorToFollow center];\n\nc.x += xOffset;\n\nc.y +=\
  \ yOffset;\n\n[anActor setCenter: c];\n\n} else {\n\n[gameController removeActor:anActor];\n\
  \n}\n\n}\n\n@end\n```\n\n\n\n# 排版后的内容\n\n在`Listing 7–5`中，我们看到`FollowActor`类的完整实现。它使用任务`followActor:`构造，该任务接受要跟随的演员作为参数。\n\
  \n任务`applyToActor:In:`在游戏的每一步被调用，负责重新定位与此行为关联的演员。为此，我们只需将演员`anActor`的中心设置为要跟随的演员的中心，并通过`xOffset`和`yOffset`进行调整。查看`Listing7–4`，我们看到`HealthBar`被配置为跟随飞碟，`xOffset`等于飞碟的半径。这使`HealthBar`保持在飞碟下方居中。现在让我们探索`Bullet`类。\n\
  \n## `Bullet`类\n\n我们已经看到`Saucer`和`HealthBar`类如何协同工作。现在我们要查看`Bullet`类，并理解它为什么以这种方式行为。`Listing7–6`展示了`Bullet`的构造函数。\n\
  \n### `Listing 7–6`. *Bullet.m (bulletAt:WithDirection:)*\n\n```\n+(id)bulletAt:(CGPoint)aCenter\
  \ WithDirection:(float)aDirection{\n\nVectorRepresentation* rep = [VectorRepresentation\
