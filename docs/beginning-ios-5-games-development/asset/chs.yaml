- '# 第 2 章：设置你的游戏项目


  与所有软件项目一样，iOS 游戏开发从一开始就打下良好基础会受益匪浅。在本章中，我们将讨论如何设置一个新的 Xcode 项目，使其适合作为许多游戏的起点。这将包括创建一个可用于在
  iPhone 和 iPad 上部署的项目，并同时处理横屏和竖屏方向。


  我们将了解 iOS 应用程序是如何初始化的，以及我们可以从何处开始自定义行为，以匹配我们对应用程序应如何执行的期望。我们还将探索如何在 iOS 应用程序中创建和修改用户界面（UI）元素，并特别关注管理不同设备和屏幕方向。


  本章创建的游戏将与第 1 章的简单示例非常相似——实际上，它的玩法完全相同。但我们将为后续章节打下基础，同时练习一些关键技术，例如使用`UIViewControllers`和
  Interface Builder。


  我们将探索 iOS 应用程序是如何组合在一起的，并解释关键的类。


  我们还将创建新的 UI 元素，学习如何使用 Interface Builder 自定义它们，并探索使用 MVC 模式创建灵活、可重用的代码元素。在本章结束时，我们将创建图
  2-1 所示的石头、剪刀、布应用程序。


  **图 2-1.** *一个设计为在所有方向上适用于 iPhone 和 iPad 的应用程序*


  图 2-1 显示了在 iPhone 和 iPad 模拟器上运行的应用程序。这是一个所谓的*通用*应用程序：它可以在两种设备上运行，并以此方式在 App Store
  中呈现。除非有特定的业务原因需要编写仅适用于 iPhone 或 iPad 的应用程序，否则将应用程序做成通用的非常有意义。即使你最初只打算在一个设备上发布应用，这也会为你日后节省时间。


  我们的示例应用程序非常简单，以至于可能很难看出图 2-1 中四种状态之间的差异。在左上角，iPhone 处于竖屏方向时，灰色区域的位置与左下角横屏时的布局不同。文本的布局也不同。应用程序在
  iPad 上以横屏和竖屏方式运行时也是如此。让我们开始了解如何设置项目以适应这些不同的设备和方向。


  ## 创建游戏项目


  要开始我们的示例游戏，首先需要在 Xcode 中创建一个新项目。


  通过选择"文件" > "新建" > "新建项目..."来创建新项目。这将打开一个向导，让你选择想要的项目类型，如图 2-2 所示。


  **图 2-2.** *创建新的基于窗口的应用程序*


  在图 2-2 的左侧，我们看到我们从 iOS 部分选择了"Application"。右侧是可用于创建 iOS 应用程序的项目类型。这里提供的选项有助于为开发者提供合理的起点。这对
  iOS 新手开发者尤其有帮助，因为这些模板为你提供了多种常见应用程序导航风格的起点。我们将选择"Single View Application"，因为我们只需要一个最小的起点，而
  Single View Application 对通用应用程序提供了良好的支持。


  点击"Next"后，会看到图 2-3 所示的选项。


  **图 2-3.** *新项目的详细信息*




  ### 第一步：为产品命名


  我们要做的第一件事就是为产品命名。你可以选择任何喜欢的名称。公司标识符（Company Identifier）将在应用提交过程中用于识别应用。你可以将公司标识符设置为任意值，但通常的做法是使用反向域名。如图
  2-3 所示，套装标识符（Bundle Identifier）由产品名称和公司标识符合并而成。套装标识符之后可以修改——向导仅仅展示了默认值。当你将游戏提交至
  App Store 时，套装标识符用于指明你上传的是哪个应用。


  通过从“设备系列”列表中选择“通用”（Universal），你是在告知 Xcode 创建一个能同时在 iPhone 和 iPad 上运行的项目。在本例中，我们将不使用
  Storyboard 或自动引用计数（Automatic Reference Counting）。同样地，我们也不会创建任何单元测试，因此“包含单元测试”选项也应取消勾选。点击“下一步”会提示你保存项目。Xcode
  会在所选目录中创建一个新文件夹，因此如果你不想手动创建文件夹，也无需操作。保存新项目后，你会看到类似于图 2-4 的界面。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


