- fmt: "### Step 1: Modify the Photo Colors\n\nIn the Lightroom app, you will increase\
    \ the vibrancy of your photos and increase their clarity to align the level of\
    \ colors in all shots.\n\n1. In the Adobe Lightroom app, tap the `Camera Roll`\
    \ icon, and select the photo you want to use (see Figure [4-5](#A450041_1_En_4_Chapter.html#Fig5)).\n\
    \n   ![A450041_1_En_4_Fig5_HTML.jpg](A450041_1_En_4_Fig5_HTML.jpg)\n\n   Figure\
    \ 4-5: Open a photo in the Adobe Lightroom app\n\n2. Tap the `Color` icon, and\
    \ drag the `Vibrance` slider to the right to increase the vibrancy of colors (see\
    \ Figure [4-6](#A450041_1_En_4_Chapter.html#Fig6)).\n\n   ![A450041_1_En_4_Fig6_HTML.jpg](A450041_1_En_4_Fig6_HTML.jpg)\n\
    \n   Figure 4-6: Increase the photo’s `Vibrance` value\n\n3. Tap the `Effects`\
    \ icon, and drag the `Clarity` slider a little to the right side to increase the\
    \ clarity of the photo (see Figure [4-7](#A450041_1_En_4_Chapter.html#Fig7)).\n\
    \n   ![A450041_1_En_4_Fig7_HTML.jpg](A450041_1_En_4_Fig7_HTML.jpg)\n\n   Figure\
    \ 4-7: Increase the `Clarity` value\n\n4. Once the photo color is modified, tap\
    \ the `Share` icon, and choose `Save to Camera Roll`. For `Image Size`, choose\
    \ `Maximum Available`.\n\n### Step 2: Build the Photo Collage\n\nFollow these\
    \ steps to build a photo collage:\n\n1. Open the Moldiv app, choose `Collage`,\
    \ and pick one of the photo collage layouts. For this example, choose the third\
    \ one on the second row (see Figure [4-8](#A450041_1_En_4_Chapter.html#Fig8)).\n\
    \n   ![A450041_1_En_4_Fig8_HTML.jpg](A450041_1_En_4_Fig8_HTML.jpg)\n\n   Figure\
    \ 4-8: Choose one of the collage styles\n\n2. Tap one of the grids, and choose\
    \ `Albums`. Navigate to the first photo to add it (see Figure [4-9](#A450041_1_En_4_Chapter.html#Fig9)).\n\
    \n   ![A450041_1_En_4_Fig9_HTML.jpg](A450041_1_En_4_Fig9_HTML.jpg)\n\n   Figure\
    \ 4-9: Add photos to the collage parts from the mobile album\n\n3. Repeat these\
    \ steps to add the other two photos in the other sections in the grid (see Figure\
    \ [4-10](#A450041_1_En_4_Chapter.html#Fig10)).\n\n   ![A450041_1_En_4_Fig10_HTML.jpg](A450041_1_En_4_Fig10_HTML.jpg)\n\
    \n   Figure 4-10: Select the photos to add to the collage grid\n\n4. With two\
    \ fingers, drag to change the size and focus on each image. Try to place the focus\
    \ on the main subject in the photo to give an interesting look to the grid (see\
    \ Figure [4-11](#A450041_1_En_4_Chapter.html#Fig11)).\n\n   ![A450041_1_En_4_Fig11_HTML.jpg](A450041_1_En_4_Fig11_HTML.jpg)\n\
    \n   Figure 4-11: The collage with the three photos added\n\n### Step 3: Save\
    \ the Photo Collage\n\nFollow these steps to save your photo collage:\n\n1. Tap\
    \ the `Share` icon on the bottom right of the toolbar.\n2. Set the size to `Maximum`.\
    \ The collage will be saved to your Camera Roll in its full size (see Figure [4-12](#A450041_1_En_4_Chapter.html#Fig12)).\n\
    \n   ![A450041_1_En_4_Fig12_HTML.jpg](A450041_1_En_4_Fig12_HTML.jpg)\n\n   Figure\
    \ 4-12: Saving the collage with the maximum size\n\n3. Tap the `Share` icon, and\
    \ tap `Edit` to continue to the next step.\n\n### Step 4: Add a Texture Effect\n\
    \nFollow these steps to add the texture effect:\n\n1. Tap the `Edit` icon in the\
    \ Share menu. If you closed it, you can tap the `Edit` icon from the app home\
    \ and navigate to the photo collage (see Figure [4-13](#A450041_1_En_4_Chapter.html#Fig13)).\n\
    \n   ![A450041_1_En_4_Fig13_HTML.jpg](A450041_1_En_4_Fig13_HTML.jpg)\n\n   Figure\
    \ 4-13: Tap the `Edit` icon in the Share menu\n\n2. Tap the `Filters` icon to\
    \ open the app filters. Tap the `Basic` filters, and choose `Joker` (see Figure\
    \ [4-14](#A450041_1_En_4_Chapter.html#Fig14)).\n\n   ![A450041_1_En_4_Fig14_HTML.jpg](A450041_1_En_4_Fig14_HTML.jpg)\n\
    \n   Figure 4-14: Select the `Joker` filter to apply to the collage\n\n3. Tap\
    \ the `Apply` icon on the bottom right.\n\n## Adding Vintage Style to Your Photos\n\
    \n**Tools used:** Spanseed, PicsArt, and Photofox\n\nIn this chapter, you will\
    \ learn about the following:\n\n- How to create a vintage effect and then improve\
    \ it\n- How to add filters such as a lens flare\n\nFigure [4-15](#A450041_1_En_4_Chapter.html#Fig15)\
    \ shows the original photo I’m using.\n\n![A450041_1_En_4_Fig15_HTML.jpg](A450041_1_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15: Original photo (© Rafiq Elmansy)\n\nFigure [4-16](#A450041_1_En_4_Chapter.html#Fig16)\
    \ shows the final result.\n\n![A450041_1_En_4_Fig16_HTML.jpg](A450041_1_En_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16: Final result\n\nVintage photos are a great way to evoke a nostalgic\
    \ feeling when looking at them. While you can’t create a vintage effect directly\
    \ on your DSLR camera, it can be created on a desktop computer using photo-editing\
    \ applications such as Adobe Photoshop. On your iPhone, you can create the vintage\
    \ effect using various apps. Instagram, for example, allows you to apply a vintage\
    \ filter after you take a photo and before sharing it with your followers.\n\n\
    In this tip, you will explore how to convert a photo to a vintage style using\
    \ various applications. I used a photo of my daughter that was taken during our\
    \ last trip to the Pyramids of Giza.\n\n### Step 1: Apply a Vintage Effect\n\n\
    Follow these steps to apply a vintage effect:\n\n1. Open the photo in the Photofox\
    \ app. Tap the `Image` icon in the bottom toolbar.\n2. Tap the `Tone` icon in\
    \ the bottom toolbar, and in the `Filters` list choose the `E58` filter to create\
    \ a warm vintage effect (see Figure [4-17](#A450041_1_En_4_Chapter.html#Fig17)).\n\
    \n   ![A450041_1_En_4_Fig17_HTML.jpg](A450041_1_En_4_Fig17_HTML.jpg)\n\n   Figure\
    \ 4-17: Applying the Photofox `E58` filter\n\n3. Tap the `Share` icon, and save\
    \ the photo to your Camera Roll.\n\n### Step 2: Add a Lens Flare\n\nFollow these\
    \ steps to add some lens flare:\n\n1. Open the photo in the PicsArt app. Then\
    \ tap the plus icon to add an image, and choose `Edit`.\n2. Drag the toolbar to\
    \ the left, and choose `Lens Flare` (see Figure [4-18](#A450041_1_En_4_Chapter.html#Fig18)).\n\
    \n   ![A450041_1_En_4_Fig18_HTML.jpg](A450041_1_En_4_Fig18_HTML.jpg)\n\n   Figure\
    \ 4-18: Adding the `Lens Flare` effect\n\n3. Select a proper lens flare effect\
    \ from the list.\n4. Set `Hue` to `0`, `Opacity` to `48`, and `Blend` to `Add`\
    \ (see Figure [4-19](#A450041_1_En_4_Chapter.html#Fig19)).\n\n   ![A450041_1_En_4_Fig19_HTML.jpg](A450041_1_En_4_Fig19_HTML.jpg)\n\
    \n   Figure 4-19: Adjusting the lens flare position and intensity\n\n5. Tap the\
    \ `Next` icon on the top right and save the photo in your Camera Roll.\n\n###\
    \ Step 3: Improve the Vintage Effect\n\nFollow these steps to improve the vintage\
    \ effect:\n\n1. Open the photo in the Snapseed app, and choose the `Vintage` filter\
    \ from the tools.\n2. Choose filter number 6 on the bottom of the photo to add\
    \ a blue gradient (see Figure [4-20](#A450041_1_En_4_Chapter.html#Fig20)).\n\n\
    \   ![A450041_1_En_4_Fig20_HTML.jpg](A450041_1_En_4_Fig20_HTML.jpg)\n\n   Figure\
    \ 4-20: Adding the vintage filter in Spanseed\n\n3. Tap the `Apply` icon.\n4.\
    \ From the `Tools`, choose the `Grunge` filter. Choose the fifth grunge effect.\n\
    5. Tap the `Adjustment` icon, and choose `Texture Strength`. Set the value to\
    \ `15` (see Figure [4-21](#A450041_1_En_4_Chapter.html#Fig21)).\n\n   ![A450041_1_En_4_Fig21_HTML.jpg](A450041_1_En_4_Fig21_HTML.jpg)\n\
    \n   Figure 4-21: Add the grunge effect and adjust it\n\n6. Tap the `Apply` icon.\n\
    7. Tap the `Share` icon and choose `Save a Copy` to save the photo without replacing\
    \ the original one."
