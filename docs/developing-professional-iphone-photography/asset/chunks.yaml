- fmt: "### Step 4: Add More to the Sky\n\nLet’s change the sky a little bit to be\
    \ more dramatic. I will show how to use the `Fused` app to add a lightning effect\
    \ to the sky, using a tree photo. Follow these steps:\n\n1. Open the `Fused` app.\
    \ In the first photo placed on the bottom left, tap to add the photo from the\
    \ previous steps as the first blending photo.\n2. Tap the right side, and choose\
    \ Artist Collection. I chose the Nature collection and picked a tree photo silhouette.\n\
    3. While the right photo is selected, tap the Transform icon on the left side\
    \ of the toolbar.\n4. Use your two fingers to flip the tree photo and resize it\
    \ to the screen. Then, tap the Apply icon (Figure [8-12](#A450041_1_En_8_Chapter.html#Fig12)).\n\
    \n   ![A450041_1_En_8_Fig12_HTML.jpg](A450041_1_En_8_Fig12_HTML.jpg)\n\n   Figure\
    \ 8-12: Adding the tree effect to the sky\n\n5. Tap the Blend icon on the right\
    \ of the toolbar, and choose the Divide mode. Then tap the Apply icon (Figure\
    \ [8-13](#A450041_1_En_8_Chapter.html#Fig13)).\n6. Tap the Share icon to save\
    \ the photo to the Camera Roll.\n\n   ![A450041_1_En_8_Fig13_HTML.jpg](A450041_1_En_8_Fig13_HTML.jpg)\n\
    \n   Figure 8-13: Adding the blending mode to the photo\n\n### Step 5: Add the\
    \ Grunge Effect\n\nNow, I will move to the `Snapseed` app to add the grunge effect\
    \ to the photo, as follows:\n\n1. Open the photo in the `Snapseed` app.\n2. Tap\
    \ the Tools icon, and select the Grunge filter.\n3. Tap the Grunge style icon,\
    \ and choose effect 5. Then tap the Apply icon (Figure [8-14](#A450041_1_En_8_Chapter.html#Fig14)).\n\
    \n   ![A450041_1_En_8_Fig14_HTML.jpg](A450041_1_En_8_Fig14_HTML.jpg)\n\n   Figure\
    \ 8-14: Add the Grunge effect to the photo\n\n4. In the tools, choose the Vignette\
    \ tool, drag the slider to the left, and then tap the Apply icon (Figure [8-15](#A450041_1_En_8_Chapter.html#Fig15)).\n\
    5. Tap the Share icon, and save the final result to your Camera Roll.\n\n   ![A450041_1_En_8_Fig15_HTML.jpg](A450041_1_En_8_Fig15_HTML.jpg)\n\
    \n   Figure 8-15: Add a vignette effect to create the final result\n\n## Build\
    \ a Pharaonic Composition\n\nTools used: `Adobe Lightroom` app, `Photoshop Fix`,\
    \ `Photoshop Mix`, `Eraser`, and `Photofox`\n\nFigures [8-16](#A450041_1_En_8_Chapter.html#Fig16),\
    \ [8-17](#A450041_1_En_8_Chapter.html#Fig17), [8-18](#A450041_1_En_8_Chapter.html#Fig18),\
    \ and [8-19](#A450041_1_En_8_Chapter.html#Fig19) shows the original photos I used\
    \ in this example.\n\n![A450041_1_En_8_Fig19_HTML.jpg](A450041_1_En_8_Fig19_HTML.jpg)\n\
    \nFigure 8-19: Original photo of sunset (© Rafiq Elmansy)\n\n![A450041_1_En_8_Fig18_HTML.jpg](A450041_1_En_8_Fig18_HTML.jpg)\n\
    \nFigure 8-18: Original photo of another pyramid (© Rafiq Elmansy)\n\n![A450041_1_En_8_Fig17_HTML.jpg](A450041_1_En_8_Fig17_HTML.jpg)\n\
    \nFigure 8-17: Original photo of pyramid (© Rafiq Elmansy)\n\n![A450041_1_En_8_Fig16_HTML.jpg](A450041_1_En_8_Fig16_HTML.jpg)\n\
    \nFigure 8-16: Original photo of sky (© Radwa Khalil)\n\nFigure [8-20](#A450041_1_En_8_Chapter.html#Fig20)\
    \ shows the final result.\n\n![A450041_1_En_8_Fig20_HTML.jpg](A450041_1_En_8_Fig20_HTML.jpg)\n\
    \nFigure 8-20: Final result\n\nYou can combine multiple photos to create mystic\
    \ and unnatural compositions. While the photo manipulation on a computer may be\
    \ done using one application such as Adobe Photoshop, on the iPhone, you are likely\
    \ to use more than one app to create the effect you need.\n\nDuring my trip to\
    \ the pyramids, I took some photos of the grand pyramid of Khufu. To create a\
    \ mystic composition, I used three photos to build the composition. I started\
    \ by improving the shot color and light and then created a duplicated one with\
    \ a transparent background to represent the pyramid reflection from the sky. Then,\
    \ I added a mystic blue sky to cover the shot.\n\n### Step 1: Optimize the Photo\
    \ Color and Light\n\nTo optimize the photo color and light, follow these steps:\n\
    \n1. Open the pyramid photo in Adobe Lightroom.\n2. Tap the Share icon, choose\
    \ Edit In, and select Maximum available. Choose Healing in Photoshop Fix to remove\
    \ the car from the photo (see Figure [8-21](#A450041_1_En_8_Chapter.html#Fig21)).\n\
    \n   ![A450041_1_En_8_Fig21_HTML.jpg](A450041_1_En_8_Fig21_HTML.jpg)\n\n   Figure\
    \ 8-21: Open the base photo in the Lightroom app\n\n3. In Photoshop Mix, tap the\
    \ Spot Heal icon. Tap the car and unwanted objects to remove them. You can use\
    \ the Clone Stamp tool to do more selective healing by copying another part of\
    \ the image (see Figure [8-22](#A450041_1_En_8_Chapter.html#Fig22)).\n\n   ![A450041_1_En_8_Fig22_HTML.jpg](A450041_1_En_8_Fig22_HTML.jpg)\n\
    \n   Figure 8-22: Use Spot Healing to remove the unwanted elements\n\n4. Tap the\
    \ blue bar at the top to save and return to the Adobe Lightroom app.\n5. Tap the\
    \ Light icon. Increase the contrast of the photo and reduce the highlights and\
    \ shadows.\n6. Tap the Color icon to increase the Vibrance setting in the photo\
    \ (see Figure [8-23](#A450041_1_En_8_Chapter.html#Fig23)).\n7. Tap the Share icon,\
    \ and save the image to your Camera Roll.\n\n   ![A450041_1_En_8_Fig23_HTML.jpg](A450041_1_En_8_Fig23_HTML.jpg)\n\
    \n   Figure 8-23: Improve the photo color, light, and temperature\n\n### Step\
    \ 2: Remove the Sky\n\nI want to use a more dramatic sky for the composition,\
    \ so I will remove the current one using the `Eraser` app as follows:\n\n1. Open\
    \ the modified photo in the `Eraser` app.\n2. Tap the Erase icon, and choose Target\
    \ Area. Set Threshold to 75 and tap the sky to remove it. Then tap Done (see Figure\
    \ [8-24](#A450041_1_En_8_Chapter.html#Fig24)).\n3. Tap the Share icon, and choose\
    \ the maximum size and PNG format. Click Save to save the image to the Camera\
    \ Roll.\n\n   ![A450041_1_En_8_Fig24_HTML.jpg](A450041_1_En_8_Fig24_HTML.jpg)\n\
    \n   Figure 8-24: Remove the sky background from the photo\n\n### Step 3: Build\
    \ the Composition\n\nNow, I will use Photoshop Mix to build the composition as\
    \ follows:\n\n1. Open a sky photo with a variation of colors in Photoshop Mix.\n\
    2. Tap the plus icon to add a new layer. Choose to add a new image layer. Then\
    \ I navigate to the transparent pyramid photo.\n3. Tap the pyramid layer to open\
    \ its properties panel, and choose Duplicate.\n4. With two fingers, rotate the\
    \ duplicated layer to be above the first one. You can also tap the layer to open\
    \ the layer options and choose Flip V (see Figure [8-25](#A450041_1_En_8_Chapter.html#Fig25)).\n\
    \n   ![A450041_1_En_8_Fig25_HTML.jpg](A450041_1_En_8_Fig25_HTML.jpg)\n\n   Figure\
    \ 8-25: Duplicate the pyramid layer and flip it\n\n5. Click the plus icon, and\
    \ choose a photo for the first sky.\n6. From the layers, rearrange the sky behind\
    \ the pyramids.\n7. Tap the top pyramid layer to open its properties panel, set\
    \ Opacity to 50%, and set the blending to Overlay.\n8. Tap the plus icon, and\
    \ choose a photo for the setting man.\n9. Tap the Cut Out icon. Select Basic to\
    \ do a normal delete, make sure to tap the settings icon on the left, and choose\
    \ Erase.\n10. Remove the unwanted areas of the photo and keep the setting man.\
    \ From the Feather icon, set up the smoothness of the edges of the image (see\
    \ Figure [8-26](#A450041_1_En_8_Chapter.html#Fig26)).\n11. Tap the Apply icon.\n\
    12. Tap the Share icon, and choose Camera Roll.\n\n    ![A450041_1_En_8_Fig26_HTML.jpg](A450041_1_En_8_Fig26_HTML.jpg)\n\
    \n    Figure 8-26: Add the sky background\n\n### Step 4: Add the Dramatic Sky\
    \ Effect\n\nNow, you will see how to add a second sky and use the blending mode\
    \ to make it look dramatic, as follows:\n\n1. Open the photo saved from the previous\
    \ steps in the `Photofox` app.\n2. Click the plus icon, and choose to add the\
    \ image.\n3. From Layers tab at the bottom, choose Blending, and set the blending\
    \ of the added sky to Color Burn (see Figure [8-27](#A450041_1_En_8_Chapter.html#Fig27)).\n\
    \n   ![A450041_1_En_8_Fig27_HTML.jpg](A450041_1_En_8_Fig27_HTML.jpg)\n\n   Figure\
    \ 8-27: Add the dramatic sky over the composition"
