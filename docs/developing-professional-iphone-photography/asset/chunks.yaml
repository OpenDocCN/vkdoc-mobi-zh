    Apress Media, LLC is a California LLC and the sole member (owner) is Springer
    Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a
    Delaware corporation. Introduction


    The idea of this book started when I was traveling without my camera and wanted
    to take photos in Paris. So, I just grabbed my iPhone and started taking shots
    of the amazing sightseeing there. That’s when I discovered that the iPhone is
    a powerful photography tool with a high-quality camera lens, stabilization capabilities,
    and small form factor. The numerous photography and photo-editing apps on the
    App Store make it even more powerful.


    Therefore, this book aims to help both professional and nonprofessional photographers
    start using their iPhones as a photography tool. It contains dozens of tips that
    start by helping you understand the core photography features on your iPhone and
    how to get the most out of them. Then, it moves on to tips that will help you
    use your iPhone to create photography projects that you used to create using your
    DSLR camera. These tips cover basic photo-editing skills such as adjusting colors,
    fixing issues, and replacing the background.


    The tips then cover more photography techniques such as creating double-exposure
    effects, low-light photos, and high-key photos. These tips simulate the techniques
    that can be done using the existing light in the scene of the shot. The later
    chapters give you more photo-editing tips, such as creating a composition of different
    photos, manipulating photos to create dramatic scenes, creating digital artwork,
    and more.


    During these tips, you will explore how to use a number of apps that can help
    you extend your iPhone’s photography capabilities. This includes the Adobe mobile
    apps for Adobe Photoshop and Lightroom that simulate the desktop-based photo-editing
    versions. Most of the other apps in the book can be easily grabbed from the Apple
    App Store. Some are free, and others include trial versions to try before buying.


    Later in the book, the tips explore how to organize your work on your iPhone and
    how to handle the space issues using the different cloud technologies including
    iCloud. Then you will explore how to start your work on your iPhone and then take
    it back to your computer to add even more effects to the shot.


    All the photos in this book were taken with an iPhone by my wife, Radwa Khalil,
    and me in different countries. The only photo that was not taken by an iPhone
    device is the Earth photo that was grabbed from Wikipedia under the public domain
    copyright.


    ## How to Use This Book


    Each chapter in this book includes a number of tips that cover skills related
    to mastering iPhone photography. Each tip stands alone, so you can start the book
    with any of these tips and try them individually. If you are a newbie at using
    your iPhone as a photography tool, you can start with the first tip and move forward
    from there. If you have some knowledge, reviewing the first tips will help you
    to organize your photos and find hidden features on your iPhone.


    Each tip gives an example of the workflow to create a specific effect. So, you
    need to read each tip and follow its steps and then try to apply it using your
    own photos. You may need to explore different values and options to create the
    most effective output with your own photographs. At the end of each chapter, there
    is a practice task that you can use to apply the effects used in the chapter to
    a photo and share it on different social networks; just use the hashtag `#iPhonePhotography`
    or mention me ( `@rafiqelmansy` ) on Facebook, Twitter, or LinkedIn. I will be
    checking your work and commenting on it.


    ## Practice, Practice, and Practice


    The more you practice with your iPhone, the more you will improve your skills.
    This book will start you on your journey, but further practice is important. Use
    the steps and figures to guide you to create effects based on each tip. Once you
    feel confident with these tips, you can move forward and explore other effects
    and techniques using the different photo apps available on the App Store to create
    even more fantastic iPhone photography projects.'
  trans: "\n# 打造专业级 iPhone 摄影技术\n\n**运用 Photoshop、Lightroom 及其他 iOS 与桌面端应用进行照片创作与编辑**\n\
    \n拉菲克·埃尔曼西\n\n本书作者引用的任何源代码或其他补充材料，读者均可通过本书产品页面（位于 [www.apress.com/978-1-4842-3185-2](http://www.apress.com/978-1-4842-3185-2)）在\
    \ GitHub 上获取。如需更多详细信息，请访问 [www.apress.com/source-code](http://www.apress.com/source-code)。\n\
    \nISBN 978-1-4842-3185-2  \n电子书 ISBN 978-1-4842-3186-9  \n[`doi.org/10.1007/978-1-4842-3186-9`](https://doi.org/10.1007/978-1-4842-3186-9)\n\
    \n美国国会图书馆控制号：2017963387\n\n© 拉菲克·埃尔曼西 2018  \n本作品受版权保护。出版商保留所有权利，无论是全部还是部分材料，具体包括翻译、转载、插图再利用、朗诵、广播、微缩胶片或其他任何物理形式的复制权，以及信息存储与检索、电子改编、计算机软件或目前已知或未来开发的任何类似或不同方法的传输权。\n\
    \n本书中可能出现商标名称、标识和图像。为避免在每个商标名称、标识或图像出现时都使用商标符号，我们仅在编辑性表述中使用这些名称、标识和图像，以维护商标所有者的利益，且无意侵犯商标权。本书中对商品名、商标、服务标志及类似术语的使用（即使未明确标注为商标）不应被视为对其是否受所有权保护的看法。\n\
    \n尽管本书中的建议和信息在出版时被认为是真实和准确的，但作者、编辑和出版商均不对可能出现的任何错误或遗漏承担法律责任。出版商对本书所含内容不作任何明示或暗示的担保。\n\
    \n本书采用无酸纸印刷。\n\n本书在全球图书市场由 Springer Science+Business Media New York 发行，地址：233\
    \ Spring Street, 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：`orders-ny@springer-sbm.com`，或访问\
    \ `www.springeronline.com`。Apress Media, LLC 是加利福尼亚州的一家有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州的公司。\n\
    \n## 引言\n\n本书的构想始于一次旅行——当时我未携带相机，却想在巴黎拍摄照片。于是，我拿起 iPhone，开始拍摄那些令人惊叹的风景。正是在那时，我发现\
    \ iPhone 是一款强大的摄影工具：它拥有高质量的摄像头镜头、图像稳定功能以及小巧的机身。App Store 中丰富的摄影和照片编辑应用更是让它如虎添翼。\n\
    \n因此，本书旨在帮助专业和非专业摄影师将 iPhone 用作摄影工具。书中包含数十个技巧，首先指导你理解 iPhone 的核心摄影功能，并教你如何充分利用它们。随后，本书将介绍如何利用\
    \ iPhone 完成以往需使用单反相机才能实现的摄影项目。这些技巧涵盖基本的照片编辑技能，如调整颜色、修复问题和更换背景。\n\n接着，这些技巧会涉及更多摄影技术，例如创建双重曝光效果、弱光照片和高调照片。这些技巧模拟了利用场景中现有光线可完成的技法。后续章节将提供更多照片编辑技巧，例如合成多张照片、通过处理照片营造戏剧性场景、创作数字艺术作品等。\n\
    \n通过这些技巧，你将探索如何使用多款应用来扩展 iPhone 的摄影能力。这包括 Adobe 移动端应用——Adobe Photoshop 和 Lightroom，它们模拟了桌面版的照片编辑功能。本书中提到的大多数其他应用都可以在\
    \ Apple App Store 中轻松获取。其中一些是免费应用，另一些则提供试用版本供购买前体验。\n\n在本书的后半部分，这些技巧将探讨如何在 iPhone\
    \ 上整理作品，以及如何利用包括 iCloud 在内的各种云技术解决存储空间问题。然后你将学习如何在 iPhone 上开始创作，再将其传输到电脑上为照片添加更多效果。\n\
    \n本书中的所有照片均由我和我的妻子拉德瓦·哈利勒在不同国家使用 iPhone 拍摄。唯一非 iPhone 设备拍摄的照片是地球照片，该照片来自维基百科，遵循公共领域版权。\n\
    \n## 如何使用本书\n\n本书每章都包含若干技巧，涵盖掌握 iPhone 摄影的相关技能。每个技巧都独立成篇，因此你可以从任何技巧开始逐个尝试。如果你是使用\
    \ iPhone 进行摄影的新手，可以从第一个技巧开始循序渐进。如果你已具备一定知识，回顾前几个技巧将有助于你整理照片并发现 iPhone 的隐藏功能。\n\
    \n每个技巧都提供了一个工作流程示例，用于创建特定效果。因此，你需要阅读每个技巧并按照步骤操作，然后尝试用自己的照片进行实践。你可能需要探索不同的数值和选项，以便为自己的照片创造最理想的效果。每章末尾都设有练习任务，你可以将本章所学的效果应用于一张照片，并在不同社交网络上分享；只需使用标签\
    \ `#iPhonePhotography` 或在 Facebook、Twitter 或 LinkedIn 上提及我（`@rafiqelmansy`），我会查看你的作品并给出评论。\n\
    \n## 练习、练习、再练习\n\n你使用 iPhone 练习得越多，你的技巧就会越精进。本书将引领你开启这段旅程，但持续的练习至关重要。请利用步骤和图示指导你根据每个技巧创建效果。一旦你对这些技巧充满信心，就可以继续前进，利用\
    \ App Store 中提供的各种照片应用探索其他效果和技术，创作出更精彩的 iPhone 摄影作品。\n"
