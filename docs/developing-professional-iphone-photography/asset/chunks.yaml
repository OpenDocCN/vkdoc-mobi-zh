    \n    ![A450041_1_En_6_Fig1_HTML.jpg](A450041_1_En_6_Fig1_HTML.jpg)\n\n    Figure\
    \ 6-1\n\n    Sign in to enter Creative Cloud  \n3.  Click the Lightroom logo icon\
