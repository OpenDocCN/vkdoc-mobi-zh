    \ saturation  \n\nNote\n\nTo use the sync feature, you need to have Adobe Lightroom\
    \ CC or a later version installed on your computer.\n\n### Import Photos from\
    \ Your iPhone\n\nSometimes you have photos that are saved in your phone’s photo\
    \ albums rather than the Lightroom app itself. These photos may be taken or modified\
    \ using other mobile apps. In this case, you can import the photos directly to\
    \ the Lightroom application on your computer by linking the photo and the computer\
    \ using a USB cable. This method is also helpful if you’re not subscribed to any\
    \ of the Adobe Creative Cloud memberships because this feature can work with the\
    \ free Adobe ID without the need to pay for any membership packages.\n\n1.  From\
    \ the Adobe Lightroom application on a computer, choose File ➤ Import Photos and\
    \ Videos.  \n2.  Set the From source to iPhone, as shown in Figure [5-15](#A450041_1_En_5_Chapter.html#Fig15).\n\
    \n    ![A450041_1_En_5_Fig15_HTML.jpg](A450041_1_En_5_Fig15_HTML.jpg)\n\n    Figure\
    \ 5-15\n\n    Importing images from the iPhone photo library  \n3.  Click All\
    \ Photos to deselect it.  \n4.  Select the photos you want to import.  \n\nThe\
    \ photos will be imported and displayed in the library. They are also saved in\
    \ the default location on your computer. You can change the location where the\
    \ imported photos are saved on the computer from the Preferences dialog box (Lightroom\
    \ ➤ Preferences on macOS or Edit ➤ Preferences on Windows), as shown in Figure\
    \ [5-16](#A450041_1_En_5_Chapter.html#Fig16).\n\n![A450041_1_En_5_Fig16_HTML.jpg](A450041_1_En_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16\n\nChanging the import folder in the Preferences dialog box\n\n\
    ## Use Other Raw Photo Apps\n\nAdobe Lightroom is not the only mobile app that\
    \ allows you to take Camera Raw photos. The RAW app by 500px is a free application\
    \ that you can download and use to take Raw photos; you can also modify these\
    \ photos and upload them to your profile on [`www.500px.com`](http://www.500px.com)\
    \ , a social network for photographers to showcase their photography work. You\
    \ can save the photos in your iPhone’s Camera Roll for further modifications.\
    \ To take Raw photos using the RAW app, you can follow these steps:\n\n1.  Install\
    \ the RAW app from the App Store.  \n2.  Log in using your 500px free account.\
    \  \n3.  Drag the left slider next to the shutter button to the right side to\
    \ activate advanced mode. In this mode, you can use the left slider to control\
    \ the depth of field in the photo. The right slider allows you to modify the exposure\
    \ of the photo, as shown in Figure [5-17](#A450041_1_En_5_Chapter.html#Fig17).\n\
    \n    ![A450041_1_En_5_Fig17_HTML.jpg](A450041_1_En_5_Fig17_HTML.jpg)\n\n    Figure\
    \ 5-17\n\n    Taking photos using the RAW app  \n4.  Once a photo is taken, drag\
    \ from the right to the left to enter the photo library, as shown in Figure [5-18](#A450041_1_En_5_Chapter.html#Fig18).\n\
    \n    ![A450041_1_En_5_Fig18_HTML.jpg](A450041_1_En_5_Fig18_HTML.jpg)\n\n    Figure\
    \ 5-18\n\n    Selecting photos from the RAW app library  \n5.  Select the photo\
    \ to modify it and use the bottom icons to crop, adjust, or apply presets, as\
    \ shown in Figure [5-19](#A450041_1_En_5_Chapter.html#Fig19).\n\n    ![A450041_1_En_5_Fig19_HTML.jpg](A450041_1_En_5_Fig19_HTML.jpg)\n\
    \n    Figure 5-19\n\n    Editing Raw photos in the RAW app  \n6.  Once you are\
    \ done with the modifications, tap the right icon at the top right to apply the\
    \ changes.\n\n## Summary\n\nYou can extend your iPhone photography skills by taking\
    \ Camera Raw photos , which are unprocessed images that maximize your ability\
    \ to modify the photos after taking them. This can help you to create professional\
    \ photos even if the circumstances you took the photos in were not helpful (such\
    \ as bad light conditions). You can also extend your photography skills by integrating\
    \ your mobile apps with their desktop photography versions to be able to reach\
    \ more advanced features.\n\nAdobe Lightroom is one of the top photography and\
    \ photo-editing applications for photographers. It can help you take photos using\
    \ your iPhone and then integrate them with its desktop version so you can apply\
    \ more accurate and intensive photo-editing techniques. This can help you to produce\
    \ professional photo results.\n\nIn addition to the Lightroom app, there are other\
    \ applications that can help you to take Camera Raw images such as the RAW app\
    \ provided by 500px. It allows you to take Raw photos, modify them, and save them\
    \ on the iPhone in the Camera Raw format. You can also share the photos through\
    \ your profile on the 500px web site.\n\n## Practice Exercise\n\nFor this exercise,\
    \ take some photos using the Camera Raw technology via the Lightroom app or any\
    \ Raw-supporting app. Then use this app to modify your photos, share them to the\
    \ Facebook group, and discuss the results with your peers.\n\n# 6. Integrating\
    \ Your Photos with Adobe Photoshop on the Desktop\n\nAs you learned in the previous\
    \ chapter, integrating your photo-editing tasks between your iPhone and your computer\
    \ helps you create even better photos. You can use the computer’s full-featured\
    \ photo-editing applications such as Photoshop and Lightroom to enhance and manipulate\
    \ your photos. When you send the photo from your Adobe mobile app to the desktop\
    \ application, you can preserve the layers, effects, and adjustments."
  trans: "\n### 通过云端整合照片\n\n此方法允许你通过 Adobe Creative Cloud 会员资格，在手机上的 `Lightroom` 应用与桌面应用之间进行同步。如果你正在进行摄影项目或照片编辑，可以注册摄影版\
    \ Creative Cloud 会员，该会员资格除了移动应用外，还允许你使用诸如 `Lightroom` 和 `Photoshop` 等桌面照片编辑应用。\n\
    \n一旦手机上的照片完成同步，它们便可在桌面的 Adobe `Lightroom` 中获取，包括应用于图像的所有修改。\n\n1. 打开手机上的 `Lightroom`\
    \ 应用，并使用你的 Adobe ID 登录。\n2. 在 `Lightroom` 图库中，点击左上角的云图标。这将通过云端同步所有照片。\n3. 点击其中一张照片，并使用不同的\
    \ `Lightroom` 功能进行编辑。修改照片后，点击左上角的云图标，将更改同步到云端，如图 5-11 所示。\n\n   ![A450041_1_En_5_Fig11_HTML.jpg](img/A450041_1_En_5_Fig11_HTML.jpg)\n\
    \n   **图 5-11** 点击云图标同步图像修改\n\n4. 现在，转到电脑上的 `Lightroom` 应用程序。\n5. 在左侧，点击 `iPhone`。点击\
    \ `导入的照片` 以显示同步的照片。\n6. 选择你在手机上编辑过的照片，如图 5-12 所示。\n\n   ![A450041_1_En_5_Fig12_HTML.jpg](img/A450041_1_En_5_Fig12_HTML.jpg)\n\
    \n   **图 5-12** 你可以在电脑上的 Adobe `Lightroom` 中显示同步的照片\n\n7. 点击屏幕右上角的 `修改照片` 选项卡进入编辑模式。\n\
    8. 在右侧面板中，选择 `径向滤镜` 图标，如图 5-13 所示。\n\n   ![A450041_1_En_5_Fig13_HTML.jpg](img/A450041_1_En_5_Fig13_HTML.jpg)\n\
    \n   **图 5-13** 在电脑上的 `Lightroom` 中选择 `径向滤镜` 图标\n\n9. 拖拽在图像上创建一个径向滤镜。\n10. 将 `饱和度`\
    \ 设置为 `-100`，以去除照片边缘的颜色，如图 5-14 所示。\n\n    ![A450041_1_En_5_Fig14_HTML.jpg](img/A450041_1_En_5_Fig14_HTML.jpg)\n\
    \n    **图 5-14** 在降低图像边缘饱和度的同时应用径向滤镜\n\n> **注意**  \n> 要使用同步功能，你需要确保电脑上安装了 Adobe\
    \ `Lightroom CC` 或更高版本。\n\n### 从你的 iPhone 导入照片\n\n有时候，你的照片是保存在手机相册中，而非 `Lightroom`\
    \ 应用本身。这些照片可能是使用其他移动应用拍摄或修改的。在这种情况下，你可以通过使用 USB 数据线连接手机和电脑，将照片直接导入到电脑上的 `Lightroom`\
    \ 应用程序中。如果你没有订阅任何 Adobe Creative Cloud 会员，此方法也很有用，因为此功能可以配合免费的 Adobe ID 使用，无需支付任何会员费用。\n\
    \n1. 在电脑上的 Adobe `Lightroom` 应用程序中，选择 `文件` ➤ `导入照片和视频`。\n2. 将 `来源` 设置为 `iPhone`，如图\
    \ 5-15 所示。\n\n   ![A450041_1_En_5_Fig15_HTML.jpg](img/A450041_1_En_5_Fig15_HTML.jpg)\n\
    \n   **图 5-15** 从 iPhone 照片图库导入图像\n\n3. 点击 `所有照片` 取消全选。\n4. 选择你想要导入的照片。\n\n照片将被导入并显示在图库中。它们也会被保存在你电脑上的默认位置。你可以从\
    \ `首选项` 对话框（macOS 上为 `Lightroom` ➤ `首选项`，Windows 上为 `编辑` ➤ `首选项`）更改导入照片在电脑上的保存位置，如图\
    \ 5-16 所示。\n\n![A450041_1_En_5_Fig16_HTML.jpg](img/A450041_1_En_5_Fig16_HTML.jpg)\n\
    \n**图 5-16** 在 `首选项` 对话框中更改导入文件夹\n\n## 使用其他 Raw 照片应用\n\nAdobe `Lightroom` 并非唯一一个允许你拍摄\
    \ Camera Raw 照片的移动应用。500px 推出的 `RAW` 应用是一个免费应用，你可以下载并使用它来拍摄 Raw 照片；你还可以修改这些照片并将其上传到你在\
    \ [`www.500px.com`](http://www.500px.com) 的个人资料中，这是一个供摄影师展示其摄影作品的社交网络。你可以将照片保存在\
    \ iPhone 的“相机胶卷”中以供进一步修改。要使用 `RAW` 应用拍摄 Raw 照片，可以遵循以下步骤：\n\n1. 从 App Store 安装\
    \ `RAW` 应用。\n2. 使用你的 500px 免费账户登录。\n3. 将快门按钮旁边的左侧滑块向右拖动以激活高级模式。在此模式下，你可以使用左侧滑块控制照片的景深。右侧滑块允许你修改照片的曝光，如图\
    \ 5-17 所示。\n\n   ![A450041_1_En_5_Fig17_HTML.jpg](img/A450041_1_En_5_Fig17_HTML.jpg)\n\
    \n   **图 5-17** 使用 `RAW` 应用拍摄照片\n\n4. 拍摄照片后，从右向左拖动以进入照片库，如图 5-18 所示。\n\n   ![A450041_1_En_5_Fig18_HTML.jpg](img/A450041_1_En_5_Fig18_HTML.jpg)\n\
    \n   **图 5-18** 从 `RAW` 应用图库中选择照片\n\n5. 选择照片进行修改，并使用底部的图标进行裁剪、调整或应用预设，如图 5-19\
    \ 所示。\n\n   ![A450041_1_En_5_Fig19_HTML.jpg](img/A450041_1_En_5_Fig19_HTML.jpg)\n\
    \n   **图 5-19** 在 `RAW` 应用中编辑 Raw 照片\n\n6. 修改完成后，点击右上角的图标以应用更改。\n\n## 总结\n\n你可以通过拍摄\
    \ Camera Raw 照片来扩展你的 iPhone 摄影技能，这些照片是未经处理的图像，能最大限度地提高你在拍摄后修改照片的能力。即使你拍摄照片时的环境不太理想（例如光线条件不佳），这也能帮助你创作出专业的照片。你还可以通过将移动应用与其桌面摄影版本集成，以使用更高级的功能，从而扩展你的摄影技能。\n\
    \nAdobe `Lightroom` 是摄影师最顶级的摄影和照片编辑应用之一。它可以帮助你使用 iPhone 拍摄照片，然后与桌面版集成，以便应用更精确、更深入的图像编辑技术。这可以帮助你制作出专业水准的照片成果。\n\
    \n除了 `Lightroom` 应用之外，还有其他应用可以帮助你拍摄 Camera Raw 图像，例如 500px 提供的 `RAW` 应用。它允许你拍摄\
    \ Raw 照片，进行修改，并以 Camera Raw 格式保存在 iPhone 上。你还可以通过你在 500px 网站上的个人资料分享这些照片。\n\n\
    ## 实践练习\n\n对于本次练习，请通过 `Lightroom` 应用或任何支持 Raw 格式的应用，使用 Camera Raw 技术拍摄一些照片。然后使用此应用修改你的照片，将它们分享到\
    \ Facebook 群组，并与你的同伴讨论结果。\n\n# 6. 在桌面上将你的照片与 Adobe Photoshop 集成\n\n正如你在前一章所学到的，将\
    \ iPhone 与电脑之间的照片编辑任务进行整合，有助于你创作出更出色的照片。你可以利用电脑上功能完备的照片编辑应用（如 `Photoshop` 和 `Lightroom`）来增强和处理你的照片。当你将照片从\
    \ Adobe 移动应用发送到桌面应用时，可以保留图层、效果和调整。\n"
- fmt: "# Prepare Your iPhone for Integration\n\nTo integrate between the Adobe apps\
    \ on your iPhone and the desktop versions, you need to be signed in to the Creative\
    \ Cloud from the app. This will allow you to share files with your computer through\
    \ the Creative Cloud. In fact, you can integrate all the Adobe mobile apps through\
    \ the Creative Cloud. These steps show you how to connect to the cloud from the\
    \ Lightroom app:\n\n1.  Open the Adobe Lightroom app. If you are not signed in,\
    \ you will see a `Sign in` button; tap it.\n2.  On the `Sign in` screen, enter\
    \ your Adobe ID username and password, and tap `Sign in` (see Figure 6-1).\n\n\
    \    ![A450041_1_En_6_Fig1_HTML.jpg](A450041_1_En_6_Fig1_HTML.jpg)\n\n    Figure\
    \ 6-1 Sign in to enter Creative Cloud\n\n3.  Click the Lightroom logo icon at\
    \ the top left to open the app menu (see Figure 6-2).\n4.  Activate `Sync Only\
    \ Over Wi-Fi` to avoid draining your mobile Internet data and keep the syncing\
    \ only when you have access to a Wi-Fi connection.\n5.  Deactivate `Prevent from\
    \ Sleep` to allow your phone to go to sleep while doing the sync. This can save\
    \ the battery.\n6.  Activate `Load Full Resolution` to use the highest resolution\
    \ possible for photos.\n7.  Activate `Auto Add Photos` to sync photos automatically.\n\
    8.  Deactivate `Auto Add Videos` to avoid syncing videos.\n\n    ![A450041_1_En_6_Fig2_HTML.jpg](A450041_1_En_6_Fig2_HTML.jpg)\n\
    \n    Figure 6-2 Creative Cloud sync settings\n\nTo review the synced documents,\
    \ you need the Adobe Creative Cloud app installed on both your iPhone and your\
    \ computer. When you log into your cloud app from your iPhone, you will be able\
    \ to check the synced documents based on their type (see Figure 6-3).\n\n![A450041_1_En_6_Fig3_HTML.jpg](A450041_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3 Viewing the synced documents from the Creative Cloud console\n\n\
    On your desktop computer, the Creative Cloud console allows you to view the cloud\
    \ documents, find applications to download, find fonts, and see your follower\
    \ updates (Community). You can also access the documents you saved from your iPhone\
    \ to the cloud storage as follows:\n\n1.  Open the Creative Cloud console. If\
    \ it is not downloaded, you can download it from Adobe.com.\n2.  Click the `Assets`\
    \ tab and then choose `Files`. Here, you can learn about your storage, the type\
    \ of subscription (either free or paid), and the file update status.\n3.  Click\
    \ `Open Folder` to open the local folder where you can find the synced files from\
    \ your iPhone (see Figure 6-4).\n\n    ![A450041_1_En_6_Fig4_HTML.jpg](A450041_1_En_6_Fig4_HTML.jpg)\n\
    \n    Figure 6-4 Setting up the Lightroom options from the main menu\n\n## Integrate\
    \ Files with Desktop Photoshop\n\nOnce you log into the iPhone Adobe apps and\
    \ prepare to sync photos between the app and desktop applications, you can send\
    \ the files from these apps to the desktop version, where they are synced in the\
    \ cloud. Then the files will be opened automatically in the associated application.\
    \ In the following example, you will send a document from the Photoshop Fix app\
    \ to Photoshop on the desktop and explore how the sent file has preserved its\
    \ structure:\n\n1.  Make sure that the Creative Cloud console app is installed\
    \ on the desktop computer and that both the computer and the iPhone are connected\
    \ to the Internet.\n2.  Open the Photoshop Fix app on the iPhone.\n3.  Select\
    \ one of the existing projects or create a new one. Make sure that the file is\
    \ optimized and doesn’t have any unwanted layers to avoid slow syncing between\
    \ the app and the desktop version of Photoshop (see Figure 6-5).\n\n    ![A450041_1_En_6_Fig5_HTML.jpg](A450041_1_En_6_Fig5_HTML.jpg)\n\
    \n    Figure 6-5 One photo in Photoshop Fix\n\n4.  Click the Share icon. You can\
    \ choose to send the document to Photoshop CC, save it for the Lightroom app,\
    \ or save it in the cloud storage only. Choose `Send to Photoshop CC` (see Figure\
    \ 6-6).\n\n    ![A450041_1_En_6_Fig6_HTML.jpg](A450041_1_En_6_Fig6_HTML.jpg)\n\
    \n    Figure 6-6 Sharing the project with Photoshop CC\n\nNotice that the desktop\
    \ Photoshop opens with the document in it. In the `Layers` panel, you can check\
    \ the effects and adjustments applied to the photo. If you applied any healing\
    \ effects, for example, they will show up in a new layer above the original photo.\
    \ This nondestructive modification can help you to edit and modify the effects\
    \ even after opening them in Photoshop CC on the desktop (see Figure 6-7).\n\n\
    ![A450041_1_En_6_Fig7_HTML.jpg](A450041_1_En_6_Fig7_HTML.jpg)\n\nFigure 6-7 The\
    \ photo in Photoshop CC\n\n## Complete an iPhone Photo on the Computer\n\nTools\
    \ used: Photoshop Fix app, Photoshop CC desktop\n\nFigure 6-8 shows the original\
    \ photo I used in this example.\n\n![A450041_1_En_6_Fig8_HTML.jpg](A450041_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8 The original photo\n\nFigure 6-9 shows the final results.\n\n![A450041_1_En_6_Fig9_HTML.jpg](A450041_1_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9 Final result\n\nTo practice the integration between the iPhone and\
    \ your computer, I have a photo that I took of the city of Newcastle in the United\
    \ Kingdom using my iPhone. I will edit this photo using the Photoshop Fix app.\
    \ Then I will send it to Photoshop CC to complete the project by adding noise\
    \ to the photo. This will give it an old-style effect; then I will apply a vignette\
    \ to the edges of the photo. To follow along, continue reading.\n\n### Step 1:\
    \ Fix a Photo on the iPhone\n\nHere are the steps:\n\n1.  Open Photoshop Fix.\
    \ Tap the plus icon to create a new project.\n2.  Tap `On My Photo` and navigate\
    \ to the photo in the Camera Roll.\n3.  Tap the Crop icon to crop the bottom part\
    \ of the photo.\n4.  Tap `Original` in the cropping options to maintain the same\
    \ ratio of the photo. Drag the bottom-left edge to remove the lower part of the\
    \ shot and focus on the building (see Figure 6-10).\n\n    ![A450041_1_En_6_Fig10_HTML.jpg](A450041_1_En_6_Fig10_HTML.jpg)\n\
    \n    Figure 6-10 Crop the photo to focus on the main object and remove distractions\n\
    \n5.  Tap the Healing icon to remove the traffic light and the wires above the\
    \ building from the shot.\n6.  Choose the `Clone Stamp` tool. Click the area of\
    \ the tree next to the top part of the traffic light (see Figure 6-11).\n\n  \
    \  ![A450041_1_En_6_Fig11_HTML.jpg](A450041_1_En_6_Fig11_HTML.jpg)\n\n    Figure\
    \ 6-11 Using the Clone Stamp to fix the photo\n\n7.  Tap the `Spot Healing` tool\
    \ and paint over the wires above the building to remove them; then tap `Apply`\
    \ (see Figure 6-12).\n\n    ![A450041_1_En_6_Fig12_HTML.jpg](A450041_1_En_6_Fig12_HTML.jpg)\n\
    \n    Figure 6-12 Using the Spot Healing tool\n\n### Step 2: Send the Document\
    \ to Photoshop CC\n\nTo send the document to Photoshop CC, follow these steps:\n\
    \n1.  Tap the Share icon in Photoshop Fix.\n2.  Tap `Send to Photoshop CC` (see\
    \ Figure 6-13).\n\nThe document is updated and sent to Photoshop CC through the\
    \ Creative Cloud.\n\n![A450041_1_En_6_Fig13_HTML.jpg](A450041_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13 Sending the photo to Photoshop CC"
