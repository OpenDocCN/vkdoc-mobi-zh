    \nFigure 4-30\n\nOriginal photo\n\nFigure [4-31](#A450041_1_En_4_Chapter.html#Fig31)\
    \ shows the final result.\n\n![A450041_1_En_4_Fig31_HTML.jpg](A450041_1_En_4_Fig31_HTML.jpg)\n\
    \nFigure 4-31\n\nFinal result\n\nA popular trick in photo editing is to turn a\
    \ photo into an old-style photo and change it to a film strip shape. To do this,\
    \ you first convert the photo to black and white and give it a monochrome effect\
    \ using the Snapseed app so that it’s suitable for the final effect. Then, you\
    \ can move to the Camera Awesome app where you will crop the photo to fit inside\
    \ the film strip. In the same app, you can apply a sepia filter to the photo,\
    \ then a texture, and finally the film strip.\n\n### Step 1: Convert the Photo\
    \ to Monochrome\n\nFollow these steps to convert the photo to monochrome:\n\n\
    1.  Open the photo in the Snapseed app.  \n2.  Tap the Tools icon, and choose\
    \ Black & White. Choose a tone that makes sure that all the elements in the photo\
    \ are clear and contrasted (see Figure [4-32](#A450041_1_En_4_Chapter.html#Fig32)).\n\
    \n    ![A450041_1_En_4_Fig32_HTML.jpg](A450041_1_En_4_Fig32_HTML.jpg)\n\n    Figure\
    \ 4-32\n\n    Converting the photo to black and white  \n3.  Tap the Apply icon.\
    \  \n4.  In the Tools list, choose the Vintage filter, and select a brown color\
    \ filter. Tap the Apply icon (see Figure [4-33](#A450041_1_En_4_Chapter.html#Fig33)).\n\
    \n    ![A450041_1_En_4_Fig33_HTML.jpg](A450041_1_En_4_Fig33_HTML.jpg)\n\n    Figure\
    \ 4-33\n\n    Add a vintage color to the photo\n\n### Step 2: Improve the Photo\
    \ and Add the Frame\n\nFollow these step s to improve the photo and add the frame:\n\
    \n1.  In the Ca mera Awesome app, tap the photos icon on the left of t he camera\
    \ button. Tap the plus icon, and add the photos from your library.  \n2.  Tap\
    \ to open the image from the library, and then tap the photo to edit.  \n3.  Tap\
    \ the Transform icon, and set the crop size to a square. Then tap Done.  \n4.\
    \  Tap the filters, apply the Sepia filter, and tap Done (see Figure [4-34](#A450041_1_En_4_Chapter.html#Fig34)).\n\
    \n    ![A450041_1_En_4_Fig34_HTML.jpg](A450041_1_En_4_Fig34_HTML.jpg)\n\n    Figure\
    \ 4-34\n\n    Apply a Sepia filter in Camera Awesome  \n5.  In the Texture section,\
    \ choose a Family Album filter, and tap Done to apply it.  \n6.  Tap the Frames\
    \ icon, and choose the Sprockets frame. You can also apply other film-like frames.\
    \ Then tap Done (see Figure [4-35](#A450041_1_En_4_Chapter.html#Fig35)).  \n7.\
    \  In the bottom toolbar, tap the Export to Camera Roll icon.\n\n    ![A450041_1_En_4_Fig35_HTML.jpg](A450041_1_En_4_Fig35_HTML.jpg)\n\
    \n    Figure 4-35\n\n    Add the film frame to the photo\n\n## Highlighting Elements\
    \ Using Color\n\nTools used: Photoshop Mix and Photo Splash\n\nIn this tip, you’ll\
    \ l earn the following:\n\n*   How to fix i ssues in photos using layers\n*  \
    \ How to convert photos to black and white\n*   How to colorize part of the photograph\
    \ or decolorize it\n\nFigure [4-36](#A450041_1_En_4_Chapter.html#Fig36) shows\
    \ the original photo I’m using.\n\n![A450041_1_En_4_Fig36_HTML.jpg](A450041_1_En_4_Fig36_HTML.jpg)\n\
    \nFigure 4-36\n\nOriginal photo\n\nFigure [4-37](#A450041_1_En_4_Chapter.html#Fig37)\
    \ shows the final result.\n\n![A450041_1_En_4_Fig37_HTML.jpg](A450041_1_En_4_Fig37_HTML.jpg)\n\
    \nFigure 4-37\n\nFinal result\n\nSometimes you need to emphasize an object based\
    \ on the photo’s composition. This can be achieved using different methods such\
    \ as color. One of the effects that can help you to focus on a specific element\
    \ in the shot is colorizing an object while converting the rest of the photo to\
    \ black and white. In this tip, I have a photo of a King Tut Ankamoun poster,\
    \ and I would like to highlight the mask in the shot.\n\nUnfortunately, the left\
    \ side of the wall in the photo has very exposed light compared to the right side.\
    \ So, I will show how to use Photoshop Mix to replace the left wall with a copy\
    \ from the right side. Then, I will open the photo in Photo Splash to easily"
  trans: "\n# 创建相框\n\n使用工具：`Tadaa`、`Laminar Pro` 和 `Photoshop Mix`\n\n在本节中，您将学习以下内容：\n\
    \n- 如何将照片转换为复古风格\n- 如何为照片应用不同类型的相框\n- 如何将两张或更多照片合成处理\n\n有很多应用程序可以为您的照片创建相框。在这个技巧中，我使用了一张几年前在黎巴嫩旅行时拍摄的照片。我想用我妻子拍摄的一张树干照片为它制作一个定制相框。但首先，在应用相框之前，我会先添加一个复古色彩效果。\n\
    \n图 4-22 和图 4-23 展示了原始照片。\n\n![A450041_1_En_4_Fig23_HTML.jpg](img/A450041_1_En_4_Fig23_HTML.jpg)\n\
    \n图 4-23\n\n原始纹理照片（© Radwa Khalil）\n\n![A450041_1_En_4_Fig22_HTML.jpg](img/A450041_1_En_4_Fig22_HTML.jpg)\n\
    \n图 4-22\n\n原始照片（© Rafiq Elmansy）\n\n图 4-24 展示了最终结果。\n\n![A450041_1_En_4_Fig24_HTML.jpg](img/A450041_1_En_4_Fig24_HTML.jpg)\n\
    \n图 4-24\n\n最终结果\n\n## 步骤 1：为照片添加复古效果\n\n按照以下步骤为照片添加复古效果：\n\n1.  在 `Tadaa` 应用中打开一张照片。\n\
    2.  点击滤镜图标，选择 Shoreditch 滤镜。然后点击应用图标（见图 4-25）。\n\n    ![A450041_1_En_4_Fig25_HTML.jpg](img/A450041_1_En_4_Fig25_HTML.jpg)\n\
    \n    图 4-25\n\n    在 `Tadaa` 应用中应用 Shoreditch 滤镜\n3.  点击相框图标，选择一个脏污风格相框，然后点击应用图标（见图\
    \ 4-26）。\n4.  将照片保存到相机胶卷文件夹中。\n\n    ![A450041_1_En_4_Fig26_HTML.jpg](img/A450041_1_En_4_Fig26_HTML.jpg)\n\
    \n    图 4-26\n\n    在 `Tadaa` 应用中应用复古相框\n\n## 步骤 2：应用更多相框\n\n按照以下步骤应用更多相框：\n\n\
    1.  在 `Laminar` 应用中，打开上一步保存的照片。\n2.  点击效果图标，然后选择边框。\n3.  选择 Snap and Stack 边框，然后点击应用图标（见图\
    \ 4-27）。\n\n    ![A450041_1_En_4_Fig27_HTML.jpg](img/A450041_1_En_4_Fig27_HTML.jpg)\n\
    \n    图 4-27\n\n    在 `Laminar` 应用中应用 Snap and Stack 边框。\n4.  点击分享和导出图标。将输出格式设置为\
    \ `PNG`（这将创建一张透明照片），然后从保存到菜单中选择图库。\n\n## 步骤 3：添加相框背景纹理\n\n要添加相框背景纹理，请按以下步骤操作：\n\
    \n1.  在 `Photoshop Mix` 中打开树干纹理图片。\n2.  点击加号图标添加一个新图层。选择相框图像添加到新图层。\n3.  用手指调整上层图像的大小，使其与画布尺寸匹配（见图\
    \ 4-28）。\n\n    ![A450041_1_En_4_Fig28_HTML.jpg](img/A450041_1_En_4_Fig28_HTML.jpg)\n\
    \n    图 4-28\n\n    在 `Photoshop Mix` 中将照片添加到树干纹理上\n4.  点击外观，然后选择 Punch 滤镜。\n\
    5.  点击屏幕右侧的编辑工具，然后选择智能选取。\n6.  点击羽化图标，并向右拖动以增加羽化值。\n7.  涂抹照片的中间部分，使效果保留在照片中部，并从边缘去除效果（见图\
    \ 4-29）。\n\n    ![A450041_1_En_4_Fig29_HTML.jpg](img/A450041_1_En_4_Fig29_HTML.jpg)\n\
    \n    图 4-29\n\n    使用智能选取优化相框外观\n\n# 创建胶片条纹效果\n\n使用工具：`Snapseed`、`Camera Awesome`\n\
    \n在这个技巧中，您将学习以下内容：\n\n- 如何将照片转换为黑白\n- 如何将照片转换为单色\n- 如何裁剪照片并添加纹理\n- 如何为照片添加胶片条纹效果\n\
    \n图 4-30 展示了我使用的原始照片。\n\n![A450041_1_En_4_Fig30_HTML.jpg](img/A450041_1_En_4_Fig30_HTML.jpg)\n\
    \n图 4-30\n\n原始照片\n\n图 4-31 展示了最终结果。\n\n![A450041_1_En_4_Fig31_HTML.jpg](img/A450041_1_En_4_Fig31_HTML.jpg)\n\
    \n图 4-31\n\n最终结果\n\n照片编辑中的一个流行技巧是将照片变成老式风格，并将其更改为胶片条形状。要做到这一点，首先使用 `Snapseed`\
    \ 应用将照片转换为黑白并赋予其单色效果，使其适合最终效果。然后，您可以使用 `Camera Awesome` 应用，在其中裁剪照片以适应胶片条内部。在同一个应用中，您可以为照片应用棕褐色滤镜，然后是纹理，最后是胶片条。\n\
    \n## 步骤 1：将照片转换为单色\n\n按照以下步骤将照片转换为单色：\n\n1.  在 `Snapseed` 应用中打开照片。\n2.  点击工具图标，选择黑白。选择一个能确保照片中所有元素清晰且对比分明的色调（见图\
    \ 4-32）。\n\n    ![A450041_1_En_4_Fig32_HTML.jpg](img/A450041_1_En_4_Fig32_HTML.jpg)\n\
    \n    图 4-32\n\n    将照片转换为黑白\n3.  点击应用图标。\n4.  在工具列表中，选择复古滤镜，并选择一个棕色调的滤镜。点击应用图标（见图\
    \ 4-33）。\n\n    ![A450041_1_En_4_Fig33_HTML.jpg](img/A450041_1_En_4_Fig33_HTML.jpg)\n\
    \n    图 4-33\n\n    为照片添加复古色彩\n\n## 步骤 2：优化照片并添加相框\n\n按照以下步骤优化照片并添加相框：\n\n1. \
    \ 在 `Camera Awesome` 应用中，点击相机按钮左侧的照片图标。点击加号图标，从您的图库中添加照片。\n2.  点击以从图库中打开图像，然后点击照片进行编辑。\n\
    3.  点击变换图标，将裁剪尺寸设置为正方形。然后点击完成。\n4.  点击滤镜，应用棕褐色滤镜，然后点击完成（见图 4-34）。\n\n    ![A450041_1_En_4_Fig34_HTML.jpg](img/A450041_1_En_4_Fig34_HTML.jpg)\n\
    \n    图 4-34\n\n    在 `Camera Awesome` 中应用棕褐色滤镜\n5.  在纹理部分，选择家庭相册滤镜，然后点击完成应用。\n\
    6.  点击相框图标，选择 Sprockets 相框。您也可以应用其他类似胶片的相框。然后点击完成（见图 4-35）。\n7.  在底部工具栏中，点击导出到相机胶卷图标。\n\
    \n    ![A450041_1_En_4_Fig35_HTML.jpg](img/A450041_1_En_4_Fig35_HTML.jpg)\n\n\
    \    图 4-35\n\n    为照片添加胶片相框\n\n# 使用色彩突出元素\n\n使用工具：`Photoshop Mix` 和 `Photo Splash`\n\
    \n在这个技巧中，您将学习以下内容：\n\n- 如何使用图层修复照片中的问题\n- 如何将照片转换为黑白\n- 如何给照片的一部分上色或去色\n\n图 4-36\
    \ 展示了我使用的原始照片。\n\n![A450041_1_En_4_Fig36_HTML.jpg](img/A450041_1_En_4_Fig36_HTML.jpg)\n\
    \n图 4-36\n\n原始照片\n\n图 4-37 展示了最终结果。\n\n![A450041_1_En_4_Fig37_HTML.jpg](img/A450041_1_En_4_Fig37_HTML.jpg)\n\
    \n图 4-37\n\n最终结果\n\n有时您需要根据照片的构图来强调某个对象。这可以通过不同的方法实现，例如使用色彩。一种有助于将焦点集中在画面中特定元素上的效果是，将某个对象着色，同时将照片的其余部分转换为黑白。在这个技巧中，我有一张图坦卡蒙面具的海报照片，我想突出画面中的面具。\n\
    \n不幸的是，照片中左侧墙壁的光线相比右侧非常曝光过度。因此，我将演示如何使用 `Photoshop Mix` 将左侧墙壁替换为右侧的副本。然后，我将在\n"
- fmt: "### Step 1: Fix the Photo Issues\n\nFollow these steps to fix the photo issues:\n\
    \n1. Open the photo in `Photoshop Mix`. You need to replace the left side of the\
    \ wall with a copy from the right side.\n2. Tap the layer to open its properties\
    \ menu. Then, tap `Duplicate` (see Figure [4-38](#A450041_1_En_4_Chapter.html#Fig38)).\n\
    \n   ![A450041_1_En_4_Fig38_HTML.jpg](A450041_1_En_4_Fig38_HTML.jpg)\n\n   **Figure\
    \ 4-38** Open the photo in `Photoshop Mix`\n3. Select the top layer. Tap `Cut\
    \ Out`.\n4. Select the `Smart` tool, and then in the left settings tap `Subtract`.\
    \ Drag over the photo to remove everything and keep the front side of the right\
    \ wall (see Figure [4-39](#A450041_1_En_4_Chapter.html#Fig39)).\n\n   ![A450041_1_En_4_Fig39_HTML.jpg](A450041_1_En_4_Fig39_HTML.jpg)\n\
    \n   **Figure 4-39** Use the `Smart` tool to remove the layer elements and keep\
    \ the right wall\n5. In the bottom toolbar, tap `Refine`. In the left settings,\
    \ drag over the `Feather` value to set it to `15`.\n6. Tap the `Apply` icon.\n\
    7. Tap the right wall layer to open its properties, and tap `Flip H`.\n8. Drag\
    \ to place the right wall on the left side and modify its size and position as\
    \ needed (see Figure [4-40](#A450041_1_En_4_Chapter.html#Fig40)).\n\n   ![A450041_1_En_4_Fig40_HTML.jpg](A450041_1_En_4_Fig40_HTML.jpg)\n\
    \n   **Figure 4-40** Reflect and position the wall to the left side\n9. Tap the\
    \ `Adjust` icon, increase `Highlights` to `5%`, and tap the `Apply` icon.\n10.\
    \ Use the `Crop` icon to crop the edges of the photo that still appear around\
    \ the fixed area, and tap the `Apply` icon (see Figure [4-41](#A450041_1_En_4_Chapter.html#Fig41)).\n\
    \n    ![A450041_1_En_4_Fig41_HTML.jpg](A450041_1_En_4_Fig41_HTML.jpg)\n\n    **Figure\
    \ 4-41** Crop the unwanted areas from around the image\n\n### Step 2: Convert\
    \ the Photo to Black and White\n\nFollow these steps to convert the photo to black\
    \ and white:\n\n1. Tap the `Share` icon, and save the photo to the `Camera Roll`.\n\
    2. Tap the plus icon to add a layer. Add the photo that you just saved to have\
    \ a merged copy of the photo.\n3. Tap the `Adjust` icon, and drag the `Saturation`\
    \ value to the left to convert the photo to black and white (see Figure [4-42](#A450041_1_En_4_Chapter.html#Fig42)).\n\
    4. Tap the `Apply` icon.\n\n   ![A450041_1_En_4_Fig42_HTML.jpg](A450041_1_En_4_Fig42_HTML.jpg)\n\
    \n   **Figure 4-42** Desaturate the layer colors to convert to black and white\n\
    \n### Step 3: Add Color to the King’s Mask\n\nFollow these steps:\n\n1. With the\
    \ black-and-white layer selected, tap the `Cut Out` icon.\n2. Tap the `Basic`\
    \ icon, and in the left settings, tap `Eraser`.\n3. Paint over the mask to remove\
    \ the black-and-white version and display the colored version under it. Then tap\
    \ the `Apply` icon (see Figure [4-43](#A450041_1_En_4_Chapter.html#Fig43)).\n\
    4. Tap the `Share` icon to save the final result to your `Camera Roll`.\n\n  \
    \ ![A450041_1_En_4_Fig43_HTML.jpg](A450041_1_En_4_Fig43_HTML.jpg)\n\n   **Figure\
    \ 4-43** Remove the black-and-white mask to display the colored one\n\n## Summary\n\
    \nIn this chapter, you explored how to take photo editing further. The tips provided\
    \ a number of examples of how to use applications to apply filters, add frames,\
    \ and manipulate several photos for one project. You can use the apps mentioned\
    \ to try the exercises with your own photos and adjust the settings according\
    \ to the nature of your shots.\n\n## Practice Exercise\n\nStart by thinking about\
    \ a photo that you can use to build a mystic or dramatic effect. Then, prepare\
    \ the photo to fit with your idea. For example, remove the background and adjust\
    \ the colors. Once done, you can build the composition in a layer-based application\
    \ such as `Photoshop Mix` and `Photofox`.\n\n# 5. Integrating with Adobe Lightroom\
    \ on the Desktop\n\nTo expand your iPhone’s photography capabilities, you can\
    \ take the photos you have edited on your phone and integrate them with the `Adobe\
    \ Lightroom` desktop application. One of the advantages of using the `Adobe Lightroom`\
    \ mobile app is that it allows you to go from your phone to the desktop version\
    \ of the same application. This allows you to continue modifying your photos but\
    \ on a larger screen, which can help you to see more details in a photo.\n\nIn\
    \ this chapter, you will explore how to extend your iPhone’s photography capabilities\
    \ using the integration between the `Adobe Lightroom` mobile app and desktop application.\
    \ You’ll take photos using the `Camera Raw` technology.\n\n## Rate, Flag, and\
    \ Organize Photos\n\nBefore starting to integrate your files from your phone to\
    \ the desktop version of `Adobe Lightroom`, you need to organize and filter the\
    \ images so you can easily identify the best shots to use in further photo-editing\
    \ steps.\n\nThe `Lightroom` app provides a comprehensive way to organize and arrange\
    \ photos. In the `Lightroom` app on your phone, you can review and rate your photos\
    \ in order to easily identify them for photo-editing projects. You can review\
    \ the photos in `Lightroom` and rate them as follows:\n\n1. Open the `Lightroom`\
    \ app.\n2. Select an image from the library or from the `Camera Roll`.\n3. In\
    \ the top menu, set the mode to `Rate & Review`.\n4. Swipe up and down on the\
    \ left side of the screen to display the rating stars. You can give a rating to\
    \ a selected image by dragging up and down. You can also use the stars at the\
    \ bottom of the image to give it a rating, as shown in Figure [5-1](#A450041_1_En_5_Chapter.html#Fig1).\n\
    \n   ![A450041_1_En_5_Fig1_HTML.jpg](A450041_1_En_5_Fig1_HTML.jpg)\n\n   **Figure\
    \ 5-1** Swipe up or down on the left side of the photo to add a rating\n5. Swipe\
    \ up and down on the right side of the screen to open the flagging option. This\
    \ allows you to choose between flagged, unflagged, or rejected. Drag up or down\
    \ to choose between the three options. You can also use the flag icon at the bottom\
    \ right of the image to flag the image, as shown in Figure [5-2](#A450041_1_En_5_Chapter.html#Fig2).\n\
    \n   ![A450041_1_En_5_Fig2_HTML.jpg](A450041_1_En_5_Fig2_HTML.jpg)\n\n   **Figure\
    \ 5-2** Swipe up or down on the right side of the photo to add a rating\n\nAdditionally,\
    \ you can organize photos by giving them titles, captions, and copyright information\
    \ using the `Info` section.\n\nOnce the photos are rated, you can display them\
    \ in the `Lightroom` app library organized by rating. Follow these steps:\n\n\
    1. Open the `Lightroom` app library.\n2. Tap the `Lightroom Photos` drop-down\
    \ list.\n3. Select the `Segmented` tab. This allows you to filter the photos based\
    \ on their ratings, flagging, likes, and comments, as shown in Figure [5-3](#A450041_1_En_5_Chapter.html#Fig3).\n\
    \n   ![A450041_1_En_5_Fig3_HTML.jpg](A450041_1_En_5_Fig3_HTML.jpg)\n\n   **Figure\
    \ 5-3** Tap `Lightroom Photos` to access the filter options\n4. Set the flag to\
    \ `Picked` to display only the photos that are rated with five stars, as shown\
    \ in Figure [5-4](#A450041_1_En_5_Chapter.html#Fig4).\n\n   ![A450041_1_En_5_Fig4_HTML.jpg](A450041_1_En_5_Fig4_HTML.jpg)\n\
    \n   **Figure 5-4** Tapping a filter option displays only the images that meet\
    \ this criterion\n5. Remove the rating filter to display all the photos again."
