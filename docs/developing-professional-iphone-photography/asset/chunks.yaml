- fmt: "# Import iPhone Photos to Your Computer\n\nYou can easily import iPhone photos\
    \ to your computer using the `Photos` app on a Mac and a USB cable to connect\
    \ your device to the computer. Once it’s connected, you may receive a message\
    \ to ask you if you trust the computer to connect with your device. Once you accept\
    \ that setting, you will be able to see the iPhone photos listed in the left navigation\
    \ pane.\n\nYou can import the photos from your iPhone to the `Photos` app on a\
    \ Mac computer as follows (see Figure [10-12](#A450041_1_En_10_Chapter.html#Fig12)):\n\
    \n![A450041_1_En_10_Fig12_HTML.jpg](A450041_1_En_10_Fig12_HTML.jpg)\n\nFigure\
    \ 10-12 Importing iPhone photos using a Mac’s `Photos` app\n\n1. Open the `Photos`\
    \ app on your Mac computer.\n2. Select the iPhone in the left Import pane.\n3.\
    \ Select the photos you want to import.\n4. From the top control bar, choose either\
    \ `Import All New Items` or `Import Selected`. You can select `Delete Items After\
    \ Importing` to remove the original photos to save space.\n\nIf you are using\
    \ a Windows PC, you can import the photos by simply plugging in the iPhone to\
    \ the computer and waiting for the `AutoPlay` window to open; then choose to import\
    \ photos. You can also use applications such as `AnyTrans`.\n\nWhen you import\
    \ the photos, they are saved inside the `Photos` app folder where you can share,\
    \ adjust, or make them favorites from inside the app. To save the photos in the\
    \ `Finder` to be able to open them in photo-editing applications such as `Photoshop`\
    \ or `Lightroom`, you need to export them as follows (see Figure [10-13](#A450041_1_En_10_Chapter.html#Fig13)):\n\
    \n![A450041_1_En_10_Fig13_HTML.jpg](A450041_1_En_10_Fig13_HTML.jpg)\n\nFigure\
    \ 10-13 Exporting photos dialog box in the `Photos` app\n\n1. Select the photo\
    \ you need to export.\n2. Choose `File` ➤ `Export` ➤ `Export Photo`.\n3. In the\
    \ Export dialog box, choose the export format, color profile, and size; click\
    \ `Export`.\n4. Save the photo to your local machine.\n\n## Sync Photos from the\
    \ Computer to Your iPhone\n\nYou can easily sync the photos you have on your computer\
    \ and your iPhone using the `iTunes` app, which is available on both Mac and Windows.\
    \ This can help you sync photos, music, books, apps, and podcasts. To sync the\
    \ photos, you can follow these steps (see Figure [10-14](#A450041_1_En_10_Chapter.html#Fig14)):\n\
    \n![A450041_1_En_10_Fig14_HTML.jpg](A450041_1_En_10_Fig14_HTML.jpg)\n\nFigure\
    \ 10-14 Syncing photos from your computer and the iPhone using the `iTunes` app\n\
    \n1. Open the `iTunes` app.\n2. Click the iPhone icon at the top left.\n3. In\
    \ the Settings section, click `Photos`.\n4. Select the `Sync Photos` check box.\n\
    5. In `Copy Photos from`, select the folder of the photos you would like to sync.\n\
    6. Choose to sync either all the folders or selected folder.\n7. Click `Apply`\
    \ at the bottom right.\n\n## Summary\n\nWhile the iPhone storage space may not\
    \ help you to save an endless number of photos and projects, cloud technology\
    \ helps you overcome this barrier by giving you the chance to save photos in different\
    \ cloud services such as `iCloud`, `Dropbox`, `Google Drive`, `One Drive`, and\
    \ `Adobe Cloud`. You can use these services to efficiently manage the space on\
    \ your device to make sure you are not out of space when taking the next shot.\
    \ You can either use the free version of different applications to get a small\
    \ amount of storage space or subscribe to one service to get enough storage for\
    \ all your projects. You can also save photos on your computer by importing them\
    \ using the `Photos` app on a Mac or applications such as `AnyTrans` on Windows.\n\
    \n## Practice Exercise\n\nUse the techniques in this chapter to reduce the consumed\
    \ storage space on your device. Download one or more of the cloud service applications\
    \ and use it to save your photos. Notice how much space you can free up on your\
    \ device.\n\n# 11. Photo Editing for Social Networks\n\nSocial networks play an\
    \ essential part not only in your own Internet social life but in the photography\
    \ profession. Many photographers depend on their social profiles on `Facebook`,\
    \ `Instagram`, `500px`, `Pinterest`, and other platforms to present and promote\
    \ their work. This helps their work get seen by a massive number of visitors to\
    \ these networks every day. Your iPhone makes it easy to share your work on these\
    \ networks. All you need is to take the shot, edit it if needed, and upload it\
    \ directly from any photo-editing app.\n\nOnline tools such as `Adobe Spark` also\
    \ provide features and tools that can help you edit photos. You can use their\
    \ tools to create dynamic photo projects and show your work to your clients, as\
    \ you will explore in this chapter’s tips.\n\n## Create an Attractive Photo Presentation\
    \ with Adobe Spark\n\nTools used: `Adobe Spark Page`\n\n`Adobe Spark` is a group\
    \ of mobile apps that help you create different social content with your photos.\
    \ `Adobe Spark Page` helps you create dynamic pages that can include photos, videos,\
    \ and text, and then you can share them your clients. `Spark Video` allows you\
    \ to merge a number of videos and add text transitions between them. The `Smart\
    \ Post` feature lets you edit photos and add text to them to create eye-catching\
    \ social posts.\n\nThe photos and text you create with `Spark Page` can be accessed\
    \ either through a desktop computer or mobile device. In the following steps,\
    \ I will show how to create a `Spark` page for my trip to Paris. Follow along\
    \ with your own photos.\n\n### Step 1: Create the Page Layout\n\nTo create the\
    \ page layout, follow these steps:\n\n1. Open the `Spark Page` app. You can review\
    \ the Inspiration examples to see different layout examples (see Figure [11-1](#A450041_1_En_11_Chapter.html#Fig1)).\n\
    \n   ![A450041_1_En_11_Fig1_HTML.jpg](A450041_1_En_11_Fig1_HTML.jpg)\n\n   Figure\
    \ 11-1 The Inspiration examples in `Adobe Spark Page`\n\n2. Tap the plus icon.\n\
    3. Tap `Add title and subtitle` and enter your title (see Figure [11-2](#A450041_1_En_11_Chapter.html#Fig2)).\n\
    \n   ![A450041_1_En_11_Fig2_HTML.jpg](A450041_1_En_11_Fig2_HTML.jpg)\n\n   Figure\
    \ 11-2 Adding a text and subtitle to the page\n\n4. Tap the image icon to add\
    \ a photo background for the title.\n5. Scroll down to display the menu, and tap\
    \ the Text tool to add a paragraph of text about the photo project (see Figure\
    \ [11-3](#A450041_1_En_11_Chapter.html#Fig3)).\n\n   ![A450041_1_En_11_Fig3_HTML.jpg](A450041_1_En_11_Fig3_HTML.jpg)\n\
    \n   Figure 11-3 Adding the background image and paragraph text\n\n6. Tap the\
    \ plus icon under the text to add more content, and select `Photo Grid` to display\
    \ a number of photos in a grid.\n7. Select the photos to add to the grid and tap\
    \ `Add`.\n8. Tap the plus icon next to the grid and add a description text (see\
    \ Figure [11-4](#A450041_1_En_11_Chapter.html#Fig4)).\n\n   ![A450041_1_En_11_Fig4_HTML.jpg](A450041_1_En_11_Fig4_HTML.jpg)\n\
    \n   Figure 11-4 Adding a photo grid to the Spark page\n\n9. Repeat the previous\
    \ steps to add more images to the project.\n10. In the top icons, tap the Effects\
    \ icon to change the fonts on the page. Select the Chic font (see Figure [11-5](#A450041_1_En_11_Chapter.html#Fig5)).\n\
    \n    ![A450041_1_En_11_Fig5_HTML.jpg](A450041_1_En_11_Fig5_HTML.jpg)\n\n    Figure\
    \ 11-5 Changing the page font\n\n### Step 2: Preview and Share the Page\n\nTo\
    \ preview and share the page, follow these steps:\n\n![A450041_1_En_11_Fig6_HTML.jpg](A450041_1_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6 Creating a public link for the Spark page\n\n1. Tap the Preview\
    \ icon at the top right of the screen to preview the created page.\n2. Tap the\
    \ Share icon and complete the page information such as the category and copyright.\n\
    3. Swipe the `Get Noticed` option to make the page available on `Adobe Spark Page`.\n\
    4. Use the Share icons to share the page.\n5. Tap `Create public link` to create\
    \ a link that anyone can see for the page (see Figure [11-6](#A450041_1_En_11_Chapter.html#Fig6))."
