- fmt: "# Developing Professional iPhone Photography\n\n**Using Photoshop, Lightroom,\
    \ and other iOS and Desktop Apps to Create and Edit Photos**\n\nRafiq Elmansy\n\
    \nAny source code or other supplementary material referenced by the author in\
    \ this book is available to readers on GitHub via the book’s product page, located\
    \ at [www.apress.com/978-1-4842-3185-2](http://www.apress.com/978-1-4842-3185-2).\
    \ For more detailed information, please visit [www.apress.com/source-code](http://www.apress.com/source-code).\n\
    \nISBN 978-1-4842-3185-2  \ne-ISBN 978-1-4842-3186-9  \n[https://doi.org/10.1007/978-1-4842-3186-9](https://doi.org/10.1007/978-1-4842-3186-9)\n\
    \nLibrary of Congress Control Number: 2017963387\n\n© Rafiq Elmansy 2018  \nThis\
