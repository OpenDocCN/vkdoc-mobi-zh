    \ and choose Erase.  \n10.  Remove the unwanted areas of the photo and keep the\
    \ setting man. From the Feather icon, set up the smoothness of the edges of the\
    \ image (see Figure [8-26](#A450041_1_En_8_Chapter.html#Fig26)).  \n11.  Tap the\
    \ Apply icon.  \n12.  Tap the Share icon, and choose Camera Roll.\n\n    ![A450041_1_En_8_Fig26_HTML.jpg](A450041_1_En_8_Fig26_HTML.jpg)\n\
    \n    Figure 8-26\n\n    Add the sky background\n\n### Step 4: Add the Dramatic\
    \ Sky Effect\n\nNow, you will see how to add a second sky and use the blending\
    \ mode to make it look dramatic, as follows:\n\n1.  Open the photo saved from\
    \ the previous steps in the Photofox app.  \n2.  Click the plus icon, and choose\
    \ to add the image.  \n3.  From Layers tab at the bottom, choose Blending, and\
    \ set the blending of the added sky to Color Burn (see Figure [8-27](#A450041_1_En_8_Chapter.html#Fig27)).\n\
    \n    ![A450041_1_En_8_Fig27_HTML.jpg](A450041_1_En_8_Fig27_HTML.jpg)\n\n    Figure\
    \ 8-27\n\n    Add the dramatic sky over the composition"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 第 4 步：为天空增添更多效果\n\
    \n为了更好地营造氛围，让我们对天空稍作修改。我将展示如何使用`Fused`应用，借助一张树的照片，为天空添加闪电效果。请遵循以下步骤：\n\n1. 打开`Fused`应用。在位于左下方的第一张照片处，点击添加来自上一步骤的照片作为第一张混合照片。\n\
    2. 点击右侧，然后选择艺术家合集。我选择了自然合集并挑选了一张树的剪影照片。\n3. 在选中右侧照片的情况下，点击工具栏左侧的变换图标。\n4. 用两根手指翻转树的照片并将其调整到屏幕大小。然后，点击应用图标（图\
    \ 8-12）。\n\n   ![A450041_1_En_8_Fig12_HTML.jpg](img/A450041_1_En_8_Fig12_HTML.jpg)\n\
    \n   图 8-12：为天空添加树木效果\n\n5. 点击工具栏右侧的混合图标，选择划分模式。然后点击应用图标（图 8-13）。\n6. 点击分享图标，将照片保存到相机胶卷。\n\
    \n   ![A450041_1_En_8_Fig13_HTML.jpg](img/A450041_1_En_8_Fig13_HTML.jpg)\n\n \
    \  图 8-13：为照片添加混合模式\n\n### 第 5 步：添加垃圾摇滚效果\n\n现在，我将切换到`Snapseed`应用，为照片添加垃圾摇滚效果，步骤如下：\n\
    \n1. 在`Snapseed`应用中打开照片。\n2. 点击工具图标，然后选择垃圾摇滚滤镜。\n3. 点击垃圾摇滚风格图标，选择效果 5。然后点击应用图标（图\
    \ 8-14）。\n\n   ![A450041_1_En_8_Fig14_HTML.jpg](img/A450041_1_En_8_Fig14_HTML.jpg)\n\
    \n   图 8-14：为照片添加垃圾摇滚效果\n\n4. 在工具中选择晕影工具，向左拖动滑块，然后点击应用图标（图 8-15）。\n5. 点击分享图标，将最终结果保存到您的相机胶卷。\n\
    \n   ![A450041_1_En_8_Fig15_HTML.jpg](img/A450041_1_En_8_Fig15_HTML.jpg)\n\n \
    \  图 8-15：添加晕影效果以创建最终结果\n\n## 构建法老风格合成图\n\n使用的工具：`Adobe Lightroom`应用、`Photoshop\
    \ Fix`、`Photoshop Mix`、`Eraser`和`Photofox`\n\n图 8-16、8-17、8-18 和 8-19 展示了我在本例中使用的原始照片。\n\
    \n![A450041_1_En_8_Fig19_HTML.jpg](img/A450041_1_En_8_Fig19_HTML.jpg)\n\n图 8-19：原始日落照片（©\
    \ Rafiq Elmansy）\n\n![A450041_1_En_8_Fig18_HTML.jpg](img/A450041_1_En_8_Fig18_HTML.jpg)\n\
    \n图 8-18：另一张金字塔的原始照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig17_HTML.jpg](img/A450041_1_En_8_Fig17_HTML.jpg)\n\
    \n图 8-17：金字塔的原始照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig16_HTML.jpg](img/A450041_1_En_8_Fig16_HTML.jpg)\n\
    \n图 8-16：天空的原始照片（© Radwa Khalil）\n\n图 8-20 展示了最终结果。\n\n![A450041_1_En_8_Fig20_HTML.jpg](img/A450041_1_En_8_Fig20_HTML.jpg)\n\
    \n图 8-20：最终结果\n\n您可以组合多张照片来创建神秘且超自然的合成图。虽然在电脑上处理照片可能使用像 Adobe Photoshop 这样的单个应用，但在\
    \ iPhone 上，您可能需要使用多个应用来创建所需的效果。\n\n在我去金字塔的旅途中，我拍了一些胡夫大金字塔的照片。为了创建一幅神秘的合成图，我使用了三张照片来构建。我首先改善了照片的颜色和光线，然后创建了一个具有透明背景的副本，以呈现金字塔在天空中的倒影。接着，我添加了一片神秘的蓝色天空来覆盖照片。\n\
    \n### 第 1 步：优化照片颜色和光线\n\n要优化照片颜色和光线，请遵循以下步骤：\n\n1. 在 Adobe Lightroom 中打开金字塔照片。\n\
    2. 点击分享图标，选择编辑方式，然后选择最高可用。在 Photoshop Fix 中选择修复，以移除照片中的汽车（见图 8-21）。\n\n   ![A450041_1_En_8_Fig21_HTML.jpg](img/A450041_1_En_8_Fig21_HTML.jpg)\n\
    \n   图 8-21：在 Lightroom 应用中打开基础照片\n\n3. 在 Photoshop Mix 中，点击污点修复图标。点击汽车和不需要的对象以将其移除。您可以使用仿制图章工具，通过复制图像的另一部分来进行更具选择性的修复（见图\
    \ 8-22）。\n\n   ![A450041_1_En_8_Fig22_HTML.jpg](img/A450041_1_En_8_Fig22_HTML.jpg)\n\
    \n   图 8-22：使用污点修复移除不需要的元素\n\n4. 点击顶部的蓝色条以保存并返回到 Adobe Lightroom 应用。\n5. 点击灯光图标。增加照片的对比度，并减少高光和阴影。\n\
    6. 点击颜色图标，增加照片的自然饱和度设置（见图 8-23）。\n7. 点击分享图标，将图像保存到您的相机胶卷。\n\n   ![A450041_1_En_8_Fig23_HTML.jpg](img/A450041_1_En_8_Fig23_HTML.jpg)\n\
    \n   图 8-23：改善照片的颜色、光线和色温\n\n### 第 2 步：移除天空\n\n我想为合成图使用更具戏剧性的天空，因此我将使用`Eraser`应用移除当前的天空，步骤如下：\n\
    \n1. 在`Eraser`应用中打开修改后的照片。\n2. 点击擦除图标，然后选择目标区域。将阈值设置为 75，然后点击天空将其移除。接着点击完成（见图\
    \ 8-24）。\n3. 点击分享图标，选择最大尺寸和 PNG 格式。点击保存，将图像保存到相机胶卷。\n\n   ![A450041_1_En_8_Fig24_HTML.jpg](img/A450041_1_En_8_Fig24_HTML.jpg)\n\
    \n   图 8-24：从照片中移除天空背景\n\n### 第 3 步：构建合成图\n\n现在，我将使用 Photoshop Mix 来构建合成图，步骤如下：\n\
    \n1. 在 Photoshop Mix 中打开一张色彩多样的天空照片。\n2. 点击加号图标添加一个新图层。选择添加新的图像图层。然后导航到透明背景的金字塔照片。\n\
    3. 点击金字塔图层打开其属性面板，选择复制。\n4. 用两根手指旋转复制的图层，使其位于第一个图层的上方。您也可以点击该图层打开图层选项，选择垂直翻转（见图\
    \ 8-25）。\n\n   ![A450041_1_En_8_Fig25_HTML.jpg](img/A450041_1_En_8_Fig25_HTML.jpg)\n\
    \n   图 8-25：复制金字塔图层并翻转\n\n5. 点击加号图标，为第一层天空选择一张照片。\n6. 在图层中，将天空图层重新排列到金字塔后面。\n\
    7. 点击顶部的金字塔图层打开其属性面板，将不透明度设置为 50%，并将混合模式设置为叠加。\n8. 点击加号图标，为人物剪影选择一张照片。\n9. 点击剪切图标。选择基础进行普通删除，确保点击左侧的设置图标，选择擦除。\n\
    10. 移除照片中不需要的区域，保留人物剪影。通过羽化图标，设置图像边缘的平滑度（见图 8-26）。\n11. 点击应用图标。\n12. 点击分享图标，选择相机胶卷。\n\
    \n    ![A450041_1_En_8_Fig26_HTML.jpg](img/A450041_1_En_8_Fig26_HTML.jpg)\n\n\
    \    图 8-26：添加天空背景\n\n### 第 4 步：添加戏剧性的天空效果\n\n现在，您将看到如何添加第二层天空并使用混合模式使其看起来更具戏剧性，步骤如下：\n\
    \n1. 在`Photofox`应用中打开上一步骤保存的照片。\n2. 点击加号图标，选择添加图像。\n3. 在底部的图层选项卡中，选择混合，并将添加的天空的混合模式设置为颜色加深（见图\
    \ 8-27）。\n\n   ![A450041_1_En_8_Fig27_HTML.jpg](img/A450041_1_En_8_Fig27_HTML.jpg)\n\
    \n   图 8-27：在合成图上叠加戏剧性的天空\n"
- fmt: "# Summary\n\nIn this chapter, you explored how to combine photos to create\
    \ magical scenes. The tips provided a number of examples of how to use applications\
    \ to apply filters, add frames, and manipulate between photos. You can use different\
    \ apps to apply the steps in this chapter to your own photos and adjust the settings\
    \ according to the nature of your shot.\n\n# Practice Exercise\n\nStart by thinking\
    \ of a photo that can you can use to build a mystic or dramatic effect. Then,\
    \ prepare the photos to fit with your idea. For example, remove the background\
    \ and adjust the colors. Once done, you can build the composition in a layer-based\
    \ application such as `Photoshop Mix` and `Photofox`.\n\n# 9. Shooting and Editing\
    \ Video\n\nWhen you want to record movement and sound, you can use your iPhone\
    \ to capture video footage. With the proper tools, you can even extend this capability.\
    \ Similar to photography and photo editing, there are numerous apps that can help\
    \ you take, edit, and apply video effects. These apps allow you to make basic\
    \ video modifications (as advanced video effects require) a special software and\
    \ hardware setup.\n\n## Shoot and Trim Videos\n\nTools used: `Camera` app, `Photos`\
    \ app\n\nIn this section, you will learn about the following:\n\n*   Different\
    \ types of video shooting using the `Camera` app\n*   Taking still photos while\
    \ shooting video\n*   Trimming videos using the `Photos` app\n\nThe `Camera` app\
    \ allows you to take different types of video via different modes, including normal\
    \ video (`Video`), slow motion (`Slo-Mo`), and high-speed video (`Time-lapse`).\
    \ After taking the video, you can crop out any unwanted footage at the beginning\
    \ or end using the `Photos` app’s editing features.\n\n### Set Up the Video Quality\n\
    \nBy default, the iPhone isn’t set up to take videos with the highest quality\
    \ (4K) because this can dramatically consume your storage space. Every minute\
    \ of 4K video takes about 350MB of your storage, and 1080p HD video at the 60\
    \ frames per second (fps). In addition, high-quality video can slow down your\
    \ editing speed comparing to editing lower-quality video, so you need to pick\
    \ the video quality that best meets your needs.\n\n1.  Open `Settings` ➤ `Photos\
    \ & Camera`.  \n2.  In the `Camera` section, you can set the quality of the `Record\
    \ Video` and `Record Slo-Mo` features. In each section, you can find a guide to\
    \ the amount of storage that will be consumed with each one minute of recording\
    \ (see Figure 9-1).\n\n    ![A450041_1_En_9_Fig1_HTML.jpg](A450041_1_En_9_Fig1_HTML.jpg)\n\
    \n    Figure 9-1\n\n    Setting up the video recording quality in the `Photos\
    \ & Camera` settings\n\n### Take Still Photos While Shooting Videos\n\nSometimes\
    \ you want to take a still photo of a scene while you are shooting video footage.\
    \ This feature is available in two modes: `Video` and `Slo-Mo`.\n\n1.  Open the\
    \ `Camera` app, and select the `Video` mode.  \n2.  Press the home button or one\
    \ of the volume keys to start the video.  \n3.  Tap the white button on the top\
    \ left of the screen to take a still photo while shooting your video (see Figure\
    \ 9-2).  \n4.  Press the home button again to stop the recording.  \n5.  Tap the\
    \ preview next to the home button to preview the video and still photos.\n\n \
    \   ![A450041_1_En_9_Fig2_HTML.jpg](A450041_1_En_9_Fig2_HTML.jpg)\n\n    Figure\
    \ 9-2\n\n    You can take still photos while shooting video by tapping the white\
    \ button at the top left of the screen\n\n### Edit Footage in the Photos App\n\
    \nYour videos are saved in the `Video` album in your `Photos` app. You can tap\
    \ a video to play the video and trim the video at the beginning or end as follows:\n\
    \n1.  Open the video in the `Photos` app.  \n2.  Tap the `Adjust` icon to enter\
    \ video-editing mode.  \n3.  Drag the right and left arrows to trim the video.\
    \  \n4.  Tap `Done`, and choose to apply changes to the original video or create\
    \ a new one with the changes applied (see Figure 9-3).\n\n    ![A450041_1_En_9_Fig3_HTML.jpg](A450041_1_En_9_Fig3_HTML.jpg)\n\
    \n    Figure 9-3\n\n    Trimming videos using the `Photos` app\n\n## Create a\
    \ Hyperlapse Video\n\nTools used: `OSnap`\n\nIn this section, you will learn about\
    \ the following:\n\n*   Creating a hyperlapse project\n*   Shooting a hyperlapse\
    \ video\n*   Applying soundtracks to video\n\nHyperlapse is a time-lapse technique\
    \ that lets you create video frames by taking a single photo and organizing them\
    \ together to create a motion sequence. While you can create time-lapse video\
    \ using the `Camera` app by switching to the `Time-lapse` mode, you don’t have\
    \ control over the speed of the motion or the frames in it. Using hyperlapse apps\
    \ such as `OSnap`, you can convert a sequence of photos to a hyperlapse or time-lapse\
    \ video. Then, you can have control over the speed of the video and the frames\
    \ included in it.\n\n### Step 1: Create a Hyperlapse Project\n\nTo create a hyperlapse\
    \ project, follow these steps:\n\n1.  Open the `Osnap` app, tap the plus icon,\
    \ and choose `New Project`.  \n2.  In the `New Project` dialog box, set up the\
    \ project name, the orientation, and the camera. Then tap `Create` (see Figure\
    \ 9-4).\n\n    ![A450041_1_En_9_Fig4_HTML.jpg](A450041_1_En_9_Fig4_HTML.jpg)\n\
    \n    Figure 9-4\n\n    Creating a new hyperlapse project in the `OSnap` app \
    \ \n3.  Tap `Start Shooting` or select `Adjust Settings` to set more of the project\
    \ options. Once the `Camera` app opens, you can tap the shutter button multiple\
    \ times to take the photos that will be used in the video (see Figure 9-5).\n\n\
    \    ![A450041_1_En_9_Fig5_HTML.jpg](A450041_1_En_9_Fig5_HTML.jpg)\n\n    Figure\
    \ 9-5\n\n    Tap the shutter button multiple times to take a sequence of photos\
    \ for the hyperlapse effect  \n4.  Once done, tap the `Back` button to return\
    \ to the `Projects` page. Then click the project.  \n5.  Tap `Play` to preview\
    \ the video or `Shoot` to add more frames to it (see Figure 9-6).\n\n    ![A450041_1_En_9_Fig6_HTML.jpg](A450041_1_En_9_Fig6_HTML.jpg)\n\
    \n    Figure 9-6\n\n    Tap the `Back` button to return to the project page\n\n\
    ### Step 2: Add Music to the Video\n\nTo add music to the video, follow these\
    \ steps:\n\n1.  Tap the `Music` icon to open the iPhone music library (see Figure\
    \ 9-7).  \n2.  In the iPhone music library, select the video and tap the plus\
    \ icon to add the video. You can also select the mic icon to record a custom voice.\n\
    \n    ![A450041_1_En_9_Fig7_HTML.jpg](A450041_1_En_9_Fig7_HTML.jpg)\n\n    Figure\
    \ 9-7\n\n    Adding audio to the project from the local library\n\n### Step 3:\
    \ Modify the Animation Frames\n\nTo modify the animation frames, follow these\
    \ steps:\n\n1.  Tap the `Frames` icon to display the frames in the video (see\
    \ Figure 9-8).\n\n    ![A450041_1_En_9_Fig8_HTML.jpg](A450041_1_En_9_Fig8_HTML.jpg)\n\
    \n    Figure 9-8\n\n    Displaying the frames used in the hyperlapse animation\
    \  \n2.  Tap the `Edit` icon at the top right.  \n3.  Select the frames to remove\
    \ from the footage.  \n4.  Tap the `Delete` icon to remove them (see Figure 9-9).\
    \  \n5.  Tap the top-left `Back` button to return to the project.\n\n    ![A450041_1_En_9_Fig9_HTML.jpg](A450041_1_En_9_Fig9_HTML.jpg)\n\
    \n    Figure 9-9\n\n    Deleting the unwanted frames from the sequence\n\n###\
    \ Step 4: Export the Video\n\nTo export the video, follow these steps:\n\n1. \
    \ Tap the `Share` icon.  \n2.  Tap `Create Video` to save it as a video file (also\
    \ you can choose `Save All Photo to Camera Roll` to save the photos as sequence\
    \ photos).  \n3.  Tap `Render Video` (or tap `Adjust the video rendering options`).\
    \  \n4.  Tap `Share Video`, and select `Camera Roll` (see Figure 9-10).\n\n  \
    \  ![A450041_1_En_9_Fig10_HTML.jpg](A450041_1_En_9_Fig10_HTML.jpg)\n\n    Figure\
    \ 9-10\n\n    Rendering and sharing video output"
