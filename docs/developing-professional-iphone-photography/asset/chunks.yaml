    \ the white button at the top left of the screen\n\n### Edit Footage in the Photos\
    \ App\n\nYour videos are saved in the Video album in your Photos app. You can\
    \ tap a video to play the video and trim the video at the beginning or end as\
    \ follows:\n\n1.  Open the video in the Photos app.  \n2.  Tap the Adjust icon\
    \ to enter video-editing mode.  \n3.  Drag the right and left arrows to trim the\
    \ video.  \n4.  Tap Done, and choose to apply changes to the original video or\
    \ create a new one with the changes applied (see Figure [9-3](#A450041_1_En_9_Chapter.html#Fig3)).\n\
    \n    ![A450041_1_En_9_Fig3_HTML.jpg](A450041_1_En_9_Fig3_HTML.jpg)\n\n    Figure\
    \ 9-3\n\n    Trimming videos using the Photos app\n\n## Create a Hyperlapse Video\n\
    \nTools used: OSnap\n\nIn this section, you will learn about the following:\n\n\
    *   Creating a hyperlapse project\n*   Shooting a hyperlapse video\n*   Applying\
    \ soundtracks to video\n\nHyperlapse is a time-lapse technique that lets you create\
    \ video frames by taking a single photo and organizing them together to create\
    \ a motion sequence. While you can create time-lapse video using the Camera app\
    \ by switching to the Time-lapse mode, you don’t have control over the speed of\
    \ the motion or the frames in it. Using hyperlapse apps such as OSnap, you can\
    \ convert a sequence of photos to a hyperlapse or time-lapse video. Then, you\
    \ can have control over the speed of the video and the frames included in it.\n\
    \n### Step 1: Create a Hyperlapse Project\n\nTo create a hyperlapse project, follow\
    \ these steps:\n\n1.  Open the Osnap app, tap the plus icon, and choose New Project.\
    \  \n2.  In the New Project dialog box, set up the project name, the orientation,\
    \ and the camera. Then tap Create (see Figure [9-4](#A450041_1_En_9_Chapter.html#Fig4)).\n\
    \n    ![A450041_1_En_9_Fig4_HTML.jpg](A450041_1_En_9_Fig4_HTML.jpg)\n\n    Figure\
    \ 9-4\n\n    Creating a new hyperlapse project in the OSnap app  \n3.  Tap Start\
    \ Shooting or select Adjust Settings to set more of the project options. Once\
    \ the Camera app opens, you can tap the shutter button multiple times to take\
    \ the photos that will be used in the video (see Figure [9-5](#A450041_1_En_9_Chapter.html#Fig5)).\n\
    \n    ![A450041_1_En_9_Fig5_HTML.jpg](A450041_1_En_9_Fig5_HTML.jpg)\n\n    Figure\
    \ 9-5\n\n    Tap the shutter button multiple times to take a sequence of photos\
    \ for the hyperlapse effect  \n4.  Once done, tap the Back button to return to\
    \ the Projects page. Then click the project.  \n5.  Tap Play to preview the video\
    \ or Shoot to add more frames to it (see Figure [9-6](#A450041_1_En_9_Chapter.html#Fig6)).\n\
    \n    ![A450041_1_En_9_Fig6_HTML.jpg](A450041_1_En_9_Fig6_HTML.jpg)\n\n    Figure\
    \ 9-6\n\n    Tap the Back button to return to the project page\n\n### Step 2:\
    \ Add Music to the Video\n\nTo add music to the video , follow these steps:\n\n\
    1.  Tap the Music icon to open the iPhone music library (see Figure [9-7](#A450041_1_En_9_Chapter.html#Fig7)).\
    \  \n2.  In the iPhone music library, select the video and tap the plus icon to\
    \ add the video. You can also select the mic icon record a custom voice.\n\n \
    \   ![A450041_1_En_9_Fig7_HTML.jpg](A450041_1_En_9_Fig7_HTML.jpg)\n\n    Figure\
    \ 9-7\n\n    Adding audio to the project from the local library\n\n### Step 3:\
    \ Modify the Animation Frames\n\nTo modify the animation frames , follow these\
    \ steps:\n\n1.  Tap the Frames icon to display the frames in the video (see Figure\
    \ [9-8](#A450041_1_En_9_Chapter.html#Fig8)).\n\n    ![A450041_1_En_9_Fig8_HTML.jpg](A450041_1_En_9_Fig8_HTML.jpg)\n\
    \n    Figure 9-8\n\n    Displaying the frames used in the hyperlapse animation\
    \  \n2.  Tap the Edit icon at the top right.  \n3.  Select the frames to remove\
    \ from the footage.  \n4.  Tap the Delete icon to remove them (see Figure [9-9](#A450041_1_En_9_Chapter.html#Fig9)).\
    \  \n5.  Tap the top-left Back button to return to the project.\n\n    ![A450041_1_En_9_Fig9_HTML.jpg](A450041_1_En_9_Fig9_HTML.jpg)\n\
    \n    Figure 9-9\n\n    Deleting the unwanted frames from the sequence\n\n###\
    \ Step 4: Export the Video\n\nTo export the video , follow these steps:\n\n1.\
    \  Tap the Share icon.  \n2.  Tap Create Video to save it as a video file (also\
    \ you can choose Save All Photo to Camera Roll to save the photos as sequence\
    \ photos).  \n3.  Tap Render Video (or tap Adjust the video rending options).\
    \  \n4.  Tap Share Video, and select Camera Roll (see Figure [9-10](#A450041_1_En_9_Chapter.html#Fig10)).\n\
    \n    ![A450041_1_En_9_Fig10_HTML.jpg](A450041_1_En_9_Fig10_HTML.jpg)\n\n    Figure\
    \ 9-10\n\n    Rendering and sharing video output"
  trans: "\n# 总结\n\n在本章中，你学习了如何合成照片以创作出奇幻的场景。这些技巧提供了大量实例，展示如何运用应用程序来添加滤镜、画框以及在照片之间进行合成操作。你可以使用不同的应用，将本章的步骤应用到自己的照片上，并根据拍摄画面的特性调整设置。\n\
    \n# 练习\n\n首先，构思一张可以用来营造神秘或戏剧效果的照片。然后，准备与之搭配的照片。例如，移除背景并调整颜色。完成后，你就可以在如`Photoshop\
    \ Mix`和`Photofox`这类基于图层的应用程序中构建合成画面了。\n\n# 9. 拍摄与剪辑视频\n\n当你想记录动态和声音时，可以使用你的 iPhone\
    \ 来捕捉视频画面。借助合适的工具，你甚至还能扩展这项功能。与摄影和照片编辑类似，有众多应用程序可以帮你拍摄、编辑和添加视频特效。这些应用让你能够进行基本的视频修改（高级视频特效则需要特殊的软硬件配置）。\n\
    \n## 拍摄与修剪视频\n\n使用的工具：`相机`应用、`照片`应用\n\n在本节中，你将了解以下内容：\n\n*   使用`相机`应用进行不同类型的视频拍摄\n\
    *   在拍摄视频的同时拍摄静态照片\n*   使用`照片`应用修剪视频\n\n`相机`应用允许你通过不同模式拍摄不同类型的视频，包括普通视频（`视频`）、慢动作（`慢动作`）和高速视频（`延时摄影`）。拍摄视频后，你可以使用`照片`应用的编辑功能，裁剪掉位于开头或结尾的任何多余片段。\n\
    \n### 设置视频质量\n\n默认情况下，iPhone 并未设置为拍摄最高质量（4K）的视频，因为这会极大地消耗你的存储空间。每分钟的 4K 视频大约会占用\
    \ 350MB 的存储空间，而 1080p 高清视频（60 帧/秒）也是如此。此外，与编辑低画质视频相比，高画质视频可能会降低你的剪辑速度，因此你需要选择最符合需求的分辨率。\n\
    \n1.  打开`设置` ➤ `照片与相机`。\n2.  在`相机`部分，你可以设置`录制视频`和`录制慢动作`功能的质量。在每个部分中，你都可以看到每录制一分钟视频所消耗存储空间的参考指南（见图\
    \ 9-1）。\n\n    ![A450041_1_En_9_Fig1_HTML.jpg](img/A450041_1_En_9_Fig1_HTML.jpg)\n\
    \n    图 9-1\n\n    在`照片与相机`设置中配置视频录制质量\n\n### 在拍摄视频的同时拍摄静态照片\n\n有时你希望在拍摄视频画面时，也能同时拍下一张静态照片。此功能在两种模式下可用：`视频`模式和`慢动作`模式。\n\
    \n1.  打开`相机`应用，并选择`视频`模式。\n2.  按下主屏幕按钮或音量键之一开始录制视频。\n3.  点击屏幕左上角的白色按钮，即可在拍摄视频的同时拍下静态照片（见图\
    \ 9-2）。\n4.  再次按下主屏幕按钮停止录制。\n5.  点击主屏幕按钮旁边的预览图标，预览视频和静态照片。\n\n    ![A450041_1_En_9_Fig2_HTML.jpg](img/A450041_1_En_9_Fig2_HTML.jpg)\n\
    \n    图 9-2\n\n    你可以通过点击屏幕左上角的白色按钮，在拍摄视频的同时拍摄静态照片\n\n### 在照片应用中编辑素材\n\n你的视频保存在`照片`应用中的`视频`相册里。你可以点击视频进行播放，并按下述步骤修剪视频的开头或结尾：\n\
    \n1.  在`照片`应用中打开该视频。\n2.  点击`调整`图标进入视频编辑模式。\n3.  拖动左右箭头来修剪视频。\n4.  点击`完成`，并选择是将修改应用到原始视频，还是以此创建一个新视频（见图\
    \ 9-3）。\n\n    ![A450041_1_En_9_Fig3_HTML.jpg](img/A450041_1_En_9_Fig3_HTML.jpg)\n\
    \n    图 9-3\n\n    使用`照片`应用修剪视频\n\n## 创建超延时视频\n\n使用的工具：`OSnap`\n\n在本节中，你将了解以下内容：\n\
    \n*   创建超延时项目\n*   拍摄超延时视频\n*   为视频添加配乐\n\n超延时是一种延时摄影技术，它通过拍摄单张照片并将它们组织在一起来创建视频帧，从而形成动态序列。虽然你可以通过切换到`相机`应用的`延时摄影`模式来创建延时视频，但无法控制其中的动态速度或帧数。使用如`OSnap`等超延时应用，你可以将一系列照片转换为超延时或延时视频。随后，你就可以控制视频的速度和包含的帧数了。\n\
    \n### 第 1 步：创建超延时项目\n\n要创建一个超延时项目，请遵循以下步骤：\n\n1.  打开`Osnap`应用，点击加号图标，然后选择`新建项目`。\n\
    2.  在`新建项目`对话框中，设置项目名称、方向以及相机。然后点击`创建`（见图 9-4）。\n\n    ![A450041_1_En_9_Fig4_HTML.jpg](img/A450041_1_En_9_Fig4_HTML.jpg)\n\
    \n    图 9-4\n\n    在`OSnap`应用中创建新的超延时项目\n3.  点击`开始拍摄`或选择`调整设置`来设置更多项目选项。一旦`相机`应用打开，你可以多次点击快门按钮，以拍摄将用于视频中的照片（见图\
    \ 9-5）。\n\n    ![A450041_1_En_9_Fig5_HTML.jpg](img/A450041_1_En_9_Fig5_HTML.jpg)\n\
    \n    图 9-5\n\n    多次点击快门按钮以拍摄一系列照片，用于实现超延时效果\n4.  完成拍摄后，点击`返回`按钮回到`项目`页面。然后点击该项目。\n\
    5.  点击`播放`预览视频，或点击`拍摄`为其添加更多帧画面（见图 9-6）。\n\n    ![A450041_1_En_9_Fig6_HTML.jpg](img/A450041_1_En_9_Fig6_HTML.jpg)\n\
    \n    图 9-6\n\n    点击`返回`按钮回到项目页面\n\n### 第 2 步：为视频添加音乐\n\n要为视频添加音乐，请遵循以下步骤：\n\n\
    1.  点击`音乐`图标以打开 iPhone 音乐库（见图 9-7）。\n2.  在 iPhone 音乐库中，选择视频并点击加号图标来添加视频。你也可以选择麦克风图标来录制自定义语音。\n\
    \n    ![A450041_1_En_9_Fig7_HTML.jpg](img/A450041_1_En_9_Fig7_HTML.jpg)\n\n  \
    \  图 9-7\n\n    从本地音乐库为项目添加音频\n\n### 第 3 步：修改动画帧\n\n要修改动画帧，请遵循以下步骤：\n\n1.  点击`帧`图标以显示视频中的帧（见图\
    \ 9-8）。\n\n    ![A450041_1_En_9_Fig8_HTML.jpg](img/A450041_1_En_9_Fig8_HTML.jpg)\n\
    \n    图 9-8\n\n    显示超延时动画中使用的帧\n2.  点击右上角的`编辑`图标。\n3.  选择要从素材中移除的帧。\n4.  点击`删除`图标将它们移除（见图\
    \ 9-9）。\n5.  点击左上角的`返回`按钮回到项目。\n\n    ![A450041_1_En_9_Fig9_HTML.jpg](img/A450041_1_En_9_Fig9_HTML.jpg)\n\
    \n    图 9-9\n\n    从序列中删除不需要的帧\n\n### 第 4 步：导出视频\n\n要导出视频，请遵循以下步骤：\n\n1.  点击`共享`图标。\n\
    2.  点击`创建视频`将其保存为视频文件（你也可以选择`将所有照片保存到相机胶卷`，以序列照片的形式保存这些图片）。\n3.  点击`渲染视频`（或点击`调整视频渲染选项`）。\n\
    4.  点击`共享视频`，然后选择`相机胶卷`（见图 9-10）。\n\n    ![A450041_1_En_9_Fig10_HTML.jpg](img/A450041_1_En_9_Fig10_HTML.jpg)\n\
    \n    图 9-10\n\n    渲染并共享视频输出\n"
- fmt: "# Edit and Apply Filters\n\nTools used: `iMovie`\n\nIn this section, you will\
    \ learn about the following:\n\n- Cropping parts from the middle of the video\
    \ footage\n- Applying transition between video sections\n- Converting a video\
    \ to black and white\n- Applying filters to video\n- Adding audio tracks to video\n\
    \nAlthough the `Photos` app doesn’t enable you to apply modifications to the video\
    \ other than removing footage at the beginning or end, there are apps that can\
    \ fill this gap. You can use apps such as `iMovie`, `Adobe Premier Clip`, and\
    \ others to extend your phone’s video abilities. In this tip, I had a video of\
    \ the Louvre Museum where there are two people in front of the camera. So, I want\
    \ to remove them, apply a transition between the different parts of the video,\
    \ and apply a black and white filter that makes the video look old.\n\n## Step\
    \ 1: Create a Video Project\n\nTo create a video project, follow these steps:\n\
    \n1. Open the `iMovie` app, tap the plus icon to add a video project, and tap\
    \ `Movie` to create a custom video project (see Figure 9-11).\n\n   ![A450041_1_En_9_Fig11_HTML.jpg](A450041_1_En_9_Fig11_HTML.jpg)\n\
    \n   Figure 9-11 Creating a new project in `iMovie`\n\n2. Tap the video you want\
    \ to add, and tap `Select` (the right icon) on the video to add it. You can choose\
    \ more than one video to add to the same project.\n3. Tap `Create Movie` (see\
    \ Figure 9-12).\n\n   ![A450041_1_En_9_Fig12_HTML.jpg](A450041_1_En_9_Fig12_HTML.jpg)\n\
    \n   Figure 9-12 Creating a video project from one or more videos\n\n## Step 2:\
    \ Cut the Unwanted Parts from the Video\n\nTo cut the unwanted parts of the video,\
    \ follow these steps:\n\n1. Drag the video timeline to reach the first area you\
    \ want to remove.\n2. Select the video on the timeline to display the video-editing\
    \ tools.\n3. Tap the `Cut` icon, and choose `Split` to make a cut before the unwanted\
    \ area (see Figure 9-13).\n\n   ![A450041_1_En_9_Fig13_HTML.jpg](A450041_1_En_9_Fig13_HTML.jpg)\n\
    \n   Figure 9-13 Splitting the video on a specific point\n\n4. Drag the video\
    \ to the area after the unwanted area, and tap `Split` again.\n5. Select the unwanted\
    \ area, and tap `Delete` (see Figure 9-14).\n\n   ![A450041_1_En_9_Fig14_HTML.jpg](A450041_1_En_9_Fig14_HTML.jpg)\n\
    \n   Figure 9-14 Deleting the unwanted part of the video\n\n6. Now, you need to\
    \ create a transition in place of the unwanted area to build a smooth transition\
    \ between the video before and after the cut part. Tap the small icon between\
    \ the two segments and select a transition. For example, tap `Fade` (see Figure\
    \ 9-15).\n7. Repeat these steps for all the unwanted parts of the video.\n\n \
    \  ![A450041_1_En_9_Fig15_HTML.jpg](A450041_1_En_9_Fig15_HTML.jpg)\n\n   Figure\
    \ 9-15 Applying a transition to the video segments\n\n## Step 3: Convert the Video\
    \ to Black and White\n\nTo convert the video to black and white, follow these\
    \ steps:\n\n1. Drag the video to its beginning at the far left.\n2. Tap the `Settings`\
    \ icon at the bottom right of the screen.\n3. In the `Filters` list, choose `Silent\
    \ Era`.\n4. Activate `Fade in from black` and `Fade out to black` (see Figure\
    \ 9-16).\n5. Tap `Done`.\n\n   ![A450041_1_En_9_Fig16_HTML.jpg](A450041_1_En_9_Fig16_HTML.jpg)\n\
    \n   Figure 9-16 Applying a global filter to the video project\n\n## Step 4: Add\
    \ an Audio Track to a Video\n\nTo add the audio track to the video, follow these\
    \ steps:\n\n1. Before adding the audio track, you can remove the existing video\
    \ sound. While the video track is selected on the timeline, tap the `Audio` icon,\
    \ and drag the slider to the far left (see Figure 9-17).\n\n   ![A450041_1_En_9_Fig17_HTML.jpg](A450041_1_En_9_Fig17_HTML.jpg)\n\
    \n   Figure 9-17 Removing the current audio in the video footage\n\n2. Tap the\
    \ plus icon at the top left of the timeline, select the audio track, and tap `Use`.\n\
    3. Select the audio track on the timeline, choose its proper volume, and tap `Fade`\
    \ to make it fade in and out with the video (see Figure 9-18).\n\n   ![A450041_1_En_9_Fig18_HTML.jpg](A450041_1_En_9_Fig18_HTML.jpg)\n\
    \n   Figure 9-18 Adding an audio track to the video from the library\n\n## Step\
    \ 5: Export a Project as a Video\n\nTo export a project as video, follow these\
    \ steps:\n\n1. Once done editing the video, tap `Done` at the top left of the\
    \ screen.\n2. Tap the `Share` icon, and choose `Save Video`.\n3. Choose the video\
    \ quality you want to use. The video will be exported to your photo library (see\
    \ Figure 9-19).\n\n   ![A450041_1_En_9_Fig19_HTML.jpg](A450041_1_En_9_Fig19_HTML.jpg)\n\
    \n   Figure 9-19 Exporting the video project to the photo library\n\n# Create\
    \ a 1980s TV Video Effect\n\nTools used: `Clipper` app\n\nYou will learn about\
    \ the following:\n\n- Combining multiple videos\n- Adding audio tracks to videos\n\
    - Applying an old style TV effect\n\nConverting videos to look like they’re old\
    \ is a fun way to create nostalgic videos. In this tip, I used a video of my kids\
    \ playing on the beach to apply an old 1980s TV look. I used the `Clipper` app\
    \ to apply the effect and chose some nice soft background music for it. In these\
    \ steps, I used one video, but you can add a sequence of videos to give them all\
    \ the same style.\n\n## Step 1: Combine Video Footage and Audio\n\nTo add video\
    \ footage and audio, follow these steps:\n\n1. Open the `Clipper` app, and check\
    \ the videos you want to add to your project.\n2. Tap the `Add` icon at the top\
    \ right (see Figure 9-20).\n\n   ![A450041_1_En_9_Fig20_HTML.jpg](A450041_1_En_9_Fig20_HTML.jpg)\n\
    \n   Figure 9-20 Adding video to the project\n\n3. After adding the video, you\
    \ can tap the icon next to the video to add more videos to the project.\n4. From\
    \ the `Audio` section of the timeline, choose `Pop`. You can also add tracks from\
    \ your library by clicking the `Audio` icon (see Figure 9-21).\n\n   ![A450041_1_En_9_Fig21_HTML.jpg](A450041_1_En_9_Fig21_HTML.jpg)\n\
    \n   Figure 9-21 Adding videos and audio to the project\n\n## Step 2: Add the\
    \ Video Effect and Save the Video\n\nTo add the video effect and save the video,\
    \ follow these steps:\n\n1. From the `Video Effects` list at the bottom of the\
    \ screen, choose `80s TV` to apply it to the video.\n2. Preview the video by clicking\
    \ the `Play` button at the top of the timeline.\n3. Tap the `Share` icon at the\
    \ top right of the screen. Choose to share the video on social networks or via\
    \ e-mail, or save it to the Camera Roll (see Figure 9-22).\n\n   ![A450041_1_En_9_Fig22_HTML.jpg](A450041_1_En_9_Fig22_HTML.jpg)\n\
    \n   Figure 9-22 Adding the old TV style to the video and sharing it\n\n# Summary\n\
    \nYou don’t need an expensive video camcorder to take HD videos or complex software\
    \ to edit your videos anymore. The iPhone allows you to take videos with different\
    \ qualities based on your needs. Although the `Photos` app doesn’t include many\
    \ video-editing tools compared with its still photo-editing tools, such as cropping,\
    \ color adjustment, and light adjustment, you can use different apps to edit your\
    \ videos, apply effects, and add audio to them. While some apps give you full\
    \ editing capabilities such as `iMovie` and `Adobe Clip`, other apps give you\
    \ basic custom effects to apply directly to a video such as `Video Toolbox`. Therefore,\
    \ you need to choose the app that fits well with your needs.\n\n# Practice Exercise\n\
    \nThink of a hyperlapse project idea, such as taking a sequence of photos of a\
    \ playing kid and turn it into a time-lapse video. You can use the `OSnap` app\
    \ for this. Then, use applications such as `iMovie` or `Clipper` to add filters\
    \ and audio to the video."
  raw: "## Edit and Apply Filters\n\nTools used: iMovie\n\nIn this section, you will\
    \ learn about the following:\n\n*   Cropping parts from the middle of the video\
    \ footage\n*   Applying transition between video sections\n*   Converting a video\
    \ to black and white\n*   Applying filters to video\n*   Adding audio tracks to\
    \ video\n\nAlthough the Photos app doesn’t enable you to apply modifications to\
    \ the video other than removing footage at the beginning or end, there are apps\
    \ that can fill this gap. You can use apps such as iMovie, Adobe Premier Clip,\
    \ and others to extend your phone’s video abilities. In this tip, I had a video\
    \ of the Louvre Museum where there are two people in front of the camera. So,\
    \ I want to remove them, apply a transition between the different parts of the\
    \ video, and apply a black and white filter that makes the video look old.\n\n\
    ### Step 1: Create a Video Project\n\nTo create a video project, follow these\
    \ steps:\n\n1.  Open the iMovie app, tap the plus icon to add a video project,\
    \ and tap Movie to create a custom video project (see Figure [9-11](#A450041_1_En_9_Chapter.html#Fig11)).\n\
    \n    ![A450041_1_En_9_Fig11_HTML.jpg](A450041_1_En_9_Fig11_HTML.jpg)\n\n    Figure\
    \ 9-11\n\n    Creating a new project in iMovie  \n2.  Tap the video you want to\
    \ add, and tap Select (the right icon) on the video to add it. You can choose\
    \ more than one video to add to the same project.  \n3.  Tap Create Movie (see\
    \ Figure [9-12](#A450041_1_En_9_Chapter.html#Fig12)).\n\n    ![A450041_1_En_9_Fig12_HTML.jpg](A450041_1_En_9_Fig12_HTML.jpg)\n\
    \n    Figure 9-12\n\n    Creating a video project from one or more videos\n\n\
    ### Step 2: Cut the Unwanted Parts from the Video\n\nTo cut the unwanted parts\
    \ of the video, follow these steps:\n\n1.  Drag the video timeline to reach the\
    \ first area you want to remove.  \n2.  Select the video on the timeline to display\
    \ the video-editing tools.  \n3.  Tap the Cut icon, and choose Split to make a\
    \ cut before the unwanted area (see Figure [9-13](#A450041_1_En_9_Chapter.html#Fig13)).\n\
    \n    ![A450041_1_En_9_Fig13_HTML.jpg](A450041_1_En_9_Fig13_HTML.jpg)\n\n    Figure\
    \ 9-13\n\n    Splitting the video on a specific point  \n4.  Drag the video to\
    \ the area after the unwanted area, and tap Split again.  \n5.  Select the unwanted\
    \ area, and tap Delete (see Figure [9-14](#A450041_1_En_9_Chapter.html#Fig14)).\n\
    \n    ![A450041_1_En_9_Fig14_HTML.jpg](A450041_1_En_9_Fig14_HTML.jpg)\n\n    Figure\
    \ 9-14\n\n    Deleting the unwanted part of the video  \n6.  Now, you need to\
    \ create a transition in place of the unwanted area to build a smooth transition\
    \ between the video before and after the cut part. Tap the small icon between\
    \ the two segments and select a transition. For example, tap Fade (see Figure\
    \ [9-15](#A450041_1_En_9_Chapter.html#Fig15)).  \n7.  Repeat these steps for all\
    \ the unwanted parts of the video.\n\n    ![A450041_1_En_9_Fig15_HTML.jpg](A450041_1_En_9_Fig15_HTML.jpg)\n\
    \n    Figure 9-15\n\n    Applying a transition to the video segments\n\n### Step\
    \ 3: Convert the Video to Black and White\n\nTo convert the video to black and\
    \ white, follow these steps:\n\n1.  Drag the video to its beginning at the far\
    \ left.  \n2.  Tap the Settings icon at the bottom right of the screen.  \n3.\
    \  In the Filters list, choose Silent Era.  \n4.  Activate “Fade in from black”\
    \ and “Fade out to black” (see Figure [9-16](#A450041_1_En_9_Chapter.html#Fig16)).\
    \  \n5.  Tap Done.\n\n    ![A450041_1_En_9_Fig16_HTML.jpg](A450041_1_En_9_Fig16_HTML.jpg)\n\
    \n    Figure 9-16\n\n    Applying a global filter to the video project\n\n###\
    \ Step 4: Add an Audio Track to a Video\n\nTo add the audio track to the video\
    \ , follow these steps:\n\n1.  Before adding the audio track, you can remove the\
    \ existing video sound. While the video track is selected on the timeline, tap\
    \ the Audio icon, and drag the slider to the far left (see Figure [9-17](#A450041_1_En_9_Chapter.html#Fig17)).\n\
    \n    ![A450041_1_En_9_Fig17_HTML.jpg](A450041_1_En_9_Fig17_HTML.jpg)\n\n    Figure\
    \ 9-17\n\n    Removing the current audio in the video footage  \n2.  Tap the plus\
    \ icon at the top left of the timeline, select the audio track, and tap Use.  \n\
    3.  Select the audio track on the timeline, choose its proper volume, and tap\
    \ Fade to make it fade in and out with the video (see Figure [9-18](#A450041_1_En_9_Chapter.html#Fig18)).\n\
    \n    ![A450041_1_En_9_Fig18_HTML.jpg](A450041_1_En_9_Fig18_HTML.jpg)\n\n    Figure\
    \ 9-18\n\n    Adding an audio track to the video from the library\n\n### Step\
    \ 5: Export a Project as a Video\n\nTo export a project as video, follow these\
    \ steps:\n\n1.  Once done editing the video, tap Done at the top left of the screen.\
    \  \n2.  Tap the Share icon, and choose Save Video.  \n3.  Choose the video quality\
    \ you want to use. The video will be exported to your photo library (see Figure\
    \ [9-19](#A450041_1_En_9_Chapter.html#Fig19)).\n\n    ![A450041_1_En_9_Fig19_HTML.jpg](A450041_1_En_9_Fig19_HTML.jpg)\n\
    \n    Figure 9-19\n\n    Exporting the video project to the photo library\n\n\
    ## Create a 1980s TV Video Effect\n\nTools used: Clipper app\n\nYou will learn\
    \ about the following:\n\n*   Combining multiple videos\n*   Adding audio tracks\
    \ to videos\n*   Applying an old style TV effect\n\nConverting videos to look\
    \ like they’re old is a fun way to create nostalgic videos. In this tip, I used\
    \ a video of my kids playing on the beach to apply an old 1980s TV look. I used\
    \ the Clipper app to apply the effect and chose some nice soft background music\
    \ for it. In these steps, I used one video, but you can add a sequence of videos\
    \ to give them all the same style.\n\n### Step 1: Combine Video Footage and Audio\n\
    \nTo add video footage and audio, follow these steps:\n\n1.  Open the Clipper\
    \ app, and check the videos you want to add to your project.  \n2.  Tap the Add\
    \ icon at the top right (see Figure [9-20](#A450041_1_En_9_Chapter.html#Fig20)).\n\
    \n    ![A450041_1_En_9_Fig20_HTML.jpg](A450041_1_En_9_Fig20_HTML.jpg)\n\n    Figure\
    \ 9-20\n\n    Adding video to the project  \n3.  After adding the video, you can\
    \ tap the icon next to the video to add more videos to the project.  \n4.  From\
    \ the Audio section of the timeline, choose Pop. You can also add tracks from\
    \ your library by clicking the Audio icon (see Figure [9-21](#A450041_1_En_9_Chapter.html#Fig21)).\n\
    \n    ![A450041_1_En_9_Fig21_HTML.jpg](A450041_1_En_9_Fig21_HTML.jpg)\n\n    Figure\
    \ 9-21\n\n    Adding videos and audio to the project\n\n### Step 2: Add the Video\
    \ Effect and Save the Video\n\nTo add the video effect and save the video, follow\
    \ these steps:\n\n1.  From the Video Effects list at the bottom of the screen,\
    \ choose 80s TV to apply it to the video.  \n2.  Preview the video by clicking\
    \ the Play button at the top of the timeline.  \n3.  Tap the Share icon at the\
    \ top right of the screen. Choose to share the video on social networks or via\
    \ e-mail, or save it to the Camera Roll (see Figure [9-22](#A450041_1_En_9_Chapter.html#Fig22)).\n\
    \n    ![A450041_1_En_9_Fig22_HTML.jpg](A450041_1_En_9_Fig22_HTML.jpg)\n\n    Figure\
    \ 9-22\n\n    Adding the old TV style to the video and sharing it\n\n## Summary\n\
    \nYou don’t need an expensive video camcorder to take HD videos or complex software\
    \ to edit your videos anymore. The iPhone allows you to take videos with different\
    \ qualities based on your needs. Although the Photos app doesn’t include many\
    \ video-editing tools compared with its still photo-editing tools, such as cropping,\
    \ color adjustment, and light adjustment, you can use different apps to edit your\
    \ videos, apply effects, and add audio to them. While some apps give you full\
    \ editing capabilities such as iMovie and Adobe Clip, other apps give you basic\
    \ custom effects to apply directly to a video such as Video Toolbox. Therefore,\
    \ you need to choose the app that fits well with your needs.\n\n## Practice Exercise\n\
    \nThink of a hyperlapse project idea, such as taking a sequence of photos of a\
    \ playing kid and turn it into a time-lapse video. You can use the OSnap app for\
    \ this. Then, use applications such as iMovie or Clipper to add filters and audio\
    \ to the video."
  trans: "\n# 编辑和应用滤镜\n\n使用的工具：`iMovie`\n\n在本节中，你将学习以下内容：\n\n- 从视频片段中间裁剪部分内容\n- 在视频片段之间应用转场\n\
    - 将视频转换为黑白效果\n- 对视频应用滤镜\n- 为视频添加音轨\n\n尽管`照片`应用除了能删除视频开头或结尾的片段外，无法让你对视频进行其他修改，但有一些应用可以弥补这一不足。你可以使用如`iMovie`、`Adobe\
    \ Premier Clip`等应用来扩展手机的**视频**功能。在这个技巧中，我有一段卢浮宫的视频，镜头前有两个人。因此，我想将他们移除，在视频的不同部分之间应用转场，并添加一个黑白滤镜，让视频看起来有年代感。\n\
    \n## 步骤 1：创建视频项目\n\n要创建视频项目，请按照以下步骤操作：\n\n1. 打开`iMovie`应用，点击加号图标添加视频项目，然后点击`影片`以创建自定义视频项目（见图\
    \ 9-11）。\n\n   ![A450041_1_En_9_Fig11_HTML.jpg](img/A450041_1_En_9_Fig11_HTML.jpg)\n\
    \n   图 9-11 在`iMovie`中创建新项目\n\n2. 点击你想要添加的视频，然后点击视频上的`选择`（右侧图标）来添加它。你可以选择多个视频添加到同一个项目中。\n\
    3. 点击`创建影片`（见图 9-12）。\n\n   ![A450041_1_En_9_Fig12_HTML.jpg](img/A450041_1_En_9_Fig12_HTML.jpg)\n\
    \n   图 9-12 从一个或多个视频创建视频项目\n\n## 步骤 2：从视频中裁剪不需要的部分\n\n要裁剪视频中不需要的部分，请按照以下步骤操作：\n\
    \n1. 拖动视频时间线，到达第一个要删除的区域。\n2. 在时间线上选择视频，以显示视频编辑工具。\n3. 点击`裁剪`图标，并选择`拆分`，在不需要的区域之前进行切割（见图\
    \ 9-13）。\n\n   ![A450041_1_En_9_Fig13_HTML.jpg](img/A450041_1_En_9_Fig13_HTML.jpg)\n\
    \n   图 9-13 在特定点拆分视频\n\n4. 将视频拖动到不需要的区域之后，再次点击`拆分`。\n5. 选择不需要的区域，然后点击`删除`（见图 9-14）。\n\
    \n   ![A450041_1_En_9_Fig14_HTML.jpg](img/A450041_1_En_9_Fig14_HTML.jpg)\n\n \
    \  图 9-14 删除视频中不需要的部分\n\n6. 现在，你需要在删除区域的位置创建一个转场，以在切割部分前后的视频之间建立平滑过渡。点击两个片段之间的小图标，然后选择一个转场。例如，点击`淡出`（见图\
    \ 9-15）。\n7. 对视频中所有不需要的部分重复这些步骤。\n\n   ![A450041_1_En_9_Fig15_HTML.jpg](img/A450041_1_En_9_Fig15_HTML.jpg)\n\
    \n   图 9-15 对视频片段应用转场\n\n## 步骤 3：将视频转换为黑白效果\n\n要将视频转换为黑白效果，请按照以下步骤操作：\n\n1. 将视频拖动到其最左侧的起始位置。\n\
    2. 点击屏幕右下角的`设置`图标。\n3. 在`滤镜`列表中，选择`无声时代`。\n4. 启用`从黑色淡入`和`淡出到黑色`（见图 9-16）。\n5.\
    \ 点击`完成`。\n\n   ![A450041_1_En_9_Fig16_HTML.jpg](img/A450041_1_En_9_Fig16_HTML.jpg)\n\
    \n   图 9-16 对视频项目应用全局滤镜\n\n## 步骤 4：为视频添加音轨\n\n要为视频添加音轨，请按照以下步骤操作：\n\n1. 在添加音轨之前，你可以移除现有的视频声音。在时间线上选中视频轨道后，点击`音频`图标，并将滑块拖动到最左侧（见图\
    \ 9-17）。\n\n   ![A450041_1_En_9_Fig17_HTML.jpg](img/A450041_1_En_9_Fig17_HTML.jpg)\n\
    \n   图 9-17 移除视频片段中的当前音频\n\n2. 点击时间线左上角的加号图标，选择音轨，然后点击`使用`。\n3. 在时间线上选择音轨，调整其合适的音量，然后点击`淡入淡出`，使其与视频同步淡入和淡出（见图\
    \ 9-18）。\n\n   ![A450041_1_En_9_Fig18_HTML.jpg](img/A450041_1_En_9_Fig18_HTML.jpg)\n\
    \n   图 9-18 从资料库向视频添加音轨\n\n## 步骤 5：将项目导出为视频\n\n要将项目导出为视频，请按照以下步骤操作：\n\n1. 完成视频编辑后，点击屏幕左上角的`完成`。\n\
    2. 点击`共享`图标，并选择`存储视频`。\n3. 选择你想要使用的视频质量。视频将被导出到你的照片图库中（见图 9-19）。\n\n   ![A450041_1_En_9_Fig19_HTML.jpg](img/A450041_1_En_9_Fig19_HTML.jpg)\n\
    \n   图 9-19 将视频项目导出到照片图库\n\n# 创建 20 世纪 80 年代电视视频效果\n\n使用的工具：`Clipper` 应用\n\n你将学习以下内容：\n\
    \n- 合并多个视频\n- 为视频添加音轨\n- 应用老式电视效果\n\n将视频转换成看起来像旧时的风格，是一种创建怀旧视频的有趣方式。在这个技巧中，我使用了孩子们在海滩玩耍的视频，来应用老式\
    \ 1980 年代电视的外观。我使用了`Clipper`应用来应用此效果，并为此选择了一些好听的柔和背景音乐。在这些步骤中，我使用了一个视频，但你可以添加一系列视频，为它们都赋予相同的风格。\n\
    \n## 步骤 1：合并视频素材和音频\n\n要添加视频素材和音频，请按照以下步骤操作：\n\n1. 打开`Clipper`应用，勾选你想要添加到项目中的视频。\n\
    2. 点击右上角的`添加`图标（见图 9-20）。\n\n   ![A450041_1_En_9_Fig20_HTML.jpg](img/A450041_1_En_9_Fig20_HTML.jpg)\n\
    \n   图 9-20 向项目添加视频\n\n3. 添加视频后，你可以点击视频旁边的图标，向项目添加更多视频。\n4. 从时间线的`音频`部分，选择`流行`。你也可以通过点击`音频`图标，从你的资料库中添加音轨（见图\
    \ 9-21）。\n\n   ![A450041_1_En_9_Fig21_HTML.jpg](img/A450041_1_En_9_Fig21_HTML.jpg)\n\
    \n   图 9-21 向项目添加视频和音频\n\n## 步骤 2：添加视频效果并保存视频\n\n要添加视频效果并保存视频，请按照以下步骤操作：\n\n1.\
    \ 从屏幕底部的`视频效果`列表中，选择`80 年代电视`，将其应用到视频上。\n2. 点击时间线上方的`播放`按钮预览视频。\n3. 点击屏幕右上角的`共享`图标。选择在社交网络上分享视频，或通过电子邮件发送，或保存到相机胶卷（见图\
    \ 9-22）。\n\n   ![A450041_1_En_9_Fig22_HTML.jpg](img/A450041_1_En_9_Fig22_HTML.jpg)\n\
    \n   图 9-22 为视频添加老式电视风格并进行分享\n\n# 总结\n\n你不再需要昂贵的摄像机来拍摄高清视频，也不需要复杂的软件来编辑视频。iPhone\
    \ 允许你根据需求拍摄不同质量的视频。尽管`照片`应用与它的静态照片编辑工具（如裁剪、色彩调整和光线调整）相比，没有包含很多视频编辑工具，但你可以使用不同的应用来编辑视频、应用效果以及添加音频。虽然某些应用如`iMovie`和`Adobe\
    \ Clip`提供了完整的编辑功能，但其他应用如`Video Toolbox`也提供了直接应用于视频的基本自定义效果。因此，你需要选择最适合你需求的应用。\n\
    \n# 练习\n\n构思一个延时摄影项目，例如拍摄一组玩耍中的孩子的照片，并将其转换成延时视频。你可以使用`OSnap`应用来完成此操作。然后，使用如`iMovie`或`Clipper`等应用为视频添加滤镜和音频。\n"
- fmt: '# 10. Storing Your Photos


    When it comes to working with photos and video, running out of storage is one
    of my worst fears. It’s a tough spot to be in because taking photos in the high-quality
    HDR or Raw format can quickly eat up the storage space of your device because
    of the large file sizes used. When taking photos, I usually like to take a number
    of shots from different angles and zoom levels, which helps when editing the photos
    later or deciding to use them in photo manipulation artwork. That can also take
    up space on the iPhone.


    Unlike other mobile phones, the iPhone doesn’t have the option to add a memory
    card to extend its storage capabilities. Therefore, you need a good plan to ensure
    that your device always has space for your next shots. This can be achieved by
    managing your storage and taking advantage of the different cloud services such
    as iCloud, Dropbox, Google Drive, and others. The tips in this chapter aim to
    explore the different hacks that you can use to manage iPhone storage.


    ## Manage Your iPhone Storage


    The first step to managing your overall storage is to make sure that you only
    keep what you want on your device and leave enough space for your photos. While
    removing unnecessary apps from your device can help you save space, this may not
    be enough of a solution, especially when you work with different photo-editing
    apps and need to have the frequently used apps installed on your device. Therefore,
    you can change the settings of your device to ensure that you save only the necessary
    documents and photos. By default, the settings on your iPhone are not configured
    to aggressively save the space on your device; actually, some settings should
    be switched as soon as you get your device to ensure that space is consumed for
    only the important things. The following are some of the things that you can do
    to help to empty the iPhone storage space for your next photography project.


    ### Don’t Duplicate Saved Photos


    When taking HDR photos, you may notice that the iPhone keeps a copy of the original
    shot before converting it to an HDR photo. While this is meant to save your original
    shot, you don’t need to have a duplicated version of each photo. Therefore, you
    can choose to stop this duplicate copy and use this setting only when needed.
    To control this feature, follow these steps (see Figure [10-1](#A450041_1_En_10_Chapter.html#Fig1)):


    ![A450041_1_En_10_Fig1_HTML.jpg](A450041_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Disable keeping normal photos when taking HDR images


    1. Open `Settings ➤ Photo & Camera`.

    2. Scroll down to `Keep Normal Photo` and untick the toggle next to it.


    Some applications such as the Instagram have a similar feature that duplicates
    photos. You can switch it off by opening the Instagram app, choosing the `Profile`
    tab, and selecting the `Settings` icon. Then, you can deselect `Save Original
    Photos`.


    ### Stop Storing the Text Message History


    By default, iPhone stores all your sent and received messages forever. Obviously,
    this will consume space over time, especially if you send a lot of text messages.
    You probably don’t need those old messages, so you can limit the storage for messages
    to a specific amount of time and let the device delete the old ones (see Figure
    [10-2](#A450041_1_En_10_Chapter.html#Fig2)). Follow these steps:


    ![A450041_1_En_10_Fig2_HTML.jpg](A450041_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Removing the text message history


    1. Choose `Settings ➤ Messages ➤ Messages History ➤ Keep Messages`.

    2. Set the time to `1 Year` if you want to keep messages for that long, or set
    the time to `30 Days` if you are fine with a shorter period.


    ### Delete Downloaded Podcasts and Music


    Downloaded podcasts and music can consume a lot of your iPhone’s space because
    of their size. Sometimes you download a music track because it sounds interesting
    but then should remove it from your device. Keeping only the tracks that you frequently
    listen to can help you free some of your device space. You can do this by following
    these steps (see Figure [10-3](#A450041_1_En_10_Chapter.html#Fig3)):


    ![A450041_1_En_10_Fig3_HTML.jpg](A450041_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Deleting the unwanted music


    1. Tap `Settings ➤ General ➤ Storage & iCloud Usage ➤ Manage Storage`.

    2. Scroll down to the `Music` app. You can delete individual songs or all of them
    by swiping on `All Songs`.


    Unlike with music, you usually listen to a podcast only once and don’t need to
    retain each one. Therefore, it is good advice here to remove the downloaded podcasts
    to free some of the space on the iPhone. You can manually remove the unwanted
    podcasts (see Figure [10-4](#A450041_1_En_10_Chapter.html#Fig4)).


    ![A450041_1_En_10_Fig4_HTML.jpg](A450041_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Deleting unwanted podcasts


    1. Tap `Settings ➤ General ➤ Storage & iCloud Usage ➤ Manage Storage`.

    2. Scroll down to `Podcasts` and start deleting them one by one.


    ### Remove the Browser History and Reading List


    If you use Safari on your iPhone frequently to navigate the Internet and save
    pages in your reading list, you may notice that the browsing history and the saved
    reading list cache consume part of your storage space. You can remove the Safari’s
    browser cache by opening `Settings ➤ Safari` and tapping `Clear History and Website
    Data`.


    The reading list can take up some other unnecessary space because Safari keeps
    an offline reading list. Removing this offline reading list doesn’t affect the
    items in the reading list on your iPhone or other devices. So, it can be a good
    way to free some more space.


    ![A450041_1_En_10_Fig5_HTML.jpg](A450041_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Removing the browser’s offline reading list


    1. Tap `General ➤ Storage & iCloud Usage ➤ Storage`.

    2. Scroll down and tap `Safari`.

    3. Swipe left over the `Offline Reading List` item, and tap `Delete` to clear
    the cache (see Figure [10-5](#A450041_1_En_10_Chapter.html#Fig5)).

    4. Tap `Website Data`, scroll down, and tap `Remove All Website Data`.


    ## Save and Manage Photos Using iCloud


    The world is now shifting to cloud solutions and ditching the traditional local
    storage memory cards and hard drives. Cloud solutions give you flexible storage
    and reachability because you can access your resources from any device. You can
    use the iCloud service to store your photos and important documents, which frees
    up some space on your device. It also allows you to access your resources from
    your other devices such as an iPad, a Mac computer, or a Windows PC.


    ### Activate Saving Photos to iCloud


    When joining iCloud, you get a 5GB free plan to store your information. Obviously,
    this is not enough space to store files, especially if you are using multiple
    devices. Therefore, you need to decide which application is able to save files
    to the iCloud. You can activate saving photos to iCloud, as follows (see Figure
    [10-6](#A450041_1_En_10_Chapter.html#Fig6)):


    ![A450041_1_En_10_Fig6_HTML.jpg](A450041_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Activate saving the photos to the iCloud service


    1. Tap `Settings ➤ Photos & Camera`.

    2. Swipe next to `iCloud Photo Library` to toggle it on.

    3. Choose `Optimize iPhone Storage` to automatically manage your photo storage.
    Instead of keeping the originals on your device, the original photos are saved
    on iCloud instead.'
  raw: '# 10. Storing Your Photos


    When it comes to working with photos and video, running out of storage is one
    of my worst fears. It’s a tough spot to be in because taking photos in the high-quality
    HDR or Raw format can quickly eat up the storage space of your device because
    of the large file sizes used. When taking photos, I usually like to take a number
    of shots from different angles and zoom levels, which helps when editing the photos
    later or deciding to use them in photo manipulation artwork. That can also take
    up space on the iPhone.


    Unlike other mobile phones, the iPhone doesn’t have the option to add a memory
    card to extend its storage capabilities. Therefore, you need a good plan to ensure
    that your device always has space for your next shots. This can be achieved by
    managing your storage and taking advantage of the different cloud services such
    as iCloud, Dropbox, Google Drive, and others. The tips in this chapter aim to
    explore the different hacks that you can use to manage iPhone storage.


    ## Manage Your iPhone Storage


    The first step to managing your overall storage is to make sure that you only
    keep what you what on your device and leave enough space for your photos. While
    removing unnecessary apps from your device can help you save space, this may not
    be enough of a solution, especially when you work with different photo-editing
    apps and need to have the frequently used apps installed on your device. Therefore,
    you can change the settings of your device to ensure that you save only the necessary
    documents and photos. By default, the settings on your iPhone are not configured
    to aggressively save the space on your device; actually, some settings should
    be switched as soon as you get your device to ensure that space is consumed for
    only the important things. The following are some of the things that you can do
    to help to empty the iPhone storage space for your next photography project.


    ### Don’t Duplicate Saved Photos


    When taking HDR photos, you may notice that the iPhone keeps a copy of the original
    shot before converting it to an HDR photo. While this is meant to save your original
    shot, you don’t need to have a duplicated version of each photo. Therefore, you
    can choose to stop this duplicate copy and use this setting only when needed.
    To control this feature, follow these steps (see Figure [10-1](#A450041_1_En_10_Chapter.html#Fig1)):


    ![A450041_1_En_10_Fig1_HTML.jpg](A450041_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Disable keeping normal photos when taking HDR images


    1.  Open Settings ➤ Photo & Camera.  

    2.  Scroll down to Keep Normal Photo and untick the toggle next to it.  


    Some applications such as the Instagram have a similar feature that duplicates
    photos. You can switch it off by opening the Instagram app, choosing the Profile
    tab, and selecting the Settings icon. Then, you can deselect Save Original Photos.


    ### Stop Storing the Text Message History


    By default, iPhone stores all your sent and received messages forever. Obviously,
    this will consume space over time, especially if you send a lot of text message.
    You probably don’t need those old messages, so you can limit the storage for messages
    to a specific amount of time and let the device delete the old ones (see Figure
    [10-2](#A450041_1_En_10_Chapter.html#Fig2)). Follow these steps:


    ![A450041_1_En_10_Fig2_HTML.jpg](A450041_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Removing the text message history


    1.  Choose Setting ➤ Messages ➤ Messages History ➤ Keep Messages.  

    2.  Set the time to 1 Year if you want to keep messages for that long, or set
    the time to 30 Days if you are fine with a shorter period.


    ### Delete Downloaded Podcasts and Music


    Downloaded podcasts and music can consume a lot of your iPhone’s space because
    of their size. Sometimes you download a music track because it sounds interesting
    but then should remove it from your device. Keeping only the tracks that you frequently
    listen to can help you free some of your device space. You can do this by following
    these steps (see Figure [10-3](#A450041_1_En_10_Chapter.html#Fig3)):


    ![A450041_1_En_10_Fig3_HTML.jpg](A450041_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Deleting the unwanted music


    1.  Tap Settings ➤ General ➤ Storage & iCloud Usage ➤ Manage Storage.  

    2.  Scroll down to the Music app. You can delete individual songs or all of them
    by swiping on All Songs.  


    Unlike with music, you usually listen to a podcast only once and don’t need to
    retain each one. Therefore, it is good advice here to remove the downloaded podcasts
    to free some of the space on the iPhone. You can manually remove the unwanted
    podcasts (see Figure [10-4](#A450041_1_En_10_Chapter.html#Fig4)).


    ![A450041_1_En_10_Fig4_HTML.jpg](A450041_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Deleting unwanted podcasts


    1.  Tap Settings General ➤ Storage & iCloud Usage ➤ Manage Storage.  

    2.  Scroll down to Podcasts and start deleting them one by one.


    ### Remove the Browser History and Reading List


    If you use Safari on your iPhone frequently to navigate the Internet and save
    pages in your reading list, you may notice that the browsing history and the saved
    reading list cache consume part of your storage space. You can remove the Safari’s
    browser cache by opening Settings ➤ Safari and tapping Clear History and Website
    Data.


    The reading list can take up some other unnecessary space because Safari keeps
    an offline reading list. Removing this offline reading list doesn’t affect the
    items in the reading list on your iPhone or other devices. So, it can be a good
    way to free some more space.


    ![A450041_1_En_10_Fig5_HTML.jpg](A450041_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Removing the browser’s offline reading list


    1.  Tap General ➤ Storage & iCloud Usage ➤ Storage.  

    2.  Scroll down and tap Safari.  

    3.  Swipe left over the Offline Reading List item, and tap Delete to clear the
    cache (see Figure [10-5](#A450041_1_En_10_Chapter.html#Fig5)).  

    4.  Tap Website Data, scroll down, and tap Remove All Website Data.


    ## Save and Manage Photos Using iCloud


    The world is now shifting to cloud solutions and ditching the traditional local
    storage memory cards and hard drives. Cloud solutions give you flexible storage
    and reachability because you can access your resources from any device. You can
    use the iCloud service to store your photos and important documents, which frees
    up some space on your device. It also allows you to access your resources from
    your other devices such as an iPad, a Mac computer, or a Windows PC.


    ### Activate Saving Photos to iCloud


    When joining iCloud, you get a 5GB free plan to store your information. Obviously,
    this is not enough space to store files, especially if you are using multiple
    devices. Therefore, you need to decide which application is able to save files
    to the iCloud. You can activate saving photos to iCloud, as follows (see Figure
    [10-6](#A450041_1_En_10_Chapter.html#Fig6)):


    ![A450041_1_En_10_Fig6_HTML.jpg](A450041_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Activate saving the photos to the iCloud service


    1.  Tap Settings ➤ Photos & Camera.  

    2.  Swipe next to iCloud Photo Library to toggle it on.  

    3.  Choose Optimize iPhone Storage to automatically manage your photo storage.
    Instead of keeping the originals on your device, the original photos are saved
    on iCloud instead.'
  trans: '

    # 10. 存储你的照片


    在处理照片和视频时，存储空间耗尽是我最担心的问题之一。这是一个棘手的情况，因为以高质量 HDR 或 Raw 格式拍摄照片会因文件体积庞大而迅速消耗设备的存储空间。拍照时，我通常喜欢从不同角度和变焦倍数拍摄多张照片，这有助于后期编辑照片，或决定将其用于照片合成艺术作品。这同样会占用
    iPhone 的空间。


    与其他手机不同，iPhone 无法通过添加存储卡来扩展其存储能力。因此，你需要一个完善的计划，确保设备始终为下一次拍摄留有空间。这可以通过管理存储空间并利用
    iCloud、Dropbox、Google Drive 等各种云服务来实现。本章的技巧旨在探索可用于管理 iPhone 存储空间的各种妙招。


    ## 管理你的 iPhone 存储空间


    管理整体存储空间的第一步是确保设备上只保留你想要的内容，并为照片留出足够的空间。虽然从设备中移除不必要的应用程序可以节省空间，但这可能不足以解决问题，尤其是当你使用各种照片编辑应用，并需要在设备上安装常用应用时。因此，你可以更改设备设置，确保只保存必要的文档和照片。默认情况下，iPhone
    的设置并未配置为主动节省设备空间；实际上，有些设置应该在拿到设备后立即更改，以确保空间仅用于重要事项。以下是一些可帮助清空 iPhone 存储空间，为下一个摄影项目做好准备的操作。


    ### 不要重复保存照片


    在拍摄 HDR 照片时，你可能会注意到 iPhone 会在转换为 HDR 照片之前保留原始照片的副本。虽然这是为了保存原始照片，但你并不需要每张照片都保留一个副本。因此，你可以选择停止这种重复备份，仅在需要时使用此设置。要控制此功能，请按照以下步骤操作（见图
    10-1）：


    ![A450041_1_En_10_Fig1_HTML.jpg](img/A450041_1_En_10_Fig1_HTML.jpg)


    图 10-1


    在拍摄 HDR 图像时禁用保留普通照片


    1. 打开 `设置 ➤ 照片与相机`。

    2. 向下滚动到 `保留正常曝光的照片`，并取消勾选其旁边的开关。


    某些应用程序（如 Instagram）也有类似的重复保存照片功能。你可以通过打开 Instagram 应用，选择 `个人资料` 选项卡，然后点击 `设置`
    图标来关闭此功能。接着，取消选择 `保存原始照片`。


    ### 停止存储短信历史记录


    默认情况下，iPhone 会永久存储所有已发送和已接收的短信。显然，随着时间的推移，这会消耗大量空间，特别是当你发送大量短信时。你可能不需要那些旧短信，因此你可以将短信存储限制在特定时间段内，让设备自动删除旧短信（见图
    10-2）。请按照以下步骤操作：


    ![A450041_1_En_10_Fig2_HTML.jpg](img/A450041_1_En_10_Fig2_HTML.jpg)


    图 10-2


    删除短信历史记录


    1. 选择 `设置 ➤ 信息 ➤ 信息历史记录 ➤ 保留信息`。

    2. 如果你希望保留信息长达一年，请将时间设置为 `1 年`；如果对更短时间满意，则设置为 `30 天`。


    ### 删除已下载的播客和音乐


    已下载的播客和音乐因其体积较大，可能会占用大量 iPhone 空间。有时你下载一首音乐曲目是因为它听起来很有趣，但之后应将其从设备中删除。只保留你经常听的曲目有助于释放一些设备空间。你可以按照以下步骤操作（见图
    10-3）：


    ![A450041_1_En_10_Fig3_HTML.jpg](img/A450041_1_En_10_Fig3_HTML.jpg)


    图 10-3


    删除不需要的音乐


    1. 轻点 `设置 ➤ 通用 ➤ 存储空间与 iCloud 用量 ➤ 管理存储空间`。

    2. 向下滚动到 `音乐` 应用。你可以在 `所有歌曲` 上向左轻滑来删除单首歌曲或全部歌曲。


    与音乐不同，播客通常只听一次，无需保留每一集。因此，建议删除已下载的播客以释放 iPhone 上的一些空间。你可以手动删除不需要的播客（见图 10-4）。


    ![A450041_1_En_10_Fig4_HTML.jpg](img/A450041_1_En_10_Fig4_HTML.jpg)


    图 10-4


    删除不需要的播客


    1. 轻点 `设置 ➤ 通用 ➤ 存储空间与 iCloud 用量 ➤ 管理存储空间`。

    2. 向下滚动到 `播客`，然后开始逐一删除。


    ### 移除浏览器历史记录和阅读列表


    如果你在 iPhone 上频繁使用 Safari 浏览网页并将页面保存到阅读列表，你可能会注意到浏览历史和已保存的阅读列表缓存会占用部分存储空间。你可以通过打开
    `设置 ➤ Safari` 并轻点 `清除历史记录与网站数据` 来移除 Safari 的浏览器缓存。


    阅读列表也可能占用一些不必要的空间，因为 Safari 会保留离线阅读列表。移除这个离线阅读列表不会影响你 iPhone 或其他设备上阅读列表中的项目。因此，这是释放更多空间的一个好方法。


    ![A450041_1_En_10_Fig5_HTML.jpg](img/A450041_1_En_10_Fig5_HTML.jpg)


    图 10-5


    移除浏览器的离线阅读列表


    1. 轻点 `通用 ➤ 存储空间与 iCloud 用量 ➤ 存储空间`。

    2. 向下滚动并轻点 `Safari`。

    3. 在 `离线阅读列表` 项目上向左轻滑，然后轻点 `删除` 以清除缓存（见图 10-5）。

    4. 轻点 `网站数据`，向下滚动，然后轻点 `移除所有网站数据`。


    ## 使用 iCloud 保存和管理照片


    如今，世界正转向云解决方案，抛弃传统的本地存储卡和硬盘。云解决方案提供了灵活的存储和可访问性，因为你可以从任何设备访问资源。你可以使用 iCloud 服务存储你的照片和重要文档，从而释放设备上的空间。它还允许你从其他设备（如
    iPad、Mac 电脑或 Windows PC）访问资源。


    ### 激活将照片保存到 iCloud


    加入 iCloud 后，你将获得 5GB 的免费方案来存储信息。显然，对于存储文件来说，这空间不够，尤其是当你使用多台设备时。因此，你需要决定哪些应用程序能够将文件保存到
    iCloud。你可以按如下方式激活将照片保存到 iCloud（见图 10-6）：


    ![A450041_1_En_10_Fig6_HTML.jpg](img/A450041_1_En_10_Fig6_HTML.jpg)


    图 10-6


    激活将照片保存到 iCloud 服务


    1. 轻点 `设置 ➤ 照片与相机`。

    2. 在 `iCloud 照片图库` 旁向右滑动以将其开启。

    3. 选择 `优化 iPhone 存储空间` 以自动管理你的照片存储。原始照片将保存在 iCloud 上，而非保留在你的设备上。

    '
- fmt: '### Manage iCloud Storage and Apps


    You can review your iCloud status directly from your iPhone to see the available
    space and the applications that are allowed to save documents to iCloud (see Figure
    [10-7](#A450041_1_En_10_Chapter.html#Fig7)).


    ![A450041_1_En_10_Fig7_HTML.jpg](A450041_1_En_10_Fig7_HTML.jpg)


    Figure 10-7: Allow or disallow apps from using iCloud


    1. In the `Settings` app, tap your Apple ID name, and tap `iCloud` to view the
    storage status.

    2. Scroll down to review the applications that are allowed to use `iCloud`.


    If you decided to switch off the sync process between one of the apps and the
    `iCloud`, you may notice a message that tells you that the documents associated
    with this specific app will be removed from `iCloud` storage.


    You can also access `iCloud` using a web browser to see the different applications
    in the cloud and access the `Photos` storage area. Once you activate the `iCloud
    Photo Library` from the `Photos` app settings, you can see the photos uploaded
    to `iCloud` and manage them by adding photos, deleting photos, or organizing them
    into folders (see Figure [10-8](#A450041_1_En_10_Chapter.html#Fig8)). To access
    `iCloud` from your browser, you can follow these steps:


    ![A450041_1_En_10_Fig8_HTML.jpg](A450041_1_En_10_Fig8_HTML.jpg)


    Figure 10-8: Managing the iCloud service using a web browser


    1. In your browser, type [`www.icloud.com`](http://www.icloud.com).

    2. Log in using your Apple ID and password.

    3. Select `Photos` from the Dashboard.


    On the left side, you can find the different folders that your iPhone uses and
    navigate to the uploaded photos. From the top right icons, you can upload photos,
    create new folders, share photos, download photos, or delete them.


    ## Use Other Cloud Services


    `iCloud` is not the only cloud service you can use to store photos and documents
    from your iPhone. Although the iPhone is highly integrated with iOS, there are
    other services that you can download and use such as `Dropbox`, `Google Drive`,
    and `One Drive`. All these services provide a free plan where you can enjoy free
    storage. For example, `Dropbox` provides 2GB of free storage before you need to
    upgrade. If you invite others to use the app, you get extra space as a reward.
    `Google Drive` provides the largest free storage space; it gives you 17GB. Additionally,
    it lets you create documents and photos using different apps such as `Google Docs`
    and `Google Slides` and save them to `Google Drive` automatically.


    If you are not sure if the `iCloud` free space could save all your photos, you
    can use any of the other cloud services to save your photos by simply uploading
    photos to the cloud using these apps (see Figure [10-9](#A450041_1_En_10_Chapter.html#Fig9)).
    `Dropbox` gives you the ability to upload your camera photos to its storage, as
    follows:


    ![A450041_1_En_10_Fig9_HTML.jpg](A450041_1_En_10_Fig9_HTML.jpg)


    Figure 10-9: Using Dropbox to save camera photos


    1. Open the `Dropbox` app, and log in with your username and password.

    2. Tap the top-left `Settings` icon.

    3. Tap `Camera Uploads` and swipe the toggle to `On`. This will upload the photos
    to the `Camera Uploads` folder on `Dropbox`.

    4. Toggle the `Upload Video` item to upload the videos in the same folder.

    5. Make sure that `Use Cellular Data` is off to allow you to upload through a
    Wi-Fi connection only.

    6. Toggle `Background Uploading` to `On` and then choose `Enable`. This will let
    `Dropbox` upload photos when you move from one place to another.


    ## Sync Raw Files Using the Lightroom App


    You may notice that the photos taken or modified inside the Adobe `Lightroom`
    app are saved by default in a separate location other than the `Camera Roll`,
    with the ability to share the images with the `Camera Roll`. These saved photos
    preserve the editing applied to them inside the `Lightroom` app so you can open
    them again and modify or change the effects applied. You can also take Raw photos
    using the `Lightroom` app if you want unprocessed photos that can give you a lot
    editing capabilities. However, saving the Raw file and the file modifications
    can consume a huge portion of your iPhone space due to the large file size of
    these photos.


    Adobe `Lightroom` provides cloud storage for Adobe Creative Cloud members; you
    can save photos from both your desktop and mobile applications to the Adobe cloud
    services. The free subscription gives you 2GB of free storage, while the paid
    membership gives you 20GB of storage. You can activate the Adobe Creative Cloud
    in your Adobe `Lightroom` app by simply logging into your account from the app.
    It will automatically upload the photos in the `Lightroom` library and update
    the modifications applied to any of the photos.


    You can sync the photos from the `Lightroom` app library and the Adobe cloud service
    as follows (see Figure [10-10](#A450041_1_En_10_Chapter.html#Fig10)):


    ![A450041_1_En_10_Fig10_HTML.jpg](A450041_1_En_10_Fig10_HTML.jpg)


    Figure 10-10: Syncing between the Lightroom app and Adobe cloud service


    1. Open the `Lightroom` app on your iPhone.

    2. Tap the `Cloud` icon on the top left, and sign in with your Adobe ID and password.

    3. Tap the icon to sync the photos with the online storage.


    You can also manage the photos on the online cloud storage through your browser
    as follows (see Figure [10-11](#A450041_1_En_10_Chapter.html#Fig11)):


    ![A450041_1_En_10_Fig11_HTML.jpg](A450041_1_En_10_Fig11_HTML.jpg)


    Figure 10-11: Accessing the Lightroom cloud storage using the computer browser


    1. In your browser, go to [`https://lightroom.adobe.com/`](https://lightroom.adobe.com/).

    2. Log in with your Adobe ID and password.

    3. Click the `Add Photos` icon to add photos from your computer to the cloud.

    4. Click the `Select` icon on the photo to delete, share, or change the location.


    ## Sync Files with Your Computer


    Many people love a big screen; I know it helps me to see the details of a photo
    and pick out the little issues that need to be fixed. You can sync photos from
    your iPhone to your computer to modify, store, or share with others. Also, you
    can sync between your `Photos` folder on your computer and your iPhone to be able
    to have a copy of your photos and special memories on your phone.'
  raw: '### Manage iCloud Storage and Apps


    You can review your iCloud status directly from your iPhone to see the available
    space and the applications that are allowed to save documents to iCloud (see Figure
    [10-7](#A450041_1_En_10_Chapter.html#Fig7)).


    ![A450041_1_En_10_Fig7_HTML.jpg](A450041_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Allow or disallow apps from using iCloud


    1.  In the Settings app, tap your Apple ID name, and tap iCloud to view the storage
    status.  

    2.  Scroll down to review the applications that are allowed to use iCloud.  


    If you decided to switch off the sync process between one of the apps and the
    iCloud, you may notice a message that tells you that the documents associated
    with this specific app will be removed from iCloud storage.


    You can also access iCloud using a web browser to see the different applications
    in the cloud and access the Photos storage area. Once you activate the iCloud
    Photo Library from the Photos app settings, you can see the photos uploaded to
    iCloud and manage them by adding photos, deleting photos, or organizing them into
    folders (see Figure [10-8](#A450041_1_En_10_Chapter.html#Fig8)). To access iCloud
    from your browser, you can follow these steps:


    ![A450041_1_En_10_Fig8_HTML.jpg](A450041_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Managing the iCloud service using a web browser


    1.  In your browser, type [`www.icloud.com`](http://www.icloud.com) .  

    2.  Log in using your Apple ID and password.  

    3.  Select photos from the Dashboard.  


    On the left side, you can find the different folders that your iPhone uses and
    navigate to the uploaded photos. From the top right icons, you can upload photos,
    create new folders, share photos, download photos, or delete them.


    ## Use Other Cloud Services


    iCloud is not the only cloud service you can use to store photos and documents
    from your iPhone. Although the iPhone is highly integrated with iOS, there are
    other services that you can download and use such as Dropbox, Google Drive, and
    One Drive. All these services provide a free plan where you can enjoy free storage.
    For example, Dropbox provides 2GB of free storage before you need to upgrade.
    If you invite others to use the app, you get extra space as a reward. Google Drive
    provides the largest free storage space; it gives you 17GB. Additionally, it lets
    you create documents and photos using different apps such as Google Docs and Google
    Slides and save them to Google Drive automatically.


    If you are not sure if the iCloud free space could save all your photos, you can
    use any of the other cloud services to save your photos by simply uploading photos
    to the cloud using these apps (see Figure [10-9](#A450041_1_En_10_Chapter.html#Fig9)).
    Dropbox gives you the ability to upload your camera photos to its storage, as
    follows:


    ![A450041_1_En_10_Fig9_HTML.jpg](A450041_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Using Dropbox to save camera photos


    1.  Open the Dropbox app, and log in with your username and password.  

    2.  Tap the top-left Settings icon.  

    3.  Tap Camera Uploads and swipe the toggle to On. This will upload the photos
    to the Camera Uploads folder on Dropbox.  

    4.  Toggle the Upload Video item to upload the videos in the same folder.  

    5.  Make sure that Use Cellular Data is off to allow you to upload through a Wi-Fi
    connection only.  

    6.  Toggle Background Uploading to On and then choose Enable. This will let Dropbox
    upload photos when you move from one place to another.


    ## Sync Raw Files Using the Lightroom App


    You may notice that the photos taken or modified inside the Adobe Lightroom app
    are saved by default in a separate location other than the Camera Roll, with the
    ability to share the images with the Camera Roll. These saved photos preserve
    the editing applied to them inside the Lightroom app so you can open them again
    and modify or change the effects applied. You can also take Raw photos using the
    Lightroom app if you want unprocessed photos that can give you a lot editing capabilities.
    However, saving the Raw file and the file modifications can consume a huge portion
    of your iPhone space due to the large file size of these photos.


    Adobe Lightroom provides cloud storage for Adobe Creative Cloud members; you can
    save photos from both your desktop and mobile applications to the Adobe cloud
    services. The free subscription gives you 2GB of free storage, while the paid
    membership gives you 20GB of storage. You can activate the Adobe Creative Cloud
    in your Adobe Lightroom app by simply logging into your account from the app.
    It will automatically upload the photos in the Lightroom library and update the
    modifications applied to any of the photos.


    You can sync the photos from the Lightroom app library and the Adobe cloud service
    as follows (see Figure [10-10](#A450041_1_En_10_Chapter.html#Fig10)):


    ![A450041_1_En_10_Fig10_HTML.jpg](A450041_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Syncing between the Lightroom app and Adobe cloud service


    1.  Open the Lightroom app on your iPhone.  

    2.  Tap the Cloud icon on the top left, and sign in with your Adobe ID and password.
     

    3.  Tap the icon to sync the photos with the online storage.  


    You can also manage the photos on the online cloud storage through your browser
    as follows (see Figure [10-11](#A450041_1_En_10_Chapter.html#Fig11)):


    ![A450041_1_En_10_Fig11_HTML.jpg](A450041_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Accessing the Lightroom cloud storage using the computer browser


    1.  In your browser, go to [`https://lightroom.adobe.com/`](https://lightroom.adobe.com/)
    .  

    2.  Log in with your Adobe ID and password.  

    3.  Click the Add Photos icon to add photos from your computer to the cloud.  

    4.  Click the Select icon on the photo to delete, share, or change the location.


    ## Sync Files with Your Computer


    Many people love a big screen; I know it helps me to see the details of a photo
    and pick out the little issues that need to be fixed. You can sync photos from
    your iPhone to your computer to modify, store, or share with others. Also, you
    can sync between your Photos folder on your computer and your iPhone to be able
    to have a copy of your photos and special memories on your phone.'
  trans: '

    ### 管理 iCloud 存储与应用程序


    您可以直接在 iPhone 上查看 iCloud 状态，了解可用空间以及允许将文稿保存到 iCloud 的应用程序（见图 10-7）。


    ![A450041_1_En_10_Fig7_HTML.jpg](img/A450041_1_En_10_Fig7_HTML.jpg)


    图 10-7：允许或禁止应用使用 iCloud


    1.  在`设置`应用中，点击您的 Apple ID 名称，然后点击`iCloud`查看存储状态。

    2.  向下滚动，查看允许使用`iCloud`的应用程序。


    如果您决定关闭某个应用与`iCloud`之间的同步过程，您可能会看到一条提示信息，告知您与此特定应用关联的文稿将从`iCloud`存储中移除。


    您还可以通过网页浏览器访问`iCloud`，查看云端的各个应用，并访问`照片`存储区域。一旦您在`照片`应用设置中激活了`iCloud 照片图库`，您就可以查看上传到`iCloud`的照片，并通过添加照片、删除照片或将其整理到文件夹中进行管理（见图
    10-8）。要通过浏览器访问`iCloud`，您可以按照以下步骤操作：


    ![A450041_1_En_10_Fig8_HTML.jpg](img/A450041_1_En_10_Fig8_HTML.jpg)


    图 10-8：使用网页浏览器管理 iCloud 服务


    1.  在浏览器中，输入 [`www.icloud.com`](http://www.icloud.com)。

    2.  使用您的 Apple ID 和密码登录。

    3.  从仪表盘中选择`照片`。


    在左侧，您可以找到 iPhone 使用的不同文件夹，并导航到已上传的照片。通过右上角的图标，您可以上传照片、创建新文件夹、共享照片、下载照片或删除照片。


    ## 使用其他云服务


    `iCloud`并非您可以用来从 iPhone 存储照片和文稿的唯一云服务。尽管 iPhone 与 iOS 高度集成，但您还可以下载并使用其他服务，例如`Dropbox`、`Google
    Drive`和`One Drive`。所有这些服务都提供免费方案，您可以享受免费存储空间。例如，`Dropbox`提供 2GB 的免费存储空间，之后才需要升级。如果您邀请他人使用该应用，您将获得额外空间作为奖励。`Google
    Drive`提供最大的免费存储空间，达到 17GB。此外，它还允许您使用`Google Docs`和`Google Slides`等不同应用创建文档和照片，并自动保存到`Google
    Drive`中。


    如果您不确定`iCloud`的免费空间能否保存您所有的照片，您可以使用其他任何云服务来保存照片，只需通过这些应用将照片上传到云端即可（见图 10-9）。`Dropbox`允许您将相机照片上传到其存储空间，操作如下：


    ![A450041_1_En_10_Fig9_HTML.jpg](img/A450041_1_En_10_Fig9_HTML.jpg)


    图 10-9：使用 Dropbox 保存相机照片


    1.  打开`Dropbox`应用，并使用您的用户名和密码登录。

    2.  点击左上角的`设置`图标。

    3.  点击`相机上传`并将切换开关滑至`开`。这会将照片上传到`Dropbox`上的`相机上传`文件夹。

    4.  切换`上传视频`项目以将视频上传到同一文件夹。

    5.  确保`使用蜂窝数据`为关闭状态，以允许您仅通过 Wi-Fi 连接上传。

    6.  将`后台上传`切换为`开`，然后选择`启用`。这将让`Dropbox`在您从一个地方移动到另一个地方时上传照片。


    ## 使用 Lightroom 应用同步原始文件


    您可能会注意到，在 Adobe `Lightroom` 应用中拍摄或修改的照片默认保存在与`相机胶卷`不同的单独位置，但可以与`相机胶卷`共享图像。这些保存的照片保留了在`Lightroom`
    应用内所做的编辑，因此您可以再次打开它们并修改或更改所应用的效果。如果您需要未经处理的照片以获得更多编辑能力，您还可以使用`Lightroom` 应用拍摄原始照片。然而，由于这些照片文件体积巨大，保存原始文件和文件修改可能会占用您
    iPhone 的大量空间。


    Adobe `Lightroom` 为 Adobe Creative Cloud 会员提供云存储；您可以将桌面和移动应用中的照片都保存到 Adobe 云服务中。免费订阅提供
    2GB 免费存储空间，而付费会员则提供 20GB 存储空间。您可以通过在 Adobe `Lightroom` 应用中登录您的帐户来激活 Adobe Creative
    Cloud。它将自动上传`Lightroom` 图库中的照片，并更新对任何照片所做的修改。


    您可以按照以下步骤同步`Lightroom` 应用图库与 Adobe 云服务中的照片（见图 10-10）：


    ![A450041_1_En_10_Fig10_HTML.jpg](img/A450041_1_En_10_Fig10_HTML.jpg)


    图 10-10：在 Lightroom 应用与 Adobe 云服务之间同步


    1.  在您的 iPhone 上打开`Lightroom` 应用。

    2.  点击左上角的`云`图标，并使用您的 Adobe ID 和密码登录。

    3.  点击该图标，将照片与在线存储空间同步。


    您也可以通过浏览器管理在线云存储中的照片，操作如下（见图 10-11）：


    ![A450041_1_En_10_Fig11_HTML.jpg](img/A450041_1_En_10_Fig11_HTML.jpg)


    图 10-11：使用电脑浏览器访问 Lightroom 云存储


    1.  在您的浏览器中，前往 [`https://lightroom.adobe.com/`](https://lightroom.adobe.com/)。

    2.  使用您的 Adobe ID 和密码登录。

    3.  点击`添加照片`图标，从您的电脑向云端添加照片。

    4.  点击照片上的`选择`图标以删除、共享或更改位置。


    ## 与您的电脑同步文件


    很多人都喜欢大屏幕；对我来说，它能帮助我查看照片的细节，挑出需要修复的小问题。您可以将照片从 iPhone 同步到电脑，以便修改、存储或与他人分享。此外，您还可以在电脑上的`照片`文件夹与
    iPhone 之间进行同步，以便在手机上保存您的照片和珍贵回忆的副本。

