    \n    Figure 4-39\n\n    Use the Smart tool to remove the layer elements and keep\
    \ the right wall  \n5.  In the bottom toolbar, tap Refine. In the left settings,\
    \ drag over the Feather value to set it to 15.  \n6.  Tap the Apply icon.  \n\
    7.  Tap the right wall layer to open its properties, and tap Flip H.  \n8.  Drag\
    \ to place the right wall on the left side and modify its size and position as\
    \ needed (see Figure [4-40](#A450041_1_En_4_Chapter.html#Fig40)).\n\n    ![A450041_1_En_4_Fig40_HTML.jpg](A450041_1_En_4_Fig40_HTML.jpg)\n\
    \n    Figure 4-40\n\n    Reflect and position the wall to the left side  \n9.\
    \  Tap the Adjust icon, increase Highlights to 5%, and tap the Apply icon.  \n\
    10.  Use the Crop icon to crop the edges of the photo that still appear around\
    \ the fixed area, and tap the Apply icon (see Figure [4-41](#A450041_1_En_4_Chapter.html#Fig41)).\n\
    \n    ![A450041_1_En_4_Fig41_HTML.jpg](A450041_1_En_4_Fig41_HTML.jpg)\n\n    Figure\
    \ 4-41\n\n    Crop the unwanted areas from around the image\n\n### Step 2: Convert\
    \ the Photo to Black and White\n\nFollow these steps to convert the photo to black\
    \ and white:\n\n1.  Tap the Share icon, and save the photo to the Camera Roll.\
    \  \n2.  Tap the plus icon to add a layer. Add the photo that you just saved to\
    \ have a merged copy of the photo.  \n3.  Tap the Adjust icon, and drag the Saturation\
    \ value to the left to convert the photo to black and white (see Figure [4-42](#A450041_1_En_4_Chapter.html#Fig42)).\
    \  \n4.  Tap the Apply icon.\n\n    ![A450041_1_En_4_Fig42_HTML.jpg](A450041_1_En_4_Fig42_HTML.jpg)\n\
    \n    Figure 4-42\n\n    Desaturate the layer colors to convert to black and white\n\
    \n### Step 3: Add Color to the King’s Mask\n\nFollow these steps:\n\n1.  With\
    \ the black-and-white layer selected, tap the Cut Out icon.  \n2.  Tap the Basic\
    \ icon, and in the left settings, tap Eraser.  \n3.  Paint over the mask to remove\
    \ the black-and-white version and display the colored version under it. Then tap\
    \ the Apply icon (see Figure [4-43](#A450041_1_En_4_Chapter.html#Fig43)).  \n\
    4.  Tap the Share icon to save the final result to your Camera Roll.\n\n    ![A450041_1_En_4_Fig43_HTML.jpg](A450041_1_En_4_Fig43_HTML.jpg)\n\
    \n    Figure 4-43\n\n    Remove the black-and-white mask to display the colored\
    \ one\n\n## Summary\n\nIn this chapter, you explored how to take photo editing\
    \ further. The tips provided a number of examples of how to use applications to\
    \ apply filters, add frames, and manipulate several photos for one project. You\
    \ can the apps mentioned to try the exercises with your own photos and adjust\
    \ the settings according to the nature of your shots.\n\n## Practice Exercise\n\
    \nStart by thinking about a photo that you can use to build a mystic or dramatic\
    \ effect. Then, prepare the photo to fit with your idea. For example, remove the\
    \ background and adjust the colors. Once done, you can build the composition in\
    \ a layer-based application such as Photoshop Mix and Photofox.\n\n# 5. Integrating\
    \ with Adobe Lightroom on the Desktop\n\nTo expand your iPhone’s photography capabilities,\
    \ you can take the photos you have edited on your phone and integrate them with\
    \ the Adobe Lightroom desktop application. One of the advantages of using the\
    \ Adobe Lightroom mobile app is that it allows you to go from your phone to the\
    \ desktop version of the same application. This allows you to continue modifying\
    \ your photos but on a larger screen, which can help you to see more details in\
    \ a photo.\n\nIn this chapter, you will explore how to extend your iPhone’s photography\
    \ capabilities using the integration between the Adobe Lightroom mobile app and\
    \ desktop application. You’ll take photos using the Camera Raw technology.\n\n\
    ## Rate, Flag, and Organize Photos\n\nBefore starting to integrate your files\
    \ from your phone to the desktop version of Adobe Lightroom, you need to organize\
    \ and filter the images so you can easily identify the best shots to use in further\
    \ photo-editing steps.\n\nThe Lightroom app provides a comprehensive way to organize\
    \ and arrange photos. In the Lightroom app on your phone, you can review and rate\
    \ your photos in order to easily identify them for photo-editing projects. You\
    \ can review the photos in Lightroom and rate them as follows:\n\n1.  Open the\
    \ Lightroom app.  \n2.  Select an image from the library or from the Camera Roll.\
    \  \n3.  In the top menu, set the mode to Rate & Review.  \n4.  Swipe up and down\
    \ on the left side of the screen to display the rating stars. You can give a rating\
    \ to a selected image by dragging up and down. You can also use the stars at the\
    \ bottom of the image to give it a rating, as shown in Figure [5-1](#A450041_1_En_5_Chapter.html#Fig1).\n\
    \n    ![A450041_1_En_5_Fig1_HTML.jpg](A450041_1_En_5_Fig1_HTML.jpg)\n\n    Figure\
    \ 5-1\n\n    Swipe up or down on the left side of the photo to add a rating  \n\
    5.  Swipe up and down on the right side of the screen to open the flagging option.\
    \ This allows you to choose between flagged, unflagged, or rejected. Drag up or\
    \ down to choose between the three options. You can also use the flag icon at\
    \ the bottom right of the image to flag the image, as shown in Figure [5-2](#A450041_1_En_5_Chapter.html#Fig2).\n\
    \n    ![A450041_1_En_5_Fig2_HTML.jpg](A450041_1_En_5_Fig2_HTML.jpg)\n\n    Figure\
    \ 5-2\n\n    Swipe up or down on the right side of the photo to add a rating  \n\
    \nAdditionally, you can organize photos by giving them titles, captions, and copyright\
    \ information using the Info section.\n\nOnce the photos are rated, you can display\
    \ them in the Lightroom app library organized by rating. Follow these steps:\n\
    \n1.  Open the Lightroom app library.  \n2.  Tap the Lightroom Photos drop-down\
    \ list.  \n3.  Select the Segmented tab. This allows you to filter the photos\
    \ based on their ratings, flagging, likes, and comments, as shown in Figure [5-3](#A450041_1_En_5_Chapter.html#Fig3).\n\
    \n    ![A450041_1_En_5_Fig3_HTML.jpg](A450041_1_En_5_Fig3_HTML.jpg)\n\n    Figure\
    \ 5-3\n\n    Tap Lightroom Photos to access the filter options  \n4.  Set the\
    \ flag to Picked to display only the photos that are rated with five stars, as\
    \ shown in Figure [5-4](#A450041_1_En_5_Chapter.html#Fig4).\n\n    ![A450041_1_En_5_Fig4_HTML.jpg](A450041_1_En_5_Fig4_HTML.jpg)\n\
    \n    Figure 5-4\n\n    Tapping a filter option displays only the images that\
    \ meet this criterion  \n5.  Remove the rating filter to display all the photos\
    \ again."
  trans: "\n### 步骤 1：修复照片问题\n\n请按照以下步骤修复照片问题：\n\n1. 在`Photoshop Mix`中打开照片。你需要将墙壁的左侧替换为右侧的副本。\n\
    2. 点击图层以打开其属性菜单。然后，点击`复制`（见图 4-38）。\n\n   ![A450041_1_En_4_Fig38_HTML.jpg](img/A450041_1_En_4_Fig38_HTML.jpg)\n\
    \n   **图 4-38** 在`Photoshop Mix`中打开照片\n3. 选择顶层。点击`抠图`。\n4. 选择`智能`工具，然后在左侧设置中点击`减去`。在照片上拖动以移除所有内容，只保留右侧墙壁的正面（见图\
    \ 4-39）。\n\n   ![A450041_1_En_4_Fig39_HTML.jpg](img/A450041_1_En_4_Fig39_HTML.jpg)\n\
    \n   **图 4-39** 使用`智能`工具移除图层元素并保留右侧墙壁\n5. 在底部工具栏中，点击`优化`。在左侧设置中，拖动`羽化`值将其设为`15`。\n\
    6. 点击`应用`图标。\n7. 点击右侧墙壁图层以打开其属性，然后点击`水平翻转`。\n8. 拖动以将右侧墙壁放置在左侧，并根据需要修改其大小和位置（见图\
    \ 4-40）。\n\n   ![A450041_1_En_4_Fig40_HTML.jpg](img/A450041_1_En_4_Fig40_HTML.jpg)\n\
    \n   **图 4-40** 镜像并定位墙壁至左侧\n9. 点击`调整`图标，将`高光`增加至`5%`，然后点击`应用`图标。\n10. 使用`裁剪`图标裁剪修复区域周围仍然可见的照片边缘，然后点击`应用`图标（见图\
    \ 4-41）。\n\n    ![A450041_1_En_4_Fig41_HTML.jpg](img/A450041_1_En_4_Fig41_HTML.jpg)\n\
    \n    **图 4-41** 裁剪图像周围不需要的区域\n\n### 步骤 2：将照片转换为黑白\n\n请按照以下步骤将照片转换为黑白：\n\n1. 点击`共享`图标，将照片保存到`相机胶卷`。\n\
    2. 点击加号图标添加一个图层。添加你刚刚保存的照片，以获得一个合并的照片副本。\n3. 点击`调整`图标，将`饱和度`值向左拖动，将照片转换为黑白（见图\
    \ 4-42）。\n4. 点击`应用`图标。\n\n   ![A450041_1_En_4_Fig42_HTML.jpg](img/A450041_1_En_4_Fig42_HTML.jpg)\n\
    \n   **图 4-42** 降低图层饱和度以转换为黑白\n\n### 步骤 3：为国王的面具添加颜色\n\n请按照以下步骤操作：\n\n1. 选中黑白图层后，点击`抠图`图标。\n\
    2. 点击`基础`图标，然后在左侧设置中点击`橡皮擦`。\n3. 在面具上涂抹，以移除黑白版本并显示其下方的彩色版本。然后点击`应用`图标（见图 4-43）。\n\
    4. 点击`共享`图标，将最终结果保存到你的`相机胶卷`。\n\n   ![A450041_1_En_4_Fig43_HTML.jpg](img/A450041_1_En_4_Fig43_HTML.jpg)\n\
    \n   **图 4-43** 移除黑白面具以显示彩色面具\n\n## 本章小结\n\n在本章中，你探索了如何进一步进行照片编辑。所提供的技巧通过多个示例展示了如何使用应用程序来应用滤镜、添加边框以及为同一个项目处理多张照片。你可以使用提到的应用程序，用自己的照片尝试练习，并根据照片的特性调整设置。\n\
    \n## 练习\n\n首先思考一张可以用来营造神秘或戏剧效果的照片。然后，根据你的想法对照片进行准备。例如，移除背景并调整颜色。完成后，你可以在基于图层的应用程序（如`Photoshop\
    \ Mix`和`Photofox`）中构建构图。\n\n# 5. 与桌面版 Adobe Lightroom 集成\n\n为了扩展 iPhone 的摄影功能，你可以将手机上编辑过的照片与`Adobe\
    \ Lightroom`桌面版应用程序集成。使用`Adobe Lightroom`移动应用程序的优势之一在于，它允许你从手机端切换到同一应用程序的桌面版。这样你就可以在更大的屏幕上继续修改照片，从而帮助你看到照片中更多的细节。\n\
    \n在本章中，你将探索如何通过`Adobe Lightroom`移动应用程序与桌面版应用程序的集成，来扩展 iPhone 的摄影功能。你将使用`Camera\
    \ Raw`技术拍摄照片。\n\n## 为照片评分、标记并整理\n\n在开始将文件从手机集成到`Adobe Lightroom`桌面版之前，你需要整理和筛选图像，以便轻松识别出最适合在后续照片编辑步骤中使用的优质照片。\n\
    \n`Lightroom`应用程序提供了一种全面的方式来整理和排列照片。在手机上的`Lightroom`应用程序中，你可以查看照片并为其评分，以便在照片编辑项目中轻松识别它们。你可以按以下方式在`Lightroom`中查看照片并评分：\n\
    \n1. 打开`Lightroom`应用程序。\n2. 从图库或`相机胶卷`中选择一张图像。\n3. 在顶部菜单中，将模式设置为`评分与审核`。\n4. 在屏幕左侧上下滑动以显示评级星标。你可以通过上下拖动来为选定的图像评分。你也可以使用图像底部的星标进行评分，如图\
    \ 5-1 所示。\n\n   ![A450041_1_En_5_Fig1_HTML.jpg](img/A450041_1_En_5_Fig1_HTML.jpg)\n\
    \n   **图 5-1** 在照片左侧上下滑动以添加评分\n5. 在屏幕右侧上下滑动以打开标记选项。这允许你在已标记、未标记或已拒绝之间进行选择。上下拖动以在三个选项中选择。你也可以使用图像右下角的标记图标来标记图像，如图\
    \ 5-2 所示。\n\n   ![A450041_1_En_5_Fig2_HTML.jpg](img/A450041_1_En_5_Fig2_HTML.jpg)\n\
    \n   **图 5-2** 在照片右侧上下滑动以添加评分\n\n此外，你可以使用`信息`部分为照片添加标题、说明文字和版权信息，以便进行整理。\n\n照片评分完成后，你可以在`Lightroom`应用程序图库中按评分排序显示它们。请按照以下步骤操作：\n\
    \n1. 打开`Lightroom`应用程序图库。\n2. 点击`Lightroom 照片`下拉列表。\n3. 选择`分段`标签。这允许你根据评分、标记、点赞和评论来筛选照片，如图\
    \ 5-3 所示。\n\n   ![A450041_1_En_5_Fig3_HTML.jpg](img/A450041_1_En_5_Fig3_HTML.jpg)\n\
    \n   **图 5-3** 点击`Lightroom 照片`以访问筛选选项\n4. 将标记设置为`已选`，仅显示被评为五星的照片，如图 5-4 所示。\n\
    \n   ![A450041_1_En_5_Fig4_HTML.jpg](img/A450041_1_En_5_Fig4_HTML.jpg)\n\n   **图\
    \ 5-4** 点击筛选选项仅显示符合该条件的图像\n5. 移除评分筛选器以再次显示所有照片。\n"
- fmt: "### Work with Collections\n\nAdobe Lightroom also allows you to organize the\
    \ photos into collections. For instance, you can group all the related photos\
    \ in one easily accessed collection. When you open the Lightroom app, you can\
    \ view either all the collections or the specific collection. If you can’t see\
    \ all the collections, simply tap the `Back` arrow at the top of the screen to\
    \ get back to the `Collections` view.\n\nYou can create a new collection by tapping\
    \ the plus icon at the top right of the screen. Enter the name of the collection\
    \ and tap `OK`, as shown in Figure [5-5](#A450041_1_En_5_Chapter.html#Fig5).\n\
    \n![A450041_1_En_5_Fig5_HTML.jpg](A450041_1_En_5_Fig5_HTML.jpg)\nFigure 5-5  \n\
    Creating a new collection in the Lightroom app\n\nAlso, you can add photos to\
    \ a collection or apply different options to collections as follows:\n\n1. Tap\
    \ the icon on the right of the collection to select it.  \n2. Tap `Add Photos`,\
    \ as shown in Figure [5-6](#A450041_1_En_5_Chapter.html#Fig6).\n\n   ![A450041_1_En_5_Fig6_HTML.jpg](A450041_1_En_5_Fig6_HTML.jpg)\
    \  \n   Figure 5-6  \n   Tap `Add Photos` to add photos to the selected collection\
    \  \n3. Select the photos you want to add to the collection. From the top-right\
    \ menu, you can filter a photo based on its type: `Photos`, `Videos`, or `Raw`.\
    \  \n4. Tap `Add Photos` to add those photos to the collection, as shown in Figure\
    \ [5-7](#A450041_1_En_5_Chapter.html#Fig7).\n\n   ![A450041_1_En_5_Fig7_HTML.jpg](A450041_1_En_5_Fig7_HTML.jpg)\
    \  \n   Figure 5-7  \n   Select multiple images to add them to the collection\n\
    \n## Take Raw Photos in Lightroom\n\nThe common photo formats that you probably\
    \ use every day such as `JPG`, `PNG`, and `GIF` are called processed formats,\
    \ which means the camera processor combines the information related to the photo,\
    \ such as the colors, exposure, and white balance, with the photo’s grayscale\
    \ data to produce the final image. While there are a variety of applications and\
    \ tools that can help you edit processed photos, the capabilities are limited\
    \ because of the processing that takes place on the images.\n\nUnlike those formats,\
    \ the `Camera Raw` technology maintains the picture unprocessed, which means when\
    \ you take the photo using your camera or iPhone, the grayscale information of\
    \ the image is saved separated from the image information. This information is\
    \ known as the metadata `XML` file. This technology helps you extend your editing\
    \ capabilities because you can simply change the metadata of the image instead\
    \ of the image itself. This means you can modify an image multiple times.\n\n\
    The `Camera Raw` technology is available in many cameras, and each brand has its\
    \ own `Camera Raw` format. However, `DNG` is a universal format that works on\
    \ multiple devices and with `Camera Raw` plug-ins. iPhone supports the `Camera\
    \ Raw` format via the `Lightroom` app.\n\nNote that `Camera Raw` images have a\
    \ very large size; they can fill up your phone’s storage space. So, try to use\
    \ this feature carefully and with a selected number of images. You can activate\
    \ this option only when needed. In the `Lightroom` app, you can take photos in\
    \ `DNG Camera Raw` format as follows:\n\n1. Open the `Lightroom` app.  \n2. Log\
    \ in with your `Adobe ID`.  \n3. Tap the camera icon at the bottom right of the\
    \ screen, as shown in Figure [5-8](#A450041_1_En_5_Chapter.html#Fig8).\n\n   ![A450041_1_En_5_Fig8_HTML.jpg](A450041_1_En_5_Fig8_HTML.jpg)\
    \  \n   Figure 5-8  \n   Tap the camera icon to access the `Camera` app  \n4.\
    \ Tap `File Format` at the top center of the screen.  \n5. Drag the slider to\
    \ choose between the `JPG` and `DNG` formats, as shown in Figure [5-9](#A450041_1_En_5_Chapter.html#Fig9).\n\
    \n   ![A450041_1_En_5_Fig9_HTML.jpg](A450041_1_En_5_Fig9_HTML.jpg)  \n   Figure\
    \ 5-9  \n   Drag the slider to switch between `JPG` and `DNG` (`Camera Raw`)\n\
    \nAfter setting up the photo format, `Lightroom` gives you three modes to take\
    \ the photo, which are `Automatic`, `Professional`, and `High Dynamic Range`,\
    \ as shown in Figure [5-10](#A450041_1_En_5_Chapter.html#Fig10). The `Automatic`\
    \ mode allows you to take quick `Camera Raw` photos without worrying about the\
    \ different camera settings. `Professional` mode lets you control the image properties\
    \ including the shutter speed, `ISO`, and aperture. When choosing the third method,\
    \ `High Dynamic Range` (`HDR`), you can tap and hold to have the phone take photos\
    \ with multiple exposure values. Then, the phone processes all the photos to create\
    \ an `HDR` photo effect automatically.\n\n![A450041_1_En_5_Fig10_HTML.jpg](A450041_1_En_5_Fig10_HTML.jpg)\
    \  \nFigure 5-10  \nThe `Professional` photography mode in the `Lightroom` app\n\
    \nIn the following steps, you will explore how to take a `Camera Raw` photo using\
    \ the `Professional` mode:\n\n1. From the options on the left of the shutter button,\
    \ set the mode to `Professional`.  \n2. Use the `Exposure` value to change how\
    \ the photo exposes to light. A higher exposure value means more light in the\
    \ photo, while a lower value means a low-light photo.  \n3. The shutter speed\
    \ (`Sec`) lets you determine the speed of opening and closing the camera shutter.\
    \ A high shutter speed means less light and a more stable shot; it is suitable\
    \ for moving shots such as kids playing. A low shutter speed means more light\
    \ and less stability; it is suitable for taking still photos or nature photos.\
    \ However, it is advised that you use a tripod to ensure a steady shot. If you\
    \ are not sure about the best shutter speed for you, you can just set it to `Auto`\
    \ by dragging the slider to the far left.  \n4. The `ISO` value determines the\
    \ sensitivity for the light. High `ISO` means high sensitivity to light; however,\
    \ it can cause “noise” in the image. Therefore, it is advised not to use a very\
    \ high `ISO` value.  \n5. The white balance (`WB`) lets you choose between different\
    \ white balances such as `Tungsten`, `Fluorescent`, `Daylight`, and `Cloudy`.\
    \  \n6. The `Focus` value lets you determine the field of focus in the photo.\
    \ A low value represents a shallow depth of field. It displays the near objects\
    \ in focus while the far objects look blurry. A high value creates a clear scene\
    \ without any blurry effects.\n\n## Integrate Files with Lightroom on the Desktop\n\
    \nOne of the major advantages of using the `Lightroom` app on your iPhone to take\
    \ and edit photos is the ability to integrate your photos with the desktop version\
    \ of the application. Through this integration, you can take photos using your\
    \ phone, edit them, and then transfer them to the desktop app for more advanced\
    \ modifications and editing features. There are two main ways to integrate photos\
    \ between the `Lightroom` app on the iPhone and the desktop version: by using\
    \ cloud storage and by importing the photos from the mobile app."
  raw: "### Work with Collections\n\nAdobe Lightroom also allows you to organize the\
    \ photos into collections. For instance, you can group all the related photos\
    \ in one easily accessed collection. When you open the Lightroom app, can view\
    \ either all the collections or the specific collection. If you can’t see all\
    \ the collections, simply tap the Back arrow at the top of the screen to get back\
    \ to the Collections view.\n\nYou can create a new collection by tapping the plus\
    \ icon at the top right of the screen. Enter the name of the collection and tap\
    \ OK, as shown in Figure [5-5](#A450041_1_En_5_Chapter.html#Fig5).\n\n![A450041_1_En_5_Fig5_HTML.jpg](A450041_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nCreating a new collection in the Lightroom app\n\nAlso, you can\
    \ add photos to a collection or apply different options to collections as follows:\n\
    \n1.  Tap the icon on the right of the collection to select it.  \n2.  Tap Add\
    \ Photos, as shown in Figure [5-6](#A450041_1_En_5_Chapter.html#Fig6).\n\n   \
    \ ![A450041_1_En_5_Fig6_HTML.jpg](A450041_1_En_5_Fig6_HTML.jpg)\n\n    Figure\
    \ 5-6\n\n    Tap Add Photos to add photos to the selected collection  \n3.  Select\
    \ the photos you want to add to the collection. From the top-right menu, you can\
    \ filter a photo based on its type: Photos, Videos, or Raw.  \n4.  Tap Add Photos\
    \ to add those photos to the collection, as shown in Figure [5-7](#A450041_1_En_5_Chapter.html#Fig7).\n\
    \n    ![A450041_1_En_5_Fig7_HTML.jpg](A450041_1_En_5_Fig7_HTML.jpg)\n\n    Figure\
    \ 5-7\n\n    Select multiple images to add them to the collection\n\n## Take Raw\
    \ Photos in Lightroom\n\nThe common photo formats that you probably use every\
    \ day such as JPG, PNG, and GIF are called processed formats , which means the\
    \ camera processor combines the information related to the photo, such as the\
    \ colors, exposure, and white balance, with the photo’s grayscale data to produce\
    \ the final image. While there are a variety of applications and tools that can\
    \ help you edit processed photos, the capabilities are limited because of the\
    \ processing that takes place on the images.\n\nUnlike those formats, the Camera\
    \ Raw technology maintains the picture unprocessed, which means when you take\
    \ the photo using your camera or iPhone, the grayscale information of the image\
    \ is saved separated from the image information. This information is known as\
    \ the metadata XML file . This technology helps you extend your editing capabilities\
    \ because you can simply change the metadata of the image instead of the image\
    \ itself. This means you can modify an image multiple times.\n\nThe Camera Raw\
    \ technology is available in many cameras, and each brand has its own Camera Raw\
    \ format. However, DNG is a universal format that works on multiple devices and\
    \ with Camera Raw plug-ins. iPhone supports the Camera Raw format via the Lightroom\
    \ app.\n\nNote that Camera Raw images have a very large size; they can fill up\
    \ your phone’s storage space. So, try to use this feature carefully and with a\
    \ selected number of images. You can activate this option only when needed. In\
    \ the Lightroom app, you can take photos in DNG Camera Raw format as follows:\n\
    \n1.  Open the Lightroom app.  \n2.  Log in with your Adobe ID.  \n3.  Tap the\
    \ camera icon at the bottom right of the screen, as shown in Figure [5-8](#A450041_1_En_5_Chapter.html#Fig8).\n\
    \n![A450041_1_En_5_Fig8_HTML.jpg](A450041_1_En_5_Fig8_HTML.jpg)\n\nFigure 5-8\n\
    \nTap the camera icon to access the Camera app  \n4.  Tap File Format at the top\
    \ center of the screen.  \n5.  Drag the slider to choose between the JPG and DNG\
    \ formats, as shown in Figure [5-9](#A450041_1_En_5_Chapter.html#Fig9).\n\n![A450041_1_En_5_Fig9_HTML.jpg](A450041_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nDrag the slider to switch between JPG and DNG (Camera Raw)\n\n\
    After setting up the photo format, Lightroom gives you three modes to take the\
    \ photo, which are Automatic, Professional, and High Dynamic Range, as shown in\
    \ Figure [5-10](#A450041_1_En_5_Chapter.html#Fig10). The Automatic mode allows\
    \ you to take quick Camera Raw photos without worrying about the different camera\
    \ settings. Professional mode lets you control the image properties including\
    \ the shutter speed, ISO, and aperture. When choosing the third method, High Dynamic\
    \ Range (HDR) , you can tap and hold to have the phone take photos with multiple\
    \ exposure values. Then, the phone processes all the photos to create an HDR photo\
    \ effect automatically.\n\n![A450041_1_En_5_Fig10_HTML.jpg](A450041_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10\n\nThe Professional photography mode in the Lightroom app\n\nIn\
    \ the following steps, you will explore how to take a Camera Raw photo using the\
    \ Professional mode:\n\n1.  From the options on the left of the shutter button,\
    \ set the mode to Professional.  \n2.  Use the Exposure value to change how the\
    \ photo exposes to light. A higher exposure value means more light in the photo,\
    \ while a lower value means a low-light photo.  \n3.  The shutter speed (Sec)\
    \ lets you determine the speed of opening and closing the camera shutter. A high\
    \ shutter speed means less light and a more stable shot; it is suitable for moving\
    \ shots such as kids playing. A low shutter speed means more light and less stability;\
    \ it is suitable for taking still photos or nature photos. However, it is advised\
    \ that you to use a tripod to ensure a steady shot. If you are not sure about\
    \ the best shutter speed for you, you can just set it to Auto by dragging the\
    \ slider to the far left.  \n4.  The ISO value determines the sensitivity for\
    \ the light. High ISO means high sensitivity to light; however, it can cause “noise”\
    \ in the image. Therefore, it is advised not to use a very high ISO value.  \n\
    5.  The white balance (WB) lets you choose between different white balances such\
    \ as Tungsten, Fluorescent, Daylight, and Cloudy.  \n6.  The Focus value lets\
    \ you determine the field of focus in the photo. A low value represents a shallow\
    \ depth of field. It displays the near objects in focus while the far objects\
    \ look blurry. A high value creates a clear scene without my blurry effects.\n\
    \n## Integrate Files with Lightroom on the Desktop\n\nOne of the major advantages\
    \ of using the Lightroom app on your iPhone to take and edit photos is the ability\
    \ to integrate your photos with the desktop version of the application. Through\
    \ this integration, you can take photos using your phone, edit them, and then\
    \ transfer them to the desktop app for more advanced modifications and editing\
    \ features. There are two main ways to integrate photos between the Lightroom\
    \ app on the iPhone and the desktop version: by using cloud storage and by importing\
    \ the photos from the mobile app."
  trans: "\n### 管理集合\n\nAdobe Lightroom 还允许你将照片整理到集合中。例如，你可以将所有相关的照片分组到一个易于访问的集合中。当你打开\
    \ Lightroom 应用时，可以查看所有集合或特定集合。如果你看不到所有集合，只需点击屏幕顶部的`返回`箭头即可回到`集合`视图。\n\n你可以通过点击屏幕右上角的加号图标来创建新集合。输入集合名称并点击`确定`，如图\
    \ 5-5 所示。\n\n![A450041_1_En_5_Fig5_HTML.jpg](img/A450041_1_En_5_Fig5_HTML.jpg)\n\
    图 5-5  \n在 Lightroom 应用中创建新集合\n\n此外，你可以按照以下步骤向集合中添加照片或对集合应用不同选项：\n\n1. 点击集合右侧的图标以选中它。\
    \  \n2. 点击`添加照片`，如图 5-6 所示。\n\n   ![A450041_1_En_5_Fig6_HTML.jpg](img/A450041_1_En_5_Fig6_HTML.jpg)\
    \  \n   图 5-6  \n   点击`添加照片`将照片添加到选定的集合  \n3. 选择要添加到集合的照片。从右上角的菜单中，您可以按类型筛选照片：`照片`、`视频`或`原始`。\
    \  \n4. 点击`添加照片`将这些照片添加到集合中，如图 5-7 所示。\n\n   ![A450041_1_En_5_Fig7_HTML.jpg](img/A450041_1_En_5_Fig7_HTML.jpg)\
    \  \n   图 5-7  \n   选择多张图像将其添加到集合\n\n## 在 Lightroom 中拍摄原始照片\n\n你日常可能经常使用的常见照片格式，例如`JPG`、`PNG`和`GIF`，被称为已处理格式，这意味着相机处理器会将与照片相关的信息（如颜色、曝光和白平衡）与照片的灰度数据结合起来生成最终图像。虽然有多种应用程序和工具可以帮助你编辑已处理的照片，但由于图像上已经发生的处理过程，其编辑能力是有限的。\n\
    \n与这些格式不同，`Camera Raw` 技术保持照片未经处理的状态，这意味着当你使用相机或 iPhone 拍摄照片时，图像的灰度信息与图像信息分开保存。这些信息被称为元数据`XML`文件。这项技术扩展了你的编辑能力，因为你只需更改图像的元数据，而无需更改图像本身。这意味着你可以多次修改一张图像。\n\
    \n`Camera Raw` 技术在许多相机中都可使用，每个品牌都有自己的`Camera Raw`格式。然而，`DNG`是一种通用格式，可在多种设备上使用，并与`Camera\
    \ Raw`插件兼容。iPhone 通过`Lightroom`应用支持`Camera Raw`格式。\n\n请注意，`Camera Raw`图像的体积非常大；它们可能会占满你手机的存储空间。因此，请谨慎使用此功能，并只对选定的少数图像使用。你可以在需要时才激活此选项。在`Lightroom`应用中，你可以按照以下步骤以`DNG\
    \ Camera Raw`格式拍摄照片：\n\n1. 打开`Lightroom`应用。  \n2. 使用你的`Adobe ID`登录。  \n3. 点击屏幕右下角的相机图标，如图\
    \ 5-8 所示。\n\n   ![A450041_1_En_5_Fig8_HTML.jpg](img/A450041_1_En_5_Fig8_HTML.jpg)\
    \  \n   图 5-8  \n   点击相机图标进入`相机`应用  \n4. 点击屏幕顶部中央的`文件格式`。  \n5. 拖动滑块在`JPG`和`DNG`格式之间选择，如图\
    \ 5-9 所示。\n\n   ![A450041_1_En_5_Fig9_HTML.jpg](img/A450041_1_En_5_Fig9_HTML.jpg)\
    \  \n   图 5-9  \n   拖动滑块在`JPG`和`DNG`（`Camera Raw`）之间切换\n\n设置好照片格式后，`Lightroom`会提供三种拍照模式，分别是`自动`、`专业`和`高动态范围`，如图\
    \ 5-10 所示。`自动`模式允许你快速拍摄`Camera Raw`照片，无需担心不同的相机设置。`专业`模式让你可以控制图像属性，包括快门速度、`ISO`和光圈。选择第三种方法`高动态范围`（`HDR`）时，你可以按住不放，让手机拍摄多张不同曝光值的照片。然后，手机会自动处理所有照片以创建`HDR`照片效果。\n\
    \n![A450041_1_En_5_Fig10_HTML.jpg](img/A450041_1_En_5_Fig10_HTML.jpg)  \n图 5-10\
    \  \n`Lightroom`应用中的`专业`摄影模式\n\n在以下步骤中，你将探索如何使用`专业`模式拍摄`Camera Raw`照片：\n\n1. 从快门按钮左侧的选项中，将模式设置为`专业`。\
    \  \n2. 使用`曝光`值来改变照片对光的曝光程度。更高的曝光值意味着照片中光线更多，而更低的值则意味着照片光线较暗。  \n3. 快门速度（`Sec`）让你决定相机快门打开和关闭的速度。高速快门意味着光线更少，画面更稳定；适合拍摄动态场景，比如玩耍的孩子。低速快门意味着光线更多，稳定性较差；适合拍摄静态照片或自然风光。不过，建议你使用三脚架以确保画面稳定。如果你不确定最适合自己的快门速度，只需将滑块拖到最左侧，将其设置为`自动`。\
    \  \n4. `ISO`值决定了感光度。高`ISO`意味着对光高度敏感；但是，它可能会导致图像中出现“噪点”。因此，建议不要使用非常高的`ISO`值。 \
    \ \n5. 白平衡（`WB`）让你可以在不同的白平衡模式之间进行选择，例如`钨丝灯`、`荧光灯`、`日光`和`阴天`。  \n6. `对焦`值让你决定照片中的焦点区域。较低的值代表浅景深，它会使得近处的物体清晰而对焦，而远处的物体看起来模糊。较高的值会创建清晰的场景，没有任何模糊效果。\n\
    \n## 与桌面版 Lightroom 集成文件\n\n在 iPhone 上使用`Lightroom`应用拍摄和编辑照片的主要优势之一，是能够将你的照片与该应用的桌面版本进行集成。通过这种集成，你可以用手机拍摄照片、进行编辑，然后将其传输到桌面应用，以进行更高级的修改和利用更丰富的编辑功能。在\
    \ iPhone 上的`Lightroom`应用与桌面版之间集成照片主要有两种方法：使用云存储，以及从移动应用导入照片。\n"
- fmt: "### Integrate Photos Through the Cloud\n\nThis method allows you to sync between\
    \ the `Lightroom` app on your phone and the desktop application through an Adobe\
    \ Creative Cloud membership. If you are doing photography projects and photo editing,\
    \ you can sign up for the photography Creative Cloud membership, which allows\
    \ you to use the photo-editing desktop applications such as `Lightroom` and `Photoshop`\
    \ in addition to the mobile apps.\n\nOnce your phone’s photos are synced, they\
    \ will be available from Adobe `Lightroom` on the desktop, including all the modifications\
    \ applied to the images.\n\n1. Open the `Lightroom` app on your phone, and log\
    \ in with your Adobe ID.\n2. From the `Lightroom` library, tap the cloud icon\
    \ at the top left. This will sync all the photos through the cloud.\n3. Tap one\
    \ of the photos and edit it using the different `Lightroom` features. After modifying\
    \ the photo, tap the cloud icon at the top left to sync the change with the cloud,\
    \ as shown in Figure [5-11](#A450041_1_En_5_Chapter.html#Fig11).\n\n   ![A450041_1_En_5_Fig11_HTML.jpg](A450041_1_En_5_Fig11_HTML.jpg)\n\
    \n   **Figure 5-11** Tap the cloud icon to sync the image modifications\n\n4.\
    \ Now, go to the `Lightroom` application on your computer.\n5. On the left side,\
    \ click the `iPhone`. Click `Imported Photos` to display the synced photos.\n\
    6. Select the photo you edited on your phone, as shown in Figure [5-12](#A450041_1_En_5_Chapter.html#Fig12).\n\
    \n   ![A450041_1_En_5_Fig12_HTML.jpg](A450041_1_En_5_Fig12_HTML.jpg)\n\n   **Figure\
    \ 5-12** You can display the synced photos in Adobe `Lightroom` on a computer\n\
    \n7. Click the `Develop` tab at the top right of the screen to enter editing mode.\n\
    8. In the right-side panel, select the `Radial Filter` icon, as shown in Figure\
    \ [5-13](#A450041_1_En_5_Chapter.html#Fig13).\n\n   ![A450041_1_En_5_Fig13_HTML.jpg](A450041_1_En_5_Fig13_HTML.jpg)\n\
    \n   **Figure 5-13** Select the `Radial Filter` icon in `Lightroom` on your computer\n\
    \n9. Drag to create a radial filter over the image.\n10. Set `Saturation` to `-100`\
    \ to remove the color from the edges of the photo, as shown in Figure [5-14](#A450041_1_En_5_Chapter.html#Fig14).\n\
    \n    ![A450041_1_En_5_Fig14_HTML.jpg](A450041_1_En_5_Fig14_HTML.jpg)\n\n    **Figure\
    \ 5-14** Apply a radial filter while reducing the image’s edge saturation\n\n\
    > **Note**  \n> To use the sync feature, you need to have Adobe `Lightroom CC`\
    \ or a later version installed on your computer.\n\n### Import Photos from Your\
    \ iPhone\n\nSometimes you have photos that are saved in your phone’s photo albums\
    \ rather than the `Lightroom` app itself. These photos may be taken or modified\
    \ using other mobile apps. In this case, you can import the photos directly to\
    \ the `Lightroom` application on your computer by linking the photo and the computer\
    \ using a USB cable. This method is also helpful if you’re not subscribed to any\
    \ of the Adobe Creative Cloud memberships because this feature can work with the\
    \ free Adobe ID without the need to pay for any membership packages.\n\n1. From\
    \ the Adobe `Lightroom` application on a computer, choose `File` ➤ `Import Photos\
    \ and Videos`.\n2. Set the `From` source to `iPhone`, as shown in Figure [5-15](#A450041_1_En_5_Chapter.html#Fig15).\n\
    \n   ![A450041_1_En_5_Fig15_HTML.jpg](A450041_1_En_5_Fig15_HTML.jpg)\n\n   **Figure\
    \ 5-15** Importing images from the iPhone photo library\n\n3. Click `All Photos`\
    \ to deselect it.\n4. Select the photos you want to import.\n\nThe photos will\
    \ be imported and displayed in the library. They are also saved in the default\
    \ location on your computer. You can change the location where the imported photos\
    \ are saved on the computer from the `Preferences` dialog box (`Lightroom` ➤ `Preferences`\
    \ on macOS or `Edit` ➤ `Preferences` on Windows), as shown in Figure [5-16](#A450041_1_En_5_Chapter.html#Fig16).\n\
    \n![A450041_1_En_5_Fig16_HTML.jpg](A450041_1_En_5_Fig16_HTML.jpg)\n\n**Figure\
    \ 5-16** Changing the import folder in the `Preferences` dialog box\n\n## Use\
    \ Other Raw Photo Apps\n\nAdobe `Lightroom` is not the only mobile app that allows\
    \ you to take Camera Raw photos. The `RAW` app by 500px is a free application\
    \ that you can download and use to take Raw photos; you can also modify these\
    \ photos and upload them to your profile on [`www.500px.com`](http://www.500px.com),\
    \ a social network for photographers to showcase their photography work. You can\
    \ save the photos in your iPhone’s Camera Roll for further modifications. To take\
    \ Raw photos using the `RAW` app, you can follow these steps:\n\n1. Install the\
    \ `RAW` app from the App Store.\n2. Log in using your 500px free account.\n3.\
    \ Drag the left slider next to the shutter button to the right side to activate\
    \ advanced mode. In this mode, you can use the left slider to control the depth\
    \ of field in the photo. The right slider allows you to modify the exposure of\
    \ the photo, as shown in Figure [5-17](#A450041_1_En_5_Chapter.html#Fig17).\n\n\
    \   ![A450041_1_En_5_Fig17_HTML.jpg](A450041_1_En_5_Fig17_HTML.jpg)\n\n   **Figure\
    \ 5-17** Taking photos using the `RAW` app\n\n4. Once a photo is taken, drag from\
    \ the right to the left to enter the photo library, as shown in Figure [5-18](#A450041_1_En_5_Chapter.html#Fig18).\n\
    \n   ![A450041_1_En_5_Fig18_HTML.jpg](A450041_1_En_5_Fig18_HTML.jpg)\n\n   **Figure\
    \ 5-18** Selecting photos from the `RAW` app library\n\n5. Select the photo to\
    \ modify it and use the bottom icons to crop, adjust, or apply presets, as shown\
    \ in Figure [5-19](#A450041_1_En_5_Chapter.html#Fig19).\n\n   ![A450041_1_En_5_Fig19_HTML.jpg](A450041_1_En_5_Fig19_HTML.jpg)\n\
    \n   **Figure 5-19** Editing Raw photos in the `RAW` app\n\n6. Once you are done\
    \ with the modifications, tap the right icon at the top right to apply the changes.\n\
    \n## Summary\n\nYou can extend your iPhone photography skills by taking Camera\
    \ Raw photos, which are unprocessed images that maximize your ability to modify\
    \ the photos after taking them. This can help you to create professional photos\
    \ even if the circumstances you took the photos in were not helpful (such as bad\
    \ light conditions). You can also extend your photography skills by integrating\
    \ your mobile apps with their desktop photography versions to be able to reach\
    \ more advanced features.\n\nAdobe `Lightroom` is one of the top photography and\
    \ photo-editing applications for photographers. It can help you take photos using\
    \ your iPhone and then integrate them with its desktop version so you can apply\
    \ more accurate and intensive photo-editing techniques. This can help you to produce\
    \ professional photo results.\n\nIn addition to the `Lightroom` app, there are\
    \ other applications that can help you to take Camera Raw images such as the `RAW`\
    \ app provided by 500px. It allows you to take Raw photos, modify them, and save\
    \ them on the iPhone in the Camera Raw format. You can also share the photos through\
    \ your profile on the 500px web site.\n\n## Practice Exercise\n\nFor this exercise,\
    \ take some photos using the Camera Raw technology via the `Lightroom` app or\
    \ any Raw-supporting app. Then use this app to modify your photos, share them\
    \ to the Facebook group, and discuss the results with your peers.\n\n# 6. Integrating\
    \ Your Photos with Adobe Photoshop on the Desktop\n\nAs you learned in the previous\
    \ chapter, integrating your photo-editing tasks between your iPhone and your computer\
    \ helps you create even better photos. You can use the computer’s full-featured\
    \ photo-editing applications such as `Photoshop` and `Lightroom` to enhance and\
    \ manipulate your photos. When you send the photo from your Adobe mobile app to\
    \ the desktop application, you can preserve the layers, effects, and adjustments."
