  trans: "\n### 第一步：修改照片颜色\n\n在 Lightroom 应用中，你将提高照片的鲜艳度并增强其清晰度，以使所有拍摄照片的颜色水平保持一致。\n\
    \n1.  在 Adobe Lightroom 应用中，点击 `Camera Roll` 图标，然后选择你想要使用的照片（见图 4-5）。\n\n    ![A450041_1_En_4_Fig5_HTML.jpg](img/A450041_1_En_4_Fig5_HTML.jpg)\n\
    \n    图 4-5：在 Adobe Lightroom 应用中打开一张照片\n\n2.  点击 `Color` 图标，并将 `Vibrance` 滑块向右拖动，以增加色彩的鲜艳度（见图\
    \ 4-6）。\n\n    ![A450041_1_En_4_Fig6_HTML.jpg](img/A450041_1_En_4_Fig6_HTML.jpg)\n\
    \n    图 4-6：增加照片的 `Vibrance` 值\n\n3.  点击 `Effects` 图标，并将 `Clarity` 滑块稍微向右拖动，以增加照片的清晰度（见图\
    \ 4-7）。\n\n    ![A450041_1_En_4_Fig7_HTML.jpg](img/A450041_1_En_4_Fig7_HTML.jpg)\n\
    \n    图 4-7：增加 `Clarity` 值\n\n4.  照片颜色修改完成后，点击 `Share` 图标，然后选择 `Save to Camera\
    \ Roll`。对于 `Image Size`，选择 `Maximum Available`。\n\n### 第二步：构建照片拼贴\n\n按照以下步骤构建照片拼贴：\n\
    \n1.  打开 Moldiv 应用，选择 `Collage`，然后挑选一种照片拼贴布局。在本示例中，选择第二行第三个布局（见图 4-8）。\n\n   \
    \ ![A450041_1_En_4_Fig8_HTML.jpg](img/A450041_1_En_4_Fig8_HTML.jpg)\n\n    图 4-8：选择一种拼贴样式\n\
    \n2.  点击其中一个网格，然后选择 `Albums`。浏览到第一张照片并将其添加进来（见图 4-9）。\n\n    ![A450041_1_En_4_Fig9_HTML.jpg](img/A450041_1_En_4_Fig9_HTML.jpg)\n\
    \n    图 4-9：从手机相册将照片添加到拼贴部分\n\n3.  重复这些步骤，将另外两张照片添加到网格的其他区域中（见图 4-10）。\n\n   \
    \ ![A450041_1_En_4_Fig10_HTML.jpg](img/A450041_1_En_4_Fig10_HTML.jpg)\n\n    图\
    \ 4-10：选择要添加到拼贴网格的照片\n\n4.  用两根手指拖拽来调整每张图像的大小和焦点。尽量将焦点放在照片的主要主体上，使网格看起来更有趣（见图\
    \ 4-11）。\n\n    ![A450041_1_En_4_Fig11_HTML.jpg](img/A450041_1_En_4_Fig11_HTML.jpg)\n\
    \n    图 4-11：添加了三张照片后的拼贴\n\n### 第三步：保存照片拼贴\n\n按照以下步骤保存你的照片拼贴：\n\n1.  点击工具栏右下角的\
    \ `Share` 图标。\n2.  将尺寸设置为 `Maximum`。拼贴图将以其全尺寸保存到你的相机胶卷中（见图 4-12）。\n\n    ![A450041_1_En_4_Fig12_HTML.jpg](img/A450041_1_En_4_Fig12_HTML.jpg)\n\
    \n    图 4-12：以最大尺寸保存拼贴\n\n3.  点击 `Share` 图标，然后点击 `Edit` 继续下一步。\n\n### 第四步：添加纹理效果\n\
    \n按照以下步骤添加纹理效果：\n\n1.  在共享菜单中点击 `Edit` 图标。如果你关闭了它，可以从应用首页点击 `Edit` 图标，然后找到照片拼贴（见图\
    \ 4-13）。\n\n    ![A450041_1_En_4_Fig13_HTML.jpg](img/A450041_1_En_4_Fig13_HTML.jpg)\n\
    \n    图 4-13：在共享菜单中点击 `Edit` 图标\n\n2.  点击 `Filters` 图标打开应用滤镜。点击 `Basic` 滤镜，然后选择\
    \ `Joker`（见图 4-14）。\n\n    ![A450041_1_En_4_Fig14_HTML.jpg](img/A450041_1_En_4_Fig14_HTML.jpg)\n\
    \n    图 4-14：选择 `Joker` 滤镜应用于拼贴\n\n3.  点击右下角的 `Apply` 图标。\n\n## 为你的照片添加复古风格\n\n\
    **使用的工具：** Snapseed、PicsArt 和 Photofox\n\n在本章中，你将了解以下内容：\n\n-   如何创建复古效果，然后对其进行优化\n\
    -   如何添加诸如镜头光晕等滤镜\n\n图 4-15 显示了我使用的原始照片。\n\n![A450041_1_En_4_Fig15_HTML.jpg](img/A450041_1_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15：原始照片（© Rafiq Elmansy）\n\n图 4-16 显示的是最终结果。\n\n![A450041_1_En_4_Fig16_HTML.jpg](img/A450041_1_En_4_Fig16_HTML.jpg)\n\
    \n图 4-16：最终结果\n\n复古照片是唤起怀旧感的好方法。虽然你无法直接在数码单反相机上创建复古效果，但可以在台式电脑上使用 Adobe Photoshop\
    \ 等照片编辑应用程序来创建。在 iPhone 上，你可以使用各种应用程序创建复古效果。例如，Instagram 允许你在拍照后、与粉丝分享之前应用复古滤镜。\n\
    \n在本技巧中，你将探索如何利用各种应用程序将照片转换为复古风格。我使用了女儿的照片，这张照片是在我们上次去吉萨金字塔旅行时拍摄的。\n\n### 第一步：应用复古效果\n\
    \n按照以下步骤应用复古效果：\n\n1.  在 Photofox 应用中打开照片。点击底部工具栏中的 `Image` 图标。\n2.  点击底部工具栏中的\
    \ `Tone` 图标，然后在 `Filters` 列表中选择 `E58` 滤镜，以创建温暖的复古效果（见图 4-17）。\n\n    ![A450041_1_En_4_Fig17_HTML.jpg](img/A450041_1_En_4_Fig17_HTML.jpg)\n\
    \n    图 4-17：应用 Photofox 的 `E58` 滤镜\n\n3.  点击 `Share` 图标，然后将照片保存到你的相机胶卷。\n\n###\
    \ 第二步：添加镜头光晕\n\n按照以下步骤添加一些镜头光晕：\n\n1.  在 PicsArt 应用中打开照片。然后点击加号图标添加图像，并选择 `Edit`。\n\
    2.  将工具栏向左拖动，然后选择 `Lens Flare`（见图 4-18）。\n\n    ![A450041_1_En_4_Fig18_HTML.jpg](img/A450041_1_En_4_Fig18_HTML.jpg)\n\
    \n    图 4-18：添加 `Lens Flare` 效果\n\n3.  从列表中选择一个合适的镜头光晕效果。\n4.  将 `Hue` 设置为 `0`，`Opacity`\
    \ 设置为 `48`，`Blend` 设置为 `Add`（见图 4-19）。\n\n    ![A450041_1_En_4_Fig19_HTML.jpg](img/A450041_1_En_4_Fig19_HTML.jpg)\n\
    \n    图 4-19：调整镜头光晕的位置和强度\n\n5.  点击右上角的 `Next` 图标，然后将照片保存到你的相机胶卷。\n\n### 第三步：优化复古效果\n\
    \n按照以下步骤优化复古效果：\n\n1.  在 Snapseed 应用中打开照片，然后从工具中选择 `Vintage` 滤镜。\n2.  选择照片底部的滤镜编号\
    \ 6，以添加蓝色渐变（见图 4-20）。\n\n    ![A450041_1_En_4_Fig20_HTML.jpg](img/A450041_1_En_4_Fig20_HTML.jpg)\n\
    \n    图 4-20：在 Snapseed 中添加复古滤镜\n\n3.  点击 `Apply` 图标。\n4.  从 `Tools` 中选择 `Grunge`\
    \ 滤镜。选择第五个磨损效果。\n5.  点击 `Adjustment` 图标，然后选择 `Texture Strength`。将该值设置为 `15`（见图\
    \ 4-21）。\n\n    ![A450041_1_En_4_Fig21_HTML.jpg](img/A450041_1_En_4_Fig21_HTML.jpg)\n\
    \n    图 4-21：添加磨损效果并进行调整\n\n6.  点击 `Apply` 图标。\n7.  点击 `Share` 图标并选择 `Save a Copy`，以在不替换原始照片的情况下保存照片。\n"
- fmt: "# Creating Photo Frames\n\nTools used: `Tadaa`, `Laminar Pro`, and `Photoshop\
    \ Mix`\n\nIn this section, you’ll learn the following:\n\n- How to convert the\
    \ photo to a vintage style\n- How to apply different types of frames to the photo\n\
    - How to manipulate two photos or more together\n\nThere are many applications\
    \ that let you create photo frames for your shot. In this tip, I am using a photo\
    \ that I took on my trip to Lebanon a few years ago. I want to give it a custom\
    \ frame using a photo that my wife took of a tree trunk. But first, I will add\
    \ a vintage color effect before applying the frame.\n\nFigure [4-22](#A450041_1_En_4_Chapter.html#Fig22)\
    \ and Figure [4-23](#A450041_1_En_4_Chapter.html#Fig23) show the original photos.\n\
    \n![A450041_1_En_4_Fig23_HTML.jpg](A450041_1_En_4_Fig23_HTML.jpg)\n\nFigure 4-23\n\
    \nOriginal photo of texture (© Radwa Khalil)\n\n![A450041_1_En_4_Fig22_HTML.jpg](A450041_1_En_4_Fig22_HTML.jpg)\n\
    \nFigure 4-22\n\nOriginal photo (© Rafiq Elmansy)\n\nFigure [4-24](#A450041_1_En_4_Chapter.html#Fig24)\
    \ shows the final results.\n\n![A450041_1_En_4_Fig24_HTML.jpg](A450041_1_En_4_Fig24_HTML.jpg)\n\
    \nFigure 4-24\n\nFinal result\n\n## Step 1: Give the Photo a Vintage Effect\n\n\
    Follow these steps to give a photo a vintage effect:\n\n1.  Open a photo in the\
    \ `Tadaa` app.\n2.  Tap the Filters icon, and choose the Shoreditch filter. Then\
    \ tap the Apply icon (see Figure [4-25](#A450041_1_En_4_Chapter.html#Fig25)).\n\
    \n    ![A450041_1_En_4_Fig25_HTML.jpg](A450041_1_En_4_Fig25_HTML.jpg)\n\n    Figure\
    \ 4-25\n\n    Applying the Shoreditch filter in the `Tadaa` app\n3.  Tap the Frame\
    \ icon, choose a grunge frame, and tap the Apply icon (see Figure [4-26](#A450041_1_En_4_Chapter.html#Fig26)).\n\
    4.  Save the photo in the Camera Roll folder.\n\n    ![A450041_1_En_4_Fig26_HTML.jpg](A450041_1_En_4_Fig26_HTML.jpg)\n\
    \n    Figure 4-26\n\n    Applying the vintage frame in the `Tadaa` app\n\n## Step\
    \ 2: Apply More Frames\n\nFollow these steps to apply more frames:\n\n1.  In the\
    \ `Laminar` app, open the photo you just saved from the previous step.\n2.  Tap\
    \ the Effects icon, and choose Borders.\n3.  Select the Snap and Stack border,\
    \ and tap the Apply icon (see Figure [4-27](#A450041_1_En_4_Chapter.html#Fig27)).\n\
    \n    ![A450041_1_En_4_Fig27_HTML.jpg](A450041_1_En_4_Fig27_HTML.jpg)\n\n    Figure\
    \ 4-27\n\n    In `Laminar` app, apply the Snap and Stack border.\n4.  Tap the\
    \ Share and Export icon. Set Output Format to `PNG` (this will create a transparent\
    \ photo), and tap Library from the Save to menu.\n\n## Step 3: Add the Frame Background\
    \ Texture\n\nTo add the frame background texture, follow these steps:\n\n1.  Open\
    \ the tree texture in `Photoshop Mix`.\n2.  Tap the plus icon to add a new layer.\
    \ Choose the frame image to add to the new layer.\n3.  Use your fingers to resize\
    \ the top layer to fit with the size of the canvas (see Figure [4-28](#A450041_1_En_4_Chapter.html#Fig28)).\n\
    \n    ![A450041_1_En_4_Fig28_HTML.jpg](A450041_1_En_4_Fig28_HTML.jpg)\n\n    Figure\
    \ 4-28\n\n    Add the photo to the tree texture in `Photoshop Mix`\n4.  Tap Looks,\
    \ and choose the Punch filter.\n5.  Tap the Edit tool on the right of the screen,\
    \ and choose Smart Selection.\n6.  Tap the Feather icon, and drag to the right\
    \ to increase it.\n7.  Paint over the middle of the photo to keep the effect on\
    \ the middle part of the photo and remove it from the edges (see Figure [4-29](#A450041_1_En_4_Chapter.html#Fig29)).\n\
    \n    ![A450041_1_En_4_Fig29_HTML.jpg](A450041_1_En_4_Fig29_HTML.jpg)\n\n    Figure\
    \ 4-29\n\n    Use the smart selection to optimize the look of the frame\n\n# Creating\
    \ a Film Stripe Effect\n\nTools used: `Snapseed`, `Camera Awesome`\n\nIn this\
    \ tip, you’ll learn the following:\n\n- How to convert photos to black and white\n\
    - How to convert photos to monochrome\n- How to crop and add texture to photos\n\
    - How to add a film strip effect to photos\n\nFigure [4-30](#A450041_1_En_4_Chapter.html#Fig30)\
    \ shows the original photo I am using.\n\n![A450041_1_En_4_Fig30_HTML.jpg](A450041_1_En_4_Fig30_HTML.jpg)\n\
    \nFigure 4-30\n\nOriginal photo\n\nFigure [4-31](#A450041_1_En_4_Chapter.html#Fig31)\
    \ shows the final result.\n\n![A450041_1_En_4_Fig31_HTML.jpg](A450041_1_En_4_Fig31_HTML.jpg)\n\
    \nFigure 4-31\n\nFinal result\n\nA popular trick in photo editing is to turn a\
    \ photo into an old-style photo and change it to a film strip shape. To do this,\
    \ you first convert the photo to black and white and give it a monochrome effect\
    \ using the `Snapseed` app so that it’s suitable for the final effect. Then, you\
    \ can move to the `Camera Awesome` app where you will crop the photo to fit inside\
    \ the film strip. In the same app, you can apply a sepia filter to the photo,\
    \ then a texture, and finally the film strip.\n\n## Step 1: Convert the Photo\
    \ to Monochrome\n\nFollow these steps to convert the photo to monochrome:\n\n\
    1.  Open the photo in the `Snapseed` app.\n2.  Tap the Tools icon, and choose\
    \ Black & White. Choose a tone that makes sure that all the elements in the photo\
    \ are clear and contrasted (see Figure [4-32](#A450041_1_En_4_Chapter.html#Fig32)).\n\
    \n    ![A450041_1_En_4_Fig32_HTML.jpg](A450041_1_En_4_Fig32_HTML.jpg)\n\n    Figure\
    \ 4-32\n\n    Converting the photo to black and white\n3.  Tap the Apply icon.\n\
    4.  In the Tools list, choose the Vintage filter, and select a brown color filter.\
    \ Tap the Apply icon (see Figure [4-33](#A450041_1_En_4_Chapter.html#Fig33)).\n\
    \n    ![A450041_1_En_4_Fig33_HTML.jpg](A450041_1_En_4_Fig33_HTML.jpg)\n\n    Figure\
    \ 4-33\n\n    Add a vintage color to the photo\n\n## Step 2: Improve the Photo\
    \ and Add the Frame\n\nFollow these steps to improve the photo and add the frame:\n\
    \n1.  In the `Camera Awesome` app, tap the photos icon on the left of the camera\
    \ button. Tap the plus icon, and add the photos from your library.\n2.  Tap to\
    \ open the image from the library, and then tap the photo to edit.\n3.  Tap the\
    \ Transform icon, and set the crop size to a square. Then tap Done.\n4.  Tap the\
    \ filters, apply the Sepia filter, and tap Done (see Figure [4-34](#A450041_1_En_4_Chapter.html#Fig34)).\n\
    \n    ![A450041_1_En_4_Fig34_HTML.jpg](A450041_1_En_4_Fig34_HTML.jpg)\n\n    Figure\
    \ 4-34\n\n    Apply a Sepia filter in `Camera Awesome`\n5.  In the Texture section,\
    \ choose a Family Album filter, and tap Done to apply it.\n6.  Tap the Frames\
    \ icon, and choose the Sprockets frame. You can also apply other film-like frames.\
    \ Then tap Done (see Figure [4-35](#A450041_1_En_4_Chapter.html#Fig35)).\n7. \
    \ In the bottom toolbar, tap the Export to Camera Roll icon.\n\n    ![A450041_1_En_4_Fig35_HTML.jpg](A450041_1_En_4_Fig35_HTML.jpg)\n\
    \n    Figure 4-35\n\n    Add the film frame to the photo\n\n# Highlighting Elements\
    \ Using Color\n\nTools used: `Photoshop Mix` and `Photo Splash`\n\nIn this tip,\
    \ you’ll learn the following:\n\n- How to fix issues in photos using layers\n\
    - How to convert photos to black and white\n- How to colorize part of the photograph\
    \ or decolorize it\n\nFigure [4-36](#A450041_1_En_4_Chapter.html#Fig36) shows\
    \ the original photo I’m using.\n\n![A450041_1_En_4_Fig36_HTML.jpg](A450041_1_En_4_Fig36_HTML.jpg)\n\
    \nFigure 4-36\n\nOriginal photo\n\nFigure [4-37](#A450041_1_En_4_Chapter.html#Fig37)\
    \ shows the final result.\n\n![A450041_1_En_4_Fig37_HTML.jpg](A450041_1_En_4_Fig37_HTML.jpg)\n\
    \nFigure 4-37\n\nFinal result\n\nSometimes you need to emphasize an object based\
    \ on the photo’s composition. This can be achieved using different methods such\
    \ as color. One of the effects that can help you to focus on a specific element\
    \ in the shot is colorizing an object while converting the rest of the photo to\
    \ black and white. In this tip, I have a photo of a King Tut Ankamoun poster,\
    \ and I would like to highlight the mask in the shot.\n\nUnfortunately, the left\
    \ side of the wall in the photo has very exposed light compared to the right side.\
    \ So, I will show how to use `Photoshop Mix` to replace the left wall with a copy\
    \ from the right side. Then, I will open the photo in `Photo Splash` to easily"
