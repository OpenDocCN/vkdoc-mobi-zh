- fmt: '### Set Up Manual Focus and Exposure


    By default, the iPhone camera sets the focus in your photo automatically toward
    the nearest object in the composition. However, you may need to change this such
    as when you want to focus on a far object in the shot. The iPhone gives you the
    option to manually set the focus and exposure of the photo by simply tapping the
    object you would like to focus on; the camera will shift the focus in the shot
    to the selected object, as shown in Figure [1-7](#A450041_1_En_1_Chapter.html#Fig7).


    ![A450041_1_En_1_Fig7_HTML.jpg](A450041_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Tap the object to manually set the focus and exposure


    After setting up the focus to the selected element, the exposure of the photo
    may change based on the light conditions in the image. If you want to modify the
    exposure, tap and drag up and down to open the exposure slider, which allows you
    to increase or decrease the exposure in the photo.


    ### Lock the Exposure and Focus


    Even though the iPhone gives you the flexibility to set the exposure and the focus
    in a shot, it has a drawback, especially when you are taking a photo where the
    elements may move. Or you might want to take multiple images of the same scene
    without changing the focus each time you take the shot.


    To lock the focus and exposure, you can do the following:


    ![A450041_1_En_1_Fig8_HTML.jpg](A450041_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The yellow label indicates that the exposure and focus are locked


    1.  Wait for the camera to optimize the photo exposure and photo.

    2.  Tap and hold on the screen until the yellow `AE/AF Lock` label appears at
    the top of the screen, as shown in Figure [1-8](#A450041_1_En_1_Chapter.html#Fig8).

    3.  Tap the screen and drag up and down to change the shot brightness.


    Note that if you close the Camera app and open it again, you need to set the lock
    again on the new shot.


    ### Take HDR Photos


    High dynamic range (HDR) photos are a combination of photos of the same shot taken
    using different exposure values. Merging between these photos creates a dramatic
    effect in the photos that is known as the HDR photo effect. Unlike normal images,
    HDR photos include more contrasting colors and variations of shades and light.


    You can activate the HDR photo effect by simply tapping the `HDR` icon at the
    top of the screen to activate it, as shown in Figure [1-9](#A450041_1_En_1_Chapter.html#Fig9).
    Note that taking photos of moving subjects using this technique may cause distorted
    images because the tool allows you to take three images with different exposures
    and merge them together. So, it is better to use this effect with still subjects.


    ![A450041_1_En_1_Fig9_HTML.jpg](A450041_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Tap the `HDR` icon at the top of the screen


    While you take the `HDR` photos, you may like to keep the normal images for further
    work. To do this, you need to change the `HDR` setting.


    1.  Select `Settings` ➤ `Photos & Cameras`.

    2.  In the `HDR` section, turn on the `Keep Normal Photo` option.


    #### Take Live Photos


    A feature that was added to the iPhone camera starting in iPhone 6s/6s Plus is
    Live Photos. As you take pictures, the Live Photos feature records a small segment
    of video associated with the image. When you tap and hold on the image, the image
    starts to move, showing how the elements were moving while taking the shot. Live
    Photos also supports audio, so it is like having an image with a small video associated
    with it.


    To activate the Live Photos feature, tap the Live Photos icon at the top of the
    camera screen before taking your shot. When you tap the camera button, iPhone
    records 1.5 seconds before and after the shot, which creates a total of three
    seconds of video with audio.


    To play the video, you need to open the photo and then tap and hold on it to start
    the video. This type of photo is supported in desktop viewers such as the Photos
    app on Apple computers.


    ### Quickly Access Different Photo Types


    The iPhone camera allows you to take a variety of photos including regular, square,
    panorama, video, slow motion, and time lapse. The default method to switch between
    these modes is to access the Camera app and slide above either shutter button
    to select the photo or video type you would like to take. The quickest way to
    access these types is through 3D touch (available in iPhone 6s and 6s Plus and
    newer). Tap and hold firmly on the Camera app icon on your phone; the quick actions
    appear, and you can choose the type of photo you would like to take, as shown
    in Figure [1-10](#A450041_1_En_1_Chapter.html#Fig10).


    ![A450041_1_En_1_Fig10_HTML.jpg](A450041_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Tap and hold firmly on the Camera app to open the quick actions menu


    ## Getting the Most Out of the Photos App


    The default application that allows you to manage your photos on the iPhone and
    on Mac computers is the Photos app. It helps you to save, import, and manage photos
    taken using the iPhone. It also allows you to organize photos in albums, share
    photos, and save them on cloud services such as Apple iCloud, Dropbox, and others.


    While many of the iPhone photography applications allow you to store photos in
    the application itself, saving the photos in the Photos app allows you to easily
    move between applications to apply different photo effects. Therefore, it is important
    to learn how to effectively use the Photos app.


    ### Use the Moments and Collections Views


    By default, when you open the Photos app, it displays the recent photos, but you
    can also review the photos based on the timeline of when you took them using the
    Collections view.


    When you are in the Moments view (the default view), tap `Collections` at the
    top left of the screen, as shown in Figure [1-11](#A450041_1_En_1_Chapter.html#Fig11).
    This will display the photos based on the month and where you took the photos.
    You can tap the months in order to zoom back to the Moments view. When the Collections
    view is active, tap the `Years` view to display the photos based on the year they
    are taken in. Then, you can tap each year to access the Collections view.


    ![A450041_1_En_1_Fig11_HTML.jpg](A450041_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Tap `Collections` to review photos based on a timeline


    ### Find Photos on Your Mobile Device


    When your phone is full of photos, you need a way to find specific photos other
    than scrolling between them. The search feature in the Photos app provides a smart
    way to search for photos using different keywords including the following:


    - The time when the photo was taken, such as the year or the month.

    - The place where the photo was taken in. This can be a city, a country, or a
    specific location.

    - An element placed inside the photo that can be named, such as a dog, a car,
    a beach, and so on.

    - A person’s name in the photo based on the people saved in the `People` folder,
    as you will see in the following tip.'
  raw: '### Set Up Manual Focus and Exposure


    By default, the iPhone camera sets the focus in your photo automatically toward
    the nearest object in the composition. However, you may need to change this such
    as when you want to focus on a far object in the shot. The iPhone gives you the
    option to manually set the focus and exposure of the photo by simply tapping the
    object you would like to focus on; the camera will shift the focus in the shot
    to the selected object, as shown in Figure [1-7](#A450041_1_En_1_Chapter.html#Fig7).


    ![A450041_1_En_1_Fig7_HTML.jpg](A450041_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Tap the object to manually set the focus and exposure


    After setting up the focus to the selected element, the exposure of the photo
    may change based on the light conditions in the image . If you want to modify
    the exposure, tap and drag up and down to open the exposure slider, which allows
    you to increase or decrease the exposure in the photo.


    ### Lock the Exposure and Focus


    Even though the iPhone gives you the flexibility to set the exposure and the focus
    in a shot, it has a drawback, especially when you are taking a photo where the
    elements may move. Or you might want to take multiple images of the same scene
    without changing the focus each time you take the shot.


    To lock the focus and exposure, you can do the following:


    ![A450041_1_En_1_Fig8_HTML.jpg](A450041_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The yellow label indicates that the exposure and focus are locked


    1.  Wait for the camera to optimize the photo exposure and photo.  

    2.  Tap and hold on the screen until the yellow AE/AF Lock label appears at the
    top of the screen, as shown in Figure [1-8](#A450041_1_En_1_Chapter.html#Fig8).
     

    3.  Tap the screen and drag up and down to change the shot brightness.  


    Note that if you close the Camera app and open it again, you need to set the lock
    again on the new shot.


    ### Take HDR Photos


    High dynamic range (HDR) photos are a combination of photos of the same shot taken
    using different exposure values. Merging between these photos creates a dramatic
    effect in the photos that is known as the HDR photo effect. Unlike normal images,
    HDR photos include more contrasting colors and variations of shades and light.


    You can activate the HDR photo effect by simply tapping the HDR icon at the top
    of the screen to activate it, as shown in Figure [1-9](#A450041_1_En_1_Chapter.html#Fig9).
    Note that taking photos of moving subjects using this technique may cause distorted
    images because the tool allows you to take three images with different exposures
    and merge them together. So, it is better to use this effect with still subjects.


    ![A450041_1_En_1_Fig9_HTML.jpg](A450041_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Tap the HDR icon at the top of the screen


    While you take the HDR photos, you may like to keep the normal images for further
    work. To do this, you need to change the HDR setting.


    1.  Select Settings ➤ Photos & Cameras.  

    2.  In the HDR section, turn on the Keep Normal Photo option.  


    #### Take Live Photos


    A feature that was added to the iPhone camera starting in iPhone 6s/6s Plus is
    Live Photos. As you take pictures, the Live Photos feature records a small segment
    of video associated with the image. When you tap and hold on the image, the image
    starts to move, showing how the elements were moving while taking the shot. Live
    Photos also supports audio, so it is like having an image with a small video associated
    with it.


    To activate the Live Photos feature, tap the Live Photos icon at the top of the
    camera screen before taking your shot. When you tap the camera button, iPhone
    records 1.5 seconds before and after the shot, which creates a total of three
    seconds of video with audio.


    To play the video, you need to open the photo and then tap and hold on it to start
    the video. This type of photo is supported in desktop viewers such as the Photos
    app on Apple computers.


    ### Quickly Access Different Photo Types


    The iPhone camera allows you to take a variety of photos including regular, square,
    panorama, video, slow motion, and time lapse. The default method to switch between
    these modes is to access the Camera app and slide above either shutter button
    to select the photo or video type you would like to take. The quickest way to
    access these types is through 3D touch (available in iPhone 6s and 6s Plus and
    newer). Tap and hold firmly on the Camera app icon on your phone; the quick actions
    appear, and you can choose the type of photo you would like to take, as shown
    in Figure [1-10](#A450041_1_En_1_Chapter.html#Fig10).


    ![A450041_1_En_1_Fig10_HTML.jpg](A450041_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Tap and hold firmly on the Camera app to open the quick actions menu


    ## Getting the Most Out of the Photos App


    The default application that allows you to manage your photos on the iPhone and
    on Mac computers is the Photos app. It helps you to save, import, and manage photos
    taken using the iPhone. It also allows you to organize photos in albums, share
    photos, and save them on cloud services such as Apple iCloud, Dropbox, and others.


    While many of the iPhone photography applications allow you to store photos in
    the application itself, saving the photos in the Photos app allows you to easily
    move between applications to apply different photo effects. Therefore, it is important
    to learn how to effectively use the Photos app.


    ### Use the Moments and Collections Views


    By default, when you open the Photos app, it displays the recent photos, but you
    can also review the photos based on the timeline of when you took them using the
    Collections view.


    When you are in the Moments view (the default view), tap Collections at the top
    left of the screen, as shown in Figure [1-11](#A450041_1_En_1_Chapter.html#Fig11).
    This will display the photos based on the month and where you took the photos.
    You can tap the months in order to zoom back to the Moments view. When the Collections
    view is active, tap the Years view to display the photos based on the year they
    are taken in. Then, you can tap each year to access the Collections view.


    ![A450041_1_En_1_Fig11_HTML.jpg](A450041_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Tap Collections to review photos based on a timeline


    ### Find Photos on Your Mobile Device


    When your phone is full of photos, you need a way to find specific photos other
    than scrolling between them. The search feature in the Photos app provides a smart
    way to search for photos using different keywords including the following:


    *   The time when the photo was taken, such as the year or the month.

    *   The place where the photo was taken in. This can be a city, a country, or
    a specific location.

    *   An element placed inside the photo that can be named, such as a dog, a car,
    a beach, and so on.

    *   A person’s name in the photo based on the people saved in the People folder,
    as you will see in the following tip.'
  trans: '

    ### 设置手动对焦与曝光


    默认情况下，iPhone 相机会自动将焦点对准画面中最近的物体。但在某些情况下，例如当你想对焦于画面中远处的物体时，可能需要更改这一设置。iPhone 允许你通过点击想要对焦的物体来手动设置照片的对焦和曝光；相机将对焦于所选物体，如图
    1-7 所示。


    ![A450041_1_En_1_Fig7_HTML.jpg](img/A450041_1_En_1_Fig7_HTML.jpg)


    图 1-7


    点击物体以手动设置对焦和曝光


    将对焦设定到所选元素后，照片的曝光可能会根据图像中的光照条件而变化。如果你想修改曝光，点击并上下拖动以打开曝光滑块，从而可以增加或减少照片的曝光度。


    ### 锁定曝光与对焦


    尽管 iPhone 允许你灵活地在拍摄中设置曝光和对焦，但它也有一个缺点，尤其是在拍摄场景中元素可能会移动时。或者，你可能想要拍摄同一场景的多张照片，而不希望在每次拍摄时都重新设置对焦。


    要锁定对焦和曝光，请执行以下操作：


    ![A450041_1_En_1_Fig8_HTML.jpg](img/A450041_1_En_1_Fig8_HTML.jpg)


    图 1-8


    黄色标签表示曝光和对焦已锁定


    1.  等待相机优化照片的曝光和画面。

    2.  长按屏幕，直到屏幕顶部出现黄色的 `AE/AF Lock` 标签，如图 1-8 所示。

    3.  点击屏幕并上下拖动以改变画面亮度。


    请注意，如果您关闭“相机”应用并重新打开，则需要在新拍摄中重新设置锁定。


    ### 拍摄 HDR 照片


    高动态范围（HDR）照片是使用不同曝光值拍摄的同一场景的多张照片的组合。将这些照片合并在一起，可以在照片中产生一种称为 HDR 照片效果的戏剧性效果。与普通图像不同，HDR
    照片包含更多对比鲜明的颜色以及明暗和光影变化。


    您只需点击屏幕顶部的 `HDR` 图标即可激活 HDR 照片效果，如图 1-9 所示。请注意，使用此技术拍摄移动主体可能会导致图像失真，因为该功能允许您拍摄三张不同曝光的图像并将它们合并在一起。因此，最好将此效果用于静态主体。


    ![A450041_1_En_1_Fig9_HTML.jpg](img/A450041_1_En_1_Fig9_HTML.jpg)


    图 1-9


    点击屏幕顶部的 `HDR` 图标


    在拍摄 `HDR` 照片时，您可能希望保留普通照片以供后续处理。为此，您需要更改 `HDR` 设置。


    1.  选择 `设置` ➤ `照片与相机`。

    2.  在 `HDR` 部分，打开 `保留正常曝光的照片` 选项。


    #### 拍摄实况照片


    从 iPhone 6s/6s Plus 开始，iPhone 相机新增了一项功能——实况照片。在拍照时，实况照片功能会录制与图像关联的一小段视频。当您长按图像时，图像会开始动起来，显示拍摄时画面中物体的运动情况。实况照片还支持音频，就像一张图片附带了一段小视频。


    要激活实况照片功能，请在拍摄前点击相机屏幕顶部的实况照片图标。当您按下快门按钮时，iPhone 会记录拍摄前后各 1.5 秒的画面，从而生成一段总共 3 秒的带音频视频。


    要播放视频，您需要打开照片，然后长按以启动视频。此类照片在桌面端查看器（例如 Apple 电脑上的“照片”应用）中得到支持。


    ### 快速访问不同的照片类型


    iPhone 相机允许您拍摄多种类型的照片，包括常规、正方形、全景、视频、慢动作和延时摄影。在这些模式之间切换的默认方法是打开“相机”应用，然后在任一快门按钮上方滑动以选择您要拍摄的照片或视频类型。访问这些类型的最快方式是通过
    3D Touch（适用于 iPhone 6s、6s Plus 及更新机型）。用力长按手机上的“相机”应用图标；快捷操作菜单出现，您可以选择要拍摄的照片类型，如图
    1-10 所示。


    ![A450041_1_En_1_Fig10_HTML.jpg](img/A450041_1_En_1_Fig10_HTML.jpg)


    图 1-10


    用力长按“相机”应用以打开快捷操作菜单


    ## 充分利用“照片”应用


    在 iPhone 和 Mac 电脑上用于管理照片的默认应用程序是“照片”应用。它可以帮助您保存、导入和管理使用 iPhone 拍摄的照片。它还允许您将照片整理到相簿中、分享照片，并将其保存到
    Apple iCloud、Dropbox 等云服务中。


    虽然许多 iPhone 摄影应用程序允许您将照片存储在应用程序本身中，但将照片保存在“照片”应用中可以让您轻松地在不同应用之间切换以应用不同的照片效果。因此，学习如何有效使用“照片”应用非常重要。


    ### 使用“时刻”和“年度”视图


    默认情况下，当您打开“照片”应用时，它会显示最近的照片，但您也可以使用“年度”视图根据拍摄时间线来查看照片。


    当您处于“时刻”视图（默认视图）时，请点击屏幕左上角的“年度”，如图 1-11 所示。这将以月份和拍摄地点为基础显示照片。您可以点按月份以缩放回“时刻”视图。当“年度”视图激活时，点击“年份”视图可以根据拍摄年份显示照片。然后，您可以点击每一年以进入“年度”视图。


    ![A450041_1_En_1_Fig11_HTML.jpg](img/A450041_1_En_1_Fig11_HTML.jpg)


    图 1-11


    点击“年度”以根据时间线查看照片


    ### 在移动设备上查找照片


    当您的手机里存满了照片时，您需要一种方法来查找特定照片，而不是在它们之间滚动浏览。“照片”应用中的搜索功能提供了一种智能方式，可以使用不同的关键词来搜索照片，包括以下内容：


    - 照片的拍摄时间，例如年份或月份。

    - 照片的拍摄地点。可以是城市、国家或特定地点。

    - 照片中可被命名的元素，例如狗、汽车、海滩等。

    - 照片中人物的姓名，基于保存在“人物”文件夹中的人物，您将在下一条技巧中看到。

