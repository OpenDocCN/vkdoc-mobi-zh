    \n    Figure 7-11\n\n    Apply the mosaic effect to the photo\n\n### Step 3: Improve\
    \ the Mosaic Artwork Colors\n\nTo improve the mosaic artwork colors , follow these\
    \ steps:\n\n1.  Open the saved photo from the previous steps in Photo Splash.\
    \  \n2.  Tap the first icon on the left of the toolbar. Use the brush to paint\
    \ over the photo to create a mask (see Figure [7-12](#A450041_1_En_7_Chapter.html#Fig12)).\n\
    \n    ![A450041_1_En_7_Fig12_HTML.jpg](A450041_1_En_7_Fig12_HTML.jpg)\n\n    Figure\
    \ 7-12\n\n    Create a mask to apply the effect on it  \n3.  Tap the Effects icon,\
    \ and choose the third effect from the left (see Figure [7-13](#A450041_1_En_7_Chapter.html#Fig13)).\
    \  \n4.  Tap the Next icon and then tap the Save icon to save it to the Camera\
    \ Roll.  \n5.  Select the size of the image you would like to save.\n\n    ![A450041_1_En_7_Fig13_HTML.jpg](A450041_1_En_7_Fig13_HTML.jpg)\n\
    \n    Figure 7-13\n\n    Apply the effect to improve the mosaic artwork\n\n##\
    \ Turn Your Photo into an Oil Painting\n\nTools used: Lightroom app, Glaze app\n\
    \nFigure [7-14](#A450041_1_En_7_Chapter.html#Fig14) shows my original photo.\n\
    \n![A450041_1_En_7_Fig14_HTML.jpg](A450041_1_En_7_Fig14_HTML.jpg)\n\nFigure 7-14\n\
    \nOriginal photo (© Radwa Khali)\n\nFigure [7-15](#A450041_1_En_7_Chapter.html#Fig15)\
    \ shows the final result of this tip.\n\n![A450041_1_En_7_Fig15_HTML.jpg](A450041_1_En_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15\n\nFinal results\n\nThe oil painting has an amazing artistic effect,\
    \ especially with how the brush adds the “paint” on the canvas to form the whole\
    \ picture. Actually, there are many apps that can help you create artistic effects\
    \ to look like oil paintings. In this tip, you will learn how to apply the oil\
    \ painting effect to a photo of an old car. Then, you will apply color gradients\
    \ over the photo to give it a more impressionist feel.\n\nSpecifically, I will\
    \ show how to modify the photo in Lightroom to give it more vibrant colors so\
    \ the applied painting effect uses the bright colors in the photo. Then, I will\
    \ show how to use the Glaze app to apply the effect on the photo. After applying\
    \ the effect, the photo will be returned to the Lightroom app to apply a selective\
    \ mask effect on some parts of the photo to give it more artistic colors.\n\n\
    ### Step 1: Improve the Photo Colors and Contrast\n\nTo improve the photo colors\
    \ and contrast , follow these steps:\n\n1.  Open the photo in the Lightroom app.\
    \  \n2.  Tap the Color icon, and increase the Vibrance setting of the photo. Then,\
    \ tap Apply at the top right.  \n3.  Tap the Light icon, and reduce the contrast\
    \ a little. This will show more details in the shot (see Figure [7-16](#A450041_1_En_7_Chapter.html#Fig16)).\n\
    \n    ![A450041_1_En_7_Fig16_HTML.jpg](A450041_1_En_7_Fig16_HTML.jpg)\n\n    Figure\
    \ 7-16\n\n    Increase the photo vibrancy and reduce its contrast  \n4.  Increase\
    \ the exposure a little to +0.27, reduce the highlights to -13, and increase the\
    \ shadows to +25 (see Figure [7-17](#A450041_1_En_7_Chapter.html#Fig17)).  \n\
    5.  Tap the Apply icon.  \n6.  Tap the Share icon, and save it to the Camera Roll\
    \ with the maximum size.\n\n    ![A450041_1_En_7_Fig17_HTML.jpg](A450041_1_En_7_Fig17_HTML.jpg)\n\
    \n    Figure 7-17\n\n    Increase the exposure of the photo, reduce the highlights,\
    \ and increase the shadows\n\n### Step 2: Apply the Oil Painting Effect\n\nTo\
    \ apply the oil painting effect , follow these steps:\n\n1.  Open the edited photo\
    \ from the previous steps in the Glaze app.  \n2.  Choose an oil painting effect\
    \ to apply. I used one with a realistic effect of the brush touch (see Figure\
    \ [7-18](#A450041_1_En_7_Chapter.html#Fig18)).  \n3.  Tap the Share icon and then\
    \ choose Gallery to save it to your Photos folder.\n\n    ![A450041_1_En_7_Fig18_HTML.jpg](A450041_1_En_7_Fig18_HTML.jpg)\n\
    \n    Figure 7-18\n\n    Apply the oil painting effect on the image\n\n### Step\
    \ 3: Improve the Painting Colors\n\nTo improve the painting colors , follow these\
    \ steps:\n\n1.  Open the photo from the previous apps in the Lightroom app again.\
    \  \n2.  Tap the Selective icon and then choose the Linear mask from the left\
    \ side of the screen.  \n3.  Drag to create a mask over the lower part of the\
    \ photo. You can use the square in the middle of the mask to change its location\
    \ (see Figure [7-19](#A450041_1_En_7_Chapter.html#Fig19)).\n\n    ![A450041_1_En_7_Fig19_HTML.jpg](A450041_1_En_7_Fig19_HTML.jpg)\n\
    \n    Figure 7-19\n\n    Apply a selective adjustment on the photo lower part\
    \  \n4.  Tap the Color spectrum and drag the point to the red side to add a red\
    \ hue to the masked part of the photo (see Figure [7-20](#A450041_1_En_7_Chapter.html#Fig20)).\n\
    \n    ![A450041_1_En_7_Fig20_HTML.jpg](A450041_1_En_7_Fig20_HTML.jpg)\n\n    Figure\
    \ 7-20\n\n    Use the Color spectrum to apply a red hue to the photo’s lower part\
    \  \n5.  Increase Saturation to +41 and tap the Apply icon.  \n6.  Tap the Selective\
    \ icon again to apply another adjustment mask on the upper part of the photo.\
    \  \n7.  Tap the Linear icon on the left side.  \n8.  Drag to create a linear\
    \ mask on the top part of the photo.  \n9.  Tap the Color icon and use the Color\
    \ spectrum to add a green color to the top part of the shot (see Figure [7-21](#A450041_1_En_7_Chapter.html#Fig21)).\n\
    \n    ![A450041_1_En_7_Fig21_HTML.jpg](A450041_1_En_7_Fig21_HTML.jpg)\n\n    Figure\
    \ 7-21\n\n    Apply green hue to the upper part of the photo  \n10.  Tap the Apply\
    \ icon.  \n11.  Tap the Selective icon again, and this time apply a Radial mask\
    \ to the center of the photo.  \n12.  Tap the Light icon, and increase the exposure\
    \ to +1.12 (see Figure [7-22](#A450041_1_En_7_Chapter.html#Fig22)).\n\n    ![A450041_1_En_7_Fig22_HTML.jpg](A450041_1_En_7_Fig22_HTML.jpg)\n\
    \n    Figure 7-22\n\n    Apply a Radial mask, and increase the exposure of the\
    \ center of the image  \n13.  Tap the Apply icon. Then tap the Apply icon on the\
    \ top-right side of the screen to add the image to the library.  \n14.  Open it\
    \ again, tap the Share icon, and choose Save to Camera Roll. Set the size to Maximum\
    \ to save the artwork in your Photos library.\n\n## Add a Foggy Winter to Your\
    \ Photo\n\nTools used: Tadaa app, Repix app\n\nIn this example, I wanted to convert\
    \ a photo into a hyper-realistic painting. So, I picked a photo that I took in\
    \ Paris a few years ago with my iPhone and will show how to add a foggy effect\
    \ to it. I used the Tadaa app or any app that can create blur effect to add the\
    \ fog to the window. Then, I used the Repix app to add small water drops on the\
    \ window. The final effect should seem like you are looking at a building through\
    \ a window that is covered by fog and mist drops.\n\nFigure [7-23](#A450041_1_En_7_Chapter.html#Fig23)\
    \ shows the original photo that I started with.\n\n![A450041_1_En_7_Fig23_HTML.jpg](A450041_1_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23\n\nOriginal photo (© Rafiq Elmansy)\n\nFigure [7-24](#A450041_1_En_7_Chapter.html#Fig24)\
    \ shows the final photo.\n\n![A450041_1_En_7_Fig24_HTML.jpg](A450041_1_En_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24\n\nFinal results\n\n### Step 1: Add Fog to a Window\n\nTo add the\
    \ fog to the window, follow these steps:\n\n1.  Open the photo in the Tadaa app.\
    \  \n2.  Slide the toolbar to the left to reveal the Blur icon; tap it.  \n3.\
    \  Set the blur type to All and set the blur to 30 (see Figure [7-25](#A450041_1_En_7_Chapter.html#Fig25)).\
    \  \n4.  Tap the Apply icon, and save the photo in the Camera Roll.\n\n    ![A450041_1_En_7_Fig25_HTML.jpg](A450041_1_En_7_Fig25_HTML.jpg)\n\
    \n    Figure 7-25\n\n    Apply the blur effect on the photo"
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文，并保留所有格式和标记。\n\n\n### 步骤 2：应用马赛克效果\n\
    \n要应用马赛克效果，请遵循以下步骤：\n\n1.  在 `Deep Art Effect` 中打开已保存的图像。\n2.  在底部效果中，选择 `Mosaic\
    \ 1` 效果。该效果将需要几秒钟应用到照片上。\n3.  点击 `Effect` 图标 (`Mosaic`)，然后将滑块向左拖动一点，以略微降低效果的强度（见图\
    \ 7-11）。\n4.  点击 `Save` 图标，将照片保存到相机胶卷。\n\n    ![A450041_1_En_7_Fig11_HTML.jpg](img/A450041_1_En_7_Fig11_HTML.jpg)\n\
    \n    图 7-11\n\n    为照片应用马赛克效果\n\n### 步骤 3：改善马赛克艺术作品的颜色\n\n要改善马赛克艺术作品的颜色，请遵循以下步骤：\n\
    \n1.  在 `Photo Splash` 中打开上一步中保存的照片。\n2.  点击工具栏左侧的第一个图标。使用画笔在照片上涂抹以创建蒙版（见图 7-12）。\n\
    \n    ![A450041_1_En_7_Fig12_HTML.jpg](img/A450041_1_En_7_Fig12_HTML.jpg)\n\n\
    \    图 7-12\n\n    创建一个蒙版以在其上应用效果\n3.  点击 `Effects` 图标，然后从左侧选择第三个效果（见图 7-13）。\n\
    4.  点击 `Next` 图标，然后点击 `Save` 图标将其保存到相机胶卷。\n5.  选择你想要保存的图像尺寸。\n\n    ![A450041_1_En_7_Fig13_HTML.jpg](img/A450041_1_En_7_Fig13_HTML.jpg)\n\
    \n    图 7-13\n\n    应用该效果以改善马赛克艺术作品\n\n## 将你的照片变成一幅油画\n\n使用的工具：`Lightroom app`，\
    \ `Glaze app`\n\n图 7-14 展示了我原始的照片。\n\n![A450041_1_En_7_Fig14_HTML.jpg](img/A450041_1_En_7_Fig14_HTML.jpg)\n\
    \n图 7-14\n\n原始照片 (© Radwa Khali)\n\n图 7-15 展示了本技巧的最终效果。\n\n![A450041_1_En_7_Fig15_HTML.jpg](img/A450041_1_En_7_Fig15_HTML.jpg)\n\
    \n图 7-15\n\n最终效果\n\n油画具有惊人的艺术效果，尤其是画笔在画布上添加“颜料”以构成整个画面的方式。实际上，有许多应用程序可以帮助你创造类似油画的\
    \ artistic 效果。在本技巧中，你将学习如何为一辆旧车的照片应用油画效果。然后，你将在照片上应用颜色渐变，使其更具印象派风格。\n\n具体来说，我将展示如何在\
    \ `Lightroom` 中修改照片，使其颜色更鲜艳，以便应用的绘画效果能利用照片中的明亮色彩。然后，我将展示如何使用 `Glaze` 应用程序将效果应用到照片上。应用效果后，照片将返回到\
    \ `Lightroom` 应用程序，以对照片的某些部分应用选择性蒙版效果，使其更具艺术色彩。\n\n### 步骤 1：改善照片的颜色和对比度\n\n要改善照片的颜色和对比度，请遵循以下步骤：\n\
    \n1.  在 `Lightroom` 应用程序中打开照片。\n2.  点击 `Color` 图标，增加照片的 `Vibrance`（鲜艳度）设置。然后，点击右上角的\
    \ `Apply`。\n3.  点击 `Light` 图标，稍微降低对比度。这将显示出镜头中更多的细节（见图 7-16）。\n\n    ![A450041_1_En_7_Fig16_HTML.jpg](img/A450041_1_En_7_Fig16_HTML.jpg)\n\
    \n    图 7-16\n\n    增加照片鲜艳度并降低其对比度\n4.  将曝光度稍微增加到 `+0.27`，将高光减少到 `-13`，并将阴影增加到\
    \ `+25`（见图 7-17）。\n5.  点击 `Apply` 图标。\n6.  点击 `Share` 图标，并以最大尺寸将其保存到相机胶卷。\n\n\
    \    ![A450041_1_En_7_Fig17_HTML.jpg](img/A450041_1_En_7_Fig17_HTML.jpg)\n\n \
    \   图 7-17\n\n    增加照片的曝光度，减少高光，增加阴影\n\n### 步骤 2：应用油画效果\n\n要应用油画效果，请遵循以下步骤：\n\n\
    1.  在 `Glaze` 应用程序中打开上一步编辑过的照片。\n2.  选择一个要应用的油画效果。我使用了一个具有逼真笔触效果的效果（见图 7-18）。\n\
    3.  点击 `Share` 图标，然后选择 `Gallery` 将其保存到你的照片文件夹。\n\n    ![A450041_1_En_7_Fig18_HTML.jpg](img/A450041_1_En_7_Fig18_HTML.jpg)\n\
    \n    图 7-18\n\n    在图像上应用油画效果\n\n### 步骤 3：改善绘画颜色\n\n要改善绘画颜色，请遵循以下步骤：\n\n1.  在\
    \ `Lightroom` 应用程序中再次打开上一步应用编辑过的照片。\n2.  点击 `Selective` 图标，然后从屏幕左侧选择 `Linear mask`（线性蒙版）。\n\
    3.  拖动鼠标在照片的下半部分创建一个蒙版。你可以使用蒙版中间的方形来改变其位置（见图 7-19）。\n\n    ![A450041_1_En_7_Fig19_HTML.jpg](img/A450041_1_En_7_Fig19_HTML.jpg)\n\
    \n    图 7-19\n\n    对照片下半部分应用选择性调整\n4.  点击 `Color spectrum`（颜色光谱）并将点拖向红色一侧，为照片的被遮罩部分添加红色色调（见图\
    \ 7-20）。\n\n    ![A450041_1_En_7_Fig20_HTML.jpg](img/A450041_1_En_7_Fig20_HTML.jpg)\n\
    \n    图 7-20\n\n    使用 `Color spectrum`（颜色光谱）为照片下半部分应用红色色调\n5.  将 `Saturation`（饱和度）增加到\
    \ `+41`，然后点击 `Apply` 图标。\n6.  再次点击 `Selective` 图标，以在照片的上半部分应用另一个调整蒙版。\n7.  点击左侧的\
    \ `Linear` 图标。\n8.  拖动鼠标在照片的顶部创建一个线性蒙版。\n9.  点击 `Color` 图标，并使用 `Color spectrum`（颜色光谱）为镜头顶部添加绿色（见图\
    \ 7-21）。\n\n    ![A450041_1_En_7_Fig21_HTML.jpg](img/A450041_1_En_7_Fig21_HTML.jpg)\n\
    \n    图 7-21\n\n    为照片上半部分应用绿色色调\n10. 点击 `Apply` 图标。\n11. 再次点击 `Selective` 图标，这次在照片中心应用一个\
    \ `Radial mask`（径向蒙版）。\n12. 点击 `Light` 图标，并将曝光度增加到 `+1.12`（见图 7-22）。\n\n    ![A450041_1_En_7_Fig22_HTML.jpg](img/A450041_1_En_7_Fig22_HTML.jpg)\n\
    \n    图 7-22\n\n    应用 `Radial mask`（径向蒙版），并增加图像中心区域的曝光度\n13. 点击 `Apply` 图标。然后点击屏幕右上角的\
    \ `Apply` 图标，将图像添加到图库。\n14. 再次打开它，点击 `Share` 图标，然后选择 `Save to Camera Roll`。将尺寸设置为\
    \ `Maximum` 以将艺术作品保存到你的照片图库。\n\n## 为你的照片添加雾冬效果\n\n使用的工具：`Tadaa app`， `Repix app`\n\
    \n在这个例子中，我想将一张照片转换成超现实的绘画。所以，我选择了一张几年前在巴黎用我的 iPhone 拍摄的照片，并将展示如何为其添加雾状效果。我使用了\
    \ `Tadaa` 应用程序或任何可以创建模糊效果的应用程序来为窗户添加雾气。然后，我使用了 `Repix` 应用程序在窗户上添加小水滴。最终的效果应该会让你感觉仿佛是透过一扇被雾气和薄雾水珠覆盖的窗户看向一栋建筑。\n\
    \n图 7-23 展示了我开始使用的原始照片。\n\n![A450041_1_En_7_Fig23_HTML.jpg](img/A450041_1_En_7_Fig23_HTML.jpg)\n\
    \n图 7-23\n\n原始照片 (© Rafiq Elmansy)\n\n图 7-24 展示了最终的照片。\n\n![A450041_1_En_7_Fig24_HTML.jpg](img/A450041_1_En_7_Fig24_HTML.jpg)\n\
    \n图 7-24\n\n最终效果\n\n### 步骤 1：为窗户添加雾气\n\n要为窗户添加雾气，请遵循以下步骤：\n\n1.  在 `Tadaa` 应用程序中打开照片。\n\
    2.  将工具栏向左滑动以显示 `Blur` 图标；点击它。\n3.  将模糊类型设置为 `All`，并将模糊值设置为 `30`（见图 7-25）。\n4.\
    \  点击 `Apply` 图标，并将照片保存到相机胶卷。\n\n    ![A450041_1_En_7_Fig25_HTML.jpg](img/A450041_1_En_7_Fig25_HTML.jpg)\n\
    \n    图 7-25\n\n    为照片应用模糊效果\n"
- fmt: '### Step 2: Apply the Water Drops


    To apply the water drops, follow these steps:


    1. Open the photo in the `Repix` app.

    2. From the tool, tap the `Rain Drops` pen once to activate the medium effect.
    Paint over the whole photo to add small mist drops.

    3. Tap again on the pen to switch to the larger drops. Paint over the edges of
    the photo to add large water drops to the edges and keep the middle clear to display
    the building partly (see Figure [7-26](#A450041_1_En_7_Chapter.html#Fig26)).


    ![A450041_1_En_7_Fig26_HTML.jpg](A450041_1_En_7_Fig26_HTML.jpg)


    Figure 7-26 — Apply the rain drops


    ### Step 3: Improve a Photo’s Light and Color


    To improve the photo light and color, follow these steps:


    1. Tap the `Adjustment` icon. Set `Brightness` and `Contrast` to `-40`, `Saturation`
    to `-25`, `Vibrance` to `-10`, and `Temperature` to `-15`. This will reduce the
    light in the photo and give it a cooler winter effect (see Figure [7-27](#A450041_1_En_7_Chapter.html#Fig27)).

    2. Tap the `Apply` icon to save the photo in the `Camera Roll`.


    ![A450041_1_En_7_Fig27_HTML.jpg](A450041_1_En_7_Fig27_HTML.jpg)


    Figure 7-27 — Improve the effect by adjusting the color, light, and temperature


    ## Summary


    Fine art has a special look, especially with the brush touches and expressive
    colors. You can easily convert your photo into a piece of artwork by applying
    different effects to look like oil painting, watercolor, and others. All you need
    to do is to find the proper app that can help simulate the touch of the brush
    or the effect you want to achieve. Apps such as `Deep Art Effect`, `Photo Splash`,
    and `Glaze` can help you turn your photos into fine art pieces. Using techniques
    from more than one app can produce even more interesting results. In these tips,
    I depended on the `Lightroom` app to adjust the color and light in the photos
    and `Photoshop Fix` to remove the unwanted elements in the shot before applying
    any effect.


    ## Practice Exercise


    To practice the tips in this chapter, you can use any photo of your choice that
    you would like to convert into fine art. Then, decide which effect you want to
    apply. Use the tips as a guide to reach the same effects as in this chapter and
    explore what other fine art results you can produce.


    # 8. Photo Manipulation Projects


    In addition to editing photos on your iPhone, you can also create larger projects
    that involve multiple apps. The most challenging part is to come up with an idea
    and visualize the creative artwork that you will create on your iPhone. Then,
    you need to select other photos that can be merged with the original to form the
    final composition. The number of apps you use depends on the effect you want to
    create. I like to build the composition in one app such as `Photoshop Mix` and
    use other apps to apply filters and effects on the shot.


    In this chapter, you will explore the workflow of merging photos together to create
    a mystic scene. You’ll take elements from different photos and use the blending
    mode to mix between the colors to create your digital art.


    ## Create a Fantasy Scene


    Tools used: ???


    Figures [8-1](#A450041_1_En_8_Chapter.html#Fig1), [8-2](#A450041_1_En_8_Chapter.html#Fig2),
    and [8-3](#A450041_1_En_8_Chapter.html#Fig3) show the original photos I used in
    my example.


    ![A450041_1_En_8_Fig3_HTML.jpg](A450041_1_En_8_Fig3_HTML.jpg)


    Figure 8-3 — Original Earth photo to add (Source: Wikipedia)


    ![A450041_1_En_8_Fig2_HTML.jpg](A450041_1_En_8_Fig2_HTML.jpg)


    Figure 8-2 — Original sunset to add (© Rafiq Elmansy)


    ![A450041_1_En_8_Fig1_HTML.jpg](A450041_1_En_8_Fig1_HTML.jpg)


    Figure 8-1 — Original photo of kids (© Rafiq Elmansy)


    Figure [8-4](#A450041_1_En_8_Chapter.html#Fig4) shows the final results.


    ![A450041_1_En_8_Fig4_HTML.jpg](A450041_1_En_8_Fig4_HTML.jpg)


    Figure 8-4 — Final result


    In this project, I will show how to merge a number of photos to create a fantasy
    scene of kids playing on a strange planet. So, I will start with a photo I took
    on my iPhone of my kids on a beach and a photo of the sunset and merge them with
    an Earth photo that I saved from the Internet to my iPhone. This is the only time
    I’m using a photo that was not taken using an iPhone because of the nature of
    the photo I want to create. The photo was grabbed from Wikipedia under the copyright
    of public domain.


    ### Step 1: Prepare the Base Scene


    To prepare the base scene, follow these steps:


    1. Open the photo in `Photoshop Mix`.

    2. Tap the plus icon to create a new project and add the first photo to the project.
    Currently, the main elements in the shot (the kids) are filling the screen. I
    want to move them to the bottom of the photo so I can add the sun to the upper
    part.

    3. Tap the plus icon on the layers part on the right to add a new layer.

    4. Tap `Add New Image Layer` and navigate in your `Camera Roll` to the extended
    sky photo (Figure [8-5](#A450041_1_En_8_Chapter.html#Fig5)).


    ![A450041_1_En_8_Fig5_HTML.jpg](A450041_1_En_8_Fig5_HTML.jpg)


    Figure 8-5 — Adding the sky to the current photo


    5. Use your two fingers to resize the top photo to make it appear that the sun
    is extended above the first image.

    6. Tap the `Blend` icon, and choose the `Darken` blending option. Then, tap the
    icon on the top right to apply the blending (Figure [8-6](#A450041_1_En_8_Chapter.html#Fig6)).

    7. Tap the `Share` icon, and save the results on your iPhone.


    ![A450041_1_En_8_Fig6_HTML.jpg](A450041_1_En_8_Fig6_HTML.jpg)


    Figure 8-6 — Apply the `Darken` blending to the photo


    ### Step 2: Remove the Earth Background


    To remove the Earth background, follow these steps:


    1. Open the downloaded Earth photo in the `Eraser` app.

    2. Tap the `Erase` icon at the bottom.

    3. Tap the `Erase` icon.

    4. Tap the `Target` icon, and tap the black background color in the photo. Then
    tap `Done` (Figure [8-7](#A450041_1_En_8_Chapter.html#Fig7)).


    ![A450041_1_En_8_Fig7_HTML.jpg](A450041_1_En_8_Fig7_HTML.jpg)


    Figure 8-7 — Remove the background using the `Target` icon


    5. Tap the `Adjust` icon and then choose the `Smooth` tool.

    6. Drag the slider to the right to increase the smoothness of the earth’s edges
    (Figure [8-8](#A450041_1_En_8_Chapter.html#Fig8)).

    7. Tap the `Share` icon. Set the format to `PNG` to generate a transparent photo
    and use the biggest size for the saved photo. Then tap `Save` to add it to the
    `Camera Roll`.


    ![A450041_1_En_8_Fig8_HTML.jpg](A450041_1_En_8_Fig8_HTML.jpg)


    Figure 8-8 — Increase the smoothness of the earth’s edges


    ### Step 3: Add the Earth to the Composition


    To add the earth to the composition, follow these steps:


    1. Open the `Photofox` app, and add to it the base photo from earlier in the chapter.

    2. Tap the plus icon on the right to add another layer. Then, tap the `Earth`
    photo.

    3. Use your two fingers to drag and resize the earth to be in place of the sun
    (Figure [8-9](#A450041_1_En_8_Chapter.html#Fig9)).


    ![A450041_1_En_8_Fig9_HTML.jpg](A450041_1_En_8_Fig9_HTML.jpg)


    Figure 8-9 — Resizing and positioning the `Earth` photo in the composition


    4. From the `Layers` tab on the button, tap the `Blending` mode.

    5. Tap the `Earth` layer, and set the blending mode to `Color Burn` (Figure [8-10](#A450041_1_En_8_Chapter.html#Fig10)).


    ![A450041_1_En_8_Fig10_HTML.jpg](A450041_1_En_8_Fig10_HTML.jpg)


    Figure 8-10 — Applying the `Burn` blending mode to the earth


    6. Now, I want to reduce the intensity of the earth’s colors. So, I will tap the
    `Image` tab and select the `Saturation`. Drag the top slider to the left to reduce
    it (Figure [8-11](#A450041_1_En_8_Chapter.html#Fig11)).

    7. Tap the `Apply` icon on the top right.

    8. Tap the `Share` icon, and choose `Save to Camera Roll`.


    ![A450041_1_En_8_Fig11_HTML.jpg](A450041_1_En_8_Fig11_HTML.jpg)


    Figure 8-11 — Reduce the intensity of the earth’s colors by reducing the saturation'
