- fmt: '# Unleash Your iPhone Camera’s Capabilities


    While the camera doesn’t make the photographer, a good camera can definitely take
    your creative shots to another dimension and extend your ability to apply different
    techniques, especially with the evolving technologies related to digital photography
    cameras. The same rule applies to phone photography. The excellent camera in your
    iPhone allows you to take photos for both professional and personal purposes without
    the need to hold heavy photography gear. The Apple iPhone’s camera is one of the
    features that sets the phone above the competitors.


    To get the most of your iPhone camera, it is crucial to understand the camera’s
    capabilities and the different features that can help you take good photos using
    both the default and third-party photography apps. In this chapter, you’ll explore
    the capabilities of the default camera and the `Photos` app before moving on to
    different photography techniques in the remaining chapters.


    ## Mastering Your iPhone Camera


    Your iPhone camera has hidden features that can help you open the `Camera` app
    quickly. You can also improve your photo’s composition by applying a grid system
    to align your scene.


    ### Get Easy Access to Your Camera


    One of the iPhone’s advantages is the ability to quickly take photos anywhere
    and anytime. All you need to do is grab the phone out of your pocket or bag, open
    the `Camera` application, and take the shot. However, you need to know how to
    quickly access the `Camera` app in order to catch those special moments, such
    as your kids playing or your favorite team winning the game. The iPhone gives
    you three main ways to access the `Camera` app quickly.


    #### Swipe to Open


    The first method is to swipe through your screen. This allows you to open the
    `Camera` app while the phone is locked, which is considered the quickest way to
    access the camera. Follow these steps:


    ![A450041_1_En_1_Fig1_HTML.jpg](A450041_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Swipe from the right side of the screen toward the left side to open the `Camera`
    app


    1. If your iPhone is asleep, press the home button once to open the display.

    2. While you are on the lock screen, swipe from the right side of the screen toward
    the left side to open the `Camera` app, as shown in Figure [1-1](#A450041_1_En_1_Chapter.html#Fig1).


    #### Use the Phone Control Center


    The second method can be used while the phone is locked or unlocked; you just
    go through the phone’s `Control Center`.


    ![A450041_1_En_1_Fig2_HTML.jpg](A450041_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Swipe from the bottom of the screen toward the top to open the `Control Center`


    1. If your iPhone is asleep, press the home button once to open the display.

    2. Swipe with your figure from the home button toward the top of your phone, as
    shown in Figure [1-2](#A450041_1_En_1_Chapter.html#Fig2).

    3. Tap the `Camera` app in the `Control Center`.


    These two methods are helpful when you need to easily access the camera when the
    phone is locked, while the next method allows you to access the camera quickly
    while you are using other applications on the phone.


    #### Add the Camera App to the Dock


    The third method is to add the `Camera` app to the dock of your phone. This helps
    you easily find the camera among the other applications installed on your mobile
    device. You can add the camera to the dock as follows:


    ![A450041_1_En_1_Fig3_HTML.jpg](A450041_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Drag the `Camera` app to the screen dock


    1. Press your phone’s home button twice to access the main screen (use a fingerprint
    or passcode if needed).

    2. Tap and hold slightly on the `Camera` app icon; you will see it vibrate to
    indicate it can be repositioned, as shown in Figure [1-3](#A450041_1_En_1_Chapter.html#Fig3).

    3. Drag it to the screen dock next to your most used applications such as the
    `Mail` app and the `Safari` browser. If the dock is full, you can add it by removing
    the least used application from the dock.


    ### Take Your Shot in Multiple Ways


    The iPhone helps you to take your photo through three different methods based
    on different situations. The default method is to tap the camera button once to
    take the shot, as highlighted in Figure [1-4](#A450041_1_En_1_Chapter.html#Fig4).


    You can also press the volume button up or down to take the shot, also shown in
    Figure [1-4](#A450041_1_En_1_Chapter.html#Fig4). This option helps you to hold
    your phone properly while taking the shot. It works similarly to the shutter button
    on your digital camera if your phone is in landscape position. Finally, if you
    are using a wired headset, you can use the volume buttons on your headset to take
    your shot. This helps you to take photos stealthily. For example, you can capture
    natural moments of your children playing without them noticing to produce spontaneous
    photos. Using the headset buttons can help you avoid shaking the phone while taking
    the picture.


    ![A450041_1_En_1_Fig4_HTML.jpg](A450041_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Tap the camera button or press the volume button to take photos


    ### Enable the Grid Guides


    As you probably know, the composition of a photo plays an essential role in making
    a great shot. The `Camera` app provides grids that can guide you while taking
    your shot to ensure that the composition is visually appealing. The `Grid` option
    divides the screen into three columns and three rows. This can help you to place
    the elements exactly where you want them in the photo. Follow these steps to enable
    the `Grid` feature:


    ![A450041_1_En_1_Fig5_HTML.jpg](A450041_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Activate the `Grid` setting from the `Photos & Camera` settings


    1. Tap the `Settings` icon on your phone.

    2. Scroll down and tap `Photo & Camera`.

    3. Activate the `Grid` feature in the `Camera` section, as shown in Figure [1-5](#A450041_1_En_1_Chapter.html#Fig5).


    ### Shoot in Burst Mode


    For fast-moving events such as sports or children playing, you may need to take
    multiple shots of the same event so you can pick the best shot later. While tapping
    the camera button repeatedly would be too slow, the iPhone’s Burst mode can help.
    It allows you to take multiple photos almost instantly by simply tapping and holding
    the camera button. The longer you hold the button, the more photos are taken in
    burst mode.


    Once you release the button, the photos are saved in a special folder in the `Camera
    Roll` called the `Burst` folder. To see the photos in the `Burst` folder, you
    can follow these steps:


    ![A450041_1_En_1_Fig6_HTML.jpg](A450041_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Select the different images in the burst set


    1. In the `Photos` app, tap the `Burst` folder to select it.

    2. Tap `Select` in the middle-bottom toolbar.

    3. Navigate through the different photos in the burst set, as shown in Figure
    [1-6](#A450041_1_En_1_Chapter.html#Fig6).


    To select one photo in the folder, you can do the following:


    1. Select the image and tap `Done` at the top right of the screen, as shown in
    Figure [1-6](#A450041_1_En_1_Chapter.html#Fig6).

    2. Either tap `Keep Everything` to keep the folder and save the selected image
    (or images) as a separate image or tap `Keep One Favorite` to keep the selected
    image only and delete the rest.


    Once either of the options is selected, the selected image (or images) is separated
    from the `Burst` folder and added to your photos as a normal photo.'
