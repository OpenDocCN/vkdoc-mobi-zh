    \ to sync photos automatically.  \n8.  Deactivate Auto Add Videos to avoid syncing\
    \ videos.\n\n    ![A450041_1_En_6_Fig2_HTML.jpg](A450041_1_En_6_Fig2_HTML.jpg)\n\
    \n    Figure 6-2\n\n    Creative Cloud sync settings  \n\nTo review the synced\
    \ documents, you need the Adobe Creative Cloud app installed on both your iPhone\
    \ and your computer. When you log into your cloud app from your iPhone, you will\
    \ be able to check the synced documents based on their type (see Figure [6-3](#A450041_1_En_6_Chapter.html#Fig3)).\n\
    \n![A450041_1_En_6_Fig3_HTML.jpg](A450041_1_En_6_Fig3_HTML.jpg)\n\nFigure 6-3\n\
    \nViewing the synced documents from the Creative Cloud console\n\nOn your desktop\
    \ computer, the Creative Cloud console allows you to view the cloud documents,\
    \ find applications to download, find fonts, and see your follower updates (Community).\
    \ You can also access the documents you saved from your iPhone to the cloud storage\
    \ as follows:\n\n1.  Open the Creative Cloud console. If it is not downloaded,\
    \ you can download it from Adobe.com.  \n2.  Click the Assets tab and then choose\
    \ Files. Here, you can learn about your storage, the type of subscription (either\
    \ free or paid), and the file update status.  \n3.  Click Open Folder to open\
    \ the local folder where you can find the synced files from your iPhone (see Figure\
    \ [6-4](#A450041_1_En_6_Chapter.html#Fig4)).\n\n    ![A450041_1_En_6_Fig4_HTML.jpg](A450041_1_En_6_Fig4_HTML.jpg)\n\
    \n    Figure 6-4\n\n    Setting up the Lightroom options from the main menu\n\n\
    ## Integrate Files with Desktop Photoshop\n\nOnce you log into the iPhone Adobe\
    \ apps and prepare to sync photos between the app and desktop applications, you\
    \ can send the files from these apps to the desktop version, where they are synced\
    \ in the cloud. Then the files will be opened automatically in the associated\
    \ application. In the following example, you will send a document from the Photoshop\
    \ Fix app to Photoshop on the desktop and explore how the sent file has preserved\
    \ its structure:\n\n1.  Make sure that the Creative Cloud console app is installed\
    \ on the desktop computer and that both the computer and the iPhone are connected\
    \ to the Internet.  \n2.  Open the Photoshop Fix app on the iPhone.  \n3.  Select\
    \ one of the existing projects or create a new one. Make sure that the file is\
    \ optimized and doesn’t have any unwanted layers to avoid slow syncing between\
    \ the app and the desktop version of Photoshop (see Figure [6-5](#A450041_1_En_6_Chapter.html#Fig5)).\n\
    \n    ![A450041_1_En_6_Fig5_HTML.jpg](A450041_1_En_6_Fig5_HTML.jpg)\n\n    Figure\
    \ 6-5\n\n    One photo in Photoshop Fix  \n4.  Click the Share icon. You can choose\
    \ to send the document to Photoshop CC , save it for the Lightroom app, or save\
    \ it in the cloud storage only. Choose Send to Photoshop CC (see Figure [6-6](#A450041_1_En_6_Chapter.html#Fig6)).\n\
    \n    ![A450041_1_En_6_Fig6_HTML.jpg](A450041_1_En_6_Fig6_HTML.jpg)\n\n    Figure\
    \ 6-6\n\n    Sharing the project with Photoshop CC  \n\nNotice that the desktop\
    \ Photoshop opens with the document in it. In the Layers panel, you can check\
    \ the effects and adjustments applied to the photo. If you applied any healing\
    \ effects, for example, they will show up in a new layer above the original photo.\
    \ This nondestructive modification can help you to edit and modify the effects\
    \ even after opening them in Photoshop CC on the desktop (see Figure [6-7](#A450041_1_En_6_Chapter.html#Fig7)).\n\
    \n![A450041_1_En_6_Fig7_HTML.jpg](A450041_1_En_6_Fig7_HTML.jpg)\n\nFigure 6-7\n\
    \nThe photo in Photoshop CC\n\n## Complete an iPhone Photo on the Computer\n\n\
    Tools used: Photoshop Fix app, Photoshop CC desktop\n\nFigure [6-8](#A450041_1_En_6_Chapter.html#Fig8)\
    \ shows the original photo I used in this example.\n\n![A450041_1_En_6_Fig8_HTML.jpg](A450041_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8\n\nThe original photo\n\nFigure [6-9](#A450041_1_En_6_Chapter.html#Fig9)\
    \ shows the final results.\n\n![A450041_1_En_6_Fig9_HTML.jpg](A450041_1_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9\n\nFinal result\n\nTo practice the integration between the iPhone\
    \ and your computer, I have a photo that I took of the city of Newcastle in the\
    \ United Kingdom using my iPhone. I will edit this photo using the Photoshop Fix\
    \ app. Then I will send it to Photoshop CC to complete the project by adding noise\
    \ to the photo. This will give it an old-style effect; then I will apply a vignette\
    \ to the edges of the photo. To follow along, continue reading.\n\n### Step 1:\
    \ Fix a Photo on the iPhone\n\nHere are the steps:\n\n1.  Open Photoshop Fix.\
    \ Tap the plus icon to create a new project.  \n2.  Tap On My Photo and navigate\
    \ to the photo in the Camera Roll.  \n3.  Tap the Crop icon to crop the bottom\
    \ part of the photo.  \n4.  Tap Original in the cropping options to maintain the\
    \ same ratio of the photo. Drag the bottom-left edge to remove the lower part\
    \ of the shot and focus on the building (see Figure [6-10](#A450041_1_En_6_Chapter.html#Fig10)).\n\
    \n    ![A450041_1_En_6_Fig10_HTML.jpg](A450041_1_En_6_Fig10_HTML.jpg)\n\n    Figure\
    \ 6-10\n\n    Crop the photo to focus on the main object ad remove distractions\
    \  \n5.  Tap the Healing icon to remove the traffic light and the wires above\
    \ the building from the shot.  \n6.  Choose the Clone Stamp tool. Click the area\
    \ of the tree next to the top part of the traffic light (see Figure [6-11](#A450041_1_En_6_Chapter.html#Fig11)).\n\
    \n    ![A450041_1_En_6_Fig11_HTML.jpg](A450041_1_En_6_Fig11_HTML.jpg)\n\n    Figure\
    \ 6-11\n\n    Using the Clone Stamp to fix the photo  \n7.  Tap the Spot Healing\
    \ tool and paint over the wires above the building to remove them; then tap Apply\
    \ (see Figure [6-12](#A450041_1_En_6_Chapter.html#Fig12)).\n\n    ![A450041_1_En_6_Fig12_HTML.jpg](A450041_1_En_6_Fig12_HTML.jpg)\n\
    \n    Figure 6-12\n\n    Using the Spot Healing tool\n\n### Step 2: Send the Document\
    \ to Photoshop CC\n\nTo send the document to Photoshop CC, follow these steps:\n\
    \n1.  Tap the Share icon in Photoshop Fix.  \n2.  Tap Send to Photoshop CC (see\
    \ Figure [6-13](#A450041_1_En_6_Chapter.html#Fig13)).  \n\nThe document is updated\
    \ and sent to Photoshop CC through the Creative Cloud.\n\n![A450041_1_En_6_Fig13_HTML.jpg](A450041_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13\n\nSending the photo to Photoshop CC"
  trans: "\n# 准备将 iPhone 集成\n\n为了在 iPhone 上的 Adobe 应用与桌面版本之间进行集成，你需要从应用内登录 Creative\
    \ Cloud。这样你就能通过 Creative Cloud 与电脑共享文件。实际上，你可以通过 Creative Cloud 集成所有 Adobe 移动应用。以下步骤演示如何从\
    \ Lightroom 应用连接到云：\n\n1.  打开 Adobe Lightroom 应用。如果你尚未登录，你会看到一个`登录`按钮；点击它。\n2.\
    \  在`登录`屏幕上，输入你的 Adobe ID 用户名和密码，然后点击`登录`（见图 6-1）。\n\n    ![A450041_1_En_6_Fig1_HTML.jpg](img/A450041_1_En_6_Fig1_HTML.jpg)\n\
    \n    图 6-1 登录进入 Creative Cloud\n\n3.  点击左上角的 Lightroom 徽标图标以打开应用菜单（见图 6-2）。\n\
    4.  激活`仅通过 Wi-Fi 同步`，以避免消耗你的移动数据流量，并确保仅在连接 Wi-Fi 时进行同步。\n5.  停用`阻止休眠`，允许手机在同步时进入休眠状态，这样可以节省电量。\n\
    6.  激活`加载全分辨率`，以便为照片使用最高分辨率。\n7.  激活`自动添加照片`以自动同步照片。\n8.  停用`自动添加视频`以避免同步视频。\n\
    \n    ![A450041_1_En_6_Fig2_HTML.jpg](img/A450041_1_En_6_Fig2_HTML.jpg)\n\n  \
    \  图 6-2 Creative Cloud 同步设置\n\n要查看已同步的文档，你需要在 iPhone 和电脑上都安装 Adobe Creative Cloud\
    \ 应用。当你在 iPhone 上登录云应用后，就能根据文档类型查看已同步的文档（见图 6-3）。\n\n![A450041_1_En_6_Fig3_HTML.jpg](img/A450041_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3 从 Creative Cloud 控制台查看已同步的文档\n\n在你的桌面电脑上，Creative Cloud 控制台允许你查看云文档、查找可下载的应用、查找字体以及查看关注者的更新（社区）。你还可以按以下方式访问从\
    \ iPhone 保存到云存储的文档：\n\n1.  打开 Creative Cloud 控制台。如果尚未下载，你可以从 Adobe.com 下载。\n2.\
    \  点击`资源`标签，然后选择`文件`。在这里，你可以了解存储空间、订阅类型（免费或付费）以及文件更新状态。\n3.  点击`打开文件夹`以打开本地文件夹，你可以在其中找到从\
    \ iPhone 同步的文件（见图 6-4）。\n\n    ![A450041_1_En_6_Fig4_HTML.jpg](img/A450041_1_En_6_Fig4_HTML.jpg)\n\
    \n    图 6-4 从主菜单设置 Lightroom 选项\n\n## 与桌面版 Photoshop 集成文件\n\n一旦你登录 iPhone 的 Adobe\
    \ 应用并准备在应用与桌面应用之间同步照片，你就可以将这些应用中的文件发送到桌面版本，文件将在云端同步。然后文件会在关联的应用中自动打开。在以下示例中，你将把\
    \ Photoshop Fix 应用中的文档发送到桌面版 Photoshop，并探究发送的文件如何保留其结构：\n\n1.  确保桌面电脑上已安装 Creative\
    \ Cloud 控制台应用，并且电脑和 iPhone 都已连接互联网。\n2.  在 iPhone 上打开 Photoshop Fix 应用。\n3.  选择一个现有项目或创建一个新项目。确保文件已优化且没有不需要的图层，以避免应用与桌面版\
    \ Photoshop 之间的同步速度变慢（见图 6-5）。\n\n    ![A450041_1_En_6_Fig5_HTML.jpg](img/A450041_1_En_6_Fig5_HTML.jpg)\n\
    \n    图 6-5 Photoshop Fix 中的一张照片\n\n4.  点击共享图标。你可以选择将文档发送到 Photoshop CC、保存到 Lightroom\
    \ 应用，或仅保存到云存储。选择`发送到 Photoshop CC`（见图 6-6）。\n\n    ![A450041_1_En_6_Fig6_HTML.jpg](img/A450041_1_En_6_Fig6_HTML.jpg)\n\
    \n    图 6-6 与 Photoshop CC 共享项目\n\n请注意，桌面版 Photoshop 会打开并显示该文档。在`图层`面板中，你可以查看应用于照片的效果和调整。例如，如果你应用了任何修复效果，它们会显示在原始照片上方的新图层中。这种非破坏性修改有助于你在桌面版\
    \ Photoshop CC 中打开后，仍能编辑和修改这些效果（见图 6-7）。\n\n![A450041_1_En_6_Fig7_HTML.jpg](img/A450041_1_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7 Photoshop CC 中的照片\n\n## 在电脑上完成 iPhone 照片编辑\n\n所用工具：Photoshop Fix 应用、Photoshop\
    \ CC 桌面版\n\n图 6-8 显示了我在本例中使用的原始照片。\n\n![A450041_1_En_6_Fig8_HTML.jpg](img/A450041_1_En_6_Fig8_HTML.jpg)\n\
    \n图 6-8 原始照片\n\n图 6-9 显示了最终结果。\n\n![A450041_1_En_6_Fig9_HTML.jpg](img/A450041_1_En_6_Fig9_HTML.jpg)\n\
    \n图 6-9 最终结果\n\n为了练习 iPhone 与电脑之间的集成，我用 iPhone 拍摄了一张英国纽卡斯尔市的照片。我将使用 Photoshop\
    \ Fix 应用编辑这张照片。然后将其发送到 Photoshop CC，通过添加噪点来完成项目，以营造复古风格效果；接着在照片边缘应用暗角效果。要继续操作，请继续阅读。\n\
    \n### 步骤 1：在 iPhone 上修复照片\n\n具体步骤如下：\n\n1.  打开 Photoshop Fix。点击加号图标以创建新项目。\n2.\
    \  点击`我的照片`，然后导航到“相机胶卷”中的照片。\n3.  点击裁剪图标以裁剪照片的底部区域。\n4.  在裁剪选项中点击`原始`以保持照片的原始比例。拖拽左下边缘以移除镜头下半部分，并将焦点集中在建筑物上（见图\
    \ 6-10）。\n\n    ![A450041_1_En_6_Fig10_HTML.jpg](img/A450041_1_En_6_Fig10_HTML.jpg)\n\
    \n    图 6-10 裁剪照片以聚焦主体并去除干扰\n\n5.  点击修复图标以移除镜头中建筑物上方的交通信号灯和电线。\n6.  选择`仿制图章`工具。点击交通信号灯顶部旁边树木的区域（见图\
    \ 6-11）。\n\n    ![A450041_1_En_6_Fig11_HTML.jpg](img/A450041_1_En_6_Fig11_HTML.jpg)\n\
    \n    图 6-11 使用仿制图章修复照片\n\n7.  点击`污点修复`工具，涂抹建筑物上方的电线以将其移除；然后点击`应用`（见图 6-12）。\n\
    \n    ![A450041_1_En_6_Fig12_HTML.jpg](img/A450041_1_En_6_Fig12_HTML.jpg)\n\n\
    \    图 6-12 使用污点修复工具\n\n### 步骤 2：将文档发送到 Photoshop CC\n\n要将文档发送到 Photoshop CC，请按以下步骤操作：\n\
    \n1.  在 Photoshop Fix 中点击共享图标。\n2.  点击`发送到 Photoshop CC`（见图 6-13）。\n\n文档将通过 Creative\
    \ Cloud 更新并发送到 Photoshop CC。\n\n![A450041_1_En_6_Fig13_HTML.jpg](img/A450041_1_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13 将照片发送到 Photoshop CC\n"
- fmt: "### Step 3: Apply Effects in Photoshop CC\n\nHere are the steps to apply some\
    \ effects in Photoshop CC:\n\n1. If the document didn’t open automatically in\
    \ Photoshop CC, click the Creative Cloud console, choose `Assets` ➤ `Files`, and\
    \ click `Open Folder`.\n2. Open the photo in Photoshop CC.\n3. I would like to\
    \ apply the effects on all the documents, so I will convert the layers group to\
    \ a smart layer. To follow along, click the layer group at the top of the Layers\
    \ panel; then choose `Filter` ➤ `Convert to Smart Filters` (see Figure 6-14).\n\
    \n   ![A450041_1_En_6_Fig14_HTML.jpg](A450041_1_En_6_Fig14_HTML.jpg)\n\n   Figure\
    \ 6-14 Converting the layers to a smart object\n4. Click `OK` to convert the layers\
    \ to a smart object.\n5. In the Filter list, choose `Camera Raw Filter` (see Figure\
    \ 6-15).\n\n   ![A450041_1_En_6_Fig15_HTML.jpg](A450041_1_En_6_Fig15_HTML.jpg)\n\
    \n   Figure 6-15 Opening the image in Camera Raw\n6. Click the `FX` icon on the\
    \ right side.\n7. Set the Grain amount to `100`, Size to `70`, and Roughness to\
    \ `70`.\n8. Set Post Crop Vignetting to `-50` (see Figure 6-16).\n9. Tap `OK`.\n\
    \n   ![A450041_1_En_6_Fig16_HTML.jpg](A450041_1_En_6_Fig16_HTML.jpg)\n\n   Figure\
    \ 6-16 Applying the Grain and vignetting effects on the photo\n\n## Summary\n\n\
    You can extend your iPhone photo-editing abilities by integrating your work with\
    \ desktop applications such as Photoshop and Lightroom. This helps you to add\
    \ even more effects and styles to your work. Furthermore, it will help you view\
    \ the fine details of your editing work on a bigger screen. If you are using the\
    \ Adobe mobile apps, you can easily integrate your work with the desktop applications\
    \ through the Creative Cloud. You can just send the work you did in the Adobe\
    \ apps on the iPhone such as Photoshop Mix to the desktop. The file will be opened\
    \ on the desktop in its associated application, where you will find the layers\
    \ preserved.\n\n## Practice Exercise\n\nStart a photo-editing project that involves\
    \ taking a photo and editing it in one of the Adobe mobile apps such as Lightroom\
    \ or Photoshop Fix. Then, send the document to Photoshop CC and complete the work\
    \ there.\n\n# 7. Turning Photos into Fine Art\n\nBoth photography and fine art\
    \ are considered art. While photography depends on the camera to create the visual\
    \ artwork, fine art uses different tools such as brushes, drawing pens, pastels,\
    \ and others. Digital applications can help you to simulate the effect of the\
    \ fine art tools and apply them to your photos to create what looks like a painting\
    \ or drawing. There are many apps that help you create fine art effects on the\
    \ iPhone, and you can even use multiple apps to improve the final result of your\
    \ art piece.\n\nThe tips in this chapter show how to turn some of your iPhone\
    \ photos into fine art pieces.\n\n## Create Pop Artwork\n\nTools used: Prisma\
    \ app, Lightroom app\n\nFigure 7-1 shows the original photo that I used in this\
    \ example. You can use a similar photo to follow along with the exercise.\n\n\
    ![A450041_1_En_7_Fig1_HTML.jpg](A450041_1_En_7_Fig1_HTML.jpg)\n\nFigure 7-1 Original\
    \ photo\n\nFigure 7-2 shows the final result.\n\n![A450041_1_En_7_Fig2_HTML.jpg](A450041_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2 Final result\n\nIn this example, I have a photo of some urban architecture\
    \ that I want to convert to “pop” artwork. To do this, first you open a photo\
    \ in the Lightroom app to modify its color to be more vibrant and contrasted.\
    \ Then, you open it in the Prisma app to apply the artwork. Since there is not\
    \ much control over the colors in the Prisma app, you can take the artwork back\
    \ to Lightroom to modify the color combination.\n\n### Step 1: Modify the Photo\
    \ Light and Contrast\n\nTo modify the photo light and contrast, follow these steps:\n\
    \n1. Open a photo in Lightroom.\n2. Tap the Crop icon, and crop the image to focus\
    \ on the main element in the shot (see Figure 7-3).\n\n   ![A450041_1_En_7_Fig3_HTML.jpg](A450041_1_En_7_Fig3_HTML.jpg)\n\
    \n   Figure 7-3 Cropping the photo in the Lightroom app\n3. Tap the Light icon,\
    \ and increase the contrast of the image.\n4. Tap the Color icon, and increase\
    \ the Vibrance setting by dragging the slider to the right (see Figure 7-4).\n\
    5. Tap the Share icon, choose `Save to Camera Roll`, and select the `Maximum`\
    \ size.\n\n   ![A450041_1_En_7_Fig4_HTML.jpg](A450041_1_En_7_Fig4_HTML.jpg)\n\n\
    \   Figure 7-4 Increasing the color vibrancy for the shot\n\n### Step 2: Apply\
    \ the Pop Art Effect\n\nTo apply the pop art effect, follow these steps:\n\n1.\
    \ Open the Prisma app, swipe up with your finger to access the Camera Roll, and\
    \ select the photo you just modified in the Lightroom app.\n2. At the bottom,\
    \ drag to reach the Roy effect; it is the one that can help you to convert the\
    \ photo to pop art. If you need other effects, you can use any of the existing\
    \ effects or tap the Store icon to buy more artistic effects (see Figure 7-5).\n\
    3. Tap the Share icon that allows you to share the photo with different social\
    \ networks or save it to your iPhone.\n4. Tap the Save icon at the bottom to save\
    \ it to the Camera Roll.\n\n   ![A450041_1_En_7_Fig5_HTML.jpg](A450041_1_En_7_Fig5_HTML.jpg)\n\
    \n   Figure 7-5 Applying the pop art effect (Roy) in Prisma\n\n### Step 3: Change\
    \ the Pop Art Color\n\nTo change the pop art color, follow these steps:\n\n1.\
    \ Open the edited image in the Lightroom app.\n2. Tap the Presets icon, and select\
    \ `Cross Process 1` (see Figure 7-6).\n3. Tap the Apply icon.\n4. Tap the Share\
    \ icon, choose `Save to Camera Roll`, and choose the `Maximum` size.\n\n   ![A450041_1_En_7_Fig6_HTML.jpg](A450041_1_En_7_Fig6_HTML.jpg)\n\
    \n   Figure 7-6 Applying the Cross Process 1 preset in the Lightroom app\n\n##\
    \ Turn Photos into Mosaic Artwork\n\nTools used: Photoshop Fix, Deep Art Effect,\
    \ Photo Splash\n\nFigure 7-7 shows the original photo that I used in this example.\n\
    \n![A450041_1_En_7_Fig7_HTML.jpg](A450041_1_En_7_Fig7_HTML.jpg)\n\nFigure 7-7\
    \ Original photo\n\nFigure 7-8 shows the final result.\n\n![A450041_1_En_7_Fig8_HTML.jpg](A450041_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8 Final result\n\nIn this tip, you will learn how to turn a photo into\
    \ a mosaic or cubic artwork. Here, I used a photo that was taken during my visit\
    \ to Kuwait. It shows a nice view of a marina with skyscrapers in the background.\
    \ But before opening the photo in the Deep Art Effect app to create the mosaic\
    \ effect, I want to fix some issues in the photo, specifically, the wire that\
    \ cuts across the top right of the photo. After applying the effect, I will use\
    \ the Photo Splash app to improve the final effect colors. Use a similar photo\
    \ to follow along.\n\n### Step 1: Fix the Base Photograph\n\nTo fix the base photograph,\
    \ follow these steps:\n\n1. Open the photo in Photoshop Fix.\n2. Tap the Healing\
    \ icon, and tap `Spot Heal` in the bottom toolbar (see Figure 7-9).\n\n   ![A450041_1_En_7_Fig9_HTML.jpg](A450041_1_En_7_Fig9_HTML.jpg)\n\
    \n   Figure 7-9 Removing unwanted elements in the photo using the Spot Healing\
    \ tool\n3. In the left menu, set the size of the brush.\n4. Paint over the area\
    \ you would like to move. In this photo, I will paint over the wire in the sky\
    \ (see Figure 7-10).\n5. Tap the OK icon.\n6. Tap the Share icon, and choose `Save\
    \ to Camera Roll`.\n\n   ![A450041_1_En_7_Fig10_HTML.jpg](A450041_1_En_7_Fig10_HTML.jpg)\n\
    \n   Figure 7-10 Paint over the element you want to remove"
  raw: "### Step 3: Apply Effects in Photoshop CC\n\nHere are the steps to apply some\
    \ effects in Photoshop CC:\n\n1.  If the document didn’t open automatically in\
    \ Photoshop CC, click the Creative Cloud console, choose Assets ➤ Files, and click\
    \ Open Folder.  \n2.  Open the photo in Photoshop CC.  \n3.  I would like to apply\
    \ the effects on all the documents, so I will convert the layers group to a smart\
    \ layer. To follow along, click the layer group at the top of the Layers panel;\
    \ then choose Filter ➤ Convert to Smart Filters (see Figure [6-14](#A450041_1_En_6_Chapter.html#Fig14)).\n\
    \n    ![A450041_1_En_6_Fig14_HTML.jpg](A450041_1_En_6_Fig14_HTML.jpg)\n\n    Figure\
    \ 6-14\n\n    Converting the layers to a smart object  \n4.  Click OK to convert\
    \ the layers to a smart object.  \n5.  In the Filter list, choose Camera Raw Filter\
    \ (see Figure [6-15](#A450041_1_En_6_Chapter.html#Fig15)).\n\n    ![A450041_1_En_6_Fig15_HTML.jpg](A450041_1_En_6_Fig15_HTML.jpg)\n\
    \n    Figure 6-15\n\n    Opening the image in Camera Raw  \n6.  Click the FX icon\
    \ on the right side.  \n7.  Set the Grain amount to 100, Size to 70, and Roughness\
    \ to 70.  \n8.  Set Post Crop Vignetting to -50 (see Figure [6-16](#A450041_1_En_6_Chapter.html#Fig16)).\
    \  \n9.  Tap OK.\n\n    ![A450041_1_En_6_Fig16_HTML.jpg](A450041_1_En_6_Fig16_HTML.jpg)\n\
    \n    Figure 6-16\n\n    Applying the Grain and vignetting effects on the photo\n\
    \n## Summary\n\nYou can extend your iPhone photo-editing abilities by integrating\
    \ your work with desktop applications such as Photoshop and Lightroom. This helps\
    \ you to add even more effects and styles to your work. Furthermore, it will help\
    \ you view the fine details of your editing work on a bigger screen. If you are\
    \ using the Adobe mobile apps, you can easily integrate your work with the desktop\
    \ applications through the Creative Cloud. You can just send the work you did\
    \ in the Adobe apps on the iPhone such as Photoshop Mix to the desktop. The file\
    \ will be opened on the desktop in its associated application, where you will\
    \ find the layers preserved.\n\n## Practice Exercise\n\nStart a photo-editing\
    \ project that involves taking a photo and editing it in one of the Adobe mobile\
    \ apps such as Lightroom or Photoshop Fix. Then, send the document to Photoshop\
    \ CC and complete the work there.\n\n# 7. Turning Photos into Fine Art\n\nBoth\
    \ photography and fine art are considered art. While photography depends on the\
    \ camera to create the visual artwork, fine art uses different tools such as brushes,\
    \ drawing pens, pastels, and others. Digital applications can help you to simulate\
    \ the effect of the fine art tools and apply them to your photos to create what\
    \ looks like a painting or drawing. There are many apps that help you create fine\
    \ art effects on the iPhone, and you can even use multiple apps to improve the\
    \ final result of your art piece.\n\nThe tips in this chapter show how to turn\
    \ some of your iPhone photos into fine art pieces.\n\n## Create Pop Artwork\n\n\
    Tools used: Prisma app, Lightroom app\n\nFigure [7-1](#A450041_1_En_7_Chapter.html#Fig1)\
    \ shows the original photo that I used in this example. You can use a similar\
    \ photo to follow along with the exercise.\n\n![A450041_1_En_7_Fig1_HTML.jpg](A450041_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nOriginal photo\n\nFigure [7-2](#A450041_1_En_7_Chapter.html#Fig2)\
    \ shows the final result.\n\n![A450041_1_En_7_Fig2_HTML.jpg](A450041_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\n\nFinal result\n\nIn this example, I have a photo of some urban\
    \ architecture that I want to convert to “pop” artwork. To do this, first you\
    \ open a photo in the Lightroom app to modify its color to be more vibrant and\
    \ contrasted. Then, you open it in the Prisma app to apply the artwork. Since\
    \ there is not much control over the colors in the Prisma app, you can take the\
    \ artwork back to Lightroom to modify the color combination.\n\n### Step 1: Modify\
    \ the Photo Light and Contrast\n\nTo modify the photo light and contrast, follow\
    \ these steps:\n\n1.  Open a photo in Lightroom.  \n2.  Tap the Crop icon, and\
    \ crop the image to focus on the main element in the shot (see Figure [7-3](#A450041_1_En_7_Chapter.html#Fig3)).\n\
    \n    ![A450041_1_En_7_Fig3_HTML.jpg](A450041_1_En_7_Fig3_HTML.jpg)\n\n    Figure\
    \ 7-3\n\n    Cropping the photo in the Lightroom app  \n3.  Tap the Light icon,\
    \ and increase the contrast of the image.  \n4.  Tap the Color icon, and increase\
    \ the Vibrance setting by dragging the slider to the right (see Figure [7-4](#A450041_1_En_7_Chapter.html#Fig4)).\
    \  \n5.  Tap the Share icon, choose Save to Camera Roll, and select the Maximum\
    \ size.\n\n    ![A450041_1_En_7_Fig4_HTML.jpg](A450041_1_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4\n\n    Increasing the color vibrancy for the shot\n\n### Step\
    \ 2: Apply the Pop Art Effect\n\nTo apply the pop art effect , follow these steps:\n\
    \n1.  Open the Prisma app, swipe up with your finger to access the Camera Roll,\
    \ and select the photo you just modified in the Lightroom app.  \n2.  At the bottom,\
    \ drag to reach the Roy effect; it is the one that can help you to convert the\
    \ photo to pop art. If you need other effects, you can use any of the existing\
    \ effects or tap the Store icon to buy more artistic effects (see Figure [7-5](#A450041_1_En_7_Chapter.html#Fig5)).\
    \  \n3.  Tap the Share icon that allows you to share the photo with different\
    \ social networks or save it to your iPhone.  \n4.  Tap the Save icon at the bottom\
    \ to save it to the Camera Roll.\n\n    ![A450041_1_En_7_Fig5_HTML.jpg](A450041_1_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5\n\n    Applying the pop art effect (Roy) in Prisma\n\n### Step\
    \ 3: Change the Pop Art Color\n\nTo change the pop art color , follow these steps:\n\
    \n1.  Open the edited image in the Lightroom app.  \n2.  Tap the Presets icon,\
    \ and select Cross Process 1 (see Figure [7-6](#A450041_1_En_7_Chapter.html#Fig6)).\
    \  \n3.  Tap the Apply icon.  \n4.  Tap the Share icon, choose Save to Camera\
    \ Roll, and choose the Maximum size.\n\n    ![A450041_1_En_7_Fig6_HTML.jpg](A450041_1_En_7_Fig6_HTML.jpg)\n\
    \n    Figure 7-6\n\n    Applying the Cross Process 1 preset in the Lightroom app\n\
    \n## Turn Photos into Mosaic Artwork\n\nTools used: Photoshop Fix, Deep Art Effect,\
    \ Photo Splash\n\nFigure [7-7](#A450041_1_En_7_Chapter.html#Fig7) shows the original\
    \ photo that I used in this example.\n\n![A450041_1_En_7_Fig7_HTML.jpg](A450041_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7\n\nOriginal photo\n\nFigure [7-8](#A450041_1_En_7_Chapter.html#Fig8)\
    \ shows the final result.\n\n![A450041_1_En_7_Fig8_HTML.jpg](A450041_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\n\nFinal result\n\nIn this tip, you will learn how to turn a photo\
    \ into a mosaic or cubic artwork. Here, I used a photo that was taken during my\
    \ visit to Kuwait. It shows a nice view of a marina with skyscrapers in the background.\
    \ But before opening the photo in the Deep Art Effect app to create the mosaic\
    \ effect, I want to fix some issues in the photo, specifically, the wire that\
    \ cuts across the top right of the photo. After applying the effect, I will use\
    \ the Photo Splash app to improve the final effect colors. Use a similar photo\
    \ to follow along.\n\n### Step 1: Fix the Base Photograph\n\nTo fix the base photograph\
    \ , follow these steps:\n\n1.  Open the photo in Photoshop Fix.  \n2.  Tap the\
    \ Healing icon, and tap Spot Heal in the bottom toolbar (see Figure [7-9](#A450041_1_En_7_Chapter.html#Fig9)).\n\
    \n    ![A450041_1_En_7_Fig9_HTML.jpg](A450041_1_En_7_Fig9_HTML.jpg)\n\n    Figure\
    \ 7-9\n\n    Removing unwanted elements in the photo using the Spot Healing tool\
    \  \n3.  In the left menu, set the size of the brush.  \n4.  Paint over the area\
    \ you would like to move. In this photo, I will paint over the wire in the sky\
    \ (see Figure [7-10](#A450041_1_En_7_Chapter.html#Fig10)).  \n5.  Tap the OK icon.\
    \  \n6.  Tap the Share icon, and choose Save to Camera Roll.\n\n    ![A450041_1_En_7_Fig10_HTML.jpg](A450041_1_En_7_Fig10_HTML.jpg)\n\
    \n    Figure 7-10\n\n    Paint over the element you want to remove"
  trans: "\n### 第 3 步：在 Photoshop CC 中应用效果\n\n以下是在 Photoshop CC 中应用一些效果的步骤：\n\n1.\
    \ 如果文档没有在 Photoshop CC 中自动打开，请单击 Creative Cloud 控制台，选择 `Assets` ➤ `Files`，然后单击\
    \ `Open Folder`。\n2. 在 Photoshop CC 中打开照片。\n3. 我想对所有文档应用效果，因此将图层组转换为智能图层。要跟随操作，请单击图层面板顶部的图层组，然后选择\
    \ `Filter` ➤ `Convert to Smart Filters`（见图 6-14）。\n\n   ![A450041_1_En_6_Fig14_HTML.jpg](img/A450041_1_En_6_Fig14_HTML.jpg)\n\
    \n   图 6-14 将图层转换为智能对象\n4. 单击 `OK` 将图层转换为智能对象。\n5. 在滤镜列表中，选择 `Camera Raw Filter`（见图\
    \ 6-15）。\n\n   ![A450041_1_En_6_Fig15_HTML.jpg](img/A450041_1_En_6_Fig15_HTML.jpg)\n\
    \n   图 6-15 在 Camera Raw 中打开图像\n6. 单击右侧的 `FX` 图标。\n7. 将颗粒数量设置为 `100`，大小设置为 `70`，粗糙度设置为\
    \ `70`。\n8. 将裁剪后暗角的数值设置为 `-50`（见图 6-16）。\n9. 点击 `OK`。\n\n   ![A450041_1_En_6_Fig16_HTML.jpg](img/A450041_1_En_6_Fig16_HTML.jpg)\n\
    \n   图 6-16 在照片上应用颗粒和暗角效果\n\n## 总结\n\n通过将 iPhone 的修图工作与 Photoshop 和 Lightroom\
    \ 等桌面应用程序集成，您可以扩展修图能力。这有助于您为作品添加更多效果和样式。此外，它还能让您在更大的屏幕上查看编辑工作的精细细节。如果您使用 Adobe\
    \ 移动应用，可以通过 Creative Cloud 轻松地将工作与桌面应用程序集成。您只需将在 iPhone 上的 Adobe 应用（如 Photoshop\
    \ Mix）中完成的作品发送到桌面。该文件将在桌面端的相应应用程序中打开，并且图层将得以保留。\n\n## 练习\n\n启动一个照片编辑项目，包括拍摄一张照片，然后在\
    \ Lightroom 或 Photoshop Fix 等 Adobe 移动应用中编辑它。接着，将文档发送到 Photoshop CC 并在其中完成后续工作。\n\
    \n# 7. 将照片变成艺术品\n\n摄影和美术都属于艺术范畴。摄影依赖相机来创作视觉艺术品，而美术则使用不同的工具，例如画笔、绘图笔、粉彩等。数字应用程序可以帮助您模拟美术工具的效果，并将其应用到照片上，从而创作出类似绘画或素描的作品。有许多应用可以帮助您在\
    \ iPhone 上创建美术效果，您甚至可以组合使用多个应用来改善艺术作品的最终效果。\n\n本章中的技巧将展示如何将 iPhone 中的一些照片转化为美术作品。\n\
    \n## 创作波普艺术作品\n\n使用的工具：Prisma 应用、Lightroom 应用\n\n图 7-1 展示了我在本例中使用的原始照片。您可以使用类似的照片来跟随练习。\n\
    \n![A450041_1_En_7_Fig1_HTML.jpg](img/A450041_1_En_7_Fig1_HTML.jpg)\n\n图 7-1 原始照片\n\
    \n图 7-2 展示了最终效果。\n\n![A450041_1_En_7_Fig2_HTML.jpg](img/A450041_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2 最终效果\n\n在本例中，我有一张城市建筑的照片，想将其转换成“波普”艺术作品。为此，首先在 Lightroom 应用中打开照片，调整其颜色，使其更加鲜艳并具有更高的对比度。然后，在\
    \ Prisma 应用中打开它，应用艺术效果。由于 Prisma 应用对颜色的控制有限，您可以将艺术作品带回 Lightroom 以调整颜色组合。\n\n\
    ### 步骤 1：修改照片的光线和对比度\n\n要修改照片的光线和对比度，请按照以下步骤操作：\n\n1. 在 Lightroom 中打开一张照片。\n2.\
    \ 点击裁剪图标，裁剪图像，聚焦于画面中的主要元素（见图 7-3）。\n\n   ![A450041_1_En_7_Fig3_HTML.jpg](img/A450041_1_En_7_Fig3_HTML.jpg)\n\
    \n   图 7-3 在 Lightroom 应用中裁剪照片\n3. 点击光线图标，增加图像的对比度。\n4. 点击颜色图标，向右拖动滑块以增加鲜艳度设置（见图\
    \ 7-4）。\n5. 点击共享图标，选择 `Save to Camera Roll`，然后选择 `Maximum` 大小。\n\n   ![A450041_1_En_7_Fig4_HTML.jpg](img/A450041_1_En_7_Fig4_HTML.jpg)\n\
    \n   图 7-4 增加画面的色彩鲜艳度\n\n### 步骤 2：应用波普艺术效果\n\n要应用波普艺术效果，请按照以下步骤操作：\n\n1. 打开 Prisma\
    \ 应用，用手指向上滑动以访问相机胶卷，然后选择您刚刚在 Lightroom 应用中修改过的照片。\n2. 在底部，拖动以找到 Roy 效果；该效果可以帮助您将照片转换为波普艺术。如果您需要其他效果，可以使用任何现有效果，或点击\
    \ Store 图标购买更多艺术效果（见图 7-5）。\n3. 点击共享图标，您可以通过它将照片分享到不同的社交网络或保存到 iPhone。\n4. 点击底部的保存图标，将其保存到相机胶卷。\n\
    \n   ![A450041_1_En_7_Fig5_HTML.jpg](img/A450041_1_En_7_Fig5_HTML.jpg)\n\n   图\
    \ 7-5 在 Prisma 中应用波普艺术效果（Roy）\n\n### 步骤 3：更改波普艺术颜色\n\n要更改波普艺术颜色，请按照以下步骤操作：\n\n\
    1. 在 Lightroom 应用中打开编辑后的图像。\n2. 点击预设图标，然后选择 `Cross Process 1`（见图 7-6）。\n3. 点击应用图标。\n\
    4. 点击共享图标，选择 `Save to Camera Roll`，然后选择 `Maximum` 大小。\n\n   ![A450041_1_En_7_Fig6_HTML.jpg](img/A450041_1_En_7_Fig6_HTML.jpg)\n\
    \n   图 7-6 在 Lightroom 应用中应用 Cross Process 1 预设\n\n## 将照片转化为马赛克艺术作品\n\n使用的工具：Photoshop\
    \ Fix、Deep Art Effect、Photo Splash\n\n图 7-7 展示了我在本例中使用的原始照片。\n\n![A450041_1_En_7_Fig7_HTML.jpg](img/A450041_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7 原始照片\n\n图 7-8 展示了最终效果。\n\n![A450041_1_En_7_Fig8_HTML.jpg](img/A450041_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8 最终效果\n\n在本技巧中，您将学习如何将照片转化为马赛克或立体派艺术作品。这里，我使用了一张在访问科威特期间拍摄的照片。照片展示了码头的美景，背景是摩天大楼。但是在\
    \ Deep Art Effect 应用中打开照片以创建马赛克效果之前，我想先修复照片中的一些问题，特别是横穿照片右上角的那条电线。应用效果后，我将使用 Photo\
    \ Splash 应用来改善最终效果的颜色。请使用类似的照片来跟随练习。\n\n### 步骤 1：修复基础照片\n\n要修复基础照片，请按照以下步骤操作：\n\
    \n1. 在 Photoshop Fix 中打开照片。\n2. 点击修复图标，然后在底部工具栏中点击 `Spot Heal`（见图 7-9）。\n\n  \
    \ ![A450041_1_En_7_Fig9_HTML.jpg](img/A450041_1_En_7_Fig9_HTML.jpg)\n\n   图 7-9\
    \ 使用污点修复画笔工具移除照片中不需要的元素\n3. 在左侧菜单中，设置画笔的大小。\n4. 在您想要移除的区域上涂抹。在这张照片中，我将在天空中的电线上涂抹（见图\
    \ 7-10）。\n5. 点击确定图标。\n6. 点击共享图标，然后选择 `Save to Camera Roll`。\n\n   ![A450041_1_En_7_Fig10_HTML.jpg](img/A450041_1_En_7_Fig10_HTML.jpg)\n\
    \n   图 7-10 涂覆您想要移除的元素\n"
- fmt: "### Step 2: Apply the Mosaic Effect\n\nTo apply the mosaic effect, follow\
    \ these steps:\n\n1.  Open the saved image in `Deep Art Effect`.  \n2.  In the\
    \ bottom effects, select the `Mosaic 1` effect. The effect will take a few seconds\
    \ to be applied to the photo.  \n3.  Tap the `Effect` icon (`Mosaic`), and drag\
    \ the slider a little to the left to reduce the intensity of the effect a little\
    \ (see Figure [7-11](#A450041_1_En_7_Chapter.html#Fig11)).  \n4.  Tap the `Save`\
    \ icon to save the photo to the Camera Roll.\n\n    ![A450041_1_En_7_Fig11_HTML.jpg](A450041_1_En_7_Fig11_HTML.jpg)\n\
    \n    Figure 7-11\n\n    Apply the mosaic effect to the photo\n\n### Step 3: Improve\
    \ the Mosaic Artwork Colors\n\nTo improve the mosaic artwork colors, follow these\
    \ steps:\n\n1.  Open the saved photo from the previous steps in `Photo Splash`.\
    \  \n2.  Tap the first icon on the left of the toolbar. Use the brush to paint\
    \ over the photo to create a mask (see Figure [7-12](#A450041_1_En_7_Chapter.html#Fig12)).\n\
    \n    ![A450041_1_En_7_Fig12_HTML.jpg](A450041_1_En_7_Fig12_HTML.jpg)\n\n    Figure\
    \ 7-12\n\n    Create a mask to apply the effect on it  \n3.  Tap the `Effects`\
    \ icon, and choose the third effect from the left (see Figure [7-13](#A450041_1_En_7_Chapter.html#Fig13)).\
    \  \n4.  Tap the `Next` icon and then tap the `Save` icon to save it to the Camera\
    \ Roll.  \n5.  Select the size of the image you would like to save.\n\n    ![A450041_1_En_7_Fig13_HTML.jpg](A450041_1_En_7_Fig13_HTML.jpg)\n\
    \n    Figure 7-13\n\n    Apply the effect to improve the mosaic artwork\n\n##\
    \ Turn Your Photo into an Oil Painting\n\nTools used: `Lightroom app`, `Glaze\
    \ app`\n\nFigure [7-14](#A450041_1_En_7_Chapter.html#Fig14) shows my original\
    \ photo.\n\n![A450041_1_En_7_Fig14_HTML.jpg](A450041_1_En_7_Fig14_HTML.jpg)\n\n\
    Figure 7-14\n\nOriginal photo (© Radwa Khali)\n\nFigure [7-15](#A450041_1_En_7_Chapter.html#Fig15)\
    \ shows the final result of this tip.\n\n![A450041_1_En_7_Fig15_HTML.jpg](A450041_1_En_7_Fig15_HTML.jpg)\n\
    \nFigure 7-15\n\nFinal results\n\nThe oil painting has an amazing artistic effect,\
    \ especially with how the brush adds the “paint” on the canvas to form the whole\
    \ picture. Actually, there are many apps that can help you create artistic effects\
    \ to look like oil paintings. In this tip, you will learn how to apply the oil\
    \ painting effect to a photo of an old car. Then, you will apply color gradients\
    \ over the photo to give it a more impressionist feel.\n\nSpecifically, I will\
    \ show how to modify the photo in `Lightroom` to give it more vibrant colors so\
    \ the applied painting effect uses the bright colors in the photo. Then, I will\
    \ show how to use the `Glaze` app to apply the effect on the photo. After applying\
    \ the effect, the photo will be returned to the `Lightroom` app to apply a selective\
    \ mask effect on some parts of the photo to give it more artistic colors.\n\n\
    ### Step 1: Improve the Photo Colors and Contrast\n\nTo improve the photo colors\
    \ and contrast, follow these steps:\n\n1.  Open the photo in the `Lightroom` app.\
    \  \n2.  Tap the `Color` icon, and increase the `Vibrance` setting of the photo.\
    \ Then, tap `Apply` at the top right.  \n3.  Tap the `Light` icon, and reduce\
    \ the contrast a little. This will show more details in the shot (see Figure [7-16](#A450041_1_En_7_Chapter.html#Fig16)).\n\
    \n    ![A450041_1_En_7_Fig16_HTML.jpg](A450041_1_En_7_Fig16_HTML.jpg)\n\n    Figure\
    \ 7-16\n\n    Increase the photo vibrancy and reduce its contrast  \n4.  Increase\
    \ the exposure a little to `+0.27`, reduce the highlights to `-13`, and increase\
    \ the shadows to `+25` (see Figure [7-17](#A450041_1_En_7_Chapter.html#Fig17)).\
    \  \n5.  Tap the `Apply` icon.  \n6.  Tap the `Share` icon, and save it to the\
    \ Camera Roll with the maximum size.\n\n    ![A450041_1_En_7_Fig17_HTML.jpg](A450041_1_En_7_Fig17_HTML.jpg)\n\
    \n    Figure 7-17\n\n    Increase the exposure of the photo, reduce the highlights,\
    \ and increase the shadows\n\n### Step 2: Apply the Oil Painting Effect\n\nTo\
    \ apply the oil painting effect, follow these steps:\n\n1.  Open the edited photo\
    \ from the previous steps in the `Glaze` app.  \n2.  Choose an oil painting effect\
    \ to apply. I used one with a realistic effect of the brush touch (see Figure\
    \ [7-18](#A450041_1_En_7_Chapter.html#Fig18)).  \n3.  Tap the `Share` icon and\
    \ then choose `Gallery` to save it to your Photos folder.\n\n    ![A450041_1_En_7_Fig18_HTML.jpg](A450041_1_En_7_Fig18_HTML.jpg)\n\
    \n    Figure 7-18\n\n    Apply the oil painting effect on the image\n\n### Step\
    \ 3: Improve the Painting Colors\n\nTo improve the painting colors, follow these\
    \ steps:\n\n1.  Open the photo from the previous apps in the `Lightroom` app again.\
    \  \n2.  Tap the `Selective` icon and then choose the `Linear mask` from the left\
    \ side of the screen.  \n3.  Drag to create a mask over the lower part of the\
    \ photo. You can use the square in the middle of the mask to change its location\
    \ (see Figure [7-19](#A450041_1_En_7_Chapter.html#Fig19)).\n\n    ![A450041_1_En_7_Fig19_HTML.jpg](A450041_1_En_7_Fig19_HTML.jpg)\n\
    \n    Figure 7-19\n\n    Apply a selective adjustment on the photo lower part\
    \  \n4.  Tap the `Color spectrum` and drag the point to the red side to add a\
    \ red hue to the masked part of the photo (see Figure [7-20](#A450041_1_En_7_Chapter.html#Fig20)).\n\
    \n    ![A450041_1_En_7_Fig20_HTML.jpg](A450041_1_En_7_Fig20_HTML.jpg)\n\n    Figure\
    \ 7-20\n\n    Use the `Color spectrum` to apply a red hue to the photo’s lower\
    \ part  \n5.  Increase `Saturation` to `+41` and tap the `Apply` icon.  \n6. \
    \ Tap the `Selective` icon again to apply another adjustment mask on the upper\
    \ part of the photo.  \n7.  Tap the `Linear` icon on the left side.  \n8.  Drag\
    \ to create a linear mask on the top part of the photo.  \n9.  Tap the `Color`\
    \ icon and use the `Color spectrum` to add a green color to the top part of the\
    \ shot (see Figure [7-21](#A450041_1_En_7_Chapter.html#Fig21)).\n\n    ![A450041_1_En_7_Fig21_HTML.jpg](A450041_1_En_7_Fig21_HTML.jpg)\n\
    \n    Figure 7-21\n\n    Apply green hue to the upper part of the photo  \n10.\
    \  Tap the `Apply` icon.  \n11.  Tap the `Selective` icon again, and this time\
    \ apply a `Radial mask` to the center of the photo.  \n12.  Tap the `Light` icon,\
    \ and increase the exposure to `+1.12` (see Figure [7-22](#A450041_1_En_7_Chapter.html#Fig22)).\n\
    \n    ![A450041_1_En_7_Fig22_HTML.jpg](A450041_1_En_7_Fig22_HTML.jpg)\n\n    Figure\
    \ 7-22\n\n    Apply a `Radial mask`, and increase the exposure of the center of\
    \ the image  \n13.  Tap the `Apply` icon. Then tap the `Apply` icon on the top-right\
    \ side of the screen to add the image to the library.  \n14.  Open it again, tap\
    \ the `Share` icon, and choose `Save to Camera Roll`. Set the size to `Maximum`\
    \ to save the artwork in your Photos library.\n\n## Add a Foggy Winter to Your\
    \ Photo\n\nTools used: `Tadaa app`, `Repix app`\n\nIn this example, I wanted to\
    \ convert a photo into a hyper-realistic painting. So, I picked a photo that I\
    \ took in Paris a few years ago with my iPhone and will show how to add a foggy\
    \ effect to it. I used the `Tadaa` app or any app that can create blur effect\
    \ to add the fog to the window. Then, I used the `Repix` app to add small water\
    \ drops on the window. The final effect should seem like you are looking at a\
    \ building through a window that is covered by fog and mist drops.\n\nFigure [7-23](#A450041_1_En_7_Chapter.html#Fig23)\
    \ shows the original photo that I started with.\n\n![A450041_1_En_7_Fig23_HTML.jpg](A450041_1_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23\n\nOriginal photo (© Rafiq Elmansy)\n\nFigure [7-24](#A450041_1_En_7_Chapter.html#Fig24)\
    \ shows the final photo.\n\n![A450041_1_En_7_Fig24_HTML.jpg](A450041_1_En_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24\n\nFinal results\n\n### Step 1: Add Fog to a Window\n\nTo add the\
    \ fog to the window, follow these steps:\n\n1.  Open the photo in the `Tadaa`\
    \ app.  \n2.  Slide the toolbar to the left to reveal the `Blur` icon; tap it.\
    \  \n3.  Set the blur type to `All` and set the blur to `30` (see Figure [7-25](#A450041_1_En_7_Chapter.html#Fig25)).\
    \  \n4.  Tap the `Apply` icon, and save the photo in the Camera Roll.\n\n    ![A450041_1_En_7_Fig25_HTML.jpg](A450041_1_En_7_Fig25_HTML.jpg)\n\
    \n    Figure 7-25\n\n    Apply the blur effect on the photo"
  raw: "### Step 2: Apply the Mosaic Effect\n\nTo apply the mosaic effect , follow\
    \ these steps:\n\n1.  Open the saved image in Deep Art Effect.  \n2.  In the bottom\
    \ effects, select the Mosaic 1 effect. The effect will take a few seconds to be\
    \ applied to the photo.  \n3.  Tap the Effect icon (Mosaic), and drag the slider\
    \ a little to the left to reduce the intensity of the effect a little (see Figure\
    \ [7-11](#A450041_1_En_7_Chapter.html#Fig11)).  \n4.  Tap the Save icon to save\
