    \n1.  Open the iTunes app.  \n2.  Click the iPhone icon at the top left.  \n3.\
    \  In the Settings section, click Photos.  \n4.  Select the Sync Photos check\
    \ box.  \n5.  In “Copy Photos from,” select the folder of the photos you would\
    \ like to sync.  \n6.  Choose to sync either all the folders or selected folder.\
    \  \n7.  Click Apply at the bottom right.\n\n## Summary\n\nWhile the iPhone storage\
    \ space may not help you to save an endless number of photos and projects, cloud\
    \ technology helps you overcome this barrier by giving you the chance to save\
    \ photos in different cloud services such as iCloud, Dropbox, Google Drive, One\
    \ Drive, and Adobe Cloud. You can use these services to efficiently manage the\
    \ space on your device to make sure you are not out of space when taking the next\
    \ shot. You can either use the free version of different applications to get a\
    \ small amount of storage space or subscribe to one service to get enough storage\
    \ for all your projects. You can also save photos on your computer by importing\
    \ them using the Photos app on a Mac or applications such as AnyTrans on Windows.\n\
    \n## Practice Exercise\n\nUse the techniques in this chapter to reduce the consumed\
    \ storage space on your device. Download one or more of the cloud service applications\
    \ and use it to save your photos. Notice how much space you can free up on your\
    \ device.\n\n# 11. Photo Editing for Social Networks\n\nSocial networks play an\
    \ essential part not only in your own Internet social life but in the photography\
    \ profession. Many photographers depend on their social profiles on Facebook,\
    \ Instagram, 500px, Pinterest, and other platforms to present and promote their\
    \ work. This helps their work get seen by a massive number of visitors to these\
    \ networks every day. Your iPhone makes it easy to share your work on these networks.\
    \ All you need is to take the shot, edit it if needed, and upload it directly\
    \ from any photo-editing app.\n\nOnline tools such as Adobe Spark also provide\
    \ features and tools that can help you edit photos. You can use their tools to\
    \ create dynamic photo projects and show your work to your clients, as you will\
    \ explore in this chapter’s tips.\n\n## Create an Attractive Photo Presentation\
    \ with Adobe Spark\n\nTools used: Adobe Spark Page\n\nAdobe Spark is a group of\
    \ mobile apps that help you create different social content with your photos.\
    \ Adobe Spark Page helps you create dynamic pages that can include photos, videos,\
    \ and text, and then you can share them your clients. Spark Video allows you to\
    \ merge a number of videos and add text transitions between them. The Smart Post\
    \ feature lets you edit photos and add text to them to create eye-catching social\
    \ posts.\n\nThe photos and text you create with Spark Page can be accessed either\
    \ through a desktop computer or mobile device. In the following steps, I will\
    \ show how to create a Spark page for my trip to Paris. Follow along with your\
    \ own photos.\n\n### Step 1: Create the Page Layout\n\nTo create the page layout,\
    \ follow these steps:\n\n1.  Open the Spark Page app. You can review the Inspiration\
    \ examples to see different layout examples (see Figure [11-1](#A450041_1_En_11_Chapter.html#Fig1)).\n\
    \n    ![A450041_1_En_11_Fig1_HTML.jpg](A450041_1_En_11_Fig1_HTML.jpg)\n\n    Figure\
    \ 11-1\n\n    The Inspiration examples in Adobe Spark Page  \n2.  Tap the plus\
    \ icon.  \n3.  Tap “Add title and subtitle” and enter your title (see Figure [11-2](#A450041_1_En_11_Chapter.html#Fig2)).\n\
    \n    ![A450041_1_En_11_Fig2_HTML.jpg](A450041_1_En_11_Fig2_HTML.jpg)\n\n    Figure\
    \ 11-2\n\n    Adding a text and subtitle to the page  \n4.  Tap the image icon\
    \ to add a photo background for the title.  \n5.  Scroll down to display the menu,\
    \ and tap the Text tool to add a paragraph of text about the photo project (see\
    \ Figure [11-3](#A450041_1_En_11_Chapter.html#Fig3)).\n\n    ![A450041_1_En_11_Fig3_HTML.jpg](A450041_1_En_11_Fig3_HTML.jpg)\n\
    \n    Figure 11-3\n\n    Adding the background image and paragraph text  \n6.\
    \  Tap the plus icon under the text to add more content, and select Photo Grid\
    \ to display a number of photos in a grid.  \n7.  Select the photos to add to\
    \ the grid and tap Add.  \n8.  Tap the plus icon next to the grid and add a description\
    \ text (see Figure [11-4](#A450041_1_En_11_Chapter.html#Fig4)).\n\n    ![A450041_1_En_11_Fig4_HTML.jpg](A450041_1_En_11_Fig4_HTML.jpg)\n\
    \n    Figure 11-4\n\n    Adding a photo grid to the Spark page  \n9.  Repeat the\
    \ previous steps to add more images to the project.  \n10.  In the top icons,\
    \ tap the Effects icon to change the fonts on the page. Select the Chic font (see\
    \ Figure [11-5](#A450041_1_En_11_Chapter.html#Fig5)).\n\n    ![A450041_1_En_11_Fig5_HTML.jpg](A450041_1_En_11_Fig5_HTML.jpg)\n\
    \n    Figure 11-5\n\n    Changing the page font\n\n### Step 2: Preview and Share\
    \ the Page\n\nTo preview and share the page, follow these steps:\n\n![A450041_1_En_11_Fig6_HTML.jpg](A450041_1_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6\n\nCreating a public link for the Spark page\n\n1.  Tap the Preview\
    \ icon at the top right of the screen to preview the created page.  \n2.  Tap\
    \ the Share icon and complete the page information such as the category and copyright.\
    \  \n3.  Swipe the Get Noticed option to make the page available on Adobe Spark\
    \ Page.  \n4.  Use the Share icons to share the page.  \n5.  Tap “Create public\
    \ link” to create a link that anyone can see for the page (see Figure [11-6](#A450041_1_En_11_Chapter.html#Fig6))."
  trans: "\n# 将 iPhone 照片导入电脑\n\n你可以使用 Mac 上的“`照片`”应用，通过 USB 数据线将 iPhone 与电脑连接，轻松将\
    \ iPhone 照片导入电脑。连接成功后，系统可能会询问你是否信任该电脑并允许其连接设备。接受该设置后，你便能在左侧导航窗格中看到 iPhone 的照片列表。\n\
    \n你可以按照以下步骤（见图 10-12）将照片从 iPhone 导入 Mac 电脑的“`照片`”应用中：\n\n![A450041_1_En_10_Fig12_HTML.jpg](img/A450041_1_En_10_Fig12_HTML.jpg)\n\
    \n图 10-12 使用 Mac 的“`照片`”应用导入 iPhone 照片\n\n1. 在 Mac 电脑上打开“`照片`”应用。\n2. 在左侧的“导入”窗格中选择你的\
    \ iPhone。\n3. 选择你想要导入的照片。\n4. 从顶部控制栏中选择“导入所有新项目”或“导入所选项目”。你可以勾选“导入后删除项目”来移除原始照片以节省空间。\n\
    \n如果你使用的是 Windows 电脑，只需将 iPhone 插入电脑，等待“`自动播放`”窗口弹出，然后选择导入照片即可。你也可以使用诸如 `AnyTrans`\
    \ 之类的应用程序。\n\n导入照片后，它们会被保存在“`照片`”应用文件夹中，你可以在应用内分享、调整或将其标记为收藏。若要将照片保存到“`访达`”中，以便在诸如\
    \ `Photoshop` 或 `Lightroom` 等照片编辑应用中打开，你需要按如下步骤导出（见图 10-13）：\n\n![A450041_1_En_10_Fig13_HTML.jpg](img/A450041_1_En_10_Fig13_HTML.jpg)\n\
    \n图 10-13 “`照片`”应用中的“导出照片”对话框\n\n1. 选择你需要导出的照片。\n2. 选择“文件”➤“导出”➤“导出照片”。\n3. 在导出对话框中，选择导出格式、色彩描述文件和大小；点击“导出”。\n\
    4. 将照片保存到你的本地电脑上。\n\n## 从电脑同步照片到 iPhone\n\n你可以使用 Mac 和 Windows 上都有的“`iTunes`”应用，轻松同步电脑和\
    \ iPhone 上的照片。这可以帮助你同步照片、音乐、图书、应用和播客。要同步照片，可以遵循以下步骤（见图 10-14）：\n\n![A450041_1_En_10_Fig14_HTML.jpg](img/A450041_1_En_10_Fig14_HTML.jpg)\n\
    \n图 10-14 使用“`iTunes`”应用从电脑和 iPhone 同步照片\n\n1. 打开“`iTunes`”应用。\n2. 点击左上角的 iPhone\
    \ 图标。\n3. 在“设置”部分，点击“照片”。\n4. 选中“同步照片”复选框。\n5. 在“从...复制照片”中，选择你想要同步的照片所在的文件夹。\n\
    6. 选择同步所有文件夹或所选文件夹。\n7. 点击右下角的“应用”。\n\n## 本章小结\n\n虽然 iPhone 的存储空间可能无法让你保存无限多的照片和项目，但云技术通过为你提供将照片保存到各种云服务（如\
    \ `iCloud`、`Dropbox`、`Google Drive`、`One Drive` 和 `Adobe Cloud`）的机会，帮助克服了这一障碍。你可以使用这些服务来高效管理设备空间，确保在下一次拍摄时不会因空间不足而烦恼。你可以使用不同应用的免费版本来获取少量存储空间，也可以订阅一项服务以获得足够存储所有项目的空间。你还可以通过\
    \ Mac 上的“`照片`”应用或 Windows 上的 `AnyTrans` 等应用将照片导入电脑来保存。\n\n## 实践练习\n\n运用本章介绍的技术来减少设备上的已用存储空间。下载一个或多个云服务应用，并使用它们来保存你的照片。留意一下你可以释放多少设备空间。\n\
    \n# 11. 为社交网络进行照片编辑\n\n社交网络不仅在你个人的互联网社交生活中扮演着重要角色，在摄影行业也是如此。许多摄影师依赖他们在 `Facebook`、`Instagram`、`500px`、`Pinterest`\
    \ 等平台上的社交资料来展示和推广他们的作品。这有助于他们的作品每天被这些网络的庞大访问者群体看到。你的 iPhone 让你可以轻松地在这些网络上分享作品。你只需拍摄照片，如果需要则进行编辑，然后直接从任何照片编辑应用上传即可。\n\
    \n诸如 `Adobe Spark` 之类的在线工具也提供了有助于你编辑照片的功能和工具。你可以使用它们的工具来创建动态照片项目，并向客户展示你的作品，正如你将在本章的技巧中探索到的那样。\n\
    \n## 使用 Adobe Spark 创建有吸引力的照片展示\n\n使用的工具：`Adobe Spark Page`\n\n`Adobe Spark` 是一组移动应用，可帮助你使用照片创建不同的社交内容。`Adobe\
    \ Spark Page` 帮助你创建包含照片、视频和文本的动态页面，然后你可以与客户分享。`Spark Video` 允许你合并多个视频并在它们之间添加文本过渡。`Smart\
    \ Post` 功能让你可以编辑照片并添加文本，以创建引人注目的社交帖子。\n\n使用 `Spark Page` 创建的照片和文本可以通过台式电脑或移动设备访问。在以下步骤中，我将展示如何为我的巴黎之旅创建一个\
    \ `Spark` 页面。请使用你自己的照片跟随操作。\n\n### 第 1 步：创建页面布局\n\n要创建页面布局，请遵循以下步骤：\n\n1. 打开 `Spark\
    \ Page` 应用。你可以查看“灵感”示例来了解不同的布局范例（见图 11-1）。\n\n   ![A450041_1_En_11_Fig1_HTML.jpg](img/A450041_1_En_11_Fig1_HTML.jpg)\n\
    \n   图 11-1 `Adobe Spark Page` 中的“灵感”示例\n\n2. 点击加号图标。\n3. 点击“添加标题和副标题”并输入你的标题（见图\
    \ 11-2）。\n\n   ![A450041_1_En_11_Fig2_HTML.jpg](img/A450041_1_En_11_Fig2_HTML.jpg)\n\
    \n   图 11-2 向页面添加标题和副标题\n\n4. 点击图像图标为标题添加照片背景。\n5. 向下滚动以显示菜单，然后点击文本工具为照片项目添加一段文本（见图\
    \ 11-3）。\n\n   ![A450041_1_En_11_Fig3_HTML.jpg](img/A450041_1_En_11_Fig3_HTML.jpg)\n\
    \n   图 11-3 添加背景图像和段落文本\n\n6. 点击文本下方的加号图标以添加更多内容，然后选择“照片网格”以网格形式显示多张照片。\n7. 选择要添加到网格的照片，然后点击“添加”。\n\
    8. 点击网格旁边的加号图标并添加描述文本（见图 11-4）。\n\n   ![A450041_1_En_11_Fig4_HTML.jpg](img/A450041_1_En_11_Fig4_HTML.jpg)\n\
    \n   图 11-4 向 Spark 页面添加照片网格\n\n9. 重复之前的步骤，向项目中添加更多图像。\n10. 在顶部图标中，点击效果图标以更改页面上的字体。选择\
    \ Chic 字体（见图 11-5）。\n\n    ![A450041_1_En_11_Fig5_HTML.jpg](img/A450041_1_En_11_Fig5_HTML.jpg)\n\
    \n    图 11-5 更改页面字体\n\n### 第 2 步：预览并分享页面\n\n要预览并分享页面，请遵循以下步骤：\n\n![A450041_1_En_11_Fig6_HTML.jpg](img/A450041_1_En_11_Fig6_HTML.jpg)\n\
    \n图 11-6 为 Spark 页面创建公开链接\n\n1. 点击屏幕右上角的预览图标以预览已创建的页面。\n2. 点击分享图标，并完善页面信息，例如类别和版权。\n\
    3. 打开“获得关注”选项，使页面在 `Adobe Spark Page` 上可用。\n4. 使用分享图标分享页面。\n5. 点击“创建公开链接”以创建一个任何人都能查看该页面的链接（见图\
    \ 11-6）。\n"
- fmt: "# Create Instagram Grid Photos\n\nTools used: Pic Splitter, Moldiv\n\nIf you’re\
    \ a photography buff, you’ve probably used Instagram. You can use Instagram to\
    \ split a photo into multiple parts and post them on Instagram in a grid or as\
    \ separate posts.\n\nYou can use the grid feature to split panorama photos so\
    \ that they fit onto some social networks that have limitations on the viewable\
    \ size of photos. For example, uploading a panorama photo (nonsquare size) to\
    \ Instagram may affect how the photo is viewed. In the following example, I will\
    \ use a photo of a street in Paris; I will show how to split it into multiple\
    \ photos, apply a filter to them, and post them to Instagram as a grid of posts.\n\
    \n## Step 1: Split a Photo into Multiple Parts\n\nTo split a photo into multiple\
    \ parts, follow these steps:\n\n![A450041_1_En_11_Fig7_HTML.jpg](A450041_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\n\nSplit a photo into multiple parts using the Pic Splitter app\n\
    \n1. Open the Pic Splitter app.\n2. Tap the Load Image icon in the top bar, and\
    \ select an image from the Camera Roll.\n3. At the bottom, select the first grid,\
    \ which splits the photos into nine parts (see Figure 11-7).\n4. Tap Save Tiles\
    \ to save the images to the Camera Roll.\n\n## Step 2: Add Filters to the Split\
    \ Photos\n\nTo add filters to the split photos, follow these steps:\n\n![A450041_1_En_11_Fig8_HTML.jpg](A450041_1_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8\n\nApply a filter to the split photos\n\n1. Open the Moldiv app.\n\
    2. Open the first photo and choose Filters.\n3. From the Basics list, choose Brooklyn\
    \ and drag the slider to the far right to increase the filter effect.\n4. Apply\
    \ the filter to the rest of the photos in the grid (see Figure 11-8).\n5. Tap\
    \ the Share icon to save the document to the Camera Roll.\n\n## Step 3: Share\
    \ the Photos\n\nTo share the photos, follow these steps:\n\n![A450041_1_En_11_Fig9_HTML.jpg](A450041_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9\n\nThe grid posts in Instagram\n\n1. Open Instagram and start by\
    \ posting the photos starting from the bottom left to the top right to fit with\
    \ the layout of the Instagram profile. So, the photos will be displayed in the\
    \ form of a grid (see Figure 11-9).\n\n# Turn Photos into Social Branding Images\n\
    \nBuilding powerful social profiles requires an attractive look for your pages\
    \ or portfolios. As you take photos and modify them using your iPhone, you’ll\
    \ want to manage the layout of your different social profiles and display your\
    \ photos on them in attractive ways. However, it is hard to manage the different\
    \ standard sizes related to each profile such as the banner image size. A handy\
    \ app that can help you take your photos to another level is Canva.\n\nCanva is\
    \ a web-based photo-editing and template creator application with a mobile app\
    \ that you can use on your iPhone to access all the web features. Canva allows\
    \ you to create and edit photos for use on different social networks for promotion\
    \ and branding purposes. For example, you can use it to create posts, posters,\
    \ and business cards using your photos. Canva is helpful especially when you don’t\
    \ have design experience to set up the size of the banner, choose the right font,\
    \ or add a special effect. In the following steps, I will use Canva app to convert\
    \ one of my photos to a Facebook banner for my page. Then, I will use it to create\
    \ a business card that can be printed and given to clients.\n\n## Step 1: Create\
    \ a Facebook Banner\n\nTo create a Facebook banner, follow these steps:\n\n1.\
    \ Open Canva app and choose Facebook Cover from the top menu.\n2. Select one of\
    \ the styles that you like to customize. For example, I will use the first template\
    \ (see Figure 11-10).\n\n   ![A450041_1_En_11_Fig10_HTML.jpg](A450041_1_En_11_Fig10_HTML.jpg)\n\
    \n   Figure 11-10\n\n   Using the Canva Facebook Cover templates\n3. Tap the background\
    \ photo. You will notice that the Camera Roll appears on the bottom. Select one\
    \ of the photos.\n4. Drag the photo with one finger to reposition it, and use\
    \ two fingers to scale it (see Figure 11-11).\n\n   ![A450041_1_En_11_Fig11_HTML.jpg](A450041_1_En_11_Fig11_HTML.jpg)\n\
    \n   Figure 11-11\n\n   Modify the photo size and position of the banner\n5. Tap\
    \ the Filters icon to choose a filter and apply to the image. I will choose the\
    \ Guyfe filter.\n6. Double-tap the text to start editing the text and type your\
    \ own desired sentence. Then, tap Done.\n7. Use the text tools to change the text\
    \ font, size, color, and spacing (see Figure 11-12).\n\n   ![A450041_1_En_11_Fig12_HTML.jpg](A450041_1_En_11_Fig12_HTML.jpg)\n\
    \n   Figure 11-12\n\n   Adding and modifying the text for the banner\n8. Tap the\
    \ plus icon to display the shapes, choose one of the separators, and place it\
    \ between the main text and the text under it (see Figure 11-13).\n9. Tap the\
    \ Share button to save the image and use it to update your Facebook page or profile\
    \ banner.\n\n   ![A450041_1_En_11_Fig13_HTML.jpg](A450041_1_En_11_Fig13_HTML.jpg)\n\
    \n   Figure 11-13\n\n   Adding a separator shape on the banner\n\n## Step 2: Create\
    \ a Photography Business Card\n\nTo create a business card, follow these steps:\n\
    \n1. Open the Canva app and choose Business Card.\n2. Select one of the templates\
    \ that will suit your photography business. I will choose a simple one with some\
    \ background text (see Figure 11-14).\n\n   ![A450041_1_En_11_Fig14_HTML.jpg](A450041_1_En_11_Fig14_HTML.jpg)\n\
    \n   Figure 11-14\n\n   Use the Business Card template to create your own customized\
    \ card\n3. Repeat the steps you used to create the Facebook banner to modify your\
    \ business card (see Figure 11-15).\n\n   ![A450041_1_En_11_Fig15_HTML.jpg](A450041_1_En_11_Fig15_HTML.jpg)\n\
    \n   Figure 11-15\n\n   Modifying the layout of the business card\n4. Tap the\
    \ Share icon. You can choose between different print-friendly formats such as\
    \ a PNG image, standard PDF, or print-friendly PDF (see Figure 11-16).\n\n   ![A450041_1_En_11_Fig16_HTML.jpg](A450041_1_En_11_Fig16_HTML.jpg)\n\
    \n   Figure 11-16\n\n   Saving the business card in a print-friendly format\n\n\
    # Summary\n\nNot only does your iPhone allow you to take great shots, but it also\
    \ helps you share them through different social networks. You can even use apps\
    \ on your iPhone to integrate your photos with the different social networks you\
    \ are on. For example, you can use the Instagram layout to display photos on a\
    \ grid view, display your photos in a presentation mode using Spark Pages, or\
    \ turn them into a creative Facebook banner for your Facebook page. The tips in\
    \ this chapter covered different apps that can help you integrate your photos\
    \ with social network profiles.\n\n# Practice Exercise\n\nStart by selecting a\
    \ project that includes a number of photos for a specific theme or location. Then,\
    \ build a presentation with a description. You can use Spark Page to create this\
    \ presentation and share it with your friends. Then, select one of the photos\
    \ and share it on Instagram using a grid. Also, you can use this image to create\
    \ a Facebook banner or a business card."
  raw: "## Create Instagram Grid Photos\n\nTools used: Pic Splitter, Moldiv\n\nIf\
    \ you’re a photography buff, you’ve probably used Instagram. You can use Instagram\
    \ to split a photo into multiple parts and post them on Instagram in a grid or\
    \ as separate posts.\n\nYou can use the grid feature to split panorama photos\
    \ so that they fit onto some social networks that have limitations on the viewable\
    \ size of photos. For example, uploading a panorama photo (nonsquare size) to\
    \ Instagram may affect how the photo is viewed. In the following example, I will\
    \ use a photo of a street in Paris; I will show how to split it into multiple\
    \ photos, apply a filter to them, and post them to Instagram as a grid of posts.\n\
    \n### Step 1: Split a Photo into Multiple Parts\n\nTo split a photo into multiple\
    \ parts, follow these steps:\n\n![A450041_1_En_11_Fig7_HTML.jpg](A450041_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\n\nSplit a photo into multiple parts using the Pic Splitter app\n\
    \n1.  Open the Pic Splitter app.  \n2.  Tap the Load Image icon in the top bar,\
    \ and select an image from the Camera Roll.  \n3.  At the bottom, select the first\
    \ grid, which splits the photos into nine parts (see Figure [11-7](#A450041_1_En_11_Chapter.html#Fig7)).\
    \  \n4.  Tap Save Tiles to save the images to the Camera Roll.\n\n### Step 2:\
    \ Add Filters to the Split Photos\n\nTo add filters to the split photos, follow\
    \ these steps:\n\n![A450041_1_En_11_Fig8_HTML.jpg](A450041_1_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8\n\nApply a filter to the split photos\n\n1.  Open the Moldiv app.\
    \  \n2.  Open the first photo and choose Filters.  \n3.  From the Basics list,\
    \ choose Brooklyn and drag the slider to the far right to increase the filter\
    \ effect.  \n4.  Apply the filter to the rest of the photos in the grid (see Figure\
    \ [11-8](#A450041_1_En_11_Chapter.html#Fig8)).  \n5.  Tap the Share icon to save\
    \ the document to the Camera Roll.\n\n### Step 3: Share the Photos\n\nTo share\
    \ the photos, follow these steps:\n\n![A450041_1_En_11_Fig9_HTML.jpg](A450041_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9\n\nThe grid posts in Instagram\n\n1.  Open Instagram and start by\
    \ posting the photos starting from the bottom left to the top right to fit with\
    \ the layout of the Instagram profile. So, the photos will be displayed in the\
    \ form of a grid (see Figure [11-9](#A450041_1_En_11_Chapter.html#Fig9)).\n\n\
    ## Turn Photos into Social Branding Images\n\nBuilding powerful social profiles\
    \ requires an attractive look for your pages or portfolios. As you take photos\
    \ and modify them using your iPhone, you’ll want to manage the layout of your\
    \ different social profiles and display your photos on them in attractive ways.\
    \ However, it is hard to manage the different standard sizes related to each profile\
    \ such as the banner image size. A handy app that can help you take your photos\
    \ to another level is Canva.\n\nCanva is a web-based photo-editing and template\
    \ creator application with a mobile app that you can use on your iPhone to access\
    \ all the web features. Canva allows you to create and edit photos for use on\
    \ different social networks for promotion and branding purposes. For example,\
    \ you can use it to create posts, posters, and business cards using your photos.\
    \ Canva is helpful especially when you don’t have design experience to set up\
    \ the size of the banner, choose the right font, or add a special effect. In the\
    \ following steps, I will use Canva app to convert one of my photos to a Facebook\
    \ banner for my page. Then, I will use it to create a business card that can be\
    \ printed and given to clients.\n\n### Step 1: Create a Facebook Banner\n\nTo\
    \ create a Facebook banner, follow these steps:\n\n1.  Open Canva app and choose\
    \ Facebook Cover from the top menu.  \n2.  Select one of the styles that you like\
    \ to customize. For example, I will use the first template (see Figure [11-10](#A450041_1_En_11_Chapter.html#Fig10)).\n\
    \n    ![A450041_1_En_11_Fig10_HTML.jpg](A450041_1_En_11_Fig10_HTML.jpg)\n\n  \
    \  Figure 11-10\n\n    Using the Canva Facebook Cover templates  \n3.  Tap the\
    \ background photo. You will notice that the Camera Roll appears on the bottom.\
    \ Select one of the photos.  \n4.  Drag the photo with one finger to reposition\
    \ it, and use two fingers to scale it (see Figure [11-11](#A450041_1_En_11_Chapter.html#Fig11)).\n\
    \n    ![A450041_1_En_11_Fig11_HTML.jpg](A450041_1_En_11_Fig11_HTML.jpg)\n\n  \
    \  Figure 11-11\n\n    Modify the photo size and position of the banner  \n5.\
    \  Tap the Filters icon to choose a filter and apply to the image. I will choose\
    \ the Guyfe filter.  \n6.  Double-tap the text to start editing the text and type\
    \ your own desired sentence. Then, tap Done.  \n7.  Use the text tools to change\
    \ the text font, size, color, and spacing (see Figure [11-12](#A450041_1_En_11_Chapter.html#Fig12)).\n\
    \n    ![A450041_1_En_11_Fig12_HTML.jpg](A450041_1_En_11_Fig12_HTML.jpg)\n\n  \
    \  Figure 11-12\n\n    Adding and modifying the text for the banner  \n8.  Tap\
    \ the plus icon to display the shapes, choose one of the separators, and place\
    \ it between the main text and the text under it (see Figure [11-13](#A450041_1_En_11_Chapter.html#Fig13)).\
    \  \n9.  Tap the Share button to save the image and use it to update your Facebook\
    \ page or profile banner.\n\n    ![A450041_1_En_11_Fig13_HTML.jpg](A450041_1_En_11_Fig13_HTML.jpg)\n\
    \n    Figure 11-13\n\n    Adding a separator shape on the banner\n\n### Step 2:\
    \ Create a Photography Business Card\n\nTo create a business card , follow these\
    \ steps:\n\n1.  Open the Canva app and choose Business Card.  \n2.  Select one\
    \ of the templates that will suit your photography business. I will choose a simple\
    \ one with some background text (see Figure [11-14](#A450041_1_En_11_Chapter.html#Fig14)).\n\
    \n    ![A450041_1_En_11_Fig14_HTML.jpg](A450041_1_En_11_Fig14_HTML.jpg)\n\n  \
    \  Figure 11-14\n\n    Use the Business Card template to create your own customized\
    \ card  \n3.  Repeat the steps you used to create the Facebook banner to modify\
    \ your business card (see Figure [11-15](#A450041_1_En_11_Chapter.html#Fig15)).\n\
    \n    ![A450041_1_En_11_Fig15_HTML.jpg](A450041_1_En_11_Fig15_HTML.jpg)\n\n  \
    \  Figure 11-15\n\n    Modifying the layout of the business card  \n4.  Tap the\
    \ Share icon. You can choose between different print-friendly formats such as\
    \ a PNG image, standard PDF, or print-friendly PDF (see Figure [11-16](#A450041_1_En_11_Chapter.html#Fig16)).\n\
    \n    ![A450041_1_En_11_Fig16_HTML.jpg](A450041_1_En_11_Fig16_HTML.jpg)\n\n  \
    \  Figure 11-16\n\n    Saving the business card in a print-friendly format\n\n\
    ## Summary\n\nNot only does your iPhone allow you to take great shots, but it\
    \ also helps you share them through different social networks. You can even use\
    \ apps on your iPhone to integrate your photos with the different social networks\
    \ you are on. For example, you can use the Instagram layout to display photos\
    \ on a grid view, display your photos in a presentation mode using Spark Pages,\
    \ or turn them into a creative Facebook banner for your Facebook page. The tips\
    \ in this chapter covered different apps that can help you integrate your photos\
    \ with social network profiles.\n\n## Practice Exercise\n\nStart by selecting\
    \ a project that includes a number of photos for a specific theme or location.\
    \ Then, build a presentation with a description. You can use Spark Page to create\
    \ this presentation and share it with your friends. Then, select one of the photos\
    \ and share it on Instagram using a grid. Also, you can use this image to create\
    \ a Facebook banner or a business card."
  trans: "\n# 创建 Instagram 网格照片\n\n使用工具：Pic Splitter、Moldiv\n\n如果您是摄影爱好者，很可能用过 Instagram。您可以通过\
    \ Instagram 将一张照片分割成多个部分，并以网格形式或独立帖子发布到 Instagram 上。\n\n您可以使用网格功能来分割全景照片，使其适配那些对照片可视尺寸有限制的社交网络。例如，将一张全景照片（非正方形尺寸）上传到\
    \ Instagram 可能会影响其显示效果。在下面的示例中，我将使用一张巴黎街头的照片，演示如何将其分割成多张照片，为其应用滤镜，然后以帖子网格的形式发布到\
    \ Instagram。\n\n## 第 1 步：将照片分割成多个部分\n\n要将照片分割成多个部分，请按照以下步骤操作：\n\n![A450041_1_En_11_Fig7_HTML.jpg](img/A450041_1_En_11_Fig7_HTML.jpg)\n\
    \n图 11-7\n\n使用 Pic Splitter 应用程序将照片分割成多个部分\n\n1. 打开 Pic Splitter 应用程序。\n2. 点击顶部栏中的“加载图像”图标，从“相机胶卷”中选择一张图片。\n\
    3. 在底部选择第一个网格，该网格将照片分割成九个部分（见图 11-7）。\n4. 点击“保存切片”，将图像保存到“相机胶卷”。\n\n## 第 2 步：为分割后的照片添加滤镜\n\
    \n要为分割后的照片添加滤镜，请按照以下步骤操作：\n\n![A450041_1_En_11_Fig8_HTML.jpg](img/A450041_1_En_11_Fig8_HTML.jpg)\n\
    \n图 11-8\n\n为分割后的照片应用滤镜\n\n1. 打开 Moldiv 应用程序。\n2. 打开第一张照片，选择“滤镜”。\n3. 从“基础”列表中选择“布鲁克林”，并将滑块拖到最右侧以增加滤镜效果。\n\
    4. 将滤镜应用到网格中的其余照片上（见图 11-8）。\n5. 点击“分享”图标，将文档保存到“相机胶卷”。\n\n## 第 3 步：分享照片\n\n要分享照片，请按照以下步骤操作：\n\
    \n![A450041_1_En_11_Fig9_HTML.jpg](img/A450041_1_En_11_Fig9_HTML.jpg)\n\n图 11-9\n\
    \nInstagram 中的网格帖子\n\n1. 打开 Instagram，从左下角开始向右上角依次发布照片，以适配 Instagram 个人主页的布局。这样，照片将以网格形式显示（见图\
    \ 11-9）。\n\n# 将照片转化为社交品牌形象图\n\n打造强有力的社交主页需要让您的页面或作品集具有吸引力。当您用 iPhone 拍摄和修改照片时，您会希望管理好不同社交主页的布局，并以吸引人的方式显示照片。然而，管理每个主页相关的不同标准尺寸（如横幅图片尺寸）并不容易。Canva\
    \ 是一款便捷的应用程序，能帮助您将照片提升到一个新层次。\n\nCanva 是一款基于网页的照片编辑和模板创建应用程序，其移动应用可让您在 iPhone\
    \ 上使用所有网页功能。Canva 允许您创建和编辑用于不同社交网络的照片，以进行推广和品牌建设。例如，您可以使用它来创建帖子、海报和名片。在您没有设计经验来设置横幅尺寸、选择合适字体或添加特殊效果时，Canva\
    \ 尤其有用。在接下来的步骤中，我将使用 Canva 应用程序将我的一张照片转换为 Facebook 个人主页的横幅。然后，我将使用它创建一张可以打印并交给客户的名片。\n\
    \n## 第 1 步：创建 Facebook 横幅\n\n要创建 Facebook 横幅，请按照以下步骤操作：\n\n1. 打开 Canva 应用程序，从顶部菜单中选择“Facebook\
    \ 封面”。\n2. 选择您喜欢的一种样式进行自定义。例如，我将使用第一个模板（见图 11-10）。\n\n   ![A450041_1_En_11_Fig10_HTML.jpg](img/A450041_1_En_11_Fig10_HTML.jpg)\n\
    \n   图 11-10\n\n   使用 Canva 的 Facebook 封面模板\n3. 点击背景照片。您会注意到“相机胶卷”出现在底部。选择其中一张照片。\n\
    4. 用一根手指拖动照片以重新定位，用两根手指缩放照片（见图 11-11）。\n\n   ![A450041_1_En_11_Fig11_HTML.jpg](img/A450041_1_En_11_Fig11_HTML.jpg)\n\
    \n   图 11-11\n\n   修改横幅照片的大小和位置\n5. 点击“滤镜”图标，选择一个滤镜并应用到图像上。我将选择 Guyfe 滤镜。\n6.\
    \ 双击文本开始编辑，输入您想要的句子。然后点击“完成”。\n7. 使用文本工具更改文本的字体、大小、颜色和间距（见图 11-12）。\n\n   ![A450041_1_En_11_Fig12_HTML.jpg](img/A450041_1_En_11_Fig12_HTML.jpg)\n\
    \n   图 11-12\n\n   为横幅添加和修改文本\n8. 点击加号图标显示形状，选择一个分隔符，将其置于主文本和下方文本之间（见图 11-13）。\n\
    9. 点击“分享”按钮保存图像，并用它来更新您的 Facebook 个人主页或主页横幅。\n\n   ![A450041_1_En_11_Fig13_HTML.jpg](img/A450041_1_En_11_Fig13_HTML.jpg)\n\
    \n   图 11-13\n\n   在横幅上添加分隔符形状\n\n## 第 2 步：创建摄影名片\n\n要创建名片，请按照以下步骤操作：\n\n1. 打开\
    \ Canva 应用程序，选择“名片”。\n2. 选择适合您摄影业务的模板。我将选择一个带有背景文字的简单模板（见图 11-14）。\n\n   ![A450041_1_En_11_Fig14_HTML.jpg](img/A450041_1_En_11_Fig14_HTML.jpg)\n\
    \n   图 11-14\n\n   使用名片模板创建您自己定制的名片\n3. 重复创建 Facebook 横幅时使用的步骤来修改您的名片（见图 11-15）。\n\
    \n   ![A450041_1_En_11_Fig15_HTML.jpg](img/A450041_1_En_11_Fig15_HTML.jpg)\n\n\
    \   图 11-15\n\n   修改名片布局\n4. 点击“分享”图标。您可以选择不同的适合打印的格式，例如 PNG 图像、标准 PDF 或适合打印的\
    \ PDF（见图 11-16）。\n\n   ![A450041_1_En_11_Fig16_HTML.jpg](img/A450041_1_En_11_Fig16_HTML.jpg)\n\
    \n   图 11-16\n\n   以适合打印的格式保存名片\n\n# 总结\n\n您的 iPhone 不仅能拍出精彩的照片，还能帮助您通过不同的社交网络分享它们。您甚至可以使用\
    \ iPhone 上的应用程序将您的照片与您所使用的不同社交网络集成。例如，您可以使用 Instagram 布局以网格视图显示照片，使用 Spark Pages\
    \ 以演示模式展示照片，或者将它们转化为您 Facebook 主页的创意横幅。本章的技巧涵盖了不同的应用程序，可以帮助您将照片与社交网络主页集成。\n\n\
    # 练习\n\n首先，选择一个包含特定主题或地点多张照片的项目。然后，构建一个带有描述的演示文稿。您可以使用 Spark Page 创建此演示文稿并与朋友分享。然后，选择一张照片，使用网格功能在\
    \ Instagram 上分享它。此外，您也可以使用这张照片创建 Facebook 横幅或名片。\n"
- fmt: "# 12. Marketing and Selling Photos Like a Pro\n\nMastering the artistic and\
    \ technical sides of iPhone photography is clearly not enough to build a professional\
    \ photography business that can return profits and accolades. While there are\
    \ numerous talented iPhone photographers, few are able to turn their talent into\
    \ a professional career. To do so, you must understand the marketing and business\
    \ sides of the job, including how to market your social profile and make it visible\
    \ for the world to see. With today’s technology and social networks, it is easier\
    \ than ever to do this.\n\nThere are apps for your iPhone that extend your capabilities\
    \ on the business side; they will help you to manage the paperwork associated\
    \ with your projects such as contacts, forms, and model releases. You can also\
    \ use your iPhone to give feedback, comment on documents, sign forms, and send\
    \ contracts.\n\n## Managing Contracts and Forms\n\nTool used: `Adobe Acrobat`\
    \ mobile\n\n`Adobe Acrobat` is one of the most powerful tools in document management\
    \ on a desktop. The mobile version includes many of the desktop version features\
    \ that can help you to easily manage your documents related to photography projects,\
    \ such as model releases and contracts. You can scan documents, add comments to\
    \ them, sign them, and share them with your team.\n\n### Scanning Documents\n\n\
    One of the recently added features to the `Acrobat` mobile app (see Figure [12-1](#A450041_1_En_12_Chapter.html#Fig1))\
    \ is the ability to scan a paper document and modify it to enhance the scanned\
    \ version of the document. Once you are done, you can edit it, share it, and save\
    \ it to the `Adobe Cloud` service.\n\n![A450041_1_En_12_Fig1_HTML.jpg](A450041_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1: `Adobe Acrobat` mobile app main interface\n\nWhile `Acrobat` allows\
    \ you to use the flash on your camera and set it to either on, off, or auto by\
    \ clicking the flash icon on the bottom left of the screen, it is advised to scan\
    \ your document in good light conditions such as with ample daylight. This will\
    \ ensure a clear and good-quality scanned image. Additionally, try to avoid any\
    \ shadows that may appear when you hold the camera in your hand; you can try changing\
    \ your position or the position of the scanned image.\n\n### Step 1: Set Up the\
    \ Document and Scan\n\nTo set up the document and scan it, follow these steps:\n\
    \n1. Open `Adobe Acrobat`.\n2. Tap `Acrobat`’s left menu icon and choose `Scan`\
    \ (see Figure [12-2](#A450041_1_En_12_Chapter.html#Fig2)).\n\n    ![A450041_1_En_12_Fig2_HTML.jpg](A450041_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2: `Acrobat` app’s left menu\n\n    When you scan a document,\
    \ `Acrobat` allows you to crop the scanned photo to display only the required\
    \ area. To make sure that `Auto Crop` is on, tap the right-bottom icon.\n3. Point\
    \ your camera to the document’s first page. `Acrobat` detects the page by displaying\
    \ a blue rectangle around it. Once you are satisfied with the results, press the\
    \ Camera button to take the shot (see Figure [12-3](#A450041_1_En_12_Chapter.html#Fig3)).\n\
    \n    ![A450041_1_En_12_Fig3_HTML.jpg](A450041_1_En_12_Fig3_HTML.jpg)\n\n    Figure\
    \ 12-3: The `Acrobat` Scan feature detects the paper borders and highlights the\
    \ detected area in blue\n\n### Step 2: Add and Modify the Scanned Document\n\n\
    To add and modify the scanned document, follow these steps:\n\n1. On the Review\
    \ screen, you will find the scanned photo. You can add more photos by clicking\
    \ the `Add Photo` icon, whether you can choose `Take Another Photo` or `Select\
    \ from Photos`.\n2. Tap the `Reorder` icon to rearrange the pages’ order in the\
    \ document by simply dragging a photo into the preferred order (see Figure [12-4](#A450041_1_En_12_Chapter.html#Fig4)).\n\
    \n    ![A450041_1_En_12_Fig4_HTML.jpg](A450041_1_En_12_Fig4_HTML.jpg)\n\n    Figure\
    \ 12-4: Drag the pages to reorder them\n3. Click the `Crop` tool to modify the\
    \ cropping area. Use the rectangle to define the area to crop and click `Done`.\
    \ You can click the `Rotate` icons to change the rotation of the page.\n4. You\
    \ may notice that the colors on the page are not the same as the original document.\
    \ You can determine the color type for the image by tapping the `Color Edit` icon,\
    \ which allows you to choose between `Original Photo`, `Auto Color`, `Grayscale`,\
    \ and `Whiteboard` (see Figure [12-5](#A450041_1_En_12_Chapter.html#Fig5)).\n\n\
    \    ![A450041_1_En_12_Fig5_HTML.jpg](A450041_1_En_12_Fig5_HTML.jpg)\n\n    Figure\
    \ 12-5: Choose the color setting for the final document\n\n### Step 3: Share Documents\n\
    \nYou can save a document and share it with others by tapping the `Save PDF` button\
    \ at the top right of the screen. You will need to add the name of the document.\
    \ If you have a free `Adobe Document Cloud` membership, the document will automatically\
    \ be saved to the cloud. You can also tap `Save to Cloud` to save it manually.\
    \ You can tap `Share` to send the document to people through e-mail, Skype, WhatsApp,\
    \ and other applications. When you tap the `Share` icon, you will get the choice\
    \ to share a link to the document, share the document itself, save it to `Adobe\
    \ Document Cloud`, save it to `Dropbox`, or open it in other applications. You\
    \ can also print the document if you have a supported printer (see Figure [12-6](#A450041_1_En_12_Chapter.html#Fig6)).\n\
    \n![A450041_1_En_12_Fig6_HTML.jpg](A450041_1_En_12_Fig6_HTML.jpg)\n\nFigure 12-6:\
    \ Share the scanned document with `Adobe Document Cloud` or other applications\n\
    \n### Step 4: Comment on Documents\n\nWhen someone sends you a document such as\
    \ an invoice or contract to review, you can use `Acrobat` on your iPhone to add\
    \ your comments and feedback before a final signature. You can also send it back\
    \ for modifications.\n\n1. Tap the `Comments` icon in the bottom toolbar to activate\
    \ the comments mode. You can also access the comments mode by clicking `Comment`\
    \ in the left menu of `Acrobat` (see Figure [12-7](#A450041_1_En_12_Chapter.html#Fig7)).\n\
    \n    ![A450041_1_En_12_Fig7_HTML.jpg](A450041_1_En_12_Fig7_HTML.jpg)\n\n    Figure\
    \ 12-7: Choose the `Comment` mode in the `Acrobat` menu\n2. Click the `Note` icon\
    \ on the bottom toolbar. Click the point where you want to add a comment on it.\
    \ In the pop-up dialog box, type your name and then type your note. You can also\
    \ use other tools to highlight text, add strikethrough, underline text, add text,\
    \ free draw, and add a signature (see Figure [12-8](#A450041_1_En_12_Chapter.html#Fig8)).\n\
    \n    ![A450041_1_En_12_Fig8_HTML.jpg](A450041_1_En_12_Fig8_HTML.jpg)\n\n    Figure\
    \ 12-8: Use the comments tools to add notes, highlight text, and add text\n3.\
    \ Click `Save` at the top-right side of the screen. Once the app closes, you can\
    \ click and drag the note to any part of the page.\n\n### Step 5: Fill in and\
    \ Sign a Document\n\nTool used: `Adobe Fill and Sign`\n\nIf you have a contract,\
    \ a form, or an invoice to fill in and sign, `Adobe` provides a free application,\
    \ `Adobe Fill and Sign`, that allows you to do this directly from your iPhone.\
    \ `Adobe Fill and Forms` saves you time by keeping a record of the basic information\
    \ that you frequently use to fill in forms such as your name, address, e-mail,\
    \ telephone, and more. Also, it stores your digital signature and initials to\
    \ easily and quickly fill in forms.\n\n### Step 6: Fill in Your Profile\n\nTo\
    \ fill in your profile, follow these steps:\n\n![A450041_1_En_12_Fig9_HTML.jpg](A450041_1_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9: Fill in the profile information in the `Fill & Sign` app\n\n1.\
    \ Open the `Fill and Sign` app.\n2. Click the `Profile` icon in the bottom toolbar,\
    \ and fill in your personal information that you may use in forms such as your\
    \ name, address, e-mail, and so on (see Figure [12-9](#A450041_1_En_12_Chapter.html#Fig9))."
  raw: "# 12. Marketing and Selling Photos Like a Pro\n\nMastering the artistic and\
    \ technical sides of iPhone photography is clearly not enough to build a professional\
    \ photography business that can return profits and accolades. While there are\
    \ numerous talented iPhone photographers, few are able to turn their talent into\
    \ a professional career. To do so, you must understand the marketing and business\
    \ sides of the job, including how to market your social profile and make it visible\
    \ for the world to see. With today’s technology and social networks, it is easier\
    \ than ever to do this.\n\nThere are apps for your iPhone that extend your capabilities\
    \ on the business side; they will help you to manage the paperwork associated\
    \ with your projects such as contacts, forms, and model releases. You can also\
    \ use your iPhone to give feedback, comment on documents, sign forms, and send\
    \ contracts.\n\n## Managing Contracts and Forms\n\nTool used: Adobe Acrobat mobile\n\
    \nAdobe Acrobat is one of the most powerful tools in document management on a\
    \ desktop. The mobile version includes many of the desktop version features that\
    \ can help you to easily manage your documents related to photography projects,\
    \ such as model releases and contracts. You can scan documents, add comments to\
    \ them, sign them, and share them with your team.\n\n### Scanning Documents\n\n\
    One of the recently added features to the Acrobat mobile app (see Figure [12-1](#A450041_1_En_12_Chapter.html#Fig1))\
    \ is the ability to scan a paper document and modify it to enhance the scanned\
    \ version of the document. Once you are done, you can edit it, share it, and save\
    \ it to the Adobe Cloud service.\n\n![A450041_1_En_12_Fig1_HTML.jpg](A450041_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\n\nAdobe Acrobat mobile app main interface\n\nWhile Acrobat allows\
    \ you to use the flash on your camera and set it to either on, off, or auto by\
    \ clicking the flash icon on the bottom left of the screen, it is advised to scan\
    \ your document in good light conditions such as with ample daylight. This will\
    \ ensure a clear and good-quality scanned image. Additionally, try to avoid any\
    \ shadows that may appear when you hold the camera in your hand; you can try changing\
    \ your position or the position of the scanned image.\n\n### Step 1: Set Up the Document\
    \ and Scan\n\nTo set up the document and scan it, follow these steps:\n\n1.  Open\
    \ Adobe Acrobat.  \n2.  Tap Acrobat’s left menu icon and choose Scan (see Figure\
    \ [12-2](#A450041_1_En_12_Chapter.html#Fig2)).\n\n    ![A450041_1_En_12_Fig2_HTML.jpg](A450041_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2\n\n    Acrobat app’s left menu When you scan a document, Acrobat\
    \ allows you to crop the scanned photo to display only the required area. To make\
    \ sure that Auto Crop is on, tap the right-bottom icon.  \n3.  Point your camera\
    \ to the document’s first page. Acrobat detects the page by displaying a blue\
    \ rectangle around it. Once you are satisfied with the results, press the Camera\
    \ button to take the shot (see Figure [12-3](#A450041_1_En_12_Chapter.html#Fig3)).\n\
    \n    ![A450041_1_En_12_Fig3_HTML.jpg](A450041_1_En_12_Fig3_HTML.jpg)\n\n    Figure\
    \ 12-3\n\n    The Acrobat Scan feature detects the paper borders and highlights\
    \ the detected area in blue\n\n### Step 2: Add and Modify the Scanned Document\n\
    \nTo add and modify the scanned document, follow these steps:\n\n1.  On the Review\
    \ screen, you will find the scanned photo. You can add more photos by clicking\
    \ the Add Photo icon, whether you can choose Take Another Photo or Select from\
    \ Photos.  \n2.  Tap the Reorder icon to rearrange the pages’ order in the document\
    \ by simply dragging a photo into the preferred order (see Figure [12-4](#A450041_1_En_12_Chapter.html#Fig4)).\n\
    \n    ![A450041_1_En_12_Fig4_HTML.jpg](A450041_1_En_12_Fig4_HTML.jpg)\n\n    Figure\
    \ 12-4\n\n    Drag the pages to reorder them  \n3.  Click the Crop tool to modify\
    \ the cropping area. Use the rectangle to define the area to crop and click Done.\
    \ You can click the Rotate icons to change the rotation of the page.  \n4.  You\
    \ may notice that the colors on the page are not the same as the original document.\
    \ You can determine the color type for the image by tapping the Color Edit icon,\
    \ which allows you to choose between Original Photo, Auto Color, Grayscale, and\
    \ Whiteboard (see Figure [12-5](#A450041_1_En_12_Chapter.html#Fig5)).\n\n    ![A450041_1_En_12_Fig5_HTML.jpg](A450041_1_En_12_Fig5_HTML.jpg)\n\
    \n    Figure 12-5\n\n    Choose the color setting for the final document\n\n###\
    \ Step 3: Share Documents\n\nYou can save a document and share it with others\
    \ by tapping the Save PDF button at the top right of the screen. You will need\
    \ to add the name of the document. If you have a free Adobe Document Cloud membership,\
    \ the document will automatically be saved to the cloud. You can also tap Save\
    \ to Cloud to save it manually. You can tap Share to send the document to people\
    \ through e-mail, Skype, WhatsApp, and other applications. When you tap the Share\
    \ icon, you will get the choice to share a link to the document, share the document\
    \ itself, save it to Adobe Document Cloud, save it to Dropbox, or open it in other\
    \ applications. You can also print the document if you have a supported printer\
    \ (see Figure [12-6](#A450041_1_En_12_Chapter.html#Fig6)).\n\n![A450041_1_En_12_Fig6_HTML.jpg](A450041_1_En_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6\n\nShare the scanned document with Adobe Document Cloud or other\
    \ applications\n\n### Step 4: Comment on Documents\n\nWhen someone sends you a\
    \ document such as an invoice or contract to review, you can use Acrobat on your\
    \ iPhone to add your comments and feedback before a final signature. You can also\
    \ send it back for modifications.\n\n1.  Tap the Comments icon in the bottom toolbar\
    \ to activate the comments mode. You can also access the comments mode by clicking\
    \ Comment in the left menu of Acrobat (see Figure [12-7](#A450041_1_En_12_Chapter.html#Fig7)).\n\
    \n    ![A450041_1_En_12_Fig7_HTML.jpg](A450041_1_En_12_Fig7_HTML.jpg)\n\n    Figure\
    \ 12-7\n\n    Choose the Comment mode in the Acrobat menu  \n2.  Click the Note\
    \ icon on the bottom toolbar. Click the point where you want to add a comment\
    \ on it. In the pop-up dialog box, type your name and then type your note. You\
    \ can also use other tools to highlight text, add strikethrough, underline text,\
    \ add text, free draw, and add a signature (see Figure [12-8](#A450041_1_En_12_Chapter.html#Fig8)).\n\
    \n    ![A450041_1_En_12_Fig8_HTML.jpg](A450041_1_En_12_Fig8_HTML.jpg)\n\n    Figure\
    \ 12-8\n\n    Use the comments tools to add notes, highlight text, and add text\
    \  \n3.  Click Save at the top-right side of the screen. Once the app closes,\
    \ you can click and drag the note to any part of the page .\n\n### Step 5: Fill\
    \ in and Sign a Document\n\nTool used: Adobe Fill and Sign\n\nIf you have a contract,\
    \ a form, or an invoice to fill in and sign, Adobe provides a free application,\
    \ Adobe Fill and Sign, that allows you to do this directly from your iPhone. Adobe\
    \ Fill and Forms saves you time by keeping a record of the basic information that\
    \ you frequently use to fill in forms such as your name, address, e-mail, telephone,\
    \ and more. Also, it stores your digital signature and initials to easily and\
    \ quickly fill in forms.\n\n### Step 6: Fill in Your Profile\n\nTo fill in your\
    \ profile, follow these steps:\n\n![A450041_1_En_12_Fig9_HTML.jpg](A450041_1_En_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9\n\nFill in the profile information in the Fill & Sign app\n\n1.\
    \  Open the Fill and Sign app.  \n2.  Click the Profile icon in the bottom toolbar,\
    \ and fill in your personal information that you may use in forms such as your\
    \ name, address, e-mail, and so on (see Figure [12-9](#A450041_1_En_12_Chapter.html#Fig9))."
  trans: "\n# 12. 像专业人士一样营销和销售照片\n\n掌握 iPhone 摄影的艺术和技术层面显然不足以建立一个能够带来利润和荣誉的专业摄影事业。虽然有众多才华横溢的\
    \ iPhone 摄影师，但很少有人能将才华转化为职业。要做到这一点，你必须了解这项工作的营销和商业方面，包括如何宣传你的社交媒体资料，使其被全世界看到。借助当今的技术和社交网络，这比以往任何时候都更容易。\n\
    \n你的 iPhone 上有一些应用程序可以扩展你在商业方面的能力；它们将帮助你管理与项目相关的文书工作，例如联系人、表格和模特授权书。你还可以使用 iPhone\
    \ 提供反馈、评论文档、签署表格和发送合同。\n\n## 管理合同与表格\n\n使用工具：`Adobe Acrobat` 移动版\n\n`Adobe Acrobat`\
    \ 是桌面端最强大的文档管理工具之一。其移动版本包含了许多桌面版的功能，可以帮助你轻松管理与摄影项目相关的文档，例如模特授权书和合同。你可以扫描文档、添加注释、签名并与团队共享。\n\
    \n### 扫描文档\n\n`Acrobat` 移动应用（见图 12-1）最近新增的功能之一是能够扫描纸质文档并进行修改以增强扫描版本。完成后，你可以对其进行编辑、共享并保存到\
    \ `Adobe Cloud` 服务。\n\n![A450041_1_En_12_Fig1_HTML.jpg](img/A450041_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1：`Adobe Acrobat` 移动应用主界面\n\n虽然 `Acrobat` 允许你通过点击屏幕左下角的闪光灯图标将相机闪光灯设置为开启、关闭或自动，但建议在光线充足（如充足的日光）的条件下扫描文档。这将确保获得清晰且高质量的扫描图像。此外，尽量避免手持相机时可能出现的阴影；你可以尝试改变自己的位置或扫描图像的位置。\n\
    \n### 步骤 1：设置文档并扫描\n\n要设置并扫描文档，请按照以下步骤操作：\n\n1. 打开 `Adobe Acrobat`。\n2. 点击 `Acrobat`\
    \ 的左侧菜单图标，然后选择 `扫描`（见图 12-2）。\n\n    ![A450041_1_En_12_Fig2_HTML.jpg](img/A450041_1_En_12_Fig2_HTML.jpg)\n\
    \n    图 12-2：`Acrobat` 应用的左侧菜单\n\n    扫描文档时，`Acrobat` 允许你裁剪扫描的照片以仅显示所需区域。为确保 `自动裁剪`\
    \ 已开启，请点击右下角的图标。\n3. 将相机对准文档的第一页。`Acrobat` 会通过显示一个蓝色矩形来检测页面。对结果满意后，按下相机按钮拍照（见图\
    \ 12-3）。\n\n    ![A450041_1_En_12_Fig3_HTML.jpg](img/A450041_1_En_12_Fig3_HTML.jpg)\n\
    \n    图 12-3：`Acrobat` 的扫描功能检测纸张边界，并以蓝色高亮显示检测区域\n\n### 步骤 2：添加和修改扫描文档\n\n要添加和修改扫描文档，请按照以下步骤操作：\n\
    \n1. 在审阅屏幕上，你会看到扫描的照片。你可以通过点击 `添加照片` 图标来添加更多照片，可以选择 `拍摄另一张照片` 或 `从相册选择`。\n2. 点击\
    \ `重新排序` 图标，通过将照片拖拽到所需顺序来重新排列文档中的页面顺序（见图 12-4）。\n\n    ![A450041_1_En_12_Fig4_HTML.jpg](img/A450041_1_En_12_Fig4_HTML.jpg)\n\
    \n    图 12-4：拖拽页面以重新排序\n3. 点击 `裁剪` 工具来修改裁剪区域。使用矩形定义要裁剪的区域，然后点击 `完成`。你可以点击 `旋转`\
    \ 图标来更改页面的旋转方向。\n4. 你可能会注意到页面上的颜色与原文档不同。你可以通过点击 `颜色编辑` 图标来确定图像的颜色类型，该图标允许你在 `原始照片`、`自动颜色`、`灰度`\
    \ 和 `白板` 之间选择（见图 12-5）。\n\n    ![A450041_1_En_12_Fig5_HTML.jpg](img/A450041_1_En_12_Fig5_HTML.jpg)\n\
    \n    图 12-5：为最终文档选择颜色设置\n\n### 步骤 3：共享文档\n\n你可以通过点击屏幕右上角的 `保存 PDF` 按钮来保存文档并与他人共享。你需要添加文档名称。如果你拥有免费的\
    \ `Adobe Document Cloud` 会员资格，文档将自动保存到云端。你也可以点击 `保存到云端` 手动保存。你可以点击 `共享` 通过电子邮件、Skype、WhatsApp\
    \ 和其他应用程序将文档发送给他人。点击 `共享` 图标后，你将可以选择共享文档链接、共享文档本身、保存到 `Adobe Document Cloud`、保存到\
    \ `Dropbox` 或在其他应用程序中打开。如果你有支持的打印机，还可以打印文档（见图 12-6）。\n\n![A450041_1_En_12_Fig6_HTML.jpg](img/A450041_1_En_12_Fig6_HTML.jpg)\n\
    \n图 12-6：通过 `Adobe Document Cloud` 或其他应用程序共享扫描文档\n\n### 步骤 4：评论文档\n\n当有人向你发送需要审阅的文档（如发票或合同）时，你可以使用\
    \ iPhone 上的 `Acrobat` 在最终签名前添加评论和反馈。你也可以将其发回进行修改。\n\n1. 点击底部工具栏中的 `评论` 图标以激活评论模式。你也可以通过点击\
    \ `Acrobat` 左侧菜单中的 `评论` 进入评论模式（见图 12-7）。\n\n    ![A450041_1_En_12_Fig7_HTML.jpg](img/A450041_1_En_12_Fig7_HTML.jpg)\n\
    \n    图 12-7：在 `Acrobat` 菜单中选择 `评论` 模式\n2. 点击底部工具栏上的 `便签` 图标。点击你想要添加评论的位置。在弹出的对话框中，输入你的姓名，然后输入便签内容。你还可以使用其他工具来高亮文本、添加删除线、下划线文本、添加文本、自由绘制以及添加签名（见图\
    \ 12-8）。\n\n    ![A450041_1_En_12_Fig8_HTML.jpg](img/A450041_1_En_12_Fig8_HTML.jpg)\n\
    \n    图 12-8：使用评论工具添加便签、高亮文本和添加文本\n3. 点击屏幕右上角的 `保存`。关闭应用后，你可以点击便签并将其拖拽到页面的任意位置。\n\
    \n### 步骤 5：填写并签署文档\n\n使用工具：`Adobe Fill and Sign`\n\n如果你有需要填写并签署的合同、表格或发票，`Adobe`\
    \ 提供了一款免费应用 `Adobe Fill and Sign`，让你可以直接在 iPhone 上完成操作。`Adobe Fill and Forms`\
    \ 通过保存你经常用于填写表格的基本信息（如姓名、地址、电子邮件、电话等）来节省时间。此外，它还会存储你的数字签名和姓名首字母，以便快速轻松地填写表格。\n\
    \n### 步骤 6：填写个人资料\n\n要填写个人资料，请按照以下步骤操作：\n\n![A450041_1_En_12_Fig9_HTML.jpg](img/A450041_1_En_12_Fig9_HTML.jpg)\n\
    \n图 12-9：在 `Fill & Sign` 应用中填写个人资料信息\n\n1. 打开 `Fill and Sign` 应用。\n2. 点击底部工具栏中的\
    \ `个人资料` 图标，然后填写你可能会在表格中使用的个人信息，例如姓名、地址、电子邮件等（见图 12-9）。\n"
- fmt: "### Step 7: Add Your Signature and Initials\n\nTo add your signature and initials,\
    \ follow these steps:\n\n1. Tap the `Signature` icon and choose to add either\
    \ a signature or your initials. The window allows you to draw your signature with\
    \ your finger or using a stylus pen. I suggest using a stylus pen if you can’t\
    \ create an accurate one with your finger (see Figure [12-10](#A450041_1_En_12_Chapter.html#Fig10)).\n\
    \n    ![A450041_1_En_12_Fig10_HTML.jpg](A450041_1_En_12_Fig10_HTML.jpg)\n\n  \
    \  Figure 12-10 Creating a digital signature using the `Fill & Sign` app\n\n2.\
    \ You can also click the `Camera` icon on the bottom right to take a photo of\
    \ your hard-copy signature and use it. If you already have a signature image,\
    \ you can click the image icon to navigate to your `Camera Roll` and use that\
    \ signature image.\n\n### Step 8: Fill in Forms\n\nTo fill in forms, follow these\
    \ steps:\n\n1. After setting up your profile information and signature, you can\
    \ start filling in forms. Click the field you want to fill in, such as the name.\
    \ A text field appears to let you fill the form by typing the information (see\
    \ Figure [12-11](#A450041_1_En_12_Chapter.html#Fig11)).\n\n    ![A450041_1_En_12_Fig11_HTML.jpg](A450041_1_En_12_Fig11_HTML.jpg)\n\
    \n    Figure 12-11 Filling in forms using data from the profile information\n\n\
    2. If the information is already saved in your profile, click the `Profile` icon\
    \ and click the piece of information you want to insert to find it added to the\
    \ form.\n3. If the text is longer than the form field, you can click the added\
    \ text to display the resizing rectangle that allows you to click and drag to\
    \ reposition the text or drag the edges to resize the text.\n4. At the end of\
    \ the form, you can apply the same steps as earlier. Click the `Signature` icon\
    \ to choose to add either a full signature or just your initials; once you’ve\
    \ done that, you can reposition or resize what you added (see Figure [12-12](#A450041_1_En_12_Chapter.html#Fig12)).\n\
    \n    ![A450041_1_En_12_Fig12_HTML.jpg](A450041_1_En_12_Fig12_HTML.jpg)\n\n  \
    \  Figure 12-12 Adding a signature from the saved digital signatures\n\n## Build\
    \ a Photography Portfolio\n\nAs a photographer, your profile is crucial to show\
    \ your work to your clients and followers, get feedback, and engage with the photographer\
    \ community. If you want to be a professional photographer, your portfolio and\
    \ your résumé ensure that your client can learn more about your experience and\
    \ talent.\n\nThere are various ways to create your online presence such as personal\
    \ web sites, portfolio web sites, and social network pages. Each of these types\
    \ has its pros and cons.\n\n### Personal Photography Web Site\n\nHaving your own\
    \ web site with your own URL gives you a professional look and ensures followers\
    \ and clients see you as an established business. However, it requires a lot of\
    \ effort and knowledge to register a domain name, a reliable server to host your\
    \ web site, and administration time to upload and maintain the web site content.\
    \ Or, you can pay money to a company to handle this all for you.\n\n### Portfolio\
    \ Web Sites\n\nFor beginner photographers who want to focus on their work, hosting\
    \ their own web site is a time-consuming and expensive choice. Therefore, many\
    \ photographers use portfolio web sites that allow them to create a free account\
    \ (sometimes with paid upgrades). These web sites include the following:\n\n-\
    \ `500px.com`\n- `Behance.net`\n- `1x.com`\n- `Flickr.com`\n\nSome portfolio web\
    \ sites cater to all art fields such as `Behance.net` (see Figure [12-13](#A450041_1_En_12_Chapter.html#Fig13)),\
    \ and others focus on photography such as `500px.com` (see Figure [12-14](#A450041_1_En_12_Chapter.html#Fig14)).\
    \ While these web sites don’t allow you to have your own URL and the freedom to\
    \ design your own web site, they offer numerous advantages. Specifically, portfolio\
    \ web sites save you lots of effort and cost related to creating a professional\
    \ web site. All you need to do is to create a free account and start uploading\
    \ your photos.\n\n![A450041_1_En_12_Fig14_HTML.jpg](A450041_1_En_12_Fig14_HTML.jpg)\n\
    \nFigure 12-14 `500px` is an online profile web site that focuses on photography\n\
    \n![A450041_1_En_12_Fig13_HTML.jpg](A450041_1_En_12_Fig13_HTML.jpg)\n\nFigure\
    \ 12-13 `Behance` is for general-topic online portfolios\n\nAdditionally, many\
    \ of these portfolio web sites include a social networking feature that allows\
    \ you to follow other photographers, rate their work, and comment on their activities.\n\
    \n### Social Network Pages\n\nAnother way to build a portfolio is to use social\
    \ networking sites such as `Facebook`, `Instagram`, and `Pinterest`. These sites\
    \ are great for social interaction and promoting your work. However, these sites\
    \ are not designed to display your work as a true portfolio. Followers see notifications\
    \ once you upload a new photo, and if they need to see your previous work, they\
    \ have to scroll through your past posts or go to the `Photos` section.\n\nBased\
    \ on this, the portfolio web sites can be a good start for both amateur and professional\
    \ photographers to build their portfolios. Some portfolio web sites, such as `500px`,\
    \ even have mobile applications so that you can directly upload the photos you\
    \ take from your iPhone after modifying them. The `500px` app allows you to take\
    \ photos and upload them, and the `Raw` app allows you to take Raw photos and\
    \ upload them to a marketplace to sell."
  raw: "### Step 7: Add Your Signature and Initials\n\nTo add your signature and initials\
    \ , follow these steps:\n\n1.  Tap the Signature icon and choose to add either\
    \ a signature or your initials. The window allows you to draw your signature with\
    \ your finger or using a stylus pen. I suggest using a stylus pen if you can’t\
    \ create an accurate one with your finger (see Figure [12-10](#A450041_1_En_12_Chapter.html#Fig10)).\n\
    \n    ![A450041_1_En_12_Fig10_HTML.jpg](A450041_1_En_12_Fig10_HTML.jpg)\n\n  \
    \  Figure 12-10\n\n    Creating a digital signature using the Fill & Sign app\
    \  \n2.  You can also click the Camera icon on the bottom right to take a photo\
    \ of your hard-copy signature and use it. If you already have a signature image,\
    \ you can click the image icon to navigate to your Camera Roll and use that signature\
    \ image.\n\n### Step 8: Fill in Forms\n\nTo fill in forms , follow these steps:\n\
    \n1.  After setting up your profile information and signature, you can start filling\
    \ in forms. Click the field you want to fill in, such as the name. A text field\
    \ appears to let you fill the form by typing the information (see Figure [12-11](#A450041_1_En_12_Chapter.html#Fig11)).\n\
    \n    ![A450041_1_En_12_Fig11_HTML.jpg](A450041_1_En_12_Fig11_HTML.jpg)\n\n  \
    \  Figure 12-11\n\n    Filling in forms using data from the profile information\
    \  \n2.  If the information is already saved in your profile, click the Profile\
    \ icon and click the piece of information you want to insert to find it added\
    \ to the form.  \n3.  If the text is longer than the form field, you can click\
    \ the added text to display the resizing rectangle that allows you to click and\
    \ drag to reposition the text or drag the edges to resize the text.  \n4.  At\
    \ the end of the form, you can apply the same steps as earlier. Click the Signature\
    \ icon to choose to add either a full signature or just your initials; once you’ve\
    \ done that, you can reposition or resize what you added (see Figure [12-12](#A450041_1_En_12_Chapter.html#Fig12)).\n\
    \n    ![A450041_1_En_12_Fig12_HTML.jpg](A450041_1_En_12_Fig12_HTML.jpg)\n\n  \
    \  Figure 12-12\n\n    Adding a signature from the saved digital signatures\n\n\
    ## Build a Photography Portfolio\n\nAs a photographer, your profile is crucial\
    \ to show your work to your clients and followers, get feedback, and engage with\
    \ the photographer community. If you want to be a professional photographer, your\
    \ portfolio and your résumé ensure that your client can learn more about your\
    \ experience and talent.\n\nThere are various ways to create your online presence\
    \ such as personal web sites, portfolio web sites, and social network pages. Each\
    \ of these types has its pros and cons.\n\n### Personal Photography Web Site\n\
    \nHaving your own web site with your own URL gives you a professional look and\
    \ ensures followers and clients see you as an established business. However, it\
    \ requires a lot of effort and knowledge to register a domain name, a reliable\
    \ server to host your web site, and administration time to upload and maintain\
    \ the web site content. Or, you can pay money to a company to handle this all\
    \ for you.\n\n### Portfolio Web Sites\n\nFor beginner photographers who want to\
    \ focus on their work, hosting their own web site is a time-consuming and expensive\
    \ choice. Therefore, many photographers use portfolio web sites that allow them\
    \ to create a free account (sometimes with paid upgrades). These web sites include\
    \ the following:\n\n*   500px.com\n*   Behance.net\n*   1x.com\n*   Flickr.com\n\
    \nSome portfolio web sites cater to all art fields such as Behance.net (see Figure\
    \ [12-13](#A450041_1_En_12_Chapter.html#Fig13)), and others focus on photography\
    \ such as 500px.com (see Figure [12-14](#A450041_1_En_12_Chapter.html#Fig14)).\
    \ While these web sites don’t allow you to have your own URL and the freedom to\
    \ design your own web site, they offer numerous advantages. Specifically, portfolio\
    \ web sites save you lots of effort and cost related to creating a professional\
    \ web site. All you need to do is to create a free account and start uploading\
    \ your photos.\n\n![A450041_1_En_12_Fig14_HTML.jpg](A450041_1_En_12_Fig14_HTML.jpg)\n\
    \nFigure 12-14\n\n500px is an online profile web site that focuses on photography\n\
    \n![A450041_1_En_12_Fig13_HTML.jpg](A450041_1_En_12_Fig13_HTML.jpg)\n\nFigure\
    \ 12-13\n\nBehance is for general-topic online portfolios\n\nAdditionally, many\
    \ of these portfolio web sites include a social networking feature that allows\
    \ you to follow other photographers, rate their work, and comment on their activities.\n\
    \n### Social Network Pages\n\nAnother way to build a portfolio is to use social\
    \ networking sites such as Facebook, Instagram, and Pinterest. These sites are\
    \ great for social interaction and promoting your work. However, these sites are\
    \ not designed to display your work as a true portfolio. Followers see notifications\
    \ once you upload a new photo, and if they need to see your previous work, they\
    \ have to scroll through your past posts or go to the Photos section.\n\nBased\
    \ on this, the portfolio web sites can be a good start for both amateur and professional\
    \ photographers to build their portfolios. Some portfolio web sites, such as 500px,\
    \ even have mobile applications so that you can directly upload the photos you\
    \ take from your iPhone after modifying them. The 500px app allows you to take\
    \ photos and upload them, and the Raw app allows you to take Raw photos and upload\
    \ them to a marketplace to sell."
  trans: "\n### 步骤 7：添加签名和姓名首字母\n\n要添加签名和姓名首字母，请按以下步骤操作：\n\n1. 点击`签名`图标，选择添加签名或姓名首字母。该窗口允许您用手指或触控笔绘制签名。如果手指无法精确绘制，我建议使用触控笔（见图\
    \ 12-10）。\n\n    ![A450041_1_En_12_Fig10_HTML.jpg](img/A450041_1_En_12_Fig10_HTML.jpg)\n\
    \n    图 12-10 使用`Fill & Sign`应用创建数字签名\n\n2. 您也可以点击右下角的`相机`图标，拍摄纸质签名的照片并使用。如果已有签名图片，可以点击图片图标，导航至`相机胶卷`并使用该签名图片。\n\
    \n### 步骤 8：填写表单\n\n要填写表单，请按以下步骤操作：\n\n1. 设置个人资料信息和签名后，即可开始填写表单。点击要填写的字段，例如姓名。此时会出现一个文本字段，您可以通过输入信息来填写表单（见图\
    \ 12-11）。\n\n    ![A450041_1_En_12_Fig11_HTML.jpg](img/A450041_1_En_12_Fig11_HTML.jpg)\n\
    \n    图 12-11 使用个人资料信息中的数据填写表单\n\n2. 如果信息已保存在您的个人资料中，请点击`个人资料`图标，再点击您要插入的信息，即可将其添加到表单中。\n\
    3. 如果文本超出表单字段范围，可以点击已添加的文本，显示调整大小的矩形框。您可以点击并拖动来重新定位文本，或拖动边缘来调整文本大小。\n4. 在表单末尾，可重复之前的相同步骤。点击`签名`图标，选择添加完整签名或仅添加姓名首字母；完成后，可以重新定位或调整添加内容的大小（见图\
    \ 12-12）。\n\n    ![A450041_1_En_12_Fig12_HTML.jpg](img/A450041_1_En_12_Fig12_HTML.jpg)\n\
    \n    图 12-12 从已保存的数字签名中添加签名\n\n## 构建摄影作品集\n\n作为摄影师，您的个人资料对于向客户和关注者展示作品、获取反馈以及与摄影师社区互动至关重要。如果您想成为专业摄影师，您的作品集和简历能确保客户深入了解您的经验和才华。\n\
    \n有多种方式可以打造您的线上形象，例如个人网站、作品集网站和社交网络页面。每种类型都有其优缺点。\n\n### 个人摄影网站\n\n拥有带专属网址的个人网站，能让您显得更专业，让关注者和客户视您为成熟企业。然而，这需要花费大量精力和专业知识来注册域名、选择可靠的服务器托管网站，并投入管理时间来上传和维护网站内容。或者，您也可以付费请公司为您处理所有事宜。\n\
    \n### 作品集网站\n\n对于希望专注于作品本身的初级摄影师来说，自行托管网站既耗时又昂贵。因此，许多摄影师使用作品集网站，这些网站允许创建免费账户（有时提供付费升级功能）。这些网站包括：\n\
    \n- `500px.com`\n- `Behance.net`\n- `1x.com`\n- `Flickr.com`\n\n部分作品集网站涵盖所有艺术领域，例如\
    \ `Behance.net`（见图 12-13），而其他网站则专注于摄影，例如 `500px.com`（见图 12-14）。虽然这些网站不允许您拥有专属网址和自由设计网站，但它们提供了诸多优势。具体来说，作品集网站为您节省了大量创建专业网站所需的精力和成本。您只需创建一个免费账户，然后开始上传照片即可。\n\
    \n![A450041_1_En_12_Fig14_HTML.jpg](img/A450041_1_En_12_Fig14_HTML.jpg)\n\n图 12-14\
    \ `500px` 是一个专注于摄影的在线个人资料网站\n\n![A450041_1_En_12_Fig13_HTML.jpg](img/A450041_1_En_12_Fig13_HTML.jpg)\n\
    \n图 12-13 `Behance` 适用于通用主题的在线作品集\n\n此外，许多此类作品集网站还包含社交网络功能，允许您关注其他摄影师、评价他们的作品以及评论他们的动态。\n\
    \n### 社交网络页面\n\n另一种构建作品集的方式是使用社交网站，例如 `Facebook`、`Instagram` 和 `Pinterest`。这些网站非常适合社交互动和宣传作品。然而，这些网站并非设计用于将您的作品展示为真正的作品集。关注者会在您上传新照片时收到通知，但如果他们需要查看您之前的作品，则必须滚动浏览过往帖子或前往`照片`版块。\n\
    \n基于以上原因，作品集网站对于业余和专业摄影师构建作品集来说都是一个良好的起点。一些作品集网站，例如 `500px`，甚至提供移动应用，您可以直接从 iPhone\
    \ 上传修改后的照片。`500px` 应用允许您拍摄并上传照片，而 `Raw` 应用则允许您拍摄 Raw 格式照片并上传至市场进行销售。\n"
- fmt: "# Making Your Photos Searchable\n\nIf you have an online presence, through\
    \ either a portfolio site or a social network, you need to make your photos searchable\
    \ where people can find them, buy them, or download them. When clients search\
    \ for a specific photo or a photography service, they type what they need in the\
    \ search field on Google, Bing, or Yahoo.\n\nSearch engines don’t see images like\
    \ we do; they see the metadata associated with an image, such as the image title,\
    \ description, and keywords. When uploading a photo to your portfolio, it is important\
    \ to add this metadata to increase the chance that your clients can find you while\
    \ searching for photos to buy or a photographer to hire.\n\nThankfully, the portfolio\
    \ web sites allow you to easily insert this information while uploading your photos.\
    \ In the following steps, I will walk you through uploading a photo from your\
    \ iPhone to your `500px.com` profile using the 500px app:\n\n1.  Open the 500px\
    \ app on your iPhone.\n2.  Tap the Camera icon on the bottom toolbar. This will\
    \ allow you either to take a photo or to select a photo from your device.\n3.\
    \  Tap the Camera Roll to access your photo album and select the photo that you\
    \ want to upload to your profile (see Figure [12-15](#A450041_1_En_12_Chapter.html#Fig15)).\n\
    \n    ![A450041_1_En_12_Fig15_HTML.jpg](A450041_1_En_12_Fig15_HTML.jpg)\n\n  \
    \  Figure 12-15\n\n    Capture a photo or choose one from your Camera Roll to\
    \ upload to your 500px profile\n4.  In the description field, type descriptive\
    \ information about your photo, such as what it is, its category, its location,\
    \ and other photography specifications.\n5.  In the Category section, you can\
    \ select the category of your photo.\n6.  In the keywords section, you will notice\
    \ that the app has added keywords based on the photo content; you can add more\
    \ keywords or remove the nonsuitable keywords (see Figure [12-16](#A450041_1_En_12_Chapter.html#Fig16)).\n\
    \n    ![A450041_1_En_12_Fig16_HTML.jpg](A450041_1_En_12_Fig16_HTML.jpg)\n\n  \
    \  Figure 12-16\n\n    Add the photo description, category, and keywords before\
    \ uploading it\n7.  Click Upload.\n8.  Once your photo is uploaded, you can share\
    \ it with your followers on different social networks.\n\nIf you used any of the\
    \ Adobe apps to modify your photo, you can directly upload it to your `Behance.net`\
    \ account from in that app, as follows:\n\n1.  Open one of the projects you created\
    \ previously in this book in the `Photoshop Mix` app.\n2.  Click the Share icon\
    \ at the top right of the screen and choose Behance (Figure [12-17](#A450041_1_En_12_Chapter.html#Fig17)).\n\
    \n    ![A450041_1_En_12_Fig17_HTML.jpg](A450041_1_En_12_Fig17_HTML.jpg)\n\n  \
    \  Figure 12-17\n\n    In `Photoshop Mix`, choose Behance from the Share menu\n\
    3.  Tap the Text icon in the bottom toolbar to add a description for the photo,\
    \ and tap Save. You can tap the Reorder link to change the order of the text and\
    \ image. Once done, click Next (see Figure [12-18](#A450041_1_En_12_Chapter.html#Fig18)).\n\
    \n    ![A450041_1_En_12_Fig18_HTML.jpg](A450041_1_En_12_Fig18_HTML.jpg)\n\n  \
    \  Figure 12-18\n\n    Use the Text icon to add text to your project\n4.  On the\
    \ Select Cover page, set the cover for your project from the bottom images. Tap\
    \ Next.\n5.  On the Info page, fill in the project information (see Figure [12-19](#A450041_1_En_12_Chapter.html#Fig19)).\n\
    6.  Tap Advanced to add more details about the project.\n7.  Tap Publish.\n\n\
    \    ![A450041_1_En_12_Fig19_HTML.jpg](A450041_1_En_12_Fig19_HTML.jpg)\n\n   \
    \ Figure 12-19\n\n    Add the project information. Tap Advanced Settings to add\
    \ more detailed information\n\n# Selling Photos Online\n\nIt is time to make some\
    \ money from your iPhone photos. With the advanced camera features, tools, and\
    \ techniques you learned, you can make money from your beautiful iPhone photos.\
    \ Although the photo market is competitive, good photos can make an impact. Before\
    \ starting to upload your photos to sell, there are some general guidelines that\
    \ you need to consider to professionally brand your work. These guidelines include\
    \ the following:\n\n- You need to have a professional profile on the web sites\
    \ that sell photos. When someone buys your photo, there is a higher chance they\
    \ will visit your profile or see your other photos. So, it is important to keep\
    \ it professional. You can easily learn about professional profiles by visiting\
    \ the top profiles on each web site to see how they look and try to get inspiration\
    \ from them.\n- You need to understand the market demand. What are the photos\
    \ that people most want to buy? Actually, the answer to this question varies from\
    \ one web site to another, as you will see later. Therefore, you need to do some\
    \ research about the most downloaded photos, their themes, and the categories\
    \ they’re in. This can help you to learn which photos to upload to specific platforms.\
    \ Additionally, many of the current photo-selling web sites give you a higher\
    \ rate for exclusive photos that you don’t upload to other web sites. Accordingly,\
    \ you can determine which photos are suitable for each web site.\n\n## Where to\
    \ Sell Your Photos?\n\nWhen it comes to selling your photos, there are different\
    \ platforms where you can create a photography profile and sell your photos. Usually,\
    \ they are commission-based platforms, where you get a percentage of each sale.\
    \ The more sales you achieve, the more percentage you get. This model encourages\
    \ photographers to promote their photos and upload more photos to increase their\
    \ sale percentage.\n\nThere are many stock photograph web sites, and you can try\
    \ them all; however, it is probably good to focus on the popular web sites because\
    \ you will have a better chance to sell your photos there. Sadly, the competition\
    \ on these web sites is also high. These web sites include the following:\n\n\
    - Pond 5: `https://www.pond5.com`\n- Adobe Stock: `https://stock.adobe.com`\n\
    - Shutter Stock: `https://www.shutterstock.com`\n- iStockphotos: `www.istockphoto.com`\n\
    - 500px Marketplace: `https://marketplace.500px.com`\n\nSome of these applications\
    \ such as Adobe Stock and 500px allow you to submit your photos to their marketplace\
    \ directly from your iPhone. In Adobe Stock, you can open an Adobe mobile app\
    \ such as `Photoshop Mix` and click the Share icon, where you can choose Adobe\
    \ Stock (see Figure [12-20](#A450041_1_En_12_Chapter.html#Fig20)).\n\n![A450041_1_En_12_Fig20_HTML.jpg](A450041_1_En_12_Fig20_HTML.jpg)\n\
    \nFigure 12-20\n\nYou can upload your photos to the Adobe Stock marketplace from\
    \ `Photoshop Mix`\n\nFor 500px, you can download the Raw app, which allows you\
    \ to take Camera Raw photos directly from your iPhone. After modifying the image,\
    \ you can choose to submit it to their marketplace.\n\nAlso, you can sell your\
    \ photos on arts-and-crafts web sites such as Easy, which allows you to sell any\
    \ physical and digital artwork by opening a store. Then you can provide your photos,\
    \ which customers can either download or print it, or you can deliver them as\
    \ a printed physical product. While Etsy does not focus exclusively on selling\
    \ photos, it allows you to provide your photos in both digital and printed formats.\
    \ This can maximize your revenues.\n\nFinally, you can sell your photos on your\
    \ own web site if you create an online store on a web site such as Shopify, which\
    \ maximizes your revenues per photo because there is no commission charged for\
    \ the stock photo web site. However, you need to heavily market your web site\
    \ to find clients, which is not an easy job."
