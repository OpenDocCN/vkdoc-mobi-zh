    \ platforms where you can create a photography profile and sell your photos. Usually,\
    \ they are commission-based platforms, where you get a percentage of each sale.\
    \ The more sales you achieve, the more percentage you get. This model encourages\
    \ photographers to promote their photos and upload more photos to increase their\
    \ sale percentage.\n\nThere are many stock photograph web sites, and you can try\
    \ them all; however, it is probably good to focus on the popular web sites because\
    \ you will have a better chance to sell your photos there. Sadly, the competition\
    \ on these web sites is also high. These web sites include the following:\n\n\
    *   Pond 5: [`https://www.pond5.com`](https://www.pond5.com)\n*   Adobe Stock:\
    \ [`https://stock.adobe.com`](https://stock.adobe.com)\n*   Shutter Stock: [`https://www.shutterstock.com`](https://www.shutterstock.com)\n\
    *   iStockphotos: [`www.istockphoto.com`](http://www.istockphoto.com)\n*   500px\
    \ Marketplace: [`https://marketplace.500px.com`](https://marketplace.500px.com)\n\
    \nSome of these applications such as Adobe Stock and 500px allow you to submit\
    \ your photos to their marketplace directly from your iPhone. In Adobe Stock,\
    \ you can open an Adobe mobile app such as Photoshop Mix and click the Share icon,\
    \ where you can choose Adobe Stock (see Figure [12-20](#A450041_1_En_12_Chapter.html#Fig20)).\n\
    \n![A450041_1_En_12_Fig20_HTML.jpg](A450041_1_En_12_Fig20_HTML.jpg)\n\nFigure\
    \ 12-20\n\nYou can upload your photos to the Adobe Stock marketplace from Photoshop\
    \ Mix\n\nFor 500px, you can download the Raw app, which allows you to take Camera\
    \ Raw photos directly from your iPhone. After modifying the image, you can choose\
    \ to submit it to their marketplace.\n\nAlso, you can sell your photos on arts-and-crafts\
    \ web sites such as Easy, which allows you to sell any physical and digital artwork\
    \ by opening a store. Then you can provide your photos, which customers can either\
    \ download or print it, or you can deliver them as a printed physical product.\
    \ While Etsy does not focus exclusively on selling photos, it allows you to provide\
    \ your photos in both digital and printed formats. This can maximize your revenues.\n\
    \nFinally, you can sell your photos on your own web site if you create an online\
    \ store on a web site such as Shopify, which maximizes your revenues per photo\
    \ because there is no commission charged for the stock photo web site. However,\
    \ you need to heavily market your web site to find clients, which is not an easy\
    \ job."
  trans: "\n# 让您的照片易于搜索\n\n如果您通过作品集网站或社交网络在线上存在，您需要让您的照片易于搜索，以便人们能够找到、购买或下载它们。当客户搜索特定照片或摄影服务时，他们会在\
    \ Google、Bing 或 Yahoo 的搜索框中输入所需内容。\n\n搜索引擎不像我们一样“看”图像；它们查看的是与图像关联的元数据，例如图像标题、描述和关键词。将照片上传到作品集时，添加这些元数据至关重要，这能增加客户在搜索要购买的照片或要雇佣的摄影师时找到您的几率。\n\
    \n幸运的是，作品集网站允许您在上传照片时轻松插入这些信息。在接下来的步骤中，我将引导您通过 500px 应用，将照片从您的 iPhone 上传到您的 `500px.com`\
    \ 个人资料：\n\n1.  在您的 iPhone 上打开 500px 应用。\n2.  点击底部工具栏上的相机图标。这将允许您拍摄一张照片或从您的设备中选择一张照片。\n\
    3.  点击“相机胶卷”以访问您的相册，并选择您要上传到个人资料的照片（见图 12-15）。\n\n    ![A450041_1_En_12_Fig15_HTML.jpg](img/A450041_1_En_12_Fig15_HTML.jpg)\n\
    \n    图 12-15\n\n    拍摄一张照片或从相机胶卷中选择一张，上传到您的 500px 个人资料\n4.  在描述字段中，输入关于您照片的描述性信息，例如它是什么、类别、拍摄地点以及其他摄影规格。\n\
    5.  在“类别”部分，您可以选择您照片的类别。\n6.  在关键词部分，您会注意到应用已根据照片内容添加了关键词；您可以添加更多关键词或移除不合适的关键词（见图\
    \ 12-16）。\n\n    ![A450041_1_En_12_Fig16_HTML.jpg](img/A450041_1_En_12_Fig16_HTML.jpg)\n\
    \n    图 12-16\n\n    在上传照片前添加照片描述、类别和关键词\n7.  点击“上传”。\n8.  照片上传后，您可以在不同的社交网络上与您的关注者分享它。\n\
    \n如果您使用任何 Adobe 应用修改过照片，您可以直接从该应用中将照片上传到您的 `Behance.net` 账户，操作如下：\n\n1.  在 `Photoshop\
    \ Mix` 应用中打开您之前在本教程中创建的项目之一。\n2.  点击屏幕右上角的分享图标，然后选择 Behance（图 12-17）。\n\n    ![A450041_1_En_12_Fig17_HTML.jpg](img/A450041_1_En_12_Fig17_HTML.jpg)\n\
    \n    图 12-17\n\n    在 `Photoshop Mix` 中，从分享菜单中选择 Behance\n3.  点击底部工具栏中的文本图标，为照片添加描述，然后点击“保存”。您可以点击“重新排序”链接来更改文本和图像的顺序。完成后，点击“下一步”（见图\
    \ 12-18）。\n\n    ![A450041_1_En_12_Fig18_HTML.jpg](img/A450041_1_En_12_Fig18_HTML.jpg)\n\
    \n    图 12-18\n\n    使用文本图标为您的项目添加文字\n4.  在“选择封面”页面上，从底部的图像中为您的项目设置封面。点击“下一步”。\n\
    5.  在“信息”页面上，填写项目信息（见图 12-19）。\n6.  点击“高级”为项目添加更多详细信息。\n7.  点击“发布”。\n\n    ![A450041_1_En_12_Fig19_HTML.jpg](img/A450041_1_En_12_Fig19_HTML.jpg)\n\
    \n    图 12-19\n\n    添加项目信息。点击“高级设置”以添加更详细的信息\n\n# 在线销售照片\n\n现在是时候用您的 iPhone 照片赚钱了。凭借您学到的先进相机功能、工具和技巧，您可以用漂亮的\
    \ iPhone 照片赚钱。尽管照片市场竞争激烈，但好的照片仍然能产生影响。在开始上传您的照片进行销售之前，您需要考虑一些通用准则，以便专业地打造您的作品品牌。这些准则包括以下几点：\n\
    \n-   您需要在销售照片的网站上拥有一个专业的个人资料。当有人购买您的照片时，他们更有可能访问您的个人资料或浏览您的其他照片。因此，保持专业形象很重要。您可以通过访问每个网站上的顶级资料，查看它们的外观并从中获取灵感，来轻松了解专业的个人资料。\n\
    -   您需要了解市场需求。哪些照片是人们最想购买的？实际上，这个问题的答案因网站而异，您稍后会看到。因此，您需要做一些研究，了解下载量最高的照片、它们的主题以及所属类别。这可以帮助您了解哪些照片适合上传到特定平台。此外，许多当前的图片销售网站会为您未上传到其他网站的独家照片提供更高的费率。据此，您可以决定哪些照片适合每个网站。\n\
    \n## 在哪里销售您的照片？\n\n谈到销售您的照片，有多个平台可供您创建摄影资料并出售照片。通常，它们是基于佣金的平台，您可从每笔销售中获得一定比例的提成。您实现的销售额越高，获得的提成比例就越高。这种模式鼓励摄影师推广自己的照片并上传更多照片，以提高他们的销售提成比例。\n\
    \n有许多图库网站，您可以都尝试一下；然而，最好还是专注于热门的网站，因为您在那里将有更好的机会销售照片。可惜的是，这些网站上的竞争也很激烈。这些网站包括：\n\
    \n-   Pond 5：`https://www.pond5.com`\n-   Adobe Stock：`https://stock.adobe.com`\n\
    -   Shutter Stock：`https://www.shutterstock.com`\n-   iStockphotos：`www.istockphoto.com`\n\
    -   500px Marketplace：`https://marketplace.500px.com`\n\n其中一些应用程序，如 Adobe Stock\
    \ 和 500px，允许您直接从 iPhone 将照片提交到它们的市场。在 Adobe Stock 中，您可以打开一个 Adobe 移动应用（如 `Photoshop\
    \ Mix`），点击分享图标，然后选择 Adobe Stock（见图 12-20）。\n\n![A450041_1_En_12_Fig20_HTML.jpg](img/A450041_1_En_12_Fig20_HTML.jpg)\n\
    \n图 12-20\n\n您可以从 `Photoshop Mix` 将照片上传到 Adobe Stock 市场\n\n对于 500px，您可以下载 Raw\
    \ 应用，它允许您直接从 iPhone 拍摄 Camera Raw 照片。修改图像后，您可以选择将其提交到它们的市场。\n\n此外，您还可以在工艺品网站（如\
    \ Etsy）上销售您的照片，该网站允许您通过开设店铺来销售任何实体和数字艺术品。然后您可以提供您的照片，客户可以下载或打印它们，或者您也可以将它们作为打印的实体产品交付。虽然\
    \ Etsy 并非专注于销售照片，但它允许您以数字和打印两种格式提供您的照片。这可以最大化您的收入。\n\n最后，如果您在诸如 Shopify 之类的网站上创建在线商店，您可以在自己的网站上销售照片，这可以最大化每张照片的收入，因为无需向图库网站支付佣金。但是，您需要大力推广您的网站来寻找客户，这并非易事。\n"
- fmt: '# Summary


    You can take your mobile photography hobby to a new professional level by mastering
    the business-related tips in this chapter. The new iPhone versions have dramatically
    improved the camera and photography features, which allows you to take professional
    photos that you can sell online or add to your professional portfolio. The iPhone
    also allows you to manage your photography business by giving you access to your
    documents, where you can review, comment, sign, and share them with your peers.
    Also, you can upload our photos directly from your phone to your online profile
    and submit it to marketplaces.


    # Practice Exercise


    The exercise in this chapter is a little different from the previous ones as it
    doesn’t involve any photo editing. Find a paper document or a contract you have
    in your desk and try to digitalize it by scanning it with the `Acrobat` app. Then,
    start using the comment tools to add your notes to the document. In addition,
    choose a photo from the previously covered projects and upload it to your profile
    on `500px` or `Behance` directly from your iPhone. Don’t forget to add the necessary
    information to make your work searchable and visible.


    # Appendix A: Photographer Profiles


    There are many amazing photographers who work with the iPhone. Get inspired by
    them in this appendix.


    ## Amo Passicos


    [`http://melle-amo.fr/`](http://melle-amo.fr/)


    ![A450041_1_En_BookBackmatter_Figa_HTML.jpg](A450041_1_En_BookBackmatter_Figa_HTML.jpg)


    Amo Passicos is self-taught. Even though her pictures might suggest she is short-sighted,
    chaotic, and family-driven, they simply display the serious disorder of scattered
    reminiscences she tries to keep before memory escapes her.


    Attracted by technological novelty and its spin-off, Amo has peppily tested the
    hundreds of apps her iPhone offers, with a “first mover” approach. Seduced by
    the immediacy of images, she shoots her photos by game and with a genuine desire
    to contribute to the emergence of a new artistic form.


    She currently lives in the south of France and manages female rock bands.


    ![A450041_1_En_BookBackmatter_Figg_HTML.jpg](A450041_1_En_BookBackmatter_Figg_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figf_HTML.jpg](A450041_1_En_BookBackmatter_Figf_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Fige_HTML.jpg](A450041_1_En_BookBackmatter_Fige_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figd_HTML.jpg](A450041_1_En_BookBackmatter_Figd_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figc_HTML.jpg](A450041_1_En_BookBackmatter_Figc_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figb_HTML.jpg](A450041_1_En_BookBackmatter_Figb_HTML.jpg)


    ## Mandy Blake


    [`www.mandyblakephotography.com`](http://www.mandyblakephotography.com)


    ![A450041_1_En_BookBackmatter_Figh_HTML.jpg](A450041_1_En_BookBackmatter_Figh_HTML.jpg)


    Mandy Blake is a working photographer from Kitchener, Ontario, in Canada. She
    is an award-winning iPhoneographer who has been featured several times in Apple’s
    “Shot on iPhone” ad campaigns. When she is not chasing light with her iPhone,
    both above and below the waves, she is a busy wedding and family photographer
    with a documentary eye and relaxed style.


    ![A450041_1_En_BookBackmatter_Figp_HTML.jpg](A450041_1_En_BookBackmatter_Figp_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figo_HTML.jpg](A450041_1_En_BookBackmatter_Figo_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Fign_HTML.jpg](A450041_1_En_BookBackmatter_Fign_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figm_HTML.jpg](A450041_1_En_BookBackmatter_Figm_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figl_HTML.jpg](A450041_1_En_BookBackmatter_Figl_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figk_HTML.jpg](A450041_1_En_BookBackmatter_Figk_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figj_HTML.jpg](A450041_1_En_BookBackmatter_Figj_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figi_HTML.jpg](A450041_1_En_BookBackmatter_Figi_HTML.jpg)


    ## Michael Clawson


    ![A450041_1_En_BookBackmatter_Figq_HTML.jpg](A450041_1_En_BookBackmatter_Figq_HTML.jpg)


    Michael Clawson is Chief Fish at Big Fish Creations, an advertising and digital
    media company in the Sierra town of Graeagle. His background began in Silicon
    Valley when Apple Computer and Adobe Systems first made their marks in desktop
    publishing. He was introduced to interactive media early in his career, transitioned
    to production artist and, later, creator and lead principal of an interactive
    department at a major Nevada advertising agency. Specializing in branding across
    multiple media platforms, his diverse repertoire includes a hybrid combination
    of designer and developer with emphasis on graphic design, branding, photography,
    and communication. As a speaker, Michael has presented at several industry-specific
    conferences including Adobe Max and MacWorld.


    Michael began communicating as an iPhoneographer in late 2011 when he discovered
    the power wrapped inside his tiny telephone camera. As a professional photographer,
    he began to explore the limitations of the iPhone (and thus learned its strengths)
    and soon began to exploit various facets of his creativity with the device. He
    credits Instagram as the artistic sharing community where iPhoneography and art
    have flourished, giving him inspiration toward new opportunities and new discoveries.
    Michael is also a published author and often writes about and teaches iPhoneography
    and creative editing.


    ![A450041_1_En_BookBackmatter_Figy_HTML.jpg](A450041_1_En_BookBackmatter_Figy_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figx_HTML.jpg](A450041_1_En_BookBackmatter_Figx_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figw_HTML.jpg](A450041_1_En_BookBackmatter_Figw_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figv_HTML.jpg](A450041_1_En_BookBackmatter_Figv_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figu_HTML.jpg](A450041_1_En_BookBackmatter_Figu_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figt_HTML.jpg](A450041_1_En_BookBackmatter_Figt_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figs_HTML.jpg](A450041_1_En_BookBackmatter_Figs_HTML.jpg)


    ![A450041_1_En_BookBackmatter_Figr_HTML.jpg](A450041_1_En_BookBackmatter_Figr_HTML.jpg)'
