- fmt: "### Save People’s Faces\n\nBy default when you take a photo and save it in\
    \ the `Photos` app, the app tries to identify the people in the photo and saves\
    \ the faces in the `People` folder. To take advantage of the face recognition\
    \ feature in the `Photos` app, you need to assign a name for each recognized person\
    \ in the `People` folder as follows:\n\n![A450041_1_En_1_Fig12_HTML.jpg](A450041_1_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12  \nAdd the name of the person in the name field\n\n1.  Open the\
    \ `People` folder in the `Photos` app’s `Albums` folder.\n2.  Select one of the\
    \ identified faces and tap it; the face will be displayed along with the photos\
    \ that include it.\n3.  In the name field at the top of the screen, add the name\
    \ of the person, as shown in Figure [1-12](#A450041_1_En_1_Chapter.html#Fig12).\
    \ A drop-down list shows the names in the contact list. Select a name from the\
    \ list.\n\nIf the photo of a person is displayed more than one time, this means\
    \ the application couldn’t identify that those are actually one person. So, you\
    \ can apply these same steps with the second face photo for the same person and\
    \ include the same name. The application will ask you to merge the two data to\
    \ unify all the images of the selected person.\n\nAfter applying these steps,\
    \ use the search feature as highlighted earlier to search for the person’s name;\
    \ you will notice all the person’s photos are displayed in the search results.\n\
    \n### Add Photos to Your Favorites and Create Albums\n\nSometimes you take a number\
    \ of shots of the same scene and want to “favorite” one of these shots to be able\
    \ to filter or use it later in photo editing. You can add photos to the `Favorite`\
    \ folder with these steps:\n\n![A450041_1_En_1_Fig13_HTML.jpg](A450041_1_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13  \nTap the `Favorite` icon to save an image as a favorite\n\n1.\
    \  Tap the photo to open it. Note that you don’t need to open it full-screen.\n\
    2.  Tap the `Favorite` icon in the bottom bar, as shown in Figure [1-13](#A450041_1_En_1_Chapter.html#Fig13).\n\
    \nYou can also organize photos by adding them to new albums; you can create a\
    \ new album by doing the following:\n\n![A450041_1_En_1_Fig14_HTML.jpg](A450041_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14  \nType the name of the new album in the name field\n\n1.  Tap the\
    \ `Albums` icon on the bottom right of the screen.\n2.  Tap the plus icon on the\
    \ top right side of the screen.\n3.  Add the new album name and tap `Save`, as\
    \ shown in Figure [1-14](#A450041_1_En_1_Chapter.html#Fig14).\n\nTo add a photo\
    \ to an album or the newly created one, you can do the following:\n\n1.  Access\
    \ the `Camera Roll` or any of the folders.\n2.  Tap the `Select` icon at the top\
    \ right of the screen.\n3.  Select a photo or a number of photos.\n4.  Tap `Add\
    \ To` at the bottom of the screen.\n\nSelect the album you want to add the photo\
    \ to or tap `New Album` to create a new album and add the photo to it, as shown\
    \ in Figure [1-15](#A450041_1_En_1_Chapter.html#Fig15).\n\n![A450041_1_En_1_Fig15_HTML.jpg](A450041_1_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15  \nYou can add selected photos to existing albums or create a new\
    \ album\n\n## Summary\n\nYour iPhone comes with advanced photography capabilities\
    \ to help you take professional photos. Both the `Camera` and `Photos` apps include\
    \ helpful features that can boost your iPhone photography skills. The `Camera`\
    \ app includes hidden features that allow you to take photos quickly even without\
    \ tapping the camera button. Also, it allows you to create different effects,\
    \ such as `Live Photos` videos and `HDR` photos. Further, it gives you the option\
    \ to modify the exposure and focus of a photo either automatically or manually.\
    \ The `Photos` app extends your ability to organize photos in albums and favorites,\
    \ and you can use the search feature to look up photos based on the people in\
    \ it, objects, and dates. The next step is to start practicing these basic features\
    \ before moving forward to more advanced options in the next chapters.\n\n## Practice\
    \ Exercise\n\nIn this practice exercise, explore the different features in your\
    \ iPhone. Take a number of photos of your favorite places, organize these photos,\
    \ and add them to an album in your `Photos` app. Share it in the book’s group\
    \ on Facebook and comment on other people’s photos.\n\n# 2. Photo Retouching Techniques\n\
    \nIn the previous chapter, you learned how to efficiently use the `Photos` app\
    \ and the `Camera` app on your iPhone to take photos and organize them into albums.\
    \ In many situations, taking photos using an iPhone is spontaneous: you notice\
    \ an interesting scene or an action, so you grab your phone and take the shot.\
    \ Unfortunately, the spur-of-the-moment nature of taking photos using mobile devices\
    \ increases the chances of having problems related to colors, light, and composition.\
    \ These problems can be frustrating, but you can fix them using the default `Photos`\
    \ app or a wide range of apps that can be downloaded (either for free or a cost)\
    \ from the `Apple App Store`. This chapter’s tips go through the steps to make\
    \ these types of basic modifications on images.\n\n## Fix a Photo’s Colors\n\n\
    Tools used: `Photos` app, `Adobe Lightroom` app\n\nA common problem when taking\
    \ photos is poor lighting, which can cause bad color conditions. This is something\
    \ that can’t be easily overcome when taking photos with your phone because you\
    \ would need to carry external light sources and gear to fix the issues. So, when\
    \ you take photos using your phone, you may have to modify the colors. You can\
    \ do this by changing a photo’s properties such as the hue, saturation, contrast,\
    \ temperature, and so on.\n\nMany photo-editing applications can help you to modify\
    \ the photo’s color settings. Here, you will explore how to modify the image colors\
    \ using the `Photos` app on your mobile device and the `Adobe Lightroom` app that\
    \ you can download for free from the `App Store`.\n\n### Modify Colors Using the\
    \ Photos App\n\nWith the recent updates of the iPhone’s iOS, the `Photos` app\
    \ has offers basic photo modification tools that can help you modify your photos\
    \ without the need to install any third-party applications. These tools work fine,\
    \ and you don’t have to fill your phone with many applications, especially if\
    \ your phone has limited storage capacity. To edit a photo’s colors using the\
    \ `Photos` app, follow these steps:\n\n1.  Open the `Photos` app and tap the photo\
    \ you want to edit to display it full size.\n2.  Tap the adjustment icon at the\
    \ bottom of the screen (`Edit` in previous versions). This allows you to access\
    \ photo-editing mode, as shown in Figure [2-1](#A450041_1_En_2_Chapter.html#Fig1).\n\
    \n    ![A450041_1_En_2_Fig1_HTML.jpg](A450041_1_En_2_Fig1_HTML.jpg)\n\n    Figure\
    \ 2-1  \n    Accessing photo-editing mode in the `Photos` app\n3.  Tap the editing\
    \ icon, as shown in Figure [2-2](#A450041_1_En_2_Chapter.html#Fig2), to access\
    \ the edit options for `Light`, `Color`, and `B&W`. The `Light` options allow\
    \ you to modify the light in the image, `Color` lets you modify the color properties,\
    \ and `B&W` lets you convert the photo to black and white.\n\n    ![A450041_1_En_2_Fig2_HTML.jpg](A450041_1_En_2_Fig2_HTML.jpg)\n\
    \n    Figure 2-2  \n    The editing icon allows you to access the `Light`, `Color`,\
    \ and `B&W` settings\n4.  Tap the `Color` item to expand it.\n5.  Drag the `Saturation`\
    \ slider to the left (moving the saturation red line to the right) to increase\
    \ the saturation of the colors.\n6.  Tap the icon at the top right of the slider,\
    \ and select `Contrast` in the `Color` section, as shown in Figure [2-3](#A450041_1_En_2_Chapter.html#Fig3).\n\
    7.  Drag the `Contrast` slider to the left (moving the contrast red line to the\
    \ right) to increase the contrasted colors.\n\n    ![A450041_1_En_2_Fig3_HTML.jpg](A450041_1_En_2_Fig3_HTML.jpg)\n\
    \n    Figure 2-3  \n    The `Color` adjustment options"
  raw: "### Save People’s Faces\n\nBy default when you take a photo and save it in\
    \ the Photos app, the app tries to identify the people in the photo and saves\
    \ the faces in the People folder. To take advantage of the face recognition feature\
    \ in the Photos app, you need to assign a name for each recognized person in the\
    \ People folder as follows:\n\n![A450041_1_En_1_Fig12_HTML.jpg](A450041_1_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12\n\nAdd the name of the person in the name field\n\n1.  Open the\
    \ People folder in the Photos app’s Albums folder.  \n2.  Select one of the identified\
    \ faces and tap it; the face will be displayed along with the photos that include\
    \ it.  \n3.  In the name field at the top of the screen, add the name of the person,\
    \ as shown in Figure [1-12](#A450041_1_En_1_Chapter.html#Fig12). A drop-down list\
    \ shows the names in the contact list. Select a name from the list.  \n\nIf the\
    \ photo of a person is displayed more than one time, this means the application\
    \ couldn’t identify that those are actually one person. So, you can apply these\
    \ same steps with the second face photo for the same person and include the same\
    \ name . The application will ask you to merge the two data to unify all the images\
    \ of the selected person.\n\nAfter applying these steps, use the search feature\
    \ as highlighted earlier to search for the person’s name; you will notice all\
    \ the person’s photos are displayed in the search results.\n\n### Add Photos to\
    \ Your Favorites and Create Albums\n\nSometimes you take a number of shots of\
    \ the same scene and want to “favorite” one of these shots to be able to filter\
    \ or use it later in photo editing. You can add photos to the Favorite folder\
    \ with these steps:\n\n![A450041_1_En_1_Fig13_HTML.jpg](A450041_1_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13\n\nTap the Favorite icon to save an image as a favorite\n\n1.  Tap\
    \ the photo to open it. Note that you don’t need to open it full-screen.  \n2.\
    \  Tap the Favorite icon in the bottom bar, as shown in Figure [1-13](#A450041_1_En_1_Chapter.html#Fig13).\
    \  \n\nYou can also organize photos by adding them to new albums; you can create\
    \ a new album by doing the following:\n\n![A450041_1_En_1_Fig14_HTML.jpg](A450041_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14\n\nType the name of the new album in the name field\n\n1.  Tap the\
    \ Albums icon on the bottom right of the screen.  \n2.  Tap the plus icon on the\
    \ top right side of the screen.  \n3.  Add the new album name and tap Save, as\
    \ shown in Figure [1-14](#A450041_1_En_1_Chapter.html#Fig14).  \n\nTo add a photo\
    \ to an album or the newly created one, you can do the following:\n\n1.  Access\
    \ the Camera Roll or any of the folders.  \n2.  Tap the Select icon at the top\
    \ right of the screen.  \n3.  Select a photo or a number of photos.  \n4.  Tap\
    \ Add To at the bottom of the screen.  \n\nSelect the album you want to add the\
    \ photo to or tap New Album to create a new album and add the photo to it, as\
    \ shown in Figure [1-15](#A450041_1_En_1_Chapter.html#Fig15).\n\n![A450041_1_En_1_Fig15_HTML.jpg](A450041_1_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15\n\nYou can add selected photos to existing albums or create a new\
    \ album\n\n## Summary\n\nYour iPhone comes with advanced photography capabilities\
    \ to help you take professional photos. Both the Camera and Photos apps include\
    \ helpful features that can boost your iPhone photography skills. The Camera app\
    \ includes hidden features that allow you to take photos quickly even without\
    \ tapping the camera button. Also, it allows you to create different effects,\
    \ such as Live Photos videos and HDR photos. Further, it gives you the option\
    \ to modify the exposure and focus of a photo either automatically or manually.\
    \ The Photos app extends your ability to organize photos in albums and favorites,\
    \ and you can use the search feature to look up photos based on the people in\
    \ it, objects, and dates. The next step is to start practicing these basic features\
    \ before moving forward to more advanced options in the next chapters.\n\n## Practice\
    \ Exercise\n\nIn this practice exercise, explore the different features in your\
    \ iPhone. Take a number of photos of your favorite places, organize these photos,\
    \ and add them to an album in your Photos app. Share it in the book’s group on\
    \ Facebook and comment on other people’s photos.\n\n# 2. Photo Retouching Techniques\n\
    \nIn the previous chapter, you learned how to efficiently use the Photos app and\
    \ the Camera app on your iPhone to take photos and organize them into albums.\
    \ In many situations, taking photos using an iPhone is spontaneous: you notice\
    \ an interesting scene or an action, so you grab your phone and take the shot.\
    \ Unfortunately, the spur-of-the-moment nature of taking photos using mobile devices\
    \ increases the chances of having problems related to colors, light, and composition.\
    \ These problems can be frustrating, but you can fix them using the default Photos\
    \ app or a wide range of apps that can be downloaded (either for free or a cost)\
    \ from the Apple App Store. This chapter’s tips go through the steps to make these\
    \ types of basic modifications on images.\n\n## Fix a Photo’s Colors\n\nTools\
    \ used: Photos app, Adobe Lightroom app\n\nA common problem when taking photos\
    \ is poor lighting, which can cause bad color conditions. This is something that\
    \ can’t be easily overcome when taking photos with your phone because you would\
    \ need to carry external light sources and gear to fix the issues. So, when you\
    \ take photos using your phone, you may have to modify the colors. You can do\
    \ this by changing a photo’s properties such as the hue, saturation, contrast,\
    \ temperature, and so on.\n\nMany photo-editing applications can help you to modify\
    \ the photo’s color settings. Here, you will explore how to modify the image colors\
    \ using the Photos app on your mobile device and the Adobe Lightroom app that\
    \ you can download for free from the App Store.\n\n### Modify Colors Using the\
    \ Photos App\n\nWith the recent updates of the iPhone’s iOS, the Photos app has\
    \ offers basic photo modification tools that can help you modify your photos without\
    \ the need to install any third-party applications. These tools work fine, and\
    \ you don’t have to fill your phone with many applications, especially if your\
    \ phone has limited storage capacity. To edit a photo’s colors using the Photos\
    \ app , follow these steps:\n\n1.  Open the Photos app and tap the photo you want\
    \ to edit to display it full size.  \n2.  Tap the adjustment icon at the bottom\
    \ of the screen (Edit in previous versions). This allows you to access photo-editing\
    \ mode, as shown in Figure [2-1](#A450041_1_En_2_Chapter.html#Fig1).\n\n    ![A450041_1_En_2_Fig1_HTML.jpg](A450041_1_En_2_Fig1_HTML.jpg)\n\
    \n    Figure 2-1\n\n    Accessing photo-editing mode in the Photos app  \n3. \
    \ Tap the editing icon, as shown in Figure [2-2](#A450041_1_En_2_Chapter.html#Fig2),\
    \ to access the edit options for Light, Color, and B&W . The Light options allow\
    \ you to modify the light in the image, Color lets you modify the color properties,\
    \ and B&W lets you convert the photo to black and white.\n\n    ![A450041_1_En_2_Fig2_HTML.jpg](A450041_1_En_2_Fig2_HTML.jpg)\n\
    \n    Figure 2-2\n\n    The editing icon allows you to access the Light, Color,\
    \ and B&W settings  \n4.  Tap the Color item to expand it.  \n5.  Drag the Saturation\
    \ slider to the left (moving the saturation red line to the right) to increase\
    \ the saturation of the colors.  \n6.  Tap the icon at the top right of the slider,\
    \ and select Contrast in the Color section, as shown in Figure [2-3](#A450041_1_En_2_Chapter.html#Fig3).\
    \  \n7.  Drag the Contrast slider to the left (moving the contrast red line to\
    \ the right) to increase the contrasted colors.\n\n    ![A450041_1_En_2_Fig3_HTML.jpg](A450041_1_En_2_Fig3_HTML.jpg)\n\
    \n    Figure 2-3\n\n    The Color adjustment options"
  trans: "\n### 保存人物面部信息\n\n默认情况下，当你拍照并将其保存在`照片`应用中时，该应用会尝试识别照片中的人物，并将面部信息保存到`人物`文件夹中。要利用`照片`应用的人脸识别功能，你需要按以下步骤为`人物`文件夹中的每个已识别人物指定姓名：\n\
    \n![A450041_1_En_1_Fig12_HTML.jpg](img/A450041_1_En_1_Fig12_HTML.jpg)\n\n图 1-12\
    \  \n在姓名字段中添加人物姓名\n\n1.  打开`照片`应用的`相簿`文件夹中的`人物`文件夹。\n2.  选择一个已识别的人脸并轻点它；该人脸将连同包含它的照片一起显示。\n\
    3.  在屏幕顶部的姓名字段中，添加此人的姓名，如图 1-12 所示。此时会显示一个联系人列表中的姓名下拉菜单。从列表中选择一个姓名。\n\n如果某个人的照片显示了多次，这意味着应用未能识别出这些照片实际上是同一个人。因此，你可以对同一个人的第二张人脸照片应用相同的步骤，并输入相同的姓名。应用会询问你是否合并两组数据，以统一选定人物的所有图像。\n\
    \n完成这些步骤后，使用之前提到的搜索功能搜索该人物的姓名；你会发现该人物的所有照片都显示在搜索结果中。\n\n### 将照片添加到个人收藏并创建相簿\n\n\
    有时，你会对同一场景拍摄多张照片，并希望“收藏”其中一张，以便日后筛选或在照片编辑中使用。你可以通过以下步骤将照片添加到`个人收藏`文件夹：\n\n![A450041_1_En_1_Fig13_HTML.jpg](img/A450041_1_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13  \n轻点`收藏`图标可将图像保存为个人收藏\n\n1.  轻点照片将其打开。请注意，你无需将其全屏打开。\n2.  轻点底部工具栏中的`收藏`图标，如图\
    \ 1-13 所示。\n\n你也可以通过将照片添加到新相簿来整理照片；你可以按照以下步骤创建新相簿：\n\n![A450041_1_En_1_Fig14_HTML.jpg](img/A450041_1_En_1_Fig14_HTML.jpg)\n\
    \n图 1-14  \n在姓名字段中输入新相簿的名称\n\n1.  轻点屏幕右下角的`相簿`图标。\n2.  轻点屏幕右上角的加号图标。\n3.  添加新相簿名称并轻点`存储`，如图\
    \ 1-14 所示。\n\n要将照片添加到某个相簿或刚刚创建的相簿，你可以执行以下操作：\n\n1.  进入`相机胶卷`或任何文件夹。\n2.  轻点屏幕右上角的`选择`图标。\n\
    3.  选择一张或多张照片。\n4.  轻点屏幕底部的`添加到`。\n\n选择你想要添加照片的相簿，或轻点`新建相簿`来创建新相簿并将照片添加进去，如图 1-15\
    \ 所示。\n\n![A450041_1_En_1_Fig15_HTML.jpg](img/A450041_1_En_1_Fig15_HTML.jpg)\n\
    \n图 1-15  \n你可以将选定的照片添加到现有相簿，或创建新相簿\n\n## 本章小结\n\n你的 iPhone 具备先进的摄影功能，可帮助你拍摄专业级照片。`相机`和`照片`应用都包含一些实用功能，可以提升你的\
    \ iPhone 摄影技巧。`相机`应用包含隐藏功能，即使不轻点快门按钮也能快速拍照。此外，它还允许你创建不同的效果，例如`实况照片`视频和`HDR`照片。更进一步，它为你提供了自动或手动调整照片曝光和对焦的选项。`照片`应用扩展了你将照片整理到相簿和个人收藏的能力，并且你可以使用搜索功能根据照片中的人物、物体和日期来查找照片。下一步是在进入后续章节更高级的选项之前，开始练习这些基本功能。\n\
    \n## 实践练习\n\n在这个实践练习中，探索你 iPhone 上的不同功能。拍摄一些你最喜欢地点的照片，整理这些照片，并将它们添加到`照片`应用中的某个相簿里。在本书的\
    \ Facebook 小组中分享，并对他人的照片进行评论。\n\n# 2. 照片润饰技巧\n\n在上一章中，你学会了如何高效使用 iPhone 上的`照片`应用和`相机`应用来拍照并将它们整理到相簿中。在许多情况下，使用\
    \ iPhone 拍照是即兴的：你注意到一个有趣的场景或动作，于是拿起手机就拍了下来。不幸的是，使用移动设备拍照的这种即兴性质，增加了出现与色彩、光线和构图相关问题的可能性。这些问题可能会令人沮丧，但你可以使用默认的`照片`应用或从`Apple\
    \ App Store`下载的（免费或付费）各种应用来解决它们。本章的技巧将带你了解对图像进行此类基本修改的步骤。\n\n## 修复照片的色彩\n\n使用工具：`照片`应用、`Adobe\
    \ Lightroom` 应用\n\n拍照时一个常见问题是光照不足，这会导致糟糕的色彩状况。用手机拍照时，这个问题不容易克服，因为你需要携带外部光源和工具来解决。因此，当你使用手机拍照时，可能需要对色彩进行调整。你可以通过更改照片的属性，如色相、饱和度、对比度、色温等来实现。\n\
    \n许多照片编辑应用可以帮助你修改照片的色彩设置。在这里，你将探索如何使用移动设备上的`照片`应用以及可以从`App Store`免费下载的`Adobe Lightroom`应用来修改图像色彩。\n\
    \n### 使用照片应用修改色彩\n\n随着 iPhone iOS 系统的近期更新，`照片`应用提供了基本的照片修改工具，可以帮助你修改照片，而无需安装任何第三方应用。这些工具效果不错，而且你不必在手机里塞满许多应用，特别是如果你的手机存储容量有限。要使用`照片`应用编辑照片的色彩，请按照以下步骤操作：\n\
    \n1.  打开`照片`应用并轻点你想要编辑的照片，使其全尺寸显示。\n2.  轻点屏幕底部的调整图标（在旧版本中为`编辑`）。这将使你进入照片编辑模式，如图\
    \ 2-1 所示。\n\n    ![A450041_1_En_2_Fig1_HTML.jpg](img/A450041_1_En_2_Fig1_HTML.jpg)\n\
    \n    图 2-1  \n    在`照片`应用中进入照片编辑模式\n3.  轻点编辑图标，如图 2-2 所示，以访问`光效`、`颜色`和`黑白`的编辑选项。`光效`选项允许你修改图像中的光线，`颜色`让你修改色彩属性，`黑白`则允许你将照片转换为黑白。\n\
    \n    ![A450041_1_En_2_Fig2_HTML.jpg](img/A450041_1_En_2_Fig2_HTML.jpg)\n\n  \
    \  图 2-2  \n    编辑图标允许你访问`光效`、`颜色`和`黑白`设置\n4.  轻点`颜色`条目以将其展开。\n5.  向左拖动`饱和度`滑块（将饱和度红线向右移动）以增加色彩的饱和度。\n\
    6.  轻点滑块右上角的图标，然后在`颜色`部分选择`对比度`，如图 2-3 所示。\n7.  向左拖动`对比度`滑块（将对比度红线向右移动）以增加色彩的对比度。\n\
    \n    ![A450041_1_En_2_Fig3_HTML.jpg](img/A450041_1_En_2_Fig3_HTML.jpg)\n\n  \
    \  图 2-3  \n    `颜色`调整选项\n"
- fmt: "### Remove Photo Casting\n\nSometimes when you take photos in certain light\
    \ conditions such as on cloudy days, in fluorescent light, or in warm light, the\
    \ photo’s colors get affected with the surrounding light conditions, which creates\
    \ a color casting effect. This effect can spoil the natural colors in an image.\
    \ In other cases, you’ll want to add a cast color to create a special effect on\
    \ the image, for instance, when adding a warmer effect to the image. To remove\
    \ or add a color cast, follow these steps:\n\n1. Tap the editing icon, and select\
    \ the `Color` section.  \n2. Tap the icon at the top right of the color slider.\
    \  \n3. Tap `Cast` in the `Color` section, as shown in Figure [2-4](#A450041_1_En_2_Chapter.html#Fig4).\n\
    \n   ![A450041_1_En_2_Fig4_HTML.jpg](A450041_1_En_2_Fig4_HTML.jpg)\n\n   **Figure\
    \ 2-4**  \n   The `Cast` option under the `Color` adjustments  \n4. Drag the slider\
    \ to the left to create a warmer effect or to the right to create a cooler effect,\
    \ as shown in Figure [2-5](#A450041_1_En_2_Chapter.html#Fig5).\n\n   ![A450041_1_En_2_Fig5_HTML.jpg](A450041_1_En_2_Fig5_HTML.jpg)\n\
    \n   **Figure 2-5**  \n   Drag the slider to the right or left side to control\
    \ the casting effect in the photo\n\n### Make a Color Adjustment Using Adobe Lightroom\n\
    \nAdobe Lightroom is the most powerful application for photo managing and editing.\
    \ It gives you advanced capabilities for modifying a photo and its details. It\
    \ is commonly used by professional photographers and photo editors. A “lighter”\
    \ version of the application is available to download on your iPhone from the\
    \ Apple App Store. To use the application, you need to create a free Adobe ID.\
    \ The free version allows you to capture, organize, and share photos from your\
    \ mobile device. If you have an Adobe Creative Cloud membership, you have access\
    \ to the extended features of the application; you can save source formats and\
    \ integrate between both the mobile and desktop applications. If you signed up\
    \ with Adobe with the free account, you will only have access to the basic main\
    \ adjustment functions in the Lightroom mobile app.\n\nIn this tip, you will use\
    \ the Lightroom mobile app to edit a photo’s colors. You can use similar steps\
    \ to adjust the light in the Photos app.\n\n1. Install Adobe Lightroom from the\
    \ Apple App Store, and open the app after installing it.  \n2. Choose a photo\
    \ from the existing Lightroom library or tap the `Camera Roll` button to open\
    \ images from the phone’s existing albums. Also, you can tap the Camera icon on\
    \ the bottom right of the screen to take a photo using the phone’s camera and\
    \ add it to the Lightroom library. The photo opens on the screen, as shown in\
    \ Figure [2-6](#A450041_1_En_2_Chapter.html#Fig6).\n\n   ![A450041_1_En_2_Fig6_HTML.jpg](A450041_1_En_2_Fig6_HTML.jpg)\n\
    \n   **Figure 2-6**  \n   Tap the photo to open it in  \n3. Tap the `Color` icon\
    \ at the bottom of the screen to open the `Color` adjustment options.  \n4. Use\
    \ the `White Balance` drop-down list to change the color tone in the photo based\
    \ on the surrounding colors, as shown in Figure [2-7](#A450041_1_En_2_Chapter.html#Fig7).\
    \ You can choose from the existing options, or you can choose a custom white balance\
    \ using both the `Temperature` and `Tint` values.\n\n   ![A450041_1_En_2_Fig7_HTML.jpg](A450041_1_En_2_Fig7_HTML.jpg)\n\
    \n   **Figure 2-7**  \n   Adjusting the white balance in the `Color` setting \
    \ \n5. Use the `Vibrance` and `Saturation` sliders to affect the color intensity\
    \ and vibrancy in the photo. Increasing the `Vibrancy` value creates brighter\
    \ colors. `Saturation` sets the amount of color in the photo; for example, reducing\
    \ the `Saturation` to `-100` absorbs all the light from the photo and creates\
    \ a black-and-white photo effect, as shown in Figure [2-8](#A450041_1_En_2_Chapter.html#Fig8).\n\
    \n   ![A450041_1_En_2_Fig8_HTML.jpg](A450041_1_En_2_Fig8_HTML.jpg)\n\n   **Figure\
    \ 2-8**  \n   Reduce `Saturation` to `-100` to create a black-and-white effect\
    \  \n\nYou can also convert the photo to black and white by simply tapping the\
    \ `B&W` button at the top left of the color adjustment panel. This option allows\
    \ you to only modify the temperature and tint of the photo after converting it\
    \ to black and white.\n\n### Perform Advanced Color Modifications\n\nThe color\
    \ adjustment panel in Adobe Lightroom gives you even more advanced features to\
    \ modify an image’s color. You can change the color based on a specific area in\
    \ the photo or by selecting a color range to be modified without affecting the\
    \ rest of the colors in the shot.\n\nTo modify an image’s colors based on a specific\
    \ spot in the photo, follow these steps:\n\n1. In the Adobe Lightroom app, tap\
    \ the `Color` icon at the bottom of the screen.  \n2. Tap the eyedropper icon\
    \ at the top right of the color adjustment values in the panel. The magnifier\
    \ will appear on the photo, as shown in Figure [2-9](#A450041_1_En_2_Chapter.html#Fig9).\n\
    \n   ![A450041_1_En_2_Fig9_HTML.jpg](A450041_1_En_2_Fig9_HTML.jpg)\n\n   **Figure\
    \ 2-9**  \n   The magnifier appears so you can select a color to adjust  \n3.\
    \ Drag the magnifier to the area where you want to change the color tones. You\
    \ will notice that the colors in the photo change based on this sample.  \n4.\
    \ You can modify the color using the sliders in the panel and customize your color\
    \ tone.  \n\nIn this example, you’ll modify an image’s color based on a specific\
    \ area, which may include a number of colors. Additionally, you can modify the\
    \ image based on a specific selected color or number of colors, which can be selected\
    \ and modified individually as follows:\n\n1. From the color adjustment panel,\
    \ tap the `Mix` icon at the top right of the panel.  \n2. The colors that are\
    \ included in the photo will appear as swatches at the top of the panel. From\
    \ this color range, pick the color that you want to modify; you can change its\
    \ properties such as `Hue`, `Saturation`, and `Luminance`, as shown in Figure\
    \ [2-10](#A450041_1_En_2_Chapter.html#Fig10).\n\n   ![A450041_1_En_2_Fig10_HTML.jpg](A450041_1_En_2_Fig10_HTML.jpg)\n\
    \n   **Figure 2-10**  \n   The `Mix` icon allows you to edit a specific color\
    \ in the photo  \n3. You can also tap the color picker icon.  \n4. At the bottom\
    \ of the panel, select which value you would like to change, `Hue`, `Saturation`,\
    \ or `Luminance`.  \n5. Tap the color in the image to modify and drag to change\
    \ its properties. Notice that the selected color will appear in the color list\
    \ in the panel to show which color is changed, as shown in Figure [2-11](#A450041_1_En_2_Chapter.html#Fig11).\n\
    \n   ![A450041_1_En_2_Fig11_HTML.jpg](A450041_1_En_2_Fig11_HTML.jpg)\n\n   **Figure\
    \ 2-11**  \n   Adjust the saturation of a specific color in the photo"
  raw: "### Remove Photo Casting\n\nSometimes when you take photos in certain light\
    \ conditions such as on cloudy days, in fluorescent light, or in warm light, the\
    \ photo’s colors get affected with the surrounding light conditions, which creates\
    \ a color casting effect. This effect can spoil the natural colors in an image.\
    \ In other cases, you’ll want to add a cast color to create a special effect on\
    \ the image, for instance, when adding a warmer effect to the image. To remove\
    \ or add a color cast, follow these steps:\n\n1.  Tap the editing icon, and select\
    \ the Color section.  \n2.  Tap the icon at the top right of the color slider.\
    \  \n3.  Tap Cast in the Color section, as shown in Figure [2-4](#A450041_1_En_2_Chapter.html#Fig4).\n\
    \n    ![A450041_1_En_2_Fig4_HTML.jpg](A450041_1_En_2_Fig4_HTML.jpg)\n\n    Figure\
    \ 2-4\n\n    The Cast option under the Color adjustments  \n4.  Drag the slider\
    \ to the left to create a warmer effect or to the right to create a cooler effect\
    \ , as shown in Figure [2-5](#A450041_1_En_2_Chapter.html#Fig5).\n\n    ![A450041_1_En_2_Fig5_HTML.jpg](A450041_1_En_2_Fig5_HTML.jpg)\n\
    \n    Figure 2-5\n\n    Drag the slider to the right or left side to control the\
    \ casting effect in the photo\n\n### Make a Color Adjustment Using Adobe Lightroom\n\
    \nAdobe Lightroom is the most powerful application for photo managing and editing.\
    \ It gives you advanced capabilities for modifying a photo and its details. It\
    \ is commonly used by professional photographers and photo editors. A “lighter”\
    \ version of the application is available to download on your iPhone from the\
    \ Apple App Store. To use the application, you need to create a free Adobe ID.\
    \ The free version allows you to capture, organize, and share photos from your\
    \ mobile device. If you have an Adobe Creative Cloud membership, you have access\
    \ to the extended features of the application; you can save source formats and\
    \ integrate between both the mobile and desktop applications. If you signed up\
    \ with Adobe with the free account, you will only have access to the basic main\
    \ adjustment functions in the Lightroom mobile app.\n\nIn this tip, you will use\
    \ the Lightroom mobile app to edit a photo’s colors. You can use similar steps\
    \ to adjust the light in the Photos app.\n\n1.  Install Adobe Lightroom from the\
    \ Apple App Store, and open the app after installing it.  \n2.  Choose a photo\
    \ from the existing Lightroom library or tap the Camera Roll button to open images\
    \ from the phone’s existing albums. Also, you can tap the Camera icon on the bottom\
    \ right of the screen to take a photo using the phone’s camera and add it to the\
    \ Lightroom library. The photo opens on the screen, as shown in Figure [2-6](#A450041_1_En_2_Chapter.html#Fig6).\n\
    \n    ![A450041_1_En_2_Fig6_HTML.jpg](A450041_1_En_2_Fig6_HTML.jpg)\n\n    Figure\
    \ 2-6\n\n    Tap the photo to open it in  \n3.  Tap the Color icon at the bottom\
    \ of the screen to open the Color adjustment options.  \n4.  Use the White Balance\
    \ drop-down list to change the color tone in the photo based on the surrounding\
    \ colors, as shown in Figure [2-7](#A450041_1_En_2_Chapter.html#Fig7). You can\
    \ choose from the existing options, or you can choose a custom white balance using\
    \ both the Temperature and Tint values.\n\n    ![A450041_1_En_2_Fig7_HTML.jpg](A450041_1_En_2_Fig7_HTML.jpg)\n\
    \n    Figure 2-7\n\n    Adjusting the white balance in the Color setting  \n5.\
    \  Use the Vibrance and Saturation sliders to affect the color intensity and vibrancy\
    \ in the photo. Increasing the Vibrancy value creates brighter colors. Saturation\
    \ sets the amount of color in the photo; for example, reducing the Saturation\
    \ to -100 absorbs all the light from the photo and creates a black-and-white photo\
    \ effect, as shown in Figure [2-8](#A450041_1_En_2_Chapter.html#Fig8).\n\n   \
    \ ![A450041_1_En_2_Fig8_HTML.jpg](A450041_1_En_2_Fig8_HTML.jpg)\n\n    Figure\
    \ 2-8\n\n    Reduce Saturation to -100 to create a black-and-white effect  \n\n\
    You can also convert the photo to black and white by simply tapping the B&W button\
    \ at the top left of the color adjustment panel. This option allows you to only\
    \ modify the temperature and tint of the photo after converting it to black and\
    \ white.\n\n### Perform Advanced Color Modifications\n\nThe color adjustment panel\
    \ in Adobe Lightroom gives you even more advanced features to modify an image’s\
    \ color. You can change the color based on a specific area in the photo or by\
    \ selecting a color range to be modified without affecting the rest of the colors\
    \ in the shot.\n\nTo modify an image’s colors based on a specific spot in the\
    \ photo, follow these steps:\n\n1.  In the Adobe Lightroom app, tap the Color\
    \ icon at the bottom of the screen.  \n2.  Tap the eyedropper icon at the top\
    \ right of the color adjustment values in the panel. The magnifier will appear\
    \ on the photo, as shown in Figure [2-9](#A450041_1_En_2_Chapter.html#Fig9).\n\
    \n    ![A450041_1_En_2_Fig9_HTML.jpg](A450041_1_En_2_Fig9_HTML.jpg)\n\n    Figure\
    \ 2-9\n\n    The magnifier appears so you can select a color to adjust  \n3. \
    \ Drag the magnifier to the area where you want to change the color tones. You\
    \ will notice that the colors in the photo change based on this sample.  \n4.\
    \  You can modify the color using the sliders in the panel and customize your\
    \ color tone.  \n\nIn this example, you’ll modify an image’s color based on a\
    \ specific area, which may include a number of colors. Additionally, you can modify\
    \ the image based on a specific selected color or number of colors, which can\
    \ be selected and modified individually as follows:\n\n1.  From the color adjustment\
    \ panel, tap the Mix icon at the top right of the panel.  \n2.  The colors that\
    \ are included in the photo will appear as swatches at the top of the panel. From\
    \ this color range, pick the color that you want to modify; you can change its\
    \ properties such as Hue, Saturation, and Luminance, as shown in Figure [2-10](#A450041_1_En_2_Chapter.html#Fig10).\n\
    \n    ![A450041_1_En_2_Fig10_HTML.jpg](A450041_1_En_2_Fig10_HTML.jpg)\n\n    Figure\
    \ 2-10\n\n    The Mixed icon allows you to edit a specific color in the photo\
    \  \n3.  You can also tap the color picker icon.  \n4.  At the bottom of the panel\
    \ , select which value you would like to change, Hue, Saturation, or Luminance.\
    \  \n5.  Tap the color in the image to modify and drag to change its properties.\
    \ Notice that the selected color will appear in the color list in the panel to\
    \ show which color is changed, as shown in Figure [2-11](#A450041_1_En_2_Chapter.html#Fig11).\n\
    \n    ![A450041_1_En_2_Fig11_HTML.jpg](A450041_1_En_2_Fig11_HTML.jpg)\n\n    Figure\
    \ 2-11\n\n    Adjust the saturation of a specific color in the"
  trans: "\n### 移除偏色\n\n有时在特定光线条件下拍照，例如阴天、荧光灯或暖光环境中，照片的颜色会受到周围光线的影响，从而产生偏色效果。这种效果可能会破坏图像中的自然色彩。在其他情况下，你可能希望添加偏色来为图像创造特殊效果，例如为图像增添更温暖的效果。要移除或添加偏色，请按照以下步骤操作：\n\
    \n1.  轻点编辑图标，然后选择`颜色`部分。\n2.  轻点颜色滑块右上角的图标。\n3.  在`颜色`部分中轻点`色偏`，如图 2-4 所示。\n\n\
    \   ![A450041_1_En_2_Fig4_HTML.jpg](img/A450041_1_En_2_Fig4_HTML.jpg)\n\n   **图\
    \ 2-4**  \n   `颜色`调整下的`色偏`选项\n4.  向左拖动滑块可营造更暖的效果，向右拖动则营造更冷的效果，如图 2-5 所示。\n\n \
    \  ![A450041_1_En_2_Fig5_HTML.jpg](img/A450041_1_En_2_Fig5_HTML.jpg)\n\n   **图\
    \ 2-5**  \n   将滑块向右或向左拖动以控制照片中的偏色效果\n\n### 使用 Adobe Lightroom 进行颜色调整\n\nAdobe\
    \ Lightroom 是用于照片管理和编辑的最强大的应用程序。它为你提供了修改照片及其细节的高级功能。专业摄影师和照片编辑人员经常使用它。该应用程序的“精简版”可从苹果\
    \ App Store 下载到你的 iPhone 上。要使用该应用程序，你需要创建一个免费的 Adobe ID。免费版本允许你从移动设备上拍摄、整理和分享照片。如果你拥有\
    \ Adobe Creative Cloud 会员资格，则可以访问该应用程序的扩展功能；你可以保存源格式并在移动端和桌面端应用程序之间进行集成。如果你注册的是免费\
    \ Adobe 帐户，则只能使用 Lightroom 移动应用中的基本主要调整功能。\n\n在本技巧中，你将使用 Lightroom 移动应用来编辑照片的颜色。你可以使用类似的步骤在“照片”应用中调整光线。\n\
    \n1.  从苹果 App Store 安装 Adobe Lightroom，安装后打开应用。\n2.  从现有的 Lightroom 图库中选择一张照片，或轻点`相机胶卷`按钮以打开手机现有相册中的图像。你也可以轻点屏幕右下角的相机图标，使用手机相机拍照并将其添加到\
    \ Lightroom 图库中。照片会显示在屏幕上，如图 2-6 所示。\n\n   ![A450041_1_En_2_Fig6_HTML.jpg](img/A450041_1_En_2_Fig6_HTML.jpg)\n\
    \n   **图 2-6**  \n   轻点照片以在其中打开\n3.  轻点屏幕底部的`颜色`图标以打开`颜色`调整选项。\n4.  使用`白平衡`下拉列表可根据周围颜色更改照片中的色调，如图\
    \ 2-7 所示。你可以从现有选项中选择，也可以使用`色温`和`色调`值选择自定义白平衡。\n\n   ![A450041_1_En_2_Fig7_HTML.jpg](img/A450041_1_En_2_Fig7_HTML.jpg)\n\
    \n   **图 2-7**  \n   在`颜色`设置中调整白平衡\n5.  使用`自然饱和度`和`饱和度`滑块来影响照片中的色彩强度和鲜艳度。增加`自然饱和度`值可产生更鲜艳的色彩。`饱和度`用于设置照片中的颜色量；例如，将`饱和度`降低至`-100`会吸收照片中的所有光线，从而产生黑白照片效果，如图\
    \ 2-8 所示。\n\n   ![A450041_1_En_2_Fig8_HTML.jpg](img/A450041_1_En_2_Fig8_HTML.jpg)\n\
    \n   **图 2-8**  \n   将`饱和度`降低至`-100`以产生黑白效果\n\n你也可以通过轻点颜色调整面板左上角的`黑白`按钮，直接将照片转换为黑白。此选项允许你在将照片转换为黑白后，仅修改照片的色温和色调。\n\
    \n### 执行高级颜色修改\n\nAdobe Lightroom 中的颜色调整面板提供了更多高级功能来修改图像的颜色。你可以根据照片中的特定区域更改颜色，或通过选择要修改的颜色范围，同时不影响照片中的其他颜色。\n\
    \n要根据照片中的特定点修改图像颜色，请按照以下步骤操作：\n\n1.  在 Adobe Lightroom 应用中，轻点屏幕底部的`颜色`图标。\n2.\
    \  轻点面板中颜色调整值右上角的吸管图标。照片上会出现放大镜，如图 2-9 所示。\n\n   ![A450041_1_En_2_Fig9_HTML.jpg](img/A450041_1_En_2_Fig9_HTML.jpg)\n\
    \n   **图 2-9**  \n   出现放大镜，以便你选择要调整的颜色\n3.  将放大镜拖动到你想要更改色调的区域。你会注意到，照片中的颜色会基于此样本发生变化。\n\
    4.  你可以使用面板中的滑块修改颜色，并自定义你的色调。\n\n在此示例中，你将基于一个特定区域修改图像颜色，该区域可能包含多种颜色。此外，你还可以基于特定的选定颜色或多种颜色来修改图像，可以按如下方式单独选择和修改：\n\
    \n1.  在颜色调整面板中，轻点面板右上角的`混合`图标。\n2.  照片中包含的颜色将以色样形式出现在面板顶部。在此颜色范围内，选择你想要修改的颜色；你可以更改其属性，例如`色相`、`饱和度`和`明度`，如图\
    \ 2-10 所示。\n\n   ![A450041_1_En_2_Fig10_HTML.jpg](img/A450041_1_En_2_Fig10_HTML.jpg)\n\
    \n   **图 2-10**  \n   `混合`图标允许你编辑照片中的特定颜色\n3.  你也可以轻点取色器图标。\n4.  在面板底部，选择你想更改的数值：`色相`、`饱和度`或`明度`。\n\
    5.  轻点图像中的颜色进行修改，并拖动以更改其属性。请注意，所选颜色将出现在面板的颜色列表中，以显示哪个颜色已被更改，如图 2-11 所示。\n\n  \
    \ ![A450041_1_En_2_Fig11_HTML.jpg](img/A450041_1_En_2_Fig11_HTML.jpg)\n\n   **图\
    \ 2-11**  \n   调整照片中特定颜色的饱和度\n"
- fmt: "# Crop and Resize Photos\n\nTools used: `Photos` app\n\nSometimes you take\
    \ a photo and you want to crop it to focus on the main elements in the scene or\
    \ to remove unwanted parts from it. You may also need to rotate the photo or flip\
    \ it. The new iOS provides an easy method to crop images using the `Photos` app.\
    \ Follow these steps:\n\n![A450041_1_En_2_Fig12_HTML.jpg](A450041_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12 – Using the Crop icon to crop an image\n\n1. Open the photo you\
    \ want to crop in full-size view in the `Photos` app.\n2. Tap the `Edit` icon\
    \ in the bottom bar to enable the editing mode.\n3. Tap the `Crop` icon on the\
    \ left side.\n4. Resize the rectangle around the image by dragging the edges of\
    \ the rectangle.\n5. Tap `Done` to apply the changes and crop, as shown in Figure\
    \ [2-12](#A450041_1_En_2_Chapter.html#Fig12).\n\nIf you want to crop the image\
    \ to a standard document ratio, you can tap the ratio icon on the bottom right\
    \ to select the ratio before cropping the image.\n\nYou can also rotate the image\
    \ and crop it. To do that, drag over the angle’s area to rotate the image toward\
    \ a specific angle; the image will be cropped and rotated to the needed angle,\
    \ as shown in Figure [2-13](#A450041_1_En_2_Chapter.html#Fig13).\n\n![A450041_1_En_2_Fig13_HTML.jpg](A450041_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13 – Using the Crop icon to rotate an image\n\nIf you want to flip\
    \ the image to any of the four directions, you can tap the flip icon on the bottom\
    \ left of the screen.\n\n## Remove Backgrounds\n\nTools used: `Photoshop Mix`\
    \ app\n\nTo merge between a number of photos, you may need to remove the background\
    \ from an image to make it transparent to be able to add it to another image.\
    \ There are a number of applications that allow you to remove backgrounds such\
    \ as `TouchRetouch`, `Eraser`, and `Photoshop Mix`. If you are familiar with the\
    \ desktop version of Adobe Photoshop, you will find yourself familiar with most\
    \ of the `Photoshop Mix` app features. In this section, you will explore how to\
    \ remove the background from one photo and place it in front of another background.\n\
    \n1. Open Adobe `Photoshop Mix`.\n2. Log in with your Adobe ID (free or paid subscription).\
    \ Tap the plus icon in the top right of the screen, as shown in Figure [2-14](#A450041_1_En_2_Chapter.html#Fig14).\n\
    \n   ![A450041_1_En_2_Fig14_HTML.jpg](A450041_1_En_2_Fig14_HTML.jpg)\n\n   Figure\
    \ 2-14 – The Adobe Photoshop Mix projects\n\n3. Tap `Image` to open an image from\
    \ the Camera Roll, as shown in Figure [2-15](#A450041_1_En_2_Chapter.html#Fig15).\
    \ Then, tap `Select On My iPhone`.\n\n   ![A450041_1_En_2_Fig15_HTML.jpg](A450041_1_En_2_Fig15_HTML.jpg)\n\
    \n   Figure 2-15 – Adding images to the Photoshop Mix project\n\n4. In the bottom\
    \ bar, tap `Cut Out` to open the selection tools, as shown in Figure [2-16](#A450041_1_En_2_Chapter.html#Fig16).\n\
    \n   ![A450041_1_En_2_Fig16_HTML.jpg](A450041_1_En_2_Fig16_HTML.jpg)\n\n   Figure\
    \ 2-16 – Tap the `Cut Out` icon from the application bar\n\n5. Tap the `Smart`\
    \ tool at the bottom.\n6. Tap the settings icon on the left. Set it to `Subtract`,\
    \ as shown in Figure [2-17](#A450041_1_En_2_Chapter.html#Fig17).\n\n   ![A450041_1_En_2_Fig17_HTML.jpg](A450041_1_En_2_Fig17_HTML.jpg)\n\
    \n   Figure 2-17 – Set the `Smart` tool to `Subtract`\n\n7. Drag over the sky\
    \ or the background that you would like to remove, as shown in Figure [2-18](#A450041_1_En_2_Chapter.html#Fig18).\n\
    8. Zoom in and drag over the small areas to remove it.\n9. Tap the `Correct` icon\
    \ on the bottom right to apply the changes.\n\n   ![A450041_1_En_2_Fig18_HTML.jpg](A450041_1_En_2_Fig18_HTML.jpg)\n\
    \n   Figure 2-18 – The image without the background after removing it\n\nAfter\
    \ removing the background, you will add a new background to the original image,\
    \ as shown here:\n\n1. Tap the `Layers` icon to display the layers on the right\
    \ side of the screen.\n2. Tap the plus icon to add a new layer, and choose to\
    \ add a new image layer, as shown in Figure [2-19](#A450041_1_En_2_Chapter.html#Fig19).\n\
    \n   ![A450041_1_En_2_Fig19_HTML.jpg](A450041_1_En_2_Fig19_HTML.jpg)\n\n   Figure\
    \ 2-19 – Adding an image as a new layer\n\n3. Select the new background image\
    \ from the Camera Roll.\n4. Tap and hold the top background layer and place it\
    \ behind the base layer, as shown in Figure [2-20](#A450041_1_En_2_Chapter.html#Fig20).\n\
    \n   ![A450041_1_En_2_Fig20_HTML.jpg](A450041_1_En_2_Fig20_HTML.jpg)\n\n   Figure\
    \ 2-20 – Rearranging the layers in the project\n\n5. Use the rectangle around\
    \ the image to resize it to fit in the background, as shown in Figure [2-21](#A450041_1_En_2_Chapter.html#Fig21).\n\
    \n   ![A450041_1_En_2_Fig21_HTML.jpg](A450041_1_En_2_Fig21_HTML.jpg)\n\n   Figure\
    \ 2-21 – Resize the background image to fit behind the top layer\n\nSometimes\
    \ there is a color difference because of the casting between the two images. So,\
    \ the next step is to adjust the color of the top image to match the color in\
    \ the background image.\n\n![A450041_1_En_2_Fig22_HTML.jpg](A450041_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22 – Adjust the temperature of the photo using the `Temperature` icon\n\
    \n1. Select the top layer from the `Layers` panel on the right side.\n2. Tap the\
    \ `Adjust` icon on the bottom left.\n3. Tap `Temperature` to open the slider.\n\
    4. Drag the slider to the right to give the image a warmer tone, as shown in Figure\
    \ [2-22](#A450041_1_En_2_Chapter.html#Fig22).\n\n## Master Selections\n\nTools:\
    \ `Photoshop Mix`\n\nAdobe `Photoshop Mix` provides a number of tools that help\
    \ you to select objects on your iPhone. These tools are trying to simulate the\
    \ selection methods in the desktop version of the Adobe Photoshop application,\
    \ as shown in Figure [2-23](#A450041_1_En_2_Chapter.html#Fig23).\n\n![A450041_1_En_2_Fig23_HTML.jpg](A450041_1_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23 – Using the Lasso selection tool\n\nWhen you select an image to\
    \ edit, you can tap the `Cut Out` icon at the bottom of the screen and choose\
    \ any of the following tools:\n\n- Tap the `Auto` icon to automatically detect\
    \ the background and remove it. Note this feature requires a high contrast between\
    \ the background and the elements in the image.\n- Tap the `Smart` icon to drag\
    \ over the elements that you want to select. This tool helps you to make a smart\
    \ selection while dragging over the parts you would like to select. It uses the\
    \ color similarity as a guide to select and remove parts.\n- The `Basic` icon\
    \ lets you drag to select the areas in the image. Unlike the `Smart` selection,\
    \ this icon lets you manually define the areas that need to be removed.\n- The\
    \ `Lasso` tool lets you create a selection about specific areas in the photo as\
    \ you draw with your finger or use the drawing pen around the area you would like\
    \ to select.\n- The `Shape` selection lets you make a selection based on a shape\
    \ such as a rectangle, a circle, a triangle, or a square.\n- Use the `Refine`\
    \ icon to modify the smoothness of the selected area and how it blends with the\
    \ background. You can also tap the `Reset` icon to return to the original version."
  raw: "## Crop and Resize Photos\n\nTools used: Photos app\n\nSometimes you take\
    \ a photo and you want to crop it to focus on the main elements in the scene or\
    \ to remove unwanted parts from it. You may also need to rotate the photo or flip\
    \ it. The new iOS provides an easy method to crop images using the Photos app.\
    \ Follow these steps:\n\n![A450041_1_En_2_Fig12_HTML.jpg](A450041_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12\n\nUsing the Crop icon to crop an image\n\n1.  Open the photo you\
    \ want to crop in full-size view in the Photos app.  \n2.  Tap the Edit icon in\
    \ the bottom bar to enable the editing mode.  \n3.  Tap the Crop icon on the left\
    \ side.  \n4.  Resize the rectangle around the image by dragging the edges of\
    \ the rectangle.  \n5.  Tap Done to apply the changes and crop, as shown in Figure\
    \ [2-12](#A450041_1_En_2_Chapter.html#Fig12).  \n\nIf you want to crop the image\
    \ to a standard document ratio, you can tap the ratio icon on the bottom right\
    \ to select the ratio before cropping the image.\n\nYou can also rotate the image\
    \ and crop it. To do that, drag over the angle’s area to rotate the image toward\
    \ a specific angle; the image will be cropped and rotated to the needed angle,\
    \ as shown in Figure [2-13](#A450041_1_En_2_Chapter.html#Fig13).\n\n![A450041_1_En_2_Fig13_HTML.jpg](A450041_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13\n\nUsing the Crop icon to rotate an image\n\nIf you want to flip\
    \ the image to any of the four directions, you can tap the flip icon on the bottom\
    \ left of the screen.\n\n## Remove Backgrounds\n\nTools used: Photoshop Mix app\n\
    \nTo merge between a number of photos, you may need to remove the background from\
    \ an image to make it transparent to be able to add it to another image. There\
    \ are a number of applications that allow you to remove backgrounds such as TouchRetouch,\
    \ Eraser, and Photoshop Mix. If you are familiar with the desktop version of Adobe\
    \ Photoshop, you will find yourself familiar with most of the Photoshop Mix app\
    \ features. In this section, you will explore how to remove the background from\
    \ one photo and place it in front of another background.\n\n1.  Open Adobe Photoshop\
    \ Mix.  \n2.  Log in with your Adobe ID (free or paid subscription). Tap the plus\
    \ icon in the top right of the screen, as shown in Figure [2-14](#A450041_1_En_2_Chapter.html#Fig14).\n\
    \n    ![A450041_1_En_2_Fig14_HTML.jpg](A450041_1_En_2_Fig14_HTML.jpg)\n\n    Figure\
    \ 2-14\n\n    The Adobe Photoshop Mix projects  \n3.  Tap Image to open an image\
    \ from the Camera Roll, as shown in Figure [2-15](#A450041_1_En_2_Chapter.html#Fig15).\
    \ Then, tap Select On My iPhone .\n\n    ![A450041_1_En_2_Fig15_HTML.jpg](A450041_1_En_2_Fig15_HTML.jpg)\n\
    \n    Figure 2-15\n\n    Adding images to the Photoshop Mix project  \n4.  In\
    \ the bottom bar, tap Cut Out to open the selection tools , as shown in Figure\
    \ [2-16](#A450041_1_En_2_Chapter.html#Fig16).\n\n    ![A450041_1_En_2_Fig16_HTML.jpg](A450041_1_En_2_Fig16_HTML.jpg)\n\
    \n    Figure 2-16\n\n    Tap the Cut Out icon from the application bar  \n5. \
    \ Tap the Smart tool at the bottom.  \n6.  Tap the settings icon on the left.\
    \ Set it to Subtract, as shown in Figure [2-17](#A450041_1_En_2_Chapter.html#Fig17).\n\
    \n    ![A450041_1_En_2_Fig17_HTML.jpg](A450041_1_En_2_Fig17_HTML.jpg)\n\n    Figure\
    \ 2-17\n\n    Set the Smart tool to Subtract  \n7.  Drag over the sky or the background\
    \ that you would like to remove, as shown in Figure [2-18](#A450041_1_En_2_Chapter.html#Fig18).\
    \  \n8.  Zoom in and drag over the small areas to remove it.  \n9.  Tap the Correct\
    \ icon on the bottom right to apply the changes.\n\n    ![A450041_1_En_2_Fig18_HTML.jpg](A450041_1_En_2_Fig18_HTML.jpg)\n\
    \n    Figure 2-18\n\n    The image without the background after removing it  \n\
    \nAfter removing the background, you will add a new background to the original\
    \ image, as shown here:\n\n1.  Tap the Layers icon to display the layers on the\
    \ right side of the screen.  \n2.  Tap the plus icon to add a new layer, and choose\
    \ to add a new image layer, as shown in Figure [2-19](#A450041_1_En_2_Chapter.html#Fig19).\n\
    \n    ![A450041_1_En_2_Fig19_HTML.jpg](A450041_1_En_2_Fig19_HTML.jpg)\n\n    Figure\
    \ 2-19\n\n    Adding an image as a new layer  \n3.  Select the new background\
    \ image from the Camera Roll.  \n4.  Tap and hold the top background layer and\
    \ place it behind the base layer, as shown in Figure [2-20](#A450041_1_En_2_Chapter.html#Fig20).\n\
    \n    ![A450041_1_En_2_Fig20_HTML.jpg](A450041_1_En_2_Fig20_HTML.jpg)\n\n    Figure\
    \ 2-20\n\n    Rearranging the layers in the project  \n5.  Use the rectangle around\
    \ the image to resize it to fit in the background, as shown in Figure [2-21](#A450041_1_En_2_Chapter.html#Fig21).\n\
    \n    ![A450041_1_En_2_Fig21_HTML.jpg](A450041_1_En_2_Fig21_HTML.jpg)\n\n    Figure\
    \ 2-21\n\n    Resize the background image to fit behind the top layer  \n\nSometimes\
    \ there is a color difference because of the casting between the two images. So,\
    \ the next step is to adjust the color of the top image to match the color in\
    \ the background image.\n\n![A450041_1_En_2_Fig22_HTML.jpg](A450041_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22\n\nAdjust the temperature of the photo using the Temperature icon\n\
    \n1.  Select the top layer from the Layers panel on the right side.  \n2.  Tap\
    \ the Adjust icon on the bottom left.  \n3.  Tap Temperature to open the slider.\
    \  \n4.  Drag the slider to the right to give the image a warmer tone, as shown\
    \ in Figure [2-22](#A450041_1_En_2_Chapter.html#Fig22).\n\n## Master Selections\n\
    \nTools: Photoshop Mix\n\nAdobe Photoshop Mix provides a number of tools that\
    \ help you to select objects on your iPhone. These tools are trying to simulate\
    \ the selection methods in the desktop version of the Adobe Photoshop application,\
    \ as shown in Figure [2-23](#A450041_1_En_2_Chapter.html#Fig23).\n\n![A450041_1_En_2_Fig23_HTML.jpg](A450041_1_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23\n\nUsing the Lasso selection tool\n\nWhen you select an image to\
    \ edit, you can tap the Cut Out icon at the bottom of the screen and choose any\
    \ of the following tools :\n\n*   Tap the Auto icon to automatically detect the\
    \ background and remove it. Note this feature requires a high contrast between\
    \ the background and the elements in the image.\n*   Tap the Smart icon to drag\
    \ over the elements that you want to select. This tool helps you to make a smart\
    \ selection while dragging over the parts you would like to select. It uses the\
    \ color similarity as a guide to select and remove parts.\n*   The Basic icon\
    \ lets you drag to select the areas in the image. Unlike the Smart selection,\
    \ this icon lets you manually define the areas that need to be removed.\n*   The\
    \ Lasso tool lets you create a selection about specific areas in the photo as\
    \ you draw with your finger or use the drawing pen around the area you would like\
    \ to select.\n*   The Shape selection lets you make a selection based on a shape\
    \ such as a rectangle, a circle, a triangle, or a square.\n*   Use the Refine\
    \ icon to modify the smoothness of the selected area and how it blends with the\
    \ background. You can also tap the Reset icon to return to the original version."
  trans: "\n# 裁剪与调整照片尺寸\n\n使用工具：`照片`应用\n\n有时你拍了一张照片，想通过裁剪来聚焦于画面中的主要元素，或去除不需要的部分。你可能还需要旋转或翻转照片。新的\
    \ iOS 系统提供了使用`照片`应用裁剪图像的简便方法。请按以下步骤操作：\n\n![A450041_1_En_2_Fig12_HTML.jpg](img/A450041_1_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12 – 使用裁剪图标裁剪图像\n\n1. 在`照片`应用中，以全屏视图打开你要裁剪的照片。\n2. 点击底部栏的`编辑`图标，启用编辑模式。\n\
    3. 点击左侧的`裁剪`图标。\n4. 拖拽矩形边缘，调整图像周围的矩形框大小。\n5. 点击`完成`以应用更改并完成裁剪，如图 2-12 所示。\n\n\
    如果你希望将图像裁剪为标准文档比例，可以在裁剪前点击右下角的比例图标进行选择。\n\n你还可以旋转并裁剪图像。为此，请拖拽角度区域，将图像旋转至特定角度；图像将被裁剪并旋转至所需角度，如图\
    \ 2-13 所示。\n\n![A450041_1_En_2_Fig13_HTML.jpg](img/A450041_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13 – 使用裁剪图标旋转图像\n\n如果你想将图像翻转至四个方向中的任意一个，可以点击屏幕左下角的翻转图标。\n\n## 移除背景\n\n使用工具：`Photoshop\
    \ Mix`应用\n\n为了合成多张照片，你可能需要移除图像的背景，使其变为透明，以便将其添加到另一张图像中。有许多应用可以移除背景，例如 `TouchRetouch`、`Eraser`\
    \ 和 `Photoshop Mix`。如果你熟悉桌面版 Adobe Photoshop，你会发现`Photoshop Mix`应用的大部分功能都很熟悉。在本节中，你将探索如何从一张照片中移除背景，并将其放置到另一个背景前。\n\
    \n1. 打开 Adobe `Photoshop Mix`。\n2. 使用你的 Adobe ID（免费或付费订阅）登录。点击屏幕右上角的加号图标，如图 2-14\
    \ 所示。\n\n   ![A450041_1_En_2_Fig14_HTML.jpg](img/A450041_1_En_2_Fig14_HTML.jpg)\n\
    \n   图 2-14 – Adobe Photoshop Mix 项目\n\n3. 点击`图像`，从相机胶卷中打开一张图片，如图 2-15 所示。然后点击`在我的\
    \ iPhone 上选择`。\n\n   ![A450041_1_En_2_Fig15_HTML.jpg](img/A450041_1_En_2_Fig15_HTML.jpg)\n\
    \n   图 2-15 – 向 Photoshop Mix 项目中添加图像\n\n4. 在底部栏中，点击`抠图`以打开选择工具，如图 2-16 所示。\n\n\
    \   ![A450041_1_En_2_Fig16_HTML.jpg](img/A450041_1_En_2_Fig16_HTML.jpg)\n\n  \
    \ 图 2-16 – 从应用栏中点击`抠图`图标\n\n5. 点击底部的`智能`工具。\n6. 点击左侧的设置图标。将其设置为`减去`，如图 2-17 所示。\n\
    \n   ![A450041_1_En_2_Fig17_HTML.jpg](img/A450041_1_En_2_Fig17_HTML.jpg)\n\n \
    \  图 2-17 – 将`智能`工具设置为`减去`\n\n7. 在天空或你想要移除的背景上拖拽，如图 2-18 所示。\n8. 放大并在小区域上拖拽以将其移除。\n\
    9. 点击右下角的`校正`图标以应用更改。\n\n   ![A450041_1_En_2_Fig18_HTML.jpg](img/A450041_1_En_2_Fig18_HTML.jpg)\n\
    \n   图 2-18 – 移除背景后的图像\n\n移除背景后，你将给原始图像添加一个新背景，操作如下：\n\n1. 点击`图层`图标以在屏幕右侧显示图层。\n\
    2. 点击加号图标添加一个新图层，并选择添加一个新的图像图层，如图 2-19 所示。\n\n   ![A450041_1_En_2_Fig19_HTML.jpg](img/A450041_1_En_2_Fig19_HTML.jpg)\n\
    \n   图 2-19 – 将图像添加为新图层\n\n3. 从相机胶卷中选择新的背景图像。\n4. 长按顶部的背景图层，并将其拖到基础图层下方，如图 2-20\
    \ 所示。\n\n   ![A450041_1_En_2_Fig20_HTML.jpg](img/A450041_1_En_2_Fig20_HTML.jpg)\n\
    \n   图 2-20 – 调整项目中的图层顺序\n\n5. 使用图像周围的矩形框调整其大小，以使其适应背景，如图 2-21 所示。\n\n   ![A450041_1_En_2_Fig21_HTML.jpg](img/A450041_1_En_2_Fig21_HTML.jpg)\n\
    \n   图 2-21 – 调整背景图像大小，使其放置在顶层图像之后\n\n有时由于两张图像间的投影，会出现颜色差异。因此，下一步是调整顶层图像的颜色以匹配背景图像的颜色。\n\
    \n![A450041_1_En_2_Fig22_HTML.jpg](img/A450041_1_En_2_Fig22_HTML.jpg)\n\n图 2-22\
    \ – 使用`色温`图标调整照片的色温\n\n1. 从右侧的`图层`面板中选择顶层图层。\n2. 点击左下角的`调整`图标。\n3. 点击`色温`以打开滑块。\n\
    4. 向右拖拽滑块，为图像增加暖色调，如图 2-22 所示。\n\n## 精通选区\n\n工具：`Photoshop Mix`\n\nAdobe `Photoshop\
    \ Mix` 提供了多种工具，帮助你在 iPhone 上选择对象。这些工具试图模仿桌面版 Adobe Photoshop 应用中的选择方法，如图 2-23\
    \ 所示。\n\n![A450041_1_En_2_Fig23_HTML.jpg](img/A450041_1_En_2_Fig23_HTML.jpg)\n\
    \n图 2-23 – 使用套索选择工具\n\n当你选择一张图像进行编辑时，可以点击屏幕底部的`抠图`图标，并选择以下任一工具：\n\n- 点击`自动`图标，自动检测背景并将其移除。请注意，此功能要求背景与图像中的元素之间具有高对比度。\n\
    - 点击`智能`图标，在你想选择的元素上拖拽。该工具可帮助你在拖拽想要选择的区域时进行智能选择。它利用颜色相似性作为选择与移除部分的指南。\n- `基础`图标让你通过拖拽来选择图像中的区域。与`智能`选择不同，该图标让你手动定义需要移除的区域。\n\
    - `套索`工具让你在照片中创建特定区域的选区，你可以用手指或触控笔在想要选择的区域周围绘制。\n- `形状`选择功能让你根据矩形、圆形、三角形或正方形等形状进行选择。\n\
    - 使用`优化`图标来调整所选区域的平滑度及其与背景的融合程度。你也可以点击`重置`图标以恢复到原始版本。\n"
- fmt: "# Remove Elements from a Photo\n\nTools: Photoshop Fix\n\nAdobe Photoshop\
    \ Mix allows you to manipulate images, but Photoshop Fix includes tools that allow\
    \ you to fix issues that may appear in the photos. In this section, you will explore\
    \ how to remove the unwanted parts from an image using Photoshop Fix. Follow these\
    \ steps:\n\n1. Open the Photoshop Fix app and log in with your Adobe ID.\n2. Tap\
    \ the plus icon at the top right.\n3. Choose the source where you will get the\
    \ photo, and select the photo, as shown in Figure [2-24](#A450041_1_En_2_Chapter.html#Fig24).\n\
    \n   ![A450041_1_En_2_Fig24_HTML.jpg](A450041_1_En_2_Fig24_HTML.jpg)\n\n   Figure\
    \ 2-24\n   Adding a photo to a project in Photoshop Fix\n4. Tap the Healing icon\
    \ at the bottom of the screen.\n5. Tap the Spot Healing icon from the bottom bar.\n\
    6. Paint over the area you would like to remove. You can also use other tools\
    \ such as the Patch and Clone Stamp tools, as shown in Figure [2-25](#A450041_1_En_2_Chapter.html#Fig25).\n\
    \n   ![A450041_1_En_2_Fig25_HTML.jpg](A450041_1_En_2_Fig25_HTML.jpg)\n\n   Figure\
    \ 2-25\n   Painting over the element that needs to be removed\n7. Tap the Correct\
    \ icon to commit the changes. The final result should look like Figure [2-26](#A450041_1_En_2_Chapter.html#Fig26).\n\
    \n   ![A450041_1_En_2_Fig26_HTML.jpg](A450041_1_En_2_Fig26_HTML.jpg)\n\n   Figure\
    \ 2-26\n   The final result of the photo after removing the element\n\n## Summary\n\
    \nMany applications can help you to edit and modify photos on the iPhone. These\
    \ applications vary based on their capabilities. The mobile versions of Adobe\
    \ apps provide a number of applications that can help you to edit photos in an\
    \ environment similar to the desktop applications. You can use Adobe Lightroom\
    \ to adjust the color and light in a photo to create a professional-looking outcome.\
    \ You can use Photoshop Mix to merge different photos and select specific parts\
    \ in a photo. To fix a photo, for instance, removing unwanted parts of the image,\
    \ you can use Photoshop Fix.\n\n## Practice Exercise\n\nIn this practice exercise,\
    \ take a photo using your iPhone and use Photoshop Fix to remove an object from\
    \ the photo. Save the photo and use Photoshop Mix to blend it with another photo\
    \ and then adjust the colors in the final composition.\n\n# 3. Working with Photography\
    \ Projects\n\nThe newest DSLR cameras allow you to create different photography\
    \ techniques easier than before. You can simply apply effects such as shallow\
    \ depth of field and double exposure directly in your DSLR camera without the\
    \ need to use computer applications such as Photoshop or Lightroom. While an iPhone\
    \ camera doesn’t give you the same tools you have in your DSLR, the good news\
    \ that there are tons of applications that can help you to achieve similar effects.\n\
    \nIn this chapter, you will go through a number of the photography techniques\
    \ that you have probably used with a professional digital camera. You will try\
    \ to create similar techniques using different iPhone apps. Remember to read through\
    \ the steps first and then try them with your own photos.\n\n## Creating Advanced\
    \ HDR Photos\n\nTools used: Snapseed\n\nFigure [3-1](#A450041_1_En_3_Chapter.html#Fig1)\
    \ shows the original photo I used for this example. You can work through the same\
    \ steps using your own photo.\n\n![A450041_1_En_3_Fig1_HTML.jpg](A450041_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\nThe original photo (© Rafiq Elmansy)\n\nFigure [3-2](#A450041_1_En_3_Chapter.html#Fig2)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig2_HTML.jpg](A450041_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2\nThe final result\n\nThe high dynamic range (HDR) effect increases\
    \ the contrast between the light and shadows in your photos by presenting a greater\
    \ range of luminance levels compared to traditional images. This enables you to\
    \ create photos with dramatic effects. As you explored earlier in this book, you\
    \ can create HDR photos directly from your Camera app while taking your shot.\
    \ However, the iPhone feature is still basic and doesn’t give you full control\
    \ over the effect. For example, you can’t control the density or the style of\
    \ the HDR effect applied.\n\nHDR photos are usually created by merging a number\
    \ of photos with different exposure levels to produce a wider range of luminance\
    \ in the scene. Meanwhile, to reach a good result with the HDR effect, the photo\
    \ needs to include colorful elements with high-contrast light and shadows. I took\
    \ the photo in this tip while I was visiting the Louvre Museum in Paris a couple\
    \ of years ago; I want to give its color more depth and drama. So, I used the\
    \ HDR feature in the Snapseed app.\n\n### Step 1: Prepare the Photo\n\nBefore\
    \ applying the HDR effect, you need to make sure that the photo colors are vibrant\
    \ enough and contrasted to get better final results. To increase the brightness,\
    \ contrast, and saturation in the shot, follow these steps:\n\n1. Open the Snapseed\
    \ app. Tap `Open` and open an image on your iPhone.\n2. Tap the `Tools` button\
    \ on the bottom right, and choose `Tune Image`. Tap the `Adjustment` icon, and\
    \ choose `Brightness`. Drag the slider on the top to +20 to increase the brightness\
    \ of the photo (see Figure [3-3](#A450041_1_En_3_Chapter.html#Fig3)).\n\n   ![A450041_1_En_3_Fig3_HTML.jpg](A450041_1_En_3_Fig3_HTML.jpg)\n\
    \n   Figure 3-3\n   Increasing the brightness of the photo in the Snapseed app\n\
    3. Tap the `Adjustment` icon, choose `Contrast`, and set the value to +50.\n4.\
    \ Tap the `Adjustment` icon, choose `Saturation`, and increase it to +30. Set\
    \ `Ambiance` to +30 (see Figure [3-4](#A450041_1_En_3_Chapter.html#Fig4)).\n\n\
    \   ![A450041_1_En_3_Fig4_HTML.jpg](A450041_1_En_3_Fig4_HTML.jpg)\n\n   Figure\
    \ 3-4\n   Increasing the Saturation and Ambiance values\n5. Tap the `Apply` icon\
    \ on the bottom right to apply the effect.\n6. Tap the `Tools` button on the bottom\
    \ right, and choose `White Balance`. You will give the colors in the photos a\
    \ warmer effect (see Figure [3-5](#A450041_1_En_3_Chapter.html#Fig5)).\n\n   ![A450041_1_En_3_Fig5_HTML.jpg](A450041_1_En_3_Fig5_HTML.jpg)\n\
    \n   Figure 3-5\n   Tap the White Balance setting\n7. Tap the `Adjustment` icon,\
    \ and choose `Temperature`. Set it to a warmer level, for example, +10. Tap the\
    \ `Apply` icon (see Figure [3-6](#A450041_1_En_3_Chapter.html#Fig6)).\n\n   ![A450041_1_En_3_Fig6_HTML.jpg](A450041_1_En_3_Fig6_HTML.jpg)\n\
    \n   Figure 3-6\n   Adding a warm effect by increasing the Temperature setting\n\
    \n### Step 2: Apply the HDR Effect\n\nYou should choose an HDR effect that is\
    \ suitable for the photo you have. Follow these steps:\n\n1. Tap the `Tools` icon,\
    \ and choose `HDR Scape` from Filters.\n2. Choose the `Strong` mode, and increase\
    \ its strength to +50 (see Figure [3-7](#A450041_1_En_3_Chapter.html#Fig7)).\n\
    \n   ![A450041_1_En_3_Fig7_HTML.jpg](A450041_1_En_3_Fig7_HTML.jpg)\n\n   Figure\
    \ 3-7\n   Applying the HDR Scope effect\n3. Tap the `Adjustment` icon, choose\
    \ `Brightness`, and set it to be a little brighter by dragging the slider to +10.\n\
    4. Tap the `Apply` icon.\n\n### Step 3: Apply the Vignette Effect\n\nTo add more\
    \ focus to the center of the photo and the glass pyramid, I will add a vignette\
    \ effect to create darker edges for the shot. You can use your own photo to create\
    \ a similar effect. Follow these steps:\n\n1. In the Tools list, choose `Vignette`.\
    \ Drag the slider to the left to create darker edges in the photo (see Figure\
    \ [3-8](#A450041_1_En_3_Chapter.html#Fig8)).\n\n   ![A450041_1_En_3_Fig8_HTML.jpg](A450041_1_En_3_Fig8_HTML.jpg)\n\
    \n   Figure 3-8\n   Applying the vignette effect to the photo\n2. Tap the `Apply`\
    \ icon."
  raw: "## Remove Elements from a Photo\n\nTools: Photoshop Fix\n\nAdobe Photoshop\
    \ Mix allows you to manipulate images, but Photoshop Fix includes tools that allow\
    \ you to fix issues that may appear in the photos. In this section, you will explore\
    \ how to remove the unwanted parts from an image using Photoshop Fix. Follow these\
    \ steps:\n\n1.  Open the Photoshop Fix app and log in with your Adobe ID.  \n\
    2.  Tap the plus icon at the top right.  \n3.  Choose the source where you will\
    \ get the photo, and select the photo, as shown in Figure [2-24](#A450041_1_En_2_Chapter.html#Fig24).\n\
    \n    ![A450041_1_En_2_Fig24_HTML.jpg](A450041_1_En_2_Fig24_HTML.jpg)\n\n    Figure\
    \ 2-24\n\n    Adding a photo to a project in Photoshop Fix  \n4.  Tap the Healing\
    \ icon at the bottom of the screen.  \n5.  Tap the Spot Healing icon from the\
    \ bottom bar.  \n6.  Paint over the area you would like to remove. You can also\
    \ use other tools such as the Patch and Clone Stamp tools, as shown in Figure\
    \ [2-25](#A450041_1_En_2_Chapter.html#Fig25).\n\n    ![A450041_1_En_2_Fig25_HTML.jpg](A450041_1_En_2_Fig25_HTML.jpg)\n\
    \n    Figure 2-25\n\n    Painting over the element that needs to be removed  \n\
    7.  Tap the Correct icon to commit the changes. The final result should look like\
    \ Figure [2-26](#A450041_1_En_2_Chapter.html#Fig26).\n\n    ![A450041_1_En_2_Fig26_HTML.jpg](A450041_1_En_2_Fig26_HTML.jpg)\n\
    \n    Figure 2-26\n\n    The final result of the photo after removing the element\n\
    \n## Summary\n\nMany applications can help you to edit and modify photos on the\
    \ iPhone. These applications vary based on their capabilities. The mobile versions\
    \ of Adobe apps provide a number of applications that can help you to edit photos\
    \ in an environment similar to the desktop applications. You can use Adobe Lightroom\
    \ to adjust the color and light in a photo to create a professional-looking outcome.\
    \ You can use Photoshop Mix to merge different photos and select specific parts\
    \ in a photo. To fix a photo, for instance, removing unwanted parts of the image,\
    \ you can use Photoshop Fix.\n\n## Practice Exercise\n\nIn this practice exercise,\
    \ take a photo using your iPhone and use Photoshop Fix to remove an object from\
    \ the photo. Save the photo and use Photoshop Mix to blend it with another photo\
    \ and then adjust the colors in the final composition.\n\n# 3. Working with Photography\
    \ Projects\n\nThe newest DSLR cameras allow you to create different photography\
    \ techniques easier than before. You can simply apply effects such as shallow\
    \ depth of field and double exposure directly in your DSLR camera without the\
    \ need to use computer applications such as Photoshop or Lightroom. While an iPhone\
    \ camera doesn’t give you the same tools you have in your DSLR, the good news\
    \ that there are tons of applications that can help you to achieve similar effects.\n\
    \nIn this chapter, you will go through a number of the photography techniques\
    \ that you have probably used with a professional digital camera. You will try\
    \ to create similar techniques using different iPhone apps. Remember to read through\
    \ the steps first and then try them with your own photos.\n\n## Creating Advanced\
    \ HDR Photos\n\nTools used: Snapseed\n\nFigure [3-1](#A450041_1_En_3_Chapter.html#Fig1)\
    \ shows the original photo I used for this example. You can work through the same\
    \ steps using your own photo.\n\n![A450041_1_En_3_Fig1_HTML.jpg](A450041_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nThe original photo (© Rafiq Elmansy)\n\nFigure [3-2](#A450041_1_En_3_Chapter.html#Fig2)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig2_HTML.jpg](A450041_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2\n\nThe final result\n\nThe high dynamic range (HDR) effect increases\
    \ the contrast between the light and shadows in your photos by presenting a greater\
    \ range of luminance levels compared to traditional images. This enables you to\
    \ create photos with dramatic effects. As you explored earlier in this book, you\
    \ can create HDR photos directly from your Camera app while taking your shot.\
    \ However, the iPhone feature is still basic and doesn’t give you full control\
    \ over the effect. For example, you can’t control the density or the style of\
    \ the HDR effect applied.\n\nHDR photos are usually created by merging a number\
    \ of photos with different exposure levels to produce a wider range of luminance\
    \ in the scene. Meanwhile, to reach a good result with the HDR effect, the photo\
    \ needs to include colorful elements with high-contrast light and shadows. I took\
    \ the photo in this tip while I was visiting the Louvre Museum in Paris a couple\
    \ of years ago; I want to give its color more depth and drama. So, I used the\
    \ HDR feature in the Snapseed app .\n\n### Step 1: Prepare the Photo\n\nBefore\
    \ applying the HDR effect, you need to make sure that the photo colors are vibrant\
    \ enough and contrasted to get better final results. To increase the brightness,\
    \ contrast, and saturation in the shot, follow these steps:\n\n1.  Open the Snapseed\
    \ app. Tap Open and open an image on your iPhone.  \n2.  Tap the Tools button\
    \ on the bottom right, and choose Tune Image. Tap the Adjustment icon, and choose\
    \ Brightness. Drag the slider on the top to +20 to increase the brightness of\
    \ the photo (see Figure [3-3](#A450041_1_En_3_Chapter.html#Fig3)).\n\n    ![A450041_1_En_3_Fig3_HTML.jpg](A450041_1_En_3_Fig3_HTML.jpg)\n\
    \n    Figure 3-3\n\n    Increasing the brightness of the photo in the Snapseed\
    \ app  \n3.  Tap the Adjustment icon, choose Contrast, and set the value to +50.\
    \  \n4.  Tap the Adjustment icon, choose Saturation, and increase it to +30\\\
    . Set Ambiance to +30 (see Figure [3-4](#A450041_1_En_3_Chapter.html#Fig4)).\n\
    \n    ![A450041_1_En_3_Fig4_HTML.jpg](A450041_1_En_3_Fig4_HTML.jpg)\n\n    Figure\
    \ 3-4\n\n    Increasing the Saturation and Ambiance values  \n5.  Tap the Apply\
    \ icon on the bottom right to apply the effect.  \n6.  Tap the Tools button on\
    \ the bottom right, and choose White Balance. You will give the colors in the\
    \ photos a warmer effect (see Figure [3-5](#A450041_1_En_3_Chapter.html#Fig5)).\n\
    \n    ![A450041_1_En_3_Fig5_HTML.jpg](A450041_1_En_3_Fig5_HTML.jpg)\n\n    Figure\
    \ 3-5\n\n    Tap the White Balance setting  \n7.  Tap the Adjustment icon, and\
    \ choose Temperature. Set it to a warmer level, for example, +10\\. Tap the Apply\
    \ icon (see Figure [3-6](#A450041_1_En_3_Chapter.html#Fig6)).\n\n    ![A450041_1_En_3_Fig6_HTML.jpg](A450041_1_En_3_Fig6_HTML.jpg)\n\
    \n    Figure 3-6\n\n    Adding a warm effect by increasing the Temperature setting\n\
    \n### Step 2: Apply the HDR Effect\n\nYou should choose an HDR effect that is\
    \ suitable for the photo you have. Follow these steps:\n\n1.  Tap the Tools icon,\
    \ and choose HDR Scape from Filters.  \n2.  Choose the Strong mode, and increase\
    \ its strength to +50 (see Figure [3-7](#A450041_1_En_3_Chapter.html#Fig7)).\n\
    \n    ![A450041_1_En_3_Fig7_HTML.jpg](A450041_1_En_3_Fig7_HTML.jpg)\n\n    Figure\
    \ 3-7\n\n    Applying the HDR Scope effect  \n3.  Tap the Adjustment icon, choose\
    \ Brightness, and set it to be a little brighter by dragging the slider to +10.\
    \  \n4.  Tap the Apply icon.\n\n### Step 3: Apply the Vignette Effect\n\nTo add\
    \ more focus to the center of the photo and the glass pyramid, I will add a vignette\
    \ effect to create darker edges for the shot. You can use your own photo to create\
    \ a similar effect. Follow these steps:\n\n1.  In the Tools list, choose Vignette.\
    \ Drag the slider to the left to create darker edges in the photo (see Figure\
    \ [3-8](#A450041_1_En_3_Chapter.html#Fig8)).\n\n    ![A450041_1_En_3_Fig8_HTML.jpg](A450041_1_En_3_Fig8_HTML.jpg)\n\
    \n    Figure 3-8\n\n    Applying the vignette effect to the photo  \n2.  Tap the\
    \ Apply icon."
  trans: "\n# 从照片中移除元素\n\n工具：Photoshop Fix\n\nAdobe Photoshop Mix 可让你处理图像，但 Photoshop\
    \ Fix 包含的工具能帮你修复照片中可能出现的问题。在本节中，你将探索如何使用 Photoshop Fix 从图像中移除不需要的部分。请按照以下步骤操作：\n\
    \n1. 打开 Photoshop Fix 应用，并使用你的 Adobe ID 登录。\n2. 点击右上角的加号图标。\n3. 选择获取照片的来源，并选择该照片，如图\
    \ 2-24 所示。\n\n   ![A450041_1_En_2_Fig24_HTML.jpg](img/A450041_1_En_2_Fig24_HTML.jpg)\n\
    \n   图 2-24\n   在 Photoshop Fix 中向项目添加照片\n4. 点击屏幕底部的“修复”图标。\n5. 从底部工具栏点击“污点修复”图标。\n\
    6. 在你想要移除的区域上进行涂抹。你也可以使用其他工具，如“修补”和“仿制图章”工具，如图 2-25 所示。\n\n   ![A450041_1_En_2_Fig25_HTML.jpg](img/A450041_1_En_2_Fig25_HTML.jpg)\n\
    \n   图 2-25\n   涂抹需要移除的元素\n7. 点击“校正”图标以确认更改。最终结果应如图 2-26 所示。\n\n   ![A450041_1_En_2_Fig26_HTML.jpg](img/A450041_1_En_2_Fig26_HTML.jpg)\n\
    \n   图 2-26\n   移除元素后照片的最终效果\n\n## 摘要\n\n有许多应用可以帮助你在 iPhone 上编辑和修改照片。这些应用的功能各不相同。Adobe\
    \ 应用的移动版本提供了大量应用，可让你在类似于桌面应用的环境中进行照片编辑。你可以使用 Adobe Lightroom 调整照片的颜色和光线，以获得专业效果。你可以使用\
    \ Photoshop Mix 合并不同的照片，并选择照片中的特定部分。要修复照片，例如移除图像中不需要的部分，你可以使用 Photoshop Fix。\n\
    \n## 练习\n\n在本练习中，用你的 iPhone 拍摄一张照片，并使用 Photoshop Fix 从照片中移除一个物体。保存照片，然后使用 Photoshop\
    \ Mix 将其与另一张照片融合，最后调整最终合成的颜色。\n\n# 3. 处理摄影项目\n\n最新的数码单反相机让你比以往更轻松地实现不同的摄影技巧。你可以直接在单反相机中应用诸如浅景深和多重曝光等效果，而无需使用\
    \ Photoshop 或 Lightroom 等电脑应用。虽然 iPhone 相机没有提供与单反相机相同的工具，但好消息是，有大量应用可以帮助你实现类似的效果。\n\
    \n在本章中，你将了解一些你可能在专业数码相机上使用过的摄影技巧。你将尝试使用不同的 iPhone 应用来创建类似的效果。请记住先通读步骤，然后用自己的照片进行尝试。\n\
    \n## 创建高级 HDR 照片\n\n工具：Snapseed\n\n图 3-1 显示了我用于此示例的原始照片。你可以使用自己的照片按照相同步骤操作。\n\n\
    ![A450041_1_En_3_Fig1_HTML.jpg](img/A450041_1_En_3_Fig1_HTML.jpg)\n\n图 3-1\n原始照片（©\
    \ Rafiq Elmansy）\n\n图 3-2 显示了我的最终结果。\n\n![A450041_1_En_3_Fig2_HTML.jpg](img/A450041_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2\n最终结果\n\n高动态范围（HDR）效果通过呈现比传统图像更广的亮度级别范围，来增加照片中亮部与阴影之间的对比度。这使你能够创作出具有戏剧性效果的照片。正如你之前在本书中学到的，你可以在拍照时直接从“相机”应用创建\
    \ HDR 照片。然而，iPhone 的这项功能仍较为基础，无法让你完全控制效果。例如，你无法控制所应用 HDR 效果的强度或风格。\n\nHDR 照片通常通过合并多张不同曝光级别的照片来产生，以在场景中呈现更广的亮度范围。同时，要获得良好的\
    \ HDR 效果，照片需要包含色彩丰富且具有高对比度亮部与阴影的元素。几年前我参观巴黎卢浮宫时拍摄了本技巧中的这张照片；我想让它的色彩更具深度和戏剧性。因此，我使用了\
    \ Snapseed 应用中的 HDR 功能。\n\n### 步骤 1：准备照片\n\n在应用 HDR 效果之前，你需要确保照片的色彩足够鲜艳、对比度足够高，以获得更好的最终效果。要增加照片的亮度、对比度和饱和度，请按以下步骤操作：\n\
    \n1. 打开 Snapseed 应用。点击 `Open` 并在你的 iPhone 上打开一张图像。\n2. 点击右下角的 `Tools` 按钮，选择 `Tune\
    \ Image`。点击 `Adjustment` 图标，选择 `Brightness`。将顶部的滑块拖至 +20 以增加照片的亮度（见图 3-3）。\n\n\
    \   ![A450041_1_En_3_Fig3_HTML.jpg](img/A450041_1_En_3_Fig3_HTML.jpg)\n\n   图\
    \ 3-3\n   在 Snapseed 应用中增加照片亮度\n3. 点击 `Adjustment` 图标，选择 `Contrast`，并将值设为 +50。\n\
    4. 点击 `Adjustment` 图标，选择 `Saturation`，并将其增加到 +30。将 `Ambiance` 设为 +30（见图 3-4）。\n\
    \n   ![A450041_1_En_3_Fig4_HTML.jpg](img/A450041_1_En_3_Fig4_HTML.jpg)\n\n   图\
    \ 3-4\n   增加饱和度和氛围值\n5. 点击右下角的 `Apply` 图标以应用效果。\n6. 点击右下角的 `Tools` 按钮，选择 `White\
    \ Balance`。你将给照片中的色彩增添更暖的效果（见图 3-5）。\n\n   ![A450041_1_En_3_Fig5_HTML.jpg](img/A450041_1_En_3_Fig5_HTML.jpg)\n\
    \n   图 3-5\n   点击白平衡设置\n7. 点击 `Adjustment` 图标，选择 `Temperature`。将其设置为更暖的级别，例如 +10。点击\
    \ `Apply` 图标（见图 3-6）。\n\n   ![A450041_1_En_3_Fig6_HTML.jpg](img/A450041_1_En_3_Fig6_HTML.jpg)\n\
    \n   图 3-6\n   通过增加色温设置添加暖调效果\n\n### 步骤 2：应用 HDR 效果\n\n你应该选择适合你照片的 HDR 效果。请按以下步骤操作：\n\
    \n1. 点击 `Tools` 图标，并从滤镜中选择 `HDR Scape`。\n2. 选择 `Strong` 模式，并将其强度增加到 +50（见图 3-7）。\n\
    \n   ![A450041_1_En_3_Fig7_HTML.jpg](img/A450041_1_En_3_Fig7_HTML.jpg)\n\n   图\
    \ 3-7\n   应用 HDR 范围效果\n3. 点击 `Adjustment` 图标，选择 `Brightness`，并通过将滑块拖至 +10 使其变得更亮一点。\n\
    4. 点击 `Apply` 图标。\n\n### 步骤 3：应用暗角效果\n\n为了将更多焦点集中在照片中心和玻璃金字塔上，我将添加暗角效果，为照片创建更暗的边缘。你可以使用自己的照片创建类似效果。请按以下步骤操作：\n\
    \n1. 在工具列表中，选择 `Vignette`。将滑块向左拖动，以在照片中创建更暗的边缘（见图 3-8）。\n\n   ![A450041_1_En_3_Fig8_HTML.jpg](img/A450041_1_En_3_Fig8_HTML.jpg)\n\
    \n   图 3-8\n   对照片应用暗角效果\n2. 点击 `Apply` 图标。\n"
- fmt: "### Step 4: Add the Blur Effect\n\nIn addition to the vignette effect, you\
    \ will add a blur effect to increase the focus on the center of the photo. Follow\
    \ these steps:\n\n1. In the `Filters` list, choose `Lens Blur`. Increase the blur\
    \ strength, for example, to `+30`.\n2. With two fingers, drag to adjust the size\
    \ and shape of the blur applied to the photo. Try to make the blur on the edges\
    \ only so that the center point of the photo is in focus.\n3. Tap the `Apply`\
    \ icon (see Figure [3-9](#A450041_1_En_3_Chapter.html#Fig9)).\n   ![A450041_1_En_3_Fig9_HTML.jpg](A450041_1_En_3_Fig9_HTML.jpg)\n\
    \   Figure 3-9: Applying the blur effect\n4. Tap `Save` to save the changes. Then\
    \ choose to save a copy to preserve the original photo untouched. When you save\
    \ the photo, you can open it again and edit the modifications. If you choose `Export`,\
    \ the photo will be exported, yet the changes won’t be editable.\n\n### Creating\
    \ a Shallow Depth of Field\n\nTools Used: `Tadaa`\n\nFigure [3-10](#A450041_1_En_3_Chapter.html#Fig10)\
    \ shows the original photo used for this example.\n![A450041_1_En_3_Fig10_HTML.jpg](A450041_1_En_3_Fig10_HTML.jpg)\n\
    Figure 3-10: Original image (© Radwa Khalil)\n\nFigure [3-11](#A450041_1_En_3_Chapter.html#Fig11)\
    \ shows the final result.\n![A450041_1_En_3_Fig11_HTML.jpg](A450041_1_En_3_Fig11_HTML.jpg)\n\
    Figure 3-11: Final result\n\nThe term *depth of field* refers to the focus range\
    \ in the shot. If the photo’s focused area is limited to the near objects while\
    \ the far elements appear blurry, it is called a **shallow depth of field**. On\
    \ the other hand, if the focused area includes a large area of the photo, it is\
    \ called a **deep depth of field**. The depth of field in a DSLR camera is controlled\
    \ by the camera aperture (`f-stop`), which is related to the diameter of the lens\
    \ opening, and it is represented as a fraction of one (`1/F`). So, if the lens\
    \ opening is large, the number becomes small, which results in a shallow depth\
    \ of field.\n\nOn the iPhone, the aperture control is limited while taking a photo\
    \ because you are only able to tap the object you would like to focus on. Sometimes\
    \ you need to have more control over the shot’s depth of field. In the following\
    \ example, the shot was taken but later I decided to tweak the depth of field.\
    \ There are many apps that can help you manually apply a shallow depth of field\
    \ on the photo, such as `Camera+` and `Tadaa`.\n\nIn the following example, I\
    \ wanted to give more focus to the near chess pieces while blurring the far objects.\
    \ Also, I wanted to apply darker edges to the photo to focus on the main objects\
    \ in the shot. Find a similar photo to follow along with the example.\n\n### Step\
    \ 1: Protect the Main Objects\n\nBefore applying the blur effect, you should protect\
    \ the main objects in the shot to keep them sharp. You can use a mask effect as\
    \ follows:\n\n1. Open a photo in the `Tadaa` app, and tap the `Blur` icon in the\
    \ bottom toolbar.\n2. Tap the `Edit Mask` icon at the top.\n3. Zoom in on the\
    \ objects and start to paint a mask over them. Here, I painted the pieces near\
    \ the camera (see Figure [3-12](#A450041_1_En_3_Chapter.html#Fig12)).\n4. Tap\
    \ the `Apply` icon at the top right.\n   ![A450041_1_En_3_Fig12_HTML.jpg](A450041_1_En_3_Fig12_HTML.jpg)\n\
    \   Figure 3-12: Applying a mask over the elements near the camera\n\n### Step\
    \ 2: Apply the Blur Effect\n\nNow, apply the blur effect to the far objects in\
    \ the shot. You can follow along with your own photo.\n\n1. Tap the `Blur` icon.\
    \ You may need to drag the toolbar right or left to reveal the rest of the tools\
    \ (see Figure [3-13](#A450041_1_En_3_Chapter.html#Fig13)).\n   ![A450041_1_En_3_Fig13_HTML.jpg](A450041_1_En_3_Fig13_HTML.jpg)\n\
    \   Figure 3-13: Drag the toolbar to reveal the `Blur` icon\n2. Set the blur type\
    \ to `Circular`.\n3. Drag with your fingers to resize and position the protected\
    \ area above the near objects in the photo.\n4. Drag the `Blur` slider to increase\
    \ the blur effect on the far objects. The amount of blur varies based on visual\
    \ distance between the near objects and the far objects.\n5. Reduce the `Range`\
    \ value to start the blur effect from a proper distance from the in-focus objects\
    \ (see Figure [3-14](#A450041_1_En_3_Chapter.html#Fig14)).\n   ![A450041_1_En_3_Fig14_HTML.jpg](A450041_1_En_3_Fig14_HTML.jpg)\n\
    \   Figure 3-14: Apply the blur effect on the far objects in the photo\n6. Tap\
    \ the `Apply` icon.\n\n### Step 3: Apply the Vignette Effect\n\nNow, darken the\
    \ edges of the photo to focus on the main objects as follows:\n\n1. Tap the `Vignette`\
    \ icon in the bottom toolbar.\n2. Drag `Intensity` to the left side to create\
    \ a proper frame around the photo.\n3. Drag the `Range` slider to a middle point\
    \ (see Figure [3-15](#A450041_1_En_3_Chapter.html#Fig15)).\n4. Tap the `Apply`\
    \ icon at the top right.\n   ![A450041_1_En_3_Fig15_HTML.jpg](A450041_1_En_3_Fig15_HTML.jpg)\n\
    \   Figure 3-15: Applying the vignette effect\n\n### Step 4: Apply a Final Filter\n\
    \nAfter adding the vignette effect, add a filter to the photo to give it a dramatic\
    \ mono color effect, as follows:\n\n1. Tap the `Filter` icon, and choose the `Charleston`\
    \ filter.\n2. Drag the slider under the filter to a middle point to soften the\
    \ effect of the filter (see Figure [3-16](#A450041_1_En_3_Chapter.html#Fig16)).\n\
    3. Tap the `App` icon, and tap the `Share` icon to save the photo to your `Camera\
    \ Roll`.\n   ![A450041_1_En_3_Fig16_HTML.jpg](A450041_1_En_3_Fig16_HTML.jpg)\n\
    \   Figure 3-16: Applying the filter effect\n\n### Creating a Low-Light Black-and-White\
    \ Photo\n\nTools: `Adobe Lightroom` app, `Adobe Photoshop Mix`\n\nFigure [3-17](#A450041_1_En_3_Chapter.html#Fig17)\
    \ shows the original photo used for this example. Choose a similar photo to follow\
    \ along with the example.\n![A450041_1_En_3_Fig17_HTML.jpg](A450041_1_En_3_Fig17_HTML.jpg)\n\
    Figure 3-17: The original photo (© Radwa Khalil)\n\nFigure [3-18](#A450041_1_En_3_Chapter.html#Fig18)\
    \ shows the final result.\n![A450041_1_En_3_Fig18_HTML.jpg](A450041_1_En_3_Fig18_HTML.jpg)\n\
    Figure 3-18: The final result\n\nA low-light effect allows you to create a dramatic\
    \ effect on a photo by having viewers focus on the lit part of the photo. Usually,\
    \ it works well with portrait photography as it emphasizes the facial expressions.\
    \ To ensure high contrast in a low-light photo, consider the following tips:\n\
    \n- Take your photo against a dark background, such as solid black. You can use\
    \ a black wall or paper in the background of your object.\n- Limit the number\
    \ of objects in the photo to one object or person to ensure precise focus and\
    \ the ability to control the photo’s light and dark areas while editing.\n- Try\
    \ to use a soft low-light source facing the person or the object in the shot.\n\
    - Try to use a tripod to ensure a steady shot with your iPhone.\n\nIn the following\
    \ example, the photo was taken with a soft light on a black background, which\
    \ makes it suitable for a low-light effect. I used `Photoshop Mix` to improve\
    \ the white areas using layers and blending modes."
  raw: "### Step 4: Add the Blur Effect\n\nIn addition to the vignette effect, you\
    \ will add a blur effect to increase the focus on the center of the photo. Follow\
    \ these steps:\n\n1.  In the Filters list, choose Lens Blur. Increase the blur\
    \ strength, for example, to +30.  \n2.  With two fingers, drag to adjust the size\
    \ and shape of the blur applied to the photo. Try to make the blur on the edges\
    \ only so that the center point of the photo is in focus.  \n3.  Tap the Apply\
    \ icon (see Figure [3-9](#A450041_1_En_3_Chapter.html#Fig9)).\n\n    ![A450041_1_En_3_Fig9_HTML.jpg](A450041_1_En_3_Fig9_HTML.jpg)\n\
    \n    Figure 3-9\n\n    Applying the blur effect  \n4.  Tap Save to save the changes.\
    \ Then choose to save a copy to preserve the original photo untouched. When you\
    \ save the photo, you can open again and edit the modifications. If you choose\
    \ Export, the photo will be exported, yet the changes won’t be editable.\n\n##\
    \ Creating a Shallow Depth of Field\n\nTools Used: Tadaa\n\nFigure [3-10](#A450041_1_En_3_Chapter.html#Fig10)\
    \ shows the original photo I used for this example.\n\n![A450041_1_En_3_Fig10_HTML.jpg](A450041_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10\n\nOriginal image (© Radwa Khalil)\n\nFigure [3-11](#A450041_1_En_3_Chapter.html#Fig11)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig11_HTML.jpg](A450041_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nFinal result\n\nThe term depth of field refers to the focus range\
    \ in the shot. If the photo’s focused area is limited to the near objects while\
    \ the far elements appear blurry, it is called a shallow depth of field . On the\
    \ other hand, if the focused area includes a large area of the photo, it is called\
    \ a deep depth of field . The depth of field in a DSLR camera i s controlled by\
    \ the camera aperture (f-stop), which is related to the diameter of the lens opening,\
    \ and it is represented as a fraction of one (1/F). So, if the lens opening is\
    \ large, the number becomes small, which results in a shallow depth of field.\n\
    \nOn the iPhone, the aperture control is limited while taking a photo because\
    \ you are only able to tap the object you would like to focus on. Sometimes you\
    \ need to have more control over the shot’s depth of field. In the following example,\
    \ I took the shot but later decided to tweak the depth of field. There are many\
    \ apps that can help you manually apply a shallow depth of field on the photo\
    \ such as Camera+ and Tadaa.\n\nIn the following example, I wanted to give more\
    \ focus to the near chess pieces while blurring the far objects. Also, I wanted\
    \ to apply darker edges to the photo to focus on the main objects in the shot.\
    \ Find a similar photo to follow along with the example.\n\n### Step 1: Protect\
    \ the Main Objects\n\nBefore applying the blur effect, you should protect the\
    \ main objects in the shot to keep them sharp. You can use a mask effect as follows:\n\
    \n1.  Open a photo in the Tadaa app, and tap the Blur icon in the bottom toolbar.\
    \  \n2.  Tap the Edit Mask icon at the top.  \n3.  Zoom in the objects and start\
    \ to paint a mask over them. Here, I painted the pieces near the camera (see Figure\
    \ [3-12](#A450041_1_En_3_Chapter.html#Fig12)).  \n4.  Tap the Apply icon at the\
    \ top right.\n\n    ![A450041_1_En_3_Fig12_HTML.jpg](A450041_1_En_3_Fig12_HTML.jpg)\n\
    \n    Figure 3-12\n\n    Applying a mask over the elements near the camera\n\n\
    ### Step 2: Apply the Blur Effect\n\nNow, I will apply the blur effect to the\
    \ far o bjects in the shot. You can follow along with your own photo.\n\n1.  Tap\
    \ the Blur icon. You may need to drag the toolbar right or left to reveal the\
    \ rest of the tools (see Figure [3-13](#A450041_1_En_3_Chapter.html#Fig13)).\n\
    \n    ![A450041_1_En_3_Fig13_HTML.jpg](A450041_1_En_3_Fig13_HTML.jpg)\n\n    Figure\
    \ 3-13\n\n    Drag the toolbar to reveal the Blur icon  \n2.  Set the blur type\
    \ to Circular.  \n3.  Drag with your fingers to resize and position the protected\
    \ area above the near objects in the photo.  \n4.  Drag the Blur slider to increase\
    \ the blur effect on the far objects. The amount of blur varies based on visual\
    \ distance between the near objects and the far objects.  \n5.  Reduce the Range\
    \ value to start the blur effect from a proper distance from the in-focus objects\
    \ (see Figure [3-14](#A450041_1_En_3_Chapter.html#Fig14)).\n\n    ![A450041_1_En_3_Fig14_HTML.jpg](A450041_1_En_3_Fig14_HTML.jpg)\n\
    \n    Figure 3-14\n\n    Apply the blur effect on the far objects in the photo\
    \  \n6.  Tap the Apply icon.\n\n### Step 3: Apply the Vignette Effect\n\nNow,\
    \ you will darken the edges of the phot o to focus on the main object s as follows:\n\
    \n1.  Tap the Vignette icon in the bottom toolbar.  \n2.  Drag Intensity to the\
    \ left side to create a proper frame around the photo.  \n3.  Drag the Range slider\
    \ to a middle point (see Figure [3-15](#A450041_1_En_3_Chapter.html#Fig15)).  \n\
    4.  Tap the Apply icon at the top right.\n\n    ![A450041_1_En_3_Fig15_HTML.jpg](A450041_1_En_3_Fig15_HTML.jpg)\n\
    \n    Figure 3-15\n\n    Applying the vignette effect\n\n### Step 4: Apply a Final\
    \ Filter\n\nAfte r adding the vignette effect, you will add a filter to the photo\
    \ to give it a dramatic mono color effect, as follows:\n\n1.  Tap the Filter icon,\
    \ and choose Charleston filter.  \n2.  Drag the slider under the filter a middle\
    \ point to soften the effect of the filter (see Figure [3-16](#A450041_1_En_3_Chapter.html#Fig16)).\
    \  \n3.  Tap the App icon, and tap the Share icon to save the photo to your Camera\
    \ Roll.\n\n    ![A450041_1_En_3_Fig16_HTML.jpg](A450041_1_En_3_Fig16_HTML.jpg)\n\
    \n    Figure 3-16\n\n    Applying the vignette effect\n\n## Creating a Low-Light\
    \ Black-and-White Photo\n\nTools: Adobe Lightroom app, Adobe Photoshop Mix\n\n\
    Figure [3-17](#A450041_1_En_3_Chapter.html#Fig17) shows the original photo I used\
    \ for this example. Choose a similar photo to follow along with the example.\n\
    \n![A450041_1_En_3_Fig17_HTML.jpg](A450041_1_En_3_Fig17_HTML.jpg)\n\nFigure 3-17\n\
    \nThe original photo (© Radwa Khalil)\n\nFigure [3-18](#A450041_1_En_3_Chapter.html#Fig18)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig18_HTML.jpg](A450041_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18\n\nThe final result\n\nA low-light effect allows you to create a\
    \ dramatic effect on a photo by having viewers focus on the lit part of the photo.\
    \ Usually, it works well with portrait photography as it emphasizes the facial\
    \ expressions. To ensure high contrast in a low-light photo, you need to consider\
    \ the following tips:\n\n*   Take your photo against a dark background, such as\
    \ solid black. You can use a black wall or paper in the background of your object.\n\
    *   Limit the number of objects in the photo to one object or person to ensure\
    \ precise focus and the ability to control the photo’s light and dark areas while\
    \ editing.\n*   Try to use a soft low-light source facing the person or the object\
    \ in the shot.\n*   Try to use a tripod to ensure a steady shot with your iPhone.\n\
    \nIn the following example, the photo was taken with a soft light on a black background,\
    \ which makes it suitable for a low-light effect. I used Photoshop Mix to improve\
    \ the white areas using layers and blending modes."
  trans: "\n### 第 4 步：添加模糊效果\n\n除了暗角效果之外，你还需要添加一个模糊效果，以增强对照片中心的聚焦。请按照以下步骤操作：\n\n1.\
    \  在`滤镜`列表中，选择`镜头模糊`。增加模糊强度，例如设置为`+30`。\n2.  用双指拖拽，调整应用于照片的模糊区域的大小和形状。尽量让模糊只出现在边缘，使照片的中心点保持清晰。\n\
    3.  点击`应用`图标（见图 3-9）。\n   ![A450041_1_En_3_Fig9_HTML.jpg](img/A450041_1_En_3_Fig9_HTML.jpg)\n\
    \   图 3-9：应用模糊效果\n4.  点击`保存`以保存更改。然后选择保存副本以保留原始照片不变。保存照片后，您可以再次打开并编辑修改。如果选择`导出`，照片将被导出，但更改将无法编辑。\n\
    \n### 创建浅景深\n\n使用的工具: `Tadaa`\n\n图 3-10 显示了本示例中使用的原始照片。\n![A450041_1_En_3_Fig10_HTML.jpg](img/A450041_1_En_3_Fig10_HTML.jpg)\n\
    图 3-10：原始图像（© Radwa Khalil）\n\n图 3-11 显示了最终结果。\n![A450041_1_En_3_Fig11_HTML.jpg](img/A450041_1_En_3_Fig11_HTML.jpg)\n\
    图 3-11：最终结果\n\n术语*景深*是指拍摄中的焦点范围。如果照片的清晰区域仅限于较近的物体，而较远的元素显得模糊，则称为**浅景深**。另一方面，如果清晰区域包含照片的大部分区域，则称为**深景深**。单反相机中的景深受相机光圈（`f-stop`）控制，这与镜头开口的直径有关，并表示为分数（`1/F`）。因此，如果镜头开口大，这个数值就会变小，从而导致浅景深。\n\
    \n在 iPhone 上，拍照时光圈的控制是有限的，因为你只能点击你想要聚焦的物体。有时你需要对拍摄的景深进行更多控制。在下面的示例中，照片已经拍好，但我后来决定调整景深。有许多应用程序可以帮助你手动在照片上应用浅景深，例如`Camera+`和`Tadaa`。\n\
    \n在下面的示例中，我想让更近的棋子更清晰，同时模糊远处的物体。另外，我还想给照片应用更暗的边缘，以聚焦拍摄中的主要物体。找一张类似的照片来跟随本示例操作。\n\
    \n### 第 1 步：保护主要物体\n\n在应用模糊效果之前，你应该保护拍摄中的主要物体，使其保持清晰。可以按如下方式使用蒙版效果：\n\n1.  在`Tadaa`应用中打开一张照片，点击底部工具栏中的`模糊`图标。\n\
    2.  点击顶部的`编辑蒙版`图标。\n3.  放大物体，并开始在上面绘制蒙版。在这里，我绘制了靠近相机的棋子（见图 3-12）。\n4.  点击右上角的`应用`图标。\n\
    \   ![A450041_1_En_3_Fig12_HTML.jpg](img/A450041_1_En_3_Fig12_HTML.jpg)\n   图\
    \ 3-12：在靠近相机的元素上应用蒙版\n\n### 第 2 步：应用模糊效果\n\n现在，对拍摄中远处的物体应用模糊效果。你可以用自己的照片跟随操作。\n\
    \n1.  点击`模糊`图标。您可能需要向左或向右拖拽工具栏以显示其余工具（见图 3-13）。\n   ![A450041_1_En_3_Fig13_HTML.jpg](img/A450041_1_En_3_Fig13_HTML.jpg)\n\
    \   图 3-13：拖拽工具栏以显示`模糊`图标\n2.  将模糊类型设置为`圆形`。\n3.  用手指拖拽以调整受保护区域的大小和位置，使其位于照片中近处物体的上方。\n\
    4.  拖拽`模糊`滑块以增加远处物体的模糊效果。模糊程度取决于近处物体与远处物体之间的视觉距离。\n5.  减小`范围`值，以使模糊效果从距清晰物体适当距离处开始（见图\
    \ 3-14）。\n   ![A450041_1_En_3_Fig14_HTML.jpg](img/A450041_1_En_3_Fig14_HTML.jpg)\n\
    \   图 3-14：对照片中的远处物体应用模糊效果\n6.  点击`应用`图标。\n\n### 第 3 步：应用暗角效果\n\n现在，按如下方式使照片边缘变暗以聚焦主要物体：\n\
    \n1.  点击底部工具栏中的`暗角`图标。\n2.  将`强度`拖向左侧，以在照片周围创建合适的边框。\n3.  将`范围`滑块拖到中间点（见图 3-15）。\n\
    4.  点击右上角的`应用`图标。\n   ![A450041_1_En_3_Fig15_HTML.jpg](img/A450041_1_En_3_Fig15_HTML.jpg)\n\
    \   图 3-15：应用暗角效果\n\n### 第 4 步：应用最终滤镜\n\n添加暗角效果后，为照片添加一个滤镜，使其呈现戏剧性的单色效果，步骤如下：\n\
    \n1.  点击`滤镜`图标，选择`查尔斯顿`滤镜。\n2.  将滤镜下方的滑块拖到中间点，以柔化滤镜效果（见图 3-16）。\n3.  点击`应用`图标，然后点击`共享`图标将照片保存到你的`相机胶卷`。\n\
    \   ![A450041_1_En_3_Fig16_HTML.jpg](img/A450041_1_En_3_Fig16_HTML.jpg)\n   图\
    \ 3-16：应用滤镜效果\n\n### 创建弱光黑白照片\n\n工具：`Adobe Lightroom` 应用, `Adobe Photoshop Mix`\n\
    \n图 3-17 显示了本示例中使用的原始照片。选择一张类似的照片来跟随本示例操作。\n![A450041_1_En_3_Fig17_HTML.jpg](img/A450041_1_En_3_Fig17_HTML.jpg)\n\
    图 3-17：原始照片（© Radwa Khalil）\n\n图 3-18 显示了最终结果。\n![A450041_1_En_3_Fig18_HTML.jpg](img/A450041_1_En_3_Fig18_HTML.jpg)\n\
    图 3-18：最终结果\n\n弱光效果让你可以通过让观看者聚焦于照片中被照亮的部分来创造戏剧性的效果。通常，它在人像摄影中效果很好，因为它能强调面部表情。为了确保弱光照片的高对比度，请考虑以下提示：\n\
    \n-   在深色背景下拍照，例如纯黑色。你可以在拍摄对象的背景中使用黑色墙壁或纸张。\n-   将照片中的物体数量限制为一个物体或一个人，以确保精确对焦，并在编辑时能够控制照片的亮部和暗部区域。\n\
    -   尽量使用柔和的弱光源，使其朝向拍摄中的人物或物体。\n-   尽量使用三脚架，以确保用 iPhone 拍摄时画面稳定。\n\n在下面的示例中，照片是在黑色背景下使用柔和光线拍摄的，这使其适合制作弱光效果。我使用`Photoshop\
    \ Mix`通过图层和混合模式来改善白色区域。\n"
- fmt: "### Step 1: Convert a Photo to Black and White\n\nFirst, bring a photo to\
    \ the Lightroom app to convert it to black and white and then adjust the overall\
    \ exposure, contrast, light, and shadows.\n\n1. Open a photo in the Adobe Lightroom\
    \ app.\n2. Tap the `Color` icon. Tap the `B&W` icon on the top left of the menu.\
    \ This will convert the image to black and white.\n3. Set the temperature to `+40`\
    \ and the tint to `+45` (see Figure [3-19](#A450041_1_En_3_Chapter.html#Fig19)).\n\
    \n   ![A450041_1_En_3_Fig19_HTML.jpg](A450041_1_En_3_Fig19_HTML.jpg)\n\n   **Figure\
    \ 3-19** Convert the photo to black and white and increase the Temperature and\
    \ Tint settings\n\n4. Tap the `Light` icon, and set `Exposure` to `-1`, `Contrast`\
    \ to `+100`, `Highlight` to `+5`, `Shadows` to `-85`, `Whites` to `+55`, and `Blacks`\
    \ to `-55` (Figure [3-20](#A450041_1_En_3_Chapter.html#Fig20)).\n\n   ![A450041_1_En_3_Fig20_HTML.jpg](A450041_1_En_3_Fig20_HTML.jpg)\n\
    \n   **Figure 3-20** Adjusting the light settings to create a more dramatic light\n\
    \n5. Tap the `Effects` icon and set `Clarity` to `-45` to create a smooth effect\
    \ on the face details.\n6. Set `Vignette Amount` to `-50` to increase the black\
    \ around the edges of the shot (see Figure [3-21](#A450041_1_En_3_Chapter.html#Fig21)).\n\
    \n   ![A450041_1_En_3_Fig21_HTML.jpg](A450041_1_En_3_Fig21_HTML.jpg)\n\n   **Figure\
    \ 3-21** Reducing the clarity to create a soft effect and apply a vignette effect\
    \ on the edges\n\n### Step 2: Focus on the Face\n\nYou can use the selective adjustment\
    \ to modify parts of the photo without affecting the face. Follow these steps:\n\
    \n1. Tap the `Selective` icon to apply a partial adjustment to the right side\
    \ of the photo.\n2. Tap the `Linear mask` icon from the tools on the left, and\
    \ drag to create a mask that goes from the right to the left of the photo and\
    \ ends at the beginning of the face (see Figure [3-22](#A450041_1_En_3_Chapter.html#Fig22)).\n\
    \n   ![A450041_1_En_3_Fig22_HTML.jpg](A450041_1_En_3_Fig22_HTML.jpg)\n\n   **Figure\
    \ 3-22** Applying selective adjustment to the right part of the shot\n\n3. Tap\
    \ the `Brightness` icon, and set the exposure to `-1.60` to reduce the destruction\
    \ on the left side of the face (see Figure [3-23](#A450041_1_En_3_Chapter.html#Fig23)).\n\
    4. Tap the `Apply` icon on the bottom right.\n5. Tap the `Share` icon, and tap\
    \ `Save to Camera Roll`.\n6. Set the quality to the maximum available.\n\n   ![A450041_1_En_3_Fig23_HTML.jpg](A450041_1_En_3_Fig23_HTML.jpg)\n\
    \n   **Figure 3-23** Reduce the exposure on the right part of the image\n\n###\
    \ Step 3: Improve Highlights\n\nYou might want to improve the highlighted part\
    \ of the photo to increase its emphasis on the face. To do so, you can use Photoshop\
    \ Mix to set the blending modes, as follows:\n\n1. Tap the `plus` icon in Photoshop\
    \ Mix. Choose `Image`, and navigate to the `Camera Roll` for the photo you just\
    \ saved.\n2. Tap once on the layer on the left to open its `Properties` panel.\
    \ If you can't see the layers, tap the top-right icon to display the app tools.\n\
    3. Tap the `Blend` icon, and set the blending mode to `Screen`. Tap the `Apply`\
    \ icon.\n4. Tap the `Looks` icon to apply a filter. Choose `Portrait`, and tap\
    \ the `Apply` icon.\n\n## Creating High-Key Photos\n\nTools: Adobe Lightroom app,\
    \ Photoshop Mix app, Blur app\n\nFigure [3-24](#A450041_1_En_3_Chapter.html#Fig24)\
    \ shows my original photo.\n\n![A450041_1_En_3_Fig24_HTML.jpg](A450041_1_En_3_Fig24_HTML.jpg)\n\
    \n**Figure 3-24** Original photo (© Radwa Khalil)\n\nFigure [3-25](#A450041_1_En_3_Chapter.html#Fig25)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig25_HTML.jpg](A450041_1_En_3_Fig25_HTML.jpg)\n\
    \n**Figure 3-25** Final result\n\nIn contrast to low-light photos, high-key photos\
    \ reduce the lighting ratio and contrast level in a photo to create more natural\
    \ lighting. The technology was originally developed for screens that couldn't\
    \ display contrast ratios, but now it is used to create a minimal and stylish\
    \ effect on photos.\n\nTo take a good high-key photo, the shot should include\
    \ a minimal number of objects so you can easily modify them using different applications.\
    \ Try to take the shot in natural surroundings with a bright background in order\
    \ to minimize the shadows in the photo.\n\n### Step 1: Convert to Black and White\n\
    \nFirst you can use the Lightroom app to convert your photo to black and white\
    \ and increase the whites in the shot using curves.\n\n1. Open the image in the\
    \ Lightroom app. Tap the `Color` icon. Then, tap the `B&W` icon to convert the\
    \ photo to black and white. Drag the `Temperature` slider to the right (see Figure\
    \ [3-26](#A450041_1_En_3_Chapter.html#Fig26)).\n\n   ![A450041_1_En_3_Fig26_HTML.jpg](A450041_1_En_3_Fig26_HTML.jpg)\n\
    \n   **Figure 3-26** Converting the photo to black and white\n\n2. Tap the `Light`\
    \ icon. Tap the `Curves` icon to set up the curve to increase the light areas\
    \ and increase the intensity of the blacks, keeping a smooth transition between\
    \ them. Then tap `Done` (see Figure [3-27](#A450041_1_En_3_Chapter.html#Fig27)).\n\
    \n   ![A450041_1_En_3_Fig27_HTML.jpg](A450041_1_En_3_Fig27_HTML.jpg)\n\n   **Figure\
    \ 3-27** Using the Curves tool to increase the contrast in the photo\n\n3. Drag\
    \ the `Highlight` slider to the far right. Increase the shadows, whites, and blacks\
    \ a little (Figure [3-28](#A450041_1_En_3_Chapter.html#Fig28)).\n\n   ![A450041_1_En_3_Fig28_HTML.jpg](A450041_1_En_3_Fig28_HTML.jpg)\n\
    \n   **Figure 3-28** Increasing the Highlights, Shadows, Whites, and Blacks settings\
    \ in the photo\n\n4. Tap the `Effects` icon, and reduce `Clarity` to `-65` to\
    \ create smooth edges on the photo (see Figure [3-29](#A450041_1_En_3_Chapter.html#Fig29)).\n\
    \n   ![A450041_1_En_3_Fig29_HTML.jpg](A450041_1_En_3_Fig29_HTML.jpg)\n\n   **Figure\
    \ 3-29** Reduce Clarity to create a smooth effect\n\n5. Tap the `Share` icon,\
    \ and save the image to your `Camera Roll`.\n\n### Step 2: Create a Blurred Version\n\
    \nTo add a soft effect over the photo, you can create a blurred version of the\
    \ photo you just modified. Follow these steps:\n\n1. Open the image in the Blur\
    \ app. Tap the `Adjust` icon on the right of the toolbar. Set a low value, for\
    \ example, `10`.\n2. Tap the `Blur` icon, and paint the light areas in the photo\
    \ (see Figure [3-30](#A450041_1_En_3_Chapter.html#Fig30)).\n3. Tap the `Save`\
    \ icon, and save the photo to your `Camera Roll`.\n\n   ![A450041_1_En_3_Fig30_HTML.jpg](A450041_1_En_3_Fig30_HTML.jpg)\n\
    \n   **Figure 3-30** Draw with the Blur app brush to increase the blur effect\
    \ on the photo\n\n### Step 3: Finalize the High-Key Photo\n\nYou can now add both\
    \ photos in Photoshop Mix and use the layer opacity and blending modes to blend\
    \ between the sharp and blurred versions of the photo. Follow these steps:\n\n\
    1. Open the Photoshop Mix app. Tap the `plus` icon on the top right to create\
    \ a project. Add the first image from the `Camera Roll`.\n2. Tap the `plus` icon\
    \ to add a new layer. Choose to add an image and navigate to the blurred photo\
    \ to add it (see Figure [3-31](#A450041_1_En_3_Chapter.html#Fig31)).\n\n   ![A450041_1_En_3_Fig31_HTML.jpg](A450041_1_En_3_Fig31_HTML.jpg)\n\
    \n   **Figure 3-31** Adding the blur version of the photo to the first one\n\n\
    3. Double-tap the top layer to open its properties. Set `Opacity` to `65%`, and\
    \ set the blending mode to `Overlay` (see Figure [3-32](#A450041_1_En_3_Chapter.html#Fig32)).\n\
    4. Tap the `Share` icon, and save the photo.\n\n   ![A450041_1_En_3_Fig32_HTML.jpg](A450041_1_En_3_Fig32_HTML.jpg)\n\
    \n   **Figure 3-32** Changing the opacity and blending mode for the blurred layer"
  raw: "### Step 1: Convert a Photo to Black and White\n\nFirst, bring a photo to\
    \ the Lightroom app to convert it to black and white and then adjust the overall\
    \ exposure, contrast, light, and shadows.\n\n1.  Open a photo in the Adobe Lightroom\
    \ app.  \n2.  Tap the Color icon. Tap the B&W icon on the top left of the menu.\
    \ This will convert the image to black and white.  \n3.  Set the temperature to\
    \ +40 and the tint to +45 (see Figure [3-19](#A450041_1_En_3_Chapter.html#Fig19)).\n\
    \n    ![A450041_1_En_3_Fig19_HTML.jpg](A450041_1_En_3_Fig19_HTML.jpg)\n\n    Figure\
    \ 3-19\n\n    Convert the photo to black and white and increase the Temperature\
    \ and Tint settings  \n4.  Tap the Light icon, and set Exposure to -1, Contrast\
    \ to +100, Highlight to +5, Shadows to -85, Whites to +55, and Blacks to -55 (Figure\
    \ [3-20](#A450041_1_En_3_Chapter.html#Fig20)).\n\n    ![A450041_1_En_3_Fig20_HTML.jpg](A450041_1_En_3_Fig20_HTML.jpg)\n\
    \n    Figure 3-20\n\n    Adjusting the light settings to create a more dramatic\
    \ light  \n5.  Tap the Effects icon and set Clarity to -45 to create a smooth\
    \ effect on the face details.  \n6.  Set Vignette Amount to -50 to increase the\
    \ black around the edges of the shot (see Figure [3-21](#A450041_1_En_3_Chapter.html#Fig21)).\n\
    \n    ![A450041_1_En_3_Fig21_HTML.jpg](A450041_1_En_3_Fig21_HTML.jpg)\n\n    Figure\
    \ 3-21\n\n    Reducing the clarity to create a soft effect and apply a vignette\
    \ effect on the edges\n\n### Step 2: Focus on the Face\n\nYou can use the selective\
    \ adjustment t o modify parts of the photo without affecting the face. Follow\
    \ these steps:\n\n1.  Tap the Selective icon to apply a partial adjustment to\
    \ the right side of the photo.  \n2.  Tap the Linear mask icon from the tools\
    \ on the left, and drag to create a mask that goes from the right to the left\
    \ of the photo and ends at the beginning of the face (see Figure [3-22](#A450041_1_En_3_Chapter.html#Fig22)).\n\
    \n    ![A450041_1_En_3_Fig22_HTML.jpg](A450041_1_En_3_Fig22_HTML.jpg)\n\n    Figure\
    \ 3-22\n\n    Applying selective adjustment to the right part of the shot  \n\
    3.  Tap the Brightness icon, and set the exposure to -1.60 to reduce the destruction\
    \ on the left side of the face (see Figure [3-23](#A450041_1_En_3_Chapter.html#Fig23)).\
    \  \n4.  Tap the Apply icon on the bottom right.  \n5.  Tap the Share icon, and\
    \ tap Save to Camera Roll.  \n6.  Set the quality to the maximum available.\n\n\
    \    ![A450041_1_En_3_Fig23_HTML.jpg](A450041_1_En_3_Fig23_HTML.jpg)\n\n    Figure\
    \ 3-23\n\n    Reduce the exposure on the right part of the image\n\n### Step 3:\
    \ Improve Highlights\n\nYou might want to improve the highlighted part of the\
    \ photo to increase its emphasis on the face. To do so, you can use Photoshop\
    \ Mix to set the blending modes, as follows:\n\n1.  Tap the plus icon in Photoshop\
    \ Mix. Choose Image, and navigate to the Camera Roll for the photo you just saved.\
    \  \n2.  Tap once on the layer on the left to open its Properties panel. If you\
    \ can’t see the layers, tap the top-right icon to display the app tools.  \n3.\
    \  Tap the Blend icon, and set the blending mode to Screen. Tap the Apply icon.\
    \  \n4.  Tap the Looks icon to apply a filter. Choose Portrait, and tap the Apply\
    \ icon.\n\n## Creating High-Key Photos\n\nTools: Adobe Lightr oom app, Photoshop\
    \ Mix app , Blur app\n\nFigure [3-24](#A450041_1_En_3_Chapter.html#Fig24) sh ows\
    \ my original photo.\n\n![A450041_1_En_3_Fig24_HTML.jpg](A450041_1_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24\n\nOriginal photo (© Radwa Khalil)\n\nFigure [3-25](#A450041_1_En_3_Chapter.html#Fig25)\
    \ shows my final result.\n\n![A450041_1_En_3_Fig25_HTML.jpg](A450041_1_En_3_Fig25_HTML.jpg)\n\
    \nFigure 3-25\n\nFinal result\n\nIn contrast to low-light photos, high-key photos\
    \ reduce the lighting ratio and contrast level in a photo to create more natural\
    \ lighting. The technology was originally developed for screens that couldn’t\
    \ display contrast ratios, but now it is used to create a minimal and stylish\
    \ effect on photos.\n\nTo take a good high-key photo, the shot should include\
    \ a minimal number of objects so you can easily modify them using different applications.\
    \ Try to take the shot in natural surroundings with a bright background in order\
    \ to minimize the shadows in the photo.\n\n### Step 1: Convert to Black and White\n\
    \nFirst you can use the Lightroom app to convert your photo to black and white\
    \ and increase the whites in the shot using curves.\n\n1.  Open the image in the\
    \ Lightroom app. Tap the Color icon. Then, tap the B&W icon to convert the photo\
    \ to black and white. Drag the Temperature slider to the right (see Figure [3-26](#A450041_1_En_3_Chapter.html#Fig26)).\n\
    \n    ![A450041_1_En_3_Fig26_HTML.jpg](A450041_1_En_3_Fig26_HTML.jpg)\n\n    Figure\
    \ 3-26\n\n    Converting the photo to black and white  \n2.  Tap the Light icon.\
    \ Tap the Curves icon to set up the curve to increase the light areas and increase\
    \ the intensity of the blacks, keeping a smooth transition between them. Then\
    \ tap Done (see Figure [3-27](#A450041_1_En_3_Chapter.html#Fig27)).\n\n    ![A450041_1_En_3_Fig27_HTML.jpg](A450041_1_En_3_Fig27_HTML.jpg)\n\
    \n    Figure 3-27\n\n    Using the Curves tool to increase the contrast in the\
    \ photo  \n3.  Drag the Highlight slider to the far right. Increase the shadows,\
    \ whites, and blacks a little (Figure [3-28](#A450041_1_En_3_Chapter.html#Fig28)).\n\
    \n    ![A450041_1_En_3_Fig28_HTML.jpg](A450041_1_En_3_Fig28_HTML.jpg)\n\n    Figure\
    \ 3-28\n\n    Increasing the Highlights, Shadows, Whites, and Blacks settings\
    \ in the photo  \n4.  Tap the Effects icon, and reduce Clarity to -65 to create\
    \ smooth edges on the photo (see Figure [3-29](#A450041_1_En_3_Chapter.html#Fig29)).\n\
    \n    ![A450041_1_En_3_Fig29_HTML.jpg](A450041_1_En_3_Fig29_HTML.jpg)\n\n    Figure\
    \ 3-29\n\n    Reduce Clarity to create a smooth effect  \n5.  Tap the Share icon,\
    \ and save the image to your Camera Roll.\n\n### Step 2: Create a Blurred Version\n\
    \nTo add a soft effect over the photo, you can create a blurred version of the\
    \ photo you just modified. Follow these steps:\n\n1.  Open the image in the Blur\
    \ app. Tap the Adjust icon on the right of the toolbar. Set a low value, for example,\
    \ 10.  \n2.  Tap the Blur icon, and paint the light areas in the photo (see Figure\
    \ [3-30](#A450041_1_En_3_Chapter.html#Fig30)).  \n3.  Tap the Save icon, and save\
    \ the photo to your Camera Roll.\n\n    ![A450041_1_En_3_Fig30_HTML.jpg](A450041_1_En_3_Fig30_HTML.jpg)\n\
    \n    Figure 3-30\n\n    Draw with the Blur app brush to increase the blur effect\
    \ on the photo\n\n### Step 3: Finalize the High-Key Photo\n\nYou can now add both\
    \ photos in Photoshop Mix and use the layer opacity and blending modes to blend\
    \ between the sharp and blurred versions of the photo. Follow these steps:\n\n\
    1.  Open the Photoshop Mix app. Tap the plus icon on the top right to create a\
    \ project. Add the first image from the Camera Roll.  \n2.  Tap the plus icon\
    \ to add a new layer. Choose to add an image and navigate to the blurred photo\
    \ to add it (see Figure [3-31](#A450041_1_En_3_Chapter.html#Fig31)).\n\n    ![A450041_1_En_3_Fig31_HTML.jpg](A450041_1_En_3_Fig31_HTML.jpg)\n\
    \n    Figure 3-31\n\n    Adding the blur version of the photo to the first one\
    \  \n3.  Double-tap the top layer to open its properties. Set Opacity to 65%,\
    \ and set the blending mode to Overlay (see Figure [3-32](#A450041_1_En_3_Chapter.html#Fig32)).\
    \  \n4.  Tap the Share icon, and save the photo.\n\n    ![A450041_1_En_3_Fig32_HTML.jpg](A450041_1_En_3_Fig32_HTML.jpg)\n\
    \n    Figure 3-32\n\n    Changing the opacity and blending mode for the blurred\
    \ layer"
  trans: "\n### 步骤 1：将照片转换为黑白\n\n首先，将照片导入 Lightroom 应用中，将其转换为黑白，然后调整整体的曝光度、对比度、光线和阴影。\n\
    \n1. 在 Adobe Lightroom 应用中打开一张照片。\n2. 点击 `颜色` 图标。点击菜单左上角的 `黑白` 图标。这会将图像转换为黑白。\n\
    3. 将色温设置为 `+40`，色调设置为 `+45`（见图 3-19）。\n\n   ![A450041_1_En_3_Fig19_HTML.jpg](img/A450041_1_En_3_Fig19_HTML.jpg)\n\
    \n   **图 3-19** 将照片转换为黑白，并提高色温和色调设置\n\n4. 点击 `光线` 图标，然后将 `曝光度` 设置为 `-1`， `对比度`\
    \ 设置为 `+100`， `高光` 设置为 `+5`， `阴影` 设置为 `-85`， `白色色阶` 设置为 `+55`， `黑色色阶` 设置为 `-55`（图\
    \ 3-20）。\n\n   ![A450041_1_En_3_Fig20_HTML.jpg](img/A450041_1_En_3_Fig20_HTML.jpg)\n\
    \n   **图 3-20** 调整光线设置以营造更具戏剧性的光影效果\n\n5. 点击 `效果` 图标，将 `清晰度` 设置为 `-45`，以在面部细节上产生平滑效果。\n\
    6. 将 `暗角数量` 设置为 `-50`，以增加拍摄对象边缘周围的黑色（见图 3-21）。\n\n   ![A450041_1_En_3_Fig21_HTML.jpg](img/A450041_1_En_3_Fig21_HTML.jpg)\n\
    \n   **图 3-21** 降低清晰度以创造柔和效果，并在边缘应用暗角效果\n\n### 步骤 2：聚焦于面部\n\n你可以使用选择性调整来修改照片的某些部分，而不会影响面部。请按照以下步骤操作：\n\
    \n1. 点击 `选择性` 图标，对照片的右侧进行局部调整。\n2. 从左侧工具中点击 `线性渐变` 图标，拖动创建一个从照片右侧到左侧、在面部起始处结束的蒙版（见图\
    \ 3-22）。\n\n   ![A450041_1_En_3_Fig22_HTML.jpg](img/A450041_1_En_3_Fig22_HTML.jpg)\n\
    \n   **图 3-22** 对照片的右侧部分应用选择性调整\n\n3. 点击 `亮度` 图标，将曝光度设置为 `-1.60`，以减少对左侧面部的破坏（见图\
    \ 3-23）。\n4. 点击右下角的 `应用` 图标。\n5. 点击 `分享` 图标，然后点击 `存储到相机胶卷`。\n6. 将质量设置为最高可用选项。\n\
    \n   ![A450041_1_En_3_Fig23_HTML.jpg](img/A450041_1_En_3_Fig23_HTML.jpg)\n\n \
    \  **图 3-23** 降低图像右侧部分的曝光度\n\n### 步骤 3：改善高光\n\n你可能希望增强照片中的高光部分，以增加对面部的强调效果。为此，你可以使用\
    \ Photoshop Mix 来设置混合模式，如下所示：\n\n1. 在 Photoshop Mix 中点击 `+` 图标。选择 `图像`，然后导航到 `相机胶卷`\
    \ 找到你刚刚保存的照片。\n2. 双击左侧的图层以打开其 `属性` 面板。如果看不到图层，请点击右上角的图标以显示应用工具。\n3. 点击 `混合` 图标，将混合模式设置为\
    \ `滤色`。点击 `应用` 图标。\n4. 点击 `外观` 图标以应用滤镜。选择 `肖像`，然后点击 `应用` 图标。\n\n## 创建高调照片\n\n\
    工具： Adobe Lightroom 应用、Photoshop Mix 应用、Blur 应用\n\n图 3-24 显示了我的原始照片。\n\n![A450041_1_En_3_Fig24_HTML.jpg](img/A450041_1_En_3_Fig24_HTML.jpg)\n\
    \n**图 3-24** 原始照片（© Radwa Khalil）\n\n图 3-25 显示了我的最终结果。\n\n![A450041_1_En_3_Fig25_HTML.jpg](img/A450041_1_En_3_Fig25_HTML.jpg)\n\
    \n**图 3-25** 最终结果\n\n与低调照片相比，高调照片降低了照片中的照明比率和对比度水平，以创造更自然的光线。该技术最初是为无法显示对比度范围的屏幕开发的，但现在被用来在照片上创造出简约时尚的效果。\n\
    \n要拍出好的高调照片，画面中的物体数量应尽量少，以便你可以使用不同的应用程序轻松修改它们。尽量在自然环境中、背景明亮处拍摄，以尽量减少照片中的阴影。\n\n\
    ### 步骤 1：转换为黑白\n\n首先，你可以使用 Lightroom 应用将照片转换为黑白，并使用曲线增加画面中的白色区域。\n\n1. 在 Lightroom\
    \ 应用中打开图像。点击 `颜色` 图标。然后，点击 `黑白` 图标将照片转换为黑白。将 `色温` 滑块向右拖动（见图 3-26）。\n\n   ![A450041_1_En_3_Fig26_HTML.jpg](img/A450041_1_En_3_Fig26_HTML.jpg)\n\
    \n   **图 3-26** 将照片转换为黑白\n\n2. 点击 `光线` 图标。点击 `曲线` 图标来设置曲线，增加明亮区域并增强黑色的强度，同时保持两者之间的平滑过渡。然后点击\
    \ `完成`（见图 3-27）。\n\n   ![A450041_1_En_3_Fig27_HTML.jpg](img/A450041_1_En_3_Fig27_HTML.jpg)\n\
    \n   **图 3-27** 使用曲线工具增加照片的对比度\n\n3. 将 `高光` 滑块拖到最右边。稍微增加阴影、白色色阶和黑色色阶（图 3-28）。\n\
    \n   ![A450041_1_En_3_Fig28_HTML.jpg](img/A450041_1_En_3_Fig28_HTML.jpg)\n\n \
    \  **图 3-28** 增加照片中的高光、阴影、白色色阶和黑色色阶设置\n\n4. 点击 `效果` 图标，将 `清晰度` 降低到 `-65`，以在照片上创建平滑的边缘（见图\
    \ 3-29）。\n\n   ![A450041_1_En_3_Fig29_HTML.jpg](img/A450041_1_En_3_Fig29_HTML.jpg)\n\
    \n   **图 3-29** 降低清晰度以创造平滑效果\n\n5. 点击 `分享` 图标，然后将图像保存到你的 `相机胶卷`。\n\n### 步骤 2：创建模糊版本\n\
    \n为了给照片添加柔和效果，你可以为你刚刚修改过的照片创建一个模糊版本。请按照以下步骤操作：\n\n1. 在 Blur 应用中打开图像。点击工具栏右侧的 `调整`\
    \ 图标。设置一个低值，例如 `10`。\n2. 点击 `模糊` 图标，涂抹照片中的明亮区域（见图 3-30）。\n3. 点击 `保存` 图标，将照片保存到你的\
    \ `相机胶卷`。\n\n   ![A450041_1_En_3_Fig30_HTML.jpg](img/A450041_1_En_3_Fig30_HTML.jpg)\n\
    \n   **图 3-30** 使用 Blur 应用画笔涂抹，以增强照片的模糊效果\n\n### 步骤 3：完成高调照片\n\n现在，你可以在 Photoshop\
    \ Mix 中添加这两张照片，并使用图层不透明度和混合模式来混合照片的清晰版和模糊版。请按照以下步骤操作：\n\n1. 打开 Photoshop Mix 应用。点击右上角的\
    \ `+` 图标来创建一个项目。从 `相机胶卷` 中添加第一张图像。\n2. 点击 `+` 图标添加一个新图层。选择添加图像，然后导航到模糊照片并将其添加进去（见图\
    \ 3-31）。\n\n   ![A450041_1_En_3_Fig31_HTML.jpg](img/A450041_1_En_3_Fig31_HTML.jpg)\n\
    \n   **图 3-31** 将照片的模糊版本添加到第一张照片上\n\n3. 双击顶部图层以打开其属性。将 `不透明度` 设置为 `65%`，并将混合模式设置为\
    \ `叠加`（见图 3-32）。\n4. 点击 `分享` 图标，保存照片。\n\n   ![A450041_1_En_3_Fig32_HTML.jpg](img/A450041_1_En_3_Fig32_HTML.jpg)\n\
    \n   **图 3-32** 更改模糊图层的不透明度和混合模式\n"
- fmt: '# Creating Double-Exposure Photos


    Tools used: `Pic Blender`


    Figure [3-33](#A450041_1_En_3_Chapter.html#Fig33) shows my original photo.


    ![A450041_1_En_3_Fig33_HTML.jpg](A450041_1_En_3_Fig33_HTML.jpg)


    Figure 3-33 - Original photo (© Radwa Khalil)


    Figure [3-34](#A450041_1_En_3_Chapter.html#Fig34) shows my final result.


    ![A450041_1_En_3_Fig34_HTML.jpg](A450041_1_En_3_Fig34_HTML.jpg)


    Figure 3-34 - Final result


    The double exposure, also known as multiple exposures, effect allows you to combine
    two or more photos into single manipulated one. It allows you to merge between
    the photos to display details from each one, using a photo to mask another one.
    Basically, the light and shadows in one image are used to display the details
    in the other image (or images). The technique has become popular in the last few
    years with the dramatic evolution of digital camera capabilities that allow photographers
    to create the double-exposure technique directly in their DSLR cameras.


    The double-exposure technique also can be created after the fact using photo-editing
    applications such as Adobe Photoshop, which creates very good results like the
    ones created through a camera. Furthermore, it gives you more control over the
    effects and style used in the final result.


    In addition, there are many iPhone apps that can help you take double-exposure
    photos such as `Union`, `MultiExpo`, `Superimpose`, `Pic Blender`, `Pixlr`, `Fused`,
    and `Snapseed`. In this tip, you will use the `Pic Blender` app to combine two
    photos to build the double-exposure effect. To create a good effect, make sure
    to select a base photo with contrasting colors and low details and pick a second
    one with details such as trees, buildings, and so on.


    ## Step 1: Prepare the Base Photo


    Before applying the double-exposure effect directly, you will adjust the photo
    to increase the contrast between the light and shadows in the photo.


    1. Open the `Pic Bender` app, and choose a high-contrasted photo as the base one.

    2. Tap the `Adjustment` icon and then tap the `Contrast` icon. Drag the slider
    to the right to increase it. This will increase the shadows and light areas in
    the photo and reduce the midtones (see Figure [3-35](#A450041_1_En_3_Chapter.html#Fig35)).


    ![A450041_1_En_3_Fig35_HTML.jpg](A450041_1_En_3_Fig35_HTML.jpg)


    Figure 3-35 - Adjusting the contrast of the black-and-white photo


    ## Step 2: Combine Photos


    Now, you will use one of the photos in the app as a second image to blend with
    the base one. Then, you will modify the second image to fit with the original
    one.


    1. Tap the `Photos` icon on the left of the toolbar to add the second photo.

    2. You can tap the `Camera` icon to take a photo or use one from your existing
    photos. Navigate to a tree photo, and choose a third one (see Figure [3-36](#A450041_1_En_3_Chapter.html#Fig36)).


    ![A450041_1_En_3_Fig36_HTML.jpg](A450041_1_En_3_Fig36_HTML.jpg)


    Figure 3-36 - Selecting a tree photo as the second photo to blend with the original

    3. With your two fingers, flip your tree photo and enlarge it to fill the canvas.

    4. Set the blending mode to `Screen`. Drag the slider to the far right (see Figure
    [3-37](#A450041_1_En_3_Chapter.html#Fig37)).

    5. Tap the `Apply` icon.


    ![A450041_1_En_3_Fig37_HTML.jpg](A450041_1_En_3_Fig37_HTML.jpg)


    Figure 3-37 - Applying the blending mode to the tree photo


    ## Step 3: Enhance the Double-Exposure Effect


    After applying the double-exposure effect, you will apply a bokeh effect over
    the photo to add an artistic feel to the shot.


    1. Tap the `Effects` icon. Choose the fourth image called `Bokeh`.

    2. Set the blending to `Screen`, and drag the slider a little to the left to increase
    the image transparency (see Figure [3-38](#A450041_1_En_3_Chapter.html#Fig38)).


    ![A450041_1_En_3_Fig38_HTML.jpg](A450041_1_En_3_Fig38_HTML.jpg)


    Figure 3-38 - Adding the bokeh effect to the photo

    3. Tap the `Apply` icon.

    4. Tap the `Filters` icon, tap the `Film Light` icon, and choose the first effect.

    5. Drag the slider to the left to reduce the effect a little (see Figure [3-39](#A450041_1_En_3_Chapter.html#Fig39)).

    6. Tap the `Apply` icon.

    7. Tap `Done`.

    8. Choose the desired resolution, and tap `Save`.


    ![A450041_1_En_3_Fig39_HTML.jpg](A450041_1_En_3_Fig39_HTML.jpg)


    Figure 3-39 - Applying the Film Light filter effect


    ## Summary


    While the iPhone camera doesn’t include advanced features such as low-light, high-light,
    `HDR`, and double-exposure effects like a professional DSLR camera does, you can
    still achieve these techniques using the large variety of free and paid apps that
    you can download from the App Store. You can also extend these features by using
    multiple applications to improve the final results. The tips in this chapter covered
    some of the photography effects that you can apply using your iPhone.


    ## Practice Exercise


    Start by taking photos that can be used in this chapter’s tips. You can also use
    photos from your iPhone library. Start by applying the effects and practice the
    different settings and styles.


    # Mastering Photo Editing and Applying Effects


    In the previous chapter, you learned how to create effects such as `HDR` photos
    and shallow depths of field. Those tips were just the beginning. You can use apps
    from the Apple App Store to add filters, frames, and styles to your photos. You
    can also manipulate multiple photos to create a specific scene. Each tip in this
    chapter lists the apps that I used; you can use either use the same apps or choose
    similar ones.


    ## Creating a Delicious Food Photo Collage


    Tools used: `Adobe Lightroom` app, `Moldiv` app


    In this tip, you’ll learn the following:


    - How to modify a photo’s color and light

    - How to create a photo grid or collage of several photos

    - How to add texture to photos


    Figure [4-1](#A450041_1_En_4_Chapter.html#Fig1), Figure [4-2](#A450041_1_En_4_Chapter.html#Fig2),
    and Figure [4-3](#A450041_1_En_4_Chapter.html#Fig3) show the original photos that
    I used. Try to find something similar so that you can follow along.


    ![A450041_1_En_4_Fig3_HTML.jpg](A450041_1_En_4_Fig3_HTML.jpg)


    Figure 4-3 - Third photo (© Radwa Khalil)


    ![A450041_1_En_4_Fig2_HTML.jpg](A450041_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 - Second photo (© Radwa Khalil)


    ![A450041_1_En_4_Fig1_HTML.jpg](A450041_1_En_4_Fig1_HTML.jpg)


    Figure 4-1 - First photo (© Radwa Khalil)


    Figure [4-4](#A450041_1_En_4_Chapter.html#Fig4) shows my final result.


    ![A450041_1_En_4_Fig4_HTML.jpg](A450041_1_En_4_Fig4_HTML.jpg)


    Figure 4-4 - Final result


    As the saying goes, a picture is worth a thousand words. Well, a photo collage
    can tell even more. Arranging photos in a collage or a grid allows you to tell
    a story; it’s a great way to show different photos with the same theme to emphasize
    your point. While there are many applications that can help you to create a photo
    collage, it is important to prepare for your project even before taking your shots.
    Each collage should have a theme; in other words, the photos should be related
    in a specific way. Here are some examples:


    - **Color theme collage** : In this theme, the photos may vary in subjects and
    location yet they are unified with the same color such as a blue sea, blue sky,
    and blue stones.

    - **Object theme collage** : All the photos in this type of collage are displaying
    the same or related objects such as fruits, tree leaves, flowers, or people.

    - **Storytelling collage** : This collage is used to tell a story or show sequenced
    photos of the same scene. For example, it may include kids playing a specific
    game and show four or more shots of their reactions while playing.


    In this example, I will show how to organize a series of photos from a food photography
    session into a collage style. You will learn how to modify the colors of the photos
    in the `Adobe Lightroom` app first and then move to the `Moldiv` app to create
    the final collage effect.'
