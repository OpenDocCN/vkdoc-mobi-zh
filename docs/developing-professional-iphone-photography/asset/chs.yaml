  \ 8-15：添加晕影效果以创建最终结果\n\n## 构建法老风格合成图\n\n使用的工具：`Adobe Lightroom`应用、`Photoshop Fix`、`Photoshop\
  \ Mix`、`Eraser`和`Photofox`\n\n图 8-16、8-17、8-18 和 8-19 展示了我在本例中使用的原始照片。\n\n![A450041_1_En_8_Fig19_HTML.jpg](img/A450041_1_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19：原始日落照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig18_HTML.jpg](img/A450041_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18：另一张金字塔的原始照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig17_HTML.jpg](img/A450041_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17：金字塔的原始照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig16_HTML.jpg](img/A450041_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16：天空的原始照片（© Radwa Khalil）\n\n图 8-20 展示了最终结果。\n\n![A450041_1_En_8_Fig20_HTML.jpg](img/A450041_1_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20：最终结果\n\n您可以组合多张照片来创建神秘且超自然的合成图。虽然在电脑上处理照片可能使用像 Adobe Photoshop 这样的单个应用，但在\
  \ iPhone 上，您可能需要使用多个应用来创建所需的效果。\n\n在我去金字塔的旅途中，我拍了一些胡夫大金字塔的照片。为了创建一幅神秘的合成图，我使用了三张照片来构建。我首先改善了照片的颜色和光线，然后创建了一个具有透明背景的副本，以呈现金字塔在天空中的倒影。接着，我添加了一片神秘的蓝色天空来覆盖照片。\n\
  \n### 第 1 步：优化照片颜色和光线\n\n要优化照片颜色和光线，请遵循以下步骤：\n\n1. 在 Adobe Lightroom 中打开金字塔照片。\n\
  2. 点击分享图标，选择编辑方式，然后选择最高可用。在 Photoshop Fix 中选择修复，以移除照片中的汽车（见图 8-21）。\n\n   ![A450041_1_En_8_Fig21_HTML.jpg](img/A450041_1_En_8_Fig21_HTML.jpg)\n\
  \n   图 8-21：在 Lightroom 应用中打开基础照片\n\n3. 在 Photoshop Mix 中，点击污点修复图标。点击汽车和不需要的对象以将其移除。您可以使用仿制图章工具，通过复制图像的另一部分来进行更具选择性的修复（见图\
  \ 8-22）。\n\n   ![A450041_1_En_8_Fig22_HTML.jpg](img/A450041_1_En_8_Fig22_HTML.jpg)\n\
  \n   图 8-22：使用污点修复移除不需要的元素\n\n4. 点击顶部的蓝色条以保存并返回到 Adobe Lightroom 应用。\n5. 点击灯光图标。增加照片的对比度，并减少高光和阴影。\n\
  6. 点击颜色图标，增加照片的自然饱和度设置（见图 8-23）。\n7. 点击分享图标，将图像保存到您的相机胶卷。\n\n   ![A450041_1_En_8_Fig23_HTML.jpg](img/A450041_1_En_8_Fig23_HTML.jpg)\n\
  \n   图 8-23：改善照片的颜色、光线和色温\n\n### 第 2 步：移除天空\n\n我想为合成图使用更具戏剧性的天空，因此我将使用`Eraser`应用移除当前的天空，步骤如下：\n\
  \n1. 在`Eraser`应用中打开修改后的照片。\n2. 点击擦除图标，然后选择目标区域。将阈值设置为 75，然后点击天空将其移除。接着点击完成（见图 8-24）。\n\
  3. 点击分享图标，选择最大尺寸和 PNG 格式。点击保存，将图像保存到相机胶卷。\n\n   ![A450041_1_En_8_Fig24_HTML.jpg](img/A450041_1_En_8_Fig24_HTML.jpg)\n\
  \n   图 8-24：从照片中移除天空背景\n\n### 第 3 步：构建合成图\n\n现在，我将使用 Photoshop Mix 来构建合成图，步骤如下：\n\
  \n1. 在 Photoshop Mix 中打开一张色彩多样的天空照片。\n2. 点击加号图标添加一个新图层。选择添加新的图像图层。然后导航到透明背景的金字塔照片。\n\
  3. 点击金字塔图层打开其属性面板，选择复制。\n4. 用两根手指旋转复制的图层，使其位于第一个图层的上方。您也可以点击该图层打开图层选项，选择垂直翻转（见图\
  \ 8-25）。\n\n   ![A450041_1_En_8_Fig25_HTML.jpg](img/A450041_1_En_8_Fig25_HTML.jpg)\n\
  \n   图 8-25：复制金字塔图层并翻转\n\n5. 点击加号图标，为第一层天空选择一张照片。\n6. 在图层中，将天空图层重新排列到金字塔后面。\n7.\
  \ 点击顶部的金字塔图层打开其属性面板，将不透明度设置为 50%，并将混合模式设置为叠加。\n8. 点击加号图标，为人物剪影选择一张照片。\n9. 点击剪切图标。选择基础进行普通删除，确保点击左侧的设置图标，选择擦除。\n\
  10. 移除照片中不需要的区域，保留人物剪影。通过羽化图标，设置图像边缘的平滑度（见图 8-26）。\n11. 点击应用图标。\n12. 点击分享图标，选择相机胶卷。\n\
  \n    ![A450041_1_En_8_Fig26_HTML.jpg](img/A450041_1_En_8_Fig26_HTML.jpg)\n\n  \
  \  图 8-26：添加天空背景\n\n### 第 4 步：添加戏剧性的天空效果\n\n现在，您将看到如何添加第二层天空并使用混合模式使其看起来更具戏剧性，步骤如下：\n\
  \n1. 在`Photofox`应用中打开上一步骤保存的照片。\n2. 点击加号图标，选择添加图像。\n3. 在底部的图层选项卡中，选择混合，并将添加的天空的混合模式设置为颜色加深（见图\
  \ 8-27）。\n\n   ![A450041_1_En_8_Fig27_HTML.jpg](img/A450041_1_En_8_Fig27_HTML.jpg)\n\
  \n   图 8-27：在合成图上叠加戏剧性的天空\n\n\n\n## 总结\n\n在本章中，你学习了如何合成照片以创作出奇幻的场景。这些技巧提供了大量实例，展示如何运用应用程序来添加滤镜、画框以及在照片之间进行合成操作。你可以使用不同的应用，将本章的步骤应用到自己的照片上，并根据拍摄画面的特性调整设置。\n\
  \n## 练习\n\n首先，构思一张可以用来营造神秘或戏剧效果的照片。然后，准备与之搭配的照片。例如，移除背景并调整颜色。完成后，你就可以在如`Photoshop\
  \ Mix`和`Photofox`这类基于图层的应用程序中构建合成画面了。\n\n"
- "# 9. 拍摄与剪辑视频\n\n当你想记录动态和声音时，可以使用你的 iPhone 来捕捉视频画面。借助合适的工具，你甚至还能扩展这项功能。与摄影和照片编辑类似，有众多应用程序可以帮你拍摄、编辑和添加视频特效。这些应用让你能够进行基本的视频修改（高级视频特效则需要特殊的软硬件配置）。\n\
  \n## 拍摄与修剪视频\n\n使用的工具：`相机`应用、`照片`应用\n\n在本节中，你将了解以下内容：\n\n*   使用`相机`应用进行不同类型的视频拍摄\n\
  *   在拍摄视频的同时拍摄静态照片\n*   使用`照片`应用修剪视频\n\n`相机`应用允许你通过不同模式拍摄不同类型的视频，包括普通视频（`视频`）、慢动作（`慢动作`）和高速视频（`延时摄影`）。拍摄视频后，你可以使用`照片`应用的编辑功能，裁剪掉位于开头或结尾的任何多余片段。\n\
  \n### 设置视频质量\n\n默认情况下，iPhone 并未设置为拍摄最高质量（4K）的视频，因为这会极大地消耗你的存储空间。每分钟的 4K 视频大约会占用\
  \ 350MB 的存储空间，而 1080p 高清视频（60 帧/秒）也是如此。此外，与编辑低画质视频相比，高画质视频可能会降低你的剪辑速度，因此你需要选择最符合需求的分辨率。\n\
  \n1.  打开`设置` ➤ `照片与相机`。\n2.  在`相机`部分，你可以设置`录制视频`和`录制慢动作`功能的质量。在每个部分中，你都可以看到每录制一分钟视频所消耗存储空间的参考指南（见图\
  \ 9-1）。\n\n    ![A450041_1_En_9_Fig1_HTML.jpg](img/A450041_1_En_9_Fig1_HTML.jpg)\n\
  \n    图 9-1\n\n    在`照片与相机`设置中配置视频录制质量\n\n### 在拍摄视频的同时拍摄静态照片\n\n有时你希望在拍摄视频画面时，也能同时拍下一张静态照片。此功能在两种模式下可用：`视频`模式和`慢动作`模式。\n\
  \n1.  打开`相机`应用，并选择`视频`模式。\n2.  按下主屏幕按钮或音量键之一开始录制视频。\n3.  点击屏幕左上角的白色按钮，即可在拍摄视频的同时拍下静态照片（见图\
  \ 9-2）。\n4.  再次按下主屏幕按钮停止录制。\n5.  点击主屏幕按钮旁边的预览图标，预览视频和静态照片。\n\n    ![A450041_1_En_9_Fig2_HTML.jpg](img/A450041_1_En_9_Fig2_HTML.jpg)\n\
  \n    图 9-2\n\n    你可以通过点击屏幕左上角的白色按钮，在拍摄视频的同时拍摄静态照片\n\n### 在照片应用中编辑素材\n\n你的视频保存在`照片`应用中的`视频`相册里。你可以点击视频进行播放，并按下述步骤修剪视频的开头或结尾：\n\
  \n1.  在`照片`应用中打开该视频。\n2.  点击`调整`图标进入视频编辑模式。\n3.  拖动左右箭头来修剪视频。\n4.  点击`完成`，并选择是将修改应用到原始视频，还是以此创建一个新视频（见图\
  \ 9-3）。\n\n    ![A450041_1_En_9_Fig3_HTML.jpg](img/A450041_1_En_9_Fig3_HTML.jpg)\n\
  \n    图 9-3\n\n    使用`照片`应用修剪视频\n\n## 创建超延时视频\n\n使用的工具：`OSnap`\n\n在本节中，你将了解以下内容：\n\
  \n*   创建超延时项目\n*   拍摄超延时视频\n*   为视频添加配乐\n\n超延时是一种延时摄影技术，它通过拍摄单张照片并将它们组织在一起来创建视频帧，从而形成动态序列。虽然你可以通过切换到`相机`应用的`延时摄影`模式来创建延时视频，但无法控制其中的动态速度或帧数。使用如`OSnap`等超延时应用，你可以将一系列照片转换为超延时或延时视频。随后，你就可以控制视频的速度和包含的帧数了。\n\
  \n### 第 1 步：创建超延时项目\n\n要创建一个超延时项目，请遵循以下步骤：\n\n1.  打开`Osnap`应用，点击加号图标，然后选择`新建项目`。\n\
  2.  在`新建项目`对话框中，设置项目名称、方向以及相机。然后点击`创建`（见图 9-4）。\n\n    ![A450041_1_En_9_Fig4_HTML.jpg](img/A450041_1_En_9_Fig4_HTML.jpg)\n\
  \n    图 9-4\n\n    在`OSnap`应用中创建新的超延时项目\n3.  点击`开始拍摄`或选择`调整设置`来设置更多项目选项。一旦`相机`应用打开，你可以多次点击快门按钮，以拍摄将用于视频中的照片（见图\
  \ 9-5）。\n\n    ![A450041_1_En_9_Fig5_HTML.jpg](img/A450041_1_En_9_Fig5_HTML.jpg)\n\
  \n    图 9-5\n\n    多次点击快门按钮以拍摄一系列照片，用于实现超延时效果\n4.  完成拍摄后，点击`返回`按钮回到`项目`页面。然后点击该项目。\n\
  5.  点击`播放`预览视频，或点击`拍摄`为其添加更多帧画面（见图 9-6）。\n\n    ![A450041_1_En_9_Fig6_HTML.jpg](img/A450041_1_En_9_Fig6_HTML.jpg)\n\
  \n    图 9-6\n\n    点击`返回`按钮回到项目页面\n\n### 第 2 步：为视频添加音乐\n\n要为视频添加音乐，请遵循以下步骤：\n\n\
  1.  点击`音乐`图标以打开 iPhone 音乐库（见图 9-7）。\n2.  在 iPhone 音乐库中，选择视频并点击加号图标来添加视频。你也可以选择麦克风图标来录制自定义语音。\n\
  \n    ![A450041_1_En_9_Fig7_HTML.jpg](img/A450041_1_En_9_Fig7_HTML.jpg)\n\n    图\
  \ 9-7\n\n    从本地音乐库为项目添加音频\n\n### 第 3 步：修改动画帧\n\n要修改动画帧，请遵循以下步骤：\n\n1.  点击`帧`图标以显示视频中的帧（见图\
  \ 9-8）。\n\n    ![A450041_1_En_9_Fig8_HTML.jpg](img/A450041_1_En_9_Fig8_HTML.jpg)\n\
  \n    图 9-8\n\n    显示超延时动画中使用的帧\n2.  点击右上角的`编辑`图标。\n3.  选择要从素材中移除的帧。\n4.  点击`删除`图标将它们移除（见图\
  \ 9-9）。\n5.  点击左上角的`返回`按钮回到项目。\n\n    ![A450041_1_En_9_Fig9_HTML.jpg](img/A450041_1_En_9_Fig9_HTML.jpg)\n\
  \n    图 9-9\n\n    从序列中删除不需要的帧\n\n### 第 4 步：导出视频\n\n要导出视频，请遵循以下步骤：\n\n1.  点击`共享`图标。\n\
  2.  点击`创建视频`将其保存为视频文件（你也可以选择`将所有照片保存到相机胶卷`，以序列照片的形式保存这些图片）。\n3.  点击`渲染视频`（或点击`调整视频渲染选项`）。\n\
  4.  点击`共享视频`，然后选择`相机胶卷`（见图 9-10）。\n\n    ![A450041_1_En_9_Fig10_HTML.jpg](img/A450041_1_En_9_Fig10_HTML.jpg)\n\
  \n    图 9-10\n\n    渲染并共享视频输出\n\n\n\n## 编辑和应用滤镜\n\n使用的工具：`iMovie`\n\n在本节中，你将学习以下内容：\n\
  \n- 从视频片段中间裁剪部分内容\n- 在视频片段之间应用转场\n- 将视频转换为黑白效果\n- 对视频应用滤镜\n- 为视频添加音轨\n\n尽管`照片`应用除了能删除视频开头或结尾的片段外，无法让你对视频进行其他修改，但有一些应用可以弥补这一不足。你可以使用如`iMovie`、`Adobe\
  \ Premier Clip`等应用来扩展手机的**视频**功能。在这个技巧中，我有一段卢浮宫的视频，镜头前有两个人。因此，我想将他们移除，在视频的不同部分之间应用转场，并添加一个黑白滤镜，让视频看起来有年代感。\n\
  \n### 步骤 1：创建视频项目\n\n要创建视频项目，请按照以下步骤操作：\n\n1. 打开`iMovie`应用，点击加号图标添加视频项目，然后点击`影片`以创建自定义视频项目（见图\
  \ 9-11）。\n\n   ![A450041_1_En_9_Fig11_HTML.jpg](img/A450041_1_En_9_Fig11_HTML.jpg)\n\
  \n   图 9-11 在`iMovie`中创建新项目\n\n2. 点击你想要添加的视频，然后点击视频上的`选择`（右侧图标）来添加它。你可以选择多个视频添加到同一个项目中。\n\
  3. 点击`创建影片`（见图 9-12）。\n\n   ![A450041_1_En_9_Fig12_HTML.jpg](img/A450041_1_En_9_Fig12_HTML.jpg)\n\
  \n   图 9-12 从一个或多个视频创建视频项目\n\n### 步骤 2：从视频中裁剪不需要的部分\n\n要裁剪视频中不需要的部分，请按照以下步骤操作：\n\
  \n1. 拖动视频时间线，到达第一个要删除的区域。\n2. 在时间线上选择视频，以显示视频编辑工具。\n3. 点击`裁剪`图标，并选择`拆分`，在不需要的区域之前进行切割（见图\
  \ 9-13）。\n\n   ![A450041_1_En_9_Fig13_HTML.jpg](img/A450041_1_En_9_Fig13_HTML.jpg)\n\
  \n   图 9-13 在特定点拆分视频\n\n4. 将视频拖动到不需要的区域之后，再次点击`拆分`。\n5. 选择不需要的区域，然后点击`删除`（见图 9-14）。\n\
  \n   ![A450041_1_En_9_Fig14_HTML.jpg](img/A450041_1_En_9_Fig14_HTML.jpg)\n\n   图\
  \ 9-14 删除视频中不需要的部分\n\n6. 现在，你需要在删除区域的位置创建一个转场，以在切割部分前后的视频之间建立平滑过渡。点击两个片段之间的小图标，然后选择一个转场。例如，点击`淡出`（见图\
  \ 9-15）。\n7. 对视频中所有不需要的部分重复这些步骤。\n\n   ![A450041_1_En_9_Fig15_HTML.jpg](img/A450041_1_En_9_Fig15_HTML.jpg)\n\
  \n   图 9-15 对视频片段应用转场\n\n### 步骤 3：将视频转换为黑白效果\n\n要将视频转换为黑白效果，请按照以下步骤操作：\n\n1. 将视频拖动到其最左侧的起始位置。\n\
  2. 点击屏幕右下角的`设置`图标。\n3. 在`滤镜`列表中，选择`无声时代`。\n4. 启用`从黑色淡入`和`淡出到黑色`（见图 9-16）。\n5. 点击`完成`。\n\
  \n   ![A450041_1_En_9_Fig16_HTML.jpg](img/A450041_1_En_9_Fig16_HTML.jpg)\n\n   图\
  \ 9-16 对视频项目应用全局滤镜\n\n### 步骤 4：为视频添加音轨\n\n要为视频添加音轨，请按照以下步骤操作：\n\n1. 在添加音轨之前，你可以移除现有的视频声音。在时间线上选中视频轨道后，点击`音频`图标，并将滑块拖动到最左侧（见图\
  \ 9-17）。\n\n   ![A450041_1_En_9_Fig17_HTML.jpg](img/A450041_1_En_9_Fig17_HTML.jpg)\n\
  \n   图 9-17 移除视频片段中的当前音频\n\n2. 点击时间线左上角的加号图标，选择音轨，然后点击`使用`。\n3. 在时间线上选择音轨，调整其合适的音量，然后点击`淡入淡出`，使其与视频同步淡入和淡出（见图\
  \ 9-18）。\n\n   ![A450041_1_En_9_Fig18_HTML.jpg](img/A450041_1_En_9_Fig18_HTML.jpg)\n\
  \n   图 9-18 从资料库向视频添加音轨\n\n### 步骤 5：将项目导出为视频\n\n要将项目导出为视频，请按照以下步骤操作：\n\n1. 完成视频编辑后，点击屏幕左上角的`完成`。\n\
  2. 点击`共享`图标，并选择`存储视频`。\n3. 选择你想要使用的视频质量。视频将被导出到你的照片图库中（见图 9-19）。\n\n   ![A450041_1_En_9_Fig19_HTML.jpg](img/A450041_1_En_9_Fig19_HTML.jpg)\n\
  \n   图 9-19 将视频项目导出到照片图库\n\n## 创建 20 世纪 80 年代电视视频效果\n\n使用的工具：`Clipper` 应用\n\n你将学习以下内容：\n\
  \n- 合并多个视频\n- 为视频添加音轨\n- 应用老式电视效果\n\n将视频转换成看起来像旧时的风格，是一种创建怀旧视频的有趣方式。在这个技巧中，我使用了孩子们在海滩玩耍的视频，来应用老式\
  \ 1980 年代电视的外观。我使用了`Clipper`应用来应用此效果，并为此选择了一些好听的柔和背景音乐。在这些步骤中，我使用了一个视频，但你可以添加一系列视频，为它们都赋予相同的风格。\n\
  \n### 步骤 1：合并视频素材和音频\n\n要添加视频素材和音频，请按照以下步骤操作：\n\n1. 打开`Clipper`应用，勾选你想要添加到项目中的视频。\n\
  2. 点击右上角的`添加`图标（见图 9-20）。\n\n   ![A450041_1_En_9_Fig20_HTML.jpg](img/A450041_1_En_9_Fig20_HTML.jpg)\n\
  \n   图 9-20 向项目添加视频\n\n3. 添加视频后，你可以点击视频旁边的图标，向项目添加更多视频。\n4. 从时间线的`音频`部分，选择`流行`。你也可以通过点击`音频`图标，从你的资料库中添加音轨（见图\
  \ 9-21）。\n\n   ![A450041_1_En_9_Fig21_HTML.jpg](img/A450041_1_En_9_Fig21_HTML.jpg)\n\
  \n   图 9-21 向项目添加视频和音频\n\n### 步骤 2：添加视频效果并保存视频\n\n要添加视频效果并保存视频，请按照以下步骤操作：\n\n1.\
  \ 从屏幕底部的`视频效果`列表中，选择`80 年代电视`，将其应用到视频上。\n2. 点击时间线上方的`播放`按钮预览视频。\n3. 点击屏幕右上角的`共享`图标。选择在社交网络上分享视频，或通过电子邮件发送，或保存到相机胶卷（见图\
  \ 9-22）。\n\n   ![A450041_1_En_9_Fig22_HTML.jpg](img/A450041_1_En_9_Fig22_HTML.jpg)\n\
  \n   图 9-22 为视频添加老式电视风格并进行分享\n\n## 总结\n\n你不再需要昂贵的摄像机来拍摄高清视频，也不需要复杂的软件来编辑视频。iPhone\
  \ 允许你根据需求拍摄不同质量的视频。尽管`照片`应用与它的静态照片编辑工具（如裁剪、色彩调整和光线调整）相比，没有包含很多视频编辑工具，但你可以使用不同的应用来编辑视频、应用效果以及添加音频。虽然某些应用如`iMovie`和`Adobe\
  \ Clip`提供了完整的编辑功能，但其他应用如`Video Toolbox`也提供了直接应用于视频的基本自定义效果。因此，你需要选择最适合你需求的应用。\n\n\
  ## 练习\n\n构思一个延时摄影项目，例如拍摄一组玩耍中的孩子的照片，并将其转换成延时视频。你可以使用`OSnap`应用来完成此操作。然后，使用如`iMovie`或`Clipper`等应用为视频添加滤镜和音频。\n\
  \n\n\n"
- '# 10. 存储你的照片


  在处理照片和视频时，存储空间耗尽是我最担心的问题之一。这是一个棘手的情况，因为以高质量 HDR 或 Raw 格式拍摄照片会因文件体积庞大而迅速消耗设备的存储空间。拍照时，我通常喜欢从不同角度和变焦倍数拍摄多张照片，这有助于后期编辑照片，或决定将其用于照片合成艺术作品。这同样会占用
  iPhone 的空间。


  与其他手机不同，iPhone 无法通过添加存储卡来扩展其存储能力。因此，你需要一个完善的计划，确保设备始终为下一次拍摄留有空间。这可以通过管理存储空间并利用 iCloud、Dropbox、Google
  Drive 等各种云服务来实现。本章的技巧旨在探索可用于管理 iPhone 存储空间的各种妙招。


  ## 管理你的 iPhone 存储空间


  管理整体存储空间的第一步是确保设备上只保留你想要的内容，并为照片留出足够的空间。虽然从设备中移除不必要的应用程序可以节省空间，但这可能不足以解决问题，尤其是当你使用各种照片编辑应用，并需要在设备上安装常用应用时。因此，你可以更改设备设置，确保只保存必要的文档和照片。默认情况下，iPhone
  的设置并未配置为主动节省设备空间；实际上，有些设置应该在拿到设备后立即更改，以确保空间仅用于重要事项。以下是一些可帮助清空 iPhone 存储空间，为下一个摄影项目做好准备的操作。


  ### 不要重复保存照片


  在拍摄 HDR 照片时，你可能会注意到 iPhone 会在转换为 HDR 照片之前保留原始照片的副本。虽然这是为了保存原始照片，但你并不需要每张照片都保留一个副本。因此，你可以选择停止这种重复备份，仅在需要时使用此设置。要控制此功能，请按照以下步骤操作（见图
  10-1）：


  ![A450041_1_En_10_Fig1_HTML.jpg](img/A450041_1_En_10_Fig1_HTML.jpg)


  图 10-1


  在拍摄 HDR 图像时禁用保留普通照片


  1. 打开 `设置 ➤ 照片与相机`。

  2. 向下滚动到 `保留正常曝光的照片`，并取消勾选其旁边的开关。


  某些应用程序（如 Instagram）也有类似的重复保存照片功能。你可以通过打开 Instagram 应用，选择 `个人资料` 选项卡，然后点击 `设置` 图标来关闭此功能。接着，取消选择
  `保存原始照片`。


  ### 停止存储短信历史记录


  默认情况下，iPhone 会永久存储所有已发送和已接收的短信。显然，随着时间的推移，这会消耗大量空间，特别是当你发送大量短信时。你可能不需要那些旧短信，因此你可以将短信存储限制在特定时间段内，让设备自动删除旧短信（见图
  10-2）。请按照以下步骤操作：


  ![A450041_1_En_10_Fig2_HTML.jpg](img/A450041_1_En_10_Fig2_HTML.jpg)


  图 10-2


  删除短信历史记录


  1. 选择 `设置 ➤ 信息 ➤ 信息历史记录 ➤ 保留信息`。

  2. 如果你希望保留信息长达一年，请将时间设置为 `1 年`；如果对更短时间满意，则设置为 `30 天`。


  ### 删除已下载的播客和音乐


  已下载的播客和音乐因其体积较大，可能会占用大量 iPhone 空间。有时你下载一首音乐曲目是因为它听起来很有趣，但之后应将其从设备中删除。只保留你经常听的曲目有助于释放一些设备空间。你可以按照以下步骤操作（见图
  10-3）：


  ![A450041_1_En_10_Fig3_HTML.jpg](img/A450041_1_En_10_Fig3_HTML.jpg)


  图 10-3


  删除不需要的音乐


  1. 轻点 `设置 ➤ 通用 ➤ 存储空间与 iCloud 用量 ➤ 管理存储空间`。

  2. 向下滚动到 `音乐` 应用。你可以在 `所有歌曲` 上向左轻滑来删除单首歌曲或全部歌曲。


  与音乐不同，播客通常只听一次，无需保留每一集。因此，建议删除已下载的播客以释放 iPhone 上的一些空间。你可以手动删除不需要的播客（见图 10-4）。


  ![A450041_1_En_10_Fig4_HTML.jpg](img/A450041_1_En_10_Fig4_HTML.jpg)


  图 10-4


  删除不需要的播客


  1. 轻点 `设置 ➤ 通用 ➤ 存储空间与 iCloud 用量 ➤ 管理存储空间`。

  2. 向下滚动到 `播客`，然后开始逐一删除。


  ### 移除浏览器历史记录和阅读列表


  如果你在 iPhone 上频繁使用 Safari 浏览网页并将页面保存到阅读列表，你可能会注意到浏览历史和已保存的阅读列表缓存会占用部分存储空间。你可以通过打开
  `设置 ➤ Safari` 并轻点 `清除历史记录与网站数据` 来移除 Safari 的浏览器缓存。


  阅读列表也可能占用一些不必要的空间，因为 Safari 会保留离线阅读列表。移除这个离线阅读列表不会影响你 iPhone 或其他设备上阅读列表中的项目。因此，这是释放更多空间的一个好方法。


  ![A450041_1_En_10_Fig5_HTML.jpg](img/A450041_1_En_10_Fig5_HTML.jpg)


  图 10-5


  移除浏览器的离线阅读列表


  1. 轻点 `通用 ➤ 存储空间与 iCloud 用量 ➤ 存储空间`。

  2. 向下滚动并轻点 `Safari`。

  3. 在 `离线阅读列表` 项目上向左轻滑，然后轻点 `删除` 以清除缓存（见图 10-5）。

  4. 轻点 `网站数据`，向下滚动，然后轻点 `移除所有网站数据`。


  ## 使用 iCloud 保存和管理照片


  如今，世界正转向云解决方案，抛弃传统的本地存储卡和硬盘。云解决方案提供了灵活的存储和可访问性，因为你可以从任何设备访问资源。你可以使用 iCloud 服务存储你的照片和重要文档，从而释放设备上的空间。它还允许你从其他设备（如
  iPad、Mac 电脑或 Windows PC）访问资源。


  ### 激活将照片保存到 iCloud


  加入 iCloud 后，你将获得 5GB 的免费方案来存储信息。显然，对于存储文件来说，这空间不够，尤其是当你使用多台设备时。因此，你需要决定哪些应用程序能够将文件保存到
  iCloud。你可以按如下方式激活将照片保存到 iCloud（见图 10-6）：


  ![A450041_1_En_10_Fig6_HTML.jpg](img/A450041_1_En_10_Fig6_HTML.jpg)


  图 10-6


  激活将照片保存到 iCloud 服务


  1. 轻点 `设置 ➤ 照片与相机`。

  2. 在 `iCloud 照片图库` 旁向右滑动以将其开启。

  3. 选择 `优化 iPhone 存储空间` 以自动管理你的照片存储。原始照片将保存在 iCloud 上，而非保留在你的设备上。




  ### 管理 iCloud 存储与应用程序


  您可以直接在 iPhone 上查看 iCloud 状态，了解可用空间以及允许将文稿保存到 iCloud 的应用程序（见图 10-7）。


  ![A450041_1_En_10_Fig7_HTML.jpg](img/A450041_1_En_10_Fig7_HTML.jpg)


  图 10-7：允许或禁止应用使用 iCloud


  1.  在`设置`应用中，点击您的 Apple ID 名称，然后点击`iCloud`查看存储状态。

  2.  向下滚动，查看允许使用`iCloud`的应用程序。


  如果您决定关闭某个应用与`iCloud`之间的同步过程，您可能会看到一条提示信息，告知您与此特定应用关联的文稿将从`iCloud`存储中移除。


  您还可以通过网页浏览器访问`iCloud`，查看云端的各个应用，并访问`照片`存储区域。一旦您在`照片`应用设置中激活了`iCloud 照片图库`，您就可以查看上传到`iCloud`的照片，并通过添加照片、删除照片或将其整理到文件夹中进行管理（见图
  10-8）。要通过浏览器访问`iCloud`，您可以按照以下步骤操作：


  ![A450041_1_En_10_Fig8_HTML.jpg](img/A450041_1_En_10_Fig8_HTML.jpg)


  图 10-8：使用网页浏览器管理 iCloud 服务


  1.  在浏览器中，输入 [`www.icloud.com`](http://www.icloud.com)。

  2.  使用您的 Apple ID 和密码登录。

  3.  从仪表盘中选择`照片`。


  在左侧，您可以找到 iPhone 使用的不同文件夹，并导航到已上传的照片。通过右上角的图标，您可以上传照片、创建新文件夹、共享照片、下载照片或删除照片。


  ## 使用其他云服务


  `iCloud`并非您可以用来从 iPhone 存储照片和文稿的唯一云服务。尽管 iPhone 与 iOS 高度集成，但您还可以下载并使用其他服务，例如`Dropbox`、`Google
  Drive`和`One Drive`。所有这些服务都提供免费方案，您可以享受免费存储空间。例如，`Dropbox`提供 2GB 的免费存储空间，之后才需要升级。如果您邀请他人使用该应用，您将获得额外空间作为奖励。`Google
  Drive`提供最大的免费存储空间，达到 17GB。此外，它还允许您使用`Google Docs`和`Google Slides`等不同应用创建文档和照片，并自动保存到`Google
  Drive`中。


  如果您不确定`iCloud`的免费空间能否保存您所有的照片，您可以使用其他任何云服务来保存照片，只需通过这些应用将照片上传到云端即可（见图 10-9）。`Dropbox`允许您将相机照片上传到其存储空间，操作如下：


  ![A450041_1_En_10_Fig9_HTML.jpg](img/A450041_1_En_10_Fig9_HTML.jpg)


  图 10-9：使用 Dropbox 保存相机照片


  1.  打开`Dropbox`应用，并使用您的用户名和密码登录。

  2.  点击左上角的`设置`图标。

  3.  点击`相机上传`并将切换开关滑至`开`。这会将照片上传到`Dropbox`上的`相机上传`文件夹。

  4.  切换`上传视频`项目以将视频上传到同一文件夹。

  5.  确保`使用蜂窝数据`为关闭状态，以允许您仅通过 Wi-Fi 连接上传。

  6.  将`后台上传`切换为`开`，然后选择`启用`。这将让`Dropbox`在您从一个地方移动到另一个地方时上传照片。


  ## 使用 Lightroom 应用同步原始文件


  您可能会注意到，在 Adobe `Lightroom` 应用中拍摄或修改的照片默认保存在与`相机胶卷`不同的单独位置，但可以与`相机胶卷`共享图像。这些保存的照片保留了在`Lightroom`
  应用内所做的编辑，因此您可以再次打开它们并修改或更改所应用的效果。如果您需要未经处理的照片以获得更多编辑能力，您还可以使用`Lightroom` 应用拍摄原始照片。然而，由于这些照片文件体积巨大，保存原始文件和文件修改可能会占用您
  iPhone 的大量空间。


  Adobe `Lightroom` 为 Adobe Creative Cloud 会员提供云存储；您可以将桌面和移动应用中的照片都保存到 Adobe 云服务中。免费订阅提供
  2GB 免费存储空间，而付费会员则提供 20GB 存储空间。您可以通过在 Adobe `Lightroom` 应用中登录您的帐户来激活 Adobe Creative
  Cloud。它将自动上传`Lightroom` 图库中的照片，并更新对任何照片所做的修改。


  您可以按照以下步骤同步`Lightroom` 应用图库与 Adobe 云服务中的照片（见图 10-10）：


  ![A450041_1_En_10_Fig10_HTML.jpg](img/A450041_1_En_10_Fig10_HTML.jpg)


  图 10-10：在 Lightroom 应用与 Adobe 云服务之间同步


  1.  在您的 iPhone 上打开`Lightroom` 应用。

  2.  点击左上角的`云`图标，并使用您的 Adobe ID 和密码登录。

  3.  点击该图标，将照片与在线存储空间同步。


  您也可以通过浏览器管理在线云存储中的照片，操作如下（见图 10-11）：


  ![A450041_1_En_10_Fig11_HTML.jpg](img/A450041_1_En_10_Fig11_HTML.jpg)


  图 10-11：使用电脑浏览器访问 Lightroom 云存储


  1.  在您的浏览器中，前往 [`https://lightroom.adobe.com/`](https://lightroom.adobe.com/)。

  2.  使用您的 Adobe ID 和密码登录。

  3.  点击`添加照片`图标，从您的电脑向云端添加照片。

  4.  点击照片上的`选择`图标以删除、共享或更改位置。


  ## 与您的电脑同步文件


  很多人都喜欢大屏幕；对我来说，它能帮助我查看照片的细节，挑出需要修复的小问题。您可以将照片从 iPhone 同步到电脑，以便修改、存储或与他人分享。此外，您还可以在电脑上的`照片`文件夹与
  iPhone 之间进行同步，以便在手机上保存您的照片和珍贵回忆的副本。




  ## 将 iPhone 照片导入电脑


  你可以使用 Mac 上的“`照片`”应用，通过 USB 数据线将 iPhone 与电脑连接，轻松将 iPhone 照片导入电脑。连接成功后，系统可能会询问你是否信任该电脑并允许其连接设备。接受该设置后，你便能在左侧导航窗格中看到
  iPhone 的照片列表。


  你可以按照以下步骤（见图 10-12）将照片从 iPhone 导入 Mac 电脑的“`照片`”应用中：


  ![A450041_1_En_10_Fig12_HTML.jpg](img/A450041_1_En_10_Fig12_HTML.jpg)


  图 10-12 使用 Mac 的“`照片`”应用导入 iPhone 照片


  1. 在 Mac 电脑上打开“`照片`”应用。

  2. 在左侧的“导入”窗格中选择你的 iPhone。

  3. 选择你想要导入的照片。

  4. 从顶部控制栏中选择“导入所有新项目”或“导入所选项目”。你可以勾选“导入后删除项目”来移除原始照片以节省空间。


  如果你使用的是 Windows 电脑，只需将 iPhone 插入电脑，等待“`自动播放`”窗口弹出，然后选择导入照片即可。你也可以使用诸如 `AnyTrans`
  之类的应用程序。


  导入照片后，它们会被保存在“`照片`”应用文件夹中，你可以在应用内分享、调整或将其标记为收藏。若要将照片保存到“`访达`”中，以便在诸如 `Photoshop`
  或 `Lightroom` 等照片编辑应用中打开，你需要按如下步骤导出（见图 10-13）：


  ![A450041_1_En_10_Fig13_HTML.jpg](img/A450041_1_En_10_Fig13_HTML.jpg)


  图 10-13 “`照片`”应用中的“导出照片”对话框


  1. 选择你需要导出的照片。

  2. 选择“文件”➤“导出”➤“导出照片”。

  3. 在导出对话框中，选择导出格式、色彩描述文件和大小；点击“导出”。

  4. 将照片保存到你的本地电脑上。


  ## 从电脑同步照片到 iPhone


  你可以使用 Mac 和 Windows 上都有的“`iTunes`”应用，轻松同步电脑和 iPhone 上的照片。这可以帮助你同步照片、音乐、图书、应用和播客。要同步照片，可以遵循以下步骤（见图
  10-14）：


  ![A450041_1_En_10_Fig14_HTML.jpg](img/A450041_1_En_10_Fig14_HTML.jpg)


  图 10-14 使用“`iTunes`”应用从电脑和 iPhone 同步照片


  1. 打开“`iTunes`”应用。

  2. 点击左上角的 iPhone 图标。

  3. 在“设置”部分，点击“照片”。

  4. 选中“同步照片”复选框。

  5. 在“从...复制照片”中，选择你想要同步的照片所在的文件夹。

  6. 选择同步所有文件夹或所选文件夹。

  7. 点击右下角的“应用”。


  ## 本章小结


  虽然 iPhone 的存储空间可能无法让你保存无限多的照片和项目，但云技术通过为你提供将照片保存到各种云服务（如 `iCloud`、`Dropbox`、`Google
  Drive`、`One Drive` 和 `Adobe Cloud`）的机会，帮助克服了这一障碍。你可以使用这些服务来高效管理设备空间，确保在下一次拍摄时不会因空间不足而烦恼。你可以使用不同应用的免费版本来获取少量存储空间，也可以订阅一项服务以获得足够存储所有项目的空间。你还可以通过
  Mac 上的“`照片`”应用或 Windows 上的 `AnyTrans` 等应用将照片导入电脑来保存。


  ## 实践练习


  运用本章介绍的技术来减少设备上的已用存储空间。下载一个或多个云服务应用，并使用它们来保存你的照片。留意一下你可以释放多少设备空间。


