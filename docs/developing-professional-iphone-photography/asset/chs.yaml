- "# 释放 iPhone 相机的强大潜力\n\n虽然相机本身并不能造就摄影师，但一台好相机无疑能将你的创意拍摄提升到全新维度，并拓展你应用不同技巧的能力——尤其是在与数码摄影相机相关的技术不断演进的今天。这一规律同样适用于手机摄影。iPhone\
  \ 上出色的相机让你无需携带沉重的摄影装备，即可满足专业及个人用途的拍摄需求。Apple iPhone 的相机正是其超越竞争对手的亮点功能之一。\n\n为了充分利用你的\
  \ iPhone 相机，关键是要了解相机的功能以及各种特色，这些特色能帮助你在默认及第三方摄影应用中拍出好照片。在这一章中，你将探索默认相机和`照片`应用的功能，然后在后续章节中继续学习不同的摄影技巧。\n\
  \n## 掌握你的 iPhone 相机\n\n你的 iPhone 相机拥有隐藏功能，可以帮助你快速打开`相机`应用。你还可以通过应用网格系统来对齐画面，从而改善照片的构图。\n\
  \n### 轻松访问相机\n\niPhone 的优势之一在于能够随时随地快速拍照。你只需从口袋或包里掏出手机，打开`相机`应用，然后按下快门即可。然而，你需要知道如何快速访问`相机`应用，才能捕捉那些特殊时刻，比如孩子玩耍或你最喜欢的球队赢得比赛。iPhone\
  \ 为你提供了三种快速打开`相机`应用的主要方法。\n\n#### 滑动操作打开\n\n第一种方法是滑动屏幕。这允许你在手机锁定的状态下打开`相机`应用，这被认为是访问相机最快的方式。请按照以下步骤操作：\n\
  \n![A450041_1_En_1_Fig1_HTML.jpg](img/A450041_1_En_1_Fig1_HTML.jpg)\n\n图 1-1\n\n\
  从屏幕右侧向左滑动，以打开`相机`应用\n\n1. 如果 iPhone 处于休眠状态，按一次主屏幕按钮唤醒屏幕。\n2. 在锁屏界面上，从屏幕右侧向左滑动，即可打开`相机`应用，如图\
  \ 1-1 所示。\n\n#### 使用手机控制中心\n\n第二种方法可在手机锁定或解锁状态下使用；只需通过手机的`控制中心`即可。\n\n![A450041_1_En_1_Fig2_HTML.jpg](img/A450041_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n\n从屏幕底部向上滑动，以打开`控制中心`\n\n1. 如果 iPhone 处于休眠状态，按一次主屏幕按钮唤醒屏幕。\n2. 用手指从主屏幕按钮处向手机顶部滑动，如图\
  \ 1-2 所示。\n3. 在`控制中心`中轻点`相机`应用。\n\n这两种方法在手机锁定时需要轻松访问相机时非常实用，而下一种方法则允许你在手机上使用其他应用时快速访问相机。\n\
  \n#### 将相机应用添加到程序坞\n\n第三种方法是将`相机`应用添加到手机的程序坞。这有助于你轻松在移动设备上安装的其他应用中找到相机。你可以按如下方式将相机添加到程序坞：\n\
  \n![A450041_1_En_1_Fig3_HTML.jpg](img/A450041_1_En_1_Fig3_HTML.jpg)\n\n图 1-3\n\n\
  将`相机`应用拖到屏幕程序坞\n\n1. 按两次手机的主屏幕按钮以进入主屏幕（如有需要，可使用指纹或密码）。\n2. 轻轻长按`相机`应用图标；你会看到它开始抖动，表示其位置可调，如图\
  \ 1-3 所示。\n3. 将其拖到屏幕程序坞中，放在你最常用的应用（如`邮件`应用和`Safari`浏览器）旁边。如果程序坞已满，你可以通过移除其中使用频率最低的应用来添加它。\n\
  \n### 多种方式完成拍摄\n\niPhone 能根据不同的情况，通过三种不同的方法帮助你完成拍照。默认方法是轻点相机按钮一次以拍摄，如图 1-4 所示。\n\
  \n你也可以按上调或下调音量按钮来拍照，同样如图 1-4 所示。这个选项有助于你在拍照时稳定地握住手机。如果你的手机处于横屏模式，它的作用类似于数码相机上的快门按钮。最后，如果你使用的是有线耳机，你可以使用耳机上的音量按钮来拍照。这有助于你隐秘地拍摄照片。例如，你可以在不被注意的情况下捕捉孩子玩耍的自然瞬间，从而得到充满活力的照片。使用耳机按钮还可以帮助你在拍摄照片时避免手机抖动。\n\
  \n![A450041_1_En_1_Fig4_HTML.jpg](img/A450041_1_En_1_Fig4_HTML.jpg)\n\n图 1-4\n\n\
  轻点相机按钮或按下音量按钮来拍照\n\n### 启用网格参考线\n\n你可能知道，照片的构图对于拍出精彩的照片起着至关重要的作用。`相机`应用提供了网格线，可以在你拍摄时提供引导，确保构图在视觉上令人赏心悦目。`网格`选项将屏幕分为三列三行。这可以帮助你将画面元素精确地放置在你想要的位置。请按照以下步骤启用`网格`功能：\n\
  \n![A450041_1_En_1_Fig5_HTML.jpg](img/A450041_1_En_1_Fig5_HTML.jpg)\n\n图 1-5\n\n\
  从`照片与相机`设置中激活`网格`设置\n\n1. 轻点手机上的`设置`图标。\n2. 向下滚动并轻点`照片与相机`。\n3. 在`相机`部分激活`网格`功能，如图\
  \ 1-5 所示。\n\n### 使用连拍模式\n\n对于体育赛事或孩子玩耍等快速移动的场景，你可能需要拍摄多张同一场景的照片，以便稍后选出最佳的一张。虽然反复轻点相机按钮太慢，但\
  \ iPhone 的连拍模式可以帮上忙。它允许你只需按住相机按钮，即可几乎瞬间拍摄多张照片。按住按钮的时间越长，连拍模式拍摄的照片就越多。\n\n松开按钮后，照片会保存在`相机胶卷`中一个名为`连拍`的特殊文件夹里。要查看`连拍`文件夹中的照片，可以按照以下步骤操作：\n\
  \n![A450041_1_En_1_Fig6_HTML.jpg](img/A450041_1_En_1_Fig6_HTML.jpg)\n\n图 1-6\n\n\
  选择连拍照片组中的不同图像\n\n1. 在`照片`应用中，轻点`连拍`文件夹以选中它。\n2. 在中间底部的工具栏中轻点`选择`。\n3. 浏览连拍照片组中的不同照片，如图\
  \ 1-6 所示。\n\n要选择文件夹中的一张照片，可以执行以下操作：\n\n1. 选择该图像，然后轻点屏幕右上角的`完成`，如图 1-6 所示。\n2. 要么轻点`保留全部`以保留文件夹并将选中的一张（或多张）图像另存为单独的照片，要么轻点`只保留一张收藏`以只保留选中的图像并删除其余部分。\n\
  \n选择其中任一选项后，选中的图像（或图像组）就会从`连拍`文件夹中分离出来，作为普通照片添加到你的相册中。\n\n\n\n### 设置手动对焦与曝光\n\n\
  默认情况下，iPhone 相机会自动将焦点对准画面中最近的物体。但在某些情况下，例如当你想对焦于画面中远处的物体时，可能需要更改这一设置。iPhone 允许你通过点击想要对焦的物体来手动设置照片的对焦和曝光；相机将对焦于所选物体，如图\
  \ 1-7 所示。\n\n![A450041_1_En_1_Fig7_HTML.jpg](img/A450041_1_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\n点击物体以手动设置对焦和曝光\n\n将对焦设定到所选元素后，照片的曝光可能会根据图像中的光照条件而变化。如果你想修改曝光，点击并上下拖动以打开曝光滑块，从而可以增加或减少照片的曝光度。\n\
  \n### 锁定曝光与对焦\n\n尽管 iPhone 允许你灵活地在拍摄中设置曝光和对焦，但它也有一个缺点，尤其是在拍摄场景中元素可能会移动时。或者，你可能想要拍摄同一场景的多张照片，而不希望在每次拍摄时都重新设置对焦。\n\
  \n要锁定对焦和曝光，请执行以下操作：\n\n![A450041_1_En_1_Fig8_HTML.jpg](img/A450041_1_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8\n\n黄色标签表示曝光和对焦已锁定\n\n1.  等待相机优化照片的曝光和画面。\n2.  长按屏幕，直到屏幕顶部出现黄色的 `AE/AF Lock`\
  \ 标签，如图 1-8 所示。\n3.  点击屏幕并上下拖动以改变画面亮度。\n\n请注意，如果您关闭“相机”应用并重新打开，则需要在新拍摄中重新设置锁定。\n\
  \n### 拍摄 HDR 照片\n\n高动态范围（HDR）照片是使用不同曝光值拍摄的同一场景的多张照片的组合。将这些照片合并在一起，可以在照片中产生一种称为 HDR\
  \ 照片效果的戏剧性效果。与普通图像不同，HDR 照片包含更多对比鲜明的颜色以及明暗和光影变化。\n\n您只需点击屏幕顶部的 `HDR` 图标即可激活 HDR\
  \ 照片效果，如图 1-9 所示。请注意，使用此技术拍摄移动主体可能会导致图像失真，因为该功能允许您拍摄三张不同曝光的图像并将它们合并在一起。因此，最好将此效果用于静态主体。\n\
  \n![A450041_1_En_1_Fig9_HTML.jpg](img/A450041_1_En_1_Fig9_HTML.jpg)\n\n图 1-9\n\n\
  点击屏幕顶部的 `HDR` 图标\n\n在拍摄 `HDR` 照片时，您可能希望保留普通照片以供后续处理。为此，您需要更改 `HDR` 设置。\n\n1.  选择\
  \ `设置` ➤ `照片与相机`。\n2.  在 `HDR` 部分，打开 `保留正常曝光的照片` 选项。\n\n#### 拍摄实况照片\n\n从 iPhone\
  \ 6s/6s Plus 开始，iPhone 相机新增了一项功能——实况照片。在拍照时，实况照片功能会录制与图像关联的一小段视频。当您长按图像时，图像会开始动起来，显示拍摄时画面中物体的运动情况。实况照片还支持音频，就像一张图片附带了一段小视频。\n\
  \n要激活实况照片功能，请在拍摄前点击相机屏幕顶部的实况照片图标。当您按下快门按钮时，iPhone 会记录拍摄前后各 1.5 秒的画面，从而生成一段总共 3 秒的带音频视频。\n\
  \n要播放视频，您需要打开照片，然后长按以启动视频。此类照片在桌面端查看器（例如 Apple 电脑上的“照片”应用）中得到支持。\n\n### 快速访问不同的照片类型\n\
  \niPhone 相机允许您拍摄多种类型的照片，包括常规、正方形、全景、视频、慢动作和延时摄影。在这些模式之间切换的默认方法是打开“相机”应用，然后在任一快门按钮上方滑动以选择您要拍摄的照片或视频类型。访问这些类型的最快方式是通过\
  \ 3D Touch（适用于 iPhone 6s、6s Plus 及更新机型）。用力长按手机上的“相机”应用图标；快捷操作菜单出现，您可以选择要拍摄的照片类型，如图\
  \ 1-10 所示。\n\n![A450041_1_En_1_Fig10_HTML.jpg](img/A450041_1_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10\n\n用力长按“相机”应用以打开快捷操作菜单\n\n## 充分利用“照片”应用\n\n在 iPhone 和 Mac 电脑上用于管理照片的默认应用程序是“照片”应用。它可以帮助您保存、导入和管理使用\
  \ iPhone 拍摄的照片。它还允许您将照片整理到相簿中、分享照片，并将其保存到 Apple iCloud、Dropbox 等云服务中。\n\n虽然许多 iPhone\
  \ 摄影应用程序允许您将照片存储在应用程序本身中，但将照片保存在“照片”应用中可以让您轻松地在不同应用之间切换以应用不同的照片效果。因此，学习如何有效使用“照片”应用非常重要。\n\
  \n### 使用“时刻”和“年度”视图\n\n默认情况下，当您打开“照片”应用时，它会显示最近的照片，但您也可以使用“年度”视图根据拍摄时间线来查看照片。\n\n\
  当您处于“时刻”视图（默认视图）时，请点击屏幕左上角的“年度”，如图 1-11 所示。这将以月份和拍摄地点为基础显示照片。您可以点按月份以缩放回“时刻”视图。当“年度”视图激活时，点击“年份”视图可以根据拍摄年份显示照片。然后，您可以点击每一年以进入“年度”视图。\n\
  \n![A450041_1_En_1_Fig11_HTML.jpg](img/A450041_1_En_1_Fig11_HTML.jpg)\n\n图 1-11\n\
  \n点击“年度”以根据时间线查看照片\n\n### 在移动设备上查找照片\n\n当您的手机里存满了照片时，您需要一种方法来查找特定照片，而不是在它们之间滚动浏览。“照片”应用中的搜索功能提供了一种智能方式，可以使用不同的关键词来搜索照片，包括以下内容：\n\
  \n- 照片的拍摄时间，例如年份或月份。\n- 照片的拍摄地点。可以是城市、国家或特定地点。\n- 照片中可被命名的元素，例如狗、汽车、海滩等。\n- 照片中人物的姓名，基于保存在“人物”文件夹中的人物，您将在下一条技巧中看到。\n\
  \n\n\n### 保存人物面部信息\n\n默认情况下，当你拍照并将其保存在`照片`应用中时，该应用会尝试识别照片中的人物，并将面部信息保存到`人物`文件夹中。要利用`照片`应用的人脸识别功能，你需要按以下步骤为`人物`文件夹中的每个已识别人物指定姓名：\n\
  \n![A450041_1_En_1_Fig12_HTML.jpg](img/A450041_1_En_1_Fig12_HTML.jpg)\n\n图 1-12\
  \  \n在姓名字段中添加人物姓名\n\n1.  打开`照片`应用的`相簿`文件夹中的`人物`文件夹。\n2.  选择一个已识别的人脸并轻点它；该人脸将连同包含它的照片一起显示。\n\
  3.  在屏幕顶部的姓名字段中，添加此人的姓名，如图 1-12 所示。此时会显示一个联系人列表中的姓名下拉菜单。从列表中选择一个姓名。\n\n如果某个人的照片显示了多次，这意味着应用未能识别出这些照片实际上是同一个人。因此，你可以对同一个人的第二张人脸照片应用相同的步骤，并输入相同的姓名。应用会询问你是否合并两组数据，以统一选定人物的所有图像。\n\
  \n完成这些步骤后，使用之前提到的搜索功能搜索该人物的姓名；你会发现该人物的所有照片都显示在搜索结果中。\n\n### 将照片添加到个人收藏并创建相簿\n\n\
  有时，你会对同一场景拍摄多张照片，并希望“收藏”其中一张，以便日后筛选或在照片编辑中使用。你可以通过以下步骤将照片添加到`个人收藏`文件夹：\n\n![A450041_1_En_1_Fig13_HTML.jpg](img/A450041_1_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13  \n轻点`收藏`图标可将图像保存为个人收藏\n\n1.  轻点照片将其打开。请注意，你无需将其全屏打开。\n2.  轻点底部工具栏中的`收藏`图标，如图\
  \ 1-13 所示。\n\n你也可以通过将照片添加到新相簿来整理照片；你可以按照以下步骤创建新相簿：\n\n![A450041_1_En_1_Fig14_HTML.jpg](img/A450041_1_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14  \n在姓名字段中输入新相簿的名称\n\n1.  轻点屏幕右下角的`相簿`图标。\n2.  轻点屏幕右上角的加号图标。\n3.  添加新相簿名称并轻点`存储`，如图\
  \ 1-14 所示。\n\n要将照片添加到某个相簿或刚刚创建的相簿，你可以执行以下操作：\n\n1.  进入`相机胶卷`或任何文件夹。\n2.  轻点屏幕右上角的`选择`图标。\n\
  3.  选择一张或多张照片。\n4.  轻点屏幕底部的`添加到`。\n\n选择你想要添加照片的相簿，或轻点`新建相簿`来创建新相簿并将照片添加进去，如图 1-15\
  \ 所示。\n\n![A450041_1_En_1_Fig15_HTML.jpg](img/A450041_1_En_1_Fig15_HTML.jpg)\n\n\
  图 1-15  \n你可以将选定的照片添加到现有相簿，或创建新相簿\n\n## 本章小结\n\n你的 iPhone 具备先进的摄影功能，可帮助你拍摄专业级照片。`相机`和`照片`应用都包含一些实用功能，可以提升你的\
  \ iPhone 摄影技巧。`相机`应用包含隐藏功能，即使不轻点快门按钮也能快速拍照。此外，它还允许你创建不同的效果，例如`实况照片`视频和`HDR`照片。更进一步，它为你提供了自动或手动调整照片曝光和对焦的选项。`照片`应用扩展了你将照片整理到相簿和个人收藏的能力，并且你可以使用搜索功能根据照片中的人物、物体和日期来查找照片。下一步是在进入后续章节更高级的选项之前，开始练习这些基本功能。\n\
  \n## 实践练习\n\n在这个实践练习中，探索你 iPhone 上的不同功能。拍摄一些你最喜欢地点的照片，整理这些照片，并将它们添加到`照片`应用中的某个相簿里。在本书的\
  \ Facebook 小组中分享，并对他人的照片进行评论。\n\n"
- "# 2. 照片润饰技巧\n\n在上一章中，你学会了如何高效使用 iPhone 上的`照片`应用和`相机`应用来拍照并将它们整理到相簿中。在许多情况下，使用 iPhone\
  \ 拍照是即兴的：你注意到一个有趣的场景或动作，于是拿起手机就拍了下来。不幸的是，使用移动设备拍照的这种即兴性质，增加了出现与色彩、光线和构图相关问题的可能性。这些问题可能会令人沮丧，但你可以使用默认的`照片`应用或从`Apple\
  \ App Store`下载的（免费或付费）各种应用来解决它们。本章的技巧将带你了解对图像进行此类基本修改的步骤。\n\n## 修复照片的色彩\n\n使用工具：`照片`应用、`Adobe\
  \ Lightroom` 应用\n\n拍照时一个常见问题是光照不足，这会导致糟糕的色彩状况。用手机拍照时，这个问题不容易克服，因为你需要携带外部光源和工具来解决。因此，当你使用手机拍照时，可能需要对色彩进行调整。你可以通过更改照片的属性，如色相、饱和度、对比度、色温等来实现。\n\
  \n许多照片编辑应用可以帮助你修改照片的色彩设置。在这里，你将探索如何使用移动设备上的`照片`应用以及可以从`App Store`免费下载的`Adobe Lightroom`应用来修改图像色彩。\n\
  \n### 使用照片应用修改色彩\n\n随着 iPhone iOS 系统的近期更新，`照片`应用提供了基本的照片修改工具，可以帮助你修改照片，而无需安装任何第三方应用。这些工具效果不错，而且你不必在手机里塞满许多应用，特别是如果你的手机存储容量有限。要使用`照片`应用编辑照片的色彩，请按照以下步骤操作：\n\
  \n1.  打开`照片`应用并轻点你想要编辑的照片，使其全尺寸显示。\n2.  轻点屏幕底部的调整图标（在旧版本中为`编辑`）。这将使你进入照片编辑模式，如图\
  \ 2-1 所示。\n\n    ![A450041_1_En_2_Fig1_HTML.jpg](img/A450041_1_En_2_Fig1_HTML.jpg)\n\
  \n    图 2-1  \n    在`照片`应用中进入照片编辑模式\n3.  轻点编辑图标，如图 2-2 所示，以访问`光效`、`颜色`和`黑白`的编辑选项。`光效`选项允许你修改图像中的光线，`颜色`让你修改色彩属性，`黑白`则允许你将照片转换为黑白。\n\
  \n    ![A450041_1_En_2_Fig2_HTML.jpg](img/A450041_1_En_2_Fig2_HTML.jpg)\n\n    图\
  \ 2-2  \n    编辑图标允许你访问`光效`、`颜色`和`黑白`设置\n4.  轻点`颜色`条目以将其展开。\n5.  向左拖动`饱和度`滑块（将饱和度红线向右移动）以增加色彩的饱和度。\n\
  6.  轻点滑块右上角的图标，然后在`颜色`部分选择`对比度`，如图 2-3 所示。\n7.  向左拖动`对比度`滑块（将对比度红线向右移动）以增加色彩的对比度。\n\
  \n    ![A450041_1_En_2_Fig3_HTML.jpg](img/A450041_1_En_2_Fig3_HTML.jpg)\n\n    图\
  \ 2-3  \n    `颜色`调整选项\n\n\n\n### 移除偏色\n\n有时在特定光线条件下拍照，例如阴天、荧光灯或暖光环境中，照片的颜色会受到周围光线的影响，从而产生偏色效果。这种效果可能会破坏图像中的自然色彩。在其他情况下，你可能希望添加偏色来为图像创造特殊效果，例如为图像增添更温暖的效果。要移除或添加偏色，请按照以下步骤操作：\n\
  \n1.  轻点编辑图标，然后选择`颜色`部分。\n2.  轻点颜色滑块右上角的图标。\n3.  在`颜色`部分中轻点`色偏`，如图 2-4 所示。\n\n \
  \  ![A450041_1_En_2_Fig4_HTML.jpg](img/A450041_1_En_2_Fig4_HTML.jpg)\n\n   **图 2-4**\
  \  \n   `颜色`调整下的`色偏`选项\n4.  向左拖动滑块可营造更暖的效果，向右拖动则营造更冷的效果，如图 2-5 所示。\n\n   ![A450041_1_En_2_Fig5_HTML.jpg](img/A450041_1_En_2_Fig5_HTML.jpg)\n\
  \n   **图 2-5**  \n   将滑块向右或向左拖动以控制照片中的偏色效果\n\n### 使用 Adobe Lightroom 进行颜色调整\n\n\
  Adobe Lightroom 是用于照片管理和编辑的最强大的应用程序。它为你提供了修改照片及其细节的高级功能。专业摄影师和照片编辑人员经常使用它。该应用程序的“精简版”可从苹果\
  \ App Store 下载到你的 iPhone 上。要使用该应用程序，你需要创建一个免费的 Adobe ID。免费版本允许你从移动设备上拍摄、整理和分享照片。如果你拥有\
  \ Adobe Creative Cloud 会员资格，则可以访问该应用程序的扩展功能；你可以保存源格式并在移动端和桌面端应用程序之间进行集成。如果你注册的是免费\
  \ Adobe 帐户，则只能使用 Lightroom 移动应用中的基本主要调整功能。\n\n在本技巧中，你将使用 Lightroom 移动应用来编辑照片的颜色。你可以使用类似的步骤在“照片”应用中调整光线。\n\
  \n1.  从苹果 App Store 安装 Adobe Lightroom，安装后打开应用。\n2.  从现有的 Lightroom 图库中选择一张照片，或轻点`相机胶卷`按钮以打开手机现有相册中的图像。你也可以轻点屏幕右下角的相机图标，使用手机相机拍照并将其添加到\
  \ Lightroom 图库中。照片会显示在屏幕上，如图 2-6 所示。\n\n   ![A450041_1_En_2_Fig6_HTML.jpg](img/A450041_1_En_2_Fig6_HTML.jpg)\n\
  \n   **图 2-6**  \n   轻点照片以在其中打开\n3.  轻点屏幕底部的`颜色`图标以打开`颜色`调整选项。\n4.  使用`白平衡`下拉列表可根据周围颜色更改照片中的色调，如图\
  \ 2-7 所示。你可以从现有选项中选择，也可以使用`色温`和`色调`值选择自定义白平衡。\n\n   ![A450041_1_En_2_Fig7_HTML.jpg](img/A450041_1_En_2_Fig7_HTML.jpg)\n\
  \n   **图 2-7**  \n   在`颜色`设置中调整白平衡\n5.  使用`自然饱和度`和`饱和度`滑块来影响照片中的色彩强度和鲜艳度。增加`自然饱和度`值可产生更鲜艳的色彩。`饱和度`用于设置照片中的颜色量；例如，将`饱和度`降低至`-100`会吸收照片中的所有光线，从而产生黑白照片效果，如图\
  \ 2-8 所示。\n\n   ![A450041_1_En_2_Fig8_HTML.jpg](img/A450041_1_En_2_Fig8_HTML.jpg)\n\
  \n   **图 2-8**  \n   将`饱和度`降低至`-100`以产生黑白效果\n\n你也可以通过轻点颜色调整面板左上角的`黑白`按钮，直接将照片转换为黑白。此选项允许你在将照片转换为黑白后，仅修改照片的色温和色调。\n\
  \n### 执行高级颜色修改\n\nAdobe Lightroom 中的颜色调整面板提供了更多高级功能来修改图像的颜色。你可以根据照片中的特定区域更改颜色，或通过选择要修改的颜色范围，同时不影响照片中的其他颜色。\n\
  \n要根据照片中的特定点修改图像颜色，请按照以下步骤操作：\n\n1.  在 Adobe Lightroom 应用中，轻点屏幕底部的`颜色`图标。\n2.  轻点面板中颜色调整值右上角的吸管图标。照片上会出现放大镜，如图\
  \ 2-9 所示。\n\n   ![A450041_1_En_2_Fig9_HTML.jpg](img/A450041_1_En_2_Fig9_HTML.jpg)\n\
  \n   **图 2-9**  \n   出现放大镜，以便你选择要调整的颜色\n3.  将放大镜拖动到你想要更改色调的区域。你会注意到，照片中的颜色会基于此样本发生变化。\n\
  4.  你可以使用面板中的滑块修改颜色，并自定义你的色调。\n\n在此示例中，你将基于一个特定区域修改图像颜色，该区域可能包含多种颜色。此外，你还可以基于特定的选定颜色或多种颜色来修改图像，可以按如下方式单独选择和修改：\n\
  \n1.  在颜色调整面板中，轻点面板右上角的`混合`图标。\n2.  照片中包含的颜色将以色样形式出现在面板顶部。在此颜色范围内，选择你想要修改的颜色；你可以更改其属性，例如`色相`、`饱和度`和`明度`，如图\
  \ 2-10 所示。\n\n   ![A450041_1_En_2_Fig10_HTML.jpg](img/A450041_1_En_2_Fig10_HTML.jpg)\n\
  \n   **图 2-10**  \n   `混合`图标允许你编辑照片中的特定颜色\n3.  你也可以轻点取色器图标。\n4.  在面板底部，选择你想更改的数值：`色相`、`饱和度`或`明度`。\n\
  5.  轻点图像中的颜色进行修改，并拖动以更改其属性。请注意，所选颜色将出现在面板的颜色列表中，以显示哪个颜色已被更改，如图 2-11 所示。\n\n   ![A450041_1_En_2_Fig11_HTML.jpg](img/A450041_1_En_2_Fig11_HTML.jpg)\n\
  \n   **图 2-11**  \n   调整照片中特定颜色的饱和度\n\n\n\n## 裁剪与调整照片尺寸\n\n使用工具：`照片`应用\n\n有时你拍了一张照片，想通过裁剪来聚焦于画面中的主要元素，或去除不需要的部分。你可能还需要旋转或翻转照片。新的\
  \ iOS 系统提供了使用`照片`应用裁剪图像的简便方法。请按以下步骤操作：\n\n![A450041_1_En_2_Fig12_HTML.jpg](img/A450041_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12 – 使用裁剪图标裁剪图像\n\n1. 在`照片`应用中，以全屏视图打开你要裁剪的照片。\n2. 点击底部栏的`编辑`图标，启用编辑模式。\n\
  3. 点击左侧的`裁剪`图标。\n4. 拖拽矩形边缘，调整图像周围的矩形框大小。\n5. 点击`完成`以应用更改并完成裁剪，如图 2-12 所示。\n\n如果你希望将图像裁剪为标准文档比例，可以在裁剪前点击右下角的比例图标进行选择。\n\
  \n你还可以旋转并裁剪图像。为此，请拖拽角度区域，将图像旋转至特定角度；图像将被裁剪并旋转至所需角度，如图 2-13 所示。\n\n![A450041_1_En_2_Fig13_HTML.jpg](img/A450041_1_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13 – 使用裁剪图标旋转图像\n\n如果你想将图像翻转至四个方向中的任意一个，可以点击屏幕左下角的翻转图标。\n\n## 移除背景\n\n使用工具：`Photoshop\
  \ Mix`应用\n\n为了合成多张照片，你可能需要移除图像的背景，使其变为透明，以便将其添加到另一张图像中。有许多应用可以移除背景，例如 `TouchRetouch`、`Eraser`\
  \ 和 `Photoshop Mix`。如果你熟悉桌面版 Adobe Photoshop，你会发现`Photoshop Mix`应用的大部分功能都很熟悉。在本节中，你将探索如何从一张照片中移除背景，并将其放置到另一个背景前。\n\
  \n1. 打开 Adobe `Photoshop Mix`。\n2. 使用你的 Adobe ID（免费或付费订阅）登录。点击屏幕右上角的加号图标，如图 2-14\
  \ 所示。\n\n   ![A450041_1_En_2_Fig14_HTML.jpg](img/A450041_1_En_2_Fig14_HTML.jpg)\n\
  \n   图 2-14 – Adobe Photoshop Mix 项目\n\n3. 点击`图像`，从相机胶卷中打开一张图片，如图 2-15 所示。然后点击`在我的\
  \ iPhone 上选择`。\n\n   ![A450041_1_En_2_Fig15_HTML.jpg](img/A450041_1_En_2_Fig15_HTML.jpg)\n\
  \n   图 2-15 – 向 Photoshop Mix 项目中添加图像\n\n4. 在底部栏中，点击`抠图`以打开选择工具，如图 2-16 所示。\n\n\
  \   ![A450041_1_En_2_Fig16_HTML.jpg](img/A450041_1_En_2_Fig16_HTML.jpg)\n\n   图\
  \ 2-16 – 从应用栏中点击`抠图`图标\n\n5. 点击底部的`智能`工具。\n6. 点击左侧的设置图标。将其设置为`减去`，如图 2-17 所示。\n\n\
  \   ![A450041_1_En_2_Fig17_HTML.jpg](img/A450041_1_En_2_Fig17_HTML.jpg)\n\n   图\
  \ 2-17 – 将`智能`工具设置为`减去`\n\n7. 在天空或你想要移除的背景上拖拽，如图 2-18 所示。\n8. 放大并在小区域上拖拽以将其移除。\n\
  9. 点击右下角的`校正`图标以应用更改。\n\n   ![A450041_1_En_2_Fig18_HTML.jpg](img/A450041_1_En_2_Fig18_HTML.jpg)\n\
  \n   图 2-18 – 移除背景后的图像\n\n移除背景后，你将给原始图像添加一个新背景，操作如下：\n\n1. 点击`图层`图标以在屏幕右侧显示图层。\n\
  2. 点击加号图标添加一个新图层，并选择添加一个新的图像图层，如图 2-19 所示。\n\n   ![A450041_1_En_2_Fig19_HTML.jpg](img/A450041_1_En_2_Fig19_HTML.jpg)\n\
  \n   图 2-19 – 将图像添加为新图层\n\n3. 从相机胶卷中选择新的背景图像。\n4. 长按顶部的背景图层，并将其拖到基础图层下方，如图 2-20\
  \ 所示。\n\n   ![A450041_1_En_2_Fig20_HTML.jpg](img/A450041_1_En_2_Fig20_HTML.jpg)\n\
  \n   图 2-20 – 调整项目中的图层顺序\n\n5. 使用图像周围的矩形框调整其大小，以使其适应背景，如图 2-21 所示。\n\n   ![A450041_1_En_2_Fig21_HTML.jpg](img/A450041_1_En_2_Fig21_HTML.jpg)\n\
  \n   图 2-21 – 调整背景图像大小，使其放置在顶层图像之后\n\n有时由于两张图像间的投影，会出现颜色差异。因此，下一步是调整顶层图像的颜色以匹配背景图像的颜色。\n\
  \n![A450041_1_En_2_Fig22_HTML.jpg](img/A450041_1_En_2_Fig22_HTML.jpg)\n\n图 2-22\
  \ – 使用`色温`图标调整照片的色温\n\n1. 从右侧的`图层`面板中选择顶层图层。\n2. 点击左下角的`调整`图标。\n3. 点击`色温`以打开滑块。\n\
  4. 向右拖拽滑块，为图像增加暖色调，如图 2-22 所示。\n\n## 精通选区\n\n工具：`Photoshop Mix`\n\nAdobe `Photoshop\
  \ Mix` 提供了多种工具，帮助你在 iPhone 上选择对象。这些工具试图模仿桌面版 Adobe Photoshop 应用中的选择方法，如图 2-23 所示。\n\
  \n![A450041_1_En_2_Fig23_HTML.jpg](img/A450041_1_En_2_Fig23_HTML.jpg)\n\n图 2-23\
  \ – 使用套索选择工具\n\n当你选择一张图像进行编辑时，可以点击屏幕底部的`抠图`图标，并选择以下任一工具：\n\n- 点击`自动`图标，自动检测背景并将其移除。请注意，此功能要求背景与图像中的元素之间具有高对比度。\n\
  - 点击`智能`图标，在你想选择的元素上拖拽。该工具可帮助你在拖拽想要选择的区域时进行智能选择。它利用颜色相似性作为选择与移除部分的指南。\n- `基础`图标让你通过拖拽来选择图像中的区域。与`智能`选择不同，该图标让你手动定义需要移除的区域。\n\
  - `套索`工具让你在照片中创建特定区域的选区，你可以用手指或触控笔在想要选择的区域周围绘制。\n- `形状`选择功能让你根据矩形、圆形、三角形或正方形等形状进行选择。\n\
  - 使用`优化`图标来调整所选区域的平滑度及其与背景的融合程度。你也可以点击`重置`图标以恢复到原始版本。\n\n\n\n## 从照片中移除元素\n\n工具：Photoshop\
  \ Fix\n\nAdobe Photoshop Mix 可让你处理图像，但 Photoshop Fix 包含的工具能帮你修复照片中可能出现的问题。在本节中，你将探索如何使用\
  \ Photoshop Fix 从图像中移除不需要的部分。请按照以下步骤操作：\n\n1. 打开 Photoshop Fix 应用，并使用你的 Adobe ID\
  \ 登录。\n2. 点击右上角的加号图标。\n3. 选择获取照片的来源，并选择该照片，如图 2-24 所示。\n\n   ![A450041_1_En_2_Fig24_HTML.jpg](img/A450041_1_En_2_Fig24_HTML.jpg)\n\
  \n   图 2-24\n   在 Photoshop Fix 中向项目添加照片\n4. 点击屏幕底部的“修复”图标。\n5. 从底部工具栏点击“污点修复”图标。\n\
  6. 在你想要移除的区域上进行涂抹。你也可以使用其他工具，如“修补”和“仿制图章”工具，如图 2-25 所示。\n\n   ![A450041_1_En_2_Fig25_HTML.jpg](img/A450041_1_En_2_Fig25_HTML.jpg)\n\
  \n   图 2-25\n   涂抹需要移除的元素\n7. 点击“校正”图标以确认更改。最终结果应如图 2-26 所示。\n\n   ![A450041_1_En_2_Fig26_HTML.jpg](img/A450041_1_En_2_Fig26_HTML.jpg)\n\
  \n   图 2-26\n   移除元素后照片的最终效果\n\n## 摘要\n\n有许多应用可以帮助你在 iPhone 上编辑和修改照片。这些应用的功能各不相同。Adobe\
  \ 应用的移动版本提供了大量应用，可让你在类似于桌面应用的环境中进行照片编辑。你可以使用 Adobe Lightroom 调整照片的颜色和光线，以获得专业效果。你可以使用\
  \ Photoshop Mix 合并不同的照片，并选择照片中的特定部分。要修复照片，例如移除图像中不需要的部分，你可以使用 Photoshop Fix。\n\n\
  ## 练习\n\n在本练习中，用你的 iPhone 拍摄一张照片，并使用 Photoshop Fix 从照片中移除一个物体。保存照片，然后使用 Photoshop\
  \ Mix 将其与另一张照片融合，最后调整最终合成的颜色。\n\n"
- "# 3. 处理摄影项目\n\n最新的数码单反相机让你比以往更轻松地实现不同的摄影技巧。你可以直接在单反相机中应用诸如浅景深和多重曝光等效果，而无需使用 Photoshop\
  \ 或 Lightroom 等电脑应用。虽然 iPhone 相机没有提供与单反相机相同的工具，但好消息是，有大量应用可以帮助你实现类似的效果。\n\n在本章中，你将了解一些你可能在专业数码相机上使用过的摄影技巧。你将尝试使用不同的\
  \ iPhone 应用来创建类似的效果。请记住先通读步骤，然后用自己的照片进行尝试。\n\n## 创建高级 HDR 照片\n\n工具：Snapseed\n\n\
  图 3-1 显示了我用于此示例的原始照片。你可以使用自己的照片按照相同步骤操作。\n\n![A450041_1_En_3_Fig1_HTML.jpg](img/A450041_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n原始照片（© Rafiq Elmansy）\n\n图 3-2 显示了我的最终结果。\n\n![A450041_1_En_3_Fig2_HTML.jpg](img/A450041_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n最终结果\n\n高动态范围（HDR）效果通过呈现比传统图像更广的亮度级别范围，来增加照片中亮部与阴影之间的对比度。这使你能够创作出具有戏剧性效果的照片。正如你之前在本书中学到的，你可以在拍照时直接从“相机”应用创建\
  \ HDR 照片。然而，iPhone 的这项功能仍较为基础，无法让你完全控制效果。例如，你无法控制所应用 HDR 效果的强度或风格。\n\nHDR 照片通常通过合并多张不同曝光级别的照片来产生，以在场景中呈现更广的亮度范围。同时，要获得良好的\
  \ HDR 效果，照片需要包含色彩丰富且具有高对比度亮部与阴影的元素。几年前我参观巴黎卢浮宫时拍摄了本技巧中的这张照片；我想让它的色彩更具深度和戏剧性。因此，我使用了\
  \ Snapseed 应用中的 HDR 功能。\n\n### 步骤 1：准备照片\n\n在应用 HDR 效果之前，你需要确保照片的色彩足够鲜艳、对比度足够高，以获得更好的最终效果。要增加照片的亮度、对比度和饱和度，请按以下步骤操作：\n\
  \n1. 打开 Snapseed 应用。点击 `Open` 并在你的 iPhone 上打开一张图像。\n2. 点击右下角的 `Tools` 按钮，选择 `Tune\
  \ Image`。点击 `Adjustment` 图标，选择 `Brightness`。将顶部的滑块拖至 +20 以增加照片的亮度（见图 3-3）。\n\n \
  \  ![A450041_1_En_3_Fig3_HTML.jpg](img/A450041_1_En_3_Fig3_HTML.jpg)\n\n   图 3-3\n\
  \   在 Snapseed 应用中增加照片亮度\n3. 点击 `Adjustment` 图标，选择 `Contrast`，并将值设为 +50。\n4. 点击\
  \ `Adjustment` 图标，选择 `Saturation`，并将其增加到 +30。将 `Ambiance` 设为 +30（见图 3-4）。\n\n  \
  \ ![A450041_1_En_3_Fig4_HTML.jpg](img/A450041_1_En_3_Fig4_HTML.jpg)\n\n   图 3-4\n\
  \   增加饱和度和氛围值\n5. 点击右下角的 `Apply` 图标以应用效果。\n6. 点击右下角的 `Tools` 按钮，选择 `White Balance`。你将给照片中的色彩增添更暖的效果（见图\
  \ 3-5）。\n\n   ![A450041_1_En_3_Fig5_HTML.jpg](img/A450041_1_En_3_Fig5_HTML.jpg)\n\
  \n   图 3-5\n   点击白平衡设置\n7. 点击 `Adjustment` 图标，选择 `Temperature`。将其设置为更暖的级别，例如 +10。点击\
  \ `Apply` 图标（见图 3-6）。\n\n   ![A450041_1_En_3_Fig6_HTML.jpg](img/A450041_1_En_3_Fig6_HTML.jpg)\n\
  \n   图 3-6\n   通过增加色温设置添加暖调效果\n\n### 步骤 2：应用 HDR 效果\n\n你应该选择适合你照片的 HDR 效果。请按以下步骤操作：\n\
  \n1. 点击 `Tools` 图标，并从滤镜中选择 `HDR Scape`。\n2. 选择 `Strong` 模式，并将其强度增加到 +50（见图 3-7）。\n\
  \n   ![A450041_1_En_3_Fig7_HTML.jpg](img/A450041_1_En_3_Fig7_HTML.jpg)\n\n   图 3-7\n\
  \   应用 HDR 范围效果\n3. 点击 `Adjustment` 图标，选择 `Brightness`，并通过将滑块拖至 +10 使其变得更亮一点。\n\
  4. 点击 `Apply` 图标。\n\n### 步骤 3：应用暗角效果\n\n为了将更多焦点集中在照片中心和玻璃金字塔上，我将添加暗角效果，为照片创建更暗的边缘。你可以使用自己的照片创建类似效果。请按以下步骤操作：\n\
  \n1. 在工具列表中，选择 `Vignette`。将滑块向左拖动，以在照片中创建更暗的边缘（见图 3-8）。\n\n   ![A450041_1_En_3_Fig8_HTML.jpg](img/A450041_1_En_3_Fig8_HTML.jpg)\n\
  \n   图 3-8\n   对照片应用暗角效果\n2. 点击 `Apply` 图标。\n\n\n\n### 第 4 步：添加模糊效果\n\n除了暗角效果之外，你还需要添加一个模糊效果，以增强对照片中心的聚焦。请按照以下步骤操作：\n\
  \n1.  在`滤镜`列表中，选择`镜头模糊`。增加模糊强度，例如设置为`+30`。\n2.  用双指拖拽，调整应用于照片的模糊区域的大小和形状。尽量让模糊只出现在边缘，使照片的中心点保持清晰。\n\
  3.  点击`应用`图标（见图 3-9）。\n   ![A450041_1_En_3_Fig9_HTML.jpg](img/A450041_1_En_3_Fig9_HTML.jpg)\n\
  \   图 3-9：应用模糊效果\n4.  点击`保存`以保存更改。然后选择保存副本以保留原始照片不变。保存照片后，您可以再次打开并编辑修改。如果选择`导出`，照片将被导出，但更改将无法编辑。\n\
  \n### 创建浅景深\n\n使用的工具: `Tadaa`\n\n图 3-10 显示了本示例中使用的原始照片。\n![A450041_1_En_3_Fig10_HTML.jpg](img/A450041_1_En_3_Fig10_HTML.jpg)\n\
  图 3-10：原始图像（© Radwa Khalil）\n\n图 3-11 显示了最终结果。\n![A450041_1_En_3_Fig11_HTML.jpg](img/A450041_1_En_3_Fig11_HTML.jpg)\n\
  图 3-11：最终结果\n\n术语*景深*是指拍摄中的焦点范围。如果照片的清晰区域仅限于较近的物体，而较远的元素显得模糊，则称为**浅景深**。另一方面，如果清晰区域包含照片的大部分区域，则称为**深景深**。单反相机中的景深受相机光圈（`f-stop`）控制，这与镜头开口的直径有关，并表示为分数（`1/F`）。因此，如果镜头开口大，这个数值就会变小，从而导致浅景深。\n\
  \n在 iPhone 上，拍照时光圈的控制是有限的，因为你只能点击你想要聚焦的物体。有时你需要对拍摄的景深进行更多控制。在下面的示例中，照片已经拍好，但我后来决定调整景深。有许多应用程序可以帮助你手动在照片上应用浅景深，例如`Camera+`和`Tadaa`。\n\
  \n在下面的示例中，我想让更近的棋子更清晰，同时模糊远处的物体。另外，我还想给照片应用更暗的边缘，以聚焦拍摄中的主要物体。找一张类似的照片来跟随本示例操作。\n\
  \n### 第 1 步：保护主要物体\n\n在应用模糊效果之前，你应该保护拍摄中的主要物体，使其保持清晰。可以按如下方式使用蒙版效果：\n\n1.  在`Tadaa`应用中打开一张照片，点击底部工具栏中的`模糊`图标。\n\
  2.  点击顶部的`编辑蒙版`图标。\n3.  放大物体，并开始在上面绘制蒙版。在这里，我绘制了靠近相机的棋子（见图 3-12）。\n4.  点击右上角的`应用`图标。\n\
  \   ![A450041_1_En_3_Fig12_HTML.jpg](img/A450041_1_En_3_Fig12_HTML.jpg)\n   图 3-12：在靠近相机的元素上应用蒙版\n\
  \n### 第 2 步：应用模糊效果\n\n现在，对拍摄中远处的物体应用模糊效果。你可以用自己的照片跟随操作。\n\n1.  点击`模糊`图标。您可能需要向左或向右拖拽工具栏以显示其余工具（见图\
  \ 3-13）。\n   ![A450041_1_En_3_Fig13_HTML.jpg](img/A450041_1_En_3_Fig13_HTML.jpg)\n\
  \   图 3-13：拖拽工具栏以显示`模糊`图标\n2.  将模糊类型设置为`圆形`。\n3.  用手指拖拽以调整受保护区域的大小和位置，使其位于照片中近处物体的上方。\n\
  4.  拖拽`模糊`滑块以增加远处物体的模糊效果。模糊程度取决于近处物体与远处物体之间的视觉距离。\n5.  减小`范围`值，以使模糊效果从距清晰物体适当距离处开始（见图\
  \ 3-14）。\n   ![A450041_1_En_3_Fig14_HTML.jpg](img/A450041_1_En_3_Fig14_HTML.jpg)\n\
  \   图 3-14：对照片中的远处物体应用模糊效果\n6.  点击`应用`图标。\n\n### 第 3 步：应用暗角效果\n\n现在，按如下方式使照片边缘变暗以聚焦主要物体：\n\
  \n1.  点击底部工具栏中的`暗角`图标。\n2.  将`强度`拖向左侧，以在照片周围创建合适的边框。\n3.  将`范围`滑块拖到中间点（见图 3-15）。\n\
  4.  点击右上角的`应用`图标。\n   ![A450041_1_En_3_Fig15_HTML.jpg](img/A450041_1_En_3_Fig15_HTML.jpg)\n\
  \   图 3-15：应用暗角效果\n\n### 第 4 步：应用最终滤镜\n\n添加暗角效果后，为照片添加一个滤镜，使其呈现戏剧性的单色效果，步骤如下：\n\n\
  1.  点击`滤镜`图标，选择`查尔斯顿`滤镜。\n2.  将滤镜下方的滑块拖到中间点，以柔化滤镜效果（见图 3-16）。\n3.  点击`应用`图标，然后点击`共享`图标将照片保存到你的`相机胶卷`。\n\
  \   ![A450041_1_En_3_Fig16_HTML.jpg](img/A450041_1_En_3_Fig16_HTML.jpg)\n   图 3-16：应用滤镜效果\n\
  \n### 创建弱光黑白照片\n\n工具：`Adobe Lightroom` 应用, `Adobe Photoshop Mix`\n\n图 3-17 显示了本示例中使用的原始照片。选择一张类似的照片来跟随本示例操作。\n\
  ![A450041_1_En_3_Fig17_HTML.jpg](img/A450041_1_En_3_Fig17_HTML.jpg)\n图 3-17：原始照片（©\
  \ Radwa Khalil）\n\n图 3-18 显示了最终结果。\n![A450041_1_En_3_Fig18_HTML.jpg](img/A450041_1_En_3_Fig18_HTML.jpg)\n\
  图 3-18：最终结果\n\n弱光效果让你可以通过让观看者聚焦于照片中被照亮的部分来创造戏剧性的效果。通常，它在人像摄影中效果很好，因为它能强调面部表情。为了确保弱光照片的高对比度，请考虑以下提示：\n\
  \n-   在深色背景下拍照，例如纯黑色。你可以在拍摄对象的背景中使用黑色墙壁或纸张。\n-   将照片中的物体数量限制为一个物体或一个人，以确保精确对焦，并在编辑时能够控制照片的亮部和暗部区域。\n\
  -   尽量使用柔和的弱光源，使其朝向拍摄中的人物或物体。\n-   尽量使用三脚架，以确保用 iPhone 拍摄时画面稳定。\n\n在下面的示例中，照片是在黑色背景下使用柔和光线拍摄的，这使其适合制作弱光效果。我使用`Photoshop\
  \ Mix`通过图层和混合模式来改善白色区域。\n\n\n\n### 步骤 1：将照片转换为黑白\n\n首先，将照片导入 Lightroom 应用中，将其转换为黑白，然后调整整体的曝光度、对比度、光线和阴影。\n\
  \n1. 在 Adobe Lightroom 应用中打开一张照片。\n2. 点击 `颜色` 图标。点击菜单左上角的 `黑白` 图标。这会将图像转换为黑白。\n\
  3. 将色温设置为 `+40`，色调设置为 `+45`（见图 3-19）。\n\n   ![A450041_1_En_3_Fig19_HTML.jpg](img/A450041_1_En_3_Fig19_HTML.jpg)\n\
  \n   **图 3-19** 将照片转换为黑白，并提高色温和色调设置\n\n4. 点击 `光线` 图标，然后将 `曝光度` 设置为 `-1`， `对比度` 设置为\
  \ `+100`， `高光` 设置为 `+5`， `阴影` 设置为 `-85`， `白色色阶` 设置为 `+55`， `黑色色阶` 设置为 `-55`（图 3-20）。\n\
  \n   ![A450041_1_En_3_Fig20_HTML.jpg](img/A450041_1_En_3_Fig20_HTML.jpg)\n\n   **图\
  \ 3-20** 调整光线设置以营造更具戏剧性的光影效果\n\n5. 点击 `效果` 图标，将 `清晰度` 设置为 `-45`，以在面部细节上产生平滑效果。\n\
  6. 将 `暗角数量` 设置为 `-50`，以增加拍摄对象边缘周围的黑色（见图 3-21）。\n\n   ![A450041_1_En_3_Fig21_HTML.jpg](img/A450041_1_En_3_Fig21_HTML.jpg)\n\
  \n   **图 3-21** 降低清晰度以创造柔和效果，并在边缘应用暗角效果\n\n### 步骤 2：聚焦于面部\n\n你可以使用选择性调整来修改照片的某些部分，而不会影响面部。请按照以下步骤操作：\n\
  \n1. 点击 `选择性` 图标，对照片的右侧进行局部调整。\n2. 从左侧工具中点击 `线性渐变` 图标，拖动创建一个从照片右侧到左侧、在面部起始处结束的蒙版（见图\
  \ 3-22）。\n\n   ![A450041_1_En_3_Fig22_HTML.jpg](img/A450041_1_En_3_Fig22_HTML.jpg)\n\
  \n   **图 3-22** 对照片的右侧部分应用选择性调整\n\n3. 点击 `亮度` 图标，将曝光度设置为 `-1.60`，以减少对左侧面部的破坏（见图\
  \ 3-23）。\n4. 点击右下角的 `应用` 图标。\n5. 点击 `分享` 图标，然后点击 `存储到相机胶卷`。\n6. 将质量设置为最高可用选项。\n\n\
  \   ![A450041_1_En_3_Fig23_HTML.jpg](img/A450041_1_En_3_Fig23_HTML.jpg)\n\n   **图\
  \ 3-23** 降低图像右侧部分的曝光度\n\n### 步骤 3：改善高光\n\n你可能希望增强照片中的高光部分，以增加对面部的强调效果。为此，你可以使用 Photoshop\
  \ Mix 来设置混合模式，如下所示：\n\n1. 在 Photoshop Mix 中点击 `+` 图标。选择 `图像`，然后导航到 `相机胶卷` 找到你刚刚保存的照片。\n\
  2. 双击左侧的图层以打开其 `属性` 面板。如果看不到图层，请点击右上角的图标以显示应用工具。\n3. 点击 `混合` 图标，将混合模式设置为 `滤色`。点击\
  \ `应用` 图标。\n4. 点击 `外观` 图标以应用滤镜。选择 `肖像`，然后点击 `应用` 图标。\n\n## 创建高调照片\n\n工具： Adobe Lightroom\
  \ 应用、Photoshop Mix 应用、Blur 应用\n\n图 3-24 显示了我的原始照片。\n\n![A450041_1_En_3_Fig24_HTML.jpg](img/A450041_1_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** 原始照片（© Radwa Khalil）\n\n图 3-25 显示了我的最终结果。\n\n![A450041_1_En_3_Fig25_HTML.jpg](img/A450041_1_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 最终结果\n\n与低调照片相比，高调照片降低了照片中的照明比率和对比度水平，以创造更自然的光线。该技术最初是为无法显示对比度范围的屏幕开发的，但现在被用来在照片上创造出简约时尚的效果。\n\
  \n要拍出好的高调照片，画面中的物体数量应尽量少，以便你可以使用不同的应用程序轻松修改它们。尽量在自然环境中、背景明亮处拍摄，以尽量减少照片中的阴影。\n\n\
  ### 步骤 1：转换为黑白\n\n首先，你可以使用 Lightroom 应用将照片转换为黑白，并使用曲线增加画面中的白色区域。\n\n1. 在 Lightroom\
  \ 应用中打开图像。点击 `颜色` 图标。然后，点击 `黑白` 图标将照片转换为黑白。将 `色温` 滑块向右拖动（见图 3-26）。\n\n   ![A450041_1_En_3_Fig26_HTML.jpg](img/A450041_1_En_3_Fig26_HTML.jpg)\n\
  \n   **图 3-26** 将照片转换为黑白\n\n2. 点击 `光线` 图标。点击 `曲线` 图标来设置曲线，增加明亮区域并增强黑色的强度，同时保持两者之间的平滑过渡。然后点击\
  \ `完成`（见图 3-27）。\n\n   ![A450041_1_En_3_Fig27_HTML.jpg](img/A450041_1_En_3_Fig27_HTML.jpg)\n\
  \n   **图 3-27** 使用曲线工具增加照片的对比度\n\n3. 将 `高光` 滑块拖到最右边。稍微增加阴影、白色色阶和黑色色阶（图 3-28）。\n\n\
  \   ![A450041_1_En_3_Fig28_HTML.jpg](img/A450041_1_En_3_Fig28_HTML.jpg)\n\n   **图\
  \ 3-28** 增加照片中的高光、阴影、白色色阶和黑色色阶设置\n\n4. 点击 `效果` 图标，将 `清晰度` 降低到 `-65`，以在照片上创建平滑的边缘（见图\
  \ 3-29）。\n\n   ![A450041_1_En_3_Fig29_HTML.jpg](img/A450041_1_En_3_Fig29_HTML.jpg)\n\
  \n   **图 3-29** 降低清晰度以创造平滑效果\n\n5. 点击 `分享` 图标，然后将图像保存到你的 `相机胶卷`。\n\n### 步骤 2：创建模糊版本\n\
  \n为了给照片添加柔和效果，你可以为你刚刚修改过的照片创建一个模糊版本。请按照以下步骤操作：\n\n1. 在 Blur 应用中打开图像。点击工具栏右侧的 `调整`\
  \ 图标。设置一个低值，例如 `10`。\n2. 点击 `模糊` 图标，涂抹照片中的明亮区域（见图 3-30）。\n3. 点击 `保存` 图标，将照片保存到你的\
  \ `相机胶卷`。\n\n   ![A450041_1_En_3_Fig30_HTML.jpg](img/A450041_1_En_3_Fig30_HTML.jpg)\n\
  \n   **图 3-30** 使用 Blur 应用画笔涂抹，以增强照片的模糊效果\n\n### 步骤 3：完成高调照片\n\n现在，你可以在 Photoshop\
  \ Mix 中添加这两张照片，并使用图层不透明度和混合模式来混合照片的清晰版和模糊版。请按照以下步骤操作：\n\n1. 打开 Photoshop Mix 应用。点击右上角的\
  \ `+` 图标来创建一个项目。从 `相机胶卷` 中添加第一张图像。\n2. 点击 `+` 图标添加一个新图层。选择添加图像，然后导航到模糊照片并将其添加进去（见图\
  \ 3-31）。\n\n   ![A450041_1_En_3_Fig31_HTML.jpg](img/A450041_1_En_3_Fig31_HTML.jpg)\n\
  \n   **图 3-31** 将照片的模糊版本添加到第一张照片上\n\n3. 双击顶部图层以打开其属性。将 `不透明度` 设置为 `65%`，并将混合模式设置为\
  \ `叠加`（见图 3-32）。\n4. 点击 `分享` 图标，保存照片。\n\n   ![A450041_1_En_3_Fig32_HTML.jpg](img/A450041_1_En_3_Fig32_HTML.jpg)\n\
  \n   **图 3-32** 更改模糊图层的不透明度和混合模式\n\n\n\n## 创建双重曝光照片\n\n使用工具：`Pic Blender`\n\n图 3-33\
  \ 展示的是我的原始照片。\n\n![A450041_1_En_3_Fig33_HTML.jpg](img/A450041_1_En_3_Fig33_HTML.jpg)\n\
  \n图 3-33 - 原始照片 (© Radwa Khalil)\n\n图 3-34 展示的是我的最终效果。\n\n![A450041_1_En_3_Fig34_HTML.jpg](img/A450041_1_En_3_Fig34_HTML.jpg)\n\
  \n图 3-34 - 最终效果\n\n双重曝光，也称为多重曝光效果，允许你将两张或更多照片合成一张经过处理的图片。它让你能够融合照片，以显示每张照片的细节，即利用一张照片来遮罩另一张照片。基本上，是一张图像中的明暗部分被用来显示另一张（或更多）图像中的细节。随着数码相机功能的迅猛发展，摄影师可以直接在单反相机中创建双重曝光效果，这项技术在过去几年中变得流行。\n\
  \n双重曝光技术也可以在拍摄后使用诸如 Adobe Photoshop 之类的照片编辑应用程序来创建，其效果能与相机直接拍摄的相媲美。此外，它还能让你对最终效果中使用的效果和风格有更多的控制。\n\
  \n此外，还有许多 iPhone 应用可以帮助你拍摄双重曝光照片，例如 `Union`、`MultiExpo`、`Superimpose`、`Pic Blender`、`Pixlr`、`Fused`\
  \ 和 `Snapseed`。在本技巧中，你将使用 `Pic Blender` 应用来合并两张照片以构建双重曝光效果。为了获得良好的效果，请确保选择一张对比度强、细节较少的照片作为基础照片，再选取第二张包含树木、建筑物等细节的照片。\n\
  \n### 第 1 步：准备基础照片\n\n在直接应用双重曝光效果之前，你需要先调整照片，以增强照片中明暗之间的对比度。\n\n1. 打开 `Pic Bender`\
  \ 应用，并选择一张高对比度的照片作为基础照片。\n2. 点击“调整”图标，然后点击“对比度”图标。将滑块向右拖动以增加对比度。这将增加照片中的阴影和高光区域，并减少中间色调（见图\
  \ 3-35）。\n\n![A450041_1_En_3_Fig35_HTML.jpg](img/A450041_1_En_3_Fig35_HTML.jpg)\n\
  \n图 3-35 - 调整黑白照片的对比度\n\n### 第 2 步：合并照片\n\n现在，你将使用应用中的一张照片作为第二张图像，与基础照片进行混合。然后，你将修改第二张图像以使其与原始图像匹配。\n\
  \n1. 点击工具栏左侧的“照片”图标以添加第二张照片。\n2. 你可以点击“相机”图标拍摄一张新照片，或者从现有照片中选择一张。浏览并选出一张树木照片，然后选择第三张（见图\
  \ 3-36）。\n\n![A450041_1_En_3_Fig36_HTML.jpg](img/A450041_1_En_3_Fig36_HTML.jpg)\n\
  \n图 3-36 - 选择一张树木照片作为与原始照片混合的第二张照片\n3. 用两根手指翻转你的树木照片，并将其放大以填满画布。\n4. 将混合模式设置为“滤色”。将滑块拖到最右侧（见图\
  \ 3-37）。\n5. 点击“应用”图标。\n\n![A450041_1_En_3_Fig37_HTML.jpg](img/A450041_1_En_3_Fig37_HTML.jpg)\n\
  \n图 3-37 - 对树木照片应用混合模式\n\n### 第 3 步：增强双重曝光效果\n\n应用双重曝光效果后，你将给照片添加一个散景效果，为画面增添艺术感。\n\
  \n1. 点击“效果”图标。选择第四张名为“Bokeh”的图像。\n2. 将混合模式设置为“滤色”，并将滑块稍微向左拖动以增加图像透明度（见图 3-38）。\n\
  \n![A450041_1_En_3_Fig38_HTML.jpg](img/A450041_1_En_3_Fig38_HTML.jpg)\n\n图 3-38\
  \ - 为照片添加散景效果\n3. 点击“应用”图标。\n4. 点击“滤镜”图标，点击“胶片感光”图标，然后选择第一个效果。\n5. 将滑块向左拖动以稍微减弱效果（见图\
  \ 3-39）。\n6. 点击“应用”图标。\n7. 点击“完成”。\n8. 选择所需的分辨率，然后点击“保存”。\n\n![A450041_1_En_3_Fig39_HTML.jpg](img/A450041_1_En_3_Fig39_HTML.jpg)\n\
  \n图 3-39 - 应用胶片感光滤镜效果\n\n## 总结\n\n尽管 iPhone 相机不像专业单反相机那样包含弱光、强光、`HDR` 和双重曝光效果等高级功能，但你仍然可以通过使用从\
  \ App Store 下载的各种免费和付费应用来实现这些技术。你还可以通过使用多个应用程序来扩展这些功能以改善最终效果。本章中的技巧涵盖了你可以使用 iPhone\
  \ 应用的一些摄影效果。\n\n## 练习实践\n\n首先，拍摄可用于本章技巧的照片。你也可以使用 iPhone 照片库中的照片。从应用这些效果开始，并练习不同的设置和风格。\n\
  \n"
- "# 掌握照片编辑与应用效果\n\n在上一章中，你学习了如何创建诸如 `HDR` 照片和浅景深等效果。这些技巧仅仅是开始。你可以使用 Apple App Store\
  \ 中的应用为你的照片添加滤镜、边框和风格。你还可以处理多张照片以创建特定的场景。本章中的每个技巧都列出了我所使用的应用；你可以使用相同的应用，也可以选择类似的应用。\n\
  \n## 制作诱人的美食照片拼贴\n\n使用工具：`Adobe Lightroom` 应用、`Moldiv` 应用\n\n在本技巧中，你将学习以下内容：\n\n\
  - 如何修改照片的颜色和光线\n- 如何创建多张照片的照片网格或拼贴画\n- 如何为照片添加纹理\n\n图 4-1、图 4-2 和图 4-3 展示了我使用的原始照片。请尝试寻找类似的内容，以便你能跟着操作。\n\
  \n![A450041_1_En_4_Fig3_HTML.jpg](img/A450041_1_En_4_Fig3_HTML.jpg)\n\n图 4-3 - 第三张照片\
  \ (© Radwa Khalil)\n\n![A450041_1_En_4_Fig2_HTML.jpg](img/A450041_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 - 第二张照片 (© Radwa Khalil)\n\n![A450041_1_En_4_Fig1_HTML.jpg](img/A450041_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 - 第一张照片 (© Radwa Khalil)\n\n图 4-4 展示的是我的最终效果。\n\n![A450041_1_En_4_Fig4_HTML.jpg](img/A450041_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4 - 最终效果\n\n常言道，一图胜千言。而一张照片拼贴画能传达的信息更多。将照片排列成拼贴画或网格，可以让你讲述一个故事；这是一种展示同一主题不同照片以强调你观点的绝佳方式。虽然有众多应用可以帮助你创建照片拼贴画，但即使在拍摄之前，为你的项目做好准备也很重要。每个拼贴画都应该有一个主题；换句话说，照片应该在特定方面有所关联。以下是一些示例：\n\
  \n- **色彩主题拼贴**：在此主题中，照片的主题和地点可能各不相同，但它们通过相同的颜色（例如蓝色的大海、蓝色的天空和蓝色的石头）统一起来。\n- **物体主题拼贴**：此类拼贴中的所有照片都展示相同或相关的物体，例如水果、树叶、花朵或人物。\n\
  - **叙事性拼贴**：这种拼贴用于讲述一个故事或展示同一场景的连续照片。例如，它可以包括孩子们玩特定游戏，并展示他们玩耍时的四个或更多反应镜头。\n\n在这个例子中，我将展示如何将一系列美食摄影照片组织成拼贴风格。你将首先学习在\
  \ `Adobe Lightroom` 应用中修改照片的颜色，然后转到 `Moldiv` 应用创建最终的拼贴效果。\n\n\n\n### 第一步：修改照片颜色\n\
  \n在 Lightroom 应用中，你将提高照片的鲜艳度并增强其清晰度，以使所有拍摄照片的颜色水平保持一致。\n\n1.  在 Adobe Lightroom\
  \ 应用中，点击 `Camera Roll` 图标，然后选择你想要使用的照片（见图 4-5）。\n\n    ![A450041_1_En_4_Fig5_HTML.jpg](img/A450041_1_En_4_Fig5_HTML.jpg)\n\
  \n    图 4-5：在 Adobe Lightroom 应用中打开一张照片\n\n2.  点击 `Color` 图标，并将 `Vibrance` 滑块向右拖动，以增加色彩的鲜艳度（见图\
  \ 4-6）。\n\n    ![A450041_1_En_4_Fig6_HTML.jpg](img/A450041_1_En_4_Fig6_HTML.jpg)\n\
  \n    图 4-6：增加照片的 `Vibrance` 值\n\n3.  点击 `Effects` 图标，并将 `Clarity` 滑块稍微向右拖动，以增加照片的清晰度（见图\
  \ 4-7）。\n\n    ![A450041_1_En_4_Fig7_HTML.jpg](img/A450041_1_En_4_Fig7_HTML.jpg)\n\
  \n    图 4-7：增加 `Clarity` 值\n\n4.  照片颜色修改完成后，点击 `Share` 图标，然后选择 `Save to Camera Roll`。对于\
  \ `Image Size`，选择 `Maximum Available`。\n\n### 第二步：构建照片拼贴\n\n按照以下步骤构建照片拼贴：\n\n1.\
  \  打开 Moldiv 应用，选择 `Collage`，然后挑选一种照片拼贴布局。在本示例中，选择第二行第三个布局（见图 4-8）。\n\n    ![A450041_1_En_4_Fig8_HTML.jpg](img/A450041_1_En_4_Fig8_HTML.jpg)\n\
  \n    图 4-8：选择一种拼贴样式\n\n2.  点击其中一个网格，然后选择 `Albums`。浏览到第一张照片并将其添加进来（见图 4-9）。\n\n\
  \    ![A450041_1_En_4_Fig9_HTML.jpg](img/A450041_1_En_4_Fig9_HTML.jpg)\n\n    图\
  \ 4-9：从手机相册将照片添加到拼贴部分\n\n3.  重复这些步骤，将另外两张照片添加到网格的其他区域中（见图 4-10）。\n\n    ![A450041_1_En_4_Fig10_HTML.jpg](img/A450041_1_En_4_Fig10_HTML.jpg)\n\
  \n    图 4-10：选择要添加到拼贴网格的照片\n\n4.  用两根手指拖拽来调整每张图像的大小和焦点。尽量将焦点放在照片的主要主体上，使网格看起来更有趣（见图\
  \ 4-11）。\n\n    ![A450041_1_En_4_Fig11_HTML.jpg](img/A450041_1_En_4_Fig11_HTML.jpg)\n\
  \n    图 4-11：添加了三张照片后的拼贴\n\n### 第三步：保存照片拼贴\n\n按照以下步骤保存你的照片拼贴：\n\n1.  点击工具栏右下角的 `Share`\
  \ 图标。\n2.  将尺寸设置为 `Maximum`。拼贴图将以其全尺寸保存到你的相机胶卷中（见图 4-12）。\n\n    ![A450041_1_En_4_Fig12_HTML.jpg](img/A450041_1_En_4_Fig12_HTML.jpg)\n\
  \n    图 4-12：以最大尺寸保存拼贴\n\n3.  点击 `Share` 图标，然后点击 `Edit` 继续下一步。\n\n### 第四步：添加纹理效果\n\
  \n按照以下步骤添加纹理效果：\n\n1.  在共享菜单中点击 `Edit` 图标。如果你关闭了它，可以从应用首页点击 `Edit` 图标，然后找到照片拼贴（见图\
  \ 4-13）。\n\n    ![A450041_1_En_4_Fig13_HTML.jpg](img/A450041_1_En_4_Fig13_HTML.jpg)\n\
  \n    图 4-13：在共享菜单中点击 `Edit` 图标\n\n2.  点击 `Filters` 图标打开应用滤镜。点击 `Basic` 滤镜，然后选择\
  \ `Joker`（见图 4-14）。\n\n    ![A450041_1_En_4_Fig14_HTML.jpg](img/A450041_1_En_4_Fig14_HTML.jpg)\n\
  \n    图 4-14：选择 `Joker` 滤镜应用于拼贴\n\n3.  点击右下角的 `Apply` 图标。\n\n## 为你的照片添加复古风格\n\n\
  **使用的工具：** Snapseed、PicsArt 和 Photofox\n\n在本章中，你将了解以下内容：\n\n-   如何创建复古效果，然后对其进行优化\n\
  -   如何添加诸如镜头光晕等滤镜\n\n图 4-15 显示了我使用的原始照片。\n\n![A450041_1_En_4_Fig15_HTML.jpg](img/A450041_1_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15：原始照片（© Rafiq Elmansy）\n\n图 4-16 显示的是最终结果。\n\n![A450041_1_En_4_Fig16_HTML.jpg](img/A450041_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16：最终结果\n\n复古照片是唤起怀旧感的好方法。虽然你无法直接在数码单反相机上创建复古效果，但可以在台式电脑上使用 Adobe Photoshop\
  \ 等照片编辑应用程序来创建。在 iPhone 上，你可以使用各种应用程序创建复古效果。例如，Instagram 允许你在拍照后、与粉丝分享之前应用复古滤镜。\n\
  \n在本技巧中，你将探索如何利用各种应用程序将照片转换为复古风格。我使用了女儿的照片，这张照片是在我们上次去吉萨金字塔旅行时拍摄的。\n\n### 第一步：应用复古效果\n\
  \n按照以下步骤应用复古效果：\n\n1.  在 Photofox 应用中打开照片。点击底部工具栏中的 `Image` 图标。\n2.  点击底部工具栏中的 `Tone`\
  \ 图标，然后在 `Filters` 列表中选择 `E58` 滤镜，以创建温暖的复古效果（见图 4-17）。\n\n    ![A450041_1_En_4_Fig17_HTML.jpg](img/A450041_1_En_4_Fig17_HTML.jpg)\n\
  \n    图 4-17：应用 Photofox 的 `E58` 滤镜\n\n3.  点击 `Share` 图标，然后将照片保存到你的相机胶卷。\n\n###\
  \ 第二步：添加镜头光晕\n\n按照以下步骤添加一些镜头光晕：\n\n1.  在 PicsArt 应用中打开照片。然后点击加号图标添加图像，并选择 `Edit`。\n\
  2.  将工具栏向左拖动，然后选择 `Lens Flare`（见图 4-18）。\n\n    ![A450041_1_En_4_Fig18_HTML.jpg](img/A450041_1_En_4_Fig18_HTML.jpg)\n\
  \n    图 4-18：添加 `Lens Flare` 效果\n\n3.  从列表中选择一个合适的镜头光晕效果。\n4.  将 `Hue` 设置为 `0`，`Opacity`\
  \ 设置为 `48`，`Blend` 设置为 `Add`（见图 4-19）。\n\n    ![A450041_1_En_4_Fig19_HTML.jpg](img/A450041_1_En_4_Fig19_HTML.jpg)\n\
  \n    图 4-19：调整镜头光晕的位置和强度\n\n5.  点击右上角的 `Next` 图标，然后将照片保存到你的相机胶卷。\n\n### 第三步：优化复古效果\n\
  \n按照以下步骤优化复古效果：\n\n1.  在 Snapseed 应用中打开照片，然后从工具中选择 `Vintage` 滤镜。\n2.  选择照片底部的滤镜编号\
  \ 6，以添加蓝色渐变（见图 4-20）。\n\n    ![A450041_1_En_4_Fig20_HTML.jpg](img/A450041_1_En_4_Fig20_HTML.jpg)\n\
  \n    图 4-20：在 Snapseed 中添加复古滤镜\n\n3.  点击 `Apply` 图标。\n4.  从 `Tools` 中选择 `Grunge`\
  \ 滤镜。选择第五个磨损效果。\n5.  点击 `Adjustment` 图标，然后选择 `Texture Strength`。将该值设置为 `15`（见图 4-21）。\n\
  \n    ![A450041_1_En_4_Fig21_HTML.jpg](img/A450041_1_En_4_Fig21_HTML.jpg)\n\n  \
  \  图 4-21：添加磨损效果并进行调整\n\n6.  点击 `Apply` 图标。\n7.  点击 `Share` 图标并选择 `Save a Copy`，以在不替换原始照片的情况下保存照片。\n\
  \n\n\n## 创建相框\n\n使用工具：`Tadaa`、`Laminar Pro` 和 `Photoshop Mix`\n\n在本节中，您将学习以下内容：\n\
  \n- 如何将照片转换为复古风格\n- 如何为照片应用不同类型的相框\n- 如何将两张或更多照片合成处理\n\n有很多应用程序可以为您的照片创建相框。在这个技巧中，我使用了一张几年前在黎巴嫩旅行时拍摄的照片。我想用我妻子拍摄的一张树干照片为它制作一个定制相框。但首先，在应用相框之前，我会先添加一个复古色彩效果。\n\
  \n图 4-22 和图 4-23 展示了原始照片。\n\n![A450041_1_En_4_Fig23_HTML.jpg](img/A450041_1_En_4_Fig23_HTML.jpg)\n\
  \n图 4-23\n\n原始纹理照片（© Radwa Khalil）\n\n![A450041_1_En_4_Fig22_HTML.jpg](img/A450041_1_En_4_Fig22_HTML.jpg)\n\
  \n图 4-22\n\n原始照片（© Rafiq Elmansy）\n\n图 4-24 展示了最终结果。\n\n![A450041_1_En_4_Fig24_HTML.jpg](img/A450041_1_En_4_Fig24_HTML.jpg)\n\
  \n图 4-24\n\n最终结果\n\n### 步骤 1：为照片添加复古效果\n\n按照以下步骤为照片添加复古效果：\n\n1.  在 `Tadaa` 应用中打开一张照片。\n\
  2.  点击滤镜图标，选择 Shoreditch 滤镜。然后点击应用图标（见图 4-25）。\n\n    ![A450041_1_En_4_Fig25_HTML.jpg](img/A450041_1_En_4_Fig25_HTML.jpg)\n\
  \n    图 4-25\n\n    在 `Tadaa` 应用中应用 Shoreditch 滤镜\n3.  点击相框图标，选择一个脏污风格相框，然后点击应用图标（见图\
  \ 4-26）。\n4.  将照片保存到相机胶卷文件夹中。\n\n    ![A450041_1_En_4_Fig26_HTML.jpg](img/A450041_1_En_4_Fig26_HTML.jpg)\n\
  \n    图 4-26\n\n    在 `Tadaa` 应用中应用复古相框\n\n### 步骤 2：应用更多相框\n\n按照以下步骤应用更多相框：\n\n\
  1.  在 `Laminar` 应用中，打开上一步保存的照片。\n2.  点击效果图标，然后选择边框。\n3.  选择 Snap and Stack 边框，然后点击应用图标（见图\
  \ 4-27）。\n\n    ![A450041_1_En_4_Fig27_HTML.jpg](img/A450041_1_En_4_Fig27_HTML.jpg)\n\
  \n    图 4-27\n\n    在 `Laminar` 应用中应用 Snap and Stack 边框。\n4.  点击分享和导出图标。将输出格式设置为\
  \ `PNG`（这将创建一张透明照片），然后从保存到菜单中选择图库。\n\n### 步骤 3：添加相框背景纹理\n\n要添加相框背景纹理，请按以下步骤操作：\n\
  \n1.  在 `Photoshop Mix` 中打开树干纹理图片。\n2.  点击加号图标添加一个新图层。选择相框图像添加到新图层。\n3.  用手指调整上层图像的大小，使其与画布尺寸匹配（见图\
  \ 4-28）。\n\n    ![A450041_1_En_4_Fig28_HTML.jpg](img/A450041_1_En_4_Fig28_HTML.jpg)\n\
  \n    图 4-28\n\n    在 `Photoshop Mix` 中将照片添加到树干纹理上\n4.  点击外观，然后选择 Punch 滤镜。\n5.\
  \  点击屏幕右侧的编辑工具，然后选择智能选取。\n6.  点击羽化图标，并向右拖动以增加羽化值。\n7.  涂抹照片的中间部分，使效果保留在照片中部，并从边缘去除效果（见图\
  \ 4-29）。\n\n    ![A450041_1_En_4_Fig29_HTML.jpg](img/A450041_1_En_4_Fig29_HTML.jpg)\n\
  \n    图 4-29\n\n    使用智能选取优化相框外观\n\n## 创建胶片条纹效果\n\n使用工具：`Snapseed`、`Camera Awesome`\n\
  \n在这个技巧中，您将学习以下内容：\n\n- 如何将照片转换为黑白\n- 如何将照片转换为单色\n- 如何裁剪照片并添加纹理\n- 如何为照片添加胶片条纹效果\n\
  \n图 4-30 展示了我使用的原始照片。\n\n![A450041_1_En_4_Fig30_HTML.jpg](img/A450041_1_En_4_Fig30_HTML.jpg)\n\
  \n图 4-30\n\n原始照片\n\n图 4-31 展示了最终结果。\n\n![A450041_1_En_4_Fig31_HTML.jpg](img/A450041_1_En_4_Fig31_HTML.jpg)\n\
  \n图 4-31\n\n最终结果\n\n照片编辑中的一个流行技巧是将照片变成老式风格，并将其更改为胶片条形状。要做到这一点，首先使用 `Snapseed` 应用将照片转换为黑白并赋予其单色效果，使其适合最终效果。然后，您可以使用\
  \ `Camera Awesome` 应用，在其中裁剪照片以适应胶片条内部。在同一个应用中，您可以为照片应用棕褐色滤镜，然后是纹理，最后是胶片条。\n\n###\
  \ 步骤 1：将照片转换为单色\n\n按照以下步骤将照片转换为单色：\n\n1.  在 `Snapseed` 应用中打开照片。\n2.  点击工具图标，选择黑白。选择一个能确保照片中所有元素清晰且对比分明的色调（见图\
  \ 4-32）。\n\n    ![A450041_1_En_4_Fig32_HTML.jpg](img/A450041_1_En_4_Fig32_HTML.jpg)\n\
  \n    图 4-32\n\n    将照片转换为黑白\n3.  点击应用图标。\n4.  在工具列表中，选择复古滤镜，并选择一个棕色调的滤镜。点击应用图标（见图\
  \ 4-33）。\n\n    ![A450041_1_En_4_Fig33_HTML.jpg](img/A450041_1_En_4_Fig33_HTML.jpg)\n\
  \n    图 4-33\n\n    为照片添加复古色彩\n\n### 步骤 2：优化照片并添加相框\n\n按照以下步骤优化照片并添加相框：\n\n1.  在\
  \ `Camera Awesome` 应用中，点击相机按钮左侧的照片图标。点击加号图标，从您的图库中添加照片。\n2.  点击以从图库中打开图像，然后点击照片进行编辑。\n\
  3.  点击变换图标，将裁剪尺寸设置为正方形。然后点击完成。\n4.  点击滤镜，应用棕褐色滤镜，然后点击完成（见图 4-34）。\n\n    ![A450041_1_En_4_Fig34_HTML.jpg](img/A450041_1_En_4_Fig34_HTML.jpg)\n\
  \n    图 4-34\n\n    在 `Camera Awesome` 中应用棕褐色滤镜\n5.  在纹理部分，选择家庭相册滤镜，然后点击完成应用。\n\
  6.  点击相框图标，选择 Sprockets 相框。您也可以应用其他类似胶片的相框。然后点击完成（见图 4-35）。\n7.  在底部工具栏中，点击导出到相机胶卷图标。\n\
  \n    ![A450041_1_En_4_Fig35_HTML.jpg](img/A450041_1_En_4_Fig35_HTML.jpg)\n\n  \
  \  图 4-35\n\n    为照片添加胶片相框\n\n## 使用色彩突出元素\n\n使用工具：`Photoshop Mix` 和 `Photo Splash`\n\
  \n在这个技巧中，您将学习以下内容：\n\n- 如何使用图层修复照片中的问题\n- 如何将照片转换为黑白\n- 如何给照片的一部分上色或去色\n\n图 4-36\
  \ 展示了我使用的原始照片。\n\n![A450041_1_En_4_Fig36_HTML.jpg](img/A450041_1_En_4_Fig36_HTML.jpg)\n\
  \n图 4-36\n\n原始照片\n\n图 4-37 展示了最终结果。\n\n![A450041_1_En_4_Fig37_HTML.jpg](img/A450041_1_En_4_Fig37_HTML.jpg)\n\
  \n图 4-37\n\n最终结果\n\n有时您需要根据照片的构图来强调某个对象。这可以通过不同的方法实现，例如使用色彩。一种有助于将焦点集中在画面中特定元素上的效果是，将某个对象着色，同时将照片的其余部分转换为黑白。在这个技巧中，我有一张图坦卡蒙面具的海报照片，我想突出画面中的面具。\n\
  \n不幸的是，照片中左侧墙壁的光线相比右侧非常曝光过度。因此，我将演示如何使用 `Photoshop Mix` 将左侧墙壁替换为右侧的副本。然后，我将在\n\n\
  \n\n### 步骤 1：修复照片问题\n\n请按照以下步骤修复照片问题：\n\n1. 在`Photoshop Mix`中打开照片。你需要将墙壁的左侧替换为右侧的副本。\n\
  2. 点击图层以打开其属性菜单。然后，点击`复制`（见图 4-38）。\n\n   ![A450041_1_En_4_Fig38_HTML.jpg](img/A450041_1_En_4_Fig38_HTML.jpg)\n\
  \n   **图 4-38** 在`Photoshop Mix`中打开照片\n3. 选择顶层。点击`抠图`。\n4. 选择`智能`工具，然后在左侧设置中点击`减去`。在照片上拖动以移除所有内容，只保留右侧墙壁的正面（见图\
  \ 4-39）。\n\n   ![A450041_1_En_4_Fig39_HTML.jpg](img/A450041_1_En_4_Fig39_HTML.jpg)\n\
  \n   **图 4-39** 使用`智能`工具移除图层元素并保留右侧墙壁\n5. 在底部工具栏中，点击`优化`。在左侧设置中，拖动`羽化`值将其设为`15`。\n\
  6. 点击`应用`图标。\n7. 点击右侧墙壁图层以打开其属性，然后点击`水平翻转`。\n8. 拖动以将右侧墙壁放置在左侧，并根据需要修改其大小和位置（见图 4-40）。\n\
  \n   ![A450041_1_En_4_Fig40_HTML.jpg](img/A450041_1_En_4_Fig40_HTML.jpg)\n\n   **图\
  \ 4-40** 镜像并定位墙壁至左侧\n9. 点击`调整`图标，将`高光`增加至`5%`，然后点击`应用`图标。\n10. 使用`裁剪`图标裁剪修复区域周围仍然可见的照片边缘，然后点击`应用`图标（见图\
  \ 4-41）。\n\n    ![A450041_1_En_4_Fig41_HTML.jpg](img/A450041_1_En_4_Fig41_HTML.jpg)\n\
  \n    **图 4-41** 裁剪图像周围不需要的区域\n\n### 步骤 2：将照片转换为黑白\n\n请按照以下步骤将照片转换为黑白：\n\n1. 点击`共享`图标，将照片保存到`相机胶卷`。\n\
  2. 点击加号图标添加一个图层。添加你刚刚保存的照片，以获得一个合并的照片副本。\n3. 点击`调整`图标，将`饱和度`值向左拖动，将照片转换为黑白（见图 4-42）。\n\
  4. 点击`应用`图标。\n\n   ![A450041_1_En_4_Fig42_HTML.jpg](img/A450041_1_En_4_Fig42_HTML.jpg)\n\
  \n   **图 4-42** 降低图层饱和度以转换为黑白\n\n### 步骤 3：为国王的面具添加颜色\n\n请按照以下步骤操作：\n\n1. 选中黑白图层后，点击`抠图`图标。\n\
  2. 点击`基础`图标，然后在左侧设置中点击`橡皮擦`。\n3. 在面具上涂抹，以移除黑白版本并显示其下方的彩色版本。然后点击`应用`图标（见图 4-43）。\n\
  4. 点击`共享`图标，将最终结果保存到你的`相机胶卷`。\n\n   ![A450041_1_En_4_Fig43_HTML.jpg](img/A450041_1_En_4_Fig43_HTML.jpg)\n\
  \n   **图 4-43** 移除黑白面具以显示彩色面具\n\n## 本章小结\n\n在本章中，你探索了如何进一步进行照片编辑。所提供的技巧通过多个示例展示了如何使用应用程序来应用滤镜、添加边框以及为同一个项目处理多张照片。你可以使用提到的应用程序，用自己的照片尝试练习，并根据照片的特性调整设置。\n\
  \n## 练习\n\n首先思考一张可以用来营造神秘或戏剧效果的照片。然后，根据你的想法对照片进行准备。例如，移除背景并调整颜色。完成后，你可以在基于图层的应用程序（如`Photoshop\
  \ Mix`和`Photofox`）中构建构图。\n\n"
- "# 5. 与桌面版 Adobe Lightroom 集成\n\n为了扩展 iPhone 的摄影功能，你可以将手机上编辑过的照片与`Adobe Lightroom`桌面版应用程序集成。使用`Adobe\
  \ Lightroom`移动应用程序的优势之一在于，它允许你从手机端切换到同一应用程序的桌面版。这样你就可以在更大的屏幕上继续修改照片，从而帮助你看到照片中更多的细节。\n\
  \n在本章中，你将探索如何通过`Adobe Lightroom`移动应用程序与桌面版应用程序的集成，来扩展 iPhone 的摄影功能。你将使用`Camera Raw`技术拍摄照片。\n\
  \n## 为照片评分、标记并整理\n\n在开始将文件从手机集成到`Adobe Lightroom`桌面版之前，你需要整理和筛选图像，以便轻松识别出最适合在后续照片编辑步骤中使用的优质照片。\n\
  \n`Lightroom`应用程序提供了一种全面的方式来整理和排列照片。在手机上的`Lightroom`应用程序中，你可以查看照片并为其评分，以便在照片编辑项目中轻松识别它们。你可以按以下方式在`Lightroom`中查看照片并评分：\n\
  \n1. 打开`Lightroom`应用程序。\n2. 从图库或`相机胶卷`中选择一张图像。\n3. 在顶部菜单中，将模式设置为`评分与审核`。\n4. 在屏幕左侧上下滑动以显示评级星标。你可以通过上下拖动来为选定的图像评分。你也可以使用图像底部的星标进行评分，如图\
  \ 5-1 所示。\n\n   ![A450041_1_En_5_Fig1_HTML.jpg](img/A450041_1_En_5_Fig1_HTML.jpg)\n\
  \n   **图 5-1** 在照片左侧上下滑动以添加评分\n5. 在屏幕右侧上下滑动以打开标记选项。这允许你在已标记、未标记或已拒绝之间进行选择。上下拖动以在三个选项中选择。你也可以使用图像右下角的标记图标来标记图像，如图\
  \ 5-2 所示。\n\n   ![A450041_1_En_5_Fig2_HTML.jpg](img/A450041_1_En_5_Fig2_HTML.jpg)\n\
  \n   **图 5-2** 在照片右侧上下滑动以添加评分\n\n此外，你可以使用`信息`部分为照片添加标题、说明文字和版权信息，以便进行整理。\n\n照片评分完成后，你可以在`Lightroom`应用程序图库中按评分排序显示它们。请按照以下步骤操作：\n\
  \n1. 打开`Lightroom`应用程序图库。\n2. 点击`Lightroom 照片`下拉列表。\n3. 选择`分段`标签。这允许你根据评分、标记、点赞和评论来筛选照片，如图\
  \ 5-3 所示。\n\n   ![A450041_1_En_5_Fig3_HTML.jpg](img/A450041_1_En_5_Fig3_HTML.jpg)\n\
  \n   **图 5-3** 点击`Lightroom 照片`以访问筛选选项\n4. 将标记设置为`已选`，仅显示被评为五星的照片，如图 5-4 所示。\n\n\
  \   ![A450041_1_En_5_Fig4_HTML.jpg](img/A450041_1_En_5_Fig4_HTML.jpg)\n\n   **图\
  \ 5-4** 点击筛选选项仅显示符合该条件的图像\n5. 移除评分筛选器以再次显示所有照片。\n\n\n\n### 管理集合\n\nAdobe Lightroom\
  \ 还允许你将照片整理到集合中。例如，你可以将所有相关的照片分组到一个易于访问的集合中。当你打开 Lightroom 应用时，可以查看所有集合或特定集合。如果你看不到所有集合，只需点击屏幕顶部的`返回`箭头即可回到`集合`视图。\n\
  \n你可以通过点击屏幕右上角的加号图标来创建新集合。输入集合名称并点击`确定`，如图 5-5 所示。\n\n![A450041_1_En_5_Fig5_HTML.jpg](img/A450041_1_En_5_Fig5_HTML.jpg)\n\
  图 5-5  \n在 Lightroom 应用中创建新集合\n\n此外，你可以按照以下步骤向集合中添加照片或对集合应用不同选项：\n\n1. 点击集合右侧的图标以选中它。\
  \  \n2. 点击`添加照片`，如图 5-6 所示。\n\n   ![A450041_1_En_5_Fig6_HTML.jpg](img/A450041_1_En_5_Fig6_HTML.jpg)\
  \  \n   图 5-6  \n   点击`添加照片`将照片添加到选定的集合  \n3. 选择要添加到集合的照片。从右上角的菜单中，您可以按类型筛选照片：`照片`、`视频`或`原始`。\
  \  \n4. 点击`添加照片`将这些照片添加到集合中，如图 5-7 所示。\n\n   ![A450041_1_En_5_Fig7_HTML.jpg](img/A450041_1_En_5_Fig7_HTML.jpg)\
  \  \n   图 5-7  \n   选择多张图像将其添加到集合\n\n## 在 Lightroom 中拍摄原始照片\n\n你日常可能经常使用的常见照片格式，例如`JPG`、`PNG`和`GIF`，被称为已处理格式，这意味着相机处理器会将与照片相关的信息（如颜色、曝光和白平衡）与照片的灰度数据结合起来生成最终图像。虽然有多种应用程序和工具可以帮助你编辑已处理的照片，但由于图像上已经发生的处理过程，其编辑能力是有限的。\n\
  \n与这些格式不同，`Camera Raw` 技术保持照片未经处理的状态，这意味着当你使用相机或 iPhone 拍摄照片时，图像的灰度信息与图像信息分开保存。这些信息被称为元数据`XML`文件。这项技术扩展了你的编辑能力，因为你只需更改图像的元数据，而无需更改图像本身。这意味着你可以多次修改一张图像。\n\
  \n`Camera Raw` 技术在许多相机中都可使用，每个品牌都有自己的`Camera Raw`格式。然而，`DNG`是一种通用格式，可在多种设备上使用，并与`Camera\
  \ Raw`插件兼容。iPhone 通过`Lightroom`应用支持`Camera Raw`格式。\n\n请注意，`Camera Raw`图像的体积非常大；它们可能会占满你手机的存储空间。因此，请谨慎使用此功能，并只对选定的少数图像使用。你可以在需要时才激活此选项。在`Lightroom`应用中，你可以按照以下步骤以`DNG\
  \ Camera Raw`格式拍摄照片：\n\n1. 打开`Lightroom`应用。  \n2. 使用你的`Adobe ID`登录。  \n3. 点击屏幕右下角的相机图标，如图\
  \ 5-8 所示。\n\n   ![A450041_1_En_5_Fig8_HTML.jpg](img/A450041_1_En_5_Fig8_HTML.jpg)\
  \  \n   图 5-8  \n   点击相机图标进入`相机`应用  \n4. 点击屏幕顶部中央的`文件格式`。  \n5. 拖动滑块在`JPG`和`DNG`格式之间选择，如图\
  \ 5-9 所示。\n\n   ![A450041_1_En_5_Fig9_HTML.jpg](img/A450041_1_En_5_Fig9_HTML.jpg)\
  \  \n   图 5-9  \n   拖动滑块在`JPG`和`DNG`（`Camera Raw`）之间切换\n\n设置好照片格式后，`Lightroom`会提供三种拍照模式，分别是`自动`、`专业`和`高动态范围`，如图\
  \ 5-10 所示。`自动`模式允许你快速拍摄`Camera Raw`照片，无需担心不同的相机设置。`专业`模式让你可以控制图像属性，包括快门速度、`ISO`和光圈。选择第三种方法`高动态范围`（`HDR`）时，你可以按住不放，让手机拍摄多张不同曝光值的照片。然后，手机会自动处理所有照片以创建`HDR`照片效果。\n\
  \n![A450041_1_En_5_Fig10_HTML.jpg](img/A450041_1_En_5_Fig10_HTML.jpg)  \n图 5-10\
  \  \n`Lightroom`应用中的`专业`摄影模式\n\n在以下步骤中，你将探索如何使用`专业`模式拍摄`Camera Raw`照片：\n\n1. 从快门按钮左侧的选项中，将模式设置为`专业`。\
  \  \n2. 使用`曝光`值来改变照片对光的曝光程度。更高的曝光值意味着照片中光线更多，而更低的值则意味着照片光线较暗。  \n3. 快门速度（`Sec`）让你决定相机快门打开和关闭的速度。高速快门意味着光线更少，画面更稳定；适合拍摄动态场景，比如玩耍的孩子。低速快门意味着光线更多，稳定性较差；适合拍摄静态照片或自然风光。不过，建议你使用三脚架以确保画面稳定。如果你不确定最适合自己的快门速度，只需将滑块拖到最左侧，将其设置为`自动`。\
  \  \n4. `ISO`值决定了感光度。高`ISO`意味着对光高度敏感；但是，它可能会导致图像中出现“噪点”。因此，建议不要使用非常高的`ISO`值。  \n\
  5. 白平衡（`WB`）让你可以在不同的白平衡模式之间进行选择，例如`钨丝灯`、`荧光灯`、`日光`和`阴天`。  \n6. `对焦`值让你决定照片中的焦点区域。较低的值代表浅景深，它会使得近处的物体清晰而对焦，而远处的物体看起来模糊。较高的值会创建清晰的场景，没有任何模糊效果。\n\
  \n## 与桌面版 Lightroom 集成文件\n\n在 iPhone 上使用`Lightroom`应用拍摄和编辑照片的主要优势之一，是能够将你的照片与该应用的桌面版本进行集成。通过这种集成，你可以用手机拍摄照片、进行编辑，然后将其传输到桌面应用，以进行更高级的修改和利用更丰富的编辑功能。在\
  \ iPhone 上的`Lightroom`应用与桌面版之间集成照片主要有两种方法：使用云存储，以及从移动应用导入照片。\n\n\n\n### 通过云端整合照片\n\
  \n此方法允许你通过 Adobe Creative Cloud 会员资格，在手机上的 `Lightroom` 应用与桌面应用之间进行同步。如果你正在进行摄影项目或照片编辑，可以注册摄影版\
  \ Creative Cloud 会员，该会员资格除了移动应用外，还允许你使用诸如 `Lightroom` 和 `Photoshop` 等桌面照片编辑应用。\n\
  \n一旦手机上的照片完成同步，它们便可在桌面的 Adobe `Lightroom` 中获取，包括应用于图像的所有修改。\n\n1. 打开手机上的 `Lightroom`\
  \ 应用，并使用你的 Adobe ID 登录。\n2. 在 `Lightroom` 图库中，点击左上角的云图标。这将通过云端同步所有照片。\n3. 点击其中一张照片，并使用不同的\
  \ `Lightroom` 功能进行编辑。修改照片后，点击左上角的云图标，将更改同步到云端，如图 5-11 所示。\n\n   ![A450041_1_En_5_Fig11_HTML.jpg](img/A450041_1_En_5_Fig11_HTML.jpg)\n\
  \n   **图 5-11** 点击云图标同步图像修改\n\n4. 现在，转到电脑上的 `Lightroom` 应用程序。\n5. 在左侧，点击 `iPhone`。点击\
  \ `导入的照片` 以显示同步的照片。\n6. 选择你在手机上编辑过的照片，如图 5-12 所示。\n\n   ![A450041_1_En_5_Fig12_HTML.jpg](img/A450041_1_En_5_Fig12_HTML.jpg)\n\
  \n   **图 5-12** 你可以在电脑上的 Adobe `Lightroom` 中显示同步的照片\n\n7. 点击屏幕右上角的 `修改照片` 选项卡进入编辑模式。\n\
  8. 在右侧面板中，选择 `径向滤镜` 图标，如图 5-13 所示。\n\n   ![A450041_1_En_5_Fig13_HTML.jpg](img/A450041_1_En_5_Fig13_HTML.jpg)\n\
  \n   **图 5-13** 在电脑上的 `Lightroom` 中选择 `径向滤镜` 图标\n\n9. 拖拽在图像上创建一个径向滤镜。\n10. 将 `饱和度`\
  \ 设置为 `-100`，以去除照片边缘的颜色，如图 5-14 所示。\n\n    ![A450041_1_En_5_Fig14_HTML.jpg](img/A450041_1_En_5_Fig14_HTML.jpg)\n\
  \n    **图 5-14** 在降低图像边缘饱和度的同时应用径向滤镜\n\n> **注意**  \n> 要使用同步功能，你需要确保电脑上安装了 Adobe\
  \ `Lightroom CC` 或更高版本。\n\n### 从你的 iPhone 导入照片\n\n有时候，你的照片是保存在手机相册中，而非 `Lightroom`\
  \ 应用本身。这些照片可能是使用其他移动应用拍摄或修改的。在这种情况下，你可以通过使用 USB 数据线连接手机和电脑，将照片直接导入到电脑上的 `Lightroom`\
  \ 应用程序中。如果你没有订阅任何 Adobe Creative Cloud 会员，此方法也很有用，因为此功能可以配合免费的 Adobe ID 使用，无需支付任何会员费用。\n\
  \n1. 在电脑上的 Adobe `Lightroom` 应用程序中，选择 `文件` ➤ `导入照片和视频`。\n2. 将 `来源` 设置为 `iPhone`，如图\
  \ 5-15 所示。\n\n   ![A450041_1_En_5_Fig15_HTML.jpg](img/A450041_1_En_5_Fig15_HTML.jpg)\n\
  \n   **图 5-15** 从 iPhone 照片图库导入图像\n\n3. 点击 `所有照片` 取消全选。\n4. 选择你想要导入的照片。\n\n照片将被导入并显示在图库中。它们也会被保存在你电脑上的默认位置。你可以从\
  \ `首选项` 对话框（macOS 上为 `Lightroom` ➤ `首选项`，Windows 上为 `编辑` ➤ `首选项`）更改导入照片在电脑上的保存位置，如图\
  \ 5-16 所示。\n\n![A450041_1_En_5_Fig16_HTML.jpg](img/A450041_1_En_5_Fig16_HTML.jpg)\n\
  \n**图 5-16** 在 `首选项` 对话框中更改导入文件夹\n\n## 使用其他 Raw 照片应用\n\nAdobe `Lightroom` 并非唯一一个允许你拍摄\
  \ Camera Raw 照片的移动应用。500px 推出的 `RAW` 应用是一个免费应用，你可以下载并使用它来拍摄 Raw 照片；你还可以修改这些照片并将其上传到你在\
  \ [`www.500px.com`](http://www.500px.com) 的个人资料中，这是一个供摄影师展示其摄影作品的社交网络。你可以将照片保存在\
  \ iPhone 的“相机胶卷”中以供进一步修改。要使用 `RAW` 应用拍摄 Raw 照片，可以遵循以下步骤：\n\n1. 从 App Store 安装 `RAW`\
  \ 应用。\n2. 使用你的 500px 免费账户登录。\n3. 将快门按钮旁边的左侧滑块向右拖动以激活高级模式。在此模式下，你可以使用左侧滑块控制照片的景深。右侧滑块允许你修改照片的曝光，如图\
  \ 5-17 所示。\n\n   ![A450041_1_En_5_Fig17_HTML.jpg](img/A450041_1_En_5_Fig17_HTML.jpg)\n\
  \n   **图 5-17** 使用 `RAW` 应用拍摄照片\n\n4. 拍摄照片后，从右向左拖动以进入照片库，如图 5-18 所示。\n\n   ![A450041_1_En_5_Fig18_HTML.jpg](img/A450041_1_En_5_Fig18_HTML.jpg)\n\
  \n   **图 5-18** 从 `RAW` 应用图库中选择照片\n\n5. 选择照片进行修改，并使用底部的图标进行裁剪、调整或应用预设，如图 5-19 所示。\n\
  \n   ![A450041_1_En_5_Fig19_HTML.jpg](img/A450041_1_En_5_Fig19_HTML.jpg)\n\n   **图\
  \ 5-19** 在 `RAW` 应用中编辑 Raw 照片\n\n6. 修改完成后，点击右上角的图标以应用更改。\n\n## 总结\n\n你可以通过拍摄 Camera\
  \ Raw 照片来扩展你的 iPhone 摄影技能，这些照片是未经处理的图像，能最大限度地提高你在拍摄后修改照片的能力。即使你拍摄照片时的环境不太理想（例如光线条件不佳），这也能帮助你创作出专业的照片。你还可以通过将移动应用与其桌面摄影版本集成，以使用更高级的功能，从而扩展你的摄影技能。\n\
  \nAdobe `Lightroom` 是摄影师最顶级的摄影和照片编辑应用之一。它可以帮助你使用 iPhone 拍摄照片，然后与桌面版集成，以便应用更精确、更深入的图像编辑技术。这可以帮助你制作出专业水准的照片成果。\n\
  \n除了 `Lightroom` 应用之外，还有其他应用可以帮助你拍摄 Camera Raw 图像，例如 500px 提供的 `RAW` 应用。它允许你拍摄 Raw\
  \ 照片，进行修改，并以 Camera Raw 格式保存在 iPhone 上。你还可以通过你在 500px 网站上的个人资料分享这些照片。\n\n## 实践练习\n\
  \n对于本次练习，请通过 `Lightroom` 应用或任何支持 Raw 格式的应用，使用 Camera Raw 技术拍摄一些照片。然后使用此应用修改你的照片，将它们分享到\
  \ Facebook 群组，并与你的同伴讨论结果。\n\n"
- "# 6. 在桌面上将你的照片与 Adobe Photoshop 集成\n\n正如你在前一章所学到的，将 iPhone 与电脑之间的照片编辑任务进行整合，有助于你创作出更出色的照片。你可以利用电脑上功能完备的照片编辑应用（如\
  \ `Photoshop` 和 `Lightroom`）来增强和处理你的照片。当你将照片从 Adobe 移动应用发送到桌面应用时，可以保留图层、效果和调整。\n\
  \n\n\n## 准备将 iPhone 集成\n\n为了在 iPhone 上的 Adobe 应用与桌面版本之间进行集成，你需要从应用内登录 Creative Cloud。这样你就能通过\
  \ Creative Cloud 与电脑共享文件。实际上，你可以通过 Creative Cloud 集成所有 Adobe 移动应用。以下步骤演示如何从 Lightroom\
  \ 应用连接到云：\n\n1.  打开 Adobe Lightroom 应用。如果你尚未登录，你会看到一个`登录`按钮；点击它。\n2.  在`登录`屏幕上，输入你的\
  \ Adobe ID 用户名和密码，然后点击`登录`（见图 6-1）。\n\n    ![A450041_1_En_6_Fig1_HTML.jpg](img/A450041_1_En_6_Fig1_HTML.jpg)\n\
  \n    图 6-1 登录进入 Creative Cloud\n\n3.  点击左上角的 Lightroom 徽标图标以打开应用菜单（见图 6-2）。\n4.\
  \  激活`仅通过 Wi-Fi 同步`，以避免消耗你的移动数据流量，并确保仅在连接 Wi-Fi 时进行同步。\n5.  停用`阻止休眠`，允许手机在同步时进入休眠状态，这样可以节省电量。\n\
  6.  激活`加载全分辨率`，以便为照片使用最高分辨率。\n7.  激活`自动添加照片`以自动同步照片。\n8.  停用`自动添加视频`以避免同步视频。\n\n\
  \    ![A450041_1_En_6_Fig2_HTML.jpg](img/A450041_1_En_6_Fig2_HTML.jpg)\n\n    图\
  \ 6-2 Creative Cloud 同步设置\n\n要查看已同步的文档，你需要在 iPhone 和电脑上都安装 Adobe Creative Cloud\
  \ 应用。当你在 iPhone 上登录云应用后，就能根据文档类型查看已同步的文档（见图 6-3）。\n\n![A450041_1_En_6_Fig3_HTML.jpg](img/A450041_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3 从 Creative Cloud 控制台查看已同步的文档\n\n在你的桌面电脑上，Creative Cloud 控制台允许你查看云文档、查找可下载的应用、查找字体以及查看关注者的更新（社区）。你还可以按以下方式访问从\
  \ iPhone 保存到云存储的文档：\n\n1.  打开 Creative Cloud 控制台。如果尚未下载，你可以从 Adobe.com 下载。\n2. \
  \ 点击`资源`标签，然后选择`文件`。在这里，你可以了解存储空间、订阅类型（免费或付费）以及文件更新状态。\n3.  点击`打开文件夹`以打开本地文件夹，你可以在其中找到从\
  \ iPhone 同步的文件（见图 6-4）。\n\n    ![A450041_1_En_6_Fig4_HTML.jpg](img/A450041_1_En_6_Fig4_HTML.jpg)\n\
  \n    图 6-4 从主菜单设置 Lightroom 选项\n\n## 与桌面版 Photoshop 集成文件\n\n一旦你登录 iPhone 的 Adobe\
  \ 应用并准备在应用与桌面应用之间同步照片，你就可以将这些应用中的文件发送到桌面版本，文件将在云端同步。然后文件会在关联的应用中自动打开。在以下示例中，你将把\
  \ Photoshop Fix 应用中的文档发送到桌面版 Photoshop，并探究发送的文件如何保留其结构：\n\n1.  确保桌面电脑上已安装 Creative\
  \ Cloud 控制台应用，并且电脑和 iPhone 都已连接互联网。\n2.  在 iPhone 上打开 Photoshop Fix 应用。\n3.  选择一个现有项目或创建一个新项目。确保文件已优化且没有不需要的图层，以避免应用与桌面版\
  \ Photoshop 之间的同步速度变慢（见图 6-5）。\n\n    ![A450041_1_En_6_Fig5_HTML.jpg](img/A450041_1_En_6_Fig5_HTML.jpg)\n\
  \n    图 6-5 Photoshop Fix 中的一张照片\n\n4.  点击共享图标。你可以选择将文档发送到 Photoshop CC、保存到 Lightroom\
  \ 应用，或仅保存到云存储。选择`发送到 Photoshop CC`（见图 6-6）。\n\n    ![A450041_1_En_6_Fig6_HTML.jpg](img/A450041_1_En_6_Fig6_HTML.jpg)\n\
  \n    图 6-6 与 Photoshop CC 共享项目\n\n请注意，桌面版 Photoshop 会打开并显示该文档。在`图层`面板中，你可以查看应用于照片的效果和调整。例如，如果你应用了任何修复效果，它们会显示在原始照片上方的新图层中。这种非破坏性修改有助于你在桌面版\
  \ Photoshop CC 中打开后，仍能编辑和修改这些效果（见图 6-7）。\n\n![A450041_1_En_6_Fig7_HTML.jpg](img/A450041_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7 Photoshop CC 中的照片\n\n## 在电脑上完成 iPhone 照片编辑\n\n所用工具：Photoshop Fix 应用、Photoshop\
  \ CC 桌面版\n\n图 6-8 显示了我在本例中使用的原始照片。\n\n![A450041_1_En_6_Fig8_HTML.jpg](img/A450041_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8 原始照片\n\n图 6-9 显示了最终结果。\n\n![A450041_1_En_6_Fig9_HTML.jpg](img/A450041_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9 最终结果\n\n为了练习 iPhone 与电脑之间的集成，我用 iPhone 拍摄了一张英国纽卡斯尔市的照片。我将使用 Photoshop Fix\
  \ 应用编辑这张照片。然后将其发送到 Photoshop CC，通过添加噪点来完成项目，以营造复古风格效果；接着在照片边缘应用暗角效果。要继续操作，请继续阅读。\n\
  \n### 步骤 1：在 iPhone 上修复照片\n\n具体步骤如下：\n\n1.  打开 Photoshop Fix。点击加号图标以创建新项目。\n2. \
  \ 点击`我的照片`，然后导航到“相机胶卷”中的照片。\n3.  点击裁剪图标以裁剪照片的底部区域。\n4.  在裁剪选项中点击`原始`以保持照片的原始比例。拖拽左下边缘以移除镜头下半部分，并将焦点集中在建筑物上（见图\
  \ 6-10）。\n\n    ![A450041_1_En_6_Fig10_HTML.jpg](img/A450041_1_En_6_Fig10_HTML.jpg)\n\
  \n    图 6-10 裁剪照片以聚焦主体并去除干扰\n\n5.  点击修复图标以移除镜头中建筑物上方的交通信号灯和电线。\n6.  选择`仿制图章`工具。点击交通信号灯顶部旁边树木的区域（见图\
  \ 6-11）。\n\n    ![A450041_1_En_6_Fig11_HTML.jpg](img/A450041_1_En_6_Fig11_HTML.jpg)\n\
  \n    图 6-11 使用仿制图章修复照片\n\n7.  点击`污点修复`工具，涂抹建筑物上方的电线以将其移除；然后点击`应用`（见图 6-12）。\n\n\
  \    ![A450041_1_En_6_Fig12_HTML.jpg](img/A450041_1_En_6_Fig12_HTML.jpg)\n\n   \
  \ 图 6-12 使用污点修复工具\n\n### 步骤 2：将文档发送到 Photoshop CC\n\n要将文档发送到 Photoshop CC，请按以下步骤操作：\n\
  \n1.  在 Photoshop Fix 中点击共享图标。\n2.  点击`发送到 Photoshop CC`（见图 6-13）。\n\n文档将通过 Creative\
  \ Cloud 更新并发送到 Photoshop CC。\n\n![A450041_1_En_6_Fig13_HTML.jpg](img/A450041_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13 将照片发送到 Photoshop CC\n\n\n\n### 第 3 步：在 Photoshop CC 中应用效果\n\n以下是在 Photoshop\
  \ CC 中应用一些效果的步骤：\n\n1. 如果文档没有在 Photoshop CC 中自动打开，请单击 Creative Cloud 控制台，选择 `Assets`\
  \ ➤ `Files`，然后单击 `Open Folder`。\n2. 在 Photoshop CC 中打开照片。\n3. 我想对所有文档应用效果，因此将图层组转换为智能图层。要跟随操作，请单击图层面板顶部的图层组，然后选择\
  \ `Filter` ➤ `Convert to Smart Filters`（见图 6-14）。\n\n   ![A450041_1_En_6_Fig14_HTML.jpg](img/A450041_1_En_6_Fig14_HTML.jpg)\n\
  \n   图 6-14 将图层转换为智能对象\n4. 单击 `OK` 将图层转换为智能对象。\n5. 在滤镜列表中，选择 `Camera Raw Filter`（见图\
  \ 6-15）。\n\n   ![A450041_1_En_6_Fig15_HTML.jpg](img/A450041_1_En_6_Fig15_HTML.jpg)\n\
  \n   图 6-15 在 Camera Raw 中打开图像\n6. 单击右侧的 `FX` 图标。\n7. 将颗粒数量设置为 `100`，大小设置为 `70`，粗糙度设置为\
  \ `70`。\n8. 将裁剪后暗角的数值设置为 `-50`（见图 6-16）。\n9. 点击 `OK`。\n\n   ![A450041_1_En_6_Fig16_HTML.jpg](img/A450041_1_En_6_Fig16_HTML.jpg)\n\
  \n   图 6-16 在照片上应用颗粒和暗角效果\n\n## 总结\n\n通过将 iPhone 的修图工作与 Photoshop 和 Lightroom 等桌面应用程序集成，您可以扩展修图能力。这有助于您为作品添加更多效果和样式。此外，它还能让您在更大的屏幕上查看编辑工作的精细细节。如果您使用\
  \ Adobe 移动应用，可以通过 Creative Cloud 轻松地将工作与桌面应用程序集成。您只需将在 iPhone 上的 Adobe 应用（如 Photoshop\
  \ Mix）中完成的作品发送到桌面。该文件将在桌面端的相应应用程序中打开，并且图层将得以保留。\n\n## 练习\n\n启动一个照片编辑项目，包括拍摄一张照片，然后在\
  \ Lightroom 或 Photoshop Fix 等 Adobe 移动应用中编辑它。接着，将文档发送到 Photoshop CC 并在其中完成后续工作。\n\
  \n"
- "# 7. 将照片变成艺术品\n\n摄影和美术都属于艺术范畴。摄影依赖相机来创作视觉艺术品，而美术则使用不同的工具，例如画笔、绘图笔、粉彩等。数字应用程序可以帮助您模拟美术工具的效果，并将其应用到照片上，从而创作出类似绘画或素描的作品。有许多应用可以帮助您在\
  \ iPhone 上创建美术效果，您甚至可以组合使用多个应用来改善艺术作品的最终效果。\n\n本章中的技巧将展示如何将 iPhone 中的一些照片转化为美术作品。\n\
  \n## 创作波普艺术作品\n\n使用的工具：Prisma 应用、Lightroom 应用\n\n图 7-1 展示了我在本例中使用的原始照片。您可以使用类似的照片来跟随练习。\n\
  \n![A450041_1_En_7_Fig1_HTML.jpg](img/A450041_1_En_7_Fig1_HTML.jpg)\n\n图 7-1 原始照片\n\
  \n图 7-2 展示了最终效果。\n\n![A450041_1_En_7_Fig2_HTML.jpg](img/A450041_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2 最终效果\n\n在本例中，我有一张城市建筑的照片，想将其转换成“波普”艺术作品。为此，首先在 Lightroom 应用中打开照片，调整其颜色，使其更加鲜艳并具有更高的对比度。然后，在\
  \ Prisma 应用中打开它，应用艺术效果。由于 Prisma 应用对颜色的控制有限，您可以将艺术作品带回 Lightroom 以调整颜色组合。\n\n###\
  \ 步骤 1：修改照片的光线和对比度\n\n要修改照片的光线和对比度，请按照以下步骤操作：\n\n1. 在 Lightroom 中打开一张照片。\n2. 点击裁剪图标，裁剪图像，聚焦于画面中的主要元素（见图\
  \ 7-3）。\n\n   ![A450041_1_En_7_Fig3_HTML.jpg](img/A450041_1_En_7_Fig3_HTML.jpg)\n\
  \n   图 7-3 在 Lightroom 应用中裁剪照片\n3. 点击光线图标，增加图像的对比度。\n4. 点击颜色图标，向右拖动滑块以增加鲜艳度设置（见图\
  \ 7-4）。\n5. 点击共享图标，选择 `Save to Camera Roll`，然后选择 `Maximum` 大小。\n\n   ![A450041_1_En_7_Fig4_HTML.jpg](img/A450041_1_En_7_Fig4_HTML.jpg)\n\
  \n   图 7-4 增加画面的色彩鲜艳度\n\n### 步骤 2：应用波普艺术效果\n\n要应用波普艺术效果，请按照以下步骤操作：\n\n1. 打开 Prisma\
  \ 应用，用手指向上滑动以访问相机胶卷，然后选择您刚刚在 Lightroom 应用中修改过的照片。\n2. 在底部，拖动以找到 Roy 效果；该效果可以帮助您将照片转换为波普艺术。如果您需要其他效果，可以使用任何现有效果，或点击\
  \ Store 图标购买更多艺术效果（见图 7-5）。\n3. 点击共享图标，您可以通过它将照片分享到不同的社交网络或保存到 iPhone。\n4. 点击底部的保存图标，将其保存到相机胶卷。\n\
  \n   ![A450041_1_En_7_Fig5_HTML.jpg](img/A450041_1_En_7_Fig5_HTML.jpg)\n\n   图 7-5\
  \ 在 Prisma 中应用波普艺术效果（Roy）\n\n### 步骤 3：更改波普艺术颜色\n\n要更改波普艺术颜色，请按照以下步骤操作：\n\n1. 在 Lightroom\
  \ 应用中打开编辑后的图像。\n2. 点击预设图标，然后选择 `Cross Process 1`（见图 7-6）。\n3. 点击应用图标。\n4. 点击共享图标，选择\
  \ `Save to Camera Roll`，然后选择 `Maximum` 大小。\n\n   ![A450041_1_En_7_Fig6_HTML.jpg](img/A450041_1_En_7_Fig6_HTML.jpg)\n\
  \n   图 7-6 在 Lightroom 应用中应用 Cross Process 1 预设\n\n## 将照片转化为马赛克艺术作品\n\n使用的工具：Photoshop\
  \ Fix、Deep Art Effect、Photo Splash\n\n图 7-7 展示了我在本例中使用的原始照片。\n\n![A450041_1_En_7_Fig7_HTML.jpg](img/A450041_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7 原始照片\n\n图 7-8 展示了最终效果。\n\n![A450041_1_En_7_Fig8_HTML.jpg](img/A450041_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8 最终效果\n\n在本技巧中，您将学习如何将照片转化为马赛克或立体派艺术作品。这里，我使用了一张在访问科威特期间拍摄的照片。照片展示了码头的美景，背景是摩天大楼。但是在\
  \ Deep Art Effect 应用中打开照片以创建马赛克效果之前，我想先修复照片中的一些问题，特别是横穿照片右上角的那条电线。应用效果后，我将使用 Photo\
  \ Splash 应用来改善最终效果的颜色。请使用类似的照片来跟随练习。\n\n### 步骤 1：修复基础照片\n\n要修复基础照片，请按照以下步骤操作：\n\n\
  1. 在 Photoshop Fix 中打开照片。\n2. 点击修复图标，然后在底部工具栏中点击 `Spot Heal`（见图 7-9）。\n\n   ![A450041_1_En_7_Fig9_HTML.jpg](img/A450041_1_En_7_Fig9_HTML.jpg)\n\
  \n   图 7-9 使用污点修复画笔工具移除照片中不需要的元素\n3. 在左侧菜单中，设置画笔的大小。\n4. 在您想要移除的区域上涂抹。在这张照片中，我将在天空中的电线上涂抹（见图\
  \ 7-10）。\n5. 点击确定图标。\n6. 点击共享图标，然后选择 `Save to Camera Roll`。\n\n   ![A450041_1_En_7_Fig10_HTML.jpg](img/A450041_1_En_7_Fig10_HTML.jpg)\n\
  \n   图 7-10 涂覆您想要移除的元素\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文，并保留所有格式和标记。\n\
  \n\n### 步骤 2：应用马赛克效果\n\n要应用马赛克效果，请遵循以下步骤：\n\n1.  在 `Deep Art Effect` 中打开已保存的图像。\n\
  2.  在底部效果中，选择 `Mosaic 1` 效果。该效果将需要几秒钟应用到照片上。\n3.  点击 `Effect` 图标 (`Mosaic`)，然后将滑块向左拖动一点，以略微降低效果的强度（见图\
  \ 7-11）。\n4.  点击 `Save` 图标，将照片保存到相机胶卷。\n\n    ![A450041_1_En_7_Fig11_HTML.jpg](img/A450041_1_En_7_Fig11_HTML.jpg)\n\
  \n    图 7-11\n\n    为照片应用马赛克效果\n\n### 步骤 3：改善马赛克艺术作品的颜色\n\n要改善马赛克艺术作品的颜色，请遵循以下步骤：\n\
  \n1.  在 `Photo Splash` 中打开上一步中保存的照片。\n2.  点击工具栏左侧的第一个图标。使用画笔在照片上涂抹以创建蒙版（见图 7-12）。\n\
  \n    ![A450041_1_En_7_Fig12_HTML.jpg](img/A450041_1_En_7_Fig12_HTML.jpg)\n\n  \
  \  图 7-12\n\n    创建一个蒙版以在其上应用效果\n3.  点击 `Effects` 图标，然后从左侧选择第三个效果（见图 7-13）。\n4.\
  \  点击 `Next` 图标，然后点击 `Save` 图标将其保存到相机胶卷。\n5.  选择你想要保存的图像尺寸。\n\n    ![A450041_1_En_7_Fig13_HTML.jpg](img/A450041_1_En_7_Fig13_HTML.jpg)\n\
  \n    图 7-13\n\n    应用该效果以改善马赛克艺术作品\n\n## 将你的照片变成一幅油画\n\n使用的工具：`Lightroom app`，\
  \ `Glaze app`\n\n图 7-14 展示了我原始的照片。\n\n![A450041_1_En_7_Fig14_HTML.jpg](img/A450041_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14\n\n原始照片 (© Radwa Khali)\n\n图 7-15 展示了本技巧的最终效果。\n\n![A450041_1_En_7_Fig15_HTML.jpg](img/A450041_1_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15\n\n最终效果\n\n油画具有惊人的艺术效果，尤其是画笔在画布上添加“颜料”以构成整个画面的方式。实际上，有许多应用程序可以帮助你创造类似油画的\
  \ artistic 效果。在本技巧中，你将学习如何为一辆旧车的照片应用油画效果。然后，你将在照片上应用颜色渐变，使其更具印象派风格。\n\n具体来说，我将展示如何在\
  \ `Lightroom` 中修改照片，使其颜色更鲜艳，以便应用的绘画效果能利用照片中的明亮色彩。然后，我将展示如何使用 `Glaze` 应用程序将效果应用到照片上。应用效果后，照片将返回到\
  \ `Lightroom` 应用程序，以对照片的某些部分应用选择性蒙版效果，使其更具艺术色彩。\n\n### 步骤 1：改善照片的颜色和对比度\n\n要改善照片的颜色和对比度，请遵循以下步骤：\n\
  \n1.  在 `Lightroom` 应用程序中打开照片。\n2.  点击 `Color` 图标，增加照片的 `Vibrance`（鲜艳度）设置。然后，点击右上角的\
  \ `Apply`。\n3.  点击 `Light` 图标，稍微降低对比度。这将显示出镜头中更多的细节（见图 7-16）。\n\n    ![A450041_1_En_7_Fig16_HTML.jpg](img/A450041_1_En_7_Fig16_HTML.jpg)\n\
  \n    图 7-16\n\n    增加照片鲜艳度并降低其对比度\n4.  将曝光度稍微增加到 `+0.27`，将高光减少到 `-13`，并将阴影增加到 `+25`（见图\
  \ 7-17）。\n5.  点击 `Apply` 图标。\n6.  点击 `Share` 图标，并以最大尺寸将其保存到相机胶卷。\n\n    ![A450041_1_En_7_Fig17_HTML.jpg](img/A450041_1_En_7_Fig17_HTML.jpg)\n\
  \n    图 7-17\n\n    增加照片的曝光度，减少高光，增加阴影\n\n### 步骤 2：应用油画效果\n\n要应用油画效果，请遵循以下步骤：\n\n\
  1.  在 `Glaze` 应用程序中打开上一步编辑过的照片。\n2.  选择一个要应用的油画效果。我使用了一个具有逼真笔触效果的效果（见图 7-18）。\n\
  3.  点击 `Share` 图标，然后选择 `Gallery` 将其保存到你的照片文件夹。\n\n    ![A450041_1_En_7_Fig18_HTML.jpg](img/A450041_1_En_7_Fig18_HTML.jpg)\n\
  \n    图 7-18\n\n    在图像上应用油画效果\n\n### 步骤 3：改善绘画颜色\n\n要改善绘画颜色，请遵循以下步骤：\n\n1.  在 `Lightroom`\
  \ 应用程序中再次打开上一步应用编辑过的照片。\n2.  点击 `Selective` 图标，然后从屏幕左侧选择 `Linear mask`（线性蒙版）。\n\
  3.  拖动鼠标在照片的下半部分创建一个蒙版。你可以使用蒙版中间的方形来改变其位置（见图 7-19）。\n\n    ![A450041_1_En_7_Fig19_HTML.jpg](img/A450041_1_En_7_Fig19_HTML.jpg)\n\
  \n    图 7-19\n\n    对照片下半部分应用选择性调整\n4.  点击 `Color spectrum`（颜色光谱）并将点拖向红色一侧，为照片的被遮罩部分添加红色色调（见图\
  \ 7-20）。\n\n    ![A450041_1_En_7_Fig20_HTML.jpg](img/A450041_1_En_7_Fig20_HTML.jpg)\n\
  \n    图 7-20\n\n    使用 `Color spectrum`（颜色光谱）为照片下半部分应用红色色调\n5.  将 `Saturation`（饱和度）增加到\
  \ `+41`，然后点击 `Apply` 图标。\n6.  再次点击 `Selective` 图标，以在照片的上半部分应用另一个调整蒙版。\n7.  点击左侧的\
  \ `Linear` 图标。\n8.  拖动鼠标在照片的顶部创建一个线性蒙版。\n9.  点击 `Color` 图标，并使用 `Color spectrum`（颜色光谱）为镜头顶部添加绿色（见图\
  \ 7-21）。\n\n    ![A450041_1_En_7_Fig21_HTML.jpg](img/A450041_1_En_7_Fig21_HTML.jpg)\n\
  \n    图 7-21\n\n    为照片上半部分应用绿色色调\n10. 点击 `Apply` 图标。\n11. 再次点击 `Selective` 图标，这次在照片中心应用一个\
  \ `Radial mask`（径向蒙版）。\n12. 点击 `Light` 图标，并将曝光度增加到 `+1.12`（见图 7-22）。\n\n    ![A450041_1_En_7_Fig22_HTML.jpg](img/A450041_1_En_7_Fig22_HTML.jpg)\n\
  \n    图 7-22\n\n    应用 `Radial mask`（径向蒙版），并增加图像中心区域的曝光度\n13. 点击 `Apply` 图标。然后点击屏幕右上角的\
  \ `Apply` 图标，将图像添加到图库。\n14. 再次打开它，点击 `Share` 图标，然后选择 `Save to Camera Roll`。将尺寸设置为\
  \ `Maximum` 以将艺术作品保存到你的照片图库。\n\n## 为你的照片添加雾冬效果\n\n使用的工具：`Tadaa app`， `Repix app`\n\
  \n在这个例子中，我想将一张照片转换成超现实的绘画。所以，我选择了一张几年前在巴黎用我的 iPhone 拍摄的照片，并将展示如何为其添加雾状效果。我使用了 `Tadaa`\
  \ 应用程序或任何可以创建模糊效果的应用程序来为窗户添加雾气。然后，我使用了 `Repix` 应用程序在窗户上添加小水滴。最终的效果应该会让你感觉仿佛是透过一扇被雾气和薄雾水珠覆盖的窗户看向一栋建筑。\n\
  \n图 7-23 展示了我开始使用的原始照片。\n\n![A450041_1_En_7_Fig23_HTML.jpg](img/A450041_1_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23\n\n原始照片 (© Rafiq Elmansy)\n\n图 7-24 展示了最终的照片。\n\n![A450041_1_En_7_Fig24_HTML.jpg](img/A450041_1_En_7_Fig24_HTML.jpg)\n\
  \n图 7-24\n\n最终效果\n\n### 步骤 1：为窗户添加雾气\n\n要为窗户添加雾气，请遵循以下步骤：\n\n1.  在 `Tadaa` 应用程序中打开照片。\n\
  2.  将工具栏向左滑动以显示 `Blur` 图标；点击它。\n3.  将模糊类型设置为 `All`，并将模糊值设置为 `30`（见图 7-25）。\n4. \
  \ 点击 `Apply` 图标，并将照片保存到相机胶卷。\n\n    ![A450041_1_En_7_Fig25_HTML.jpg](img/A450041_1_En_7_Fig25_HTML.jpg)\n\
  \n    图 7-25\n\n    为照片应用模糊效果\n\n\n\n### 第二步：应用水滴效果\n\n要应用水滴效果，请按以下步骤操作：\n\n1. \
  \ 在`Repix`应用中打开照片。\n2.  在工具中，轻点`雨滴`画笔一次以激活中等效果。在整个照片上涂抹，添加细微的薄雾状水滴。\n3.  再次轻点画笔以切换到较大的水滴。在照片边缘涂抹，为边缘添加大水珠，同时保持中间区域清晰，以便部分展示建筑物（参见图\
  \ 7-26）。\n\n![A450041_1_En_7_Fig26_HTML.jpg](img/A450041_1_En_7_Fig26_HTML.jpg)\n\
  \n图 7-26 — 应用雨滴效果\n\n### 第三步：改善照片的光线与色彩\n\n要改善照片的光线与色彩，请按以下步骤操作：\n\n1.  轻点`调整`图标。将`亮度`和`对比度`设置为`-40`，`饱和度`设置为`-25`，`自然饱和度`设置为`-10`，`色温`设置为`-15`。这样可以降低照片亮度，营造更冷的冬日效果（参见图\
  \ 7-27）。\n2.  轻点`应用`图标，将照片保存到`相机胶卷`中。\n\n![A450041_1_En_7_Fig27_HTML.jpg](img/A450041_1_En_7_Fig27_HTML.jpg)\n\
  \n图 7-27 — 通过调整色彩、光线和色温来改善效果\n\n## 本章小结\n\n美术作品具有独特的外观，尤其是在笔触和表现力丰富的色彩方面。通过应用不同的效果，您可以轻松地将照片转换为一件艺术品，使其看起来像油画、水彩画等。您需要做的就是找到合适的应用，帮助模拟您想要的笔触或效果。诸如`Deep\
  \ Art Effect`、`Photo Splash`和`Glaze`之类的应用可以帮助您将照片变成美术作品。结合使用多个应用的技巧可以产生更有趣的效果。在这些技巧中，在应用任何效果之前，我依靠`Lightroom`应用来调整照片的色彩和光线，并使用`Photoshop\
  \ Fix`来移除镜头中不需要的元素。\n\n## 实践练习\n\n要练习本章的技巧，您可以使用任何您选择并希望将其转换为美术作品的照片。然后，决定要应用哪种效果。以本章的技巧为指导，达到相同的效果，并探索您还能创造出哪些其他美术作品。\n\
  \n"
- "# 8. 照片后期合成项目\n\n除了在 iPhone 上编辑照片之外，您还可以创建涉及多个应用的更大型项目。最具挑战性的部分是构思，并将在 iPhone 上创作的创意艺术品形象化。然后，您需要选择其他可以与原始照片合并以形成最终合成的照片。您使用的应用数量取决于要创建的效果。我喜欢在诸如`Photoshop\
  \ Mix`之类的应用中构建合成，并使用其他应用在照片上应用滤镜和效果。\n\n在本章中，您将探索合并照片以创建神秘场景的工作流程。您将从不同的照片中提取元素，并使用混合模式混合颜色，从而创建您的数字艺术作品。\n\
  \n## 创建一个幻想场景\n\n使用的工具：???\n\n图 8-1、8-2 和 8-3 展示了我示例中使用的原始照片。\n\n![A450041_1_En_8_Fig3_HTML.jpg](img/A450041_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3 — 要添加的地球原始照片（来源：维基百科）\n\n![A450041_1_En_8_Fig2_HTML.jpg](img/A450041_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2 — 要添加的日落原始照片（© Rafiq Elmansy）\n\n![A450041_1_En_8_Fig1_HTML.jpg](img/A450041_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1 — 孩子们的原始照片（© Rafiq Elmansy）\n\n图 8-4 展示了最终结果。\n\n![A450041_1_En_8_Fig4_HTML.jpg](img/A450041_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4 — 最终结果\n\n在这个项目中，我将展示如何合并多张照片，创建一个孩子们在奇异星球上玩耍的幻想场景。因此，我将从我 iPhone 上拍摄的孩子们在海滩上的照片、一张日落照片开始，并将它们与我从互联网保存到\
  \ iPhone 的地球照片合并。由于我想要创建的照片的特殊性，这是我唯一一次使用非 iPhone 拍摄的照片。这张照片取自维基百科，属于公共领域版权。\n\n\
  ### 第一步：准备基础场景\n\n要准备基础场景，请按以下步骤操作：\n\n1.  在`Photoshop Mix`中打开照片。\n2.  轻点加号图标创建一个新项目，并将第一张照片添加到项目中。目前，镜头中的主要元素（孩子们）充满了屏幕。我想把他们移到照片底部，这样我就可以把太阳添加到顶部。\n\
  3.  轻点右侧图层部分的加号图标，添加一个新图层。\n4.  轻点`添加新图像图层`，然后在您的`相机胶卷`中导航找到天空延伸的照片（图 8-5）。\n\n\
  ![A450041_1_En_8_Fig5_HTML.jpg](img/A450041_1_En_8_Fig5_HTML.jpg)\n\n图 8-5 — 将天空添加到当前照片中\n\
  \n5.  使用两根手指调整顶部照片的大小，使其看起来太阳延伸到了第一张图像的上方。\n6.  轻点`混合`图标，选择`变暗`混合选项。然后，轻点右上角的图标应用混合（图\
  \ 8-6）。\n7.  轻点`共享`图标，并将结果保存到您的 iPhone 上。\n\n![A450041_1_En_8_Fig6_HTML.jpg](img/A450041_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6 — 对照片应用`变暗`混合\n\n### 第二步：去除地球背景\n\n要去除地球背景，请按以下步骤操作：\n\n1.  在`Eraser`应用中打开下载的地球照片。\n\
  2.  轻点底部的`擦除`图标。\n3.  轻点`擦除`图标。\n4.  轻点`目标`图标，然后轻点照片中的黑色背景色。然后轻点`完成`（图 8-7）。\n\n\
  ![A450041_1_En_8_Fig7_HTML.jpg](img/A450041_1_En_8_Fig7_HTML.jpg)\n\n图 8-7 — 使用`目标`图标去除背景\n\
  \n5.  轻点`调整`图标，然后选择`平滑`工具。\n6.  向右拖动滑块以增加地球边缘的平滑度（图 8-8）。\n7.  轻点`共享`图标。将格式设置为`PNG`以生成透明背景的照片，并使用最大尺寸保存照片。然后轻点`保存`将其添加到`相机胶卷`中。\n\
  \n![A450041_1_En_8_Fig8_HTML.jpg](img/A450041_1_En_8_Fig8_HTML.jpg)\n\n图 8-8 — 增加地球边缘的平滑度\n\
  \n### 第三步：将地球添加到合成中\n\n要将地球添加到合成中，请按以下步骤操作：\n\n1.  打开`Photofox`应用，并将本章早些时候创建的基础照片添加到其中。\n\
  2.  轻点右侧的加号图标以添加另一个图层。然后，轻点`地球`照片。\n3.  使用两根手指拖动并调整地球的大小，使其位于太阳的位置（图 8-9）。\n\n![A450041_1_En_8_Fig9_HTML.jpg](img/A450041_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9 — 在合成中调整`地球`照片的大小和位置\n\n4.  从底部按钮的`图层`选项卡中，轻点`混合`模式。\n5.  轻点`地球`图层，将混合模式设置为`颜色加深`（图\
  \ 8-10）。\n\n![A450041_1_En_8_Fig10_HTML.jpg](img/A450041_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10 — 对地球应用`颜色加深`混合模式\n\n6.  现在，我想降低地球颜色的强度。因此，我将轻点`图像`选项卡并选择`饱和度`。向左拖动顶部滑块以降低饱和度（图\
  \ 8-11）。\n7.  轻点右上角的`应用`图标。\n8.  轻点`共享`图标，然后选择`保存到相机胶卷`。\n\n![A450041_1_En_8_Fig11_HTML.jpg](img/A450041_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11 — 通过降低饱和度来减弱地球颜色的强度\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 第 4 步：为天空增添更多效果\n\n为了更好地营造氛围，让我们对天空稍作修改。我将展示如何使用`Fused`应用，借助一张树的照片，为天空添加闪电效果。请遵循以下步骤：\n\
  \n1. 打开`Fused`应用。在位于左下方的第一张照片处，点击添加来自上一步骤的照片作为第一张混合照片。\n2. 点击右侧，然后选择艺术家合集。我选择了自然合集并挑选了一张树的剪影照片。\n\
  3. 在选中右侧照片的情况下，点击工具栏左侧的变换图标。\n4. 用两根手指翻转树的照片并将其调整到屏幕大小。然后，点击应用图标（图 8-12）。\n\n  \
  \ ![A450041_1_En_8_Fig12_HTML.jpg](img/A450041_1_En_8_Fig12_HTML.jpg)\n\n   图 8-12：为天空添加树木效果\n\
  \n5. 点击工具栏右侧的混合图标，选择划分模式。然后点击应用图标（图 8-13）。\n6. 点击分享图标，将照片保存到相机胶卷。\n\n   ![A450041_1_En_8_Fig13_HTML.jpg](img/A450041_1_En_8_Fig13_HTML.jpg)\n\
  \n   图 8-13：为照片添加混合模式\n\n### 第 5 步：添加垃圾摇滚效果\n\n现在，我将切换到`Snapseed`应用，为照片添加垃圾摇滚效果，步骤如下：\n\
  \n1. 在`Snapseed`应用中打开照片。\n2. 点击工具图标，然后选择垃圾摇滚滤镜。\n3. 点击垃圾摇滚风格图标，选择效果 5。然后点击应用图标（图\
  \ 8-14）。\n\n   ![A450041_1_En_8_Fig14_HTML.jpg](img/A450041_1_En_8_Fig14_HTML.jpg)\n\
  \n   图 8-14：为照片添加垃圾摇滚效果\n\n4. 在工具中选择晕影工具，向左拖动滑块，然后点击应用图标（图 8-15）。\n5. 点击分享图标，将最终结果保存到您的相机胶卷。\n\
