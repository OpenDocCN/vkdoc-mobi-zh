  ## 迈克尔·克劳森


  ![A450041_1_En_BookBackmatter_Figq_HTML.jpg](img/A450041_1_En_BookBackmatter_Figq_HTML.jpg)


  迈克尔·克劳森是 Big Fish Creations（一家位于内华达山脉小镇格雷格尔的广告与数字媒体公司）的首席创意总监。他的职业生涯始于硅谷，当时苹果电脑和
  Adobe 系统刚刚在桌面出版领域崭露头角。在他职业生涯早期就接触了交互式媒体，后来转型为制作艺术家，并最终成为内华达州一家大型广告公司交互部门的创始人和主要负责人。他专攻跨媒体平台的品牌塑造，其多样化的技能组合融合了设计师和开发者的身份，重点在于平面设计、品牌塑造、摄影和沟通。作为演讲者，迈克尔曾多次在行业特定会议上发表演讲，包括
  Adobe Max 和 MacWorld。


  迈克尔于 2011 年末开始以 iPhone 摄影师的身份进行创作，当时他发现了藏在其小巧手机相机中的强大力量。作为一名专业摄影师，他开始探索 iPhone 的局限性（并因此了解了它的优势），并很快开始利用该设备发挥其创造力的各个方面。他将
  Instagram 视为一个让 iPhone 摄影艺术得以蓬勃发展的艺术分享社区，这给了他探索新机遇和新发现的灵感。迈克尔还是一位出版过著作的作者，经常撰写关于
  iPhone 摄影和创意编辑的文章并教授相关课程。


