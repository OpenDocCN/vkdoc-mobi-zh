- fmt: "# Permissions\n\nPermissions in Android follow the least privilege model where\
    \ specific types of functionality are only given to applications that specifically\
    \ request for them. There are two main types of permission: manifest permissions\
    \ and runtime permissions (of which commonly fall into the \"dangerous\" permissions\
    \ category). Both runtime and manifest permissions must be declared in the Android\
    \ manifest; however, in addition, runtime permissions must be requested at runtime\
    \ prompting the user with a dialogue (as seen in Figure [3-1](#509502_1_En_3_Chapter.xhtml#Fig1))\
    \ on if they are happy for the application to use the stated functionality. Runtime\
    \ permissions were implemented in API level 23; however, previous to this a user\
    \ will be shown all runtime permissions prior to install instead.\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1** Example of a runtime permission as seen by the user\n\nAs previously\
    \ stated permissions are given a permission type based on the risk they pose to\
    \ users, the Android system, or other applications on a device. A summary of all\
    \ permission types can be seen in Table [3-1](#509502_1_En_3_Chapter.xhtml#Tab1).^([⁵](#fn5))\n\
    \n**Table 3-1** Permission Types\n\n| Permission Type | Risk | Description |\n\
    | --- | --- | --- |\n| Normal | Low | The default permission type. Providing the\
    \ application with isolated application-level features such as `BLUETOOTH`, `NFC`,\
    \ and `INTERNET`. |\n| Dangerous | High | Providing the application with access\
    \ to private data or an aspect of device control such as `WRITE_EXTERNAL_STORAGE`,\
    \ `ACCESS_FINE_LOCATION`, and `CAMERA`. Unlike the normal permission type, a runtime\
    \ permission request has to be accepted by the user (at runtime via a button click)\
    \ before permissions are granted by the system (or at install time on devices\
    \ prior to API level 23). |\n| Signature | Critical | This permission is only\
    \ granted if the application requesting the permission is signed by the same certificate\
    \ as the application that declared the permission. This is commonly used to restrict\
    \ a permission type to system/preinstalled applications. These permissions normally\
    \ grant either mass access to the control of the system and other applications\
    \ or circumvent Android security mechanisms. This includes `MANAGE_EXTERNAL_STORAGE`,\
    \ `READ_LOGS`, and `CAPTURE_AUDIO_OUTPUT`. |\n\nIn addition to these types, additional\
    \ flags can be applied to permissions including `privileged` and `development`\
    \ which refer to the rights given to system and development applications, respectively.^([⁶](#fn6))\n\
    \nFinally there are two additional permission types that need to be considered\
    \ in identifying what applications can perform what actions:\n\n* **Hard-restricted\
    \ permission** - Where a permission cannot be held by any application on the device\
    \ unless the permission has been allow-listed by the installer application\n*\
    \ **Soft-restricted permission** - Where a permission cannot be help by any application\
    \ on the device, in its full form, unless the permission has been allow-listed\
    \ by the installer application\n\nWhen debugging a device, permissions that would\
    \ normally not be available for a standard application (such as a permission with\
    \ the Signature permission type) can be granted using `adb`. As an example for\
    \ the `READ_LOGS` permission the following command can be used to grant the permission\
    \ `adb shell pm grant <Package ID> android.permission.READ_LOGS`. To retrieve\
    \ an application's Package ID, see Chapter [5](#509502_1_En_5_Chapter.xhtml) or\
    \ Chapter [12](#509502_1_En_12_Chapter.xhtml).\n\nAn example of a manifest permission:\n\
    \n```\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\"\
    \ />\n```\n\nAn example of a runtime permission request:\n\n```\nif (Build.VERSION.SDK_INT\
    \ >= 23) {\n    // Notification will not be shown unless the correct manifest\
    \ permission is set\n    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE},\
    \ 1234);\n}\n```\n\nAt the time of writing the Android specifications,^([⁷](#fn7))\
    \ list 166 different manifest permissions. Table [3-2](#509502_1_En_3_Chapter.xhtml#Tab2)\
    \ shows a subset of the most common of these permissions as well as their API\
    \ and permission levels.\n\n**Table 3-2** Android Permissions\n\n| Name | Permission\
    \ | API Level | Description |\n| --- | --- | --- | --- |\n| `ACCESS_COARSE_LOCATION`\
    \ | Dangerous | 29+ | Access to approximate location, via non-GPS providers (such\
    \ as network provider). |\n| `ACCESS_FINE_LOCATION` | Dangerous | 1+ | Access\
    \ to a specific location, via GPS and network provider. |\n| `ACCESS_NETWORK_STATE`\
    \ | Normal | 1+ | Access to `ConnectivityManager` responsible for, among other\
    \ things, monitoring network connection (Wi-Fi-GPRS, UMTS, etc.). |\n| `ACCESS_WIFI_STATE`\
    \ | Normal | 1+ | Access to `WifiManager` responsible for viewing a list of configured\
    \ networks, the current active network, and results of access point scans. |\n\
    | `ANSWER_PHONE_CALLS` | Dangerous | 26+ | Allows the application to answer an\
    \ incoming call. |\n| `BATTERY_STATS` | Signature\\|privileged\\|development |\
    \ 1+ | Allows for the aggregation of battery information and statistics. |\n|\
    \ `BLUETOOTH` | Normal | 1+ | Allows for the pairing and connection with Bluetooth\
    \ devices. |\n| `CALL_PHONE` | Dangerous | 1+ | Allows the application to call\
    \ without sending an intent to the dialer application (in turn not needing to\
    \ notify the user via the UI). |\n| `CALL_PRIVILEGED` | Not for use by third-party\
    \ applications | 1+ | A less restricted version of the `CALL_PHONE` permission\
    \ allowing the application to call any phone number including emergency numbers.\
    \ |\n| `CAMERA` | Dangerous | 1+ | Provides access to the device's cameras. |\n\
    | `CAPTURE_AUDIO_OUTPUT` | Prohibited to third-party applications | 19+ | Allows\
    \ for nonrestricted access to record audio from the device's microphone. |\n|\
    \ `CHANGE_WIFI_STATE` | Normal | 1+ | Allows for the application to modify the\
    \ device's network configuration and to connect to and disconnect from Wi-Fi access\
    \ points. |\n| `DELETE_PACKAGES` | Prohibited to third-party applications | 1+\
    \ | Allows for the removal of an application. As of Android 7 user, confirmation\
    \ is required if the application requesting the removal is not the same as the\
    \ application that installed it. |\n| `INSTALL_PACKAGES` | Prohibited to third-party\
    \ applications | 1+ | Allows an application to install another. |\n| `INTERNET`\
    \ | Normal | 1+ | Allows an application to open network sockets. |\n| `MANAGE_EXTERNAL_STORAGE`\
    \ | Signature\\|appop\\|preinstalled | 30+ | Due to the implementation of scoped\
    \ storage in Android 10 (applications having a sandboxed external storage), this\
    \ permission allows for the broad managing of the external storage space. |\n\
    | `NFC` | Normal | 9+ | Allows for I/O operations over NFC (near-field communication).\
    \ |\n| `PROCESS_OUTGOING_CALLS` | Dangerous and hard restricted | 1–29 | Allows\
    \ an application to see and redirect all outgoing calls. |\n| `READ_CONTACTS`\
    \ | Dangerous | 1+ | Allows for the reading of the user's contact information.\
    \ |\n| `READ_EXTERNAL_STORAGE` | Dangerous, soft restricted | 16+ | Allows for\
    \ an application to read from external storage. After API 19 this permission is\
    \ not required to read the application's scoped storage. As of the forced implementation\
    \ of scoped storage in API level 29, this only provides read only access. |\n\
    | `READ_LOGS` | Prohibited to third-party applications | 1+ | Allows for reading\
    \ system log information, such as those created by `DropBoxManager`. |\n| `READ_PHONE_NUMBERS`\
    \ | Dangerous | 26+ | Allows for the application to read all of the device's phone\
    \ numbers. By default this permission is exposed to instant applications. |\n\
    | `READ_PHONE_STATE` | Dangerous | 1+ | Includes the `READ_PHONE_NUMBERS` permission.\
    \ Allows for access to device/phone information such as the current cellular network.\
    \ |\n| `READ_SMS` | Dangerous and hard restricted | 1+ | Allows for the reading\
    \ of SMS messages already received by the device. |\n| `REBOOT` | Prohibited to\
    \ third-party applications | 1+ | Allows for the rebooting of the device. |\n\
    | `RECEIVE_BOOT_COMPLETED` | Normal | 1+ | Allows an application to receive the\
    \ `Intent.ACTION_BOOT_COMPLETED` intent. This intent is broadcast after the system\
    \ has finished booting. |\n| `RECEIVE_MMS` | Dangerous and hard restricted | 1+\
    \ | Allows for an application to monitor incoming MMS messages. |\n| `RECEIVE_SMS`\
    \ | Dangerous and hard restricted | 1+ | Allows for an application to monitor\
    \ incoming SMS messages. |\n| `RECORD_AUDIO` | Dangerous | 1+ | Allows for an\
    \ application to record audio. |\n| `REQUEST_DELETE_PACKAGES` | Normal | 26+ |\
    \ Allows for an application to request for either itself or another application\
    \ to be deleted. This will require user interaction. |\n| `REQUEST_INSTALL_PACKAGES`\
    \ | Signature | 23+ | Allows for an application to request for the installing\
    \ of an application. This will require user interaction. |\n| `SEND_SMS` | Dangerous\
    \ and hard-restricted permission | 1+ | Allows for the sending of SMS messages.\
    \ |\n| `SET_PREFERRED_APPLICATIONS` | Normal | 1–15 | Allows the application to\
    \ modify the user's preferred (default) applications – including web browser and\
    \ installer. |\n| `SET_TIME` | Prohibited to third-party applications | 8+ | Allows\
    \ for the setting of the system time. |\n| `USE_BIOMETRIC` | Normal | 28+ | Allows\
    \ for the use of device-supported hardware. |\n| `USE_FINGERPRINT` | Normal |\
    \ 23–28 | Allows for the use of device fingerprint hardware. Replaced by the `USE_BIOMETRIC`\
    \ permission in Android API level 28. |\n| `WAKE_LOCK` | Normal | 1+ | Allows\
    \ the application to initiate `PowerManager` Wake Locks which can prohibit the\
    \ device from sleeping or from the screen dimming. |\n| `WRITE_EXTERNAL_STORAGE`\
    \ | Dangerous | 4+ | Allows for the writing to the device external storage. Also\
    \ grants the `READ_EXTERNAL_STORAGE` permission. After API 19 this permission\
    \ is not required to read/write in the application's scoped storage. As of the\
    \ forced implementation of scoped storage in API level 29, this only allows for\
    \ an application to read their own storage data. |\n\n# Context\n\nAnother core\
    \ component in Android is `Context`. Colloquially referred to as the \"god\" class,\
    \ `Context`^([⁸](#fn8)) in Android is an interface for retrieving global information\
    \ about an application's environment. It allows for accessing application-specific\
    \ resources as well as application-level operations such as broadcasting, receiving\
    \ intents, and launching activities. Some use cases include:\n\n* Accessing the\
    \ location of the application's internal storage\n* Sending a Toast or Notification\
    \ dialogue\n* Setting an `ImageView` in an activity\n* Retrieving the system package\
    \ manager\n\nThere are two main types of `Context`: an application context and\
    \ an activity context. Both of these types of `Context` are bound to the life\
    \ cycle of their respective area - where an application context is tied to the\
    \ life cycle of the application and the activity context is bound to the life\
    \ cycle of its activity. This means that if either is destroyed, then their respective\
    \ context is garbage collected.\n\nIn addition to these two subclasses of `Context`,\
    \ there is also `ContextWrapper` which can be used with the `Context` method `getBaseContext()`.\
    \ `ContextWrapper` allows for a proxy `Context` to be used, where it is then possible\
    \ to modify the behavior of the object without changing the original `Context`.\n\
    \n## Application Context\n\nThe following returns the application context. When\
    \ the application is destroyed, it will be garbage collected.\n\n*Retrieve application\
    \ context:*\n\n```\ngetApplicationContext()\n```\n\n## Activity Context\n\nWhen\
    \ in an `Activity` or subclass of `Activity`, use `this` to return the activity\
    \ context. When the activity is destroyed, then the activity context is garbage\
    \ collected.\n\n*Retrieve activity context from inside activity:*\n\n```\nthis\n\
    ```\n\n# The Activity Life Cycle\n\nAs part of using a device, the individual\
    \ activities of an application can enter many different states. The activity class\
    \ provides useful callbacks that are triggered when these states are entered so\
    \ that an application can respond appropriately. The full activity life cycle\
    \ can be seen in Figure [3-2](#509502_1_En_3_Chapter.xhtml#Fig2).\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig2_HTML.png](images/509502_1_En_3_Chapter/509502_1_En_3_Fig2_HTML.png)\n\
    \n**Figure 3-2** Android application activity life cycle\n\n### `onCreate()`\n\
    \nThis callback is called when the activity is first created. This method takes\
    \ a parameter of `savedInstanceState` which is a bundle containing the activity's\
    \ previously saved state or `null` if it hasn't existed previously.\n\n### `onStart()`\n\
    \nThis callback prepares the activity to enter the foreground and makes it visible\
    \ to the user. This callback is always called each time the activity starts, unless\
    \ resuming.\n\n### `onResume()`\n\nWhen entering this state, the activity is ready\
    \ to be interacted with by the user and enters the foreground. Interrupt events\
    \ may occur such as a phone call or the user moving to another activity - if this\
    \ occurs the activity moves to the `onPause()` callback.\n\n### `onPause()`\n\n\
    This callback indicates that the activity is no longer in the foreground; however,\
    \ it does not necessarily mean that it is about to be destroyed.\n\n### `onStop()`\n\
    \nThis callback is called before the activity is destroyed when the activity is\
    \ no longer visible to the user. This is where applications should release resources.\
    \ The `onStop()` callback is the last callback an activity will receive.\n\n###\
    \ `onRestart()`\n\nThis activity is called after the `onStop()` callback when\
    \ the activity is being redisplayed to the user. This is followed by `onStart()`\
    \ and `onResume()`.\n\n# Android Users\n\nIn Android there are two distinct concepts\
    \ that could both be identified as \"users\".\n\n## Linux Users\n\nAndroid is\
    \ a multiuser Linux system where each application is sandboxed, meaning that each\
    \ application is represented by a different user. The Android system assigns each\
    \ unique application certificate (the certificate that the `apk` file is signed\
    \ with) a unique Linux user ID, in turn also setting the permission of all of\
    \ the application's files so that only the specified Linux user ID can access\
    \ them.^([⁹](#fn9)) This means that if two applications are signed by the same\
    \ certificate, then they are placed in the same sandbox. This is also required\
    \ when it comes to the `Signature` permission type (discussed earlier) where if\
    \ a permission has this type, then it can only be used by applications with the\
    \ same certificate as the application that created the permission (commonly seen\
    \ to prohibit nonsystem applications from accessing system permissions).\n\nTo\
    \ view an application's Linux user ID, you can use `adb` as root to traverse to\
    \ the file system of the application (e.g., `/data/data/com.android.chrome`) and\
    \ use the `ls -la` command as can be seen in Figure [3-3](#509502_1_En_3_Chapter.xhtml#Fig3).\n\
    \n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig3_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3** Example of Linux user ID seen in the adb shell\n\n*To view the\
    \ application process ID programmatically:*\n\n```\nLog.v(\"Application Process\
    \ ID\", String.valueOf(android.os.Process.myUid()));\n```\n\n*The shell command\
    \ `id -u` can also be used via `adb` or via the runtime environment, as follows:*\n\
    \n```\nid -u\n```\n\n## Android Users\n\nThe second concept of users in Android\
    \ is designed for multiple end users^([^(10)](#fn10)) of a device, designed to\
    \ allow for multiple users who use the same Android device. This is achieved by\
    \ having distinct application data and some unique settings per account. In turn\
    \ this supports for multiple users to run in the background while another user\
    \ is active.\n\nThe users currently active on a device can be found under the\
    \ `/data/user` directory (as seen in Figure [3-4](#509502_1_En_3_Chapter.xhtml#Fig4))\
    \ or via the UI User screen (as seen in Figure [3-5](#509502_1_En_3_Chapter.xhtml#Fig5)).\
    \ As different users will have their own internal and scoped storage, it is important\
    \ to use the corresponding method calls (e.g., using the `Context` method `getFilesDir()`)\
    \ to retrieve the correct file paths as these may change over time. A user cannot\
    \ access the internal storage of another user even if it is for the same application.\n\
    \n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig5_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5** End user's view of different users on a device\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig4_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** Example of Android user IDs, as seen in adb shell\n\n# Footnotes\n\
    \n---\n\n# Intents\n\nIntents are one of the core inter-process communication\
    \ (IPC) mechanisms in Android, allowing for applications to communicate (e.g.,\
    \ send data or initiate an action) with other Android components (including applications)\
    \ even if the recipient is not currently running. There are two main categories\
    \ of intent in Android, these being:\n\n* **Explicit** - Explicit intents are\
    \ intents that specify the application or both the application and component that\
    \ will action the request.\n* **Implicit** - Implicit intents are more vague and\
    \ specify a type of action that is desired (e.g., opening a camera or location\
    \ application).\n\nIn addition to these two main categories of intents, where\
    \ the message is directly sent to a specific application or service, broadcast\
    \ intents can also be sent. These broadcast messages, which can be sent by the\
    \ Android system or applications, are simultaneously received by all applications\
    \ on the device that have previously registered for the specific broadcast action\
    \ type. In some cases special permissions may be required to register for specific\
    \ broadcasts (e.g., in the case of the `BOOT_COMPLETE` permission which allows\
    \ for the receiving of an `ACTION_BOOT_COMPLETED` intent when the Android system\
    \ finishes loading after startup).\n\n## Starting Components\n\nOutside of the\
    \ two categories of intent, there are three main methods for sending intents:\n\
    \n* **Starting an activity** - An instance of an activity can be started by passing\
    \ an initialized `Intent` object to either the `startActivity()` or `startActivityForResult()`\
    \ context methods.\n* **Starting a background service** - Prior to Android 5.0\
    \ (API level 21), a background `Service` can be started by passing an initialized\
    \ `Intent` object to the `startService()` context method. Post API level 21, this\
    \ can be used to start `JobScheduler` components instead.\n* **Sending a broadcast**\
    \ - While the system sends many broadcasts at a regular frequency, such as `TIME_TICK`\
    \ and `BOOT_COMPLETE`, it is also possible for an ordinary application to send\
    \ its own broadcasts. In general, broadcasts are a type of intent that can be\
    \ received by multiple applications simultaneously. Such a broadcast can be sent\
    \ with the `sendBroadcast()` or `sendOrderedBroadcast()` context methods.\n\n\
    ## Intent Attributes\n\nAn intent comprises of several attributes. Depending on\
    \ the intent being sent and the receiver, some of the following attributes may\
    \ be compulsory; however, in some situations none are required. All standard intent\
    \ attributes are stored as constants in the `Intent` object, for example, `Intent.FLAG_ACTIVITY_NO_HISTORY`,\
    \ whose constant value is `1073741824`.\n\n### Core Attributes\n\n* **Action**\
    \ - Settable using an initialized `Intent` object's `setAction` method. The action\
    \ defines the high-level action to be performed.\n* **Data** - Settable using\
    \ an initialized `Intent` object's `setData` method. The data field includes the\
    \ data this intent is operating on (e.g., a file to open in an image editing app).\n\
    \n### Additional Attributes\n\n* **Category** - Settable using an initialized\
    \ `Intent` object's `addCategory` method. Categories provide additional context\
    \ about the action to be performed by the intent. Only activities that can facilitate\
    \ all specified categories can be chosen to receive the intent.\n* **Type** -\
    \ Settable using an initialized `Intent` object's `setType` method. Normally the\
    \ type is inferred from the data itself; however, this attribute can be used to\
    \ set a specific MIME (Multipurpose Internet Mail Extensions) type (e.g., `audio/mpeg`\
    \ or `audio/*`), for example, of the data to return.\n* **Component** - Settable\
    \ using an initialized `Intent` object's `setComponent` method. This attribute\
    \ identifies the name of a component class to use for the intent. This is an optional\
    \ attribute as it is normally identified based on the content of the intent.\n\
    * **Extras** - Settable using an initialized `Intent` object's `putExtra` method.\
    \ An extra is a bundle (a set of key-value pairs with varying types) which the\
    \ receiver can use (e.g., when sharing a note with your social media app, the\
    \ note text will be sent across as a field in a bundle). This bundle can include\
    \ proprietary keys or ones set in the Android system such as `EXTRA_ALARM_COUNT`.\n\
    * **Flags** - Settable using an initialized `Intent` object's `setFlag` method.\
    \ Flags represent the behavior of the component being launched (e.g., not including\
    \ the launched activity in the task stack).\n\n### Actions\n\nSettable using an\
    \ initialized `Intent` object's `setAction` method. The `getAction` method can\
    \ also be used for retrieving a received intent's action. The action defines the\
    \ high-level action to be performed.\n\nAn example of this can be seen here:\n\
    \n```\nIntent intent = new Intent();\nintent.setAction(Intent.ACTION_MAIN);\n\
    ```\n\nAt the time of writing, the Android documentation^([^(11)](#fn11)) lists\
    \ upward of 135 standard intent action types. Table [4-1](#509502_1_En_4_Chapter.xhtml#Tab1)\
    \ lists a subset of the most common intent actions.\n\n**Table 4-1** Intent Actions\n\
    \n| Name | API Level | Description |\n| --- | --- | --- |\n| `ACTION_ALL_APPS`\
    \ | 1+ | List all available applications. |\n| `ACTION_APP_ERROR` | 14+ | Occurs\
