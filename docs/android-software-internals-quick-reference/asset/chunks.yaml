- fmt: '# 1. Introduction


    In 2016 there were more than five million Android developers worldwide. Three
    years later, in 2019, there were 2.5 billion Android devices in circulation across
    the world. There is no doubt that Android is a massively adopted operating system,
    and not going anywhere anytime soon.


    This book has been designed for Android software engineers new and old, with a
    focus away from typical UI design. This book instead focuses on the parts of Java
    and the Android system that typically go forgotten when learning to build applications.
    This book will serve as a reference guide for techniques from device and user
    unique identifiers to ProGuard obfuscation to long-running services - in turn
    digging into some of the principles not intrinsically obvious from the get-go.


    As the name may suggest, this book won’t be covering Android UI development, nor
    will it be covering low-level C, or Kernel techniques. Instead, this book will
    be focusing on easily digestible, useful, and interesting techniques in Java and
    the Android system.


    ## What Is This Book


    *   An Android Java programming reference guide for non-UI elements.

    *   This book covers the Android operating system from Android 4.4 to 11.0.


    ## What This Book Is Not


    *   This book doesn’t include an introduction tutorial for Java; if you’re looking
    for this, there are many other great resources out there.

    *   This book doesn’t cover any low-level C programming, Kernel interaction, or
    vulnerability research.

    *   While one or two aspects of the Android UI may be covered in this book, it
    will not be a key focus.


    # 2. Android Versions


    Android 1.0 was released on September 23, 2008; since then the operating system
    has gone through countless changes. Table [2-1](#509502_1_En_2_Chapter.xhtml#Tab1)
    denotes the different versions of Android (starting from version 1.5 Cupcake).


    The API level in Android defines the supported API functionality on that device.
    If using a device’s shell prompt (e.g., via the command `adb shell`, which is
    available as part of the Android platform tools), you can return the system property
    that relates to the current API level by running `getprop | grep sdk`. This can
    also be done via `adb` (Android Debug Bridge) from a connected machine.


    *The following shows an example output of this command as run on a Google Pixel
    4a running Android 11:*


    ```

    [ro.build.version.min_supported_target_sdk]: [23]

    [ro.build.version.preview_sdk]: [0]

    [ro.build.version.preview_sdk_fingerprint]: [REL]

    [ro.build.version.sdk]: [30]

    [ro.product.build.version.sdk]: [30]

