    \n**图12-1** 软件开发者和逆向工程师的处理视图\n\n## 反编译的Java\n\n第一种选择是使用工具将Dalvik字节码反编译为可读的Java。这种Java更像是伪代码而非实际Java，因为它是反编译器对Dalvik汇编表示的“最佳猜测”。虽然这种视图对Java开发人员来说更熟悉，但通常不是最佳选择，因为它不仅不能代表实际应用程序代码，而且也无法运行或重新编译。诸如`dex2jar`和`jadx`之类的工具可用于反编译Dalvik可执行文件。`Jadx`可用于将`Jadx`项目导出为Gradle项目，从而允许将项目加载到Android\
    \ Studio中。\n\n*`APKTool`可用于从APK中提取`.dex`文件：*\n\n```\napktool  -s d \n```\n\n*使用`JADX`反编译并查看APK或Dex文件的反编译Java代码：*\n\
    \n```\njadx -e \n```\n\n## 反汇编的Dalvik字节码（Smali）\n\n与其反编译为伪Java，不如使用反汇编器将Dalvik字节码恢复为其自身的可读表示形式。Dalvik字节码更常用的形式称为Smali。反汇编为Smali的好处在于，一个`dex`文件可以被反汇编、读取、修改、重新汇编和重新签名，并且仍然保持完全可用的状态。\n\
    \n*诸如`APKTool`之类的工具可用于反汇编Dalvik字节码：*\n\n```\napktool d \n```\n\n由于Smali的特性，其代码体积通常比Java或Kotlin大得多。例如，以下Java中的Toast代码（一个简单的Android弹出消息）的大小仅为相同Smali代码的一半。\n\
