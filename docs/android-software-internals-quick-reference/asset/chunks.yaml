    Android Applications\n\nAndroid applications are written in either Java or Kotlin.\
    \ When an\napplication is built, these are compiled down into Dalvik bytecode\
    \ -\nrepresented in `dex` (Dalvik executable)\nfiles. This Dalvik\nbytecode is\
    \ in binary, and so isn’t human readable. This being\nthe case, if a reverse engineer\
    \ is looking to analyze an\nalready-compiled Android application, they are left\
    \ with the option to\ndecompile or disassemble the Dalvik executable. The process\
    \ of creating\nand reverse engineering an Android application is highlighted in\
    \ Figure\n[12-1](#509502_1_En_12_Chapter.xhtml#Fig1).\n\n![../images/509502_1_En_12_Chapter/509502_1_En_12_Fig1_HTML.png](images/509502_1_En_12_Chapter/509502_1_En_12_Fig1_HTML.png)\n\
    \nFigure 12-1\nSoftware developer and\nreverse engineer process view\n\nDecompiled\
    \ Java\nThe first option is to use a tool to decompile the Dalvik bytecode to\n\
    human-readable Java. This Java is more pseudocode than actual Java, as\nit’s the\
    \ decompiler’s “best guess” at what the Dalvik assembly\nrepresents. While this\
    \ view will be more familiar to Java developers, it\nnormally isn’t the best option,\
    \ as not only is it not representative of\nthe actual application code but it\
    \ is also not runnable or recompilable.\nTools such as `dex2jar` and `jadx` can\
    \ be used for\ndecompiling Dalvik executables. Jadx can be used to export a Jadx\n\
    project to a Gradle project, in turn allowing for the project to be\nloaded into\
    \ Android Studio.\n\n*APKTool can be used for extracting the .dex file from an\
    \ APK:*\n\n```\napktool  -s d \n```\n\n*Decompile and view an APK or Dex file’s\
    \ decompiled java with\nJADX:*\n\n```\njadx -e \n```\n\nDisassembled Dalvik Bytecode\n\
    (Smali)\nInstead of decompiling to pseudo-Java, a disassembler can be used to\n\
    revert the Dalvik bytecode to a human-readable representation of itself.\nThe\
    \ more commonly used form of this for Dalvik bytecode is called Smali.\nThe benefit\
    \ of disassembling to Smali is that a `dex` file can be\ndisassembled, read, modified,\
    \ reassembled, and resigned and will still\nbe in a fully functioning state.\n\
    \n*Tools such as APKTool can be used to disassemble dalvik\nbytecode:*\n\n```\n\
    apktool d \n```\n\nDue to its nature, Smali has a significantly larger code footprint\n\
    than Java or Kotlin. For example, the following Toast code (a simple\nAndroid\
    \ pop-up message) in Java is half the size of the same code in\nSmali.\n\n*Java:*\n\
    \n```\nContext context = getApplicationContext();\nCharSequence text = \"I'm a\
    \ Toast\";\nint duration = Toast.LENGTH_SHORT;\nToast toast = Toast.makeText(context,\
    \ text, duration);\ntoast.show();\n```\n\n*Smali:*"
