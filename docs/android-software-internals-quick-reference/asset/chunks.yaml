    \ |\n| `ACTION_SET_WALLPAPER` | 1+ | Used for displaying the settings for choosing\
    \ a wallpaper. |\n| `ACTION_TIMEZONE_CHANGED` | 1+ | A protected broadcast intent\
    \ that can only be sent by the system and indicates that the system time zone\
    \ has changed. The extra `EXTRA_TIMEZONE` is included. |\n| `ACTION_VOICE_COMMAND`\
    \ | 1+ | An intent action used to initiate a voice command. |\n| `ACTION_WEB_SEARCH`\
    \ | 1+ | An intent action used to initiate a web search. |\n\n### Categories\n\
    \nSettable using an initialized `Intent` object's `addCategory` method. The `getCategories`\
    \ method can also be used for retrieving a received intent's categories. Categories\
    \ provide additional context about the action to be performed by the intent. Only\
    \ activities that can facilitate all specified categories can be chosen to receive\
    \ the intent.\n\nAn example of this can be seen here:\n\n```\nIntent intent =\
    \ new Intent();\nintent.addCategory(Intent.APP_CALCULATOR);\n```\n\nAt the time\
    \ of writing, the Android documentation^([^(12)](#fn12)) lists upward of 39 standard\
    \ intent category attributes. Table [4-2](#509502_1_En_4_Chapter.xhtml#Tab2) lists\
    \ a subset of the most common of these intent categories.\n\n**Table 4-2** Intent\
    \ Categories\n\n| Name | API Level | Description |\n| --- | --- | --- |\n| `CATEGORY_ALTERNATIVE`\
    \ | 1+ | Used to identify an alternate action to the standard activity or the\
    \ data the user is currently viewing. |\n| `CATEGORY_APP_BROWSER` | 15+ | Used\
