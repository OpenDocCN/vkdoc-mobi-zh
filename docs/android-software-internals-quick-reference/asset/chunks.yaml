    \ Used to set acceptable MIME types (e.g., `audio/mpeg` or `audio/*`). |\n| `EXTRA_NOT_UNKNOWN_SOURCE`\
    \ | 14+ | Part of the `ACTION_INSTALL_PACKAGE` action and indicates that the application\
    \ to be installed is being installed from the application sending the intent and\
    \ not an unknown source. |\n| `EXTRA_PACKAGE_NAME` | 24+ | Contains an application\
    \ name. |\n| `EXTRA_PHONE_NUMBER` | 1+ | Part of the `ACTION_NEW_OUTGOING_CALL`\
    \ and `ACTION_CALL` actions and contains the phone number for the call. |\n| `EXTRA_QUIET_MODE`\
    \ | 24+ | Indicates whether quiet mode (where all applications in the profile\
