    \ the Dalvik Virtual Machine to storage types for Android applications and how\
    \ to reverse engineer an already-compiled Android application.\n\nIt’s important\
    \ to bear in mind that while the core principles in this book should continue\
    \ to be relevant for many years to come, some aspects may change as new versions\
    \ of Android are released. This being the case, while continuing to use this book\
    \ as a reference guide, also review the footnotes scattered throughout the book\
