    # 3. 基础


    ## Android 沙箱


    Android 运行在一个多用户的 Linux 系统下，这意味着每个应用程序及其存储都在一个独立的用户下运行。这意味着在正常情况下，应用程序无法读取另一个应用程序的数据或内部存储。每个进程使用自己的虚拟机（VM）来隔离应用程序。在
    API 级别 21（Android 5）之前，这将是 Dalvik 虚拟机，而在后续版本中则使用 Android 运行时（ART）。两者的运行方式类似，它们模拟设备的
    CPU、寄存器和其他功能，同时运行应用程序编译后的 Dalvik 字节码。然而，`ART`被认为在性能上有许多改进。


    在这些虚拟机中，应用程序只能访问其运行所需的组件（最小权限策略）。这些单独的进程虚拟机由`Zygote`¹（zai·gowt）创建。`Zygote`由 Android
    运行时在启动时以 root 权限启动，并附带第一个虚拟机以及所有共享的 Java 类和资源。当一个新的应用程序想要启动时，会派生出一个新的`Zygote`进程，应用程序绑定到该新进程的线程，并在其中运行其代码。`Zygote`会丢弃不需要且未被请求的权限，以便应用程序只拥有必要的权限。


    ## 应用程序组件

    '
- fmt: '### Activities


    `Activities` are the main entry points for Android applications. Akin to a single
    web page, an activity is a single screen which in general will only remain running
    while in the foreground. While not all activities have to be visible, most standard
    application activities will be. An activity can be programmatically implemented
    by extending the `Activity` class.


    #### Services


    In general terms, services are a utility in Android for providing functionality
    in the background while an application is not currently running in the foreground,
    for example, a music player, an email client polling for emails, or a maps application.
    The preferred technology used for tasking services has changed in Android over
    the years from using `Services` to using `JobSchedulers`. These will be discussed
    more in Chapter [10](#509502_1_En_10_Chapter.xhtml).


    ### Broadcast Receivers


    Another entry point to the application is where the system, other applications,
    and the application itself can “broadcast” events that the application then receives.
    Broadcast receivers have restricted functionality (where, as a general rule, they
    can only run for 10 seconds before being considered as unresponsive^([²](#fn2)))
    and, because of this, will normally start another form of long-running service
    such as a foreground `Activity` or a `JobScheduler`. A broadcast receiver is implemented
    by extending the `BroadcastReceiver` class. These will be discussed more in Chapter
    [4](#509502_1_En_4_Chapter.xhtml).


    ### Content Providers


    Content providers are used to manage sets of application data so that they are
    sharable with other applications on a device. Using a URI, other applications
    can query or modify the data even if the application the URI belongs to is not
    currently running. Examples include images, text files, SQLite databases, etc.


    ### Manifest


    An application’s manifest file^([³](#fn3)) is created precompilation and cannot
    be edited during runtime. These XML-like files, called `AndroidManifest.xml`,
    detail all of the components in a single application (activities, broadcast receivers,
    services, etc.). The manifest file also details permissions that the application
    requires, the minimum API level, as well as hardware and software features used
    by the application (such as a camera). While an application will only have one
    manifest file, imported libraries may have their own. Due to this, during the
    build, Gradle will merge all of these individual manifest files; the result is
    called a merged manifest.^([⁴](#fn4)) This is evident when reversing an Android
    application (`APK` file), as (if using libraries) the reversed manifest will be
    significantly larger and have additional elements than the original premerged
    manifest.


    An example of a simple `AndroidManifest.xml` file can be seen here. In this example
    the package is called `simple_app`, it uses the `FINGERPRINT` permission (as described
    below), and its main entry point is an activity called `MainActivity` which has
    two intent filters:'
