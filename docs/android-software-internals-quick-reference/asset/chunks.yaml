    Java classes and resources. When a new application wants to launch, a new Zygote
    process is forked and the application is bound to the thread of the new process,
    and its code is run inside of it, nonrequired and nonrequested permissions are
    dropped by Zygote so that the application only possesses the necessary permissions.


