    \ instead of performing a full OS restart. |\n| `EXTRA_SUBJECT` | 1+ | A high\
    \ level extra containing a subject for the data being sent. |\n| `EXTRA_TEXT`\
    \ | 1+ | Part of the `ACTION_SEND` action. A high level extra containing data\
    \ to be received in the form of a `CharSequence` (or `String` as `String` implements\
    \ the `CharSequence` interface). |\n| `EXTRA_TIME` | 30+ | A high-level extra\
    \ where its value contains a time in milliseconds since the Epoch (e.g., 1608553466).\
    \ |\n| `EXTRA_TIMEZONE` | 30+ | Part of the `ACTION_TIMEZONE_CHANG"
  raw: "## Permissions\n\nPermissions in Android follow the least privilege model\
    \ where specific types of functionality are only given to applications that specifically\
    \ request for them. There are two main types of permission: manifest permissions\
    \ and runtime permissions (of which commonly fall into the “dangerous” permissions\
    \ category). Both runtime and manifest permissions must be declared in the Android\
    \ manifest; however, in addition, runtime permissions must be requested at runtime\
    \ prompting the user with a dialogue (as seen in Figure [3-1](#509502_1_En_3_Chapter.xhtml#Fig1))\
    \ on if they are happy for the application to use the stated functionality. Runtime\
    \ permissions were implemented in API level 23; however, previous to this a user\
    \ will be shown all runtime permissions prior to install instead.\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nExample of a runtime permission as seen by the user\n\nAs previously\
    \ stated permissions are given a permission type based on the risk they pose to\
    \ users, the Android system, or other applications on a device. A summary of all\
    \ permission types can be seen in Table [3-1](#509502_1_En_3_Chapter.xhtml#Tab1).^([⁵](#fn5))\n\
    \nTable 3-1\n\nPermission Types\n\n| Permission Type | Risk | Description |\n\
    | --- | --- | --- |\n| Normal | Low | **The default permission type**. Providing\
    \ the application with isolated application-level features such as `BLUETOOTH`,\
    \ `NFC`, and `INTERNET`. |\n| Dangerous | High | Providing the application with\
    \ access to private data or an aspect of device control such as `WRITE_EXTERNAL_STORAGE,\
    \ ACCESS_FINE_LOCATION`, and `CAMERA`.Unlike the normal permission type, a runtime\
    \ permission request has to be accepted by the user (at runtime via a button click)\
    \ before permissions are granted by the system (or at install time on devices\
    \ prior to API level 23). |\n| Signature | Critical | This permission is only\
    \ granted if the application requesting the permission is signed by the same certificate\
    \ as the application that declared the permission.This is commonly used to restrict\
    \ a permission type to system/preinstalled applications. These permissions normally\
    \ grant either mass access to the control of the system and other applications\
    \ or circumvent Android security mechanisms. This includes `MANAGE_EXTERNAL_STORAGE`,\
    \ `READ_LOGS`, and `CAPTURE_AUDIO_OUTPUT`. |\n\nIn addition to these types, additional\
    \ flags can be applied to permissions including `privileged` and `development`\
    \ which refer to the rights given to system and development applications, respectively.^([⁶](#fn6))\n\
    \nFinally there are two additional permission types that need to be considered\
    \ in identifying what applications can perform what actions:\n\n*   **Hard-restricted\
    \ permission** - Where a permission cannot be held by any application on the device\
    \ unless the permission has been allow-listed by the installer application\n\n\
    *   **Soft-restricted permission** - Where a permission cannot be help by any\
    \ application on the device, in its full form, unless the permission has been\
    \ allow-listed by the installer application\n\nWhen debugging a device, permissions\
    \ that would normally not be available for a standard application (such as a permission\
    \ with the Signature permission type) can be granted using adb. As an example\
    \ for the `READ_LOGS` permission the following command can be used to grant the\
    \ permission `adb shell pm grant <Package ID> android.permission.READ_LOGS`. To\
    \ retrieve an application’s Package ID, see Chapter [5](#509502_1_En_5_Chapter.xhtml)\
    \ or Chapter [12](#509502_1_En_12_Chapter.xhtml).\n\n*An example of a* *manifest*\
    \ *permission:*\n\n```\n\n*An example of a* *runtime* \n*permission request:*\n\
    \n```\nif (Build.VERSION.SDK_INT >= 23) {\n// Notification will not be shown unless\
    \ the correct manifest permission is set\nActivityCompat.requestPermissions(this,\
    \ new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE}, 1234);\n}\n```\n\n\
    At the time of writing the Android specifications,^([⁷](#fn7)) list 166 different\
    \ manifest\npermissions. Table [3-2](#509502_1_En_3_Chapter.xhtml#Tab2) shows\
    \ a subset\nof the most common of these permissions as well as their API and\n\
    permission levels.\n\nTable 3-2\nAndroid\nPermissions\n\n Name |\n Permission\
    \ |\n API Level |\n Description |\n\n| --- | --- | --- | --- | --- | --- | ---\
    \ | --- | --- |\n\n ACCESS_COARSE_LOCATION |\n Dangerous |\n 29+ |\n Access to\
    \ approximate location, via non-GPS providers (such as network\nprovider). |\n\
    \n ACCESS_FINE_LOCATION |\n Dangerous |\n 1+ |\n Access to a specific location,\
    \ via GPS and network provider. |\n\n ACCESS_NETWORK_STATE |\n Normal |\n 1+ |\n\
    \ Access to `ConnectivityManager`\nresponsible for, among other things, monitoring\
    \ network connection\n(Wi-Fi-GPRS, UMTS, etc.). |\n\n ACCESS_WIFI_STATE |\n Normal\
    \ |\n 1+ |\n Access to `WifiManager`\nresponsible for viewing a list of configured\
    \ networks, the current\nactive network, and results of access point scans. |\n\
    \n ANSWER_PHONE_CALLS |\n Dangerous |\n 26+ |\n Allows the application to answer\
    \ an incoming call. |\n\n BATTERY_STATS |\n Signature&#124;privileged&#124;development\
    \ |\n 1+ |\n Allows for the aggregation of battery information and statistics.\
    \ |\n\n BLUETOOTH |\n Normal |\n 1+ |\n Allows for the pairing and connection\
    \ with Bluetooth devices. |\n\n CALL_PHONE |\n Dangerous |\n 1+ |\n Allows the\
    \ application to call without sending an intent to the dialer application\n(in\
    \ turn not needing to notify the user via the UI). |\n\n CALL_PRIVILEGED |\n Not\
    \ for use by third-party applications |\n 1+ |\n A less restricted version of\
    \ the `CALL_PHONE` permission\nallowing the application to call any phone number\
    \ including emergency\nnumbers. |\n\n CAMERA   |\n Dangerous |\n 1+ |\n Provides\
    \ access to the device’s cameras. |\n\n CAPTURE_AUDIO_OUTPUT |\n Prohibited to\
    \ third-party applications |\n 19+ |\n Allows for nonrestricted access to record\
    \ audio from the device’s\nmicrophone. |\n\n CHANGE_WIFI_STATE |\n Normal |\n\
    \ 1+ |\n Allows for the application to modify the device’s network configuration\
    \ and to\nconnect to and disconnect from Wi-Fi access points. |\n\n DELETE_PACKAGES\
    \ |\n Prohibited to third-party applications |\n 1+ |\n Allows for the removal\
    \ of an application. As of Android 7 user, confirmation is\nrequired if the application\
    \ requesting the removal is not the same as\nthe application that installed it.\
    \ |\n\n INSTALL_PACKAGES |\n Prohibited to third-party applications |\n 1+ |\n\
    \ Allows an application to install another. |\n\n INTERNET |\n Normal |\n 1+ |\n\
    \ Allows an application to open network sockets. |\n\n MANAGE_EXTERNAL_STORAGE\
    \ |\n Signature&#124;appop&#124;preinstalled |\n 30+ |\n Due to the implementation\
    \ of scoped storage in Android 10 (applications having a\nsandboxed external storage),\
    \ this permission allows for the broad\nmanaging of the external storage space.\
    \ |\n\n NFC   |\n Normal |\n 9+ |\n Allows for I/O operations over NFC (near-field\
    \ communication). |\n\n PROCESS_OUTGOING_CALLS |\n Dangerous and hard restricted\
    \ |\n 1–29 |\n Allows an application to see and redirect all outgoing calls. |\n\
    \n READ_CONTACTS |\n Dangerous |\n 1+ |\n Allows for the reading of the user’s\
    \ contact information. |\n\n READ_EXTERNAL_STORAGE |\n Dangerous, soft restricted\
    \ |\n 16+ |\n Allows for an application to read from external storage.\nAfter\
    \ API 19 this permission is not required to read the\napplication’s scoped storage.\
    \ As of the forced implementation of scoped\nstorage in API level 29, this only\
    \ provides read only acceess. |\n\n READ_LOGS |\n Prohibited to third-party applications\
    \ |\n 1+ |\n Allows for reading system log information, such as those created\
    \ by `DropBoxManager`. |\n\n READ_PHONE_NUMBERS |\n Dangerous |\n 26+ |\n Allows\
    \ for the application to read all of the device’s phone numbers. By default\n\
    this permission is exposed to instant applications. |\n\n READ_PHONE_STATE   |\n\
    \ Dangerous |\n 1+ |\n Includes the `READ_PHONE_NUMBERS`\npermission. Allows for\
    \ access to device/phone information such as the\ncurrent cellular network. |\n\
    \n READ_SMS |\n Dangerous and hard restricted |\n 1+ |\n Allows for the reading\
    \ of SMS messages already received by the device. |\n\n REBOOT |\n Prohibited\
    \ to third-party applications |\n 1+ |\n Allows for the rebooting of the device.\
    \ |\n\n RECEIVE_BOOT_COMPLETED |\n Normal |\n 1+ |\n Allows an application to\
    \ receive the `Intent.ACTION_BOOT_COMPLETED`\nintent. This intent is broadcast\
    \ after the system has finished\nbooting. |\n\n RECEIVE_MMS |\n Dangerous and\
    \ hard restricted |\n 1+ |\n Allows for an application to monitor incoming MMS\
    \ messages. |\n\n RECEIVE_SMS |\n Dangerous and hard restricted |\n 1+ |\n Allows\
    \ for an application to monitor incoming SMS messages. |\n\n RECORD_AUDIO |\n\
    \ Dangerous |\n 1+ |\n Allows for an application to record audio. |\n\n REQUEST_DELETE_PACKAGES\
    \ |\n Normal |\n 26+ |\n Allows for an application to request for either itself\
    \ or another application to be\ndeleted. This will require user interaction. |\n\
    \n REQUEST_INSTALL_PACKAGES |\n Signature |\n 23+ |\n Allows for an application\
    \ to request for the installing of an application. This\nwill require user interaction.\
    \ |\n\n SEND_SMS   |\n Dangerous and hard-restricted permission |\n 1+ |\n Allows\
    \ for the sending of SMS messages. |\n\n SET_PREFERRED_APPLICATIONS |\n Normal\
    \ |\n 1–15 |\n Allows the application to modify the user’s preferred (default)\
    \ applications –\nincluding web browser and installer. |\n\n SET_TIME |\n Prohibited\
    \ to third-party applications |\n 8+ |\n Allows for the setting of the system\
    \ time. |\n\n USE_BIOMETRIC |\n Normal |\n 28+ |\n Allows for the use of device-supported\
    \ hardware. |\n\n USE_FINGERPRINT |\n Normal |\n 23–28 |\n Allows for the use\
    \ of device fingerprint hardware. Replaced by the `USE_BIOMETRIC`\npermission\
    \ in Android API level 28. |\n\n WAKE_LOCK |\n Normal |\n 1+ |\n Allows the application\
    \ to initiate  `PowerManager` Wake\nLocks which can prohibit the device from sleeping\
    \ or from the screen\ndimming. |\n\n WRITE_EXTERNAL_STORAGE   |\n Dangerous |\n\
    \ 4+ |\n Allows for the writing to the device external storage. Also grants the\
    \ `READ_EXTERNAL_STORAGE`\npermission.\nAfter API 19 this permission is not required\
    \ to read/write in the\napplication’s scoped storage. As of the forced implementation\
    \ of scoped\nstorage in API level 29, this only allows for an application to read\n\
    their own storage data. |\n\nContext\n\nAnother core component in Android is `Context`.\
    \ Colloquially\nreferred to as the “god” class, Context^([⁸](#fn8)) in Android\
    \ is an interface for\nretrieving global information about an application’s environment.\
    \ It\nallows for accessing application-specific resources as well as application-level\n\
    operations such as broadcasting, receiving intents, and launching\nactivities.\
    \ Some use\ncases include\n\n*   Accessing the location of the application’s internal\n\
    \    storage\n\n*   Sending a Toast or Notification dialogue\n\n*   Setting an\
    \ `ImageView` in an\n    activity\n\n*   Retrieving the system package manager\n\
    \nThere are two main types of Context: an application context and\nan activity\n\
    context. Both of these types of Context are bound to the life\ncycle of their\
    \ respective area - where an application context is tied to\nthe life cycle of\
    \ the application and the activity context is bound to\nthe life cycle of its\
    \ activity. This means that if either is destroyed,\nthen their respective context\
    \ is garbage collected.\nIn addition to these two subclasses of Context, there\
    \ is also `ContextWrapper` which\ncan be used with the Context method `getBaseContext()`.\n\
    Context Wrapper allows for a proxy Context to be used, where it is then\npossible\
    \ to modify the behavior of the object without changing the\noriginal Context.\n\
    \nApplication Context \nThe following returns the application context. When the\
    \ application\nis destroyed, it will be garbage collected.\n\n*Retrieve application\
    \ context:*\n\n```\ngetApplicationContext()\n```\n\nActivity Context \nWhen in\
    \ an `Activity` or subclass\nof `Activity`,\nuse *this* to return the activity\
    \ context. When the activity is\ndestroyed, then the activity context is garbage\
    \ collected.\n\n*Retrieve activity context from inside activity:*\n\n```\nthis\n\
    ```\n\nThe Activity Life Cycle\n\nAs part of using a device, the individual activities\
    \ of an application\ncan enter many different states. The activity class provides\
    \ useful\ncallbacks that are triggered when these states are entered so that an\n\
    application can respond appropriately. The full activity life cycle can\nbe seen\
    \ in Figure [3-2](#509502_1_En_3_Chapter.xhtml#Fig2).\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig2_HTML.png](images/509502_1_En_3_Chapter/509502_1_En_3_Fig2_HTML.png)\n\
    \nFigure 3-2\nAndroid application\nactivity life cycle\n\nonCreate() \nThis callback\
    \ is called when the activity is first created. This\nmethod takes a parameter\
    \ of `savedInstanceState`\nwhich is a bundle containing the activity’s previously\
    \ saved state or\n`null` if it\nhasn’t existed previously.\n\nonStart() \nThis\
    \ callback prepares the activity to enter the foreground and makes\nit visible\
    \ to the user. This callback is always called each time the\nactivity starts,\
    \ unless resuming.\n\nonResume() \nWhen entering this state, the activity is ready\
    \ to be interacted with\nby the user and enters the foreground. Interrupt events\
    \ may occur such\nas a phone call or the user moving to another activity - if\
    \ this occurs\nthe activity moves to the `onPause()`\ncallback.\n\nonPause() \n\
    This callback indicates that the activity is no longer in the\nforeground; however,\
    \ it does not necessarily mean that it is about to be\ndestroyed.\n\nonStop()\
    \ \nThis callback is called before the activity is destroyed when the\nactivity\
    \ is no longer visible to the user. This is where applications\nshould release\
    \ resources. The `onStop()` callback is\nthe last callback an activity will receive.\n\
    \nonRestart() \nThis activity is called after the `onStop()` callback\nwhen the\
    \ activity is being redisplayed to the user. This is followed by\n`onStart()`\
    \ and\n`onResume()`.\n\nAndroid Users\nIn Android there are two distinct concepts\
    \ that could both be\nidentified as “users”.\n\nLinux\nUsers\nAndroid is a multiuser\
    \ Linux system where each application is\nsandboxed, meaning that each application\
    \ is represented by a different\nuser. The Android system assigns each unique\
    \ application certificate\n(the certificate that the `apk` file is signed\nwith)\
    \ a unique Linux user ID, in turn also setting the permission of all\nof the application’s\
    \ files so that only the specified Linux user ID can\naccess them.^([⁹](#fn9))\
    \ This means that if two\napplications are signed by the same certificate, then\
    \ they are placed in\nthe same sandbox. This is also required when it comes to\
    \ the `Signature` permission\ntype (discussed\nearlier) where if a permission\
    \ has this type, then it can only be used\nby applications with the same certificate\
    \ as the application that\ncreated the permission (commonly seen to prohibit nonsystem\
    \ applications\nfrom accessing system permissions).\n\nTo view an application’s\
    \ Linux user ID, you can use `adb` as root to\ntraverse to the file system of\
    \ the application (e.g., `/data/data/com.android.chrome`)\nand use the `ls -la`\
    \ command as can be seen in Figure [3-3](#509502_1_En_3_Chapter.xhtml#Fig3).\n\
    \n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig3_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\nExample of Linux user ID seen in the adb shell\n\n*To view the application\
    \ process ID programmatically:*\n\n```\nLog.v(\"Application Process ID\", String.valueOf(android.os.Process.myUid()));\n\
    ```\n\n*The shell command* *id -u* *can also be used via*\n*adb* *or via the runtime\
    \ environment, as follows:*\n\n```\nid -u\n```\n\nAndroid Users\nThe second concept\
    \ of users in Android is designed for multiple end\nusers^([^(10)](#fn10)) of\
    \ a device, designed to\nallow for multiple users who use the same Android device.\
    \ This is\nachieved by having distinct application data and some unique settings\n\
    per account. In turn this supports for multiple users to run in the\nbackground\
    \ while another user is active.\n\nThe users currently active on a device can\
    \ be found under the `/data/user` directory\n(as seen in Figure [3-4](#509502_1_En_3_Chapter.xhtml#Fig4))\
    \ or via the UI\nUser screen (as seen in Figure [3-5](#509502_1_En_3_Chapter.xhtml#Fig5)).\
    \ As different\nusers will have their own internal and scoped storage, it is important\n\
    to use the corresponding method calls (e.g., using the `Context` method `getFilesDir()`)\
    \ to\nretrieve the correct file paths as these may change over time. A user\n\
    cannot access the internal storage of another user even if it is for the\nsame\
    \ application.\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig5_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5\nEnd user’s view of different users on a device\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig4_HTML.jpg](images/509502_1_En_3_Chapter/509502_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\nExample of Android user IDs, as seen in adb shell\n\nFootnotes\n\
    \n4. Intents\n\nIntents are one of the core inter-process communication\n(IPC)\
    \ mechanisms in Android, allowing for applications to\ncommunicate (e.g., send\
    \ data or initiate an action) with other Android\ncomponents (including applications)\
    \ even if the recipient is not\ncurrently running. There are two main categories\
    \ of intent in Android,\nthese being:\n\n*   **Explicit** - Explicit intents \
    \ are intents that\n    specify the application or both the application and component\
    \ that will\n    action the request.\n\n*   **Implicit** - Implicit intents  are\
    \ more vague and\n    specify a type of action that is desired (e.g., opening\
    \ a camera or\n    location application).\n\nIn addition to these two main categories\
    \ of intents, where the\nmessage is directly sent to a specific application or\
    \ service, broadcast\nintents can also be sent. These broadcast messages, which\
    \ can be sent by\nthe Android system or applications, are simultaneously received\
    \ by all\napplications on the device that have previously registered for the\n\
    specific broadcast action type. In some cases special permissions may be\nrequired\
    \ to register for specific broadcasts (e.g., in the case of the\n`BOOT_COMPLETE`\n\
    permission which allows for the receiving of an `ACTION_BOOT_COMPLETED`\nintent\
    \ when the Android system finishes loading after startup).\n\nStarting Components\n\
    \nOutside of the two categories of intent, there are three main methods\nfor sending\n\
    intents:\n\n*   **Starting an activity** - An instance of an\n    activity can\
    \ be started by passing an initialized Intent object to\n    either the `startActivity()`\
    \ or\n    `startActivityForResult()`\n    context methods.\n\n*   **Starting a\
    \ background service** - Prior to Android\n    5.0 (API level 21), a background\
    \ `Service` can be\n    started by passing an initialized `Intent` object to the\n\
    \    `startService()`\n    context method. Post API level 21, this can be used\
    \ to start `JobScheduler`\n    components instead.\n\n*   **Sending a broadcast**\
    \ - While the system sends\n    many broadcasts at a regular frequency, such as\
    \ `TIME_TICK` and `BOOT_COMPLETE`, it is\n    also possible for an ordinary application\
    \ to send its own broadcasts. In\n    general, broadcasts are a type of intent\
    \ that can be received by\n    multiple applications simultaneously. Such a\n\
    \    broadcast can be sent with the `sendBroadcast()` or\n    `sendOrderedBroadcast()`\n\
    \    context methods.\n\nIntent Attributes\nAn intent comprises of several attributes.\
    \ Depending on the intent\nbeing sent and the receiver, some of the following\
    \ attributes may be\ncompulsory; however, in some situations none are required.\
    \ All standard\nintent attributes are stored as constants in the `Intent` object,\
    \ for\nexample, `Intent.FLAG_ACTIVITY_NO_HISTORY`,\nwhose constant value is `1073741824`.\n\
    \nCore\nAttributes\n\n*   **Action** - Settable using an initialized `Intent`\
    \ object’s `setAction` method. The\n    action defines the high-level action to\
    \ be performed.\n\n*   **Data** - Settable using an initialized Intent\n    object’s\
    \ `setData` method. The\n    data field includes the data this intent is operating\
    \ on (e.g., a file\n    to open in an image editing app).\n\nAdditional Attributes\n\
    \n*   **Category** - Settable using an initialized `Intent` object’s `addCategory`\
    \ method.\n    Categories provide additional context about the action to be performed\n\
    \    by the intent. Only activities that can facilitate all specified\n    categories\
    \ can be chosen to receive the intent.\n\n*   **Type** - Settable using an initialized\
    \ `Intent` object’s `setType` method . Normally the type is\n    inferred from\
    \ the data itself; however, this attribute can be used to\n    set a specific\
    \ MIME (Multipurpose Internet Mail Extensions) type (e.g.,\n    `audio/mpeg or\
    \ audio/*`), for example, of the data to return.\n\n*   **Component** - Settable\
    \ using an initialized `Intent` object’s `setComponent` method.\n    This attribute\
    \ identifies the name of a component class to use for the\n    intent. This is\
    \ an optional attribute as it is normally identified based\n    on the content\
    \ of the intent.\n\n*   **Extras** - Settable using an initialized `Intent` object’s\
    \ `putExtra` method . An extra is a bundle\n    (a set of key-value pairs with\
    \ varying types) which the receiver can use\n    (e.g., when sharing a note with\
    \ your social media app, the note text\n    will be sent across as a field in\
    \ a bundle). This bundle can include\n    proprietary keys or ones set in the\
    \ Android system such as `EXTRA_ALARM_COUNT`.\n\n*   **Flags** - Settable using\
    \ an initialized Intent\n    object’s `setFlag` method . Flags represent the\n\
    \    behavior of the component being launched (e.g., not including the launched\
    \ activity in the\n    task stack).\n\nActions\nSettable using an initialized\
    \ `Intent` object’s `setAction` method. The\n`getAction`\nmethod  can also\nbe\
    \ used for retrieving a received intent’s action. The action defines\nthe high-level\
    \ action to be performed.\n\n*An example of this can be seen here:*\n\n```\nIntent\
    \ intent = new Intent();\nintent.setAction(Intent.ACTION_MAIN);\n```\n\nAt the\
    \ time of writing, the Android documentation^([^(11)](#fn11)) lists upward of\
    \ 135 standard\nintent action types. Table [4-1](#509502_1_En_4_Chapter.xhtml#Tab1)\
    \ lists a subset\nof the most common intent actions.\n\nTable 4-1\nIntent Actions\n\
    \n Name |\n API Level |\n Description |\n\n| --- | --- | --- | --- | --- | ---\
    \ | --- |\n\n ACTION_ALL_APPS |\n 1+ |\n List all available applications. |\n\n\
    \ ACTION_APP_ERROR |\n 14+ |\n Occurs when the user selects the “report” button\
    \ in the crash dialogue warning\nmessage. This intent will then be sent to the\
    \ installer application that\ninstalled the application that errored. |\n\n ACTION_CAMERA_BUTTON\
    \ |\n 1+ |\n Indicating a broadcast where the device’s “camera button” has been\n\
    pressed. |\n\n ACTION_CHOOSER |\n 1+ |\n An alternative to the default standard\
    \ activity picker provided by the\nsystem. In turn this action will display an\
    \ activity chooser. |\n\n ACTION_DEFAULT ACTION_VIEW |\n 1+ |\n A simple action\
    \ which displays data to the user. |\n\n ACTION_MY_PACKAGE_SUSPENDED |\n 28+ |\n\
    \ A protected broadcast intent that can only be sent by the system and is sent\
    \ to an\napplication when it enters the suspended state. |\n\n ACTION_MY_PACKAGE_UNSUSPENDED\
    \ |\n 28+ |\n A protected broadcast intent that can only be sent by the system\
    \ and is sent to an\napplication when it leaves the suspended state. |\n\n ACTION_PACKAGE_ADDED\
    \ |\n 1+ |\n A protected broadcast intent that can only be sent by the system\
    \ and is sent when a\nnew application is installed on the device, including two\
    \ extras: `EXTRA_UID` and `EXTRA_REPLACING`. |\n\n ACTION_PACKAGE_CHANGED  |\n\
    \ 1+ |\n A protected broadcast intent that can only be sent by the system and\
    \ is sent when an\nexisting application on the device has changed, including the\
    \ extras:\n`EXTRA_UID`,\n`EXTRA_CHANGED_COMPONENT_NAME_LIST`,\nand `EXTRA_DONT_KILL_APP`.\
    \ |\n\n ACTION_PACKAGE_DATA_CLEARED |\n 3+ |\n A protected broadcast intent that\
    \ can only be sent by the system and should be\npreceded by `ACTION_PACKAGE_RESTARTED`.\n\
    This broadcast is sent when an application’s persistent data is erased\nbearing\
    \ in mind that this intent is not sent to the application itself,\nincluding the\
    \ extras: `EXTRA_UID` and `EXTRA_PACKAGE_NAME`. |\n\n ACTION_PACKAGE_FIRST_LAUNCH\
    \ |\n 12+ |\n A protected broadcast intent that can only be sent by the system\
    \ and is sent to the\ninstaller of an application (e.g., the Google Play Store)\
    \ when an\napplication is first launched. No extras are included; however, the\
    \ data\nincludes the name of the launched package. |\n\n ACTION_PACKAGE_RESTARTED\
    \ |\n 1+ |\n A protected broadcast intent that can only be sent by the system\
    \ and is triggered\nwhen the user kills an application and all of its processes.\
    \ The data\nwill contain the name of the package, and it will also include the\
    \ extra\n`EXTRA_UID`. |\n\n ACTION_PACKAGE_REMOVED  |\n 1+ |\n A protected broadcast\
    \ intent that can only be sent by the system and is triggered\nwhen an application\
    \ has been removed from the device. As the application\nhas been removed, it will\
    \ not receive the intent. In addition to the\ndata attribute containing the name\
    \ of the application, the following\nextras will also be included: `EXTRA_UID`,\
    \ `EXTRA_DATA_REMOVED`,\nand `EXTRA_REPLACING`. |\n\n ACTION_POWER_CONNECTED |\n\
    \ 4+ |\n A protected broadcast intent that can only be sent by the system and\
    \ indicates that\nthe device has been connected to a power source. |\n\n ACTION_POWER_DISCONNECTED\
    \ |\n 4+ |\n A protected broadcast intent that can only be sent by the system\
    \ and indicates that\nthe device has been disconnected from a power source. |\n\
    \n ACTION_REBOOT |\n 1+ |\n A protected broadcast intent that can only be sent\
    \ by the system and instructs the\ndevice to reboot. |\n\n ACTION_RUN |\n 1+ |\n\
    \ A high-level action to run the defined data. |\n\n ACTION_SCREEN_OFF |\n 1+\
    \ |\n A protected broadcast intent that can only be sent by the system and is\
    \ sent when\nthe device screen goes to sleep or becomes inactive. |\n\n ACTION_SHUTDOWN\
    \ |\n 4+ |\n A protected broadcast intent that can only be sent by the system\
    \ and is triggered\nduring the device shutdown process. |\n\n ACTION_SEND |\n\
    \ 1+ |\n A high-level action to send data to a recipient. It is common for this\n\
    action to be paired a chooser. |\n\n ACTION_SET_WALLPAPER |\n 1+ |\n Used for\
    \ displaying the settings for choosing a wallpaper. |\n\n ACTION_TIMEZONE_CHANGED\
    \  |\n 1+ |\n A protected broadcast intent that can only be sent by the system\
    \ and indicates that\nthe system time zone has changed. The extra `EXTRA_TIMEZONE`\
    \ is\nincluded. |\n\n ACTION_VOICE_COMMAND |\n 1+ |\n An intent action used to\
    \ initiate a voice command. |\n\n ACTION_WEB_SEARCH |\n 1+ |\n An intent action\
    \ used to initiate a web search. |\n\nCategories\nSettable using an initialized\
    \ `Intent` object’s `addCategory` method.\nThe `getCategories`\nmethod  can also\n\
    be used for retrieving a received intent’s categories. Categories\nprovide additional\
    \ context about the action to be performed by the\nintent. Only activities that\
    \ can facilitate all specified categories can\nbe chosen to receive the intent.\n\
    \n*An example of this can be seen here:*\n\n```\nIntent intent = new Intent();\n\
    intent.addCategory(Intent.APP_CALCULATOR);\n```\n\nAt the time of writing, the\
    \ Android documentation^([^(12)](#fn12)) lists upward of 39 standard\nintent category\
    \ attributes. Table [4-2](#509502_1_En_4_Chapter.xhtml#Tab2) lists a subset\n\
    of the most common of these intent categories.\n\nTable 4-2\nIntent Categories\n\
    \n Name |\n API Level |\n Description |\n\n| --- | --- | --- | --- | --- | ---\
    \ | --- |\n\n CATEGORY_ALTERNATIVE |\n 1+ |\n Used to identify an alternate action\
    \ to the standard activity or the data the\nuser is currently viewing. |\n\n CATEGORY_APP_BROWSER\
    \ |\n 15+ |\n Used to open an activity that should be able to browse the Internet.\
    \ It can be\nused alongside `ACTION_MAIN` to open\nthe preferred browser application.\
    \ |\n\n CATEGORY_APP_CALCULATOR |\n 15+ |\n Used to open an activity that should\
    \ be able to perform standard arithmetic\noperations. It can be used alongside\
    \ `ACTION_MAIN` to open\nthe calculator application. |\n\n CATEGORY_APP_CALENDAR\
    \ |\n 15+ |\n Used to open an activity that should be able to perform standard\
    \ calendar\noperations. It can be used alongside `ACTION_MAIN` to open\nthe calendar\
    \ application. |\n\n CATEGORY_APP_CONTACTS |\n 15+ |\n Used to open an activity\
    \ that should be able to view and manipulate address book\nentries. It can be\
    \ used alongside `ACTION_MAIN` to open\nthe contacts application. |\n\n CATEGORY_APP_EMAIL\
    \ |\n 15+ |\n Used to open an activity that should be able to send and receive\
    \ email. It can\nbe used alongside `ACTION_MAIN` to open\nthe email application.\
    \ |\n\n CATEGORY_APP_FILES |\n 15+ |\n Used to open an activity that should be\
    \ able to manage files stored on the\ndevice. It can be used alongside `ACTION_MAIN`\
    \ to open\nthe files application. |\n\n CATEGORY_APP_GALLERY |\n 15+ |\n Used\
    \ to open an activity that should be able to view and manipulate image and\nvideo\
    \ files stored on the device. It can be used alongside `ACTION_MAIN` to open\n\
    the gallery application. |\n\n CATEGORY_APP_MAPS |\n 15+ |\n Used to open an activity\
    \ that should be able to show the user’s current\nlocation. It can be used alongside\
    \ `ACTION_MAIN` to open\nthe maps application. |\n\n CATEGORY_APP_MARKET |\n 11+\
    \ |\n Used to open an activity that should allow the user to browse and install\
    \ new\napplications. |\n\n CATEGORY_APP_MESSAGING  |\n 15+ |\n Used to open an\
    \ activity that should be able to send and receive text messages.\nIt can be used\
    \ alongside `ACTION_MAIN` to open\nthe messaging application. |\n\n CATEGORY_APP_MUSIC\
    \ |\n 15+ |\n Used to open an activity that should be able to play music on the\
    \ device. It can\nbe used alongside `ACTION_MAIN` to open\nthe music application.\
    \ |\n\n CATEGORY_BROWSABLE |\n 1+ |\n Indicates activities that can be called\
    \ and started directly from a browser (e.g.,\nby a user selecting a link to the\
    \ Google Play Store website and being\ntaken to the Google Play Store application\
    \ instead). |\n\n CATEGORY_CAR_MODE |\n 8+ |\n Indicates that the activity has\
    \ been optimized to work in car\nenvironments. |\n\n CATEGORY_DEFAULT |\n 1+ |\n\
    \ Used to identify activities that could be used as the default action. |\n\n\
    \ CATEGORY_HOME |\n 1+ |\n The activity that launches when the device is started\
    \ and whenever the user\nreturns to the starting activity. |\n\n CATEGORY_LAUNCHER\
    \ |\n 1+ |\n Used to identify an activity that can be used as the initial activity\
    \ on a\ndevice (i.e., the home screen). |\n\n CATEGORY_MONKEY  |\n 1+ |\n Indicates\
    \ an activity that can be tested by monkey (an Android UI fuzzer) or other automated\n\
    tools. |\n\nExtras\nSettable using an initialized `Intent` object’s `putExtra`\
    \ method . The `getExtras` method  can also be used for\nretrieving a received\
    \ intent’s extras. An extra is a bundle (a set of\nkey-value pairs with varying\
    \ types) which the receiver can use (e.g.,\nwhen sharing a note with your social\
    \ media app, the note text will be\nsent across as a field in a bundle). This\
    \ bundle can include proprietary\nkeys or ones set in the Android system such\
    \ as `EXTRA_ALARM_COUNT`.\n\n*An example of this can be seen here:*\n\n```\nIntent\
    \ intent = new Intent();\nintent.putExtra(Intent.EXTRA_TEXT, \"This is an example\
    \ text extra\");\n```\n\nAt the time of writing, the Android documentation^([^(13)](#fn13))\
    \ lists upward of 80 standard\nintent extra attributes. Table [4-3](#509502_1_En_4_Chapter.xhtml#Tab3)\
    \ lists a subset\nof the most common of these intent extras.\n\nTable 4-3\nIntent\
    \ Extras\n\n Name |\n API Level |\n Description |\n\n| --- | --- | --- | --- |\
    \ --- | --- | --- |\n\n EXTRA_CHANGED_COMPONENT_NAME_LIST |\n 7+ |\n Part of the\
    \ intent action `ACTION_PACKAGE_CHANGED`\nand contains a string array of all of\
    \ the components that have\nchanged. |\n\n EXTRA_DONT_KILL_APP |\n 1+ |\n Part\
    \ of the `ACTION_PACKAGE_REMOVED`\nand `ACTION_PACKAGE_CHANGED`\nactions and overrides\
    \ the default behavior of restarting the targeted\napplication. |\n\n EXTRA_DATA_REMOVED\
    \ |\n 3+ |\n Part of the `ACTION_PACKAGE_REMOVED`\naction and is used to indicate\
    \ that the remove should be a full\nuninstall, removing both data and code instead\
    \ of a partial uninstall\nwhich leaves the data (the latter is performed as part\
    \ of an\nupdate). |\n\n EXTRA_HTML_TEXT |\n 16+ |\n Can be used as part of the\
    \ `ACTION_SEND` action\nalongside the `EXTRA_TEXT` extra and\nindicates that the\
    \ extra text is HTML-formatted text. |\n\n EXTRA_MIME_TYPES |\n 19+ |\n Used to\
    \ set acceptable MIME types (e.g., audio/mpeg or audio/*). |\n\n EXTRA_NOT_UNKNOWN_SOURCE\
    \ |\n 14+ |\n Part of the `ACTION_INSTALL_PACKAGE`\naction and indicates that\
    \ the application to be installed is being\ninstalled from the application sending\
    \ the intent and not an unknown\nsource. |\n\n EXTRA_PACKAGE_NAME |\n 24+ |\n\
    \ Contains an application name. |\n\n EXTRA_PHONE_NUMBER  |\n 1+ |\n Part of the\
    \ `ACTION_NEW_OUTGOING_CALL`\nand `ACTION_CALL`\nactions and contains the phone\
    \ number for the call. |\n\n EXTRA_QUIET_MODE |\n 24+ |\n Indicates whether quiet\
    \ mode (where all applications in the profile are killed)\nhas been switched on\
    \ or off. |\n\n EXTRA_REFERRER |\n 17+ |\n Used when an intent is launching an\
    \ activity to identify who initiated the launch.\nValue is provided as a URI.\
    \ |\n\n EXTRA_REPLACING |\n 3+ |\n Used as part of the `ACTION_PACKAGE_REMOVED`\n\
    action to indicate that the package has been replaced. |\n\n EXTRA_REFERRER_NAME\
    \ |\n 22+ |\n Alternative to the `EXTRA_REFERRER e`xtra; however, the value is\
    \ provided as a string instead of a\nURI. |\n\n EXTRA_SHUTDOWN_USERSPACE_ONLY\
    \ |\n 19+ |\n Used as part of the `ACTION_SHUTDOWN`\naction to identify that a\
    \ partial shutdown should be performed. This\npartial shutdown solely restarts\
    \ user space instead of performing a full\nOS restart. |\n\n EXTRA_SUBJECT |\n\
    \ 1+ |\n A high level extra containing a subject for the data being sent. |\n\n\
    \ EXTRA_TEXT |\n 1+ |\n Part of the `ACTION_SEND`\naction. A high level extra\
    \ containing data to be received in the form of\na `CharSequence`\n(or `String`\
    \ as\nString implements the `CharSequence`\ninterface). |\n\n EXTRA_TIME |\n 30+\
    \ |\n A high-level extra where its value contains a time in milliseconds since\n\
    the Epoch (e.g., 1608553466). |\n\n EXTRA_TIMEZONE |\n 30+ |\n Part of the `ACTION_TIMEZONE_CHANGED`\n\
    action indicating the device’s time zone. |\n\n EXTRA_TITLE |\n 1+ |\n Part of\
    \ the `ACTION_CHOOSER`\nto provide a title to the user (`CharSequence`, `String`,\n\
    etc.). |\n\n EXTRA_UID  |\n 1+ |\n Part of the `ACTION_UID_REMOVED`, `ACTION_PACKAGE_REMOVED`,\n\
    and `ACTION_PACKAGE_CHANGED`\nuse to identify the application being operated on.\
    \ |\n\nFlags\nSettable using an initialized Intent object’s `setFlag` method.\
    \ Flags\nrepresent the behavior of the component being launched (e.g., not\nincluding\
    \ the launched activity in the task stack). The `getFlags` method can\nalso be\
    \ used for retrieving a received intent’s flags.\n\n*An example of this can be\
    \ seen here:*\n\n```\nIntent intent = new Intent();\nintent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);\n\
    ```\n\nAt the time of writing, the Android documentation^([^(14)](#fn14)) lists\
    \ upward of 35 intent\nflags. Table [4-4](#509502_1_En_4_Chapter.xhtml#Tab4) shows\
    \ a subset\nof the most common of these intent flags.\n\nTable 4-4\nIntent Flags\n\
    \n Name |\n API Level |\n Description |\n\n| --- | --- | --- | --- | --- | ---\
    \ | --- |\n\n EXCLUDE_STOPPED_PACKAGES |\n 12+ |\n The default behavior of the\
    \ Android system is to consider all applications on a\ndevice when choosing an\
    \ applicable component to launch. If this flag is\nset stopped, packages will\
    \ not be included. |\n\n FLAG_ACTIVITY_NO_HISTORY |\n 1+ |\n If set, the new activity\
    \ does not remain in the history stack after the activity is\nleft by the user\
    \ (e.g., the user traversing to another\napplication). |\n\n FLAG_ACTIVITY_PREVIOUS_IS_TOP\
    \ |\n 1+ |\n When using this flag, the previous activity remains at the top of\
    \ the task stack\nfor deciding where new intents are sent to. |\n\n FLAG_ACTIVITY_SINGLE_TOP\
    \ |\n 1+ |\n When set, if the activity receiving the intent is already at the\
    \ top of the task\nstack, then no action occurs. |\n\n FLAG_ACTIVITY_NEW_TASK\
    \ |\n 11+ |\n Using this flag creates a new group of activities that a user can\
    \ traverse to with\na separate task stack. |\n\n FLAG_ACTIVITY_NO_ANIMATION |\n\
    \ 5+ |\n When set no transition animation will be applied to the starting of the\
    \ specific\nactivity. |\n\n FLAG_ACTIVITY_CLEAR_TOP  |\n 1+ |\n If set and the\
    \ activity being started is already in the current task stack, then\nall other\
    \ activities in the stack are removed and replaced by the new\nactivity. |\n\n\
    \ FLAG_ACTIVITY_EXCLUDE_FROM_RECENTS |\n 1+ |\n If set the started activity is\
    \ not included in the system list of recently started applications. |\n\nTask\n\
    Stack\n\nAlso known as the back stack, this is a last-in-first-out stack that\n\
    stores a logical list of activities for user traversal. When an\napplication is\
    \ launched and no tasks for it currently exist, the\nactivity with the `MAIN action`\
    \ in the application’s manifest is launched. When this\nactivity comes to the\
    \ foreground, it creates a new root on the task\nstack (as seen in Figures [4-1](#509502_1_En_4_Chapter.xhtml#Fig1)\
    \ and [4-2](#509502_1_En_4_Chapter.xhtml#Fig2)). Each\nsubsequent activity that\
    \ is started is placed onto the task stack, and\nwhen the user selects the back\
    \ button, these activities are popped off\nthe stack. Each application can have\
    \ one or multiple task stacks\ndepending on the specific flags that were set when\
    \ starting the\nactivity.\n\n![../images/509502_1_En_4_Chapter/509502_1_En_4_Fig1_HTML.png](images/509502_1_En_4_Chapter/509502_1_En_4_Fig1_HTML.png)\n\
    \nFigure 4-1\nExample of Android task stack\n\nWhen a task is not in the foreground\
    \ (e.g., the home screen button\nhas been pressed or the user traverses to another\
    \ application/task\nstack), the activity at the top of the stack enters the `onPause()`\
    \ \nstate and moves to the background. Multiple tasks can exist\nsimultaneously\
    \ in the background; however, the system may destroy these\ntasks if it needs\
    \ to preserve memory.\n\nIt is also important to note that applications can run\
    \ in the background\nwithout being present in the task stack, via the use of services\
    \ and\nother long-running utilities; this is described further in Chapter [9](#509502_1_En_9_Chapter.xhtml).\n\
    \n![../images/509502_1_En_4_Chapter/509502_1_En_4_Fig2_HTML.jpg](images/509502_1_En_4_Chapter/509502_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\nMultiple task stacks viewed in the UI\n\nIntent Filters\nAll components\n\
    should have an `android:exported tag`.\nThis is false by default, and if it is\
    \ false, then the component can\nonly receive messages from inside of its application.\
    \ By adding any\nintent filters, this is automatically true and means that external\n\
    applications can interact with the component. These intent filters are\nalso used\
    \ to advertise the component when the system receives an\nimplicit intent, and\
    \ it decides which applications can receive the\nintent. There are three main\
    \ types of intent filters, these being `Action`, `Data`, and `Category` (as\n\
    described previously).\nThe following is an example of a typical entry point to\
    \ an\napplication with the `MAIN` action and `LAUNCHER` category\nset. The main\
    \ action defines that this component should be started as\nthe entry point to\
    \ the application and that it does not receive any\ndata. The launcher category\
    \ defines that the activity should be\ndisplayed in the top-level launcher.\n\n\
    *An example intent filter for an entry point activity to an\napplication:*\n\n\
    *Starting an internal activity with data:*\n\n```\npublic void sendIntentToActivityInApp(){\n\
    Intent intent= new Intent(this, IntentReceiver.class);\n// Update class to be\
    \ internal class (to the application) to receive the intent\nBundle bundle= new\
    \ Bundle();\nbundle.putString(\"key\", \"value\");\nintent.putExtras(bundle);\n\
    startActivity(intent);\n}\n```\n\n*Receiving an intent bundle in an activity:*\n\
    \n```\nprotected void onCreate(@Nullable Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    if (getIntent().hasExtra(\"key\")) {\nString value = getIntent().getExtras().getString(\"\
    key\");\nLog.v(this.getClass().getSimpleName(), value);\n}\n}\n```\n\n*Starting\
    \ an external application:*\n\n```\npublic void startActivityViaIntent(){\nIntent\
    \ launchIntent = getPackageManager().getLaunchIntentForPackage(\"com.android.chrome\"\
    );\nstartActivity(launchIntent);\n}\n```\n\n*Starting a specific activity of an\
    \ external application:*\n\n```\npublic void sendIntentToAnotherActivity(){\n\
    Intent intent = new Intent();\nintent.setClassName(\"com.android.chrome\", \"\
    com.google.android.apps.chrome.Main\");\nintent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK)\
    \ ;\nstartActivity(intent);\n}\n```\n\n*Sending a file to another activity. As\
    \ of API level 24, sending\nfiles to other applications requires a file provider\
    \ so that a custom\nURI can be shared:*\n\n```\npublic void sendFileToAnoutherApplication(){\n\
    File file =new File(getApplicationContext().getFilesDir(),\"/text/test.txt\");\n\
    writeFileInInternalStorage(file, \"Hello World\");\nIntent intent = new Intent(Intent.ACTION_SEND);\n\
    Uri contentUri = getUriForFile(getApplicationContext(), \"com.example.intents.fileprovider\"\
    , file);\nintent.setType(\"text/plain\");\nintent.putExtra(Intent.EXTRA_STREAM,contentUri);\n\
    startActivity(Intent.createChooser(intent , \"File path\"));\n}\n```\n\n*Implicit\
    \ phone number intent:*\n\n```\npublic void phoneNumberIntent(){\nUri number =\
    \ Uri.parse(\"tel:5551234\");\nIntent callIntent = new Intent(Intent.ACTION_DIAL,\
    \ number);\nstartActivity(callIntent);\n}\n```\n\n*Implicit URL intent:*\n\n```\n\
    public void webIntent(){\nUri webpage = Uri.parse(\"https://www.android.com\"\
    );\nIntent webIntent = new Intent(Intent.ACTION_VIEW, webpage);\nstartActivity(webIntent);\n\
    }\n```\n\nFootnotes\n\n5. Application Names, Android Package\nName, and ID\n\n\
    Android uses multiple naming conventions to uniquely identify an Android\napplication;\
    \ these have been summarized in the following and broken down\ninto more detail\
    \ in this chapter:\n\n*   **Java\n    Package Name**  - Set in the code base and\
    \ depicts the\n    folder structure of the project and structure of an application\
    \ and\n    helps to modularize application components. This is used for\n    differentiating\
    \ classes in multiple packages with the same name as well\n    as being used by\
    \ techniques such as reflection. It uses reverse Internet\n    domain convention,\
    \ such as `com.mywebsite.blog`.\n\n*   **Package\n    ID**  - Set in the manifest\
    \ file via the package\n    attribute. This is used by the Google Play Store and\
    \ Android system.\n    This has to match the Java Package Name. It uses reverse\
    \ Internet domain\n    convention, such as `com.mywebsite.blog`.\n\n*   **Application\n\
    \    ID**  - Set in the Gradle build file and replaces Package\n    ID in the\
    \ manifest file post-build. It doesn’t have to match Package ID\n    or Java Package\
    \ Name. It uses reverse Internet domain convention, such\n    as `com.mywebsite.blog`.\n\
    \n*   **Application\n    Name**  - A name not following the reverse Internet domain\n\
    \    convention (and so can be a string such as *myappname*) and is\n    shown\
    \ to the end user.\n\nNone of these values can be changed programmatically. This\
    \ is because\nthey are either already compiled (in the case of the Java Package\
    \ Name)\nor located in the manifest or res folder (which are read-only) in the\n\
    case of Package ID, Application ID, and Application Name.\n\nJava Package Name\n\
    The Java Package\nName^([^(15)](#fn15)) is a unique series of\nlowercase (to avoid\
    \ clashes with interface or class names) strings\nwritten in reverse Internet\
    \ domain convention. It is set in each class\nfile (as seen in the following)\
    \ and depicts the folder structure of the\nproject and structure of an application\
    \ and helps to modularize\napplication components. In turn the Java Package Name\
    \ is also used for\nhow Java techniques such as reflection interact with the application.\
    \ An\nexample of a Java Package Name for a banking application belonging to\n\
    the website `jamesstevenson.me`\ncould be `me.jamesstevenson.banking`.\n\n*An\
    \ example activity:*\n\n```\npackage me.jamesstevenson.banking;\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.os.Bundle;\npublic class MainActivity extends AppCompatActivity\
    \ {\n@Override\nprotected void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\n}\n}\n```\n\nBecause of the following\
    \ identifiers, in Android there are very few\nreasons (outside of reflection)\
    \ to share an application’s package name\nexternally to the code base.\n\nPackage\
    \ ID\nAn application’s Package ID is set in the\n`AndroidManifest.xml package`\
    \ attribute\n and has to match the Java Package Name. If using Gradle build\n\
    tools, the Package ID is replaced by the Application ID after the build\nhas occurred.\
    \ This is used as part of the build process in generating\nthe namespace for the\
    \ `R.java` class (used\nfor resource handling) as well as in resolving relative\
    \ class names\n(such as `.MainActivity` to\n`com.example.example_app.MainActivity`).\n\
    After the build this is used by the Google Play Store and the Android\nsystem\
    \ as described in the Android ID section.\n\n*Example of Package ID in Android\
    \ manifest:*\n\n```\nAs stated the Package ID can be edited directly in the\n\
    *AndroidManifest.xml* file by changing the package element;\nhowever, if using\
    \ Gradle to build and you want your package ID to be\nmaintained post-build, make\
    \ sure to remove the Application ID element in\nyour `build.gradle` file, as\n\
    mentioned in the following, as otherwise it will be replaced.\n\nRetrieving Package\
    \ ID\nWhile none of these identifiers can be changed programmatically, they\n\
    can be accessed. This retrieves the value of the Package ID as it was\nduring\
    \ build.\n\n*Example of retrieving the Package ID:*\n\n```\nLog.v(\"PackageID\
    \ BuildConfig\", BuildConfig.APPLICATION_ID);\nLog.v(\"PackageID context\", getApplicationContext().getPackageName());\n\
    ```\n\nApplication ID\nIn addition to the Package ID, when using Gradle and the\
    \ Android\nBuild Tools, you can also set an Application ID.\n\nThere are three\
    \ rules that cover the\ncreation of an Application ID name:\n\n*   It must have\
    \ at least two segments (one or more dots).\n\n*   Each segment must start with\
    \ a letter.\n\n*   All characters must be alphanumeric or an underscore\n    [a-zA-Z0-9_].\n\
    \nThe Application ID is set in the Gradle `build.gradle`\nfile  via the\n`applicationId`\n\
    attribute. The Application ID can differ to your Package ID, and in turn\nto your\
    \ Java Package Name.\n\n![../images/509502_1_En_5_Chapter/509502_1_En_5_Fig2_HTML.jpg](images/509502_1_En_5_Chapter/509502_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\nApplication’s internal\nstorage file path\n\n![../images/509502_1_En_5_Chapter/509502_1_En_5_Fig1_HTML.jpg](images/509502_1_En_5_Chapter/509502_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\nGoogle Play Store\nlisting\n\nThis Application ID replaces an application’s\
    \ Package ID post build,\nin turn allowing the Package ID to be used in the build\
    \ process and then\nreplacing it so that the Application ID is used by the Google\
    \ Play Store\n(as seen in Figure [5-1](#509502_1_En_5_Chapter.xhtml#Fig1)) and\
    \ Android\nsystem (as seen in Figure [5-2](#509502_1_En_5_Chapter.xhtml#Fig2)).\
    \ As stated\npreviously this is so that the internal Java Package Name is not\
    \ shared\noutside of the program’s code base. With this in mind in the example\n\
    where the Java Package Name is `com.example.internalname`,\nhowever, the Application\
    \ Name needs to be visible as `com.example.appname`\nin the Google Play Store;\
    \ the Package ID in the `AndroidManifest.xml`\nfile would need to be set to `com.example.internalname`\n\
    and the `applicationId`\nattribute in the `build.gradle` file set\nto `com.example.appname`.\n\
    In the circumstance where Gradle isn’t being used, the Java Package\nName would\
    \ need to be refactored to match `com.example.appname,`\nand the Package ID attribute\
    \ in `AndroidManifest.xml`\nwould need to be set to `com.example.appname`\nalso.\n\
    \n*Setting Application ID in* *Gradle build file*\n*:*\n\n```\ndefaultConfig {\n\
    applicationId \"com.example.appname\"\nminSdkVersion 16\ntargetSdkVersion 29\n\
    versionCode 1\nversionName \"1.0\"\ntestInstrumentationRunner \"androidx.test.runner.AndroidJUnitRunner\"\
    \n}\n```\n\nSuffix and Flavor\nIn addition to the fact that the Application ID\
    \ and Package ID can be\ndifferent, you can also create different suffixes for\
    \ your Android\nprojects - named product flavors. The common use for this is in\
    \ having a\ndifferent Application ID for different versions (such as paid and\
    \ trial)\nof an application. The suffix can be modified in the applications `build.gradle`\n\
    file.\n\n*Modifying the* *suffix and flavor*\n *in the Gradle build file:*\n\n\
    ```\nandroid {\ndefaultConfig {\napplicationId \"com.example.appname\"\n}\nproductFlavors\
    \ {\nfree {\napplicationIdSuffix \".trial\"\n}\npro {\napplicationIdSuffix \"\
    .paid\"\n}\n}\n}\n```\n\nApplication Name\n\nThe Application\nName in Android\
    \ is what is visible to the end user (as can be\nseen in Figures [5-3](#509502_1_En_5_Chapter.xhtml#Fig3)\
    \ Figure [5-4](#509502_1_En_5_Chapter.xhtml#Fig4)); this is what\nis shown on\
    \ the application’s setting’s page and what is shown by\ndefault underneath the\
    \ application icon (however, the application icon\nand text can be switched out\
    \ programmatically in some cases^([^(16)](#fn16))).\n\n![../images/509502_1_En_5_Chapter/509502_1_En_5_Fig4_HTML.jpg](images/509502_1_En_5_Chapter/509502_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\nApplication icon and title\n\n![../images/509502_1_En_5_Chapter/509502_1_En_5_Fig3_HTML.jpg](images/509502_1_En_5_Chapter/509502_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\nApplication setting’s page\n\nSetting the Application Name can be\
    \ done by editing the `label` attribute in\nthe `AndroidManifest.xml`\nfile, as\
    \ seen in the following. The best practice is for this to link to\na `String`\
    \ in the\nstring resource; however, this does not have to be the case.\n\n*Setting\
    \ the Application Name in the Android manifest file:*\n\n```\nandroid:label=\"\
    My Application Name\"\n```\n\nRetrieving Application Name\n\n*The Application\
    \ Name can be retrieved programmatically:*\n\n```\npublic static String getApplicationName(Context\
    \ context) {\nApplicationInfo applicationInfo = context.getApplicationInfo();\n\
    int stringId = applicationInfo.labelRes;\nreturn stringId == 0 ? applicationInfo.nonLocalizedLabel.toString()\
    \ : context.getString(stringId);\n}\n```\n\nFootnotes\n\n6. Storage\n\nPartitions\n\
    Android  (as of\nAndroid 2.2) uses the ext4 file system, which at its core follows\
    \ the\nLinux file system structure - using a single root denoted by `/`.\n\n*In\
    \ the Android root, there are several key partitions;*^([^(17)](#fn17)*,*) ^([^(18)](#fn18))\
    \ *these partitions can be\nlisted by using the following command in the Android\
    \ shell:*\n\n```\ncat /proc/mounts\n```\n\nDepending on the device version, original\
    \ design manufacturer,^([^(19)](#fn19)) and original equipment\nmanufacturer,\
    \ the specific folders both mounted and present at the root\nof the filesystem\n\
    may vary. That being the case, some of the most common folders that may be\npresent\
    \ are listed here:\n\n*   **/boot** - The\n    boot partition\n    includes both\
    \ the RAM disk and a kernel image. Both of these are bundled\n    via `mkbootimg`^([^(20)](#fn20))\
    \ which is a utility used for\n    packing boot images. The device will not boot\
    \ without this\n    partition.\n\n*   **/system** - This\n    partition covers\
    \ the Android framework. This includes the Android GUI\n    and system applications\
    \ - available at `/system/app and /system/priv-app`. Wiping this partition removes\
    \ Android from the\n    device while remaining bootable.\n\n*   **/vendor** -\
    \ This\n    partition includes binaries and resources that aren’t included in\
    \ the\n    stock AOSP^([^(21)](#fn21)) (primarily focusing on kernel\n    modules\
    \ for board-specific components, board-specific daemons, or\n    additional features\
    \ for the hardware abstraction layers (HALs)). This\n    partition is primarily\
    \ for the original design manufacturer (such as\n    Qualcomm, Exynos, and Huawei)\
    \ to add custom binaries and GUIs. As of\n    Android 8, it was enforced^([^(22)](#fn22))\
    \ that when these\n    components are added to a device by an ODM (original design\n\
    \    manufacturers) or OEM (original equipment manufacturer), they should be\n\
    \    added to the `/vendor` partition\n    over the `/system` partition,\n   \
    \ which was the location commonly used before this was enforced.\n\n*   **/odm**\
    \ - An\n    extension of the `/vendor` partition,\n    designed for the original\
    \ design manufacturer.^([^(23)](#fn23)) This partition allows for\n    multiple\
    \ devices to be made with the same `/vendor partition` and\n    for the `/odm`\n\
    \    partition to provide minor changes between them. Similar to the `/system`\
    \ partition in\n    this partition, there are also locations for applications\
    \ (`/odm/app/`), native\n    libraries (`/odm/lib[64]`), and\n    more. Full support\
    \ for this partition was added in Android 10.\n\n*   **/oem** - Original\n   \
    \ equipment manufacturers^([^(24)](#fn24)) (such as\n    Samsung, OnePlus, and\
    \ Huawei) may decide to make changes to the AOSP\n    image - for example, adding\
    \ their own applications, UIs, or features. An\n    extension to this is the `/product`\
    \ partition\n    which was added in Android 9, which unlike the OEM partition\
    \ is\n    updatable.\n\n*   **/recovery** -\n    This partition stores the recovery\
    \ image.\n\n*   **/data** - Called\n    the user-data partition, this partition\
    \ includes the internal storage\n    for applications (e.g., `/data/user/0/com.android.chrome`)\n\
    \    as well as containing the `/data/local/tmp`\n    directory and other types\
    \ of user data. As of Android 5, Android has\n    supported having multiple users\
    \ on the same device; this means that\n    different users’ internal storage will\
    \ be available at different\n    locations (e.g., `/data/user/0/com.android.chrome`\n\
    \    and `/data/user/1/com.android.chrome`).\n    As part of a factory reset,\
    \ this partition is wiped.\n\n*   **/cache** - This\n    partition is where Android\
    \ stores frequently used components as well as\n    where some data is stored\
    \ as part of over the air updates.\n\n*   **/misc** -\n    Miscellaneous system\
    \ settings, normally in the form of on/off\n    switches.\n\n*   **/metadata**\
    \ - The\n    metadata partition is used when the device is encrypted.\n\n*   **/radio**\
    \ - This\n    partition is only used when the device includes a radio\n    component.\n\
    \n*   **/tos** - This\n    partition contains the binary image of the Trusty OS.\n\
    \n*   **/sdcard** - Prior\n    to Android 4, this directory was the location where\
    \ the storage for a\n    connected SD card could be found. As of Android 4, this\
    \ changed to what\n    is referred to as the “internal SD card” (where the SD\
    \ card mount moved\n    to `/sdcard_ext or /sdcard/external_sd`). This is also\
    \ referred to as the device’s\n    external storage (irrespective of if it refers\
    \ to an actual SD card or\n    not) and is discussed more below.\n\n`External\
    \ and Internal Storage`\n\nInternal Storage \nEach application has its own internal\
    \ storage space for storing\narbitrary data. This space does not require any permissions\
    \ to write to\nand is sandboxed to each application - meaning that one application\n\
    cannot read the internal storage of another application.\n\n*An application’s\
    \ internal storage is located at the following path\n(replacing* *0* *with the\
    \ Android user ID):*\n\n```\n/data/user/0//\n```\n\nThe structure of an application’s\
    \ internal storage is by default broken\ndown into a handful of subdirectories;\
    \ however, arbitrary folders can be\nadded to this space. While this storage has\
    \ no restrictions on it, it is\nrecommended to store specific file types in specific\
    \ directories;\nhowever, it is not enforced.\n\n*   **/files** - The\n    files\
    \ directory is used for arbitrary files. These can be text files,\n    images,\
    \ serialized files like JSON, or any other file type. To retrieve\n    a file\
    \ path to this directory, use `getApplicationContext().getFilesDir()`.\n\n*  \
    \ **/databases** -\n    The database directory is used for storing databases.\
    \ Android has a lot\n    of inbuilt support for creating and managing SQLite databases;\
    \ however,\n    other database types such as Realm databases^([^(25)](#fn25))\
    \ can be stored here. When\n    creating these types of databases, by default\
    \ this is the directory\n    they’re saved to\n    .\n\n*   **/shared_prefs**\
    \ -\n    Shared preferences are Android’s take on easily accessible key-value\n\
    \    pairs. These are saved in an XML format. When creating shared\n    preferences,\
    \ this is the directory that they’re saved to.\n\n*   **/cache** - The\n    cache\
    \ directory^([^(26)](#fn26)) is designed for saving\n    temporary files, as the\
    \ Android system will delete files in this folder\n    when space is needed elsewhere\
    \ on the device. The cache directory can be\n    accessed using the application\
    \ context: `getApplicationContext().getCacheDir()`.\n\n*   **/lib** - Used for\n\
    \    storing shared library files.\n\n*   **/code_cache** -\n    Similar to the\
    \ cache directory, and added in API level 21, this\n    directory is designed\
    \ for storing cached code. Like the cache directory,\n    it is also cleared by\
    \ the Android system  if space is required.\n    The path to this directory can\
    \ be retrieved with the application\n    context: `getApplicationContext().getCodeCacheDir()`.\n\
    \n*   **/no_backup** -\n    Similar to the /files directory, however, files stored\
    \ in this directory\n    will be excluded from automatic backup facilities.^([^(27)](#fn27))\n\
    \nThe path to an application’s internal storage can be retrieved by\nusing the\
    \ application context. It’s important to bear in mind that these\nfile paths could\
    \ change over time and from OS version to OS version, and\nso storing a hardcoded\
    \ path is not recommended .\n\n*From API level 24 and later, the following can\
    \ be used to retrieve\nthe file path to the root of an application’s internal\
    \ storage:*\n\n```\ngetApplicationContext().getDataDir();\n```\n\n*Before API\
    \ level 24, the following can be used:*\n\n```\ngetApplicationContext().getFilesDir().getParent();\n\
    ```\n\nExternal Storage \nAs noted earlier, prior to Android 4, the `/sdcard`\
    \ directory was\nthe location where the storage for a connected SD card could\
    \ be found.\nAs of Android 4, this changed to what is referred to as the “internal\
    \ SD\ncard” or more commonly “external storage,”^([^(28)](#fn28)) which is a shared\
    \ space\nacross applications. As of Android 10, this “shared space” has changed\n\
    to a term referred to as scoped storage;^([^(29)](#fn29)) this means that even\
    \ if an\napplication has access to external storage (requiring either the `READ_EXTERNAL_STORAGE\
    \ or WRITE_EXTERNAL_STORAGE` permission), it will now only have read\nonly access\
    \ as well as access to an application-specific directory as\nwell as specific\
    \ types of media that the app has created (unless it has\naccess to the `MANAGE_EXTERNAL_STORAGE\
    \ permission)`. In addition to this, on devices with multiple users,\nthey are\
    \ each provided with their own isolated scoped storage.\nWith this in mind if\
    \ targeting and compiling for API level 28 or\nbelow, then you can use the `Environment`\
    \ class to\nretrieve the path to the device’s external storage. However if running\n\
    on API level 29 and above, this is deprecated, and the file path\nreturned will\
    \ not be accessible, so the application *Context*\nshould be used instead (for\
    \ scoped storage).\n\n*Get global external storage (API levels 1–28):*\n\n```\n\
    Environment.getExternalStorageDirectory();\n```\n\n*Get application scoped (sandboxed)\
    \ external storage (API level\n29+):*\n\n```\ngetApplicationContext().getExternalFilesDir(null);\n\
    ```\n\nUnlike internal storage, if an application wants to write or read a\nfile\
    \ to the global external storage, it requires the `WRITE_EXTERNAL_STORAGE`\nor\
    \ `READ_EXTERNAL_STORAGE`\npermission .\nWriting to external storage is a runtime\
    \ (dangerous) permission, while\nreading  is only a\nnormal/manifest permission.\
    \ No permissions are required for scoped\nstorage.\n\n*The following is an example\
    \ of setting manifest permissions:*\n\nAs writing to the external storage is a\
    \ dangerous permission, it\nrequires the user to accept a runtime permission before\
    \ the application\nis giving access. This will display a notification to the user\
    \ as can be\nseen in Figure [6-1](#509502_1_En_6_Chapter.xhtml#Fig1).\n\n*An external\
    \ storage write runtime request can be run with the\nfollowing code.*\n\n```\n\
    if (Build.VERSION.SDK_INT >= 23) {\nif (!isStoragePermissionGranted()){\nActivityCompat.requestPermissions(this,\
    \ new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE}, 1234567);\n}\n}\n\
    ```\n\n*An example method that checks if the*\n*WRITE_EXTERNAL_STORAGE* *runtime\
    \ permission is already\nset:*\n\n```\npublic  boolean isStoragePermissionGranted()\
    \ {\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\nif (checkSelfPermission(android.Manifest.permission.WRITE_EXTERNAL_STORAGE)\n\
    == PackageManager.PERMISSION_GRANTED) {\nLog.v(TAG,\"Permission is granted\");\n\
    return true;\n} else {\nLog.v(TAG,\"Permission is revoked\");\nActivityCompat.requestPermissions(this,\
    \ new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE}, 1);\nreturn false;\n\
    }\n}\nelse { //permission is automatically granted on sdk<23 upon installation\n\
    Log.v(TAG,\"Permission is granted\");\nreturn true;\n}\n}\n```\n\n*The activity\
    \ callback that is executed when the permission\nchanges*  *:*\n\n![../images/509502_1_En_6_Chapter/509502_1_En_6_Fig1_HTML.jpg](images/509502_1_En_6_Chapter/509502_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\nRuntime permission\ndialogue box\n\n```\n@Override\npublic void\
    \ onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults)\
    \ {\nsuper.onRequestPermissionsResult(requestCode, permissions, grantResults);\n\
    if(grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED){\n\
    Log.v(TAG,\"Permission: \"+permissions[0]+ \" was \"+grantResults[0]);\n//write\
    \ file to external storage\n}\n}\n```\n\nText Files\nFiles can be written to anywhere\
    \  in an application’s\ninternal or external storage (bearing in mind scoped storage\
    \ as of\nAndroid 10). The location of these directories can be retrieved with\
    \ the\naforementioned method calls.\n\n*To make a File object that operates on\
    \ a specific file, use the\nfollowing code where filename is a String object representing\
    \ the path\nto the file:*\n\n```\nString filename = \"myFile.txt\";\nFile file\
    \ = new File(getApplicationContext().getFilesDir(), filename);\n```\n\n*Writing\
    \ a file:*\n\n```\npublic void writeFileInInternalStorage(File fileToWrite, String\
    \ fileBody){\n// If file doesn't exist attempt to make full directory path\nif(!fileToWrite.exists()){\n\
    fileToWrite.getParentFile().mkdir();\n}\n// Write to file\ntry{\nFileWriter writer\
    \ = new FileWriter(fileToWrite);\nwriter.append(fileBody);\nwriter.flush();\n\
    writer.close();\n}catch (Exception e){\ne.printStackTrace();\n}\n}\n```\n\n*Reading\
    \ a file:*\n\n```\nprivate String readFromFile(File file) {\nString ret = \"\"\
    ;\ntry {\nFileInputStream inputStream = new FileInputStream(file);\nif ( inputStream\
    \ != null ) {\nInputStreamReader inputStreamReader = new InputStreamReader(inputStream);\n\
    BufferedReader bufferedReader = new BufferedReader(inputStreamReader);\nString\
    \ receiveString = \"\";\nStringBuilder stringBuilder = new StringBuilder();\n\
    while ( (receiveString = bufferedReader.readLine()) != null ) {\nstringBuilder.append(\"\
    \\n\").append(receiveString);\n}\ninputStream.close();\nret = stringBuilder.toString();\n\
    }\n}\ncatch (FileNotFoundException e) {\nLog.e(\"TAG\", \"File not found: \" +\
    \ e.toString());\n} catch (IOException e) {\nLog.e(\"TAG\", \"Can not read file:\
    \ \" + e.toString());\n}\nreturn ret;\n}\n```\n\n*Deleting a file:*\n\n```\nprivate\
    \ void deleteStorageFile(File file){\nfile.delete();\n}\n```\n\nDatabases \nThe\
    \ following details how to create a simple SQLite database in\nAndroid. In Android,\
    \ databases are created, by default, in the `/databases` directory\nof internal\
    \ storage.\n\n*Define a schema and contract:*\n\n```\npublic final class databaseTemplate\
    \ {\n// Inner class that represents the table values\npublic static class databaseData\
    \ implements BaseColumns {\npublic static final String TABLE_NAME = \"TABLE_NAME\"\
    ;\npublic static final String COLUMN_ONE = \"FIRST_COLUMN_NAME\";\npublic static\
    \ final String COLUMN_TWO = \"SECOND_COLUMN_NAME\";\n}\n}\n```\n\n*Creating a\
    \ database helper:*\n\n```\npublic class databaseHelper extends SQLiteOpenHelper\
    \ {\npublic databaseHelper(Context context) {\nsuper(context, NAME, null, VERSION);\n\
    }\nprivate static final String SQL_CREATE_INSTRUCTION =\n\"CREATE TABLE \" + databaseTemplate.databaseData.TABLE_NAME\
    \ + \" (\" +\ndatabaseTemplate.databaseData._ID + \" INTEGER PRIMARY KEY,\" +\n\
    databaseTemplate.databaseData.COLUMN_ONE + \" TEXT,\" +\ndatabaseTemplate.databaseData.COLUMN_TWO\
    \ + \" TEXT)\";\nprivate static final String SQL_DELETE_INSTRUCTION =\n\"DROP\
    \ TABLE IF EXISTS \" + databaseTemplate.databaseData.TABLE_NAME;\npublic static\
    \ final int VERSION = 1; //increment if schema changed\npublic static final String\
    \ NAME = \"database.db\"; // database name\n// Standard Database functions\npublic\
    \ void onCreate(SQLiteDatabase database) {\ndatabase.execSQL(SQL_CREATE_INSTRUCTION);\n\
    }\npublic void onUpgrade(SQLiteDatabase database, int previousVersion, int currentVersion)\
    \ {\ndatabase.execSQL(SQL_DELETE_INSTRUCTION);\nonCreate(database);\n}\n}\n```\n\
    \n*Adding a row to a database:*\n\n```\nprivate void addDataToDatabase(Context\
    \ context, String columnOneData, String columnTwoData){\ndatabaseHelper databaseHelper\
    \ = new databaseHelper(context);\nSQLiteDatabase database = databaseHelper.getWritableDatabase();\n\
    ContentValues contentValues = new ContentValues();\ncontentValues.put(databaseTemplate.databaseData.COLUMN_ONE,\
    \ columnOneData);\ncontentValues.put(databaseTemplate.databaseData.COLUMN_TWO,\
    \ columnTwoData);\ndatabase.insert(databaseTemplate.databaseData.TABLE_NAME, null,\
    \ contentValues);\n}\n```\n\n*Reading a database:*\n\n```\nprivate List readFromDatabase(Context\
    \ context){\nfinal String TABLE_NAME = databaseTemplate.databaseData.TABLE_NAME;\n\
    String selectQuery = \"SELECT * FROM \" + TABLE_NAME;\ndatabaseHelper databaseHelper\
    \ = new databaseHelper(context);\nSQLiteDatabase database = databaseHelper.getWritableDatabase();\n\
    Cursor cursor = database.rawQuery(selectQuery, null);\nArrayList data = new ArrayList();\n\
    if (cursor.moveToFirst()) {\ndo {\nint idIndex = cursor.getColumnIndexOrThrow(databaseTemplate.databaseData._ID);\n\
    int columnOneIndex = cursor.getColumnIndexOrThrow(databaseTemplate.databaseData.COLUMN_ONE);\n\
    int columnTwoIndex = cursor.getColumnIndexOrThrow(databaseTemplate.databaseData.COLUMN_TWO);\n\
    String idValue = String.valueOf(cursor.getString(idIndex));\nString columnOneValue\
    \ = String.valueOf(cursor.getString(columnOneIndex));\nString columnTwoValue =\
    \ String.valueOf(cursor.getString(columnTwoIndex));\nArrayList rowData = new ArrayList();\n\
    rowData.add(idValue);\nrowData.add(columnOneValue);\nrowData.add(columnTwoValue);\n\
    data.add(rowData);\n} while (cursor.moveToNext());\n}\ncursor.close();\nreturn\
    \ data;\n}\n```\n\n*Deleting a row from a database:*\n\n```\nprivate void deleteRowFromDatabase(Context\
    \ context, int rowIdToRemove){\ndatabaseHelper databaseHelper = new databaseHelper(context);\n\
    SQLiteDatabase database = databaseHelper.getReadableDatabase();\nString selection\
    \ = databaseTemplate.databaseData._ID + \" LIKE ?\";\nString[] selectionValues\
    \ = {String.valueOf(rowIdToRemove)};\ndatabase.delete(databaseTemplate.databaseData.TABLE_NAME,\
    \ selection, selectionValues);\n}\n```\n\nShared Preferences\nShared\npreferences\n\
    ^([^(30)](#fn30)) are written to the `/shared_prefs`\ndirectory in an application’s\
    \ internal storage. These take the form of\nXML key-value pairs where the shared\
    \ preference name becomes the name of\nthe XML file (appended with .xml).\n\n\
    *As can be seen in the following, there are two entries in this\nshared preference,\
    \ one of type* *long* *called*\n*last_cleanup* *and the other of type* *string*\n\
    *called* *webapp_name:*\n\nShared preferences accept the primitive data types\
    \ of \n\n*   String\n\n*   Int\n\n*   Boolean\n\n*   Long\n\n*   Float\n\n*  \
    \ String set\n\nWhen creating a shared preference, you must provide the name of\
    \ the\nshared preference; this is the name of the XML file. In addition to\nthis,\
    \ you will need to provide the key-value pair to be saved to the\nshared preference,\
    \ and then either use `.apply()` (added in\nAPI level 8) for asynchronous or `.commit()`\
    \ for\nsynchronous (which returns a Boolean indicating success) saving. In\naddition\
    \ to this, you must also provide the mode. The mode is an integer\nand represents\
    \ one of the following:\n\n*   **MODE_PRIVATE** - The default mode where the file\n\
    \    can only be accessed by the application that created it.\n\n*   **MODE_WORLD_READABLE**\
    \ - Deprecated in API level 17\n    and throws a *SecurityException* starting\
    \ with API level 24\\. This\n    allowed all applications to have read access\
    \ to the created\n    file.\n\n*   **MODE_WORLD_WRITEABLE** - Deprecated in API\
    \ level\n    17 and throws a *SecurityException* starting with API level 24.\n\
    \    This allowed all other applications to have write access to the created\n\
    \    file.\n\n*   **MODE_MULTI_PROCESS** - Deprecated in API level 23.\n    Prior\
    \ to API level 10, this was the default behavior. After this point  the default\
    \ behavior\n    is for shared preferences to be loaded into memory and for reads\
    \ and\n    modifications to be performed on the in-memory shared preference. This\n\
    \    means that if the original file was edited while the application was\n  \
    \  running, it would be written over by any changes the application made to\n\
    \    the shared preference. When this mode is set, the shared preference will\n\
    \    be checked for modification even if it is already loaded in\n    memory.\n\
    \n*Adding a key-value pair:*\n\n```\nSharedPreferences sharedPref\n= getApplicationContext().getSharedPreferences(\"\
    MySharedPref\",\nMODE_PRIVATE);\nSharedPreferences.Editor editor = sharedPref.edit();\n\
    editor.putString(\"key\", \"value\");\neditor.apply();\n```\n\n*When reading from\
    \ a shared preference, you must provide a default\nvalue of the type being retrieved.\
    \ This is returned if the provided key\ndoes not exist:*\n\n```\nSharedPreferences\
    \ sharedPref\n= getApplicationContext().getSharedPreferences(\"MySharedPref\"\
    ,\nMODE_PRIVATE);\nString value = sharedPref.getString(\"key\", \"default value\"\
    );\n```\n\n*Deleting a shared preference is similar to editing one; however,\n\
    instead of using a .put method, the .remove() method is used\ninstead:*\n\n```\n\
    SharedPreferences sharedPref = getSharedPreferences(\"MySharedPref\", MODE_PRIVATE);\n\
    SharedPreferences.Editor editor = sharedPref.edit();\neditor.remove(\"key\");\n\
    editor.apply();\n```\n\nFile\nProviders\n\nAs of Android API level 24, you cannot\
    \ directly share file\nURIs^([^(31)](#fn31)) with other applications.\nAfter this\
    \ point you have to use a `FileProvider`^([^(32)](#fn32)) which are used to securely\n\
    offer a file from your application^([^(33)](#fn33)) to another application.\n\n\
    *In setting up a* *FileProvider*`,` *add a*\n*provider* *tag to the application’s\
    \ manifest file*\n*application* *tag that follows the format of the following\n\
    bearing in mind to change the package name:*\n\nAfter this make an XML resource\
    \ in your applications `res` directory, in a\nsubfolder called `xml`, called `filepaths.xml.`\
    \ Then\ndefine the path to share and the name that will be represented in the\n\
    URI. The following example shares the entire root of the application’s\n`myText`\n\
    folder   , where the URI would\nbe `content://com.example.storage.fileprovider/myText`.\n\
    \n*The filepaths xml file in res should include:*\n\n*After this a file (inside\
    \ of the specified directory) can be sent\nvia an intent as normal:*\n\n```\n\
    File file =new File(getApplicationContext().getFilesDir(),\"/myText/test.txt\"\
    );\nwriteFileInInternalStorage(file, \"Hello World\"); // This function is referenced\
    \ in the Text Files section.\nIntent intent = new Intent(Intent.ACTION_SEND);\n\
    Uri contentUri = getUriForFile(getApplicationContext(), \"com.example.storage.fileprovider\"\
    , file); //replace with package name\nintent.setType(\"text/plain\");\nintent.putExtra(Intent.EXTRA_STREAM,contentUri);\n\
    startActivity(Intent.createChooser(intent , \"Sharing Text File\"));\n```\n\n\
    Assets Folder\nThe assets\nfolder\n^([^(34)](#fn34)) can be used by application\n\
    developers for storing arbitrary read-only data prior to compile time,\nwhich\
    \ can be read during runtime. Unlike the res (Resources) folder, any\nfile type\
    \ can be stored in this directory; however, it must be added to\nthe application\
    \ precompilation. To do this, create a folder at the\nrelative file path `\\app\\\
    src\\main\\assets`\nor in Android Studio via `app` ➤ `New` ➤ `Folder` ➤ `Assets\
    \ Folder`. Post\ncompilation, the assets folder is located in the root of the\
    \ APK under\n`/assets`.\n\n*Accessing files in the assets folder:*\n\n```\nprivate\
    \ String readFileFromAssets(String filename, String type){\nBufferedReader reader\
    \ = null;\nStringBuilder stringBuilder = new StringBuilder();\ntry {\nreader =\
    \ new BufferedReader(\nnew InputStreamReader(getAssets().open(filename), type));\
    \ //e.g. \"utf-8\"\nString mLine;\nwhile ((mLine = reader.readLine()) != null)\
    \ {\nstringBuilder.append(mLine+\"\\n\");\n}\n} catch (IOException e) {\ne.printStackTrace();\n\
    } finally {\nif (reader != null) {\ntry {\nreader.close();\n} catch (IOException\
    \ e) {\ne.printStackTrace();\n}\n}\n}\nreturn stringBuilder.toString();\n}\n```\n\
    \nResources\nSimilar to assets these resources are read only and are provided\n\
    precompile time. Unlike the assets folder, data stored in the resource\nfolder\
    \ (located in the APK root under `/res)` must follow\nspecific conventions such\
    \ as file types. Examples of data that can be\nincluded in the res folder include\
    \ XML files for strings and integers as\nwell as application icons.\n\n*Return\
    \ a string (strings should be stored in the strings.xml file)\nfrom the res folder:*\n\
    \n```\ngetApplicationContext().getString(R.string.string_name)\n```\n\n*Return\
    \ an image from the res folder. Bear in mind that images are\nstored in the root\
    \ of the Res drawable folder and that, when accessing\nan image, to not include\
    \ the image extension:*\n\n```\nContextCompat.getDrawable(getApplicationContext(),\
    \ R.drawable.image_name)\n```\n\nFootnotes\n\n7. Android Unique Identifiers\n\n\
    Unique identifiers can be used for an array of tasks, from allowing\nusers to\
    \ set advertising preferences, uniquely identifying a user, and\nidentifying a\
    \ specific device. There are also strong privacy concerns\nwhen it comes to the\
    \ use of unique identifiers enforced by both Android\npermissions and the Google\
    \ Play Developer Policy.\nIn an attempt to address user privacy concerns, as of\
    \ Android 10 (API\nlevel 29), there has been a large change in how hardware unique\n\
    identifiers can be accessed from within Android applications. This being\nthat\
    \ an application must be a device or profile owner, have special\ncarrier permissions,\
    \ or have the `READ_PRIVILEGED_PHONE_STATE`\nprivileged permission in order to\n\
    access nonresettable device identifiers. The `READ_PRIVILEGED_PHONE_STATE permission`\
    \ is only available to applications signed with the\ndevice’s platform (system\
    \ application) key^([^(35)](#fn35)).\n\nGoogle Play Advertising ID\nAs of Android\
    \ KitKat (API level 4.4), the Google Play Advertising\nID ^([^(36)](#fn36)) can\
    \ be used to uniquely\nidentify a user of a device. When available on a device,\
    \ it is an\noffense against the Google Play Developer Programme Policy to use\
    \ any\nother device unique identifiers for advertising purposes. The benefit of\n\
    the advertising ID for an end user is that it is both resettable and can\nbe used\
    \ for customizing personalized advertising. An example of the ID\nreturned is\
    \ a string representation of `9fdbfa02-7f28-422e-944e-f02393a9360e`.\nAs the advertising\
    \ ID is provided by the Google Play Services API, it\nmeans that it will only\
    \ be available on devices with Google Play\nServices.\n\n*The advertising ID can\
    \ be used by adding the following library path\nto the build.gradle file’s dependencies\
    \ tag:*\n\n```\nimplementation 'com.google.android.gms:play-services-ads:7.0.0'\n\
    ```\n\n*Retrieving the advertising ID (this cannot be done on the main\nthread\
    \ - this example uses an AsyncTask; see Chapter* [9](#509502_1_En_9_Chapter.xhtml)\
    \ *for more information):*\n\n```\nvoid getAdvertisingID(final Context context){\n\
    AsyncTask.execute(new Runnable() {\n@Override\npublic void run() {\nInfo adInfo\
    \ = null;\ntry {\nadInfo = AdvertisingIdClient.getAdvertisingIdInfo(context);\n\
    } catch (IOException e) {\ne.printStackTrace();\n} catch (GooglePlayServicesNotAvailableException\
    \ e) {\ne.printStackTrace();\n} catch (GooglePlayServicesRepairableException e)\
    \ {\ne.printStackTrace();\n}\nString adId = adInfo != null ? adInfo.getId() :\
    \ null;\nLog.v(\"Advertising ID\",adId);\n}\n});\n}\n```\n\nAndroid ID (Secure\
    \ Settings Android ID – SSAID)\nThis is a unique 64-bit number (e.g., `ce79870fa5cbfb56`)\n\
    that is Android’s preferred approach for identifying a user of a device\nfor activities\
    \ outside of advertising. This unique identifier is\navailable on all versions\
    \ of Android, does not require any additional\npermissions, and is reset as part\
    \ of a device factory reset.\n\n*Accessing the* *Android ID*\n*:*\n\n```\nLog.v(\"\
    Android ID\",Settings.Secure.getString(this.getContentResolver(), Settings.Secure.ANDROID_ID));\n\
    ```\n\nSIM Serial Number\nA SIM serial\nnumber  is\nused for international identification\
    \ and is typically broken down into\n19 digits^([^(37)](#fn37)). This breaks down\
    \ to two\ndigits for the Telecom ID, two digits for the country code, two digits\n\
    for the network code, four digits for the month and year of\nmanufacturing, two\
    \ digits for the switch configuration code, six digits\nfor the SIM number, and\
    \ a single check digit.\nThe SIM serial number is available on Android up to and\
    \ including\nAndroid Pie (API level 28), where it is restricted in Android 10\
    \ and\nabove with the `READ_PRIVILEGED_PHONE_STATE`\npermission. To use the SIM\
    \ serial number prior to Android 10 requires\nthe `READ_PHONE_STATE`\nruntime\
    \ permission.\n\n*Retrieving the SIM serial number:*\n\n```\nTelephonyManager\
    \ telephonyManager = (TelephonyManager) getApplicationContext().getSystemService(Context.TELEPHONY_SERVICE);\n\
    Log.v(\"SIM Serial Number\", telephonyManager.getSimSerialNumber());\n```\n\n\
    Phone Number\nWhen writing applications for devices that use telephony, the phone\n\
    number can be used as a unique identifier. This identifier is available\non all\
    \ versions of Android and is tied to the SIM card on the device (if\none is present)\
    \ and requires the `READ_PHONE_STATE` or\n`READ_PRIVILEGED_PHONE_STATE permission`\
    \ to access.\n\n*Retrieving the* *phone number*\n*:*\n\n```\nTelephonyManager\
    \ telephonyManager = (TelephonyManager) getApplicationContext().getSystemService(Context.TELEPHONY_SERVICE);\n\
    Log.v(\"Phone Number\", telephonyManager.getLine1Number());\n```\n\nIMEI\nand\
    \ MEID\nTo both uniquely identify devices and prevent theft, all mobile\ndevices\
    \ are designated an IMEI or MEID number. Depending\non the network of the device\
    \ will depend on which identifier the device\nhas. Devices will have an IMEI number\
    \ if on GSM (Global System for\nMobiles) systems\nand will have a MEID number\
    \ if on a CDMA (code division multiple access)\nsystem. The main\ndifference between\
    \ the two is that an IMEI is a 14-digit number, while a\nMEID is a 15-digit number.\
    \ Similar to other hardware identifiers, both\nIMEIs and MEIDs are available on\
    \ devices prior to Android 10 where it\ncan be read if the application has the\
    \ `READ_PHONE_STATE`\npermission. However, as of Android 10, an application requires\
    \ the `READ_PRIVILEGED_PHONE_STATE`*.*\n\n*Pre and including Android N (25) access:*\n\
    \n```\nTelephonyManager telephonyManager = (TelephonyManager) getApplicationContext().getSystemService(Context.TELEPHONY_SERVICE);\n\
    Log.v(\"Device ID\", telephonyManager.getDeviceId());\n```\n\n*Post (and including)\
    \ Android O (26):*\n\n```\nTelephonyManager telephonyManager = (TelephonyManager)\
    \ getApplicationContext().getSystemService(Context.TELEPHONY_SERVICE);\nLog.v(\"\
    IMEI\", telephonyManager.getImei());\nLog.v(\"MEID\", telephonyManager.getMeid());\n\
    ```\n\nFootnotes\n\n8. Obfuscation and Encryption\n\nLogging\n\nThe `Log`\nclass\
    \  in Android\ncan be used to create log messages in logcat (accessible via the\
    \ `adb logcat` command);\nthese logs come in a handful of different levels, these\
    \ being\n\n*   **Log.wtf** - “What a Terrible Failure” (treated as\n    an extreme\
    \ ERROR)\n\n*   **Log.e** - ERROR\n\n*   **Log.w** - WARNING\n\n*   **Log.i**\
    \ - INFO\n\n*   **Log.d** - DEBUG\n\n*   **Log.v** - VERBOSE\n\nAs stated, these\
    \ log messages can be read via logcat. Logcat is Android’s\nlogging system and\
    \ logs everything from system messages to stack traces.\nApplications can write\
    \ to logcat by using the `Log` class, and in\nturn these messages can be viewed\
    \ by using the `adb logcat`\ncommand  or in\nprograms such as Android Studio.\n\
    Irrespective of which of these levels you choose, all log levels will\nbe displayed\
    \ in logcat. For example, the following logger code, while\nspecifying debug,\
    \ will be logged to logcat irrespective of the build\ntype (i.e., it will be logged\
    \ in a release build). It is also worth\nbearing in mind that the debug log messages\
    \ will be compiled into\nrelease applications. For example, in the following we\
    \ can see a\ncomparison between a log message in Java and its disassembled release\n\
    build in Smali (a human-readable representation of Dalvik bytecode).\n\n*In Java*\n\
    *:*\n\n```\nLog.d(TAG, \"I am a normal debug log message\");\n```\n\n*In Smali:*\n\
    \n```\niget-object p1, p0, Lcom/example/logger/MainActivity;->TAG:Ljava/lang/String;\n\
    const-string v0, \"A log using is loggable\"\ninvoke-static {p1, v0}, Landroid/util/Log;->d(Ljava/lang/String;Ljava/lang/String;)I\n\
    ```\n\nStandard Logging \nThere are several reasons where a developer may not\
    \ want to use\nstandard logging. These come down to security and performance,\
    \ where\nboth a log should be hidden from a malicious actor and a flood of logs\n\
    should be avoided on an end user’s device.\n\n*Standard log:*\n\n```\nLog.d(TAG,\
    \ \"I am a normal debug log Message\");\n```\n\nFinal Constant Variables\nOne\
    \ supported way of limiting the amount of log statements in release\ncode is by\
    \ using the Gradle `BuildConfig` file\nwhich is generated by Gradle prebuild.\
    \ This file is generated with the\nfollowing line set to `true` if building a\n\
    debug build and `false` if building a\nrelease build.\n\n*DEBUG value in BuildConfig\
    \ file:*\n\n```\npublic static final boolean DEBUG = Boolean.parseBoolean(\"true\"\
    );\n```\n\n*Implementing the DEBUG constant:*\n\n```\nif (BuildConfig.DEBUG){\n\
    Log.d(TAG,\"This is a log that won't be compiled in a release build.\");\n}\n\
    ```\n\nWhen building for release, and set to false, the Java compiler will\nsee\
    \ that it is impossible for the final variable to be true and so\ndoesn’t compile\
    \ the code inside of the if statement. This both means\nthat the log won’t be\
    \ displayed in logcat and also means that the log\nstring won’t exist in the application’s\
    \ source code as with a normal log\nmessage.\nA similar affect to using `BuildConfig.DEBUG`\n\
    \ can also be achieved if not using Gradle. This can be done using\na final boolean\
    \ and setting it to `true` when debugging\nand `false` for\nthe release build.\n\
    \n*Setting a* *custom DEBUG constant*\n*:*\n\n```\nfinal boolean SHOULD_LOG =\
    \ false;\nif (SHOULD_LOG){\nLog.d(TAG,\" A log that should never happen...\");\n\
    }\n```\n\nUsing .isLoggable\nAnother way of checking if a log message should be\
    \ displayed is by\nusing the `.isLoggable`\nmethod   built into the `Log` class.\
    \ This\nmethod checks the log level set for the specific tag (the default for\
    \ an\napplication is `INFO`). The log levels\nwork in a hierarchy, as listed at\
    \ the top of this section. Meaning that\nif the log level is set to Verbose, all\
    \ levels above it will also be\n`true`. Unlike\nwhen using `BuildConfig,` as this\n\
    value can change programmatically, this string will be compiled into the\napplication’s\
    \ code base.\n\n*Example of Log.isLoggable:*\n\n```\nif (Log.isLoggable(TAG,Log.DEBUG)){\n\
    Log.d(TAG,\"A log using is loggable\");\n}\n```\n\n*This log level can be set\
    \ via the shell using:*\n\n```\nsetprop log.tag. \n```\n\nDynamically Checking\
    \ If Debuggable\nThe last technique discussed here for limiting the amount of\
    \ logs\nwritten to logcat is by dynamically checking if an application is in a\n\
    debug state. Like the above, as this value can change, the log and\nstring will\
    \ be compiled into the built release application.\n\n*Example of dynamically checking\
    \ if an application is in a debug\nstate:*\n\n```\nboolean isDebuggable =  ( 0\
    \ != ( getApplicationInfo().flags & ApplicationInfo.FLAG_DEBUGGABLE ) );\nif (isDebuggable){\n\
    Log.d(TAG,\"This log will check programmatically if the app is debuggable.\");\n\
    }\n```\n\nProGuard\nThe most common Android obfuscation tool is ProGuard, with\n\
    DexGuard^([^(38)](#fn38)) being the premium\nalternative. ProGuard analyzes and\
    \ optimizes the Java bytecode rather\nthan the direct Java/Kotlin code base. ProGuard\
    \ implements a collection\nof techniques^([^(39)](#fn39)), these being:\n\n* \
    \  **Shrinking** - Identifies and removes dead code\n    that is not reachable\
    \ or is unused. Including classes, fields, methods,\n    and attributes.\n\n*\
    \   **Optimizer** - Performs optimization on code and\n    code flow where performance\
    \ changes can be made.\n\n*   **Obfuscator** - Renaming aspects of the codebase\n\
    \    (i.e., classes, fields, and methods) to names that are deliberately\n   \
    \ obscure and meaningless.\n\n*   **Preverifier**\n     - Performs preverification\
    \ checks on the bytecode, where if the\n    checks are successful, the classfiles\
    \ are annotated with preverification\n    information. This is required for Java\
    \ Micro Edition and for Java 6 and\n    higher.\n\nEnabling ProGuard\nEdit the\
    \ `buildTypes` tag  in the `gradle.build`\nfile   to `minifyEnabled true`.\n\n\
    *For example:*\n\n```\nbuildTypes {\nrelease {\nminifyEnabled true\nproguardFiles\
    \ getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'\n\
    }\n}\n```\n\nThe ProGuard Mapping File\nAfter following the above when making\
    \ a release build, using Gradle,\nthe Java bytecode will have been analyzed by\
    \ ProGuard. ProGuard will\nprovide a log file of the stages undergone. This is\
    \ saved at the\nfollowing relative path to the application project root.\n\n*Mapping\
    \ file relative location:*\n\n```\napp/build/outputs/mapping/release/mapping.txt\n\
    ```\n\nThis file shows the changes that ProGuard has implemented. An example\n\
    of part of this file is below. In this example it can be seen that the\nfunction\
    \ `showString` in `MainActivity` has been\nallow-listed while the other function\
    \ in *MainActivity* named\n*loadMe* has not and is now renamed to `n`.\n\n*Example\
    \ of mapping file:*\n\n```\ncom.example.java_dexloadable.MainActivity -> com.example.java_dexloadable.MainActivity:\n\
    java.lang.String loadMe() -> n\n1:1:java.lang.String com.example.java_dexloadable.StringsClass.stringGetter(int):0:0\
    \ -> showString\n1:1:void showString(android.content.Context,int):0 -> showString\n\
    2:2:void showString(android.content.Context,int):0:0 -> showString\n```\n\nIf\
    \ a function or class is not in this mapping, then it has been\nshrunken out (meaning\
    \ that it wasn’t being used in the code), or it has\nnot been obfuscated (due\
    \ to being\nallow-listed).\n\nThe ProGuard Allow-List\nBy default, ProGuard will\
    \ shrink, optimize, and obfuscate everything\nin the Java bytecode. This can be\
    \ controlled by editing the ProGuard\nfile located at `app\\proguard-rules.pro`,\n\
    in the root of an application directory. This file can be renamed and\nmoved and\
    \ is specified in the `gradle.build`\nfile.\n\n*The following example rule allow-lists\
    \ the showString function in\nthe class* *com.example.java_dexloadable.MainActivity.\
    \ Here you\nneed to specify the access level of the class and function (public,\n\
    private, package-private, etc.) as well as the parameters for the\nfunction:*\n\
    \n```\n-keep class com.example.java_dexloadable.MainActivity {\npublic showString(android.content.Context,\
    \ int);\n}\n```\n\n*The following example is the same; however, in this example\
    \ all\nfunctions in the* *MainActivity* *are allow-listed:*\n\n```\n-keep class\
    \ com.example.java_dexloadable.MainActivity {\npublic *;\n}\n```\n\nThe Different\
    \ Types of Keep\n\nIn the preceding two examples, the keep keyword is used. There\
    \ are\nseveral different types of keep^([^(40)](#fn40)) keyword. These\nare summarized\
    \ in Table [8-1](#509502_1_En_8_Chapter.xhtml#Tab1).\n\nTable 8-1\nProGuard Types\
    \ of Keep\n\n   |\n No Rule |\n -keep |\n -keepclassmembers |\n -keepnames |\n\
    \n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\n **Shrinks\
    \ Classes** |\n ✓ |\n x |\n ✓ |\n ✓ |\n\n **Shrinks Members** |\n ✓ |\n x |\n\
    \ x |\n ✓ |\n\n **Obfuscates Classes** |\n ✓ |\n x |\n ✓ |\n x |\n\n **Obfuscates\
    \ Members** |\n ✓ |\n x |\n x |\n x |\n\nEntry\nPoints\nProGuard automatically\
    \ allow-lists (also known as white-lists) entry\npoints to an application (e.g.,\
    \ an activity with the `MAIN` or `LAUNCHER` category).\nIt’s important to bear\
    \ in mind that entry points used as part of\nreflection will not be automatically\
    \ allow-listed, and so if using\nrefection, these entry points will have to be\
    \ manually allow-listed.\nThis, however, will minimize the effectiveness of obfuscation\
    \ as the\nfrequency of plain text components will be higher. The entry points\
    \ that\nare automatically added to an allow-list by ProGuard typically include\n\
    classes with main methods, applets, MIDlets, activities, etc. This also\nincludes\
    \ classes that have calls to native C code.\n\nExample Rules\nIn the following\
    \ example, the Java Package Name is `java_dexloadable,` and\nall rules have been\
    \ added to the `Proguard-rules.pro`\nfile.\n\n*Keeps (allow-lists) all methods\
    \ in the MainActivity class:*\n\n```\n-keep class com.example.java_dexloadable.MainActivity\
    \ {\npublic *;\n}\n```\n\n*Keeps (allow-lists) the showString function in the\
    \ MainActivity\nclass as well as the MainActivity class itself:*\n\n```\n-keep\
    \ class com.example.java_dexloadable.MainActivity {\npublic showString(android.content.Context,\
    \ int);\n}\n```\n\n*Keeps (allow-lists) everything under the top-level package\n\
    (shouldn’t be used):*\n\n```\n-keep class com.example.java_dexloadable.** { *;\
    \ }\n```\n\n*Keeps (allow-lists) the function stringGetter but not the class\n\
    StringsClass itself:*\n\n```\n-keepclassmembers class com.example.java_dexloadable.StringsClass\
    \ {\npublic stringGetter(int);\n}\n```\n\n*Repackage whole package into a single\
    \ root:*\n\n```\n-repackageclasses\n```\n\n*Doesn’t perform the ProGuard shrink\
    \ step:*\n\n```\n--dontshrink\n```\n\nPublic Key/Certificate\nPinning\nPublic\
    \ key pinning allows an application to associate a specific\ncryptographic public\
    \ key with a given web server. This in turn is used\nto decrease the possibility\
    \ of man in the middle attacks.\nWhen performing public key pinning, the public\
    \ key of the web server\nbeing connected to is required.\n\n*There are two fairly\
    \ simple approaches for doing this – either use\nthe following* *openssl* *command,\
    \ or use the following\ncode and extract the public key from the error message:*\n\
    \n```\nopenssl x509 -in cert.crt -pubkey -noout | openssl pkey -pubin -outform\
    \ der | openssl dgst -sha256 -binary | openssl enc -base64\n```\n\nUse the hash\
    \ of the public key from the preceding message as your\nhash in the below code.\
    \ In Android, networking cannot be performed on\nthe main thread, and so it will\
    \ need to be in a long-running service, an\nAsyncTask, or thread (detailed in\
    \ Chapter [9](#509502_1_En_9_Chapter.xhtml)).\n\n*Add the following dependency\
    \ to your build.gradle file as this\nexample uses the OkHTTP library. Also make\
    \ sure that the application has\nthe Internet permission and that no networking\
    \ is done on the main\nthread:*\n\n```\nimplementation(\"com.squareup.okhttp3:okhttp:4.9.0\"\
    )\n```\n\n*Certificate pinning example:*\n\n```\nString hostname =  \"google.com\"\
    ;\nCertificatePinner certPinner = new CertificatePinner.Builder()\n.add(\nhostname,\n\
    \"sha256/MeCugOOsbHh2GNsYG8FO7wO7E4rjtmR7o0LM4iXHJlM=\"\n)\n.build();\nOkHttpClient\
    \ okHttpClient = new OkHttpClient.Builder()\n.certificatePinner(certPinner)\n\
    .build();\nHttpUrl.Builder urlBuilder = HttpUrl.parse(\"https://\"+hostname).newBuilder();\n\
    String url = urlBuilder.build().toString();\nMediaType JSON = MediaType.parse(\"\
    application/json; charset=utf-8\");\nRequestBody body = RequestBody.create(JSON,\
    \ \"{\\\"test\\\":\\\"testvalue\\\"}\");\nRequest request = new Request.Builder()\n\
    .url(url)\n.post(body)\n.build();\nLog.v(TAG,request.toString());\nResponse response\
    \ = null;\ntry {\nresponse = okHttpClient.newCall(request).execute();\nResponseBody\
    \ jsonData = response.body();\nLog.v(TAG, jsonData.toString());\n} catch (IOException\
    \ e) {\ne.printStackTrace();\n}\nreturn Result.success();\n```\n\nAES\nEncryption\n\
    AES uses a symmetric algorithm, meaning that the same key is applied\nfor both\
    \ encryption and decryption. The following is a lightweight\nexample of implementing\
    \ AES-256 encryption in Java.\n\n*The following is an example of an AES-256 encryption\
    \ approach in\nJava:*\n\n```\ntry {\nCipher cipher = null;\ncipher = Cipher.getInstance(\"\
    AES/CBC/PKCS5PADDING\");\nKeyGenerator keygen = null;\nkeygen = KeyGenerator.getInstance(\"\
    AES\");\nkeygen.init(256);\nSecretKey key = keygen.generateKey();\nString plainTextString\
    \ = \"I am a plain text\";\nString cipherTextAsString = \"N/A\";\nString newPlainTextAsString\
    \ = \"N/A\";\nbyte[] plainText = plainTextString.getBytes();\ncipher.init(Cipher.ENCRYPT_MODE,\
    \ key);\nbyte[] cipherText = new byte[0];\ncipherText = cipher.doFinal(plainText);\n\
    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.KITKAT) {\ncipherTextAsString\
    \ = new String(cipherText, StandardCharsets.UTF_8);\n}\nIvParameterSpec iv = new\
    \ IvParameterSpec(cipher.getIV());\ncipher.init(Cipher.DECRYPT_MODE, key, iv);\n\
    byte[] newPlainText = cipher.doFinal(cipherText);\nif (Build.VERSION.SDK_INT >=\
    \ Build.VERSION_CODES.KITKAT) {\nnewPlainTextAsString = new String(newPlainText,\
    \ StandardCharsets.UTF_8);\n}\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)\
    \ {\nLog.v(getApplicationContext().getPackageName(), \"The plaintext '\" + plainTextString\
    \ + \"' encrypted is \" + Base64.getEncoder().encodeToString(cipherText) + \"\
    \ and decrypted is '\" + newPlainTextAsString);\n}\n}catch (NoSuchAlgorithmException\
    \ e) {\ne.printStackTrace();\n} catch (InvalidKeyException e) {\ne.printStackTrace();\n\
    } catch (InvalidAlgorithmParameterException e) {\ne.printStackTrace();\n} catch\
    \ (NoSuchPaddingException e) {\ne.printStackTrace();\n} catch (BadPaddingException\
    \ e) {\ne.printStackTrace();\n} catch (IllegalBlockSizeException e) {\ne.printStackTrace();\n\
    }\n```\n\nFootnotes\n\n9. Services, Launchers, and\nComponents\n\nLong-Running\
    \ Services\n\nIn Android there are several ways that “jobs” can be tasked for\
    \ a\none-off or periodic running after the current activity closes. The\ntechniques\
    \ discussed here will vary between being the two following\ntypes:\n\n*   **Strongly\
    \ bound** to the current activity, such as\n    `AsyncTask` ,\n    meaning that\
    \ if the activity finishes, then the task is garbage\n    collected.\n\n*   **Not\
    \ strongly bound** to the current activity, such\n    as `JobScheduler`, where\n\
    \    the task continues even after the parent activity itself is garbage\n   \
    \ collected.\n\nTriggers\n\nTriggers  are the mechanism for\nhow a long-running\
    \ service is tasked and run, these being the initial\nentry points for the service.\
    \ Most of these triggers will provide some\nform of persistence to the service.\
    \ These triggers can be seen in Table\n[9-1](#509502_1_En_9_Chapter.xhtml#Tab1).\n\
    \nTable 9-1\nLong-Running Service Triggers\n\n Trigger |\n Description |\n\n|\
    \ --- | --- | --- | --- | --- |\n\n Intent |\n Triggered directly and immediately\
    \ from the code, generally from user\ninteraction. |\n\n AlarmManager |\n Triggered\
    \ at a specific time in the future, one-off or recurring. |\n\n BroadcastReceiver\
    \ |\n Triggered when a particular broadcast message is received. For example,\
    \ `BootComplete`, `PowerConnected`, or\ncustom receivers. |\n\n Sensors Callbacks\
    \ |\n Triggered when a particular sensor value is received. |\n\n WorkManager\
    \ |\n Either using `JobScheduler` or `AlarmManager` and\n`BootComplete`\ndepending\
    \ on the API level. |\n\n JobScheduler |\n As of API level 21 (Android L), a smarter\
    \ implementation of an `AlarmManager` allowing\nfor running depending on network,\
    \ idle, and charging state. Also Doze\ncompliant. |\n\nServices\n\nThere are several\
    \ types of “service” that can be run to provide\nlong-running background work\
    \ to an application. These can be seen in\nTable [9-2](#509502_1_En_9_Chapter.xhtml#Tab2).\n\
    \nTable 9-2\nLong-Running Service Types\n\n Service |\n Description |\n\n| ---\
    \ | --- | --- | --- | --- |\n\n WorkManager |\n Encapsulating both the launcher\
    \ and service element (allowing for backward\ncompatibility as the underlying\
    \ implementation is abstracted). `WorkManagers` have a\nminimum period between\
    \ concurrent work of 15 minutes, and each worker\nshould only run for a maximum\
    \ of 10 minutes. `WorkManagers` also\nautomatically persist after a reboot (using\
    \ a `BootComplete`\nbroadcast receiver if the permission is available). |\n\n\
    \ JobScheduler |\n Encapsulating both the launcher and service element. These\
    \ are highly customizable and\ncan run work depending on environmental factors\
    \ such as network, idle,\nand battery state. In addition to this, they can be\
    \ defined to run at\nspecific intervals or at specific time frames as well as\
    \ to persist over\na reboot (using a `BootComplete`\nbroadcast receiver if the\
    \ permission is available). The minimum period\nbetween work is 15 minutes. |\n\
    \n Service |\n There are many types of services; however, one of the most common\
    \ is intent\nservices, where work requests run sequentially. Subsequent requests\n\
    (intents to the service) wait until the first operation is\nfinished. |\n\n Thread\
    \ |\n Primarily used for jobs when not wanting to work on the UI thread (such\
    \ as\nnetworking), however, can be used for long-running background work as\n\
    long as their parent isn’t killed. A thread is bound to the parent\napplication.\
    \ |\n\n AsyncTask |\n Bound to the life of the parent `Activity`, meaning\nthat\
    \ if the Activity finishes or is killed, so is the `AsyncTask`. The\nadvantage\
    \ here is that it is easier to push work back to the UI thread\nfrom an `AsyncTask`.\
    \ |\n\n Foreground Service |\n As of API 26 background services (such as the intent\
    \ service) are restricted to only running when the\napplication is in the foreground.\
    \ The replacement for this is foreground\nservices, where\nwhen running they must\
    \ display a constant notification to the user\n(e.g., a music app showing a music\
    \ player while playing). |\n\nIntentService, AlarmManager, and BootComplete\n\
    As noted previously an `IntentService`^([^(41)](#fn41)) is a type of service that\n\
    cannot directly interact with the UI. The work requests in an `IntentService`\n\
    \  run\nsequentially where requests will wait until the current operation is\n\
    finished. An operation running on an `IntentService` can’t\nbe interrupted.\n\
    An `AlarmManager`\n ^([^(42)](#fn42)) is a mechanism in Android\nthat allows for\
    \ the delayed and continued running of code in a\nbackground thread. An `AlarmManager`\
    \ can be\nconfigured to run at a specific time in the future and at preconfigured\n\
    intervals. The `AlarmManager` also has\na `setAlarmClock`\noption which allows\
    \ it to trigger even if the device is in a low-power\nidle or Doze mode.\nA `BroadcastReceiver`\n\
    \  can be\nset up to listen for the Boot Complete intent^([^(43)](#fn43)), as\
    \ discussed in Chapter\n[4](#509502_1_En_4_Chapter.xhtml). This intent is sent\
    \ once the\ndevice starts up after being rebooted. In turn starting the `AlarmManager`\
    \ after\nreceiving the `BootComplete`\nintent   will mean that the\nbackground\
    \ service continues running after the device has been\nrebooted.\nAs of Android\
    \ Oreo 8 (API level 26), Android services can no longer\nbe started from a background\
    \ process.^([^(44)](#fn44)) This means that in Android\n8+, `JobSchedulers` \n\
    or foreground services should be used. Bear in mind that this\nfunctionality ,\
    \ while only applying to applications that target Android\n8+, it can be enabled\
    \ by users in the settings^([^(45)](#fn45)) page which also puts many\nadditional\
    \ constraints on how services run in the background.\n\n*The following is a function\
    \ that will set up an* *AlarmManager* \n*to repeat every x minutes as defined\
    \ by the\nwaitBeforeRepeatInMinutes parameter:*\n\n```\npublic void startPeriodicWork(long\
    \ waitBeforeRepeatInMinutes){\n// Construct an intent that will execute the AlarmReceiver\n\
    Intent intent = new Intent(context, AlarmReceiver.class);\n// Create a PendingIntent\
    \ to be triggered when the alarm goes off\nfinal PendingIntent pIntent = PendingIntent.getBroadcast(context,\
    \ AlarmReceiver.REQUEST_CODE,\nintent, PendingIntent.FLAG_UPDATE_CURRENT);\n//\
    \ Setup periodic alarm every every half hour from this point onwards\nlong firstMillis\
    \ = System.currentTimeMillis(); // alarm is set right away\nAlarmManager alarm\
    \ = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);\n// First\
    \ parameter is the type: ELAPSED_REALTIME, ELAPSED_REALTIME_WAKEUP, RTC_WAKEUP\n\
    // Interval can be INTERVAL_FIFTEEN_MINUTES, INTERVAL_HALF_HOUR, INTERVAL_HOUR,\
    \ INTERVAL_DAY\nif (alarm != null) {\nalarm.setInexactRepeating(AlarmManager.RTC_WAKEUP,\
    \ firstMillis,\nwaitBeforeRepeatInMinutes * 60 * 1000, pIntent);\n}\n}\n```\n\n\
    *Next, create the AlarmManager BroadcastReceiver class. Set the\nprocess property\
    \ in the Android manifest so that it will continue to\nstay alive if the app has\
    \ closed*^([^(46)](#fn46))*. As part of this, add the\nBroadcastReceiver to the\
    \ AndroidManifest.xml file.*\n\n```\n\n*Add the following to* *AlarmReceiver*\n\
    *.java:*\n\n```\npublic class AlarmReceiver extends BroadcastReceiver {\npublic\
    \ static final int REQUEST_CODE = 12345;\n// Triggered by the Alarm periodically\
    \ (starts the service to run task)\n@Override\npublic void onReceive(Context context,\
    \ Intent intent) {\nint tid = Process.myTid();\nLog.v(\"TaskScheduler\", \"Started\
    \ Alarm Receiver with tid \"+ tid);\nTaskManager taskManager = new TaskManager(context);\n\
    taskManager.oneOffTask();\n}\n}\n```\n\n*Next, add the BroadcastReceiver for BootComplete.\
    \ Add the following\nto the AndroidManifest.xml file:*\n\nThen create the `BootReceiver.java`\n\
    class :\n\n```\npublic class BootReceiver extends BroadcastReceiver {\n@Override\n\
    public void onReceive(Context context, Intent intent) {\nint tid = Process.myTid();\n\
    Log.v(\"TaskScheduler\", \"Started Boot Complete Receiver with tid \"+ tid);\n\
    TaskManager taskManager = new TaskManager(context);\ntaskManager.startPeriodicWork(5);\n\
    }\n}\n```\n\n*Finally create the* *IntentService*\n*; for this make a file called\
    \ ServiceManager.java:*\n\n```\npublic class ServiceManager extends IntentService\
    \ {\npublic ServiceManager() {\nsuper(\"ServiceTest\"); //Used to name the worker\
    \ thread, important only for debugging.\n}\n@Override\nprotected void onHandleIntent(Intent\
    \ intent) {\nint tid = Process.myTid();\nLog.v(\"TaskScheduler\", \"Started Service\
    \ with tid \"+ tid);\nString val = intent.getStringExtra(\"foo\");\n//todo Add\
    \ the work to be performed here.\n}\n}\n```\n\n*Add this service to the* *AndroidManifest.xml*\n\
    *file:*\n\n```\n\nForeground Services\nThere are an array of different types of\
    \ services^([^(47)](#fn47)) in Android, from started\nservices (which run in the\
    \ UI thread) to `IntentService` (which\nrun in their own thread) to bound services\
    \ (which run as long as there\nis one activity active that is bound to it).\n\
    As of Android 8 Oreo (API 26), there are restrictions on Android\napplications\
    \ running background services, unless the app itself is in\nthe foreground. In\
    \ this case instead of using the `context.startService()`\nmethod , the `startForegroundService()`\n\
    method  should be\nused. After this the service has 5 seconds to display a notification\
    \ to\nthe user and call the `startForeground(1, notification)` method, which lives\
    \ for the duration of the service\nuntil the `stopForeground(true)`\nand `stopSelf()`\n\
    methods  are\ncalled. A foreground service extends the `Service` class as with\n\
    any other service and, outside of following the preceding rules and\nrestrictions,\
    \ acts in the same way.\n\n*Code such as the following should be used to identify\
    \ if a\nbackground or foreground service should be used:*\n\n```\nIntent intent\
    \ = new Intent(context, ServiceManager.class); //replace with an appropriate intent\n\
    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\ncontext.startForegroundService(intent);\n\
    }else{\ncontext.startService(intent);\n}\n```\n\nAs a notification is required\
    \ as part of the starting of a foreground\nservice, it means that a by-product\
    \ of this is to set up a notification\nchannel^([^(48)](#fn48)) (when targeting\
    \ Android 8.0 -\nAPI level 26 and above). Notification channels were added as\
    \ a way of\nproviding fine-grained access for end users allowing them to change\n\
    notification settings and decide which notification channels from an app\nshould\
    \ be visible.\n\n*The following shows an example of setting up a notification\n\
    channel:*\n\n```\npublic static void createNotificationChannel(Context context)\
    \ {\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\nint importance = NotificationManager.IMPORTANCE_DEFAULT;\n\
    NotificationChannel channel = new NotificationChannel(CHANNEL_ID, CHANNEL_NAME,\
    \ importance);\nchannel.setDescription(CHANNEL_DESC);\nNotificationManager notificationManager\
    \ = context.getSystemService(NotificationManager.class);\nif (notificationManager\
    \ != null) {\nnotificationManager.createNotificationChannel(channel);\n}\n}\n\
    }\n```\n\n*Sending a notification:*\n\n```\nIntent notificationIntent = new Intent(this,\
    \ MainActivity.class);\nPendingIntent pendingIntent = PendingIntent.getActivity(this,\n\
    0, notificationIntent, 0);\nNotification notification = new NotificationCompat.Builder(getApplicationContext(),\
    \ CHANNEL_ID)\n.setContentTitle(\"Notification Title\")\n.setContentText(\"Notification\
    \ Text\")\n.setSmallIcon(R.mipmap.ic_launcher)\n.setContentIntent(pendingIntent)\n\
    .build();\nstartForeground(1, notification);\n}\n```\n\n*As of Android 9 (API\
    \ level 28), in addition to adding your Service\nto the Android manifest as follows,\
    \ you will also need to add the*\n*FOREGROUND_SERVICE* *permission:*\n\nJobScheduler\n\
    As of Android 5 L (API 21), job schedulers have been introduced as a\nway to task\
    \ batch jobs for when the device has more resources available.\nAs a whole, multiple\
    \ pieces of work can be tasked by `JobSchedulers`\n `,` and they will\nbucket\
    \ these tasks into batches. It means that the tasked work may not\nexactly execute\
    \ when expected; however, it will occur around that time\n(e.g., a task instructed\
    \ to execute every 15 minutes may execute after\n14 minutes for one run and after\
    \ 16 minutes for another run).\nOne of the most powerful features of JobSchedulers\
    \ is that they allow\nfor the deference of work if specific criteria are or are not\
    \ set, for\nexample, no network connectivity, the battery is charging, or the\
    \ device\nis in an idle state. There is also the option with `setPeriodic` and\
    \ `setPersisted` to run\nperiodic work and for it to persist over a reboot (if\
    \ the application\nholds the RECEIVE_BOOT_COMPLETED permission). The `setOverrideDeadline`\n\
    \ option also allows for when running one-off work for a maximum\ntime to allow\
    \ a wait before forcing the running of the work.\n\n*Add the following. If not\
    \ wanting a periodic worker, then remove the\nsetPeriodic and setPersisted tags:*\n\
    \n```\n@RequiresApi(api = Build.VERSION_CODES.LOLLIPOP)\npublic void startJobScheduler(){\n\
    ComponentName serviceComponent = new ComponentName(context, JobSchedulerManager.class);\n\
    JobInfo.Builder builder = new JobInfo.Builder(0, serviceComponent);\n//builder.setMinimumLatency(1\
    \ * 1000); // wait at least /Can't call setMinimumLatency() on a periodic job/\n\
    //builder.setOverrideDeadline(3 * 1000); // maximum delay //Can't call setOverrideDeadline()\
    \ on a periodic job.\nbuilder.setPeriodic(1000); //runs over time\nbuilder.setPersisted(true);\
    \ // persists over reboot\n//builder.setRequiredNetworkType(JobInfo.NETWORK_TYPE_UNMETERED);\
    \ // require unmetered network\n//builder.setRequiresDeviceIdle(true); // device\
    \ should be idle\n//builder.setRequiresCharging(false); // we don't care if the\
    \ device is charging or not\nJobScheduler jobScheduler = (JobScheduler) context.getSystemService(Context.JOB_SCHEDULER_SERVICE);\n\
    if (jobScheduler != null) {\njobScheduler.schedule(builder.build());\n}\n}\n```\n\
    \n*Then make a class called JobSchedulerManager.java:*\n\n```\n@RequiresApi(api\
    \ = Build.VERSION_CODES.LOLLIPOP)\npublic class JobSchedulerManager extends JobService\
    \ {\n@Override\npublic boolean onStartJob(JobParameters jobParameters) {\nint\
    \ tid = Process.myTid();\nLog.v(\"TaskScheduler\", \"Started Job Scheduler with\
    \ tid \"+ tid);\n//todo perform work here\n// returning false means the work has\
    \ been done, return true if the job is being run asynchronously\nreturn true;\n\
    }\n@Override\npublic boolean onStopJob(JobParameters params) {\nreturn false;\n\
    }\n}\n```\n\n*Add the following class to the AndroidManifest.xml file:*\n\n```\n\
    A `JobScheduler` service\nmust be protected with the preceding permission which\
    \ makes it so that\nonly applications with this permission can task the service.\
    \ If a job\nservice is declared in the manifest but not protected with this\n\
    permission, the service will be ignored by the system.\n\nWork Managers\nAs described\
    \ in the Android documentation,^([^(49)](#fn49)) `WorkManagers`\n  are\nbackward\
    \ compatible from API 14 onward. A combination of `BroadcastReceiver` and\n`AlarmManager`\
    \ is\nused on API 14-22, and `JobScheduler` is used\non API 23+. One of the main\
    \ disadvantages for using a `WorkManager` instead\nof an `AlarmManager` is that\n\
    there are restrictions on their runtime (which is inherited from using a\n`JobScheduler`\n\
    behind the scenes); this includes that a `WorkManager` should\nnot run for longer\
    \ than 10 minutes and cannot perform another piece of\nconsecutive work until\
    \ a minimum of 15 minutes has passed since the\ncurrent one started. The reason\
    \ for this is to comply with the Doze\nrestrictions.\n\n*Add the following dependencies\
    \ to the* *gradle.build*\n*file when using work managers:*\n\n```\ndef work_version\
    \ = \"2.3.3\"\n// (Java only)\nimplementation \"androidx.work:work-runtime:$work_version\"\
    \n// Kotlin + coroutines\nimplementation \"androidx.work:work-runtime-ktx:$work_version\"\
    \n```\n\n*The following code tasks and starts a work manager:*\n\n```\nPeriodicWorkRequest\
    \ work = new PeriodicWorkRequest.Builder(\ncom.example.taskscheduler.managers.WorkManager.class,\
    \ 15, TimeUnit.MINUTES)\n.build(); //update path to match your created WorkManager.java\
    \ class\nWorkManager.getInstance().cancelAllWork();\nWorkManager.getInstance().enqueue(work);\n\
    ```\n\n*Finally create a class called WorkManager.java:*\n\n```\npublic class\
    \ WorkManager extends Worker {\nContext context;\npublic WorkManager(@NonNull\
    \ Context context, @NonNull WorkerParameters workerParams) {\nsuper(context, workerParams);\n\
    this.context = context;\n}\n@Override\npublic Result doWork() {\nint tid = Process.myTid();\n\
    Log.v(\"TaskScheduler\", \"Worker started with tid \"+ tid);\n// Todo run your\
    \ work here.\nreturn Result.success();\n}\n}\n```\n\nThreading \nOutside of the\
    \ `main` application\nthread (which is created for each application by the system),\
    \ an\napplication can have multiple additional threads of execution. Threads\n\
    are fairly simple to set up, however, as with `AsyncTasks` are bound\nto the life\
    \ of their parent (commonly an `Activity`). This being\nthe case, if a thread’s\
    \ parent is destroyed (i.e., removed from the task\nstack by the user), then the\
    \ thread is subject to garbage collection\n(where unused resources are removed\
    \ to recover memory for other\ncomponents).\n\n*Starting the thread:*\n\n```\n\
    public void startThread(){\nThread thread = new ThreadManager();\nthread.start();\n\
    }\n```\n\n*Make a java class called ThreadManager.java:*\n\n```\npublic class\
    \ ThreadManager extends Thread{\npublic ThreadManager() {\nsuper();\n}\n@Override\n\
    public void run() {\nlong tid = getId();\n// Todo do work here.\nLog.v(\"TaskScheduler\"\
    , \"Starting a new thread \"+ tid);\nwhile (true){\nLog.v(\"TaskScheduler\", \"\
    In a thread: \" + tid);\ntry {\nThread.sleep(1000);\n} catch (InterruptedException\
    \ e) {\ne.printStackTrace();\n}\n}\n}\n}\n```\n\nAsyncTasks\n\nDeprecated  in\n\
    Android R – API level 30 (it is instead recommended to use the standard\n`java.util.concurrent`\n\
    or Kotlin concurrency utilities instead) `–` AsyncTasks allow\nfor short running\
    \ (intended for only a handful of seconds at a time)\ncode on a separate thread\
    \ while also having access to the UI thread.\nWhen constructing an `AsyncTask`\
    \ object,\nthree types need\nto be provided; these are:\n\n*   The type of the\
    \ parameters that are passed into the AsyncTask’s\n    execution\n\n*   The type\
    \ of the progress units used during background\n    computation\n\n*   The type\
    \ of the result of the background method\n\n`AsyncTasks`\nmust be loaded, created,\
    \ and executed on the main thread - as of API\nlevel 16, this is done automatically.\n\
    \n*Calling an AsyncTasks:*\n\n```\nAsyncTask task = new myAsyncTask(getApplicationContext()).execute(\"\
    example string\");\n```\n\n*Cancelling an AsyncTask:*\n\n```\ntask.cancel(true);\n\
    ```\n\n*Creating an AsyncTask class (make as a private or package-private\nsubclass\
    \ of your activity class):*\n\n```\nclass myAsyncTask extends AsyncTask {\nprivate\
    \ Context mContext;\npublic myAsyncTask(Context context) {\nthis.mContext = context;\n\
    }\n@Override\nprotected Void doInBackground(final String... strings) {\nfinal\
    \ Context context = this.mContext;\nrunOnUiThread(new Runnable() {\n@Override\n\
    public void run() {\nfor (String text:strings) {\nToast.makeText(context, text,\
    \ Toast.LENGTH_SHORT).show();\n}\n}\n});\nreturn null;\n}\n}\n```\n\nBattery and\
    \ Security Effects on Long-Running\nServices\n\nLong-running services can provide\
    \ a myriad of useful functionality to\nusers; however, due to battery and security\
    \ concerns, there are a myriad\nof ways that long-running services can be killed\
    \ prematurely. This does\nvary from service type to service type; however, it\
    \ will normally be\ncaused by power management restrictions.^([^(50)](#fn50))\
    \ These include the following\nruntime restrictions in place:\n\n*   Doze mode^([^(51)](#fn51))\n\
    \n*   App standby buckets^([^(52)](#fn52))\n\n*   App background restrictions\n\
    \n*   App battery optimization\n\nDoze\nIntroduced in Android 6 (API level 23),\
    \ Doze functions as a\nbattery saver utility by bucketing app runtimes into maintenance\
    \ windows\nwhen the device is idle (meaning that the device has not recently\n\
    received user interaction for a time). These windows, where applications\ncan\
    \ run background tasks start frequent, however, over time become more\nand more\
    \ disparate the longer the device is idle. This means that while\nan `AlarmManager`\n\
    may be tasked to run every 5 minutes, Doze restrictions would apply to\nstop it\
    \ from doing so as regularly.\n\nAlarm manager’s restrictions:\n\n*   `setExact()`\
    \ and `setWindow()` alarm\n    manager alarms are deferred to the next maintenance\
    \ window.\n\n*   `setAndAllowWhileIdle()`\n    and `setExactAndAllowWhileIdle()`\n\
    \    will start normally during a Doze maintenance window. `setAlarmClock()` will\n\
    \    also start during a maintenance window with the system exiting Doze\n   \
    \ shortly before the alarm fires.\n\nJob scheduler’s restrictions:\n\n*   JobSchedulers\
    \ or WorkManagers are suspended.\n\nMiscellaneous restrictions:\n\n*   Network\
    \ access, wake locks, Wi-Fi scans, and sync adapters are\n    ignored and suspended.\n\
    \n*You can test how an application runs in Doze mode (on API level 23+)\nwith\
    \ the following command:*\n\n```\nadb shell dumpsys deviceidle force-idle\n```\n\
    \n*Exiting the idle mode can be done by running the following\ncommand:*\n\n```\n\
    adb shell dumpsys deviceidle unforce\n```\n\nApp\nStandby Buckets\nAndroid 9 (API\
    \ level 28) adds another battery-saving feature. This\nfeature assigns all applications\
    \ into one of four buckets. Each\nmanufacturer can set their own criteria for\
    \ how an application can be\nplaced in each bucket (the Android documentation\
    \ highlights that\n“machine learning” techniques can be used to support this decision\n\
    process). In turn the exact rationale for why applications are assigned\nspecific\
    \ buckets is unknown.\n\nThese buckets are\n\n*   **Active** - The app is currently\
    \ being used or was very\n    recently used, including if the app has launched\
    \ an activity or is\n    running a foreground service or the user has clicked\
    \ on a notification\n    from the app:\n\n    *   **Jobs** - No restriction\n\n\
    \    *   **Alarms** - No restriction\n\n*   **Working set** - The app is in regular\
    \ use:\n\n    *   **Jobs** - Deferred up to 2 hours\n\n    *   **Alarms** - Deferred\
    \ up to 6 minutes\n\n*   **Frequent** - The app is often used, but not every day:\n\
    \n    *   **Jobs** - Deferred up to 8 hours\n\n    *   **Alarms** - Deferred up\
    \ to 30 minutes\n\n*   **Rare** - The app is not frequently used:\n\n    *   **Jobs**\
    \ - Deferred up to 24 hours\n\n    *   **Alarms** - Deferred up to 2 hours\n\n\
    \    *   **Networking** - Deferred up to 24 hours\n\n*   **Never** - Application\
    \ is installed but has never been\n    run:\n\n    *   Components are disabled\
    \ if an application has never run.\n\nModifying a Component’s State\n\nApplication\
    \ components are written in the `AndroidManifest.xml file. A`s mentioned previously,\
    \ there are four main types of\ncomponents , these\nbeing\n\n*   Activities\n\n\
    *   Services\n\n*   Broadcast receivers\n\n*   Content providers\n\nStatically\
    \ Modifying Component State\nA component can\nbe statically modified by editing\
    \ its entry’s `android:enabled=\"false\"`\ntag in the Android manifest. The following\
    \ activity `SecondaryActivity` has\nbeen disabled by default via its entry in\
    \ the Android manifest.\n\n*Setting a component’s enabled property:*\n\n```\n\n\
    Dynamically Modifying Components\n\nThere are three main states that components\n\
    can be set to programmatically, these being\n\n*   COMPONENT_ENABLED_STATE_DEFAULT\n\
    \n    *   Sets a component to its default state as defined in the\n        manifest.\n\
    \n*   COMPONENT_ENABLED_STATE_ENABLED\n\n    *   Explicitly enables the component.\n\
    \n*   COMPONENT_ENABLED_STATE_DISABLED\n\n    *   Explicitly disables the component.\
    \ A disabled component cannot be\n        used or started.\n\nThere are two other\
    \ component states; however, these cannot be set with\nthe `setComponentEnabledSetting`\n\
    method . These are\n\n*   COMPONENT_ENABLED_STATE_DISABLED_USER\n\n    *   Explicitly\
    \ disables the component and can be reenabled by the\n        user in the appropriate\
    \ system UI.\n\n*   COMPONENT_ENABLED_STATE_DISABLED_UNTIL_USED\n\n    *   This\
    \ state means that the component should be identified as\n        disabled (i.e.,\
    \ an activity not showing in the launcher) until the user\n        explicitly\
    \ attempts to use it where it should be set to\n        enabled.\n\n*Enabling\
    \ a component* *:*\n\n```\nPackageManager packageManager = getApplicationContext().getPackageManager();\n\
    ComponentName componentName = new ComponentName(getApplicationContext(), SecondaryActivity.class);\n\
    packageManager.setComponentEnabledSetting(componentName, PackageManager.COMPONENT_ENABLED_STATE_ENABLED,PackageManager.DONT_KILL_APP);\n\
    ```\n\n*Returning the state of a component:*\n\n```\nPackageManager packageManager\
    \ = getApplicationContext().getPackageManager();\nComponentName componentName\
    \ = new ComponentName(getApplicationContext(), SecondaryActivity.class);\nint\
    \ componentState = packageManager.getComponentEnabledSetting(componentName);\n\
    ```\n\n*Disabling a component* *:*\n\n```\nPackageManager packageManager = getApplicationContext().getPackageManager();\n\
    ComponentName componentName = new ComponentName(getApplicationContext(), SecondaryActivity.class);\n\
    packageManager.setComponentEnabledSetting(componentName, PackageManager.COMPONENT_ENABLED_STATE_DISABLED,PackageManager.DONT_KILL_APP);\n\
    ```\n\nCreating an Android Launcher\n\nImplemented in API level 1, the Android\
    \ Launcher is a component of\nAndroid which allows an Android application to function\
    \ as the base\nactivity on the home screen of an Android device (as seen in Figure\n\
    [9-2](#509502_1_En_9_Chapter.xhtml#Fig2)). These home\nscreens can be set by the\
    \ individual OEMs; however, other famous\nlaunchers include Facebook Home. A launcher\
    \ must be set in the settings\nmenu of the Android device as seen in Figure [9-1](#509502_1_En_9_Chapter.xhtml#Fig1).\n\
    \n![../images/509502_1_En_9_Chapter/509502_1_En_9_Fig2_HTML.jpg](images/509502_1_En_9_Chapter/509502_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\nExample launcher\n\n![../images/509502_1_En_9_Chapter/509502_1_En_9_Fig1_HTML.jpg](images/509502_1_En_9_Chapter/509502_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\nLauncher \nsettings\n\nCreating a Launcher Application\n\n*First\
    \ add the following attribute to the activities activity tag in\nthe AndroidManifest.xml\
    \ file:*\n\n```\nandroid:launchMode=\"singleTask\"\n```\n\n*Then add two categories\
    \ to the intent filter of the same activity\ntag:*\n\nAt this stage the application\
    \ will function as a launcher and will be\nselectable as a home screen from the\
    \ Android device’s settings. The\nfollowing details several additional techniques\
    \ that can be useful when\ncreating a launcher.\n\nAdditional Functionality\n\n\
    *Retrieving a list of applications:*\n\n```\nprivate List getListOfApplications(Context\
    \ context){\nIntent mainIntent = new Intent(Intent.ACTION_MAIN, null);\nmainIntent.addCategory(Intent.CATEGORY_LAUNCHER);\n\
    List pkgAppsList = context.getPackageManager().queryIntentActivities( mainIntent,\
    \ 0);\nreturn pkgAppsList;\n}\n```\n\n*Retrieving an application’s icon:*\n\n\
    ```\npublic static Drawable getActivityIcon(Context context, String packageName,\
    \ String activityName) {\nPackageManager pm = context.getPackageManager();\nIntent\
    \ intent = new Intent();\nintent.setComponent(new ComponentName(packageName, activityName));\n\
    ResolveInfo resolveInfo = pm.resolveActivity(intent, 0);\nreturn resolveInfo.loadIcon(pm);\n\
    }\n```\n\n*Setting an image view. Add an ImageView object to your activity with\n\
    the name imageView:*\n\n```\n\n*Create an on-click listener for the ImageView*\
    \ *:*\n\n```\nImageView chromeIcon = (ImageView) findViewById(R.id.imageView);\n\
    chromeIcon.setImageDrawable(getActivityIcon(getApplicationContext(),\"com.android.chrome\"\
    , \"com.google.android.apps.chrome.Main\"));\nImageView img = findViewById(R.id.imageView);\n\
    img.setOnClickListener(new View.OnClickListener() {\n@Override\npublic void onClick(View\
    \ view) {\nIntent launchIntent = getPackageManager().getLaunchIntentForPackage(\"\
    com.android.chrome\");\nstartActivity(launchIntent);\n}\n});\n```\n\n*Setting\
    \ the wallpaper. Add the following to the styles.xml in the\nstyle tag under the\
    \ name AppTheme:*\n\n```\ntrue\n@android:color/transparent\n```\n\n*Hiding the\
    \ system UI* *:*\n\n```\nprivate void hideSystemUI() {\nView decorView = getWindow().getDecorView();\n\
    decorView.setSystemUiVisibility(\nView.SYSTEM_UI_FLAG_IMMERSIVE\n| View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n\
    | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n| View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN\n\
    | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION\n| View.SYSTEM_UI_FLAG_FULLSCREEN);\n```\n\
    \nFootnotes\n\n10. Reflection and Class Loading\n\nReflection\n\nReflection is\
    \ one of the many aces up the sleeve when it comes to taking\napart Android applications\
    \ and getting them running in a state that\nsuits you. To put it simply reflection\
    \ is an API that can be used to\naccess, examine, and modify objects at runtime\
    \ - this includes fields,\nmethods, classes, and interfaces (as can be seen in\
    \ Figure [10-1](#509502_1_En_10_Chapter.xhtml#Fig1)).\n\n![../images/509502_1_En_10_Chapter/509502_1_En_10_Fig1_HTML.png](images/509502_1_En_10_Chapter/509502_1_En_10_Fig1_HTML.png)\n\
    \nFigure 10-1\nJava reflection\ndiagram\n\nA summary of these components is listed\n\
    here:\n\n*   **Class** - A class is a\n    blueprint/template where when used\
    \ individual objects can be created\n    from them. For example, a `Computer`\
    \ class can be\n    created with an `installedRam`\n    variable, `getRAM()` method,\
    \ and\n    `setRAM()`\n    method. An object can be made using this class with,\
    \ for example, `Computer myComputer = new Computer();` then the method `setRAM()`\
    \ can be used\n    on the `myComputer` object\n    such as `myComputer.setRAM(32);.`\n\
    \n*   **Method** - A method is a segment of\n    code, with a specific purpose,\
    \ which is run when called and can be part\n    of a class or standalone. Methods\
    \ can be passed a series of typed\n    parameters and may return a variable of\
    \ a specified type. When made as\n    part of a class, a method can be static\
    \ or instance. An instance method\n    requires an object of its class to be created\
    \ before it can be used,\n    while a static method does not rely on an initialized\
    \ object. For\n    example, the class Computer may have a `sum` static method\n\
    \    that adds two numbers and returns the result, and a `setRAM()` instance\n\
    \    method which sets the ram variable for the specific instance of the\n   \
    \ created object.\n\n*   **Constructor** - A constructor is a special\n    type\
    \ of method that is used as part of the initialization of an object\n    (e.g.,\
    \ a class) to set variables and call methods. For example, the\n    House class\
    \ may have a constructor method which takes three variables as\n    parameters:\
    \ `hight`, `numberOfRooms`, and\n    `hasGarden`. Then\n    a House object can\
    \ be created with `House myHouse = new House(10, 2, false);.`\n\n*   **Interface**\
    \ - An interface  is an abstract class\n    that contains a collection of methods\
    \ with empty bodies. For example,\n    having a Creature interface may have methods\
    \ such as `move()`, `speak()`, and `eat()` of which all\n    would need to be\
    \ populated depending on the class (type of creature)\n    that implemented the\
    \ interface.\n\nIn the following examples, two classes will be used to help display\n\
    an array of different reflection techniques. If not using these example\nclasses,\
    \ replace the applicable references in the code samples:\n\n*A* *helper\nclass*\
    \  *to demonstrate reflection:*\n\n```\npublic class Loadable {\nprivate final\
    \ static String description = \"This is a class that contains an assortment of\
    \ access modifiers to test different types of reflection.\";\nprivate Context\
    \ context;\nprivate long uniqueId = 0;\nprivate long time = 0;\nprivate DeviceData\
    \ deviceData = new DeviceData();\npublic void setDeviceInfo() {\ndeviceData.setDeviceInfo();\n\
    }\npublic long getTime() {\nreturn time;\n}\nprivate Loadable(Context context,\
    \ long uniqueId) {\nthis.context = context;\nthis.uniqueId = uniqueId;\n}\nprivate\
    \ void setTime(){\nthis.time = System.currentTimeMillis();\n}\nprivate static\
    \ String getDeviceName(){\nreturn android.os.Build.MODEL;\n}\nprotected static\
    \ Loadable construct(Context context){\nfinal int uniqueId = new Random().nextInt((1000)\
    \ + 1);\nLoadable loadable = new Loadable(context, uniqueId);\nloadable.setDeviceInfo();\n\
    return loadable;\n}\n}\n```\n\n*Helper class*\n *to support presenting an array\
    \ of functionality when\nloading:*\n\n```\npublic class DeviceData {\nString version\
    \ = \"\"; // OS version\nString sdkLevel = \"\"; // API Level\nString device =\
    \ \"\";  // Device\nString model = \"\";   // Model\nString product = \"\"; //\
    \ Product\npublic void setDeviceInfo(){\nversion = System.getProperty(\"os.version\"\
    );\nsdkLevel = android.os.Build.VERSION.SDK;\ndevice = android.os.Build.DEVICE;\n\
    model = android.os.Build.MODEL;\nproduct = android.os.Build.PRODUCT;\n}\n@Override\n\
    public String toString() {\nreturn \"DeviceData{\" +\n\"version='\" + version\
    \ + '\\'' +\n\", sdkLevel='\" + sdkLevel + '\\'' +\n\", device='\" + device +\
    \ '\\'' +\n\", model='\" + model + '\\'' +\n\", product='\" + product + '\\''\
    \ +\n'}';\n}\n}\n```\n\nMaking an Instance of a Class\nIn the following example,\
    \ using reflection, a new instance of the\n`DeviceData`\nclass is created, and\
    \ a call to the `setDeviceInfo` method\n(to populate its fields) is run before\
    \ logging the initialized state of\none of those fields.\n\n*Initializing a class*\
    \ *:*\n\n```\ntry {\nObject initialisedDeviceData= DeviceData.class.newInstance();\n\
    initialisedDeviceData.getClass().getDeclaredMethod(\"setDeviceInfo\").invoke(initialisedDeviceData);\n\
    String model = (String) initialisedDeviceData.getClass().getDeclaredField(\"model\"\
    ).get(initialisedDeviceData);\nLog.v(TAG, model);\n} catch (IllegalAccessException\
    \ e) {\ne.printStackTrace();\n} catch (InstantiationException e) {\ne.printStackTrace();\n\
    } catch (NoSuchMethodException e) {\ne.printStackTrace();\n} catch (InvocationTargetException\
    \ e) {\ne.printStackTrace();\n} catch (NoSuchFieldException e) {\ne.printStackTrace();\n\
    }\n```\n\n.getDeclaredMethod Compared With .getMethod\nIn the following example,\
    \ we see the differences between the methods\n`getMethods` and\n`getDeclaredMethods`\
    \  - this is also the\nsame for `getFields` and `getDeclaredFields`.\n`getMethods`\
    \ will\nreturn an array containing `public` methods of the\nclass or interface\
    \ as well as any inherited from superclasses or\nsuperinterfaces (a superclass/superinterface\
    \ is an object from which\nmultiple subobjects can be created). `getDeclaredMethods`\n\
    \ on the other hand returns all of the declared methods (not just\n`public`) of\
    \ the\nclass or interface.\nThe main difference here is that if needing to access\
    \ a private\nmethod, the `getDeclaredMethods`\nmethod will be used, and then the\
    \ accessibility will be set with the\n`.setAccessible`\nmethod, whereas if needing\
    \ to access methods of the `superclasses` or `superinterfaces,`\n`getMethods`\
    \ \nwill be used instead.\n\n*getMethods() example:*\n\n```\nfor (Method method\
    \ : Loadable.class.getMethods()){\nLog.v(TAG, method.getName());\n}\n```\n\n*getDeclaredMethods()\
    \ example:*\n\n```\nfor (Method method : Loadable.class.getDeclaredMethods()){\n\
    method.setAccessible(true);\nLog.v(TAG, method.getName());\n}\n```\n\nStatic Methods\n\
    In the case of static\nmethods ,\nan instance of a class is not needed to use\
    \ reflection.\n\n*Static method example:*\n\n```\ntry {\nMethod getDeviceName\
    \ = Loadable.class.getDeclaredMethod(\"getDeviceName\");\ngetDeviceName.setAccessible(true);\n\
    Log.v(TAG,(String) getDeviceName.invoke(Loadable.class));\n} catch (NoSuchMethodException\
    \ e) {\ne.printStackTrace();\n} catch (IllegalAccessException e) {\ne.printStackTrace();\n\
    } catch (InvocationTargetException e) {\ne.printStackTrace();\n}\n```\n\nPrivate\n\
    Constructors\n\nIn the case where a class’ constructor is private, reflection\
    \ can\nstill be used to construct the class and access its fields and\nmethods.\n\
    An additional quirk when talking about constructors is that when a\nmember variable\
    \ is defined in a class – such as `String myMemberVariable = android.os.Build.VERSION.SDK;` –\
    \ this is moved to the constructor\nof the class by the compiler.^([^(53)](#fn53))\n\
    \n*The following is an example of constructing a class with a private\nconstructor:*\n\
    \n```\ntry {\nConstructor constructor = Loadable.class.getDeclaredConstructor(Context.class,\
    \ long.class);\nconstructor.setAccessible(true);\nObject instance = constructor.newInstance(getApplicationContext(),\
    \ (Object) 12); // constructor takes a context and an id.\nField uniqueIdField\
    \ = instance.getClass().getDeclaredField(\"uniqueId\");\nuniqueIdField.setAccessible(true);\n\
    long uniqueId = (long) uniqueIdField.get(instance);\nLog.v(TAG, \"\"+uniqueId);\n\
    } catch (InstantiationException e) {\ne.printStackTrace();\n} catch (InvocationTargetException\
    \ e) {\ne.printStackTrace();\n} catch (NoSuchMethodException e) {\ne.printStackTrace();\n\
    } catch (IllegalAccessException e) {\ne.printStackTrace();\n} catch (NoSuchFieldException\
    \ e) {\ne.printStackTrace();\n}\n```\n\nInitialized Classes as Fields of Other\
    \ Classes\nThe following example uses reflection twice: first to initialize a\n\
    class and gain access to one of its fields and secondly to use\nreflection on\
    \ that field (which is a class of its own) to access one of\nits fields (which\
    \ is a string).\n\n*Instance class*\n *example:*\n\n```\ntry {\n// The loadable\
    \ class has a static method that can be used to construct it in this example,\
    \ however, if the constructor isn't public,\n// this can also be done with the\
    \ private constructor example.\n// and can be done as in the public class example.\n\
    Object instance = Loadable.class.getDeclaredMethod(\"construct\", Context.class)\n\
    .invoke(Loadable.class, getApplicationContext());\n// Retrieve the field device\
    \ data which is the class we're looking to get the data of.\nField devicdDataField\
    \ = instance.getClass().getDeclaredField(\"deviceData\");\ndevicdDataField.setAccessible(true);\n\
    Object initialisedDeviceData = devicdDataField.get(instance);\n// After accessing\
    \ the value from the field we're looking to access the filds of we can use the\
    \ same type of reflection again after getting it's class.\nField modelField =\
    \ initialisedDeviceData.getClass().getDeclaredField(\"device\");\nmodelField.setAccessible(true);\n\
    String model = (String) modelField.get(initialisedDeviceData);\nLog.v(TAG,model);\n\
    } catch (IllegalAccessException e) {\ne.printStackTrace();\n} catch (InvocationTargetException\
    \ e) {\ne.printStackTrace();\n} catch (NoSuchMethodException e) {\ne.printStackTrace();\n\
    } catch (NoSuchFieldException e) {\ne.printStackTrace();\n}\n```\n\nClass Loading\n\
    Java Class\nLoaders^([^(54)](#fn54)) are a component of the Java Runtime Environment\n\
    (JRE) which load Java classes into a Java Virtual Machine\n(JVM)/Dalvik Virtual\
    \ Machine (DVM)/Android Runtime (ART). Not all\nclasses are loaded simultaneously,\
    \ nor with the same ClassLoader. The\ncontext method `getClassLoader()`\n can\
    \ be used to get the current class loader. There are several\ntypes of class\n\
    loading in Android, these being:\n\n*   **PathClassLoader**\n     - This is used\
    \ by the Android system for its system and\n    application class loader(s).\n\
    \n*   **DexClassLoader** - This loads file types\n    containing a `.dex` file\
    \ (e.g.,\n    `.jar` and `.apk` or `.dex` file directly).\n    These `.dex`\n\
    \    files (Dalvik executable) contain Dalvik bytecode.\n\n*   **URLClassLoader**\n\
    \     - This is used to retrieve classes or resources via URL paths.\n    Paths\
    \ ending with `/` are assumed to be\n    directories, while otherwise they are\
    \ assumed to be `.jar` files.\n\nThe following performs class loading using a\
    \ Dalvik executable and\n`DexClassLoader`\n*.*\n\n*Retrieve the current class\
    \ loader:*\n\n```\nClassLoader loader = getApplicationContext().getClassLoader();\n\
    ```\n\n*As of API level 26 (Android O), it is possible to read a dex file\ndirectly\
    \ from memory. To do this, read a ByteBuffer of a file, and use\nthe class InMemoryDexClassLoader.\
    \ The following is a helper function for\nreading a file to a byte array:*\n\n\
    ```\nprivate static byte[] readFileToByteArray(File file){\nFileInputStream fis\
    \ = null;\nbyte[] bArray = new byte[(int) file.length()];\ntry{\nfis = new FileInputStream(file);\n\
    fis.read(bArray);\nfis.close();\n}catch(IOException ioExp){\nioExp.printStackTrace();\n\
    }\nreturn bArray;\n}\n```\n\n*In memory* *dex class loading*\n\n*:*\n\n```\ndexLoader\
    \ = new InMemoryDexClassLoader(ByteBuffer.wrap(readFileToByteArray(filePath)),\
    \ loader);\n```\n\nThe other option is to load the dex file directly from the\
    \ file. The\nDexClassLoader class takes the dexPath (file path) of the .dex file,\
    \ the\noptimizedDirectory - where .odex (optimized dex files) are stored prior\n\
    to Android API level 26, the librarySearchPath - a string list\n(delimited by\
    \ File.pathSeparator;) stating directories containing native\nlibraries, and parent\
    \ - the parent ClassLoader.\n\n```\ndexLoader = new DexClassLoader(filePath, dexCacheDirectory.getAbsolutePath(),\
    \ null, loader);\n```\n\n*After creating a dex class loader, choose the class\
    \ to load, as a\nstring:*\n\n```\nloadedClass = dexLoader.loadClass(\"me.jamesstevenson.dexloadable.MainActivity\"\
    ); //alter path for your use case\n```\n\n*At this stage the uninitialized class\
    \ can be used as normal, as\ndescribed in the reflection section. The following\
    \ shows how to safely\ninitialize this class:*\n\n```\ninitialisedClass = loadedClass\
    \ != null ? loadedClass.newInstance() : null;\n```\n\n*After initializing this\
    \ class* *, a specific\nmethod can be called, as a string, and its response can\
    \ be returned as\ndone previously with standard reflection:*\n\n```\nmethod =\
    \ loadedClass != null ? loadedClass.getMethod(\"loadMeAndIllTakeContext\", Context.class)\
    \ : null;\nObject methodResponse = method != null ? method.invoke(initialisedClass,\
    \ getApplicationContext()) : null;\n```\n\nFootnotes\n\n11. The Android Shell\n\
    \nAndroid  is\nbuilt upon Linux meaning that when using adb (Android’s proprietary\n\
    command-line tool that allows for communication with a device), you can\nissue\
    \ common Linux commands (such as *ls*, *cd*,\n*whoami*, etc.) as well as several\
    \ commands unique to the Android\noperating system.\n\n*The following are several\
    \ examples of basic device input via the\nshell:*\n\n```\ninput text \"Hello World\"\
    \ninput swipe 50 050 450 100 #coordinates for swipe action\ninput tap 466 17 #coordinates\
    \ for tap\nservice call phone 1 s16 098765432\nservice call statusbar 1\nservice\
    \ call statusbar 2\n```\n\n*Requiring root the following displays the boot image\
    \ above all other\nactivities. This does not stop activities from running in the\
    \ foreground\nbehind the animation.*\n\n```\n/system/bin/bootanimation\n```\n\n\
    *Control system properties via the svc command (requires root):*\n\n```\nsvc -l\n\
    svc bluetooth enable/ disable\nsvc wifi enable/ disable\nsvc nfc enable/ disable\n\
    svc data enable/ disable\nsvc power reboot\nsvc power shutdown\nsvc power stayon\
    \ true #[true|false|usb|ac|wireless]\nsvc usb getFunctions [function] #Possible\
    \ values of [function] are any of 'mtp', 'ptp', 'rndis', 'midi'\n```\n\n*The*\
    \ *screencap command*\n *takes a photo of the screen and saves it to a location\
    \ on\ndevice. Similarly, the screenrecord command records the screen for a\nmaximum\
    \ of 3 minutes and saves it to disk:*\n\n```\nscreencap -p /sdcard/screen.png\n\
    screenrecord /sdcard/MyVideo.mp4\n```\n\n*List all running processes:*\n\n```\n\
    top\ntop | grep chrome\n```\n\n*Install an application on the device, which requires\
    \ root. The -g\npermission accepts all runtime permission without user interaction\
    \ (this\noption didn’t exist prior to Android 6.0 as neither did runtime\npermissions).*\n\
    \n```\npm install -g /data/local/tmp/one.apk\n```\n\n*Return a list of the input\
    \ devices available on the device. This can\ninclude audio buttons, power button,\
    \ touch screen, fingerprint reader,\nand a mouse.*\n\n```\nuinput-fpc - Finger\
    \ print sensor\nfts - screen\ngpio-keys - volume button\nqpnp_pon - volume / power\
    \ buttons\nls /dev/input/ -l\nlsof | grep input/event"
  trans: "\n# 权限\n\nAndroid 中的权限遵循最小权限模型，即特定类型的功能仅授予明确请求这些功能的应用程序。权限主要分为两种类型：清单权限和运行时权限（后者通常属于“危险”权限类别）。运行时权限和清单权限都必须在\
    \ Android 清单中声明；但此外，运行时权限还必须在运行时请求，通过对话框（如图 3-1 所示）提示用户是否同意应用程序使用所述功能。运行时权限是在\
    \ API 级别 23 中实现的；然而，在此之前，用户会在安装前看到所有运行时权限。\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg](img/509502_1_En_3_Fig1_HTML.jpg)\n\
    \n**图 3-1** 用户看到的运行时权限示例\n\n如前所述，权限根据其对用户、Android 系统或设备上其他应用程序构成的潜在风险被赋予权限类型。所有权限类型的摘要见表\
    \ 3-1。^(⁵)\n\n**表 3-1** 权限类型\n\n| 权限类型 | 风险 | 描述 |\n| --- | --- | --- |\n| 普通\
    \ | 低 | 默认权限类型。为应用程序提供独立的应用程序级功能，例如 `BLUETOOTH`、`NFC` 和 `INTERNET`。 |\n| 危险 |\
    \ 高 | 为应用程序提供对私有数据或设备控制方面的访问权限，例如 `WRITE_EXTERNAL_STORAGE`、`ACCESS_FINE_LOCATION`\
    \ 和 `CAMERA`。与普通权限类型不同，运行时权限请求必须由用户（在运行时通过点击按钮）接受，系统才会授予权限（或者在 API 级别 23 之前的设备上在安装时接受）。\
    \ |\n| 签名 | 关键 | 仅当请求权限的应用程序与声明该权限的应用程序使用相同的证书签名时，才会授予此权限。这通常用于将权限类型限制为系统/预安装的应用程序。这些权限通常授予对系统和其他应用程序的大规模控制权，或绕过\
    \ Android 安全机制。其中包括 `MANAGE_EXTERNAL_STORAGE`、`READ_LOGS` 和 `CAPTURE_AUDIO_OUTPUT`。\
    \ |\n\n除了这些类型之外，还可以向权限应用其他标志，包括 `privileged` 和 `development`，它们分别指授予系统和开发应用程序的权限。^(⁶)\n\
    \n最后，在识别哪些应用程序可以执行哪些操作时，还需要考虑另外两种权限类型：\n\n* **硬限制权限** - 设备上的任何应用程序都不能持有此权限，除非安装程序应用已将该权限列入允许列表。\n\
    * **软限制权限** - 设备上的任何应用程序都不能以其完整形式持有此权限，除非安装程序应用已将该权限列入允许列表。\n\n在调试设备时，可以使用 `adb`\
    \ 授予通常对标准应用程序不可用的权限（例如具有签名权限类型的权限）。例如，对于 `READ_LOGS` 权限，可以使用以下命令来授予该权限：`adb shell\
    \ pm grant <Package ID> android.permission.READ_LOGS`。要检索应用程序的包 ID，请参阅第 5 章或第\
    \ 12 章。\n\n清单权限示例：\n\n```\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\"\
    \ />\n```\n\n运行时权限请求示例：\n\n```\nif (Build.VERSION.SDK_INT >= 23) {\n    // 除非设置了正确的清单权限，否则不会显示通知\n\
    \    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE},\
    \ 1234);\n}\n```\n\n在撰写本文时，Android 规范^(⁷) 列出了 166 种不同的清单权限。表 3-2 显示了这些权限中最常见的一个子集，以及它们的\
    \ API 和权限级别。\n\n**表 3-2** Android 权限\n\n| 名称 | 权限 | API 级别 | 描述 |\n| --- | ---\
    \ | --- | --- |\n| `ACCESS_COARSE_LOCATION` | 危险 | 29+ | 通过非 GPS 提供程序（如网络提供商）访问大致位置。\
    \ |\n| `ACCESS_FINE_LOCATION` | 危险 | 1+ | 通过 GPS 和网络提供商访问特定位置。 |\n| `ACCESS_NETWORK_STATE`\
    \ | 普通 | 1+ | 访问 `ConnectivityManager`，除其他职责外，负责监控网络连接（Wi-Fi-GPRS、UMTS 等）。 |\n\
    | `ACCESS_WIFI_STATE` | 普通 | 1+ | 访问 `WifiManager`，负责查看已配置的网络列表、当前活动网络以及接入点扫描结果。\
    \ |\n| `ANSWER_PHONE_CALLS` | 危险 | 26+ | 允许应用程序接听来电。 |\n| `BATTERY_STATS` | 签名\\\
    |特权\\|开发 | 1+ | 允许收集电池信息和统计数据。 |\n| `BLUETOOTH` | 普通 | 1+ | 允许与蓝牙设备配对和连接。 |\n\
    | `CALL_PHONE` | 危险 | 1+ | 允许应用程序在不向拨号器应用发送 Intent（因此无需通过 UI 通知用户）的情况下拨打电话。 |\n\
    | `CALL_PRIVILEGED` | 不允许第三方应用使用 | 1+ | `CALL_PHONE` 权限的限制较少版本，允许应用程序拨打任何电话号码，包括紧急号码。\
    \ |\n| `CAMERA` | 危险 | 1+ | 提供对设备相机的访问权限。 |\n| `CAPTURE_AUDIO_OUTPUT` | 禁止第三方应用使用\
    \ | 19+ | 允许不受限制地访问设备麦克风以录制音频。 |\n| `CHANGE_WIFI_STATE` | 普通 | 1+ | 允许应用程序修改设备的网络配置，并连接和断开\
    \ Wi-Fi 接入点。 |\n| `DELETE_PACKAGES` | 禁止第三方应用使用 | 1+ | 允许删除应用程序。从 Android 7 开始，如果请求删除的应用程序与安装它的应用程序不同，则需要用户确认。\
    \ |\n| `INSTALL_PACKAGES` | 禁止第三方应用使用 | 1+ | 允许应用程序安装另一个应用程序。 |\n| `INTERNET`\
    \ | 普通 | 1+ | 允许应用程序打开网络套接字。 |\n| `MANAGE_EXTERNAL_STORAGE` | 签名\\|appop\\|预安装\
    \ | 30+ | 由于 Android 10 中实现了作用域存储（应用程序拥有沙盒化的外部存储），此权限允许广泛管理外部存储空间。 |\n| `NFC`\
    \ | 普通 | 9+ | 允许通过 NFC（近场通信）进行 I/O 操作。 |\n| `PROCESS_OUTGOING_CALLS` | 危险且硬限制\
    \ | 1–29 | 允许应用程序查看和重定向所有去电。 |\n| `READ_CONTACTS` | 危险 | 1+ | 允许读取用户的联系人信息。 |\n\
    | `READ_EXTERNAL_STORAGE` | 危险，软限制 | 16+ | 允许应用程序从外部存储读取数据。在 API 19 之后，读取应用程序的作用域存储不需要此权限。截至\
    \ API 级别 29 强制实施作用域存储，此权限仅提供只读访问权限。 |\n| `READ_LOGS` | 禁止第三方应用使用 | 1+ | 允许读取系统日志信息，例如由\
    \ `DropBoxManager` 创建的日志。 |\n| `READ_PHONE_NUMBERS` | 危险 | 26+ | 允许应用程序读取设备的所有电话号码。默认情况下，此权限对即时应用程序开放。\
    \ |\n| `READ_PHONE_STATE` | 危险 | 1+ | 包括 `READ_PHONE_NUMBERS` 权限。允许访问设备/电话信息，例如当前蜂窝网络。\
    \ |\n| `READ_SMS` | 危险且硬限制 | 1+ | 允许读取设备已收到的 SMS 消息。 |\n| `REBOOT` | 禁止第三方应用使用\
    \ | 1+ | 允许重启设备。 |\n| `RECEIVE_BOOT_COMPLETED` | 普通 | 1+ | 允许应用程序接收 `Intent.ACTION_BOOT_COMPLETED`\
    \ Intent。该 Intent 在系统启动完成后广播。 |\n| `RECEIVE_MMS` | 危险且硬限制 | 1+ | 允许应用程序监控传入的 MMS\
    \ 消息。 |\n| `RECEIVE_SMS` | 危险且硬限制 | 1+ | 允许应用程序监控传入的 SMS 消息。 |\n| `RECORD_AUDIO`\
    \ | 危险 | 1+ | 允许应用程序录制音频。 |\n| `REQUEST_DELETE_PACKAGES` | 普通 | 26+ | 允许应用程序请求删除自身或另一个应用程序。这将需要用户交互。\
    \ |\n| `REQUEST_INSTALL_PACKAGES` | 签名 | 23+ | 允许应用程序请求安装另一个应用程序。这将需要用户交互。 |\n\
    | `SEND_SMS` | 危险且硬限制权限 | 1+ | 允许发送 SMS 消息。 |\n| `SET_PREFERRED_APPLICATIONS`\
    \ | 普通 | 1–15 | 允许应用程序修改用户首选的（默认）应用程序——包括 Web 浏览器和安装程序。 |\n| `SET_TIME` | 禁止第三方应用使用\
    \ | 8+ | 允许设置系统时间。 |\n| `USE_BIOMETRIC` | 普通 | 28+ | 允许使用设备支持的硬件。 |\n| `USE_FINGERPRINT`\
    \ | 普通 | 23–28 | 允许使用设备指纹硬件。在 Android API 级别 28 中被 `USE_BIOMETRIC` 权限取代。 |\n|\
    \ `WAKE_LOCK` | 普通 | 1+ | 允许应用程序启动 `PowerManager` 唤醒锁，这可以阻止设备休眠或屏幕变暗。 |\n| `WRITE_EXTERNAL_STORAGE`\
    \ | 危险 | 4+ | 允许写入设备外部存储。同时授予 `READ_EXTERNAL_STORAGE` 权限。在 API 19 之后，在应用程序的作用域存储中进行读/写操作不需要此权限。截至\
    \ API 级别 29 强制实施作用域存储，此权限仅允许应用程序读取其自己的存储数据。 |\n\n# 上下文\n\nAndroid 中的另一个核心组件是 `Context`。`Context`^(⁸)\
    \ 在 Android 中常被称为“上帝”类，是一个用于检索应用程序环境全局信息的接口。它允许访问特定于应用程序的资源以及应用程序级别的操作，例如广播、接收\
    \ Intent 和启动 Activity。一些用例包括：\n\n*   访问应用程序内部存储的位置\n*   发送 Toast 或通知对话框\n*   在\
    \ Activity 中设置 `ImageView`\n*   检索系统包管理器\n\n`Context` 有两种主要类型：应用程序上下文（application\
    \ context）和 Activity 上下文（activity context）。这两种类型的 `Context` 都绑定到各自领域的生命周期——应用程序上下文与应用程序的生命周期绑定，而\
    \ Activity 上下文则与其 Activity 的生命周期绑定。这意味着如果其中任何一个被销毁，那么它们各自的上下文将被垃圾回收。\n\n除了 `Context`\
    \ 的这两个子类之外，还有 `ContextWrapper`，它可以与 `Context` 方法 `getBaseContext()` 一起使用。`ContextWrapper`\
    \ 允许使用代理 `Context`，这样可以在不更改原始 `Context` 的情况下修改对象的行为。\n\n## 应用程序上下文\n\n以下方法返回应用程序上下文。当应用程序被销毁时，它将被垃圾回收。\n\
    \n*检索应用程序上下文：*\n\n```\ngetApplicationContext()\n```\n\n## Activity 上下文\n\n当在 `Activity`\
    \ 或 `Activity` 的子类中时，使用 `this` 返回 Activity 上下文。当 Activity 被销毁时，Activity 上下文将被垃圾回收。\n\
    \n*从 Activity 内部检索 Activity 上下文：*\n\n```\nthis\n```\n\n# Activity 生命周期\n\n作为使用设备的一部分，应用程序的各个\
    \ Activity 可以进入许多不同的状态。Activity 类提供了有用的回调函数，当进入这些状态时会触发这些回调，以便应用程序能够做出适当的响应。完整的\
    \ Activity 生命周期如图 3-2 所示。\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig2_HTML.png](img/509502_1_En_3_Fig2_HTML.png)\n\
    \n**图 3-2** Android 应用程序 Activity 生命周期\n\n### `onCreate()`\n\n当 Activity 首次创建时调用此回调。此方法接受一个参数\
    \ `savedInstanceState`，它是一个 Bundle，包含 Activity 先前保存的状态，如果之前不存在则为 `null`。\n\n###\
    \ `onStart()`\n\n此回调准备 Activity 进入前台并使其对用户可见。每次 Activity 启动时都会调用此回调，除非是从暂停状态恢复。\n\
    \n### `onResume()`\n\n当进入此状态时，Activity 已准备好与用户交互并进入前台。可能会发生中断事件，例如电话呼叫或用户切换到另一个\
    \ Activity——如果发生这种情况，Activity 将进入 `onPause()` 回调。\n\n### `onPause()`\n\n此回调指示\
    \ Activity 不再处于前台；然而，它不一定意味着它即将被销毁。\n\n### `onStop()`\n\n当 Activity 对用户不再可见时，在\
    \ Activity 被销毁之前调用此回调。这是应用程序应释放资源的地方。`onStop()` 回调是 Activity 将接收的最后一个回调。\n\n###\
    \ `onRestart()`\n\n当 Activity 正在重新显示给用户时，在 `onStop()` 回调之后调用此回调。随后会调用 `onStart()`\
    \ 和 `onResume()`。\n\n# Android 用户\n\n在 Android 中，有两个不同的概念都可以被标识为“用户”。\n\n## Linux\
    \ 用户\n\nAndroid 是一个多用户 Linux 系统，其中每个应用程序都被沙盒化，这意味着每个应用程序由一个不同的用户代表。Android 系统为每个唯一的应用程序证书（签署\
    \ `apk` 文件的证书）分配一个唯一的 Linux 用户 ID，进而设置所有应用程序文件的权限，以便只有指定的 Linux 用户 ID 才能访问它们。^(⁹)\
    \ 这意味着如果两个应用程序由同一个证书签署，则它们被放置在同一个沙盒中。当涉及到 `Signature` 权限类型（前面讨论过）时，这也是必需的，如果权限具有此类型，则只能由与创建该权限的应用程序具有相同证书的应用程序使用（通常用于禁止非系统应用程序访问系统权限）。\n\
    \n要查看应用程序的 Linux 用户 ID，您可以使用 `adb` 以 root 身份遍历到应用程序的文件系统（例如 `/data/data/com.android.chrome`），并使用\
    \ `ls -la` 命令，如图 3-3 所示。\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig3_HTML.jpg](img/509502_1_En_3_Fig3_HTML.jpg)\n\
    \n**图 3-3** 在 adb shell 中看到的 Linux 用户 ID 示例\n\n*以编程方式查看应用程序进程 ID：*\n\n```\nLog.v(\"\
    应用程序进程 ID\", String.valueOf(android.os.Process.myUid()));\n```\n\n*Shell 命令 `id\
    \ -u` 也可以通过 `adb` 或通过运行时环境使用，如下所示：*\n\n```\nid -u\n```\n\n## Android 用户\n\nAndroid\
    \ 中用户的第二个概念是为设备的多个最终用户^(¹⁰) 设计的，旨在允许多个用户使用同一台 Android 设备。这是通过每个帐户拥有独特的应用程序数据和某些独特的设置来实现的。这反过来支持多个用户在一个用户活跃时在后台运行。\n\
    \n当前设备上活动的用户可以在 `/data/user` 目录下找到（如图 3-4 所示），或者通过 UI 用户屏幕（如图 3-5 所示）。由于不同的用户将拥有自己的内部存储和范围存储，因此使用相应的方法调用（例如，使用\
    \ `Context` 方法 `getFilesDir()`）来检索正确的文件路径非常重要，因为这些路径可能会随时间变化。一个用户无法访问另一个用户的内部存储，即使对于相同的应用程序也是如此。\n\
    \n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig5_HTML.jpg](img/509502_1_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** 最终用户在设备上看到的不同用户视图\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig4_HTML.jpg](img/509502_1_En_3_Fig4_HTML.jpg)\n\
    \n**图 3-4** 在 adb shell 中看到的 Android 用户 ID 示例\n\n# 脚注\n\n---\n\n# Intent\n\nIntent\
    \ 是 Android 中核心的进程间通信（IPC）机制之一，允许应用程序与其他 Android 组件（包括应用程序）进行通信（例如，发送数据或启动操作），即使接收方当前未在运行。Android\
    \ 中有两类主要的 Intent：\n\n*   **显式 Intent** - 显式 Intent 是指定应用程序，或同时指定应用程序和将执行请求的组件的\
    \ Intent。\n*   **隐式 Intent** - 隐式 Intent 较为模糊，指定了所需操作的类型（例如，打开相机或位置应用）。\n\n除了这两种主要类别的\
    \ Intent（其中消息直接发送到特定应用程序或服务）之外，还可以发送广播 Intent。这些广播消息（可由 Android 系统或应用程序发送）会被设备上所有先前已注册特定广播操作类型的应用程序同时接收。在某些情况下，可能需要特殊权限才能注册特定的广播（例如，对于\
    \ `BOOT_COMPLETE` 权限，该权限允许在 Android 系统启动完成后接收 `ACTION_BOOT_COMPLETED` Intent）。\n\
    \n## 启动组件\n\n除了这两类 Intent 之外，发送 Intent 主要有三种方法：\n\n*   **启动 Activity** - 可以通过将已初始化的\
    \ `Intent` 对象传递给 `startActivity()` 或 `startActivityForResult()` 上下文方法来启动一个 Activity\
    \ 实例。\n*   **启动后台服务** - 在 Android 5.0（API 级别 21）之前，可以通过将已初始化的 `Intent` 对象传递给 `startService()`\
    \ 上下文方法来启动后台 `Service`。在 API 级别 21 之后，这可用于启动 `JobScheduler` 组件。\n*   **发送广播**\
    \ - 虽然系统会定期发送许多广播，例如 `TIME_TICK` 和 `BOOT_COMPLETE`，但普通应用程序也可以发送自己的广播。通常，广播是一种可以被多个应用程序同时接收的\
    \ Intent。此类广播可以使用 `sendBroadcast()` 或 `sendOrderedBroadcast()` 上下文方法发送。\n\n##\
    \ Intent 属性\n\n一个 Intent 由几个属性组成。根据正在发送的 Intent 和接收者，以下某些属性可能是必需的；然而，在某些情况下，并非必需。所有标准的\
    \ Intent 属性都作为常量存储在 `Intent` 对象中，例如 `Intent.FLAG_ACTIVITY_NO_HISTORY`，其常量值为 `1073741824`。\n\
    \n### 核心属性\n\n*   **Action（操作）** - 可以使用已初始化的 `Intent` 对象的 `setAction` 方法设置。操作定义了要执行的高级操作。\n\
    *   **Data（数据）** - 可以使用已初始化的 `Intent` 对象的 `setData` 方法设置。数据字段包括此 Intent 正在操作的数据（例如，要在图像编辑应用中打开的文件的路径）。\n\
    \n### 附加属性\n\n*   **Category（类别）** - 可以使用已初始化的 `Intent` 对象的 `addCategory` 方法设置。类别提供了有关\
    \ Intent 要执行的操作的附加上下文。只有能够处理所有指定类别的 Activity 才能被选择来接收 Intent。\n*   **Type（类型）**\
    \ - 可以使用已初始化的 `Intent` 对象的 `setType` 方法设置。通常，类型是从数据本身推断出来的；但是，此属性可用于设置特定的 MIME（多用途互联网邮件扩展）类型（例如\
    \ `audio/mpeg` 或 `audio/*`），例如，对于要返回的数据。\n*   **Component（组件）** - 可以使用已初始化的 `Intent`\
    \ 对象的 `setComponent` 方法设置。此属性标识用于 Intent 的组件类的名称。这是一个可选属性，因为它通常根据 Intent 的内容来标识。\n\
    *   **Extras（附加信息）** - 可以使用已初始化的 `Intent` 对象的 `putExtra` 方法设置。Extra 是一个 Bundle（一组包含不同类型的键值对），接收者可以使用它（例如，当将笔记分享到您的社交媒体应用时，笔记文本将作为\
    \ Bundle 中的一个字段发送）。此 Bundle 可以包含专有键或 Android 系统中设置的键，例如 `EXTRA_ALARM_COUNT`。\n\
    *   **Flags（标志）** - 可以使用已初始化的 `Intent` 对象的 `setFlag` 方法设置。标志表示正在启动的组件的行为（例如，不将启动的\
    \ Activity 包含在任务堆栈中）。\n\n### 操作（Actions）\n\n可以使用已初始化的 `Intent` 对象的 `setAction`\
    \ 方法设置。`getAction` 方法也可用于检索接收到的 Intent 的操作。操作定义了要执行的高级操作。\n\n下面是一个示例：\n\n```\n\
    Intent intent = new Intent();\nintent.setAction(Intent.ACTION_MAIN);\n```\n\n\
    在撰写本文时，Android 文档^(¹¹) 列出了超过 135 种标准 Intent 操作类型。表 4-1 列出了最常见的 Intent 操作的一个子集。\n\
    \n**表 4-1** Intent 操作\n\n| 名称 | API 级别 | 描述 |\n| --- | --- | --- |\n| `ACTION_ALL_APPS`\
    \ | 1+ | 列出所有可用的应用程序。 |\n| `ACTION_APP_ERROR` | 14+ | 当用户在崩溃对话框警告消息中选择“报告”按钮时发生。然后此\
    \ Intent 将被发送到安装出现错误的应用程序的安装程序应用。 |\n| `ACTION_CAMERA_BUTTON` | 1+ | 表示设备的“相机按钮”已被按下的广播。\
    \ |\n| `ACTION_CHOOSER` | 1+ | 系统提供的默认标准 Activity 选择器的替代方案。此操作将显示一个 Activity 选择器。\
    \ |\n| `ACTION_DEFAULT` / `ACTION_VIEW` | 1+ | 向用户显示数据的简单操作。 |\n| `ACTION_MY_PACKAGE_SUSPENDED`\
    \ | 28+ | 一个受保护的广播 Intent，只能由系统发送，当应用程序进入暂停状态时发送给该应用程序。 |\n| `ACTION_MY_PACKAGE_UNSUSPENDED`\
    \ | 28+ | 一个受保护的广播 Intent，只能由系统发送，当应用程序离开暂停状态时发送给该应用程序。 |\n| `ACTION_PACKAGE_ADDED`\
    \ | 1+ | 一个受保护的广播 Intent，只能由系统发送，当设备上安装了新应用程序时发送，包括两个附加信息：`EXTRA_UID` 和 `EXTRA_REPLACING`。\
    \ |\n| `ACTION_PACKAGE_CHANGED` | 1+ | 一个受保护的广播 Intent，只能由系统发送，当设备上的现有应用程序发生更改时发送，包括附加信息：`EXTRA_UID`、`EXTRA_CHANGED_COMPONENT_NAME_LIST`\
    \ 和 `EXTRA_DONT_KILL_APP`。 |\n| `ACTION_PACKAGE_DATA_CLEARED` | 3+ | 一个受保护的广播\
    \ Intent，只能由系统发送，应在 `ACTION_PACKAGE_RESTARTED` 之前发送。当应用程序的持久数据被擦除时发送此广播，请记住此 Intent\
    \ 不会发送给应用程序本身，包括附加信息：`EXTRA_UID` 和 `EXTRA_PACKAGE_NAME`。 |\n| `ACTION_PACKAGE_FIRST_LAUNCH`\
    \ | 12+ | 一个受保护的广播 Intent，只能由系统发送，当应用程序首次启动时发送给应用程序的安装程序（例如 Google Play 商店）。不包括附加信息；但是，数据包括已启动包的名称。\
    \ |\n| `ACTION_PACKAGE_RESTARTED` | 1+ | 一个受保护的广播 Intent，只能由系统发送，当用户杀死应用程序及其所有进程时触发。数据将包含包名称，并且还将包含附加信息\
    \ `EXTRA_UID`。 |\n| `ACTION_PACKAGE_REMOVED` | 1+ | 一个受保护的广播 Intent，只能由系统发送，当应用程序已从设备中移除时触发。由于应用程序已被移除，它将不会接收\
    \ Intent。除了包含应用程序名称的数据属性外，还将包含以下附加信息：`EXTRA_UID`、`EXTRA_DATA_REMOVED` 和 `EXTRA_REPLACING`。\
    \ |\n| `ACTION_POWER_CONNECTED` | 4+ | 一个受保护的广播 Intent，只能由系统发送，表示设备已连接到电源。 |\n\
    | `ACTION_POWER_DISCONNECTED` | 4+ | 一个受保护的广播 Intent，只能由系统发送，表示设备已断开电源连接。 |\n\
    | `ACTION_REBOOT` | 1+ | 一个受保护的广播 Intent，只能由系统发送，指示设备重启。 |\n| `ACTION_RUN` | 1+\
    \ | 运行已定义数据的高级操作。 |\n| `ACTION_SCREEN_OFF` | 1+ | 一个受保护的广播 Intent，只能由系统发送，当设备屏幕进入休眠或变为非活动状态时发送。\
    \ |\n| `ACTION_SHUTDOWN` | 4+ | 一个受保护的广播 Intent，只能由系统发送，在设备关机过程中触发。 |\n| `ACTION_SEND`\
    \ | 1+ | 向收件人发送数据的高级操作。此操作通常与选择器配对使用。 |\n| `ACTION_SET_WALLPAPER` | 1+ | 用于显示选择壁纸的设置。\
    \ |\n| `ACTION_TIMEZONE_CHANGED` | 1+ | 一个受保护的广播 Intent，只能由系统发送，表示系统时区已更改。包含附加信息\
    \ `EXTRA_TIMEZONE`。 |\n| `ACTION_VOICE_COMMAND` | 1+ | 用于启动语音命令的 Intent 操作。 |\n\
    | `ACTION_WEB_SEARCH` | 1+ | 用于启动网络搜索的 Intent 操作。 |\n\n### 类别（Categories）\n\n\
    可以使用已初始化的 `Intent` 对象的 `addCategory` 方法设置。`getCategories` 方法也可用于检索接收到的 Intent\
    \ 的类别。类别提供了有关 Intent 要执行的操作的附加上下文。只有能够处理所有指定类别的 Activity 才能被选择来接收 Intent。\n\n\
    下面是一个示例：\n\n```\nIntent intent = new Intent();\nintent.addCategory(Intent.APP_CALCULATOR);\n\
    ```\n\n在撰写本文时，Android 文档^(¹²) 列出了超过 39 种标准 Intent 类别属性。表 4-2 列出了这些常见 Intent 类别的一个子集。\n\
    \n**表 4-2** Intent 类别\n\n| 名称 | API 级别 | 描述 |\n| --- | --- | --- |\n| `CATEGORY_ALTERNATIVE`\
    \ | 1+ | 用于标识标准 Activity 或用户当前正在查看的数据的替代操作。 |\n| `CATEGORY_APP_BROWSER` | 15+\
    \ | 用于打开应能够浏览互联网的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开首选的浏览器应用。 |\n| `CATEGORY_APP_CALCULATOR`\
    \ | 15+ | 用于打开应能够执行标准算术运算的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开计算器应用。 |\n| `CATEGORY_APP_CALENDAR`\
    \ | 15+ | 用于打开应能够执行标准日历操作的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开日历应用。 |\n| `CATEGORY_APP_CONTACTS`\
    \ | 15+ | 用于打开应能够查看和操作通讯录条目的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开联系人应用。 |\n| `CATEGORY_APP_EMAIL`\
    \ | 15+ | 用于打开应能够发送和接收电子邮件的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开电子邮件应用。 |\n| `CATEGORY_APP_FILES`\
    \ | 15+ | 用于打开应能够管理存储在设备上的文件的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开文件应用。 |\n| `CATEGORY_APP_GALLERY`\
    \ | 15+ | 用于打开应能够查看和操作存储在设备上的图像和视频文件的 Activity。它可以与 `ACTION_MAIN` 一起使用以打开图库应用。\
    \ |\n| `CATEGORY_APP_MAPS` | 15+ | 用于打开应能够显示用户当前位置的 Activity。它可以与 `ACTION_MAIN`\
    \ 一起使用以打开地图应用。 |\n| `CATEGORY_APP_MARKET` | 11+ | 用于打开应允许用户浏览和安装新应用程序的 Activity。\
    \ |\n| `CATEGORY_APP_MESSAGING` | 15+ | 用于打开应能够发送和接收短信的 Activity。它可以与 `ACTION_MAIN`\
    \ 一起使用以打开消息应用。 |\n| `CATEGORY_APP_MUSIC` | 15+ | 用于打开应能够在设备上播放音乐的 Activity。它可以与\
    \ `ACTION_MAIN` 一起使用以打开音乐应用。 |\n| `CATEGORY_BROWSABLE` | 1+ | 指示可以直接从浏览器调用和启动的\
    \ Activity（例如，用户选择指向 Google Play 商店网站的链接，然后被带到 Google Play 商店应用而不是网站）。 |\n| `CATEGORY_CAR_MODE`\
    \ | 8+ | 指示 Activity 已针对在车载环境中的使用进行了优化。 |\n| `CATEGORY_DEFAULT` | 1+ | 用于标识可用作默认操作的\
    \ Activity。 |\n| `CATEGORY_HOME` | 1+ | 设备启动时以及当用户返回起始 Activity 时启动的 Activity。\
    \ |\n| `CATEGORY_LAUNCHER` | 1+ | 用于标识可用作设备上初始 Activity（即主屏幕）的 Activity。 |\n|\
    \ `CATEGORY_MONKEY` | 1+ | 指示可由 Monkey（一个 Android UI 模糊测试工具）或其他自动化工具测试的 Activity。\
    \ |\n\n### 附加信息（Extras）\n\n可以使用已初始化的 `Intent` 对象的 `putExtra` 方法设置。`getExtras`\
    \ 方法也可用于检索接收到的 Intent 的附加信息。Extra 是一个 Bundle（一组包含不同类型的键值对），接收者可以使用它（例如，当将笔记分享到您的社交媒体应用时，笔记文本将作为\
    \ Bundle 中的一个字段发送）。此 Bundle 可以包含专有键或 Android 系统中设置的键，例如 `EXTRA_ALARM_COUNT`。\n\
    \n下面是一个示例：\n\n```\nIntent intent = new Intent();\nintent.putExtra(Intent.EXTRA_TEXT,\
    \ \"这是一个文本 extra 示例\");\n```\n\n在撰写本文时，Android 文档^(¹³) 列出了超过 80 种标准 Intent 附加属性。表\
    \ 4-3 列出了这些常见 Intent 附加信息的一个子集。\n\n**表 4-3** Intent 附加信息\n\n| 名称 | API 级别 | 描述\
    \ |\n| --- | --- | --- |\n| `EXTRA_CHANGED_COMPONENT_NAME_LIST` | 7+ | 属于 Intent\
    \ 操作 `ACTION_PACKAGE_CHANGED`，包含一个字符串数组，包含所有已更改的组件。 |\n| `EXTRA_DONT_KILL_APP`\
    \ | 1+ | 属于 `ACTION_PACKAGE_REMOVED` 和 `ACTION_PACKAGE_CHANGED` 操作，覆盖重启目标应用程序的默认行为。\
    \ |\n| `EXTRA_DATA_REMOVED` | 3+ | 属于 `ACTION_PACKAGE_REMOVED` 操作，用于指示移除应为完全卸载，同时删除数据和代码，而不是保留数据的部分卸载（后者作为更新的一部分执行）。\
    \ |\n| `EXTRA_HTML_TEXT` | 16+ | 可作为 `ACTION_SEND` 操作的一部分与 `EXTRA_TEXT` 附加信息一起使用，指示该附加文本是\
    \ HTML 格式的文本。 |\n| `EXTRA_MIME_TYPES` | 19+ | 用于设置可接受的 MIME 类型（例如 `audio/mpeg`\
    \ 或 `audio/*`）。 |\n| `EXTRA_NOT_UNKNOWN_SOURCE` | 14+ | 属于 `ACTION_INSTALL_PACKAGE`\
    \ 操作，指示要安装的应用程序是从发送 Intent 的应用程序安装的，而不是来自未知来源。 |\n| `EXTRA_PACKAGE_NAME` | 24+\
    \ | 包含一个应用程序名称。 |\n| `EXTRA_PHONE_NUMBER` | 1+ | 属于 `ACTION_NEW_OUTGOING_CALL`\
    \ 和 `ACTION_CALL` 操作，包含呼叫的电话号码。 |\n| `EXTRA_QUIET_MODE` | 24+ | 指示安静模式（其中配置文件中的所有应用程序都被终止）是已打开还是已关闭。\
    \ |\n| `EXTRA_REFERRER` | 17+ | 当 Intent 启动 Activity 时使用，用于标识发起启动的来源。值以 URI 形式提供。\
    \ |\n| `EXTRA_REPLACING` | 3+ | 作为 `ACTION_PACKAGE_REMOVED` 操作的一部分使用，指示包已被替换。\
    \ |\n| `EXTRA_REFERRER_NAME` | 22+ | `EXTRA_REFERRER` 附加信息的替代项；但是，值以字符串形式提供，而不是\
    \ URI。 |\n| `EXTRA_SHUTDOWN_USERSPACE_ONLY` | 19+ | 作为 `ACTION_SHUTDOWN` 操作的一部分使用，标识应执行部分关机。此部分关机仅重启用户空间，而不是执行完整的操作系统重启。\
    \ |\n| `EXTRA_SUBJECT` | 1+ | 一个高级附加信息，包含正在发送的数据的主题。 |\n| `EXTRA_TEXT` | 1+ |\
    \ 属于 `ACTION_SEND` 操作。一个高级附加信息，包含要以 `CharSequence`（或 `String`，因为 `String` 实现了\
    \ `CharSequence` 接口）形式接收的数据。 |\n| `EXTRA_TIME` | 30+ | 一个高级附加信息，其值包含自纪元以来的毫秒时间（例如，1608553466）。\
    \ |\n| `EXTRA_TIMEZONE` | 30+ | 属于 `ACTION_TIMEZONE_CHANG`\n"
- fmt: "# 获取输入名称并查看输入事件发生时间\n`getevent -l`\n\n# 返回输入是否正在使用。用于识别屏幕是否正在使用。\n`cat /dev/input/event2`\n\
    \n# 向输入设备发送事件。例如，在我的设备上，以下命令将音量设置为0。\n`sendevent /dev/input/event0 0 0 0`\n\n\
    *通过Monkey测试工具（UI模糊测试器）启动应用程序。将数字1替换为测试中要执行的随机触摸输入次数：*\n\n```\nmonkey -p com.android.chrome\
