    \ broadcast intent that can only be sent by the system and is sent when a new\
    \ application is installed on the device, including two extras: `EXTRA_UID` and\
    \ `EXTRA_REPLACING`. |\n| `ACTION_PACKAGE_CHANGED` | 1+ | A protected broadcast\
    \ intent that can only be sent by the system and is sent when an existing application\
    \ on the device has changed, including the extras: `EXTRA_UID`, `EXTRA_CHANGED_COMPONENT_NAME_LIST`,\
    \ and `EXTRA_DONT_KILL_APP`. |\n| `ACTION_PACKAGE_DATA_CLEARED` | 3+ | A protected\
    \ broadcast intent that can only be sent by the system and should be preceded\
    \ by `ACTION_PACKAGE_RESTARTED`. This broadcast is sent when an application's\
    \ persistent data is erased bearing in mind that this intent is not sent to the\
    \ application itself, including the extras: `EXTRA_UID` and `EXTRA_PACKAGE_NAME`.\
    \ |\n| `ACTION_PACKAGE_FIRST_LAUNCH` | 12+ | A protected broadcast intent that\
    \ can only be sent by the system and is sent to the installer of an application\
    \ (e.g., the Google Play Store) when an application is first launched. No extras\
    \ are included; however, the data includes the name of the launched package. |\n\
    | `ACTION_PACKAGE_RESTARTED` | 1+ | A protected broadcast intent that can only\
    \ be sent by the system and is triggered when the user kills an application and\
    \ all of its processes. The data will contain the name of the package, and it\
    \ will also include the extra `EXTRA_UID`. |\n| `ACTION_PACKAGE_REMOVED` | 1+\
    \ | A protected broadcast intent that can only be sent by the system and is triggered\
    \ when an application has been removed from the device. As the application has\
    \ been removed, it will not receive the intent. In addition to the data attribute\
    \ containing the name of the application, the following extras will also be included:\
    \ `EXTRA_UID`, `EXTRA_DATA_REMOVED`, and `EXTRA_REPLACING`. |\n| `ACTION_POWER_CONNECTED`\
    \ | 4+ | A protected broadcast intent that can only be sent by the system and\
    \ indicates that the device has been connected to a power source. |\n| `ACTION_POWER_DISCONNECTED`\
    \ | 4+ | A protected broadcast intent that can only be sent by the system and\
    \ indicates that the device has been disconnected from a power source. |\n| `ACTION_REBOOT`\
    \ | 1+ | A protected broadcast intent that can only be sent by the system and\
    \ instructs the device to reboot. |\n| `ACTION_RUN` | 1+ | A high-level action\
    \ to run the defined data. |\n| `ACTION_SCREEN_OFF` | 1+ | A protected broadcast\
    \ intent that can only be sent by the system and is sent when the device screen\
    \ goes to sleep or becomes inactive. |\n| `ACTION_SHUTDOWN` | 4+ | A protected\
    \ broadcast intent that can only be sent by the system and is triggered during\
    \ the device shutdown process. |\n| `ACTION_SEND` | 1+ | A high-level action to\
