    \ when an intent is launching an activity to identify who initiated the launch.\
    \ Value is provided as a URI. |\n| `EXTRA_REPLACING` | 3+ | Used as part of the\
    \ `ACTION_PACKAGE_REMOVED` action to indicate that the package has been replaced.\
    \ |\n| `EXTRA_REFERRER_NAME` | 22+ | Alternative to the `EXTRA_REFERRER` extra;\
    \ however, the value is provided as a string instead of a URI. |\n| `EXTRA_SHUTDOWN_USERSPACE_ONLY`\
    \ | 19+ | Used as part of the `ACTION_SHUTDOWN` action to identify that a partial\
