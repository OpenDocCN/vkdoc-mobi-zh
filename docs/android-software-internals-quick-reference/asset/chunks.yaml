    \nAndroid应用程序使用Java或Kotlin编写。在构建应用程序时，这些代码会被编译为Dalvik字节码——以`dex`（Dalvik可执行文件）文件形式呈现。这种Dalvik字节码是二进制的，因此不可读。在这种情况下，如果逆向工程师想要分析已编译的Android应用程序，他们只能选择反编译或反汇编Dalvik可执行文件。创建和逆向工程Android应用程序的过程如图[12-1](#509502_1_En_12_Chapter.xhtml#Fig1)所示。\n\
