    Running Devices\nIn order to analyze (and in turn disassemble or decompile) an\
    \ Android\napplication, you may need to first extract it from a device. The ADB\
    \ shell can be used to\ndo this.\n\n*The following uses the package manager to\
    \ list all package IDs on\nthe device:*\n\n```\npm list packages\npm list packages\
    \ | grep chrome\n```\n\n*Next, package manager can be used again to list the path\
    \ to the base\nAPK of the desired package (an example package path is\n/data/app/com.android.chrome-6piH3g1ET8uQozATuKwptQ==/base.apk):*\n\
    \n```\npm path \n```\n\nNo special permissions are required to view the directories\
    \ returned\nby this command. However, its parent directory (`/data/app`) does\
    \ not\nhave read permissions for nonroot, meaning that applications on the\ndevice\
    \ cannot be enumerated in this way.\n\n*Finally, the simplest way to extract the\
    \ APK is by using adb with\nthe following:*\n\n```\nadb pull \n```\n\nIt is also\
    \ worth bearing in mind that tools such as APK\nHoarder,^([^(55)](#fn55)) which\
    \ is free and open\nsource, can be used for the mass extraction of APKs from a\
    \ device.\n\nFootnotes\n\n13. Closing Thoughts\n\nThe purpose of this book has\
