    \ | 15+ | Used to open an activity that should be able to perform standard arithmetic\
    \ operations. It can be used alongside `ACTION_MAIN` to open the calculator application.\
    \ |\n| `CATEGORY_APP_CALENDAR` | 15+ | Used to open an activity that should be\
    \ able to perform standard calendar operations. It can be used alongside `ACTION_MAIN`\
    \ to open the calendar application. |\n| `CATEGORY_APP_CONTACTS` | 15+ | Used\
    \ to open an activity that should be able to view and manipulate address book\
    \ entries. It can be used alongside `ACTION_MAIN` to open the contacts application.\
    \ |\n| `CATEGORY_APP_EMAIL` | 15+ | Used to open an activity that should be able\
    \ to send and receive email. It can be used alongside `ACTION_MAIN` to open the\
    \ email application. |\n| `CATEGORY_APP_FILES` | 15+ | Used to open an activity\
    \ that should be able to manage files stored on the device. It can be used alongside\
    \ `ACTION_MAIN` to open the files application. |\n| `CATEGORY_APP_GALLERY` | 15+\
    \ | Used to open an activity that should be able to view and manipulate image\
    \ and video files stored on the device. It can be used alongside `ACTION_MAIN`\
    \ to open the gallery application. |\n| `CATEGORY_APP_MAPS` | 15+ | Used to open\
    \ an activity that should be able to show the user's current location. It can\
    \ be used alongside `ACTION_MAIN` to open the maps application. |\n| `CATEGORY_APP_MARKET`\
    \ | 11+ | Used to open an activity that should allow the user to browse and install\
    \ new applications. |\n| `CATEGORY_APP_MESSAGING` | 15+ | Used to open an activity\
    \ that should be able to send and receive text messages. It can be used alongside\
    \ `ACTION_MAIN` to open the messaging application. |\n| `CATEGORY_APP_MUSIC` |\
    \ 15+ | Used to open an activity that should be able to play music on the device.\
    \ It can be used alongside `ACTION_MAIN` to open the music application. |\n| `CATEGORY_BROWSABLE`\
    \ | 1+ | Indicates activities that can be called and started directly from a browser\
    \ (e.g., by a user selecting a link to the Google Play Store website and being\
    \ taken to the Google Play Store application instead). |\n| `CATEGORY_CAR_MODE`\
    \ | 8+ | Indicates that the activity has been optimized to work in car environments.\
    \ |\n| `CATEGORY_DEFAULT` | 1+ | Used to identify activities that could be used\
    \ as the default action. |\n| `CATEGORY_HOME` | 1+ | The activity that launches\
    \ when the device is started and whenever the user returns to the starting activity.\
    \ |\n| `CATEGORY_LAUNCHER` | 1+ | Used to identify an activity that can be used\
    \ as the initial activity on a device (i.e., the home screen). |\n| `CATEGORY_MONKEY`\
    \ | 1+ | Indicates an activity that can be tested by monkey (an Android UI fuzzer)\
    \ or other automated tools. |\n\n### Extras\n\nSettable using an initialized `Intent`\
    \ object's `putExtra` method. The `getExtras` method can also be used for retrieving\
    \ a received intent's extras. An extra is a bundle (a set of key-value pairs with\
    \ varying types) which the receiver can use (e.g., when sharing a note with your\
    \ social media app, the note text will be sent across as a field in a bundle).\
    \ This bundle can include proprietary keys or ones set in the Android system such\
    \ as `EXTRA_ALARM_COUNT`.\n\nAn example of this can be seen here:\n\n```\nIntent\
    \ intent = new Intent();\nintent.putExtra(Intent.EXTRA_TEXT, \"This is an example\
    \ text extra\");\n```\n\nAt the time of writing, the Android documentation^([^(13)](#fn13))\
    \ lists upward of 80 standard intent extra attributes. Table [4-3](#509502_1_En_4_Chapter.xhtml#Tab3)\
    \ lists a subset of the most common of these intent extras.\n\n**Table 4-3** Intent\
    \ Extras\n\n| Name | API Level | Description |\n| --- | --- | --- |\n| `EXTRA_CHANGED_COMPONENT_NAME_LIST`\
    \ | 7+ | Part of the intent action `ACTION_PACKAGE_CHANGED` and contains a string\
    \ array of all of the components that have changed. |\n| `EXTRA_DONT_KILL_APP`\
    \ | 1+ | Part of the `ACTION_PACKAGE_REMOVED` and `ACTION_PACKAGE_CHANGED` actions\
    \ and overrides the default behavior of restarting the targeted application. |\n\
    | `EXTRA_DATA_REMOVED` | 3+ | Part of the `ACTION_PACKAGE_REMOVED` action and\
    \ is used to indicate that the remove should be a full uninstall, removing both\
    \ data and code instead of a partial uninstall which leaves the data (the latter\
