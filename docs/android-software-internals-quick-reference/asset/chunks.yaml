    # 3. Fundamentals


    ## Android Sandbox


    Android runs under a multiuser Linux system which means that each application,
    and its storage, runs under a separate user. This means that under normal circumstances,
    applications cannot read another application’s data or internal storage. Each
    process uses its own virtual machine (VM) which segregates applications. Prior
    to API level 21 (Android 5), this would have been a Dalvik Virtual Machine, and
    in later versions will instead use the Android Runtime (ART). Both operate in
    similar fashions, where they simulate a device’s CPUs, registers, and other features
    while running an application’s compiled Dalvik bytecode. ART, however, is considered
    to have many performance improvements.


