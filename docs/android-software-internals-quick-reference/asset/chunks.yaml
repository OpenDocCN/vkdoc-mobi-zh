    \ from Running Devices\n\nIn order to analyze (and in turn disassemble or decompile)\
    \ an Android application, you may need to first extract it from a device. The\
    \ `adb` shell can be used to do this.\n\nThe following uses the package manager\
    \ to list all package IDs on the device:\n\n```\npm list packages\npm list packages\
    \ | grep chrome\n```\n\nNext, package manager can be used again to list the path\
    \ to the base APK of the desired package (an example package path is `/data/app/com.android.chrome-6piH3g1ET8uQozATuKwptQ==/base.apk`):\n\
    \n```\npm path <package>\n```\n\nNo special permissions are required to view the\
    \ directories returned by this command. However, its parent directory (`/data/app`)\
    \ does not have read permissions for non-root, meaning that applications on the\
    \ device cannot be enumerated in this way.\n\nFinally, the simplest way to extract\
    \ the APK is by using `adb` with the following:\n\n```\nadb pull <remote> <local>\n\
    ```\n\nIt is also worth bearing in mind that tools such as APK Hoarder,^([(55)](#fn55))\
    \ which is free and open source, can be used for the mass extraction of APKs from\
    \ a device.\n\n## Footnotes\n\n## 13. Closing Thoughts\n\nThe purpose of this\
    \ book has been to supply you with a reference guide on information useful to\
    \ Android software developers working closely with the Android OS and other Android\
