- "# 12. 反编译和反汇编 Android 应用程序\n\nAndroid 应用程序使用 Java 或 Kotlin 编写。在构建应用程序时，这些代码会被编译为\
  \ Dalvik 字节码——以`dex`（Dalvik 可执行文件）文件形式呈现。这种 Dalvik 字节码是二进制的，因此不可读。在这种情况下，如果逆向工程师想要分析已编译的\
  \ Android 应用程序，他们只能选择反编译或反汇编 Dalvik 可执行文件。创建和逆向工程 Android 应用程序的过程如图 12-1 所示。\n\n\
  ![../images/509502_1_En_12_Chapter/509502_1_En_12_Fig1_HTML.png](img/509502_1_En_12_Fig1_HTML.png)\n\
  \n**图 12-1** 软件开发者和逆向工程师的处理视图\n\n## 反编译的 Java\n\n第一种选择是使用工具将 Dalvik 字节码反编译为可读的 Java。这种\
  \ Java 更像是伪代码而非实际 Java，因为它是反编译器对 Dalvik 汇编表示的“最佳猜测”。虽然这种视图对 Java 开发人员来说更熟悉，但通常不是最佳选择，因为它不仅不能代表实际应用程序代码，而且也无法运行或重新编译。诸如`dex2jar`和`jadx`之类的工具可用于反编译\
  \ Dalvik 可执行文件。`Jadx`可用于将`Jadx`项目导出为 Gradle 项目，从而允许将项目加载到 Android Studio 中。\n\n\
  *`APKTool`可用于从 APK 中提取`.dex`文件：*\n\n```\napktool  -s d \n```\n\n*使用`JADX`反编译并查看\
  \ APK 或 Dex 文件的反编译 Java 代码：*\n\n```\njadx -e \n```\n\n## 反汇编的 Dalvik 字节码（Smali）\n\
  \n与其反编译为伪 Java，不如使用反汇编器将 Dalvik 字节码恢复为其自身的可读表示形式。Dalvik 字节码更常用的形式称为 Smali。反汇编为 Smali\
  \ 的好处在于，一个`dex`文件可以被反汇编、读取、修改、重新汇编和重新签名，并且仍然保持完全可用的状态。\n\n*诸如`APKTool`之类的工具可用于反汇编\
  \ Dalvik 字节码：*\n\n```\napktool d \n```\n\n由于 Smali 的特性，其代码体积通常比 Java 或 Kotlin 大得多。例如，以下\
  \ Java 中的 Toast 代码（一个简单的 Android 弹出消息）的大小仅为相同 Smali 代码的一半。\n\n*Java：*\n\n```\nContext\
  \ context = getApplicationContext();\nCharSequence text = \"I'm a Toast\";\nint\
  \ duration = Toast.LENGTH_SHORT;\nToast toast = Toast.makeText(context, text, duration);\n\
  toast.show();\n```\n\n*Smali：*\n\n\n\n```smali\n.line 13\nconst-string v0, \"I'm\
  \ a Toast!\"\n.line 14\n.local v0, \"text\":Ljava/lang/String;\nconst/4 v1, 0x1\n\
  .line 16\n.local v1, \"duration\":I\ninvoke-virtual {p0}, Lcom/example/simpletoastapp/MainActivity;->getApplicationContext()Landroid/content/Context;\n\
  move-result-object v2\nmove-object v3, v0\ncheck-cast v3, Ljava/lang/CharSequence;\n\
  invoke-static {v2, v3, v1}, Landroid/widget/Toast;->makeText(Landroid/content/Context;Ljava/lang/CharSequence;I)Landroid/widget/Toast;\n\
  move-result-object v2\n.line 17\n.local v2, \"toast\":Landroid/widget/Toast;\ninvoke-virtual\
  \ {v2}, Landroid/widget/Toast;->show()V\n```\n\n## 从运行中的设备提取 APK\n\n为了分析（并进而反汇编或反编译）一个\
  \ Android 应用程序，你可能需要首先将其从设备中提取出来。可以使用 `adb` shell 来做到这一点。\n\n以下使用包管理器列出设备上的所有包 ID：\n\
  \n```\npm list packages\npm list packages | grep chrome\n```\n\n接下来，可以再次使用包管理器来列出所需包的基础\
  \ APK 路径（例如包路径为 `/data/app/com.android.chrome-6piH3g1ET8uQozATuKwptQ==/base.apk`）：\n\
  \n```\npm path <package>\n```\n\n查看此命令返回的目录不需要特殊权限。但是，其父目录（`/data/app`）对于非 root\
  \ 用户没有读取权限，这意味着无法通过这种方式枚举设备上的应用程序。\n\n最后，提取 APK 的最简单方法是使用带以下参数的 `adb`：\n\n```\n\
  adb pull <remote> <local>\n```\n\n同样值得记住的是，诸如 APK Hoarder 之类的工具，^((55)) 该工具是免费且开源的，可用于从设备中批量提取\
  \ APK。\n\n## 脚注\n\n## 13. 结语\n\n本书的目的在于为你提供一份参考指南，其中包含对密切从事 Android 操作系统及其他 Android\
  \ 安全元素工作的 Android 软件开发人员有用的信息。本书涵盖了从应用沙盒和 Dalvik 虚拟机到 Android 应用程序的存储类型，以及如何逆向工程一个已编译的\
  \ Android 应用程序等各个领域。\n\n重要的是要记住，虽然本书中的核心原则在未来许多年内应继续具有参考价值，但随着新版本 Android 的发布，某些方面可能会发生变化。鉴于此，在继续使用本书作为参考指南的同时，也请查阅书中散布的脚注，以加深对所涵盖领域的理解。\n\
  \n还有大量其他优秀的资源可以支持你在 Android 编程、内部机制和逆向工程方面的知识；这里精选了一部分：\n\n*   **Maddie Stone**\
  \ - Android 应用逆向工程 101^((56))\n*   **Jonathan Levin** - Android 内部机制^((57))\n* \
  \  **Kristina Balaam** - Android 恶意软件分析 | YouTube^((58))\n*   **Kristina Balaam**\
  \ - Android 恶意软件分析 | LinkedIn Learning^((59))\n*   **Ira R. Forman 与 Nate Forman**\
  \ - Java 反射实战 | Manning 出版社^((60))\n*   **Android 文档** | Android 开发者^((61))\n\n\
  除了这些资源，我还要特别感谢 JD，他是该领域的一位研究员和软件工程师，没有他的鼓励，我不会动笔写这本书。有关更多信息以及来自本书作者 James Stevenson\
  \ 的更多资源，请访问我的网站 [`https://JamesStevenson.me/`](https://jamesstevenson.me/)。\n\n\
