- "# 权限\n\nAndroid 中的权限遵循最小权限模型，即特定类型的功能仅授予明确请求这些功能的应用程序。权限主要分为两种类型：清单权限和运行时权限（后者通常属于“危险”权限类别）。运行时权限和清单权限都必须在\
  \ Android 清单中声明；但此外，运行时权限还必须在运行时请求，通过对话框（如图 3-1 所示）提示用户是否同意应用程序使用所述功能。运行时权限是在 API\
  \ 级别 23 中实现的；然而，在此之前，用户会在安装前看到所有运行时权限。\n\n![../images/509502_1_En_3_Chapter/509502_1_En_3_Fig1_HTML.jpg](img/509502_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** 用户看到的运行时权限示例\n\n如前所述，权限根据其对用户、Android 系统或设备上其他应用程序构成的潜在风险被赋予权限类型。所有权限类型的摘要见表\
  \ 3-1。^(⁵)\n\n**表 3-1** 权限类型\n\n| 权限类型 | 风险 | 描述 |\n| --- | --- | --- |\n| 普通 |\
  \ 低 | 默认权限类型。为应用程序提供独立的应用程序级功能，例如 `BLUETOOTH`、`NFC` 和 `INTERNET`。 |\n| 危险 | 高 |\
  \ 为应用程序提供对私有数据或设备控制方面的访问权限，例如 `WRITE_EXTERNAL_STORAGE`、`ACCESS_FINE_LOCATION` 和\
  \ `CAMERA`。与普通权限类型不同，运行时权限请求必须由用户（在运行时通过点击按钮）接受，系统才会授予权限（或者在 API 级别 23 之前的设备上在安装时接受）。\
  \ |\n| 签名 | 关键 | 仅当请求权限的应用程序与声明该权限的应用程序使用相同的证书签名时，才会授予此权限。这通常用于将权限类型限制为系统/预安装的应用程序。这些权限通常授予对系统和其他应用程序的大规模控制权，或绕过\
