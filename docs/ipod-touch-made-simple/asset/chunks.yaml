    \ outward.\n\n![images](images/p275-01.jpg)\n\nIf a widescreen movie is not taking\
    \ up the full screen of the iPod touch, touching this button will zoom in a bit.\
    \ Touching it again will zoom back out.\n\n**NOTE:** You can also simply double-tap\
    \ the screen to zoom in and fill the screen. Be aware that, just like on your\
    \ widescreen TV, trying to force a non-widescreen video into Widescreen mode can\
    \ sometimes cause you to lose part of the picture."
  trans: "\n# 观看视频\n\niPod touch 为您提供了出色的视频播放平台，让您尽享各类视频、电视节目和电影。这一点在众多可用的视频观看应用中体现得尤为突出。\n\
    \n在本章中，我们将向您展示如何在 iPod touch 上观看电影、电视节目、播客和音乐视频。\n\n您可以从 iTunes Store 或 iTunes\
    \ U 免费购买或下载许多视频。您还可以将 iPod touch 关联到您的 Netflix 帐户（很可能很快也能关联其他视频租赁服务），从而观看流媒体电视节目和电影。\n\
    \n通过您的 iPod touch，您还可以在 `Safari` 浏览器中以及通过 App Store 中的各种应用观看 YouTube 视频和网络视频。\n\
    \n**注意：** 在本书出版时，`Netflix` 应用仅在美国和加拿大可用。我们希望类似的应用能够进入更广阔的国际市场。\n\n## 将 iPod touch\
    \ 用作视频播放器\n\niPod touch 不仅是一款出色的音乐播放器，它还是一套绝佳的便携式视频播放系统。其宽屏显示、快速处理器、惊人的像素密度以及优秀的操作系统，使得观看从音乐视频到电视节目乃至全长电影的各类内容都成为一种真正的享受。iPod\
    \ touch 的尺寸非常适合靠在椅背上观看或在飞机上使用。它也是在长途驾车旅行中安抚后排孩子的利器。近 10 小时的电池续航意味着您甚至可以乘坐一次横跨大陆的航班而不用担心电量耗尽！您还可以为您的汽车购买一个“电源逆变器”，让\
    \ iPod touch 的充电时间更长（请参见第 1 章：“入门指南”中的“为 iPod touch 充电及电池使用技巧”部分）。\n\n### 将视频加载到\
    \ iPod touch\n\n您可以通过电脑上的 `iTunes` 应用或直接在 iPod touch 上的 `iTunes` 应用中加载视频，操作方式与加载音乐类似。\n\
    \n如果您在电脑上从 `iTunes` 购买或租借了视频，则可以手动或自动将这些视频同步到您的 iPod touch。\n\n### 在 iPod touch\
    \ 上观看视频\n\n要观看视频，只需轻点 `Videos` 应用。\n\n**注意：** 您还可以通过 `YouTube` 应用、`Safari` 应用以及从\
    \ App Store 加载的其他视频相关应用来观看视频。\n\n![images](img/p272-01.jpg)\n\n### 视频分类\n\n`iPod`\
    \ 应用中 `Video` 标签下的 `Videos` 应用的每个部分都由水平条分隔，水平条内显示一个或多个可能的分类名称：`Movies`、`TV Shows`、`Podcasts`\
    \ 和 `Music Videos`。第一个分类是 `Movies` 部分；如果您的 iPod touch 上已加载电影，则会显示该部分。\n\n您可能会看到更多或更少的分类，这取决于您在\
    \ iPod touch 上加载的视频类型。如果只加载了 `Movies` 和 `iTunes U` 视频，那么您将只看到这两个分类按钮。只需向上或向下滚动即可显示该分类中对应的视频。\n\
    \n![images](img/p272-02.jpg)\n\n### 搜索视频\n\n如果您的 iPod touch 上加载了大量视频和其他内容，并且想要找到某个特定的视频，可以按照以下步骤操作：\n\
    \n1.  轻点屏幕顶部的“时间”区域，跳转到搜索框。\n\n    ![images](img/p273-01.jpg)\n\n2.  输入视频标题的几个字母或一两个单词。\n\
    3.  在本示例中，我们输入了“email”，以查找与在 iPod touch 上使用电子邮件相关的任何视频。随后弹出了一个视频教程，展示如何从作者的一个网站处理电子邮件附件：[www.MadeSimpleLearining.com](http://www.MadeSimpleLearining.com)。\n\
    4.  轻点搜索结果中出现的任何视频即可开始播放。\n\n![images](img/p273-02.jpg)\n\n## 播放电影\n\n只需轻点您想观看的电影，它便会开始播放。大多数视频都利用\
    \ iPod touch 相对较大的屏幕空间，以宽屏（即横向）模式播放。只需将 iPod touch 侧向旋转即可观看。\n\n视频将自动开始播放。刚开始播放时，屏幕上除了视频本身，没有任何菜单、控制选项或其他内容。\n\
    \n您可以轻点屏幕上的任意位置，使控制栏和其他选项显示出来。`Videos` 应用中的大多数选项与 `Music` 应用中的非常相似。轻点 `Play/Pause`\
    \ 按钮，视频将暂停。再次轻点 `Play/Pause` 按钮，视频将继续播放。\n\n### 快进或快退视频\n\n`Play/Pause` 按钮的两侧分别是常用的\
    \ `Fast-Forward` 和 `Rewind` 按钮。要跳转到视频中特定的下一个章节部分，只需按住 `Fast-Forward` 按钮（位于 `Play/Pause`\
    \ 右侧）。当到达所需位置时，松开按钮，视频将恢复正常播放。\n\n按下 `Pause` 暂停视频后，您可以按住 `Fast-Forward` 或 `Rewind`\
    \ 按钮进行慢速快进或快退。有趣的是，您也能听到音频随之变慢。\n\n要快退到视频开头，请轻点 `Rewind` 按钮。要快退到特定部分或位置，请像快进视频时那样按住该按钮。\n\
    \n**注意：** 如果这是一个包含多个章节的完整长度电影，轻点 `Reverse` 或 `Fast-Forward` 将向前或向后移动一个章节。\n\n\
    ### 使用时间进度条\n\n在视频屏幕的顶部有一个滑块，您可以通过它来*拖动*视频的播放进度。如果您确切（或大致）知道要观看视频的哪个时间点，只需按住滑块并将其拖到该位置即可。有些人认为这比按住\
    \ `Fast-Forward` 或 `Rewind` 按钮要更精确一些。\n\n![images](img/p274-01.jpg)\n\n**提示：**\
    \ 向下拖动手指可以更缓慢地移动滑块控制。\n\n### 更改视频大小（宽屏 vs. 全屏）\n\n您的大多数视频将以宽屏格式播放。但是，如果某个视频未经转换以适配您的\
    \ iPod touch，或者未针对您的屏幕分辨率进行优化，您可以轻点位于上方状态栏右侧的 `Expand` 按钮。\n\n您会注意到该按钮上有两个箭头。如果处于全屏模式，箭头指向内侧，相互朝向。如果处于宽屏模式，箭头则指向外侧。\n\
    \n![images](img/p275-01.jpg)\n\n如果宽屏电影未填满 iPod touch 的整个屏幕，轻点此按钮将稍微放大。再次轻点则恢复原大小。\n\
    \n**注意：** 您也可以简单地双击屏幕来放大并填满屏幕。请注意，就像在您的宽屏电视上一样，试图将非宽屏视频强行设置为宽屏模式有时可能会导致部分画面丢失。\n"
- fmt: '#### Using AirPlay


    Apple''s AirPlay mirroring feature lets you beam your video to an Apple TV, so
    you can enjoy it on your big screen TV. Just tap the `AirPlay` button on the bottom
    right and select `Apple TV` as your output destination. After a few moments, your
    iPod touch screen will go dark and your video will start to play on your big screen
    TV, right where you left off.


    ![images](images/p275-02.jpg)


    To return the video to your iPod touch, tap `AirPlay` again and choose `iPod touch`
    as the destination.


    ![images](images/p275-03.jpg)


    **TIP:** If you don''t have or want an Apple TV, you have a couple other ways
    to watch your movies. For example, you can purchase a VGA or HDMI adapter to plug
    your iPod touch into a VGA computer monitor or HDTV.


    VGA supports video only, requires that the app support this feature, and it isn''t
    usually compatible with DRM. HDMI supports video and audio, and it also requires
    that the app support that feature. However, it''s also HDCP-compliant, so it will
    work with DRM content like iTunes videos.


    Apple also makes component video cables that are DRM-compliant and work with most
    TVs.


    See the "Accessories" section of the Quick Start Guide for more information.


    #### Using the Chapters Feature


    Most full-length movies purchased from the iTunes store—and some that are converted
    for the iPod touch—will give you a Chapters feature. Watching one of these on
    your iPod touch is very much like watching a DVD on your home TV.


    Just bring up the controls for the video by tapping the screen, and then select
    `Chapters`.


    ![images](images/p276-01.jpg)


    This will bring you back to the main page for the movie.


    Tap the `Chapters` button in the upper-right corner, and then scroll through to
    find and then touch the chapter you wish to watch.


    #### Viewing the Chapters


    You can scroll through or flick through quickly to locate the scene or chapter
    that you wish to watch.


    You will also notice that, to the far right of each chapter, is the exact time
    (relative to the start of the movie) that the chapter begins.


    ![images](images/p277-01.jpg)


    In addition to the chapter menu mentioned previously, you can also quickly advance
    to the previous or next chapter in a movie by tapping the `Rewind` or `Fast-Forward`
    button. One tap moves you one chapter in either direction.


    **NOTE:** The Chapters feature usually works only with movies that are purchased
    from the iTunes store. Movies that are converted and loaded onto your iPod touch
    usually will not have chapters.


    ### Watching a TV Show


    The iPod touch is great for watching your favorite TV shows. You can purchase
    TV shows from the iTunes store, and you can download sample shows from some iPod
    touch apps, such as the `Hulu Plus` app.


    Just scroll down to the `TV Shows` category separator to see the shows you have
    downloaded on your iPod touch. Scroll through your available shows and touch `Play`.
    The video controls work just like the controls for watching a movie.


    ![images](images/p277-02.jpg)


    **NOTE:** At the time of writing, iTunes in the Cloud allows users in the U.S.
    to re-download previously purchased TV shows directly onto their iPod touch (see
    [Chapter 21](#Chapter21.html#ch21): "iTunes on Your Device" for more information).


    ### Watching Podcasts


    We normally think of podcasts as being audio-only broadcasts that you can download
    using iTunes. Video podcasts are now quite prevalent and can be found on any number
    of sites, including many public broadcasting web sites. They can also be found
    in the `iTunes U` section of iTunes; this section lists university podcasts and
    other, related information.


    ![images](images/p278-01.jpg)


    Here''s an interesting iTunes U story from Gary Mazo:


    > "Recently, I was browsing the `iTunes U` section inside the `iTunes` app on
    the iPod touch with my son, who was just accepted to CalTech. We were wondering
    about the housing situation and, lo and behold, we found a video podcast showing
    a tour of the CalTech dorms. We downloaded it, and the podcast went right into
    the `podcast` directory for future viewing. We were able to do a complete virtual
    tour of the housing without flying out there from the East Coast."


    ### Watching Music Videos


    Music videos are available for your iPod touch from a number of sources. Often,
    if you buy a "Deluxe" album from iTunes, it will include a music video or two.
    You can also purchase music videos from the iTunes store, and many record companies
    and recording artists make them available for free on their web sites.


    Music videos will automatically get sorted into the `Music Videos` section of
    your `Videos` app.


    The `Music Videos` are usually located right under `TV Shows` in the `Videos`
    list. The controls work just as they do in all other video applications.


    ![images](images/p278-02.jpg)


    ### Video Options


    As in your music player, there are a few options that you can adjust for the video
    player. These options are accessed through the `Settings` icon from your `Home`
    screen.


    Tap the `Settings` icon, scroll down to tap `Video` to see the available options.


    Here you can also set your Home Sharing settings to be able to watch videos that
    are stored on your computer''s iTunes library right from your iPod touch.


    ![images](images/p279-01.jpg)


    #### The Start Playing Option


    Sometimes, you will have to stop watching a particular video. This option lets
    you decide what to do the next time you want to watch that video. Your options
    are either to watch the video from the beginning or to watch from where you left
    off. Just select the option that you prefer and that will be the action your iPod
    touch takes from now on.


    ![images](images/p279-02.jpg)


    #### Closed Captioning


    If your video has closed captioning capabilities, setting the `Closed Captioning`
    switch to `ON` will let you see closed captioning on your screen.


    ### Deleting Videos


    To delete a video (to save space on your iPod touch), just scroll up or down and
    select the video to delete.


    **NOTE:** If you''re syncing videos from iTunes, make sure to uncheck the video
    you''re deleting from there as well; otherwise, iTunes just might sync it right
    back to your iPod touch on the next sync!


    Just touch and swipe to the right on a video you wish to delete. As when deleting
    an email, a red `Delete` button will appear in the top-left corner. Touch the
    `Delete` button and you will be prompted to delete the video.


    Finally, touch the `Delete` button and the video will be deleted from your system.


    **NOTE:** This process deletes the video only from your iPod touch—a copy will
    still remain in your video library in iTunes, assuming that you have synced with
    your computer after purchasing the video. You can load it back onto your iPod
    touch at a later time, if you so desire. However, if you delete a rented movie
    from the iPod touch, it will be deleted permanently!


    ### YouTube on your iPod touch


    Watching YouTube videos is certainly one of the most popular things for people
    to do on their computers these days. Now YouTube is as close to you as your iPod
    touch.


    You can see the `YouTube` icon on your `Home` screen. Just touch this icon to
    be taken to the `YouTube` app.


    ![images](images/p280-01.jpg)


    #### Searching for YouTube Videos


    When you first start `YouTube`, you usually see the `Featured` videos on YouTube
    that day.


    Just scroll through the video choices as you do in other apps.


    ![images](images/p280-02.jpg)'
