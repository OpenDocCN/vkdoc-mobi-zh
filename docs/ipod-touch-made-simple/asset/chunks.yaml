- fmt: "# 长按键盘快捷输入符号及其他功能\n\n你可能想知道如何输入键盘上未显示的符号。\n\n**提示：** 你可以输入比屏幕上显示的更多的符号。\n\n\
    你只需要长按与所需符号相关的字母、数字或符号即可。\n\n例如，如果你想输入日元符号（`¥`），请长按`$`键，直到看到其他选项。接着，向上滑动手指以高亮选中日元符号，然后松开手指。\n\
    \n![images](images/p78-01.jpg)\n\n此技巧同样适用于`Safari`浏览器中的`.com`键，以及在输入电子邮件地址时长按`Period`（`.`）键。通过长按`.com`或`Period`键，你还可以获得其他网站后缀。\n\
    \n![images](images/p78-02.jpg)\n\n上图显示了`.co`、`.uk`、`.ie`、`.de`、`.ca`和`.eu`键。这些键在标准美式键盘上并不显示，但在此处出现是因为我们安装了额外的国际键盘。你将在本章稍后的“用其他语言输入——国际键盘”部分学习如何启用国际键盘。\n\
    \n**提示：更多实用但隐藏的符号**\n\n在`Symbols`键盘上，`Backspace`键的正上方有一个很好的项目符号字符。你还可以通过长按`Zero`键（`0`）获得度数符号。此外，长按`?`和`!`键可以获取对应的西班牙语倒置符号。\n\
    \n## 大写锁定\n\n双击`Shift`键即可开启大写锁定功能。当`Shift`键变为蓝色时，表示该功能已开启。![images](images/p79-01.jpg)\n\
    \n要关闭大写锁定，只需再次按下`Shift`键![images](images/p79-02.jpg)即可。\n\n## 快速选择、删除或更改文本\n\n\
    你可能需要快速更改或删除正在输入的文本。请按照以下步骤操作：\n\n1.  通过双击选中要更改或删除的部分文本。\n\n    ![images](images/p79-03.jpg)\n\
    \n2.  拖动蓝色手柄调整选区。\n\n    ![images](images/p79-04.jpg)\n\n3.  要删除选中的文本，请按下`Backspace`键。\n\
    \n    ![images](images/p79-05.jpg)\n\n4.  要替换文本，只需开始输入。输入的字母将立即替换选中的文本。\n\n  \
    \  ![images](images/p79-06.jpg)\n\n## 键盘选项与设置\n\n有一些键盘选项可以让你的`iPod touch`输入更便捷。这些键盘选项位于`Settings`应用的`General`标签中。请按照以下步骤访问：\n\
    \n1.  点击`Settings`图标。\n2.  点击`General`。\n3.  向上滑动，然后点击页面底部的`Keyboard`。\n\n![images](images/p80-01.jpg)\n\
    \n### 将自动更正设置为“开”或“关”\n\n如前所述，自动更正功能将使用`iPod touch`的内置词典自动修正常见的拼写错误。如果你希望此功能生效，需要确保其设置为`ON`（这是默认设置）。\n\
    \n### 自动大写\n\n当你开始一个新句子时，如果`Auto-Capitalization`选项设置为`ON`，单词将自动大写。\n\n此功能也会正确大写常见的专有名词。例如，如果你输入“`New\
    \ york`”，系统会提示你将其改为“`New York`”——同样，只需按`Space`键即可应用更正。如果你退格删除一个大写字母，`iPod touch`会假定你输入的新字母也应大写。此功能默认也设置为`ON`。\n\
    \n![images](images/p80-02.jpg)\n\n### 启用大写锁定\n\n有时你可能只想输入大写字母：只需双击`Caps`键即可。\n\
    \n此功能默认为`OFF`。\n\n### “.”快捷键\n\n如果你双击`Space`键，它会自动在句末添加句点；此功能默认为`ON`。\n\n## 用其他语言输入——国际键盘\n\
    \n在撰写本文时，`iPod touch`支持你输入超过十种不同语言，从荷兰语到西班牙语应有尽有。一些亚洲语言，如日语和中文，提供了两种或三种键盘以适应不同的输入方法。\n\
    \n### 添加新的国际键盘\n\n请按照以下步骤启用各种语言键盘：\n\n1.  点击`Settings`图标。\n2.  点击`General`。\n\
    3.  点击页面底部的`Keyboard`。\n4.  点击`International Keyboards`。\n5.  点击`Add New Keyboard`。\n\
    6.  点击列表中任意键盘或语言以添加。你现在会看到该键盘出现在可用键盘列表中。\n7.  在`Symbols`键盘上，`Backspace`键的正上方有一个很好的项目符号字符。你还可以通过长按`Zero`键（`0`）获得度数符号。此外，长按`?`和`!`键可以获取对应的西班牙语倒置符号。\n\
    \n**提示：** `iOS 5`包含一个内置的`Emoji`键盘。`Emoji`是一个包含大量日本符号的集合，包括各种笑脸和哭脸、节日图片、建筑和车辆等等。虽然这些符号在日本有更具体的含义，但世界各地的人们已开始在短信、推特和其他在线消息服务中使用它们。\n\
    \n`Emoji`键盘可以像其他任何键盘一样在“设置”中添加。\n\n![images](images/p82-01.jpg)\n\n### 编辑、重新排序或删除键盘\n\
    \n你可能希望调整键盘的选项、更改键盘在列表中的显示顺序，或直接删除不再使用的键盘。请按照以下步骤操作：\n\n1.  按照本章前面“添加新的国际键盘”部分中的步骤1-4操作；这将让你查看国际键盘列表。\n\
    2.  要调整特定键盘的选项，请在键盘列表中点击它。在我们的示例中，我们点击了`French (Canada)`。\n3.  通过点击相应部分中的选项更改`Software\
    \ Keyboard Layout`。\n4.  通过点击相应部分中的选项调整`Hardware Keyboard Layout`。\n5.  点击左上角的`Keyboards`按钮以保存选择并返回键盘列表。\n\
    \n    ![images](images/p83-01.jpg)\n\n6.  要重新排序或删除键盘，请点击右上角的`Edit`按钮。\n7.  要更改键盘顺序，请触摸并拖动键盘右侧带有三条灰色横线的边缘向上或向下。\n\
    8.  要删除键盘，请点击`Red Minus Sign`使其摆动到垂直位置，然后点击`Delete`。\n9.  要结束键盘编辑，请点击右上角的`Done`按钮。\n\
    \n![images](images/p83-02.jpg)\n\n当你安装了至少一个国际键盘后，你会注意到出现了一个小小的`Globe`键。按下`Globe`键可以在所有语言之间循环切换。\n\
    \n**提示：** 你可以长按`Globe`键查看可用键盘列表。这使你能快速选择想要使用的键盘。如果\n\n![images](images/p84-01.jpg)\n\
    \n日语、中文和其他一些语言提供了多种键盘选项以满足你的输入偏好。\n\n在某些语言（如日语）中，你会看到输入的字母变为字符，或者你可以自己手绘字符。你也可能在键盘上方看到一排其他字符组合。当你看到需要的组合时，点击它即可。"
  raw: "#### Press and Hold Keyboard Shortcut for Typing Symbols and More\n\nYou might\
    \ wonder how you can type symbols not shown on the keyboard.\n\n**TIP:** You can\
    \ type more symbols than are shown on the screen.\n\nAll you do is press and hold\
    \ a letter, number, or symbol that is related to the symbol you want.\n\nFor example,\
    \ if you want to type the YEN symbol (¥), you press and hold the **$** key until\
    \ you see the other options. Next, slide up your finger to highlight the YEN symbol,\
    \ and then let go.\n\n![images](images/p78-01.jpg)\n\nThis tip also works with\
    \ the **.com** key in the **Safari** web browser and when typing e-mail addresses\
    \ by pressing and holding the **Period** (.) key. You can get additional web site\
    \ suffixes by pressing and holding the **.com** or **Period** keys.\n\n![images](images/p78-02.jpg)\n\
    \nThe preceding figure shows the **.co**, **uk**, **.ie**, **.de, .ca,** and **.eu**\
    \ keys. These keysare not displayed on the standard US keyboard, but they are\
    \ present in this case because we have installed additional international keyboards.\
    \ You will learn how to enable international keyboards in the “Typing in Other\
    \ Languages—International Keyboards” section later in this chapter.\n\n**TIP:\
    \ A Few More Useful but Hidden Symbols**\n\nThere is a good bullet point character\
    \ on the **Symbols** keyboard just above the **Backspace** key. You can also get\
    \ a degree symbol if you press and hold the **Zero** key (**0**). Also, you can\
    \ press and hold the **?** and **!** keys to get their inverted Spanish cousins.\n\
    \n### Caps Lock\n\nYou double-press the **Shift** key to turn on the Caps Lock\
    \ feature. You know it's turned on when the **Shift** key turns blue.![images](images/p79-01.jpg)\n\
    \nTo turn off Caps Lock, simply press the **Shift** key ![images](images/p79-02.jpg)\
    \ again.\n\n### Quickly Selecting and Deleting or Changing Text\n\nYou may need\
    \ to quickly change or delete some text you are typing. Follow these steps to\
    \ do so:\n\n1.  Select a part of the text you want to change or delete by double-tapping\
    \ it.\n\n    ![images](images/p79-03.jpg)\n\n2.  Adjust the selection by dragging\
    \ the blue handles.\n\n    ![images](images/p79-04.jpg)\n\n3.  To erase the selected\
    \ text, press the **Backspace** key.\n\n    ![images](images/p79-05.jpg)\n\n4.\
    \  To replace the text, simply start typing. The text will be instantly replaced\
    \ by the letters you type.\n\n    ![images](images/p79-06.jpg)\n\n### Keyboard\
    \ Options and Settings\n\nThere are a few keyboard options to make typing on your\
    \ iPod touch easier. These keyboard options are located in the **General** tab\
    \ of your **Settings** app. Follow these steps to access them:\n\n1.  Tap the\
    \ **Settings** icon.\n2.  Tap **General**.\n3.  Swipe up, then tap **Keyboard**\
    \ near the bottom of the page.\n\n![images](images/p80-01.jpg)\n\n#### Setting\
    \ Auto-Correction toON or OFF\n\nAs noted earlier in this chapter, the Auto-Correctionfeature\
    \ will use the iPod touch's built-in dictionary to automatically make changes\
    \ to commonly misspelled words. You need to make sure it is **ON** if you want\
    \ this feature to work. (This is the default setting.)\n\n#### Auto-Capitalization\n\
    \nWhen you start a new sentence, words will automatically be capitalized if the\
    \ **Auto-Capitalization** option is set to **ON**.\n\nThis feature will also correctly\
    \ capitalize common proper nouns. For example, if you type “New york,” then you\
    \ will be prompted to change it to “New York”—again, just pressing the **Space**\
    \ key will implement the correction. If you backspace over a capital letter, the\
    \ iPod touch will assume the new letter you type should be capitalized, as well.\
    \ This feature is also set to **ON** by default.\n\n![images](images/p80-02.jpg)\n\
    \n#### Enabling Caps Lock\n\nSometimes you may want to type only capital letters;\
    \ to do so, simply double-tap the **Caps** key.\n\nThis feature is set to **OFF**\
    \ by default.\n\n#### The “.” Shortcut\n\nIf you double-press the **Space** key,\
    \ it will automatically put in a period at the end of a sentence; this feature\
    \ is set to **ON** by default.\n\n### Typing in Other Languages—International\
    \ Keyboards\n\nAt the time of writing, the iPod touch enables you to type in more\
    \ than a dozen different languages, including everything from Dutch to Spanish.\
    \ Some of the Asian languages, such as Japanese and Chinese, offer two or three\
    \ keyboards for different typing methods.\n\n#### Adding a New International Keyboard\n\
    \nFollow these steps to enable various language keyboards:\n\n1.  Tap the **Settings**\
    \ icon.\n2.  Tap **General**.\n3.  Tap **Keyboard** near the bottom of the page.\n\
    4.  Tap **International Keyboards**.\n5.  Tap **Add New Keyboard**.\n6.  Tap any\
    \ keyboard or language listed to add it. You will now see the keyboard appear\
    \ on the list of available keyboards.\n7.  There is a good bullet point character\
    \ on the **Symbols** keyboard just above the **Backspace** key. You can also get\
    \ a degree symbol if you press and hold the **Zero** key (**0**). Also, you can\
    \ press and hold the **?** and **!** keys to get their inverted Spanish cousins.\n\
    \n**TIP:** iOS 5 includes a built –in Emoji keyboard. Emoji is an extensive collection\
    \ of Japanese symbols, including various smiley and frowny faces, holiday images,\
    \ buildings and vehicles, and much more. While their meanings are more specific\
    \ in Japan, people around the world have begun using them in SMS, Twitter, and\
    \ other online messaging services.\n\nThe Emoji keyboard can be added in Settings\
    \ just like any other keyboard.\n\n![images](images/p82-01.jpg)\n\n#### Editing,\
    \ Re-Ordering, or Deleting Keyboards\n\nYou may want to adjust options for a keyboard,\
    \ re-order how the keyboards appear in a list, or simply remove a keyboard that\
    \ you no longer use. Follow these steps to do so:\n\n1.  Follow Steps 1–4 under\
    \ the “Adding a New International Keyboard” section earlier in this chapter; this\
    \ will let you view the list of international keyboards.\n2.  To adjust options\
    \ for a specific keyboard, tap it in the list of keyboards. In our example, we\
    \ tapped **French (Canada)**.\n3.  Change the **Software Keyboard Layout** by\
    \ tapping the choice in that section.\n4.  Adjust the **Hardware Keyboard Layout**\
    \ by tapping a choice in that section.\n5.  Tap the **Keyboards** button in the\
    \ upper-left corner to save your choices and return to the list of keyboards.\n\
    \n    ![images](images/p83-01.jpg)\n\n6.  To re-order or delete a keyboard, tap\
    \ the **Edit** button in the upper-right corner.\n7.  To change the order of keyboards,\
    \ touch and drag the right edge of the keyboard with the three gray bars up or\
    \ down.\n8.  To delete a keyboard, tap the **Red Minus Sign** so it swings to\
    \ the vertical position, then tap **Delete.**\n9.  To finish editing your keyboards,\
    \ tap the **Done** button in the upper-right corner.\n\n![images](images/p83-02.jpg)\n\
    \nYou will notice a little **Globe** key appears when you install at least one\
    \ international keyboard. Press the **Globe** key to cycle between all the languages.\n\
    \n**TIP:** You can press and hold the **Globe** key to see a list of available\
    \ keyboards. This will enable you to quickly select the keyboard you wish to use.\
    \ If\n\n![images](images/p84-01.jpg)\n\nJapanese, Chinese, and some other languages\
    \ provide several keyboard options to meet your typing preferences.\n\nIn some\
    \ of the languages (such as Japanese), you will see the letters typed change into\
    \ characters, or you can draw the characters yourself. You may also see a row\
    \ of other character combinations above the keyboard. When you see the combination\
    \ you want, tap it."
