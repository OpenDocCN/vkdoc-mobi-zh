    \ **My Documents** button in the upper-left corner.\n\n![images](images/p270-01.jpg)\n\
    \n#### Connecting to Google Docs and other Servers with GoodReader\n\nYou can\
    \ also connect to **Google Docs** and other servers with **GoodReader**. Follow\
    \ these steps to do so:\n\n1.  In the **Web Downloads** tab, choose **Connect\
    \ to Servers**.\n2.  Select **Google Docs.** (You can select a number of different\
    \ servers: mailservers, MobileMe iDisk, Public iDisk, Dropbox, box.net, FilesAnywhere.com,\
    \ MyDisk.se, WebDAV Server, and FTP Servers.)\n3.  Enter your **Google Docs**\
    \ username and password to log in.\n4.  Once you've made the connection, a new\
    \ **Google Docs Server** icon will appear under the **Connect to Server** tab\
    \ on the right side of the page.\n5.  Tap the new **Google** tab to connect to\
    \ the server (an Internet connection is required).\n6.  Now you'll see a list\
    \ of all the documents you have stored on **Google Docs**. Tap any document and\
    \ select the file type to download it. Usually, PDF works well for this. (Google\
    \ docs can do a **Save As...**, and PDF files are easier to work with.)\n\nOnce\
    \ the file is downloaded, it will appear on the left side of **GoodReader**; you\
    \ can simply touch it to open it.\n\n## Chapter 14"
  trans: "\n### Zinio 杂志应用——体验版\n\n`Zinio` 应用采用了一种独特的方式。这款应用在 App Store 上是免费的，它能让你订阅数百种杂志。在\
    \ `Zinio` 中阅读杂志只需几个简单的步骤：\n\n1.  登录 `Zinio` 应用（你可以创建一个免费账户）。\n2.  在`我的资料库`区域查看并下载免费样本，或点击底部的`商店`按钮购买杂志。\n\
    3.  有些杂志可能会提供完整的免费期数。只需查看`我的资料库`区域，看看有哪些可用的内容。\n\n![images](img/p265-01.jpg)\n\
    \n有许多流行杂志可供选择。类别涵盖了从艺术到体育等方方面面。价格各不相同，但通常你可以选择购买单期或订阅一年。\n\n例如，最新一期的*大众机械*在 `Zinio`\
    \ 上的售价为 1.99 美元，而一年订阅价为 7.99 美元。\n\n有些订阅非常划算。撰写本文时，一本*自行车杂志*的单期售价为 4.99 美元，而一年订阅价仅为\
    \ 9.00 美元。\n\n仔细一看，撰写本文时可供订阅的自行车杂志超过 16 种。\n\n![images](img/p265-02.jpg)\n\n###\
    \ 漫画书\n\n随着 iPod touch 的出现，一种有望卷土重来的“新媒体”类型是漫画书。iPod touch 凭借其高清屏幕和强大的处理器，让漫画书的页面变得栩栩如生。\n\
    \n目前已有几款漫画书应用可用，其中包括来自著名的漫威漫画公司的应用。DC 漫画公司也刚刚推出了自己的应用。这款应用与制作漫威应用的是同一家公司。\n\n\
    要在 App Store 中找到 `Marvel Comics` 应用，请前往`类别`，然后选择`图书`。该应用是免费的，你可以从应用内购买漫画书。\n\n\
    在`主页`屏幕的底部，你会看到五个按钮：`我的漫画`、`精选`、`免费`、`前 25 名`和`浏览`。你购买的漫画将归在`我的漫画`标题下。\n\nApp\
    \ Store 让你有机会下载免费漫画和单期在售漫画。大多数售价为每期 1.99 美元。\n\n每个标签都会带你进入一个新的漫画列表进行浏览，非常类似于 iTunes\
    \ 商店。\n\n点击`浏览`按钮，可以按`系列`、`创作者`、`类型`、`评级`、`故事线/剧情弧`或`发售日期`进行浏览。或者你也可以输入搜索词来寻找特定的漫画。\n\
    \n![images](img/p266-01.jpg)\n\n你可以通过两种方式阅读漫画书。第一种，你可以滑动翻页，一页一页地阅读。第二种，你可以双击某个画格进行`放大`，然后点击屏幕前进到漫画条带中的下一个画格。从那里，你只需从右向左滑动即可前进一个画格；或者，如果你想返回，则从左向右滑动。\n\
    \n要返回`主页`屏幕或查看屏幕选项，只需点击屏幕中央。你会在左上角看到一个`设置`按钮。点击它，你可以`跳转到第一页`、`浏览到某一页`，或进入`设置`菜单。\n\
    \n![images](img/p267-01.jpg)\n\n**注意：** 这款应用的开发者 `ComiXology` 也制作了包含漫威漫画的应用，以及其他许多漫画应用，包括\
    \ DC、阿奇、映像和 Top Cow。\n\n### 将 iPod touch 用作 PDF 阅读器\n\n有几种程序可以将 iPod touch 变成一个功能强大的\
    \ PDF 阅读程序。例如，你也可以在 `iBooks` 应用中阅读 PDF 文件。然而，另一款出色的 PDF 阅读器叫做 `GoodReader for\
    \ iPhone`。（没错——它写着“for iPhone”，但你完全可以在你的 iPod touch 上正常使用）。\n\n**注意：** 第 16 章：“使用电子邮件通信”向你展示了如何打开附件，包括\
    \ PDF 文件。`GoodReader` 应用的一大好处是，它允许你使用 Wi-Fi 传输大型 PDF 文件。\n\n你可以在 App Store 的`效率`类别中找到\
    \ `GoodReader for iPhone` 应用。撰写本文时，这款应用售价为 4.99 美元。\n\n**注意：** `iBooks` 也可以阅读作为电子邮件附件发送的\
    \ PDF 文件。如果已安装 `iBooks`，只需在打开 PDF 时选择`在 iBooks 中打开`即可。\n\n![images](img/p268-01.jpg)\n\
    \n#### 将文件传输到你的 iPod touch\n\n`GoodReader for iPhone` 应用的一大优点是，你可以使用它将大文件从你的 Mac\
    \ 或 PC 无线传输到 iPod touch，以便在 `GoodReader` 应用中查看。你也可以像第 3 章：“与 iCloud、iTunes 等同步”中所讨论的那样，使用\
    \ `GoodReader` 在 iTunes 中进行文稿共享。按照以下步骤使用 `GoodReader` 传输文件：\n\n1.  点击屏幕左下角的小`Wi-Fi`图标，\n\
    \n    ![images](img/p269-01.jpg) 然后会弹出`Wi-Fi 传输工具`。系统会提示你在浏览器中输入一个 IP 地址，或者如果你使用\
    \ `Bonjour` 服务，则输入 Bonjour 地址。\n\n2.  将 `GoodReader` 窗口中显示的地址输入到电脑的网页浏览器中。现在，你可以将你的电脑当作服务器。你会看到你的电脑和\
    \ iPod touch 现在已连接。你可以在浏览器中为这个页面添加书签，但请注意，如果你重启无线网络路由器并且你的 iPod touch 获得了不同的无线网络地址，这个地址可能会改变。\n\
    3.  在电脑的网页浏览器中点击`选择文件`按钮，找到要上传到 iPod touch 的文件。\n4.  选择文件后，点击`上传所选文件`，文件将自动传输到你的\
    \ iPod touch。\n\n这有什么用呢？举个例子，对于其中一位作者（加里）来说，iPod touch 已经成为存放超过 100 份钢琴乐谱的存储库。这意味着不再需要下载\
    \ PDF 文件、打印出来、装进活页夹，然后还要努力记住哪首歌在哪个活页夹里。现在，他所有的乐谱都编录在 iPod touch 上。他只需将 iPod touch\
    \ 放在钢琴上，就能在一个地方访问他所有的乐谱。\n\n**注意：** `GoodReader` 甚至可以解压你作为电子邮件附件接收的文件。\n\n浏览 `GoodReader`\
    \ PDF 阅读器非常容易。这款应用比其他应用更灵敏，所以快速点击屏幕中央即可调出屏幕控件。然后你可以进入你的资料库，或点击`翻页`图标翻页。\n\n浏览页面最简单的方法是点击屏幕右下角前进一页，或点击屏幕左上角返回一页。过一会儿，这就会变得非常自然。\n\
    \n你也可以向上或向下轻弹来翻页。\n\n要转到另一个 PDF 文件或另一份乐谱，只需快速点击 iPod touch 屏幕中央，然后点击左上角的`我的文稿`按钮即可。\n\
    \n![images](img/p270-01.jpg)\n\n#### 使用 GoodReader 连接到 Google Docs 及其他服务器\n\n\
    你也可以使用 `GoodReader` 连接到 `Google Docs` 及其他服务器。请按照以下步骤操作：\n\n1.  在`网页下载`标签中，选择`连接到服务器`。\n\
    2.  选择 `Google Docs`。（你可以选择多种不同的服务器：邮件服务器、MobileMe iDisk、公共 iDisk、Dropbox、box.net、FilesAnywhere.com、MyDisk.se、WebDAV\
    \ 服务器和 FTP 服务器。）\n3.  输入你的 `Google Docs` 用户名和密码进行登录。\n4.  建立连接后，一个新的 `Google Docs\
    \ 服务器`图标将出现在页面右侧的`连接到服务器`标签下。\n5.  点击新的 `Google` 标签以连接到服务器（需要互联网连接）。\n6.  现在你会看到你存储在\
    \ `Google Docs` 上的所有文档列表。点击任何文档并选择文件类型进行下载。通常，PDF 格式效果很好。（Google Docs 可以执行`另存为...`操作，并且\
    \ PDF 文件更容易处理。）\n\n文件下载完成后，它将出现在 `GoodReader` 的左侧；你可以直接点击它将其打开。\n\n## 第 14 章\n"
- fmt: "# Viewing Videos\n\nThe iPod touch gives you an amazing platform to enjoy\
    \ videos, TV shows and movies. Nowhere is this more apparent than in the various\
    \ video-viewing applications available.\n\nIn this chapter, we will show you how\
    \ you can watch movies, TV shows, podcasts, and music videos on your iPod touch.\n\
    \nYou can buy or download many videos for free from the iTunes store or iTunes\
    \ University. You can also link your iPod touch to your Netflix account (and most\
    \ likely other video rental services soon), allowing you to watch streaming TV\
    \ shows and movies.\n\nWith your iPod touch, you can also watch YouTube videos\
    \ and videos from the Web on your `Safari` browser and through various apps from\
    \ the App Store.\n\n**NOTE:** At the time of publishing, the `Netflix` app was\
    \ only available in the U.S. and Canada. We hope similar apps will make their\
    \ way to the broader international market.\n\n## Your iPod touch as a Video Player\n\
    \nThe iPod touch is more than a capable music player; it is also a fantastic portable\
    \ video-playing system. Its widescreen, fast processor, incredible pixel density,\
    \ and great operating system make watching anything from music videos to TV shows\
    \ and full-length motion pictures a real joy. The size of the iPod touch is perfect\
    \ for sitting back in a chair or watching on an airplane. It is also great for\
    \ the kids in the back seat of long car trips. The near 10-hour battery life means\
    \ you can even go on a coast-to-coast flight and not run out of power! You can\
    \ also buy a “power inverter” for your car to keep the iPod touch charged even\
    \ longer (see the “Charging Your iPod touch and Battery Tips” section in [Chapter\
    \ 1](#Chapter01.html#ch1): “Getting Started”).\n\n### Loading Videos onto Your\
    \ iPod touch\n\nYou can load videos on your iPod touch just like your music by\
    \ using the `iTunes` app on your computer or right from the `iTunes` app on your\
    \ iPod touch.\n\nIf you purchase or rent videos from `iTunes` on your computer,\
    \ then you will manually or automatically sync these videos to your iPod touch.\n\
    \n### Watching Videos on the iPod touch\n\nTo watch videos, simply tap your `Videos`\
    \ app.\n\n**NOTE:** You can also watch videos from the `YouTube` app, the `Safari`\
    \ app, and other video-related apps you load from the App Store.\n\n![images](images/p272-01.jpg)\n\
    \n### Video Categories\n\nEach section of the `Videos` app under the `Video` tab\
    \ in the `iPod` app is separated by horizontal bars with one of several possible\
    \ category names inside the bar: `Movies`, `TV Shows`, `Podcasts`, and `Music\
    \ Videos`. The first category is the `Movies` section; these will be visible if\
    \ you have movies loaded on the iPod touch.\n\nYou may see more or fewer categories\
    \ depending on the types of videos you have loaded on your iPod touch. If you\
    \ have only `Movies` and `iTunes U` videos, then you will see only those two category\
    \ buttons. Just scroll up or down to show the corresponding videos in that category.\n\
    \n![images](images/p272-02.jpg)\n\n### Searching for Videos\n\nIf you have a lot\
    \ of videos, and other content loaded on your iPod touch and want to find a particular\
    \ video, you can do it by following these steps:\n\n1.  Tap the time at the very\
    \ top of your screen to jump to the search box.\n\n    ![images](images/p273-01.jpg)\n\
    \n2.  Type a few letters or a word or two of the title of the video.\n3.  In this\
    \ example we typed “email” to find any videos related to using email on our iPod\
    \ touch. Up popped a video tutorial showing how to work with email attachments\
    \ from one of the author's web sites: [www.MadeSimpleLearining.com](http://www.MadeSimpleLearining.com).\n\
    4.  Tap any video that appears in the search results to start playing it.\n\n\
    ![images](images/p273-02.jpg)\n\n## Playing a Movie\n\nJust tap the movie you\
    \ wish to watch and it will begin to play. Most videos take advantage of the relatively\
    \ large screen real estate of the iPod touch by playing in Widescreen (i.e., Landscape)\
    \ mode. Just turn your iPod touch on its side to watch them.\n\nA video will begin\
    \ playing automatically. When it first starts, there are no menus, controls, or\
    \ anything else on the screen, except for the video.\n\nYou can tap anywhere on\
    \ the screen to make the control bars and other options become visible. Most options\
    \ in the `Videos` app are very similar to those in the `Music` app Tap the `Play/Pause`\
    \ button and the video will pause. Tap the `Play/Pause` button again and the video\
    \ will resume playing.\n\n### Fast-Forward or Rewind the Video\n\nOn either side\
    \ of the `Play/Pause` button are the usual `Fast-Forward` and `Rewind` buttons.\
    \ To jump to the next chapter-specific part of the video, just touch and hold\
    \ the `Fast-Forward` button (to the right of `Play/Pause`). When you get to the\
    \ desired spot, release the button and the video will begin playing normally.\n\
    \nAfter pressing `Pause` to stop the video, you can press and hold the `Fast-Forward`\
    \ or `Rewind` buttons to do slow motion forward or backward. The fun thing is\
    \ that you can hear the audio slowed down as well.\n\nTo rewind to the beginning\
    \ of the video, tap the `Rewind` button. To rewind to a specific part or location,\
    \ touch and hold as you did while you were fast forwarding the video.\n\n**NOTE:**\
    \ If this is a full-length movie with several chapters, tapping either `Reverse`\
    \ or `Fast-Forward` will move either back or ahead one chapter.\n\n### Using the\
    \ Time Scrubber Bar\n\nAt the top of the video screen is a slider that lets you\
    \ *scrub* through the elapsed time of the video. If you know exactly (or approximately)\
    \ which point in the video you wish to watch, just hold the slider bar and then\
    \ drag it to that location. Some people find this to be a little more exact than\
    \ holding down the `Fast-Forward` or `Rewind` buttons.\n\n![images](images/p274-01.jpg)\n\
    \n**TIP:** Drag your finger down to move the slider control more slowly.\n\n###\
    \ Changing the Size of the Video (Widescreen vs. Full Screen)\n\nMost of your\
    \ videos will play in widescreen format. However, if you have a video that was\
    \ not converted for your iPod touch or is not optimized for your screen resolution,\
    \ you can touch the `Expand` button, which is to the right of the upper Status\
    \ bar.\n\nYou will notice that there are two arrows on the button. If you are\
    \ in Full Screen mode, the arrows point in, toward each other. If you are in Widescreen\
    \ mode, the arrows point outward.\n\n![images](images/p275-01.jpg)\n\nIf a widescreen\
    \ movie is not taking up the full screen of the iPod touch, touching this button\
    \ will zoom in a bit. Touching it again will zoom back out.\n\n**NOTE:** You can\
    \ also simply double-tap the screen to zoom in and fill the screen. Be aware that,\
    \ just like on your widescreen TV, trying to force a non-widescreen video into\
    \ Widescreen mode can sometimes cause you to lose part of the picture."
