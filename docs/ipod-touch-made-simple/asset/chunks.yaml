    \ and then set **Auto–Lock** to as short a value as possible—you can set it to\
    \ as short as **1 minute** if you like.\n*   **Turn off push email and push notifications.**\n\
    \nYou can learn more battery life tips by visiting the Apple web site at [www.apple.com/batteries/iPod\
    \ touch.html.](http://www.apple.com/batteries/iPodtouch.html)\n\n###### Making\
    \ the Battery Last Longer\n\nThe iPod touch uses a rechargeable battery that has\
    \ a limited number of cycles during its useful life; in other words, it will gradually\
    \ lose its ability to maintain a charge over time. You can extend the life of\
    \ your iPod touch battery by making sure you run it down completely at least once\
    \ a month. The rechargeable battery will last longer if you do this."
  trans: "\n#### 包装盒内物品\n\n如果你是首次接触`iPod touch`，可能会觉得包装盒内容有些单薄。不过，盒中确实包含了上手使用和享受`iPod\
    \ touch`所需的一切——除了那份详尽的使用手册（这正是我们编写本书的原因！）。以下是包装盒内的物品：\n\n*   **iPod touch**：打开包装盒最上层，你首先看到的就是崭新的`iPod\
    \ touch`。\n*   **纸质文件夹**：在放置`iPod touch`的塑料托架下方，你会找到一个纸质文件夹，内含以下物品：\n    *   **操作指南**：一本\
    \ 4.5 x 2.5 英寸的小巧折叠手册，共 19 页，介绍关于`iPod touch`的基础信息。\n    *   **iPod touch 产品信息指南**：一本\
    \ 4.5 x 2.5 英寸的小册子，但字体过小，难以阅读。其中包含与`iPod touch`相关的所有法律条款、条件、警告和免责声明。\n    *  \
    \ **苹果标志贴纸**：两个漂亮的白色苹果标志贴纸，你有时能在车窗上看到它们。尽情享用吧！\n\n在包装盒底部，你会找到如图 1-1 所示的物品：一副耳机和一根\
    \ USB 线缆。\n\n![images](img/0101.jpg)\n\n**图 1-1.** *位于 iPod touch 包装盒底部的耳机和 USB\
    \ 转 Dock 连接线*\n\n#### iPod touch 耳机\n\n耳机包含两个用于收听音乐、视频或进行`FaceTime`通话的白色耳塞，以及一个连接在右耳塞导线上的小型控制器。将其插入`iPod\
    \ touch`左上边缘的插孔。请确保完全插入——刚开始插入时可能需要稍用力按压。\n\n如下图所示，控制器上有`加号`（`+`）和`减号`（`-`）按键，以及一个`中央`按钮。你可以使用（`+`）和（`-`）键调节音量，并使用`中央`按钮接听或挂断`FaceTime`通话。\n\
    \n![images](img/p32-01.jpg)\n\n**注意：** 通过双击或三击`中央`按钮，你可以在歌曲之间切换。双击跳至下一曲。三击返回上一曲。\n\
    \n随附的耳机还内置了一个用于`FaceTime`通话的小型麦克风。\n\n##### USB 转 Dock 连接线\n\nUSB 转 Dock 连接线用于将`iPod\
    \ touch`连接到电脑；它同时也充当电源线。\n\n##### 墙壁电源适配器\n\n墙壁电源适配器一端是 USB 接口，另一端是插入电源插座的插头。只需将\
    \ USB 线连接到`iPod touch`，另一端连接到电源适配器，即可通过墙壁插座为`iPod touch`充电。\n\n#### 为 iPod touch\
    \ 充电与电池续航提示\n\n你的`iPod touch`可能已存有一些电量，但你可能希望将其完全充满，以便在完成设置后能享受不间断的长时间使用。利用这段充电时间，你可以阅读本章剩余内容、安装或更新`iTunes`应用，或者浏览所有出色的`iPod\
    \ touch`应用（参见第 22 章：“神奇的应用商店”）。\n\n##### 通过电源插座充电\n\n为`iPod touch`充电最快的方式是直接将其插入墙壁插座。使用连接`iPod\
    \ touch`到电脑的同一根 USB 线。将线缆较宽的一端插入`iPod touch`底部的接口（靠近`主屏幕`按钮旁），将 USB 线另一端插入墙壁电源适配器。你可以用大约\
    \ 10 美元购买这些电源适配器。\n\n![images](img/p33-01.jpg)\n\n通过查看屏幕，你可以判断`iPod touch`是否正在充电。你会看到电池指示图标（位于右上角）内出现闪电标志或插头图标。\n\
    \n`主电池`图标会显示当前电量。右侧的图像显示了一部正在充电且电量几乎充满的`iPod touch`。\n\n**提示：** 一些较新的汽车配有内置电源插座（与家中插座相同），你可以在车内插入`iPod\
    \ touch`的电源线。有些车型还提供基座选项，允许你通过车载收音机控制`iPod`应用。这些插座有时隐藏在前排座椅后方的中央控制台中。\n\n![images](img/p34-01.jpg)\n\
    \n##### 通过电脑充电\n\n将`iPod touch`连接到电脑时，也可以为其充电，尽管速度比直接连接墙壁充电器稍慢。\n\n**提示：** 尝试使用电脑上不同的\
    \ USB 端口。一些 USB 端口共享总线，供电较少；而其他端口拥有独立总线，供电更多。\n\n为获得最佳充电效果，建议将电脑插在墙壁插座上。如果电脑未连接电源，`iPod\
    \ touch`仍会充电，但速度较慢。请注意，如果笔记本电脑进入睡眠状态或合上屏幕，`iPod touch`将停止充电。\n\n##### 通过其他配件充电\n\
    \n某些专为`iPod touch`设计的配件也能为其充电。最常见的是`iPod touch`/iPod 音乐基座。这些是扬声器系统，你可以将`iPod touch`插入其中播放音乐。仅当屏幕上出现以下警告信息时，`iPod\
    \ touch`才无法充电：“此配件不支持充电。”这种情况通常发生在较旧的配件或并非专为你的`iPod touch`设计的配件上。\n\n![images](img/square.jpg)\
    \ **提示：保护壳与外部电池二合一**\n\n有些保护壳实际上内置了外部电池。市面上有多个制造商提供此类产品。其中一家供应商 mophie（[`www.mophie.com`](http://www.mophie.com)）为`iPod\
    \ touch`生产了此类保护壳。\n\n##### 预期电池续航时间\n\n苹果公司表示，凭借更大的电池和先进技术，`iPod touch`的续航时间应比前几代`iPod\
    \ touch`更长（参见表 1-1）。\n\n![images](img/t0101.jpg)\n\n上述电池续航时间基于理想条件，且电池全新充满电。你会注意到，随着时间的推移，实际电池续航能力将会下降。数据来源：Apple.com\n\
    \n##### 电池与充电提示\n\n关键问题在于：如何才能充分利用电池续航，并确保`iPod touch`在你需要时已充好电、准备就绪？在本节中，我们将介绍一些技巧来帮助你实现这一目标。\n\
    \n###### 提升单次充电的使用时间\n\n为延长电池续航时间，请尝试以下建议：\n\n*   **降低屏幕亮度**：轻点`设置` > `亮度`，然后使用滑块将亮度降低至一半以下，找到适合你的亮度水平。\n\
    *   **关闭定位服务**：如果你不需要将实际位置传输给应用，可以关闭此功能。轻点`设置` > `定位服务`，然后将`定位服务`设为`关闭`。如果你打开了某个请求定位的应用，系统会提醒你重新开启该功能。\n\
    *   **设置更短的自动锁定时间**：此功能可缩短`iPod touch`在不使用时进入睡眠模式（即关闭屏幕）所需的时间。缩短此时间有助于节省电量。操作方法是：轻点`设置`\
    \ > `通用` > `自动锁定`，然后将`自动锁定`设为尽可能短的时间——如果你喜欢，甚至可以设为`1 分钟`。\n*   **关闭推送邮件和推送通知。**\n\
    \n你可以访问苹果网站 [www.apple.com/batteries/iPod touch.html](http://www.apple.com/batteries/iPodtouch.html)\
    \ 了解更全面的电池使用技巧。\n\n###### 延长电池整体寿命\n\n`iPod touch` 使用可充电电池，其有效寿命内的充电循环次数有限；换句话说，随着时间的推移，电池保持电量的能力会逐渐下降。你可以通过确保每月至少将电池完全耗尽一次来延长`iPod\
    \ touch`的电池寿命。如果你这样做，可充电电池的使用寿命会更长。\n"
- fmt: "###### Finding More Places to Charge Your `iPod touch`\n\nNo matter what you\
    \ do, you will want to find more places and more ways to charge your `iPod touch`\
    \ if you really use it a lot. Besides using your power cord or connecting your\
    \ `iPod touch` to your computer, you can take advantage of the charging tips described\
    \ in [Table 1–2](#Chapter01.html#tab_1_2).\n\n![images](images/t0102.jpg)\n\n\
    ### Setting up Your `iPod touch`\n\nAt this point, you know some of the basics\
    \ about your `iPod touch` and how to get the most out of your battery. Now you\
    \ are ready to start enjoying it! Setting up your `iPod touch` is the next step.\n\
    \n#### Knowing If You Need to Set Up Your `iPod touch`\n\nIf you see a `Welcome`\
    \ screen on your `iPod touch`, you will need to set up your `iPod touch` before\
    \ you can use it. With iOS 5, you can set up your `iPod touch` in a couple of\
    \ ways. First, you can do so with over–the–air (OTA) using your Wi–Fi network\
    \ and iCloud. Or, you can plug your `iPod touch` into your PC using the USB dock\
    \ cable and activate it with the `iTunes` service.\n\nIf this is your first `iPod\
    \ touch` or you want to set it up as a new `iPod touch`, you probably want to\
    \ use iCloud OTA.\n\nIf you are upgrading from a previous `iPod touch` model,\
    \ you probably want to restore from a backup using the `iTunes` service.\n\n###\
    \ Setting up Your `iPod touch` Over-the-Air Using iCloud\n\nWith iOS 5, Apple\
    \ has finally cut the `iTunes` cord. This means you no longer need to connect\
    \ your `iPod touch` to your PC to activate it or set it up. Instead, you can activate\
    \ it directly from your `iPod touch` OTA using Apple's new `iCloud` service.\n\
    \n**NOTE:** During the initial set up process, you will be able to connect to\
    \ any available Wi–Fi network which will be needed to set up your `iPod touch`\
    \ OTA using iCloud. If your home, work, or school Wi–Fi network isn't available,\
    \ and you don't have a public access point like Starbucks handy, then you will\
    \ need to activate your `iPod touch` later. (You could choose to set up your `iPod\
    \ touch` via `iTunes` on your PC instead; however, you will still need Internet\
    \ access to connect to Apple's activation servers.)\n\nFollow these steps to set\
    \ up your `iPod touch` with iCloud, as shown in the `Welcome` screen pictured\
    \ earlier:\n\n1.  Swipe to set up by touching the `Arrow` button and pulling it\
    \ across the screen in the direction indicated.\n2.  Choose the language you want\
    \ to use with your `iPod touch`. Apple will present you with the most common options\
    \ based on where you bought your `iPod touch`; however, you can also tap the `Down\
    \ Arrow` for more language choices.\n3.  When you've chosen your preferred language,\
    \ tap the blue `Next` button at the top right of the screen.\n4.  Choose your\
    \ Country or Region. Again, Apple will provide you with a default choice based\
    \ on where you bought your `iPod touch`; however, you can tap `Show More…` to\
    \ expand the list. Tap the blue `Next` button to continue.\n5.  Decide if you\
    \ would like to enable or disable Location Services, and then tap the blue `Next`\
    \ button to continue.\n\n    ![images](images/p38-01.jpg)\n\n    **NOTE:** `Location\
    \ Services` use cell–tower triangulation, and Wi–Fi router mapping to determine\
    \ the approximate location of your `iPod touch`. This feature is used for check–in\
    \ games (like Foursquare), social networks (like Facebook), geo–tagging (in the\
    \ `Camera` app), and utilities (like `Find my iPod touch`). Unless you have a\
    \ particular need to globally disable all location services, you probably want\
    \ to turn on the Location Services feature right now. You can selectively disable\
    \ or enable these services later in the `Settings` app (e.g., turn off your `Camera`\
    \ app's geo–tagging, but leave on `Find my touch`).\n\n6.  Choose your Wi–Fi network,\
    \ enter your network password, and then tap the blue `Next` button to continue.\n\
    7.  Your `iPod touch` will now connect to Apple for activation. This can take\
    \ a few seconds or up to a few minutes, depending on how fast your connection\
    \ is and how busy Apple's servers are.\n8.  Once activation is complete, you'll\
    \ be given the option to set up your `iPod touch` as a new `iPod touch`, restore\
    \ it from an iCloud backup, or restore it from `iTunes`.\n\n#### Setting up a\
    \ New `iPod touch` Using iCloud\n\nIf this is your first `iPod touch`—or if you\
    \ simply want a clean, fresh start—choose `Set up as a new iPod touch`.\n\n**TIP:**\
    \ Restoring from backups—especially from backups of different devices (e.g., restoring\
    \ an `iPod touch` from an iPad backup)—can sometimes lead to problems like more\
    \ frequent app crashes or lower battery life. If you're experiencing problems\
    \ after restoring from a previous backup, you might want to try setting your `iPod\
    \ touch` up as a new `iPod touch`. You'll have to redo all your settings and accounts\
    \ from scratch, and you'll lose any saved app and game data; however, it's sometimes\
    \ your only option if your `iPod touch` is no longer stable enough for everyday\
    \ use.\n\nTo set up your `iPod touch` as a new `iPod touch`, you'll either need\
    \ to sign in with an existing Apple ID or create a new, free Apple ID. Apple IDs\
    \ can be any of the following:\n\n*   **iTunes ID**: This is the e–mail address\
    \ and password you use to log into `iTunes` and buy music, TV shows, movies, App\
    \ Store apps and games, and iBooks.\n*   **Free Apple ID**: This is the e–mail\
    \ address and password you use to log into `Find my iPod touch`, FaceTime, Game\
    \ Center, iCloud, or any other recent, free Apple service. This can also be the\
    \ same ID you use to shop at the online Apple Store.\n\n**NOTE:** If you've been\
    \ using Apple products and services for a while, it's not uncommon for one person\
    \ to have multiple Apple IDs. For example, you might have an iTunes ID and old\
    \ MobileMe account and an Apple Store ID. Unfortunately, at the time of writing,\
    \ Apple doesn't allow IDs to be combined, so you'll have to choose which one you\
    \ want to use with iCloud.\n\nIf you have an old MobileMe account, Apple will\
    \ migrate it to iCloud for you. Visit [`http://www.me.com/move`](http://www.me.com/move)\
    \ to begin the process.\n\nOtherwise, the authors recommend you use your iTunes\
    \ ID because it will have all your music, media, app, and games purchases tied\
    \ to it, and you'll be able to use iCloud's re–download feature to easily restore\
    \ these purchases to your new devices now and in the future.\n\nIf you have an\
    \ Apple ID, log in with it now, accept the terms and conditions, and then skip\
    \ ahead to the `Configuring iCloud Options` section. If you don't have an Apple\
    \ ID, create one now."
