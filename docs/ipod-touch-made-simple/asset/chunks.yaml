- fmt: "# Moving Backward or Forward Through Open Web Pages\n\nNow that you know how\
    \ to enter web addresses, you'll probably be jumping to various web sites. The\
    \ **Forward** and **Back** arrows ![images](images/p288-02.jpg) at the bottom\
    \ of the screen make it very easy to go to recently visited pages in either direction.\
    \ If the **Back** arrow is grayed out, this chapter's \"Using the Open Pages Button\"\
    \ section can help you figure out why.\n\nLet's say you were looking at the news\
    \ on the *New York Times* web site, and you jumped to ESPN to check sports scores.\
    \ To go back to the *New York Times* page, just tap the **Back** arrow. To return\
    \ to the ESPN site again, touch the **Forward** arrow.\n\n# Using the Open Pages\
    \ Button\n\nSometimes, when you click a link, the web page you were viewing moves\
    \ to the background and a new window pops up with new content (e.g., another web\
    \ page or a video). You will see the page you were on move to the background and\
    \ a new page being opened. In such cases, the **Back** arrow in the new browser\
    \ window will not work.\n\nInstead, you have to tap the **Open Pages** icon ![images](images/p289-01.jpg)\
    \ in the lower-right corner to see a list of open web pages, and then tap the\
    \ one you want. In the example shown here, we touched a link that opened a new\
    \ browser window. The only way to get back to the old one was to tap the **Open\
    \ Pages** icon and select the desired page.\n\n![images](images/p289-02.jpg)\n\
    \n# Zooming In and Out in Web Pages\n\nZooming in and out of web pages is very\
    \ easy on the iPod touch. There are two primary ways of zooming—double-tapping\
    \ and pinching.\n\n## Double-tapping\n\nIf you tap twice on a column in a web\
    \ page, the page will zoom in on that particular column. This lets you home in\
    \ on exactly the right place on the web page, which is very helpful for pages\
    \ that aren't formatted for a mobile screen.\n\nTo zoom out, just double-tap once\
    \ more (you can see how this looks in the \"Quick Start Guide\" at the beginning\
    \ of this book).\n\n## Pinching\n\nThis technique lets you zoom in on a particular\
    \ section of a page. It takes a little bit of practice, but it will soon become\
    \ second nature. Check out the \"Quick Start Guide\" to see how this looks.\n\n\
    Place your thumb and forefinger close together at the section of the web page\
    \ you wish to zoom in on. Slowly pinch out, separating your fingers. You will\
    \ see the web page zoom in. It takes a couple of seconds for the web page to focus,\
    \ but it will zoom in and be very clear in a short while.\n\nTo zoom out to where\
    \ you were before, just start with your fingers apart and move them slowly together;\
    \ the page will zoom out to its original size.\n\n# Activating Links from Web\
    \ Pages\n\nWhen you're surfing the Web, often you'll come across a link that will\
    \ take you to another web site. Because **Safari** is a full-function browser,\
    \ you simply touch the link to jump to a new page.\n\n## Working with Safari Bookmarks\n\
    \nAs soon as you start browsing a bit on your iPod touch, you will want to quickly\
    \ access your favorite web sites. One good way to do this is to add bookmarks\
    \ for one-tap access to web sites.\n\n**TIP:** You can sync your bookmarks from\
    \ your computer's web browser (**Safari** or **Internet Explorer** only) using\
    \ iCloud over the air or the **iTunes** app on your computer. Check out [Chapter\
    \ 3](#Chapter03.html#ch3): \"Sync with iCloud, iTunes and More\" for more details.\n\
    \n### Adding a New Bookmark\n\nAdding new bookmarks on your iPod touch takes just\
    \ a few taps:\n\n1. To add a new bookmark for the web page you are currently viewing,\
    \ tap the **Action button** ![images](images/p290-01.jpg) at the bottom of the\
    \ screen.\n2. Choose **Add Bookmark**.\n\n   ![images](images/p290-02.jpg)\n\n\
    3. We recommend that you edit the bookmark name to something short and recognizable.\n\
    4. Tap **Bookmarks** if you want to change the folder where your bookmark is stored.\n\
    5. When you're finished, tap the **Save** button.\n\n![images](images/p291-01.jpg)\n\
    \n### Using Bookmarks and History\n\nOnce you have set a few bookmarks, it is\
    \ easy to view and work with them. In the same area, you can also see and use\
    \ your web browsing history. A very useful tool on your iPod touch is the ability\
    \ to browse the web from your **History**, just as you would on a computer. Follow\
    \ these steps to do so:\n\n1. Tap the **Bookmarks** ![images](images/p291-02.jpg)\
    \ icon at the bottom of the page.\n2. Swipe up or down to view all your bookmarks.\n\
    3. Tap any bookmark to jump to that web page.\n\n   ![images](images/p291-03.jpg)\n\
    \n4. Tap the **History** folder to view your recent history of visited web pages.\n\
    5. Notice that, at the bottom of the list, you see additional folders for **Earlier\
    \ Today** and previous days.\n6. Tap any history item to go to that web page.\n\
    \n![images](images/p292-01.jpg)\n\n**TIP:** To clear your history, tap the **Clear**\
    \ button in the lower-left corner. You can also clear your history, cookies, and\
    \ cache in the **Settings** app. Tap **Settings**; tap **Safari**; scroll to the\
    \ bottom; and then tap **Clear History**, **Clear Cookies**, or **Clear Cache**.\n\
    \n### Managing Your Bookmarks\n\nIt is very easy to accumulate quite a collection\
    \ of bookmarks because setting them up is so easy. However, you may find you no\
    \ longer need a particular bookmark, or you may want to organize them by adding\
    \ new folders.\n\nAs with other lists on your iPod touch, you can reorder your\
    \ **Bookmarks** list and remove entries. Follow these steps to do so:\n\n1. View\
    \ your **Bookmarks** list as you did previously.\n2. Tap the **Edit** button in\
    \ the lower-left corner.\n3. To reorder the entries, touch and drag the right\
    \ edge with the three gray bars up or down the list. In this case, we are dragging\
    \ the bookmark to the **iPad Made Simple** book page on Amazon.com up to the top.\n\
    4. To create a new folder for bookmarks, tap the **New Folder** button in the\
    \ lower-right corner.\n\n   ![images](images/p293-01.jpg)\n\n5. To delete a bookmark,\
    \ tap the red **Circle** icon to the left of the entry to make it turn vertical.\n\
    6. Tap the **Delete** button.\n7. When you are finished reordering and deleting\
    \ entries, tap the **Done** button in the upper-left corner.\n8. To edit a bookmark\
    \ name, folder, or web address, tap the bookmark name itself.\n9. Now you can\
    \ make any adjustments to the name, web address, or folder.\n10. To change the\
    \ folder where the bookmark is stored, tap the button below the web address. In\
    \ this image, it says **Bookmarks**; but on your iPod touch, it may be different.\
    \ This bookmark points to the iPad Made Simple page on Amazon.com.\n11. Tap **Done**\
    \ when you're finished.\n\n![images](images/p294-01.jpg)"
