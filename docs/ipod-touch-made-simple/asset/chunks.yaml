  trans: "\n#### 如何强制重置 iPod touch\n\n当你的 iPod touch 无响应时，重置设备是另一种解决方法。此操作非常安全，通常能修复许多问题（参见图\
    \ 25-2）。\n\n![images](img/2502.jpg)\n\n**图 25-2.** *重置您的 iPod touch*\n\n请按照以下步骤强制重置您的\
    \ iPod touch：\n\n1.  用双手同时按住 `主屏幕` 按钮和 `电源/睡眠` 按钮。\n2.  同时按住这两个按钮约八到十秒钟。此时会出现\
    \ `滑动来关机` 滑块。忽略它，继续按住两个按钮，直到屏幕变黑。\n3.  再过几秒钟，您应该会看到 `Apple` 标志出现。看到标志后，松开按钮，您的\
    \ iPod touch 就会被重置。\n\n#### 如何软重置 iPod touch\n\n您可以在 `设置` 应用中重置多种内容，从 `主屏幕` 布局到网络设置，再到设备上的所有数据：\n\
    \n1.  轻点 `设置` 图标。\n2.  轻点 `通用`。\n3.  向上滑动以查看页面底部。\n4.  轻点 `还原`。\n5.  轻点 `还原所有设置`\
    \ 以重置网络、键盘、`主屏幕` 布局和位置提醒。在弹出的窗口中轻点 `还原` 进行确认。\n\n    ![Images](img/p513-01.jpg)\n\
    \n6.  轻点 `抹掉所有内容和设置` 以抹掉 iPod touch 上的所有内容，然后在弹出窗口中轻点 `抹掉` 进行确认。\n7.  轻点 `还原网络设置`\
    \ 以清除所有 Wi-Fi 网络设置。\n8.  轻点 `还原键盘词典` 以重置拼写词典。\n9.  轻点 `还原主屏幕布局` 以恢复到出厂布局；这会将 iPod\
    \ touch 的 `主屏幕` 恢复为原始布局。\n10.  轻点 `还原位置提醒` 以重置您收到的关于允许应用使用您当前位置的警告信息。\n\n####\
    \ 音乐、视频、提醒或铃声无声音\n\n没有什么比错过 FaceTime 通话、想听音乐或看视频却发现 iPod touch 没有声音更令人沮丧的了。通常，这个问题有一个简单的解决方法：\n\
    \n1.  如果您听不到任何提醒，请检查以确保设备左上边缘的 `静音` 开关没有打开。当 `静音` 开关拨向设备背面，且开关旁边显示橙色时，即表示已开启。请确保将\
    \ `静音` 开关拨向设备正面，即关闭位置。\n2.  使用 iPod touch 左上边缘的 `音量+` 键检查音量。您可能无意中将音量调到了最低或将其静音。\n\
    3.  如果您使用的是耳机插孔的有线耳机，请拔下耳机，然后重新插入。有时耳机插孔连接不良。\n4.  如果您使用的是无线蓝牙耳机或蓝牙音响设备，请按照以下步骤操作：\n\
    \    1.  检查音量设置（如果耳机或音响上有此设置）。\n    2.  检查蓝牙设备是否已连接。轻点 `设置` 图标，轻点 `通用`，然后轻点 `蓝牙`。确保您能看到列出的设备，并且其状态为\
    \ `已连接`。如果未连接，请轻点该设备，并按照指引与 iPod touch 配对。\n\n        **注意**：有时您可能实际上已连接到蓝牙设备却不知道。如果您连接到蓝牙音响设备，实际的\
    \ iPod touch 将不会发出声音。\n\n5.  确保歌曲或视频未处于暂停模式。\n6.  打开 iPod touch 的音乐或视频控制。双击 `主屏幕`\
    \ 按钮应会打开 `应用切换器` 栏。从左向右滑动即可看到媒体控制。\n7.  再向右滑动一次即可看到音量控制。确认歌曲未暂停且音量未被调至最低。\n8.\
    \  最后，检查 `设置` 图标，以查看您（或其他人）是否在 iPod touch 上设置了 `音量限制`：\n    1.  轻点 `设置` 图标。\n\
    \    2.  向下滑动页面并轻点 `音乐`。\n    3.  查看 `音量限制` 是否为 `开`。\n    4.  轻点 `音量限制` 以检查设置等级。如果限制未锁定，只需将音量滑块滑至更高等级。\n\
    \    5.  如果已锁定，您需要先轻点 `解锁音量限制` 按钮并输入四位代码来解锁。\n\n如果这些步骤均无效，请参阅本章后面的“其他故障排除与帮助资源”部分。如果仍无效，请尝试使用本章“从备份恢复\
    \ iPod touch”部分中的步骤从备份文件恢复 iPod touch。最后，如果问题依然存在，请联系向您出售 iPod touch 的商店或企业寻求帮助。\n\
    \n#### 如果无法在 iTunes 或 App Store 中购买\n\n您有了这个酷炫的新设备，于是决定访问 iTunes Store 或 App Store。但如果您收到错误信息，或者不被允许进行购买，该怎么办？如果遇到这种情况，请尝试以下步骤：\n\
    \n1.  两个商店都需要有效的互联网连接。请确保您已连接 Wi-Fi 或蜂窝数据网络。如需帮助，请查阅第 4 章：“连接到网络”。\n2.  确认您拥有有效的\
    \ iTunes 帐户。\n\n### 高级故障排除\n\n到目前为止，我们已经介绍了 iPod touch 上的基本故障排除步骤。在接下来的部分中，我们将深入探讨一些更高级的故障排除步骤。\n\
    \n#### 当您的 iPod touch 未在 iTunes 中显示时\n\n有时，当您将 iPod touch 连接到 PC 或 Mac 时，`iTunes`\
    \ 应用可能无法识别它。因此，您的 iPod touch 不会出现在左侧导航栏中。\n\n将 iPod touch 连接到电脑后，您应该会在左侧导航栏的 `设备`\
    \ 下看到它。您可以尝试以下几个步骤，让 `iTunes` 应用识别您的 iPod touch：\n\n1.  查看 `主屏幕` 右上角的电池电量，检查 iPod\
    \ touch 的电池电量。如果电池电量过低，`iTunes` 应用需要等到电量稍微回升后才能识别它。\n2.  如果电池已充满电，请尝试将 iPod touch\
    \ 连接到电脑上的另一个 USB 端口。有时，如果您一直使用一个 USB 端口连接 iPod touch，而换到另一个端口时，电脑可能无法识别。\n3. \
    \ 如果仍不能解决问题，请尝试断开 iPod touch 并重启电脑。\n4.  接着，将 iPod touch 重新连接到 USB 端口。\n5.  如果\
    \ `iTunes` 应用仍然无法识别您的 iPod touch，请下载 `iTunes` 的最新更新，或者在电脑上完全卸载并重新安装 `iTunes` 应用。如果选择此选项，请务必事先备份\
    \ `iTunes` 中的所有信息。\n6.  您也可以尝试另一条同步线缆，可能是您的 USB 同步线缆有缺陷。\n"
- fmt: "#### Synchronization Problems\n\nSometimes, you might encounter errors when\
    \ synchronizing your iPod touch with your computer (PC or Mac). How you address\
    \ the problem depends on your sync method.\n\n##### Using iTunes to Sync\n\nIf\
    \ you are using iTunes to sync your personal information, then follow these steps\
    \ to resolve synchronization problems:\n\n1. First, follow all the steps we outlined\
    \ in the “iPod touch Does Not Show Up in iTunes” section of this chapter.\n2.\
    \ If the iPod touch still will not sync, but you can see it in the left nav bar\
    \ of your `iTunes` app, go back to [Chapter 3](#Chapter03.html#ch3): “Sync with\
    \ iCloud, iTunes, and More” and review your sync settings very carefully.\n\n\
    ##### Using Apple’s iCloud or Microsoft Exchange to Sync\n\nIf you are using the\
    \ iCloud service or Microsoft Exchange method to sync your email and personal\
    \ information, then follow these troubleshooting steps to resolve synchronization\
    \ problems:\n\n1. Both iCloud and Exchange sync require a wireless Internet data\
    \ connection in order to sync your email and personal information. Verify that\
    \ you have a live data connection by checking Table 1 in the Quick Start Guide’s\
    \ “Reading the Connectivity Status Icons” section.\n2. If you do not have a wireless\
    \ data signal, then verify your Wi-Fi connection is set up correctly (see [Chapter\
    \ 4](#Chapter04.html#ch4): “Connect to the Network”).\n3. After you have verified\
    \ your connection, you need to check that your sync settings are correct on your\
    \ computer and iPod touch (see [Chapter 3](#Chapter03.html#ch3)).\n\n**TIP:**\
    \ Sometimes your problem can be as simple as a changed password. If this is the\
    \ case, then make sure to correct your password on your iPod touch for your sync\
    \ settings. These are found by tapping your `Settings` icon, then tapping `Mail,\
    \ Contacts and Calendars`. Finally, tap the account name and adjust the password.\n\
    \n#### Reinstalling the iPod touch Operating System (with or Without a Restore)\n\
    \nSometimes, you might have to do a clean install of your iPod touch operating\
    \ system to get your iPod touch back up and running smoothly. If an update is\
    \ currently available, then this process will also result in upgrading your iPod\
    \ touch software.\n\n**TIP:** This process is virtually identical to the process\
    \ of updating your iPod touch with a new version of the operating system.\n\n\
    During this process, you will have three choices:\n\n- If you want to return the\
    \ iPod touch to its normal state with all your data, you will have to use the\
    \ `Restore` function in the `iTunes` app.\n- If you plan on getting a clean start\
    \ and tying the iPod touch to an iTunes account, then you will need to use the\
    \ `Setup a new iPod touch` function at the end of this process.\n- If you plan\
    \ on giving away or selling your iPod touch, then you will simply need to eject\
    \ the iPod touch from `iTunes` at the end of this process (before doing a restore\
    \ or new setup).\n\n**CAUTION**: This restore process will wipe your iPod touch\
    \ totally clean. You will need to resynchronize and reinstall all of your apps\
    \ and enter your account information, such as your email accounts. This process\
    \ could take 30 minutes or longer, depending on how much information you have\
    \ synced to your iPod touch.\n\nTo reinstall the iPod touch operating system software\
    \ with the option of restoring data to your iPod touch from a previous backup,\
    \ follow these steps:\n\n1. Connect your iPod touch to your computer and load\
    \ the `iTunes` app.\n2. Click your `iPod touch` in the `DEVICES` category in the\
    \ left nav bar.\n3. Click `Summary` in the top nav bar.\n4. You will see the `Summary`\
    \ screen with all the information about your iPod touch. Click the `Restore` button\
    \ in the middle screen, as shown here (see [Figure 25-3](#Chapter25.html#fig_25_3)).\n\
    \n![images](images/2503.jpg)\n\n**Figure 25-3.** *Connecting your iPod touch and\
    \ clicking the `Restore` button in the `Summary` screen*\n\n5. Now you may be\
    \ asked whether you want to back up your iPod touch, if so, click `Back Up` just\
    \ to be safe.\n6. On the next screen, you are warned that all data will be erased.\
    \ Click `Restore` or `Restore and Update` to continue (see [Figure 25-4](#Chapter25.html#fig_25_4)).\n\
    \n![images](images/2504.jpg)\n\n**Figure 25-4.** *Backing up your iPod touch in\
    \ `iTunes` before a restore*\n\n7. You will see an iPod touch `Software Update`\
    \ screen. Click `Next >` to continue.\n8. Next, you will see the `Software License\
    \ Agreement` screen. Click `Agree` to continue and start the process.\n9. `iTunes`\
    \ will download the latest iPod touch software, back up and sync your iPod touch,\
    \ and then reinstall the iPod touch software. This process completely erases all\
    \ data and restores your iPod touch to its original, “clean” state. You will see\
    \ status messages at the top of `iTunes`.\n10. After the backup and sync, your\
    \ iPod touch screen will go black. Next, the `Apple` logo will appear, and you\
    \ will see a status bar under the logo. Finally, a small pop-up window will appear\
    \ in `iTunes` to tell you the update process is complete. Click `OK` to go to\
    \ the `Set Up Your iPod touch` screen. You will have a couple options at this\
    \ point:\n    1. If you want to keep your iPod touch clean (i.e., without any\
    \ of your personal data), then select the top option, `Setup as a new iPod touch`.\
    \ You might want to use this option if you are setting up this iPod touch for\
    \ someone else (you will need her Apple ID and password).\n    2. If you are giving\
    \ away or selling your iPod touch, simply click the `Eject` icon next to the iPod\
    \ touch, and you’re done (see [Figure 25-5](#Chapter25.html#fig_25_5)).\n\n![images](images/2505.jpg)\n\
    \n**Figure 25-5.** *Ejecting the iPod touch from iTunes*\n\n3. Select `Restore\
    \ from the backup of:` and verify that the pull-down menu is set to the correct\
    \ device.\n11. Finally, click `Continue`.\n12. If you chose to restore, then after\
    \ a little while you will see a `Restore in Progress` screen on your iPod touch\
    \ and a status window in `iTunes` that says, “Restoring iPod touch from backup…”\
    \ This status window will also show a time estimate.\n13. Next, you will see a\
    \ little pop-up window saying, “The settings for your iPod touch have been restored.”\
    \ In a few seconds, you will see your iPod touch appear in the left nav bar under\
    \ `DEVICES` in `iTunes`.\n    1. If you sync your information with `iTunes`, all\
    \ data will be synced now.\n    2. If you use iCloud, Exchange, or another sync\
    \ process, you will probably have to reenter passwords on your iPod touch to get\
    \ those sync processes back up and running.\n\n### Additional Troubleshooting\
    \ and Help Resources\n\nSometimes you may encounter a particular issue or question\
    \ that you cannot find an answer to in this book. In the following sections, we\
    \ will provide some good resources that you can access from the iPod touch and\
    \ from your computer’s web browser. The iPod touch’s on-device user guide is easy\
    \ to navigate and can quickly provide you with the information you seek. The Apple\
    \ knowledgebase is helpful if you are facing a troubleshooting problem that is\
    \ proving especially difficult to resolve. The iPhone/iPod touch-related web blogs\
    \ and forums are also good places to locate answers and even ask unique questions\
    \ you might be facing."
