  trans: "\n###### 为你的`iPod touch`寻找更多充电地点\n\n无论你做什么，如果你真的经常使用你的`iPod touch`，你总会想找到更多地点和方式来为其充电。除了使用电源线或将`iPod\
    \ touch`连接到电脑，你还可以利用表 1–2 中介绍的充电技巧。\n\n![images](img/t0102.jpg)\n\n### 设置你的`iPod\
    \ touch`\n\n至此，你已经了解了关于`iPod touch`的一些基础知识和如何充分利用其电池的方法。现在，你已经准备好开始享受它了！下一步就是设置你的`iPod\
    \ touch`。\n\n#### 判断是否需要设置你的`iPod touch`\n\n如果你的`iPod touch`上出现`Welcome`屏幕，那么你需要先完成设置才能使用它。通过\
    \ iOS 5，你可以通过几种方式来设置`iPod touch`。首先，你可以使用 Wi-Fi 网络和 iCloud 进行空中下载（OTA）设置。或者，你也可以使用\
    \ USB 底座连接线将`iPod touch`连接到电脑，并通过`iTunes`服务激活它。\n\n如果这是你的第一部`iPod touch`，或者你想将其设置为一部全新的`iPod\
    \ touch`，你可能希望使用 iCloud OTA 设置。\n\n如果你是从旧款`iPod touch`型号升级，你可能希望使用`iTunes`服务从备份中恢复。\n\
    \n### 使用 iCloud 通过空中下载方式设置你的`iPod touch`\n\n通过 iOS 5，苹果终于摆脱了`iTunes`的连接线。这意味着你无需再将`iPod\
    \ touch`连接到电脑即可激活或设置它。相反，你可以直接通过`iPod touch`，使用苹果全新的`iCloud`服务进行 OTA 激活。\n\n**注意：**\
    \ 在初始设置过程中，你可以连接到任何可用的 Wi-Fi 网络，这是使用 iCloud 进行`iPod touch` OTA 设置所必需的。如果你家里、工作场所或学校的\
    \ Wi-Fi 网络不可用，并且身边也没有像星巴克这样的公共接入点，那么你将需要稍后再激活你的`iPod touch`。（你也可以选择通过电脑上的`iTunes`来设置你的`iPod\
    \ touch`；但即便如此，你仍然需要互联网连接来访问苹果的激活服务器。）\n\n按照以下步骤，使用 iCloud 设置你的`iPod touch`，如下图所示的前述`Welcome`屏幕：\n\
    \n1.  触摸`Arrow`按钮并沿指示方向在屏幕上滑动以进行设置。\n2.  选择你希望在`iPod touch`上使用的语言。苹果会根据你购买`iPod\
    \ touch`的地点提供最常用的选项；不过，你也可以点击`Down Arrow`以获得更多语言选择。\n3.  选择好你偏好的语言后，点击屏幕右上角的蓝色`Next`按钮。\n\
    4.  选择你的国家或地区。同样，苹果会根据你购买`iPod touch`的地点提供一个默认选项；但你可以点击`Show More…`展开列表。点击蓝色`Next`按钮继续。\n\
    5.  决定是否启用或禁用定位服务，然后点击蓝色`Next`按钮继续。\n\n    ![images](img/p38-01.jpg)\n\n    **注意：**\
    \ `Location Services`使用基站三角定位和 Wi-Fi 路由器映射来确定你的`iPod touch`的大致位置。此功能用于签到游戏（如 Foursquare）、社交网络（如\
    \ Facebook）、地理标记（在`Camera`应用中）以及实用工具（如`Find my iPod touch`）。除非你特别需要全局禁用所有定位服务，否则你很可能希望现在就开启定位服务功能。你之后可以在`Settings`应用中有选择地禁用或启用这些服务（例如，关闭`Camera`应用的地理标记，但保持`Find\
    \ my touch`开启）。\n\n6.  选择你的 Wi-Fi 网络，输入网络密码，然后点击蓝色`Next`按钮继续。\n7.  你的`iPod touch`现在将连接到苹果进行激活。这可能需要几秒钟到几分钟的时间，具体取决于你的连接速度以及苹果服务器的繁忙程度。\n\
    8.  一旦激活完成，你将被提供以下选项：将你的`iPod touch`设置为新设备、从 iCloud 备份恢复、或从`iTunes`恢复。\n\n####\
    \ 使用 iCloud 设置一部新的`iPod touch`\n\n如果这是你的第一部`iPod touch`——或者你只想要一个干净、全新的开始——请选择\
    \ `Set up as a new iPod touch`。\n\n**提示：** 从备份恢复——尤其是从不同设备的备份恢复（例如，从 iPad 备份恢复`iPod\
    \ touch`）——有时会导致问题，比如应用崩溃更频繁或电池续航更短。如果你在从之前的备份恢复后遇到问题，你可能想尝试将你的`iPod touch`设置为新设备。你将不得不从头重新设置所有设置和账户，并且会丢失所有已保存的应用和游戏数据；然而，当你的`iPod\
    \ touch`已不稳定到无法日常使用时，这有时是你唯一的选择。\n\n要将你的`iPod touch`设置为新设备，你需要使用现有的 Apple ID 登录，或者创建一个新的免费\
    \ Apple ID。Apple ID 可以是以下任何一种：\n\n*   **iTunes ID**：这是你用来登录`iTunes`并购买音乐、电视节目、电影、App\
    \ Store 应用和游戏以及 iBooks 的电子邮件地址和密码。\n*   **免费 Apple ID**：这是你用来登录`Find my iPod touch`、FaceTime、Game\
    \ Center、iCloud 或任何其他近期免费的 Apple 服务的电子邮件地址和密码。这也可以是你用于在线 Apple Store 购物的同一个 ID。\n\
    \n**注意：** 如果你使用苹果产品和服务已有一段时间，一个人拥有多个 Apple ID 的情况并不少见。例如，你可能有一个 iTunes ID、一个旧的\
    \ MobileMe 账户和一个 Apple Store ID。不幸的是，在撰写本文时，苹果不允许合并 ID，因此你必须选择其中一个用于 iCloud。\n\
    \n如果你有旧的 MobileMe 账户，苹果会为你将其迁移到 iCloud。请访问 [`http://www.me.com/move`](http://www.me.com/move)\
    \ 开始此过程。\n\n否则，作者建议你使用你的 iTunes ID，因为它关联了你所有已购买的音乐、媒体、应用和游戏，并且你将能够利用 iCloud 的重新下载功能，轻松地将这些购买记录恢复到你现在和未来的新设备上。\n\
    \n如果你有 Apple ID，现在就登录，接受条款和条件，然后直接跳到`Configuring iCloud Options`部分。如果你没有 Apple\
    \ ID，现在就创建一个。\n"
- fmt: "### Creating a Free Apple ID\n\nIf you've never used iTunes and don't have\
    \ an Apple ID, then you'll need to create one. This can be done quickly, right\
    \ on your iPod touch:\n\n1. Tap **Create a new Apple ID**.\n2. Enter your birthday\
    \ by spinning the **Year**, **Month**, and **Day** rollers to represent the proper\
    \ date, and then tap the blue **Next** button.\n3. Enter your first and last name\
    \ in the appropriate fields, then tap the blue **Next** button.\n\n   ![images](images/p40-01.jpg)\n\
    \n4. Choose whether you want to use an existing e-mail address (e.g., a Gmail,\
    \ Hotmail, Yahoo!, or personal e-mail address) or create a new iCloud e-mail address\
    \ (`@me.com`). If you don't want to be bothered remembering a new e-mail address,\
    \ you'll probably want to use an existing one. If you like keeping your e-mail\
    \ separate, then you'll probably want to create a new one.\n5. If you're creating\
    \ a new iCloud `@me.com` address, enter your password and click **Verify**. Your\
    \ password must be \"strong\"; that is, it must contain uppercase and lowercase\
    \ letters, at least one number, and be at least eight characters long.\n6. Pick\
    \ a **Security Info** question. This is something that should be easy for you\
    \ to remember, but difficult for anyone else to guess easily (which means no one\
    \ else should be able to find the answer just by looking at your blog or Facebook,\
    \ Google, Yahoo!, or other online profile page).\n7. Choose whether you want to\
    \ receive e-mail updates from Apple at this new address. If not, set this option\
    \ to **OFF**.\n8. You'll need to accept the **Terms and Conditions** twice, first\
    \ by tapping the blue **Agree** button at the bottom left, and then by tapping\
    \ the translucent **Agree** button when the pop-up confirmation appears. Again,\
    \ it might take a few moments to verify.\n9. Apple will then set up your new Apple\
    \ ID. This can take a few moments.\n\n### Configuring iCloud Options\n\nOnce you've\
    \ logged in with your Apple ID, it's time to configure your iCloud settings:\n\
    \n1. If you want to use the **Set Up iCloud** feature—and we recommend you do\
    \ this because it's free and provides a host of useful backup and syncing features—then\
    \ leave the **iCloud** option set to **ON** and tap the blue **Next** button.\n\
    2. Choose whether you want to use the iCloud Backup service to wirelessly back\
    \ up your iPod touch over-the-air to Apple's data center or to your computer over\
    \ USB with iTunes. Again, we recommend using setting **iCloud** to **ON** because\
    \ it's automatic, and you won't have to remember to do it.\n\n   ![images](images/p41-01.jpg)\n\
    \n3. The **Find my iPod touch** service is a free part of iCloud that shows you\
    \ the approximate location of your iPod touch (you'll be able to tell whether\
    \ it's at your house or at the office, but not the specific room), make it ring\
    \ so you can find it even if it's fallen under the car seat or behind the sofa,\
    \ or even wipe out all your personal data if it's lost or stolen. If you want\
    \ to use this feature, leave this option set to **ON**.\n4. That's it! Your iPod\
    \ touch is now set up, and you can start using it.\n\n### Restoring Your iPod\
    \ touch Using iCloud\n\nIf you've previously used iCloud to back up your iPod\
    \ touch, you can restore from that backup over-the-air right from your device:\n\
    \n1. Tap **Restore from iCloud backup**.\n2. Enter your iCloud Apple ID e-mail\
    \ address and password.\n3. Select which backup you'd like to restore from. Typically,\
    \ this will be the most recent backup available.\n4. Your iPod touch will reboot,\
    \ download the backup, and restart. This process can take a few minutes, especially\
    \ if you have a lot of data to restore.\n5. Once your iPod touch has been restored,\
    \ your apps will begin to download and install. iCloud can download and install\
    \ multiple apps at once, and you can use your iPod touch while the restore process\
    \ is going on.\n\n## Setting up Your iPod touch Using iTunes\n\nIf you don't want\
    \ to use iCloud or you have a previous iTunes back up you'd like to restore from,\
    \ then you can still set up your iPod touch over USB with your PC.\n\nIf you do\
    \ not have iTunes loaded on your computer, then open a web browser and go to [`www.itunes.com/download`](http://www.itunes.com/download).\
    \ Download the software from the link provided.\n\nIf you already have iTunes\
    \ installed on your computer, you should check to see if an updated version is\
    \ available. Version 10.5 was the latest version at the time of publishing. Follow\
    \ these steps to update your version of iTunes:\n\n1. Start the **iTunes** app.\n\
    2. If you are a Windows user, select **Help** from the menu, and then **Check\
    \ for Updates**.\n3. If you are a Mac user, select **iTunes** from the menu, and\
    \ then **Check for Updates**.\n4. If an update is available, then follow the instructions\
    \ to update **iTunes**.\n\n### Restoring Your iPod touch From a Previous Backup\n\
    \nThe first time you connect your new iPod touch to iTunes, you will see the screen\
    \ shown in [Figure 1–2](#Chapter01.html#fig_1_2).\n\n![images](images/0102.jpg)\n\
    \n**Figure 1–2.** *Welcome to your iPod screen*\n\n**CAUTION:** We have heard\
    \ of people experiencing problems (e.g., lock-ups and lower battery life) when\
    \ they restore a backup from a non-iPod touch (i.e., an iPad or iPod touch) to\
    \ the iPod touch. Also, selecting **Restore** assumes you have first made a backup\
    \ of your old device; otherwise, there is no information to restore to your new\
    \ iPod touch.\n\nDo the following to restore from the backup of another iPod touch\
    \ or device:\n\n![images](images/0103.jpg)\n\n**Figure 1–3.** *Setting up your\
    \ iPod touch screen*\n\n1. Click the radio button to the left of **Restore from\
    \ the backup of** (see [Figure 1–3](#Chapter01.html#fig_1_3))\n2. Select the particular\
    \ backup file from the drop-down menu.\n3. Click the **Continue** button to restore\
    \ data to your iPod touch from the backup file. You are now done with the initial\
    \ setup of your iPod touch.\n\n**NOTE:** You will still have to sync any apps,\
    \ games, music, and other media you want to use on your new iPod touch.\n\n##\
    \ Maintaining Your iPod touch\n\nNow that you have set up your iPod touch with\
    \ iTunes, you will want to know how to safely clean the screen and keep it protected\
    \ with various cases.\n\n### Cleaning Your iPod touch Screen\n\nAfter using your\
    \ iPod touch a little while, you will see that your fingers (or other fingers\
    \ besides yours) have left smudges and oil on the formerly pristine screen. You\
    \ will want to know how to safely clean the screen. One way to keep the screen\
    \ cleaner throughout the day is to place a protective screen cover on the iPod\
    \ touch, which may also have the added benefit of cutting down on glare (discussed\
    \ in the next section).\n\nWe also recommend the following steps:\n\n1. Turn off\
    \ your iPod touch by pressing and holding the **Sleep/Power** key on the top edge,\
    \ and then use the slider to turn it off.\n2. Remove any cables, such as the USB\
    \ sync cable.\n3. Rub the screen with a dry, soft, lint-free cloth (like a cloth\
    \ supplied to clean eyeglasses or something similar).\n4. If the dry cloth does\
    \ not work, then try adding a very little bit of water to dampen the cloth. If\
    \ you use a damp cloth, try not to get any water in the openings.\n5. Another\
    \ option is the *iKlear* screen cleaner from Klear Screen. This product works\
    \ on your iPod touch and other devices such as your computer, laptop or iPad screen.\n\
    \n**CAUTION:** Never use household cleaners, abrasive cleaners such as SoftScrub,\
    \ or ammonia-based cleaners such as Windex, alcohol, aerosol sprays, or solvents.\n\
    \n### Cases and Protective Covers for Your iPod touch\n\nOnce you have your iPod\
    \ touch in your hands, you will notice how beautifully it is constructed. You\
    \ will also notice that it can be fairly slippery, rock around a bit, or have\
    \ the back get scratched when you are typing on it.\n\nWe recommend buying a protective\
    \ case for your iPod touch. Average cases run about US $10–40, and fancy leather\
    \ cases can cost US $100 or more. Spending a little to protect your iPod touch,\
    \ which costs $200 or more, makes good sense."
