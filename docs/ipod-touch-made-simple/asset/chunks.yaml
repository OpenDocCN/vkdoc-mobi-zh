    \n`Emoji`键盘可以像其他任何键盘一样在“设置”中添加。\n\n![images](img/p82-01.jpg)\n\n### 编辑、重新排序或删除键盘\n\
    \n你可能希望调整键盘的选项、更改键盘在列表中的显示顺序，或直接删除不再使用的键盘。请按照以下步骤操作：\n\n1.  按照本章前面“添加新的国际键盘”部分中的步骤\
    \ 1-4 操作；这将让你查看国际键盘列表。\n2.  要调整特定键盘的选项，请在键盘列表中点击它。在我们的示例中，我们点击了`French (Canada)`。\n\
    3.  通过点击相应部分中的选项更改`Software Keyboard Layout`。\n4.  通过点击相应部分中的选项调整`Hardware Keyboard\
    \ Layout`。\n5.  点击左上角的`Keyboards`按钮以保存选择并返回键盘列表。\n\n    ![images](img/p83-01.jpg)\n\
    \n6.  要重新排序或删除键盘，请点击右上角的`Edit`按钮。\n7.  要更改键盘顺序，请触摸并拖动键盘右侧带有三条灰色横线的边缘向上或向下。\n8.\
    \  要删除键盘，请点击`Red Minus Sign`使其摆动到垂直位置，然后点击`Delete`。\n9.  要结束键盘编辑，请点击右上角的`Done`按钮。\n\
    \n![images](img/p83-02.jpg)\n\n当你安装了至少一个国际键盘后，你会注意到出现了一个小小的`Globe`键。按下`Globe`键可以在所有语言之间循环切换。\n\
    \n**提示：** 你可以长按`Globe`键查看可用键盘列表。这使你能快速选择想要使用的键盘。如果\n\n![images](img/p84-01.jpg)\n\
    \n日语、中文和其他一些语言提供了多种键盘选项以满足你的输入偏好。\n\n在某些语言（如日语）中，你会看到输入的字母变为字符，或者你可以自己手绘字符。你也可能在键盘上方看到一排其他字符组合。当你看到需要的组合时，点击它即可。\n"
- fmt: "### Copy and Paste\n\nThe Copy and Paste feature is very useful for saving\
    \ time and increasing your typing accuracy. You can use this feature to take text\
    \ from your e-mail (such as meeting details) and paste it into your calendar.\
    \ Or you may want to simply copy an e-mail address from one place in a form into\
    \ another to save yourself the time required to retype it. (We show you this technique\
    \ in the “Setup Exchange/Google Account” section of [Chapter 4](#Chapter04.html#ch4):\
    \ “Other Ways to Sync.”) There are many places to use Copy and Paste; the more\
    \ comfortable you are with it, the more you will use it. You can even copy text\
    \ or images from your `Safari` web browser and paste them into a `Notes` or `Mail`\
    \ message.\n\n#### Selecting Text by Double-Tapping It\n\nIf you are reading or\
    \ typing text, you can double-tap it to start selecting some text to copy. This\
    \ works well in the `Mail`, `Messages`, and `Notes` apps.\n\nYou will see a box\
    \ with blue dots (handles) at opposite corners.\n\n![images](images/p84-02.jpg)\n\
    \nJust drag the handles to select the text you wish to highlight and copy.\n\n\
    ![images](images/p85-01.jpg)\n\n**TIP:** If you want to select all the text, tap\
    \ the cursor or double-tap the screen above or below the text. This will display\
    \ a pop-up window that shows you `Select` and `Select All` options. Tap `Select`\
    \ to select a word or tap `Select All` to highlight all the text.\n\n![images](images/p85-02.jpg)\n\
    \n#### Selecting Text with Two-Finger Touch\n\nThe other way to select text requires\
    \ that you touch the screen simultaneously with two fingers. This seems to work\
    \ best if you are holding your iPod touch with one hand and use your thumb and\
    \ forefinger from your other hand to touch the screen. You can also set the iPod\
    \ touch down on the table and touch the screen with a finger from both hands.\
    \ Follow these steps to use this approach:\n\n1.  Touch the screen simultaneously\
    \ at the beginning and end of the text you want to select. Don't worry if you\
    \ cannot get the selection exactly on the first touch.\n2.  After the two-finger\
    \ touch, use the blue handles to drag the beginning and end of the selection to\
    \ the correct positions.\n\n#### Selecting a Web Site or Other Non-Editable Text\
    \ with Touch and Hold\n\nIn the `Safari` web browser and other places where you\
    \ cannot edit the text, hold your finger on some text and the paragraph will become\
    \ highlighted with handles at each of the corners.\n\nNext, drag the handles if\
    \ you want to select even more text.\n\n![images](images/p86-01.jpg)\n\n**NOTE:**\
    \ If you drag smaller than a paragraph, the selector will switch to fine-text\
    \ mode and give you the blue handles on both ends of the selection to pick just\
    \ the characters or words you want. If you drag your finger beyond a paragraph,\
    \ you get the gross-text selector, which you can drag up or down to select whole\
    \ reams of text and graphics.\n\n![images](images/p86-01.jpg)\n\n#### Cut or Copy\
    \ the Text\n\nOnce you have highlighted the text that you wish to copy, just touch\
    \ the `Copy` tab at the top of the screen. The tab will turn blue, indicating\
    \ that the text is on the clipboard.\n\n**NOTE:** If you have previously cut or\
    \ copied text, then you will also see the `Paste` option, as shown to the right.\n\
    \n![images](images/p86-02.jpg)\n\n#### App Switching and Multitasking\n\nAfter\
    \ you copy text, you may want to paste it into another app. For example, you might\
    \ want to copy some text from Safari and paste it into Notes or a Mail message.\
    \ The easiest way to jump between apps is to use the `App Switcher` app. Follow\
    \ these steps to paste text from one app into another:\n\n1.  Copy or cut your\
    \ text.\n2.  Double-tap the `Home` button to bring up the `App Switcher` app on\
    \ the bottom of your screen\n3.  If you just left an app running in the background,\
    \ you will be able to find it in the App Switcher bar.\n4.  Swipe right or left\
    \ to find the app you want and tap it.\n5.  If you don't see the app you want\
    \ in the App Switcher bar, then tap the `Home` button and start it from the `Home`\
    \ screen.\n6.  Now, paste the text by pressing and holding the screen, and then\
    \ selecting `Paste` from the pop-up window.\n7.  Double-tap the `Home` button\
    \ again and tap the app you just left to jump back to it.\n\n#### Pasting the\
    \ Text\n\nPasting the text into the same app is easy. For example, simply follow\
    \ these steps to paste the text into the same `Notes` or `Mail` message:\n\n1.\
    \  Use your finger to move the cursor to where you want to paste the text. Remember\
    \ the `Magnifying Glass` trick we showed earlier in this chapter; this can help\
    \ you position the cursor.\n2.  Once you let go of the screen, you should see\
    \ a pop-up window asking whether you to `Select`, `Select All`, or `Paste`.\n\
    3.  If you don't see this pop-up window, then double-tap the screen.\n4.  Select\
    \ `Paste` to paste your selection.\n\n#### Shake to Undo\n\nOne of the great features\
    \ of the iPod touch is the ability to undo typing, copy and pasting.\n\nAll you\
    \ have to do is shake the iPod touch after the paste. A new pop-up window will\
    \ appear that gives you the option to undo what you have just done.\n\nTap `Undo\
    \ Typing` or `Undo Paste` to correct the mistake.\n\n![images](images/p88-01.jpg)\n\
    \n**TIP: Delete Text Quickly**\n\nIf you ever want to delete a number of lines\
    \ of text, a paragraph, or even all the text you just typed quickly with only\
    \ one or two taps, this tip is for you. First, use the techniques described previously\
    \ to select the text you want to delete. Next, simply press the `Delete` key ![images](images/p88-02.jpg)\
    \ in the lower-left corner of the keyboard to delete all the selected text.\n\n\
    ### Finding Things with Spotlight Search\n\nThe Spotlight Search is a great feature\
    \ on your iPod touch that helps you find information. This is a proprietary search\
    \ method from Apple for performing a global search on your iPod touch. You can\
    \ use this feature to search for a name, event, or subject.\n\nThe concept is\
    \ simple. Let's say you are looking for something related to Martin. You cannot\
    \ remember if it was an e-mail, a document in `Notes`, or a Calendar event; however,\
    \ you do know it was related to Martin.\n\nThis is the perfect time to use the\
    \ Spotlight Search feature to find everything related to Martin on your iPod touch.\n\
    \n#### Activating Spotlight Search\n\nFirst, you need to bring up the `Spotlight\
    \ Search` page, which resides to the left of the first page of the `Home` screen.\n\
    \n![images](images/p89-01.jpg)\n\nOn the left side of the first circle (indicating\
    \ the first page of your `Home` screen), you can see a very small `Magnifying\
    \ Glass` icon.\n\n![images](images/p89-02.jpg)\n\nSwipe your finger from left\
    \ to right on the first page of icons to see the `Spotlight Search` page. You\
    \ can also press the Home button from your first screen of Icons to see this same\
    \ search page.\n\nFollow these steps to perform a search with this feature:\n\n\
    1.  On the `Spotlight Search` page, type in one or more words as your search parameters.\n\
    2.  Tap the `Search` button in the lower-right corner to execute your search.\n\
    \n    **TIP:** If you are looking for a person, type his full name to more accurately\
    \ find items from only that person (for example, “Martin Trautschold”). This will\
    \ eliminate any other Martins who might be in your iPod touch, enabling you to\
    \ find items only related to Martin Trautschold.\n\n3.  In the search result,\
    \ you'll see all e-mails, appointments, meeting invitations, and contact information\
    \ the search finds. Swipe down to see more results.\n4.  Tap one of the results\
    \ in the list to view its contents.\n\nYour search results stay there until you\
    \ clear them. This means you can return to the `Spotlight Search` page to view\
    \ your prior search results simply by swiping to the right from your `Home` screen.\n\
    \nTo clear the `Search` field, just touch the `X` in the Search bar. To exit the\
    \ `Spotlight Search` page, just press the `Home` key or swipe to the left."
