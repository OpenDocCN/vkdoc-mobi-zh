  trans: "\n#### 同步问题\n\n有時，你在將 iPod touch 與電腦（PC 或 Mac）同步時可能會遇到錯誤。如何解決問題取決於你的同步方式。\n\
    \n##### 使用 iTunes 同步\n\n如果你正在使用 iTunes 同步個人資訊，請依照以下步驟解決同步問題：\n\n1.  首先，遵循本章「iPod\
    \ touch 未在 iTunes 中顯示」一節中概述的所有步驟。\n2.  如果 iPod touch 仍然無法同步，但你可以在 `iTunes` 應用程式的左側導覽列中看到它，請返回第\
    \ 3 章：「與 iCloud、iTunes 及更多同步」並仔細檢查你的同步設定。\n\n##### 使用 Apple 的 iCloud 或 Microsoft\
    \ Exchange 同步\n\n如果你正在使用 iCloud 服務或 Microsoft Exchange 方法來同步你的電子郵件和個人資訊，請依照以下疑難排解步驟來解決同步問題：\n\
    \n1.   iCloud 和 Exchange 同步都需要無線網路數據連線才能同步你的電子郵件和個人資訊。請檢查快速入門指南中「讀取連線狀態圖示」一節的表\
    \ 1，以確認你擁有有效的數據連線。\n2.   如果你沒有無線數據訊號，請確認你的 Wi-Fi 連線設定正確（請參閱第 4 章：「連接到網路」）。\n3.\
    \   確認連線後，你需要檢查電腦和 iPod touch 上的同步設定是否正確（請參閱第 3 章）。\n\n**提示：** 有時候，問題可能只是密碼變更了這麼簡單。如果是這種情況，請務必在\
    \ iPod touch 上為你的同步設定更正密碼。這些設定可以透過點擊你的 `設定` 圖示，然後點擊 `郵件、聯絡資訊、行事曆` 來找到。最後，點擊帳戶名稱並調整密碼。\n\
    \n#### 重新安裝 iPod touch 作業系統（可選擇是否還原）\n\n有時，你可能需要全新安裝 iPod touch 作業系統，才能讓你的 iPod\
    \ touch 恢復正常且順暢運作。如果目前有可用的更新，此過程也將升級你的 iPod touch 軟體。\n\n**提示：** 此過程與使用新版本作業系統更新\
    \ iPod touch 的過程幾乎完全相同。\n\n在此過程中，你將有三種選擇：\n\n-   如果你想讓 iPod touch 恢復正常狀態並保留所有資料，你必須使用\
    \ `iTunes` 應用程式中的 `回復` 功能。\n-   如果你打算從頭開始，並將 iPod touch 連結到一個 iTunes 帳戶，那麼你需要在這個過程結束時使用\
    \ `設定為新的 iPod touch` 功能。\n-   如果你打算贈送或出售你的 iPod touch，那麼你只需在此過程結束時（在進行回復或新設定之前）從\
    \ `iTunes` 中退出 iPod touch。\n\n**注意**：此回復過程將會徹底清除你的 iPod touch。你將需要重新同步和重新安裝你所有的應用程式，並輸入你的帳戶資訊，例如你的電子郵件帳戶。此過程可能需要\
    \ 30 分鐘或更長時間，具體取決於你同步到 iPod touch 的資訊量。\n\n若要重新安裝 iPod touch 作業系統軟體，並可選擇從先前的備份中將資料還原到\
    \ iPod touch，請依照以下步驟操作：\n\n1.  將你的 iPod touch 連接到電腦並載入 `iTunes` 應用程式。\n2.  在左側導覽列的\
    \ `裝置` 類別中點擊你的 `iPod touch`。\n3.  點擊頂端導覽列的 `摘要`。\n4.   你將看到 `摘要` 畫面，其中包含關於你 iPod\
    \ touch 的所有資訊。點擊畫面中間的 `回復` 按鈕，如下所示（請參閱圖 25-3）。\n\n![images](img/2503.jpg)\n\n\
    **圖 25-3.** *連接你的 iPod touch 並在 `摘要` 畫面中點擊 `回復` 按鈕*\n\n5.   現在可能會詢問你是否要備份你的 iPod\
    \ touch，如果是，為了安全起見，請點擊 `備份`。\n6.   在下一個畫面中，你會收到所有資料將被清除的警告。點擊 `回復` 或 `回復並更新` 以繼續（請參閱圖\
    \ 25-4）。\n\n![images](img/2504.jpg)\n\n**圖 25-4.** *在回復前於 `iTunes` 中備份你的 iPod\
    \ touch*\n\n7.   你將看到一個 iPod touch `軟體更新` 畫面。點擊 `下一步 >` 以繼續。\n8.   接下來，你會看到 `軟體許可協議`\
    \ 畫面。點擊 `同意` 以繼續並開始此過程。\n9.   `iTunes` 將會下載最新的 iPod touch 軟體、備份並同步你的 iPod touch，然後重新安裝\
    \ iPod touch 軟體。此過程會完全清除所有資料，並將你的 iPod touch 還原到其原始、「乾淨」的狀態。你將在 `iTunes` 頂端看到狀態訊息。\n\
    10. 備份和同步完成後，你的 iPod touch 螢幕將會變黑。接著，`Apple` 標誌會出現，並且你會在標誌下方看到一個進度條。最後，`iTunes`\
    \ 中會出現一個小型的彈出視窗，告訴你更新過程已完成。點擊 `好` 以前往 `設定你的 iPod touch` 畫面。此時你會有幾個選項：\n    1.\
    \  如果你希望保持 iPod touch 乾淨（即沒有任何個人資料），請選擇頂部的選項 `設定為新的 iPod touch`。如果你正在為其他人設定此 iPod\
    \ touch，你可能會想使用此選項（你需要她的 Apple ID 和密碼）。\n    2.  如果你要贈送或出售你的 iPod touch，只需點擊 iPod\
    \ touch 旁邊的 `退出` 圖示，就大功告成了（請參閱圖 25-5）。\n\n![images](img/2505.jpg)\n\n**圖 25-5.**\
    \ *從 iTunes 退出 iPod touch*\n\n3.  選擇 `從以下備份回復：` 並確認下拉式選單已設定為正確的裝置。\n11. 最後，點擊\
    \ `繼續`。\n12. 如果你選擇了回復，稍後你的 iPod touch 上會顯示 `正在回復` 畫面，並且 `iTunes` 中會出現一個狀態視窗顯示「正在從備份回復\
    \ iPod touch…」。此狀態視窗也會顯示預計剩餘時間。\n13. 接下來，你會看到一個小型的彈出視窗顯示「你的 iPod touch 設定已回復。」幾秒鐘後，你會看到你的\
    \ iPod touch 出現在 `iTunes` 左側導覽列的 `裝置` 下。\n    1.  如果你使用 `iTunes` 同步資訊，所有資料現在都會被同步。\n\
    \    2.  如果你使用 iCloud、Exchange 或其他同步程序，你可能需要在 iPod touch 上重新輸入密碼，才能使這些同步程序恢復並正常運行。\n\
    \n### 其他疑難排解與求助資源\n\n有時，你可能會遇到本書中找不到答案的特定問題或疑問。在以下章節中，我們將提供一些可以從 iPod touch 和電腦網頁瀏覽器存取的良好資源。iPod\
    \ touch 的裝置內使用手冊易於瀏覽，可以快速為你提供所需的資訊。如果你面臨特別難以解決的疑難排解問題，Apple 知識庫會很有幫助。與 iPhone/iPod\
    \ touch 相關的網路部落格和論壇也是尋找答案，甚至提出你可能遇到的獨特問題的好地方。\n"
- fmt: '#### On-Device iPod touch User Guide


    Follow these steps to access the on-device iPod touch user guide:


    1.  Open your `Safari` web browser to view the online user guide for your iPod
    touch.

    2.  Tap the `Bookmarks` button ![Images](images/p520-01.jpg) in the bottom row
    of icons.

    3.  Swipe to the bottom of the list and tap `iPod touch User Guide`.


    If you don’t see that bookmark, then type this URL into `Safari`’s `Address` bar
    on your iPod touch: `http://help.apple.com/ipodtouch`.


    **TIP**: To view the manual in PDF format from your computer, go to `http://support.apple.com/manuals/ipodtouch`.


    Once you get to the user guide on your iPod touch, you should see a screen similar
    to the one shown in [Figure 25—6](#Chapter25.html#fig_25_6).


    The nice thing is that you already know how to navigate the guide. Tap any topic
    to see more information about a topic—either another list of subtopics or more
    detailed information.


    Read the topic or tap another link to learn more.


    You can tap the button on the top right corner of the screen to back out one level.


    ![images](images/2506.jpg)


    **Figure 25-6.** Using the iPod touch manual from `Safari` on your iPod touch


    #### The Apple Knowledgebase


    On your iPod touch or computer’s web browser, go to this web page: `www.apple.com/support/ipodtouch`


    Finally, click a topic in the left nav bar.


    #### iPod touch-Related Blogs


    One of the great things about owning an iPod touch is that you immediately join
    in the worldwide camaraderie of iPod touch owners.


    Many iPod touch owners would be classified as *enthusiasts* and are part of any
    number of iPod touch user groups. These user groups, along with various forums
    and web sites, serve as a great resource for iPod touch users.


    Many of these resources are available right from your iPod touch, and others are
    web sites that you might want to visit on your computer.


    Sometimes you might want to connect with other iPhone and iPod touch enthusiasts,
    ask a technical question, or keep up with the latest and greatest rumors. The
    blogs are a great place to do that.


    Here are a few popular iPod touch (and iPhone or iPad) blogs:


    *   `www.tipb.com`

    *   `www.iphonefreak.com`

    *   `www.gizmodo.com` (iPod touch section)


    **TIP:** Before you post a new question on any of these blogs, please do a search
    on the blog to make sure your question has not already been asked and answered.
    Also, make sure you are posting your question on the right section (e.g., iPod
    touch) of the blog. Otherwise, you may incur the wrath of the community for not
    doing your homework first!


    You can also do a web search for “iPod touch blogs” or “iPod touch news and reviews”
    to locate more blogs.


