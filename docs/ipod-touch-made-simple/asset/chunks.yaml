- fmt: '#### The App Store Home Page


    We''ll look at several parts of the App Store''s **Home** page: the top bar, middle
    content, and the bottom soft keys.


    We''ll look at the top bar first. At the top of the page shown in [Figure 22–2](#Chapter22.html#fig_22_2),
    you will see three buttons: **New**, **What''s Hot**, and **Genius**. Tap any
    of these to change the view.


    **TIP:** **Genius** is a feature that suggests apps you might like based on apps
    you have already downloaded and installed on your iPod touch. It can be quite
    a nice way to filter through the hundreds of thousands of apps to find the ones
    that might interest you.


    The middle of the page is your main content area. This main content area shows
    you a list of apps or the details of a specific app that you are viewing. You
    can swipe up or down to view more apps in a list or details for a specific app.
    You can also swipe left or right when viewing screen shots. On the **Featured**
    apps page, you will notice that there are a few large icons at the top. Clicking
    these icons will show you either types of apps or individual apps. Below the larger
    icons (you have to swipe down), you will see a number of featured apps.


    The bottom of the App Store''s **Home** page has five soft key buttons:


    - **Featured**: Shows apps that have been highlighted by the App Store or by the
    app developers.

    - **Categories**: Shows a list of categories used to organize the apps, so you
    can browse by category.

    - **Top 25**: Shows top selling or top downloaded apps.

    - **Search**: Finds an app using entered search terms.

    - **Updates**: Lets you update any apps you have installed, and redownload any
    apps you''ve already acquired.


    You can tell that [Figure 22–2](#Chapter22.html#fig_22_2) is showing **Featured**
    apps because the **Featured** soft key is highlighted on the bottom row of soft
    keys. Scrolling is handled the same way as in other programs—just move your finger
    up and down to scroll through the page.


    ![images](images/2202.jpg)


    **Figure 22–2.** *The layout of the App Store''s **Home** page*


    **NOTE:** The App Store is essentially a web site, so it changes frequently. Some
    of the details and nuances of the App Store might look a bit different after this
    book goes to print.


    ### Viewing App Details


    If you see an app in a list that looks interesting, tap it to learn more. The
    **Details** screen for the app includes its price, a description, screen shots,
    and reviews (see [Figure 22–3](#Chapter22.html#fig_22_3)). You can use this information
    to help you determine whether the app will be a good choice for you.


    Swipe down to read more details about the app on the **Info** page. Swipe left
    or right to view more screen shots of the app. Tap the **Rating** button near
    the bottom to read all the reviews for an app.


    You can also see other details about the app, such as its file size, its version
    number, and developer information near the bottom of the **Info** page.


    You can also **Tell a Friend** or **Report a Problem** using the buttons at the
    bottom of the screen.


    ![images](images/2203.jpg)


    **Figure 22–3.** *Viewing details about an app*


    ## Finding an App to Download


    If you want to search for an app to download, begin by looking around in the default
    view, which shows the **Featured** apps. Scroll down the page to see all the featured
    apps.


    ### Viewing the New Apps


    The default view in the App Store shows new and featured apps. This is the view
    shown back in [Figure 22–2](#Chapter22.html#fig_22_2). You can tell that this
    view shows new featured apps because the **Featured** soft key `![images](images/p469-01.jpg)`
    is highlighted at the bottom of the screen, and the **New** button `![images](images/p469-02.jpg)`
    at the top of the page is pressed.


    ### Viewing What''s Hot


    Touch the **What''s Hot** button at the top of the screen, and the “hottest” apps
    in the store will be shown on the screen. Again, just scroll through the hottest
    apps to see if something catches your eye.


    **NOTE:** The fact that an app is in the “What''s Hot” category does not necessarily
    mean you will also believe it is useful or fun. Check out the app descriptions
    and reviews carefully before you purchase anything.


    ![images](images/p469-03.jpg)


    ### Genius


    The third button at the top of the **Featured** apps section takes you to the
    **Genius** feature. This feature works like the identically named feature in the
    **iTunes** app that plays music on your computer. For example, it displays apps
    you might like based on apps you already have installed on your iPod touch.


    **NOTE:** The first time you use the Genius feature, you will have to accept the
    terms and conditions presented before the feature will be enabled.


    ![images](images/p470-01.jpg)


    #### Based On


    Notice that there is a **Based on (*app name*)** label above each app. This label
    shows you that the suggested app was based on a specific app you''ve installed
    on your iPod touch. For example, the **CBS Radio** suggestion was based on the
    fact that **Pandora Radio** is installed. We didn''t know about CBS Radio, but
    maybe we''ll give it a try based on this recommendation.


    ![images](images/p470-02.jpg)


    #### Swipe to Remove


    If you do not like a Genius suggestion, then you can swipe left or right on it
    to bring up the **Delete** button, just as you would to remove email or other
    items from lists on your iPod touch. Tap the **Delete** button to remove that
    app from the list.


    ![images](images/p471-01.jpg)


    #### Disable Genius Feature


    To disable the Genius feature, you need to go into your **App Store** settings
    (see the “App Store Settings” section later in this chapter to learn how to disable
    this feature).


    ![images](images/p471-02.jpg)


    ### Categories


    `![images](images/p471-03.jpg)`


    Sometimes, all the choices presented can be a bit overwhelming. If you have a
    sense of what type of app you are looking for, touch the **Categories** button
    along the bottom row of soft keys (see Figure 23–4).


    The current categories available are shown in [Table 23-1](#Chapter22.html#tab_23_1).


    `![images](images/t2301.jpg)`


    **NOTE:** The categories listed are fluid and change over time, so it is possible
    that the categories you see will have changed by the time this book finds its
    way into your hands.


    ![images](images/2204.jpg)


    **Figure 22–4.** *Viewing apps by category—**Games**, in this example*


    ### Looking at the Top 25 Charts


    `![images](images/p472-01.jpg)`


    Touch the **Top Charts** soft key along the bottom row, and the App Store will
    change the view again. This time, you will see the top 25 paid, free, and top-grossing
    apps. Just touch one of the **Top Paid**, **Top Free**, or **Top Grossing** buttons
    at the top to switch between the views.


    **NOTE:** The **Top Grossing** category refers to the highest money-making apps,
    which is sales volume times selling price. This view will help more expensive
    apps get up higher in the charts. For example, a US $4.99 app that sells 10,000
    units will rank much higher on the **Top Grossing** chart than a US $0.99 app
    that sells the same number of units.


    ![images](images/p472-02.jpg)'
