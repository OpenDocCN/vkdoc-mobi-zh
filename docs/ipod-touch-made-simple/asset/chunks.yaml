- fmt: "### The Zinio Magazine App—A Sampler\n\n`Zinio` app takes a unique approach.\
    \ This app is free in the App Store, and it gives you the ability to subscribe\
    \ to hundreds of magazine titles. Reading magazines in `Zinio` requires a few\
    \ simple steps:\n\n1.  Log into the `Zinio` app (You can create a free account).\n\
    2.  View and download free samples in the `My Library` section or click the `Shop`\
    \ button at the bottom to purchase magazines.\n3.  Some magazines may be giving\
    \ away full, free issues. Just look in the `My Library` section to see what is\
    \ available.\n\n![images](images/p265-01.jpg)\n\nThere are many popular magazines\
    \ you can choose from. The categories cover everything from art to sports and\
    \ more. Prices vary, but often you can buy either a single issue or a yearly subscription.\n\
    \nFor example, the latest issue of *Popular Mechanics* was US $1.99 on `Zinio`,\
    \ and a yearly subscription was US $7.99.\n\nSome of the subscriptions make great\
    \ sense. A single issue of *Bike Magazine* was US $4.99 at the time of writing,\
    \ while a yearly subscription was only US $9.00.\n\nA closer look revealed that\
    \ there were more than 16 cycling magazines you could subscribe to at the time\
    \ of writing.\n\n![images](images/p265-02.jpg)\n\n### Comic Books\n\nOne genre\
    \ of “new media” poised for a comeback with the advent of the iPod touch is the\
    \ comic book. The iPod touch, with its high-definition screen and powerful processor,\
    \ makes the pages of comic books come alive.\n\nThere are already a few comic\
    \ book apps available, including one from the famous Marvel Comics. DC Comics\
    \ has just launched its app, as well. This app was created by the same people\
    \ who make the Marvel app.\n\nTo locate the `Marvel Comics` app in the App Store,\
    \ go to `Categories` and then `Books`. The app is free, and you can purchase comic\
    \ books from inside the app.\n\nAt the bottom of the `Home` screen, you'll see\
    \ five buttons: `My Comics`, `Featured`, `Free`, `Top 25`, and `Browse`. Purchases\
    \ you make will be under the `My Comics` heading.\n\nThe App Store gives you the\
    \ opportunity to download both free comics and individual issues for sale. Most\
    \ sell for $1.99 per issue.\n\nEach tab takes you to a new list of comics to browse,\
    \ much like the iTunes store.\n\nTouch the `Browse` button to browse by `Series`,\
    \ `Creator`, `Genre`, `Rating`, `Storylines/Arcs`, or `Release Date`. Or you can\
    \ type in a search to find a particular comic.\n\n![images](images/p266-01.jpg)\n\
    \nYou can read a comic book in one of two ways. First, you can swipe through the\
    \ pages and read one page after another. Second, you can double-tap a frame to\
    \ `Zoom` in, and then tap the screen to advance to the next frame in the comic\
    \ strip. From there, you can just swipe from right to left to advance a frame;\
    \ or, if you want to go back, swipe from left to right.\n\nTo return to the `Home`\
    \ screen or to see the onscreen options, just tap the center of the screen. You'll\
    \ see a `Settings` button in the top-left corner. Touch this and you can `Jump\
    \ to the First Page`, `Browse to a Page`, or go to the `Settings` menu.\n\n![images](images/p267-01.jpg)\n\
    \n**NOTE:** The makers of this app, `ComiXology`, also make the app that contains\
    \ the Marvel comics, as well as a bunch of others, including DC, Archie, Image,\
    \ and Top Cow.\n\n### The iPod touch as a PDF Reader\n\nThere are several programs\
    \ available that turn the iPod touch into a very capable PDF viewing program.\
    \ For example, you can also read PDF files in the `iBooks` app. However, another\
    \ great PDF reader is called `GoodReader for iPhone`. (Yes - It says “for iPhone,”\
    \ but you can use this just fine on your iPod touch).\n\n**NOTE:** [Chapter 16](#Chapter16.html#ch16):\
    \ “Communicate with Email” showed you how to open attachments, including PDF files.\
    \ One great benefit of the `GoodReader` app is that it lets you use Wi-Fi to transfer\
    \ large PDF files.\n\nYou can find the `GoodReader for iPhone` app in the `Productivity`\
    \ section of the App Store. At the time of writing, this app costs US $4.99.\n\
    \n**NOTE:** `iBooks` can also read PDF files that are emailed as attachments.\
    \ If `iBooks` is installed, just choose `Open in iBooks` when opening a PDF.\n\
    \n![images](images/p268-01.jpg)\n\n#### Transferring Files to your iPod touch\n\
    \nOne of the great things about the `GoodReader for iPhone` app is that you can\
    \ use it to wirelessly transfer large files from your Mac or PC to the iPod touch\
    \ for viewing in the `GoodReader` app. You can also use `GoodReader` for document\
    \ sharing in iTunes, as discussed in [Chapter 3](#Chapter03.html#ch3): “Sync with\
    \ iCloud, iTunes, and More.” Follow these steps to transfer a file with `GoodReader`:\n\
    \n1.  Touch the small `Wi-Fi` icon at the bottom left of the screen,\n\n    ![images](images/p269-01.jpg)\
    \ and the `Wi-Fi Transfer Utility` pops up. You are prompted either to type in\
    \ an IP address into your browser or a Bonjour address if you use the `Bonjour`\
    \ service.\n\n2.  Type the address shown in the window from `GoodReader` into\
    \ a web browser on your computer. Now you can make your computer act as a server.\
    \ You'll see that your computer and iPod touch are now connected. You might bookmark\
    \ this page on your browser, however, beware because it can change if you re-start\
    \ your wireless network router and your iPod touch gets a different wireless network\
    \ address.\n3.  Click the `Choose File` button in the web browser on your computer\
    \ to locate a file to upload to your iPod touch.\n4.  Once you've selected the\
    \ file, click `Upload Selected File` and the file will be automatically transferred\
    \ to your iPod touch.\n\nHow is this useful? Well, for one of the authors (Gary),\
    \ the iPod touch has become a repository for more than 100 pieces of piano sheet\
    \ music. This means no more downloading PDF files, printing them out, putting\
    \ them into binders, and then trying to remember which song is in which binder.\
    \ Now, all his music is catalogued on the iPod touch. All he has to do is put\
    \ the iPod touch on the piano, and he has access to all his music in one place.\n\
    \n**NOTE:** `GoodReader` can even unzip files you receive as email attachments.\n\
    \nNavigating the `GoodReader` PDF viewer is quite easy. This app is more sensitive\
    \ than others, so tap the center of the screen quickly to bring up the onscreen\
    \ controls. You can then go to your library or touch the `Turn Page` icon to turn\
    \ the page.\n\nThe easiest way to move through pages is to touch the lower-right\
    \ side of the screen to advance a page, or touch the upper-left side of the screen\
    \ to go back a page. This becomes quite natural after a while.\n\nYou can also\
    \ flick up or down to turn pages.\n\nTo go to another PDF file or another piece\
    \ of sheet music, just touch the center of the iPod touch quickly and touch the\
    \ `My Documents` button in the upper-left corner.\n\n![images](images/p270-01.jpg)\n\
    \n#### Connecting to Google Docs and other Servers with GoodReader\n\nYou can\
    \ also connect to `Google Docs` and other servers with `GoodReader`. Follow these\
    \ steps to do so:\n\n1.  In the `Web Downloads` tab, choose `Connect to Servers`.\n\
    2.  Select `Google Docs`. (You can select a number of different servers: mailservers,\
    \ MobileMe iDisk, Public iDisk, Dropbox, box.net, FilesAnywhere.com, MyDisk.se,\
    \ WebDAV Server, and FTP Servers.)\n3.  Enter your `Google Docs` username and\
    \ password to log in.\n4.  Once you've made the connection, a new `Google Docs\
    \ Server` icon will appear under the `Connect to Server` tab on the right side\
    \ of the page.\n5.  Tap the new `Google` tab to connect to the server (an Internet\
    \ connection is required).\n6.  Now you'll see a list of all the documents you\
    \ have stored on `Google Docs`. Tap any document and select the file type to download\
    \ it. Usually, PDF works well for this. (Google docs can do a `Save As...`, and\
    \ PDF files are easier to work with.)\n\nOnce the file is downloaded, it will\
    \ appear on the left side of `GoodReader`; you can simply touch it to open it.\n\
    \n## Chapter 14"
