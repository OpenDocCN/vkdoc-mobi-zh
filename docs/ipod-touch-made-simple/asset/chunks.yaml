- fmt: '### Flying on an Airplane—Airplane Mode


    Often when you are flying on an airplane, the flight crew will ask you to turn
    off all portable electronic devices for takeoff and landing. Then, when you get
    to altitude, they will say “all approved electronic devices” can be turned back
    on.


    **TIP:** Check out the “International Travel” section of [Chapter 4](#Chapter04.html#ch4):
    “Connect to the Network” for many money saving tips you can take advantage of
    when you travel overseas with your iPod touch.


    If you need to turn off your iPod touch completely, press and hold the `Power`
    button on the top right edge, and then `Slide to Power Off` with your finger.


    Follow these steps to enable `Airplane Mode`:


    ![image](images/p10-01.jpg)


    1.  Tap the `Settings` icon.

    2.  Set the switch next to `Airplane Mode` in the top of the left column to `ON`.

    3.  Notice that the Wi-Fi is automatically turned `Off`.


    **TIP:** Some airlines have in-flight Wi-Fi networks. On those flights, you may
    want to turn your Wi-Fi back `On` at the appropriate time.


    You can turn your Wi-Fi connection `Off` or `On` by following these steps:


    1.  Tap the `Settings` icon.

    2.  Tap `Wi-Fi` near the top of the screen.

    3.  To enable the Wi-Fi connections, set the switch next to `Wi-Fi` at the top
    of the page to `ON`.

    4.  To disable the Wi-Fi, set the same switch to `OFF`.

    5.  Select the Wi-Fi network and follow the steps the flight attendant provides
    to connect to in-flight Wi-Fi.


    ### Touch Screen Basics


    In this section, we will describe how to interact with the iPod touch''s touch
    screen.


    #### Touch Screen Gestures


    The iPod touch has an amazingly sensitive and intuitive touch screen. Apple–renowned
    for making its iPad, iPhone, and iPod devices easy-to-use—has come up with an
    excellent, even higher resolution, highly responsive touch screen.


    If you are used to a physical keyboard and a trackball or trackpad, or even an
    iPod''s intuitive scroll wheel, then this touch screen will take a little effort
    to master. With a little practice, though, you''ll soon become comfortable interacting
    with your iPod touch.


    You can do almost anything on your iPod touch by using a combination of the following:


    *   Touch screen “gestures”

    *   Touching icons or soft keys on the screen

    *   Clicking the `Home` button at the bottom


    The following sections describe the various gestures you can use on your iPod
    touch.


    ### Tapping and Flicking


    To start an app, confirm a selection, select a menu item, or select an answer,
    simply tap the screen. To move quickly through contacts, lists, and the music
    library in `List` mode, flick from side to side or up and down to scroll through
    items. [Figure 6](#Part01.html#fig_p1_6) shows both of these gestures.


    ![images](images/p1-f6.jpg)


    **Figure 6.** *Basic touch-screen gestures*


    ### Swiping


    To swipe, gently touch and move your finger as shown in [Figure 7](#Part01.html#fig_p1_7).
    You can also do this to move between open `Safari` web pages and pictures. Swiping
    also works in lists, such as the `Contacts` list.


    ![images](images/p1-f7.jpg)


    **Figure 7.** *Touch and swipe to move between pictures and web pages.*


    #### Scrolling


    Scrolling is as simple as touching the screen and sliding your finger in the direction
    you want to scroll (see [Figure 8](#Part01.html#fig_p1_8)). You can use this technique
    in messages (email), newspaper and magazine apps, the `Safari` web browser, menus,
    and more.


    ![images](images/p1-f8.jpg)


    **Figure 8.** *Touch and slide your finger to scroll around a web page, a zoomed
    picture, and more.*


    #### Double-Tapping


    You can double-tap the screen to zoom in and then double-tap again to zoom back
    out. This works in many places, such as web pages, mail messages, and pictures
    (see [Figure 9](#Part01.html#fig_p1_9)).


    ![images](images/p1-f9.jpg)


    **Figure 9.** *Double-tapping to zoom in or out*


    #### Pinching


    You can also pinch open or closed to zoom in or out. This works in many places,
    including web pages, mail messages, and pictures (see [Figure 10](#Part01.html#fig_p1_10)).
    Follow these steps to zoom in using the *pinching* feature:


    1.  To zoom in, place two fingers that touch each other on the screen:

    2.  Gradually slide your fingers open. The screen zooms in.


    Follow these steps to zoom out using the pinching feature:


    1.  To zoom out, place two fingers with space between them on the screen.

    2.  Gradually slide your fingers closed, so they touch. The screen zooms out.


    ![images](images/p1-f10.jpg)


    **Figure 10.** *Pinch open to zoom in and pinch closed to zoom out.*


    ### App Reference Tables


    This section gives you a number of handy reference tables that group the various
    apps that are pre-installed on your iPod touch by their functionality. Also included
    in the tables are other useful apps you can download from the `App Store`. Each
    table gives you a brief description of the app and tells you where you can find
    more information about it in this book.


    #### Getting Started


    [Table 2](#Part01.html#tab_p1_2) provides some quick links to help you connect
    your iPod touch to the Web (using Wi-Fi); buy and enjoy songs or videos (using
    the `iTunes`, `Music` and `Video` apps); make your iPod touch sleep or power off;
    unlock your iPod touch; and more.


    ![image](images/p1-t2.jpg)


    #### Stay Connected and Organized


    [Table 3](#Part01.html#tab_p1_3) provides links for everything from organizing
    and finding your contacts to managing your calendar, working with email, sending
    messages, getting driving directions, and more.


    ![image](images/p1-t3.jpg)


    #### Be Entertained


    You can have lots of fun with your iPod touch; [Table 4](#Part01.html#tab_p1_4)
    shows you how. For example, you can use your iPod touch to buy or rent movies,
    check out free Internet radio with `Pandora`, or buy a book and enjoy it in a
    whole new way using `iBooks`. If you already use a Kindle, you can sync all your
    Kindle books to your iPod touch and enjoy them right away. You can also choose
    from hundreds of thousands of apps from the App Store to make your iPod touch
    even more amazing, fun, and useful. You can also rent a movie from Netflix or
    iTunes, downloading it immediately for later viewing (say on an airplane or train).


    ![image](images/p1-t4.jpg)


    ![image](images/p1-t4a.jpg)


    #### Stay Informed


    You can also use your iPod touch to read your favorite magazine or newspaper with
    up-to-the-minute vibrant pictures and videos (see [Table 5](#Part01.html#tab_p1_5)).
    Or, you can use it to check out the latest weather reports.


    ![image](images/p1-t5.jpg)


    #### Network Socially


    You can also use your iPod touch to connect and stay up-to-date with friends,
    colleagues, and professional networks using the social networking tools on your
    iPod touch (see [Table 6](#Part01.html#tab_p1_6)).


    ![image](images/p1-t6.jpg)


    #### Be Productive


    An iPod touch can also help you be more productive. You can use it to access and
    read just about any PDF file or other document with the `GoodReader` app. You
    can take notes with the basic `Notes` app or step up to the advanced `Evernote`
    app, which has amazing capabilities for integrating audio, pictures, and text
    notes, and as well as syncing everything to a web site. You can also use your
    iPod touch to set an alarm, calculate a tip, see what direction you are walking
    in, and record a voice memo (see [Table 7](#Part01.html#tab_p1_7)).


    ![image](images/p1-t7.jpg)


    ## Part II


    ### Introduction


    Welcome to your iPod touch using iOS 5—and to the book that tells you what you
    need to know to get the most out of it. In this part we show you how the book
    is organized and where to go to find what you need. We even show you how to get
    some great tips and tricks sent right to your iPod touch via short e-mail messages.
    If you are a visual learner, we also point out a resource for learning your iPod
    touch using short, to-the-point video tutorials produced by one of the authors.'
