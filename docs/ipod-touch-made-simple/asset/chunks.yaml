- fmt: "### Configuring Notification Center\n\nNotification Center can be easily configured\
    \ via the **Settings** app:\n\n1. Tap the **Settings** app icon on the **Home**\
    \ screen.\n2. Tap **Notifications**.\n\nNotification Center can organize notifications\
    \ **By Time** (widgets on top, then in order of the most recent notifications),\
    \ or you can organize them **Manually**. Follow these steps to manually reorganize\
    \ your notifications:\n\n![images](images/p59-03.jpg)\n\n1. Under **Sort Apps**,\
    \ tap **Manually**.\n2. At the top right of the screen, tap the **Edit** button.\n\
    3. Handles in the form of three gray, horizontal stripes will appear to the right\
    \ of each app. Grab the handles and drag the apps up or down to put them in the\
    \ order you like best.\n4. When you've got all the apps in just the order you\
    \ want them, tap the blue **Done** button at the top right of the screen.\n\n\
    ![images](images/p60-01.jpg)\n\nTo show or hide the **Weather** or **Stock** widget,\
    \ tap either widget to toggle it **ON** or **OFF**, as desired.\n\nTo choose how\
    \ the notification lists work, follow these steps:\n\n1. Tap the app you want\
    \ to edit (e.g., **Mail**).\n2. Switch the **Notification Center** toggle to **OFF**\
    \ to remove the app from Notification Center completely. Toggle it to **ON** to\
    \ put it back.\n3. Choose to **Show** the number of notifications you prefer in\
    \ the list. At the time of writing, the choices were limited to **1 Unread Item**,\
    \ **5 Unread Items**, and **10 Unread Items**.\n4. Choose the **Alert Style**\
    \ of the in-app notification you'd prefer.\n   - **None** means you'll never see\
    \ an alert.\n   - **Banner** means you'll get the subtle, animated notification\
    \ at the top of the screen that won't interrupt you. This option lets you ignore\
    \ the notification, if you so desire, which is useful for most communication notifications\
    \ like e-mail, iMessage, Facebook, and so on.\n   - **Alert** means you'll get\
    \ a pop-up box that you can't ignore. You will either have to manually dismiss\
    \ it or act on it right away. This is useful for alarms, appointments, and other\
    \ urgent matters.\n\nYou can also set several other options related to notifications:\n\
    \n- **Badge App Icon**: This option adds a little red circle to the top right\
    \ of **Home** screen icons. This red circle indicates how many unread notifications\
    \ each app contains. For example, the number 10 on the **Mail** icon means you\
    \ have 10 unread e-mail messages waiting for you. You can toggle this feature\
    \ to **OFF** if you would rather not see them or to **ON** if you want them displayed.\n\
    \n  ![images](images/p61-01.jpg)\n\n- **Sounds**: This option lets you turn audio\
    \ alerts for incoming notifications on or off. If a notification is urgent, like\
    \ iMessage, you might want to keep sounds toggled **ON**.\n- **Show Preview**:\
    \ This option adds the first few lines of a message associated with a notification,\
    \ so you can get the gist of it at a glance. This feature enables you to see a\
    \ notification's contents without sliding to tap through to the app, so you can\
    \ read the whole thing. If privacy is more of a concern, you might want to toggle\
    \ this feature to **OFF**.\n- **View in Lock Screen**: This option allows you\
    \ to turn notifications on or off from the **Lock** screen. Again, if privacy\
    \ is an issue, you might want to toggle this feature to **OFF**.\n\n**NOTE:**\
    \ Not all apps have the same options in Notification Center. For example, some\
    \ may offer sound alerts, while others do not.\n\nWhen you turn off notifications\
    \ for a specific app, it gets put in a separate list under **Settings** called\
    \ *Not in Notification Center*. This lets you easily see which apps are—and aren't—sending\
    \ you notifications.\n\n### Accessibility Options For Notification Center\n\n\
    Apple provides various Accessibility options for people with special visual or\
    \ hearing needs, including Custom Vibrations and LED Flash for Alerts.\n\nFollow\
    \ these steps to enable Accessibility options for Notifications:\n\n1. Tap the\
    \ **Settings** icon.\n2. Tap **General**.\n3. Tap **Accessibility** near the bottom\
    \ of the page.\n4. Toggle **Custom Vibrations** to **ON** to assign unique vibration\
    \ patterns to your Contacts (patterns can be created in the **Sound Preferences**).\n\
    5. Toggle **LED Flash for Alerts** to **ON** to make the camera flash go off when\
    \ a notification comes in.\n\n![images](images/p62-01.jpg)\n\n## Chapter 2\n\n\
    ## Typing, Copy, and Search\n\nIn this chapter, we will show you some good ways\
    \ to type on your iPod touch and save valuable time when doing so. Along the way,\
    \ we'll show you how to use the **Portrait** (vertical/smaller) and **Landscape**\
    \ (horizontal/larger) keyboards. We will also teach you how to select different\
    \ language keyboards, how to type symbols, and other tips.\n\nLater in this chapter,\
    \ we will tell you about the Spotlight search and the Copy and Paste function.\
    \ The Copy and Paste function will save you lots of time, as well as increase\
    \ your accuracy when working with your iPod touch.\n\n### Typing on Your iPod\
    \ touch\n\nYou will quickly find two on-screen keyboards on your iPod touch: the\
    \ smaller **Portrait** keyboard that's visible when you hold your iPod touch in\
    \ a vertical orientation and the larger **Landscape** keyboard that's visible\
    \ when you hold the iPod touch in a horizontal orientation. The nice thing is\
    \ that you can choose whichever keyboard works best for you.\n\n#### Typing on\
    \ the Screen with Two Thumbs\n\nYou will find when you first start out with your\
    \ iPod touch that you can most easily type with one finger—usually your index\
    \ finger—while holding the iPod touch with the other hand.\n\nAfter a little while,\
    \ you should be able to experiment with thumb typing. Once you practice a little,\
    \ typing with two thumbs instead of a single finger will really boost your speed.\
    \ Just be patient: it does take practice to become proficient typing quickly with\
    \ your two thumbs.\n\n![images](images/p64-01.jpg)\n\nYou will actually notice\
    \ after a while that the keyboard touch sensitivity assumes you are typing with\
    \ two thumbs. What this means is that the letters on the left side of your keyboard\
    \ are meant to be pressed on their left side, and the keys on the right are meant\
    \ to be pressed on their right side.\n\nSimply turning the iPod touch sideways\
    \ in many apps will cause the keyboard to change to the larger **Landscape** keyboard,\
    \ which makes it easier to type.\n\n![images](images/p64-02.jpg)\n\n**TIP:** If\
    \ you have larger hands and find typing on the smaller, vertical keyboard challenging,\
    \ then flip your iPod touch on its side to get the larger, **Landscape** keyboard.\n\
    \n#### Type Quick Phrases with Shortcuts\n\nOne nice feature on your iPod touch\
    \ is the ability to set up shortcuts for typing common phrases or even a few sentences\
    \ like directions to your home or office.\n\n**TIP:** Use Shortcuts to save time\
    \ when typing common phrases on your iPod touch. You can even use Shortcuts to\
    \ type a few sentences like steps to get to your home or something you type frequently.\n\
    \nAccess shortcuts in the Settings app. Tap the **Settings** icon, then **General**,\
    \ then **Keyboard** and swipe to the bottom of the screen to see available **Shortcuts**.\n\
    \nApple has supplied you with an example shortcut for “omw.” When you type omw\
    \ on your iPod touch, you will see that the pop-up shows the phrase “On my way!”\n\
    \n![images](images/p65-01.jpg)\n\nTap **Add New Shortcut** to create a new one.\n\
    \n![images](images/p65-02.jpg)\n\nType the **Phrase** which will replace the shortcut,\
    \ then type the **Shortcut** itself. In this example, we want a shortcut to type\
    \ directions to our home. So our **Shortcut** is “dirh” and the Phrase is step\
    \ by step directions to get to our house. Save your new shortcut and give it a\
    \ try.\n\n![images](images/p65-03.jpg)"
