    album. Touching the **Previous Song** button does the reverse.


    **NOTE:** If you''re at the beginning of a song, **Previous** takes you to the
    preceding song. If the song is already playing, **Previous** goes to the beginning
    of the current song (and a second tap would take you to the previous song).


    #### Adjusting the Volume


    There are two ways to adjust the volume on your iPod touch: using the external
    **Volume** buttons or using the **Volume Slider** control on the screen.


    The external **Volume** buttons are on the upper left side of the device. Press
    the **Volume Up** key (the top button) or the **Volume Down** key to raise or
    lower the volume. You''ll see the **Volume Slider** control move as you adjust
    the volume. You can also just touch and hold the **Volume Slider** key to adjust
    the volume.


    **TIP:** To quickly mute the sound, press and hold the **Volume Down** key and
    the volume eventually reduces to zero.


