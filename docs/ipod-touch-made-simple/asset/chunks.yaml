  trans: '

    #### 搜索网页或维基百科


    执行`Spotlight 搜索`后，你会在搜索结果下方看到两个选项：`搜索网页`和`搜索维基百科`。点击其中任一选项即可在网页或维基百科中执行搜索。


    #### 自定义 Spotlight 搜索


    你可以通过从搜索中移除某些应用或数据类型来自定义`Spotlight 搜索`。你甚至可以更改每种数据类型的搜索顺序。如果你只想搜索`通讯录`和`邮件`——而不想搜索其他内容，这项功能会非常有用。或者，如果你知道自己总是想先搜索`邮件`，然后是`日历`，最后是`音乐`——你可以按正确顺序设置这些项目。请按以下步骤操作：


    1.  点击`设置`图标。

    2.  点击`通用`。

    3.  点击`Spotlight 搜索`。

    4.  要更改项目的搜索顺序，请按住并上下拖动带有三条灰色横线的项目右边缘。

    5.  要从搜索中移除特定项目，请点击它以移除其旁边的`勾号`图标。未被勾选的项目将不会被`Spotlight 搜索`搜索到。

    6.  点击左上角的`通用`按钮返回`设置`应用。


    ![图片](img/p90-01.jpg)


    ## 第 3 章


    ## 通过 iCloud、iTunes 等方式同步


    在本章中，我们将向您展示如何设置或调整存储空间，并将您的信息推送至 Apple 新的 iCloud 服务，以及如何使用 iTunes 在您的 iPod touch
    与 Windows 或 Mac 电脑之间同步信息。


    借助 iCloud，您可以无线同步您的邮件、通讯录、日历、提醒事项、书签、备忘录、照片以及文稿与数据，还可以无线（OTA）备份您的 iPod touch。借助
    iTunes，您可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、iBooks、文稿和照片库，还可以备份您的 iPod touch。


    而且，由于没有任何东西能永远完美运行，我们还会向您展示几个简单的故障排除技巧。最后，我们将向您展示如何检查更新以及为您的 iPod touch 安装更新的操作系统软件。


    ### iCloud


    iCloud 是免费的，设置简单，使用方便。在大多数情况下，它是同步您的个人信息、音乐、电视节目（仅限美国）和应用的最佳方式。它也是处理备份和恢复手机的最佳方式。除非您有非常具体的原因不这样做，否则我们强烈建议您使用
    iCloud 来满足大部分同步需求，但对于 iCloud 尚未处理的内容（如电影），则使用`iTunes`应用。


    iCloud 还允许您重新下载之前购买的 iTunes、iBookstore 和 App Store 项目，但您的 iCloud ID 也可以用于 iMessage、FaceTime
    和其他免费的 Apple 服务。


    **注意：** Apple 在提及 iCloud 时非常小心地不使用*同步*一词。而是使用*存储*和*推送*。这种差异很大程度上是技术性的，与 Apple
    如何传输您的数据有关。


    需要记住的重要一点是，当您在 iPod touch 上更改某些内容时，Apple 会将该更改复制到其服务器，然后将副本发送回您所有其他启用了 iCloud
    的 iOS 设备，以及您的 Windows 或 Mac 电脑。


    ### 设置 iCloud


    在第 1 章：“起步”中，我们向您展示了如何在设置新的 iPod touch 或从之前的 iCloud 备份恢复时启用 iCloud。一旦 iCloud 启用，您可以轻松地打开或关闭各种服务。


    首先启动`设置`应用，然后向下滚动到`iCloud`。


    `邮件`、`通讯录`、`日历`、`提醒事项`、`书签`、`备忘录`和`查找我的 iPod`可以直接在此屏幕轻松切换为`开`或`关`。


    对于`照片流选项`，您需要先点击该标签才能看到`开`/`关`切换开关。


    ![图片](img/p92-01.jpg)


    **注意：** 在撰写本文时，照片流是一项“全有或全无”的服务。如果照片流已打开，Apple 将在其服务器上保留您最近 1000 张照片最多 30 天，并将其复制到您的
    iPad、Apple TV、Mac 或 Windows 电脑。任何登录 iCloud 的设备都会获得您照片流的副本。如果您拍摄的是敏感或个人性质的照片，您可能需要将`照片流`选项设置为`关`。


    同样，您可以点击`文稿与数据`来切换此选项的`开`或`关`。


    ![图片](img/p93-01.jpg)


    ### 管理 iCloud 存储空间与备份


    iCloud 提供 5GB 的免费存储空间。来自 iTunes 的音乐、应用、iBooks 和您的照片流不计入这 5GB 空间，因此大多数人仍有足够的剩余空间用于应用数据、文稿和备份。


    要检查您的 iCloud 存储空间，请向下滚动到底部并点击`存储空间与备份`。


    `存储空间`部分显示`总存储空间`，即您 iCloud 账户的总大小；`可用存储空间`显示您还剩多少总存储空间。


    在屏幕底部，您可以将`iCloud 备份`切换为`开`或`关`。


    **注意：** 对于大多数用户，在大多数情况下，我们强烈建议将`iCloud 备份`选项切换为`开`并保持该状态。


    ![图片](img/p93-02.jpg)


    如果您需要立即备份您的 iPod touch，您可以点击`立即备份`按钮。当您想重新安装 iPod touch、更换为备用或新的 iPod touch，或者打算去旅行并希望在出发前确保手机已备份时，可以执行此操作。


    要查看您的 iCloud 存储空间是如何使用的，请点击`管理存储空间`。


    ![图片](img/p94-01.jpg)


    在`管理存储空间`屏幕的顶部，您会看到当前已备份到 iCloud 的设备列表。这包括您的 iPod touch 以及您可能拥有的任何其他 iOS 设备，例如
    iPad 或 iPod touch。


    点击您想查看的设备，您将进入`信息`屏幕，该屏幕会显示`上次备份`的时间以及`备份大小`。


    ![图片](img/p94-02.jpg)


    `备份选项`部分允许您单独打开或关闭不同类型的备份，包括`相机胶卷`以及您可能已安装的任何与 iCloud 同步其设置或数据的应用。此部分还会告诉您每个应用使用了多少存储空间。


    最初，您只会看到几个应用。点击`查看所有应用`可查看完整列表。将某个应用设置为`关`意味着您将节省存储空间，但您的数据将不再在您的 iOS 设备之间同步，并且如果您重新安装设备或该应用，数据也不会恢复。


    ![图片](img/p95-01.jpg)


    **提示：** 您的 iPod touch 配备了 800 万像素、1080p 摄像头，这意味着备份`相机胶卷`会很快占用大量存储空间，尤其是在您仅有免费
    5GB 套餐的情况下。照片流功能已备份了您的照片；如果您不担心备份视频，那么您可以将`相机胶卷`备份切换为`关`以节省空间。


    ### 购买更多 iCloud 存储空间


    您可能会发现自己经常用完 iCloud 存储空间，决定开始备份更多照片和视频，或者发现需要备份多台 iOS 设备。如果是这样，您可以从 Apple 购买更多
    iCloud 存储空间。


    只需点击遍布 iCloud `设置`屏幕中的任意一个`购买更多存储空间`按钮。在撰写本文时，额外 iCloud 存储空间的价格如下：


    *   10GB 每年 20 美元

    *   20GB 每年 40 美元

    *   50GB 每年 100 美元


    ![图片](img/p96-01.jpg)

    '
- fmt: '### iTunes in the Cloud


    iCloud also includes the *iTunes in the Cloud* feature, which lets you re-download
    previously purchased apps. In some countries, it even lets you re-download iBooks,
    music, and even TV shows. This means you can download them to your iPod touch
    whenever you like, delete them when you no longer need them, and then re-download
    them again when you want them back.


    To learn more about re-downloading files from iTunes, see [Chapter 21](#Chapter21.html#ch21):
    “iTunes on Your Device,” [Chapter 22](#Chapter22.html#ch22): “The Amazing App
    Store,” and [Chapter 12](#Chapter12.html#ch12): “iBooks and E-Books.”


    You can also set up your iPod touch to automatically download any new apps, iBooks,
    subscription Newsstand issues, music, and TV shows purchased on any device or
    computer associated with your iTunes account. If you buy a new song on your PC
    or a new app on your iPod touch, then that song or app will immediately download
    and show up on your iPod touch, as well.


    Follow these steps to turn on automatic downloads:


    1. Launch `Settings`.

    2. Tap `Store`.

    3. Toggle `Music`, `Apps`, and `Books` to `ON`.


    ![images](images/p97-01.jpg)


    ### iCloud on the Computer


    iCloud doesn''t just sync your information between your iPod touch and Apple''s
    servers or between your iOS devices. It can also sync information between your
    iPod touch and your Windows or Mac PC.


    If you''re a Windows user, you can turn syncing on or off for several apps and
    services in the `iCloud Control Panel for Windows` (see [Figure 3–1](#Chapter03.html#fig_3_1)).
    Apps and services you can sync with include `Mail`, `Contacts`, `Calendars & Tasks`,
    and `Reminders`, among others.


    ![images](images/0301.jpg)


    **Figure 3–1.** *iCloud Control Panel for Windows*


    If you''re a Mac OS X user, you can turn these options on or off in the OS X 7.2
    `Lion iCloud Systems Settings` panel (see [Figure 3–2](#Chapter03.html#fig_3_2)).


    ![images](images/0302.jpg)


    **Figure 3–2.** *The Mac''s `Lion iCloud Systems Settings` panel (OS X 7.2)*


    Automatic app, books, music, and other downloads can be turned on or off in the
    `iTunes` app via the `Store Preferences` screen (see [Figure 3–3](#Chapter03.html#fig_3_3)).


    ![images](images/0303.jpg)


    **Figure 3–3.** *The `iTunes` `Store Preferences` screen*


    ### Syncing with iTunes


    There are a few things you need before you can start using `iTunes` to sync. In
    the upcoming sections, we will cover the prerequisites and answer a few common
    questions about the reasons to use iTunes. We will also help you understand what
    happens if you own another Apple device, such as an iPhone or iPad, and start
    syncing with your iPod touch.


    #### Prerequisites


    There are just a few things you need to do before you sync your iPod touch with
    `iTunes`:


    **TIP:** If you followed all the steps in [Chapter 1](#Chapter01.html#ch1): “Getting
    Started,” chances are you''ve already completed the steps listed below and the
    initial sync of your contacts, calendar, bookmarks, notes, and email accounts
    to your iPod touch. If so, you may want to skip ahead to the “Apps: Sync and Manage
    Them” section later in this chapter.


    1. Make sure you''ve installed version 10.5 or higher of the `iTunes` app on your
    computer. For help with installing or updating `iTunes`, see [Chapter 21](#Chapter21.html#ch21):
    “iTunes on Your Device.”

    2. Make sure you have your iTunes account ID handy. This is the email address
    and password you use to buy music, apps, and other content from iTunes.

    3. Get the white sync cable that came with your iPod touch. One end plugs into
    the bottom of your iPod touch near the `Home` button, and the other plugs into
    the USB port on your computer.


    #### Syncing iTunes with an iPhone or iPad *and* Your iPod touch?


    You might wonder whether you can sync iTunes with multiple devices, such as your
    iPhone or iPad and your iPod touch. Yes, you can! As long as you are syncing to
    the same computer, you can sync several Apple devices (Apple says up to five,
    but we''ve heard of people syncing more) to the same iTunes account on a single
    computer.


    **CAUTION:** You can''t sync the same iPod touch, iPad, or iPhone to two different
    computers. If you attempt to do this, you''ll see a message like this: “Would
    you like to wipe this device (iPod touch, iPad, iPhone) and resync the new library?”
    If you answer `Yes`, any music and videos on the device will be erased.


    #### There Are Other Sync Methods—Should I Use iTunes?


    iCloud is both free and the easiest way to keep your iPod touch in sync with your
    other devices, while `iTunes` is there to help you with large files, movies, and
    other content that iCloud doesn''t yet handle. You can also use other approaches
    to synchronize certain data, such as your personal information and email (including
    Exchange/Google). Keep in mind, however, that even if you choose one of these
    other approaches, you''ll still need to use iCloud and/or `iTunes` to accomplish
    the following:


    * Back up and restore files and data on your iPod touch

    * Update the iPod touch operating system software

    * Sync and manage your applications (apps)

    * Sync your music library and playlists

    * Sync movies, TV shows, podcasts, and iTunes U content

    * Sync books

    * Sync photos


    [Table 3–1](#Chapter03.html#tab_3_1) summarizes your synchronization options.
    What method you choose to use for synchronization should be driven by where you
    currently store your email, contacts, and calendar; your environment; and whether
    you want to have a wireless sync.


    **NOTE:** Some environments let you wirelessly sync your contacts and calendars
    to your iPod touch.


    ![images](images/t0301.jpg)

    ![images](images/t0301a.jpg)


    ### Set Up Your iTunes Sync


    Next, we will show you all the steps for using the `iTunes` app to perform both
    automated syncs and manual transfers of information to your iPod touch.'
