- fmt: "### 搜索应用\n\n![]（images/p473-01.jpg）\n\n假设您对想找的应用类型有明确的想法。轻触`search`软键，然后输入程序名称或程序类型。\n\
    \n因此，如果您正在寻找一个能帮助您划船的应用，只需输入 `rowing` 看看会出现什么结果。\n\n您可能会看到一些建议的搜索词出现；轻点这些词以缩小搜索范围。\n\
    \n![]（images/p473-02.jpg）\n\n在建议的搜索词中轻点`rowing stats`只会得到一个结果。\n\n![]（images/p473-03.jpg）\n\
    \n我们想看到所有与划船相关的应用，因此在`search`栏中轻点，并使用`backspace`键擦除单词 `stats`。接着，轻点右下角的`search`按钮，以查看更广泛的划船相关结果列表。\n\
    \n**提示：** 如果您是在水上划船（而不仅仅是在划船机上），您可能会想看看`speedcoach mobile`，售价为 $64.99。还有一个免费的（在撰写本文时）替代品叫做`irowpro`。\n\
    \n![]（images/p473-04.jpg）\n\n### 下载应用\n\n一旦找到您想要的应用，就可以直接将其下载到您的 iPod touch 上，如\
    \ [Figure 22–5]（#Chapter22.html#fig_22_5）所示。\n\n找到您想购买的应用后，注意那个写着`free`或`$0.99`（或任何价格）的小按钮。\n\
    \n轻触那个按钮，它会变为`install`（如果是免费程序）或`buy now`（如果是付费程序）。\n\n![]（images/p474-01.jpg）\n\
    \n![]（images/2205.jpg）\n\n**Figure 22–5.** *购买应用或下载免费应用*\n\n阅读完评价和应用描述（可能还访问了开发者支持网站）后，继续下载或购买该应用。轻触`download\
    \ app`按钮后，系统会提示您输入 iTunes 密码。\n\n输入密码并轻点`ok`；应用将下载到您的 iPod touch 上。\n\n#### 将应用作为礼物赠送\n\
    \n在每个应用的详情页面底部附近，您会看到一个`gift this app`按钮，您可以用它通过电子邮件将应用作为礼物赠送给任何人。操作方法如下：\n\n\
    1.  调出**您要赠送的应用的详细信息**。向下滑动到页面底部，轻点`gift this app`。\n\n    ![]（images/p475-01.jpg）\n\
    \n2.  登录您的 iTunes 帐户以查看下一页。\n3.  确认接收礼物的人的设备满足所示要求。\n\n    ![]（images/p475-02.jpg）\n\
    \n4.  输入**您的姓名**、**接收者姓名**和**电子邮件**。然后向下滚动输入一条个人消息。赠送的应用通过电子邮件发送。\n5.  轻点`next`。\n\
    \n    ![]（images/p476-01.jpg）\n\n6.  在最终屏幕上，您可以确认一切看起来是否正确：您的消息、接收者的电子邮件。\n7.\
    \  要完成赠送并将电子邮件发送给接收者，轻点底部的`buy gift`。\n\n    ![]（images/p476-02.jpg）\n\n#### 寻找免费或折扣应用\n\
    \n在浏览了一圈之后，您会注意到 App Store 的几件事。首先，有很多*免费*应用。有时这些是很好的应用。其他时候它们则不那么有用——但仍然可能很有趣！\n\
    \n其次，您会注意到有些应用会进行促销，而其他应用则会随着时间推移变得便宜。如果您有一个喜欢的应用，今天售价 $6.99，等几周或一个月再买，您可能会看到它的价格下降。\n\
    \n### 兑换礼品卡或 iTunes 代码\n\n您可以滑动到 App Store 中大多数页面的底部来兑换礼品卡或 iTunes 代码。\n\n在底部，轻点`redeem`按钮。\n\
    \n![]（images/p477-01.jpg）\n\n在下一个屏幕上输入您的代码。（您可能需要刮掉礼品卡背面的涂层才能看到代码。）\n\n轻点`redeem`按钮。\n\
    \n![]（images/p477-02.jpg）\n\n### 维护和更新您的应用\n\n开发者通常会为 iPod touch 更新他们的应用。您无需使用电脑进行更新——可以直接在\
    \ iPod touch 上完成。\n\n您甚至可以通过查看`app store`图标来了解是否有更新以及有多少更新。这里显示的图标有五个应用更新可供下载。\n\
    \n![]（images/p477-03.jpg）\n\n进入 App Store 后，轻点底部最右侧的图标。这是`updates`图标。\n\n![]（images/p478-01.jpg）\n\
    \n如果您的应用有可用更新，会有一个红色的小数字提示。这个数字对应有更新的应用数量。\n\n当您轻点`update`按钮时，iPod touch 会显示哪些应用有更新。\n\
    \n![]（images/p478-02.jpg）\n\n要获取更新，您可以逐个轻触应用。但更简单的方法是轻点右上角的`update all`按钮 ![]（images/p478-03.jpg），一次性更新所有应用。iPod\
    \ touch 会离开 App Store，您可以在小状态栏中查看更新进度。所有正在更新的应用图标会显示为灰色。\n\n一些状态消息会显示`waiting`，而另一些则会显示`loading`或`installing`。更新完成后，所有图标将恢复为正常颜色。\n\
    \n![]（images/p478-04.jpg）\n\n**注意：** 您需要重新启动`app store`应用才能返回。更新过程会将您完全带出商店。\n\
    \n#### 重新下载应用\n\n一旦您下载了某个应用，无论是免费还是付费，您都可以随时再次下载，无需额外付费。例如，假设您购买了一款应用在度假时使用。旅行结束后，您可以安全地删除它，然后在下次旅行时再次下载。这有助于保持您的`home`屏幕整洁，并防止\
    \ iPod touch 存储空间不足。\n\n要获取您之前购买或下载的应用列表，请轻点`update`按钮，然后轻点屏幕最顶部的`purchased`标签。\n\
    \n![]（images/p479-01.jpg）\n\n在`purchased`部分，您有两种视图选择。首先，您可以查看所有曾经购买或下载的应用列表。或者，您可以查看当前*未*安装在\
    \ iPod touch 上的应用列表。\n\n**注意：** 您是否看到一些不记得购买或下载的应用？如果是这样，可能是因为您在 iPhone 上下载了应用、在\
    \ iPad 上购买了通用应用，或者您的 iTunes 帐户与曾在其设备上下载过应用的配偶或家庭成员共享。\n\n![]（images/p479-02.jpg）\n\
    \n### 自动下载\n\niCloud 在线服务允许您设置 iPod touch，使其自动下载并安装您通过 Windows 或 Mac 电脑上的 iTunes——甚至是其他\
    \ iOS 设备（如 iPad）上购买的任何应用。\n\n按照以下步骤开启自动下载：\n\n1.  轻点`settings`图标。\n2.  向下滚动并轻点`store`。\n\
    3.  将`apps`的`automatic downloads`切换为`on`。\n\n![]（images/p480-01.jpg）\n\n如果您不再希望自动下载应用，只需将`apps`的`automatic\
    \ downloads`切换回`off`即可。"
  raw: "#### Searching for an App\n\n![images](images/p473-01.jpg)\n\nLet's say you\
    \ have a specific idea of the type of app you want to find. Touch the **Search**\
    \ soft key and type in either the name of the program or the type of program.\n\
    \nSo, if you are looking for an app to help you with rowing, just type in “rowing”\
    \ to see what comes up.\n\nYou may see some suggested search terms appear; tap\
    \ these to narrow your search.\n\n![images](images/p473-02.jpg)\n\nTapping **Rowing\
    \ Stats** in the suggested search terms yields only one result.\n\n![images](images/p473-03.jpg)\n\
    \nWe want to see all the rowing-related apps, so we tap in the **Search** bar\
    \ and use the **Backspace** key to erase the word “stats.” Next, we tap the **Search**\
    \ button in the lower-right corner to see a broader list of rowing-related results.\n\
    \n**TIP:** If you row on the water (instead of only on a rowing machine), you\
    \ might want to check out **SpeedCoach Mobile**, which sells for $64.99\\. There\
    \ is also a free (at the time of writing) alternative called **iRowPro**.\n\n\
    ![images](images/p473-04.jpg)\n\n### Downloading an App\n\nOnce you find the app\
    \ you are looking for, you can download it right to your iPod touch, as shown\
    \ in [Figure 22–5](#Chapter22.html#fig_22_5).\n\nAfter locating the app you want\
    \ to buy, notice the small button that says either **Free** or **$0.99** (or whatever\
    \ the price is).\n\nJust touch that button, and it will change to say **Install**\
    \ if it is a free program or **Buy Now** if it is a paid program.\n\n![images](images/p474-01.jpg)\n\
    \n![images](images/2205.jpg)\n\n**Figure 22–5.** *Buying an app or downloading\
    \ a free app*\n\nOnce you have read the reviews and the app description (and perhaps\
    \ visited the developer support site), go ahead and download or purchase the app.\
    \ Once you tap the **Download App** button, you will be prompted to input your\
    \ iTunes password.\n\nInput your password and tap **OK**; the app will be downloaded\
    \ to your iPod touch.\n\n#### Giving an App as a Gift\n\nDown near the bottom\
    \ of the details screen for each app, you will see a Gift This App button which\
    \ you can use to give the app as a gift to anyone via email. Here's how to do\
    \ it.\n\n1.  Bring up the **details on the app you want to gift. Swipe all the\
    \ way to the bottom of the page and tap Gift This App.**\n\n    ![images](images/p475-01.jpg)\n\
    \n2.  Log In to your iTunes account to see the next page.\n3.  Verify that the\
    \ person who is receiving the gift has a device that meets the requirements shown.\n\
    \n    ![images](images/p475-02.jpg)\n\n4.  Type **Your Name**, the **Recipient's\
    \ Name** and **Email**. Then scroll down and type a personal message. Gifted apps\
    \ are sent by email.\n5.  Tap **Next**.\n\n    ![images](images/p476-01.jpg)\n\
    \n6.  In the final screen, you can verify everything looks correct, your message,\
    \ the recipient's email.\n7.  To complete the gift and have the email sent to\
    \ the recipient, tap **Buy Gift** at the bottom.\n\n    ![images](images/p476-02.jpg)\n\
    \n#### Finding Free or Discounted Apps\n\nAfter browsing around, you will notice\
    \ a couple of things about the App Store. First, there are lots of *free* apps.\
    \ Sometimes, these are great applications. Other times, they are not so useful—but\
    \ they can still be fun!\n\nSecond, you will notice that there will be sales for\
    \ some of the apps, while other apps will become less expensive over time. If\
    \ you have a favorite app and it costs $6.99 today, you might see its price decrease\
    \ if you wait a few weeks or a month before buying it.\n\n### Redeeming Gift Cards\
    \ or iTunes Codes\n\nYou can redeem gift cards or iTunes codes by swiping all\
    \ the way to the bottom of most pages in the App Store.\n\nAt the bottom, tap\
    \ the **Redeem** button.\n\n![images](images/p477-01.jpg)\n\nEnter your code on\
    \ the next screen. (You may have to scratch off something from the back of the\
    \ gift card to see the code.)\n\nTap the **Redeem** button.\n\n![images](images/p477-02.jpg)\n\
    \n### Maintaining and Updating Your Apps\n\nOften, developers will update their\
    \ apps for the iPod touch. You don't need to use your computer to perform the\
    \ update—you can do it right on your iPod touch.\n\nYou can even tell if you have\
    \ updates, and how many, by looking at the **App Store** icon. The one shown here\
    \ has five app updates available for you to download.\n\n![images](images/p477-03.jpg)\n\
    \nOnce you enter the App Store, tap the right-most icon on the bottom row. This\
    \ is the **Updates** icon.\n\n![images](images/p478-01.jpg)\n\nIf you have apps\
    \ with updates available, there will be a small number indicated in red. This\
    \ number corresponds to the number of apps with updates.\n\nWhen you tap the **Update**\
    \ button, the iPod touch shows you which apps have updates.\n\n![images](images/p478-02.jpg)\n\
    \nTo get your updates, you could touch an individual app. However, it is easier\
    \ to touch the **Update All** button ![images](images/p478-03.jpg) in the upper-right\
    \ corner to have all your apps updated at once. The iPod touch will leave the\
    \ App Store, and you can see the progress of the updates in the little status\
    \ bars. All apps updating will have icons that look grayed out.\n\nSome status\
    \ messages will show **Waiting**, while others will show **Loading** or **Installing**.\
    \ When the update is complete, all your icons will return to their normal colors.\n\
    \n![images](images/p478-04.jpg)\n\n**NOTE:** You will need to relaunch the **App\
    \ Store** app to get back in. The update process takes you completely out of the\
    \ store.\n\n#### Redownloading Apps\n\nOnce you've downloaded an app, whether\
    \ free or paid, you can download it again as often as you like at no additional\
    \ charge. For example, assume you buy an app to take with you on vacation. Once\
    \ you've finished your trip, you can safely delete it and then download it again\
    \ the next time you travel. This can help keep your **Home** screen clean and\
    \ help prevent you from running out of storage on your iPod touch.\n\nTo get a\
    \ list of apps you've previously bought or downloaded, tap the **Update** button\
    \ and then tap the **Purchased** tab at the very top of the screen.\n\n![images](images/p479-01.jpg)\n\
    \nInside the **Purchased** section, you have a choice of two views. First, you\
    \ can view a list of all the apps you've ever bought or downloaded. Alternatively,\
    \ you can view a list of apps that *aren't* currently installed on your iPod touch.\n\
    \n**NOTE:** Are you seeing apps listed that you don't remember buying or downloading?\
    \ If so, this might be because you downloaded apps on your iPhone, purchased universal\
    \ apps on your iPad, or you shared your iTunes account with a spouse or family\
    \ member who has downloaded apps to their device(s).\n\n![images](images/p479-02.jpg)\n\
    \n### Automatic Downloads\n\nThe iCloud online service lets you set up your iPod\
    \ touch so it automatically downloads and installs any apps you purchase through\
    \ iTunes on your Windows or Mac PC—or even on another iOS device, such as your\
    \ iPad.\n\nFollow these steps to turn on Automatic Downloads:\n\n1.  Tap the **Settings**\
    \ icon.\n2.  Scroll down and tap **Store**.\n3.  Toggle **Automatic Downloads**\
    \ for **Apps** to **ON.**\n\n![images](images/p480-01.jpg)\n\nIf you no longer\
    \ wish to download apps automatically, simply toggle **Automatic Downloads** for\
    \ **Apps** back to **OFF.**"
  trans: "\n### 搜索应用\n\n![]（images/p473-01.jpg）\n\n假设您对想找的应用类型有明确的想法。轻触`search`软键，然后输入程序名称或程序类型。\n\
    \n因此，如果您正在寻找一个能帮助您划船的应用，只需输入 `rowing` 看看会出现什么结果。\n\n您可能会看到一些建议的搜索词出现；轻点这些词以缩小搜索范围。\n\
    \n![]（images/p473-02.jpg）\n\n在建议的搜索词中轻点`rowing stats`只会得到一个结果。\n\n![]（images/p473-03.jpg）\n\
    \n我们想看到所有与划船相关的应用，因此在`search`栏中轻点，并使用`backspace`键擦除单词 `stats`。接着，轻点右下角的`search`按钮，以查看更广泛的划船相关结果列表。\n\
    \n**提示：** 如果您是在水上划船（而不仅仅是在划船机上），您可能会想看看`speedcoach mobile`，售价为 $64.99。还有一个免费的（在撰写本文时）替代品叫做`irowpro`。\n\
    \n![]（images/p473-04.jpg）\n\n### 下载应用\n\n一旦找到您想要的应用，就可以直接将其下载到您的 iPod touch 上，如\
    \ [图 22–5]（#Chapter22.html#fig_22_5）所示。\n\n找到您想购买的应用后，注意那个写着`free`或`$0.99`（或任何价格）的小按钮。\n\
    \n轻触那个按钮，它会变为`install`（如果是免费程序）或`buy now`（如果是付费程序）。\n\n![]（images/p474-01.jpg）\n\
    \n![]（images/2205.jpg）\n\n**图 22–5.** *购买应用或下载免费应用*\n\n阅读完评价和应用描述（可能还访问了开发者支持网站）后，继续下载或购买该应用。轻触`download\
    \ app`按钮后，系统会提示您输入 iTunes 密码。\n\n输入密码并轻点`ok`；应用将下载到您的 iPod touch 上。\n\n#### 将应用作为礼物赠送\n\
    \n在每个应用的详情页面底部附近，您会看到一个`gift this app`按钮，您可以用它通过电子邮件将应用作为礼物赠送给任何人。操作方法如下：\n\n\
    1.  调出**您要赠送的应用的详细信息**。向下滑动到页面底部，轻点`gift this app`。\n\n    ![]（images/p475-01.jpg）\n\
    \n2.  登录您的 iTunes 帐户以查看下一页。\n3.  确认接收礼物的人的设备满足所示要求。\n\n    ![]（images/p475-02.jpg）\n\
    \n4.  输入**您的姓名**、**接收者姓名**和**电子邮件**。然后向下滚动输入一条个人消息。赠送的应用通过电子邮件发送。\n5.  轻点`next`。\n\
    \n    ![]（images/p476-01.jpg）\n\n6.  在最终屏幕上，您可以确认一切看起来是否正确：您的消息、接收者的电子邮件。\n7.\
    \  要完成赠送并将电子邮件发送给接收者，轻点底部的`buy gift`。\n\n    ![]（images/p476-02.jpg）\n\n#### 寻找免费或折扣应用\n\
    \n在浏览了一圈之后，您会注意到 App Store 的几件事。首先，有很多*免费*应用。有时这些是很好的应用。其他时候它们则不那么有用——但仍然可能很有趣！\n\
    \n其次，您会注意到有些应用会进行促销，而其他应用则会随着时间推移变得便宜。如果您有一个喜欢的应用，今天售价 $6.99，等几周或一个月再买，您可能会看到它的价格下降。\n\
    \n### 兑换礼品卡或 iTunes 代码\n\n您可以滑动到 App Store 中大多数页面的底部来兑换礼品卡或 iTunes 代码。\n\n在底部，轻点`redeem`按钮。\n\
    \n![]（images/p477-01.jpg）\n\n在下一个屏幕上输入您的代码。（您可能需要刮掉礼品卡背面的涂层才能看到代码。）\n\n轻点`redeem`按钮。\n\
    \n![]（images/p477-02.jpg）\n\n### 维护和更新您的应用\n\n开发者通常会为 iPod touch 更新他们的应用。您无需使用电脑进行更新——可以直接在\
    \ iPod touch 上完成。\n\n您甚至可以通过查看`app store`图标来了解是否有更新以及有多少更新。这里显示的图标有五个应用更新可供下载。\n\
    \n![]（images/p477-03.jpg）\n\n进入 App Store 后，轻点底部最右侧的图标。这是`updates`图标。\n\n![]（images/p478-01.jpg）\n\
    \n如果您的应用有可用更新，会有一个红色的小数字提示。这个数字对应有更新的应用数量。\n\n当您轻点`update`按钮时，iPod touch 会显示哪些应用有更新。\n\
    \n![]（images/p478-02.jpg）\n\n要获取更新，您可以逐个轻触应用。但更简单的方法是轻点右上角的`update all`按钮 ![]（images/p478-03.jpg），一次性更新所有应用。iPod\
    \ touch 会离开 App Store，您可以在小状态栏中查看更新进度。所有正在更新的应用图标会显示为灰色。\n\n一些状态消息会显示`waiting`，而另一些则会显示`loading`或`installing`。更新完成后，所有图标将恢复为正常颜色。\n\
    \n![]（images/p478-04.jpg）\n\n**注意：** 您需要重新启动`app store`应用才能返回。更新过程会将您完全带出商店。\n\
    \n#### 重新下载应用\n\n一旦您下载了某个应用，无论是免费还是付费，您都可以随时再次下载，无需额外付费。例如，假设您购买了一款应用在度假时使用。旅行结束后，您可以安全地删除它，然后在下次旅行时再次下载。这有助于保持您的`home`屏幕整洁，并防止\
    \ iPod touch 存储空间不足。\n\n要获取您之前购买或下载的应用列表，请轻点`update`按钮，然后轻点屏幕最顶部的`purchased`标签。\n\
    \n![]（images/p479-01.jpg）\n\n在`purchased`部分，您有两种视图选择。首先，您可以查看所有曾经购买或下载的应用列表。或者，您可以查看当前*未*安装在\
    \ iPod touch 上的应用列表。\n\n**注意：** 您是否看到一些不记得购买或下载的应用？如果是这样，可能是因为您在 iPhone 上下载了应用、在\
    \ iPad 上购买了通用应用，或者您的 iTunes 帐户与曾在其设备上下载过应用的配偶或家庭成员共享。\n\n![]（images/p479-02.jpg）\n\
    \n### 自动下载\n\niCloud 在线服务允许您设置 iPod touch，使其自动下载并安装您通过 Windows 或 Mac 电脑上的 iTunes——甚至是其他\
    \ iOS 设备（如 iPad）上购买的任何应用。\n\n按照以下步骤开启自动下载：\n\n1.  轻点`settings`图标。\n2.  向下滚动并轻点`store`。\n\
    3.  将`apps`的`automatic downloads`切换为`on`。\n\n![]（images/p480-01.jpg）\n\n如果您不再希望自动下载应用，只需将`apps`的`automatic\
    \ downloads`切换回`off`即可。\n"
- fmt: "### Other App Store Settings\n\nInside the settings for the `App Store` app,\
    \ you can also check which account is logged into the store, log out, turn off\
    \ the Genius feature, view your iTunes account, and work with your newsletter\
    \ subscriptions.\n\n**TIP:** If you want to prevent someone from buying apps on\
    \ your iPod touch using your iTunes account, you need to sign out of iTunes using\
    \ the steps described next.\n\nFollow these steps to change the other settings\
    \ for the `App Store` app:\n\n1. Note that you can see the account you are logged\
    \ in with at the top of this screen.\n2. Tap `Sign Out` if you wish to log out\
    \ of the iTunes service. For example, you might give your iPod touch to someone\
    \ you don't want using your phone to buy apps with your iTunes account.\n3. Tap\
    \ `View Account` to see the details of your account (you will need to sign in).\n\
    \n   ![images](images/p481-01.jpg)\n\n4. The figure to the right shows your account\
    \ information. Tap `Payment Information` to adjust your billing information (e.g.,\
    \ your credit card type and number).\n5. Tap `Billing Address` to update your\
    \ address.\n6. Tap `Change Country` to change your country.\n\n   ![images](images/p481-02.jpg)\n\
    \n7. Scroll down to see more settings.\n8. You can `Turn Off Genius for Apps`\
    \ (or if it is off, this button will allow you to turn it on). Or, you can `Subscribe`\
    \ or `Unsubscribe` to the iTunes newsletter from this dialog.\n9. Tap `Done` in\
    \ the upper-right corner when finished.\n\n![images](images/p481-03.jpg)\n\n##\
    \ Chapter 23\n\n## Games and Fun\n\nYour iPod touch excels at many things. It\
    \ is a multimedia workhorse, and it can keep track of your busy life. Your iPod\
    \ touch particularly excels in two areas: as a gaming device and for displaying\
    \ apps that take advantage of its beautiful, high-resolution touch screen and\
    \ powerful graphical processor. You can even find versions of popular games for\
    \ the device that you might expect to find only on dedicated gaming consoles.\n\
    \nThe iPod touch brings many advantages to portable gaming: the high definition\
    \ (HD) screen delivers realistic visuals; the high quality audio provides great\
    \ sound effects; and the gyroscope and the accelerometer allow you to interact\
    \ with your games in a way that many PCs and dedicated gaming consoles (outside\
    \ of the Wii) don't. For example, in racing games, the last feature lets you steer\
    \ your car by turning the iPod touch as you hold it.\n\nWith AirPlay Mirroring,\
    \ you can even beam your game to an Apple TV on the same Wi-Fi network and play\
    \ on your big screen television.\n\nThe iPod touch is also great for lots of other\
    \ fun stuff such as following your local baseball team and even using the iPod\
    \ touch as a musical instrument with great apps like `Ocarina` (which we will\
    \ show you later in the chapter).\n\n### Using the iPod touch As a Gaming Device\n\
    \nThe iPod touch includes a built-in accelerometer and `gyroscope`, which is essentially\
    \ a device that detects movement (acceleration) and tilt.\n\nCombine the accelerometer\
    \ with a fantastic screen, lots of memory, and a fast processor, and you have\
    \ the makings of a great gaming platform. With literally thousands of gaming titles\
    \ to choose from, you can play virtually any type of game you wish on your iPod\
    \ touch.\n\nWith multitasking, you can even take a phone call and come back to\
    \ the exact place you left off.\n\n**NOTE:** Some games require that you have\
    \ an active network connection to engage in multiplayer games.\n\nWith the iPod\
    \ touch, you can play a driving game and use the iPod touch itself to steer. You\
    \ do this simply by turning the device. You can touch the iPod touch to brake\
    \ or tilt it forward to accelerate.\n\nThis game is so realistic that it might\
    \ make you carsick!\n\nReal Racing also has a nice Party Play feature, where you\
    \ can race against your friends - give it a try!\n\nOr, you can try a fishing\
    \ game, where you cast and reel in fish from the perspective of being on a boat!\n\
    \n![images](images/p484-01.jpg)\n\n![images](images/p484-02.jpg)\n\nIf music/rhythm\
    \ games are your thing, then you will find many such programs in the App Store\
    \ such as `Rock Band`. There are also fantastic fighting games like `Infinity\
    \ Blade`, which is powered by the Epic Unreal 3 Engine; first-person shooters\
    \ (FPS) like `Call of Duty: Zombies`; and some of the most popular casual games\
    \ on the planet, such as `Angry Birds`.\n\n![images](images/p485-01.jpg)\n\nThe\
    \ iPod touch also has a very fast processor and a sophisticated graphics chip.\
    \ Bundling these together with the accelerometer gives you a very capable gaming\
    \ device.\n\n#### Acquiring Games and Other Fun Apps\n\nAs is the case for all\
    \ iPod touch apps, games can be found at the App Store (see [Figure 23–1](#Chapter23.html#fig_23_1)).\
    \ You can get them either through the `iTunes` app on your computer or through\
    \ the device's `App Store` app.\n\n![images](images/2301.jpg)\n\n**Figure 23–1**.\
    \ *The layout of the App Store's `Games` section*\n\nTo get a game, fire up the\
    \ `App Store` app, as you did in the previous chapter. Next, use the `Categories`\
    \ icon to go to the `Games` tab. You will also find many games in the `Featured`\
    \ section of the App store, as well as in the `New and Notable` section. [Figure\
    \ 23–2](#Chapter23.html#fig_23_2) shows the app purchase page for a game available\
    \ for the iPod touch.\n\n![images](images/p486-01.jpg)\n\n![images](images/2302.jpg)\n\
    \n**Figure 23–2.** *The layout of the `App Purchase` page*\n\n#### Reading Reviews\
    \ Before You Buy\n\nMany of the games have user reviews that are worth perusing.\
    \ Sometimes, you can get a good sense of the game before you buy it. If you find\
    \ a game that looks interesting, don't be afraid to do a simple Google search\
    \ to see whether any mainstream media outlets have performed a full review.\n\n\
    ![images](images/p487-01.jpg)\n\n#### Looking for Free Trials or Lite Versions\n\
    \nIncreasingly, game developers are giving users free trials of their games to\
    \ see if they like them before they buy. You will find many games have both a\
    \ `Lite` version and a `Full` version in the App Store.\n\nSome “free” games are\
    \ supported by the inclusion of ads within the game. Other games are free to start,\
    \ but require in-app purchases for continued play or additional features.\n\n\
    ![images](images/p487-02.jpg)\n\n#### Being Careful When You Play\n\nYou might\
    \ use the iPod touch to cast your line in a fishing game, as you would in real\
    \ life. You can also move around a bit in driving and first-person shooter games.\
    \ The point: Be mindful of your surroundings as you play! For example, make sure\
    \ you have a good grip on your device, so it doesn't slip out of your hand; we\
    \ recommend a good silicone case to help with this.\n\n**CAUTION**: Games such\
    \ as `Real Racing` can be quite addictive!\n\n#### Two-Player Games\n\nThe iPod\
    \ touch really opens up the possibility for two-player gaming. In this example,\
    \ we are playing checkers against one another, using the iPod touch as a game\
    \ board.\n\nYou can find similar two-person gaming apps for other board games,\
    \ such as chess, Monopoly, and Uno.\n\n![images](images/p488-01.jpg)\n\n#### Online\
    \ and Wireless Games\n\nThe iPod touch also allows online and wireless, peer-to-peer\
    \ gaming (if the game supports it). Many new games are incorporating this technology.\
    \ In `Scrabble`, for example, you can play against multiple players on their own\
    \ devices. You can even use the iPod touch as your game board and up to four individual\
    \ iPod touches as wireless “racks” to hold the letters of all the players. Just\
    \ flick the letters off the rack, and they go onto the board—very cool!\n\nIn\
    \ this example, I selected `Online` from the `Real Racing` menu. I now have the\
    \ option to either play against another opponent through Wi-Fi or to join an online\
    \ league race.\n\n![images](images/p488-02.jpg)\n\n**NOTE:** If you just want\
    \ to play against a friend who is nearby, select Wi-Fi mode for multiplayer games.\
    \ If you just want to play against new people, try going online for a league race\
    \ or game."
