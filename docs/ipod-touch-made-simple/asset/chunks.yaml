    \ afraid to do a simple Google search to see whether any mainstream media outlets\
    \ have performed a full review.\n\n![images](images/p487-01.jpg)\n\n#### Looking\
    \ for Free Trials or Lite Versions\n\nIncreasingly, game developers are giving\
    \ users free trials of their games to see if they like them before they buy. You\
    \ will find many games have both a *Lite* version and a *Full* version in the\
    \ App Store.\n\nSome “free” games are supported by the inclusion of ads within\
    \ the game. Other games are free to start, but require in-app purchases for continued\
    \ play or additional features.\n\n![images](images/p487-02.jpg)\n\n#### Being\
    \ Careful When You Play\n\nYou might use the iPod touch to cast your line in a\
    \ fishing game, as you would in real life. You can also move around a bit in driving\
    \ and first-person shooter games. The point: Be mindful of your surroundings as\
    \ you play! For example, make sure you have a good grip on your device, so it\
    \ doesn't slip out of your hand; we recommend a good silicone case to help with\
    \ this.\n\n**CAUTION**: Games such as **Real Racing** can be quite addictive!\n\
    \n#### Two-Player Games\n\nThe iPod touch really opens up the possibility for\
    \ two-player gaming. In this example, we are playing checkers against one another,\
    \ using the iPod touch as a game board.\n\nYou can find similar two-person gaming\
    \ apps for other board games, such as chess, Monopoly, and Uno..\n\n![images](images/p488-01.jpg)\n\
    \n#### Online and Wireless Games\n\nThe iPod touch also allows online and wireless,\
    \ peer-to-peer gaming (if the game supports it). Many new games are incorporating\
    \ this technology. In **Scrabble**, for example, you can play against multiple\
    \ players on their own devices. You can even use the iPod touch as your game board\
    \ and up to four individual iPod touchs as wireless “racks” to hold the letters\
    \ of all the players. Just flick the letters off the rack, and they go onto the\
    \ board—very cool!\n\nIn this example, I selected **Online** from the **Real Racing**\
    \ menu. I now have the option to either play against another opponent through\
    \ Wi-Fi or to join an online league race.\n\n![images](images/p488-02.jpg)\n\n\
    **NOTE:** If you just want to play against a friend who is nearby, select Wi-Fi\
    \ mode for multiplayer games. If you just want to play against new people, try\
    \ going online for a league race or game."
  trans: "\n### 其他 App Store 设置\n\n在 `App Store` 应用的设置中，你还可以检查当前登录到商店的是哪个账户、注销登录、关闭\
    \ Genius 功能、查看你的 iTunes 账户，以及管理你的资讯订阅。\n\n**提示：** 如果你想阻止他人使用你的 iTunes 账户在你的 iPod\
    \ touch 上购买应用，你需要按照接下来描述的步骤退出登录 iTunes。\n\n按照以下步骤更改 `App Store` 应用的其他设置：\n\n1.\
    \ 注意，你可以在该屏幕顶部看到你当前登录的账户。\n2. 如果你希望退出登录 iTunes 服务，请轻点“`退出登录`”。例如，你可能将 iPod touch\
    \ 交给某个人，而你不希望此人使用你的手机并通过你的 iTunes 账户购买应用。\n3. 轻点“`查看账户`”以查看你账户的详细信息（你需要登录）。\n\n\
    \   ![images](img/p481-01.jpg)\n\n4. 右侧的图示显示了你的账户信息。轻点“`付款信息`”以调整你的账单信息（例如，你的信用卡类型和卡号）。\n\
    5. 轻点“`账单地址`”以更新你的地址。\n6. 轻点“`更改国家或地区`”以更改你的国家或地区。\n\n   ![images](img/p481-02.jpg)\n\
    \n7. 向下滚动以查看更多设置。\n8. 你可以“`关闭 App  Genius 功能`”（如果该功能已关闭，此按钮将允许你将其开启）。或者，你可以在此对话框中“`订阅`”或“`取消订阅`”iTunes\
    \ 资讯。\n9. 完成后，轻点右上角的“`完成`”。\n\n![images](img/p481-03.jpg)\n\n## 第 23 章\n\n## 游戏与娱乐\n\
    \n你的 iPod touch 在诸多方面都表现出色。它是一款多媒体利器，能够管理你忙碌的生活。iPod touch 尤其擅长两个领域：作为游戏设备，以及运行那些充分利用其精美高分辨率触摸屏和强大图形处理器的应用。你甚至能找到一些流行游戏的\
    \ iPod touch 版本，而这些游戏你可能本以为只有在专用游戏主机上才能玩到。\n\niPod touch 为便携游戏带来了诸多优势：高清（HD）屏幕呈现逼真的视觉效果；高品质音频提供出色的音效；陀螺仪和加速计让你能以许多\
    \ PC 和（除 Wii 外的）专用游戏主机所不具备的方式与游戏互动。例如，在赛车游戏中，后者这一特性让你可以通过手持 iPod touch 并转动它来操控方向。\n\
    \n借助 AirPlay 镜像功能，你甚至可以将游戏画面投射到同一 Wi-Fi 网络上的 Apple TV 上，并在你的大屏幕电视上进行游戏。\n\niPod\
    \ touch 也非常适合其他许多有趣的活动，比如关注你当地的棒球队，甚至借助像 `Ocarina` 这样出色的应用（我们将在本章稍后介绍），将 iPod\
    \ touch 当作一种乐器来使用。\n\n### 将 iPod touch 用作游戏设备\n\niPod touch 包含内置的加速计和 `gyroscope`（陀螺仪），它本质上是一种能够检测运动（加速度）和倾斜度的设备。\n\
    \n将加速计与出色的屏幕、大容量内存以及快速处理器相结合，你就拥有了一个出色游戏平台的构成要素。由于有数以千计的游戏可供选择，你几乎可以在 iPod touch\
    \ 上玩任何你想玩的游戏类型。\n\n借助多任务处理功能，你甚至可以接听电话，然后返回到游戏中你之前离开的精确位置。\n\n**注意：** 有些游戏要求你具备活跃的网络连接才能参与多人游戏。\n\
    \n使用 iPod touch，你可以玩驾驶游戏，并通过 iPod touch 本身来操控方向。你只需转动设备即可做到这一点。你可以触摸 iPod touch\
    \ 来刹车，或者将其向前倾斜来加速。\n\n这款游戏逼真到可能会让你感到晕车！\n\n《真实赛车》还有一个不错的派对游戏功能，你可以在其中与朋友比赛——试试看吧！\n\
    \n或者，你可以尝试一款钓鱼游戏，在其中你可以从船上的视角抛竿并收线钓鱼！\n\n![images](img/p484-01.jpg)\n\n![images](img/p484-02.jpg)\n\
    \n如果你喜欢音乐/节奏类游戏，那么你会在 App Store 中找到许多此类程序，例如 `Rock Band`。还有精彩的格斗游戏，比如由 Epic Unreal\
    \ 3 引擎驱动的 `Infinity Blade`；第一人称射击（FPS）游戏，如 `Call of Duty: Zombies`；以及一些全球最受欢迎的休闲游戏，例如\
    \ `Angry Birds`。\n\n![images](img/p485-01.jpg)\n\niPod touch 还拥有非常快速的处理器和先进的图形芯片。将这些与加速计结合，你就拥有了一款性能强大的游戏设备。\n\
    \n#### 获取游戏与其他有趣的应用\n\n与所有 iPod touch 应用一样，游戏可以在 App Store 中找到（参见图 23–1）。你可以通过电脑上的\
    \ `iTunes` 应用，或通过设备上的 `App Store` 应用来获取它们。\n\n![images](img/2301.jpg)\n\n**图 23–1**。*App\
    \ Store 中“`游戏`”版块的布局*\n\n要获取一款游戏，请像上一章那样启动 `App Store` 应用。接着，使用“`类别`”图标进入“`游戏`”标签页。你还会在\
    \ App Store 的“`推荐`”版块以及“`最新内容和热门内容`”版块中找到许多游戏。图 23–2 展示了一款适用于 iPod touch 的游戏的应用购买页面。\n\
    \n![images](img/p486-01.jpg)\n\n![images](img/2302.jpg)\n\n**图 23–2**。*“`应用购买`”页面的布局*\n\
    \n#### 购买前阅读用户评价\n\n许多游戏都有用户评价，值得一阅。有时，你可以在购买前对游戏有一个很好的了解。如果你发现一款看起来很有趣的游戏，不妨简单地进行一次\
    \ Google 搜索，看看是否有主流媒体对其进行过完整评测。\n\n![images](img/p487-01.jpg)\n\n#### 寻找免费试用版或精简版\n\
    \n如今，越来越多的游戏开发者会向用户提供游戏的免费试用版，以便他们在购买前确定自己是否喜欢。你会发现 App Store 中的许多游戏同时具有“`Lite`”版和“`Full`”版。\n\
    \n一些“免费”游戏通过在游戏中植入广告来获得支持。其他游戏开始时是免费的，但需要你进行应用内购买才能继续游玩或解锁额外功能。\n\n![images](img/p487-02.jpg)\n\
    \n#### 游玩时注意安全\n\n你可能会像在现实生活中一样，使用 iPod touch 在钓鱼游戏中甩动钓竿。在驾驶类和第一人称射击类游戏中，你也可能会移动身体。要点是：在游玩时留意你周围的环境！例如，确保你抓牢了设备，以免它从手中滑落；我们推荐使用一个好的硅胶保护套来帮助解决这个问题。\n\
    \n**警告**：像 `Real Racing` 这样的游戏可能会让人上瘾！\n\n#### 双人游戏\n\niPod touch 真正为双人游戏带来了可能性。在这个例子中，我们正在用\
    \ iPod touch 作为游戏棋盘，相互对战跳棋。\n\n你还可以找到其他棋盘游戏（如国际象棋、大富翁和优诺牌）的类似双人游戏应用。\n\n![images](img/p488-01.jpg)\n\
    \n#### 在线与无线游戏\n\niPod touch 还支持在线和无线点对点游戏（如果游戏支持的话）。许多新款游戏都采用了这项技术。例如，在 `Scrabble`\
    \ 中，你可以与使用自己设备的多个玩家对战。你甚至可以将 iPod touch 用作游戏棋盘，并将最多四台独立的 iPod touch 用作无线“字母架”，用于存放所有玩家的字母牌。只需将字母牌从架上滑出，它们就会滑到棋盘上——非常酷！\n\
    \n在这个例子中，我从 `Real Racing` 的菜单中选择“`在线`”。现在，我既可以选择通过 Wi-Fi 与另一位对手对战，也可以选择加入一场在线联赛。\n\
    \n![images](img/p488-02.jpg)\n\n**注意：** 如果你只是想与附近的朋友对战，请在多人游戏模式下选择 Wi-Fi 模式。如果你只是想与陌生人一起玩，请尝试在线加入联赛或游戏。\n"
- fmt: "### Other Fun Stuff: Baseball\n\nThere are many great apps that can provide\
    \ you with endless hours of entertainment on the iPod touch. Since the iPod touch\
    \ was released on opening day of the Major League Baseball season, it is appropriate\
    \ to highlight an app that was honored as the first “App of the Week” in the iPod\
    \ touch App Store.\n\n`At Bat 2010 for iPod touch` is a US $14.99 application\
    \ that is well worth the entry fee for any baseball fan. It also highlights the\
    \ iPod touch's capabilities.\n\n![images](images/p489-01.jpg)\n\nThe main view\
    \ of the app changes, based on whether there are baseball games currently being\
    \ played. When you first register the app, you pick your favorite team. The favorite\
    \ team on the iPod touch in this example is set to the Red Sox. So, if this team\
    \ is playing, then the view automatically goes to that team's game first. If the\
    \ team is not playing, then it displays a recap of the team's previous game. Alternatively,\
    \ it might list the details of the team's next game.\n\nThe main view during game\
    \ time shows a batter at the plate. This batter represents the real batter. Batters\
    \ will switch sides of the plate, depending on whether the batter currently up\
    \ hits from the left or right side of the plate. The current pitch count is shown\
    \ above the plate, and the score is displayed at the top of the screen.\n\nWhen\
    \ you see a player at the plate or on base, you can touch the player's image to\
    \ bring up his baseball card and view his stats.\n\n![images](images/p490-01.jpg)\n\
    \n**TIP**: You can even allow notifications to be sent when something newsworthy\
    \ occurs related to your favorite team. To do this, touch the `Information` icon\
    \ and set `Notifications` to `ON`.\n\n#### AirPlay Mirroring\n\nThe latest iPod\
    \ touch comes with the ability to not only stream video or music from your iPod\
    \ touch to an Apple TV, but also to share the screen of any app, including games.\
    \ This lets you and your entire family watch and enjoy the game on the big screen\
    \ while using your iPod touch as the controller. It can be especially effective\
    \ with board games and multiplayer games where the whole family or group can sit\
    \ around and play together.\n\nFollow these steps to use the AirPlay Mirroring\
    \ feature:\n\n1. Tap the app you want to mirror. For this example, we're using\
    \ Infinity Blade.\n2. Once the app has launched, double-click the Home button\
    \ to bring up the Fast App Switcher.\n\n   ![images](images/p490-02.jpg)\n\n3.\
    \ Swipe from left to right to get to the audio/video controls. (They're all the\
    \ way at the end, so keep swiping until you can't swipe any more.)\n4. Tap the\
    \ AirPlay icon to bring up the list of AirPlay–enabled devices on your Wi-Fi network.\n\
    5. Select Apple TV.\n6. Click the Home button again to return to your app.\n7.\
    \ You should now see Infinity Blade on the big screen. Let 'em have it!\n\n![images](images/p491-01.jpg)\n\
    \nTo stop AirPlay Mirroring, repeat the same procedure and choose iPod touch from\
    \ the device list.\n\n**NOTE**: Some games allow you to do multiplayer AirPlay\
    \ Mirroring, like `Real Racing 2`'s Party Play feature where up to 4 people can\
    \ use their iPod touchs or iPads to race against each other on the same big screen\
    \ TV.\n\n## Chapter 24\n\n## Social Networking\n\nSome of the most popular places\
    \ to “connect” these days are those sites that are often called *social networking\
    \ sites*—places that allow you to create your own page and connect with friends\
    \ and family to see what is going in their lives. Some of the biggest web sites\
    \ for social networking are Facebook, Twitter, and LinkedIn.\n\nIn this chapter,\
    \ we will show you how to access these sites. You will learn how to update your\
    \ status, *tweet*, and keep track of those who are both important or simply of\
    \ interest to you.\n\n### Facebook\n\nFacebook was founded in February of 2004.\
    \ Since that time, it has served as the premier site for users to connect, re-connect,\
    \ and share information with friends, co-workers, and family. Today, over 800\
    \ million people use Facebook as their primary source of “catching up” with the\
    \ people who matter most to them.\n\n**NOTE:** *You cannot play Facebook games\
    \ inside the `Facebook` app or via the Facebook.com web site on your iPod touch*.\
    \ This may disappoint you if you are a big Facebook game player; however, you\
    \ can often get the same games (e.g., `FarmVille`) from the App Store, and then\
    \ connect them to your Facebook computer version to keep your place.\n\nOn your\
    \ iPod touch, you have three primary ways of accessing your Facebook page at the\
    \ time of publishing:\n\n1. Use `Safari` to go to the standard (full) web site:\
    \ [`www.facebook.com`](http://www.facebook.com).\n2. Use `Safari` to go to the\
    \ mobile site: [`http://touch.facebook.com`](http://touch.facebook.com).\n3. Use\
    \ the iPod touch `Facebook` app.\n\n![images](images/p493-01.jpg)\n\n**NOTE:**\
    \ The iPod touch version of the `Facebook` app is a bit more limited than the\
    \ full web site, but it is much easier to navigate.\n\n#### Different Ways to\
    \ Connect to Facebook\n\nYou can access Facebook by using its iPod touch-specific\
    \ app or using one of the two previously mentioned Facebook web sites in your\
    \ `Safari` browser. We will focus on the `Facebook` app for the iPod touch for\
    \ the duration of this chapter.\n\n##### Downloading and Installing the Facebook\
    \ App\n\nIn order to find the app, use the `Search` feature in the App Store and\
    \ simply type in “Facebook.”\n\nYou can also go to the `Social Networking` category\
    \ in the App Store and find the official `Facebook` app, as well as many other\
    \ Facebook-related apps.\n\n**NOTE:** Some of the apps may look like “official”\
    \ Facebook apps, and they do cost money. However, the only “official” app is the\
    \ iPhone/iPod app shown to the right.\n\n![images](images/p494-01.jpg)\n\nIn order\
    \ to connect to your account on Facebook, you will need to locate the icon you\
    \ just installed and click it. We use the example of `Facebook` here, but the\
    \ process is very similar for the rest of the apps.\n\nOnce `Facebook` is successfully\
    \ downloaded, the icon should look something like this.\n\n![images](images/p494-02.jpg)"
