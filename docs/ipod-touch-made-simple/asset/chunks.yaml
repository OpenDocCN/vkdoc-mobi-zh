    \ touch, you need to connect it to iTunes to get it activated and registered.\
    \ In our “iPod touch Basics”section at the end of this chapter, we will show you\
    \ the basics of how to maneuver on your iPod touch, so you can get up and running\
    \ quickly.\n\n### Getting to Know Your iPod touch\n\nIn this section, we will\
    \ show you how to use everything you get in the box with your iPod touch. We also\
    \ give you some iPod touch battery and charging tips, talk about how to determine\
    \ if your iPod touch is already activated, and discuss the **Slide to Unlock**\
    \ feature."
  trans: "\n### 恭喜您获得全新搭载 iOS 5 的 iPod touch！\n\n您手中握着的，或许是当下最强大、最优雅的设备之一。它既是媒体播放器，也是出色的电子书阅读器、游戏机、生活管家，几乎囊括了当下所有功能：这就是搭载\
    \ `iOS 5` 的 `iPod touch`。\n\n与市面上几乎其他任何媒体播放器和游戏设备相比，`iPod touch` 都能实现更多功能。在精美优雅的设计中，搭载\
    \ `iOS 5` 的 `iPod touch` 能让您即刻开始上网冲浪、查看邮件并管理繁忙的生活。\n\n**注意：** 请查阅第 10 章，我们将在其中向您展示如何在\
    \ `iPod touch` 上使用 `Skype` 应用和 `FaceTime` 视频聊天应用。\n\n使用您的 `iPod touch`，您可以查看照片，并通过直观的触控屏手势进行交互。您可以通过简单的手势捏合、缩放、旋转照片，甚至通过电子邮件发送照片。\n\
    \n以前所未有的方式与您的内容互动。使用 `Newsstand` 来整理和阅读您的报纸与杂志。得益于无比清晰锐利的视网膜显示屏，新闻网站和网页的呈现与阅读体验前所未有。翻阅故事、视频和图片，并与您的新闻资讯互动。\n\
    \n首次在电子设备上阅读时，您会真正感觉仿佛在读一本纸质书。翻页可快可慢（甚至在翻页时，您还能看到下一页背面的文字）。\n\n以前所未有的方式管理您的媒体库。`iTunes`\
    \ 应用拥有精美的界面，让您可以在 `iPod touch` 的高清显示屏上，以轻松有趣的方式选择音乐、观看视频、整理播放列表等等。\n\n您是否拥有 `Netflix`\
    \ 账户？您可以直接在 `iPod touch` 上管理您的即时播放列表，并流式播放高清电影和电视节目。\n\n在 `iPod touch` 上更新您的 `Facebook`\
    \ 状态并接收推送通知。\n\n通过内置的 Wi-Fi 连接，随时保持与网页和电子邮件的连接。支持所有最新的高速协议，让您始终在线并获取最新内容。在 `横向`\
    \ 模式下使用设备时，`iPod touch` 还配备了更大的键盘，方便您输入电子邮件和笔记。\n\n### 充分利用《iPod touch 简易指南，iOS\
    \ 5 版》\n\n您可以选择从头到尾通读本书，也可以按章节或主题进行模块化阅读。也许您只是想了解 `App Store` 应用，尝试 `iBooks`，设置您的电子邮件或通讯录，或者只是将音乐加载到您的设备上。通过我们的书籍，您可以做到这一切，甚至更多。\n\
    \n您很快就会发现，您的 `iPod touch` 是一款功能非常强大的设备。然而，其内部还“锁”着许多秘密，我们将在本书中帮助您一一“解锁”。\n\n慢慢来——本书能帮助您理解如何最好地使用、操作您的新设备，并从中获得乐趣。回想一下您第一次尝试使用\
    \ Windows 或 Mac 电脑时的情景。您需要花一点时间才能熟悉操作方法。`iPod touch` 也是如此。利用本书，您能快速上手，并更快地学到所有最佳的技巧和窍门。\n\
    \n也请记住，如此强大的设备一开始并不总是那么容易掌握。\n\n如果您能先阅读一个章节，然后立即实践所读内容，您便能从设备中获益最多。我们都知道，阅读后付诸实践的记忆保持率远高于单纯阅读。\n\
    \n因此，为了学习和记住所学内容，我们建议您：\n\n***阅读一点，在您的 iPod touch 上尝试一点，然后重复！***\n\n#### 本书的组织结构\n\
    \n了解本书的组织结构将帮助您快速定位对您重要的内容。在此，我们向您展示本书的主要结构。请记住，要善用我们的简化目录、详细目录和全面的索引。所有这些元素都能帮助您快速定位您感兴趣的项目。\n\
    \n#### 第一部分：快速入门指南\n\n> **触控屏基础：** 本书中大量实用且信息丰富的屏幕截图将帮助您快速学习如何在设备的触控屏上进行触控、滑动、轻拂、缩放等操作。\n\
    > \n> **应用参考表：** 快速浏览按类别分组的图标或应用。了解设备上所有应用的功能概览，包括指向相关章节编号的指引，以便您能直接跳转到本书中有关如何充分利用每个应用的详细内容。\n\
    \n#### 第二部分：引言\n\n> 您现在正在阅读此处……\n\n#### 第三部分：您与您的 iPod touch\n\n> 这是本书的核心部分，分为\
    \ 25 个易于理解的章节，每章都包含大量图片，全程引导您前进。\n\n#### 快速定位提示、警告和注意\n\n翻阅本书时，您可以立即看到特殊格式的 `提示`、`警告`\
    \ 和 `注意`，它们突出显示了使用 `iPod touch` 的重要事实。例如，如果您想找到所有与使用日历相关的特殊提示，可以翻到日历章节，搜索这些突出显示的信息块。\n\
    \n**提示：** `提示`、`警告` 和 `注意` 都采用这种格式，带有灰色背景，以便您能更快地看到它们。\n\n#### iPod touch 视频教程\n\
    \n最后，请访问作者的网站 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)，查看一套时长\
    \ 3 分钟的短视频教程，帮助您或您的整个团队掌握 `iPod touch`。分段学习是掌握设备的绝佳方式！\n\n## 第三部分\n\n## 您与您的 iPod\
    \ touch……\n\n这是《iPod touch 简易指南，iOS 5 版》的核心。在本部分中，您将找到清晰标注的章节——每章都解释了 `iPod touch`\
    \ 的关键特性。您会看到大部分章节专注于某个独立的应用或特定类型的应用。许多章节讨论了 `iPod touch` 自带的应用程序，但我们也包含了一些您可以从\
    \ `App Store` 下载的有趣且实用的应用。当然，`iPod touch` 是为了娱乐，但它能做的远不止于此。最后，我们提供了一些方便的故障排除技巧，如果您的\
    \ `iPod touch` 运行不正常，这些技巧可能会有所帮助。\n\n## 第 1 章\n\n## 开始使用\n\n在本章中，我们将带您逐步了解您的新\
    \ `iPod touch` 以及包装盒中的所有物品。我们还将探讨充电的方方面面以及如何延长电池续航时间。要开始使用您的 `iPod touch`，您需要先将其连接到\
    \ `iTunes` 以进行激活和注册。在本章末尾的“iPod touch 基础”部分，我们将向您展示如何在 `iPod touch` 上进行基本操作，以便您能快速上手并运行。\n\
    \n### 了解您的 iPod touch\n\n在本节中，我们将向您展示如何使用 `iPod touch` 包装盒中的所有物品。我们还会提供一些 `iPod\
    \ touch` 电池和充电技巧，讨论如何判断您的 `iPod touch` 是否已激活，并探讨 `滑动以解锁` 功能。\n"
- fmt: "#### What Is Included in the Box\n\nThe box your `iPod touch` comes in may\
    \ seem skimpy if you’re new to `iPod touch`es. However, it does contain everything\
    \ you need to get started and enjoy your `iPod touch`—except for a good manual,\
    \ which is why we wrote this book! Here is what your box contains:\n\n*   **iPod\
    \ touch**: On the very top, as soon as you open it, you will see your new `iPod\
    \ touch`.\n*   **Paper folder**: Under the plastic holder for the `iPod touch`,\
    \ you will find a paper folder that contains the following:\n    *   **Finger\
    \ Tips**: A 4.5” x 2.5” small fold-out booklet with 19 panels of basic information\
    \ about your `iPod touch`.\n    *   **iPod touch Product Information Guide**:\
    \ A 4.5” x 2.5” booklet with font that is way too small to read. This book contains\
    \ all the legal terms, conditions, warnings, and disclaimers related to your `iPod\
    \ touch`.\n    *   **Apple Logo Stickers**: Two of those nice white Apple logos\
    \ that you sometimes see on car windows. Enjoy!\n\nIn the bottom of the box, you\
    \ will find the items shown in [Figure 1–1](#Chapter01.html#fig_1_1): a headset,\
    \ and a USB cable.\n\n![images](images/0101.jpg)\n\n**Figure 1–1.** *The headset\
    \ and USB to Dock cable in the bottom of your iPod touch's box*\n\n#### iPod touch\
    \ Headset\n\nThe headset consists of two white earphones for listening to music,\
    \ videos, or `FaceTime` calls, as well as a small controller attached to the wire\
    \ of the right earphone. Plug this into the hole on the top–left edge of your\
    \ `iPod touch`. Make sure you insert it all the way—it can be a little tough to\
    \ press in.\n\nAs the image here shows, the controller has `Plus` (`+`) and `Minus`\
    \ (`-`) keys, as well as a `Center` button. You can increase or decrease volume\
    \ with the (`+`) and (`-`) keys and use the `Center` button to answer or hang\
    \ up `FaceTime` calls.\n\n![images](images/p32-01.jpg)\n\n**NOTE:** You can move\
    \ between songs with two or three clicks of the `Center` button. Double–click\
    \ to go to the next track. Triple–click to go to the previous track.\n\nThe included\
    \ headset also contains a small microphone for `FaceTime` calls.\n\n##### USB\
    \ to Dock Cable\n\nThe USB to dock cable connects your `iPod touch` to your computer;\
    \ it also doubles as your power cable.\n\n##### Wall Plug Adapter\n\nThe wall\
    \ plug adapter has a USB socket on one end and a plug on the other end that you\
    \ insert into an electrical socket. Just connect the USB cable to your `iPod touch`\
    \ and the other end to a wall plug to charge your `iPod touch` from the wall.\n\
    \n#### Charging Your iPod touch and Battery Life Tips\n\nYour `iPod touch` may\
    \ already have some battery life, but you might want to charge it completely,\
    \ so you can enjoy uninterrupted hours of use after you get it set up. This charging\
    \ time will give you a chance to check out the rest of this chapter, install or\
    \ update the `iTunes` app, or check out all the cool `iPod touch` apps available\
    \ (see [Chapter 22](#Chapter22.html#ch22): “The Amazing App Store”).\n\n#####\
    \ Charging from a Power Outlet\n\nThe fastest way to charge your `iPod touch`\
    \ is to plug it directly into a wall outlet. You use the same USB connection cable\
    \ you use to connect your `iPod touch` to your computer. Plug the wide end of\
    \ the cable into the port at the bottom of your `iPod touch` (next to the `Home`\
    \ button) and the end of the USB cable into the wall plug adapter. You can purchase\
    \ these plug adapters for about US $10.\n\n![images](images/p33-01.jpg)\n\nYou\
    \ can tell your `iPod touch` is charging by looking at the screen. You will see\
    \ a lightning bolt or plug icon inside the battery indicator in the upper–right\
    \ corner.\n\nThe `Main Battery` icon will show your charge level. The image to\
    \ the right shows a charging `iPod touch` with an almost full battery.\n\n**TIP:**\
    \ Some newer cars have built–in power outlets (just like in your home) that you\
    \ can use to plug in your `iPod touch` power cord. Some also have a dock option\
    \ that allows you to control the `iPod` app from your car radio headset. These\
    \ outlets are sometimes buried in the middle console behind the front seat.\n\n\
    ![images](images/p34-01.jpg)\n\n##### Charging from Your Computer\n\nYou can also\
    \ charge your `iPod touch` when you plug it into your computer, albeit a little\
    \ more slowly than when you connect it directly to a wall charger.\n\n**TIP:**\
    \ Try using different USB ports on your computer. Some USB ports share a bus and\
    \ draw less power, while others have their own bus and draw more power.\n\nFor\
    \ optimal charging, you should have your computer plugged into the wall outlet.\
    \ If your computer is not connected to the wall outlet, your `iPod touch` will\
    \ charge, but at a slower rate. Keep in mind that, if your laptop computer goes\
    \ to sleep or you close the screen, your `iPod touch` will stop charging.\n\n\
    ##### Charging from Other Accessories\n\nSome accessories designed to work with\
    \ your `iPod touch` will also charge it. The most common of these are `iPod touch`/iPod\
    \ music docks. These are speaker systems that you plug into your `iPod touch`\
    \ to listen to music. The only time your `iPod touch` will not charge is when\
    \ you see the following warning message on your screen: “Charging is not supported\
    \ with this accessory.” This occurs on older accessories or those not designed\
    \ specifically for your `iPod touch`.\n\n![images](images/square.jpg) **TIP: A\
    \ Case and External Battery Combined**\n\nSome cases actually have external batteries\
    \ built into the case. There are several manufacturers available. One provider,\
    \ mophie ([`www.mophie.com`](http://www.mophie.com)), has such cases for the `iPod\
    \ touch`.\n\n##### Expected Battery Life\n\nApple says the `iPod touch` with its\
    \ bigger battery and advanced technology should last longer than previous models\
    \ of the `iPod touch` (see [Table 1–1](#Chapter01.html#tab_1_1)).\n\n![images](images/t0101.jpg)\n\
    \nThese battery life durations are in ideal conditions with a new, fully charged\
    \ battery. You will notice that, over time, your actual battery life will diminish.\
    \ Source: Apple.com\n\n##### Battery and Charging Tips\n\nThe key question is\
    \ this: how do you get the most out of your battery life and make sure your `iPod\
    \ touch` is charged and ready for you when you need it? In this section, we will\
    \ cover a few tips to help you accomplish this.\n\n###### Getting More Out of\
    \ Each Charge\n\nTo extend your battery life, try some of the following tips:\n\
    \n*   **Lower your screen brightness**: Tap `Settings` > `Brightness`, and then\
    \ use the slider bar to lower your brightness to a level less than halfway across\
    \ that still works for you.\n*   **Turn off Location Services**: If you don't\
    \ need your actual location to be transmitted to your apps, you can turn this\
    \ off. Tap `Settings` > `Location Services`, and then set `Location Services`\
    \ to `OFF`. If you go into an app that wants your location, you will be reminded\
    \ to turn it back on.\n*   **Set a Shorter Auto–Lock**: This feature shortens\
    \ the time your `iPod touch` takes to enter Sleep mode (i.e., turn off the screen)\
    \ when it's not being used. Shortening this time can help save your battery life.\
    \ To do this, tap `Settings` > `General` > `Auto–Lock`, and then set `Auto–Lock`\
    \ to as short a value as possible—you can set it to as short as `1 minute` if\
    \ you like.\n*   **Turn off push email and push notifications.**\n\nYou can learn\
    \ more battery life tips by visiting the Apple web site at [www.apple.com/batteries/iPod\
    \ touch.html](http://www.apple.com/batteries/iPodtouch.html).\n\n###### Making\
    \ the Battery Last Longer\n\nThe `iPod touch` uses a rechargeable battery that\
    \ has a limited number of cycles during its useful life; in other words, it will\
    \ gradually lose its ability to maintain a charge over time. You can extend the\
    \ life of your `iPod touch` battery by making sure you run it down completely\
    \ at least once a month. The rechargeable battery will last longer if you do this."
