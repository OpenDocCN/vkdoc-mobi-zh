- fmt: "### Congratulations on Your New iPod touch with iOS 5!\n\nYou hold in your\
    \ hands perhaps the most powerful and elegant devices available, a media player\
    \ that is also a great e-book reader, gaming machine, life organizer, and just\
    \ about everything else available today: the `iPod touch` with `iOS 5`.\n\nThe\
    \ `iPod touch` can do more than just about any other media player and gaming device\
    \ on the market. In a beautiful and elegantly designed package, the `iPod touch`\
    \ with `iOS 5` will have you surfing the web, checking email, and organizing your\
    \ busy life in no time.\n\n**NOTE:** Take a look at [Chapter 10](#Chapter10.html#ch10),\
    \ where we show you how to use the `Skype` app and the `FaceTime` video chat app\
    \ on your `iPod touch`!\n\nWith your `iPod touch`, you can view your photos and\
    \ interact with them using intuitive touch-screen gestures. You can pinch, zoom,\
    \ rotate, and email your photos—all by using simple gestures.\n\nInteract with\
    \ your content like never before. Use `Newsstand` to organize and view your newspapers\
    \ and magazines. News web sites and web sites look and read like never before\
    \ due to the incredibly clear and crisp retina display. Flip through stories,\
    \ videos, and pictures, and interact with your news.\n\nFor the first time, really\
    \ feel as though you are reading a book when you read on an electronic device.\
    \ Pages turn slowly or quickly (you can even see the words on the back of the\
    \ pages when you turn them).\n\nManage your media library like never before. The\
    \ `iTunes` app features a beautiful interface, letting you choose music, watch\
    \ videos, organize playlists, and more—all in an effortless and fun way on the\
    \ `iPod touch`'s high definition display.\n\nDo you have a `Netflix` account?\
    \ You can manage your instant queue and stream highquality movies and TV shows\
    \ right on your `iPod touch`.\n\nUpdate your `Facebook` status and receive push\
    \ alerts—all on your `iPod touch`.\n\nStay connected to the web and your email\
    \ with the built-in Wi-Fi connection. All the latest high-speed protocols are\
    \ supported, so you can always be in touch and get the latest content. The `iPod\
    \ touch` also includes a larger keyboard to type out emails and notes when you\
    \ use the device in `Landscape` mode.\n\n### Getting the Most out of *iPod touch\
    \ Made Simple, iOS 5 Edition*\n\nRead this book cover-to-cover if you choose,\
    \ but you can also peruse it in a modular fashion, by chapter or topic. Maybe\
    \ you just want to check out the `App Store` app, try `iBooks`, set up with your\
    \ email or contacts, or just load up your device with music. You can do all this\
    \ and much more with our book.\n\nYou will soon realize that your `iPod touch`\
    \ is a very powerful device. There are, however, many secrets “locked” inside,\
    \ which we help you “unlock” throughout this book.\n\nTake your time—this book\
    \ can help you understand how to best use, work, and have fun with your new device.\
    \ Think back to when you tried to use your first Windows or Mac computer. It took\
    \ a little while to get familiar with how to do things. It's the same with the\
    \ `iPod touch`. Use this book to help you get up to speed and learn all the best\
    \ tips and tricks more quickly.\n\nAlso remember that devices this powerful are\
    \ not always easy to grasp—at first.\n\nYou will get the most out of your device\
    \ if you can read a section and then try out what you read. We all know that reading\
    \ and then doing an activity gives us a much higher retention rate than simply\
    \ reading alone.\n\nSo, in order to learn and remember what you learn, we recommend\
    \ the following:\n\n***Read a little, try a little on your iPod touch, and repeat!***\n\
    \n#### How This Book Is Organized\n\nKnowing how this book is organized will help\
    \ you quickly locate things that are important to you. Here we show you the main\
    \ organization of this book. Remember to take advantage of our abridged table\
    \ of contents, detailed table of contents, and our comprehensive index. All of\
    \ these elements can help you quickly pinpoint items of interest to you.\n\n####\
    \ [Part 1](#Part01.html#p1): Quick Start Guide\n\n> **Touch Screen Basics:** This\
    \ book's many practical and informative screen shots will help you quickly learn\
    \ how to touch, swipe, flick, zoom, and more with your device's touch screen.\n\
    > \n> **App Reference Tables:** Quickly skim the icons or apps grouped by category.\
    \ Get a thumbnail of what all the apps do on your device, including a pointer\
    \ to the relevant chapter numbers, so you can jump right to the details of how\
    \ to get the most out of each app in this book.\n\n#### [Part 2](#Part02.html#p2):\
    \ Introduction\n\n> You are here now …\n\n#### [Part 3](#Part03.html#p3): You\
    \ and Your iPod touch\n\n> This is the meat of the book, organized in 25 easy-to-understand\
    \ chapters, all of them packed with loads of pictures to guide you every step\
    \ of the way.\n\n#### Quickly Locating Tips, Cautions, and Notes\n\nIf you flip\
    \ through this book, you can instantly see specially formatted `TIPS`, `CAUTIONS`,\
    \ and `NOTES` that highlight important facts about using the `iPod touch`. For\
    \ example, if you want to find all the special tips relevant to using the Calendar,\
    \ you can flip to the Calendar chapter and search for these highlighted nuggets\
    \ of information.\n\n**TIP:** `TIPS`, `CAUTIONS`, and `NOTES` are all formatted\
    \ like this, with a gray background, to help you see them more quickly.\n\n####\
    \ iPod touch Video Tutorials\n\nFinally, check out the author's web site at [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ for a set of short 3-minute video tutorials to help you or your entire organization\
    \ master your `iPod touch`. Learning in small chunks is a great way to master\
    \ your device!\n\n## Part III\n\n## You and Your iPod touch …\n\nThis is the heart\
    \ of *iPod touch Made Simple, iOS 5 Edition.* In this section, you'll find clearly\
    \ labeled chapters—each explaining the key features of your `iPod touch`. You'll\
    \ see that most chapters focus on an individual app or a specific type of application.\
    \ Many of the chapters discuss applications that come with your `iPod touch`,\
    \ but we also include some fun and useful apps you can download from the `App\
    \ Store`. Sure, the `iPod touch` is for fun, but it's for a whole lot more, too.\
    \ We finish with some handy troubleshooting tips that can help if your `iPod touch`\
    \ isn't working quite right.\n\n## Chapter 1\n\n## Getting Started\n\nIn this\
    \ chapter, we will take you on a step-by-step tour of your new `iPod touch` and\
    \ everything you get in the box. We will also look at the ins and outs of charging\
    \ it and how to make your battery last longer. In order to get started with your\
    \ `iPod touch`, you need to connect it to `iTunes` to get it activated and registered.\
    \ In our “iPod touch Basics” section at the end of this chapter, we will show\
    \ you the basics of how to maneuver on your `iPod touch`, so you can get up and\
    \ running quickly.\n\n### Getting to Know Your iPod touch\n\nIn this section,\
    \ we will show you how to use everything you get in the box with your `iPod touch`.\
    \ We also give you some `iPod touch` battery and charging tips, talk about how\
    \ to determine if your `iPod touch` is already activated, and discuss the `Slide\
    \ to Unlock` feature."
