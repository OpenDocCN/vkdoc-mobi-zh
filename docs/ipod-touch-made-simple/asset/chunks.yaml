- fmt: "#### Starting the Move\n\nPress the `Home` button to get to your `Home` screen.\
    \ Now touch and hold any icon on the `Home` screen for a couple of seconds. You'll\
    \ notice that all the icons start to shake.\n\nJust try moving a couple of icons\
    \ around at first. You'll see that when you move an icon down, the other icons\
    \ in the row move to make space for it.\n\nOnce you have a feel for how the icons\
    \ move, you are ready to replace one of the Bottom Dock icons. While the icons\
    \ are shaking, take the icon you wish to replace from the Bottom Dock and move\
    \ it up to an area covered by other icons. (If you move it to an empty area, it\
    \ will simply jump back to the Bottom Dock).\n\n**NOTE:** You can have up to four\
    \ icons in the Bottom Dock; so if you already have four icons there, you will\
    \ have to remove one to replace it with a new one.\n\nFor example, suppose you\
    \ wanted to put the `Music` and `Instagram` icons on the Bottom Dock. First, you\
    \ need to clear two open space by dragging off two of the icons from the Bottom\
    \ Dock, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\n![images](images/0601.jpg)\n\
    \n**Figure 6–1.** *Swapping icons in the Bottom Dock*\n\nNext, locate your `Skype`\
    \ icon and move it down to the Bottom Dock. As you'll see, the icon becomes semi-transparent\
    \ until you actually set it into place.\n\nWhen you are sure that you have the\
    \ icons just where you want them, simply press the `Home` button once and the\
    \ icons will lock into place. At this point, you have the `Instagram` and `Music`\
    \ icon in the Bottom Dock, where you can quickly access them anytime.\n\n### Moving\
    \ Icons to a Different Home Page\n\niPod touchs can hold16 icons on a page (not\
    \ including the dock). You can navigate through these pages by swiping (right\
    \ to left) on your `Home` screen. With all the cool apps available, it is not\
    \ uncommon to have five, six, or even more pages of icons. You can have up to\
    \ 11 pages filled with icons, if you feel adventurous!\n\n**NOTE:** You can also\
    \ navigate to new pages by swiping from left to right on any screen except the\
    \ `Home` screen. On the `Home` screen, swiping left to right takes you to `Spotlight\
    \ Search`; see [Chapter 2](#Chapter02.html#ch2): “Typing, Copy, and Search” for\
    \ more information.\n\nYou may have an icon that you rarely use on your first\
    \ page, so you want to move it way off to the last page. Or you may want to move\
    \ an icon you often use from the last of the pages to the first page. Both tasks\
    \ are very easy to do; indeed, it's very much like moving icons to the Bottom\
    \ Dock:\n\n1. Touch and hold any icon to initiate the moving process.\n2. Touch\
    \ and hold the icon you wish to move. For example, let's assume you want to move\
    \ the `iBooks` icon to the first page (see [Figure 6–2](#Chapter06.html#fig_6_2)).\n\
    \   \n   ![images](images/0602.jpg)\n   \n   **Figure 6–2.** *Moving icons from\
    \ one page to another*\n3. Now drag and drop the icon onto another page. To do\
    \ this, touch and hold the `iBooks` icon and drag it to the left. You will see\
    \ all of your pages of icons move by. When you get to the first page, just release\
    \ the icon, and it is now placed at the very beginning.\n4. Press the `Home` key\
    \ to complete the move and stop the icons from shaking.\n\n### Deleting Icons\n\
    \nBe careful—it is as easy to delete an icon as it is to move it. And when you\
    \ delete an icon on the iPod touch, you are actually deleting the program it represents.\
    \ This means you won't be able to use the program again without reinstalling or\
    \ redownloading it.\n\nDepending on your Application Sync settings in the `iTunes`\
    \ app, the program may still reside in your Applications folder in iTunes. In\
    \ that case, you would be able to reinstall the deleted app simply by checking\
    \ that application in the list of apps to sync in iTunes.\n\nAs [Figure 6–3](#Chapter06.html#fig_6_3)\
    \ shows, the process to delete an icon is similar to the process for moving it.\
    \ Touch and hold any icon to initiate the deletion process. Just as before, touching\
    \ and holding makes the icons shake and allows you to move or delete them.\n\n\
    **NOTE:** You may delete only programs you have downloaded to your iPod touch;\
    \ the preinstalled icons and their associated programs can't be deleted. You can\
    \ tell which programs can be deleted because the icons for apps that can be deleted\
    \ contain a small black `x` in the upper-left corner.\n\nJust tap the `x` on the\
    \ icon you'd like to delete. You will be prompted to either `Delete` the icon\
    \ or `Cancel` the delete request. If you touch `Delete`, the icon and its related\
    \ app will be removed from your iPod touch.\n\n**NOTE:** If you delete an icon\
    \ such as a game where your progress has been tracked and saved, your progress\
    \ will be erased when you delete that game.\n\n![images](images/0603.jpg)\n\n\
    **Figure 6–3.** *Deleting an icon and its associated program*\n\n### Resetting\
    \ All Your Icon Locations (Factory Defaults)\n\nOccasionally, you might want to\
    \ go back to the original, factory default icon settings. This might be the case\
    \ when you've moved too many new icons to your first page and want to see all\
    \ the basic icons again.\n\nTo do this, touch the `Settings` icon. Next, touch\
    \ `General`, finally, scroll all the way to the bottom to touch `Reset`.\n\n![images](images/p154-01.jpg)\n\
    \n**NOTE:** Built-in apps will be restored to the same order they were in when\
    \ Apple shipped the iPod touch.\n\nOn the `Reset` screen, touch `Reset Home Screen\
    \ Layout` near the bottom. Now all your icons will be returned to their original\
    \ settings.\n\n![images](images/p154-02.jpg)\n\n**CAUTION:** Be careful you don't\
    \ touch one of the other `Reset` options, as you can inadvertently erase your\
    \ entire iPod touch if you touch the wrong button. If you do, you'll have to restore\
    \ data from your iTunes backup.\n\n### Working with Folders\n\nYour iPod touch\
    \ lets you organize your apps into folders. When you download new apps, they take\
    \ up a spot on your `Home` page. Once you download many apps, it can become hard\
    \ to find apps and keep them organized.\n\n![images](images/p155-01.jpg)\n\nUsing\
    \ folders will allow you to keep your games, your productivity apps, and other\
    \ like-functioning apps together in folders. Each folder can hold up to 12 apps—which\
    \ can really help you organize your iPod touch!\n\n#### Creating the Folder\n\n\
    Creating folders is intuitive and fun:\n\n1. Hold down an app until all the apps\
    \ start shaking (as you did before in the “Moving Icons” section).\n2. Drag an\
    \ app onto another like-functioning app. For example, drag one productivity app\
    \ onto another similar app. The iPod touch will initially create a name for the\
    \ folder.\n3. In this example, we dragged all three of the Apple productivity\
    \ apps (Numbers, Keynote and Pages) on top of one another, and the iPod touch\
    \ created a folder called “Productivity.”\n4. You can edit the folder name by\
    \ touching the `Name` field and typing a new name. (see [Figure 6–4](#Chapter06.html#fig_6_4)).\n\
    5. Press the `Home` button to set the new folder name.\n6. Press the `Home` button\
    \ again to return to the `Home` screen. At this point, you will see the new folder\
    \ with its new name.\n\n**NOTE:** You can place up to 12 app icons in a given\
    \ folder. If you try to put more than that in a folder, you will see the new icon\
    \ continually being “pushed” out of the folder. This animation indicates that\
    \ the folder is full.\n\n![images](images/0604.jpg)\n\n**Figure 6–4.** *Moving\
    \ icons to create a folder and renaming it.*"
  raw: "#### Starting the Move\n\nPress the **Home** button to get to your **Home**\
    \ screen. Now touch and hold any icon on the **Home** screen for a couple of seconds.\
    \ You'll notice that all the icons start to shake.\n\nJust try moving a couple\
    \ of icons around at first. You'll see that when you move an icon down, the other\
    \ icons in the row move to make space for it.\n\nOnce you have a feel for how\
    \ the icons move, you are ready to replace one of the Bottom Dock icons. While\
    \ the icons are shaking, take the icon you wish to replace from the Bottom Dock\
    \ and move it up to an area covered by other icons. (If you move it to an empty\
    \ area, it will simply jump back to the Bottom Dock).\n\n**NOTE:** You can have\
    \ up to four icons in the Bottom Dock; so if you already have four icons there,\
    \ you will have to remove one to replace it with a new one.\n\nFor example, suppose\
    \ you wanted to put the **Music** and **Instagram** icons on the Bottom Dock.\
    \ First, you need to clear two open space by dragging off two of the icons from\
    \ the Bottom Dock, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\n![images](images/0601.jpg)\n\
    \n**Figure 6–1.** *Swapping icons in the Bottom Dock*\n\nNext, locate your **Skype**\
    \ icon and move it down to the Bottom Dock. As you'll see, the icon becomes semi-transparent\
    \ until you actually set it into place.\n\nWhen you are sure that you have the\
    \ icons just where you want them, simply press the **Home** button once and the\
    \ icons will lock into place. At this point, you have the **Instagram** and **Music**\
    \ icon in the Bottom Dock, where you can quickly access them anytime.\n\n### Moving\
    \ Icons to a Different Home Page\n\niPod touchs can hold16 icons on a page (not\
    \ including the dock). You can navigate through these pages by swiping (right\
    \ to left) on your **Home** screen. With all the cool apps available, it is not\
    \ uncommon to have five, six, or even more pages of icons. You can have up to\
    \ 11 pages filled with icons, if you feel adventurous!\n\n**NOTE:** You can also\
    \ navigate to new pages by swiping from left to right on any screen except the\
    \ **Home** screen. On the **Home** screen, swiping left to right takes you to\
    \ **Spotlight Search**; see [Chapter 2](#Chapter02.html#ch2): “Typing, Copy, and\
    \ Search” for more information.\n\nYou may have an icon that you rarely use on\
    \ your first page, so you want to move it way off to the last page. Or you may\
    \ want to move an icon you often use from the last of the pages to the first page.\
    \ Both tasks are very easy to do; indeed, it's very much like moving icons to\
    \ the Bottom Dock:\n\n1.  Touch and hold any icon to initiate the moving process.\n\
    2.  Touch and hold the icon you wish to move. For example, let's assume you want\
    \ to move the **iBooks** icon to the first page (see [Figure 6–2](#Chapter06.html#fig_6_2)).\n\
    \n    ![images](images/0602.jpg)\n\n    **Figure 6–2.** *Moving icons from one\
    \ page to another*\n\n3.  Nowdrag and drop the icon onto another page. To do this,\
    \ touch and hold the **iBooks** icon and drag it to the left. You will see all\
    \ of your pages of icons move by. When you get to the first page, just release\
    \ the icon, and it is now placed at the very beginning.\n4.  Press the **Home**\
    \ key to complete the move and stop the icons from shaking.\n\n### Deleting Icons\n\
    \nBe careful—it is as easy to delete an icon as it is to move it. And when you\
    \ delete an icon on the iPod touch, you are actually deleting the program it represents.\
    \ This means you won't be able to use the program again without reinstalling or\
    \ redownloading it.\n\nDepending on your Application Sync settings in the **iTunes**\
    \ app, the program may still reside in your Applications folder in iTunes. In\
    \ that case, you would be able to reinstall the deleted app simply by checking\
    \ that application in the list of apps to sync in iTunes.\n\nAs [Figure 6–3](#Chapter06.html#fig_6_3)\
    \ shows, the process to delete an icon is similar to the process for moving it.\
    \ Touch and hold any icon to initiate the deletion process. Just as before, touching\
    \ and holding makes the icons shake and allows you to move or delete them.\n\n\
    **NOTE:** You may delete only programs you have downloaded to your iPod touch;\
    \ the preinstalled icons and their associated programs can't be deleted. You can\
    \ tell which programs can be deleted because the icons for apps that can be deleted\
    \ contain a small black **x** in the upper-left corner.\n\nJust tap the **x**\
    \ on the icon you'd like to delete. You will be prompted to either **Delete**\
    \ the icon or **Cancel** the delete request. If you touch **Delete**, the icon\
    \ and its related app will be removed from youriPod touch.\n\n**NOTE:** If you\
    \ delete an icon such as a game where your progress has been tracked and saved,\
    \ your progress will be erased when you delete that game.\n\n![images](images/0603.jpg)\n\
    \n**Figure 6–3.** *Deleting an icon and its associated program*\n\n### Resetting\
    \ All Your Icon Locations (Factory Defaults)\n\nOccasionally, you might want to\
    \ go back to the original, factory default icon settings. This might be the case\
    \ when you've moved too many new icons to your first page and want to see all\
    \ the basic icons again.\n\nTo do this, touch the **Settings** icon. Next, touch\
    \ **General**, finally, scroll all the way to the bottom to touch **Reset**.\n\
    \n![images](images/p154-01.jpg)\n\n**NOTE:** Built-in apps will be restored to\
    \ the same order they were in when Apple shipped the iPod touch.\n\nOn the **Reset**\
    \ screen, touch **Reset Home Screen Layout** near the bottom. Now all your icons\
    \ will be returned to their original settings.\n\n![images](images/p154-02.jpg)\n\
    \n**CAUTION:** Be careful you don't touch one of the other **Reset** options,\
    \ as you can inadvertently erase your entire iPod touch if you touch the wrong\
    \ button. If you do, you'll have to restore data from your iTunes backup.\n\n\
    ### Working with Folders\n\nYour iPod touch lets you organize your apps into folders.\
    \ When you download new apps, they take up a spot on your **Home** page. Once\
    \ you download many apps, it can become hard to find apps and keep them organized.\n\
    \n![images](images/p155-01.jpg)\n\nUsing folders will allow you to keep your games,\
    \ your productivity apps, and other like-functioning apps together in folders.\
    \ Each folder can hold up to 12 apps—which can really help you organize your iPod\
    \ touch!\n\n#### Creating the Folder\n\nCreating folders is intuitive and fun:\n\
    \n1.  Hold down an app until all the apps start shaking (as you did before in\
    \ the “Moving Icons” section).\n2.  Drag an app onto another like-functioning\
    \ app. For example, drag one productivity app onto another similar app. The iPod\
    \ touch will initially create a name for the folder.\n3.  In this example, we\
    \ dragged all three of the Apple productivity apps (Numbers, Keynote and Pages)\
    \ on top of one another, and the iPod touch created a folder called “Productivity.”\n\
    4.  You can edit the folder name by touching the **Name** field and typing a new\
    \ name. (see [Figure 6–4](#Chapter06.html#fig_6_4)).\n5.  Press the **Home** button\
    \ to set the new folder name.\n6.  Press the **Home** but**ton** again to return\
    \ to the **Home** screen. At this point, you will see the new folder with its\
    \ new name.\n\n**NOTE:** You can place up to 12 app icons in a given folder. If\
    \ you try to put more than that in a folder, you will see the new icon continually\
    \ being “pushed” out of the folder. This animation indicates that the folder is\
    \ full.\n\n![images](images/0604.jpg)\n\n**Figure 6–4.** *Moving icons to create\
    \ a folder and renaming it.*"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成地道、专业的中文。\n\n\n#### 开始移动\n\
    \n按下 `Home` 按钮返回你的`主屏幕`。现在，长按`主屏幕`上的任意图标几秒钟。你会注意到所有图标都开始晃动。\n\n首先，尝试移动几个图标。你会看到，当你将一个图标向下移动时，该行中的其他图标会移动位置为其腾出空间。\n\
    \n当你对图标的移动方式有了感觉后，就可以准备替换底部 Dock 栏中的一个图标了。在图标晃动时，从底部 Dock 栏中取出你想要替换的图标，并将其向上移动到被其他图标覆盖的区域。（如果将其移动到空白区域，它会直接跳回底部\
    \ Dock 栏）。\n\n**注意：** 底部 Dock 栏最多可以放置四个图标；因此，如果你已经在那里放置了四个图标，则必须移除一个才能用新图标替换它。\n\
    \n例如，假设你想把`音乐`和`Instagram`图标放在底部 Dock 栏中。首先，你需要从底部 Dock 栏中拖出两个图标来清出两个空位，如图 6-1\
    \ 所示。\n\n![images](img/0601.jpg)\n\n**图 6-1.** *交换底部 Dock 栏中的图标*\n\n接下来，找到你的`Skype`图标并将其向下移动到底部\
    \ Dock 栏中。如图所示，图标在你实际将其放置到位之前会保持半透明状态。\n\n当你确定图标都已放置到你想要的位置后，只需按下`Home`按钮一次，图标就会锁定在位。此时，底部\
    \ Dock 栏中就有了`Instagram`和`音乐`图标，你可以随时快速访问它们。\n\n### 将图标移动到不同的主屏幕页面\n\niPod touch\
    \ 的每个页面可以容纳 16 个图标（不包括 Dock 栏）。你可以通过在`主屏幕`上向右滑动来浏览这些页面。由于有这么多酷炫的应用程序可用，拥有五页、六页甚至更多页的图标非常常见。如果你喜欢冒险，最多可以拥有\
    \ 11 页填满图标的页面！\n\n**注意：** 你也可以通过在除`主屏幕`之外的任何屏幕上从左向右滑动来导航到新页面。在`主屏幕`上，从左向右滑动会进入`聚焦搜索`；更多信息请参阅第\
    \ 2 章：“键入、拷贝和搜索”。\n\n你可能在第一页上有一个很少使用的图标，所以你想把它移到最后一页。或者，你可能想把一个常用图标从最后一页移到第一页。这两项任务都非常简单；事实上，这与将图标移动到底部\
    \ Dock 栏非常相似：\n\n1. 长按任意图标以启动移动过程。\n2. 长按你想要移动的图标。例如，假设你想将`iBooks`图标移动到第一页（见图\
    \ 6–2）。\n   \n   ![images](img/0602.jpg)\n   \n   **图 6–2.** *将图标从一个页面移动到另一个页面*\n\
    3. 现在，将图标拖放到另一个页面。为此，请长按`iBooks`图标并将其向左拖动。你会看到你所有的图标页面依次滑过。当到达第一页时，松开图标，它就会被放置在最开始的位置。\n\
    4. 按下`Home`键以完成移动并停止图标晃动。\n\n### 删除图标\n\n注意——删除图标和移动图标一样简单。当你在 iPod touch 上删除一个图标时，实际上是在删除它所代表的程序。这意味着除非重新安装或重新下载，否则你将无法再次使用该程序。\n\
    \n根据你在`iTunes`应用中设置的“应用程序同步”偏好，该程序可能仍然保留在 iTunes 的“应用程序”文件夹中。在这种情况下，你只需在 iTunes\
    \ 中勾选该要同步的应用程序，即可重新安装已删除的应用。\n\n如图 6–3 所示，删除图标的过程与移动图标的过程类似。长按任意图标以启动删除过程。和之前一样，长按会使图标晃动，并允许你移动或删除它们。\n\
    \n**注意：** 你只能删除已下载到 iPod touch 上的程序；预装的图标及其关联程序无法被删除。你可以通过查看图标左上角是否有一个黑色的小`x`来判断哪些程序可以删除。\n\
    \n只需点击你想要删除的图标上的`x`。系统会提示你“`删除`”该图标或“`取消`”删除请求。如果你点击“`删除`”，该图标及其关联的应用将从你的 iPod\
    \ touch 中移除。\n\n**注意：** 如果你删除一个图标，例如一个记录并保存了进度的游戏，当你删除该游戏时，你的进度也将被清除。\n\n![images](img/0603.jpg)\n\
    \n**图 6–3.** *删除图标及其关联程序*\n\n### 重置所有图标位置（恢复出厂默认设置）\n\n有时，你可能想要恢复到原始的出厂默认图标设置。例如，当你把太多新图标移到第一页，并想再次看到所有基本图标时，就可能需要这样做。\n\
    \n要执行此操作，请点击`设置`图标。接着，点击`通用`，最后，一直滚动到底部并点击`还原`。\n\n![images](img/p154-01.jpg)\n\
    \n**注意：** 内建应用将恢复到 Apple 发货 iPod touch 时的原始顺序。\n\n在`还原`屏幕上，点击靠近底部的`还原主屏幕布局`。现在，你所有的图标都将恢复到其原始设置。\n\
    \n![images](img/p154-02.jpg)\n\n**警告：** 请小心，不要点击其他`还原`选项，因为如果点错按钮，可能会意外擦除整个 iPod\
    \ touch。如果不小心点了，你将不得不从 iTunes 备份中恢复数据。\n\n### 使用文件夹\n\n你的 iPod touch 允许你将应用整理到文件夹中。当你下载新应用时，它们会占据`主屏幕`页面上的一个位置。一旦你下载了大量应用，就可能难以找到应用并保持它们的井井有条。\n\
    \n![images](img/p155-01.jpg)\n\n使用文件夹可以让你将游戏、效率应用和其他功能相似的应用整理到同一个文件夹中。每个文件夹最多可以容纳\
    \ 12 个应用——这确实有助于你整理 iPod touch！\n\n#### 创建文件夹\n\n创建文件夹直观且有趣：\n\n1. 长按一个应用，直到所有应用开始晃动（就像之前在“移动图标”部分中所做的那样）。\n\
    2. 将一个应用拖到另一个功能相似的应用上。例如，将一个效率应用拖到另一个类似的应用上。iPod touch 会为该文件夹自动创建一个名称。\n3. 在此示例中，我们将三个\
    \ Apple 效率应用（Numbers、Keynote 和 Pages）拖曳到彼此之上，iPod touch 创建了一个名为“效率”的文件夹。\n4. 你可以通过点击`名称`字段并键入新名称来编辑文件夹名称（见图\
    \ 6–4）。\n5. 按下`Home`按钮以设置新的文件夹名称。\n6. 再次按下`Home`按钮以返回`主屏幕`。此时，你会看到已重命名的新文件夹。\n\
    \n**注意：** 一个文件夹中最多可以放置 12 个应用图标。如果你试图在文件夹中放入超过这个数量的图标，你会看到新图标被不断地“挤”出文件夹。这个动画表示文件夹已满。\n\
    \n![images](img/0604.jpg)\n\n**图 6–4.** *移动图标以创建文件夹并重命名。*\n"
- fmt: "### Moving Folders\n\nJust like apps, folders can also be moved from one **Home**\
    \ page to another:\n\n1. Press and hold a folder until the folder and icons on\
    \ the **Home** screen start to shake.\n2. Touch and hold the folder and drag it\
    \ to your preferred spot on the screen (or to another **Home** screen), and then\
    \ let go.\n3. When you have the folder in the spot you desire, just press the\
    \ **Home** button to complete the move.\n\n**TIP:** You can even move a folder\
    \ down to the Bottom Dock if you like. This is a very handy way of having lots\
    \ of apps right at your fingertips (see [Figure 6–5](#Chapter06.html#fig_6_5)).\n\
    \n![images](images/0605.jpg)\n\n**Figure 6–5.** *Moving a folder to the Bottom\
    \ Dock*\n\n## Chapter 7\n\n## Multitasking\n\nIn this chapter, we will describe\
    \ how to multitask and jump between apps on your iPod touch. Multitasking means\
    \ you can leave one app running in the background while you do something else,\
    \ such as stream Internet radio, listen to turn-by-turn directions, or take Skype\
    \ calls.\n\n### Fast App Switching\n\nThe *Fast App Switcher* enables you to leave\
    \ many of your apps running in the background. It also lets you switch from the\
    \ current app to another without stopping the app you're currently using.\n\n\
    You might wonder when it might make sense to use the Fast App Switcher. Here are\
    \ a few scenarios when you might want to consider using multitasking on your iPod\
    \ touch:\n\n- Copy and paste from one app (**Mail**) to another (**Calendar**).\n\
    - Reply to an iMessage while playing a game, and then jump back into that game\
    \ without missing a beat.\n- Continue listening to Internet radio (such as **Pandora**\
    \ or **Slacker**) while checking your email or browsing the Web.\n- Forego waiting\
    \ for photos to upload to Facebook or Flikr; your photos can be running in the\
    \ background while you go and do other things on your iPod touch.\n- Use **Skype**\
    \ to call people—now you can leave it running in the background to receive incoming\
    \ calls (this was not possible before).\n\n#### Jumping Between Apps\n\nIn order\
    \ to multitask, you need to bring up the Fast App Switcher bar at the bottom of\
    \ the screen.\n\n1. From any app or even the Home screen, double-click the **Home**\
    \ button to bring up the **Fast App Switcher** bar at the bottom of your screen\n\
    \n   ![images](images/p160-01.jpg)\n\n2. All open apps will be shown on the Fast\
    \ App Switcher bar.\n\n   ![images](images/p160-02.jpg)\n\n3. Swipe right or left\
    \ to find the app you want and tap it.\n4. If you don't see the app you want on\
    \ the Fast App Switcher bar, then press the **Home** button and start it from\
    \ the Home screen.\n5. Double-click the **Home** button again and tap the app\
    \ you just left to jump back to it.\n\n#### Killing Apps from the Fast App Switcher\
    \ Bar\n\nYour iPod touch will automatically manage its memory, leaving apps open\
    \ that are doing useful things like streaming music, and putting apps that aren't\
    \ doing anything to “sleep,” so they don't waste memory or processor cycles. Sometimes,\
    \ however, a *rogue process* can cause an app not to close properly; at other\
    \ times, you might want to make certain a GPS or VoIP app closes early to save\
    \ battery power. In those cases, you can use the Fast App Switcher to manually\
    \ kill apps.\n\nBuilt-in apps like **Mail** and **Messages** will immediately\
    \ restart, so you don't miss any important messages. Apps and games from the App\
    \ Store will stay closed until the next time you tap their icons to launch them.\
    \ Follow these steps to kill an app from the **Fast App Switcher** bar:\n\n1.\
    \ Double-click the **Home** button to bring up the **Fast App Switcher** bar.\n\
    \n   ![images](images/p161-01.jpg)\n\n2. Press and hold any icon in the **Fast\
    \ App Switcher** bar until they all shake. You will notice that a red **Circle**\
    \ icon with a minus sign appears in the upper-left corner of each app icon.\n\
    3. Tap a red **Circle** icon ![images](images/p161-02.jpg) to completely close\
    \ the app.\n4. Keep tapping the red **Circle** icons to close as many apps as\
    \ you want.\n\n#### Media Controls and the Screen Portrait Orientation Lock\n\n\
    Swiping from left to right on the **Fast App Switcher** bar will bring up the\
    \ media controls and the **Portrait Orientation Lock** icon. Follow these steps\
    \ to access these controls and use the Portrait Orientation Lock feature:\n\n\
    1. From any app or even the **Home** screen, double-tap the **Home** button to\
    \ bring up the **Fast App Switcher** bar at the bottom of your screen.\n\n   ![images](images/p161-04.jpg)\n\
    \n2. Swipe left to right to see the media controls and the **Portrait Orientation\
    \ Lock** icon.\n3. Tap the **Portrait Orientation Lock** icon to lock the screen\
    \ in Portrait (i.e., vertical) orientation. Your iPod touch will maintain this\
    \ orientation even if you turn it on its side. You know the iPod touch is locked\
    \ when you see a **Lock** icon inside the button and another **Lock** icon in\
    \ the top status bar.\n\n   ![images](images/p161-03.jpg)\n\n4. The name of the\
    \ currently playing media is listed at the bottom of the screen.\n5. You can also\
    \ use the **Previous Track**, **Play/Pause**, and **Next Track** buttons in the\
    \ middle. If you hold down **Previous Track** or **Next Track** button, it becomes\
    \ the **Rewind** or **Fast Forward** button, respectively.\n6. Or, you can tap\
    \ the **App** icon to jump to the last app that was playing music on your iPod\
    \ touch.\n\n#### Volume Controls and AirPlay\n\nIf you keep swiping as far left\
    \ as possible on **Fast App Switcher** bar, you'll find the volume controls and\
    \ the **AirPlay** button. Follow these steps to manipulate these controls:\n\n\
    1. From any app or even the **Home** screen, double-tap the **Home** button to\
    \ bring up the **Fast App Switcher** at the bottom of your screen.\n\n   ![images](images/p162-01.jpg)\n\
    \n2. Swipe left to right, past the media controls, until you get to the volume\
    \ controls and the **AirPlay** button.\n3. Tap the **AirPlay** button to beam\
    \ your iPod touch audio to **AirPlay** compatible speakers, your video to Apple\
    \ TV, or to mirror your apps on the Apple TV.\n4. Slide the **Volume** control\
    \ left to reduce the volume; slide it to the right to increase it.\n\n## Chapter\
    \ 8\n\n## Personalize and Secure\n\nIn this chapter, you will learn several easy\
    \ ways to personalize your iPod touch. You will also learn how to protect your\
    \ iPod touch with passcode security. We'll show you where you can download free\
    \ wallpaper to change the look of your **Lock** and **Home** screens. We'll also\
    \ show you how to personalize the sounds your iPod touch makes by adjusting when\
    \ and what sound you hear for various activities. Many aspects of the iPod touch\
    \ can be fine-tuned to meet your needs and tastes, so you can give your iPod touch\
    \ a more personal look and feel.\n\n### Changing Your Lock Screen and Home Screen\
    \ Wallpapers\n\nThere are actually two screens you can personalize on your iPod\
    \ touch by changing the wallpaper.\n\nThe **Lock** screen appears when you first\
    \ turn on your iPod touch or wake it up. The wallpaper for this screen image is\
    \ shown behind the **Slide to Unlock** slider bar.\n\nThe **Home** screen features\
    \ all of your icons. You can see the wallpaper behind the icons. You can use the\
    \ wallpaper pictures that come with the iPod touch, or you can use your own images.\n\
    \n**TIP:** You may want the wallpaper for your **Lock** screen to be less personal\
    \ than your **Home** screen wallpaper. For example, you might choose to put a\
    \ generic landscape image on your **Lock** screen and a picture of a loved one\
    \ on your **Home** screen. Also, you might want to choose a **Home** screen wallpaper\
    \ that is less busy, so it does not clash with the icons."
  raw: "#### Moving Folders\n\nJust like apps, folders can also be moved from one\
    \ **Home** page to another:\n\n1.  Press and hold a folder until the folder and\
    \ icons on the **Home** screen start to shake.\n2.  Touch and hold the folder\
    \ and drag it to your preferred spot on the screen (or to another **Home** screen),\
    \ and then let go.\n3.  When you have the folder in the spot you desire, just\
    \ press the **Home** button to complete the move.\n\n**TIP:** You can even move\
    \ a folder down to the Bottom Dock if you like. This is a very handy way of having\
    \ lots of apps right at your fingertips (see [Figure 6–5](#Chapter06.html#fig_6_5)).\n\
    \n![images](images/0605.jpg)\n\n**Figure 6–5.** *Moving a folder to the Bottom\
    \ Dock*\n\n## Chapter 7\n\n## Multitasking\n\nIn this chapter, we will describe\
    \ how to multitask and jump between apps on your iPod touch. Multitasking means\
    \ you can leave one app running in the background while you do something else,\
    \ such as stream Internet radio, listen to turn-by-turn directions, or take Skype\
    \ calls.\n\n### Fast App Switching\n\nThe *Fast App Switcher* enables you to leave\
    \ many of your apps running in the background. It also lets you switch from the\
    \ current app to another without stopping the app you're currently using.\n\n\
    You might wonder when it might make sense to use the Fast App Switcher. Here are\
    \ a few scenarios when you might want to consider using multitasking on your iPod\
    \ touch:\n\n*   Copy and paste from one app (**Mail**) to another (**Calendar**).\n\
    *   Reply to an iMessage while playing a game, and then jump back into that game\
    \ without missing a beat.\n*   Continue listening to Internet radio (such as **Pandora**\
    \ or **Slacker**) while checking your email or browsing the Web.\n*   Forego waiting\
    \ for photos to upload to Facebook or Flikr; your photos can be running in the\
    \ background while you go and do other things on your iPod touch.\n*   Use **Skype**\
    \ to call people—now you can leave it running in the background to receive incoming\
    \ calls (this was not possible before).\n\n#### Jumping Between Apps\n\nIn order\
    \ to multitask, you need to bring up the Fast App Switcher bar at the bottom of\
    \ the screen.\n\n1.  From any app or even the Home screen, double-click the **Home**\
    \ button to bring up the **Fast App Switcher** bar at the bottom of your screen\n\
    \n    ![images](images/p160-01.jpg)\n\n2.  All open apps will be shown on the\
    \ Fast App Switcher bar.\n\n    ![images](images/p160-02.jpg)\n\n3.  Swipe right\
    \ or left to find the app you want and tap it.\n4.  If you don't see the app you\
    \ want on the Fast App Switcher bar, then press the Home button and start it from\
    \ the Home screen.\n5.  Double-click the **Home** button again and tap the app\
    \ you just left to jump back to it.\n\n#### Killing Apps from the Fast App Switcher\
    \ Bar\n\nYour iPod touch will automatically manage its memory, leaving apps open\
    \ that are doing useful things like streaming music, and putting apps that aren't\
    \ doing anything to “sleep,” so they don't waste memory or processor cycles. Sometimes,\
    \ however, a *rogue process* can cause an app not to close properly; at other\
    \ times, you might want to make certain a GPS or VoIP app closes early to save\
    \ battery power. In those cases, you can use the Fast App Switcher to manually\
    \ kill apps.\n\nBuilt-in apps like **Mail** and **Messages** will immediately\
    \ restart, so you don't miss any important messages. Apps and games from the App\
    \ Store will stay closed until the next time you tap their icons to launch them.\
    \ Follow these steps to kill an app from the **Fast App Switcher** bar:\n\n1.\
    \  Double-click the **Home** button to bring up the **Fast App Switcher** bar.\n\
    \n    ![images](images/p161-01.jpg)\n\n2.  Press and hold any icon in the **Fast\
    \ App Switcher** bar until they all shake. You will notice that a red **Circle**\
    \ icon with a minus sign appears in the upper-left corner of each app icon.\n\
    3.  Tap a red **Circle** icon ![images](images/p161-02.jpg) to completely close\
    \ the app.\n4.  Keep tapping the red **Circle** icons to close as many apps as\
    \ you want.\n\n#### Media Controls and the Screen Portrait Orientation Lock\n\n\
    Swiping from left to right on the **Fast App Switcher** bar will bring up the\
    \ media controls and the **Portrait Orientation Lock** icon. Follow these steps\
    \ to access these controls and use the Portrait Orientation Lock feature:\n\n\
    1.  From any app or even the **Home** screen, double-tap the **Home** button to\
    \ bring up the **Fast App Switcher** bar at the bottom of your screen.\n\n   \
    \ ![images](images/p161-04.jpg)\n\n2.  Swipe left to right to see the media controls\
    \ and the **Portrait Orientation Lock** icon.\n3.  Tap the **Portrait Orientation\
    \ Lock** icon to lock the screen in Portrait (i.e., vertical) orientation. Your\
    \ iPod touch will maintain this orientation even if you turn it on its side. You\
    \ know the iPod touch is locked when you see a **Lock** icon inside the button\
    \ and another **Lock** icon in the top status bar.\n\n    ![images](images/p161-03.jpg)\n\
    \n4.  The name of the currently playing media is listed at the bottom of the screen.\n\
    5.  You can also use the **Previous Track**, **Play/Pause**, and **Next Track**\
    \ buttons in the middle. If you hold down **Previous Track** or **Next Track**\
    \ button, it becomes the **Rewind** or **Fast Forward** button, respectively.\n\
    6.  Or, you can tap the **App** icon to jump to the last app that was playing\
    \ music on your iPod touch.\n\n#### Volume Controls and AirPlay\n\nIf you keep\
    \ swiping as far left as possible on **FastApp Switcher** bar, you'll find the\
    \ volume controls and the **AirPlay** button. Follow these steps to manipulate\
    \ these controls:\n\n1.  From any app or even the **Home** screen, double-tap\
    \ the **Home** button to bring up the **Fast App Switcher** at the bottom of your\
    \ screen.\n\n    ![images](images/p162-01.jpg)\n\n2.  Swipe left to right, past\
    \ the media controls, until you get to the volume controls and the **AirPlay**\
    \ button.\n3.  Tap the **AirPlay** button to beam your iPod touch audio to **AirPlay**\
    \ compatible speakers, your video to Apple TV, or to mirror your apps on the Apple\
    \ TV.\n4.  Slide the **Volume** control left to reduce the volume; slide it to\
    \ the right to increase it.\n\n## Chapter 8\n\n## Personalize and Secure\n\nIn\
    \ this chapter, you will learn several easy ways to personalize your iPod touch.\
    \ You will also learn how to protect your iPod touch with passcode security. We'll\
    \ show you where you can download free wallpaper to change the look of your **Lock**\
    \ and **Home** screens. We'll also show you how to personalize the sounds your\
    \ iPod touch makes by adjusting when and what sound you hear for various activities.\
    \ Many aspects of the iPod touch can be fine-tuned to meet your needs and tastes,\
    \ so you can give your iPod touch a more personal look and feel.\n\n### Changing\
    \ Your Lock Screen and Home Screen Wallpapers\n\nThere are actually two screens\
    \ you can personalize on your iPod touch by changing the wallpaper.\n\nThe **Lock**\
    \ screen appears when you first turn on your iPod touch or wake it up. The wallpaper\
    \ for this screen image is shown behind the **Slide to Unlock** slider bar.\n\n\
    The **Home** screen features all of your icons. You can see the wallpaper behind\
    \ the icons. You can use the wallpaper pictures that come with the iPod touch,\
    \ or you can use your own images.\n\n**TIP:** You may want the wallpaper for your\
    \ **Lock** screen to be less personal than your **Home** screen wallpaper. For\
    \ example, you might choose to put a generic landscape image on your **Lock**\
    \ screen and a picture of a loved one on your **Home** screen. Also, you might\
    \ want to choose a **Home** screen wallpaper that is less busy, so it does not\
    \ clash with the icons."
  trans: "\n### 移动文件夹\n\n就像应用一样，文件夹也可以从一个**主屏幕**移动到另一个：\n\n1. 按住一个文件夹，直到**主屏幕**上的文件夹和图标开始晃动。\n\
    2. 长按该文件夹并将其拖曳到屏幕上你希望放置的位置（或者另一个**主屏幕**），然后松开手指。\n3. 当文件夹位于你满意的地方后，只需按下**主屏幕**按钮即可完成移动。\n\
    \n**提示：** 如果你愿意，甚至可以把文件夹移动到底部 Dock 栏。这是一种非常便捷的方式，让你可以将大量应用尽在指尖（请参见图 6–5）。\n\n\
    ![images](img/0605.jpg)\n\n**图 6–5.** *将文件夹移动到底部 Dock 栏*\n\n## 第 7 章\n\n## 多任务处理\n\
    \n在本章中，我们将介绍如何在 iPod touch 上执行多任务处理以及在应用之间快速切换。多任务处理意味着你可以让一个应用在后台继续运行，同时做其他事情，例如播放网络电台、听取逐向导航或接听\
    \ Skype 电话。\n\n### 快速应用切换\n\n*快速应用切换器*让你能让许多应用在后台保持运行。它还能让你在不停止当前使用应用的情况下切换到另一个应用。\n\
    \n你可能想知道何时使用快速应用切换器比较合理。以下是几个你可能想在 iPod touch 上使用多任务处理的场景：\n\n- 从一个应用（**邮件**）复制粘贴到另一个应用（**日历**）。\n\
    - 在玩游戏时回复 iMessage，然后无缝跳回游戏。\n- 在查看电子邮件或浏览网页时继续收听网络电台（例如 **Pandora** 或 **Slacker**）。\n\
    - 无需等待照片上传到 Facebook 或 Flickr；照片可以在后台上传，而你可以在 iPod touch 上做其他事情。\n- 使用 **Skype**\
    \ 打电话——现在可以让它留在后台运行以接听来电（以往无法实现）。\n\n#### 在应用间跳转\n\n要执行多任务操作，你需要调出屏幕底部的快速应用切换器栏。\n\
    \n1. 在任何应用或主屏幕中，双击**主屏幕**按钮，即可在屏幕底部调出**快速应用切换器**栏\n\n   ![images](img/p160-01.jpg)\n\
    \n2. 所有已打开的应用都会显示在快速应用切换器栏中。\n\n   ![images](img/p160-02.jpg)\n\n3. 向左或向右滑动以找到你需要的应用，然后轻点它。\n\
    4. 如果在快速应用切换器栏上没有看到你想要的应用，则按下**主屏幕**按钮，从主屏幕启动它。\n5. 再次双击**主屏幕**按钮，然后轻点刚才离开的应用，即可跳回该应用。\n\
    \n#### 在快速应用切换器栏中关闭应用\n\n你的 iPod touch 会自动管理内存，让正在执行有用操作（如播放音乐）的应用保持打开，而将没有进行任何操作的应用置于“休眠”状态，从而避免浪费内存或处理器周期。然而，有时某个*流氓进程*可能导致应用无法正常关闭；另一些时候，你可能想强制某个\
    \ GPS 或 VoIP 应用提前关闭以节省电量。在这些情况下，你可以使用快速应用切换器手动关闭应用。\n\n**邮件**和**信息**等内置应用会立即重启，这样你就不会错过任何重要消息。App\
    \ Store 中的应用和游戏则会保持关闭状态，直到你下次轻点它们的图标启动它们。按照以下步骤从**快速应用切换器**栏中关闭应用：\n\n1. 双击**主屏幕**按钮以调出**快速应用切换器**栏。\n\
    \n   ![images](img/p161-01.jpg)\n\n2. 长按**快速应用切换器**栏中的任意图标，直到所有图标开始晃动。你会注意到每个应用图标的左上角会出现一个带有减号的红色**圆形**图标。\n\
    3. 轻点一个红色**圆形**图标 ![images](img/p161-02.jpg)，即可彻底关闭该应用。\n4. 继续轻点红色**圆形**图标，以关闭你想要的任意数量的应用。\n\
    \n#### 媒体控制与屏幕竖排方向锁定\n\n在**快速应用切换器**栏上从左向右轻扫，即可调出媒体控制和**竖排方向锁定**图标。按照以下步骤访问这些控制并使用竖排方向锁定功能：\n\
    \n1. 在任何应用或**主屏幕**中，双击**主屏幕**按钮，调出屏幕底部的**快速应用切换器**栏。\n\n   ![images](img/p161-04.jpg)\n\
    \n2. 从左向右轻扫，即可看到媒体控制和**竖排方向锁定**图标。\n3. 轻点**竖排方向锁定**图标，将屏幕锁定为竖排（即垂直）方向。即使你将其侧放，iPod\
    \ touch 也会保持此方向。当按钮内出现**锁定**图标，并且顶部状态栏中也有一个**锁定**图标时，即表明 iPod touch 已锁定。\n\n \
    \  ![images](img/p161-03.jpg)\n\n4. 当前播放的媒体名称显示在屏幕底部。\n5. 你还可以使用中间的**上一曲**、**播放/暂停**和**下一曲**按钮。如果按住**上一曲**或**下一曲**按钮，它们会分别变为**快退**或**快进**按钮。\n\
    6. 或者，你也可以轻点**应用**图标，跳转到最近一次在 iPod touch 上播放音乐的应用。\n\n#### 音量控制与 AirPlay\n\n如果在**快速应用切换器**栏上尽可能向左滑动，你会找到音量控制和\
    \ **AirPlay** 按钮。按照以下步骤操作这些控制：\n\n1. 在任何应用或**主屏幕**中，双击**主屏幕**按钮，调出屏幕底部的**快速应用切换器**。\n\
    \n   ![images](img/p162-01.jpg)\n\n2. 从左向右轻扫，越过媒体控制，直到看到音量控制和 **AirPlay** 按钮。\n\
    3. 轻点 **AirPlay** 按钮，将 iPod touch 的音频输出到兼容 **AirPlay** 的扬声器，或将视频输出到 Apple TV，或镜像你的应用到\
    \ Apple TV 上。\n4. 向左滑动**音量**控制可降低音量；向右滑动可增大音量。\n\n## 第 8 章\n\n## 个性化与安全性\n\n在本章中，你将学习几种简单的方法来个性化你的\
    \ iPod touch。你还将学习如何使用密码保护你的 iPod touch。我们将向你展示从哪里可以下载免费壁纸，以改变**锁定屏幕**和**主屏幕**的外观。我们还将向你展示如何通过调整各种活动何时发出声音以及发出什么样的声音，来个性化\
    \ iPod touch 的提示音。iPod touch 的许多方面都可以根据你的需求和品味进行精细调整，从而让你的 iPod touch 更具个性化外观和感觉。\n\
    \n### 更改锁定屏幕和主屏幕壁纸\n\n实际上，你可以通过更改壁纸来个性化 iPod touch 上的两个屏幕。\n\n**锁定屏幕**在你第一次开启\
    \ iPod touch 或唤醒它时出现。该屏幕的壁纸图像显示在“滑动来解锁”滑块后面。\n\n**主屏幕**上显示所有图标。你可以在图标后面看到壁纸。你可以使用\
    \ iPod touch 自带的壁纸图片，也可以使用你自己的图片。\n\n**提示：** 你可能希望**锁定屏幕**的壁纸比**主屏幕**的壁纸更不具个人色彩。例如，你可能选择在**锁定屏幕**上使用一张通用风景图，而在**主屏幕**上放一张心爱之人的照片。此外，你还可能希望选择一张不那么花哨的**主屏幕**壁纸，以免与图标产生视觉冲突。\n"
- fmt: "#### Changing Wallpaper from Your Settings App\n\nThere are a couple of ways\
    \ to change the wallpaper on your iPod touch. The first way is very straightforward:\
    \ simply adjust your wallpaper from your `Settings` app:\n\n1. Tap the `Settings`\
    \ icon.\n2. Tap `Wallpaper`.\n\n   ![images](images/p164-01.jpg)\n\n3. Tap the\
    \ image of your currently selected wallpapers. The `Lock` screen is shown on the\
    \ left, and the `Home` screen is on the right.\n\n   ![images](images/p164-02.jpg)\n\
    \n4. Choose an album:\n\n   ![images](images/p164-03.jpg)\n\n   * Tap `Wallpaper`\
    \ to select a preloaded wallpaper.\n   * Tap `Camera Roll` (or `Photo Stream`\
    \ if you have it enabled in iCloud) to select from pictures you've taken with\
    \ your iPod touch, images you've saved from the Web; from screenshots (which you\
    \ take by pressing and hold the `Home` button and `Power/Sleep` key); or even\
    \ from wallpaper apps.\n   * Tap any of the other albums to view pictures you\
    \ have synced.\n\n5. Once you tap an album, you will see all the images within\
    \ that album. Swipe up or down to view all images. The images you have most recently\
    \ added will be at the very bottom of the list.\n6. Tap any image to select it\
    \ and view it full screen.\n7. Now you can move and scale the image:\n\n   ![images](images/p165-01.jpg)\n\
    \n   * Move the image by touching and dragging your finger.\n   * Zoom in or out\
    \ by pinching your fingers open or closed.\n   * Tap the `Cancel` button to return\
    \ to the album if you don't like the image.\n\n8. Tap the `Set` button to set\
    \ the image as your wallpaper.\n9. Select where you want this wallpaper to be\
    \ used:\n\n   ![images](images/p165-02.jpg)\n\n   * Tap the `Set Lock Screen`\
    \ button to set the image only for your `Lock` screen.\n   * Tap the `Set Home\
    \ Screen` button to set the image only for your `Home` screen.\n   * Tap the `Set\
    \ Both` button to set the image for both your `Lock` and `Home` screens.\n\n10.\
    \ Tap the `Home` button to exit the `Settings` app and check out your new wallpapers,\
    \ as shown in [Figure 8–1](#Chapter08.html#fig_8_1).\n\n![images](images/0801.jpg)\n\
    \n**Figure 8–1.** *Viewing your Lock screen and Home screen wallpapers*\n\n####\
    \ Using Any Photo As Wallpaper\n\nThe second way to change your wallpaper is to\
    \ view any picture in your `Photos` collection and select it as your wallpaper.\
    \ Follow these steps to do so:\n\n1. Tap the `Photos` icon to get started. To\
    \ learn more about working with photos, check out [Chapter 19](#Chapter19.html#ch19):\
    \ “Working with Photos.”\n2. Touch the photo album you want to look through to\
    \ find your wallpaper.\n3. When you find a photo you want to use, touch it and\
    \ it will open on your screen.\n4. The thumbnail you tap will fill the screen.\
    \ If this is the image you want to use, tap the `Set as` icon ![images](images/p166-01.jpg)\
    \ on the lower-left corner of the screen.\n5. Tap `Use As Wallpaper`\n\n   ![images](images/p167-01.jpg)\n\
    \n6. To move, scale, and set an image as your `Home` or `Lock` screen wallpaper,\
    \ follow Steps 7-9 from the previous section. If you decide you'd rather use a\
    \ different picture, choose `Cancel` and pick a different one.\n\n### Downloading\
    \ Great Wallpaper from Free Apps\n\nGo to the App Store and do a search for “backgrounds”\
    \ or “wallpapers” (see [Chapter 22](#Chapter22.html#ch22): “The Amazing App Store”\
    \ for more information on this). You'll find a number of free and low-cost apps\
    \ designed specifically for your iPod touch. In this section, we will highlight\
    \ one app of many in this genre called `Pimp Your Screen` from Apalon. This app\
    \ has hundreds of beautiful background images you can download for your iPod touch\
    \ and was currently just $0.99 as of publishing time.\n\n**NOTE:** With `Pimp\
    \ Your Screen`, as with most wallpaper apps, you will need a live Internet connection.\n\
    \n#### Using the Wallpaper App\n\nAfter you install `Pimp Your Screen`, you're\
    \ ready to get started:\n\n![images](images/p167-02.jpg)\n\n1. Tap the `Pimp Your\
    \ Screen` icon to start the app.\n2. The app's home screen has a number of categories\
    \ to choose from: `App Shelves` (shelves to hold your apps - sort of like iBooks\
    \ or Newsstand), `Neon Combos` (neon backgrounds), `Home Screens` (nice looking\
    \ home screens), `Icon Skins` (create backgrounds to highlight your icons). Then\
    \ you can create your own personalized Lock and Home screen using the bottom two\
    \ options; `Lock Screen Maker` and `Home Screen Maker` as shown in [Figure 8–2.](#Chapter08.html#fig_8_2)\n\
    \n   ![images](images/0802.jpg)\n\n   **Figure 8–2.** *Using the Pimp Your Screen\
    \ app.*\n\n3. After touching any category, you can swipe left or right to view\
    \ more wallpaper image options. To save the wallpaper in your `Camera Roll` album,\
    \ tap the `Save` button in the middle of the bottom of the image.\n4. If you don't\
    \ like the image, tap the `Home` button in the lower-left corner to get back to\
    \ the Home screen menu.\n\n#### Using Your Newly Saved Wallpaper\n\nOnce you've\
    \ chosen a wallpaper image and saved it to your iPod touch, you need to select\
    \ it using the steps described in the “Changing Wallpaper from Your Settings App”\
    \ section earlier in this chapter.\n\nRemember that the downloaded wallpaper will\
    \ be in the `Camera Roll` album. After you tap `Camera Roll` to open it, you'll\
    \ need to flick all the way to the bottom to see your recent entries.\n\n### Adjusting\
    \ Sounds on Your iPod touch\n\nYou can fine-tune your iPod touch so that it does\
    \ or does not make sounds when certain events happen, such as an incoming message,\
    \ a new email, calendar alert -- even the ringtone for a FaceTime call! You can\
    \ also customize what happens when you send mail or type on the keyboard.\n\n\
    Follow these steps to adjust the sounds played on your iPod touch:\n\n1. Tap your\
    \ `Settings` icon.\n\n   ![images](images/p169-01.jpg)\n\n2. Tap `Sounds`.\n3.\
    \ To adjust the volume of the ringtone and other alerts, move the slider bar just\
    \ below `Ringer and Alerts`.\n4. To change your iPod touch's ringtone or text\
    \ tone; the sound played when you receive a new mail, tweet, calendar alert, or\
    \ reminder alert; or the sound played when a sent mail completes — tap the item\
    \ you wish to change.\n5. This screen lets you select a new ringtone. Tap any\
    \ ringtone to play it and select it. (You can tell whether a ringtone is selected\
    \ by the checkmark next to its name. `Bell Tower` is selected in the image to\
    \ the right.)\n\n   ![images](images/p170-01.jpg)\n\n6. If none of the tones available\
    \ appeal to you, you can click `Buy More Tones` and be taken to the iTunes Tones\
    \ Store, where you can purchase some of your favorite songs as tones.\n7. When\
    \ you are done, tap the `Sounds` button in the upper-left corner.\n8. Use the\
    \ same steps to change the sound you hear for a text tone, new mail, tweet, and\
    \ so on.\n9. In all sound categories except `Ringtone`, you can turn off the sound\
    \ played by selecting the `None` entry at the top of the list.\n\n   ![images](images/p170-02.jpg)\n\
    \n10. `Lock Sounds` and `Keyboard Clicks` can be adjusted by tapping the switches\
    \ to set them to `ON` or `OFF`. When done, press the `Home` button to exit.\n\n\
    \    ![images](images/p170-03.jpg)\n\n**TIP:** On a related note, you can lock\
    \ the maximum volume playable from the `Music` app. Do so by going into `Settings`\
    \ > `Music` > `Volume Limit` > `Lock Volume Limit`. We show you how to do this\
    \ in [Chapter 11](#Chapter11.html#ch11): “Playing Music.”\n\n### Keyboard Options\n\
    \nYou can fine-tune your keyboard by selecting various languages and changing\
    \ settings like `Auto-Correction` and `Auto-Capitalization`. You can even have\
    \ your iPod touch speak the auto-correction suggestions to you as you type. See\
    \ [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search” for a description\
    \ of the various keyboard options and how to use them."
  raw: "#### Changing Wallpaper from Your Settings App\n\nThere are a couple of ways\
    \ to change the wallpaper on your iPod touch. The first way is very straightforward:\
    \ simply adjust your wallpaper from your **Settings** app:\n\n1.  Tap the **Settings**\
    \ icon.\n2.  Tap **Wallpaper**.\n\n    ![images](images/p164-01.jpg)\n\n3.  Tap\
    \ the image of your currently selected wallpapers. The **Lock** screen is shown\
    \ on the left, and the **Home** screen is on the right.\n\n    ![images](images/p164-02.jpg)\n\
    \n4.  Choose an album:\n\n    ![images](images/p164-03.jpg)\n\n    *   Tap **Wallpaper**\
    \ to select a preloaded wallpaper.\n    *   Tap **Camera Roll** (or **Photo Stream**\
    \ if you have it enabled in iCloud**)** to select from pictures you've taken with\
    \ your iPod touch, images you've saved from the Web; from screenshots (which you\
    \ take by pressing and hold the **Home** button and **Power/Sleep** key); or even\
    \ from wallpaper apps.\n    *   Tap any of the other albums to view pictures you\
    \ have synced.\n5.  Once you tap an album, you will see all the images within\
    \ that album. Swipe up or down to view all images. The images you have most recently\
    \ added will be at the very bottom of the list.\n6.  Tap any image to select it\
    \ and view it full screen.\n7.  Now you can move and scale the image:\n\n    ![images](images/p165-01.jpg)\n\
    \n    *   Move the image by touching and dragging your finger.\n    *   Zoom in\
    \ or out by pinching your fingers open or closed.\n    *   Tap the **Cancel**\
    \ button to return to the album if you don't like the image.\n8.  Tap the **Set**\
    \ button to set the image as your wallpaper.\n9.  Select where you want this wallpaper\
    \ to be used:\n\n    ![images](images/p165-02.jpg)\n\n    *   Tap the **Set Lock\
    \ Screen** button to set the image only for your **Lock** screen.\n    *   Tap\
    \ the **Set Home Screen** button to set the image only for your **Home** screen.\n\
    \    *   Tap the **Set Both** button to set the image for both your **Lock** and\
    \ **Home** screens.\n10.  Tap the **Home** button to exit the **Settings** app\
    \ and check out your new wallpapers, as shown in [Figure 8–1](#Chapter08.html#fig_8_1).\n\
    \n![images](images/0801.jpg)\n\n**Figure 8–1.** *Viewing your **Lock** screen\
    \ and **Home** screen wallpapers*\n\n#### Using Any Photo As Wallpaper\n\nThe\
    \ second way to change your wallpaper is to view any picture in your **Photos**\
    \ collection and select it as your wallpaper. Follow these steps to do so:\n\n\
    1.  Tap the **Photos** icon to get started. To learn more about working with photos,\
    \ check out [Chapter 19](#Chapter19.html#ch19): “Working with Photos.”\n2.  Touch\
    \ the photo album you want to look through to find your wallpaper.\n3.  When you\
    \ find a photo you want to use, touch it and it will open on your screen.\n4.\
    \  The thumbnail you tap will fill the screen. If this is the image you want to\
    \ use, tap the **Set as** icon ![images](images/p166-01.jpg) on the lower-left\
    \ corner of the screen.\n5.  Tap **Use As Wallpaper**\n\n    ![images](images/p167-01.jpg)\n\
    \n6.  To move, scale, and set an image as your **Home** or **Lock** screen wallpaper,\
    \ follow Steps 7-9 from the previous section. If you decide you'd rather use a\
    \ different picture, choose **Cancel** and pick a different one.\n\n### Downloading\
    \ Great Wallpaper from Free Apps\n\nGo to the App Store and do a search for “backgrounds”\
    \ or “wallpapers” (see [Chapter 22](#Chapter22.html#ch22): “The Amazing App Store”\
    \ for more information on this). You'll find a number of free and low-cost apps\
    \ designed specifically for your iPod touch. In this section, we will highlight\
    \ one app of many in this genre called **Pimp Your Screen** from Apalon. This\
    \ app has hundreds of beautiful background images you can download for your iPod\
    \ touch and was currently just $0.99 as of publishing time.\n\n**NOTE:** With\
    \ Pimp Your Screen, as with most wallpaper apps, you will need a live Internet\
    \ connection.\n\n#### Using the WallpaperAp\n\nAfter you install **Pimp Your Screen**,\
    \ you're ready to get started:\n\n![images](images/p167-02.jpg)\n\n1.  Tap the\
    \ **Pimp Your Screen** icon to start the app.\n2.  The app's home screen has a\
    \ number of categories to choose from: **App Shelves** (shelves to hold your apps\
    \ - sort of like iBooks or Newsstand), **Neon Combos** (neon backgrounds), **Home\
    \ Screens** (nice looking home screens), **Icon Skins** (create backgrounds to\
    \ highlight your icons). Then you can create your own personalized Lock and Home\
    \ screen using the bottom two options; **Lock Screen** Maker and **Home Screen\
    \ Maker** as shown in [Figure 8–2.](#Chapter08.html#fig_8_2)\n\n    ![images](images/0802.jpg)\n\
    \n    **Figure 8–2.** *Using the Pimp Your Screen app.*\n\n3.  After touching\
    \ any category, you can swipe left or right to view more wallpaper image options.\
    \ To save the wallpaper in your **Camera Roll** album, the **Save** button in\
    \ the middle of the bottom of the image.\n4.  If you don't like the image, click\
    \ the **Home** button in the lower-left corner to get back to the Home screen\
    \ menu.\n\n#### Using Your Newly Saved Wallpaper\n\nOnce you've chosen a wallpaper\
    \ image and saved it to your iPod touch, you need to select it using the steps\
    \ described in the “Changing Wallpaper from Your Settings App” section earlier\
    \ in this chapter.\n\nRemember that the downloaded wallpaper will be in the **Camera\
    \ Roll** album. After you tap **Camera Roll** to open it, you'll need to flick\
    \ all the way to the bottom to see your recent entries.\n\n### Adjusting Sounds\
    \ on Your iPod touch\n\nYou can fine-tune your iPod touch so that it does or does\
    \ not make sounds when certain events happen, such as an incoming message, a new\
    \ email, calendar alert -- even the ringtone for a FaceTime call! You can also\
    \ customize what happens when you send mail or type on the keyboard.\n\nFollow\
    \ these steps to adjust the sounds played on your iPod touch:\n\n1.  Tap your\
    \ **Settings** icon.\n\n    ![images](images/p169-01.jpg)\n\n2.  Tap **Sounds**.\n\
    3.  To adjust the volume of the ringtone and other alerts, move the slider bar\
    \ just below **Ringer and Alerts**.\n4.  To change your iPod touch's ringtone\
    \ or text tone; the sound played when you receive a new mail, tweet, calendar\
    \ alert, or reminder alert; or the sound played when a sent mail completes —tap\
    \ the item you wish to change.\n5.  This screen lets you select a new ringtone.\
    \ Tap any ringtone to play it and select it. (You can tell whether a ringtone\
    \ is selected by the checkmark next to its name. **Bell Tower** is selected in\
    \ the image to the right.)\n\n    ![images](images/p170-01.jpg)\n\n6.  If none\
    \ of the tones available appeal to you, you can click **Buy More Tones** and be\
    \ taken to the iTunes Tones Store, where you can purchase some of your favorite\
    \ songs as tones.\n7.  When you are done, tap the **Sounds** button in the upper-left\
    \ corner.\n8.  Use the same steps to change the sound you hear for a text tone,\
    \ new mail, tweet, and so on.\n9.  In all sound categories except **Ringtone**,\
    \ you can turn off the sound played by selecting the **None** entry at the top\
    \ of the list.\n\n    ![images](images/p170-02.jpg)\n\n10.  **Lock Sounds** and\
    \ **Keyboard Clicks** can be adjusted by tapping the switches to set them to **ON**\
    \ or **OFF**. When done, press the **Home** button to exit.\n\n    ![images](images/p170-03.jpg)\n\
    \n**TIP:** On a related note, you can lock the maximum volume playable from the\
    \ **Music** app. Do so by going into **Settings** > **Music** > **Volume Limit**\
    \ > **Lock Volume Limit**. We show you how to do this in [Chapter 11](#Chapter11.html#ch11):\
    \ “Playing Music.”\n\n### Keyboard Options\n\nYou can fine-tune your keyboard\
    \ by selecting various languages and changing settings like **Auto-Correction**\
    \ and **Auto-Capitalization**. You can even have your iPod touch speak the auto-correction\
    \ suggestions to you as you type. See [Chapter 2](#Chapter02.html#ch2): “Typing,\
    \ Copy and Search” for a description of the various keyboard options and how to\
    \ use them."
  trans: "\n#### 从“设置”应用中更换壁纸\n\niPod touch 上有几种更换壁纸的方法。第一种方法非常直接：只需在`设置`应用中调整壁纸即可：\n\
    \n1.  轻点`设置`图标。\n2.  轻点`墙纸`。\n\n    ![images](img/p164-01.jpg)\n\n3.  轻点当前所选壁纸的图像。左侧显示的是`锁定`屏幕，右侧显示的是`主屏幕`。\n\
    \n    ![images](img/p164-02.jpg)\n\n4.  选择一个相簿：\n\n    ![images](img/p164-03.jpg)\n\
    \n    *   轻点`墙纸`以选择预装的壁纸。\n    *   轻点`相机胶卷`（如果在 iCloud 中启用了`照片流`，则轻点它）以从你用 iPod\
    \ touch 拍摄的照片、从网页保存的图像、屏幕截图（同时按住`主屏幕`按钮和`电源/睡眠`键可截取）或壁纸应用中进行选择。\n    *   轻点任何其他相簿以查看已同步的照片。\n\
    \n5.  轻点一个相簿后，你将看到该相簿中的所有图像。向上或向下滑动可查看所有图像。最近添加的图像将位于列表的最底部。\n6.  轻点任意图像以选中它并全屏查看。\n\
    7.  现在你可以移动和缩放图像：\n\n    ![images](img/p165-01.jpg)\n\n    *   通过触摸并拖动手指来移动图像。\n\
    \    *   通过张开或捏合手指来放大或缩小。\n    *   如果不喜欢该图像，请轻点`取消`按钮以返回相簿。\n\n8.  轻点`设定`按钮以将该图像设置为壁纸。\n\
    9.  选择你希望此壁纸用于何处：\n\n    ![images](img/p165-02.jpg)\n\n    *   轻点`设定锁定屏幕`按钮以仅将图像设置为`锁定`屏幕。\n\
    \    *   轻点`设定主屏幕`按钮以仅将图像设置为`主屏幕`。\n    *   轻点`同时设定`按钮以将图像同时设置为`锁定`屏幕和`主屏幕`。\n\
    \n10. 轻点`主屏幕`按钮以退出`设置`应用，然后查看你的新壁纸，如图 8–1 所示。\n\n![images](img/0801.jpg)\n\n**图\
    \ 8–1.** *查看你的锁定屏幕和主屏幕壁纸*\n\n#### 使用任意照片作为壁纸\n\n第二种更换壁纸的方法是查看`照片`集中的任意图片并将其选为壁纸。请按照以下步骤操作：\n\
    \n1.  轻点`照片`图标以开始。要了解有关处理照片的更多信息，请查看第 19 章：“处理照片”。\n2.  轻触你想浏览以寻找壁纸的照片相簿。\n3.\
    \  找到想使用的照片后，轻触它，它将在屏幕上打开。\n4.  你轻点的缩略图将填满屏幕。如果这是你想使用的图像，请轻点屏幕左下角的`设定为`图标 ![images](img/p166-01.jpg)。\n\
    5.  轻点`用作墙纸`\n\n    ![images](img/p167-01.jpg)\n\n6.  要移动、缩放图像并将其设置为`主屏幕`或`锁定`屏幕壁纸，请遵循上一节中的步骤\
    \ 7-9。如果你决定改用其他图片，请选择`取消`并选取另一张。\n\n### 从免费应用下载精美壁纸\n\n前往 App Store 并搜索“背景”或“壁纸”（有关详细信息，请查看第\
    \ 22 章：“神奇的 App Store”）。你会找到许多专为 iPod touch 设计的免费或低价应用。在本节中，我们将重点介绍此类应用中的一款，即\
    \ Apalon 出品的 `Pimp Your Screen`。该应用拥有数百张精美的背景图像可供你下载到 iPod touch，并且在撰写本文时其售价仅为\
    \ 0.99 美元。\n\n**注意：** 与大多数壁纸应用一样，使用 `Pimp Your Screen` 时需要有效的互联网连接。\n\n#### 使用壁纸应用\n\
    \n安装 `Pimp Your Screen` 后，你就可以开始使用了：\n\n![images](img/p167-02.jpg)\n\n1.  轻点 `Pimp\
    \ Your Screen` 图标以启动该应用。\n2.  该应用的主屏幕上有多个类别可供选择：`应用架`（用于放置应用的架子——类似 iBooks 或报亭）、`霓虹组合`（霓虹背景）、`主屏幕`（漂亮的主屏幕）、`图标皮肤`（创建背景以突出显示图标）。然后你可以使用底部的两个选项——`锁定屏幕制作器`和`主屏幕制作器`来创建个性化的锁定屏幕和主屏幕，如图\
    \ 8–2 所示。\n\n    ![images](img/0802.jpg)\n\n    **图 8–2.** *使用 Pimp Your Screen\
    \ 应用。*\n\n3.  轻触任何类别后，你可以向左或向右滑动以查看更多壁纸图像选项。要将壁纸保存到`相机胶卷`相簿，请轻点图像底部中间的`保存`按钮。\n\
    4.  如果你不喜欢该图像，请轻点左下角的`主屏幕`按钮以返回主屏幕菜单。\n\n#### 使用新保存的壁纸\n\n选择好壁纸图像并将其保存到 iPod touch\
    \ 后，你需要按照本章前面“从‘设置’应用中更换壁纸”一节中描述的步骤来选中它。\n\n请记住，下载的壁纸将位于`相机胶卷`相簿中。轻点`相机胶卷`将其打开后，你需要一直向下滚动到底部才能看到最近的条目。\n\
    \n### 调整 iPod touch 上的声音\n\n你可以精确调整 iPod touch，使其在特定事件发生时发出或不发出声音，例如收到信息、新邮件、日历提醒，甚至是\
    \ FaceTime 通话的铃声！你还可以自定义发送邮件或在键盘上打字时发生的情况。\n\n请按照以下步骤调整 iPod touch 上播放的声音：\n\n\
    1.  轻点`设置`图标。\n\n    ![images](img/p169-01.jpg)\n\n2.  轻点`声音`。\n3.  要调整铃声和其他提醒的音量，请移动`铃声和提醒`正下方的滑块。\n\
    4.  要更改 iPod touch 的铃声或文本音调；收到新邮件、推文、日历提醒或提醒事项时播放的声音；或发送邮件完成时播放的声音——轻点你想要更改的项目。\n\
    5.  此屏幕允许你选择新铃声。轻点任意铃声即可播放并选中它。（你可以通过铃声名称旁边的勾号来判断它是否被选中。右侧图片中已选中`钟楼`。）\n\n   \
    \ ![images](img/p170-01.jpg)\n\n6.  如果可用的铃声都不合你意，你可以轻点`购买更多铃声`，然后会被带到 iTunes 铃声商店，你可以在那里购买一些你喜欢的歌曲作为铃声。\n\
    7.  完成后，轻点左上角的`声音`按钮。\n8.  使用相同的步骤更改你在文本音调、新邮件、推文等方面的声音。\n9.  在除`铃声`之外的所有声音类别中，你可以通过选择列表顶部的`无`来关闭播放的声音。\n\
    \n    ![images](img/p170-02.jpg)\n\n10. `锁定声`和`键盘点按声`可以通过轻点开关将其设置为`开`或`关`来调整。完成后，按下`主屏幕`按钮退出。\n\
    \n    ![images](img/p170-03.jpg)\n\n**提示：** 与此相关，你可以锁定`音乐`应用的最大播放音量。操作方法：前往`设置`\
    \ > `音乐` > `音量限制` > `锁定音量限制`。我们将在第 11 章：“播放音乐”中向你展示如何操作。\n\n### 键盘选项\n\n你可以通过选择多种语言以及更改`自动纠正`和`自动大写`等设置来精确调整键盘。你甚至可以让\
    \ iPod touch 在你打字时读出自动纠正建议。请查看第 2 章：“打字、拷贝与搜索”以了解各种键盘选项及其使用方法。\n"
- fmt: "### Securing Your iPod touch with a Passcode\n\nYour iPod touch can hold a\
    \ great deal of valuable information. This is especially true if you use it to\
    \ save information like the Social Security numbers and birth dates of your family\
    \ members. It's a good idea to make sure that anyone who picks up your iPod touch\
    \ can't access all that information. Also, if your children are like ours, they'll\
    \ probably pick up your cool iPod touch and start surfing the Web or playing a\
    \ game. You might want to enable some security restrictions to keep them safe.\n\
    \n#### Setting a Simple Four-Digit Passcode\n\nOn your iPod touch, you have the\
    \ option of setting a four-digit passcode that prevents unauthorized access to\
    \ your iPod touch and your information. If the wrong passcode is entered, however,\
    \ even you won't be able to access your information, so it is a good idea to use\
    \ a code you'll remember easily.\n\nFollow these steps to set a passcode to lock\
    \ your iPod touch:\n\n1.  Tap the `Settings` icon.\n    ![images](images/p171-01.jpg)\n\
    2.  Tap `General`.\n3.  Scroll down and tap `Passcode Lock`.\n4.  Tap `Turn Passcode\
    \ On` to set a passcode.\n5.  The default passcode is a simple four-digit passcode.\
    \ Use the keyboard to enter a four-digit code. You will then be prompted to enter\
    \ your code once more.\n    ![images](images/p172-01.jpg)\n\n#### Setting a More\
    \ Complex Password\n\nIf you prefer to have a password that is more complicated\
    \ than just four digits, you can do so by setting the `Simple Passcode` option\
    \ on the `Passcode Lock` screen to `OFF`.\n\nYou will then be able to enter a\
    \ new passcode with letters, numbers, and even symbols.\n\n![images](images/p172-02.jpg)\n\
    \n**CAUTION:** Be careful! If you forget your passcode, you cannot unlock your\
    \ iPod touch.\n\n#### Adjusting Your Passcode Options\n\nOnce you have set your\
    \ passcode, you will be presented with a few options:\n\n![images](images/p173-01.jpg)\n\
    \n- `Turn Passcode Off`\n- `Change Passcode`\n- `Require Passcode` (`Immediately`,\
    \ `After 1 Minute`, `After 5 Minutes`, `After 15 Minutes`, `After 1 Hour`)\n-\
    \ `Simple Passcode` (`ON` = four digits; `OFF` = any letters, numbers, or symbols)\n\
    - `Erase Data` (`ON` = erase all data after ten incorrect password attempts; `OFF`\
    \ = do not erase data)\n\n**CAUTION:** You may want to set `Erase Data` to `OFF`\
    \ if you have young children who like to bang away at the security to unlock the\
    \ keyboard when it comes out of `Sleep` mode. Otherwise, you may end up with your\
    \ iPod touch being erased frequently.\n\n**NOTE:** Setting a shorter time for\
    \ `Require Passcode` is more secure. Setting the time as `Immediately` —the default—is\
    \ most secure. However, using the setting of `1 Minute` may save you the headache\
    \ of retyping your passcode if you accidentally lock your iPod touch.\n\n### Setting\
    \ Restrictions\n\nYou might decide you don't want your kids listening to explicit\
    \ lyrics in the music on your iPod touch. You may also want to block them from\
    \ visiting YouTube or any other web site. Setting such restrictions is quite easy\
    \ on your iPod touch.\n\n#### Restricting Apps\n\nFollow these steps to restrict\
    \ access to content on your iPod touch:\n\n![images](images/p174-01.jpg)\n\n1.\
    \  Tap `General` in your `Settings` app.\n2.  Scroll down the page and tap `Restrictions`.\n\
    3.  Tap the `Enable Restrictions` button.\n4.  You will now be prompted to enter\
    \ a Restrictions Passcode—just pick a four-digit code you will remember.\n   \
    \ ![images](images/p174-02.jpg)\n\n**NOTE:** This Restrictions Passcode is a separate\
    \ passcode from your main iPod touch passcode. You can certainly set it to be\
    \ the same, which will make it easier to remember. However, this could be problematic\
    \ if you let your family know the main passcode, but do not want them adjusting\
    \ the restrictions. You will need to enter this Restrictions Passcode to turn\
    \ off restrictions later.\n\nNotice that you can adjust whether to allow certain\
    \ apps or actions to function. For example, the screen shot to the right lets\
    \ you adjust restrictions for the following apps: `Safari`, `YouTube`, `Camera`,\
    \ `FaceTime`, `iTunes`, and `Ping`. This screen also lets you restrict access\
    \ to `Installing Apps` or `Deleting Apps`. Finally, you can restrict the ability\
    \ to make changes to `Location` and `Accounts`.\n\n![images](images/p175-01.jpg)\n\
    \nIn all cases, `OFF` = restricted.\n\nYou might think that `ON` means something\
    \ is restricted, but it is the opposite. In order to disable or restrict something,\
    \ you need to touch the slider next to it and change it to `OFF`. If you notice\
    \ the word `Allow` above all the options, then it makes sense.\n\n**NOTE:** The\
    \ icons for any apps you restrict will disappear. So if you were to restrict access\
    \ to `YouTube`, the `App Store`, and the `FaceTime` apps; then the `YouTube` and\
    \ `App Store` icons would disappear from the `Home` screen, and your iPod touch's\
    \ `FaceTime` icon would also be removed.\n\n#### Allowing Changes\n\nSometimes\
    \ you don't want to turn off access to an app completely, but simply stop anyone\
    \ from making unintended changes. For example, the `Location` option comes with\
    \ a lot of privacy concerns, so you may want to exercise more granular control\
    \ over which apps and functions have access to it. Follow these steps to adjust\
    \ restrictions for the `Location` option:\n\n![images](images/p176-01.jpg)\n\n\
    1.  Go to the `Restrictions` screen, as described in the previous section.\n2.\
    \  Scroll down to the bottom to see all of the `Allow Changes` settings.\n3. \
    \ Tap `Location`.\n4.  Tap `Allow Changes` to make changes to `Location Settings`.\n\
    5.  Toggle `Location Services` to `OFF` to completely prevent your iPod touch\
    \ from using your location. (Note that this may greatly reduce the convenience\
    \ of apps like `Google Maps` and prevent turn-by-turn navigation apps from working\
    \ at all.)\n6.  Toggle to `OFF` any individual apps that you don't want tracking\
    \ your location. (For example, set `Location Services` for your `Camera` app to\
    \ `OFF` to prevent GPS coordinates from being included on pictures you intend\
    \ to share publicly on the Internet.)\n7.  Tap `System Services` to change the\
    \ `Location` permissions for built-in processes.\n8.  If there are any system\
    \ services that you don't want to use location data, then toggle them to `OFF`.\
    \ Options include `Cell Network Search`, `Compass Calibration`, `Diagnostics &\
    \ Usage`, `Location-Based iAds`, `Setting Time Zone`, and `Traffic`.\n    ![images](images/p177-01.jpg)\n\
    9.  Tap `Location` at the top left to go back when you're done.\n10. If you want\
    \ to prevent any future changes to `Location Services`, tap `Don't Allow Changes`.\n\
    11. Tap `Restrictions` to go back when you're done.\n12. Tap `Accounts` and tap\
    \ `Don't Allow Changes` to prevent any future changes to your `Mail`, `Calendar`,\
    \ and `Contact` accounts.\n13. Tap `Restrictions` to go back when you're done."
  raw: "### Securing Your iPod touch with a Passcode\n\nYour iPod touch can hold a\
    \ great deal of valuable information. This is especially true if you use it to\
    \ save information like the Social Security numbers and birth dates of your family\
    \ members. It's a good idea to make sure that anyone who picks up your iPod touch\
    \ can't access all that information. Also, if your children are like ours, they'll\
    \ probably pick up your cool iPod touch and start surfing the Web or playing a\
    \ game. You might want to enable some security restrictions to keep them safe.\n\
    \n#### Setting a Simple Four-Digit Passcode\n\nOn your iPod touch, you have the\
    \ option of setting a four-digit passcode that prevents unauthorized access to\
    \ your iPod touch and your information. If the wrong passcode is entered, however,\
    \ even you won't be able to access your information, so it is a good idea to use\
    \ a code you'll remember easily.\n\nFollow these steps to set a passcode to lock\
    \ your iPod touch:\n\n1.  Tap the **Settings** icon.\n\n    ![images](images/p171-01.jpg)\n\
    \n2.  Tap **General.**\n3.  Scroll down and tap **Passcode Lock.**\n4.  Tap **Turn\
    \ Passcode On** to set a passcode.\n5.  The default passcode is a simple four-digit\
    \ passcode. Use the keyboard to enter a four-digit code. You will then be prompted\
    \ to enter your code once more.\n\n    ![images](images/p172-01.jpg)\n\n#### Setting\
    \ a More Complex Password\n\nIf you prefer to have a password that is more complicated\
    \ than just four digits, you can do so by setting the **Simple Passcode** option\
    \ on the **Passcode Lock** screen to **OFF**.\n\nYou will then be able to enter\
    \ a new passcode with letters, numbers, and even symbols.\n\n![images](images/p172-02.jpg)\n\
    \n**CAUTION:** Be careful! If you forget your passcode, you cannot unlock your\
    \ iPod touch.\n\n#### Adjusting Your Passcode Options\n\nOnce you have set your\
    \ passcode, you will be presented with a few options:\n\n![images](images/p173-01.jpg)\n\
    \n*   **Turn Passcode Off**\n*   **Change Passcode**\n*   **Require Passcode**\
    \ (**Immediately, After 1 Minute, After 5 Minutes, After 15 Minutes, After 1 Hour)**\n\
    *   **Simple Passcode** (**ON** = four digits; **OFF** = any letters, numbers,\
    \ or symbols)\n*   **Erase Data** (**ON** = erase all data after ten incorrect\
    \ password attempts; **OFF** = do not erase data)\n\n**CAUTION:** You may want\
    \ to set **Erase Data** to **OFF** if you have young children who like to bang\
    \ away at the security to unlock the keyboard when it comes out of **Sleep** mode.\
    \ Otherwise, you may end up with your iPod touch being erased frequently.\n\n\
    **NOTE:** Setting a shorter time for **Require Passcode** is more secure. Setting\
    \ the time as **Immediately** —the default—is most secure. However, using the\
    \ setting of **1 Minute** may save you the headache of retyping your passcode\
    \ if you accidentally lock your iPod touch.\n\n### Setting Restrictions\n\nYou\
    \ might decide you don't want your kids listening to explicit lyrics in the music\
    \ on your iPod touch. You may also want to block them from visiting You Tube or\
    \ any other web site. Setting such restrictions is quite easy on your iPod touch.\n\
    \n#### Restricting Apps\n\nFollow these steps to restrict access to content on\
    \ your iPod touch:\n\n![images](images/p174-01.jpg)\n\n1.  Tap **General** in\
    \ your **Settings** app.\n2.  Scroll down the page and tap **Restrictions**.\n\
    3.  Tap the **Enable Restrictions** button.\n4.  You will now be prompted to enter\
    \ a Restrictions Passcode—just pick a four-digit code you will remember.\n\n \
    \   ![images](images/p174-02.jpg)\n\n**NOTE:** This Restrictions Passcode is a\
    \ separate passcode from your main iPod touch passcode. You can certainly set\
    \ it to be the same, which will make it easier to remember. However, this could\
    \ be problematic if you let your family know the main passcode, but do not want\
    \ them adjusting the restrictions. You will need to enter this Restrictions Passcode\
    \ to turn off restrictions later.\n\nNotice that you can adjust whether to allow\
    \ certain apps or actions to function. For example, the screen shot to the right\
    \ lets you adjust restrictions for the following apps: **Safari**, **YouTube**,\
    \ **Camera**, **FaceTime**, **iTunes**, and **Ping**. This screen also lets you\
    \ restrict access to **Installing Apps** or **Deleting Apps.** Finally, you can\
    \ restrict the ability to make changes to **Location** and **Accounts**.\n\n![images](images/p175-01.jpg)\n\
    \nIn all cases, **OFF** = restricted.\n\nYou might think that **ON** means something\
    \ is restricted, but it is the opposite. In order to disable or restrict something,\
    \ you need to touch the slider next to it and change it to **OFF**. If you notice\
    \ the word **Allow** above all the options, then it makes sense.\n\n**NOTE:**\
    \ The icons for any apps you restrict will disappear. So if you were to restrict\
    \ access to **YouTube**, the **App Store**, and the **FaceTime** apps; then the\
    \ **YouTube** and **App Store** icons would disappear from the **Home** screen,\
    \ and your iPod touch's **FaceTime** icon would also be removed.\n\n#### Allowing\
    \ Changes\n\nSometimes you don't want to turn off access to an app completely,\
    \ but simply stop anyone from making unintended changes. For example, the **Location**\
    \ option comes with a lot of privacy concerns, so you may want to exercise more\
    \ granular control over which apps and functions have access to it. Follow these\
    \ steps to adjust restrictions for the **Location** option:\n\n![images](images/p176-01.jpg)\n\
    \n1.  Go to the **Restrictions** screen, as described in the previous section.\n\
    2.  Scroll down to the bottom to see all of the **Allow Changes** settings.\n\
    3.  Tap **Location.**\n4.  Tap **Allow Changes** to make changes to **Location\
    \ Settings**.\n5.  Toggle **Location Services** to **OFF** to completely prevent\
    \ your iPod touch from using your location. (Note that this may greatly reduce\
    \ the convenience of apps like **Google Maps** and prevent turn-by-turn navigation\
    \ apps from working at all.)\n6.  Toggle to **OFF** any individual apps that you\
    \ don't want tracking your location. (For example, set **Location Services** for\
    \ your **Camera** app to **OFF** to prevent GPS coordinates from being included\
    \ on pictures you intend to share publicly on the Internet.)\n7.  Tap **System\
    \ Services** to change the **Location** permissions for built-in processes.\n\
    8.  If there are any system services that you don't want to use location data,\
    \ then toggle them to **OFF**. Options include **Cell Network Search**, **Compass\
    \ Calibration**, **Diagnostics & Usage**, **Location-Based iAds**, **Setting Time\
    \ Zone**, and **Traffic**.\n\n    ![images](images/p177-01.jpg)\n\n9.  Tap **Location**\
    \ at the top left to go back when you're done.\n10.  If you want to prevent any\
    \ future changes to **Location Services**, tap **Don't Allow Changes**.\n11. \
    \ Tap **Restrictions** to go back when you're done.\n12.  Tap **Accounts** and\
    \ tap **Don't Allow Changes** to prevent any future changes to your **Mail**,\
    \ **Calendar**, and **Contact** accounts.\n13.  Tap **Restrictions** to go back\
    \ when you're done."
  trans: "\n### 使用密码保护你的 iPod touch\n\n你的 iPod touch 可能存储着大量有价值的信息。如果你用它来保存家庭成员的社会安全号码和出生日期等信息，尤其如此。确保任何拿起你\
    \ iPod touch 的人都无法获取所有这些信息是一个好主意。此外，如果你的孩子像我们的一样，他们很可能会拿起你酷炫的 iPod touch，然后开始上网或玩游戏。你可能希望启用一些安全限制来保护他们的安全。\n\
    \n#### 设置简单的四位数字密码\n\n在 iPod touch 上，你可以选择设置一个四位数字密码，以防止未经授权访问你的 iPod touch 和信息。然而，如果输入错误的密码，即使是你自己也无法访问信息，因此最好使用一个你容易记住的密码。\n\
    \n按照以下步骤设置密码以锁定你的 iPod touch：\n\n1.  轻点 `设置` 图标。  \n    ![images](img/p171-01.jpg)\n\
    2.  轻点 `通用`。\n3.  向下滚动并轻点 `密码锁定`。\n4.  轻点 `开启密码` 来设置密码。\n5.  默认密码是简单的四位数字密码。使用键盘输入四位数字密码。然后系统会提示你再次输入密码。\
    \  \n    ![images](img/p172-01.jpg)\n\n#### 设置更复杂的密码\n\n如果你更倾向于使用比四位数字更复杂的密码，你可以通过在\
    \ `密码锁定` 屏幕上将 `简单密码` 选项设为 `关闭` 来实现。\n\n随后你将能输入包含字母、数字甚至符号的新密码。\n\n![images](img/p172-02.jpg)\n\
    \n**警告：** 请谨慎操作！如果你忘记了密码，你将无法解锁你的 iPod touch。\n\n#### 调整密码选项\n\n设置好密码后，你将看到以下几个选项：\n\
    \n![images](img/p173-01.jpg)\n\n-   `关闭密码`\n-   `更改密码`\n-   `需要密码`（`立即`、`1 分钟后`、`5\
    \ 分钟后`、`15 分钟后`、`1 小时后`）\n-   `简单密码`（`开启`= 四位数字；`关闭`= 任意字母、数字或符号）\n-   `抹掉数据`（`开启`=\
    \ 连续十次输入错误密码后抹掉所有数据；`关闭`= 不抹掉数据）\n\n**警告：** 如果你有喜欢在设备从 `睡眠` 模式唤醒时使劲敲击安全键盘来解锁的小孩子，你可能希望将\
    \ `抹掉数据` 设为 `关闭`。否则，你的 iPod touch 可能会被频繁抹掉数据。\n\n**注意：** 为 `需要密码` 设置更短的时间更安全。将时间设为\
    \ `立即`（默认设置）最为安全。然而，使用 `1 分钟` 的设置可能会让你在意外锁定 iPod touch 时免去重新输入密码的麻烦。\n\n### 设置限制\n\
    \n你可能会决定不想让孩子听到 iPod touch 音乐中的露骨歌词。你可能还想阻止他们访问 YouTube 或任何其他网站。在 iPod touch 上设置此类限制非常简单。\n\
    \n#### 限制应用\n\n按照以下步骤限制对 iPod touch 上内容的访问：\n\n![images](img/p174-01.jpg)\n\n\
    1.  在 `设置` 应用中轻点 `通用`。\n2.  向下滚动页面并轻点 `访问限制`。\n3.  轻点 `启用访问限制` 按钮。\n4.  系统会提示你输入访问限制密码——只需选择一个你能记住的四位数字密码即可。\
    \  \n    ![images](img/p174-02.jpg)\n\n**注意：** 此访问限制密码与你 iPod touch 的主密码是分开的。你当然可以将它们设为相同，这样更容易记住。然而，如果你让家人知道了主密码，却不想让他们调整限制设置，这可能会带来问题。之后你需要输入此访问限制密码才能关闭限制。\n\
    \n请注意，你可以调整是否允许某些应用或功能运行。例如，右侧的屏幕截图允许你调整以下应用的访问限制：`Safari`、`YouTube`、`相机`、`FaceTime`、`iTunes`\
    \ 和 `Ping`。此屏幕还允许你限制对 `安装应用` 或 `删除应用` 的访问。最后，你可以限制更改 `定位` 和 `账户` 的能力。\n\n![images](img/p175-01.jpg)\n\
    \n在所有情况下，`关闭` 表示受限。\n\n你可能认为 `开启` 意味着某些内容被限制，但事实恰恰相反。为了禁用或限制某些内容，你需要点击其旁边的滑块并将其切换为\
    \ `关闭`。如果你注意到所有选项上方都有 `允许` 这个词，那么这就说得通了。\n\n**注意：** 你限制的任何应用的图标都会消失。因此，如果你限制访问\
    \ `YouTube`、`App Store` 和 `FaceTime` 应用，那么 `YouTube`、`App Store` 图标将从主屏幕消失，并且你\
    \ iPod touch 的 `FaceTime` 图标也会被移除。\n\n#### 允许更改\n\n有时你并不想完全关闭对某个应用的访问，而只是阻止任何人进行意外的更改。例如，`定位`\
    \ 选项涉及许多隐私问题，因此你可能希望对哪些应用和功能有权访问它进行更精细的控制。按照以下步骤调整 `定位` 选项的限制：\n\n![images](img/p176-01.jpg)\n\
    \n1.  按照上一节所述，前往 `访问限制` 屏幕。\n2.  向下滚动到底部以查看所有 `允许更改` 设置。\n3.  轻点 `定位`。\n4.  轻点\
    \ `允许更改` 以更改 `定位设置`。\n5.  将 `定位服务` 切换为 `关闭`，以完全阻止你的 iPod touch 使用你的位置。（请注意，这可能会大大降低诸如\
    \ `谷歌地图` 等应用的便利性，并导致逐向导航应用完全无法工作。）\n6.  将任何你不想让其追踪你位置的单个应用切换为 `关闭`。（例如，将 `相机`\
    \ 应用的 `定位服务` 设为 `关闭`，以防止你打算在互联网上公开分享的照片中包含 GPS 坐标。）\n7.  轻点 `系统服务` 以更改内置进程的 `定位`\
    \ 权限。\n8.  如果有任何你不想让其使用位置数据的系统服务，将它们切换为 `关闭`。选项包括 `蜂窝网络搜索`、`指南针校准`、`诊断与用量`、`基于位置的\
    \ iAd`、`设置时区` 和 `交通状况`。  \n    ![images](img/p177-01.jpg)\n9.  完成后，轻点左上角的 `定位`\
    \ 返回。\n10. 如果你想防止将来对 `定位服务` 进行任何更改，轻点 `不允许更改`。\n11. 完成后，轻点 `访问限制` 返回。\n12. 轻点\
    \ `账户`，然后轻点 `不允许更改`，以防止将来对你的 `邮件`、`日历` 和 `通讯录` 账户进行任何更改。\n13. 完成后，轻点 `访问限制` 返回。\n"
- fmt: "# Restricting Content\n\nIn addition to setting restrictions for apps, you\
    \ can set restrictions for content that can be downloaded and viewed on your iPod\
    \ touch. Follow these steps if you might give your iPod touch to a child, and\
    \ you don't want her to have the ability to download music with explicit lyrics\
    \ or watch movies with adult content:\n\n1. Go to the **Restrictions** screen,\
    \ as described in the previous section.\n   ![images](images/p178-01.jpg)\n2.\
    \ Scroll down to the bottom to see all of the **Allowed Content** settings.\n\
    3. To restrict content purchased while inside an app, set **In-App Purchases**\
    \ to **OFF**. This will include music and videos purchased from the **iTunes**\
    \ app.\n4. If you have small children and worry about them making expensive in-app\
    \ purchases after you download a new app (e.g., you don't want them to buy **Smurfberries**\
    \ in the **Smurfs** app), then tap **Require Password** and change that setting\
    \ to **Immediately**.\n5. Tap **Ratings For** to adjust the ratings based on the\
    \ country where you live. An extensive list of countries are currently supported,\
    \ including Australia, Austria, Canada, France, Germany, Ireland, Japan, New Zealand,\
    \ the United Kingdom, and the United States.\n6. Tap **Music & Podcasts** to restrict\
    \ access to lyrics with explicit content. Make sure you set the **Explicit** option\
    \ to **OFF**, as shown in the figure to the right.\n   ![images](images/p178-02.jpg)\n\
    7. Tap the **Restrictions** button in the upper-left corner to return to the list\
    \ of options.\n8. You can also set the ratings cutoff for **Movies**, **TV Shows,**\
    \ and **Apps** by tapping each item.\n   ![images](images/p179-01.jpg)\n9. When\
    \ you tap an item such as **Movies**, you see a list of allowed ratings. Tap the\
    \ highest rating level you want to allow. In this image, we tapped **PG-13.**\
    \ All movies rated above this (**R** and **NC-17)** are not allowed. The red text\
    \ and lack of checkmarks offer visual clues as to which selections are blocked.\n\
    10. Tap **TV Shows** to set those restrictions. Again, tap the highest rating\
    \ you want to allow. The checkmarks show allowed ratings; the red text shows which\
    \ ratings are not allowed. In this example, **TV-Y**, **TV-Y7**, and **TV-G**\
    \ are allowed, but higher ratings are not allowed (i.e., **TV-PG**, **TV-14**,\
    \ and **TV-MA**).\n11. Tap **Apps** to set restrictions for various apps.\n  \
    \  ![images](images/p180-01.jpg)\n12. In this screen, we are allowing apps with\
    \ ratings of **4+**, **9+**, and **12+** to be played. Apps with ratings of **17+**\
    \ cannot be played or downloaded.\n13. Tap the **Restrictions** button in the\
    \ upper-left corner to return to the list of options.\n14. Finally, tap the **Home**\
    \ button to save your settings.\n\n## Restricting Game Center\n\nGame Center is\
    \ a great way to enjoy social gaming, including match making, challenges, leaderboards,\
    \ and more. However, if you're a parent with young children, you may not be comfortable\
    \ with them playing multiplayer games or accepting friend requests without your\
    \ supervision. Follow these steps to restrict access to Game Center:\n\n1. Go\
    \ to the **Restrictions** screen, as described in the previous section.\n   ![images](images/p180-02.jpg)\n\
    2. Scroll down to **Game Center**.\n3. Toggle to **OFF** the **Multiplayer Games**\
    \ and/or **Adding Friends** options.\n\n# Chapter 9\n\n# Using iMessage\n\n*iMessage*\
    \ is Apple's new service that does exactly the same thing as SMS and MMS on phones,\
    \ but works over Wi-Fi networks and only with other iOS 5 devices (like iPod touches,\
    \ iPhones and iPads).\n\niMessage can be found in your iPod touch's **Messages**\
    \ app. In this chapter, you will learn how to use iMessage to send a text message\
    \ from your **Contacts** app and a picture message from your **Photos app.**\n\
    \n![images](images/p181-01.jpg)\n\n## Enabling iMessage and Adjusting Settings\n\
    \nSetting up the iMessage service is similar to setting up **FaceTime**:\n\n1.\
    \ **Launch Settings.**\n2. Tap **Messages.**\n3. Toggle **iMessages** to **ON**\n\
    4. Then you may be asked for your iMessage password—this is simply your Apple\
    \ iTunes password.\n\n**TIP:** If you get stuck in the **Waiting for activation**\
    \ message as shown here, then try re-booting your device as shown in [Chapter\
    \ 25](#Chapter25.html#ch25): Troubleshooting.\n\nOnce you've enabled the iMessages\
    \ option, your **email address** will be registered with the iMessage service.\n\
    \n![images](images/p182-01.jpg)\n\nIf you tap the **Receive At** near the bottom\
    \ of the iMessage settings screen, you will see a screen similar to this one.\n\
    \nOn this screen, you can adjust which email address is associated with your iMessage\
    \ and add new email addresses.\n\n![images](images/p182-02.jpg)\n\n### Composing\
    \ Messages\n\nComposing a iMessage is much like sending an e-mail or SMS text\
    \ message on a phone. The beauty of an iMessage is that it arrives on any iOS\
    \ 5 device, and it is quite simple to reply to.\n\n#### Composing a Message from\
    \ the Messages App\n\nThere are a couple of ways to start your **Messages** app.\
    \ The easiest is to just tap the **Messages** icon on the **Home** screen.\n\n\
    When you first start the **Messages** app, you most likely won't have any messages,\
    \ so the screen will be blank. Once you get started with iMessaging, you will\
    \ have a list of messages and current “open” discussions with your contacts. Follow\
    \ these steps to send a message:\n\n![images](images/p183-01.jpg)\n\n1. Touch\
    \ the **Compose** icon in the top-right corner of the screen.\n2. The cursor will\
    \ immediately go to the **To:** line. You can start typing the name of your contact,\
    \ or you can just touch the **Plus** (**+**) button and search or scroll through\
    \ your contacts.\n3. ![images](images/p183-02.jpg)\n4. When you find the contact\
    \ you wish to use, touch the person's name and it will appear in the **To:** line\n\
    5. When you are ready to type the message, touch anywhere in the box in the middle\
    \ of the screen (next to the **Send** button).\n6. The keyboard will be displayed.\
    \ Just type in your message and touch **Send** when you are done.\n\n**NOTE:**\
    \ A character counter will appear if you have enabled it in **Settings** > **Messages**.\n\
    \n![images](images/p183-03.jpg)\n\n**TIP:** If you prefer, you can use the larger\
    \ landscape keyboard for sending messages. It can be easier to type with the larger\
    \ keys, especially when your fingers are a little larger or it is hard to see\
    \ the smaller keys.\n\n#### Options After Sending a Message\n\nOnce you send the\
    \ message, the window changes to a *threaded* discussion window between you and\
    \ your contact. The message that you sent appears in a blue bubble. When your\
    \ contact replies, his message will appear on the opposite side of the screen\
    \ in a gray bubble.\n\nTo leave the **Compose** screen, tap **Messages** in the\
    \ upper-left corner or click the **Home** button to go back to your **Home** screen.\n\
    \n![images](images/p184-01.jpg)\n\n**NOTE:** If the message fails to send, you'll\
    \ see an exclamation mark beside it. You'll also see a **Red Exclamation Point**\
    \ icon in the upper-right corner of the icon for the **Messages** app.\n\n![images](images/p184-02.jpg)\n\
    \nIf this happens, you can send another message, just as you did before.\n\n####\
    \ Composing a Message from Contacts\n\nYou also have the ability to start the\
    \ message to any contact in your iPod touch. Follow these steps to do so:\n\n\
    1. Find the contact you wish to message by searching or scrolling through **Contacts.**\n\
    2. At the very bottom of the contact info, you will see a box that says **Send\
    \ Message**. Just touch that box and you will be prompted to choose which number\
    \ or email address to use (if you have more than one number or email address listed\
    \ for the contact).\n3. Choose the preferred number or email address and follow\
    \ the steps listed previously.\n\n![images](images/p185-01.jpg)\n\n**NOTE:** Remember\
    \ that you can only send iMessages to an email address associated with an Apple\
    \ ID being used with an iOS 5 device."
  raw: "#### Restricting Content\n\nIn addition to setting restrictions for apps,\
    \ you can set restrictions for content that can be downloaded and viewed on your\
    \ iPod touch. Follow these steps if you might give your iPod touch to a child,\
    \ and you don't want her to have the ability to download music with explicit lyrics\
    \ or watch movies with adult content:\n\n1.  Go to the **Restrictions** screen,\
    \ as described in the previous section.\n\n    ![images](images/p178-01.jpg)\n\
    \n2.  Scroll down to the bottom to see all of the **Allowed Content** settings.\n\
    3.  To restrict content purchased while inside an app, set **In-App Purchases**\
    \ to **OFF**. This will include music and videos purchased from the **iTunes**\
    \ app.\n4.  If you have small children and worry about them making expensive in-app\
    \ purchases after you download a new app (e.g., you don't want them to buy **Smurfberries**\
    \ in the **Smurfs** app), then tap **Require Password** and change that setting\
    \ to **Immediately**.\n5.  Tap **Ratings For** to adjust the ratings based on\
    \ the country where you live. An extensive list of countries are currently supported,\
    \ including Australia, Austria, Canada, France, Germany, Ireland, Japan, New Zealand,\
    \ the United Kingdom, and the United States.\n6.  Tap **Music & Podcasts** to\
    \ restrict access to lyrics with explicit content. Make sure you set the **Explicit**\
    \ option to **OFF**, as shown in the figure to the right.\n\n    ![images](images/p178-02.jpg)\n\
    \n7.  Tap the **Restrictions** button in the upper-left corner to return to the\
    \ list of options.\n8.  You can also set the ratings cutoff for **Movies**, **TVS\
    \ hows,** and **Apps** by tapping each item.\n\n    ![images](images/p179-01.jpg)\n\
    \n9.  When you tap an item such as **Movies**, you see a list of allowed ratings.\
    \ Tap the highest rating level you want to allow. In this image, we tapped **PG-13.**\
    \ All movies rated above this (**R** and **NC-17)** are not allowed. The red text\
    \ and lack of checkmarks offer visual clues as to which selections are blocked.\n\
    10.  Tap **TV Shows** to set those restrictions. Again, tap the highest rating\
    \ you want to allow. The checkmarks show allowed ratings; the red text shows which\
    \ ratings are not allowed. In this example, **TV-Y**, **TV-Y7**, and **TV-G**\
    \ are allowed, but higher ratings are not allowed (i.e., **TV-PG**, **TV-14**,\
    \ and **TV-MA**).\n11.  Tap **Apps** to set restrictions for various apps.\n\n\
    \    ![images](images/p180-01.jpg)\n\n12.  In this screen, we are allowing apps\
    \ with ratings of **4+**, **9+**, and **12+** to be played. Apps with ratings\
    \ of **17+** cannot be played or downloaded.\n13.  Tap the **Restrictions** button\
    \ in the upper-left corner to return to the list of options.\n14.  Finally, tap\
    \ the **Home** button to save your settings.\n\n#### Restricting Game Center\n\
    \nGame Center is a great way to enjoy social gaming, including match making, challenges,\
    \ leaderboads, and more. However, if you're a parent with young children, you\
    \ may not be comfortable with them playing multiplayer games or accepting friend\
    \ requests without your supervision. Follow these steps to restrict access to\
    \ Game Center:\n\n1.  Go to the **Restrictions** screen, as described in the previous\
    \ section.\n\n    ![images](images/p180-02.jpg)\n\n2.  Scroll down to **Game Center**.\n\
    3.  Toggle to **OFF** the **Multiplayer Games** and/or **Adding Friends** options.\n\
    \n## Chapter 9\n\n## Using iMessage\n\n*iMessage* is Apple's new service that\
    \ does exactly the same thing as SMS and MMS on phones, but works over Wi-Fi networks\
    \ and only with other iOS 5 devices (like iPod touches, iPhones and iPads).\n\n\
    iMessage can be found in your iPod touch's **Messages** app. In this chapter,\
    \ you will learn how to use iMessage to send a text message from your **Contacts**\
    \ app and a picture message from your **Photos app.**\n\n![images](images/p181-01.jpg)\n\
    \n### Enabling iMessage and Adjusting Settings\n\nSetting up the iMessage service\
    \ is similar to setting up **FaceTime**:\n\n1.  **Launch Settings.**\n2.  Tap\
    \ **Messages.**\n3.  Toggle **iMessages** to **ON**\n4.  Then you may be asked\
    \ for your iMessage password—this is simply your Apple iTunes password.\n\n**TIP:**\
    \ If you get stuck in the **Waiting for activation** message as shown here, then\
    \ try re-booting your device as shown in [Chapter 25](#Chapter25.html#ch25): Troubleshooting.\n\
    \nOnce you've enabled the iMessages option, your **email address** will be registered\
    \ with the iMessage service.\n\n![images](images/p182-01.jpg)\n\nIf you tap the\
    \ **Receive At** near the bottom of the iMessage settings screen, you will see\
    \ a screen similar to this one.\n\nOn this screen, you can adjust which email\
    \ address is associated with your iMessage and add new email addresses.\n\n![images](images/p182-02.jpg)\n\
    \n#### Composing Messages\n\nComposing a iMessage is much like sending an e-mail\
    \ or SMS text message on a phone. The beauty of an iMessage is that it arrives\
    \ on any iOS 5 device, and it is quite simple to reply to.\n\n#### Composing a\
    \ Message from the Messages App\n\nThere are a couple of ways to start your **Messages**\
    \ app. The easiest is to just tap the **Messages** icon on the **Home** screen.\n\
    \nWhen you first start the **Messages** app, you most likely won't have any messages,\
    \ so the screen will be blank. Once you get started with iMessaging, you will\
    \ have a list of messages and current “open” discussions with your contacts. Follow\
    \ these steps to send a message:\n\n![images](images/p183-01.jpg)\n\n1.  Touch\
    \ the **Compose** icon in the top-right corner of the screen.\n2.  The cursor\
    \ will immediately go to the **To:** line. You can start typing the name of your\
    \ contact, or you can just touch the **Plus** (**+**) button and search or scroll\
    \ through your contacts.\n3.  ![images](images/p183-02.jpg)\n\n4.  When you find\
    \ the contact you wish to use, touch the person's name and it will appear in the\
    \ **To:** line\n5.  When you are ready to type the message, touch anywhere in\
    \ the box in the middle of the screen (next to the **Send** button).\n6.  The\
    \ keyboard will be displayed. Just type in your message and touch **Send** when\
    \ you are done.\n\n**NOTE:** A character counter will appear if you have enabled\
    \ it in **Settings** > **Messages**.\n\n![images](images/p183-03.jpg)\n\n**TIP:**\
    \ If you prefer, you can use the larger landscape keyboard for sending messages.\
    \ It can be easier to type with the larger keys, especially when your fingers\
    \ are a little larger or it is hard to see the smaller keys.\n\n#### Options After\
    \ Sending a Message\n\nOnce you send the message, the window changes to a *threaded*\
    \ discussion window between you and your contact. The message that you sent appears\
    \ in a blue bubble. When your contact replies, his message will appear on the\
    \ opposite side of the screen in a gray bubble.\n\nTo leave the **Compose** screen,\
    \ tap **Messages** in the upper-left corner or click the **Home** button to go\
    \ back to your **Home** screen.\n\n![images](images/p184-01.jpg)\n\n**NOTE:**\
    \ If the message fails to send, you'll see an exclamation mark beside it. You'll\
    \ also see a **Red Exclamation Point** icon in the upper-right corner of the icon\
    \ for the **Messages** app.\n\n![images](images/p184-02.jpg)\n\nIf this happens,\
    \ you can send another message, just as you did before.\n\n#### Composing a Message\
    \ from Contacts\n\nYou also have the ability to start the message to any contact\
    \ in your iPod touch. Follow these steps to do so:\n\n1.  Find the contact you\
    \ wish to message by searching or scrolling through **Contacts.**\n2.  At the\
    \ very bottom of the contact info, you will see a box that says **Send Message**.\
    \ Just touch that box and you will be prompted to choose which number or email\
    \ address to use (if you have more than one number or email address listed for\
    \ the contact).\n3.  Choose the preferred number or email address and follow the\
    \ steps listed previously.\n\n![images](images/p185-01.jpg)\n\n**NOTE:** Remember\
    \ that you can only send iMessages to an email address associated with an Apple\
    \ ID being used with an iOS 5 device."
  trans: "\n# 限制内容\n\n除了为应用设置限制，你还可以对 iPod touch 上可下载和查看的内容进行限制。如果你打算将 iPod touch\
    \ 交给孩子使用，并且不希望她能够下载带有露骨歌词的音乐或观看成人电影，请按照以下步骤操作：\n\n1.  前往**限制**屏幕，操作方式如前一节所述。\n\
    \    ![images](img/p178-01.jpg)\n2.  向下滚动到底部，查看所有**允许的内容**设置。\n3.  要限制在应用内购买的内容，请将**App\
    \ 内购买项目**设置为**关闭**。这包括从**iTunes**应用购买的音乐和视频。\n4.  如果你有小孩，担心他们在下载新应用后进行昂贵的应用内购买（例如，你不想让他们在**蓝精灵**应用中购买**蓝精灵果**），请轻点**需要密码**，并将该设置更改为**立即**。\n\
    5.  轻点**评级所在地**，根据你所在的国家/地区调整评级。目前支持大量国家和地区，包括澳大利亚、奥地利、加拿大、法国、德国、爱尔兰、日本、新西兰、英国和美国。\n\
    6.  轻点**音乐与播客**以限制访问包含露骨内容的歌词。确保将**露骨**选项设置为**关闭**，如右侧图所示。\n    ![images](img/p178-02.jpg)\n\
    7.  轻点左上角的**限制**按钮，返回选项列表。\n8.  你还可以通过轻点每个项目来设置**影片**、**电视节目**和**App**的评级上限。\n\
    \    ![images](img/p179-01.jpg)\n9.  当你轻点**影片**等项目时，会看到一个允许的评级列表。轻点你想要允许的最高评级级别。在此图中，我们轻点了**PG-13**。所有高于此评级的影片（**R**\
    \ 和 **NC-17**）均不允许。红色文字和缺少对勾标记可直观提示哪些选择已被屏蔽。\n10. 轻点**电视节目**以设置这些限制。同样，轻点你想要允许的最高评级。对勾标记表示允许的评级；红色文字表示不允许的评级。在此示例中，**TV-Y**、**TV-Y7**\
    \ 和 **TV-G** 是允许的，但更高的评级（即 **TV-PG**、**TV-14** 和 **TV-MA**）是不允许的。\n11. 轻点**App**以设置对各种应用的限制。\n\
    \    ![images](img/p180-01.jpg)\n12. 在此屏幕中，我们允许播放评级为**4+**、**9+**和**12+**的应用。评级为**17+**的应用无法播放或下载。\n\
    13. 轻点左上角的**限制**按钮，返回选项列表。\n14. 最后，轻点**主屏幕**按钮以保存你的设置。\n\n## 限制 Game Center\n\n\
    Game Center 是享受社交游戏的绝佳方式，包括配对对战、挑战、排行榜等。然而，如果你是有小孩的家长，可能不希望他们在没有你监督的情况下玩多人游戏或接受好友请求。请按照以下步骤限制对\
    \ Game Center 的访问：\n\n1.  前往**限制**屏幕，操作方式如前一节所述。\n    ![images](img/p180-02.jpg)\n\
    2.  向下滚动到**Game Center**。\n3.  将**多人游戏**和/或**添加好友**选项切换为**关闭**。\n\n# 第 9 章\n\n\
    # 使用 iMessage\n\n*iMessage* 是苹果公司的新服务，它与手机上的短信和彩信功能完全相同，但通过 Wi-Fi 网络工作，并且仅与其他\
    \ iOS 5 设备（如 iPod touch、iPhone 和 iPad）互通。\n\niMessage 可以在你的 iPod touch 的**信息**应用中找到。在本章中，你将学习如何使用\
    \ iMessage 从**通讯录**应用发送文本信息，以及从**照片应用**发送图片信息。\n\n![images](img/p181-01.jpg)\n\
    \n## 启用 iMessage 并调整设置\n\n设置 iMessage 服务类似于设置**FaceTime**：\n\n1.  **启动设置。**\n\
    2.  轻点**信息。**\n3.  将**iMessage**切换为**开启**\n4.  然后可能会要求你输入 iMessage 密码——这实际上就是你的\
    \ Apple iTunes 密码。\n\n**提示：** 如果你像图中所示卡在**正在等待激活**信息上，请尝试按照第 25 章：故障排除中的方法重启你的设备。\n\
    \n一旦启用了 iMessage 选项，你的**电子邮件地址**将注册到 iMessage 服务中。\n\n![images](img/p182-01.jpg)\n\
    \n如果你在 iMessage 设置屏幕底部轻点**接收方式**，将会看到类似这样的屏幕。\n\n在此屏幕上，你可以调整与你的 iMessage 关联的电子邮件地址，并添加新的电子邮件地址。\n\
    \n![images](img/p182-02.jpg)\n\n### 编写信息\n\n编写 iMessage 很像在手机上发送电子邮件或短信。iMessage\
    \ 的妙处在于它可以到达任何 iOS 5 设备，并且回复起来非常简单。\n\n#### 从信息应用编写信息\n\n有几种方式可以启动你的**信息**应用。最简单的方法是直接轻点**主屏幕**上的**信息**图标。\n\
    \n当你首次启动**信息**应用时，很可能没有任何信息，因此屏幕是空白的。一旦你开始使用 iMessage，你将看到信息列表以及与联系人当前的“打开”讨论。请按照以下步骤发送信息：\n\
    \n![images](img/p183-01.jpg)\n\n1.  触摸屏幕右上角的**编写**图标。\n2.  光标将立即跳转到**收件人：** 行。你可以开始输入联系人的姓名，或者直接轻点**加号**（**+**）按钮，搜索或滚动浏览你的联系人。\n\
    3.  ![images](img/p183-02.jpg)\n4.  当你找到想要使用的联系人时，触摸该人的名字，它就会出现在**收件人：** 行中。\n\
    5.  准备好输入信息时，触摸屏幕中间方框内的任意位置（**发送**按钮旁边）。\n6.  键盘将会显示。输入你的信息，完成后触摸**发送**。\n\n**注意：**\
    \ 如果你在**设置** > **信息**中启用了字符计数器，则会显示。\n\n![images](img/p183-03.jpg)\n\n**提示：**\
    \ 如果你愿意，可以使用更大的横向键盘来发送信息。使用更大的按键打字会更方便，尤其是当你的手指较大或难以看清小按键时。\n\n#### 发送信息后的选项\n\
    \n发送信息后，窗口会变为你与联系人之间的*对话式*讨论窗口。你发送的信息显示在蓝色气泡中。当你的联系人回复时，他的信息会显示在屏幕另一侧的灰色气泡中。\n\
    \n要离开**编写**屏幕，请轻点左上角的**信息**，或单击**主屏幕**按钮返回你的**主屏幕**。\n\n![images](img/p184-01.jpg)\n\
    \n**注意：** 如果信息发送失败，你会看到它旁边有一个感叹号。你还会在**信息**应用图标的右上角看到一个**红色感叹号**图标。\n\n![images](img/p184-02.jpg)\n\
    \n如果发生这种情况，你可以像之前一样再次发送信息。\n\n#### 从通讯录编写信息\n\n你也可以向 iPod touch 中的任何联系人发送信息。请按照以下步骤操作：\n\
    \n1.  通过搜索或滚动浏览**通讯录**，找到你想要发送信息的联系人。\n2.  在联系人信息的底部，你会看到一个标有**发送信息**的方框。只需触摸该方框，系统会提示你选择要使用的号码或电子邮件地址（如果你为该联系人列出了多个号码或电子邮件地址）。\n\
    3.  选择首选的号码或电子邮件地址，然后按照前面列出的步骤操作。\n\n![images](img/p185-01.jpg)\n\n**注意：** 请记住，你只能向与使用\
    \ iOS 5 设备的 Apple ID 关联的电子邮件地址发送 iMessage。\n"
- fmt: "### Replying to a Message\n\nWhen a message is received, your iPod touch will\
    \ play an indicator tone, vibrate, or both—depending on your settings. Also, an\
    \ indicator will appear in `Notification Center` at the top of the screen, giving\
    \ you the option of replying right away.\n\n![images](images/p185-02.jpg)\n\n\
    When you see and/or hear the indicator, just tap the notification to go to the\
    \ `Messages` app and type your response, as shown previously.\n\nIf you miss the\
    \ notification or want to reply later, just pull down the `Notification Center`\
    \ list from the top, and then tap the message you want to reply to.\n\n![images](images/p185-03.jpg)\n\
    \n**NOTE:** If your screen is locked, you will see the message as either a popup\
    \ or as part of the `Lock` screen list. Just slide the `Messages` icon to unlock\
    \ and you'll be taken to the message.\n\n![images](images/p186-01.jpg)\n\n###\
    \ Viewing Stored Messages\n\nOnce you begin a few threaded messages, they will\
    \ be stored in the `Messages` app. Touch the `Messages` icon and you can scroll\
    \ through your message threads.\n\n![images](images/p186-02.jpg)\n\nTo continue\
    \ a conversation with someone, just touch the desired thread and it will open\
    \ up, showing you the back and forth of all past messages. Touch the text box,\
    \ type in your message, and then touch the `Send` button to continue the conversation.\n\
    \n![images](images/p186-03.jpg)\n\n### Message Tone and Sound Options\n\nYour\
    \ iPod touch lets you dictate how it will react when a message comes in. Follow\
    \ these steps to choose your preferred reaction:\n\n1.  Start your `Settings`\
    \ app, scroll to `Sounds`, and tap the `Sounds` tab.\n2.  If you have the `Vibrate`\
    \ feature set to `ON` in the `Sounds` menu, you will also receive a vibration\
    \ when a message comes in.\n\n    ![images](images/p187-01.jpg)\n\n3.  Scroll\
    \ down a bit further and you will see a tab that says `Text Tone`. Tap this and\
    \ you can choose the tone for the SMS message. You are limited to the choices\
    \ offered (usually six), or you can choose `None`.\n4.  Choose your preferred\
    \ sound for an SMS message notification and then touch the `Sounds` ![images](images/p187-02.jpg)\
    \ button in the top-left corner to set your selection.\n\n![images](images/p187-03.jpg)\n\
    \n## Multimedia iMessaging\n\nThe `Messages` app gives iPod touch users the tools\
    \ required to send and receive MMS-like messages—including picture messages and\
    \ video messages. These messages appear right in the messaging window, just like\
    \ your text iMessages.\n\n**NOTE:** You can send image, video, location (from\
    \ maps), audio (from the `Voice Memo` app), and vCard (from the `Contacts` app)\
    \ files from the `Messages` app.\n\n### Sending a Picture or Video with Messages\n\
    \nTo send a picture or video with your message, follow these steps:\n\n1.  Tap\
    \ the `Messages` icon to start messaging.\n\n    ![images](images/p188-01.jpg)\n\
    \n2.  You will notice that next to the text input bubble is a small `Camera` icon.\
    \ Tap this icon and you will be prompted to `Take a Photo or Video` or `Choose\
    \ Existing`.\n\n    ![images](images/p189-01.jpg)\n\n3.  To take a photo, follow\
    \ the instructions in [Chapter 19](#Chapter19.html#ch19): “Working with Photos.”\
    \ If you select the `Choose Existing` option, just navigate through your pictures/videos\
    \ and find the item you would like to add to your message.\n\n    ![images](images/p189-02.jpg)\n\
    \n4.  Touch the blue `Choose` button in the lower-right corner and you will see\
    \ the picture load into the small window.\n\n    ![images](images/p189-03.jpg)\n\
    \n5.  Select a recipient (as shown earlier) and type in a short note if you like.\
    \ Next, touch the blue `Send` button.\n\n![images](images/p190-01.jpg)\n\nIf you\
    \ already have a threaded discussion with that particular contact, then his picture\
    \ will show up in the midst of that threaded discussion.\n\n**NOTE:** You can\
    \ continue to exchange images and text in the midst of a threaded discussion.\
    \ And you can always scroll through to see the entire discussion—pictures and\
    \ all!\n\n![images](images/p190-02.jpg)\n\n### Choosing a Picture or Video from\
    \ Photos to Send via Messages\n\nThe second way to send a picture or video message\
    \ is to just go straight to your `Photos` app and choose a picture. Follow these\
    \ steps to do so:\n\n1.  Start your `Photos` app and navigate through your pictures\
    \ and videos as described in [Chapter 19](#Chapter19.html#ch19): “Working with\
    \ Photos.”\n2.  To send just one picture or video, touch the picture or video\
    \ you wish to send and then touch the `Send` icon in the lower-left corner.\n\n\
    \    ![images](images/p191-01.jpg)\n\n3.  You will now see `Message` as the second\
    \ option. Choose `Message` and the photo will load into the bubble, just as it\
    \ did previously in the `Messages` app.\n\n### Sending Multiple Pictures\n\nFollow\
    \ these steps to send multiple pictures:\n\n1.  Start the `Photos` app, as you\
    \ did in the previous section.\n2.  Instead of tapping one picture, tap the `Action`\
    \ button in the lower-left corner.\n3.  Now, just tap up to 10 pictures. You will\
    \ see them lighten in color, and a `Checkmark` icon will appear in the box.\n\
    4.  Once you have chosen up to 10 pictures, tap the `Share` button in the lower-left\
    \ corner.\n5.  Choose `Message` and the pictures will appear in the message bubble.\n\
    \n![images](images/p182-01.jpg)\n\n# Chapter 10\n\n## Video Messaging and Skype\n\
    \nYour iPod touch brings many new capabilities to your life, some of which seemed\
    \ like science fiction just a few years ago. For example, video calling is now\
    \ not only possible, but extremely easy to use with the new `FaceTime` feature.\
    \ As long as you and your caller are on an iPod touch and you're both on a Wi-Fi\
    \ network, you can have unlimited video calls. In this chapter, we will show you\
    \ how to enable and use `FaceTime`, as well as how to start having fun with this\
    \ great new feature.\n\nMaking calls over Wi-Fi is also possible with `Skype`,\
    \ the popular video calling and chat program that many of us use on our computers.\
    \ We will also show you how to use the `Skype` app.\n\nSpeaking of video, your\
    \ iPod touch is a very capable video recorder. You can record and export HD video\
    \ up to 720p. You can then publish that video straight to YouTube or iCloud, or\
    \ even send it to an email recipient. We will also show you how to shoot and quickly\
    \ “trim” your videos, as well as upload them.\n\n### Video Calling\n\nFor many\
    \ years, we have watched TV episodes and movies debut future technology like this.\
    \ For example, many of these episodes and movies show people talking on small,\
    \ portable phones and having video conversations. Even *The Jetsons* cartoon in\
    \ the 1970s had this as a future concept.\n\nThe iPod touch makes that future\
    \ thinking a reality today. There are a few apps that enable you to make video\
    \ calls on your iPod touch using the front-facing camera. At this time, only one\
    \ app allows you to use both the front-facing camera and the rear camera: `FaceTime`.\n\
    \n#### Connecting to a Bluetooth Headset or Car Stereo\n\nYou can also connect\
    \ to a Bluetooth headset or Bluetooth car stereo system to place and receive the\
    \ audio of `FaceTime` or other calling services such as `Skype`. We show you the\
    \ detailed steps in [Chapter 5](#Chapter05.html#ch5): “AirPlay and Bluetooth.”"
  raw: "#### Replying to a Message\n\nWhen a message is received, your iPod touch\
    \ will play an indicator tone, vibrate, or both—depending on your settings. Also,\
    \ an indicator will appear in **Notification Center** at the top of the screen,\
    \ giving you the option of replying right away.\n\n![images](images/p185-02.jpg)\n\
    \nWhen you see and/or hear the indicator, just tap the notification to go to the\
    \ **Messages** app and type your response, as shown previously.\n\nIf you miss\
    \ the notification or want to reply later, just pull down the **Notification Center**\
    \ list from the top, and then tap the message you want to reply to.\n\n![images](images/p185-03.jpg)\n\
    \n**NOTE:** If your screen is locked, you will see the message as either a popup\
    \ or as part of the **Lock** screen list. Just slide the **Messages** icon to\
    \ unlock and you'll be taken to the message.\n\n![images](images/p186-01.jpg)\n\
    \n#### Viewing Stored Messages\n\nOnce you begin a few threaded messages, they\
    \ will be stored in the **Messages** app. Touch the **Messages** icon and you\
    \ can scroll through your message threads.\n\n![images](images/p186-02.jpg)\n\n\
    To continue a conversation with someone, just touch the desired thread and it\
    \ will open up, showing you the back and forth of all past messages. Touch the\
    \ text box, type in your message, and then touch the **Send** button to continue\
    \ the conversation.\n\n![images](images/p186-03.jpg)\n\n#### Message Tone and\
    \ Sound Options\n\nYour iPod touch lets you dictate how it will react when a message\
    \ comes in. Follow these steps to choose your preferred reaction:\n\n1.  Start\
    \ your **Settings** app, scroll to **Sounds**, and tap the **Sounds** tab.\n2.\
    \  If you have the **Vibrate** feature set to **ON** in the **Sounds** menu, you\
    \ will also receive a vibration when a message comes in.\n\n    ![images](images/p187-01.jpg)\n\
    \n3.  Scroll down a bit further and you will see a tab that says **Text Tone**.\
    \ Tap this and you can choose the tone for the SMS message. You are limited to\
    \ the choices offered (usually six), or you can choose **None**.\n4.  Choose your\
    \ preferred sound for an SMS message\n\nnotification and then touch the **Sounds**\
    \ ![images](images/p187-02.jpg) button in the top-left corner to set your selection.\n\
    \n![images](images/p187-03.jpg)\n\n### Multimedia iMessaging\n\nThe **Messages**\
    \ app gives iPod touch users the tools required to send and receive MMS-like messages—including\
    \ picture messages and video messages.. These messages appear right in the messaging\
    \ window, just like your text iMessages.\n\n**NOTE:** You can send image, video,\
    \ location (from maps), audio (from the **Voice Memo** app), and vCard (from the\
    \ **Contacts** app) files from the **Messages** app.\n\n#### Sending a Picture\
    \ or Video with Messages\n\nTo send a picture or video with your message, follow\
    \ these steps do so:\n\n1.  Tap the **Messages** icon to start messaging.\n\n\
    \    ![images](images/p188-01.jpg)\n\n2.  You will notice that next to the text\
    \ input bubble is a small **Camera** icon. Tap this icon and you will be prompted\
    \ to **Take a Photo or Video** or **Choose Existing.**\n\n    ![images](images/p189-01.jpg)\n\
    \n3.  To take a photo, follow the instructions in [Chapter 19](#Chapter19.html#ch19):\
    \ “Working with Photos.” If you select the **Choose Existing** option, just navigate\
    \ through your pictures/videos and find the item you would like to add to your\
    \ message\n\n    ![images](images/p189-02.jpg)\n\n4.  Touch the blue **Choose**\
    \ button in the lower-right corner and you will see the picture load into the\
    \ small window.\n\n    ![images](images/p189-03.jpg)\n\n5.  Select a recipient\
    \ (as shown earlier) and type in a short note if you like. Next, touch the blue\
    \ **Send** button.\n\n![images](images/p190-01.jpg)\n\nIf you already have a threaded\
    \ discussion with that particular contact, then his picture will show up in the\
    \ midst of that threaded discussion.\n\n**NOTE:** You can continue to exchange\
    \ images and text in the midst of a threaded discussion. And you can always scroll\
    \ through to see the entire discussion—pictures and all!\n\n![images](images/p190-02.jpg)\n\
    \n#### Choosing a Picture or Video from Photos to Send via Messages\n\nThe second\
    \ way to send a picture or video message is to just go straight to your **Photos**\
    \ app and choose a picture. Follow these steps to do so:\n\n1.  Start your **Photos**\
    \ app and navigate through your pictures and videos as described in [Chapter 19](#Chapter19.html#ch19):\
    \ “Working with Photos.”\n2.  To send just one picture or video, touch the picture\
    \ or video you wish to send and then touch the **Send** icon in the lower-left\
    \ corner.\n\n    ![images](images/p191-01.jpg)\n\n3.  You will now see **Message**\
    \ as the second option. Choose **Message** and the photo will load into the bubble,\
    \ just as it did previously in the **Messages** app.\n\n#### Sending Multiple\
    \ Pictures\n\nFollow these steps to send multiple pictures:\n\n1.  Start the **Photos**\
    \ app, as you did in the previous section.\n2.  Instead of tapping one picture,\
    \ tap the **Action** button in the lower-left corner.\n3.  Now, just tap up to\
    \ 10 pictures. You will see them lighten in color, and a **Checkmark** icon will\
    \ appear in the box.\n4.  Once you have chosen up to 10 pictures, tap the **Share**\
    \ button in the lower-left corner.\n5.  Choose **Message** and the pictures will\
    \ appear in the message bubble.\n\n![images](images/p182-01.jpg)\n\n## Chapter\
    \ 10\n\n## Video Messaging and Skype\n\nYour iPod touch brings many new capabilities\
    \ to your life, some of which seemed like science fiction just a few years ago.\
    \ For example, video calling is now not only possible, but extremely easy to use\
    \ with the new **FaceTime** feature. As long as you and your caller are on an\
    \ iPod touch and you're both on a Wi-Fi network, you can have unlimited video\
    \ calls. In this chapter, we will show you how to enable and use **FaceTime**,\
    \ as well as how to start having fun with this great new feature.\n\nMaking calls\
    \ over Wi-Fi is also possible with **Skype**, the popular video calling and chat\
    \ program that many of us use on our computers. We will also show you how to use\
    \ the **Skype** app.\n\nSpeaking of video, your iPod touch is a very capable video\
    \ recorder. You can record and export HD video up to 720p. You can then publish\
    \ that video straight to YouTube or iCloud, or even send it to an email recipient.\
    \ We will also show you how to shoot and quickly “trim” your videos, as well as\
    \ upload them.\n\n### Video Calling\n\nFor many years, we have watched TV episodes\
    \ and movies debut future technology like this. For example, many of these episodes\
    \ and movies show people talking on small, portable phones and having video conversations.\
    \ Even *The Jetsons* cartoon in the 1970s had this as a future concept.\n\nThe\
    \ iPod touch makes that future thinking a reality today. There are a few apps\
    \ that enable you to make video calls on your iPod touch using the front-facing\
    \ camera. At this time, only one app allows you to use both the front-facing camera\
    \ and the rear camera: **FaceTime**.\n\n#### Connecting to a Bluetooth Headset\
    \ or Car Stereo\n\nYou can also connect to a Bluetooth headset or Bluetooth car\
    \ stereo system to place and receive the audio of **FaceTime** or other calling\
    \ services such as **Skype**. We show you the detailed steps in [Chapter 5](#Chapter05.html#ch5):\
    \ “AirPlay and Bluetooth.”"
  trans: "\n### 回复信息\n\n当收到信息时，你的 iPod touch 会播放提示音、震动或两者同时进行——具体取决于你的设置。同时，屏幕顶部的`通知中心`会出现一个指示器，让你可以选择立即回复。\n\
    \n![images](img/p185-02.jpg)\n\n当你看到和/或听到指示器时，只需轻点通知即可进入`信息`应用并输入你的回复，如之前所示。\n\
    \n如果你错过了通知或想稍后回复，只需从顶部向下拉出`通知中心`列表，然后轻点你想要回复的信息。\n\n![images](img/p185-03.jpg)\n\
    \n**注意：** 如果你的屏幕已锁定，你会看到信息以弹出窗口形式或作为`锁定`屏幕列表的一部分显示。只需滑动`信息`图标即可解锁，你会被带到该信息处。\n\
    \n![images](img/p186-01.jpg)\n\n### 查看存储的信息\n\n一旦你开始了一些对话信息，它们将被存储在`信息`应用中。触摸`信息`图标，你就可以滚动浏览你的信息对话列表。\n\
    \n![images](img/p186-02.jpg)\n\n要继续与某人对话，只需触摸所需的对话线程，它就会打开，显示你与对方所有过往的往返信息。触摸文本框，输入你的信息，然后触摸`发送`按钮以继续对话。\n\
    \n![images](img/p186-03.jpg)\n\n### 信息铃声和声音选项\n\n你的 iPod touch 允许你设定收到信息时的反应方式。按照以下步骤选择你偏好的反应：\n\
    \n1.  启动你的`设置`应用，滚动到`声音`，然后轻点`声音`标签。\n2.  如果你在`声音`菜单中将`震动`功能设为`开启`，那么当信息到来时，你也会收到震动。\n\
    \n    ![images](img/p187-01.jpg)\n\n3.  再向下滚动一点，你会看到一个写着`短信铃声`的标签。轻点此处，你可以选择短信的铃声。你的选择限于提供的选项（通常有六个），或者你可以选择`无`。\n\
    4.  选择你偏好的短信通知声音，然后触摸左上角的`声音` ![images](img/p187-02.jpg) 按钮以确认你的选择。\n\n![images](img/p187-03.jpg)\n\
    \n## 多媒体 iMessage 信息\n\n`信息`应用为 iPod touch 用户提供了发送和接收类似彩信的信息所需的工具——包括图片信息和视频信息。这些信息直接显示在信息窗口内，就像你的文本\
    \ iMessage 信息一样。\n\n**注意：** 你可以从`信息`应用发送图片、视频、位置（来自地图）、音频（来自`语音备忘录`应用）和 vCard（来自`通讯录`应用）文件。\n\
    \n### 通过信息发送图片或视频\n\n要通过信息发送图片或视频，请按以下步骤操作：\n\n1.  轻点`信息`图标开始发送信息。\n\n    ![images](img/p188-01.jpg)\n\
    \n2.  你会注意到在文本输入气泡旁边有一个小的`相机`图标。轻点此图标，系统会提示你`拍照或录像`或`选取现有`。\n\n    ![images](img/p189-01.jpg)\n\
    \n3.  要拍照，请遵循第 19 章：“使用照片”中的说明。如果你选择了`选取现有`选项，只需浏览你的照片/视频，找到想要添加到信息中的项目。\n\n \
    \   ![images](img/p189-02.jpg)\n\n4.  触摸右下角的蓝色`选取`按钮，你会看到图片加载到小窗口中。\n\n    ![images](img/p189-03.jpg)\n\
    \n5.  选择收件人（如前所示），如果需要，可以输入一段短消息。接下来，触摸蓝色的`发送`按钮。\n\n![images](img/p190-01.jpg)\n\
    \n如果你已经与该特定联系人有一个对话线程，那么他的图片将显示在该对话线程中。\n\n**注意：** 你可以在对话线程中继续交换图片和文本。而且你随时可以滚动浏览以查看整个对话——包括所有图片！\n\
    \n![images](img/p190-02.jpg)\n\n### 从照片中选择图片或视频通过信息发送\n\n发送图片或视频信息的第二种方法是直接进入你的`照片`应用并选择一张图片。请按以下步骤操作：\n\
    \n1.  启动你的`照片`应用，并按照第 19 章：“使用照片”中的描述浏览你的照片和视频。\n2.  要只发送一张图片或一个视频，触摸你想要发送的图片或视频，然后触摸左下角的`发送`图标。\n\
    \n    ![images](img/p191-01.jpg)\n\n3.  你现在会看到`信息`作为第二个选项。选择`信息`，照片将会加载到气泡中，就像之前在`信息`应用中一样。\n\
    \n### 发送多张图片\n\n请按以下步骤发送多张图片：\n\n1.  启动`照片`应用，就像你在上一节中所做的那样。\n2.  不要轻点单张图片，而是轻点左下角的`操作`按钮。\n\
    3.  现在，轻点最多 10 张图片。你会看到它们的颜色变亮，并且一个`勾选标记`图标会出现在方框中。\n4.  选取最多 10 张图片后，轻点左下角的`共享`按钮。\n\
    5.  选择`信息`，这些图片将出现在信息气泡中。\n\n![images](img/p182-01.jpg)\n\n# 第 10 章\n\n## 视频信息和\
    \ Skype\n\n你的 iPod touch 为你的生活带来了许多新功能，其中一些在几年前还像是科幻小说。例如，视频通话现在不仅成为可能，而且通过新的`FaceTime`功能使用起来极其简单。只要你和通话方都使用\
    \ iPod touch 并连接在同一个 Wi-Fi 网络上，你们就可以进行不限次数的视频通话。在本章中，我们将向你展示如何启用和使用`FaceTime`，以及如何开始享受这个优秀新功能的乐趣。\n\
    \n通过 Wi-Fi 拨打电话也可以通过`Skype`实现，这是许多人都在电脑上使用的一款流行的视频通话和聊天程序。我们还将向你展示如何使用`Skype`应用。\n\
    \n说到视频，你的 iPod touch 是一个功能非常强大的摄像机。你可以录制并导出高达 720p 的高清视频。然后，你可以将该视频直接发布到 YouTube\
    \ 或 iCloud，甚至可以通过电子邮件发送给收件人。我们还将向你展示如何拍摄和快速“修剪”视频，以及如何上传视频。\n\n### 视频通话\n\n多年来，我们一直在电视节目和电影中看到这种未来技术的首次亮相。例如，许多这些节目和电影展示了人们使用小巧便携的电话进行对话并进行视频通话。甚至\
    \ 20 世纪 70 年代的卡通片《杰森一家》也将其作为一个未来概念。\n\niPod touch 将那种未来构想变成了今天的现实。有几个应用可以让你在 iPod\
    \ touch 上使用前置摄像头进行视频通话。目前，只有一个应用允许你同时使用前置摄像头和后置摄像头：`FaceTime`。\n\n#### 连接到蓝牙耳机或汽车立体声音响\n\
    \n你还可以连接到蓝牙耳机或蓝牙汽车立体声音响系统，以拨打和接听`FaceTime`或其他通话服务（如`Skype`）的音频。我们在第 5 章：“AirPlay\
    \ 和蓝牙”中向你展示了详细步骤。\n"
- fmt: "# Video Calling with FaceTime\n\n`FaceTime` is the proprietary app highlighted\
    \ in many Apple commercials for the iPod touch. Essentially, `FaceTime` is free-over-Wi-Fi\
    \ calling that allows you to see the caller on the other end of the conversation\
    \ through the iPod touch's front-facing camera.\n\n**NOTE:** For now `FaceTime`\
    \ is only available for video calls between recent iOS devices like the iPod touch\
    \ 4, iPod touch 4S, iPad 2, and iPod touch 4 as well as Mac computers.\n\n## Enabling\
    \ FaceTime Calling and Adding Emails\n\nWhen you first use your device, `FaceTime`\
    \ may not yet be enabled. To enable the iPod touch to receive and make `FaceTime`\
    \ calls, follow these steps:\n\n1. Start your `Settings` app.\n2. Tap `FaceTime`.\n\
    3. Toggle the `FaceTime` switch to the `ON` position.\n\nYou may be asked to sign\
    \ in with your Apple ID.\n\nYour default email address associated with your Apple\
    \ ID will also be the email address that people can call you on using FaceTime\
    \ from their other iOS devices.\n\n![images](images/p194-01.jpg)\n\nYou can also\
    \ add a new email address to be used with FaceTime by tapping `Add Another Email`.\
    \ Type your new email address then you will receive a verification email from\
    \ Apple asking you to click a link to associate the new email address with `FaceTime`\
    \ (and your Apple ID) before you can use this email with `FaceTime`.\n\nOnce the\
    \ new email address is verified, you will see the tag change from `Verifying`\
    \ to `Email`.\n\n![images](images/p195-01.jpg)\n\n## Caller ID\n\nOnce you add\
    \ a new email address, a `Caller ID` tab will appear below the email addresses\
    \ on this same screen. Tap `Caller ID` to choose which email address to show people\
    \ when you call them with `FaceTime`.\n\n![images](images/p195-02.jpg)\n\n## Different\
    \ FaceTime Views\n\nAlong the bottom of the FaceTime app, you will see three icons\
    \ along the bottom of your `FaceTime` screen for `Favorites`, `Recents`, `Contacts`\
    \ as shown in [Figure 10–1](#Chapter10.html#fig_10_1).\n\n![images](images/1001.jpg)\n\
    \n**Figure 10–1.** *Use soft keys to see different `FaceTime` screens (Favorites,\
    \ Recents and Contacts)*\n\n## Using Favorites\n\nYour `Favorites` are people\
    \ you call with `FaceTime` frequently. You can think of `Favorites` as your speed\
    \ dial list.\n\n### Adding New Favorites\n\nIt is easy to add new favorites to\
    \ your list from your `Contacts` list. Follow these steps to do so:\n\n**TIP:**\
    \ You can also add a `Favorite` from your `Recents` screen in FaceTime. In `Recents`,\
    \ tap the blue `Arrow icon` ![images](images/p196-01.jpg) and, on the next screen,\
    \ scroll to the bottom of the `Info` page and tap `Add to Favorites`.\n\n4. Tap\
    \ the `FaceTime` icon to start it up.\n5. Touch the `Favorites` icon in the bottom\
    \ row of soft keys.\n6. The first time you start your `Favorites`, you will see\
    \ a blank screen.\n\n![images](images/p197-01.jpg)\n\n7. Tap the `Plus` button\
    \ ![images](images/p197-02.jpg) in the upper-right corner to add a new entry.\
    \ Your contact directory will open.\n8. Swipe up or down to locate a contact.\
    \ Tap any contact to select it.\n\n![images](images/p197-03.jpg)\n\n**TIP:** To\
    \ search for your contacts by name, tap the very top of the screen just under\
    \ the time. This will bring up the `Search` window, where you can type a few letters\
    \ to find people. Remember that you can view different contact groups by tapping\
    \ the `Groups` button in the upper-left corner.\n\n9. If an entry has more than\
    \ one phone number or email address, you will need to select one of them as your\
    \ favorite entry.\n10. After tapping an email address or phone number for the\
    \ contact, you are returned to your list of `Favorites`, where you'll see the\
    \ new person you just added.\n\n![images](images/p198-01.jpg)\n\n### Organizing\
    \ Your Favorites\n\nAs with other lists on your iPod touch, you can re-order your\
    \ `Favorites` list and remove entries.\n\n1. View your `Favorites` list as you\
    \ did previously.\n2. Tap the `Edit` button in the upper-left corner.\n3. To re-order\
    \ the entries, touch and drag the right edge with the three gray bars up or down\
    \ the list.\n\n    ![images](images/p198-02.jpg)\n\n4. To delete an entry, tap\
    \ the red `Circle` icon to the left of the entry to make it turn vertical.\n5.\
    \ Tap the `Delete` button.\n6. When you are done re-ordering and deleting entries,\
    \ tap the `Done` button in the upper-left corner.\n\n![images](images/p199-01.jpg)\n\
    \n## Using Recents\n\nUsing your `Recents` is similar to looking at your call\
    \ log on your mobile phone.\n\nWhen you touch the `Recents` icon, a list of all\
    \ your recent `FaceTime` calls will be displayed. You can touch the `All` or `Missed`\
    \ button at the top to narrow down the list (see [Figure 10–2](#Chapter10.html#fig_10_2)).\n\
    \n![images](images/p199-02.jpg)\n\n![images](images/1002.jpg)\n\n**Figure 10–2.**\
    \ *Working with your `Recents` screen*\n\n### Placing a Call from Recents\n\n\
    It's easy to place a call from your `Recents` screen; simply touch the desired\
    \ name or phone number, and your iPhone will immediately initiate a phone call\
    \ to the individual.\n\n### Clearing All Recents\n\nTo clear or erase all your\
    \ recent call log entries, press the `Edit` button in the top corner, then press\
    \ the `Clear` button in the upper-right corner.\n\n### Details of a FaceTime Call\
    \ or Contact Information\n\nTouch the blue `Arrow` icon ![images](images/p200-01.jpg)\
    \ next to the name in the `Recents` list, and you will see either the information\
    \ on the phone number or full contact information for that particular contact\
    \ if he is in your `Contacts` list. If there are several calls, you will see the\
    \ history of each call.\n\n![images](images/p200-02.jpg)\n\nScroll down to the\
    \ bottom of the contact's `Info` screen to see more options. You can send a `Message`\
    \ or `Share Contact` by sending the contact information via email or iMessage.\n\
    \nTap `Add to Favorites` to add this person to your `Favorites` list.\n\n![images](images/p201-01.jpg)\n\
    \n### Adding a FaceTime Number or Email to Contacts from Recents\n\nIf the `Recents`\
    \ entry is a FaceTime number or email that is not for someone who is in your `Contacts`\
    \ list, then you will see two different buttons on the `Info` screen: `Create\
    \ New Contact` and `Add to Existing Contact`.\n\n![images](images/p201-02.jpg)\n\
    \nTap `Create New Contact` to create a new contact from this phone number.\n\n\
    Tap `Add to Existing Contact` to add this phone number to one of your existing\
    \ contacts.\n\n## Placing Calls from Contacts\n\nOne of the great things about\
    \ having all your contact information in your iPod touch is that it's very easy\
    \ to place `FaceTime` calls from your `Contacts` list. Follow these steps to do\
    \ so:\n\n1. Tap the `FaceTime` icon to start it up (see [Figure 10–3](#Chapter10.html#fig_10_3)).\n\
    2. Touch the `Contacts` icon in the bottom row of soft keys.\n3. Locate a contact\
    \ to call using one of the following methods:\n   a. Swipe up or down through\
    \ the list.\n   b. Put your finger on the letters along the right side of the\
    \ screen and scroll up or down.\n   c. Tap the status bar on top where it says\
    \ the time to jump to the top. Tap in the `Search` window and type a few letters\
    \ of the contact's first, last, or company name to search for him.\n4. When you\
    \ find the contact entry you want, tap their name.\n5. Touch the phone number\
    \ or email address you wish to call using `FaceTime`.\n\n![images](images/1003.jpg)\n\
    \n**Figure 10–3.** *Placing calls from your `Contacts` list*"
  raw: "#### Video Calling with FaceTime\n\n**FaceTime** is the proprietary app highlighted\
    \ in many Apple commercials for the iPod touch. Essentially, **FaceTime** is free-over-Wi-Fi\
    \ calling that allows you to see the caller on the other end of the conversation\
    \ through the iPod touch's front-facing camera.\n\n**NOTE:** For now **FaceTime**\
    \ is only available for video calls between recent iOS devices like the iPod touch\
    \ 4, iPod touch 4S, iPad 2, and iPod touch 4 as well as Mac computers.\n\n#####\
    \ Enabling FaceTime Calling and Adding Emails\n\nWhen you first use your device,\
    \ **FaceTime** may not yet be enabled. To enable the iPod touch to receive and\
    \ make **FaceTime** calls, follow these steps:\n\n1.  Start your **Settings**\
    \ app.\n2.  Tap **FaceTime**.\n3.  Toggle the **FaceTime** switch to the **ON**\
    \ position.\n\nYou may be asked to sign in with your Apple ID.\n\nYour default\
    \ email address associated with your Apple ID will also be the email address that\
    \ people can call you on using FaceTime from their other iOS devices.\n\n![images](images/p194-01.jpg)\n\
    \nYou can also add a new email address to be used with FaceTime by tapping **Add\
    \ Another Email**. Type your new email address then you will receive a verification\
    \ email from Apple asking you to click a link to associate the new email address\
    \ with **FaceTime** (and your Apple ID) before you can use this email with **FaceTime.**\n\
    \nOnce the new email address is verified, you will see the tag change from **Verifying**\
    \ to **Email**.\n\n![images](images/p195-01.jpg)\n\n#### Caller ID\n\nOnce you\
    \ add a new email address, a **Caller ID** tab will appear below the email addresses\
    \ on this same screen. Tap **Caller ID** to choose which email address to show\
    \ people when you call them with **FaceTime**.\n\n![images](images/p195-02.jpg)\n\
    \n#### Different FaceTime Views\n\nAlong the bottom of the FaceTime app, you will\
    \ see three icons along the bottom of your **FaceTime** screen for **Favorites**,\
    \ **Recents**, **Contacts** as shown in [Figure 10–1](#Chapter10.html#fig_10_1).\n\
    \n![images](images/1001.jpg)\n\n**Figure 10–1.** *Use soft keys to see different\
    \ **FaceTime** screens (Favorites, Recents and Contacts)*\n\n#### Using Favorites\n\
    \nYour **Favorites** are people you callwith **FaceTime** frequently. You can\
    \ think of **Favorites** as your speed dial list.\n\n##### Adding New Favorites\n\
    \nIt is easy to add new favorites to your list from your **Contacts** list. Follow\
    \ these steps to do so:\n\n**TIP:** You can also add a **Favorite** from your\
    \ **Recents** screen in FaceTime. In **Recents**, tap the blue **Arrow icon**\
    \ ![images](images/p196-01.jpg) and, on the next screen, scroll to the bottom\
    \ of the **Info** page and tap **Add to Favorites.**\n\n4\\. Tap the **FaceTime**\
    \ icon to start it up.\n\n5\\. Touch the **Favorites** icon in the bottom row\
    \ of soft keys.\n\n6\\. The first time you start your **Favorites**, you will\
    \ see a blank screen.\n\n![images](images/p197-01.jpg)\n\n7\\. Tap the **Plus**\
    \ button ![images](images/p197-02.jpg) in the upper-right corner to add a new\
    \ entry. Your contact directory will open.\n\n8\\. Swipe up or down to locate\
    \ a contact. Tap any contact to select it.\n\n![images](images/p197-03.jpg)\n\n\
    **TIP:** To search for your contacts by name, tap the very top of the screen just\
    \ under the time. This will bring up the **Search** window, where you can type\
    \ a few letters to find people. Remember that you can view different contact groups\
    \ by tapping the **Groups** button in the upper-left corner.\n\n9\\. If an entry\
    \ has more than one phone number or email address, you will need to select one\
    \ of them as your favorite entry.\n\n10\\. After tapping an email address or phone\
    \ number for the contact, You are returned to your list of **Favorites**, where\
    \ you'll see the new person you just added.\n\n![images](images/p198-01.jpg)\n\
    \n##### Organizing Your Favorites\n\nAs with other lists on your iPod touch, you\
    \ can re-order your **Favorites** list and remove entries.\n\n1.  View your **Favorites**\
    \ list as you did previously.\n2.  Tap the **Edit** button in the upper-left corner.\n\
    3.  To re-order the entries, touch and drag the right edge with the three gray\
    \ bars up or down the list.\n\n    ![images](images/p198-02.jpg)\n\n4.  To delete\
    \ an entry, tap the red **Circle** icon to the left of the entry to make it turn\
    \ vertical.\n5.  Tap the **Delete** button.\n6.  When you are done re-ordering\
    \ and deleting entries, tap the **Done** button in the upper-left corner.\n\n\
    ![images](images/p199-01.jpg)\n\n#### Using Recents\n\nUsing your **Recents**\
    \ is similar to looking at your call log on your mobile phone.\n\nWhen you touch\
    \ the **Recents** icon, a list of all your recent **FaceTime** calls will be displayed.\
    \ You can touch the **All** or **Missed** button at the top to narrow down the\
    \ list (see [Figure 10–2](#Chapter10.html#fig_10_2)).\n\n![images](images/p199-02.jpg)\n\
    \n![images](images/1002.jpg)\n\n**Figure 10–2.** *Working with your **Recents**\
    \ screen*\n\n##### Placing a Call from Recents\n\nIt's easy to place a call from\
    \ your **Recents** screen; simply touch the desired name or phone number, and\
    \ your iPhone will immediately initiate a phone call to the individual.\n\n#####\
    \ Clearing All Recents\n\nTo clear or erase all your recent call log entries,\
    \ press the **Edit** button in the top corner, then press the **Clear** button\
    \ in the upper-right corner.\n\n##### Details of a FaceTime Call or Contact Information\n\
    \nTouch the blue **Arrow** icon ![images](images/p200-01.jpg) next to the name\
    \ in the **Recents** list, and you will see either the information on the phone\
    \ number or full contact information for that particular contact if he is in your\
    \ **Contacts** list. If there are several calls, you will see the history of each\
    \ call.\n\n![images](images/p200-02.jpg)\n\nScroll down to the bottom of the contact's\
    \ **Info** screen to see more options. You can send a **Message** or **Share Contact**\
    \ by sending the contact information via email or iMessage.\n\nTap **Add to Favorites**\
    \ to add this person to your **Favorites** list.\n\n![images](images/p201-01.jpg)\n\
    \n##### Adding a FaceTimeNumber or Email to Contacts from Recents\n\nIf the **Recents**\
    \ entry is a FaceTime number or email that is not for someone who is in your **Contacts**\
    \ list, then you will see two different buttons on the **Info** screen: **Create\
    \ New Contact** and **Add to Existing Contact**.\n\n![images](images/p201-02.jpg)\n\
    \nTap **Create New Contact** to create a new contact from this phone number.\n\
    \nTap **Add to Existing Contact** to add this phone number to one of your existing\
    \ contacts.\n\n#### Placing Calls from Contacts\n\nOne of the great things about\
    \ having all your contact information in your iPod touch is that it's very easy\
    \ to place **FaceTime** calls from your **Contacts** list. Follow these steps\
    \ to do so:\n\n1.  Tap the **FaceTime** icon to start it up (see [Figure 10–3](#Chapter10.html#fig_10_3)).\n\
    2.  Touch the **Contacts** icon in the bottom row of soft keys.\n3.  Locate a\
    \ contact to call using one of the following methods:\n\n    a. Swipe up or down\
    \ through the list.\n\n    b. Put your finger on the letters along the right side\
    \ of the screen and scroll up or down.\n\n    c. Tap the status bar on top where\
    \ it says the time to jump to the top. Tap in the **Search** window and type a\
    \ few letters of the contact's first, last, or company name to search for him.\n\
    \n4.  When you find the contact entry you want, tap their name.\n5.  Touch the\
    \ phone number or email address you wish to call using **FaceTime**.\n\n![images](images/1003.jpg)\n\
    \n**Figure 10–3.** *Placing calls from your **Contacts** list*"
  trans: "\n# 使用 FaceTime 进行视频通话\n\n`FaceTime` 是苹果公司在许多 iPod touch 广告中主打的专属应用。本质上，`FaceTime`\
    \ 是一种通过 Wi-Fi 进行的免费通话，让你可以通过 iPod touch 的前置摄像头看到通话另一方的画面。\n\n**注意：** 目前 `FaceTime`\
    \ 仅适用于近期 iOS 设备之间的视频通话，例如 iPod touch 4、iPod touch 4S、iPad 2 和 iPod touch 4，以及\
    \ Mac 电脑。\n\n## 启用 FaceTime 通话并添加电子邮件\n\n当你第一次使用设备时，`FaceTime` 可能尚未启用。要启用 iPod\
    \ touch 以接收和拨打 `FaceTime` 通话，请按照以下步骤操作：\n\n1. 启动你的`设置`应用。\n2. 点按`FaceTime`。\n\
    3. 将`FaceTime`开关切换到`开启`位置。\n\n系统可能会要求你使用 Apple ID 登录。\n\n你与 Apple ID 关联的默认电子邮件地址，也将是其他人可以通过其\
    \ iOS 设备使用 FaceTime 联系你的电子邮件地址。\n\n![images](img/p194-01.jpg)\n\n你也可以通过点按`添加其他电子邮件`来添加一个新的电子邮件地址用于\
    \ FaceTime。输入你的新电子邮件地址，然后你将收到一封来自 Apple 的验证邮件，要求你点击一个链接，将该新电子邮件地址与`FaceTime`（及你的\
    \ Apple ID）关联，之后才能将此电子邮件用于`FaceTime`。\n\n新电子邮件地址验证通过后，你会看到标签从`正在验证`变为`电子邮件`。\n\
    \n![images](img/p195-01.jpg)\n\n## 来电显示\n\n添加新电子邮件地址后，在此屏幕的电子邮件地址下方会出现一个`来电显示`标签。点按`来电显示`，以选择当你用`FaceTime`拨打他人电话时，向对方显示的电子邮件地址。\n\
    \n![images](img/p195-02.jpg)\n\n## 不同的 FaceTime 视图\n\n在 FaceTime 应用底部，你会看到三个图标，分别对应`个人收藏`、`最近通话`、`通讯录`，如图\
    \ 10–1 所示。\n\n![images](img/1001.jpg)\n\n**图 10–1.** *使用软按键查看不同的 `FaceTime` 屏幕（个人收藏、最近通话和通讯录）*\n\
    \n## 使用个人收藏\n\n你的`个人收藏`是你经常使用`FaceTime`呼叫的人。你可以将`个人收藏`视为快速拨号列表。\n\n### 添加新的个人收藏\n\
    \n从你的`通讯录`列表中向个人收藏添加新条目非常简单。请按照以下步骤操作：\n\n**提示：** 你也可以在 FaceTime 的`最近通话`屏幕中添加`个人收藏`。在`最近通话`中，点按蓝色的`箭头图标`\
    \ ![images](img/p196-01.jpg)，然后在下一个屏幕上，向下滚动到`信息`页面底部，点按`添加到个人收藏`。\n\n4. 点按`FaceTime`图标启动它。\n\
    5. 触摸底部软按键行中的`个人收藏`图标。\n6. 首次启动`个人收藏`时，你会看到一个空白屏幕。\n\n![images](img/p197-01.jpg)\n\
    \n7. 点按右上角的`加号`按钮 ![images](img/p197-02.jpg) 以添加新条目。你的通讯录目录将打开。\n8. 上下滑动以定位联系人。点按任一联系人以选中它。\n\
    \n![images](img/p197-03.jpg)\n\n**提示：** 要按名称搜索你的联系人，请点按屏幕顶部时间下方。这将调出`搜索`窗口，你可以在此输入几个字母来查找联系人。请记住，你可以通过点按左上角的`群组`按钮来查看不同的联系人分组。\n\
    \n9. 如果某个条目有多个电话号码或电子邮件地址，你需要选择其中一个作为你的个人收藏条目。\n10. 点按联系人的电子邮件地址或电话号码后，你将返回到你的`个人收藏`列表，你会看到刚刚添加的新联系人。\n\
    \n![images](img/p198-01.jpg)\n\n### 整理你的个人收藏\n\n与 iPod touch 上的其他列表一样，你可以重新排列`个人收藏`列表的顺序并删除条目。\n\
    \n1. 像之前一样查看你的`个人收藏`列表。\n2. 点按左上角的`编辑`按钮。\n3. 要重新排列条目顺序，请触摸并拖动右侧带有三条灰色横线的边缘，在列表中上下移动。\n\
    \n    ![images](img/p198-02.jpg)\n\n4. 要删除某个条目，请点按该条目左侧的红色`圆圈`图标，使其变为竖直。\n5. 点按`删除`按钮。\n\
    6. 完成条目的重新排序和删除后，点按左上角的`完成`按钮。\n\n![images](img/p199-01.jpg)\n\n## 使用最近通话\n\n\
    使用`最近通话`类似于在手机上查看通话记录。\n\n当你触摸`最近通话`图标时，会显示所有最近的`FaceTime`通话列表。你可以点按顶部的`全部`或`未接来电`按钮来缩小列表范围（见图\
    \ 10–2）。\n\n![images](img/p199-02.jpg)\n\n![images](img/1002.jpg)\n\n**图 10–2.**\
    \ *使用`最近通话`屏幕*\n\n### 从最近通话拨打电话\n\n从`最近通话`屏幕拨打电话很容易；只需触摸所需的姓名或电话号码，你的 iPhone 会立即向该联系人发起通话。\n\
    \n### 清除所有最近通话\n\n要清除或删除所有最近通话记录条目，请点按顶角的`编辑`按钮，然后点按右上角的`清除`按钮。\n\n### FaceTime\
    \ 通话详情或联系人信息\n\n触摸`最近通话`列表中姓名旁边的蓝色`箭头`图标 ![images](img/p200-01.jpg)，你将看到该电话号码的信息，或者如果该联系人存在于你的`通讯录`列表中，你将看到其完整联系信息。如果有多次通话记录，你还会看到每次通话的历史。\n\
    \n![images](img/p200-02.jpg)\n\n向下滚动到联系人`信息`屏幕底部以查看更多选项。你可以通过电子邮件或 iMessage 发送联系信息，来发送`信息`或`共享联系人`。\n\
    \n点按`添加到个人收藏`，将此联系人添加到你的`个人收藏`列表。\n\n![images](img/p201-01.jpg)\n\n### 从最近通话将\
    \ FaceTime 号码或电子邮件添加到通讯录\n\n如果`最近通话`条目是一个 FaceTime 号码或电子邮件，但该联系人不在你的`通讯录`列表中，那么你将在`信息`屏幕上看到两个不同的按钮：`创建新联系人`和`添加到现有联系人`。\n\
    \n![images](img/p201-02.jpg)\n\n点按`创建新联系人`，以从此电话号码创建新的联系人。\n\n点按`添加到现有联系人`，以将此电话号码添加到你的某个现有联系人中。\n\
    \n## 从通讯录拨打电话\n\n将所有联系信息存储在 iPod touch 中的一大好处是，从`通讯录`列表中拨打`FaceTime`通话非常方便。请按照以下步骤操作：\n\
    \n1. 点按`FaceTime`图标启动它（见图 10–3）。\n2. 触摸底部软按键行中的`通讯录`图标。\n3. 使用以下方法之一查找要呼叫的联系人：\n\
    \   a. 在列表中上下滑动。\n   b. 将手指放在屏幕右侧的字母索引上，上下滚动。\n   c. 点按顶部显示时间的状态栏以跳转到列表顶部。在`搜索`窗口中点按，然后输入联系人姓氏、名字或公司名称的几个字母进行搜索。\n\
    4. 找到你想要的联系人条目后，点按其姓名。\n5. 触摸你想要通过`FaceTime`呼叫的电话号码或电子邮件地址。\n\n![images](img/1003.jpg)\n\
    \n**图 10–3.** *从`通讯录`列表拨打电话*\n"
- fmt: "#### Accepting a FaceTime Call\n\nWhen someone calls you using FaceTime, you\
    \ will see a screen similar to shown in [Figure 10–4](#Chapter10.html#fig_10_4).\
    \ To accept the call tap `Accept`, to reject the call tap `Decline`.\n\n![images](images/1004.jpg)\n\
    \n**Figure 10–4.** *Accepting a FaceTime call*\n\nOnce a FaceTime call is initiated,\
    \ follow these steps to conduct a video conference:\n\n1. Hold the iPod touch\
    \ away from you a bit.\n2. Make sure you are *framed* properly in the window.\n\
    3. You can move the small image of yourself around the screen to a convenient\
    \ spot.\n4. Touch the `Switch Camera` button to show the FaceTime caller you are\
    \ looking at. The `Switch Camera` button will now use the standard camera on the\
    \ back of the iPod touch. In [Figure 10–5](#Chapter10.html#fig_10_5), I get to\
    \ see the beautiful vistas of Colorado from Martin's vacation, and he gets to\
    \ see my dog on the couch!\n5. Touch the `End` button to end the FaceTime call.\n\
    6. Touch the `Mute` button to temporarily mute the call.\n\n![images](images/1005.jpg)\n\
    \n**Figure 10–5.** *Switching camera views on a FaceTime call*\n\n### Making Phone\
    \ Calls and More with Skype\n\nSocial networking is all about keeping in touch\
    \ with our friends, colleagues, and family. Passive communication through sites\
    \ such as [`www.facebook.com`](http://www.facebook.com) and Google+ is nice, but\
    \ sometimes there is just no substitute for hearing someone's voice.\n\n![images](images/p204-01.jpg)\n\
    \nAmazingly, you can make phone and video calls using the Skype app from any iPod\
    \ touch. Calls to other Skype users anywhere in the world are free. A nice thing\
    \ about the Skype service is that it works on computers and many mobile devices,\
    \ including the iPod touch 4S, older iPod touchs, iPads and iPod touches, some\
    \ BlackBerry smartphones, and other mobile devices. You will be charged for calls\
    \ to mobile phones and land lines, but the rates are reasonable.\n\n**NOTE:**\
    \ The Skype app can run in the background, so you can answer incoming Skype calls\
    \ at any time (note that this usually leads to faster battery drain).\n\n![images](images/p205-01.jpg)\n\
    \n#### Downloading Skype to Your iPod touch\n\nYou can download the free Skype\
    \ app from the App Store by searching for “Skype” and installing it. If you need\
    \ help getting this done, please check out [Chapter 22](#Chapter22.html#ch22):\
    \ “The Amazing App Store.”\n\n#### Creating Your Skype Account\n\nIf you need\
    \ to set up your Skype account and have not already done so from your computer\
    \ (see the “Using Skype on Your Computer” section later in this chapter).\n\n\
    #### Log into the Skype App\n\nAfter you create your account, you're ready to\
    \ log into Skype on your iPod touch. To do so, follow these steps:\n\n1. If you\
    \ are not already in Skype, tap the `Skype` icon from your `Home` screen.\n2.\
    \ Type your Skype Name and Password.\n3. Tap the `Sign In` button in the upper-right\
    \ corner.\n4. You should not have to enter this login information again; it is\
    \ saved in Skype. The next time you tap `Skype`, it will automatically log you\
    \ in.\n\n![images](images/p206-01.jpg)\n\n#### Finding and Adding Skype Contacts\n\
    \nOnce you have logged into the Skype app, you will want to start communicating\
    \ with people. To do so, you will have to find them and add them to your Skype\
    \ contacts list:\n\n1. If you are not already in the Skype app, tap the `Skype`\
    \ icon from your `Home` screen and log in, if asked.\n2. Tap the `Contacts` soft\
    \ key at the bottom.\n3. Tap the `Search` window at the top, and then type someone's\
    \ first and last name or Skype name. Tap `Search` to locate that person.\n4. Once\
    \ you see the person you want to add, tap their name.\n\n   ![images](images/p206-02.jpg)\n\
    \n5. If you are not sure whether this is the correct person, tap the `View Full\
    \ Profile` button.\n6. Tap `Add Contact` at the\n\n   ![images](images/p207-01.jpg)\n\
    \n7. Adjust the invitation message appropriately.\n8. Tap the `Send` button to\
    \ send this person an invitation to become one of your Skype contacts.\n\n   ![images](images/p207-02.jpg)\n\
    \n9. Repeat the procedure to add more contacts.\n10. When you are done, tap the\
    \ `Contacts` soft key at the bottom.\n11. Tap `All Contacts` from the `Groups`\
    \ screen to see all new contacts you have added.\n12. Once this person accepts\
    \ you as a contact, you will see him listed as a contact in your `All Contacts`\
    \ screen.\n\n**TIP:** Sometimes you want to get rid of a Skype contact. You can\
    \ remove or block a contact by tapping her name from the contact list. Tap the\
    \ `Settings` icon (upper-right corner) and select either `Remove from Contacts`\
    \ or `Block`.\n\n![images](images/p208-01.jpg)\n\n#### Making Calls with Skype\
    \ on Your iPod touch\n\nSo far you have created your account and added your contacts.\
    \ Now you are ready to finally make that first call with Skype on your iPod touch:\n\
    \n1. Tap the `Contacts` soft key at the bottom.\n2. Tap `All Contacts` to see\
    \ your contacts.\n3. Tap the contact name you wish to call.\n4. Tap the `Call`\
    \ button to make a voice call or the `Video Call` button to make a video call.\n\
    5. You may see a Skype button and a Mobile or other phone button. Press the Skype\
    \ button to make the free call. Making any other call requires that you pay for\
    \ it with Skype Credits.\n\n![images](images/p208-02.jpg)\n\n**NOTE:** You can\
    \ call toll free numbers for free using Skype Out on your iPod touch. The following\
    \ notice comes from the Skype web site at [`www.skype.com`](http://www.skype.com):\n\
    \n“The following countries and number ranges are supported and are free of charge\
    \ to all users. We're working on the rest of the world. France: +33 800, +33 805,\
    \ +33 809Poland: +48 800UK: +44 500, +44 800, +44 808USA: +1 800, +1 866, +1 877,\
    \ +1 888Taiwan: +886 80”\n\n#### Receiving Calls with Skype on Your iPod touch\n\
    \nThe iPod touch innately supports background VoIP calls. With the new version\
    \ of Skype, you can have Skype running in the background and still be able to\
    \ receive a Skype call when it comes in. You can even, in theory, be on a voice\
    \ call and then answer your Skype call!\n\n**TIP:** If you don't want to leave\
    \ Skype running in the background, but still want to call someone whom you know\
    \ uses Skype on her iPod touch, just send her a quick email or give her a quick\
    \ call to alert her to the fact you would like to talk to her using the Skype\
    \ app.\n\n##### Buying Skype Credits or a Monthly Subscription\n\nSkype-to-Skype\
    \ calls are free. However, if you want to call people on their land lines or mobile\
    \ phones from the Skype app, then you will need to purchase Skype Credits or purchase\
    \ a monthly subscription plan. If you try to purchase the credits or subscription\
    \ from within the Skype app, it will take you to the Skype web site. For this\
    \ reason, we recommend using Safari on your iPod touch or using your computer's\
    \ web browser to purchase these credits.\n\n**TIP:** You may want to start with\
    \ a limited amount of Skype Credits to try out the service before you sign up\
    \ for a subscription plan. Subscription plans are the way to go if you plan on\
    \ using Skype a lot for non-Skype callers (e.g., regular landlines and mobile\
    \ phones).\n\nFollow these steps to use Safari to buy Skype Credits:\n\n1. Tap\
    \ the `Safari` icon.\n2. Type [`www.skype.com`](http://www.skype.com) in the top\
    \ address bar and tap `Go`.\n3. Tap the `Sign In` link at the top of the page.\n\
    4. Enter your Skype Name and Password, and then tap `Sign me in`.\n5. If you are\
    \ not already on your `Account` screen, tap the `Account` tab in the right end\
    \ of the Top Nav Bar.\n6. At this point, you can choose to buy credits or a subscription:\n\
    \n   d. Tap the `Buy pre-pay credit` button to purchase a fixed amount of credits.\n\
    \   e. Tap the `Get a subscription` button to buy a monthly subscription account.\n\
    \n7. Finally, complete the payment instructions for either type of purchase."
  raw: "#### Accepting a FaceTime Call\n\nWhen someone calls you using FaceTime, you\
    \ will see a screen similar to shown in [Figure 10–4](#Chapter10.html#fig_10_4).\
    \ To accept the call tap **Accept**, to reject the call tap **Decline**.\n\n![images](images/1004.jpg)\n\
    \n**Figure 10–4.** *Accepting a **FaceTime** call*\n\nOnce a **FaceTime** call\
    \ is initiated, follow these steps to conduct a video conference:\n\n1.  Hold\
    \ the iPod touch away from you a bit.\n2.  Make sure you are *framed* properly\
    \ in the window.\n3.  You can move the small image of yourself around the screen\
    \ to a convenient spot.\n4.  Touch the **Switch Camera** button to show the **FaceTime**\
    \ caller you are looking at. The **Switch Camera** button will now use the standard\
    \ camera on the back of the iPod touch. In [Figure 10–5](#Chapter10.html#fig_10_5),\
    \ I get to see the beautiful vistas of Colorado from Martin's vacation, and he\
    \ gets to see my dog on the couch!\n5.  Touch the **End** button to end the **FaceTime**\
    \ call.\n6.  Touch the **Mute** button to temporarily mute the call.\n\n![images](images/1005.jpg)\n\
    \n**Figure 10–5.** *Switching camera views on a **FaceTime** call*\n\n### Making\
    \ Phone Calls and More with Skype\n\nSocial networking is all about keeping in\
    \ touch with our friends, colleagues, and family. Passive communication through\
    \ sites such as [`www.facebook.com`](http://www.facebook.com) and Google+ is nice,\
    \ but sometimes there is just no substitute for hearing someone's voice.\n\n![images](images/p204-01.jpg)\n\
    \nAmazingly, you can make phone and video calls using the **Skype** app from any\
    \ iPod touch. Calls to other Skype users anywhere in the world are free. A nice\
    \ thing about the Skype service is that it works on computers and many mobile\
    \ devices, including the iPod touch 4S, older iPod touchs, iPads and iPod touches,\
    \ some BlackBerry smartphones, and other mobile devices. You will be charged for\
    \ calls to mobile phones and land lines, but the rates are reasonable.\n\n**NOTE:**\
    \ The **Skype** app can run in the background, so you can answer incoming Skype\
    \ calls at any time (note that this usually leads to faster battery drain).\n\n\
    ![images](images/p205-01.jpg)\n\n#### Downloading Skype to Your iPod touch\n\n\
    You can download the free **Skype** app from the App Store by searching for “Skype”\
    \ and installing it. If you need help getting this done, please check out [Chapter\
    \ 22](#Chapter22.html#ch22): “The Amazing App Store.”\n\n#### Creating Your Skype\
    \ Account\n\nIf you need to set up your Skype account and have not already done\
    \ so from your computer (see the “Using Skype on Your Computer” section later\
    \ in this chapter)..\n\n#### Log into the Skype App\n\nAfter you create your account,\
    \ you're ready to log into **Skype** on your iPod touch. To do so, follow these\
    \ steps:\n\n1.  If you are not already in **Skype**, tap the **Skype** icon from\
    \ your **Home** screen.\n2.  Type your Skype Name and Password.\n3.  Tap the **Sign\
    \ In** button in the upper-right corner.\n4.  You should not have to enter this\
    \ login information again; it is saved in **Skype**. The next time you tap **Skype**,\
    \ it will automatically log you in.\n\n![images](images/p206-01.jpg)\n\n#### Finding\
    \ and Adding Skype Contacts\n\nOnce you have logged into the **Skype** app, you\
    \ will want to start communicating with people. To do so, you will have to find\
    \ them and add them to your **Skype** contacts list:\n\n1.  If you are not already\
    \ in the **Skype** app, tap the **Skype** icon from your **Home** screen and log\
    \ in, if asked.\n2.  Tap the **Contacts** soft key at the bottom.\n3.  Tap the\
    \ **Search** window at the top, and then type someone's first and last name or\
    \ **Skype** name. Tap **Search** to locate that person.\n4.  Once you see the\
    \ person you want to add, tap their name.\n\n    ![images](images/p206-02.jpg)\n\
    \n5.  If you are not sure whether this is the correct person, tap the **View Full\
    \ Profile** button.\n6.  Tap **Add Contact** at the\n\n    ![images](images/p207-01.jpg)\n\
    \n7.  Adjust the invitation message appropriately.\n8.  Tap the **Send** button\
    \ to send this person an invitation to become one of your **Skype** contacts.\n\
    \n    ![images](images/p207-02.jpg)\n\n9.  Repeat the procedure to add more contacts.\n\
    10.  When you are done, tap the **Contacts** soft key at the bottom.\n11.  Tap\
    \ **All Contacts** from the **Groups** screen to see all new contacts you have\
    \ added.\n12.  Once this person accepts you as a contact, you will see him listed\
    \ as a contact in your **All Contacts** screen.\n\n**TIP:** Sometimes you want\
    \ to get rid of a Skype contact. You can remove or block a contact by tapping\
    \ her name from the contact list. Tap the **Settings** icon (upper-right corner)\
    \ and select either **Remove from Contacts** or **Block**.\n\n![images](images/p208-01.jpg)\n\
    \n#### Making Calls with Skype on Your iPod touch\n\nSo far you have created your\
    \ account and added your contacts. Now you are ready to finally make that first\
    \ call with **Skype** on your iPod touch:\n\n1.  Tap the **Contacts** soft key\
    \ at the bottom.\n2.  Tap **All Contacts** to see your contacts.\n3.  Tap the\
    \ contact name you wish to call.\n4.  Tap the **Call** button to make a voice\
    \ call or the **Video Call** button to make a video call.\n5.  You may see a Skype\
    \ button and a Mobile or other phone button. Press the Skype button to make the\
    \ free call. Making any other call requires that you pay for it with Skype Credits.\n\
    \n![images](images/p208-02.jpg)\n\n**NOTE:** You can call toll free numbers for\
    \ free using **Skype Out** on your iPod touch. The following notice comes from\
    \ the Skype web site at [`www.skype.com`](http://www.skype.com):\n\n“The following\
    \ countries and number ranges are supported and are free of charge to all users.\
    \ We're working on the rest of the world. France: +33 800, +33 805, +33 809Poland:\
    \ +48 800UK: +44 500, +44 800, +44 808USA: +1 800, +1 866, +1 877, +1 888Taiwan:\
    \ +886 80”\n\n#### Receiving Calls with Skype on Your iPod touch\n\nThe iPod touch\
    \ innately supports background VoIP calls. With the new version of **Skype**,\
    \ you can have **Skype** running in the background and still be able to receive\
    \ a **Skype** call when it comes in. You can even, in theory, be on a voice call\
    \ and then answer your **Skype** call!\n\n**TIP:** If you don't want to leave\
    \ **Skype** running in the background, but still want to call someone whom you\
    \ know uses **Skype** on her iPod touch, just send her a quick email or give her\
    \ a quick call to alert her to the fact you would like to talk to her using the\
    \ **Skype** app.\n\n##### Buying Skype Credits or a Monthly Subscription\n\nSkype-to-Skype\
    \ calls are free. However, if you want to call people on their land lines or mobile\
    \ phones from the **Skype** app, then you will need to purchase Skype Credits\
    \ or purchase a monthly subscription plan. If you try to purchase the credits\
    \ or subscription from within the **Skype** app, it will take you to the Skype\
    \ web site. For this reason, we recommend using **Safari** on your iPod touch\
    \ or using your computer's web browser to purchase these credits.\n\n**TIP:**\
    \ You may want to start with a limited amount of Skype Credits to try out the\
    \ service before you sign up for a subscription plan. Subscription plans are the\
    \ way to go if you plan on using Skype a lot for non-Skype callers (e.g., regular\
    \ landlines and mobile phones).\n\nFollow these steps to use **Safari** to buy\
    \ Skype Credits:\n\n1.  Tap the **Safari** icon.\n2.  Type [`www.skype.com`](http://www.skype.com)\
    \ in the top address bar and tap **Go**.\n3.  Tap the **Sign In** link at the\
    \ top of the page.\n4.  Enter your Skype Name and Password, and then tap **Sign\
    \ me in**.\n5.  If you are not already on your **Account** screen, tap the **Account**\
    \ tab in the right end of the Top Nav Bar.\n6.  At this point, you can choose\
    \ to buy credits or a subscription:\n\n    d. Tap the **Buy pre-pay credit** button\
    \ to purchase a fixed amount of credits.\n\n    e. Tap the **Get a subscription**\
    \ button to buy a monthly subscription account.\n\n7.  Finally, complete the payment\
    \ instructions for either type of purchase."
  trans: "\n#### 接听 FaceTime 通话\n\n当有人使用 FaceTime 呼叫你时，你会看到一个类似于图 10-4 所示的屏幕。要接听通话，请轻点\
    \ `Accept`，要拒接通话，请轻点 `Decline`。\n\n![images](img/1004.jpg)\n\n**图 10-4.** *接听\
    \ FaceTime 通话*\n\n一旦 FaceTime 通话建立，请按照以下步骤进行视频会议：\n\n1.  将 iPod touch 稍微拿远一点。\n\
    2.  确保你在窗口中的画面*构图*得当。\n3.  你可以将你自己的小图像拖到屏幕上的任何方便位置。\n4.  轻点 `Switch Camera` 按钮，向\
    \ FaceTime 呼叫者展示你正在观看的内容。此时 `Switch Camera` 按钮将使用 iPod touch 背面的标准摄像头。在图 10-5\
    \ 中，我看到了马丁度假时科罗拉多州的美景，而他则看到了我家沙发上的狗！\n5.  轻点 `End` 按钮结束 FaceTime 通话。\n6.  轻点 `Mute`\
    \ 按钮暂时将通话静音。\n\n![images](img/1005.jpg)\n\n**图 10-5.** *在 FaceTime 通话中切换摄像头视图*\n\
    \n### 使用 Skype 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过 [`www.facebook.com`](http://www.facebook.com)\
    \ 和 Google+ 等网站进行的被动交流固然不错，但有时没有什么能替代听到对方声音的真实感。\n\n![images](img/p204-01.jpg)\n\
    \n令人惊讶的是，你可以使用 Skype 应用在任意 iPod touch 上拨打语音和视频电话。呼叫世界上任何地方的其他 Skype 用户都是免费的。Skype\
    \ 服务的一个优点是其适用于计算机和多种移动设备，包括 iPhone 4S、旧款 iPhone、iPad 和 iPod touch、部分 BlackBerry\
    \ 智能手机以及其他移动设备。拨打移动电话和固定电话会产生费用，但费率合理。\n\n**注意：** Skype 应用可以在后台运行，因此你可以随时接听来电的\
    \ Skype 通话（请注意，这通常会导致电池电量消耗更快）。\n\n![images](img/p205-01.jpg)\n\n#### 将 Skype\
    \ 下载到你的 iPod touch\n\n你可以从 App Store 免费下载 Skype 应用，方法是搜索“Skype”并安装。如果你需要有关此操作的帮助，请查看第\
    \ 22 章：“令人惊叹的 App Store”。\n\n#### 创建你的 Skype 帐户\n\n如果你需要设置你的 Skype 帐户并且尚未在电脑上完成（请参见本章后面的“在电脑上使用\
    \ Skype”部分）。\n\n#### 登录 Skype 应用\n\n创建帐户后，你就可以在 iPod touch 上登录 Skype 了。请按照以下步骤操作：\n\
    \n1.  如果尚未进入 Skype，请从 `Home` 屏幕轻点 `Skype` 图标。\n2.  输入你的 Skype 名称和密码。\n3.  轻点右上角的\
    \ `Sign In` 按钮。\n4.  以后你将无需再次输入登录信息；它会保存在 Skype 中。下次轻点 `Skype` 时，它将自动为你登录。\n\n\
    ![images](img/p206-01.jpg)\n\n#### 查找并添加 Skype 联系人\n\n登录 Skype 应用后，你将希望开始与人交流。为此，你需要找到他们并将其添加到你的\
    \ Skype 联系人列表中：\n\n1.  如果尚未进入 Skype 应用，请从 `Home` 屏幕轻点 `Skype` 图标，并在提示时登录。\n2.\
    \  轻点底部的 `Contacts` 功能键。\n3.  轻点顶部的 `Search` 窗口，然后输入某人的名字和姓氏或 Skype 名称。轻点 `Search`\
    \ 查找此人。\n4.  看到要添加的人后，轻点其名字。\n\n   ![images](img/p206-02.jpg)\n\n5.  如果不确定这是否是正确的人，请轻点\
    \ `View Full Profile` 按钮。\n6.  轻点 `Add Contact` 按钮。\n\n   ![images](img/p207-01.jpg)\n\
    \n7.  适当调整邀请信息。\n8.  轻点 `Send` 按钮，向此人发送成为你 Skype 联系人的邀请。\n\n   ![images](img/p207-02.jpg)\n\
    \n9.  重复此过程以添加更多联系人。\n10. 完成后，轻点底部的 `Contacts` 功能键。\n11. 从 `Groups` 屏幕轻点 `All\
    \ Contacts`，查看你添加的所有新联系人。\n12. 一旦此人接受你的联系人请求，你将看到他列在 `All Contacts` 屏幕的联系人中。\n\
    \n**提示：** 有时你想要删除某个 Skype 联系人。你可以通过从联系人列表中轻点她的名字来移除或阻止联系人。轻点 `Settings` 图标（右上角），然后选择\
    \ `Remove from Contacts` 或 `Block`。\n\n![images](img/p208-01.jpg)\n\n#### 在 iPod\
    \ touch 上使用 Skype 拨打电话\n\n到目前为止，你已经创建了帐户并添加了联系人。现在你终于准备好要在 iPod touch 上使用 Skype\
    \ 打第一个电话了：\n\n1.  轻点底部的 `Contacts` 功能键。\n2.  轻点 `All Contacts` 查看你的联系人。\n3.  轻点你想通话的联系人姓名。\n\
    4.  轻点 `Call` 按钮进行语音通话，或轻点 `Video Call` 按钮进行视频通话。\n5.  你可能会看到一个 Skype 按钮和一个移动电话或其他电话按钮。按下\
    \ Skype 按钮进行免费通话。拨打其他任何电话都需要使用 Skype 点数支付。\n\n![images](img/p208-02.jpg)\n\n**注意：**\
    \ 你可以使用 iPod touch 上的 Skype Out 免费拨打免费电话。以下通知来自 Skype 网站 [`www.skype.com`](http://www.skype.com)：\n\
    \n“以下国家和地区号码段受支持且对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33 800，+33 805，+33 809 波兰：+48 800\
    \ 英国：+44 500，+44 800，+44 808 美国：+1 800，+1 866，+1 877，+1 888 台湾：+886 80”\n\n####\
    \ 在 iPod touch 上使用 Skype 接听来电\n\niPod touch 原生支持后台 VoIP 通话。借助最新版本的 Skype，你可以让\
    \ Skype 在后台运行，并在来电时接听 Skype 通话。理论上，你甚至可以在进行语音通话时接听 Skype 来电！\n\n**提示：** 如果你不想让\
    \ Skype 在后台运行，但仍然想给某个你知道她在 iPod touch 上使用 Skype 的人打电话，只需给她发一封快速电子邮件或快速打个电话，提醒她你希望使用\
    \ Skype 应用与她通话。\n\n##### 购买 Skype 点数或月度订阅\n\nSkype 到 Skype 的通话是免费的。但是，如果你想从 Skype\
    \ 应用呼叫他人的固定电话或移动电话，则需要购买 Skype 点数或购买月度订阅计划。如果你尝试从 Skype 应用内购买点数或订阅，它将跳转到 Skype\
    \ 网站。因此，我们建议使用 iPod touch 上的 Safari 或电脑的网页浏览器来购买这些点数。\n\n**提示：** 你可能希望先购买少量 Skype\
    \ 点数试用该服务，然后再注册订阅计划。如果你计划大量使用 Skype 与非 Skype 用户（例如，普通固定电话和移动电话）通话，那么订阅计划是更合适的选择。\n\
    \n请按照以下步骤使用 Safari 购买 Skype 点数：\n\n1.  轻点 `Safari` 图标。\n2.  在顶部地址栏中输入 [`www.skype.com`](http://www.skype.com)\
    \ 并轻点 `Go`。\n3.  轻点页面顶部的 `Sign In` 链接。\n4.  输入你的 Skype 名称和密码，然后轻点 `Sign me in`。\n\
    5.  如果你尚未进入 `Account` 屏幕，请轻点顶部导航栏右端的 `Account` 标签。\n6.  此时，你可以选择购买点数或订阅：\n\n \
    \  d. 轻点 `Buy pre-pay credit` 按钮购买固定金额的点数。\n   e. 轻点 `Get a subscription` 按钮购买月度订阅帐户。\n\
    \n7.  最后，完成任一类型购买的付款说明。\n"
- fmt: "#### Chatting with Skype\n\nIn addition to making phone calls, you can also\
    \ chat via text with other `Skype` users from your iPod touch. Starting a chat\
    \ is very similar to starting a call; follow these steps to do so:\n\n1. If you\
    \ are not already in `Skype`, tap the `Skype` icon.\n2. Tap the `Contacts` soft\
    \ key at the bottom.\n3. Tap `All Contacts` to see all your contacts.\n4. Tap\
    \ the name of the contact you wish to chat with.\n5. Tap the `Chat` button.\n\n\
    \    ![images](images/p210-01.jpg)\n\n6. Type your chat text and press the `Send`\
    \ button. Your chat will appear in the top of the screen.\n\n![images](images/p211-01.jpg)\n\
    \n#### Adding Skype to Your Computer\n\nYou can use the `Skype` app on your computer,\
    \ as well. We will show you how this works next. You can also use `Skype` to make\
    \ video calls on your computer if you also have a web cam hooked up.\n\n**NOTE:**\
    \ When you call from your computer to an iPod touch, you will not be able to do\
    \ a video call.\n\nTo create a Skype account and download `Skype` software for\
    \ your computer, follow these steps:\n\n1. Open a web browser on your computer.\n\
    2. Go to: [`www.skype.com`](http://www.skype.com).\n3. Click the `Join` link at\
    \ the top of the page.\n4. Create your account by completing all required information\
    \ and clicking the `Continue` button. Notice that you only have to enter information\
    \ in the required fields, which are denoted with an asterisk. For example, you\
    \ do not need to enter your gender, birthdate, or mobile phone number.\n5. You\
    \ are now done with the account setup process. Next, you are presented with the\
    \ option of buying Skype Credits; however, this is not required for the free Skype-to-Skype\
    \ phone calls, video calls, or chats.\n\n    **TIP:** You only need to pay for\
    \ `Skype` if you want to call someone who is not using `Skype`. For example, calls\
    \ to phones on land lines or mobile phones (not using `Skype`) will cost you.\
    \ At the time of writing, pay-as-you-go rates were about US 2.1 cents; monthly\
    \ subscriptions ranged from about US $3 - $14 for various calling plans.\n\n6.\
    \ Next, click the `Get Skype` link in the Top Nav Bar of the site to download\
    \ `Skype` to your computer.\n7. Click the `Get Skype for Windows` button or the\
    \ `Get Skype for Mac` button.\n8. Follow the instructions to install the software.\n\
    9. Once the software is installed, launch it and log in using your Skype account.\n\
    10. You are ready to initiate (or receive) phone calls, video calls, and chats\
    \ to anyone else using `Skype`, including all your friends with `Skype` on their\
    \ iPod touchs.\n\n### Video Recording\n\nIn addition to letting you make video\
    \ calls and chat, the iPod touch lets you make full-featured videos using the\
    \ built-in video recorder. You can use your iPod touch to shoot HD video in 1080p\
    \ and then upload this video to Facebook, YouTube, or MobileMe. You can also send\
    \ your videos via MMS or email.\n\n**NOTE:** When you share a video, it will be\
    \ compressed, so the quality will no longer be 1080p.\n\nNext, we will show you\
    \ how to record video and trim your video right on your iPod touch. You will also\
    \ learn how to produce a high quality, high definition video right on your iPod\
    \ touch.\n\n#### Starting the Video Recorder\n\nThe software for the video recorder\
    \ is actually part of the `Camera` app (see [Figure 10–6](#Chapter10.html#fig_10_6)).\
    \ Follow these steps to use the built-in video recorder:\n\n1. Start up the `Camera`\
    \ app. Move the slider in the lower-right corner from the `Camera` icon to the\
    \ `Video Recorder` icon.\n2. Tap the `Camera Switch` button at the top right to\
    \ alternate between the rear-facing and front-facing cameras.\n3. Try to keep\
    \ the iPod touch steady as you record your scene.\n4. Tap the `Stop` button when\
    \ you are done recording.\n\n![images](images/1006.jpg)\n\n**Figure 10–6.** *The\
    \ layout and controls of the video recorder*\n\n##### Focusing the Video\n\nThe\
    \ iPod touch can adjust the focus of the video based on the subject. Follow these\
    \ steps to take advantage of this feature:\n\n1. To focus on something in the\
    \ foreground of the video, tap the screen in the foreground. This brings up a\
    \ small box to show the area of focus.\n2. To switch the focus to a subject in\
    \ the background, tap another part of the screen. The box will temporarily display\
    \ the new area of focus.\n\n##### Trimming the Video\n\nThe iPod touch allows\
    \ you to perform edits on your video right on the iPod touch. Once the video has\
    \ been recorded and you press the `Stop` button, the video immediately goes into\
    \ your `Camera Roll`.\n\nTap the small image of the video in the lower-left corner\
    \ to bring up the video. At the top of the screen, you will see a timeline with\
    \ all the frames of your video at the top of the screen (see [Figure 10–7](#Chapter10.html#fig_10_7)).\
    \ Follow these steps to edit your just-recorded video:\n\n1. Drag either end of\
    \ the timeline and you will see that the video goes into Trim mode.\n2. Drag the\
    \ ends of the video on either end until it is the length you desire.\n3. When\
    \ the video is the correct length, tap the `Trim` button in the upper-right corner.\n\
    4. Next, select either `Trim Original` or `Save as New Clip`. The latter option\
    \ saves another version of the newly trimmed video.\n\n![images](images/1007.jpg)\n\
    \n**Figure 10–7.** *Trimming a video*\n\n##### Sending the Video\n\nAs with photos,\
    \ you have several options for using your iPod touch to send recorded video to\
    \ others. Follow these steps to send a video from your iPod touch:\n\n1. Touch\
    \ the `Send` icon ![images](images/p214-01.jpg) in the bottom row.\n2. Choose\
    \ your preferred option for sending the video: `Email Video`, `Message`, or `Send\
    \ to YouTube`.\n3. Follow the steps to send your video based on the choice you\
    \ made in Step 2.\n\n**NOTE:** To upload a video to YouTube, you need to have\
    \ an account with the site.\n\n## Chapter 11\n\n## Playing Music\n\nIn this chapter\
    \ we show you how to turn your iPod touch into a terrific music player. Since\
    \ the iPod touch comes from Apple—which popularized the now famous iPod electronic\
    \ music player—you'd expect it to have some great capabilities, and it does. We'll\
    \ show you how to play and organize the music you buy from iTunes or sync from\
    \ your computer, how to view playlists in a variety of ways, and how to quickly\
    \ find songs. You'll learn how to use the Genius feature to have the iPod touch\
    \ locate and group similar songs in your library—sort of like a radio station\
    \ that plays only music you like.\n\n**TIP:** Learn how to buy music and use Ping\
    \ (social networking for music lovers) right on your iPod touch in [Chapter 21](#Chapter21.html#ch21):\
    \ “iTunes on Your Device.”\n\nAnd you'll see how to stream music using an app\
    \ called Pandora. With Pandora, you can select from a number of Internet radio\
    \ stations, or create your own by typing in your favorite artist's name, and it's\
    \ all free.\n\n### Your iPod touch as a Music Player\n\nYour iPod touch is probably\
    \ one of the best music players on the market today. The touch screen makes it\
    \ easy to interact with and manage your music, playlists, cover art, and the organization\
    \ of your music library. You can even connect your iPod touch to your home or\
    \ car stereo via Bluetooth, so you can listen to beautiful stereo sound from your\
    \ iPod touch!\n\n**TIP:** Check out [Chapter 5](#Chapter05.html#ch5): “AirPlay\
    \ and Bluetooth” to learn how to hook up your iPod touch to your Bluetooth stereo\
    \ speakers or car stereo.\n\nWhether you use the built-in `Music` app or an Internet\
    \ radio app like `Pandora`, you'll find you have unprecedented control over your\
    \ music on the iPod touch."
