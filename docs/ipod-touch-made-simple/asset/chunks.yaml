  trans: "\n# 输入邮件内容\n\n现在光标位于邮件的**正文**区域（主题行下方），即可开始输入邮件内容。\n\n**注意：** 你的 iPod touch\
    \ 上只能设置一个电子邮件签名，该签名会自动应用于你从 iPod touch 发送的每封邮件——即使你设置了多个电子邮件账户也是如此。因此，如果你同时经营两种不同业务，或者不希望将个人电子邮件签名发送给所有商务联系人，请务必小心。最好将你的电子邮件签名设置得较为通用。\n\
    \n## 设置文本格式、定义单词、引用文本及其他操作\n\n你可以轻点任意文本以将其高亮选中，然后使用蓝色控制柄来扩大或缩小选区范围。接着，通过选区上方的弹出菜单，可以进行以下任一操作：\n\
    \n![图片](img/p322-01.jpg)\n\n- **轻点“剪切”、“拷贝”或“粘贴”来执行相应功能。**\n- **若单词下方有下划线需要更正拼写，轻点“建议”。**\n\
    - **轻点右边缘的三角形图标可查看更多选项。**\n- 轻点 **B/U** 调整格式为**粗体**、**斜体**或**下划线**。\n  ![图片](img/p322-02.jpg)\n\
    \n  ![图片](img/p322-03.jpg)\n\n- 轻点**定义**可在词典中查找所选单词。\n- 轻点**朗读**可让设备朗读该单词。\n-\
    \ 轻点**引用级别**可增加或减少所选文本的引用层级。\n\n## 电子邮件签名\n\n默认的电子邮件签名如右侧图片所示：**发自我的 iPod touch**。\n\
    \n**提示：** 你可以将此签名更改为任何你想要的文本；请参阅本章后面的“更改电子邮件签名”部分，了解如何更改电子邮件签名。\n\n# 键盘选项\n\n\
    输入时，请记住你有两种键盘选项：较小的**竖屏**键盘和较大的**横屏**键盘，请参阅图 17-2。\n\n![图片](img/1602.jpg)\n\n\
    **图 16-2.** *将设备侧向旋转，即可使用更大的横屏键盘。*\n\n**提示：** 如果你的手比较大，使用更大的键盘可能会更便于输入。一旦你掌握了在较大键盘上用双手输入的方法，就会发现它比单指输入要快得多。更多输入技巧，请参阅第\
    \ 2 章：“输入、拷贝与搜索”。\n\n# 自动更正与自动大写\n\n输入时，你会注意到有些单词会自动大写并被自动更正。拼写检查器会将带有红色下划线的单词标记为拼写错误。请参阅第\
    \ 2 章：“输入、拷贝与搜索”，了解所有这些功能是如何工作的；本章还提供了一些额外的输入技巧。\n\n# 发送邮件\n\n邮件内容输入完毕后，轻点右上角的蓝色**发送**按钮。\n\
    \n![图片](img/p324-01.jpg)\n\n你的邮件将被发送，并且你应该会听到 iPod touch 的邮件发送提示音，这确认了你的邮件已成功发送。你可以在第\
    \ 8 章：“个性设置与安全保护”中的“调整 iPod touch 上的声音”一节中了解如何启用或禁用此提示音。\n\n## 存为草稿稍后发送\n\n如果你不打算立即发送邮件，但希望将其保存为草稿以便稍后发送，请按照以下步骤操作：\n\
    \n![图片](img/p324-02.jpg)\n\n1.  按前面所述的方法编写邮件。\n2.  按下左上角的**取消**按钮。\n3.  选择屏幕底部的**保存草稿**按钮。\n\
    \n稍后，当你需要查找并发送草稿邮件时，请按照以下步骤操作：\n\n1.  在发送此邮件的电子邮箱账户中打开**草稿**文件夹。有关如何进入**草稿**文件夹的帮助信息，请参阅本章前面的“在邮件文件夹中导航”部分。\n\
    2.  轻点**草稿**文件夹中的电子邮件将其打开。\n3.  轻点邮件中的任意位置进行编辑。\n4.  轻点**发送**按钮。\n\n## 检查已发送邮件\n\
    \n按照以下步骤确认邮件已正确发送：\n\n![图片](img/p325-01.jpg)\n\n1.  轻点左上角的**邮箱账户名称**按钮，查看刚用于发送邮件的账户的邮件文件夹。\n\
    2.  轻点**已发送**文件夹。\n3.  确认列表中显示的顶部邮件正是你刚刚编写并发送的那一封。\n\n**注意：** 只有在 iPod touch 上实际发送或删除了该账户的邮件后，你才会看到**已发送**和**废纸篓**文件夹。如果你的电子邮件账户是\
    \ IMAP 账户，你可能会看到除本章所述之外的其他许多文件夹。\n\n# 阅读和回复邮件\n\n按照以下步骤阅读你的电子邮件：\n\n1.  使用本章前面描述的步骤，导航至你想要查看的电子邮箱账户的收件箱。\n\
    2.  要阅读任何一封邮件，只需在收件箱中轻点它。\n\n    ![图片](img/p326-01.jpg)\n\n3.  新的、未读邮件会在其左侧显示一个蓝色小圆点。\n\
    4.  在收件箱中向上或向下滑动手指，即可滚动浏览你的邮件。\n5.  阅读邮件时，向上或向下滑动即可滚动浏览其内容。\n\n## 将邮件标记为未读或已标记\n\
    \n如果你阅读了一封邮件，但希望确保稍后能快速找到它，可以选择轻点`标记为未读`或`旗标`，以便日后引起你的注意。\n\n请按照以下步骤标记邮件：\n\n\
    ![图片](img/p326-02.jpg)\n\n1.  轻点位于时间和日期右侧的**标记**一词。\n2.  从弹出的菜单中选择**旗标**或**标记为未读**。\n\
    \n被标记为旗标的邮件，其`标记`文本左侧会有一个红色小旗子图标。被标记为未读的邮件，其`标记`文本右侧会有一个蓝色小圆点。\n\n**取消标记**邮件：\n\
    \n![图片](img/p327-01.jpg)\n\n1.  轻点位于时间和日期右侧的**标记**一词。\n2.  从弹出的菜单中选择**取消旗标**或**标记为已读**。\n\
    \n## 放大或缩小\n\n与浏览网页时一样，你可以放大以查看更大字体的邮件内容。你也可以像在网页上一样使用双指轻点；还可以使用**捏合**手势来放大或缩小（有关这些功能的更多信息，请参阅本书第\
    \ 1 部分快速入门指南中的“缩放”部分）。\n\n# 邮件附件\n\n某些电子邮件附件会被 iPod touch 自动打开，因此你甚至不会注意到它们是附件。此类附件包括\
    \ Adobe 可移植文档格式 (PDF) 文件（由**Adobe Acrobat** 和 **Adobe Reader** 等应用程序使用）以及某些类型的图像、视频和音频文件。你也可能会收到文档形式的附件，例如\
    \ Apple 的 **Pages**、**Numbers** 和 **Keynote** 文件，或 Microsoft 的 **Word**、**Excel**\
    \ 和 **PowerPoint** 文件。这些文件需要手动打开。\n\n## 辨别邮件何时包含附件\n\n任何包含附件的邮件都会在发件人姓名旁边显示一个小的**回形针**图标，如下图所示。当你看到这个图标时，就知道该邮件包含附件了。\n\
    \n![图片](img/p327-02.jpg)\n\n## 接收自动打开的附件\n\n某些类型的电子邮件附件，如图像、Quicktime 影片和单页 PDF\
    \ 文件，通常会被自动打开并直接显示在邮件正文中。\n\n![图片](img/p328-01.jpg)\n\n**提示：** 如果你想保存或复制自动打开的附件，只需按住它直到弹出窗口出现。此时，你可以选择**拷贝**或**存储图像**。当你保存图像时，它会被放入**照片**应用中的**相机胶卷**相册中。\n"
- fmt: "### Opening Email Attachments\n\nInstead of immediately opening in the body\
    \ of the email as we just described, other types of attachments—such as spreadsheets,\
    \ word processing documents, and presentation files—will need to be opened manually.\n\
    \n#### Tap for Quick Look Mode\n\nFollow these steps to open attachments in Quick\
    \ Look mode:\n\n1. Open the message with an attachment, as shown in [Figure 16-3](#Chapter16.html#fig_16_3).\n\
    2. Quickly tap the attachment to instantly open it in Quick Look mode.\n3. You\
    \ can navigate around the document. Remember you can zoom in or out and swipe\
    \ up or down.\n4. If you open a spreadsheet with multiple tabs or spreadsheets,\
    \ you will see tabs across the top. Touch another tab to open that spreadsheet.\n\
    5. When you are done looking at the attachment, tap the document once to bring\
    \ up the controls, and then tap **Done** in the upper-left corner.\n6. If you\
    \ have apps installed that can open the type of attachment you are viewing (in\
    \ this case, a spreadsheet), then you will see an **Open In** button in the upper-right\
    \ corner. Tap the **Open In** button to open this file in another app.\n\n![images](images/1603.jpg)\n\
    \n**Figure 16-3.** *Viewing email attachments in Quick Look mode.*\n\n#### Opening\
    \ Docs in Other Apps\n\nYou may want to open an attachment in another application.\
    \ For example, you might want to open a spreadsheet in **Numbers**, a PDF file\
    \ in **iBooks, Stanza**, or **GoodReader.** Follow these steps to do so:\n\n1.\
    \ Open the email message.\n2. Press and hold the attachment until you see the\
    \ pop-up window.\n3. Select the **Open In…** or **Open in “Numbers”** option.\
    \ You may see specific apps listed after Open In as Numbers is shown here when\
    \ the format of the attachment matches apps on your device.\n\n    ![Images](images/p330-01.jpg)\n\
    \n4. Select the application you would like to use from the list.\n5. Finally,\
    \ you can edit the document, save it, and email it back to the sender.\n\n   \
    \ ![Images](images/p330-02.jpg)\n\n#### Viewing a Video Attachment\n\nYou may\
    \ receive a video as an attachment to an email. Certain types of videos can be\
    \ viewed on your iPod touch (see the “Supported E-Mail Attachment Types” section\
    \ later in this chapter for a list of supported video formats). Follow these steps\
    \ to open a video attachment:\n\n1. Tap the video attachment to open it and view\
    \ it in the video player.\n\n    ![Images](images/p331-01.jpg)\n\n2. When you\
    \ are done viewing the video, tap the screen to bring up the player controls.\n\
    3. Tap the **Done** button in the upper-left corner to return to the email message.\n\
    \n    **NOTE:** This is an image from a video tutorial by Martin Trautschold (one\
    \ of this book’s authors) that shows you how to use your iPod touch. Check out\
    \ some free sample tutorials at [`www.madesimplelearning.com`](http://www.madesimplelearning.com),\
    \ Martin's web site.\n\n### Opening and Viewing Compressed .zip Files\n\nYour\
    \ iPod touch will not be able to open and view a compressed file in `.zip` format\
    \ unless you install an app such as **GoodReader**. At the time of publishing,\
    \ **GoodReader** was still a free app and well worth installing.\n\n**TIP:** Learn\
    \ how to install and use **GoodReader** it in [Chapter 13](#Chapter13.html#ch13):\
    \ “Newsstand and More.”\n\nFollow these steps to open a `.zip` file in the program:\n\
    \n1. Install the free **GoodReader** app from the App Store.\n2. Open up the email\
    \ message with the `.zip` file attachment.\n3. Touch and hold the `.zip` attachment\
    \ until you see a pop-up at the bottom with a button that says: **Open in “GoodReader.”**\
    \ Tap that button to open the `.zip` file in **GoodReader**.\n\n    ![Images](images/p332-01.jpg)\n\
    \n4. **GoodReader** should now open, and your `.zip` file should be at the top\
    \ of the list of files. To open or decompress the `.zip` file, tap it and select\
    \ the **Unzip** button.\n\n    ![Images](images/p332-02.jpg)\n\n5. Now you should\
    \ see the uncompressed file—in this case, an Adobe `.pdf` file in the list of\
    \ files above the `.zip` file.\n\n    ![Images](images/p332-03.jpg)\n\n6. Tap\
    \ that uncompressed file to view it.\n7. When you are done reading the attachment,\
    \ double-click your **Home** button and tap the **Mail** icon to return to your\
    \ reading your email.\n\n#### Supported Email Attachment Types\n\nYour iPod touch\
    \ supports the following file types as attachments:\n\n* `.doc` and `.docx` (**Microsoft\
    \ Word** documents)\n* `.htm` and `.html` (web pages)\n* `.key` (a **Keynote**\
    \ presentation document)\n* `.numbers` (an **Apple Numbers** spreadsheet document)\n\
    * `.pages` (an **Apple Pages** document)\n* `.pdf` (Adobe’s portable document\
    \ format, used by programs such as **Adobe Acrobat** and **Adobe Reader**)\n*\
    \ `.ppt` and `.pptx` (**Microsoft PowerPoint** presentation documents)\n* `.txt`\
    \ (a text file)\n* `.vcf` (a contact file)\n* `.xls` and `.xlsx` (**Microsoft\
    \ Excel** spreadsheet documents)\n* `.mp3` and `.mov` (audio and video formats)\n\
    * `.zip` (compressed files): These are only readable if you have an app installed\
    \ that can read them, such as **GoodReader**—see the “Opening and Viewing Compressed\
    \ .zip Files” section earlier in this chapter.\n\n## Replying, Forwarding, or\
    \ Deleting a Message\n\nAt the bottom of your email reading pane is a toolbar.\n\
    \n![Images](images/p333-01.jpg)\n\nFrom this toolbar, you can move the message\
    \ to a different mailbox or folder; delete it; or reply, reply all, or forward\
    \ it.\n\nTouch the small **Arrow** icon ![Images](images/p333-02.jpg) to see these\
    \ option buttons appear: **Reply**, **Reply All**, and **Forward**.\n\n**NOTE:**\
    \ The **Reply All** button appears only if there was more than one recipient for\
    \ the email message.\n\n![Images](images/p333-03.jpg)\n\n### Replying to an Email\n\
    \nYou will probably use the **Reply** command most frequently. Follow these steps\
    \ to respond to an email on your iPod touch:\n\n1. Touch the **Reply** button.\n\
    \n    You will see that the original sender is now listed as the recipient in\
    \ the **To:** line of the email. The subject will automatically state: “Re: *(Original\
    \ subject line)*.”\n\n    ![Images](images/p334-01.jpg)\n\n2. Type your response.\n\
    3. When you are done, just touch the blue **Send** button at the top-right corner\
    \ of the screen.\n\n### Using Reply All\n\nUsing the **Reply All** option is just\
    \ like using the **Reply** function, except that all of the original recipients\
    \ of the email and the original sender are placed in the address lines. The original\
    \ sender will be in the **To:** line, while all other recipients of the original\
    \ email will be listed on the **Cc:** line. You will only see the **Reply All**\
    \ option if more than one person received the original email.\n\n**CAUTION:**\
    \ Be careful when you use **Reply All**. This can be dangerous if some of the\
    \ recipients are not shown on the original email because they stretch off the\
    \ edge of the screen. If you do use **Reply All**, then make sure you check the\
    \ **To:** and **Cc:** lists to make sure everyone should be receiving your reply.\n\
    \n### Using the Forward Button\n\nSometimes, you get an email that you want to\
    \ send to someone else. The **Forward** command will let you do that (see the\
    \ “E-Mail Attachments” section in this chapter for more about working with attachments).\n\
    \n**NOTE:** You need to forward attachments to send them to others. If you want\
    \ to send someone an attachment from an email you receive, you must choose the\
    \ **Forward** option. (Note that choosing the **Reply** and **Reply All** options\
    \ will not include the original email attachment(s) in your outgoing message.)\n\
    \nWhen you touch the **Forward** button, you may be prompted to address whether\
    \ you want to **Include or Don’t Include** the attachments from the original message.\n\
    \nAt this point, you follow the same steps described previously to type your message,\
    \ add addressees, and send it."
