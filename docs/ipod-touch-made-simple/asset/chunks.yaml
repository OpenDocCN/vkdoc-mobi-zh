  trans: '

    ### 云端的 iTunes


    iCloud 还包含了 *云端的 iTunes* 功能，可让你重新下载之前购买过的应用。在某些国家/地区，它甚至允许你重新下载 iBooks、音乐乃至电视节目。这意味着你可以随时将其下载到
    iPod touch 上，在不需要时删除，然后想要时再次重新下载。


    若要详细了解如何从 iTunes 重新下载文件，请参阅第 21 章：“设备上的 iTunes”、第 22 章：“神奇的应用商店”以及第 12 章：“iBooks
    与电子书”。


    你还可以设置你的 iPod touch，使其自动下载任何与你的 iTunes 账户相关联的设备或电脑上购买的新应用、iBooks、订阅的报刊杂志、音乐和电视节目。如果你在
    PC 上购买了一首新歌，或在 iPod touch 上购买了一个新应用，那么这首歌或应用也会立即下载并显示在你的 iPod touch 上。


    请按照以下步骤开启自动下载：


    1. 启动 `设置`。

    2. 轻点 `商店`。

    3. 将 `音乐`、`应用` 和 `图书` 切换为 `开启`。


    ![images](img/p97-01.jpg)


    ### 电脑端的 iCloud


    iCloud 不仅仅能在你的 iPod touch 和 Apple 服务器之间，或是在你的 iOS 设备之间同步信息。它还可以在你的 iPod touch
    与 Windows 或 Mac PC 之间同步信息。


    如果你是 Windows 用户，可以在 `适用于 Windows 的 iCloud 控制面板` 中打开或关闭多个应用和服务的同步功能（请参阅图 3–1）。可以同步的应用和服务包括
    `邮件`、`通讯录`、`日历与任务` 和 `提醒事项` 等。


    ![images](img/0301.jpg)


    **图 3–1.** *适用于 Windows 的 iCloud 控制面板*


    如果你是 Mac OS X 用户，则可以在 OS X 7.2 的 `Lion iCloud 系统设置` 面板中打开或关闭这些选项（请参阅图 3–2）。


    ![images](img/0302.jpg)


    **图 3–2.** *Mac 的 `Lion iCloud 系统设置` 面板（OS X 7.2）*


    应用的自动下载、图书、音乐和其他下载内容可以在 `iTunes` 应用的 `商店偏好设置` 屏幕中打开或关闭（请参阅图 3–3）。


    ![images](img/0303.jpg)


    **图 3–3.** *`iTunes` 的 `商店偏好设置` 屏幕*


    ### 与 iTunes 同步


    在开始使用 `iTunes` 进行同步之前，你需要做好几项准备。在接下来的章节中，我们将介绍这些先决条件，并就使用 iTunes 的原因回答一些常见问题。同时，我们还将帮助你了解，如果你拥有另一台
    Apple 设备（例如 iPhone 或 iPad）并开始与你的 iPod touch 同步，会发生什么。


    #### 先决条件


    在将你的 iPod touch 与 `iTunes` 同步之前，你只要完成以下几项操作：


    **提示：** 如果你已经按照第 1 章：“入门”中的所有步骤操作，那么你可能已经完成了下面列出的步骤，并且完成了通讯录、日历、书签、备忘录和电子邮件帐户与
    iPod touch 的初始同步。如果是这样，你可以直接跳到本章后面的“应用：同步与管理”部分。


    1. 确保你的电脑上安装了 10.5 或更高版本的 `iTunes` 应用。有关安装或更新 `iTunes` 的帮助信息，请参阅第 21 章：“设备上的 iTunes”。

    2. 确保你手头有你的 iTunes 账户 ID。这是你用来从 iTunes 购买音乐、应用和其他内容的电子邮件地址和密码。

    3. 取出 iPod touch 附带的白色同步线缆。一端插入 iPod touch 底部靠近 `主屏幕` 按钮的位置，另一端插入电脑的 USB 端口。


    #### 使用 iTunes 同步 iPhone 或 iPad *以及* 你的 iPod touch？


    你可能会想知道，是否可以同步 iTunes 与多个设备，例如你的 iPhone 或 iPad 以及你的 iPod touch。是的，可以！只要同步到同一台电脑，你就可以将多个
    Apple 设备（Apple 表示最多五台，但我们听说过有人同步了更多设备）同步到单台电脑上的同一个 iTunes 帐户。


    **警告：** 你不能将同一台 iPod touch、iPad 或 iPhone 同步到两台不同的电脑。如果你尝试这样做，你将看到类似如下的信息：“是否要抹掉此设备（iPod
    touch、iPad、iPhone）并重新同步新的资料库？”如果你回答 `是`，设备上的所有音乐和视频将被抹去。


    #### 还有其他同步方法——我应该使用 iTunes 吗？


    iCloud 既免费，又是让你的 iPod touch 与其他设备保持同步的最简单方式，而 `iTunes` 则可以帮助你处理 iCloud 尚不支持的大文件、电影和其他内容。你也可以使用其他方法来同步特定数据，例如你的个人信息和电子邮件（包括
    Exchange/Google）。但请记住，即使你选择了这些其他方法中的一种，你仍然需要使用 iCloud 和/或 `iTunes` 来完成以下操作：


    * 在 iPod touch 上备份和恢复文件与数据

    * 更新 iPod touch 操作系统软件

    * 同步和管理你的应用程序（应用）

    * 同步你的音乐资料库和播放列表

    * 同步电影、电视节目、播客和 iTunes U 内容

    * 同步图书

    * 同步照片


    表 3–1 总结了你的同步选项。你选择哪种同步方法，应取决于你当前存储电子邮件、通讯录和日历的位置、你的使用环境，以及你是否希望进行无线同步。


    **注意：** 某些环境允许你对 iPod touch 进行通讯录和日历的无线同步。


    ![images](img/t0301.jpg)

    ![images](img/t0301a.jpg)


    ### 设置你的 iTunes 同步


    接下来，我们将向你展示使用 `iTunes` 应用对 iPod touch 执行自动同步和手动传输信息的全部步骤。

    '
- fmt: "#### The `iPod touch` Summary Screen\n\nThe `iPod touch`'s **Summary** tab\
    \ in `iTunes` is where you see and update your version of your `iPod touch` operating\
    \ system software. It also contains an important switch related to syncing music,\
    \ video, and other content. This tab is also where you can choose to automatically\
    \ open `iTunes` (to sync) whenever you connect your `iPod touch` to your computer.\n\
    \nOnce you connect your `iPod touch` to your computer, you can see important information,\
    \ like your `iPod touch`'s memory capacity, installed software version, and serial\
    \ number (see [Figure 3–4](#Chapter03.html#fig_3_4)). You can also check for updates\
    \ to the software version, restore data to your `iPod touch`, and choose from\
    \ the several options available on this screen. In particular, you can decide\
    \ whether you want to **Manually manage music and videos** using the checkbox\
    \ at the bottom of this screen.\n\n![images](images/0304.jpg)\n\n**Figure 3–4.**\
    \ *The `iPod touch`'s **Summary** screen in `iTunes`*\n\nFollow these steps to\
    \ see the **Summary** screen:\n\n1.  Start the `iTunes` software on your computer.\n\
    2.  Connect your `iPod touch` to your computer with the white USB cable supplied\
    \ with the device. Plug one end into the bottom of the `iPod touch` near the **Home**\
    \ button and the other end into a USB port on your computer.\n3.  If you've successfully\
    \ connected your `iPod touch`, you should see your `iPod touch` listed under **DEVICES**\
    \ in the left nav bar.\n4.  Click your `iPod touch` in the left nav bar, and then\
    \ click the **Summary** tab on the top-left edge of the main window.\n5.  If you\
    \ want to be able to drag and drop music and videos onto your `iPod touch`, check\
    \ the box next to **Manually manage music and videos**.\n6.  If you want to have\
    \ `iTunes` open and sync your `iPod touch` automatically whenever you connect\
    \ it to your computer, check the box next to **Open iTunes when this iPod touch\
    \ is connected.**\n\n**TIP:** Note that the `iTunes` software might not be installed\
    \ on your primary computer (the one you use for syncing). For example, it might\
    \ be installed on a second computer that you use for charging your `iPod touch`.\
    \ If so, you should check the box next to **Manually manage music and videos**\
    \ and uncheck the box next to **Open iTunes when this iPod touch is connected.**\n\
    \n#### Getting to the Sync Setup Screen (Info Tab)\n\nLet's assume you want to\
    \ get to the **Info** tab, which is the setup screen for syncing your contacts,\
    \ calendar, email, and so forth. To do so, you follow the same steps described\
    \ previously for getting to the **Summary** screen, except now you click the **Info**\
    \ tab at the top to see the Contacts (and other sync settings) in the main `iTunes`\
    \ window (see [Figure 3–5](#Chapter03.html#fig_3_5)).\n\n![images](images/0305.jpg)\n\
    \n**Figure 3–5.** *The `iTunes` ' **Info** tab, where you set up contacts, calendar,\
    \ bookmarks, and more*\n\n**NOTE:** If you are already set up to sync your information\
    \ using `iCloud`, you will see this warning and not be able to use `iTunes`, because\
    \ `iCloud` already is syncing your information. If you see this warning, then\
    \ you can skip syncing Mail, Contacts and Calendars using `iTunes`.\n\n![images](images/p104-01.jpg)\n\
    \n#### Sync Your Contacts\n\nLet's start by setting up syncing for your contacts.\
    \ The first step is to choose a service to sync with. To do so, check the box\
    \ next to **Sync Contacts with** and adjust the pull-down menu to the software\
    \ or service where your contacts are stored. At publication time, you have several\
    \ syncing options on a Windows computer: `Outlook`, `Google Contacts`, `Windows\
    \ Contacts`, and the `Yahoo! Address Book`.\n\n**CAUTION:** Whenever you switch\
    \ between a software or service (called the *sync provider*) in these sync settings\
    \ screens, it affects every one of the mobile devices connected to your `iTunes`\
    \ account. For example, if you sync contacts to your `iPad` or `iPod touch`, these\
    \ changes will also affect `MobileMe`. You will be changing the way contacts sync\
    \ for any other devices connected to your `iTunes` account.\n\n![images](images/p105-01.jpg)\n\
    \n##### Syncing with `Google Contacts`\n\nIf you select `Google Contacts`, you'll\
    \ be prompted to enter your Google ID and password. To change your Google ID or\
    \ password, click the **Configure** button next to the **Sync Contacts with**\
    \ option you saw at the top of this section.\n\n##### Syncing with the `Yahoo!\
    \ Address Book`\n\nIf you select `Yahoo! Contacts`, you'll be prompted to enter\
    \ your Yahoo! ID and password. To change your Yahoo! ID or password, click the\
    \ **Configure** button next to the **Sync Contacts with** option you saw at the\
    \ top of this section.\n\n**NOTE:** The options you see in this and other drop-down\
    \ boxes on the **Info** tab will vary slightly, depending on the software installed\
    \ on your computer. For example, on a `Mac` the contacts sync does not have a\
    \ drop-down list; instead the other services, such as `Google Contacts` and `Yahoo!`,\
    \ are shown as separate checkboxes.\n\nOnce you select a service or app to sync\
    \ with, you're ready to follow through on syncing your contacts:\n\n1.  Select\
    \ which contacts you will sync with from either of these options:\n    *   **All\
    \ Contacts:** Sync all contacts in your address book (this is the default).\n\
    \    *   **Selected Groups:** Sync contacts only within specific groups that you\
    \ check in the window below.\n2.  You will see a checkbox that says **Add contacts\
    \ created outside of groups on this iPod touch to** (select a group from the drop-down\
    \ list). This option lets you specify a new group for any new contacts you add\
    \ on your `iPod touch` that you don't explicitly assign to a group.\n3.  Scroll\
    \ down the page to continue setting up your calendar, email, and more.\n4.  If\
    \ you don't want to set up anything else for syncing, click the **Apply** button\
    \ in the lower-right corner of the `iTunes` screen to start the sync.\n\n**NOTE:**\
    \ Depending on how many contacts you have, the initial sync could take longer\
    \ than 10 minutes, and may even require 30 or more minutes. So you may want to\
    \ do this sync when you can let your `iPod touch` sit for as long as it takes\
    \ (e.g., during lunch or after dinner).\n\n#### Syncing Your Calendar\n\nSyncing\
    \ your calendar is similar to syncing your contacts. Follow these steps to do\
    \ so:\n\n1.  Within the same **Info** tab, scroll down to see the calendar sync\
    \ set up.\n2.  Check the box next to **Sync Calendars with** and adjust the pull-down\
    \ menu to the software or service that stores your calendars. This might be `Outlook`\
    \ or another application on a Windows computer, and `iCal` on a `Mac`.\n3.  Select\
    \ either of these options:\n    *   **All Calendars:** Syncs all calendars (this\
    \ is the default).\n    *   **Selected Calendars:** Syncs only calendars you've\
    \ checked in the window below.\n4.  If you want to save space on your `iPod touch`,\
    \ click the checkbox next to **Do not sync events older than 30 days.** You can\
    \ adjust the days up or down to fit your needs.\n5.  Scroll down the page to continue\
    \ setting up email accounts, bookmarks and more.\n6.  If you don't want to set\
    \ up anything else for syncing, click the **Apply** button in the lower-right\
    \ corner of the `iTunes` screen to start the sync."
  raw: "#### The iPod touch Summary Screen\n\nThe iPod touch's **Summary** tab in\
    \ **iTunes** is where you see and update your version of your iPod touch operating\
    \ system software. It also contains an important switch related to syncing music,\
    \ video, and other content. This tab is also where you can choose to automatically\
    \ open **iTunes** (to sync) whenever you connect your iPod touch to your computer.\n\
    \nOnce you connect your iPod touch to your computer, you can see important information,\
    \ like your iPod touch's memory capacity, installed software version, and serial\
    \ number (see [Figure 3–4](#Chapter03.html#fig_3_4)). You can also check for updates\
    \ to the software version, restore data to your iPod touch, and choose from the\
    \ several options available on this screen.\n\nIn particular, you can decide whether\
    \ you want to **Manually manage music and videos** using the checkbox at the bottom\
    \ of this screen.\n\n![images](images/0304.jpg)\n\n**Figure 3–4.** *The iPod touch's\
    \ **Summary** screen in **iTunes***\n\nFollow these steps to see the **Summary**\
    \ screen:\n\n1.  Start the **iTunes** software on your computer.\n2.  Connect\
    \ your iPod touch to your computer with the white USB cable supplied with the\
    \ device. Plug one end into the bottom of the iPod touch near the **Home** button\
    \ and the other end into a USB port on your computer.\n3.  If you've successfully\
    \ connected your iPod touch, you should see your iPod touch listed under **DEVICES**\
    \ in the left nav bar.\n4.  Click your iPod touch in the left nav bar, and then\
    \ click the **Summary** tab on the top-left edge of the main window.\n5.  If you\
    \ want to be able to drag and drop music and videos onto your iPod touch, check\
    \ the box next to **Manually manage music and videos**.\n6.  If you want to have\
    \ **iTunes** open and sync your iPod touch automatically whenever you connect\
    \ it to your computer, check the box next to **Open iTunes when this iPod touch\
    \ is connected.**\n\n**TIP:** Note that the **iTunes** software might not be installed\
    \ on your primary computer (the one you use for syncing). For example, it might\
    \ be installed on a second computer that you use for charging your iPod touch.\
    \ If so, you should check the box next to **Manually manage music and videos**\
    \ and uncheck the box next to **Open iTunes when this iPod touch is connected.**\n\
    \n#### Getting to the Sync Setup Screen (Info Tab)\n\nLet's assume you want to\
    \ get to the **Info** tab, which is the setup screen for syncing your contacts,\
    \ calendar, email, and so forth. To do so, you follow the same steps described\
    \ previously for getting to the **Summary** screen, except now you click the **Info**\
    \ tab at the top to see the Contacts (and other sync settings) in the main **iTunes**\
    \ window (see [Figure 3–5](#Chapter03.html#fig_3_5)).\n\n![images](images/0305.jpg)\n\
    \n**Figure 3–5.** *The **iTunes** ' **Info** tab, where you set up contacts, calendar,\
    \ bookmarks, and more*\n\n**NOTE:** If you are already set up to sync your information\
    \ using iCloud, you will see this warning and not be able to use iTunes, because\
    \ iCloud already is syncing your information. If you see this warning, then you\
    \ can skip syncing Mail, Contacts and Calendars using iTunes.\n\n![images](images/p104-01.jpg)\n\
    \n#### Sync Your Contacts\n\nLet's start by setting up syncing for your contacts.\
    \ The first step is to choose a service to sync with. To do so, check the box\
    \ next to **Sync Contacts with** and adjust the pull-down menu to the software\
    \ or service where your contacts are stored. At publication time, you have several\
    \ syncing options on a Windows computer: Outlook, Google Contacts, Windows Contacts,\
    \ and the Yahoo! Address Book.\n\n**CAUTION:** Whenever you switch between a software\
    \ or service (called the *sync provider*) in these sync settings screens, it affects\
    \ every one of the mobile devices connected to your iTunes account. For example,\
    \ if you sync contacts to your iPad or iPod touch, these changes will also affect\
    \ MobileMe. You will be changing the way contacts sync for any other devices connected\
    \ to your iTunes account.\n\n![images](images/p105-01.jpg)\n\n##### Syncing with\
    \ Google Contacts\n\nIf you select **Google Contacts**, you'll be prompted to\
    \ enter your Google ID and password.\n\nTo change your Google ID or password,\
    \ click the **Configure** button next to the **Sync Contacts with** option you\
    \ saw at the top of this section.\n\n##### Syncing with the Yahoo! Address Book\n\
    \nIf you select **Yahoo! Contacts**, you'll be prompted to enter your Yahoo! ID\
    \ and password.\n\nTo change your Yahoo! ID or password, click the **Configure**\
    \ button next to the **Sync Contacts with** option you saw at the top of this\
    \ section.\n\n**NOTE:** The options you see in this and other drop-down boxes\
    \ on the **Info** tab will vary slightly, depending on the software installed\
    \ on your computer. For example, on a Mac the contacts sync does not have a drop-down\
    \ list; instead the other services, such as Google Contacts and Yahoo!, are shown\
    \ as separate checkboxes.\n\nOnce you select a service or app to sync with, you're\
    \ ready to follow through on syncing your contacts:\n\n1.  Select which contacts\
    \ you will sync with from either of these options:\n\n    *   **All Contacts:**\
    \ Sync all contacts in your address book (this is the default).\n    *   **Selected\
    \ Groups:** Sync contacts only within specific groups that you check in the window\
    \ below.\n2.  You will see a checkbox that says **Add contacts created outside\
    \ of groups on this iPod touch to** (select a group from the drop-down list).\
    \ This option lets you specify a new group for any new contacts you add on your\
    \ iPod touch that you don't explicitly assign to a group.\n3.  Scroll down the\
    \ page to continue setting up your calendar, email, and more.\n4.  If you don't\
    \ want to set up anything else for syncing, click the **Apply** button in the\
    \ lower-right corner of the **iTunes** screen to start the sync.\n\n**NOTE:**\
    \ Depending on how many contacts you have, the initial sync could take longer\
    \ than 10 minutes, and may even require 30 or more minutes. So you may want to\
    \ do this sync when you can let your iPod touch sit for as long as it takes (e.g.,\
    \ during lunch or after dinner).\n\n#### Syncing Your Calendar\n\nSyncing your\
    \ calendar is similar to syncing your contacts. Follow these steps to do so:\n\
    \n1.  Within the same **Info** tab, scroll down to see the calendar sync set up.\n\
    2.  Check the box next to **Sync Calendars with** and adjust the pull-down menu\
    \ to the software or service that stores your calendars. This might be **Outlook**\
    \ or another application on a Windows computer, and **iCal** on a Mac.\n3.  Select\
    \ either of these options:\n\n    *   **All Calendars:** Syncs all calendars (this\
    \ is the default).\n    *   **Selected Calendars**: Syncs only calendars you've\
    \ checked in the window below.\n4.  If you want to save space on your iPod touch,\
    \ click the checkbox next to **Do not sync events older than 30 days.** You can\
    \ adjust the days up or down to fit your needs.\n5.  Scroll down the page to continue\
    \ setting up email accounts, bookmarks and more.\n6.  If you don't want to set\
    \ up anything else for syncing, click the **Apply** button in the lower-right\
    \ corner of the **iTunes** screen to start the sync."
  trans: "\n#### `iPod touch` 摘要屏幕\n\n`iTunes` 中的 `iPod touch` **摘要**选项卡用于查看和更新 `iPod\
    \ touch` 操作系统的版本。它还包含一个与同步音乐、视频及其他内容相关的重要开关。在此选项卡中，您还可以选择每当将 `iPod touch` 连接到电脑时，是否自动打开\
    \ `iTunes`（以进行同步）。\n\n将 `iPod touch` 连接到电脑后，您可以看到重要信息，例如 `iPod touch` 的存储容量、已安装的软件版本和序列号（参见图\
    \ 3–4）。您还可以检查软件版本更新、将数据恢复到 `iPod touch`，并从该屏幕上的几个可用选项中进行选择。特别是，您可以使用此屏幕底部的复选框来决定是否要**手动管理音乐和视频**。\n\
    \n![images](img/0304.jpg)\n\n**图 3–4.** *`iTunes` 中 `iPod touch` 的**摘要**屏幕*\n\n\
    按照以下步骤查看**摘要**屏幕：\n\n1.  在您的电脑上启动 `iTunes` 软件。\n2.  使用设备附带的白色 USB 数据线将 `iPod touch`\
    \ 连接到电脑。将数据线一端插入靠近**主屏幕**按钮的 `iPod touch` 底部，另一端插入电脑的 USB 端口。\n3.  如果您已成功连接 `iPod\
    \ touch`，您应该会在左侧导航栏的**设备**下看到列出的 `iPod touch`。\n4.  在左侧导航栏中单击您的 `iPod touch`，然后单击主窗口左上角的**摘要**选项卡。\n\
    5.  如果您希望能够将音乐和视频拖放到 `iPod touch` 上，请选中**手动管理音乐和视频**旁边的复选框。\n6.  如果您希望每当将 `iPod\
    \ touch` 连接到电脑时，`iTunes` 自动打开并同步，请选中**此 iPod touch 连接时打开 iTunes** 旁边的复选框。\n\n\
    **提示：**请注意，`iTunes` 软件可能未安装在您（用于同步的）主电脑上。例如，它可能安装在您用来给 `iPod touch` 充电的第二台电脑上。如果是这种情况，您应选中**手动管理音乐和视频**旁边的复选框，并取消选中**此\
    \ iPod touch 连接时打开 iTunes** 旁边的复选框。\n\n#### 进入同步设置屏幕（信息选项卡）\n\n假设您想要进入**信息**选项卡，这是用于同步联系人、日历、电子邮件等的设置屏幕。为此，您可以按照前面介绍进入**摘要**屏幕的相同步骤进行操作，但现在单击顶部的**信息**选项卡，即可在\
    \ `iTunes` 主窗口中查看联系人（以及其他同步设置）（参见图 3–5）。\n\n![images](img/0305.jpg)\n\n**图 3–5.**\
    \ *`iTunes` 的**信息**选项卡，您可在此设置联系人、日历、书签等*\n\n**注意：**如果您已设置使用 `iCloud` 同步信息，您将看到此警告，并且无法使用\
    \ `iTunes`，因为 `iCloud` 已在同步您的信息。如果您看到此警告，则可跳过使用 `iTunes` 同步邮件、通讯录和日历。\n\n![images](img/p104-01.jpg)\n\
    \n#### 同步您的联系人\n\n让我们从设置同步联系人开始。第一步是选择要与之同步的服务。为此，请选中**同步联系人来源**旁边的复选框，并在下拉菜单中选择存储您联系人的软件或服务。在本书出版时，您在\
    \ Windows 电脑上有几种同步选项：`Outlook`、`Google 通讯录`、`Windows 联系人`和 `Yahoo! 通讯录`。\n\n**警告：**每当您在这些同步设置屏幕中切换软件或服务（称为*同步提供者*）时，都会影响连接到您\
    \ `iTunes` 帐户的每一个移动设备。例如，如果您将联系人同步到您的 `iPad` 或 `iPod touch`，这些更改也会影响 `MobileMe`。您将更改连接到您\
    \ `iTunes` 帐户的任何其他设备同步联系人的方式。\n\n![images](img/p105-01.jpg)\n\n##### 与 `Google\
    \ 通讯录` 同步\n\n如果您选择 `Google 通讯录`，系统将提示您输入您的 Google ID 和密码。要更改您的 Google ID 或密码，请单击本节顶部看到的**同步联系人来源**选项旁边的**配置**按钮。\n\
    \n##### 与 `Yahoo! 通讯录` 同步\n\n如果您选择 `Yahoo! 通讯录`，系统将提示您输入您的 Yahoo! ID 和密码。要更改您的\
    \ Yahoo! ID 或密码，请单击本节顶部看到的**同步联系人来源**选项旁边的**配置**按钮。\n\n**注意：**您在此处以及**信息**选项卡中其他下拉框中看到的选项会略有不同，具体取决于您电脑上安装的软件。例如，在\
    \ `Mac` 上，联系人同步没有下拉列表；而是将 `Google 通讯录`和 `Yahoo!` 等其他服务显示为单独的复选框。\n\n选择要与之同步的服务或应用后，您就可以继续完成同步联系人了：\n\
    \n1.  从以下选项中选择要同步的联系人：\n    *   **所有联系人：**同步通讯录中的所有联系人（此为默认设置）。\n    *   **所选群组：**仅同步您在下方窗口中勾选的特定群组内的联系人。\n\
    2.  您将看到一个复选框，内容为**将此 iPod touch 上群组外部创建的联系人添加到**（从下拉列表中选择一个群组）。此选项允许您为在 `iPod\
    \ touch` 上添加的、未明确分配到任何群组的新联系人指定一个新群组。\n3.  向下滚动页面，继续设置日历、电子邮件等。\n4.  如果您不想设置其他同步内容，请单击\
    \ `iTunes` 屏幕右下角的**应用**按钮以开始同步。\n\n**注意：**根据您拥有的联系人数量，首次同步可能需要超过 10 分钟，甚至可能需要\
    \ 30 分钟或更长时间。因此，您可能希望选择一个能够将 `iPod touch` 放置足够长时间的时间段来执行此同步（例如，午餐时间或晚餐后）。\n\n\
    #### 同步您的日历\n\n同步日历与同步联系人类似。按照以下步骤操作：\n\n1.  在同一个**信息**选项卡中，向下滚动以查看日历同步设置。\n2.\
    \  选中**同步日历来源**旁边的复选框，并在下拉菜单中选择存储您日历的软件或服务。在 Windows 电脑上，这可能是 `Outlook` 或其他应用程序；在\
    \ `Mac` 上，则是 `iCal`。\n3.  选择以下任一选项：\n    *   **所有日历：**同步所有日历（此为默认设置）。\n    * \
    \  **所选日历：**仅同步您在下方窗口中勾选的日历。\n4.  如果您想在 `iPod touch` 上节省空间，请单击**不同步超过 30 天的事件**旁边的复选框。您可以根据需要向上或向下调整天数。\n\
    5.  向下滚动页面，继续设置电子邮件帐户、书签等。\n6.  如果您不想设置其他同步内容，请单击 `iTunes` 屏幕右下角的**应用**按钮以开始同步。\n"
- fmt: "### Syncing Email Accounts\n\nScroll down the page to sync email account settings.\n\
    \n**NOTE:** After syncing the email account settings to your iPod touch, you'll\
    \ still have to enter your password for each email account in `Settings`→`Mail,\
    \ Contacts, Calendar`. You have to do this only once on your iPod touch for each\
    \ account.\n\nFollow these steps to do so:\n\n1. Scroll down below the `Calendar`\
    \ settings on the same `Info` tab in `iTunes` to see the `Mail` account settings.\n\
    2. Check the box next to `Sync Mail Accounts from` and adjust the pull-down menu\
    \ to the software or service that stores your email (see [Figure 3–6](#Chapter03.html#fig_3_6)).\
    \ This might be `Outlook` on a Windows computer, or `Entourage` or `Mail` on a\
    \ Mac.\n\n   ![images](images/0306.jpg)\n\n   **Figure 3–6.** *Setting up email\
    \ accounts to sync*\n\n3. Scroll down the page to continue setting up bookmarks,\
    \ notes, and more.\n4. If you do not want to set anything else up for sync, then\
    \ click the `Apply` button in the lower-right corner of the `iTunes` screen to\
    \ start the sync.\n\n### Syncing Bookmarks and Notes\n\nOne great feature of the\
    \ iTunes sync is that you can sync the browser bookmarks from your computer to\
    \ your iPod touch. This allows you to start browsing on your iPod touch with all\
    \ your favorite sites immediately. You can also sync your notes from your computer\
    \ to your iPod touch and keep them up-to-date in both places using `iTunes`.\n\
    \n**NOTE:** At the time of writing, `iTunes` supports only two web browsers for\
    \ synchronization: `Microsoft Internet Explorer` and `Apple Safari`. If you use\
    \ `Mozilla Firefox` or `Google Chrome`, you can still sync your bookmarks, but\
    \ you'll have to install free bookmark syncing software (such as `xmarks` from\
    \ [`www.xmarks.com`](http://www.xmarks.com)) to sync from `Firefox` or `Chrome`\
    \ to `Safari` or `Explorer`. Once you install this software, you can sync your\
    \ browser bookmarks in a simple, two-step process. `Firefox`'s `Home` app is a\
    \ nice option for syncing bookmarks for `Firefox` users (visit [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation)).\n\
    \n### Syncing Your iPod touch with iTunes\n\nThe syncing process is normally automatic\
    \ when you plug in your iPod touch to your computer's USB port. The only exception\
    \ is if you have disabled the automatic sync feature.\n\n#### Sync Apps in iTunes\n\
    \nFollow these steps to sync and manage apps with the `iTunes` app:\n\n1. As you\
    \ did to set up the sync previously, connect your iPod touch to your computer,\
    \ start `iTunes`, and click your iPod touch in the left nav bar.\n2. Click the\
    \ `Apps` tab on the top of the main window.\n3. Click the checkbox next to `Sync\
    \ Apps` to see all apps stored on your iPod touch and your `Home` screens, as\
    \ shown in [Figure 3–7](#Chapter03.html#fig_3_7).\n\n![images](images/0307.jpg)\n\
    \n**Figure 3–7.** *The `Sync Apps` screen in `iTunes`*\n\n#### Move Apps, Work\
    \ with Folders, or Delete App Icons\n\nIt is very easy to move around and organize\
    \ your application icons in `iTunes`' `Sync Apps` screen (again, see [Figure 3–7](#Chapter03.html#fig_3_7)).\
    \ Try these actions to accomplish various tasks:\n\n- **Move an app within a screen**:\
    \ Click it and drag it around the screen. If you want to select more than one\
    \ app at a time, you can press and hold the `Ctrl` key (Windows) or `Command`\
    \ key (Mac) and click to select.\n- **Move an app between Home screen pages**:\
    \ Click and drag it to the new page in the right column. The new page will expand\
    \ in the main screen. Drop the icon onto the main screen.\n- **Dock an app on\
    \ the bottom dock:** Click and drag it down to drop it on the Bottom Dock. If\
    \ there are already four icons on the bottom dock, you'll need to drag one off\
    \ to make room for the new icon. Only four icons are allowed.\n- **Create a new\
    \ folder:** Drag and drop one icon onto another icon.\n- **Move an app into an\
    \ existing folder:** Drag and drop the icon onto the `Folder` icon.\n- **Move\
    \ an app out of a folder:** Click the folder to open it. Next, drag and drop the\
    \ icon outside of that folder.\n- **View another Home screen page:** Click that\
    \ page in the right column.\n- **Delete an app:** Click it, and then click the\
    \ little `x` in the upper-left corner. You can only delete apps you have installed.\
    \ You won't see an `x` on preinstalled apps like `iTunes`.\n- **Delete a folder:**\
    \ Remove all apps from that folder (drag them out) and it will disappear.\n\n\
    #### Removing or Reinstalling Apps\n\nTo remove an app from your iPod touch, simply\
    \ uncheck the box next to it and confirm your selection.\n\n**TIP:** Even if you\
    \ delete an app from your iPod touch, you can still reinstall that app by rechecking\
    \ the box next to it, as long as you have chosen to sync apps. The app will be\
    \ reloaded onto your iPod touch during the next sync.\n\n### Syncing Media and\
    \ More\n\nNow let's look at how to set up an automatic sync for music, movies,\
    \ iBooks, iTunes U content, and more.\n\n**CAUTION:** Make sure you're logged\
    \ into `iTunes` with the same iTunes account you want to use on your iPod touch\
    \ as Digital Rights Management (DRM)-protected content (e.g., music, videos, and\
    \ so on). Your content won't sync unless both accounts match. You can log out\
    \ and log into the iTunes service on both your desktop and your iPod touch if\
    \ you have to make sure you are logged into the right accounts.\n\n#### Syncing\
    \ Ring tones\n\nWhen you click the `Tones` tab, you can choose to sync your entire\
    \ ringtone library or selected items:\n\n1. Connect your iPod touch to your computer,\
    \ start `iTunes`, and click your iPod touch in the left nav bar.\n2. Click the\
    \ `Tones` tab at the top of the main window.\n3. Check the box next to `Sync Tones`,\
    \ as shown to the right.\n\n   ![images](images/p111-01.jpg)\n\n4. The default\
    \ is to sync `All tones`. To sync only specific ones, click the radio button next\
    \ to `Selected tones`.\n5. When you are done with your selections, click the `Apply`\
    \ button to start the ringtone sync.\n\n#### Syncing Music\n\nWhen you click the\
    \ `Music` tab, you can choose to sync your entire music library or selected items.\n\
    \n**CAUTION:** If you have manually transferred some music, music videos, or voice\
    \ memos to your iPod touch already, you'll receive a warning message that all\
    \ existing content on your iPod touch will be removed and replaced with the selected\
    \ music library from your computer.\n\nTo sync music from your computer to your\
    \ iPod touch, follow these steps:\n\n1. Connect your iPod touch to your computer,\
    \ start `iTunes`, and click your `iPod touch` in the left nav bar.\n2. Click the\
    \ `Music` tab on the top of the main window.\n3. Check the box next to `Sync Music`.\n\
    4. Click next to `Entire music library` only if you are sure your music library\
    \ will not be too large for your iPod touch.\n5. Click next to `Selected play\
    \ lists, artists, and genres` if you are unsure whether your music library is\
    \ too large, or if you want to sync only specific playlists or artists:\n   -\
    \ You can choose whether to include music videos and voice memos by checking those\
    \ boxes.\n   - You can also automatically fill free space with songs.\n\n    \
    \ **CAUTION:** We don't recommend checking this option because it will take up\
    \ all the space in your iPod touch and leave no room for all those cool apps!\n\
    \n   - Now check off any of the play lists or artists in the two columns on the\
    \ bottom of the screen. You can even use the `Search` box at the top of the `Artists`\
    \ column to search for particular artists.\n6. When you are done with your selections,\
    \ click the `Apply` button to start the music sync."
  raw: "#### Syncing Email Accounts\n\nScroll down the page to sync email account\
    \ settings.\n\n**NOTE:** After syncing the email account settings to your iPod\
    \ touch, you'll still have to enter your password for each email account in **Settings\
    \ † Mail, Contacts, Calendar**. You have to do this only once on your iPod touch\
    \ for each account.\n\nFollow these steps to do so:\n\n1.  Scroll down below the\
    \ **Calendar** settings on the same **Info** tab in **iTunes** to see the **Mail**\
    \ account settings.\n2.  Check the box next to **Sync Mail Accounts from** and\
    \ adjust the pull-down menu to the software or service that stores your email\
    \ (see [Figure 3–6](#Chapter03.html#fig_3_6)). This might be **Outlook** on a\
    \ Windows computer, or **Entourage** or **Mail** on a Mac.\n\n    ![images](images/0306.jpg)\n\
    \n    **Figure 3–6.** *Setting up email accounts to sync*\n\n3.  Scroll down the\
    \ page to continue setting up bookmarks, notes, and more.\n4.  If you do not want\
    \ to set anything else up for sync, then click the **Apply** button in the lower-right\
    \ corner of the **iTunes** screen to start the sync.\n\n#### Syncing Bookmarks\
    \ and Notes\n\nOne great feature of the iTunes sync is that you can sync the browser\
    \ bookmarks from your computer to your iPod touch. This allows you to start browsing\
    \ on your iPod touch with all your favorite sites immediately. You can also sync\
    \ your notes from your computer to your iPod touch and keep them up-to-date in\
    \ both places using **iTunes**.\n\n**NOTE:** At the time of writing, **iTunes**\
    \ supports only two web browsers for synchronization: **Microsoft Internet Explorer**\
    \ and **Apple Safari**. If you use **Mozilla Firefox** or **Google Chrome**, you\
    \ can still sync your bookmarks, but you'll have to install free bookmark syncing\
    \ software (such as **xmarks** from [`www.xmarks.com`](http://www.xmarks.com))\
    \ to sync from **Firefox** or **Chrome** to **Safari** or **Explorer**. Once you\
    \ install this software, you can sync your browser bookmarks in a simple, two-step\
    \ process. **Firefox**'s **Home** app is a nice option for syncing bookmarks for\
    \ **Firefox** users (visit [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation)).\n\
    \n### Syncing Your iPod touch with iTunes\n\nThe syncing process is normally automatic\
    \ when you plug in your iPod touch to your computer's USB port. The only exception\
    \ is if you have disabled the automatic sync feature.\n\n#### Sync Apps in iTunes\n\
    \nFollow these steps to sync and manage apps with the **iTunes** app:\n\n1.  As\
    \ you did to set up the sync previously, connect your iPod touch to your computer,\
    \ start **iTunes**, and click your iPod touch in the left nav bar.\n2.  Click\
    \ the **Apps** tab on the top of the main window.\n3.  Click the checkbox next\
    \ to **Sync Apps** to see all apps stored on your iPod touch and your **Home**\
    \ screens, as shown in [Figure 3–7](#Chapter03.html#fig_3_7).\n\n![images](images/0307.jpg)\n\
    \n**Figure 3–7.** *The **Sync Apps** screen in **iTunes***\n\n#### Move Apps,\
    \ Work with Folders, or Delete App Icons\n\nIt is very easy to move around and\
    \ organize your application icons in **iTunes** ' **Sync Apps** screen (again,\
    \ see [Figure 3–7](#Chapter03.html#fig_3_7)). Try these actions to accomplish\
    \ various tasks:\n\n*   **Move an app within a screen**: Click it and drag it\
    \ around the screen. If you want to select more than one app at a time, you can\
    \ press and hold the Ctrl key (Windows) or Command key (Mac) and click to select.\n\
    *   **Move an app between Home screen pages**: Click and drag it to the new page\
    \ in the right column. The new page will expand in the main screen. Drop the icon\
    \ onto the main screen.\n*   **Dock an app on the bottom dock:** Click and drag\
    \ it down to drop it on the Bottom Dock. If there are already four icons on the\
    \ bottom dock, you'll need to drag one off to make room for the new icon. Only\
    \ four icons are allowed.\n*   **Create a new folder:** Drag and drop one icon\
    \ onto another icon.\n*   **Move an app into an existing folder:** Drag and drop\
    \ the icon onto the **Folder** icon.\n*   **Move an app out of a folder:** Click\
    \ the folder to open it. Next, drag and drop the icon outside of that folder.\n\
    *   **View another Home screen page:** Click that page in the right column.\n\
    *   **Delete an app:** Click it, and then click the little **x** in the upper-left\
    \ corner. You can only delete apps you have installed. You won't see an **x**\
    \ on preinstalled apps like **iTunes**.\n*   **Delete a folder:** Remove all apps\
    \ from that folder (drag them out) and it will disappear.\n\n#### Removing or\
    \ Reinstalling Apps\n\nTo remove an app from your iPod touch, simply uncheck the\
    \ box next to it and confirm your selection.\n\n**TIP:** Even if you delete an\
    \ app from your iPod touch, you can still reinstall that app by rechecking the\
    \ box next to it, as long as you have chosen to sync apps. The app will be reloaded\
    \ onto your iPod touch during the next sync.\n\n### Syncing Media and More\n\n\
    Now let's look at how to set up an automatic sync for music, movies, iBooks, iTunes\
    \ U content, and more.\n\n**CAUTION:** Make sure you're logged into **iTunes**\
    \ with the same iTunes account you want to use on your iPod touch as Digital Rights\
    \ Management (DRM)-protected content (e.g., music, videos, and so on). Your content\
    \ won't sync unless both accounts match. You can log out and log into the iTunes\
    \ service on both your desktop and your iPod touch if you have to make sure you\
    \ are logged into the right accounts.\n\n#### Syncing Ring tones\n\nWhen you click\
    \ the **Tones** tab, you can choose to sync your entire ringtone library or selected\
    \ items:\n\n1.  Connect your iPod touch to your computer, start **iTunes**, and\
    \ click your iPod touch in the left nav bar.\n2.  Click the **Tones** tab at the\
    \ top of the main window.\n3.  Check the box next to **Sync Tones,** as shown\
    \ to the right.\n\n    ![images](images/p111-01.jpg)\n\n4.  The default is to\
    \ sync **All tones**. To sync only specific ones, click the radio button next\
    \ to **Selected tones**.\n5.  When you are done with your selections, click the\
    \ **Apply** button to start the ringtone sync.\n\n#### Syncing Music\n\nWhen you\
    \ click the **Music** tab, you can choose to sync your entire music library or\
    \ selected items.\n\n**CAUTION:** If you have manually transferred some music,\
    \ music videos, or voice memos to your iPod touch already, you'll receive a warning\
    \ message that all existing content on your iPod touch will be removed and replaced\
    \ with the selected music library from your computer.\n\nTo sync music from your\
    \ computer to your iPod touch, follow these steps:\n\n1.  Connect your iPod touch\
    \ to your computer, start **iTunes**, and click your **iPod touch** in the left\
    \ nav bar.\n2.  Click the **Music** tab on the top of the main window.\n3.  Check\
    \ the box next to **Sync Music**.\n4.  Click next to **Entire music library**\
    \ only if you are sure your music library will not be too large for your iPod\
    \ touch.\n5.  Click next to **Selected play lists, artists, and genres** if you\
    \ are unsure whether your music library is too large, or if you want to sync only\
    \ specific playlists or artists:\n\n    *   You can choose whether to include\
    \ music videos and voice memos by checking those boxes.\n    *   You can also\
    \ automatically fill free space with songs.\n\n        **CAUTION:** We don't recommend\
    \ checking this option because it will take up all the space in your iPod touch\
    \ and leave no room for all those cool apps!\n\n    *   Now check off any of the\
    \ play lists or artists in the two columns on the bottom of the screen. You can\
    \ even use the **Search** box at the top of the **Artists** column to search for\
    \ particular artists.\n6.  When you are done with your selections, click the **Apply**\
    \ button to start the music sync."
  trans: "\n### 同步电子邮件账户\n\n向下滚动页面以同步电子邮件账户设置。\n\n**注：** 在将电子邮件账户设置同步到 iPod touch\
    \ 后，您仍需在`设置`→`邮件、通讯录、日历`中为每个电子邮件账户输入密码。对于每个账户，您只需在 iPod touch 上执行此操作一次。\n\n请按照以下步骤操作：\n\
    \n1. 在`iTunes`的`信息`选项卡中，向下滚动到`日历`设置下方，即可看到`邮件`账户设置。\n2. 勾选`同步邮件账户自`旁边的复选框，并调整下拉菜单，选择存储您电子邮件的软件或服务（参见图\
    \ 3–6）。这可能是 Windows 电脑上的`Outlook`，或是 Mac 上的`Entourage`或`Mail`。\n\n   ![images](img/0306.jpg)\n\
    \n   **图 3–6.** *设置要同步的电子邮件账户*\n\n3. 向下滚动页面，继续设置书签、备忘录等。\n4. 如果您不想再设置其他同步内容，则点击`iTunes`屏幕右下角的`应用`按钮开始同步。\n\
    \n### 同步书签和备忘录\n\niTunes 同步的一个出色功能是，您可以将电脑上的浏览器书签同步到 iPod touch。这使您可以立即使用 iPod\
    \ touch 浏览所有喜爱的网站。您还可以通过`iTunes`将电脑上的备忘录同步到 iPod touch，并保持两处内容的最新状态。\n\n**注：**\
    \ 在撰写本文时，`iTunes`仅支持两种用于同步的网页浏览器：`Microsoft Internet Explorer`和`Apple Safari`。如果您使用`Mozilla\
    \ Firefox`或`Google Chrome`，您仍然可以同步书签，但需要安装免费的书签同步软件（例如来自[`www.xmarks.com`](http://www.xmarks.com)的`xmarks`），以便将书签从`Firefox`或`Chrome`同步到`Safari`或`Explorer`。安装此软件后，您可以通过简单的两步操作同步浏览器书签。对于`Firefox`用户来说，`Firefox`的`Home`应用是同步书签的一个不错选择（请访问[`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation)）。\n\
    \n### 使用 iTunes 同步您的 iPod touch\n\n当您将 iPod touch 插入电脑的 USB 端口时，同步过程通常是自动进行的。唯一的例外是您禁用了自动同步功能。\n\
    \n#### 在 iTunes 中同步应用\n\n请按照以下步骤使用`iTunes`应用同步和管理应用：\n\n1. 如同之前设置同步一样，将 iPod touch\
    \ 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的 iPod touch。\n2. 点击主窗口顶部的`应用`选项卡。\n3. 勾选`同步应用`旁边的复选框，即可查看存储在\
    \ iPod touch 上的所有应用以及您的`主屏幕`，如图 3–7 所示。\n\n![images](img/0307.jpg)\n\n**图 3–7.**\
    \ *`iTunes`中的`同步应用`屏幕*\n\n#### 移动应用、管理文件夹或删除应用图标\n\n在`iTunes`的`同步应用`屏幕中，移动和整理您的应用图标非常容易（同样，参见图\
    \ 3–7）。尝试以下操作来完成各种任务：\n\n- **在屏幕内移动应用**：单击应用并拖动它在屏幕上移动。如果您想一次选择多个应用，可以按住`Ctrl`键（Windows）或`Command`键（Mac）并单击选择。\n\
    - **在主屏幕页面之间移动应用**：单击并将应用拖放到右侧列中的新页面。该新页面将在主屏幕中展开。将图标放到主屏幕上。\n- **将应用固定到底部 dock**：单击并将应用向下拖放到底部\
    \ dock 上。如果底部 dock 上已有四个图标，您需要拖出一个图标为新图标腾出空间。底部 dock 最多只允许放置四个图标。\n- **创建新文件夹**：将一个图标拖放到另一个图标上。\n\
    - **将应用移入现有文件夹**：将图标拖放到`文件夹`图标上。\n- **将应用移出文件夹**：单击文件夹将其打开。然后，将图标拖放到该文件夹之外。\n\
    - **查看另一个主屏幕页面**：单击右侧列中的该页面。\n- **删除应用**：单击应用，然后单击其左上角的`x`。您只能删除自己安装的应用。在预装应用（如`iTunes`）上不会看到`x`。\n\
    - **删除文件夹**：移除该文件夹中的所有应用（将它们拖出），该文件夹将消失。\n\n#### 移除或重新安装应用\n\n要从 iPod touch 中移除应用，只需取消勾选其旁边的复选框并确认您的选择即可。\n\
    \n**提示：** 即使您从 iPod touch 中删除了应用，只要您选择了同步应用，就可以通过重新勾选其旁边的复选框来重新安装该应用。该应用将在下一次同步期间重新加载到您的\
    \ iPod touch 上。\n\n### 同步媒体及其他内容\n\n现在，让我们来看看如何为音乐、影片、iBooks、iTunes U 内容等设置自动同步。\n\
    \n**警告：** 请确保您使用要在 iPod touch 上使用的同一 iTunes 账户登录到`iTunes`，以处理受数字版权管理 (DRM) 保护的内容（例如音乐、视频等）。如果两个账户不匹配，您的内容将无法同步。如有必要，您可以在桌面电脑和\
    \ iPod touch 上都退出并重新登录 iTunes 服务，以确保登录到正确的账户。\n\n#### 同步铃声\n\n点击`铃声`选项卡后，您可以选择同步整个铃声库或选定的项目：\n\
    \n1. 将 iPod touch 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的 iPod touch。\n2. 点击主窗口顶部的`铃声`选项卡。\n\
    3. 勾选`同步铃声`旁边的复选框，如右图所示。\n\n   ![images](img/p111-01.jpg)\n\n4. 默认设置为同步`所有铃声`。要仅同步特定铃声，请点击`选定铃声`旁边的单选按钮。\n\
    5. 完成选择后，点击`应用`按钮开始同步铃声。\n\n#### 同步音乐\n\n点击`音乐`选项卡后，您可以选择同步整个音乐库或选定的项目。\n\n**警告：**\
    \ 如果您已经手动将一些音乐、音乐视频或语音备忘录传输到 iPod touch，您将收到一条警告消息，提示 iPod touch 上的所有现有内容将被移除，并替换为您电脑上选定的音乐库。\n\
    \n要将音乐从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1. 将 iPod touch 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的`iPod\
    \ touch`。\n2. 点击主窗口顶部的`音乐`选项卡。\n3. 勾选`同步音乐`旁边的复选框。\n4. 仅当您确定您的音乐库对 iPod touch\
    \ 来说不会太大时，才点击`整个音乐库`旁边的按钮。\n5. 如果您不确定音乐库是否过大，或者只想同步特定的播放列表或艺人，请点击`选定的播放列表、艺人和风格`旁边的按钮：\n\
    \   - 您可以通过勾选相应的复选框来选择是否包含音乐视频和语音备忘录。\n   - 您还可以用歌曲自动填充剩余空间。\n\n     **警告：** 我们不建议勾选此选项，因为它会占满\
    \ iPod touch 的所有空间，让您那些很酷的应用无处可放！\n\n   - 现在，在屏幕底部的两列中勾选任意播放列表或艺人。您甚至可以使用`艺人`列顶部的`搜索`框来搜索特定的艺人。\n\
    6. 完成选择后，点击`应用`按钮开始同步音乐。\n"
- fmt: "#### Syncing Movies\n\nWhen you click the `Movies` tab, you can choose to\
    \ sync specific, recent, or unwatched movies—or all of them.\n\nTo sync movies\
    \ from your computer to your iPod touch, follow these steps:\n\n1.  Connect your\
    \ iPod touch to your computer, start `iTunes`, and click your iPod touch in the\
    \ left nav bar.\n2.  Click the `Movies` tab on the top of the main window.\n3.\
    \  Check the box next to `Sync Movies` (see [Figure 3–8](#Chapter03.html#fig_3_8)).\n\
    4.  If you'd like to sync recent or unwatched movies, check the box next to `Automatically\
    \ include` and use the pull-down menu to select `All`, `1 most recent`, `All unwatched`,\
    \ `5 most recent unwatched`, and so on.\n\n    ![images](images/0308.jpg)\n\n\
    \    **Figure 3–8.** *Configuring the `Movies` tab to automatically sync selections*\n\
    \n5.  If you selected any item besides `All`, you have the choice to sync specific\
    \ movies or videos to your iPod touch. Simply check the boxes next to the movies\
    \ you want to include in the sync.\n6.  When you are done choosing movies, click\
    \ the `Apply` button to save your settings and start the sync.\n\n#### Syncing\
    \ TV Shows\n\nWhen you click the `TV Shows` tab, you can choose to sync specific,\
    \ recent, or unwatched TV shows—or all of them.\n\nTo sync TV shows from your\
    \ computer to your iPod touch, follow these steps:\n\n1.  Connect your iPod touch\
    \ to your computer, start `iTunes`, and click your iPod touch in the left nav\
    \ bar.\n2.  Click the `TV Shows` tab on the top of the main window.\n3.  Check\
    \ the box next to `Sync TV Shows`.\n4.  If you'd like to sync recent or unwatched\
    \ TV shows, check the box next to `Automatically include` and use the pull-down\
    \ menu to select `All`, `1 newest`, `All unwatched`, `5 oldest unwatched`, `10\
    \ newest unwatched`, and so on.\n5.  Choose `All Shows` or `Selected Shows` next\
    \ to `episodes of`.\n6.  If you choose `Selected Shows`, you can choose individual\
    \ shows and even individual episodes in the two sections in the middle of the\
    \ screen.\n7.  If you have playlists of TV shows, you can select those for inclusion\
    \ by checking the boxes in the bottom section of the screen.\n8.  When you are\
    \ done choosing individual TV shows, click the `Apply` button to save your settings\
    \ and start the sync.\n\n#### Syncing Podcasts\n\nWhen you click the `Podcasts`\
    \ tab, you can choose to sync specific, recent, or unplayed podcasts—or all of\
    \ them.\n\n**TIP:** Podcasts are audio or video shows that are usually regularly\
    \ scheduled (e.g., daily, weekly, or monthly). Most are free to subscribe to in\
    \ the iTunes Store. When you subscribe and set up the auto sync as shown in this\
    \ section, you'll receive all your favorite podcasts on your iPod touch.\n\nMany\
    \ of your favorite radio shows are recorded and broadcast as podcasts. We encourage\
    \ you to check out the `Podcast` section of the iTunes Store to see what might\
    \ interest you. You'll find podcasts of movie reviews, news shows, law school\
    \ test reviews, game shows, old radio shows, educational content, and much more.\n\
    \nTo sync podcasts from your computer to your iPod touch, follow these steps.\n\
    \n1.  Connect your iPod touch to your computer, start `iTunes`, and click your\
    \ `iPod touch` in the left nav bar.\n2.  Click the `Podcasts` tab on the top of\
    \ the main window.\n3.  Check the box next to `Sync Podcasts`.\n4.  If you'd like\
    \ to sync recent or unplayed podcasts, check the box next to `Automatically include`\
    \ and use the pull-down menu to select `All`, `1 newest`, `All unplayed`, `5 newest`,\
    \ `10 most recent unplayed`, and so on.\n5.  Choose `All Podcasts` or `Selected\
    \ Podcasts` next to `episodes of`.\n6.  If you choose `Selected Podcasts`, you\
    \ can choose individual podcasts and even individual episodes in the two sections\
    \ in the middle of the screen.\n7.  If you have playlists of podcasts, you can\
    \ select those for inclusion by checking the boxes in the bottom section of the\
    \ screen.\n8.  When you are done choosing podcasts, click the `Apply` button to\
    \ save your settings and start the sync.\n\n**TIP:** After you sync these podcasts,\
    \ you can enjoy them by navigating to the `Podcasts` section of the `Music` app\
    \ on your device.\n\n#### Syncing iBooks and Audiobooks\n\nWhen you click the\
    \ `Books` tab, you can choose to sync all or selected books and audiobooks.\n\n\
    **TIP:** Books on the iPod touch are electronic versions of their paper cousins.\
    \ They are in a specific electronic format called `ePub`. You can buy them in\
    \ the iBookstore on the iPod touch or acquire them from other locations and sync\
    \ them to your iPod touch using the steps described here. Books you acquire elsewhere\
    \ must be unprotected or “DRM-free” in order to sync them to your iPod touch.\
    \ You read these books in the `iBooks` app or in other book reader apps on your\
    \ iPod touch. See [Chapter 12](#Chapter12.html#ch12): “iBooks and E-Books” to\
    \ learn more.\n\nTo sync books or audiobooks between your computer and your iPod\
    \ touch, follow these steps:\n\n1.  Connect your iPod touch to your computer,\
    \ start `iTunes`, and click your `iPod touch` in the left nav bar.\n2.  Click\
    \ the `Books` tab on the top of the main window.\n3.  Check the boxes next to\
    \ `Sync Books` and `Sync Audiobooks`.\n4.  If you'd like to sync all books, leave\
    \ the default `All books` selection unchanged.\n5.  Otherwise, choose `Selected\
    \ books` and make your choices by checking specific books in the window.\n\n \
    \   **TIP:** In order to sync iBooks, PDF files, and other, similar documents\
    \ to your iPod touch, you need to first drag and drop your file from your computer\
    \ into your iTunes library. Grab the file from any folder on your computer and\
    \ drag and drop it right onto your library in the upper-left column in `iTunes`.\n\
    \n6.  If you would like to sync all audiobooks, leave the default `All audiobooks`\
    \ selection unchanged.\n7.  Otherwise, choose `Selected audiobooks` and make your\
    \ choices by checking off specific audiobooks in the window below this selection\
    \ item.\n8.  When you are done choosing individual books and audiobooks, click\
    \ the `Apply` button to save your settings and start the sync.\n\n**TIP:** After\
    \ you sync these books, you can enjoy them in the `iBooks` app on your device.\
    \ You can listen to audiobooks in the `Music` app, where the `Audiobooks` tab\
    \ is on the left side.\n\n**NOTE:** Audiobooks from Audible require that you first\
    \ authorize your computer with your Audible account before you can sync them to\
    \ your iPod touch from your computer."
  raw: "#### Syncing Movies\n\nWhen you click the **Movies** tab, you can choose to\
    \ sync specific, recent, or unwatched movies—or all of them.\n\nTo sync movies\
    \ from your computer to your iPod touch, follow these steps:\n\n1.  Connect your\
    \ iPod touch to your computer, start **iTunes**, and click your iPod touch in\
    \ the left nav bar.\n2.  Click the **Movies** tab on the top of the main window.\n\
    3.  Check the box next to **Sync Movies** (see [Figure 3–8](#Chapter03.html#fig_3_8)).\n\
    4.  If you'd like to sync recent or unwatched movies, check the box next to **Automatically\
    \ include** and use the pull-down menu to select **All**, **1 most recent**, **All\
    \ unwatched**, **5 most recent unwatched**, and so on.\n\n    ![images](images/0308.jpg)\n\
    \n    **Figure 3–8.** *Configuring the **Movies** tab to automatically sync selections*\n\
    \n5.  If you selected any item besides **All**, you have the choice to sync specific\
    \ movies or videos to your iPod touch. Simply check the boxes next to the movies\
    \ you want to include in the sync.\n6.  When you are done choosing movies, click\
    \ the **Apply** button to save your settings and start the sync.\n\n#### Syncing\
    \ TV Shows\n\nWhen you click the **TV Shows** tab, you can choose to sync specific,\
    \ recent, or unwatched TV shows—or all of them.\n\nTo sync TV shows from your\
    \ computer to your iPod touch, follow these steps:\n\n1.  Connect your iPod touch\
    \ to your computer, start **iTunes**, and click your iPod touch in the left nav\
    \ bar.\n2.  Click the **TV Shows** tab on the top of the main window.\n3.  Check\
    \ the box next to **Sync TV Shows**.\n4.  If you'd like to sync recent or unwatched\
    \ TV shows, check the box next to **Automatically include** and use the pull-down\
    \ menu to select **All**, **1 newest**, **All unwatched**, **5 oldest unwatched,\
    \ 10 newest unwatched**, and so on.\n5.  Choose **All Shows** or **Selected Shows**\
    \ next to **episodes of**.\n6.  If you choose **Selected Shows**, you can choose\
    \ individual shows and even individual episodes in the two sections in the middle\
    \ of the screen.\n7.  If you have playlists of TV shows, you can select those\
    \ for inclusion by checking the boxes in the bottom section of the screen.\n8.\
    \  When you are done choosing individual TV shows, click the **Apply** button\
    \ to save your settings and start the sync.\n\n#### Syncing Podcasts\n\nWhen you\
    \ click the **Podcasts** tab, you can choose to sync specific, recent, or unplayed\
    \ podcasts—or all of them.\n\n**TIP:** Podcasts are audio or video shows that\
    \ are usually regularly scheduled (e.g., daily, weekly, or monthly). Most are\
    \ free to subscribe to in the iTunes Store. When you subscribe and set up the\
    \ auto sync as shown in this section, you'll receive all your favorite podcasts\
    \ on your iPod touch.\n\nMany of your favorite radio shows are recorded and broadcast\
    \ as podcasts. We encourage you to check out the **Podcast** section of the iTunes\
    \ Store to see what might interest you. You'll find podcasts of movie reviews,\
    \ news shows, law school test reviews, game shows, old radio shows, educational\
    \ content, and much more.\n\nTo sync podcasts from your computer to your iPod\
    \ touch, follow these steps.\n\n1.  Connect your iPod touch to your computer,\
    \ start **iTunes**, and click your **iPod touch** in the left nav bar.\n2.  Click\
    \ the **Podcasts** tab on the top of the main window.\n3.  Check the box next\
    \ to **Sync Podcasts**.\n4.  If you'd like to sync recent or unplayed podcasts,\
    \ check the box next to **Automatically include** and use the pull-down menu to\
    \ select **All**, **1 newest**, **All unplayed**, **5 newest, 10 most recent unplayed**,\
    \ and so on.\n5.  Choose **All Podcasts** or **Selected Podcasts** next to **episodes\
    \ of**.\n6.  If you choose **Selected Podcasts**, you can choose individual podcasts\
    \ and even individual episodes in the two sections in the middle of the screen.\n\
    7.  If you have playlists of podcasts, you can select those for inclusion by checking\
    \ the boxes in the bottom section of the screen.\n8.  When you are done choosing\
    \ podcasts, click the **Apply** button to save your settings and start the sync.\n\
    \n**TIP:** After you sync these podcasts, you can enjoy them by navigating to\
    \ the **Podcasts** section of the **Music** app on your device.\n\n#### Syncing\
    \ iBooks and Audiobooks\n\nWhen you click the **Books** tab, you can choose to\
    \ sync all or selected books and audiobooks.\n\n**TIP:** Books on the iPod touch\
    \ are electronic versions of their paper cousins. They are in a specific electronic\
    \ format called *ePub*. You can buy them in the iBookstore on the iPod touch or\
    \ acquire them from other locations and sync them to your iPod touch using the\
    \ steps described here. Books you acquire elsewhere must be unprotected or “DRM-free”\
    \ in order to sync them to your iPod touch. You read these books in the **iBooks**\
    \ app or in other book reader apps on your iPod touch. See [Chapter 12](#Chapter12.html#ch12):\
    \ “iBooks and E-Books” to learn more.\n\nTo sync books or audiobooks between your\
    \ computer and your iPod touch, follow these steps:\n\n1.  Connect your iPod touch\
    \ to your computer, start **iTunes**, and click your **iPod touch** in the left\
    \ nav bar.\n2.  Click the **Books** tab on the top of the main window.\n3.  Check\
    \ the boxes next to **Sync Books** and **Sync Audiobooks**.\n4.  If you'd like\
    \ to sync all books, leave the default **All books** selection unchanged.\n5.\
    \  Otherwise, choose **Selected books** and make your choices by checking specific\
    \ books in the window.\n\n    **TIP:** In order to sync iBooks, PDF files, and\
    \ other, similar documents to your iPod touch, you need to first drag and drop\
    \ your file from your computer into your iTunes library. Grab the file from any\
    \ folder on your computer and drag and drop it right onto your library in the\
    \ upper-left column in **iTunes**.\n\n6.  If you would like to sync all audiobooks,\
    \ leave the default **All audiobooks** selection unchanged.\n7.  Otherwise, choose\
    \ **Selected audiobooks** and make your choices by checking off specific audiobooks\
    \ in the window below this selection item.\n8.  When you are done choosing individual\
    \ books and audiobooks, click the **Apply** button to save your settings and start\
    \ the sync.\n\n**TIP:** After you sync these books, you can enjoy them in the\
    \ **iBooks** app on your device. You can listen to audiobooks in the **Music**\
    \ app, where the **Audiobooks** tab is on the left side.\n\n**NOTE:** Audiobooks\
    \ from Audible require that you first authorize your computer with your Audible\
    \ account before you can sync them to your iPod touch from your computer."
  trans: "\n#### 同步影片\n\n点击 `Movies` 选项卡后，可以选择同步特定影片、近期影片、未观看影片或所有影片。\n\n要将影片从电脑同步到\
    \ iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的 iPod\
    \ touch。\n2.  点击主窗口顶部的 `Movies` 选项卡。\n3.  勾选 `Sync Movies` 旁边的复选框（参见 图 3–8）。\n\
    4.  如果您想同步近期或未观看的影片，请勾选 `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 most\
    \ recent`、`All unwatched`、`5 most recent unwatched` 等选项。\n\n    ![images](img/0308.jpg)\n\
    \n    **图 3–8.** *配置 `Movies` 选项卡以自动同步所选内容*\n\n5.  如果您选择了除 `All` 之外的任何选项，则可以选择将特定影片或视频同步到\
    \ iPod touch。只需勾选您想要包含在同步中的影片旁的复选框即可。\n6.  完成影片选择后，点击 `Apply` 按钮保存设置并开始同步。\n\n\
    #### 同步电视节目\n\n点击 `TV Shows` 选项卡后，可以选择同步特定电视节目、近期节目、未观看节目或所有节目。\n\n要将电视节目从电脑同步到\
    \ iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的 iPod\
    \ touch。\n2.  点击主窗口顶部的 `TV Shows` 选项卡。\n3.  勾选 `Sync TV Shows` 旁边的复选框。\n4.  如果您想同步近期或未观看的电视节目，请勾选\
    \ `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 newest`、`All unwatched`、`5\
    \ oldest unwatched`、`10 newest unwatched` 等选项。\n5.  在 `episodes of` 旁边选择 `All\
    \ Shows` 或 `Selected Shows`。\n6.  如果选择 `Selected Shows`，您可以在屏幕中间的两个区域中选择单个节目甚至单集。\n\
    7.  如果您有电视节目的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些播放列表。\n8.  完成单个电视节目的选择后，点击 `Apply` 按钮保存设置并开始同步。\n\
    \n#### 同步播客\n\n点击 `Podcasts` 选项卡后，可以选择同步特定播客、近期播客、未播放播客或所有播客。\n\n**提示：** 播客是音频或视频节目，通常有固定的更新周期（例如每日、每周或每月更新）。在\
    \ iTunes Store 中，大部分播客都可以免费订阅。当您订阅并按照本节所述设置自动同步后，您将在 iPod touch 上接收到所有喜爱的播客。\n\
    \n许多您喜爱的广播节目都以播客形式录制和播出。我们鼓励您查看 iTunes Store 的 `Podcast` 板块，看看有哪些内容可能让您感兴趣。您会找到电影评论、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等各类播客。\n\
    \n要将播客从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的\
    \ `iPod touch`。\n2.  点击主窗口顶部的 `Podcasts` 选项卡。\n3.  勾选 `Sync Podcasts` 旁边的复选框。\n\
    4.  如果您想同步近期或未播放的播客，请勾选 `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 newest`、`All\
    \ unplayed`、`5 newest`、`10 most recent unplayed` 等选项。\n5.  在 `episodes of` 旁边选择\
    \ `All Podcasts` 或 `Selected Podcasts`。\n6.  如果选择 `Selected Podcasts`，您可以在屏幕中间的两个区域中选择单个播客甚至单集。\n\
    7.  如果您有播客的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些播放列表。\n8.  完成播客选择后，点击 `Apply` 按钮保存设置并开始同步。\n\
    \n**提示：** 同步这些播客后，您可以导航到设备上 `Music` 应用中的 `Podcasts` 板块来收听它们。\n\n#### 同步 iBooks\
    \ 和有声读物\n\n点击 `Books` 选项卡后，可以选择同步全部或选定的图书和有声读物。\n\n**提示：** iPod touch 上的图书是其纸质版本的电子版。它们采用特定的电子格式，称为\
    \ `ePub`。您可以在 iPod touch 上的 iBookstore 中购买，也可以从其他来源获取，并使用这里描述的步骤将它们同步到 iPod touch。从其他来源获取的图书必须是无保护或“无\
    \ DRM 限制”的，才能同步到您的 iPod touch。您可以在 iPod touch 上的 `iBooks` 应用或其他图书阅读应用中阅读这些图书。更多信息请参见第\
    \ 12 章：“iBooks 和电子书”。\n\n要在电脑和 iPod touch 之间同步图书或有声读物，请按照以下步骤操作：\n\n1.  将 iPod\
    \ touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的 `iPod touch`。\n2.  点击主窗口顶部的 `Books` 选项卡。\n\
    3.  勾选 `Sync Books` 和 `Sync Audiobooks` 旁边的复选框。\n4.  如果您想同步所有图书，请保持默认选项 `All books`\
    \ 不变。\n5.  否则，选择 `Selected books`，然后通过在窗口中勾选特定图书来做出选择。\n\n    **提示：** 为了将 iBooks、PDF\
    \ 文件和其他类似文档同步到 iPod touch，您需要先将文件从电脑拖放到您的 iTunes 资料库中。从电脑上的任意文件夹中抓取文件，然后将其直接拖放到\
    \ `iTunes` 左上角列中的资料库中。\n\n6.  如果您想同步所有有声读物，请保持默认选项 `All audiobooks` 不变。\n7.  否则，选择\
    \ `Selected audiobooks`，然后通过在该选项下方的窗口中勾选特定有声读物来做出选择。\n8.  完成单个图书和有声读物的选择后，点击 `Apply`\
    \ 按钮保存设置并开始同步。\n\n**提示：** 同步这些图书后，您可以在设备上的 `iBooks` 应用中阅读它们。您可以在 `Music` 应用中收听有声读物，该应用的左侧有\
    \ `Audiobooks` 选项卡。\n\n**注意：** 来自 Audible 的有声读物，需要您先用 Audible 账户授权您的电脑，然后才能将其从电脑同步到\
    \ iPod touch。\n"
- fmt: "# Sync Photos\n\nWhen you click the **Photos** tab, you can choose to sync\
    \ photos from all folders or selected folders, and you can even include videos.\n\
    \n**TIP:** You can create a beautiful electronic picture frame and share your\
    \ photos on the iPod touch's stunning screen (see [Chapter: 19](#Chapter19.html#ch19):\
    \ “Working with Photos”). You can even use your photos to set the background wallpaper\
    \ and screen-lock wallpaper—see [Chapter 8](#Chapter08.html#ch8): “Personalize\
    \ and Secure” for more information.\n\nTo sync photos from your computer to your\
    \ iPod touch, follow these steps:\n\n1.  Connect your iPod touch to your computer,\
    \ start **iTunes**, and click your iPod touch in the left nav bar.\n\n    **TIP:**\
    \ Mac users can also sync photos using various criteria in **iPhoto**, including\
    \ Events (time-based sync), Faces (person-based sync), and Places (location-based\
    \ sync).\n\n2.  Click the **Photos** tab on the top of the main window.\n3.  Check\
    \ the box next to **Sync Photos from**.\n4.  Click the pull-down menu next to\
    \ **Sync Photos from** and select a folder from your computer where your photos\
    \ are stored. If you want to grab all your photos, go to the highest folder level\
    \ possible (e.g., `C:` on your Windows computer or your hard disk root directory\
    \ `/` on your Apple Mac).\n5.  If you'd like to sync all photos from the selected\
    \ folder on your computer, select **All folders**.\n\n    **CAUTION:** Because\
    \ your photo library on your computer may be too large to fit on your iPod touch,\
    \ be careful about checking **All folders**.\n\n6.  Otherwise, choose **Selected\
    \ folders** and make your choices by checking specific folders in the window below.\n\
    7.  You can also include any videos in the folders by checking the box next to\
    \ **Include videos**.\n8.  When you are done choosing your photos to sync, click\
    \ the **Apply** button to save your settings and start the sync.\n9.  When the\
    \ sync starts, you'll see the status in the middle-top status window in **iTunes**.\n\
    \n## Troubleshooting iTunes and the Sync\n\nSometimes **iTunes** does not behave\
    \ exactly as you'd expect it to, so here are a few simple troubleshooting tips.\n\
    \n### Check Out the Apple Knowledgebase for Helpful Articles\n\nThe first step\
    \ when you're having a problem is to check out Apple's support pages, where you'll\
    \ find lots of helpful information. On your iPod touch or computer's web browser,\
    \ go to this web page:\n\n`www.apple.com/support/iPod touch/`\n\nNext, click a\
    \ topic shown in the left nav bar.\n\n### iTunes Locked Up and Will Not Respond\
    \ (Windows Computer)\n\nSometimes, **iTunes** will lock up and be completely unresponsive.\
    \ Follow these steps if this happens on a Windows computer:\n\n1.  Bring up the\
    \ **Windows Task Manager** by simultaneously pressing `Ctrl` + `Alt` + `Del` keys\
    \ on your keyboard. The **Task Manager** should look something like [Figure 3–9](#Chapter03.html#fig_3_9).\n\
    \n    ![images](images/0309.jpg)\n\n    **Figure 3–9.** *Locating `iTunes.exe`\
    \ in the **Windows Task Manager**, so you can terminate it*\n\n2.  To end the\
    \ process, click **End process** from the pop-up window.\n3.  Now, **iTunes**\
    \ should be forced to close.\n4.  Try restarting **iTunes**.\n5.  If **iTunes**\
    \ will not start or locks up again, then reboot your computer and try again.\n\
    \n### iTunes Locked Up and Will Not Respond (Apple Computer)\n\nIf you're using\
    \ an Apple Computer (Mac), then follow these steps if the **iTunes** app locks\
    \ up and is completely unresponsive:\n\n**TIP:** Pressing `Command + Option +\
    \ Escape` is the shortcut to bring up the **Force Quit Applications** window (see\
    \ [Figure 3–10](#Chapter03.html#fig_3_10)).\n\n1.  Click the **iTunes** menu at\
    \ the top.\n2.  Click **Quit iTunes**.\n3.  If that doesn't work, go to any other\
    \ program and click the small **Apple** logo in the upper left corner of your\
    \ Mac.\n\n    Click **Force Quit** and the list of running programs will be displayed.\n\
    \n4.  Highlight **iTunes** and click the **Force Quit** button.\n5.  If this does\
    \ not help, try restarting your Mac.\n\n![images](images/0310.jpg)\n\n**Figure\
    \ 3–10.** *The **Force Quit Applications** window on Mac computers*\n\n## Updating\
    \ Your iPod touch Operating System\n\nWith iOS 5 you can now update your iPod\
    \ touch operating system on-device. There are faster, more efficient update methods\
    \ for doing this, and we recommend you use them whenever possible. If you need\
    \ to re-install the entire OS, however, or want to upgrade via **iTunes** instead,\
    \ this section will explain how to do so.\n\n**NOTE:** Do this update when you\
    \ won't mind being without your iPod touch for 30 minutes or more, depending on\
    \ the amount of information on your iPod touch and the speed of your computer\
    \ and Internet connection.\n\nNormally, **iTunes** will automatically check for\
    \ updates on a set schedule, about every two weeks. If no update is found, **iTunes**\
    \ will tell you when it will check for another update. Follow these steps to use\
    \ **iTunes** to manually update your iPod touch:\n\n1.  Start **iTunes**.\n2.\
    \  Connect your iPod touch to your computer.\n3.  Click your iPod touch listed\
    \ under **DEVICES** in the left nav bar.\n4.  Click the **Summary** tab in the\
    \ top nav bar.\n5.  Click the **Check for Update** button in the center of the\
    \ screen in the **Version** section.\n6.  If you have the latest version, you'll\
    \ see a pop-up window saying something like this: “This version of the iPod touch\
    \ software (5.0) is the current version.” Click **OK** to close the window. You\
    \ are done with the update process.\n7.  If you don't have the latest version\
    \ of **iTunes**, a window will tell you a new version is available and ask if\
    \ you would like to update. Click **Yes** or **Update** to do so.\n8.  **iTunes**\
    \ will take you through a few screens that describe the update and ask you to\
    \ agree to the software license. If you agree, click **Next** and **Agree** to\
    \ download the latest iOS software from Apple. This will take about five to ten\
    \ minutes.\n\n    **TIP:** We show you all the screens you might see in this update\
    \ process in the “Reinstalling the iPod touch Operating System” section of [Chapter\
    \ 25](#Chapter25.html#ch25): “Troubleshooting.”\n\n9.  Next, **iTunes** will back\
    \ up your iPod touch, a process that might take ten minutes or more if your iPod\
    \ touch is filled with data.\n10. Now the new iOS will be installed, and your\
    \ iPod touch will be erased.\n11. Finally, you'll be shown a screen asking you\
    \ to do one of the following:\n\n    *   **Set up as a new iPod touch:** Choose\
    \ this if you want to erase all your data after the update process.\n    *   **Restore\
    \ from the backup of:** Choose this to make sure you select the correct backup\
    \ file (usually the most recent one).\n\n    At this point, your iPod touch will\
    \ be restored or set up as selected.\n\n12. Your iPod touch OS update is complete.\n\
    \n## Other Sync Methods\n\nYou can navigate to the **Mail**, **Contacts**, **Calendar**\
    \ app in your **Settings** app on your iPod touch to set up and use Exchange.\
    \ The next section will explain how to do so."
  raw: "#### Sync Photos\n\nWhen you click the **Photos** tab, you can choose to sync\
    \ photos from all folders or selected folders, and you can even include videos.\n\
    \n**TIP:** You can create a beautiful electronic picture frame and share your\
    \ photos on the iPod touch's stunning screen (see [Chapter: 19](#Chapter19.html#ch19):\
    \ “Working with Photos”). You can even use your photos to set the background wallpaper\
    \ and screen-lock wallpaper—see [Chapter 8](#Chapter08.html#ch8): “Personalize\
    \ and Secure” for more information.\n\nTo sync photos from your computer to your\
    \ iPod touch, follow these steps:\n\n1.  Connect your iPod touch to your computer,\
    \ start **iTunes**, and click your iPod touch in the left nav bar.\n\n    **TIP:**\
    \ Mac users can also sync photos using various criteria in **iPhoto**, including\
    \ Events (time-based sync), Faces (person-based sync), and Places (location-based\
    \ sync).\n\n2.  Click the **Photos** tab on the top of the main window.\n3.  Check\
    \ the box next to **Sync Photos from**.\n4.  Click the pull-down menu next to\
    \ **Sync Photos from** and select a folder from your computer where your photos\
    \ are stored. If you want to grab all your photos, go to the highest folder level\
    \ possible (e.g., **C:** on your Windows computer or your hard disk root directory\
    \ “**/**” on your Apple Mac).\n5.  If you'd like to sync all photos from the selected\
    \ folder on your computer, select **All folders**.\n\n    **CAUTION:** Because\
    \ your photo library on your computer may be too large to fit on your iPod touch,\
    \ be careful about checking **All folders**.\n\n6.  Otherwise, choose **Selected\
    \ folders** and make your choices by checking specific folders in the window below.\n\
    7.  You can also include any videos in the folders by checking the box next to\
    \ **Include videos**.\n8.  When you are done choosing your photos to sync, click\
    \ the **Apply** button to save your settings and start the sync.\n9.  When the\
    \ sync starts, you'll see the status in the middle-top status window in **iTunes**.\n\
    \n### Troubleshooting iTunes and the Sync\n\nSometimes **iTunes** does not behave\
    \ exactly as you'd expect it to, so here are a few simple troubleshooting tips.\n\
    \n#### Check Out the Apple Knowledgebase for Helpful Articles\n\nThe first step\
    \ when you're having a problem is to check out Apple's support pages, where you'll\
    \ find lots of helpful information. On your iPod touch or computer's web browser,\
    \ go to this web page:\n\n`www.apple.com/support/iPod touch/`\n\nNext, click a\
    \ topic shown in the left nav bar.\n\n#### iTunes Locked Up and Will Not Respond\
    \ (Windows Computer)\n\nSometimes, **iTunes** will lock up and be completely unresponsive.\
    \ Follow these steps if this happens on a Windows computer:\n\n1.  Bring up the\
    \ **Windows Task Manager** by simultaneously pressing **Ctrl** + **Alt** + **Del**\
    \ keys on your keyboard. The **Task Manager** should look something like [Figure\
    \ 3–9](#Chapter03.html#fig_3_9).\n\n    ![images](images/0309.jpg)\n\n    **Figure\
    \ 3–9.** *Locating **`iTunes.exe`** in the **Windows Task Manager**, so you can\
    \ terminate it*\n\n2.  To end the process, click **End process** from the pop-up\
    \ window.\n3.  Now, **iTunes** should be forced to close.\n4.  Try restarting\
    \ **iTunes**.\n5.  If **iTunes** will not start or locks up again, then reboot\
    \ your computer and try again.\n\n#### iTunes Locked Up and Will Not Respond (Apple\
    \ Computer)\n\nIf you're using an Apple Computer (Mac), then follow these steps\
    \ if the **iTunes** app locks up and is completely unresponsive:\n\n**TIP:** Pressing\
    \ **Command + Option + Escape** is the shortcut to bring up the **Force Quit Applications**\
    \ window (see [Figure 3–10](#Chapter03.html#fig_3_10)).\n\n1.  Click the **iTunes**\
    \ menu at the top.\n2.  Click **Quit iTunes.**\n3.  If that doesn't work, go to\
    \ any other program and click the small **Apple** logo in the upper left corner\
    \ of your Mac.\n\n    Click **Force Quit** and the list of running programs will\
    \ be displayed.\n\n4.  Highlight **iTunes** and click the **Force Quit** button.\n\
    5.  If this does not help, try restarting your Mac.\n\n![images](images/0310.jpg)\n\
    \n**Figure 3–10.** *The **Force Quit Applications** window on Mac computers*\n\
    \n### Updating Your iPod touch Operating System\n\nWith iOS 5 you can now update\
    \ your iPod touch operating system on-device. There are faster, more efficient\
    \ update methods for doing this, and we recommend you use them whenever possible.\
    \ If you need to re-install the entire OS, however, or want to upgrade via i **Tunes**\
    \ instead, this section will explain how to do so.\n\n**NOTE:** Do this update\
    \ when you won't mind being without your iPod touch for 30 minutes or more, depending\
    \ on the amount of information on your iPod touch and the speed of your computer\
    \ and Internet connection.\n\nNormally, **iTunes** will automatically check for\
    \ updates on a set schedule, about every two weeks. If no update is found, **iTunes**\
    \ will tell you when it will check for another update. Follow these steps to use\
    \ **iTunes** to manually update your iPod touch:\n\n1.  Start **iTunes**.\n2.\
    \  Connect your iPod touch to your computer.\n3.  Click your iPod touch listed\
    \ under **DEVICES** in the left nav bar.\n4.  Click the **Summary** tab in the\
    \ top nav bar.\n5.  Click the **Check for Update** button in the center of the\
    \ screen in the **Version** section.\n6.  If you have the latest version, you'll\
    \ see a pop-up window saying something like this: “This version of the iPod touch\
    \ software (5.0) is the current version.” Click **OK** to close the window. You\
    \ are done with the update process.\n7.  If you don't have the latest version\
    \ of **iTunes**, a window will tell you a new version is available and ask if\
    \ you would like to update. Click **Yes** or **Update** to do so.\n8.  **iTunes**\
    \ will take you through a few screens that describe the update and ask you to\
    \ agree to the software license. If you agree, click **Next** and **Agree** to\
    \ download the latest iOS software from Apple. This will take about five to ten\
    \ minutes.\n\n    **TIP:** We show you all the screens you might see in this update\
    \ process in the “Reinstalling the iPod touch Operating System” section of [Chapter\
    \ 25](#Chapter25.html#ch25): “Troubleshooting.”\n\n9.  Next, **iTunes** will back\
    \ up your iPod touch, a process that might take ten minutes or more if your iPod\
    \ touch is filled with data.\n10.  Now the new iOS will be installed, and your\
    \ iPod touch will be erased.\n11.  Finally, you'll be shown a screen asking you\
    \ to do one of the following:\n\n    *   **Set up as a new iPod touch:** Choose\
    \ this if you want to erase all your data after the update process.\n    *   **Restore\
    \ from the backup of:** Choose this to make sure you select the correct backup\
    \ file (usually the most recent one).\n\n    At this point, your iPod touch will\
    \ be restored or set up as selected.\n\n12.  Your iPod touch OS update is complete.\n\
    \n### Other Sync Methods\n\nYou can navigate to the **Mail**, **Contacts**, **Calendar**\
    \ app in your **Settings** app on your iPod touch to set up and use Exchange.\
    \ The next section will explain how to do so."
  trans: "\n# 同步照片\n\n点击**照片**标签页时，你可以选择同步所有文件夹或选定文件夹中的照片，甚至还可以包含视频。\n\n**提示：** 你可以创建一个精美的电子相框，并在\
    \ iPod touch 绚丽的屏幕上分享你的照片（请参阅第 19 章：“使用照片”）。你甚至可以用自己的照片设置主屏幕壁纸和锁定屏幕壁纸——更多信息请参阅第\
    \ 8 章：“个性化与安全”。\n\n要将照片从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动\
    \ **iTunes**，然后在左侧导航栏中点击你的 iPod touch。\n\n    **提示：** Mac 用户也可以在 **iPhoto** 中使用各种条件同步照片，包括“事件”（按时间同步）、“面孔”（按人物同步）和“地点”（按位置同步）。\n\
    \n2.  点击主窗口顶部的**照片**标签页。\n3.  勾选**从以下位置同步照片**旁边的复选框。\n4.  点击**从以下位置同步照片**旁边的下拉菜单，然后从电脑中选择存储照片的文件夹。如果你想获取所有照片，请选择尽可能高的文件夹层级（例如，Windows\
    \ 电脑上的 `C:` 盘，或 Apple Mac 上的硬盘根目录 `/`）。\n5.  如果你想同步电脑上所选文件夹中的所有照片，请选择**所有文件夹**。\n\
    \n    **警告：** 由于电脑中的照片库可能太大，无法全部放入 iPod touch，因此勾选**所有文件夹**时请务必谨慎。\n\n6.  否则，请选择**所选文件夹**，并通过勾选下方窗口中的特定文件夹来进行选择。\n\
    7.  你还可以通过勾选**包含视频**旁边的复选框来包含文件夹中的任何视频。\n8.  完成选择要同步的照片后，点击**应用**按钮以保存设置并开始同步。\n\
    9.  同步开始时，你将在 **iTunes** 的中上部状态窗口中看到同步状态。\n\n## 解决 iTunes 和同步问题\n\n有时 **iTunes**\
    \ 的行为可能不符合预期，因此这里提供几个简单的故障排除技巧。\n\n### 查阅 Apple 知识库获取有帮助的文章\n\n遇到问题时，第一步是查阅 Apple\
    \ 的支持页面，你可以在其中找到大量有用的信息。在你的 iPod touch 或电脑的网页浏览器中，访问以下网页：\n\n`www.apple.com/support/iPod\
    \ touch/`\n\n然后，点击左侧导航栏中显示的一个主题。\n\n### iTunes 卡死且无响应（Windows 电脑）\n\n有时，**iTunes**\
    \ 会卡死并完全无响应。如果在 Windows 电脑上出现这种情况，请按照以下步骤操作：\n\n1.  同时按下键盘上的 `Ctrl` + `Alt` +\
    \ `Del` 键，调出**Windows 任务管理器**。**任务管理器**应类似图 3-9 所示。\n\n    ![images](img/0309.jpg)\n\
    \n    **图 3-9.** *在 **Windows 任务管理器** 中找到 `iTunes.exe`，以便终止它*\n\n2.  要结束该进程，请从弹出的窗口中点击**结束进程**。\n\
    3.  现在，**iTunes** 应被强制关闭。\n4.  尝试重新启动 **iTunes**。\n5.  如果 **iTunes** 无法启动或再次卡死，则重启电脑并重试。\n\
    \n### iTunes 卡死且无响应（Apple 电脑）\n\n如果你使用的是 Apple 电脑（Mac），当 **iTunes** 应用卡死且完全无响应时，请按照以下步骤操作：\n\
    \n**提示：** 按下 `Command + Option + Escape` 是调出**强制退出应用程序**窗口的快捷键（请参阅图 3-10）。\n\n\
    1.  点击顶部的 **iTunes** 菜单。\n2.  点击**退出 iTunes**。\n3.  如果这不起作用，请转到任何其他程序，然后点击 Mac\
    \ 左上角的小**Apple** 标志。\n\n    点击**强制退出**，将显示正在运行的程序列表。\n\n4.  选中 **iTunes**，然后点击**强制退出**按钮。\n\
    5.  如果这没有帮助，请尝试重启你的 Mac。\n\n![images](img/0310.jpg)\n\n**图 3-10.** *Mac 电脑上的 **强制退出应用程序**\
    \ 窗口*\n\n## 更新你的 iPod touch 操作系统\n\n借助 iOS 5，你现在可以在设备上直接更新 iPod touch 的操作系统。有更快、更高效的更新方法，我们建议你尽可能使用这些方法。但是，如果你需要重新安装整个操作系统，或者想通过\
    \ **iTunes** 升级，本节将说明如何操作。\n\n**注：** 请在你愿意让 iPod touch 离开身边 30 分钟或更长时间时进行此更新，具体时间取决于\
    \ iPod touch 上的信息量以及电脑和互联网连接的速度。\n\n通常，**iTunes** 会按照设定的计划（大约每两周）自动检查更新。如果未找到更新，**iTunes**\
    \ 会告诉你何时进行下一次检查。请按照以下步骤使用 **iTunes** 手动更新你的 iPod touch：\n\n1.  启动 **iTunes**。\n\
    2.  将 iPod touch 连接到电脑。\n3.  点击左侧导航栏中 **设备** 下列出的你的 iPod touch。\n4.  点击顶部导航栏中的\
    \ **摘要** 标签页。\n5.  点击屏幕中央 **版本** 部分中的 **检查更新** 按钮。\n6.  如果你已拥有最新版本，你将看到一个弹出窗口，内容类似于：“此版本的\
    \ iPod touch 软件（5.0）是当前版本。”点击 **确定** 关闭窗口。更新过程完成。\n7.  如果你没有最新版本的 **iTunes**，一个窗口会告知你有新版本可用，并询问你是否要更新。点击\
    \ **是** 或 **更新** 执行操作。\n8.  **iTunes** 将引导你通过几个屏幕，描述更新并请你同意软件许可。如果你同意，请点击 **下一步**\
    \ 和 **同意**，以下载 Apple 提供的最新 iOS 软件。这大约需要五到十分钟。\n\n    **提示：** 我们在第 25 章：“故障排除”的“重新安装\
    \ iPod touch 操作系统”部分展示了更新过程中你可能看到的所有屏幕。\n\n9.  接下来，**iTunes** 将备份你的 iPod touch，如果你的\
    \ iPod touch 中存有大量数据，此过程可能需要十分钟或更长时间。\n10. 现在，新的 iOS 将被安装，你的 iPod touch 将被抹掉。\n\
    11. 最后，你将看到一个屏幕，要求你执行以下操作之一：\n\n    *   **设置为新的 iPod touch：** 如果希望在更新过程后抹掉所有数据，请选择此项。\n\
    \    *   **从以下备份恢复：** 选择此项可确保你选择了正确的备份文件（通常是最新的备份文件）。\n\n    此时，你的 iPod touch\
    \ 将按照选择进行恢复或设置。\n\n12. 你的 iPod touch 操作系统更新完成。\n\n## 其他同步方法\n\n你可以导航到 iPod touch\
    \ 上**设置**应用中的**邮件**、**通讯录**、**日历**应用，以设置和使用 Exchange。下一节将说明如何操作。\n"
- fmt: "# Setting Up Your Google or Exchange Account on Your Device\n\nUse the following\
    \ steps to set up the wireless sync for either your Exchange account or your Google\
    \ contacts and calendar:\n\n1. Touch the `Settings` icon.\n2. Touch `Mail`, `Contacts`,\
    \ `Calendar`.\n3. You'll see a list of your email accounts and, below that, the\
    \ `Add Account` option.\n\n   If you have no accounts set up, you will see only\
    \ `Add Account`. In either case, tap `Add Account`.\n\n   ![images](images/p121-01.jpg)\n\
    \n4. On the next screen, choose `Microsoft Exchange`.\n\n   **NOTE:** You should\
    \ choose `Microsoft Exchange` if you want to have the wireless sync with your\
    \ Google Contacts and Calendar. If you select `Gmail`, you will not be able to\
    \ sync wirelessly with your Google Contacts.\n\n   ![images](images/p122-01.jpg)\n\
    \n5. Type your email address.\n\n   **TIP:** To type the `.com` (or `.net`, `.edu`,\
    \ `.org`, etc.) in the email address, press and hold the `Period` (`.` ) key until\
    \ you see the `.com` key appear above it. Slide over and press `.com`.\n\n   ![images](images/p122-02.jpg)\n\
    \n   **TIP:** Since your email address is also usually your username, save yourself\
    \ some time by copying and pasting it.\n\n   ![images](images/p122-03.jpg)\n\n\
    6. Copy and paste your email address into the `Username` field (This works well\
    \ when your username is the same as your email or if it is the same as the first\
    \ part of your email address before the `@` sign):\n\n   * Touch and hold the\
    \ `Email` field, then lift your finger to see the black pop-up appear above it.\n\
    \   * Tap `Select All`.\n   * Tap `Copy`.\n   * Touch and hold the `Username`\
    \ field, then lift your finger to see the pop-up appear. Tap `Paste`.\n\n   ![images](images/p123-01.jpg)\n\
    \n7. Leave the `Domain` blank.\n\n   Type your `Password`.\n\n   If you want,\
    \ you can adjust the `Description` of the account, which defaults to your email\
    \ address.\n\n8. Tap the `Next` button in the upper-right corner.\n\n   ![images](images/p123-02.jpg)\n\
    \n9. You may see an `Unable to Verify Certificate` dialog. If you do see it, click\
    \ `Accept` to continue.\n\n   ![images](images/p123-03.jpg)\n\n10. In the `Server`\
    \ field, type `m.google.com` to sync to Google. Otherwise, if you are setting\
    \ up your Exchange Server account, enter that server address.\n11. Click `Next`\
    \ in the upper-right corner.\n\n    ![images](images/p123-04.jpg)\n\n12. On this\
    \ screen you have the option to set the wireless sync for `Mail`, `Contacts`,\
    \ and `Calendars` to `ON` or `OFF`. For each sync you'd like to turn on, tap the\
    \ switch to change it to `ON`.\n\n![images](images/p123-01.jpg)\n\n**NOTE:** If\
    \ you already have contacts or calendar items on your iPod touch, you may see\
    \ some warnings appear. Your choices are to `Keep on My iPod touch` or `Delete`.\
    \ If you choose `Cancel`, your iPod touch stops setting up your Exchange account.\
    \ Select `Keep on My iPod touch` to keep all existing contacts and calendar events\
    \ on your iPod touch. These items will not end up on your Exchange account—they\
    \ will stay on your iPod touch.\n\n## Chapter 4\n\n## Connect to the Network\n\
    \nWe live in a connected world. Wireless Internet (Wi-Fi) access has become the\
    \ rule, not the exception—and chances are you're already using Wi-Fi at your home\
    \ or office. Now you can use it to connect your iPod touch to the Internet.\n\n\
    In this chapter, we'll show you all the ways to get connected or disconnected\
    \ from virtually any form of Wi-Fi network, whether open or secure. If you work\
    \ at an organization with a VPN (*Virtual Private Network*), we will show you\
    \ how to get connected to that network.\n\n### What Can I Do When I'm Connected\
    \ to a Wi-Fi Network?\n\nHere are some of the things you can do when connected\
    \ to a Wi-Fi network:\n\n* Access and download apps (programs) from the `App Store`.\n\
    * Access and download music, videos, podcasts, and more from the `iTunes` app\
    \ on your iPod touch.\n* Browse the web using `Safari`.\n* Send and receive email\
    \ messages.\n* Use social networking sites that require an Internet connection\
    \ like Facebook, Twitter, and so on.\n* Play games that use a live Internet connection.\n\
    * Do anything else that requires an Internet connection.\n\n**NOTE:** iPod touch\
    \ has support for the faster, longer range 802.11n standard. However, it only\
    \ supports 802.11n on the more crowded 2.4MHz band, not the less crowded 5MHz\
    \ band. If you want to use iPod touch with your 802.11n Wi-Fi router, make sure\
    \ it's either a dual-band router or set the router to 2.4MHz.\n\n### Connecting\
    \ to a Wi-Fi Network\n\nTo set up your Wi-Fi connection, follow these steps:\n\
    \n![images](images/p126-01.jpg)\n\n1. Tap the `Settings` icon.\n2. Tap `Wi-Fi`\
    \ near the top.\n3. Make sure the `Wi-Fi` switch is set to `ON`. If it is currently\
    \ `OFF`, then tap it to turn it `ON`.\n4. Once Wi-Fi is `ON`, the iPod touch will\
    \ automatically start looking for wireless networks.\n5. The list of accessible\
    \ networks is shown below the `Choose a Network…` option. This screenshot shows\
    \ that we have one network available.\n6. To connect to any network listed, just\
    \ touch the network name. If the network is unsecure (does not have a `Lock` icon),\
    \ you will be connected automatically.\n\n### Connecting at a Public Wi-Fi Hotspot\
    \ with Web Login\n\nIn some locations where they offer free Wi-Fi networks, such\
    \ as coffee shops, hotels, or restaurants; you will see a pop-up window appear\
    \ as soon as your iPod touch comes into contact with the network. In these cases,\
    \ simply tap the network name. You may be brought to a `Safari` browser screen\
    \ to complete your login to the network:\n\n1. If you see a pop-up window similar\
    \ to the one shown, tap the network name you wish to join. In the case to the\
    \ right, we tap the `Panera` network.\n\n   ![images](images/p126-02.jpg)\n\n\
    2. In some cases, you may see a `Safari` window pop up, which can be quite confusing\
    \ because it is so small on your iPod touch's screen. You need to use the double-tap\
    \ or pinch-open gesture (see the Quick Start Guide for help) to zoom in on the\
    \ Web page. You are looking for a button that says `Login`, `Agree`, or something\
    \ similar. Tap that button to complete the connection.\n\n   ![images](images/p127-01.jpg)\n\
    \n**NOTE:** Some places, like coffee shops, use a web-based login instead of a\
    \ username/password screen. In those cases, when you click the network (or try\
    \ to use `Safari`), your iPod touch will open a browser screen, and you'll see\
    \ the web page along with your login options.\n\n### Secure Wi-Fi Networks—Entering\
    \ a Password\n\nSome Wi-Fi networks require a password to connect. This is set\
    \ when the network administrator creates the wireless network. You will have to\
    \ know the exact password, including whether it is case-sensitive.\n\n![images](images/p127-02.jpg)\n\
    \nIf the network does require a password, then you will be taken to the `Enter\
    \ Password` screen. Type the password exactly as given to you and press the `Enter`\
    \ key on the on-screen keyboard (which is now labeled `Join`).\n\nOn the `Network`\
    \ screen, you'll see a `Checkmark` icon showing that you are connected to the\
    \ network.\n\n![images](images/p127-03.jpg)\n\n**TIP:** You can paste into the\
    \ password dialog; so for longer, random passwords, you can transfer them to your\
    \ iPod touch (in an email message) and just copy and paste them. Just remember\
    \ to delete the email immediately afterwards, so you can keep things secure. Tap\
    \ and hold the password in the mail message, select it, and then tap `Copy`. In\
    \ the Wi-Fi network `Password` field, tap and then select `Paste`.\n\n![images](images/p128-01.jpg)"
  raw: "#### Setting Up Your Google or Exchange Account on Your Device\n\nUse the\
    \ following steps to set up the wireless sync for either your Exchange account\
    \ or your Google contacts and calendar:\n\n1.  Touch the **Settings** icon.\n\
    2.  Touch **Mail, Contacts, Calendar**.\n3.  You'll see a list of your email accounts\
    \ and, below that, the **Add Account** option.\n\n    If you have no accounts\
    \ set up, you will see only **Add Account**. In either case, tap **Add Account.**\n\
    \n    ![images](images/p121-01.jpg)\n\n4.  On the next screen, choose **Microsoft\
    \ Exchange**.\n\n    **NOTE:** You should choose **Microsoft Exchange** if you\
    \ want to have the wireless sync with your Google Contacts and Calendar. If you\
    \ select **Gmail**, you will not be able to sync wirelessly with your Google Contacts.\n\
    \n    ![images](images/p122-01.jpg)\n\n5.  Type your emailaddress.\n\n    **TIP:**\
    \ To type the `.com` (or `.net`, `.edu`, `.org`, etc.) in the email address, press\
    \ and hold the **Period** (.) key until you see the **.com** key appear above\
    \ it. Slide over and press **.com.**\n\n    ![images](images/p122-02.jpg)\n\n\
    \    **TIP:** Since your email address is also usually your username, save yourself\
    \ some time by copying and pasting it.\n\n    ![images](images/p122-03.jpg)\n\n\
    6.  Copy and paste your email address into the **Username** field (This works\
    \ well when your username is the same as your email or if it is the same as the\
    \ first part of your email address before the @ sign):\n\n    *   Touch and hold\
    \ the **Email** field, then lift your finger to see the black pop-up appear above\
    \ it.\n    *   Tap **Select All**.\n    *   Tap **Copy**.\n    *   Touch and hold\
    \ the **Username** field, then lift your fingerto see the pop-up appear. Tap **Paste**.\n\
    \n    ![images](images/p123-01.jpg)\n\n7.  Leave the **Domain** blank.\n\n   \
    \ Type your **Password.**\n\n    If you want, you can adjust the **Description**\
    \ of the account, which defaults to your email address.\n\n8.  Tap the **Next**\
    \ button in the upper-right corner.\n\n    ![images](images/p123-02.jpg)\n\n9.\
    \  You may see an **Unable to Verify Certificate** dialog. If you do see it, click\
    \ **Accept** to continue.\n\n    ![images](images/p123-03.jpg)\n\n10.  In the\
    \ **Server** field, type **m.google.com** to sync to Google. Otherwise, if you\
    \ are setting up your Exchange Server account, enter that server address.\n11.\
    \  Click **Next** in the upper-right corner.\n\n    ![images](images/p123-04.jpg)\n\
    \n12.  On this screen you have the option to set the wireless sync for **Mail,\
    \ Contacts,** and **Calendars** to **ON** or **OFF**. For each sync you'd like\
    \ to turn on, tap the switch to change it to **ON**.\n\n![images](images/p123-01.jpg)\n\
    \n**NOTE:** If you already have contacts or calendar items on your iPod touch,\
    \ you may see some warnings appear. Your choices are to **Keep on My iPod touch**\
    \ or **Delete**. If you choose **Cancel**, your iPod touch stops setting up your\
    \ Exchange account.Select **Keep on My iPod touch** to keep all existing contacts\
    \ and calendar events on your iPod touch. These items will not end up on your\
    \ Exchange account—they will stay on your iPod touch.\n\n## Chapter 4\n\n## Connect\
    \ to the Network\n\nWe live in a connected world. Wireless Internet (Wi-Fi) access\
    \ has become the rule, not the exception—and chances are you're already using\
    \ Wi-Fi at your home or office. Now you can use it to connect your iPod touch\
    \ to the Internet.\n\nIn this chapter, we'll show you all the ways to get connected\
    \ or disconnected from virtually any form of Wi-Fi network, whether open or secure.\
    \ If you work at an organization with a VPN (*Virtual Private Network*), we will\
    \ show you how to get connected to that network.\n\n#### What Can I Do When I'm\
    \ Connected to a Wi-Fi Network?\n\nHere are some of the things you can do when\
    \ connected to a Wi-Fi network:\n\n*   Access and download apps (programs) from\
    \ the App Store.\n*   Access and download music, videos, podcasts, and more from\
    \ the **iTunes** app on your iPod touch.\n*   Browse the web using **Safari**.\n\
    *   Send and receive email messages.\n*   Use social networking sites that require\
    \ an Internet connection like Facebook, Twitter, and so on.\n*   Play games that\
    \ use a live Internet connection.\n*   Do anything else that requires an Internet\
    \ connection.\n\n**NOTE:** iPod touch has support for the faster, longer range\
    \ 802.11n standard. However, it only supports 802.11n on the more crowded 2.4MHz\
    \ band, not the less crowded 5MHz band. If you want to use iPod touch with your\
    \ 802.11n Wi-Fi router, make sure it's either a dual-band router or set the router\
    \ to 2.4MHz.\n\n#### Connecting to a Wi-Fi Network\n\nTo set up your Wi-Fi connection,\
    \ follow these steps:\n\n![images](images/p126-01.jpg)\n\n1.  Tap the **Settings**\
    \ icon.\n2.  Tap **Wi-Fi** near the top.\n3.  Make sure the **Wi-Fi** switch is\
    \ set to **ON**. If it is currently **OFF**, then tap it to turn it **ON**.\n\
    4.  Once Wi-Fi is **ON**, the iPod touch will automatically start looking for\
    \ wireless networks.\n5.  The list of accessible networks is shown below the **Choose\
    \ a Network…** option. This screenshot shows that we have one network available\n\
    6.  To connect to any network listed, just touch the network name. If the network\
    \ is unsecure (does not have a **Lock** icon), you will be connected automatically.\n\
    \n#### Connecting at a Public Wi-Fi Hotspot with Web Login\n\nIn some locations\
    \ where they offer free Wi-Fi networks, such as coffee shops, hotels, or restaurants;\
    \ you will see a pop-up window appear as soon as your iPod touch comes into contact\
    \ with the network. In these cases, simply tap the network name. You may be brought\
    \ to a **Safari** browser screen to complete your login to the network:\n\n1.\
    \  If you see a pop-up window similar to the one shown, tap the network name you\
    \ wish to join. In the case to the right, we tap the **Panera** network.\n\n \
    \   ![images](images/p126-02.jpg)\n\n2.  In some cases, you may see a **Safari**\
    \ window pop up, which can be quite confusing because it is so small on your iPod\
    \ touch's screen. You need to use the double-tap or pinch-open gesture (see the\
    \ Quick Start Guide for help) to zoom in on the Web page. You are looking for\
    \ a button that says **Login**, **Agree**, or something similar. Tap that button\
    \ to complete the connection.\n\n    ![images](images/p127-01.jpg)\n\n**NOTE:**\
    \ Some places, like coffee shops, use a web-based login instead of a username/password\
    \ screen. In those cases, when you click the network (or try to use **Safari**),\
    \ your iPod touch will open a browser screen, and you'll see the web page along\
    \ with your login options.\n\n#### Secure Wi-Fi Networks—Entering a Password\n\
    \nSome Wi-Fi networks require a password to connect. This is set when the network\
    \ administrator creates the wireless network. You will have to know the exact\
    \ password, including whether it is case-sensitive.\n\n![images](images/p127-02.jpg)\n\
    \nIf the network does require a password, then you will be taken to the **Enter\
    \ Password** screen. Type the password exactly as given to you and press the **Enter**\
    \ key on the on-screen keyboard (which is now labeled **Join**).\n\nOn the **Network**\
    \ screen, you'll see a **Checkmark** icon showing that you are connected to the\
    \ network.\n\n![images](images/p127-03.jpg)\n\n**TIP:** You can paste into the\
    \ password dialog; so for longer, random passwords, you can transfer them to your\
    \ iPod touch (in an email message) and just copy and paste them. Just remember\
    \ to delete the email immediately afterwards, so you can keep things secure. Tap\
    \ and hold the password in the mail message, select it, and then tap **Copy**.\
    \ In the Wi-Fi network **Password** field, tap and then select **Paste**.\n\n\
    ![images](images/p128-01.jpg)"
  trans: "\n# 在设备上设置您的 Google 或 Exchange 账户\n\n按照以下步骤为您的 Exchange 账户或 Google 通讯录和日历设置无线同步：\n\
    \n1.  轻触 `Settings` 图标。\n2.  轻触 `Mail`、`Contacts`、`Calendar`。\n3.  您会看到您的电子邮件账户列表，以及在其下方的\
    \ `Add Account` 选项。\n\n   如果您尚未设置任何账户，您将只会看到 `Add Account`。无论哪种情况，请轻点 `Add Account`。\n\
    \n   ![images](img/p121-01.jpg)\n\n4.  在下一个屏幕上，选择 `Microsoft Exchange`。\n\n  \
    \ **注意：** 如果您想要与您的 Google 通讯录和日历进行无线同步，应选择 `Microsoft Exchange`。如果您选择 `Gmail`，您将无法与您的\
    \ Google 通讯录进行无线同步。\n\n   ![images](img/p122-01.jpg)\n\n5.  输入您的电子邮件地址。\n\n  \
    \ **提示：** 要在电子邮件地址中输入 `.com`（或 `.net`、`.edu`、`.org` 等），请按住 `Period` （`.`） 键，直到其上方出现\
    \ `.com` 键。然后滑动手指并按下 `.com`。\n\n   ![images](img/p122-02.jpg)\n\n   **提示：** 既然您的电子邮件地址通常也是您的用户名，您可以通过复制粘贴来节省时间。\n\
    \n   ![images](img/p122-03.jpg)\n\n6.  将您的电子邮件地址复制并粘贴到 `Username` 字段中（当您的用户名与您的电子邮件相同，或者与\
    \ `@` 符号前的电子邮件第一部分相同时，此方法很有效）：\n\n   * 按住 `Email` 字段，然后抬起手指，即可看到其上方出现黑色弹出菜单。\n\
    \   * 轻点 `Select All`。\n   * 轻点 `Copy`。\n   * 按住 `Username` 字段，然后抬起手指，即可看到弹出菜单出现。轻点\
    \ `Paste`。\n\n   ![images](img/p123-01.jpg)\n\n7.  将 `Domain` 字段留空。\n\n   输入您的\
    \ `Password`。\n\n   如果需要，您可以调整账户的 `Description`，其默认值为您的电子邮件地址。\n\n8.  轻点右上角的 `Next`\
    \ 按钮。\n\n   ![images](img/p123-02.jpg)\n\n9.  您可能会看到一个 `Unable to Verify Certificate`\
    \ 对话框。如果看到，请点击 `Accept` 继续。\n\n   ![images](img/p123-03.jpg)\n\n10. 在 `Server`\
    \ 字段中，输入 `m.google.com` 以同步到 Google。否则，如果您正在设置您的 Exchange 服务器账户，请输入该服务器地址。\n11.\
    \ 点击右上角的 `Next`。\n\n    ![images](img/p123-04.jpg)\n\n12. 在此屏幕上，您可以选择将 `Mail`、`Contacts`\
    \ 和 `Calendars` 的无线同步设置为 `ON` 或 `OFF`。对于您想要开启的每个同步，轻触开关将其更改为 `ON`。\n\n![images](img/p123-01.jpg)\n\
    \n**注意：** 如果您在 iPod touch 上已有通讯录或日历项目，您可能会看到一些警告出现。您的选项是 `Keep on My iPod touch`\
    \ 或 `Delete`。如果您选择 `Cancel`，您的 iPod touch 将停止设置您的 Exchange 账户。选择 `Keep on My iPod\
    \ touch` 以保留您 iPod touch 上所有现有的通讯录和日历事件。这些项目将不会出现在您的 Exchange 账户中——它们将保留在您的 iPod\
    \ touch 上。\n\n## 第 4 章\n\n## 连接到网络\n\n我们生活在一个互联的世界。无线互联网（Wi-Fi）接入已成为常态而非例外——而且您很可能已经在家庭或办公室使用\
    \ Wi-Fi。现在您可以利用它来将您的 iPod touch 连接到互联网。\n\n在本章中，我们将向您展示从几乎任何形式的 Wi-Fi 网络（无论是开放网络还是安全网络）进行连接或断开连接的所有方法。如果您在一个拥有\
    \ VPN（*虚拟专用网络*）的组织工作，我们将向您展示如何连接到该网络。\n\n### 连接到 Wi-Fi 网络后我能做什么？\n\n以下是您连接到 Wi-Fi\
    \ 网络后可以执行的一些操作：\n\n* 从 `App Store` 访问和下载应用程序（程序）。\n* 从您 iPod touch 上的 `iTunes`\
    \ 应用访问和下载音乐、视频、播客等。\n* 使用 `Safari` 浏览网页。\n* 发送和接收电子邮件。\n* 使用需要互联网连接的社交网站，如 Facebook、Twitter\
    \ 等。\n* 玩需要实时互联网连接的游戏。\n* 执行任何其他需要互联网连接的操作。\n\n**注意：** iPod touch 支持速度更快、范围更广的\
    \ 802.11n 标准。然而，它仅支持更拥挤的 2.4MHz 频段上的 802.11n，而不支持较不拥挤的 5MHz 频段。如果您想将 iPod touch\
    \ 与 802.11n 无线路由器配合使用，请确保其是双频路由器或将路由器设置为 2.4MHz。\n\n### 连接到 Wi-Fi 网络\n\n要设置您的\
    \ Wi-Fi 连接，请按照以下步骤操作：\n\n![images](img/p126-01.jpg)\n\n1.  轻点 `Settings` 图标。\n\
    2.  轻点顶部的 `Wi-Fi`。\n3.  确保 `Wi-Fi` 开关设置为 `ON`。如果当前为 `OFF`，则轻触将其打开为 `ON`。\n4. \
    \ 一旦 Wi-Fi 处于 `ON` 状态，iPod touch 将自动开始搜索无线网络。\n5.  可访问的网络列表显示在 `Choose a Network…`\
    \ 选项下方。此屏幕截图显示我们有一个可用的网络。\n6.  要连接到列出的任何网络，只需轻触网络名称。如果网络不安全（没有 `Lock` 图标），您将自动连接。\n\
    \n### 在具有网页登录功能的公共 Wi-Fi 热点进行连接\n\n在某些提供免费 Wi-Fi 网络的场所（例如咖啡店、酒店或餐厅），一旦您的 iPod\
    \ touch 连接到该网络，就会出现一个弹出窗口。在这些情况下，只需轻点网络名称。您可能会被带到 `Safari` 浏览器屏幕以完成网络登录：\n\n1.\
    \  如果您看到类似所示的弹出窗口，请轻点您想要加入的网络名称。在右侧的示例中，我们轻点 `Panera` 网络。\n\n   ![images](img/p126-02.jpg)\n\
    \n2.  在某些情况下，您可能会看到一个 `Safari` 窗口弹出，这可能会让人相当困惑，因为它在您的 iPod touch 屏幕上非常小。您需要使用双击或张开手势（请参阅快速入门指南寻求帮助）来放大网页。您需要找到一个标有\
    \ `Login`、`Agree` 或类似字样的按钮。轻点该按钮以完成连接。\n\n   ![images](img/p127-01.jpg)\n\n**注意：**\
    \ 某些地方（如咖啡店）使用基于网页的登录，而不是用户名/密码屏幕。在这种情况下，当您点击网络（或尝试使用 `Safari`）时，您的 iPod touch\
    \ 将打开一个浏览器屏幕，您将看到网页以及您的登录选项。\n\n### 安全 Wi-Fi 网络——输入密码\n\n某些 Wi-Fi 网络需要密码才能连接。这是在网络管理员创建无线网络时设置的。您必须知道确切的密码，包括其是否区分大小写。\n\
    \n![images](img/p127-02.jpg)\n\n如果网络确实需要密码，那么您将被带到 `Enter Password` 屏幕。完全按照提供给您的密码进行输入，然后按屏幕键盘上的\
    \ `Enter` 键（此时该键标记为 `Join`）。\n\n在 `Network` 屏幕上，您将看到一个 `Checkmark` 图标，表明您已连接到该网络。\n\
    \n![images](img/p127-03.jpg)\n\n**提示：** 您可以在密码对话框中进行粘贴；因此对于较长、随机的密码，您可以将其传输到您的\
    \ iPod touch 上（通过电子邮件），然后直接复制粘贴。请记得之后立即删除该电子邮件，以确保安全。在邮件中按住密码，选中它，然后轻点 `Copy`。在\
    \ Wi-Fi 网络的 `Password` 字段中，轻触然后选择 `Paste`。\n\n![images](img/p128-01.jpg)\n"
- fmt: "#### Switching to a Different Wi-Fi Network\n\nAt times you may want to change\
    \ your active Wi-Fi network. This might occur if you are in a hotel, apartment,\
    \ or other place where the network selected by the iPod touch is not the strongest\
    \ network, or you want to use a secure network instead of an unsecure one.\n\n\
    To switch from the currently selected Wi-Fi network, tap the `Settings` icon,\
    \ touch `Wi-Fi`, and then touch the name of the Wi-Fi network you want to join.\
    \ If that network requires a password, you'll need to enter it to join.\n\nOnce\
    \ you type the correct password (or if you touched an open network), your iPod\
    \ touch will join that network.\n\n#### Verifying Your Wi-Fi Connection\n\nIt\
    \ is easy to see if you are connected to a network (and which one) by looking\
    \ next to the `Wi-Fi` setting in your main `Settings` screen. Follow these steps\
    \ to check your Wi-Fi connection status:\n\n![images](images/p129-01.jpg)\n\n\
    1.  Tap your `Settings` icon.\n2.  Look next to the `Wi-Fi` option at the top:\n\
    \    *   If you see `Not Connected`, you do not have an active Wi-Fi connection.\n\
    \    *   If you see some other name, such as `Panera`, then you are connected\
    \ to that Wi-Fi network.\n\n### Advanced Wi-Fi Options (Hidden or Undiscoverable\
    \ Networks)\n\nSometimes you may not be able to see the network you want to join\
    \ because the name has been hidden (the SSID is not being broadcast) by the network\
    \ administrator. Next, you will learn how to join such networks on your iPod touch.\
    \ Once you have joined such a network, you will join that network automatically\
    \ the next time you come into contact with it—with no prompt from your iPod touch.\
    \ You can also tell your iPod touch to ask every time it joins a network; we will\
    \ show you how to do that, as well. Sometimes you may want to erase or forget\
    \ a network. For example, perhaps you were at a one-time convention and want to\
    \ get rid of the associated network—you'll learn how to do that, too.\n\n####\
    \ Why Can't I See the Wi-Fi Network I Want to Join?\n\nSometimes, for security\
    \ reasons, people don't make their networks discoverable (they hide the network\
    \ name, called the SSID), and you have to manually enter the name and security\
    \ options to connect to it.\n\nAs you can see, your list of available networks\
    \ includes `Other`.\n\n![images](images/p130-01.jpg)\n\n1.  Tap the `Other` button,\
    \ and you can manually enter the name of a network you would like to join.\n2.\
    \  Type in the Wi-Fi network `Name`.\n\n    ![images](images/p130-02.jpg)\n\n\
    3.  Tap the `Security` tab.\n4.  Choose which type of security is being used on\
    \ that network. If you are unsure, you'll need to find out from the network administrator.\n\
    \n    ![images](images/p130-03.jpg)\n\nWhen you have the information you need,\
    \ enter it along with the proper password, and this new network will be saved\
    \ to your network list for future access.\n\n#### Reconnecting to Previously Joined\
    \ Wi-Fi Networks\n\nThe nice thing about the iPod touch is that, when you return\
    \ to an area with a Wi-Fi network you previously joined (whether it was an open\
    \ or a secure, password-protected, network), your iPod touch will automatically\
    \ join the network again without asking you first. However, you can turn off this\
    \ automatic-joining feature, as described in the next section.\n\n##### The Ask\
    \ to Join Networks Main Switch\n\nThere is a main `Ask to Join Networks` switch,\
    \ which is set to `ON` by default. Known networks are joined automatically, but\
    \ this only takes effect if no known networks are available. With this switch\
    \ set to `ON`, you will be asked to join visible Wi-Fi networks. If networks are\
    \ available that are not known to you, you will be asked before being connected.\n\
    \nIf the switch is set to `OFF`, you will have to manually join unknown networks.\n\
    \n![images](images/p131-01.jpg)\n\nWhy might you want to turn off this feature?\n\
    \nDoing so could be a good security measure if, for example, you don't want your\
    \ kids to be able to join a wireless network on the iPod touch without your knowledge.\n\
    \nIt can also be annoying if your iPod touch is continuously popping up the `Join\
    \ Network` connector screen in areas where you don't want to join Wi-Fi, such\
    \ as when traveling through a place with many hotspots.\n\n##### Ask to Join and\
    \ Ask to Login Switch on Each Network\n\n![images](images/p131-02.jpg)\n\nSometimes,\
    \ you may find that a particular Wi-Fi network has additional switches that override\
    \ the main `Ask to Join Networks` switch. Tap the little blue `Arrow` icon\n\n\
    ![images](images/p131-03.jpg) next to the network name to see details about this\
    \ Wi-Fi network. `Auto-Join` and `Auto-Login` are set to `ON` by default.\n\n\
    To disable `Auto-Join` or `Auto-Login`, tap each switch to set it to `OFF`.\n\n\
    ##### Forget (or Erase) a Network\n\nIf you find that you no longer want to connect\
    \ to a network on your list, you can `Forget it`—i.e., take it off your list of\
    \ networks. Follow these steps to do so:\n\n![images](images/p132-01.jpg)\n\n\
    1.  Tap the `Settings` icon.\n2.  Tap `Wi-Fi` to see your list of networks.\n\
    3.  Tap the small blue `Arrow` ![images](images/p132-02.jpg) next to the network\
    \ you want to forget in order to see the screen shown here.\n4.  Tap `Forget this\
    \ Network` at the top of the screen.\n\n    ![images](images/p132-03.jpg)\n\n\
    5.  You will be prompted with a warning. Just touch `Forget` and the network will\
    \ no longer show up on your list.\n\n    ![images](images/p132-04.jpg)\n\n###\
    \ Flying on an Airplane: Airplane Mode\n\nOften when you are flying on an airplane,\
    \ the flight crew will ask you to turn off all portable electronic devices for\
    \ takeoff and landing. Then, when you get to a certain altitude, the crew will\
    \ say that “all approved electronic devices” can be turned back on.\n\nIf you\
    \ need to turn off your iPod touch completely, press and hold the `Power` button\
    \ on the top-right edge, and then `Slide to Power Off` with your finger.\n\nSince\
    \ the iPod touch is a Wi-Fi only device, why would you want or need to go into\
    \ Airplane Mode or turn off Wi-Fi? The iPod touch has other radios as well, like\
    \ Bluetooth, and Airplane mode is a quick way to turn everything off at once.\n\
    \nAlso, if you're low on battery life and don't need internet access, turning\
    \ off Wi-Fi or going into Airplane Mode Is a quick way to stretch out your remaining\
    \ battery life as much as possible.\n\nIn order to enable `Airplane Mode`, follow\
    \ these steps:\n\n![images](images/p133-01.jpg)\n\n1.  Tap the `Settings` icon.\n\
    2.  Set the switch next to `Airplane Mode` in the top of the left column to `ON`.\n\
    3.  Notice that the Wi-Fi is automatically turned `OFF`.\n\n    **TIP:** Some\
    \ airlines have in-flight Wi-Fi networks. On those flights, you may want to turn\
    \ your Wi-Fi back `ON` at the appropriate time.\n\nYou can turn your Wi-Fi connection\
    \ `OFF` or `ON` by following these steps:\n\n1.  Tap the `Settings` icon.\n2.\
    \  Tap `Wi-Fi` near the top of the screen.\n\n    ![images](images/p133-02.jpg)\n\
    \n3.  To enable the Wi-Fi connections, set the switch next to `Wi-Fi` in the top\
    \ of the page to `ON`.\n4.  To disable Wi-Fi, set the same switch to `OFF`.\n\
    5.  Select the Wi-Fi network and follow the steps given by the flight attendant\
    \ to get connected.\n\n### VPN: Virtual Private Network\n\nYour organization may\
    \ have what is called a VPN, or *Virtual Private Network*. A VPN allows you to\
    \ securely connect your iPod touch, laptop, or other device to the corporate network."
  raw: "#### Switching to a Different Wi-Fi Network\n\nAt times you may want to change\
    \ your active Wi-Fi network. This might occur if you are in a hotel, apartment,\
    \ or other place where the network selected by the iPod touch is not the strongest\
    \ network, or you want to use a secure network instead of an unsecure one.\n\n\
    To switch from the currently selected Wi-Fi network, tap the **Settings** icon,\
    \ touch **Wi-Fi**, and then touch the name of the Wi-Fi network you want to join.\
    \ If that network requires a password, you'll need to enter it to join.\n\nOnce\
    \ you type the correct password (or if you touched an open network), your iPod\
    \ touch will join that network.\n\n#### Verifying Your Wi-Fi Connection\n\nIt\
    \ is easy to see if you are connected to a network (and which one) by looking\
    \ next to the **Wi-Fi** setting in your main **Settings** screen. Follow these\
    \ steps to check your Wi-Fi connection status:\n\n![images](images/p129-01.jpg)\n\
    \n1.  Tap your **Settings** icon.\n2.  Look next to the **Wi-Fi** option at the\
    \ top:\n    *   If you see **Not Connected**, you do not have an active Wi-Fi\
    \ connection.\n    *   If you see some other name, such as **Panera**, then you\
    \ are connected to that Wi-Fi network.\n\n### Advanced Wi-Fi Options (Hidden or\
    \ Undiscoverable Networks)\n\nSometimes you may not be able to see the network\
    \ you want to join because the name has been hidden (the SSID is not being broadcast)\
    \ by the network administrator. Next, you will learn how to join such networks\
    \ on your iPod touch. Once you have joined such a network, you will join that\
    \ network automatically the next time you come into contact with it—with no prompt\
    \ from your iPod touch. You can also tell your iPod touch to ask every time it\
    \ joins a network; we will show you how to do that, as well. Sometimes you may\
    \ want to erase or forget a network. For example, perhaps you were at a one-time\
    \ convention and want to get rid of the associated network—you'll learn how to\
    \ do that, too.\n\n#### Why Can't I See the Wi-Fi Network I Want to Join?\n\n\
    Sometimes, for security reasons, people don't make their networks discoverable\
    \ (they hide the network name, called the SSID), and you have to manually enter\
    \ the name and security options to connect to it.\n\n**As you can see, your list\
    \ of available networks includes Other.**\n\n![images](images/p130-01.jpg)\n\n\
    1.  Tap the **Other** button, and you can manually enter the name of a network\
    \ you would like to join.\n2.  Type in the Wi-Fi network **Name**.\n\n    ![images](images/p130-02.jpg)\n\
    \n3.  Tap the **Security** tab.\n4.  Choose which type of security is being used\
    \ on that network. If you are unsure, you'll need to find out from the network\
    \ administrator.\n\n    ![images](images/p130-03.jpg)\n\nWhen you have the information\
    \ you need, enter it along with the proper password, and this new network will\
    \ be saved to your network list for future access.\n\n#### Reconnecting to Previously\
    \ Joined Wi-Fi Networks\n\nThe nice thing about the iPod touch is that, when you\
    \ return to an area with a Wi-Fi network you previously joined (whether it was\
    \ an open or a secure, password-protected, network), your iPod touch will automatically\
    \ join the network again without asking you first. However, you can turn off this\
    \ automatic-joining feature, as described in the next section.\n\n##### The Ask\
    \ to Join Networks Main Switch\n\nThere is a main **Ask to Join Networks** switch,\
    \ which is set to **ON** by default. Known networks are joined automatically,\
    \ but this only takes effect if no known networks are available. With this switch\
    \ set to **ON**, you will be asked to join visible Wi-Fi networks. If networks\
    \ are available that are not known to you, you will be asked before being connected.\n\
    \nIf the switch is set to **OFF**, you will have to manually join unknown networks.\n\
    \n![images](images/p131-01.jpg)\n\nWhy might you want to turn off this feature?\n\
    \nDoing so could be a good security measure if, for example, you don't want your\
    \ kids to be able to join a wireless network on the iPod touch without your knowledge.\n\
    \nIt can also be annoying if your iPod touch is continuously popping up the **Join\
    \ Network** connector screen in areas where you don't want to join Wi-Fi, such\
    \ as when traveling through a place with many hotspots.\n\n##### Ask to Join and\
    \ Ask to Login Switch on Each Network\n\n![images](images/p131-02.jpg)\n\nSometimes,\
    \ you may find that a particular Wi-Fi network has additional switches that override\
    \ the main **Ask to Join Networks** switch. Tap the little blue **Arrow** icon\n\
    \n![images](images/p131-03.jpg) next to the network name to see details about\
    \ this Wi-Fi network. **Auto-Join** and **Auto-Login** are set to **ON** by default.\n\
    \nTo disable **Auto-Join** or **Auto-Login**, tap each switch to set it to **OFF**.\n\
    \n##### Forget (or Erase) a Network\n\nIf you find that you no longer want to\
    \ connect to a network on your list, you can **Forget it**—i.e., take it off your\
    \ list of networks. Follow these steps to do so:\n\n![images](images/p132-01.jpg)\n\
    \n1.  Tap the **Settings** icon.\n2.  Tap **Wi-Fi** to see your list of networks.\n\
    3.  Tap the small blue **Arrow** ![images](images/p132-02.jpg) next to the network\
    \ you want to forget in order to see the screen shown here.\n4.  Tap **Forget\
    \ this Network** at the top of the screen.\n\n    ![images](images/p132-03.jpg)\n\
    \n5.  You will be prompted with a warning. Just touch **Forget** and the network\
    \ will no longer show up on your list.\n\n    ![images](images/p132-04.jpg)\n\n\
    ### Flying on an Airplane: Airplane Mode\n\nOften when you are flying on an airplane,\
    \ the flight crew will ask you to turn off all portable electronic devices for\
    \ takeoff and landing. Then, when you get to a certain altitude, the crew will\
    \ say that “all approved electronic devices” can be turned back on.\n\nIf you\
    \ need to turn off your iPod touch completely, press and hold the **Power** button\
    \ on the top-right edge, and then **Slide to Power Off** with your finger.\n\n\
    Since the iPod touch is a Wi-Fi only device, why would you want or need to go\
    \ into Airplane Mode or turn off Wi-Fi? The iPod touch has other radios as well,\
    \ like Bluetooth, and Airplane mode is a quick way to turn everything off at once.\n\
    \nAlso, if you're low on battery life and don't need internet access, turning\
    \ off Wi-Fi or going into Airplane Mode Is a quick way to stretch out your remaining\
    \ battery life as much as possible.\n\nIn order to enable **Airplane Mode**, follow\
    \ these steps:\n\n![images](images/p133-01.jpg)\n\n1.  Tap the **Settings** icon.\n\
    2.  Set the switch next to **Airplane Mode** in the top of the left column to\
    \ **ON.**\n3.  Notice that the Wi-Fi is automatically turned **OFF**.\n\n    **TIP:**\
    \ Some airlines have in-flight Wi-Fi networks. On those flights, you may want\
    \ to turn your Wi-Fi back **ON** at the appropriate time.\n\nYou can turn your\
    \ Wi-Fi connection **OFF**or **ON** by following these steps:\n\n1.  Tap the **Settings**\
    \ icon.\n2.  Tap **Wi-Fi** near the top of the screen.\n\n    ![images](images/p133-02.jpg)\n\
    \n3.  To enable the Wi-Fi connections, set the switch next to **Wi-Fi** in the\
    \ top of the page to **ON**.\n4.  To disable Wi-Fi, set the same switch to **OFF**.\n\
    5.  Select the Wi-Fi network and follow the steps given by the flight attendant\
    \ to get connected.\n\n### VPN: Virtual Private Network\n\nYour organization may\
    \ have what is called a VPN, or *Virtual Private Network*. A VPN allows you to\
    \ securely connect your iPod touch, laptop, or other device to the corporate network."
  trans: "\n#### 切换到不同的 Wi-Fi 网络\n\n有时你可能想更改当前连接的 Wi-Fi 网络。这种情况可能发生在酒店、公寓或其他场所，你发现\
    \ iPod touch 自动选择的网络并非信号最强的网络，或者你想使用安全网络而非不安全网络。\n\n要切换当前连接的 Wi-Fi 网络，请轻点 `设置`\
    \ 图标，点击 `Wi-Fi`，然后点击你想加入的 Wi-Fi 网络名称。如果该网络需要密码，你需要输入密码才能加入。\n\n一旦你输入了正确的密码（或者点击了开放网络），你的\
    \ iPod touch 就会自动连接该网络。\n\n#### 验证你的 Wi-Fi 连接\n\n通过在 `设置` 主界面中查看 `Wi-Fi` 选项旁边的状态，你可以轻松判断是否已连接到网络（以及连接的是哪个网络）。请按照以下步骤检查\
    \ Wi-Fi 连接状态：\n\n![images](img/p129-01.jpg)\n\n1.  轻点你的 `设置` 图标。\n2.  查看顶部 `Wi-Fi`\
    \ 选项旁边的状态：\n    *   如果显示 `未连接`，则表示你没有有效的 Wi-Fi 连接。\n    *   如果显示其他名称，例如 `Panera`，则表示你已连接到该\
    \ Wi-Fi 网络。\n\n### 高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\n有时，由于网络管理员隐藏了网络名称（未广播 SSID），你可能看不到想要加入的网络。接下来，你将学习如何在\
    \ iPod touch 上加入此类网络。一旦你加入过某个网络，下次进入其覆盖范围时，iPod touch 将自动连接，而无需再次提示。你也可以让 iPod\
    \ touch 每次连接网络时都询问你；我们也将教你如何设置。有时你可能想删除或忘记某个网络。例如，你参加过一次性的会议，想要移除相关的网络——你也将学会如何操作。\n\
    \n#### 为什么我看不到想加入的 Wi-Fi 网络？\n\n有时，出于安全考虑，人们会隐藏网络（隐藏称为 SSID 的网络名称），你必须手动输入名称和安全选项才能连接。\n\
    \n正如你所见，可用网络列表中包含 `其他` 选项。\n\n![images](img/p130-01.jpg)\n\n1.  点击 `其他` 按钮，即可手动输入你想要加入的网络名称。\n\
    2.  输入 Wi-Fi 网络 `名称`。\n\n    ![images](img/p130-02.jpg)\n\n3.  点击 `安全性` 标签。\n\
    4.  选择该网络使用的安全类型。如果你不确定，需要向网络管理员咨询。\n\n    ![images](img/p130-03.jpg)\n\n当你获得所需信息后，输入信息及正确的密码，这个新网络将被保存到你的网络列表中，供以后访问。\n\
    \n#### 重新连接之前加入过的 Wi-Fi 网络\n\niPod touch 的一个优点是，当你回到曾经加入过的 Wi-Fi 网络区域时（无论是开放网络、安全网络还是密码保护网络），它会自动重新连接，而无需事先询问。不过，你可以关闭此自动连接功能，具体方法见下一节。\n\
    \n##### “询问是否加入网络”总开关\n\n这里有一个 `询问是否加入网络` 总开关，默认设置为 `开启`。已知网络会自动连接，但此设置只在没有已知网络可用时生效。当此开关设为\
    \ `开启` 时，系统会询问你是否加入可见的 Wi-Fi 网络。如果有可用但你不认识的网络，连接前会向你询问。\n\n如果此开关设为 `关闭`，你必须手动加入未知网络。\n\
    \n![images](img/p131-01.jpg)\n\n为什么要关闭此功能？\n\n这样做可以作为一项安全措施，例如，如果你不想让孩子在未经你允许的情况下使用\
    \ iPod touch 加入无线网络。\n\n此外，如果 iPod touch 在你不想连接 Wi-Fi 的区域（例如途经有很多热点的场所）不断弹出 `加入网络`\
    \ 连接界面，也会让人感到烦恼。\n\n##### 每个网络上的“自动加入”和“自动登录”开关\n\n![images](img/p131-02.jpg)\n\
    \n有时，你可能会发现某个特定的 Wi-Fi 网络有额外的开关，它们会覆盖主开关 `询问是否加入网络` 的设置。点击网络名称旁边的小蓝色`箭头`图标\n\n\
    ![images](img/p131-03.jpg) 可以查看此 Wi-Fi 网络的详细信息。默认情况下，`自动加入` 和 `自动登录` 都设为 `开启`。\n\
    \n若要禁用 `自动加入` 或 `自动登录`，点击相应开关将其设为 `关闭`。\n\n##### 忘记（或删除）一个网络\n\n如果你发现不再需要连接到列表中的某个网络，可以选择\
    \ `忘记`——即将其从网络列表中移除。请按照以下步骤操作：\n\n![images](img/p132-01.jpg)\n\n1.  点击 `设置` 图标。\n\
    2.  点击 `Wi-Fi` 查看你的网络列表。\n3.  点击你想忘记的网络旁边的小蓝色`箭头`图标![images](img/p132-02.jpg)，即可看到此处显示的屏幕。\n\
    4.  点击屏幕顶部的 `忘记此网络`。\n\n    ![images](img/p132-03.jpg)\n\n5.  系统将弹出一条警告。只需点击 `忘记`，该网络将不再显示在你的列表中。\n\
    \n    ![images](img/p132-04.jpg)\n\n### 乘坐飞机：飞行模式\n\n乘坐飞机时，乘务员通常会要求你在起飞和降落期间关闭所有便携式电子设备。然后，当飞机达到一定高度后，乘务员会告知可以重新打开“所有经批准的电子设备”。\n\
    \n如果你需要完全关闭 iPod touch，请按住右上角的 `电源` 按钮，然后用手指 `滑动来关机`。\n\n由于 iPod touch 是一款仅支持\
    \ Wi-Fi 的设备，为什么你会想要或需要开启飞行模式或关闭 Wi-Fi 呢？iPod touch 还包含其他无线电模块，例如蓝牙，而飞行模式可以一次性快捷地关闭所有无线功能。\n\
    \n此外，如果你电量不足且不需要联网，关闭 Wi-Fi 或开启飞行模式是尽可能延长剩余电池使用时间的快捷方法。\n\n要启用 `飞行模式`，请按照以下步骤操作：\n\
    \n![images](img/p133-01.jpg)\n\n1.  点击 `设置` 图标。\n2.  将左侧栏顶部的 `飞行模式` 旁边的开关设为 `开启`。\n\
    3.  请注意，Wi-Fi 将自动关闭。\n\n    **提示：** 有些航空公司提供机上 Wi-Fi 网络。在这些航班上，你可以在适当的时候将 Wi-Fi\
    \ 重新设为 `开启`。\n\n你可以按照以下步骤打开或关闭 Wi-Fi 连接：\n\n1.  点击 `设置` 图标。\n2.  点击屏幕顶部的 `Wi-Fi`。\n\
    \n    ![images](img/p133-02.jpg)\n\n3.  要启用 Wi-Fi 连接，将页面顶部的 `Wi-Fi` 旁边的开关设为 `开启`。\n\
    4.  要禁用 Wi-Fi，将同一个开关设为 `关闭`。\n5.  选择 Wi-Fi 网络，并按照乘务员给出的步骤进行连接。\n\n### VPN：虚拟专用网络\n\
    \n你的组织可能设有所谓的 VPN，即*虚拟专用网络*。VPN 允许你将 iPod touch、笔记本电脑或其他设备安全地连接到公司网络。\n"
- fmt: "# Getting Connected\n\nIn order to get connected, you need to determine the\
    \ type of VPN and specific login instructions from your organization's help desk\
    \ or network administrator. Then, you will type these login details into the **VPN**\
    \ area in the **Settings** app on your iPod touch.\n\n**TIP:** You can probably\
    \ save yourself a call to the help desk and skip Step 1 if you have already set\
    \ up your computer to connect to the VPN. This is because your iPod touch will\
    \ most likely use the same VPN login credentials as your computer.\n\n## Step\
    \ 1: Contact Your Organization's Help Desk\n\nYou need to ask your help desk or\
    \ VPN administrator for the details about how to log into the VPN. Your iPod touch\
    \ can currently connect with the following types of VPNs: **L2TP**, **PPTP**,\
    \ and **IPSec** (Cisco). You also need to know if your VPN uses a **Proxy** and\
    \ whether the configuration is manual or automatic.\n\n## Step 2: Set Up the VPN\
    \ Connection on Your iPod touch\n\nArmed with the login instructions and type\
    \ of VPN connection, you are ready to connect with your iPod touch:\n\n1.  Tap\
    \ the **Settings** icon.\n\n    ![images](images/p134-01.jpg)\n\n2.  Tap **General**.\n\
    3.  Tap **Network**.\n4.  Scroll down to the bottom of the screen and tap **VPN**.\n\
    5.  On the **VPN** screen, tap the switch next to the **VPN** option to set it\
    \ to **ON**. You should then be taken to the **Add Configuration** screen. If\
    \ not, then tap **Add VPN Configuration** at the bottom to set up a new VPN connection.\n\
    \n    ![images](images/p135-01.jpg)\n\n6.  The **Add Configuration** screen is\
    \ where you set up your VPN login details, using the information from your help\
    \ desk or VPN administrator.\n\n    ![images](images/p135-02.jpg)\n\n7.  If your\
    \ VPN is an **L2TP** type, then you would use the screen shown here. Scroll to\
    \ the bottom and enter the **Proxy** information as required.\n8.  If your VPN\
    \ is a **PPTP** type, then you would tap **PPTP** at the top and use the screen\
    \ shown here. Scroll to the bottom and enter the **Proxy** information as required.\n\
    \n    ![images](images/p136-01.jpg)\n\n9.  If your VPN is an **IPSec** (Cisco)\
    \ type, then you would tap **IPSec** and use the screen shown here. Scroll to\
    \ the bottom and enter the **Proxy** information as required.\n\n    ![images](images/p136-02.jpg)\n\
    \n10.  When you are done with your setup, tap the **Save** button in the upper-right\
    \ corner.\n11.  If you have trouble logging in, make sure you are in a strong\
    \ wireless coverage area and verify you have typed all your login credentials\
    \ correctly. It can be difficult when passwords disappear as you type them. You\
    \ may want to try re-typing passwords and server information before calling the\
    \ help desk.\n\n# Knowing When You Are Connected to a VPN Network\n\nYou will\
    \ see a small **VPN** icon ![images](images/p137-01.jpg) just to the right of\
    \ your network connection status display. You will know that you are securely\
    \ connected to the VPN network *only* when you see this icon.\n\n# Switching VPN\
    \ Networks\n\nYou may have several VPN networks to which you need to connect.\
    \ You can select between different VPN configurations on your iPod touch by following\
    \ these steps:\n\n1.  Tap the **Settings** icon.\n2.  Tap **General**.\n3.  Tap\
    \ **Network**.\n4.  Scroll down to the bottom of the screen and tap **VPN**.\n\
    5.  On the VPN screen, tap a different **VPN configuration** to connect to it.\
    \ Don't tap the blue **Circle** icon with the > symbol, unless you want to change\
    \ the login settings for that network.\n\n## Chapter 5\n\n# AirPlay and Bluetooth\n\
    \nIn this chapter, we will show you how to connect your iPod touch with any AirPlay–\
    \ or Bluetooth–compatible device, whether it's an Apple TV, stereo speakers, or\
    \ a wireless headset.\n\n## Understanding AirPlay\n\n*AirPlay* is Apple's proprietary\
    \ video and audio streaming protocol. AirPlay works over your local home, school,\
    \ or office Wi-Fi network. Before you can use AirPlay with the iPod touch, you\
    \ have to make sure all your devices are connected to the same Wi-Fi network.\n\
    \n![images](images/p139-01.jpg)\n\n### AirPlay Devices That Work with the iPod\
    \ touch\n\nAt the time of writing, only the 2010 model Apple TV supports AirPlay\
    \ video streaming. With it, you can stream content right from your iPod touch\
    \ to your big screen TV to share with business colleagues, friends, and family\
    \ alike.\n\nApple's AirPort Express Wi-Fi router has an audio out jack that can\
    \ be connected to speakers for AirPlay audio. Various third-party accessory makers\
    \ are also introducing AirPlay–compatible speakers. With AirPlay, you can remotely\
    \ control the playback and volume right from your iPod touch.\n\n## Setting Up\
    \ and Using AirPlay\n\nAirPlay is built right into the iPod touch. As long as\
    \ all your devices are connected to the same Wi-Fi network, no additional setup\
    \ is needed.\n\nSeveral of the built-in iPod touch apps support AirPlay, including\
    \ **Videos**, **Music**, and **YouTube**. Several App Store apps that use Apple's\
    \ default media player (e.g., **Air Video**) also support AirPlay. Follow these\
    \ steps to use AirPlay from an app that supports the feature:\n\n![images](images/p140-01.jpg)\n\
    \n1\\. Tap the blue **AirPlay** icon at the lower-right corner of the screen.\n\
    \n2\\. Choose from the list of available devices for streaming your music.\n\n\
    3\\. To switch the video or music back to your iPod touch, just tap the **AirPlay**\
    \ icon again and choose **iPod touch** from the list.\n\n**NOTE:** The **AirPlay**\
    \ icon will bring up a list of both Bluetooth and Wi-Fi connected devices. See\
    \ the next section for more on Bluetooth.\n\nYou can select **Apple TV** by tapping\
    \ it. Now your music or video will start to play from the selected AirPlay device.\
    \ You can verify this by touching the **AirPlay** icon on the screen once more.\
    \ You should see a **Checkmark** icon next to the new AirPlay Stereo Bluetooth\
    \ device, and you should hear your music coming from that sound source, as well.\n\
    \n**TIP:** To save battery life on your iPod touch, turn off the screen by pressing\
    \ the **Sleep** button while streaming AirPlay content to another device. Your\
    \ music or video will continue to play, but you won't be wasting battery life\
    \ by keeping your screen lit.\n\n### AirPlay Mirroring\n\nThe current iPod touch\
    \ does more than let you stream video or music from your iPod touch to an Apple\
    \ TV; it also lets you share the screen of any app—from a business presentation\
    \ at work, to a board game with the family, to a video call with distant relatives.\
    \ Being able to take **Keynote** or **Infinity Blade** or **FaceTime** from the\
    \ small iPod touch screen to a giant television set really transforms what was\
    \ an intimate personal experience into a fun social activity.\n\nFollow these\
    \ steps to use the AirPlay Mirroring feature:\n\n![images](images/p141-01.jpg)\n\
    \n4\\. Tap the app you want to mirror. For this example, we're using **Infinity\
    \ Blade.**\n\n5\\. Once the app has launched, double-click the Home button to\
    \ bring up the Fast App Switcher.\n\n6\\. Swipe from left to right to get to the\
    \ audio/video controls. (They're all the way at the end, so keep swiping until\
    \ you can't swipe any more.)\n\n![images](images/p141-02.jpg)\n\n7\\. Tap the\
    \ **AirPlay button** to bring up the list of AirPlay–enabled devices on your Wi-Fi\
    \ network.\n\n8\\. Select **Apple TV**.\n\n9\\. Toggle the **Airplay Mirroring**\
    \ switch to **ON**.\n\n10\\. Click the **Home** button again to return to your\
    \ app.\n\n11\\. You should now see **Infinity Blade** on the big screen. Let 'em\
    \ have it!\n\nTo stop AirPlay Mirroring, repeat the same procedure and choose\
    \ iPod touch from the device list."
  raw: "#### Getting Connected\n\nIn order to get connected, you need to determine\
    \ the type of VPN and specific login instructions from your organization's help\
    \ desk or network administrator. Then, you will type these login details into\
    \ the **VPN** area in the **Settings** app on your iPod touch.\n\n**TIP:** You\
    \ can probably save yourself a call to the help desk and skip Step 1 if you have\
    \ already set up your computer to connect to the VPN. This is because your iPod\
    \ touch will most likely use the same VPN login credentials as your computer.\n\
    \n##### Step 1: Contact Your Organization's Help Desk\n\nYou need to ask your\
    \ help desk or VPN administrator for the details about how to log into the VPN.\
    \ Your iPod touch can currently connect with the following types of VPNs: **L2TP**,\
    \ **PPTP**, and **IPSec** (Cisco). You also need to know if your VPN uses a **Proxy**\
    \ and whether the configuration is manual or automatic.\n\n##### Step 2: Set Up\
    \ the VPN Connection on Your iPod touch\n\nArmed with the login instructions and\
    \ type of VPN connection, you are ready to connect with your iPod touch:\n\n1.\
    \  Tap the **Settings** icon.\n\n    ![images](images/p134-01.jpg)\n\n2.  Tap\
    \ **General**.\n3.  Tap **Network**.\n4.  Scroll down to the bottom of the screen\
    \ and tap **VPN**.\n5.  On the **VPN** screen, tap the switch next to the **VPN**\
    \ option to set it to **ON**. You should then be taken to the **Add Configuration**\
    \ screen. If not, then tap **Add VPN Configuration** at the bottom to set up a\
    \ new VPN connection.\n\n    ![images](images/p135-01.jpg)\n\n6.  The **Add Configuration**\
    \ screen is where you set up your VPN login details, using the information from\
    \ your help desk or VPN administrator.\n\n    ![images](images/p135-02.jpg)\n\n\
    7.  If your VPN is an **L2TP** type, then you would use the screen shown here.\
    \ Scroll to the bottom and enter the **Proxy** information as required.\n8.  If\
    \ your VPN is a **PPTP** type, then you would tap **PPTP** at the top and use\
    \ the screen shown here. Scroll to the bottom and enter the **Proxy** information\
    \ as required.\n\n    ![images](images/p136-01.jpg)\n\n9.  If your VPN is an **IPSec**\
    \ (Cisco) type, then you would tap **IPSec** and use the screen shown here. Scroll\
    \ to the bottom and enter the **Proxy** information as required.\n\n    ![images](images/p136-02.jpg)\n\
    \n10.  When you are done with your setup, tap the **Save** button in the upper-right\
    \ corner.\n11.  If you have trouble logging in, make sure you are in a strong\
    \ wireless coverage area and verify you have typed all your login credentials\
    \ correctly. It can be difficult when passwords disappear as you type them. You\
    \ may want to try re-typing passwords and server information before calling the\
    \ help desk.\n\n#### Knowing When You Are Connected to a VPN Network\n\nYou will\
    \ see a small **VPN** icon ![images](images/p137-01.jpg) just to the right of\
    \ your network connection status display. You will know that you are securely\
    \ connected to the VPN network *only* when you see this icon.\n\n#### Switching\
    \ VPN Networks\n\nYou may have several VPN networks to which you need to connect.\
    \ You can select between different VPN configurations on your iPod touch by following\
    \ these steps:\n\n1.  Tap the **Settings** icon.\n2.  Tap **General**.\n3.  Tap\
    \ **Network**.\n4.  Scroll down to the bottom of the screen and tap **VPN**.\n\
    5.  On the VPN screen, tap a different **VPN configuration** to connect to it.\
    \ Don't tap the blue **Circle** icon with the > symbol, unless you want to change\
    \ the login settings for that network.\n\n## Chapter 5\n\n## AirPlay and Bluetooth\n\
    \nIn this chapter, we will show you how to connect your iPod touch with any AirPlay–\
    \ or Bluetooth–compatible device, whether it's an Apple TV, stereo speakers, or\
    \ a wireless headset.\n\n### Understanding AirPlay\n\n*AirPlay* is Apple's proprietary\
    \ video and audio streaming protocol. AirPlay works over your local home, school,\
    \ or office Wi-Fi network. Before you can use AirPlay with the iPod touch, you\
    \ have to make sure all your devices are connected to the same Wi-Fi network.\n\
    \n![images](images/p139-01.jpg)\n\n#### AirPlay Devices That Work with the iPod\
    \ touch\n\nAt the time of writing, only the 2010 model Apple TV supports AirPlay\
    \ video streaming. With it, you can stream content right from your iPod touch\
    \ to your big screen TV to share with business colleagues, friends, and family\
    \ alike.\n\nApple's AirPort Express Wi-Fi router has an audio out jack that can\
    \ be connected to speakers for AirPlay audio. Various third-party accessory makers\
    \ are also introducing AirPlay–compatible speakers. With AirPlay, you can remotely\
    \ control the playback and volume right from your iPod touch.\n\n### Setting Up\
    \ and Using AirPlay\n\nAirPlay is built right into the iPod touch. As long as\
    \ all your devices are connected to the same Wi-Fi network, no additional setup\
    \ is needed.\n\nSeveral of the built-in iPod touch apps support AirPlay, including\
    \ **Videos**, **Music**, and **YouTube**. Several App Store apps that use Apple's\
    \ default media player (e.g., **Air Video**) also support AirPlay. Follow these\
    \ steps to use AirPlay from an app that supports the feature:\n\n![images](images/p140-01.jpg)\n\
    \n1\\. Tap the blue **AirPlay** icon at the lower-right corner of the screen.\n\
    \n2\\. Choose from the list of available devices for streaming your music.\n\n\
    3\\. To switch the video or music back to your iPod touch, just tap the **AirPlay**\
    \ icon again and choose **iPod touch** from the list.\n\n**NOTE:** The **AirPlay**\
    \ icon will bring up a list of both Bluetooth and Wi-Fi connected devices. See\
    \ the next section for more on Bluetooth.\n\nYou can select **Apple TV** by tapping\
    \ it. Now your music or video will now start to play from the selected AirPlay\
    \ device. You can verify this by touching the **AirPlay** icon on the screen once\
    \ more. You should see a **Checkmark** icon next to the new AirPlay Stereo Bluetooth\
    \ device, and you should hear your music coming from that sound source, as well.\n\
    \n**TIP:** To save battery life on your iPod touch, turn off the screen by pressing\
    \ the **Sleep** button while streaming AirPlay content to another device. Your\
    \ music or video will continue to play, but you won't be wasting battery life\
    \ by keeping your screen lit.\n\n#### AirPlay Mirroring\n\nThe current iPod touch\
    \ does more than let you stream video or music from your iPod touch to an Apple\
    \ TV; it also lets you share the screen of any app—from a business presentation\
    \ at work, to a board game with the family, to a video call with distant relatives.\
    \ Being able to take **Keynote** or **Infinity Blade** or **FaceTime** from the\
    \ small iPod touch screen to a giant television set really transforms what was\
    \ an intimate personal experience into a fun social activity.\n\nFollow these\
    \ steps to use the AirPlay Mirroring feature:\n\n![images](images/p141-01.jpg)\n\
    \n4\\. Tap the app you want to mirror. For this example, we're using **Infinity\
    \ Blade.**\n\n5\\. Once the app has launched, double-click the Home button to\
    \ bring up the Fast App Switcher.\n\n6\\. Swipe from left to right to get to the\
    \ audio/video controls. (They're all the way at the end, so keep swiping until\
    \ you can't swipe any more.)\n\n![images](images/p141-02.jpg)\n\n7\\. Tap the\
    \ **AirPlaybutton** to bring up the list of AirPlay–enabled devices on your Wi-Fi\
    \ network.\n\n8\\. Select **AppleTV**.\n\n9\\. Toggle the **Airplay Mirroring**\
    \ switch to **ON**.\n\n10\\. Click the **Home** button again to return to your\
    \ app.\n\n11\\. You should now see **Infinity Blade** on the big screen. Let 'em\
    \ have it!\n\nTo stop AirPlay Mirroring, repeat the same procedure and choose\
    \ iPod touch from the device list."
  trans: "\n# 建立连接\n\n要建立连接，你需要从所在机构的技术服务台或网络管理员处获取 VPN 类型和具体的登录说明。然后，在 iPod touch\
    \ 上的 **“设置”** 应用中，将这些登录信息输入到 **“VPN”** 区域。\n\n**提示：** 如果你已经设置了电脑来连接 VPN，很可能可以省去致电技术服务台的步骤，并跳过第\
    \ 1 步。这是因为你的 iPod touch 很可能使用与电脑相同的 VPN 登录凭据。\n\n## 第 1 步：联系你所在机构的技术服务台\n\n你需要向技术服务台或\
    \ VPN 管理员询问登录 VPN 的详细信息。你的 iPod touch 当前支持连接以下类型的 VPN：**L2TP**、**PPTP** 和 **IPSec**（Cisco）。你还需要了解你的\
    \ VPN 是否使用 **代理**，以及配置是手动还是自动。\n\n## 第 2 步：在 iPod touch 上设置 VPN 连接\n\n掌握了登录说明和\
    \ VPN 连接类型后，你就可以在 iPod touch 上连接了：\n\n1.  轻点 **“设置”** 图标。\n\n    ![images](img/p134-01.jpg)\n\
    \n2.  轻点 **“通用”**。\n3.  轻点 **“网络”**。\n4.  向下滚动到屏幕底部，轻点 **“VPN”**。\n5.  在 **“VPN”**\
    \ 屏幕上，轻点 **“VPN”** 选项旁边的开关，将其设置为 **“开启”**。随后你应会进入 **“添加配置”** 屏幕。如果没有，则轻点底部的 **“添加\
    \ VPN 配置”** 来设置一个新的 VPN 连接。\n\n    ![images](img/p135-01.jpg)\n\n6.  **“添加配置”**\
    \ 屏幕是使用从技术服务台或 VPN 管理员处获得的信息来设置 VPN 登录详细信息的地方。\n\n    ![images](img/p135-02.jpg)\n\
    \n7.  如果你的 VPN 是 **L2TP** 类型，则你会看到此处所示的屏幕。滚动到底部，并根据需要输入 **代理** 信息。\n8.  如果你的 VPN\
    \ 是 **PPTP** 类型，则轻点顶部的 **“PPTP”**，然后使用此处所示的屏幕。滚动到底部，并根据需要输入 **代理** 信息。\n\n   \
    \ ![images](img/p136-01.jpg)\n\n9.  如果你的 VPN 是 **IPSec**（Cisco）类型，则轻点 **“IPSec”**\
    \ 并使用此处所示的屏幕。滚动到底部，并根据需要输入 **代理** 信息。\n\n    ![images](img/p136-02.jpg)\n\n10.\
    \  完成设置后，轻点右上角的 **“存储”** 按钮。\n11.  如果登录遇到问题，请确保你处于无线网络信号良好的区域，并检查你是否正确输入了所有登录凭据。由于输入的密码会隐藏显示，这可能会有些困难。在致电技术服务台之前，不妨尝试重新输入密码和服务器信息。\n\
    \n# 了解何时已连接到 VPN 网络\n\n你会在网络连接状态显示的右侧看到一个小型 **“VPN”** 图标 ![images](img/p137-01.jpg)。*只有*当你看到此图标时，才表示你已经安全地连接到\
    \ VPN 网络。\n\n# 切换 VPN 网络\n\n你可能需要连接多个 VPN 网络。你可以按照以下步骤在 iPod touch 上选择不同的 VPN\
    \ 配置：\n\n1.  轻点 **“设置”** 图标。\n2.  轻点 **“通用”**。\n3.  轻点 **“网络”**。\n4.  向下滚动到屏幕底部，轻点\
    \ **“VPN”**。\n5.  在 VPN 屏幕上，轻点另一个 **“VPN 配置”** 以连接到它。除非你想更改该网络的登录设置，否则不要轻点带有 >\
    \ 符号的蓝色 **“圆圈”** 图标。\n\n## 第 5 章\n\n# AirPlay 与蓝牙\n\n在本章中，我们将向你展示如何将 iPod touch\
    \ 与任何兼容 AirPlay 或蓝牙的设备连接，无论是 Apple TV、立体声扬声器还是无线耳机。\n\n## 了解 AirPlay\n\n*AirPlay*\
    \ 是苹果公司专有的视频和音频流传输协议。AirPlay 通过你本地家庭、学校或办公室的 Wi-Fi 网络工作。要在 iPod touch 上使用 AirPlay，你必须确保所有设备都连接到同一个\
    \ Wi-Fi 网络。\n\n![images](img/p139-01.jpg)\n\n### 与 iPod touch 兼容的 AirPlay 设备\n\
    \n在撰写本文时，仅有 2010 年款的 Apple TV 支持 AirPlay 视频流传输。通过它，你可以将内容直接从 iPod touch 流传输到大屏幕电视上，与同事、朋友和家人分享。\n\
    \n苹果的 AirPort Express Wi-Fi 路由器有一个音频输出接口，可以连接到扬声器以实现 AirPlay 音频播放。各种第三方配件制造商也在推出兼容\
    \ AirPlay 的扬声器。通过 AirPlay，你可以直接在你的 iPod touch 上远程控制播放和音量。\n\n## 设置和使用 AirPlay\n\
    \nAirPlay 已内置于 iPod touch 中。只要你的所有设备都连接到同一个 Wi-Fi 网络，就无需进行额外设置。\n\n几个内置的 iPod\
    \ touch 应用支持 AirPlay，包括 **“视频”**、**“音乐”** 和 **“YouTube”**。一些使用了苹果默认媒体播放器（例如 **“Air\
    \ Video”**）的 App Store 应用也支持 AirPlay。请按照以下步骤从支持该功能的应用中使用 AirPlay：\n\n![images](img/p140-01.jpg)\n\
    \n1\\. 轻点屏幕右下角的蓝色 **AirPlay** 图标。\n\n2\\. 从可用设备列表中选择用于流传输音乐的设备。\n\n3\\. 若要将视频或音乐切换回你的\
    \ iPod touch，只需再次轻点 **AirPlay** 图标，然后从列表中选择 **“iPod touch”**。\n\n**注意：** **AirPlay**\
    \ 图标会调出同时包含蓝牙和 Wi-Fi 连接设备的列表。有关蓝牙的更多信息，请参见下一节。\n\n你可以通过轻点 **“Apple TV”** 来选择它。现在，你的音乐或视频将从选定的\
    \ AirPlay 设备开始播放。你可以通过再次触摸屏幕上的 **AirPlay** 图标来验证这一点。你应该会看到在新选定的 AirPlay 立体声蓝牙设备旁边有一个\
    \ **“选中标记”** 图标，并且你应该能听到音乐从该音源发出。\n\n**提示：** 为了节省 iPod touch 的电池电量，在将 AirPlay\
    \ 内容流传输到其他设备时，可以按下 **“睡眠”** 按钮关闭屏幕。你的音乐或视频将继续播放，但你不会因为屏幕亮着而浪费电量。\n\n### AirPlay\
    \ 镜像\n\n当前的 iPod touch 不仅能让你将视频或音乐从 iPod touch 流传输到 Apple TV；还能让你共享任何应用的屏幕——无论是工作中的商务演示、与家人的棋盘游戏，还是与远方亲戚的视频通话。能够将\
    \ **Keynote**、**Infinity Blade** 或 **FaceTime** 从小小的 iPod touch 屏幕带到巨大的电视机上，这确实将个人的私密体验转变为有趣的社交活动。\n\
    \n请按照以下步骤使用 AirPlay 镜像功能：\n\n![images](img/p141-01.jpg)\n\n4\\. 轻点你想要镜像的应用。在此示例中，我们使用的是\
    \ **Infinity Blade**。\n\n5\\. 应用启动后，双击 Home 按钮以调出快速应用切换器。\n\n6\\. 从左向右滑动以找到音频/视频控制项。（它们在最末端，所以请持续滑动直到无法再滑动为止。）\n\
    \n![images](img/p141-02.jpg)\n\n7\\. 轻点 **AirPlay 按钮** 以调出你 Wi-Fi 网络上支持 AirPlay\
    \ 的设备列表。\n\n8\\. 选择 **Apple TV**。\n\n9\\. 将 **“AirPlay 镜像”** 开关切换至 **“开启”**。\n\
    \n10\\. 再次点击 **Home** 按钮以返回你的应用。\n\n11\\. 现在你应该能在屏幕上看到 **Infinity Blade** 了。放马过来吧！\n\
    \n要停止 AirPlay 镜像，请重复相同步骤，并从设备列表中选择 iPod touch。\n"
- fmt: '### Understanding Bluetooth


    Apple’s latest iPod touch supports Bluetooth 4.0, which includes traditional Bluetooth
    functionality, along with more advanced high speed and low power capabilities.
    This means you can talk or listen to music with better quality for longer than
    ever before.


    Thanks to the technology known as `A2DP`, you can also stream your music to a
    Bluetooth–capable stereo device, including many newer automotive stereos and car
    kits.


    **NOTE:** You must have a third-party Bluetooth–capable adapter or Bluetooth–capable
    stereo to stream your music via Bluetooth technology.


    ### Understanding Bluetooth


    Bluetooth allows your iPod touch to communicate with things wirelessly. Bluetooth
    is a small radio that transmits from each device. Before you can use a peripheral
    with the iPod touch, you have to pair that device with your iPod touch. Many Bluetooth
    devices can be used up to 30 feet away from the iPod touch.


    ![images](images/p142-01.jpg)


    #### Bluetooth Devices that Work with the iPod touch


    Among other things, the iPod touch works with Bluetooth headphones, Bluetooth
    stereo systems and adapters, Bluetooth keyboards, Bluetooth car stereo systems,
    Bluetooth headsets, and hands-free devices. The iPod touch supports `A2DP`, which
    is known as Stereo Bluetooth; and `AVRCP`, which allows you to remotely control
    playback and volume.


    ### Pairing with a Bluetooth Device


    Your primary uses for Bluetooth might be with Bluetooth headphones or Bluetooth
    stereo adapters. Any Bluetooth headphones should work well with your iPod touch.
    To start using any Bluetooth device, you need to first pair (connect) it with
    your iPod touch.


    #### Turning On Bluetooth


    ![images](images/p143-01.jpg)


    The first step to using Bluetooth is to turn the Bluetooth radio on. Follow these
    steps to do so:


    ![images](images/p143-02.jpg)


    1. Tap your **Settings** app.

    2. Then, tap **General.**

    3. Tap **Bluetooth.** By default, Bluetooth is initially set to **Off** on the
    iPod touch. Tap the switch to move it to the **On** position.


    **TIP:** Bluetooth is an added drain on your battery. If you don''t plan on using
    Bluetooth for a period of time, think about setting the switch back to **Off**.


    ![images](images/p143-02.jpg)


    #### Pairing with a Headset or Any Bluetooth Device


    As soon as you turn Bluetooth on, the iPod touch will begin to search for any
    nearby Bluetooth devices, such as a Bluetooth headset or stereo adapter (see [Figure
    5–1](#Chapter05.html#fig_5_1)). For the iPod touch to find your Bluetooth headset,
    you need to put that device into *pairing mode*. Read the instructions that came
    with your headset carefully—usually there is a combination of buttons to push
    to achieve this.


    **TIP:** Some headsets require you to press and hold a button for five seconds
    until you see a series of flashing blue or red/blue lights. Some accessories,
    such as the Apple wireless Bluetooth keyboard, automatically start up in pairing
    mode.


    Once the iPod touch detects the Bluetooth device, it will attempt to automatically
    pair with it. If pairing takes place automatically, there is nothing more for
    you to do.


    ![images](images/0501.jpg)


    **Figure 5–1.** *Bluetooth device discovered, but not yet paired*


    **NOTE:** Some Bluetooth devices (e.g., a headset) may ask you to enter a series
    of numbers (a *passkey*) on the keyboard itself (see [Figure 5–2](#Chapter05.html#fig_5_2)).


    ![images](images/0502.jpg)


    **Figure 5–2.** *Type in the four-digit passkey when prompted during the pairing
    process.*


    Newer headsets—like the Aliph Jawbone ICON used here—will automatically pair with
    your iPod touch. Simply put the headset into pairing mode and set your iPod touch’s
    **Bluetooth** option to **ON**—that’s all you have to do!


    ![images](images/p145-01.jpg)


    Pairing will be automatic and you should never have to re-pair the headset again.


    ### Bluetooth Stereo (A2DP)


    ![images](images/p145-02.jpg)


    One of the great features of today’s advanced Bluetooth technology is the ability
    to stream your music without wires via Bluetooth. The fancy name for this technology
    is `A2DP`, but it is more simply known as *Stereo Bluetooth*.


    #### Connecting to a Stereo Bluetooth Device


    The first step to using Stereo Bluetooth is to connect to a Stereo Bluetooth–capable
    device. This can be a car stereo with this technology built in or a pair of Bluetooth
    headphones or speakers.


    ![images](images/p145-03.jpg)


    Begin by putting the Bluetooth device into pairing mode per the manufacturer’s
    instructions, and then go to the Bluetooth setting page from the **Settings**
    icon, as shown earlier in the chapter.


    ![images](images/p145-04.jpg)


    Once connected, you will see the new Stereo Bluetooth device listed under your
    Bluetooth devices. Sometimes you will see the name or part of the name; other
    times you will simply see “Headset.” Tap the **Arrow** icon to the right of the
    device and you will see the actual name of the device next to the **Bluetooth**
    tab in the next screen, as shown here.


    Next, tap your **Music** app and start any song, playlist, podcast, or video music
    library.


    Follow these steps to choose your audio output device:


    4. Tap the blue **AirPlay** icon in the lower-right corner of the screen.


    ![images](images/p146-01.jpg)


    5. Choose from the list of available devices for streaming your music.


    6. To switch the music back to your iPod touch, just tap the **AirPlay** icon
    again and choose iPod touch from the list.


    **NOTE:** The **AirPlay** icon will bring up a list of both Bluetooth and Wi-Fi
    connected audio devices, such as Apple TV or AirPort Express connected speakers.
    You can choose from either one.


    We selected the Jawbone JAMBOX by tapping it. Now, your music will now start to
    play from the selected Bluetooth device. You can verify this by touching the **AirPlay**
    icon on the screen once more. You should see a **Checkmark** icon next to the
    new Stereo Bluetooth device, and you should hear your music coming from that sound
    source, as well.


    ### Disconnecting or Forgetting a Bluetooth Device


    Sometimes, you might want to disconnect a Bluetooth device from your iPod touch.
    This is easy to do. Enter the Bluetooth settings, as you did earlier in this chapter.
    Next, touch the device you want to disconnect to bring up the next screen, tap
    the **Forget this Device** button, and then confirm your choice.


    This will delete the Bluetooth profile from the iPod touch (see [Figure 5-5](#Chapter05.html#fig_5_5)).


    **NOTE:** Bluetooth has a range of only about 30 feet. If you are not near a Bluetooth
    device, then you should turn off Bluetooth. You can always turn it back on when
    you are actually ready to use it.


    ![images](images/0505.jpg)


    **Figure 5–5.** *Forgetting or disconnecting a Bluetooth device*


    ## Chapter 6


    ## Icons and Folders


    Your new iPod touch is very customizable. In this chapter, we will show you how
    to move icons around and put your favorite icons just where you want them. You’ve
    got up to 11 pages of icons to work with, and you can adjust the look and feel
    of those pages so they reflect your tastes.


    Like a Mac computer or an iPad, the iPod touch has a *Bottom Dock* where you can
    put the icons for your favorite apps. iPod touchs come with four standard icons
    in the Bottom Dock. You can replace the default icons with the icons for your
    favorite apps, so they are always available at the bottom of your screen. You
    can even move an entire folder of apps to the Bottom Dock.


    **TIP:** You can also move or delete icons using the **iTunes** app on your computer.
    Check out [Chapter 21](#Chapter21.html#ch21):“iTunes on Your Device” for more
    information.


    ### Moving Icons to the Bottom Dock


    When you turn your iPod touch on, you’ll notice four icons locked to the Bottom
    Dock.


    ![images](images/p150-01.jpg)


    Suppose you decide you want to exchange one or more of these icons for apps you
    use more often. Fortunately, moving icons to and from the Bottom Dock is easy.'
  raw: '### Understanding Bluetooth


    Apple''s latest iPod touch supports Bluetooth 4.0, which includes traditional
    Bluetooth functionality, along with more advanced high speed and low power capabilities.
    This means you can talk or listen to music with better quality for longer than
    ever before.


    Thanks to the technology known as A2DP, you can also stream your music to a Bluetooth–capable
    stereo device, including many newer automotive stereos and car kits.


    **NOTE:** You must have a third-party Bluetooth–capable adapter or Bluetooth–capable
    stereo to stream your music via Bluetooth technology.


    ### Understanding Bluetooth


    Bluetooth allows your iPod touch to communicate with things wirelessly. Bluetooth
    is a small radio that transmits from each device. Before you can use a peripheral
    with the iPod touch, you have to pair that device with your iPod touch. Many Bluetooth
    devices can be used up to 30 feet away from the iPod touch.


    ![images](images/p142-01.jpg)


    #### Bluetooth Devices that Work with the iPod touch


    Among other things, the iPod touch works with Bluetooth headphones, Bluetooth
    stereo systems and adapters, Bluetooth keyboards, Bluetooth car stereo systems,
    Bluetooth headsets, and hands-free devices. The iPod touch supports A2DP, which
    is known as Stereo Bluetooth; and AVRCP, which allows you to remotely control
    playback and volume.


    ### Pairing with a Bluetooth Device


    Your primary uses for Bluetooth might be with Bluetooth headphones or Bluetooth
    stereo adapters. Any Bluetooth headphones should work well with your iPod touch.
    To start using any Bluetooth device, you need to first pair (connect) it with
    your iPod touch.


    #### Turning On Bluetooth


    ![images](images/p143-01.jpg)


    The first step to using Bluetooth is to turn the Bluetooth radio on. Follow these
    steps to do so:


    ![images](images/p143-02.jpg)


    1\. Tap your **Settings** app.


    2\. Then, tap **General.**


    3\. Tap **Bluetooth.** By default, Bluetooth **is initi**ally set to **Off** on
    the iPod touch. Tap **the** switch to move it to the **On** position.


    **TIP:** Blueto**ot**h is an added drain on your battery. If you don''t plan on
    using Bluetooth for a period of time, think about setting the switch back to **Off**.


    ![images](images/p143-02.jpg)


    #### Pairing with a Headset or Any Bluetooth Device


    As soon as you turn Bluetooth on, the iPod touch will begin to search for any
    nearby Bluetooth devices, such as a Bluetooth headset or stereo adapter (see [Figure
    5–1](#Chapter05.html#fig_5_1)). For the iPod touch to find your Bluetooth headset,
    you need to put that device into *pairing mode*. Read the instructions that came
    with your headset carefully—usually there is a combination of buttons to push
    to achieve this.


    **TIP:** Some headsets require you to press and hold a button for five seconds
    until you see a series of flashing blue or red/blue lights. Some accessories,
    such as the Apple wireless Bluetooth keyboard, automatically start up in pairing
    mode.


    Once the iPod touch detects the Bluetooth device, it will attempt to automatically
    pair with it. If pairing takes place automatically, there is nothing more for
    you to do.


    ![images](images/0501.jpg)


    **Figure 5–1.** *Bluetooth device discovered, but not yet paired*


    **NOTE:** Some Bluetooth devices (e.g., a headset) may ask you to enter a series
    of numbers (a *passkey*) on the keyboard itself (see [Figure 5–2](#Chapter05.html#fig_5_2)).


    ![images](images/0502.jpg)


    **Figure 5–2.** *Type in the four-digit passkey when prompted during the pairing
    process.*


    Newer headsets—like the Aliph Jawbone ICON used here—will automatically pair with
    your iPod touch. Simply put the headset into pairing mode and set your iPod touch''s
    **Bluetooth** option to **ON**—that''s all you have to do!


    ![images](images/p145-01.jpg)


    Pairing will be automatic and you should never have to re-pair the headset again.


    ### Bluetooth Stereo (A2DP)


    ![images](images/p145-02.jpg)


    One of the great features of today''s advanced Bluetooth technology is the ability
    to stream your music without wires via Bluetooth. The fancy name for this technology
    is A2DP, but it is more simply known as *Stereo Bluetooth*.


    #### Connecting to a Stereo Bluetooth Device


    The first step to using Stereo Bluetooth is to connect to a Stereo Bluetooth–capable
    device. This can be a car stereo with this technology built in or a pair of Bluetooth
    headphones or speakers.


    ![images](images/p145-03.jpg)


    Begin by putting the Bluetooth device into pairing mode per the manufacturer''s
    instructions, and then go to the Bluetooth setting page from the **Settings**
    icon, as shown earlier in the chapter.


    ![images](images/p145-04.jpg)


    Once connected, you will see the new Stereo Bluetooth device listed under your
    Bluetooth devices. Sometimes you will see the name or part of the name; other
    times you will simply see “Headset.” Tap the **Arrow** icon to the right of the
    device and you will see the actual name of the device next to the **Bluetooth**
    tab in the next screen, as shown here.


    Next, tap your **Music** app and start any song, playlist, podcast, or video music
    library.


    Follow these steps to choose your audio output device:


    4\. Tap the blue **AirPlay** icon in the lower-right corner of the screen.


    ![images](images/p146-01.jpg)


    5\. Choose from the list of available devices for streaming your music.


    6\. To switch the music back to your iPod touch, just tap the **AirPlay** icon
    again and choose iPod touch from the list.


    **NOTE:** The **AirPlay** icon will bring up a list of both Bluetooth and Wi-Fi
    connected audio devices, such as Apple TV or AirPort Express connected speakers.
    You can choose from either one.


    We selected the Jawbone JAMBOX by tapping it. Now, your music will now start to
    play from the selected Bluetooth device. You can verify this by touching the **AirPlay**
    icon on the screen once more. You should see a **Checkmark** icon next to the
    new Stereo Bluetooth device, and you should hear your music coming from that sound
    source, as well.


    ### Disconnecting or Forgetting a Bluetooth Device


    Sometimes, you might want to disconnect a Bluetooth device from your iPod touch.
    This is easy to do. Enter the Bluetooth settings, as you did earlier in this chapter.
    Next, touch the device you want to disconnect to bring up the next screen, tap
    the **Forget this Device** button, and then confirm your choice.


    This will delete the Bluetooth profile from the iPod touch (see [Figure 5-5](#Chapter05.html#fig_5_5)).


    **NOTE:** Bluetooth has a range of only about 30 feet. If you are not near a Bluetooth
    device, then you should turn off Bluetooth. You can always turn it back on when
    you are actually ready to use it.


    ![images](images/0505.jpg)


    **Figure 5–5.** *Forgetting or disconnecting a Bluetooth device*


    ## Chapter 6


    ## Icons and Folders


    Your new iPod touchis very customizable. In this chapter, we will show you how
    to move icons around and put your favorite icons just where you want them. You''ve
    got up to 11 pages of icons to work with, and you can adjust the look and feel
    of those pages so they reflect your tastes.


    Like a Mac computer or an iPad, the iPod touch has a *Bottom Dock* where you can
    put the icons for your favorite apps. iPod touchs come with four standard icons
    in the Bottom Dock. You can replace the default icons with the icons for your
    favorite apps, so they are always available at the bottom of your screen. You
