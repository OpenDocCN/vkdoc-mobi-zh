- fmt: "### Reading iBooks\n\nTouch any title in your library to open it for reading.\
    \ The book will open to the very first page, which is often the title page or\
    \ other *front matter* in the book.\n\n![images](images/p247-01.jpg)\n\nIn the\
    \ upper-left corner, next to the `Library` button, you can see a `Table of Contents`\
    \ button. To jump to the table of contents, either touch the `Table of Contents`\
    \ button or simply turn the pages to advance to the table of contents.\n\nYou\
    \ can turn pages in one of three ways. First, you can touch the right-hand side\
    \ of the page to turn to the next page. Second, you can slowly touch and hold\
    \ the screen on the right edge of the page; and, while continuing to touch the\
    \ screen, gently and slowly move your finger to the left.\n\n![images](images/p247-02.jpg)\n\
    \n**TIP**: If you move your finger very slowly you can actually see the words\
    \ on the back of the page as you “turn” it—a very cool visual effect.\n\nThe last\
    \ way to turn pages is to use the slider at the bottom of the page. As you slowly\
    \ slide from left to right, you will see the page number on top of the slider.\
    \ Release the slider and you can advance to that particular page number.\n\n![images](images/p247-03.jpg)\n\
    \n#### Customizing Your Reading Experience: Brightness, Fonts, and Font Sizes\n\
    \nIn the upper center of the book, there are three icons available: `Brightness`,\
    \ `Size`, and `Search`. These options help to make your reading experience much\
    \ more immersive.\n\nTouch the `Brightness` icon and you can adjust the brightness\
    \ of the book.\n\nIf you are reading in bed in a very dark room, you might want\
    \ to dim the tablet by sliding the `Brightness` slider all the way to the left.\
    \ If you are out in the sunlight, you may need to slide it all the way to the\
    \ right. However, you should keep in mind that high screen brightness consumes\
    \ more battery power than most other features, so turn this feature back down\
    \ when you don't need your screen to be so bright anymore.\n\n![images](images/p248-01.jpg)\n\
    \n![images](images/p248-02.jpg)\n\n**NOTE**: The preceding tip adjusts the brightness\
    \ only within `iBooks`. To adjust the global brightness of the iPod touch, use\
    \ the `Settings` app (go to the `Settings` icon > `Brightness` & `Wallpaper`).\n\
    \nThe `Font Size and Type` icon lets you adjust font values to suit your preferences.\n\
    \nDo this to `Increase the Font Size`:\n\nTap the large `A` icon multiple times.\n\
    \nDo this to `Decrease the Font Size`:\n\nTap the small `a` icon multiple times.\n\
    \nAt the time of writing, there are six available font styles—but there may well\
    \ be more fonts available when you read this book.\n\nHave fun and try out some\
    \ of the various fonts. The default selection is the Palatino font, but all of\
    \ the fonts look great, and a larger font size can make a difference for some.\
    \ The goal is to adjust the font size so the text is as comfortable and easy to\
    \ read as possible.\n\n![images](images/p248-03.jpg)\n\n#### Grow Your Vocabulary\
    \ Using the Built-In Dictionary\n\n`iBooks` contains a very powerful built-in\
    \ dictionary, which can be quite helpful when you run across a word that is new\
    \ or unfamiliar.\n\n**NOTE**: The first time you attempt to use the dictionary,\
    \ your iPod touch will need to download it. Follow the on-screen prompts to download\
    \ the dictionary.\n\nAccessing the dictionary could not be easier. Just touch\
    \ and hold any word in the book. A pop-up will appear with various options that\
    \ let you highlight a word, create a note, or search for other occurrences of\
    \ this particular word.\n\n![images](images/p249-01.jpg)\n\n![images](images/p249-02.jpg)\n\
    \nTouch `Dictionary` and a pronunciation and definition of the word will be displayed.\
    \ Touch `Done` to leave the dictionary and go back to your book.\n\n#### Setting\
    \ an In-Page Bookmark\n\nTo view your bookmarks, just touch the `Table of Contents`\
    \ icon at the top left of the screen (next to the `Library` icon), and then touch\
    \ `Bookmarks`. Touch the bookmark highlighted and you will jump to that section\
    \ in the book.\n\n![images](images/p250-01.jpg)\n\n**TIP**: You do not need to\
    \ set a bookmark every time you leave `iBooks`. The app will automatically remember\
    \ where you stop reading in a book. This holds true no matter how many books you\
    \ open and read, so can always return to exactly where you stopped reading in\
    \ a given book. The `iBooks` app will also sync with the version of `iBooks` on\
    \ your iPad, so you can move back and forth between devices and keep your place\
    \ in a given book.\n\n#### Using Highlighting and Notes\n\nThere are some very\
    \ nice “added touches” to the `iBooks` app. For example, there may be times that\
    \ you want to highlight a particular word to come back to at another time. And\
    \ there may be other times you want to leave yourself a note in the margin.\n\n\
    Both of these things are very easy to do in `iBooks`.\n\n##### Highlighting Text\n\
    \nFollow these steps to highlight text in the iBooks app:\n\n1.  Touch and hold\
    \ any word to bring up the menu options.\n\n    ![images](images/p250-02.jpg)\n\
    \n2.  Choose `Highlight` from the menu options.\n3.  To remove the highlight,\
    \ tap the word and then select `Remove Highlight`.\n\nChanging the color of a\
    \ highlight is as simple as following these steps:\n\n![images](images/p251-01.jpg)\n\
    \n1.  Tap the highlighted word.\n2.  Choose `Colors` from the menu.\n3.  Choose\
    \ a new color.\n\n##### Adding Notes\n\nIt's also easy to add a note in the margin\
    \ in `iBooks`:\n\n1.  Touch and hold any word, as you did previously.\n2.  Choose\
    \ `Note` from the menu.\n3.  Type in your note and then touch `Done`. The note\
    \ now appears on the side of the page in the margin (see [Figure 13–1](#Chapter12.html#fig_13_1)).\n\
    \n**TIP:** Your notes will also appear under your bookmarks on the title page.\
    \ Just touch the `Title Page` button and then touch `Bookmarks`. You can find\
    \ the notes you write at the bottom of the page.\n\nYou can change the color of\
    \ notes the same way you change the color of highlights!\n\n![images](images/1301.jpg)\n\
    \n**Figure 13-1.** *Using the Notes feature in `iBooks`*\n\n#### Using Search\n\
    \n`iBooks` contains a powerful search feature built right in. Just touch the `Search`\
    \ icon, and (as in other programs on the iPod touch) the built-in keyboard will\
    \ pop up. Type in the word or phrase you are searching for and you will see a\
    \ list of chapters where that word occurs.\n\nJust touch the selection desired\
    \ and you will jump to that section in the book. You also have the option of jumping\
    \ right to Google or Wikipedia by touching the appropriate buttons at the bottom\
    \ of the `Search` window.\n\n![images](images/p252-01.jpg)\n\n**NOTE**: Using\
    \ the Wikipedia or Google search will take you out of `iBooks` and launch `Safari`.\n\
    \n### Moving and Deleting Books\n\nDeleting books from your iBooks library is\
    \ very similar to deleting applications from the iPod touch. You can delete or\
    \ move iBooks by tapping the `Edit` button in the `Library` view.\n\ntop-left\
    \ corner. ![images](images/p253-01.jpg)\n\nOnce you touch the `Edit` button, you\
    \ will notice a small black “`x`” in the upper-left corner of each book.\n\n![images](images/p253-02.jpg)\n\
    \nJust touch the “`x`” and you will be prompted to delete the book. Once you touch\
    \ `Delete`, the book will disappear from the shelf.\n\n![images](images/p253-03.jpg)"
  raw: "### Reading iBooks\n\nTouch any title in your library to open it for reading.\
    \ The book will open to the very first page, which is often the title page or\
    \ other *front matter* in the book.\n\n![images](images/p247-01.jpg)\n\nIn the\
    \ upper-left corner, next to the **Library** button, you can see a **Table of\
    \ Contents** button. To jump to the table of contents, either touch the **Table\
    \ of Contents** button or simply turn the pages to advance to the table of contents.\n\
    \nYou can turn pages in one of three ways. First, you can touch the right-hand\
    \ side of the page to turn to the next page. Second, you can slowly touch and\
    \ hold the screen on the right edge of the page; and, while continuing to touch\
    \ the screen, gently and slowly move your finger to the left.\n\n![images](images/p247-02.jpg)\n\
    \n**TIP**: If you move your finger very slowly you can actually see the words\
    \ on the back of the page as you “turn” it—a very cool visual effect.\n\nThe last\
    \ way to turn pages is to use the slider at the bottom of the page. As you slowly\
    \ slide from left to right, you will see the page number on top of the slider.\
    \ Release the slider and you can advance to that particular page number.\n\n![images](images/p247-03.jpg)\n\
    \n#### Customizing Your Reading Experience: Brightness, Fonts, and Font Sizes\n\
    \nIn the upper center of the book, there are three icons available: **Brightness**,\
    \ **Size**, and **Search**. These options help to make your reading experience\
    \ much more immersive.\n\nTouch the **Brightness** icon and you can adjust the\
    \ brightness of the book.\n\nIf you are reading in bed in a very dark room, you\
    \ might want to dim the tablet by sliding the **Brightness** slider all the way\
    \ to the left. If you are out in the sunlight, you may need to slide it all the\
    \ way to the right. However, you should keep in mind that high screen brightness\
    \ consumes more battery power than most other features, so turn this feature back\
    \ down when you don't need your screen to be so bright anymore.\n\n![images](images/p248-01.jpg)\n\
    \n![images](images/p248-02.jpg)\n\n**NOTE**: The preceding tip adjusts the brightness\
    \ only within **iBooks**. To adjust the global brightness of the iPod touch, use\
    \ the **Settings** app (go to the **Settings** icon > **Brightness** & **Wallpaper**).\n\
    \nThe **Font Size and Type** icon lets you adjust font values to suit your preferences.\n\
    \nDo this to **Increase the Font Size:**\n\nTap the large **A** icon multiple\
    \ times.\n\nDo this to **Decrease the Font Size:**\n\nTap the small **a** icon\
    \ multiple times.\n\nAt the time of writing, there are six available font styles—but\
    \ there may well be more fonts available when you read this book.\n\nHave fun\
    \ and try out some of the various fonts. The default selection is the Palatino\
    \ font, but all of the fonts look great, and a larger font size can make a difference\
    \ for some. The goal is to adjust the font size so the text is as comfortable\
    \ and easy to read as possible.\n\n![images](images/p248-03.jpg)\n\n#### Grow\
    \ Your Vocabulary Using the Built-In Dictionary\n\n**iBooks** contains a very\
    \ powerful built-in dictionary, which can be quite helpful when you run across\
    \ a word that is new or unfamiliar.\n\n**NOTE**: The first time you attempt to\
    \ use the dictionary, your iPod touch will need to download it. Follow the on-screen\
    \ prompts to download the dictionary.\n\nAccessing the dictionary could not be\
    \ easier. Just touch and hold any word in the book. A pop-up will appear with\
    \ various options that let you highlight a word, create a note, or search for\
    \ other occurrences of this particular word.\n\n![images](images/p249-01.jpg)\n\
    \n![images](images/p249-02.jpg)\n\nTouch **Dictionary** and a pronunciation and\
    \ definition of the word will be displayed. Touch **Done** to leave the dictionary\
    \ and go back to your book.\n\n#### Setting an In-Page Bookmark\n\nTo view your\
    \ bookmarks, just touch the **Table of Contents** icon at the top left of the\
    \ screen (next to the **Library** icon), and then touch **Bookmarks**. Touch the\
    \ bookmark highlighted and you will jump to that section in |the book.\n\n![images](images/p250-01.jpg)\n\
    \n**TIP**: You do not need to set a bookmark every time you leave **iBooks**.\
    \ The app will automatically remember where you stop reading in a book. This holds\
    \ true no matter how many books you open and read, so can always return to exactly\
    \ where you stopped reading in a given book. The **iBooks** app will also sync\
    \ with the version of **iBooks** on your iPad, so you can move back and forth\
    \ between devices and keep your place in a given book.\n\n#### Using Highlighting\
    \ and Notes\n\nThere are some very nice “added touches” to the **iBooks** app.\
    \ For example, there may be times that you want to highlight a particular word\
    \ to come back to at another time. And there may be other times you want to leave\
    \ yourself a note in the margin.\n\nBoth of these things are very easy to do in\
    \ **iBooks**.\n\n##### Highlighting Text\n\nFollow these steps to highlight text\
    \ in the iBooks app:\n\n1.  Touch and hold any word to bring up the menu options.\n\
    \n    ![images](images/p250-02.jpg)\n\n2.  Choose **Highlight** from the menu\
    \ options.\n3.  To remove the highlight, tap the word and then select **Remove\
    \ Highlight**.\n\nChanging the color of a highlight is as simple as following\
    \ these steps:\n\n![images](images/p251-01.jpg)\n\n1.  Tap the highlighted word.\n\
    2.  Choose Colors from the menu.\n3.  Choose a new color.\n\n##### Adding Notes\n\
    \nIt's also easy to add a note in the margin in **iBooks**:\n\n1.  Touch and hold\
    \ any word, as you did previously.\n2.  Choose **Note** from the menu.\n3.  Type\
    \ in your note and then touch **Done**. The note now appears on the side of the\
    \ page in the margin (see [Figure 13–1](#Chapter12.html#fig_13_1)).\n\n**TIP:**\
    \ Your notes will also appear under your bookmarks on the title page. Just touch\
    \ the **Title Page** button and then touch **Bookmarks**. You can find the notes\
    \ you write at the bottom of the page.\n\nYou can change the color of notes the\
    \ same way you change the color of highlights!\n\n![images](images/1301.jpg)\n\
    \n**Figure 13-1.** *Using the Notes feature in **iBooks***\n\n#### Using Search\n\
    \n**iBooks** contains a powerful search feature built right in. Just touch the\
    \ **Search** icon, and (as in other programs on the iPod touch) the built-in keyboard\
    \ will pop up. Type in the word or phrase you are searching for and you will see\
    \ a list of chapters where that word occurs.\n\nJust touch the selection desired\
    \ and you will jump to that section in the book. You also have the option of jumping\
    \ right to Google or Wikipedia by touching the appropriate buttons at the bottom\
    \ of the **Search** window.\n\n![images](images/p252-01.jpg)\n\n**NOTE**: Using\
    \ the Wikipedia or Google search will take you out of **iBooks** and launch **Safari**.\n\
    \n### Moving and Deleting Books\n\nDeleting books from your iBooks library is\
    \ very similar to deleting applications from the iPod touch. You can delete or\
    \ move iBooks by tapping the **Edit** button in the **Library** view.\n\ntop-left\
    \ corner. ![images](images/p253-01.jpg)\n\nOnce you touch the **Edit** button,\
    \ you will notice a small black “**x**” in the upper-left corner of each book.\n\
    \n![images](images/p253-02.jpg)\n\nJust touch the “**x**” and you will be prompted\
    \ to delete the book. Once you touch **Delete**, the book will disappear from\
    \ the shelf.\n\n![images](images/p253-03.jpg)"
  trans: "\n### 阅读 iBooks\n\n在书库中轻点任意标题即可打开阅读。图书将打开至第一页，通常是扉页或其他*前端内容*。\n\n![images](img/p247-01.jpg)\n\
    \n左上角`Library`按钮旁，你会看到一个`Table of Contents`按钮。要跳转到目录，可以轻点`Table of Contents`按钮，或直接翻页至目录页。\n\
    \n翻页有三种方式。第一种，轻点页面的右侧区域翻到下一页。第二种，在页面右边缘缓慢长按屏幕；在持续触摸屏幕的同时，轻轻向左慢慢移动手指。\n\n![images](img/p247-02.jpg)\n\
    \n**提示**：如果移动手指的速度非常慢，在“翻动”页面时，你甚至能看到背面文字——这是一种非常酷的视觉效果。\n\n最后一种翻页方式，是使用页面底部的滑动条。当你从左向右缓慢滑动时，滑动条上方会显示页码。松开手指，即可跳转到该页码。\n\
    \n![images](img/p247-03.jpg)\n\n#### 自定义阅读体验：亮度、字体和字号\n\n图书页面顶部中央有三个图标：`Brightness`、`Size`和`Search`。这些选项能让你的阅读体验更加沉浸。\n\
    \n轻点`Brightness`图标即可调节图书亮度。\n\n如果你在非常暗的房间里躺在床上阅读，将`Brightness`滑块向左拖到底，可以调暗平板屏幕。如果你在阳光下阅读，则需要将其向右拖到底。但请注意，屏幕高亮度比大多数其他功能更耗电，因此当不需要过亮屏幕时，请将亮度调回。\n\
    \n![images](img/p248-01.jpg)\n\n![images](img/p248-02.jpg)\n\n**注**：以上提示仅调节`iBooks`内的亮度。要调节\
    \ iPod touch 的全局亮度，请使用`Settings`应用（进入`Settings`图标 > `Brightness` & `Wallpaper`）。\n\
    \n`Font Size and Type`图标可让你根据偏好调整字体设置。\n\n**增大字号**的方法：\n\n多次轻点大`A`图标。\n\n**减小字号**的方法：\n\
    \n多次轻点小`a`图标。\n\n在撰写本书时，共有六种字体样式可供选择——但当你阅读本书时，可能已有更多字体可用。\n\n尽情尝试不同的字体吧。默认字体是\
    \ Palatino，但所有字体都看起来很棒，而且更大的字号对某些人来说会有很大不同。目标是调整字号，使文本尽可能舒适易读。\n\n![images](img/p248-03.jpg)\n\
    \n#### 使用内置词典扩充词汇量\n\n`iBooks`内置了一个非常强大的词典，当你遇到生词或不熟悉的单词时，它会非常有用。\n\n**注**：首次尝试使用词典时，你的\
    \ iPod touch 需要下载它。按屏幕提示下载词典即可。\n\n访问词典再简单不过了。只需长按书中的任意单词，便会弹出一个包含多个选项的菜单，供你高亮单词、创建笔记或搜索该单词的其他位置。\n\
    \n![images](img/p249-01.jpg)\n\n![images](img/p249-02.jpg)\n\n轻点`Dictionary`，就会显示该单词的发音和释义。轻点`Done`即可退出词典，返回图书。\n\
    \n#### 设置书内书签\n\n要查看书签，只需轻点屏幕左上角的`Table of Contents`图标（位于`Library`图标旁），然后轻点`Bookmarks`。轻点高亮显示的书签，即可跳转到书中的相应章节。\n\
    \n![images](img/p250-01.jpg)\n\n**提示**：你不需要每次离开`iBooks`时都设置书签。该应用会自动记住你在哪本书的哪里停止阅读。无论你打开并阅读多少本书，这一功能都有效，因此你总能回到某本书中你上次停止阅读的准确位置。`iBooks`应用还会与\
    \ iPad 上的`iBooks`版本同步，因此你可以跨设备来回切换，并保持在你阅读的位置。\n\n#### 使用高亮和笔记\n\n`iBooks`应用有一些非常棒的“附加功能”。例如，有时你可能想高亮某个单词以便稍后回顾，有时你又想在页边空白处给自己留个笔记。\n\
    \n在`iBooks`中，这两件事都非常容易做到。\n\n##### 高亮文本\n\n按以下步骤在 iBooks 应用中高亮文本：\n\n1.  长按任意单词调出菜单选项。\n\
    \n    ![images](img/p250-02.jpg)\n\n2.  从菜单中选择`Highlight`。\n3.  要移除高亮，轻点该单词，然后选择`Remove\
    \ Highlight`。\n\n更改高亮颜色的步骤如下：\n\n![images](img/p251-01.jpg)\n\n1.  轻点高亮的单词。\n\
    2.  从菜单中选择`Colors`。\n3.  选择一种新颜色。\n\n##### 添加笔记\n\n在`iBooks`的页边空白处添加笔记也很简单：\n\n\
    1.  像之前一样，长按任意单词。\n2.  从菜单中选择`Note`。\n3.  输入你的笔记，然后轻点`Done`。笔记现在会显示在页面侧边的空白处（参见图\
    \ 13-1）。\n\n**提示**：你的笔记也会出现在扉页上的书签中。只需轻点`Title Page`按钮，然后轻点`Bookmarks`，即可在页面底部找到你写的笔记。\n\
    \n更改笔记颜色的方法与更改高亮颜色的方法相同！\n\n![images](img/1301.jpg)\n\n**图 13-1.** *在`iBooks`中使用笔记功能*\n\
    \n#### 使用搜索功能\n\n`iBooks`内置了强大的搜索功能。只需轻点`Search`图标，内置键盘便会弹出（与 iPod touch 上的其他程序一样）。输入你要搜索的单词或短语，你将看到该单词出现的章节列表。\n\
    \n轻点所需的选项，即可跳转到书中的该章节。你还可以通过轻点`Search`窗口底部的相应按钮，直接跳转到 Google 或 Wikipedia。\n\n\
    ![images](img/p252-01.jpg)\n\n**注**：使用 Wikipedia 或 Google 搜索将使你离开`iBooks`并启动`Safari`。\n\
    \n### 移动和删除图书\n\n从 iBooks 书库中删除图书的方式，与从 iPod touch 中删除应用非常相似。你可以通过轻点`Library`视图中的`Edit`按钮来删除或移动\
    \ iBooks。\n\n左上角。![images](img/p253-01.jpg)\n\n轻点`Edit`按钮后，你会注意到每本书的左上角出现了一个黑色小“`x`”。\n\
    \n![images](img/p253-02.jpg)\n\n只需轻点“`x`”，系统会提示你删除图书。轻点`Delete`后，图书就会从书架上消失。\n\
    \n![images](img/p253-03.jpg)\n"
- fmt: '### Other E-Book Readers: Kindle and Kobo


    As we have noted, the `iBooks` app offers an unparalleled e-book reading experience.
    However, there are other e-book reader apps available for the iPod touch that
    are worth checking out.


    ![images](images/p253-04.jpg)


    Many users already have a Kindle and have invested in a Kindle library. Others
    use the `Kobo` e-reader software (formerly called `Shortcovers`) and have invested
    in a library of books for that platform.


    ![images](images/p253-02.jpg)


    Fortunately, both e-book platforms have apps in the iPod touch App Store. When
    either program is downloaded and installed, you can sign in and read your complete
    library for its respective platform on your iPod touch.


    **NOTE**: No matter which of these other e-readers you choose, you can always
    just “sign in,” see your complete library, and pick up just where you left off
    in your last book—even if you started reading on a different device.


    #### Download E-Reader Apps


    It''s a trivial matter to download alternative e-reader apps. Simply go to the
    App Store, touch `Categories`, and then touch `Books`. In this section, you will
    find the `Kindle` and `Kobo` apps. Both are free apps, so just touch the `Free`
    button to begin downloading one of them.


    **TIP**: It is usually faster to search by the name of the app if you know which
    one you are looking for.


    Once your desired e-reader software is installed, touch the app''s icon to start
    it.


    #### The Kindle Reader


    Amazon''s Kindle reader is the world''s most popular e-reader. Millions of people
    have Kindle books, and the `Kindle` app allows you to read your Kindle books on
    your iPod touch.


    The iPod touch and iPad versions of the `Kindle` app have just been updated to
    support audio and video, making these versions even more advanced than the one
    found on the Kindle hardware itself.


    **TIP**: If you use a Kindle device, don''t worry about signing in from your iPod
    touch. You can have several devices tied to a single account. You will be able
    to enjoy all the books you''ve purchased for your Kindle right on the `Kindle`
    app on the iPod touch.


    To use the `Kindle` app on your iPod touch, just touch its icon and either sign
    in to your Kindle account or create a new account with a user name and password.


    ![images](images/p255-01.jpg)


    Once you sign in, you will see your Kindle books on the `Home` page. You can touch
    a book to start reading it.


    ![images](images/p255-02.jpg)


    **NOTE**: In order to buy or download new books, you need to go to [`www.amazon.com`](http://www.amazon.com)
    in the `Safari` web browser. Once you''ve bought or downloaded a new book to your
    account, it will appear in the `Kindle` app.


    To read a Kindle book, touch its cover and it will open.


    To see the options for reading, just touch the screen and they will be shown along
    the bottom row of icons.


    You can add a bookmark by touching the `Plus` (`+`) button. Once the bookmark
    is set, the `Plus` (`+`) button turns into to a `Minus` (`−`) button.


    You can go to the cover, table of contents, or beginning of the book (or specify
    any other location in the book) by touching the `Book` button.


    The font, as well as the color of the page, can be adjusted. One very interesting
    feature is the ability to change the page to `Black`—which is great when reading
    at night.


    ![images](images/p256-01.jpg)


    To advance pages, either swipe from right to left or touch the right side of the
    page. To go back a page, just swipe from left to right or touch the left side
    of the page.


    Tap the screen and a slider appears at the bottom; you can move this to advance
    to any page in the book.


    To return to your list of books, just touch the `Home` button.


    #### The Kobo Reader


    Like the `Kindle` reader, the `Kobo` reader begins by asking you to sign into
    your existing Kobo Books account. All of your existing Kobo Books will then be
    available for reading.


    `Kobo`''s `Shelf` view uses a bookshelf metaphor, similar to the one used by `iBooks`.
    Tap the book cover for whichever book you wish to open.


    Or, you can touch the `List` tab to see your books organized in a `List` view.


    ![images](images/p257-01.jpg)


    Open any book, and you will see two buttons along the top of the Kobo reader:
    `I''m Reading` and `Settings`.


    ![images](images/p257-02.jpg)


    Touching the `I''m Reading` button places a bookmark where you left off in the
    book and returns the screen to your `Shelf` view.


    Touching the `Settings` button will display a series of buttons along the bottom
    of the screen for viewing bookmarks, seeing information about the book, and adjusting
    the page transition style and font. Under those buttons are four icons: `Font`,
    `Brightness`, `Screen Lock`, and `Nighttime Reading`. Touch any of these buttons
    to make adjustments to your viewing experience.


    ![images](images/p257-03.jpg)


    To advance pages in the `Kobo` reader, touch the right side of the page. To go
    back a page, just touch the left side of the page. You can also use the slider
    at the bottom to advance through the pages.


    ## Chapter 13


    ## Newsstand and More


    In the last chapter, we spoke about how the iPod touch has revolutionized the
    world of reading with iBooks. Not only is the iPod touch unparalleled for reading
    e-books, it''s Newsstand folder is unequaled in dealing with new media such as
    online newspapers and magazines. Plus, the App Store makes it easy to find comic
    books readers, PDF readers, and more. The iPod touch is even set to revitalize
    the comic book industry with comic books that look beautiful and are amazingly
    interactive.


    In this chapter, we''ll explore how to enjoy new media using the iPod touch''s
    vivid screen and terrific touch interface.


    ### Newsstand


    The Newsstand is a special folder on your iPod touch''s Home screen that looks
    like a bookshelf and collects and organizes all your magazine and newspaper apps.
    This folder does not behave like a regular iPod touch folder. If a magazine or
    newspaper app supports Newsstand, then it will show you the latest cover art or
    front page for that periodical sitting on the shelf, rather than the Newsstand
    Folder icon (you will also see this cover or front page in the Fast App Switcher).


    If the magazine or newspaper app offers subscriptions and you''re a subscriber,
    then Newsstand apps can also automatically download the latest issues overnight,
    so you have something new to read when you open it in the morning.


    ![images](images/p259-01.jpg)


    The Newsstand folder also has a `Store` button that takes you to a special section
    of the App Store. This section lists all the magazine and newspaper apps that
    currently support Newsstand.


    Other than the special presentation and ability to download new issues automatically,
    a Newsstand app otherwise functions just like any other app.


    **NOTE:** It''s up to each magazine and newspaper app to add Newsstand support.
    At the time of writing, many but not all magazine apps have added Newsstand support.
    If an app doesn''t support Newsstand, it will download to the `Home` screen and
    behave just like any regular, non-Newsstand app.


    Also, magazine and newspaper selection can vary greatly by country. Use the `Store`
    button in Newsstand to see the latest selection in your area.'
