  trans: "\n### 创建免费 Apple ID\n\n如果你从未使用过 iTunes，也没有 Apple ID，那么你需要创建一个。在 iPod touch\
    \ 上即可快速完成：\n\n1. 轻点**创建新 Apple ID**。\n2. 滚动 **年**、**月** 和 **日** 滚轮，选择正确日期来输入生日，然后轻点蓝色\
    \ **下一步** 按钮。\n3. 在相应字段中输入你的名和姓，然后轻点蓝色 **下一步** 按钮。\n\n   ![images](img/p40-01.jpg)\n\
    \n4. 选择是使用现有电子邮件地址（例如 Gmail、Hotmail、Yahoo! 或个人电子邮件地址），还是创建一个新的 iCloud 电子邮件地址（`@me.com`）。如果你不想费心记住新邮箱地址，建议使用现有地址。如果你希望将邮件分开管理，那么可以创建一个新的。\n\
    5. 如果你正在创建新的 iCloud `@me.com` 地址，请输入密码并点击 **验证**。你的密码必须“强”；即必须包含大写和小写字母、至少一个数字，并且长度至少为\
    \ 8 个字符。\n6. 选择一个**安全信息**问题。这个问题应易于你记忆，但他人难以轻易猜到（也就是说，任何人都不应能仅通过查看你的博客、Facebook、Google、Yahoo!\
    \ 或其他在线个人资料页面就能找到答案）。\n7. 选择你是否希望从此新地址接收来自 Apple 的电子邮件更新。如果不希望，请将此选项设置为 **关闭**。\n\
    8. 你需要接受 **条款与条件** 两次：首先轻点左下角的蓝色 **同意** 按钮，然后在弹出的确认窗口中轻点半透明的 **同意** 按钮。同样，验证可能需要片刻。\n\
    9. 然后 Apple 将设置你的新 Apple ID。这可能需要一点时间。\n\n### 配置 iCloud 选项\n\n使用你的 Apple ID 登录后，即可配置你的\
    \ iCloud 设置：\n\n1. 如果你希望使用 **设置 iCloud** 功能——我们建议你这样做，因为它免费且提供大量有用的备份和同步功能——那么请将\
    \ **iCloud** 选项保持为 **打开** 状态，并轻点蓝色 **下一步** 按钮。\n2. 选择是否使用 iCloud 备份服务，通过无线方式将\
    \ iPod touch 备份到 Apple 数据中心，或通过 USB 使用 iTunes 备份到电脑。同样，我们建议将 **iCloud** 设置为 **打开**，因为它是自动的，你无需记着去手动操作。\n\
    \n   ![images](img/p41-01.jpg)\n\n3. **查找我的 iPod touch** 服务是 iCloud 的免费部分，它可以显示你\
    \ iPod touch 的大致位置（你能知道它是在家还是在办公室，但无法确定具体房间）、让它响铃以便你发现它（即使它掉到汽车座椅下或沙发后面），甚至在你设备丢失或被盗时抹掉所有个人数据。如果你希望使用此功能，请将此选项保持为\
    \ **打开** 状态。\n4. 这就完成了！你的 iPod touch 现已设置好，可以开始使用了。\n\n### 使用 iCloud 恢复 iPod touch\n\
    \n如果你之前曾使用 iCloud 备份过 iPod touch，则可以直接从设备通过无线方式从该备份恢复：\n\n1. 轻点 **从 iCloud 备份恢复**。\n\
    2. 输入你 iCloud Apple ID 的电子邮件地址和密码。\n3. 选择要恢复的备份。通常，这会是可用的最新备份。\n4. 你的 iPod touch\
    \ 将重新启动、下载备份并重新启动。此过程可能需要几分钟，尤其当你有大量数据需要恢复时。\n5. iPod touch 恢复完成后，你的应用将开始下载和安装。iCloud\
    \ 可以同时下载和安装多个应用，你可以在恢复过程中继续使用你的 iPod touch。\n\n## 使用 iTunes 设置 iPod touch\n\n\
    如果你不想使用 iCloud，或者有之前 iTunes 的备份需要进行恢复，那么你仍然可以通过 USB 用电脑设置你的 iPod touch。\n\n如果你的电脑未安装\
    \ iTunes，请打开网页浏览器并访问 [`www.itunes.com/download`](http://www.itunes.com/download)。从提供的链接下载该软件。\n\
    \n如果你已安装 iTunes，则应检查是否有更新版本可用。截至本书出版时，版本 10.5 为最新版本。请按照以下步骤更新你的 iTunes 版本：\n\n\
    1. 启动 **iTunes** 应用。\n2. 如果你使用的是 Windows 系统，请从菜单中选择 **帮助**，然后选择 **检查更新**。\n3.\
    \ 如果你使用的是 Mac 系统，请从菜单中选择 **iTunes**，然后选择 **检查更新**。\n4. 如果有可用更新，请按照说明更新 **iTunes**。\n\
    \n### 从之前的备份恢复 iPod touch\n\n首次将新 iPod touch 连接到 iTunes 时，你将看到如图 1–2 所示的屏幕。\n\n\
    ![images](img/0102.jpg)\n\n**图 1–2.** *欢迎使用 iPod 屏幕*\n\n**警告：** 我们曾听闻有人在将非 iPod\
    \ touch 设备（例如 iPad 或 iPod touch）的备份恢复到 iPod touch 时遇到问题（例如死机或电池续航缩短）。此外，选择 **恢复**\
    \ 的前提是你已对旧设备进行了备份；否则，将没有数据可恢复到新 iPod touch。\n\n请执行以下操作，从另一台 iPod touch 或设备的备份进行恢复：\n\
    \n![images](img/0103.jpg)\n\n**图 1–3.** *设置 iPod touch 屏幕*\n\n1. 点击 **从以下设备的备份恢复**\
    \ 左侧的单选按钮（见图 1–3）\n2. 从下拉菜单中选择特定的备份文件。\n3. 点击 **继续** 按钮，将备份文件中的数据恢复到你的 iPod touch。至此，你已完成\
    \ iPod touch 的初始设置。\n\n**注意：** 你仍需同步希望在 iPod touch 上使用的任何应用、游戏、音乐和其他媒体。\n\n##\
    \ 维护你的 iPod touch\n\n现在你已经使用 iTunes 设置了 iPod touch，你将需要了解如何安全地清洁屏幕以及使用各种保护壳进行防护。\n\
    \n### 清洁 iPod touch 屏幕\n\n使用 iPod touch 一段时间后，你会发现你的手指（或他人的手指）在原本光洁的屏幕上留下了污迹和油渍。你将需要了解如何安全地清洁屏幕。保持屏幕全天更干净的方法之一是为\
    \ iPod touch 贴上保护屏贴，这还有可能带来减少眩光的额外好处（将在下一节讨论）。\n\n我们还建议采取以下步骤：\n\n1. 按住顶部的 **睡眠/电源**\
    \ 键关闭 iPod touch，然后使用滑块关机。\n2. 拔下所有线缆，例如 USB 同步线。\n3. 使用干燥、柔软的无线头布（如清洁眼镜用的布或类似布料）擦拭屏幕。\n\
    4. 如果干布无效，可尝试用少量水将布稍微打湿。如果使用湿布，请尽量避免水进入开口处。\n5. 另一种选择是使用 Klear Screen 的 *iKlear*\
    \ 屏幕清洁剂。该产品适用于你的 iPod touch 以及其他设备，如电脑、笔记本电脑或 iPad 屏幕。\n\n**警告：** 切勿使用家用清洁剂、研磨性清洁剂（如\
    \ SoftScrub）、氨水类清洁剂（如 Windex）、酒精、喷雾剂或溶剂。\n\n### iPod touch 保护壳与保护套\n\n将 iPod touch\
    \ 拿到手中后，你会注意到它精美的构造。你也会发现它可能相当滑、会轻微晃动，或者在你打字时背部容易被刮花。\n\n我们建议为你的 iPod touch 购买一个保护壳。普通保护壳的价格约为\
    \ 10–40 美元，而精美的皮革保护壳可能花费 100 美元或更多。花点小钱保护你价值 200 美元或更高的 iPod touch 是非常明智的。\n"
- fmt: '#### Where to Buy Your Covers


    You can purchase an iPod touch protective cover at any of the following locations:


    - Amazon.com ([`www.amazon.com`](http://www.amazon.com))

    - The Apple Accessory Store ([`http://store.apple.com`](http://store.apple.com))

    - iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))


    You might also do a web search for "iPod touch cases" or "iPod touch protective
    covers."


    **TIP:** You *may* be able to use a case designed for another type of device or
    smartphone for your iPod touch. If you go this route to save some money, just
    make sure your iPod touch fits securely in the case or cover you choose.


    #### What to Buy…


    The following sections list some types of cases available for your iPod touch
    and the price ranges you can expect to pay.


    ##### Rubber / Silicone Cases ($10–30)


    Rubber and silicone cases provide a cushioned grip, absorb iPod touch bumps and
    bruises, and isolate the edges of the iPod touch from your fingers.


    **Pros:** These cases are inexpensive, colorful, and comfortable to hold.


    **Cons:** They are not as professional as a leather case.


    ##### Combined Cases with External Battery Packs ($50-80)


    Cases combined with external battery packs serve a couple purposes: they combine
    the protective features of a hard shell case with a rechargeable external battery
    pack. Manufacturers such as Mophie and Case-Mate are busy working on iPod touch
    versions of their cases; with some luck, they will be available by the time you
    read this book.


    **Pros:** These cases protect your iPod touch and provide a tremendous boost in
    your battery life—in some cases, they boost battery life by more than 50%.


    **Cons:** They add weight and bulk to the iPod touch.


    ##### Waterproof Cases ($10–40)


    Waterproof cases protect your iPod touch from water, allowing you to safely use
    the device in the rain, at the pool, at the beach, on a boat, and so on.


    **Pros:** These cases provide good protection from various sources of water.


    **Cons:** They can make the touch screen harder to use, and they usually do not
    protect from drops or bumps.


    ##### Hard Plastic / Metal Case ($20–40)


    Hard plastic and metal cases provide solid protection against scratches, bumps,
    and short drops.


    **Pros:** These cases provide superior protection for your iPod touch.


    **Cons:** They add some bulk and weight. Also, you may need to remove such cases
    when charging your iPod touch, or it might overheat.


    ##### Leather or Special Cases ($50–100+)


    Leather and other special cases provide more of a luxury feel and protect the
    iPod touch.


    **Pros:** These cases add a touch of luxury to your iPod touch, while also protecting
    the front and back of the device.


    **Cons:** They are more expensive and add bulk and weight.


    ##### Screen Protectors ($5–40)


    Screen and back glass protectors help you protect the screen and back of the iPod
    touch from scratches.


    **Pros:** These cases help prolong the life of your iPod touch by protecting it
    against scratches; most such cases also decrease screen glare.


    **Cons:** Some of these cases may increase glare or affect the touch sensitivity
    of the screen.


    ### iPod touch Basics


    Now that you have your iPod touch charged, with a clean screen, and decked out
    with a new protective case—let''s look at some of the basics for getting around
    its software.


    #### Powering On/Off and Sleep/Wake


    To power on your iPod touch, press and hold the `Power/Sleep` button on the top
    edge of the iPod touch for a few seconds. Simply tapping this button quickly won''t
    power on the iPod touch if it is completely off—in that case, you need to hold
    the button until you see the iPod touch power on.


    When you are no longer using your iPod touch, you have two options: you can either
    put it into Sleep mode or turn it off completely (see [Figure 1–4](#Chapter01.html#fig_1_4)).


    ![images](images/0104.jpg)


    **Figure 1–4.** *Using the Power/Sleep and Home buttons on your iPod touch.*


    The advantage of Sleep mode is this: when you want to use your iPod touch again,
    simply tap the `Power/Sleep` button or the `Home` button to bring your iPod touch
    back awake. If you want to maximize your battery or if you know you won''t be
    using your iPod touch for quite some time—say when you go to sleep—you should
    turn it off completely. The way to do this is to press and hold the `Power/Sleep`
    button until you see the `Slide to Power Off` bar appear. Just slide the bar to
    the right and the iPod touch will power off.


    #### Assistive Touch Accessibility


    As part of its excellent Accessibility features, Apple includes the Assistive
    Touch feature for people with special physical or motor skills needs. These include
    touch screen versions of the hardware buttons, as well as common and custom gestures.


    Follow these steps to enable the Assistive Touch feature:


    1.  Tap the `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Accessibility` near the bottom of the page.

    4.  Tap `Assistive Touch`.

    5.  Set the `Assistive Touch` switch to `On`.

    6.  Tap the `Assistive Touch` overlay icon when it appears at the bottom right
    of your screen.

    7.  Tap `Home` to simulate a physical press of the hardware `Home` button.

    8.  Tap `Device` to get access to other hardware button simulators, including
    `Rotate Screen`, `Lock Screen`, `Muted`/`Unmuted`, `Volume Up`, `Volume Down`,
    and `Shake`.

    9.  Tap `Gestures` or `Favorites` (favorite gestures) to access Pinch, Swipe,
    and any custom gestures that have been set up.

    10.  Tap the center of the overlay menu to return to the previous menu or to exit
    Assistive Touch.


    ![images](images/p49-01.jpg)


    **NOTE:** Assistive Touch also allows for sophisticated gestures, including custom
    gestures.


    #### Slide to Unlock and Quick Camera and Media Access


    Once your iPod touch has been activated, you will see the `Slide to Unlock` screen,
    as shown in [Figure 1–5](#Chapter01.html#fig_1_5).


    Double-click the `Home` button to see media control when you have music playing
    and, more importantly, get instant access to your camera for those times when
    you want to grab a quick picture. Tap the camera icon next to the slider at the
    bottom.


    To get into your `iPod touch`, touch your finger to the screen and follow the
    path of the arrow to move the `Slide to Unlock` button to the right. Once you
    do that, you will see your `Home` screen.


    Notice the four icons in the Bottom Dock. The items in this dock do not move,
    while the rest of the icons can move back and forth in *pages*. You can learn
    how to move your favorite icons into the Bottom Dock in the "Moving Icons" section
    of [Chapter 6](#Chapter06.html#ch6) : "Icons and Folders."


    ![images](images/0105.jpg)


    **Figure 1–5.** ***Slide to Unlock**, Quick Camera and Media Access and your **Home**
    screen.*


    #### Moving Around Inside Apps and Your Settings Screens


    Getting around the screens inside the apps on your iPod touch is as simple as
    tapping the screen:


    1.  Tap the `Settings` icon to start the `Settings` app.

    2.  Touch `General` to see General settings.

    3.  Touch `Network` to see Network settings.

    4.  You can toggle any switch by tapping it. For example, touching the `OFF` switch
    next to `Data Roaming` will toggle it to `ON`.

    5.  To go back a level in the screens, touch the button in the upper-left corner.
    In this case, you would touch the `General` button to leave the `Network Settings`
    screen.


    #### The Home Button


    ![images](images/p50-01.jpg)


    The button you will use most often is your `Home` button. This button will initiate
    everything you do with your iPod touch. If your iPod touch is sleeping, press
    the `Home` button once to wake up your iPod touch (assuming it is in Sleep mode).


    Pressing the `Home` button will also take you out of any application program and
    bring you back to your `Home` screen.'
