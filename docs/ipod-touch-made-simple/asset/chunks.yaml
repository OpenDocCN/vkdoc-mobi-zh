  trans: "\n### 使用自动填充节省时间\n\n`AutoFill`（自动填充）功能是一种绝佳方式，可帮你节省输入个人信息的时间，包括网站上的用户名和密码。`AutoFill`（自动填充）工具能够记住并填写网页表单中需要的信息。启用`AutoFill`（自动填充）功能将为你节省大量时间。\n\
    \n请参照本章稍后“启用自动填充”部分展示的步骤，在 iPod touch 上设置`AutoFill`（自动填充）功能。\n\n一旦启用了`AutoFill`（自动填充）选项，只需前往任何带有待填写字段的网页。当你触摸该字段时，键盘会立即在屏幕底部弹出。在键盘顶部，你会看到一个写着`AutoFill`（自动填充）的小按钮。触摸它，网页表单就会自动填写完毕。\n\
    \n**警告：** 让姓名和密码自动输入意味着任何拿起你 iPod touch 的人都能访问你的个人网站和信息。你可能希望按照第 8 章：“个性化与安全”中所述，启用密码锁定功能。\n\
    \n#### 输入用户名与密码\n\n第一次访问需要输入用户名和密码的网站时，请键入这些信息，然后按下`Submit`（提交）或`Enter`（回车）。此时，`AutoFill`（自动填充）会询问你是否希望\
    \ iPod touch 记住它们。\n\n如果你希望记住这些信息以便下次访问该网站时自动输入，请轻点`Yes`（是）。\n\n![images](img/p300-01.jpg)\n\
    \n下次访问此登录页面时，你的用户名和密码将会自动填写。\n\n![images](img/p300-02.jpg)\n\n#### 个人信息填写\n\n\
    在网上很多时候你都需要输入自己的姓名、电子邮件地址、家庭住址等信息。只要将`AutoFill`（自动填充）设置好并与 iPod touch 上的联系人记录关联，填写这些表单只需轻点一下手指。\n\
    \n你会遇到许多需要填写网页表单的网站。例如，看看[`www.madesimplelearning.com`](http://www.madesimplelearning.com)上这个为免费\
    \ iPod touch 使用技巧而设的网页表单示例。手动输入电子邮件地址、名字和姓氏需要花费不少时间。\n\n![images](img/p301-01.jpg)\n\
    \n一旦你轻点第一个字段——在此例中是`Email`（电子邮件）——就会看到`AutoFill`（自动填充）栏出现在键盘上方。\n\n轻点`AutoFill`（自动填充）按钮，你的电子邮件地址和姓名便会立即从联系人记录中填入。\n\
    \n![images](img/p301-02.jpg)\n\n### 将网页图标添加到主屏幕\n\n如果你喜欢某个网站或页面，将其作为图标添加到`Home`（主）屏幕是非常容易的。这样一来，你无需通过`Safari`的书签选择过程就能立即访问该网页。将图标放在`Home`（主）屏幕上可以节省大量操作步骤。这对于快速启动网络应用（例如，来自\
    \ Google 的 Gmail 或基于网页的游戏）尤其有用。\n\n**按照以下步骤添加网络应用图标：**\n\n1.  轻点浏览器底部的`Action`（操作）按钮\
    \ ![images](img/p302-01.jpg)。\n2.  轻点`Add to Home Screen`（添加到主屏幕）。\n3.  调整名称，将其缩短至十个或更少的字符；你应该这样做，因为主屏幕上图标名称的显示空间有限。\n\
    4.  轻点右上角的`Add`（添加）按钮。\n\n![images](img/p302-02.jpg)\n\n## 调整 Safari 浏览器设置\n\n\
    与我们目前调整过的其他设置类似，`Safari`的设置可以在`Settings`（设置）应用中找到。\n\n1.  要访问`Safari`的设置，请轻点`Settings`（设置）图标。\n\
    2.  轻点`Safari`。\n\n![images](img/p302-03.jpg)\n\n### 更改搜索引擎\n\n默认情况下，`Safari`浏览器的搜索引擎是`Google`。要将其更改为`Yahoo`或`Bing`，请触摸`Search\
    \ Engine`（搜索引擎）按钮，然后选择新的搜索引擎。\n\n![images](img/p303-01.jpg)\n\n### 启用自动填充\n\n\
    正如我们本章前面所展示的，`AutoFill`（自动填充）是一种便捷方式，可以让`Safari`自动填写要求提供姓名、地址、电话号码，甚至用户名和密码的网页表单。它可以为你节省大量反复输入姓名及其他信息的时间。\n\
    \n要启用`AutoFill`（自动填充）选项，请按照以下步骤操作：\n\n1.  在`Settings`（设置）应用中的`Safari`菜单里，轻点`AutoFill`。\n\
    \n    ![images](img/p303-02.jpg)\n\n2.  将`Names & Passwords`（名称与密码）旁边的开关设置为`ON`（开启）。\n\
    3.  将`Use Contact Info`（使用联系人信息）旁边的开关设置为`ON`（开启）。\n\n    ![images](img/p303-03.jpg)\n\
    \n4.  将`Use Contact Info`（使用联系人信息）设置为`ON`（开启）后，你会被带到`Contacts`（通讯录）列表，以选择一个要使用的联系人。\n\
    5.  上下滑动以查找某人，或双击顶部写着`Contacts`（通讯录）的栏以调出`Search`（搜索）窗口。\n6.  找到想要使用的联系人后，轻点它即可返回到`Safari`的`Settings`（设置）屏幕。\n\
    \n![images](img/p304-01.jpg)\n\n### 调整隐私选项\n\n开启`Private Browsing`（私密浏览）选项意味着，在你访问网站时，不会存储任何信息、历史记录或\
    \ Cookie。如果你担心别人知道你访问了哪些网站，或者担心访问的网站对你进行跟踪，那么你应该将`Private Browsing`（私密浏览）切换到`ON`（开启）位置。\n\
    \n你还可以使用`Clear History`（清除历史记录）和`Clear Cookies and Data`（清除 Cookie 与数据）选项。\n\n\
    ![images](img/p304-02.jpg)\n\n![images](img/p304-03.jpg)\n\n**提示：** 如果你发现网页浏览速度变慢或卡顿——或者\
    \ Safari 频繁崩溃——那么请尝试通过轻点`History`（历史记录）和`Cookies and Data`（Cookie 与数据）并确认选择来清除它们。\n\
    \n### 调整安全选项\n\n在`Security`（安全）标题下，`Fraud Warning`（欺诈警告）、`JavaScript`和`Block Pop-ups`（拦截弹出式窗口）选项默认应为`ON`（开启）。你可以通过将相应的开关滑动到`OFF`（关闭）来修改这些设置。\n\
    \n![images](img/p305-01.jpg)\n\n**注意：** 许多像 Facebook 这样的热门网站要求`JavaScript`处于`ON`（开启）状态。\n\
    \n轻点`Accept Cookies`（接受 Cookie）按钮，可以将浏览器接受 Cookie 的能力调整为`Always`（始终）、`Never`（永不）或`From\
    \ visited`（来自已访问站点）。我们建议保持为`From visited`（来自已访问站点）。如果设为`Never`（永不），某些网站将无法正常工作。\n\
    \n![images](img/p305-02.jpg)\n\n## 第 16 章\n\n## 使用电子邮件进行通信\n\n在本章中，我们将探索 iPod\
    \ touch 上`Mail`（邮件）应用中的电子邮件世界。你将学习如何设置多个电子邮件账户、查看各种阅读选项、打开附件以及清理收件箱。\n\n![Images](img/p307-01.jpg)\n\
    \n并且，针对你的电子邮件无法正常工作时的情况，你将学到一些很好的故障排除技巧，以帮助你恢复正常运行。\n\n### 邮件入门\n\n在 iPod touch\
    \ 上设置电子邮件相当简单。让电子邮件启动并运行的最快方法可能是在 iPod touch 上直接设置账户。我们在本节中向你展示如何使用`Mail, Contacts\
    \ and Calendar`（邮件、通讯录和日历）账户设置屏幕。你也可以使用电脑上`iTunes`应用中的某个屏幕来复制这些账户设置。你需要网络连接才能让电子邮件正常运行。\n\
    \n#### 需要网络连接\n\n如今，移动电子邮件无疑风靡一时。你可以在没有网络连接的情况下查看、阅读和撰写已同步到 iPod touch 的电子邮件的回复；但是，你需要具备网络连接才能通过\
    \ iPod touch 发送和/或接收电子邮件。请查看第 4 章：“连接到网络”以了解更多信息。此外，请参阅第一部分快速入门指南中的“阅读顶部连接状态图标”部分。\n\
    \n**提示：** 如果你要出行，只需在登机前下载所有电子邮件；这样你就可以在离线状态下阅读、回复和撰写邮件。所有邮件将在你着陆并重新连接到互联网后发送。\n"
- fmt: "### Setting up Email on the iPod Touch\n\nAs mentioned a moment ago, you have\
    \ two options for setting up your email accounts on the iPod touch:\n\n1. Set\
    \ up your email accounts directly on the iPod touch.\n2. Use iTunes to sync email\
    \ account settings.\n\nThe first option, setting up your email accounts directly\
    \ on the iPod touch, works best if you want a special setup on your iPod touch,\
    \ such as Gmail over Exchange. This is also a good approach if you don’t use an\
    \ email program on your Windows or Mac PC.\n\nIf you have a lot of POP3 or IMAP\
    \ accounts already set up on your Windows or Mac computer, you can also choose\
    \ to sync them over your USB dock cable via iTunes.\n\n#### Entering Passwords\
    \ for Email Accounts\n\nIn [Chapter 3](#Chapter03.html#ch3), we showed you how\
    \ to sync your email account settings to your iPod touch. After this sync completes,\
    \ you should be able to view all of the email accounts on your iPod touch by opening\
    \ the `Settings` app. All you will need to do is enter the password for each account.\n\
    \nTo enter your password for each synced email account, follow these steps:\n\n\
    1. Tap the `Settings` icon.\n2. Tap the `Mail, Contacts, and Calendars` option.\n\
    3. Under `Accounts`, you should see all your synced email accounts listed.\n4.\
    \ Tap any listed email account, type its password, and click `Done`.\n5. If all\
    \ the information is entered correctly, checkmarks will appear and you’re account\
    \ will be enabled.\n6. Repeat for all listed email accounts.\n\n#### Adding a\
    \ New Email Account on the iPod Touch\n\nTo add a new email account on your iPod\
    \ touch, follow these steps:\n\n1. Tap the `Settings` icon.\n\n   ![Images](images/p309-01.jpg)\n\
    \n2. Tap the `Mail, Contacts, and Calendars` option.\n3. Tap `Add Account` below\
    \ your email accounts.\n\n   If you have no accounts set up, you will only see\
    \ the `Add Account` option.\n\n   **TIP:** To edit any email account, just touch\
    \ that account.\n\n4. Choose which type of email account to add on this screen:\n\
    \n   ![Images](images/p309-02.jpg)\n\n   * Choose `iCloud` if you use this service.\n\
    \   * Choose `Microsoft Exchange` if you use a Microsoft Exchange email server.\n\
    \   * You should also choose `Microsoft Exchange` if you use Google Calendar and\
    \ Google Contacts to store your personal information, and you want to wirelessly\
    \ sync them to your iPod touch.\n\n   **NOTE:** We show you how to set up both\
    \ Google/Microsoft Exchange and iCloud in [Chapter 3](#Chapter03.html#ch3): “Sync\
    \ with iCloud, iTunes and More.”\n\n   * Choose `Gmail` if you use Google for\
    \ your email, but you do *not* (or do *not* want to) wirelessly sync email with\
    \ your `Google Contacts`.\n   * Choose `Yahoo!, AOL, or WindowsLive Hotmail` if\
    \ you use those services.\n   * Choose `Other` if none of the above apply, and\
    \ you want to sync a standard POP or IMAP email account. Finally, choose `Add\
    \ Mail Account` from the next screen.\n\n5. Type your name as you would like others\
    \ to see it when they receive mail from you into the `Name` field.\n\n   ![Images](images/p310-01.jpg)\n\
    \n6. Next, add the appropriate information into the `Address`, `Password`, and\
    \ `Description` fields.\n7. Tap the `Next` button in the upper-right.\n\n#####\
    \ Specifying Incoming and Outgoing Servers\n\nSometimes, the iPod touch will not\
    \ be able to automatically set up your email account. In these cases, you will\
    \ need to type in a few more settings manually to enable your email account.\n\
    \n**TIP:** You may be able to find the settings for your email provider by doing\
    \ a web search for your email provider’s name and email settings.\n\nIf the iPod\
    \ touch is unable to log into your server with only your email address and password,\
    \ then you will see a screen similar to this one.\n\n![Images](images/p311-01.jpg)\n\
    \nUnder `Incoming Mail Server`, type the appropriate information into the `Host\
    \ Name`, `User Name`, and `Password` fields. Usually, your incoming mail server\
    \ is something like `mail.*name_of_your_isp*.com`.\n\nTo adjust the name of your\
    \ outgoing server, tap `Outgoing Mail Server`. You can adjust the outgoing mail\
    \ server on the following screen. These server names usually look like either\
    \ `smtp.*name_of_your_isp*.com` or `mail.*name_of_your_isp*.com`.\n\nYou can try\
    \ to leave the `Server Name` and `Password` fields blank. If that doesn’t work,\
    \ you can always go back and change them.\n\nYou may be asked if you want to use\
    \ SSL (secure socket layer), a type of outgoing mail security that may be required\
    \ by your email provider. If you don’t know whether you need SSL, just check the\
    \ mail settings with your email provider.\n\n**TIP:** The authors recommend that\
    \ you use SSL security whenever possible. If you do not use SSL, then your login\
    \ credentials, messages, and any private information are sent in plain text (unencrypted),\
    \ leaving them open to snoopers.\n\n##### Verifying that Your Account Is Set Up\n\
    \nOnce all the information is entered, the iPod touch will attempt to configure\
    \ your email account. You may get an error message; if that happens, you need\
    \ to review the information you input.\n\n![Images](images/p311-02.jpg)\n\nIf\
    \ you are taken to the screen that shows all your email accounts, look for the\
    \ new account name.\n\n![Images](images/p312-01.jpg)\n\nIf you see it, your account\
    \ was set up correctly.\n\n##### Fixing the \"Cannot Get Mail\" Error\n\nYou will\
    \ need to enter your password if you tap `Mail` icon and you receive an error\
    \ that says “Cannot Get Mail—No password provided for *(your account)*.”\n\n![Images](images/p312-02.jpg)\n\
    \nReview this chapter’s “Enter Passwords for E-Mail Accounts Synced from iTunes”\
    \ section for help with this issue.\n\n#### The Mailboxes Screen—Inboxes and Accounts\n\
    \nThe top-level screen is your `Mailboxes` screen. You can always get to it by\
    \ tapping the button in the upper-left corner. Keep tapping this upper-left button\
    \ until you see no more buttons. When that happens, you are in the `Mailboxes`\
    \ screen.\n\nFrom the `Mailboxes` screen, you can access the following items:\n\
    \n* The **unified inbox:** Access this by tapping `All inboxes`.\n* **The inbox\
    \ for each individual account:** Access this by tapping that email account name\
    \ in the `Inboxes` section.\n\n  ![Images](images/p313-01.jpg)\n\n* **The folders\
    \ for each email account in the Accounts section**: Access these by tapping the\
    \ account name to see all folders.\n\n  ![Images](images/p313-02.jpg)\n\n####\
    \ Adding or Editing Email Folders or Mailboxes\n\nWith iOS 5, you can now add\
    \ or edit email folders right on your iPod touch if you are using an iCloud-synced\
    \ mail account or your mail server supports this feature. Say, you wanted to change\
    \ a mail folder name or add a new mail folder to better organize your messages\
    \ inbox. One example might be to create a new folder called “Requires Attention”\
    \ and put all those emails that you cannot get to right now, but need to make\
    \ sure you address later when you back at your desk. To add or edit a mailbox\
    \ on your device, follow these steps:\n\n1. **From the Mailboxes screen scroll\
    \ to the bottom and tap any of your email accounts listed under Accounts.**\n\n\
    \   ![Images](images/p314-01.jpg)\n\n2. In this example, we will edit the iCloud\
    \ account mailboxes. On this screen tap `Edit` in the upper right.\n\n   ![Images](images/p314-02.jpg)\n\
    \n3. Then, you can do the following:\n\n   ![Images](images/p314-03.jpg)\n\n \
    \  * Tap the `New Mailbox` at the bottom to create a new mailbox.\n   * Tap any\
    \ mailbox folder to edit the name or delete it."
