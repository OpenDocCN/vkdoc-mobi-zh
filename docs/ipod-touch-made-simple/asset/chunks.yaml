  trans: '

    ### 使用底部图标


    `YouTube` 应用底部有五个图标：`精选`、`最多观看`、`搜索`、`收藏`和`更多`。每个选项的含义都一目了然。


    ![images](img/p281-01.jpg)


    要观看 YouTube 当天推荐的视频，请触摸`精选`图标。要观看网上点击量最高的视频，请触摸`最多观看`图标。


    观看某个特定视频后，你可以选择将其标记为 `YouTube` 上的收藏，以便日后轻松查找。如果你已设置书签，点击`收藏`图标时它们就会显示出来。


    ![images](img/p281-02.jpg)


    你还可以搜索 YouTube 庞大的视频库。点击`搜索`框（如之前讨论的其他应用中的操作一样），键盘就会弹出。输入短语、主题，甚至视频名称。


    在此示例中，我正在寻找最新的《Made Simple Learning》视频教程——所以我只需输入“Made Simple Learning”即可看到此类视频的列表。


    当我找到想观看的视频时，可以点击它以查看更多信息。我甚至可以在播放过程中触摸视频并选择评分来对其进行评分。


    ![images](img/p281-03.jpg)


    ### 播放视频


    一旦做出选择，点击你想观看的视频。你的 iPod touch 将开始以竖屏或横屏模式播放 YouTube 视频。要强制使用竖屏模式，只需转动 iPod touch，使屏幕方向变为垂直。


    ### 视频控制


    视频开始播放后，屏幕上的控制选项会消失，因此你只能看到视频。要在视频播放时停止、暂停或激活任何其他选项，只需点击屏幕。


    屏幕上的选项与你观看其他任何视频时看到的选项非常相似。


    要在横屏模式下快进视频，请按住`快进`箭头。要快速后退，请按住`后退`箭头。要跳转到 YouTube 列表中的下一个视频，请点击`快进/下一个`箭头。要观看列表中的上一个视频，请点击`后退/上一个`箭头。


    ![images](img/p282-01.jpg)


    要将视频设为收藏，请点击最左边的图标：`收藏`。![images](img/p282-02.jpg)


    要将视频投放到你的 Apple TV，请点击`AirPlay`按钮。![images](img/p282-03.jpg)


    ![images](img/p282-04.jpg)


    要添加到收藏、通过电子邮件发送或发布推文分享视频，请点击`分享`图标，然后你可以执行其中任一操作。


    ![images](img/p282-05.jpg)


    ### 查看和清除历史记录


    ![images](img/p283-01.jpg)


    触摸`更多`，然后触摸`历史记录`，你最近观看过的视频就会显示出来。


    如果你想清除历史记录，只需触摸右上角的`清除`按钮，然后点击底部的按钮进行确认。


    要从历史记录中观看视频，只需点击它，它便会开始播放。


    ![images](img/p283-02.jpg)


    ## 第 15 章


    ## Safari 网页浏览器


    现在，我们将带你了解在 iPod touch 上能做的最有趣的事情之一：上网冲浪。你可能听说过，在 iPod touch 上浏览网页是一种前所未有的亲密体验——我们同意这一点！我们将向你展示如何使用
    iPod touch 上的 `Safari` 浏览器以前所未有的方式进行触摸、缩放和与网页互动。你将学习如何设置和使用书签、使用搜索引擎快速查找内容、打开和切换多个浏览器窗口，甚至轻松复制网页中的文本和图形。


    ### 在 iPod touch 上浏览网页


    你可以通过 Wi-Fi 随心所欲地浏览网页。与其大一些的同类产品 iPad 一样，你的 iPod touch 拥有许多人认为当今功能最强大的移动浏览体验。网页看起来与电脑上的网页非常相似。借助
    iPod touch 的缩放功能，你甚至不必担心较小的屏幕尺寸会限制你的网页浏览体验。简而言之，在 iPod touch 上浏览网页是一种更令人满意的体验。


    你可以根据自己的偏好选择竖屏或横屏模式进行浏览。通过双击或捏合展开操作，可以快速放大视频——这些操作与放大文本和图形的操作相同。


    **为什么有些视频和网站不显示？（需要 Flash Player）**


    ![images](img/p286-01.jpg)


    一些网站是用 `Adobe Flash Player` 设计的；但在撰写本文时，Apple 已决定不支持此应用程序。如果你点击视频但视频无法播放——或者你看到类似“需要
    Flash 插件”、“下载最新 Flash 插件以观看此视频”或“需要 Adobe Flash 才能查看此站点”的信息——那么你将无法观看该视频或网页。幸运的是，包括
    YouTube、Vimeo、TED、《*纽约时报*》和《*时代*》杂志在内的越来越多的网站开始使用 HTML5 视频代替 `Flash`，这些内容都能在你的
    iPod touch 上播放。


    解决此限制的一种方法是：App Store 上的一些替代浏览器（例如 `Skyfire`）会在其自己的服务器上渲染 `Flash` 视频，然后将 HTML5
    视频发送至 iPod touch。


    #### 需要网络连接


    你的 iPod touch 需要处于有效的互联网连接状态才能浏览网页（请查看第 4 章：“连接到网络”以了解更多信息）。


    #### 启动网页浏览器


    你应该会在`主屏幕`上找到 `Safari`（网页浏览器）应用。通常，`Safari` 图标位于底部 Dock 中。


    ![images](img/p286-02.jpg)


    触摸 `Safari` 图标，你可能会被带到浏览器的`主页`。这可能是 Apple 的 iPod touch 页面。


    只需将 iPod touch 侧向转动，即可在更宽的横屏模式下看到同一页面。当你找到喜欢的网站时，可以设置书签以便轻松跳转到这些网站。我们将在本章后面向你展示如何操作。


    ![images](img/p287-01.jpg)


    #### Safari 网页浏览器屏幕布局


    查看屏幕时，请注意`地址栏`位于屏幕的左上角。此栏显示当前的网址。


    如果你正在查看一个包含合适文本内容的网页，你会注意到地址栏中出现了`阅读器`按钮。点击“阅读器”按钮，即可以便于阅读的格式查看网页内容。更多信息请查看本章中的“Safari
    阅读器”部分。


    搜索窗口位于地址栏的右侧。默认情况下，它设置为 Google 搜索，但如果你愿意，可以将其更改为其他搜索引擎。


    屏幕底部有五个图标：`后退`、`前进`、`操作`、`书签`和`页面`视图。


    ![images](img/p287-02.jpg)


    #### 输入网址


    你要学习的第一件事是如何访问你喜爱的网页。就像在电脑上一样，你在浏览器中输入网址 (URL)。请按照以下步骤在 `Safari` 中输入网址：


    1.  首先，点击浏览器顶部的`地址`栏。你会看到键盘出现，并且`地址`栏的窗口会展开。

    2.  如果窗口中已有地址且你想删除它，请按地址栏右端的 ![images](img/p288-01.jpg)。

    3.  开始输入你的网址（你不需要输入“`www`”）。

    4.  开始输入时，你可能会看到`地址`栏下方出现建议；只需点击任一建议即可转到该页面。这些建议非常全面，因为它们来自你的浏览历史记录、书签、网址 (URL)
    和网页标题。

    5.  记住页面底部的 `.com` 键。如果你按住它不放，会看到 `.edu`、`.org` 和其他常见域名类型。

    6.  输入完成后，点击`前往`键即可转到该页面。


    **提示：** 不要输入“`www`”，因为这不是必需的。记得使用底部的`冒号`、`正斜杠`、`下划线`、`点`和 `.com` 键以节省时间。


    **提示：** 按住 `.com` 键不放，可查看所有选项：`.org`、`.edu`、`.net`、`.de` 等等。

