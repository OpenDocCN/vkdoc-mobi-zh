  trans: "\n### 复制与粘贴\n\n复制与粘贴功能非常实用，既能节省时间，又能提高打字准确度。你可以利用此功能从电子邮件（如会议详情）中提取文字，然后粘贴到日历中。或者，你可能只需将表单中某处的电子邮件地址复制到另一处，省去重新打字的时间。（我们在第\
    \ 4 章：“其他同步方式”的“设置 Exchange/Google 账户”一节中介绍了这项技巧。）复制与粘贴的用途非常广泛；你越熟悉它，就越会频繁使用它。你甚至可以从你的\
    \ `Safari` 网页浏览器中复制文字或图像，然后粘贴到 `Notes` 或 `Mail` 信息中。\n\n#### 通过双击选择文字\n\n如果你正在阅读或输入文字，可以双击它以开始选择部分文字进行复制。这在\
    \ `Mail`、`Messages` 和 `Notes` 应用中效果很好。\n\n你会看到一个带有蓝色圆点（手柄）的方框，位于对角位置。\n\n![images](img/p84-02.jpg)\n\
    \n只需拖动手柄即可选中你想要高亮显示并复制的文字。\n\n![images](img/p85-01.jpg)\n\n**提示：** 如果你想选择所有文字，请点击光标，或双击文字上方或下方的屏幕。这将显示一个弹出窗口，其中包含\
    \ `Select` 和 `Select All` 选项。点击 `Select` 选择单个单词，或点击 `Select All` 高亮显示所有文字。\n\n\
    ![images](img/p85-02.jpg)\n\n#### 通过双指触摸选择文字\n\n另一种选择文字的方法是同时用两根手指触摸屏幕。如果你用一只手握住\
    \ iPod touch，用另一只手的大拇指和食指触摸屏幕，效果最佳。你也可以将 iPod touch 放在桌子上，用双手的各一根手指触摸屏幕。请按照以下步骤使用此方法：\n\
    \n1.  在你想要选择的文字的起始和结束位置同时触摸屏幕。如果第一次触摸时未能精确选中，不必担心。\n2.  双指触摸后，使用蓝色手柄拖动选择区域的起始和结束位置，直至正确位置。\n\
    \n#### 通过触摸并长按选择网站或其他不可编辑的文字\n\n在 `Safari` 网页浏览器以及其他无法编辑文字的地方，用你的手指按住某些文字，该段落会被高亮显示，并在每个角落出现手柄。\n\
    \n接下来，如果你想选择更多文字，请拖动手柄。\n\n![images](img/p86-01.jpg)\n\n**注：** 如果拖动范围小于一个段落，选择器将切换到精细文字模式，并在选择区域两端提供蓝色手柄，以便你精确选取所需的字符或单词。如果拖动手指超过一个段落，则会进入粗略文字选择模式，你可以向上或向下拖动以选择整块文字和图形。\n\
    \n![images](img/p86-01.jpg)\n\n#### 剪切或复制文字\n\n一旦你高亮显示了想要复制的文字，只需触摸屏幕顶部的 `Copy`\
    \ 标签即可。该标签会变成蓝色，表示文字已存入剪贴板。\n\n**注：** 如果你之前剪切或复制过文字，那么你还会看到 `Paste` 选项，如右侧所示。\n\
    \n![images](img/p86-02.jpg)\n\n#### 应用切换与多任务处理\n\n复制文字后，你可能想将其粘贴到另一个应用中。例如，你可能想从\
    \ Safari 复制一些文字，然后粘贴到 Notes 或 Mail 信息中。在应用之间切换的最简单方法是使用 `App Switcher` 应用。请按照以下步骤将文字从一个应用粘贴到另一个应用：\n\
    \n1.  复制或剪切你的文字。\n2.  双击 `Home` 按钮，调出屏幕底部的 `App Switcher` 应用。\n3.  如果你刚刚让一个应用在后台运行，你可以在\
    \ App Switcher 栏中找到它。\n4.  向右或向左滑动找到你想要的应用，然后点击它。\n5.  如果你在 App Switcher 栏中没有看到想要的应用，则点击\
    \ `Home` 按钮，然后从 `Home` 屏幕启动它。\n6.  现在，通过长按屏幕，然后从弹出窗口中选择 `Paste` 来粘贴文字。\n7.  再次双击\
    \ `Home` 按钮，点击你刚刚离开的应用即可跳转回去。\n\n#### 粘贴文字\n\n将文字粘贴到同一个应用中是很容易的。例如，只需按照以下步骤将文字粘贴到同一个\
    \ `Notes` 或 `Mail` 信息中：\n\n1.  用你的手指将光标移动到你想要粘贴文字的位置。记住我们在本章前面展示的 `Magnifying\
    \ Glass` 技巧；这可以帮助你定位光标。\n2.  一旦你松开屏幕，你应该会看到一个弹出窗口，询问你是要 `Select`、`Select All`\
    \ 还是 `Paste`。\n3.  如果你没有看到这个弹出窗口，就双击屏幕。\n4.  选择 `Paste` 来粘贴你的选择内容。\n\n#### 摇动以撤销\n\
    \niPod touch 的一大特色功能是能够撤销键入、复制和粘贴操作。\n\n你只需在粘贴后摇动 iPod touch。一个新的弹出窗口将会出现，让你可以选择撤销刚才的操作。\n\
    \n点击 `Undo Typing` 或 `Undo Paste` 来纠正错误。\n\n![images](img/p88-01.jpg)\n\n**提示：快速删除文字**\n\
    \n如果你曾想只通过一两次点击就快速删除多行文字、一个段落、甚至是你刚刚输入的所有文字，那么这个技巧就是为你准备的。首先，使用前面描述的技术选中你想要删除的文字。接下来，只需按下键盘左下角的\
    \ `Delete` 键 ![images](img/p88-02.jpg)，即可删除所有选中的文字。\n\n### 使用 Spotlight 搜索查找内容\n\
    \nSpotlight 搜索是 iPod touch 上一个很棒的功能，可帮助你查找信息。这是苹果公司特有的一种搜索方法，用于在你的 iPod touch\
    \ 上进行全局搜索。你可以使用此功能搜索姓名、事件或主题。\n\n这个概念很简单。假设你正在寻找与 Martin 相关的内容。你不记得它是电子邮件、`Notes`\
    \ 中的文档，还是日历事件；但你知道它和 Martin 有关。\n\n这正是使用 Spotlight 搜索功能在你的 iPod touch 上查找所有与 Martin\
    \ 相关内容的最佳时机。\n\n#### 激活 Spotlight 搜索\n\n首先，你需要调出 `Spotlight Search` 页面，它位于 `Home`\
    \ 屏幕第一页的左侧。\n\n![images](img/p89-01.jpg)\n\n在第一个圆圈（表示 `Home` 屏幕的第一页）的左侧，你可以看到一个非常小的\
    \ `Magnifying Glass` 图标。\n\n![images](img/p89-02.jpg)\n\n在第一页图标上从左向右滑动手指，即可看到\
    \ `Spotlight Search` 页面。你也可以从你的第一屏图标按下 Home 按钮来看到同一个搜索页面。\n\n请按照以下步骤使用此功能进行搜索：\n\
    \n1.  在 `Spotlight Search` 页面上，输入一个或多个单词作为搜索参数。\n2.  点击右下角的 `Search` 按钮执行搜索。\n\
    \n    **提示：** 如果你在找一个人，请输入他的全名，以便更精确地找到仅来自该人的项目（例如，“Martin Trautschold”）。这将排除你\
    \ iPod touch 中可能存在的其他 Martin，使你能够找到仅与 Martin Trautschold 相关的项目。\n\n3.  在搜索结果中，你将看到搜索找到的所有电子邮件、约会、会议邀请和联系信息。向下滑动可查看更多结果。\n\
    4.  点击列表中的某个结果以查看其内容。\n\n你的搜索结果会一直保留，直到你清除它们。这意味着你可以返回 `Spotlight Search` 页面，只需从你的\
    \ `Home` 屏幕向右滑动，即可查看你之前的搜索结果。\n\n要清除 `Search` 字段，只需触摸搜索栏中的 `X`。要退出 `Spotlight\
    \ Search` 页面，只需按下 `Home` 键或向左滑动。\n"
- fmt: '#### Searching the Web or Wikipedia


    After you perform a `Spotlight Search`, you will see two options beneath your
    results: `Search Web` and `Search Wikipedia`. Tap either of these options to execute
    your search on the Web or in Wikipedia.


    #### Customizing Spotlight Search


    You can customize your `Spotlight Search` by removing certain apps or types of
    data from the search. You can even change the order in which each type of data
    is searched. This might be useful if you want to search only your `Contacts` and
    `Mail` messages—and nothing else. Or, if you know that you always want to search
    `Mail` first, then `Calendar`, and then `Music` —you could set those items in
    the proper order. Follow these steps to do so:


    1.  Tap the `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Spotlight Search`.

    4.  To change the order of the items searched, touch and drag the right edge of
    the item with the three gray bars up or down.

    5.  To remove a specific item from the search, tap it to remove the `Checkmark`
    icon next to it. Unchecked items are not searched by `Spotlight Search`.

    6.  Tap the `General` button in the upper-left corner to return to the `Settings`
    app.


    ![images](images/p90-01.jpg)


    ## Chapter 3


    ## Sync with iCloud, iTunes, and More


    In this chapter, we will show you how to set up or adjust your storage and push
    your information to Apple''s new iCloud service, as well as how to synchronize
    information between your iPod touch and your Windows or Mac computer using iTunes.


    With iCloud, you can wirelessly sync your mail, contacts, calendars, reminders,
    bookmarks, notes, photos, and documents and data, as well as back up your iPod
    touch wirelessly over-the-air (OTA). With iTunes, you can sync or transfer contacts,
    calendar, notes, apps, music, videos, iBooks, documents, and picture libraries,
    as well as back up your iPod touch.


    And, because nothing ever works right all the time, we''ll show you a few simple
    troubleshooting tips. Finally, we''ll show you how to check for updates and install
    updated operating system software for your iPod touch.


    ### iCloud


    iCloud is free, easy to set up, and easy to use. In most cases, it is the best
    way to sync your personal information, music, TV shows (U.S. only), and apps.
    It is also the best way to handle backups and to restore your phone. Unless you
    have very specific reasons not to, we highly recommend using iCloud for most of
    your syncing needs, but the `iTunes` app for anything iCloud doesn''t yet handle
    (like movies).


    iCloud also lets you re-download previous iTunes, iBookstore, and App Store purchases,
    but your iCloud ID can also be used with iMessage, FaceTime, and other free Apple
    services.


    **NOTE:** Apple is very careful not to use the word *sync* when it comes to iCloud.
    Instead, it says *store* and *push*. The difference is largely technical and has
    to do with how Apple is moving your data around.


    The important thing to remember is that, when you change something on your iPod
    touch, Apple copies the change to its servers and then sends copies back down
    to all your other iCloud-enabled iOS devices, as well as to your Windows or Mac
    PC.


    ### Setting up iCloud


    In [Chapter 1](#Chapter01.html#ch1): “Getting Started,” we showed you how to enable
    iCloud while setting up your new iPod touch or restoring from a previous iCloud
    backup. Once iCloud is enabled, you can easily turn various services on or off.


    Start by launching the `Settings` app and scrolling down to `iCloud`.


    `Mail`, `Contacts`, `Calendars`, `Reminders`, `Bookmarks`, `Notes`, and `Find
    my iPod` can easily be toggled to `ON` or `OFF` directly from this screen.


    For the `Photo Stream option`, you need to tap the tab first to get to the `On`/`Off`
    toggle.


    ![images](images/p92-01.jpg)


    **NOTE:** At the time of writing, Photo Stream is an all-or-nothing service. If
    Photo Stream is turned on, Apple will keep 1000 of your most recent photos for
    up to 30 days on its servers, copying them to your iPad, Apple TV, Mac, or Windows
    PC. Anything logged into iCloud will get a copy of your Photo Stream. If you take
    photos of a sensitive or personal nature, you might want to set the `Photo Stream`
    option to `Off`.


    Likewise, you can tap `Documents and Data to toggle` this option `ON or OFF`.


    ![images](images/p93-01.jpg)


    ### Managing iCloud Storage and Backup


    iCloud comes with 5GB of free storage. Music from iTunes, apps, iBooks, and your
    Photo Stream don''t count against your 5GB, so most people will still have plenty
    of space left over for app data, documents, and backups.


    To check your iCloud Storage, scroll down to the bottom and tap `Storage and Backup`.


    The `Storage` section shows you `Total Storage`, or the full size of your iCloud
    account; and `Available Storage` shows how much total storage you have left.


    At the bottom of the screen, you can toggle `iCloud Backup` to `ON` or `OFF`.


    **NOTE:** For most users, most of the time, we strongly recommend the `iCloud
    Backup` option be toggled to `ON` and left that way.


    ![images](images/p93-02.jpg)


    You can tap the `Back Up Now` button if you ever need to back up your iPod touch
    immediately. You might do this if you want to reinstall your iPod touch, switch
    to a replacement or new iPod touch, or intend to go on a trip and want to make
    sure your phone is backed up before you leave.


    To see how your iCloud storage is being used, tap `Manage Storage`.


    ![images](images/p94-01.jpg)


    At the top of the `Manage Storage` screen, you''ll see a list of devices currently
    backed up to iCloud. This will include your iPod touch and any other iOS devices
    you might own, like an iPad or iPod touch.


    Tap the device you want to look at and you''ll be taken to the `Info` screen,
    which shows when your `Latest Backup` took place and the `Backup Size`.


    ![images](images/p94-02.jpg)


    The `Backup Options` section lets you individually toggle different types of backups
    on or off, including the `Camera Roll` and any apps you might have installed that
    sync their settings or data with iCloud. This section also tells you how much
    storage each app is using.


    Initially, you''ll only see a few apps. Tap `See All Apps` for the full list.
    Setting an app to `OFF` means you''ll save on storage space, but your data will
    no longer be synced between your iOS devices, nor will it be restored if you ever
    reinstall your device or the app.


    ![images](images/p95-01.jpg)


    **TIP:** Your iPod touch''s big, 8 megapixel, 1080p camera means that backing
    up the `Camera Roll` can quickly eat up a lot of storage, especially if you have
    only the free 5GB plan. The Photo Stream feature already backs up your photos;
    if backing up your video isn''t a concern, then you can toggle `Camera Roll` backups
    to `OFF` to save space.


    ### Buying More iCloud Storage


    You might find yourself constantly running out of iCloud storage, decide you want
    to start backing up more photos and videos, or discover you need to back up multiple
    iOS devices. If so, you can buy more iCloud Storage from Apple.


    Simply tap any of the `Buy More Storage` buttons peppered throughout the iCloud''s
    `Settings` screens. At the time of writing, additional iCloud storage costs were
    as follows:


    *   10GB for US $20/year

    *   20GB for US $40/year

    *   50GB for US $100/year


    ![images](images/p96-01.jpg)'
