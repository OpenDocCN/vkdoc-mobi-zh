    \ the view you'd like to switch to (see [Figure 20-1](#Chapter20.html#fig_20_1)):\n\
    \    *   **Standard** is a regular map with street names.\n    *   **Satellite**\
    \ is a satellite picture with no street names.\n    *   **Hybrid** is a combination\
    \ of the **Satellite** and **Standard** views; that is, a **Satellite** view with\
    \ street names.\n    *   **List** is available only when your search produces\
    \ multiple results (like “Starbucks”) or you've asked for directions.\n\n![images](images/2001.jpg)\n\
    \n**Figure 20-1.** *Various views available in the **Maps** app: From upper left:\
    \ Standard, Satellite, Hybrid and List.*\n\n#### Checking Traffic\n\nNot only\
    \ does your **Maps** app tell you how to get somewhere, but it can also check\
    \ traffic along the way. This feature is supported only in the United States for\
    \ now. Follow these steps to check the traffic for a given route:\n\n1.  Tap the\
    \ lower-right corner of the map to see the options.\n2.  Tap **Show Traffic**.\n\
    \n![images](images/p430-01.jpg)\n\nOn a highway, if there is a traffic situation,\
    \ you usually see yellow lights instead of green ones. Sometimes, the yellow lights\
    \ might be flashing to alert you to traffic delays.\n\nYou may even see **Construction\
    \ Worker** icons to indicate construction zones.\n\n**Maps** uses color on major\
    \ streets and highways to indicate the speed that traffic is moving at:\n\n* \
    \  Green = 50 MPH or more\n*   Yellow = 25–50 MPH\n*   Red = Less than 25 MPH\n\
    *   Gray (or no color) = No traffic data currently available\n\n### Searching\
    \ for Anything\n\nBecause **Maps** is tied to Google Maps, you can search for\
    \ and find just about anything: a specific address, type of business, city, or\
    \ other point of interest, as shown in [Figure 20-2](#Chapter20.html#fig_20_2).\
    \ Follow these steps to search for a specific location:\n\n1.  Touch the **Search**\
    \ bar in the top-right corner of the screen.\n2.  Type in the address, point of\
    \ interest, or town and state you would like to map on your iPod touch.\n\n![images](images/p431-01.jpg)\n\
    \n#### Google Maps Search Tips\n\nYou can enter just about anything in the **Search**\
    \ bar, including the following:\n\n*   First name, last name, or company name\
    \ (to match your Contacts list)\n*   123 Main Street, City (some or all of a street\
    \ address)\n*   Orlando Airport (to find an airport)\n*   Plumber, painter, or\
    \ roofer (any part of a business name or trade)\n*   Golf courses + city (to find\
    \ local golf courses)\n*   Movies + city or ZIP/postal code (to find local movie\
    \ theaters)\n*   Pizza 32174 (to search for local pizza restaurants in ZIP code\
    \ 32174)\n*   95014 (the ZIP code for Apple Computer's headquarters in California,\
    \ United States)\n*   Apress\n\n![images](images/2002.jpg)\n\n**Figure 20-2.**\
    \ *Searching in the **Maps** app*\n\nTo use numbers, tap the **123** key on the\
    \ keyboard. For letters, tap the **ABC** key to switch back to a letter keyboard.\n\
    \n### Mapping Options\n\nNow that your address is on the **Maps** screen, follow\
    \ these steps to access the available options:\n\n1.  Touch the blue **Arrow**\
    \ icon ![images](images/p432-01.jpg) next to the address to see some of these\
    \ options.\n2.  If you have mapped one of your contacts, you'll see the contact\
    \ details, as shown in [Figure 20-3](#Chapter20.html#fig_20_3). **Maps** will\
    \ also pull up contact information for specific searches. You can also get directions,\
    \ share a location, or add a location as a bookmark.\n\n**NOTE:** You can also\
    \ tap and hold the address to bring up the **Copy** pop-up menu.\n\n![images](images/2003.jpg)\n\
    \n**Figure 20-3.** *Touching the **Information** button to see the mapped contact\
    \ details*\n\n#### Working with Bookmarks\n\nBookmarks in **Maps** work much as\
    \ they do in **Safari**. A bookmark simply creates a record of places you've visited\
    \ or mapped and want to remember in the future. It is always easier to look at\
    \ a bookmark than to perform a new search.\n\n##### Adding a New Bookmark\n\n\
    Bookmarking a location is a great way to simplify finding a place again:\n\n1.\
    \  Map a location, as shown in [Figure 20-4](#Chapter20.html#fig_20_4).\n2.  Touch\
    \ the blue **Information** icon next to the address.\n3.  Touch **Add to Bookmarks**.\n\
    \n    ![images](images/2004.jpg)\n\n    **Figure 20-4.** *Adding a bookmark*\n\
    \n4.  Edit the bookmark name to make is short and recognizable—in this case, we\
    \ edited the address to simply say **Gloria's Store**.\n5.  When you are done,\
    \ just touch **Save** in the top-right corner.\n\n**TIP**: You can search for\
    \ bookmark names just as you search for names in **Contacts.**\n\n##### Accessing\
    \ and Editing Your Bookmarks\n\nTo view your bookmarks, follow these steps:\n\n\
    1.  Tap the **Bookmarks** icon next to the **Search** window in the top row.\n\
    2.  Tap any bookmark to immediately jump to it.\n3.  Tap the **Edit** button at\
    \ the top of the bookmarks to edit or delete your bookmarks.\n    1.  To reorder\
    \ the bookmarks, touch and drag the right edge of each bookmark up or down.\n\
    \    2.  To edit the name of a bookmark, touch it and retype the name. After editing\
    \ the name, touch the **Bookmarks** button in the top left to get back to your\
    \ list of bookmarks.\n    3.  To delete a bookmark, swipe to the left or right\
    \ on the bookmark, and then tap the **Delete** button.\n4.  Tap the **Done** button\
    \ when you are finished editing your bookmarks.\n\n![images](images/p435-01.jpg)\n\
    \n#### Adding a Mapped Location to Contacts\n\nIt is easy to add a location you\
    \ mapped to your Contacts list:\n\n1.  Map an address.\n2.  Tap the **Arrow/Information**\
    \ icon.\n3.  Tap **Add to Contacts**.![images](images/p435-02.jpg)\n4.  Tap either\
    \ **Create a New Contact** or **Add to Existing Contact**.\n5.  If you choose\
    \ **Add to Existing Contact**, you can then scroll through or search your contacts\
    \ and select a name. The address will automatically be added to that contact.\n\
    \n#### Searching for Establishments Near You\n\nFollow these steps to search for\
    \ establishments around your current location:\n\n![images](images/p436-01.jpg)\n\
    \n1.  Map a location on the map or use the blue dot for your current location.\n\
    2.  Tap the **Search** window. Let's say you want to search for the closest pizza\
    \ restaurants, so you type “pizza.” This will map all local pizza restaurants.\n\
    3.  Notice that each mapped location may have a **Street View** icon on the left\
    \ and an **Information** icon on the right.\n4.  You can double-tap to zoom in,\
    \ or pinch the screen open or closed to zoom in or out.\n5.  Just as with any\
    \ mapped location, touching the blue **Information** icon brings up all the details,\
    \ including the pizza restaurant's phone number, address, and web site as shown\
    \ in [Figure 20-5](#Chapter20.html#fig_20_5).\n6.  If you want directions to the\
    \ restaurant, just touch **Directions to Here**, and a route is instantly calculated.\n\
    \n![images](images/2005.jpg)\n\n**Figure 20-5.** *Using the Info screen to do\
    \ more things with mapped locations.*\n\n**NOTE**: If you touch the **Home Page**\
    \ link, you will exit **Maps**, and **Safari** will start up. You will need to\
    \ restart **Maps** when you're done.\n\n#### Zooming In and Out\n\nYou can zoom\
    \ in and out in the usual way by double-tapping and pinching. To zoom in by double-tapping,\
    \ just double-tap the screen as you would on a web page or picture."
  trans: "\n### 更改地图视图\n\n`地图`应用的默认视图是`标准`视图，这是一种基础地图，显示带有街道名称的通用背景。`地图`还可以显示`卫星`视图或`卫星`与`标准`视图的结合——称为`混合`视图。最后，如果你搜索了提供多个结果的内容（例如附近的咖啡馆），`列表`视图会非常方便。当你查询前往某个地点的路线时，它也同样实用。你可以按照以下步骤在所有视图之间切换：\n\
    \n1.  轻点地图右下角翻起的边缘。\n2.  地图的角落会向上翻起，显示出用于切换视图、路况、图钉等的按钮。\n3.  轻点你要切换到的视图（参见图 20-1）：\n\
    \    *   `标准`：带有街道名称的常规地图。\n    *   `卫星`：不包含街道名称的卫星图片。\n    *   `混合`：`卫星`和`标准`视图的结合，即带有街道名称的`卫星`视图。\n\
    \    *   `列表`：仅当你的搜索返回多个结果（如“星巴克”）或你查询路线时可用。\n\n![images](img/2001.jpg)\n\n**图\
    \ 20-1.** *`地图`应用中可用的各种视图：左上角依次为：标准、卫星、混合和列表。*\n\n#### 查看路况\n\n你的`地图`应用不仅能告诉你如何到达某地，还能沿途查看路况。此功能目前仅在美国支持。请按以下步骤查看指定路线的路况：\n\
    \n1.  轻点地图右下角以查看选项。\n2.  轻点`显示路况`。\n\n![images](img/p430-01.jpg)\n\n在高速公路上，如果有交通状况，你通常会看到黄色灯光而非绿色灯光。有时，黄色灯光可能会闪烁，以提醒你注意交通延误。\n\
    \n你甚至可能看到`施工工人`图标，表示施工区域。\n\n`地图`在主要街道和高速公路上使用颜色来指示当前交通行驶速度：\n\n*   绿色 = 50 英里/时\
    \ 或以上\n*   黄色 = 25–50 英里/时\n*   红色 = 低于 25 英里/时\n*   灰色（或无色）= 当前无可用路况数据\n\n###\
    \ 搜索任何内容\n\n由于`地图`与 Google 地图相连，你可以搜索并找到几乎所有内容：特定地址、商户类型、城市或其他兴趣点，如图 20-2 所示。请按以下步骤搜索特定位置：\n\
    \n1.  触摸屏幕右上角的`搜索`栏。\n2.  输入你想要在 iPod touch 上显示地图的地址、兴趣点或市州信息。\n\n![images](img/p431-01.jpg)\n\
    \n#### Google 地图搜索技巧\n\n你几乎可以在`搜索`栏中输入任何内容，包括以下示例：\n\n*   名字、姓氏或公司名称（用于匹配你的通讯录）\n\
    *   主街 123 号，城市（街道地址的部分或全部）\n*   奥兰多机场（用于查找机场）\n*   水管工、油漆工或屋顶工（商户名称或行业的任何部分）\n\
    *   高尔夫球场 + 城市（用于查找本地高尔夫球场）\n*   电影 + 城市或邮政编码（用于查找本地电影院）\n*   Pizza 32174（用于搜索邮政编码\
    \ 32174 附近的披萨店）\n*   95014（美国加利福尼亚州苹果公司总部的邮政编码）\n*   Apress\n\n![images](img/2002.jpg)\n\
    \n**图 20-2.** *在`地图`应用中进行搜索*\n\n要输入数字，请轻点键盘上的`123`键。要输入字母，请轻点`ABC`键切换回字母键盘。\n\n\
    ### 地图选项\n\n当地址显示在`地图`屏幕上后，请按以下步骤访问可用选项：\n\n1.  轻点地址旁边的蓝色`箭头`图标 ![images](img/p432-01.jpg)\
    \ 以查看部分选项。\n2.  如果你已显示某位联系人的地图，将看到联系人详细信息，如图 20-3 所示。`地图`还会为特定搜索调出联系信息。你还可以获取路线、共享位置或将位置添加为书签。\n\
    \n**注意：** 你也可以长按地址以调出`拷贝`弹出菜单。\n\n![images](img/2003.jpg)\n\n**图 20-3.** *轻点`信息`按钮以查看已显示地图的联系人详细信息*\n\
    \n#### 使用书签\n\n`地图`中的书签功能与`Safari`中的书签功能非常相似。书签只是为你访问过或在地图上标记过、并希望将来记住的位置创建一个记录。查阅书签总是比执行新搜索更方便。\n\
    \n##### 添加新书签\n\n将位置添加书签是简化再次查找该位置的好方法：\n\n1.  在地图上显示一个位置，如图 20-4 所示。\n2.  轻点地址旁边的蓝色`信息`图标。\n\
    3.  轻点`添加到书签`。\n\n    ![images](img/2004.jpg)\n\n    **图 20-4.** *添加书签*\n\n4.\
    \  编辑书签名称，使其简短易识别——此处我们将地址编辑为`格洛丽亚的商店`。\n5.  完成后，轻点右上角的`存储`。\n\n**提示**：你可以像在`通讯录`中搜索姓名一样搜索书签名称。\n\
    \n##### 访问和编辑书签\n\n要查看你的书签，请按以下步骤操作：\n\n1.  轻点顶部行`搜索`窗口旁边的`书签`图标。\n2.  轻点任意书签即可立即跳转至该位置。\n\
    3.  轻点书签顶部的`编辑`按钮以编辑或删除你的书签。\n    1.  要重新排列书签顺序，请触摸并拖拽每个书签的右边缘向上或向下移动。\n    2.\
    \  要编辑书签名称，轻点该书签并重新输入名称。编辑名称后，轻点左上角的`书签`按钮返回书签列表。\n    3.  要删除书签，在书签上向左或向右滑动，然后轻点`删除`按钮。\n\
    4.  编辑完书签后，轻点`完成`按钮。\n\n![images](img/p435-01.jpg)\n\n#### 将已标记的位置添加到通讯录\n\n将你在地图上标记的位置添加到通讯录非常简单：\n\
    \n1.  显示一个地址的地图。\n2.  轻点`箭头/信息`图标。\n3.  轻点`添加到通讯录`。![images](img/p435-02.jpg)\n\
    4.  轻点`创建新联系人`或`添加到现有联系人`。\n5.  如果你选择`添加到现有联系人`，则可以滚动或搜索你的联系人并选择一个姓名。该地址将自动添加至该联系人。\n\
    \n#### 搜索附近的商家\n\n请按以下步骤搜索你当前位置附近的商家：\n\n![images](img/p436-01.jpg)\n\n1.  在地图上标记一个位置，或使用蓝点表示你当前的位置。\n\
    2.  轻点`搜索`窗口。假设你想搜索最近的披萨店，因此输入“pizza”。这将在地图上标记所有本地的披萨店。\n3.  请注意，每个被标记的位置左侧可能有一个`街景`图标，右侧有一个`信息`图标。\n\
    4.  你可以双击以放大，或捏合屏幕以缩小或放大。\n5.  与任何标记的位置一样，轻点蓝色的`信息`图标会显示所有详细信息，包括披萨店的电话号码、地址和网站，如图\
    \ 20-5 所示。\n6.  如果你需要前往该餐厅的路线，只需轻点`路线到这里`，路线将立即计算出来。\n\n![images](img/2005.jpg)\n\
    \n**图 20-5.** *使用信息屏幕对标记的位置执行更多操作。*\n\n**注意**：如果你轻点`主页`链接，将退出`地图`，并启动`Safari`。完成后，你需要重新启动`地图`。\n\
    \n#### 放大和缩小\n\n你可以通过双击和捏合屏幕来进行常规的放大和缩小操作。要使用双击放大，只需像在网页或图片上那样双击屏幕即可。\n"
- fmt: "#### Dropping a Pin\n\nLet's say you're looking at the map, and you find something\
    \ you'd like to set either as a bookmark or as a destination.\n\nIn this example,\
    \ we are zooming in and looking around the greater Boston area. We stumble upon\
    \ Fenway Park and decide it would be great to add it to our bookmarks, so we drop\
    \ a pin on it. Follow these steps to drop a pin on a map:\n\n1.  Map a location\
    \ or move the map to a location where you'd like to drop the pin.\n\n    ![images](images/p438-01.jpg)\n\
    \n2.  Tap the lower-right corner of the map.\n\n    ![images](images/p438-02.jpg)\n\
    \n3.  Tap **Drop Pin**. You can also simply touch and hold a location on the map\
    \ to drop the pin.\n4.  Now, drag the pin around the map by touching and holding\
    \ it.\n5.  To remove a dropped pin or do other things, tap the blue **Arrow**\
    \ icon ![images](images/p438-03.jpg) next to the pop-up above the pin. If the\
    \ pop-up went away, tap the pin to bring It back.\n\n    ![images](images/p438-04.jpg)\n\
    \n6.  From the **Info** screen, you can get **directions**, **Remove Pin**, **Add\
    \ to Contacts**, **Share Location**, or **Add to Bookmarks**.\n\n    ![images](images/p439-01.jpg)\n\
    \n**TIP: Finding the Street Address of any Location on the Map**\n\nWhen you drop\
    \ a pin, Google Maps will show you the actual street address. This is very handy\
    \ if you find a location by looking at the **Satellite** or **Hybrid** view, but\
    \ need to get the actual street address.\n\nDropping a pin is also a great way\
    \ to keep track of where you parked, which is especially helpful in an unfamiliar\
    \ location.\n\n#### Using Street View\n\nGoogle Street View (see [Figure 20–6](#Chapter20.html#fig_20_6))\
    \ is a really fun feature in **Maps** on the iPod touch. Google has been hard\
    \ at work photographing just about every address across the United States and\
    \ elsewhere. The pictures are then fed into its database, and that's what shows\
    \ up when you want to see a picture of your destination or waypoint.\n\n**NOTE**:\
    \ Google Street View is in a small number of countries now: much of North America,\
    \ western Europe, Australia, and now South Africa.\n\nIf there is a Street View\
    \ available, you will see a small orange **Person** icon to the left of the address\
    \ or bookmark on the map.\n\n![images](images/p439-02.jpg)\n\nIn this example,\
    \ we wanted to check the Street View of the store of Gloria, Gary's wife, on Cape\
    \ Cod:\n\n1.  To map the address, we tapped the work address under Gloria's name\
    \ on our Contacts list. We could have mapped it by typing an address into the\
    \ **Search** window, by searching for a type of business, or by touching the address\
    \ in the **Contacts** app.\n2.  The **Street View** icon is shown to the left\
    \ of Gloria's name.\n3.  We tapped the icon to immediately shift to a Street View\
    \ of the address. What is very cool is that we can navigate around the screen\
    \ in a 360-degree rotation by swiping left, right, or even up or down, looking\
    \ at the places next to and across the street from our destination.\n4.  To return\
    \ to the map, we just touched the lower-right corner of the screen.\n\n![images](images/2006.jpg)\n\
    \n**Figure 20-6.** *Using Google Street View*\n\n### Getting Directions\n\nOne\
    \ of the most useful functions of the **Maps** app is that you can easily find\
    \ directions to or from any location. Let's say we want to get directions from\
    \ our current location (Gloria's store) to Fenway Park in Boston.\n\n#### Tap\
    \ the Current Location Button First\n\nTo find directions to or from your current\
    \ location, you don't have to waste time typing your current address—the iPod\
    \ touch will assume you want directions from where you are unless you specify\
    \ otherwise. You may need to tap the **Location** button a few times until you\
    \ see the blue dot on the screen.\n\nNow you can do one of two things:\n\n*  \
    \ Tap the **Directions** button at the bottom.\n*   Touch the blue **Arrow** as\
    \ we did previously, and then select **Directions from Here** (see [Figure20–7](#Chapter20.html#fig_20_7)).\n\
    \n![images](images/2007.jpg)\n\n**Figure 20-7.** *Choosing **Directions From Here**\
    \ and then **Bookmarks***\n\n#### Choosing Start or End Location\n\nFollow these\
    \ steps to select a Start or End location and then choose a suggested route:\n\
    \n1.  Touch the blue **Arrow** icon above the pin.\n2.  Tap **Directions From\
    \ Here**.\n3.  Tap the **Bookmarks** button\n4.  Tap **Bookmarks**, **Recents**,\
    \ or **Contacts** to find your destination. In this case, we tapped **Bookmarks**\
    \ and then **Fenway Park**.\n\n    ![images](images/p442-01.jpg)\n\n    **NOTE**:\
    \ As soon as you touch the **Directions From Here** button, your recent searches\
    \ will be automatically displayed (see [Figure 20-5](#Chapter20.html#fig_20_5)).\
    \ You can also touch the **Destination** box and type in a destination.\n\n  \
    \  ![images](images/p442-02.jpg)\n\n5.  After you select your destination, the\
    \ routing screen takes you to an overview screen. In our case, we see the routing\
    \ screen to get from Apple's 1 Infinite Loop headquarters to the Palo Alto Apple\
    \ Store.\n6.  A green pushpin is dropped at the start location, and a red one\
    \ is dropped at the end location—Fenway Park, in our example.\n7.  A bright blue\
    \ line will connect the two pins, showing you the route. If there is more than\
    \ one route, others will be indicated in light blue.\n8.  Tap a gray route to\
    \ select it. Once it's selected, it will turn bright blue, and any other routes\
    \ will fade to light blue.\n\n![images](images/p442-03.jpg)\n\n#### Looking at\
    \ the Route\n\nBefore you start the trip, you will see a **Start** button in the\
    \ upper-right corner of the screen. Tap the **Start** button, and the routing\
    \ directions begin. The **Start** button changes to **Arrow** buttons that allow\
    \ you to move between the steps in the trip.\n\n![images](images/p443-01.jpg)\n\
    \n![images](images/p443-02.jpg)\n\nAs [Figure 20-8](#Chapter20.html#fig_20_8)\
    \ shows, you can look at the route either as a path on the map or as a list.\n\
    \n![images](images/2008.jpg)\n\n**Figure 20-8.** *Two ways of viewing directions*\n\
    \nYou can move the screen with your finger to look at the route, or just touch\
    \ the **Arrow** buttons ![images](images/p443-03.jpg) at the bottom to show the\
    \ route in step-by-step snapshots.\n\nYou can also tap the **Page Curl** button\
    \ on the bottom-right, then the **List** ![images](images/p444-01.jpg) button,\
    \ which will show detailed step-by-step directions.\n\n#### Switching Between\
    \ Routes\n\nAs noted in Steps 6 and 7 of the preceding example, if more than one\
    \ route is available, the **Maps** app will mark its best recommendation with\
    \ a bright blue line and flag it as **Route 1**. If other routes are also available,\
    \ Maps will mark them with a light blue line. Tapping a gray line will turn it\
    \ bright blue and flag it with its corresponding number—**Route 2**, for example.\n\
    \nIf you know from recent experience that construction or something else is making\
    \ Route 1 less than desirable, or you need to stop somewhere on the way that's\
    \ off the recommended Route 1, then switching to a different route is a great\
    \ option.\n\n![images](images/p444-02.jpg)\n\n#### Switching Between Driving,\
    \ Transit, and Walking Directions\n\nBefore you start your directions, you can\
    \ choose whether you are driving, using public transportation, or walking by tapping\
    \ the icons on the left side of the blue bar at the top of the directions screen,\
    \ as shown in [Figure 21–9](#Chapter20.html#fig_20_9).\n\n![images](images/2009.jpg)\n\
    \n**Figure 20-9.** *Choosing your mode of transportation*\n\n#### Reversing the\
    \ Route\n\nTo reverse the route, touch the **Reverse** ![images](images/p445-01.jpg)\
    \ button, which is at the top, between the **Start** and **End** fields. This\
    \ can be useful if you're not great about reversing directions on your own or\
    \ if your route uses lots of one-way streets."
  raw: "#### Dropping a Pin\n\nLet's say you're looking at the map, and you find something\
    \ you'd like to set either as a bookmark or as a destination.\n\nIn this example,\
    \ we are zooming in and looking around the greater Boston area. We stumble upon\
    \ Fenway Park and decide it would be great to add it to our bookmarks, so we drop\
    \ a pin on it. Follow these steps to drop a pin on a map:\n\n1.  Map a location\
    \ or move the map to a location where you'd like to drop the pin.\n\n    ![images](images/p438-01.jpg)\n\
    \n2.  Tap the lower-right corner of the map.\n\n    ![images](images/p438-02.jpg)\n\
    \n3.  Tap **Drop Pin**. You can also simply touch and hold a location on the map\
    \ to drop the pin.\n4.  Now, drag the pin around the map by touching and holding\
    \ it.\n5.  To remove a dropped pin or do other things, tap the blue **Arrow**\
    \ icon ![images](images/p438-03.jpg) next to the pop-up above the pin. If the\
    \ pop-up went away, tap the pin to bring It back.\n\n    ![images](images/p438-04.jpg)\n\
    \n6.  From the **Info** screen, you can get **directions**, **Remove Pin**, **Add\
    \ to Contacts**, **Share Location**, or **Add to Bookmarks**.\n\n    ![images](images/p439-01.jpg)\n\
    \n**TIP: Finding the Street Address of any Location on the Map**\n\nWhen you drop\
    \ a pin, Google Maps will show you the actual street address. This is very handy\
    \ if you find a location by looking at the **Satellite** or **Hybrid** view, but\
    \ need to get the actual street address.\n\nDropping a pin is also a great way\
    \ to keep track of where you parked, which is especially helpful in an unfamiliar\
    \ location.\n\n#### Using Street View\n\nGoogle Street View (see [Figure 20–6](#Chapter20.html#fig_20_6))\
    \ is a really fun feature in **Maps** on the iPod touch. Google has been hard\
    \ at work photographing just about every address across the United States and\
    \ elsewhere. The pictures are then fed into its database, and that's what shows\
    \ up when you want to see a picture of your destination or waypoint.\n\n**NOTE**:Google\
    \ Street View is in a small number of countries now: much of North America, western\
    \ Europe, Australia, and now South Africa.\n\nIf there is a Street View available,\
    \ you will see a small orange **Person** icon to the left of the address or bookmark\
    \ on the map.\n\n![images](images/p439-02.jpg)\n\nIn this example, we wanted to\
    \ check the Street View of the store of Gloria, Gary's wife, on Cape Cod:\n\n\
    1.  To map the address, we tapped the work address under Gloria's name on our\
    \ Contacts list. We could have mapped it by typing an address into the **Search**\
    \ window, by searching for a type of business, or by touching the address in the\
    \ **Contacts** app.\n2.  The **Street View** icon is shown to the left of Gloria's\
    \ name.\n3.  We tapped the icon to immediately shift to a Street View of the address.\
    \ What is very cool is that we can navigate around the screen in a 360-degree\
    \ rotation by swiping left, right, or even up or down, looking at the places next\
    \ to and across the street from our destination.\n4.  To return to the map, we\
    \ just touched the lower-right corner of the screen.\n\n![images](images/2006.jpg)\n\
    \n**Figure 20-6.** *Using Google Street View*\n\n### Getting Directions\n\nOne\
    \ of the most useful functions of the **Maps** app is that you can easily find\
    \ directions to or from any location. Let's say we want to get directions from\
    \ our current location (Gloria's store) to Fenway Park in Boston.\n\n#### Tap\
    \ the Current Location Button First\n\nTo find directions to or from your current\
    \ location, you don't have to waste time typing your current address—the iPod\
    \ touch will assume you want directions from where you are unless you specify\
    \ otherwise. You may need to tap the **Location** button a few times until you\
    \ see the blue dot on the screen.\n\nNow you can do one of two things:\n\n*  \
    \ Tap the **Directions** button at the bottom.\n*   Touch the blue **Arrow** as\
    \ we did previously, and then select **Directions from Here** (see [Figure20–7](#Chapter20.html#fig_20_7)).\n\
    \n![images](images/2007.jpg)\n\n**Figure 20-7.** *Choosing **Directions From Here**\
    \ and then **Bookmarks***\n\n#### Choosing Start or End Location\n\nFollow these\
    \ steps to select a Start or End location and then choose a suggested route:\n\
    \n1.  Touch the blue **Arrow** icon above the pin.\n2.  Tap **Directions From\
    \ Here**.\n3.  Tap the **Bookmarks** button\n4.  Tap **Bookmarks**, **Recents**,\
    \ or **Contacts** to find your destination. In this case, we tapped **Bookmarks**\
    \ and then **Fenway Park**.\n\n    ![images](images/p442-01.jpg)\n\n    **NOTE**:\
    \ As soon as you touch the **Directions From Here** button, your recent searches\
    \ will be automatically displayed (see [Figure 20-5](#Chapter20.html#fig_20_5)).\
    \ You can also touch the **Destination** box and type in a destination.\n\n  \
    \  ![images](images/p442-02.jpg)\n\n5.  After you select your destination, the\
    \ routing screen takes you to an overview screen. In our case, we see the routing\
    \ screen to get from Apple's 1 Infinite Loop headquarters to the Palo Alto Apple\
    \ Store.\n6.  A green pushpin is dropped at the start location, and a red one\
    \ is dropped at the end location—Fenway Park, in our example.\n7.  A bright blue\
    \ line will connect the two pins, showing you the route. If there is more than\
    \ one route, others will be indicated in light blue.\n8.  Tap a gray route to\
    \ select it. Once it's selected, it will turn bright blue, and any other routes\
    \ will fade to light blue.\n\n![images](images/p442-03.jpg)\n\n#### Looking at\
    \ the Route\n\nBefore you start the trip, you will see a **Start** button in the\
    \ upper-right corner of the screen. Tap the **Start** button, and the routing\
    \ directions begin. The **Start** button changes to **Arrow** buttons that allow\
    \ you to move between the steps in the trip.\n\n![images](images/p443-01.jpg)\n\
    \n![images](images/p443-02.jpg)\n\nAs [Figure 20-8](#Chapter20.html#fig_20_8)\
    \ shows, you can look at the route either as a path on the map or as a list.\n\
    \n![images](images/2008.jpg)\n\n**Figure 20-8.** *Two ways of viewing directions*\n\
    \nYou can move the screen with your finger to look at the route, or just touch\
    \ the **Arrow** buttons ![images](images/p443-03.jpg) at the bottom to show the\
    \ route in step-by-step snapshots.\n\nYou can also tap the **Page Curl** button\
    \ on the bottom-right, then the **List** ![images](images/p444-01.jpg) button,\
    \ which will show detailed step-by-step directions.\n\n#### Switching Between\
    \ Routes\n\nAs noted in Steps 6 and 7 of the preceding example, if more than one\
    \ route is available, the **Maps** app will mark its best recommendation with\
    \ a bright blue line and flag it as **Route 1**. If other routes are also available,\
    \ Maps will mark them with a light blue line. Tapping a gray line will turn it\
    \ bright blue and flag it with its corresponding number—**Route 2**, for example.\n\
    \nIf you know from recent experience that construction or something else is making\
    \ Route 1 less than desirable, or you need to stop somewhere on the way that's\
    \ off the recommended Route 1, then switching to a different route is a great\
    \ option.\n\n![images](images/p444-02.jpg)\n\n#### Switching Between Driving,\
    \ Transit, and Walking Directions\n\nBefore you start your directions, you can\
    \ choose whether you are driving, using public transportation, or walking by tapping\
    \ the icons on the left side of the blue bar at the top of the directions screen,\
    \ as shown in [Figure 21–9](#Chapter20.html#fig_20_9).\n\n![images](images/2009.jpg)\n\
    \n**Figure 20-9.** *Choosing your mode of transportation*\n\n#### Reversing the\
    \ Route\n\nTo reverse the route, touch the **Reverse** ![images](images/p445-01.jpg)\
    \ button, which is at the top, between the **Start** and **End** fields. This\
    \ can be useful if you're not great about reversing directions on your own or\
    \ if your route uses lots of one-way streets."
  trans: "\n#### 放置图钉\n\n假设你正在查看地图，发现了某个想设为书签或目的地的地方。\n\n在此示例中，我们正在放大查看波士顿大区。我们偶然发现了芬威球场，并决定将其添加到书签中，于是我们在该位置放置了一个图钉。请按照以下步骤在地图上放置图钉：\n\
    \n1.  标记一个地点，或者将地图移动到你想要放置图钉的位置。\n\n    ![images](img/p438-01.jpg)\n\n2.  点击地图的右下角。\n\
    \n    ![images](img/p438-02.jpg)\n\n3.  点击**放置图钉**。你也可以直接长按地图上的某个位置来放置图钉。\n4.\
    \  现在，通过长按图钉，在地图上拖动它。\n5.  要移除已放置的图钉或执行其他操作，请点击图钉上方弹出窗口旁的蓝色**箭头**图标 ![images](img/p438-03.jpg)。如果弹出窗口消失了，点击图钉即可重新显示。\n\
    \n    ![images](img/p438-04.jpg)\n\n6.  在**信息**屏幕上，你可以获取**路线**、**移除图钉**、**添加到通讯录**、**分享位置**或**添加到书签**。\n\
    \n    ![images](img/p439-01.jpg)\n\n**提示：查找地图上任意位置的街道地址**\n\n当你放置图钉时，谷歌地图会显示实际的街道地址。如果你通过**卫星**或**混合**视图找到某个位置，但需要获取其实际街道地址，这非常方便。\n\
    \n放置图钉也是记录你停车位置的好方法，在陌生地点尤其有用。\n\n#### 使用街景\n\n谷歌街景（参见图 20-6）是 iPod touch 上 **地图**\
    \ 应用一个非常有趣的功能。谷歌一直在努力拍摄美国及其他地区几乎所有地址的照片。这些照片随后被输入其数据库，当你想要查看目的地或途经点的图片时，显示的就是这些内容。\n\
    \n**注意**：谷歌街景目前仅在少数国家/地区可用：大部分北美、西欧、澳大利亚以及现在的南非。\n\n如果某个地点支持街景，你会在地图上地址或书签的左侧看到一个小的橙色**人物**图标。\n\
    \n![images](img/p439-02.jpg)\n\n在此示例中，我们想查看加里的妻子格洛丽亚在科德角店铺的街景：\n\n1.  为了标记该地址，我们点击了通讯录列表中格洛丽亚名下的工作地址。我们也可以通过在**搜索**窗口中输入地址、搜索某类商家，或者在**通讯录**应用中点击地址来标记它。\n\
    2.  **街景**图标显示在格洛丽亚名字的左侧。\n3.  我们点击该图标，立即切换到该地址的街景视图。非常酷的一点是，我们可以通过向左、向右、甚至向上或向下滑动，以\
    \ 360 度旋转的方式浏览屏幕，查看目的地旁边和对面的地方。\n4.  要返回地图，我们只需点击屏幕的右下角。\n\n![images](img/2006.jpg)\n\
    \n**图 20-6.** *使用谷歌街景*\n\n### 获取路线\n\n**地图**应用最有用的功能之一，是你可以轻松找到前往或来自任何地点的路线。假设我们要获取从当前位置（格洛丽亚的店铺）到波士顿芬威球场的路线。\n\
    \n#### 首先点击“当前位置”按钮\n\n要查找前往或来自你当前位置的路线，你无需浪费时间输入当前地址——iPod touch 会假定你想要从当前位置出发的路线，除非你另行指定。你可能需要点击**位置**按钮几次，直到屏幕上出现蓝点。\n\
    \n现在，你可以执行以下两种操作之一：\n\n*   点击底部的**路线**按钮。\n*   像之前那样点击蓝色**箭头**，然后选择**从此处出发的路线**（参见图\
    \ 20-7）。\n\n![images](img/2007.jpg)\n\n**图 20-7.** *选择**从此处出发的路线**，然后选择**书签***\n\
    \n#### 选择起点或终点\n\n按照以下步骤选择起点或终点，然后选择建议的路线：\n\n1.  点击图钉上方的蓝色**箭头**图标。\n2.  点击**从此处出发的路线**。\n\
    3.  点击**书签**按钮。\n4.  点击**书签**、**最近**或**通讯录**来查找你的目的地。在此示例中，我们点击了**书签**，然后点击了**芬威球场**。\n\
    \n    ![images](img/p442-01.jpg)\n\n    **注意**：一旦你点击**从此处出发的路线**按钮，你最近的搜索会自动显示（参见图\
    \ 20-5）。你也可以点击**目的地**框并输入目的地。\n\n    ![images](img/p442-02.jpg)\n\n5.  选择目的地后，路线界面会带你进入一个概览界面。在我们的示例中，我们看到的是从苹果公司\
    \ 1 Infinite Loop 总部到帕洛阿尔托苹果商店的路线规划界面。\n6.  一个绿色的大头针被放置在起点位置，一个红色的大头针被放置在终点位置——在本例中是芬威球场。\n\
    7.  一条亮蓝色的线将连接两个大头针，显示你的路线。如果有多条路线，其他路线会以浅蓝色显示。\n8.  点击一条灰色路线以选择它。一旦选中，它就会变成亮蓝色，任何其他路线都会褪为浅蓝色。\n\
    \n![images](img/p442-03.jpg)\n\n#### 查看路线\n\n在开始行程之前，你会在屏幕的右上角看到一个**开始**按钮。点击**开始**按钮，路线导航就开始了。**开始**按钮会变为**箭头**按钮，允许你在行程的各个步骤之间切换。\n\
    \n![images](img/p443-01.jpg)\n\n![images](img/p443-02.jpg)\n\n如图 20-8 所示，你可以将路线查看为地图上的路径或列表。\n\
    \n![images](img/2008.jpg)\n\n**图 20-8.** *查看路线的两种方式*\n\n你可以用手指移动屏幕来查看路线，或者只需点击底部的**箭头**按钮\
    \ ![images](img/p443-03.jpg)，以逐步快照的方式显示路线。\n\n你也可以点击右下角的**页面卷曲**按钮，然后点击**列表**\
    \ ![images](img/p444-01.jpg) 按钮，这将显示详细的分步路线。\n\n#### 在路线之间切换\n\n如前一个示例中的步骤 6 和\
    \ 7 所述，如果有多条可用路线，**地图**应用会用亮蓝色线标记其最佳推荐路线，并将其标记为**路线 1**。如果其他路线也可用，地图会用浅蓝色线标记它们。点击一条灰色线会使其变为亮蓝色，并用相应的数字标记——例如**路线\
    \ 2**。\n\n如果你根据最近的经验知道施工或其他情况使路线 1 不太理想，或者你需要在沿途某个不在推荐的路线 1 上的地点停靠，那么切换到另一条路线是一个很好的选择。\n\
    \n![images](img/p444-02.jpg)\n\n#### 在驾车、公交和步行路线之间切换\n\n在开始导航之前，你可以通过点击路线界面顶部蓝色栏左侧的图标（如图\
    \ 21-9 所示），选择你是驾车、使用公共交通还是步行。\n\n![images](img/2009.jpg)\n\n**图 20-9.** *选择你的出行方式*\n\
    \n#### 反向路线\n\n要反向路线，请点击位于顶部**起点**和**终点**字段之间的**反向** ![images](img/p445-01.jpg)\
    \ 按钮。如果你不太擅长自己反向导航，或者你的路线包含很多单行道，这将会很有用。\n"
- fmt: "### Maps Options\n\n![images](images/p446-01.jpg)\n\nCurrently, the only setting\
    \ that affects your `Maps` app is `Location Services`, which is critical for determining\
    \ your current location. Follow these steps to adjust the settings for the `Maps`\
    \ app:\n\n1. Touch the `Settings` icon.\n2. Tap `Location Services`.\n3. Make\
    \ sure the `Location Services` switch is in the `ON` position, so that `Maps`\
    \ can approximate your location.\n\n**NOTE:** Keeping the `Location Services`\
    \ switch `ON` will reduce battery life by a small amount. If you never use `Maps`\
    \ or care about your location, then set it to `OFF` to save your battery life.\n\
    \n![images](images/p446-02.jpg)\n\n![images](images/p446-03.jpg)\n\n## Chapter\
    \ 21\n\n## iTunes on Your Device\n\nIn this chapter, you will learn how to locate,\
    \ buy, and download media using the `iTunes` app right on your iPod touch. With\
    \ `iTunes`, you will be able to download music, movies, TV shows, podcasts, and\
    \ audiobooks. You will also learn about free educational content from leading\
    \ universities from the `iTunes U` section on iTunes, as well as how to redeem\
    \ iTunes gift cards.\n\nSome of us still remember going to the record store when\
    \ that new single or album came out. It was an exciting feeling to look at all\
    \ the music we wanted, browsing first through all the vinyl albums, then tapes,\
    \ and, finally, CDs.\n\nThose days are long gone with the iPod touch. Music, movies,\
    \ TV shows, and more are available right from the iPod touch itself.\n\niTunes\
    \ is a music, video, TV, podcast, and more store. Virtually every type of media\
    \ you can consume on your iPod touch is available for purchase or rent (and often\
    \ for free) right from the iTunes store.\n\n### Getting Started with iTunes\n\n\
    Earlier in this book, we showed you how to get your music from iTunes on your\
    \ computer into your iPod touch (see [Chapter 3](#Chapter03.html#ch3): \"Sync\
    \ With iCloud, iTunes, and More\"). One of the great things about iTunes is that\
    \ the store makes it very easy to buy or obtain music, videos, podcasts, and audiobooks,\
    \ and then use them within minutes right on your iPod touch.\n\nThe iPod touch\
    \ allows you to access the iTunes site (the mobile version) right on your device.\
    \ After you purchase or request free items, they will be downloaded to your `Music`\
    \ or `Videos` app on the iPod touch. If you have iCloud and have turned on automatic\
    \ downloads, any music you buy will automatically be downloaded to your other\
    \ iOS devices and iTunes on your PC. Movies will transfer the next time you sync\
    \ with your desktop iTunes library.\n\n#### A Network Connection Is Required\n\
    \nYou do need an active Internet connection in order to access the iTunes store.\
    \ Check out [Chapter 4](#Chapter04.html#ch4): \"Connect to the Network\" to learn\
    \ more about this.\n\n#### Starting iTunes\n\nWhen you first received your iPod\
    \ touch, `iTunes` was one of the icons on the first `Home` screen page. Touch\
    \ the `iTunes` icon, and you will be taken to the mobile version of the iTunes\
    \ Store.\n\n![images](images/p448-01.jpg)\n\n**NOTE:** The `iTunes` app changes\
    \ frequently. Since the `iTunes` app is really a web site, it is likely to change\
    \ somewhat between the time we wrote this book and when you are looking at it\
    \ on your iPod touch. Some of the screen images or buttons may look slightly different\
    \ than the ones shown in this book.\n\nAlso, iTunes content can vary considerably\
    \ from country to country. Depending on where you live, you might not have access\
    \ to movies, TV shows, or other media. However, Apple continues to add iTunes\
    \ content to more and more regions, so be sure to check back occasionally.\n\n\
    #### Navigating iTunes\n\nThe `iTunes` app uses icons similar to other programs\
    \ on the iPod touch, so getting around is quite easy. There are three buttons\
    \ at the top and five soft keys at the bottom to help you. You can customize these\
    \ soft keys and we show you how in the next section. Notice in the image to the\
    \ right the soft keys at the bottom. Scrolling in `iTunes` is just like scrolling\
    \ in any other program; move your finger up or down to look at the selections\
    \ available.\n\n![images](images/p448-02.jpg)\n\n### Customizing iTunes Soft Keys\n\
    \nIt's simple to customize the soft keys shown at the bottom of the iTunes screen.\
    \ Tap the `More` soft key in the lower left corner. Then tap `Edit` in the upper\
    \ right corner.\n\n![images](images/p449-01.jpg)\n\nNow, you can change the soft\
    \ keys by dragging and dropping any of the icons from the top down onto the soft\
    \ key toolbar at the bottom. Any item you drop will replace the icon that was\
    \ currently there.\n\nTap `Done` to complete the changes and return to iTunes.\n\
    \n![images](images/p449-02.jpg)\n\n### Finding Music with New Releases, Top Tens,\
    \ and Genres\n\nAlong the top of the screen of the iTunes music store are three\
    \ buttons: `Featured`, `Top Charts`, and `Genius`. By default, you are shown the\
    \ `Featured` selections when you start `iTunes`.\n\n#### Top Tens: The Popular\
    \ Stuff\n\nIf you like to know what is popular in a particular category, you will\
    \ want to browse the categories under `Top Tens`. Tap `Top Tens` at the top, and\
    \ then tap a category or genre to see what is popular in that category.\n\n**CAUTION**:\
    \ Items in the `Top Tens` categories are selling well, but that doesn't mean that\
    \ they will necessarily appeal to you. Always preview an item and check out its\
    \ reviews before you pay for it.\n\n![images](images/p450-01.jpg)\n\n#### Genres:\
    \ Types of Music\n\nTouch the `Genres` button to browse music based on a genre.\
    \ This is particularly helpful if you have a favorite type of music and would\
    \ like to browse just that category.\n\nThere is an extensive list of genres to\
    \ browse; just scroll down the list as you would in any other iPod touch app.\n\
    \n![images](images/p450-02.jpg)\n\nGo ahead and browse through the music until\
    \ you see something that you would like to preview or buy.\n\n#### Browsing for\
    \ Videos (Movies)\n\nTouch the `Movies`, `TV Shows`, or `Movie Videos` buttons\
    \ on the top to browse all the video-related items.\n\n![images](images/p451-01.jpg)\n\
    \nYou can also use your finger to scroll all the way to the bottom of the page\
    \ to check out the links there, including these links in particular:\n\n*   Top\
    \ Tens\n*   Genres\n\n**TIP:** At the very bottom of most pages, you can also\
    \ Redeem a gift card or log out of your Apple ID and log into another Apple ID\
    \ account. This is useful if someone (maybe your children) has changed the Apple\
    \ ID and you want to get back to yours.\n\n![images](images/p451-02.jpg)\n\nTap\
    \ any movie or video to see more details or preview the selection. You have the\
    \ option to rent or buy some movies and TV shows:\n\n*   **Rentals:** Some movies\
    \ are available for rent for a set number of days. Click this button to rent a\
    \ title.\n\n    **NOTE**: The rental period in the US is 24 hours, and the rental\
    \ period in Canada is 48 hours. The rental periods for other countries may vary\
    \ slightly.\n\n*   **Buy**: Clicking this button allows you to purchase and own\
    \ the movie or TV show forever.\n\n![images](images/p452-01.jpg)"
  raw: "### Maps Options\n\n![images](images/p446-01.jpg)\n\nCurrently, the only setting\
    \ that affects your **Maps** app is **Location Services**, which is critical for\
    \ determining your current location. Follow these steps to adjust the settings\
    \ for the **Maps** app:\n\n1.  Touch the **Settings** icon.\n2.  Tap **Location\
    \ Services**.\n3.  Make surethe **Location Services** switch to the **ON** position,\
    \ so that **Maps** can approximate your location.\n\n**NOTE:** Keeping the **Location\
    \ Services** switch **ON** will reduce battery life by a small amount. If you\
    \ never use **Maps** or care about your location, then set it to **OFF** to save\
    \ your battery life.\n\n![images](images/p446-02.jpg)\n\n![images](images/p446-03.jpg)\n\
    \n## Chapter 21\n\n## iTunes on Your Device\n\nIn this chapter, you will learn\
    \ how to locate, buy, and download media using the **iTunes** app right on your\
    \ iPod touch. With **iTunes**, you will be able to download music, movies, TV\
    \ shows, podcasts, and audiobooks. You will also learn about free educational\
    \ content from leading universities from the **iTunes U** section on iTunes, as\
    \ well as how to redeem iTunes gift cards.\n\nSome of us still remember going\
    \ to the record store when that new single or album came out. It was an exciting\
    \ feeling to look at all the music we wanted, browsing first through all the vinyl\
    \ albums, then tapes, and, finally, CDs.\n\nThose days are long gone with the\
    \ iPod touch. Music, movies, TV shows, and more are available right from the iPod\
    \ touch itself.\n\niTunes is a music, video, TV, podcast, and more store. Virtually\
    \ every type of media you can consume on your iPod touch is available for purchase\
    \ or rent (and often for free) right from the iTunes store.\n\n### Getting Started\
    \ with iTunes\n\nEarlier in this book, we showed you how to get your music from\
    \ iTunes on your computer into your iPod touch (see [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync With iCloud, iTunes, and More”). One of the great things about iTunes\
    \ is that the store makesit very easy to buy or obtain music, videos, podcasts,\
    \ and audiobooks, and then use them within minutes right on your iPod touch.\n\
    \nThe iPod touch allows you to access the iTunes site (the mobile version) right\
    \ on your device. After you purchase or request free items, they will be downloaded\
    \ to your **Music** or **Videos** app on the iPod touch. If you have have iCloud\
    \ and have turned on automatic downloads, any music you buy will automatically\
    \ be downloaded to your other iOS devices and iTunes on your PC. Movies will transfer\
    \ the next time you sync with your desktop ITunes library.\n\n#### A Network Connection\
    \ Is Required\n\nYou do need an active Internet connection in order to access\
    \ the iTunes store. Check out [Chapter 4](#Chapter04.html#ch4): “Connect to the\
    \ Network” to learn more about this.\n\n#### Starting iTunes\n\nWhen you first\
    \ received your iPod touch, **iTunes** was one of the icons on the first **Home**\
    \ screen page. Touch the **iTunes** icon, and you will be taken to the mobile\
    \ version of the iTunes Store.\n\n![images](images/p448-01.jpg)\n\n**NOTE:** The\
    \ **iTunes** app changes frequently. Since the **iTunes** app is really a web\
    \ site, it is likely to change somewhat between the time we wrote this book and\
    \ when you are looking at it on your iPod touch. Some of the screen images or\
    \ buttons may look slightly different than the ones shown in this book.\n\nAlso,\
    \ iTunes content can vary considerably from country to country. Depending on where\
    \ you live, you might not have access to movies, TV shows, or other media. However,\
    \ Apple continues to add iTunes content to more and more regions, so be sure to\
    \ check back occasionally.\n\n#### Navigating iTunes\n\nThe **iTunes** app uses\
    \ icons similar to other programs on the iPod touch, so getting around is quite\
    \ easy. There are three buttons at the top and five soft keys at the bottom to\
    \ help you. You can customize these soft keys and we show you how In the next\
    \ section.. Notice in the image to the right the soft keys at the bottom. Scrolling\
    \ in **iTunes** is just like scrolling in any other program; move your finger\
    \ up or down to look at the selections available.\n\n![images](images/p448-02.jpg)\n\
    \n### Customizing iTunes Soft Keys\n\nIt's simple to customize the soft keys shown\
    \ at the bottom of the iTunes screen. Tap the **More** soft key in the lower left\
    \ corner. Then tap **Edit** in the upper right corner.\n\n![images](images/p449-01.jpg)\n\
    \nNow, you can change the soft keys by dragging and dropping any of the icons\
    \ from the top down onto the soft key toolbar at the bottom. Any item you drop\
    \ will replace the icon that was currently there.\n\nTap **Done** to complete\
    \ the changes and return to iTunes.\n\n![images](images/p449-02.jpg)\n\n### Finding\
    \ Music with New Releases, Top Tens, and Genres\n\nAlong the top of the screen\
    \ of the iTunes music store are three buttons: **Featured, Top Charts**, and **Genius**.\
    \ By default, you are shown the **Featured** selections when you start **iTunes**.\n\
    \n#### Top Tens: The Popular Stuff\n\nIf you like to know what is popular in a\
    \ particular category, you will want to browse the categories under **Top Tens**.\
    \ Tap **Top Tens** at the top, and then tap a category or genre to see what is\
    \ popular in that category.\n\n**CAUTION**: Items in the **Top Tens** categories\
    \ are selling well, but that doesn't mean that they will necessarily appeal to\
    \ you. Always preview an item and check out its reviews before you pay for it.\n\
    \n![images](images/p450-01.jpg)\n\n#### Genres: Types of Music\n\nTouch the **Genres**\
    \ button to browse music based on a genre. This is particularly helpful if you\
    \ have a favorite type of music and would like to browse just that category.\n\
    \nThere is an extensive list of genres to browse; just scroll down the list as\
    \ you would in any other iPod touch app.\n\n![images](images/p450-02.jpg)\n\n\
    Go ahead and browse through the music until you see something that you would like\
    \ to preview or buy.\n\n#### Browsing for Videos (Movies)\n\nTouch the **Movies,\
    \ TV Shows,** or **Movie Videos** buttons on the top to browse all the video-related\
    \ items.\n\n![images](images/p451-01.jpg)\n\nYou can also use your finger to scroll\
    \ all the way to the bottom of the page to check out the links there, including\
    \ these links in particular:\n\n*   Top Tens\n*   Genres\n\n**TIP:** At the very\
    \ bottom of most pages, you can also Redeem a gift card or log out of your Apple\
    \ ID and log into another Apple ID account. This is useful if someone (maybe your\
    \ children) has changed the Apple ID and you want to get back to yours.\n\n![images](images/p451-02.jpg)\n\
    \nTap any movie or video to see more details or preview the selection. You have\
    \ the option to rent or buy some movies and TV shows:\n\n*   **Rentals:** Some\
    \ movies are available for rent for a set number of days. Click this button to\
    \ rent a title.\n\n    **NOTE**: The rental period in the US is 24 hours, and\
    \ the rental period in Canada is 48 hours. The rental periods for other countries\
    \ may vary slightly.\n\n*   **Buy**: Clicking this button allows you to purchase\
    \ and own the movie or TV show forever.\n\n![images](images/p452-01.jpg)"
  trans: "\n### 地图选项\n\n![images](img/p446-01.jpg)\n\n目前，唯一会影响您`地图`应用的设置是`定位服务`，它对确定您的当前位置至关重要。请按照以下步骤调整`地图`应用的设置：\n\
    \n1.  点击`设置`图标。\n2.  点击`定位服务`。\n3.  确保`定位服务`开关处于`开启`位置，以便`地图`能够估算您的位置。\n\n**注意：**\
    \ 保持`定位服务`开关`开启`会少量减少电池续航时间。如果您从不使用`地图`或不在意您的位置，请将其设为`关闭`以节省电池电量。\n\n![images](img/p446-02.jpg)\n\
    \n![images](img/p446-03.jpg)\n\n## 第 21 章\n\n## 您设备上的 iTunes\n\n在本章中，您将学习如何直接在\
    \ iPod touch 上使用`iTunes`应用查找、购买和下载媒体。通过`iTunes`，您将能够下载音乐、影片、电视节目、播客和有声读物。您还将了解如何从\
    \ iTunes 上的`iTunes U`板块获取顶尖大学的免费教育内容，以及如何兑换 iTunes 礼品卡。\n\n我们有些人还记得当年去唱片店购买新单曲或专辑的情景。浏览所有我们想要的音乐，从黑胶唱片到磁带到最终的\
    \ CD，那种感觉令人兴奋不已。\n\n那些日子随着 iPod touch 的到来早已一去不复返。音乐、影片、电视节目等更多内容，可以直接从 iPod touch\
    \ 本身获取。\n\niTunes 是一个音乐、视频、电视、播客等内容的商店。几乎所有您能在 iPod touch 上消费的媒体类型，都可以直接从 iTunes\
    \ Store 购买或租借（而且通常免费）。\n\n### 开始使用 iTunes\n\n在本书前面部分，我们向您展示了如何将电脑上 iTunes 中的音乐传输到您的\
    \ iPod touch 中（见第 3 章：“与 iCloud、iTunes 等同步”）。iTunes 的一大优点是，该商店让您能非常轻松地购买或获取音乐、视频、播客和有声读物，然后在几分钟内就在您的\
    \ iPod touch 上使用它们。\n\niPod touch 允许您直接在设备上访问 iTunes 网站（移动版）。当您购买或请求免费项目后，它们将被下载到\
    \ iPod touch 上的`音乐`或`视频`应用。如果您有 iCloud 并开启了自动下载，您购买的任何音乐都会自动下载到您的其他 iOS 设备和电脑上的\
    \ iTunes 中。影片将在您下次与桌面 iTunes 资料库同步时传输。\n\n#### 需要网络连接\n\n您需要有一个活跃的互联网连接才能访问 iTunes\
    \ Store。请参阅第 4 章：“连接到网络”以了解更多信息。\n\n#### 启动 iTunes\n\n当您首次收到 iPod touch 时，`iTunes`\
    \ 是第一个`主屏幕`页面上的图标之一。点击`iTunes`图标，您将进入 iTunes Store 的移动版。\n\n![images](img/p448-01.jpg)\n\
    \n**注意：** `iTunes`应用会经常更新。由于`iTunes`应用本质上是一个网站，因此从我们编写本书到您在 iPod touch 上查看它之间，其内容很可能会有所变化。某些屏幕图像或按钮可能与本书中显示的略有不同。\n\
    \n此外，iTunes 的内容因国家/地区而异。取决于您居住的地方，您可能无法访问某些影片、电视节目或其他媒体。然而，苹果公司正不断将 iTunes 内容添加到越来越多的地区，所以请务必偶尔回来看一下。\n\
    \n#### 浏览 iTunes\n\n`iTunes`应用使用的图标与 iPod touch 上的其他程序类似，因此操作起来相当简单。顶部有三个按钮，底部有五个软键可以帮助您。您可以自定义这些软键，我们将在下一节中向您展示具体方法。请注意右侧图片底部的软键。在`iTunes`中滚动与其他任何程序中的滚动方式相同；上下移动手指即可查看可用的选项。\n\
    \n![images](img/p448-02.jpg)\n\n### 自定义 iTunes 软键\n\n自定义 iTunes 屏幕底部显示的软键很简单。点击左下角的`更多`软键。然后点击右上角的`编辑`。\n\
    \n![images](img/p449-01.jpg)\n\n现在，您可以通过将顶部的任意图标拖放到底部的软键工具栏上来更改软键。您放置的任何项目都将替换当前所在位置的图标。\n\
    \n点击`完成`以完成更改并返回 iTunes。\n\n![images](img/p449-02.jpg)\n\n### 通过新发行、排行榜前十和流派查找音乐\n\
    \n在 iTunes 音乐商店屏幕的顶部有三个按钮：`精选`、`排行榜`和`Genius`。默认情况下，当您启动`iTunes`时，会显示`精选`内容。\n\
    \n#### 排行榜前十：热门内容\n\n如果您想知道某个特定类别中的热门内容，您会想要浏览`排行榜前十`下的分类。点击顶部的`排行榜前十`，然后点击一个类别或流派，查看该类别中的热门内容。\n\
    \n**注意：** `排行榜前十`类别中的项目销量很好，但这并不意味着它们一定会吸引您。在您付费之前，务必预览某个项目并查看其评价。\n\n![images](img/p450-01.jpg)\n\
    \n#### 流派：音乐类型\n\n点击`流派`按钮，根据流派浏览音乐。如果您有最喜欢的音乐类型并只想浏览该类别，这尤其有用。\n\n有大量的流派可供浏览；只需像在其他任何\
    \ iPod touch 应用中那样上下滚动列表即可。\n\n![images](img/p450-02.jpg)\n\n请自行浏览音乐，直到看到您想预览或购买的内容。\n\
    \n#### 浏览视频（影片）\n\n点击顶部的`影片`、`电视节目`或`电影视频`按钮，浏览所有与视频相关的项目。\n\n![images](img/p451-01.jpg)\n\
    \n您也可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：\n\n*   排行榜前十\n*   流派\n\n**提示：** 在大多数页面的最底部，您还可以兑换礼品卡，或退出您的\
    \ Apple ID 并登录另一个 Apple ID 账户。如果有人（也许是您的孩子）更改了 Apple ID 而您想切换回自己的账户，这将非常有用。\n\n\
    ![images](img/p451-02.jpg)\n\n点击任何影片或视频以查看详情或预览选项。您可以选择租借或购买部分影片和电视节目：\n\n*  \
    \ **租借：** 某些影片可供租借，并有固定的天数限制。点击此按钮租借一个节目。\n\n    **注意**: 美国的租借期为 24 小时，加拿大的租借期为\
    \ 48 小时。其他国家的租借期可能略有不同。\n\n*   **购买：** 点击此按钮可永久购买并拥有该影片或电视节目。\n\n![images](img/p452-01.jpg)\n"
- fmt: '#### Finding TV Shows


    When you’re done checking out the movies, tap the `TV Shows` button at the top
    to see what is available from your favorite shows.


    ![images](images/p452-02.jpg)


    ![images](images/p452-03.jpg)


    When you tap a TV series, you will see the individual episodes available. Tap
    any episode to check out the 30-second preview (see [Chapter 14](#Chapter14.html#ch14):
    “Viewing Videos” for more on watching videos). When you’re finished with the preview,
    tap the `Done` button.


    When you are ready, you can buy an individual episode or the entire TV series.
    Many, but not all, TV series allow you to purchase individual episodes as shown
    in [Figure 21–1](#Chapter21.html#fig_21_1).


    For example, you might want to get your fix of *Modern Family* and see the pilot
    episode that you missed. You can do this quickly and easily on your iPod touch.


    ![images](images/2101.jpg)


    **Figure 21–1.** *Buying a TV season or episode*


    **NOTE**: There is also a `Free TV Episode` category, where you can get samples
    and bonus content.


    #### Audiobooks in iTunes


    Audiobooks are a great way to enjoy books without having to read them. Some of
    the narrators are so fun to listen to that it is almost like watching a movie.
    For example, the narrator of the Harry Potter series can do dozens of truly amazing
    voices. We recommend that you try out an audiobook on your iPod touch; audiobooks
    are especially great when you are on an airplane and want to escape from the rest
    of the passengers, but don''t want to have the light on.


    **TIP**: If you’re a big audiobook listener, getting an Audible.com subscription
    can get you the same content at cheaper prices.


    ![images](images/p454-01.jpg)


    If you are an audiobook aficionado, be sure to check out the `Audiobooks` section
    in iTunes.


    You can click one of the top three buttons to browse the following areas in `Audiobooks`:


    - Featured

    - Top Tens

    - Categories


    ![images](images/p454-02.jpg)


    ### iTunes U: Great Educational Content


    If you like educational content, then check out the `iTunes U` section. You will
    be able to see whether your university, college, or school has its own section.


    ![images](images/p454-03.jpg)


    One good example we discovered in just a few minutes of browsing was a panel discussion
    with three Nobel Prize–winning economists moderated by Paul Solman (the economic
    correspondent for the PBS News Hour). You can find the podcast by navigating through
    the following menus: `iTunes U` > `Universities & Colleges` > `Boston University`
    > `BUNIVERSE - Business` > `Audio`. Like much of the content in `iTunes U`, this
    podcast is free!


    If you are in a location with a good wireless signal, you can tap the title of
    the audio or video item, and then listen to or watch it streaming. If your signal
    gets interrupted, however, you will lose your place in the video. There are many
    advantages to actually downloading the file (if possible) for later viewing, not
    least of which is that you get more control over the video-watching experience.


    ### Download for Offline Viewing


    If you know you are going to be out of wireless coverage for a while, such as
    on an airplane or in the subway, you will want to download the content for later
    offline viewing or listening. Tap the `Free` button to change it to a `Download`
    button, and then tap it again. You can then monitor the download progress (some
    larger videos may take ten minutes or more to complete) by tapping the `Downloads`
    button at the bottom right of the screen. When the download is complete, the item
    will show up in the correct area of your `Music` or `Videos` app.


    ### Searching iTunes


    Sometimes you have a good idea of what you want, but you are unsure where it is
    located or perhaps you don’t feel like browsing or navigating all the menus. The
    `Search` tool is for you.


    In the top-right corner of the `iTunes` app (as in virtually every other iPod
    touch app), you have a `Search` window.


    Touch `Search`, and the `Search` window and the on-device keyboard will pop up.
    Once you start typing, the iPod touch will begin to match your entry with possibilities.


    ![images](images/p455-01.jpg)


    Type in the artist, song name, video name, podcast name, or album you are searching
    for, and the iPod touch will display detailed matches. You can be as general or
    as specific as you like. If you are just looking to browse all particular songs
    by an artist, type the artist’s name. If you want a specific song or album, enter
    the full name of the song or album.


    When you locate the song or album name, simply touch it and you will be taken
    to the purchase page.


    ### Purchasing or Renting Music, Videos, Podcasts, and More


    Once you locate a song, video, TV show, or album, you can touch the `Buy` or (if
    you see it) `Rent` button. This will cause your media to start downloading. (If
    the content is free, then you will see the `Free` button, which turns into a `Download`
    button when you tap it.)


    We suggest you view or listen to the preview, as well as check out the customer
    reviews first, unless you are absolutely sure you want to purchase the item.


    **NOTE:** You can also purchase *tones* for your iPod touch from the iTunes store.


    #### Previewing Music


    Touch either the title of the song or its track number to the left of the song
    title; this will flip over the album cover and launch the preview window.


    You will hear a representative clip of 90 seconds of the song.


    Touch the `Stop` button and the track number will again be displayed.


    ![images](images/p456-01.jpg)


    #### Check Out Customer Reviews


    Many items in iTunes offer customer reviews. The reviews range from a low of one
    star to a high of five stars.


    **CAUTION**: *Be aware that the reviews can have explicit language.* Many of the
    reviews are clean; however, some do contain explicit language that may not be
    caught by the iTunes store right away.


    Reading the reviews can give you a fairly good idea of whether you would like
    to buy the item.


    ![images](images/p457-01.jpg)


    #### Previewing a Video, TV Show, or Music Video


    Pretty much everything on iTunes offers a preview. Sometimes you will see a `Preview`
    button, as with music videos and movies. TV shows are a little different; you
    tap the episode title in order to see the 30-second preview.


    We highly recommend checking out the reviews, as well as trying the preview before
    purchasing items on iTunes.


    Typical movie previews or trailers will be longer than 30 seconds. Some are two
    and a half minutes or longer.


    ![images](images/p457-02.jpg)


    #### Purchasing a Song, Video, or Other Item


    Once you are sure you want to purchase a song, video, or other item, follow these
    steps to buy it:


    1.  Touch the `Price` button of the song or the `Buy` button.

    2.  The button will change and turn into a green `Buy Now`, `Buy Song`, `Buy Single`,
    or `Buy Album` button.

    3.  Tap the `Buy` button.

    4.  You will see an animated icon jump into the shopping cart. Type in your iTunes
    password and touch `OK` to complete the sale.


    ![images](images/p458-01.jpg)


    ![images](images/p458-02.jpg)


    Tap the `More` button, then tap Downloads to see the download progress for each
    song on the album.


    The song or album will then become part of your music library, and it will be
    synced with your computer the next time you connect your iPod touch to iTunes
    on your computer. Note: iCloud will do this sync automatically.


    After the download is complete, you will see the new song, audiobook, podcast,
    or iTunes U podcast inside the correct category within your `Music` app.


    ![images](images/p458-03.jpg)


    **NOTE**: Purchased videos and iTunes U videos go into the `Videos` app on your
    iPod touch and podcasts will show up in the `Music` app.'
  raw: '#### Finding TV Shows


    When you''re done checking out the movies, tap the **TV Shows** button at the
    top to see what is available from your favorite shows.


    ![images](images/p452-02.jpg)


    ![images](images/p452-03.jpg)


    When you tap a TV series, you will see the individual episodes available. Tap
    any episode to check out the 30-second preview (see [Chapter 14](#Chapter14.html#ch14):
    “Viewing Videos” for more on watching videos). When you''re finished with the
    preview, tap the **Done** button.


    When you are ready, you can buy an individual episode or the entire TV series.
    Many, but not all, TV series allow you to purchase individual episodes as shown
    in [Figure 21–1](#Chapter21.html#fig_21_1).


    For example, you might want to get your fix of *Modern Family* and see the pilot
    episode that you missed. You can do this quickly and easily on your iPod touch.


    ![images](images/2101.jpg)


    **Figure 21–1.** *Buying a TV season or episode*


    **NOTE**: There is also a **Free TV Episode** category, where you can get samples
    and bonus content.


    #### Audiobooks in iTunes


    Audiobooks are a great way to enjoy books without having to read them. Some of
    the narrators are so fun to listen to that it is almost like watching a movie.
    For example, the narrator of the Harry Potter series can do dozens of truly amazing
    voices. We recommend that you try out an audiobook on your iPod touch; audiobooks
    are especially great when you are on an airplane and want to escape from the rest
    of the passengers, but don''t want to have the light on.


    **TIP**: If you''re a big audiobook listener, getting an Audible.com subscription
    can get you the same content at cheaper prices.


    ![images](images/p454-01.jpg)


    If you are an audiobook aficionado, be sure to check out the **Audiobooks** section
    in iTunes.


    You can click the one of the top three buttons to browse the following areas in
    **Audiobooks**:


    *   Featured

    *   Top Tens

    *   Categories


    ![images](images/p454-02.jpg)


    ### iTunes U: Great Educational Content


    If you like educational content, then check out the **iTunes U** section. You
    will be able to see whether your university, college, or school has its own section.


    ![images](images/p454-03.jpg)


    One good example we discovered in just a few minutes of browsing was a panel discussion
    with three Nobel Prize–winning economists moderated by Paul Solman (the economic
    correspondent for the PBS News Hour). You can find the podcast by navigating through
    the following menus: **`iTunes U`** > **`Universities & Colleges`** > **`Boston
    University`** > **`BUNIVERSE - Business`** > **`Audio`**. Like much of the content
    in **iTunes U**, this podcastis free!


    If you are in a location with a good wireless signal, you can tap the title of
    the audio or video item, and then listen to or watch it streaming. If your signal
    gets interrupted, however, you will lose your place in the video. There are many
    advantages to actually downloading the file (if possible) for later viewing, not
    least of which is that you get more control over the video-watching experience.


    ### Download for Offline Viewing


    If you know you are going to be out of wireless coverage for a while, such as
    on an airplane or in the subway, you will want to download the content for later
    offline viewing or listening. Tap the **Free** button to change it to a **Download**
    button, and then tap it again. You can then monitor the download progress (some
    larger videos may take ten minutes or more to complete) by tapping the **Downloads**
    button at the bottom right of the screen. When the download is complete, the item
    will show up in the correct area of your **Music** or **Videos** app.


    ### Searching iTunes


    Sometimes you have a good idea of what you want, but you are unsure where it is
    located or perhaps you don''t feel like browsing or navigating all the menus.
    The **Search** tool is for you.


    In the top-right corner of the **iTunes** app (as in virtually every other iPod
    touch app), you have a **Search** window.


    Touch **Search**, and the **Search** window and the on-device keyboard will pop
    up. Once you start typing, the iPod touch will begin to match your entry with
    possibilities.


    ![images](images/p455-01.jpg)


    Type in the artist, song name, video name, podcast name, or album you are searching
    for, and the iPod touch will display detailed matches. You can be as general or
    as specific as you like. If you are just looking to browse all particular songs
    by an artist, type the artist''s name. If you want a specific song or album, enter
    the full name of the song or album.


    When you locate the song or album name, simply touch it and you will be taken
    to the purchase page.


    ### Purchasing or Renting Music, Videos, Podcasts, and More


    Once you locate a song, video, TV show, or album, you can touch the **Buy** or
    (if you see it) **Rent** button. This will cause your media to start downloading.
    (If the content is free, then you will see the **Free** button, which turns into
    a **Download** button when you tap it.)


    We suggest you view or listen to the preview, as well as check out the customer
    reviews first, unless you are absolutely sure you want to purchase the item.


    **NOTE:** You can also purchase *tones* for your iPod touch from the iTunes store.


    #### Previewing Music


    Touch either the title of the song or its track number to the left of the song
    title; this will flip over the album cover and launch the preview window.


    You will hear a representative clip of 90 seconds of the song.


    Touch the **Stop** button and the track number will again be displayed.


    ![images](images/p456-01.jpg)


    #### Check Out Customer Reviews


    Many items in iTunes offer customer reviews. The reviews range from a low of one
    star to a high of five stars.


    **CAUTION**: *Be aware that the reviews can have explicit language.* Many of the
    reviews are clean; however, some do contain explicit language that may not be
    caught by the iTunes store right away.


    Reading the reviews can give you a fairly good idea of whether you would like
    to buy the item.


    ![images](images/p457-01.jpg)


    #### Previewing a Video, TV Show, or Music Video


    Pretty much everything on iTunes offers a preview. Sometimes you will see a **Preview**
    button, as with music videos and movies. TV shows are a little different; you
    tap the episode title in order to see the 30-second preview.


    We highly recommend checking out the reviews, as well as trying the preview before
    purchasing items on iTunes.


    Typical movie previews or trailers will be longer than 30 seconds. Some are two
    and a half minutes or longer.


    ![images](images/p457-02.jpg)


    #### Purchasing a Song, Video, or Other Item


    Once you are sure you want to purchase a song, video, or other item, follow these
    steps to buy it:


    1.  Touch the **Price** button of the song or the **Buy** button.

    2.  The button will change and turn into a green **Buy Now, Buy Song, Buy Single**,
    or **Buy Album** button.

    3.  Tap the **Buy** button.

    4.  You will see an animated icon jump into the shopping cart. Type in your iTunes
    password and touch **OK** to complete the sale.


    ![images](images/p458-01.jpg)


    ![images](images/p458-02.jpg)


    Tap the **More** button, then tap Downloads to see the download progress for each
    song on the album.


    The song or album will then become part of your music library, and it will be
    synced with your computer the next time you connect your iPod touch to iTunes
    on your computer. Note: iCloud will do this sync automatically.


    After the download is complete, you will see the new song, audiobook, podcast,
    or iTunes U podcast inside the correct category within your **Music** app.


    ![images](images/p458-03.jpg)


    **NOTE**: Purchased videos and iTunes U videos go into the **Videos** app on your
    iPod touch and podcasts will show up in the **Music** app.'
  trans: '

    #### 寻找电视节目


    浏览完电影后，点击顶部的`电视节目`按钮，即可查看你喜爱的节目中有哪些可供选择。


    ![images](img/p452-02.jpg)


    ![images](img/p452-03.jpg)


    当你点开一个电视剧集时，会看到可用的单集内容。点击任意一集即可观看 30 秒的预览（关于观看视频的更多信息，请参阅第 14 章：“观看视频”）。预览结束后，点击`完成`按钮。


    当你准备好后，可以购买单集或整季电视剧。如图 21-1 所示，很多（但并非所有）电视剧都允许你单独购买单集。


    例如，你或许想补看《摩登家庭》中错过的试播集。在你的 iPod touch 上可以快速轻松地完成这一操作。


    ![images](img/2101.jpg)


    **图 21-1.** *购买电视剧季或单集*


    **注意**：还有一个`免费电视节目`类别，你可以在这里获取样片和额外内容。


    #### iTunes 中的有声读物


    有声读物是一种无需阅读就能享受书籍的绝佳方式。有些朗读者听起来非常有趣，几乎就像看电影一样。例如，《哈利·波特》系列的朗读者能够演绎出几十种令人惊叹的声音。我们建议你在
    iPod touch 上尝试一下有声读物；当你在飞机上想要逃离其他乘客，但又不想开灯时，有声读物尤其出色。


    **提示**：如果你是一位有声读物重度听众，订阅 Audible.com 可以以更低价格获得相同的内容。


    ![images](img/p454-01.jpg)


    如果你是一位有声读物爱好者，请务必查看 iTunes 中的`有声读物`版块。


    你可以点击顶部三个按钮之一，浏览`有声读物`中的以下区域：


    - 精选

    - 十大

    - 分类


    ![images](img/p454-02.jpg)


    ### iTunes U：优质教育内容


    如果你喜欢教育内容，请查看`iTunes U`版块。你将能够看到你的大学、学院或学校是否有自己的专区。


    ![images](img/p454-03.jpg)


    我们仅浏览了几分钟就发现了一个很好的例子：一场由保罗·索尔曼（PBS News Hour 的经济事务记者）主持、三位诺贝尔奖得主经济学家参与的小组讨论。你可以通过以下菜单导航找到该播客：`iTunes
    U` > `大学与学院` > `波士顿大学` > `BUNIVERSE - 商业` > `音频`。与`iTunes U`中的许多内容一样，这个播客是免费的！


    如果你所在的区域无线信号良好，你可以点击音频或视频项目的标题，然后进行流式播放。但是，如果信号中断，你将丢失视频的播放进度。如果可能的话，将文件实际下载下来留待以后观看有很多好处，其中最重要的一点是你能获得更多对视频观看体验的控制。


    ### 下载以供离线观看


    如果你知道自己将会有一段时间没有无线网络覆盖，例如在飞机上或地铁里，你需要将内容下载下来以供日后离线观看或收听。点击`免费`按钮，它会变成`下载`按钮，然后再点击一次。你可以通过点击屏幕右下角的`下载`按钮来监控下载进度（一些较大的视频可能需要十分钟或更长时间才能完成）。下载完成后，该项目将显示在`音乐`或`视频`应用的相应区域中。


    ### 搜索 iTunes


    有时你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻阅所有菜单。`搜索`工具就是为你准备的。


    在`iTunes`应用的右上角（几乎与所有其他 iPod touch 应用一样），有一个`搜索`窗口。


    触摸`搜索`，`搜索`窗口和设备键盘将弹出。一旦你开始输入，iPod touch 将开始匹配你输入的内容并显示可能性。


    ![images](img/p455-01.jpg)


    输入你正在搜索的艺人、歌曲名称、视频名称、播客名称或专辑名称，iPod touch 将显示详细的匹配结果。你可以进行宽泛搜索，也可以进行精确搜索。如果你只是想浏览某位艺人的所有特定歌曲，请输入艺人的名字。如果你想要某首具体的歌曲或专辑，请输入歌曲或专辑的全名。


    当你找到歌曲或专辑名称时，只需点击它，就会被带到购买页面。


    ### 购买或租赁音乐、视频、播客等


    一旦你找到一首歌、一个视频、一个电视节目或一张专辑，你可以点击`购买`按钮，或者（如果看到的话）`租赁`按钮。这样你的媒体文件就会开始下载。（如果内容是免费的，你会看到`免费`按钮，点击后会变成`下载`按钮。）


    我们建议你先查看或收听预览，并查看用户评价，除非你百分之百确定要购买该项目。


    **注意：** 你也可以从 iTunes 商店为你的 iPod touch 购买*铃声*。


    #### 预览音乐


    点击歌曲的标题或其左侧的曲目编号；这会将专辑封面翻转过来并打开预览窗口。


    你将听到该歌曲一段时长 90 秒的代表性片段。


    点击`停止`按钮，曲目编号将再次显示。


    ![images](img/p456-01.jpg)


    #### 查看用户评价


    iTunes 中的许多项目都提供用户评价。评价从最低的一星到最高的五星不等。


    **警告：** *请注意，评价中可能包含不雅语言。* 很多评价是干净的；然而，有些确实包含不雅语言，iTunes 商店可能无法立即发现。


    阅读评价可以让你很好地判断自己是否想购买该项目。


    ![images](img/p457-01.jpg)


    #### 预览视频、电视节目或音乐视频


    iTunes 上几乎所有的东西都提供预览。有时你会看到一个`预览`按钮，例如对于音乐视频和电影。电视节目则略有不同；你需要点击剧集标题才能看到 30 秒的预览。


    我们强烈建议你在 iTunes 上购买商品之前，先查看评价并尝试预览。


    典型的电影预览或预告片会超过 30 秒。有些会长达两分半钟或更久。


    ![images](img/p457-02.jpg)


    #### 购买歌曲、视频或其他项目


    一旦你确定要购买一首歌、一个视频或其他项目，请按照以下步骤进行购买：


    1.  点击歌曲的`价格`按钮或`购买`按钮。

    2.  按钮会发生变化，变成一个绿色的`立即购买`、`购买歌曲`、`购买单曲`或`购买专辑`按钮。

    3.  点击`购买`按钮。

    4.  你会看到一个动态图标跳入购物车。输入你的 iTunes 密码，然后点击`确定`完成交易。


    ![images](img/p458-01.jpg)


    ![images](img/p458-02.jpg)


    点击`更多`按钮，然后点击`下载`，即可查看专辑中每首歌曲的下载进度。


    然后，这首歌曲或这张专辑将成为你音乐库的一部分，并且下次你将 iPod touch 连接到电脑上的 iTunes 时，它将会与你的电脑同步。注意：iCloud
    会自动进行此同步。


    下载完成后，你将能在`音乐`应用的相应类别中看到新的歌曲、有声读物、播客或 iTunes U 播客。


    ![images](img/p458-03.jpg)


    **注意**：购买的视频和 iTunes U 视频会进入你 iPod touch 上的`视频`应用，播客则会显示在`音乐`应用中。

