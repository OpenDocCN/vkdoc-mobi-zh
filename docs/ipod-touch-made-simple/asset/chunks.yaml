  trans: '

    # 无法接收或发送电子邮件


    如果你无法发送或接收电子邮件，第一步应确认你已连接到互联网。可通过查看`Home`屏幕左上角的网络连接图标来检查（详见第 4 章：“连接网络”）。


    有时，你需要调整外发端口才能正常发送邮件。请按以下步骤操作：


    1.  轻点`设置`。

    2.  轻触`邮件、通讯录、日历`。

    3.  在`账户`下，轻触你遇到发送问题的电子邮件账户。

    4.  轻触`SMTP`并验证你的外发邮件服务器设置是否正确；同时检查是否已设为`ON`。

    5.  轻触顶部的`外发邮件服务器`并验证所有设置，例如`主机名`、`用户名`、`密码`、`SSL`、`身份验证`和`服务器端口`。你也可以尝试将`服务器端口`值设为`587`、`995`或`110`；有时这能解决问题。

    6.  点击`完成`，然后轻点左上角的电子邮件账户名称，返回此账户的`电子邮件`设置界面。

    7.  向下滚动到底部，轻触`高级`。

    8.  你还可以在此界面尝试为服务器端口设置不同的端口，如`587`、`995`或`110`。如果这些值都不起作用，请联系你的电子邮件服务提供商以获取其他端口号并验证你的设置。


    # 第 17 章


    # 通讯录与备忘录


    你的 iPod touch 让您可以即时访问所有重要信息。就像你的电脑一样，你的 iPod touch 可以存储数千个联系人以便轻松检索。在本章中，我们将向你展示如何添加新联系人、通过添加新字段来自定义联系人、使用群组组织联系人、快速搜索或浏览联系人，甚至可以使用
    iPod touch 的`地图`应用查看联系人的位置。我们还将向你展示如何自定义`通讯录`视图，使其按照你喜欢的方式排序和显示。最后，我们将介绍一些故障排除技巧，在你遇到困难时能为你节省时间。


    我们还将为你概述`备忘录`应用，你可以用它来写笔记、制作购物清单，以及列出你想看的电影或想读的书籍。我们将向你展示如何整理备忘录以及通过电子邮件将其发送给自己或他人。理想情况下，我们希望`备忘录`在
    iPod touch 上使用起来如此便捷，以至于你最终可以摆脱大部分（即使不是全部）纸质便签！


    同样很棒的是，你可以使用 iCloud 无线同步、共享和备份你的通讯录和备忘录。因此，你永远不必担心丢失重要信息，或担心你的设备或电脑上没有最新信息。


    ### 将通讯录载入 iPod touch


    第 3 章：“与 iCloud、iTunes 等同步”介绍了如何使用 Mac 或 Windows 电脑上的`iTunes`应用将通讯录载入 iPod touch。你也可以使用
    Google Sync 或 iCloud 服务将通讯录载入 iPod touch。


    **提示：** 你可以从收到的电子邮件中添加新的联系人条目。了解操作方法请参阅第 16 章：“使用电子邮件通信。”


    ### 通讯录列表何时最有帮助？


    当满足以下两个条件时，`通讯录`应用最为有用：


    1.  其中包含大量姓名和地址。

    2.  你可以轻松找到所需内容。


    #### 改进你的通讯录列表


    我们有一些基本规则，可以帮助你让 iPod touch 上的通讯录列表更有用：


    **规则 1：向通讯录中添加所有内容。**


    > 你永远不知道何时会需要那个不起眼的餐厅名称、水管工的电话号码，等等。


    **规则 2：添加条目时，确保考虑将来如何找到它们（名字、姓氏、公司）。**


    > 我们在本章中提供了许多提示和技巧来帮助你输入姓名，以便你在需要时能立刻找到它们。


    **提示：** 这里有一个找到餐厅的好方法。每当你将一家餐厅输入通讯录时，务必在“公司名称”字段中输入“餐厅”一词，即使它并非餐厅名称的一部分。当你输入字母“rest”时，你应该就能立刻找到你所有的餐厅！


    ### 在 iPod touch 上添加新联系人


    你可以随时直接在 iPod touch 上添加联系人。当你远离电脑——但随身带着 iPod touch——又需要将某人添加到通讯录时，这非常方便。操作非常简单；下一节将向你展示具体方法。


    ![图片](img/p350-01.jpg)


    #### 启动通讯录应用


    在`Home`屏幕上，轻点`通讯录`图标，你将看到`所有联系人`列表。轻点右上角的`加号`按钮 (`+`) 以添加新联系人，如图 17-1 所示。


    ![图片](img/1701.jpg)


    **图 17-1.** *输入新联系人姓名*


    轻点每个字段以输入新联系人的名字、姓氏和公司名称。


    **提示：** 请记住，通讯录搜索功能使用名字、姓氏和公司名称。当你添加或编辑联系人时，在公司名称中添加一个特殊词语可以帮助你稍后找到特定联系人。例如，在`公司`字段中添加“西西朋友”这几个字，可以帮助你使用搜索功能快速找到西西的所有朋友。


    在`姓名`按钮下方是`手机`、`电子邮件`、`铃声`、`短信铃声`、`主页`、`添加新地址`和`添加字段`的字段。在下面，你可以关联多个联系人。


    #### 添加新电话号码


    ![图片](img/p352-01.jpg)


    轻点`电话`按钮，并使用`数字`键盘输入电话号码。


    **提示：** 不必担心括号、连字符或句点——iPod touch 会自动将号码调整为正确格式。只需输入区号和号码的数字即可。如果你知道国家代码，也最好一并输入。


    ![图片](img/p352-02.jpg)


    接下来，选择此电话号码的类型——手机、住宅、工作或其他。有九个字段可供选择，如果你发现内置字段都不适用，还有一个`自定义`字段。


    ![图片](img/p352-03.jpg)


    #### 添加电子邮件地址


    ![图片](img/p353-01.jpg)


    轻触`电子邮件`标签，然后输入联系人的电子邮件地址。你也可以轻触电子邮件地址左侧的标签，选择这是住宅、工作还是其他电子邮件地址。


    添加一个地址后，你会看到出现另一个字段，用于添加更多电子邮件地址。


    #### 自定义铃声或短信铃声


    ![图片](img/p353-02.jpg)


    轻触`铃声`或`短信铃声`标签，为`FaceTime`来电或此人发送短信时选择自定义铃声或短信铃声。


    #### 输入网站地址


    ![图片](img/p353-03.jpg)


    你还会看到一个`主页`字段，你可以在其中输入联系人网站的地址，甚至可以输入多个网站地址。


    **注意：** 如果你使用 iCloud 同步通讯录，iCloud 可能会自动搜索 Facebook 主页并将其整合到联系人信息中。


    ![图片](img/p353-04.jpg)


    #### 添加街道地址


    ![图片](img/p354-01.jpg)


    在`主页`字段下方是用于添加地址的字段。输入`街道`、`城市`、`省/州`和`邮政编码`。你还可以指定`国家/地区`以及这是住宅还是工作地址。


    ![图片](img/p354-02.jpg)

    '
- fmt: '#### Adding New Fields


    ![Images](images/p354-03.jpg)


    Tap the **Add Field** tab and select any of the suggested fields to add it to
    that particular contact (see [Figure 17-2](#Chapter17.html#fig_17_2)).


    ![images](images/1702.jpg)


    **Figure 17-2.** *New fields available to add to your Contact entry*


    When you touch **Birthday**, you’re presented with a wheel. You can turn the wheel
    to the corresponding date to add the birthday to the contact information.


    ![Images](images/p355-02.jpg)


    When you are finished, just touch the **Done** button in the upper-right corner
    of the **New Contact** form.


    ![Images](images/p355-01.jpg)


    **TIP:** Suppose you meet someone at the bus stop—someone you want to remember.
    Of course, you should enter your new friend’s first and last names (if you know
    them); however, you should also enter the words “bus stop” in the **Company name**
    field. Then, when you type the letters “bus” or “stop,” you should instantly find
    everyone you’ve met at the bus stop, even if you can’t remember their names!


    ### Adding a Photo to Contacts


    You may want to associate a photo with a contact. From the **New Contact** screen
    we’ve been working in, simply touch the **Add Photo** button next to the **First
    Last** tab.


    ![Images](images/p355-03.jpg)


    If you are changing a photo when you are in “edit contact” mode, you’ll see **edit**
    at the bottom of the existing photo.


    After you touch the **add photo** button, you’ll see that you can do the following:


    ![Images](images/p356-01.jpg)


    *   Take Photo

    *   Choose Photo


    If there’s a photo already in place, you can also do these things:


    *   Edit Photo

    *   Delete Photo


    To choose an existing photo, select the photo album where the picture is located
    and touch the corresponding tab. When you see the picture you want to use, just
    touch it.


    ![Images](images/p356-02.jpg)


    You’ll notice that the top and bottom of the photo become grayed out and that
    you can manipulate the picture by moving it, pinching to zoom in or out, and then
    arranging it in the **Picture** window.


    Once the picture is sitting where you want it, just touch the **Choose** button
    in the lower-right corner and that picture will be set for the contact.


    ![Images](images/p356-03.jpg)


    **TIP:** If you just moved into a new neighborhood, it can be quite daunting to
    remember everyone’s name. Therefore, it’s good practice to add the word “neighbor”
    into the **Company name** field for every neighbor you meet. To instantly call
    up all your neighbors, simply type the letters “neigh” to find everyone you’ve
    met!


    ### Searching Your Contacts


    Let’s say you need to find a specific phone number or email address. Just touch
    your **Contacts** icon as you did previously, and you’ll see a **Search** box
    at the top of your **All Contacts** list (see [Figure 17-3](#Chapter17.html#fig_17_3)).


    **TIP:** If you are somewhere in the middle or bottom of your **Contacts** list,
    you can quickly jump to the top of the **Contacts** screen and see this **Search**
    window by tapping the time at the very top of your iPod touch.


    ![images](images/1703.jpg)


    **Figure 17-3.** *The contacts **Search** box*


    To find a contact, enter the first few letters of any of these three searchable
    fields:


    ![Images](images/p357-01.jpg)


    *   First Name

    *   Last Name

    *   Nickname

    *   Company Name


    The iPod touch begins to filter immediately and displays only those contacts that
    match the letters typed.


    **TIP:** To further narrow the search, hit the **Space** key and type a few more
    letters.


    When you see the correct name, just touch it and that individual’s contact information
    will appear.


    #### Quickly Jump to a Letter by Tapping and Sliding on the Alphabet


    If you hold your finger on the alphabet on the left edge of the screen and drag
    it up or down, you can jump to that letter.


    #### Search by Flicking


    If you don’t want to manually input letters, you can just move your finger and
    flick from the bottom up, and you’ll see your contacts move quickly on the screen.
    Just continue to flick or scroll until you see the name you want. Tap a name and
    the contact information for that person will appear.


    #### Search Using Groups


    If you have your contacts sorted by groups on your PC or Mac and you sync your
    iPod touch with your computer or over the air using iCloud then those groups will
    be synced to your iPod touch. When you start your **Contacts** app, you will see
    **Groups** at the top. Under the **Groups** heading, you will see **All Contacts**.


    ![Images](images/p358-01.jpg)


    Choose **All Contacts** to search all the available contact information on the
    iPod touch.


    If you have multiple accounts synced, you will see a tab for each individual account
    and one for **All Contacts** at the top.


    This example shows two groups—one is from a Microsoft Exchange account (i.e.,
    a company email account), and one is from a group of iCloudontacts.


    If you have an Exchange ActiveSync account and your company has enabled it, your
    Exchange Global Address List shows up here, under Groups, as well. You can search
    to find anyone in your company there.


    **NOTE:** You can’t create groups in the **Contacts** app on the iPod touch—they
    must be created on your computer or synced when you add contact accounts to your
    iPod touch.'
