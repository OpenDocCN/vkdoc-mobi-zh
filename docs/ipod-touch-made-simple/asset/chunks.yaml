  trans: "\n### 打开电子邮件附件\n\n与我们刚才描述的不会直接在邮件正文中打开的情况不同，其他类型的附件（例如电子表格、文字处理文档和演示文稿文件）需要手动打开。\n\
    \n#### 轻点进入“快速查看”模式\n\n请按照以下步骤在“快速查看”模式下打开附件：\n\n1.  打开带有附件的邮件，如图 16-3 所示。\n2.\
    \  快速轻点附件，即可在“快速查看”模式下立即打开它。\n3.  您可以在文档中导航。请记住，您可以进行缩放，也可以向上或向下滑动。\n4.  如果您打开了一个包含多个工作表或电子表格的电子表格，您会看到顶部有多个标签。触碰另一个标签即可打开该电子表格。\n\
    5.  查看完附件后，轻点文档一次以调出控制选项，然后轻点左上角的**完成**。\n6.  如果您安装了可以打开所查看附件类型（此处为电子表格）的应用，那么您会在右上角看到一个**“打开方式”**按钮。轻点**“打开方式”**按钮可在另一个应用中打开此文件。\n\
    \n![images](img/1603.jpg)\n\n**图 16-3.** *在“快速查看”模式下查看电子邮件附件。*\n\n#### 在其他应用中打开文档\n\
    \n您可能希望在其他应用程序中打开附件。例如，您可能想要在 **Numbers** 中打开电子表格，或者在 **iBooks、Stanza** 或 **GoodReader**\
    \ 中打开 PDF 文件。请按照以下步骤操作：\n\n1.  打开电子邮件。\n2.  按住附件，直到弹出窗口出现。\n3.  选择**“打开方式…”**或**“在‘Numbers’中打开”**选项。当附件格式与您设备上的应用相匹配时，您可能会看到“打开方式”后面列出了具体的应用程序，此处以\
    \ Numbers 为例。\n\n    ![Images](img/p330-01.jpg)\n\n4.  从列表中选择您要使用的应用程序。\n5.  最后，您可以编辑文档、保存它，并通过电子邮件将其回复给发件人。\n\
    \n    ![Images](img/p330-02.jpg)\n\n#### 查看视频附件\n\n您可能会收到视频作为电子邮件附件。某些类型的视频可以在您的\
    \ iPod touch 上观看（有关支持的视频格式列表，请参阅本章后面的“支持的电子邮件附件类型”部分）。请按照以下步骤打开视频附件：\n\n1.  轻点视频附件以打开它，并在视频播放器中观看。\n\
    \n    ![Images](img/p331-01.jpg)\n\n2.  观看完视频后，轻点屏幕以调出播放器控制选项。\n3.  轻点左上角的**完成**按钮以返回电子邮件。\n\
    \n    **注意：** 此截图来自本书作者之一 Martin Trautschold 的视频教程，该教程向您展示如何使用 iPod touch。请访问\
    \ Martin 的网站 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ 查看一些免费的示例教程。\n\n### 打开并查看压缩的 .zip 文件\n\n除非您安装了诸如 **GoodReader** 之类的应用程序，否则您的\
    \ iPod touch 将无法打开并查看 `.zip` 格式的压缩文件。在本书出版时，**GoodReader** 仍然是一个免费的应用程序，非常值得安装。\n\
    \n**提示：** 了解如何在第 13 章：“报摊和更多”中安装和使用 **GoodReader**。\n\n请按照以下步骤在程序中打开 `.zip` 文件：\n\
    \n1.  从 App Store 安装免费的 **GoodReader** 应用。\n2.  打开包含 `.zip` 文件附件的电子邮件。\n3.  长按\
    \ `.zip` 附件，直到底部出现一个包含按钮的弹出窗口，按钮上显示：**“在‘GoodReader’中打开”**。轻点该按钮即可在 **GoodReader**\
    \ 中打开 `.zip` 文件。\n\n    ![Images](img/p332-01.jpg)\n\n4.  **GoodReader** 现在应该会打开，您的\
    \ `.zip` 文件应位于文件列表的顶部。要打开或解压缩 `.zip` 文件，请轻点它并选择**解压缩**按钮。\n\n    ![Images](img/p332-02.jpg)\n\
    \n5.  现在您应该会看到解压缩后的文件——在本例中，是在文件列表中位于 `.zip` 文件之上的 Adobe `.pdf` 文件。\n\n    ![Images](img/p332-03.jpg)\n\
    \n6.  轻点该解压缩后的文件即可查看。\n7.  阅读完附件后，双击**主屏幕**按钮并轻点**邮件**图标以返回阅读电子邮件。\n\n#### 支持的电子邮件附件类型\n\
    \n您的 iPod touch 支持将以下文件类型作为附件：\n\n*   `.doc` 和 `.docx`（**Microsoft Word** 文档）\n\
    *   `.htm` 和 `.html`（网页）\n*   `.key`（**Keynote** 演示文稿文档）\n*   `.numbers`（**Apple\
    \ Numbers** 电子表格文档）\n*   `.pages`（**Apple Pages** 文档）\n*   `.pdf`（Adobe 的便携式文档格式，由\
    \ **Adobe Acrobat** 和 **Adobe Reader** 等程序使用）\n*   `.ppt` 和 `.pptx`（**Microsoft\
    \ PowerPoint** 演示文稿文档）\n*   `.txt`（文本文件）\n*   `.vcf`（联系人文件）\n*   `.xls` 和 `.xlsx`（**Microsoft\
    \ Excel** 电子表格文档）\n*   `.mp3` 和 `.mov`（音频和视频格式）\n*   `.zip`（压缩文件）：只有安装了能够读取它们的应用程序（例如\
    \ **GoodReader**）才可阅读——请参阅本章前面的“打开并查看压缩的 .zip 文件”部分。\n\n## 回复、转发或删除邮件\n\n在您阅读电子邮件的窗格底部有一个工具栏。\n\
    \n![Images](img/p333-01.jpg)\n\n通过此工具栏，您可以将邮件移动到不同的邮箱或文件夹；删除邮件；或者回复、全部回复或转发邮件。\n\
    \n轻点小**箭头**图标 ![Images](img/p333-02.jpg) 即可看到这些选项按钮出现：**回复**、**全部回复**和**转发**。\n\
    \n**注意：** 只有当收件人不止一位时，**全部回复**按钮才会出现。\n\n![Images](img/p333-03.jpg)\n\n### 回复电子邮件\n\
    \n您可能会最频繁地使用**回复**命令。请按照以下步骤在 iPod touch 上回复电子邮件：\n\n1.  轻点**回复**按钮。\n\n    您会看到原始发件人现在被列为邮件的收件人，出现在邮件的**收件人：**行中。主题将自动显示为：“Re:\
    \ *(原始主题行)*”\n\n    ![Images](img/p334-01.jpg)\n\n2.  输入您的回复内容。\n3.  完成后，只需轻点屏幕右上角的蓝色**发送**按钮。\n\
    \n### 使用“全部回复”\n\n使用**全部回复**选项与使用**回复**功能类似，不同之处在于邮件的所有原始收件人和原始发件人都会被填入地址行。原始发件人将在**收件人：**行，而原始邮件的所有其他收件人将列在**抄送：**行。只有在原始邮件的收件人不止一位时，您才会看到**全部回复**选项。\n\
    \n**注意：** 使用**全部回复**时请务必小心。如果某些收件人因超出屏幕边缘而未在原始邮件中显示，这可能会很危险。如果您使用了**全部回复**，请务必检查**收件人：**和**抄送：**列表，确保每个人都应该收到您的回复。\n\
    \n### 使用转发按钮\n\n有时，您会收到一封想要转发给他人的电子邮件。**转发**命令允许您这样做（有关处理附件的更多信息，请参阅本章中的“电子邮件附件”部分）。\n\
    \n**注意：** 您需要转发附件才能将其发送给他人。如果您想将收到的邮件中的附件发送给其他人，您必须选择**转发**选项。（请注意，选择**回复**和**全部回复**选项不会在您发出的邮件中包含原始电子邮件附件。）\n\
    \n当您轻点**转发**按钮时，可能会提示您决定是否**包含或不包含**原始邮件中的附件。\n\n此时，您按照之前描述的相同步骤来输入您的消息、添加收件人并发送它。\n"
- fmt: "### Cleaning up and Organizing Your Inbox\n\nAs you get more comfortable with\
    \ your iPod touch as an email device, you will increasingly find yourself using\
    \ the `Mail` program. It will eventually become necessary to occasionally do some\
    \ email housecleaning. You can delete or move email messages easily on your iPod\
    \ touch.\n\n#### Deleting a Single Message\n\nTo delete a single message from\
    \ your inbox, follow these steps:\n\n![Images](images/p335-01.jpg)\n\n1. Swipe\
    \ right or left on a message in the inbox to bring up the `Delete` button.\n2.\
    \ Tap `Delete` to remove the message.\n\n#### Deleting, Moving or Marking Several\
    \ Messages\n\nWe showed you earlier in this chapter how to get this done in the\
    \ “Move, Delete, or Mark (Flag) Multiple Messages” section.\n\n#### Deleting from\
    \ the Message Viewing Screen\n\nThe `Message` viewing screen includes another\
    \ way to delete messages. Open any message to read it and tap the `Trash Can`\
    \ icon ![Images](images/p336-01.jpg) in the middle of the bottom of the screen.\
    \ You will see the email shrink and fly into the `Trash Can`, so it can be deleted.\n\
    \n**TIP:** You can use the `Settings` app to make your iPod touch ask you before\
    \ deleting email. To do so, tap `Mail, Contacts, Calendars` and set the switch\
    \ next to `Ask Before Deleting` to `Yes`.\n\nYou can organize your mail by moving\
    \ it into other folders. Email messages can be moved out of your inbox for storage\
    \ or for reading at another time.\n\n**NOTE:** If you are using iCloud or another\
    \ supported email server, you can create, rename or delete mail folders right\
    \ on your device, see section “Adding or Editing Email Folders or Mailboxes” earlier\
    \ in this chapter. If this does not work for you, then, you need to set them up\
    \ in your main email account and sync them to your iPod touch. We will show you\
    \ how to do this in this chapter’s “Fine Tune Your E-Mail Settings” section.\n\
    \n#### Moving an Email to a Folder While Viewing It\n\nSometimes, you may want\
    \ to organize your email for easy retrieval later. For example, you might receive\
    \ an email about an upcoming trip and want to move it to the Travel folder. Sometimes\
    \ you receive emails that require attention later, in which case you can move\
    \ them to the Requires Attention folder. This can help you remember to work on\
    \ such emails later.\n\nFollow these steps to move an email message:\n\n![Images](images/p337-01.jpg)\n\
    \n1. Open the email message.\n2. Tap the `Move` icon in the upper-right corner.\n\
    3. Choose a new folder, and the message will be moved out of the current inbox.\n\
    \n### Copy and Paste from an Email\n\nHere are a few tips to select text or pictures\
    \ and copy them from an email message:\n\n- Double-tap text to select a word,\
    \ then drag the blue handles up or down to adjust the selection. Next, select\
    \ `Copy`.\n\n  ![Images](images/p337-02.jpg)\n\n- Press and hold text, and then\
    \ choose `Select` or `Select All`.\n\n  ![Images](images/p337-03.jpg)\n\n- Press\
    \ and hold an image, and then select `Save Image` or `Copy`.\n\n  ![Images](images/p338-01.jpg)\n\
    \nFor a more complete description, please check out the “Copy and Paste” section\
    \ in [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search.”\n\n### Searching\
    \ for Email Messages\n\nThe iPod touch has some good built-in search functionality\
    \ to help you find your emails. You can search your inbox by the `From:`, `To:`,\
    \ `Subject`, or `All` fields. This helps you filter your inbox, so you can find\
    \ exactly what you are searching for.\n\n#### Activating Email Search\n\nIt’s\
    \ easy to initiate an email search. Begin by navigating to the `inbox` of the\
    \ account you wish to search. If you scroll up to the top, you will now see the\
    \ familiar `Search` bar at the top of your `inbox`.\n\nIf your email account supports\
    \ the feature, you can also search the server for email messages. At the time\
    \ of writing, a few of the supported types of searchable email accounts include\
    \ `Exchange`, iCloud (formerly called `MobileMe`), and `Gmail IMAP`. Follow these\
    \ steps to search through your email on a server:\n\n1. Tap the `Search` bar to\
    \ see a new menu of soft keys under the `Search` bar.\n\n   ![Images](images/p339-01.jpg)\n\
    \n2. Type the text you wish to search for.\n3. Tap one of the tabs under the Search\
    \ window:\n   1. `From`: Searches only the sender’s email addresses.\n   2. `To`:\
    \ Searches only the recipients’ email addresses.\n   3. `Subject`: Searches only\
    \ message `Subject` fields.\n   4. `All`: Searches every part of the message.\n\
    \nFor example, assume that we want to search an inbox for an email from “Martin.”\
    \ We would type Martin’s name into the `Search` box and then touch `From`. The\
    \ inbox would then be filtered to show only the emails from Martin.\n\n### Fine\
    \ Tuning Your Email Settings\n\nYou can fine-tune the email accounts on your iPod\
    \ touch with the myriad options available in the `Settings` app. Follow these\
    \ steps to change these settings: tap the `Settings` icon, then tap `Mail, Contacts,\
    \ Calendars`. The sections that follow explain the adjustments you can make.\n\
    \n#### Automatically Retrieve Email (Fetch New Data)\n\nIn addition to the options\
    \ under `Advanced`, you can use the `Email` settings to configure how often your\
    \ email is fetched or pulled to your iPod touch. By default, your iPod touch automatically\
    \ receives mail or other contact or calendar updates when they are “pushed” from\
    \ the server.\n\nYou can adjust this setting by taking the following steps:\n\n\
    1. Tap the `Settings` app.\n2. Tap `Mail, Contacts, Calendars`.\n3. Tap `Fetch\
    \ New Data` under the email accounts listed.\n\n   ![Images](images/p340-01.jpg)\n\
    \n4. Set `Push` to `ON` (default) to automatically have the server push data.\
    \ Set it to `OFF` to conserve your battery life.\n\n   ![Images](images/p340-02.jpg)\n\
    \n5. Adjust the timing schedule to pull data from the server. This is how frequently\
    \ applications should pull new data from the server.\n\n   **NOTE:** If you set\
    \ this option to `Every 15 Minutes`, you will receive more frequent updates; however,\
    \ this option sacrifices battery life compared to a setting of `Hourly` or `Manually`.\n\
    \nHaving automatic retrieval is very handy if you just want to turn on your iPod\
    \ touch and see that you have messages; otherwise, you need to remember to check.\n\
    \n##### Advanced Push Options\n\nAt the bottom of the `Fetch New Data` screen,\
    \ below the `Hourly` and `Manually` settings, you can touch the `Advanced` button\
    \ to see a new screen with all your email accounts listed.\n\nTap any email account\
    \ to adjust its settings.\n\n![Images](images/p341-01.jpg)\n\nMost accounts can\
    \ be `Fetched` on the schedule you set or set to `Manual`. The `Manual` option\
    \ requires that you retrieve data using the `Update` button. This screen gives\
    \ you the ability to adjust `Fetch`, `Manual`, or even `Push` settings for each\
    \ account you have set up.\n\n![Images](images/p341-02.jpg)"
