  trans: "\n# 调整你的邮件设置\n\n在**帐户**部分下，你可以看到**邮件**中列出的所有电子邮件设置。**默认**设置可能对你来说已经足够；但如果需要调整其中任何一项，可以按照以下步骤操作：\n\
    \n**显示**：这用于设置从服务器拉取多少封邮件。你可以指定 50 到 1,000 条消息之间的任意数量（默认为最近的 50 条消息）。\n\n**预览**：此选项让你设置在收件箱**预览**中，除了**主题**之外，还显示多少行文本。你可以将此值从**无**调整为**5\
    \ 行**（默认为**2 行**）。\n\n![图片](img/p341-03.jpg)\n\n**最小字体大小**：这是首次打开邮件时显示的默认字体大小。它也是你查看邮件时允许缩小的最小字体大小。可选选项为**小**、**中**、**大**、**特大**和**巨大**（默认为**中**）。\n\
    \n**提示：** 你可以在设置的“辅助功能”区域中进一步扩大字体大小。详情请查看第 2 章：“打字、复制与搜索”。\n\n**显示“收件人”/“抄送”标签**：当此选项**开启**时，你会在收件箱的主题前看到一个小小的**收件人**或**抄送**标签。该标签显示你的地址被放置在了哪个字段中（此选项的默认状态为**关闭**）。\n\
    \n**删除前询问**：将此选项**开启**后，每次尝试删除邮件时都会进行询问（默认为**关闭**）。\n\n![图片](img/p342-01.jpg)\n\
    \n**加载远程图像**：此选项允许你的 iPod touch 加载某些邮件中嵌入的所有图形（远程图像）（此选项的默认值为**开启**）。\n\n![图片](img/p342-02.jpg)\n\
    \n**按主题整理**：此选项将相关的邮件分组在一起。它只显示一条消息，旁边带有一个数字。该数字表示存在多少封相关邮件。此功能让你可以很好地将所有讨论集中在一个地方（此选项的默认值为**开启**）。\n\
    \n![图片](img/p342-03.jpg)\n\n**始终密送给自己**：此选项会将你从 iPod touch 发送的每封电子邮件以密送副本（**Bcc:**）的形式发送到你的电子邮件帐户（此选项的默认值为**关闭**）。\n\
    \n![图片](img/p342-04.jpg)\n\n## 更改你的电子邮件签名\n\n默认情况下，你发送的邮件会显示“发自我的 iPod touch”。请按照以下步骤更改邮件的**签名**行：\n\
    \n![图片](img/p343-01.jpg)\n\n1.  点击**签名**选项卡，然后输入你希望在从 iPod touch 发出的邮件底部显示的新邮件签名。\n\
    \n    ![图片](img/p343-02.jpg)\n\n2.  编辑完**签名**字段后，点击左上角的**邮件、通讯录…**按钮。这将返回到**邮件**设置屏幕。\n\
    \n## 更改你的默认发件帐户\n\n如果你在 iPod touch 上设置了多个电子邮件帐户，应将其中的一个（通常是你最常用的那个）设置为**默认帐户**。当你从**邮件**屏幕选择**写新邮件**时，总是会默认选中该帐户。请按照以下步骤更改默认发送邮件的帐户：\n\
    \n![图片](img/p343-03.jpg)\n\n1.  点击**默认帐户**选项，你将看到所有电子邮件帐户的列表。\n\n    ![图片](img/p343-04.jpg)\n\
    \n2.  点击你希望用作**默认帐户**的电子邮件帐户。\n3.  完成后，点击**邮件、通讯录…**按钮返回到**邮件**设置菜单。\n\n## 开关收发邮件的提示音\n\
    \n你可能每次发送或接收邮件时都会注意到一点音效。你听到的是 iPod touch 上的默认设置。\n\n如果你想禁用它或更改它，可以在**设置**程序中执行此操作：\n\
    \n![图片](img/p344-01.jpg)\n\n1.  点击你的**设置**图标。\n2.  点击**声音**。\n3.  你将看到各种用于打开或关闭音效的开关。点击**新邮件**和**已发送邮件**来选择你的邮件铃声选项。\n\
    \n# 高级邮件选项\n\n**注意：** 设置为 Exchange、IMAP 或 iCloud 的电子邮件帐户不会显示此**高级**邮件设置屏幕。这仅适用于\
    \ POP3 电子邮件帐户。\n\n![图片](img/p344-02.jpg)\n\n要访问每个电子邮件帐户的**高级**选项，请按照以下步骤操作：\n\n\
    1.  点击**设置**图标。\n2.  点击**邮件、通讯录、日历**。\n3.  点击**帐户**下列出的一个电子邮件地址。\n4.  在邮件设置弹出窗口的底部，点击**高级**按钮以调出**高级**对话框。\n\
    \n    ![图片](img/p345-01.jpg)\n\n## 删除后从 iPod touch 上移除邮件\n\n你可以选择邮件被删除后，从你的 iPod\
    \ touch 上完全移除的频率。\n\n点击**移除**选项卡，选择最适合你的选项；默认设置为**永不**。\n\n![图片](img/p345-02.jpg)\n\
    \n## 使用 SSL 和身份验证\n\nSSL 和身份验证功能之前已经讨论过；不过，此屏幕为你提供了另一个位置，以便针对特定电子邮件帐户访问这些功能。\n\
    \n## 从服务器删除\n\n你可以配置 iPod touch 来处理从邮件服务器删除邮件的操作。通常，此设置保留为**永不**，此功能由你的主计算机处理。但是，如果你将\
    \ iPod touch 用作主要的电子邮件设备，则可能希望直接从 iPod touch 上处理该功能。请按照以下步骤从你的 iPod touch 上删除服务器上的已删除邮件。\n\
    \n1.  点击**从服务器删除**选项卡，选择最适合你需求的功能：**永不**、**七天后**或**从收件箱移除时**。\n\n    ![图片](img/p346-01.jpg)\n\
    \n2.  默认设置为**永不**。如果你想选择**七天后**；该选项应能给你足够的时间在电脑以及 iPod touch 上检查邮件，然后决定保留什么和删除什么。\n\
    \n## 更改接收服务器端口\n\n正如你之前对**发送服务器端口**所做的操作一样，如果你在接收邮件时遇到问题，可以更改**接收服务器端口**。你的问题与接收邮件的端口相关的情况非常罕见；因此，你很少需要更改此数字。如果你的电子邮件服务提供商给了你一个不同的号码，只需点击数字并输入新的端口。**接收服务器端口**的值通常是**995**、**993**或**110**；不过，端口值也可能是其他数字。\n\
    \n# 解决电子邮件问题\n\n通常，你的电子邮件在 iPod touch 上能完美运行。然而，有时你的电子邮件可能不像你期望的那样完美无缺。这可能是由于服务器问题、网络连接问题或电子邮件服务提供商的要求未得到满足造成的。\n\
    \n大多数情况下，只需要调整一个简单的设置或重新输入密码即可。\n\n如果你尝试了下面的一些故障排除提示，但您的电子邮件仍然无法正常工作，那么你的邮件服务器可能只是暂时宕机。请与你的电子邮件服务提供商核实，确保你的邮件服务器已启动并运行；你也可以检查你的提供商是否进行了任何会影响你设置的最新更改。\n\
    \n**提示：** 如果以下提示无法解决问题，请查看第 25 章：“故障排除”以获取更多有用的提示和资源。\n"
- fmt: '# E-Mail Isn’t Being Received or Sent


    If you can’t send or receive email, your first step should be to verify that you
    are connected to the Internet. Check this by looking at your network connectivity
    symbols in the upper-left corner of your `Home` screen (see [Chapter 4](#Chapter04.html#ch4):
    “Connect to the Network” for details).


    Sometimes, you need to adjust the outgoing port for email to be sent properly.
    Do so by following these steps:


    1. Tap `Settings`.

    2. Touch `Mail, Contacts and Calendars`.

    3. Touch your email account that is having trouble sending messages under `Accounts`.

    4. Touch `SMTP` and verify that your outgoing mail server is set correctly; also
    check that it is set to `ON`.

    5. Touch `Outgoing Mail Server` at the top and verify all the settings, such as
    `Host Name`, `User Name`, `Password`, `SSL`, `Authentication`, and `Server Port`.
    You might also try `587`, `995`, or `110` for the `Server Port` value; sometimes
    that helps.

    6. Click `Done` and the email account name in the upper-left corner to return
    to the `Email` settings screen for this account.

    7. Scroll down to the bottom and touch `Advanced`.

    8. You can also try a different port setting for the server port on this screen,
    such as `587`, `995`, or `110`. If those values don’t work, contact your email
    service provider to get a different port number and verify your settings.


    # Chapter 17


    # Contacts and Notes


    Your iPod touch gives you immediate access to all your important information.
    Just like your computer, your iPod touch can store thousands of contacts for easy
    retrieval. In this chapter, we’ll show you how to add new contact, customize your
    contacts by adding new fields, organize your contacts with groups, quickly search
    or scroll through contacts, and even see a contact’s location with the iPod touch’s
    `Maps` app. We will also show you how to customize the `Contacts` view so it is
    sorted and displayed just the way you like it. Finally, we will cover a few troubleshooting
    tips that will save you some time when you run into difficulties.


    We will also give you an overview of the `Notes` app, which you can use to write
    notes, make grocery lists, and make lists of movies you’d like to watch or books
    you’d like to read. We will show you how to organize and email notes to yourself
    or others. Ideally, we hope that `Notes` will become so easy on the iPod touch
    that you can eventually get rid of most, if not all, of your paper sticky notes!


    What is also great is that you can use iCloud to wirelessly synchronize, share
    and back up your contacts and notes. So you never have to worry about losing your
    important information or whether or not you have the latest information on your
    device or computer.


    ### Loading Your Contacts onto the iPod touch


    [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes and More” covered
    how to load your contacts onto the iPod touch using the `iTunes` app on your Mac
    or Windows computer. You can also load contacts onto your iPod touch using the
    Google Sync or iCloud services.


    **TIP:** You can add new contact entries from email messages you receive. Learn
    how in [Chapter 16](#Chapter16.html#ch16): “Communicate with Email.”


    ### When Is Your Contact List Most Useful?


    The `Contacts` app is most useful when two things are true:


    1. You have many names and addresses in it.

    2. You can easily find what you need.


    #### Improving Your Contact List


    We have a couple of basic rules that can help you make your contact list on your
    iPod touch more useful:


    **Rule 1: Add anything and everything to your contacts.**


    > You never know when you might need that obscure restaurant name, plumber’s number,
    and so on.


    **Rule 2: As you add entries, make sure you think about how to find them in the
    future (first name, last name, company).**


    > We have many tips and tricks in this chapter to help you enter names, so you
    can find them instantly when you need them.


    **TIP:** Here’s a good way to find restaurants. Whenever you enter a restaurant
    into your contacts list, make sure to put the word “restaurant” into the company
    name field, even if it’s not part of the name. When you type the letters “rest,”
    then you should instantly find all your restaurants!


    ### Adding a New Contact on Your iPod touch


    You can always add your contacts right on your iPod touch. This is handy when
    you’re away from your computer—but have your iPod touch—and need to add someone
    to your contacts. It’s very easy to do; the next section will show you how.


    ![Images](images/p350-01.jpg)


    #### Start the Contacts App


    From your `Home` screen, touch the `Contacts` icon and you’ll see the `All Contacts`
    list. Tap the `Plus Sign` button (`+`) in the upper-right corner to add a new
    contact, as shown in [Figure 17–1](#Chapter17.html#fig_17_1).


    ![images](images/1701.jpg)


    **Figure 17-1.** *Entering a new contact name*


    Tap each field to enter the new contact’s first name, last name and Company name.


    **TIP:** Keep in mind that the contacts search feature uses first, last, and company
    names. When you add or edit contacts, adding a special word to the company name
    can help you find a particular contact later. For example, adding the words “Cece
    friend” to the `Company` field can help you find all of Cece’s friends quickly
    using the search feature.


    Under the `First Last` button are fields for `mobile phone`, `email`, `ringtone`,
    `text tone`, `home page`, `add new address` and `add field`. Under that, you can
    Link contacts together.


    #### Adding a New Phone Number


    ![Images](images/p352-01.jpg)


    Tap the `Phone` button and use the `Numbers` keyboard to input the phone number.


    **TIP:** Don’t worry about parentheses, dashes, or dots—the iPod touch will put
    the number into the correct format. Just type the digits of the area code and
    number. If you know the country code, it’s a good idea to put that in, as well.


    ![Images](images/p352-02.jpg)


    Next, choose which type of phone number this is—mobile, home, work, or other.
    There are nine fields you can choose from, and there’s also a `Custom` field if
    you find none of the built-in fields apply.


    ![Images](images/p352-03.jpg)


    #### Adding Email Addresses


    ![Images](images/p353-01.jpg)


    Touch the `Email` tab and enter the email address for your contact. You can also
    touch the tab to the left of the email address and select whether this is a home,
    work, or other email address.


    After you add one address, you will see another field appear to add more email
    addresses.


    #### Custom Ringtone or Text Tone


    ![Images](images/p353-02.jpg)


    Touch the `ringtone` or `text tone` tabs to select a custom ringtone (for `FaceTime`)
    or text tone (for `iMessage`) when this person calls or sends you a text message.


    #### Entering Web Site Addresses


    ![Images](images/p353-03.jpg)


    You will also see a `home page` field in which you can enter the address of your
    contact’s web site or even multiple web sites.


    **NOTE:** If you used iCloud to sync your contacts, iCloud may automatically look
    for a Facebook homepage to integrate into the contact info.


    ![Images](images/p353-04.jpg)


    #### Adding the Street Address


    ![Images](images/p354-01.jpg)


    Below the `home` field are the fields for adding the address. Input the `Street`,
    `City`, `State`, and `ZipCode`. You can also specify the `Country` and whether
    this is a home or work address.


    ![Images](images/p354-02.jpg)'
