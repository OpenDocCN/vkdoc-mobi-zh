- fmt: '# Quick Start Guide


    In your hands, the `iPod touch`, with its newly enhanced operating system `iOS
    5` is one of the most exciting devices to hit the market in quite some time. This
    Quick Start Guide will help get you and your new `iPod touch` up and running in
    a hurry. You''ll learn all about the buttons, switches, and ports, and how to
    use the responsive touch screen, multitask with the `Fast App Switcher` bar. Our
    App Reference Tables introduce you to the apps on your `iPod touch`—and serves
    as a quick way to find out how to accomplish a task.


    ## Getting Around Quickly


    This Quick Start Guide is meant to be just that—a tool that can help you jump
    right in and find information in this book, as well as learn the basics of how
    to get around and enjoy your `iPod touch` right away.


    We''ll start with the nuts and bolts in our "Learning Your Way Around" section,
    which covers what all the keys, buttons, switches, and symbols mean and do on
    your `iPod touch`. In this section, you''ll see some handy features such as multitasking
    by double-clicking the `Home` button. You''ll also learn how to interact with
    the menus, submenus, and set switches—tasks that are required in almost every
    application on your `iPod touch`. You''ll also find out how to read your connectivity
    status and what to do when you travel on an airplane.


    **TIP:** Check out [Chapter 2](#Chapter02.html#ch2): "Typing, Copy, and Search"
    for great typing tips and more.


    In the "Touch Screen Basics" section, we will help you learn how to touch, swipe,
    flick, zoom, and more.


    Later, in the "App Reference Tables," section, we''ve organized the app icons
    into general categories, so you can quickly browse through the icons and jump
    to a section in the book to learn more about the app a particular icon represents.
    This guide also includes several handy tables designed to help you get up and
    running with your `iPod touch` quickly:


    *   Get Started ([Table 2](#Part01.html#tab_p1_2))

    *   Stay Organized ([Table 3](#Part01.html#tab_p1_3))

    *   Be Entertained ([Table 4](#Part01.html#tab_p1_4))

    *   Stay Informed ([Table 5](#Part01.html#tab_p1_5))

    *   Network Socially ([Table 6](#Part01.html#tab_p1_6))

    *   Be Productive ([Table 7](#Part01.html#tab_p1_7))


    Let''s get started!


    ### Learning Your Way Around


    To help you get comfortable with your `iPod touch`, we will start with the basics—what
    the buttons, keys, and switches do—and then move onto how you start apps and navigate
    the menus. Probably the most important status indicator on your `iPod touch`,
    besides the battery, is the one that shows network status in the upper-left corner.
    Understanding what these status icons do is crucial to getting the most out of
    your `iPod touch`.


    #### Keys, Buttons, and Switches


    [Figure 1](#Part01.html#fig_p1_1) shows all the things you can do with the buttons,
    keys, switches, and ports on your `iPod touch`. Go ahead and try out a few things
    to see what happens. Swipe left to search, swipe right to see more icons, try
    double-clicking the `Home` button to bring up the multitasking `FastApp Switcher`
    bar, and then press and hold the `Power/Sleep` key to power your device on or
    off. Have some fun getting acquainted with your device.


    ![images](images/p1-f1.jpg)


    **Figure 1.** *The iPod touch''s buttons, ports, switches, and keys*


    #### Switching Apps (AKA Multitasking)


    One of the nice features on your `iPod touch` is the ability to multitask or jump
    between applications (see [Figure 2](#Part01.html#fig_p1_2)).


    Double-click the `Home` button to bring up the `FastApp Switcher` bar in the bottom
    of the screen. Next, swipe right to see more icons and tap any icon of any app
    you want to start. If you don''t see the icon you want, then single-click the
    `Home` button to see the entire `Home` screen. Repeat these steps to jump back
    to the app you just left. The nice thing is that the app you just jumped from
    is always shown as the first app on the `FastApp Switcher` bar.


    ![images](images/p1-f2.jpg)


    **Figure 2.** *Multitask (switch apps) by double-clicking the `Home` button.*


    #### Music Controls and Portrait Screen Rotation Lock


    You will see a few more icons if you swipe from left to right in the `Fast App
    Switcher` bar. You can lock the screen rotation by tapping the leftmost icon,
    and the middle buttons control the currently playing music or video. The last
    icon on the right will start your `Music` app (see [Figure 3](#Part01.html#fig_p1_3)).


    ![images](images/p1-f3.jpg)


    **Figure 3.** *The `Screen Rotation Lock` button, `Music` app controls, and `Music`
    icon in the `FastApp Switcher` bar*


    #### Starting Apps and Using Soft Keys


    Some apps have soft keys at the bottom of the screen, such as the `Music` app
    shown in [Figure 4](#Part01.html#fig_p1_4).


    To see and use the soft keys in the `Music` app, you must have some content (e.g.,
    music, videos, and podcasts) on your `iPod touch`. See [Chapter 3](#Chapter03.html#ch3):
    "Sync with iCloud. iTunes and More" for help with syncing your music, videos,
    and more to your `iPod touch`. Follow these steps to launch the `Music` app and
    become familiar with using the soft keys to get around:


    1.  Tap the `Music` icon to start the `Music` app.

    2.  Touch the `Songs` soft key at the bottom to view your albums.

    3.  Touch the `Playlists` soft key to view a list of your artists.

    4.  Try all the soft keys in `Music`.

    5.  In some apps, such as the `Music` app, you will see the `More` soft key in
    the lower-right corner. Tap this key to see additional soft keys or even rearrange
    your soft keys.


    **TIP:** You know which soft key is selected because it is highlighted—usually
    with a color. The other soft keys are gray, but can still be touched.


    ![images](images/p1-f4.jpg)


    **Figure 4.** *Working with soft keys in apps*


    #### Menus, Submenus, and Switches


    Once you are in an app, you can select any menu item by simply touching it. Using
    the `Settings` app as an example, tap `Sounds`, and then tap `Ringtone`, as shown
    in [Figure 5](#Part01.html#fig_p1_5).


    Submenus are any menus below the main menu.


    **TIP:** You know there is a submenu or another screen if you see the `Greater
    Than` symbol next to the menu item (`>`).


    How do you get back to the previous screen or menu? Tap the button in the top
    of the menu. If you''re in the `Ringtone` screen, for example, you simply touch
    the `Sounds` button.


    You''ll see a number of switches on the `iPod touch`, such as the one next to
    `Airplane Mode` shown in [Figure 5](#Part01.html#fig_p1_5). To set a switch (e.g.,
    change the switch from `OFF` to `ON`), just touch it or slide it.


    ![images](images/p1-f5.jpg)


    **Figure 5.** *Selecting menu items, navigating submenus, and setting switches*


    #### Reading the Connectivity Status Icons


    Most of the functions on your `iPod touch` work only when you are connected to
    the Internet (e.g., `Mail`, your `Safari` browser, the `App Store`, and the `iTunes`
    app), so you need to know when you''re connected. Understanding how to read the
    status bar can save you time and frustration:


    **Wi-Fi Network Signal Strength (1-3 symbols):**


    ![image](images/p08-01.jpg)


    You can tell whether you are connected to a network, as well as the general speed
    of the connection, by looking at the left end of your `iPod touch`''s `Top` status
    bar. [Table 1](#Part01.html#tab_p1_1) shows typical examples of what you might
    see on this status bar.


    ![image](images/p1-t1.jpg)


    [Chapter 4](#Chapter04.html#ch4): "Connect to the Network" shows you how to connect
    your `iPod touch` to a Wi-Fi Network.'
