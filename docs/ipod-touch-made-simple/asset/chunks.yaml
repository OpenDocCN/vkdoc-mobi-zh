- fmt: '### Buying and Subscribing to Periodicals


    The newspaper and magazine apps in `Newsstand` are typically free; however, they
    also typically come with very little or even no content built in. To get the content,
    you need to either buy individual issues or subscribe to a number of issues.


    Buying issues is handled like any other in-app purchase. Typically, you''ll be
    shown a list of recent issues with the cover art on the left and a content blurb
    on the right, along with the price of the issue. Tap the price and you''ll be
    asked for your iTunes password to confirm the purchase. Once you confirm a purchase,
    your issue will begin to download.


    ![images](images/p260-01.jpg)


    Subscribing to newspapers and magazines is handled like a special in-app purchase
    that lasts for a specified period of time. For example, you can often purchase
    a year''s worth of newspapers for a set price. Some newspapers and magazines offer
    different subscription length options, such as three years, six months, and so
    on. Some also offer bundles that include both the print and digital editions.
    Make sure you read your options carefully and figure out which one provides you
    with the greatest value.


    You might wonder what you do if you''ve bought a subscription or an individual
    issue, and you need to re-install the app that displays the content. If that happens,
    you can simply re-install the app and then restore your subscription or re-download
    any individual issues you''ve previously purchased. In other words, the process
    of restoring content in `Newsstand` apps is identical to that of restoring content
    for any other in-app purchase.


    ![images](images/p261-01.jpg)


    ### Newspapers


    Remember the days when newspapers were delivered to the house? Invariably, if
    there was one puddle in the sidewalk, that was where the newspaper landed! You
    took it out of that plastic bag, shook it off, and tried to make out what was
    in the section that got soaked.


    Well, those days may be gone forever. You now have the opportunity to interact
    with the news and even get your paper delivered every day—but to your iPod touch
    instead of your driveway.


    Many newspapers and news sites are developing apps for the iPod touch, with new
    apps seeming to appear every day. Some of these apps provide a level of free content,
    but require you to create an account or subscribe to get more. Others apps provide
    content only with a subscription.


    **NOTE:** If you already subscribe to the print edition of your local newspaper,
    it might provide you with discounted or even free access to its iPod touch app.
    Be sure to read any registration or subscription offers carefully to see if you
    qualify.


    Many newspapers also have dedicated web sites. Some are optimized for the iPod
    touch and `Safari`, while others offer a full web experience. Some require registration
    or a paid subscription to view the paper''s full content.


    Let''s take a quick look at *The New York Times*, one of largest newspapers in
    the U.S., and see how that paper has revolutionized reading the news on the iPod
    touch.


    #### The New York Times app


    *The New York Times* provides various apps, both free and paid, to bring you the
    news on the iPod touch.


    *The New York Times* offers a slimmed-down version of the paper in its free iPod
    touch app.


    There are four soft keys at the bottom of the page: `Top News`, `Most E-Mailed`,
    `Favorites` and `Sections`. Each section carries a sampling of stories from those
    sections in the current day''s paper.


    Touching `Sections` shows you tabs for all sections of the *New York Times*.


    ![images](images/p262-01.jpg)


    Navigating **The New York Times** app is as simple as touching an article and
    scrolling through the story. While reading a story, just touch the center of the
    screen and the soft keys on the top and bottom will appear.


    To go back to the `Home` page, touch the `Latest News` button in the upper left-hand
    corner.


    **NOTE:** If you were in another section—say *Technology*—the button in the upper-left
    corner would say `Technology`. ![images](images/p262-02.jpg)


    To email an article, just touch the `Share` icon in the lower-left corner. This
    button is only available when you are inside an article, not on the `Home` page.


    Touch the icon and you can send the article via email, copy the link, or Twitter.


    #### Moving Through and Enjoying Content


    After you play for a while with different newspaper apps, you''ll begin to realize
    that there is no real standard for navigating newspaper content. This means you''ll
    need to become familiar with each app''s own way of navigating articles, as well
    as how to return to the main screen. Here''s a short guide for generally navigating
    these types of apps:


    - **Showing or Hiding Control buttons or Captions:** Tapping the screen once usually
    shows hidden controls or picture captions. You can tap the screen again to re-hide
    these elements.

    - **Getting to the Details of an Article:** Usually, you scroll through the articles,
    just as you would on a web page.

    - **Viewing a Video:** Typically, you just tap a video to start playing it. See
    [Chapter 14](#Chapter14.html#ch14): "Viewing Videos" to learn how to navigate
    videos on the iPod touch.

    - **Expanding a Video or Image Size:** You can try pinching open in the video
    or image and then double-tapping it. You can also look for an `Expand` button
    or try rotating to Landscape mode.

    - **Reducing a Video or Image Size:** You can try pinching closed inside the video
    or image to reduce the size of a video. You can also look for a `Close` or `Minimize`
    button or try rotating back to Portrait mode.

    - **Sharing an Article:** Sending an article link via email—or sharing it over
    a social network like Twitter, Facebook, or LinkedIn—is a common feature. Look
    for an `Action` or `Share` button.

    - **Adjusting Font Sizes:** Many newspaper apps have a button or settings option
    for increasing or decreasing the default font size to make the content easier
    to read.


    ### Magazines


    It is no secret that both newspapers and magazines have suffered declines in readership
    over the last few years. The iPod touch offers a totally new way of reading magazines
    that might just give the industry the boost it needs.


    Pictures are incredibly clear and brilliant in magazines on the iPod touch. Navigation
    is usually easy, and stories seem to come to life, much more so than in their
    print counterparts. Add video and sound integration right into the magazine, and
    you can see how the iPod touch truly enhances the magazine reading experience.


    Some magazines, such as *TIME Magazine*, include links to live or frequently updated
    content. These links might be called *Newsfeeds*, *Live Editions*, or *Updates*.
    Check for them in any magazine you purchase—these links will help you access the
    most up-to-date information.


    **TIP:** Make sure to check the user ratings for a magazine or other app before
    you purchase it. Doing so may save you some money or grief!


    The App Store has a couple different kinds of magazine apps. First, you can find
    apps that let you purchase individual magazines or view limited content from a
    given magazine for free. Second, you can find magazine readers that provide samples
    of many magazines; these allow you to subscribe to weekly or monthly delivery
    of a given magazine.


    If you browse in the `App Store` by `Categories` ![images](images/U001.jpg) `Newsstand`,
    then tap Top Free at the top, you can check out all the free magazines and newspapers.


    ![images](images/p264-01.jpg)'
