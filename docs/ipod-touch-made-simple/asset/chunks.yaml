  trans: "\n# 在打开的网页间前进或后退\n\n现在你已经知道如何输入网址，很可能会在不同网站间跳转。屏幕底部的**前进**和**后退**箭头 ![images](img/p288-02.jpg)\
    \ 能让你非常轻松地按任意方向访问最近浏览过的页面。如果**后退**箭头呈灰色，本章的“使用打开页面按钮”部分可帮助你找出原因。\n\n假设你正在《纽约时报》网站上看新闻，然后跳转到\
    \ ESPN 查看体育比分。要返回《纽约时报》页面，只需点击**后退**箭头。要再次回到 ESPN 网站，点击**前进**箭头即可。\n\n# 使用打开页面按钮\n\
    \n有时，当你点击链接时，你正在查看的网页会移至后台，并弹出一个包含新内容的新窗口（例如另一个网页或视频）。你会看到原网页移至后台，并打开一个新页面。在这种情况下，新浏览器窗口中的**后退**箭头将无法使用。\n\
    \n相反，你必须点击右下角的**打开页面**图标 ![images](img/p289-01.jpg) 来查看已打开网页的列表，然后点击你想要的那个。在所示的示例中，我们点击了一个链接，该链接打开了一个新的浏览器窗口。回到旧窗口的唯一方法是点击**打开页面**图标并选择所需的页面。\n\
    \n![images](img/p289-02.jpg)\n\n# 在网页中缩放\n\n在 iPod touch 上放大和缩小网页非常容易。缩放主要有两种方式——双击和双指捏合。\n\
    \n## 双击\n\n如果你在网页的某一列上轻点两下，页面将放大到该特定列。这让你能够精准定位到网页上的正确位置，对于未针对移动屏幕格式化的页面来说非常有用。\n\
    \n要缩小，只需再双击一次（你可以在本书开头的“快速入门指南”中看到效果）。\n\n## 双指捏合\n\n这项技术可以让你放大页面的特定部分。虽然需要稍加练习，但很快就会变得得心应手。请查看“快速入门指南”以了解效果。\n\
    \n将拇指和食指并拢放在你想要放大的网页部分。然后慢慢向外张开，分开手指。你会看到网页放大。网页聚焦需要几秒钟，但很快就会放大并变得非常清晰。\n\n要缩小回原来的大小，只需将手指分开，然后慢慢合拢；页面将缩放至原始尺寸。\n\
    \n# 从网页激活链接\n\n当你在网上冲浪时，经常会遇到将你带到其他网站的链接。由于 **Safari** 是一个全功能浏览器，你只需触摸链接即可跳转到新页面。\n\
    \n## 处理 Safari 书签\n\n一旦你在 iPod touch 上开始浏览，你就会想快速访问你最喜欢的网站。一个很好的方法就是添加书签，以实现一键访问网站。\n\
    \n**提示：** 你可以使用 iCloud 通过无线方式或电脑上的 **iTunes** 应用，从电脑的网页浏览器（仅限 **Safari** 或 **Internet\
    \ Explorer**）同步你的书签。详情请查看第 3 章：“与 iCloud、iTunes 等同步”。\n\n### 添加新书签\n\n在 iPod touch\
    \ 上添加新书签只需轻点几下：\n\n1.  要为当前正在查看的网页添加新书签，请点击屏幕底部的**操作按钮** ![images](img/p290-01.jpg)。\n\
    2.  选择**添加书签**。\n\n    ![images](img/p290-02.jpg)\n\n3.  我们建议你将书签名称编辑为简短易识别的名称。\n\
    4.  如果你想要更改书签存储的文件夹，请点击**书签**。\n5.  完成后，点击**存储**按钮。\n\n![images](img/p291-01.jpg)\n\
    \n### 使用书签和历史记录\n\n一旦你设置了一些书签，就可以轻松查看和使用它们。在同一个区域，你还可以查看和使用你的网页浏览历史记录。iPod touch\
    \ 上一个非常有用的工具是能够像在电脑上一样从**历史记录**中浏览网页。按照以下步骤操作：\n\n1.  点击页面底部的**书签** ![images](img/p291-02.jpg)\
    \ 图标。\n2.  向上或向下滑动以查看你的所有书签。\n3.  点击任意书签即可跳转到该网页。\n\n    ![images](img/p291-03.jpg)\n\
    \n4.  点击**历史记录**文件夹，查看你最近访问过的网页历史记录。\n5.  请注意，在列表底部，你会看到**今天早些时候**和之前几天的附加文件夹。\n\
    6.  点击任意历史记录项即可转到该网页。\n\n![images](img/p292-01.jpg)\n\n**提示：** 要清除历史记录，请点击左下角的**清除**按钮。你也可以在**设置**应用中清除历史记录、Cookie\
    \ 和缓存。点击**设置**；点击 **Safari**；滚动到底部；然后点击**清除历史记录**、**清除 Cookie** 或**清除缓存**。\n\n\
    ### 管理你的书签\n\n因为设置书签非常容易，所以很容易积累大量书签。但是，你可能会发现不再需要某个特定书签，或者希望通过添加新文件夹来整理它们。\n\n\
    与 iPod touch 上的其他列表一样，你可以重新排列**书签**列表并删除条目。按照以下步骤操作：\n\n1.  像之前一样查看你的**书签**列表。\n\
    2.  点击左下角的**编辑**按钮。\n3.  要重新排列条目，请触摸并拖动带有三个灰色横条的右侧边缘，在列表中上下移动。在此示例中，我们将指向亚马逊网站上“iPad\
    \ Made Simple”书籍页面的书签拖动到顶部。\n4.  要为书签创建新文件夹，请点击右下角的**新建文件夹**按钮。\n\n    ![images](img/p293-01.jpg)\n\
    \n5.  要删除书签，请点击条目左侧的红色**圆形**图标，使其变为垂直状态。\n6.  点击**删除**按钮。\n7.  完成重新排列和删除条目后，点击左上角的**完成**按钮。\n\
    8.  要编辑书签名称、文件夹或网址，请点击书签名称本身。\n9.  现在你可以对名称、网址或文件夹进行任何调整。\n10. 要更改书签存储的文件夹，请点击网址下方的按钮。在此图片中，它显示的是**书签**；但在你的\
    \ iPod touch 上可能不同。此书签指向亚马逊网站上的“iPad Made Simple”页面。\n11. 完成后点击**完成**。\n\n![images](img/p294-01.jpg)\n"
- fmt: "### Reading List\n\n`Reading List` is a special type of bookmark that lets\
    \ you quickly save a web article, so you can read it later at your leisure. The\
    \ `Reading List` feature can sync via iCloud, so it's a great way to quickly mark\
    \ articles on `Safari` on your home or work Mac or Windows PC to read on your\
    \ iPod touch or iPad while traveling. You can also use this feature to save a\
    \ bookmark on your iPod touch to read more comfortably when you get back to your\
    \ iPad or PC.\n\nFollow these steps to use the `Reading List` feature:\n\n1. \
    \ Go to the article you want to save in `Safari`.\n2.  Tap the `Action` button\
    \ ![images](images/p294-02.jpg) at the bottom middle of the page.\n3.  Tap `Add\
    \ to Reading List`.![images](images/p294-03.jpg)\n\nFollow these steps to view\
    \ a `Reading List` article later:\n\n1.  Tap the `Bookmark` button ![images](images/p295-01.jpg)\
    \ at the bottom right of the page.\n2.  Tap the `Glasses` icon for the `Reading\
    \ List` option. (If you don't see the `Glasses` icon, you might be inside a `Bookmarks`\
    \ folder. Just tap the `Arrow` icon at the top left to back out of the folder\
    \ or folders you're in until the `Arrow` disappears, and you can see the `Glasses`\
    \ icon.)\n\n    ![images](images/p295-02.jpg)\n\n3.  To see everything in your\
    \ `Reading List`, tap the `All` tab at the top left. To see only the articles\
    \ you haven't read yet, tap the `Unread` tab at the top right.\n4.  Tap the article\
    \ you want to read.\n\n![images](images/p295-03.jpg)\n\nFinally, follow these\
    \ steps to delete an article from `Reading List`:\n\n1.  Swipe from left to right\
    \ across the article you'd like to remove from `Reading List`.\n\n    ![images](images/p295-02.jpg)\n\
    \n2.  Tap the red `Delete` button.\n\n### Safari Reader\n\n`Safari`'s `Reader`\
    \ feature allows you to enjoy an article on the web as a clean, clear page of\
    \ nicely sized text, without the distraction of busy layouts or ads.\n\n**NOTE:**\
    \ While Safari does an excellent job detecting most web page articles because\
    \ of the white variety of content and formatting, it might occasionally miss one.\
    \ If you don't see the `Reader` button, it means Safari couldn't detect the article.\n\
    \nFollow these steps to activate this feature:\n\n![images](images/p296-01.jpg)\n\
    \n1.  Go to the article you want to read.\n2.  Tap the `Reader` button on the\
    \ right side of the URL field, see [Figure 16-1.](#Chapter16.html#fig_16_1)\n\
    3.  Tap the `Font Size` button to make the type bigger or smaller.\n\n![images](images/p296-02.jpg)\n\
    \n![images](images/1501.jpg)\n\n**Figure 15-1.** *The same web page in standard\
    \ view (left image) and Reader View (right two images).*\n\n**TIP:** If you find\
    \ yourself wishing you could get the functionality of both `Reading List` and\
    \ `Reader`—along with other features like browser access, social sharing, and\
    \ more—then check out App Store apps like `Instapaper`.\n\n### Safari Browsing\
    \ Tips and Tricks\n\nNow that you know the basics of how to get around, we will\
    \ cover a few useful tips and tricks for making web browsing more enjoyable and\
    \ faster on your iPod touch.\n\n#### Jumping to the Top of the Web Page\n\nSometimes,\
    \ web pages can be quite long, which can make scrolling back to the top of the\
    \ page a bit laborious. One easy trick is to tap the gray title bar of the web\
    \ page; you'll automatically jump to the top of the page.\n\n#### Emailing or\
    \ Tweeting a Web Page\n\nSometimes while browsing, you find a page so compelling\
    \ you just have to share it with a friend or colleague. Tap the `Action` button\
    \ ![images](images/p297-01.jpg) in the middle of the bottom bar, and then select\
    \ `Mail Link to this Page` to create an email message with a link that you can\
    \ send. Select `Tweet` to create a new Twitter message with a link you can share,\
    \ as shown in [Figure 15-2](#Chapter15.html#fig_15_2).\n\n![images](images/1502.jpg)\n\
    \n**Figure 15-2.** *Using the Action button to do various functions with a Safari\
    \ web page.*\n\n#### Printing a Web Page\n\nWith the iPod touch, you can easily\
    \ print any web page you come across to any `AirPrint` compatible printer over\
    \ your local Wi-Fi network. Tap the `Action` button ![images](images/p297-02.jpg)\
    \ and then select `Print`.\n\n#### Watching Videos in Safari\n\nYou will often\
    \ see videos on web sites. And you will be able to play many—but not all—of these\
    \ videos. For example, videos formatted with `Adobe Flash` will not be playable\
    \ on your iPod touch (see our note at the beginning of this chapter).\n\nWhen\
    \ you tap the `Play` button, you will be taken out of `Safari` into the `iPod`\
    \ video player.\n\nYou can then turn your iPod touch on its side to view the video\
    \ in Landscape, or wide-screen, mode.\n\nTap the screen to bring up the player\
    \ controls if they have disappeared.\n\nWhen you are finished watching the video\
    \ and want to return to the web page, tap the `Done` button in the upper-left\
    \ corner.\n\n![images](images/p298-01.jpg)\n\n**TIP:** Check out the video player\
    \ tips and tricks in [Chapter 14](#Chapter14.html#ch14): “Viewing Videos.”\n\n\
    #### Saving or Copying Text and Graphics\n\nFrom time to time, you may see text\
    \ or a graphic you want to copy from a web site. We tell you briefly how to do\
    \ this in this section; however, to see how to get this done in more depth, including\
    \ how to use the `Cut` and `Paste` functions, please see the “Copy and Paste”\
    \ section in [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search.” Here's\
    \ a quick synopsis of how to copy text or a graphic from a web page:\n\n*   To\
    \ copy a single word, touch and hold the word until you see it highlighted and\
    \ the `Copy` button appears. Next, tap `Copy`.\n*   To copy a few words or entire\
    \ paragraph, touch and hold a word until it is highlighted. Next, drag the blue\
    \ dots left or right to select more text. You can flick up or down to select an\
    \ entire paragraph. Finally, tap `Copy`.\n\n    **TIP:** Selecting a single word\
    \ puts the copy feature in word-selection mode, where you can drag to increase\
    \ or decrease the number of words selected. If you go past a single paragraph,\
    \ it will typically switch to element-selection mode where, instead of corners,\
    \ you get edges that you can drag out to select multiple paragraphs, images, and\
    \ so on.\n\n*   To save or copy a graphic, touch and hold the picture or image\
    \ until you see the pop-up asking if you would like to save or copy the image."
