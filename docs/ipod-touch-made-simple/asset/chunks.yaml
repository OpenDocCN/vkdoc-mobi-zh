    If you do not like a Genius suggestion, then you can swipe left or right on it
    to bring up the **Delete** button, just as you would to remove email or other
    items from lists on your iPod touch. Tap the **Delete** button to remove that
    app from the list.


    ![images](images/p471-01.jpg)


    ##### Disable Genius Feature


    To disable the Genius feature, you need to go into your **App Store** settings
    (see the “App Store Settings” section later in this chapter to learn how to disable
    this feature).


    ![images](images/p471-02.jpg)


    #### Categories


    ![images](images/p471-03.jpg)


    Sometimes, all the choices presented can be a bit overwhelming. If you have a
    sense of what type of app you are looking for, touch the **Categories** button
    along the bottom row of soft keys (see Figure 23–4).


    The current categories available are shown in [Table 23-1](#Chapter22.html#tab_23_1).


    ![images](images/t2301.jpg)


    **NOTE:** The categories listed are fluid and change over time, so it is possible
    that the categories you see will have changed by the time this book finds its
    way into your hands.


    ![images](images/2204.jpg)


    **Figure 22–4.** *Viewing apps by category—**Games**, in this example*


    #### Looking at the Top 25 Charts


    ![images](images/p472-01.jpg)


    Touch the **Top Charts** soft key along the bottom row, and the App Store will
    change the view again. This time, you will see the top 25 paid, free, and top-grossing
    apps. Just touch one of the **Top Paid, Top Free**, or **Top Grossing** buttons
    at the top to switch between the views.


    **NOTE:** The **Top Grossing** category refers to the highest money-making apps,
    which is sales volume times selling price. This view will help more expensive
    apps get up higher in the charts. For example, a US $4.99 app that sells 10,000
    units will rank much higher on the **Top Grossing** chart than a US $0.99 app
    that sells the same number of units.


    ![images](images/p472-02.jpg)'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。



    #### App Store 首页


    我们将介绍 App Store **首页**的几个部分：顶部栏、中间内容和底部软按键。


    我们先来看顶部栏。如 图 22–2 所示的页面顶部，您会看到三个按钮：**新内容**、**热门**和 **Genius**。轻点其中任意一个按钮即可切换视图。


    **提示：** **Genius** 是一项基于您已在 iPod touch 上下载并安装的 App 来推荐您可能喜欢的 App 的功能。这是一种从成千上万个
    App 中筛选出您可能感兴趣的 App 的绝佳方式。


    页面中间是您的主内容区域。此主内容区域会显示 App 列表或您正在查看的特定 App 的详细信息。您可以向上或向下滑动以查看列表中的更多 App 或特定 App
    的详细信息。您还可以在查看屏幕截图时向左或向右滑动。在**精选** App 页面，您会注意到顶部有几个大型图标。点击这些图标将显示 App 类别或单个 App。在大型图标下方（您需要向下滑动），您会看到许多精选
    App。


    App Store **首页**底部有五个软按键：


    -   **精选**：显示由 App Store 或 App 开发者重点推荐的 App。

    -   **类别**：显示用于组织 App 的类别列表，以便您按类别浏览。

    -   **Top 25**：显示销量最高或下载量最多的 App。

    -   **搜索**：使用输入的搜索词查找 App。

    -   **更新**：允许您更新已安装的任何 App，并重新下载您已获取的任何 App。


    您可以通过 图 22–2 底部一行的软按键中**精选**按键被高亮，看出当前显示的是**精选** App。滚动操作与其他程序相同——只需上下移动手指即可滚动浏览页面。


    ![images](img/2202.jpg)


    **图 22–2.** *App Store **首页**的布局*


    **注：** App Store 本质上是一个网站，因此会频繁更新。本书出版后，App Store 的某些细节和细微差别可能会略有不同。


    ### 查看 App 详情


    如果您在列表中看到某个感兴趣的 App，请轻点它以了解更多信息。该 App 的**详情**屏幕包括其价格、描述、屏幕截图和评论（参见 图 22–3）。您可以利用这些信息来帮助判断该
    App 是否适合您。


    在**信息**页面上向下滑动可阅读关于该 App 的更多详细信息。向左或向右滑动可查看更多 App 的屏幕截图。轻点底部的**评分**按钮可阅读该 App
    的所有评论。


    您还可以在**信息**页面底部附近查看 App 的其他详细信息，例如其文件大小、版本号和开发者信息。


    您还可以使用屏幕底部的按钮**告诉朋友**或**报告问题**。


    ![images](img/2203.jpg)


    **图 22–3.** *查看 App 的详细信息*


    ## 查找要下载的 App


    如果您想搜索要下载的 App，请先从默认视图开始浏览，该视图显示**精选** App。向下滚动页面以查看所有精选 App。


    ### 查看新 App


    App Store 中的默认视图会显示新 App 和精选 App。这就是之前在 图 22–2 中显示的视图。您可以通过屏幕底部高亮的**精选**软按键 `![images](img/p469-01.jpg)`
    和页面顶部按下的**新内容**按钮 `![images](img/p469-02.jpg)` 来判断此视图显示的是新的精选 App。


    ### 查看热门内容


    轻点屏幕顶部的**热门**按钮，商店中最“热门”的 App 将显示在屏幕上。同样，浏览最热门的 App，看看是否有让您眼前一亮的。


    **注：** 某个 App 位于“热门”类别，并不一定意味着您也会认为它有用或有趣。在购买任何东西之前，请仔细查看 App 的描述和评论。


    ![images](img/p469-03.jpg)


    ### Genius


    **精选** App 区域顶部的第三个按钮会带您进入 **Genius** 功能。此功能的工作原理类似于在电脑上播放音乐的 **iTunes** App 中的同名功能。例如，它会根据您已在
    iPod touch 上安装的 App 来显示您可能喜欢的 App。


    **注：** 首次使用 Genius 功能时，您必须接受显示的条款和条件，该功能才会启用。


    ![images](img/p470-01.jpg)


    #### 基于


    请注意每个 App 上方都有一个**基于（*App 名称*）**标签。此标签向您显示，建议的 App 是基于您已在 iPod touch 上安装的特定 App。例如，推荐
    **CBS Radio** 是基于已安装了 **Pandora Radio**。我们之前不知道 CBS Radio，但基于此推荐，我们或许会尝试一下。


    ![images](img/p470-02.jpg)


    #### 滑动以移除


    如果您不喜欢某个 Genius 建议，可以在其上向左或向右滑动以调出**删除**按钮，就像您在 iPod touch 上从列表中删除电子邮件或其他项目一样。轻点**删除**按钮即可从列表中移除该
    App。


    ![images](img/p471-01.jpg)


    #### 禁用 Genius 功能


    要禁用 Genius 功能，您需要进入 **App Store** 的设置（请参阅本章后面的“App Store 设置”部分以了解如何禁用此功能）。


    ![images](img/p471-02.jpg)


    ### 类别


    `![images](img/p471-03.jpg)`


    有时，呈现的所有选择可能会让人有点不知所措。如果您知道自己想找什么类型的 App，请轻点底部一行的软按键中的**类别**按钮（参见图 23–4）。


    当前可用的类别如 表 23-1 所示。


    `![images](img/t2301.jpg)`


    **注：** 所列的类别是可变的，并且会随时间变化，因此您看到的类别在本书到达您手中时可能已经发生了变化。


    ![images](img/2204.jpg)


    **图 22–4.** *按类别查看 App——此例为**游戏***


    ### 查看 Top 25 榜单


    `![images](img/p472-01.jpg)`


    轻点底部一行的**榜单**软按键，App Store 将再次切换视图。这一次，您将看到前 25 名付费、免费和收入最高的 App。只需轻点顶部的**付费排行**、**免费排行**或**收入排行**按钮之一即可在视图间切换。


    **注：** **收入排行**类别指的是收入最高的 App，即销量乘以售价。此视图将帮助价格更高的 App 在榜单上排名更高。例如，一个售价 4.99 美元、销量为
    10,000 单位的 App，在**收入排行**图表上的排名将远高于一个售价 0.99 美元、销量相同的 App。


    ![images](img/p472-02.jpg)

