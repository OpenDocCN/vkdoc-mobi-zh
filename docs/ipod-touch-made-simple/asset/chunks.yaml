- fmt: '# EQ (Sound Equalizer Setting)


    Sound equalization is very personal and subjective. Some people like to hear more
    bass in their music, some like more treble, and some like more of an exaggerated
    mid-range. Whatever your music tastes, there is an `EQ` setting for you.


    **NOTE:** Using the `EQ` setting can diminish battery capacity somewhat.


    Just touch the `EQ` tab and then select either the type of music you most often
    listen to or a specific option to boost treble or bass. Experiment, have fun,
    and find the setting that''s perfect for you.


    ![images](images/p230-02.jpg)


    # Volume Limit (Safely Listen to Music at a Reasonable Level)


    This is a great way for parents to control the volume on their kids'' iPod touchs.
    It is also a good way to make sure you don''t listen too loudly through headphones
    so you don''t damage your ears. You just move the slider to a volume limit and
    then lock that limit.


    ![images](images/p231-01.jpg)


    To lock the volume limit, touch the `Lock Volume Limit` button and enter a 4-digit
    passcode. You will be prompted to enter your passcode once more and the volume
    limit will then be locked.


    # Using Home Sharing


    If you''re like us, you probably have far more music on your big computer hard
    drive than you can fit on your iPod touch. With iPod touch and Home Sharing, that''s
    not a problem.


    ![images](images/p231-02.jpg)


    As long as you''re on the same Wi-Fi network as your computer, you can stream
    anything from your desktop iTunes library straight to your iPod touch.


    ![images](images/p231-03.jpg)


    To enable Home Sharing, make sure your computer is logged into Home Sharing with
    your iTunes email address and password, then log into Home Sharing on your iPod
    touch with the same account.


    Once you''re logged in, you''ll be able to choose between your local (iPod touch)
    and remote (desktop iTunes) libraries. Here''s how:


    1. Launch the `Music` app

    2. Tap the `More` tab at the bottom right

    3. Tap the `Shared` tab at the bottom of the list. (If you don''t see a `Shared`
    tab, double check to make sure both your iPod touch and computer are both logged
    into Home Sharing using the same iTunes account)

    4. Choose the name of your desktop machine from the `Shared` list, in this example
    that''s `MacPro`. (You can share more than one iTunes library so you may have
    several to choose from.)


    ![images](images/p232-01.jpg)


    Your iPod touch library will disappear and you''ll see your desktop iTunes library
    instead. It will look exactly the same as your iPod touch library, only the content
    will be different.


    To switch back to your iPod touch library, just repeat the same process but choose
    `iPod touch` from the `Shared` list instead.


    # Showing Media Controls When Your iPod touch is Locked


    You may want to get to your media controls even if your iPod touch is locked.
    Here''s how: Just double-click the `Home` button and the controls for adjusting
    the audio show up on the top of the locked screen. There''s no reason to unlock
    the screen and then go to the Music program to find the controls.


    In the image to the right, notice that the screen is still locked—yet the music
    controls are now visible along the top. You can pause, skip, go to a previous
    song, or adjust the volume without actually unlocking the iPod touch.


    ![images](images/p233-01.jpg)


    **NOTE:** You''ll only see these controls if there is audio playing.


    # Listening to Free Internet Radio (Pandora)


    While your iPod touch gives you unprecedented control over your personal music
    library, there may be times when you want to just “mix it up” and listen to some
    other music.


    **TIP:** A basic `Pandora` account is free and can save you considerable money
    compared with buying lots of new songs from iTunes.


    `Pandora` grew out of the Music Genome Project. This was a huge undertaking. A
    large team of musical analysts looked at just about every song ever recorded and
    then developed a complex algorithm of attributes to associate with each song.


    **NOTE:** There are an ever-increasing amount of “internet radio” or subscription
    music style apps now available including the popular `Slacker Personal Radio`,
    `Spotify`, `Rdio`, `Last.fm`, and others. Please also note that Pandora is a US-only
    application and Slacker is available only in the US and Canada. Spotify is available
    in the US and Europe, and many others vary by region as well. Hopefully, more
    options will begin to pop up for international users.


    ## Getting Started with Pandora


    With Pandora you can design your own unique radio stations built around artists
    you like. Best of all, it is completely free!


    Start by downloading the `Pandora` app from the App Store. Just go to the App
    Store and search for Pandora.


    Now just touch the Pandora icon to start.


    ![images](images/p234-01.jpg)


    The first time you start Pandora, you''ll be asked to either create an account
    or to sign in if you already have an account. Just fill in the appropriate information—an
    email address and a password are required—and you can start designing your own
    music listening experience.


    ![images](images/p234-02.jpg)


    Pandora is also available for your Windows or Mac computer and for most smartphone
    platforms. If you already have a Pandora account, all you have to do is sign in.


    ![images](images/p234-03.jpg)


    **TIP:** Remember that you can move apps into folders. As you can see in [Figure
    12–7](#Chapter11.html#fig_12_7), we''ve put three Music apps, including `Pandora`,
    into one folder named Music. See more about using folders in [Chapter 6](#Chapter06.html#ch6):
    “Icons and Folders.”


    ![images](images/1207.jpg)


    **Figure 12–7.** *Put like Music apps, such as Pandora, into one folder for easy
    retrieval.*


    ## Pandora''s Main Screen


    Your stations are listed down the screen with the `Quick Mix` at the top. Tap
    any station and it will begin to play. Usually, the first song will be from the
    actual artist chosen and the next songs will be from similar artists.


    ![images](images/p235-01.jpg)


    Once you select a station, the music begins to play. You''ll see the current song
    displayed, along with album art—very much like when you play a song using the
    `Music app`.


    You''ll also see a small `Now Playing` icon in the upper right corner—very much
    like the `Now Playing` icon in the `Music` app.


    Touch the `Detail` view ![images](images/p236-01.jpg) icon in the upper right
    corner, just like the one you find in the `Music` app, and you''ll see a nice
    bio of the artist, which changes with each new song. (See [Figure 12–8](#Chapter11.html#fig_12_8)).


    ![images](images/1208.jpg)


    **Figure 12–8.** *Pandora''s Album cover view and the Detail view.*


    ## Thumbs Up or Thumbs Down in Pandora


    If you like a particular song, touch the thumbs-up icon and you''ll hear more
    from that artist.


    Conversely, if you don''t like an artist on this station, touch the thumbs-down
    icon and you won''t hear that artist again.


    If you like, you can pause a song and come back later, or skip to the next selection
    in your station.


    ![images](images/p236-02.jpg)


    **NOTE:** With a free Pandora account, you are limited in the number of skips
    per hour you can make. Also, you''ll occasionally hear advertising. To get rid
    of these annoyances, you can upgrade to a paid `Pandora One` account as we show
    you below.


    ## Pandora''s Menu


    Between the two thumbs is a `Menu` button which looks like a triangle.


    ![images](images/p237-01.jpg). Touch this and you can bookmark the artist or song,
    go to iTunes to buy music from this artist, or email the station to someone in
    your `Contacts`.


    ![images](images/p237-02.jpg)'
  raw: '#### EQ (Sound Equalizer Setting)


    Sound equalization is very personal and subjective. Some people like to hear more
    bass in their music, some like more treble, and some like more of an exaggerated
    mid-range. Whatever your music tastes, there is an **EQ** setting for you.


    **NOTE:** Using the **EQ** setting can diminish battery capacity somewhat.


    Just touch the **EQ** tab and then select either the type of music you most often
    listen to or a specific option to boost treble or bass. Experiment, have fun,
    and find the setting that''s perfect for you.


    ![images](images/p230-02.jpg)


    #### Volume Limit (Safely Listen to Music at a Reasonable Level)


    This is a great way for parents to control the volume on their kids'' iPod touchs.
    It is also a good way to make sure you don''t listen too loudly through headphones
    so you don''t damage your ears. You just move the slider to a volume limit and
    then lock that limit.


    ![images](images/p231-01.jpg)


    To lock the volume limit, touch the **Lock Volume Limit** button and enter a 4-digit
    passcode. You will be prompted to enter your passcode once more and the volume
    limit will then belocked.


    #### Using Home Sharing


    If you''re like us, you probably have far more music on your big computer hard
    drive than you can fit on your iPod touch. With iPod touch and Home Sharing, that''s
    not a problem.


    ![images](images/p231-02.jpg)


    As long as you''re on the same Wi-Fi network as your computer, you can stream
    anything from your desktop iTunes library straight to your iPod touch.


    ![images](images/p231-03.jpg)


    To enable Home Sharing, make sure your computer Is logged into Home Sharing with
    your iTunes email address and password, then log into Home Sharing on your iPod
    touch with the same account.


    Once you''re logged in, you''ll be able to choose between your local (iPod touch)
    and remote (desktop iTunes) libraries. Here''s how:


    1.  Launch the **Music** app

    2.  Tap the **More** tab at the bottom right

    3.  Tap the **Shared** tab at the bottom of the list. (If you don''t see a **Shared**
    tab, double check to make sure both your iPod touch and computer are both logged
    into Home Sharing using the same iTunes account)

    4.  Choose the name of your desktop machine from the **Shared** list, in this
    example that''s **MacPro**. (You can share more than one iTunes library so you
    may have several to choose from.)


    ![images](images/p232-01.jpg)


    Your iPod touch library will disappear and you''ll see your desktop iTunes library
    instead. It will look exactly the same as your iPod touch library, only the content
    will be different.


    To switch back to your iPod touch library, just repeat the same process but choose
    **iPod touch** from the **Shared** list instead.


    #### Showing Media Controls When Your iPod touch is Locked


    You may want to get to your media controls even if your iPod touch is locked.
    Here''s how: Just double-click the **Home** button and the controls for adjusting
    the audio show up on the top of the locked screen. There''s no reason to unlock
    the screen and then go to the Music program to find the controls.


    In the image to the right, notice that the screen is still locked—yet the music
    controls are now visible along the top. You can pause, skip, go to a previous
    song, or adjust the volume without actually unlocking the iPod touch.


    ![images](images/p233-01.jpg)


    **NOTE:** You''ll only see these controls if there is audio playing.


    ### Listening to Free Internet Radio (Pandora)


    While your iPod touch gives you unprecedented control over your personal music
    library, there may be times when you want to just “mix it up” and listen to some
    other music.


    **TIP:** A basic **Pandora** account is free and can save you considerable money
    compared with buying lots of new songs from iTunes.


    **Pandora** grew out of the Music Genome Project. This was a huge undertaking.
    A large team of musical analysts looked at just about every song ever recorded
    and then developed a complex algorithm of attributes to associate with each song.


    **NOTE:** There are an ever-increasing amount of “internet radio” or subscription
    music style apps now available including the popular **Slacker Personal Radio**,
    **Spotify**, **Rdio, Last.fm**, and others. Please also note that Pandora is a
    US-only application and Slacker available is only in the US and Canada. Spotfly
    is available in the US and Europe, and many others vary by region as well. Hopefully,
    more options will begin to pop up for international users.


    #### Getting Started with Pandora


    With Pandora you can design your own unique radio stations built around artists
    you like. Best of all, it is completely free!


    Start by downloading the **Pandora** app from the App Store. Just go to the App
    Store and search for Pandora.


    Now just touch the Pandora icon to start.


    ![images](images/p234-01.jpg)


    The first time you start Pandora, you''ll be asked to either create an account
    or to sign in if you already have an account. Just fill in the appropriate information—an
    email address and a password are required—and you can start designing your own
    music listening experience.


    ![images](images/p234-02.jpg)


    Pandora is also available for your Windows or Mac computer and for most smartphone
    platforms. If you already have a Pandora account, all you have to do is sign in.


    ![images](images/p234-03.jpg)


    **TIP:** Remember that you can move apps into folders. As you can see in [Figure
    12–7](#Chapter11.html#fig_12_7), we''ve put three Music apps, including **Pandora**,
    into one folder named Music. See more about using folders in [Chapter 6](#Chapter06.html#ch6):
    “Icons and Folders.”


    ![images](images/1207.jpg)


    **Figure 12–7.** *Put like Music apps, such as Pandora, into one folder for easy
    retrieval.*


    #### Pandora''s Main Screen


    Your stations are listed down the screen with the **Quick Mix** at the top. Tap
    any station and it will begin to play. Usually, the first song will be from the
    actual artist chosen and the next songs will be from similar artists.


    ![images](images/p235-01.jpg)


    Once you select a station, the music begins to play. You''ll see the current song
    displayed, along with album art—very much like when you play a song using the
    **Music app**.


    You''ll also see a small **Now Playing** icon in the upper right corner—very much
    like the **Now Playing** icon in the **Music** app.


    Touch the **Detail** view ![images](images/p236-01.jpg) icon in the upper right
    corner, just like the one you find in the **Music** app, and you''ll see a nice
    bio of the artist, which changes with each new song. (See [Figure 12–8](#Chapter11.html#fig_12_8)).


    ![images](images/1208.jpg)


    **Figure 12–8.** *Pandora''s Album cover view and the Detail view.*


    #### Thumbs Up or Thumbs Down in Pandora


    If you like a particular song, touch the thumbs-up icon and you''ll hear more
    from that artist.


    Conversely, if you don''t like an artist on this station, touch the thumbs-down
    icon and you won''t hear that artist again.


    If you like, you can pause a song and come back later, or skip to the next selection
    in your station.


    ![images](images/p236-02.jpg)


    **NOTE:** With a free Pandora account, you are limited in the number of skips
    per hour you can make. Also, you''ll occasionally hear advertising. To get rid
    of these annoyances, you can upgrade to a paid “Pandora One” account as we show
    you below.


    #### Pandora''s Menu


    Between the two thumbs is a **Menu** button which looks like a triangle.


    ![images](images/p237-01.jpg). Touch this and you can bookmark the artist or song,
    go to iTunes to buy music from this artist, or email the station to someone in
    your **Contacts**.


