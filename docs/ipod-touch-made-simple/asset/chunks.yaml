  trans: "\n### 清理和整理收件箱\n\n当你越来越习惯将 iPod touch 用作电子邮件设备时，你会发现自己使用`Mail`程序的频率越来越高。偶尔进行一次邮件整理将变得十分必要。在\
    \ iPod touch 上，你可以轻松地删除或移动电子邮件。\n\n#### 删除单封邮件\n\n要从收件箱中删除单封邮件，请按照以下步骤操作：\n\n\
    ![图片](img/p335-01.jpg)\n\n1. 在收件箱中向右或向左滑动邮件，调出`删除`按钮。\n2. 轻点`删除`即可移除该邮件。\n\n####\
    \ 删除、移动或标记多封邮件\n\n我们已在本章前面的“移动、删除或标记（旗标）多封邮件”部分介绍了操作方法。\n\n#### 在邮件查看界面删除\n\n\
    `邮件`查看界面提供了另一种删除邮件的方式。打开任意邮件进行阅读，然后轻点屏幕底部中间的`垃圾桶`图标 ![图片](img/p336-01.jpg)。你会看到邮件缩小并飞入`垃圾桶`，从而被删除。\n\
    \n**提示：** 你可以使用`设置`应用，让 iPod touch 在删除邮件前进行确认。操作方法是：轻点`邮件、通讯录、日历`，然后将`删除前确认`旁边的开关设置为`好`。\n\
    \n你可以将邮件移至其他文件夹来进行整理。将邮件移出收件箱后，可以留作存档，或稍后阅读。\n\n**注：** 如果你使用的是 iCloud 或其他支持的邮件服务器，你可以直接在设备上创建、重命名或删除邮件文件夹，详见本章前面的“添加或编辑邮件文件夹或邮箱”部分。如果该方法无效，则需要在你的主邮件账户中设置这些文件夹，然后同步到\
    \ iPod touch。我们将在本章的“微调电子邮件设置”部分展示具体操作方法。\n\n#### 阅读时将邮件移至文件夹\n\n有时，你可能想整理邮件以便日后轻松检索。例如，你可能收到一封关于即将出行的邮件，并希望将其移至“旅行”文件夹。有时，你会收到需要稍后处理的邮件，此时可将其移至“需要关注”文件夹。这有助于提醒你稍后处理这些邮件。\n\
    \n请按照以下步骤移动邮件：\n\n![图片](img/p337-01.jpg)\n\n1. 打开该邮件。\n2. 轻点右上角的`移动`图标。\n3. 选择一个新文件夹，邮件将移出当前收件箱。\n\
    \n### 从邮件中复制和粘贴\n\n以下是从邮件中选中文本或图片并进行复制的一些技巧：\n\n- 双击文本选中一个单词，然后上下拖动蓝色手柄调整选区。接着，选择`拷贝`。\n\
    \n  ![图片](img/p337-02.jpg)\n\n- 长按文本，然后选择`选择`或`全选`。\n\n  ![图片](img/p337-03.jpg)\n\
    \n- 长按图片，然后选择`存储图像`或`拷贝`。\n\n  ![图片](img/p338-01.jpg)\n\n如需更完整的说明，请查阅第 2 章：“键入、复制和搜索”中的“复制和粘贴”部分。\n\
    \n### 搜索电子邮件\n\niPod touch 内置了强大的搜索功能，可帮助你查找邮件。你可以通过`发件人`、`收件人`、`主题`或`所有`字段来搜索收件箱。这有助于你筛选收件箱，从而精确找到所需内容。\n\
    \n#### 激活邮件搜索\n\n发起邮件搜索很简单。首先，导航至待搜索账户的`收件箱`。如果向上滚动到顶部，你会看到熟悉的`搜索`栏出现在`收件箱`顶部。\n\
    \n如果你的电子邮件账户支持此功能，你还可以在服务器上搜索邮件。截至撰写本文时，受支持的搜索型电子邮件账户包括`Exchange`、iCloud（原称`MobileMe`）和`Gmail\
    \ IMAP`。请按照以下步骤在服务器上搜索邮件：\n\n1. 轻点`搜索`栏，即可看到`搜索`栏下方出现一排新的软键菜单。\n\n   ![图片](img/p339-01.jpg)\n\
    \n2. 输入要搜索的文本。\n3. 轻点搜索窗口下方的某个标签：\n   1. `发件人`：仅搜索发件人的电子邮件地址。\n   2. `收件人`：仅搜索收件人的电子邮件地址。\n\
    \   3. `主题`：仅搜索邮件的`主题`字段。\n   4. `所有`：搜索邮件的所有部分。\n\n例如，假设我们想搜索收件箱中来自“Martin”的邮件。我们可以在`搜索`框中输入\
    \ Martin 的名字，然后轻点`发件人`。收件箱随后会被筛选，仅显示来自 Martin 的邮件。\n\n### 微调电子邮件设置\n\n你可以通过`设置`应用中的众多选项来微调\
    \ iPod touch 上的电子邮件账户。请按照以下步骤更改这些设置：轻点`设置`图标，然后轻点`邮件、通讯录、日历`。以下各部分将说明可进行的调整。\n\
    \n#### 自动检索电子邮件（获取新数据）\n\n除了`高级`下的选项外，你还可以使用`邮件`设置来配置 iPod touch 获取（或拉取）邮件的频率。默认情况下，当数据从服务器“推送”时，iPod\
    \ touch 会自动接收邮件或其他通讯录或日历更新。\n\n你可以通过以下步骤调整此设置：\n\n1. 轻点`设置`应用。\n2. 轻点`邮件、通讯录、日历`。\n\
    3. 在列出的电子邮件账户下方，轻点`获取新数据`。\n\n   ![图片](img/p340-01.jpg)\n\n4. 将`推送`设为`打开`（默认）以自动让服务器推送数据。将其设为`关闭`以节省电池续航。\n\
    \n   ![图片](img/p340-02.jpg)\n\n5. 调整定时计划以从服务器拉取数据。这设置了应用从服务器拉取新数据的频率。\n\n   **注：**\
    \ 如果你将此选项设为`每 15 分钟`，你会收到更频繁的更新；但与设为`每小时`或`手动`相比，会牺牲电池续航。\n\n如果你只想打开 iPod touch\
    \ 就能看到有邮件，自动检索功能非常方便；否则，你需要记得手动检查。\n\n##### 高级推送选项\n\n在`获取新数据`屏幕底部，`每小时`和`手动`设置下方，你可以轻点`高级`按钮，查看列出所有邮件账户的新屏幕。\n\
    \n轻点任意邮件账户以调整其设置。\n\n![图片](img/p341-01.jpg)\n\n大多数账户可以按你设定的计划进行`获取`，或设为`手动`。`手动`选项要求你使用`更新`按钮来检索数据。此屏幕让你能够为你设置的每个账户调整`获取`、`手动`，甚至`推送`设置。\n\
    \n![图片](img/p341-02.jpg)\n"
- fmt: "# Adjusting Your Mail Settings\n\nUnder the **Accounts** section, you can\
    \ see all the email settings listed under **Mail**. The **Default** settings may\
    \ work well for you; but if you need to adjust any of these, you can follow these\
    \ steps:\n\n**Show**: This sets how many emails are pulled from the server. You\
    \ can specify anywhere from 50 to 1,000 messages (the default is 50 recent messages).\n\
    \n**Preview**: This option lets you set how many lines of text in addition to\
    \ the **Subject** are shown in the inbox **Preview**. You can adjust this value\
    \ from **None** to **5 Lines** (the default is **2 Lines**).\n\n![Images](images/p341-03.jpg)\n\
    \n**Minimum Font Size**: This is the default font size shown when opening an email\
    \ the first time. It is also smallest font size that you are allowed to zoom out\
    \ to when viewing an email. Your options are **Small**, **Medium**, **Large**,\
    \ **Extra Large**, and **Giant** (the default is **Medium**).\n\n**TIP:** You\
    \ can expand the font size further in the Accessibility area of settings. Check\
    \ out [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search” for more details.\n\
    \n**Show To/Cc Label**: With this option **ON**, you will see a small **To** or\
    \ **Cc** label in your inbox before the subject. This label shows which field\
    \ your address was placed in (the default state of this option is **OFF**).\n\n\
    **Ask Before Deleting**: Turn this option **ON** to be asked every time you try\
    \ to delete a message (the default is **OFF**).\n\n![Images](images/p342-01.jpg)\n\
    \n**Load Remote Images**: This option allows your iPod touch to load all the graphics\
    \ (remote images) that are placed in some email messages (the default value for\
    \ this option is **ON**).\n\n![Images](images/p342-02.jpg)\n\n**Organize by Thread:**\
    \ This option groups related emails together. It shows only one message, with\
    \ a number next to it. That number indicates how many related emails exist. This\
    \ feature gives you a good way to keep all discussions together in one place (the\
    \ default value of this option is **ON**).\n\n![Images](images/p342-03.jpg)\n\n\
    **Always Bcc Myself**: This option sends a blind carbon copy (**Bcc:**) of every\
    \ email you send from your iPod touch to your email account (the default value\
    \ of this option is **OFF**).\n\n![Images](images/p342-04.jpg)\n\n## Changing\
    \ Your Email Signature\n\nBy default, emails you send will say “Sent from my iPod\
    \ touch.” Follow these steps to change the **Signature** line of the email:\n\n\
    ![Images](images/p343-01.jpg)\n\n1.  Tap the **Signature** tab and type in the\
    \ new email signature you want at the bottom of emails sent from your iPod touch.\n\
    \n    ![Images](images/p343-02.jpg)\n\n2.  When you are done editing the **Signature**\
    \ field, tap the **Mail, Contacts…** button in the upper-left corner. This will\
    \ return you to the **Mail** settings screen.\n\n## Changing Your Default Mail\
    \ Account (Sent From)\n\nIf you have multiple email accounts set up on your iPod\
    \ touch, you should set one of them—usually, the one you use most—as your **Default\
    \ Account**. When you select **Compose** from the **Email** screen, the default\
    \ account is always chosen. Follow these steps to change the email account you\
    \ send from by default:\n\n![Images](images/p343-03.jpg)\n\n1.  Tap the **Default\
    \ Account** option, and you will see a list of all your email accounts.\n\n  \
    \  ![Images](images/p343-04.jpg)\n\n2.  Tap the email account you wish to use\
    \ as your **Default Account** choice.\n3.  When you are done, touch the **Mail,\
    \ Contacts…** button to return to the **Mail** settings menu.\n\n## Toggling Sounds\
    \ for Receiving and Sending Email\n\nYou may notice a little sound effect every\
    \ time you send or receive email. What you hear is the default setting on your\
    \ iPod touch.\n\nIf you want to disable this or change it, you do so in the **Settings**\
    \ program:\n\n![Images](images/p344-01.jpg)\n\n1.  Tap your **Settings** icon.\n\
    2.  Tap **Sounds**.\n3.  You will see various switches to turn sound effects on\
    \ or off. Tap **New Mail** and **Sent Mail** to select your mail tone options.\n\
    \n# Advanced Email Options\n\n**NOTE:** Email accounts set up as Exchange, IMAP,\
    \ or iCloud will not have this **Advanced** email settings screen. This only applies\
    \ to POP3 email accounts.\n\n![Images](images/p344-02.jpg)\n\nTo get to the **Advanced**\
    \ options for each email account, follow these steps:\n\n1.  Touch the **Settings**\
    \ icon.\n2.  Touch **Mail, Contacts, Calendars**.\n3.  Touch an email address\
    \ listed under **Accounts**.\n4.  At the bottom of the mail settings pop-up window,\
    \ tap the **Advanced** button to bring up the **Advanced** dialog.\n\n    ![Images](images/p345-01.jpg)\n\
    \n## Removing Email Messages from Your iPod touch After Deletion\n\nYou can select\
    \ how frequently you want email removed completely from your iPod touch once it\
    \ is deleted.\n\nTouch the **Remove** tab and select the option that is best for\
    \ you; the default setting is **Never**.\n\n![Images](images/p345-02.jpg)\n\n\
    ## Using SSL and Authentication\n\nThe SSL and Authentication features were discussed\
    \ previously; however, this screen gives you another location to access these\
    \ features for a particular email account.\n\n## Deleting from Server\n\nYou can\
    \ configure your iPod touch to handle the deletion of messages from your email\
    \ server. Usually, this setting is left at **Never**, and this function is handled\
    \ on your main computer. If you use your iPod touch as your main email device,\
    \ however, you might want to handle that feature from the iPod touch itself. Follow\
    \ these steps to remove deleted emails on the server from your iPod touch.\n\n\
    1.  Touch the **Delete from Server** tab to select the feature that best suits\
    \ your needs: **Never**, **Seven Days**, or **When removed from inbox**.\n\n \
    \   ![Images](images/p346-01.jpg)\n\n2.  The default setting is **Never**. If\
    \ you want to choose **Seven Days**; that option should give you enough time to\
    \ check email on your computer, as well as your iPod touch, and then decide what\
    \ to keep and what to get rid of.\n\n## Changing the Incoming Server Port\n\n\
    As you did with the **Outgoing Server Port** earlier, you can change the **Incoming\
    \ Server Port** if you are having trouble receiving email. It is very rare that\
    \ your troubles will be related to the port you receive mail on; consequently,\
    \ you will rarely need to change this number. If your email service provider gives\
    \ you a different number, just touch the numbers and input a new port. The value\
    \ for an **Incoming Server Port** is usually **995**, **993**, or **110**; however,\
    \ the port value could also be another number.\n\n# Troubleshooting Email Problems\n\
    \nUsually, your email works flawlessly on your iPod touch. However, sometimes\
    \ your email may not work as flawlessly as you would hope. This could be due to\
    \ a server issue, a network connectivity issue, or an email service provider requirement\
    \ that isn’t being met.\n\nMore often than not, there is a simple setting that\
    \ needs to be adjusted or a password that needs to be re-entered.\n\nIf you try\
    \ out some of the troubleshooting tips that follow and your email is still not\
    \ working, then your email server may just be down temporarily. Check with your\
    \ email service provider to make sure your mail server is up and running; you\
    \ might also check whether your provider has made any recent changes that would\
    \ affect your settings.\n\n**TIP:** If the tips that follow do not solve the problem,\
    \ please check out [Chapter 25](#Chapter25.html#ch25): “Troubleshooting” for more\
    \ helpful tips and resources."
