    \ “official” Facebook apps, and they do cost money. However, the only “official”\
    \ app is the iPhone/iPod app shown to the right.\n\n![images](images/p494-01.jpg)\n\
    \nIn order to connect to your account on Facebook, you will need to locate the\
    \ icon you just installed and click it. We use the example of **Facebook** here,\
    \ but the process is very similar for the rest of the apps.\n\nOnce **Facebook**\
    \ is successfully downloaded, the icon should look something like this.\n\n![images](images/p494-02.jpg)"
  trans: "\n### 其他趣味内容：棒球\n\niPod touch 上有很多优秀的应用能为你带来无尽的娱乐时光。由于 iPod touch 是在美国职业棒球大联盟赛季开幕日发布的，因此特别适合介绍一款被选为\
    \ iPod touch App Store 首款“本周应用”的软件。\n\n`At Bat 2010 for iPod touch` 是一款售价 14.99\
    \ 美元的应用，对于任何棒球爱好者来说都物超所值。同时，它也充分展示了 iPod touch 的强大功能。\n\n![images](img/p489-01.jpg)\n\
    \n应用的主界面会根据当前是否有棒球比赛而动态变化。当你首次注册应用时，可以选定自己最喜欢的球队。本例中 iPod touch 上设置的喜爱球队是红袜队。因此，如果该队正在比赛，界面会首先自动显示该队的比赛信息。如果该队没有比赛，则会显示该队上一场比赛的回顾，或者列出下一场比赛的详细信息。\n\
    \n比赛进行时，主界面会显示一名击球员站在本垒板前。这个击球员代表真实的球员。击球员会根据当前击球手是左打还是右打而切换站位。本垒板上方会显示当前投球数，屏幕顶部则显示比分。\n\
    \n当你在场上或垒上看到一名球员时，可以点击他的图像来调出他的棒球卡并查看其统计数据。\n\n![images](img/p490-01.jpg)\n\n\
    **提示**：你甚至可以选择在你喜爱的球队发生重大新闻时接收通知。为此，请点击`信息`图标，然后将`通知`设置为`开启`。\n\n#### AirPlay\
    \ 镜像\n\n最新的 iPod touch 不仅能将视频或音乐从设备流式传输到 Apple TV，还能共享任何应用（包括游戏）的屏幕。这样一来，你就能和全家人在大屏幕上观看并享受比赛，同时用你的\
    \ iPod touch 作为控制器。对于棋盘游戏和多人游戏而言，这一功能尤其出色，全家人或一群人可以围坐在一起共同参与。\n\n请按照以下步骤使用 AirPlay\
    \ 镜像功能：\n\n1.  点击你想要镜像的应用。在本例中，我们使用《无尽之剑》。\n2.  应用启动后，双击主屏幕按钮调出快速应用切换器。\n\n  \
    \  ![images](img/p490-02.jpg)\n\n3.  从左向右滑动，找到音频/视频控制选项。（它们位于最末端，所以请继续滑动直到无法再滑动为止。）\n\
    4.  点击 AirPlay 图标，调出你 Wi-Fi 网络上支持 AirPlay 的设备列表。\n5.  选择 Apple TV。\n6.  再次点击主屏幕按钮，返回你的应用。\n\
    7.  现在你应该能在电视大屏幕上看到《无尽之剑》。尽情享受吧！\n\n![images](img/p491-01.jpg)\n\n要停止 AirPlay\
    \ 镜像，重复上述步骤，然后从设备列表中选择 iPod touch。\n\n**注意**：某些游戏支持多人 AirPlay 镜像，例如《真实赛车 2》的“聚会游戏”功能，最多允许\
    \ 4 人使用各自的 iPod touch 或 iPad 在同一台大屏幕电视上互相竞速。\n\n## 第 24 章\n\n## 社交网络\n\n如今，一些最受欢迎的“社交”场所，往往是那些被称为*社交网络站点*的网站——这些地方让你可以创建自己的个人主页，并与朋友和家人保持联系，了解他们生活中的动态。一些最大的社交网站包括\
    \ Facebook、Twitter 和 LinkedIn。\n\n在本章中，我们将向你展示如何访问这些网站。你将学习如何更新状态、发布*推文*，并关注那些对你重要或者你感兴趣的人。\n\
    \n### Facebook\n\nFacebook 成立于 2004 年 2 月。自那时起，它便成为用户与朋友、同事和家人联系、重新联系以及分享信息的首选网站。如今，超过\
    \ 8 亿用户将 Facebook 作为他们了解最重要的人近况的主要来源。\n\n**注意**：*你无法在 iPod touch 上的 `Facebook`\
    \ 应用或通过 Facebook.com 网站玩 Facebook 游戏*。如果你是 Facebook 游戏的忠实玩家，这可能会让你失望；不过，你通常可以从\
    \ App Store 下载相同的游戏（例如 `FarmVille`），然后将其与电脑版的 Facebook 账户关联，以便保留游戏进度。\n\n在本书出版时，你可以通过以下三种主要方式在\
    \ iPod touch 上访问你的 Facebook 页面：\n\n1.  使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
    2.  使用 `Safari` 访问移动网站：[`http://touch.facebook.com`](http://touch.facebook.com)。\n\
    3.  使用 iPod touch 的 `Facebook` 应用。\n\n![images](img/p493-01.jpg)\n\n**注意**：iPod\
    \ touch 版本的 `Facebook` 应用功能比完整网站略有缩减，但导航起来要方便得多。\n\n#### 连接 Facebook 的不同方式\n\n\
    你可以通过 iPod touch 专用应用，或者使用 `Safari` 浏览器访问前面提到的两个 Facebook 网站之一来登录 Facebook。在本章的剩余部分，我们将重点介绍\
    \ iPod touch 上的 `Facebook` 应用。\n\n##### 下载并安装 Facebook 应用\n\n要找到该应用，请使用 App Store\
    \ 的`搜索`功能，直接输入“Facebook”。\n\n你也可以前往 App Store 的`社交网络`分类，找到官方的 `Facebook` 应用，以及许多其他与\
    \ Facebook 相关的应用。\n\n**注意**：有些应用可能看起来像“官方”Facebook 应用，并且需要付费。然而，唯一的“官方”应用是右侧显示的\
    \ iPhone/iPod 应用。\n\n![images](img/p494-01.jpg)\n\n要登录你的 Facebook 账户，你需要找到刚刚安装的图标并点击它。此处我们以\
    \ `Facebook` 为例，但其他应用的操作过程非常相似。\n\n一旦 `Facebook` 成功下载，该图标应该看起来像这样。\n\n![images](img/p494-02.jpg)\n"
- fmt: "# The Facebook App\n\nTo get the `Facebook` app installed on your iPod touch,\
    \ start up the `App Store` and search for “Facebook.” Tap the `Install` button\
    \ from the `Facebook` app listing.\n\n## Facebook App Basics\n\nOnce `Facebook`\
    \ is downloaded and installed, the first thing you will see is the `Login` screen.\
    \ Input your account information—your email address and password.\n\n![images](images/p495-01.jpg)\n\
    \nAfter you log in the first time, you will see a `Push Notifications` warning\
    \ message.\n\nClick `OK` if you want to allow these messages, which can be pokes\
    \ from other Facebook friends, notes, status update notifications, and more.\n\
    \nOnce you log in, you will see the `Facebook` screen main screen. Tap the `Facebook`\
    \ logo to navigate around the app.\n\n![images](images/p495-02.jpg)\n\n## Navigating\
    \ Around Facebook\n\nToggle between the `Navigation` icons and your current location\
    \ by tapping the word `Facebook` at the top of the page.\n\nFor example, if you\
    \ are in the `News Feed` and tap `Facebook`, you will see all the icons. Tap `Facebook`\
    \ again and you will return to the `News Feed`.\n\nFrom the icons page, you can\
    \ access your `News Feed`, `Profile`, `Friends`, `Messages`, `Places`, `Groups`,\
    \ `Events`, `Photos`, and `Chat`.\n\n![images](images/p496-01.jpg)\n\n## Communicating\
    \ with Your Friends\n\nFollow these steps to communicate with your friends on\
    \ Facebook from the `Facebook` app on your iPod touch:\n\n1.  Tap `Facebook` at\
    \ the top to see all the icons.\n2.  Tap the `Friends` icon and your list of friends\
    \ is displayed.\n3.  Touch the friend and you will go to his Facebook page, where\
    \ you can then write on her `Wall` and see her `Info` or `Photos`.\n\n![images](images/p496-02.jpg)\n\
    \n## Uploading Pictures with the Facebook App\n\nAn easy and fun thing to do with\
    \ Facebook is to upload pictures. Here, we show you how to upload pictures in\
    \ the `Facebook` app:\n\n1.  From the Facebook main icons, tap `Photos`.\n2. \
    \ Choose an album, such as Mobile Uploads.\n3.  Tap the `Camera` next to the `What's\
    \ on your mind?` box.\n4.  Tap the `Take Photo or Video` button to snap a picture\
    \ or take a video to upload. Or, tap `Choose From Library` to navigate through\
    \ the pictures on your iPod touch until you find the picture you wish to upload.\n\
    5.  Next, tap `Write a caption…` to write a caption, if so desired.\n6.  To finish\
    \ the upload, tap the blue `Upload` button and the photo will go into your Mobile\
    \ Uploads folder.\n\n![images](images/p497-01.jpg)\n\n**NOTE:** When you upload\
    \ a photo, the image quality won't be the same as it was originally on your iPod\
    \ touch.\n\n![images](images/p497-02.jpg)\n\n![images](images/p498-01.jpg)\n\n\
    # Facebook Notifications\n\nDepending on your settings for Facebook push notifications,\
    \ you can be inundated by updates, wall posts, and invitations. If you don't have\
    \ too many Facebook friends and you want to know when someone is writing something\
    \ on your wall or commenting on a post or picture, just set your push notification\
    \ to `ON`, as shown in the next section.\n\nWhen a notification comes in, it will\
    \ appear in Notification Center or as Lock Screen Info if your iPod touch is locked.\n\
    \nTo access Facebook from the notification, just slide the `Facebook` icon across\
    \ the screen or slide the `Arrow` button to unlock and read the message.\n\n![images](images/p498-02.jpg)\n\
    \n## Settings to Customize Your Facebook App\n\nHere's how to adjust the settings\
    \ for the `Facebook` app:\n\n1.  Tap the `Settings` app.\n2.  Tap `Facebook` in\
    \ the left column.\n3.  You can now adjust various options:\n    *   `Shake to\
    \ Reload`: This feature reloads or updates the page when you shake your iPod touch.\n\
    \    *   `Play Sound`: This feature lets you add an audible tone to chat and message\
    \ alerts.\n\n![images](images/p499-01.jpg)\n\nFollow these steps to adjust push\
    \ notification settings:\n\n1.  Tap the `Settings` app.\n2.  Tap `Notifications`.\n\
    3.  Scroll down and tap `Facebook`.\n4.  Set `Notification Center` to `ON` to\
    \ receive push notifications.\n5.  Tap `Show` to choose how many notifications\
    \ appear in the list.\n6.  Set the `Alert Style` to `None` for no notifications,\
    \ `Banners` for new Notification Center–style alerts, or `Alerts` for old style\
    \ pop-up notifications.\n7.  Set `Badge App Icon` to `ON` to see the number of\
    \ new notifications appear on the `Facebook` icon.\n8.  Set `Sounds` to `ON` to\
    \ hear an audible tone when you get a notification.\n\n    ![images](images/p499-02.jpg)\n\
    \n9.  Set `View in Lock Screen` to get notification info even when your iPod touch\
    \ is locked.\n\n**TIP:** The `Facebook` app will bring in Facebook profile pictures\
    \ to your `Contacts` list. This can be quite humorous, depending on the pictures.\
    \ However, it can also upload your own, non-Facebook contacts' information to\
    \ Facebook's servers, which might raise privacy concerns for you, your family,\
    \ and friends.\n\n# LinkedIn\n\nLinkedIn has core functionality very similar to\
    \ Facebook, but it tends to be focused on business and career interests. This\
    \ is in contrast to Facebook, which is focused more on personal friends and games.\
    \ With LinkedIn, you can connect and re-connect with current and past business\
    \ associates, send messages, see what people are up to, have discussions, and\
    \ more.\n\nAt the time of publishing, the status of LinkedIn was very similar\
    \ to Facebook. You can go to the regular LinkedIn site on the `Safari` browser,\
    \ or you can download the `LinkedIn` app for the iPod touch.\n\nWhich is better?\
    \ We liked the `LinkedIn` app for the iPod touch slightly better than the full\
    \ LinkedIn.com site in `Safari`. It was easier to navigate using the `LinkedIn`\
    \ app with the large buttons, but you could see more on the screen in the `Safari`\
    \ version. We recommend giving both options a try and seeing which you like better—it\
    \ is really a matter of personal preference.\n\n## Downloading the LinkedIn App\n\
    \nThe process for downloading the `LinkedIn` app is similar to the process for\
    \ downloading the `Facebook` app. Start the `App Store` app on your iPod touch,\
    \ type “LinkedIn” into the `Search` window, and then locate the app. The `LinkedIn`\
    \ app is free, so tap the `FREE` button to install it.\n\n![images](images/p500-01.jpg)\n\
    \n### Logging In to LinkedIn App\n\nOnce the app is installed, click the `LinkedIn`\
    \ icon and enter your login information.\n\n![images](images/p501-01.jpg)\n\n\
    ![images](images/p501-02.jpg)\n\n### Navigating Around the LinkedIn App\n\nLinkedIn\
    \ has a zone-based navigation system. Tap any stack to move to that zone, and\
    \ then tap the `LinkedIn` logo at the top to return to the `Home` screen.\n\n\
    ![images](images/p501-03.jpg)\n\n### Communicating with LinkedIn Connections\n\
    \nOne of the things you will most likely do the most with the `LinkedIn` app is\
    \ communicate with your connections. The easiest way to do that is to follow these\
    \ steps:\n\n![images](images/p502-01.jpg)\n\n1.  From the `Home` page, tap the\
    \ `You` stack at the top right.\n2.  Tap the `Connections` button midway down\
    \ the screen.\n3.  Scroll through your connections or tap the `Magnifying Glass`\
    \ search icon and type in a connection name in the `Search` box.\n4.  Tap the\
    \ connection you are looking for.\n5.  Tap the `Mail` icon to send him a message.\n\
    \n# Twitter\n\nTwitter was started in 2006. Twitter is essentially an SMS (text\
    \ message)–based social networking site. It is often referred to as a *micro-blogging\
    \ site*, and it is a place where the famous and not-so-famous can share what's\
    \ on their mind. The catch is that you have only 140 characters to get your point\
    \ across.\n\nWith Twitter, you subscribe to *follow* someone who *tweets* messages.\
    \ You might also find that people will start to follow you. If you want to follow\
    \ us, we are `@garymadesimple` on Twitter."
