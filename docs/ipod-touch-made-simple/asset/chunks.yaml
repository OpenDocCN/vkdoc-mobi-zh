  trans: "\n### 阅读列表\n\n`Reading List` 是一种特殊的书签，可以让你快速保存网页文章，以便日后闲暇时阅读。`阅读列表`功能可通过\
    \ iCloud 同步，因此你可以很方便地在家里或工作用的 Mac 或 Windows PC 上的 `Safari` 中标记文章，然后在旅行途中用 iPod\
    \ touch 或 iPad 阅读。你也能用此功能在 iPod touch 上保存书签，等回到 iPad 或电脑旁时再更舒适地阅读。\n\n按照以下步骤使用`阅读列表`功能：\n\
    \n1.  在`Safari`中打开你想保存的文章。\n2.  点击页面底部中间的`操作`按钮 ![images](img/p294-02.jpg)。\n\
    3.  点击`添加到阅读列表`。![images](img/p294-03.jpg)\n\n稍后按以下步骤查看`阅读列表`中的文章：\n\n1.  点击页面右下角的`书签`按钮\
    \ ![images](img/p295-01.jpg)。\n2.  轻点`阅读列表`选项的`眼镜`图标。（如果看不到`眼镜`图标，你可能正处在一个`书签`文件夹内。只需点击左上角的`箭头`图标，退出一层或多层文件夹，直到`箭头`消失，就能看到`眼镜`图标了。）\n\
    \n    ![images](img/p295-02.jpg)\n\n3.  要查看`阅读列表`中的所有内容，点击左上角的`全部`标签。若只想看未阅读的文章，点击右上角的`未读`标签。\n\
    4.  点击你想阅读的文章。\n\n![images](img/p295-03.jpg)\n\n最后，按照以下步骤从`阅读列表`中删除文章：\n\n1. \
    \ 在你想从`阅读列表`移除的文章上从左向右滑动。\n\n    ![images](img/p295-02.jpg)\n\n2.  点击红色的`删除`按钮。\n\
    \n### Safari 阅读器\n\n`Safari`的`阅读器`功能可以让你将网页文章呈现为干净清晰的页面，文字大小适中，没有纷杂的布局或广告干扰。\n\
    \n**注意：** 尽管 Safari 在检测大多数网页文章方面表现出色，但由于内容和格式的多样性，它偶尔也会漏掉一些文章。如果你没有看到`阅读器`按钮，说明\
    \ Safari 无法检测到该文章。\n\n按照以下步骤激活此功能：\n\n![images](img/p296-01.jpg)\n\n1.  打开你想阅读的文章。\n\
    2.  点击 URL 字段右侧的`阅读器`按钮，参见图 16-1。\n3.  点击`字体大小`按钮来调大或调小字号。\n\n![images](img/p296-02.jpg)\n\
    \n![images](img/1501.jpg)\n\n**图 15-1.** *同一网页的标准视图（左图）与阅读器视图（右两图）。*\n\n**提示：**\
    \ 如果你希望同时拥有`阅读列表`和`阅读器`的功能——再加上浏览器访问、社交分享等其他特性——那么可以试试 App Store 中的 `Instapaper`\
    \ 这类应用。\n\n### Safari 浏览技巧与窍门\n\n既然你已经掌握了基本操作，下面我们将介绍一些实用的技巧和窍门，让你在 iPod touch\
    \ 上的网页浏览更愉快、更快捷。\n\n#### 跳转到网页顶部\n\n有时网页可能很长，滚动回页面顶部会有些费力。一个简单的小技巧是轻点网页的灰色标题栏；你会自动跳转到页面顶部。\n\
    \n#### 通过邮件或推特分享网页\n\n浏览时，有时你会发现一个特别吸引人的页面，想与朋友或同事分享。点击底部栏中间的`操作`按钮 ![images](img/p297-01.jpg)，然后选择`邮件链接到本页面`来创建一封包含链接的邮件。选择`推特`则可创建一条带链接的新推文，如图\
    \ 15-2 所示。\n\n![images](img/1502.jpg)\n\n**图 15-2.** *使用操作按钮对 Safari 网页进行多种操作。*\n\
    \n#### 打印网页\n\n使用 iPod touch，你可以轻松地将任何网页打印到本地 Wi-Fi 网络中兼容 `AirPrint` 的打印机上。点击`操作`按钮\
    \ ![images](img/p297-02.jpg)，然后选择`打印`。\n\n#### 在 Safari 中观看视频\n\n在网站上你常会看到视频。你可以播放其中很多视频，但并非全部。例如，使用\
    \ `Adobe Flash` 格式的视频无法在 iPod touch 上播放（请参阅本章开头的说明）。\n\n点击`播放`按钮后，你会从 `Safari`\
    \ 切换到 `iPod` 视频播放器。\n\n你可以将 iPod touch 横过来，以横向或宽屏模式观看视频。\n\n如果播放控制栏消失了，轻点屏幕即可重新显示。\n\
    \n看完视频想返回网页时，点击左上角的`完成`按钮。\n\n![images](img/p298-01.jpg)\n\n**提示：** 关于视频播放器的更多技巧与窍门，请查看第\
    \ 14 章：“观看视频”。\n\n#### 保存或复制文本与图片\n\n你可能会不时看到想从网站复制的文本或图片。本节将简要介绍操作方法；要了解更详细的步骤（包括如何使用`剪切`和`粘贴`功能），请参阅第\
    \ 2 章：“打字、复制与搜索”中的“复制与粘贴”部分。以下是从网页复制文本或图片的快速概述：\n\n*   要复制单个单词，长按该单词直到它被高亮显示并出现`复制`按钮，然后点击`复制`。\n\
    *   要复制几个单词或整个段落，长按一个单词直到它被高亮显示，然后向左或向右拖动蓝色点来选择更多文本。你可以向上或向下滑动来选择整个段落。最后，点击`粘贴`。\n\
    \n    **提示：** 选中单个单词会使复制功能进入单词选择模式，你可以拖动来增加或减少选中的单词数。如果超过一个段落，通常会切换到元素选择模式，此时不再是角点，而是出现边缘，你可以拖动边缘来选择多个段落、图片等。\n\
    \n*   要保存或复制图片，长按图片直到出现弹出窗口，询问你是否要保存或复制该图像。"
- fmt: "### Saving Time with AutoFill\n\nThe `AutoFill` feature gives you a great\
    \ way to save time typing your personal information, including usernames and passwords\
    \ on web sites. The `AutoFill` tool can remember and fill in information required\
    \ in web forms. You will save a lot of time by enabling `AutoFill`.\n\nCheck out\
    \ the steps we show you later in this chapter in the “Enabling AutoFill” section\
    \ to set up `AutoFill` to work on your iPod touch.\n\nOnce you enable the `AutoFill`\
    \ option, just go to any web page that has a field to fill out. As soon as you\
    \ touch the field, the keyboard will come up at the bottom of the screen. At the\
    \ top of the keyboard, you will see a small button that says `AutoFill`. Touch\
    \ it and the web form should be filled out automatically.\n\n**CAUTION:** Having\
    \ your name and password entered automatically means that anyone who picks up\
    \ your iPod touch will be able to access your personal sites and information.\
    \ You may want to enable passcode security, as explained in [Chapter 8](#Chapter08.html#ch8):\
    \ “Personalize and Secure.”\n\n#### Entering Usernames and Passwords\n\nThe first\
    \ time you go to a web site where you have to enter a username and password, type\
    \ them in and press `Submit` or `Enter`. At that time, `AutoFill` will ask if\
    \ you want your iPod touch to remember them.\n\nTap `Yes` if you want them to\
    \ be remembered and automatically entered the next time you visit the site.\n\n\
    ![images](images/p300-01.jpg)\n\nThe next time you visit this login page, your\
    \ username and password will be automatically filled in.\n\n![images](images/p300-02.jpg)\n\
    \n#### For Personal Information\n\nThere are many times on the Web where you have\
    \ to enter your name, email address, home address, and more. With `AutoFill` set\
    \ up and tied to your contact record on the iPod touch, filling in these forms\
    \ just takes a single tap of your finger.\n\nYou will go to many sites with web\
    \ forms that need to be completed. For example, check out this example of a web\
    \ form on [`www.madesimplelearning.com`](http://www.madesimplelearning.com) for\
    \ free iPod touch tips. It would take a while to manually type your email address,\
    \ first name, and last name.\n\n![images](images/p301-01.jpg)\n\nAs soon as you\
    \ tap the first field—`Email`, in this case—you see the `AutoFill` bar appear\
    \ just above your keyboard.\n\nTap the `AutoFill` button, and your email address\
    \ and name are immediately filled in from your contact record.\n\n![images](images/p301-02.jpg)\n\
    \n### Adding a Web Page Icon to Your Home Screen\n\nIf you love a web site or\
    \ page, it's very easy to add it as an icon to your `Home` screen. That way, you\
    \ can instantly access the web page without going through `Safari`'s bookmark\
    \ selection process. You'll save lots of steps by putting the icon on your `Home`\
    \ screen. This is especially good for quickly launching web apps (e.g., Gmail\
    \ from Google or web-based games).\n\n**Follow these steps to add a web app's\
    \ icon:**\n\n1.  Tap the `Action` button ![images](images/p302-01.jpg) at the\
    \ bottom of the browser.\n2.  Tap `Add to Home Screen`.\n3.  Adjust the name to\
    \ shorten it to ten or fewer characters; you should do this because there's not\
    \ much room for the icon's name on your Home screen.\n4.  Tap the `Add` button\
    \ in the upper-right corner.\n\n![images](images/p302-02.jpg)\n\n## Adjusting\
    \ the Safari Browser Settings\n\nAs with other settings we've adjusted so far,\
    \ the settings for `Safari` are found in the `Settings` app.\n\n1.  To access\
    \ settings for `Safari`, tap the `Settings` icon.\n2.  Tap `Safari`.\n\n![images](images/p302-03.jpg)\n\
    \n### Changing the Search Engine\n\nBy default, the search engine for the `Safari`\
    \ browser is `Google`. To change this to `Yahoo` or `Bing`, touch the `Search\
    \ Engine` button and then choose the new search engine.\n\n![images](images/p303-01.jpg)\n\
    \n### Enabling AutoFill\n\nAs we showed you earlier in this chapter, `AutoFill`\
    \ is a convenient way to have `Safari` automatically fill out web page forms that\
    \ ask for your name, address, phone number, or even username and password. It\
    \ can save you a tremendous amount of time typing and retyping your name and other\
    \ information.\n\nTo enable the `AutoFill` option, follow these steps:\n\n1. \
    \ From the `Safari` menu in the `Settings` app, tap `AutoFill`.\n\n    ![images](images/p303-02.jpg)\n\
    \n2.  Set the switch next to `Names & Passwords` to `ON`.\n3.  Set the switch\
    \ next to `Use Contact Info` to `ON`.\n\n    ![images](images/p303-03.jpg)\n\n\
    4.  After setting `Use Contact Info` to `ON`, you will be brought to your `Contacts`\
    \ list to select a contact to use.\n5.  Swipe up and down to find someone or double-tap\
    \ the top bar that says `Contacts` to bring up the `Search` window.\n6.  Once\
    \ you find the contact you want to use, tap it to be returned to `Safari`'s `Settings`\
    \ screen.\n\n![images](images/p304-01.jpg)\n\n### Adjusting Privacy Options\n\n\
    Turning on the `Private Browsing` option means that no information, history, or\
    \ cookies will be stored when you visit web sites. If you're concerned about other\
    \ people knowing which web sites you visit or about the web sites you visit tracking\
    \ you, then you should toggle `Private Browsing` to the `ON` position.\n\nYou\
    \ can also `Clear History` and `Clear Cookies and Data` options.\n\n![images](images/p304-02.jpg)\n\
    \n![images](images/p304-03.jpg)\n\n**TIP:** If you notice your web browsing get\
    \ slow or sluggish—or if Safari is crashing on you frequently—then try clearing\
    \ both your `History` and `Cookies and Data` by tapping them and confirming your\
    \ choices.\n\n### Adjusting Security Options\n\nUnder the `Security` heading,\
    \ the `Fraud Warning`, `JavaScript`, and `Block Pop-ups` options should be set\
    \ to `ON` by default. You can modify any of these settings by sliding a given\
    \ switch to `OFF`.\n\n![images](images/p305-01.jpg)\n\n**NOTE:** Many popular\
    \ sites like Facebook require `JavaScript` to be `ON`.\n\nTap the `Accept Cookies`\
    \ button to adjust your browser's ability to accept cookies to `Always`, `Never`,\
    \ or `From visited`. We recommend keeping it as `From visited`. If you make it\
    \ `Never`, some web sites will not work properly.\n\n![images](images/p305-02.jpg)\n\
    \n## Chapter 16\n\n## Communicate with Email\n\nIn this chapter, we will explore\
    \ the world of email in the `Mail` app on your iPod touch. You will learn how\
    \ to set up multiple email accounts, check out all the various reading options,\
    \ open attachments, and clean up your inbox.\n\n![Images](images/p307-01.jpg)\n\
    \nAnd for cases when your email is not working quite right, you will learn some\
    \ good troubleshooting tips to help you get back up and running.\n\n### Getting\
    \ Started with Mail\n\nSetting up email on your iPod touch is fairly simple. Probably\
    \ the fastest way to get your email up and running is to set up your accounts\
    \ directly on the iPod touch. We show you how using the `Mail, Contacts and Calendar`\
    \ account setup screens in this section. You could also copy these account settings\
    \ using a screen in the `iTunes` app on your computer. You do need a network connection\
    \ to get email up and running.\n\n#### A Network Connection Is Required\n\nMobile\
    \ email is certainly all the rage today. You can view, read, and compose replies\
    \ to emails already synced to your iPod touch without a network connection; however,\
    \ you will need to have network connectivity to send and/or receive email from\
    \ your iPod touch. Check out [Chapter 4](#Chapter04.html#ch4): “Connect to the\
    \ Network” to learn more. Also, check out the “Reading the Top Connectivity Status\
    \ Icons” section in the Quick Start Guide in [Part I](#Part01.html#p1).\n\n**TIP:**\
    \ If you are taking a trip, simply download all your email before you get on the\
    \ airplane; this lets you read, reply, and compose your messages while offline.\
    \ All emails will be sent after you land and re-establish your connection to the\
    \ Internet."
