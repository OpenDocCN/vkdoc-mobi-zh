  trans: "\n### 在 iPod Touch 上设置电子邮件\n\n如前所述，你可以在 iPod touch 上通过两种方式设置你的电子邮件账户：\n\n\
    1.  直接在 iPod touch 上设置你的电子邮件账户。\n2.  使用 iTunes 同步电子邮件帐户设置。\n\n第一种方式，直接在 iPod touch\
    \ 上设置电子邮件账户，适合在 iPod touch 上进行特殊设置的情况，例如通过 Exchange 使用 Gmail。如果你在 Windows 或 Mac\
    \ 电脑上不使用电子邮件程序，这也是一种好方法。\n\n如果你在 Windows 或 Mac 电脑上已经设置了许多 POP3 或 IMAP 账户，你也可以选择通过\
    \ iTunes 经由 USB 底座连接线来同步它们。\n\n#### 为电子邮件账户输入密码\n\n在第 3 章中，我们向你展示了如何将电子邮件帐户设置同步到\
    \ iPod touch。同步完成后，你应该能够通过打开`设置`应用来查看 iPod touch 上的所有电子邮件账户。你只需要做的就是输入每个账户的密码。\n\
    \n要为每个同步的电子邮件账户输入密码，请按照以下步骤操作：\n\n1.  轻点`设置`图标。\n2.  轻点`邮件、通讯录、日历`选项。\n3.  在`账户`下，你应该能看到所有已同步的电子邮件帐户列表。\n\
    4.  轻点列表中的任一电子邮件帐户，输入其密码，然后轻点`完成`。\n5.  如果所有信息都正确输入，将会出现勾选标记，你的账户将被启用。\n6.  对所有列出的电子邮件帐户重复此操作。\n\
    \n#### 在 iPod Touch 上添加新电子邮件账户\n\n要在 iPod touch 上添加新的电子邮件账户，请按照以下步骤操作：\n\n1. \
    \ 轻点`设置`图标。\n\n    ![图片](img/p309-01.jpg)\n\n2.  轻点`邮件、通讯录、日历`选项。\n3.  在你的电子邮件帐户下方轻点`添加账户`。\n\
    \n    如果你尚未设置任何帐户，你将只看到`添加账户`选项。\n\n    **提示：** 要编辑任何电子邮件帐户，只需轻点该账户即可。\n\n4. \
    \ 在此屏幕上选择要添加的电子邮件帐户类型：\n\n    ![图片](img/p309-02.jpg)\n\n    *   如果你使用 iCloud 服务，请选择`iCloud`。\n\
    \    *   如果你使用 Microsoft Exchange 电子邮件服务器，请选择`Microsoft Exchange`。\n    *   如果你使用\
    \ Google 日历和 Google 通讯录来存储个人信息，并且希望将它们无线同步到 iPod touch，你也应该选择`Microsoft Exchange`。\n\
    \n    **注意：** 我们将在第 3 章中向你展示如何设置 Google/Microsoft Exchange 和 iCloud：“与 iCloud、iTunes\
    \ 及更多服务同步”。\n\n    *   如果你使用 Google 电子邮件，但*不*（或*不想*）与你的`Google 通讯录`进行无线同步，请选择`Gmail`。\n\
    \    *   如果你使用 Yahoo!, AOL, 或 Windows Live Hotmail 这些服务，请选择它们。\n    *   如果以上都不适用，并且你想同步标准的\
    \ POP 或 IMAP 电子邮件帐户，请选择`其他`。最后，在下一个屏幕上选择`添加邮件账户`。\n\n5.  在`姓名`栏中输入你希望收件人在收到你的邮件时看到的姓名。\n\
    \n    ![图片](img/p310-01.jpg)\n\n6.  接下来，在`地址`、`密码`和`描述`栏中输入相应的信息。\n7.  轻点右上角的`下一步`按钮。\n\
    \n##### 指定接收和发送服务器\n\n有时，iPod touch 无法自动设置你的电子邮件帐户。在这种情况下，你需要手动输入更多设置来启用你的电子邮件帐户。\n\
    \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和电子邮件设置来找到相关设置。\n\n如果 iPod touch 仅凭你的电子邮件地址和密码无法登录到你的服务器，你将会看到一个类似于此的屏幕。\n\
    \n![图片](img/p311-01.jpg)\n\n在`接收邮件服务器`下，将相应的信息输入到`主机名`、`用户名`和`密码`栏中。通常，你的接收邮件服务器类似于\
    \ `mail.*你的 ISP 名称*.com`。\n\n要调整你的发送服务器名称，请轻点`发送邮件服务器`。你可以在下一个屏幕上调整发送邮件服务器。这些服务器名称通常看起来像\
    \ `smtp.*你的 ISP 名称*.com` 或 `mail.*你的 ISP 名称*.com`。\n\n你可以尝试将`服务器名称`和`密码`栏留空。如果不行，你随时可以返回并更改它们。\n\
    \n系统可能会询问你是否要使用 SSL（安全套接层），这是一种你的电子邮件提供商可能要求的发送邮件安全类型。如果你不确定是否需要 SSL，只需与你的电子邮件提供商核对邮件设置即可。\n\
    \n**提示：** 作者建议尽可能使用 SSL 安全连接。如果你不使用 SSL，你的登录凭据、邮件以及任何私人信息将以纯文本（未加密）形式发送，从而让窥探者有机可乘。\n\
    \n##### 验证你的账户是否已设置成功\n\n一旦所有信息输入完毕，iPod touch 将尝试配置你的电子邮件帐户。你可能会收到一条错误消息；如果发生这种情况，你需要检查你输入的信息。\n\
    \n![图片](img/p311-02.jpg)\n\n如果你进入显示所有电子邮件帐户的屏幕，请查找新的账户名称。\n\n![图片](img/p312-01.jpg)\n\
    \n如果你看到了它，说明你的账户已正确设置。\n\n##### 修复“无法获取邮件”错误\n\n如果你轻点`邮件`图标并收到一条错误消息，提示“无法获取邮件\
    \ — 未提供 *(你的账户)* 的密码”，你需要输入你的密码。\n\n![图片](img/p312-02.jpg)\n\n请查阅本章中“为从 iTunes\
    \ 同步的电子邮件帐户输入密码”部分以获取帮助。\n\n#### 邮箱屏幕 — 收件箱和账户\n\n顶层屏幕是你的`邮箱`屏幕。你可以通过轻点左上角的按钮随时进入该屏幕。继续轻点这个左上角的按钮，直到你不再看到其他按钮为止。这时，你就进入了`邮箱`屏幕。\n\
    \n从`邮箱`屏幕，你可以访问以下项目：\n\n*   **统一收件箱：** 通过轻点`所有收件箱`进行访问。\n*   **每个单独账户的收件箱：** 通过在`收件箱`部分轻点该电子邮件帐户名称进行访问。\n\
    \n    ![图片](img/p313-01.jpg)\n\n*   **账户部分中每个电子邮件帐户的文件夹**：通过轻点账户名称查看所有文件夹进行访问。\n\
    \n    ![图片](img/p313-02.jpg)\n\n#### 添加或编辑电子邮件文件夹或邮箱\n\n借助 iOS 5，如果你使用 iCloud\
    \ 同步的邮件帐户，或者你的邮件服务器支持此功能，你现在可以直接在 iPod touch 上添加或编辑电子邮件文件夹。例如，你想更改邮件文件夹名称或添加新邮件文件夹来更好地整理收件箱中的邮件。一个例子是创建一个名为“需要关注”的新文件夹，并将所有那些你暂时无法处理、但需要确保回到办公桌后处理的电子邮件放进去。要在你的设备上添加或编辑邮箱，请按照以下步骤操作：\n\
    \n1.  **从邮箱屏幕滚动到底部，并轻点“账户”下列出的任一电子邮件帐户。**\n\n    ![图片](img/p314-01.jpg)\n\n2.\
    \  在本示例中，我们将编辑 iCloud 账户邮箱。在此屏幕上轻点右上角的`编辑`。\n\n    ![图片](img/p314-02.jpg)\n\n\
    3.  然后，你可以执行以下操作：\n\n    ![图片](img/p314-03.jpg)\n\n    *   轻点底部的`新建邮箱`来创建一个新邮箱。\n\
    \    *   轻点任意邮箱文件夹以编辑其名称或将其删除。\n"
- fmt: '### Inbox, Flagged (Marked) and Threaded Messages


    You will notice that any unread messages are marked with a blue dot ![Images](images/p315-01.jpg)
    to the left of the message.


    You will also notice that some messages show a number and a right-facing arrow
    (`>`) to the right of the message, like this: ![Images](images/p315-02.jpg). This
    shows that there are **three** related messages (replies and forwards) to the
    message shown.


    ![Images](images/p315-03.jpg)


    Messages that are marked have a little flag to the left of them like this: ![Images](images/p315-04.jpg)


    Tap any message to open it. The only time it will not open is if there are related
    messages. In that case, you will first see a screen with all the related messages.
    Tap any of those messages to open and view it.


    To leave the **Inbox** view, tap the button in the upper-left corner.


    You can tell which email account you are viewing by looking at the button in the
    upper-left corner:


    - If the button says **Mailboxes**, you know you are looking at all your inboxes
    together.

    - If the button says an account name, such as **iCloud** or **Exchange**, then
    you know you are only looking at the inbox for that account.


    #### Move, Delete, or Mark (Flag) Multiple Messages


    If you want to move or delete several messages at once, you can do so from the
    Inbox screen. Follow these steps to delete multiple messages at once:


    ![Images](images/p316-01.jpg)


    1. Tap the **Edit** button in the upper-right corner while you are viewing an
    Inbox screen.

    2. Tap to select the desired messages; a red Checkmark icon next to a message
    indicates it is selected.

    3. To delete the messages, tap the **Delete** button at the bottom.

    4. To move the messages to another folder, tap the **Move** button and select
    the folder.

    5. To **Mark** a message with a Flag or as Unread, tap the **Mark** button. Unread
    will put the blue dot back next to the message. If you flag a message you will
    see a little flag appear next to it like this: ![Images](images/p316-02.jpg)


    ### Viewing an Individual Message


    When you tap a message from the **Inbox** screen, you see the **Main** message
    view. You can look at messages in both portrait and landscape modes, see [Figure
    16-1](#Chapter16.html#fig_16_1). Portrait mode will typically display more text.
    Landscape mode will typically let you enjoy bigger text and images.


    ![images](images/1601.jpg)


    **Figure 16-1.** *Viewing email messages in portrait and landscape modes.*


    **TIP:** If you are setting your iPod touch down on a desk or holding it in your
    lap, then you may want to use the **Portrait Lock** icon to lock your view in
    Portrait (vertical) mode. This will prevent the image from flipping around unnecessarily.
    To lock the view, follow these steps:


    1. Double-tap the **Home** button and swipe left to right.

    2. Tap the **Portrait Lock** button to lock the screen in Portrait mode.


    ### Composing and Sending Emails


    To launch the email program, tap the **Mail** icon on your **Home** screen.


    **TIP:** If you left the **Mail** app while viewing a particular email, list of
    folders, or an account, then you will be returned directly to that same location
    when you return to the **Mail** app.


    If you are going into your email for the first time, you may see an empty inbox.
    Hit the **Refresh** button ![Images](images/p318-01.jpg) in the lower-left corner
    of the window to retrieve the latest email. The iPod touch will begin to check
    for new mail and then display the number of new messages for each account.


    #### Composing a New Email Message


    When you start the **Mail** program, your first screen should be your **Accounts**
    screen. At the bottom-right corner of the screen, you will see the **Compose**
    icon. Touch the **Compose** icon to start creating a new message.


    ![Images](images/p318-02.jpg)


    #### Addressing Your Message—Choose the Recipients


    You have a few options for selecting recipients, depending on whether the person
    is in your **Contacts** list on your iPod touch:


    ![Images](images/p318-03.jpg)


    **Option 1**: Type a few letters of someone’s first name; hit the **Space** key,
    and then type a few letters of that person’s last name. The person’s name should
    appear in the list; tap that person’s name to select that contact.


    **Option 2**: Type an email address. Notice the **@** and **Period** (` . `) keys
    on the bottom, which help your typing.


    **TIP:** Press and hold the **period** key to see `.com`, `.edu`, `.org`, and
    other email domain name suffixes.


    ![Images](images/p319-01.jpg)


    **Option 3**: Hit the **Plus Sign** (`+`) ![Images](images/p319-02.jpg) to view
    your entire **Contacts** list and search or select a name from it.


    If you want to use a different contact group, tap the **Groups** button in the
    upper-left corner.


    Double-tap **Contacts** at the top of the screen to see the **Search** window.
    Next, type a few letters to search for your contact.


    ![Images](images/p319-03.jpg)


    ##### Deleting a Recipient


    If you need to delete a name from the recipient list (**To:**, **Cc:**, or **Bcc:**),
    tap the name to select it ![Images](images/p319-04.jpg) and hit the **Backspace**
    key. ![Images](images/p318-05.jpg)


    **TIP:** If you want to delete the last recipient you typed (and the cursor is
    sitting next to that name), hit the **Delete** key once to highlight the name
    and hit it a second time to delete it.


    ##### Adding a CC or BCC Recipient


    ![Images](images/p320-01.jpg) To add a carbon copy (**Cc:**) or blind carbon copy
    (**Bcc:**) recipient, you need to tap the **Cc:** or **Bcc:** field just under
    the **To:** field at the top of the email message. Doing so opens up the tapped
    field.


    ![Images](images/p320-02.jpg)


    ##### Moving Recipients


    If you originally add a recipient as the **To:** field, but change your mind and
    decide you’d rather add her to a **Cc:** or **Bcc:** field (or vice versa), then
    simply tap and hold the recipient’s name and drag it to the preferred field.


    ![Images](images/p320-03.jpg)


    #### Changing the Email Account to Send From


    If you have more than one email account set up, the iPod touch will use whichever
    account is set as the default account. (This is set in **Settings** > **Mail,
    Contacts, Calendars** > **Default Account** at the bottom of the **Mail** section.)


    ![Images](images/p320-04.jpg)


    Follow these steps to change the email account you send from:


    1. Tap an email’s **From:** field to highlight it.

    2. Tap the **From:** field again to see a list of your accounts in a scroll wheel
    at the bottom of the screen.

    3. Scroll up or down, and then tap a new email account to select it.

    4. Tap the **Subject** field to finish changing the email address you send from.


    #### Typing Your Subject


    Now you need to enter a subject for your email. Follow these steps to do so:


    ![Images](images/p321-01.jpg)


    1. Touch the **Subject:** line and enter text for the **Subject:** field of the
    email.

    2. Press the **Return** key or tap the **Body** section of the email to move the
    cursor to the **Body** section.'
