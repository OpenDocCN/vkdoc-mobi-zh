- fmt: "# Typing Your Message\n\nNow that the cursor is in the **Body** section of\
    \ the email (under the subject line), you can start typing your email message.\n\
    \n**CAUTION:** There is only one email signature on your iPod touch, which gets\
    \ automatically applied to each message you send from your iPod touch—even if\
    \ you have multiple email accounts set up. So, be careful if you are running two\
    \ different businesses or don’t want your personal email signature to go to all\
    \ your business contacts. It’s probably best to make your email signature fairly\
    \ generic.\n\n## Formatting Text, Defining Words, Quoting Text and More\n\nYou\
    \ can tap any text to highlight it, use the blue handles to expand the selection.\
    \ Then using the popup menu above the selection, you can do any of the following:\n\
    \n![Images](images/p322-01.jpg)\n\n- **Tap Cut, Copy or Paste to perform those\
    \ functions.**\n- **Tap Suggest if the word is underlined and you want to correct\
    \ the spelling.**\n- **Tap the triangle at the right edge to see more options.**\n\
    - Tap B / U to adjust formatting to **Bold**, **Italics** or **Underline**.\n\
    \  ![Images](images/p322-02.jpg)\n\n  ![Images](images/p322-03.jpg)\n\n- Tap **Define**\
    \ to look the selected word up in the dictionary.\n- Tap **Speak** to have the\
    \ word spoken to you.\n- Tap **Quote Level** to increase or decrease the quote\
    \ level of the selected text.\n\n## Email Signatures\n\nThe default email signature\
    \ is shown in the image to the right: **Sent from my iPod touch**.\n\n**TIP:**\
    \ You can change this signature to be anything you want; see the “Changing Your\
    \ E-Mail Signature” section later in this chapter to learn how to change your\
    \ e-mail signature.\n\n# Keyboard Options\n\nWhile you are typing, remember you\
    \ have two keyboard options: the smaller **Portrait** (vertical) keyboard and\
    \ the larger **Landscape** (horizontal) keyboard, see [Figure 17-2](#Chapter17.html#fig_17_2).\n\
    \n![images](images/1602.jpg)\n\n**Figure 16-2.** *Turn your device on its side\
    \ to get the larger landscape keyboard.*\n\n**TIP:** If you have larger hands,\
    \ it might be easier to type when the keyboard is larger. Once you get the hang\
    \ of typing on the larger keyboard with two hands, you will find that it is much\
    \ faster than typing with one finger. See [Chapter 2](#Chapter02.html#ch2): “Typing,\
    \ Copy and Search” for more typing tips.\n\n# Auto-Correction and Auto-Capitalization\n\
    \nAs you type, you will notice that some words will be auto-capitalized and automatically\
    \ corrected. Red underlined words are flagged as misspelled by the spelling checker.\
    \ See [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search” to learn how\
    \ these all functions work; this chapter also provides some additional typing\
    \ tips.\n\n# Send Your Email\n\nOnce you have typed your message, tap the blue\
    \ **Send** button in the top-right corner.\n\n![Images](images/p324-01.jpg)\n\n\
    Your email will be sent, and you should hear the iPod touch’s sent mail sound,\
    \ which confirms that your email was sent. You can learn how to enable or disable\
    \ this sound in the “Adjusting Sounds on your iPod touch” section of [Chapter\
    \ 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\n## Save As Draft to Send\
    \ Later\n\nIf you are not ready to send your message, but want to save it as a\
    \ draft message to send later, follow these steps:\n\n![Images](images/p324-02.jpg)\n\
    \n1.  Compose your message, as described earlier.\n2.  Press the **Cancel** button\
    \ in the upper-left corner.\n3.  Select the **Save Draft** button at the bottom\
    \ of the screen.\n\nLater, when you want to locate and send your draft message,\
    \ follow these steps:\n\n1.  Open the **Drafts** folder in the email account from\
    \ which you composed this message. See the “Moving Around in Mail Folders” section\
    \ earlier in this chapter for help getting into the **Drafts** folder.\n2.  Tap\
    \ the email message in the **Drafts** folder to open it.\n3.  Tap anywhere in\
    \ the message to edit it.\n4.  Tap the **Send** button.\n\n## Checking Sent Messages\n\
    \nFollow these steps to confirm that the email was sent correctly:\n\n![Images](images/p325-01.jpg)\n\
    \n1.  Tap the **Email account name** button in the upper-left corner to see the\
    \ mail folders for the account you just used to send your message.\n2.  Tap the\
    \ **Sent** folder.\n3.  Verify that that the top email you see in the list is\
    \ the one you just composed and sent.\n\n**NOTE:** You will only see the **Sent**\
    \ and **Trash** folders if you have actually sent or deleted email from that account\
    \ on the iPod touch. If your email account is an IMAP account, you may see many\
    \ folders other than those described in this chapter.\n\n# Reading and Replying\
    \ to Mail\n\nFollow these steps to read your email:\n\n1.  Navigate to the inbox\
    \ of the email account you want to view using the steps described earlier in this\
    \ chapter.\n2.  To read any message, just touch it from your inbox.\n\n    ![Images](images/p326-01.jpg)\n\
    \n3.  New, unread messages are shown with a small blue dot to the left of the\
    \ message.\n4.  Flick your finger up or down in the inbox to scroll through your\
    \ messages.\n5.  When you are reading a message, swipe up or down to scroll through\
    \ it.\n\n## Marking Messages as Unread or Flagged\n\nIf you read a message but\
    \ want to make sure you can quickly find it again later, you can choose to click\
    \ either `Mark as Unread` or `Flag`, so it gets your attention later.\n\nFollow\
    \ these steps to Mark a message:\n\n![Images](images/p326-02.jpg)\n\n1.  Tap the\
    \ word **Mark** located to the right of the time and date.\n2.  Choose **Flag**\
    \ or **Mark as Unread** from the slide up menu.\n\nA message you Flag will have\
    \ a small red Flag icon to the left of the `Mark` text. A message you Mark as\
    \ Unread will have a small blue dot to the right of the `Mark` text.\n\nTo **Unmark**\
    \ a message:\n\n![Images](images/p327-01.jpg)\n\n1.  Tap the word **Mark** located\
    \ to the right of the time and date\n2.  Choose **Unflag** or **Mark as Read**\
    \ from the slide up menu.\n\n## Zooming In or Out\n\nAs when browsing the Web,\
    \ you can zoom in to see your email in larger text. You can also double-tap, just\
    \ as you do on the Web; and you can also **Pinch** to zoom in or out (see the\
    \ “Zooming” section in the Quick Start Guide in [Part 1](#Part01.html#p1) of this\
    \ book for more information on these features).\n\n# Email Attachments\n\nSome\
    \ email attachments are opened automatically by the iPod touch, so you don’t even\
    \ notice that they were attachments. Examples of these include Adobe’s portable\
    \ document format (PDF) files (used by **Adobe Acrobat** and **Adobe Reader**,\
    \ among other apps) and some types of image, video, and audio files. You may also\
    \ receive documents as attachments, such as Apple’s **Pages**, **Numbers**, and\
    \ **Keynote** files; or Microsoft’s **Word**, **Excel**, and **PowerPoint** files.\
    \ You will need to open these manually.\n\n## Knowing When You Have an Attachment\n\
    \nAny email with an attachment will have a little **Paperclip** icon next to the\
    \ sender’s name, as shown to the right. When you see that icon, you know you have\
    \ an attachment.\n\n![Images](images/p327-02.jpg)\n\n## Receiving an Auto-Open\
    \ Attachment\n\nSome types of email attachments, like images, Quicktime movies,\
    \ and single-page PDF files are usually opened and displayed and displayed for\
    \ you inline in the mail message.\n\n![Images](images/p328-01.jpg)\n\n**TIP:**\
    \ If you want to save or copy an auto-opened attachment, simply press and hold\
    \ it until you see the pop-up window. At this point, you can select **Copy** or\
    \ **Save Image**. When you save an image, it will be placed in your **Photos**\
    \ app in the **Camera Roll** album."
