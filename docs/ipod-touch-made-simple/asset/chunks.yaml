- fmt: "#### Access the Fast App Switcher by Double-Clicking the Home Button\n\nAccessing\
    \ the Fast App Switcher is as simple as double-clicking the `Home` button.\n\n\
    1. While in any app or from the `Home` screen, double-click the `Home` button.\n\
    2. The screen will slide up and you will see a small bar of icons appear in the\
    \ bottom row. These represent the apps that you have started since you powered\
    \ on your iPod touch.\n3. Tap any icon to switch back to that app.\n4. Swipe your\
    \ finger to the left to see more apps.\n5. Swipe your finger to the right to see\
    \ the orientation lock and media controls.\n6. Swipe your finger to the right\
    \ again to see the volume control and AirPlay button.\n\nFollow these steps to\
    \ access the Fast App Switcher from a given app:\n\n![images](images/p51-01.jpg)\n\
    \n#### Volume Keys\n\nOn the upper-left side of the iPod touch (see [Figure 1-5](#Chapter01.html#fig_1_5)),\
    \ you can see some simple `Volume Up/Volume Down` keys that you will find very\
    \ handy.\n\n##### Adjusting Playback or iPod touch Voice Volume\n\nYou can use\
    \ the `Volume` keys to raise or lower your iPod touch's volume when you are listening\
    \ to music or a video, enjoying other content, or even on a FaceTime call. When\
    \ listening to music or a video, you can also use the on-screen slider bar to\
    \ adjust volume (see [Figure 1-6](#Chapter01.html#fig_1_6)).\n\n![images](images/0106.jpg)\n\
    \n**Figure 1-6.** *Adjusting the volume on your iPod touch*\n\n**TIP:** When you're\
    \ in the `Camera` app, the `Volume Up` button becomes a camera shutter, allowing\
    \ you to quickly snap a picture.\n\n#### Locking Your Screen in Portrait (Vertical)\
    \ Orientation\n\nIf you tilt your iPod touch on its side, you will notice that\
    \ its screen rotates to Horizontal (Landscape) orientation in some apps. You might\
    \ want this behavior, so you can see the larger `Landscape` keyboard for typing.\
    \ However, there may be times when you don't want your screen to rotate from Portrait\
    \ orientation when you turn your iPod touch on its side. For these occasions,\
    \ you can lock the screen in Portrait orientation.\n\n1. Double-click the `Home`\
    \ button.\n2. Swipe left to right to see the media and screen lock controls.\n\
    3. Touch the `Portrait Orientation Lock` button in the icon on the left.\n4. To\
    \ disable the lock, tap the same button again.\n\n**TIP:** The orientation lock\
    \ feature can be a great way to read iBooks in bed. If you prefer the larger page\
    \ view in Portrait mode, enable the Portrait Orientation Lock feature. This way,\
    \ when you set your iPod touch on your lap or hold it almost flat, the screen\
    \ will not accidentally rotate to Landscape mode. For more information, check\
    \ out [Chapter 12](#Chapter12.html#ch12): \"iBooks and e-Books.\"\n\n#### Adjusting\
    \ or Disabling the Auto-Lock Time-Out Feature\n\nYou will notice that your iPod\
    \ touch will auto-lock and go into Sleep mode (i.e., the screen will go blank)\
    \ after a short amount of time. You can change how long it takes your iPod touch\
    \ to enter Sleep mode or even disable this feature altogether inside the `Settings`\
    \ app. Follow these steps to do so:\n\n1. Touch the `Settings` icon from your\
    \ `Home` screen.\n2. Touch `General`.\n3. Touch `Auto-Lock`.\n4. You will see\
    \ your current sleep interval setting next to the `Auto-Lock` option on this page.\
    \ The default setting is that the iPod touch locks after three minutes of sitting\
    \ idle (to save battery life). You can set this interval to `1 Minute`, `2 Minutes`,\
    \ `3 Minutes`, `4 Minutes`, `5 Minutes`, or `Never`.\n5. Touch the desired setting\
    \ to select it—you know it's selected when you see a checkmark next to it.\n6.\
    \ Finally, touch the `General` button in the upper-left corner to get back to\
    \ the `General` screen. You should now see your change reflected next to the `Auto-Lock`\
    \ setting.\n\n**BATTERY LIFE TIP:** Setting the `Auto-Lock` feature to a shorter\
    \ interval (e.g., `1 Minute`) will help you save battery life.\n\n#### Adjusting\
    \ the Date, Time, Time Zone, and 24-Hour Format\n\nUsually, the date and time\
    \ is either set for you or adjusts when you connect your iPod touch to your computer;\
    \ you can learn more about this in [Chapter 3](#Chapter03.html#ch3): \"Sync with\
    \ iCloud, iPod touch and More.\" However, you can manually adjust your date and\
    \ time quite easily. You may want to do this when you are traveling with your\
    \ iPod touch and need to adjust the time zone when you land. Follow these steps\
    \ to do so:\n\n1. Touch the `Settings` icon.\n2. Touch `General`.\n3. Scroll down\
    \ and touch `Date & Time` to see the `Date & Time` settings screen.\n4. If you\
    \ prefer to see `09:30` and `14:30` instead of `9:30 AM` and `2:30 PM`, respectively,\
    \ then tap the `24-Hour Time` option to set its switch to `ON`.\n\n    ![images](images/p53-01.jpg)\n\
    \n5. To set the date and time manually, you have to turn off the automatic time\
    \ setting feature. Tap the switch next to `Set Automatically` to set this option\
    \ to `OFF`.\n\n    ![images](images/p54-01.jpg)\n\n6. To set your time zone, tap\
    \ `Time Zone` and type in the name of a major city in your time zone. The iPod\
    \ touch will show you matching city names as you type.\n\n    ![images](images/p54-02.jpg)\n\
    \n7. When you see the correct city in your time zone, tap it to select it. In\
    \ the image here, we typed the first few letters of \"Chicago\" until we saw it\
    \ appear. Next, we tapped `Chicago, U.S.A.` to select it.\n8. After selecting\
    \ the city, you are brought back to the main `Date & Time` screen with your selected\
    \ city shown next to the `Time Zone` option.\n9. Tap `Set Date & Time` to adjust\
    \ your date and time.\n\n    ![images](images/p54-03.jpg)\n\n10. On this screen\
    \ you can set the date and time. To adjust the date, tap the `Date` button shown\
    \ at the top of the screen.\n11. To adjust the time, tap the `Time` button shown\
    \ at the top of the screen.\n12. You can then adjust the date and time by touching\
    \ and sliding the `Date` and `Time` wheels up or down, as shown in the image here.\n\
    13. When you are done, tap the `Date & Time` button in the upper-left corner.\n\
    \n![images](images/p55-01.jpg)\n\n#### Adjusting the Brightness\n\nYour iPod touch\
    \ has an Auto-Brightness control available; this feature is turned on by default.\
    \ This feature uses the built-in light sensor to adjust the brightness of the\
    \ screen. When it is darker outside or at night, then the Auto-Brightness control\
    \ will dim the screen. When it is bright and sunny, the screen will be automatically\
    \ brightened, so it is easier to read. Generally, we advise that you keep this\
    \ feature set to `ON`.\n\nIf you want to adjust the brightness, use the controls\
    \ in your `Settings` app. Follow these steps to do so:\n\n1. From your `Home`\
    \ screen, touch the `Settings` icon.\n\n    ![images](images/p55-02.jpg)\n\n2.\
    \ Touch `Brightness` and move the slider control to adjust the brightness.\n3.\
    \ Click the switch next to `Auto-Brightness` to toggle it `ON` or `OFF`.\n\n![images](images/p55-02.jpg)\n\
    \n**TIP:** Setting the `Brightness` option to a lower value will help you save\
    \ battery life. A little less than halfway across seems to work fine."
