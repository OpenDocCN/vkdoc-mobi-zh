    \n## About the Authors\n\n![image](images/martin_trautschold.jpg)**Martin Trautschold**\
    \ is the founder and CEO of Made Simple Learning, a leading provider of Apple\
    \ iPad, iPhone, iPod touch, and BlackBerry books and video tutorials. He has been\
    \ a successful entrepreneur in the mobile device training and software business\
    \ since 2001. His newest venture, 1 800 Notify, offers automated appointment reminder\
    \ services to physicians and is being very well received. With Made Simple Learning,\
    \ he helped to train thousands of iPhone, iPad and BlackBerry Smartphone users\
    \ with short, to-the-point video tutorials. Martin has now co-authored eighteen\
    \ “Made Simple” guide books. Prior to this, Martin spent 15 years in technology\
    \ and business consulting in the US and Japan. He holds an engineering degree\
    \ from Princeton University and an MBA from the Kellogg School at Northwestern\
    \ University. Martin and his wife, Julia, have three daughters, Sophie, Olivia\
    \ and Cece. He enjoys rowing with the Halifax Rowing Association and cycling.\
    \ Martin can be reached at [`martin@madesimplelearning.com`](http://martin@madesimplelearning.com).\n\
    \n![image](images/rene_ritchie.jpg)**Rene Ritchie** is editor-in-chief of TiPb.com,\
    \ one of the largest and most influential iPhone, iPod touch, and iPad web sites\
    \ in the world. Part of the Mobile Nations network, TiPb provides daily news,\
    \ how-tos, and app and accessory reviews to help you get the most out of your\
    \ iOS devices. Rene is also co-host over several Mobile Nations shows, including\
    \ iPhone Live, iPad Live, Iterate for mobile design and development, ZENandTECH\
    \ to help center your inner geek, and Superfunctional to keep you healthy and\
    \ moving. Prior to this, Rene worked in product marketing, design, and web development.\
    \ He can be reached on Twitter `@reneritchie` or by email at [`rene@mobilenations.com`](http://rene@mobilenations.com).\n\
    \n![image](images/gary_mazo.jpg)**Gary Mazo** is Vice President of Made Simple\
    \ Learning. He is also a writer, college professor, gadget nut, and ordained rabbi.\
    \ Gary joined Made Simple Learning in 2007 and has co-authored the last thirteen\
    \ books in the Made Simple series. Along with Martin and Kevin Michaluk from CrackBerry.com,\
    \ Gary co-wrote *CrackBerry: True Tales of BlackBerry Use and Abuse*—a book about\
    \ BlackBerry addiction and how to get a grip on one's BlackBerry use. The second\
    \ edition of this book will be published by Apress this fall. Gary also teaches\
    \ writing, philosophy, technical writing, and more at the University of Phoenix.\
    \ Gary has been a regular contributor to CrackBerry.com, writing product reviews\
    \ and adding editorial content. He holds a BA in anthropology from Brandeis University.\
    \ Gary earned his M.A.H.L (Masters in Hebrew Letters), as well as ordination as\
    \ Rabbi, from the Hebrew Union College-Jewish Institute of Religion in Cincinnati,\
    \ Ohio. He has served congregations in Dayton, Ohio; Cherry Hill, New Jersey;\
    \ and Cape Cod, Massachusetts. Gary is married to Gloria Schwartz Mazo, and they\
    \ have six children. Gary can be reached at [`gary@madesimplelearning.com`](http://gary@madesimplelearning.com).\n\
    \n## About the Technical Reviewer\n\n![image](images/leanna_lofte.jpg)**Leanna\
    \ Lofte** is the App Editor for TiPb.com, the iPhone, iPad, and iPod touch blog,\
    \ where she has been writing since 2009. She is responsible for TiPb's app content,\
    \ including news, updates, giveaways, and reviews. Leanna also has a master's\
    \ degree in Mathematics from the University of Denver and teaches college-level\
    \ mathematics. She can be reached on Twitter `@llofte` or by email at [`leanna@tipb.com`](http://leanna@tipb.com).\n\
    \n## Part I"
