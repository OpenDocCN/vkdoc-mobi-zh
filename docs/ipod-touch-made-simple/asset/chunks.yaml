    in to your Kindle account or create a new account with a user name and password.


    ![images](images/p255-01.jpg)


    Once you sign in, you will see your Kindle books on the **Home** page. You can
    touch a book to start reading it.


    ![images](images/p255-02.jpg)


    **NOTE**: In order to buy or download new books, you need to go to [`www.amazon.com`](http://www.amazon.com)
    in the **Safari** web browser. Once you''ve bought or downloaded a new book to
    your account, it will appear in the **Kindle** app.


    To read a Kindle book, touch its cover and it will open.


    To see the options for reading, just touch the screen and they will be shown along
    the bottom row of icons.


    You can add a bookmark by touching the **Plus** (**+**) button. Once the bookmark
    is set, the **Plus** (**+)** button turns into to a **Minus** (**−**) button.


    You can go to the cover, table of contents, or beginning of the book (or specify
    any other location in the book) by touching the **Book** button.


    The font, as well as the color of the page, can be adjusted. One very interesting
    feature is the ability to change the page to **Black**—which is great when reading
    at night.


    ![images](images/p256-01.jpg)


    To advance pages, either swipe from right to left or touch the right side of the
    page. To go back a page, just swipe from left to right or touch the left side
    of the page.


    Tap the screen and a slider appears at the bottom; you can move this to advance
    to any page in the book.


    To return to your list of books, just touch the **Home** button.


    #### The Kobo Reader


    Like the **Kindle** reader, the **Kobo** reader begins by asking you to sign into
    your existing Kobo Books account. All of your existing Kobo Books will then be
    available for reading.


    **Kobo**''s **Shelf** view uses a bookshelf metaphor, similar to the one used
    by **iBooks**. Tap the book cover for whichever book you wish to open.


    Or, you can touch the **List** tab to see your books organized in a **List** view.


    ![images](images/p257-01.jpg)


    Open any book, and you will see two buttons along the top of the Kobo reader:
    **I''m Reading** and **Settings**.


    ![images](images/p257-02.jpg)


    Touching the **I''m Reading** button places a bookmark where you left off in the
    book and returns the screen to your **Shelf** view.


    Touching the **Settings** button will display a series of buttons along the bottom
    of the screen for viewing bookmarks, seeing information about the book, and adjusting
    the page transition style and font. Under those buttons are four icons: **Font**,
    **Brightness**, **Screen Lock**, and **Nighttime Reading**. Touch any of these
    buttons to make adjustments to your viewing experience.


    ![images](images/p257-03.jpg)


    To advance pages in the **Kobo** reader, touch the right side of the page. To
    go back a page, just touch the left side of the page. You can also use the slider
    at the bottom to advance through the pages.


    ## Chapter 13


    ## Newsstand and More


    In the last chapter, we spoke about how the iPod touch has revolutionized the
    world of reading with iBooks. Not only is the iPod touch unparalleled for reading
    e-books, it''s Newsstand folder is unequaled in dealing with new media such as
    online newspapers and magazines. Plus, the App Store makes it easy to find comic
    books readers, PDF readers, and more. The iPod touch is even set to revitalize
    the comic book industry with comic books that look beautiful and are amazingly
    interactive.


    In this chapter, we''ll explore how to enjoy new media using the iPod touch''s
    vivid screen and terrific touch interface.


    ### Newsstand


    The Newsstand is a special folder on your iPod touch''s Home screen that looks
    like a bookshelf and collects and organizes all your magazine and newspaper apps.
    This folder does not behave like a regular iPod touch folder. If a magazine or
    newspaper app supports Newsstand, then it will show you the latest cover art or
    front page for that periodical sitting on the shelf, rather than the Newsstand
    Folder icon (you will also see this cover or front page in the Fast App Switcher).


    If the magazine or newspaper app offers subscriptions and you''re a subscriber,
    then Newsstand apps can also automatically download the latest issues overnight,
    so you have something new to read when you open it in the morning.


    ![images](images/p259-01.jpg)


    The Newsstand folder also has a **Store** button that takes you to a special section
    of the App Store. This section lists all the magazine and newspaper apps that
    currently support Newsstand.


    Other than the special presentation and ability to download new issues automatically,
    a Newsstand app otherwise functions just like any other app.


    **NOTE:** It''s up to each magazine and newspaper app to add Newsstand support.
    At the time of writing, many but not all magazine apps have added Newsstand support.
    If an app doesn''t support Newsstand, it will download to the **Home** screen
    and behave just like any regular, non-Newsstand app.


    Also, magazine and newspaper selection can vary greatly by country. Use the **Store**
    button in Newsstand to see the latest selection in your area.'
  trans: '

    ### 其他电子书阅读器：Kindle 与 Kobo


    正如我们之前提到的，`iBooks` 应用提供了无与伦比的电子书阅读体验。不过，iPod touch 上还有其他值得一试的电子书阅读器应用。


    ![images](img/p253-04.jpg)


    许多用户已经拥有 Kindle 并投入了不少资金购买 Kindle 书库。另一些用户则使用 `Kobo` 电子书阅读软件（之前名为 `Shortcovers`），并为该平台建立了自己的藏书库。


    ![images](img/p253-02.jpg)


    幸运的是，这两个电子书平台都在 iPod touch 的 App Store 中提供了对应的应用。下载并安装任一程序后，你都可以登录并在 iPod touch
    上阅读该平台的完整书库。


    **注意**：无论你选择上述哪一种阅读器，只需“登录”，就能看到你的完整书库，并接着上次阅读的进度继续阅读——即使你上次是在其他设备上开始阅读的。


    #### 下载阅读器应用


    下载其他阅读器应用非常简单。只需进入 App Store，点击 `类别`，然后点击 `图书`。在此板块中，你会找到 `Kindle` 和 `Kobo` 应用。这两款应用都是免费的，因此只需点击
    `免费` 按钮即可开始下载其中之一。


    **提示**：如果你知道要找的应用名称，直接按名称搜索通常会更快。


    安装好你所需的阅读器软件后，点击应用图标即可启动它。


    #### Kindle 阅读器


    亚马逊的 Kindle 阅读器是世界上最受欢迎的电子书阅读器。数百万用户拥有 Kindle 图书，而 `Kindle` 应用允许你在 iPod touch
    上阅读这些图书。


    iPod touch 和 iPad 版本的 `Kindle` 应用刚刚更新，支持音频和视频功能，这使得这些版本甚至比 Kindle 硬件设备上的版本更为先进。


    **提示**：如果你有 Kindle 设备，无需担心从 iPod touch 登录的问题。你可以将多台设备关联到同一个账户。在 iPod touch 上的
    `Kindle` 应用中，你可以畅享为 Kindle 购买的所有图书。


    要在 iPod touch 上使用 `Kindle` 应用，只需点击其图标，然后登录你的 Kindle 账户，或使用用户名和密码创建一个新账户。


    ![images](img/p255-01.jpg)


    登录后，你会在 `主页` 上看到你的 Kindle 图书。点击一本书即可开始阅读。


    ![images](img/p255-02.jpg)


    **注意**：若要购买或下载新书，你需要在 `Safari` 浏览器中访问 [`www.amazon.com`](http://www.amazon.com)。当你在账户中购买或下载了一本新书后，它就会出现在
    `Kindle` 应用中。


    要阅读 Kindle 图书，点击封面即可打开。


    要查看阅读选项，只需轻触屏幕，它们就会显示在底部图标栏中。


    你可以通过点击 `加号` （`+`） 按钮来添加书签。书签设置好后，`加号` （`+`） 按钮会变成 `减号` （`−`） 按钮。


    你可以通过点击 `书籍` 按钮，跳转到封面、目录或书开头（或指定书中的任何其他位置）。


    字体以及页面颜色都可以调整。其中一个非常有趣的功能是可以将页面更改为 `黑色`——这在夜间阅读时非常棒。


    ![images](img/p256-01.jpg)


    要翻到下一页，可以从右向左滑动，或轻触页面右侧。要返回上一页，只需从左向右滑动，或轻触页面左侧。


    轻点屏幕，底部会出现一个滑动条；你可以拖动它跳转到书中的任意页面。


    要返回到你的图书列表，只需点击 `主页` 按钮。


    #### Kobo 阅读器


    与 `Kindle` 阅读器类似，`Kobo` 阅读器启动时会要求你登录现有的 Kobo 图书账户。你所有的现有 Kobo 图书随即可供阅读。


    `Kobo` 的 `书架` 视图采用书架式隐喻，与 `iBooks` 使用的风格类似。点击你想打开的任何图书封面。


    或者，你也可以点击 `列表` 标签，以 `列表` 视图查看整理好的图书。


    ![images](img/p257-01.jpg)


    打开任何一本书，你会看到 Kobo 阅读器顶部有两个按钮：`正在阅读` 和 `设置`。


    ![images](img/p257-02.jpg)


    点击 `正在阅读` 按钮会在你读到的地方放置一个书签，并将屏幕返回到你的 `书架` 视图。


    点击 `设置` 按钮会在屏幕底部显示一系列按钮，用于查看书签、查看图书信息，以及调整页面过渡样式和字体。在这些按钮下方，有四个图标：`字体`、`亮度`、`屏幕锁定`
    和 `夜间阅读`。轻触这些按钮中的任何一个，即可调整你的阅读体验。


    ![images](img/p257-03.jpg)


    在 `Kobo` 阅读器中要翻到下一页，轻触页面右侧即可。要返回上一页，只需轻触页面左侧。你也可以使用底部的滑动条来翻阅页面。


    ## 第 13 章


    ## 书报摊及其他


    在上一章中，我们谈到了 iPod touch 如何通过 iBooks 彻底改变了阅读世界。iPod touch 不仅在电子书阅读方面无与伦比，其书报摊文件夹在处理在线报纸和杂志等新媒体方面也独树一帜。此外，App
    Store 使得查找漫画阅读器、PDF 阅读器等应用变得非常容易。iPod touch 甚至准备通过外观精美且互动性极强的漫画书来重振漫画书行业。


    在本章中，我们将探讨如何利用 iPod touch 鲜艳的屏幕和出色的触控界面来享受新媒体。


    ### 书报摊


    书报摊是 iPod touch 主页屏幕上一个外观像书架的的特殊文件夹，用于收集和整理你所有的杂志和报纸应用。这个文件夹的行为与普通的 iPod touch
    文件夹不同。如果某个杂志或报纸应用支持书报摊，那么它会在书架上显示该刊物的最新封面图或头版，而不是显示书报摊文件夹图标（你也会在应用快速切换器中看到这个封面或头版）。


    如果该杂志或报纸应用提供订阅服务，并且你是订阅用户，那么书报摊应用还可以在夜间自动下载最新一期，这样当你早晨打开时就会有新内容可读。


    ![images](img/p259-01.jpg)


    书报摊文件夹还有一个 `商店` 按钮，点击后会带你进入 App Store 的一个特殊区域。此区域列出了所有当前支持书报摊的杂志和报纸应用。


    除了特殊的展示方式和自动下载新刊物的能力外，书报摊应用在功能上与其他应用并无二致。


    **注意**：是否添加书报摊支持，取决于每个杂志和报纸应用本身。在撰写本文时，许多（但非全部）杂志应用已添加书报摊支持。如果某个应用不支持书报摊，它将被下载到
    `主页` 屏幕上，并像任何普通的、非书报摊应用一样运行。


    此外，杂志和报纸的选择因国家/地区而异，差异可能很大。请使用书报摊中的 `商店` 按钮，查看你所在地区的最新选择。

