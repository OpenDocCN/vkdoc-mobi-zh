  trans: "\n#### 通过双击主屏幕按钮访问快速应用程序切换器\n\n访问快速应用程序切换器只需双击`主屏幕`按钮即可。\n\n1.  在任何应用中，或从`主屏幕`界面，双击`主屏幕`按钮。\n\
    2.  屏幕会向上滑动，您会在底部看到一栏小图标。这些代表您自启动 iPod touch 以来打开过的应用程序。\n3.  轻点任意图标即可切换回该应用。\n\
    4.  向左滑动手指可查看更多应用。\n5.  向右滑动手指可查看方向锁定和媒体控制。\n6.  再次向右滑动手指可查看音量控制和 AirPlay 按钮。\n\
    \n按照以下步骤，从某个应用中访问快速应用程序切换器：\n\n![images](img/p51-01.jpg)\n\n#### 音量键\n\n在 iPod\
    \ touch 的左上侧（参见图 1-5），您可以看到一些简单的`音量增大/音量减小`键，它们用起来会非常方便。\n\n##### 调节播放音量或 iPod\
    \ touch 语音音量\n\n您可以使用`音量`键来调高或调低 iPod touch 的音量，无论您是在听音乐、看视频、欣赏其他内容，还是在接听 FaceTime\
    \ 通话。听音乐或看视频时，您也可以使用屏幕上的滑块条来调节音量（参见图 1-6）。\n\n![images](img/0106.jpg)\n\n**图 1-6.**\
    \ *在 iPod touch 上调节音量*\n\n**提示：** 当您在`相机`应用中时，`音量增大`按钮会变成相机快门，让您快速拍照。\n\n####\
    \ 锁定屏幕为竖排（垂直）方向\n\n如果您将 iPod touch 侧向倾斜，您会注意到在某些应用中，屏幕会旋转至横排（横向）方向。您可能希望如此，以便使用更大的`横向`键盘进行输入。然而，有时当您将\
    \ iPod touch 侧放时，您可能不希望屏幕从竖排方向旋转。在这些情况下，您可以锁定屏幕为竖排方向。\n\n1.  双击`主屏幕`按钮。\n2.  从左向右滑动以查看媒体和屏幕锁定控制。\n\
    3.  轻点左侧图标中的`竖排方向锁定`按钮。\n4.  要解除锁定，请再次轻点同一个按钮。\n\n**提示：** 方向锁定功能是在床上阅读 iBooks\
    \ 的好方法。如果您更喜欢竖排模式下更大的页面视图，请启用竖排方向锁定功能。这样，当您将 iPod touch 放在腿上或几乎水平手持时，屏幕就不会意外旋转到横排模式。更多信息，请查看第\
    \ 12 章：“iBooks 与电子书。”\n\n#### 调整或禁用自动锁定超时功能\n\n您会注意到，iPod touch 在闲置一小段时间后会自动锁定并进入休眠模式（即屏幕变黑）。您可以更改\
    \ iPod touch 进入休眠模式所需的时间，甚至可以在`设置`应用中完全禁用此功能。请按以下步骤操作：\n\n1.  从`主屏幕`轻点`设置`图标。\n\
    2.  轻点`通用`。\n3.  轻点`自动锁定`。\n4.  您将在此页面上`自动锁定`选项旁边看到当前的休眠间隔设置。默认设置为 iPod touch\
    \ 闲置三分钟后锁定（以节省电池电量）。您可以将此间隔设置为`1 分钟`、`2 分钟`、`3 分钟`、`4 分钟`、`5 分钟`或`永不`。\n5.  轻点所需的设置以选择它——当其旁边出现勾选标记时，即表示已选中。\n\
    6.  最后，轻点左上角的`通用`按钮返回`通用`屏幕。您现在应该会在`自动锁定`设置旁边看到您所做的更改。\n\n**电池续航提示：** 将`自动锁定`功能设置为较短的间隔（例如`1\
    \ 分钟`）将有助于节省电池电量。\n\n#### 调整日期、时间、时区和 24 小时制格式\n\n通常情况下，日期和时间会在您将 iPod touch 连接到电脑时自动为您设置或调整；您可以在第\
    \ 3 章：“与 iCloud、iPod touch 及更多设备同步”中了解更多信息。不过，您也可以非常轻松地手动调整日期和时间。当您带着 iPod touch\
    \ 旅行并需要在降落后调整时区时，您可能需要进行此操作。请按以下步骤操作：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  向下滚动并轻点`日期与时间`以查看`日期与时间`设置屏幕。\n\
    4.  如果您更希望看到`09:30`和`14:30`而不是`上午 9:30`和`下午 2:30`，则轻点`24 小时制`选项，将其开关设置为`开`。\n\n\
    \    ![images](img/p53-01.jpg)\n\n5.  要手动设置日期和时间，您需要关闭自动时间设置功能。轻点`自动设置`旁边的开关，将此选项设置为`关`。\n\
    \n    ![images](img/p54-01.jpg)\n\n6.  要设置您的时区，请轻点`时区`并输入您所在时区中一个主要城市的名称。当您输入时，iPod\
    \ touch 会显示匹配的城市名称。\n\n    ![images](img/p54-02.jpg)\n\n7.  当您看到所在时区的正确城市时，轻点它以将其选中。在下方图片中，我们输入了“Chicago”的前几个字母，直到它出现。接着，我们轻点了`美国，芝加哥`以将其选中。\n\
    8.  选择城市后，您将返回到主`日期与时间`屏幕，您所选的城市会显示在`时区`选项旁边。\n9.  轻点`设置日期与时间`以调整您的日期和时间。\n\n\
    \    ![images](img/p54-03.jpg)\n\n10. 在此屏幕上，您可以设置日期和时间。要调整日期，请轻点屏幕顶部显示的`日期`按钮。\n\
    11. 要调整时间，请轻点屏幕顶部显示的`时间`按钮。\n12. 然后，您可以通过向上或向下滑动`日期`和`时间`转轮来调整日期和时间，如下方图片所示。\n\
    13. 完成后，轻点左上角的`日期与时间`按钮。\n\n![images](img/p55-01.jpg)\n\n#### 调节亮度\n\n您的 iPod\
    \ touch 具有自动亮度控制功能；此功能默认为开启状态。此功能使用内置光线传感器来调节屏幕亮度。当室外较暗或处于夜晚时，自动亮度控制会调暗屏幕。当天气晴朗明亮时，屏幕会自动调亮，以便于阅读。通常，我们建议您将此功能保持为`开`状态。\n\
    \n如果您想调节亮度，请使用`设置`应用中的控制选项。请按以下步骤操作：\n\n1.  从`主屏幕`轻点`设置`图标。\n\n    ![images](img/p55-02.jpg)\n\
    \n2.  轻点`亮度`并移动滑块控件以调节亮度。\n3.  点击`自动亮度`旁边的开关以将其切换为`开`或`关`。\n\n![images](img/p55-02.jpg)\n\
    \n**提示：** 将`亮度`选项设置为较低的值将有助于节省电池电量。将滑块调至略低于一半的位置效果通常不错。\n"
- fmt: '# Notifications


    New to iOS 5, the `Notification Center` introduces a better, less obtrusive, less
    interruptive way to organize and handle all the `FaceTime`, e–mail, `iMessage`,
    `Twitter`, `Facebook`, calendar, and other alert messages you receive during the
    day.


    Notifications can appear in several ways:


    - As **Lock screen info**, so you can glance at important alerts without having
    to unlock your `iPod touch`. (This option does sacrifice some privacy.)

    - As in–app notifications, which display as brief, rotating alerts across the
    top of the screen whenever a new message is received.

    - In the `Notification Center` pull–down menu, which you can access with a single
    swipe anywhere, at any time, when your `iPod touch` is unlocked.


    If you''ve had an `iPod touch` before or used an `iPad` or `iPod touch` prior
    to iOS 5, then `Notification Center` adds to the previous options of sound, number
    badges, and pop–up alerts. Because they''re non–interruptive, alerts won''t stop
    your game of `Angry Birds` or the e–mail message you''re composing, forcing you
    to dismiss or open them before you can continue playing or writing. However, you
    still have the option to handle things you absolutely don''t want to miss, such
    as alarms.


    # Lock Screen Info


    Notifications on the `Lock` screen are displayed in two different ways: as a popup
    with the single, newest notification and as a pull–down list of all recent notifications.


    If you receive a single notification while your `iPod touch` is locked, the screen
    will turn on, and it will appear in a black box in the center of your `Lock` screen.
    It will also show an icon on the left that represents the app associated with
    that type of notification. For example, an e–mail message will show the `Mail`
    app icon to the left; an `iMessage` will show the `Messages` icon; a missed `FaceTime`
    call will show the `FaceTime` icon; a `Facebook` notice will show the `Facebook`
    icon; and so on. There are several things you can do from here:


    - Ignore the notification. This will cause your alert to fade away, and your `iPod
    touch`''s screen will go back to sleep.

    - Grab the handle (the three gray lines right below the time and date) and drag
    it down to see a list of all the notifications you''ve received since the last
    time you unlocked your `iPod touch`. The list will be sorted by notification type,
    so all e–mail messages will be grouped together, as will all calendar events,
    all missed `FaceTime` calls, and so on. To the left of each notification, you
    will also see the appropriate icon for each alert.


    ![images](images/p57-01.jpg)


    **NOTE:** If you don''t see the handle, it''s because you don''t have any recent
    notifications.


    - From either the single notification box or the list, tap the icon to the left
    of the notification and `Slide to Read` (or listen) to the notification, just
    as you would normally `Slide to Unlock` your `iPod touch`. In most cases, you''ll
    be taken straight to the appropriate app with the full notification displayed.
    For example, touching the `Mail` app icon and sliding it will unlock your `iPod
    touch`, switch to the `Mail` app, and load up the e–mail you just received.


    ![images](images/p57-02.jpg)


    **NOTE:** A few notifications—such as alarms and system messages like `iTunes`
    sync failures—might also show you a button to the left of the notification, such
    as `Snooze` for the alarm or `OK` for the sync failure. Tap the button to delay
    or dismiss the notification.


    **TIP:** If you''re concerned about privacy and don''t like the idea of anyone
    being able to see your personal e–mails, texts, and other messages or alerts on
    your `Lock` screen, then you can turn them off in the `Settings` app (see the
    "Configuring Notification Center" section later in this chapter).


    # In-App Notifications


    When your `iPod touch` is unlocked and you''re busy using it, a new notification
    that comes in will animate briefly at the top part of the screen, and then rotate
    down to display the notification. This will happen no matter where you are, from
    the `Home` screen, to the built–in `Messages` app, to your favorite video game.
    The notification covers only a few pixels at the very top, so it shouldn''t get
    in the way of what you''re doing (or playing). There are two things you can do
    with an in–app notification:


    ![images](images/p57-03.jpg)


    - Ignore it and it will rotate back up and disappear. (Don''t worry: You can see
    the notification again by clicking the `Notification Center` pull–down menu, as
    described later in this chapter.)

    - Tap the notification and you''ll be taken straight to the associated app to
    see the full message. For example, it will take you to the `Mail` app to read
    an e–mail or the `Messages` app to reply to an `iMessage`.


    # The Notification Center


    Any time your `iPod touch` is unlocked, you can swipe down from the very top of
    the screen to pull down the `Notification Center` options. `Notification Center`
    combines a very limited number of *widgets* (two at the time of writing) and a
    list of notifications similar to what you see on the `Lock` screen.


    To get rid of `Notification Center`, swipe back up from the bottom of the screen.


    The two widgets available at the time of writing are `Weather` and `Stocks`:


    ![images](images/p58-01.jpg)


    - The `Weather` widget displays the local weather for an area (if location–based
    weather is enabled) or whatever city you have set as first in the built–in `Weather`
    app (if location–based weather is turned off or unavailable). It also shows the
    high, low, and current temperature for the day. Tapping anywhere on the widget
    will take you to the `Weather` app.

    - The `Stocks` widget shows a ticker of the stocks you follow, along with their
    recent market cap and an arrow showing recent losses or gains. The ticker will
    contain all stocks you currently have set up in the built–in `Stocks` app. Tapping
    anywhere on the widget will take you to the `Stocks` app.


    `Notification Center` listings are available for the following apps and services:


    - `Calendar`

    - `Reminders`

    - `Messages` (`iMessage`)

    - `Mail`

    - `Game Center`

    - Any additional apps or services you install that use notifications (e.g., social
    networks like `Twitter`, breaking news apps like `CNN`, and task managers like
    `OmniFocus`)


    The notification list is divided by app, with a header bar for each app. On the
    left of the header bar is the *app icon*, followed by the *app name*. At the right
    of the header bar, you can see an `X` icon. Tapping the `X` icon clears all notifications
    for that app. For example, tapping the `X` to the right of the `Mail` icon will
    clear all e–mail notifications; however, this won''t clear any other notifications.


    ![images](images/p59-01.jpg)


    Below a header, you will see all current (unread) notifications for that app,
    along with the time they were received, who they came from (if applicable) and
    a preview of their contents. For example, you might see a list of recent `Facebook`
    messages or `Game Center` challenges. Tapping anywhere on any of the notifications
    in the list will switch you to the associated app and show you the full message.


    ![images](images/p59-02.jpg)'
