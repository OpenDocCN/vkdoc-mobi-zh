    ### 在 Pandora 中创建新电台


    在 Pandora 中创建新电台再简单不过了。


    如果你正在收听一个电台，请按左上角的**返回箭头**返回到 Pandora 主屏幕。然后点击底部一栏的**新建电台**按钮。输入艺人、歌曲或作曲家的名称。


    当你找到想要的内容时，点击该选项，Pandora 就会立即开始围绕你的选择建立一个电台。


    你也可以点击**流派**，并围绕特定的音乐流派建立一个电台。


