- fmt: '### Creating a New Station in Pandora


    Creating a new station couldn’t be easier.


    If you are listening to a station, press the **back arrow** in the upper left
    corner to return to the Pandora main screen. Then tap the **New Station** button
    along the bottom row. Type in the name of an artist, song, or composer.


    When you find what you are looking for, touch the selection and Pandora will immediately
    start to build a station around your choice.


    You can also touch **Genre** and build a station around a particular genre of
    music.


    ![images](images/p237-03.jpg)


    You’ll then see the new station listed with your other stations.


    You can build up to 100 stations in Pandora.


    **TIP:** You can organize your stations by pressing the **By Date** or **ABC**
    buttons at the top of the screen.


    ![images](images/p238-01.jpg)


    ### Adjusting Pandora’s Settings—Your Account, Upgrading, and More


    You can sign out of your Pandora account, adjust the audio quality, and even upgrade
    to Pandora One (which removes advertising) by tapping the settings icon in the
    lower right corner of the screen. (See [Figure 12–9](#Chapter11.html#fig_12_9).)


    ![images](images/1209.jpg)


    **Figure 12–9.** *Setting options in Pandora*


    To sign out, tap the **Sign Out** button.


    To adjust the sound quality, move the switch under **Cell Network Audio Quality**
    either **ON** or **OFF**. When you are on a cellular network, setting this off
    is probably better, otherwise you may hear more skips and pauses in the playback.


    When you are on a strong Wi-Fi connection, you can set this to **ON** for better
    quality. See our “Connect to the Network” chapter to learn more.


    To save your battery life, you should set the **Auto-Lock** to **ON**, which is
    the default. If you want to force the screen to stay lit, then switch this to
    **OFF**.


    To remove all advertising, tap the **Upgrade to Pandora One** button. A web browser
    window will open and you’ll be taken to Pandora’s web site to enter your credit
    card information. As of publishing time, the annual account cost is $36.00, but
    that may be different by the time you read this book.


    ## Chapter 12


    ## iBooks and E-Books


    In this chapter, we will show you how to use your iPod touch for a good book-reading
    experience. For example, we will cover iBooks, including how to buy and download
    them, as well as how to find some great free classic books. We will also show
    you other e-book reading options that use the third-party **Kindle** and **Kobo**
    (formerly **Shortcovers**) readers on your iPod touch.


    ![images](images/p241-01.jpg)


    The iPod touch can use Apple’s proprietary e-book reader, **iBooks**. In this
    chapter, we will show you how to download the **iBooks** app, how to shop for
    books in the iBooks Store, and how to read both PDF files (Adobe PDF format) and
    iBooks as well as take advantage of all the **iBooks** features.


    With **iBooks**, you can interact with books and PDF files like never before.
    Pages turn like a real book; and you can adjust font sizes, look up words in the
    built-in dictionary, and search through your text.


    In the App Store, you can also find apps for Amazon’s **Kindle** reader, a **Barnes
    and Noble** reader, the **Stanza** reader, and the **Kobo** reader. Both the **Kindle**
    and **Kobo** readers offer a great reading experience on the iPod touch.


    ### Downloading iBooks


    Search the App Store for “iBooks” or “Apple.” You will find the **iBooks** app
    among the selections listed.


    **NOTE**: On a brand new iPod touch, you should get a notice asking: “Do you want
    to download iBooks now?”


    If you don’t see this notice right away, tap the **App Store** app and the notice
    should pop up.


    Select the **iBooks** app and touch the **Free** button to download.


    Select **Install** and **iBooks** will be downloaded and installed on the iPod
    touch.


    ![images](images/p242-01.jpg)


    ### The iBooks Store


    Before you can start enjoying your reading experience, you need to load up your
    iBooks library with titles. Fortunately, many books can be found for free in the
    iBooks store, including the near complete Gutenberg Collection of classics and
    public domain titles.


    **NOTE**: Paid iBooks content is not available in all countries. However, free
    content is available everywhere, including the Project Gutenberg collection of
    classic, public domain literature.


    Just touch the **Store** button in the upper-right corner of your bookshelf, and
    you will be taken to the iBooks Store.


    ![images](images/p242-02.jpg)


    The iBooks Store is arranged much like the App Store. There is a **Categories**
    button in the top left, opposite the **Library** button. Touch this to see all
    the available categories from which you can choose your books.


    Featured books are highlighted on the front page of the store, with **New** and
    **Notable** titles displayed for browsing.


    At the bottom of the store are five soft keys: **Featured**, **Charts**, **Browse**,
    **Search**, and **Purchases**.


    Touch the **Charts** button ![images](images/p243-02.jpg) to see all the top charts
    and New York Times bestselling books. Touch the **Purchases** button to see all
    the books you have purchased or downloaded for your library.


    ![images](images/p243-01.jpg)


    ![images](images/p243-03.jpg)


    Purchasing a book is much like purchasing an app. Touch a book title that interests
    you and browse the description and customer reviews. When you are ready to purchase
    the title, touch the **Price** button.


    ![images](images/p244-01.jpg)


    **NOTE**: Many titles have a sample download. It is a great idea to check this
    sample out if you are not sure that you want to purchase the book. If you download
    a sample, you can always purchase the full book from within that sample.


    Once you decide to download a sample or purchase a title, **iBooks** switches
    to the **Bookshelf** view, and you can see the book being deposited onto your
    bookshelf. Your book is now available for reading.


    ![images](images/p244-02.jpg)


    #### Using the Search Button


    Just like iTunes and the App Store, the iBooks Store gives you a **Search** window
    in which you can type virtually any phrase. You can search for an author, title,
    or series. Just touch **Search** at the bottom of the screen, and the on-screen
    keyboard pops up. Type in an author, title, series, or genre of book, and then
    press the **Search** button.


    You will see suggestions pop up that match your search; just touch the appropriate
    suggestion to go to that title.


    ![images](images/p245-01.jpg)


    **TIP**: Do a search for “Project Gutenberg” to see thousands of free, public
    domain titles.


    ### Switching Collections (Books, PDFs, More)


    Your iBooks app has multiple collections of books or PDF files (Adobe PDF format
    reader).


    You can easily switch collections between these two and add new collections by
    tapping the Collections button at the middle of the top of the library.


    This button will show you the currently visible collection. In this image, **Books**
    is the current collection. Tap the Books button to see the available collections.


    ![images](images/p245-02.jpg)


    From this screen, you can tap any collection to view it.


    Notice that you can also create **New** collections and **Edit** collections you
    have created by using the buttons at the bottom.


    ![images](images/p246-01.jpg)


    ![images](images/p246-02.jpg)


    ### Reading PDFs


    Switch collections to view your PDFs collection as shown above.


    Tap any book to open it up and start reading. All the same navigation features
    work as described in the “Reading iBooks” section.


    One difference is that you will see thumbnail images of the pages of the PDF file
    at the bottom of the page. Tap any thumbnail to jump to that page. Drag your finger
    back and forth along the thumbnail images to jump to a specific page.


