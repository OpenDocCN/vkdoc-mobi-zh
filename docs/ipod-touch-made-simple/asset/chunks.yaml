  trans: "\n# Facebook 应用程序\n\n要在您的 iPod touch 上安装 `Facebook` 应用程序，请启动 `App Store`\
    \ 并搜索“Facebook”。在 `Facebook` 应用程序列表中，轻点 `Install` 按钮。\n\n## Facebook 应用基础\n\n\
    一旦 `Facebook` 下载并安装完成，您首先会看到`登录`屏幕。输入您的账户信息——您的电子邮件地址和密码。\n\n![images](img/p495-01.jpg)\n\
    \n首次登录后，您会看到一条`推送通知`的警告信息。\n\n如果您希望允许这些消息，请点击`确定`。这些消息可能包括来自其他 Facebook 好友的戳一戳、便签、状态更新通知等。\n\
    \n登录后，您将看到`Facebook`主屏幕。轻点 `Facebook` 标志可在应用程序内导航。\n\n![images](img/p495-02.jpg)\n\
    \n## 在 Facebook 中导航\n\n通过轻点页面顶部的 `Facebook` 字样，可在`导航`图标和您的当前位置之间切换。\n\n例如，如果您在`动态消息`中并轻点了\
    \ `Facebook`，您将看到所有图标。再次轻点 `Facebook`，您将返回到`动态消息`。\n\n从图标页面，您可以访问您的`动态消息`、`个人主页`、`好友`、`消息`、`地点`、`群组`、`活动`、`照片`和`聊天`。\n\
    \n![images](img/p496-01.jpg)\n\n## 与好友交流\n\n请按照以下步骤，通过 iPod touch 上的 `Facebook`\
    \ 应用程序与您在 Facebook 上的好友交流：\n\n1.  轻点顶部的 `Facebook` 以查看所有图标。\n2.  轻点`好友`图标，您的好友列表便会显示。\n\
    3.  点击您的好友，将进入他的 Facebook 页面，您可以在她的`留言板`上留言，并查看她的`信息`或`照片`。\n\n![images](img/p496-02.jpg)\n\
    \n## 使用 Facebook 应用上传照片\n\n使用 Facebook 上传照片是一件简单又好玩的事情。在这里，我们向您展示如何在 `Facebook`\
    \ 应用程序中上传照片：\n\n1.  在 Facebook 主图标中，轻点`照片`。\n2.  选择一个相册，例如“手机上传”。\n3.  轻点“在想些什么？”框旁边的`相机`图标。\n\
    4.  轻点`拍摄照片或视频`按钮来拍照或录制视频以进行上传。或者，轻点`从资料库选取`，在您的 iPod touch 上浏览照片，直到找到您想要上传的那张。\n\
    5.  接下来，如果需要，请轻点`写说明...`来编写说明文字。\n6.  要完成上传，请轻点蓝色的`上传`按钮，照片将进入您的“手机上传”文件夹。\n\n\
    ![images](img/p497-01.jpg)\n\n**注意：** 上传照片时，图像质量将与您 iPod touch 上的原始质量不同。\n\n![images](img/p497-02.jpg)\n\
    \n![images](img/p498-01.jpg)\n\n# Facebook 通知\n\n根据您的 Facebook 推送通知设置，您可能会收到大量更新、留言板帖子和邀请的通知。如果您的\
    \ Facebook 好友不多，并且您想知道何时有人给您留言或在帖子或照片下评论，只需将您的推送通知设置为`开启`，如下一小节所示。\n\n当有通知到来时，它会显示在“通知中心”中，或者如果您的\
    \ iPod touch 已锁定，则会显示为“锁定屏幕信息”。\n\n要从通知访问 Facebook，只需在屏幕上滑动 `Facebook` 图标，或者滑动`箭头`按钮解锁并阅读消息。\n\
    \n![images](img/p498-02.jpg)\n\n## 个性化设置您的 Facebook 应用\n\n以下是调整 `Facebook` 应用设置的方法：\n\
    \n1.  轻点`设置`应用。\n2.  在左栏中轻点 `Facebook`。\n3.  现在您可以调整各种选项：\n    *   `摇一摇重新加载`：此功能可在您摇晃\
    \ iPod touch 时重新加载或刷新页面。\n    *   `播放声音`：此功能让您可以为聊天和消息提醒添加提示音。\n\n![images](img/p499-01.jpg)\n\
    \n请按照以下步骤调整推送通知设置：\n\n1.  轻点`设置`应用。\n2.  轻点`通知`。\n3.  向下滚动并轻点 `Facebook`。\n4.\
    \  将`通知中心`设置为`开启`以接收推送通知。\n5.  轻点`显示`以选择列表中显示的通知数量。\n6.  将`提醒样式`设置为`无`则不显示通知，`横幅`用于新的通知中心风格提醒，或`提醒`用于旧式弹出通知。\n\
    7.  将`标记应用图标`设置为`开启`，以查看 `Facebook` 图标上显示的新通知数量。\n8.  将`声音`设置为`开启`，以便在收到通知时听到提示音。\n\
    \n    ![images](img/p499-02.jpg)\n\n9.  设置`在锁定屏幕中查看`，以便即使在 iPod touch 锁定时也能获取通知信息。\n\
    \n**提示：** `Facebook` 应用会将 Facebook 个人资料图片导入到您的`通讯录`列表中。根据图片的不同，这可能会相当有趣。然而，它也可能将您自己非\
    \ Facebook 联系人的信息上传到 Facebook 的服务器，这可能会引起您、您的家人和朋友对隐私的担忧。\n\n# LinkedIn\n\nLinkedIn\
    \ 的核心功能与 Facebook 非常相似，但它更侧重于商务和职业兴趣。这与 Facebook 形成对比，后者更侧重于个人好友和游戏。通过 LinkedIn，您可以与当前和过去的商业伙伴建立联系或重新建立联系、发送消息、了解他人近况、进行讨论等。\n\
    \n在本书出版时，LinkedIn 的状态与 Facebook 非常相似。您可以在 `Safari` 浏览器上访问常规的 LinkedIn 网站，也可以为\
    \ iPod touch 下载 `LinkedIn` 应用。\n\n哪个更好？我们觉得 iPod touch 上的 `LinkedIn` 应用略优于 `Safari`\
    \ 中的完整 LinkedIn.com 网站。使用 `LinkedIn` 应用的大按钮导航更方便，但在 `Safari` 版本中屏幕上能看到更多内容。我们建议您两种方式都试试，看看您更喜欢哪个——这实际上是个人的偏好问题。\n\
    \n## 下载 LinkedIn 应用\n\n下载 `LinkedIn` 应用的过程与下载 `Facebook` 应用类似。启动 iPod touch 上的\
    \ `App Store` 应用，在`搜索`窗口中输入“LinkedIn”，然后找到该应用。`LinkedIn` 应用是免费的，因此轻点 `FREE` 按钮进行安装。\n\
    \n![images](img/p500-01.jpg)\n\n### 登录 LinkedIn 应用\n\n应用安装完成后，点击 `LinkedIn` 图标并输入您的登录信息。\n\
    \n![images](img/p501-01.jpg)\n\n![images](img/p501-02.jpg)\n\n### 在 LinkedIn 应用中导航\n\
    \nLinkedIn 采用基于区域的导航系统。轻点任意“堆栈”即可进入该区域，然后轻点顶部的 `LinkedIn` 标志返回`首页`屏幕。\n\n![images](img/p501-03.jpg)\n\
    \n### 与 LinkedIn 人脉交流\n\n您最常使用 `LinkedIn` 应用做的事情之一可能就是与人脉交流。最简单的方法是遵循以下步骤：\n\n\
    ![images](img/p502-01.jpg)\n\n1.  在`首页`页面，轻点右上角的`你`堆栈。\n2.  轻点屏幕中部的`人脉`按钮。\n3.\
    \  浏览您的人脉，或轻点`放大镜`搜索图标，在`搜索`框中输入人脉名称。\n4.  轻点您正在寻找的人脉。\n5.  轻点`邮件`图标给他发送消息。\n\n\
    # Twitter\n\nTwitter 始于 2006 年。Twitter 本质上是一个基于 SMS（短信）的社交网络网站。它通常被称为*微博网站*，是名人和平民都可以分享自己想法的地方。关键在于您只有\
    \ 140 个字符来传达您的观点。\n\n在 Twitter 上，您可以订阅*关注*某个*发推*的人。您也可能发现人们开始关注您。如果您想关注我们，我们在\
    \ Twitter 上的账号是 `@garymadesimple`。\n"
- fmt: "# Setting up Twitter\n\n1. With iOS 5, the Twitter app is built right into\
    \ your iPod touch. This means that the app lets you share content like pictures\
    \ and posts from within other apps, like Photos. Follow these steps to set up\
    \ Twitter:\n2. Tap the **Settings** app.\n3. Scroll down and tap **Twitter**.\n\
    4. If Twitter for the iPod touch isn't already installed on your iPod touch, tap\
    \ the **Install** button to the right of the **Twitter** icon. (If Twitter for\
    \ the iPod touch is already installed, the **Install** button will be grayed out.)\n\
    5. Tap **User Name** and enter your Twitter `@username`.\n6. Tap **Password**\
    \ and enter your Twitter password.\n7. Tap the **Sign In** button.\n8. If you\
    \ don't have a Twitter account, tap the **Create New Account** button at the bottom\
    \ of the screen and fill in the form to get one.\n9. Once you're logged in, tap\
    \ **Account** to change your options.\n10. If you want your friends to be able\
    \ to find you on Twitter based on your email address, toggle **Find me by Email**\
    \ to **ON**.\n11. If you want your location to be recorded every time you tweet\
    \ from within an app, toggle **Tweet Location** to **ON**.\n\n![images](images/p503-01.jpg)\n\
    ![images](images/p504-01.jpg)\n\n**NOTE:** If you tweet your location, potentially\
    \ anyone on Twitter could find out where you are—including the fact that you're\
    \ not at home or work. If privacy is a concern, toggle **Tweet Location** to **OFF**.\n\
    \n## Using Twitter\n\nThe official **Twitter** app takes a streamlined approach\
    \ to using Twitter. The **Home** screen shows you the tweets from those you are\
    \ following, and the full message is nice and large.\n\nAlong the bottom are five\
    \ icons, the first being the main **Twitter** feed. The other icons are **Mentions**,\
    \ **Direct Messages**, **Search**, and the **More** button, which takes you to\
    \ your **Profile**, **Favorites**, **Drafts**, **Lists**, and **Accounts and Settings**.\n\
    \nThe **Compose Tweet** icon is in the top-left corner (see [Figure 24–1](#Chapter24.html#fig_24_1)).\n\
    \n![images](images/2401.jpg)\n\n**Figure 24–1.** *The layout of the **Twitter**\
    \ app's **Home** page*\n\n## Refreshing Your List of Tweets\n\nTo refresh your\
    \ list of tweets, just pull down the main page and you will see the **Pull down\
    \ to refresh** notification at the top. Once the page is pulled down, you will\
    \ see a **Release to refresh** note. Release the page and it will refresh the\
    \ tweets.\n\n![images](images/p505-01.jpg)\n\n## Your Twitter Profile\n\nTo display\
    \ your Twitter profile, touch the **More** button and then touch **My Profile**.\n\
    \nTo see your tweets, just touch **Tweets**.\n\nTo see those tweets you have labeled\
    \ as favorites, touch the **Favorites** button.\n\nTo see those individuals you\
    \ are following, touch the **Following** button.\n\n**NOTE:** The number corresponding\
    \ to your followers, those you are following, and your tweets is displayed above\
    \ the title of the button.\n\nScroll down the page to see your **Retweets**; your\
    \ **Lists**; and **Services** to which you can subscribe.\n\n![images](images/p506-01.jpg)\n\
    \n## The Compose Button\n\nTouch the **Compose** button ![images](images/p506-02.jpg)\
    \ and the **New Tweet** screen pops up. The character counter will count down\
    \ from 140 as you type your message. Here are some things you can do from the\
    \ **New Tweet** screen:\n\n* Tap the `@` symbol to search for other usernames\
    \ to mention in your tweet.\n* Tap the `#` symbol to search for trending topics\
    \ to tag in your tweet.\n* Tap the **Camera** icon to take a photo or video with\
    \ your iPod touch or choose an existing one from your library to add to your tweet.\n\
    * Tap the **Arrow** icon to add your current location to your tweet.\n\n![images](images/p506-03.jpg)\n\
    ![images](images/p506-04.jpg)\n\n## Options within Tweet\n\nFrom your **Twitter**\
    \ app's **Home** screen, just touch one of your tweets for the following options:\n\
    \n* Tap the **Back Arrow** at the bottom left of the screen to **Reply** to a\
    \ tweet.\n* Tap the square **Double Arrows** to retweet or quote a tweet.\n* Tap\
    \ the **Star** icon to favorite a tweet.\n* Tap the **Paperclip** icon to view\
    \ an attachment.\n* Tap the **Action** button to copy a link to tweet, mail a\
    \ tweet, or translate a tweet.\n\n![images](images/p507-01.jpg)\n\n**NOTE:** Unlike\
    \ with Facebook and LinkedIn, you can find a variety of alternative third-party\
    \ Twitter apps in the App Store. If you don't like the official **Twitter** for\
    \ iPod touch app, try out **Tweetbot**, **Twitterrific**, or one of the many other\
    \ apps.\n\n# Chapter 25\n\n# Troubleshooting\n\nThe iPod touch is usually highly\
    \ reliable. Occasionally, as with your computer or any complicated electronic\
    \ device, you might have to reset the device or troubleshoot a problem. In this\
    \ chapter, we will give you some useful tools to help get your iPod touch back\
    \ up and running as quickly as possible. We will start with some basic quick troubleshooting\
    \ and move onto more in-depth problems and resolutions in the \"Advanced Troubleshooting\"\
    \ section.\n\nWe will also cover some other odds and ends related to your iPod\
    \ touch and give you a list of resources where you can find help for your iPod\
    \ touch.\n\n## Basic Troubleshooting\n\nWe will begin by covering a few basic\
    \ tips and tricks to get your iPod touch back up and running when something goes\
    \ wrong.\n\n### What to Do If the iPod touch Stops Responding\n\nSometimes, your\
    \ iPod touch won't respond to your touch—it simply freezes in the middle of a\
    \ program. If this happens, try these steps to see whether the iPod touch will\
    \ start responding (see [Figure 25-1](#Chapter25.html#fig_25_1)):\n\n1. Click\
    \ the **Home** button once to see whether that exits the app to the **Home** screen.\n\
    \   ![Images](images/p509-01.jpg)\n2. If a particular app is causing trouble,\
    \ try double-clicking the **Home** button to open the **App Switcher** bar. Next,\
    \ press and hold *any* icon in the **App Switcher** bar until they all shake and\
    \ a red **Circle** icon with a minus sign appears in the upper-left corner of\
    \ the app icon.\n3. Tap the red **Circle** icon to close the app.\n4. If the iPod\
    \ touch continues to be unresponsive, try pressing the **Sleep/Power** key until\
    \ you see **Slide to Power Off**.\n5. Press and hold the **Home** button until\
    \ you return to the **Home** screen—this should quit the program.\n6. Make sure\
    \ your iPod touch isn't running out of power. Try plugging it in or attaching\
    \ it to your computer (if it's plugged in) to see whether it will start to respond.\n\
    7. If holding the **Home** button doesn't work, you will need to try to turn off\
    \ your iPod touch by pressing and holding the **Power/Sleep** button for three\
    \ to four seconds.\n8. Next, slide the **Slide to Power Off** slider at the top\
    \ of the screen. If you cannot power off the iPod touch, then you will need to\
    \ reset the iPod touch. Skip ahead to the next section to learn how.\n9. After\
    \ you power off the iPod touch, wait a minute or so, and then turn on the iPod\
    \ touch by holding the same **Power** button for a few seconds.\n10. You should\
    \ see the **Apple** logo appear on the screen. Wait until the iPod touch starts\
    \ up, and you should be able to access your programs and data.\n\n![images](images/2501.jpg)\n\
    \n**Figure 25-1.** *Basic troubleshooting steps*\n\nIf these steps don't work,\
    \ you will need to reset your iPod touch."
