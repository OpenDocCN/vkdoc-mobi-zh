    you want to stop a download and delete it, swipe your finger over the download
    to bring up the **Delete** button, and then tap **Delete** (see [Figure 21–3](#Chapter21.html#fig_21_3)).


    ![images](images/2103.jpg)


    **Figure 21–3.** *Deleting a file while downloading it*


    ### Redeeming an iTunes Gift Card


    One of the cool things about the **iTunes** app on your iPod touch is that, just
    as with the **iTunes** app on your computer, you can redeem a gift card and receive
    credit in your iTunes account for your purchases.


    At the bottom of the **iTunes** screen, you should see the **Redeem** button (see
    [Figure 21–4](#Chapter21.html#fig_21_4)).


    ![images](images/2104.jpg)


    **Figure 21–4.** *Redeeming an iTunes gift card*


    Tap the **Redeem** button to start the process of entering your iTunes gift card
    number for an iTunes store credit.


    ### Ping


    Ping is Apple''s social network for music. You can access it by tapping the **Ping**
    button at the bottom center of the tab bar.


    With Ping, you can see what music is being bought and commented on by the artists
    and people you follow, and your followers can see the music you buy and comment
    on. Ping also lets you tweet out your purchases.


    ![images](images/p462-01.jpg)


    There are three sections in Ping:


    *   **Activity:** Shows you all the purchases and comments made by the people
    you follow. You can view either **All** activity, **Artists** activity only, or
    **People** (non-artists) only.

    *   **People:** Gives you a list of all the other Ping users you **Follow**; a
    list of Ping users that **Follow** you; and lists of **Featured, Recommended Artists**,
    and **Recommended People** that Ping thinks you might like to follow.

    *   **My Profile:** Shows you all of your own recent activity and gives you access
    to **My Info**, which displays your profile information and album art from music
    you like.


    **NOTE:** At the time of this writing, Ping has not gained significant popularity.
    If you''re a huge music fan, and you and your friends buy a lot of music from
    iTunes, then we certainly recommend you at least try it out. However, you might
    also find more established (if more generic) social networks like Twitter and
    Facebook more to your liking.


    ## Chapter 22


    ## The Amazing App Store


    You have just seen how easy it is download music, videos, and podcasts from iTunes
    right to your iPod touch. You have also seen how easy it is to download iBooks
    from the iBooks store.


    It is just as easy to download new applications from Apple''s amazing App Store.
    Apps are available for just about any function you can think of: games, productivity
    tools, social networking, and anything else you can imagine. As the advertising
    says, *There''s an app for that*.


    ![images](images/p463-01.jpg)


    In this chapter, you will learn how to navigate the App Store, as well as how
    to search for and download apps. You will also learn how to maintain and update
    your apps once they are downloaded onto your iPod touch.


    ### Learning More About Apps and the App Store


    In this chapter, we will focus on accessing the App Store directly from your iPod
    touch. However, you should remember that you can also shop at the App Store using
    the **iTunes** program on your Mac or PC (see [Figure 22–1](#Chapter22.html#fig_22_1)).


    ![images](images/2201.jpg)


    **Figure 22–1.** *Accessing the App Store from the **iTunes** program on your
    computer or the **App Store** icon on your iPod touch*


    In a very short amount of time, the App Store has exploded in popularity. There
    are apps for just about anything you can imagine. These apps are available at
    all price levels; in many cases, the apps are even free!


    #### Where to Find Apps News and Reviews


    You can find reviews for many apps in the App Store itself, and we recommend that
    you check out the App Store reviews. However, sometimes you will probably want
    more information from expert reviewers. If so, blogs are a great place to find
    news and reviews for particular apps or content.


    Here is a list of Apple iPhone- and iPod-related blogs with reviews of apps:


    *   The iPhone Blog: `www.tipb.com`

    *   Touch Reviews: `www.touchreviews.net`

    *   Touch Arcade: `www.toucharcade.com`

    *   The Unofficial Apple Weblog: `www.tuaw.com`

    *   148apps: `www.148apps.com`

    *   App Advice: `www.appadvice.com`


    ### App Store Basics


    With a little time, you should find the App Store to be quite intuitive to navigate.
    We''ll cover some of the basics for getting the most out of the App Store, so
    that your experience will be as enjoyable and productive as possible.


    **NOTE:** App availability varies by country. Some apps are only available in
    some countries, and some countries may not have certain games sections due to
    local ratings laws.


    #### A Network Connection Is Required


    After you set up your App Store (iTunes) account, you still need to have the right
    network connectivity to access the App Store and download apps. Check out [Chapter
    4](#Chapter04.html#ch4): “Connect to the Network” to learn how to tell whether
    you are connected.


    #### Starting the App Store


    The **App Store** icon should be on your first page of icons on the **Home** screen.
    Tap the icon to launch the **App Store** app.


    ![images](images/p465-01.jpg)'
  trans: '

    ### iTunes 中的播客


    播客通常是一系列音频片段；这些片段可能频繁更新（例如国家公共广播电台的整点新闻），也可能完全不做更新（例如某特定主题单次演讲的录音）。


    ![图片](img/p459-01.jpg)


    您可以点击顶部三个按钮来浏览 iTunes 中的播客分类：


    - 热门推荐

    - 排行榜前十

    - 分类


    ![图片](img/p459-02.jpg)


    #### 下载播客


    播客有视频和音频两种类型。当您找到某个播客后，只需点击该播客的标题（参见图 21-2）。幸运的是，大多数播客都是免费的。如果是免费的，您会看到一个 `Free`
    按钮，而不是常见的 `Buy` 按钮。


    ![图片](img/2102.jpg)


    **图 21-2.** *下载一个 NPR 播客*


    当您点击该按钮时，它会变成一个绿色的 `Download` 按钮。点击 `Download`，一个动态图标会跳入底部软键栏中的 `Downloads` 图标内。显示的小红色数字反映了正在下载的文件数量。


    ![图片](img/p460-01.jpg)


    #### 下载图标：停止和删除下载


    当您下载项目时，它们会出现在您的 `Downloads` 屏幕中。此行为与电脑上 `iTunes` 应用的行为类似。


    您可以点击 `More` 软键，然后点击 `Downloads` 标签页，查看所有下载的进度。


    ![图片](img/p460-02.jpg)


    #### 下载内容的存储位置


    您可以通过点击 `More` 图标，在 `Music` 或 `Videos` 应用中查看所有下载内容，该图标会按分类显示您的下载。换句话说，如果您下载了一个播客，您需要进入
    `Music` 应用，点击 `More`，然后找到 `Podcasts` 标签页，才能看到已下载的播客。


    有时，您可能决定不想要所有已选择的下载。如果您想停止下载并删除它，只需用手指在该下载项上滑动，调出 `Delete` 按钮，然后点击 `Delete`（参见图
    21-3）。


    ![图片](img/2103.jpg)


    **图 21-3.** *下载过程中删除文件*


    ### 兑换 iTunes 礼品卡


    iPod touch 上 `iTunes` 应用的一个很酷的功能是，就像您电脑上的 `iTunes` 应用一样，您可以兑换礼品卡并将款项存入您的 iTunes
    账户用于购买。


    在 `iTunes` 屏幕底部，您应该能看到 `Redeem` 按钮（参见图 21-4）。


    ![图片](img/2104.jpg)


    **图 21-4.** *兑换 iTunes 礼品卡*


    点击 `Redeem` 按钮，开始输入您的 iTunes 礼品卡号码以获得 iTunes Store 信用额度的流程。


    ### Ping


    Ping 是苹果公司的音乐社交网络。您可以通过点击标签栏底部中央的 `Ping` 按钮来访问它。


    通过 Ping，您可以查看您关注的艺术家和用户正在购买和评论的音乐，而您的关注者也可以看到您购买和评论的音乐。Ping 还允许您推文发布您的购买信息。


    ![图片](img/p462-01.jpg)


    Ping 包含三个部分：


    - `Activity`：显示您所关注的所有人的购买和评论动态。您可以查看 `All`（全部）动态、仅 `Artists`（艺术家）动态，或仅 `People`（非艺术家用户）动态。

    - `People`：列出您所有 `Follow`（关注）的其他 Ping 用户；列出 `Follow`（关注）您的 Ping 用户；以及列出 Ping 认为您可能感兴趣的
    `Featured`（精选）、`Recommended Artists`（推荐艺术家）和 `Recommended People`（推荐用户）。

    - `My Profile`：显示您自己最近的所有活动，并允许您访问 `My Info`，其中显示了您的个人资料信息以及您喜爱的音乐的专辑封面。


    **注意：** 在撰写本文时，Ping 尚未获得显著的流行度。如果您是狂热的音乐爱好者，并且您和您的朋友从 iTunes 购买大量音乐，那么我们当然建议您至少尝试一下。不过，您也可能会发现像
    Twitter 和 Facebook 这样更成熟（可能也更通用）的社交网络更合您的口味。


    ## 第 22 章


    ## 神奇的 App Store


    您刚刚已经见识到，直接从 iPod touch 上的 iTunes 下载音乐、视频和播客是多么简单。您也见识到了从 iBooks 商店下载 iBooks 是多么容易。


    从苹果公司神奇的 App Store 下载新应用也同样简单。应用几乎涵盖了您能想到的任何功能：游戏、生产力工具、社交网络，以及您能想象的任何其他东西。正如广告所说，*总有那么一款应用*。


    ![图片](img/p463-01.jpg)


    在本章中，您将学习如何浏览 App Store，以及如何搜索和下载应用。您还将学习如何在应用下载到您的 iPod touch 后对其进行维护和更新。


    ### 了解更多关于应用和 App Store 的信息


    在本章中，我们将重点介绍如何直接从您的 iPod touch 访问 App Store。但是，您应该记住，您也可以使用 Mac 或 PC 上的 `iTunes`
    程序在 App Store 中购物（参见图 22-1）。


    ![图片](img/2201.jpg)


    **图 22-1.** *从电脑上的 `iTunes` 程序或 iPod touch 上的 `App Store` 图标访问 App Store*


    在很短的时间内，App Store 已经火爆流行起来。几乎任何您能想象到的功能都有对应的应用。这些应用涵盖了各种价位；在许多情况下，应用甚至是免费的！


    #### 在哪里找到应用资讯和评论


    您可以在 App Store 本身中找到许多应用的评论，我们建议您查看 App Store 的评论。但有时，您可能希望从专业评论者那里获得更多信息。如果是这样，博客是获取特定应用或内容资讯和评论的好地方。


    以下是列出了一些包含应用评论的、与苹果 iPhone 和 iPod 相关的博客：


    - The iPhone Blog：`www.tipb.com`

    - Touch Reviews：`www.touchreviews.net`

    - Touch Arcade：`www.toucharcade.com`

    - The Unofficial Apple Weblog：`www.tuaw.com`

    - 148apps：`www.148apps.com`

    - App Advice：`www.appadvice.com`


    ### App Store 基础操作


    只需稍加熟悉，您就会发现 App Store 的导航非常直观。我们将介绍一些基础知识，帮助您充分利用 App Store，让您的体验尽可能愉快且高效。


    **注意：** 应用的可获取性因国家而异。某些应用仅在部分国家提供，并且由于当地的分级法律，某些国家可能没有特定的游戏版块。


    #### 需要网络连接


    在您设置好 App Store（iTunes）账户后，您仍然需要具备正确的网络连接才能访问 App Store 并下载应用。请查看第 4 章：“连接到网络”，了解如何判断您是否已连接。


    #### 启动 App Store


    `App Store` 图标应位于 `Home` 屏幕上的第一页图标中。点击该图标即可启动 `App Store` 应用。


    ![图片](img/p465-01.jpg)

