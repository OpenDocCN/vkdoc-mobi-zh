  trans: "\n#### 使用 Skype 聊天\n\n除了拨打电话，您还可以通过 iPod touch 与其他 `Skype` 用户进行文字聊天。开始聊天与开始通话非常相似，请按照以下步骤操作：\n\
    \n1.  如果您尚未进入 `Skype`，请点击 `Skype` 图标。\n2.  点击底部的 `通讯录` 软键。\n3.  点击 `所有联系人` 查看所有联系人。\n\
    4.  点击您想要聊天的联系人姓名。\n5.  点击 `聊天` 按钮。\n\n    ![图片](img/p210-01.jpg)\n\n6.  输入您的聊天文本，然后按下\
    \ `发送` 按钮。您的聊天内容将显示在屏幕顶部。\n\n![图片](img/p211-01.jpg)\n\n#### 将 Skype 添加到您的电脑\n\n\
    您也可以在电脑上使用 `Skype` 应用。接下来我们将向您展示其工作原理。如果您的电脑连接了网络摄像头，您还可以使用 `Skype` 进行视频通话。\n\n\
    **注意：** 当您从电脑呼叫 iPod touch 时，将无法进行视频通话。\n\n请按照以下步骤创建 Skype 帐户并为您的电脑下载 `Skype`\
    \ 软件：\n\n1.  在电脑上打开网页浏览器。\n2.  访问：[`www.skype.com`](http://www.skype.com)\n3.\
    \  点击页面顶部的 `加入` 链接。\n4.  填写所有必填信息并点击 `继续` 按钮来创建您的帐户。请注意，您只需在带星号的必填字段中输入信息。例如，您无需输入性别、出生日期或手机号码。\n\
    5.  至此，您已完成帐户设置过程。接下来，您会看到购买 Skype 点数的选项；但这不是必需的，免费的 Skype 对 Skype 通话、视频通话或聊天并不需要它。\n\
    \n    **提示：** 只有当您想拨打给未使用 `Skype` 的人时才需要付费。例如，拨打固定电话或手机（未使用 `Skype`）是收费的。在编写本文时，即用即付费率约为美分\
    \ 2.1 美分；各种通话套餐的月订阅费用大约在 3 到 14 美元之间。\n\n6.  接下来，点击网站顶部导航栏中的 `获取 Skype` 链接，将 `Skype`\
    \ 下载到您的电脑。\n7.  点击 `获取 Windows 版 Skype` 按钮或 `获取 Mac 版 Skype` 按钮。\n8.  按照说明安装软件。\n\
    9.  软件安装完成后，启动它并使用您的 Skype 帐户登录。\n10. 现在您已准备就绪，可以发起（或接听）与任何其他使用 `Skype` 的用户（包括所有使用\
    \ iPod touch 上 `Skype` 的朋友）进行电话、视频通话和聊天。\n\n### 视频录制\n\n除了让您进行视频通话和聊天外，iPod touch\
    \ 还允许您使用内置录像机录制功能全面的视频。您可以使用 iPod touch 拍摄 1080p 高清视频，然后将此视频上传到 Facebook、YouTube\
    \ 或 MobileMe。您还可以通过彩信或电子邮件发送视频。\n\n**注意：** 当您分享视频时，视频会被压缩，因此画质将不再是 1080p。\n\n\
    接下来，我们将向您展示如何直接在 iPod touch 上录制视频和修剪视频。您还将学习如何在 iPod touch 上制作高质量的高清视频。\n\n####\
    \ 启动录像机\n\n录像机的软件实际上是 `相机` 应用的一部分（请参见 图 10-6）。请按照以下步骤使用内置录像机：\n\n1.  启动 `相机` 应用。将右下角的滑块从\
    \ `相机` 图标移动到 `录像机` 图标。\n2.  点击右上角的 `切换摄像头` 按钮，在后置和前置摄像头之间切换。\n3.  录制场景时尽量保持 iPod\
    \ touch 稳定。\n4.  录制完成后，点击 `停止` 按钮。\n\n![图片](img/1006.jpg)\n\n**图 10-6.** *录像机布局与控件*\n\
    \n##### 聚焦视频\n\niPod touch 可以根据拍摄对象调整视频的焦距。请按照以下步骤利用此功能：\n\n1.  若要聚焦视频前景中的某个物体，请点击屏幕前景。屏幕会显示一个小方框来指示对焦区域。\n\
    2.  若要将焦点切换到背景中的某个物体，请点击屏幕的另一部分。方框将短暂显示新的对焦区域。\n\n##### 修剪视频\n\niPod touch 允许您直接在\
    \ iPod touch 上对视频进行编辑。一旦视频录制完成并按下 `停止` 按钮，视频会立即存入您的 `相机胶卷`。\n\n点击左下角的视频缩略图即可打开该视频。在屏幕顶部，您会看到一个时间线，其中包含视频的所有帧（请参见\
    \ 图 10-7）。请按照以下步骤编辑刚才录制的视频：\n\n1.  拖拽时间线的两端，您会看到视频进入修剪模式。\n2.  分别拖拽视频两端，直至达到您想要的长度。\n\
    3.  当视频长度合适时，点击右上角的 `修剪` 按钮。\n4.  接下来，选择 `修剪原片` 或 `存储为新剪辑`。后一个选项会保存一份新修剪视频的副本。\n\
    \n![图片](img/1007.jpg)\n\n**图 10-7.** *修剪视频*\n\n##### 发送视频\n\n与照片类似，您有多种选项可通过 iPod\
    \ touch 将录制的视频发送给他人。请按照以下步骤从 iPod touch 发送视频：\n\n1.  触摸底部的 `发送` 图标 ![图片](img/p214-01.jpg)。\n\
    2.  选择您首选的视频发送方式：`电子邮件视频`、`信息`或`发送到 YouTube`。\n3.  根据您在第二步所做的选择，按照步骤发送视频。\n\n\
    **注意：** 要将视频上传到 YouTube，您需要拥有该网站的帐户。\n\n## 第 11 章\n\n## 播放音乐\n\n在本章中，我们将向您展示如何将\
    \ iPod touch 变成一台出色的音乐播放器。由于 iPod touch 出自苹果公司——正是这家公司让如今著名的 iPod 电子音乐播放器风靡一时——您可以预见它将拥有一些强大的功能，而事实也确实如此。我们将向您展示如何播放和组织您从\
    \ iTunes 购买或从电脑同步的音乐，如何以多种方式查看播放列表，以及如何快速查找歌曲。您将学习如何使用 Genius 功能，让 iPod touch\
    \ 在您的音乐库中定位并分组相似的歌曲——这有点像只播放您喜欢音乐的电台。\n\n**提示：** 了解如何直接在 iPod touch 上购买音乐和使用 Ping（音乐爱好者的社交网络），请参见第\
    \ 21 章：“您设备上的 iTunes”。\n\n您还将了解如何使用名为 Pandora 的应用来流式播放音乐。通过 Pandora，您可以从众多网络电台中进行选择，或者通过输入您喜爱的艺术家姓名来创建自己的电台，而且这一切都是免费的。\n\
    \n### 您的 iPod touch 作为音乐播放器\n\n您的 iPod touch 可能是当今市场上最好的音乐播放器之一。触摸屏让您能够轻松交互和管理您的音乐、播放列表、专辑封面以及音乐库的组织。您甚至可以通过蓝牙将\
    \ iPod touch 连接到您的家庭或汽车音响，从而通过 iPod touch 欣赏美妙的立体声音效！\n\n**提示：** 请查看第 5 章：“AirPlay\
    \ 和蓝牙”，了解如何将您的 iPod touch 连接到蓝牙立体声扬声器或汽车音响。\n\n无论您使用内置的 `音乐` 应用，还是像 `Pandora`\
    \ 这样的网络电台应用，您都会发现对 iPod touch 上音乐的控制是前所未有的。\n"
- fmt: '### The Music App


    Most music is handled through the **Music** app—the icon is on the **Home** screen,
    usually in the bottom dock of icons, the last one on the right.


    **NOTE:** For all you readers familiar with the iPod touch before iOS 5, yes,
    the music playing app was called the **iPod** app. Now is is simply the **Music**
    app.


    ![images](images/p216-01.jpg)


    Touch the **Music** icon and, as Figure 12–1 shows, you''ll see five soft keys
    across the bottom:


    * **Playlists** lets you see synced playlists from your computer, as well as playlists
    created on the iPod touch.

    * **Artists** lets you see an alphabetical list of artists (searchable like your
    Address Book).

    * **Songs** lets you see an alphabetical list of songs (also searchable).

    * **Videos** lets you see a list of videos (also searchable).

    * **More** lets you see audiobooks, compilations, composers, genres, iTunes U,
    and podcasts.


    ### Editing the Soft Keys


    One very cool feature on the iPod touch is that you can edit the soft keys at
    the bottom of the **Music** app and really customize it to fit your needs and
    tastes. To do so, first touch the **More** button.


    Then touch the **Edit** button at the top left of the screen. ![images](images/p216-02.jpg)


    The screen changes to show the various icons that can be dragged down to the bottom
    dock.


    ![images](images/1202.jpg)


    **Figure 12–2.** *Change the soft keys in the **Music app**.*


    Let''s say you want to replace the **Albums** icon with the one for **Audiobooks**.
    Just touch and hold the **Audiobooks** icon and drag it to where the **Albums**
    icon is on the bottom dock. When you get there, release the icon and the **Audiobooks**
    icon will now reside where the **Album** icon used to be. You can do this with
    any of the icons on this **Configure** screen. When you are finished, touchthe
    **Done** button at the top right of the screen.


    **TIP:** You can also reorder the icons across the bottom by dragging and dropping
    them back and forth along the soft key row.


    ### Playlists View


    **NOTE:** A playlist is a list of songs you create and can include any genre,
    artist, year of recording, or collection of songs that interest you.


    Many people group together music of a particular genre, like classical or rock.
    Others may create playlists with fast beat music and call it workout or running
    music. You can use playlists to organize your music just about any way you want.


    You can create playlists in iTunes on your computer and then sync to your iPod
    touch (see the iTunes Guide), or you can create a playlist right on your iPod
    touch as we describe in the next section.


    Once you''ve synced a playlist to your iPod touch or created one on your iPod
    touch, it shows up on the left-hand side of the **Music** screen, under **Library**.


    ![images](images/p218-01.jpg)


    If you have several playlists listed along the left side, just touch the name
    of the one you want to listen to.


    **NOTE:** You can edit the contents of some of your playlists on your iPod touch.
    However, you can''t edit Genius playlists on the iPod touch itself.


    ### Creating Playlists on the iPod touch


    The iPod touch lets you create unique playlists that can be edited and synced
    with your computer. Let''s say you want to add a new selection of music to your
    iPod touch playlist. Just create the playlist as we show below and add songs.
    You can change the playlist whenever you want, removing old songs and adding new
    ones—it couldn''t be easier!


    To create a new playlist on the iPod touch, touch the **Add Playlist** tab under
    **Genius Playlist**.


    ![images](images/p218-02.jpg)


    Give your playlist a unique name (we''ll call this one "Bike-riding music"), then
    touch **Save**.


    ![images](images/p219-01.jpg)


    Now you''ll see the **Songs** screen. Touch the name of any song you want to add
    to the new playlist.


    You know a song is selected and will be added to the playlist when it turns gray.


    **NOTE:** Don''t get frustrated trying to remove or deselect a song you tapped
    by mistake. You can''t remove or deselect songs on this screen; you have to click
    **Done**, then remove them on the next screen, as we describe.


    Select **Done** at the top right and the playlist contents will be displayed.


    ### Searching for Music


    * * *


    Almost every view from your **Music** app (Playlists, Artists, Songs, etc.) has
    a search window at the top of the screen.


    If you don''t see the search window, tap the time at the top to instantly make
    it visible.


    Tap once in the search window and type a few letters of the name of an artist,
    album, playlist, or song to instantly see a list of all matching items. This is
    the best way to quickly find something to listen to or watch on your iPod touch.


    ![images](images/p219-02.jpg)


    * * *


    ### Changing the View in the Music app


    The **Music** app is very flexible when it comes to ways of displaying and categorizing
    your music. Sometimes, you might want to look at your songs listed by the artist.
    At other times, you might prefer seeing a particular album or song. The iPod touch
    lets you easily change the view to help manage and play just the music you want
    at a given moment.


    In your **Music** app, you have the following views:


    * Artists View - shows you a listing of all your music arranged by artist.

    * Songs View - shows all your music listed by name of each song.

    * Albums View - shows all music arranged by album name.

    * Genres View - shows all music arranged by type or genre.

    * Composers View - shows music arranged by composer name.

    * Audiobooks - shows all your audiobooks.

    * Compilations - shows all compilations.

    * ITunes U - shows all iTunes U content.

    * Podcasts - shows all your podcasts.


    ### Viewing Songs in an Album


    When you''re in **Albums** view, just touch an album cover or name and the screen
    will slide, showing you the songs on that album (see [Figure 12–3](#Chapter11.html#fig_12_3)).


    **TIP:** When you start playing an album, the album cover may expand to fill the
    screen. Tap the screen once to bring up (or hide) the controls at the top and
    bottom. You can use these controls to manage the song and screen as we describe
    below.


    To see the songs on an album that is playing, tap the **List** button and the
    album cover and the cover will turn over, revealing all the songs on that album.
    The song that is playing will have a small blue arrow next to it.


    ![images](images/p220-01.jpg)


    ![images](images/1203.jpg)


    **Figure 12–3.** *Touch the **List** button to see the songs on a particular album.*


    Tap the title bar above the list of songs to return to the album cover view.


    ### Navigating with Cover Flow


    **Cover Flow** is a proprietary and very cool way of looking at your music by
    album covers. If you''re playing a song in the **Music** music app and turn your
    iPod touch horizontal—into landscape mode— your iPod touch will automatically
    change to **Cover Flow** view.


    ![images](images/p221-01.jpg)


    #### Viewing Songs in Cover Flow


    Just touch an album cover and the cover will flip, showing you all the songs on
    that album.


    To see the song that is playing now (in Cover Flow view), tap the album cover
    and it will turn over, revealing the songs on that album ([Figure 12–4](#Chapter11.html#fig_12_4)).
    The song that is currently playing will have a small blue arrow next to it.


    ![images](images/1204.jpg)


    **Figure 12–4.** *You can look at an album''s contents using **Cover Flow**.*


    Tap the title bar (above the list of songs) and the album cover will be displayed
    once more. You can then keep swiping through your music until you find what you
    are searching for.


    **NOTE:** You can also touch the small "i" in the lower right corner and the album
    cover will flip, showing you the songs, just as if you touched the cover.'
