- fmt: "# Calendar and Reminders\n\nThe iPod touch makes the old calendar that used\
    \ to hang on the fridge obsolete. In this chapter, we will show you how to utilize\
    \ the `Calendar` app of the iPod touch to its full potential. For example, we\
    \ will show you how to schedule appointments, manage multiple calendars, change\
    \ views on your calendar, and even how to deal with meeting invitations.\n\nIn\
    \ iOS 5, Apple has added the `Reminders` app for easy management of all your tasks\
    \ and to-do lists.\n\n**NOTE:** For most of this chapter, we will talk about syncing\
    \ your iPod touch calendar with another calendar because it is nice to have your\
    \ calendar accessible on your iPod touch and in other places. If you choose, you\
    \ can also use your iPod touch in a *standalone* mode, where you do not sync to\
    \ any other calendar. In the latter case, all the steps we describe for events,\
    \ viewing, and managing events still apply equally to you. It is critical, however,\
    \ that you use the iCloud or iTunes automatic backup feature to save a copy of\
    \ your calendar, just in case something happens to your iPod touch.\n\n## Managing\
    \ Your Busy Life on Your iPod touch\n\nThe `Calendar` and `Reminders` apps provide\
    \ powerful, easy-to-use functionality that helps you manage your appointments,\
    \ keep track of what you have to do, set reminder alarms, and even create and\
    \ respond to meeting invitations (for Exchange and iCloud users).\n\n### Syncing\
    \ or Sharing Your Calendar and Reminders\n\nIf you maintain a calendar or task\
    \ list on your computer, or a calendar on a web site such as iCloud or Google\
    \ Calendar, then you can synchronize or share that data with your iPod touch either\
    \ by using the iTunes app and your sync cable or by setting up a wireless synchronization\
    \ (see [Chapter 3](#Chapter03.html#ch3): \"Sync iCloud, iTunes, and More\" for\
    \ information on syncing).\n\n![image](images/p374-01.jpg)\n\nAfter you set up\
    \ the calendar and task syncing, all of your computer calendar appointments and\
    \ to-do lists will be synced with your iPod touch calendar automatically, based\
    \ on your sync settings (see [Figure 18–1](#Chapter18.html#fig_18_1)).\n\nIf you\
    \ use `iTunes` to sync with your calendar (e.g., `Microsoft Outlook` or Apple's\
    \ `iCal`), your appointments and tasks will be transferred or synced every time\
    \ you connect your iPod touch to your computer.\n\nIf you use another method to\
    \ sync (e.g., iCloud, Exchange, or similar), this sync is wireless and automatic,\
    \ and it will most likely happen without you having to do anything after the initial\
    \ setup process.\n\n![images](images/1801.jpg)\n\n**[Figure 18–1](#Chapter18.html#fig_18_1).**\
    \ *Syncing a PC or Mac calendar to an iPod touch*\n\n### Today's Day and Date\
    \ Shown on the Calendar Icon\n\nThe `Calendar` icon is usually right on your iPod\
    \ touch's `Home` screen. You will quickly notice that your `Calendar` icon changes\
    \ to show today's date and the day of the week. The icon to the right shows that\
    \ it is a Friday, the 16^(th) day of the month.\n\n![images](images/p375-01.jpg)\n\
    \n**TIP:** If you use your iPod touch's `Calendar` app often, you might want to\
    \ think about pinning or moving it to the Bottom dock; you learned how to do this\
    \ in the section on docking icons in [Chapter 6](#Chapter06.html#ch6): \"Icons\
    \ and Folders.\"\n\n### Viewing Your Appointments and Getting Around in Calendar\n\
    \nThe default view for the `Calendar` app shows your `Day` view. This view shows\
    \ you at a glance any upcoming appointments for your day. Appointments are shown\
    \ in your calendar. If you happen to have multiple calendars set up on your computer,\
    \ such as `Work` and `Home`, then appointments from the different calendars will\
    \ display as different colors on your iPod touch's calendar.\n\nYou can manipulate\
    \ the calendar in various ways:\n\n*   **Move a day at a time**: If you tap the\
    \ triangles next to today's date at the top, you move forward or backward a day.\n\
    \n    **TIP:** Touch and hold the triangles next to the date to advance quickly\
    \ through days.\n\n*   **Change views**: Tap the `List`, `Day`, and `Month` buttons\
    \ at the bottom to change the view.\n*   **Jump to today**: Tap the `Today` button\
    \ at the bottom-left corner.\n\n### The Four Calendar Views\n\nYour `Calendar`\
    \ app comes with four views. `Day`, `List`, `Week`, and `Month` are all available\
    \ in Portrait orientation; and you can switch between views by tapping the name\
    \ of the view at the bottom of the screen. `Week` view is only available in Landscape\
    \ orientation, and you can switch to it by turning your iPod touch sideways. Here's\
    \ a quick overview of the four views:\n\n*   **Day view**: When you start the\
    \ iPod touch's `Calendar` app, the default view is usually the `Day` view. This\
    \ allows you to quickly see everything you have scheduled for the day. You can\
    \ find buttons to change the view at the bottom of the `Calendar` app.\n\n   \
    \ ![images](images/p376-01.jpg)\n\n    To move from one day to the next, simply\
    \ swipe from right to left. To move back a day, swipe from left to right.\n\n\
    \    ![images](images/p376-02.jpg)\n\n*   **List view** (also known as **Agenda**\
    \ view): Tap the `List` button at the bottom, and you can see a list of your appointments.\n\
    \n    Depending on how much you have scheduled, you could see the next day or\
    \ even the next week's worth of scheduled events.\n\n    Swipe up or down to see\
    \ more events.\n\n    ![images](images/p376-03.jpg)\n\n*   **Month view**: Tap\
    \ the `Month` button at the bottom, and you can see a layout of the full month.\
    \ Days with appointments have a small dot in them. Dots for the current day will\
    \ show up highlighted in blue.\n\n    ![images](images/p377-01.jpg)\n\n    **TIP:**\
    \ To return to the `Today` view, just touch the `Today` button at the bottom left.\n\
    \n    ![images](images/p377-02.jpg)\n\n    **Go to the next month**: Tap the triangle\
    \ to the right of the month shown at the top.\n\n    **Go to the previous month**:\
    \ Tap the triangle to the left of the month.\n\n*   **Week view**: Turn you iPod\
    \ touch sideways to landscape orientation to access the week view.\n*   Swipe\
    \ left or right to see more days.\n\n    ![images](images/p377-03.jpg)\n\n###\
    \ Working with Several Calendars\n\nThe `Calendar` app lets you view and work\
    \ with more than one calendar. The number of calendars you see depends on how\
    \ many you are syncing. For example, you may have iCloud or Google Calendar syncing\
    \ for home and Exchange for work,\n\n> To view just one calendar at a time, tap\
    \ the `Calendars` button at the top and select only the calendar you wish to see.\n\
    \n![images](images/p378-01.jpg)\n\nWhen you set up your `Sync` settings, you were\
    \ able to specify which calendars you wanted to sync with your iPod touch. You\
    \ can customize your calendar further by following these instructions:\n\n*  \
    \ **Changing the colors**: If you don't like the color of a calendar on your iPod\
    \ touch, it's easy to change:\n\n    *   Tap on the `Calendars` button at the\
    \ top right.\n    *   Tap on the `Edit` button at the top right.\n    *   Tap\
    \ on the calendar you want to change.\n    *   You'll be presented with a list\
    \ of color choices. Tap the one you want and your new color will be set.\n\n \
    \   ![images](images/p378-02.jpg)\n\n*   **Adding a new calendar**: If you are\
    \ using iCloud to sync, you will be able to add a new calendar on your iPod touch:\n\
    \n    1.  Tap `Calendars` at the top-right.\n    2.  Tap `Edit` at the top-right.\n\
    \    3.  Scroll down and tap `Add Calendar…` in the iCloud section.\n    4.  Enter\
    \ a name and choose a color for your new calendar, and you're done!\n\n    ![images](images/p379-01.jpg)\n\
    \n## Adding New Calendar Events\n\nYou can easily add new events or appointments\
    \ right on your iPod touch. These new events and appointments will be synced (or\
    \ shared with) your computer the next time a sync takes place."
  raw: "## Calendar and Reminders\n\nThe iPod touch makes the old calendar that used\
    \ to hang on the fridge obsolete. In this chapter, we will show you how to utilize\
    \ the **Calendar** app of the iPod touch to its full potential. For example, we\
    \ will show you how to schedule appointments, manage multiple calendars, change\
    \ views on your calendar, and even how to deal with meeting invitations.\n\nIn\
    \ iOS 5, Apple has added the **Reminders** app for easy management of all your\
    \ tasks and to-do lists.\n\n**NOTE:** For most of this chapter, we will talk about\
    \ syncing your iPod touch calendar with another calendar because it is nice to\
    \ have your calendar accessible on your iPod touch and in other places. If you\
    \ choose, you can also use your iPod touch in a *standalone* mode, where you do\
    \ not sync to any other calendar. In the latter case, all the steps we describe\
    \ for events, viewing, and managing events still apply equally to you. It is critical,\
    \ however, that you use the iCloud or iTunes automatic backup feature to save\
    \ a copy of your calendar, just in case something happens to your iPod touch.\n\
    \n### Managing Your Busy Life on Your iPod touch\n\nThe **Calendar** and **Reminders**\
    \ apps provide powerful, easy-to-use functionality that helps you manage your\
    \ appointments, keep track of what you have to do, set reminder alarms, and even\
    \ create and respond to meeting invitations (for Exchange and iCloud users).\n\
    \n#### Syncing or Sharing Your Calendar and Reminders\n\nIf you maintain a calendar\
    \ or task list on your computer, or a calendar on a web site such as iCloud or\
    \ Google Calendar, then you can synchronize or share that data with your iPod\
    \ touch either by using the iTunes app and your sync cable or by setting up a\
    \ wireless synchronization (see [Chapter 3](#Chapter03.html#ch3): “Sync iCloud,\
    \ iTunes, and More” for information on syncing).\n\n![image](images/p374-01.jpg)\n\
    \nAfter you set up the calendar and task syncing, all of your computer calendar\
    \ appointments and to-do lists will be synced with your iPod touch calendar automatically,\
    \ based on your sync settings (see [Figure 18–1](#Chapter18.html#fig_18_1)).\n\
    \nIf you use **iTunes** to sync with your calendar (e.g., **Microsoft Outlook**\
    \ or Apple's **iCal**), your appointments and tasks will be transferred or synced\
    \ every time you connect your iPod touch to your computer.\n\nIf you use another\
    \ method to sync (e.g., iCloud, Exchange, or similar), this sync is wireless and\
    \ automatic, and it will most likely happen without you having to do anything\
    \ after the initial setup process.\n\n![images](images/1801.jpg)\n\n**[Figure\
    \ 18–1](#Chapter18.html#fig_18_1).** *Syncing a PC or Mac calendar to an iPod\
    \ touch*\n\n#### Today's Day and Date Shown on the Calendar Icon\n\nThe **Calendar**\
    \ icon is usually right on your iPod touch's **Home** screen. You will quickly\
    \ notice that your **Calendar** icon changes to show today's date and the day\
    \ of the week. The icon to the right shows that it is a Friday, the 16^(th) day\
    \ of the month.\n\n![images](images/p375-01.jpg)\n\n**TIP:** If you use your iPod\
    \ touch's **Calendar** app often, you might want to think about pinning or moving\
    \ it to the Bottom dock; you learned how to do this in the section on docking\
    \ icons in [Chapter 6](#Chapter06.html#ch6): “Icons and Folders.”\n\n#### Viewing\
    \ Your Appointments and Getting Around in Calendar\n\nThe default view for the\
    \ **Calendar** app shows your **Day** view. This view shows you at a glance any\
    \ upcoming appointments for your day. Appointments are shown in your calendar.\
    \ If you happen to have multiple calendars set up on your computer, such as **Work**\
    \ and **Home**, then appointments from the different calendars will display as\
    \ different colors on your iPod touch's calendar.\n\nYou can manipulate the calendar\
    \ in various ways:\n\n*   **Move a day at a time**: If you tap the triangles next\
    \ to today's date at the top, you move forward or backward a day.\n\n    **TIP:**\
    \ Touch and hold the triangles next to the date to advance quickly through days.\n\
    \n*   **Change views**: Tap the **List**, **Day**, and **Month** buttons at the\
    \ bottom to change the view.\n*   **Jump to today**: Tap the **Today** button\
    \ at the bottom-left corner.\n\n#### The Four Calendar Views\n\nYour **Calendar**\
    \ app comes with four views. **Day**, **List**, **Week,** and **Month** are all\
    \ available in Portrait orientation; and you can switch between views by tapping\
    \ the name of the view at the bottom of the screen. **Week** view is only available\
    \ in Landscape orientation, and you can switch to it by turning your iPod touch\
    \ sideways. Here's a quick overview of the four views:\n\n*   **Day view**: When\
    \ you start the iPod touch's **Calendar** app, the default view is usually the\
    \ **Day** view. This allows you to quickly see everything you have scheduled for\
    \ the day. You can find buttons to change the view at the bottom of the **Calendar**\
    \ app.\n\n    ![images](images/p376-01.jpg)\n\n    To move from one day to the\
    \ next, simply swipe from right to left. To move back a day, swipe from left to\
    \ right.\n\n    ![images](images/p376-02.jpg)\n\n*   **List** view (also known\
    \ as **Agenda** view): Tap the **List** button at the bottom, and you can see\
    \ a list of your appointments.\n\n    Depending on how much you have scheduled,\
    \ you could see the next day or even the next week's worth of scheduled events.\n\
    \n    Swipe up or down to see more events.\n\n    ![images](images/p376-03.jpg)\n\
    \n*   **Month view**: Tap the **Month** button at the bottom, and you can see\
    \ a layout of the full month. Days with appointments have a small dot in them.\
    \ Dots for the current day will show up highlighted in blue.\n\n    ![images](images/p377-01.jpg)\n\
    \n    **TIP:** To return to the **Today** view, just touch the **Today** button\
    \ at the bottom left.\n\n    ![images](images/p377-02.jpg)\n\n    **Go to the\
    \ next month**: Tap the triangle to the right of the month shown at the top.\n\
    \n    **Go to the previous month**: Tap the triangle to the left of the month.\n\
    \n*   **Week** view: Turn you iPod touch sideways to landscape orientation to\
    \ access the week view.\n*   Swipe left or right to see more days.\n\n    ![images](images/p377-03.jpg)\n\
    \n#### Working with Several Calendars\n\nThe **Calendar** app lets you view and\
    \ work with more than one calendar. The number of calendars you see depends on\
    \ how many you are syncing. For example, you may have iCloud or Google Calendar\
    \ syncing for home and Exchange for work,\n\n> To view just one calendar at a\
    \ time, tap the **Calendars** button at the top and select only the calendar you\
    \ wish to see.\n\n![images](images/p378-01.jpg)\n\nWhen you set up your **Sync**\
    \ settings, you were able to specify which calendars you wanted to sync with your\
    \ iPod touch. You can customize your calendar further by following these instructions:\n\
    \n*   **Changing the colors**: If you don't like the color of a calendar on your\
    \ iPod touch, it's easy to change:\n\n    *   Tap on the **Calendars** button\
    \ at the top right\n    *   Tap on the **Edit** button at the top right.\n   \
    \ *   Tap on the calendar you want to change.\n    *   You'll be presented with\
    \ a list of color choices. Tap the one you want are you new color will be set.\n\
    \n    ![images](images/p378-02.jpg)\n\n*   **Adding a new calendar**: If you are\
    \ using iCloud to sync, you will be able to add a new calendar on your iPod touch:\n\
    \n    1.  Tap **Calendars** at the top-right.\n    2.  Tap **Edit** at the top-right.\n\
    \    3.  Scroll down and tap **Add Calendar…** in the iCloud section\n    4. \
    \ Enter a name and choose a color for your new calendar, and you're done!\n\n\
    \    ![images](images/p379-01.jpg)\n\n### Adding New Calendar Events\n\nYou can\
    \ easily add new events or appointments right on your iPod touch. These new events\
    \ and appointments will be synced (or shared with) your computer the next time\
    \ a sync takes place."
  trans: "\n# 日历和提醒事项\n\niPod touch 让过去挂在冰箱上的旧日历变得过时。在本章中，我们将向你展示如何充分利用 iPod touch\
    \ 上的`日历`应用。例如，我们将展示如何安排约会、管理多个日历、更改日历视图，甚至处理会议邀请。\n\n在 iOS 5 中，Apple 新增了`提醒事项`应用，用于轻松管理你的所有任务和待办列表。\n\
    \n**注意：** 本章大部分内容将讨论如何将你的 iPod touch 日历与另一个日历同步，因为让你的日历在 iPod touch 和其他地方都能访问是很方便的。如果你愿意，你也可以将你的\
    \ iPod touch 用作*独立*模式，即不与任何其他日历同步。在后一种情况下，我们描述的所有关于事件、查看和管理事件的步骤同样适用于你。然而，至关重要的是，你必须使用\
    \ iCloud 或 iTunes 自动备份功能来保存一份日历副本，以防你的 iPod touch 出现意外。\n\n## 在 iPod touch 上管理繁忙的生活\n\
    \n`日历`和`提醒事项`应用提供了强大且易于使用的功能，帮助你管理约会、跟踪待办事项、设置提醒闹钟，甚至创建和回复会议邀请（适用于 Exchange 和\
    \ iCloud 用户）。\n\n### 同步或共享日历和提醒事项\n\n如果你在电脑上维护日历或任务列表，或者在某个网站上维护日历（如 iCloud 或\
    \ Google 日历），那么你可以通过两种方式与该 iPod touch 同步或共享这些数据：使用 iTunes 应用和同步线缆，或设置无线同步（有关同步信息，请参阅第\
    \ 3 章：“同步 iCloud、iTunes 及更多”）。\n\n![image](img/p374-01.jpg)\n\n设置日历和任务同步后，根据你的同步设置，电脑上的所有日历约会和待办列表将自动与\
    \ iPod touch 日历同步（参见图 18–1）。\n\n如果你使用`iTunes`与日历（例如`Microsoft Outlook`或 Apple\
    \ 的`iCal`）同步，每次将 iPod touch 连接到电脑时，约会和任务都会被传输或同步。\n\n如果你使用其他同步方法（例如 iCloud、Exchange\
    \ 或类似服务），此同步是无线且自动的，并且在初始设置过程完成后，很可能无需你做任何操作。\n\n![images](img/1801.jpg)\n\n**图\
    \ 18–1**.*将 PC 或 Mac 日历同步到 iPod touch*\n\n### 日历图标上显示的当天日期与星期\n\n`日历`图标通常就在你的\
    \ iPod touch 的`主屏幕`上。你会很快注意到，`日历`图标会发生变化，显示当天的日期和星期。右侧的图标显示这是当月 16^日，星期五一。\n\n\
    ![images](img/p375-01.jpg)\n\n**提示：** 如果你经常使用 iPod touch 的`日历`应用，你可能需要考虑将其固定或移到底部程序坞；你已经在第\
    \ 6 章：“图标与文件夹”中关于固定图标的章节学习了如何操作。\n\n### 查看约会与在日历中导航\n\n`日历`应用的默认视图显示`日`视图。此视图让你一目了然地查看当天即将到来的约会。约会会显示在你的日历中。如果你的电脑上设置了多个日历，例如`工作`和`家庭`，则来自不同日历的约会将在\
    \ iPod touch 的日历上以不同颜色显示。\n\n你可以通过多种方式操作日历：\n\n*   **逐日移动**：点击顶部当天日期旁边的三角形，可以向前或向后移动一天。\n\
    \n    **提示：** 长按日期旁边的三角形可以快速浏览多天。\n\n*   **更改视图**：点击底部的`列表`、`日`和`月`按钮来切换视图。\n\
    *   **跳转到今天**：点击左下角的`今天`按钮。\n\n### 四种日历视图\n\n你的`日历`应用提供四种视图。`日`、`列表`、`周`和`月`在竖屏方向下均可使用；你可以通过点击屏幕底部的视图名称在它们之间切换。`周`视图仅在横屏方向下可用，你可以通过将\
    \ iPod touch 侧向旋转来切换到该视图。以下是四种视图的快速概览：\n\n*   **日视图**：当你启动 iPod touch 的`日历`应用时，默认视图通常是`日`视图。这让你能快速查看当天安排的所有事项。你可以在`日历`应用底部找到更改视图的按钮。\n\
    \n    ![images](img/p376-01.jpg)\n\n    要从一天转到下一天，只需从右向左滑动。要回到上一天，则从左向右滑动。\n\n\
    \    ![images](img/p376-02.jpg)\n\n*   **列表视图**（也称为**议程**视图）：点击底部的`列表`按钮，你可以看到一个约会的列表。\n\
    \n    根据你的日程安排量，你可能会看到下一天甚至下一周的计划事件。\n\n    向上或向下滑动以查看更多事件。\n\n    ![images](img/p376-03.jpg)\n\
    \n*   **月视图**：点击底部的`月`按钮，你可以看到整个月的布局。有约会的日子会显示一个小点。当天的点会以蓝色高亮显示。\n\n    ![images](img/p377-01.jpg)\n\
    \n    **提示：** 要返回`今天`视图，只需点击左下角的`今天`按钮。\n\n    ![images](img/p377-02.jpg)\n\n\
    \    **转到下个月**：点击顶部显示的月份右侧的三角形。\n\n    **转到上个月**：点击月份左侧的三角形。\n\n*   **周视图**：将\
    \ iPod touch 侧向旋转到横屏方向，即可访问周视图。\n*   向左或向右滑动以查看更多天数。\n\n    ![images](img/p377-03.jpg)\n\
    \n### 使用多个日历\n\n`日历`应用允许你查看和使用多个日历。你所看到的日历数量取决于你同步了多少个。例如，你可能为家庭同步了 iCloud 或 Google\
    \ 日历，为工作同步了 Exchange。\n\n> 要一次只查看一个日历，请点击顶部的`日历`按钮，然后只选择你想要查看的日历。\n\n![images](img/p378-01.jpg)\n\
    \n当你设置`同步`设置时，你可以指定要将哪些日历与你的 iPod touch 同步。你可以按照以下说明进一步自定义你的日历：\n\n*   **更改颜色**：如果你不喜欢\
    \ iPod touch 上某个日历的颜色，更改起来很容易：\n\n    *   点击右上角的`日历`按钮。\n    *   点击右上角的`编辑`按钮。\n\
    \    *   点击你想要更改的日历。\n    *   你会看到一系列颜色选项。点击你喜欢的颜色，新颜色就会设置好。\n\n    ![images](img/p378-02.jpg)\n\
    \n*   **添加新日历**：如果你使用 iCloud 进行同步，你可以在 iPod touch 上添加新日历：\n\n    1.  点击右上角的`日历`。\n\
    \    2.  点击右上角的`编辑`。\n    3.  向下滚动并点击 iCloud 部分中的`添加日历…`。\n    4.  输入名称并为新日历选择颜色，这样就完成了！\n\
    \n    ![images](img/p379-01.jpg)\n\n## 添加新的日历事件\n\n你可以在 iPod touch 上轻松添加新的事件或约会。这些新的事件和约会将在下次同步时与你的电脑同步（或共享）。\n"
- fmt: "#### Adding a New Appointment\n\nYour instinct will most likely be to try\
    \ to touch the screen at a particular time to set an appointment; and with iOS\
    \ 5, you can finally do just that!\n\n![images](images/p380-01.jpg)\n\nTo add\
    \ a new calendar event from any `Calendar` view, follow these steps:\n\n1.  Tap\
    \ and hold your finger on the screen at the place where you want the appointment\
    \ until a new colored bubble appears. (You can also still tap the `+` icon at\
    \ the upper-right corner of the screen to add a new event.)\n\n    ![images](images/p380-02.jpg)\n\
    \n2.  On the `Add Event` screen, touch the box marked `Title & Location`.\n\n\
    \    Type in a title for the event and the location (optional). For example, you\
    \ might type “Meet with Martin” as the title and input the location as “Office.”\
    \ Or, you might choose to type “Lunch with Martin” and then choose a very expensive\
    \ restaurant in New York City.\n\n3.  Touch the blue `Done` button in the upper-right\
    \ corner to return to the `Add Event` screen.\n\n    ![images](images/p380-03.jpg)\n\
    \n4.  Touch the `Starts` or `Ends` tab to adjust the event timing. To change the\
    \ start time, touch the `Starts` field to highlight it in blue. Next, move the\
    \ rotating dials at the bottom to reflect the correct date and start time of the\
    \ appointment.\n\n    ![images](images/p381-01.jpg)\n\n5.  Alternatively, you\
    \ can set an all-day event by touching the switch next to `All-day` to set it\
    \ to `ON`.\n\n**NOTE:** You will see a tab labeled `Invitees` after the `Repeat`\
    \ tab only if your event is set up on an Exchange/Google or iCloud calendar.\n\
    \n#### Recurring Events\n\nSome of your appointments happen every day, week, or\
    \ month at the same time. Follow these steps if you are scheduling a recurring\
    \ appointment:\n\n1.  Touch the `Repeat` tab and then select the interval of time\
    \ for the recurring appointment from the list.\n2.  Touch `Done` to return to\
    \ the main `Event` screen.\n\n    ![images](images/p381-02.jpg)\n\n3.  If you\
    \ set a `Repeat` meeting, then you will also have to say when the repeating event\
    \ ends. Tap the `End Repeat` button to set this.\n4.  You can select `Repeat Forever`\
    \ or set a date.\n5.  Tap `Done` when finished.\n\n    ![images](images/p382-01.jpg)\n\
    \n#### Calendar Alerts\n\nYou can have your iPod touch 4 give you an audible reminder,\
    \ or *alert*, about an upcoming appointment. Alerts can help you keep from forgetting\
    \ an important event. Follow these steps to create an alert:\n\n1.  Touch the\
    \ `Alert` tab and then select the option for a reminder alarm. You can have no\
    \ alarm (`None`) at all or set a reminder that ranges from `At time of event`\
    \ all the way to `2 days before` the event, depending on what works best for you.\n\
    2.  Touch `Done` to get back to the main `Event` screen.\n\n    ![images](images/p382-02.jpg)\n\
    \n#### Second Alert\n\n**NOTE:** You will see a `second Alert` option if the calendar\
    \ you are using is synced using iTunes or iCloud. However, you will not see a\
    \ second alert if your event is tied to a Google Calendar synced using the Exchange\
    \ setting.\n\n![images](images/p383-01.jpg)\n\nIn most cases, you will see a tab\
    \ for a `Second Alert` option once you set your first `Alert` option. You can\
    \ set this second alert to another time before or after the first alert. Some\
    \ people find a second alert very helpful for remembering critical events or appointments.\n\
    \n**TIP:** Here's a practical example that illustrates when you might want to\
    \ set up two calendar alerts.\n\nIf your child has a doctor or dentist appointment,\
    \ then you might want to set the first event to go off the night before. This\
    \ will remind you to write a note to the school and give it to your child.\n\n\
    You can then set the second event for 45 minutes prior to the appointment time.\
    \ This will leave you enough time to pick up your child from school and get to\
    \ the appointment.\n\n#### Choosing a Calendar\n\n![images](images/p383-02.jpg)\n\
    \nIf you use more than one calendar, tap on the `Calendar` tab to change the calendar\
    \ to which your new event is assigned.\n\nTouch the `Calendar` button in the upper-left\
    \ corner to see all your calendars.\n\nTap the calendar you want to use for this\
    \ particular event. Usually, the calendar selected by default is the one you selected\
    \ the last time you used your iPod touch to schedule an event.\n\n![images](images/p383-03.jpg)\n\
    \n#### Availability\n\nYou can also let others know about your availability during\
    \ the scheduled event. You can choose your availability from the following options:\
    \ `Busy` (default), `Free`, `Tentative`, or `Out of Office`. (Tentative and Out\
    \ of Office only appear when you sync an account with the Exchange setting.)\n\
    \n![images](images/p384-01.jpg)\n\n**NOTE:** You will only see the `Availability`\
    \ or `Invitees` fields if the calendar you are using for this event is synced\
    \ with the iCloud, Exchange, or Exchange/Google settings, and each provides slightly\
    \ different options. If you are synced with iCloud, you will also see a `URL`\
    \ field where you can add a website address for later reference.\n\n#### Adding\
    \ Notes to Calendar Events\n\n![images](images/p384-02.jpg)\n\nFollow these steps\
    \ if you want to add some notes to a calendar event:\n\n![images](images/p384-03.jpg)\n\
    \n1.  Tap `Notes` and type or copy and paste a few notes.\n2.  Tap `Done` to finish\
    \ adding notes.\n3.  Tap `Done` again to save your new calendar event.\n\n**TIP:**\
    \ If this is a meeting somewhere new, you might want to type or copy and paste\
    \ some driving directions.\n\n### Using Copy and Paste Between the Email and Calendar\
    \ Apps\n\nThe iPod touch software's new Fast App Switcher means you can now easily\
    \ jump between your `Email` and your `Calendar` programs to copy and paste information.\
    \ This information could be anything, ranging from critical notes you need at\
    \ your fingertips for a meeting to driving directions. Follow these steps to copy\
    \ and paste information between your `Email` and `Calendar` programs:\n\n1.  Create\
    \ a new calendar event or edit one, as explained previously in this chapter.\n\
    2.  Scroll down to the `Notes` field and tap it to open it.\n3.  Double-tap the\
    \ `Home` button to bring up the Fast App Switcher.\n4.  If you see the `Mail`\
    \ icon, tap it. If you don't see the `Mail` icon, swipe left or right to look\
    \ for it. Once you find it, tap it to open the `Mail` app.\n\n    ![images](images/p385-01.jpg)\n\
    \n5.  Double-tap a word, then use your fingers to drag the blue handles to select\
    \ the text you want to copy.\n6.  Tap the `Copy` button.\n\n    ![images](images/p385-02.jpg)\n\
    \n7.  Double-tap the `Home` button to bring up the Fast App Switcher.\n8.  Tap\
    \ the `Calendar` icon. It should be the first icon on the left, since you just\
    \ jumped out of the app.\n\n    ![images](images/p386-01.jpg)\n\n9.  Now tap and\
    \ hold in the `Notes` field. When you let go, you should see the `Paste` pop-up\
    \ field. If you don't see it, then hold your finger down a bit longer until you\
    \ do see it.\n10.  Tap `Paste`.\n\n    ![images](images/p386-02.jpg)\n\n11.  Now\
    \ you should see the text you copied and pasted into the `Notes` field.\n12. \
    \ Tap `Done` to save your changes.\n\n    ![images](images/p386-03.jpg)"
  raw: "#### Adding a New Appointment\n\nYour instinct will most likely be to try\
    \ to touch the screen at a particular time to set an appointment; and with iOS\
    \ 5, you can finally do just that!\n\n![images](images/p380-01.jpg)\n\nTo add\
    \ a new calendar event from any **Calendar** view, follow these steps.\n\n1. \
    \ Tap and hold your finger on the screen at the place where you want the appointment\
    \ until a new colored bubble appears. (You can also still tap the + icon at the\
    \ upper-right corner of the screen to add a new event.\n\n    ![images](images/p380-02.jpg)\n\
    \n2.  On the **Add Event** screen**,** touch the box marked **Title & Location**.\n\
    \n    Type in a title for the event and the location (optional). For example,\
    \ you might type “Meet with Martin” as the title and input the location as “Office.”\
    \ Or, you might choose to type “Lunch with Martin” and then choose a very expensive\
    \ restaurant in New York City.\n\n3.  Touch the blue **Done** button in the upper-right\
    \ corner to return to the **Add Event** screen.\n\n    ![images](images/p380-03.jpg)\n\
    \n4.  Touch the **Starts** or **Ends** tab to adjust the event timing. To change\
    \ the start time, touch the **Starts** field to highlight it in blue. Next, move\
    \ the rotating dials at the bottom to reflect the correct date and start time\
    \ of the appointment.\n\n    ![images](images/p381-01.jpg)\n\n5.  Alternatively,\
    \ you can set an all-day event by touching the switch next to **All-day** to set\
    \ it to **ON**.\n\n**NOTE:** You will see a tab labeled **Invitees** after the\
    \ **Repeat** tab only if your event is set up on an Exchange/Google or iCloud\
    \ calendar.\n\n#### Recurring Events\n\nSome of your appointments happen every\
    \ day, week, or month at the same time. Follow these steps if you are scheduling\
    \ a recurring appointment:\n\n1.  Touch the **Repeat** tab and then select the\
    \ interval of time for the recurring appointment from the list.\n2.  Touch **Done**\
    \ to return to the main **Event** screen.\n\n    ![images](images/p381-02.jpg)\n\
    \n3.  If you set a **Repeat** meeting, then you will also have to say when the\
    \ repeating event ends. Tap the **End Repeat** button to set this.\n4.  You can\
    \ select **Repeat Forever** or set a date.\n5.  Tap **Done** when finished.\n\n\
    \    ![images](images/p382-01.jpg)\n\n#### Calendar Alerts\n\nYou can have your\
    \ iPod touch 4 give you an audible reminder, or *alert*, about an upcoming appointment.\
    \ Alerts can help you keep from forgetting an important event. Follow these steps\
    \ to create an alert:\n\n1.  Touch the **Alert** tab and then select the option\
    \ for a reminder alarm. You can have no alarm (**None**) at all or set a reminder\
    \ that ranges from **At time of event** all the way to **2 days before** the event,\
    \ depending on what works best for you.\n2.  Touch **Done** to get back to the\
    \ main **Event** screen.\n\n    ![images](images/p382-02.jpg)\n\n#### Second Alert\n\
    \n**NOTE:** You will see a **second Alert** option if the calendar you are using\
    \ is synced using iTunes or iCloud. However, you will not see a second alert if\
    \ your event is tied to a Google Calendar synced using the Exchange setting.\n\
    \n![images](images/p383-01.jpg)\n\nIn most cases, you will see a tab for a **Second\
    \ Alert** option once you set your first **Alert** option. You can set this second\
    \ alert to another time before or after the first alert. Some people find a second\
    \ alert very helpful for remembering critical events or appointments.\n\n**TIP:**\
    \ Here's a practical example that illustrates when you might want to set up two\
    \ calendar alerts.\n\nIf your child has a doctor or dentist appointment, then\
    \ you might want to set the first event to go off the night before. This will\
    \ remind you to write a note to the school and give it to your child.\n\nYou can\
    \ then set the second event for 45 minutes prior to the appointment time. This\
    \ will leave you enough time to pickup your child from school and get to the appointment.\n\
    \n#### Choosing a Calendar\n\n![images](images/p383-02.jpg)\n\nIf you use more\
    \ than one calendar, tap on the **Calendar** tab to change the calendar to which\
    \ your new event is assigned.\n\nTouch the **Calendar** button in the upper- left\
    \ corner to see all your calendars.\n\nTap the calendar you want to use for this\
    \ particular event. Usually, the calendar selected by default is the one you selected\
    \ the last time you used your iPod touch to schedule an event.\n\n![images](images/p383-03.jpg)\n\
    \n#### Availability\n\nYou can also let others know about your availability during\
    \ the scheduled event. You can choose your availability from the following options:\
    \ **Busy** (default), **Free**, **Tentative**, or **Out of Office**. (Tentative\
    \ and Out of Office only appear when you sync an account with the Exchange setting.)\n\
    \n![images](images/p384-01.jpg)\n\n**NOTE:** You will only see the **Availability**\
    \ or **Invitees** fields if the calendar you are using for this event is synced\
    \ with the iCloud, Exchange, or Exchange/Google settings, and each provides slightly\
    \ different options. If you are synced with iCloud, you will also see a **URL**\
    \ field where you can add a website address for later reference.\n\n#### Adding\
    \ Notes to Calendar Events\n\n![images](images/p384-02.jpg)\n\nFollow these steps\
    \ if you want to add some notes to a calendar event:\n\n![images](images/p384-03.jpg)\n\
    \n1.  Tap **Notes** and type or copy and paste a few notes.\n2.  Tap **Done**\
    \ to finish adding notes.\n3.  Tap **Done** again to save your new calendar event.\n\
    \n**TIP:** If this is a meeting somewhere new, you might want to type or copy\
    \ and paste some driving directions.\n\n### Using Copy and Paste Between the Email\
    \ and Calendar Apps\n\nThe iPod touch software's new Fast App Switcher means you\
    \ can now easily jump between your **Email** and your **Calendar** programs to\
    \ copy and paste information. This information could be anything, ranging from\
    \ critical notes you need at your fingertips for a meeting to driving directions.\
    \ Follow these steps to copy and paste information between your **Email** and\
    \ **Calendar** programs:\n\n1.  Create a new calendar event or edit one, as explained\
    \ previously in this chapter.\n2.  Scroll down to the **Notes** field and tap\
    \ it to open it.\n3.  Double-tap the **Home** button to bring up the Fast App\
    \ Switcher.\n4.  If you see the **Mail** icon, tap it. If you don't see **Mail**\
    \ icon, swipe left or right to look for it. Once you find it, tap it to open the\
    \ **Mail** app.\n\n    ![images](images/p385-01.jpg)\n\n5.  Double-tap a word,\
    \ then use your fingers to drag the blue handles to select the text you want to\
    \ copy.\n6.  Tap the **Copy** button.\n\n    ![images](images/p385-02.jpg)\n\n\
    7.  Double-tap the **Home** button to bring up the Fast App Switcher.\n8.  Tap\
    \ the **Calendar** icon. It should be the first icon on the left, since you just\
    \ jumped out of the app.\n\n    ![images](images/p386-01.jpg)\n\n9.  Now tap and\
    \ hold in the **Notes** field. When you let go, you should see the **Paste** pop-up\
    \ field. If you don't see it, then hold your finger down a bit longer until you\
    \ do see it.\n10.  Tap **Paste**.\n\n    ![images](images/p386-02.jpg)\n\n11.\
    \  Now you should see the text you copied and pasted into the **Notes** field.\n\
    12.  Tap **Done** to save your changes.\n\n    ![images](images/p386-03.jpg)"
  trans: "\n#### 添加新日程\n\n你的第一反应很可能是尝试在屏幕上的特定时间点触碰来设定日程；而在 iOS 5 中，你终于可以这样操作了！\n\n\
    ![images](img/p380-01.jpg)\n\n要从任意`日历`视图添加新的日历事件，请按照以下步骤操作：\n\n1.  在屏幕上你想设定日程的位置长按手指，直到出现一个新的彩色气泡。（你也可以继续点击屏幕右上角的`+`图标来添加新事件。）\n\
    \n    ![images](img/p380-02.jpg)\n\n2.  在`添加事件`屏幕上，点击标记为`标题与位置`的输入框。\n\n    输入事件的标题和位置（可选）。例如，你可以输入“与马丁会面”作为标题，并将位置设为“办公室”。或者，你也可以输入“与马丁共进午餐”，然后选择纽约市一家非常昂贵的餐厅。\n\
    \n3.  点击右上角的蓝色`完成`按钮，返回`添加事件`屏幕。\n\n    ![images](img/p380-03.jpg)\n\n4.  点击`开始`或`结束`标签来调整事件时间。要更改开始时间，请点击`开始`字段使其高亮显示为蓝色。接着，移动底部的旋转拨盘，以调整到正确的日期和日程开始时间。\n\
    \n    ![images](img/p381-01.jpg)\n\n5.  或者，你也可以通过点击`全天`旁边的开关，将其设置为`开启`，来设定一个全天事件。\n\
    \n**注意：** 仅当你的事件设置在 Exchange/Google 或 iCloud 日历时，你才会在`重复`标签之后看到名为`受邀人`的标签。\n\n\
    #### 重复事件\n\n你的一些日程可能是每天、每周或每月在同一时间发生。如果你正在安排一个重复事件，请按照以下步骤操作：\n\n1.  点击`重复`标签，然后从列表中选择重复事件的时间间隔。\n\
    2.  点击`完成`返回主`事件`屏幕。\n\n    ![images](img/p381-02.jpg)\n\n3.  如果你设置了`重复`会议，那么你还需要指定重复事件何时结束。点击`结束重复`按钮进行设置。\n\
    4.  你可以选择`永远重复`或设定一个具体日期。\n5.  完成后点击`完成`。\n\n    ![images](img/p382-01.jpg)\n\n\
    #### 日历提醒\n\n你可以让 iPod touch 4 在临近日程时发出声音提醒，即*提醒*。提醒功能可以帮助你避免忘记重要事件。请按照以下步骤创建提醒：\n\
    \n1.  点击`提醒`标签，然后选择一种提醒闹钟选项。你可以选择不设置闹钟（`无`），或者设置一个从`事件发生时`一直到`事件前 2 天`的提醒，具体取决于哪种最适合你。\n\
    2.  点击`完成`返回主`事件`屏幕。\n\n    ![images](img/p382-02.jpg)\n\n#### 第二次提醒\n\n**注意：**\
    \ 如果你使用的日历是通过 iTunes 或 iCloud 同步的，你会看到`第二次提醒`选项。但是，如果你的事件关联的是通过 Exchange 设置同步的\
    \ Google 日历，则不会看到第二次提醒。\n\n![images](img/p383-01.jpg)\n\n在大多数情况下，一旦你设置了第一个`提醒`选项，你便会看到`第二次提醒`选项的标签。你可以将这第二次提醒设置在第一次提醒之前或之后的另一个时间。有些人发现第二次提醒对于记住关键事件或日程非常有帮助。\n\
    \n**提示：** 这里有一个实际例子，说明了什么时候你可能需要设置两次日历提醒。\n\n如果你的孩子有看医生或看牙医的预约，你可能想将第一次提醒设在预约前一晚。这可以提醒你给学校写一张便条并交给孩子。\n\
    \n然后，你可以将第二次提醒设在预约时间前 45 分钟。这样你就有足够的时间去学校接孩子并准时赴约。\n\n#### 选择日历\n\n![images](img/p383-02.jpg)\n\
    \n如果你使用多个日历，请点击`日历`标签来更改新事件所属的日历。\n\n点击左上角的`日历`按钮查看你所有的日历。\n\n点击你想用于此特定事件的日历。通常，默认选中的日历是你上次使用\
    \ iPod touch 安排事件时选择的那个。\n\n![images](img/p383-03.jpg)\n\n#### 忙闲状态\n\n你也可以让其他人了解你在计划事件期间的忙闲状态。你可以从以下选项中选择你的状态：`忙碌`（默认）、`空闲`、`待定`或`不在办公室`。（`待定`和`不在办公室`仅在你通过\
    \ Exchange 设置同步账户时出现。）\n\n![images](img/p384-01.jpg)\n\n**注意：** 仅当你用于此事件的日历与 iCloud、Exchange\
    \ 或 Exchange/Google 设置同步时，你才会看到`忙闲状态`或`受邀人`字段，并且每个设置提供的选项略有不同。如果你与 iCloud 同步，你还会看到一个`URL`字段，你可以在其中添加一个网址以备日后参考。\n\
    \n#### 向日历事件添加备注\n\n![images](img/p384-02.jpg)\n\n如果你想向日历事件添加备注，请按照以下步骤操作：\n\n\
    ![images](img/p384-03.jpg)\n\n1.  点击`备注`，然后输入或复制粘贴一些备注内容。\n2.  点击`完成`结束添加备注。\n\
    3.  再次点击`完成`保存你的新日历事件。\n\n**提示：** 如果这是一次去新地方的会议，你可能想输入或复制粘贴一些行车路线。\n\n### 在邮件和日历应用之间使用复制与粘贴\n\
    \niPod touch 软件新增的快速应用切换器意味着你现在可以轻松地在`邮件`和`日历`程序之间跳转，以复制和粘贴信息。这些信息可以是任何内容，从会议所需的紧要笔记到行车路线。请按照以下步骤在`邮件`和`日历`程序之间复制和粘贴信息：\n\
    \n1.  按照本章前面所述，创建一个新的日历事件或编辑一个现有事件。\n2.  向下滚动到`备注`字段并点击以打开它。\n3.  双击`主屏幕`按钮以调出快速应用切换器。\n\
    4.  如果你看到`邮件`图标，点击它。如果没有看到，请向左或向右滑动来寻找。找到后，点击它以打开`邮件`应用。\n\n    ![images](img/p385-01.jpg)\n\
    \n5.  双击一个单词，然后用手指拖动蓝色手柄以选择你要复制的文本。\n6.  点击`复制`按钮。\n\n    ![images](img/p385-02.jpg)\n\
    \n7.  双击`主屏幕`按钮以调出快速应用切换器。\n8.  点击`日历`图标。它应该是左边第一个图标，因为你刚刚从这个应用中跳转出来。\n\n    ![images](img/p386-01.jpg)\n\
    \n9.  现在，在`备注`字段中长按。当你松开手指时，你应该会看到`粘贴`弹出字段。如果没有看到，请将手指按住稍久一点，直到看到它为止。\n10.  点击`粘贴`。\n\
    \n    ![images](img/p386-02.jpg)\n\n11.  现在你应该会看到你复制并粘贴到`备注`字段中的文本。\n12.  点击`完成`保存你的更改。\n\
    \n    ![images](img/p386-03.jpg)\n"
- fmt: "# Editing Appointments\n\nSometimes, the details of an appointment may change\
    \ and need to be adjusted. Fortunately, it's easy to revise an appointment on\
    \ your iPod touch. If all you want to do is change the time, you can simply move\
    \ it on the screen.\n\n1.  Touch and hold your finger down on the appointment\
    \ you want to change.\n2.  Drag the appointment to its new time slot.\n\n    If\
    \ you need to change the time more drastically than touch-and-drag allows, or\
    \ if you need to change other fields, you can also use the `Edit` button.\n\n\
    \    ![images](images/p387-01.jpg)\n\n3.  Tap the appointment that you want to\
    \ change.\n4.  Tap the `Edit` button in the upper-right corner to see the `Edit`\
    \ screen that shows the appointment details.\n5.  Touch the tab in the field you\
    \ need to adjust, just like you did when creating the event. For example, you\
    \ can change the time of this appointment by touching the `Starts` or `Ends` tab,\
    \ and then adjusting the event's starting or ending time.\n\n## Editing a Repeating\
    \ Event\n\nYou edit a recurring or repeating event in exactly the same manner\
    \ as any other event. The only difference is that you will be asked a question\
    \ after you finish editing the event. You need to answer this question and tap\
    \ the `Done` button.\n\nTap `Save for this event only` if you want to make changes\
    \ to only this instance of the repeating event.\n\nTap `Save for future events`\
    \ if you want to make changes to all instances of this repeating event.\n\n![images](images/p388-01.jpg)\n\
    \n## Switching an Event to a Different Calendar\n\nIf you mistakenly set up an\
    \ event on the wrong calendar, then go ahead and tap the `Calendar` button to\
    \ change the calendar. Next, select one of the different calendars you have synced\
    \ to your iPod touch.\n\n**NOTE:** Different fields may appear or disappear, depending\
    \ on the calendar you choose to use.\n\nIf you change your event from a calendar\
    \ synced using `iTunes` to one synced with Exchange, then you will see the `second\
    \ Alert` field disappear. Also, you will see two new fields appear with an Exchange,\
    \ Google, or iCloud calendar: `Invitees` and `Availability`.\n\n## Deleting an\
    \ Event\n\nNotice that, at the bottom of the `Edit` screen, you also have the\
    \ option to delete this event. Simply touch the `Delete Event` button at the bottom\
    \ of the screen to do so.\n\n![images](images/p388-02.jpg)\n\n## Meeting Invitations\n\
    \nFor those who use Microsoft Exchange, `Microsoft Outlook`, or iCloud regularly,\
    \ meeting invitations become a way of life. You receive a meeting invitation in\
    \ your email, you accept the invitation, and then the appointment gets automatically\
    \ placed in your calendar.\n\nOn your iPod touch, you will see that invitations\
    \ you accept are placed into your calendar immediately.\n\nIf you touch the meeting\
    \ invitation in your calendar, you can see all the details that you need: the\
    \ dial in number, the meeting ID, and any other details that might be included\
    \ in the invitation.\n\n![images](images/p389-01.jpg)\n\n# Calendar Options\n\n\
    There are only a few options to adjust in your `Calendar` app; you can find these\
    \ in the `Settings` app. Follow these steps to adjust these options:\n\n![images](images/p389-02.jpg)\n\
    \n1.  Tap `Settings` from your `Home` screen.\n2.  Scroll down to `Mail, Contacts,\
    \ Calendars` and tap it.\n3.  Scroll down to `Calendars` (it's at the very bottom!)\
    \ to see a few options.\n4.  The first option is a simple switch that notifies\
    \ you about `New Invitation Alerts`. If you receive any meeting invitations, it\
    \ is good to keep this option set to the default `ON` position.\n\n    ![images](images/p389-03.jpg)\n\
    \n5.  Next, you may see the `Sync` option if you sync your `Calendar` program\
    \ using Exchange or iCloud. You can adjust the setting to sync events to `2 Weeks\
    \ Back`, `1 Month Back`, `3 Months Back`, `6 Months Back`, or to show all `All\
    \ Events`.\n6.  Next, you can choose your time zone. This setting should reflect\
    \ your `Home` settings from when you set up your iPod touch. If you are traveling\
    \ and want to adjust your appointments for a different time zone, you can change\
    \ the `Time Zone` value to whatever city you prefer.\n\n    ![images](images/p390-01.jpg)\n\
    \n7.  Default alert times can be set for birthdays, events, and all-day events.\
    \ Events contain the usual options while birthdays and all-day events allow for\
    \ the day of the event, 1 day before, or 2 days before (all at 9am), or 1 week\
    \ before.\n\n## Changing the Default Calendar\n\nWe mentioned earlier that you\
    \ can have multiple calendars displayed on your iPod touch. The `Default Calendar`\
    \ screen allows you to choose which calendar will be your default calendar.\n\n\
    Specifying a calendar as the default means that, when you go to schedule a new\
    \ appointment, this calendar will be selected by default.\n\nIf you wish to use\
    \ a different calendar—say, your `Work` calendar—then you can change that when\
    \ you actually set the appointment, as shown earlier in this chapter.\n\n![images](images/p390-02.jpg)\n\
    \n# Reminders\n\n`Reminders` is a new app in iOS 5 that lets you simply and easily\
    \ keep track of the things you need to get done and the dates and times you need\
    \ to get them done by. You can think of this app as Apple's answer to task or\
    \ to-do lists.\n\n## Reminder Views\n\nYour `Reminders` app has three main views:\
    \ `List`, `Date`, and `Month`. What follows is a quick overview of these views.\n\
    \n`List` is the default view for `Reminders` and shows you at a glance all the\
    \ tasks you need to accomplish.\n\n**NOTE:** The default `List` view for iCloud\
    \ accounts is called `Reminders`. The default `List` view for Microsoft Exchange\
    \ accounts is called `Tasks`.\n\nIf you have multiple lists, you can move between\
    \ them by swiping from right to left, just as when moving between the different\
    \ app pages on your iPod touch's `Home` screen.\n\nSwipe from left to right to\
    \ see a list of your `Completed` tasks.\n\n![images](images/p391-01.jpg)\n\n`Date`\
    \ view lets you see your reminders on the day they're due. You can easily swipe\
    \ from one day to the next; you can also scroll along the `Date` slider at the\
    \ bottom. Follow these steps to change the date shown:\n\n* **Go to the next day**:\
    \ Swipe from right to left.\n* **Go to the previous day**: Swipe from left to\
    \ right.\n* **Go to Completed Task list**: Swipe from left to right from the current\
    \ day.\n\n![images](images/p391-02.jpg)\n\n**TIP**: To return to the `Today` view,\
    \ just touch the `Today` button at the top right.\n\n![images](images/p391-03.jpg)\n\
    \nTo see the `Month` view, tap the `Month` button ![images](images/p392-01.jpg)\
    \ at the top left of the `Date` view. This will show you a layout of the full\
    \ month. Days with reminders due are colored red.\n\n**TIP**: To return to the\
    \ `Today` view, just touch the `Today` button at the top right.\n\n![images](images/p392-03.jpg)\n\
    \nFollow these steps to move back and forth between months:\n\n![images](images/p392-02.jpg)\n\
    \n* **Go to the next month:** Scroll down.\n* **Go to the previous month:** Scroll\
    \ up.\n\n## Adding a New Reminder\n\nTo add a new task from any `List` view, follow\
    \ these steps:\n\n![images](images/p392-04.jpg)\n\n1.  Tap the first blank line\
    \ at the end of your current list.\n2.  Type in a title for your task.\n3.  When\
    \ you're finished, tap the black `Done` button on the top right.\n\n    **NOTE:**\
    \ You can also tap the `Add` button to create a new task.![images](images/p392-05.jpg)\n\
    \n## Adding Reminder Details\n\nTo add details to a task, tap the task's title.\
    \ The `Details` screen lets you add the due date for `Remind Me`, the `Priority`\
    \ of the reminder, which `List` you'd like it attached to, and any `Notes` you\
    \ might want to add.\n\nThe `Details` page is also where you can delete a task.\n\
    \n**NOTE:** If you don't see all the options at first, tap the `Show More` button\
    \ to reveal them.\n\n![images](images/p393-01.jpg)"
  raw: "### Editing Appointments\n\nSometimes, the details of an appointment may change\
    \ and need to be **adjusted**. Fortunately, it's easy to revise an appointment\
    \ on your iPod touch. If all you want to do is change the time, you can simply\
    \ move it on the screen.\n\n1.  Touch and hold your finger down on the appointment\
    \ you want to change.\n2.  Drag the appointment to its new time slot.\n\n    If\
    \ you need to change the time more drastically than touch-and-drag allows, or\
    \ if you need to change other fields, you can also use the **Edit** button.\n\n\
    \    ![images](images/p387-01.jpg)\n\n3.  Tap the appointment that you want to\
    \ change.\n4.  Tap the **Edit** button in the upper-right corner to see the **Edit**\
    \ screen that shows the appointment details.\n5.  Touch the tab in the field you\
    \ need to adjust, just like you did when creating the event. For example, you\
    \ can change the time of this appointment by touching the **Starts** or **Ends**\
    \ tab, and then adjusting the event's starting or ending time.\n\n#### Editing\
    \ a Repeating Event\n\nYou edit a recurring or repeating event in exactly the\
    \ same manner as any other event. The only difference is that you will be asked\
    \ a question after you finish editing the event. You need to answer this question\
    \ and tap the **Done** button.\n\nTap **Save for this event only** if you want\
    \ to make changes to only this instance of the repeating event.\n\nTap **Save\
    \ for future events** if you want to make changes to all instances of this repeating\
    \ event.\n\n![images](images/p388-01.jpg)\n\n#### Switching an Event to a Different\
    \ Calendar\n\nIf you mistakenly set up an event on the wrong calendar, then go\
    \ ahead and tap the **Calendar** button to change the calendar. Next, select one\
    \ of the different calendars you have synced to your iPod touch.\n\n**NOTE:**\
    \ Different fields may appear or disappear, depending on the calendar you choose\
    \ to use.\n\nIf you change your event from a calendar synced using **iTunes**\
    \ to one synced with Exchange, then you will see the **second Alert** field disappear.\
    \ Also, you will see two new fields appear with an Exchange, Google, or iCloud\
    \ calendar: **Invitees** and **Availability**.\n\n#### Deleting an Event\n\nNotice\
    \ that, at the bottom of the **Edit** screen, you also have the option to delete\
    \ this event. Simply touch the **Delete Event** button at the bottom of the screen\
    \ to do so.\n\n![images](images/p388-02.jpg)\n\n#### Meeting Invitations\n\nFor\
    \ those who use Microsoft Exchange, **Microsoft Outlook**, or iCloud regularly,\
    \ meeting invitations become a way of life. You receive a meeting invitation in\
    \ your email, you accept the invitation, and then the appointment gets automatically\
    \ placed in your calendar.\n\nOn your iPod touch, you will see that invitations\
    \ you accept are placed into your calendar immediately.\n\nIf you touch the meeting\
    \ invitation in your calendar, you can see all the details that you need: the\
    \ dial in number, the meeting ID, and any other details that might be included\
    \ in the invitation.\n\n![images](images/p389-01.jpg)\n\n### Calendar Options\n\
    \nThere are only a few options to adjust in your **Calendar** app; you can find\
    \ these in the **Settings** app. Follow these steps to adjust these options:\n\
    \n![images](images/p389-02.jpg)\n\n1.  Tap **Settings** from your **Home** screen.\n\
    2.  Scroll down to **Mail, Contacts, Calendars** and tap it.\n3.  Scroll down\
    \ to **Calendars** (it's at the very bottom!) to see a few options.\n4.  The first\
    \ option is a simple switch that notifies you about **New Invitation Alerts**.\
    \ If you receive any meeting invitations, it is good to keep this option set to\
    \ the default **ON** position.\n\n    ![images](images/p389-03.jpg)\n\n5.  Next,\
    \ you may see the **Sync** option if you sync your **Calendar** program using\
    \ Exchange or iCloud. You can adjust the setting to sync events to **2 Weeks Back,\
    \ 1 Month Back, 3 Months Back, 6 Months Back**, or to show all **All Events**.\n\
    6.  Next, you can choose your time zone. This setting should reflect your **Home**\
    \ settings from when you set up your iPod touch. If you are traveling and want\
    \ to adjust your appointments for a different time zone, you can change the **Time\
    \ Zone** value to whatever city you prefer.\n\n    ![images](images/p390-01.jpg)\n\
    \n7.  Default alert times can be set for birthdays, events, and all-day events.\
    \ Events contain the usual options while birthdays and all-day events allow for\
    \ the day of the event, 1 day before, or 2 days before (all at 9am), or 1 week\
    \ before.\n\n#### Changing the Default Calendar\n\nWe mentioned earlier that you\
    \ can have multiple calendars displayed on your iPod touch. The **Default Calendar**\
    \ screen allows you to choose which calendar will be your default calendar.\n\n\
    Specifying a calendar as the default means that, when you go to schedule a new\
    \ appointment, this calendar will be selected by default.\n\nIf you wish to use\
    \ a different calendar—say, your **Work** calendar—then you can change that when\
    \ you actually set the appointment, as shown earlier in this chapter.\n\n![images](images/p390-02.jpg)\n\
    \n### Reminders\n\n**Reminders** is a new app in iOS 5 that lets you simply and\
    \ easily keep track of the things you need to get done and the dates and times\
    \ you need to get them done by. You can think of this app as Apple's answer to\
    \ task or to-do lists.\n\n#### Reminder Views\n\nYour **Reminders** app has three\
    \ main views: **List**, **Date,** and **Month.** What follows is a quick overview\
    \ of these views.\n\n**List** is the default view for **Reminders** and shows\
    \ you at a glance all the tasks you need to accomplish.\n\n**NOTE:** The default\
    \ **List** view for iCloud accounts is called **Reminders**. The default **List**\
    \ view for Microsoft Exchange accounts is called **Tasks.**\n\nIf you have multiple\
    \ lists, you can move between them by swiping from right to left, just as when\
    \ moving between the different app pages on your iPod touch's **Home** screen.\n\
    \nSwipe from left to right to see a list of your **Completed** tasks.\n\n![images](images/p391-01.jpg)\n\
    \n**Date** view lets you see your reminders on the day they're due. You can easily\
    \ swipe from one day to the next; you can also scroll along the **Date** slider\
    \ at the bottom. Follow these steps to change the date shown:\n\n*   **Go to the\
    \ next day**: Swipe from right to left.\n*   **Go to the previous day**: Swipe\
    \ from left to right.\n*   **Go to Completed Task list**: Swipe from left to right\
    \ from the current day.\n\n![images](images/p391-02.jpg)\n\n**TIP**: To return\
    \ to the **Today** view, just touch the **Today** button at the top right.\n\n\
    ![images](images/p391-03.jpg)\n\nTo see the **Month** view, tap the **Month**\
    \ button ![images](images/p392-01.jpg) at the top left of the **Date** view. This\
    \ will show you a layout of the full month. Days with reminders due are colored\
    \ red.\n\n**TIP**: To return to the **Today** view, just touch the **Today** button\
    \ at the top right.\n\n![images](images/p392-03.jpg)\n\nFollow these steps to\
    \ move back and forth between months:\n\n![images](images/p392-02.jpg)\n\n*  \
    \ **Go to the next month:** Scroll down.\n*   **Go to the previous month:** Scroll\
    \ up.\n\n#### Adding a New Reminder\n\nTo add a new task from any **List** view,\
    \ follow these steps:\n\n![images](images/p392-04.jpg)\n\n1.  Tap the first blank\
    \ line at the end of your current list.\n2.  Type in a title for your task.\n\
    3.  When you're finished, tap the black **Done** button on the top right.\n\n\
    \    **NOTE:** You can also tap the **Add** button to create a new task.![images](images/p392-05.jpg)\n\
    \n#### Adding Reminder Details\n\nTo add *details* to a task, tap the task's title.\
    \ The **Details** screen lets you add the due date for **Remind Me**, the **Priority**\
    \ of the reminder, which **List** you'd like it attached to, and any **Notes**\
    \ you might want to add.\n\nThe **Details** page is also where you can delete\
    \ a task.\n\n**NOTE:** If you don't see all the options at first, tap the **Show\
    \ More** button to reveal them.\n\n![images](images/p393-01.jpg)"
  trans: "好的，请查收翻译后的中文文档。\n\n\n# 编辑日程\n\n有时，日程的详细信息可能会发生变化而需要调整。幸运的是，在你的 iPod touch\
    \ 上修改日程非常容易。如果你只是想更改时间，可以直接在屏幕上移动它。\n\n1.  按住你想要更改的日程。\n2.  将日程拖拽到新的时间段。\n\n \
    \   如果你需要进行比“触摸并拖拽”更大幅度的调整，或者需要更改其他信息，你也可以使用`编辑`按钮。\n\n    ![images](img/p387-01.jpg)\n\
    \n3.  轻点你想要更改的日程。\n4.  轻点右上角的`编辑`按钮，进入显示日程详细信息的`编辑`界面。\n5.  触摸需要调整的字段标签，就像你创建事件时做的那样。例如，你可以通过触摸`开始`或`结束`标签，然后调整事件的开始或结束时间来更改此日程的时间。\n\
    \n## 编辑重复事件\n\n编辑重复或周期性事件的方式与编辑其他任何事件完全相同。唯一的区别是，在完成编辑后，系统会询问你一个问题。你需要回答这个问题，然后轻点`完成`按钮。\n\
    \n如果你只想更改此重复事件中的这一个实例，请轻点`仅为此事件保存`。\n\n如果你想更改此重复事件的所有实例，请轻点`为将来事件保存`。\n\n![images](img/p388-01.jpg)\n\
    \n## 将事件切换到不同日历\n\n如果你错误地将事件设置到了错误的日历中，那么可以继续轻点`日历`按钮来更改日历。接着，选择你已同步到 iPod touch\
    \ 上的其他日历之一。\n\n**注意：** 根据你选择的日历，某些字段可能会出现或消失。\n\n如果你将事件从通过`iTunes`同步的日历更改为与 Exchange\
    \ 同步的日历，那么你会看到`第二个提醒`字段消失。此外，在使用 Exchange、Google 或 iCloud 日历时，你还会看到两个新字段出现：`受邀人`和`忙闲状态`。\n\
    \n## 删除事件\n\n请注意，在`编辑`界面的底部，你还可以选择删除此事件。只需轻点屏幕底部的`删除事件`按钮即可。\n\n![images](img/p388-02.jpg)\n\
    \n## 会议邀请\n\n对于那些经常使用 Microsoft Exchange、`Microsoft Outlook` 或 iCloud 的用户来说，会议邀请已成为日常的一部分。你会在电子邮件中收到会议邀请，接受邀请后，日程便会自动添加到你的日历中。\n\
    \n在你的 iPod touch 上，你会看到你接受的邀请会立即被放入你的日历中。\n\n如果你在日历中轻点该会议邀请，可以看到所有你需要的详细信息：拨入号码、会议\
    \ ID 以及邀请中可能包含的任何其他详细信息。\n\n![images](img/p389-01.jpg)\n\n# 日历选项\n\n在你的`日历`应用中，只有少数几个选项可以调整；你可以在`设置`应用中找到它们。请按照以下步骤调整这些选项：\n\
    \n![images](img/p389-02.jpg)\n\n1.  从`主屏幕`轻点`设置`。\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n\
    3.  向下滚动到`日历`（它位于最底部！）以查看几个选项。\n4.  第一个选项是一个简单的开关，用于通知你`新邀请提醒`。如果你收到任何会议邀请，最好将此选项保持为默认的`开启`状态。\n\
    \n    ![images](img/p389-03.jpg)\n\n5.  接下来，如果你使用 Exchange 或 iCloud 同步你的`日历`程序，可能会看到`同步`选项。你可以调整此设置，将事件同步到`过去\
    \ 2 周`、`过去 1 个月`、`过去 3 个月`、`过去 6 个月`，或显示`所有事件`。\n6.  接着，你可以选择你的时区。此设置应反映你设置 iPod\
    \ touch 时的`主屏幕`设置。如果你正在旅行并希望为不同的时区调整日程，你可以将`时区`值更改为你偏好的任何城市。\n\n    ![images](img/p390-01.jpg)\n\
    \n7.  可以为生日、事件和全天事件设置默认提醒时间。事件提供常规选项，而生日和全天事件则允许设置为事件当天、前一天、前两天（均在上午 9 点），或提前一周。\n\
    \n## 更改默认日历\n\n我们之前提到过，你可以在 iPod touch 上显示多个日历。`默认日历`界面允许你选择哪个日历作为你的默认日历。\n\n\
    将某个日历指定为默认日历意味着，当你去安排新日程时，此日历将被默认选中。\n\n如果你想使用另一个日历——比如你的`工作`日历——那么你可以在实际设置日程时进行更改，如本章前面所示。\n\
    \n![images](img/p390-02.jpg)\n\n# 提醒事项\n\n`提醒事项`是 iOS 5 中的一个新应用，它让你可以简单轻松地追踪你需要完成的事项以及需要完成的日期和时间。你可以将这个应用视为苹果对任务或待办事项列表的解决方案。\n\
    \n## 提醒事项视图\n\n你的`提醒事项`应用有三个主要视图：`列表`、`日期`和`月`。以下是这些视图的简要概述。\n\n`列表`是`提醒事项`的默认视图，能让你一目了然地看到所有需要完成的任务。\n\
    \n**注意：** 对于 iCloud 账户，默认的`列表`视图称为`提醒事项`。对于 Microsoft Exchange 账户，默认的`列表`视图称为`任务`。\n\
    \n如果你有多个列表，可以通过从右向左滑动在它们之间切换，就像在你的 iPod touch `主屏幕`的不同应用页面之间切换一样。\n\n从左向右滑动可以查看你的`已完成`任务列表。\n\
    \n![images](img/p391-01.jpg)\n\n`日期`视图让你可以在提醒事项到期的当天查看它们。你可以轻松地从一天滑动到下一天；也可以滚动底部的`日期`滑块。按照以下步骤更改显示的日期：\n\
    \n*   **转到下一天**：从右向左滑动。\n*   **转到前一天**：从左向右滑动。\n*   **转到已完成任务列表**：从当前日期从左向右滑动。\n\
    \n![images](img/p391-02.jpg)\n\n**提示**：要返回`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/p391-03.jpg)\n\
    \n要查看`月`视图，请轻点`日期`视图左上角的`月`按钮 ![images](img/p392-01.jpg)。这将显示整个月的布局。有提醒事项到期的日期会显示为红色。\n\
    \n**提示**：要返回`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/p392-03.jpg)\n\n按照以下步骤在月份之间前后切换：\n\
    \n![images](img/p392-02.jpg)\n\n*   **转到下个月：** 向下滚动。\n*   **转到上个月：** 向上滚动。\n\n\
    ## 添加新提醒事项\n\n要从任意`列表`视图中添加新任务，请按照以下步骤操作：\n\n![images](img/p392-04.jpg)\n\n1.\
    \  轻点当前列表末尾的第一个空白行。\n2.  输入你的任务标题。\n3.  完成后，轻点右上角的黑色`完成`按钮。\n\n    **注意：** 你也可以轻点`添加`按钮来创建新任务。![images](img/p392-05.jpg)\n\
    \n## 添加提醒事项详情\n\n要为任务添加详细信息，请轻点任务的标题。`详情`界面让你可以添加`提醒我`的截止日期、提醒的`优先级`、你希望将其附加到的`列表`，以及你可能想要添加的任何`备注`。\n\
    \n`详情`页面也是你可以删除任务的地方。\n\n**注意：** 如果一开始没有看到所有选项，请轻点`显示更多`按钮以展开它们。\n\n![images](img/p393-01.jpg)\n"
- fmt: "# Setting Due Dates\n\nThe `Reminders` app includes standard due dates you\
    \ can set for your reminders. When a task reaches its due date, you'll receive\
    \ a popup notification to remind you about it.\n\nFollow these steps to set a\
    \ `Remind Me` date:\n\n1. Tap `Remind Me`.\n2. To set a due date, toggle the `On\
    \ a Day` option to `ON`. By default, the date will be set to the current day.\n\
    3. To change the date, tap it and move the rotating dials at the bottom to reflect\
    \ the correct date for the task.\n4. Tap `Done` to return to the main `Details`\
    \ screen.\n\n![images](images/p394-01.jpg)\n\n# Recurring Reminders\n\nSome of\
    \ your reminders need to be triggered every day, week, or month at the same time\
    \ or place. Follow these steps if you are scheduling a repeating or recurring\
    \ task:\n\n1. On the `Details` screen, tap the `Repeat` tab and then select the\
    \ time interval for the repeated event from the list.\n2. Tap `Done` to return\
    \ to the main `Details` screen.\n\n![images](images/p394-02.jpg)\n\n# Changing\
    \ Lists\n\nEach reminder belongs to a list. You can have work lists, home lists,\
    \ vacation lists, shopping lists—anything you like. The `Details` page will show\
    \ the name of the list currently associated with your new task. Follow these steps\
    \ to change your current list:\n\n1. Tap the current list name.\n2. Tap the list\
    \ you want to change to.\n\n![images](images/p395-01.jpg)\n\n![images](images/p395-02.jpg)\n\
    \n# Adding Notes to a Task\n\nFollow these steps if you want to add some notes\
    \ to a task:\n\n1. Tap `Notes` and type or copy and paste a few notes.\n2. Tap\
    \ `Done` to finish adding notes.\n\n![images](images/p395-03.jpg)\n\n**TIP:**\
    \ If this is a shopping list, you might want to include extra information like\
    \ clothing sizes, food brands, or anything else that could be helpful.\n\n## Completing\
    \ Reminders\n\nIt's incredibly easy to mark a reminder as `Completed`. Simply\
    \ tap the box immediately to the left of the reminder's title and a `Checkmark`\
    \ icon will appear. That will move the reminder from its current list to the special\
    \ `Completed` list, so you can go back and refer to it later, if necessary.\n\n\
    If you make a mistake, just tap the box again to remove the `Checkmark` icon and\
    \ return the reminder to its previous status. If the task has already been moved\
    \ to the `Completed` list, swipe left until you get to the `Completed` list and\
    \ then tap the box to uncheck it and move the reminder back to its previous list.\n\
    \n![images](images/p395-01.jpg)\n\n## Editing Reminders\n\nSometimes, the details\
    \ of a task may change and need to be adjusted. Luckily, changing any reminder\
    \ is as simple as following these steps:\n\n1. Tap the reminder that you want\
    \ to change.\n2. Tap the tabs on the `Details` page and adjust the details, just\
    \ as you do when setting up a new task.\n\n![images](images/p397-01.jpg)\n\n###\
    \ Deleting a Reminder\n\nNotice that, at the bottom of the `Details` screen, you\
    \ also have the option to delete a task. Simply tap the `Delete` button at the\
    \ bottom of the screen to do so.\n\n![images](images/p397-02.jpg)\n\n## Adding\
    \ a New List\n\nThe `Reminders` app lets you have multiple lists, which is handy\
    \ for keeping your tasks organized. For example, you can make a new list to help\
    \ you pack for an upcoming trip or shop for an upcoming birthday.\n\nYou can create\
    \ a new list for either `iCloud Reminders` or `Exchange Tasks` accounts, or local\
    \ lists `On my iPod touch`. Follow these steps to create a new list:\n\n1. Tap\
    \ the `Lists` button ![images](images/p398-01.jpg) on the top left of the screen.\n\
    2. On the `Lists` page, tap the `Edit` button at the top right.\n3. If you have\
    \ more than one account syncing with `Reminders`, choose the one you want to add\
    \ the new list to.\n4. Tap the `Create New List…` tab.\n5. Type in the name of\
    \ your new list.\n6. Tap the `Done` button at the top right.\n\n![images](images/p398-02.jpg)\n\
    \n## Moving and Deleting Lists\n\nFrom the `Lists` page, you can also move and\
    \ delete lists.\n\nTo move a list, touch and hold the `Gripper` icon to the far\
    \ right, and then drag it to its new position.\n\nTo delete a list, tap the red\
    \ `Circle` icon to the left of the list's name, and then tap the `Delete` button\
    \ to confirm your choice.\n\n## Reminders Options\n\nThere are only two options\
    \ to adjust in the `Reminders` app; you can find these in the `Settings` app:\n\
    \n1. Tap the `Settings` icon from your `Home` screen.\n\n   ![images](images/p399-01.jpg)\n\
    \n2. Scroll down to `Mail, Contacts, Calendars` and tap it.\n3. Scroll down to\
    \ `Reminders` (it's at the very bottom!) to see the two options.\n\n   ![images](images/p399-02.jpg)\n\
    \n4. The first option is `Sync`. You can adjust this setting to sync `2 Weeks\
    \ Back`, `1 Month Back`, `3 Months Back`, `6 Months Back`, or to show `All Reminders`.\n\
    \n### Changing the Default List\n\nWe mentioned earlier that you can have multiple\
    \ lists displayed on your iPod touch. The `Default List` screen allows you to\
    \ choose which list will be your default list.\n\nSpecifying a list as the default\
    \ means that, when you go to create a new reminder, it will be assigned to the\
    \ specified list by default.\n\n![images](images/p399-03.jpg)\n\n# Chapter 19\n\
    \n# Working with Photos\n\nWhile previous versions of the iPod touch have included\
    \ a rear-facing camera, the latest iPod touch comes with not one, but two cameras:\
    \ a 960 × 720 pixel camera on the back; and a VGA (640 × 480 pixel) camera on\
    \ the front for video chats and self-portraits. You can learn more about using\
    \ the front-facing camera in the `FaceTime` app in [Chapter 10](#Chapter10.html#ch10):\
    \ “Video Messaging and Skype.”\n\nViewing and sharing your pictures on the iPod\
    \ touch is truly a joy, due in large part to its beautiful high-resolution screen.\
    \ In this chapter, we will discuss the many ways to get pictures onto your iPod\
    \ touch. We will also show you how you to use the touch screen to navigate through\
    \ your pictures, as well as how to zoom in and out and manipulate your photos.\n\
    \n**TIP:** Did you know you can take a picture of the entire screen of your iPod\
    \ touch by pressing two keys simultaneously? This is great to show someone a cool\
    \ app or to prove that you got the high score on `Tetris`!\n\nHere's how to get\
    \ it done: press both the `Home` button and the `On/Off/Sleep` key on the top-right\
    \ edge (you can press one key, hold it, and then press the other). This is a little\
    \ tricky and takes some practice. If you have done this correctly, the screen\
    \ should flash, and you'll hear a camera sound. The screen capture you have taken\
    \ will be in your `Camera Roll` album in the `Photos` app."
  raw: "#### Setting Due Dates\n\nThe **Reminders** app includes standard due dates\
    \ you can set for your reminders. When a task reaches its due date, you'll receive\
    \ a popup notification to remind you about it.\n\nFollow these steps to set a\
    \ **Remind Me** date:\n\n1.  Tap Remind Me.\n2.  To set a due date, toggle the\
    \ On a Day option to ON. By default, the date will be set to the current day.\n\
    3.  To change the date, tap it and move the rotating dials at the bottom to reflect\
    \ the correct date for the task.\n4.  Tap Done to return to the main Details screen.\n\
    \n![images](images/p394-01.jpg)\n\n#### Recurring Reminders\n\nSome of your reminders\
    \ need to be triggered every day, week, or month at the same time or place. Follow\
    \ these steps if you are scheduling a repeating or recurring task:\n\n1.  On the\
    \ **Details** screen, tap the **Repeat** tab and then select the time interval\
    \ for the repeated event from the list.\n2.  Tap **Done** to return to the main\
    \ **Details** screen.\n\n    ![images](images/p394-02.jpg)\n\n#### Changing Lists\n\
    \nEach reminder belongs to a list. You can have work lists, home lists, vacation\
    \ lists, shopping lists—anything you like. The **Details** page will show the\
    \ name of the list currently associated with your new task. Follow these steps\
    \ to change your current list:\n\n1.  Tap the current list name.\n2.  Tap the\
    \ list you want to change to.\n\n    ![images](images/p395-01.jpg)\n\n    ![images](images/p395-02.jpg)\n\
    \n#### Adding Notes to a Task\n\nFollow these steps if you want to add some notes\
    \ to a task:\n\n1.  Tap **Notes** and type or copy and paste a few notes.\n2.\
    \  Tap **Done** to finish adding notes.\n\n    ![images](images/p395-03.jpg)\n\
    \n    **TIP:** If this is a shopping list, you might want to include extra information\
    \ like clothing sizes, food brands, or anything else that could be helpful.\n\n\
    ### Completing Reminders\n\nIt's incredibly easy to mark a reminder as Completed.\
    \ Simply tap the box immediately to the left of the reminder's title and a **Checkmark**\
    \ icon will appear. That will move the reminder from its current list to the special\
    \ **Completed** list, so you can go back and refer to it later, if necessary.\n\
    \nIf you make a mistake, just tap the box again to remove the **Checkmark** icon\
    \ and return the reminder to its previous status. If the task has already been\
    \ moved to the **Completed** list, swipe left until you get to the **Completed**\
    \ list and then tap the box to uncheck it and move the reminder back to its previous\
    \ list.\n\n![images](images/p395-01.jpg)\n\n### Editing Reminders\n\nSometimes,\
    \ the details of a task may change and need to be adjusted. Luckily, changing\
    \ any reminder is as simple as following these steps:\n\n1.  Tap the reminder\
    \ that you want to change.\n2.  Tap the tabs on the Details page and adjust the\
    \ details, just as you do when setting up a new task.\n\n    ![images](images/p397-01.jpg)\n\
    \n#### Deleting a Reminder\n\nNotice that, at the bottom of the **Details** screen,\
    \ you also have the option to delete a task. Simply tap the **Delete** button\
    \ at the bottom of the screen to do so.\n\n![images](images/p397-02.jpg)\n\n###\
    \ Adding a New List\n\nThe **Reminders** app lets you have multiple lists, which\
    \ is handy for keeping your tasks organized. For example, you can make a new list\
    \ to help you pack for an upcoming trip or shop for an upcoming birthday.\n\n\
    You can create a new list for either iCloud Reminders or Exchange Tasks accounts,\
    \ or local lists On my iPod touch. Follow these steps to create a new list:\n\n\
    1.  Tap the **Lists** button ![images](images/p398-01.jpg) on the top left of\
    \ the screen.\n2.  On the **Lists** page, tap **the** Edit button at the top right.\n\
    3.  If you have more than one account syncing with **Reminders**, choose the one\
    \ you want to add the new list to.\n4.  Tap the **Create New List…** tab.\n5.\
    \  Type in the name of your new list.\n6.  Tap the **Done** button at the top\
    \ right.\n\n    ![images](images/p398-02.jpg)\n\n### Moving and Deleting Lists\n\
    \nFrom the **Lists** page, you can also move and delete lists.\n\nTo move a list,\
    \ touch and hold the **Gripper** icon to the far right, and then drag it to its\
    \ new position.\n\nTo delete a list, tap the red **Circle** icon to the left of\
    \ the list's name, and then tap the **Delete** button to confirm your choice.\n\
    \n### Reminders Options\n\nThere are only two options to adjust in the **Reminders**\
    \ app; you can find these in the **Settings** app:\n\n1.  Tap the **Settings**\
    \ icon from your **Home** screen.\n\n    ![images](images/p399-01.jpg)\n\n2. \
    \ Scroll down to **Mail, Contacts, Calendars** and tap it.\n3.  Scroll down to\
    \ **Reminders** (it's at the very bottom!) to see the two options.\n\n    ![images](images/p399-02.jpg)\n\
    \n4.  The first option is **Sync.** You can adjust this setting to sync **2 Weeks\
    \ Back, 1 Month Back, 3 Months Back, 6 Months Back**, or to show **All Reminders**.\n\
    \n#### Changing the Default List\n\nWe mentioned earlier that you can have multiple\
    \ lists displayed on your iPod touch. The **Default List** screen allows you to\
    \ choose which list will be your default list.\n\nSpecifying a list as the default\
    \ means that, when you go to create a new reminder, it will be assigned to the\
    \ specified list by default.\n\n![images](images/p399-03.jpg)\n\n## Chapter 19\n\
    \n## Working with Photos\n\nWhile previous versions of the iPod touch have included\
    \ a rear-facing camera, the latest iPod touch comes with not one, but two cameras:\
    \ an 960 × 720 pixel camera on the back; and a VGA (640 × 480 pixel) camera on\
    \ the front for video chats and self-portraits. You can learn more about using\
    \ the front-facing camera in the **FaceTime** app in [Chapter 10](#Chapter10.html#ch10):\
    \ “Video Messaging and Skype.”\n\nViewing and sharing your pictures on the iPod\
    \ touch is truly a joy, due in large part to its beautiful high-resolution screen.\
    \ In this chapter, we will discuss the many ways to get pictures onto your iPod\
    \ touch. We will also show you how you to use the touch screen to navigate through\
    \ your pictures, as well as how to zoom in and out and manipulate your photos.\n\
    \n**TIP:** Did you know you can take a picture of the entire screen of your iPod\
    \ touch by pressing two keys simultaneously? This is great to show someone a cool\
    \ app or to prove that you got the high score on **Tetris**!\n\nHere's how to\
    \ get it done: press both the **Home** button and the **On/Off/Sleep** key on\
    \ the top-right edge (you can press one key, hold it, and then press the other).\
    \ This is a little tricky and takes some practice. If you have done this correctly,\
    \ the screen should flash, and you'll hear a camera sound. The screen capture\
    \ you have taken will be in your Camera Roll album in the **Photos** app."
  trans: "\n# 设置截止日期\n\n`Reminders`（提醒事项）应用包含标准的截止日期，你可以为提醒事项设置该日期。当任务到达截止日期时，你会收到弹窗通知，提醒你该任务。\n\
    \n请按照以下步骤设置`提醒我`的日期：\n\n1.  轻点`提醒我`。\n2.  要设置截止日期，请将`在某天`选项切换为`开启`。默认情况下，日期将设置为当天。\n\
    3.  要更改日期，请轻点日期并移动底部的旋转拨盘，以调整为任务的正确日期。\n4.  轻点`完成`返回主`详情`屏幕。\n\n![images](img/p394-01.jpg)\n\
    \n# 重复提醒\n\n部分提醒事项需要在每天、每周或每月的同一时间或地点触发。如果你正在安排重复或循环的任务，请按以下步骤操作：\n\n1.  在`详情`屏幕上，轻点`重复`标签，然后从列表中选择重复事件的时间间隔。\n\
    2.  轻点`完成`返回主`详情`屏幕。\n\n![images](img/p394-02.jpg)\n\n# 更改列表\n\n每个提醒事项都属于一个列表。你可以有工作列表、家庭列表、假期列表、购物列表——任何你喜欢的列表。`详情`页面将显示当前与新任务关联的列表名称。请按照以下步骤更改当前列表：\n\
    \n1.  轻点当前的列表名称。\n2.  轻点你想要切换到的列表。\n\n![images](img/p395-01.jpg)\n\n![images](img/p395-02.jpg)\n\
    \n# 为任务添加备注\n\n如果你想为任务添加一些备注，请按照以下步骤操作：\n\n1.  轻点`备注`，然后键入或复制粘贴一些注释。\n2.  轻点`完成`以结束添加备注。\n\
    \n![images](img/p395-03.jpg)\n\n**提示：** 如果这是一个购物列表，你可能希望包含一些额外信息，比如衣服尺码、食品品牌或其他可能有帮助的内容。\n\
    \n## 完成提醒事项\n\n将提醒事项标记为`已完成`非常容易。只需轻点提醒事项标题正左侧的方框，就会出现一个`勾选标记`图标。这将把该提醒事项从其当前列表移至特殊的`已完成`列表，以便你日后必要时可以返回并查阅。\n\
    \n如果你操作失误，只需再次轻点该方框，移除`勾选标记`图标，并将提醒事项恢复至其之前的状态。如果该任务已经被移动到`已完成`列表，向左滑动直到你进入`已完成`列表，然后轻点该方框取消勾选，即可将提醒事项移回其之前的列表。\n\
    \n![images](img/p395-01.jpg)\n\n## 编辑提醒事项\n\n有时，任务的详细信息可能会发生变化，需要进行调整。幸运的是，更改任何提醒事项只需遵循以下简单步骤：\n\
    \n1.  轻点你想要更改的提醒事项。\n2.  轻点`详情`页面上的标签并调整详细信息，就像你设置新任务时一样。\n\n![images](img/p397-01.jpg)\n\
    \n### 删除提醒事项\n\n请注意，在`详情`屏幕底部，你还可以选择删除任务。只需轻点屏幕底部的`删除`按钮即可。\n\n![images](img/p397-02.jpg)\n\
    \n## 添加新列表\n\n`Reminders`（提醒事项）应用允许你拥有多个列表，这对于保持任务条理性非常方便。例如，你可以创建一个新列表来帮助你整理即将到来的旅行物品，或者为即将到来的生日购物。\n\
    \n你可以为`iCloud 提醒事项`或`Exchange 任务`帐户创建新列表，也可以创建本地列表（`在我的 iPod touch 上`）。请按照以下步骤创建一个新列表：\n\
    \n1.  轻点屏幕左上角的`列表`按钮 ![images](img/p398-01.jpg)。\n2.  在`列表`页面，轻点右上角的`编辑`按钮。\n\
    3.  如果你有多个帐户与`提醒事项`同步，请选择你要添加新列表的帐户。\n4.  轻点`创建新列表…`标签。\n5.  输入你的新列表名称。\n6.  轻点右上角的`完成`按钮。\n\
    \n![images](img/p398-02.jpg)\n\n## 移动和删除列表\n\n在`列表`页面，你还可以移动和删除列表。\n\n要移动列表，请长按最右侧的`抓手`图标，然后将其拖拽到新位置。\n\
    \n要删除列表，请轻点列表名称左侧的红色`圆圈`图标，然后轻点`删除`按钮确认你的选择。\n\n## 提醒事项选项\n\n在`提醒事项`应用中，只有两个选项可以调整；你可以在`设置`应用中找到它们：\n\
    \n1.  从你的`主屏幕`轻点`设置`图标。\n\n   ![images](img/p399-01.jpg)\n\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n\
    3.  向下滚动到`提醒事项`（它位于最底部！）以查看这两个选项。\n\n   ![images](img/p399-02.jpg)\n\n4.  第一个选项是`同步`。你可以调整此设置，以同步`过去\
    \ 2 周`、`过去 1 个月`、`过去 3 个月`、`过去 6 个月`，或显示`所有提醒事项`。\n\n### 更改默认列表\n\n我们之前提到过，你可以在你的\
    \ iPod touch 上显示多个列表。`默认列表`屏幕允许你选择哪个列表将成为你的默认列表。\n\n指定一个列表作为默认列表意味着，当你创建一个新提醒事项时，它将被默认分配到该指定列表。\n\
    \n![images](img/p399-03.jpg)\n\n# 第 19 章\n\n# 使用照片\n\n虽然之前的 iPod touch 机型都包含后置摄像头，但最新的\
    \ iPod touch 配备的不是一个，而是两个摄像头：一个 960 × 720 像素的后置摄像头；以及一个用于视频聊天和自拍的 VGA（640 × 480\
    \ 像素）前置摄像头。关于如何使用前置摄像头的更多信息，请参阅第 10 章：“视频消息与 Skype”。\n\n在 iPod touch 上查看和分享你的照片确实是一种享受，这在很大程度上得益于其精美的、高分辨率的屏幕。在本章中，我们将讨论将照片导入\
    \ iPod touch 的多种方法。我们还将向你展示如何使用触摸屏浏览照片，以及如何进行缩放和操作照片。\n\n**提示：** 你知道吗，你可以同时按下两个按键来截取\
    \ iPod touch 的整个屏幕？这对于向某人展示一个很酷的应用，或者证明你在`俄罗斯方块`中获得了最高分非常有用！\n\n操作方法如下：同时按下`主屏幕`按钮和顶部右侧的`开/关/睡眠`键（你可以先按住一个键，再按下另一个键）。这有点小技巧，需要一些练习。如果你操作正确，屏幕会闪烁，并且你会听到相机快门声。你进行的屏幕截取将保存在`照片`应用中的`相机胶卷`相册里。\n"
- fmt: "# 快速拍照\n\nApple 最近增加了一些出色的快捷方式，帮助您更快速、更方便地拍照。如果您的孩子正处于特别可爱或值得纪念的时刻，如果您在树林中遇到一只稀有的鸟类，或者您需要快速拍下社区中可疑事物的照片，那么您可以使用以下技巧之一快速抓拍：\n\
    \n- 双击`Home`按钮，在`Lock`屏幕上直接显示`Camera`图标。点击`Camera`图标将直接跳转到`Camera`应用，准备拍照。这意味着您不再需要解锁`iPod\
    \ touch`、滑动查找`Camera`应用，然后等待其启动。\n- 使用`Volume Up`硬件按钮拍照。您可以利用更具触感的、类似于传统相机控制的方式，而不必费力点击屏幕上的相机软件按钮。\n\
    - 拍摄多张照片。Apple 声称已将拍摄第一张照片的时间缩短至惊人的 1.1 秒；然而，第二张照片——以及此后的每一张照片——现在仅需 0.5 秒。这对于运动或任何其他快速移动的活动特别方便。只需尽可能快地持续按下音量增大键即可。\n\
    - 自动对焦和人脸检测意味着您朋友和家人的快照会自动变得更清晰，曝光也更佳。\n\n## 使用相机应用\n\n`Camera`应用应该位于您的`Home`页面上——通常在第一屏的顶部。如果您没有看到它，请向左或向右滑动直到找到它。\n\
    \n![images](images/p402-01.jpg)\n\n触摸`Camera`图标，相机快门会以动画效果在屏幕上打开。\n\n快门打开后，您会在顶部找到用于设置`Flash`为`On`、`Off`或`Auto`的控件；用于设置`Grid`叠加和`HDR`（高动态范围）为`On`或`Off`的`Options`；以及用于在前置摄像头和后置摄像头之间切换的切换开关。在底部，您会找到用于跳转到`Camera\
    \ Roll`相册的缩略图、用于拍照的`Camera`按钮，以及用于在静态照片和视频录制模式之间切换的滑块。\n\n![images](images/p402-02.jpg)\n\
    \n**提示：** 您也可以通过按下`Volume Up`硬件按钮来拍照或开始视频录制。\n\n### 地理标签\n\n地理标签是一项将您的地理近似坐标嵌入到图片文件中的功能。`iPod\
    \ touch`使用`Wi-Fi`信号来帮助确定其大致位置。如果您将图片上传到像`Flickr`这样的程序，您的朋友可以使用您图片的坐标来定位您以及图片拍摄的地点。\n\
    \n**注意：** 对于 Mac 用户，`iPhoto`使用地理标签将照片放入`iPhoto`的`Places`类别中。\n\n如果您在启动相机时将`Location\
    \ Services`设置为`ON`（请参阅[第1章](#Chapter01.html#ch1)：“入门”），系统会询问是否允许使用您当前的位置。\n\n\
    要再次检查此设置，请执行以下操作：\n\n1. 启动您的`Settings`应用。\n2. 前往`General`。\n3. 触摸`Location Services`。您将看到类似于下方的屏幕。\n\
    4. 确保`Camera`旁边的开关已切换为`ON`。\n\n    ![images](images/p403-01.jpg)\n\n### 拍照\n\n\
    拍照就像指向和拍摄一样简单，但如果您愿意，还可以进行一些调整。\n\n一旦相机打开，将您的拍摄对象对准在`iPod touch`屏幕中央。\n\n![images](images/p404-01.jpg)\n\
    \n当您准备好拍照时，只需触摸底部的`Camera`按钮，或按下`iPod touch`侧面的`Volume Up`硬件按钮（带有`+`的按钮）。您会听到快门声，屏幕会显示一个动画，表示正在拍照。\n\
    \n拍照完成后，照片会落入左下角的窗口中。触摸那个小缩略图，`Photos`应用的`Camera Roll`相册就会加载。\n\n#### 使用变焦\n\n\
    `iPod touch`包含一个 5 倍数码变焦功能。\n\n**注意：** 数码变焦的清晰度永远比不上光学变焦，因此请注意，使用变焦时图片质量通常会略有下降。\n\
    \n要使用变焦，只需用两根手指触摸屏幕并捏合以放大或缩小。手指分开得越远，缩小得就越远。变焦开始后，还会出现一个变焦滑块来帮助您更改变焦级别。\n\n![images](images/p404-02.jpg)\n\
    \n#### 相机选项\n\n为了帮助您拍摄更好的照片，Apple 内置了`Grid`参考线。\n\n`Grid`选项会在屏幕上叠加两条水平线和两条垂直线。这可以帮助您正确地构图。它还可以帮助您确保人像中面部和眼睛看起来很棒，静物图像中的物品看起来很棒，以及风景中的景色保持平衡。\n\
    \n![images](images/p405-01.jpg)\n\n#### 切换相机\n\n如前所述，`iPod touch`配备了两个摄像头：一个用于大多数摄影的\
    \ 800 万像素后置摄像头，以及一个用于自拍或`FaceTime`视频通话（请参阅[第10章](#Chapter10.html#ch10)：“视频消息和\
    \ Skype”）的 VGA（640 × 480）前置摄像头。\n\n![images](images/p405-02.jpg)\n\n![images](images/p405-03.jpg)\n\
    \n要在摄像头之间切换，请执行以下操作：\n\n1. 从`Camera`应用中触摸`Switch Camera`图标。\n2. 等待相机切换到前置摄像头并对准镜头。\n\
    3. 再次触摸`Switch Camera`图标以切换回标准摄像头。\n\n**提示：** 由于前置摄像头的放置位置，面部看起来可能会有些扭曲。试着将您的面部稍微向后移并调整相机角度，以获得更好的图像。\n\
    \n### 查看已拍摄的照片\n\n您的`iPod touch`会将您拍摄的照片存储在名为`Camera Roll`的相册中。您可以从`Camera`和`Photos`应用内部访问`Camera\
    \ Roll`。在`Camera`应用中，触摸`Camera`屏幕左下角的`Pictures`图标。\n\n![images](images/p406-01.jpg)\n\
    \n一旦触摸某张照片进行查看，您就可以滑动浏览照片，查看`Camera Roll`中的所有图片。\n\n![images](images/p406-02.jpg)\n\
    \n![images](images/p406-03.jpg) 要返回`Camera Roll`，请按左上角的`Camera Roll`按钮。\n\n![images](images/p406-04.jpg)\
    \ 要拍摄另一张照片，请触摸右上角的`Done`按钮。"
  raw: "#### Taking Photos Quickly\n\nApple has recently added some great shortcuts\
    \ to help you take photos more quickly and more conveniently. If your child is\
    \ in the middle of an especially adorable or memorable moment, if you come across\
    \ a rare bird in the woods, or if you need to grab a fast photo of something suspicious\
    \ in your neighborhood, then you can use one of the following techniques to snap\
    \ a picture quickly:\n\n*   Double-click the **Home** button to bring up a **Camera**\
    \ icon right on the **Lock** screen. Tapping the **Camera** icon will take you\
    \ right to the **Camera** app, ready to take a photo. This means you no longer\
    \ need to unlock your iPod touch, swipe to find the **Camera** app, and then wait\
    \ for it to launch.\n*   Use the **Volume Up** hardware button to snap your photo.\
    \ Rather than trying to hit the camera software button on the screen, you can\
    \ use something more tactile and similar to traditional camera controls.\n*  \
    \ Take multiple pictures. Apple claims it has gotten the time it takes to shoot\
    \ the first photo down to a remarkable 1.1 seconds; however, the second photo—and\
    \ every photo thereafter—now takes only 0.5 seconds. This is especially handy\
    \ for sports or any other fast-moving activity. Just keep pressing the volume\
    \ up key as fast as you can.\n*   Auto-focus and face detection mean snapshots\
    \ of your friends and family automatically come out sharper and with better exposure.\n\
    \n### Using the Camera App\n\nThe **Camera** app should be on your **Home** page—usually\
    \ on the first screen at the top. If you don't see it, then swipe left or right\
    \ until you find it.\n\n![images](images/p402-01.jpg)\n\nTouch the **Camera**\
    \ icon and the shutter of the camera opens with an animation on your screen.\n\
    \nOnce the shutter opens, you will find controls along the top to set the **Flash**\
    \ to **On**, **Off**, or **Auto**; **Options** to set the **Grid** overlay and\
    \ **HDR** (high dynamic range) to **On** or **Off**; and a toggle to switch between\
    \ the front-facing and rear-facing cameras. Along the bottom, you'll find a thumbnail\
    \ to take you to the Camera Roll album, the **Camera** button to take a picture,\
    \ and a slider to switch between Still Photography and Video Recording modes.\n\
    \n![images](images/p402-02.jpg)\n\n**TIP:** You can also take a picture or start\
    \ a video recording by pressing the **Volume Up** hardware button.\n\n#### Geo-Tagging\n\
    \nGeo-tagging is a feature that puts your geographic approximate coordinates into\
    \ the picture file. The iPod touch uses the Wi-Fi signal to help determine it's\
    \ approximate location. If you upload your pictures to programs like Flickr, the\
    \ coordinates of your picture can be used by your friends to locate you and locate\
    \ the site where the picture was taken.\n\n**NOTE:** For Mac users, **iPhoto**\
    \ uses geo-tagging to put photos into the **Places** category of **iPhoto**.\n\
    \nIf you have **Location Services** set to **ON** when you start the camera (see\
    \ [Chapter 1](#Chapter01.html#ch1): “Getting Started”), you will be asked if it\
    \ is OK to use your current location.\n\nTo double-check this setting, do the\
    \ following:\n\n1.  Start your **Settings** app.\n2.  Go to **General**.\n3. \
    \ Touch **Location Services**. You will see a screen like the one here.\n4.  Make\
    \ sure the switch next to **Camera** is toggled to **ON**.\n\n    ![images](images/p403-01.jpg)\n\
    \n#### Taking a Picture\n\nTaking a picture is as simple as pointing and shooting,\
    \ but there are some adjustments that you can make if you choose.\n\nOnce your\
    \ camera is on, center your subject in the screen of your iPod touch.\n\n![images](images/p404-01.jpg)\n\
    \nWhen you are ready to take a picture, just touch the **Camera** button along\
    \ the bottom or press the **Volume Up** hardware button (the one with the + on\
    \ it) on the side of your iPod touch. You will hear a shutter sound, and the screen\
    \ will show an animation indicating that the picture is being taken.\n\nOnce the\
    \ picture is taken, it will drop down into the window in the lower-left corner.\
    \ Touch that small thumbnail, and the Camera Roll album of your **Photos** app\
    \ will load.\n\n##### Using the Zoom\n\nThe iPod touch includes a 5x digital zoom..\n\
    \n**NOTE:** A digital zoom is never as clear as an analog zoom, so be aware that\
    \ picture quality is usually degraded slightly when using the zoom.\n\nTo use\
    \ the zoom, just touch the screen with two fingers and pinch to zoom in or out.\
    \ The further you spread your fingers apart, the further you will zoom out. Once\
    \ the zoom begins, a Zoom slider will also appear to help you change the zoom\
    \ level.\n\n![images](images/p404-02.jpg)\n\n##### Camera Options\n\nTo help you\
    \ take better pictures, Apple has built in **Grid** lines.\n\nThe **Grid** option\
    \ overlays two horizontal and two vertical lines over the screen. This can help\
    \ you properly compose your shots. It can also help you make sure faces and eyes\
    \ look great for portraits, items look great for still life images, and the scenery\
    \ is balanced for landscapes.\n\n![images](images/p405-01.jpg)\n\n##### Switching\
    \ Cameras\n\nAs mentioned previously, the iPod touch comes with two cameras: an\
    \ 8.0 megapixel camera on the back for most photography and a VGA camera (640\
    \ × 480) on the front for self-portraits or for use in **FaceTime** video calls\
    \ (see [Chapter 10](#Chapter10.html#ch10): “Video Messaging and Skype”).\n\n![images](images/p405-02.jpg)\n\
    \n![images](images/p405-03.jpg)\n\nTo switch between the cameras, do the following:\n\
    \n1.  Touch the **Switch Camera** icon from the **Camera** app.\n2.  Wait for\
    \ the camera to switch to the front-facing camera and line up the shot.\n3.  Touch\
    \ the **Switch Camera** icon again to switch back to the standard camera.\n\n\
    **TIP**: Because of the placement of the front-facing camera, faces can look somewhat\
    \ distorted. Try moving your face back a bit and adjusting the camera angle to\
    \ get a better image.\n\n#### Viewing Pictures You Have Taken\n\nYour iPod touch\
    \ will store pictures you take on the iPod touch in what is called your *Camera\
    \ Roll*. You can access the Camera Roll from inside both the **Camera** and **Photos**\
    \ apps. In the **Camera** app, touch the **Pictures** icon in the bottom-left\
    \ corner of the **Camera** screen.\n\n![images](images/p406-01.jpg)\n\nOnce you\
    \ touch a picture to view, you can swipe through your pictures to see all the\
    \ pictures in the Camera Roll.\n\n![images](images/p406-02.jpg)\n\n![images](images/p406-03.jpg)\
    \ To get back to the Camera Roll, press the **Camera Roll** button in the upper-left\
    \ corner.\n\n![images](images/p406-04.jpg) To take another picture, touch the\
    \ **Done** button in the upper-right corner."
  trans: "\n# 快速拍照\n\nApple 最近增加了一些出色的快捷方式，帮助您更快速、更方便地拍照。如果您的孩子正处于特别可爱或值得纪念的时刻，如果您在树林中遇到一只稀有的鸟类，或者您需要快速拍下社区中可疑事物的照片，那么您可以使用以下技巧之一快速抓拍：\n\
    \n- 双击`Home`按钮，在`Lock`屏幕上直接显示`Camera`图标。点击`Camera`图标将直接跳转到`Camera`应用，准备拍照。这意味着您不再需要解锁`iPod\
    \ touch`、滑动查找`Camera`应用，然后等待其启动。\n- 使用`Volume Up`硬件按钮拍照。您可以利用更具触感的、类似于传统相机控制的方式，而不必费力点击屏幕上的相机软件按钮。\n\
    - 拍摄多张照片。Apple 声称已将拍摄第一张照片的时间缩短至惊人的 1.1 秒；然而，第二张照片——以及此后的每一张照片——现在仅需 0.5 秒。这对于运动或任何其他快速移动的活动特别方便。只需尽可能快地持续按下音量增大键即可。\n\
    - 自动对焦和人脸检测意味着您朋友和家人的快照会自动变得更清晰，曝光也更佳。\n\n## 使用相机应用\n\n`Camera`应用应该位于您的`Home`页面上——通常在第一屏的顶部。如果您没有看到它，请向左或向右滑动直到找到它。\n\
    \n![images](img/p402-01.jpg)\n\n触摸`Camera`图标，相机快门会以动画效果在屏幕上打开。\n\n快门打开后，您会在顶部找到用于设置`Flash`为`On`、`Off`或`Auto`的控件；用于设置`Grid`叠加和`HDR`（高动态范围）为`On`或`Off`的`Options`；以及用于在前置摄像头和后置摄像头之间切换的切换开关。在底部，您会找到用于跳转到`Camera\
    \ Roll`相册的缩略图、用于拍照的`Camera`按钮，以及用于在静态照片和视频录制模式之间切换的滑块。\n\n![images](img/p402-02.jpg)\n\
    \n**提示：** 您也可以通过按下`Volume Up`硬件按钮来拍照或开始视频录制。\n\n### 地理标签\n\n地理标签是一项将您的地理近似坐标嵌入到图片文件中的功能。`iPod\
    \ touch`使用`Wi-Fi`信号来帮助确定其大致位置。如果您将图片上传到像`Flickr`这样的程序，您的朋友可以使用您图片的坐标来定位您以及图片拍摄的地点。\n\
    \n**注意：** 对于 Mac 用户，`iPhoto`使用地理标签将照片放入`iPhoto`的`Places`类别中。\n\n如果您在启动相机时将`Location\
    \ Services`设置为`ON`（请参阅第 1 章：“入门”），系统会询问是否允许使用您当前的位置。\n\n要再次检查此设置，请执行以下操作：\n\n\
    1. 启动您的`Settings`应用。\n2. 前往`General`。\n3. 触摸`Location Services`。您将看到类似于下方的屏幕。\n\
    4. 确保`Camera`旁边的开关已切换为`ON`。\n\n    ![images](img/p403-01.jpg)\n\n### 拍照\n\n拍照就像指向和拍摄一样简单，但如果您愿意，还可以进行一些调整。\n\
    \n一旦相机打开，将您的拍摄对象对准在`iPod touch`屏幕中央。\n\n![images](img/p404-01.jpg)\n\n当您准备好拍照时，只需触摸底部的`Camera`按钮，或按下`iPod\
    \ touch`侧面的`Volume Up`硬件按钮（带有`+`的按钮）。您会听到快门声，屏幕会显示一个动画，表示正在拍照。\n\n拍照完成后，照片会落入左下角的窗口中。触摸那个小缩略图，`Photos`应用的`Camera\
    \ Roll`相册就会加载。\n\n#### 使用变焦\n\n`iPod touch`包含一个 5 倍数码变焦功能。\n\n**注意：** 数码变焦的清晰度永远比不上光学变焦，因此请注意，使用变焦时图片质量通常会略有下降。\n\
    \n要使用变焦，只需用两根手指触摸屏幕并捏合以放大或缩小。手指分开得越远，缩小得就越远。变焦开始后，还会出现一个变焦滑块来帮助您更改变焦级别。\n\n![images](img/p404-02.jpg)\n\
    \n#### 相机选项\n\n为了帮助您拍摄更好的照片，Apple 内置了`Grid`参考线。\n\n`Grid`选项会在屏幕上叠加两条水平线和两条垂直线。这可以帮助您正确地构图。它还可以帮助您确保人像中面部和眼睛看起来很棒，静物图像中的物品看起来很棒，以及风景中的景色保持平衡。\n\
    \n![images](img/p405-01.jpg)\n\n#### 切换相机\n\n如前所述，`iPod touch`配备了两个摄像头：一个用于大多数摄影的\
    \ 800 万像素后置摄像头，以及一个用于自拍或`FaceTime`视频通话（请参阅第 10 章：“视频消息和 Skype”）的 VGA（640 × 480）前置摄像头。\n\
    \n![images](img/p405-02.jpg)\n\n![images](img/p405-03.jpg)\n\n要在摄像头之间切换，请执行以下操作：\n\
    \n1. 从`Camera`应用中触摸`Switch Camera`图标。\n2. 等待相机切换到前置摄像头并对准镜头。\n3. 再次触摸`Switch Camera`图标以切换回标准摄像头。\n\
    \n**提示：** 由于前置摄像头的放置位置，面部看起来可能会有些扭曲。试着将您的面部稍微向后移并调整相机角度，以获得更好的图像。\n\n### 查看已拍摄的照片\n\
    \n您的`iPod touch`会将您拍摄的照片存储在名为`Camera Roll`的相册中。您可以从`Camera`和`Photos`应用内部访问`Camera\
    \ Roll`。在`Camera`应用中，触摸`Camera`屏幕左下角的`Pictures`图标。\n\n![images](img/p406-01.jpg)\n\
    \n一旦触摸某张照片进行查看，您就可以滑动浏览照片，查看`Camera Roll`中的所有图片。\n\n![images](img/p406-02.jpg)\n\
    \n![images](img/p406-03.jpg) 要返回`Camera Roll`，请按左上角的`Camera Roll`按钮。\n\n![images](img/p406-04.jpg)\
    \ 要拍摄另一张照片，请触摸右上角的`Done`按钮。\n"
- fmt: "# Editing Photos\n\nWith iOS 5 you can now do basic photo editing right on\
    \ your iPod touch. You can rotate your photos; enhance their exposure, contrast,\
    \ and levels; crop them; and even automatically remove red-eye from pictures of\
    \ your friends and family.\n\nFollow these steps to edit a photo:\n\n1. Browse\
    \ to the photo you'd like to edit.\n2. Tap the `Edit` button at the top right.\n\
    \nFollow these steps to rotate a photo:\n\n1. Tap the `Rotate` arrow ![images](images/p407-01.jpg)\
    \ button at the bottom left to turn your photo 90 degrees counter-clockwise (to\
    \ the left).\n2. Tap the `Rotate` button again to keep rotating in 90-degree increments.\n\
    3. When you've rotated the image to the position you want, tap the yellow `Save`\
    \ button at the top right.\n\nSimilarly, follow these steps to auto-enhance a\
    \ photo:\n\n1. Tap the `Auto-Enhance` ![images](images/p407-02.jpg) magic wand\
    \ button.\n2. If you like the results, tap the yellow `Save` button at the top\
    \ right.\n3. If you don't like the results, tap `Auto-Enhance` again to set it\
    \ to `Off`.\n4. Tap `Cancel` to exit Auto-Enhance mode.\n\nFollow these steps\
    \ to remove red-eye from a photo:\n\n1. Tap the `Red-Eye` ![images](images/p407-03.jpg)\
    \ button to activate red-eye removal.\n2. Tap each red eye in your photo to apply\
    \ reduction (i.e., remove the red color from the eye).\n3. If you like the results,\
    \ tap the `Apply` button at the top left.\n4. If you don't like the results, tap\
    \ each red eye again to remove the reduction.\n5. Tap `Cancel` to exit this mode.\n\
    \nFinally, follow these steps to crop a photo:\n\n1. Tap the `Crop` ![images](images/p408-01.jpg)\
    \ button on the bottom right. A nine section grid will appear over the photo.\n\
    2. Touch an edge or corner of the grid and drag to make the crop area taller,\
    \ shorter, thinner, or wider.\n3. Touch inside the grid and drag to move the photo\
    \ around behind the grid.\n4. Pinch and zoom to make the photo bigger or smaller\
    \ inside the grid.\n5. Tap the `Constrain` button to choose from a list of standard\
    \ aspect ratios, including `Original`; `Square`; traditional photo ratios like\
    \ `3 × 2`, `4 × 6`, and `8 × 10`; TV ratios like `SD 4 × 3` and `HD 16 × 9`; and\
    \ so on.\n6. If you're happy with the crop, tap the yellow `Crop` button at the\
    \ top right to apply it.\n7. If you don't like the crop, tap the `Cancel` button\
    \ at the top left to return to the `Edit` screen.\n\n![images](images/p408-02.jpg)\n\
    \n## Getting Photos onto Your iPod touch\n\nYou have many options for loading\
    \ photos onto your device:\n\n- **Sync using iCloud or iTunes:** Probably the\
    \ simplest way to load photos onto your iPod touch is to use iCloud or iTunes\
    \ to sync photos from your computer (see [Figure 19–1](#Chapter19.html#fig_19_1)).\
    \ We describe this in detail in [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud,\
    \ iTunes and More.”\n- **Receive as email attachments:** While this is not useful\
    \ for large numbers of pictures, it works well for one or even a few photos. Check\
    \ out [Chapter 16](#Chapter16.html#ch16): “Communicate with Email” for more details\
    \ about how to save attachments. (Once saved, these images show up in the Camera\
    \ Roll album.)\n- **Save images from the Web:** Sometimes you'll see a great image\
    \ on a web site. Press and hold it to see the pop-up menu, and then select `save\
    \ Image`. (Like other saved images, these end up in the Camera Roll album.)\n\
    - **Download images from within an app:** A good example of this is the wallpaper\
    \ image shown in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\
    - **Sync with iPhoto** (for Mac users): If you use a Mac computer, your iPod touch\
    \ will most likely sync automatically with `iPhoto`. Here are a few steps to get\
    \ the sync feature in `iPhoto` up and running:\n    1. Connect your iPod touch\
    \ and start the `iTunes` app.\n    2. Go to the `Photo` tab along the top row\
    \ of Sync Options.\n    3. Choose the `Albums`, `Events`, `Faces`, or `Places`\
    \ you want to keep in sync with the iPod touch.\n\n![images](images/1901.jpg)\n\
    \n**Figure 19–1.** *Choosing albums, faces, or events from `iTunes` to sync with\
    \ the iPod touch*\n\n- **Drag and drop** (for Windows users): Once you connect\
    \ your iPod touch to your Windows computer, it will appear in `Windows Explorer`\
    \ as a portable device, as shown in [Figure 19–2](#Chapter19.html#fig_19_2). Follow\
    \ these steps to drag and drop photos between your iPod touch and computer:\n\
    \    1. Double-click the `iPod touch` image under `Portable Devices` to open it.\n\
    \    2. Double-click `Internal Storage` to open it.\n    3. Double-click `DCIM`\
    \ to open it.\n    4. Next, you may see one or more folders with strange names\
    \ like: `823WGTMA`, `860OKMZO`, and `965YOKDJ`. Try double-clicking to open each\
    \ one. One of these will have the photos or videos you seek.\n    5. You will\
    \ see all the images in the Saved Photos album on your iPod touch.\n    6. To\
    \ copy images from your iPod touch, select and then drag and drop images out of\
    \ this folder onto your computer. You cannot copy images to your iPod touch using\
    \ this drag-and-drop method. Instead, you can use iTunes or iCloud.\n\n![images](images/1902.jpg)\n\
    \n**Figure 19–2\\.** *`Windows Explorer` showing the iPod touch as a portable\
    \ device (connected with a USB cable)*\n\n**TIP: Selecting Multiple Images in\
    \ Windows**\n\nYou have several ways to select images in Windows: you can draw\
    \ a box around the images, click a single image, or press `Ctrl+A` to select them\
    \ all. You can also hold down the `Ctrl` key and click individual pictures to\
    \ select them. Right-click one of the selected pictures and choose `Cut` (to move)\
    \ or `Copy` (to copy) all of the selected images. To paste the images, press and\
    \ click any other disk or folder (e.g., `My Documents`), and then navigate to\
    \ where you want to move or copy the files. Finally, right-click again and select\
    \ `Paste`.\n\n## Viewing Your Photos\n\nNow that your photos are on your iPod\
    \ touch, you have a few very cool ways to look through them and show them to others.\n\
    \n### Launching from the Photos Icon\n\nIf you like using your `Photos` app, you\
    \ might want to place its icon in your Bottom Dock for easy access if it's not\
    \ already there (see [Chapter 6](#Chapter06.html#ch6): “Icons and Folders”).\n\
    \nTo get started with photos, touch the `Photos` icon.\n\n![images](images/p412-01.jpg)\n\
    \nThe first screen shows your photo albums, which were created when you set up\
    \ your iPod touch and synced with iCloud or iTunes. In [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync with iCloud, iTunes and More,” we showed you how to choose which photos\
    \ to sync with your iPod touch. As you make changes to the library on your computer,\
    \ they will be automatically updated on your iPod touch.\n\nIf you're using iCloud's\
    \ Photo Stream feature, this is also where you'll find your Photo Stream images.\n\
    \n![images](images/p412-02.jpg)\n\n### Choosing a Library\n\nFrom the `Photo Albums`\
    \ page, touch one of the library buttons to show the photos in that album. In\
    \ the image to the right, we touched a photo library, and the screen immediately\
    \ changed to show us thumbnails of the pictures in this library.\n\nTap and drag\
    \ your finger up and down to view all the pictures in a library. You can also\
    \ flick up or down to quickly move throughout the album.\n\n![images](images/p413-01.jpg)"
  raw: "#### Editing Photos\n\nWith iOS 5 you can now do basic photo editing right\
    \ on your iPod touch. You can rotate your photos; enhance their exposure, contrast,\
    \ and levels; crop them; and even automatically remove red-eye from pictures of\
    \ your friends and family.\n\nFollow these steps to edit a photo:\n\n1.  Browse\
    \ to the photo you'd like to edit.\n2.  Tap the **Edit** button at the top right.\n\
    \nFollow these steps to rotate a photo:\n\n1.  Tap the **Rotate** arrow ![images](images/p407-01.jpg)\
    \ button at the bottom left to turn your photo 90 degrees counter-clockwise (to\
    \ the left).\n2.  Tap the **Rotate** button again to keep rotating in 90-degree\
    \ increments.\n3.  When you've rotated the image to the position you want, tap\
    \ the yellow **Save** button at the top right.\n\nSimilarly, follow these steps\
    \ to auto-enhance a photo:\n\n1.  Tap the **Auto-Enhance** ![images](images/p407-02.jpg)\
    \ magic wand button.\n2.  If you like the results, tap the yellow **Save** button\
    \ at the top right.\n3.  If you don't like the results, tap **Auto-Enhance** again\
    \ to set it to **Off**.\n4.  Tap **Cancel** to exit Auto-Enhance mode.\n\nFollow\
    \ these steps to remove red-eye from a photo:\n\n1.  Tap the **Red-Eye** ![images](images/p407-03.jpg)\
    \ button to activate red-eye removal.\n2.  Tap each red eye in your photo to apply\
    \ reduction (i.e., remove the red color from the eye).\n3.  If you like the results,\
    \ tap the **Apply** button at the top left.\n4.  If you don't like the results,\
    \ tap each red eye again to remove the reduction.\n5.  Tap **Cancel** to exit\
    \ this mode.\n\nFinally, follow these steps to crop a photo:\n\n1.  Tap the **Crop**\
    \ ![images](images/p408-01.jpg) button on the bottom right. A nine section grid\
    \ will appear over the photo.\n2.  Touch an edge or corner of the grid and drag\
    \ to make the crop area taller, shorter, thinner, or wider.\n3.  Touch inside\
    \ the grid and drag to move the photo around behind the grid.\n4.  Pinch and zoom\
    \ to make the photo bigger or smaller inside the grid.\n5.  Tap the **Constrain**\
    \ button to choose from a list of standard aspect ratios, including **Original**;\
    \ **Square**; traditional photo ratios like **3 × 2**, **4 × 6**, and **8 × 10**;\
    \ TV ratios like **SD 4 × 3** and **HD 16 × 9**; and so on.\n6.  If you're happy\
    \ with the crop, tap the yellow **Crop** button at the top right to apply it.\n\
    7.  If you don't like the crop, tap the **Cancel** button at the top left to return\
    \ to the **Edit** screen.\n\n    ![images](images/p408-02.jpg)\n\n### Getting\
    \ Photos onto Your iPod touch\n\nYou have many options for loading photos onto\
    \ your device:\n\n*   **Sync using iCloud or iTunes:** Probably the simplest way\
    \ to load photos onto your iPod touch is to use iCloud or iTunes to sync photos\
    \ from your computer (see [Figure 19–1](#Chapter19.html#fig_19_1)). We describe\
    \ this in detail in [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes\
    \ and More.”\n*   **Receive as email attachments:** While this is not useful for\
    \ large numbers of pictures, it works well for one or even a few photos. Check\
    \ out [Chapter 16](#Chapter16.html#ch16): “Communicate with Email” for more details\
    \ about how to save attachments. (Once saved, these images show up in the Camera\
    \ Roll album.)\n*   **Save images from the Web:** Sometimes you'll see a great\
    \ image on a web site. Press and hold it to see the pop-up menu, and then select\
    \ **save Image**. (Like other saved images, these end up in the Camera Roll album.)\n\
    *   **Download images from within an app:** A good example of this is the wallpaper\
    \ image shown in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\
    *   **Sync with iPhoto** (for Mac users)**:** If you use a Mac computer, your\
    \ iPod touch will most likely sync automatically with **iPhoto**. Here are a few\
    \ steps to get the sync feature in **iPhoto** up and running:\n    1.  Connect\
    \ your iPod touch and start the **iTunes** app.\n    2.  Go to the **Photo** tab\
    \ along the top row of Sync Options.\n    3.  Choose the **Albums**, **Events**,\
    \ **Faces**, or **Places** you want to keep in sync with the iPod touch.\n\n![images](images/1901.jpg)\n\
    \n**Figure 19–1.** *Choosing albums, faces, or events from **iTunes** to sync\
    \ with the iPod touch*\n\n*   **Drag and drop** (for Windows users)**:** Once\
    \ you connect your iPod touch to your Windows computer, it will appear in **Windows\
    \ Explorer** as a portable device, as shown in [Figure 19–2](#Chapter19.html#fig_19_2).\
    \ Follow these steps to drag and drop photos between your iPod touch and computer:\n\
    \    1.  Double-click the **iPod touch** image under **Portable Devices** to open\
    \ it.\n    2.  Double-click **Internal Storage** to open it.\n    3.  Double-click\
    \ **DCIM** to open it.\n    4.  Next, you may see one or more folders with strange\
    \ names like: 823WGTMA, 860OKMZO, and 965YOKDJ. Try double-clicking to open each\
    \ one. One of these will have the photos or videos you seek.\n    5.  You will\
    \ see all the images in the Saved Photos album on your iPod touch.\n    6.  To\
    \ copy images from your iPod touch, select and then drag and drop images out of\
    \ this folder onto your computer. You cannot copy images to your iPod touch using\
    \ this drag-and-drop method. Instead, you can use iTunes or iCloud.\n\n![images](images/1902.jpg)\n\
    \n**Figure 19–2\\. *Windows Explorer*** *showing the iPod touch as a portable\
    \ device (connected with a USB cable)*\n\n**TIP: Selecting Multiple Images in\
    \ Windows**\n\nYou have several ways to select images in Windows: you can draw\
    \ a box around the images, click a single image, or press **Ctrl+A** to select\
    \ them all. You can also hold down the **Ctrl** key and click individual pictures\
    \ to select them. Right-click one of the selected pictures and choose **Cut**\
    \ (to move) or **Copy** (to copy) all of the selected images. To paste the images,\
    \ press and click any other disk or folder (e.g., **My Documents**), and then\
    \ navigate to where you want to move or copy the files. Finally, right-click again\
    \ and select **Paste**.\n\n### Viewing Your Photos\n\nNow that your photos are\
    \ on your iPod touch, you have a few very cool ways to look through them and show\
    \ them to others.\n\n#### Launching from the Photos Icon\n\nIf you like using\
    \ your **Photos** app, you might want to place its icon in your Bottom Dock for\
    \ easy access if it's not already there (see [Chapter 6](#Chapter06.html#ch6):\
    \ “Icons and Folders”).\n\nTo get started with photos, touch the **Photos** icon.\n\
    \n![images](images/p412-01.jpg)\n\nThe first screen shows your photo albums, which\
    \ were created when you set up your iPod touch and synced with iCloud or iTunes.\
    \ In [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes and More,” we\
    \ showed you how to choose which photos to sync with your iPod touch. As you make\
    \ changes to the library on your computer, they will be automatically updated\
    \ on your iPod touch.\n\nIf you're using iCloud's Photo Stream feature, this is\
    \ also where you'll find your Photo Stream images.\n\n![images](images/p412-02.jpg)\n\
    \n#### Choosing a Library\n\nFrom the **Photo Albums** page, touch one of the\
    \ library buttons to show the photos in that album. In the image to the right,\
    \ we touched a photo library, and the screen immediately changed to show us thumbnails\
    \ of the pictures in this library.\n\nTap and drag your finger up and down to\
    \ view all the pictures in a library. You can also flick up or down to quickly\
    \ move throughout the album.\n\n![images](images/p413-01.jpg)"
  trans: "\n# 编辑照片\n\n借助 iOS 5，您现在可以直接在 iPod touch 上进行基本的照片编辑。您可以旋转照片；增强曝光度、对比度和色阶；裁剪照片；甚至还能自动去除亲友照片中的红眼。\n\
    \n请按照以下步骤编辑照片：\n\n1.  浏览到您想要编辑的照片。\n2.  点击右上角的`编辑`按钮。\n\n请按照以下步骤旋转照片：\n\n1.  点击左下角的`旋转`箭头\
    \ ![images](img/p407-01.jpg) 按钮，将照片逆时针旋转 90 度（向左旋转）。\n2.  再次点击`旋转`按钮，继续以 90 度为增量进行旋转。\n\
    3.  当您将图像旋转到所需位置后，点击右上角的黄色`存储`按钮。\n\n同样，请按照以下步骤自动增强照片：\n\n1.  点击`自动增强` ![images](img/p407-02.jpg)\
    \ 魔棒按钮。\n2.  如果您对结果满意，请点击右上角的黄色`存储`按钮。\n3.  如果您对结果不满意，请再次点击`自动增强`将其设置为`关闭`。\n\
    4.  点击`取消`退出自动增强模式。\n\n请按照以下步骤去除照片中的红眼：\n\n1.  点击`红眼` ![images](img/p407-03.jpg)\
    \ 按钮以激活红眼去除功能。\n2.  点击照片中的每个红眼以应用去除效果（即去除眼中的红色）。\n3.  如果您对结果满意，请点击左上角的`应用`按钮。\n\
    4.  如果您对结果不满意，请再次点击每个红眼以撤销去除效果。\n5.  点击`取消`退出此模式。\n\n最后，请按照以下步骤裁剪照片：\n\n1.  点击右下角的`裁剪`\
    \ ![images](img/p408-01.jpg) 按钮。照片上会出现一个九宫格网格。\n2.  触摸网格的边缘或角落并拖动，使裁剪区域更高、更矮、更窄或更宽。\n\
    3.  触摸网格内部并拖动，使网格后的照片移动。\n4.  双指捏合或张开以放大或缩小网格内的照片。\n5.  点击`约束`按钮，从标准宽高比列表中进行选择，包括`原始`；`正方形`；传统照片比例如`3\
    \ × 2`、`4 × 6`和`8 × 10`；电视比例如`SD 4 × 3`和`HD 16 × 9`等等。\n6.  如果您对裁剪结果满意，请点击右上角的黄色`裁剪`按钮以应用更改。\n\
    7.  如果您不喜欢裁剪结果，请点击左上角的`取消`按钮返回`编辑`屏幕。\n\n![images](img/p408-02.jpg)\n\n## 将照片导入您的\
    \ iPod touch\n\n您有多种选项可以将照片加载到设备上：\n\n- **使用 iCloud 或 iTunes 同步：** 将照片加载到 iPod\
    \ touch 上最简单的方法可能是使用 iCloud 或 iTunes 从电脑同步照片（请参阅图 19–1）。我们将在第 3 章：“与 iCloud、iTunes\
    \ 等同步”中详细介绍此方法。\n- **作为电子邮件附件接收：** 虽然这对大量照片不太实用，但处理一张甚至几张照片效果很好。请查看第 16 章：“使用电子邮件通信”，了解有关如何保存附件的更多详细信息。（保存后，这些图像会出现在“相机胶卷”相册中。）\n\
    - **从 Web 保存图像：** 有时您会在网站上看到一张很棒的图片。长按该图片以查看弹出菜单，然后选择`存储图像`。（与其他已保存图像一样，这些图像最终会出现在“相机胶卷”相册中。）\n\
    - **从应用程序内下载图像：** 第 8 章：“个性化与安全”中展示的壁纸图像就是一个很好的例子。\n- **与 iPhoto 同步**（适用于 Mac\
    \ 用户）：如果您使用 Mac 电脑，您的 iPod touch 很可能会自动与`iPhoto`同步。以下是启动并运行`iPhoto`中同步功能的几个步骤：\n\
    \    1.  连接您的 iPod touch 并启动`iTunes`应用程序。\n    2.  前往同步选项顶行中的`照片`选项卡。\n    3.\
    \  选择您希望与 iPod touch 保持同步的`相簿`、`事件`、`面孔`或`地点`。\n\n![images](img/1901.jpg)\n\n\
    **图 19–1.** *从`iTunes`中选择要与 iPod touch 同步的相簿、面孔或事件*\n\n- **拖放**（适用于 Windows 用户）：将\
    \ iPod touch 连接到 Windows 电脑后，它会作为便携式设备出现在`Windows 资源管理器`中，如图 19–2 所示。请按照以下步骤在\
    \ iPod touch 和电脑之间拖放照片：\n    1.  双击`便携式设备`下的`iPod touch`图标将其打开。\n    2.  双击`Internal\
    \ Storage`将其打开。\n    3.  双击`DCIM`将其打开。\n    4.  接下来，您可能会看到一个或多个名称奇特的文件夹，例如：`823WGTMA`、`860OKMZO`和`965YOKDJ`。尝试双击打开每个文件夹。其中一个文件夹包含您要找的照片或视频。\n\
    \    5.  您将看到 iPod touch 上“已存储的照片”相册中的所有图像。\n    6.  要从 iPod touch 复制图像，请选择图像，然后将它们从此文件夹拖放到您的电脑上。您无法使用此拖放方法将图像复制到\
    \ iPod touch。为此，您可以使用 iTunes 或 iCloud。\n\n![images](img/1902.jpg)\n\n**图 19–2\\\
    .** *`Windows 资源管理器`将 iPod touch 显示为便携式设备（通过 USB 线缆连接）*\n\n**提示：在 Windows 中选择多张图像**\n\
    \n在 Windows 中，您有几种选择图像的方法：您可以围绕图像画一个矩形框选，单击单张图像，或按 `Ctrl+A` 全选。您也可以按住 `Ctrl` 键并逐一单击图像以选择它们。右键单击其中一张选中的图片，然后选择`剪切`（移动）或`复制`（复制）所有选中的图像。要粘贴图像，请点击任意其他磁盘或文件夹（例如`我的文档`），然后导航到您要移动或复制文件的目标位置。最后，再次右键单击并选择`粘贴`。\n\
    \n## 查看您的照片\n\n现在您的照片已在 iPod touch 上，您有几种非常酷的方式来浏览它们并向他人展示。\n\n### 从“照片”图标启动\n\
    \n如果您喜欢使用`照片`应用，如果它尚未在底部 Dock 中，您可能希望将它的图标放在那里以便快速访问（请参阅第 6 章：“图标与文件夹”）。\n\n要开始使用照片，请触摸`照片`图标。\n\
    \n![images](img/p412-01.jpg)\n\n第一个屏幕会显示您的相簿，这些相簿是在您设置 iPod touch 并同步 iCloud 或\
    \ iTunes 时创建的。在第 3 章：“与 iCloud、iTunes 等同步”中，我们向您展示了如何选择要与 iPod touch 同步的照片。当您更改电脑上的照片库时，这些更改将自动在\
    \ iPod touch 上更新。\n\n如果您正在使用 iCloud 的照片流功能，那么在这里您也能找到您的照片流图像。\n\n![images](img/p412-02.jpg)\n\
    \n### 选择一个图库\n\n在`相簿`页面上，触摸其中一个图库按钮以显示该相簿中的照片。在右侧的图像中，我们触摸了一个照片图库，屏幕立即切换，显示了该图库中照片的缩略图。\n\
    \n上下滑动手指可以查看图库中的所有照片。您也可以向上或向下轻扫，以快速浏览整个相簿。\n\n![images](img/p413-01.jpg)\n"
- fmt: "# Managing Libraries\n\niOS 5 introduces the ability to add new albums, move\
    \ photos between albums, and delete albums right on your iPod touch.\n\nFollow\
    \ these steps to add a new album:\n\n1. Tap the `Edit` button on the top right.\n\
    2. Tap the `Add` button that appears on the top left.\n3. Enter a name for your\
    \ new album.\n4. Tap `Done` at the top right.\n\n![images](images/p413-02.jpg)\n\
    \nFollow these steps to delete an album:\n\n1. Tap the `Edit` button on the top\
    \ right.\n2. Tap the red `Circle` icon to the left of the album you want to delete.\n\
    3. Tap the red `Delete` button to confirm.\n\nFinally, follow these steps to move\
    \ photos between albums:\n\n1. Tap the `Action` button at the bottom left.\n2.\
    \ Tap the pictures you want to move.\n3. If you tap a picture by accident, just\
    \ tap it again to deselect it.\n4. Tap the `Add To` button on the bottom.\n5.\
    \ Choose `Add to Existing Album` if you already have an album that you want to\
    \ move the pictures into. Or, you can choose `Add to New Album` if you want to\
    \ create a new album now.\n\n## Working with Individual Pictures\n\nOnce you locate\
    \ the picture you want to view, just tap it. The picture then loads onto the screen.\n\
    \n**NOTE:** Your pictures will not usually take up the full screen on your iPod\
    \ touch if they were shot in Landscape mode.\n\n![images](images/p414-01.jpg)\n\
    \n**TIP:** The picture here was shot in Landscape mode; to see it in full screen,\
    \ simply turn your iPod touch on its side or double-tap it.\n\n### Moving Between\
    \ Pictures\n\nThe swipe gesture is used to move from one picture to the next.\
    \ Just swipe your finger left or right across the screen, and you can move through\
    \ your pictures.\n\n**TIP:** Drag your finger slowly to move more gradually through\
    \ the picture library.\n\n![images](images/p415-01.jpg)\n\nWhen you reach the\
    \ end of an album, just tap the screen once and you'll see a tab in the upper-left\
    \ corner that has the name of the photo album. Touch that tab and you'll return\
    \ to the thumbnail page of that particular album.\n\n![images](images/p415-02.jpg)\n\
    \nTo get back to your main photo album page, touch the button that says `Albums`\
    \ in the top-left corner.\n\n![images](images/p415-03.jpg)\n\n### Zooming in and\
    \ out of Pictures\n\nAs described in the “Getting Started” section of the book,\
    \ there are two ways to zoom in and out of pictures on your iPod touch: double-tapping\
    \ and pinching.\n\n#### Double-Tapping\n\nAs the name implies, double-tapping\
    \ is a quick double-tap on the screen to zoom in on the picture (see [Figure 19–3](#Chapter19.html#fig_19_3)).\
    \ You will zoom in on the spot where you double-tap. To zoom out, just double-tap\
    \ once more.\n\nSee [Chapter 1](#Chapter01.html#ch1): “Getting Started” for more\
    \ information on double-tapping.\n\n![images](images/1903.jpg)\n\n**Figure 19–3.**\
    \ *Double-tapping a picture to zoom in on it*\n\n#### Pinching\n\nAlso as described\
    \ in [Chapter 1](#Chapter01.html#ch1): “Getting Started,” pinching is a much more\
    \ precise form of zooming in. While double-tapping zooms in or out only to one\
    \ set level, pinching really allows you to zoom in or out just a little bit or\
    \ quite a lot.\n\nTo pinch, hold your thumb and forefinger close together and\
    \ then slowly (while touching the screen) separate them, making the picture larger.\
    \ To zoom out, start with your thumb and forefinger apart and move them together.\n\
    \n**NOTE:** Once you have activated the zoom using either method, you will not\
    \ be able to swipe easily through your pictures until you return the picture to\
    \ its standard size.\n\n## Viewing a Slideshow\n\nYou can view the pictures in\
    \ your photo album as a slideshow if you so desire. Just tap the screen once to\
    \ bring up the on-screen soft keys. In the center, you will see a `Slideshow Play`\
    \ button—touch it once to start the slideshow. You can start the slideshow from\
    \ any picture you are viewing.\n\n![images](images/p417-01.jpg)\n\nSelecting `Photos`\
    \ in the `Settings` app lets you adjust how long each picture remains on the screen\
    \ and other settings such as `Repeat` and `Shuffle` (see [Figure 19–4](#Chapter19.html#fig_19_4)).\
    \ To end the slideshow, just tap the screen.\n\n![images](images/1904.jpg)\n\n\
    **Figure 19–4.** *Configuring your slideshow*\n\n## Using a Picture As Your iPod\
    \ touch Wallpaper\n\nWe show you how to select and use a picture as your iPod\
    \ touch wallpaper (and other wallpaper options) in [Chapter 8](#Chapter08.html#ch8):\
    \ “Personalize and Secure.”\n\n**NOTE:** You can have different pictures for your\
    \ `Home` screen and `Lock` screen, or you can use the same picture for both.\n\
    \n## Emailing or Tweeting a Picture\n\nAs long as you have an active Internet\
    \ connection (see [Chapter 4](#Chapter04.html#ch4): “Connect to the Network”),\
    \ you can send any picture in your photo collection via email or post it to Twitter.\
    \ Tap the `Options` button on the thumbnail bar—this is the button furthest to\
    \ the left on the bottom row of soft keys. If you don't see the icons, tap the\
    \ screen once.\n\n![images](images/p418-01.jpg)\n\nTo mail the picture, choose\
    \ the `Email Photo` option and the `Mail` app will automatically launch.\n\nTap\
    \ the `To` field as you did in [Chapter 16](#Chapter16.html#ch16): “Communicate\
    \ with Email,” and then select the contact to receive the picture. Tap the blue\
    \ `Plus Sign` (`+`) button to add a contact.\n\nType in a subject and a message,\
    \ and then touch `Send` in the upper-right corner—that's all there is to it.\n\
    \n![images](images/p418-02.jpg)\n\nTo tweet the picture, choose the `Tweet` option\
    \ and a `Twitter` sheet will automatically appear. Just fill out the message you\
    \ want to be shown with your picture and hit the `Send` button.\n\n**NOTE:** The\
    \ `Tweet` option will only appear if you've entered your Twitter username and\
    \ password in the `Settings` app.\n\n![images](images/p418-03.jpg)\n\n## Share,\
    \ Copy, Print, or Delete Several Pictures at Once\n\nIf you have several pictures\
    \ you want to email, message, copy, print, or delete at the same time, you can\
    \ do so from the thumbnail view:\n\n1. Tap the `Action` button at the bottom left.\n\
    \n    ![images](images/p419-01.jpg)\n\n2. Tap the pictures you want to select.\n\
    3. If you tap a picture by accident, just tap it again to deselect it.\n4. Choose\
    \ an action from the bottom of the screen: `Share` (email, message, or print),\
    \ `Copy`, `Add To` (a different photo album), or `Delete`.\n\n    ![images](images/p419-02.jpg)\n\
    \n**NOTE:** The `Copy` function allows you to copy and paste multiple pictures\
    \ into an email message or other app. `Share` renames the image to `photo.png`,\
    \ while `copy-and-paste` adds `.png` to the DCIM folder filename.\n\nAt the time\
    \ of publishing, you could not share more than one video, nor could you share\
    \ more than five pictures. This may change in future iterations of the software."
  raw: "#### Managing Libraries\n\niOS 5 introduces the ability to add new albums,\
    \ move photos between albums, and delete albums right on your iPod touch.\n\n\
    Follow these steps to add a new album:\n\n1.  Tap the **Edit** button on the top\
    \ right.\n2.  Tap the **Add** button that appears on the top left.\n3.  Enter\
    \ a name for your new album.\n4.  Tap **Done** at the top right.\n\n![images](images/p413-02.jpg)\n\
    \nFollow these steps to delete an album:\n\n1.  Tap the **Edit** button on the\
    \ top right.\n2.  Tap the red **Circle** icon to the left of the album you want\
    \ to delete.\n3.  Tap the red **Delete** button to confirm.\n\nFinally, follow\
    \ these steps to move photos between albums:\n\n1.  Tap the **Action** button\
    \ at the bottom left.\n2.  Tap the pictures you want to move.\n3.  If you tap\
    \ a picture by accident, just tap it again to deselect it.\n4.  Tap the **Add\
    \ To** button on the bottom.\n5.  Choose **Add to Existing Album** if you already\
    \ have an album that you want to move the pictures into. Or, you can choose **Add\
    \ to New Album** if you want to create a new album now.\n\n### Working with Individual\
    \ Pictures\n\nOnce you locate the picture you want to view, just tap it. The picture\
    \ then loads onto the screen.\n\n**NOTE:** Your pictures will not usually take\
    \ up the full screen on your iPod touch if they were shot in Landscape mode.\n\
    \n![images](images/p414-01.jpg)\n\n**TIP:** The picture here was shot in Landscape\
    \ mode; to see it in full screen, simply turn your iPod touch on its side or double-tap\
    \ it.\n\n#### Moving Between Pictures\n\nThe swipe gesture is used to move from\
    \ one picture to the next. Just swipe your finger left or right across the screen,\
    \ and you can move through your pictures.\n\n**TIP:** Drag your finger slowly\
    \ to move more gradually through the picture library.\n\n![images](images/p415-01.jpg)\n\
    \nWhen you reach the end of an album, just tap the screen once and you'll see\
    \ a tab in the upper-left corner that has the name of the photo album. Touch that\
    \ tab and you'll return to the thumbnail page of that particular album.\n\n![images](images/p415-02.jpg)\n\
    \nTo get back to your main photo album page, touch the button that says **Albums**\
    \ in the top-left corner.\n\n![images](images/p415-03.jpg)\n\n### Zooming in and\
    \ out of Pictures\n\nAs described in the “Getting Started” section of the book,\
    \ there are two ways to zoom in and out of pictures on your iPod touch: double-tapping\
    \ and pinching.\n\n#### Double-Tapping\n\nAs the name implies, double-tapping\
    \ is a quick double-tap on the screen to zoom in on the picture (see [Figure 19–3](#Chapter19.html#fig_19_3)).\
    \ You will zoom in on the spot where you double-tap. To zoom out, just double-tap\
    \ once more.\n\nSee [Chapter 1](#Chapter01.html#ch1): “Getting Started” for more\
    \ information on double-tapping.\n\n![images](images/1903.jpg)\n\n**Figure 19–3.**\
    \ *Double-tapping a picture to zoom in on it*\n\n#### Pinching\n\nAlso as described\
    \ in [Chapter 1](#Chapter01.html#ch1):“Getting Started,” pinching is a much more\
    \ precise form of zooming in. While double-tapping zooms in or out only to one\
    \ set level, pinching really allows you to zoom in or out just a little bit or\
    \ quite a lot.\n\nTo pinch, hold your thumb and forefinger close together and\
    \ then slowly (while touching the screen) separate them, making the picture larger.\
    \ To zoom out, start with your thumb and forefinger apart and move them together.\n\
    \n**NOTE:** once you have activated the zoom using either method, you will not\
    \ be able to swipe easily through your pictures until you return the picture to\
    \ its standard size.\n\n### Viewing a Slideshow\n\nYou can view the pictures in\
    \ your photo album as a slideshow if you so desire. Just tap the screen once to\
    \ bring up the on-screen soft keys. In the center, you will see a **Slideshow\
    \ Play** button—touch it once to start the slideshow. You can start the slideshow\
    \ from any picture you are viewing.\n\n![images](images/p417-01.jpg)\n\nSelecting\
    \ **Photos** in the **Settings** app lets you adjust how long each picture remains\
    \ on the screen and other settings such as **Repeat** and **Shuffle** (see [Figure\
    \ 19–4](#Chapter19.html#fig_19_4)). To end the slideshow, just tap the screen.\n\
    \n![images](images/1904.jpg)\n\n**Figure 19–4.** *Configuring your slideshow*\n\
    \n### Using a Picture As Your iPod touch Wallpaper\n\nWe show you how to select\
    \ and use a picture as your iPod touch wallpaper (and other wallpaper options)\
    \ in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\n**NOTE:**\
    \ You can have different pictures for your **Home** screen and **Lock** screen,\
    \ or you can use the same picture for both.\n\n### Emailing or Tweeting a Picture\n\
    \nAs long as you have an active Internet connection (see [Chapter 4](#Chapter04.html#ch4):\
    \ “Connect to the Network”), you can send any picture in your photo collection\
    \ via email or post it to Twitter. Tap the **Options** button on the thumbnail\
    \ bar—this is the button furthest to the left on the bottom row of soft keys.\
    \ If you don't see the icons, tap the screen once.\n\n![images](images/p418-01.jpg)\n\
    \nTo mail the picture, choose the **Email Photo** option and the **Mail** app\
    \ will automatically launch.\n\nTap the **To** field as you did in [Chapter 16](#Chapter16.html#ch16):“Communicate\
    \ with Email,” and then select the contact to receive the picture. Tap the blue\
    \ **Plus Sign** (**+**) button to add a contact.\n\nType in a subject and a message,\
    \ and then touch **Send** in the upper-right corner—that's all there is to it.\n\
    \n![images](images/p418-02.jpg)\n\nTo tweet the picture, choose the **Tweet**\
    \ option and a **Twitter** sheet will automatically appear. Just fill out the\
    \ message you want to be shown with your picture and hit the **Send** button.\n\
    \n**NOTE:** The Tweet option will only appear if you've entered your Twitter username\
    \ and password in the Settings app.\n\n![images](images/p418-03.jpg)\n\n### Share,\
    \ Copy, Print, or Delete Several Pictures at Once\n\nIf you have several pictures\
    \ you want to email, message, copy, print, or delete at the same time, you can\
    \ do so from the thumbnail view:\n\n1.  Tap the **Action** button at the bottom\
    \ left.\n\n    ![images](images/p419-01.jpg)\n\n1.  Tap the pictures you want\
    \ to select.\n2.  If you tap a picture by accident, just tap it again to deselect\
    \ it.\n3.  Choose an action from the bottom of the screen: **Share** (email, message,\
    \ or print), **Copy**, **Add To(** a different photo album), or **Delete**.\n\n\
    \    ![images](images/p419-02.jpg)\n\n**NOTE:** The **Copy** function allows you\
    \ to copy and paste multiple pictures into an email message or other app. **share**\
    \ renames the image to *`photo.png`*, while **copy-and-paste** adds `.png` to\
    \ the DCIM folder filename.\n\nAt the time of publishing, you could not share\
    \ more than one video, nor could you share more than five pictures. This may change\
    \ in future iterations of the software."
  trans: "\n# 管理图库\n\niOS 5 新增了在 iPod touch 上直接添加相簿、在相簿间移动照片以及删除相簿的功能。\n\n请按照以下步骤添加新相簿：\n\
    \n1.  点击右上角的`编辑`按钮。\n2.  点击左上角出现的`添加`按钮。\n3.  为你的新相簿输入一个名称。\n4.  点击右上角的`完成`。\n\
    \n![images](img/p413-02.jpg)\n\n请按照以下步骤删除相簿：\n\n1.  点击右上角的`编辑`按钮。\n2.  点击你要删除的相簿左侧的红色`圆圈`图标。\n\
    3.  点击红色的`删除`按钮进行确认。\n\n最后，按照以下步骤在相簿间移动照片：\n\n1.  点击左下角的`操作`按钮。\n2.  点击你想要移动的照片。\n\
    3.  如果不小心点到了某张照片，只需再次点击即可取消选择。\n4.  点击底部的`添加到`按钮。\n5.  如果你已有想要移入照片的相簿，请选择`添加到现有相簿`。或者，如果你现在想创建一个新相簿，可以选择`添加到新相簿`。\n\
    \n## 处理单张照片\n\n找到你想要查看的照片后，直接点击它。照片随即会加载到屏幕上。\n\n**注意：** 如果你的照片是以横向模式拍摄的，它们在 iPod\
    \ touch 上通常不会占满整个屏幕。\n\n![images](img/p414-01.jpg)\n\n**提示：** 这里展示的照片是以横向模式拍摄的；若要全屏查看，只需将\
    \ iPod touch 侧转，或双击它即可。\n\n### 在照片间切换\n\n使用滑动手势可以在照片之间切换。只需在屏幕上向左或向右滑动手指，就能浏览你的照片。\n\
    \n**提示：** 慢慢地拖动手指可以在照片库中更平缓地移动。\n\n![images](img/p415-01.jpg)\n\n当浏览到相簿末尾时，只需点击屏幕一次，左上角就会出现一个显示该相簿名称的标签。点击那个标签，你就会返回到该相簿的缩略图页面。\n\
    \n![images](img/p415-02.jpg)\n\n要返回主相簿页面，请点击左上角写着`相簿`的按钮。\n\n![images](img/p415-03.jpg)\n\
    \n### 放大和缩小照片\n\n如本书“入门指南”部分所述，在 iPod touch 上有两种方法可以放大和缩小照片：双击和双指捏合。\n\n#### 双击\n\
    \n顾名思义，双击就是在屏幕上快速点击两次以放大照片（参见图 19–3）。你会在双击的位置放大。要缩小，只需再双击一次。\n\n有关双击的更多信息，请参见第\
    \ 1 章：“入门指南”。\n\n![images](img/1903.jpg)\n\n**图 19–3.** *双击照片以放大查看*\n\n#### 双指捏合\n\
    \n同样如第 1 章：“入门指南”所述，双指捏合是一种更精确的缩放方式。双击只能以固定的程度放大或缩小，而双指捏合则允许你进行细微或大幅度的缩放。\n\n\
    要进行捏合缩放，先将拇指和食指并拢，然后在接触屏幕的同时缓慢分开两指，使照片变大。要缩小，则将拇指和食指分开，然后并拢。\n\n**注意：** 一旦你通过任一种方法激活了缩放功能，在将照片恢复到标准尺寸之前，你将无法在照片之间自如地滑动。\n\
    \n## 查看幻灯片放映\n\n如果你愿意，可以将相簿中的照片以幻灯片放映的形式进行查看。只需点击屏幕一次以调出屏幕软键。在屏幕中央，你会看到一个`播放幻灯片`按钮——点击一次即可开始播放幻灯片。你可以从正在查看的任何一张照片开始幻灯片放映。\n\
    \n![images](img/p417-01.jpg)\n\n在`设置`应用中选择`照片`，可以调整每张照片在屏幕上停留的时间，以及`重复播放`和`随机播放`等其他设置（参见图\
    \ 19–4）。要结束幻灯片放映，只需点击屏幕即可。\n\n![images](img/1904.jpg)\n\n**图 19–4.** *配置幻灯片放映*\n\
    \n## 将照片用作 iPod touch 墙纸\n\n我们将在第 8 章：“个性化和安全设置”中向你展示如何选择并将某张照片用作 iPod touch 墙纸（以及其他墙纸选项）。\n\
    \n**注意：** 你可以为`主屏幕`和`锁定屏幕`设置不同的照片，也可以对两者使用同一张照片。\n\n## 通过电子邮件或推特发送照片\n\n只要你拥有有效的互联网连接（参见第\
    \ 4 章：“连接网络”），你就可以将照片库中的任何照片通过电子邮件发送或发布到 Twitter 上。点击缩略图栏上的`选项`按钮——这是底部软键行中最左侧的按钮。如果你看不到这些图标，请点击屏幕一次。\n\
    \n![images](img/p418-01.jpg)\n\n要邮寄照片，请选择`邮寄照片`选项，`邮件`应用将会自动启动。\n\n像你在第 16 章：“使用电子邮件通信”中做过的那样，点击`收件人`字段，然后选择接收照片的联系人。点击蓝色的`加号`（`+`）按钮来添加联系人。\n\
    \n输入主题和正文，然后点击右上角的`发送`——就这样简单。\n\n![images](img/p418-02.jpg)\n\n要发送推文，请选择`推文`选项，一个`Twitter`表单将会自动出现。只需填写你想随照片一起显示的消息，然后点击`发送`按钮。\n\
    \n**注意：** 只有在`设置`应用中输入了你的 Twitter 用户名和密码后，`推文`选项才会出现。\n\n![images](img/p418-03.jpg)\n\
    \n## 同时共享、复制、打印或删除多张照片\n\n如果你有多个照片想要同时通过电子邮件发送、信息发送、复制、打印或删除，可以在缩略图视图中进行操作：\n\n\
    1.  点击左下角的`操作`按钮。\n\n    ![images](img/p419-01.jpg)\n\n2.  点击你想要选择的照片。\n3.  如果不小心点到了某张照片，只需再次点击即可取消选择。\n\
    4.  从屏幕底部选择一个操作：`共享`（电子邮件、信息或打印）、`复制`、`添加到`（另一个相簿）或`删除`。\n\n    ![images](img/p419-02.jpg)\n\
    \n**注意：** `复制`功能允许你将多张照片复制并粘贴到电子邮件或其他应用中。`共享`会将图像重命名为 `photo.png`，而`复制-粘贴`则会在\
    \ DCIM 文件夹的文件名后添加 `.png` 扩展名。\n\n在本书出版时，你无法同时共享多个视频，也不能同时共享超过五张照片。这在未来的软件版本中可能会有所改变。\n"
- fmt: "### Assigning a Picture to a Contact\n\n[Chapter 17](#Chapter17.html#ch17):\
    \ “Contacts and Notes” shows you how to add a picture when editing a contact.\
    \ You can also find a picture you like and assign it to a contact. Begin by finding\
    \ the photo you want to use.\n\nAs you did when setting the wallpaper and emailing\
    \ a photo, tap the **Action** button—the one furthest to the right of the upper\
    \ row of soft keys. If you don't see the icons, tap the screen once.\n\nWhen you\
    \ touch the **Action** button, you'll see a drop-down list of choices: **Email\
    \ Photo**, **Message**, **Assign to Contact**, **Use as Wallpaper**, **Tweet**,\
    \ and **Print**.\n\nTouch the **Assign to Contact** button.\n\n![images](images/p420-01.jpg)\n\
    \nYou will see your contacts on the screen. You can either perform a search using\
    \ the **Search** bar at the top or just scroll through your contacts.\n\nOnce\
    \ you find the contact that you would like to add as a recipient to the picture,\
    \ touch that name.\n\n![images](images/p421-01.jpg)\n\nYou will then see the **Move\
    \ and Scale** screen. Tap and drag the picture to move it; use pinch to zoom in\
    \ or out.\n\nWhen you have this set just how you want it, touch the **Set Photo**\
    \ button to assign the picture to that contact.\n\n![images](images/p421-02.jpg)\n\
    \n**NOTE:** You will return to your Photo Library, not to the contact. If you\
    \ want to double-check that the picture was set to your contact, then exit the\
    \ **Photo** app, start the **Contact** app, and search for that contact.\n\n###\
    \ Viewing a Photo on Your Apple TV\n\n[Chapter 5](#Chapter05.html#ch5): “AirPlay\
    \ and Bluetooth” shows you how to use Apple's AirPlay feature to stream videos\
    \ from your iPod touch to your Apple TV over your local Wi-Fi network. Apple has\
    \ built the same functionality into the Photos app, so you can easily beam your\
    \ pictures to your big screen TV.\n\n![images](images/p422-01.jpg)\n\nFollow these\
    \ steps to send your photos to your Apple TV:\n\n1.  Tap the **AirPlay** button.\n\
    2.  Choose **Apple TV** from the source list.\n\nTo move to the next photo, simply\
    \ swipe from right to left, just as you would to switch photos on your iPod touch.\
    \ To move to the previous photo, swipe back from left to right.\n\nTo go back\
    \ to viewing photos on your iPod touch, tap the AirPlay button again and choose\
    \ iPod touch from the source list.\n\n#### Deleting a Picture\n\nYou might wonder\
    \ why you can't delete some pictures from your iPod touch (the **Trash Can** icon\
    \ is missing).\n\nFor example, you'll notice that the **Trash Can** icon is not\
    \ visible for any photo that is synced from iTunes. You can delete such pictures\
    \ only from your computer library. The next time you sync your iPod touch, they\
    \ will be deleted.\n\n![images](images/p423-01.jpg)\n\nWhen you are looking through\
    \ pictures in your Saved Photos (this folder is not synced with iTunes, but is\
    \ instead comprised of pictures you save from email messages or download from\
    \ the Web), then you'll see the **Trash Can** icon in the bottom icon bar. This\
    \ **Trash Can** icon does not appear when you are viewing pictures from your Photos\
    \ Library or other synced albums.\n\nIf you don't see the bottom row of icons,\
    \ tap the photo once to activate them, and then tap the **Trash Can** icon. You\
    \ will be prompted with the option to delete the picture.\n\nTouch **Delete Photo**\
    \ and the picture will be deleted from your iPod touch.\n\n![images](images/p423-02.jpg)\n\
    \n### Downloading Pictures from Web Sites\n\nWe have shown you how you can transfer\
    \ pictures from your computer to your iPod touch and save them from email messages.\
    \ You can also download and save pictures right from the Web onto your iPod touch.\n\
    \n**CAUTION:** We strongly encourage you to respect image copyright laws as you\
    \ download and save images from the Web. Unless the web site indicates an image\
    \ is free, you should check with the web site owner before downloading and saving\
    \ any pictures.\n\n#### Finding a Picture to Download\n\nThe iPod touch makes\
    \ it easy to copy and save images from web sites. This can be handy when you are\
    \ looking for a new image to use as wallpaper on your iPod touch.\n\nFirst, tap\
    \ the **Safari** web browser icon and type a search for iPod touch wallpaper to\
    \ locate a few sites that might have some interesting possibilities. (See [Chapter\
    \ 15](#Chapter15.html#ch15): “Safari Web Browser” for help with this topic.)\n\
    \n![images](images/p424-01.jpg)\n\nOnce you find a picture you want to download\
    \ and save, tap and hold it to bring up a new menu of options that includes **Save\
    \ Image** (among others), as shown in [Figure 19–5](#Chapter19.html#fig_19_5).\
    \ Choose this option to save the picture in your Saved Photos album.\n\n![images](images/1905.jpg)\n\
    \n**Figure 19–5.** saving an image from a web site\n\nNow touch your **Photo**\
    \ icon and you should see the picture in the Camera Roll album.\n\n![images](images/p425-01.jpg)\n\
    \n## Chapter 20\n\n## Maps\n\nMapping on your iPod touch is very convenient and\
    \ pretty amazing. As we explore the power of the **Maps** app in this chapter,\
    \ you'll see how to find your location on a map and get directions to just about\
    \ anywhere. You'll also learn how to switch between the **Standard**, **Satellite**,\
    \ and **Hybrid** views. You'll also see how, if you need to find the best route\
    \ to somewhere, you can check out the traffic using the **Show Traffic** button\
    \ in **Maps** options. If you want to find the closest pizza restaurant, golf\
    \ course, or hotel to your destination, that's easy, too. And you can use Google's\
    \ Street View right from your iPod touch to help you get to your destination.\
    \ It is easy to add an address you have mapped to your contacts.\n\n### Getting\
    \ Started with Maps\n\nThe beauty of the iPod touch is that its apps are designed\
    \ to work with one another. You've already seen how your contacts are linked to\
    \ the **Maps** app; just look back at [Chapter 17](#Chapter17.html#ch17): “Contacts\
    \ and Notes.”\n\n![images](images/p427-01.jpg)\n\nThe **Maps** app is powered\
    \ by Google Maps, the leader in mobile mapping technology. **Maps** lets you locate\
    \ your position, get directions, search for things nearby, see traffic, and much\
    \ more.\n\nSimply touch the **Maps** icon to get started.\n\n**NOTE:** You need\
    \ to be connected to a Wi-Fi network in order for Maps to work.\n\n#### Determining\
    \ Your Location (the Blue Dot)\n\nWhen you start the **Maps** app, you can have\
    \ it begin at your current location. Follow these steps to use your current location\
    \ as the default starting location:\n\n1.  Tap the small blue **Arrow** icon at\
    \ the lower-left corner.\n\n    ![images](images/p428-01.jpg)\n\n2.  **Maps**\
    \ will ask to use your current location—touch **OK** or **Don't Allow**.\n\n \
    \   We suggest choosing **OK**, which makes it much easier to find directions\
    \ from or to your current\n\n    ![images](images/p428-02.jpg)"
  raw: "### Assigning a Picture to a Contact\n\n[Chapter 17](#Chapter17.html#ch17):\
    \ “Contacts and Notes” shows you how to add a picture when editing a contact.\
    \ You can also find a picture you like and assign it to a contact. Begin by finding\
    \ the photo you want to use.\n\nAs you did when setting the wallpaper and emailing\
    \ a photo, tap the **Action** button—the one furthest to the right of the upper\
    \ row of soft keys. If you don't see the icons, tap the screen once.\n\nWhen you\
    \ touch the **Action** button, you'll see a drop-down list of choices: **Email\
    \ Photo**, **Message**, **Assign to Contact**, **Use as Wallpaper**, **Tweet**,\
    \ and **Print**.\n\nTouch the **Assign to Contact** button.\n\n![images](images/p420-01.jpg)\n\
    \nYou will see your contacts on the screen. You can either perform a search using\
    \ the **Search** bar at the top or just scroll through your contacts.\n\nOnce\
    \ you find the contact that you would like to add as a recipient to the picture,\
    \ touch that name.\n\n![images](images/p421-01.jpg)\n\nYou will then see the **Move\
    \ and Scale** screen. Tap and drag the picture to move it; use pinch to zoom in\
    \ or out.\n\nWhen you have this set just how you want it, touch the **Set Photo**\
    \ button to assign the picture to that contact.\n\n![images](images/p421-02.jpg)\n\
    \n**NOTE:** You will return to your Photo Library, not to the contact. If you\
    \ want to double-check that the picture was set to your contact, then exit the\
    \ **Photo** app, start the **Contact** app, and search for that contact.\n\n###\
    \ Viewing a Photo on Your Apple TV\n\n[Chapter 5](#Chapter05.html#ch5): “AirPlay\
    \ and Bluetooth” shows you how to use Apple's AirPlay feature to stream videos\
    \ from your iPod touch to your Apple TV over your local Wi-Fi network. Apple has\
    \ built the same functionality into the Photos app, so you can easily beam your\
    \ pictures to your big screen TV.\n\n![images](images/p422-01.jpg)\n\nFollow these\
    \ steps to send your photos to your Apple TV:\n\n1.  Tap the **AirPlay** button.\n\
    2.  Choose **Apple TV** from the source list.\n\nTo move to the next photo, simply\
    \ swipe from right to left, just as you would to switch photos on your iPod touch.\
    \ To move to the previous photo, swipe back from left to right.\n\nTo go back\
    \ to viewing photos on your iPod touch, tap the AirPlay button again and choose\
    \ iPod touch from the source list.\n\n#### Deleting a Picture\n\nYou might wonder\
    \ why you can't delete some pictures from your iPod touch (the **Trash Can** icon\
    \ is missing).\n\nFor example, you'll notice that the **Trash Can** icon is not\
    \ visible for any photo that is synced from iTunes. You can delete such pictures\
    \ only from your computer library. The next time you sync your iPod touch, they\
    \ will be deleted.\n\n![images](images/p423-01.jpg)\n\nWhen you are looking through\
    \ pictures in your Saved Photos (this folder is not synced with iTunes, but is\
    \ instead comprised of pictures you save from email messages or download from\
    \ the Web), then you'll see the **Trash Can** icon in the bottom icon bar. This\
    \ **Trash Can** icon does not appear when you are viewing pictures from your Photos\
    \ Library or other synced albums.\n\nIf you don't see the bottom row of icons,\
    \ tap the photo once to activate them, and then tap the **Trash Can** icon. You\
    \ will be prompted with the option to delete the picture.\n\nTouch **Delete Photo**\
    \ and the picture will be deleted from your iPod touch.\n\n![images](images/p423-02.jpg)\n\
    \n### Downloading Pictures from Web Sites\n\nWe have shown you how you can transfer\
    \ pictures from your computer to your iPod touch and save them from email messages.\
    \ You can also download and save pictures right from the Web onto your iPod touch.\n\
    \n**CAUTION:** We strongly encourage you to respect image copyright laws as you\
    \ download and save images from the Web. Unless the web site indicates an image\
    \ is free, you should check with the web site owner before downloading and saving\
    \ any pictures.\n\n#### Finding a Picture to Download\n\nThe iPod touch makes\
    \ it easy to copy and save images from web sites. This can be handy when you are\
    \ looking for a new image to use as wallpaper on your iPod touch.\n\nFirst, tap\
    \ the **Safari** web browser icon and type a search for iPod touch wallpaper to\
    \ locate a few sites that might have some interesting possibilities. (See [Chapter\
    \ 15](#Chapter15.html#ch15): “Safari Web Browser” for help with this topic.)\n\
    \n![images](images/p424-01.jpg)\n\nOnce you find a picture you want to download\
    \ and save, tap and hold it to bring up a new menu of options that includes **Save\
    \ Image** (among others), as shown in [Figure 19–5](#Chapter19.html#fig_19_5).\
    \ Choose this option to save the picture in your Saved Photos album.\n\n![images](images/1905.jpg)\n\
    \n**Figure 19–5.** saving an image from a web site\n\nNow touch your **Photo**\
    \ icon and you should see the picture in the Camera Roll album.\n\n![images](images/p425-01.jpg)\n\
    \n## Chapter 20\n\n## Maps\n\nMapping on your iPod touch is very convenient and\
    \ pretty amazing. As we explore the power of the **Maps** app in this chapter,\
    \ you'll see how to find your location on a map and get directions to just about\
    \ anywhere. You'll also learn how to switch between the **Standard**, **Satellite**,\
    \ and **Hybrid** views. You'll also see how, if you need to find the best route\
    \ to somewhere, you can check out the traffic using the **Show Traffic** button\
    \ in **Maps** options. If you want to find the closest pizza restaurant, golf\
    \ course, or hotel to your destination, that's easy, too. And you can use Google's\
    \ Street View right from your iPod touch to help you get to your destination.\
    \ It is easy to add an address you have mapped to your contacts.\n\n### Getting\
    \ Started with Maps\n\nThe beauty of the iPod touch is that its apps are designed\
    \ to work with one another. You've already seen how your contacts are linked to\
    \ the **Maps** app; just look back at [Chapter 17](#Chapter17.html#ch17): “Contacts\
    \ and Notes.”\n\n![images](images/p427-01.jpg)\n\nThe **Maps** app is powered\
    \ by Google Maps, the leader in mobile mapping technology. **Maps** lets you locate\
    \ your position, get directions, search for things nearby, see traffic, and much\
    \ more.\n\nSimply touch the **Maps** icon to get started.\n\n**NOTE:** You need\
    \ to be connected to a Wi-Fi network in order for Maps to work.\n\n#### Determining\
    \ Your Location (the Blue Dot)\n\nWhen you start the **Maps** app, you can have\
    \ it begin at your current location. Follow these steps to use your current location\
    \ as the default starting location:\n\n1.  Tap the small blue **Arrow** icon at\
    \ the lower-left corner.\n\n    ![images](images/p428-01.jpg)\n\n2.  **Maps**\
    \ will ask to use your current location—touch **OK** or **Don't Allow**.\n\n \
    \   We suggest choosing **OK**, which makes it much easier to find directions\
    \ from or to your current\n\n    ![images](images/p428-02.jpg)"
  trans: "\n### 为联系人分配照片\n\n第 17 章：“通讯录与备忘录”展示了如何在编辑联系人时添加照片。你也可以找一张喜欢的照片并将其分配给联系人。首先找到你想使用的照片。\n\
    \n与设置壁纸和通过电子邮件发送照片时的操作一样，轻点**操作**按钮——即上方软键行最右侧的那个按钮。如果你没看到图标，轻点屏幕一次。\n\n触碰**操作**按钮后，你会看到一个下拉选项列表：**用电子邮件发送照片**、**信息**、**分配给联系人**、**用作墙纸**、**推文**和**打印**。\n\
    \n触碰**分配给联系人**按钮。\n\n![images](img/p420-01.jpg)\n\n屏幕上会显示你的联系人列表。你可以使用顶部的**搜索**栏进行搜索，或者直接滚动浏览联系人。\n\
    \n一旦找到你想要将照片添加为收件人的联系人，就触碰该姓名。\n\n![images](img/p421-01.jpg)\n\n接着你会看到**移动和缩放**屏幕。拖动照片进行移动；使用捏合手势放大或缩小。\n\
    \n当照片调整到满意的位置后，触碰**设定照片**按钮，将该照片分配给该联系人。\n\n![images](img/p421-02.jpg)\n\n**注：**操作完成后你将返回照片图库，而非联系人界面。如果你想再次确认照片已成功分配给联系人，只需退出**照片**应用，打开**通讯录**应用，然后搜索该联系人即可。\n\
    \n### 在 Apple TV 上查看照片\n\n第 5 章：“AirPlay 与蓝牙”展示了如何使用苹果的 AirPlay 功能，通过本地 Wi-Fi\
    \ 网络将 iPod touch 上的视频流式传输到 Apple TV。苹果在“照片”应用中内置了相同的功能，因此你可以轻松地将照片投射到大屏幕电视上。\n\
    \n![images](img/p422-01.jpg)\n\n按照以下步骤将照片发送到 Apple TV：\n\n1.  轻点**AirPlay**按钮。\n\
    2.  从来源列表中选择**Apple TV**。\n\n切换到下一张照片，只需从右向左滑动，就像在 iPod touch 上切换照片一样。要返回上一张照片，则从左向右滑动。\n\
    \n要恢复在 iPod touch 上查看照片，请再次轻点 AirPlay 按钮，然后从来源列表中选择 iPod touch。\n\n#### 删除照片\n\
    \n你可能会好奇为什么有些照片无法从 iPod touch 上删除（**废纸篓**图标不见了）。\n\n例如，你会注意到，任何从 iTunes 同步来的照片都看不到**废纸篓**图标。这类照片只能从电脑的资料库中删除。下次同步\
    \ iPod touch 时，它们就会被移除。\n\n![images](img/p423-01.jpg)\n\n当你查看“已存储的照片”（此文件夹不与 iTunes\
    \ 同步，而是由你从电子邮件中保存或从网页下载的照片组成）时，你会在底部图标栏中看到**废纸篓**图标。当你查看“照片图库”或其他同步相册中的照片时，这个**废纸篓**图标不会出现。\n\
    \n如果你没看到底部那一行图标，先轻点照片激活它们，然后轻点**废纸篓**图标。系统会提示你确认是否删除照片。\n\n触碰**删除照片**，该照片将从你的\
    \ iPod touch 中删除。\n\n![images](img/p423-02.jpg)\n\n### 从网站下载图片\n\n我们已经向你展示了如何将图片从电脑传输到\
    \ iPod touch，以及如何从电子邮件中保存图片。你还可以直接从网页上下载并保存图片到 iPod touch。\n\n**警告：**我们强烈建议你在从网页上下载和保存图片时尊重图片版权法。除非网站明确标注图片可免费使用，否则在下载和保存任何图片前，应先征得网站所有者的同意。\n\
    \n#### 查找要下载的图片\n\niPod touch 让你能轻松地从网页上复制和保存图片。当你想为 iPod touch 寻找一张新的壁纸时，这个功能会非常方便。\n\
    \n首先，轻点**Safari**网页浏览器图标，输入搜索词如“iPod touch 壁纸”，找到一些可能提供有趣壁纸的网站。（关于此主题的帮助信息，请参阅第\
    \ 15 章：“Safari 网页浏览器”。）\n\n![images](img/p424-01.jpg)\n\n一旦找到你想下载和保存的图片，长按该图片，就会弹出一个包含**存储图像**（以及其他选项）的新菜单，如图\
    \ 19-5 所示。选择此选项，将图片保存到你的“已存储的照片”相册中。\n\n![images](img/1905.jpg)\n\n**图 19-5.**\
    \ 从网页保存图片\n\n现在轻点你的**照片**图标，你应该能在“相机胶卷”相册中看到这张图片。\n\n![images](img/p425-01.jpg)\n\
    \n## 第 20 章\n\n## 地图\n\n在 iPod touch 上使用地图功能既方便又令人惊叹。在本章探索**地图**应用的强大功能时，你将了解如何在地图上找到自己的位置，并获取前往几乎任何地方的路线。你还将学习如何在**标准**、**卫星**和**混合**视图之间切换。你还会看到，如果需要找到去某处的最佳路线，你可以通过**地图**选项中的**显示交通状况**按钮来查看实时交通。如果你想找到目的地附近最近的披萨店、高尔夫球场或酒店，也同样简单。你甚至可以直接在\
    \ iPod touch 上使用谷歌的街景功能，帮助你顺利抵达目的地。将已在地图上标出的地址添加到通讯录中也非常方便。\n\n### 地图入门\n\niPod\
    \ touch 的妙处在于其应用程序设计得能够相互协作。你已经见识过通讯录是如何与**地图**应用关联的；只需回顾一下第 17 章：“通讯录与备忘录”即可。\n\
    \n![images](img/p427-01.jpg)\n\n**地图**应用由移动地图技术领域的领导者谷歌地图提供支持。**地图**能让你定位自己的位置、获取路线、搜索附近事物、查看交通状况等。\n\
    \n只需轻点**地图**图标即可开始使用。\n\n**注：**你需要连接到 Wi-Fi 网络才能使用地图功能。\n\n#### 确定你的位置（蓝点）\n\n\
    启动**地图**应用时，你可以让它从你当前的位置开始。按照以下步骤将你的当前位置设为默认起始位置：\n\n1.  轻点左下角的蓝色小**箭头**图标。\n\n\
    \    ![images](img/p428-01.jpg)\n\n2.  **地图**会请求使用你的当前位置——轻点**允许**或**不允许**。\n\n\
    \    我们建议选择**允许**，这样查找从当前位置出发或前往当前位置的路线会方便得多。\n\n    ![images](img/p428-02.jpg)\n"
- fmt: "### Changing Your Map Views\n\nThe default view for `Maps` is the `Standard`\
    \ view, a basic map that shows a generic background overlaid with street names.\
    \ `Maps` can also show you a `Satellite` view or a combination of the `Satellite`\
    \ and `Standard` views called `Hybrid`. Finally, the `List` view is handy if you've\
    \ searched for something that provided multiple results, like local coffee shops.\
    \ It is also handy if you've asked for directions to a location. You can switch\
    \ among all the views by following these steps:\n\n1.  Tap the turned-up edge\
    \ of the map in the lower-right corner.\n2.  The corner of the map turns up to\
    \ reveal buttons for views, traffic, pins, and more.\n3.  Tap the view you'd like\
    \ to switch to (see [Figure 20-1](#Chapter20.html#fig_20_1)):\n    *   `Standard`\
    \ is a regular map with street names.\n    *   `Satellite` is a satellite picture\
    \ with no street names.\n    *   `Hybrid` is a combination of the `Satellite`\
    \ and `Standard` views; that is, a `Satellite` view with street names.\n    *\
    \   `List` is available only when your search produces multiple results (like\
    \ \"Starbucks\") or you've asked for directions.\n\n![images](images/2001.jpg)\n\
    \n**Figure 20-1.** *Various views available in the `Maps` app: From upper left:\
    \ Standard, Satellite, Hybrid and List.*\n\n#### Checking Traffic\n\nNot only\
    \ does your `Maps` app tell you how to get somewhere, but it can also check traffic\
    \ along the way. This feature is supported only in the United States for now.\
    \ Follow these steps to check the traffic for a given route:\n\n1.  Tap the lower-right\
    \ corner of the map to see the options.\n2.  Tap `Show Traffic`.\n\n![images](images/p430-01.jpg)\n\
    \nOn a highway, if there is a traffic situation, you usually see yellow lights\
    \ instead of green ones. Sometimes, the yellow lights might be flashing to alert\
    \ you to traffic delays.\n\nYou may even see `Construction Worker` icons to indicate\
    \ construction zones.\n\n`Maps` uses color on major streets and highways to indicate\
    \ the speed that traffic is moving at:\n\n*   Green = 50 MPH or more\n*   Yellow\
    \ = 25–50 MPH\n*   Red = Less than 25 MPH\n*   Gray (or no color) = No traffic\
    \ data currently available\n\n### Searching for Anything\n\nBecause `Maps` is\
    \ tied to Google Maps, you can search for and find just about anything: a specific\
    \ address, type of business, city, or other point of interest, as shown in [Figure\
    \ 20-2](#Chapter20.html#fig_20_2). Follow these steps to search for a specific\
    \ location:\n\n1.  Touch the `Search` bar in the top-right corner of the screen.\n\
    2.  Type in the address, point of interest, or town and state you would like to\
    \ map on your iPod touch.\n\n![images](images/p431-01.jpg)\n\n#### Google Maps\
    \ Search Tips\n\nYou can enter just about anything in the `Search` bar, including\
    \ the following:\n\n*   First name, last name, or company name (to match your\
    \ Contacts list)\n*   123 Main Street, City (some or all of a street address)\n\
    *   Orlando Airport (to find an airport)\n*   Plumber, painter, or roofer (any\
    \ part of a business name or trade)\n*   Golf courses + city (to find local golf\
    \ courses)\n*   Movies + city or ZIP/postal code (to find local movie theaters)\n\
    *   Pizza 32174 (to search for local pizza restaurants in ZIP code 32174)\n* \
    \  95014 (the ZIP code for Apple Computer's headquarters in California, United\
    \ States)\n*   Apress\n\n![images](images/2002.jpg)\n\n**Figure 20-2.** *Searching\
    \ in the `Maps` app*\n\nTo use numbers, tap the `123` key on the keyboard. For\
    \ letters, tap the `ABC` key to switch back to a letter keyboard.\n\n### Mapping\
    \ Options\n\nNow that your address is on the `Maps` screen, follow these steps\
    \ to access the available options:\n\n1.  Touch the blue `Arrow` icon ![images](images/p432-01.jpg)\
    \ next to the address to see some of these options.\n2.  If you have mapped one\
    \ of your contacts, you'll see the contact details, as shown in [Figure 20-3](#Chapter20.html#fig_20_3).\
    \ `Maps` will also pull up contact information for specific searches. You can\
    \ also get directions, share a location, or add a location as a bookmark.\n\n\
    **NOTE:** You can also tap and hold the address to bring up the `Copy` pop-up\
    \ menu.\n\n![images](images/2003.jpg)\n\n**Figure 20-3.** *Touching the `Information`\
    \ button to see the mapped contact details*\n\n#### Working with Bookmarks\n\n\
    Bookmarks in `Maps` work much as they do in `Safari`. A bookmark simply creates\
    \ a record of places you've visited or mapped and want to remember in the future.\
    \ It is always easier to look at a bookmark than to perform a new search.\n\n\
    ##### Adding a New Bookmark\n\nBookmarking a location is a great way to simplify\
    \ finding a place again:\n\n1.  Map a location, as shown in [Figure 20-4](#Chapter20.html#fig_20_4).\n\
    2.  Touch the blue `Information` icon next to the address.\n3.  Touch `Add to\
    \ Bookmarks`.\n\n    ![images](images/2004.jpg)\n\n    **Figure 20-4.** *Adding\
    \ a bookmark*\n\n4.  Edit the bookmark name to make is short and recognizable—in\
    \ this case, we edited the address to simply say `Gloria's Store`.\n5.  When you\
    \ are done, just touch `Save` in the top-right corner.\n\n**TIP**: You can search\
    \ for bookmark names just as you search for names in `Contacts`.\n\n##### Accessing\
    \ and Editing Your Bookmarks\n\nTo view your bookmarks, follow these steps:\n\n\
    1.  Tap the `Bookmarks` icon next to the `Search` window in the top row.\n2. \
    \ Tap any bookmark to immediately jump to it.\n3.  Tap the `Edit` button at the\
    \ top of the bookmarks to edit or delete your bookmarks.\n    1.  To reorder the\
    \ bookmarks, touch and drag the right edge of each bookmark up or down.\n    2.\
    \  To edit the name of a bookmark, touch it and retype the name. After editing\
    \ the name, touch the `Bookmarks` button in the top left to get back to your list\
    \ of bookmarks.\n    3.  To delete a bookmark, swipe to the left or right on the\
    \ bookmark, and then tap the `Delete` button.\n4.  Tap the `Done` button when\
    \ you are finished editing your bookmarks.\n\n![images](images/p435-01.jpg)\n\n\
    #### Adding a Mapped Location to Contacts\n\nIt is easy to add a location you\
    \ mapped to your Contacts list:\n\n1.  Map an address.\n2.  Tap the `Arrow/Information`\
    \ icon.\n3.  Tap `Add to Contacts`.![images](images/p435-02.jpg)\n4.  Tap either\
    \ `Create a New Contact` or `Add to Existing Contact`.\n5.  If you choose `Add\
    \ to Existing Contact`, you can then scroll through or search your contacts and\
    \ select a name. The address will automatically be added to that contact.\n\n\
    #### Searching for Establishments Near You\n\nFollow these steps to search for\
    \ establishments around your current location:\n\n![images](images/p436-01.jpg)\n\
    \n1.  Map a location on the map or use the blue dot for your current location.\n\
    2.  Tap the `Search` window. Let's say you want to search for the closest pizza\
    \ restaurants, so you type \"pizza.\" This will map all local pizza restaurants.\n\
    3.  Notice that each mapped location may have a `Street View` icon on the left\
    \ and an `Information` icon on the right.\n4.  You can double-tap to zoom in,\
    \ or pinch the screen open or closed to zoom in or out.\n5.  Just as with any\
    \ mapped location, touching the blue `Information` icon brings up all the details,\
    \ including the pizza restaurant's phone number, address, and web site as shown\
    \ in [Figure 20-5](#Chapter20.html#fig_20_5).\n6.  If you want directions to the\
    \ restaurant, just touch `Directions to Here`, and a route is instantly calculated.\n\
    \n![images](images/2005.jpg)\n\n**Figure 20-5.** *Using the Info screen to do\
    \ more things with mapped locations.*\n\n**NOTE**: If you touch the `Home Page`\
    \ link, you will exit `Maps`, and `Safari` will start up. You will need to restart\
    \ `Maps` when you're done.\n\n#### Zooming In and Out\n\nYou can zoom in and out\
    \ in the usual way by double-tapping and pinching. To zoom in by double-tapping,\
    \ just double-tap the screen as you would on a web page or picture."
