  trans: '

    #### 添加新字段


    ![图片](img/p354-03.jpg)


    轻点**添加字段**标签，然后选择任意建议的字段，即可将其添加至该特定联系人（参见图 17-2）。


    ![图片](img/1702.jpg)


    **图 17-2.** *可添加到联系人条目中的新字段*


    当您轻点**生日**时，会看到一个滚轮。您可以通过转动滚轮选择对应日期，将生日添加到联系人信息中。


    ![图片](img/p355-02.jpg)


    操作完成后，只需轻点**新建联系人**表单右上角的**完成**按钮即可。


    ![图片](img/p355-01.jpg)


    **提示：** 假设您在公交车站遇到了一位想要记住的人。当然，您应该输入这位新朋友的名和姓（如果您知道的话）；不过，您还应在**公司**字段中输入“公交车站”这几个字。这样一来，当您输入字母“bus”或“stop”时，就能立刻找到所有在公交车站结识的人，即使您记不住他们的名字也没关系！


    ### 向联系人添加照片


    您可能希望为联系人关联一张照片。在我们之前操作的**新建联系人**屏幕中，只需轻点**姓氏**标签旁边的**添加照片**按钮。


    ![图片](img/p355-03.jpg)


    如果您在“编辑联系人”模式下更换照片，则会在现有照片底部看到**编辑**选项。


    轻点**添加照片**按钮后，您将看到可以进行以下操作：


    ![图片](img/p356-01.jpg)


    *   拍照

    *   选取照片


    如果已有照片，您还可以进行以下操作：


    *   编辑照片

    *   删除照片


    若要选取现有照片，请选择照片所在的相册，并轻点对应的标签。当您看到想要使用的照片时，只需轻点它即可。


    ![图片](img/p356-02.jpg)


    您会注意到照片的顶部和底部会变成灰色，并且您可以对照片进行移动、捏合缩放操作，然后在**图片**窗口中调整其位置。


    当照片调整到您想要的位置后，只需轻点右下角的**选取**按钮，该照片便会设定为该联系人的头像。


    ![图片](img/p356-03.jpg)


    **提示：** 如果您刚搬到一个新社区，记住每个人的名字可能会令人相当头疼。因此，一个好的做法是，为您遇到的每一位邻居在**公司**字段中添加“邻居”这个词。要快速调出所有邻居，只需输入字母“neig”就能找到所有您认识的人！


    ### 搜索联系人


    假设您需要查找某个特定的电话号码或电子邮件地址。只需像之前一样轻点您的**通讯录**图标，您就会在**所有联系人**列表的顶部看到一个**搜索**框（参见图
    17-3）。


    **提示：** 如果您当前处于**通讯录**列表的中部或底部，可以通过轻点 iPod touch 顶部的时钟，快速跳转到**通讯录**屏幕顶部并看到这个**搜索**窗口。


    ![图片](img/1703.jpg)


    **图 17-3.** *通讯录**搜索**框*


    要查找联系人，请在以下三个可搜索字段中输入前几个字母：


    ![图片](img/p357-01.jpg)


    *   名字

    *   姓氏

    *   昵称

    *   公司名称


    iPod touch 会立即开始过滤，仅显示与所输入字母匹配的联系人。


    **提示：** 若要进一步缩小搜索范围，请按**空格**键并再输入几个字母。


    当您看到正确的姓名时，只需轻点它，该联系人的信息便会显示出来。


    #### 通过触摸并滑动字母表快速跳转至某个字母


    如果您将手指放在屏幕左侧边缘的字母表上，并向上或向下拖动，即可跳转到相应字母。


    #### 通过滑动搜索


    如果您不想手动输入字母，只需移动手指并从底部向上滑动，您就会看到联系人列表在屏幕上快速滚动。继续滑动或滚动，直到看到您想要的姓名。轻点一个姓名，该联系人的信息便会显示。


    #### 使用群组搜索


    如果您在 PC 或 Mac 上按群组整理了联系人，并通过电脑同步或使用 iCloud 通过无线方式同步了 iPod touch，那么这些群组将同步到您的 iPod
    touch 上。当您启动**通讯录**应用时，您会看到顶部的**群组**。在**群组**标题下，您会看到**所有联系人**。


    ![图片](img/p358-01.jpg)


    选择**所有联系人**即可搜索 iPod touch 上所有可用的联系人信息。


    如果您同步了多个帐户，您将看到每个单独帐户的标签，以及顶部的**所有联系人**标签。


    此示例显示两个群组——一个来自 Microsoft Exchange 帐户（即公司电子邮件帐户），另一个来自一组 iCloud 联系人。


    如果您拥有 Exchange ActiveSync 帐户并且您的公司已启用该功能，您的 Exchange 全局地址列表也会显示在此处（位于“群组”下）。您可以在这里搜索找到公司里的任何人。


    **注意：** 您无法在 iPod touch 的**通讯录**应用中创建群组——它们必须在您的电脑上创建，或者在您向 iPod touch 添加联系人帐户时同步。

    '
- fmt: '### Adding Contacts from Email Messages


    Often you’ll receive an email message and realize that the contact is not in your
    address book. Adding a new contact from an email message is easy.


    Open the email message from the contact you’d like to add to your `Contacts` list.
    Next, in the email message’s `From` field, just touch the name of the sender next
    to the `From:` tag.


    ![Images](images/p359-01.jpg)


    If the sender is not in your address book, you’ll be taken to a screen that lets
    you choose whether to add that email address to an existing contact or to create
    a new one.


    If you select `Create a New Contact`, you’ll be taken to the same `New Contact`
    screen we saw earlier (see [Figure 17-1](#Chapter17.html#fig_17_1)).


    But suppose this is someone’s personal email address, and you already have an
    entry for that person with a work email address. In that case, you would select
    `Add to Existing Contact` and choose the correct person. Next, you’d give this
    email address a new tag—`personal`, in this case.


    ![Images](images/p359-02.jpg)


    #### Linking a Contact to Another App


    You might have contact information for the sender of the email message in another
    app on the iPod touch. The iPod touch makes it easy to link these contacts together.


    For example, assume Steve, the sender of the email message, is in a list of your
    LinkedIn contacts, but not a contact on your iPod touch, for some reason. Here
    is how you can link his contact information in your iPod touch to the information
    you have in the `LinkedIn` app:


    1.  Add him to your contacts, as shown previously.

    2.  Start the `LinkedIn` app—see [Chapter 24](#Chapter24.html#ch24): “Social Networking”
    for more information on the topic.

    3.  Find your contact information for Steve to verify that he is in your `LinkedIn`
    app.

    4.  Go to the `Connections` icon.

    5.  Choose `Download All` in the top-right corner.

    6.  The `LinkedIn` app will inform you that doing this will add the photo, current
    company and title, email addresses, and web sites associated with this contact
    (see [Figure 17-4](#Chapter17.html#fig_17_4)).

    7.  This is exactly what you want in your iPod touch contacts, so choose `Download
    All New Connections`.

    8.  Steve’s picture and updated information are then brought into his contact
    information on your iPod touch.


    ![images](images/1704.jpg)


    **Figure 17-4.** *Linking a new contact in an email message to an existing social
    networking contact*


    **TIP:** Learning the names of the parents of a school-age child’s friends can
    be fairly challenging. In the `First` field, however, you can add, not just the
    name of your child’s friend, but also the names of the child’s parents (e.g.,
    `First: Samantha (Mom: Susan, Dad: Ron)`). Next, in the `Company` field, add the
    name of your child and “school friend” (e.g., `Cece school friend`). Now, just
    typing your child’s name in the `Search` box of your `All Contacts` list instantly
    finds every person you ever met at your child’s school. Now you can say, without
    missing a beat: “Hello, Susan, great to see you again!” *Try your best to covertly
    look up the name.*


    ### Sending a Picture to a Contact


    If you want to send a picture to a contact, then you will need to do that from
    the `Photos` app (see [Chapter 19](#Chapter19.html#ch19): “Working with Photos”).


    ### Sending an Email Message from Contacts


    Many of the core apps (e.g., `Contacts`, `Mail`, and `Messages`) are fully integrated,
    so one app can easily trigger another. If you want to send an email message to
    one of your contacts, simply open the contact and tap the email address. The `Mail`
    app will launch, and you can compose and send an email message to this person.


    Start your `Contacts` app by touching the `Contacts` icon. Either search or flick
    through your contacts until you find the contact you need.


    ![Images](images/p362-01.jpg)


    In the contact information, touch the email address of the contact you’d like
    to use.


    You’ll see that the `Mail` program launches automatically with the contact’s name
    in the `To:` field of the email message. Finally, type and send the message.


    ![Images](images/p362-02.jpg)


    ### Showing Your Contacts Addresses on the Map


    One of the great things about the iPod touch is its integration with Google Maps.
    This is very evident in the `Contacts` app. Let’s say you want to map the home
    or work address of any contact in your address book. In the old days (pre-iPod
    touch), you’d have to use Google, MapQuest, or some other program, and then laboriously
    retype or copy and paste the address information. This is very time-consuming—but
    you don’t have to do this on the iPod touch.


    Simply open the contact as you did earlier. This time, touch the address at the
    bottom of the contact information.


    ![Images](images/p362-03.jpg)


    Your `Maps` app (which is powered by Google Maps) immediately loads and drops
    a `Push-Pin` icon at the exact location of the contact. The contact’s name will
    appear above the `Push-Pin`.


    ![Images](images/p363-01.jpg)


    ![Images](images/p363-02.jpg)


    Touch the tab on the top of the `Push-Pin` to get to the `Info` screen.


    ![Images](images/p363-03.jpg)


    Now you can select `Directions To Here` or `Directions From Here`.


    Next, type the correct start or end address and touch the `Route` button in the
    lower-right corner. If you decide you don’t want the directions, just tap the
    `Clear` button in the top left.


    What if you had just typed the address in your `Maps` app, instead of clicking
    from your contact list? In that case, you might want to touch `Add to Contacts`
    to add this address.


    **TIP:** To return to your contact information, tap the `Map` button, exit `Maps`,
    and then start up `Contacts`. You can also use multi-tasking (see [Chapter 7](#Chapter07.html#ch7):
    “Multitasking”) by double-clicking the `Home` button and choosing the `Contacts`
    app.


    ### Changing Your Contact Sort and Display Order


    Like other settings, the `Contact` app’s options are accessible via the `Settings`
    icon.


    Touch the `Settings` icon, scroll down to `Mail, Contacts, Calendars`, and then
    touch the tab.


    Next, scroll down until you see `Contacts` and the two options underneath it.
    To change the sort order, touch the `Sort Order` tab and select whether you want
    your contacts sorted by first name or last name.


    ![Images](images/p364-01.jpg)


    You may want to change how your contacts are displayed. Here’s where you get it
    done; you can choose `First, Last` or `Last, First`. Tap the `Display Order` tab
    and choose whether you want your contact displayed in first name or last name
    order. Tap the `Mail, Contacts…` button in the upper-left corner to save your
    settings changes.


    ![Images](images/p364-02.jpg)


    #### Searching for Global Address List (GAL) Contacts


    If you have an Exchange account configured, you should have an option for a Global
    Address List. This gives you access to your Global Address List if you are connected
    to your organization’s server.


    Open your `Contacts` app and look under Exchange for a tab that says `Exchange
    Global Address List`.


    ![Images](images/p364-03.jpg)


    ### Contacts Troubleshooting


    Sometimes, your `Contacts` app might not work the way you expect. (If you don’t
    see all your contacts, review the steps in the [Chapter 3](#Chapter03.html#ch3):
    “Sync with iCloud, iTunes and More” for information on how to sync with your address
    book application.) Make sure you have selected `All Groups` in the settings of
    the `iTunes` app.


    **TIP:** If you are syncing with another contact application, such as `Contacts`
    in Gmail, then make sure you select the option closest to `All Contacts`, rather
    than a subset like a particular group.'
  raw: '### Adding Contacts from Email Messages


    Often you’ll receive an email message and realize that the contact is not in your
    address book. Adding a new contact from an email message is easy.


    Open the email message from the contact you’d like to add to your **Contacts**
    list. Next, in the email message’s **From** field, just touch the name of the
    sender next to the **From:** tag.


    ![Images](images/p359-01.jpg)


    If the sender is not in your address book, you’ll be taken to a screen that lets
    you choose whether to add that email address to an existing contact or to create
    a new one.


    If you select **Create a New Contact**, you’ll be taken to the same **New Contact**
    screen we saw earlier (see [Figure 17-1](#Chapter17.html#fig_17_1)).


    But suppose this is someone’s personal email address, and you already have an
    entry for that person with a work email address. In that case, you would select
    **Add to Existing Contact** and choose the correct person. Next, you’d give this
    email address a new tag—*personal*, in this case.


    ![Images](images/p359-02.jpg)


    ##### Linking a Contact to Another App


    You might have contact information for the sender of the email message in another
    app on the iPod touch. The iPod touch makes it easy to link these contacts together.


    For example, assume Steve, the sender of the email message, is in a list of your
    LinkedIn contacts, but not a contact on your iPod touch, for some reason. Here
    is how you can link his contact information in your iPod touch to the information
    you have in the **LinkedIn** app:


    1.  Add him to your contacts, as shown previously.

    2.  Start the **LinkedIn** app—see [Chapter 24](#Chapter24.html#ch24): “Social
    Networking” for more information on the topic.

    3.  Find your contact information for Steve to verify that he is in your **LinkedIn**
    app.

    4.  Go to the **Connections** icon.

    5.  Choose **Download All** in the top-right corner.

    6.  The **LinkedIn** app will inform you that doing this will add the photo, current
    company and title, email addresses, and web sites associated with this contact
    (see [Figure 17-4](#Chapter17.html#fig_17_4)).

    7.  This is exactly what you want in your iPod touch contacts, so choose **Download
    All New Connections**.

    8.  Steve’s picture and updated information are then brought into his contact
    information on your iPod touch.


    ![images](images/1704.jpg)


    **Figure 17-4.** *Linking a new contact in an email message to an existing social
    networking contact*


    **TIP:** Learning the names of the parents of a school-age child’s friends can
    be fairly challenging. In the **First** field, however, you can add, not just
    the name of your child’s friend, but also the names of the child’s parents (e.g.,
    **First: Samantha (Mom: Susan, Dad: Ron)**). Next, in the **Company** field, add
    the name of your child and “school friend” (e.g., **Cece school friend**). Now,
    just typing your child’s name in the **Search** box of your **All Contacts** list
    instantly finds every person you ever met at your child’s school. Now you can
    say, without missing a beat: “Hello, Susan, great to see you again!” *Try your
    best to covertly look up the name.*


    ### Sending a Picture to a Contact


    If you want to send a picture to a contact, then you will need to do that from
    the **Photos** app (see [Chapter 19](#Chapter19.html#ch19): “Working with Photos”).


    ### Sending an Email Message from Contacts


    Many of the core apps (e.g., **Contacts**, **Mail**, and **Messages**) are fully
    integrated, so one app can easily trigger another. If you want to send an email
    message to one of your contacts, simply open the contact and tap the email address.
    The **Mail** app will launch, and you can compose and send an email message to
    this person.


    Start your **Contacts** app by touching the **Contacts** icon. Either search or
    flick through your contacts until you find the contact you need.


    ![Images](images/p362-01.jpg)


    In the contact information, touch the email address of the contact you’d like
    to use.


    You’ll see that the **Mail** program launches automatically with the contact’s
    name in the **To:** field of the email message. Finally, type and send the message.


    ![Images](images/p362-02.jpg)


    ### Showing Your Contacts Addresses on the Map


    One of the great things about the iPod touch is its integration with Google Maps.
    This is very evident in the **Contacts** app. Let’s say you want to map the home
    or work address of any contact in your address book. In the old days (pre-iPod
    touch), you’d have to use Google, MapQuest, or some other program, and then laboriously
    retype or copy and paste the address information. This is very time-consuming—but
    you don’t have to do this on the iPod touch.


    Simply open the contact as you did earlier. This time, touch the address at the
    bottom of the contact information.


    ![Images](images/p362-03.jpg)


    Your **Maps** app (which is powered by Google Maps) immediately loads and drops
    a **Push-Pin** icon at the exact location of the contact. The contact’s name will
    appear above the **Push-Pin**.


    ![Images](images/p363-01.jpg)


    ![Images](images/p363-02.jpg)


    Touch the tab on the top of the **Push-Pin** to get to the **Info** screen.


    ![Images](images/p363-03.jpg)


    Now you can select **Directions To Here** or **Directions From Here**.


    Next, type the correct start or end address and touch the **Route** button in
    the lower-right corner. If you decide you don’t want the directions, just tap
    the **Clear** button in the top left.


    What if you had just typed the address in your **Maps** app, instead of clicking
    from your contact list? In that case, you might want to touch **Add to Contacts**
    to add this address.


    **TIP:** To return to your contact information, tap the **Map** button, exit **Maps**,
    and then start up **Contacts**. You can also use multi-tasking (see [Chapter 7](#Chapter07.html#ch7):
    “Multitasking”) by double-clicking the **Home** button and choosing the **Contacts**
    app.


    ### Changing Your Contact Sort and Display Order


    Like other settings, the **Contact** app’s options are accessible via the **Settings**
    icon.


    Touch the **Settings** icon, scroll down to **Mail, Contacts, Calendars**, and
    then touch the tab.


    Next, scroll down until you see **Contacts** and the two options underneath it.
    To change the sort order, touch the **Sort Order** tab and select whether you
    want your contacts sorted by first name or last name.


    ![Images](images/p364-01.jpg)


    You may want to change how your contacts are displayed. Here’s where you get it
    done; you can choose **First, Last** or **Last, First**. Tap the **Display Order**
    tab and choose whether you want your contact displayed in first name or last name
    order. Tap the **Mail, Contacts…** button in the upper-left corner to save your
    settings changes.


    ![Images](images/p364-02.jpg)


    #### Searching for Global Address List (GAL) Contacts


    If you have an Exchange account configured, you should have an option for a Global
    Address List. This gives you access to your Global Address List if you are connected
    to your organization’s server.


    Open your **Contacts** app and look under Exchange for a tab that says **Exchange
    Global Address List**.


    ![Images](images/p364-03.jpg)


    ### Contacts Troubleshooting


    Sometimes, your **Contacts** app might not work the way you expect. (If you don’t
    see all your contacts, review the steps in the [Chapter 3](#Chapter03.html#ch3):
    “Sync with iCloud, iTunes and More” for information on how to sync with your address
    book application.) Make sure you have selected **All Groups** in the settings
    of the **iTunes** app.


    **TIP:** If you are syncing with another contact application, such as **Contacts**
    in Gmail, then make sure you select the option closest to **All Contacts**, rather
    than a subset like a particular group.'
  trans: '

    ### 通过电子邮件添加联系人


    你经常会在收到某封电子邮件时发现，发件人并未保存在你的通讯录中。不过，通过邮件添加新联系人其实很简单。


    打开你想将其添加至`通讯录`列表的发件人所发的邮件。接着，在邮件的`发件人`字段中，只需轻点`发件人：`标签旁的发件人姓名即可。


    ![图片](img/p359-01.jpg)


    如果发件人不在你的通讯录中，系统将进入一个界面，让你选择将该电子邮箱地址添加到现有联系人，还是创建新联系人。


    如果你选择`创建新联系人`，系统将进入我们之前见到过的`新建联系人`界面（参考图 17-1）。


    但假设这是某人的个人电子邮箱地址，而你已经有一个包含其工作邮箱地址的条目。在这种情况下，你应该选择`添加到现有联系人`，然后找到正确的人。接着，你可以为这个电子邮箱地址设置一个新标签——在本例中，设为`个人`。


    ![图片](img/p359-02.jpg)


    #### 将联系人关联到其他应用


    你可能会在 iPod touch 上的另一个应用中存有某封邮件发件人的联系信息。iPod touch 可以轻松地将这些联系人信息关联起来。


    例如，假设这封邮件的发件人 Steve 在你的 LinkedIn 联系人列表中，但不知为何不是你 iPod touch 上的联系人。以下是将他与你 iPod
    touch 中的联系人信息关联起来的步骤：


    1.  按照前述方法，将他添加到你的通讯录中。

    2.  启动`LinkedIn`应用——有关此主题的更多信息，请参阅第 24 章：“社交网络”。

    3.  找到 Steve 的联系信息，确认他确实在你的`LinkedIn`应用中。

    4.  点击`连接`图标。

    5.  选择右上角的`下载全部`。

    6.  `LinkedIn`应用会提示你，此操作将添加与此联系人关联的照片、当前公司和职位、电子邮箱地址以及网站（参见图 17-4）。

    7.  这正是你希望在 iPod touch 通讯录中实现的效果，因此选择`下载所有新连接`。

    8.  Steve 的照片和更新后的信息随后会被导入到你的 iPod touch 通讯录中。


    ![图片](img/1704.jpg)


    **图 17-4.** *将邮件中的新联系人关联到现有的社交网络联系人*


    **提示：** 记住学龄儿童朋友的父母姓名可能相当有挑战性。不过，在`名`字段中，你不仅可以添加孩子朋友的名字，还可以加上其父母的名字（例如，`名：Samantha
    (妈妈：Susan，爸爸：Ron)`）。接着，在`公司`字段中，填入你孩子的名字和“学校同学”字样（例如，`Cece 学校同学`）。这样，只需在`所有通讯录`列表的`搜索`框中输入你孩子的名字，就能立刻找到你在孩子学校遇到过的所有人。现在，你可以毫不迟疑地说：“你好，Susan，很高兴再次见到你！”*努力做到不露声色地查看对方的名字吧。*


    ### 向联系人发送图片


    如果你想向联系人发送图片，则需要通过`照片`应用进行操作（参见第 19 章：“处理照片”）。


    ### 从通讯录发送电子邮件


    许多核心应用（例如`通讯录`、`邮件`和`信息`）都是完全集成的，因此一个应用可以轻松触发另一个应用。如果你想给通讯录中的某个联系人发送电子邮件，只需打开该联系人并点击其电子邮箱地址。`邮件`应用将会启动，你就可以撰写并发送邮件给此人了。


    点击`通讯录`图标启动`通讯录`应用。通过搜索或滑动浏览你的联系人列表，直到找到你需要的联系人。


    ![图片](img/p362-01.jpg)


    在联系人信息中，点击你想使用的联系人的电子邮箱地址。


    你会看到`邮件`程序会自动启动，并在邮件的`收件人：`字段中填入联系人的姓名。最后，输入内容并发送邮件。


    ![图片](img/p362-02.jpg)


    ### 在地图上显示联系人的地址


    iPod touch 的一大亮点是与谷歌地图的集成。这在`通讯录`应用中体现得非常明显。假设你想在地图上标出通讯录中某个联系人的家庭或工作地址。在过去（iPod
    touch 问世前），你得用 Google、MapQuest 或其他程序，然后费力地重新输入或复制粘贴地址信息。这非常耗时——但在 iPod touch 上，你完全不用这么做。


    只需像之前那样打开该联系人。这次，点击联系人信息底部的地址即可。


    ![图片](img/p362-03.jpg)


    你的`地图`应用（由谷歌地图提供支持）会立即加载，并在联系人的确切位置放置一个`图钉`图标。联系人的姓名会显示在`图钉`上方。


    ![图片](img/p363-01.jpg)


    ![图片](img/p363-02.jpg)


    点击`图钉`顶部的标签，即可进入`信息`界面。


    ![图片](img/p363-03.jpg)


    现在你可以选择`路线到此处`或`路线从此处出发`。


    接着，输入正确的起点或终点地址，然后点击右下角的`路线`按钮。如果你决定不查看路线，只需点击左上角的`清除`按钮即可。


    如果你不是从联系人列表点击，而是直接在`地图`应用中输入了地址，那该怎么办？在这种情况下，你可能想要点击`添加到通讯录`来保存这个地址。


    **提示：** 要返回联系人信息，请点击`地图`按钮，退出`地图`，然后启动`通讯录`。你也可以使用多任务功能（参见第 7 章：“多任务处理”），方法是双击`主屏幕`按钮，然后选择`通讯录`应用。


    ### 更改联系人的排序与显示顺序


    与其他设置一样，`通讯录`应用的选项可以通过`设置`图标进行访问。


    点击`设置`图标，向下滚动到`邮件、通讯录、日历`，然后点击该标签。


    接下来，向下滚动直到看到`通讯录`及其下方的两个选项。要更改排序顺序，请点击`排序顺序`标签，然后选择是按名字还是按姓氏对联系人进行排序。


    ![图片](img/p364-01.jpg)


    你可能还想更改联系人的显示方式。这里可以完成设置；你可以选择`名, 姓`或`姓, 名`。点击`显示顺序`标签，选择你希望联系人按名字还是姓氏顺序显示。点击左上角的`邮件、通讯录…`按钮以保存你的设置更改。


    ![图片](img/p364-02.jpg)


    #### 搜索全局地址列表联系人


    如果你配置了 Exchange 帐户，应该会有一个全局地址列表的选项。这样，当你连接到所在组织的服务器时，就可以访问你的全局地址列表。


    打开你的`通讯录`应用，在 Exchange 下查找名为`Exchange 全局地址列表`的标签。


    ![图片](img/p364-03.jpg)


    ### 通讯录故障排除


    有时，你的`通讯录`应用可能无法按预期工作。（如果你没有看到所有联系人，请回顾第 3 章：“与 iCloud、iTunes 及更多同步”中的步骤，了解如何与你的通讯录应用程序同步。）请确保在`iTunes`应用的设置中选择了`所有群组`。


    **提示：** 如果你正在与另一个联系人应用（例如 Gmail 中的`通讯录`）同步，请确保选择最接近`所有联系人`的选项，而不是像特定群组这样的子集。'
- fmt: '#### When Global Address List Contacts Don’t Show Up (For Microsoft Exchange
    Users)


    Sometimes contacts in the Global Address List won’t show up on your iPod touch.
    If this occurs, begin by making sure you are connected to a Wi-Fi or 3G cellular
    data network.


    Next, check your Exchange settings and verify you have the correct server and
    login information. To do so, tap the **Settings** button, and then scroll to and
    touch **Mail, Contacts and Calendar**. Find your Exchange account on the list
    and touch it to look at the settings. You may need to contact technical support
    at your organization to make sure your Exchange settings are correct.


    ### The Notes App


    If you are like many people, your desk is filled with little yellow sticky notes—notes
    to do everything imaginable. Even with our computers, we still tend to leave these
    little notes as reminders. One of the great things about the iPod touch is that
    you can write your notes on familiar yellow notepaper, and then keep them neatly
    organized and sorted. You can even email them to yourself or someone else to make
    sure that the information is not forgotten. You can also backup your notes using
    iTunes and, if you choose, sync notes to your computer or other web sites such
    as Google.


    **TIP:** The **Notes** app that comes with the iPod touch is pretty basic and
    utilitarian. If you need a more robust notes application that can sort, categorize,
    import items (PDF, Word, and so on), have folders, search, and more, you should
    check out the App Store on your iPod touch. Do a search for `notes`, and you will
    find at least a dozen notes-related apps ranging from free to $0.99 and up.


    ![Images](images/p365-01.jpg)


    The **Notes** app on the iPod touch gives you a convenient place to keep your
    notes and simple `to-do` lists. You can also keep simple lists, such as a grocery
    list, or a list for other stores, such as a hardware or pet store. If you have
    your iPod touch with you, you can add items to these lists as soon as they occur
    to you, and they can be accessed and edited at any time.


    ![Images](images/p365-02.jpg)


    #### Sync Notes


    You can sync notes between iOS devices like iPod touch and IPad, or with your
    computer or other web site using the methods we show you in [Chapter 3](#Chapter03.html#ch3):
    `Sync with iCloud, iTunes and More.` The nice thing about syncing notes is that
    you can add a note on your computer and have it just `appear` on your iPod touch.
    Then when you are out and about, you can edit that note and have it synced back
    to your computer. No more re-typing or remembering things. You always have your
    iPod touch with you, so taking notes anywhere, anytime, can be a great way never
    to forget anything important.


    #### Getting Started with Notes


    Like all other apps, simply tap the **Notes** icon to start it. After starting
    the **Notes** app, you see what looks like a typical yellow note pad.


    ![Images](images/p366-01.jpg)


    ##### Multiple Notes Accounts


    If you happen to be syncing over iCloud, Exchange, or at least one IMAP email
    account and your computer using iTunes, then you will see that your notes from
    each of these accounts are kept separate. This is very much like how your contacts
    are kept in separate groups by email account and how your calendars are kept separate
    by email account.


    In order to see multiple notes accounts, you have to set a switch in the account
    setup screen.


    When you setup your IMAP email account, in **Settings** ![Images](images/U001.jpg)
    **Mail, Contacts, Calendars**, you will see options to turn Notes syncing on or
    off. In order to see these notes accounts, you have to set the **Notes** switch
    to **On**, as shown for this Gmail account.


    ![Images](images/p366-02.jpg)


    To view the various notes accounts, tap the **Accounts** button in the upper left
    corner of the **Notes** app.


    ![Images](images/p367-01.jpg)


    Then, on the next screen, you can tap selections to view **All Notes**, or your
    notes for each account. In this image, the Gmail or MobileMe account are options.


    Notes you add to an individual account will be kept with that account. For example,
    If you add notes to Gmail, then those would show up only on your Gmail account.


    ![Images](images/p367-02.jpg)


    #### How Are My Notes Sorted?


    You see that all notes are listed in reverse chronological order, with the most
    recently edited notes at the top and the oldest at the bottom.


    The date that is shown is the last time and date that the particular note was
    edited, not when it was first created. So you will notice the order of your notes
    moving around on the screen.


    This sorting can be a good thing because your most recent (or frequently edited)
    notes will be right at the top.


    **TIP:** If you want to keep track of your `to-do` lists, you can use the built
    in reminders app on your iPod touch, If you want something more powerful, check
    out **Things**, **Appigo Todo**, or **OmniFocus** in the App store.


    #### Adding a New Note


    To start a new note, tap the plus sign ![Images](images/p368-01.jpg) in the upper
    right-hand corner.


    The notepad is blank, and the keyboard pops up for you to begin typing.


    **TIP:** You can turn your iPod touch on its side to see the larger, landscape
    keyboard.


    ![Images](images/p368-02.jpg)


    #### Adding a Title to the Note


    The first few words you type before you hit the **Return** key will become the
    title of the note. So think about what you want as the title, and type that first.
    In the image shown, **Grocery list** becomes the title of the note.


    Put a new item on each line, and tap the **Return** key to go to the next line.


    When you are done, touch the **Notes** button in the top left-hand corner to return
    to the main Notes screen.


    ![Images](images/p368-03.jpg)


    #### Viewing or Editing Your Notes


    Your notes appear in the list as tabs to touch. Touch the name of the note you
    wish to view or edit. The contents of the note are then displayed.


    ![Images](images/p369-01.jpg)


    You can scroll in Notes as you do in any program. You will notice that the date
    and time the note was last edited appear in the upper right-hand corner.


    When you are done reading the note, just touch the **Notes** button in the top
    left-hand corner to return to the main Notes screen.


    To advance through multiple notes, just touch the arrows at the bottom of the
    screen. Touch the **Forward** ![Images](images/p369-02.jpg) arrow. The page turns,
    and you can see the next note. To go back, just hit the **Back** ![Images](images/p369-03.jpg)
    arrow.


    #### Deleting Notes


    To delete a note, swipe your finger on the note from left to right on the list
    and tap **Delete**.


    ![Images](images/p369-04.jpg)


    Or, if you are viewing the note, then tap the **Trash Can** icon ![Images](images/p369-05.jpg)
    at the bottom. The iPod touch prompts you to delete the note or cancel.


    #### Emailing or Printing a Note


    One of the **Notes** app’s convenient features is the ability to email or print
    a note. Let’s say you wrote a grocery note and wanted to email it to your spouse,
    or you made a list of gift ideas and want to hand them out. To email or print
    a note, just tap the **Action button** icon ![Images](images/p370-02.jpg) at the
    bottom of the screen.


    ![Images](images/p370-01.jpg)


    #### Data Detectors - Cool Things With Underlined Words


    If you type in the words `tomorrow morning` in a note and save it. The next time
    you open that note, you will see that the words have been underlined. If you tap
    and hold the underlined words, you will see a button asking if you want to **Create
    Event**. Tap the button to create a new calendar event for tomorrow morning.


    ![Images](images/p370-03.jpg)


    **TIP:** Whenever date and time words are underlined, the iPod touch recognizes
    them as potential calendar events. This works in notes, email messages and other
    places on your iPod touch. The iPod touch also has other `data detectors`, for
    example it can recognize phone numbers, web site addresses, and even tracking
    numbers for packages.


    ## Chapter 18'
  raw: '#### When Global Address List Contacts Don’t Show Up (For Microsoft Exchange
    Users)


    Sometimes contacts in the Global Address List won’t show up on your iPod touch.
    If this occurs, begin by making sure you are connected to a Wi-Fi or 3G cellular
    data network.


    Next, check your Exchange settings and verify you have the correct server and
    login information. To do so, tap the **Settings** button, and then scroll to and
    touch **Mail, Contacts and Calendar**. Find your Exchange account on the list
    and touch it to look at the settings. You may need to contact technical support
    at your organization to make sure your Exchange settings are correct.


    ### The Notes App


    If you are like many people, your desk is filled with little yellow sticky notes—notes
    to do everything imaginable. Even with our computers, we still tend to leave these
    little notes as reminders. One of the great things about the iPod touch is that
    you can write your notes on familiar yellow notepaper, and then keep them neatly
    organized and sorted. You can even email them to yourself or someone else to make
    sure that the information is not forgotten. You can also backup your notes using
    iTunes and, if you choose, sync notes to your computer or other web sites such
    as Google.


    **TIP:** The **Notes** app that comes with the iPod touch is pretty basic and
    utilitarian. If you need a more robust notes application that can sort, categorize,
    import items (PDF, Word, and so on), have folders, search, and more, you should
    check out the App Store on your iPod touch. Do a search for “notes,” and you will
    find at least a dozen notes-related apps ranging from free to $0.99 and up.


    ![Images](images/p365-01.jpg)


    The **Notes** app on the iPod touch gives you a convenient place to keep your
    notes and simple “to-do” lists. You can also keep simple lists, such as a grocery
    list, or a list for other stores, such as a hardware or pet store. If you have
    your iPod touch with you, you can add items to these lists as soon as they occur
    to you, and they can be accessed and edited at any time.


    ![Images](images/p365-02.jpg)


    #### Sync Notes


    You can sync notes between iOS devices like iPod touch and IPad, or with your
    computer or other web site using the methods we show you in [Chapter 3](#Chapter03.html#ch3):
    “Sync with iCloud, iTunes and More.” The nice thing about syncing notes is that
    you can add a note on your computer and have it just “appear” on your iPod touch.
    Then when you are out and about, you can edit that note and have it synced back
    to your computer. No more re-typing or remembering things. You always have your
    iPod touch with you, so taking notes anywhere, anytime, can be a great way never
    to forget anything important.


    #### Getting Started with Notes


    Like all other apps, simply tap the **Notes** icon to start it After starting
    the **Notes** app, you see what looks like a typical yellow note pad.


    ![Images](images/p366-01.jpg)


    ##### Multiple Notes Accounts


    If you happen to be syncing over iCloud, Exchange, or at least one IMAP email
    account and your computer using iTunes, then you will see that your notes from
    each of these accounts are kept separate. This is very much like how your contacts
    are kept in separate groups by email account and how your calendars are kept separate
    by email account.


    In order to see multiple notes accounts, you have to set a switch in the account
    setup screen.


    When you setup your IMAP email account, in **Settings** ![Images](images/U001.jpg)
    **Mail, Contacts, Calendars**, you will see options to turn Notes syncing on or
    off. In order to see these notes accounts, you have to set the **Notes** switch
    to **On**, as shown for this Gmail account.


    ![Images](images/p366-02.jpg)


    To view the various notes accounts, tap the **Accounts** button in the upper left
    corner of the **Notes** app.


    ![Images](images/p367-01.jpg)


    Then, on the next screen, you can tap selections to view **All Notes**, or your
    notes for each account. In this image, the Gmail or MobileMe account are options.


    Notes you add to an individual account will be kept with that account. For example,
    If you add notes to Gmail, then those would show up only on your Gmail account.


    ![Images](images/p367-02.jpg)


    #### How Are My Notes Sorted?


    You see that all notes are listed in reverse chronological order, with the most
    recently edited notes at the top and the oldest at the bottom.


    The date that is shown is the last time and date that the particular note was
    edited, not when it was first created. So you will notice the order of your notes
    moving around on the screen.


    This sorting can be a good thing because your most recent (or frequently edited)
    notes will be right at the top.


    **TIP:** If you want to keep track of your to-do lists, you can use the built
    in reminders app on your iPod touch, If you want something more powerful, check
    out **Things, Appigo Todo,** or **OmniFocus** in the App store.


    #### Adding a New Note


    To start a new note, tap the plus sign ![Images](images/p368-01.jpg) in the upper
    right-hand corner.


    The notepad is blank, and the keyboard pops up for you to begin typing.


    **TIP:** You can turn your iPod touch on its side to see the larger, landscape
    keyboard.


    ![Images](images/p368-02.jpg)


    #### Adding a Title to the Note


    The first few words you type before you hit the **Return** key will become the
    title of the note. So think about what you want as the title, and type that first.
    In the image shown, **Grocery list** becomes the title of the note.


    Put a new item on each line, and tap the **Return** key to go to the next line.


    When you are done, touch the **Notes** button in the top left-hand corner to return
    to the main Notes screen.


    ![Images](images/p368-03.jpg)


    #### Viewing or Editing Your Notes


    Your notes appear in the list as tabs to touch. Touch the name of the note you
    wish to view or edit. The contents of the note are then displayed.


    ![Images](images/p369-01.jpg)


    You can scroll in Notes as you do in any program. You will notice that the date
    and time the note was last edited appear in the upper right-hand corner.


    When you are done reading the note, just touch the **Notes** button in the top
    left-hand corner to return to the main Notes screen.


    To advance through multiple notes, just touch the arrows at the bottom of the
    screen. Touch the **Forward** ![Images](images/p369-02.jpg) arrow. The page turns,
    and you can see the next note. To go back, just hit the **Back** ![Images](images/p369-03.jpg)
    arrow.


    #### Deleting Notes


    To delete a note, swipe your finger on the note from left to right on the list
    and tap **Delete**.


    ![Images](images/p369-04.jpg)


    Or, if you are viewing the note, then tap the **Trash Can** icon ![Images](images/p369-05.jpg)
    at the bottom. The iPod touch prompts you to delete the note or cancel.


    #### Emailing or Printing a Note


    One of the **Notes** app’s convenient features is the ability to email or print
    a note. Let’s say you wrote a grocery note and wanted to email it to your spouse,
    or you made a list of gift ideas and want to hand them out. To email or print
    a note, just tap the **Action button** icon ![Images](images/p370-02.jpg) at the
    bottom of the screen.


    ![Images](images/p370-01.jpg)


    #### Data Detectors - Cool Things With Underlined Words


    If you type in the words “tomorrow morning” in a note and save it. The next time
    you open that note, you will see that the words have been underlined. If you tap
    and hold the underlined words, you will see a button asking if you want to Create
    Event. Tap the button to create a new calendar event for tomorrow morning.


    ![Images](images/p370-03.jpg)


    **TIP:** Whenever date and time words are underlined, the iPod touch recognizes
    them as potential calendar events. This works in notes, email messages and other
    places on your iPod touch. The iPod touch also has other “data detectors”, for
    example it can recognize phone numbers, web site addresses, and even tracking
    numbers for packages.


    ## Chapter 18'
  trans: '

    #### 当全局地址列表中的联系人未显示时（适用于 Microsoft Exchange 用户）


    有时，全局地址列表中的联系人可能不会显示在您的 iPod touch 上。如果出现这种情况，请首先确保您已连接到 Wi-Fi 或 3G 蜂窝数据网络。


    接下来，检查您的 Exchange 设置，并确认您拥有正确的服务器和登录信息。为此，请轻点**设置**按钮，然后滚动并轻点**邮件、通讯录和日历**。在列表中找到您的
    Exchange 帐户并轻点它以查看设置。您可能需要联系您所在机构的技术支持，以确保您的 Exchange 设置正确。


    ### 备忘录应用


    如果您和许多人一样，书桌上会堆满黄色的小便条——提醒自己做各种事情的便条。即使有了电脑，我们依然会留下这些小纸条作为备忘。iPod touch 的一大优点在于，您可以在熟悉的黄色便条纸上写下笔记，然后整齐有序地整理它们。您甚至可以通过电子邮件将其发送给自己或他人，以确保信息不被遗忘。您还可以使用
    iTunes 备份您的备忘录，如果愿意，还可以将备忘录同步到您的电脑或其他网站（如 Google）。


    **提示：** iPod touch 自带的**备忘录**应用非常基础且实用。如果您需要一个功能更强大的备忘录应用，能够对项目进行排序、分类、导入（PDF、Word
    等）、支持文件夹、搜索等功能，您应该查看 iPod touch 上的 App Store。搜索 `notes`，您会发现至少十几款与笔记相关的应用，价格从免费到
    0.99 美元及以上不等。


    ![图片](img/p365-01.jpg)


    iPod touch 上的**备忘录**应用为您提供了一个便捷的场所来保存笔记和简单的 `to-do` 列表。您也可以保存简单的列表，例如购物清单，或用于其他商店（如五金店或宠物店）的清单。如果您随身携带
    iPod touch，一旦想到要添加项目，就可以立即加入这些列表，并且可以随时访问和编辑它们。


    ![图片](img/p365-02.jpg)


    #### 同步备忘录


    您可以使用我们在第 3 章中展示的方法，在 iPod touch 和 iPad 等 iOS 设备之间，或与您的电脑或其他网站同步备忘录：`通过 iCloud、iTunes
    等方式同步。` 同步备忘录的好处在于，您可以在电脑上添加一条备忘录，它就会自动`出现`在您的 iPod touch 上。然后当您外出时，您可以编辑该备忘录，并将其同步回您的电脑。无需重新输入或记忆任何内容。您总是随身携带
    iPod touch，因此随时随地记笔记是永不忘记重要事项的好方法。


    #### 开始使用备忘录


    与所有其他应用一样，只需轻点**备忘录**图标即可启动它。启动**备忘录**应用后，您会看到一个典型的黄色记事本。


    ![图片](img/p366-01.jpg)


    ##### 多个备忘录帐户


    如果您恰好通过 iCloud、Exchange 或至少一个 IMAP 电子邮件帐户以及您的电脑（使用 iTunes）进行同步，那么您会看到来自每个帐户的备忘录是分开保存的。这很像您的联系人按电子邮件帐户分组，以及您的日历按电子邮件帐户分开存放的方式。


    为了查看多个备忘录帐户，您需要在帐户设置屏幕中设置一个开关。


    当您设置 IMAP 电子邮件帐户时，在**设置** ![图片](img/U001.jpg) **邮件、通讯录、日历**中，您将看到打开或关闭备忘录同步的选项。为了查看这些备忘录帐户，您需要将**备忘录**开关设置为**打开**，如下方这个
    Gmail 帐户所示。


    ![图片](img/p366-02.jpg)


    要查看不同的备忘录帐户，请轻点**备忘录**应用左上角的**帐户**按钮。


    ![图片](img/p367-01.jpg)


    然后，在下一个屏幕上，您可以轻点选项来查看**所有备忘录**，或者查看每个帐户的备忘录。在此图片中，Gmail 或 MobileMe 帐户是可选项。


    您添加到某个特定帐户的备忘录将保存在该帐户中。例如，如果您将备忘录添加到 Gmail，则这些备忘录将仅显示在您的 Gmail 帐户中。


    ![图片](img/p367-02.jpg)


    #### 我的备忘录是如何排序的？


    您可以看到所有备忘录都按时间倒序排列，最近编辑的备忘录排在最上面，最旧的排在底部。


    显示的是该特定备忘录最后一次编辑的日期和时间，而不是首次创建的日期。因此，您会注意到备忘录的顺序在屏幕上会有所变化。


    这种排序可能是一个优点，因为您最近（或经常编辑）的备忘录会正好排在顶部。


    **提示：** 如果您想跟踪您的 `to-do` 列表，可以使用 iPod touch 上内置的提醒事项应用。如果您需要更强大的功能，请在 App Store
    中查看 **Things**、**Appigo Todo** 或 **OmniFocus**。


    #### 添加新备忘录


    要开始一条新备忘录，请轻点右上角的加号 ![图片](img/p368-01.jpg)。


    记事本为空白，键盘会弹出供您开始输入。


    **提示：** 您可以将 iPod touch 横向放置，以查看更宽的横向键盘。


    ![图片](img/p368-02.jpg)


    #### 为备忘录添加标题


    在您按下**换行**键之前键入的前几个单词将成为备忘录的标题。因此，请思考您想要什么标题，并首先输入。在显示的图片中，**购物清单**成为了备忘录的标题。


    在每一行输入一个新项目，然后轻点**换行**键进入下一行。


    完成所有输入后，轻点左上角的**备忘录**按钮，返回主备忘录屏幕。


    ![图片](img/p368-03.jpg)


    #### 查看或编辑您的备忘录


    您的备忘录在列表中显示为可供轻点的标签。轻点您想要查看或编辑的备忘录名称。随后将显示该备忘录的内容。


    ![图片](img/p369-01.jpg)


    您可以像在任何程序中一样在备忘录中滚动。您会注意到备忘录最后编辑的日期和时间显示在右上角。


    阅读完备忘录后，只需轻点左上角的**备忘录**按钮即可返回主备忘录屏幕。


    要浏览多个备忘录，只需轻点屏幕底部的箭头。轻点**前进** ![图片](img/p369-02.jpg) 箭头。页面会翻动，您可以看到下一条备忘录。要返回，只需轻点**后退**
    ![图片](img/p369-03.jpg) 箭头。


    #### 删除备忘录


    要删除一条备忘录，请在列表中用手指从左向右滑动该备忘录，然后轻点**删除**。


    ![图片](img/p369-04.jpg)


    或者，如果您正在查看该备忘录，则轻点底部的**垃圾桶**图标 ![图片](img/p369-05.jpg)。iPod touch 会提示您删除或取消删除该备忘录。


    #### 通过电子邮件发送或打印备忘录


    **备忘录**应用的便捷功能之一是能够通过电子邮件发送或打印备忘录。假设您写了一张购物便条并想通过电子邮件发送给您的配偶，或者您列出了一份礼物创意清单并想分发出去。要通过电子邮件发送或打印备忘录，只需轻点屏幕底部的**操作按钮**图标
    ![图片](img/p370-02.jpg)。


    ![图片](img/p370-01.jpg)


    #### 数据检测器 - 带下划线单词的酷功能


    如果您在备忘录中键入单词`tomorrow morning`并保存。下次您打开该备忘录时，会看到这些单词已被加下划线。如果您轻点并按住带下划线的单词，您会看到一个按钮询问您是否要**创建事件**。轻点该按钮即可为明天早上创建一个新的日历事件。


    ![图片](img/p370-03.jpg)


    **提示：** 每当日期和时间词汇被加下划线时，iPod touch 会将其识别为潜在的日历事件。这适用于 iPod touch 上的备忘录、电子邮件消息和其他位置。iPod
    touch 还具有其他`数据检测器`，例如它可以识别电话号码、网站地址，甚至包裹的追踪号码。


    ## 第 18 章

