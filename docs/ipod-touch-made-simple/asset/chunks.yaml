    check out free Internet radio with **Pandora**, or buy a book and enjoy it in
    a whole new way using **iBooks**. If you already use a Kindle, you can sync all
    your Kindle books to your iPod touch and enjoy them right away. You can also choose
    from hundreds of thousands of apps from the App Store to make your iPod touch
    even more amazing, fun, and useful. You can also rent a movie from Netflix or
    iTunes, downloading it immediately for later viewing (say on an airplane or train).


    ![image](images/p1-t4.jpg)


    ![image](images/p1-t4a.jpg)


    #### Stay Informed


    You can also use your iPod touch to read your favorite magazine or newspaper with
    up-to-the-minute vibrant pictures and videos (see [Table 5](#Part01.html#tab_p1_5)).
    Or, you can use it to check out the latest weather reports.


    ![image](images/p1-t5.jpg)


    #### Network Socially


    You can also use your iPod touch to connect and stay up-to-date with friends,
    colleagues, and professional networks using the social networking tools on your
    iPod touch (see [Table 6](#Part01.html#tab_p1_6)).


    ![image](images/p1-t6.jpg)


    #### Be Productive


    An iPod touch can also help you be more productive. You can use it to access and
    read just about any PDF file or other document with the **GoodReader** app. You
    can take notes with the basic **Notes** app or step up to the advanced **Evernote**
    app, which has amazing capabilities for integrating audio, pictures, and text
    notes, and as well as syncing everything to a web site. You can also use your
    iPod touch to set an alarm, calculate a tip, see what direction you are walking
    in, and record a voice memo (see [Table 7](#Part01.html#tab_p1_7)).


    ![image](images/p1-t7.jpg)


    ## Part II


    ## Introduction


    Welcome to your iPod touch using iOS 5—and to the book that tells you what you
    need to know to get the most out of it. In this part we show you how the book
    is organized and where to go to find what you need. We even show you how to get
    some great tips and tricks sent right to your iPod touch via short e-mail messages.
    If you are a visual learner, we also point out a resource for learning your iPod
    touch using short, to-the-point video tutorials produced by one of the authors.


    ## Introduction'
  trans: '

    ### 乘坐飞机时——飞行模式


    在飞机上，乘务人员通常会要求你在起飞和降落期间关闭所有便携式电子设备。当飞机爬升到一定高度后，他们会告知可以重新开启“所有经批准的电子设备”。


    **提示：** 请查阅第 4 章：“连接到网络”中的“国际旅行”部分，了解在携带 iPod touch 出国旅行时可以享用的许多省钱妙招。


    如果你需要完全关闭 iPod touch，请按住右上角的`电源`按钮，然后用手指`滑动来关机`。


    请按照以下步骤启用`飞行模式`：


    ![image](img/p10-01.jpg)


    1.  轻点`设置`图标。

    2.  将左列顶部的`飞行模式`开关设置为`打开`。

    3.  注意，Wi-Fi 会自动`关闭`。


    **提示：** 一些航空公司提供机上 Wi-Fi 网络。在这些航班上，你可能需要在适当的时候重新`打开` Wi-Fi。


    你可以按照以下步骤`关闭`或`打开` Wi-Fi 连接：


    1.  轻点`设置`图标。

    2.  轻点屏幕顶部的`Wi-Fi`。

    3.  若要启用 Wi-Fi 连接，请将页面顶部的`Wi-Fi`开关设置为`打开`。

    4.  若要禁用 Wi-Fi，请将同一开关设置为`关闭`。

    5.  选择 Wi-Fi 网络，并按照乘务员提供的步骤连接到机上 Wi-Fi。


    ### 触摸屏基础


    在本节中，我们将介绍如何与 iPod touch 的触摸屏进行交互。


    #### 触摸屏手势


    iPod touch 拥有极其灵敏和直观的触摸屏。苹果公司——以其易于使用的 iPad、iPhone 和 iPod 设备而闻名——推出了一款分辨率更高、响应速度极佳的出色触摸屏。


    如果你习惯于使用物理键盘和轨迹球或触控板，甚至是 iPod 直观的滚轮，那么掌握这款触摸屏需要付出一些努力。不过，稍加练习，你很快就会熟练地操作你的 iPod
    touch。


    你可以通过组合使用以下方式，在 iPod touch 上完成几乎任何操作：


    *   触摸屏“手势”

    *   轻点屏幕上的图标或软按键

    *   点击底部的`主屏幕`按钮


    以下各节将介绍你可以在 iPod touch 上使用的各种手势。


    ### 轻点与轻拂


    要启动应用、确认选择、选取菜单项或选择答案，只需轻点屏幕。要在`列表`模式下快速浏览联系人、列表和音乐资料库，可以左右或上下轻拂以滚动浏览项目。图 6 展示了这两种手势。


    ![images](img/p1-f6.jpg)


    **图 6.** *基本的触摸屏手势*


    ### 轻扫


    要执行轻扫操作，请按照图 7 所示，轻轻触摸并移动手指。你也可以通过此操作在打开的`Safari`网页和图片之间切换。轻扫同样适用于列表，例如`通讯录`列表。


    ![images](img/p1-f7.jpg)


    **图 7.** *触摸并轻扫以在图片和网页之间切换。*


    #### 滚动


    滚动操作很简单，只需触摸屏幕并朝你想滚动的方向滑动手指即可（参见图 8）。你可以在邮件、报刊杂志应用、`Safari`网页浏览器、菜单等许多地方使用此技巧。


    ![images](img/p1-f8.jpg)


    **图 8.** *触摸并滑动手指以在网页、放大的图片等界面上滚动。*


    #### 双击


    你可以双击屏幕来放大视图，然后再次双击来缩小。这在许多地方都适用，例如网页、邮件和图片（参见图 9）。


    ![images](img/p1-f9.jpg)


    **图 9.** *双击以放大或缩小*


    #### 捏合


    你还可以通过张开或合拢双指来实现放大或缩小。这在许多地方都适用，包括网页、邮件和图片（参见图 10）。请按照以下步骤使用*捏合*功能放大：


    1.  要放大，将两根手指并拢放在屏幕上：

    2.  逐渐张开手指。屏幕会放大。


    请按照以下步骤使用捏合功能缩小：


    1.  要缩小，将手指分开一定距离放在屏幕上。

    2.  逐渐合拢手指，直至它们接触。屏幕会缩小。


    ![images](img/p1-f10.jpg)


    **图 10.** *张开手指以放大，合拢手指以缩小。*


    ### 应用参考表格


    本节提供了一些便捷的参考表格，根据功能对你 iPod touch 上预装的各种应用进行了分组。这些表格中还包含了你可以从`App Store`下载的其他实用应用。每个表格都会提供应用的简要说明，并告诉你在本书中何处可以找到关于它的更多信息。


    #### 入门


    表 2 提供了一些快速链接，可帮助你连接 iPod touch 到网络（使用 Wi-Fi）；购买和欣赏歌曲或视频（使用`iTunes`、`音乐`和`视频`应用）；让
    iPod touch 进入睡眠或关机；解锁你的 iPod touch 等等。


    ![image](img/p1-t2.jpg)


    #### 保持联系与井然有序


    表 3 提供了各种链接，涵盖从整理和查找联系人到管理日历、处理电子邮件、发送信息、获取驾车路线等方方面面。


    ![image](img/p1-t3.jpg)


    #### 享受娱乐


    你的 iPod touch 能带来很多乐趣；表 4 向你展示了如何做到。例如，你可以用 iPod touch 购买或租赁电影，通过`Pandora`收听免费的互联网广播，或者购买一本书并用`iBooks`以全新方式享受阅读。如果你已经在使用
    Kindle，你可以将所有 Kindle 图书同步到 iPod touch 上，随时阅读。你还可以从 App Store 中成千上万的各类应用中选择下载，让你的
    iPod touch 更令人惊叹、更有趣、更实用。你也可以从 Netflix 或 iTunes 租赁电影，并立即下载以供日后观看（比如在飞机或火车上）。


    ![image](img/p1-t4.jpg)


    ![image](img/p1-t4a.jpg)


    #### 获取资讯


    你还可以用 iPod touch 阅读你最喜爱的杂志或报纸，并配有最新的生动图片和视频（参见表 5）。或者，用它来查看最新的天气预报。


    ![image](img/p1-t5.jpg)


    #### 社交网络


    你还可以使用 iPod touch 上的社交网络工具，与朋友、同事及专业人脉圈保持联系和最新动态（参见表 6）。


    ![image](img/p1-t6.jpg)


    #### 提高效率


    iPod touch 也能帮助你提高工作效率。你可以使用`GoodReader`应用来访问和阅读几乎任何 PDF 文件或其他文档。你可以使用基础的`备忘录`应用做笔记，也可以升级到功能强大的`Evernote`应用，它拥有集成音频、图片和文字笔记的惊人能力，并能将所有内容同步到网站。你还可以用
    iPod touch 设置闹钟、计算小费、查看行走方向以及录制语音备忘录（参见表 7）。


    ![image](img/p1-t7.jpg)


    ## 第二部分


    ### 引言


    欢迎使用搭载 iOS 5 的 iPod touch——也欢迎阅读这本书，它将告诉你充分发挥其性能所需了解的一切。在这一部分中，我们将向你展示本书的组织方式，以及在哪里可以找到你需要的内容。我们甚至会告诉你如何通过简短的电子邮件，将一些极好的技巧和窍门直接发送到你的
    iPod touch 上。如果你是一个视觉型学习者，我们还会推荐一个资源，让你通过由本书一位作者制作的简短、精炼的视频教程来学习使用你的 iPod touch。

