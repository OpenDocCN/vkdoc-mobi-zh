    \n**Figure 25-1.** *Basic troubleshooting steps*\n\nIf these steps don’t work,\
    \ you will need to reset your iPod touch."
  trans: "\n# 设置 Twitter\n\n1.  在 iOS 5 系统中，Twitter 应用已内置到你的 iPod touch 中。这意味着，你可以从其他应用（如“照片”）内直接分享图片和帖子等内容。请按照以下步骤设置\
    \ Twitter：\n2.  轻点**设置**应用。\n3.  向下滚动并轻点**Twitter**。\n4.  如果 iPod touch 版 Twitter\
    \ 尚未安装在你的 iPod touch 上，请轻点 **Twitter** 图标右侧的**安装**按钮。（如果 iPod touch 版 Twitter\
    \ 已安装，**安装**按钮将呈灰色。）\n5.  轻点**用户名**并输入你的 Twitter `@用户名`。\n6.  轻点**密码**并输入你的 Twitter\
    \ 密码。\n7.  轻点**登录**按钮。\n8.  如果你没有 Twitter 帐户，请轻点屏幕底部的**创建新帐户**按钮，并填写表单以获取一个。\n\
    9.  登录后，轻点**帐户**以更改你的选项。\n10. 如果你希望你的朋友能根据你的电子邮件地址在 Twitter 上找到你，请将**通过电子邮件找到我**切换为**开启**。\n\
    11. 如果你希望每次从应用内发推文时都记录你的位置，请将**推文位置**切换为**开启**。\n\n![images](img/p503-01.jpg)\n\
    ![images](img/p504-01.jpg)\n\n**注意：** 如果你在推文中透露了位置，那么 Twitter 上的任何人都可能知道你在哪里——包括你不在家或不在办公室的事实。如果担心隐私问题，请将**推文位置**切换为**关闭**。\n\
    \n## 使用 Twitter\n\n官方 **Twitter** 应用采用了精简的方式来使用 Twitter。**首页**屏幕会显示你关注的人的推文，并且完整消息显示得既美观又大。\n\
    \n底部有五个图标，第一个是主要的 **Twitter** 动态信息流。其他图标分别是**提及**、**私信**、**搜索**和**更多**按钮，点击**更多**按钮可进入你的**个人资料**、**收藏**、**草稿**、**列表**以及**帐户与设置**。\n\
    \n**发推**图标位于左上角（请参见图 24–1）。\n\n![images](img/2401.jpg)\n\n**图 24–1.** * **Twitter**\
    \ 应用的**首页**页面布局*\n\n## 刷新推文列表\n\n要刷新你的推文列表，只需向下拉动主页面，你将在顶部看到**下拉以刷新**通知。页面下拉后，你将看到**释放以刷新**提示。松开页面即可刷新推文。\n\
    \n![images](img/p505-01.jpg)\n\n## 你的 Twitter 个人资料\n\n要显示你的 Twitter 个人资料，请轻点**更多**按钮，然后轻点**我的个人资料**。\n\
    \n要查看你的推文，只需轻点**推文**。\n\n要查看你标记为收藏的推文，请轻点**收藏**按钮。\n\n要查看你关注的人，请轻点**正在关注**按钮。\n\
    \n**注意：** 你的粉丝数、你关注的人数以及你的推文数会显示在相应按钮标题的上方。\n\n向下滚动页面可查看你的**转推**、**列表**以及你可订阅的**服务**。\n\
    \n![images](img/p506-01.jpg)\n\n## 撰写按钮\n\n轻点**撰写**按钮 ![images](img/p506-02.jpg)，将弹出**新推文**屏幕。当你输入消息时，字符计数器将从\
    \ 140 开始递减。以下是你可以在**新推文**屏幕上执行的操作：\n\n* 轻点 `@` 符号，搜索要在此推文中提及的其他用户名。\n* 轻点 `#`\
    \ 符号，搜索要在此推文中标记的热门话题。\n* 轻点**相机**图标，用你的 iPod touch 拍摄照片或视频，或从你的资料库中选择现有内容添加到推文中。\n\
    * 轻点**箭头**图标，将你当前的位置添加到推文中。\n\n![images](img/p506-03.jpg)\n![images](img/p506-04.jpg)\n\
    \n## 推文中的选项\n\n从你的 **Twitter** 应用的**首页**屏幕，只需轻点一条推文即可获得以下选项：\n\n* 轻点屏幕左下角的**返回箭头**以**回复**推文。\n\
    * 轻点方形的**双箭头**以转推或引用推文。\n* 轻点**星形**图标以收藏推文。\n* 轻点**回形针**图标以查看附件。\n* 轻点**操作**按钮以复制推文链接、通过邮件发送推文或翻译推文。\n\
    \n![images](img/p507-01.jpg)\n\n**注意：** 与 Facebook 和 LinkedIn 不同，你可以在 App Store\
    \ 中找到各种替代的第三方 Twitter 应用。如果你不喜欢官方的 iPod touch 版 **Twitter** 应用，可以尝试一下 **Tweetbot**、**Twitterrific**\
    \ 或许多其他应用。\n\n# 第 25 章\n\n# 故障排除\n\niPod touch 通常非常可靠。但偶尔，就像你的电脑或任何复杂的电子设备一样，你可能需要重置设备或排除某个问题。在本章中，我们将为你提供一些有用的工具，帮助你的\
    \ iPod touch 尽快恢复正常运行。我们将从一些基本的快速故障排除开始，然后在“高级故障排除”部分介绍更深入的问题及解决方法。\n\n我们还将介绍一些与\
    \ iPod touch 相关的其他杂项，并为你提供一个资源列表，你可以在其中找到有关 iPod touch 的帮助。\n\n## 基本故障排除\n\n我们将首先介绍一些基本的提示和技巧，以便在出现问题时让你的\
    \ iPod touch 恢复正常运行。\n\n### 如果 iPod touch 停止响应该怎么办\n\n有时，你的 iPod touch 会对触摸无反应——它只是在某个程序运行中突然卡住。如果发生这种情况，请尝试以下步骤，看看\
    \ iPod touch 是否会开始响应（请参见图 25-1）：\n\n1.  按一次**主屏幕**按钮，看是否能退出应用并返回到**主屏幕**。\n  \
    \  ![Images](img/p509-01.jpg)\n2.  如果某个特定应用导致问题，请尝试双击**主屏幕**按钮以打开**应用切换器**栏。接下来，按住**应用切换器**栏中的*任意*图标，直到它们全部晃动，并且应用图标左上角出现一个带减号的红色**圆形**图标。\n\
    3.  轻点红色的**圆形**图标以关闭该应用。\n4.  如果 iPod touch 仍然没有响应，请尝试按下**睡眠/唤醒**键，直到看到**滑动以关闭电源**。\n\
    5.  按住**主屏幕**按钮直到你返回到**主屏幕**——这应该可以退出该程序。\n6.  确保你的 iPod touch 电量没有耗尽。尝试将其插入电源或连接到你的电脑（如果已连接电源），看看它是否会开始响应。\n\
    7.  如果按住**主屏幕**按钮不起作用，你需要尝试通过按住**电源/睡眠**按钮三到四秒来关闭 iPod touch。\n8.  接下来，滑动屏幕顶部的**滑动以关闭电源**滑块。如果你无法关闭\
    \ iPod touch 的电源，那么你需要重置 iPod touch。请跳至下一节了解操作方法。\n9.  关闭 iPod touch 电源后，等待一分钟左右，然后通过按住同一个**电源**按钮几秒钟来开启\
    \ iPod touch。\n10. 你应该会看到屏幕上出现 **Apple** 标志。等待 iPod touch 启动完毕，你应该就可以访问你的程序和资料了。\n\
    \n![images](img/2501.jpg)\n\n**图 25-1.** *基本故障排除步骤*\n\n如果这些步骤不起作用，你将需要重置你的 iPod\
    \ touch。\n"
- fmt: "#### How to Hard-Reset Your iPod touch\n\nResetting your device is another\
    \ option for dealing with an unresponsive iPod touch. It is perfectly safe to\
    \ do this, and it usually fixes many problems (see [Figure 25-2](#Chapter25.html#fig_25_2)).\n\
    \n![images](images/2502.jpg)\n\n**Figure 25-2.** *Resetting your iPod touch*\n\
    \nFollow these steps to hard-reset your iPod touch:\n\n1.  Using two hands, press\
    \ and hold the `Home` button and the `Power/Sleep` button at the same time.\n\
    2.  Keep both buttons held down for about eight to ten seconds. You will see the\
    \ `Slide to Power Off` slider. Ignore that and keep holding both buttons until\
    \ the screen goes blank.\n3.  After a few more seconds, you should see the `Apple`\
    \ logo appear. When you see the logo, just release the buttons, and your iPod\
    \ touch will be reset.\n\n#### How to Soft-Reset Your iPod touch\n\nThere are\
    \ various things you can reset in the `Settings` app, from the `Home` screen layout\
    \ to the network settings to all the data on your device:\n\n1.  Tap the `Settings`\
    \ icon.\n2.  Tap `General`.\n3.  Swipe up to see the bottom of the page.\n4. \
    \ Tap `Reset`.\n5.  Tap `Reset All Settings` to reset the network, keyboard, `Home`\
    \ screen layout, and location warnings. Tap `Reset` to confirm in the pop-up window.\n\
    \n    ![Images](images/p513-01.jpg)\n\n6.  Tap `Erase All Content and Settings`\
    \ to erase everything from your iPod touch, and then tap `Erase` to confirm in\
    \ the pop-up window.\n7.  Tap `Reset Network Settings` to clear all your Wi-Fi\
    \ network settings.\n8.  Tap `Reset Keyboard Dictionary` to reset the spelling\
    \ dictionary.\n9.  Tap `Reset Home Screen Layout` to return to the factory layout;\
    \ this restores your iPod touch’s `Home` screen to its original layout.\n10. \
    \ Tap `Reset Location Warnings` to reset the warning messages you receive about\
    \ allowing apps to use your current location.\n\n#### No Sound in Music, Video,\
    \ Alerts or Ringer\n\nFew things are more frustrating than missing FaceTime calls,\
    \ hoping to listen to music or watch a video, only to find that no sound comes\
    \ out of the iPod touch. Usually, there is an easy fix for this problem:\n\n1.\
    \  If you are not hearing any alerts, then check to make sure your `Mute` switch\
    \ on the upper left edge of your device is not turned on. You know the `Mute`\
    \ switch is set to on when it's switched toward the back of your device and you\
    \ see a little orange color next to the switch. Make sure the `Mute` switch is\
    \ pushed toward the front of your device, which is the off position.\n2.  Check\
    \ the volume by using the `Volume Up` key in the upper-left edge of your iPod\
    \ touch. You might have accidentally lowered the volume all the way or muted it.\n\
    3.  If you are using wired headphones from the headphone jack, unplug your headphones,\
    \ and then put them back in. Sometimes, the headset jack isn’t connected well.\n\
    4.  Follow these steps if you are using wireless Bluetooth headphones or a Bluetooth\
    \ stereo setup:\n    1.  Check the volume setting (if available on the headphones\
    \ or stereo).\n    2.  Check to make sure the Bluetooth device is connected. Tap\
    \ the `Settings` icon, tap `General`, and then tap `Bluetooth`. Make sure you\
    \ see your device listed and that its status is `Connected`. If it is not connected,\
    \ then tap it and follow the directions to pair it with the iPod touch.\n\n  \
    \      **NOTE**: Sometimes you may actually be connected to a Bluetooth device\
    \ and not know it. If you are connected to a Bluetooth Stereo device, no sound\
    \ will come out of the actual iPod touch.\n\n5.  Make sure the song or video is\
    \ not in Pause mode.\n6.  Open the iPod touch music or video controls. Double-clicking\
    \ the `Home` button should open the `App Switcher` bar. Swipe from left to right\
    \ to see your media controls.\n7.  Swipe one more time to the right to see the\
    \ volume controls. Verify that the song is not paused and that the volume is not\
    \ turned down all the way.\n8.  Finally, check the `Settings` icon to see whether\
    \ you (or someone else) has set the `Volume Limit` on the iPod touch:\n    1.\
    \  Tap the `Settings` icon.\n    2.  Swipe down the page and tap `Music`.\n  \
    \  3.  See whether `Volume Limit` is `On`.\n    4.  Tap `Volume Limit` to check\
    \ the setting level. If the limit is unlocked, simply slide the volume to a higher\
    \ level.\n    5.  If it is locked, you need to unlock it first by tapping the\
    \ `Unlock Volume Limit` button and entering the four-digit code.\n\nIf none of\
    \ these steps helps, check out the “Additional Troubleshooting and Help Resources”\
    \ section later in this chapter. If that doesn’t help, then try to restore your\
    \ iPod touch from a backup file using the steps in the “Restore Your iPod touch\
    \ from a Backup” section in the chapter. Finally, if that does not help, then\
    \ contact the store or business that sold you your iPod touch for assistance.\n\
    \n#### If You Can’t Make Purchases from iTunes or the App Store\n\nYou have this\
    \ cool new device, so you decide to visit the iTunes Store or the App Store. But\
    \ what if you receive an error message, or you are not allowed to make a purchase?\
    \ Try these steps if this happens to you:\n\n1.  Both stores require an active\
    \ Internet connection. Make sure you have either a Wi-Fi connection or a cellular\
    \ data connection. For assistance, check out [Chapter 4](#Chapter04.html#ch4):\
    \ “Connect to the Network.”\n2.  Verify you have an active iTunes account.\n\n\
    ### Advanced Troubleshooting\n\nThus far we’ve covered the basic troubleshooting\
    \ steps on your iPod touch. In the upcoming sections, we will delve into some\
    \ more advanced troubleshooting steps.\n\n#### When Your iPod touch Does Not Show\
    \ Up in iTunes\n\nOccasionally, your iPod touch may not be recognized by the `iTunes`\
    \ app when you connect your iPod touch to your PC or Mac. Consequently, your iPod\
    \ touch will not appear in the left nav bar.\n\nAfter you connect your iPod touch\
    \ to your computer, you should see it listed in the left nav bar under `DEVICES`.\
    \ There are a few steps you can take to try and get the `iTunes` app to recognize\
    \ your iPod touch:\n\n1.  Check the battery charge of the iPod touch by looking\
    \ at the battery level in the top right of the `Home` screen. If you have let\
    \ the battery run too far down, the `iTunes` app won’t see it until the level\
    \ of the battery rises a bit.\n2.  If the battery is charged, try connecting the\
    \ iPod touch to a different USB port on your computer. Sometimes, if you have\
    \ always used one USB port for the iPod touch and switch it to another port, the\
    \ computer won’t see it.\n3.  If this still does not fix the problem, try disconnecting\
    \ the iPod touch and restarting the computer.\n4.  Next, reconnect the iPod touch\
    \ to the USB port.\n5.  If the `iTunes` app still doesn’t see your iPod touch,\
    \ then download the latest update to `iTunes`, or completely uninstall and reinstall\
    \ the `iTunes` app on the computer. If you choose this option, make sure that\
    \ you back up all the information in `iTunes` first.\n6.  You also might want\
    \ to try another sync cable, it could be possible that your USB sync cable is\
    \ defective."
