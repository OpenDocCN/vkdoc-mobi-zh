  trans: '

    #### 使用 AirPlay


    苹果的 AirPlay 镜像功能可让您将视频投射到 Apple TV，从而在电视大屏幕上欣赏。只需轻点右下角的 `AirPlay` 按钮，然后选择 `Apple
    TV` 作为输出目标。稍等片刻，您的 iPod touch 屏幕会变暗，视频会从上次暂停处开始在电视大屏幕上播放。


    ![images](img/p275-02.jpg)


    要将视频画面切换回 iPod touch，请再次轻点 `AirPlay`，然后选择 `iPod touch` 作为目标。


    ![images](img/p275-03.jpg)


    **提示：** 如果您没有或不想使用 Apple TV，还有其他几种观看电影的方式。例如，您可以购买 VGA 或 HDMI 转接器，将 iPod touch
    连接到 VGA 电脑显示器或高清电视。


    VGA 仅支持视频，要求应用支持此功能，且通常不支持数字版权管理（DRM）。HDMI 支持视频和音频，也要求应用支持该功能。不过，它也符合 HDCP 标准，因此可与
    iTunes 视频等包含 DRM 的内容配合使用。


    苹果还提供符合 DRM 标准且兼容大多数电视的色差分量视频线缆。


    更多信息，请参阅《快速入门指南》中的“配件”部分。


    #### 使用章节功能


    从 iTunes 商店购买的大多数完整长度电影（以及部分为 iPod touch 转换的电影）都会提供章节功能。在 iPod touch 上观看此类电影，就像在家中的电视上观看
    DVD 一样。


    只需轻点屏幕调出视频控制项，然后选择 `章节`。


    ![images](img/p276-01.jpg)


    这样会带您返回电影的主页面。


    轻点右上角的 `章节` 按钮，然后滚动浏览，找到并轻点您想观看的章节。


    #### 查看章节


    您可以滚动或快速翻动来定位想观看的场景或章节。


    您还会注意到，每个章节的最右侧，是该章节开始的确切时间（相对于电影开始的时间）。


    ![images](img/p277-01.jpg)


    除了前面提到的章节菜单外，您还可以通过轻点 `快退` 或 `快进` 按钮，快速跳转到电影中的上一个或下一个章节。轻点一次，即可向任一方向跳转一个章节。


    **注意：** 章节功能通常仅适用于从 iTunes 商店购买的电影。转换后加载到 iPod touch 上的电影通常不包含章节。


    ### 观看电视节目


    iPod touch 非常适合观看您喜爱的电视节目。您可以从 iTunes 商店购买电视节目，也可以从某些 iPod touch 应用（例如 `Hulu Plus`
    应用）下载示例节目。


    只需向下滚动到 `电视节目` 类别分隔线，即可查看已下载到 iPod touch 上的节目。浏览可用的节目并轻点 `播放`。视频控制项的操作方式与观看电影时的控制项相同。


    ![images](img/p277-02.jpg)


    **注意：** 在撰写本文时，iTunes 云服务允许美国用户将之前购买的电视节目直接重新下载到他们的 iPod touch 上（更多信息，请参阅第 21
    章：“您设备上的 iTunes”）。


    ### 观看播客


    我们通常认为播客是可以通过 iTunes 下载的纯音频广播。视频播客现在也相当普遍，可以在许多网站上找到，包括许多公共广播网站。它们也可以在 iTunes
    的 `iTunes U` 板块中找到；该板块列出了大学播客及其他相关信息。


    ![images](img/p278-01.jpg)


    这是加里·马佐讲述的一个有趣的 iTunes U 故事：


    > “最近，我和刚被加州理工学院录取的儿子一起在 iPod touch 的 `iTunes` 应用中浏览 `iTunes U` 板块。我们想知道宿舍的情况，你瞧，我们找到了一个展示加州理工学院宿舍参观之旅的视频播客。我们下载了它，这个播客就自动进入了
    `podcast` 目录，方便以后观看。我们不用从东海岸飞过去，就完成了一次完整的宿舍虚拟参观。”


    ### 观看音乐视频


    您的 iPod touch 可以从多个来源获取音乐视频。通常，如果您从 iTunes 购买了“豪华版”专辑，它会附带一到两个音乐视频。您也可以从 iTunes
    商店购买音乐视频，许多唱片公司和唱片艺术家会在他们的网站上免费提供这些视频。


    音乐视频会自动归类到 `Videos` 应用的 `音乐视频` 板块中。


    `音乐视频` 通常位于 `Videos` 列表中的 `电视节目` 正下方。其控制项的操作方式与所有其他视频应用相同。


    ![images](img/p278-02.jpg)


    ### 视频选项


    与音乐播放器一样，您也可以调整视频播放器的几个选项。这些选项可通过 `主屏幕` 上的 `设置` 图标进行访问。


    轻点 `设置` 图标，向下滚动并轻点 `视频` 以查看可用选项。


    在这里，您还可以设置“家庭共享”设置，以便直接从 iPod touch 观看存储在电脑 iTunes 资料库中的视频。


    ![images](img/p279-01.jpg)


    #### 开始播放选项


    有时，您会不得不中断观看某个特定视频。此选项可让您决定下次想观看该视频时的操作。您可以选择从头开始观看，或者从上次中断处继续观看。只需选择您偏好的选项，这将成为您
    iPod touch 此后采取的行动。


    ![images](img/p279-02.jpg)


    #### 隐藏式字幕


    如果您的视频支持隐藏式字幕功能，将 `隐藏式字幕` 开关设为 `ON`，即可在屏幕上显示隐藏式字幕。


    ### 删除视频


    要删除视频（以节省 iPod touch 上的空间），只需向上或向下滚动，并选择要删除的视频。


    **注意：** 如果您正在从 iTunes 同步视频，请确保同时取消勾选您要删除的视频；否则，iTunes 可能会在下次同步时将其重新同步回您的 iPod
    touch！


    只需在要删除的视频上轻触并向左滑动。就像删除电子邮件一样，左上角会出现一个红色的 `删除` 按钮。轻点 `删除` 按钮，系统会提示您确认删除视频。


    最后，轻点 `删除` 按钮，该视频将从您的系统中删除。


    **注意：** 此过程仅会从您的 iPod touch 上删除视频——假设您在购买视频后已与电脑同步，iTunes 中您的视频资料库里仍会保留一份副本。如果您愿意，以后可以将其重新加载到
    iPod touch 上。但是，如果您从 iPod touch 上删除租借的电影，它将被永久删除！


    ### 在 iPod touch 上使用 YouTube


    如今，观看 YouTube 视频无疑是人们在电脑上最常做的事情之一。现在，YouTube 就在您的 iPod touch 上，触手可及。


    您可以在 `主屏幕` 上看到 `YouTube` 图标。只需轻点此图标，即可进入 `YouTube` 应用。


    ![images](img/p280-01.jpg)


    #### 搜索 YouTube 视频


    首次启动 `YouTube` 时，您通常会看到 YouTube 当天的“精选”视频。


    像在其他应用中一样，滚动浏览视频选项即可。


    ![images](img/p280-02.jpg)

