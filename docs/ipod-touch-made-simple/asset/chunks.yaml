    \n    ![Images](images/p509-01.jpg)\n\n2.  If a particular app is causing trouble,\
    \ try double-clicking the **Home** button to open the **App Switcher** bar. Next,\
    \ press and hold *any* icon in the **App Switcher** baruntil they all shakeand\
    \ a red **Circle** icon with a minus sign appears in the upper-left corner of\
    \ the app icon.\n3.  Tap the red **Circle** iconto close the app.\n4.  If the\
    \ iPod touch continues to be unresponsive, try pressing the **Sleep/Power** key\
