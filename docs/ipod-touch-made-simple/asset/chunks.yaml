    然后，你会看到新电台与其他电台列在一起。


    你最多可以在 Pandora 中创建 100 个电台。


    **提示：** 你可以通过点击屏幕顶部的**按日期**或**按字母顺序**按钮来整理你的电台。


    ![images](img/p238-01.jpg)


    ### 调整 Pandora 的设置——你的帐户、升级等


    你可以通过点击屏幕右下角的设置图标来退出你的 Pandora 帐户、调整音频质量，甚至可以升级到 Pandora One（移除广告）。(见图 12-9。)


    ![images](img/1209.jpg)


    **图 12-9.** *Pandora 中的设置选项*


    要退出，请点击**退出**按钮。


    要调整音质，请将**蜂窝网络音频质量**下的开关移至**开**或**关**。当你处于蜂窝网络时，将其关闭可能更好，否则你在播放时可能会听到更多的跳播和暂停。


    当你处于强力 Wi-Fi 连接时，可以将其设置为**开**以获得更好的音质。请参阅我们的“连接到网络”章节以了解更多信息。


    为节省电池电量，你应将**自动锁定**设置为**开**，这是默认设置。如果你希望屏幕保持常亮，则将其切换为**关**。


    要移除所有广告，请点击**升级到 Pandora One** 按钮。将打开一个网页浏览器窗口，你会被带到 Pandora 的网站输入你的信用卡信息。在本书出版时，年度账户费用为
    36.00 美元，但当你阅读本书时，价格可能有所不同。


    ## 第 12 章


    ## iBooks 和电子书


    在本章中，我们将向你展示如何使用你的 iPod touch 获得良好的阅读体验。例如，我们将介绍 iBooks，包括如何购买和下载它们，以及如何找到一些优秀的免费经典书籍。我们还将向你展示其他使用你
    iPod touch 上的第三方 **Kindle** 和 **Kobo**（原 **Shortcovers**）阅读器的电子书阅读选项。


    ![images](img/p241-01.jpg)


    iPod touch 可以使用苹果专有的电子书阅读器 **iBooks**。在本章中，我们将向你展示如何下载 **iBooks** 应用程序，如何在 iBooks
    Store 中选购书籍，以及如何阅读 PDF 文件（Adobe PDF 格式）和 iBooks，并利用所有 **iBooks** 的功能。


    使用 **iBooks**，你可以以前所未有的方式与书籍和 PDF 文件互动。翻页如同真实书籍；你可以调整字体大小、在内置字典中查词，以及搜索文本。


    在 App Store 中，你还可以找到亚马逊的 **Kindle** 阅读器、**Barnes and Noble** 阅读器、**Stanza** 阅读器和
    **Kobo** 阅读器的应用程序。**Kindle** 和 **Kobo** 阅读器都在 iPod touch 上提供了出色的阅读体验。


    ### 下载 iBooks


    在 App Store 中搜索“iBooks”或“Apple”。你会在列出的选项中找到 **iBooks** 应用程序。


    **注意**：在全新的 iPod touch 上，你会收到一条通知询问：“你现在要下载 iBooks 吗？”


    如果你没有立即看到此通知，请点击**App Store** 应用程序，该通知应该会弹出。


    选择 **iBooks** 应用程序并点击**免费**按钮进行下载。


    选择**安装**，**iBooks** 将下载并安装到 iPod touch 上。


    ![images](img/p242-01.jpg)


    ### iBooks Store


    在你开始享受阅读体验之前，你需要为你的 iBooks 资料库装载书籍。幸运的是，iBooks 商店中有许多书籍可以免费获取，包括近乎完整的古腾堡经典和公有领域作品集。


    **注意**：付费 iBooks 内容并非在所有国家/地区都可用。然而，免费内容在任何地方都可获取，包括古腾堡计划的经典公有领域文学作品集。


    只需点击你书架右上角的**商店**按钮，你就会被带到 iBooks Store。


    ![images](img/p242-02.jpg)


    iBooks Store 的布局与 App Store 非常相似。左上角有一个**类别**按钮，与**资料库**按钮相对。点击它可以查看所有可供你选择书籍的类别。


    精选图书在商店首页上突出显示，并展示**新书**和**值得关注的**图书供浏览。


    商店底部有五个虚拟按键：**精选**、**排行榜**、**浏览**、**搜索**和**已购项目**。


    点击**排行榜**按钮 ![images](img/p243-02.jpg) 可查看所有热门排行榜和《纽约时报》畅销书。点击**已购项目**按钮可查看你已购买或下载到资料库中的所有书籍。


    ![images](img/p243-01.jpg)


    ![images](img/p243-03.jpg)


    购买书籍与购买应用程序非常相似。点击你感兴趣的书名，浏览简介和客户评论。当你准备好购买时，点击**价格**按钮。


    ![images](img/p244-01.jpg)


    **注意**：许多书籍都提供示例下载。如果你不确定是否要购买这本书，查看示例是个好主意。如果你下载了示例，你随时可以从该示例内购买完整书籍。


    一旦你决定下载示例或购买一本书籍，**iBooks** 就会切换到**书架**视图，你可以看到书籍被放置到你的书架上。你的书籍现在即可阅读。


    ![images](img/p244-02.jpg)


    #### 使用搜索按钮


    与 iTunes 和 App Store 一样，iBooks Store 为你提供了一个**搜索**窗口，你可以在其中输入几乎任何短语。你可以按作者、书名或系列进行搜索。只需点击屏幕底部的**搜索**，屏幕键盘就会弹出。输入作者、书名、系列或图书类型，然后按下**搜索**按钮。


    你会看到与搜索匹配的建议弹出；只需点击相应的建议即可跳转到该书籍。


    ![images](img/p245-01.jpg)


    **提示**：搜索“Project Gutenberg”可以看到数千种免费的公有领域书籍。


    ### 切换集锦（书籍、PDF 等）


    你的 iBooks 应用程序有多个书籍或 PDF 文件（Adobe PDF 格式阅读器）的集锦。


    你可以通过点击资料库顶部中央的“集锦”按钮，轻松在这两者之间切换集锦，并添加新的集锦。


    此按钮会显示当前可见的集锦。在这张图片中，**书籍**是当前集锦。点击“书籍”按钮即可查看可用的集锦。


    ![images](img/p245-02.jpg)


    在此屏幕上，你可以点击任何集锦进行查看。


    请注意，你也可以使用底部的按钮创建**新**集锦和**编辑**你已创建的集锦。


    ![images](img/p246-01.jpg)


    ![images](img/p246-02.jpg)


    ### 阅读 PDF


    如上所示，切换集锦以查看你的 PDF 集锦。


    点击任何书籍即可打开并开始阅读。所有相同的导航功能都如“阅读 iBooks”一节所述。


    一个区别是，你会在页面底部看到 PDF 文件页面的缩略图。点击任意缩略图即可跳转到该页。在缩略图上前后拖动手指即可跳转到特定页面。


