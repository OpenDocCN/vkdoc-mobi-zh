- fmt: '### Using the Bottom Icons


    Along the bottom of the `YouTube` app are five icons: `Featured`, `Most Viewed`,
    `Search`, `Favorites`, and `More`. Each option is fairly self-explanatory.


    ![images](images/p281-01.jpg)


    To see the videos that YouTube is featuring that day, touch the `Featured` icon.
    To see those videos that are most-viewed online, touch the `Most Viewed` icon.


    After you watch a particular video, you will have the option to set it as a favorite
    on `YouTube` for easy retrieval later. If you have set bookmarks, they will appear
    when you tap the `Favorites` icon.


    ![images](images/p281-02.jpg)


    You can also search the huge library of YouTube videos. Tap the `Search` box (as
    in other apps discussed previously), and the keyboard will pop up. Type in a phrase,
    topic, or even the name of a video.


    In this example, I am looking for the newest Made Simple Learning video tutorial—so
    I just type in “Made Simple Learning” to see a list of such videos.


    When I find a video I want to watch, I can touch it to see more information. I
    can even rate the video by touching it during playback and selecting a rating.


    ![images](images/p281-03.jpg)


    ### Playing Videos


    Once you have made your choice, tap the video you want to watch. Your iPod touch
    will begin playing the YouTube video in Portrait or Landscape mode. To force Portrait
    mode, just turn the iPod touch so that the screen orientation is vertical.


    ### Video Controls


    Once the video begins to play, the on-screen controls disappear, so you see only
    the video. To stop, pause, or activate any other options while the video is playing,
    just tap the screen.


    The on-screen options are very similar to what you see when watching any other
    video.


    To fast-forward through the video (in Landscape mode), touch and hold the `Fast-Forward`
    arrow. To quickly move in reverse, touch and hold the `Reverse` arrow. To advance
    to the next video in the YouTube list, tap the `Fast-Forward`/`Next` arrow. To
    watch the previous video in the list, tap the `Reverse`/`Back` arrow.


    ![images](images/p282-01.jpg)


    To set a video as a favorite, tap the leftmost icon: `Favorites`. ![images](images/p282-02.jpg)


    To beam the video to your Apple TV, tap the `AirPlay` button. ![images](images/p282-03.jpg)


    ![images](images/p282-04.jpg)


    To Add to Favorites, Email or Tweet the video, tap the `Share` icon and you can
    do any of these options.


    ![images](images/p282-05.jpg)


    ### Checking and Clearing your History


    ![images](images/p283-01.jpg)


    Touch `More` and then `History`, and your recently viewed videos will appear.


    If you want to clear your history, just touch the `Clear` button in the upper-right
    corner and confirm with the button at the bottom.


    To watch a video from your history, just touch it and it will start to play.


    ![images](images/p283-02.jpg)


    ## Chapter 15


    ## Safari Web Browser


    Now, we''ll take you through one of the most fun things to do on your iPod touch:
    surfing the Web. You may have heard that web surfing on the iPod touch is a more
    intimate experience than ever before—and we agree! We''ll show you how to touch,
    zoom around, and interact with the Web like never before with `Safari` on your
    iPod touch. You''ll learn how to set and use bookmarks, quickly find things with
    the search engine, open and switch between multiple browser windows, and even
    easily copy text and graphics from web pages.


    ### Web Browsing on the iPod touch


    You can browse the Web to your heart''s content via Wi-Fi. Like its larger cousin,
    the iPad, your iPod touch has what many feel is the most capable mobile browsing
    experience available today. Web pages look very much like web pages on your computer.
    With the iPod touch''s ability to zoom in, you don''t even have to worry about
    the smaller screen size inhibiting your web browsing experience. In short, web
    browsing is a much more satisfying experience on the iPod touch.


    You can choose to browse in Portrait or Landscape mode, depending on your preference.
    Quickly zoom in on a video by double-tapping it or pinching open on it—the same
    motions you use to zoom in on text and graphics.


    **Why Do Some Videos and Sites Not Appear?(Flash Player Required)**


    ![images](images/p286-01.jpg)


    Some web sites are designed with `Adobe Flash Player`; but at the time of writing,
    Apple has made the decision not to support this app. If you tap a video and the
    video does not play—or you see something like “Flash Plugin Required,” “Download
    the Latest Flash Plugin to view this video,” or “Adobe Flash Required to view
    this site”—then you will not be able to view the video or web page. Fortunately,
    an increasing number of sites are starting to use HTML5 video instead of `Flash`,
    including YouTube, Vimeo, TED, the *New York Times*, and *Time* magazine, all
    of which will play on your iPod touch.


    One way around this limitation: Some alternative browsers on the App Store (e.g.,
    `Skyfire`) render `Flash` videos on their own servers and send HTML5 video to
    the iPod touch instead.


    #### An Internet Connection Is Required


    You do need a live Internet connection on your iPod touch to browse the Web (check
    out [Chapter 4](#Chapter04.html#ch4): “Connect to the Network” to learn more).


    #### Launching the Web Browser


    You should find the `Safari` (web browser) app on your `Home` screen. Usually,
    the `Safari` icon is in the Bottom Dock.


    ![images](images/p286-02.jpg)


    Touch the `Safari` icon and you may be taken to the browser''s `Home` page. This
    could be Apple''s iPod touch page.


    Just turn your iPod touch on its side to see the same page in the wider Landscape
    mode. As you find web sites you like, you can set bookmarks to easily jump to
    these sites. We will show you how to do this later in this chapter.


    ![images](images/p287-01.jpg)


    #### Layout of the Safari Web Browser Screen


    As you look at your screen, notice that the `Address bar` is in the upper left
    of the screen. This bar displays the current web address.


    If you are viewing a web page with suitable text content, you will notice the
    `Reader` button appear in the address bar. Tap Reader to see the web content in
    an easy-to-read format. Check out more on this in the “Safari Reader” section
    in this chapter.


    The Search window is to the right of the Address bar. By default, this is set
    to Google search, but you can change it to another search engine if you want.


    At the bottom of the screen are five icons: `Back`, `Forward`, `Action`, `Bookmarks`,
    and `Pages` view.


    ![images](images/p287-02.jpg)


    #### Typing a Web Address


    The first thing you''ll want to learn is how to get to your favorite web pages.
    Just like on your computer, you type in the web address (URL) into the browser.
    Follow these steps to enter a web address in `Safari`:


    1.  To start, tap the `Address` bar at the top of the browser. You see the keyboard
    appear and the window for the `Address` bar expand.

    2.  If there is already an address in the window and you want to erase it, press
    the ![images](images/p288-01.jpg) at the right end of the bar.

    3.  Start typing your web address (you don''t need the “`www`”).

    4.  When you start typing, you may see suggestions appear below the `Address`
    bar; just tap any of those suggestions to go to that page. The suggestions are
    very complete because they are pulled from your browsing history, bookmarks, the
    web address (URL), and web page titles.

    5.  Remember the `.com` key at the bottom of the page. If you press and hold it,
    you will see `.edu`, `.org`, and other common domain types.

    6.  When you are finished typing, tap the `Go` key to go to that page.


    **TIP:** Don''t type the “`www`” because it''s not necessary. Remember to use
    the `colon`, `forward slash`, `underscore`, `dot`, and `.com` keys at the bottom
    to save time.


    **TIP:** Press and hold the `.com` key to see all the options: `.org`, `.edu`,
    `.net`, `.de`, and so on.'
