  \ touch。如果不小心点了，你将不得不从 iTunes 备份中恢复数据。\n\n### 使用文件夹\n\n你的 iPod touch 允许你将应用整理到文件夹中。当你下载新应用时，它们会占据`主屏幕`页面上的一个位置。一旦你下载了大量应用，就可能难以找到应用并保持它们的井井有条。\n\
