- "# 第 7 章\n\n## 多任务处理\n\n在本章中，我们将介绍如何在 iPod touch 上执行多任务处理以及在应用之间快速切换。多任务处理意味着你可以让一个应用在后台继续运行，同时做其他事情，例如播放网络电台、听取逐向导航或接听\
  \ Skype 电话。\n\n### 快速应用切换\n\n*快速应用切换器*让你能让许多应用在后台保持运行。它还能让你在不停止当前使用应用的情况下切换到另一个应用。\n\
  \n你可能想知道何时使用快速应用切换器比较合理。以下是几个你可能想在 iPod touch 上使用多任务处理的场景：\n\n- 从一个应用（**邮件**）复制粘贴到另一个应用（**日历**）。\n\
  - 在玩游戏时回复 iMessage，然后无缝跳回游戏。\n- 在查看电子邮件或浏览网页时继续收听网络电台（例如 **Pandora** 或 **Slacker**）。\n\
  - 无需等待照片上传到 Facebook 或 Flickr；照片可以在后台上传，而你可以在 iPod touch 上做其他事情。\n- 使用 **Skype**\
  \ 打电话——现在可以让它留在后台运行以接听来电（以往无法实现）。\n\n#### 在应用间跳转\n\n要执行多任务操作，你需要调出屏幕底部的快速应用切换器栏。\n\
  \n1. 在任何应用或主屏幕中，双击**主屏幕**按钮，即可在屏幕底部调出**快速应用切换器**栏\n\n   ![images](img/p160-01.jpg)\n\
  \n2. 所有已打开的应用都会显示在快速应用切换器栏中。\n\n   ![images](img/p160-02.jpg)\n\n3. 向左或向右滑动以找到你需要的应用，然后轻点它。\n\
  4. 如果在快速应用切换器栏上没有看到你想要的应用，则按下**主屏幕**按钮，从主屏幕启动它。\n5. 再次双击**主屏幕**按钮，然后轻点刚才离开的应用，即可跳回该应用。\n\
  \n#### 在快速应用切换器栏中关闭应用\n\n你的 iPod touch 会自动管理内存，让正在执行有用操作（如播放音乐）的应用保持打开，而将没有进行任何操作的应用置于“休眠”状态，从而避免浪费内存或处理器周期。然而，有时某个*流氓进程*可能导致应用无法正常关闭；另一些时候，你可能想强制某个\
  \ GPS 或 VoIP 应用提前关闭以节省电量。在这些情况下，你可以使用快速应用切换器手动关闭应用。\n\n**邮件**和**信息**等内置应用会立即重启，这样你就不会错过任何重要消息。App\
  \ Store 中的应用和游戏则会保持关闭状态，直到你下次轻点它们的图标启动它们。按照以下步骤从**快速应用切换器**栏中关闭应用：\n\n1. 双击**主屏幕**按钮以调出**快速应用切换器**栏。\n\
  \n   ![images](img/p161-01.jpg)\n\n2. 长按**快速应用切换器**栏中的任意图标，直到所有图标开始晃动。你会注意到每个应用图标的左上角会出现一个带有减号的红色**圆形**图标。\n\
  3. 轻点一个红色**圆形**图标 ![images](img/p161-02.jpg)，即可彻底关闭该应用。\n4. 继续轻点红色**圆形**图标，以关闭你想要的任意数量的应用。\n\
  \n#### 媒体控制与屏幕竖排方向锁定\n\n在**快速应用切换器**栏上从左向右轻扫，即可调出媒体控制和**竖排方向锁定**图标。按照以下步骤访问这些控制并使用竖排方向锁定功能：\n\
  \n1. 在任何应用或**主屏幕**中，双击**主屏幕**按钮，调出屏幕底部的**快速应用切换器**栏。\n\n   ![images](img/p161-04.jpg)\n\
  \n2. 从左向右轻扫，即可看到媒体控制和**竖排方向锁定**图标。\n3. 轻点**竖排方向锁定**图标，将屏幕锁定为竖排（即垂直）方向。即使你将其侧放，iPod\
  \ touch 也会保持此方向。当按钮内出现**锁定**图标，并且顶部状态栏中也有一个**锁定**图标时，即表明 iPod touch 已锁定。\n\n   ![images](img/p161-03.jpg)\n\
  \n4. 当前播放的媒体名称显示在屏幕底部。\n5. 你还可以使用中间的**上一曲**、**播放/暂停**和**下一曲**按钮。如果按住**上一曲**或**下一曲**按钮，它们会分别变为**快退**或**快进**按钮。\n\
  6. 或者，你也可以轻点**应用**图标，跳转到最近一次在 iPod touch 上播放音乐的应用。\n\n#### 音量控制与 AirPlay\n\n如果在**快速应用切换器**栏上尽可能向左滑动，你会找到音量控制和\
  \ **AirPlay** 按钮。按照以下步骤操作这些控制：\n\n1. 在任何应用或**主屏幕**中，双击**主屏幕**按钮，调出屏幕底部的**快速应用切换器**。\n\
  \n   ![images](img/p162-01.jpg)\n\n2. 从左向右轻扫，越过媒体控制，直到看到音量控制和 **AirPlay** 按钮。\n\
  3. 轻点 **AirPlay** 按钮，将 iPod touch 的音频输出到兼容 **AirPlay** 的扬声器，或将视频输出到 Apple TV，或镜像你的应用到\
  \ Apple TV 上。\n4. 向左滑动**音量**控制可降低音量；向右滑动可增大音量。\n\n"
- "# 第 8 章\n\n## 个性化与安全性\n\n在本章中，你将学习几种简单的方法来个性化你的 iPod touch。你还将学习如何使用密码保护你的 iPod\
  \ touch。我们将向你展示从哪里可以下载免费壁纸，以改变**锁定屏幕**和**主屏幕**的外观。我们还将向你展示如何通过调整各种活动何时发出声音以及发出什么样的声音，来个性化\
  \ iPod touch 的提示音。iPod touch 的许多方面都可以根据你的需求和品味进行精细调整，从而让你的 iPod touch 更具个性化外观和感觉。\n\
  \n### 更改锁定屏幕和主屏幕壁纸\n\n实际上，你可以通过更改壁纸来个性化 iPod touch 上的两个屏幕。\n\n**锁定屏幕**在你第一次开启 iPod\
  \ touch 或唤醒它时出现。该屏幕的壁纸图像显示在“滑动来解锁”滑块后面。\n\n**主屏幕**上显示所有图标。你可以在图标后面看到壁纸。你可以使用 iPod\
  \ touch 自带的壁纸图片，也可以使用你自己的图片。\n\n**提示：** 你可能希望**锁定屏幕**的壁纸比**主屏幕**的壁纸更不具个人色彩。例如，你可能选择在**锁定屏幕**上使用一张通用风景图，而在**主屏幕**上放一张心爱之人的照片。此外，你还可能希望选择一张不那么花哨的**主屏幕**壁纸，以免与图标产生视觉冲突。\n\
  \n\n\n#### 从“设置”应用中更换壁纸\n\niPod touch 上有几种更换壁纸的方法。第一种方法非常直接：只需在`设置`应用中调整壁纸即可：\n\n\
  1.  轻点`设置`图标。\n2.  轻点`墙纸`。\n\n    ![images](img/p164-01.jpg)\n\n3.  轻点当前所选壁纸的图像。左侧显示的是`锁定`屏幕，右侧显示的是`主屏幕`。\n\
  \n    ![images](img/p164-02.jpg)\n\n4.  选择一个相簿：\n\n    ![images](img/p164-03.jpg)\n\
  \n    *   轻点`墙纸`以选择预装的壁纸。\n    *   轻点`相机胶卷`（如果在 iCloud 中启用了`照片流`，则轻点它）以从你用 iPod\
  \ touch 拍摄的照片、从网页保存的图像、屏幕截图（同时按住`主屏幕`按钮和`电源/睡眠`键可截取）或壁纸应用中进行选择。\n    *   轻点任何其他相簿以查看已同步的照片。\n\
  \n5.  轻点一个相簿后，你将看到该相簿中的所有图像。向上或向下滑动可查看所有图像。最近添加的图像将位于列表的最底部。\n6.  轻点任意图像以选中它并全屏查看。\n\
  7.  现在你可以移动和缩放图像：\n\n    ![images](img/p165-01.jpg)\n\n    *   通过触摸并拖动手指来移动图像。\n\
  \    *   通过张开或捏合手指来放大或缩小。\n    *   如果不喜欢该图像，请轻点`取消`按钮以返回相簿。\n\n8.  轻点`设定`按钮以将该图像设置为壁纸。\n\
  9.  选择你希望此壁纸用于何处：\n\n    ![images](img/p165-02.jpg)\n\n    *   轻点`设定锁定屏幕`按钮以仅将图像设置为`锁定`屏幕。\n\
  \    *   轻点`设定主屏幕`按钮以仅将图像设置为`主屏幕`。\n    *   轻点`同时设定`按钮以将图像同时设置为`锁定`屏幕和`主屏幕`。\n\n\
  10. 轻点`主屏幕`按钮以退出`设置`应用，然后查看你的新壁纸，如图 8–1 所示。\n\n![images](img/0801.jpg)\n\n**图 8–1.**\
  \ *查看你的锁定屏幕和主屏幕壁纸*\n\n#### 使用任意照片作为壁纸\n\n第二种更换壁纸的方法是查看`照片`集中的任意图片并将其选为壁纸。请按照以下步骤操作：\n\
  \n1.  轻点`照片`图标以开始。要了解有关处理照片的更多信息，请查看第 19 章：“处理照片”。\n2.  轻触你想浏览以寻找壁纸的照片相簿。\n3.  找到想使用的照片后，轻触它，它将在屏幕上打开。\n\
  4.  你轻点的缩略图将填满屏幕。如果这是你想使用的图像，请轻点屏幕左下角的`设定为`图标 ![images](img/p166-01.jpg)。\n5.  轻点`用作墙纸`\n\
  \n    ![images](img/p167-01.jpg)\n\n6.  要移动、缩放图像并将其设置为`主屏幕`或`锁定`屏幕壁纸，请遵循上一节中的步骤\
  \ 7-9。如果你决定改用其他图片，请选择`取消`并选取另一张。\n\n### 从免费应用下载精美壁纸\n\n前往 App Store 并搜索“背景”或“壁纸”（有关详细信息，请查看第\
  \ 22 章：“神奇的 App Store”）。你会找到许多专为 iPod touch 设计的免费或低价应用。在本节中，我们将重点介绍此类应用中的一款，即 Apalon\
  \ 出品的 `Pimp Your Screen`。该应用拥有数百张精美的背景图像可供你下载到 iPod touch，并且在撰写本文时其售价仅为 0.99 美元。\n\
  \n**注意：** 与大多数壁纸应用一样，使用 `Pimp Your Screen` 时需要有效的互联网连接。\n\n#### 使用壁纸应用\n\n安装 `Pimp\
  \ Your Screen` 后，你就可以开始使用了：\n\n![images](img/p167-02.jpg)\n\n1.  轻点 `Pimp Your Screen`\
  \ 图标以启动该应用。\n2.  该应用的主屏幕上有多个类别可供选择：`应用架`（用于放置应用的架子——类似 iBooks 或报亭）、`霓虹组合`（霓虹背景）、`主屏幕`（漂亮的主屏幕）、`图标皮肤`（创建背景以突出显示图标）。然后你可以使用底部的两个选项——`锁定屏幕制作器`和`主屏幕制作器`来创建个性化的锁定屏幕和主屏幕，如图\
  \ 8–2 所示。\n\n    ![images](img/0802.jpg)\n\n    **图 8–2.** *使用 Pimp Your Screen\
  \ 应用。*\n\n3.  轻触任何类别后，你可以向左或向右滑动以查看更多壁纸图像选项。要将壁纸保存到`相机胶卷`相簿，请轻点图像底部中间的`保存`按钮。\n\
  4.  如果你不喜欢该图像，请轻点左下角的`主屏幕`按钮以返回主屏幕菜单。\n\n#### 使用新保存的壁纸\n\n选择好壁纸图像并将其保存到 iPod touch\
  \ 后，你需要按照本章前面“从‘设置’应用中更换壁纸”一节中描述的步骤来选中它。\n\n请记住，下载的壁纸将位于`相机胶卷`相簿中。轻点`相机胶卷`将其打开后，你需要一直向下滚动到底部才能看到最近的条目。\n\
  \n### 调整 iPod touch 上的声音\n\n你可以精确调整 iPod touch，使其在特定事件发生时发出或不发出声音，例如收到信息、新邮件、日历提醒，甚至是\
  \ FaceTime 通话的铃声！你还可以自定义发送邮件或在键盘上打字时发生的情况。\n\n请按照以下步骤调整 iPod touch 上播放的声音：\n\n1.\
  \  轻点`设置`图标。\n\n    ![images](img/p169-01.jpg)\n\n2.  轻点`声音`。\n3.  要调整铃声和其他提醒的音量，请移动`铃声和提醒`正下方的滑块。\n\
  4.  要更改 iPod touch 的铃声或文本音调；收到新邮件、推文、日历提醒或提醒事项时播放的声音；或发送邮件完成时播放的声音——轻点你想要更改的项目。\n\
  5.  此屏幕允许你选择新铃声。轻点任意铃声即可播放并选中它。（你可以通过铃声名称旁边的勾号来判断它是否被选中。右侧图片中已选中`钟楼`。）\n\n    ![images](img/p170-01.jpg)\n\
  \n6.  如果可用的铃声都不合你意，你可以轻点`购买更多铃声`，然后会被带到 iTunes 铃声商店，你可以在那里购买一些你喜欢的歌曲作为铃声。\n7.  完成后，轻点左上角的`声音`按钮。\n\
  8.  使用相同的步骤更改你在文本音调、新邮件、推文等方面的声音。\n9.  在除`铃声`之外的所有声音类别中，你可以通过选择列表顶部的`无`来关闭播放的声音。\n\
  \n    ![images](img/p170-02.jpg)\n\n10. `锁定声`和`键盘点按声`可以通过轻点开关将其设置为`开`或`关`来调整。完成后，按下`主屏幕`按钮退出。\n\
  \n    ![images](img/p170-03.jpg)\n\n**提示：** 与此相关，你可以锁定`音乐`应用的最大播放音量。操作方法：前往`设置`\
  \ > `音乐` > `音量限制` > `锁定音量限制`。我们将在第 11 章：“播放音乐”中向你展示如何操作。\n\n#### 键盘选项\n\n你可以通过选择多种语言以及更改`自动纠正`和`自动大写`等设置来精确调整键盘。你甚至可以让\
  \ iPod touch 在你打字时读出自动纠正建议。请查看第 2 章：“打字、拷贝与搜索”以了解各种键盘选项及其使用方法。\n\n\n\n### 使用密码保护你的\
  \ iPod touch\n\n你的 iPod touch 可能存储着大量有价值的信息。如果你用它来保存家庭成员的社会安全号码和出生日期等信息，尤其如此。确保任何拿起你\
  \ iPod touch 的人都无法获取所有这些信息是一个好主意。此外，如果你的孩子像我们的一样，他们很可能会拿起你酷炫的 iPod touch，然后开始上网或玩游戏。你可能希望启用一些安全限制来保护他们的安全。\n\
  \n#### 设置简单的四位数字密码\n\n在 iPod touch 上，你可以选择设置一个四位数字密码，以防止未经授权访问你的 iPod touch 和信息。然而，如果输入错误的密码，即使是你自己也无法访问信息，因此最好使用一个你容易记住的密码。\n\
  \n按照以下步骤设置密码以锁定你的 iPod touch：\n\n1.  轻点 `设置` 图标。  \n    ![images](img/p171-01.jpg)\n\
  2.  轻点 `通用`。\n3.  向下滚动并轻点 `密码锁定`。\n4.  轻点 `开启密码` 来设置密码。\n5.  默认密码是简单的四位数字密码。使用键盘输入四位数字密码。然后系统会提示你再次输入密码。\
  \  \n    ![images](img/p172-01.jpg)\n\n#### 设置更复杂的密码\n\n如果你更倾向于使用比四位数字更复杂的密码，你可以通过在\
  \ `密码锁定` 屏幕上将 `简单密码` 选项设为 `关闭` 来实现。\n\n随后你将能输入包含字母、数字甚至符号的新密码。\n\n![images](img/p172-02.jpg)\n\
  \n**警告：** 请谨慎操作！如果你忘记了密码，你将无法解锁你的 iPod touch。\n\n#### 调整密码选项\n\n设置好密码后，你将看到以下几个选项：\n\
  \n![images](img/p173-01.jpg)\n\n-   `关闭密码`\n-   `更改密码`\n-   `需要密码`（`立即`、`1 分钟后`、`5\
  \ 分钟后`、`15 分钟后`、`1 小时后`）\n-   `简单密码`（`开启`= 四位数字；`关闭`= 任意字母、数字或符号）\n-   `抹掉数据`（`开启`=\
  \ 连续十次输入错误密码后抹掉所有数据；`关闭`= 不抹掉数据）\n\n**警告：** 如果你有喜欢在设备从 `睡眠` 模式唤醒时使劲敲击安全键盘来解锁的小孩子，你可能希望将\
  \ `抹掉数据` 设为 `关闭`。否则，你的 iPod touch 可能会被频繁抹掉数据。\n\n**注意：** 为 `需要密码` 设置更短的时间更安全。将时间设为\
  \ `立即`（默认设置）最为安全。然而，使用 `1 分钟` 的设置可能会让你在意外锁定 iPod touch 时免去重新输入密码的麻烦。\n\n### 设置限制\n\
  \n你可能会决定不想让孩子听到 iPod touch 音乐中的露骨歌词。你可能还想阻止他们访问 YouTube 或任何其他网站。在 iPod touch 上设置此类限制非常简单。\n\
  \n#### 限制应用\n\n按照以下步骤限制对 iPod touch 上内容的访问：\n\n![images](img/p174-01.jpg)\n\n1.\
  \  在 `设置` 应用中轻点 `通用`。\n2.  向下滚动页面并轻点 `访问限制`。\n3.  轻点 `启用访问限制` 按钮。\n4.  系统会提示你输入访问限制密码——只需选择一个你能记住的四位数字密码即可。\
  \  \n    ![images](img/p174-02.jpg)\n\n**注意：** 此访问限制密码与你 iPod touch 的主密码是分开的。你当然可以将它们设为相同，这样更容易记住。然而，如果你让家人知道了主密码，却不想让他们调整限制设置，这可能会带来问题。之后你需要输入此访问限制密码才能关闭限制。\n\
  \n请注意，你可以调整是否允许某些应用或功能运行。例如，右侧的屏幕截图允许你调整以下应用的访问限制：`Safari`、`YouTube`、`相机`、`FaceTime`、`iTunes`\
  \ 和 `Ping`。此屏幕还允许你限制对 `安装应用` 或 `删除应用` 的访问。最后，你可以限制更改 `定位` 和 `账户` 的能力。\n\n![images](img/p175-01.jpg)\n\
  \n在所有情况下，`关闭` 表示受限。\n\n你可能认为 `开启` 意味着某些内容被限制，但事实恰恰相反。为了禁用或限制某些内容，你需要点击其旁边的滑块并将其切换为\
  \ `关闭`。如果你注意到所有选项上方都有 `允许` 这个词，那么这就说得通了。\n\n**注意：** 你限制的任何应用的图标都会消失。因此，如果你限制访问 `YouTube`、`App\
  \ Store` 和 `FaceTime` 应用，那么 `YouTube`、`App Store` 图标将从主屏幕消失，并且你 iPod touch 的 `FaceTime`\
  \ 图标也会被移除。\n\n#### 允许更改\n\n有时你并不想完全关闭对某个应用的访问，而只是阻止任何人进行意外的更改。例如，`定位` 选项涉及许多隐私问题，因此你可能希望对哪些应用和功能有权访问它进行更精细的控制。按照以下步骤调整\
  \ `定位` 选项的限制：\n\n![images](img/p176-01.jpg)\n\n1.  按照上一节所述，前往 `访问限制` 屏幕。\n2.  向下滚动到底部以查看所有\
  \ `允许更改` 设置。\n3.  轻点 `定位`。\n4.  轻点 `允许更改` 以更改 `定位设置`。\n5.  将 `定位服务` 切换为 `关闭`，以完全阻止你的\
  \ iPod touch 使用你的位置。（请注意，这可能会大大降低诸如 `谷歌地图` 等应用的便利性，并导致逐向导航应用完全无法工作。）\n6.  将任何你不想让其追踪你位置的单个应用切换为\
  \ `关闭`。（例如，将 `相机` 应用的 `定位服务` 设为 `关闭`，以防止你打算在互联网上公开分享的照片中包含 GPS 坐标。）\n7.  轻点 `系统服务`\
  \ 以更改内置进程的 `定位` 权限。\n8.  如果有任何你不想让其使用位置数据的系统服务，将它们切换为 `关闭`。选项包括 `蜂窝网络搜索`、`指南针校准`、`诊断与用量`、`基于位置的\
  \ iAd`、`设置时区` 和 `交通状况`。  \n    ![images](img/p177-01.jpg)\n9.  完成后，轻点左上角的 `定位` 返回。\n\
  10. 如果你想防止将来对 `定位服务` 进行任何更改，轻点 `不允许更改`。\n11. 完成后，轻点 `访问限制` 返回。\n12. 轻点 `账户`，然后轻点\
  \ `不允许更改`，以防止将来对你的 `邮件`、`日历` 和 `通讯录` 账户进行任何更改。\n13. 完成后，轻点 `访问限制` 返回。\n\n\n\n####\
  \ 限制内容\n\n除了为应用设置限制，你还可以对 iPod touch 上可下载和查看的内容进行限制。如果你打算将 iPod touch 交给孩子使用，并且不希望她能够下载带有露骨歌词的音乐或观看成人电影，请按照以下步骤操作：\n\
  \n1.  前往**限制**屏幕，操作方式如前一节所述。\n    ![images](img/p178-01.jpg)\n2.  向下滚动到底部，查看所有**允许的内容**设置。\n\
  3.  要限制在应用内购买的内容，请将**App 内购买项目**设置为**关闭**。这包括从**iTunes**应用购买的音乐和视频。\n4.  如果你有小孩，担心他们在下载新应用后进行昂贵的应用内购买（例如，你不想让他们在**蓝精灵**应用中购买**蓝精灵果**），请轻点**需要密码**，并将该设置更改为**立即**。\n\
  5.  轻点**评级所在地**，根据你所在的国家/地区调整评级。目前支持大量国家和地区，包括澳大利亚、奥地利、加拿大、法国、德国、爱尔兰、日本、新西兰、英国和美国。\n\
  6.  轻点**音乐与播客**以限制访问包含露骨内容的歌词。确保将**露骨**选项设置为**关闭**，如右侧图所示。\n    ![images](img/p178-02.jpg)\n\
  7.  轻点左上角的**限制**按钮，返回选项列表。\n8.  你还可以通过轻点每个项目来设置**影片**、**电视节目**和**App**的评级上限。\n \
  \   ![images](img/p179-01.jpg)\n9.  当你轻点**影片**等项目时，会看到一个允许的评级列表。轻点你想要允许的最高评级级别。在此图中，我们轻点了**PG-13**。所有高于此评级的影片（**R**\
  \ 和 **NC-17**）均不允许。红色文字和缺少对勾标记可直观提示哪些选择已被屏蔽。\n10. 轻点**电视节目**以设置这些限制。同样，轻点你想要允许的最高评级。对勾标记表示允许的评级；红色文字表示不允许的评级。在此示例中，**TV-Y**、**TV-Y7**\
  \ 和 **TV-G** 是允许的，但更高的评级（即 **TV-PG**、**TV-14** 和 **TV-MA**）是不允许的。\n11. 轻点**App**以设置对各种应用的限制。\n\
  \    ![images](img/p180-01.jpg)\n12. 在此屏幕中，我们允许播放评级为**4+**、**9+**和**12+**的应用。评级为**17+**的应用无法播放或下载。\n\
  13. 轻点左上角的**限制**按钮，返回选项列表。\n14. 最后，轻点**主屏幕**按钮以保存你的设置。\n\n#### 限制 Game Center\n\n\
  Game Center 是享受社交游戏的绝佳方式，包括配对对战、挑战、排行榜等。然而，如果你是有小孩的家长，可能不希望他们在没有你监督的情况下玩多人游戏或接受好友请求。请按照以下步骤限制对\
  \ Game Center 的访问：\n\n1.  前往**限制**屏幕，操作方式如前一节所述。\n    ![images](img/p180-02.jpg)\n\
  2.  向下滚动到**Game Center**。\n3.  将**多人游戏**和/或**添加好友**选项切换为**关闭**。\n\n"
- "# 第 9 章\n\n## 使用 iMessage\n\n*iMessage* 是苹果公司的新服务，它与手机上的短信和彩信功能完全相同，但通过 Wi-Fi 网络工作，并且仅与其他\
  \ iOS 5 设备（如 iPod touch、iPhone 和 iPad）互通。\n\niMessage 可以在你的 iPod touch 的**信息**应用中找到。在本章中，你将学习如何使用\
  \ iMessage 从**通讯录**应用发送文本信息，以及从**照片应用**发送图片信息。\n\n![images](img/p181-01.jpg)\n\n\
  ### 启用 iMessage 并调整设置\n\n设置 iMessage 服务类似于设置**FaceTime**：\n\n1.  **启动设置。**\n2. \
  \ 轻点**信息。**\n3.  将**iMessage**切换为**开启**\n4.  然后可能会要求你输入 iMessage 密码——这实际上就是你的 Apple\
  \ iTunes 密码。\n\n**提示：** 如果你像图中所示卡在**正在等待激活**信息上，请尝试按照第 25 章：故障排除中的方法重启你的设备。\n\n\
  一旦启用了 iMessage 选项，你的**电子邮件地址**将注册到 iMessage 服务中。\n\n![images](img/p182-01.jpg)\n\
  \n如果你在 iMessage 设置屏幕底部轻点**接收方式**，将会看到类似这样的屏幕。\n\n在此屏幕上，你可以调整与你的 iMessage 关联的电子邮件地址，并添加新的电子邮件地址。\n\
  \n![images](img/p182-02.jpg)\n\n#### 编写信息\n\n编写 iMessage 很像在手机上发送电子邮件或短信。iMessage\
  \ 的妙处在于它可以到达任何 iOS 5 设备，并且回复起来非常简单。\n\n##### 从信息应用编写信息\n\n有几种方式可以启动你的**信息**应用。最简单的方法是直接轻点**主屏幕**上的**信息**图标。\n\
  \n当你首次启动**信息**应用时，很可能没有任何信息，因此屏幕是空白的。一旦你开始使用 iMessage，你将看到信息列表以及与联系人当前的“打开”讨论。请按照以下步骤发送信息：\n\
  \n![images](img/p183-01.jpg)\n\n1.  触摸屏幕右上角的**编写**图标。\n2.  光标将立即跳转到**收件人：** 行。你可以开始输入联系人的姓名，或者直接轻点**加号**（**+**）按钮，搜索或滚动浏览你的联系人。\n\
  3.  ![images](img/p183-02.jpg)\n4.  当你找到想要使用的联系人时，触摸该人的名字，它就会出现在**收件人：** 行中。\n5.\
  \  准备好输入信息时，触摸屏幕中间方框内的任意位置（**发送**按钮旁边）。\n6.  键盘将会显示。输入你的信息，完成后触摸**发送**。\n\n**注意：**\
  \ 如果你在**设置** > **信息**中启用了字符计数器，则会显示。\n\n![images](img/p183-03.jpg)\n\n**提示：** 如果你愿意，可以使用更大的横向键盘来发送信息。使用更大的按键打字会更方便，尤其是当你的手指较大或难以看清小按键时。\n\
  \n##### 发送信息后的选项\n\n发送信息后，窗口会变为你与联系人之间的*对话式*讨论窗口。你发送的信息显示在蓝色气泡中。当你的联系人回复时，他的信息会显示在屏幕另一侧的灰色气泡中。\n\
  \n要离开**编写**屏幕，请轻点左上角的**信息**，或单击**主屏幕**按钮返回你的**主屏幕**。\n\n![images](img/p184-01.jpg)\n\
  \n**注意：** 如果信息发送失败，你会看到它旁边有一个感叹号。你还会在**信息**应用图标的右上角看到一个**红色感叹号**图标。\n\n![images](img/p184-02.jpg)\n\
  \n如果发生这种情况，你可以像之前一样再次发送信息。\n\n##### 从通讯录编写信息\n\n你也可以向 iPod touch 中的任何联系人发送信息。请按照以下步骤操作：\n\
  \n1.  通过搜索或滚动浏览**通讯录**，找到你想要发送信息的联系人。\n2.  在联系人信息的底部，你会看到一个标有**发送信息**的方框。只需触摸该方框，系统会提示你选择要使用的号码或电子邮件地址（如果你为该联系人列出了多个号码或电子邮件地址）。\n\
  3.  选择首选的号码或电子邮件地址，然后按照前面列出的步骤操作。\n\n![images](img/p185-01.jpg)\n\n**注意：** 请记住，你只能向与使用\
  \ iOS 5 设备的 Apple ID 关联的电子邮件地址发送 iMessage。\n\n\n\n#### 回复信息\n\n当收到信息时，你的 iPod touch\
  \ 会播放提示音、震动或两者同时进行——具体取决于你的设置。同时，屏幕顶部的`通知中心`会出现一个指示器，让你可以选择立即回复。\n\n![images](img/p185-02.jpg)\n\
  \n当你看到和/或听到指示器时，只需轻点通知即可进入`信息`应用并输入你的回复，如之前所示。\n\n如果你错过了通知或想稍后回复，只需从顶部向下拉出`通知中心`列表，然后轻点你想要回复的信息。\n\
  \n![images](img/p185-03.jpg)\n\n**注意：** 如果你的屏幕已锁定，你会看到信息以弹出窗口形式或作为`锁定`屏幕列表的一部分显示。只需滑动`信息`图标即可解锁，你会被带到该信息处。\n\
  \n![images](img/p186-01.jpg)\n\n#### 查看存储的信息\n\n一旦你开始了一些对话信息，它们将被存储在`信息`应用中。触摸`信息`图标，你就可以滚动浏览你的信息对话列表。\n\
  \n![images](img/p186-02.jpg)\n\n要继续与某人对话，只需触摸所需的对话线程，它就会打开，显示你与对方所有过往的往返信息。触摸文本框，输入你的信息，然后触摸`发送`按钮以继续对话。\n\
  \n![images](img/p186-03.jpg)\n\n#### 信息铃声和声音选项\n\n你的 iPod touch 允许你设定收到信息时的反应方式。按照以下步骤选择你偏好的反应：\n\
  \n1.  启动你的`设置`应用，滚动到`声音`，然后轻点`声音`标签。\n2.  如果你在`声音`菜单中将`震动`功能设为`开启`，那么当信息到来时，你也会收到震动。\n\
  \n    ![images](img/p187-01.jpg)\n\n3.  再向下滚动一点，你会看到一个写着`短信铃声`的标签。轻点此处，你可以选择短信的铃声。你的选择限于提供的选项（通常有六个），或者你可以选择`无`。\n\
  4.  选择你偏好的短信通知声音，然后触摸左上角的`声音` ![images](img/p187-02.jpg) 按钮以确认你的选择。\n\n![images](img/p187-03.jpg)\n\
  \n### 多媒体 iMessage 信息\n\n`信息`应用为 iPod touch 用户提供了发送和接收类似彩信的信息所需的工具——包括图片信息和视频信息。这些信息直接显示在信息窗口内，就像你的文本\
  \ iMessage 信息一样。\n\n**注意：** 你可以从`信息`应用发送图片、视频、位置（来自地图）、音频（来自`语音备忘录`应用）和 vCard（来自`通讯录`应用）文件。\n\
  \n#### 通过信息发送图片或视频\n\n要通过信息发送图片或视频，请按以下步骤操作：\n\n1.  轻点`信息`图标开始发送信息。\n\n    ![images](img/p188-01.jpg)\n\
  \n2.  你会注意到在文本输入气泡旁边有一个小的`相机`图标。轻点此图标，系统会提示你`拍照或录像`或`选取现有`。\n\n    ![images](img/p189-01.jpg)\n\
  \n3.  要拍照，请遵循第 19 章：“使用照片”中的说明。如果你选择了`选取现有`选项，只需浏览你的照片/视频，找到想要添加到信息中的项目。\n\n   \
  \ ![images](img/p189-02.jpg)\n\n4.  触摸右下角的蓝色`选取`按钮，你会看到图片加载到小窗口中。\n\n    ![images](img/p189-03.jpg)\n\
  \n5.  选择收件人（如前所示），如果需要，可以输入一段短消息。接下来，触摸蓝色的`发送`按钮。\n\n![images](img/p190-01.jpg)\n\
  \n如果你已经与该特定联系人有一个对话线程，那么他的图片将显示在该对话线程中。\n\n**注意：** 你可以在对话线程中继续交换图片和文本。而且你随时可以滚动浏览以查看整个对话——包括所有图片！\n\
  \n![images](img/p190-02.jpg)\n\n#### 从照片中选择图片或视频通过信息发送\n\n发送图片或视频信息的第二种方法是直接进入你的`照片`应用并选择一张图片。请按以下步骤操作：\n\
  \n1.  启动你的`照片`应用，并按照第 19 章：“使用照片”中的描述浏览你的照片和视频。\n2.  要只发送一张图片或一个视频，触摸你想要发送的图片或视频，然后触摸左下角的`发送`图标。\n\
  \n    ![images](img/p191-01.jpg)\n\n3.  你现在会看到`信息`作为第二个选项。选择`信息`，照片将会加载到气泡中，就像之前在`信息`应用中一样。\n\
  \n#### 发送多张图片\n\n请按以下步骤发送多张图片：\n\n1.  启动`照片`应用，就像你在上一节中所做的那样。\n2.  不要轻点单张图片，而是轻点左下角的`操作`按钮。\n\
  3.  现在，轻点最多 10 张图片。你会看到它们的颜色变亮，并且一个`勾选标记`图标会出现在方框中。\n4.  选取最多 10 张图片后，轻点左下角的`共享`按钮。\n\
  5.  选择`信息`，这些图片将出现在信息气泡中。\n\n![images](img/p182-01.jpg)\n\n"
- "# 第 10 章\n\n## 视频信息和 Skype\n\n你的 iPod touch 为你的生活带来了许多新功能，其中一些在几年前还像是科幻小说。例如，视频通话现在不仅成为可能，而且通过新的`FaceTime`功能使用起来极其简单。只要你和通话方都使用\
  \ iPod touch 并连接在同一个 Wi-Fi 网络上，你们就可以进行不限次数的视频通话。在本章中，我们将向你展示如何启用和使用`FaceTime`，以及如何开始享受这个优秀新功能的乐趣。\n\
  \n通过 Wi-Fi 拨打电话也可以通过`Skype`实现，这是许多人都在电脑上使用的一款流行的视频通话和聊天程序。我们还将向你展示如何使用`Skype`应用。\n\
  \n说到视频，你的 iPod touch 是一个功能非常强大的摄像机。你可以录制并导出高达 720p 的高清视频。然后，你可以将该视频直接发布到 YouTube\
  \ 或 iCloud，甚至可以通过电子邮件发送给收件人。我们还将向你展示如何拍摄和快速“修剪”视频，以及如何上传视频。\n\n### 视频通话\n\n多年来，我们一直在电视节目和电影中看到这种未来技术的首次亮相。例如，许多这些节目和电影展示了人们使用小巧便携的电话进行对话并进行视频通话。甚至\
  \ 20 世纪 70 年代的卡通片《杰森一家》也将其作为一个未来概念。\n\niPod touch 将那种未来构想变成了今天的现实。有几个应用可以让你在 iPod\
  \ touch 上使用前置摄像头进行视频通话。目前，只有一个应用允许你同时使用前置摄像头和后置摄像头：`FaceTime`。\n\n#### 连接到蓝牙耳机或汽车立体声音响\n\
  \n你还可以连接到蓝牙耳机或蓝牙汽车立体声音响系统，以拨打和接听`FaceTime`或其他通话服务（如`Skype`）的音频。我们在第 5 章：“AirPlay\
  \ 和蓝牙”中向你展示了详细步骤。\n\n\n\n#### 使用 FaceTime 进行视频通话\n\n`FaceTime` 是苹果公司在许多 iPod touch\
  \ 广告中主打的专属应用。本质上，`FaceTime` 是一种通过 Wi-Fi 进行的免费通话，让你可以通过 iPod touch 的前置摄像头看到通话另一方的画面。\n\
  \n**注意：** 目前 `FaceTime` 仅适用于近期 iOS 设备之间的视频通话，例如 iPod touch 4、iPod touch 4S、iPad\
  \ 2 和 iPod touch 4，以及 Mac 电脑。\n\n### 启用 FaceTime 通话并添加电子邮件\n\n当你第一次使用设备时，`FaceTime`\
  \ 可能尚未启用。要启用 iPod touch 以接收和拨打 `FaceTime` 通话，请按照以下步骤操作：\n\n1. 启动你的`设置`应用。\n2. 点按`FaceTime`。\n\
  3. 将`FaceTime`开关切换到`开启`位置。\n\n系统可能会要求你使用 Apple ID 登录。\n\n你与 Apple ID 关联的默认电子邮件地址，也将是其他人可以通过其\
  \ iOS 设备使用 FaceTime 联系你的电子邮件地址。\n\n![images](img/p194-01.jpg)\n\n你也可以通过点按`添加其他电子邮件`来添加一个新的电子邮件地址用于\
  \ FaceTime。输入你的新电子邮件地址，然后你将收到一封来自 Apple 的验证邮件，要求你点击一个链接，将该新电子邮件地址与`FaceTime`（及你的\
  \ Apple ID）关联，之后才能将此电子邮件用于`FaceTime`。\n\n新电子邮件地址验证通过后，你会看到标签从`正在验证`变为`电子邮件`。\n\n\
  ![images](img/p195-01.jpg)\n\n### 来电显示\n\n添加新电子邮件地址后，在此屏幕的电子邮件地址下方会出现一个`来电显示`标签。点按`来电显示`，以选择当你用`FaceTime`拨打他人电话时，向对方显示的电子邮件地址。\n\
  \n![images](img/p195-02.jpg)\n\n### 不同的 FaceTime 视图\n\n在 FaceTime 应用底部，你会看到三个图标，分别对应`个人收藏`、`最近通话`、`通讯录`，如图\
  \ 10–1 所示。\n\n![images](img/1001.jpg)\n\n**图 10–1.** *使用软按键查看不同的 `FaceTime` 屏幕（个人收藏、最近通话和通讯录）*\n\
  \n### 使用个人收藏\n\n你的`个人收藏`是你经常使用`FaceTime`呼叫的人。你可以将`个人收藏`视为快速拨号列表。\n\n#### 添加新的个人收藏\n\
  \n从你的`通讯录`列表中向个人收藏添加新条目非常简单。请按照以下步骤操作：\n\n**提示：** 你也可以在 FaceTime 的`最近通话`屏幕中添加`个人收藏`。在`最近通话`中，点按蓝色的`箭头图标`\
  \ ![images](img/p196-01.jpg)，然后在下一个屏幕上，向下滚动到`信息`页面底部，点按`添加到个人收藏`。\n\n4. 点按`FaceTime`图标启动它。\n\
  5. 触摸底部软按键行中的`个人收藏`图标。\n6. 首次启动`个人收藏`时，你会看到一个空白屏幕。\n\n![images](img/p197-01.jpg)\n\
  \n7. 点按右上角的`加号`按钮 ![images](img/p197-02.jpg) 以添加新条目。你的通讯录目录将打开。\n8. 上下滑动以定位联系人。点按任一联系人以选中它。\n\
  \n![images](img/p197-03.jpg)\n\n**提示：** 要按名称搜索你的联系人，请点按屏幕顶部时间下方。这将调出`搜索`窗口，你可以在此输入几个字母来查找联系人。请记住，你可以通过点按左上角的`群组`按钮来查看不同的联系人分组。\n\
  \n9. 如果某个条目有多个电话号码或电子邮件地址，你需要选择其中一个作为你的个人收藏条目。\n10. 点按联系人的电子邮件地址或电话号码后，你将返回到你的`个人收藏`列表，你会看到刚刚添加的新联系人。\n\
  \n![images](img/p198-01.jpg)\n\n#### 整理你的个人收藏\n\n与 iPod touch 上的其他列表一样，你可以重新排列`个人收藏`列表的顺序并删除条目。\n\
  \n1. 像之前一样查看你的`个人收藏`列表。\n2. 点按左上角的`编辑`按钮。\n3. 要重新排列条目顺序，请触摸并拖动右侧带有三条灰色横线的边缘，在列表中上下移动。\n\
  \n    ![images](img/p198-02.jpg)\n\n4. 要删除某个条目，请点按该条目左侧的红色`圆圈`图标，使其变为竖直。\n5. 点按`删除`按钮。\n\
  6. 完成条目的重新排序和删除后，点按左上角的`完成`按钮。\n\n![images](img/p199-01.jpg)\n\n### 使用最近通话\n\n使用`最近通话`类似于在手机上查看通话记录。\n\
  \n当你触摸`最近通话`图标时，会显示所有最近的`FaceTime`通话列表。你可以点按顶部的`全部`或`未接来电`按钮来缩小列表范围（见图 10–2）。\n\n\
  ![images](img/p199-02.jpg)\n\n![images](img/1002.jpg)\n\n**图 10–2.** *使用`最近通话`屏幕*\n\
  \n#### 从最近通话拨打电话\n\n从`最近通话`屏幕拨打电话很容易；只需触摸所需的姓名或电话号码，你的 iPhone 会立即向该联系人发起通话。\n\n\
  #### 清除所有最近通话\n\n要清除或删除所有最近通话记录条目，请点按顶角的`编辑`按钮，然后点按右上角的`清除`按钮。\n\n#### FaceTime\
  \ 通话详情或联系人信息\n\n触摸`最近通话`列表中姓名旁边的蓝色`箭头`图标 ![images](img/p200-01.jpg)，你将看到该电话号码的信息，或者如果该联系人存在于你的`通讯录`列表中，你将看到其完整联系信息。如果有多次通话记录，你还会看到每次通话的历史。\n\
  \n![images](img/p200-02.jpg)\n\n向下滚动到联系人`信息`屏幕底部以查看更多选项。你可以通过电子邮件或 iMessage 发送联系信息，来发送`信息`或`共享联系人`。\n\
  \n点按`添加到个人收藏`，将此联系人添加到你的`个人收藏`列表。\n\n![images](img/p201-01.jpg)\n\n#### 从最近通话将 FaceTime\
  \ 号码或电子邮件添加到通讯录\n\n如果`最近通话`条目是一个 FaceTime 号码或电子邮件，但该联系人不在你的`通讯录`列表中，那么你将在`信息`屏幕上看到两个不同的按钮：`创建新联系人`和`添加到现有联系人`。\n\
  \n![images](img/p201-02.jpg)\n\n点按`创建新联系人`，以从此电话号码创建新的联系人。\n\n点按`添加到现有联系人`，以将此电话号码添加到你的某个现有联系人中。\n\
  \n#### 从通讯录拨打电话\n\n将所有联系信息存储在 iPod touch 中的一大好处是，从`通讯录`列表中拨打`FaceTime`通话非常方便。请按照以下步骤操作：\n\
  \n1. 点按`FaceTime`图标启动它（见图 10–3）。\n2. 触摸底部软按键行中的`通讯录`图标。\n3. 使用以下方法之一查找要呼叫的联系人：\n\
  \   a. 在列表中上下滑动。\n   b. 将手指放在屏幕右侧的字母索引上，上下滚动。\n   c. 点按顶部显示时间的状态栏以跳转到列表顶部。在`搜索`窗口中点按，然后输入联系人姓氏、名字或公司名称的几个字母进行搜索。\n\
  4. 找到你想要的联系人条目后，点按其姓名。\n5. 触摸你想要通过`FaceTime`呼叫的电话号码或电子邮件地址。\n\n![images](img/1003.jpg)\n\
  \n**图 10–3.** *从`通讯录`列表拨打电话*\n\n\n\n##### 接听 FaceTime 通话\n\n当有人使用 FaceTime 呼叫你时，你会看到一个类似于图\
  \ 10-4 所示的屏幕。要接听通话，请轻点 `Accept`，要拒接通话，请轻点 `Decline`。\n\n![images](img/1004.jpg)\n\
  \n**图 10-4.** *接听 FaceTime 通话*\n\n一旦 FaceTime 通话建立，请按照以下步骤进行视频会议：\n\n1.  将 iPod\
  \ touch 稍微拿远一点。\n2.  确保你在窗口中的画面*构图*得当。\n3.  你可以将你自己的小图像拖到屏幕上的任何方便位置。\n4.  轻点 `Switch\
  \ Camera` 按钮，向 FaceTime 呼叫者展示你正在观看的内容。此时 `Switch Camera` 按钮将使用 iPod touch 背面的标准摄像头。在图\
  \ 10-5 中，我看到了马丁度假时科罗拉多州的美景，而他则看到了我家沙发上的狗！\n5.  轻点 `End` 按钮结束 FaceTime 通话。\n6.  轻点\
  \ `Mute` 按钮暂时将通话静音。\n\n![images](img/1005.jpg)\n\n**图 10-5.** *在 FaceTime 通话中切换摄像头视图*\n\
  \n### 使用 Skype 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过 [`www.facebook.com`](http://www.facebook.com)\
  \ 和 Google+ 等网站进行的被动交流固然不错，但有时没有什么能替代听到对方声音的真实感。\n\n![images](img/p204-01.jpg)\n\
  \n令人惊讶的是，你可以使用 Skype 应用在任意 iPod touch 上拨打语音和视频电话。呼叫世界上任何地方的其他 Skype 用户都是免费的。Skype\
  \ 服务的一个优点是其适用于计算机和多种移动设备，包括 iPhone 4S、旧款 iPhone、iPad 和 iPod touch、部分 BlackBerry\
  \ 智能手机以及其他移动设备。拨打移动电话和固定电话会产生费用，但费率合理。\n\n**注意：** Skype 应用可以在后台运行，因此你可以随时接听来电的 Skype\
  \ 通话（请注意，这通常会导致电池电量消耗更快）。\n\n![images](img/p205-01.jpg)\n\n#### 将 Skype 下载到你的 iPod\
  \ touch\n\n你可以从 App Store 免费下载 Skype 应用，方法是搜索“Skype”并安装。如果你需要有关此操作的帮助，请查看第 22 章：“令人惊叹的\
  \ App Store”。\n\n#### 创建你的 Skype 帐户\n\n如果你需要设置你的 Skype 帐户并且尚未在电脑上完成（请参见本章后面的“在电脑上使用\
  \ Skype”部分）。\n\n#### 登录 Skype 应用\n\n创建帐户后，你就可以在 iPod touch 上登录 Skype 了。请按照以下步骤操作：\n\
  \n1.  如果尚未进入 Skype，请从 `Home` 屏幕轻点 `Skype` 图标。\n2.  输入你的 Skype 名称和密码。\n3.  轻点右上角的\
  \ `Sign In` 按钮。\n4.  以后你将无需再次输入登录信息；它会保存在 Skype 中。下次轻点 `Skype` 时，它将自动为你登录。\n\n![images](img/p206-01.jpg)\n\
  \n#### 查找并添加 Skype 联系人\n\n登录 Skype 应用后，你将希望开始与人交流。为此，你需要找到他们并将其添加到你的 Skype 联系人列表中：\n\
  \n1.  如果尚未进入 Skype 应用，请从 `Home` 屏幕轻点 `Skype` 图标，并在提示时登录。\n2.  轻点底部的 `Contacts` 功能键。\n\
  3.  轻点顶部的 `Search` 窗口，然后输入某人的名字和姓氏或 Skype 名称。轻点 `Search` 查找此人。\n4.  看到要添加的人后，轻点其名字。\n\
  \n   ![images](img/p206-02.jpg)\n\n5.  如果不确定这是否是正确的人，请轻点 `View Full Profile` 按钮。\n\
  6.  轻点 `Add Contact` 按钮。\n\n   ![images](img/p207-01.jpg)\n\n7.  适当调整邀请信息。\n8. \
  \ 轻点 `Send` 按钮，向此人发送成为你 Skype 联系人的邀请。\n\n   ![images](img/p207-02.jpg)\n\n9.  重复此过程以添加更多联系人。\n\
  10. 完成后，轻点底部的 `Contacts` 功能键。\n11. 从 `Groups` 屏幕轻点 `All Contacts`，查看你添加的所有新联系人。\n\
  12. 一旦此人接受你的联系人请求，你将看到他列在 `All Contacts` 屏幕的联系人中。\n\n**提示：** 有时你想要删除某个 Skype 联系人。你可以通过从联系人列表中轻点她的名字来移除或阻止联系人。轻点\
  \ `Settings` 图标（右上角），然后选择 `Remove from Contacts` 或 `Block`。\n\n![images](img/p208-01.jpg)\n\
  \n#### 在 iPod touch 上使用 Skype 拨打电话\n\n到目前为止，你已经创建了帐户并添加了联系人。现在你终于准备好要在 iPod touch\
  \ 上使用 Skype 打第一个电话了：\n\n1.  轻点底部的 `Contacts` 功能键。\n2.  轻点 `All Contacts` 查看你的联系人。\n\
  3.  轻点你想通话的联系人姓名。\n4.  轻点 `Call` 按钮进行语音通话，或轻点 `Video Call` 按钮进行视频通话。\n5.  你可能会看到一个\
  \ Skype 按钮和一个移动电话或其他电话按钮。按下 Skype 按钮进行免费通话。拨打其他任何电话都需要使用 Skype 点数支付。\n\n![images](img/p208-02.jpg)\n\
  \n**注意：** 你可以使用 iPod touch 上的 Skype Out 免费拨打免费电话。以下通知来自 Skype 网站 [`www.skype.com`](http://www.skype.com)：\n\
  \n“以下国家和地区号码段受支持且对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33 800，+33 805，+33 809 波兰：+48 800 英国：+44\
  \ 500，+44 800，+44 808 美国：+1 800，+1 866，+1 877，+1 888 台湾：+886 80”\n\n#### 在 iPod\
  \ touch 上使用 Skype 接听来电\n\niPod touch 原生支持后台 VoIP 通话。借助最新版本的 Skype，你可以让 Skype 在后台运行，并在来电时接听\
  \ Skype 通话。理论上，你甚至可以在进行语音通话时接听 Skype 来电！\n\n**提示：** 如果你不想让 Skype 在后台运行，但仍然想给某个你知道她在\
  \ iPod touch 上使用 Skype 的人打电话，只需给她发一封快速电子邮件或快速打个电话，提醒她你希望使用 Skype 应用与她通话。\n\n#####\
  \ 购买 Skype 点数或月度订阅\n\nSkype 到 Skype 的通话是免费的。但是，如果你想从 Skype 应用呼叫他人的固定电话或移动电话，则需要购买\
  \ Skype 点数或购买月度订阅计划。如果你尝试从 Skype 应用内购买点数或订阅，它将跳转到 Skype 网站。因此，我们建议使用 iPod touch\
  \ 上的 Safari 或电脑的网页浏览器来购买这些点数。\n\n**提示：** 你可能希望先购买少量 Skype 点数试用该服务，然后再注册订阅计划。如果你计划大量使用\
  \ Skype 与非 Skype 用户（例如，普通固定电话和移动电话）通话，那么订阅计划是更合适的选择。\n\n请按照以下步骤使用 Safari 购买 Skype\
  \ 点数：\n\n1.  轻点 `Safari` 图标。\n2.  在顶部地址栏中输入 [`www.skype.com`](http://www.skype.com)\
  \ 并轻点 `Go`。\n3.  轻点页面顶部的 `Sign In` 链接。\n4.  输入你的 Skype 名称和密码，然后轻点 `Sign me in`。\n\
  5.  如果你尚未进入 `Account` 屏幕，请轻点顶部导航栏右端的 `Account` 标签。\n6.  此时，你可以选择购买点数或订阅：\n\n   d.\
  \ 轻点 `Buy pre-pay credit` 按钮购买固定金额的点数。\n   e. 轻点 `Get a subscription` 按钮购买月度订阅帐户。\n\
  \n7.  最后，完成任一类型购买的付款说明。\n\n\n\n#### 使用 Skype 聊天\n\n除了拨打电话，您还可以通过 iPod touch 与其他\
  \ `Skype` 用户进行文字聊天。开始聊天与开始通话非常相似，请按照以下步骤操作：\n\n1.  如果您尚未进入 `Skype`，请点击 `Skype` 图标。\n\
  2.  点击底部的 `通讯录` 软键。\n3.  点击 `所有联系人` 查看所有联系人。\n4.  点击您想要聊天的联系人姓名。\n5.  点击 `聊天` 按钮。\n\
  \n    ![图片](img/p210-01.jpg)\n\n6.  输入您的聊天文本，然后按下 `发送` 按钮。您的聊天内容将显示在屏幕顶部。\n\n![图片](img/p211-01.jpg)\n\
  \n#### 将 Skype 添加到您的电脑\n\n您也可以在电脑上使用 `Skype` 应用。接下来我们将向您展示其工作原理。如果您的电脑连接了网络摄像头，您还可以使用\
  \ `Skype` 进行视频通话。\n\n**注意：** 当您从电脑呼叫 iPod touch 时，将无法进行视频通话。\n\n请按照以下步骤创建 Skype\
  \ 帐户并为您的电脑下载 `Skype` 软件：\n\n1.  在电脑上打开网页浏览器。\n2.  访问：[`www.skype.com`](http://www.skype.com)\n\
  3.  点击页面顶部的 `加入` 链接。\n4.  填写所有必填信息并点击 `继续` 按钮来创建您的帐户。请注意，您只需在带星号的必填字段中输入信息。例如，您无需输入性别、出生日期或手机号码。\n\
  5.  至此，您已完成帐户设置过程。接下来，您会看到购买 Skype 点数的选项；但这不是必需的，免费的 Skype 对 Skype 通话、视频通话或聊天并不需要它。\n\
  \n    **提示：** 只有当您想拨打给未使用 `Skype` 的人时才需要付费。例如，拨打固定电话或手机（未使用 `Skype`）是收费的。在编写本文时，即用即付费率约为美分\
  \ 2.1 美分；各种通话套餐的月订阅费用大约在 3 到 14 美元之间。\n\n6.  接下来，点击网站顶部导航栏中的 `获取 Skype` 链接，将 `Skype`\
  \ 下载到您的电脑。\n7.  点击 `获取 Windows 版 Skype` 按钮或 `获取 Mac 版 Skype` 按钮。\n8.  按照说明安装软件。\n\
  9.  软件安装完成后，启动它并使用您的 Skype 帐户登录。\n10. 现在您已准备就绪，可以发起（或接听）与任何其他使用 `Skype` 的用户（包括所有使用\
  \ iPod touch 上 `Skype` 的朋友）进行电话、视频通话和聊天。\n\n### 视频录制\n\n除了让您进行视频通话和聊天外，iPod touch\
  \ 还允许您使用内置录像机录制功能全面的视频。您可以使用 iPod touch 拍摄 1080p 高清视频，然后将此视频上传到 Facebook、YouTube\
  \ 或 MobileMe。您还可以通过彩信或电子邮件发送视频。\n\n**注意：** 当您分享视频时，视频会被压缩，因此画质将不再是 1080p。\n\n接下来，我们将向您展示如何直接在\
  \ iPod touch 上录制视频和修剪视频。您还将学习如何在 iPod touch 上制作高质量的高清视频。\n\n#### 启动录像机\n\n录像机的软件实际上是\
  \ `相机` 应用的一部分（请参见 图 10-6）。请按照以下步骤使用内置录像机：\n\n1.  启动 `相机` 应用。将右下角的滑块从 `相机` 图标移动到\
  \ `录像机` 图标。\n2.  点击右上角的 `切换摄像头` 按钮，在后置和前置摄像头之间切换。\n3.  录制场景时尽量保持 iPod touch 稳定。\n\
  4.  录制完成后，点击 `停止` 按钮。\n\n![图片](img/1006.jpg)\n\n**图 10-6.** *录像机布局与控件*\n\n#####\
  \ 聚焦视频\n\niPod touch 可以根据拍摄对象调整视频的焦距。请按照以下步骤利用此功能：\n\n1.  若要聚焦视频前景中的某个物体，请点击屏幕前景。屏幕会显示一个小方框来指示对焦区域。\n\
  2.  若要将焦点切换到背景中的某个物体，请点击屏幕的另一部分。方框将短暂显示新的对焦区域。\n\n##### 修剪视频\n\niPod touch 允许您直接在\
  \ iPod touch 上对视频进行编辑。一旦视频录制完成并按下 `停止` 按钮，视频会立即存入您的 `相机胶卷`。\n\n点击左下角的视频缩略图即可打开该视频。在屏幕顶部，您会看到一个时间线，其中包含视频的所有帧（请参见\
  \ 图 10-7）。请按照以下步骤编辑刚才录制的视频：\n\n1.  拖拽时间线的两端，您会看到视频进入修剪模式。\n2.  分别拖拽视频两端，直至达到您想要的长度。\n\
  3.  当视频长度合适时，点击右上角的 `修剪` 按钮。\n4.  接下来，选择 `修剪原片` 或 `存储为新剪辑`。后一个选项会保存一份新修剪视频的副本。\n\
  \n![图片](img/1007.jpg)\n\n**图 10-7.** *修剪视频*\n\n##### 发送视频\n\n与照片类似，您有多种选项可通过 iPod\
  \ touch 将录制的视频发送给他人。请按照以下步骤从 iPod touch 发送视频：\n\n1.  触摸底部的 `发送` 图标 ![图片](img/p214-01.jpg)。\n\
  2.  选择您首选的视频发送方式：`电子邮件视频`、`信息`或`发送到 YouTube`。\n3.  根据您在第二步所做的选择，按照步骤发送视频。\n\n**注意：**\
  \ 要将视频上传到 YouTube，您需要拥有该网站的帐户。\n\n"
- '# 第 11 章


  ### 播放音乐


  在本章中，我们将向您展示如何将 iPod touch 变成一台出色的音乐播放器。由于 iPod touch 出自苹果公司——正是这家公司让如今著名的 iPod
  电子音乐播放器风靡一时——您可以预见它将拥有一些强大的功能，而事实也确实如此。我们将向您展示如何播放和组织您从 iTunes 购买或从电脑同步的音乐，如何以多种方式查看播放列表，以及如何快速查找歌曲。您将学习如何使用
  Genius 功能，让 iPod touch 在您的音乐库中定位并分组相似的歌曲——这有点像只播放您喜欢音乐的电台。


  **提示：** 了解如何直接在 iPod touch 上购买音乐和使用 Ping（音乐爱好者的社交网络），请参见第 21 章：“您设备上的 iTunes”。


  您还将了解如何使用名为 Pandora 的应用来流式播放音乐。通过 Pandora，您可以从众多网络电台中进行选择，或者通过输入您喜爱的艺术家姓名来创建自己的电台，而且这一切都是免费的。


  ### 您的 iPod touch 作为音乐播放器


  您的 iPod touch 可能是当今市场上最好的音乐播放器之一。触摸屏让您能够轻松交互和管理您的音乐、播放列表、专辑封面以及音乐库的组织。您甚至可以通过蓝牙将
  iPod touch 连接到您的家庭或汽车音响，从而通过 iPod touch 欣赏美妙的立体声音效！


  **提示：** 请查看第 5 章：“AirPlay 和蓝牙”，了解如何将您的 iPod touch 连接到蓝牙立体声扬声器或汽车音响。


  无论您使用内置的 `音乐` 应用，还是像 `Pandora` 这样的网络电台应用，您都会发现对 iPod touch 上音乐的控制是前所未有的。




  ### 音乐应用


  大部分音乐通过**音乐**应用处理——其图标位于**主屏幕**上，通常在底部图标栏的最右侧。


  **注意：** 对于所有熟悉 iOS 5 之前 iPod touch 的读者，是的，音乐播放应用曾被称为**iPod**应用。现在它简称为**音乐**应用。


  ![images](img/p216-01.jpg)


  轻触**音乐**图标，如图 12-1 所示，你会看到底部有五个软按键：


  *   **播放列表** 可查看从电脑同步的播放列表，以及在 iPod touch 上创建的播放列表。

  *   **艺人** 可查看按字母顺序排列的艺人列表（可像通讯录一样搜索）。

  *   **歌曲** 可查看按字母顺序排列的歌曲列表（也可搜索）。

  *   **视频** 可查看视频列表（也可搜索）。

  *   **更多** 可查看有声读物、选集、作曲家、风格、iTunes U 和播客。


  ### 编辑软按键


  iPod touch 上一个很酷的功能是，你可以编辑**音乐**应用底部的软按键，真正根据你的需求和喜好进行自定义。要执行此操作，首先轻触**更多**按钮。


  然后轻触屏幕左上角的**编辑**按钮。 ![images](img/p216-02.jpg)


  屏幕会发生变化，显示各种可以拖拽到底部图标栏的图标。


  ![images](img/1202.jpg)


  **图 12–2.** *在**音乐应用**中更改软按键。*


  假设你想用**有声读物**图标替换**专辑**图标。只需长按**有声读物**图标并将其拖拽到底部图标栏中**专辑**图标所在的位置。到达后松开图标，**有声读物**图标便会出现在原来**专辑**图标的位置。你可以对**配置**屏幕上的任何图标执行此操作。操作完成后，轻触屏幕右上角的**完成**按钮。


  **提示：** 你也可以通过在软按键行来回拖放图标来重新排列底部图标。


  ### 播放列表视图


  **注意：** 播放列表是你创建的一组歌曲列表，可以包含你感兴趣的任何风格、艺人、录制年份或歌曲合集。


  许多人会将特定风格的音乐，如古典或摇滚，组合在一起。其他人可能会创建快节奏音乐的播放列表，并称之为“锻炼音乐”或“跑步音乐”。你可以使用播放列表以任何你希望的方式整理音乐。


  你可以在电脑上的 iTunes 中创建播放列表，然后同步到 iPod touch（请参阅 iTunes 指南），或者按照下一节所述直接在 iPod touch
  上创建播放列表。


  一旦你将播放列表同步到 iPod touch 或在 iPod touch 上创建了播放列表，它就会显示在**音乐**屏幕左侧的**资料库**下。


  ![images](img/p218-01.jpg)


  如果左侧列出了多个播放列表，只需轻触你想听的播放列表名称即可。


  **注意：** 你可以在 iPod touch 上编辑某些播放列表的内容。但是，你无法在 iPod touch 本身编辑“天才”播放列表。


  ### 在 iPod touch 上创建播放列表


  iPod touch 允许你创建独特的播放列表，这些列表可以编辑并与电脑同步。假设你想向 iPod touch 播放列表中添加新选择的音乐。只需按照下面的步骤创建播放列表并添加歌曲。你可以随时更改播放列表，移除旧歌曲并添加新歌曲——这再简单不过了！


  要在 iPod touch 上创建新播放列表，请轻触**天才播放列表**下的**添加播放列表**标签。


  ![images](img/p218-02.jpg)


  为你的播放列表起一个独特的名称（我们将其命名为“骑行音乐”），然后轻触**存储**。


  ![images](img/p219-01.jpg)


  现在你会看到**歌曲**屏幕。轻触你想要添加到新播放列表的任何歌曲名称。


  当歌曲变灰时，表示它已被选中并将被添加到播放列表中。


  **注意：** 不要因为试图移除或取消选择误触的歌曲而感到沮丧。你无法在此屏幕移除或取消选择歌曲；你必须点击**完成**，然后在下一个屏幕上移除它们，具体如下所述。


  选择右上角的**完成**，播放列表内容将会显示。


  ### 搜索音乐


  * * *


  **音乐**应用中的几乎每个视图（播放列表、艺人、歌曲等）在屏幕顶部都有一个搜索窗口。


  如果你看不到搜索窗口，轻点顶部的“时间”即可立即将其显示。


  在搜索窗口中轻点一次，然后输入艺人、专辑、播放列表或歌曲名称的几个字母，即可立即看到所有匹配项目的列表。这是在 iPod touch 上快速找到想听或想看的项目的最佳方式。


  ![images](img/p219-02.jpg)


  * * *


  ### 更改音乐应用的视图


  就显示和分类音乐的方式而言，**音乐**应用非常灵活。有时，你可能希望按艺人查看歌曲列表。其他时候，你可能更倾向于查看特定专辑或歌曲。iPod touch 让你可以轻松更改视图，以便在给定时刻管理并播放你想要的音乐。


  在你的**音乐**应用中，有以下几种视图：


  *   艺人视图 - 显示按艺人排序的所有音乐列表。

  *   歌曲视图 - 显示按每首歌曲名称排序的所有音乐。

  *   专辑视图 - 显示按专辑名称排序的所有音乐。

  *   风格视图 - 显示按类型或风格排序的所有音乐。

  *   作曲家视图 - 显示按作曲家名称排序的音乐。

  *   有声读物 - 显示你的所有有声读物。

  *   选集 - 显示所有选集。

  *   iTunes U - 显示所有 iTunes U 内容。

  *   播客 - 显示你的所有播客。


  ### 查看专辑中的歌曲


  当你处于**专辑**视图时，只需轻触专辑封面或名称，屏幕就会滑动，显示该专辑中的歌曲（参见图 12–3）。


  **提示：** 当你开始播放一张专辑时，专辑封面可能会展开填满屏幕。轻点屏幕一次可显示（或隐藏）顶部和底部的控制项。你可以使用这些控制项来管理歌曲和屏幕，如下所述。


  要查看正在播放的专辑中的歌曲，请轻触**列表**按钮，专辑封面会翻转，显示该专辑中的所有歌曲。正在播放的歌曲旁边会有一个小蓝色箭头。


  ![images](img/p220-01.jpg)


  ![images](img/1203.jpg)


  **图 12–3.** *轻触**列表**按钮可查看特定专辑中的歌曲。*


  轻触歌曲列表上方的标题栏，可返回专辑封面视图。


  ### 使用 Cover Flow 导航


  **Cover Flow** 是一种独特且非常酷的方式，让你通过专辑封面浏览音乐。如果你在**音乐**应用中播放一首歌，然后将 iPod touch 横向旋转至横屏模式，你的
  iPod touch 会自动切换至**Cover Flow**视图。


  ![images](img/p221-01.jpg)


  #### 在 Cover Flow 中查看歌曲


  只需轻触一张专辑封面，封面就会翻转，显示该专辑上的所有歌曲。


  要查看正在播放的歌曲（在 Cover Flow 视图中），请轻点专辑封面，它会翻转，显示该专辑中的歌曲（图 12–4）。当前正在播放的歌曲旁边会有一个小蓝色箭头。


  ![images](img/1204.jpg)


  **图 12–4.** *你可以使用**Cover Flow**查看专辑内容。*


  轻触（歌曲列表上方的）标题栏，专辑封面将再次显示。然后你可以继续滑动浏览你的音乐，直到找到你正在搜索的内容。


  **注意：** 你也可以轻触右下角的小“i”图标，专辑封面会翻转，显示歌曲，就像你轻触了封面一样。




  ### 播放音乐


  现在你已经知道如何查找音乐，该播放它们了！使用上述任何一种方法找到一首歌或浏览到一个播放列表。只需点击歌曲名称，它就会开始播放。


  此屏幕会显示所选歌曲所属的专辑封面图片，顶部则显示歌曲名称。


  屏幕底部有`音量`滑块，以及`上一首`、`播放/暂停`和`下一首`按钮。


  要查看专辑中的其他歌曲，只需双击专辑封面，屏幕就会翻转，显示所有其他歌曲。


  你也可以点击右上角的`列表`按钮来查看专辑中的歌曲列表。


  ![images](img/p223-01.jpg)


  #### 暂停与播放


  点击暂停符号（如果歌曲正在播放）或播放箭头（如果音乐暂停），即可停止或恢复歌曲播放。


  #### 播放上一首或下一首歌曲


  如果你在播放列表中，点击`下一首`箭头（位于`播放/暂停`按钮右侧）会跳转到列表中的下一首歌。如果你正按专辑浏览音乐，点击`下一首`会跳到专辑中的下一首歌。点击`上一首`按钮则执行相反操作。


  **注意：** 如果歌曲处于开头位置，`上一首`会跳转到前一首歌。如果歌曲正在播放，`上一首`会跳转到当前歌曲的开头（再次点击才会跳转到前一首歌）。


  #### 调整音量


  在 iPod touch 上调节音量有两种方式：使用机身侧面的`音量`按钮，或使用屏幕上的`音量滑块`控制。


  机身侧面的`音量`按钮位于设备左上侧。按下`音量加`键（顶部按钮）或`音量减`键可增大或减小音量。调整音量时，你会看到屏幕上的`音量滑块`随之移动。你也可以直接按住`音量滑块`来调整音量。


  **提示：** 要快速静音，请长按`音量减`键，音量最终会降至零。


  ![images](img/p224-01.jpg)


  #### 双击主屏幕按钮调出媒体控制


  你可以在 iPod touch 上做其他事情（如阅读和回复邮件、浏览网页或玩游戏）的同时播放音乐。借助 iPod touch 的新多任务功能，快速双击底部的`主屏幕`按钮，然后向右滑动，即可在多任务窗口中调出“正在播放”的媒体控制。这些控制按钮允许你跳转到上一首、暂停或播放当前歌曲、跳转到下一首，或直接跳转到正在播放歌曲的应用。


  **注意：** 小组件会显示最后播放音频或视频的应用，所以如果上次用的是`Pandora`，你会看到该应用而非`音乐`，小组件也会控制`Pandora`，对于`视频`、`YouTube`等应用也是如此。


  ![images](img/p225-01.jpg)


  **提示：** 如果按住`上一首`控制，歌曲会快退；按住`下一首`控制，则会快进。


  #### 重复播放、随机播放、歌曲内跳转


  在播放模式下，点击屏幕上任一专辑封面区域，即可激活更多控制。屏幕顶部会多出一个滑块（进度条），以及`重复`、`随机播放`和`Genius`符号。


  ![images](img/p226-01.jpg)


  #### 跳转到歌曲的其他部分


  向右滑动进度条，你会看到歌曲已播放时间（显示在最右侧）随之变化。如果要寻找歌曲的特定段落，拖动滑块后松手，听一下是否到达了正确位置。


  ![images](img/p226-02.jpg)


  #### 重复播放单曲或全部歌曲


  要重复播放当前正在听的歌曲，点击顶部控制左侧的`重复`符号两次，直到它变成蓝色并显示`1`。


  ![images](img/p227-01.jpg)


  要重复播放播放列表、歌曲列表或专辑中的所有歌曲，点击`重复`图标直到它变成蓝色（且不显示`1`）。


  ![images](img/p227-02.jpg)


  要关闭`重复`功能，再次点击图标直到它变回白色。


  ![images](img/p227-03.jpg)


  #### 随机播放


  如果你正在听播放列表、专辑或任何其他类别的音乐列表，你可能会想打乱顺序播放。点击`随机播放`符号，音乐就会以随机顺序播放。图标为蓝色时表示`随机播放`已开启，白色时表示关闭。


  ![images](img/p227-04.jpg)


  ##### 摇动切换歌曲


  `摇动切换歌曲`功能是在上一代 iPod touch 中引入的。因此，要开启`随机播放`模式，你只需摇动一下 iPod touch 即可切换歌曲，再摇动一次再次切换。每次摇动
  iPod touch，都会跳到列表中下一首随机选中的歌曲。


  ![images](img/p227-05.jpg)


  **提示：** 如果你打算拿着 iPod touch 跳舞，请关闭`摇动切换歌曲`功能！


  ![images](img/p227-06.jpg)


  你可以在`设置`菜单中开启`摇动切换歌曲`功能。


  1. 点击`设置`图标。

  2. 向下滚动并点击`音乐`图标。

  3. 将`摇动切换歌曲`开关拨至`开`或`关`。


  ### 正在播放


  有时你在探索播放列表或专辑选项时玩得太投入，结果在菜单中迷失了方向——只想赶紧回到正在听的歌曲。幸运的是，这总是很容易做到——只需点击大多数音乐屏幕右上角的`正在播放`图标即可。


  ![images](img/p228-01.jpg)


  ### 查看专辑中的其他歌曲


  你可能会想听同一专辑中的另一首歌，而不是跳转到播放列表或流派列表中的下一首。


  在`正在播放`屏幕的右上角，你会看到一个带有三条横线的小按钮。


  ![images](img/p228-02.jpg)


  点击该按钮，视图会切换为专辑封面缩略图。屏幕现在会显示该专辑中的所有歌曲。


  点击列表中的另一首歌，它就会开始播放。


  **注意：** 如果你正在播放播放列表或`Genius 播放列表`中途，跳转到专辑中的另一首歌后，不会自动返回到原播放列表。要返回该播放列表，你需要回到播放列表库，或点击`Genius`创建新的`Genius
  播放列表`。


  ![images](img/p229-01.jpg)


  ### 调整音乐设置


  有几种设置可以调整 iPod touch 上的音乐播放效果。你可以在`设置`菜单中找到它们。只需点击`主屏幕`上的`设置`图标。


  在`设置`屏幕中间，点击`音乐`标签，进入`音乐`的设置屏幕。你会看到六个可调整的设置：`摇动切换歌曲`、`音量平衡`、`均衡器`、`音量限制`、`歌词与播客信息`以及`按专辑艺术家分组`。


  你还会看到`家庭共享`的登录区域，它允许你从 Windows 或 Mac 电脑上的 iTunes 流式传输音乐。


  ![images](img/p229-02.jpg)


  #### 使用音量平衡（自动音量调整）


  由于歌曲的录制音量不同，有时播放时某首歌可能比其他歌听起来响很多。`音量平衡`可以消除这种差异。如果`音量平衡`设为`开`，你所有的歌曲将以大致相同的音量播放。


  ![images](img/p230-01.jpg)




  #### 均衡器（EQ 音效设置）


  音效均衡是非常个人化且主观的。有些人喜欢在音乐中听到更多低音，有些人喜欢更多高音，还有些人喜欢更夸张的中音。无论你的音乐品味如何，总有一款`EQ`设置适合你。


  **注意：** 使用`EQ`设置会在一定程度上降低电池续航能力。


  只需轻触`EQ`标签，然后选择你最常听的音乐类型，或者选择特定的选项来增强高音或低音。大胆尝试，尽情享受，找到最适合你的设置。


  ![图片](img/p230-02.jpg)


  #### 音量限制（以合理音量安全听音乐）


  这是父母控制孩子 iPod touch 音量的好方法。同时，它也能确保你不会戴耳机时音量过大而损伤听力。你只需将滑块拖动到某个音量限制值，然后锁定该限制即可。


  ![图片](img/p231-01.jpg)


  要锁定音量限制，请轻触`锁定音量限制`按钮，然后输入一个 4 位数的密码。系统会提示你再次输入密码，之后音量限制就会被锁定。


  #### 使用家庭共享


  如果你和我们一样，大电脑硬盘上的音乐可能远多于 iPod touch 能存储的数量。借助 iPod touch 和家庭共享，这就不再是问题了。


  ![图片](img/p231-02.jpg)


  只要你的 iPod touch 与电脑处于同一 Wi-Fi 网络，你就可以将桌面版 iTunes 资料库中的任何内容直接流式传输到 iPod touch 上。


  ![图片](img/p231-03.jpg)


  要启用家庭共享，请确保你的电脑已使用 iTunes 电子邮件地址和密码登录家庭共享，然后在你的 iPod touch 上使用同一帐户登录家庭共享。


  登录后，你将能够在本地（iPod touch）和远程（桌面版 iTunes）资料库之间进行选择。操作步骤如下：


  1.  启动`音乐`应用

  2.  轻触右下角的`更多`标签

  3.  轻触列表底部的`共享`标签。（如果看不到`共享`标签，请再次确认你的 iPod touch 和电脑都已使用同一个 iTunes 帐户登录了家庭共享）

  4.  从`共享`列表中选择你桌面电脑的名称，在此示例中为`MacPro`。（你可以共享多个 iTunes 资料库，因此可能会有多个选项。）


  ![图片](img/p232-01.jpg)


  你的 iPod touch 资料库将会消失，取而代之的是桌面版 iTunes 资料库。它的外观与你的 iPod touch 资料库完全相同，只是内容不同。


  要切换回你的 iPod touch 资料库，只需重复相同步骤，但在`共享`列表中选择`iPod touch`即可。


  #### 在 iPod touch 锁定时显示媒体控制


  你可能希望在 iPod touch 锁定时也能访问媒体控制。方法如下：只需双击`主屏幕`按钮，音频调节控件就会出现在锁定屏幕的顶部。无需解锁屏幕再进入音乐程序寻找控件。


  在右侧的图片中，请注意屏幕仍处于锁定状态——但音乐控件现在已显示在顶部。你可以在不实际解锁 iPod touch 的情况下，暂停、跳转、回到上一首歌曲或调节音量。


  ![图片](img/p233-01.jpg)


  **注意：** 只有在播放音频时，你才会看到这些控件。


  ### 收听免费网络广播（Pandora）


  虽然你的 iPod touch 让你对个人音乐资料库拥有前所未有的控制权，但有时你可能只想“换换口味”，听听其他音乐。


  **提示：** 一个基本的`Pandora`帐户是免费的，与从 iTunes 购买大量新歌相比，可以为你节省不少钱。


  `Pandora`源于音乐基因组计划。这是一项浩大的工程。一个庞大的音乐分析师团队研究了几乎所有录制过的歌曲，然后为每首歌曲开发了一套复杂的属性算法。


  **注意：** 目前可用的“网络广播”或付费音乐类应用越来越多，包括热门的`Slacker Personal Radio`、`Spotify`、`Rdio`、`Last.fm`等。另请注意，Pandora
  仅限美国地区使用，Slacker 仅限美国和加拿大使用。Spotify 在美国和欧洲可用，其他许多应用也因地区而异。希望未来能为国际用户提供更多选择。


  #### Pandora 入门指南


  通过 Pandora，你可以围绕自己喜欢的艺人设计属于自己的独特电台。最棒的是，它完全免费！


  首先，从 App Store 下载`Pandora`应用。只需前往 App Store 并搜索 Pandora。


  现在，轻触 Pandora 图标即可开始。


  ![图片](img/p234-01.jpg)


  首次启动 Pandora 时，系统会要求你创建一个帐户（或如果你已有帐户则登录）。只需填写相应信息——需要提供电子邮件地址和密码——你就可以开始设计自己的音乐聆听体验了。


  ![图片](img/p234-02.jpg)


  Pandora 也适用于你的 Windows 或 Mac 电脑，以及大多数智能手机平台。如果你已有 Pandora 帐户，只需登录即可。


  ![图片](img/p234-03.jpg)


  **提示：** 请记住，你可以将应用移入文件夹。如图 12–7 所示，我们将包括 `Pandora` 在内的三个音乐应用放入了一个名为“音乐”的文件夹中。了解更多关于使用文件夹的信息，请参阅第
  6 章：“图标与文件夹”。


  ![图片](img/1207.jpg)


  **图 12–7.** *将 Pandora 等同类音乐应用放入一个文件夹中，方便查找。*


  #### Pandora 主屏幕


  你的电台列表显示在主屏幕上，最上方是`快速混音`。轻触任一电台，它就会开始播放。通常，第一首歌将来自你选择的艺人，之后的歌曲将来自风格相近的艺人。


  ![图片](img/p235-01.jpg)


  选择电台后，音乐开始播放。你会看到当前显示的歌曲及其专辑封面——这与使用`音乐应用`播放歌曲时非常相似。


  你还会在右上角看到一个小型`正在播放`图标——与`音乐`应用中的`正在播放`图标非常相似。


  轻触右上角的`详情`视图![图片](img/p236-01.jpg)图标（与你在`音乐`应用中看到的图标一样），你会看到艺人的精美简介，该简介会随着每首新歌而变化。（见图
  12–8）。


  ![图片](img/1208.jpg)


  **图 12–8.** *Pandora 的专辑封面视图和详情视图。*


  #### 在 Pandora 中点击“赞”或“踩”


  如果你喜欢某首歌曲，请轻触点赞图标，之后你会听到更多来自该艺人的音乐。


  相反，如果你不喜欢此电台中的某位艺人，请轻触点踩图标，之后你将不再听到该艺人的歌曲。


  如果您愿意，可以暂停一首歌稍后再听，或者跳到电台中的下一首歌曲。


  ![图片](img/p236-02.jpg)


  **注意：** 使用免费的 Pandora 帐户，您每小时的跳歌次数是有限制的。此外，您偶尔会听到广告。要消除这些烦扰，您可以像下面介绍的那样升级到付费的`Pandora
  One`帐户。


  #### Pandora 菜单


  在两个拇指图标之间有一个`菜单`按钮，看起来像一个三角形。


  ![图片](img/p237-01.jpg). 轻触此按钮，你可以收藏这位艺人或这首歌，前往 iTunes 购买这位艺人的音乐，或者将电台通过电子邮件发送给你的`通讯录`中的联系人。


  ![图片](img/p237-02.jpg)



  好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



  ##### 在 Pandora 中创建新电台


  在 Pandora 中创建新电台再简单不过了。


  如果你正在收听一个电台，请按左上角的**返回箭头**返回到 Pandora 主屏幕。然后点击底部一栏的**新建电台**按钮。输入艺人、歌曲或作曲家的名称。


  当你找到想要的内容时，点击该选项，Pandora 就会立即开始围绕你的选择建立一个电台。


  你也可以点击**流派**，并围绕特定的音乐流派建立一个电台。


  ![images](img/p237-03.jpg)


  然后，你会看到新电台与其他电台列在一起。


  你最多可以在 Pandora 中创建 100 个电台。


  **提示：** 你可以通过点击屏幕顶部的**按日期**或**按字母顺序**按钮来整理你的电台。


  ![images](img/p238-01.jpg)


  ##### 调整 Pandora 的设置——你的帐户、升级等


  你可以通过点击屏幕右下角的设置图标来退出你的 Pandora 帐户、调整音频质量，甚至可以升级到 Pandora One（移除广告）。(见图 12-9。)


  ![images](img/1209.jpg)


  **图 12-9.** *Pandora 中的设置选项*


  要退出，请点击**退出**按钮。


  要调整音质，请将**蜂窝网络音频质量**下的开关移至**开**或**关**。当你处于蜂窝网络时，将其关闭可能更好，否则你在播放时可能会听到更多的跳播和暂停。


  当你处于强力 Wi-Fi 连接时，可以将其设置为**开**以获得更好的音质。请参阅我们的“连接到网络”章节以了解更多信息。


  为节省电池电量，你应将**自动锁定**设置为**开**，这是默认设置。如果你希望屏幕保持常亮，则将其切换为**关**。


  要移除所有广告，请点击**升级到 Pandora One** 按钮。将打开一个网页浏览器窗口，你会被带到 Pandora 的网站输入你的信用卡信息。在本书出版时，年度账户费用为
  36.00 美元，但当你阅读本书时，价格可能有所不同。


