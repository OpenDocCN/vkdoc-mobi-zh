  \ touch 上的`日历`应用。例如，我们将展示如何安排约会、管理多个日历、更改日历视图，甚至处理会议邀请。\n\n在 iOS 5 中，Apple 新增了`提醒事项`应用，用于轻松管理你的所有任务和待办列表。\n\
  \n**注意：** 本章大部分内容将讨论如何将你的 iPod touch 日历与另一个日历同步，因为让你的日历在 iPod touch 和其他地方都能访问是很方便的。如果你愿意，你也可以将你的\
  \ iPod touch 用作*独立*模式，即不与任何其他日历同步。在后一种情况下，我们描述的所有关于事件、查看和管理事件的步骤同样适用于你。然而，至关重要的是，你必须使用\
  \ iCloud 或 iTunes 自动备份功能来保存一份日历副本，以防你的 iPod touch 出现意外。\n\n### 在 iPod touch 上管理繁忙的生活\n\
  \n`日历`和`提醒事项`应用提供了强大且易于使用的功能，帮助你管理约会、跟踪待办事项、设置提醒闹钟，甚至创建和回复会议邀请（适用于 Exchange 和 iCloud\
  \ 用户）。\n\n#### 同步或共享日历和提醒事项\n\n如果你在电脑上维护日历或任务列表，或者在某个网站上维护日历（如 iCloud 或 Google 日历），那么你可以通过两种方式与该\
  \ iPod touch 同步或共享这些数据：使用 iTunes 应用和同步线缆，或设置无线同步（有关同步信息，请参阅第 3 章：“同步 iCloud、iTunes\
  \ 及更多”）。\n\n![image](img/p374-01.jpg)\n\n设置日历和任务同步后，根据你的同步设置，电脑上的所有日历约会和待办列表将自动与\
  \ iPod touch 日历同步（参见图 18–1）。\n\n如果你使用`iTunes`与日历（例如`Microsoft Outlook`或 Apple 的`iCal`）同步，每次将\
  \ iPod touch 连接到电脑时，约会和任务都会被传输或同步。\n\n如果你使用其他同步方法（例如 iCloud、Exchange 或类似服务），此同步是无线且自动的，并且在初始设置过程完成后，很可能无需你做任何操作。\n\
  \n![images](img/1801.jpg)\n\n**图 18–1**.*将 PC 或 Mac 日历同步到 iPod touch*\n\n#### 日历图标上显示的当天日期与星期\n\
  \n`日历`图标通常就在你的 iPod touch 的`主屏幕`上。你会很快注意到，`日历`图标会发生变化，显示当天的日期和星期。右侧的图标显示这是当月 16^日，星期五一。\n\
  \n![images](img/p375-01.jpg)\n\n**提示：** 如果你经常使用 iPod touch 的`日历`应用，你可能需要考虑将其固定或移到底部程序坞；你已经在第\
  \ 6 章：“图标与文件夹”中关于固定图标的章节学习了如何操作。\n\n#### 查看约会与在日历中导航\n\n`日历`应用的默认视图显示`日`视图。此视图让你一目了然地查看当天即将到来的约会。约会会显示在你的日历中。如果你的电脑上设置了多个日历，例如`工作`和`家庭`，则来自不同日历的约会将在\
  \ iPod touch 的日历上以不同颜色显示。\n\n你可以通过多种方式操作日历：\n\n*   **逐日移动**：点击顶部当天日期旁边的三角形，可以向前或向后移动一天。\n\
  \n    **提示：** 长按日期旁边的三角形可以快速浏览多天。\n\n*   **更改视图**：点击底部的`列表`、`日`和`月`按钮来切换视图。\n* \
  \  **跳转到今天**：点击左下角的`今天`按钮。\n\n#### 四种日历视图\n\n你的`日历`应用提供四种视图。`日`、`列表`、`周`和`月`在竖屏方向下均可使用；你可以通过点击屏幕底部的视图名称在它们之间切换。`周`视图仅在横屏方向下可用，你可以通过将\
  \ iPod touch 侧向旋转来切换到该视图。以下是四种视图的快速概览：\n\n*   **日视图**：当你启动 iPod touch 的`日历`应用时，默认视图通常是`日`视图。这让你能快速查看当天安排的所有事项。你可以在`日历`应用底部找到更改视图的按钮。\n\
  \n    ![images](img/p376-01.jpg)\n\n    要从一天转到下一天，只需从右向左滑动。要回到上一天，则从左向右滑动。\n\n \
  \   ![images](img/p376-02.jpg)\n\n*   **列表视图**（也称为**议程**视图）：点击底部的`列表`按钮，你可以看到一个约会的列表。\n\
  \n    根据你的日程安排量，你可能会看到下一天甚至下一周的计划事件。\n\n    向上或向下滑动以查看更多事件。\n\n    ![images](img/p376-03.jpg)\n\
  \n*   **月视图**：点击底部的`月`按钮，你可以看到整个月的布局。有约会的日子会显示一个小点。当天的点会以蓝色高亮显示。\n\n    ![images](img/p377-01.jpg)\n\
  \n    **提示：** 要返回`今天`视图，只需点击左下角的`今天`按钮。\n\n    ![images](img/p377-02.jpg)\n\n  \
  \  **转到下个月**：点击顶部显示的月份右侧的三角形。\n\n    **转到上个月**：点击月份左侧的三角形。\n\n*   **周视图**：将 iPod\
  \ touch 侧向旋转到横屏方向，即可访问周视图。\n*   向左或向右滑动以查看更多天数。\n\n    ![images](img/p377-03.jpg)\n\
  \n#### 使用多个日历\n\n`日历`应用允许你查看和使用多个日历。你所看到的日历数量取决于你同步了多少个。例如，你可能为家庭同步了 iCloud 或 Google\
  \ 日历，为工作同步了 Exchange。\n\n> 要一次只查看一个日历，请点击顶部的`日历`按钮，然后只选择你想要查看的日历。\n\n![images](img/p378-01.jpg)\n\
  \n当你设置`同步`设置时，你可以指定要将哪些日历与你的 iPod touch 同步。你可以按照以下说明进一步自定义你的日历：\n\n*   **更改颜色**：如果你不喜欢\
  \ iPod touch 上某个日历的颜色，更改起来很容易：\n\n    *   点击右上角的`日历`按钮。\n    *   点击右上角的`编辑`按钮。\n\
  \    *   点击你想要更改的日历。\n    *   你会看到一系列颜色选项。点击你喜欢的颜色，新颜色就会设置好。\n\n    ![images](img/p378-02.jpg)\n\
  \n*   **添加新日历**：如果你使用 iCloud 进行同步，你可以在 iPod touch 上添加新日历：\n\n    1.  点击右上角的`日历`。\n\
  \    2.  点击右上角的`编辑`。\n    3.  向下滚动并点击 iCloud 部分中的`添加日历…`。\n    4.  输入名称并为新日历选择颜色，这样就完成了！\n\
  \n    ![images](img/p379-01.jpg)\n\n### 添加新的日历事件\n\n你可以在 iPod touch 上轻松添加新的事件或约会。这些新的事件和约会将在下次同步时与你的电脑同步（或共享）。\n\
  \n\n\n#### 添加新日程\n\n你的第一反应很可能是尝试在屏幕上的特定时间点触碰来设定日程；而在 iOS 5 中，你终于可以这样操作了！\n\n![images](img/p380-01.jpg)\n\
  \n要从任意`日历`视图添加新的日历事件，请按照以下步骤操作：\n\n1.  在屏幕上你想设定日程的位置长按手指，直到出现一个新的彩色气泡。（你也可以继续点击屏幕右上角的`+`图标来添加新事件。）\n\
  \n    ![images](img/p380-02.jpg)\n\n2.  在`添加事件`屏幕上，点击标记为`标题与位置`的输入框。\n\n    输入事件的标题和位置（可选）。例如，你可以输入“与马丁会面”作为标题，并将位置设为“办公室”。或者，你也可以输入“与马丁共进午餐”，然后选择纽约市一家非常昂贵的餐厅。\n\
  \n3.  点击右上角的蓝色`完成`按钮，返回`添加事件`屏幕。\n\n    ![images](img/p380-03.jpg)\n\n4.  点击`开始`或`结束`标签来调整事件时间。要更改开始时间，请点击`开始`字段使其高亮显示为蓝色。接着，移动底部的旋转拨盘，以调整到正确的日期和日程开始时间。\n\
  \n    ![images](img/p381-01.jpg)\n\n5.  或者，你也可以通过点击`全天`旁边的开关，将其设置为`开启`，来设定一个全天事件。\n\
  \n**注意：** 仅当你的事件设置在 Exchange/Google 或 iCloud 日历时，你才会在`重复`标签之后看到名为`受邀人`的标签。\n\n####\
  \ 重复事件\n\n你的一些日程可能是每天、每周或每月在同一时间发生。如果你正在安排一个重复事件，请按照以下步骤操作：\n\n1.  点击`重复`标签，然后从列表中选择重复事件的时间间隔。\n\
  2.  点击`完成`返回主`事件`屏幕。\n\n    ![images](img/p381-02.jpg)\n\n3.  如果你设置了`重复`会议，那么你还需要指定重复事件何时结束。点击`结束重复`按钮进行设置。\n\
  4.  你可以选择`永远重复`或设定一个具体日期。\n5.  完成后点击`完成`。\n\n    ![images](img/p382-01.jpg)\n\n\
  #### 日历提醒\n\n你可以让 iPod touch 4 在临近日程时发出声音提醒，即*提醒*。提醒功能可以帮助你避免忘记重要事件。请按照以下步骤创建提醒：\n\
  \n1.  点击`提醒`标签，然后选择一种提醒闹钟选项。你可以选择不设置闹钟（`无`），或者设置一个从`事件发生时`一直到`事件前 2 天`的提醒，具体取决于哪种最适合你。\n\
  2.  点击`完成`返回主`事件`屏幕。\n\n    ![images](img/p382-02.jpg)\n\n#### 第二次提醒\n\n**注意：**\
  \ 如果你使用的日历是通过 iTunes 或 iCloud 同步的，你会看到`第二次提醒`选项。但是，如果你的事件关联的是通过 Exchange 设置同步的 Google\
  \ 日历，则不会看到第二次提醒。\n\n![images](img/p383-01.jpg)\n\n在大多数情况下，一旦你设置了第一个`提醒`选项，你便会看到`第二次提醒`选项的标签。你可以将这第二次提醒设置在第一次提醒之前或之后的另一个时间。有些人发现第二次提醒对于记住关键事件或日程非常有帮助。\n\
  \n**提示：** 这里有一个实际例子，说明了什么时候你可能需要设置两次日历提醒。\n\n如果你的孩子有看医生或看牙医的预约，你可能想将第一次提醒设在预约前一晚。这可以提醒你给学校写一张便条并交给孩子。\n\
  \n然后，你可以将第二次提醒设在预约时间前 45 分钟。这样你就有足够的时间去学校接孩子并准时赴约。\n\n#### 选择日历\n\n![images](img/p383-02.jpg)\n\
  \n如果你使用多个日历，请点击`日历`标签来更改新事件所属的日历。\n\n点击左上角的`日历`按钮查看你所有的日历。\n\n点击你想用于此特定事件的日历。通常，默认选中的日历是你上次使用\
  \ iPod touch 安排事件时选择的那个。\n\n![images](img/p383-03.jpg)\n\n#### 忙闲状态\n\n你也可以让其他人了解你在计划事件期间的忙闲状态。你可以从以下选项中选择你的状态：`忙碌`（默认）、`空闲`、`待定`或`不在办公室`。（`待定`和`不在办公室`仅在你通过\
  \ Exchange 设置同步账户时出现。）\n\n![images](img/p384-01.jpg)\n\n**注意：** 仅当你用于此事件的日历与 iCloud、Exchange\
  \ 或 Exchange/Google 设置同步时，你才会看到`忙闲状态`或`受邀人`字段，并且每个设置提供的选项略有不同。如果你与 iCloud 同步，你还会看到一个`URL`字段，你可以在其中添加一个网址以备日后参考。\n\
  \n#### 向日历事件添加备注\n\n![images](img/p384-02.jpg)\n\n如果你想向日历事件添加备注，请按照以下步骤操作：\n\n![images](img/p384-03.jpg)\n\
  \n1.  点击`备注`，然后输入或复制粘贴一些备注内容。\n2.  点击`完成`结束添加备注。\n3.  再次点击`完成`保存你的新日历事件。\n\n**提示：**\
  \ 如果这是一次去新地方的会议，你可能想输入或复制粘贴一些行车路线。\n\n### 在邮件和日历应用之间使用复制与粘贴\n\niPod touch 软件新增的快速应用切换器意味着你现在可以轻松地在`邮件`和`日历`程序之间跳转，以复制和粘贴信息。这些信息可以是任何内容，从会议所需的紧要笔记到行车路线。请按照以下步骤在`邮件`和`日历`程序之间复制和粘贴信息：\n\
  \n1.  按照本章前面所述，创建一个新的日历事件或编辑一个现有事件。\n2.  向下滚动到`备注`字段并点击以打开它。\n3.  双击`主屏幕`按钮以调出快速应用切换器。\n\
  4.  如果你看到`邮件`图标，点击它。如果没有看到，请向左或向右滑动来寻找。找到后，点击它以打开`邮件`应用。\n\n    ![images](img/p385-01.jpg)\n\
  \n5.  双击一个单词，然后用手指拖动蓝色手柄以选择你要复制的文本。\n6.  点击`复制`按钮。\n\n    ![images](img/p385-02.jpg)\n\
  \n7.  双击`主屏幕`按钮以调出快速应用切换器。\n8.  点击`日历`图标。它应该是左边第一个图标，因为你刚刚从这个应用中跳转出来。\n\n    ![images](img/p386-01.jpg)\n\
  \n9.  现在，在`备注`字段中长按。当你松开手指时，你应该会看到`粘贴`弹出字段。如果没有看到，请将手指按住稍久一点，直到看到它为止。\n10.  点击`粘贴`。\n\
  \n    ![images](img/p386-02.jpg)\n\n11.  现在你应该会看到你复制并粘贴到`备注`字段中的文本。\n12.  点击`完成`保存你的更改。\n\
  \n    ![images](img/p386-03.jpg)\n\n\n好的，请查收翻译后的中文文档。\n\n\n### 编辑日程\n\n有时，日程的详细信息可能会发生变化而需要调整。幸运的是，在你的\
  \ iPod touch 上修改日程非常容易。如果你只是想更改时间，可以直接在屏幕上移动它。\n\n1.  按住你想要更改的日程。\n2.  将日程拖拽到新的时间段。\n\
  \n    如果你需要进行比“触摸并拖拽”更大幅度的调整，或者需要更改其他信息，你也可以使用`编辑`按钮。\n\n    ![images](img/p387-01.jpg)\n\
  \n3.  轻点你想要更改的日程。\n4.  轻点右上角的`编辑`按钮，进入显示日程详细信息的`编辑`界面。\n5.  触摸需要调整的字段标签，就像你创建事件时做的那样。例如，你可以通过触摸`开始`或`结束`标签，然后调整事件的开始或结束时间来更改此日程的时间。\n\
  \n#### 编辑重复事件\n\n编辑重复或周期性事件的方式与编辑其他任何事件完全相同。唯一的区别是，在完成编辑后，系统会询问你一个问题。你需要回答这个问题，然后轻点`完成`按钮。\n\
  \n如果你只想更改此重复事件中的这一个实例，请轻点`仅为此事件保存`。\n\n如果你想更改此重复事件的所有实例，请轻点`为将来事件保存`。\n\n![images](img/p388-01.jpg)\n\
  \n#### 将事件切换到不同日历\n\n如果你错误地将事件设置到了错误的日历中，那么可以继续轻点`日历`按钮来更改日历。接着，选择你已同步到 iPod touch\
  \ 上的其他日历之一。\n\n**注意：** 根据你选择的日历，某些字段可能会出现或消失。\n\n如果你将事件从通过`iTunes`同步的日历更改为与 Exchange\
  \ 同步的日历，那么你会看到`第二个提醒`字段消失。此外，在使用 Exchange、Google 或 iCloud 日历时，你还会看到两个新字段出现：`受邀人`和`忙闲状态`。\n\
  \n#### 删除事件\n\n请注意，在`编辑`界面的底部，你还可以选择删除此事件。只需轻点屏幕底部的`删除事件`按钮即可。\n\n![images](img/p388-02.jpg)\n\
  \n#### 会议邀请\n\n对于那些经常使用 Microsoft Exchange、`Microsoft Outlook` 或 iCloud 的用户来说，会议邀请已成为日常的一部分。你会在电子邮件中收到会议邀请，接受邀请后，日程便会自动添加到你的日历中。\n\
  \n在你的 iPod touch 上，你会看到你接受的邀请会立即被放入你的日历中。\n\n如果你在日历中轻点该会议邀请，可以看到所有你需要的详细信息：拨入号码、会议\
  \ ID 以及邀请中可能包含的任何其他详细信息。\n\n![images](img/p389-01.jpg)\n\n### 日历选项\n\n在你的`日历`应用中，只有少数几个选项可以调整；你可以在`设置`应用中找到它们。请按照以下步骤调整这些选项：\n\
  \n![images](img/p389-02.jpg)\n\n1.  从`主屏幕`轻点`设置`。\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n3.\
  \  向下滚动到`日历`（它位于最底部！）以查看几个选项。\n4.  第一个选项是一个简单的开关，用于通知你`新邀请提醒`。如果你收到任何会议邀请，最好将此选项保持为默认的`开启`状态。\n\
  \n    ![images](img/p389-03.jpg)\n\n5.  接下来，如果你使用 Exchange 或 iCloud 同步你的`日历`程序，可能会看到`同步`选项。你可以调整此设置，将事件同步到`过去\
  \ 2 周`、`过去 1 个月`、`过去 3 个月`、`过去 6 个月`，或显示`所有事件`。\n6.  接着，你可以选择你的时区。此设置应反映你设置 iPod\
  \ touch 时的`主屏幕`设置。如果你正在旅行并希望为不同的时区调整日程，你可以将`时区`值更改为你偏好的任何城市。\n\n    ![images](img/p390-01.jpg)\n\
  \n7.  可以为生日、事件和全天事件设置默认提醒时间。事件提供常规选项，而生日和全天事件则允许设置为事件当天、前一天、前两天（均在上午 9 点），或提前一周。\n\
  \n#### 更改默认日历\n\n我们之前提到过，你可以在 iPod touch 上显示多个日历。`默认日历`界面允许你选择哪个日历作为你的默认日历。\n\n\
  将某个日历指定为默认日历意味着，当你去安排新日程时，此日历将被默认选中。\n\n如果你想使用另一个日历——比如你的`工作`日历——那么你可以在实际设置日程时进行更改，如本章前面所示。\n\
  \n![images](img/p390-02.jpg)\n\n### 提醒事项\n\n`提醒事项`是 iOS 5 中的一个新应用，它让你可以简单轻松地追踪你需要完成的事项以及需要完成的日期和时间。你可以将这个应用视为苹果对任务或待办事项列表的解决方案。\n\
  \n#### 提醒事项视图\n\n你的`提醒事项`应用有三个主要视图：`列表`、`日期`和`月`。以下是这些视图的简要概述。\n\n`列表`是`提醒事项`的默认视图，能让你一目了然地看到所有需要完成的任务。\n\
  \n**注意：** 对于 iCloud 账户，默认的`列表`视图称为`提醒事项`。对于 Microsoft Exchange 账户，默认的`列表`视图称为`任务`。\n\
  \n如果你有多个列表，可以通过从右向左滑动在它们之间切换，就像在你的 iPod touch `主屏幕`的不同应用页面之间切换一样。\n\n从左向右滑动可以查看你的`已完成`任务列表。\n\
  \n![images](img/p391-01.jpg)\n\n`日期`视图让你可以在提醒事项到期的当天查看它们。你可以轻松地从一天滑动到下一天；也可以滚动底部的`日期`滑块。按照以下步骤更改显示的日期：\n\
  \n*   **转到下一天**：从右向左滑动。\n*   **转到前一天**：从左向右滑动。\n*   **转到已完成任务列表**：从当前日期从左向右滑动。\n\
  \n![images](img/p391-02.jpg)\n\n**提示**：要返回`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/p391-03.jpg)\n\
  \n要查看`月`视图，请轻点`日期`视图左上角的`月`按钮 ![images](img/p392-01.jpg)。这将显示整个月的布局。有提醒事项到期的日期会显示为红色。\n\
  \n**提示**：要返回`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/p392-03.jpg)\n\n按照以下步骤在月份之间前后切换：\n\
  \n![images](img/p392-02.jpg)\n\n*   **转到下个月：** 向下滚动。\n*   **转到上个月：** 向上滚动。\n\n####\
  \ 添加新提醒事项\n\n要从任意`列表`视图中添加新任务，请按照以下步骤操作：\n\n![images](img/p392-04.jpg)\n\n1.  轻点当前列表末尾的第一个空白行。\n\
  2.  输入你的任务标题。\n3.  完成后，轻点右上角的黑色`完成`按钮。\n\n    **注意：** 你也可以轻点`添加`按钮来创建新任务。![images](img/p392-05.jpg)\n\
  \n#### 添加提醒事项详情\n\n要为任务添加详细信息，请轻点任务的标题。`详情`界面让你可以添加`提醒我`的截止日期、提醒的`优先级`、你希望将其附加到的`列表`，以及你可能想要添加的任何`备注`。\n\
  \n`详情`页面也是你可以删除任务的地方。\n\n**注意：** 如果一开始没有看到所有选项，请轻点`显示更多`按钮以展开它们。\n\n![images](img/p393-01.jpg)\n\
  \n\n\n### 设置截止日期\n\n`Reminders`（提醒事项）应用包含标准的截止日期，你可以为提醒事项设置该日期。当任务到达截止日期时，你会收到弹窗通知，提醒你该任务。\n\
  \n请按照以下步骤设置`提醒我`的日期：\n\n1.  轻点`提醒我`。\n2.  要设置截止日期，请将`在某天`选项切换为`开启`。默认情况下，日期将设置为当天。\n\
  3.  要更改日期，请轻点日期并移动底部的旋转拨盘，以调整为任务的正确日期。\n4.  轻点`完成`返回主`详情`屏幕。\n\n![images](img/p394-01.jpg)\n\
  \n#### 重复提醒\n\n部分提醒事项需要在每天、每周或每月的同一时间或地点触发。如果你正在安排重复或循环的任务，请按以下步骤操作：\n\n1.  在`详情`屏幕上，轻点`重复`标签，然后从列表中选择重复事件的时间间隔。\n\
  2.  轻点`完成`返回主`详情`屏幕。\n\n![images](img/p394-02.jpg)\n\n#### 更改列表\n\n每个提醒事项都属于一个列表。你可以有工作列表、家庭列表、假期列表、购物列表——任何你喜欢的列表。`详情`页面将显示当前与新任务关联的列表名称。请按照以下步骤更改当前列表：\n\
  \n1.  轻点当前的列表名称。\n2.  轻点你想要切换到的列表。\n\n![images](img/p395-01.jpg)\n\n![images](img/p395-02.jpg)\n\
  \n#### 为任务添加备注\n\n如果你想为任务添加一些备注，请按照以下步骤操作：\n\n1.  轻点`备注`，然后键入或复制粘贴一些注释。\n2.  轻点`完成`以结束添加备注。\n\
  \n![images](img/p395-03.jpg)\n\n**提示：** 如果这是一个购物列表，你可能希望包含一些额外信息，比如衣服尺码、食品品牌或其他可能有帮助的内容。\n\
  \n### 完成提醒事项\n\n将提醒事项标记为`已完成`非常容易。只需轻点提醒事项标题正左侧的方框，就会出现一个`勾选标记`图标。这将把该提醒事项从其当前列表移至特殊的`已完成`列表，以便你日后必要时可以返回并查阅。\n\
  \n如果你操作失误，只需再次轻点该方框，移除`勾选标记`图标，并将提醒事项恢复至其之前的状态。如果该任务已经被移动到`已完成`列表，向左滑动直到你进入`已完成`列表，然后轻点该方框取消勾选，即可将提醒事项移回其之前的列表。\n\
  \n![images](img/p395-01.jpg)\n\n### 编辑提醒事项\n\n有时，任务的详细信息可能会发生变化，需要进行调整。幸运的是，更改任何提醒事项只需遵循以下简单步骤：\n\
  \n1.  轻点你想要更改的提醒事项。\n2.  轻点`详情`页面上的标签并调整详细信息，就像你设置新任务时一样。\n\n![images](img/p397-01.jpg)\n\
  \n#### 删除提醒事项\n\n请注意，在`详情`屏幕底部，你还可以选择删除任务。只需轻点屏幕底部的`删除`按钮即可。\n\n![images](img/p397-02.jpg)\n\
  \n### 添加新列表\n\n`Reminders`（提醒事项）应用允许你拥有多个列表，这对于保持任务条理性非常方便。例如，你可以创建一个新列表来帮助你整理即将到来的旅行物品，或者为即将到来的生日购物。\n\
  \n你可以为`iCloud 提醒事项`或`Exchange 任务`帐户创建新列表，也可以创建本地列表（`在我的 iPod touch 上`）。请按照以下步骤创建一个新列表：\n\
  \n1.  轻点屏幕左上角的`列表`按钮 ![images](img/p398-01.jpg)。\n2.  在`列表`页面，轻点右上角的`编辑`按钮。\n3.\
  \  如果你有多个帐户与`提醒事项`同步，请选择你要添加新列表的帐户。\n4.  轻点`创建新列表…`标签。\n5.  输入你的新列表名称。\n6.  轻点右上角的`完成`按钮。\n\
  \n![images](img/p398-02.jpg)\n\n### 移动和删除列表\n\n在`列表`页面，你还可以移动和删除列表。\n\n要移动列表，请长按最右侧的`抓手`图标，然后将其拖拽到新位置。\n\
  \n要删除列表，请轻点列表名称左侧的红色`圆圈`图标，然后轻点`删除`按钮确认你的选择。\n\n### 提醒事项选项\n\n在`提醒事项`应用中，只有两个选项可以调整；你可以在`设置`应用中找到它们：\n\
  \n1.  从你的`主屏幕`轻点`设置`图标。\n\n   ![images](img/p399-01.jpg)\n\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n\
  3.  向下滚动到`提醒事项`（它位于最底部！）以查看这两个选项。\n\n   ![images](img/p399-02.jpg)\n\n4.  第一个选项是`同步`。你可以调整此设置，以同步`过去\
  \ 2 周`、`过去 1 个月`、`过去 3 个月`、`过去 6 个月`，或显示`所有提醒事项`。\n\n#### 更改默认列表\n\n我们之前提到过，你可以在你的\
  \ iPod touch 上显示多个列表。`默认列表`屏幕允许你选择哪个列表将成为你的默认列表。\n\n指定一个列表作为默认列表意味着，当你创建一个新提醒事项时，它将被默认分配到该指定列表。\n\
  \n![images](img/p399-03.jpg)\n\n"
- "# 第 19 章\n\n## 使用照片\n\n虽然之前的 iPod touch 机型都包含后置摄像头，但最新的 iPod touch 配备的不是一个，而是两个摄像头：一个\
  \ 960 × 720 像素的后置摄像头；以及一个用于视频聊天和自拍的 VGA（640 × 480 像素）前置摄像头。关于如何使用前置摄像头的更多信息，请参阅第\
  \ 10 章：“视频消息与 Skype”。\n\n在 iPod touch 上查看和分享你的照片确实是一种享受，这在很大程度上得益于其精美的、高分辨率的屏幕。在本章中，我们将讨论将照片导入\
  \ iPod touch 的多种方法。我们还将向你展示如何使用触摸屏浏览照片，以及如何进行缩放和操作照片。\n\n**提示：** 你知道吗，你可以同时按下两个按键来截取\
  \ iPod touch 的整个屏幕？这对于向某人展示一个很酷的应用，或者证明你在`俄罗斯方块`中获得了最高分非常有用！\n\n操作方法如下：同时按下`主屏幕`按钮和顶部右侧的`开/关/睡眠`键（你可以先按住一个键，再按下另一个键）。这有点小技巧，需要一些练习。如果你操作正确，屏幕会闪烁，并且你会听到相机快门声。你进行的屏幕截取将保存在`照片`应用中的`相机胶卷`相册里。\n\
  \n\n\n### 快速拍照\n\nApple 最近增加了一些出色的快捷方式，帮助您更快速、更方便地拍照。如果您的孩子正处于特别可爱或值得纪念的时刻，如果您在树林中遇到一只稀有的鸟类，或者您需要快速拍下社区中可疑事物的照片，那么您可以使用以下技巧之一快速抓拍：\n\
  \n- 双击`Home`按钮，在`Lock`屏幕上直接显示`Camera`图标。点击`Camera`图标将直接跳转到`Camera`应用，准备拍照。这意味着您不再需要解锁`iPod\
  \ touch`、滑动查找`Camera`应用，然后等待其启动。\n- 使用`Volume Up`硬件按钮拍照。您可以利用更具触感的、类似于传统相机控制的方式，而不必费力点击屏幕上的相机软件按钮。\n\
  - 拍摄多张照片。Apple 声称已将拍摄第一张照片的时间缩短至惊人的 1.1 秒；然而，第二张照片——以及此后的每一张照片——现在仅需 0.5 秒。这对于运动或任何其他快速移动的活动特别方便。只需尽可能快地持续按下音量增大键即可。\n\
  - 自动对焦和人脸检测意味着您朋友和家人的快照会自动变得更清晰，曝光也更佳。\n\n#### 使用相机应用\n\n`Camera`应用应该位于您的`Home`页面上——通常在第一屏的顶部。如果您没有看到它，请向左或向右滑动直到找到它。\n\
  \n![images](img/p402-01.jpg)\n\n触摸`Camera`图标，相机快门会以动画效果在屏幕上打开。\n\n快门打开后，您会在顶部找到用于设置`Flash`为`On`、`Off`或`Auto`的控件；用于设置`Grid`叠加和`HDR`（高动态范围）为`On`或`Off`的`Options`；以及用于在前置摄像头和后置摄像头之间切换的切换开关。在底部，您会找到用于跳转到`Camera\
  \ Roll`相册的缩略图、用于拍照的`Camera`按钮，以及用于在静态照片和视频录制模式之间切换的滑块。\n\n![images](img/p402-02.jpg)\n\
  \n**提示：** 您也可以通过按下`Volume Up`硬件按钮来拍照或开始视频录制。\n\n##### 地理标签\n\n地理标签是一项将您的地理近似坐标嵌入到图片文件中的功能。`iPod\
  \ touch`使用`Wi-Fi`信号来帮助确定其大致位置。如果您将图片上传到像`Flickr`这样的程序，您的朋友可以使用您图片的坐标来定位您以及图片拍摄的地点。\n\
  \n**注意：** 对于 Mac 用户，`iPhoto`使用地理标签将照片放入`iPhoto`的`Places`类别中。\n\n如果您在启动相机时将`Location\
  \ Services`设置为`ON`（请参阅第 1 章：“入门”），系统会询问是否允许使用您当前的位置。\n\n要再次检查此设置，请执行以下操作：\n\n1.\
  \ 启动您的`Settings`应用。\n2. 前往`General`。\n3. 触摸`Location Services`。您将看到类似于下方的屏幕。\n4.\
  \ 确保`Camera`旁边的开关已切换为`ON`。\n\n    ![images](img/p403-01.jpg)\n\n##### 拍照\n\n拍照就像指向和拍摄一样简单，但如果您愿意，还可以进行一些调整。\n\
  \n一旦相机打开，将您的拍摄对象对准在`iPod touch`屏幕中央。\n\n![images](img/p404-01.jpg)\n\n当您准备好拍照时，只需触摸底部的`Camera`按钮，或按下`iPod\
  \ touch`侧面的`Volume Up`硬件按钮（带有`+`的按钮）。您会听到快门声，屏幕会显示一个动画，表示正在拍照。\n\n拍照完成后，照片会落入左下角的窗口中。触摸那个小缩略图，`Photos`应用的`Camera\
  \ Roll`相册就会加载。\n\n###### 使用变焦\n\n`iPod touch`包含一个 5 倍数码变焦功能。\n\n**注意：** 数码变焦的清晰度永远比不上光学变焦，因此请注意，使用变焦时图片质量通常会略有下降。\n\
  \n要使用变焦，只需用两根手指触摸屏幕并捏合以放大或缩小。手指分开得越远，缩小得就越远。变焦开始后，还会出现一个变焦滑块来帮助您更改变焦级别。\n\n![images](img/p404-02.jpg)\n\
  \n###### 相机选项\n\n为了帮助您拍摄更好的照片，Apple 内置了`Grid`参考线。\n\n`Grid`选项会在屏幕上叠加两条水平线和两条垂直线。这可以帮助您正确地构图。它还可以帮助您确保人像中面部和眼睛看起来很棒，静物图像中的物品看起来很棒，以及风景中的景色保持平衡。\n\
  \n![images](img/p405-01.jpg)\n\n###### 切换相机\n\n如前所述，`iPod touch`配备了两个摄像头：一个用于大多数摄影的\
  \ 800 万像素后置摄像头，以及一个用于自拍或`FaceTime`视频通话（请参阅第 10 章：“视频消息和 Skype”）的 VGA（640 × 480）前置摄像头。\n\
  \n![images](img/p405-02.jpg)\n\n![images](img/p405-03.jpg)\n\n要在摄像头之间切换，请执行以下操作：\n\
  \n1. 从`Camera`应用中触摸`Switch Camera`图标。\n2. 等待相机切换到前置摄像头并对准镜头。\n3. 再次触摸`Switch Camera`图标以切换回标准摄像头。\n\
  \n**提示：** 由于前置摄像头的放置位置，面部看起来可能会有些扭曲。试着将您的面部稍微向后移并调整相机角度，以获得更好的图像。\n\n##### 查看已拍摄的照片\n\
  \n您的`iPod touch`会将您拍摄的照片存储在名为`Camera Roll`的相册中。您可以从`Camera`和`Photos`应用内部访问`Camera\
  \ Roll`。在`Camera`应用中，触摸`Camera`屏幕左下角的`Pictures`图标。\n\n![images](img/p406-01.jpg)\n\
  \n一旦触摸某张照片进行查看，您就可以滑动浏览照片，查看`Camera Roll`中的所有图片。\n\n![images](img/p406-02.jpg)\n\
  \n![images](img/p406-03.jpg) 要返回`Camera Roll`，请按左上角的`Camera Roll`按钮。\n\n![images](img/p406-04.jpg)\
  \ 要拍摄另一张照片，请触摸右上角的`Done`按钮。\n\n\n\n### 编辑照片\n\n借助 iOS 5，您现在可以直接在 iPod touch 上进行基本的照片编辑。您可以旋转照片；增强曝光度、对比度和色阶；裁剪照片；甚至还能自动去除亲友照片中的红眼。\n\
  \n请按照以下步骤编辑照片：\n\n1.  浏览到您想要编辑的照片。\n2.  点击右上角的`编辑`按钮。\n\n请按照以下步骤旋转照片：\n\n1.  点击左下角的`旋转`箭头\
  \ ![images](img/p407-01.jpg) 按钮，将照片逆时针旋转 90 度（向左旋转）。\n2.  再次点击`旋转`按钮，继续以 90 度为增量进行旋转。\n\
  3.  当您将图像旋转到所需位置后，点击右上角的黄色`存储`按钮。\n\n同样，请按照以下步骤自动增强照片：\n\n1.  点击`自动增强` ![images](img/p407-02.jpg)\
  \ 魔棒按钮。\n2.  如果您对结果满意，请点击右上角的黄色`存储`按钮。\n3.  如果您对结果不满意，请再次点击`自动增强`将其设置为`关闭`。\n4.\
  \  点击`取消`退出自动增强模式。\n\n请按照以下步骤去除照片中的红眼：\n\n1.  点击`红眼` ![images](img/p407-03.jpg)\
  \ 按钮以激活红眼去除功能。\n2.  点击照片中的每个红眼以应用去除效果（即去除眼中的红色）。\n3.  如果您对结果满意，请点击左上角的`应用`按钮。\n\
  4.  如果您对结果不满意，请再次点击每个红眼以撤销去除效果。\n5.  点击`取消`退出此模式。\n\n最后，请按照以下步骤裁剪照片：\n\n1.  点击右下角的`裁剪`\
  \ ![images](img/p408-01.jpg) 按钮。照片上会出现一个九宫格网格。\n2.  触摸网格的边缘或角落并拖动，使裁剪区域更高、更矮、更窄或更宽。\n\
  3.  触摸网格内部并拖动，使网格后的照片移动。\n4.  双指捏合或张开以放大或缩小网格内的照片。\n5.  点击`约束`按钮，从标准宽高比列表中进行选择，包括`原始`；`正方形`；传统照片比例如`3\
  \ × 2`、`4 × 6`和`8 × 10`；电视比例如`SD 4 × 3`和`HD 16 × 9`等等。\n6.  如果您对裁剪结果满意，请点击右上角的黄色`裁剪`按钮以应用更改。\n\
  7.  如果您不喜欢裁剪结果，请点击左上角的`取消`按钮返回`编辑`屏幕。\n\n![images](img/p408-02.jpg)\n\n### 将照片导入您的\
  \ iPod touch\n\n您有多种选项可以将照片加载到设备上：\n\n- **使用 iCloud 或 iTunes 同步：** 将照片加载到 iPod touch\
  \ 上最简单的方法可能是使用 iCloud 或 iTunes 从电脑同步照片（请参阅图 19–1）。我们将在第 3 章：“与 iCloud、iTunes 等同步”中详细介绍此方法。\n\
  - **作为电子邮件附件接收：** 虽然这对大量照片不太实用，但处理一张甚至几张照片效果很好。请查看第 16 章：“使用电子邮件通信”，了解有关如何保存附件的更多详细信息。（保存后，这些图像会出现在“相机胶卷”相册中。）\n\
  - **从 Web 保存图像：** 有时您会在网站上看到一张很棒的图片。长按该图片以查看弹出菜单，然后选择`存储图像`。（与其他已保存图像一样，这些图像最终会出现在“相机胶卷”相册中。）\n\
  - **从应用程序内下载图像：** 第 8 章：“个性化与安全”中展示的壁纸图像就是一个很好的例子。\n- **与 iPhoto 同步**（适用于 Mac 用户）：如果您使用\
  \ Mac 电脑，您的 iPod touch 很可能会自动与`iPhoto`同步。以下是启动并运行`iPhoto`中同步功能的几个步骤：\n    1.  连接您的\
  \ iPod touch 并启动`iTunes`应用程序。\n    2.  前往同步选项顶行中的`照片`选项卡。\n    3.  选择您希望与 iPod touch\
  \ 保持同步的`相簿`、`事件`、`面孔`或`地点`。\n\n![images](img/1901.jpg)\n\n**图 19–1.** *从`iTunes`中选择要与\
  \ iPod touch 同步的相簿、面孔或事件*\n\n- **拖放**（适用于 Windows 用户）：将 iPod touch 连接到 Windows 电脑后，它会作为便携式设备出现在`Windows\
  \ 资源管理器`中，如图 19–2 所示。请按照以下步骤在 iPod touch 和电脑之间拖放照片：\n    1.  双击`便携式设备`下的`iPod touch`图标将其打开。\n\
  \    2.  双击`Internal Storage`将其打开。\n    3.  双击`DCIM`将其打开。\n    4.  接下来，您可能会看到一个或多个名称奇特的文件夹，例如：`823WGTMA`、`860OKMZO`和`965YOKDJ`。尝试双击打开每个文件夹。其中一个文件夹包含您要找的照片或视频。\n\
  \    5.  您将看到 iPod touch 上“已存储的照片”相册中的所有图像。\n    6.  要从 iPod touch 复制图像，请选择图像，然后将它们从此文件夹拖放到您的电脑上。您无法使用此拖放方法将图像复制到\
  \ iPod touch。为此，您可以使用 iTunes 或 iCloud。\n\n![images](img/1902.jpg)\n\n**图 19–2\\\
  .** *`Windows 资源管理器`将 iPod touch 显示为便携式设备（通过 USB 线缆连接）*\n\n**提示：在 Windows 中选择多张图像**\n\
  \n在 Windows 中，您有几种选择图像的方法：您可以围绕图像画一个矩形框选，单击单张图像，或按 `Ctrl+A` 全选。您也可以按住 `Ctrl` 键并逐一单击图像以选择它们。右键单击其中一张选中的图片，然后选择`剪切`（移动）或`复制`（复制）所有选中的图像。要粘贴图像，请点击任意其他磁盘或文件夹（例如`我的文档`），然后导航到您要移动或复制文件的目标位置。最后，再次右键单击并选择`粘贴`。\n\
  \n### 查看您的照片\n\n现在您的照片已在 iPod touch 上，您有几种非常酷的方式来浏览它们并向他人展示。\n\n#### 从“照片”图标启动\n\
  \n如果您喜欢使用`照片`应用，如果它尚未在底部 Dock 中，您可能希望将它的图标放在那里以便快速访问（请参阅第 6 章：“图标与文件夹”）。\n\n要开始使用照片，请触摸`照片`图标。\n\
  \n![images](img/p412-01.jpg)\n\n第一个屏幕会显示您的相簿，这些相簿是在您设置 iPod touch 并同步 iCloud 或 iTunes\
  \ 时创建的。在第 3 章：“与 iCloud、iTunes 等同步”中，我们向您展示了如何选择要与 iPod touch 同步的照片。当您更改电脑上的照片库时，这些更改将自动在\
  \ iPod touch 上更新。\n\n如果您正在使用 iCloud 的照片流功能，那么在这里您也能找到您的照片流图像。\n\n![images](img/p412-02.jpg)\n\
  \n#### 选择一个图库\n\n在`相簿`页面上，触摸其中一个图库按钮以显示该相簿中的照片。在右侧的图像中，我们触摸了一个照片图库，屏幕立即切换，显示了该图库中照片的缩略图。\n\
  \n上下滑动手指可以查看图库中的所有照片。您也可以向上或向下轻扫，以快速浏览整个相簿。\n\n![images](img/p413-01.jpg)\n\n\n\n\
  ### 管理图库\n\niOS 5 新增了在 iPod touch 上直接添加相簿、在相簿间移动照片以及删除相簿的功能。\n\n请按照以下步骤添加新相簿：\n\n\
  1.  点击右上角的`编辑`按钮。\n2.  点击左上角出现的`添加`按钮。\n3.  为你的新相簿输入一个名称。\n4.  点击右上角的`完成`。\n\n![images](img/p413-02.jpg)\n\
  \n请按照以下步骤删除相簿：\n\n1.  点击右上角的`编辑`按钮。\n2.  点击你要删除的相簿左侧的红色`圆圈`图标。\n3.  点击红色的`删除`按钮进行确认。\n\
  \n最后，按照以下步骤在相簿间移动照片：\n\n1.  点击左下角的`操作`按钮。\n2.  点击你想要移动的照片。\n3.  如果不小心点到了某张照片，只需再次点击即可取消选择。\n\
  4.  点击底部的`添加到`按钮。\n5.  如果你已有想要移入照片的相簿，请选择`添加到现有相簿`。或者，如果你现在想创建一个新相簿，可以选择`添加到新相簿`。\n\
  \n#### 处理单张照片\n\n找到你想要查看的照片后，直接点击它。照片随即会加载到屏幕上。\n\n**注意：** 如果你的照片是以横向模式拍摄的，它们在 iPod\
  \ touch 上通常不会占满整个屏幕。\n\n![images](img/p414-01.jpg)\n\n**提示：** 这里展示的照片是以横向模式拍摄的；若要全屏查看，只需将\
  \ iPod touch 侧转，或双击它即可。\n\n##### 在照片间切换\n\n使用滑动手势可以在照片之间切换。只需在屏幕上向左或向右滑动手指，就能浏览你的照片。\n\
  \n**提示：** 慢慢地拖动手指可以在照片库中更平缓地移动。\n\n![images](img/p415-01.jpg)\n\n当浏览到相簿末尾时，只需点击屏幕一次，左上角就会出现一个显示该相簿名称的标签。点击那个标签，你就会返回到该相簿的缩略图页面。\n\
  \n![images](img/p415-02.jpg)\n\n要返回主相簿页面，请点击左上角写着`相簿`的按钮。\n\n![images](img/p415-03.jpg)\n\
  \n##### 放大和缩小照片\n\n如本书“入门指南”部分所述，在 iPod touch 上有两种方法可以放大和缩小照片：双击和双指捏合。\n\n######\
  \ 双击\n\n顾名思义，双击就是在屏幕上快速点击两次以放大照片（参见图 19–3）。你会在双击的位置放大。要缩小，只需再双击一次。\n\n有关双击的更多信息，请参见第\
  \ 1 章：“入门指南”。\n\n![images](img/1903.jpg)\n\n**图 19–3.** *双击照片以放大查看*\n\n###### 双指捏合\n\
  \n同样如第 1 章：“入门指南”所述，双指捏合是一种更精确的缩放方式。双击只能以固定的程度放大或缩小，而双指捏合则允许你进行细微或大幅度的缩放。\n\n要进行捏合缩放，先将拇指和食指并拢，然后在接触屏幕的同时缓慢分开两指，使照片变大。要缩小，则将拇指和食指分开，然后并拢。\n\
  \n**注意：** 一旦你通过任一种方法激活了缩放功能，在将照片恢复到标准尺寸之前，你将无法在照片之间自如地滑动。\n\n#### 查看幻灯片放映\n\n如果你愿意，可以将相簿中的照片以幻灯片放映的形式进行查看。只需点击屏幕一次以调出屏幕软键。在屏幕中央，你会看到一个`播放幻灯片`按钮——点击一次即可开始播放幻灯片。你可以从正在查看的任何一张照片开始幻灯片放映。\n\
  \n![images](img/p417-01.jpg)\n\n在`设置`应用中选择`照片`，可以调整每张照片在屏幕上停留的时间，以及`重复播放`和`随机播放`等其他设置（参见图\
  \ 19–4）。要结束幻灯片放映，只需点击屏幕即可。\n\n![images](img/1904.jpg)\n\n**图 19–4.** *配置幻灯片放映*\n\
  \n#### 将照片用作 iPod touch 墙纸\n\n我们将在第 8 章：“个性化和安全设置”中向你展示如何选择并将某张照片用作 iPod touch 墙纸（以及其他墙纸选项）。\n\
  \n**注意：** 你可以为`主屏幕`和`锁定屏幕`设置不同的照片，也可以对两者使用同一张照片。\n\n#### 通过电子邮件或推特发送照片\n\n只要你拥有有效的互联网连接（参见第\
  \ 4 章：“连接网络”），你就可以将照片库中的任何照片通过电子邮件发送或发布到 Twitter 上。点击缩略图栏上的`选项`按钮——这是底部软键行中最左侧的按钮。如果你看不到这些图标，请点击屏幕一次。\n\
  \n![images](img/p418-01.jpg)\n\n要邮寄照片，请选择`邮寄照片`选项，`邮件`应用将会自动启动。\n\n像你在第 16 章：“使用电子邮件通信”中做过的那样，点击`收件人`字段，然后选择接收照片的联系人。点击蓝色的`加号`（`+`）按钮来添加联系人。\n\
  \n输入主题和正文，然后点击右上角的`发送`——就这样简单。\n\n![images](img/p418-02.jpg)\n\n要发送推文，请选择`推文`选项，一个`Twitter`表单将会自动出现。只需填写你想随照片一起显示的消息，然后点击`发送`按钮。\n\
  \n**注意：** 只有在`设置`应用中输入了你的 Twitter 用户名和密码后，`推文`选项才会出现。\n\n![images](img/p418-03.jpg)\n\
  \n#### 同时共享、复制、打印或删除多张照片\n\n如果你有多个照片想要同时通过电子邮件发送、信息发送、复制、打印或删除，可以在缩略图视图中进行操作：\n\n\
  1.  点击左下角的`操作`按钮。\n\n    ![images](img/p419-01.jpg)\n\n2.  点击你想要选择的照片。\n3.  如果不小心点到了某张照片，只需再次点击即可取消选择。\n\
  4.  从屏幕底部选择一个操作：`共享`（电子邮件、信息或打印）、`复制`、`添加到`（另一个相簿）或`删除`。\n\n    ![images](img/p419-02.jpg)\n\
  \n**注意：** `复制`功能允许你将多张照片复制并粘贴到电子邮件或其他应用中。`共享`会将图像重命名为 `photo.png`，而`复制-粘贴`则会在 DCIM\
  \ 文件夹的文件名后添加 `.png` 扩展名。\n\n在本书出版时，你无法同时共享多个视频，也不能同时共享超过五张照片。这在未来的软件版本中可能会有所改变。\n\
  \n\n\n#### 为联系人分配照片\n\n第 17 章：“通讯录与备忘录”展示了如何在编辑联系人时添加照片。你也可以找一张喜欢的照片并将其分配给联系人。首先找到你想使用的照片。\n\
  \n与设置壁纸和通过电子邮件发送照片时的操作一样，轻点**操作**按钮——即上方软键行最右侧的那个按钮。如果你没看到图标，轻点屏幕一次。\n\n触碰**操作**按钮后，你会看到一个下拉选项列表：**用电子邮件发送照片**、**信息**、**分配给联系人**、**用作墙纸**、**推文**和**打印**。\n\
  \n触碰**分配给联系人**按钮。\n\n![images](img/p420-01.jpg)\n\n屏幕上会显示你的联系人列表。你可以使用顶部的**搜索**栏进行搜索，或者直接滚动浏览联系人。\n\
  \n一旦找到你想要将照片添加为收件人的联系人，就触碰该姓名。\n\n![images](img/p421-01.jpg)\n\n接着你会看到**移动和缩放**屏幕。拖动照片进行移动；使用捏合手势放大或缩小。\n\
  \n当照片调整到满意的位置后，触碰**设定照片**按钮，将该照片分配给该联系人。\n\n![images](img/p421-02.jpg)\n\n**注：**操作完成后你将返回照片图库，而非联系人界面。如果你想再次确认照片已成功分配给联系人，只需退出**照片**应用，打开**通讯录**应用，然后搜索该联系人即可。\n\
  \n#### 在 Apple TV 上查看照片\n\n第 5 章：“AirPlay 与蓝牙”展示了如何使用苹果的 AirPlay 功能，通过本地 Wi-Fi 网络将\
  \ iPod touch 上的视频流式传输到 Apple TV。苹果在“照片”应用中内置了相同的功能，因此你可以轻松地将照片投射到大屏幕电视上。\n\n![images](img/p422-01.jpg)\n\
  \n按照以下步骤将照片发送到 Apple TV：\n\n1.  轻点**AirPlay**按钮。\n2.  从来源列表中选择**Apple TV**。\n\n\
  切换到下一张照片，只需从右向左滑动，就像在 iPod touch 上切换照片一样。要返回上一张照片，则从左向右滑动。\n\n要恢复在 iPod touch 上查看照片，请再次轻点\
  \ AirPlay 按钮，然后从来源列表中选择 iPod touch。\n\n##### 删除照片\n\n你可能会好奇为什么有些照片无法从 iPod touch\
  \ 上删除（**废纸篓**图标不见了）。\n\n例如，你会注意到，任何从 iTunes 同步来的照片都看不到**废纸篓**图标。这类照片只能从电脑的资料库中删除。下次同步\
  \ iPod touch 时，它们就会被移除。\n\n![images](img/p423-01.jpg)\n\n当你查看“已存储的照片”（此文件夹不与 iTunes\
  \ 同步，而是由你从电子邮件中保存或从网页下载的照片组成）时，你会在底部图标栏中看到**废纸篓**图标。当你查看“照片图库”或其他同步相册中的照片时，这个**废纸篓**图标不会出现。\n\
  \n如果你没看到底部那一行图标，先轻点照片激活它们，然后轻点**废纸篓**图标。系统会提示你确认是否删除照片。\n\n触碰**删除照片**，该照片将从你的 iPod\
  \ touch 中删除。\n\n![images](img/p423-02.jpg)\n\n#### 从网站下载图片\n\n我们已经向你展示了如何将图片从电脑传输到\
  \ iPod touch，以及如何从电子邮件中保存图片。你还可以直接从网页上下载并保存图片到 iPod touch。\n\n**警告：**我们强烈建议你在从网页上下载和保存图片时尊重图片版权法。除非网站明确标注图片可免费使用，否则在下载和保存任何图片前，应先征得网站所有者的同意。\n\
  \n##### 查找要下载的图片\n\niPod touch 让你能轻松地从网页上复制和保存图片。当你想为 iPod touch 寻找一张新的壁纸时，这个功能会非常方便。\n\
  \n首先，轻点**Safari**网页浏览器图标，输入搜索词如“iPod touch 壁纸”，找到一些可能提供有趣壁纸的网站。（关于此主题的帮助信息，请参阅第\
  \ 15 章：“Safari 网页浏览器”。）\n\n![images](img/p424-01.jpg)\n\n一旦找到你想下载和保存的图片，长按该图片，就会弹出一个包含**存储图像**（以及其他选项）的新菜单，如图\
  \ 19-5 所示。选择此选项，将图片保存到你的“已存储的照片”相册中。\n\n![images](img/1905.jpg)\n\n**图 19-5.** 从网页保存图片\n\
  \n现在轻点你的**照片**图标，你应该能在“相机胶卷”相册中看到这张图片。\n\n![images](img/p425-01.jpg)\n\n"
- "# 第 20 章\n\n## 地图\n\n在 iPod touch 上使用地图功能既方便又令人惊叹。在本章探索**地图**应用的强大功能时，你将了解如何在地图上找到自己的位置，并获取前往几乎任何地方的路线。你还将学习如何在**标准**、**卫星**和**混合**视图之间切换。你还会看到，如果需要找到去某处的最佳路线，你可以通过**地图**选项中的**显示交通状况**按钮来查看实时交通。如果你想找到目的地附近最近的披萨店、高尔夫球场或酒店，也同样简单。你甚至可以直接在\
  \ iPod touch 上使用谷歌的街景功能，帮助你顺利抵达目的地。将已在地图上标出的地址添加到通讯录中也非常方便。\n\n### 地图入门\n\niPod\
  \ touch 的妙处在于其应用程序设计得能够相互协作。你已经见识过通讯录是如何与**地图**应用关联的；只需回顾一下第 17 章：“通讯录与备忘录”即可。\n\
  \n![images](img/p427-01.jpg)\n\n**地图**应用由移动地图技术领域的领导者谷歌地图提供支持。**地图**能让你定位自己的位置、获取路线、搜索附近事物、查看交通状况等。\n\
  \n只需轻点**地图**图标即可开始使用。\n\n**注：**你需要连接到 Wi-Fi 网络才能使用地图功能。\n\n#### 确定你的位置（蓝点）\n\n启动**地图**应用时，你可以让它从你当前的位置开始。按照以下步骤将你的当前位置设为默认起始位置：\n\
  \n1.  轻点左下角的蓝色小**箭头**图标。\n\n    ![images](img/p428-01.jpg)\n\n2.  **地图**会请求使用你的当前位置——轻点**允许**或**不允许**。\n\
  \n    我们建议选择**允许**，这样查找从当前位置出发或前往当前位置的路线会方便得多。\n\n    ![images](img/p428-02.jpg)\n\
  \n\n\n### 更改地图视图\n\n`地图`应用的默认视图是`标准`视图，这是一种基础地图，显示带有街道名称的通用背景。`地图`还可以显示`卫星`视图或`卫星`与`标准`视图的结合——称为`混合`视图。最后，如果你搜索了提供多个结果的内容（例如附近的咖啡馆），`列表`视图会非常方便。当你查询前往某个地点的路线时，它也同样实用。你可以按照以下步骤在所有视图之间切换：\n\
  \n1.  轻点地图右下角翻起的边缘。\n2.  地图的角落会向上翻起，显示出用于切换视图、路况、图钉等的按钮。\n3.  轻点你要切换到的视图（参见图 20-1）：\n\
  \    *   `标准`：带有街道名称的常规地图。\n    *   `卫星`：不包含街道名称的卫星图片。\n    *   `混合`：`卫星`和`标准`视图的结合，即带有街道名称的`卫星`视图。\n\
  \    *   `列表`：仅当你的搜索返回多个结果（如“星巴克”）或你查询路线时可用。\n\n![images](img/2001.jpg)\n\n**图 20-1.**\
  \ *`地图`应用中可用的各种视图：左上角依次为：标准、卫星、混合和列表。*\n\n#### 查看路况\n\n你的`地图`应用不仅能告诉你如何到达某地，还能沿途查看路况。此功能目前仅在美国支持。请按以下步骤查看指定路线的路况：\n\
  \n1.  轻点地图右下角以查看选项。\n2.  轻点`显示路况`。\n\n![images](img/p430-01.jpg)\n\n在高速公路上，如果有交通状况，你通常会看到黄色灯光而非绿色灯光。有时，黄色灯光可能会闪烁，以提醒你注意交通延误。\n\
  \n你甚至可能看到`施工工人`图标，表示施工区域。\n\n`地图`在主要街道和高速公路上使用颜色来指示当前交通行驶速度：\n\n*   绿色 = 50 英里/时\
  \ 或以上\n*   黄色 = 25–50 英里/时\n*   红色 = 低于 25 英里/时\n*   灰色（或无色）= 当前无可用路况数据\n\n### 搜索任何内容\n\
  \n由于`地图`与 Google 地图相连，你可以搜索并找到几乎所有内容：特定地址、商户类型、城市或其他兴趣点，如图 20-2 所示。请按以下步骤搜索特定位置：\n\
  \n1.  触摸屏幕右上角的`搜索`栏。\n2.  输入你想要在 iPod touch 上显示地图的地址、兴趣点或市州信息。\n\n![images](img/p431-01.jpg)\n\
  \n#### Google 地图搜索技巧\n\n你几乎可以在`搜索`栏中输入任何内容，包括以下示例：\n\n*   名字、姓氏或公司名称（用于匹配你的通讯录）\n\
  *   主街 123 号，城市（街道地址的部分或全部）\n*   奥兰多机场（用于查找机场）\n*   水管工、油漆工或屋顶工（商户名称或行业的任何部分）\n\
  *   高尔夫球场 + 城市（用于查找本地高尔夫球场）\n*   电影 + 城市或邮政编码（用于查找本地电影院）\n*   Pizza 32174（用于搜索邮政编码\
  \ 32174 附近的披萨店）\n*   95014（美国加利福尼亚州苹果公司总部的邮政编码）\n*   Apress\n\n![images](img/2002.jpg)\n\
  \n**图 20-2.** *在`地图`应用中进行搜索*\n\n要输入数字，请轻点键盘上的`123`键。要输入字母，请轻点`ABC`键切换回字母键盘。\n\n\
  ### 地图选项\n\n当地址显示在`地图`屏幕上后，请按以下步骤访问可用选项：\n\n1.  轻点地址旁边的蓝色`箭头`图标 ![images](img/p432-01.jpg)\
  \ 以查看部分选项。\n2.  如果你已显示某位联系人的地图，将看到联系人详细信息，如图 20-3 所示。`地图`还会为特定搜索调出联系信息。你还可以获取路线、共享位置或将位置添加为书签。\n\
  \n**注意：** 你也可以长按地址以调出`拷贝`弹出菜单。\n\n![images](img/2003.jpg)\n\n**图 20-3.** *轻点`信息`按钮以查看已显示地图的联系人详细信息*\n\
  \n#### 使用书签\n\n`地图`中的书签功能与`Safari`中的书签功能非常相似。书签只是为你访问过或在地图上标记过、并希望将来记住的位置创建一个记录。查阅书签总是比执行新搜索更方便。\n\
  \n##### 添加新书签\n\n将位置添加书签是简化再次查找该位置的好方法：\n\n1.  在地图上显示一个位置，如图 20-4 所示。\n2.  轻点地址旁边的蓝色`信息`图标。\n\
  3.  轻点`添加到书签`。\n\n    ![images](img/2004.jpg)\n\n    **图 20-4.** *添加书签*\n\n4.  编辑书签名称，使其简短易识别——此处我们将地址编辑为`格洛丽亚的商店`。\n\
  5.  完成后，轻点右上角的`存储`。\n\n**提示**：你可以像在`通讯录`中搜索姓名一样搜索书签名称。\n\n##### 访问和编辑书签\n\n要查看你的书签，请按以下步骤操作：\n\
  \n1.  轻点顶部行`搜索`窗口旁边的`书签`图标。\n2.  轻点任意书签即可立即跳转至该位置。\n3.  轻点书签顶部的`编辑`按钮以编辑或删除你的书签。\n\
  \    1.  要重新排列书签顺序，请触摸并拖拽每个书签的右边缘向上或向下移动。\n    2.  要编辑书签名称，轻点该书签并重新输入名称。编辑名称后，轻点左上角的`书签`按钮返回书签列表。\n\
  \    3.  要删除书签，在书签上向左或向右滑动，然后轻点`删除`按钮。\n4.  编辑完书签后，轻点`完成`按钮。\n\n![images](img/p435-01.jpg)\n\
  \n#### 将已标记的位置添加到通讯录\n\n将你在地图上标记的位置添加到通讯录非常简单：\n\n1.  显示一个地址的地图。\n2.  轻点`箭头/信息`图标。\n\
  3.  轻点`添加到通讯录`。![images](img/p435-02.jpg)\n4.  轻点`创建新联系人`或`添加到现有联系人`。\n5.  如果你选择`添加到现有联系人`，则可以滚动或搜索你的联系人并选择一个姓名。该地址将自动添加至该联系人。\n\
  \n#### 搜索附近的商家\n\n请按以下步骤搜索你当前位置附近的商家：\n\n![images](img/p436-01.jpg)\n\n1.  在地图上标记一个位置，或使用蓝点表示你当前的位置。\n\
  2.  轻点`搜索`窗口。假设你想搜索最近的披萨店，因此输入“pizza”。这将在地图上标记所有本地的披萨店。\n3.  请注意，每个被标记的位置左侧可能有一个`街景`图标，右侧有一个`信息`图标。\n\
  4.  你可以双击以放大，或捏合屏幕以缩小或放大。\n5.  与任何标记的位置一样，轻点蓝色的`信息`图标会显示所有详细信息，包括披萨店的电话号码、地址和网站，如图\
  \ 20-5 所示。\n6.  如果你需要前往该餐厅的路线，只需轻点`路线到这里`，路线将立即计算出来。\n\n![images](img/2005.jpg)\n\
  \n**图 20-5.** *使用信息屏幕对标记的位置执行更多操作。*\n\n**注意**：如果你轻点`主页`链接，将退出`地图`，并启动`Safari`。完成后，你需要重新启动`地图`。\n\
  \n#### 放大和缩小\n\n你可以通过双击和捏合屏幕来进行常规的放大和缩小操作。要使用双击放大，只需像在网页或图片上那样双击屏幕即可。\n\n\n\n####\
  \ 放置图钉\n\n假设你正在查看地图，发现了某个想设为书签或目的地的地方。\n\n在此示例中，我们正在放大查看波士顿大区。我们偶然发现了芬威球场，并决定将其添加到书签中，于是我们在该位置放置了一个图钉。请按照以下步骤在地图上放置图钉：\n\
  \n1.  标记一个地点，或者将地图移动到你想要放置图钉的位置。\n\n    ![images](img/p438-01.jpg)\n\n2.  点击地图的右下角。\n\
  \n    ![images](img/p438-02.jpg)\n\n3.  点击**放置图钉**。你也可以直接长按地图上的某个位置来放置图钉。\n4.  现在，通过长按图钉，在地图上拖动它。\n\
  5.  要移除已放置的图钉或执行其他操作，请点击图钉上方弹出窗口旁的蓝色**箭头**图标 ![images](img/p438-03.jpg)。如果弹出窗口消失了，点击图钉即可重新显示。\n\
  \n    ![images](img/p438-04.jpg)\n\n6.  在**信息**屏幕上，你可以获取**路线**、**移除图钉**、**添加到通讯录**、**分享位置**或**添加到书签**。\n\
  \n    ![images](img/p439-01.jpg)\n\n**提示：查找地图上任意位置的街道地址**\n\n当你放置图钉时，谷歌地图会显示实际的街道地址。如果你通过**卫星**或**混合**视图找到某个位置，但需要获取其实际街道地址，这非常方便。\n\
  \n放置图钉也是记录你停车位置的好方法，在陌生地点尤其有用。\n\n#### 使用街景\n\n谷歌街景（参见图 20-6）是 iPod touch 上 **地图**\
  \ 应用一个非常有趣的功能。谷歌一直在努力拍摄美国及其他地区几乎所有地址的照片。这些照片随后被输入其数据库，当你想要查看目的地或途经点的图片时，显示的就是这些内容。\n\
  \n**注意**：谷歌街景目前仅在少数国家/地区可用：大部分北美、西欧、澳大利亚以及现在的南非。\n\n如果某个地点支持街景，你会在地图上地址或书签的左侧看到一个小的橙色**人物**图标。\n\
  \n![images](img/p439-02.jpg)\n\n在此示例中，我们想查看加里的妻子格洛丽亚在科德角店铺的街景：\n\n1.  为了标记该地址，我们点击了通讯录列表中格洛丽亚名下的工作地址。我们也可以通过在**搜索**窗口中输入地址、搜索某类商家，或者在**通讯录**应用中点击地址来标记它。\n\
  2.  **街景**图标显示在格洛丽亚名字的左侧。\n3.  我们点击该图标，立即切换到该地址的街景视图。非常酷的一点是，我们可以通过向左、向右、甚至向上或向下滑动，以\
  \ 360 度旋转的方式浏览屏幕，查看目的地旁边和对面的地方。\n4.  要返回地图，我们只需点击屏幕的右下角。\n\n![images](img/2006.jpg)\n\
  \n**图 20-6.** *使用谷歌街景*\n\n### 获取路线\n\n**地图**应用最有用的功能之一，是你可以轻松找到前往或来自任何地点的路线。假设我们要获取从当前位置（格洛丽亚的店铺）到波士顿芬威球场的路线。\n\
  \n#### 首先点击“当前位置”按钮\n\n要查找前往或来自你当前位置的路线，你无需浪费时间输入当前地址——iPod touch 会假定你想要从当前位置出发的路线，除非你另行指定。你可能需要点击**位置**按钮几次，直到屏幕上出现蓝点。\n\
  \n现在，你可以执行以下两种操作之一：\n\n*   点击底部的**路线**按钮。\n*   像之前那样点击蓝色**箭头**，然后选择**从此处出发的路线**（参见图\
  \ 20-7）。\n\n![images](img/2007.jpg)\n\n**图 20-7.** *选择**从此处出发的路线**，然后选择**书签***\n\
  \n#### 选择起点或终点\n\n按照以下步骤选择起点或终点，然后选择建议的路线：\n\n1.  点击图钉上方的蓝色**箭头**图标。\n2.  点击**从此处出发的路线**。\n\
  3.  点击**书签**按钮。\n4.  点击**书签**、**最近**或**通讯录**来查找你的目的地。在此示例中，我们点击了**书签**，然后点击了**芬威球场**。\n\
  \n    ![images](img/p442-01.jpg)\n\n    **注意**：一旦你点击**从此处出发的路线**按钮，你最近的搜索会自动显示（参见图\
  \ 20-5）。你也可以点击**目的地**框并输入目的地。\n\n    ![images](img/p442-02.jpg)\n\n5.  选择目的地后，路线界面会带你进入一个概览界面。在我们的示例中，我们看到的是从苹果公司\
  \ 1 Infinite Loop 总部到帕洛阿尔托苹果商店的路线规划界面。\n6.  一个绿色的大头针被放置在起点位置，一个红色的大头针被放置在终点位置——在本例中是芬威球场。\n\
  7.  一条亮蓝色的线将连接两个大头针，显示你的路线。如果有多条路线，其他路线会以浅蓝色显示。\n8.  点击一条灰色路线以选择它。一旦选中，它就会变成亮蓝色，任何其他路线都会褪为浅蓝色。\n\
  \n![images](img/p442-03.jpg)\n\n#### 查看路线\n\n在开始行程之前，你会在屏幕的右上角看到一个**开始**按钮。点击**开始**按钮，路线导航就开始了。**开始**按钮会变为**箭头**按钮，允许你在行程的各个步骤之间切换。\n\
  \n![images](img/p443-01.jpg)\n\n![images](img/p443-02.jpg)\n\n如图 20-8 所示，你可以将路线查看为地图上的路径或列表。\n\
  \n![images](img/2008.jpg)\n\n**图 20-8.** *查看路线的两种方式*\n\n你可以用手指移动屏幕来查看路线，或者只需点击底部的**箭头**按钮\
  \ ![images](img/p443-03.jpg)，以逐步快照的方式显示路线。\n\n你也可以点击右下角的**页面卷曲**按钮，然后点击**列表** ![images](img/p444-01.jpg)\
  \ 按钮，这将显示详细的分步路线。\n\n#### 在路线之间切换\n\n如前一个示例中的步骤 6 和 7 所述，如果有多条可用路线，**地图**应用会用亮蓝色线标记其最佳推荐路线，并将其标记为**路线\
  \ 1**。如果其他路线也可用，地图会用浅蓝色线标记它们。点击一条灰色线会使其变为亮蓝色，并用相应的数字标记——例如**路线 2**。\n\n如果你根据最近的经验知道施工或其他情况使路线\
  \ 1 不太理想，或者你需要在沿途某个不在推荐的路线 1 上的地点停靠，那么切换到另一条路线是一个很好的选择。\n\n![images](img/p444-02.jpg)\n\
  \n#### 在驾车、公交和步行路线之间切换\n\n在开始导航之前，你可以通过点击路线界面顶部蓝色栏左侧的图标（如图 21-9 所示），选择你是驾车、使用公共交通还是步行。\n\
  \n![images](img/2009.jpg)\n\n**图 20-9.** *选择你的出行方式*\n\n#### 反向路线\n\n要反向路线，请点击位于顶部**起点**和**终点**字段之间的**反向**\
  \ ![images](img/p445-01.jpg) 按钮。如果你不太擅长自己反向导航，或者你的路线包含很多单行道，这将会很有用。\n\n\n\n### 地图选项\n\
  \n![images](img/p446-01.jpg)\n\n目前，唯一会影响您`地图`应用的设置是`定位服务`，它对确定您的当前位置至关重要。请按照以下步骤调整`地图`应用的设置：\n\
  \n1.  点击`设置`图标。\n2.  点击`定位服务`。\n3.  确保`定位服务`开关处于`开启`位置，以便`地图`能够估算您的位置。\n\n**注意：**\
  \ 保持`定位服务`开关`开启`会少量减少电池续航时间。如果您从不使用`地图`或不在意您的位置，请将其设为`关闭`以节省电池电量。\n\n![images](img/p446-02.jpg)\n\
  \n![images](img/p446-03.jpg)\n\n"
- "# 第 21 章\n\n## 您设备上的 iTunes\n\n在本章中，您将学习如何直接在 iPod touch 上使用`iTunes`应用查找、购买和下载媒体。通过`iTunes`，您将能够下载音乐、影片、电视节目、播客和有声读物。您还将了解如何从\
  \ iTunes 上的`iTunes U`板块获取顶尖大学的免费教育内容，以及如何兑换 iTunes 礼品卡。\n\n我们有些人还记得当年去唱片店购买新单曲或专辑的情景。浏览所有我们想要的音乐，从黑胶唱片到磁带到最终的\
  \ CD，那种感觉令人兴奋不已。\n\n那些日子随着 iPod touch 的到来早已一去不复返。音乐、影片、电视节目等更多内容，可以直接从 iPod touch\
  \ 本身获取。\n\niTunes 是一个音乐、视频、电视、播客等内容的商店。几乎所有您能在 iPod touch 上消费的媒体类型，都可以直接从 iTunes\
  \ Store 购买或租借（而且通常免费）。\n\n### 开始使用 iTunes\n\n在本书前面部分，我们向您展示了如何将电脑上 iTunes 中的音乐传输到您的\
  \ iPod touch 中（见第 3 章：“与 iCloud、iTunes 等同步”）。iTunes 的一大优点是，该商店让您能非常轻松地购买或获取音乐、视频、播客和有声读物，然后在几分钟内就在您的\
  \ iPod touch 上使用它们。\n\niPod touch 允许您直接在设备上访问 iTunes 网站（移动版）。当您购买或请求免费项目后，它们将被下载到\
  \ iPod touch 上的`音乐`或`视频`应用。如果您有 iCloud 并开启了自动下载，您购买的任何音乐都会自动下载到您的其他 iOS 设备和电脑上的\
  \ iTunes 中。影片将在您下次与桌面 iTunes 资料库同步时传输。\n\n#### 需要网络连接\n\n您需要有一个活跃的互联网连接才能访问 iTunes\
  \ Store。请参阅第 4 章：“连接到网络”以了解更多信息。\n\n#### 启动 iTunes\n\n当您首次收到 iPod touch 时，`iTunes`\
  \ 是第一个`主屏幕`页面上的图标之一。点击`iTunes`图标，您将进入 iTunes Store 的移动版。\n\n![images](img/p448-01.jpg)\n\
  \n**注意：** `iTunes`应用会经常更新。由于`iTunes`应用本质上是一个网站，因此从我们编写本书到您在 iPod touch 上查看它之间，其内容很可能会有所变化。某些屏幕图像或按钮可能与本书中显示的略有不同。\n\
  \n此外，iTunes 的内容因国家/地区而异。取决于您居住的地方，您可能无法访问某些影片、电视节目或其他媒体。然而，苹果公司正不断将 iTunes 内容添加到越来越多的地区，所以请务必偶尔回来看一下。\n\
  \n#### 浏览 iTunes\n\n`iTunes`应用使用的图标与 iPod touch 上的其他程序类似，因此操作起来相当简单。顶部有三个按钮，底部有五个软键可以帮助您。您可以自定义这些软键，我们将在下一节中向您展示具体方法。请注意右侧图片底部的软键。在`iTunes`中滚动与其他任何程序中的滚动方式相同；上下移动手指即可查看可用的选项。\n\
  \n![images](img/p448-02.jpg)\n\n### 自定义 iTunes 软键\n\n自定义 iTunes 屏幕底部显示的软键很简单。点击左下角的`更多`软键。然后点击右上角的`编辑`。\n\
  \n![images](img/p449-01.jpg)\n\n现在，您可以通过将顶部的任意图标拖放到底部的软键工具栏上来更改软键。您放置的任何项目都将替换当前所在位置的图标。\n\
  \n点击`完成`以完成更改并返回 iTunes。\n\n![images](img/p449-02.jpg)\n\n### 通过新发行、排行榜前十和流派查找音乐\n\
  \n在 iTunes 音乐商店屏幕的顶部有三个按钮：`精选`、`排行榜`和`Genius`。默认情况下，当您启动`iTunes`时，会显示`精选`内容。\n\n\
  #### 排行榜前十：热门内容\n\n如果您想知道某个特定类别中的热门内容，您会想要浏览`排行榜前十`下的分类。点击顶部的`排行榜前十`，然后点击一个类别或流派，查看该类别中的热门内容。\n\
  \n**注意：** `排行榜前十`类别中的项目销量很好，但这并不意味着它们一定会吸引您。在您付费之前，务必预览某个项目并查看其评价。\n\n![images](img/p450-01.jpg)\n\
  \n#### 流派：音乐类型\n\n点击`流派`按钮，根据流派浏览音乐。如果您有最喜欢的音乐类型并只想浏览该类别，这尤其有用。\n\n有大量的流派可供浏览；只需像在其他任何\
  \ iPod touch 应用中那样上下滚动列表即可。\n\n![images](img/p450-02.jpg)\n\n请自行浏览音乐，直到看到您想预览或购买的内容。\n\
  \n#### 浏览视频（影片）\n\n点击顶部的`影片`、`电视节目`或`电影视频`按钮，浏览所有与视频相关的项目。\n\n![images](img/p451-01.jpg)\n\
  \n您也可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：\n\n*   排行榜前十\n*   流派\n\n**提示：** 在大多数页面的最底部，您还可以兑换礼品卡，或退出您的\
  \ Apple ID 并登录另一个 Apple ID 账户。如果有人（也许是您的孩子）更改了 Apple ID 而您想切换回自己的账户，这将非常有用。\n\n\
  ![images](img/p451-02.jpg)\n\n点击任何影片或视频以查看详情或预览选项。您可以选择租借或购买部分影片和电视节目：\n\n*   **租借：**\
  \ 某些影片可供租借，并有固定的天数限制。点击此按钮租借一个节目。\n\n    **注意**: 美国的租借期为 24 小时，加拿大的租借期为 48 小时。其他国家的租借期可能略有不同。\n\
  \n*   **购买：** 点击此按钮可永久购买并拥有该影片或电视节目。\n\n![images](img/p452-01.jpg)\n\n\n\n#### 寻找电视节目\n\
  \n浏览完电影后，点击顶部的`电视节目`按钮，即可查看你喜爱的节目中有哪些可供选择。\n\n![images](img/p452-02.jpg)\n\n![images](img/p452-03.jpg)\n\
  \n当你点开一个电视剧集时，会看到可用的单集内容。点击任意一集即可观看 30 秒的预览（关于观看视频的更多信息，请参阅第 14 章：“观看视频”）。预览结束后，点击`完成`按钮。\n\
  \n当你准备好后，可以购买单集或整季电视剧。如图 21-1 所示，很多（但并非所有）电视剧都允许你单独购买单集。\n\n例如，你或许想补看《摩登家庭》中错过的试播集。在你的\
  \ iPod touch 上可以快速轻松地完成这一操作。\n\n![images](img/2101.jpg)\n\n**图 21-1.** *购买电视剧季或单集*\n\
  \n**注意**：还有一个`免费电视节目`类别，你可以在这里获取样片和额外内容。\n\n#### iTunes 中的有声读物\n\n有声读物是一种无需阅读就能享受书籍的绝佳方式。有些朗读者听起来非常有趣，几乎就像看电影一样。例如，《哈利·波特》系列的朗读者能够演绎出几十种令人惊叹的声音。我们建议你在\
  \ iPod touch 上尝试一下有声读物；当你在飞机上想要逃离其他乘客，但又不想开灯时，有声读物尤其出色。\n\n**提示**：如果你是一位有声读物重度听众，订阅\
  \ Audible.com 可以以更低价格获得相同的内容。\n\n![images](img/p454-01.jpg)\n\n如果你是一位有声读物爱好者，请务必查看\
  \ iTunes 中的`有声读物`版块。\n\n你可以点击顶部三个按钮之一，浏览`有声读物`中的以下区域：\n\n- 精选\n- 十大\n- 分类\n\n![images](img/p454-02.jpg)\n\
  \n### iTunes U：优质教育内容\n\n如果你喜欢教育内容，请查看`iTunes U`版块。你将能够看到你的大学、学院或学校是否有自己的专区。\n\n\
  ![images](img/p454-03.jpg)\n\n我们仅浏览了几分钟就发现了一个很好的例子：一场由保罗·索尔曼（PBS News Hour 的经济事务记者）主持、三位诺贝尔奖得主经济学家参与的小组讨论。你可以通过以下菜单导航找到该播客：`iTunes\
  \ U` > `大学与学院` > `波士顿大学` > `BUNIVERSE - 商业` > `音频`。与`iTunes U`中的许多内容一样，这个播客是免费的！\n\
  \n如果你所在的区域无线信号良好，你可以点击音频或视频项目的标题，然后进行流式播放。但是，如果信号中断，你将丢失视频的播放进度。如果可能的话，将文件实际下载下来留待以后观看有很多好处，其中最重要的一点是你能获得更多对视频观看体验的控制。\n\
  \n### 下载以供离线观看\n\n如果你知道自己将会有一段时间没有无线网络覆盖，例如在飞机上或地铁里，你需要将内容下载下来以供日后离线观看或收听。点击`免费`按钮，它会变成`下载`按钮，然后再点击一次。你可以通过点击屏幕右下角的`下载`按钮来监控下载进度（一些较大的视频可能需要十分钟或更长时间才能完成）。下载完成后，该项目将显示在`音乐`或`视频`应用的相应区域中。\n\
  \n### 搜索 iTunes\n\n有时你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻阅所有菜单。`搜索`工具就是为你准备的。\n\n在`iTunes`应用的右上角（几乎与所有其他\
  \ iPod touch 应用一样），有一个`搜索`窗口。\n\n触摸`搜索`，`搜索`窗口和设备键盘将弹出。一旦你开始输入，iPod touch 将开始匹配你输入的内容并显示可能性。\n\
  \n![images](img/p455-01.jpg)\n\n输入你正在搜索的艺人、歌曲名称、视频名称、播客名称或专辑名称，iPod touch 将显示详细的匹配结果。你可以进行宽泛搜索，也可以进行精确搜索。如果你只是想浏览某位艺人的所有特定歌曲，请输入艺人的名字。如果你想要某首具体的歌曲或专辑，请输入歌曲或专辑的全名。\n\
  \n当你找到歌曲或专辑名称时，只需点击它，就会被带到购买页面。\n\n### 购买或租赁音乐、视频、播客等\n\n一旦你找到一首歌、一个视频、一个电视节目或一张专辑，你可以点击`购买`按钮，或者（如果看到的话）`租赁`按钮。这样你的媒体文件就会开始下载。（如果内容是免费的，你会看到`免费`按钮，点击后会变成`下载`按钮。）\n\
  \n我们建议你先查看或收听预览，并查看用户评价，除非你百分之百确定要购买该项目。\n\n**注意：** 你也可以从 iTunes 商店为你的 iPod touch\
  \ 购买*铃声*。\n\n#### 预览音乐\n\n点击歌曲的标题或其左侧的曲目编号；这会将专辑封面翻转过来并打开预览窗口。\n\n你将听到该歌曲一段时长 90\
  \ 秒的代表性片段。\n\n点击`停止`按钮，曲目编号将再次显示。\n\n![images](img/p456-01.jpg)\n\n#### 查看用户评价\n\
  \niTunes 中的许多项目都提供用户评价。评价从最低的一星到最高的五星不等。\n\n**警告：** *请注意，评价中可能包含不雅语言。* 很多评价是干净的；然而，有些确实包含不雅语言，iTunes\
  \ 商店可能无法立即发现。\n\n阅读评价可以让你很好地判断自己是否想购买该项目。\n\n![images](img/p457-01.jpg)\n\n####\
  \ 预览视频、电视节目或音乐视频\n\niTunes 上几乎所有的东西都提供预览。有时你会看到一个`预览`按钮，例如对于音乐视频和电影。电视节目则略有不同；你需要点击剧集标题才能看到\
  \ 30 秒的预览。\n\n我们强烈建议你在 iTunes 上购买商品之前，先查看评价并尝试预览。\n\n典型的电影预览或预告片会超过 30 秒。有些会长达两分半钟或更久。\n\
  \n![images](img/p457-02.jpg)\n\n#### 购买歌曲、视频或其他项目\n\n一旦你确定要购买一首歌、一个视频或其他项目，请按照以下步骤进行购买：\n\
  \n1.  点击歌曲的`价格`按钮或`购买`按钮。\n2.  按钮会发生变化，变成一个绿色的`立即购买`、`购买歌曲`、`购买单曲`或`购买专辑`按钮。\n3.\
  \  点击`购买`按钮。\n4.  你会看到一个动态图标跳入购物车。输入你的 iTunes 密码，然后点击`确定`完成交易。\n\n![images](img/p458-01.jpg)\n\
  \n![images](img/p458-02.jpg)\n\n点击`更多`按钮，然后点击`下载`，即可查看专辑中每首歌曲的下载进度。\n\n然后，这首歌曲或这张专辑将成为你音乐库的一部分，并且下次你将\
  \ iPod touch 连接到电脑上的 iTunes 时，它将会与你的电脑同步。注意：iCloud 会自动进行此同步。\n\n下载完成后，你将能在`音乐`应用的相应类别中看到新的歌曲、有声读物、播客或\
  \ iTunes U 播客。\n\n![images](img/p458-03.jpg)\n\n**注意**：购买的视频和 iTunes U 视频会进入你 iPod\
  \ touch 上的`视频`应用，播客则会显示在`音乐`应用中。\n\n\n\n### iTunes 中的播客\n\n播客通常是一系列音频片段；这些片段可能频繁更新（例如国家公共广播电台的整点新闻），也可能完全不做更新（例如某特定主题单次演讲的录音）。\n\
  \n![图片](img/p459-01.jpg)\n\n您可以点击顶部三个按钮来浏览 iTunes 中的播客分类：\n\n- 热门推荐\n- 排行榜前十\n-\
  \ 分类\n\n![图片](img/p459-02.jpg)\n\n#### 下载播客\n\n播客有视频和音频两种类型。当您找到某个播客后，只需点击该播客的标题（参见图\
  \ 21-2）。幸运的是，大多数播客都是免费的。如果是免费的，您会看到一个 `Free` 按钮，而不是常见的 `Buy` 按钮。\n\n![图片](img/2102.jpg)\n\
  \n**图 21-2.** *下载一个 NPR 播客*\n\n当您点击该按钮时，它会变成一个绿色的 `Download` 按钮。点击 `Download`，一个动态图标会跳入底部软键栏中的\
  \ `Downloads` 图标内。显示的小红色数字反映了正在下载的文件数量。\n\n![图片](img/p460-01.jpg)\n\n#### 下载图标：停止和删除下载\n\
  \n当您下载项目时，它们会出现在您的 `Downloads` 屏幕中。此行为与电脑上 `iTunes` 应用的行为类似。\n\n您可以点击 `More` 软键，然后点击\
  \ `Downloads` 标签页，查看所有下载的进度。\n\n![图片](img/p460-02.jpg)\n\n#### 下载内容的存储位置\n\n您可以通过点击\
  \ `More` 图标，在 `Music` 或 `Videos` 应用中查看所有下载内容，该图标会按分类显示您的下载。换句话说，如果您下载了一个播客，您需要进入\
  \ `Music` 应用，点击 `More`，然后找到 `Podcasts` 标签页，才能看到已下载的播客。\n\n有时，您可能决定不想要所有已选择的下载。如果您想停止下载并删除它，只需用手指在该下载项上滑动，调出\
  \ `Delete` 按钮，然后点击 `Delete`（参见图 21-3）。\n\n![图片](img/2103.jpg)\n\n**图 21-3.** *下载过程中删除文件*\n\
  \n### 兑换 iTunes 礼品卡\n\niPod touch 上 `iTunes` 应用的一个很酷的功能是，就像您电脑上的 `iTunes` 应用一样，您可以兑换礼品卡并将款项存入您的\
  \ iTunes 账户用于购买。\n\n在 `iTunes` 屏幕底部，您应该能看到 `Redeem` 按钮（参见图 21-4）。\n\n![图片](img/2104.jpg)\n\
  \n**图 21-4.** *兑换 iTunes 礼品卡*\n\n点击 `Redeem` 按钮，开始输入您的 iTunes 礼品卡号码以获得 iTunes Store\
  \ 信用额度的流程。\n\n### Ping\n\nPing 是苹果公司的音乐社交网络。您可以通过点击标签栏底部中央的 `Ping` 按钮来访问它。\n\n通过\
  \ Ping，您可以查看您关注的艺术家和用户正在购买和评论的音乐，而您的关注者也可以看到您购买和评论的音乐。Ping 还允许您推文发布您的购买信息。\n\n![图片](img/p462-01.jpg)\n\
  \nPing 包含三个部分：\n\n- `Activity`：显示您所关注的所有人的购买和评论动态。您可以查看 `All`（全部）动态、仅 `Artists`（艺术家）动态，或仅\
  \ `People`（非艺术家用户）动态。\n- `People`：列出您所有 `Follow`（关注）的其他 Ping 用户；列出 `Follow`（关注）您的\
  \ Ping 用户；以及列出 Ping 认为您可能感兴趣的 `Featured`（精选）、`Recommended Artists`（推荐艺术家）和 `Recommended\
  \ People`（推荐用户）。\n- `My Profile`：显示您自己最近的所有活动，并允许您访问 `My Info`，其中显示了您的个人资料信息以及您喜爱的音乐的专辑封面。\n\
  \n**注意：** 在撰写本文时，Ping 尚未获得显著的流行度。如果您是狂热的音乐爱好者，并且您和您的朋友从 iTunes 购买大量音乐，那么我们当然建议您至少尝试一下。不过，您也可能会发现像\
  \ Twitter 和 Facebook 这样更成熟（可能也更通用）的社交网络更合您的口味。\n\n"
- "# 第 22 章\n\n## 神奇的 App Store\n\n您刚刚已经见识到，直接从 iPod touch 上的 iTunes 下载音乐、视频和播客是多么简单。您也见识到了从\
  \ iBooks 商店下载 iBooks 是多么容易。\n\n从苹果公司神奇的 App Store 下载新应用也同样简单。应用几乎涵盖了您能想到的任何功能：游戏、生产力工具、社交网络，以及您能想象的任何其他东西。正如广告所说，*总有那么一款应用*。\n\
  \n![图片](img/p463-01.jpg)\n\n在本章中，您将学习如何浏览 App Store，以及如何搜索和下载应用。您还将学习如何在应用下载到您的\
  \ iPod touch 后对其进行维护和更新。\n\n### 了解更多关于应用和 App Store 的信息\n\n在本章中，我们将重点介绍如何直接从您的 iPod\
  \ touch 访问 App Store。但是，您应该记住，您也可以使用 Mac 或 PC 上的 `iTunes` 程序在 App Store 中购物（参见图\
  \ 22-1）。\n\n![图片](img/2201.jpg)\n\n**图 22-1.** *从电脑上的 `iTunes` 程序或 iPod touch 上的\
  \ `App Store` 图标访问 App Store*\n\n在很短的时间内，App Store 已经火爆流行起来。几乎任何您能想象到的功能都有对应的应用。这些应用涵盖了各种价位；在许多情况下，应用甚至是免费的！\n\
  \n#### 在哪里找到应用资讯和评论\n\n您可以在 App Store 本身中找到许多应用的评论，我们建议您查看 App Store 的评论。但有时，您可能希望从专业评论者那里获得更多信息。如果是这样，博客是获取特定应用或内容资讯和评论的好地方。\n\
  \n以下是列出了一些包含应用评论的、与苹果 iPhone 和 iPod 相关的博客：\n\n- The iPhone Blog：`www.tipb.com`\n\
  - Touch Reviews：`www.touchreviews.net`\n- Touch Arcade：`www.toucharcade.com`\n-\
  \ The Unofficial Apple Weblog：`www.tuaw.com`\n- 148apps：`www.148apps.com`\n- App\
  \ Advice：`www.appadvice.com`\n\n### App Store 基础操作\n\n只需稍加熟悉，您就会发现 App Store 的导航非常直观。我们将介绍一些基础知识，帮助您充分利用\
  \ App Store，让您的体验尽可能愉快且高效。\n\n**注意：** 应用的可获取性因国家而异。某些应用仅在部分国家提供，并且由于当地的分级法律，某些国家可能没有特定的游戏版块。\n\
  \n#### 需要网络连接\n\n在您设置好 App Store（iTunes）账户后，您仍然需要具备正确的网络连接才能访问 App Store 并下载应用。请查看第\
  \ 4 章：“连接到网络”，了解如何判断您是否已连接。\n\n#### 启动 App Store\n\n`App Store` 图标应位于 `Home` 屏幕上的第一页图标中。点击该图标即可启动\
  \ `App Store` 应用。\n\n![图片](img/p465-01.jpg)\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n#### App Store 首页\n\n我们将介绍 App Store **首页**的几个部分：顶部栏、中间内容和底部软按键。\n\n我们先来看顶部栏。如\
  \ 图 22–2 所示的页面顶部，您会看到三个按钮：**新内容**、**热门**和 **Genius**。轻点其中任意一个按钮即可切换视图。\n\n**提示：**\
  \ **Genius** 是一项基于您已在 iPod touch 上下载并安装的 App 来推荐您可能喜欢的 App 的功能。这是一种从成千上万个 App 中筛选出您可能感兴趣的\
  \ App 的绝佳方式。\n\n页面中间是您的主内容区域。此主内容区域会显示 App 列表或您正在查看的特定 App 的详细信息。您可以向上或向下滑动以查看列表中的更多\
  \ App 或特定 App 的详细信息。您还可以在查看屏幕截图时向左或向右滑动。在**精选** App 页面，您会注意到顶部有几个大型图标。点击这些图标将显示\
  \ App 类别或单个 App。在大型图标下方（您需要向下滑动），您会看到许多精选 App。\n\nApp Store **首页**底部有五个软按键：\n\n\
  -   **精选**：显示由 App Store 或 App 开发者重点推荐的 App。\n-   **类别**：显示用于组织 App 的类别列表，以便您按类别浏览。\n\
  -   **Top 25**：显示销量最高或下载量最多的 App。\n-   **搜索**：使用输入的搜索词查找 App。\n-   **更新**：允许您更新已安装的任何\
  \ App，并重新下载您已获取的任何 App。\n\n您可以通过 图 22–2 底部一行的软按键中**精选**按键被高亮，看出当前显示的是**精选** App。滚动操作与其他程序相同——只需上下移动手指即可滚动浏览页面。\n\
  \n![images](img/2202.jpg)\n\n**图 22–2.** *App Store **首页**的布局*\n\n**注：** App Store\
  \ 本质上是一个网站，因此会频繁更新。本书出版后，App Store 的某些细节和细微差别可能会略有不同。\n\n### 查看 App 详情\n\n如果您在列表中看到某个感兴趣的\
  \ App，请轻点它以了解更多信息。该 App 的**详情**屏幕包括其价格、描述、屏幕截图和评论（参见 图 22–3）。您可以利用这些信息来帮助判断该 App\
  \ 是否适合您。\n\n在**信息**页面上向下滑动可阅读关于该 App 的更多详细信息。向左或向右滑动可查看更多 App 的屏幕截图。轻点底部的**评分**按钮可阅读该\
  \ App 的所有评论。\n\n您还可以在**信息**页面底部附近查看 App 的其他详细信息，例如其文件大小、版本号和开发者信息。\n\n您还可以使用屏幕底部的按钮**告诉朋友**或**报告问题**。\n\
  \n![images](img/2203.jpg)\n\n**图 22–3.** *查看 App 的详细信息*\n\n### 查找要下载的 App\n\n如果您想搜索要下载的\
  \ App，请先从默认视图开始浏览，该视图显示**精选** App。向下滚动页面以查看所有精选 App。\n\n#### 查看新 App\n\nApp Store\
  \ 中的默认视图会显示新 App 和精选 App。这就是之前在 图 22–2 中显示的视图。您可以通过屏幕底部高亮的**精选**软按键 `![images](img/p469-01.jpg)`\
  \ 和页面顶部按下的**新内容**按钮 `![images](img/p469-02.jpg)` 来判断此视图显示的是新的精选 App。\n\n#### 查看热门内容\n\
  \n轻点屏幕顶部的**热门**按钮，商店中最“热门”的 App 将显示在屏幕上。同样，浏览最热门的 App，看看是否有让您眼前一亮的。\n\n**注：** 某个\
  \ App 位于“热门”类别，并不一定意味着您也会认为它有用或有趣。在购买任何东西之前，请仔细查看 App 的描述和评论。\n\n![images](img/p469-03.jpg)\n\
  \n#### Genius\n\n**精选** App 区域顶部的第三个按钮会带您进入 **Genius** 功能。此功能的工作原理类似于在电脑上播放音乐的 **iTunes**\
  \ App 中的同名功能。例如，它会根据您已在 iPod touch 上安装的 App 来显示您可能喜欢的 App。\n\n**注：** 首次使用 Genius\
  \ 功能时，您必须接受显示的条款和条件，该功能才会启用。\n\n![images](img/p470-01.jpg)\n\n##### 基于\n\n请注意每个\
  \ App 上方都有一个**基于（*App 名称*）**标签。此标签向您显示，建议的 App 是基于您已在 iPod touch 上安装的特定 App。例如，推荐\
  \ **CBS Radio** 是基于已安装了 **Pandora Radio**。我们之前不知道 CBS Radio，但基于此推荐，我们或许会尝试一下。\n\n\
  ![images](img/p470-02.jpg)\n\n##### 滑动以移除\n\n如果您不喜欢某个 Genius 建议，可以在其上向左或向右滑动以调出**删除**按钮，就像您在\
  \ iPod touch 上从列表中删除电子邮件或其他项目一样。轻点**删除**按钮即可从列表中移除该 App。\n\n![images](img/p471-01.jpg)\n\
  \n##### 禁用 Genius 功能\n\n要禁用 Genius 功能，您需要进入 **App Store** 的设置（请参阅本章后面的“App Store\
  \ 设置”部分以了解如何禁用此功能）。\n\n![images](img/p471-02.jpg)\n\n#### 类别\n\n`![images](img/p471-03.jpg)`\n\
  \n有时，呈现的所有选择可能会让人有点不知所措。如果您知道自己想找什么类型的 App，请轻点底部一行的软按键中的**类别**按钮（参见图 23–4）。\n\n\
  当前可用的类别如 表 23-1 所示。\n\n`![images](img/t2301.jpg)`\n\n**注：** 所列的类别是可变的，并且会随时间变化，因此您看到的类别在本书到达您手中时可能已经发生了变化。\n\
  \n![images](img/2204.jpg)\n\n**图 22–4.** *按类别查看 App——此例为**游戏***\n\n#### 查看 Top 25\
  \ 榜单\n\n`![images](img/p472-01.jpg)`\n\n轻点底部一行的**榜单**软按键，App Store 将再次切换视图。这一次，您将看到前\
  \ 25 名付费、免费和收入最高的 App。只需轻点顶部的**付费排行**、**免费排行**或**收入排行**按钮之一即可在视图间切换。\n\n**注：** **收入排行**类别指的是收入最高的\
  \ App，即销量乘以售价。此视图将帮助价格更高的 App 在榜单上排名更高。例如，一个售价 4.99 美元、销量为 10,000 单位的 App，在**收入排行**图表上的排名将远高于一个售价\
  \ 0.99 美元、销量相同的 App。\n\n![images](img/p472-02.jpg)\n\n\n\n#### 搜索应用\n\n![]（images/p473-01.jpg）\n\
  \n假设您对想找的应用类型有明确的想法。轻触`search`软键，然后输入程序名称或程序类型。\n\n因此，如果您正在寻找一个能帮助您划船的应用，只需输入 `rowing`\
  \ 看看会出现什么结果。\n\n您可能会看到一些建议的搜索词出现；轻点这些词以缩小搜索范围。\n\n![]（images/p473-02.jpg）\n\n在建议的搜索词中轻点`rowing\
  \ stats`只会得到一个结果。\n\n![]（images/p473-03.jpg）\n\n我们想看到所有与划船相关的应用，因此在`search`栏中轻点，并使用`backspace`键擦除单词\
  \ `stats`。接着，轻点右下角的`search`按钮，以查看更广泛的划船相关结果列表。\n\n**提示：** 如果您是在水上划船（而不仅仅是在划船机上），您可能会想看看`speedcoach\
  \ mobile`，售价为 $64.99。还有一个免费的（在撰写本文时）替代品叫做`irowpro`。\n\n![]（images/p473-04.jpg）\n\
  \n### 下载应用\n\n一旦找到您想要的应用，就可以直接将其下载到您的 iPod touch 上，如 [图 22–5]（#Chapter22.html#fig_22_5）所示。\n\
  \n找到您想购买的应用后，注意那个写着`free`或`$0.99`（或任何价格）的小按钮。\n\n轻触那个按钮，它会变为`install`（如果是免费程序）或`buy\
  \ now`（如果是付费程序）。\n\n![]（images/p474-01.jpg）\n\n![]（images/2205.jpg）\n\n**图 22–5.**\
  \ *购买应用或下载免费应用*\n\n阅读完评价和应用描述（可能还访问了开发者支持网站）后，继续下载或购买该应用。轻触`download app`按钮后，系统会提示您输入\
  \ iTunes 密码。\n\n输入密码并轻点`ok`；应用将下载到您的 iPod touch 上。\n\n#### 将应用作为礼物赠送\n\n在每个应用的详情页面底部附近，您会看到一个`gift\
  \ this app`按钮，您可以用它通过电子邮件将应用作为礼物赠送给任何人。操作方法如下：\n\n1.  调出**您要赠送的应用的详细信息**。向下滑动到页面底部，轻点`gift\
  \ this app`。\n\n    ![]（images/p475-01.jpg）\n\n2.  登录您的 iTunes 帐户以查看下一页。\n3.  确认接收礼物的人的设备满足所示要求。\n\
  \n    ![]（images/p475-02.jpg）\n\n4.  输入**您的姓名**、**接收者姓名**和**电子邮件**。然后向下滚动输入一条个人消息。赠送的应用通过电子邮件发送。\n\
  5.  轻点`next`。\n\n    ![]（images/p476-01.jpg）\n\n6.  在最终屏幕上，您可以确认一切看起来是否正确：您的消息、接收者的电子邮件。\n\
  7.  要完成赠送并将电子邮件发送给接收者，轻点底部的`buy gift`。\n\n    ![]（images/p476-02.jpg）\n\n#### 寻找免费或折扣应用\n\
  \n在浏览了一圈之后，您会注意到 App Store 的几件事。首先，有很多*免费*应用。有时这些是很好的应用。其他时候它们则不那么有用——但仍然可能很有趣！\n\
  \n其次，您会注意到有些应用会进行促销，而其他应用则会随着时间推移变得便宜。如果您有一个喜欢的应用，今天售价 $6.99，等几周或一个月再买，您可能会看到它的价格下降。\n\
  \n### 兑换礼品卡或 iTunes 代码\n\n您可以滑动到 App Store 中大多数页面的底部来兑换礼品卡或 iTunes 代码。\n\n在底部，轻点`redeem`按钮。\n\
  \n![]（images/p477-01.jpg）\n\n在下一个屏幕上输入您的代码。（您可能需要刮掉礼品卡背面的涂层才能看到代码。）\n\n轻点`redeem`按钮。\n\
  \n![]（images/p477-02.jpg）\n\n### 维护和更新您的应用\n\n开发者通常会为 iPod touch 更新他们的应用。您无需使用电脑进行更新——可以直接在\
  \ iPod touch 上完成。\n\n您甚至可以通过查看`app store`图标来了解是否有更新以及有多少更新。这里显示的图标有五个应用更新可供下载。\n\
  \n![]（images/p477-03.jpg）\n\n进入 App Store 后，轻点底部最右侧的图标。这是`updates`图标。\n\n![]（images/p478-01.jpg）\n\
  \n如果您的应用有可用更新，会有一个红色的小数字提示。这个数字对应有更新的应用数量。\n\n当您轻点`update`按钮时，iPod touch 会显示哪些应用有更新。\n\
  \n![]（images/p478-02.jpg）\n\n要获取更新，您可以逐个轻触应用。但更简单的方法是轻点右上角的`update all`按钮 ![]（images/p478-03.jpg），一次性更新所有应用。iPod\
  \ touch 会离开 App Store，您可以在小状态栏中查看更新进度。所有正在更新的应用图标会显示为灰色。\n\n一些状态消息会显示`waiting`，而另一些则会显示`loading`或`installing`。更新完成后，所有图标将恢复为正常颜色。\n\
  \n![]（images/p478-04.jpg）\n\n**注意：** 您需要重新启动`app store`应用才能返回。更新过程会将您完全带出商店。\n\n\
  #### 重新下载应用\n\n一旦您下载了某个应用，无论是免费还是付费，您都可以随时再次下载，无需额外付费。例如，假设您购买了一款应用在度假时使用。旅行结束后，您可以安全地删除它，然后在下次旅行时再次下载。这有助于保持您的`home`屏幕整洁，并防止\
  \ iPod touch 存储空间不足。\n\n要获取您之前购买或下载的应用列表，请轻点`update`按钮，然后轻点屏幕最顶部的`purchased`标签。\n\
  \n![]（images/p479-01.jpg）\n\n在`purchased`部分，您有两种视图选择。首先，您可以查看所有曾经购买或下载的应用列表。或者，您可以查看当前*未*安装在\
  \ iPod touch 上的应用列表。\n\n**注意：** 您是否看到一些不记得购买或下载的应用？如果是这样，可能是因为您在 iPhone 上下载了应用、在\
  \ iPad 上购买了通用应用，或者您的 iTunes 帐户与曾在其设备上下载过应用的配偶或家庭成员共享。\n\n![]（images/p479-02.jpg）\n\
  \n### 自动下载\n\niCloud 在线服务允许您设置 iPod touch，使其自动下载并安装您通过 Windows 或 Mac 电脑上的 iTunes——甚至是其他\
  \ iOS 设备（如 iPad）上购买的任何应用。\n\n按照以下步骤开启自动下载：\n\n1.  轻点`settings`图标。\n2.  向下滚动并轻点`store`。\n\
  3.  将`apps`的`automatic downloads`切换为`on`。\n\n![]（images/p480-01.jpg）\n\n如果您不再希望自动下载应用，只需将`apps`的`automatic\
  \ downloads`切换回`off`即可。\n\n\n\n### 其他 App Store 设置\n\n在 `App Store` 应用的设置中，你还可以检查当前登录到商店的是哪个账户、注销登录、关闭\
  \ Genius 功能、查看你的 iTunes 账户，以及管理你的资讯订阅。\n\n**提示：** 如果你想阻止他人使用你的 iTunes 账户在你的 iPod\
  \ touch 上购买应用，你需要按照接下来描述的步骤退出登录 iTunes。\n\n按照以下步骤更改 `App Store` 应用的其他设置：\n\n1. 注意，你可以在该屏幕顶部看到你当前登录的账户。\n\
  2. 如果你希望退出登录 iTunes 服务，请轻点“`退出登录`”。例如，你可能将 iPod touch 交给某个人，而你不希望此人使用你的手机并通过你的 iTunes\
  \ 账户购买应用。\n3. 轻点“`查看账户`”以查看你账户的详细信息（你需要登录）。\n\n   ![images](img/p481-01.jpg)\n\n\
  4. 右侧的图示显示了你的账户信息。轻点“`付款信息`”以调整你的账单信息（例如，你的信用卡类型和卡号）。\n5. 轻点“`账单地址`”以更新你的地址。\n6.\
  \ 轻点“`更改国家或地区`”以更改你的国家或地区。\n\n   ![images](img/p481-02.jpg)\n\n7. 向下滚动以查看更多设置。\n\
  8. 你可以“`关闭 App  Genius 功能`”（如果该功能已关闭，此按钮将允许你将其开启）。或者，你可以在此对话框中“`订阅`”或“`取消订阅`”iTunes\
  \ 资讯。\n9. 完成后，轻点右上角的“`完成`”。\n\n![images](img/p481-03.jpg)\n\n"
- "# 第 23 章\n\n## 游戏与娱乐\n\n你的 iPod touch 在诸多方面都表现出色。它是一款多媒体利器，能够管理你忙碌的生活。iPod touch\
  \ 尤其擅长两个领域：作为游戏设备，以及运行那些充分利用其精美高分辨率触摸屏和强大图形处理器的应用。你甚至能找到一些流行游戏的 iPod touch 版本，而这些游戏你可能本以为只有在专用游戏主机上才能玩到。\n\
  \niPod touch 为便携游戏带来了诸多优势：高清（HD）屏幕呈现逼真的视觉效果；高品质音频提供出色的音效；陀螺仪和加速计让你能以许多 PC 和（除 Wii\
  \ 外的）专用游戏主机所不具备的方式与游戏互动。例如，在赛车游戏中，后者这一特性让你可以通过手持 iPod touch 并转动它来操控方向。\n\n借助 AirPlay\
  \ 镜像功能，你甚至可以将游戏画面投射到同一 Wi-Fi 网络上的 Apple TV 上，并在你的大屏幕电视上进行游戏。\n\niPod touch 也非常适合其他许多有趣的活动，比如关注你当地的棒球队，甚至借助像\
  \ `Ocarina` 这样出色的应用（我们将在本章稍后介绍），将 iPod touch 当作一种乐器来使用。\n\n### 将 iPod touch 用作游戏设备\n\
  \niPod touch 包含内置的加速计和 `gyroscope`（陀螺仪），它本质上是一种能够检测运动（加速度）和倾斜度的设备。\n\n将加速计与出色的屏幕、大容量内存以及快速处理器相结合，你就拥有了一个出色游戏平台的构成要素。由于有数以千计的游戏可供选择，你几乎可以在\
  \ iPod touch 上玩任何你想玩的游戏类型。\n\n借助多任务处理功能，你甚至可以接听电话，然后返回到游戏中你之前离开的精确位置。\n\n**注意：**\
  \ 有些游戏要求你具备活跃的网络连接才能参与多人游戏。\n\n使用 iPod touch，你可以玩驾驶游戏，并通过 iPod touch 本身来操控方向。你只需转动设备即可做到这一点。你可以触摸\
  \ iPod touch 来刹车，或者将其向前倾斜来加速。\n\n这款游戏逼真到可能会让你感到晕车！\n\n《真实赛车》还有一个不错的派对游戏功能，你可以在其中与朋友比赛——试试看吧！\n\
  \n或者，你可以尝试一款钓鱼游戏，在其中你可以从船上的视角抛竿并收线钓鱼！\n\n![images](img/p484-01.jpg)\n\n![images](img/p484-02.jpg)\n\
  \n如果你喜欢音乐/节奏类游戏，那么你会在 App Store 中找到许多此类程序，例如 `Rock Band`。还有精彩的格斗游戏，比如由 Epic Unreal\
  \ 3 引擎驱动的 `Infinity Blade`；第一人称射击（FPS）游戏，如 `Call of Duty: Zombies`；以及一些全球最受欢迎的休闲游戏，例如\
  \ `Angry Birds`。\n\n![images](img/p485-01.jpg)\n\niPod touch 还拥有非常快速的处理器和先进的图形芯片。将这些与加速计结合，你就拥有了一款性能强大的游戏设备。\n\
  \n#### 获取游戏与其他有趣的应用\n\n与所有 iPod touch 应用一样，游戏可以在 App Store 中找到（参见图 23–1）。你可以通过电脑上的\
  \ `iTunes` 应用，或通过设备上的 `App Store` 应用来获取它们。\n\n![images](img/2301.jpg)\n\n**图 23–1**。*App\
  \ Store 中“`游戏`”版块的布局*\n\n要获取一款游戏，请像上一章那样启动 `App Store` 应用。接着，使用“`类别`”图标进入“`游戏`”标签页。你还会在\
  \ App Store 的“`推荐`”版块以及“`最新内容和热门内容`”版块中找到许多游戏。图 23–2 展示了一款适用于 iPod touch 的游戏的应用购买页面。\n\
  \n![images](img/p486-01.jpg)\n\n![images](img/2302.jpg)\n\n**图 23–2**。*“`应用购买`”页面的布局*\n\
  \n#### 购买前阅读用户评价\n\n许多游戏都有用户评价，值得一阅。有时，你可以在购买前对游戏有一个很好的了解。如果你发现一款看起来很有趣的游戏，不妨简单地进行一次\
  \ Google 搜索，看看是否有主流媒体对其进行过完整评测。\n\n![images](img/p487-01.jpg)\n\n#### 寻找免费试用版或精简版\n\
  \n如今，越来越多的游戏开发者会向用户提供游戏的免费试用版，以便他们在购买前确定自己是否喜欢。你会发现 App Store 中的许多游戏同时具有“`Lite`”版和“`Full`”版。\n\
  \n一些“免费”游戏通过在游戏中植入广告来获得支持。其他游戏开始时是免费的，但需要你进行应用内购买才能继续游玩或解锁额外功能。\n\n![images](img/p487-02.jpg)\n\
  \n#### 游玩时注意安全\n\n你可能会像在现实生活中一样，使用 iPod touch 在钓鱼游戏中甩动钓竿。在驾驶类和第一人称射击类游戏中，你也可能会移动身体。要点是：在游玩时留意你周围的环境！例如，确保你抓牢了设备，以免它从手中滑落；我们推荐使用一个好的硅胶保护套来帮助解决这个问题。\n\
  \n**警告**：像 `Real Racing` 这样的游戏可能会让人上瘾！\n\n#### 双人游戏\n\niPod touch 真正为双人游戏带来了可能性。在这个例子中，我们正在用\
  \ iPod touch 作为游戏棋盘，相互对战跳棋。\n\n你还可以找到其他棋盘游戏（如国际象棋、大富翁和优诺牌）的类似双人游戏应用。\n\n![images](img/p488-01.jpg)\n\
  \n#### 在线与无线游戏\n\niPod touch 还支持在线和无线点对点游戏（如果游戏支持的话）。许多新款游戏都采用了这项技术。例如，在 `Scrabble`\
  \ 中，你可以与使用自己设备的多个玩家对战。你甚至可以将 iPod touch 用作游戏棋盘，并将最多四台独立的 iPod touch 用作无线“字母架”，用于存放所有玩家的字母牌。只需将字母牌从架上滑出，它们就会滑到棋盘上——非常酷！\n\
  \n在这个例子中，我从 `Real Racing` 的菜单中选择“`在线`”。现在，我既可以选择通过 Wi-Fi 与另一位对手对战，也可以选择加入一场在线联赛。\n\
  \n![images](img/p488-02.jpg)\n\n**注意：** 如果你只是想与附近的朋友对战，请在多人游戏模式下选择 Wi-Fi 模式。如果你只是想与陌生人一起玩，请尝试在线加入联赛或游戏。\n\
  \n\n\n### 其他趣味内容：棒球\n\niPod touch 上有很多优秀的应用能为你带来无尽的娱乐时光。由于 iPod touch 是在美国职业棒球大联盟赛季开幕日发布的，因此特别适合介绍一款被选为\
  \ iPod touch App Store 首款“本周应用”的软件。\n\n`At Bat 2010 for iPod touch` 是一款售价 14.99\
  \ 美元的应用，对于任何棒球爱好者来说都物超所值。同时，它也充分展示了 iPod touch 的强大功能。\n\n![images](img/p489-01.jpg)\n\
  \n应用的主界面会根据当前是否有棒球比赛而动态变化。当你首次注册应用时，可以选定自己最喜欢的球队。本例中 iPod touch 上设置的喜爱球队是红袜队。因此，如果该队正在比赛，界面会首先自动显示该队的比赛信息。如果该队没有比赛，则会显示该队上一场比赛的回顾，或者列出下一场比赛的详细信息。\n\
  \n比赛进行时，主界面会显示一名击球员站在本垒板前。这个击球员代表真实的球员。击球员会根据当前击球手是左打还是右打而切换站位。本垒板上方会显示当前投球数，屏幕顶部则显示比分。\n\
  \n当你在场上或垒上看到一名球员时，可以点击他的图像来调出他的棒球卡并查看其统计数据。\n\n![images](img/p490-01.jpg)\n\n**提示**：你甚至可以选择在你喜爱的球队发生重大新闻时接收通知。为此，请点击`信息`图标，然后将`通知`设置为`开启`。\n\
  \n#### AirPlay 镜像\n\n最新的 iPod touch 不仅能将视频或音乐从设备流式传输到 Apple TV，还能共享任何应用（包括游戏）的屏幕。这样一来，你就能和全家人在大屏幕上观看并享受比赛，同时用你的\
  \ iPod touch 作为控制器。对于棋盘游戏和多人游戏而言，这一功能尤其出色，全家人或一群人可以围坐在一起共同参与。\n\n请按照以下步骤使用 AirPlay\
  \ 镜像功能：\n\n1.  点击你想要镜像的应用。在本例中，我们使用《无尽之剑》。\n2.  应用启动后，双击主屏幕按钮调出快速应用切换器。\n\n    ![images](img/p490-02.jpg)\n\
  \n3.  从左向右滑动，找到音频/视频控制选项。（它们位于最末端，所以请继续滑动直到无法再滑动为止。）\n4.  点击 AirPlay 图标，调出你 Wi-Fi\
  \ 网络上支持 AirPlay 的设备列表。\n5.  选择 Apple TV。\n6.  再次点击主屏幕按钮，返回你的应用。\n7.  现在你应该能在电视大屏幕上看到《无尽之剑》。尽情享受吧！\n\
  \n![images](img/p491-01.jpg)\n\n要停止 AirPlay 镜像，重复上述步骤，然后从设备列表中选择 iPod touch。\n\n\
  **注意**：某些游戏支持多人 AirPlay 镜像，例如《真实赛车 2》的“聚会游戏”功能，最多允许 4 人使用各自的 iPod touch 或 iPad 在同一台大屏幕电视上互相竞速。\n\
  \n"
- "# 第 24 章\n\n##### 社交网络\n\n如今，一些最受欢迎的“社交”场所，往往是那些被称为*社交网络站点*的网站——这些地方让你可以创建自己的个人主页，并与朋友和家人保持联系，了解他们生活中的动态。一些最大的社交网站包括\
  \ Facebook、Twitter 和 LinkedIn。\n\n在本章中，我们将向你展示如何访问这些网站。你将学习如何更新状态、发布*推文*，并关注那些对你重要或者你感兴趣的人。\n\
  \n### Facebook\n\nFacebook 成立于 2004 年 2 月。自那时起，它便成为用户与朋友、同事和家人联系、重新联系以及分享信息的首选网站。如今，超过\
  \ 8 亿用户将 Facebook 作为他们了解最重要的人近况的主要来源。\n\n**注意**：*你无法在 iPod touch 上的 `Facebook` 应用或通过\
  \ Facebook.com 网站玩 Facebook 游戏*。如果你是 Facebook 游戏的忠实玩家，这可能会让你失望；不过，你通常可以从 App Store\
  \ 下载相同的游戏（例如 `FarmVille`），然后将其与电脑版的 Facebook 账户关联，以便保留游戏进度。\n\n在本书出版时，你可以通过以下三种主要方式在\
  \ iPod touch 上访问你的 Facebook 页面：\n\n1.  使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
  2.  使用 `Safari` 访问移动网站：[`http://touch.facebook.com`](http://touch.facebook.com)。\n\
  3.  使用 iPod touch 的 `Facebook` 应用。\n\n![images](img/p493-01.jpg)\n\n**注意**：iPod\
  \ touch 版本的 `Facebook` 应用功能比完整网站略有缩减，但导航起来要方便得多。\n\n#### 连接 Facebook 的不同方式\n\n你可以通过\
  \ iPod touch 专用应用，或者使用 `Safari` 浏览器访问前面提到的两个 Facebook 网站之一来登录 Facebook。在本章的剩余部分，我们将重点介绍\
  \ iPod touch 上的 `Facebook` 应用。\n\n##### 下载并安装 Facebook 应用\n\n要找到该应用，请使用 App Store\
  \ 的`搜索`功能，直接输入“Facebook”。\n\n你也可以前往 App Store 的`社交网络`分类，找到官方的 `Facebook` 应用，以及许多其他与\
  \ Facebook 相关的应用。\n\n**注意**：有些应用可能看起来像“官方”Facebook 应用，并且需要付费。然而，唯一的“官方”应用是右侧显示的\
  \ iPhone/iPod 应用。\n\n![images](img/p494-01.jpg)\n\n要登录你的 Facebook 账户，你需要找到刚刚安装的图标并点击它。此处我们以\
  \ `Facebook` 为例，但其他应用的操作过程非常相似。\n\n一旦 `Facebook` 成功下载，该图标应该看起来像这样。\n\n![images](img/p494-02.jpg)\n\
  \n\n\n### Facebook 应用程序\n\n要在您的 iPod touch 上安装 `Facebook` 应用程序，请启动 `App Store` 并搜索“Facebook”。在\
  \ `Facebook` 应用程序列表中，轻点 `Install` 按钮。\n\n#### Facebook 应用基础\n\n一旦 `Facebook` 下载并安装完成，您首先会看到`登录`屏幕。输入您的账户信息——您的电子邮件地址和密码。\n\
  \n![images](img/p495-01.jpg)\n\n首次登录后，您会看到一条`推送通知`的警告信息。\n\n如果您希望允许这些消息，请点击`确定`。这些消息可能包括来自其他\
  \ Facebook 好友的戳一戳、便签、状态更新通知等。\n\n登录后，您将看到`Facebook`主屏幕。轻点 `Facebook` 标志可在应用程序内导航。\n\
  \n![images](img/p495-02.jpg)\n\n#### 在 Facebook 中导航\n\n通过轻点页面顶部的 `Facebook` 字样，可在`导航`图标和您的当前位置之间切换。\n\
  \n例如，如果您在`动态消息`中并轻点了 `Facebook`，您将看到所有图标。再次轻点 `Facebook`，您将返回到`动态消息`。\n\n从图标页面，您可以访问您的`动态消息`、`个人主页`、`好友`、`消息`、`地点`、`群组`、`活动`、`照片`和`聊天`。\n\
  \n![images](img/p496-01.jpg)\n\n#### 与好友交流\n\n请按照以下步骤，通过 iPod touch 上的 `Facebook`\
  \ 应用程序与您在 Facebook 上的好友交流：\n\n1.  轻点顶部的 `Facebook` 以查看所有图标。\n2.  轻点`好友`图标，您的好友列表便会显示。\n\
  3.  点击您的好友，将进入他的 Facebook 页面，您可以在她的`留言板`上留言，并查看她的`信息`或`照片`。\n\n![images](img/p496-02.jpg)\n\
  \n#### 使用 Facebook 应用上传照片\n\n使用 Facebook 上传照片是一件简单又好玩的事情。在这里，我们向您展示如何在 `Facebook`\
  \ 应用程序中上传照片：\n\n1.  在 Facebook 主图标中，轻点`照片`。\n2.  选择一个相册，例如“手机上传”。\n3.  轻点“在想些什么？”框旁边的`相机`图标。\n\
  4.  轻点`拍摄照片或视频`按钮来拍照或录制视频以进行上传。或者，轻点`从资料库选取`，在您的 iPod touch 上浏览照片，直到找到您想要上传的那张。\n\
  5.  接下来，如果需要，请轻点`写说明...`来编写说明文字。\n6.  要完成上传，请轻点蓝色的`上传`按钮，照片将进入您的“手机上传”文件夹。\n\n![images](img/p497-01.jpg)\n\
  \n**注意：** 上传照片时，图像质量将与您 iPod touch 上的原始质量不同。\n\n![images](img/p497-02.jpg)\n\n![images](img/p498-01.jpg)\n\
  \n### Facebook 通知\n\n根据您的 Facebook 推送通知设置，您可能会收到大量更新、留言板帖子和邀请的通知。如果您的 Facebook 好友不多，并且您想知道何时有人给您留言或在帖子或照片下评论，只需将您的推送通知设置为`开启`，如下一小节所示。\n\
  \n当有通知到来时，它会显示在“通知中心”中，或者如果您的 iPod touch 已锁定，则会显示为“锁定屏幕信息”。\n\n要从通知访问 Facebook，只需在屏幕上滑动\
  \ `Facebook` 图标，或者滑动`箭头`按钮解锁并阅读消息。\n\n![images](img/p498-02.jpg)\n\n#### 个性化设置您的\
  \ Facebook 应用\n\n以下是调整 `Facebook` 应用设置的方法：\n\n1.  轻点`设置`应用。\n2.  在左栏中轻点 `Facebook`。\n\
  3.  现在您可以调整各种选项：\n    *   `摇一摇重新加载`：此功能可在您摇晃 iPod touch 时重新加载或刷新页面。\n    *   `播放声音`：此功能让您可以为聊天和消息提醒添加提示音。\n\
  \n![images](img/p499-01.jpg)\n\n请按照以下步骤调整推送通知设置：\n\n1.  轻点`设置`应用。\n2.  轻点`通知`。\n\
  3.  向下滚动并轻点 `Facebook`。\n4.  将`通知中心`设置为`开启`以接收推送通知。\n5.  轻点`显示`以选择列表中显示的通知数量。\n\
  6.  将`提醒样式`设置为`无`则不显示通知，`横幅`用于新的通知中心风格提醒，或`提醒`用于旧式弹出通知。\n7.  将`标记应用图标`设置为`开启`，以查看\
  \ `Facebook` 图标上显示的新通知数量。\n8.  将`声音`设置为`开启`，以便在收到通知时听到提示音。\n\n    ![images](img/p499-02.jpg)\n\
  \n9.  设置`在锁定屏幕中查看`，以便即使在 iPod touch 锁定时也能获取通知信息。\n\n**提示：** `Facebook` 应用会将 Facebook\
  \ 个人资料图片导入到您的`通讯录`列表中。根据图片的不同，这可能会相当有趣。然而，它也可能将您自己非 Facebook 联系人的信息上传到 Facebook\
  \ 的服务器，这可能会引起您、您的家人和朋友对隐私的担忧。\n\n### LinkedIn\n\nLinkedIn 的核心功能与 Facebook 非常相似，但它更侧重于商务和职业兴趣。这与\
  \ Facebook 形成对比，后者更侧重于个人好友和游戏。通过 LinkedIn，您可以与当前和过去的商业伙伴建立联系或重新建立联系、发送消息、了解他人近况、进行讨论等。\n\
  \n在本书出版时，LinkedIn 的状态与 Facebook 非常相似。您可以在 `Safari` 浏览器上访问常规的 LinkedIn 网站，也可以为 iPod\
  \ touch 下载 `LinkedIn` 应用。\n\n哪个更好？我们觉得 iPod touch 上的 `LinkedIn` 应用略优于 `Safari` 中的完整\
  \ LinkedIn.com 网站。使用 `LinkedIn` 应用的大按钮导航更方便，但在 `Safari` 版本中屏幕上能看到更多内容。我们建议您两种方式都试试，看看您更喜欢哪个——这实际上是个人的偏好问题。\n\
  \n#### 下载 LinkedIn 应用\n\n下载 `LinkedIn` 应用的过程与下载 `Facebook` 应用类似。启动 iPod touch 上的\
  \ `App Store` 应用，在`搜索`窗口中输入“LinkedIn”，然后找到该应用。`LinkedIn` 应用是免费的，因此轻点 `FREE` 按钮进行安装。\n\
  \n![images](img/p500-01.jpg)\n\n#### 登录 LinkedIn 应用\n\n应用安装完成后，点击 `LinkedIn` 图标并输入您的登录信息。\n\
  \n![images](img/p501-01.jpg)\n\n![images](img/p501-02.jpg)\n\n#### 在 LinkedIn 应用中导航\n\
  \nLinkedIn 采用基于区域的导航系统。轻点任意“堆栈”即可进入该区域，然后轻点顶部的 `LinkedIn` 标志返回`首页`屏幕。\n\n![images](img/p501-03.jpg)\n\
  \n#### 与 LinkedIn 人脉交流\n\n您最常使用 `LinkedIn` 应用做的事情之一可能就是与人脉交流。最简单的方法是遵循以下步骤：\n\n\
  ![images](img/p502-01.jpg)\n\n1.  在`首页`页面，轻点右上角的`你`堆栈。\n2.  轻点屏幕中部的`人脉`按钮。\n3. \
  \ 浏览您的人脉，或轻点`放大镜`搜索图标，在`搜索`框中输入人脉名称。\n4.  轻点您正在寻找的人脉。\n5.  轻点`邮件`图标给他发送消息。\n\n###\
  \ Twitter\n\nTwitter 始于 2006 年。Twitter 本质上是一个基于 SMS（短信）的社交网络网站。它通常被称为*微博网站*，是名人和平民都可以分享自己想法的地方。关键在于您只有\
  \ 140 个字符来传达您的观点。\n\n在 Twitter 上，您可以订阅*关注*某个*发推*的人。您也可能发现人们开始关注您。如果您想关注我们，我们在 Twitter\
  \ 上的账号是 `@garymadesimple`。\n\n\n\n#### 设置 Twitter\n\n1.  在 iOS 5 系统中，Twitter 应用已内置到你的\
  \ iPod touch 中。这意味着，你可以从其他应用（如“照片”）内直接分享图片和帖子等内容。请按照以下步骤设置 Twitter：\n2.  轻点**设置**应用。\n\
  3.  向下滚动并轻点**Twitter**。\n4.  如果 iPod touch 版 Twitter 尚未安装在你的 iPod touch 上，请轻点 **Twitter**\
  \ 图标右侧的**安装**按钮。（如果 iPod touch 版 Twitter 已安装，**安装**按钮将呈灰色。）\n5.  轻点**用户名**并输入你的\
  \ Twitter `@用户名`。\n6.  轻点**密码**并输入你的 Twitter 密码。\n7.  轻点**登录**按钮。\n8.  如果你没有 Twitter\
  \ 帐户，请轻点屏幕底部的**创建新帐户**按钮，并填写表单以获取一个。\n9.  登录后，轻点**帐户**以更改你的选项。\n10. 如果你希望你的朋友能根据你的电子邮件地址在\
  \ Twitter 上找到你，请将**通过电子邮件找到我**切换为**开启**。\n11. 如果你希望每次从应用内发推文时都记录你的位置，请将**推文位置**切换为**开启**。\n\
  \n![images](img/p503-01.jpg)\n![images](img/p504-01.jpg)\n\n**注意：** 如果你在推文中透露了位置，那么\
  \ Twitter 上的任何人都可能知道你在哪里——包括你不在家或不在办公室的事实。如果担心隐私问题，请将**推文位置**切换为**关闭**。\n\n####\
  \ 使用 Twitter\n\n官方 **Twitter** 应用采用了精简的方式来使用 Twitter。**首页**屏幕会显示你关注的人的推文，并且完整消息显示得既美观又大。\n\
  \n底部有五个图标，第一个是主要的 **Twitter** 动态信息流。其他图标分别是**提及**、**私信**、**搜索**和**更多**按钮，点击**更多**按钮可进入你的**个人资料**、**收藏**、**草稿**、**列表**以及**帐户与设置**。\n\
  \n**发推**图标位于左上角（请参见图 24–1）。\n\n![images](img/2401.jpg)\n\n**图 24–1.** * **Twitter**\
  \ 应用的**首页**页面布局*\n\n#### 刷新推文列表\n\n要刷新你的推文列表，只需向下拉动主页面，你将在顶部看到**下拉以刷新**通知。页面下拉后，你将看到**释放以刷新**提示。松开页面即可刷新推文。\n\
  \n![images](img/p505-01.jpg)\n\n#### 你的 Twitter 个人资料\n\n要显示你的 Twitter 个人资料，请轻点**更多**按钮，然后轻点**我的个人资料**。\n\
  \n要查看你的推文，只需轻点**推文**。\n\n要查看你标记为收藏的推文，请轻点**收藏**按钮。\n\n要查看你关注的人，请轻点**正在关注**按钮。\n\n\
  **注意：** 你的粉丝数、你关注的人数以及你的推文数会显示在相应按钮标题的上方。\n\n向下滚动页面可查看你的**转推**、**列表**以及你可订阅的**服务**。\n\
  \n![images](img/p506-01.jpg)\n\n#### 撰写按钮\n\n轻点**撰写**按钮 ![images](img/p506-02.jpg)，将弹出**新推文**屏幕。当你输入消息时，字符计数器将从\
  \ 140 开始递减。以下是你可以在**新推文**屏幕上执行的操作：\n\n* 轻点 `@` 符号，搜索要在此推文中提及的其他用户名。\n* 轻点 `#` 符号，搜索要在此推文中标记的热门话题。\n\
  * 轻点**相机**图标，用你的 iPod touch 拍摄照片或视频，或从你的资料库中选择现有内容添加到推文中。\n* 轻点**箭头**图标，将你当前的位置添加到推文中。\n\
  \n![images](img/p506-03.jpg)\n![images](img/p506-04.jpg)\n\n#### 推文中的选项\n\n从你的 **Twitter**\
  \ 应用的**首页**屏幕，只需轻点一条推文即可获得以下选项：\n\n* 轻点屏幕左下角的**返回箭头**以**回复**推文。\n* 轻点方形的**双箭头**以转推或引用推文。\n\
  * 轻点**星形**图标以收藏推文。\n* 轻点**回形针**图标以查看附件。\n* 轻点**操作**按钮以复制推文链接、通过邮件发送推文或翻译推文。\n\n\
  ![images](img/p507-01.jpg)\n\n**注意：** 与 Facebook 和 LinkedIn 不同，你可以在 App Store 中找到各种替代的第三方\
  \ Twitter 应用。如果你不喜欢官方的 iPod touch 版 **Twitter** 应用，可以尝试一下 **Tweetbot**、**Twitterrific**\
  \ 或许多其他应用。\n\n"
- "# 第 25 章\n\n## 故障排除\n\niPod touch 通常非常可靠。但偶尔，就像你的电脑或任何复杂的电子设备一样，你可能需要重置设备或排除某个问题。在本章中，我们将为你提供一些有用的工具，帮助你的\
  \ iPod touch 尽快恢复正常运行。我们将从一些基本的快速故障排除开始，然后在“高级故障排除”部分介绍更深入的问题及解决方法。\n\n我们还将介绍一些与\
  \ iPod touch 相关的其他杂项，并为你提供一个资源列表，你可以在其中找到有关 iPod touch 的帮助。\n\n### 基本故障排除\n\n我们将首先介绍一些基本的提示和技巧，以便在出现问题时让你的\
  \ iPod touch 恢复正常运行。\n\n#### 如果 iPod touch 停止响应该怎么办\n\n有时，你的 iPod touch 会对触摸无反应——它只是在某个程序运行中突然卡住。如果发生这种情况，请尝试以下步骤，看看\
  \ iPod touch 是否会开始响应（请参见图 25-1）：\n\n1.  按一次**主屏幕**按钮，看是否能退出应用并返回到**主屏幕**。\n    ![Images](img/p509-01.jpg)\n\
  2.  如果某个特定应用导致问题，请尝试双击**主屏幕**按钮以打开**应用切换器**栏。接下来，按住**应用切换器**栏中的*任意*图标，直到它们全部晃动，并且应用图标左上角出现一个带减号的红色**圆形**图标。\n\
  3.  轻点红色的**圆形**图标以关闭该应用。\n4.  如果 iPod touch 仍然没有响应，请尝试按下**睡眠/唤醒**键，直到看到**滑动以关闭电源**。\n\
  5.  按住**主屏幕**按钮直到你返回到**主屏幕**——这应该可以退出该程序。\n6.  确保你的 iPod touch 电量没有耗尽。尝试将其插入电源或连接到你的电脑（如果已连接电源），看看它是否会开始响应。\n\
  7.  如果按住**主屏幕**按钮不起作用，你需要尝试通过按住**电源/睡眠**按钮三到四秒来关闭 iPod touch。\n8.  接下来，滑动屏幕顶部的**滑动以关闭电源**滑块。如果你无法关闭\
  \ iPod touch 的电源，那么你需要重置 iPod touch。请跳至下一节了解操作方法。\n9.  关闭 iPod touch 电源后，等待一分钟左右，然后通过按住同一个**电源**按钮几秒钟来开启\
  \ iPod touch。\n10. 你应该会看到屏幕上出现 **Apple** 标志。等待 iPod touch 启动完毕，你应该就可以访问你的程序和资料了。\n\
  \n![images](img/2501.jpg)\n\n**图 25-1.** *基本故障排除步骤*\n\n如果这些步骤不起作用，你将需要重置你的 iPod\
  \ touch。\n\n\n\n##### 如何强制重置 iPod touch\n\n当你的 iPod touch 无响应时，重置设备是另一种解决方法。此操作非常安全，通常能修复许多问题（参见图\
  \ 25-2）。\n\n![images](img/2502.jpg)\n\n**图 25-2.** *重置您的 iPod touch*\n\n请按照以下步骤强制重置您的\
  \ iPod touch：\n\n1.  用双手同时按住 `主屏幕` 按钮和 `电源/睡眠` 按钮。\n2.  同时按住这两个按钮约八到十秒钟。此时会出现 `滑动来关机`\
  \ 滑块。忽略它，继续按住两个按钮，直到屏幕变黑。\n3.  再过几秒钟，您应该会看到 `Apple` 标志出现。看到标志后，松开按钮，您的 iPod touch\
  \ 就会被重置。\n\n##### 如何软重置 iPod touch\n\n您可以在 `设置` 应用中重置多种内容，从 `主屏幕` 布局到网络设置，再到设备上的所有数据：\n\
  \n1.  轻点 `设置` 图标。\n2.  轻点 `通用`。\n3.  向上滑动以查看页面底部。\n4.  轻点 `还原`。\n5.  轻点 `还原所有设置`\
  \ 以重置网络、键盘、`主屏幕` 布局和位置提醒。在弹出的窗口中轻点 `还原` 进行确认。\n\n    ![Images](img/p513-01.jpg)\n\
  \n6.  轻点 `抹掉所有内容和设置` 以抹掉 iPod touch 上的所有内容，然后在弹出窗口中轻点 `抹掉` 进行确认。\n7.  轻点 `还原网络设置`\
  \ 以清除所有 Wi-Fi 网络设置。\n8.  轻点 `还原键盘词典` 以重置拼写词典。\n9.  轻点 `还原主屏幕布局` 以恢复到出厂布局；这会将 iPod\
  \ touch 的 `主屏幕` 恢复为原始布局。\n10.  轻点 `还原位置提醒` 以重置您收到的关于允许应用使用您当前位置的警告信息。\n\n##### 音乐、视频、提醒或铃声无声音\n\
  \n没有什么比错过 FaceTime 通话、想听音乐或看视频却发现 iPod touch 没有声音更令人沮丧的了。通常，这个问题有一个简单的解决方法：\n\n\
  1.  如果您听不到任何提醒，请检查以确保设备左上边缘的 `静音` 开关没有打开。当 `静音` 开关拨向设备背面，且开关旁边显示橙色时，即表示已开启。请确保将\
  \ `静音` 开关拨向设备正面，即关闭位置。\n2.  使用 iPod touch 左上边缘的 `音量+` 键检查音量。您可能无意中将音量调到了最低或将其静音。\n\
  3.  如果您使用的是耳机插孔的有线耳机，请拔下耳机，然后重新插入。有时耳机插孔连接不良。\n4.  如果您使用的是无线蓝牙耳机或蓝牙音响设备，请按照以下步骤操作：\n\
  \    1.  检查音量设置（如果耳机或音响上有此设置）。\n    2.  检查蓝牙设备是否已连接。轻点 `设置` 图标，轻点 `通用`，然后轻点 `蓝牙`。确保您能看到列出的设备，并且其状态为\
  \ `已连接`。如果未连接，请轻点该设备，并按照指引与 iPod touch 配对。\n\n        **注意**：有时您可能实际上已连接到蓝牙设备却不知道。如果您连接到蓝牙音响设备，实际的\
  \ iPod touch 将不会发出声音。\n\n5.  确保歌曲或视频未处于暂停模式。\n6.  打开 iPod touch 的音乐或视频控制。双击 `主屏幕`\
  \ 按钮应会打开 `应用切换器` 栏。从左向右滑动即可看到媒体控制。\n7.  再向右滑动一次即可看到音量控制。确认歌曲未暂停且音量未被调至最低。\n8.  最后，检查\
  \ `设置` 图标，以查看您（或其他人）是否在 iPod touch 上设置了 `音量限制`：\n    1.  轻点 `设置` 图标。\n    2.  向下滑动页面并轻点\
  \ `音乐`。\n    3.  查看 `音量限制` 是否为 `开`。\n    4.  轻点 `音量限制` 以检查设置等级。如果限制未锁定，只需将音量滑块滑至更高等级。\n\
  \    5.  如果已锁定，您需要先轻点 `解锁音量限制` 按钮并输入四位代码来解锁。\n\n如果这些步骤均无效，请参阅本章后面的“其他故障排除与帮助资源”部分。如果仍无效，请尝试使用本章“从备份恢复\
  \ iPod touch”部分中的步骤从备份文件恢复 iPod touch。最后，如果问题依然存在，请联系向您出售 iPod touch 的商店或企业寻求帮助。\n\
  \n##### 如果无法在 iTunes 或 App Store 中购买\n\n您有了这个酷炫的新设备，于是决定访问 iTunes Store 或 App Store。但如果您收到错误信息，或者不被允许进行购买，该怎么办？如果遇到这种情况，请尝试以下步骤：\n\
  \n1.  两个商店都需要有效的互联网连接。请确保您已连接 Wi-Fi 或蜂窝数据网络。如需帮助，请查阅第 4 章：“连接到网络”。\n2.  确认您拥有有效的\
  \ iTunes 帐户。\n\n### 高级故障排除\n\n到目前为止，我们已经介绍了 iPod touch 上的基本故障排除步骤。在接下来的部分中，我们将深入探讨一些更高级的故障排除步骤。\n\
  \n#### 当您的 iPod touch 未在 iTunes 中显示时\n\n有时，当您将 iPod touch 连接到 PC 或 Mac 时，`iTunes`\
  \ 应用可能无法识别它。因此，您的 iPod touch 不会出现在左侧导航栏中。\n\n将 iPod touch 连接到电脑后，您应该会在左侧导航栏的 `设备`\
  \ 下看到它。您可以尝试以下几个步骤，让 `iTunes` 应用识别您的 iPod touch：\n\n1.  查看 `主屏幕` 右上角的电池电量，检查 iPod\
  \ touch 的电池电量。如果电池电量过低，`iTunes` 应用需要等到电量稍微回升后才能识别它。\n2.  如果电池已充满电，请尝试将 iPod touch\
  \ 连接到电脑上的另一个 USB 端口。有时，如果您一直使用一个 USB 端口连接 iPod touch，而换到另一个端口时，电脑可能无法识别。\n3.  如果仍不能解决问题，请尝试断开\
  \ iPod touch 并重启电脑。\n4.  接着，将 iPod touch 重新连接到 USB 端口。\n5.  如果 `iTunes` 应用仍然无法识别您的\
  \ iPod touch，请下载 `iTunes` 的最新更新，或者在电脑上完全卸载并重新安装 `iTunes` 应用。如果选择此选项，请务必事先备份 `iTunes`\
  \ 中的所有信息。\n6.  您也可以尝试另一条同步线缆，可能是您的 USB 同步线缆有缺陷。\n\n\n\n#### 同步问题\n\n有時，你在將 iPod\
  \ touch 與電腦（PC 或 Mac）同步時可能會遇到錯誤。如何解決問題取決於你的同步方式。\n\n##### 使用 iTunes 同步\n\n如果你正在使用\
  \ iTunes 同步個人資訊，請依照以下步驟解決同步問題：\n\n1.  首先，遵循本章「iPod touch 未在 iTunes 中顯示」一節中概述的所有步驟。\n\
  2.  如果 iPod touch 仍然無法同步，但你可以在 `iTunes` 應用程式的左側導覽列中看到它，請返回第 3 章：「與 iCloud、iTunes\
  \ 及更多同步」並仔細檢查你的同步設定。\n\n##### 使用 Apple 的 iCloud 或 Microsoft Exchange 同步\n\n如果你正在使用\
  \ iCloud 服務或 Microsoft Exchange 方法來同步你的電子郵件和個人資訊，請依照以下疑難排解步驟來解決同步問題：\n\n1.   iCloud\
  \ 和 Exchange 同步都需要無線網路數據連線才能同步你的電子郵件和個人資訊。請檢查快速入門指南中「讀取連線狀態圖示」一節的表 1，以確認你擁有有效的數據連線。\n\
  2.   如果你沒有無線數據訊號，請確認你的 Wi-Fi 連線設定正確（請參閱第 4 章：「連接到網路」）。\n3.   確認連線後，你需要檢查電腦和 iPod\
  \ touch 上的同步設定是否正確（請參閱第 3 章）。\n\n**提示：** 有時候，問題可能只是密碼變更了這麼簡單。如果是這種情況，請務必在 iPod touch\
  \ 上為你的同步設定更正密碼。這些設定可以透過點擊你的 `設定` 圖示，然後點擊 `郵件、聯絡資訊、行事曆` 來找到。最後，點擊帳戶名稱並調整密碼。\n\n####\
  \ 重新安裝 iPod touch 作業系統（可選擇是否還原）\n\n有時，你可能需要全新安裝 iPod touch 作業系統，才能讓你的 iPod touch\
  \ 恢復正常且順暢運作。如果目前有可用的更新，此過程也將升級你的 iPod touch 軟體。\n\n**提示：** 此過程與使用新版本作業系統更新 iPod\
  \ touch 的過程幾乎完全相同。\n\n在此過程中，你將有三種選擇：\n\n-   如果你想讓 iPod touch 恢復正常狀態並保留所有資料，你必須使用\
  \ `iTunes` 應用程式中的 `回復` 功能。\n-   如果你打算從頭開始，並將 iPod touch 連結到一個 iTunes 帳戶，那麼你需要在這個過程結束時使用\
  \ `設定為新的 iPod touch` 功能。\n-   如果你打算贈送或出售你的 iPod touch，那麼你只需在此過程結束時（在進行回復或新設定之前）從\
  \ `iTunes` 中退出 iPod touch。\n\n**注意**：此回復過程將會徹底清除你的 iPod touch。你將需要重新同步和重新安裝你所有的應用程式，並輸入你的帳戶資訊，例如你的電子郵件帳戶。此過程可能需要\
  \ 30 分鐘或更長時間，具體取決於你同步到 iPod touch 的資訊量。\n\n若要重新安裝 iPod touch 作業系統軟體，並可選擇從先前的備份中將資料還原到\
  \ iPod touch，請依照以下步驟操作：\n\n1.  將你的 iPod touch 連接到電腦並載入 `iTunes` 應用程式。\n2.  在左側導覽列的\
  \ `裝置` 類別中點擊你的 `iPod touch`。\n3.  點擊頂端導覽列的 `摘要`。\n4.   你將看到 `摘要` 畫面，其中包含關於你 iPod\
  \ touch 的所有資訊。點擊畫面中間的 `回復` 按鈕，如下所示（請參閱圖 25-3）。\n\n![images](img/2503.jpg)\n\n**圖\
  \ 25-3.** *連接你的 iPod touch 並在 `摘要` 畫面中點擊 `回復` 按鈕*\n\n5.   現在可能會詢問你是否要備份你的 iPod touch，如果是，為了安全起見，請點擊\
  \ `備份`。\n6.   在下一個畫面中，你會收到所有資料將被清除的警告。點擊 `回復` 或 `回復並更新` 以繼續（請參閱圖 25-4）。\n\n![images](img/2504.jpg)\n\
  \n**圖 25-4.** *在回復前於 `iTunes` 中備份你的 iPod touch*\n\n7.   你將看到一個 iPod touch `軟體更新`\
  \ 畫面。點擊 `下一步 >` 以繼續。\n8.   接下來，你會看到 `軟體許可協議` 畫面。點擊 `同意` 以繼續並開始此過程。\n9.   `iTunes`\
  \ 將會下載最新的 iPod touch 軟體、備份並同步你的 iPod touch，然後重新安裝 iPod touch 軟體。此過程會完全清除所有資料，並將你的\
  \ iPod touch 還原到其原始、「乾淨」的狀態。你將在 `iTunes` 頂端看到狀態訊息。\n10. 備份和同步完成後，你的 iPod touch 螢幕將會變黑。接著，`Apple`\
  \ 標誌會出現，並且你會在標誌下方看到一個進度條。最後，`iTunes` 中會出現一個小型的彈出視窗，告訴你更新過程已完成。點擊 `好` 以前往 `設定你的 iPod\
  \ touch` 畫面。此時你會有幾個選項：\n    1.  如果你希望保持 iPod touch 乾淨（即沒有任何個人資料），請選擇頂部的選項 `設定為新的\
  \ iPod touch`。如果你正在為其他人設定此 iPod touch，你可能會想使用此選項（你需要她的 Apple ID 和密碼）。\n    2.  如果你要贈送或出售你的\
  \ iPod touch，只需點擊 iPod touch 旁邊的 `退出` 圖示，就大功告成了（請參閱圖 25-5）。\n\n![images](img/2505.jpg)\n\
  \n**圖 25-5.** *從 iTunes 退出 iPod touch*\n\n3.  選擇 `從以下備份回復：` 並確認下拉式選單已設定為正確的裝置。\n\
  11. 最後，點擊 `繼續`。\n12. 如果你選擇了回復，稍後你的 iPod touch 上會顯示 `正在回復` 畫面，並且 `iTunes` 中會出現一個狀態視窗顯示「正在從備份回復\
  \ iPod touch…」。此狀態視窗也會顯示預計剩餘時間。\n13. 接下來，你會看到一個小型的彈出視窗顯示「你的 iPod touch 設定已回復。」幾秒鐘後，你會看到你的\
  \ iPod touch 出現在 `iTunes` 左側導覽列的 `裝置` 下。\n    1.  如果你使用 `iTunes` 同步資訊，所有資料現在都會被同步。\n\
  \    2.  如果你使用 iCloud、Exchange 或其他同步程序，你可能需要在 iPod touch 上重新輸入密碼，才能使這些同步程序恢復並正常運行。\n\
  \n### 其他疑難排解與求助資源\n\n有時，你可能會遇到本書中找不到答案的特定問題或疑問。在以下章節中，我們將提供一些可以從 iPod touch 和電腦網頁瀏覽器存取的良好資源。iPod\
  \ touch 的裝置內使用手冊易於瀏覽，可以快速為你提供所需的資訊。如果你面臨特別難以解決的疑難排解問題，Apple 知識庫會很有幫助。與 iPhone/iPod\
  \ touch 相關的網路部落格和論壇也是尋找答案，甚至提出你可能遇到的獨特問題的好地方。\n\n\n\n#### 在设备上查阅 iPod touch 使用手册\n\
  \n请按照以下步骤在设备上查阅 iPod touch 使用手册：\n\n1.  打开你的 `Safari` 浏览器以查看 iPod touch 的在线使用手册。\n\
  2.  点击底部图标栏中的`书签`按钮 ![图片](img/p520-01.jpg)。\n3.  滑动到列表底部并点击`iPod touch 使用手册`。\n\n\
  如果找不到该书签，请在 iPod touch 上的 `Safari` 浏览器的`地址`栏中输入此 URL：`http://help.apple.com/ipodtouch`。\n\
  \n**提示**：若要在电脑上查看 PDF 格式的手册，请访问 `http://support.apple.com/manuals/ipodtouch`。\n\n\
  进入 iPod touch 上的使用手册后，您应该会看到一个类似于图 25-6 所示的屏幕。\n\n好处是您已经知道如何浏览该手册。点击任何主题以查看有关该主题的更多信息——可以是另一个子主题列表，也可以是更详细的信息。\n\
  \n阅读该主题或点击其他链接以了解更多信息。\n\n您可以点击屏幕右上角的按钮返回上一级。\n\n![图片](img/2506.jpg)\n\n**图 25-6.**\
  \ 在 iPod touch 上通过 `Safari` 使用 iPod touch 手册\n\n#### Apple 知识库\n\n在 iPod touch 或电脑的网页浏览器中，访问此网页：`www.apple.com/support/ipodtouch`\n\
  \n最后，点击左侧导航栏中的某个主题。\n\n#### 与 iPod touch 相关的博客\n\n拥有 iPod touch 的好处之一是，您会立即加入全球\
  \ iPod touch 用户社群。\n\n许多 iPod touch 用户会被归类为*爱好者*，并且是众多 iPod touch 用户组中的一员。这些用户组以及各种论坛和网站，为\
  \ iPod touch 用户提供了绝佳的资料来源。\n\n其中许多资源可直接从您的 iPod touch 上获取，其他一些则是您可能希望在电脑上访问的网站。\n\
  \n有时您可能想与其他 iPhone 和 iPod touch 爱好者联系、询问技术问题或了解最新最热门的传闻。博客是进行这些活动的好地方。\n\n以下是一些流行的\
  \ iPod touch（以及 iPhone 或 iPad）博客：\n\n*   `www.tipb.com`\n*   `www.iphonefreak.com`\n\
  *   `www.gizmodo.com`（iPod touch 板块）\n\n**提示：** 在这些博客上发布新问题之前，请先在博客中搜索，以确保您的问题尚未被提出和回答。同时，确保您将问题发布在博客的正确板块（例如\
  \ iPod touch 板块）上。否则，您可能会因没有事先做好功课而招致社群的不满！\n\n您也可以通过网络搜索“iPod touch 博客”或“iPod touch\
  \ 新闻和评论”来查找更多博客。\n\n### 索引\n\n**特殊字符和数字**\n\n`“.”` 快捷键，81\n\n#### ![图片](img/square2.jpg)A\n\
