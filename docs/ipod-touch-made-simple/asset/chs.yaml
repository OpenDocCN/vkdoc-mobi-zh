- "# 第 12 章\n\n## iBooks 和电子书\n\n在本章中，我们将向你展示如何使用你的 iPod touch 获得良好的阅读体验。例如，我们将介绍\
  \ iBooks，包括如何购买和下载它们，以及如何找到一些优秀的免费经典书籍。我们还将向你展示其他使用你 iPod touch 上的第三方 **Kindle**\
  \ 和 **Kobo**（原 **Shortcovers**）阅读器的电子书阅读选项。\n\n![images](img/p241-01.jpg)\n\niPod\
  \ touch 可以使用苹果专有的电子书阅读器 **iBooks**。在本章中，我们将向你展示如何下载 **iBooks** 应用程序，如何在 iBooks Store\
  \ 中选购书籍，以及如何阅读 PDF 文件（Adobe PDF 格式）和 iBooks，并利用所有 **iBooks** 的功能。\n\n使用 **iBooks**，你可以以前所未有的方式与书籍和\
  \ PDF 文件互动。翻页如同真实书籍；你可以调整字体大小、在内置字典中查词，以及搜索文本。\n\n在 App Store 中，你还可以找到亚马逊的 **Kindle**\
  \ 阅读器、**Barnes and Noble** 阅读器、**Stanza** 阅读器和 **Kobo** 阅读器的应用程序。**Kindle** 和 **Kobo**\
  \ 阅读器都在 iPod touch 上提供了出色的阅读体验。\n\n### 下载 iBooks\n\n在 App Store 中搜索“iBooks”或“Apple”。你会在列出的选项中找到\
  \ **iBooks** 应用程序。\n\n**注意**：在全新的 iPod touch 上，你会收到一条通知询问：“你现在要下载 iBooks 吗？”\n\n\
  如果你没有立即看到此通知，请点击**App Store** 应用程序，该通知应该会弹出。\n\n选择 **iBooks** 应用程序并点击**免费**按钮进行下载。\n\
  \n选择**安装**，**iBooks** 将下载并安装到 iPod touch 上。\n\n![images](img/p242-01.jpg)\n\n###\
  \ iBooks Store\n\n在你开始享受阅读体验之前，你需要为你的 iBooks 资料库装载书籍。幸运的是，iBooks 商店中有许多书籍可以免费获取，包括近乎完整的古腾堡经典和公有领域作品集。\n\
  \n**注意**：付费 iBooks 内容并非在所有国家/地区都可用。然而，免费内容在任何地方都可获取，包括古腾堡计划的经典公有领域文学作品集。\n\n只需点击你书架右上角的**商店**按钮，你就会被带到\
  \ iBooks Store。\n\n![images](img/p242-02.jpg)\n\niBooks Store 的布局与 App Store 非常相似。左上角有一个**类别**按钮，与**资料库**按钮相对。点击它可以查看所有可供你选择书籍的类别。\n\
  \n精选图书在商店首页上突出显示，并展示**新书**和**值得关注的**图书供浏览。\n\n商店底部有五个虚拟按键：**精选**、**排行榜**、**浏览**、**搜索**和**已购项目**。\n\
  \n点击**排行榜**按钮 ![images](img/p243-02.jpg) 可查看所有热门排行榜和《纽约时报》畅销书。点击**已购项目**按钮可查看你已购买或下载到资料库中的所有书籍。\n\
  \n![images](img/p243-01.jpg)\n\n![images](img/p243-03.jpg)\n\n购买书籍与购买应用程序非常相似。点击你感兴趣的书名，浏览简介和客户评论。当你准备好购买时，点击**价格**按钮。\n\
  \n![images](img/p244-01.jpg)\n\n**注意**：许多书籍都提供示例下载。如果你不确定是否要购买这本书，查看示例是个好主意。如果你下载了示例，你随时可以从该示例内购买完整书籍。\n\
  \n一旦你决定下载示例或购买一本书籍，**iBooks** 就会切换到**书架**视图，你可以看到书籍被放置到你的书架上。你的书籍现在即可阅读。\n\n![images](img/p244-02.jpg)\n\
  \n#### 使用搜索按钮\n\n与 iTunes 和 App Store 一样，iBooks Store 为你提供了一个**搜索**窗口，你可以在其中输入几乎任何短语。你可以按作者、书名或系列进行搜索。只需点击屏幕底部的**搜索**，屏幕键盘就会弹出。输入作者、书名、系列或图书类型，然后按下**搜索**按钮。\n\
  \n你会看到与搜索匹配的建议弹出；只需点击相应的建议即可跳转到该书籍。\n\n![images](img/p245-01.jpg)\n\n**提示**：搜索“Project\
  \ Gutenberg”可以看到数千种免费的公有领域书籍。\n\n### 切换集锦（书籍、PDF 等）\n\n你的 iBooks 应用程序有多个书籍或 PDF\
  \ 文件（Adobe PDF 格式阅读器）的集锦。\n\n你可以通过点击资料库顶部中央的“集锦”按钮，轻松在这两者之间切换集锦，并添加新的集锦。\n\n此按钮会显示当前可见的集锦。在这张图片中，**书籍**是当前集锦。点击“书籍”按钮即可查看可用的集锦。\n\
  \n![images](img/p245-02.jpg)\n\n在此屏幕上，你可以点击任何集锦进行查看。\n\n请注意，你也可以使用底部的按钮创建**新**集锦和**编辑**你已创建的集锦。\n\
  \n![images](img/p246-01.jpg)\n\n![images](img/p246-02.jpg)\n\n### 阅读 PDF\n\n如上所示，切换集锦以查看你的\
  \ PDF 集锦。\n\n点击任何书籍即可打开并开始阅读。所有相同的导航功能都如“阅读 iBooks”一节所述。\n\n一个区别是，你会在页面底部看到 PDF\
  \ 文件页面的缩略图。点击任意缩略图即可跳转到该页。在缩略图上前后拖动手指即可跳转到特定页面。\n\n![images](img/p246-03.jpg)\n\n\
  \n\n### 阅读 iBooks\n\n在书库中轻点任意标题即可打开阅读。图书将打开至第一页，通常是扉页或其他*前端内容*。\n\n![images](img/p247-01.jpg)\n\
  \n左上角`Library`按钮旁，你会看到一个`Table of Contents`按钮。要跳转到目录，可以轻点`Table of Contents`按钮，或直接翻页至目录页。\n\
  \n翻页有三种方式。第一种，轻点页面的右侧区域翻到下一页。第二种，在页面右边缘缓慢长按屏幕；在持续触摸屏幕的同时，轻轻向左慢慢移动手指。\n\n![images](img/p247-02.jpg)\n\
  \n**提示**：如果移动手指的速度非常慢，在“翻动”页面时，你甚至能看到背面文字——这是一种非常酷的视觉效果。\n\n最后一种翻页方式，是使用页面底部的滑动条。当你从左向右缓慢滑动时，滑动条上方会显示页码。松开手指，即可跳转到该页码。\n\
  \n![images](img/p247-03.jpg)\n\n#### 自定义阅读体验：亮度、字体和字号\n\n图书页面顶部中央有三个图标：`Brightness`、`Size`和`Search`。这些选项能让你的阅读体验更加沉浸。\n\
  \n轻点`Brightness`图标即可调节图书亮度。\n\n如果你在非常暗的房间里躺在床上阅读，将`Brightness`滑块向左拖到底，可以调暗平板屏幕。如果你在阳光下阅读，则需要将其向右拖到底。但请注意，屏幕高亮度比大多数其他功能更耗电，因此当不需要过亮屏幕时，请将亮度调回。\n\
  \n![images](img/p248-01.jpg)\n\n![images](img/p248-02.jpg)\n\n**注**：以上提示仅调节`iBooks`内的亮度。要调节\
  \ iPod touch 的全局亮度，请使用`Settings`应用（进入`Settings`图标 > `Brightness` & `Wallpaper`）。\n\
  \n`Font Size and Type`图标可让你根据偏好调整字体设置。\n\n**增大字号**的方法：\n\n多次轻点大`A`图标。\n\n**减小字号**的方法：\n\
  \n多次轻点小`a`图标。\n\n在撰写本书时，共有六种字体样式可供选择——但当你阅读本书时，可能已有更多字体可用。\n\n尽情尝试不同的字体吧。默认字体是 Palatino，但所有字体都看起来很棒，而且更大的字号对某些人来说会有很大不同。目标是调整字号，使文本尽可能舒适易读。\n\
  \n![images](img/p248-03.jpg)\n\n#### 使用内置词典扩充词汇量\n\n`iBooks`内置了一个非常强大的词典，当你遇到生词或不熟悉的单词时，它会非常有用。\n\
  \n**注**：首次尝试使用词典时，你的 iPod touch 需要下载它。按屏幕提示下载词典即可。\n\n访问词典再简单不过了。只需长按书中的任意单词，便会弹出一个包含多个选项的菜单，供你高亮单词、创建笔记或搜索该单词的其他位置。\n\
  \n![images](img/p249-01.jpg)\n\n![images](img/p249-02.jpg)\n\n轻点`Dictionary`，就会显示该单词的发音和释义。轻点`Done`即可退出词典，返回图书。\n\
  \n#### 设置书内书签\n\n要查看书签，只需轻点屏幕左上角的`Table of Contents`图标（位于`Library`图标旁），然后轻点`Bookmarks`。轻点高亮显示的书签，即可跳转到书中的相应章节。\n\
  \n![images](img/p250-01.jpg)\n\n**提示**：你不需要每次离开`iBooks`时都设置书签。该应用会自动记住你在哪本书的哪里停止阅读。无论你打开并阅读多少本书，这一功能都有效，因此你总能回到某本书中你上次停止阅读的准确位置。`iBooks`应用还会与\
  \ iPad 上的`iBooks`版本同步，因此你可以跨设备来回切换，并保持在你阅读的位置。\n\n#### 使用高亮和笔记\n\n`iBooks`应用有一些非常棒的“附加功能”。例如，有时你可能想高亮某个单词以便稍后回顾，有时你又想在页边空白处给自己留个笔记。\n\
  \n在`iBooks`中，这两件事都非常容易做到。\n\n##### 高亮文本\n\n按以下步骤在 iBooks 应用中高亮文本：\n\n1.  长按任意单词调出菜单选项。\n\
  \n    ![images](img/p250-02.jpg)\n\n2.  从菜单中选择`Highlight`。\n3.  要移除高亮，轻点该单词，然后选择`Remove\
  \ Highlight`。\n\n更改高亮颜色的步骤如下：\n\n![images](img/p251-01.jpg)\n\n1.  轻点高亮的单词。\n2.\
  \  从菜单中选择`Colors`。\n3.  选择一种新颜色。\n\n##### 添加笔记\n\n在`iBooks`的页边空白处添加笔记也很简单：\n\n1.\
  \  像之前一样，长按任意单词。\n2.  从菜单中选择`Note`。\n3.  输入你的笔记，然后轻点`Done`。笔记现在会显示在页面侧边的空白处（参见图\
  \ 13-1）。\n\n**提示**：你的笔记也会出现在扉页上的书签中。只需轻点`Title Page`按钮，然后轻点`Bookmarks`，即可在页面底部找到你写的笔记。\n\
  \n更改笔记颜色的方法与更改高亮颜色的方法相同！\n\n![images](img/1301.jpg)\n\n**图 13-1.** *在`iBooks`中使用笔记功能*\n\
  \n#### 使用搜索功能\n\n`iBooks`内置了强大的搜索功能。只需轻点`Search`图标，内置键盘便会弹出（与 iPod touch 上的其他程序一样）。输入你要搜索的单词或短语，你将看到该单词出现的章节列表。\n\
  \n轻点所需的选项，即可跳转到书中的该章节。你还可以通过轻点`Search`窗口底部的相应按钮，直接跳转到 Google 或 Wikipedia。\n\n![images](img/p252-01.jpg)\n\
  \n**注**：使用 Wikipedia 或 Google 搜索将使你离开`iBooks`并启动`Safari`。\n\n### 移动和删除图书\n\n从 iBooks\
  \ 书库中删除图书的方式，与从 iPod touch 中删除应用非常相似。你可以通过轻点`Library`视图中的`Edit`按钮来删除或移动 iBooks。\n\
  \n左上角。![images](img/p253-01.jpg)\n\n轻点`Edit`按钮后，你会注意到每本书的左上角出现了一个黑色小“`x`”。\n\n![images](img/p253-02.jpg)\n\
  \n只需轻点“`x`”，系统会提示你删除图书。轻点`Delete`后，图书就会从书架上消失。\n\n![images](img/p253-03.jpg)\n\n\
  \n\n### 其他电子书阅读器：Kindle 与 Kobo\n\n正如我们之前提到的，`iBooks` 应用提供了无与伦比的电子书阅读体验。不过，iPod touch\
  \ 上还有其他值得一试的电子书阅读器应用。\n\n![images](img/p253-04.jpg)\n\n许多用户已经拥有 Kindle 并投入了不少资金购买\
  \ Kindle 书库。另一些用户则使用 `Kobo` 电子书阅读软件（之前名为 `Shortcovers`），并为该平台建立了自己的藏书库。\n\n![images](img/p253-02.jpg)\n\
  \n幸运的是，这两个电子书平台都在 iPod touch 的 App Store 中提供了对应的应用。下载并安装任一程序后，你都可以登录并在 iPod touch\
  \ 上阅读该平台的完整书库。\n\n**注意**：无论你选择上述哪一种阅读器，只需“登录”，就能看到你的完整书库，并接着上次阅读的进度继续阅读——即使你上次是在其他设备上开始阅读的。\n\
  \n#### 下载阅读器应用\n\n下载其他阅读器应用非常简单。只需进入 App Store，点击 `类别`，然后点击 `图书`。在此板块中，你会找到 `Kindle`\
  \ 和 `Kobo` 应用。这两款应用都是免费的，因此只需点击 `免费` 按钮即可开始下载其中之一。\n\n**提示**：如果你知道要找的应用名称，直接按名称搜索通常会更快。\n\
  \n安装好你所需的阅读器软件后，点击应用图标即可启动它。\n\n#### Kindle 阅读器\n\n亚马逊的 Kindle 阅读器是世界上最受欢迎的电子书阅读器。数百万用户拥有\
  \ Kindle 图书，而 `Kindle` 应用允许你在 iPod touch 上阅读这些图书。\n\niPod touch 和 iPad 版本的 `Kindle`\
  \ 应用刚刚更新，支持音频和视频功能，这使得这些版本甚至比 Kindle 硬件设备上的版本更为先进。\n\n**提示**：如果你有 Kindle 设备，无需担心从\
  \ iPod touch 登录的问题。你可以将多台设备关联到同一个账户。在 iPod touch 上的 `Kindle` 应用中，你可以畅享为 Kindle 购买的所有图书。\n\
  \n要在 iPod touch 上使用 `Kindle` 应用，只需点击其图标，然后登录你的 Kindle 账户，或使用用户名和密码创建一个新账户。\n\n![images](img/p255-01.jpg)\n\
  \n登录后，你会在 `主页` 上看到你的 Kindle 图书。点击一本书即可开始阅读。\n\n![images](img/p255-02.jpg)\n\n**注意**：若要购买或下载新书，你需要在\
  \ `Safari` 浏览器中访问 [`www.amazon.com`](http://www.amazon.com)。当你在账户中购买或下载了一本新书后，它就会出现在\
  \ `Kindle` 应用中。\n\n要阅读 Kindle 图书，点击封面即可打开。\n\n要查看阅读选项，只需轻触屏幕，它们就会显示在底部图标栏中。\n\n\
  你可以通过点击 `加号` （`+`） 按钮来添加书签。书签设置好后，`加号` （`+`） 按钮会变成 `减号` （`−`） 按钮。\n\n你可以通过点击 `书籍`\
  \ 按钮，跳转到封面、目录或书开头（或指定书中的任何其他位置）。\n\n字体以及页面颜色都可以调整。其中一个非常有趣的功能是可以将页面更改为 `黑色`——这在夜间阅读时非常棒。\n\
  \n![images](img/p256-01.jpg)\n\n要翻到下一页，可以从右向左滑动，或轻触页面右侧。要返回上一页，只需从左向右滑动，或轻触页面左侧。\n\
  \n轻点屏幕，底部会出现一个滑动条；你可以拖动它跳转到书中的任意页面。\n\n要返回到你的图书列表，只需点击 `主页` 按钮。\n\n#### Kobo 阅读器\n\
  \n与 `Kindle` 阅读器类似，`Kobo` 阅读器启动时会要求你登录现有的 Kobo 图书账户。你所有的现有 Kobo 图书随即可供阅读。\n\n`Kobo`\
  \ 的 `书架` 视图采用书架式隐喻，与 `iBooks` 使用的风格类似。点击你想打开的任何图书封面。\n\n或者，你也可以点击 `列表` 标签，以 `列表`\
  \ 视图查看整理好的图书。\n\n![images](img/p257-01.jpg)\n\n打开任何一本书，你会看到 Kobo 阅读器顶部有两个按钮：`正在阅读`\
  \ 和 `设置`。\n\n![images](img/p257-02.jpg)\n\n点击 `正在阅读` 按钮会在你读到的地方放置一个书签，并将屏幕返回到你的\
  \ `书架` 视图。\n\n点击 `设置` 按钮会在屏幕底部显示一系列按钮，用于查看书签、查看图书信息，以及调整页面过渡样式和字体。在这些按钮下方，有四个图标：`字体`、`亮度`、`屏幕锁定`\
  \ 和 `夜间阅读`。轻触这些按钮中的任何一个，即可调整你的阅读体验。\n\n![images](img/p257-03.jpg)\n\n在 `Kobo` 阅读器中要翻到下一页，轻触页面右侧即可。要返回上一页，只需轻触页面左侧。你也可以使用底部的滑动条来翻阅页面。\n\
  \n"
- "# 第 13 章\n\n## 书报摊及其他\n\n在上一章中，我们谈到了 iPod touch 如何通过 iBooks 彻底改变了阅读世界。iPod touch\
  \ 不仅在电子书阅读方面无与伦比，其书报摊文件夹在处理在线报纸和杂志等新媒体方面也独树一帜。此外，App Store 使得查找漫画阅读器、PDF 阅读器等应用变得非常容易。iPod\
  \ touch 甚至准备通过外观精美且互动性极强的漫画书来重振漫画书行业。\n\n在本章中，我们将探讨如何利用 iPod touch 鲜艳的屏幕和出色的触控界面来享受新媒体。\n\
  \n### 书报摊\n\n书报摊是 iPod touch 主页屏幕上一个外观像书架的的特殊文件夹，用于收集和整理你所有的杂志和报纸应用。这个文件夹的行为与普通的\
  \ iPod touch 文件夹不同。如果某个杂志或报纸应用支持书报摊，那么它会在书架上显示该刊物的最新封面图或头版，而不是显示书报摊文件夹图标（你也会在应用快速切换器中看到这个封面或头版）。\n\
  \n如果该杂志或报纸应用提供订阅服务，并且你是订阅用户，那么书报摊应用还可以在夜间自动下载最新一期，这样当你早晨打开时就会有新内容可读。\n\n![images](img/p259-01.jpg)\n\
  \n书报摊文件夹还有一个 `商店` 按钮，点击后会带你进入 App Store 的一个特殊区域。此区域列出了所有当前支持书报摊的杂志和报纸应用。\n\n除了特殊的展示方式和自动下载新刊物的能力外，书报摊应用在功能上与其他应用并无二致。\n\
  \n**注意**：是否添加书报摊支持，取决于每个杂志和报纸应用本身。在撰写本文时，许多（但非全部）杂志应用已添加书报摊支持。如果某个应用不支持书报摊，它将被下载到\
  \ `主页` 屏幕上，并像任何普通的、非书报摊应用一样运行。\n\n此外，杂志和报纸的选择因国家/地区而异，差异可能很大。请使用书报摊中的 `商店` 按钮，查看你所在地区的最新选择。\n\
  \n\n\n### 购买与订阅期刊\n\n`报摊`中的报纸和杂志应用通常是免费的；然而，它们通常内置的内容很少，甚至没有。要获取内容，你需要购买单期杂志或订阅多期。\n\
  \n购买单期杂志的处理方式与其他应用内购买相同。通常，你会看到一个近期期刊列表，左侧是封面图，右侧是内容简介，同时标有该期杂志的价格。点击价格，系统会要求你输入\
  \ iTunes 密码以确认购买。一旦确认购买，你订阅的期刊将开始下载。\n\n![images](img/p260-01.jpg)\n\n订阅报纸和杂志的处理方式类似于一种持续特定时长的特殊应用内购买。例如，你通常可以按固定价格购买一年份的报纸。有些报纸和杂志提供不同的订阅时长选项，例如三年、六个月等。还有些提供包含纸质版和数字版的捆绑套餐。请务必仔细阅读你的选项，并找出哪个能为你带来最大价值。\n\
  \n你可能想知道，如果你已经购买了订阅或单期杂志，却需要重新安装显示内容的应用程序该怎么办。如果发生这种情况，你只需重新安装应用，然后恢复你的订阅或重新下载你之前购买的任何单期杂志。换句话说，在`报摊`应用中恢复内容的过程，与恢复其他任何应用内购买的内容完全相同。\n\
  \n![images](img/p261-01.jpg)\n\n### 报纸\n\n还记得报纸被送到家里的日子吗？无一例外，如果人行道上有一个水坑，那准是报纸掉落的地方！你把它从塑料袋里拿出来，抖落水珠，然后努力辨认被浸湿的部分写了什么。\n\
  \n好吧，那些日子可能一去不复返了。现在，你可以与新闻互动，甚至每天都能收到你的报纸——不过它会被送到你的 iPod touch 上，而不是你的车道上。\n\n\
  许多报纸和新闻网站正在为 iPod touch 开发应用，似乎每天都有新的应用出现。其中一些应用提供一定程度的免费内容，但需要你创建账户或订阅才能获取更多内容。其他应用则仅通过订阅提供内容。\n\
  \n**注意：** 如果你已经订阅了你当地报纸的印刷版，它可能会为你提供对其 iPod touch 应用的折扣甚至免费访问权限。请务必仔细阅读任何注册或订阅优惠，以确认你是否有资格。\n\
  \n许多报纸也拥有专门的网站。有些针对 iPod touch 和`Safari`进行了优化，而另一些则提供完整的网页体验。有些网站需要注册或付费订阅才能查看报纸的全部内容。\n\
  \n让我们快速浏览一下美国最大的报纸之一《*纽约时报*》，看看该报是如何革新在 iPod touch 上阅读新闻的体验的。\n\n#### 《纽约时报》应用\n\
  \n《*纽约时报*》提供了各种免费和付费的应用，让你在 iPod touch 上获取新闻。\n\n《*纽约时报*》在其免费的 iPod touch 应用中提供了一个精简版的报纸。\n\
  \n页面底部有四个软键：`头条新闻`、`邮件转发最多`、`收藏`和`版块`。每个版块都包含当天报纸中对应版块的文章样本。\n\n点击`版块`会显示《*纽约时报*》所有版块的标签页。\n\
  \n![images](img/p262-01.jpg)\n\n导航**《纽约时报》** 应用就像点击一篇文章然后滚动浏览一样简单。在阅读故事时，只需点击屏幕中央，顶部和底部的软键就会显示出来。\n\
  \n要返回`首页`，请点击左上角的`最新新闻`按钮。\n\n**注意：** 如果你在其他版块——比如*科技*——左上角的按钮会显示`科技`。![images](img/p262-02.jpg)\n\
  \n要邮寄一篇文章，只需点击左下角的`分享`图标。此按钮仅在文章内部页面可用，在`首页`不可用。\n\n点击该图标，你就可以通过电子邮件发送文章、复制链接或分享到\
  \ Twitter。\n\n#### 浏览与享受内容\n\n在尝试使用不同的报纸应用一段时间后，你会开始意识到，浏览报纸内容并没有真正的标准。这意味着你需要熟悉每个应用自己导航文章的方式，以及如何返回主屏幕。以下是浏览这类应用的一般简要指南：\n\
  \n- **显示或隐藏控制按钮或标题：** 通常点击一次屏幕会显示隐藏的控制或图片标题。你可以再次点击屏幕以重新隐藏这些元素。\n- **查看文章详情：** 通常，你就像在网页上一样滚动浏览文章。\n\
  - **观看视频：** 通常，你只需点击视频即可开始播放。请参阅第 14 章：“观看视频”了解如何在 iPod touch 上操作视频。\n- **放大视频或图片尺寸：**\
  \ 你可以尝试在视频或图片上双指张开，然后双击。你也可以寻找`展开`按钮，或尝试旋转至横屏模式。\n- **缩小视频或图片尺寸：** 你可以尝试在视频或图片内双指合拢来缩小视频尺寸。你也可以寻找`关闭`或`最小化`按钮，或尝试旋转回竖屏模式。\n\
  - **分享文章：** 通过电子邮件发送文章链接，或在 Twitter、Facebook 或 LinkedIn 等社交网络上分享，是一项常见功能。请寻找`操作`或`分享`按钮。\n\
  - **调整字体大小：** 许多报纸应用都有一个按钮或设置选项，用于增加或减少默认字体大小，使内容更易于阅读。\n\n### 杂志\n\n过去几年，报纸和杂志的读者数量都在下降，这已不是秘密。iPod\
  \ touch 提供了一种全新的阅读杂志的方式，这或许能给该行业带来所需的推动。\n\n在 iPod touch 上，杂志中的图片异常清晰明亮。浏览通常很容易，故事似乎也变得生动起来，远胜于其纸质版本。再加上直接集成到杂志中的视频和声音，你就能看到\
  \ iPod touch 如何真正提升了杂志的阅读体验。\n\n一些杂志，例如《*时代周刊*》，包含指向实时或频繁更新内容的链接。这些链接可能被称为*新闻推送*、*直播版*或*更新*。在你购买的任何杂志中查找它们——这些链接将帮助你获取最新的信息。\n\
  \n**提示：** 在购买杂志或其他应用之前，务必查看用户评价。这样做可能会为你省下金钱或烦恼！\n\nApp Store 里有几种不同类型的杂志应用。首先，你可以找到允许你购买单期杂志或免费查看特定杂志有限内容的应用。其次，你可以找到提供多种杂志样本的杂志阅读器；这些阅读器允许你订阅某本杂志的每周或每月推送。\n\
  \n如果你在`App Store`中按`类别` ![images](img/U001.jpg) `报摊`浏览，然后点击顶部的“免费排行”，你可以查看所有免费的杂志和报纸。\n\
  \n![images](img/p264-01.jpg)\n\n\n\n### Zinio 杂志应用——体验版\n\n`Zinio` 应用采用了一种独特的方式。这款应用在\
  \ App Store 上是免费的，它能让你订阅数百种杂志。在 `Zinio` 中阅读杂志只需几个简单的步骤：\n\n1.  登录 `Zinio` 应用（你可以创建一个免费账户）。\n\
  2.  在`我的资料库`区域查看并下载免费样本，或点击底部的`商店`按钮购买杂志。\n3.  有些杂志可能会提供完整的免费期数。只需查看`我的资料库`区域，看看有哪些可用的内容。\n\
  \n![images](img/p265-01.jpg)\n\n有许多流行杂志可供选择。类别涵盖了从艺术到体育等方方面面。价格各不相同，但通常你可以选择购买单期或订阅一年。\n\
  \n例如，最新一期的*大众机械*在 `Zinio` 上的售价为 1.99 美元，而一年订阅价为 7.99 美元。\n\n有些订阅非常划算。撰写本文时，一本*自行车杂志*的单期售价为\
  \ 4.99 美元，而一年订阅价仅为 9.00 美元。\n\n仔细一看，撰写本文时可供订阅的自行车杂志超过 16 种。\n\n![images](img/p265-02.jpg)\n\
  \n### 漫画书\n\n随着 iPod touch 的出现，一种有望卷土重来的“新媒体”类型是漫画书。iPod touch 凭借其高清屏幕和强大的处理器，让漫画书的页面变得栩栩如生。\n\
  \n目前已有几款漫画书应用可用，其中包括来自著名的漫威漫画公司的应用。DC 漫画公司也刚刚推出了自己的应用。这款应用与制作漫威应用的是同一家公司。\n\n要在\
  \ App Store 中找到 `Marvel Comics` 应用，请前往`类别`，然后选择`图书`。该应用是免费的，你可以从应用内购买漫画书。\n\n在`主页`屏幕的底部，你会看到五个按钮：`我的漫画`、`精选`、`免费`、`前\
  \ 25 名`和`浏览`。你购买的漫画将归在`我的漫画`标题下。\n\nApp Store 让你有机会下载免费漫画和单期在售漫画。大多数售价为每期 1.99 美元。\n\
  \n每个标签都会带你进入一个新的漫画列表进行浏览，非常类似于 iTunes 商店。\n\n点击`浏览`按钮，可以按`系列`、`创作者`、`类型`、`评级`、`故事线/剧情弧`或`发售日期`进行浏览。或者你也可以输入搜索词来寻找特定的漫画。\n\
  \n![images](img/p266-01.jpg)\n\n你可以通过两种方式阅读漫画书。第一种，你可以滑动翻页，一页一页地阅读。第二种，你可以双击某个画格进行`放大`，然后点击屏幕前进到漫画条带中的下一个画格。从那里，你只需从右向左滑动即可前进一个画格；或者，如果你想返回，则从左向右滑动。\n\
  \n要返回`主页`屏幕或查看屏幕选项，只需点击屏幕中央。你会在左上角看到一个`设置`按钮。点击它，你可以`跳转到第一页`、`浏览到某一页`，或进入`设置`菜单。\n\
  \n![images](img/p267-01.jpg)\n\n**注意：** 这款应用的开发者 `ComiXology` 也制作了包含漫威漫画的应用，以及其他许多漫画应用，包括\
  \ DC、阿奇、映像和 Top Cow。\n\n### 将 iPod touch 用作 PDF 阅读器\n\n有几种程序可以将 iPod touch 变成一个功能强大的\
  \ PDF 阅读程序。例如，你也可以在 `iBooks` 应用中阅读 PDF 文件。然而，另一款出色的 PDF 阅读器叫做 `GoodReader for iPhone`。（没错——它写着“for\
  \ iPhone”，但你完全可以在你的 iPod touch 上正常使用）。\n\n**注意：** 第 16 章：“使用电子邮件通信”向你展示了如何打开附件，包括\
  \ PDF 文件。`GoodReader` 应用的一大好处是，它允许你使用 Wi-Fi 传输大型 PDF 文件。\n\n你可以在 App Store 的`效率`类别中找到\
  \ `GoodReader for iPhone` 应用。撰写本文时，这款应用售价为 4.99 美元。\n\n**注意：** `iBooks` 也可以阅读作为电子邮件附件发送的\
  \ PDF 文件。如果已安装 `iBooks`，只需在打开 PDF 时选择`在 iBooks 中打开`即可。\n\n![images](img/p268-01.jpg)\n\
  \n#### 将文件传输到你的 iPod touch\n\n`GoodReader for iPhone` 应用的一大优点是，你可以使用它将大文件从你的 Mac\
  \ 或 PC 无线传输到 iPod touch，以便在 `GoodReader` 应用中查看。你也可以像第 3 章：“与 iCloud、iTunes 等同步”中所讨论的那样，使用\
  \ `GoodReader` 在 iTunes 中进行文稿共享。按照以下步骤使用 `GoodReader` 传输文件：\n\n1.  点击屏幕左下角的小`Wi-Fi`图标，\n\
  \n    ![images](img/p269-01.jpg) 然后会弹出`Wi-Fi 传输工具`。系统会提示你在浏览器中输入一个 IP 地址，或者如果你使用\
  \ `Bonjour` 服务，则输入 Bonjour 地址。\n\n2.  将 `GoodReader` 窗口中显示的地址输入到电脑的网页浏览器中。现在，你可以将你的电脑当作服务器。你会看到你的电脑和\
  \ iPod touch 现在已连接。你可以在浏览器中为这个页面添加书签，但请注意，如果你重启无线网络路由器并且你的 iPod touch 获得了不同的无线网络地址，这个地址可能会改变。\n\
  3.  在电脑的网页浏览器中点击`选择文件`按钮，找到要上传到 iPod touch 的文件。\n4.  选择文件后，点击`上传所选文件`，文件将自动传输到你的\
  \ iPod touch。\n\n这有什么用呢？举个例子，对于其中一位作者（加里）来说，iPod touch 已经成为存放超过 100 份钢琴乐谱的存储库。这意味着不再需要下载\
  \ PDF 文件、打印出来、装进活页夹，然后还要努力记住哪首歌在哪个活页夹里。现在，他所有的乐谱都编录在 iPod touch 上。他只需将 iPod touch\
  \ 放在钢琴上，就能在一个地方访问他所有的乐谱。\n\n**注意：** `GoodReader` 甚至可以解压你作为电子邮件附件接收的文件。\n\n浏览 `GoodReader`\
  \ PDF 阅读器非常容易。这款应用比其他应用更灵敏，所以快速点击屏幕中央即可调出屏幕控件。然后你可以进入你的资料库，或点击`翻页`图标翻页。\n\n浏览页面最简单的方法是点击屏幕右下角前进一页，或点击屏幕左上角返回一页。过一会儿，这就会变得非常自然。\n\
  \n你也可以向上或向下轻弹来翻页。\n\n要转到另一个 PDF 文件或另一份乐谱，只需快速点击 iPod touch 屏幕中央，然后点击左上角的`我的文稿`按钮即可。\n\
  \n![images](img/p270-01.jpg)\n\n#### 使用 GoodReader 连接到 Google Docs 及其他服务器\n\n你也可以使用\
  \ `GoodReader` 连接到 `Google Docs` 及其他服务器。请按照以下步骤操作：\n\n1.  在`网页下载`标签中，选择`连接到服务器`。\n\
  2.  选择 `Google Docs`。（你可以选择多种不同的服务器：邮件服务器、MobileMe iDisk、公共 iDisk、Dropbox、box.net、FilesAnywhere.com、MyDisk.se、WebDAV\
  \ 服务器和 FTP 服务器。）\n3.  输入你的 `Google Docs` 用户名和密码进行登录。\n4.  建立连接后，一个新的 `Google Docs\
  \ 服务器`图标将出现在页面右侧的`连接到服务器`标签下。\n5.  点击新的 `Google` 标签以连接到服务器（需要互联网连接）。\n6.  现在你会看到你存储在\
  \ `Google Docs` 上的所有文档列表。点击任何文档并选择文件类型进行下载。通常，PDF 格式效果很好。（Google Docs 可以执行`另存为...`操作，并且\
  \ PDF 文件更容易处理。）\n\n文件下载完成后，它将出现在 `GoodReader` 的左侧；你可以直接点击它将其打开。\n\n"
- "# 第 14 章\n\n\n\n## 观看视频\n\niPod touch 为您提供了出色的视频播放平台，让您尽享各类视频、电视节目和电影。这一点在众多可用的视频观看应用中体现得尤为突出。\n\
  \n在本章中，我们将向您展示如何在 iPod touch 上观看电影、电视节目、播客和音乐视频。\n\n您可以从 iTunes Store 或 iTunes U\
  \ 免费购买或下载许多视频。您还可以将 iPod touch 关联到您的 Netflix 帐户（很可能很快也能关联其他视频租赁服务），从而观看流媒体电视节目和电影。\n\
  \n通过您的 iPod touch，您还可以在 `Safari` 浏览器中以及通过 App Store 中的各种应用观看 YouTube 视频和网络视频。\n\n\
  **注意：** 在本书出版时，`Netflix` 应用仅在美国和加拿大可用。我们希望类似的应用能够进入更广阔的国际市场。\n\n### 将 iPod touch\
  \ 用作视频播放器\n\niPod touch 不仅是一款出色的音乐播放器，它还是一套绝佳的便携式视频播放系统。其宽屏显示、快速处理器、惊人的像素密度以及优秀的操作系统，使得观看从音乐视频到电视节目乃至全长电影的各类内容都成为一种真正的享受。iPod\
  \ touch 的尺寸非常适合靠在椅背上观看或在飞机上使用。它也是在长途驾车旅行中安抚后排孩子的利器。近 10 小时的电池续航意味着您甚至可以乘坐一次横跨大陆的航班而不用担心电量耗尽！您还可以为您的汽车购买一个“电源逆变器”，让\
  \ iPod touch 的充电时间更长（请参见第 1 章：“入门指南”中的“为 iPod touch 充电及电池使用技巧”部分）。\n\n#### 将视频加载到\
  \ iPod touch\n\n您可以通过电脑上的 `iTunes` 应用或直接在 iPod touch 上的 `iTunes` 应用中加载视频，操作方式与加载音乐类似。\n\
  \n如果您在电脑上从 `iTunes` 购买或租借了视频，则可以手动或自动将这些视频同步到您的 iPod touch。\n\n#### 在 iPod touch\
  \ 上观看视频\n\n要观看视频，只需轻点 `Videos` 应用。\n\n**注意：** 您还可以通过 `YouTube` 应用、`Safari` 应用以及从\
  \ App Store 加载的其他视频相关应用来观看视频。\n\n![images](img/p272-01.jpg)\n\n#### 视频分类\n\n`iPod`\
  \ 应用中 `Video` 标签下的 `Videos` 应用的每个部分都由水平条分隔，水平条内显示一个或多个可能的分类名称：`Movies`、`TV Shows`、`Podcasts`\
  \ 和 `Music Videos`。第一个分类是 `Movies` 部分；如果您的 iPod touch 上已加载电影，则会显示该部分。\n\n您可能会看到更多或更少的分类，这取决于您在\
  \ iPod touch 上加载的视频类型。如果只加载了 `Movies` 和 `iTunes U` 视频，那么您将只看到这两个分类按钮。只需向上或向下滚动即可显示该分类中对应的视频。\n\
  \n![images](img/p272-02.jpg)\n\n#### 搜索视频\n\n如果您的 iPod touch 上加载了大量视频和其他内容，并且想要找到某个特定的视频，可以按照以下步骤操作：\n\
  \n1.  轻点屏幕顶部的“时间”区域，跳转到搜索框。\n\n    ![images](img/p273-01.jpg)\n\n2.  输入视频标题的几个字母或一两个单词。\n\
  3.  在本示例中，我们输入了“email”，以查找与在 iPod touch 上使用电子邮件相关的任何视频。随后弹出了一个视频教程，展示如何从作者的一个网站处理电子邮件附件：[www.MadeSimpleLearining.com](http://www.MadeSimpleLearining.com)。\n\
  4.  轻点搜索结果中出现的任何视频即可开始播放。\n\n![images](img/p273-02.jpg)\n\n### 播放电影\n\n只需轻点您想观看的电影，它便会开始播放。大多数视频都利用\
  \ iPod touch 相对较大的屏幕空间，以宽屏（即横向）模式播放。只需将 iPod touch 侧向旋转即可观看。\n\n视频将自动开始播放。刚开始播放时，屏幕上除了视频本身，没有任何菜单、控制选项或其他内容。\n\
  \n您可以轻点屏幕上的任意位置，使控制栏和其他选项显示出来。`Videos` 应用中的大多数选项与 `Music` 应用中的非常相似。轻点 `Play/Pause`\
  \ 按钮，视频将暂停。再次轻点 `Play/Pause` 按钮，视频将继续播放。\n\n#### 快进或快退视频\n\n`Play/Pause` 按钮的两侧分别是常用的\
  \ `Fast-Forward` 和 `Rewind` 按钮。要跳转到视频中特定的下一个章节部分，只需按住 `Fast-Forward` 按钮（位于 `Play/Pause`\
  \ 右侧）。当到达所需位置时，松开按钮，视频将恢复正常播放。\n\n按下 `Pause` 暂停视频后，您可以按住 `Fast-Forward` 或 `Rewind`\
  \ 按钮进行慢速快进或快退。有趣的是，您也能听到音频随之变慢。\n\n要快退到视频开头，请轻点 `Rewind` 按钮。要快退到特定部分或位置，请像快进视频时那样按住该按钮。\n\
  \n**注意：** 如果这是一个包含多个章节的完整长度电影，轻点 `Reverse` 或 `Fast-Forward` 将向前或向后移动一个章节。\n\n####\
  \ 使用时间进度条\n\n在视频屏幕的顶部有一个滑块，您可以通过它来*拖动*视频的播放进度。如果您确切（或大致）知道要观看视频的哪个时间点，只需按住滑块并将其拖到该位置即可。有些人认为这比按住\
  \ `Fast-Forward` 或 `Rewind` 按钮要更精确一些。\n\n![images](img/p274-01.jpg)\n\n**提示：** 向下拖动手指可以更缓慢地移动滑块控制。\n\
  \n#### 更改视频大小（宽屏 vs. 全屏）\n\n您的大多数视频将以宽屏格式播放。但是，如果某个视频未经转换以适配您的 iPod touch，或者未针对您的屏幕分辨率进行优化，您可以轻点位于上方状态栏右侧的\
  \ `Expand` 按钮。\n\n您会注意到该按钮上有两个箭头。如果处于全屏模式，箭头指向内侧，相互朝向。如果处于宽屏模式，箭头则指向外侧。\n\n![images](img/p275-01.jpg)\n\
  \n如果宽屏电影未填满 iPod touch 的整个屏幕，轻点此按钮将稍微放大。再次轻点则恢复原大小。\n\n**注意：** 您也可以简单地双击屏幕来放大并填满屏幕。请注意，就像在您的宽屏电视上一样，试图将非宽屏视频强行设置为宽屏模式有时可能会导致部分画面丢失。\n\
  \n\n\n#### 使用 AirPlay\n\n苹果的 AirPlay 镜像功能可让您将视频投射到 Apple TV，从而在电视大屏幕上欣赏。只需轻点右下角的\
  \ `AirPlay` 按钮，然后选择 `Apple TV` 作为输出目标。稍等片刻，您的 iPod touch 屏幕会变暗，视频会从上次暂停处开始在电视大屏幕上播放。\n\
  \n![images](img/p275-02.jpg)\n\n要将视频画面切换回 iPod touch，请再次轻点 `AirPlay`，然后选择 `iPod\
  \ touch` 作为目标。\n\n![images](img/p275-03.jpg)\n\n**提示：** 如果您没有或不想使用 Apple TV，还有其他几种观看电影的方式。例如，您可以购买\
  \ VGA 或 HDMI 转接器，将 iPod touch 连接到 VGA 电脑显示器或高清电视。\n\nVGA 仅支持视频，要求应用支持此功能，且通常不支持数字版权管理（DRM）。HDMI\
  \ 支持视频和音频，也要求应用支持该功能。不过，它也符合 HDCP 标准，因此可与 iTunes 视频等包含 DRM 的内容配合使用。\n\n苹果还提供符合 DRM\
  \ 标准且兼容大多数电视的色差分量视频线缆。\n\n更多信息，请参阅《快速入门指南》中的“配件”部分。\n\n#### 使用章节功能\n\n从 iTunes 商店购买的大多数完整长度电影（以及部分为\
  \ iPod touch 转换的电影）都会提供章节功能。在 iPod touch 上观看此类电影，就像在家中的电视上观看 DVD 一样。\n\n只需轻点屏幕调出视频控制项，然后选择\
  \ `章节`。\n\n![images](img/p276-01.jpg)\n\n这样会带您返回电影的主页面。\n\n轻点右上角的 `章节` 按钮，然后滚动浏览，找到并轻点您想观看的章节。\n\
  \n##### 查看章节\n\n您可以滚动或快速翻动来定位想观看的场景或章节。\n\n您还会注意到，每个章节的最右侧，是该章节开始的确切时间（相对于电影开始的时间）。\n\
  \n![images](img/p277-01.jpg)\n\n除了前面提到的章节菜单外，您还可以通过轻点 `快退` 或 `快进` 按钮，快速跳转到电影中的上一个或下一个章节。轻点一次，即可向任一方向跳转一个章节。\n\
  \n**注意：** 章节功能通常仅适用于从 iTunes 商店购买的电影。转换后加载到 iPod touch 上的电影通常不包含章节。\n\n#### 观看电视节目\n\
  \niPod touch 非常适合观看您喜爱的电视节目。您可以从 iTunes 商店购买电视节目，也可以从某些 iPod touch 应用（例如 `Hulu Plus`\
  \ 应用）下载示例节目。\n\n只需向下滚动到 `电视节目` 类别分隔线，即可查看已下载到 iPod touch 上的节目。浏览可用的节目并轻点 `播放`。视频控制项的操作方式与观看电影时的控制项相同。\n\
  \n![images](img/p277-02.jpg)\n\n**注意：** 在撰写本文时，iTunes 云服务允许美国用户将之前购买的电视节目直接重新下载到他们的\
  \ iPod touch 上（更多信息，请参阅第 21 章：“您设备上的 iTunes”）。\n\n#### 观看播客\n\n我们通常认为播客是可以通过 iTunes\
  \ 下载的纯音频广播。视频播客现在也相当普遍，可以在许多网站上找到，包括许多公共广播网站。它们也可以在 iTunes 的 `iTunes U` 板块中找到；该板块列出了大学播客及其他相关信息。\n\
  \n![images](img/p278-01.jpg)\n\n这是加里·马佐讲述的一个有趣的 iTunes U 故事：\n\n> “最近，我和刚被加州理工学院录取的儿子一起在\
  \ iPod touch 的 `iTunes` 应用中浏览 `iTunes U` 板块。我们想知道宿舍的情况，你瞧，我们找到了一个展示加州理工学院宿舍参观之旅的视频播客。我们下载了它，这个播客就自动进入了\
  \ `podcast` 目录，方便以后观看。我们不用从东海岸飞过去，就完成了一次完整的宿舍虚拟参观。”\n\n#### 观看音乐视频\n\n您的 iPod touch\
  \ 可以从多个来源获取音乐视频。通常，如果您从 iTunes 购买了“豪华版”专辑，它会附带一到两个音乐视频。您也可以从 iTunes 商店购买音乐视频，许多唱片公司和唱片艺术家会在他们的网站上免费提供这些视频。\n\
  \n音乐视频会自动归类到 `Videos` 应用的 `音乐视频` 板块中。\n\n`音乐视频` 通常位于 `Videos` 列表中的 `电视节目` 正下方。其控制项的操作方式与所有其他视频应用相同。\n\
  \n![images](img/p278-02.jpg)\n\n### 视频选项\n\n与音乐播放器一样，您也可以调整视频播放器的几个选项。这些选项可通过 `主屏幕`\
  \ 上的 `设置` 图标进行访问。\n\n轻点 `设置` 图标，向下滚动并轻点 `视频` 以查看可用选项。\n\n在这里，您还可以设置“家庭共享”设置，以便直接从\
  \ iPod touch 观看存储在电脑 iTunes 资料库中的视频。\n\n![images](img/p279-01.jpg)\n\n#### 开始播放选项\n\
  \n有时，您会不得不中断观看某个特定视频。此选项可让您决定下次想观看该视频时的操作。您可以选择从头开始观看，或者从上次中断处继续观看。只需选择您偏好的选项，这将成为您\
  \ iPod touch 此后采取的行动。\n\n![images](img/p279-02.jpg)\n\n#### 隐藏式字幕\n\n如果您的视频支持隐藏式字幕功能，将\
  \ `隐藏式字幕` 开关设为 `ON`，即可在屏幕上显示隐藏式字幕。\n\n### 删除视频\n\n要删除视频（以节省 iPod touch 上的空间），只需向上或向下滚动，并选择要删除的视频。\n\
  \n**注意：** 如果您正在从 iTunes 同步视频，请确保同时取消勾选您要删除的视频；否则，iTunes 可能会在下次同步时将其重新同步回您的 iPod\
  \ touch！\n\n只需在要删除的视频上轻触并向左滑动。就像删除电子邮件一样，左上角会出现一个红色的 `删除` 按钮。轻点 `删除` 按钮，系统会提示您确认删除视频。\n\
  \n最后，轻点 `删除` 按钮，该视频将从您的系统中删除。\n\n**注意：** 此过程仅会从您的 iPod touch 上删除视频——假设您在购买视频后已与电脑同步，iTunes\
  \ 中您的视频资料库里仍会保留一份副本。如果您愿意，以后可以将其重新加载到 iPod touch 上。但是，如果您从 iPod touch 上删除租借的电影，它将被永久删除！\n\
  \n### 在 iPod touch 上使用 YouTube\n\n如今，观看 YouTube 视频无疑是人们在电脑上最常做的事情之一。现在，YouTube 就在您的\
  \ iPod touch 上，触手可及。\n\n您可以在 `主屏幕` 上看到 `YouTube` 图标。只需轻点此图标，即可进入 `YouTube` 应用。\n\
  \n![images](img/p280-01.jpg)\n\n#### 搜索 YouTube 视频\n\n首次启动 `YouTube` 时，您通常会看到 YouTube\
  \ 当天的“精选”视频。\n\n像在其他应用中一样，滚动浏览视频选项即可。\n\n![images](img/p280-02.jpg)\n\n\n\n####\
  \ 使用底部图标\n\n`YouTube` 应用底部有五个图标：`精选`、`最多观看`、`搜索`、`收藏`和`更多`。每个选项的含义都一目了然。\n\n![images](img/p281-01.jpg)\n\
  \n要观看 YouTube 当天推荐的视频，请触摸`精选`图标。要观看网上点击量最高的视频，请触摸`最多观看`图标。\n\n观看某个特定视频后，你可以选择将其标记为\
  \ `YouTube` 上的收藏，以便日后轻松查找。如果你已设置书签，点击`收藏`图标时它们就会显示出来。\n\n![images](img/p281-02.jpg)\n\
  \n你还可以搜索 YouTube 庞大的视频库。点击`搜索`框（如之前讨论的其他应用中的操作一样），键盘就会弹出。输入短语、主题，甚至视频名称。\n\n在此示例中，我正在寻找最新的《Made\
  \ Simple Learning》视频教程——所以我只需输入“Made Simple Learning”即可看到此类视频的列表。\n\n当我找到想观看的视频时，可以点击它以查看更多信息。我甚至可以在播放过程中触摸视频并选择评分来对其进行评分。\n\
  \n![images](img/p281-03.jpg)\n\n#### 播放视频\n\n一旦做出选择，点击你想观看的视频。你的 iPod touch 将开始以竖屏或横屏模式播放\
  \ YouTube 视频。要强制使用竖屏模式，只需转动 iPod touch，使屏幕方向变为垂直。\n\n#### 视频控制\n\n视频开始播放后，屏幕上的控制选项会消失，因此你只能看到视频。要在视频播放时停止、暂停或激活任何其他选项，只需点击屏幕。\n\
  \n屏幕上的选项与你观看其他任何视频时看到的选项非常相似。\n\n要在横屏模式下快进视频，请按住`快进`箭头。要快速后退，请按住`后退`箭头。要跳转到 YouTube\
  \ 列表中的下一个视频，请点击`快进/下一个`箭头。要观看列表中的上一个视频，请点击`后退/上一个`箭头。\n\n![images](img/p282-01.jpg)\n\
  \n要将视频设为收藏，请点击最左边的图标：`收藏`。![images](img/p282-02.jpg)\n\n要将视频投放到你的 Apple TV，请点击`AirPlay`按钮。![images](img/p282-03.jpg)\n\
  \n![images](img/p282-04.jpg)\n\n要添加到收藏、通过电子邮件发送或发布推文分享视频，请点击`分享`图标，然后你可以执行其中任一操作。\n\
  \n![images](img/p282-05.jpg)\n\n#### 查看和清除历史记录\n\n![images](img/p283-01.jpg)\n\n\
  触摸`更多`，然后触摸`历史记录`，你最近观看过的视频就会显示出来。\n\n如果你想清除历史记录，只需触摸右上角的`清除`按钮，然后点击底部的按钮进行确认。\n\
  \n要从历史记录中观看视频，只需点击它，它便会开始播放。\n\n![images](img/p283-02.jpg)\n\n"
- "# 第 15 章\n\n## Safari 网页浏览器\n\n现在，我们将带你了解在 iPod touch 上能做的最有趣的事情之一：上网冲浪。你可能听说过，在\
  \ iPod touch 上浏览网页是一种前所未有的亲密体验——我们同意这一点！我们将向你展示如何使用 iPod touch 上的 `Safari` 浏览器以前所未有的方式进行触摸、缩放和与网页互动。你将学习如何设置和使用书签、使用搜索引擎快速查找内容、打开和切换多个浏览器窗口，甚至轻松复制网页中的文本和图形。\n\
  \n### 在 iPod touch 上浏览网页\n\n你可以通过 Wi-Fi 随心所欲地浏览网页。与其大一些的同类产品 iPad 一样，你的 iPod touch\
  \ 拥有许多人认为当今功能最强大的移动浏览体验。网页看起来与电脑上的网页非常相似。借助 iPod touch 的缩放功能，你甚至不必担心较小的屏幕尺寸会限制你的网页浏览体验。简而言之，在\
  \ iPod touch 上浏览网页是一种更令人满意的体验。\n\n你可以根据自己的偏好选择竖屏或横屏模式进行浏览。通过双击或捏合展开操作，可以快速放大视频——这些操作与放大文本和图形的操作相同。\n\
  \n**为什么有些视频和网站不显示？（需要 Flash Player）**\n\n![images](img/p286-01.jpg)\n\n一些网站是用 `Adobe\
  \ Flash Player` 设计的；但在撰写本文时，Apple 已决定不支持此应用程序。如果你点击视频但视频无法播放——或者你看到类似“需要 Flash 插件”、“下载最新\
  \ Flash 插件以观看此视频”或“需要 Adobe Flash 才能查看此站点”的信息——那么你将无法观看该视频或网页。幸运的是，包括 YouTube、Vimeo、TED、《*纽约时报*》和《*时代*》杂志在内的越来越多的网站开始使用\
  \ HTML5 视频代替 `Flash`，这些内容都能在你的 iPod touch 上播放。\n\n解决此限制的一种方法是：App Store 上的一些替代浏览器（例如\
  \ `Skyfire`）会在其自己的服务器上渲染 `Flash` 视频，然后将 HTML5 视频发送至 iPod touch。\n\n#### 需要网络连接\n\
  \n你的 iPod touch 需要处于有效的互联网连接状态才能浏览网页（请查看第 4 章：“连接到网络”以了解更多信息）。\n\n#### 启动网页浏览器\n\
  \n你应该会在`主屏幕`上找到 `Safari`（网页浏览器）应用。通常，`Safari` 图标位于底部 Dock 中。\n\n![images](img/p286-02.jpg)\n\
  \n触摸 `Safari` 图标，你可能会被带到浏览器的`主页`。这可能是 Apple 的 iPod touch 页面。\n\n只需将 iPod touch 侧向转动，即可在更宽的横屏模式下看到同一页面。当你找到喜欢的网站时，可以设置书签以便轻松跳转到这些网站。我们将在本章后面向你展示如何操作。\n\
  \n![images](img/p287-01.jpg)\n\n#### Safari 网页浏览器屏幕布局\n\n查看屏幕时，请注意`地址栏`位于屏幕的左上角。此栏显示当前的网址。\n\
  \n如果你正在查看一个包含合适文本内容的网页，你会注意到地址栏中出现了`阅读器`按钮。点击“阅读器”按钮，即可以便于阅读的格式查看网页内容。更多信息请查看本章中的“Safari\
  \ 阅读器”部分。\n\n搜索窗口位于地址栏的右侧。默认情况下，它设置为 Google 搜索，但如果你愿意，可以将其更改为其他搜索引擎。\n\n屏幕底部有五个图标：`后退`、`前进`、`操作`、`书签`和`页面`视图。\n\
  \n![images](img/p287-02.jpg)\n\n#### 输入网址\n\n你要学习的第一件事是如何访问你喜爱的网页。就像在电脑上一样，你在浏览器中输入网址\
  \ (URL)。请按照以下步骤在 `Safari` 中输入网址：\n\n1.  首先，点击浏览器顶部的`地址`栏。你会看到键盘出现，并且`地址`栏的窗口会展开。\n\
  2.  如果窗口中已有地址且你想删除它，请按地址栏右端的 ![images](img/p288-01.jpg)。\n3.  开始输入你的网址（你不需要输入“`www`”）。\n\
  4.  开始输入时，你可能会看到`地址`栏下方出现建议；只需点击任一建议即可转到该页面。这些建议非常全面，因为它们来自你的浏览历史记录、书签、网址 (URL)\
  \ 和网页标题。\n5.  记住页面底部的 `.com` 键。如果你按住它不放，会看到 `.edu`、`.org` 和其他常见域名类型。\n6.  输入完成后，点击`前往`键即可转到该页面。\n\
  \n**提示：** 不要输入“`www`”，因为这不是必需的。记得使用底部的`冒号`、`正斜杠`、`下划线`、`点`和 `.com` 键以节省时间。\n\n**提示：**\
  \ 按住 `.com` 键不放，可查看所有选项：`.org`、`.edu`、`.net`、`.de` 等等。\n\n\n\n### 在打开的网页间前进或后退\n\
  \n现在你已经知道如何输入网址，很可能会在不同网站间跳转。屏幕底部的**前进**和**后退**箭头 ![images](img/p288-02.jpg) 能让你非常轻松地按任意方向访问最近浏览过的页面。如果**后退**箭头呈灰色，本章的“使用打开页面按钮”部分可帮助你找出原因。\n\
  \n假设你正在《纽约时报》网站上看新闻，然后跳转到 ESPN 查看体育比分。要返回《纽约时报》页面，只需点击**后退**箭头。要再次回到 ESPN 网站，点击**前进**箭头即可。\n\
  \n#### 使用打开页面按钮\n\n有时，当你点击链接时，你正在查看的网页会移至后台，并弹出一个包含新内容的新窗口（例如另一个网页或视频）。你会看到原网页移至后台，并打开一个新页面。在这种情况下，新浏览器窗口中的**后退**箭头将无法使用。\n\
  \n相反，你必须点击右下角的**打开页面**图标 ![images](img/p289-01.jpg) 来查看已打开网页的列表，然后点击你想要的那个。在所示的示例中，我们点击了一个链接，该链接打开了一个新的浏览器窗口。回到旧窗口的唯一方法是点击**打开页面**图标并选择所需的页面。\n\
  \n![images](img/p289-02.jpg)\n\n#### 在网页中缩放\n\n在 iPod touch 上放大和缩小网页非常容易。缩放主要有两种方式——双击和双指捏合。\n\
  \n###### 双击\n\n如果你在网页的某一列上轻点两下，页面将放大到该特定列。这让你能够精准定位到网页上的正确位置，对于未针对移动屏幕格式化的页面来说非常有用。\n\
  \n要缩小，只需再双击一次（你可以在本书开头的“快速入门指南”中看到效果）。\n\n###### 双指捏合\n\n这项技术可以让你放大页面的特定部分。虽然需要稍加练习，但很快就会变得得心应手。请查看“快速入门指南”以了解效果。\n\
  \n将拇指和食指并拢放在你想要放大的网页部分。然后慢慢向外张开，分开手指。你会看到网页放大。网页聚焦需要几秒钟，但很快就会放大并变得非常清晰。\n\n要缩小回原来的大小，只需将手指分开，然后慢慢合拢；页面将缩放至原始尺寸。\n\
  \n#### 从网页激活链接\n\n当你在网上冲浪时，经常会遇到将你带到其他网站的链接。由于 **Safari** 是一个全功能浏览器，你只需触摸链接即可跳转到新页面。\n\
  \n### 处理 Safari 书签\n\n一旦你在 iPod touch 上开始浏览，你就会想快速访问你最喜欢的网站。一个很好的方法就是添加书签，以实现一键访问网站。\n\
  \n**提示：** 你可以使用 iCloud 通过无线方式或电脑上的 **iTunes** 应用，从电脑的网页浏览器（仅限 **Safari** 或 **Internet\
  \ Explorer**）同步你的书签。详情请查看第 3 章：“与 iCloud、iTunes 等同步”。\n\n##### 添加新书签\n\n在 iPod touch\
  \ 上添加新书签只需轻点几下：\n\n1.  要为当前正在查看的网页添加新书签，请点击屏幕底部的**操作按钮** ![images](img/p290-01.jpg)。\n\
  2.  选择**添加书签**。\n\n    ![images](img/p290-02.jpg)\n\n3.  我们建议你将书签名称编辑为简短易识别的名称。\n\
  4.  如果你想要更改书签存储的文件夹，请点击**书签**。\n5.  完成后，点击**存储**按钮。\n\n![images](img/p291-01.jpg)\n\
  \n#### 使用书签和历史记录\n\n一旦你设置了一些书签，就可以轻松查看和使用它们。在同一个区域，你还可以查看和使用你的网页浏览历史记录。iPod touch\
  \ 上一个非常有用的工具是能够像在电脑上一样从**历史记录**中浏览网页。按照以下步骤操作：\n\n1.  点击页面底部的**书签** ![images](img/p291-02.jpg)\
  \ 图标。\n2.  向上或向下滑动以查看你的所有书签。\n3.  点击任意书签即可跳转到该网页。\n\n    ![images](img/p291-03.jpg)\n\
  \n4.  点击**历史记录**文件夹，查看你最近访问过的网页历史记录。\n5.  请注意，在列表底部，你会看到**今天早些时候**和之前几天的附加文件夹。\n\
  6.  点击任意历史记录项即可转到该网页。\n\n![images](img/p292-01.jpg)\n\n**提示：** 要清除历史记录，请点击左下角的**清除**按钮。你也可以在**设置**应用中清除历史记录、Cookie\
  \ 和缓存。点击**设置**；点击 **Safari**；滚动到底部；然后点击**清除历史记录**、**清除 Cookie** 或**清除缓存**。\n\n####\
  \ 管理你的书签\n\n因为设置书签非常容易，所以很容易积累大量书签。但是，你可能会发现不再需要某个特定书签，或者希望通过添加新文件夹来整理它们。\n\n与 iPod\
  \ touch 上的其他列表一样，你可以重新排列**书签**列表并删除条目。按照以下步骤操作：\n\n1.  像之前一样查看你的**书签**列表。\n2.  点击左下角的**编辑**按钮。\n\
  3.  要重新排列条目，请触摸并拖动带有三个灰色横条的右侧边缘，在列表中上下移动。在此示例中，我们将指向亚马逊网站上“iPad Made Simple”书籍页面的书签拖动到顶部。\n\
  4.  要为书签创建新文件夹，请点击右下角的**新建文件夹**按钮。\n\n    ![images](img/p293-01.jpg)\n\n5.  要删除书签，请点击条目左侧的红色**圆形**图标，使其变为垂直状态。\n\
  6.  点击**删除**按钮。\n7.  完成重新排列和删除条目后，点击左上角的**完成**按钮。\n8.  要编辑书签名称、文件夹或网址，请点击书签名称本身。\n\
  9.  现在你可以对名称、网址或文件夹进行任何调整。\n10. 要更改书签存储的文件夹，请点击网址下方的按钮。在此图片中，它显示的是**书签**；但在你的 iPod\
  \ touch 上可能不同。此书签指向亚马逊网站上的“iPad Made Simple”页面。\n11. 完成后点击**完成**。\n\n![images](img/p294-01.jpg)\n\
  \n\n\n#### 阅读列表\n\n`Reading List` 是一种特殊的书签，可以让你快速保存网页文章，以便日后闲暇时阅读。`阅读列表`功能可通过 iCloud\
  \ 同步，因此你可以很方便地在家里或工作用的 Mac 或 Windows PC 上的 `Safari` 中标记文章，然后在旅行途中用 iPod touch 或\
  \ iPad 阅读。你也能用此功能在 iPod touch 上保存书签，等回到 iPad 或电脑旁时再更舒适地阅读。\n\n按照以下步骤使用`阅读列表`功能：\n\
  \n1.  在`Safari`中打开你想保存的文章。\n2.  点击页面底部中间的`操作`按钮 ![images](img/p294-02.jpg)。\n3.\
  \  点击`添加到阅读列表`。![images](img/p294-03.jpg)\n\n稍后按以下步骤查看`阅读列表`中的文章：\n\n1.  点击页面右下角的`书签`按钮\
  \ ![images](img/p295-01.jpg)。\n2.  轻点`阅读列表`选项的`眼镜`图标。（如果看不到`眼镜`图标，你可能正处在一个`书签`文件夹内。只需点击左上角的`箭头`图标，退出一层或多层文件夹，直到`箭头`消失，就能看到`眼镜`图标了。）\n\
  \n    ![images](img/p295-02.jpg)\n\n3.  要查看`阅读列表`中的所有内容，点击左上角的`全部`标签。若只想看未阅读的文章，点击右上角的`未读`标签。\n\
  4.  点击你想阅读的文章。\n\n![images](img/p295-03.jpg)\n\n最后，按照以下步骤从`阅读列表`中删除文章：\n\n1.  在你想从`阅读列表`移除的文章上从左向右滑动。\n\
  \n    ![images](img/p295-02.jpg)\n\n2.  点击红色的`删除`按钮。\n\n#### Safari 阅读器\n\n`Safari`的`阅读器`功能可以让你将网页文章呈现为干净清晰的页面，文字大小适中，没有纷杂的布局或广告干扰。\n\
  \n**注意：** 尽管 Safari 在检测大多数网页文章方面表现出色，但由于内容和格式的多样性，它偶尔也会漏掉一些文章。如果你没有看到`阅读器`按钮，说明\
  \ Safari 无法检测到该文章。\n\n按照以下步骤激活此功能：\n\n![images](img/p296-01.jpg)\n\n1.  打开你想阅读的文章。\n\
  2.  点击 URL 字段右侧的`阅读器`按钮，参见图 16-1。\n3.  点击`字体大小`按钮来调大或调小字号。\n\n![images](img/p296-02.jpg)\n\
  \n![images](img/1501.jpg)\n\n**图 15-1.** *同一网页的标准视图（左图）与阅读器视图（右两图）。*\n\n**提示：**\
  \ 如果你希望同时拥有`阅读列表`和`阅读器`的功能——再加上浏览器访问、社交分享等其他特性——那么可以试试 App Store 中的 `Instapaper`\
  \ 这类应用。\n\n### Safari 浏览技巧与窍门\n\n既然你已经掌握了基本操作，下面我们将介绍一些实用的技巧和窍门，让你在 iPod touch 上的网页浏览更愉快、更快捷。\n\
  \n#### 跳转到网页顶部\n\n有时网页可能很长，滚动回页面顶部会有些费力。一个简单的小技巧是轻点网页的灰色标题栏；你会自动跳转到页面顶部。\n\n####\
  \ 通过邮件或推特分享网页\n\n浏览时，有时你会发现一个特别吸引人的页面，想与朋友或同事分享。点击底部栏中间的`操作`按钮 ![images](img/p297-01.jpg)，然后选择`邮件链接到本页面`来创建一封包含链接的邮件。选择`推特`则可创建一条带链接的新推文，如图\
  \ 15-2 所示。\n\n![images](img/1502.jpg)\n\n**图 15-2.** *使用操作按钮对 Safari 网页进行多种操作。*\n\
  \n#### 打印网页\n\n使用 iPod touch，你可以轻松地将任何网页打印到本地 Wi-Fi 网络中兼容 `AirPrint` 的打印机上。点击`操作`按钮\
  \ ![images](img/p297-02.jpg)，然后选择`打印`。\n\n#### 在 Safari 中观看视频\n\n在网站上你常会看到视频。你可以播放其中很多视频，但并非全部。例如，使用\
  \ `Adobe Flash` 格式的视频无法在 iPod touch 上播放（请参阅本章开头的说明）。\n\n点击`播放`按钮后，你会从 `Safari` 切换到\
  \ `iPod` 视频播放器。\n\n你可以将 iPod touch 横过来，以横向或宽屏模式观看视频。\n\n如果播放控制栏消失了，轻点屏幕即可重新显示。\n\
  \n看完视频想返回网页时，点击左上角的`完成`按钮。\n\n![images](img/p298-01.jpg)\n\n**提示：** 关于视频播放器的更多技巧与窍门，请查看第\
  \ 14 章：“观看视频”。\n\n#### 保存或复制文本与图片\n\n你可能会不时看到想从网站复制的文本或图片。本节将简要介绍操作方法；要了解更详细的步骤（包括如何使用`剪切`和`粘贴`功能），请参阅第\
  \ 2 章：“打字、复制与搜索”中的“复制与粘贴”部分。以下是从网页复制文本或图片的快速概述：\n\n*   要复制单个单词，长按该单词直到它被高亮显示并出现`复制`按钮，然后点击`复制`。\n\
  *   要复制几个单词或整个段落，长按一个单词直到它被高亮显示，然后向左或向右拖动蓝色点来选择更多文本。你可以向上或向下滑动来选择整个段落。最后，点击`粘贴`。\n\
  \n    **提示：** 选中单个单词会使复制功能进入单词选择模式，你可以拖动来增加或减少选中的单词数。如果超过一个段落，通常会切换到元素选择模式，此时不再是角点，而是出现边缘，你可以拖动边缘来选择多个段落、图片等。\n\
  \n*   要保存或复制图片，长按图片直到出现弹出窗口，询问你是否要保存或复制该图像。\n\n\n### 使用自动填充节省时间\n\n`AutoFill`（自动填充）功能是一种绝佳方式，可帮你节省输入个人信息的时间，包括网站上的用户名和密码。`AutoFill`（自动填充）工具能够记住并填写网页表单中需要的信息。启用`AutoFill`（自动填充）功能将为你节省大量时间。\n\
  \n请参照本章稍后“启用自动填充”部分展示的步骤，在 iPod touch 上设置`AutoFill`（自动填充）功能。\n\n一旦启用了`AutoFill`（自动填充）选项，只需前往任何带有待填写字段的网页。当你触摸该字段时，键盘会立即在屏幕底部弹出。在键盘顶部，你会看到一个写着`AutoFill`（自动填充）的小按钮。触摸它，网页表单就会自动填写完毕。\n\
  \n**警告：** 让姓名和密码自动输入意味着任何拿起你 iPod touch 的人都能访问你的个人网站和信息。你可能希望按照第 8 章：“个性化与安全”中所述，启用密码锁定功能。\n\
  \n#### 输入用户名与密码\n\n第一次访问需要输入用户名和密码的网站时，请键入这些信息，然后按下`Submit`（提交）或`Enter`（回车）。此时，`AutoFill`（自动填充）会询问你是否希望\
  \ iPod touch 记住它们。\n\n如果你希望记住这些信息以便下次访问该网站时自动输入，请轻点`Yes`（是）。\n\n![images](img/p300-01.jpg)\n\
  \n下次访问此登录页面时，你的用户名和密码将会自动填写。\n\n![images](img/p300-02.jpg)\n\n#### 个人信息填写\n\n在网上很多时候你都需要输入自己的姓名、电子邮件地址、家庭住址等信息。只要将`AutoFill`（自动填充）设置好并与\
  \ iPod touch 上的联系人记录关联，填写这些表单只需轻点一下手指。\n\n你会遇到许多需要填写网页表单的网站。例如，看看[`www.madesimplelearning.com`](http://www.madesimplelearning.com)上这个为免费\
  \ iPod touch 使用技巧而设的网页表单示例。手动输入电子邮件地址、名字和姓氏需要花费不少时间。\n\n![images](img/p301-01.jpg)\n\
  \n一旦你轻点第一个字段——在此例中是`Email`（电子邮件）——就会看到`AutoFill`（自动填充）栏出现在键盘上方。\n\n轻点`AutoFill`（自动填充）按钮，你的电子邮件地址和姓名便会立即从联系人记录中填入。\n\
  \n![images](img/p301-02.jpg)\n\n### 将网页图标添加到主屏幕\n\n如果你喜欢某个网站或页面，将其作为图标添加到`Home`（主）屏幕是非常容易的。这样一来，你无需通过`Safari`的书签选择过程就能立即访问该网页。将图标放在`Home`（主）屏幕上可以节省大量操作步骤。这对于快速启动网络应用（例如，来自\
  \ Google 的 Gmail 或基于网页的游戏）尤其有用。\n\n**按照以下步骤添加网络应用图标：**\n\n1.  轻点浏览器底部的`Action`（操作）按钮\
  \ ![images](img/p302-01.jpg)。\n2.  轻点`Add to Home Screen`（添加到主屏幕）。\n3.  调整名称，将其缩短至十个或更少的字符；你应该这样做，因为主屏幕上图标名称的显示空间有限。\n\
  4.  轻点右上角的`Add`（添加）按钮。\n\n![images](img/p302-02.jpg)\n\n### 调整 Safari 浏览器设置\n\n\
  与我们目前调整过的其他设置类似，`Safari`的设置可以在`Settings`（设置）应用中找到。\n\n1.  要访问`Safari`的设置，请轻点`Settings`（设置）图标。\n\
  2.  轻点`Safari`。\n\n![images](img/p302-03.jpg)\n\n#### 更改搜索引擎\n\n默认情况下，`Safari`浏览器的搜索引擎是`Google`。要将其更改为`Yahoo`或`Bing`，请触摸`Search\
  \ Engine`（搜索引擎）按钮，然后选择新的搜索引擎。\n\n![images](img/p303-01.jpg)\n\n#### 启用自动填充\n\n正如我们本章前面所展示的，`AutoFill`（自动填充）是一种便捷方式，可以让`Safari`自动填写要求提供姓名、地址、电话号码，甚至用户名和密码的网页表单。它可以为你节省大量反复输入姓名及其他信息的时间。\n\
  \n要启用`AutoFill`（自动填充）选项，请按照以下步骤操作：\n\n1.  在`Settings`（设置）应用中的`Safari`菜单里，轻点`AutoFill`。\n\
  \n    ![images](img/p303-02.jpg)\n\n2.  将`Names & Passwords`（名称与密码）旁边的开关设置为`ON`（开启）。\n\
  3.  将`Use Contact Info`（使用联系人信息）旁边的开关设置为`ON`（开启）。\n\n    ![images](img/p303-03.jpg)\n\
  \n4.  将`Use Contact Info`（使用联系人信息）设置为`ON`（开启）后，你会被带到`Contacts`（通讯录）列表，以选择一个要使用的联系人。\n\
  5.  上下滑动以查找某人，或双击顶部写着`Contacts`（通讯录）的栏以调出`Search`（搜索）窗口。\n6.  找到想要使用的联系人后，轻点它即可返回到`Safari`的`Settings`（设置）屏幕。\n\
  \n![images](img/p304-01.jpg)\n\n#### 调整隐私选项\n\n开启`Private Browsing`（私密浏览）选项意味着，在你访问网站时，不会存储任何信息、历史记录或\
  \ Cookie。如果你担心别人知道你访问了哪些网站，或者担心访问的网站对你进行跟踪，那么你应该将`Private Browsing`（私密浏览）切换到`ON`（开启）位置。\n\
  \n你还可以使用`Clear History`（清除历史记录）和`Clear Cookies and Data`（清除 Cookie 与数据）选项。\n\n![images](img/p304-02.jpg)\n\
  \n![images](img/p304-03.jpg)\n\n**提示：** 如果你发现网页浏览速度变慢或卡顿——或者 Safari 频繁崩溃——那么请尝试通过轻点`History`（历史记录）和`Cookies\
  \ and Data`（Cookie 与数据）并确认选择来清除它们。\n\n#### 调整安全选项\n\n在`Security`（安全）标题下，`Fraud Warning`（欺诈警告）、`JavaScript`和`Block\
  \ Pop-ups`（拦截弹出式窗口）选项默认应为`ON`（开启）。你可以通过将相应的开关滑动到`OFF`（关闭）来修改这些设置。\n\n![images](img/p305-01.jpg)\n\
  \n**注意：** 许多像 Facebook 这样的热门网站要求`JavaScript`处于`ON`（开启）状态。\n\n轻点`Accept Cookies`（接受\
  \ Cookie）按钮，可以将浏览器接受 Cookie 的能力调整为`Always`（始终）、`Never`（永不）或`From visited`（来自已访问站点）。我们建议保持为`From\
  \ visited`（来自已访问站点）。如果设为`Never`（永不），某些网站将无法正常工作。\n\n![images](img/p305-02.jpg)\n\
  \n"
- "# 第 16 章\n\n## 使用电子邮件进行通信\n\n在本章中，我们将探索 iPod touch 上`Mail`（邮件）应用中的电子邮件世界。你将学习如何设置多个电子邮件账户、查看各种阅读选项、打开附件以及清理收件箱。\n\
  \n![Images](img/p307-01.jpg)\n\n并且，针对你的电子邮件无法正常工作时的情况，你将学到一些很好的故障排除技巧，以帮助你恢复正常运行。\n\
  \n### 邮件入门\n\n在 iPod touch 上设置电子邮件相当简单。让电子邮件启动并运行的最快方法可能是在 iPod touch 上直接设置账户。我们在本节中向你展示如何使用`Mail,\
  \ Contacts and Calendar`（邮件、通讯录和日历）账户设置屏幕。你也可以使用电脑上`iTunes`应用中的某个屏幕来复制这些账户设置。你需要网络连接才能让电子邮件正常运行。\n\
  \n#### 需要网络连接\n\n如今，移动电子邮件无疑风靡一时。你可以在没有网络连接的情况下查看、阅读和撰写已同步到 iPod touch 的电子邮件的回复；但是，你需要具备网络连接才能通过\
  \ iPod touch 发送和/或接收电子邮件。请查看第 4 章：“连接到网络”以了解更多信息。此外，请参阅第一部分快速入门指南中的“阅读顶部连接状态图标”部分。\n\
  \n**提示：** 如果你要出行，只需在登机前下载所有电子邮件；这样你就可以在离线状态下阅读、回复和撰写邮件。所有邮件将在你着陆并重新连接到互联网后发送。\n\n\
  \n\n### 在 iPod Touch 上设置电子邮件\n\n如前所述，你可以在 iPod touch 上通过两种方式设置你的电子邮件账户：\n\n1.  直接在\
  \ iPod touch 上设置你的电子邮件账户。\n2.  使用 iTunes 同步电子邮件帐户设置。\n\n第一种方式，直接在 iPod touch 上设置电子邮件账户，适合在\
  \ iPod touch 上进行特殊设置的情况，例如通过 Exchange 使用 Gmail。如果你在 Windows 或 Mac 电脑上不使用电子邮件程序，这也是一种好方法。\n\
  \n如果你在 Windows 或 Mac 电脑上已经设置了许多 POP3 或 IMAP 账户，你也可以选择通过 iTunes 经由 USB 底座连接线来同步它们。\n\
  \n#### 为电子邮件账户输入密码\n\n在第 3 章中，我们向你展示了如何将电子邮件帐户设置同步到 iPod touch。同步完成后，你应该能够通过打开`设置`应用来查看\
  \ iPod touch 上的所有电子邮件账户。你只需要做的就是输入每个账户的密码。\n\n要为每个同步的电子邮件账户输入密码，请按照以下步骤操作：\n\n1.\
  \  轻点`设置`图标。\n2.  轻点`邮件、通讯录、日历`选项。\n3.  在`账户`下，你应该能看到所有已同步的电子邮件帐户列表。\n4.  轻点列表中的任一电子邮件帐户，输入其密码，然后轻点`完成`。\n\
  5.  如果所有信息都正确输入，将会出现勾选标记，你的账户将被启用。\n6.  对所有列出的电子邮件帐户重复此操作。\n\n#### 在 iPod Touch\
  \ 上添加新电子邮件账户\n\n要在 iPod touch 上添加新的电子邮件账户，请按照以下步骤操作：\n\n1.  轻点`设置`图标。\n\n    ![图片](img/p309-01.jpg)\n\
  \n2.  轻点`邮件、通讯录、日历`选项。\n3.  在你的电子邮件帐户下方轻点`添加账户`。\n\n    如果你尚未设置任何帐户，你将只看到`添加账户`选项。\n\
  \n    **提示：** 要编辑任何电子邮件帐户，只需轻点该账户即可。\n\n4.  在此屏幕上选择要添加的电子邮件帐户类型：\n\n    ![图片](img/p309-02.jpg)\n\
  \n    *   如果你使用 iCloud 服务，请选择`iCloud`。\n    *   如果你使用 Microsoft Exchange 电子邮件服务器，请选择`Microsoft\
  \ Exchange`。\n    *   如果你使用 Google 日历和 Google 通讯录来存储个人信息，并且希望将它们无线同步到 iPod touch，你也应该选择`Microsoft\
  \ Exchange`。\n\n    **注意：** 我们将在第 3 章中向你展示如何设置 Google/Microsoft Exchange 和 iCloud：“与\
  \ iCloud、iTunes 及更多服务同步”。\n\n    *   如果你使用 Google 电子邮件，但*不*（或*不想*）与你的`Google 通讯录`进行无线同步，请选择`Gmail`。\n\
  \    *   如果你使用 Yahoo!, AOL, 或 Windows Live Hotmail 这些服务，请选择它们。\n    *   如果以上都不适用，并且你想同步标准的\
  \ POP 或 IMAP 电子邮件帐户，请选择`其他`。最后，在下一个屏幕上选择`添加邮件账户`。\n\n5.  在`姓名`栏中输入你希望收件人在收到你的邮件时看到的姓名。\n\
  \n    ![图片](img/p310-01.jpg)\n\n6.  接下来，在`地址`、`密码`和`描述`栏中输入相应的信息。\n7.  轻点右上角的`下一步`按钮。\n\
  \n##### 指定接收和发送服务器\n\n有时，iPod touch 无法自动设置你的电子邮件帐户。在这种情况下，你需要手动输入更多设置来启用你的电子邮件帐户。\n\
  \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和电子邮件设置来找到相关设置。\n\n如果 iPod touch 仅凭你的电子邮件地址和密码无法登录到你的服务器，你将会看到一个类似于此的屏幕。\n\
  \n![图片](img/p311-01.jpg)\n\n在`接收邮件服务器`下，将相应的信息输入到`主机名`、`用户名`和`密码`栏中。通常，你的接收邮件服务器类似于\
  \ `mail.*你的 ISP 名称*.com`。\n\n要调整你的发送服务器名称，请轻点`发送邮件服务器`。你可以在下一个屏幕上调整发送邮件服务器。这些服务器名称通常看起来像\
  \ `smtp.*你的 ISP 名称*.com` 或 `mail.*你的 ISP 名称*.com`。\n\n你可以尝试将`服务器名称`和`密码`栏留空。如果不行，你随时可以返回并更改它们。\n\
  \n系统可能会询问你是否要使用 SSL（安全套接层），这是一种你的电子邮件提供商可能要求的发送邮件安全类型。如果你不确定是否需要 SSL，只需与你的电子邮件提供商核对邮件设置即可。\n\
  \n**提示：** 作者建议尽可能使用 SSL 安全连接。如果你不使用 SSL，你的登录凭据、邮件以及任何私人信息将以纯文本（未加密）形式发送，从而让窥探者有机可乘。\n\
  \n##### 验证你的账户是否已设置成功\n\n一旦所有信息输入完毕，iPod touch 将尝试配置你的电子邮件帐户。你可能会收到一条错误消息；如果发生这种情况，你需要检查你输入的信息。\n\
  \n![图片](img/p311-02.jpg)\n\n如果你进入显示所有电子邮件帐户的屏幕，请查找新的账户名称。\n\n![图片](img/p312-01.jpg)\n\
  \n如果你看到了它，说明你的账户已正确设置。\n\n##### 修复“无法获取邮件”错误\n\n如果你轻点`邮件`图标并收到一条错误消息，提示“无法获取邮件 —\
  \ 未提供 *(你的账户)* 的密码”，你需要输入你的密码。\n\n![图片](img/p312-02.jpg)\n\n请查阅本章中“为从 iTunes 同步的电子邮件帐户输入密码”部分以获取帮助。\n\
  \n#### 邮箱屏幕 — 收件箱和账户\n\n顶层屏幕是你的`邮箱`屏幕。你可以通过轻点左上角的按钮随时进入该屏幕。继续轻点这个左上角的按钮，直到你不再看到其他按钮为止。这时，你就进入了`邮箱`屏幕。\n\
  \n从`邮箱`屏幕，你可以访问以下项目：\n\n*   **统一收件箱：** 通过轻点`所有收件箱`进行访问。\n*   **每个单独账户的收件箱：** 通过在`收件箱`部分轻点该电子邮件帐户名称进行访问。\n\
  \n    ![图片](img/p313-01.jpg)\n\n*   **账户部分中每个电子邮件帐户的文件夹**：通过轻点账户名称查看所有文件夹进行访问。\n\
  \n    ![图片](img/p313-02.jpg)\n\n#### 添加或编辑电子邮件文件夹或邮箱\n\n借助 iOS 5，如果你使用 iCloud 同步的邮件帐户，或者你的邮件服务器支持此功能，你现在可以直接在\
  \ iPod touch 上添加或编辑电子邮件文件夹。例如，你想更改邮件文件夹名称或添加新邮件文件夹来更好地整理收件箱中的邮件。一个例子是创建一个名为“需要关注”的新文件夹，并将所有那些你暂时无法处理、但需要确保回到办公桌后处理的电子邮件放进去。要在你的设备上添加或编辑邮箱，请按照以下步骤操作：\n\
  \n1.  **从邮箱屏幕滚动到底部，并轻点“账户”下列出的任一电子邮件帐户。**\n\n    ![图片](img/p314-01.jpg)\n\n2.  在本示例中，我们将编辑\
  \ iCloud 账户邮箱。在此屏幕上轻点右上角的`编辑`。\n\n    ![图片](img/p314-02.jpg)\n\n3.  然后，你可以执行以下操作：\n\
  \n    ![图片](img/p314-03.jpg)\n\n    *   轻点底部的`新建邮箱`来创建一个新邮箱。\n    *   轻点任意邮箱文件夹以编辑其名称或将其删除。\n\
  \n\n\n### 收件箱、已标记（星标）和带回复的邮件\n\n你会注意到，任何未读邮件左侧都会有一个蓝点标记，如图 ![Images](img/p315-01.jpg)\
  \ 所示。\n\n你还会注意到，有些邮件右侧会显示一个数字和一个右箭头（`>`），如图所示：![Images](img/p315-02.jpg)。这表示该邮件有**三封**相关邮件（回复和转发）。\n\
  \n![Images](img/p315-03.jpg)\n\n已标记的邮件左侧会有一个小旗帜，如图所示：![Images](img/p315-04.jpg)\n\
  \n点击任意邮件即可将其打开。唯一无法打开的情况是该邮件包含相关邮件。此时，你首先会看到一个显示所有相关邮件的界面。点击其中任意一封邮件即可查看。\n\n要离开**收件箱**视图，请点击左上角的按钮。\n\
  \n通过查看左上角的按钮，你可以判断自己正在查看哪个邮箱账户：\n\n-   如果按钮显示为**邮箱**，则表示你正在查看所有收件箱的汇总。\n-   如果按钮显示的是账户名称（例如\
  \ **iCloud** 或 **Exchange**），则表示你正在查看该账户的收件箱。\n\n#### 移动、删除或标记多封邮件\n\n如果你想一次移动或删除多封邮件，可以在收件箱界面中操作。请按照以下步骤一次删除多封邮件：\n\
  \n![Images](img/p316-01.jpg)\n\n1.  在收件箱界面中，点击右上角的**编辑**按钮。\n2.  点击选择所需的邮件；邮件旁边的红色勾选图标表示该邮件已被选中。\n\
  3.  要删除邮件，请点击底部的**删除**按钮。\n4.  要将邮件移至其他文件夹，请点击**移动**按钮并选择目标文件夹。\n5.  要**标记**邮件（添加旗帜或标记为未读），请点击**标记**按钮。标记为“未读”会在邮件旁边恢复蓝点。如果添加旗帜，邮件旁边会出现一个小旗帜图标，如图所示：![Images](img/p316-02.jpg)\n\
  \n### 查看单个邮件\n\n当你在**收件箱**界面中点击一封邮件时，就会进入**主要**邮件视图。你可以竖屏或横屏模式查看邮件，详见图 16-1。竖屏模式通常会显示更多文字，而横屏模式则能让你享受更大的文字和图片。\n\
  \n![images](img/1601.jpg)\n\n**图 16-1.** *在竖屏和横屏模式下查看电子邮件。*\n\n**提示：** 如果你将 iPod\
  \ touch 放在桌上或搁在腿上使用，你可能希望使用**竖屏锁定**图标将视图锁定为竖屏模式。这样可以防止屏幕不必要地翻转。请按以下步骤锁定视图：\n\n1.\
  \  双击**主屏幕**按钮，然后从左向右滑动。\n2.  点击**竖屏锁定**按钮以将屏幕锁定为竖屏模式。\n\n### 编写和发送电子邮件\n\n要启动电子邮件程序，请点击**主屏幕**上的**邮件**图标。\n\
  \n**提示：** 如果你在查看某封特定邮件、文件夹列表或某个账户时退出了**邮件**应用，那么当你返回**邮件**应用时，会直接回到之前离开的位置。\n\n\
  如果你第一次进入电子邮件，可能会看到一个空收件箱。可以点击窗口左下角的**刷新**按钮 ![Images](img/p318-01.jpg) 来获取最新邮件。iPod\
  \ touch 会开始检查新邮件，然后显示每个账户的新邮件数量。\n\n#### 编写新电子邮件\n\n当启动**邮件**程序时，你首先看到的应该是**账户**界面。在屏幕右下角，你会看到**编写**图标。点击**编写**图标即可开始创建新邮件。\n\
  \n![Images](img/p318-02.jpg)\n\n#### 编写邮件地址——选择收件人\n\n根据对方是否在 iPod touch 的**通讯录**中，你有几种选择收件人的方式：\n\
  \n![Images](img/p318-03.jpg)\n\n**选项 1**：输入某人名字的前几个字母；按下**空格**键，然后输入此人姓氏的前几个字母。此人的名字应出现在列表中；点击该名字即可选择该联系人。\n\
  \n**选项 2**：输入电子邮件地址。注意底部的 **@** 和**句点**（` . `）键，它们有助于你的输入。\n\n**提示：** 长按**句点**键可以查看\
  \ `.com`、`.edu`、`.org` 以及其他电子邮件域名后缀。\n\n![Images](img/p319-01.jpg)\n\n**选项 3**：点击**加号**（`+`）![Images](img/p319-02.jpg)\
  \ 以查看整个**通讯录**列表，并搜索或从中选择一个名字。\n\n如果你想使用不同的联系人分组，请点击左上角的**群组**按钮。\n\n双击屏幕顶部的**通讯录**即可看到**搜索**窗口。接下来，输入几个字母来搜索你的联系人。\n\
  \n![Images](img/p319-03.jpg)\n\n##### 删除收件人\n\n如果需要从收件人列表（**收件人：**、**抄送：**或**密送：**）中删除一个名字，请点击该名字将其选中\
  \ ![Images](img/p319-04.jpg)，然后按下**退格**键。![Images](img/p318-05.jpg)\n\n**提示：** 如果你想删除刚刚输入的最后一个收件人（且光标位于该名称旁边），按一次**删除**键高亮该名称，再按一次即可将其删除。\n\
  \n##### 添加抄送或密送收件人\n\n![Images](img/p320-01.jpg) 要添加**抄送**（**Cc:**）或**密送**（**Bcc:**）收件人，你需要点击邮件顶部**收件人：**字段下方的\
  \ **Cc:** 或 **Bcc:** 字段。这样做会打开所点击的字段。\n\n![Images](img/p320-02.jpg)\n\n##### 移动收件人\n\
  \n如果你最初将收件人添加到了**收件人：**字段，但改变主意想将其移至**抄送：**或**密送：**字段（反之亦然），只需长按该收件人的名字并将其拖拽到目标字段即可。\n\
  \n![Images](img/p320-03.jpg)\n\n#### 更改发送邮件的账户\n\n如果你设置了多个电子邮件账户，iPod touch 会使用设为默认的账户。（此设置在\
  \ **设置** > **邮件、通讯录、日历** > **默认账户**，位于**邮件**部分底部。）\n\n![Images](img/p320-04.jpg)\n\
  \n请按以下步骤更改发送邮件的账户：\n\n1.  点击邮件的**发件人：**字段以高亮显示。\n2.  再次点击**发件人：**字段，屏幕底部会以滚轮形式显示你的账户列表。\n\
  3.  上下滚动，然后点击一个新的电子邮件账户进行选择。\n4.  点击**主题**字段以完成更改发送邮件的邮箱地址。\n\n#### 输入主题\n\n现在，你需要为电子邮件输入主题。请按以下步骤操作：\n\
  \n![Images](img/p321-01.jpg)\n\n1.  点击**主题：**一行，并在邮件的**主题：**字段中输入文字。\n2.  按**回车**键或点击邮件的**正文**区域，将光标移至**正文**部分。\n\
  \n\n\n### 输入邮件内容\n\n现在光标位于邮件的**正文**区域（主题行下方），即可开始输入邮件内容。\n\n**注意：** 你的 iPod touch\
  \ 上只能设置一个电子邮件签名，该签名会自动应用于你从 iPod touch 发送的每封邮件——即使你设置了多个电子邮件账户也是如此。因此，如果你同时经营两种不同业务，或者不希望将个人电子邮件签名发送给所有商务联系人，请务必小心。最好将你的电子邮件签名设置得较为通用。\n\
  \n#### 设置文本格式、定义单词、引用文本及其他操作\n\n你可以轻点任意文本以将其高亮选中，然后使用蓝色控制柄来扩大或缩小选区范围。接着，通过选区上方的弹出菜单，可以进行以下任一操作：\n\
  \n![图片](img/p322-01.jpg)\n\n- **轻点“剪切”、“拷贝”或“粘贴”来执行相应功能。**\n- **若单词下方有下划线需要更正拼写，轻点“建议”。**\n\
  - **轻点右边缘的三角形图标可查看更多选项。**\n- 轻点 **B/U** 调整格式为**粗体**、**斜体**或**下划线**。\n  ![图片](img/p322-02.jpg)\n\
  \n  ![图片](img/p322-03.jpg)\n\n- 轻点**定义**可在词典中查找所选单词。\n- 轻点**朗读**可让设备朗读该单词。\n- 轻点**引用级别**可增加或减少所选文本的引用层级。\n\
  \n#### 电子邮件签名\n\n默认的电子邮件签名如右侧图片所示：**发自我的 iPod touch**。\n\n**提示：** 你可以将此签名更改为任何你想要的文本；请参阅本章后面的“更改电子邮件签名”部分，了解如何更改电子邮件签名。\n\
  \n#### 键盘选项\n\n输入时，请记住你有两种键盘选项：较小的**竖屏**键盘和较大的**横屏**键盘，请参阅图 17-2。\n\n![图片](img/1602.jpg)\n\
  \n**图 16-2.** *将设备侧向旋转，即可使用更大的横屏键盘。*\n\n**提示：** 如果你的手比较大，使用更大的键盘可能会更便于输入。一旦你掌握了在较大键盘上用双手输入的方法，就会发现它比单指输入要快得多。更多输入技巧，请参阅第\
  \ 2 章：“输入、拷贝与搜索”。\n\n#### 自动更正与自动大写\n\n输入时，你会注意到有些单词会自动大写并被自动更正。拼写检查器会将带有红色下划线的单词标记为拼写错误。请参阅第\
  \ 2 章：“输入、拷贝与搜索”，了解所有这些功能是如何工作的；本章还提供了一些额外的输入技巧。\n\n### 发送邮件\n\n邮件内容输入完毕后，轻点右上角的蓝色**发送**按钮。\n\
  \n![图片](img/p324-01.jpg)\n\n你的邮件将被发送，并且你应该会听到 iPod touch 的邮件发送提示音，这确认了你的邮件已成功发送。你可以在第\
  \ 8 章：“个性设置与安全保护”中的“调整 iPod touch 上的声音”一节中了解如何启用或禁用此提示音。\n\n#### 存为草稿稍后发送\n\n如果你不打算立即发送邮件，但希望将其保存为草稿以便稍后发送，请按照以下步骤操作：\n\
  \n![图片](img/p324-02.jpg)\n\n1.  按前面所述的方法编写邮件。\n2.  按下左上角的**取消**按钮。\n3.  选择屏幕底部的**保存草稿**按钮。\n\
  \n稍后，当你需要查找并发送草稿邮件时，请按照以下步骤操作：\n\n1.  在发送此邮件的电子邮箱账户中打开**草稿**文件夹。有关如何进入**草稿**文件夹的帮助信息，请参阅本章前面的“在邮件文件夹中导航”部分。\n\
  2.  轻点**草稿**文件夹中的电子邮件将其打开。\n3.  轻点邮件中的任意位置进行编辑。\n4.  轻点**发送**按钮。\n\n#### 检查已发送邮件\n\
  \n按照以下步骤确认邮件已正确发送：\n\n![图片](img/p325-01.jpg)\n\n1.  轻点左上角的**邮箱账户名称**按钮，查看刚用于发送邮件的账户的邮件文件夹。\n\
  2.  轻点**已发送**文件夹。\n3.  确认列表中显示的顶部邮件正是你刚刚编写并发送的那一封。\n\n**注意：** 只有在 iPod touch 上实际发送或删除了该账户的邮件后，你才会看到**已发送**和**废纸篓**文件夹。如果你的电子邮件账户是\
  \ IMAP 账户，你可能会看到除本章所述之外的其他许多文件夹。\n\n### 阅读和回复邮件\n\n按照以下步骤阅读你的电子邮件：\n\n1.  使用本章前面描述的步骤，导航至你想要查看的电子邮箱账户的收件箱。\n\
  2.  要阅读任何一封邮件，只需在收件箱中轻点它。\n\n    ![图片](img/p326-01.jpg)\n\n3.  新的、未读邮件会在其左侧显示一个蓝色小圆点。\n\
  4.  在收件箱中向上或向下滑动手指，即可滚动浏览你的邮件。\n5.  阅读邮件时，向上或向下滑动即可滚动浏览其内容。\n\n#### 将邮件标记为未读或已标记\n\
  \n如果你阅读了一封邮件，但希望确保稍后能快速找到它，可以选择轻点`标记为未读`或`旗标`，以便日后引起你的注意。\n\n请按照以下步骤标记邮件：\n\n![图片](img/p326-02.jpg)\n\
  \n1.  轻点位于时间和日期右侧的**标记**一词。\n2.  从弹出的菜单中选择**旗标**或**标记为未读**。\n\n被标记为旗标的邮件，其`标记`文本左侧会有一个红色小旗子图标。被标记为未读的邮件，其`标记`文本右侧会有一个蓝色小圆点。\n\
  \n**取消标记**邮件：\n\n![图片](img/p327-01.jpg)\n\n1.  轻点位于时间和日期右侧的**标记**一词。\n2.  从弹出的菜单中选择**取消旗标**或**标记为已读**。\n\
  \n#### 放大或缩小\n\n与浏览网页时一样，你可以放大以查看更大字体的邮件内容。你也可以像在网页上一样使用双指轻点；还可以使用**捏合**手势来放大或缩小（有关这些功能的更多信息，请参阅本书第\
  \ 1 部分快速入门指南中的“缩放”部分）。\n\n### 邮件附件\n\n某些电子邮件附件会被 iPod touch 自动打开，因此你甚至不会注意到它们是附件。此类附件包括\
  \ Adobe 可移植文档格式 (PDF) 文件（由**Adobe Acrobat** 和 **Adobe Reader** 等应用程序使用）以及某些类型的图像、视频和音频文件。你也可能会收到文档形式的附件，例如\
  \ Apple 的 **Pages**、**Numbers** 和 **Keynote** 文件，或 Microsoft 的 **Word**、**Excel**\
  \ 和 **PowerPoint** 文件。这些文件需要手动打开。\n\n#### 辨别邮件何时包含附件\n\n任何包含附件的邮件都会在发件人姓名旁边显示一个小的**回形针**图标，如下图所示。当你看到这个图标时，就知道该邮件包含附件了。\n\
  \n![图片](img/p327-02.jpg)\n\n#### 接收自动打开的附件\n\n某些类型的电子邮件附件，如图像、Quicktime 影片和单页 PDF\
  \ 文件，通常会被自动打开并直接显示在邮件正文中。\n\n![图片](img/p328-01.jpg)\n\n**提示：** 如果你想保存或复制自动打开的附件，只需按住它直到弹出窗口出现。此时，你可以选择**拷贝**或**存储图像**。当你保存图像时，它会被放入**照片**应用中的**相机胶卷**相册中。\n\
  \n\n\n### 打开电子邮件附件\n\n与我们刚才描述的不会直接在邮件正文中打开的情况不同，其他类型的附件（例如电子表格、文字处理文档和演示文稿文件）需要手动打开。\n\
  \n#### 轻点进入“快速查看”模式\n\n请按照以下步骤在“快速查看”模式下打开附件：\n\n1.  打开带有附件的邮件，如图 16-3 所示。\n2. \
  \ 快速轻点附件，即可在“快速查看”模式下立即打开它。\n3.  您可以在文档中导航。请记住，您可以进行缩放，也可以向上或向下滑动。\n4.  如果您打开了一个包含多个工作表或电子表格的电子表格，您会看到顶部有多个标签。触碰另一个标签即可打开该电子表格。\n\
  5.  查看完附件后，轻点文档一次以调出控制选项，然后轻点左上角的**完成**。\n6.  如果您安装了可以打开所查看附件类型（此处为电子表格）的应用，那么您会在右上角看到一个**“打开方式”**按钮。轻点**“打开方式”**按钮可在另一个应用中打开此文件。\n\
  \n![images](img/1603.jpg)\n\n**图 16-3.** *在“快速查看”模式下查看电子邮件附件。*\n\n#### 在其他应用中打开文档\n\
  \n您可能希望在其他应用程序中打开附件。例如，您可能想要在 **Numbers** 中打开电子表格，或者在 **iBooks、Stanza** 或 **GoodReader**\
  \ 中打开 PDF 文件。请按照以下步骤操作：\n\n1.  打开电子邮件。\n2.  按住附件，直到弹出窗口出现。\n3.  选择**“打开方式…”**或**“在‘Numbers’中打开”**选项。当附件格式与您设备上的应用相匹配时，您可能会看到“打开方式”后面列出了具体的应用程序，此处以\
  \ Numbers 为例。\n\n    ![Images](img/p330-01.jpg)\n\n4.  从列表中选择您要使用的应用程序。\n5.  最后，您可以编辑文档、保存它，并通过电子邮件将其回复给发件人。\n\
  \n    ![Images](img/p330-02.jpg)\n\n#### 查看视频附件\n\n您可能会收到视频作为电子邮件附件。某些类型的视频可以在您的\
  \ iPod touch 上观看（有关支持的视频格式列表，请参阅本章后面的“支持的电子邮件附件类型”部分）。请按照以下步骤打开视频附件：\n\n1.  轻点视频附件以打开它，并在视频播放器中观看。\n\
  \n    ![Images](img/p331-01.jpg)\n\n2.  观看完视频后，轻点屏幕以调出播放器控制选项。\n3.  轻点左上角的**完成**按钮以返回电子邮件。\n\
  \n    **注意：** 此截图来自本书作者之一 Martin Trautschold 的视频教程，该教程向您展示如何使用 iPod touch。请访问 Martin\
  \ 的网站 [`www.madesimplelearning.com`](http://www.madesimplelearning.com) 查看一些免费的示例教程。\n\
  \n### 打开并查看压缩的 .zip 文件\n\n除非您安装了诸如 **GoodReader** 之类的应用程序，否则您的 iPod touch 将无法打开并查看\
  \ `.zip` 格式的压缩文件。在本书出版时，**GoodReader** 仍然是一个免费的应用程序，非常值得安装。\n\n**提示：** 了解如何在第 13\
  \ 章：“报摊和更多”中安装和使用 **GoodReader**。\n\n请按照以下步骤在程序中打开 `.zip` 文件：\n\n1.  从 App Store\
  \ 安装免费的 **GoodReader** 应用。\n2.  打开包含 `.zip` 文件附件的电子邮件。\n3.  长按 `.zip` 附件，直到底部出现一个包含按钮的弹出窗口，按钮上显示：**“在‘GoodReader’中打开”**。轻点该按钮即可在\
  \ **GoodReader** 中打开 `.zip` 文件。\n\n    ![Images](img/p332-01.jpg)\n\n4.  **GoodReader**\
  \ 现在应该会打开，您的 `.zip` 文件应位于文件列表的顶部。要打开或解压缩 `.zip` 文件，请轻点它并选择**解压缩**按钮。\n\n    ![Images](img/p332-02.jpg)\n\
  \n5.  现在您应该会看到解压缩后的文件——在本例中，是在文件列表中位于 `.zip` 文件之上的 Adobe `.pdf` 文件。\n\n    ![Images](img/p332-03.jpg)\n\
  \n6.  轻点该解压缩后的文件即可查看。\n7.  阅读完附件后，双击**主屏幕**按钮并轻点**邮件**图标以返回阅读电子邮件。\n\n#### 支持的电子邮件附件类型\n\
  \n您的 iPod touch 支持将以下文件类型作为附件：\n\n*   `.doc` 和 `.docx`（**Microsoft Word** 文档）\n\
  *   `.htm` 和 `.html`（网页）\n*   `.key`（**Keynote** 演示文稿文档）\n*   `.numbers`（**Apple\
  \ Numbers** 电子表格文档）\n*   `.pages`（**Apple Pages** 文档）\n*   `.pdf`（Adobe 的便携式文档格式，由\
  \ **Adobe Acrobat** 和 **Adobe Reader** 等程序使用）\n*   `.ppt` 和 `.pptx`（**Microsoft\
  \ PowerPoint** 演示文稿文档）\n*   `.txt`（文本文件）\n*   `.vcf`（联系人文件）\n*   `.xls` 和 `.xlsx`（**Microsoft\
  \ Excel** 电子表格文档）\n*   `.mp3` 和 `.mov`（音频和视频格式）\n*   `.zip`（压缩文件）：只有安装了能够读取它们的应用程序（例如\
  \ **GoodReader**）才可阅读——请参阅本章前面的“打开并查看压缩的 .zip 文件”部分。\n\n### 回复、转发或删除邮件\n\n在您阅读电子邮件的窗格底部有一个工具栏。\n\
  \n![Images](img/p333-01.jpg)\n\n通过此工具栏，您可以将邮件移动到不同的邮箱或文件夹；删除邮件；或者回复、全部回复或转发邮件。\n\
  \n轻点小**箭头**图标 ![Images](img/p333-02.jpg) 即可看到这些选项按钮出现：**回复**、**全部回复**和**转发**。\n\n\
  **注意：** 只有当收件人不止一位时，**全部回复**按钮才会出现。\n\n![Images](img/p333-03.jpg)\n\n#### 回复电子邮件\n\
  \n您可能会最频繁地使用**回复**命令。请按照以下步骤在 iPod touch 上回复电子邮件：\n\n1.  轻点**回复**按钮。\n\n    您会看到原始发件人现在被列为邮件的收件人，出现在邮件的**收件人：**行中。主题将自动显示为：“Re:\
  \ *(原始主题行)*”\n\n    ![Images](img/p334-01.jpg)\n\n2.  输入您的回复内容。\n3.  完成后，只需轻点屏幕右上角的蓝色**发送**按钮。\n\
  \n#### 使用“全部回复”\n\n使用**全部回复**选项与使用**回复**功能类似，不同之处在于邮件的所有原始收件人和原始发件人都会被填入地址行。原始发件人将在**收件人：**行，而原始邮件的所有其他收件人将列在**抄送：**行。只有在原始邮件的收件人不止一位时，您才会看到**全部回复**选项。\n\
  \n**注意：** 使用**全部回复**时请务必小心。如果某些收件人因超出屏幕边缘而未在原始邮件中显示，这可能会很危险。如果您使用了**全部回复**，请务必检查**收件人：**和**抄送：**列表，确保每个人都应该收到您的回复。\n\
  \n#### 使用转发按钮\n\n有时，您会收到一封想要转发给他人的电子邮件。**转发**命令允许您这样做（有关处理附件的更多信息，请参阅本章中的“电子邮件附件”部分）。\n\
  \n**注意：** 您需要转发附件才能将其发送给他人。如果您想将收到的邮件中的附件发送给其他人，您必须选择**转发**选项。（请注意，选择**回复**和**全部回复**选项不会在您发出的邮件中包含原始电子邮件附件。）\n\
  \n当您轻点**转发**按钮时，可能会提示您决定是否**包含或不包含**原始邮件中的附件。\n\n此时，您按照之前描述的相同步骤来输入您的消息、添加收件人并发送它。\n\
  \n\n\n### 清理和整理收件箱\n\n当你越来越习惯将 iPod touch 用作电子邮件设备时，你会发现自己使用`Mail`程序的频率越来越高。偶尔进行一次邮件整理将变得十分必要。在\
  \ iPod touch 上，你可以轻松地删除或移动电子邮件。\n\n#### 删除单封邮件\n\n要从收件箱中删除单封邮件，请按照以下步骤操作：\n\n![图片](img/p335-01.jpg)\n\
  \n1. 在收件箱中向右或向左滑动邮件，调出`删除`按钮。\n2. 轻点`删除`即可移除该邮件。\n\n#### 删除、移动或标记多封邮件\n\n我们已在本章前面的“移动、删除或标记（旗标）多封邮件”部分介绍了操作方法。\n\
  \n#### 在邮件查看界面删除\n\n`邮件`查看界面提供了另一种删除邮件的方式。打开任意邮件进行阅读，然后轻点屏幕底部中间的`垃圾桶`图标 ![图片](img/p336-01.jpg)。你会看到邮件缩小并飞入`垃圾桶`，从而被删除。\n\
  \n**提示：** 你可以使用`设置`应用，让 iPod touch 在删除邮件前进行确认。操作方法是：轻点`邮件、通讯录、日历`，然后将`删除前确认`旁边的开关设置为`好`。\n\
  \n你可以将邮件移至其他文件夹来进行整理。将邮件移出收件箱后，可以留作存档，或稍后阅读。\n\n**注：** 如果你使用的是 iCloud 或其他支持的邮件服务器，你可以直接在设备上创建、重命名或删除邮件文件夹，详见本章前面的“添加或编辑邮件文件夹或邮箱”部分。如果该方法无效，则需要在你的主邮件账户中设置这些文件夹，然后同步到\
  \ iPod touch。我们将在本章的“微调电子邮件设置”部分展示具体操作方法。\n\n#### 阅读时将邮件移至文件夹\n\n有时，你可能想整理邮件以便日后轻松检索。例如，你可能收到一封关于即将出行的邮件，并希望将其移至“旅行”文件夹。有时，你会收到需要稍后处理的邮件，此时可将其移至“需要关注”文件夹。这有助于提醒你稍后处理这些邮件。\n\
  \n请按照以下步骤移动邮件：\n\n![图片](img/p337-01.jpg)\n\n1. 打开该邮件。\n2. 轻点右上角的`移动`图标。\n3. 选择一个新文件夹，邮件将移出当前收件箱。\n\
  \n### 从邮件中复制和粘贴\n\n以下是从邮件中选中文本或图片并进行复制的一些技巧：\n\n- 双击文本选中一个单词，然后上下拖动蓝色手柄调整选区。接着，选择`拷贝`。\n\
  \n  ![图片](img/p337-02.jpg)\n\n- 长按文本，然后选择`选择`或`全选`。\n\n  ![图片](img/p337-03.jpg)\n\
  \n- 长按图片，然后选择`存储图像`或`拷贝`。\n\n  ![图片](img/p338-01.jpg)\n\n如需更完整的说明，请查阅第 2 章：“键入、复制和搜索”中的“复制和粘贴”部分。\n\
  \n### 搜索电子邮件\n\niPod touch 内置了强大的搜索功能，可帮助你查找邮件。你可以通过`发件人`、`收件人`、`主题`或`所有`字段来搜索收件箱。这有助于你筛选收件箱，从而精确找到所需内容。\n\
  \n#### 激活邮件搜索\n\n发起邮件搜索很简单。首先，导航至待搜索账户的`收件箱`。如果向上滚动到顶部，你会看到熟悉的`搜索`栏出现在`收件箱`顶部。\n\
  \n如果你的电子邮件账户支持此功能，你还可以在服务器上搜索邮件。截至撰写本文时，受支持的搜索型电子邮件账户包括`Exchange`、iCloud（原称`MobileMe`）和`Gmail\
  \ IMAP`。请按照以下步骤在服务器上搜索邮件：\n\n1. 轻点`搜索`栏，即可看到`搜索`栏下方出现一排新的软键菜单。\n\n   ![图片](img/p339-01.jpg)\n\
  \n2. 输入要搜索的文本。\n3. 轻点搜索窗口下方的某个标签：\n   1. `发件人`：仅搜索发件人的电子邮件地址。\n   2. `收件人`：仅搜索收件人的电子邮件地址。\n\
  \   3. `主题`：仅搜索邮件的`主题`字段。\n   4. `所有`：搜索邮件的所有部分。\n\n例如，假设我们想搜索收件箱中来自“Martin”的邮件。我们可以在`搜索`框中输入\
  \ Martin 的名字，然后轻点`发件人`。收件箱随后会被筛选，仅显示来自 Martin 的邮件。\n\n### 微调电子邮件设置\n\n你可以通过`设置`应用中的众多选项来微调\
  \ iPod touch 上的电子邮件账户。请按照以下步骤更改这些设置：轻点`设置`图标，然后轻点`邮件、通讯录、日历`。以下各部分将说明可进行的调整。\n\n\
  #### 自动检索电子邮件（获取新数据）\n\n除了`高级`下的选项外，你还可以使用`邮件`设置来配置 iPod touch 获取（或拉取）邮件的频率。默认情况下，当数据从服务器“推送”时，iPod\
  \ touch 会自动接收邮件或其他通讯录或日历更新。\n\n你可以通过以下步骤调整此设置：\n\n1. 轻点`设置`应用。\n2. 轻点`邮件、通讯录、日历`。\n\
  3. 在列出的电子邮件账户下方，轻点`获取新数据`。\n\n   ![图片](img/p340-01.jpg)\n\n4. 将`推送`设为`打开`（默认）以自动让服务器推送数据。将其设为`关闭`以节省电池续航。\n\
  \n   ![图片](img/p340-02.jpg)\n\n5. 调整定时计划以从服务器拉取数据。这设置了应用从服务器拉取新数据的频率。\n\n   **注：**\
  \ 如果你将此选项设为`每 15 分钟`，你会收到更频繁的更新；但与设为`每小时`或`手动`相比，会牺牲电池续航。\n\n如果你只想打开 iPod touch\
  \ 就能看到有邮件，自动检索功能非常方便；否则，你需要记得手动检查。\n\n##### 高级推送选项\n\n在`获取新数据`屏幕底部，`每小时`和`手动`设置下方，你可以轻点`高级`按钮，查看列出所有邮件账户的新屏幕。\n\
  \n轻点任意邮件账户以调整其设置。\n\n![图片](img/p341-01.jpg)\n\n大多数账户可以按你设定的计划进行`获取`，或设为`手动`。`手动`选项要求你使用`更新`按钮来检索数据。此屏幕让你能够为你设置的每个账户调整`获取`、`手动`，甚至`推送`设置。\n\
  \n![图片](img/p341-02.jpg)\n\n\n\n### 调整你的邮件设置\n\n在**帐户**部分下，你可以看到**邮件**中列出的所有电子邮件设置。**默认**设置可能对你来说已经足够；但如果需要调整其中任何一项，可以按照以下步骤操作：\n\
  \n**显示**：这用于设置从服务器拉取多少封邮件。你可以指定 50 到 1,000 条消息之间的任意数量（默认为最近的 50 条消息）。\n\n**预览**：此选项让你设置在收件箱**预览**中，除了**主题**之外，还显示多少行文本。你可以将此值从**无**调整为**5\
  \ 行**（默认为**2 行**）。\n\n![图片](img/p341-03.jpg)\n\n**最小字体大小**：这是首次打开邮件时显示的默认字体大小。它也是你查看邮件时允许缩小的最小字体大小。可选选项为**小**、**中**、**大**、**特大**和**巨大**（默认为**中**）。\n\
  \n**提示：** 你可以在设置的“辅助功能”区域中进一步扩大字体大小。详情请查看第 2 章：“打字、复制与搜索”。\n\n**显示“收件人”/“抄送”标签**：当此选项**开启**时，你会在收件箱的主题前看到一个小小的**收件人**或**抄送**标签。该标签显示你的地址被放置在了哪个字段中（此选项的默认状态为**关闭**）。\n\
  \n**删除前询问**：将此选项**开启**后，每次尝试删除邮件时都会进行询问（默认为**关闭**）。\n\n![图片](img/p342-01.jpg)\n\n\
  **加载远程图像**：此选项允许你的 iPod touch 加载某些邮件中嵌入的所有图形（远程图像）（此选项的默认值为**开启**）。\n\n![图片](img/p342-02.jpg)\n\
  \n**按主题整理**：此选项将相关的邮件分组在一起。它只显示一条消息，旁边带有一个数字。该数字表示存在多少封相关邮件。此功能让你可以很好地将所有讨论集中在一个地方（此选项的默认值为**开启**）。\n\
  \n![图片](img/p342-03.jpg)\n\n**始终密送给自己**：此选项会将你从 iPod touch 发送的每封电子邮件以密送副本（**Bcc:**）的形式发送到你的电子邮件帐户（此选项的默认值为**关闭**）。\n\
  \n![图片](img/p342-04.jpg)\n\n#### 更改你的电子邮件签名\n\n默认情况下，你发送的邮件会显示“发自我的 iPod touch”。请按照以下步骤更改邮件的**签名**行：\n\
  \n![图片](img/p343-01.jpg)\n\n1.  点击**签名**选项卡，然后输入你希望在从 iPod touch 发出的邮件底部显示的新邮件签名。\n\
  \n    ![图片](img/p343-02.jpg)\n\n2.  编辑完**签名**字段后，点击左上角的**邮件、通讯录…**按钮。这将返回到**邮件**设置屏幕。\n\
  \n#### 更改你的默认发件帐户\n\n如果你在 iPod touch 上设置了多个电子邮件帐户，应将其中的一个（通常是你最常用的那个）设置为**默认帐户**。当你从**邮件**屏幕选择**写新邮件**时，总是会默认选中该帐户。请按照以下步骤更改默认发送邮件的帐户：\n\
  \n![图片](img/p343-03.jpg)\n\n1.  点击**默认帐户**选项，你将看到所有电子邮件帐户的列表。\n\n    ![图片](img/p343-04.jpg)\n\
  \n2.  点击你希望用作**默认帐户**的电子邮件帐户。\n3.  完成后，点击**邮件、通讯录…**按钮返回到**邮件**设置菜单。\n\n#### 开关收发邮件的提示音\n\
  \n你可能每次发送或接收邮件时都会注意到一点音效。你听到的是 iPod touch 上的默认设置。\n\n如果你想禁用它或更改它，可以在**设置**程序中执行此操作：\n\
  \n![图片](img/p344-01.jpg)\n\n1.  点击你的**设置**图标。\n2.  点击**声音**。\n3.  你将看到各种用于打开或关闭音效的开关。点击**新邮件**和**已发送邮件**来选择你的邮件铃声选项。\n\
  \n### 高级邮件选项\n\n**注意：** 设置为 Exchange、IMAP 或 iCloud 的电子邮件帐户不会显示此**高级**邮件设置屏幕。这仅适用于\
  \ POP3 电子邮件帐户。\n\n![图片](img/p344-02.jpg)\n\n要访问每个电子邮件帐户的**高级**选项，请按照以下步骤操作：\n\n\
  1.  点击**设置**图标。\n2.  点击**邮件、通讯录、日历**。\n3.  点击**帐户**下列出的一个电子邮件地址。\n4.  在邮件设置弹出窗口的底部，点击**高级**按钮以调出**高级**对话框。\n\
  \n    ![图片](img/p345-01.jpg)\n\n#### 删除后从 iPod touch 上移除邮件\n\n你可以选择邮件被删除后，从你的 iPod\
  \ touch 上完全移除的频率。\n\n点击**移除**选项卡，选择最适合你的选项；默认设置为**永不**。\n\n![图片](img/p345-02.jpg)\n\
  \n#### 使用 SSL 和身份验证\n\nSSL 和身份验证功能之前已经讨论过；不过，此屏幕为你提供了另一个位置，以便针对特定电子邮件帐户访问这些功能。\n\
  \n#### 从服务器删除\n\n你可以配置 iPod touch 来处理从邮件服务器删除邮件的操作。通常，此设置保留为**永不**，此功能由你的主计算机处理。但是，如果你将\
  \ iPod touch 用作主要的电子邮件设备，则可能希望直接从 iPod touch 上处理该功能。请按照以下步骤从你的 iPod touch 上删除服务器上的已删除邮件。\n\
  \n1.  点击**从服务器删除**选项卡，选择最适合你需求的功能：**永不**、**七天后**或**从收件箱移除时**。\n\n    ![图片](img/p346-01.jpg)\n\
  \n2.  默认设置为**永不**。如果你想选择**七天后**；该选项应能给你足够的时间在电脑以及 iPod touch 上检查邮件，然后决定保留什么和删除什么。\n\
  \n#### 更改接收服务器端口\n\n正如你之前对**发送服务器端口**所做的操作一样，如果你在接收邮件时遇到问题，可以更改**接收服务器端口**。你的问题与接收邮件的端口相关的情况非常罕见；因此，你很少需要更改此数字。如果你的电子邮件服务提供商给了你一个不同的号码，只需点击数字并输入新的端口。**接收服务器端口**的值通常是**995**、**993**或**110**；不过，端口值也可能是其他数字。\n\
  \n### 解决电子邮件问题\n\n通常，你的电子邮件在 iPod touch 上能完美运行。然而，有时你的电子邮件可能不像你期望的那样完美无缺。这可能是由于服务器问题、网络连接问题或电子邮件服务提供商的要求未得到满足造成的。\n\
  \n大多数情况下，只需要调整一个简单的设置或重新输入密码即可。\n\n如果你尝试了下面的一些故障排除提示，但您的电子邮件仍然无法正常工作，那么你的邮件服务器可能只是暂时宕机。请与你的电子邮件服务提供商核实，确保你的邮件服务器已启动并运行；你也可以检查你的提供商是否进行了任何会影响你设置的最新更改。\n\
  \n**提示：** 如果以下提示无法解决问题，请查看第 25 章：“故障排除”以获取更多有用的提示和资源。\n\n\n\n#### 无法接收或发送电子邮件\n\n\
  如果你无法发送或接收电子邮件，第一步应确认你已连接到互联网。可通过查看`Home`屏幕左上角的网络连接图标来检查（详见第 4 章：“连接网络”）。\n\n有时，你需要调整外发端口才能正常发送邮件。请按以下步骤操作：\n\
  \n1.  轻点`设置`。\n2.  轻触`邮件、通讯录、日历`。\n3.  在`账户`下，轻触你遇到发送问题的电子邮件账户。\n4.  轻触`SMTP`并验证你的外发邮件服务器设置是否正确；同时检查是否已设为`ON`。\n\
  5.  轻触顶部的`外发邮件服务器`并验证所有设置，例如`主机名`、`用户名`、`密码`、`SSL`、`身份验证`和`服务器端口`。你也可以尝试将`服务器端口`值设为`587`、`995`或`110`；有时这能解决问题。\n\
  6.  点击`完成`，然后轻点左上角的电子邮件账户名称，返回此账户的`电子邮件`设置界面。\n7.  向下滚动到底部，轻触`高级`。\n8.  你还可以在此界面尝试为服务器端口设置不同的端口，如`587`、`995`或`110`。如果这些值都不起作用，请联系你的电子邮件服务提供商以获取其他端口号并验证你的设置。\n\
  \n"
- '# 第 17 章


  ## 通讯录与备忘录


  你的 iPod touch 让您可以即时访问所有重要信息。就像你的电脑一样，你的 iPod touch 可以存储数千个联系人以便轻松检索。在本章中，我们将向你展示如何添加新联系人、通过添加新字段来自定义联系人、使用群组组织联系人、快速搜索或浏览联系人，甚至可以使用
  iPod touch 的`地图`应用查看联系人的位置。我们还将向你展示如何自定义`通讯录`视图，使其按照你喜欢的方式排序和显示。最后，我们将介绍一些故障排除技巧，在你遇到困难时能为你节省时间。


  我们还将为你概述`备忘录`应用，你可以用它来写笔记、制作购物清单，以及列出你想看的电影或想读的书籍。我们将向你展示如何整理备忘录以及通过电子邮件将其发送给自己或他人。理想情况下，我们希望`备忘录`在
  iPod touch 上使用起来如此便捷，以至于你最终可以摆脱大部分（即使不是全部）纸质便签！


  同样很棒的是，你可以使用 iCloud 无线同步、共享和备份你的通讯录和备忘录。因此，你永远不必担心丢失重要信息，或担心你的设备或电脑上没有最新信息。


  ### 将通讯录载入 iPod touch


  第 3 章：“与 iCloud、iTunes 等同步”介绍了如何使用 Mac 或 Windows 电脑上的`iTunes`应用将通讯录载入 iPod touch。你也可以使用
  Google Sync 或 iCloud 服务将通讯录载入 iPod touch。


  **提示：** 你可以从收到的电子邮件中添加新的联系人条目。了解操作方法请参阅第 16 章：“使用电子邮件通信。”


  ### 通讯录列表何时最有帮助？


  当满足以下两个条件时，`通讯录`应用最为有用：


  1.  其中包含大量姓名和地址。

  2.  你可以轻松找到所需内容。


  #### 改进你的通讯录列表


  我们有一些基本规则，可以帮助你让 iPod touch 上的通讯录列表更有用：


  **规则 1：向通讯录中添加所有内容。**


  > 你永远不知道何时会需要那个不起眼的餐厅名称、水管工的电话号码，等等。


  **规则 2：添加条目时，确保考虑将来如何找到它们（名字、姓氏、公司）。**


  > 我们在本章中提供了许多提示和技巧来帮助你输入姓名，以便你在需要时能立刻找到它们。


  **提示：** 这里有一个找到餐厅的好方法。每当你将一家餐厅输入通讯录时，务必在“公司名称”字段中输入“餐厅”一词，即使它并非餐厅名称的一部分。当你输入字母“rest”时，你应该就能立刻找到你所有的餐厅！


  ### 在 iPod touch 上添加新联系人


  你可以随时直接在 iPod touch 上添加联系人。当你远离电脑——但随身带着 iPod touch——又需要将某人添加到通讯录时，这非常方便。操作非常简单；下一节将向你展示具体方法。


  ![图片](img/p350-01.jpg)


  #### 启动通讯录应用


  在`Home`屏幕上，轻点`通讯录`图标，你将看到`所有联系人`列表。轻点右上角的`加号`按钮 (`+`) 以添加新联系人，如图 17-1 所示。


  ![图片](img/1701.jpg)


  **图 17-1.** *输入新联系人姓名*


  轻点每个字段以输入新联系人的名字、姓氏和公司名称。


  **提示：** 请记住，通讯录搜索功能使用名字、姓氏和公司名称。当你添加或编辑联系人时，在公司名称中添加一个特殊词语可以帮助你稍后找到特定联系人。例如，在`公司`字段中添加“西西朋友”这几个字，可以帮助你使用搜索功能快速找到西西的所有朋友。


  在`姓名`按钮下方是`手机`、`电子邮件`、`铃声`、`短信铃声`、`主页`、`添加新地址`和`添加字段`的字段。在下面，你可以关联多个联系人。


  #### 添加新电话号码


  ![图片](img/p352-01.jpg)


  轻点`电话`按钮，并使用`数字`键盘输入电话号码。


  **提示：** 不必担心括号、连字符或句点——iPod touch 会自动将号码调整为正确格式。只需输入区号和号码的数字即可。如果你知道国家代码，也最好一并输入。


  ![图片](img/p352-02.jpg)


  接下来，选择此电话号码的类型——手机、住宅、工作或其他。有九个字段可供选择，如果你发现内置字段都不适用，还有一个`自定义`字段。


  ![图片](img/p352-03.jpg)


  #### 添加电子邮件地址


  ![图片](img/p353-01.jpg)


  轻触`电子邮件`标签，然后输入联系人的电子邮件地址。你也可以轻触电子邮件地址左侧的标签，选择这是住宅、工作还是其他电子邮件地址。


  添加一个地址后，你会看到出现另一个字段，用于添加更多电子邮件地址。


  #### 自定义铃声或短信铃声


  ![图片](img/p353-02.jpg)


  轻触`铃声`或`短信铃声`标签，为`FaceTime`来电或此人发送短信时选择自定义铃声或短信铃声。


  #### 输入网站地址


  ![图片](img/p353-03.jpg)


  你还会看到一个`主页`字段，你可以在其中输入联系人网站的地址，甚至可以输入多个网站地址。


  **注意：** 如果你使用 iCloud 同步通讯录，iCloud 可能会自动搜索 Facebook 主页并将其整合到联系人信息中。


  ![图片](img/p353-04.jpg)


  #### 添加街道地址


  ![图片](img/p354-01.jpg)


  在`主页`字段下方是用于添加地址的字段。输入`街道`、`城市`、`省/州`和`邮政编码`。你还可以指定`国家/地区`以及这是住宅还是工作地址。


  ![图片](img/p354-02.jpg)




  #### 添加新字段


  ![图片](img/p354-03.jpg)


  轻点**添加字段**标签，然后选择任意建议的字段，即可将其添加至该特定联系人（参见图 17-2）。


  ![图片](img/1702.jpg)


  **图 17-2.** *可添加到联系人条目中的新字段*


  当您轻点**生日**时，会看到一个滚轮。您可以通过转动滚轮选择对应日期，将生日添加到联系人信息中。


  ![图片](img/p355-02.jpg)


  操作完成后，只需轻点**新建联系人**表单右上角的**完成**按钮即可。


  ![图片](img/p355-01.jpg)


  **提示：** 假设您在公交车站遇到了一位想要记住的人。当然，您应该输入这位新朋友的名和姓（如果您知道的话）；不过，您还应在**公司**字段中输入“公交车站”这几个字。这样一来，当您输入字母“bus”或“stop”时，就能立刻找到所有在公交车站结识的人，即使您记不住他们的名字也没关系！


  ### 向联系人添加照片


  您可能希望为联系人关联一张照片。在我们之前操作的**新建联系人**屏幕中，只需轻点**姓氏**标签旁边的**添加照片**按钮。


  ![图片](img/p355-03.jpg)


  如果您在“编辑联系人”模式下更换照片，则会在现有照片底部看到**编辑**选项。


  轻点**添加照片**按钮后，您将看到可以进行以下操作：


  ![图片](img/p356-01.jpg)


  *   拍照

  *   选取照片


  如果已有照片，您还可以进行以下操作：


  *   编辑照片

  *   删除照片


  若要选取现有照片，请选择照片所在的相册，并轻点对应的标签。当您看到想要使用的照片时，只需轻点它即可。


  ![图片](img/p356-02.jpg)


  您会注意到照片的顶部和底部会变成灰色，并且您可以对照片进行移动、捏合缩放操作，然后在**图片**窗口中调整其位置。


  当照片调整到您想要的位置后，只需轻点右下角的**选取**按钮，该照片便会设定为该联系人的头像。


  ![图片](img/p356-03.jpg)


  **提示：** 如果您刚搬到一个新社区，记住每个人的名字可能会令人相当头疼。因此，一个好的做法是，为您遇到的每一位邻居在**公司**字段中添加“邻居”这个词。要快速调出所有邻居，只需输入字母“neig”就能找到所有您认识的人！


  ### 搜索联系人


  假设您需要查找某个特定的电话号码或电子邮件地址。只需像之前一样轻点您的**通讯录**图标，您就会在**所有联系人**列表的顶部看到一个**搜索**框（参见图 17-3）。


  **提示：** 如果您当前处于**通讯录**列表的中部或底部，可以通过轻点 iPod touch 顶部的时钟，快速跳转到**通讯录**屏幕顶部并看到这个**搜索**窗口。


  ![图片](img/1703.jpg)


  **图 17-3.** *通讯录**搜索**框*


  要查找联系人，请在以下三个可搜索字段中输入前几个字母：


  ![图片](img/p357-01.jpg)


  *   名字

  *   姓氏

  *   昵称

  *   公司名称


  iPod touch 会立即开始过滤，仅显示与所输入字母匹配的联系人。


  **提示：** 若要进一步缩小搜索范围，请按**空格**键并再输入几个字母。


  当您看到正确的姓名时，只需轻点它，该联系人的信息便会显示出来。


  #### 通过触摸并滑动字母表快速跳转至某个字母


  如果您将手指放在屏幕左侧边缘的字母表上，并向上或向下拖动，即可跳转到相应字母。


  #### 通过滑动搜索


  如果您不想手动输入字母，只需移动手指并从底部向上滑动，您就会看到联系人列表在屏幕上快速滚动。继续滑动或滚动，直到看到您想要的姓名。轻点一个姓名，该联系人的信息便会显示。


  #### 使用群组搜索


  如果您在 PC 或 Mac 上按群组整理了联系人，并通过电脑同步或使用 iCloud 通过无线方式同步了 iPod touch，那么这些群组将同步到您的 iPod
  touch 上。当您启动**通讯录**应用时，您会看到顶部的**群组**。在**群组**标题下，您会看到**所有联系人**。


  ![图片](img/p358-01.jpg)


  选择**所有联系人**即可搜索 iPod touch 上所有可用的联系人信息。


  如果您同步了多个帐户，您将看到每个单独帐户的标签，以及顶部的**所有联系人**标签。


  此示例显示两个群组——一个来自 Microsoft Exchange 帐户（即公司电子邮件帐户），另一个来自一组 iCloud 联系人。


  如果您拥有 Exchange ActiveSync 帐户并且您的公司已启用该功能，您的 Exchange 全局地址列表也会显示在此处（位于“群组”下）。您可以在这里搜索找到公司里的任何人。


  **注意：** 您无法在 iPod touch 的**通讯录**应用中创建群组——它们必须在您的电脑上创建，或者在您向 iPod touch 添加联系人帐户时同步。




  ### 通过电子邮件添加联系人


  你经常会在收到某封电子邮件时发现，发件人并未保存在你的通讯录中。不过，通过邮件添加新联系人其实很简单。


  打开你想将其添加至`通讯录`列表的发件人所发的邮件。接着，在邮件的`发件人`字段中，只需轻点`发件人：`标签旁的发件人姓名即可。


  ![图片](img/p359-01.jpg)


  如果发件人不在你的通讯录中，系统将进入一个界面，让你选择将该电子邮箱地址添加到现有联系人，还是创建新联系人。


  如果你选择`创建新联系人`，系统将进入我们之前见到过的`新建联系人`界面（参考图 17-1）。


  但假设这是某人的个人电子邮箱地址，而你已经有一个包含其工作邮箱地址的条目。在这种情况下，你应该选择`添加到现有联系人`，然后找到正确的人。接着，你可以为这个电子邮箱地址设置一个新标签——在本例中，设为`个人`。


  ![图片](img/p359-02.jpg)


  #### 将联系人关联到其他应用


  你可能会在 iPod touch 上的另一个应用中存有某封邮件发件人的联系信息。iPod touch 可以轻松地将这些联系人信息关联起来。


  例如，假设这封邮件的发件人 Steve 在你的 LinkedIn 联系人列表中，但不知为何不是你 iPod touch 上的联系人。以下是将他与你 iPod touch
  中的联系人信息关联起来的步骤：


  1.  按照前述方法，将他添加到你的通讯录中。

  2.  启动`LinkedIn`应用——有关此主题的更多信息，请参阅第 24 章：“社交网络”。

  3.  找到 Steve 的联系信息，确认他确实在你的`LinkedIn`应用中。

  4.  点击`连接`图标。

  5.  选择右上角的`下载全部`。

  6.  `LinkedIn`应用会提示你，此操作将添加与此联系人关联的照片、当前公司和职位、电子邮箱地址以及网站（参见图 17-4）。

  7.  这正是你希望在 iPod touch 通讯录中实现的效果，因此选择`下载所有新连接`。

  8.  Steve 的照片和更新后的信息随后会被导入到你的 iPod touch 通讯录中。


  ![图片](img/1704.jpg)


  **图 17-4.** *将邮件中的新联系人关联到现有的社交网络联系人*


  **提示：** 记住学龄儿童朋友的父母姓名可能相当有挑战性。不过，在`名`字段中，你不仅可以添加孩子朋友的名字，还可以加上其父母的名字（例如，`名：Samantha
  (妈妈：Susan，爸爸：Ron)`）。接着，在`公司`字段中，填入你孩子的名字和“学校同学”字样（例如，`Cece 学校同学`）。这样，只需在`所有通讯录`列表的`搜索`框中输入你孩子的名字，就能立刻找到你在孩子学校遇到过的所有人。现在，你可以毫不迟疑地说：“你好，Susan，很高兴再次见到你！”*努力做到不露声色地查看对方的名字吧。*


  ### 向联系人发送图片


  如果你想向联系人发送图片，则需要通过`照片`应用进行操作（参见第 19 章：“处理照片”）。


  ### 从通讯录发送电子邮件


  许多核心应用（例如`通讯录`、`邮件`和`信息`）都是完全集成的，因此一个应用可以轻松触发另一个应用。如果你想给通讯录中的某个联系人发送电子邮件，只需打开该联系人并点击其电子邮箱地址。`邮件`应用将会启动，你就可以撰写并发送邮件给此人了。


  点击`通讯录`图标启动`通讯录`应用。通过搜索或滑动浏览你的联系人列表，直到找到你需要的联系人。


  ![图片](img/p362-01.jpg)


  在联系人信息中，点击你想使用的联系人的电子邮箱地址。


  你会看到`邮件`程序会自动启动，并在邮件的`收件人：`字段中填入联系人的姓名。最后，输入内容并发送邮件。


  ![图片](img/p362-02.jpg)


  ### 在地图上显示联系人的地址


  iPod touch 的一大亮点是与谷歌地图的集成。这在`通讯录`应用中体现得非常明显。假设你想在地图上标出通讯录中某个联系人的家庭或工作地址。在过去（iPod
  touch 问世前），你得用 Google、MapQuest 或其他程序，然后费力地重新输入或复制粘贴地址信息。这非常耗时——但在 iPod touch 上，你完全不用这么做。


  只需像之前那样打开该联系人。这次，点击联系人信息底部的地址即可。


  ![图片](img/p362-03.jpg)


  你的`地图`应用（由谷歌地图提供支持）会立即加载，并在联系人的确切位置放置一个`图钉`图标。联系人的姓名会显示在`图钉`上方。


  ![图片](img/p363-01.jpg)


  ![图片](img/p363-02.jpg)


  点击`图钉`顶部的标签，即可进入`信息`界面。


  ![图片](img/p363-03.jpg)


  现在你可以选择`路线到此处`或`路线从此处出发`。


  接着，输入正确的起点或终点地址，然后点击右下角的`路线`按钮。如果你决定不查看路线，只需点击左上角的`清除`按钮即可。


  如果你不是从联系人列表点击，而是直接在`地图`应用中输入了地址，那该怎么办？在这种情况下，你可能想要点击`添加到通讯录`来保存这个地址。


  **提示：** 要返回联系人信息，请点击`地图`按钮，退出`地图`，然后启动`通讯录`。你也可以使用多任务功能（参见第 7 章：“多任务处理”），方法是双击`主屏幕`按钮，然后选择`通讯录`应用。


  ### 更改联系人的排序与显示顺序


  与其他设置一样，`通讯录`应用的选项可以通过`设置`图标进行访问。


  点击`设置`图标，向下滚动到`邮件、通讯录、日历`，然后点击该标签。


  接下来，向下滚动直到看到`通讯录`及其下方的两个选项。要更改排序顺序，请点击`排序顺序`标签，然后选择是按名字还是按姓氏对联系人进行排序。


  ![图片](img/p364-01.jpg)


  你可能还想更改联系人的显示方式。这里可以完成设置；你可以选择`名, 姓`或`姓, 名`。点击`显示顺序`标签，选择你希望联系人按名字还是姓氏顺序显示。点击左上角的`邮件、通讯录…`按钮以保存你的设置更改。


  ![图片](img/p364-02.jpg)


  #### 搜索全局地址列表联系人


  如果你配置了 Exchange 帐户，应该会有一个全局地址列表的选项。这样，当你连接到所在组织的服务器时，就可以访问你的全局地址列表。


  打开你的`通讯录`应用，在 Exchange 下查找名为`Exchange 全局地址列表`的标签。


  ![图片](img/p364-03.jpg)


  ### 通讯录故障排除


  有时，你的`通讯录`应用可能无法按预期工作。（如果你没有看到所有联系人，请回顾第 3 章：“与 iCloud、iTunes 及更多同步”中的步骤，了解如何与你的通讯录应用程序同步。）请确保在`iTunes`应用的设置中选择了`所有群组`。


  **提示：** 如果你正在与另一个联系人应用（例如 Gmail 中的`通讯录`）同步，请确保选择最接近`所有联系人`的选项，而不是像特定群组这样的子集。



  #### 当全局地址列表中的联系人未显示时（适用于 Microsoft Exchange 用户）


  有时，全局地址列表中的联系人可能不会显示在您的 iPod touch 上。如果出现这种情况，请首先确保您已连接到 Wi-Fi 或 3G 蜂窝数据网络。


  接下来，检查您的 Exchange 设置，并确认您拥有正确的服务器和登录信息。为此，请轻点**设置**按钮，然后滚动并轻点**邮件、通讯录和日历**。在列表中找到您的
  Exchange 帐户并轻点它以查看设置。您可能需要联系您所在机构的技术支持，以确保您的 Exchange 设置正确。


  ##### 备忘录应用


  如果您和许多人一样，书桌上会堆满黄色的小便条——提醒自己做各种事情的便条。即使有了电脑，我们依然会留下这些小纸条作为备忘。iPod touch 的一大优点在于，您可以在熟悉的黄色便条纸上写下笔记，然后整齐有序地整理它们。您甚至可以通过电子邮件将其发送给自己或他人，以确保信息不被遗忘。您还可以使用
  iTunes 备份您的备忘录，如果愿意，还可以将备忘录同步到您的电脑或其他网站（如 Google）。


  **提示：** iPod touch 自带的**备忘录**应用非常基础且实用。如果您需要一个功能更强大的备忘录应用，能够对项目进行排序、分类、导入（PDF、Word
  等）、支持文件夹、搜索等功能，您应该查看 iPod touch 上的 App Store。搜索 `notes`，您会发现至少十几款与笔记相关的应用，价格从免费到
  0.99 美元及以上不等。


  ![图片](img/p365-01.jpg)


  iPod touch 上的**备忘录**应用为您提供了一个便捷的场所来保存笔记和简单的 `to-do` 列表。您也可以保存简单的列表，例如购物清单，或用于其他商店（如五金店或宠物店）的清单。如果您随身携带
  iPod touch，一旦想到要添加项目，就可以立即加入这些列表，并且可以随时访问和编辑它们。


  ![图片](img/p365-02.jpg)


  #### 同步备忘录


  您可以使用我们在第 3 章中展示的方法，在 iPod touch 和 iPad 等 iOS 设备之间，或与您的电脑或其他网站同步备忘录：`通过 iCloud、iTunes
  等方式同步。` 同步备忘录的好处在于，您可以在电脑上添加一条备忘录，它就会自动`出现`在您的 iPod touch 上。然后当您外出时，您可以编辑该备忘录，并将其同步回您的电脑。无需重新输入或记忆任何内容。您总是随身携带
  iPod touch，因此随时随地记笔记是永不忘记重要事项的好方法。


  #### 开始使用备忘录


  与所有其他应用一样，只需轻点**备忘录**图标即可启动它。启动**备忘录**应用后，您会看到一个典型的黄色记事本。


  ![图片](img/p366-01.jpg)


  ##### 多个备忘录帐户


  如果您恰好通过 iCloud、Exchange 或至少一个 IMAP 电子邮件帐户以及您的电脑（使用 iTunes）进行同步，那么您会看到来自每个帐户的备忘录是分开保存的。这很像您的联系人按电子邮件帐户分组，以及您的日历按电子邮件帐户分开存放的方式。


  为了查看多个备忘录帐户，您需要在帐户设置屏幕中设置一个开关。


  当您设置 IMAP 电子邮件帐户时，在**设置** ![图片](img/U001.jpg) **邮件、通讯录、日历**中，您将看到打开或关闭备忘录同步的选项。为了查看这些备忘录帐户，您需要将**备忘录**开关设置为**打开**，如下方这个
  Gmail 帐户所示。


  ![图片](img/p366-02.jpg)


  要查看不同的备忘录帐户，请轻点**备忘录**应用左上角的**帐户**按钮。


  ![图片](img/p367-01.jpg)


  然后，在下一个屏幕上，您可以轻点选项来查看**所有备忘录**，或者查看每个帐户的备忘录。在此图片中，Gmail 或 MobileMe 帐户是可选项。


  您添加到某个特定帐户的备忘录将保存在该帐户中。例如，如果您将备忘录添加到 Gmail，则这些备忘录将仅显示在您的 Gmail 帐户中。


  ![图片](img/p367-02.jpg)


  #### 我的备忘录是如何排序的？


  您可以看到所有备忘录都按时间倒序排列，最近编辑的备忘录排在最上面，最旧的排在底部。


  显示的是该特定备忘录最后一次编辑的日期和时间，而不是首次创建的日期。因此，您会注意到备忘录的顺序在屏幕上会有所变化。


  这种排序可能是一个优点，因为您最近（或经常编辑）的备忘录会正好排在顶部。


  **提示：** 如果您想跟踪您的 `to-do` 列表，可以使用 iPod touch 上内置的提醒事项应用。如果您需要更强大的功能，请在 App Store
  中查看 **Things**、**Appigo Todo** 或 **OmniFocus**。


  #### 添加新备忘录


  要开始一条新备忘录，请轻点右上角的加号 ![图片](img/p368-01.jpg)。


  记事本为空白，键盘会弹出供您开始输入。


  **提示：** 您可以将 iPod touch 横向放置，以查看更宽的横向键盘。


  ![图片](img/p368-02.jpg)


  #### 为备忘录添加标题


  在您按下**换行**键之前键入的前几个单词将成为备忘录的标题。因此，请思考您想要什么标题，并首先输入。在显示的图片中，**购物清单**成为了备忘录的标题。


  在每一行输入一个新项目，然后轻点**换行**键进入下一行。


  完成所有输入后，轻点左上角的**备忘录**按钮，返回主备忘录屏幕。


  ![图片](img/p368-03.jpg)


  #### 查看或编辑您的备忘录


  您的备忘录在列表中显示为可供轻点的标签。轻点您想要查看或编辑的备忘录名称。随后将显示该备忘录的内容。


  ![图片](img/p369-01.jpg)


  您可以像在任何程序中一样在备忘录中滚动。您会注意到备忘录最后编辑的日期和时间显示在右上角。


  阅读完备忘录后，只需轻点左上角的**备忘录**按钮即可返回主备忘录屏幕。


  要浏览多个备忘录，只需轻点屏幕底部的箭头。轻点**前进** ![图片](img/p369-02.jpg) 箭头。页面会翻动，您可以看到下一条备忘录。要返回，只需轻点**后退**
  ![图片](img/p369-03.jpg) 箭头。


  #### 删除备忘录


  要删除一条备忘录，请在列表中用手指从左向右滑动该备忘录，然后轻点**删除**。


  ![图片](img/p369-04.jpg)


  或者，如果您正在查看该备忘录，则轻点底部的**垃圾桶**图标 ![图片](img/p369-05.jpg)。iPod touch 会提示您删除或取消删除该备忘录。


  #### 通过电子邮件发送或打印备忘录


  **备忘录**应用的便捷功能之一是能够通过电子邮件发送或打印备忘录。假设您写了一张购物便条并想通过电子邮件发送给您的配偶，或者您列出了一份礼物创意清单并想分发出去。要通过电子邮件发送或打印备忘录，只需轻点屏幕底部的**操作按钮**图标
  ![图片](img/p370-02.jpg)。


  ![图片](img/p370-01.jpg)


  #### 数据检测器 - 带下划线单词的酷功能


  如果您在备忘录中键入单词`tomorrow morning`并保存。下次您打开该备忘录时，会看到这些单词已被加下划线。如果您轻点并按住带下划线的单词，您会看到一个按钮询问您是否要**创建事件**。轻点该按钮即可为明天早上创建一个新的日历事件。


  ![图片](img/p370-03.jpg)


  **提示：** 每当日期和时间词汇被加下划线时，iPod touch 会将其识别为潜在的日历事件。这适用于 iPod touch 上的备忘录、电子邮件消息和其他位置。iPod
  touch 还具有其他`数据检测器`，例如它可以识别电话号码、网站地址，甚至包裹的追踪号码。


