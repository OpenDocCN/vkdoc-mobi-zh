- "# 第 1 章\n\n## 开始使用\n\n在本章中，我们将带您逐步了解您的新 `iPod touch` 以及包装盒中的所有物品。我们还将探讨充电的方方面面以及如何延长电池续航时间。要开始使用您的\
  \ `iPod touch`，您需要先将其连接到 `iTunes` 以进行激活和注册。在本章末尾的“iPod touch 基础”部分，我们将向您展示如何在 `iPod\
  \ touch` 上进行基本操作，以便您能快速上手并运行。\n\n### 了解您的 iPod touch\n\n在本节中，我们将向您展示如何使用 `iPod touch`\
  \ 包装盒中的所有物品。我们还会提供一些 `iPod touch` 电池和充电技巧，讨论如何判断您的 `iPod touch` 是否已激活，并探讨 `滑动以解锁`\
  \ 功能。\n\n\n\n#### 包装盒内物品\n\n如果你是首次接触`iPod touch`，可能会觉得包装盒内容有些单薄。不过，盒中确实包含了上手使用和享受`iPod\
  \ touch`所需的一切——除了那份详尽的使用手册（这正是我们编写本书的原因！）。以下是包装盒内的物品：\n\n*   **iPod touch**：打开包装盒最上层，你首先看到的就是崭新的`iPod\
  \ touch`。\n*   **纸质文件夹**：在放置`iPod touch`的塑料托架下方，你会找到一个纸质文件夹，内含以下物品：\n    *   **操作指南**：一本\
  \ 4.5 x 2.5 英寸的小巧折叠手册，共 19 页，介绍关于`iPod touch`的基础信息。\n    *   **iPod touch 产品信息指南**：一本\
  \ 4.5 x 2.5 英寸的小册子，但字体过小，难以阅读。其中包含与`iPod touch`相关的所有法律条款、条件、警告和免责声明。\n    *   **苹果标志贴纸**：两个漂亮的白色苹果标志贴纸，你有时能在车窗上看到它们。尽情享用吧！\n\
  \n在包装盒底部，你会找到如图 1-1 所示的物品：一副耳机和一根 USB 线缆。\n\n![images](img/0101.jpg)\n\n**图 1-1.**\
  \ *位于 iPod touch 包装盒底部的耳机和 USB 转 Dock 连接线*\n\n##### iPod touch 耳机\n\n耳机包含两个用于收听音乐、视频或进行`FaceTime`通话的白色耳塞，以及一个连接在右耳塞导线上的小型控制器。将其插入`iPod\
  \ touch`左上边缘的插孔。请确保完全插入——刚开始插入时可能需要稍用力按压。\n\n如下图所示，控制器上有`加号`（`+`）和`减号`（`-`）按键，以及一个`中央`按钮。你可以使用（`+`）和（`-`）键调节音量，并使用`中央`按钮接听或挂断`FaceTime`通话。\n\
  \n![images](img/p32-01.jpg)\n\n**注意：** 通过双击或三击`中央`按钮，你可以在歌曲之间切换。双击跳至下一曲。三击返回上一曲。\n\
  \n随附的耳机还内置了一个用于`FaceTime`通话的小型麦克风。\n\n###### USB 转 Dock 连接线\n\nUSB 转 Dock 连接线用于将`iPod\
  \ touch`连接到电脑；它同时也充当电源线。\n\n###### 墙壁电源适配器\n\n墙壁电源适配器一端是 USB 接口，另一端是插入电源插座的插头。只需将\
  \ USB 线连接到`iPod touch`，另一端连接到电源适配器，即可通过墙壁插座为`iPod touch`充电。\n\n#### 为 iPod touch\
  \ 充电与电池续航提示\n\n你的`iPod touch`可能已存有一些电量，但你可能希望将其完全充满，以便在完成设置后能享受不间断的长时间使用。利用这段充电时间，你可以阅读本章剩余内容、安装或更新`iTunes`应用，或者浏览所有出色的`iPod\
  \ touch`应用（参见第 22 章：“神奇的应用商店”）。\n\n##### 通过电源插座充电\n\n为`iPod touch`充电最快的方式是直接将其插入墙壁插座。使用连接`iPod\
  \ touch`到电脑的同一根 USB 线。将线缆较宽的一端插入`iPod touch`底部的接口（靠近`主屏幕`按钮旁），将 USB 线另一端插入墙壁电源适配器。你可以用大约\
  \ 10 美元购买这些电源适配器。\n\n![images](img/p33-01.jpg)\n\n通过查看屏幕，你可以判断`iPod touch`是否正在充电。你会看到电池指示图标（位于右上角）内出现闪电标志或插头图标。\n\
  \n`主电池`图标会显示当前电量。右侧的图像显示了一部正在充电且电量几乎充满的`iPod touch`。\n\n**提示：** 一些较新的汽车配有内置电源插座（与家中插座相同），你可以在车内插入`iPod\
  \ touch`的电源线。有些车型还提供基座选项，允许你通过车载收音机控制`iPod`应用。这些插座有时隐藏在前排座椅后方的中央控制台中。\n\n![images](img/p34-01.jpg)\n\
  \n##### 通过电脑充电\n\n将`iPod touch`连接到电脑时，也可以为其充电，尽管速度比直接连接墙壁充电器稍慢。\n\n**提示：** 尝试使用电脑上不同的\
  \ USB 端口。一些 USB 端口共享总线，供电较少；而其他端口拥有独立总线，供电更多。\n\n为获得最佳充电效果，建议将电脑插在墙壁插座上。如果电脑未连接电源，`iPod\
  \ touch`仍会充电，但速度较慢。请注意，如果笔记本电脑进入睡眠状态或合上屏幕，`iPod touch`将停止充电。\n\n##### 通过其他配件充电\n\
  \n某些专为`iPod touch`设计的配件也能为其充电。最常见的是`iPod touch`/iPod 音乐基座。这些是扬声器系统，你可以将`iPod touch`插入其中播放音乐。仅当屏幕上出现以下警告信息时，`iPod\
  \ touch`才无法充电：“此配件不支持充电。”这种情况通常发生在较旧的配件或并非专为你的`iPod touch`设计的配件上。\n\n![images](img/square.jpg)\
  \ **提示：保护壳与外部电池二合一**\n\n有些保护壳实际上内置了外部电池。市面上有多个制造商提供此类产品。其中一家供应商 mophie（[`www.mophie.com`](http://www.mophie.com)）为`iPod\
  \ touch`生产了此类保护壳。\n\n##### 预期电池续航时间\n\n苹果公司表示，凭借更大的电池和先进技术，`iPod touch`的续航时间应比前几代`iPod\
  \ touch`更长（参见表 1-1）。\n\n![images](img/t0101.jpg)\n\n上述电池续航时间基于理想条件，且电池全新充满电。你会注意到，随着时间的推移，实际电池续航能力将会下降。数据来源：Apple.com\n\
  \n##### 电池与充电提示\n\n关键问题在于：如何才能充分利用电池续航，并确保`iPod touch`在你需要时已充好电、准备就绪？在本节中，我们将介绍一些技巧来帮助你实现这一目标。\n\
  \n###### 提升单次充电的使用时间\n\n为延长电池续航时间，请尝试以下建议：\n\n*   **降低屏幕亮度**：轻点`设置` > `亮度`，然后使用滑块将亮度降低至一半以下，找到适合你的亮度水平。\n\
  *   **关闭定位服务**：如果你不需要将实际位置传输给应用，可以关闭此功能。轻点`设置` > `定位服务`，然后将`定位服务`设为`关闭`。如果你打开了某个请求定位的应用，系统会提醒你重新开启该功能。\n\
  *   **设置更短的自动锁定时间**：此功能可缩短`iPod touch`在不使用时进入睡眠模式（即关闭屏幕）所需的时间。缩短此时间有助于节省电量。操作方法是：轻点`设置`\
  \ > `通用` > `自动锁定`，然后将`自动锁定`设为尽可能短的时间——如果你喜欢，甚至可以设为`1 分钟`。\n*   **关闭推送邮件和推送通知。**\n\
  \n你可以访问苹果网站 [www.apple.com/batteries/iPod touch.html](http://www.apple.com/batteries/iPodtouch.html)\
  \ 了解更全面的电池使用技巧。\n\n###### 延长电池整体寿命\n\n`iPod touch` 使用可充电电池，其有效寿命内的充电循环次数有限；换句话说，随着时间的推移，电池保持电量的能力会逐渐下降。你可以通过确保每月至少将电池完全耗尽一次来延长`iPod\
  \ touch`的电池寿命。如果你这样做，可充电电池的使用寿命会更长。\n\n\n\n###### 为你的`iPod touch`寻找更多充电地点\n\n无论你做什么，如果你真的经常使用你的`iPod\
  \ touch`，你总会想找到更多地点和方式来为其充电。除了使用电源线或将`iPod touch`连接到电脑，你还可以利用表 1–2 中介绍的充电技巧。\n\n\
  ![images](img/t0102.jpg)\n\n### 设置你的`iPod touch`\n\n至此，你已经了解了关于`iPod touch`的一些基础知识和如何充分利用其电池的方法。现在，你已经准备好开始享受它了！下一步就是设置你的`iPod\
  \ touch`。\n\n#### 判断是否需要设置你的`iPod touch`\n\n如果你的`iPod touch`上出现`Welcome`屏幕，那么你需要先完成设置才能使用它。通过\
  \ iOS 5，你可以通过几种方式来设置`iPod touch`。首先，你可以使用 Wi-Fi 网络和 iCloud 进行空中下载（OTA）设置。或者，你也可以使用\
  \ USB 底座连接线将`iPod touch`连接到电脑，并通过`iTunes`服务激活它。\n\n如果这是你的第一部`iPod touch`，或者你想将其设置为一部全新的`iPod\
  \ touch`，你可能希望使用 iCloud OTA 设置。\n\n如果你是从旧款`iPod touch`型号升级，你可能希望使用`iTunes`服务从备份中恢复。\n\
  \n### 使用 iCloud 通过空中下载方式设置你的`iPod touch`\n\n通过 iOS 5，苹果终于摆脱了`iTunes`的连接线。这意味着你无需再将`iPod\
  \ touch`连接到电脑即可激活或设置它。相反，你可以直接通过`iPod touch`，使用苹果全新的`iCloud`服务进行 OTA 激活。\n\n**注意：**\
  \ 在初始设置过程中，你可以连接到任何可用的 Wi-Fi 网络，这是使用 iCloud 进行`iPod touch` OTA 设置所必需的。如果你家里、工作场所或学校的\
  \ Wi-Fi 网络不可用，并且身边也没有像星巴克这样的公共接入点，那么你将需要稍后再激活你的`iPod touch`。（你也可以选择通过电脑上的`iTunes`来设置你的`iPod\
  \ touch`；但即便如此，你仍然需要互联网连接来访问苹果的激活服务器。）\n\n按照以下步骤，使用 iCloud 设置你的`iPod touch`，如下图所示的前述`Welcome`屏幕：\n\
  \n1.  触摸`Arrow`按钮并沿指示方向在屏幕上滑动以进行设置。\n2.  选择你希望在`iPod touch`上使用的语言。苹果会根据你购买`iPod\
  \ touch`的地点提供最常用的选项；不过，你也可以点击`Down Arrow`以获得更多语言选择。\n3.  选择好你偏好的语言后，点击屏幕右上角的蓝色`Next`按钮。\n\
  4.  选择你的国家或地区。同样，苹果会根据你购买`iPod touch`的地点提供一个默认选项；但你可以点击`Show More…`展开列表。点击蓝色`Next`按钮继续。\n\
  5.  决定是否启用或禁用定位服务，然后点击蓝色`Next`按钮继续。\n\n    ![images](img/p38-01.jpg)\n\n    **注意：**\
  \ `Location Services`使用基站三角定位和 Wi-Fi 路由器映射来确定你的`iPod touch`的大致位置。此功能用于签到游戏（如 Foursquare）、社交网络（如\
  \ Facebook）、地理标记（在`Camera`应用中）以及实用工具（如`Find my iPod touch`）。除非你特别需要全局禁用所有定位服务，否则你很可能希望现在就开启定位服务功能。你之后可以在`Settings`应用中有选择地禁用或启用这些服务（例如，关闭`Camera`应用的地理标记，但保持`Find\
  \ my touch`开启）。\n\n6.  选择你的 Wi-Fi 网络，输入网络密码，然后点击蓝色`Next`按钮继续。\n7.  你的`iPod touch`现在将连接到苹果进行激活。这可能需要几秒钟到几分钟的时间，具体取决于你的连接速度以及苹果服务器的繁忙程度。\n\
  8.  一旦激活完成，你将被提供以下选项：将你的`iPod touch`设置为新设备、从 iCloud 备份恢复、或从`iTunes`恢复。\n\n#### 使用\
  \ iCloud 设置一部新的`iPod touch`\n\n如果这是你的第一部`iPod touch`——或者你只想要一个干净、全新的开始——请选择 `Set\
  \ up as a new iPod touch`。\n\n**提示：** 从备份恢复——尤其是从不同设备的备份恢复（例如，从 iPad 备份恢复`iPod touch`）——有时会导致问题，比如应用崩溃更频繁或电池续航更短。如果你在从之前的备份恢复后遇到问题，你可能想尝试将你的`iPod\
  \ touch`设置为新设备。你将不得不从头重新设置所有设置和账户，并且会丢失所有已保存的应用和游戏数据；然而，当你的`iPod touch`已不稳定到无法日常使用时，这有时是你唯一的选择。\n\
  \n要将你的`iPod touch`设置为新设备，你需要使用现有的 Apple ID 登录，或者创建一个新的免费 Apple ID。Apple ID 可以是以下任何一种：\n\
  \n*   **iTunes ID**：这是你用来登录`iTunes`并购买音乐、电视节目、电影、App Store 应用和游戏以及 iBooks 的电子邮件地址和密码。\n\
  *   **免费 Apple ID**：这是你用来登录`Find my iPod touch`、FaceTime、Game Center、iCloud 或任何其他近期免费的\
  \ Apple 服务的电子邮件地址和密码。这也可以是你用于在线 Apple Store 购物的同一个 ID。\n\n**注意：** 如果你使用苹果产品和服务已有一段时间，一个人拥有多个\
  \ Apple ID 的情况并不少见。例如，你可能有一个 iTunes ID、一个旧的 MobileMe 账户和一个 Apple Store ID。不幸的是，在撰写本文时，苹果不允许合并\
  \ ID，因此你必须选择其中一个用于 iCloud。\n\n如果你有旧的 MobileMe 账户，苹果会为你将其迁移到 iCloud。请访问 [`http://www.me.com/move`](http://www.me.com/move)\
  \ 开始此过程。\n\n否则，作者建议你使用你的 iTunes ID，因为它关联了你所有已购买的音乐、媒体、应用和游戏，并且你将能够利用 iCloud 的重新下载功能，轻松地将这些购买记录恢复到你现在和未来的新设备上。\n\
  \n如果你有 Apple ID，现在就登录，接受条款和条件，然后直接跳到`Configuring iCloud Options`部分。如果你没有 Apple ID，现在就创建一个。\n\
  \n\n\n### 创建免费 Apple ID\n\n如果你从未使用过 iTunes，也没有 Apple ID，那么你需要创建一个。在 iPod touch 上即可快速完成：\n\
  \n1. 轻点**创建新 Apple ID**。\n2. 滚动 **年**、**月** 和 **日** 滚轮，选择正确日期来输入生日，然后轻点蓝色 **下一步**\
  \ 按钮。\n3. 在相应字段中输入你的名和姓，然后轻点蓝色 **下一步** 按钮。\n\n   ![images](img/p40-01.jpg)\n\n4.\
  \ 选择是使用现有电子邮件地址（例如 Gmail、Hotmail、Yahoo! 或个人电子邮件地址），还是创建一个新的 iCloud 电子邮件地址（`@me.com`）。如果你不想费心记住新邮箱地址，建议使用现有地址。如果你希望将邮件分开管理，那么可以创建一个新的。\n\
  5. 如果你正在创建新的 iCloud `@me.com` 地址，请输入密码并点击 **验证**。你的密码必须“强”；即必须包含大写和小写字母、至少一个数字，并且长度至少为\
  \ 8 个字符。\n6. 选择一个**安全信息**问题。这个问题应易于你记忆，但他人难以轻易猜到（也就是说，任何人都不应能仅通过查看你的博客、Facebook、Google、Yahoo!\
  \ 或其他在线个人资料页面就能找到答案）。\n7. 选择你是否希望从此新地址接收来自 Apple 的电子邮件更新。如果不希望，请将此选项设置为 **关闭**。\n\
  8. 你需要接受 **条款与条件** 两次：首先轻点左下角的蓝色 **同意** 按钮，然后在弹出的确认窗口中轻点半透明的 **同意** 按钮。同样，验证可能需要片刻。\n\
  9. 然后 Apple 将设置你的新 Apple ID。这可能需要一点时间。\n\n### 配置 iCloud 选项\n\n使用你的 Apple ID 登录后，即可配置你的\
  \ iCloud 设置：\n\n1. 如果你希望使用 **设置 iCloud** 功能——我们建议你这样做，因为它免费且提供大量有用的备份和同步功能——那么请将\
  \ **iCloud** 选项保持为 **打开** 状态，并轻点蓝色 **下一步** 按钮。\n2. 选择是否使用 iCloud 备份服务，通过无线方式将 iPod\
  \ touch 备份到 Apple 数据中心，或通过 USB 使用 iTunes 备份到电脑。同样，我们建议将 **iCloud** 设置为 **打开**，因为它是自动的，你无需记着去手动操作。\n\
  \n   ![images](img/p41-01.jpg)\n\n3. **查找我的 iPod touch** 服务是 iCloud 的免费部分，它可以显示你\
  \ iPod touch 的大致位置（你能知道它是在家还是在办公室，但无法确定具体房间）、让它响铃以便你发现它（即使它掉到汽车座椅下或沙发后面），甚至在你设备丢失或被盗时抹掉所有个人数据。如果你希望使用此功能，请将此选项保持为\
  \ **打开** 状态。\n4. 这就完成了！你的 iPod touch 现已设置好，可以开始使用了。\n\n### 使用 iCloud 恢复 iPod touch\n\
  \n如果你之前曾使用 iCloud 备份过 iPod touch，则可以直接从设备通过无线方式从该备份恢复：\n\n1. 轻点 **从 iCloud 备份恢复**。\n\
  2. 输入你 iCloud Apple ID 的电子邮件地址和密码。\n3. 选择要恢复的备份。通常，这会是可用的最新备份。\n4. 你的 iPod touch\
  \ 将重新启动、下载备份并重新启动。此过程可能需要几分钟，尤其当你有大量数据需要恢复时。\n5. iPod touch 恢复完成后，你的应用将开始下载和安装。iCloud\
  \ 可以同时下载和安装多个应用，你可以在恢复过程中继续使用你的 iPod touch。\n\n## 使用 iTunes 设置 iPod touch\n\n如果你不想使用\
  \ iCloud，或者有之前 iTunes 的备份需要进行恢复，那么你仍然可以通过 USB 用电脑设置你的 iPod touch。\n\n如果你的电脑未安装 iTunes，请打开网页浏览器并访问\
  \ [`www.itunes.com/download`](http://www.itunes.com/download)。从提供的链接下载该软件。\n\n如果你已安装\
  \ iTunes，则应检查是否有更新版本可用。截至本书出版时，版本 10.5 为最新版本。请按照以下步骤更新你的 iTunes 版本：\n\n1. 启动 **iTunes**\
  \ 应用。\n2. 如果你使用的是 Windows 系统，请从菜单中选择 **帮助**，然后选择 **检查更新**。\n3. 如果你使用的是 Mac 系统，请从菜单中选择\
  \ **iTunes**，然后选择 **检查更新**。\n4. 如果有可用更新，请按照说明更新 **iTunes**。\n\n### 从之前的备份恢复 iPod\
  \ touch\n\n首次将新 iPod touch 连接到 iTunes 时，你将看到如图 1–2 所示的屏幕。\n\n![images](img/0102.jpg)\n\
  \n**图 1–2.** *欢迎使用 iPod 屏幕*\n\n**警告：** 我们曾听闻有人在将非 iPod touch 设备（例如 iPad 或 iPod touch）的备份恢复到\
  \ iPod touch 时遇到问题（例如死机或电池续航缩短）。此外，选择 **恢复** 的前提是你已对旧设备进行了备份；否则，将没有数据可恢复到新 iPod\
  \ touch。\n\n请执行以下操作，从另一台 iPod touch 或设备的备份进行恢复：\n\n![images](img/0103.jpg)\n\n**图\
  \ 1–3.** *设置 iPod touch 屏幕*\n\n1. 点击 **从以下设备的备份恢复** 左侧的单选按钮（见图 1–3）\n2. 从下拉菜单中选择特定的备份文件。\n\
  3. 点击 **继续** 按钮，将备份文件中的数据恢复到你的 iPod touch。至此，你已完成 iPod touch 的初始设置。\n\n**注意：** 你仍需同步希望在\
  \ iPod touch 上使用的任何应用、游戏、音乐和其他媒体。\n\n## 维护你的 iPod touch\n\n现在你已经使用 iTunes 设置了 iPod\
  \ touch，你将需要了解如何安全地清洁屏幕以及使用各种保护壳进行防护。\n\n### 清洁 iPod touch 屏幕\n\n使用 iPod touch 一段时间后，你会发现你的手指（或他人的手指）在原本光洁的屏幕上留下了污迹和油渍。你将需要了解如何安全地清洁屏幕。保持屏幕全天更干净的方法之一是为\
  \ iPod touch 贴上保护屏贴，这还有可能带来减少眩光的额外好处（将在下一节讨论）。\n\n我们还建议采取以下步骤：\n\n1. 按住顶部的 **睡眠/电源**\
  \ 键关闭 iPod touch，然后使用滑块关机。\n2. 拔下所有线缆，例如 USB 同步线。\n3. 使用干燥、柔软的无线头布（如清洁眼镜用的布或类似布料）擦拭屏幕。\n\
  4. 如果干布无效，可尝试用少量水将布稍微打湿。如果使用湿布，请尽量避免水进入开口处。\n5. 另一种选择是使用 Klear Screen 的 *iKlear*\
  \ 屏幕清洁剂。该产品适用于你的 iPod touch 以及其他设备，如电脑、笔记本电脑或 iPad 屏幕。\n\n**警告：** 切勿使用家用清洁剂、研磨性清洁剂（如\
  \ SoftScrub）、氨水类清洁剂（如 Windex）、酒精、喷雾剂或溶剂。\n\n### iPod touch 保护壳与保护套\n\n将 iPod touch\
  \ 拿到手中后，你会注意到它精美的构造。你也会发现它可能相当滑、会轻微晃动，或者在你打字时背部容易被刮花。\n\n我们建议为你的 iPod touch 购买一个保护壳。普通保护壳的价格约为\
  \ 10–40 美元，而精美的皮革保护壳可能花费 100 美元或更多。花点小钱保护你价值 200 美元或更高的 iPod touch 是非常明智的。\n\n\n\
  \n#### 何处购买保护壳\n\n您可以通过以下任一渠道为 iPod touch 购买保护壳：\n\n- 亚马逊官网 ([`www.amazon.com`](http://www.amazon.com))\n\
  - Apple 配件商店 ([`http://store.apple.com`](http://store.apple.com))\n- iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
  \n您也可以在网络上搜索“iPod touch 保护壳”或“iPod touch 防护套”。\n\n**提示：** 您*或许*能为 iPod touch 使用专为其他类型设备或智能手机设计的保护壳。如果选择此途径以节省开支，请务必确保您的\
  \ iPod touch 能稳固地适配所选的保护壳或保护套。\n\n#### 选购指南……\n\n以下部分列出了适用于 iPod touch 的几种保护壳类型及其大致价格区间。\n\
  \n##### 橡胶/硅胶保护壳（10–30 美元）\n\n橡胶和硅胶保护壳能提供缓冲握持感，吸收 iPod touch 的磕碰和擦伤，并让您的手指避免直接接触\
  \ iPod touch 边缘。\n\n**优点：** 此类保护壳价格低廉、色彩丰富，且握持舒适。\n\n**缺点：** 不如皮革保护壳显得专业。\n\n#####\
  \ 内置外接电池盒的二合一保护壳（50–80 美元）\n\n结合外接电池盒的保护壳具有双重用途：将硬壳保护套的防护特性与可充电的外接电池盒结合在一起。诸如 Mophie\
  \ 和 Case-Mate 等制造商正忙于为其保护壳开发 iPod touch 版本；如果运气好，当您读到本书时，这些产品可能已经上市。\n\n**优点：**\
  \ 此类保护壳在保护 iPod touch 的同时，还能显著提升电池续航——在某些情况下，可提升超过 50% 的续航时间。\n\n**缺点：** 会增加 iPod\
  \ touch 的重量和体积。\n\n##### 防水保护壳（10–40 美元）\n\n防水保护壳可保护您的 iPod touch 免受水的侵害，让您在雨天、泳池边、海滩上、船上等环境中安全使用设备。\n\
  \n**优点：** 此类保护壳能有效防护来自各类水源的损害。\n\n**缺点：** 可能会让触摸屏操作更困难，且通常不具备防摔或防撞功能。\n\n##### 硬质塑料/金属保护壳（20–40\
  \ 美元）\n\n硬质塑料和金属保护壳能为划痕、磕碰和短距离跌落提供坚实保护。\n\n**优点：** 此类保护壳为您的 iPod touch 提供卓越保护。\n\
  \n**缺点：** 会增加一些体积和重量。此外，给 iPod touch 充电时可能需要取下此类保护壳，否则可能导致设备过热。\n\n##### 皮革或特殊材质保护壳（50–100\
  \ 美元以上）\n\n皮革及其他特殊材质保护壳能带来更多奢华感，同时保护 iPod touch。\n\n**优点：** 此类保护壳为您的 iPod touch\
  \ 增添一丝奢华质感，同时保护设备正面和背面。\n\n**缺点：** 价格更昂贵，且会增加体积和重量。\n\n##### 屏幕保护膜（5–40 美元）\n\n\
  屏幕和后盖玻璃保护膜有助于保护 iPod touch 的屏幕和背面免受划痕。\n\n**优点：** 此类保护壳通过防刮擦来延长 iPod touch 的使用寿命；大多数此类保护膜还能减少屏幕眩光。\n\
  \n**缺点：** 部分保护膜可能会增加眩光或影响屏幕的触摸灵敏度。\n\n### iPod touch 基础操作\n\n现在您已经给 iPod touch 充好电、清洁了屏幕，并给它穿上了一件崭新的保护壳——让我们来看看其软件操作的一些基础知识吧。\n\
  \n#### 开机/关机与休眠/唤醒\n\n若要开机，请按住 iPod touch 顶部边缘的`电源/休眠`按钮几秒钟。如果 iPod touch 已完全关机，快速轻按此按钮是无法开机的——在这种情况下，您需要按住按钮直至看到\
  \ iPod touch 启动。\n\n当您不再使用 iPod touch 时，有两种选择：您可以将其置于休眠模式，或将其完全关闭（参见图 1–4）。\n\n\
  ![图片](img/0104.jpg)\n\n**图 1–4.** *使用 iPod touch 上的电源/休眠按钮和主屏幕按钮。*\n\n休眠模式的好处是：当您想再次使用\
  \ iPod touch 时，只需轻按`电源/休眠`按钮或`主屏幕`按钮即可将其唤醒。如果您希望最大限度地节省电量，或者知道将在较长时间内不会使用 iPod touch——例如睡觉时——则应将其完全关闭。操作方法如下：按住`电源/休眠`按钮，直到出现`滑动来关机`滑块。只需将滑块向右滑动，iPod\
  \ touch 便会关机。\n\n#### 辅助触控功能\n\n作为其出色辅助功能的一部分，Apple 为有特殊身体或运动技能需求者提供了辅助触控功能。这包括硬件按钮的触摸屏版本，以及常用和自定义手势。\n\
  \n请按照以下步骤启用辅助触控功能：\n\n1.  轻按`设置`图标。\n2.  轻按`通用`。\n3.  轻按页面底部的`辅助功能`。\n4.  轻按`辅助触控`。\n\
  5.  将`辅助触控`开关设置为`开启`。\n6.  当屏幕右下角出现`辅助触控`悬浮图标时，轻按它。\n7.  轻按`主屏幕`来模拟物理按压硬件`主屏幕`按钮。\n\
  8.  轻按`设备`以访问其他硬件按钮模拟器，包括`旋转屏幕`、`锁定屏幕`、`静音`/`取消静音`、`调高音量`、`调低音量`和`摇动`。\n9.  轻按`手势`或`收藏`（收藏的手势）以访问捏合、轻扫以及任何已设置的自定义手势。\n\
  10. 轻按悬浮菜单的中央区域可返回上一级菜单或退出辅助触控。\n\n![图片](img/p49-01.jpg)\n\n**注：** 辅助触控还支持复杂的手势，包括自定义手势。\n\
  \n#### 滑动解锁与快速相机和媒体访问\n\n一旦您的 iPod touch 被激活，您将看到`滑动来解锁`屏幕，如图 1–5 所示。\n\n当有音乐播放时，连按两次`主屏幕`按钮可查看媒体控制，更重要的是，当您想快速抓拍照片时，可以立即访问您的相机。轻按底部滑块旁边的相机图标。\n\
  \n要进入您的`iPod touch`，请将手指放在屏幕上，沿着箭头指示的路径将`滑动来解锁`按钮向右移动。完成后，您将看到您的`主屏幕`。\n\n请注意底部\
  \ Dock 栏中的四个图标。此 Dock 栏中的项目不会移动，而其余图标可以在不同的*页面*之间来回移动。您可以在第 6 章：“图标与文件夹”中的“移动图标”部分了解如何将您喜爱的图标移入底部\
  \ Dock 栏。\n\n![图片](img/0105.jpg)\n\n**图 1–5.** ***滑动来解锁**、快速相机和媒体访问以及您的**主屏幕**。*\n\
  \n#### 在应用程序和设置界面中导航\n\n在 iPod touch 应用程序的界面间导航非常简单，只需轻点屏幕即可：\n\n1.  轻按`设置`图标以启动`设置`应用。\n\
  2.  轻触`通用`以查看通用设置。\n3.  轻触`网络`以查看网络设置。\n4.  您可以通过轻点来切换任何开关。例如，轻触`数据漫游`旁边的`关闭`开关，它会切换为`开启`。\n\
  5.  要返回上一级界面，请轻触左上角的按钮。在此例中，您需要轻触`通用`按钮以离开`网络设置`界面。\n\n#### 主屏幕按钮\n\n![图片](img/p50-01.jpg)\n\
  \n您最常使用的按钮是`主屏幕`按钮。此按钮将启动您在 iPod touch 上执行的所有操作。如果您的 iPod touch 处于休眠状态，请按一次`主屏幕`按钮将其唤醒（假设它处于休眠模式）。\n\
  \n按下`主屏幕`按钮也会让您退出任何应用程序，并带您回到`主屏幕`。\n\n\n\n#### 通过双击主屏幕按钮访问快速应用程序切换器\n\n访问快速应用程序切换器只需双击`主屏幕`按钮即可。\n\
  \n1.  在任何应用中，或从`主屏幕`界面，双击`主屏幕`按钮。\n2.  屏幕会向上滑动，您会在底部看到一栏小图标。这些代表您自启动 iPod touch\
  \ 以来打开过的应用程序。\n3.  轻点任意图标即可切换回该应用。\n4.  向左滑动手指可查看更多应用。\n5.  向右滑动手指可查看方向锁定和媒体控制。\n\
  6.  再次向右滑动手指可查看音量控制和 AirPlay 按钮。\n\n按照以下步骤，从某个应用中访问快速应用程序切换器：\n\n![images](img/p51-01.jpg)\n\
  \n#### 音量键\n\n在 iPod touch 的左上侧（参见图 1-5），您可以看到一些简单的`音量增大/音量减小`键，它们用起来会非常方便。\n\n\
  ##### 调节播放音量或 iPod touch 语音音量\n\n您可以使用`音量`键来调高或调低 iPod touch 的音量，无论您是在听音乐、看视频、欣赏其他内容，还是在接听\
  \ FaceTime 通话。听音乐或看视频时，您也可以使用屏幕上的滑块条来调节音量（参见图 1-6）。\n\n![images](img/0106.jpg)\n\
  \n**图 1-6.** *在 iPod touch 上调节音量*\n\n**提示：** 当您在`相机`应用中时，`音量增大`按钮会变成相机快门，让您快速拍照。\n\
  \n#### 锁定屏幕为竖排（垂直）方向\n\n如果您将 iPod touch 侧向倾斜，您会注意到在某些应用中，屏幕会旋转至横排（横向）方向。您可能希望如此，以便使用更大的`横向`键盘进行输入。然而，有时当您将\
  \ iPod touch 侧放时，您可能不希望屏幕从竖排方向旋转。在这些情况下，您可以锁定屏幕为竖排方向。\n\n1.  双击`主屏幕`按钮。\n2.  从左向右滑动以查看媒体和屏幕锁定控制。\n\
  3.  轻点左侧图标中的`竖排方向锁定`按钮。\n4.  要解除锁定，请再次轻点同一个按钮。\n\n**提示：** 方向锁定功能是在床上阅读 iBooks 的好方法。如果您更喜欢竖排模式下更大的页面视图，请启用竖排方向锁定功能。这样，当您将\
  \ iPod touch 放在腿上或几乎水平手持时，屏幕就不会意外旋转到横排模式。更多信息，请查看第 12 章：“iBooks 与电子书。”\n\n#### 调整或禁用自动锁定超时功能\n\
  \n您会注意到，iPod touch 在闲置一小段时间后会自动锁定并进入休眠模式（即屏幕变黑）。您可以更改 iPod touch 进入休眠模式所需的时间，甚至可以在`设置`应用中完全禁用此功能。请按以下步骤操作：\n\
  \n1.  从`主屏幕`轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`自动锁定`。\n4.  您将在此页面上`自动锁定`选项旁边看到当前的休眠间隔设置。默认设置为\
  \ iPod touch 闲置三分钟后锁定（以节省电池电量）。您可以将此间隔设置为`1 分钟`、`2 分钟`、`3 分钟`、`4 分钟`、`5 分钟`或`永不`。\n\
  5.  轻点所需的设置以选择它——当其旁边出现勾选标记时，即表示已选中。\n6.  最后，轻点左上角的`通用`按钮返回`通用`屏幕。您现在应该会在`自动锁定`设置旁边看到您所做的更改。\n\
  \n**电池续航提示：** 将`自动锁定`功能设置为较短的间隔（例如`1 分钟`）将有助于节省电池电量。\n\n#### 调整日期、时间、时区和 24 小时制格式\n\
  \n通常情况下，日期和时间会在您将 iPod touch 连接到电脑时自动为您设置或调整；您可以在第 3 章：“与 iCloud、iPod touch 及更多设备同步”中了解更多信息。不过，您也可以非常轻松地手动调整日期和时间。当您带着\
  \ iPod touch 旅行并需要在降落后调整时区时，您可能需要进行此操作。请按以下步骤操作：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n\
  3.  向下滚动并轻点`日期与时间`以查看`日期与时间`设置屏幕。\n4.  如果您更希望看到`09:30`和`14:30`而不是`上午 9:30`和`下午 2:30`，则轻点`24\
  \ 小时制`选项，将其开关设置为`开`。\n\n    ![images](img/p53-01.jpg)\n\n5.  要手动设置日期和时间，您需要关闭自动时间设置功能。轻点`自动设置`旁边的开关，将此选项设置为`关`。\n\
  \n    ![images](img/p54-01.jpg)\n\n6.  要设置您的时区，请轻点`时区`并输入您所在时区中一个主要城市的名称。当您输入时，iPod\
  \ touch 会显示匹配的城市名称。\n\n    ![images](img/p54-02.jpg)\n\n7.  当您看到所在时区的正确城市时，轻点它以将其选中。在下方图片中，我们输入了“Chicago”的前几个字母，直到它出现。接着，我们轻点了`美国，芝加哥`以将其选中。\n\
  8.  选择城市后，您将返回到主`日期与时间`屏幕，您所选的城市会显示在`时区`选项旁边。\n9.  轻点`设置日期与时间`以调整您的日期和时间。\n\n  \
  \  ![images](img/p54-03.jpg)\n\n10. 在此屏幕上，您可以设置日期和时间。要调整日期，请轻点屏幕顶部显示的`日期`按钮。\n11.\
  \ 要调整时间，请轻点屏幕顶部显示的`时间`按钮。\n12. 然后，您可以通过向上或向下滑动`日期`和`时间`转轮来调整日期和时间，如下方图片所示。\n13.\
  \ 完成后，轻点左上角的`日期与时间`按钮。\n\n![images](img/p55-01.jpg)\n\n#### 调节亮度\n\n您的 iPod touch\
  \ 具有自动亮度控制功能；此功能默认为开启状态。此功能使用内置光线传感器来调节屏幕亮度。当室外较暗或处于夜晚时，自动亮度控制会调暗屏幕。当天气晴朗明亮时，屏幕会自动调亮，以便于阅读。通常，我们建议您将此功能保持为`开`状态。\n\
  \n如果您想调节亮度，请使用`设置`应用中的控制选项。请按以下步骤操作：\n\n1.  从`主屏幕`轻点`设置`图标。\n\n    ![images](img/p55-02.jpg)\n\
  \n2.  轻点`亮度`并移动滑块控件以调节亮度。\n3.  点击`自动亮度`旁边的开关以将其切换为`开`或`关`。\n\n![images](img/p55-02.jpg)\n\
  \n**提示：** 将`亮度`选项设置为较低的值将有助于节省电池电量。将滑块调至略低于一半的位置效果通常不错。\n\n\n\n##### 通知\n\n自 iOS\
  \ 5 起新增的`通知中心`引入了一种更出色、更低调、更少干扰的方式来整理和处理你在一天中收到的所有`FaceTime`、电子邮件、`iMessage`、`Twitter`、`Facebook`、日历及其他提醒消息。\n\
  \n通知可通过以下几种方式显示：\n\n- 以**锁定屏幕信息**的形式显示，这样你无需解锁`iPod touch`就能快速查看重要提醒。（不过，这个选项会牺牲一些隐私。）\n\
  - 以应用内通知的形式显示，每当收到新消息时，会以简短滚动的横幅出现在屏幕顶部。\n- 在`通知中心`下拉菜单中显示，当你的`iPod touch`解锁后，你可以随时随地从屏幕顶部向下滑动来访问它。\n\
  \n如果你以前用过`iPod touch`，或者在 iOS 5 之前使用过`iPad`或`iPod touch`，那么`通知中心`在原有的声音、数字标记和弹出式提醒基础上增加了新选项。由于这些提醒不会中断你的操作，因此不会打断你玩`《愤怒的小鸟》`或正在撰写的电子邮件，让你必须关闭或打开它们后才能继续游戏或写作。不过，你仍然可以选择处理那些绝对不想错过的内容，比如闹钟。\n\
  \n#### 锁定屏幕信息\n\n`锁定`屏幕上的通知以两种不同方式显示：作为包含最新单条通知的弹出窗口，以及作为所有近期通知的下拉列表。\n\n如果你的`iPod\
  \ touch`处于锁定状态时收到了一条通知，屏幕会亮起，该通知会出现在`锁定`屏幕中央的一个黑色方框中。同时，方框左侧会显示一个图标，代表与该类通知相关联的应用。例如，一封电子邮件会在左侧显示`邮件`应用图标；一条`iMessage`会显示`信息`图标；一个未接的`FaceTime`通话会显示`FaceTime`图标；一条`Facebook`通知会显示`Facebook`图标，以此类推。你可以从以下几种操作中选择：\n\
  \n- 忽略该通知。这会使你的提醒淡出，而你的`iPod touch`屏幕会重新进入休眠状态。\n- 抓住滑柄（位于时间和日期正下方的三条灰色横线）并向下拖动，即可看到自上次解锁`iPod\
  \ touch`以来收到的所有通知列表。列表会按照通知类型排序，因此所有电子邮件会被归为一组，所有日历事件、所有未接`FaceTime`通话等也会如此归纳。每条通知的左侧还会显示相应的图标。\n\
  \n![images](img/p57-01.jpg)\n\n**注意：** 如果你没有看到滑柄，那是因为你近期没有收到任何通知。\n\n- 在单条通知框或列表中，点击通知左侧的图标并`滑动以查看`（或收听）通知，就像你通常`滑动以解锁``iPod\
  \ touch`一样。在大多数情况下，你会被直接带到相应的应用，并显示完整的通知内容。例如，触摸`邮件`应用图标并滑动，将会解锁你的`iPod touch`，切换到`邮件`应用，并加载你刚刚收到的电子邮件。\n\
  \n![images](img/p57-02.jpg)\n\n**注意：** 少数通知——例如闹钟以及`iTunes`同步失败之类的系统消息——可能还会在通知左侧显示一个按钮，比如闹钟的`稍后提醒`或同步失败的`确定`。点击该按钮即可延迟或关闭通知。\n\
  \n**提示：** 如果你担心隐私问题，不喜欢任何人都能在你的`锁定`屏幕上看到你的个人电子邮件、短信及其他消息或提醒，那么你可以在`设置`应用中关闭它们（请参阅本章后面的“配置通知中心”部分）。\n\
  \n#### 应用内通知\n\n当你的`iPod touch`处于解锁状态且你正在使用时，新收到的通知会在屏幕顶部短暂动画显示，然后向下翻转以展示通知内容。无论你身处何处，从`主屏幕`到内置的`信息`应用，再到你最喜欢的视频游戏，都会发生这种情况。通知仅覆盖屏幕顶部几个像素，因此应该不会妨碍你正在做的事情（或正在玩的游戏）。对于应用内通知，你可以进行以下两种操作：\n\
  \n![images](img/p57-03.jpg)\n\n- 忽略它，它会翻转回去并消失。（别担心：你可以通过点击`通知中心`下拉菜单再次查看该通知，详见本章后续内容。）\n\
  - 点击该通知，你将被直接带到关联的应用查看完整消息。例如，它会带你到`邮件`应用阅读一封电子邮件，或到`信息`应用回复一条`iMessage`。\n\n######\
  \ 通知中心\n\n只要你的`iPod touch`处于解锁状态，你就可以从屏幕最顶部向下滑动，拉出`通知中心`选项。`通知中心`整合了数量非常有限的*小组件*（撰写本文时有两个）以及一个与你在`锁定`屏幕上看到的类似的通知列表。\n\
  \n要关闭`通知中心`，从屏幕底部向上滑动即可。\n\n目前可用的两个小组件是`天气`和`股票`：\n\n![images](img/p58-01.jpg)\n\
  \n- `天气`小组件会显示某个地区的当地天气（如果开启了基于位置的天气功能），或显示你在内置的`天气`应用中设置为第一个的城市天气（如果基于位置的天气功能关闭或不可用）。它还会显示当天的最高气温、最低气温和当前气温。点击小组件上的任意位置都会带你进入`天气`应用。\n\
  - `股票`小组件会显示你所关注股票的滚动条，包括其近期市值以及表示近期亏损或盈利的箭头。滚动条将包含你当前在内置的`股票`应用中设置的所有股票。点击小组件上的任意位置都会带你进入`股票`应用。\n\
  \n`通知中心`的列表可用于以下应用和服务：\n\n- `日历`\n- `提醒事项`\n- `信息`（`iMessage`）\n- `邮件`\n- `Game\
  \ Center`\n- 你安装的其他使用通知功能的应用或服务（例如，像`Twitter`这样的社交网络、像`CNN`这样的突发新闻应用，以及像`OmniFocus`这样的任务管理工具）\n\
  \n通知列表按应用划分，每个应用都有一个标题栏。标题栏的左侧是*应用图标*，后面跟着*应用名称*。在标题栏的右侧，你可以看到一个`X`图标。点击`X`图标即可清除该应用的所有通知。例如，点击`邮件`图标右侧的`X`会清除所有电子邮件通知；但这不会清除任何其他通知。\n\
  \n![images](img/p59-01.jpg)\n\n在标题下方，你会看到该应用所有当前（未读）的通知，以及收到通知的时间、发件人（如果适用）以及内容预览。例如，你可能会看到最近的`Facebook`消息或`Game\
  \ Center`挑战列表。点击列表中任意通知的任意位置，都会切换到关联的应用并向你显示完整消息。\n\n![images](img/p59-02.jpg)\n\
  \n\n\n#### 配置通知中心\n\n通过**设置**应用即可轻松配置通知中心：\n\n1.  在**主屏幕**上轻点**设置**应用图标。\n2.  轻点**通知**。\n\
  \n通知中心可以按**时间**（小组件在上，然后按最新通知的顺序）整理通知，也可以**手动**整理。按照以下步骤手动重新整理通知：\n\n![images](img/p59-03.jpg)\n\
  \n1.  在**排序应用**下，轻点**手动**。\n2.  在屏幕的右上角，轻点**编辑**按钮。\n3.  每个应用的右侧会出现三条灰色水平条纹形式的手柄。抓住手柄，向上或向下拖动应用，将它们按您最喜欢的顺序排列。\n\
  4.  当所有应用都按您想要的顺序排列好后，轻点屏幕右上角的蓝色**完成**按钮。\n\n![images](img/p60-01.jpg)\n\n要显示或隐藏**天气**或**股票**小组件，按需轻点任一小组件以将其切换为**开启**或**关闭**。\n\
  \n要选择通知列表的工作方式，请按以下步骤操作：\n\n1.  轻点要编辑的应用（例如**邮件**）。\n2.  将**通知中心**的开关切换到**关闭**，以将该应用从通知中心彻底移除。切换到**开启**则可将其恢复。\n\
  3.  选择在列表中**显示**您偏好的通知数量。在撰写本文时，可用选项仅限于**1 条未读项目**、**5 条未读项目**和**10 条未读项目**。\n4.\
  \  选择您偏好的应用内通知**提醒样式**。\n   - **无**意味着您永远不会看到提醒。\n   - **横幅**意味着您将在屏幕顶部收到不会打扰您的细微动画通知。此选项让您可以在需要时忽略该通知，这对于大多数通讯类通知（如电子邮件、iMessage、Facebook\
  \ 等）非常有用。\n   - **提示**意味着您将收到一个无法忽略的弹出窗口。您必须手动关闭它或立即对其进行操作。这对于闹钟、约会和其他紧急事项非常有用。\n\
  \n您还可以设置与通知相关的其他几个选项：\n\n- **标记应用图标**：此选项会在**主屏幕**图标的右上角添加一个小红圈。这个红圈表示每个应用包含的未读通知数量。例如，**邮件**图标上的数字\
  \ 10 表示您有 10 封未读电子邮件在等着您。如果您不希望看到它们，可以关闭此功能；如果您希望显示它们，则开启此功能。\n\n  ![images](img/p61-01.jpg)\n\
  \n- **声音**：此选项让您可以打开或关闭新通知的音频提醒。如果通知是紧急的，比如 iMessage，您可能希望让声音保持**开启**状态。\n- **显示预览**：此选项会显示通知相关消息的前几行，以便您一目了然地了解其主旨。此功能使您无需滑动进入应用就能查看通知内容，从而阅读完整信息。如果更注重隐私，您可能希望将此功能切换为**关闭**。\n\
  - **在锁定屏幕上显示**：此选项允许您从**锁定**屏幕打开或关闭通知。同样，如果隐私是个问题，您可能希望将此功能切换为**关闭**。\n\n**注意：**\
  \ 并非所有应用在通知中心中都有相同的选项。例如，有些应用可能提供声音提醒，而有些则没有。\n\n当您关闭某个特定应用的通知后，它会被放入**设置**中一个名为*不在通知中心*的单独列表。这可以让您轻松查看哪些应用正在（以及哪些没有）向您发送通知。\n\
  \n#### 通知中心的辅助功能选项\n\nApple 为有特殊视觉或听觉需求的人提供了各种辅助功能选项，包括自定义振动和 LED 闪烁以示提醒。\n\n请按以下步骤为通知启用辅助功能选项：\n\
  \n1.  轻点**设置**图标。\n2.  轻点**通用**。\n3.  轻点页面底部附近的**辅助功能**。\n4.  将**自定义振动**切换为**开启**，以便为您的联系人分配独特的振动模式（可在**声音偏好设置**中创建模式）。\n\
  5.  将**LED 闪烁以示提醒**切换为**开启**，以便在有通知进入时让摄像头闪光灯闪烁。\n\n![images](img/p62-01.jpg)\n\n"
- "# 第 2 章\n\n## 输入、拷贝与搜索\n\n在本章中，我们将向您展示在 iPod touch 上输入的一些好方法，并在此过程中为您节省宝贵的时间。同时，我们还将向您展示如何使用**竖屏**（垂直/较小）和**横屏**（水平/较大）键盘。我们还将教您如何选择不同的语言键盘、如何输入符号以及其他技巧。\n\
  \n在本章稍后部分，我们将为您介绍 Spotlight 搜索以及拷贝和粘贴功能。拷贝和粘贴功能将为您节省大量时间，并提高您使用 iPod touch 时的准确性。\n\
  \n### 在 iPod touch 上输入\n\n您会很快在 iPod touch 上找到两个屏幕键盘：当您垂直握住 iPod touch 时可见的较小**竖屏**键盘，以及当您水平握住\
  \ iPod touch 时可见的较大**横屏**键盘。好处是您可以选择最适合您的键盘。\n\n#### 用两个拇指在屏幕上输入\n\n您会发现刚开始使用 iPod\
  \ touch 时，最容易用一根手指（通常是食指）输入，同时用另一只手握住 iPod touch。\n\n过一小段时间，您应该能够尝试用拇指输入。稍加练习后，用两个拇指代替一根手指输入将真正提高您的速度。请耐心一点：要熟练地用两个拇指快速输入确实需要练习。\n\
  \n![images](img/p64-01.jpg)\n\n其实过一会儿您会注意到，键盘的触摸灵敏度是假设您在用两个拇指输入。这意味着键盘左侧的字母应该按在它们的左侧，而右侧的键应该按在它们的右侧。\n\
  \n在许多应用中，只需将 iPod touch 侧向旋转，键盘就会切换为更大的**横屏**键盘，这使得输入更加容易。\n\n![images](img/p64-02.jpg)\n\
  \n**提示：** 如果您手比较大，觉得在较小的竖屏键盘上输入有困难，那么请将您的 iPod touch 侧向翻转，以获得更大的**横屏**键盘。\n\n####\
  \ 使用快捷短语快速输入\n\niPod touch 上一个不错的功能是能够为输入常用短语甚至几个句子（如前往您家或公司的路线）设置快捷方式。\n\n**提示：**\
  \ 在 iPod touch 上输入常用短语时，使用快捷方式可以节省时间。您甚至可以使用快捷方式输入几个句子，例如前往您家的步骤或您经常输入的内容。\n\n在设置应用中访问快捷方式。轻点**设置**图标，然后依次轻点**通用**、**键盘**，并滑动到屏幕底部以查看可用的**快捷方式**。\n\
  \nApple 为您提供了一个“omw”的示例快捷方式。当您在 iPod touch 上输入 omw 时，您会看到弹出窗口显示短语“On my way！”（我正在路上！）。\n\
  \n![images](img/p65-01.jpg)\n\n轻点**添加新快捷方式**以创建一个新的。\n\n![images](img/p65-02.jpg)\n\
  \n输入将替换快捷方式的**短语**，然后输入**快捷方式**本身。在此示例中，我们想要一个输入前往我家方向的快捷方式。所以我们的**快捷方式**是“dirh”，而**短语**是前往我家的逐步路线。保存您的新快捷方式并尝试一下。\n\
  \n![images](img/p65-03.jpg)\n\n\n\n#### 利用自动更正节省时间\n\n当你打字一段时间后，会开始注意到某些单词正下方会出现一个小弹出窗口——这个功能叫做*自动更正*。你定义的任何`快捷指令`也会以弹出建议的形式出现。\n\
  \n**注意：** 如果你从未见过`自动更正`弹出窗口，则需要前往`设置`应用 > `通用` > `键盘`，然后将`自动更正`设为`开启`来启用该功能。\n\n\
  ![images](img/p66-01.jpg)\n\n当你看到系统猜出了正确的单词时，只需按下键盘底部的`空格键`即可节省时间；这样做会选中该单词。\n\n\
  在下一个例子中，我们开始输入单词“especially”；当输入到单词中的“c”时，正确的单词会出现在下方的弹出窗口中。要选中它，我们只需按下底部的`空格键`（请参见图\
  \ 2–1）。\n\n![images](img/0201.jpg)\n\n**图 2–1.** *使用自动更正和建议词汇*\n\n你的第一反应可能是点击弹出的单词，但这反而会从屏幕上擦除建议的单词。更高效的做法是继续打字，或者在看到正确的单词弹出时按下`空格键`。在大多数情况下，当你继续打字时，单词要么已经正确，要么会变得正确——长远来看，这意味着手指移动更少。\n\
  \n**提示：** 自动更正功能还会检索你的`通讯录`列表来提供建议。例如，如果`通讯录`中有“Martin Trautschold”，那么在输入“Trauts”后，你就会看到“Trautschold”作为自动更正建议出现。\n\
  \n学会使用`空格键`后，你会发现这种弹出式猜测功能相当省时。毕竟，你本来就需要在单词末尾输入一个空格。\n\n有时你可能会意外接受一个错误的自动更正单词；在这种情况下，你只需按`退格键`。![images](img/p67-01.jpg)\
  \ 这样做会弹出一个窗口，其中包含自动更正功能修改之前的原始单词。你还会看到其他建议的替换词（请参见图 2–2）。\n\n![images](img/0202.jpg)\n\
  \n**图 2–2.** *处理不正确的自动更正词汇*\n\n**提示：** 使用自动更正，你可以避免在许多常见缩约词中键入撇号，例如“wont”和“cant”，从而节省时间。自动更正会显示一个包含正确拼写缩约词的小弹出窗口；你只需按下`空格键`即可选中高亮的更正项。\n\
  \n对于某些单词，你需要多输入一个字符，自动更正功能才能识别出你的意图：\n\n*   输入“Weree”得到“We're”。\n*   输入“Welll”得到“We'll”。\n\
  \n![images](img/p68-01.jpg)\n\n#### 听取自动更正词汇\n\n你可以将 iPod touch 设置为在自动文本和自动更正词汇出现时朗读它们。这或许有助于你选择正确的单词。请按照以下步骤启用此朗读功能：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`辅助功能`（需要向下滑动）。\n4.  将`朗读自动文本`旁边的开关设为`开启`。\n\
  \n启用此功能后，你在打字时，就会听到弹出的自动更正词汇被朗读出来。如果你同意听到的单词，按下`空格键`接受它；否则，继续打字。这可以节省你从键盘上抬起头来查看的时间。\n\
  \n#### 拼写检查\n\n与自动更正功能协同工作的是你 iPod touch 内置的拼写检查器。大多数情况下，你拼错的单词会被自动更正功能捕获并自动纠正。其他时候，一个单词可能不会被纠正，但它仍然是拼错的。你会看到\
  \ iPod touch 认为拼写错误的单词下方划有红色虚线，如图 2–3 所示。\n\n![images](img/0203.jpg)\n\n**图 2–3.**\
  \ *使用内置的拼写检查功能*\n\n**提示：** 如果你的拼写检查器中积累了太多错误的单词，你可以通过清除所有自定词来让其重新开始。请按照以下步骤操作：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击靠近底部的`还原`。\n4.  点击`还原键盘词典`。\n5.  点击`还原词典`确认。\n\
  \n执行上述步骤将清除已添加到 iPod touch 词典中的所有自定词。\n\n### 辅助功能选项\n\niPod touch 上有多项实用的辅助功能。例如，“旁白”选项会读出屏幕上显示的各种内容。它会告诉你点击了哪些元素、选择了哪些按钮以及所有可用的选项。它还会朗读整个屏幕的文本。如果你希望看到更大的内容，也可以打开“缩放”选项，如本章后面的“使用缩放放大整个屏幕”部分所述。\n\
  \n#### 让 iPod touch 与你对话（旁白）\n\n“旁白”选项是 iPod touch 一个很酷的功能。开启此功能后，iPod touch 会读出屏幕上显示的任何内容。你甚至可以让它为你朗读任何电子邮件、文本文档，甚至是`iBook`页面。\n\
  \n**提示：** 当`旁白`选项设为`开启`且在公共场所时，请使用耳机；这有助于你更清晰地听到朗读内容，同时避免打扰他人。\n\n请按以下步骤启用“旁白”功能：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`辅助功能`。\n4.  点击`旁白`。\n5.  将`旁白`开关设为`开启`。\n\
  \n**注意：** 如右侧屏幕所示，“旁白”手势与普通手势不同。点击`练习旁白手势`按钮来熟悉它们。\n\n![images](img/p70-01.jpg)\n\
  \n以下是使用“旁白”功能的一些额外提示：\n\n*   向下滚动`旁白`屏幕以查看更多设置。\n*   通过更改`朗读提示`选项的设置，来调整是否朗读提示。\n\
  *   当你使用旁白功能打字时，默认情况下会朗读你输入的每个字符。你可以通过点击`键入反馈`来更改此设置。在下一个屏幕上，你可以将此选项设为`字符`、`单词`、`字符和单词`或`无`。\n\
  *   通过滑动此选项下方的滑块来调整`朗读速率`。\n*   通过设置开关来调整是否使用`语音`和`音高变化`。\n\n![images](img/p70-02.jpg)\n\
  \n要让系统在`备忘录`或`iBooks`应用中为你朗读整个页面，你需要同时点击屏幕上文本块的上部和下部。如果你用一个手指点击文本，只会朗读单行内容。\n\n\
  #### 朗读所选内容和朗读自动文本\n\n`朗读所选内容`功能类似于`旁白`，但它与“拷贝和粘贴”功能相结合，在选定文本的弹出菜单中添加了一个`朗读`选项。“朗读自动文本”功能会朗读出由拼写词典自动大写或更正的任何文本。\n\
  \n使用`朗读所选内容`功能时，你可以使用与`旁白`功能同类型的滑块来调整朗读速率。`朗读自动文本`选项只能设为`开启`或`关闭`。\n\n![images](img/p71-01.jpg)\n\
  \n\n\n#### 使用 AssistiveTouch\n\n如果你在触摸屏幕时有困难，或者有特殊的辅助配件来帮助你操作触摸屏，你会想要开启 `AssistiveTouch`。你可以在\
  \ `设置` 中的同一个 `辅助功能` 部分进行此操作。\n\n开启后，你会在屏幕右下角看到一个小白圈。轻点这个小圆圈即可调出 `AssistiveTouch`\
  \ 菜单。\n\n![images](img/p71-02.jpg)\n\n`AssistiveTouch` 允许你执行以下操作：\n\n- 轻点 `手势`，可模拟\
  \ 2、3、4 或 5 指手势。\n- 轻点 `个人收藏`，可访问你的自定义手势。\n- 轻点 `设备`，可访问常用设备命令，如屏幕旋转、静音、音量、摇晃和锁定屏幕。\n\
  - 轻点 `主屏幕` 图标，可模拟实际点击 `主屏幕` 按钮。\n\n![images](img/p72-01.jpg)\n\n你甚至可以设置自定义手势，以便从\
  \ `个人收藏` 菜单中访问。\n\n轻点 `创建新手势`，然后使用手指在屏幕上移动，制作一个屏幕手势。你会看到白色线条跟随指尖的位置移动。\n\n然后，轻点\
  \ `停止` 按钮。\n\n按下 `播放` 来检查手势是否正确，最后轻点顶部的 `存储` 并为你新创建的手势命名。\n\n之后，你就会在 `AssistiveTouch`\
  \ 的 `个人收藏` 菜单中看到这个新手势。\n\n![images](img/p72-02.jpg)\n\n#### 使用缩放来放大整个屏幕\n\n如果你觉得屏幕上的文本、图标、按钮或其他任何内容有点难以看清，你可能会想开启\
  \ `缩放` 功能。开启 `缩放` 功能后，你可以将整个屏幕放大至几乎正常大小的两倍——所有内容都更容易阅读了。\n\n**注意：** 你不能同时使用 `旁白`\
  \ 和 `缩放`；你需要选择其中一个。除了放大整个屏幕，你还可以使用 `大文本` 功能，只为你的主要应用增加字体大小。我们将在“使用更大的文本字号以便于阅读”部分向你展示操作方法。\n\
  \n请按照以下步骤启用 `缩放` 功能：\n\n1. 轻点 `设置` 图标。\n2. 轻点 `通用`。\n3. 轻点页面底部的 `辅助功能`。\n4. 轻点 `缩放`。\n\
  5. 将 `缩放` 旁边的开关设为 `开启`。\n\n与 `旁白` 类似，`缩放` 也使用三指手势。在离开此屏幕前，请务必熟悉这些手势。\n\n![images](img/p73-01.jpg)\n\
  \n#### 白底黑字\n\n如果你觉得屏幕上的对比度和颜色难以看清，你可能会想将 `白底黑字` 设置设为 `开启`。请按照以下步骤操作：\n\n1. 如前所述，前往\
  \ `设置` 应用中的 `辅助功能` 屏幕。\n2. 将 `白底黑字` 开关设为 `开启`。启用此选项后，屏幕上所有浅色内容将变为黑色，所有深色或黑色内容将变为白色。\n\
  \n##### 使用更大的文本字号以便于阅读\n\n你可以通过使用 `大文本` 功能，在 `通讯录`、`邮件`、`信息` 和 `备忘录` 应用中大幅扩展字体大小。请按照以下步骤操作：\n\
  \n1. 轻点 `设置` 图标。\n2. 轻点 `通用`。\n3. 轻点页面底部（需要向下滑动）的 `辅助功能`。\n4. 轻点 `大文本`。之后你会看到一个包含字体大小选项的屏幕：`关闭`、`20pt\
  \ 文本`、`24pt 文本`、`32pt 文本`、`40pt 文本`、`48pt 文本` 和 `56pt 文本`。轻点你想要使用的大小。右侧显示的图像使用了\
  \ `48pt` 字体。\n5. 轻点左上角的 `辅助功能` 按钮返回上一屏幕，然后轻点 `主屏幕` 按钮退出 `设置`。\n\n![images](img/p74-01.jpg)\n\
  \n#### 主屏幕按钮三次点按选项\n\n你可以设置三次点按 `主屏幕` 按钮来执行各种与辅助功能相关的操作。请按照以下步骤调整这些选项：\n\n1. 如前所述，前往\
  \ `设置` 应用中的 `辅助功能` 屏幕。\n2. 轻点页面底部的 `三次点按主屏幕按钮`。\n3. 从 `关闭`、`切换旁白`、`切换白底黑字` 或 `询问`\
  \ 中进行选择。\n\n### 使用放大镜编辑文本或放置光标\n\n有多少次你在打字时，想要将光标精确地放在两个单词或两个字母之间？\n\n在掌握 `放大镜`\
  \ 技巧之前，这可能很难做到。你的做法是：在你想要放置光标的位置长按手指（参见 图 2–4）。一两秒后，你会看到 `放大镜` 图标出现。然后，在手指按住屏幕的同时，滑动屏幕来定位光标。松开手指时，你会看到\
  \ `拷贝和粘贴` 弹出菜单，但你可以忽略它。\n\n![images](img/0204.jpg)\n\n**图 2–4.** *长按屏幕以查看 `放大镜`\
  \ 图标并放置光标。*\n\n### 输入数字和符号\n\n如何使用 iPod touch 的屏幕键盘输入数字或符号？当你在打字时，轻点左下角的 `123` 键即可查看数字和常用符号，例如\
  \ `$ ! ~ & = # . _ - +`。如果你需要更多符号，请从 `数字` 键盘轻点左下角 `ABC` 键上方的 `#+=` 键（参见 图 2–5）。\n\
  \n![images](img/0205.jpg)\n\n**图 2–5.** *在 `字母`、`数字` 和 `符号` 键盘之间切换*\n\n**提示：** 在输入一个数字或符号后，请注意\
  \ `数字` 键盘会保持激活状态，直到你按下 `空格键` 或按下另一个键盘的键（例如用于 `字母` 键盘的 `ABC` 键）。\n\n#### 触摸并滑动技巧\n\
  \n一个可以应用于多种场景的酷炫技巧是触摸并滑动技巧。我们将在接下来的几节中介绍这是什么以及如何利用它。\n\n##### 输入大写字母\n\n要输入大写字母，通常你需要按下\
  \ `Shift` 键，然后再按下所需的字母。\n\n更快地输入单个大写字母以及需要 `Shift` 键的符号的方法是：按下 `Shift` 键，手指保持在键盘上，滑动到你想要的键上，然后松开。\n\
  \n例如，要输入大写字母“D”，请按下右侧的 `Shift` 键，然后滑动到 `D` 键上并松开。\n\n![images](img/p77-01.jpg)\n\
  \n##### 快速输入单个数字\n\n如果你只需要输入一个数字，那么按下 `123` 键并将手指向上滑动到该数字上即可。但是，如果要连续输入多个数字，最好是按下\
  \ `123` 键，松开手指，然后再逐个按下每个数字。\n\n\n\n\n##### 长按键盘快捷输入符号及其他功能\n\n你可能想知道如何输入键盘上未显示的符号。\n\
  \n**提示：** 你可以输入比屏幕上显示的更多的符号。\n\n你只需要长按与所需符号相关的字母、数字或符号即可。\n\n例如，如果你想输入日元符号（`¥`），请长按`$`键，直到看到其他选项。接着，向上滑动手指以高亮选中日元符号，然后松开手指。\n\
  \n![images](img/p78-01.jpg)\n\n此技巧同样适用于`Safari`浏览器中的`.com`键，以及在输入电子邮件地址时长按`Period`（`.`）键。通过长按`.com`或`Period`键，你还可以获得其他网站后缀。\n\
  \n![images](img/p78-02.jpg)\n\n上图显示了`.co`、`.uk`、`.ie`、`.de`、`.ca`和`.eu`键。这些键在标准美式键盘上并不显示，但在此处出现是因为我们安装了额外的国际键盘。你将在本章稍后的“用其他语言输入——国际键盘”部分学习如何启用国际键盘。\n\
  \n**提示：更多实用但隐藏的符号**\n\n在`Symbols`键盘上，`Backspace`键的正上方有一个很好的项目符号字符。你还可以通过长按`Zero`键（`0`）获得度数符号。此外，长按`?`和`!`键可以获取对应的西班牙语倒置符号。\n\
  \n##### 大写锁定\n\n双击`Shift`键即可开启大写锁定功能。当`Shift`键变为蓝色时，表示该功能已开启。![images](img/p79-01.jpg)\n\
  \n要关闭大写锁定，只需再次按下`Shift`键![images](img/p79-02.jpg)即可。\n\n### 快速选择、删除或更改文本\n\n你可能需要快速更改或删除正在输入的文本。请按照以下步骤操作：\n\
  \n1.  通过双击选中要更改或删除的部分文本。\n\n    ![images](img/p79-03.jpg)\n\n2.  拖动蓝色手柄调整选区。\n\n\
  \    ![images](img/p79-04.jpg)\n\n3.  要删除选中的文本，请按下`Backspace`键。\n\n    ![images](img/p79-05.jpg)\n\
  \n4.  要替换文本，只需开始输入。输入的字母将立即替换选中的文本。\n\n    ![images](img/p79-06.jpg)\n\n### 键盘选项与设置\n\
  \n有一些键盘选项可以让你的`iPod touch`输入更便捷。这些键盘选项位于`Settings`应用的`General`标签中。请按照以下步骤访问：\n\n\
  1.  点击`Settings`图标。\n2.  点击`General`。\n3.  向上滑动，然后点击页面底部的`Keyboard`。\n\n![images](img/p80-01.jpg)\n\
  \n#### 将自动更正设置为“开”或“关”\n\n如前所述，自动更正功能将使用`iPod touch`的内置词典自动修正常见的拼写错误。如果你希望此功能生效，需要确保其设置为`ON`（这是默认设置）。\n\
  \n#### 自动大写\n\n当你开始一个新句子时，如果`Auto-Capitalization`选项设置为`ON`，单词将自动大写。\n\n此功能也会正确大写常见的专有名词。例如，如果你输入“`New\
  \ york`”，系统会提示你将其改为“`New York`”——同样，只需按`Space`键即可应用更正。如果你退格删除一个大写字母，`iPod touch`会假定你输入的新字母也应大写。此功能默认也设置为`ON`。\n\
  \n![images](img/p80-02.jpg)\n\n#### 启用大写锁定\n\n有时你可能只想输入大写字母：只需双击`Caps`键即可。\n\n此功能默认为`OFF`。\n\
  \n#### “.”快捷键\n\n如果你双击`Space`键，它会自动在句末添加句点；此功能默认为`ON`。\n\n### 用其他语言输入——国际键盘\n\n\
  在撰写本文时，`iPod touch`支持你输入超过十种不同语言，从荷兰语到西班牙语应有尽有。一些亚洲语言，如日语和中文，提供了两种或三种键盘以适应不同的输入方法。\n\
  \n#### 添加新的国际键盘\n\n请按照以下步骤启用各种语言键盘：\n\n1.  点击`Settings`图标。\n2.  点击`General`。\n3.\
  \  点击页面底部的`Keyboard`。\n4.  点击`International Keyboards`。\n5.  点击`Add New Keyboard`。\n\
  6.  点击列表中任意键盘或语言以添加。你现在会看到该键盘出现在可用键盘列表中。\n7.  在`Symbols`键盘上，`Backspace`键的正上方有一个很好的项目符号字符。你还可以通过长按`Zero`键（`0`）获得度数符号。此外，长按`?`和`!`键可以获取对应的西班牙语倒置符号。\n\
  \n**提示：** `iOS 5`包含一个内置的`Emoji`键盘。`Emoji`是一个包含大量日本符号的集合，包括各种笑脸和哭脸、节日图片、建筑和车辆等等。虽然这些符号在日本有更具体的含义，但世界各地的人们已开始在短信、推特和其他在线消息服务中使用它们。\n\
  \n`Emoji`键盘可以像其他任何键盘一样在“设置”中添加。\n\n![images](img/p82-01.jpg)\n\n#### 编辑、重新排序或删除键盘\n\
  \n你可能希望调整键盘的选项、更改键盘在列表中的显示顺序，或直接删除不再使用的键盘。请按照以下步骤操作：\n\n1.  按照本章前面“添加新的国际键盘”部分中的步骤\
  \ 1-4 操作；这将让你查看国际键盘列表。\n2.  要调整特定键盘的选项，请在键盘列表中点击它。在我们的示例中，我们点击了`French (Canada)`。\n\
  3.  通过点击相应部分中的选项更改`Software Keyboard Layout`。\n4.  通过点击相应部分中的选项调整`Hardware Keyboard\
  \ Layout`。\n5.  点击左上角的`Keyboards`按钮以保存选择并返回键盘列表。\n\n    ![images](img/p83-01.jpg)\n\
  \n6.  要重新排序或删除键盘，请点击右上角的`Edit`按钮。\n7.  要更改键盘顺序，请触摸并拖动键盘右侧带有三条灰色横线的边缘向上或向下。\n8. \
  \ 要删除键盘，请点击`Red Minus Sign`使其摆动到垂直位置，然后点击`Delete`。\n9.  要结束键盘编辑，请点击右上角的`Done`按钮。\n\
  \n![images](img/p83-02.jpg)\n\n当你安装了至少一个国际键盘后，你会注意到出现了一个小小的`Globe`键。按下`Globe`键可以在所有语言之间循环切换。\n\
  \n**提示：** 你可以长按`Globe`键查看可用键盘列表。这使你能快速选择想要使用的键盘。如果\n\n![images](img/p84-01.jpg)\n\
  \n日语、中文和其他一些语言提供了多种键盘选项以满足你的输入偏好。\n\n在某些语言（如日语）中，你会看到输入的字母变为字符，或者你可以自己手绘字符。你也可能在键盘上方看到一排其他字符组合。当你看到需要的组合时，点击它即可。\n\
  \n\n\n### 复制与粘贴\n\n复制与粘贴功能非常实用，既能节省时间，又能提高打字准确度。你可以利用此功能从电子邮件（如会议详情）中提取文字，然后粘贴到日历中。或者，你可能只需将表单中某处的电子邮件地址复制到另一处，省去重新打字的时间。（我们在第\
  \ 4 章：“其他同步方式”的“设置 Exchange/Google 账户”一节中介绍了这项技巧。）复制与粘贴的用途非常广泛；你越熟悉它，就越会频繁使用它。你甚至可以从你的\
  \ `Safari` 网页浏览器中复制文字或图像，然后粘贴到 `Notes` 或 `Mail` 信息中。\n\n#### 通过双击选择文字\n\n如果你正在阅读或输入文字，可以双击它以开始选择部分文字进行复制。这在\
  \ `Mail`、`Messages` 和 `Notes` 应用中效果很好。\n\n你会看到一个带有蓝色圆点（手柄）的方框，位于对角位置。\n\n![images](img/p84-02.jpg)\n\
  \n只需拖动手柄即可选中你想要高亮显示并复制的文字。\n\n![images](img/p85-01.jpg)\n\n**提示：** 如果你想选择所有文字，请点击光标，或双击文字上方或下方的屏幕。这将显示一个弹出窗口，其中包含\
  \ `Select` 和 `Select All` 选项。点击 `Select` 选择单个单词，或点击 `Select All` 高亮显示所有文字。\n\n![images](img/p85-02.jpg)\n\
  \n#### 通过双指触摸选择文字\n\n另一种选择文字的方法是同时用两根手指触摸屏幕。如果你用一只手握住 iPod touch，用另一只手的大拇指和食指触摸屏幕，效果最佳。你也可以将\
  \ iPod touch 放在桌子上，用双手的各一根手指触摸屏幕。请按照以下步骤使用此方法：\n\n1.  在你想要选择的文字的起始和结束位置同时触摸屏幕。如果第一次触摸时未能精确选中，不必担心。\n\
  2.  双指触摸后，使用蓝色手柄拖动选择区域的起始和结束位置，直至正确位置。\n\n#### 通过触摸并长按选择网站或其他不可编辑的文字\n\n在 `Safari`\
  \ 网页浏览器以及其他无法编辑文字的地方，用你的手指按住某些文字，该段落会被高亮显示，并在每个角落出现手柄。\n\n接下来，如果你想选择更多文字，请拖动手柄。\n\
  \n![images](img/p86-01.jpg)\n\n**注：** 如果拖动范围小于一个段落，选择器将切换到精细文字模式，并在选择区域两端提供蓝色手柄，以便你精确选取所需的字符或单词。如果拖动手指超过一个段落，则会进入粗略文字选择模式，你可以向上或向下拖动以选择整块文字和图形。\n\
  \n![images](img/p86-01.jpg)\n\n#### 剪切或复制文字\n\n一旦你高亮显示了想要复制的文字，只需触摸屏幕顶部的 `Copy`\
  \ 标签即可。该标签会变成蓝色，表示文字已存入剪贴板。\n\n**注：** 如果你之前剪切或复制过文字，那么你还会看到 `Paste` 选项，如右侧所示。\n\n\
  ![images](img/p86-02.jpg)\n\n#### 应用切换与多任务处理\n\n复制文字后，你可能想将其粘贴到另一个应用中。例如，你可能想从 Safari\
  \ 复制一些文字，然后粘贴到 Notes 或 Mail 信息中。在应用之间切换的最简单方法是使用 `App Switcher` 应用。请按照以下步骤将文字从一个应用粘贴到另一个应用：\n\
  \n1.  复制或剪切你的文字。\n2.  双击 `Home` 按钮，调出屏幕底部的 `App Switcher` 应用。\n3.  如果你刚刚让一个应用在后台运行，你可以在\
  \ App Switcher 栏中找到它。\n4.  向右或向左滑动找到你想要的应用，然后点击它。\n5.  如果你在 App Switcher 栏中没有看到想要的应用，则点击\
  \ `Home` 按钮，然后从 `Home` 屏幕启动它。\n6.  现在，通过长按屏幕，然后从弹出窗口中选择 `Paste` 来粘贴文字。\n7.  再次双击\
  \ `Home` 按钮，点击你刚刚离开的应用即可跳转回去。\n\n#### 粘贴文字\n\n将文字粘贴到同一个应用中是很容易的。例如，只需按照以下步骤将文字粘贴到同一个\
  \ `Notes` 或 `Mail` 信息中：\n\n1.  用你的手指将光标移动到你想要粘贴文字的位置。记住我们在本章前面展示的 `Magnifying Glass`\
  \ 技巧；这可以帮助你定位光标。\n2.  一旦你松开屏幕，你应该会看到一个弹出窗口，询问你是要 `Select`、`Select All` 还是 `Paste`。\n\
  3.  如果你没有看到这个弹出窗口，就双击屏幕。\n4.  选择 `Paste` 来粘贴你的选择内容。\n\n#### 摇动以撤销\n\niPod touch\
  \ 的一大特色功能是能够撤销键入、复制和粘贴操作。\n\n你只需在粘贴后摇动 iPod touch。一个新的弹出窗口将会出现，让你可以选择撤销刚才的操作。\n\n\
  点击 `Undo Typing` 或 `Undo Paste` 来纠正错误。\n\n![images](img/p88-01.jpg)\n\n**提示：快速删除文字**\n\
  \n如果你曾想只通过一两次点击就快速删除多行文字、一个段落、甚至是你刚刚输入的所有文字，那么这个技巧就是为你准备的。首先，使用前面描述的技术选中你想要删除的文字。接下来，只需按下键盘左下角的\
  \ `Delete` 键 ![images](img/p88-02.jpg)，即可删除所有选中的文字。\n\n### 使用 Spotlight 搜索查找内容\n\
  \nSpotlight 搜索是 iPod touch 上一个很棒的功能，可帮助你查找信息。这是苹果公司特有的一种搜索方法，用于在你的 iPod touch 上进行全局搜索。你可以使用此功能搜索姓名、事件或主题。\n\
  \n这个概念很简单。假设你正在寻找与 Martin 相关的内容。你不记得它是电子邮件、`Notes` 中的文档，还是日历事件；但你知道它和 Martin 有关。\n\
  \n这正是使用 Spotlight 搜索功能在你的 iPod touch 上查找所有与 Martin 相关内容的最佳时机。\n\n#### 激活 Spotlight\
  \ 搜索\n\n首先，你需要调出 `Spotlight Search` 页面，它位于 `Home` 屏幕第一页的左侧。\n\n![images](img/p89-01.jpg)\n\
  \n在第一个圆圈（表示 `Home` 屏幕的第一页）的左侧，你可以看到一个非常小的 `Magnifying Glass` 图标。\n\n![images](img/p89-02.jpg)\n\
  \n在第一页图标上从左向右滑动手指，即可看到 `Spotlight Search` 页面。你也可以从你的第一屏图标按下 Home 按钮来看到同一个搜索页面。\n\
  \n请按照以下步骤使用此功能进行搜索：\n\n1.  在 `Spotlight Search` 页面上，输入一个或多个单词作为搜索参数。\n2.  点击右下角的\
  \ `Search` 按钮执行搜索。\n\n    **提示：** 如果你在找一个人，请输入他的全名，以便更精确地找到仅来自该人的项目（例如，“Martin Trautschold”）。这将排除你\
  \ iPod touch 中可能存在的其他 Martin，使你能够找到仅与 Martin Trautschold 相关的项目。\n\n3.  在搜索结果中，你将看到搜索找到的所有电子邮件、约会、会议邀请和联系信息。向下滑动可查看更多结果。\n\
  4.  点击列表中的某个结果以查看其内容。\n\n你的搜索结果会一直保留，直到你清除它们。这意味着你可以返回 `Spotlight Search` 页面，只需从你的\
  \ `Home` 屏幕向右滑动，即可查看你之前的搜索结果。\n\n要清除 `Search` 字段，只需触摸搜索栏中的 `X`。要退出 `Spotlight Search`\
  \ 页面，只需按下 `Home` 键或向左滑动。\n\n\n\n#### 搜索网页或维基百科\n\n执行`Spotlight 搜索`后，你会在搜索结果下方看到两个选项：`搜索网页`和`搜索维基百科`。点击其中任一选项即可在网页或维基百科中执行搜索。\n\
  \n#### 自定义 Spotlight 搜索\n\n你可以通过从搜索中移除某些应用或数据类型来自定义`Spotlight 搜索`。你甚至可以更改每种数据类型的搜索顺序。如果你只想搜索`通讯录`和`邮件`——而不想搜索其他内容，这项功能会非常有用。或者，如果你知道自己总是想先搜索`邮件`，然后是`日历`，最后是`音乐`——你可以按正确顺序设置这些项目。请按以下步骤操作：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击`Spotlight 搜索`。\n4.  要更改项目的搜索顺序，请按住并上下拖动带有三条灰色横线的项目右边缘。\n\
  5.  要从搜索中移除特定项目，请点击它以移除其旁边的`勾号`图标。未被勾选的项目将不会被`Spotlight 搜索`搜索到。\n6.  点击左上角的`通用`按钮返回`设置`应用。\n\
  \n![图片](img/p90-01.jpg)\n\n"
- "# 第 3 章\n\n## 通过 iCloud、iTunes 等方式同步\n\n在本章中，我们将向您展示如何设置或调整存储空间，并将您的信息推送至 Apple\
  \ 新的 iCloud 服务，以及如何使用 iTunes 在您的 iPod touch 与 Windows 或 Mac 电脑之间同步信息。\n\n借助 iCloud，您可以无线同步您的邮件、通讯录、日历、提醒事项、书签、备忘录、照片以及文稿与数据，还可以无线（OTA）备份您的\
  \ iPod touch。借助 iTunes，您可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、iBooks、文稿和照片库，还可以备份您的 iPod touch。\n\
  \n而且，由于没有任何东西能永远完美运行，我们还会向您展示几个简单的故障排除技巧。最后，我们将向您展示如何检查更新以及为您的 iPod touch 安装更新的操作系统软件。\n\
  \n### iCloud\n\niCloud 是免费的，设置简单，使用方便。在大多数情况下，它是同步您的个人信息、音乐、电视节目（仅限美国）和应用的最佳方式。它也是处理备份和恢复手机的最佳方式。除非您有非常具体的原因不这样做，否则我们强烈建议您使用\
  \ iCloud 来满足大部分同步需求，但对于 iCloud 尚未处理的内容（如电影），则使用`iTunes`应用。\n\niCloud 还允许您重新下载之前购买的\
  \ iTunes、iBookstore 和 App Store 项目，但您的 iCloud ID 也可以用于 iMessage、FaceTime 和其他免费的\
  \ Apple 服务。\n\n**注意：** Apple 在提及 iCloud 时非常小心地不使用*同步*一词。而是使用*存储*和*推送*。这种差异很大程度上是技术性的，与\
  \ Apple 如何传输您的数据有关。\n\n需要记住的重要一点是，当您在 iPod touch 上更改某些内容时，Apple 会将该更改复制到其服务器，然后将副本发送回您所有其他启用了\
  \ iCloud 的 iOS 设备，以及您的 Windows 或 Mac 电脑。\n\n### 设置 iCloud\n\n在第 1 章：“起步”中，我们向您展示了如何在设置新的\
  \ iPod touch 或从之前的 iCloud 备份恢复时启用 iCloud。一旦 iCloud 启用，您可以轻松地打开或关闭各种服务。\n\n首先启动`设置`应用，然后向下滚动到`iCloud`。\n\
  \n`邮件`、`通讯录`、`日历`、`提醒事项`、`书签`、`备忘录`和`查找我的 iPod`可以直接在此屏幕轻松切换为`开`或`关`。\n\n对于`照片流选项`，您需要先点击该标签才能看到`开`/`关`切换开关。\n\
  \n![图片](img/p92-01.jpg)\n\n**注意：** 在撰写本文时，照片流是一项“全有或全无”的服务。如果照片流已打开，Apple 将在其服务器上保留您最近\
  \ 1000 张照片最多 30 天，并将其复制到您的 iPad、Apple TV、Mac 或 Windows 电脑。任何登录 iCloud 的设备都会获得您照片流的副本。如果您拍摄的是敏感或个人性质的照片，您可能需要将`照片流`选项设置为`关`。\n\
  \n同样，您可以点击`文稿与数据`来切换此选项的`开`或`关`。\n\n![图片](img/p93-01.jpg)\n\n### 管理 iCloud 存储空间与备份\n\
  \niCloud 提供 5GB 的免费存储空间。来自 iTunes 的音乐、应用、iBooks 和您的照片流不计入这 5GB 空间，因此大多数人仍有足够的剩余空间用于应用数据、文稿和备份。\n\
  \n要检查您的 iCloud 存储空间，请向下滚动到底部并点击`存储空间与备份`。\n\n`存储空间`部分显示`总存储空间`，即您 iCloud 账户的总大小；`可用存储空间`显示您还剩多少总存储空间。\n\
  \n在屏幕底部，您可以将`iCloud 备份`切换为`开`或`关`。\n\n**注意：** 对于大多数用户，在大多数情况下，我们强烈建议将`iCloud 备份`选项切换为`开`并保持该状态。\n\
  \n![图片](img/p93-02.jpg)\n\n如果您需要立即备份您的 iPod touch，您可以点击`立即备份`按钮。当您想重新安装 iPod touch、更换为备用或新的\
  \ iPod touch，或者打算去旅行并希望在出发前确保手机已备份时，可以执行此操作。\n\n要查看您的 iCloud 存储空间是如何使用的，请点击`管理存储空间`。\n\
  \n![图片](img/p94-01.jpg)\n\n在`管理存储空间`屏幕的顶部，您会看到当前已备份到 iCloud 的设备列表。这包括您的 iPod touch\
  \ 以及您可能拥有的任何其他 iOS 设备，例如 iPad 或 iPod touch。\n\n点击您想查看的设备，您将进入`信息`屏幕，该屏幕会显示`上次备份`的时间以及`备份大小`。\n\
  \n![图片](img/p94-02.jpg)\n\n`备份选项`部分允许您单独打开或关闭不同类型的备份，包括`相机胶卷`以及您可能已安装的任何与 iCloud\
  \ 同步其设置或数据的应用。此部分还会告诉您每个应用使用了多少存储空间。\n\n最初，您只会看到几个应用。点击`查看所有应用`可查看完整列表。将某个应用设置为`关`意味着您将节省存储空间，但您的数据将不再在您的\
  \ iOS 设备之间同步，并且如果您重新安装设备或该应用，数据也不会恢复。\n\n![图片](img/p95-01.jpg)\n\n**提示：** 您的 iPod\
  \ touch 配备了 800 万像素、1080p 摄像头，这意味着备份`相机胶卷`会很快占用大量存储空间，尤其是在您仅有免费 5GB 套餐的情况下。照片流功能已备份了您的照片；如果您不担心备份视频，那么您可以将`相机胶卷`备份切换为`关`以节省空间。\n\
  \n### 购买更多 iCloud 存储空间\n\n您可能会发现自己经常用完 iCloud 存储空间，决定开始备份更多照片和视频，或者发现需要备份多台 iOS\
  \ 设备。如果是这样，您可以从 Apple 购买更多 iCloud 存储空间。\n\n只需点击遍布 iCloud `设置`屏幕中的任意一个`购买更多存储空间`按钮。在撰写本文时，额外\
  \ iCloud 存储空间的价格如下：\n\n*   10GB 每年 20 美元\n*   20GB 每年 40 美元\n*   50GB 每年 100 美元\n\
  \n![图片](img/p96-01.jpg)\n\n\n\n### 云端的 iTunes\n\niCloud 还包含了 *云端的 iTunes* 功能，可让你重新下载之前购买过的应用。在某些国家/地区，它甚至允许你重新下载\
  \ iBooks、音乐乃至电视节目。这意味着你可以随时将其下载到 iPod touch 上，在不需要时删除，然后想要时再次重新下载。\n\n若要详细了解如何从\
  \ iTunes 重新下载文件，请参阅第 21 章：“设备上的 iTunes”、第 22 章：“神奇的应用商店”以及第 12 章：“iBooks 与电子书”。\n\
  \n你还可以设置你的 iPod touch，使其自动下载任何与你的 iTunes 账户相关联的设备或电脑上购买的新应用、iBooks、订阅的报刊杂志、音乐和电视节目。如果你在\
  \ PC 上购买了一首新歌，或在 iPod touch 上购买了一个新应用，那么这首歌或应用也会立即下载并显示在你的 iPod touch 上。\n\n请按照以下步骤开启自动下载：\n\
  \n1. 启动 `设置`。\n2. 轻点 `商店`。\n3. 将 `音乐`、`应用` 和 `图书` 切换为 `开启`。\n\n![images](img/p97-01.jpg)\n\
  \n### 电脑端的 iCloud\n\niCloud 不仅仅能在你的 iPod touch 和 Apple 服务器之间，或是在你的 iOS 设备之间同步信息。它还可以在你的\
  \ iPod touch 与 Windows 或 Mac PC 之间同步信息。\n\n如果你是 Windows 用户，可以在 `适用于 Windows 的 iCloud\
  \ 控制面板` 中打开或关闭多个应用和服务的同步功能（请参阅图 3–1）。可以同步的应用和服务包括 `邮件`、`通讯录`、`日历与任务` 和 `提醒事项` 等。\n\
  \n![images](img/0301.jpg)\n\n**图 3–1.** *适用于 Windows 的 iCloud 控制面板*\n\n如果你是 Mac\
  \ OS X 用户，则可以在 OS X 7.2 的 `Lion iCloud 系统设置` 面板中打开或关闭这些选项（请参阅图 3–2）。\n\n![images](img/0302.jpg)\n\
  \n**图 3–2.** *Mac 的 `Lion iCloud 系统设置` 面板（OS X 7.2）*\n\n应用的自动下载、图书、音乐和其他下载内容可以在\
  \ `iTunes` 应用的 `商店偏好设置` 屏幕中打开或关闭（请参阅图 3–3）。\n\n![images](img/0303.jpg)\n\n**图 3–3.**\
  \ *`iTunes` 的 `商店偏好设置` 屏幕*\n\n### 与 iTunes 同步\n\n在开始使用 `iTunes` 进行同步之前，你需要做好几项准备。在接下来的章节中，我们将介绍这些先决条件，并就使用\
  \ iTunes 的原因回答一些常见问题。同时，我们还将帮助你了解，如果你拥有另一台 Apple 设备（例如 iPhone 或 iPad）并开始与你的 iPod\
  \ touch 同步，会发生什么。\n\n#### 先决条件\n\n在将你的 iPod touch 与 `iTunes` 同步之前，你只要完成以下几项操作：\n\
  \n**提示：** 如果你已经按照第 1 章：“入门”中的所有步骤操作，那么你可能已经完成了下面列出的步骤，并且完成了通讯录、日历、书签、备忘录和电子邮件帐户与\
  \ iPod touch 的初始同步。如果是这样，你可以直接跳到本章后面的“应用：同步与管理”部分。\n\n1. 确保你的电脑上安装了 10.5 或更高版本的\
  \ `iTunes` 应用。有关安装或更新 `iTunes` 的帮助信息，请参阅第 21 章：“设备上的 iTunes”。\n2. 确保你手头有你的 iTunes\
  \ 账户 ID。这是你用来从 iTunes 购买音乐、应用和其他内容的电子邮件地址和密码。\n3. 取出 iPod touch 附带的白色同步线缆。一端插入 iPod\
  \ touch 底部靠近 `主屏幕` 按钮的位置，另一端插入电脑的 USB 端口。\n\n#### 使用 iTunes 同步 iPhone 或 iPad *以及*\
  \ 你的 iPod touch？\n\n你可能会想知道，是否可以同步 iTunes 与多个设备，例如你的 iPhone 或 iPad 以及你的 iPod touch。是的，可以！只要同步到同一台电脑，你就可以将多个\
  \ Apple 设备（Apple 表示最多五台，但我们听说过有人同步了更多设备）同步到单台电脑上的同一个 iTunes 帐户。\n\n**警告：** 你不能将同一台\
  \ iPod touch、iPad 或 iPhone 同步到两台不同的电脑。如果你尝试这样做，你将看到类似如下的信息：“是否要抹掉此设备（iPod touch、iPad、iPhone）并重新同步新的资料库？”如果你回答\
  \ `是`，设备上的所有音乐和视频将被抹去。\n\n#### 还有其他同步方法——我应该使用 iTunes 吗？\n\niCloud 既免费，又是让你的 iPod\
  \ touch 与其他设备保持同步的最简单方式，而 `iTunes` 则可以帮助你处理 iCloud 尚不支持的大文件、电影和其他内容。你也可以使用其他方法来同步特定数据，例如你的个人信息和电子邮件（包括\
  \ Exchange/Google）。但请记住，即使你选择了这些其他方法中的一种，你仍然需要使用 iCloud 和/或 `iTunes` 来完成以下操作：\n\n\
  * 在 iPod touch 上备份和恢复文件与数据\n* 更新 iPod touch 操作系统软件\n* 同步和管理你的应用程序（应用）\n* 同步你的音乐资料库和播放列表\n\
  * 同步电影、电视节目、播客和 iTunes U 内容\n* 同步图书\n* 同步照片\n\n表 3–1 总结了你的同步选项。你选择哪种同步方法，应取决于你当前存储电子邮件、通讯录和日历的位置、你的使用环境，以及你是否希望进行无线同步。\n\
  \n**注意：** 某些环境允许你对 iPod touch 进行通讯录和日历的无线同步。\n\n![images](img/t0301.jpg)\n![images](img/t0301a.jpg)\n\
  \n### 设置你的 iTunes 同步\n\n接下来，我们将向你展示使用 `iTunes` 应用对 iPod touch 执行自动同步和手动传输信息的全部步骤。\n\
  \n\n\n#### `iPod touch` 摘要屏幕\n\n`iTunes` 中的 `iPod touch` **摘要**选项卡用于查看和更新 `iPod\
  \ touch` 操作系统的版本。它还包含一个与同步音乐、视频及其他内容相关的重要开关。在此选项卡中，您还可以选择每当将 `iPod touch` 连接到电脑时，是否自动打开\
  \ `iTunes`（以进行同步）。\n\n将 `iPod touch` 连接到电脑后，您可以看到重要信息，例如 `iPod touch` 的存储容量、已安装的软件版本和序列号（参见图\
  \ 3–4）。您还可以检查软件版本更新、将数据恢复到 `iPod touch`，并从该屏幕上的几个可用选项中进行选择。特别是，您可以使用此屏幕底部的复选框来决定是否要**手动管理音乐和视频**。\n\
  \n![images](img/0304.jpg)\n\n**图 3–4.** *`iTunes` 中 `iPod touch` 的**摘要**屏幕*\n\n\
  按照以下步骤查看**摘要**屏幕：\n\n1.  在您的电脑上启动 `iTunes` 软件。\n2.  使用设备附带的白色 USB 数据线将 `iPod touch`\
  \ 连接到电脑。将数据线一端插入靠近**主屏幕**按钮的 `iPod touch` 底部，另一端插入电脑的 USB 端口。\n3.  如果您已成功连接 `iPod\
  \ touch`，您应该会在左侧导航栏的**设备**下看到列出的 `iPod touch`。\n4.  在左侧导航栏中单击您的 `iPod touch`，然后单击主窗口左上角的**摘要**选项卡。\n\
  5.  如果您希望能够将音乐和视频拖放到 `iPod touch` 上，请选中**手动管理音乐和视频**旁边的复选框。\n6.  如果您希望每当将 `iPod\
  \ touch` 连接到电脑时，`iTunes` 自动打开并同步，请选中**此 iPod touch 连接时打开 iTunes** 旁边的复选框。\n\n**提示：**请注意，`iTunes`\
  \ 软件可能未安装在您（用于同步的）主电脑上。例如，它可能安装在您用来给 `iPod touch` 充电的第二台电脑上。如果是这种情况，您应选中**手动管理音乐和视频**旁边的复选框，并取消选中**此\
  \ iPod touch 连接时打开 iTunes** 旁边的复选框。\n\n#### 进入同步设置屏幕（信息选项卡）\n\n假设您想要进入**信息**选项卡，这是用于同步联系人、日历、电子邮件等的设置屏幕。为此，您可以按照前面介绍进入**摘要**屏幕的相同步骤进行操作，但现在单击顶部的**信息**选项卡，即可在\
  \ `iTunes` 主窗口中查看联系人（以及其他同步设置）（参见图 3–5）。\n\n![images](img/0305.jpg)\n\n**图 3–5.**\
  \ *`iTunes` 的**信息**选项卡，您可在此设置联系人、日历、书签等*\n\n**注意：**如果您已设置使用 `iCloud` 同步信息，您将看到此警告，并且无法使用\
  \ `iTunes`，因为 `iCloud` 已在同步您的信息。如果您看到此警告，则可跳过使用 `iTunes` 同步邮件、通讯录和日历。\n\n![images](img/p104-01.jpg)\n\
  \n#### 同步您的联系人\n\n让我们从设置同步联系人开始。第一步是选择要与之同步的服务。为此，请选中**同步联系人来源**旁边的复选框，并在下拉菜单中选择存储您联系人的软件或服务。在本书出版时，您在\
  \ Windows 电脑上有几种同步选项：`Outlook`、`Google 通讯录`、`Windows 联系人`和 `Yahoo! 通讯录`。\n\n**警告：**每当您在这些同步设置屏幕中切换软件或服务（称为*同步提供者*）时，都会影响连接到您\
  \ `iTunes` 帐户的每一个移动设备。例如，如果您将联系人同步到您的 `iPad` 或 `iPod touch`，这些更改也会影响 `MobileMe`。您将更改连接到您\
  \ `iTunes` 帐户的任何其他设备同步联系人的方式。\n\n![images](img/p105-01.jpg)\n\n##### 与 `Google 通讯录`\
  \ 同步\n\n如果您选择 `Google 通讯录`，系统将提示您输入您的 Google ID 和密码。要更改您的 Google ID 或密码，请单击本节顶部看到的**同步联系人来源**选项旁边的**配置**按钮。\n\
  \n##### 与 `Yahoo! 通讯录` 同步\n\n如果您选择 `Yahoo! 通讯录`，系统将提示您输入您的 Yahoo! ID 和密码。要更改您的 Yahoo!\
  \ ID 或密码，请单击本节顶部看到的**同步联系人来源**选项旁边的**配置**按钮。\n\n**注意：**您在此处以及**信息**选项卡中其他下拉框中看到的选项会略有不同，具体取决于您电脑上安装的软件。例如，在\
  \ `Mac` 上，联系人同步没有下拉列表；而是将 `Google 通讯录`和 `Yahoo!` 等其他服务显示为单独的复选框。\n\n选择要与之同步的服务或应用后，您就可以继续完成同步联系人了：\n\
  \n1.  从以下选项中选择要同步的联系人：\n    *   **所有联系人：**同步通讯录中的所有联系人（此为默认设置）。\n    *   **所选群组：**仅同步您在下方窗口中勾选的特定群组内的联系人。\n\
  2.  您将看到一个复选框，内容为**将此 iPod touch 上群组外部创建的联系人添加到**（从下拉列表中选择一个群组）。此选项允许您为在 `iPod touch`\
  \ 上添加的、未明确分配到任何群组的新联系人指定一个新群组。\n3.  向下滚动页面，继续设置日历、电子邮件等。\n4.  如果您不想设置其他同步内容，请单击\
  \ `iTunes` 屏幕右下角的**应用**按钮以开始同步。\n\n**注意：**根据您拥有的联系人数量，首次同步可能需要超过 10 分钟，甚至可能需要 30\
  \ 分钟或更长时间。因此，您可能希望选择一个能够将 `iPod touch` 放置足够长时间的时间段来执行此同步（例如，午餐时间或晚餐后）。\n\n#### 同步您的日历\n\
  \n同步日历与同步联系人类似。按照以下步骤操作：\n\n1.  在同一个**信息**选项卡中，向下滚动以查看日历同步设置。\n2.  选中**同步日历来源**旁边的复选框，并在下拉菜单中选择存储您日历的软件或服务。在\
  \ Windows 电脑上，这可能是 `Outlook` 或其他应用程序；在 `Mac` 上，则是 `iCal`。\n3.  选择以下任一选项：\n    *\
  \   **所有日历：**同步所有日历（此为默认设置）。\n    *   **所选日历：**仅同步您在下方窗口中勾选的日历。\n4.  如果您想在 `iPod\
  \ touch` 上节省空间，请单击**不同步超过 30 天的事件**旁边的复选框。您可以根据需要向上或向下调整天数。\n5.  向下滚动页面，继续设置电子邮件帐户、书签等。\n\
  6.  如果您不想设置其他同步内容，请单击 `iTunes` 屏幕右下角的**应用**按钮以开始同步。\n\n\n\n#### 同步电子邮件账户\n\n向下滚动页面以同步电子邮件账户设置。\n\
  \n**注：** 在将电子邮件账户设置同步到 iPod touch 后，您仍需在`设置`→`邮件、通讯录、日历`中为每个电子邮件账户输入密码。对于每个账户，您只需在\
  \ iPod touch 上执行此操作一次。\n\n请按照以下步骤操作：\n\n1. 在`iTunes`的`信息`选项卡中，向下滚动到`日历`设置下方，即可看到`邮件`账户设置。\n\
  2. 勾选`同步邮件账户自`旁边的复选框，并调整下拉菜单，选择存储您电子邮件的软件或服务（参见图 3–6）。这可能是 Windows 电脑上的`Outlook`，或是\
  \ Mac 上的`Entourage`或`Mail`。\n\n   ![images](img/0306.jpg)\n\n   **图 3–6.** *设置要同步的电子邮件账户*\n\
  \n3. 向下滚动页面，继续设置书签、备忘录等。\n4. 如果您不想再设置其他同步内容，则点击`iTunes`屏幕右下角的`应用`按钮开始同步。\n\n####\
  \ 同步书签和备忘录\n\niTunes 同步的一个出色功能是，您可以将电脑上的浏览器书签同步到 iPod touch。这使您可以立即使用 iPod touch\
  \ 浏览所有喜爱的网站。您还可以通过`iTunes`将电脑上的备忘录同步到 iPod touch，并保持两处内容的最新状态。\n\n**注：** 在撰写本文时，`iTunes`仅支持两种用于同步的网页浏览器：`Microsoft\
  \ Internet Explorer`和`Apple Safari`。如果您使用`Mozilla Firefox`或`Google Chrome`，您仍然可以同步书签，但需要安装免费的书签同步软件（例如来自[`www.xmarks.com`](http://www.xmarks.com)的`xmarks`），以便将书签从`Firefox`或`Chrome`同步到`Safari`或`Explorer`。安装此软件后，您可以通过简单的两步操作同步浏览器书签。对于`Firefox`用户来说，`Firefox`的`Home`应用是同步书签的一个不错选择（请访问[`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8formoreinformation)）。\n\
  \n### 使用 iTunes 同步您的 iPod touch\n\n当您将 iPod touch 插入电脑的 USB 端口时，同步过程通常是自动进行的。唯一的例外是您禁用了自动同步功能。\n\
  \n#### 在 iTunes 中同步应用\n\n请按照以下步骤使用`iTunes`应用同步和管理应用：\n\n1. 如同之前设置同步一样，将 iPod touch\
  \ 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的 iPod touch。\n2. 点击主窗口顶部的`应用`选项卡。\n3. 勾选`同步应用`旁边的复选框，即可查看存储在\
  \ iPod touch 上的所有应用以及您的`主屏幕`，如图 3–7 所示。\n\n![images](img/0307.jpg)\n\n**图 3–7.**\
  \ *`iTunes`中的`同步应用`屏幕*\n\n#### 移动应用、管理文件夹或删除应用图标\n\n在`iTunes`的`同步应用`屏幕中，移动和整理您的应用图标非常容易（同样，参见图\
  \ 3–7）。尝试以下操作来完成各种任务：\n\n- **在屏幕内移动应用**：单击应用并拖动它在屏幕上移动。如果您想一次选择多个应用，可以按住`Ctrl`键（Windows）或`Command`键（Mac）并单击选择。\n\
  - **在主屏幕页面之间移动应用**：单击并将应用拖放到右侧列中的新页面。该新页面将在主屏幕中展开。将图标放到主屏幕上。\n- **将应用固定到底部 dock**：单击并将应用向下拖放到底部\
  \ dock 上。如果底部 dock 上已有四个图标，您需要拖出一个图标为新图标腾出空间。底部 dock 最多只允许放置四个图标。\n- **创建新文件夹**：将一个图标拖放到另一个图标上。\n\
  - **将应用移入现有文件夹**：将图标拖放到`文件夹`图标上。\n- **将应用移出文件夹**：单击文件夹将其打开。然后，将图标拖放到该文件夹之外。\n- **查看另一个主屏幕页面**：单击右侧列中的该页面。\n\
  - **删除应用**：单击应用，然后单击其左上角的`x`。您只能删除自己安装的应用。在预装应用（如`iTunes`）上不会看到`x`。\n- **删除文件夹**：移除该文件夹中的所有应用（将它们拖出），该文件夹将消失。\n\
  \n#### 移除或重新安装应用\n\n要从 iPod touch 中移除应用，只需取消勾选其旁边的复选框并确认您的选择即可。\n\n**提示：** 即使您从\
  \ iPod touch 中删除了应用，只要您选择了同步应用，就可以通过重新勾选其旁边的复选框来重新安装该应用。该应用将在下一次同步期间重新加载到您的 iPod\
  \ touch 上。\n\n### 同步媒体及其他内容\n\n现在，让我们来看看如何为音乐、影片、iBooks、iTunes U 内容等设置自动同步。\n\n\
  **警告：** 请确保您使用要在 iPod touch 上使用的同一 iTunes 账户登录到`iTunes`，以处理受数字版权管理 (DRM) 保护的内容（例如音乐、视频等）。如果两个账户不匹配，您的内容将无法同步。如有必要，您可以在桌面电脑和\
  \ iPod touch 上都退出并重新登录 iTunes 服务，以确保登录到正确的账户。\n\n#### 同步铃声\n\n点击`铃声`选项卡后，您可以选择同步整个铃声库或选定的项目：\n\
  \n1. 将 iPod touch 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的 iPod touch。\n2. 点击主窗口顶部的`铃声`选项卡。\n\
  3. 勾选`同步铃声`旁边的复选框，如右图所示。\n\n   ![images](img/p111-01.jpg)\n\n4. 默认设置为同步`所有铃声`。要仅同步特定铃声，请点击`选定铃声`旁边的单选按钮。\n\
  5. 完成选择后，点击`应用`按钮开始同步铃声。\n\n#### 同步音乐\n\n点击`音乐`选项卡后，您可以选择同步整个音乐库或选定的项目。\n\n**警告：**\
  \ 如果您已经手动将一些音乐、音乐视频或语音备忘录传输到 iPod touch，您将收到一条警告消息，提示 iPod touch 上的所有现有内容将被移除，并替换为您电脑上选定的音乐库。\n\
  \n要将音乐从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1. 将 iPod touch 连接到电脑，启动`iTunes`，然后单击左侧导航栏中的`iPod\
  \ touch`。\n2. 点击主窗口顶部的`音乐`选项卡。\n3. 勾选`同步音乐`旁边的复选框。\n4. 仅当您确定您的音乐库对 iPod touch 来说不会太大时，才点击`整个音乐库`旁边的按钮。\n\
  5. 如果您不确定音乐库是否过大，或者只想同步特定的播放列表或艺人，请点击`选定的播放列表、艺人和风格`旁边的按钮：\n   - 您可以通过勾选相应的复选框来选择是否包含音乐视频和语音备忘录。\n\
  \   - 您还可以用歌曲自动填充剩余空间。\n\n     **警告：** 我们不建议勾选此选项，因为它会占满 iPod touch 的所有空间，让您那些很酷的应用无处可放！\n\
  \n   - 现在，在屏幕底部的两列中勾选任意播放列表或艺人。您甚至可以使用`艺人`列顶部的`搜索`框来搜索特定的艺人。\n6. 完成选择后，点击`应用`按钮开始同步音乐。\n\
  \n\n\n#### 同步影片\n\n点击 `Movies` 选项卡后，可以选择同步特定影片、近期影片、未观看影片或所有影片。\n\n要将影片从电脑同步到 iPod\
  \ touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的 iPod touch。\n\
  2.  点击主窗口顶部的 `Movies` 选项卡。\n3.  勾选 `Sync Movies` 旁边的复选框（参见 图 3–8）。\n4.  如果您想同步近期或未观看的影片，请勾选\
  \ `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 most recent`、`All unwatched`、`5\
  \ most recent unwatched` 等选项。\n\n    ![images](img/0308.jpg)\n\n    **图 3–8.** *配置\
  \ `Movies` 选项卡以自动同步所选内容*\n\n5.  如果您选择了除 `All` 之外的任何选项，则可以选择将特定影片或视频同步到 iPod touch。只需勾选您想要包含在同步中的影片旁的复选框即可。\n\
  6.  完成影片选择后，点击 `Apply` 按钮保存设置并开始同步。\n\n#### 同步电视节目\n\n点击 `TV Shows` 选项卡后，可以选择同步特定电视节目、近期节目、未观看节目或所有节目。\n\
  \n要将电视节目从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的\
  \ iPod touch。\n2.  点击主窗口顶部的 `TV Shows` 选项卡。\n3.  勾选 `Sync TV Shows` 旁边的复选框。\n4.\
  \  如果您想同步近期或未观看的电视节目，请勾选 `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 newest`、`All\
  \ unwatched`、`5 oldest unwatched`、`10 newest unwatched` 等选项。\n5.  在 `episodes of`\
  \ 旁边选择 `All Shows` 或 `Selected Shows`。\n6.  如果选择 `Selected Shows`，您可以在屏幕中间的两个区域中选择单个节目甚至单集。\n\
  7.  如果您有电视节目的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些播放列表。\n8.  完成单个电视节目的选择后，点击 `Apply` 按钮保存设置并开始同步。\n\
  \n#### 同步播客\n\n点击 `Podcasts` 选项卡后，可以选择同步特定播客、近期播客、未播放播客或所有播客。\n\n**提示：** 播客是音频或视频节目，通常有固定的更新周期（例如每日、每周或每月更新）。在\
  \ iTunes Store 中，大部分播客都可以免费订阅。当您订阅并按照本节所述设置自动同步后，您将在 iPod touch 上接收到所有喜爱的播客。\n\n\
  许多您喜爱的广播节目都以播客形式录制和播出。我们鼓励您查看 iTunes Store 的 `Podcast` 板块，看看有哪些内容可能让您感兴趣。您会找到电影评论、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等各类播客。\n\
  \n要将播客从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的\
  \ `iPod touch`。\n2.  点击主窗口顶部的 `Podcasts` 选项卡。\n3.  勾选 `Sync Podcasts` 旁边的复选框。\n\
  4.  如果您想同步近期或未播放的播客，请勾选 `Automatically include` 旁边的复选框，并使用下拉菜单选择 `All`、`1 newest`、`All\
  \ unplayed`、`5 newest`、`10 most recent unplayed` 等选项。\n5.  在 `episodes of` 旁边选择\
  \ `All Podcasts` 或 `Selected Podcasts`。\n6.  如果选择 `Selected Podcasts`，您可以在屏幕中间的两个区域中选择单个播客甚至单集。\n\
  7.  如果您有播客的播放列表，可以通过勾选屏幕底部区域的复选框来选择包含这些播放列表。\n8.  完成播客选择后，点击 `Apply` 按钮保存设置并开始同步。\n\
  \n**提示：** 同步这些播客后，您可以导航到设备上 `Music` 应用中的 `Podcasts` 板块来收听它们。\n\n#### 同步 iBooks 和有声读物\n\
  \n点击 `Books` 选项卡后，可以选择同步全部或选定的图书和有声读物。\n\n**提示：** iPod touch 上的图书是其纸质版本的电子版。它们采用特定的电子格式，称为\
  \ `ePub`。您可以在 iPod touch 上的 iBookstore 中购买，也可以从其他来源获取，并使用这里描述的步骤将它们同步到 iPod touch。从其他来源获取的图书必须是无保护或“无\
  \ DRM 限制”的，才能同步到您的 iPod touch。您可以在 iPod touch 上的 `iBooks` 应用或其他图书阅读应用中阅读这些图书。更多信息请参见第\
  \ 12 章：“iBooks 和电子书”。\n\n要在电脑和 iPod touch 之间同步图书或有声读物，请按照以下步骤操作：\n\n1.  将 iPod touch\
  \ 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击您的 `iPod touch`。\n2.  点击主窗口顶部的 `Books` 选项卡。\n3. \
  \ 勾选 `Sync Books` 和 `Sync Audiobooks` 旁边的复选框。\n4.  如果您想同步所有图书，请保持默认选项 `All books`\
  \ 不变。\n5.  否则，选择 `Selected books`，然后通过在窗口中勾选特定图书来做出选择。\n\n    **提示：** 为了将 iBooks、PDF\
  \ 文件和其他类似文档同步到 iPod touch，您需要先将文件从电脑拖放到您的 iTunes 资料库中。从电脑上的任意文件夹中抓取文件，然后将其直接拖放到\
  \ `iTunes` 左上角列中的资料库中。\n\n6.  如果您想同步所有有声读物，请保持默认选项 `All audiobooks` 不变。\n7.  否则，选择\
  \ `Selected audiobooks`，然后通过在该选项下方的窗口中勾选特定有声读物来做出选择。\n8.  完成单个图书和有声读物的选择后，点击 `Apply`\
  \ 按钮保存设置并开始同步。\n\n**提示：** 同步这些图书后，您可以在设备上的 `iBooks` 应用中阅读它们。您可以在 `Music` 应用中收听有声读物，该应用的左侧有\
  \ `Audiobooks` 选项卡。\n\n**注意：** 来自 Audible 的有声读物，需要您先用 Audible 账户授权您的电脑，然后才能将其从电脑同步到\
  \ iPod touch。\n\n\n\n#### 同步照片\n\n点击**照片**标签页时，你可以选择同步所有文件夹或选定文件夹中的照片，甚至还可以包含视频。\n\
  \n**提示：** 你可以创建一个精美的电子相框，并在 iPod touch 绚丽的屏幕上分享你的照片（请参阅第 19 章：“使用照片”）。你甚至可以用自己的照片设置主屏幕壁纸和锁定屏幕壁纸——更多信息请参阅第\
  \ 8 章：“个性化与安全”。\n\n要将照片从电脑同步到 iPod touch，请按照以下步骤操作：\n\n1.  将 iPod touch 连接到电脑，启动\
  \ **iTunes**，然后在左侧导航栏中点击你的 iPod touch。\n\n    **提示：** Mac 用户也可以在 **iPhoto** 中使用各种条件同步照片，包括“事件”（按时间同步）、“面孔”（按人物同步）和“地点”（按位置同步）。\n\
  \n2.  点击主窗口顶部的**照片**标签页。\n3.  勾选**从以下位置同步照片**旁边的复选框。\n4.  点击**从以下位置同步照片**旁边的下拉菜单，然后从电脑中选择存储照片的文件夹。如果你想获取所有照片，请选择尽可能高的文件夹层级（例如，Windows\
  \ 电脑上的 `C:` 盘，或 Apple Mac 上的硬盘根目录 `/`）。\n5.  如果你想同步电脑上所选文件夹中的所有照片，请选择**所有文件夹**。\n\
  \n    **警告：** 由于电脑中的照片库可能太大，无法全部放入 iPod touch，因此勾选**所有文件夹**时请务必谨慎。\n\n6.  否则，请选择**所选文件夹**，并通过勾选下方窗口中的特定文件夹来进行选择。\n\
  7.  你还可以通过勾选**包含视频**旁边的复选框来包含文件夹中的任何视频。\n8.  完成选择要同步的照片后，点击**应用**按钮以保存设置并开始同步。\n\
  9.  同步开始时，你将在 **iTunes** 的中上部状态窗口中看到同步状态。\n\n### 解决 iTunes 和同步问题\n\n有时 **iTunes**\
  \ 的行为可能不符合预期，因此这里提供几个简单的故障排除技巧。\n\n#### 查阅 Apple 知识库获取有帮助的文章\n\n遇到问题时，第一步是查阅 Apple\
  \ 的支持页面，你可以在其中找到大量有用的信息。在你的 iPod touch 或电脑的网页浏览器中，访问以下网页：\n\n`www.apple.com/support/iPod\
  \ touch/`\n\n然后，点击左侧导航栏中显示的一个主题。\n\n#### iTunes 卡死且无响应（Windows 电脑）\n\n有时，**iTunes**\
  \ 会卡死并完全无响应。如果在 Windows 电脑上出现这种情况，请按照以下步骤操作：\n\n1.  同时按下键盘上的 `Ctrl` + `Alt` + `Del`\
  \ 键，调出**Windows 任务管理器**。**任务管理器**应类似图 3-9 所示。\n\n    ![images](img/0309.jpg)\n\n\
  \    **图 3-9.** *在 **Windows 任务管理器** 中找到 `iTunes.exe`，以便终止它*\n\n2.  要结束该进程，请从弹出的窗口中点击**结束进程**。\n\
  3.  现在，**iTunes** 应被强制关闭。\n4.  尝试重新启动 **iTunes**。\n5.  如果 **iTunes** 无法启动或再次卡死，则重启电脑并重试。\n\
  \n#### iTunes 卡死且无响应（Apple 电脑）\n\n如果你使用的是 Apple 电脑（Mac），当 **iTunes** 应用卡死且完全无响应时，请按照以下步骤操作：\n\
  \n**提示：** 按下 `Command + Option + Escape` 是调出**强制退出应用程序**窗口的快捷键（请参阅图 3-10）。\n\n1.\
  \  点击顶部的 **iTunes** 菜单。\n2.  点击**退出 iTunes**。\n3.  如果这不起作用，请转到任何其他程序，然后点击 Mac 左上角的小**Apple**\
  \ 标志。\n\n    点击**强制退出**，将显示正在运行的程序列表。\n\n4.  选中 **iTunes**，然后点击**强制退出**按钮。\n5. \
  \ 如果这没有帮助，请尝试重启你的 Mac。\n\n![images](img/0310.jpg)\n\n**图 3-10.** *Mac 电脑上的 **强制退出应用程序**\
  \ 窗口*\n\n### 更新你的 iPod touch 操作系统\n\n借助 iOS 5，你现在可以在设备上直接更新 iPod touch 的操作系统。有更快、更高效的更新方法，我们建议你尽可能使用这些方法。但是，如果你需要重新安装整个操作系统，或者想通过\
  \ **iTunes** 升级，本节将说明如何操作。\n\n**注：** 请在你愿意让 iPod touch 离开身边 30 分钟或更长时间时进行此更新，具体时间取决于\
  \ iPod touch 上的信息量以及电脑和互联网连接的速度。\n\n通常，**iTunes** 会按照设定的计划（大约每两周）自动检查更新。如果未找到更新，**iTunes**\
  \ 会告诉你何时进行下一次检查。请按照以下步骤使用 **iTunes** 手动更新你的 iPod touch：\n\n1.  启动 **iTunes**。\n\
  2.  将 iPod touch 连接到电脑。\n3.  点击左侧导航栏中 **设备** 下列出的你的 iPod touch。\n4.  点击顶部导航栏中的 **摘要**\
  \ 标签页。\n5.  点击屏幕中央 **版本** 部分中的 **检查更新** 按钮。\n6.  如果你已拥有最新版本，你将看到一个弹出窗口，内容类似于：“此版本的\
  \ iPod touch 软件（5.0）是当前版本。”点击 **确定** 关闭窗口。更新过程完成。\n7.  如果你没有最新版本的 **iTunes**，一个窗口会告知你有新版本可用，并询问你是否要更新。点击\
  \ **是** 或 **更新** 执行操作。\n8.  **iTunes** 将引导你通过几个屏幕，描述更新并请你同意软件许可。如果你同意，请点击 **下一步**\
  \ 和 **同意**，以下载 Apple 提供的最新 iOS 软件。这大约需要五到十分钟。\n\n    **提示：** 我们在第 25 章：“故障排除”的“重新安装\
  \ iPod touch 操作系统”部分展示了更新过程中你可能看到的所有屏幕。\n\n9.  接下来，**iTunes** 将备份你的 iPod touch，如果你的\
  \ iPod touch 中存有大量数据，此过程可能需要十分钟或更长时间。\n10. 现在，新的 iOS 将被安装，你的 iPod touch 将被抹掉。\n\
  11. 最后，你将看到一个屏幕，要求你执行以下操作之一：\n\n    *   **设置为新的 iPod touch：** 如果希望在更新过程后抹掉所有数据，请选择此项。\n\
  \    *   **从以下备份恢复：** 选择此项可确保你选择了正确的备份文件（通常是最新的备份文件）。\n\n    此时，你的 iPod touch 将按照选择进行恢复或设置。\n\
  \n12. 你的 iPod touch 操作系统更新完成。\n\n### 其他同步方法\n\n你可以导航到 iPod touch 上**设置**应用中的**邮件**、**通讯录**、**日历**应用，以设置和使用\
  \ Exchange。下一节将说明如何操作。\n\n\n\n#### 在设备上设置您的 Google 或 Exchange 账户\n\n按照以下步骤为您的 Exchange\
  \ 账户或 Google 通讯录和日历设置无线同步：\n\n1.  轻触 `Settings` 图标。\n2.  轻触 `Mail`、`Contacts`、`Calendar`。\n\
  3.  您会看到您的电子邮件账户列表，以及在其下方的 `Add Account` 选项。\n\n   如果您尚未设置任何账户，您将只会看到 `Add Account`。无论哪种情况，请轻点\
  \ `Add Account`。\n\n   ![images](img/p121-01.jpg)\n\n4.  在下一个屏幕上，选择 `Microsoft Exchange`。\n\
  \n   **注意：** 如果您想要与您的 Google 通讯录和日历进行无线同步，应选择 `Microsoft Exchange`。如果您选择 `Gmail`，您将无法与您的\
  \ Google 通讯录进行无线同步。\n\n   ![images](img/p122-01.jpg)\n\n5.  输入您的电子邮件地址。\n\n   **提示：**\
  \ 要在电子邮件地址中输入 `.com`（或 `.net`、`.edu`、`.org` 等），请按住 `Period` （`.`） 键，直到其上方出现 `.com`\
  \ 键。然后滑动手指并按下 `.com`。\n\n   ![images](img/p122-02.jpg)\n\n   **提示：** 既然您的电子邮件地址通常也是您的用户名，您可以通过复制粘贴来节省时间。\n\
  \n   ![images](img/p122-03.jpg)\n\n6.  将您的电子邮件地址复制并粘贴到 `Username` 字段中（当您的用户名与您的电子邮件相同，或者与\
  \ `@` 符号前的电子邮件第一部分相同时，此方法很有效）：\n\n   * 按住 `Email` 字段，然后抬起手指，即可看到其上方出现黑色弹出菜单。\n \
  \  * 轻点 `Select All`。\n   * 轻点 `Copy`。\n   * 按住 `Username` 字段，然后抬起手指，即可看到弹出菜单出现。轻点\
  \ `Paste`。\n\n   ![images](img/p123-01.jpg)\n\n7.  将 `Domain` 字段留空。\n\n   输入您的 `Password`。\n\
  \n   如果需要，您可以调整账户的 `Description`，其默认值为您的电子邮件地址。\n\n8.  轻点右上角的 `Next` 按钮。\n\n   ![images](img/p123-02.jpg)\n\
  \n9.  您可能会看到一个 `Unable to Verify Certificate` 对话框。如果看到，请点击 `Accept` 继续。\n\n   ![images](img/p123-03.jpg)\n\
  \n10. 在 `Server` 字段中，输入 `m.google.com` 以同步到 Google。否则，如果您正在设置您的 Exchange 服务器账户，请输入该服务器地址。\n\
  11. 点击右上角的 `Next`。\n\n    ![images](img/p123-04.jpg)\n\n12. 在此屏幕上，您可以选择将 `Mail`、`Contacts`\
  \ 和 `Calendars` 的无线同步设置为 `ON` 或 `OFF`。对于您想要开启的每个同步，轻触开关将其更改为 `ON`。\n\n![images](img/p123-01.jpg)\n\
  \n**注意：** 如果您在 iPod touch 上已有通讯录或日历项目，您可能会看到一些警告出现。您的选项是 `Keep on My iPod touch`\
  \ 或 `Delete`。如果您选择 `Cancel`，您的 iPod touch 将停止设置您的 Exchange 账户。选择 `Keep on My iPod\
  \ touch` 以保留您 iPod touch 上所有现有的通讯录和日历事件。这些项目将不会出现在您的 Exchange 账户中——它们将保留在您的 iPod\
  \ touch 上。\n\n"
- "# 第 4 章\n\n## 连接到网络\n\n我们生活在一个互联的世界。无线互联网（Wi-Fi）接入已成为常态而非例外——而且您很可能已经在家庭或办公室使用\
  \ Wi-Fi。现在您可以利用它来将您的 iPod touch 连接到互联网。\n\n在本章中，我们将向您展示从几乎任何形式的 Wi-Fi 网络（无论是开放网络还是安全网络）进行连接或断开连接的所有方法。如果您在一个拥有\
  \ VPN（*虚拟专用网络*）的组织工作，我们将向您展示如何连接到该网络。\n\n### 连接到 Wi-Fi 网络后我能做什么？\n\n以下是您连接到 Wi-Fi\
  \ 网络后可以执行的一些操作：\n\n* 从 `App Store` 访问和下载应用程序（程序）。\n* 从您 iPod touch 上的 `iTunes` 应用访问和下载音乐、视频、播客等。\n\
  * 使用 `Safari` 浏览网页。\n* 发送和接收电子邮件。\n* 使用需要互联网连接的社交网站，如 Facebook、Twitter 等。\n* 玩需要实时互联网连接的游戏。\n\
  * 执行任何其他需要互联网连接的操作。\n\n**注意：** iPod touch 支持速度更快、范围更广的 802.11n 标准。然而，它仅支持更拥挤的 2.4MHz\
  \ 频段上的 802.11n，而不支持较不拥挤的 5MHz 频段。如果您想将 iPod touch 与 802.11n 无线路由器配合使用，请确保其是双频路由器或将路由器设置为\
  \ 2.4MHz。\n\n### 连接到 Wi-Fi 网络\n\n要设置您的 Wi-Fi 连接，请按照以下步骤操作：\n\n![images](img/p126-01.jpg)\n\
  \n1.  轻点 `Settings` 图标。\n2.  轻点顶部的 `Wi-Fi`。\n3.  确保 `Wi-Fi` 开关设置为 `ON`。如果当前为 `OFF`，则轻触将其打开为\
  \ `ON`。\n4.  一旦 Wi-Fi 处于 `ON` 状态，iPod touch 将自动开始搜索无线网络。\n5.  可访问的网络列表显示在 `Choose\
  \ a Network…` 选项下方。此屏幕截图显示我们有一个可用的网络。\n6.  要连接到列出的任何网络，只需轻触网络名称。如果网络不安全（没有 `Lock`\
  \ 图标），您将自动连接。\n\n### 在具有网页登录功能的公共 Wi-Fi 热点进行连接\n\n在某些提供免费 Wi-Fi 网络的场所（例如咖啡店、酒店或餐厅），一旦您的\
  \ iPod touch 连接到该网络，就会出现一个弹出窗口。在这些情况下，只需轻点网络名称。您可能会被带到 `Safari` 浏览器屏幕以完成网络登录：\n\n\
  1.  如果您看到类似所示的弹出窗口，请轻点您想要加入的网络名称。在右侧的示例中，我们轻点 `Panera` 网络。\n\n   ![images](img/p126-02.jpg)\n\
  \n2.  在某些情况下，您可能会看到一个 `Safari` 窗口弹出，这可能会让人相当困惑，因为它在您的 iPod touch 屏幕上非常小。您需要使用双击或张开手势（请参阅快速入门指南寻求帮助）来放大网页。您需要找到一个标有\
  \ `Login`、`Agree` 或类似字样的按钮。轻点该按钮以完成连接。\n\n   ![images](img/p127-01.jpg)\n\n**注意：**\
  \ 某些地方（如咖啡店）使用基于网页的登录，而不是用户名/密码屏幕。在这种情况下，当您点击网络（或尝试使用 `Safari`）时，您的 iPod touch 将打开一个浏览器屏幕，您将看到网页以及您的登录选项。\n\
  \n### 安全 Wi-Fi 网络——输入密码\n\n某些 Wi-Fi 网络需要密码才能连接。这是在网络管理员创建无线网络时设置的。您必须知道确切的密码，包括其是否区分大小写。\n\
  \n![images](img/p127-02.jpg)\n\n如果网络确实需要密码，那么您将被带到 `Enter Password` 屏幕。完全按照提供给您的密码进行输入，然后按屏幕键盘上的\
  \ `Enter` 键（此时该键标记为 `Join`）。\n\n在 `Network` 屏幕上，您将看到一个 `Checkmark` 图标，表明您已连接到该网络。\n\
  \n![images](img/p127-03.jpg)\n\n**提示：** 您可以在密码对话框中进行粘贴；因此对于较长、随机的密码，您可以将其传输到您的 iPod\
  \ touch 上（通过电子邮件），然后直接复制粘贴。请记得之后立即删除该电子邮件，以确保安全。在邮件中按住密码，选中它，然后轻点 `Copy`。在 Wi-Fi\
  \ 网络的 `Password` 字段中，轻触然后选择 `Paste`。\n\n![images](img/p128-01.jpg)\n\n\n\n#### 切换到不同的\
  \ Wi-Fi 网络\n\n有时你可能想更改当前连接的 Wi-Fi 网络。这种情况可能发生在酒店、公寓或其他场所，你发现 iPod touch 自动选择的网络并非信号最强的网络，或者你想使用安全网络而非不安全网络。\n\
  \n要切换当前连接的 Wi-Fi 网络，请轻点 `设置` 图标，点击 `Wi-Fi`，然后点击你想加入的 Wi-Fi 网络名称。如果该网络需要密码，你需要输入密码才能加入。\n\
  \n一旦你输入了正确的密码（或者点击了开放网络），你的 iPod touch 就会自动连接该网络。\n\n#### 验证你的 Wi-Fi 连接\n\n通过在 `设置`\
  \ 主界面中查看 `Wi-Fi` 选项旁边的状态，你可以轻松判断是否已连接到网络（以及连接的是哪个网络）。请按照以下步骤检查 Wi-Fi 连接状态：\n\n![images](img/p129-01.jpg)\n\
  \n1.  轻点你的 `设置` 图标。\n2.  查看顶部 `Wi-Fi` 选项旁边的状态：\n    *   如果显示 `未连接`，则表示你没有有效的 Wi-Fi\
  \ 连接。\n    *   如果显示其他名称，例如 `Panera`，则表示你已连接到该 Wi-Fi 网络。\n\n### 高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\
  \n有时，由于网络管理员隐藏了网络名称（未广播 SSID），你可能看不到想要加入的网络。接下来，你将学习如何在 iPod touch 上加入此类网络。一旦你加入过某个网络，下次进入其覆盖范围时，iPod\
  \ touch 将自动连接，而无需再次提示。你也可以让 iPod touch 每次连接网络时都询问你；我们也将教你如何设置。有时你可能想删除或忘记某个网络。例如，你参加过一次性的会议，想要移除相关的网络——你也将学会如何操作。\n\
  \n#### 为什么我看不到想加入的 Wi-Fi 网络？\n\n有时，出于安全考虑，人们会隐藏网络（隐藏称为 SSID 的网络名称），你必须手动输入名称和安全选项才能连接。\n\
  \n正如你所见，可用网络列表中包含 `其他` 选项。\n\n![images](img/p130-01.jpg)\n\n1.  点击 `其他` 按钮，即可手动输入你想要加入的网络名称。\n\
  2.  输入 Wi-Fi 网络 `名称`。\n\n    ![images](img/p130-02.jpg)\n\n3.  点击 `安全性` 标签。\n4.\
  \  选择该网络使用的安全类型。如果你不确定，需要向网络管理员咨询。\n\n    ![images](img/p130-03.jpg)\n\n当你获得所需信息后，输入信息及正确的密码，这个新网络将被保存到你的网络列表中，供以后访问。\n\
  \n#### 重新连接之前加入过的 Wi-Fi 网络\n\niPod touch 的一个优点是，当你回到曾经加入过的 Wi-Fi 网络区域时（无论是开放网络、安全网络还是密码保护网络），它会自动重新连接，而无需事先询问。不过，你可以关闭此自动连接功能，具体方法见下一节。\n\
  \n##### “询问是否加入网络”总开关\n\n这里有一个 `询问是否加入网络` 总开关，默认设置为 `开启`。已知网络会自动连接，但此设置只在没有已知网络可用时生效。当此开关设为\
  \ `开启` 时，系统会询问你是否加入可见的 Wi-Fi 网络。如果有可用但你不认识的网络，连接前会向你询问。\n\n如果此开关设为 `关闭`，你必须手动加入未知网络。\n\
  \n![images](img/p131-01.jpg)\n\n为什么要关闭此功能？\n\n这样做可以作为一项安全措施，例如，如果你不想让孩子在未经你允许的情况下使用\
  \ iPod touch 加入无线网络。\n\n此外，如果 iPod touch 在你不想连接 Wi-Fi 的区域（例如途经有很多热点的场所）不断弹出 `加入网络`\
  \ 连接界面，也会让人感到烦恼。\n\n##### 每个网络上的“自动加入”和“自动登录”开关\n\n![images](img/p131-02.jpg)\n\n\
  有时，你可能会发现某个特定的 Wi-Fi 网络有额外的开关，它们会覆盖主开关 `询问是否加入网络` 的设置。点击网络名称旁边的小蓝色`箭头`图标\n\n![images](img/p131-03.jpg)\
  \ 可以查看此 Wi-Fi 网络的详细信息。默认情况下，`自动加入` 和 `自动登录` 都设为 `开启`。\n\n若要禁用 `自动加入` 或 `自动登录`，点击相应开关将其设为\
  \ `关闭`。\n\n##### 忘记（或删除）一个网络\n\n如果你发现不再需要连接到列表中的某个网络，可以选择 `忘记`——即将其从网络列表中移除。请按照以下步骤操作：\n\
  \n![images](img/p132-01.jpg)\n\n1.  点击 `设置` 图标。\n2.  点击 `Wi-Fi` 查看你的网络列表。\n3.  点击你想忘记的网络旁边的小蓝色`箭头`图标![images](img/p132-02.jpg)，即可看到此处显示的屏幕。\n\
  4.  点击屏幕顶部的 `忘记此网络`。\n\n    ![images](img/p132-03.jpg)\n\n5.  系统将弹出一条警告。只需点击 `忘记`，该网络将不再显示在你的列表中。\n\
  \n    ![images](img/p132-04.jpg)\n\n### 乘坐飞机：飞行模式\n\n乘坐飞机时，乘务员通常会要求你在起飞和降落期间关闭所有便携式电子设备。然后，当飞机达到一定高度后，乘务员会告知可以重新打开“所有经批准的电子设备”。\n\
  \n如果你需要完全关闭 iPod touch，请按住右上角的 `电源` 按钮，然后用手指 `滑动来关机`。\n\n由于 iPod touch 是一款仅支持 Wi-Fi\
  \ 的设备，为什么你会想要或需要开启飞行模式或关闭 Wi-Fi 呢？iPod touch 还包含其他无线电模块，例如蓝牙，而飞行模式可以一次性快捷地关闭所有无线功能。\n\
  \n此外，如果你电量不足且不需要联网，关闭 Wi-Fi 或开启飞行模式是尽可能延长剩余电池使用时间的快捷方法。\n\n要启用 `飞行模式`，请按照以下步骤操作：\n\
  \n![images](img/p133-01.jpg)\n\n1.  点击 `设置` 图标。\n2.  将左侧栏顶部的 `飞行模式` 旁边的开关设为 `开启`。\n\
  3.  请注意，Wi-Fi 将自动关闭。\n\n    **提示：** 有些航空公司提供机上 Wi-Fi 网络。在这些航班上，你可以在适当的时候将 Wi-Fi\
  \ 重新设为 `开启`。\n\n你可以按照以下步骤打开或关闭 Wi-Fi 连接：\n\n1.  点击 `设置` 图标。\n2.  点击屏幕顶部的 `Wi-Fi`。\n\
  \n    ![images](img/p133-02.jpg)\n\n3.  要启用 Wi-Fi 连接，将页面顶部的 `Wi-Fi` 旁边的开关设为 `开启`。\n\
  4.  要禁用 Wi-Fi，将同一个开关设为 `关闭`。\n5.  选择 Wi-Fi 网络，并按照乘务员给出的步骤进行连接。\n\n### VPN：虚拟专用网络\n\
  \n你的组织可能设有所谓的 VPN，即*虚拟专用网络*。VPN 允许你将 iPod touch、笔记本电脑或其他设备安全地连接到公司网络。\n\n\n\n####\
  \ 建立连接\n\n要建立连接，你需要从所在机构的技术服务台或网络管理员处获取 VPN 类型和具体的登录说明。然后，在 iPod touch 上的 **“设置”**\
  \ 应用中，将这些登录信息输入到 **“VPN”** 区域。\n\n**提示：** 如果你已经设置了电脑来连接 VPN，很可能可以省去致电技术服务台的步骤，并跳过第\
  \ 1 步。这是因为你的 iPod touch 很可能使用与电脑相同的 VPN 登录凭据。\n\n##### 第 1 步：联系你所在机构的技术服务台\n\n你需要向技术服务台或\
  \ VPN 管理员询问登录 VPN 的详细信息。你的 iPod touch 当前支持连接以下类型的 VPN：**L2TP**、**PPTP** 和 **IPSec**（Cisco）。你还需要了解你的\
  \ VPN 是否使用 **代理**，以及配置是手动还是自动。\n\n##### 第 2 步：在 iPod touch 上设置 VPN 连接\n\n掌握了登录说明和\
  \ VPN 连接类型后，你就可以在 iPod touch 上连接了：\n\n1.  轻点 **“设置”** 图标。\n\n    ![images](img/p134-01.jpg)\n\
  \n2.  轻点 **“通用”**。\n3.  轻点 **“网络”**。\n4.  向下滚动到屏幕底部，轻点 **“VPN”**。\n5.  在 **“VPN”**\
  \ 屏幕上，轻点 **“VPN”** 选项旁边的开关，将其设置为 **“开启”**。随后你应会进入 **“添加配置”** 屏幕。如果没有，则轻点底部的 **“添加\
  \ VPN 配置”** 来设置一个新的 VPN 连接。\n\n    ![images](img/p135-01.jpg)\n\n6.  **“添加配置”**\
  \ 屏幕是使用从技术服务台或 VPN 管理员处获得的信息来设置 VPN 登录详细信息的地方。\n\n    ![images](img/p135-02.jpg)\n\
  \n7.  如果你的 VPN 是 **L2TP** 类型，则你会看到此处所示的屏幕。滚动到底部，并根据需要输入 **代理** 信息。\n8.  如果你的 VPN\
  \ 是 **PPTP** 类型，则轻点顶部的 **“PPTP”**，然后使用此处所示的屏幕。滚动到底部，并根据需要输入 **代理** 信息。\n\n    ![images](img/p136-01.jpg)\n\
  \n9.  如果你的 VPN 是 **IPSec**（Cisco）类型，则轻点 **“IPSec”** 并使用此处所示的屏幕。滚动到底部，并根据需要输入 **代理**\
  \ 信息。\n\n    ![images](img/p136-02.jpg)\n\n10.  完成设置后，轻点右上角的 **“存储”** 按钮。\n11. \
  \ 如果登录遇到问题，请确保你处于无线网络信号良好的区域，并检查你是否正确输入了所有登录凭据。由于输入的密码会隐藏显示，这可能会有些困难。在致电技术服务台之前，不妨尝试重新输入密码和服务器信息。\n\
  \n#### 了解何时已连接到 VPN 网络\n\n你会在网络连接状态显示的右侧看到一个小型 **“VPN”** 图标 ![images](img/p137-01.jpg)。*只有*当你看到此图标时，才表示你已经安全地连接到\
  \ VPN 网络。\n\n#### 切换 VPN 网络\n\n你可能需要连接多个 VPN 网络。你可以按照以下步骤在 iPod touch 上选择不同的 VPN\
  \ 配置：\n\n1.  轻点 **“设置”** 图标。\n2.  轻点 **“通用”**。\n3.  轻点 **“网络”**。\n4.  向下滚动到屏幕底部，轻点\
  \ **“VPN”**。\n5.  在 VPN 屏幕上，轻点另一个 **“VPN 配置”** 以连接到它。除非你想更改该网络的登录设置，否则不要轻点带有 > 符号的蓝色\
  \ **“圆圈”** 图标。\n\n"
- '# 第 5 章


  ## AirPlay 与蓝牙


  在本章中，我们将向你展示如何将 iPod touch 与任何兼容 AirPlay 或蓝牙的设备连接，无论是 Apple TV、立体声扬声器还是无线耳机。


  ### 了解 AirPlay


  *AirPlay* 是苹果公司专有的视频和音频流传输协议。AirPlay 通过你本地家庭、学校或办公室的 Wi-Fi 网络工作。要在 iPod touch 上使用
  AirPlay，你必须确保所有设备都连接到同一个 Wi-Fi 网络。


  ![images](img/p139-01.jpg)


  #### 与 iPod touch 兼容的 AirPlay 设备


  在撰写本文时，仅有 2010 年款的 Apple TV 支持 AirPlay 视频流传输。通过它，你可以将内容直接从 iPod touch 流传输到大屏幕电视上，与同事、朋友和家人分享。


  苹果的 AirPort Express Wi-Fi 路由器有一个音频输出接口，可以连接到扬声器以实现 AirPlay 音频播放。各种第三方配件制造商也在推出兼容
  AirPlay 的扬声器。通过 AirPlay，你可以直接在你的 iPod touch 上远程控制播放和音量。


  ### 设置和使用 AirPlay


  AirPlay 已内置于 iPod touch 中。只要你的所有设备都连接到同一个 Wi-Fi 网络，就无需进行额外设置。


  几个内置的 iPod touch 应用支持 AirPlay，包括 **“视频”**、**“音乐”** 和 **“YouTube”**。一些使用了苹果默认媒体播放器（例如
  **“Air Video”**）的 App Store 应用也支持 AirPlay。请按照以下步骤从支持该功能的应用中使用 AirPlay：


  ![images](img/p140-01.jpg)


  1\. 轻点屏幕右下角的蓝色 **AirPlay** 图标。


  2\. 从可用设备列表中选择用于流传输音乐的设备。


  3\. 若要将视频或音乐切换回你的 iPod touch，只需再次轻点 **AirPlay** 图标，然后从列表中选择 **“iPod touch”**。


  **注意：** **AirPlay** 图标会调出同时包含蓝牙和 Wi-Fi 连接设备的列表。有关蓝牙的更多信息，请参见下一节。


  你可以通过轻点 **“Apple TV”** 来选择它。现在，你的音乐或视频将从选定的 AirPlay 设备开始播放。你可以通过再次触摸屏幕上的 **AirPlay**
  图标来验证这一点。你应该会看到在新选定的 AirPlay 立体声蓝牙设备旁边有一个 **“选中标记”** 图标，并且你应该能听到音乐从该音源发出。


  **提示：** 为了节省 iPod touch 的电池电量，在将 AirPlay 内容流传输到其他设备时，可以按下 **“睡眠”** 按钮关闭屏幕。你的音乐或视频将继续播放，但你不会因为屏幕亮着而浪费电量。


  #### AirPlay 镜像


  当前的 iPod touch 不仅能让你将视频或音乐从 iPod touch 流传输到 Apple TV；还能让你共享任何应用的屏幕——无论是工作中的商务演示、与家人的棋盘游戏，还是与远方亲戚的视频通话。能够将
  **Keynote**、**Infinity Blade** 或 **FaceTime** 从小小的 iPod touch 屏幕带到巨大的电视机上，这确实将个人的私密体验转变为有趣的社交活动。


  请按照以下步骤使用 AirPlay 镜像功能：


  ![images](img/p141-01.jpg)


  4\. 轻点你想要镜像的应用。在此示例中，我们使用的是 **Infinity Blade**。


  5\. 应用启动后，双击 Home 按钮以调出快速应用切换器。


  6\. 从左向右滑动以找到音频/视频控制项。（它们在最末端，所以请持续滑动直到无法再滑动为止。）


  ![images](img/p141-02.jpg)


  7\. 轻点 **AirPlay 按钮** 以调出你 Wi-Fi 网络上支持 AirPlay 的设备列表。


  8\. 选择 **Apple TV**。


  9\. 将 **“AirPlay 镜像”** 开关切换至 **“开启”**。


  10\. 再次点击 **Home** 按钮以返回你的应用。


  11\. 现在你应该能在屏幕上看到 **Infinity Blade** 了。放马过来吧！


  要停止 AirPlay 镜像，请重复相同步骤，并从设备列表中选择 iPod touch。




  ### 了解蓝牙


  苹果最新的 iPod touch 支持蓝牙 4.0，该技术不仅包含传统的蓝牙功能，还具备更先进的高速与低功耗特性。这意味着你可以享受更高质量的通话或音乐，且续航时间比以往更久。


  得益于名为 `A2DP` 的技术，你还可以将音乐流式传输到支持蓝牙的立体声设备，包括许多新型车载立体声音响和车载套件。


  **注意：** 你必须使用第三方蓝牙适配器或支持蓝牙的立体声音响，才能通过蓝牙技术流式传输音乐。


  ### 了解蓝牙


  蓝牙允许你的 iPod touch 与设备进行无线通信。蓝牙是一种从每个设备发射信号的小型无线电。在将外设与 iPod touch 配合使用之前，你需要将该设备与
  iPod touch 进行配对。许多蓝牙设备可在距离 iPod touch 最远 30 英尺（约 9 米）的范围内使用。


  ![图片](img/p142-01.jpg)


  #### 兼容 iPod touch 的蓝牙设备


  iPod touch 可兼容多种蓝牙设备，包括蓝牙耳机、蓝牙立体声音响及适配器、蓝牙键盘、蓝牙车载音响系统、蓝牙耳麦以及免提设备。iPod touch 支持 `A2DP`（即立体声蓝牙）和
  `AVRCP`（可让你远程控制播放和音量）。


  ### 与蓝牙设备配对


  你使用蓝牙的主要场景可能是连接蓝牙耳机或蓝牙立体声适配器。任何蓝牙耳机都应能与你的 iPod touch 良好配合。要开始使用任何蓝牙设备，你需要先将其与 iPod
  touch 配对（连接）。


  #### 开启蓝牙


  ![图片](img/p143-01.jpg)


  使用蓝牙的第一步是打开蓝牙无线电。请按照以下步骤操作：


  ![图片](img/p143-02.jpg)


  1.  点击 **设置** 应用。

  2.  接着点击 **通用**。

  3.  点击 **蓝牙**。默认情况下，iPod touch 的蓝牙初始设置为 **关闭**。点击开关将其拨至 **打开** 位置。


  **提示：** 蓝牙会增加电池消耗。如果你在一段时间内不打算使用蓝牙，请考虑将开关拨回 **关闭** 位置。


  ![图片](img/p143-02.jpg)


  #### 配对接头戴式设备或任何蓝牙设备


  一旦打开蓝牙，iPod touch 将开始搜索附近的蓝牙设备，例如蓝牙耳麦或立体声适配器（参见 图 5–1）。为了让 iPod touch 找到你的蓝牙耳麦，你需要将该设备置于
  *配对模式*。请仔细阅读耳麦附带的说明——通常需要按住某个组合键才能进入此模式。


  **提示：** 某些耳麦需要你按住某个按钮五秒钟，直到你看到一串闪烁的蓝色或红/蓝色灯光。一些配件（例如 Apple 无线蓝牙键盘）会自动进入配对模式。


  一旦 iPod touch 检测到蓝牙设备，它将尝试自动与之配对。如果配对自动完成，则你无需进行其他操作。


  ![图片](img/0501.jpg)


  **图 5–1.** *蓝牙设备已发现，但尚未配对*


  **注意：** 某些蓝牙设备（例如耳麦）可能会要求你在键盘上输入一串数字（*配对码*）（参见 图 5–2）。


  ![图片](img/0502.jpg)


  **图 5–2.** *在配对过程中出现提示时，输入四位数的配对码。*


  较新的耳麦——例如这里使用的 Aliph Jawbone ICON——会自动与你的 iPod touch 配对。只需将耳麦置于配对模式，并将 iPod touch
  的 **蓝牙** 选项设置为 **开启**——你所需要做的就是这些！


  ![图片](img/p145-01.jpg)


  配对将是自动完成的，你之后应该无需重新配对耳麦。


  ### 蓝牙立体声（A2DP）


  ![图片](img/p145-02.jpg)


  当今先进蓝牙技术的伟大特性之一，就是能够通过蓝牙无线传输音乐。这项技术的专业名称是 `A2DP`，但更通俗的叫法是 *立体声蓝牙*。


  #### 连接到立体声蓝牙设备


  使用立体声蓝牙的第一步是连接到一个支持立体声蓝牙的设备。这可以是内置此技术的车载音响，也可以是一副蓝牙耳机或音箱。


  ![图片](img/p145-03.jpg)


  首先，按照制造商的说明将蓝牙设备置于配对模式，然后如本章前面所示，从 **设置** 图标进入蓝牙设置页面。


  ![图片](img/p145-04.jpg)


  连接后，你会在蓝牙设备列表下方看到新的立体声蓝牙设备。有时你会看到设备的全名或部分名称；其他时候你只会看到“耳机”。点击设备右侧的 **箭头** 图标，你将在下一个屏幕的
  **蓝牙** 标签旁看到设备的实际名称，如下图所示。


  接下来，点击你的 **音乐** 应用，开始播放任何歌曲、播放列表、播客或视频音乐库。


  请按照以下步骤选择音频输出设备：


  4.  点击屏幕右下角的蓝色 **AirPlay** 图标。


  ![图片](img/p146-01.jpg)


  5.  从可用设备列表中选择用于流式传输音乐的设备。


  6.  要将音乐播放切换回 iPod touch，只需再次点击 **AirPlay** 图标，然后从列表中选择 iPod touch。


  **注意：** **AirPlay** 图标会弹出一个列表，其中包含通过蓝牙和 Wi-Fi 连接的音频设备，例如 Apple TV 或 AirPort Express
  连接的音箱。你可以从中任选其一。


  我们通过点击选择了 Jawbone JAMBOX。现在，你的音乐将从选定的蓝牙设备开始播放。你可以再次触摸屏幕上的 **AirPlay** 图标来验证这一点。新的立体声蓝牙设备旁边应该会出现一个
  **对勾** 图标，并且你应该能听到音乐从该音源播放出来。


  ### 断开连接或忽略蓝牙设备


  有时，你可能想要断开蓝牙设备与 iPod touch 的连接。这很容易做到。按照本章前面所述的方式进入蓝牙设置。接着，点击你想要断开的设备以进入下一个屏幕，点击
  **忽略此设备** 按钮，然后确认你的选择。


  这将从 iPod touch 中删除该蓝牙配置文件（参见 图 5-5）。


  **注意：** 蓝牙的有效范围通常只有约 30 英尺（约 9 米）。如果你不在蓝牙设备附近，则应关闭蓝牙。当你实际准备使用时，可以随时重新打开它。


  ![图片](img/0505.jpg)


  **图 5–5.** *忽略或断开蓝牙设备*


