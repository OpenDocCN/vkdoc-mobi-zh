- "# 3. 集合\n\n集合是一种无序集合（意味着你不会按照定义时的顺序获取元素），其中包含唯一的、非`nil`元素。它必须遵循`Hashable`协议，这意味着它必须提供一个`hashValue`属性。这一点很重要，因为集合是无序的，而`hashValue`用于访问集合中的元素。\n\
  \n集合的访问时间比数组更高效。在数组中查找一个元素时，最坏情况是`O(n)`，其中`n`是数组的大小；而在集合中，查找时间恒定为`O(1)`。与其他集合类型不同，声明集合时必须指定集合类型。\n\
  \n```\n// 完整语法声明\nvar intSet = Set<Int>()\n// 使用数组字面量初始化集合\nvar stringSet: Set =\
  \ [\"One\", \"Two\", \"Three\"]\n```\n\n## 访问、添加和删除集合中的元素\n\n### 访问元素\n\n如前所述，集合是无序的且没有索引，因此无法像数组那样使用下标语法来访问集合中的元素。可以通过集合自身的方法和属性，或者使用`for`-`in`循环来访问元素。\n\
  \n```\n// 访问元素\nfor num in stringSet {\n    print(num)\n}\n```\n\n输出结果为：\n\n```\n\
  Two\nOne\nThree\n```\n\n若要按顺序遍历，可以使用以下方法：\n\n```\n// 有序遍历\nfor num in stringSet.sorted()\
  \ {\n    print(num)\n}\n```\n\n要检查集合中是否存在某个元素，可以使用`contains(_:)`方法。\n\n```\n// 检查元素是否存在\n\
  if stringSet.contains(\"One\") {\n    print(\"找到元素\")\n} else {\n    print(\"未找到元素\"\
  )\n}\n```\n\n输出结果为：\n\n```\n找到元素\n```\n\n### 添加元素\n\n使用`insert()`方法可以向集合中添加新元素。\n\
  \n```\n// 插入新元素\nstringSet.insert(\"Four\")\nprint(stringSet)\n```\n\n输出结果为：\n\n\
  ```\n[\"Four\", \"One\", \"Two\", \"Three\"]\n```\n\n### 删除元素\n\n有以下几种方法可用于删除集合中的元素。\n\
  \n- `remove(_:)` – 当你知道要删除的元素实例时\n- `remove(at:)` – 当你知道要删除的索引时\n- `removeFirst()`\
  \ – 删除第一个元素（起始索引）\n- `removeAll()` 或 `removeAll(keepingCapacity:)` – 删除所有元素\n\n\
  ```\n// 删除元素\nstringSet.remove(\"Four\")\n// 删除索引处的元素\nif let idx = stringSet.firstIndex(of:\
  \ \"One\") {\n    stringSet.remove(at: idx)\n}\n// 删除第一个元素\nstringSet.removeFirst()\n\
  // 删除所有元素\nstringSet.removeAll()\n```\n\n## 集合运算\n\n使用集合的主要优势之一是可以执行两类集合运算——比较运算以及成员关系和相等性运算。这些运算与数学中的集合运算类似。\n\
  \n### 比较运算\n\n在 Swift 中，有四种方法可执行比较运算：`union`（并集）、`intersection`（交集）、`subtracting`（差集）和`symmetricDifference`（对称差集）。现在一起来了解一下它们。\n\
  \n#### 并集\n\n两个集合的并集包含两个集合中的所有值（图 3-1）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig1_HTML.png](img/490882_1_En_3_Fig1_HTML.png)\n\
  \n`union(_:)`和`formUnion(_:)`方法用于合并两个集合，创建一个包含两个集合所有值的新集合。第二个函数会删除第一个集合（A）中的所有元素，并插入\
  \ A 和 B 的并集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用`formUnion(_:)`方法，第一个集合 A 必须使用`var`关键字声明。\n\
  \n```\n// 并集\nlet A: Set = [1, 3, 5, 7]\nlet B: Set = [0, 2, 4, 6]\nprint(A.union(B))\n\
  ```\n\n输出结果为：\n\n```\n[3, 6, 2, 0, 7, 5, 1, 4]\n```\n\n#### 交集\n\n两个集合的交集是仅包含两个集合共有元素的集合（图\
  \ 3-2）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig2_HTML.png](img/490882_1_En_3_Fig2_HTML.png)\n\
  \n`intersection(_:)`和`formIntersection(_:)`方法用于求两个集合的交集，创建一个包含两个集合共有元素的新集合。第二个函数会删除第一个集合（A）中的所有元素，并插入\
  \ A 和 B 的交集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用`formIntersection(_:)`方法，第一个集合 A\
  \ 必须使用`var`关键字声明为变量。\n\n```\n// 交集\nlet A: Set = [1, 2, 3, 4, 5]\nlet B: Set = [0,\
  \ 2, 4, 6, 8]\nprint(A.intersection(B))\n```\n\n输出结果为：\n\n```\n[2, 4]\n```\n\n####\
  \ 差集\n\n两个集合的差集包含第一个集合中所有不属于第二个集合的元素（图 3-3）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig3_HTML.png](img/490882_1_En_3_Fig3_HTML.png)\n\
  \n`subtracting(_:)`和`subtract(_:)`方法用于两个集合的差集运算。`subtract(_:)`会删除第一个集合（A）中的所有元素，并插入\
  \ A 与 B 的差集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用此方法，第一个集合 A 必须使用`var`关键字声明为变量。\n\
  \n```\n// 差集\nvar A: Set = [1, 3, 5, 7, 9]\nlet B: Set = [0, 3, 7, 6, 8]\nprint(A.subtracting(B))\n\
  ```\n\n输出结果为：\n\n```\n[1, 5, 9]\n```\n\n#### 对称差集\n\n两个集合的对称差集包含两个集合中所有不共有的元素（图\
  \ 3-4）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig4_HTML.png](img/490882_1_En_3_Fig4_HTML.png)\n\
  \n`symmetricDifference(_:)`和`formSymmetricDifference(_:)`方法用于求两个集合的对称差集。这里适用相同的原则：要使用第二个函数，第一个集合必须声明为变量，并且此方法（`formSymmetricDifference(_:)`）会删除第一个集合（A）中的所有元素，并插入两个集合的对称差集。\n\
  \n```\n// 对称差集\nvar A: Set = [1, 2, 3, 4, 5]\nvar B: Set = [0, 2, 4, 6, 8]\nprint(A.symmetricDifference(B))\n\
  ```\n\n输出结果为：\n\n```\n[5, 1, 6, 3, 0, 8]\n```\n\n## 成员关系和相等性运算\n\n### 集合相等\n\n如果两个集合包含完全相同的值，则认为它们相等，值的顺序无关紧要。\n\
  \n```\n// 集合相等\nlet A: Set = [2, 4, 6, 8, 10]\nlet B: Set = [0, 3, 7, 6, 8]\nlet\
  \ C: Set = [10, 8, 4, 2, 6]\n\nif A == B {\n    print(\"A 和 B 相等\")\n} else {\n\
  \    print(\"A 和 B 不相等\")\n}\n\nif A == C {\n    print(\"A 和 C 相等\")\n} else {\n\
  \    print(\"A 和 C 不相等\")\n}\n```\n\n输出结果为：\n\n```\nA 和 B 不相等\nA 和 C 相等\n```\n\n\
  \n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n---\n\n\n### 集合成员关系\n\n使用集合成员关系方法，可以识别两个集合之间的关系。\n\
  \n-   `isSubset(of:)` – 使用此方法来判断一个集合的所有值是否都包含在指定的集合中。\n-   `isStrictSubset(of:)`\
  \ – 使用此方法来判断一个集合是否为指定集合的子集，但不相等。\n-   `isSuperset(of:)` – 使用此方法来判断一个集合是否包含指定集合的所有值。\n\
  -   `isStrictSuperset(of:)` – 使用此方法来判断一个集合是否为指定集合的超集，但不相等。\n-   `isDisjoint(with:)`\
  \ – 使用此方法来判断两个集合是否没有共同的值。\n\n```\n//Set membership\nlet A: Set = [2, 4, 6, 8, 10]\n\
  let B: Set = [0, 4, 2, 6, 7, 9, 10, 8]\nprint(\"isSubset:\", A.isSubset(of: B))\n\
  print(\"isSuperset:\", B.isSuperset(of: A))\nprint(\"isStrictSubset:\", A.isStrictSubset(of:\
  \ B))\nprint(\"isDisjointWith:\", A.isDisjoint(with: B))\n```\n\n输出结果将是\n\n```\n\
  isSubset: true\nisSuperset: true\nisStrictSubset: true\nisDisjointWith: false\n\
  ```\n\n`isSubset` 返回 `true`，因为集合 B 包含了 A 中的所有元素。\n\n`isSuperset` 返回 `true`，因为集合\
  \ B 包含了 A 的所有值。\n\n`isStrictSubset` 返回 `true`，因为集合 B 包含了 A 中的所有元素，并且两个集合不相等。\n\n\
  `isDisjointWith` 返回 `false`，因为集合 A 和 B 有一些共同的值。\n\n## 总结\n\n在本章中，您学习了集合的一般结构、如何在\
  \ Swift 中声明它们，以及如何选择、添加和移除元素，以及诸如并集、交集、差集和对称差集等集合操作。在下一章中，您将学习栈的数据结构类型。\n\n"
- "# 4. 栈\n\n栈是一种后进先出 (LIFO) 的数据结构。栈的结构可以想象成一堆垂直堆叠的物体（图 4-1）。在提取这些物体时，最后添加到栈中的物体最先被移除。栈与数组类似，但控制能力有限。\n\
  \n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png](img/490882_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1 栈结构\n\n栈实现了三种方法。通过使用 `push()` 方法，可以在栈顶添加一个新元素；使用 `pop()` 方法从栈顶移除一个元素；使用\
  \ `peek()` 方法返回栈顶元素而不将其移除（图 4-2）。\n\n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png](img/490882_1_En_4_Fig2_HTML.png)\n\
  \n图 4-2 栈的三种方法\n\n## 在 Swift 中使用栈\n\n有许多应用程序使用栈，例如 Excel 或 Word 中的撤销/重做栈、单词反转、浏览器中的后退/前进、回溯算法、括号检查等等。\n\
  \n让我们继续使用 Swift 来实现它。通过使用 Swift 泛型，我们为栈提供了灵活性，以便我们可以存储任何类型。首先，我们创建一个 `Stack` 结构体，并声明一个使用\
  \ Swift 泛型且初始化为空数组的私有数组类型。这个 `items` 数组将用于保存我们栈的值。\n\n```\nimport Foundation\npublic\
  \ struct Stack {\n    private var items: [T] = []\n}\n```\n\n然后我们将继续编写栈所需的三种方法。首先，我们将创建\
  \ `push()` 函数。\n\n```\nimport Foundation\npublic struct Stack {\n    private var\
  \ items: [T] = []\n    //Push 方法\n    mutating func push(element: T) {\n       \
  \ items.append(element)\n    }\n}\n```\n\n基本上，我们在这里所做的是通过向数组顶部添加一个元素来追加 `items`。`mutating`\
  \ 关键字用于允许该方法修改结构体中包含的数据。请注意，压栈操作将新元素放在数组的末尾，而不是开头。在数组的开头插入是一个昂贵的 `O(n)` 操作，因为它需要将所有现有的数组元素在内存中移动。在末尾添加是\
  \ `O(1)` 操作；无论数组大小如何，它总是花费相同的时间。\n\n然后，我们将编写 `pop()` 方法，该方法负责从栈中提取数据。\n\n```\nimport\
  \ Foundation\npublic struct Stack {\n    private var items: [T] = []\n    //Push\
  \ 方法\n    mutating func push(element: T) {\n        items.append(element)\n    }\n\
  \    //Pop 方法\n    mutating func pop() -> T? {\n        return items.popLast()\n\
  \    }\n}\n```\n\n数组提供了一个 `popLast()` 方法来移除数组中最顶部的元素，并且它返回一个可选值，这与 `removeLast()`\
  \ 不同，这就是为什么我们将返回类型声明为可选的 `T?` 的原因。\n\n剩下的唯一方法是 `peek()` 函数。它返回栈的顶部元素。\n\n```\nimport\
  \ Foundation\npublic struct Stack {\n    private var items: [T] = []\n    //Push\
  \ 方法\n    mutating func push(element: T) {\n        items.append(element)\n    }\n\
  \    //Pop 方法\n    mutating func pop() -> T? {\n        return items.popLast()\n\
  \    }\n    //Peek 方法\n    func peek() -> T? {\n        return items.last\n    }\n\
  }\n```\n\n## 栈结构\n\n让我们看一个如何使用我们的栈结构的示例。\n\n```\nvar customStack = Stack()\n//使用\
  \ push 方法\ncustomStack.push(element: 4)\nprint(customStack)\ncustomStack.push(element:\
  \ 8)\nprint(customStack)\ncustomStack.push(element: 12)\nprint(customStack)\n//使用\
  \ peek 方法\nprint(customStack.peek()!)\n//使用 pop 方法\nvar x = customStack.pop()\n\
  print(x!)\nx = customStack.pop()\nprint(x!)\n```\n\n输出结果将是\n\n```\nStack(items:\
  \ [4])\nStack(items: [4, 8])\nStack(items: [4, 8, 12])\n```\n\n基本上，我们使用整数类型的 `Stack`\
  \ 结构体创建了 `customStack`，并使用 `push()` 方法在栈顶插入新元素。每次插入后，我们都会将栈打印到控制台，以查看插入到栈中的元素的顺序，很明显它是从顶部插入的。然后我们使用\
  \ `peek()` 方法并将值打印到控制台；可以很容易地看出，返回的是数组的最后一个元素，即顶部元素。最后，我们使用 `pop()` 方法移除顶部的值并返回它，很明显，当您第二次运行它时，由于顶部的元素已被移除，它将返回下一个元素。\n\
  \n## 栈扩展\n\n我们可以为栈添加扩展以扩展其行为和功能。有许多扩展，例如 `CustomStringConvertible`、`ExpressibleByArrayLiteral`、`IteratorProtocol`、`Sequence`\
  \ 协议等，可以添加到栈中以获得更多功能。通过添加 `CustomStringConvertible` 协议，我们可以根据需要更改打印输出。\n\n```\n\
  extension Stack: CustomStringConvertible {\n    public var description: String {\n\
  \        return items.description\n    }\n}\n```\n\n## 总结\n\n在本章中，您学习了栈的一般结构、如何在\
  \ Swift 中创建它们，以及如何使用 push、pop 和 peek 方法以及栈扩展。在下一章中，您将学习队列的数据结构类型。\n\n\n\n"
- "# 5. 队列\n\n队列是一种先进先出（FIFO）的数据结构，意味着先到先服务。它也被称为“等待队列”，顾名思义，可以很容易地想象成一排人正在排队（如图 5-1\
  \ 所示）。\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg](img/490882_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n典型的队列结构\n\n当新人到来时，他会站在队伍的末尾，这正好对应了向队列中添加数据：数据被放置在末尾。使用术语 `enqueue` 来指代向队列中添加元素的操作。当从队列中提取数据时，队列中停留时间最长的数据会被最先移除——术语\
  \ `dequeue` 指代从队列中提取数据的操作（如图 5-2 所示）。\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png](img/490882_1_En_5_Fig2_HTML.png)\n\
  \n图 5-2\n\n入队/出队示例\n\n队列实现了以下几种方法。\n\n*   `enqueue()` – 在队列末尾添加一个元素\n*   `dequeue()`\
  \ – 移除并返回队列中的第一个元素\n*   `peek()` – 返回队列中的第一个元素，但不移除它\n*   `count` – 返回队列中的元素数量\n\
  *   `clear()` – 将队列重置为空状态\n*   `isEmpty()` – 如果队列为空则返回 true\n*   `isFull()` – 如果队列已满则返回\
  \ true\n\n顾名思义，队列用于需要按“先进先出”的顺序管理任何一组对象，同时其他对象等待其轮次的场景。就像下面的示例：\n\n1.  餐厅的销售点系统。很明显，订单必须按照接收的顺序进行处理。当收到订单时，它被写入队列的尾部，而厨师通过设备从队列头部读取订单。这让厨师能够按照接收订单的顺序烹饪食物。\n\
  2.  在单个共享资源（如打印机、CPU 任务调度等）上处理请求。\n3.  在现实场景中，呼叫中心电话系统使用队列来按顺序保存呼叫者，直到有服务代表空闲。\n\
  4.  实时系统中的中断处理。中断按照它们到达的相同顺序进行处理。\n5.  MP3 播放器、便携式 CD 播放器和 iPod 播放列表上的缓冲区。自动点唱机播放列表——歌曲添加到末尾，并从列表开头播放。\n\
  6.  当编写一个可能被中断（例如，通过鼠标点击或无线连接）的实时系统时，必须在继续当前活动之前立即处理中断。如果中断应该按照它们到达的顺序处理，那么 FIFO\
  \ 队列就是合适的数据结构。\n\n### 实现\n\n通过使用 Swift 泛型，我们为队列提供了灵活性，使其可以存储任何类型。首先，我们将创建一个队列结构体，并使用一个空的\
  \ `T` 类型数组声明一个私有的 Swift 泛型数组。\n\n```\nimport Foundation\npublic struct Queue {\n\
  \    private var data: [T] = []\n}\n```\n\n然后，我们将添加 `enqueue()` 方法，该方法将新元素追加到队列的末尾。同样，这里的时间复杂度为\
  \ **O(1)**。\n\n```\nimport Foundation\npublic struct Queue {\n    private var data:\
  \ [T] = []\n\n    //入队方法\n    public mutating func enqueue(element: T) {\n     \
  \   data.append(element)\n    }\n}\n```\n\n我们继续声明 `dequeue()` 方法，该方法移除并返回队列中的第一个元素，如果队列为空，则返回\
  \ `nil`。\n\n```\nimport Foundation\npublic struct Queue {\n    private var data:\
  \ [T] = []\n\n    //入队方法\n    public mutating func enqueue(element: T) {\n     \
  \   data.append(element)\n    }\n\n    //出队方法\n    public mutating func dequeue()\
  \ -> T? {\n        return data.removeFirst()\n    }\n}\n```\n\n另一个可以使用的函数是 `peek()`，它返回队列中的第一个元素而不移除它，同样，如果队列为空，则返回\
  \ `nil`。\n\n```\npublic struct Queue {\n    private var data: [T] = []\n\n    //入队方法\n\
  \    public mutating func enqueue(element: T) {\n        data.append(element)\n\
  \    }\n\n    //出队方法\n    public mutating func dequeue() -> T? {\n        return\
  \ data.removeFirst()\n    }\n\n    //查看方法\n    public func peek() -> T? {\n    \
  \    return data.first\n    }\n}\n```\n\n我们甚至可以更进一步，声明前面提到的辅助函数。辅助函数的完整代码如下——`count`、`clear()`、`isEmpty()`\
  \ 和 `isFull()`：\n\n```\nimport Foundation\npublic struct Queue {\n    private var\
  \ data: [T] = []\n\n    //入队方法\n    public mutating func enqueue(element: T) {\n\
  \        data.append(element)\n    }\n\n    //出队方法\n    public mutating func dequeue()\
  \ -> T? {\n        return data.removeFirst()\n    }\n\n    //查看方法\n    public func\
  \ peek() -> T? {\n        return data.first\n    }\n\n    // 清空\n    public mutating\
  \ func clear() {\n        data.removeAll()\n    }\n\n    //计数\n    public var count:\
  \ Int {\n        return data.count\n    }\n\n    //容量将用于 isFull() 方法\n    public\
  \ var capacity: Int {\n        get {\n            return data.capacity\n       \
  \ }\n        set {\n            data.reserveCapacity(newValue)\n        }\n    }\n\
  \n    //isFull 方法\n    public func isFull() -> Bool {\n        return count == data.capacity\n\
  \    }\n\n    //isEmpty() 方法\n    public func isEmpty() -> Bool {\n        return\
  \ data.isEmpty\n    }\n}\n```\n\n以下代码和图 5-3 演示了一个使用队列方法的现实示例：\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig3_HTML.png](img/490882_1_En_5_Fig3_HTML.png)\n\
  \n图 5-3\n\n使用队列方法\n\n```\nvar cusTomQueue = Queue()\ncusTomQueue.enqueue(element:\
  \ 1)\ncusTomQueue.enqueue(element: 2)\ncusTomQueue.enqueue(element: 3)\nprint(cusTomQueue)\n\
  ```\n\n输出将是\n\n```\nQueue(data: [1, 2, 3])\n```\n\n为了打印出合适的输出，需要添加 `CustomStringConvertible`\
  \ 扩展。\n\n```\nextension Queue: CustomStringConvertible {\n    public var description:\
  \ String {\n        return data.description\n    }\n}\n```\n\n在这种情况下，输出将是\n\n```\n\
  [1, 2, 3]\n```\n\n使用 `dequeue()` 和 `peek()` 函数\n\n```\nprint(cusTomQueue.dequeue())\n\
  print(cusTomQueue.peek())\n```\n\n输出将是\n\n```\nOptional(1)\nOptional(2)\n```\n\n\
  ## 结论\n\n在本章中，你了解了队列的通用结构，如何在 Swift 中创建它们，以及如何使用 `enqueue`、`dequeue` 和 `peek` 方法。在下一章中，你将学习链表这种数据结构类型。\n\
  \n\n\n"
- '# 6. 链表


  链表是一种数据结构，用于保存一组表示序列的数据项。其中每个数据项被称为一个节点。节点包含数据，并通过其链接与序列中的下一个节点相连。更复杂的链表形式会添加额外的链接。链表的主要优势在于快速的插入和删除操作。链表与数组一样是线性数据结构，但与数组不同，元素并非存储在连续的内存位置。与数组类似，链表也是一种线性数据结构（图
  6-1）。


  ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig1_HTML.png](img/490882_1_En_6_Fig1_HTML.png)


  图 6-1


  线性数据结构


  链表主要有两种类型：*单向链表*（图 6-2），其中每个节点只包含指向下一个节点的引用；以及*双向链表*（图 6-3），其中每个节点包含指向前一个和下一个节点的引用。


  ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig3_HTML.png](img/490882_1_En_6_Fig3_HTML.png)


  图 6-3


  双向链表


  ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig2_HTML.png](img/490882_1_En_6_Fig2_HTML.png)


  图 6-2


  单向链表


  链表的开头和结尾可以使用名为 `head` 和 `tail` 的指针进行追踪（图 6-4）。


  ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig4_HTML.png](img/490882_1_En_6_Fig4_HTML.png)


  图 6-4


  追踪开头与结尾


  ### 实现


  为了用 Swift 创建一个 `LinkedList` 数据结构，我们将创建 `Node` 和 `LinkedList` 类，以及几个用于链表操作的函数。由于
  Swift 将结构体视为值类型，对值类型捕获 self 是一种危险的做法，应予以避免。当我们创建 `LinkedList` 时，我们使用类，因为它们在 Swift
  中属于引用类型。因此，我建议你将 `Node` 创建为类，并利用 Swift 中的各种访问说明符来实现你所需的抽象。


  ### 节点


  如前所述，链表由节点组成，因此，首先我们需要使用 Swift playground 创建一个节点类。这里我们将再次使用 Swift 泛型以增加灵活性。


  ```

  public class Node {

  public var value : nodeType

  public var next : Node?

  public init(value: nodeType) {

  self.value = value

  }

  }

  extension Node: CustomStringConvertible {

  public var description: String {

  guard let next = next else {

  return "\(value)"

  }

  return "\(value) -> " + String(describing: next) + " " }

  }

  ```


  每个节点都关联一个值，并有一个指向下一个节点的指针；这就是我们之前声明两个变量的原因，并且此 `Node` 是用于 `SinglyLinkedList` 的。


  ## 单向链表


  现在我们有了创建 `Node` 所需的一切。为了创建和修改我们的 `LinkedList`，并追踪列表的开头和结尾，我们将添加一个新的 `LinkedList`
  类。首先，我们将创建 `SinglyLinkedList` 类，然后在本章后面继续创建 `DoublyLinkedList` 类。


  ```

  public class SinglyLinkedList {

  public var head: Node?

  public var tail: Node?

  public var isEmpty: Bool {

  return head == nil

  }

  }

  extension SinglyLinkedList: CustomStringConvertible {

  public var description: String {

  guard let head = head else {

  return "Empty list"

  }

  return String(describing: head)

  }

  }

  ```


  `isEmpty` 是一个属性，用于检查 `LinkedList` 是否为空。


  ## 向链表添加新值


  可以通过两种方法向列表添加新值，这两种方法在性能上有所区别。


  > `append` – 在列表末尾添加新值


  > `insert(value:, index:)` – 在指定位置插入元素


  ### 追加


  此函数向列表末尾添加一个新 `Node`。让我们将以下代码添加到 `SinglyLinkedList` 类中：


  ```

  public func append(value: listType) {

  let newNode = Node(value: value)

  if var h = head {

  while h.next != nil {

  h = h.next!

  }

  h.next = newNode

  } else {

  head = newNode

  }

  }

  ```


  我们在这里做的是创建一个头部的临时引用，并检查头部的下一个引用，当它为 nil 时，我们就到达了 `LinkedList` 的末尾；然后我们将最后一个 `Node`
  的 next 设置为 `newNode`。


  例如：如果我们创建一个新的 `LinkedList` 并向其追加新元素，我们会看到每次追加列表时，新元素都会被插入到列表的末尾。


  ```

  var newList = SinglyLinkedList()

  newList.append(value: 2)

  newList.append(value: 4)

  newList.append(value: 6)

  newList.append(value: 8)

  print(newList)

  ```


  输出结果将是


  ```

  2 -> 4 -> 6 -> 8

  ```


  ### 插入


  此函数在指定的索引处插入一个元素。让我们将以下代码添加到 `SinglyLinkedList` 类中。


  ```

  func insert(value : listType, index : Int) {

  let newNode = Node(value: value)

  if (index == 0) {

  newNode.next = head

  head = newNode

  } else {

  var prev = head

  var cur = head

  for _ in 0..<index {

  prev = cur

  cur = cur?.next

  }

  newNode.next = prev?.next

  prev?.next = newNode

  }

  }

  ```


  该函数首先检查索引是否为 0，如果是，则通过将 `newNode` 赋值给列表的头部，将其添加到列表的开头。然后，它会在循环内找到指定索引的前一个节点和当前节点，并将
  `newNode` 赋值到指定位置。


  例如：我们将使用之前创建并追加了元素的列表 (**2 -> 4 -> 6 -> 8**)，以升序插入奇数值。


  ```

  print("newList: \(newList)")

  newList.insert(value: 1, index: 0)

  print("1 has been added to index 0: \(newList)")

  newList.insert(value: 3, index: 2)

  print("3 has been added to index 2: \(newList)")

  newList.insert(value: 5, index: 4)

  print("5 has been added to index 4: \(newList)")

  ```


  输出结果将是


  ```

  newList: 2 -> 4 -> 6 -> 8

  1 has been added to index 0: 1 -> 2 -> 4 -> 6 -> 8

  3 has been added to index 2: 1 -> 2 -> 3 -> 4 -> 6 -> 8

  5 has been added to index 4: 1 -> 2 -> 3 -> 4 -> 5 -> 6 -> 8

  ```


  ## 从链表中移除值


  从链表中移除节点主要有两种方法：


  1.  `removeLast` – 移除列表末尾的值


  2.  `remove(at:)` – 移除列表中的任意值


  ### removeLast


  如前所述，它移除位于 `LinkedList` 末尾的元素，尽管我们可以访问尾节点，但如果没有对前一个节点的引用，就无法删除它。让我们将以下代码添加到我们的 `LinkedList`
  类中：


  ```

  public func removeLast() -> listType? {

  if let h = head {

  if h.next == nil {

  defer {

  head = nil

  tail = nil

  }

  return h.value

  }

  var prev = h

  var curr = h

  while let next = curr.next {

  prev = curr

  curr = next

  }

  prev.next = nil

  tail = prev

  return curr.value

  } else {

  return nil

  }

  }

  ```


  首先，我们检查 `head` 是否为 `nil`；如果是，我们**返回** `nil`——这就是第一个 **if** 语句的作用。然后，下一个 **if** 检查列表是否只包含一个节点；我们在
  `defer` `{}` 中移除该节点。我们继续搜索下一个节点，直到 `curr.next` 为 `nil`，以找到列表中的最后一个节点；由于当前节点是最后一个节点，因此通过将
  `prev.next` 设置为 nil，我们断开了最后一个节点与列表的连接。




  '
- '# `remove(at:)`


  该函数用于移除指定索引处的元素。


  ```

  func remove(at position: Int) {

  if head == nil {

  return

  }

  var h = head

  if (position == 0) {

  head = h?.next

  return

  }

  for _ in 0..<position-1 where h != nil {

  h = h?.next

  }

  if h == nil || h?.next == nil {

  return

  }

  let nextToNextNode = h?.next?.next

  h?.next = nextToNextNode

  }

  ```


  首先，我们检查 `head` 是否为空，若为空则无需移除任何元素。接着，我们创建一个头节点的实例。如果 `position` 为 0，则移除头节点并将下一个节点的值赋给头节点，然后返回；否则，我们通过不断赋值头节点，从
  0 循环到 `position`。


  让我们通过一个示例来理解：


  ```

  print("初始列表: \(newList)")

  newList.remove(at: 2)

  print("已移除索引 2: \(newList)")

  newList.remove(at: 0)

  print("已移除索引 0: \(newList)")

  ```


  输出结果如下：


  ```

  初始列表: 1 -> 2 -> 3 -> 4 -> 5 -> 6 -> 8

  已移除索引 2: 1 -> 2 -> 4 -> 5 -> 6 -> 8

  已移除索引 0: 2 -> 4 -> 5 -> 6 -> 8

  ```


  ## 双向链表


  如前所述，双向链表是一种每个节点都包含指向前一个节点和下一个节点引用的链表。接下来，我们将创建 `DoublyLinkedList` 类来了解其工作原理。首先，为双向链表创建
  `Node` 类。


  ```

  public class DoubleNode {

  var value: nodeType

  var next: DoubleNode?

  weak var previous: DoubleNode?

  init(value: nodeType) {

  self.value = value

  }

  }

  extension DoubleNode: CustomStringConvertible {

  public var description: String {

  guard let next = next else {

  return "\(value)"

  }

  return "\(value) -> " + String(describing: next) + " " }

  }

  ```


  每个节点都关联一个值、一个指向下一个节点的指针，以及一个指向前一个节点的指针。为了防止内存循环，我们将前一个指针声明为弱引用（weak reference）。


  创建 `DoubleNode` 类之后，就可以继续创建 `DoublyLinkedList` 类了。我们声明了 `nodeAt` 函数作为辅助函数，用于获取给定索引处的元素。


  ```

  public class DoublyLinkedList {

  var head: DoubleNode?

  private var tail: DoubleNode?

  public var isEmpty: Bool {

  return head == nil

  }

  public func nodeAt(index: Int) -> DoubleNode? {

  if index >= 0 {

  var node = head

  var i = index

  while node != nil {

  if i == 0 { return node }

  i -= 1

  node = node!.next

  }

  }

  return nil

  }

  }

  ```


  ### 追加元素


  以下函数用于向双向链表添加元素：


  ```

  func insert(node: DoubleNode, at index: Int) {

  if index == 0,

  tail == nil {

  head = node

  tail = node

  } else {

  guard let nodeAtIndex = nodeAt(index: index) else {

  print("索引越界。")

  return

  }

  if nodeAtIndex.previous == nil {

  head = node

  }

  node.previous = nodeAtIndex.previous

  nodeAtIndex.previous?.next = node

  node.next = nodeAtIndex

  nodeAtIndex.previous = node

  }

  }

  ```


  ### 移除节点方法


  ```

  public func remove(node: DoubleNode) -> listType {

  let previousNode = node.previous

  let nextNode = node.next

  if let prev = previousNode {

  prev.next = nextNode

  } else {

  head = nextNode

  }

  nextNode?.previous = previousNode

  if nextNode == nil {

  tail = previousNode

  }

  node.previous = nil

  node.next = nil

  return node.value

  }

  ```


  ### `remove(at:)`


  ```

  func remove(at index: Int) {

  var toDeleteNode = nodeAt(index: index)

  guard toDeleteNode != nil else {

  print("索引越界。")

  return

  }

  let previousNode = toDeleteNode?.previous

  let nextNode = toDeleteNode?.next

  if previousNode == nil {

  head = nextNode

  }

  if toDeleteNode?.next == nil {

  tail = previousNode

  }

  previousNode?.next = nextNode

  nextNode?.previous = previousNode

  toDeleteNode = nil

  }

  ```


