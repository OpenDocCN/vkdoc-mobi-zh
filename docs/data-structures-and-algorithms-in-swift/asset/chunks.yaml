    \n```swift\nfunc add(child: Node) {\n    children.append(child)\n    child.parent\
    \ = self\n}\n```\n\n我们将子节点追加到由节点组成的 children 数组中，并设置子节点的父节点。为了理解这个添加方法的工作原理，我们在\
    \ playground 中（类定义外部）编写以下代码：\n\n```swift\nlet drinks = Node(data: \"Drinks\")\n\
    let type1 = Node(data: \"Cold\")\nlet type2 = Node(data: \"Hot\")\ndrinks.add(child:\
