    \ through all the children, and if any of the nodes have a match, it will return\
    \ the node. Finally, we return `nil` if no data is matched.\n\n```swift\nfunc\
    \ search(element: T) -> Node? {\n    if element == self.data {\n        return\
    \ self\n    }\n    for child in children {\n        if let result = child.search(element:\
    \ element) {\n            return result\n        }\n    }\n    return nil\n}\n\
    ```\n\nLet’s try this using the playground outside our class.\n\n```swift\nlet\
    \ latte = drinks.search(element: \"Latte\")\nif let result = latte {\n    result.printTree()\n\
    }\n```\n\nThe output will be:\n\n```\nLatte\n```\n\nAs previously mentioned, when\
    \ you do a search inside a tree, an iteration through children will be done. This\
    \ iteration is different from the normal ones, which is a bit complicated.\n\n\
    There are different types of tree data structure and some of them will be discussed\
