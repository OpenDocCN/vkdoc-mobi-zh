    # 7. Hash Table


    A *hash table* is a data structure of “associative arrays” that groups values
    in an index and sorts and retrieves data using a key/value mapping. It accomplishes
    the same goal in some cases like Swift dictionaries. However, the efficiency of
    hash tables is better than dictionaries. The time complexity for searching, inserting,
    and deleting is on average O(1), which means that regardless of the size of the
    input operation time remains constant. This solves the problem of the linear search
    operation which is costly and the time complexity is O(n). By calculating the
    hash value, we can find the index and place the value in this index and retrieve
    the value based on it.


    A hash table consists of two parts: index and value. The index is a computed sequence
    of numbers or characters which is different from dictionaries. The process of
    creating a unique hash is called a hash algorithm or hash function.


    Figure [7-1](#490882_1_En_7_Chapter.xhtml#Fig1) illustrates that the input of
    the city of London always produces the hash result of 3\. The values are stored
    in buckets and their position is computed by the hash function. It is a function
    that can be used to map a dataset of arbitrary size to a dataset of fixed size,
    which falls into the hash table.


