    public init(_ value: inputType) {

    self.value = value

    }

    public func addChild(_ child: DFNode) {

    children.append(child)

    }

    }

    ```


    We use the Tree Node inside the DFS. To do so we create another function inside
    the Tree Node class which uses recursion process in the next node.


    ```

    public func depthFirstSearch(visit: (DFNode) -> Void) {

    visit(self)

    children.forEach {

    $0.depthFirstSearch(visit: visit)

    }

    }

    ```


