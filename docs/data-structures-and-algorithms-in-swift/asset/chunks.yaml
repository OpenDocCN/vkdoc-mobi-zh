  raw: '# 5. Queue


    A queue is a first in first out (FIFO) data structure which means first come first
    serve. It is also known as “waiting lines,” and as the name suggests, it can be
    easily imagined as a group of people waiting in a line (Figure [5-1](#490882_1_En_5_Chapter.xhtml#Fig1)).


    ![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg](images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Typical queue structure


    When a new person comes, he stands at the end of the line conveniently adding
    data to a queue; the data is placed at the end. The term “enqueue” is used to
    refer to the act of adding an element to a queue. When extracting data from a
    queue, the data that has been in the queue the longest is removed first `–` the
    term “dequeue” refers to the act of extracting data from a queue (Figure [5-2](#490882_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png](images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png)


    Figure 5-2


    Enqueue/dequeue example


    There are several methods that queues implement.


    *   `enqueue() –` Add an element at the end of the queue


    *   `dequeue() –` Remove and return the first element from the queue


    *   `peek() –` Return the first element from the queue, but not remove it


    *   `count –` Return the number of elements in the queue


    *   `clear() –` Reset the queue to an empty state


    *   `isEmpty() –` Return true if the queue is empty


    *   `isFull()` : Return true if the queue if full


    Queue, as the name suggests, is used whenever we need to manage any group of objects
    in an order in which the first one coming in also gets out first, while the others
    wait for their turn, like in the following scenarios:


    1.  Point of sale system of a restaurant. It is obvious that the orders must be
    processed in the order they were received. As an order is received, it writes
    to the back of the queue and reads orders from the front of the queue by cooks’
    device. This allows cooks to cook meals in the order they received.


    2.  Serving requests on a single shared resource, like a printer, CPU task scheduling,
    and so on.


    3.  In a real-life scenario, call center phone systems use queues to hold people
    calling them in an order, until a service representative is free.


    4.  Handling of interrupts in real-time systems. The interrupts are handled in
    the same order as they arrive.


    5.  Buffers on MP3 players and portable CD players and iPod playlist. Playlist
    for jukebox `–` add songs to the end, and play from the front of the list.


    6.  When programming a real-time system that can be interrupted (e.g., by a mouse
    click or wireless connection), it is necessary to attend to the interrupts immediately
    before proceeding with the current activity. If the interrupts should be handled
    in the same order they arrive, then a FIFO queue is the appropriate data structure.


    ## Implementation


    By using Swift Generics, we provide flexibility to the queue so that we can store
    any type. First, we will create a queue structure and declare the private array
    type of Swift Generics with an empty array of **T** type.


    ```

    import Foundation

    public struct Queue {

    private var data: [T] = []

    }

    ```


    Then we will add the `enqueue()` method which appends new element to the end of
    the queue, and again here, the time complexity will be **O(1).**


    ```

    import Foundation

    public struct Queue {

    private var data: [T] = []

    //Enqueue method

    public mutating func enqueue(element: T) {

    data.append(element)

    }

    }

    ```


    We continue to declare the **dequeue**`()` method which removes and returns the
    first element in the queue, and if the queue is empty, it returns `nil`.


    ```

    import Foundation

    public struct Queue {

    private var data: [T] = []

    //Enqueue method

    public mutating func enqueue(element: T) {

    data.append(element)

    }

    //Dequeue method

    public mutating func dequeue() -> T? {

    return data.removeFirst()

    }

    }

    ```


    Another method that can be used is the `peek()` function which returns the first
    element in the queue without removing it, and again if it is empty, nil is returned.


    ```

    public struct Queue {

    private var data: [T] = []

    //Enqueue method

    public mutating func enqueue(element: T) {

    data.append(element)

    }

    //Dequeue method

    public mutating func dequeue() -> T? {

    return data.removeFirst()

    }

    //Peek method

    public func peek() -> T? {

    return data.first

    }

    }

    ```


    We can even go further to declare the helper functions that are previously mentioned.
    The full code for the helper functions will be as follows `– count`, `clear()`,
    `isEmpty()`, and `isFull()` :


    ```

    import Foundation

    public struct Queue {

    private var data: [T] = []

    //Enqueue method

    public mutating func enqueue(element: T) {

    data.append(element)

    }

    //Dequeue method

    public mutating func dequeue() -> T? {

    return data.removeFirst()

    }

    //Peek method

    public func peek() -> T? {

    return data.first

    }

    // Clear

    public mutating func clear() {

    data.removeAll()

    }

    //Count

    public var count: Int {

    return data.count

    }

    //Capacity will be used for isFull() method

    public var capacity: Int {

    get {

    return data.capacity

    }

    set {

    data.reserveCapacity(newValue)

    }

    }

    //isFull method

    public func isFull() -> Bool {

    return count == data.capacity

    }

    //isEmpty() method

    public func isEmpty() -> Bool {

    return data.isEmpty

    }

    }

    ```


    The following code and Figure [5-3](#490882_1_En_5_Chapter.xhtml#Fig3) illustrate
    a real-life example of using the queue methods:


    ![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig3_HTML.png](images/490882_1_En_5_Chapter/490882_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Using the queue methods


    ```

    var cusTomQueue = Queue()

    cusTomQueue.enqueue(element: 1)

    cusTomQueue.enqueue(element: 2)

    cusTomQueue.enqueue(element: 3)

    print(cusTomQueue)

    ```


    The output will be


    ```

    Queue(data: [1, 2, 3])

    ```


    To print out a proper output, the **CustomStringConvertible** extension needs
    to be added.


    ```

    extension Queue: CustomStringConvertible {

    public var description: String {

    return data.description

    }

    }

    ```


    In this case, the output will be


    ```

    [1, 2, 3]

    ```


    Using the `dequeue()` and `peek(` functions


    ```

    print(cusTomQueue.dequeue())

    print(cusTomQueue.peek())

    ```


    The output will be


    ```

    Optional(1)

    Optional(2)

    ```


    ## Conclusion


    In this chapter, you have learned about the general structure of a queue, how
    to create them in Swift, and how to use enqueue, dequeue, and peek methods. In
    the following chapter, you will learn about the data structure type of linked
    lists.'
  trans: "\n# 5. 队列\n\n队列是一种先进先出（FIFO）的数据结构，意味着先到先服务。它也被称为“等待队列”，顾名思义，可以很容易地想象成一排人正在排队（如图\
    \ 5-1 所示）。\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg](img/490882_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\n典型的队列结构\n\n当新人到来时，他会站在队伍的末尾，这正好对应了向队列中添加数据：数据被放置在末尾。使用术语 `enqueue`\
    \ 来指代向队列中添加元素的操作。当从队列中提取数据时，队列中停留时间最长的数据会被最先移除——术语 `dequeue` 指代从队列中提取数据的操作（如图\
    \ 5-2 所示）。\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png](img/490882_1_En_5_Fig2_HTML.png)\n\
    \n图 5-2\n\n入队/出队示例\n\n队列实现了以下几种方法。\n\n*   `enqueue()` – 在队列末尾添加一个元素\n*   `dequeue()`\
    \ – 移除并返回队列中的第一个元素\n*   `peek()` – 返回队列中的第一个元素，但不移除它\n*   `count` – 返回队列中的元素数量\n\
    *   `clear()` – 将队列重置为空状态\n*   `isEmpty()` – 如果队列为空则返回 true\n*   `isFull()` –\
    \ 如果队列已满则返回 true\n\n顾名思义，队列用于需要按“先进先出”的顺序管理任何一组对象，同时其他对象等待其轮次的场景。就像下面的示例：\n\n\
    1.  餐厅的销售点系统。很明显，订单必须按照接收的顺序进行处理。当收到订单时，它被写入队列的尾部，而厨师通过设备从队列头部读取订单。这让厨师能够按照接收订单的顺序烹饪食物。\n\
    2.  在单个共享资源（如打印机、CPU 任务调度等）上处理请求。\n3.  在现实场景中，呼叫中心电话系统使用队列来按顺序保存呼叫者，直到有服务代表空闲。\n\
    4.  实时系统中的中断处理。中断按照它们到达的相同顺序进行处理。\n5.  MP3 播放器、便携式 CD 播放器和 iPod 播放列表上的缓冲区。自动点唱机播放列表——歌曲添加到末尾，并从列表开头播放。\n\
    6.  当编写一个可能被中断（例如，通过鼠标点击或无线连接）的实时系统时，必须在继续当前活动之前立即处理中断。如果中断应该按照它们到达的顺序处理，那么 FIFO\
    \ 队列就是合适的数据结构。\n\n## 实现\n\n通过使用 Swift 泛型，我们为队列提供了灵活性，使其可以存储任何类型。首先，我们将创建一个队列结构体，并使用一个空的\
    \ `T` 类型数组声明一个私有的 Swift 泛型数组。\n\n```\nimport Foundation\npublic struct Queue {\n\
    \    private var data: [T] = []\n}\n```\n\n然后，我们将添加 `enqueue()` 方法，该方法将新元素追加到队列的末尾。同样，这里的时间复杂度为\
    \ **O(1)**。\n\n```\nimport Foundation\npublic struct Queue {\n    private var\
    \ data: [T] = []\n\n    //入队方法\n    public mutating func enqueue(element: T) {\n\
    \        data.append(element)\n    }\n}\n```\n\n我们继续声明 `dequeue()` 方法，该方法移除并返回队列中的第一个元素，如果队列为空，则返回\
    \ `nil`。\n\n```\nimport Foundation\npublic struct Queue {\n    private var data:\
    \ [T] = []\n\n    //入队方法\n    public mutating func enqueue(element: T) {\n   \
    \     data.append(element)\n    }\n\n    //出队方法\n    public mutating func dequeue()\
    \ -> T? {\n        return data.removeFirst()\n    }\n}\n```\n\n另一个可以使用的函数是 `peek()`，它返回队列中的第一个元素而不移除它，同样，如果队列为空，则返回\
    \ `nil`。\n\n```\npublic struct Queue {\n    private var data: [T] = []\n\n   \
    \ //入队方法\n    public mutating func enqueue(element: T) {\n        data.append(element)\n\
    \    }\n\n    //出队方法\n    public mutating func dequeue() -> T? {\n        return\
    \ data.removeFirst()\n    }\n\n    //查看方法\n    public func peek() -> T? {\n  \
    \      return data.first\n    }\n}\n```\n\n我们甚至可以更进一步，声明前面提到的辅助函数。辅助函数的完整代码如下——`count`、`clear()`、`isEmpty()`\
    \ 和 `isFull()`：\n\n```\nimport Foundation\npublic struct Queue {\n    private\
    \ var data: [T] = []\n\n    //入队方法\n    public mutating func enqueue(element:\
    \ T) {\n        data.append(element)\n    }\n\n    //出队方法\n    public mutating\
    \ func dequeue() -> T? {\n        return data.removeFirst()\n    }\n\n    //查看方法\n\
    \    public func peek() -> T? {\n        return data.first\n    }\n\n    // 清空\n\
    \    public mutating func clear() {\n        data.removeAll()\n    }\n\n    //计数\n\
    \    public var count: Int {\n        return data.count\n    }\n\n    //容量将用于\
    \ isFull() 方法\n    public var capacity: Int {\n        get {\n            return\
    \ data.capacity\n        }\n        set {\n            data.reserveCapacity(newValue)\n\
    \        }\n    }\n\n    //isFull 方法\n    public func isFull() -> Bool {\n   \
    \     return count == data.capacity\n    }\n\n    //isEmpty() 方法\n    public func\
    \ isEmpty() -> Bool {\n        return data.isEmpty\n    }\n}\n```\n\n以下代码和图 5-3\
    \ 演示了一个使用队列方法的现实示例：\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig3_HTML.png](img/490882_1_En_5_Fig3_HTML.png)\n\
    \n图 5-3\n\n使用队列方法\n\n```\nvar cusTomQueue = Queue()\ncusTomQueue.enqueue(element:\
    \ 1)\ncusTomQueue.enqueue(element: 2)\ncusTomQueue.enqueue(element: 3)\nprint(cusTomQueue)\n\
    ```\n\n输出将是\n\n```\nQueue(data: [1, 2, 3])\n```\n\n为了打印出合适的输出，需要添加 `CustomStringConvertible`\
    \ 扩展。\n\n```\nextension Queue: CustomStringConvertible {\n    public var description:\
    \ String {\n        return data.description\n    }\n}\n```\n\n在这种情况下，输出将是\n\n\
    ```\n[1, 2, 3]\n```\n\n使用 `dequeue()` 和 `peek()` 函数\n\n```\nprint(cusTomQueue.dequeue())\n\
    print(cusTomQueue.peek())\n```\n\n输出将是\n\n```\nOptional(1)\nOptional(2)\n```\n\
    \n## 结论\n\n在本章中，你了解了队列的通用结构，如何在 Swift 中创建它们，以及如何使用 `enqueue`、`dequeue` 和 `peek`\
    \ 方法。在下一章中，你将学习链表这种数据结构类型。\n"
- fmt: '# 6. Linked Lists


    A linked list is a data structure that holds a group of data items which represents
    a sequence. Here each data item is referred to as a node. The nodes contain data
    and are interconnected to the next node in the sequence via their links. More
    complex forms of the list add additional links. The main advantage of a linked
    list is quick insertion and deletion. The linked list is a linear data structure
    like arrays, but unlike arrays, elements are not stored in a contiguous location.
    Like arrays, a linked list is a linear data structure (Figure [6-1](#490882_1_En_6_Chapter.xhtml#Fig1)).


    ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig1_HTML.png](images/490882_1_En_6_Chapter/490882_1_En_6_Fig1_HTML.png)


    Figure 6-1


    Linear data structure


    There are two main types of linked lists: *singly linked lists* (Figure [6-2](#490882_1_En_6_Chapter.xhtml#Fig2)),
    where each node has only reference to the next node, and *doubly linked lists*
    (Figure [6-3](#490882_1_En_6_Chapter.xhtml#Fig3)), where each node has reference
    to the previous and next nodes.


    ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig3_HTML.png](images/490882_1_En_6_Chapter/490882_1_En_6_Fig3_HTML.png)


    Figure 6-3


    Doubly linked lists


    ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig2_HTML.png](images/490882_1_En_6_Chapter/490882_1_En_6_Fig2_HTML.png)


    Figure 6-2


    Singly linked lists


    The beginning and end of a list can be tracked using pointers called `head` and
    `tail` (Figure [6-4](#490882_1_En_6_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_6_Chapter/490882_1_En_6_Fig4_HTML.png](images/490882_1_En_6_Chapter/490882_1_En_6_Fig4_HTML.png)


    Figure 6-4


    Tracking the beginning and end


    ## Implementation


    To create a `LinkedList` data structure using Swift, we will create the `Node`
    and `LinkedList` classes and several functions for linked list operations. As
    Swift treats the structures as value type, capturing self for values types is
    a dangerous practice and discouraged. When we make `LinkedList`, we use classes
    because they are the reference type in Swift. Therefore, I would suggest you to
    create `Node` as class and make use of the various access specifiers in Swift
    to achieve the abstraction you are trying to.


    ### Node


    As previously mentioned, a linked list is composed of nodes, so firstly, we need
    to create a node class using Swift playground. Here again we will use Swift Generics
    for flexibility.


    ```

    public class Node {

    public var value : nodeType

    public var next : Node?

    public init(value: nodeType) {

    self.value = value

    }

    }

    extension Node: CustomStringConvertible {

    public var description: String {

    guard let next = next else {

    return "\(value)"

    }

    return "\(value) -> " + String(describing: next) + " " }

    }

    ```


    Each node has a value associated with it and a pointer to the next node; that
    is why we previously declared two variables, and this `Node` is for `SinglyLinkedList`.


    ## Singly Linked List


    Now we have everything we need for `Node`. To create and modify our `LinkedList`
    and to keep track of the list beginnings and ends, we will add a new `LinkedList`
    class. Firstly, the `SinglyLinkedList` class will be created and then we will
    continue with `DoublyLinkedList` class later in the chapter.


    ```

    public class SinglyLinkedList {

    public var head: Node?

    public var tail: Node?

    public var isEmpty: Bool {

    return head == nil

    }

    }

    extension SinglyLinkedList: CustomStringConvertible {

    public var description: String {

    guard let head = head else {

    return "Empty list"

    }

    return String(describing: head)

    }

    }

    ```


    `isEmpty` is a property that checks if the `LinkedList` is empty or not.


    ## Adding New Values to a Linked List


    It is possible to add new values to the list by using two methods which are differentiated
    in terms of performance.


    > `append` – New value is added at the end of the list


    > `insert(value:, index:)` – To insert an element at a position we need to


    ### Append


    This function adds a new `Node` to the end of the list. Let us add the following
    code inside the `SinglyLinkedList` class:


    ```

    public func append(value: listType) {

    let newNode = Node(value: value)

    if var h = head {

    while h.next != nil {

    h = h.next!

    }

    h.next = newNode

    } else {

    head = newNode

    }

    }

    ```


    What we are doing here is creating a temporary reference of the header and checking
    the next reference of the header, and when it is nil, we are at the end of the
    `LinkedList`; then we set the next of the last `Node` to the `newNode`.


    For example: If we create a new `LinkedList` and append it with new elements,
    we will see that each time we append the list, a new element is inserted at the
    end of the list.


    ```

    var newList = SinglyLinkedList()

    newList.append(value: 2)

    newList.append(value: 4)

    newList.append(value: 6)

    newList.append(value: 8)

    print(newList)

    ```


    The output will be


    ```

    2 -> 4 -> 6 -> 8

    ```


    ### Insert


    This function inserts an element at the mentioned index. Let’s add the following
    code inside the `SinglyLinkedList` class.


    ```

