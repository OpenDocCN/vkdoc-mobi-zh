    It is possible to retrieve only the keys or values independently. As mentioned
    before, dictionaries are unordered collections, so when you iterate through them,
    there is no guarantee that it will be listed in an order. But there might be occasions
    that you want an iteration in an ordered manner, and for those cases, `sort(_:)`
    method can be used. This will return an array containing sorted elements of a
    dictionary. In the following code, `$0.0` is the first key/value pair and `$0.1`
    is the second key/value pair. These pairs are compared and will be ordered based
    on this comparison. Then, a `map` method is used to retrieve the data for the
